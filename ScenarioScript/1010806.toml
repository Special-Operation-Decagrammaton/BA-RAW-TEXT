[translation]
1010806-1 = "คืนที่นอนไม่หลับของเซมิน่า"
1010806-2 = "เฮ้อ... วันนี้งานยุ่งจนหัวหมุนเลย"
1010806-10 = "ห้องก็จัดเสร็จแล้ว จากนี้งานที่เหลือก็..."
1010806-11 = "จริงสิ ตอนนี้รายการวิทยุน่าจะเริ่มแล้วนะ? เกือบอดฟังแล้วนะเนี่ย"
1010806-16 = "สวัสดีคุณผู้ฟัง กลับมาพบกับดีเจแมร์รี่อีกครั้ง"
1010806-17 = "ไม่กี่วันมานี้ จู่ๆ ก็อากาศหนาวขึ้นมาเลยว่ามั้ย?"
1010806-18 = "ทุกคนต้องนอนห่มผ้าให้ดีนะ จะได้ไม่เป็นหวัดในช่วงที่อากาศหนาวแบบนี้"
1010806-19 = "วันนี้เราจะมาอ่านเรื่องที่คุณผู้ฟังส่งเข้ามา แล้วให้คำแนะนำในสิ่งที่พวกเขากังวลกัน"
1010806-20 = "และเรื่องของวันนี้... ส่งมาจาก 'H จัง' จากโรงเรียนวิทย์มิลเลเนียม"
1010806-21 = "เอ๋... นั่นมันเรื่องที่ฉันส่งไปนี่นา?"
1010806-22 = "ตอนนั้นฉันนอนไม่หลับ ก็เลยเขียนสิ่งที่ผุดขึ้นมาในใจตอนนั้นเท่านั้นเอง ไม่คิดเลยนะว่ารายการจะ#nเลือกเรื่องของฉันไปออกอากาศ..."
1010806-23 = "<สวัสดีค่ะ ฉันเป็นนักเรียนที่เป็นแฟนรายการวิทยุของดีเจแมร์รี่ค่ะ>"
1010806-24 = "<ฉันเริ่มฟังรายการนี้จากการแนะนำของคนรู้จักค่ะ รายการนี้เปิดเพลงคลาสสิกเบาๆ ที่ช่วยให้#nนอนหลับได้ หมู่นี้ฉันก็เลยฟังรายการของดีเจแมร์รี่ก่อนนอนทุกคืนเลยค่ะ>"
1010806-25 = "อืม ที่จริงแล้วดีเจแมร์รี่ก็ชอบเพลงร็อกเบสหนักๆ เหมือนกัน แต่รายการที่ออกอากาศในเวลานี้ก็ควร#nเปิดเพลงเบาๆ มากกว่า"
1010806-26 = "เพราะในเวลานี้ ผู้คนส่วนมากก็น่าจะกำลังเตรียมเข้านอนกัน ถ้ารายการของแมร์รี่ทำให้คุณผู้ฟังนอน#nไม่หลับ ก็น่าจะไม่ดีหรอกเนอะ? ฮ่าฮ่า"
1010806-28 = "<แต่ว่าวันสองวันมานี้ ต่อให้ฉันฟังรายการของดีเจแมร์รี่ ฉันก็ยังนอนไม่หลับอยู่ดีค่ะ>"
1010806-29 = "<อ้อ ไม่ใช่เพราะเพลงที่เปิดหรอกนะคะ ฉันชอบเพลงที่ดีเจแมร์รี่เปิดค่ะ แต่แค่ฉันจะรู้สึกว้าวุ่นใจก่อน#nนอน ฉันก็เลยไม่ค่อยมีสมาธิกับดนตรีค่ะ>"
1010806-30 = "<ตอนฉันนอนลงบนเตียงแล้วจ้องเพดานมืดๆ เพื่อให้หลับ เรื่องที่เกิดขึ้นในวันนั้นก็จะผุดขึ้นมาใน#nสมองเลยค่ะ>"
1010806-31 = "<วันนี้ฉันน่าจะทำได้ดีกว่านี้แท้ๆ พรุ่งนี้ฉันจะทำได้ดีกว่าวันนี้มั้ยนะ>"
1010806-32 = "<พอฉันคิดเรื่องนี้ ฉันก็จะหายง่วงเพราะความวิตกกังวลที่เพิ่มขึ้น... สุดท้ายฉันก็ต้องเผชิญกับโรค#nนอนไม่หลับมาเกือบเดือนแล้วค่ะ>"
1010806-33 = "<ดีเจแมร์รี่คะ พอจะมีวิธีดีๆ ที่จะทำให้นอนหลับได้บ้างมั้ยคะ?>"
1010806-35 = "ฮือ พอได้ยินเรื่องที่ตัวเองเขียนจากการเล่าของคนอื่น มันก็รู้สึกอายจัง..."
1010806-36 = "อืม จะว่าไป คนรอบตัวดีเจแมร์รี่ก็มีหลายคนที่ต้องทรมานกับโรคนอนไม่หลับเหมือนกัน"
1010806-37 = "ว่ากันว่าโรคนอนไม่หลับเป็นโรคเรื้อรังของคนยุคใหม่เลยนี่?"
1010806-38 = "แต่น่าเสียดายที่ดีเจแมร์รี่เป็นคนประเภทที่แค่หัวถึงหมอนไม่เกินห้านาทีก็หลับแล้ว งั้นก็น่าจะยากที่จะ#nให้คำปรึกษาเรื่องนี้นะ"
1010806-39 = "ถ้าคุณผู้ฟังคนไหนมีวิธีดีๆ ในการบรรเทาอาการนอนไม่หลับ ก็ช่วยส่งวิธีมาบอกกันหน่อยนะ~"
1010806-40 = "ถึงจะไม่ได้คาดหวังอะไรไว้มาก แต่ก็คงไม่มีเคล็ดลับดีๆ ในการบรรเทาอาการนอนไม่หลับจริงๆ สินะ"
1010806-41 = "การไม่คิดอะไรมากก่อนนอนน่าจะเป็นวิธีที่ดีที่สุดอย่างที่คุณครู [USERNAME] บอกไว้ละนะ..."
1010806-42 = "แต่การจะจบวันนั้นๆ ด้วยความพึงพอใจมันก็ไม่ใช่เรื่องง่ายเลย"
1010806-46 = "เพลงเพราะจังเลยนะ..."
1010806-48 = "(หนึ่งสัปดาห์ต่อมา...)"
1010806-53 = "สวัสดีคุณผู้ฟังทุกคน! รอกันนานเลยใช่มั้ย? ถึงเวลาของรายการ <ทริปดนตรีกับดีเจแมร์รี่> แล้ว"
1010806-54 = "สัปดาห์ที่แล้ว เรามีนักเรียนจากมิลเลเนียมที่ส่งเรื่องเข้ามาว่าตัวเองกำลังทรมานกับโรคนอนไม่หลับ แต่หลังจากนั้นก็มีคนส่งข้อความเกี่ยวกับเรื่องนี้กันมาเยอะแยะเลย สงสัยจะมีคนที่กังวลเรื่องเดียวกัน#nนี้อยู่ไม่น้อยเลยละ"
1010806-55 = "ว่าไงนะ...?! เรื่องของฉันเป็นที่สนใจขนาดนั้นเลยเหรอ?"
1010806-56 = "อึก ถ้าโดนจับได้ว่าฉันเป็นคนส่งไป จะทำยังไงดี..."
1010806-57 = "คนส่วนใหญ่บอกว่าเห็นใจและเข้าใจมากๆ เพราะมีความกังวลเรื่องเดียวกัน และจากข้อความมากมาย#nที่ส่งเข้ามา ก็มีเรื่องที่พอจะเป็นประโยชน์ต่อโรคนอนไม่หลับด้วย"
1010806-58 = "และเรื่องนี้... ส่งมาจากคุณผู้ฟังที่ใช้นามแฝงว่าคุณ 'S จากชาเล่ต์'"
1010806-59 = "แต่ถ้าบอกสังกัดมาขนาดนี้ ก็ไม่จำเป็นต้องใช้นามแฝงหรือเปล่า...?"
1010806-60 = "ชาเล่ต์งั้นเหรอ...? หรือว่าจะเป็นคุณครู?!!"
1010806-61 = "ดูเหมือนว่ารายการวันนี้จะได้เสียงตอบรับเยอะเลยนะ"
1010806-62 = "แต่รายการเราจะใช้นามแฝงกับทุกเรื่องที่ส่งเข้ามา ดังนั้นหวังว่าทุกคนจะรับฟังอย่างใจเย็น และไม่ด่วนสรุปกันมากเกินไปนะ"
1010806-63 = "เอาละ มาฟังเรื่องราวของคุณ 'S จากชาเล่ต์' กัน"
1010806-65 = "<หลายๆ คนต่างก็กลัวการนอนหลับ นั่นก็เพราะถ้านอนหลับ วันพรุ่งนี้ก็จะมาถึง>"
1010806-66 = "<พรุ่งนี้เป็นอนาคตที่ยังไม่ได้เกิดขึ้น ดังนั้นจึงหลีกเลี่ยงไม่ได้ที่เราจะคาดการณ์อนาคตจากพื้นฐาน#nของวันนี้>"
1010806-67 = "<เมื่อนึกถึงกลางวันที่เจิดจ้า ความมืดมิดตรงหน้าอาจดูไม่คุ้นเคยและน่ากลัว แต่ก็ไม่ต้องกังวลไปนะ>"
1010806-68 = "<เพราะการที่ค่ำคืนนี้มืดมิด มันหมายความว่าเราได้ใช้เวลาในตอนกลางวันมาอย่างเต็มที่แล้ว>"
1010806-69 = "<คุณที่ขยันและจริงใจอยู่เสมอ คุณในวันพรุ่งนี้จะทำได้ดีกว่าวันนี้อย่างแน่นอน>"
1010806-72 = "เป็นเรื่องที่ดีจังเลย... หวังว่า 'H จัง' จากมิลเลเนียมจะได้ฟังเรื่องนี้แล้วนอนหลับได้อย่างสบายใจนะ"
1010806-73 = "เพลงต่อไปนี้เป็นดนตรีคลาสสิกอันผ่อนคลายที่จะช่วยให้ทุกคนหลับได้ มาฟังเพลงนี้จนจบแล้วมี#nค่ำคืนที่นอนหลับสบายไปด้วยกันนะ"
1010806-74 = "นั่นสินะ..."
1010806-80 = "ฉันในวันพรุ่งนี้จะทำได้ดีกว่าวันนี้อย่างแน่นอน"
1010806-82 = "(แล้วคืนนั้นยูกะก็นอนหลับลึกได้อย่างสบายใจ)"

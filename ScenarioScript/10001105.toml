[translation]
10001105-1 = "ตอนที่ 10;วันหยุดแห่งการปฏิวัติของสหภาพเรดวินเทอร์"
10001105-2 = "สำนักเลขาธิการสหภาพเรดวินเทอร์"
10001105-3 = "เราแค้น! เรามาล้างแค้น! แล้วเราก็ชนะ!"
10001105-4 = "โทโมเอะ สหาย เห็นเราเอาชนะศัตรูด้วยแผนการที่สมบูรณ์แบบแล้วใช่ไหม?"
10001105-5 = "ค่ะ เป็นการสั่งการต่อสู้ที่สมบูรณ์แบบมากค่ะท่านประธานเชริโน่!"
10001105-6 = "นักเรียนที่นี่จะต้องจดจำการระดมพลนักเรียนจากสังกัดต่างๆ แล้วมุ่งสู่ดินแดนของศัตรูอย่างกล้าหาญ#nของท่านประธานเชริโน่ และสิ่งนี้จะถูกจารึกในประวัติศาสตร์ของสหภาพเรดวินเทอร์แน่นอนค่ะ"
10001105-7 = "จริงสิ เราเรียกจิตรกรมาวาดภาพประวัติศาสตร์ของเหตุการณ์ในวันนี้#nเพื่อให้นักเรียนรุ่นหลังได้เห็นกันดีไหมคะ?"
10001105-8 = "เป็นความคิดที่ดีเลยหัวหน้าเลขานุการโทโมเอะ! ไปจัดการเรื่องนี้ได้เลย!"
10001105-9 = "[s] \"ครูเห็นเธอเอาแต่ออกคำสั่งด้วยความถือทิฐิมากกว่านะ\""
10001105-10 = "พูดอะไรออกมาน่ะสหาย!#nนั่นเป็นการส่งเสียงในสนามรบอย่างกล้าหาญเพื่อปลุกขวัญกำลังใจของนักเรียนต่างหาก!"
10001105-11 = "ถ้าสหายได้ยินเสียงนั้นเป็นเสียงบ่นพึมพำของเด็กล่ะก็ รีบไปโรงพยาบาลเพื่อตรวจหูดูดีกว่านะ#nหูของสหายน่าจะมีปัญหาแล้วล่ะ!"
10001105-12 = "เฮ้อ... ในที่สุดก็ได้สำนักเลขาธิการคืนมาอีกครั้ง หายเหนื่อยแล้วล่ะ"
10001105-13 = "มีของว่างใส่ไว้ล้นตู้ แถมที่นั่งประจำตำแหน่งก็เบาะนุ่มอีก รู้สึกดีเหมือนได้กลับมาบ้านเลย...#nสำนักงานของเราต้องสบายเบอร์นี้แหละ!"
10001105-14 = "ใช้เวลาที่เหลือของวันนี้นั่งกินมันฝรั่งทอดบนเก้าอี้นุ่มๆ นี่ดีกว่า! เราจะไม่ขยับไปไหนเลย!"
10001105-16 = "จริงสิ เราควรจะได้ฟังข้ออ้างเรื่องการปฏิวัติหน่อยว่าไหม หัวหน้าคณะฯ มารินะ?"
10001105-19 = "อึ้ก....."
10001105-21 = "มารินะ ที่ผ่านมาเราเคยเชื่อและไว้ใจเธอมาก#nกล้าดียังไงมายึดอำนาจในเวลานอนกลางวันที่สำคัญของเรา!"
10001105-22 = "ยกโทษให้ไม่ได้!"
10001105-23 = "ฉันละอายใจจริงๆ ค่ะท่านประธานเชริโน่..."
10001105-24 = "ฮึ่ม ฮึ่ม!"
10001105-25 = "เหตุผลจริงๆ ที่ลุกขึ้นมาต่อต้านเราคืออะไรงั้นรึ?"
10001105-26 = "เธอโกรธที่เราแอบกินพุดดิ้งของเธอเหรอ?"
10001105-27 = "หรือว่าเพราะเรานอนหนุนตุ๊กตาหมีตัวโปรดของเธอ...?"
10001105-28 = "พุดดิ้งกับตุ๊กตาหมี? ท่านประธานหมายถึงอะไรเหรอคะ?"
10001105-29 = "อ้อ! ถ้าจำไม่ได้ก็ไม่จำเป็นต้องนึกขึ้นมาหรอกนะ ไม่เป็นไร!"
10001105-30 = "(เกือบไปแล้วสิ เกือบสารภาพความผิดในสิ่งที่มารินะจำไม่ได้แล้ว!)"
10001105-31 = "...อะแฮ่ม!"
10001105-32 = "งั้นถ้าไม่ใช่เพราะพุดดิ้งกับตุ๊กตาหมี แล้วเธอก่อปฏิวัติทำไมล่ะ?"
10001105-33 = "เอ่อ... คือว่า... ฉันเผลอทำรูปปั้นของท่านประธานเชริโน่แตก..."
10001105-34 = "รูปปั้น? รูปปั้นอะไรเหรอ?"
10001105-35 = "รูปปั้นท่านประธานที่จะเอาไปวางในทางเดินในตึกใหม่น่ะค่ะ เดือนที่แล้วเราทำรูปปั้น#nในท่าทางที่เคร่งขรึมของท่านประธานเพื่อฉลองตึกใหม่ แล้วก็เอาไปตั้งไว้ที่นั่นค่ะ"
10001105-36 = "(มีรูปปั้นของเราอยู่ที่นั่นด้วยเหรอ...? จำไม่ได้เลยแฮะ...)"
10001105-37 = "แต่ว่าตอนรูปปั้นล้ม ส่วนที่แตกดันเป็นหนวด...#nฉันผิดเองที่อำนาจของท่านประธานต้องพังทลายด้วยมือของฉันค่ะ"
10001105-38 = "ถึงฉันจะไม่ได้ตั้งใจ แต่ก็คิดว่าท่านประธานคงไม่ยกโทษให้แน่ๆ ก็เลย..."
10001105-39 = "อะไรกัน? นี่เธอก่อปฏิวัติเพราะเรื่องแค่นี้น่ะเหรอ?"
10001105-40 = "คะ? พูดแบบนี้หมายความว่า..."
10001105-41 = "มารินะ เธอคือหัวหน้าคณะความมั่นคงแห่งสำนักเลขาธิการของสหภาพเรดวินเทอร์#nและเป็นมือขวาที่ซื่อสัตย์ของเรามานานนะ"
10001105-42 = "ถ้าไม่มีหัวหน้าคณะฯ เราคงมาอยู่ในตำแหน่งนี้ไม่ได้ ถึงเราจะมีความสามารถแค่ไหนก็ตาม เทียบกับ#n\nการต้องเสียเธอไป เรื่องหนวดในรูปปั้นแตกถือเป็นเรื่องเล็กๆ ที่เอามาเทียบไม่ได้เลยด้วยซ้ำ"
10001105-43 = "เราใจกว้างกว่าที่เธอคิดนะ เราไม่ลงโทษเธอเพราะเรื่องเล็กๆ แบบนั้นหรอก ฮ่ะฮ่ะฮ่า!"
10001105-44 = "ท่านประธาน...!"
10001105-46 = "... คิดว่าเราจะพูดแบบเมื่อกี้จริงๆ เรอะ!"
10001105-48 = "หะ... หา??"
10001105-49 = "รู้ไหมว่าเราต้องออกไปลำบากมากแค่ไหน? นอนกลางวันก็ไม่ได้นอน ของว่างก็ไม่ได้กินอีก!#nแถมยังโดนพวกนักเรียนดูถูกว่าเป็นเด็กตัวกะเปี๊ยกด้วย!"
10001105-50 = "ถึงเราจะไม่สนใจเรื่องหนวดที่รูปปั้น แต่เรื่องที่เธอมาก่อการปฏิวัติแบบนี้เรายกโทษให้ไม่ได้!"
10001105-51 = "ทะ.. ท่านประธานเชริโน่! ยกโทษให้ฉันสักครั้งเถอะค่ะ!"
10001105-52 = "ไม่ได้! เรื่องนี้เรายกโทษให้ไม่ได้เด็ดขาด!"
10001105-53 = "โทโมเอะ เอาตัวมารินะกับพรรคพวกไป แล้วลงโทษขัดห้องน้ำเป็นเวลา 1 เดือน!"
10001105-57 = "เริ่มพาเหรดการลงโทษได้!"
10001105-59 = "1 สัปดาห์หลังจากเกิดเรื่อง วันงานเทศกาลอีวาน คูปาลา"
10001105-61 = "ประตูหน้า สหภาพเรดวินเทอร์"
10001105-63 = "เชิญค่ะคุณครู"
10001105-64 = "ประธานเชริโน่กำลังรออยู่ข้างในค่ะ"
10001105-65 = "เชิญทางนี้ค่ะ..."
10001105-68 = "สำนักงานประธานสหภาพเรดวินเทอร์"
10001105-69 = "ฮุฮุฮุ... เข้ามาสิสหาย#nสุขสันต์วันอีวาน คูปาลา!"
10001105-70 = "[s] \"สุขสันต์วันอีวาน คูปาลานะเชริโน่\""
10001105-71 = "เราปลื้มใจมากที่ได้ใช้เวลาในเทศกาลที่น่ายินดีของสหภาพเรดวินเทอร์กับสหาย"
10001105-72 = "เดิมทีแล้วเราไม่อนุญาตให้คนนอกเข้ามาเที่ยวเทศกาลอีวาน คูปาลาหรอกนะ..."
10001105-73 = "แต่ฉันติดหนี้สหายตั้งแต่เหตุการณ์ครั้งที่แล้ว ก็เลยใช้สิทธิของประธานสภานักเรียน#nในการเชิญสหายมาเป็นพิเศษ ถือเป็นความภาคภูมิใจในชีวิตได้เลยนะ! ฮ่ะฮ่ะฮ่า!"
10001105-74 = "จริงสิสหาย จะว่าไปแล้ว...#nเห็นความเปลี่ยนแปลงอะไรใน 1 สัปดาห์ที่ผ่านมาบ้างไหม?"
10001105-75 = "[s] \"โรงเรียนดูสะอาดขึ้นนะ\""
10001105-76 = "อืมม นั่นเป็นเพราะมารินะและสมาชิกคณะความมั่นคงทำความสะอาดโรงเรียนอยู่ในทุกวัน"
10001105-77 = "ตอนแรกเราจะให้ทำความสะอาดห้องน้ำอย่างเดียว#nแต่พวกเขาดูมีพรสวรรค์ด้านการทำความสะอาดกว่าที่คิด"
10001105-78 = "ถ้าขืนปล่อยไว้แบบนี้ สักวันตำแหน่งหัวหน้าฝ่ายทำความสะอาดของเราต้องโดนยึดไปแน่เลย"
10001105-79 = "เดี๋ยวสิ... เราไม่ได้ถามถึงความเปลี่ยนแปลงในโรงเรียนสักหน่อย!#nไม่เห็นความเปลี่ยนแปลงอะไรบนตัวเราบ้างเลยเหรอ?"
10001105-80 = "[s] \"เชริโน่ดูสูงขึ้นกว่าที่เห็นครั้งล่าสุดนะ\""
10001105-81 = "จะ.. จะ.. จริงเหรอสหาย!?"
10001105-82 = "ไปเอาสายวัดตัวมาเร็วเข้า! เราต้องวัดส่วนสูงดูแล้วล่ะ!"
10001105-86 = "อะไรกัน... ไม่เห็นจะสูงขึ้นมาเลย นี่สหายล้อเราเล่นงั้นเหรอ?"
10001105-87 = "ถึงสหายจะเป็นถึงครูจากชาเล่ต์ แต่ก็ไม่มีสิทธิ์มาแกล้งท่านเชริโน่ผู้ยิ่งใหญ่นะ!"
10001105-88 = "ฮึ่มม! แม้ความสูงจะเป็นเรื่องสำคัญก็เถอะ..."
10001105-89 = "ความเปลี่ยนแปลงที่เราอยากพูดถึงก็คือการเปลี่ยนแปลงภายในต่างหาก"
10001105-90 = "การต้องไปตกอยู่ในความวุ่นวายที่ผ่านมาทำให้เราได้รู้ถึงความลำบากใจ#nของนักเรียนในสหภาพเรดวินเทอร์ที่เราไม่เคยรู้มาก่อน"
10001105-91 = "โทโมเอะบอกว่าการที่เราลงไปรับฟังความลำบากของนักเรียน เข้าอกเข้าใจคนที่เจอปัญหา#nแล้วสัญญาว่าจะหาวิธีแก้ปัญหาไปด้วยกัน มันเหมือนกับว่าได้เห็นเราในร่างของครูเลย..."
10001105-92 = "แต่งานของครูคืองานของผู้ใหญ่! เป็นงานยากที่นักเรียนธรรมดาทั่วไปทำไม่ได้!"
10001105-93 = "และนี่หมายความว่าเราได้ก้าวผ่านความวุ่นวาย และขึ้นบันไดสู่ความเป็นผู้ใหญ่#nที่เราเองก็ไม่รู้เลยว่ามีอยู่ก่อนจะเกิดเรื่องต่างๆ ขึ้น"
10001105-94 = "ว่าไงล่ะสหาย? สัมผัสได้ถึงเสน่ห์ของผู้ใหญ่จากเราหรือยัง? ฮุฮุฮุ.....!"
10001105-95 = "[s] \"รักษาสัญญาที่ทำไว้กับนักเรียนหมดหรือยังล่ะ?\""
10001105-96 = "อะ... อ่อ...? สะ... สัญญาน่ะเหรอ?"
10001105-97 = "ตอนนี้การไปบุกสถาบันเกเฮนน่าและสถาบันทรีนิตี้ยังเป็นเรื่องยากอยู่..."
10001105-98 = "แถมพวกนักเรียนจากห้องเรียนพิเศษก็ยังเรียกเราว่าเด็กตัวกะเปี๊ยกด้วย!#nเราปล่อยให้พวกนั้นทำแบบนี้ไม่ได้!"
10001105-99 = "เลื่อนการรักษาสัญญาออกไปก่อน! ขออยู่แบบนี้ไปสักระยะก่อนแล้วกัน!"
10001105-100 = "เอาเถอะสหาย ไหนๆ วันนี้เราก็มีเวลาแล้ว เราไปเที่ยวงาน..."
10001105-103 = "ท่านประธานเชริโน่! เกิดเรื่องใหญ่แล้วค่ะ!"
10001105-104 = "มีเรื่องอะไร หัวหน้าเลขานุการโทโมเอะ? เราบอกไว้แล้วไม่ใช่เหรอว่าอย่ารบกวนตอนกำลังคุยกับสหาย!"
10001105-105 = "พวกนักเรียนจาก <อาคารเรียนเก่า ห้องพิเศษ 227> กำลังบุกมาที่สำนักเลขาธิการ#nเพราะต้องการให้เรารักษาสัญญาที่ทำไว้ค่ะ!"
10001105-106 = "แถมยังมีนักเรียนจาก <ชมรมแนวร่วมปลดปล่อยความรู้> และ <ชมรมผู้รับจ้าง> แห่กันมาด้วย..."
10001105-107 = "ว่าไงนะ? คนพวกนี้ไม่มีความอดทนเอาเสียเลย! เราเพิ่งจบเรื่องวุ่นวายไปไม่กี่วันเอง#nนี่เกิดการปฏิวัติอีกแล้วเหรอ? เทศกาลยังไม่ทันได้จบเลยด้วย!"
10001105-108 = "ส่งหัวหน้าคณะฯ มารินะกับกองกำลังป้องกันออกไปจัดการคณะก่อปฏิวัติ!"
10001105-110 = "แต่หัวหน้าคณะฯ มารินะเหน็ดเหนื่อยจากการทำความสะอาดห้องน้ำทั้งคืน...#nตอนนี้เธอไม่พร้อมต่อสู้หรอกค่ะ"
10001105-111 = "แถมสมาชิกกองกำลังป้องกันส่วนใหญ่ก็ถูกไล่ออก ไม่ก็ถูกคุมประพฤติจากการลงโทษครั้งล่าสุด..."
10001105-113 = "อะไรกัน? งั้นเราต้องหนีอีกรอบเหรอ? ทีนี้จะให้ไปที่ไหนล่ะ!?"
10001105-114 = "เราเบื่อกับการถูกปลดแล้วนะะะะ!"
10001105-115 = "ปฏิวัติป่วน อีวาน คูปาลา"

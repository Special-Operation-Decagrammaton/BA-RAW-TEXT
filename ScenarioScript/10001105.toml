10001105-68 = "#place;붉은겨울 학원 회장 집무실"
10001105-69 = "3;체리노;03;후, 후, 후. 어서 오게나. 콤라드. #n멋진 이반 쿠팔라가 되기를!\n#3;em;[음표]\n#3;hophop\n#3;a"
10001105-70 = "[s] \"멋진 이반 쿠팔라가 되기를, 체리노.\""
10001105-71 = "3;체리노;01;붉은겨울 학원의 경사스러운 축제를 이렇게 콤라드와 함께 보낼 수 있다니, 이 몸도 기쁘기 그지없군."
10001105-72 = "3;체리노;99;본래 이반 쿠팔라 축제에는 외부인을 들이지 않는 것이 원칙이지만……"
10001105-73 = "3;체리노;03;콤라드에게는 지난번의 사건 때 큰 실례를 끼쳤으니, 학생회장의 권한으로 그대를 특별 초청한 것이라네. 자랑스럽게 여겨도 좋아! 하하하!\n#3;em;[재잘]\n#3;hophop"
10001105-74 = "3;체리노;01;그래서 말인데, 콤라드. #n일주일 전과 비교하여 무언가 바뀐 것처럼 보이지 않는가?"
10001105-75 = "[s] \"학교가 좀 더 깨끗해진 것 같아.\""
10001105-76 = "3;체리노;02;음, 그야 마리나와 보안위원들이 매일매일 열심히 학교를 청소하고 있기 때문이지.\n#3;em;[반응]"
10001105-77 = "3;체리노;01;처음에는 화장실 청소만 맡기려고 했는데, 생각보다 청소에 탁월한 재능을 보여서 말이야."
10001105-78 = "3;체리노;99;이대로 가다가는 청소부장의 직위를 빼앗기게 될까 두려울 정도라네."
10001105-79 = "3;체리노;05;……아니, 학교의 모습이 아니라! #n이 몸에게 바뀐 점이 없냐고 물은 것이네!\n#3;hophop"
10001105-80 = "[s] \"체리노의 키가 좀 더 큰 것 같아.\""
10001105-81 = "3;체리노;02;그, 그, 그게 정말인가? 콤라드!\n#3;em;[///]\n#3;stiff"
10001105-82 = "3;체리노;01;키재기용 줄자를 가져오게! 당장 키를 재봐야겠어!"
10001105-83 = "3;체리노;01\n#3;m4\n#wait;1000"
10001105-84 = "#wait;1000"
10001105-85 = "3;체리노;02\n#3;em;…\n#wait;2500"
10001105-86 = "3;체리노;05;……뭐야, 조금도 자라지 않았잖나. #n지금 나를 놀리는 겐가, 콤라드!\n#3;stiff\n#3;em;[빠직]"
10001105-87 = "3;체리노;05;콤라드가 아무리 샬레의 선생이라고는 하지만, 이 위대하신 체리노 님을 놀리는 것은 허락되지 않는다고!\n#3;hophop\n#3;m3"
10001105-88 = "3;체리노;99;흠흠! 물론 키가 자라는 것도 중요하지만……\n#3;stiff"
10001105-89 = "3;체리노;01;내가 처음에 말하려고 했던 변화는 바로 내면의 변화를 말하는 것이었네.\n#3;em;[반응]"
10001105-90 = "3;체리노;01;지난번의 소동을 거치며 이 몸은 그동안 알지 못했던 붉은겨울 학원 학생들의 고충에 귀를 기울이게 되었지."
10001105-91 = "3;체리노;99;토모에 비서실장의 말에 의하면 학생들의 고충을 들어주고, 공감하며, 해결책을 약속하는 이 몸의 모습은 마치 선생과도 같았다고 한다…….\n#3;em;…"
10001105-92 = "3;체리노;01;선생의 일이란, 어른의 일! 평범한 학생 따위가 수행할 수 없는 어려운 일이지!"
10001105-93 = "3;체리노;01;그 말인즉, 이 몸은 지난 소동을 거치며 그전까지는 경험해 보지 못한 어른의 계단을 올랐다는 뜻이다!"
10001105-94 = "3;체리노;03;어떤가, 콤라드. 전과는 달리 이 몸에게서 어른의 매력이 느껴지지 않는가? 후후후……!\n#3;em;[재잘]\n#3;hophop"
10001105-95 = "[s] \"그때 다른 학생들에게 했던 약속들은 모두 지켰어?\""
10001105-96 = "3;체리노;02;어, 어……? 야, 약속들 말인가?"
10001105-97 = "3;체리노;04;그게…… 당장 게헨나 학원과 트리니티 학원을 공격하는 건 어려운 데다가……\n#3;stiff\n#3;em;[땀]"
10001105-98 = "3;체리노;01;게다가 특별반의 학생들은 계속 나를 꼬맹이라고 부르지 않았나! #n괘씸죄를 물어서라도 당장 복권시켜줄 수는 없어!"
10001105-99 = "3;체리노;05;약속은 보류다! 당분간은 이대로 현상 유지이니라!\n#3;hophop"
10001105-100 = "3;체리노;02;여하튼, 콤라드. 오늘은 시간도 충분하니 나와 함께 오붓이—"
10001105-101 = "#wait;1500"
10001105-102 = "5;토모에;06\n#5;al\n#3;m1\n#wait;1000"
10001105-103 = "5;토모에;04;체리노 회장님, 큰일입니다!\n#5;em;[!]"
10001105-104 = "3;체리노;05;뭔가, 토모에 총비서실장. #n콤라드와 단둘이 이야기할 때는 방해하지 말라고 했을 텐데!\n#3;em;[빠직]\n#3;stiff"
10001105-105 = "5;토모에;06;그게…… <구교사 227호 특별반>의 학생들이 지난번의 약속을 지키라며 사무국으로 몰려들고 있습니다!\n#5;em;[속상함]"
10001105-106 = "5;토모에;06;그뿐만이 아니라 <지식해방전선>과 <용역부>의 학생들도 함께……."
10001105-107 = "3;체리노;05;뭐라고? 이 참을성도 없는 녀석들 같으니라고! #n소동이 마무리된 지 얼마나 지났다고 축제가 끝나기도 전에 새로운 쿠데타라니!"
10001105-108 = "3;체리노;01;마리나 보안위원장과 친위대를 내보내 쿠데타를 진압하도록 해라!\n#3;hophop"

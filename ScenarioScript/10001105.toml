[translation]
10001105-1 = "Episode 10;Red Winter Academy's Revolutionary Holiday"
10001105-2 = "Red Winter Academy Secretariat"
10001105-3 = "We came, we saw, and we conquered!"
10001105-4 = "Comrade and Tomoe, did you see that? Did you see how brilliantly I led everyone to victory?"
10001105-5 = "Of course. You performed exceptionally, President Cherino!"
10001105-6 = "I'm sure tales of you rallying students of different walks of life to defeat the vile usurpers will live in the hearts of Red Winter students for years to come."
10001105-7 = "How about we have a painter to capture this moment of valor so the next generation can experience it for themselves?"
10001105-8 = "Hmm, an excellent idea, Chief Secretary Tomoe! Go ahead and get on that!"
10001105-9 = "[s] \"But you were just screaming the whole time...\""
10001105-10 = "That was merely your impression, Comrade! Those were valiant battle cries to swell the students' morale!"
10001105-11 = "If all you heard was a little girl screaming, you should get your ears checked!"
10001105-12 = "Ahhh... It's nice to be back at the secretariat."
10001105-13 = "The cupboard is packed with snacks, and the chair is nice and comfy. I'm exactly where I belong, the top office!"
10001105-14 = "I'm going to spend the rest of the day sitting in this chair and eating potato chips, not moving a muscle!"
10001105-16 = "But before I rest...let's hear your excuse for staging this coup, \"Chairman\" Marina."
10001105-19 = "*gulp*"
10001105-21 = "You were a trusted comrade, Marina. How dare you take advantage of my nap to stage a coup?!"
10001105-22 = "You've committed an unforgivable crime!"
10001105-23 = "I'm so ashamed, President Cherino..."
10001105-24 = "Hmph!"
10001105-25 = "Out with it. Why did you betray me?"
10001105-26 = "...Were you mad because I stole your pudding?"
10001105-27 = "Or maybe because I drooled on your favorite teddy bear...?"
10001105-28 = "Pudding? Drool? What are you talking about...?"
10001105-29 = "P-Purely hypothetical possibilities, th-that's all! "
10001105-30 = "(Phew! I almost confessed for stuff she didn't even know I did!)"
10001105-31 = "Ahem!"
10001105-32 = "So if it wasn't one of those...hypotheticals, then why did you overthrow me?"
10001105-33 = "Well, it's just...I accidentally broke your statue and—"
10001105-34 = "Statue? What statue?"
10001105-35 = "The bust of you in the new building's hallway. The statue was made to commemorate the building's opening last month."
10001105-36 = "(Wait, really? I guess I might have heard something about that...)"
10001105-37 = "I accidentally bumped into the statue and its mustache broke off... Your authority was tarnished because of my negligence."
10001105-38 = "Even though it wasn't on purpose, I knew there was no chance of forgiveness, so I—"
10001105-39 = "Wait! Was that really the only reason?"
10001105-40 = "Huh? Does that mean...?"
10001105-41 = "Marina, you've been my right hand as the security chairman for such a long time."
10001105-42 = "No matter how talented I am, I never would have made it to where I am today without you. Losing a stone mustache is nothing compared to losing you."
10001105-43 = "I'm far too merciful to punish you for something like that..."
10001105-44 = "President!"
10001105-46 = "...That's what you were hoping I would say, RIGHT?!"
10001105-48 = "Wh-What the...?"
10001105-49 = "Do you have any idea how much I suffered because of you? No nap! No snacks! The students all made fun of me and called me a little brat!"
10001105-50 = "I couldn't care less about some measly mustache, but I'm never going to let you live down inciting this coup!"
10001105-51 = "P-President Cherino! Please forgive me, just this once!"
10001105-52 = "Denied! Never forgive! Never forget!"
10001105-53 = "Tomoe! Take Marina and her followers and make them clean the bathrooms for a month!"
10001105-57 = "Let the punishment rain down like hellfire!"
10001105-59 = "One week later, on the day of the Ivan Kupala Festival..."
10001105-61 = "Red Winter Academy Main Gate"
10001105-63 = "Welcome, Sensei."
10001105-64 = "President Cherino is waiting inside."
10001105-65 = "If you'd please follow me..."
10001105-68 = "Red Winter Academy Presidential Office"
10001105-69 = "Hahaha! Welcome, Comrade. Happy Ivan Kupala!"
10001105-70 = "[s] \"Happy Ivan Kupala, Cherino.\""
10001105-71 = "Getting to spend Red Winter Academy's festival with you makes me really happy, Comrade."
10001105-72 = "Normally, outsiders wouldn't be allowed in during the festival. "
10001105-73 = "However, in light of your immaculate service last time, I've granted you a special invite. You should feel quite honored, Comrade!"
10001105-74 = "Tell me, does anything about the school seem different than it was a week ago?"
10001105-75 = "[s] \"The campus is looking a bit cleaner.\""
10001105-76 = "Oh, that? Marina and her goons have been cleaning the school every day."
10001105-77 = "I'd planned on having them just do the bathrooms, but as it turns out, they're a really good cleaning crew!"
10001105-78 = "At this rate, my title of Chief of Sanitation may be in jeopardy."
10001105-79 = "But enough about that, I wasn't talking about the school! I meant have you noticed anything different about me!"
10001105-80 = "[s] \"Did you get taller?\""
10001105-81 = "Wait, r-really? Are you serious right now, Comrade?"
10001105-82 = "Where's my measuring tape?! I need to check immediately!"
10001105-86 = "What's the meaning of this? I didn't grow at all! Are you making fun of me, Comrade?!"
10001105-87 = "I don't care if you're from Schale, teasing me will not be tolerated!"
10001105-88 = "Ahem! Yes, a height gain would be nice."
10001105-89 = "But I was talking about an inner change."
10001105-90 = "Since the coup, I've made a point to listen to my students' concerns."
10001105-91 = "Chief Secretary Tomoe said that when I listened to the students, empathized with them, and promised to find a solution, I reminded her of you..."
10001105-92 = "Think about it! You're a grown-up, so you can do stuff us students can only hope to do someday!"
10001105-93 = "If I remind Tomoe of you, that means I've ascended to a new level of greatness!"
10001105-94 = "So what do you think, Comrade? Are you taken aback at my newfound maturity?"
10001105-95 = "[s] \"Have you kept all the promises you made to the students?\""
10001105-96 = "Uh, what...? Which promises are we talking about?"
10001105-97 = "Oh, those promises... Um... Well, we can't really launch an offensive on Gehenna or Trinity right now..."
10001105-98 = "Besides, those Spec Ops students kept calling me a little brat! I can't let them get away with that!"
10001105-99 = "Those promises are on hold until further notice! Things will stay exactly as they are for now!"
10001105-100 = "Enough of that. You and I have plenty of time to enjoy the festival today, Comrade. Why don't we—"
10001105-103 = "Ch-Cherino! We have an emergency!"
10001105-104 = "What is it now, Chief Secretary Tomoe? I told you not to interrupt me and Comrade!"
10001105-105 = "Th-The students from Spec Ops No. 227 are storming the secretariat, demanding that you uphold your promise!"
10001105-106 = "But it's not just them. The Knowledge Liberation Front and Labor Party are also with them..."
10001105-107 = "Huuuh?! They're so impatient! The festival isn't even over, and we have another coup to deal with already?!"
10001105-108 = "Deploy Security Chairman Marina and the State Guard to handle the coup!"
10001105-110 = "But Chairman Marina is exhausted from cleaning the bathrooms all night... She's in no condition to fight."
10001105-111 = "And most of the State Guard were either dismissed or put on probation following the last coup..."
10001105-113 = "N-No way! Are you saying I have to run away again? Where am I supposed to go this time?!"
10001105-114 = "I'm sick and tired of coups!"
10001105-115 = "A Revolutionary Ivan Kupala"

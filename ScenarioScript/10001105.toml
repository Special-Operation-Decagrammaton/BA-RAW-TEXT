[translation]
10001105-1 = "#title;제10화;붉은겨울 학원의 혁명적 휴일"
10001105-2 = "#place;붉은겨울 학원 사무국"
10001105-3 = "3;체리노;03;왔노라, 보았노라, 이겼노라!\n#3;em;[재잘]\n#3;hophop\n#3;a"
10001105-4 = "3;체리노;03;보았느냐, 토모에, 콤라드? 이 몸이 완벽한 작전으로 적을 분쇄하는 모습을!"
10001105-5 = "1;토모에;03;네. 정말 완벽한 지휘였습니다, 체리노 회장님!\n#1;em;[반짝]\n#1;ar\n#3;m5"
10001105-6 = "1;토모에;01;각기 다른 소속의 학생들을 규합하여 적진을 향해 나아가는 체리노 회장님의 모습은 분명 학생들의 심상에 깊이 아로새겨져 붉은겨울 학원의 역사에 길이길이 구전되겠지요."
10001105-7 = "1;토모에;03;아니, 이럴 게 아니라 후대의 학생들도 그 모습을 눈으로 볼 수 있도록 화가를 불러 기록화를 그리게 할까요?\n#1;em;[하트]"
10001105-8 = "3;체리노;01;음. 좋은 생각이다, 토모에 총비서실장! 바로 진행하도록!\n#3;em;[반응]"
10001105-9 = "[s] \"내가 보기에는 막무가내로 소리만 지르는 것처럼 보였는데…….\""
10001105-10 = "3;체리노;05;그게 무슨 망언인가, 콤라드! #n그것은 학생들의 사기를 돋우기 위한 용맹한 전장의 함성이었느니라! 워 크라이—라고!\n#3;stiff\n#3;em;[빠직]"
10001105-11 = "3;체리노;01;그 목소리가 어린아이의 투정처럼 들렸더라면 당장 병원에 가서 귀 치료를 받고 오게나. 그대의 귀에 문제가 있는 게 분명하니!"
10001105-12 = "3;체리노;99;하아…… 어찌 되었든 간에 사무국에 다시 돌아오니 좋구나.\n#3;m3\n#1;dl"
10001105-13 = "3;체리노;03;찬장에는 간식이 가득하고, 옥좌는 푹신하니, 집에 돌아온 것처럼 마음이 편안해……. 역시 이 몸의 집무실이라면 이 정도는 되어야지!\n#3;em;[음표]\n#3;hophop"
10001105-14 = "3;체리노;03;오늘 남은 하루는 이 옥좌에 눌러앉아 감자칩을 먹으며 한 발자국도 움직이지 않을 테다!"
10001105-15 = "3;체리노;03\n#3;em;…\n#wait;2500"
10001105-16 = "3;체리노;01;그전에…… 어디 한 번 쿠데타에 대한 변명을 들어보도록 할까, 마리나 위원장?\n#3;em;[반응]"
10001105-17 = "3;체리노;01\n#3;d\n#wait;1000"
10001105-18 = "#all;hide"
10001105-19 = "3;마리나;08;으윽…….\n#3;em;[속상함]\n#3;stiff\n#3;a"
10001105-20 = "#wait;2500"
10001105-21 = "1;체리노;01;마리나. 내가 그동안 그대를 얼마나 아끼고 신뢰했었는데, 감히 이 몸의 낮잠 시간을 틈타 쿠데타를 일으키다니! \n#1;ar\n#3;m5"
10001105-22 = "1;체리노;05;용서할 수 없어!\n#1;em;[빠직]\n#1;stiff"
10001105-23 = "3;마리나;06;면목 없습니다, 체리노 회장님…….\n#3;em;[땀]"
10001105-24 = "1;체리노;99;흠, 흠!"
10001105-25 = "1;체리노;01;그래서, 이 몸에게 반기를 들고 일어난 진짜 이유가 뭐지?"
10001105-26 = "1;체리노;02;……역시 내가 그때 마리나의 푸딩을 몰래 훔쳐먹은 것 때문에 화가 난 거야?\n#1;em;[반응]"
10001105-27 = "1;체리노;02;아니면 마리나가 아끼는 곰인형을 몰래 베고 자서……?"
10001105-28 = "3;마리나;04;푸딩과 곰인형이요? 그게 무슨 말씀이신지……?\n#3;em;[?]"
10001105-29 = "1;체리노;04;기, 기억나지 않으면 떠올리지 않아도 괜찮느니라!\n#1;em;[?!]\n#1;shake"
10001105-30 = "1;체리노;06;(시, 실수할 뻔했네. 하마터면 마리나가 기억하지도 못하는 잘못을 내 입으로 먼저 실토할 뻔했어!)"
10001105-31 = "1;체리노;99;……엣헴!\n#1;stiff"
10001105-32 = "1;체리노;01;그럼 푸딩도 곰인형도 아니라면 무슨 이유 때문에 쿠데타를 일으킨 거지?"
10001105-33 = "3;마리나;06;저, 그게…… 사실은 체리노 회장님의 석상을 실수로 깨트려서…….\n#3;em;…"
10001105-34 = "1;체리노;02;석상? 무슨 석상?\n#1;em;[?]"
10001105-35 = "3;마리나;08;신관 복도에 있는 회장님의 석상 말입니다. 지난달 신관 증축을 기념하여 체리노 회장님의 근엄한 모습을 석상으로 만들어 그곳에 설치했었지요."
10001105-36 = "1;체리노;02;(그, 그런 석상이 거기에 있었던가……? 기억이 나는 것 같기도 하고…….)"
10001105-37 = "3;마리나;06;그런데 실수로 그 석상에 부딪혀서 얼굴의 수염 부분이 깨져 나가는 바람에…… 회장님의 권위를 제 손으로 실추시키고 말았습니다.\n#3;em;[땀]\n#3;stiff"
10001105-38 = "3;마리나;04;고의가 아니었다고는 하지만, 분명 회장님께 용서받지 못할 거라 생각해서, 그만……"
10001105-39 = "1;체리노;99;뭐야. 겨우 그런 것 때문에 쿠데타를 일으킨 건가."
10001105-40 = "3;마리나;04;네? 그 말씀은…….\n#3;em;[?]"
10001105-41 = "1;체리노;01;마리나, 그대는 붉은겨울 학원 사무국의 보안위원장이자, 이 몸의 충실한 오른팔으로 그동안 수많은 일을 해왔었네."
10001105-42 = "1;체리노;01;위원장이 없었더라면 아무리 이 몸이 유능하다 하더라도 지금의 자리까지는 오를 수 없었겠지. 그대를 잃는 것에 비하면 석상의 수염이 깨지는 건 사소한 문제라네."
10001105-43 = "1;체리노;03;이 몸은 관대하니까— 그런 사소한 일로 숙청 따위는 하지 않는다고. 하하하!\n#1;em;[음표]\n#1;hophop"
10001105-44 = "3;마리나;09;회장님……!\n#3;em;[반짝]"
10001105-45 = "#all;hide"
10001105-46 = "3;체리노;05;……라고 말할 줄 알았냐!\n#3;h\n#3;closeup\n#3;shake"
10001105-47 = "#all;hide"
10001105-48 = "1;체리노;05\n5;마리나;12;우, 우앗?\n#5;em;[?!]\n#5;shake"
10001105-49 = "1;체리노;01;너 때문에 내가 얼마나 고생한 줄 알아? 낮잠도 제대로 못 자고, 간식도 제대로 못 먹고! 학생들에게는 꼬맹이라고 무시당하기만 하고!"
10001105-50 = "1;체리노;05;석상의 콧수염은 아무래도 상관없지만, 쿠데타를 일으킨 죄는 절대로 용서할 수 없어!\n#1;em;[빠직]\n#1;stiff"
10001105-51 = "5;마리나;08;체, 체리노 회장님! 제발 한 번만 용서를!\n#5;stiff"
10001105-52 = "1;체리노;05;안 돼! 이번 일은 절대로 용서 못 해!\n#1;hophop"
10001105-53 = "1;체리노;01;토모에, 지금 당장 마리나와 그 일당을 끌고 가 화장실 청소 한 달 형에 처하도록!\n#1;em;[반응]"
10001105-54 = "#st;[0,0];instant;1;"
10001105-55 = "#clearST"
10001105-56 = "1;체리노;99\n#1;m3\n#5;dr\n#1;em;…\n#wait;2500"
10001105-57 = "1;체리노;05;숙청 퍼레이드, 개시다!\n#1;em;[!]\n#1;closeup"
10001105-58 = "#all;hide"
10001105-59 = "#na;사건이 벌어지고 일주일 뒤. 이반 쿠팔라 축제 당일."
10001105-60 = "#all;hide"

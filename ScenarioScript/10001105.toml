10001105-63 = "3;토모에;03;어서 오십시오, 선생님.\n#3;em;[반짝]"
10001105-64 = "3;토모에;01;체리노 회장께서 안에서 기다리고 계십니다."
10001105-65 = "3;토모에;99;이쪽으로…….\n#3;greeting"
10001105-66 = "#wait;1000"

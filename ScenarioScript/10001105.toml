[translation]
10001105-1 = "第10話;革命再起的伊凡．庫帕拉"
10001105-2 = "赤冬聯邦學園．事務局"
10001105-3 = "我來，我見，我征服！"
10001105-4 = "智惠、同志！看到了嗎？咱以完美的作戰粉碎敵人的英姿！"
10001105-5 = "是。真是無以倫比的指揮，潔莉諾會長！"
10001105-6 = "潔莉諾會長團結了不同所屬的學生，朝著敵陣大步邁進的模樣……#n一定會深深刻印在學生們的心中，作為赤冬聯邦學園歷史上的一頁永遠流傳下去。"
10001105-7 = "機會難得，為了讓後世的學生們也能一睹風采，何不找藝術家來畫張戰爭圖呢？"
10001105-8 = "哼呣。好主意啊，智惠秘書室長！立刻執行！"
10001105-9 = "[s]「那個，不就只是隨便亂喊嗎……？」"
10001105-10 = "你那是什麼話，同志！#n那是為了提振士氣的勇猛吶喊！是「戰吼」！"
10001105-11 = "如果覺得聽起來像是傻孩子的哭聲，那肯定是你耳朵有問題！馬上去醫院接受治療！"
10001105-12 = "呼嗚……總之，能再次回到事務局真是太好了。"
10001105-13 = "架子上擺滿了零食，軟綿綿的寶座，感覺就像回到家一樣踏實……#n咱的辦公室果然就應該像這個樣子！"
10001105-14 = "今天剩下的時間，咱要坐在這個寶座上舒舒服服地吃洋芋片，哪裡也不去！"
10001105-16 = "在那之前……先來聽聽你發動政變的理由吧？瑪麗娜委員長？"
10001105-19 = "唔唔……"
10001105-21 = "瑪麗娜，咱是多麼重視你、信任你……沒想到你卻瞄準了咱睡午覺的時間發動政變！"
10001105-22 = "不可原諒！"
10001105-23 = "我無顏以對，潔莉諾會長……"
10001105-24 = "嗯，嗯！"
10001105-25 = "所以，你背叛咱的真正原因為何？"
10001105-26 = "……果然是因為咱那時偷吃了瑪麗娜的布丁，所以生氣了？"
10001105-27 = "還是因為咱偷偷用你心愛的熊娃娃當枕頭……？"
10001105-28 = "……布丁？熊娃娃？什麼意思……？"
10001105-29 = "想，想不起來的話就算了！"
10001105-30 = "（好，好險。差點把瑪麗娜不記得的事情說溜嘴！）"
10001105-31 = "……咳哼！"
10001105-32 = "如果不是因為布丁或熊娃娃的話，到底有什麼理由要發動政變呢？"
10001105-33 = "那個，其實是……我不小心摔破了潔莉諾會長的石像……"
10001105-34 = "石像？什麼石像？"
10001105-35 = "是新館走廊上的會長石像。#n上個月，為了紀念擴建新館，製作了一尊潔莉諾會長莊嚴面貌的石像並設置在那裡。"
10001105-36 = "（有那種石像嗎……？感覺好像有又好像沒有……？）"
10001105-37 = "因為失手撞到石像，石像臉上的鬍子部分碎了……是我的這雙手使會長的權威掃地。"
10001105-38 = "雖然說不是故意的，但會長肯定不會原諒這種錯誤，所以就……"
10001105-39 = "什麼嘛，就為了那種理由發動政變嗎？"
10001105-40 = "咦？那種理由的意思……"
10001105-41 = "瑪麗娜，你是赤冬聯邦學園事務局的保安委員長，#n作為咱最忠實的左右手，一直以來做了許多工作。"
10001105-42 = "就算咱再怎麼能幹，如果沒有你，也爬不到現在這個位置。#n比起失去你，石像的鬍子碎裂不過是小問題罷了。"
10001105-43 = "咱的心胸可是很寬厚的──才不會因為那種雞毛蒜皮小事就肅清人呢。哈哈哈哈哈！"
10001105-44 = "會長……！"
10001105-46 = "……你以為咱會這麼說嗎！"
10001105-48 = "咦，嗚哇！？"
10001105-49 = "你知道因為你，咱這段時間吃了多少苦嗎？#n不能睡午覺，點心也沒得吃！還被其他學生叫小毛頭跟無視！"
10001105-50 = "石像的事無所謂，但發動政變就是不可原諒！"
10001105-51 = "潔，潔莉諾會長！請原諒我！"
10001105-52 = "不！絕對不原諒你！"
10001105-53 = "智惠，現在立刻把瑪麗娜和其同夥拉出去，處以一個月的打掃廁所之刑！"
10001105-57 = "那麼，開始肅清大遊行吧！"
10001105-59 = "事件發生一週後，「伊凡．庫帕拉」當日。"
10001105-61 = "赤冬聯邦學園．正門"
10001105-63 = "歡迎回來，老師。"
10001105-64 = "潔莉諾會長正在裡面等您。"
10001105-65 = "請跟我來……"
10001105-68 = "赤冬聯邦學園．會長辦公室"
10001105-69 = "呵呵呵。歡迎光臨，同志。#n今天是完美的慶典之日啊。"
10001105-70 = "[s]「嗯，太好了。」"
10001105-71 = "能和同志一起度過赤冬聯邦學園的節慶，咱也感到相當開心。"
10001105-72 = "本來赤冬聯邦學園是不允許外人參加「伊凡．庫帕拉」的……"
10001105-73 = "但因為之前的事件給同志添了不少麻煩，所以咱特別動用學生會長的權限邀請你來。這可是你的榮幸喔！哈哈哈！"
10001105-74 = "順便問一句，同志。#n和一週前相比，有什麼地方不一樣嗎？"
10001105-75 = "[s]「感覺整個學園好像變漂亮了。」"
10001105-76 = "嗯，那是因為瑪麗娜和保安委員們每天都很認真打掃學校。"
10001105-77 = "本來只打算叫她打掃廁所的，但她在打掃這方面表現出了超乎預期的天賦。"
10001105-78 = "這樣下去恐怕會失去整潔部長的職位，真是令人害怕。"
10001105-79 = "……不對，不是在說學校的樣子！#n咱在問咱是不是有什麼變化！"
10001105-80 = "[s]「感覺長高了一點。」"
10001105-81 = "真，真，真的嗎！？同志！"
10001105-82 = "把捲尺拿來！咱要立刻量身高！"
10001105-86 = "……搞什麼啊，根本沒有變高嘛。#n你是在取笑咱嗎，同志！"
10001105-87 = "就算你是夏萊的老師，取笑偉大的潔莉諾大人也是不允許的！"
10001105-88 = "長高當然也很重要……"
10001105-89 = "咱想講的主要是心境上的變化。"
10001105-90 = "在上次的騷動之後，咱開始傾聽以前一直不太在意的，赤冬聯邦學園學生們的抱怨。"
10001105-91 = "根據智惠秘書室長的說法，咱傾聽、同情學生們的意見並承諾解決方案，#n那幅模樣簡直就像「老師工作時的樣子」……"
10001105-92 = "老師的工作就是大人的工作！是普通的學生很難做到的事！"
10001105-93 = "也就是說，咱歷過那場騷動後，以前所未有的方式登上了大人的階梯！"
10001105-94 = "如何，同志。有沒有感受到從咱內心湧出的大人的魅力啊？呵呵呵……！"
10001105-95 = "[s]「順帶一提，你兌現給學生們的承諾了嗎？」"
10001105-96 = "嗯，嗯……？承，承諾？"
10001105-97 = "那個……現在要立刻對格黑娜學園和三一綜合學園發動攻擊有點困難……"
10001105-98 = "而且那個227號特別班的傢伙在那之後又一直叫咱小毛頭！#n這可是不敬罪，不能馬上允許他們回來！"
10001105-99 = "之前的承諾暫時擱置！暫時維持現狀！"
10001105-100 = "總之，同志。今天時間很充裕，那個，和咱一起──"
10001105-103 = "潔莉諾會長，大事不好了！"
10001105-104 = "……怎麼了，智惠秘書室長？ #n咱不是說過不要打擾咱和同志單獨談話嗎！"
10001105-105 = "那個，是緊急情況……#n舊校舍的「227號特別班」的學生們正闖進事務局，要求您履行之前的承諾！"
10001105-106 = "其中也包含了「知識解放戰線」和「工務部」的學生……"
10001105-107 = "什麼？一群沒耐心的傢伙！#n騷動才剛平息不久，又想在慶典結束前發動下一場政變嗎！"
10001105-108 = "派瑪麗娜保安委員長和親衛隊去鎮壓政變！"
10001105-110 = "那個，瑪麗娜委員長因為徹夜掃廁所累壞了……目前是無法戰鬥的狀態。"
10001105-111 = "大部分的親衛隊員都在上次的肅清中被開除，或是停職反省中……"
10001105-113 = "怎麼，這樣的話……又要逃亡了嗎！？#n好不容易能悠哉悠哉，這次又要咱逃去哪裡！？"
10001105-114 = "已經不想再下台了啦──！"
10001105-115 = "革命的伊凡．庫帕拉"

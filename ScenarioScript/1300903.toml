[translation]
1300903-1 = "椿的修行法：道具篇"
1300903-3 = "[ns1] 「雖然我一收到訊息就來了……」\n[ns2] 「是什麼情況？」"
1300903-4 = "這個……。"
1300903-5 = "這個……。"
1300903-8 = "（椿拿給我的東西是破爛不堪，幾乎沒有棉花的枕頭）"
1300903-9 = "[s] 「……枕頭？」"
1300903-10 = "不是唷，老師。這不是枕頭，而是我們修行部的備品。是正式的修行道具！"
1300903-11 = "這是之前一直在使用的耶，昨天晚上，我去夜間巡邏的時候，稍微用力揮了一下……"
1300903-12 = "明明放在盾牌裡面，卻變得破破爛爛了……"
1300903-13 = "[s] 「原來平常是收在盾牌裡啊……」"
1300903-14 = "修行道具可不能離開身邊吧？"
1300903-15 = "所以說啊，老師，我想要買個新的。"
1300903-16 = "一起去買，好嗎？可以嗎？"
1300903-17 = "[s] 「嗯，好喔。」"
1300903-18 = "呵呵，謝謝你～老師～"
1300903-20 = "百鬼夜行大型商場．PONPOKO"
1300903-22 = "[ns] 「話說回來，你想買怎樣的枕頭？」"
1300903-23 = "老師，不是枕頭，是修行道具。"
1300903-24 = "既然要買新的，我想聽聽老師的意見，哪種比較好？"
1300903-25 = "修行道具的世界是很深奧的～"
1300903-26 = "木枕因為硬度，比較看個人喜好。一旦習慣了這個東西，就會因為太舒服而離開不開它的～"
1300903-27 = "羽毛的那種，一躺上去很快就會進入夢鄉了……"
1300903-28 = "記憶枕那種的話，實在捨棄不了那種「無論何時何地都能支撐住我」的安全感呢～"
1300903-29 = "[s] 「平常一派悠哉的椿，在這方面倒是非常積極……」"
1300903-30 = "唔──嗯，畢竟我是修行部的部長……？"
1300903-31 = "為了讓自己能更精進於修行，修行道具可不能隨便亂挑呢～"
1300903-32 = "好，那麼我們再多逛逛賣場吧。"
1300903-34 = "（和椿一起逛賣場，尋找怎樣的枕……不對）"
1300903-35 = "（持續尋找，怎樣的修行道具比較好）"
1300903-38 = "[ns3] 「這怎樣？能減輕頸部疲勞，」\n[ns4] 「前所未有的低反彈乳膠記憶枕。」"
1300903-39 = "唔──嗯，雖然很不錯……"
1300903-40 = "唔──唔，雖然很不錯……"
1300903-41 = "[s] 「雖然不錯？」"
1300903-42 = "有點……太安全牌了？"
1300903-43 = "老師覺得如何？可以選這個嗎？"
1300903-44 = "[s] 「那種時候可能要先定下優先順序比較好。」"
1300903-45 = "優先順序……？"
1300903-46 = "[s5]「椿的修行，最重要的是什麼？」\n[s6]「還有，椿最想要的是什麼？」"
1300903-47 = "最重要的、最想要的……"
1300903-48 = "最重要的、最想要的……"
1300903-49 = "……唔。"
1300903-50 = "……聽完老師說的話，我好像有點懂了。"
1300903-51 = "那個……因為我是修行部的部長。"
1300903-52 = "為了成為社員們的楷模，我認為我必須更努力修行……"
1300903-53 = "所以，我想要進行無愧它的修行。"
1300903-54 = "[s] 「……那是很重要的事情呢。」"
1300903-55 = "嗯，所以比起就這樣安逸度日……"
1300903-56 = "我是不是該更有挑戰心，嘗試看看前所未有的大膽挑戰呢……？"
1300903-57 = "[s] 「大膽的挑戰……？」"
1300903-58 = "不使用普通的道具……"
1300903-62 = "例如……老師，你看，這個怎麼樣？這是讓人抱著睡覺的那種修行道具。"
1300903-63 = "[s] 「抱著睡的修行道具？」"
1300903-64 = "嗯，雖然體積太大這一點讓我有點介意。"
1300903-65 = "嗯？這裡，詳細欄位寫著「可以印上任何想要的等身插圖」……"
1300903-66 = "嗯──？枕頭……不對，我是說修行道具上為什麼需要印這種東西……？"
1300903-67 = "[s] 「選、選別的吧！」"
1300903-68 = "這不好嗎？"
1300903-69 = "啊，還有這種的，老師。 "
1300903-70 = "這是正面寫著YES、背面寫著NO的修行用具。"
1300903-71 = "[s] 「椿，那個是……！」"
1300903-73 = "鏘。你看，老師。老師有認真在修行嗎？"
1300903-74 = "[s7] 「……YES！」\n[s8] 「NO！NO！」"
1300903-75 = "……？老師，你流了很多汗耶，還好嗎？"
1300903-76 = "……？老師，你流了很多汗耶，還好嗎？"
1300903-77 = "這是在新婚夫妻之間蔚為流行的枕頭？嘿～"
1300903-79 = "啊，老師老師，你看，這個枕頭。可以在戰鬥中使用，是可以拿來當陷阱的佩洛洛枕頭耶。"
1300903-80 = "[s] 「已經不稱呼它為修行用具，完全改叫枕頭啦！？」"
1300903-82 = "老師，你看這個。"
1300903-84 = "啊，老師，還有這個。"
1300903-86 = "（就這樣和椿一起到處尋找各式各樣的修行用具……不，枕頭，找了好一會兒）"
1300903-88 = "[ns] 「結果還沒決定，太陽就下山了。」"
1300903-89 = "嗯，就是說啊……呼啊，嗯……"
1300903-90 = "[s9]「椿，你好像很睏。」\n[s10]「怎麼辦呢，在這裡休息一下？」"
1300903-91 = "嗯，那我就恭敬不如從命……"
1300903-92 = "嗯，那我就恭敬不如從命……"
1300903-93 = "[s] 「耶？那個……椿？」"
1300903-97 = "[s] 「那個……椿醬──？」"
1300903-98 = "嗯──……咕噥咕噥。"
1300903-99 = "……像這樣，躺在老師的膝蓋上，"
1300903-100 = "我好像明白了…… "
1300903-101 = "最棒的枕頭，就在旁邊呢……"
1300903-103 = "[s] 「那，那個──？」"
1300903-104 = "……"
1300903-105 = "[s] 「椿醬──……？」"
1300903-107 = "睏……"
1300903-109 = "（在那之後，直到太陽都下山，我雙腿也痲了，椿都沒有醒來）"

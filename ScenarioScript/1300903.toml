[translation]
1300903-1 = "วิธีฝึกฝนของสึบากิ: ใช้อุปกรณ์"
1300903-3 = "[ns1] \"พอเห็นข้อความ ครูก็รีบมาที่นี่เลย\"\n[ns2] \"อุปกรณ์การฝึกของเธอพังงั้นเหรอ เกิดอะไรขึ้นน่ะ?\""
1300903-4 = "มันพังแล้ว..."
1300903-5 = "มันพังแล้ว..."
1300903-8 = "(สึบากิโชว์หมอนที่ขาดรุ่งริ่งขึ้นมาให้คุณครูดู)"
1300903-9 = "[s] \"...หมอน?\""
1300903-10 = "ไม่ใช่นะคุณครู นี่ไม่ใช่หมอนสักหน่อย อุปกรณ์การฝึกของชมรมฝึกฝนต่างหาก"
1300903-11 = "หมอนนี่เป็นอุปกรณ์การฝึกที่ฉันชอบที่สุดเลย เมื่อคืนฉันคงทำงานหนักมากไปหน่อย#nตอนที่ออกไปลาดตระเวนตอนกลางคืน...."
1300903-12 = "ฉันเอาอุปกรณ์ใส่ไว้ในโล่ เลยทำให้มันได้รับความเสียหายไปด้วย..."
1300903-13 = "[s] \"ปกติเก็บหมอนไว้ในนั้นสินะ...\""
1300903-14 = "อุปกรณ์การฝึกก็ควรเอาไว้ใกล้ๆ ตัวไม่ใช่รึยังไง?"
1300903-15 = "ปัญหาก็คือ... ฉันอยากได้อุปกรณ์การฝึกอันใหม่"
1300903-16 = "คุณครูไปซื้อกับฉันหน่อยได้ไหม? หืม?"
1300903-17 = "[s] \"ก็... ได้อยู่แล้ว\""
1300903-18 = "อื้อ ฮุฮุฮุ ขอบคุณน้า~ คุณครู~"
1300903-20 = "ซูเปอร์มาร์เก็ตปอนโปโกะ เฮียกคิยาโค"
1300903-22 = "[ns] \"แล้วจะซื้อหมอนแบบไหนเหรอ?\""
1300903-23 = "คุณครู บอกแล้วไงว่าไม่ใช่หมอนน่ะ อุปกรณ์การฝึกต่างหาก"
1300903-24 = "ไหนๆ ก็มาด้วยกันแล้ว ฉันจะฟังคำแนะนำของคุณครูก็แล้วกัน"
1300903-25 = "โลกของเครื่องมือการฝึกฝนเป็นสิ่งที่ล้ำลึกมากๆ~"
1300903-26 = "บางคนก็ไม่ค่อยชอบหมอนไม้เพราะมันแข็ง แต่ถ้าใช้จนชินแล้วมันก็หนุนสบายมากเลยน้า~"
1300903-27 = "ส่วนหมอนที่ยัดไส้ขนเป็ดนุ่มๆ น่ะเปรียบเสมือนประตูสู่โลกแห่งความฝันเลย~"
1300903-28 = "ส่วนหมอนที่ทำจากโฟม มันค่อนข้างยืดหยุ่นและรองรับได้ทุกท่วงท่าการฝึกฝน#nเพราะงั้นก็เป็นตัวเลือกที่ไม่เลวน้า~"
1300903-29 = "[s] \"นานๆ จะได้เห็นสึบากิดูสนุกสนานแบบนี้นะ......\""
1300903-30 = "ก็ฉันเป็นหัวหน้าชมรมฝึกฝนนี่นา...?"
1300903-31 = "เพื่อการฝึกฝนที่ดี ฉันจะเลือกอุปกรณ์การฝึกมั่วๆ ไม่ได้สิ~"
1300903-32 = "เอาล่ะ ไปดูที่ร้านกันเถอะ"
1300903-34 = "(จากนั้นคุณครูกับสึบากิก็ไปเดินเลือกซื้อหมอน...ไม่สิ)"
1300903-35 = "(ไปเลือกซื้ออุปกรณ์การฝึกฝนด้วยกัน)"
1300903-38 = "[ns3] \"อันนี้เป็นไง มันช่วยคลายเมื่อยตรงคอได้นะ\"\n[ns4] \"หมอนยางพาราแบบใหม่ที่มีความยืดหยุ่น...\""
1300903-39 = "อืม... ก็ไม่แย่เท่าไหร่แต่ว่า...."
1300903-40 = "อืม... ก็ไม่แย่เท่าไหร่แต่ว่า...."
1300903-41 = "[s] \"แต่ว่า...?\""
1300903-42 = "คือมัน...ไม่เรียบเกินไปเหรอ?"
1300903-43 = "คุณครูคิดว่าใบนี้โอเคไหม?"
1300903-44 = "[s] \"มาลำดับความสำคัญกันก่อนดีกว่านะ สึบากิ\""
1300903-45 = "ลำดับความสำคัญเหรอ~?"
1300903-46 = "[s5] \"สิ่งที่สำคัญที่สุดสำหรับการฝึกฝนคืออะไร?\"\n[s6] \"แล้วเธอคาดหวังอะไรจากอุปกรณ์ฝึกกันล่ะ?\""
1300903-47 = "สิ่งที่สำคัญกับสิ่งที่คาดหวังที่สุดเหรอ...."
1300903-48 = "สิ่งที่สำคัญกับสิ่งที่คาดหวังที่สุดเหรอ...."
1300903-49 = "....(พยักหน้า)"
1300903-50 = "....พอฟังคุณครูพูดแล้ว ฉันก็คิดออกแล้วล่ะ"
1300903-51 = "ก็... ฉันเป็นหัวหน้าชมรมฝึกฝนยังไงล่ะ"
1300903-52 = "ฉันอยากเป็นตัวอย่างให้กับสมาชิกคนอื่นๆ เลยพยายามฝึกฝนอย่างหนัก..."
1300903-53 = "ฉันอยากเป็นคนที่ภาคภูมิใจในตัวเองได้อย่างเต็มที่..."
1300903-54 = "[s] \"นั่นคือสิ่งสำคัญสำหรับสึบากิสินะ\""
1300903-55 = "อื้อ เพราะงั้นแทนที่จะมานั่งขี้เกียจแบบนี้..."
1300903-56 = "ฉันอยากจะลองเจอกับความท้าทายใหม่ๆ หรือสิ่งที่ฉันไม่เคยทำมาก่อน..."
1300903-57 = "[s] \"ความท้าทายใหม่ๆ?\""
1300903-58 = "ฉันไม่อยากได้อุปกรณ์ฝึกแบบธรรมดาๆ..."
1300903-62 = "เอาล่ะคุณครู ใบนี้เป็นยังไงบ้าง? เอาไว้กอดตอนฝึกฝนได้ด้วยนะ"
1300903-63 = "[s] \"อุปกรณ์การฝึกฝนที่ใช้กอดได้?\""
1300903-64 = "อื้อ ถึงมันจะใบใหญ่ไปหน่อยก็เถอะ"
1300903-65 = "มีเขียนเอาไว้ว่า <สามารถพิมพ์รูปที่ต้องการลงไปบนหมอนได้> เอาไว้ด้วยล่ะ..."
1300903-66 = "หืม? ทำไมต้องพิมพ์รูปติดลงบนอุปกรณ์ฝึกด้วยล่ะ....? (เอียงหัว)"
1300903-67 = "[s] \"ปะ...ไปเลือกอันอื่นกันเถอะนะ\""
1300903-68 = "คุณครูไม่ชอบเหรอ~?"
1300903-69 = "คุณครู~ ถ้างั้นอันนี้ล่ะ? "
1300903-70 = "ข้างหน้ามีคำว่า 'YES' ส่วนข้างหลังมีคำว่า 'NO' เอาไว้ด้วยนะ"
1300903-71 = "[s] \"อ๊ะ สึบากิ อันนั้นมัน....!\""
1300903-73 = "แต่นแต๊น~ ดูนี่สิคุณครู... เอ๋? คุณครูกำลังตั้งใจฝึกฝนอยู่งั้นเหรอ?"
1300903-74 = "[s7] \"ชะ...ใช่แล้ว!\"\n[s8] \"มะ...ไม่ใช่!\""
1300903-75 = "หืม? ทำไมคุณครูเหงื่อออกเยอะแบบนั้นล่ะ?"
1300903-76 = "หืม? ทำไมคุณครูเหงื่อออกเยอะแบบนั้นล่ะ?"
1300903-77 = "นี่เป็นหมอนที่ฮิตในหมู่คู่แต่งงานใหม่งั้นเหรอ? เอ๋~ น่าสนใจจังเลย~"
1300903-79 = "ฮ่าฮ่าฮ่า คุณครู~ คุณครู ดูหมอนใบนี้สิ มันเขียนว่าเป็นหมอนเพโรโร่ที่เหมาะกับใช้โยนไป#nในตอนที่เกิดเหตุวิกฤตล่ะ"
1300903-80 = "[s] \"ตอนนี้ยอมเรียกว่าหมอนแทนอุปกรณ์การฝึกฝนแล้วเหรอ?!\""
1300903-82 = "คุณครู ดูนี่สิ"
1300903-84 = "แล้วก็ดูอันนี้สิ"
1300903-86 = "(สึบากิกับคุณครูเดินไปร้านต่างๆ เพื่อเลือกดูอุปกรณ์ฝึกฝน... หรือหมอนอยู่อีกพักใหญ่)"
1300903-88 = "[ns] \"เย็นขนาดนี้แล้ว แต่เรายังไม่ได้หมอนเลยนะ\""
1300903-89 = "อื้อ จริงด้วยนะ ฮ้าวว~ zzZ ...."
1300903-90 = "[s9] \"สึบากิเองก็คงง่วงแล้วสินะ\"\n[s10] \"ไปนอนพักสักหน่อยดีไหม?\""
1300903-91 = "อื้อ... ก็ดีนะ ถ้างั้นฉันขอ..."
1300903-92 = "อื้อ... ก็ดีนะ ถ้างั้นฉันขอ..."
1300903-93 = "[s] \"อ๊ะ เอ่อ... สึบากิ?\""
1300903-97 = "[s] \"คือ...สึบากิจัง?\""
1300903-98 = "อื้อ... ง่ำๆ"
1300903-99 = "ตอนนี้... ฉันขอใช้ตักคุณครูเป็นหมอนก่อนนะ..."
1300903-100 = "รู้แล้วล่ะ... "
1300903-101 = "หมอนที่ดีที่สุดอยู่ข้างๆ ฉันตลอดเวลานี่เอง...."
1300903-103 = "[s] \"คะ... คือว่า\""
1300903-104 = "....."
1300903-105 = "[s] \"สึบากิจัง....?\""
1300903-107 = "คร่อก... zZz"
1300903-109 = "(ไม่นานนักตะวันก็ลับขอบฟ้า และพอถึงเวลาที่สึบากิตื่น คุณครูก็รู้สึกได้ว่าขาของเขาชาไปหมด)"

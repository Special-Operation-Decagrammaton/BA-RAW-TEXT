[translation]
1300903-1 = "Tsubaki's Training: Tools"
1300903-3 = "[ns1] \"I came as soon as I got your text message.\"\n[ns2] \"Something is wrong with your training tool? What happened?\""
1300903-4 = "It's ruined..."
1300903-5 = "It's ruined..."
1300903-8 = "Tsubaki showed me a tattered pillow with all of the stuffing missing."
1300903-9 = "[s] \"...A pillow?\""
1300903-10 = "No, Sensei. It's not a pillow! It's equipment for the Inner Discipline Club. An important training tool."
1300903-11 = "This is one of my favorite items to use. But I think I might have worked too hard last night while I was on patrol..."
1300903-12 = "You see, the training tool inside my shield got all tattered!"
1300903-13 = "[s] \"Is that where you usually keep it?\""
1300903-14 = "You should never lose sight of your training tools!"
1300903-15 = "...The point, Sensei, is that I need to get a new one."
1300903-16 = "Will you come shopping with me? Hm?"
1300903-17 = "[s] \"Well, why not? Sure.\""
1300903-18 = "Great! Thanks, Sensei!"
1300903-20 = "Hyakkiyako Superstore"
1300903-22 = "[ns] \"So what kind of pillow are you planning to buy?\""
1300903-23 = "Sensei. It's not a pillow. It's a piece of equipment."
1300903-24 = "Since you're here, I'd like to hear your opinion on what I should get."
1300903-25 = "Training equipment is much more profound than people realize."
1300903-26 = "Some don't like wooden pillows because they're so hard, but they're actually quite comfortable once you get used to them."
1300903-27 = "Whereas ones filled with goose feathers are a surefire way to a good night's sleep."
1300903-28 = "Memory foam is also worth a look. It's stable enough to provide support in any position at any time—day or night!"
1300903-29 = "[s] \"Wow, Tsubaki, I've never seen you so passionate.\""
1300903-30 = "I am the president of the Inner Discipline Club, aren't I...?"
1300903-31 = "Picking the right equipment is paramount to my training."
1300903-32 = "All right, let's take a look around the store."
1300903-34 = "Tsubaki and I walked around the store and looked for pillows..."
1300903-35 = "...I mean, \"training tools.\""
1300903-38 = "[ns3] \"What about this one? It's supposed to reduce stress on your neck.\"\n[ns4] \"This is a new type of low-resistance latex material.\""
1300903-39 = "Hmm. Not bad, but..."
1300903-40 = "Hmm. Not bad, but..."
1300903-41 = "[s] \"But what?\""
1300903-42 = "Don't you think it's too...plain?"
1300903-43 = "I mean... Do you really think this one is okay?"
1300903-44 = "[s] \"Okay Tsubaki, let's figure out what you want exactly.\""
1300903-45 = "What I want?"
1300903-46 = "[s5] \"What is the most important aspect of your training?\"\n[s6] \"What's the main thing you look for from your training tool?\""
1300903-47 = "What I want is... What's most important..."
1300903-48 = "What I want is... What's most important..."
1300903-49 = "(nod)"
1300903-50 = "...After hearing what you said, I think I've figured it out."
1300903-51 = "I'm the president of the Inner Discipline Club, right?"
1300903-52 = "And if I want to be a role model for the other club members, I'm going to have to train much harder..."
1300903-53 = "I want to be someone that I can be proud of."
1300903-54 = "[s] \"Is that what's important to you?\""
1300903-55 = "Yeah. Instead of being lazy..."
1300903-56 = "I want to be more adventurous and try something new..."
1300903-57 = "[s] \"More adventurous?\""
1300903-58 = "I don't want to rely on ordinary tools anymore..."
1300903-62 = "What about this one, Sensei? It's a training tool you can hug."
1300903-63 = "[s] \"What? A training tool you can hug?\""
1300903-64 = "The size makes it a bit unwieldy, though."
1300903-65 = "It says right here that, \"...you can print any full-body illustration you want on it.\""
1300903-66 = "(head tilt) Hmm. Why would you need something like that on a training tool?"
1300903-67 = "[s] \"Uh, let's get something else!\""
1300903-68 = "Do you not like it?"
1300903-69 = "Hey, what about this one, Sensei?"
1300903-70 = "This training tool says \"YES\" on the front and \"NO\" on the back."
1300903-71 = "[s] \"Tsubaki, that's...!\""
1300903-73 = "Sensei?! Is this tough for you?"
1300903-74 = "[s7] \"Y...Yes!\"\n[s8] \"N-No!\""
1300903-75 = "Huh? Sensei, why are you sweating so much?"
1300903-76 = "Huh? Sensei, why are you sweating so much?"
1300903-77 = "This pillow is supposedly popular with newlyweds. That's interesting..."
1300903-79 = "Ahaha! Check out this one, Sensei. It's a Peroro pillow perfect for throwing in a crisis."
1300903-80 = "[s] \"So is it a pillow or a training tool?!\""
1300903-82 = "Look, Sensei."
1300903-84 = "And this one too, Sensei."
1300903-86 = "Tsubaki and I wandered all over the store and looked at all the training tools...or pillows, or whatever."
1300903-88 = "[ns] \"It's almost nighttime and we still haven't decided on a pillow.\""
1300903-89 = "Yeah, I know. *yawn*"
1300903-90 = "[s9] \"Tsubaki, you must be pretty sleepy.\"\n[s10] \"Why don't we take a break?\""
1300903-91 = "Y-Yeah. Okay. I just need a minute..."
1300903-92 = "Y-Yeah. Okay. I just need a minute..."
1300903-93 = "[s] \"Huh? Hey, T-Tsubaki?\""
1300903-97 = "[s] \"Um... Tsubaki?\""
1300903-98 = "I see... *yawn*"
1300903-99 = "Now that I'm using your legs as a pillow..."
1300903-100 = "I've realized something."
1300903-101 = "The perfect pillow was right beside me the whole time!"
1300903-103 = "[s] \"H-Hello?\""
1300903-104 = "..."
1300903-105 = "[s] \"Tsubaki...?\""
1300903-107 = "Zzz..."
1300903-109 = "Soon after the sun went down, and by the time I was finally able to move, both of my legs had fallen asleep."

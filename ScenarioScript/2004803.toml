[translation]
2004803-1 = "Miss Nagisa Above Water"
2004803-2 = "I found the tent that Nagisa had told me about."
2004803-3 = "Just what was inside it...?"
2004803-5 = "Private Beach"
2004803-6 = "[ns] Open the tent."
2004803-9 = "[ns] \"...A surfboard?\""
2004803-10 = "Not just a surfboard, but there was also a banana boat, water skis, and a kayak inside."
2004803-11 = "However..."
2004803-12 = "[ns] \"...No one's even touched them.\""
2004803-13 = "The sporting equipment was collecting dust."
2004803-17 = "After wiping them all down, I felt inspired."
2004803-18 = "[ns] \"...Should I take this chance to learn how to surf?\""
2004803-20 = "So I took the surfboard and decided to head out to the open waters."
2004803-22 = "But..."
2004803-24 = "Somewhere in the ocean"
2004803-26 = "[ns] \"Bleh!\""
2004803-27 = "I could barely even balance myself on the board, let alone ride a single wave."
2004803-31 = "[ns] *cough* *gurgle*"
2004803-32 = "After falling into the water again and again..."
2004803-33 = "...Sensei?"
2004803-36 = "― [log=나기사 수영복]What brings you all the way out here?  [/log][wa:1250] "
2004803-38 = "― [log=나기사 수영복]And sprawled out on a board, at that... [/log][wa:10] "
2004803-41 = "[ns] \"I've suffered immensely...\""
2004803-42 = "― [log=나기사 수영복]...? Can I ask what happened? [/log][wa:2410] "
2004803-45 = "― [log=나기사 수영복]The ocean is a dangerous place.[/log][wa:430] "
2004803-47 = "― [log=나기사 수영복]Even the slightest mistake could lead to a serious accident.[/log][wa:10] "
2004803-50 = "[ns] \"Well... I wouldn't go that far...\""
2004803-51 = "― [log=나기사 수영복]I'm having trouble understanding...[/log][wa:200] "
2004803-53 = "― [log=나기사 수영복]The proper response will vary based on your situation. Please tell me what happened...[/log][wa:260] "
2004803-56 = "[ns] \"I just fell off my board over and over again...\""
2004803-57 = "― [log=나기사 수영복]Aha. I understand now.[/log][wa:1690] "
2004803-59 = "― [log=나기사 수영복]I'm relieved nothing terrible happened. [/log][wa:1250] "
2004803-62 = "― [log=나기사 수영복]They say that learning to balance [/log][wa:80] "
2004803-64 = "― [log=나기사 수영복]is the first hurdle of surfing.[/log][wa:1100] "
2004803-67 = "― [log=나기사 수영복]It's a difficult obstacle that everyone struggles with initially.[/log][wa:10] "
2004803-70 = "― [log=나기사 수영복]However...when you're resting like this,[/log][wa:1090] "
2004803-72 = "― [log=나기사 수영복]your body will get cold out on the water.[/log][wa:10] "
2004803-75 = "― [log=나기사 수영복]Come this way.[/log]"
2004803-77 = "― [log=나기사 수영복]I have some warm drinks prepared.[/log][wa:480] "
2004803-82 = "Here. I brought a thermos with me."
2004803-83 = "Drink some to warm up."
2004803-84 = "[s] \"You even bring black tea out on the ocean?\""
2004803-85 = "Fufu. No, it's only warm water. "
2004803-86 = "The thermos would alter the taste of the tea, after all."
2004803-87 = "Hm? What was I doing?"
2004803-88 = "I was simply enjoying the gentle swell of the waves. "
2004803-89 = "The sea breeze and view were beginning to feel slightly mundane."
2004803-90 = "And yet, swimming felt too arduous."
2004803-91 = "I wanted to do both anything and nothing at the same time."
2004803-92 = "Do you understand that feeling, Sensei?"
2004803-93 = "[s] \"I don't know the word for it, but I get it!\""
2004803-94 = "Fufu, I knew you'd understand."
2004803-95 = "Well, that's why I was simply enjoying drifting in the ocean."
2004803-96 = "The waves do the work for me as I simply rest."
2004803-97 = "And it seems I made the correct choice."
2004803-98 = "Because I ran into you."
2004803-100 = "And so, Nagisa and I enjoyed her thermos of warm water and the waves."

[translation]
2004803-1 = "คุณนางิสะเหนือน้ำ"
2004803-2 = "(คุณครูมาถึงหน้าเต็นท์ที่นางิสะบอก)"
2004803-3 = "(ในเต็นท์หลังนี้มีอะไรอยู่กันแน่นะ...)"
2004803-5 = "ชายหาดส่วนตัว"
2004803-6 = "[ns] เปิดเต็นท์เข้าไป"
2004803-9 = "[ns] \"กระดานโต้คลื่นเหรอ...?\""
2004803-10 = "(ในเต็นท์มีอุปกรณ์สันทนาการทางน้ำมากมาย ทั้งกระดานโต้คลื่น บานาน่าโบ๊ท สกีน้ำ เรือคายัค และอื่นๆ มากมาย)"
2004803-11 = "(แต่ว่า...)"
2004803-12 = "[ns] \"ไม่มีใครเอาไปเล่นจริงๆ สินะ...\""
2004803-13 = "(พอไม่มีใครมาแตะต้องเลย อุปกรณ์พวกนี้จึงมีแต่ฝุ่นเกาะ)"
2004803-17 = "(คุณครูก็เลยลองเอามือปัดฝุ่นดู...)"
2004803-18 = "[ns] \"ไหนๆ ก็มาทะเลแล้ว ลองหัดเล่นเซิร์ฟดีมั้ยนะ...?\""
2004803-20 = "(แล้วคุณครูก็ถือกระดานโต้คลื่นแล้วมุ่งหน้าไปยังทะเลด้วยความเด็ดเดี่ยว)"
2004803-22 = "(แต่ว่า...)"
2004803-24 = "เหนือผิวน้ำทะเล"
2004803-26 = "[ns] \"เฮือกก!\""
2004803-27 = "(อย่าว่าแต่โต้คลื่นเลย แค่ทรงตัวบนกระดานโต้คลื่นก็ยังเป็นเรื่องยาก)"
2004803-31 = "[ns] \"แค่ก... ฮู่วว...!\""
2004803-32 = "(แล้วคุณครูก็ตกน้ำไปแบบนั้นอยู่อีกหลายครั้ง)"
2004803-33 = "คุณครู...?"
2004803-36 = "― [log=나기사 수영복]มาทำอะไรอยู่ในที่แบบนี้คะ?[/log][wa:1770] "
2004803-38 = "― [log=나기사 수영복]อ่อนระโหยโรยแรงอยู่บนกระดานเลย...[/log][wa:10] "
2004803-41 = "[ns] \"ครูเจอภัยพิบัติครั้งใหญ่มาน่ะ...\""
2004803-42 = "― [log=나기사 수영복]...? ขอถามเจาะจงมากกว่านี้หน่อยได้มั้ยคะ?[/log][wa:1970] "
2004803-45 = "― [log=나기사 수영복]ก็ทะเลเป็นที่ที่[/log][wa:1030] "
2004803-47 = "― [log=나기사 수영복]ทำอะไรผิดพลาดนิดหน่อยก็นำไปสู่อุบัติเหตุอันตรายๆ ได้เลยนี่คะ[/log][wa:10] "
2004803-50 = "[ns] \"ไม่หรอก... มันก็ไม่ขนาดนั้น...\""
2004803-51 = "― [log=나기사 수영복]เข้าใจได้ยากจังเลยนะคะ... [/log][wa:560] "
2004803-53 = "― [log=나기사 수영복]เราต้องรับมือต่างกันตามสถานการณ์ เพราะงั้นช่วยอธิบายอีกหน่อย...[/log][wa:1180] "
2004803-56 = "[ns] \"ครูแค่จะเล่นเซิร์ฟ แต่ก็ตกน้ำอยู่หลายครั้งน่ะ...\""
2004803-57 = "― [log=나기사 수영복]อ้อ เป็นอย่างนี้เองสินะคะ [/log][wa:1530] "
2004803-59 = "― [log=나기사 수영복]ฟังดูไม่ใช่สถานการณ์อันตราย ถ้างั้นฉันก็วางใจค่ะ [/log][wa:890] "
2004803-62 = "― [log=나기사 수영복]จนกว่าจะเรียนรู้การทรงตัวได้[/log][wa:320] "
2004803-64 = "― [log=나기사 수영복]ก็ยังเรียกว่าอยู่ในความยากลำบากแรกของการเล่นเซิร์ฟอยู่ค่ะ[/log][wa:60] "
2004803-67 = "― [log=나기사 수영복]ในครั้งแรกไม่ว่าใครก็ต้องเจอแบบนี้ทั้งนั้นค่ะ[/log][wa:220] "
2004803-70 = "― [log=나기사 수영복]แต่ว่า... ต่อให้หยุดพักบ้าง[/log][wa:1610] "
2004803-72 = "― [log=나기사 수영복]แต่ถ้าอยู่แบบนั้น ตัวจะยิ่งเย็นลงนะคะ[/log][wa:150] "
2004803-75 = "― [log=나기사 수영복]มาทางนี้สิคะ[/log]"
2004803-77 = "― [log=나기사 수영복]ฉันเตรียมเครื่องดื่มอุ่นๆ มาด้วยค่ะ[/log][wa:400] "
2004803-82 = "ฉันเอาเครื่องดื่มใส่ทัมเบลอร์มาด้วยพอดีเลยค่ะ"
2004803-83 = "แค่จิบเดียวร่างกายก็อุ่นแล้วค่ะ"
2004803-84 = "[s] \"ดื่มชาแดงในทะเลเหรอ...?\""
2004803-85 = "ฮุฮุ ไม่ใช่ชาแดงหรอกค่ะ เป็นแค่น้ำอุ่นธรรมดาค่ะ "
2004803-86 = "ถ้าเอาชาแดงมาใส่ทัมเบลอร์ รสชาติของชาจะเปลี่ยนไปน่ะค่ะ"
2004803-87 = "คะ? ฉันกำลังทำอะไรอยู่น่ะเหรอคะ?"
2004803-88 = "ก็อย่างที่เห็นว่าฉันกำลังสนุกกับการลอยเคว้งคว้างอยู่ค่ะ "
2004803-89 = "การนั่งรับลมทะเลในชายหาดแล้วเหม่อมองเส้นขอบฟ้า... มันออกจะน่าเบื่อน่ะค่ะ"
2004803-90 = "แต่ฉันก็ไม่ถึงกับอยากว่ายน้ำ..."
2004803-91 = "ความรู้สึกที่อยากอยู่นิ่งๆ แต่ก็ไม่อยากอยู่นิ่งๆ"
2004803-92 = "คุณครูเข้าใจความรู้สึกนั้นมั้ยคะ?"
2004803-93 = "[s] \"ครูไม่ค่อยแน่ใจ แต่เหมือนจะพอรู้นะ...!\""
2004803-94 = "ฮุฮุ ฉันกะไว้แล้วค่ะว่าคุณครูต้องเข้าใจ"
2004803-95 = "เอาเป็นว่านั่นคือสาเหตุที่ฉันมาลอยเคว้งคว้างอยู่แบบนี้ค่ะ"
2004803-96 = "ถึงเราจะนั่งนิ่งๆ บนทะเล แต่ทะเลก็ยังเคลื่อนไหวเพื่อเรานี่คะ"
2004803-97 = "สุดท้ายมันก็เป็นการตัดสินใจที่ถูกต้องนะคะ"
2004803-98 = "ก็มันทำให้ฉันได้เจอคุณครูยังไงล่ะคะ"
2004803-100 = "(แล้วคุณครูกับนางิสะก็แบ่งน้ำอุ่นดื่มด้วยกันในทะเล)"

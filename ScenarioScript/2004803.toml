[translation]
2004803-1 = "水面上的渚大人"
2004803-2 = "（到達了渚所說的帳篷前）"
2004803-3 = "（裡面究竟有什麼東西呢……）"
2004803-5 = "私人海灘"
2004803-6 = "[ns] 打開帳篷"
2004803-9 = "[ns]「……衝浪板？」"
2004803-10 = "（帳篷裡整齊擺放著衝浪板、香蕉船、水上滑水、獨木舟等等水上休閒用品）"
2004803-11 = "（不過……）"
2004803-12 = "[ns]「……真的完全沒人碰過呢。」"
2004803-13 = "（因為沒有人動過的關係，這些休閒用品上都積滿了灰塵）"
2004803-17 = "（在隨手拂去灰塵時……）"
2004803-18 = "[ns]「……乾脆趁這個機會嘗試一下衝浪吧？」"
2004803-20 = "（於是拿起了衝浪板，意氣風發地朝大海走去）"
2004803-22 = "（然而……）"
2004803-24 = "海上某處"
2004803-26 = "[ns]「噗哇！」"
2004803-27 = "（別說要乘風破浪了，就連在板子上保持平衡都很困難）"
2004803-31 = "[ns]「咳咳，唔哇……！」"
2004803-32 = "（就在算不清楚到底在水裡翻了多少次的時候……）"
2004803-33 = "……老師？"
2004803-36 = "― [log=나기사 수영복]……您怎麼會在這種地方呢？ [/log][wa:2250] "
2004803-38 = "― [log=나기사 수영복]而且還癱軟成這樣…… [/log][wa:830] "
2004803-41 = "[ns]「我經歷了無數的磨難……」"
2004803-42 = "― [log=나기사 수영복]……？能請您再說明得具體一點嗎？ [/log][wa:2930] "
2004803-45 = "― [log=나기사 수영복]大海，可是只要一個不小心 [/log][wa:1150] "
2004803-47 = "― [log=나기사 수영복]就可能導致危險事故的地方呢。[/log][wa:1680] "
2004803-50 = "[ns]「不是……也沒那麼嚴重啦……」"
2004803-51 = "― [log=나기사 수영복]我實在難以理解……[/log][wa:1240] "
2004803-53 = "― [log=나기사 수영복]由於根據情況，應對方式也會有所不同……[/log][wa:2940] "
2004803-56 = "[ns]「我只是一直從板子上摔下去而已……」"
2004803-57 = "― [log=나기사 수영복]原來如此，是這麼回事啊。 [/log][wa:2050] "
2004803-59 = "― [log=나기사 수영복]似乎不是陷入危險狀態，我就放心了。 [/log][wa:2130] "
2004803-62 = "― [log=나기사 수영복]掌握平衡感， [/log][wa:1160] "
2004803-64 = "― [log=나기사 수영복]可說是衝浪的第一道難關。[/log][wa:1860] "
2004803-67 = "― [log=나기사 수영복]剛開始的時候，任何人都會經歷這段時期。 [/log][wa:1220] "
2004803-70 = "― [log=나기사 수영복]話雖如此……就算要休息，[/log][wa:2210] "
2004803-72 = "― [log=나기사 수영복]那樣也會讓身體著涼的。[/log][wa:1190] "
2004803-75 = "― [log=나기사 수영복]請到這邊來吧。[/log]"
2004803-77 = "― [log=나기사 수영복]我準備了溫熱的飲料。 [/log][wa:1360] "
2004803-82 = "正巧我有在保溫瓶裡準備飲料。"
2004803-83 = "只要喝一口就能馬上暖和起來。"
2004803-84 = "[s]「連在海上也要喝紅茶嗎……？」"
2004803-85 = "呵呵，瓶子裡裝的並不是紅茶，只是溫水而已。"
2004803-86 = "畢竟紅茶如果裝在保溫瓶裡，風味可是會改變的。"
2004803-87 = "咦？好奇我剛才在做什麼？"
2004803-88 = "如您所見，我正在享受漂流的樂趣。"
2004803-89 = "因為在沙灘上感受海風、眺望海平線……稍微有點膩了。"
2004803-90 = "不過也不是很想游泳……"
2004803-91 = "希望可以靜下來，卻又不想完全靜止的這種心情……"
2004803-92 = "老師您能夠理解嗎？"
2004803-93 = "[s]「好像莫名能夠理解……！」"
2004803-94 = "呵呵，我就知道老師一定能夠明白。"
2004803-95 = "總之，這就是我漂流的理由。"
2004803-96 = "即便在海面上什麼也不做，大海也會替你移動。"
2004803-97 = "不過從結果來看，這似乎是個正確的選擇呢。"
2004803-98 = "畢竟我正是因此才能遇見老師啊。"
2004803-100 = "（就這樣和渚在海上共享著溫水）"

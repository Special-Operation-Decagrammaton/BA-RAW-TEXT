2003102-109 = "3;시구레 온천ND;01;응. 온천수에 와인을 섞었어. 증류된 브랜디가 섞인 강화 와인으로."
2003102-110 = "3;시구레 온천ND;03;이야~ 정말 구하는 데 애를 먹었다니까. 입욕 효과를 낼 수 있을 정도로 강한 와인은 나도 그동안 한 번도 취급해 본 적이 없었거든.\n#3;em;[음표]"
2003102-111 = "[s] \"어째서 온천수에 와인을 섞은 거야?!\""
2003102-112 = "3;시구레 온천ND;02;으응? 선생님, 모르는 거야? 적당한 와인은 오히려 건강에 도움이 된다고.\n#3;em;[?]"
2003102-113 = "3;시구레 온천ND;09;하루 한 잔의 와인은 혈관을 확장시켜 콜레스테롤 수치를 낮춰주고, 세포의 노화를 유발하는 활성산소를 제거해 준다고 해."
2003102-114 = "3;시구레 온천ND;08;하지만 선생님이 학생은 술을 마시면 안 된다고 누차 경고했으니까……"
2003102-115 = "3;시구레 온천ND;00;그래서 생각해 봤는데, 입으로 술을 마시는 게 안된다면 피부로 흡수하는 건 괜찮은 게 아닐까 싶어서—"
2003102-116 = "[s] \"조금도 괜찮지 않아!\""
2003102-117 = "3;시구레 온천ND;03;자자, 사소한 건 신경 쓰지 말고. 옆으로 조금만 비켜봐.\n#3;jump"
2003102-118 = "3;시구레 온천ND;99;급한 일도 모두 마쳤으니, 나도 이제 탕에 들어가 선생님과 함께 목욕을—\n#3;greeting"
2003102-119 = "[ns13] \"절대 안 돼!\"\n[ns14] \"이 온천은 중지야, 중지!\""

[translation]
2003102-1 = "Luxuriously"
2003102-2 = "I happened to be near Red Winter Academy, so I paid a visit to the Former Institute with snacks and chocolate."
2003102-15 = "Ah, Sensei."
2003102-16 = "Sorry. I was so nose-deep in this dried fruit that I didn't notice you come in."
2003102-17 = "You're here for the tatami mats we chatted about, right?"
2003102-18 = "Give me a minute to tidy up and then I'll show you around."
2003102-19 = "[s] \"Take your time. I'm in no hurry.\""
2003102-23 = "[ns1] \"Actually, you should take this first.\"\n[ns2] \"I did say I'd bring snacks.\""
2003102-26 = "Whoa, you actually brought some?"
2003102-27 = "It's just something I said in passing. I'm touched that you remembered."
2003102-32 = "Thank you, Sensei. I'll make sure to share it with the others."
2003102-33 = "[s] \"I see you're still in your yukata.\""
2003102-34 = "Right. It's the one from Hot Springs Resort No. 227..."
2003102-35 = "I may not be running a resort anymore, but this yukata is made from good materials. It's decent for wearing around the house."
2003102-39 = "You know, the hot springs may be gone, but we still have a lot of things left over from it."
2003102-40 = "Useful things. Like the tatami mats and this yukata..."
2003102-41 = "And while it's not enough to open a resort, we do still have one of the smaller springs..."
2003102-42 = "We'll even get to enjoy nice, warm baths this winter. For once."
2003102-46 = "[ns3] \"Wait, what do you mean for once?\"\n[ns4] \"How have you been bathing before?\""
2003102-49 = "You're interested in your students' bathing habits, Sensei?"
2003102-50 = "How indecent of you."
2003102-54 = "...Well, since it's you, I guess I can tell you."
2003102-55 = "The Former Institute doesn't have a proper bath, so before the hot springs, we washed ourselves in the river."
2003102-56 = "During the winter, it gets cold enough to freeze the river solid. We have to break the ice to get in the water."
2003102-57 = "[s5] \"Isn't it dangerous to bathe in literal ice water?!\"\n[s6] \"You can always use the showers at Schale.\""
2003102-60 = "Heehee. Your concern is very kind, Sensei."
2003102-61 = "Thanks for the offer, but I'll pass. Schale is a long way from the Red Winter Academy. It's too much of a hike to go there just to take a shower."
2003102-62 = "And like I said, we still have a little hot spring of our own. No more frozen river baths for us!"
2003102-63 = "Besides, I was just wrapping up some renovations..."
2003102-64 = "[s] \"What kind of renovations...?\""
2003102-65 = "When I managed the hot springs, a customer told me about how some places add fruit and special scents to the water in order to create an aromatic experience."
2003102-66 = "Not only will it smell nice, but apparently you absorb good nutrients through your skin just from soaking in it."
2003102-67 = "I don't know what those other hot springs use, but there's plenty of fruit and incense to be found on the Former Institute grounds. I thought I'd try my hand at it."
2003102-68 = "Spec Ops students don't get a lot of snacks or entertainment..."
2003102-73 = "If we could at least have a nice bath, maybe we'd feel a little better."
2003102-74 = "[s7] \"That's a good idea.\"\n[s8] \"I'm sure the other students will be happy.\""
2003102-77 = "Heehee. I hope so."
2003102-78 = "Say, Sensei... Would you like to take a dip yourself?"
2003102-79 = "I'm going to need more time to tidy up here."
2003102-80 = "Why don't you go in first and let me know how it is?"
2003102-81 = "[s] \"You really don't mind if I use your special bath?\""
2003102-82 = "Of course I don't mind. You've helped us out so many times already."
2003102-83 = "I hope you enjoy it!"
2003102-85 = "Shigure guided me to her newly renovated hot spring."
2003102-89 = "Perhaps due to the special ingredients she added, the water had a ruby tint."
2003102-94 = "[ns9] \"It's got a subtle, fruity scent...\"\n[ns10] \"It really makes the skin...tingle...\""
2003102-99 = "How's the temperature, Sensei?"
2003102-100 = "[s11] \"The temperature is great, but...\"\n[s12] \"What did you add to the water?\""
2003102-103 = "Nothing too special. I guess the main ingredient would be grapes, I think...?"
2003102-104 = "...Technically, fermented grapes."
2003102-108 = "[ns] \"By fermented, you mean...\""
2003102-109 = "Right, I added wine to the bath water. Strong wine. With distilled brandy."
2003102-110 = "Let me tell you, it was NOT easy to get. This stuff is so strong it gives you a tingly feeling if you put it in your bathwater."
2003102-111 = "[s] \"But WHY did you add it to the bathwater?!\""
2003102-112 = "You mean you don't know? A little wine is good for your health."
2003102-113 = "A glass of wine a day expands the veins, lowers cholesterol, and removes the toxins that cause your cells to age."
2003102-114 = "But you told us again and again that students shouldn't drink alcohol, so..."
2003102-115 = "I thought about it, and if you can't DRINK alcohol, maybe it's okay to absorb it through your skin—"
2003102-116 = "[s] \"That's not at all okay!\""
2003102-117 = "Now, now, don't sweat the details."
2003102-118 = "I'm done tidying up now, so I think it's time for me to get into the bath with you and—"
2003102-119 = "[ns13] \"Don't even think about it!\"\n[ns14] \"This bath is banned! Indefinitely!\""
2003102-123 = "What? I can't...?"
2003102-124 = "But I worked so hard to make it ready..."
2003102-125 = "Can I...at least dip a toe in...?"
2003102-126 = "[s] \"Nope.\""
2003102-130 = "...I figured it wouldn't be that easy."
2003102-132 = "We spent the day emptying the hot spring and scrubbing it clean."
2003102-133 = "Unfortunately—perhaps due to the strength of the wine she used—I had a hangover for some time."

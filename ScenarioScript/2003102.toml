[translation]
2003102-1 = "อย่างหรูหรา"
2003102-2 = "(คุณครูบังเอิญมีธุระที่ต้องผ่านสหภาพเรดวินเทอร์ จึงถือโอกาสนี้ซื้อขนมและช็อกโกแลตแล้วแวะไป#nที่อาคารเรียนเก่า)"
2003102-15 = "อ่า... คุณครู"
2003102-16 = "ขอโทษนะ ฉันมัวแต่ง่วนอยู่กับการจัดผลไม้แห้ง ก็เลยไม่รู้เลยว่ามีคนเข้ามา"
2003102-17 = "เอาเสื่อทาทามิที่ฉันเคยบอกใน MOMOTALK มาให้ใช่มั้ย? "
2003102-18 = "รอแป๊บหนึ่งนะ ฉันจะรีบจัดการผลไม้แห้งแล้วออกไปหา..."
2003102-19 = "[s] \"ค่อยๆ ทำก็ได้ ครูไม่ได้รีบอะไร\""
2003102-23 = "[ns1] \"เอาละ รับนี่ไปก่อน\"\n[ns2] \"ขนมกับช็อกโกแลตที่เคยพูดถึงก่อนหน้านี้ไง\""
2003102-26 = "ว้าว คุณครูซื้อมาเองเลยเหรอ?"
2003102-27 = "ฉันก็แค่พูดไปเรื่อยตามปกติ แต่คุณครูกลับจำได้ น่าประทับใจจัง"
2003102-32 = "ขอบคุณนะคุณครู ฉันจะเอาไปแบ่งให้เพื่อนๆ คนอื่นด้วย"
2003102-33 = "[s] \"จะว่าไป ยังใส่ชุดยูกาตะอยู่เลยนะ\""
2003102-34 = "ใช่ นี่เป็นชุดที่เราสั่งตัดด้วยกันตอนเปิด <ออนเซ็น No.227>..."
2003102-35 = "ตอนนี้ถึงจะไม่ได้เปิดให้บริการออนเซ็น แต่ชุดนี้ก็ทำจากวัสดุคุณภาพดี ก็เลยเอามาใส่เป็นชุดอยู่บ้าน#nในอาคารเรียนเก่าได้น่ะ"
2003102-39 = "...จะว่าไป ถึงออนเซ็นจะไม่อยู่แล้ว แต่ก็ยังมีสิ่งที่เหลืออยู่มากกว่าที่คิดอีกนะ"
2003102-40 = "ของจำเป็นที่เอามาใช้ประโยชน์ได้อย่างเสื่อทาทามิหรือยูกาตะก็เหลืออยู่เพียบเลย..."
2003102-41 = "ส่วนบ่อออนเซ็น ถึงจะไม่เหลือบ่อใหญ่ๆ สำหรับแขกหลายคน ก็มีบ่อขนาดสำหรับ 1-2 คนเหลืออยู่"
2003102-42 = "ในฤดูหนาวที่เย็นยะเยือกนี้ ฉันคงอาบน้ำอุ่นได้สักระยะแหละ"
2003102-46 = "[ns3] \"เดี๋ยวก่อน คงได้อาบน้ำอุ่นงั้นเหรอ...\"\n[ns4] \"แล้วที่ผ่านมาอาบน้ำยังไงกัน?\""
2003102-49 = "อะไรกัน คุณครู อยากรู้เหรอว่านักเรียนอาบน้ำกันยังไง?"
2003102-50 = "ร้ายจริงๆ เลยนะเนี่ย~"
2003102-54 = "...เอาเถอะ ยังไงก็เป็นคุณครูนี่นะ บอกให้ก็คงไม่เสียหายหรอก"
2003102-55 = "ที่จริงในอาคารเรียนเก่าไม่ค่อยมีสิ่งอำนวยความสะดวกในการอาบน้ำเท่าไร ก่อนที่จะมีบ่อออนเซ็น ปกติพวกฉันจะไปอาบน้ำกันในลำธารแถวนี้น่ะ"
2003102-56 = "ในฤดูหนาว อากาศจะหนาวจนน้ำในลำธารกลายเป็นน้ำแข็งเลยละ แต่ถ้ากระเทาะน้ำแข็งให้แตกก็ลง#nไปอาบน้ำได้อยู่..."
2003102-57 = "[s5] \"ทำแบบนั้นมันไม่อันตรายเกินไปหน่อยเหรอ?!\"\n[s6] \"ถ้าจำเป็นก็มาใช้ห้องอาบน้ำที่ชาเล่ต์ได้นะ\""
2003102-60 = "ฮุฮุ คุณครูใจดีจังเลยนะ"
2003102-61 = "ขอบคุณสำหรับข้อเสนอนะ แต่ขอปฏิเสธดีกว่า ชาเล่ต์อยู่ไกลจากสหภาพเรดวินเทอร์มาก ถ้าจะให้ไปอาบน้ำที่นั่นคงลำบากกว่าเดิม"
2003102-62 = "และอย่างที่ฉันบอกไปนั่นแหละ ว่ายังมีบ่อออนเซ็นขนาดเล็กเหลืออยู่ จากนี้พวกฉันก็ไม่ต้องไปอาบน้ำ#nในลำธารเยือกแข็งแล้วละ"
2003102-63 = "อีกอย่าง วันนี้ฉันไปปรับปรุงบ่อออนเซ็นใหม่มาพอดี..."
2003102-64 = "[s] \"ปรับปรุงบ่อออนเซ็นใหม่งั้นเหรอ...?\""
2003102-65 = "ใช่ ฉันเคยได้ยินจากแขกที่มาใช้บริการของเราเมื่อก่อน ว่าในออนเซ็นที่มีชื่อเสียงจะมีบ่อพิเศษที่ใส่#nผลไม้หรือเครื่องหอมลงไปในน้ำเพื่อให้สีสวยและกลิ่นหอมด้วย"
2003102-66 = "การทำแบบนั้นไม่เพียงแต่ทำให้กลิ่นของน้ำสดชื่นเท่านั้น แต่ยังช่วยให้ผิวดูดซึมสารสกัดดีๆ ได้ด้วย ถือว่าเป็นการรักษาโรคด้วยการอาบน้ำได้เลยละ"
2003102-67 = "ถ้าเป็นวัตถุดิบอื่นก็ไม่แน่ แต่ถ้าเป็นผลไม้กับเครื่องหอมแล้วละก็ ฉันหาจากพื้นที่แถวอาคารเรียนเก่า#nได้ไม่อั้นเลยละ ไหนๆ ก็คิดถึงเรื่องนี้ขึ้นมาแล้ว ฉันก็เลยปรับให้ออนเซ็นขนาดเล็กที่ยังเหลืออยู่กลาย#nเป็นบ่อพิเศษขึ้นมา"
2003102-68 = "ห้องเรียนพิเศษของเรามีขนมขบเคี้ยวให้กินไม่พอ และยังไม่มีกิจกรรมฆ่าเวลาที่สามารถเพลิดเพลินได้อีกด้วย..."
2003102-73 = "ฉันเลยคิดว่าอย่างน้อยถ้าเราสนุกกับการอาบน้ำได้ ก็คงทำให้เรารู้สึกดีขึ้นได้น่ะ"
2003102-74 = "[s7] \"เป็นความคิดที่ดีเลยนะ\"\n[s8] \"ครูมั่นใจว่าเด็กคนอื่นจะต้องชอบเหมือนกัน\""
2003102-77 = "ฮุฮุ หวังว่าจะเป็นอย่างนั้นนะ"
2003102-78 = "อ๊ะ คุณครู ไหนๆ ก็ไหนๆ แล้ว อยากลองลงไปแช่ออนเซ็นดูมั้ย?"
2003102-79 = "ฉันน่าจะต้องใช้เวลาจัดการนู่นนี่ตรงนี้ก่อนน่ะ"
2003102-80 = "คุณครูลองไปแช่ตัวในบ่อพิเศษบ่อนั้นแล้วมารีวิวกับฉันหน่อยสิ"
2003102-81 = "[s] \"ให้ครูใช้บ่อพิเศษเป็นคนแรกได้เลยเหรอ?\""
2003102-82 = "อื้ม ได้อยู่แล้ว ก็ปกติแล้วฉันได้รับความช่วยเหลือจากคุณครูมาตั้งเยอะเลย"
2003102-83 = "หวังว่าจะเป็นการอาบน้ำที่สนุกนะ~"
2003102-85 = "(จากนั้นไม่นาน คุณครูก็ลงไปแช่ออนเซ็นพิเศษที่ปรับปรุงขึ้นใหม่ตามการแนะนำของชิกุเระ)"
2003102-89 = "(อาจเป็นเพราะเครื่องหอมที่ใส่ลงไป น้ำร้อนในบ่อจึงเป็นประกายสีแดงสดเหมือนทับทิม...)"
2003102-94 = "[ns9] \"กลิ่นหอมจางๆ ของผลไม้ก็ไม่เลวเลยนะเนี่ย...\"\n[ns10] \"รู้สึกเหมือนผิวร้อนผ่าวขึ้นมาเลยแฮะ...\""
2003102-99 = "อ๊ะ คุณครู อุณหภูมิของน้ำโอเคมั้ย?"
2003102-100 = "[s11] \"อื้ม เท่านี้กำลังดีเลยละ...\"\n[s12] \"ใส่อะไรลงมาผสมกันบ้างเหรอ?\""
2003102-103 = "อืม ไม่ได้ใส่อะไรพิเศษมากหรอก ก็น่าจะมีพวกองุ่น...?"
2003102-104 = "...แต่เป็นองุ่นที่หมักแล้วน่ะ"
2003102-108 = "[ns] \"หมักงั้นเหรอ อย่าบอกนะว่า...\""
2003102-109 = "ใช่ ฉันเอาไวน์ลงไปผสมในน้ำด้วย ไวน์ที่หมักพิเศษ"
2003102-110 = "รู้มั้ยว่ามันยากมากเลยนะกว่าจะหามาได้~ ฉันไม่เคยเจอกับไวน์ที่แรงพอจะใช้ในการอาบน้ำได้มา#nก่อนเลย"
2003102-111 = "[s] \"ทำไมถึงเอาไวน์มาใส่ล่ะ?!\""
2003102-112 = "หืม? คุณครูไม่รู้หรอกเหรอ? ไวน์ในปริมาณที่เหมาะสมจะเป็นประโยชน์กับสุขภาพเรานะ"
2003102-113 = "การดื่มไวน์วันละแก้วจะช่วยขยายหลอดเลือดและลดระดับคอเลสเตอรอล นอกจากนี้ยังช่วยขจัด#nสารอนุมูลอิสระที่เป็นตัวการให้เกิดการเสื่อมสภาพของเซลล์ด้วย"
2003102-114 = "แต่คุณครูก็เตือนหลายครั้งแล้วว่าเป็นนักเรียนไม่ควรดื่มของมึนเมา..."
2003102-115 = "ฉันก็เลยเก็บมาคิดดู จนได้ไอเดียว่าถ้าห้ามดื่มเข้าปาก ก็ให้ดูดซึมผ่านรูขุมขนบนผิวหนังก็น่าจะได้..."
2003102-116 = "[s] \"ถึงจะแบบนั้นก็ไม่ได้นะ!\""
2003102-117 = "เอาเถอะๆ อย่าไปใส่ใจเรื่องเล็กๆ น้อยๆ เลย เขยิบไปข้างๆ หน่อยสิ"
2003102-118 = "ฉันทำงานด่วนเสร็จหมดแล้ว ทีนี้ก็จะได้ลงบ่อไปแช่น้ำพร้อมกับคุณครู—"
2003102-119 = "[ns13] \"ไม่ได้เด็ดขาด!\"\n[ns14] \"บ่อออนเซ็นปิดแล้ว! ห้ามลงเพิ่ม!\""
2003102-123 = "หืม? ไม่ได้เหรอ...?"
2003102-124 = "แต่ฉันทุ่มเททั้งเวลาและความพยายามมาตั้งเยอะเพื่อสร้างบ่อพิเศษนี้ขึ้นมาเลยนะ..."
2003102-125 = "งั้นอย่างน้อย... ฉันขอแช่แค่เท้าได้มั้ย?"
2003102-126 = "[s] \"ไม่ได้\""
2003102-130 = "...ไม่ง่ายเลยจริงๆ แฮะ"
2003102-132 = "(หลังจากนั้นคุณครูก็ปล่อยน้ำจากบ่อออนเซ็นและขัดถูจนบ่อสะอาดหมดจด)"
2003102-133 = "(...อาจเป็นเพราะได้แช่ตัวในน้ำผสมไวน์ความเข้มข้นสูง คุณครูก็เลยรู้สึกเมาค้างไปพักใหญ่)"

2003102-32 = "2;시구레 온천ND;01;고마워, 선생님. 다른 학생들과 나누어 먹을게."
2003102-33 = "[s] \"그나저나 아직도 유카타를 입고 있었네.\""
2003102-34 = "2;시구레 온천ND;00;응. <227호 온천장>을 운영할 때 단체로 맞춘 것인데……"
2003102-35 = "2;시구레 온천ND;01;이제 온천장을 운영할 일은 없겠지만, 좋은 소재로 만든 옷인지라. 구교사 안에서 홈웨어 대용으로 입기에는 나쁘지 않더라고."
2003102-36 = "#st;[0,0];instant;1;"
2003102-37 = "#clearST"
2003102-38 = "2;시구레 온천ND;01\n#2;em;…\n#wait;2500"
2003102-39 = "2;시구레 온천ND;07;……그러고 보면 온천장은 사라졌지만 생각보다 많은 것이 남았네."
2003102-40 = "2;시구레 온천ND;09;이렇게 다다미나 유카타처럼 유용하게 쓸 수 있는 비품도 잔뜩 남아 있고……"
2003102-41 = "2;시구레 온천ND;01;손님을 받을 수 있는 규모는 아니지만, 한두 사람 정도 들어갈 수 있는 수준의 탕도 아직은 남아 있으니까."
2003102-42 = "2;시구레 온천ND;99;당분간은 추운 겨울에도 따듯한 물로 몸을 씻을 수 있겠어."
2003102-43 = "#st;[0,0];instant;1;"
2003102-44 = "#clearST"
2003102-45 = "#wait;2500"
2003102-46 = "[ns3] \"잠깐, 따듯한 물로 몸을 씻을 수 있다니……\"\n[ns4] \"그럼 그 전에는 어떻게 목욕을 했던 거야?\""
2003102-47 = "#wait;100"
2003102-48 = "#wait;100"
2003102-49 = "2;시구레 온천ND;00;뭐야, 선생님. 학생들이 어떻게 목욕하는지에 관심이 있는 거야?\n#2;em;[?]"
2003102-50 = "2;시구레 온천ND;03;선생님도 참 음흉하다니까~"
2003102-51 = "#st;[0,0];instant;1;"
2003102-52 = "#clearST"
2003102-53 = "2;시구레 온천ND;01\n#2;em;…\n#wait;2500"
2003102-54 = "2;시구레 온천ND;99;……뭐, 선생님이니까. 그 정도는 가르쳐 주어도 상관없으려나."
2003102-55 = "2;시구레 온천ND;01;사실 구교사에는 제대로 된 목욕 시설이 없었기 때문에 온천이 생기기 전에는 보통 근처의 강에서 목욕을 했었어."
2003102-56 = "2;시구레 온천ND;07;겨울에는 얼음이 꽝꽝 얼어붙을 정도로 춥긴 하지만, 얼음을 깨고 들어가면 씻는 데에는 큰 문제가 없었으니까……"
2003102-57 = "[s5] \"얼음물에서 목욕을 하는 건 너무 위험하지 않아?!\"\n[s6] \"필요하다면 샬레의 샤워실을 사용해도 괜찮아.\""
2003102-58 = "#wait;100"
2003102-59 = "#wait;100"
2003102-60 = "2;시구레 온천ND;01;후후, 선생님은 상냥하네."
2003102-61 = "2;시구레 온천ND;07;제안은 고맙지만 사양할게. 샬레는 붉은겨울 학원에서 멀리 떨어져 있으니까, 샤워만 하러 찾아가기에는 품이 더 들 것 같거든."
2003102-62 = "2;시구레 온천ND;02;게다가 아까도 말했지만 작은 규모의 온천은 아직도 남아 있으니까. 더 이상 얼어붙은 강 속에서 목욕을 할 일은 없을 거야."
2003102-63 = "2;시구레 온천ND;03;게다가 안 그래도 오늘은 마침 탕을 새롭게 개조해 보려던 참이어서……"
2003102-64 = "[s] \"탕을 개조한다고……?\""
2003102-65 = "2;시구레 온천ND;00;응. 전에 온천장을 운영할 때 손님들에게 들었는데, 유명한 온천장에는 과일이나 향료를 넣어서 색과 향을 입힌 특별한 탕이 있다고 하더라고.\n#2;greeting"
2003102-66 = "2;시구레 온천ND;02;이렇게 하면 온천의 향도 산뜻해질뿐더러, 피부로 좋은 성분을 흡수할 수 있어서 탕치에도 효과적이래."
2003102-67 = "2;시구레 온천ND;01;다른 재료라면 몰라도 과일과 향료라면 구교사의 부지에서도 얼마든지 구할 수 있으니까. 생각이 난 김에 남아있는 작은 온천을 특별탕으로 개조해 보았어."
2003102-68 = "2;시구레 온천ND;08;우리 구교사 특별반에는 주전부리도 충분치 않고, 여흥으로 즐길 수 있는 소일거리도 거의 없으니까……\n#fontsize;50"
2003102-69 = "#st;[0,0];instant;1;"
2003102-70 = "#clearST"
2003102-71 = "2;시구레 온천ND;99\n#2;em;…\n#wait;2500"
2003102-72 = "2;시구레 온천ND;01\n#wait;1500"
2003102-73 = "2;시구레 온천ND;00;목욕만큼이라도 호화롭게 즐길 수 있다면, 기분 전환에 도움이 되지 않을까 싶어서."
2003102-74 = "[s7] \"좋은 생각이네.\"\n[s8] \"분명 다른 학생들도 기뻐할 거야.\""

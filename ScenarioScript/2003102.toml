[translation]
2003102-1 = "豪華地"
2003102-2 = "（偶然有事經過赤冬聯邦學園附近，於是買了點心和巧克力去了舊校舍）"
2003102-15 = "……啊，老師。"
2003102-16 = "抱歉，我顧著整理果乾所以沒注意到。"
2003102-17 = "你是來拿之前在MomoTalk上說的榻榻米對吧？"
2003102-18 = "等我一下哦。#n我整理好之後馬上帶你去……"
2003102-19 = "[s]「慢慢來沒關係。不是什麼急事。」"
2003102-23 = "[ns1]「來，先收下這個吧。」\n[ns2]「是之前說的點心和巧克力。」"
2003102-26 = "咦咦，真的買來了嗎？"
2003102-27 = "我只是隨口說說而已，沒想到你居然記得，真是太感動了。"
2003102-32 = "謝謝你，老師。我會分給大家吃的。"
2003102-33 = "[s]「話說回來，你還穿著浴衣呢。」"
2003102-34 = "嗯，這是經營「227號溫泉浴場」的時候一起訂做的……"
2003102-35 = "雖然現在已經沒有繼續經營溫泉浴場，#n但這是用很好的質料製作的，在舊校舍當家居服穿感覺也還不錯。"
2003102-39 = "……這麼看來雖然溫泉浴場已經不復存在，留下來的東西卻比想像中還多呢。"
2003102-40 = "像是大量榻榻米和浴衣這類的實用備品……"
2003102-41 = "雖然規模無法接待客人，但是能容納一兩個人的小溫泉也還在。"
2003102-42 = "所以在寒冷的冬天也能用熱水洗澡了。"
2003102-46 = "[ns3]「等等，你說可以用熱水洗澡……」\n[ns4]「那在這之前是怎麼洗的？」"
2003102-49 = "什麼嘛，老師。#n你對學生怎麼洗澡有興趣嗎？"
2003102-50 = "老師真可怕～"
2003102-54 = "……不過沒關係。#n畢竟是老師，這種小事告訴你也無所謂吧。"
2003102-55 = "其實舊校舍沒有像樣的入浴設施。#n所以在有溫泉之前，通常都是在附近的河裡洗澡。"
2003102-56 = "冬天的時候雖然冷到連水都會結凍，#n不過只要把冰打破就能洗澡了，問題不是很大……"
2003102-57 = "[s5]「在冰水裡洗澡太危險了吧！？」\n[s6]「有需要的話可以用夏萊的浴室哦！？」"
2003102-60 = "呵呵，老師真善良呢。"
2003102-61 = "很謝謝老師的提議，不過還請容我拒絕。#n夏萊離赤冬很遠，只為了洗澡過去實在有點……"
2003102-62 = "而且我剛才也說過，小規模的溫泉還在。#n今後應該不必再到結冰的河裡洗澡了。"
2003102-63 = "這麼說來，我今天正好對溫泉進行了一些調整……"
2003102-64 = "[s]「調整溫泉……？」"
2003102-65 = "嗯，之前在經營溫泉浴場的時候聽客人說過，#n有些知名的溫泉浴場會有加入水果或香料，藉此增添顏色和香味的特別溫泉。"
2003102-66 = "這樣不僅能讓溫泉的味道變得清爽，#n還能讓皮膚吸收優質成分，對溫泉療法也很有幫助哦。"
2003102-67 = "其他素材姑且不論，但水果和香料都能在舊校舍的腹地取得。#n想起這件事之後，覺得機會難得就決定嘗試看看。"
2003102-68 = "我們舊校舍特別班既沒有充分的零食，也幾乎沒有娛樂可以享受……"
2003102-73 = "如果能讓洗澡這件事變成豪華的享受，應該有助於轉換心情。"
2003102-74 = "[s7]「這想法很棒。」\n[s8]「其他學生一定也會很開心的。」"
2003102-77 = "呵呵，如果是的話就好了。"
2003102-78 = "啊，老師。#n既然說到這個，要不要先去泡個澡？"
2003102-79 = "這裡的整理應該還需要一點時間。"
2003102-80 = "希望老師能先去泡個澡，然後告訴我感想。"
2003102-81 = "[s]「那麼特別的溫泉，我先泡沒關係嗎？」"
2003102-82 = "嗯，當然。因為平常老師幫了我很多忙。"
2003102-83 = "祝老師泡澡泡得開心～"
2003102-85 = "（過了一會，在時雨的帶領下進入了調整過的特殊浴池）"
2003102-89 = "（可能是因為溫泉裡加了香料，溫泉水紅得像紅寶石一樣……）"
2003102-94 = "[ns9]「隱約散發的果香真不錯呢……」\n[ns10]「總覺得皮膚好像熱起來了……」"
2003102-99 = "啊，老師，水溫還行嗎？"
2003102-100 = "[s11]「嗯，溫度是剛剛好啦……」\n[s12]「不過你在溫泉裡加了什麼香料？」"
2003102-103 = "這個嘛，不是什麼大不了的東西。#n就是一點葡萄……？"
2003102-104 = "……雖然已經發酵就是了。"
2003102-108 = "[ns]「發酵，難道說……」"
2003102-109 = "嗯，我在溫泉裡加了紅酒。#n是混合了蒸餾白蘭地的強化紅酒。"
2003102-110 = "哎呀～我可是費了好大的工夫才弄到手的。#n我之前也從來沒用過能發揮入浴效果的濃烈紅酒呢。"
2003102-111 = "[s]「為什麼要在溫泉裡加紅酒！？」"
2003102-112 = "嗯？老師，你不知道嗎？#n適當的紅酒有益健康。"
2003102-113 = "聽說每天喝一杯紅酒可以讓血管擴張、降低膽固醇指數，#n還能去除促使細胞老化的活性氧。"
2003102-114 = "但老師卻屢次警告學生不能喝酒……"
2003102-115 = "所以我想過了，如果不能用嘴巴喝，那用皮膚吸收應該沒關係──"
2003102-116 = "[s]「很有關係！」"
2003102-117 = "哎呀～別在意那種小事，分一點位置給我吧。"
2003102-118 = "急事全都辦完了，現在我也要跟老師一起──"
2003102-119 = "[ns13]「絕對不行！」\n[ns14]「這溫泉不能繼續下去！」"
2003102-123 = "嗯？不行嗎……？"
2003102-124 = "可是我為了準備這個特殊浴池花費了很多時間和努力……"
2003102-125 = "那……就稍微泡個腳？"
2003102-126 = "[s]「不可以。」"
2003102-130 = "…………果然沒那麼容易呢。"
2003102-132 = "（之後，把加了紅酒的溫泉清空並把浴池打掃乾淨）"
2003102-133 = "（……只是不知道是不是用高濃度紅酒泡澡的關係，#n　之後的一段時間都因久久不退的宿醉吃了不少苦頭）"

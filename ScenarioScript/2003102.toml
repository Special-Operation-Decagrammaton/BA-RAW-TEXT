2003102-78 = "2;시구레 온천ND;02;아, 선생님. 말이 나온 참에 한 번 탕에 먼저 들어가 볼래?\n#2;em;[반응]"
2003102-79 = "2;시구레 온천ND;01;나는 이곳에서 정리를 하느라 시간이 더 필요할 것 같아서."
2003102-80 = "2;시구레 온천ND;00;선생님이 먼저 탕에 들어가 보고 감상을 알려줬으면 좋겠어."
2003102-81 = "[s] \"그런 특별한 탕을 내가 먼저 사용해도 괜찮은 거야?\""
2003102-82 = "2;시구레 온천ND;01;응, 물론이야. 선생님에게는 평소에도 이것저것 많은 도움을 받고 있으니까."

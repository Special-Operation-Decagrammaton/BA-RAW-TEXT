[translation]
10047095-4 = "[ns] \"แฮ่ก... แฮ่ก... แฮ่ก...!\""
10047095-7 = "อ๊ะ มาสเตอร์...! ทางนี้ค่ะ!"
10047095-8 = "ฉันกลัวว่าจะเกิดอะไรขึ้น ก็เลยส่งอีกาไป... โล่งอกไปทีนะที่ไม่โดนจับได้"
10047095-9 = "ฮุฮุ งานนี้ไม่ง่ายเลยนะคะ"
10047095-11 = "ดีละ! ถูกต้อนมาอยู่ด้วยกันแล้ว!"
10047095-12 = "ทีนี้ก็หมดทางหนีแล้วละ! ยอมแพ้แต่โดยดีเถอะ!!"
10047095-14 = "อึกก... เหลือแค่หอพักของฝ่ายดูแลหอพักแท้ๆ เชียว แต่ดันมาโดนจับเสียได้..."
10047095-15 = "พวกนี้... ตรวจตราเข้มงวดกว่าที่คิดอีกนะ..."
10047095-16 = "ฮุฮุ... อย่าเพิ่งหมดหวังไปเลยค่ะ นี่จะเป็นประสบการณ์ที่ดีเลยละ"
10047095-17 = "เส้นทางแห่งศิลปะย่อมมีขวากหนาม"
10047095-18 = "ถึงเราจะยังหาคำตอบไม่ได้ง่ายๆ แต่ฉันเชื่อว่าสักวันเราต้องค้นพบมันค่ะ เพราะสิ่งนี้คือ..."
10047095-23 = "'ความท้าทาย'"
10047095-24 = "ทางศิลปะยังไงล่ะคะ...!"
10047095-26 = "เก่งแต่ปากกันทั้งนั้นนะ! จับตัวทุกคนไปจากที่ก่อเหตุเลย...!!"
10047095-37 = "อะ... อะไรเนี่ย? ระฆังดังมาจากไหนน่ะ?"
10047095-38 = "ถ้าเป็นทิศนั้น... อย่าบอกนะว่า...?"
10047095-39 = "มาจากทิศของ <หอระฆังไร้ชื่อ> ค่ะ..."
10047095-40 = "ระฆังในตำนาน... ที่มีเรื่องเล่าขานว่า..."
10047095-41 = "จะขับร้องก้องกังวานในวันสิ้นโลก!!"

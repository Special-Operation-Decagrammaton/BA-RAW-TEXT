[translation]
10047095-4 = "[ns]「哈啊，哈啊，哈啊……！」"
10047095-7 = "啊，御者……！這邊！"
10047095-8 = "我擔心出事就派了烏鴉過去……幸好沒被抓到。"
10047095-9 = "呵呵，果然沒那麼容易呢。"
10047095-11 = "很好！把他們逼到同一個地點了！"
10047095-12 = "你們已經無路可逃了！乖乖束手就擒吧！！"
10047095-14 = "唔唔，明明只剩下舍監隊的宿舍而已，居然會在這裡被逮到……"
10047095-15 = "監視……比想像中還嚴密啊……"
10047095-16 = "……呵呵，不必灰心。這也是寶貴的經驗。"
10047095-17 = "藝術之路本來就充滿艱難。"
10047095-18 = "雖然無法輕易找到答案，但我相信總有一天一定能辦到的。#n這就是對藝術發起的──"
10047095-23 = "──「挑戰」。"
10047095-24 = "……說的沒錯！"
10047095-26 = "少在那邊給我自我陶醉！#n把他們所有人都以現行犯逮捕……！！"
10047095-37 = "什，什麼？這陣鐘聲是從哪裡傳來的？"
10047095-38 = "這個方向是……難道說？"
10047095-39 = "……是「無名鐘塔」的方向呢。"
10047095-40 = "響起了……在毀滅之日獨自歌唱的……"
10047095-41 = "傳說之鐘！！"

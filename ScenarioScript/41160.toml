[translation]
41160-1 = "ตอนที่ 16;เงินคืน"
41160-5 = "คุณคือ...?"
41160-6 = "\"หมาบ้า\" แห่งสถาบันฝึกตำรวจวัลคิรี่?"
41160-8 = "ช่วยเรียกว่าหัวหน้ากรมฯ โอกาตะ คันนะ น่าจะดีกว่านะ"
41160-9 = "ถึงฉันจะไม่ได้ไม่ชอบฉายานั้น แต่เราก็ไม่ได้สนิทกันจนถึงขั้นที่จะเรียกกันด้วยฉายาได้หรอกนะ"
41160-10 = "หัวหน้ากรมฯ คันนะ นี่มันเรื่องอะไรกันคะ?"
41160-11 = "นี่คือคำถามที่นักเรียนอาชญากรถามผู้บริหารวัลคิรี่งั้นเหรอ?"
41160-12 = "ฉันก็มาที่นี่เพื่อปราบเด็กเกเรที่มายึดสวนสาธารณะที่พลเมืองใช้อย่างผิดกฎหมายและสร้างความวุ่น#nวายใจให้กับสังคมยังไงล่ะ"
41160-13 = "เดี๋ยวนะ หัวหน้าสำนักป้องกันต่างหากที่อนุญาตให้เราใช้สวนสาธารณะนี้ได้"
41160-14 = "คนที่เป็นถึงหัวหน้ากรมความมั่นคงสาธารณะของวัลคิรี่จะไม่เชื่อฟังคำของคนที่ตำแหน่งสูงกว่าเหรอ?"
41160-15 = "สงสัยจะเข้าใจอะไรกันผิดอยู่นะ"
41160-16 = "ท่านหัวหน้าไม่เคยพูดด้วยตัวเองเลยนะว่าให้พวกเธอมาอยู่ในสวนสาธารณะนี้ได้"
41160-17 = "ท่านแค่มีเมตตากับพวกเธอและเลื่อนการลงโทษพวกเธอไปก่อนเท่านั้น"
41160-23 = "นั่นสินะคะ... ตามกฎแล้วสวนสาธารณะไม่ได้อยู่ในความดูแลของสำนักป้องกัน แต่อยู่ในขอบเขต#nอำนาจของสำนักวัฒนธรรม"
41160-24 = "สิ่งที่หัวหน้าสำนักป้องกันช่วยไว้ได้คือการระงับโทษไล่ออก ไม่ใช่การอนุญาตให้มาอาศัยในสวน#nสาธารณะค่ะ"
41160-25 = "หมายความว่ายังไง คนไม่มีบ้านจะให้กลับ แล้วจะห้ามไม่ให้มาขออาศัยได้ยังไง..."
41160-26 = "ข้ออ้างแบบนี้มันใช้ได้ที่ไหน!"
41160-27 = "วะ... ว่าแต่ทำไมกรมความมั่นคงสาธารณะถึงมาหาเราถึงที่นี่เองเลยล่ะคะ...?"
41160-28 = "ปกติงานเกี่ยวกับความสงบต้องเป็นหน้าที่ของสำนักความมั่นคงนี่คะ..."
41160-33 = "ตราบใดที่ไม่ได้เป็นการก่อการร้ายที่นำภัยร้ายแรงมาให้ การย้ายคนไร้บ้านถือเป็นหน้าที่ของสำนัก#nความมั่นคงตามที่เธอว่า"
41160-34 = "มันมีผลในสถานการณ์ปกติเท่านั้นน่ะ"
41160-36 = "แล้วจะยังไงล่ะ!? ถ้าเราไม่ออกไปก็จะลากตัวไปเลยงั้นเหรอ?"
41160-37 = "นั่นสินะ ลืมเรื่องคราวก่อนที่พวกเธอกรูกันมาเป็นฝูงแล้วโดนเล่นงานจนหมดหนทางไปแล้วเหรอ? ฮิฮิฮิ"
41160-38 = "ระวังคำพูดหน่อยเถอะคาเซะคุระ อย่าลืมว่ากำแพงมีหูประตูมีช่องนะ"
41160-39 = "จะว่าไป ได้ข่าวว่าอาวุธของกองทหาร RABBIT จมน้ำเกือบหมดเพราะฝนตกหนักเมื่ออาทิตย์ก่อนเหรอ?"
41160-40 = "อึก..."
41160-41 = "ถึงจะเอาไปตั้งขายในตลาดมือสองแล้วหาซื้ออาวุธกับอุปกรณ์ใหม่มา แต่ก็ไม่เพียงพอที่จะใช้ทั่วทั้ง#nสวนสาธารณะละสิ"
41160-42 = "รู้ไว้ด้วยว่ากรมความมั่นคงสาธารณะได้รับความร่วมมือจากสปอนเซอร์จนได้อาวุธอานุภาพสูงมาใช้"
41160-43 = "ไม่ว่าพวกเธอจะเป็นเด็กหัวกะทิที่มีความสามารถในการต่อสู้มากแค่ไหน แต่ก็เอาชนะพวกเราไม่ได้#nทั้งในเชิงปริมาณและคุณภาพ"
41160-50 = "เพราะฉะนั้นตัดสินใจเสียเถอะ"
41160-51 = "จะออกจากสวนสาธารณะไปดีๆ หรือว่าจะสู้ต่ออย่างเปล่าประโยชน์ด้วยอาวุธคุณภาพต่ำนั่นกันล่ะ?"
41160-53 = "ว่าไงนะ? คิดจะลองดีงั้นเรอะ?"
41160-54 = "ถึงพวกฉันจะไม่มีอาวุธเพียงพอ แต่ก็มีระเบิดให้พวกเธอกินจนพุงกางนะ!!"
41160-55 = "ตะ... แต่พวกเราจะเอาชนะกรมความมั่นคงสาธารณะได้เหรอ...? ตอนนี้เรามีกระสุนไม่พอด้วยนะ..."
41160-56 = "เอายังไงดี มิยาโกะจัง...?"
41160-62 = "พวกฉัน..."
41160-63 = "[s] \"หยุดก่อน ทุกคนรอก่อน\""
41160-67 = "คุณครูจากชาเล่ต์เหรอ? ทำไมถึงมาอยู่ที่นี่ล่ะ...?"
41160-68 = "อ๋อ จริงสินะคะ ท่านหัวหน้าเคยบอกไว้ว่าคุณครูจากชาเล่ต์จะเข้ามาดูแลกองทหาร RABBIT"
41160-69 = "ถึงคุณครูจะพูดอะไรก็ไม่สามารถกลับการตัดสินใจได้หรอกค่ะ"
41160-70 = "การพัฒนาพื้นที่ของโคะอุซางิทาวน์คือเรื่องที่ผู้ใหญ่หลายคนตัดสินใจมาแล้วค่ะ"
41160-71 = "[s1] \"แต่จู่ๆ จะให้ออกจากสวนสาธารณะไม่ได้หรอก\"\n[s2] \"ขอเวลาให้นักเรียนคิดตัดสินใจหน่อยสิ\""
41160-72 = "ฉันว่าเราให้เวลาตัดสินใจมานานพอแล้วนะคะ"
41160-73 = "ฉันว่าเราให้เวลาตัดสินใจมานานพอแล้วนะคะ"
41160-77 = "แต่ก็ได้ค่ะ..."
41160-78 = "ฉันเห็นแก่หนี้ที่ติดค้างคุณครูไว้ก่อนหน้านี้หรอกนะคะ งั้นวันนี้ฉันกลับก่อนก็ได้ค่ะ"
41160-79 = "แต่รู้ไว้ด้วยนะคะว่าพวกฉันไม่ได้จะใจดีด้วยไปตลอด"
41160-80 = "หากกองทหาร RABBIT ไม่ย้ายออกไปภายในสิ้นเดือนนี้ พวกฉันก็คงไม่มีทางเลือกอื่นนอกจากต้องใช้#nกำลังด้วยแล้วค่ะ"
41160-81 = "เพราะฉันเองก็มี \"สิ่งที่ต้องรักษาเอาไว้\" เหมือนกันค่ะ"
41160-85 = "ถอนกำลัง! เราจะมารื้อถอนโคะอุซางิ การ์เด้นคราวหน้า!"
41160-95 = "ยังมาทำเป็นเก่งกันอีก คราวที่แล้วก็ชนะไปอย่างหวุดหวิดด้วยความช่วยเหลือจากชาเล่ต์ไม่ใช่เหรอ!"
41160-96 = "ว่าแต่อาวุธของกรมความมั่นคงสาธารณะดีขึ้นจากคราวที่แล้วอีกนะคะ"
41160-97 = "โมเอะ อาวุธที่หัวหน้ากรมฯ คันนะกับนักเรียนจากกรมความมั่นคงสาธารณะถือมาเมื่อกี๊เป็นอาวุธจาก <ไคเซอร์ อินดัสทรี> หรือเปล่าคะ?"
41160-99 = "อื้ม ไม่ผิดแน่ มันคืออาวุธที่เราจะซื้อจาก <ไคเซอร์ อินดัสทรี> ตอนนั้นน่ะ"
41160-100 = "ว่าแต่คนขี้เหนียวจากวัลคิรี่ไปซื้ออาวุธแพงๆ แบบนั้นมาได้ยังไงนะ? ไม่เห็นจะเข้าใจเลย"
41160-101 = "จะว่าไป เมื่อกี๊เหมือนได้ยินหัวหน้ากรมฯ พูดว่ามีสปอนเซอร์..."
41160-102 = "[s] \"หรือว่าจะได้เงินคืนมา...\""
41160-103 = "เงินคืนเหรอคะ...?"
41160-104 = "ระบบเพื่อส่งเสริมการขายที่ซื้อสินค้าแล้วจะได้รับส่วนต่างคืนงั้นเหรอ?"
41160-105 = "<ไคเซอร์ อินดัสทรี> ได้ประโยชน์อะไรถึงคืนส่วนต่างให้สถาบันฝึกตำรวจวัลคิรี่นะ?"
41160-107 = "(คุณครูบอกความคิดของตัวเองให้กองทหาร RABBIT ฟัง)"
41160-110 = "อย่างนี้เองเหรอคะ..."
41160-111 = "<ไคเซอร์ คอนสตรัคชั่น> ที่ดูแลการพัฒนาโคะอุซางิ ทาวน์ เป็นบริษัทเครือเดียวกันกับ <ไคเซอร์ อินดัสทรี> แบบนี้การโยกย้ายเงินทุนคงทำได้อย่างอิสระสินะคะ"
41160-112 = "ถ้า <ไคเซอร์ คอนสตรัคชั่น> ได้ประโยชน์จากการที่คนไร้บ้านออกไปจากโคะอุซางิ ทาวน์ และ <ไคเซอร์ อินดัสทรี> มอบอาวุธเป็นส่วนต่างให้กรมความมั่นคงสาธารณะละก็..."
41160-114 = "กรมความมั่นคงสาธารณะก็จะได้อาวุธกับกระสุนเป็นของตอบแทนที่ช่วยไล่คนไร้บ้านให้"
41160-115 = "แบบนี้มันผิดกฎหมายไม่ใช่เหรอ?"
41160-116 = "ผิดกฎหมายแน่นอนค่ะ"
41160-117 = "ตอนนี้นักเรียนโรงเรียนตำรวจที่ต้องทำงานเพื่อประชาชนกำลังทำงานให้องค์กรธุรกิจอื่นเพื่อผล#nประโยชน์ส่วนตัว"
41160-118 = "ตำรวจสมรู้ร่วมคิดกับองค์กรธุรกิจเพื่อโจมตีประชาชนงั้นเหรอ..."
41160-119 = "โลกหมุนจนฉันตามไม่ทันแล้ว"
41160-120 = "นั่นน่ะสิ ถึงแม้เราจะไม่ได้อยู่ในฐานะที่พูดแบบนั้นได้ก็เถอะ..."
41160-121 = "[s] \"ถึงจะมั่นใจ แต่เราก็ยังไม่มีหลักฐาน\""
41160-122 = "จริงด้วยสินะคะ"
41160-123 = "เราคงตรวจสอบการซื้ออาวุธใหม่ของกรมความมั่นคงสาธารณะจากภายนอกไม่ได้หรอกค่ะ"
41160-125 = "นอกจากนี้ข้อมูลการซื้อขายของสถาบันฝึกตำรวจวัลคิรี่ยังบันทึกไว้ในเซิร์ฟเวอร์ของตัวเอง จะให้แฮ็กก็คงทำไม่ได้"
41160-126 = "โธ่เอ๊ย... ถ้าเรามีหลักฐานที่มัดตัวได้ ก็น่าจะทำลายแผนการของพวกนั้นได้..."
41160-127 = "เราไม่มีวิธีอื่นแล้วเหรอ?"
41160-133 = "ถ้าเราแอบเข้าอาคารส่วนกลางของสถาบันฝึกตำรวจวัลคิรี่ ก็อาจจะเอาบันทึกการซื้อขายมาได้นะ..."
41160-138 = "นี่เธอรู้ตัวหรือเปล่าว่ากำลังพูดอะไรอยู่?"
41160-139 = "อาคารส่วนกลางของสถาบันฝึกตำรวจวัลคิรี่ไม่ต่างกับป้อมปราการที่มีกองกำลังติดอาวุธหลายร้อยคน#nเลยนะ!"
41160-140 = "ถึงจะได้กำลังสนับสนุนดีๆ ก็อาจจะแพ้ก็ได้..."
41160-141 = "ลำพังพวกเราเองคงไม่ไหวหรอก..."
41160-142 = "ถ้าเป็นเรื่องแบบนี้เราคงทำได้แค่แจ้งความแล้วก็รอการสืบสวน"
41160-143 = "[s] \"แจ้งความโรงเรียนตำรวจ แล้วจะให้ไปแจ้งที่ไหนล่ะ?\""
41160-144 = "นั่นสินะ...? ถ้าปัญหามาจากโรงเรียนตำรวจ แล้วใครจะเป็นคนจัดการนะ?"
41160-145 = "หน่วยงานความปลอดภัยอื่นที่สามารถตรวจสอบปัญหาที่เกิดในสถาบันฝึกตำรวจวัลคิรี่ได้ คงมีเพียง..."
41160-151 = "มีเพียง SRT เท่านั้นค่ะ"
41160-153 = "จริงด้วย ก็พวกเราไงล่ะ?"
41160-154 = "ถ้าไม่ใช่พวกเราก็ไม่มีใครที่ทำได้"
41160-155 = "แต่ว่า... ตอนนี้เรามีสิทธิ์ทำแบบนั้นเหรอ?"
41160-156 = "ตอนนี้พวกเราไม่มีโรงเรียนอยู่แล้วนะ..."
41160-157 = "[s] \"ถ้าพวกเธอเชื่อแบบนั้น...\""
41160-159 = "คุณครู...?"
41160-165 = "[ns3] \"ไปสืบหาหลักฐานมาเถอะ ถ้าเกิดอะไรขึ้นครูจะรับผิดชอบเอง\"\n[ns4] \"แล้วระวังอย่าให้เจ็บตัวกันด้วยละ\""
41160-170 = "ช่างเป็นผู้ใหญ่ที่ไม่มีแผนรับมือเลยนะคะ..."
41160-171 = "นี่คุณครู ที่พูดออกมาน่ะ เข้าใจความหมายของคำว่ารับผิดชอบใช่ไหม?"
41160-172 = "ซื่อบื้อหรือเปล่า...?"
41160-173 = "เหมือนคนซื่อบื้อเลย... ฮิฮิ"
41160-178 = "แต่ก็ขอบคุณที่ทำให้พวกเราเข้าใจได้อย่างถ่องแท้นะคะ"
41160-179 = "พวกเราคือ SRT หน่วยรบพิเศษที่เคลื่อนไหวเร็วที่สุดในคิโวทอส"
41160-184 = "ผู้ที่ปราบอาชญากรที่ทำผิดกฎได้อย่างรวดเร็ว..."
41160-185 = "ผู้ที่ยิงอัดกระสุนใส่คนร้ายเป็นการลงโทษ..."
41160-186 = "แล้วแอบหนีออกมาก่อนที่ทุกคนจะรู้ตัว..."
41160-188 = "ถ้าคนที่ร่วมมือกับองค์กรธุรกิจแล้วทำเรื่องผิดกฎหมายคือตำรวจชั้นหนึ่งของสถาบันฝึกตำรวจวัลคิรี่ การเปิดเผยความจริงตามขั้นตอนปกติคงเป็นไปได้ยากค่ะ"
41160-189 = "และปฏิบัติการครั้งนี้ก็สอดคล้องกับอุดมการณ์ที่ผ่านมาของสถาบันพิเศษ SRT"
41160-193 = "ทุกคนคะ เตรียมอาวุธและอุปกรณ์ที่จำเป็นสำหรับการบุกเข้าไปเลยค่ะ"
41160-194 = "จากนี้พวกเราจะ..."
41160-196 = "เริ่ม <ปฏิบัติการโคลเวอร์> เพื่อค้นหาหลักฐานเงินคืนที่ผิดกฎหมายของกรมความมั่นคงสาธารณะ#nวัลคิรี่ค่ะ!"
41160-198 = "ตอนต่อไป;ปฏิบัติการโคลเวอร์ 1"

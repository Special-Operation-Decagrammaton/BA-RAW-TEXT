[translation]
41160-1 = "Episode 16; Rebate"
41160-5 = "There's an unwelcome face."
41160-6 = "Aren't you the Feral Hound of Valkyrie Police School?"
41160-8 = "It's Ogata Kanna. But to you, it's Director."
41160-9 = "I hardly think you and I are on nickname terms."
41160-10 = "Apologies, Director. What brings you here?"
41160-11 = "That's a weird question for a band of criminals to ask a Valkyrie officer, don't you think?"
41160-12 = "We've let you vagabonds run rogue for too long now. You are under arrest for illegally occupying a public park and inciting terror in the surrounding community."
41160-13 = "Hey, dummy. The Chief of Defense was the one who said we could live here."
41160-14 = "You're trying to tell me, Miss Director, that you're going against your superior's directive?"
41160-15 = "How foolish."
41160-16 = "Tell me, when did the Chief say you could stay here?"
41160-17 = "She may have suspended your punishment, but she never explicitly approved your occupation here."
41160-23 = "She's right. The park's management falls under the purview of the Culture Office, not Defense."
41160-24 = "We were only granted a suspension of expulsion. We aren't technically allowed to be here."
41160-25 = "So they're just gonna kick a bunch of homeless kids out of a park?"
41160-26 = "That solves absolutely nothing! You're ignoring the real issues here."
41160-27 = "B-But how come the P-Public Peace Bureau is arresting us?"
41160-28 = "Sh-Shouldn't the Security Bureau do that k-kinda stuff?"
41160-33 = "Yes, homeless eviction does fall under their purview. Unless we at the Public Peace Bureau determine there is a terrorist threat to Kivotos' safety."
41160-34 = "Which would be our current circumstances."
41160-36 = "Alright, fine! We may not have approval, but we have no intention of leaving. Are you going to drag us out by force?"
41160-37 = "Heeheehee. Maybe you've got bad memory, but I remember you all going ka-boom and running out with your tail between your legs the last time you tried."
41160-38 = "Watch yourself, Kazekura Moe. The Valkyrie has eyes and ears everywhere."
41160-39 = "Didn't you lose most of your equipment during the rainstorm last week?"
41160-40 = "Ugh."
41160-41 = "I also know you sold said equipment to purchase new ones, but it's not nearly enough to adequately defend an area as large as this park."
41160-42 = "Why don't you try us? The Public Peace Bureau's recently secured firepower beyond your wildest dreams thanks to our sponsors."
41160-43 = "You're outnumbered and outgunned. No amount of elite combat skills is getting you out of this mess."
41160-50 = "We've got two options here."
41160-51 = "You can comply and handle this quietly, or you can fight your losing battle with your useless little toy guns."
41160-53 = "What? Are you challenging SRT Academy?"
41160-54 = "Guns aren't even my weapons of choice. Maybe you'd like to meet some of my incendiary babies."
41160-55 = "I-Is that enough for us to w-win though? We don't even have ammo..."
41160-56 = "Miyako, h-help..."
41160-62 = "RABBIT Squad, we—"
41160-63 = "[s] \"Wait a minute.\""
41160-67 = "Sensei? What are you doing here?"
41160-68 = "Ah, it slipped my mind. Chief of Staff did leave the treatment of the RABBIT Squad under Schale's discretion."
41160-69 = "Hate to break it to you, but even you have no say here."
41160-70 = "People way above your pay grade have already given their orders for Kousagi Town's redevelopment."
41160-71 = "[s1] \"You can't just force them to leave without any warning.\"\n[s2] \"Give them some time to think it over.\""
41160-72 = "They've had more than enough time."
41160-73 = "They've had more than enough time."
41160-77 = "...Understood."
41160-78 = "Consider this me paying my debts. I'll pull back for today."
41160-79 = "But we can't afford to sit on our hands forever."
41160-80 = "Either the RABBIT Squad vacates the premises by the end of the month, or we'll vacate them."
41160-81 = "...Even I have to \"fall in line,\" after all."
41160-85 = "Pull back! Mission postponed."
41160-95 = "The nerve! We were wiping the floor with her last time until Sensei stepped in."
41160-96 = "It doesn't change the fact that the Public Peace Bureau's beefed up significantly since then."
41160-97 = "Moe. Were you able to confirm if their firearms were manufactured by Kaiser Industries?"
41160-99 = "Duh. Clear as day, those are the weapons we were trying to buy from Kaiser."
41160-100 = "How could those snot-nosed cheapskates at Valkyrie afford such expensive weapons? I'm baffled."
41160-101 = "The chief mentioned a sponsor..."
41160-102 = "[s] \"...Maybe they got a rebate.\""
41160-103 = "A rebate?"
41160-104 = "It's a sales strategy companies use. If you buy in bulk from us, we'll pay you back a percentage of it. Scratching each other's backs."
41160-105 = "But the way I see it, only Valkyrie's getting their back scratched here. What's Kaiser getting out of it?"
41160-107 = "(I shared my theory with the RABBIT Squad.)"
41160-110 = "...I see."
41160-111 = "Kaiser Construction is in charge of Kousagi Town's redevelopment, and is a subsidiary like Kaiser Industries. Moving funds between the two would pose no problems."
41160-112 = "The only thing standing in between Kaiser Construction and profit is the homeless population in Kousagi. So they share weapons from Kaiser Industries with Valkyrie and in return..."
41160-114 = "That means those dirty cops are getting paid in weapons to kick out all the homeless people for Kaiser!"
41160-115 = "Isn't that illegal?"
41160-116 = "It's definitely illegal."
41160-117 = "If Sensei's theory is correct, Valkyrie Police School, meant to be for the people, is acting as a mercenary organization for private profit."
41160-118 = "The police colluding with corporations for wealth? At the expense of the citizens?"
41160-119 = "It's unjust."
41160-120 = "W-We might not be great right now, but we're not that bad."
41160-121 = "[s] \"Of course, this is just my theory.\""
41160-122 = "Just a theory..."
41160-123 = "Well, as of right now we have no way to confirm nor deny how the Public Peace Bureau acquired their weapons."
41160-125 = "Valkyrie's transaction records are all stored on a local server, so I can't even hack them. And I've absolutely tried."
41160-126 = "If we could just get our hands on some evidence..."
41160-127 = "A-Are we doomed?"
41160-133 = "We could infiltrate Valkyrie Police School's main building and obtain their transaction records."
41160-138 = "Are you actually stupid?"
41160-139 = "Their school is crawling with, at the VERY least, hundreds of highly-armed military forces. It's a fortress!"
41160-140 = "E-Even with supplies and backup, I think it's impossible..."
41160-141 = "We would f-fail on our own..."
41160-142 = "I hate to admit it, but all we can do is make a report and twiddle our thumbs."
41160-143 = "[s] \"And where do you submit a report about a police school?\""
41160-144 = "...Huh. When the police cross the line, who DO you go to?"
41160-145 = "When Valkyrie Police School commits a violation, the only secondary police force that can investigate them is..."
41160-151 = "...Us. SRT Academy."
41160-153 = "Who else but us?"
41160-154 = "Our entire purpose is to handle situations like this."
41160-155 = "B-But... Do we have the authority?"
41160-156 = "We don't even have a real school anymore."
41160-157 = "[s] \"Do you believe you're doing what's right?\""
41160-159 = "Sensei?"
41160-165 = "[ns3] \"Go ahead. I'll take responsibility for the blowback.\"\n[ns4] \"Be careful. Come back safely.\""
41160-170 = "...You really are the strangest."
41160-171 = "Hey, Sensei. Is the word responsible even in your dictionary?"
41160-172 = "Are you stupid or something?"
41160-173 = "S-So stupid... Heehee."
41160-178 = "But you did remind me of something."
41160-179 = "We are the SRT. The fastest-deploying special forces unit in all of Kivotos."
41160-184 = "We subdue any criminals in violation of public order..."
41160-185 = "Punish them with the might of all available firepower..."
41160-186 = "...A-And silently liquidate them before anyone is the wiser."
41160-188 = "If the executives of Valkyrie are truly colluding with a corporation, uncovering evidence will be no easy matter."
41160-189 = "This mission's purpose aligns with the objectives and justice SRT Academy has always upheld."
41160-193 = "RABBIT Squad! Begin preparations for an infiltration mission!"
41160-194 = "As of this moment..."
41160-196 = "We are commencing Operation Clover to secure proof of the Valkyrie Public Peace Bureau's illegal rebate!"
41160-198 = "Next Episode; Operation Clover 1"

[translation]
41160-1 = "第16話;リベート"
41160-5 = "あなたは……。"
41160-6 = "ヴァルキューレ警察学校の「狂犬」……。"
41160-8 = "……カンナだ。せめて公安局長と呼べ。"
41160-9 = "嫌いなあだ名ではないが、そもそも私たちはあだ名で呼び合うような仲ではないだろう。"
41160-10 = "公安局長、ここには何のご用で？"
41160-11 = "自分たちの行いを理解した上で、その質問をしているのか？"
41160-12 = "市民たちが使うための公園を不法占拠し、地域社会に不安をもたらしている存在がいる……そう聞いて、取締りに来ただけだ。"
41160-13 = "とはいえ、ここにいて良いって言ったのは防衛室長なんだよ？まあシャーレ経由だけど。"
41160-14 = "ヴァルキューレの公安局長が、上官の命令に逆らって良いわけ？"
41160-15 = "何か勘違いをしているようだな。"
41160-16 = "防衛室長が、「この公園に滞在して良い」と仰ったことは無い。"
41160-17 = "ただ、「貴様らの処罰を保留する」と言っただけだ。"
41160-23 = "……さらに言えば、公園の管理は防衛室の管轄ではありません。"
41160-24 = "つまり、私たちに立ち退きを要求することは正当である……そういうことでしょうか？"
41160-25 = "……帰る場所が無いって知ってるくせに。"
41160-26 = "良い性格してんね、公安局長さん？"
41160-27 = "で、ですが、公安局が直接……？"
41160-28 = "治安関連でしたら、警備局の管轄なのでは……。"
41160-33 = "ああ、基本的にはそうだ。"
41160-34 = "……普通の状況だったらな。"
41160-36 = "よく分からないけど、無理やり追い出しに来たわけ？"
41160-37 = "別に良いけど、前回は散々な結果だったのを忘れたわけ？"
41160-38 = "[ruby=かぜくら]風倉[/ruby]、言葉は慎重に選んだ方が良い。"
41160-39 = "聞いたところによると先日の大雨で、RABBIT小隊の装備はほとんど浸水したらしいな？"
41160-40 = "……。"
41160-41 = "中古品を売って、新しい装備を手に入れたことも聞いている。しかし公園全体をカバーするには心許ないのではないか？"
41160-42 = "公安局は今回、スポンサーの協力を得て大量の火器を確保した。"
41160-43 = "貴様らがエリートだということは知っている、しかし数的優位を覆せるかどうかは別の話だ。"
41160-50 = "さあ、早めに決めろ。"
41160-51 = "おとなしくこの公園を去るか、それとも試しにその粗悪な銃器で戦いを挑むか。"
41160-53 = "はっ、本当にやる気みたいだな。"
41160-54 = "武器が足りなくたって、あんたたちに一泡吹かせることはできるけど？"
41160-55 = "で、でも、実際勝てるかな……？"
41160-56 = "ど、どうしよう、ミヤコちゃん……。"
41160-62 = "私たちは……"
41160-63 = "[s] \"ちょっと待ってもらえる？\""
41160-67 = "……シャーレの先生？どうしてここに……。"
41160-68 = "……防衛室長から聞きました、RABBIT小隊の待遇はシャーレに一任すると。"
41160-69 = "しかし、これは別件です。先生の指示だとしても、決定を覆すことはできません。"
41160-70 = "子ウサギタウンの再開発は、すでに決定事項ですから。"
41160-71 = "[s1] \"でも、いきなり出ていけと言われてもちょっと困る。\"\n[s2] \"少しで良いから、みんなが考える時間をくれない？\""
41160-72 = "時間なら、これまで十分あったかと思いますが……。"
41160-73 = "時間なら、これまで十分あったかと思いますが……。"
41160-77 = "……良いでしょう。"
41160-78 = "先生には借りがありますので……今日は引き上げることにします。"
41160-79 = "しかし、いつまでも放置することはできません。"
41160-80 = "ざっくり計算して、今月末までかと思います。そのタイミングにまだこの公園にいるようであれば、こちらも武力行使せざるをえません。"
41160-81 = "……私たちにも「守るべきライン」がありますので。"
41160-85 = "……撤収！"
41160-95 = "前回もシャーレありきだったくせに、偉そうに。"
41160-96 = "ですが、武装が強化されていたのは事実のようです。"
41160-97 = "モエ、あれは「カイザーインダストリー」の銃器で間違いないですか？"
41160-99 = "だね。"
41160-100 = "にしてもほんと、あのケチなヴァルキューレがどうしてカイザーのを買えたんだか。理解できないね。"
41160-101 = "そういえばさっき、「スポンサー」って……。"
41160-102 = "[s] \"……リベートかな。\""
41160-103 = "……「リベート」？"
41160-104 = "それって「割り戻し」のこと？支払った分の一部が返って来るやつ？"
41160-105 = "たとえそうだとして、「カイザーインダストリー」は何の得があってヴァルキューレにそんなことを……？"
41160-107 = "（考えていることを、RABBIT小隊のみんなに話してみた）"
41160-110 = "……なるほど。"
41160-111 = "子ウサギタウンの開発を手がけている「カイザーコンストラクション」は、武器を扱う「カイザーインダストリー」と同じ系列会社。"
41160-112 = "資金の移動は比較的簡単です。もし「カイザーコンストラクション」が子ウサギタウンの開発によって得られるであろう利益を、「カイザーインダストリー」が事前に武器として還元することで公安局へと流していたら……。"
41160-114 = "公安局はその武器の対価として、放浪者たちを追い出せば良いと。"
41160-115 = "……それ、違法じゃないのか？"
41160-116 = "はい、もちろん違法です。"
41160-117 = "市民に奉仕すべき警察学校が、私企業のために働いているわけですから。"
41160-118 = "警察と企業が結託して市民を攻撃とか……"
41160-119 = "意味分かんないなもう。"
41160-120 = "わ、私たちも何とも言えない立場だけど……。"
41160-121 = "[s] \"もちろん、まだ色々と推測の域だけど……。\""
41160-122 = "そうですね、"
41160-123 = "公安局が本当にカイザーインダストリーと取引をしたのかどうかも分かりません。"
41160-125 = "ヴァルキューレの記録ってことは、多分ローカルサーバーでしょ。外からのハッキングは無理っぽいな。"
41160-126 = "ちっ、何か決定的な証拠があれば良いのに……。"
41160-127 = "何か、方法は……。"
41160-133 = "……ヴァルキューレに潜入すれば、取引記録があるのではないでしょうか。"
41160-138 = "ミヤコ、お前正気か？"
41160-139 = "ヴァルキューレの本館ってことだろ？あの要塞、何百人いると思ってるんだ？"
41160-140 = "ちゃんとした支援があっても、難しいんじゃ……？"
41160-141 = "今の私たちの力じゃ、多分……。"
41160-142 = "普通に通報するってことで良いんじゃないの？"
41160-143 = "[s] \"警察の問題を、警察に？\""
41160-144 = "……確かに。どっちもヴァルキューレだったわ。"
41160-145 = "ヴァルキューレでトラブルがあった時、これを調査する上位機関……。"
41160-151 = "それが、SRTのはずです。"
41160-153 = "確かに、そういやそうだね。"
41160-154 = "私たちがやるしかない、か……じゃないと、他に誰も解決できない。"
41160-155 = "でも、良いのかな……。"
41160-156 = "今の私たちは、学校も無いし……"
41160-157 = "[s] \"……君たちがそう信じるなら。\""
41160-159 = "……先生？"
41160-165 = "[ns3] \"いってらっしゃい、いざという時は責任取るから。\"\n[ns4] \"できるだけ、怪我の無いようにね。\""
41160-170 = "……変な人ですね。"
41160-171 = "先生、本当に「責任」って言葉の意味分かってる？"
41160-172 = "はっ、やっぱりバカだったか。"
41160-173 = "ふふっ……。"
41160-178 = "ですが、おかげさまで決意は固まりました。"
41160-179 = "……私たちはSRT。キヴォトスにおける込み入った犯罪行為に対し、真っ先に投入される特殊部隊。"
41160-184 = "秩序維持のため、犯罪者を速やかに制圧し……"
41160-185 = "可能な限り全火力を瞬く間に投下し……"
41160-186 = "……気づかれる前にその場を去る。"
41160-188 = "ヴァルキューレが私企業と結託して、不法行為を行おうとしている……その可能性がどれだけ高くても、正規の手続きでは解明できないでしょう。"
41160-189 = "まさに、SRTとして介入するべき任務です。"
41160-193 = "みなさん、作戦の準備を。"
41160-194 = "これより、ヴァルキューレ公安局の違法リベートに関する証拠を確保するため……"
41160-196 = "「クローバー作戦」を、開始します！"
41160-198 = "次回;クローバー作戦（１）"

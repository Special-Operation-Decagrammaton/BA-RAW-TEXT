[translation]
41160-1 = "第16話;回扣"
41160-5 = "你是……"
41160-6 = "女武神警察學園的「狂犬」……"
41160-8 = "……我叫環奈。至少也叫我公安局長吧。"
41160-9 = "雖然我不討厭那綽號，但我們也不是能用綽號相互稱呼的關係。"
41160-10 = "公安局長，來這裡有什麼事？"
41160-11 = "問這問題的同時，你們有理解自己的行為嗎？"
41160-12 = "我聽說有人違法佔領市民們使用的公園，為地方社會帶來不安……所以前來取締。"
41160-13 = "然而允許我們待在這裡的可是防衛室長唷？雖然是透過夏萊。"
41160-14 = "女武神的公安局長，可以違背長官的命令嗎？"
41160-15 = "似乎有什麼誤會啊。"
41160-16 = "防衛室長沒有說「可以滯留於這個公園」。"
41160-17 = "只說了「保留你們的處罰」。"
41160-23 = "……此外，公園管理並非防衛室的管轄範圍。"
41160-24 = "因此要求我們離開具有正當性……是那麼回事嗎？"
41160-25 = "……明明知道我們沒有回去的地方。"
41160-26 = "您還真會做人呢，公安局長大人？"
41160-27 = "可，可是，公安局直接來……？"
41160-28 = "治安相關事務，不是警備局管轄嗎……"
41160-33 = "啊啊，基本上是那樣。"
41160-34 = "……如果是普通狀況的話。"
41160-36 = "雖然不太清楚，反正怎樣都要趕我們走是吧？"
41160-37 = "那也沒關係，忘記上次狼狽的結果了嗎？"
41160-38 = "風倉，勸你講話慎重點。"
41160-39 = "聽說前幾天的大雨，RABBIT小隊的裝備幾乎都浸水了啊？"
41160-40 = "……"
41160-41 = "也聽說有賣掉中古品，獲得新裝備。不過要顧及整座公園還是力不從心吧？"
41160-42 = "公安局這次，因為贊助商的協助確保了大量的槍械。"
41160-43 = "我知道你們是菁英，不過能不能翻轉數量上的優勢是另一回事。"
41160-50 = "好了，快點決定吧。"
41160-51 = "是要老實離開這座公園，還是要試著用那些粗劣的槍械挑戰。"
41160-53 = "真，真的打算要打呢。"
41160-54 = "就算武器不夠，也能讓你們大吃一驚。"
41160-55 = "可，可是，實際上贏得了嗎……？"
41160-56 = "怎，怎麼辦，都子醬……"
41160-62 = "我們……"
41160-63 = "[s] 「可以等一下嗎？」"
41160-67 = "……夏萊的老師？為什麼在這裡……"
41160-68 = "……我有聽防衛室長說，RABBIT小隊的處置全權交給夏萊。"
41160-69 = "但那與這狀況無關。就算是老師的指示，也沒辦法推翻決定。"
41160-70 = "兔寶寶鎮的都更，已經是決定事項了。"
41160-71 = "[s1] 「但是，突然叫人離開也有點困擾呀。」\n[s2] 「一下下就好了，可以給大家思考的時間嗎？」"
41160-72 = "時間的話，我認為至今為止已經十分足夠了……"
41160-73 = "時間的話，我認為至今為止已經十分足夠了……"
41160-77 = "……好吧。"
41160-78 = "畢竟還有欠老師恩情……今天就先撤退。"
41160-79 = "但這狀況也不能一直擱置。"
41160-80 = "粗估應該只能到這個月底。屆時若還在這個公園，我們也只能動武了。"
41160-81 = "……因為我們也有「必須守護的底線」。"
41160-85 = "……撤退！"
41160-95 = "明明上次也是靠夏萊才贏的，居然還那麼囂張。"
41160-96 = "不過，武裝確實有強化了。"
41160-97 = "萌，那是「凱薩工業」的槍械沒錯嗎？"
41160-99 = "是啊。"
41160-100 = "不過話說回來，那個小氣的女武神是怎麼買下凱薩的東西。無法理解呢。"
41160-101 = "話說剛才有講到「贊助商」……"
41160-102 = "[s] 「……應該是回扣吧。」"
41160-103 = "……「回扣」？"
41160-104 = "是指「部分回饋」嗎？#n會返還部分消費金額的那種？"
41160-105 = "就算如此，這麼對待女武神是能讓「凱薩工業」有什麼好處……？"
41160-107 = "（把所想的事，試著告訴了RABBIT小隊的大家）"
41160-110 = "……原來如此。"
41160-111 = "經手兔寶寶鎮開發的「凱薩建設」，和處理武器的「凱薩工業」是同一個集團裡的公司。"
41160-112 = "資金移動會相對簡單。如果「凱薩建設」將開發兔寶寶鎮能獲得的利益，透過「凱薩工業」事先轉化為武器流向公安局……"
41160-114 = "那麼公安局就要趕走遊民，作為武器的價金。"
41160-115 = "……這不是違法的嗎？"
41160-116 = "是的，當然違法。"
41160-117 = "應該為民服務的警察學園，卻在為私人企業工作。"
41160-118 = "警察和企業勾結攻擊市民……"
41160-119 = "意義不明啊。"
41160-120 = "雖，雖然我們也不好說人家就是了……"
41160-121 = "[s] 「當然，還只是各種推測的程度……」"
41160-122 = "說得也是呢，"
41160-123 = "公安局也不知道是不是真的和凱薩工業有交易。"
41160-125 = "既然是女武神的記錄，應該會存在本地伺服器吧。似乎無法從外部駭入呢。"
41160-126 = "呿，如果有什麼決定性的證據就好了……"
41160-127 = "有什麼，方法……"
41160-133 = "……是否能潛入女武神，找到交易紀錄呢。"
41160-138 = "都子，你認真的嗎？"
41160-139 = "意思是女武神的本館吧？那個要塞，你以為有幾百個人啊？"
41160-140 = "就算支援充足，也很難吧……？"
41160-141 = "以我們現在的力量，應該……"
41160-142 = "正常通報上去不就好了嗎？"
41160-143 = "[s] 「向警察通報警察的問題？」"
41160-144 = "……確實。哪邊都是女武神呢。"
41160-145 = "女武神有問題時，出面調查的上級機關……"
41160-151 = "原本該由SRT負責。"
41160-153 = "確實是那樣呢。"
41160-154 = "只能由我們來啊……不然也沒有人可以解決呢。"
41160-155 = "可是，可以嗎……"
41160-156 = "現在的我們，沒有學校……"
41160-157 = "[s] 「……如果你們那麼相信的話。」"
41160-159 = "……老師？"
41160-165 = "[ns3] 「去吧，出了事我會負責的。」\n[ns4] 「盡可能不要受傷哦。」"
41160-170 = "……真是奇怪的人呢。"
41160-171 = "老師真的知道「責任」的意義嗎？"
41160-172 = "哈，果然是笨蛋啊。"
41160-173 = "呵呵……"
41160-178 = "不過也因此堅定了我的決心。"
41160-179 = "……我們是SRT。#n面對奇普托斯錯綜複雜的犯罪行為，將最先被投入的特殊部隊。"
41160-184 = "為了維持秩序，迅速壓制犯罪者……"
41160-185 = "盡可能瞬間釋出所有火力……"
41160-186 = "……在被察覺前離開現場。"
41160-188 = "女武神和私人企業勾結，有進行違法行為的疑慮……不論可能性多高，依照正常程序恐怕沒辦法揭露吧。"
41160-189 = "這正是我們作為SRT必須介入的任務。"
41160-193 = "各位，準備作戰。"
41160-194 = "現在開始，為了取得女武神公安局收取違法回扣的證據……"
41160-196 = "將展開「幸運草作戰」！"
41160-198 = "下一話;幸運草作戰（１）"

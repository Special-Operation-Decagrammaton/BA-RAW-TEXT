[translation]
3501-1 = "下雪的溫泉"
3501-4 = "……嗯！完成了！！"
3501-5 = "哎呀～今天也做得很棒呢！#n有這種程度的話，大家應該都會喜歡吧，惠醬？"
3501-6 = "哦哦～！！真厲害！！#n感覺是這週挖出的作品裡最漂亮的呢！！"
3501-7 = "嗯嗯！大家一定都會喜歡的！真想趕快讓大家看看！！"
3501-8 = "呼啊～都挖到全身痠痛了呢。#n工程是從昨晚開始的嗎？"
3501-9 = "畢竟這裡的位置還挺偏僻的。#n光是把材料搬來就夠累人了呢。"
3501-10 = "仔細想想，雖然這次的溫泉很棒，但人們真的會跑來這麼遠的地方嗎？"
3501-11 = "唔嗯，這麼說也有道理……"
3501-12 = "該怎麼辦呢……？"
3501-17 = "……嗯？咦……？"
3501-18 = "我們沒必要煩惱這種事吧？#n去問佳澄部長不就行了嗎？"
3501-19 = "部長他肯定知道答案！#n說不定他早就考慮過這個問題了呢！"
3501-24 = "哈哈哈！沒錯沒錯！#n反正我們再怎麼煩惱也想不出什麼好答案。"
3501-25 = "需要動腦的事交給部長就行了，不需要我們在這瞎操心。"
3501-26 = "話說部長人呢？他這次不是也一起來了嗎？"
3501-27 = "有有有。#n我剛才在後面看到他了。"
3501-28 = "那我去問問他吧？#n你們要不要先在這裡休息？"
3501-29 = "唔嗯……惠醬自己一個人去嗎？"
3501-30 = "這是大家一起辛苦完成的，只有我們先休息好像不太好……"
3501-31 = "哎呀～不用在意這種事的！#n我還完全沒問題，精神滿滿的哦！"
3501-32 = "大家應該都累了吧？#n這種時候最適合享受溫泉了！"
3501-33 = "你們就留在這邊好好休息！詢問的事就交給我吧！"
3501-34 = "那我出發了～！"
3501-42 = "惠班長還真是精力充沛。"
3501-43 = "明明他才是負責最多工作的人……聽說他甚至可以單獨造出小型的溫泉哦。"
3501-44 = "咦！？自己一個人就能……這是真的嗎？#n應該只是開玩笑的吧？"
3501-45 = "我也不確定，不過光從今天的工作量來看……"
3501-46 = "……如果是班長，恐怕還真的能做到。"
3501-47 = "實在太了不起了。"
3501-48 = "對吧對吧？不愧是我們的前部長。"
3501-49 = "……嗯？"
3501-50 = "那是什麼意思……？#n前部長？"
3501-51 = "咦……你不知道嗎？"
3501-52 = "啊啊，畢竟你才剛來沒多久嘛。#n仔細想想，其實還挺多人不知道這件事的……誰叫我們解散又重組了那麼多次。"
3501-53 = "本來惠醬才是這裡的部長……是在佳澄部長來了之後，惠醬才把位置交給他的。"
3501-54 = "為什麼呢？"
3501-55 = "這我就不知道了。#n具體的原因我也沒問過。"
3501-56 = "可能是因為佳澄部長很聰明，所以覺得他能做得更好吧？#n畢竟惠醬本來就不是那種會拘泥於職位的類型。"
3501-57 = "……如果真是這樣的話，還真符合班長的風格呢。"
3501-58 = "就是說啊……"
3501-60 = "不過這也無關緊要啦！哈哈！"
3501-64 = "部長～～！！佳澄部長～～～！！！"
3501-65 = "……嗯？"
3501-66 = "哦～！惠！！#n發生什麼事了嗎？怎麼突然叫這麼大聲？"
3501-67 = "部長～！！"
3501-68 = "咦？部長已經先進去泡溫泉了嗎？#n平常明明都最後才進去的說？"
3501-69 = "哈哈，是啊。#n不過也沒什麼特別的理由，單純只是心血來潮而已。"
3501-70 = "因為想起了以前的事，今天突然有了興致。"
3501-71 = "話說回來，找我有什麼事嗎？#n本來以為惠會和大家待在一起的，怎麼一個人來找我……"
3501-72 = "難道是出了什麼問題？"
3501-73 = "嗯？沒有哦？#n……啊，好像也不能說沒有。實際上應該算是有問題吧……？"
3501-74 = "因為這裡太偏遠了，部員們擔心其他人會不會想來！"
3501-75 = "我們光是把材料運過來就費了不少工夫，其他人真的會來嗎？"
3501-76 = "哈～哈哈哈哈！！我還以為是出了什麼事呢。"
3501-77 = "不必擔心，惠！#n運材料跟搭接駁車完全是兩回事嘛！"
3501-78 = "雖然這裡是坡道，但路都已經鋪設完畢了。#n之後只要安排幾輛接駁巴士就沒問題了。"
3501-80 = "哦哦──！不愧是部長……！"
3501-84 = "……？#n不過我們有巴士嗎？"
3501-85 = "哈～哈哈哈哈！"
3501-86 = "……沒有！"
3501-87 = "不過巴士什麼的，只要去附近找凱薩PMC或黑市的運輸車來改裝一下就行了。"
3501-88 = "一切都在我的掌握之中──這才是最重要的！"
3501-89 = "所以快去告訴其他傢伙們，#n與其花時間在那邊擔心，不如好好泡個溫泉恢復體力！"
3501-90 = "這裡可還沒完工哦！#n溫泉這種東西，不是只要蓋好建築就算完成的！"
3501-92 = "原來如此！#n沒問題～！我待會就去轉達！"
3501-97 = "「雖然不是很懂，但總之先好好休息，明天就會有辦法的！！」──這樣！"
3501-98 = "哈～哈哈哈哈！！真聰明，真聰明！#n不愧是惠，總是能抓住重點呢！"
3501-99 = "耶嘿嘿……#n被部長說聰明，總覺得有點奇怪……"
3501-105 = "嗯？惠？"
3501-106 = "真讓人意外……惠也喜歡這邊的浴池嗎？#n明明其他浴池更大，水也更熱的說。"
3501-107 = "我知道哦！#n只是突然想到部長剛才說的話，所以就一起進來了！"
3501-108 = "剛才說的話……？"
3501-109 = "……啊啊，你指的是以前的事嗎？"
3501-110 = "嗯！部長特別喜歡雪嘛。尤其是雪中的溫泉！！"
3501-111 = "哈哈……"
3501-115 = "……嗯？"
3501-116 = "等等……？#n我以前有這麼說過嗎？"
3501-117 = "應該沒有？你好像沒特別說過。"
3501-118 = "不過我們第一次見面的時候，你不就躺在雪裡睡覺嗎？"
3501-119 = "等我把你放進我建好的溫泉之後，你緊皺眉頭的表情就慢慢變成愉快的微笑了！"
3501-120 = "我皺著眉頭……在雪裡睡覺……？"
3501-121 = "……啊。"
3501-122 = "啊啊……"
3501-123 = "原來如此。#n呵呵……這麼說也對。"
3501-124 = "「在睡覺」啊……這種表達方式，真的很有惠的風格呢。"
3501-125 = "……部長？"
3501-126 = "哈哈。沒事沒事。沒什麼。"
3501-127 = "話說我還是第一次聽說這件事呢！#n當時在溫泉裡的我，露出了愉快的表情是嗎？"
3501-128 = "嗯！所以我一眼就看出來了。#n「這個人，非常喜歡下雪的溫泉啊！」──這樣！"
3501-129 = "這樣啊……"
3501-130 = "……呵呵。"
3501-131 = "……部長？"
3501-132 = "哈～哈哈哈哈！！說的沒錯！#n雪中溫泉才是溫泉真正的醍醐味！上半身冷，下半身暖！"
3501-133 = "對身體跟心情都有幫助，甚至連快死的人都能救活！"
3501-134 = "用溫暖的水把痛苦和傷疤通通沖走吧～！"
3501-135 = "沒錯沒錯～！！這就是溫泉！#n而且還是下雪的溫泉！就像現在一樣！真是太棒了！！"
3501-136 = "啊～！要是其他人也能明白這種美妙就好了。"
3501-137 = "沒事沒事，我遲早會讓他們明白的。#n惠你完全不必擔心。"
3501-138 = "所以今天惠也好～好地休息吧！明天還有堆積如山的工作等著我們哦！"
3501-139 = "嗯嗯！啊，對了！提到休息我才想到，我來這裡是為了問部長問題的說！"
3501-140 = "大家都還在等我呢，我得回去把這些告訴他們才行！！"
3501-141 = "好～小心地板很滑，不要用跑的哦～"
3501-142 = "啊哈哈！那當然！！"
3501-147 = "溫泉啊……#n呵呵。"
3501-151 = "……我當然喜歡。"
3501-153 = "……怎麼能不喜歡呢。"
3501-154 = "下雪的溫泉"

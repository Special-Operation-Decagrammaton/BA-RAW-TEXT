[translation]
3501-1 = "Snowy Hot Springs"
3501-4 = "And...finished!!"
3501-5 = "Nice! Another job well done! I think everyone's going to like it here. Right, Megu?"
3501-6 = "Whoa!! Very nice!! I think this is the prettiest hot spring we've built this week!!"
3501-7 = "Yeah, they're gonna love it. I can't wait to show it off!"
3501-8 = "Urgh... I'm starting to feel pretty sore, though. We've been working since, what, sundown yesterday?"
3501-9 = "Yeah, it wasn't easy hauling the materials all the way out here."
3501-10 = "For sure. Speaking of, since this place IS so far out, do you think enough people can make it here?"
3501-11 = "Hm. Now that you mention it..."
3501-12 = "...what should we do about that?"
3501-17 = "Oh!"
3501-18 = "Why are WE worrying? We can just ask President Kasumi, right?"
3501-19 = "She'll know what to do. She probably ALREADY knows what to do!"
3501-24 = "Haha! You're right! Yeah, it's not our job to think about that stuff."
3501-25 = "For real, leave the thinking to her. Who are we to worry about it?"
3501-26 = "Where is she, though? Didn't she come here with you, Foreman Megu?"
3501-27 = "She's here, she's here. I saw her in the back earlier."
3501-28 = "Why don't I go ask her? You two rest here."
3501-29 = "Uh... Just you, Megu?"
3501-30 = "We all worked hard together to make this. It's kind of awkward for just us to go inside and rest..."
3501-31 = "Aw, don't worry about it! I'm still rarin' to go! Not tired at all!"
3501-32 = "You two are legit exhausted, though, and that's a perfectly good reason to enjoy some hot springs!"
3501-33 = "Go on, take a load off! I'll talk to the president."
3501-34 = "And I'm off!"
3501-42 = "She never runs out of energy, does she?"
3501-43 = "Even though she worked the hardest. I've heard she can build a whole hot spring site all by herself. A little one, at least."
3501-44 = "Eh?! All alone...? For real? That has to be a joke, right?"
3501-45 = "Who knows? But, seeing how much she got done last night..."
3501-46 = "...I think the foreman could pull it off."
3501-47 = "Wow, she's something."
3501-48 = "Right? Right? There's a reason she used to be the president."
3501-49 = "...Huh?"
3501-50 = "...Wait, she used to be the president?"
3501-51 = "Oh, you didn't know?"
3501-52 = "Ah, I guess it hasn't been that long since you joined. ...Actually, a lot of people might not know. We've disbanded and gotten back together multiple times."
3501-53 = "Well, Megu used to be the president here. Then, you know, now-President Kasumi came along, and Megu handed off the position."
3501-54 = "Why'd she do that?"
3501-55 = "I don't know. I didn't ask for the details."
3501-56 = "Maybe just 'cause Kasumi's smart and super-qualified? Plus Megu doesn't really seem to care about power."
3501-57 = "...Yeah, that sounds like our foreman, all right."
3501-58 = "Haha! Well..."
3501-60 = "...I guess it doesn't really matter now. Haha."
3501-64 = "President!! President Kasumi!!"
3501-65 = "...Hmm?"
3501-66 = "Megu, whoa!! Why are you being so loud?"
3501-67 = "President!!"
3501-68 = "Oh, you're already taking a dip? I thought you were usually the last one in."
3501-69 = "Haha, well, I just felt like it. No particular reason."
3501-70 = "I was thinking back to...well, something that motivated me. Let's put it that way."
3501-71 = "So what's going on? And...where's everybody else? You don't usually come out to talk to me alone."
3501-72 = "Is there a problem?"
3501-73 = "Hm? No. Or...yes, maybe..."
3501-74 = "The team pointed out that this place is really far from civilization."
3501-75 = "I mean, we had to haul those materials REALLY far. Is anyone else gonna want to make that trip?"
3501-76 = "Wahahahaha!! I was wondering what you were going to say."
3501-77 = "No need to worry. Remember, they're not going to be hauling materials like we were. They're just going to ride a shuttle bus."
3501-78 = "Uphill on a winding road, sure, but the road's clear. A couple of buses, and problem solved."
3501-80 = "Ooh! You're always on top of things, President."
3501-84 = "...Wait, we have buses?"
3501-85 = "Wahahahaha!"
3501-86 = "...No."
3501-87 = "But we can hit up the Black Market for a couple of big vans, or buy some old troop transports from a PMC, and then touch them up to LOOK like buses."
3501-88 = "The point is, it's all been thought out. That's the point, you got it?"
3501-89 = "So tell the others if they've got time to worry, they've got time to rest up and recharge!"
3501-90 = "Hot springs aren't done just because you finish the buildings, you know! They don't count as hot springs until you use them!"
3501-92 = "I see! Okay! I'll make sure to tell everyone!"
3501-97 = "I'll tell them, \"I don't really get it, but rest well, and everything will somehow work out tomorrow!!\""
3501-98 = "Wahahaha!! Smart! That's perfect, Megu! You really do get it!!"
3501-99 = "Heehee... Smart, huh? It's strange to hear you say that, President..."
3501-105 = "Hm? Megu?"
3501-106 = "Huh. I wasn't expecting you to do that. You like this hot spring better than the other ones? They're bigger and warmer..."
3501-107 = "I know, but you said something that reminded me of something else."
3501-108 = "What'd I say?"
3501-109 = "...Was it the part about thinking back?"
3501-110 = "That's right! It reminded me that you like snow, and that you like hot springs in the snow even better!"
3501-111 = "Haha..."
3501-115 = "...Wait, what?"
3501-116 = "What are you talking about? I don't think I ever told you that."
3501-117 = "Well, you didn't. Not directly."
3501-118 = "But the first time we met, you were sleeping in the snow, remember?"
3501-119 = "And then, when I made a hot spring and put you in it, your frown turned into a happy smile!"
3501-120 = "I was frowning in my sleep...? In the snow...?"
3501-121 = "...Ah."
3501-122 = "Ahhh..."
3501-123 = "I see. Heehee... Right."
3501-124 = "\"Sleeping\"... Yes, I suppose you would call it that."
3501-125 = "...President?"
3501-126 = "Haha. Nothing. Don't worry about it."
3501-127 = "Anyway, I don't think I've heard this story before! So I looked really happy in the bath?"
3501-128 = "Yeah! So right then, I thought, \"This person must really like hot springs in the snow!\""
3501-129 = "I see..."
3501-130 = "...Fufu..."
3501-131 = "...President?"
3501-132 = "Wahahaha! Of course! Snowy days are the best hot spring times! Cool up top and toasty underneath!"
3501-133 = "It's good for the spirit! And healthy enough, it can bring you back from the brink of death!"
3501-134 = "You can let all that warm water just wash your pain and hurt away!"
3501-135 = "Right? Hot springs! Snowy hot springs! They're the best!"
3501-136 = "More people need to know how it feels!"
3501-137 = "Now, now, they'll find out. Of course they will. One day."
3501-138 = "For now, you just get some rest, Megu! We'll have a lot more to do tomorrow."
3501-139 = "Yup, yup! ...Oh wait, YOU telling me to rest reminds me, I told the TEAM to rest because I was coming to ask you..."
3501-140 = "Ooh, they're probably still waiting. I'll go back and tell 'em what you said!"
3501-141 = "You do that. Don't run. The floors are slippery."
3501-142 = "Haha! Of course they are!!"
3501-147 = "Hot springs, hot springs... Heehee."
3501-151 = "...Of course I like the hot springs. "
3501-153 = "...How could I not?"
3501-154 = "Snowy Hot Springs"

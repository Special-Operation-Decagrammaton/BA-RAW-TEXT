[translation]
3501-1 = "ออนเซ็นในวันหิมะโปรย"
3501-4 = "อื้ม...! เสร็จเรียบร้อย!!"
3501-5 = "อ่า~ วันนี้ก็ทำได้ดีเหมือนเดิมเลยนะ! แบบนี้ทุกคนคงจะต้องชอบกันแน่ๆ ใช่มั้ยเมกุจัง?"
3501-6 = "โอ้ว~!! แจ่มแจ๋ว!! ฉันคิดว่าชิ้นนี้สวยที่สุดในบรรดาอันที่ทำมาในอาทิตย์นี้เลยนะ!"
3501-7 = "อื้อๆ! แบบนี้ใครก็ต้องชอบกันทั้งนั้นแหละ! อยากโชว์ให้คนอื่นเห็นเร็วๆ จัง!"
3501-8 = "อ่า... ว่าแต่ว่าเหนื่อยจังเลย เริ่มทำมาตั้งแต่เมื่อคืนเลยใช่มั้ยนะ?"
3501-9 = "แถมที่นี่ก็ยังอยู่ห่างไกลอีกด้วย แค่การเคลื่อนย้ายอุปกรณ์มาก็ลำบากสุดๆ แล้ว"
3501-10 = "นั่นน่ะสิ พอมาคิดๆ ดูแล้ว ถึงที่นี่จะมีสายน้ำพุร้อนดีๆ แต่ที่ห่างไกลแบบนี้ คนอื่นจะเดินทางมาได้หรือ#nเปล่านะ?"
3501-11 = "อืม ก็จริงนะ..."
3501-12 = "ทำยังไงดีล่ะ...?"
3501-17 = "...? หืม? เอ๊ะ...?"
3501-18 = "แล้วทำไมพวกเราถึงต้องมากังวลเรื่องนี้ด้วยล่ะ? ไปถามหัวหน้าคาสุมิเลยก็ได้ไม่ใช่หรือไง?"
3501-19 = "ถ้าไปถามหัวหน้าจะต้องได้คำตอบแน่ๆ เลย! ไม่สิ บางทีหัวหน้าอาจจะคิดแผนอะไรไว้แล้วก็ได้นะ?"
3501-24 = "ฮ่าฮ่าฮ่า! ใช่แล้ว จริงด้วยสินะ! ต่อให้พวกเรานั่งคิดจนหัวระเบิดก็ไม่ได้คำตอบอะไรหรอก"
3501-25 = "ก็นะ หัวหน้าผู้เฉลียวฉลาดของเราคงจัดการได้นั่นละ พวกเราจะกังวลกันไปทำไม"
3501-26 = "ว่าแต่ว่าหัวหน้าล่ะ? ไม่ได้มาหน้างานด้วยเหรอ?"
3501-27 = "มาๆ เมื่อกี้ยังเห็นยืนอยู่ข้างหลังโน่นเลย"
3501-28 = "งั้นฉันไปถามให้เอามั้ย? พวกเธออยากนั่งพักอยู่ที่นี่ก่อนหรือเปล่า?"
3501-29 = "เอ่อ... เมกุจังจะไปคนเดียวเหรอ?"
3501-30 = "ทุกคนช่วยกันสร้างขึ้นมานะ จะให้พวกเราเข้าไปพักกันก่อน มันก็คงไม่ดีน่ะ..."
3501-31 = "โธ่เอ๊ย~ ไม่ต้องคิดมากหรอก! ทางนี้ไม่ได้เหนื่อยอะไรมากมาย ยังแรงดีอยู่เลย! ฉันไม่เหนื่อยเลยสักนิดเดียว!"
3501-32 = "ทุกคนเหนื่อยกันมากเลยนี่นา? ได้เข้าไปพักแช่ออนเซ็นตอนเหนื่อยๆ แบบนี้น่ะ สุดยอดเลยไม่ใช่หรือไง?"
3501-33 = "พักผ่อนให้สบายๆ เถอะ! เรื่องไปถามหัวหน้าน่ะ ให้เป็นหน้าที่ฉันเอง!"
3501-34 = "เดี๋ยวฉันมานะ~!"
3501-42 = "หัวหน้าเมกุเนี่ยแรงดีไม่มีตกจริงๆ เลยน้า"
3501-43 = "แถมเธอเป็นคนที่ทำงานหนักที่สุดเลยด้วย ฉันได้ยินมาว่า เธอเคยสร้างออนเซ็นขนาดเล็กจนเสร็จ#nด้วยตัวคนเดียวเลยนะ"
3501-44 = "เอ๋!? คนเดียวเลยเหรอ...? เรื่องจริงเหรอเนี่ย? พูดล้อเล่นกันอยู่สินะ?"
3501-45 = "ฉันก็ไม่รู้เหมือนกัน แต่ดูจากงานที่ทำวันนี้แล้ว..."
3501-46 = "ถ้าหัวหน้าได้รับคำสั่งให้ทำ เธอก็คงจะทำได้จริงๆ นั่นแหละนะ"
3501-47 = "สุดยอดจริงๆ เลยนะ"
3501-48 = "ใช่มั้ยล่ะ? เธอเคยเป็นถึงหัวหน้าชมรมมาก่อนเลยนะ"
3501-49 = "หืม...?"
3501-50 = "หมายความว่ายังไงน่ะ? เคยเป็นหัวหน้าชมรมงั้นเหรอ?"
3501-51 = "เอ๋? ไม่รู้หรอกเหรอ...?"
3501-52 = "อ้อ เธอเพิ่งเข้าชมรมมาไม่นานสินะ เอาเถอะ พอคิดดูแล้วก็มีคนที่ไม่รู้อยู่เยอะเหมือนกัน เพราะพวกเรายุบกลุ่มแล้วก็มารวมตัวกันใหม่อยู่บ่อยๆ น่ะ"
3501-53 = "ก็นะ เมื่อก่อนเมกุจังเป็นหัวหน้าชมรมพวกเรานะ พอหัวหน้าคาสุมิเข้ามา เมกุจังก็ส่งมอบตำแหน่ง#nหัวหน้าให้เธอ"
3501-54 = "ทำไมล่ะ?"
3501-55 = "ฉันก็ไม่รู้หรอก ไม่เคยถามรายละเอียดเลยน่ะ"
3501-56 = "เธออาจจะมอบตำแหน่งให้เพราะคิดว่าหัวหน้าคาสุมิฉลาดกว่าและจะทำได้ดีกว่าเธอก็ได้ล่ะมั้ง? เมกุจังไม่ใช่คนประเภทหลงใหลในตำแหน่งอะไรนี่นา"
3501-57 = "ถ้าเป็นเรื่องจริง... คนอย่างเมกุจังนี่มีความเป็นหัวหน้าโดยแท้จริงเลยนะ"
3501-58 = "ฮ่าฮ่า! ก็นะ..."
3501-60 = "ยังไงก็เถอะ มันก็เป็นเรื่องที่ผ่านมาแล้วละนะ ฮ่าฮ่า!"
3501-64 = "หัวหน้า~~!! หัวหน้าคาสุมิ~~~!!!"
3501-65 = "หืม...?"
3501-66 = "โอ้~ เมกุ!! มีอะไรเหรอ? ทำไมเรียกซะเสียงดังเชียว"
3501-67 = "หัวหน้า~!!"
3501-68 = "เอ๊ะ? หัวหน้าลงไปแช่ออนเซ็นก่อนแล้วเหรอเนี่ย? ปกติมักจะลงแช่เป็นคนสุดท้ายเลยไม่ใช่หรือไง?"
3501-69 = "ฮ่าฮ่า เอาเถอะ ไม่มีเหตุผลอะไรเป็นพิเศษหรอก ฉันแค่ใจร้อนไปหน่อยน่ะ"
3501-70 = "ก็แค่คิดถึงเรื่องเก่าๆ ขึ้นมาเลยรู้สึกอยากลงมาแช่น้ำน่ะ"
3501-71 = "ว่าแต่ว่ามีเรื่องอะไรงั้นเหรอ? เมกุถึงออกมาตามหาฉันคนเดียวแบบนี้น่ะ นึกว่าเธอจะอยู่กับสมาชิกคน#nอื่นๆ ซะอีก"
3501-72 = "หรือว่ามีปัญหาอะไรงั้นเหรอ?"
3501-73 = "หืม? เปล่าหรอก อ๊ะ ไม่สิ จะเรียกว่าเป็นปัญหาได้หรือเปล่านะ...?"
3501-74 = "สมาชิกคนอื่นๆ ถามกันว่า \"ที่นี่อยู่ไกลเกินไป คนอื่นๆ จะมาไม่ได้หรือเปล่า\" น่ะ!"
3501-75 = "กว่าจะขนวัสดุอุปกรณ์มาได้ ทุกคนก็ลำบากกันมากๆ เลยนี่นา แล้วคนอื่นๆ จะมาได้หรือเปล่า?"
3501-76 = "วะฮ่าฮ่าฮ่าฮ่า!! นึกว่าจะคุยกันเรื่องอะไรซะอีกนะเนี่ย"
3501-77 = "ไม่ต้องกังวลหรอก เมกุ! การขนวัสดุอุปกรณ์ขึ้นมากับการนั่งรถบัสขึ้นมามันแตกต่างกันมากนะ!"
3501-78 = "ถึงจะเป็นถนนทางลาด แต่ก็เป็นถนนที่ลาดยางอย่างดี เพราะงั้นถ้าหารถบัสรับส่งได้สัก 2-3 คัน ก็ไม่มีปัญหาเรื่องรับส่งคนแล้วละ"
3501-80 = "โอ้วววว! สมกับเป็นหัวหน้าจริงๆ...!"
3501-84 = "...? ว่าแต่ว่าพวกเรามีรสบัสด้วยเหรอ?"
3501-85 = "วะฮ่าฮ่าฮ่าฮ่า!"
3501-86 = "ไม่มีหรอก...!"
3501-87 = "แต่ว่าอย่างพวกรถบัสน่ะ แค่ไปหารถขนส่งในตลาดมืดมาปรับแต่งนิดๆ หน่อยๆ ก็ใช้ได้แล้วละ"
3501-88 = "สิ่งสำคัญคือ... ฉันเตรียมพร้อมสำหรับเรื่องพวกนี้ไว้หมดแล้วละ!"
3501-89 = "เพราะงั้นถ้าพวกสมาชิกคนอื่นๆ มีเวลามากังวลเรื่องไร้สาระแบบนี้ บอกให้พวกเธอเอาเวลาไปแช่น้ำ#nร้อนสบายๆ ชาร์จแบตให้หายเหนื่อยซะเถอะ"
3501-90 = "ออนเซ็นนี้ยังไม่เสร็จสมบูรณ์หรอกนะ! ออนเซ็นน่ะ จะมีแค่ตัวอาคารไม่ได้หรอก!"
3501-92 = "อย่างนี้นี่เอง! โอเค~! ฉันจะไปบอกทุกๆ คนเอง!"
3501-97 = "บอกว่า \"ถึงจะไม่ค่อยเข้าใจเท่าไร เอาเป็นว่าพักเอาแรงให้พอ แล้วพอพรุ่งนี้ก็จะผ่านไปได้ด้วยดีเอง#nนั่นละ!!\""
3501-98 = "วะฮ่าฮ่าฮ่าฮ่า! ฉลาดจริงๆ ฉลาดมาก! สมกับเป็นเมกุจริงๆ เลยเข้าใจได้ตรงจุดที่สุด!!"
3501-99 = "แหะๆ... พอได้ยินหัวหน้าชมว่าฉลาดแล้ว มันรู้สึกแปลกนิดๆ แฮะ..."
3501-105 = "หืม? เมกุ?"
3501-106 = "คาดไม่ถึงเลยนะ ว่าแต่ว่าเธอชอบบ่อน้ำร้อนตรงนี้เหรอ? บ่ออื่นน่าจะใหญ่แล้วก็น้ำอุ่นกว่านะ"
3501-107 = "ฉันรู้! แค่นึกถึงเรื่องที่หัวหน้าพูดขึ้นมาเมื่อกี้เลยอยากลงไปแช่ด้วยน่ะ!"
3501-108 = "เรื่องที่พูดเมื่อกี้เหรอ?"
3501-109 = "อ้อ... เรื่องสมัยก่อน?"
3501-110 = "อื้อ! หัวหน้าชอบหิมะมากเลยนี่นา ยิ่งเป็นออนเซ็นกลางหิมะแบบนี้ยิ่งชอบเข้าไปใหญ่!!"
3501-111 = "ฮ่าฮ่า..."
3501-115 = "หืม...? ว่าอะไรนะ?"
3501-116 = "เอ๊ะ? พูดอะไรน่ะ? ฉันเคยพูดแบบนั้นด้วยเหรอ...?"
3501-117 = "เปล่านะ? หัวหน้าไม่เคยพูดหรอก"
3501-118 = "แต่ตอนที่เจอกันครั้งแรก หัวหน้าก็นอนอยู่บนหิมะนี่นา?"
3501-119 = "พอฉันทำบ่อออนเซ็นแล้วพาหัวหน้าไปแช่ในนั้น ใบหน้าที่ขมวดคิ้วยู่ยี่ก็ค่อยๆ คลายออกเป็นรอยยิ้ม#nแสนสุข!"
3501-120 = "ฉันนอนขมวดคิ้วอยู่เหรอ...? กลางหิมะเนี่ยนะ...?"
3501-121 = "อ่า..."
3501-122 = "อ้อ..."
3501-123 = "งั้นเหรอ ฮุฮุ... จริงด้วยสินะ"
3501-124 = "'ฉันกำลังนอนหลับอยู่'... สมกับเป็นคำพูดของเมกุจริงๆ เลยน้า"
3501-125 = "หัวหน้า...?"
3501-126 = "ฮ่าฮ่า เปล่าๆ ไม่มีอะไรหรอก ไม่มีอะไร"
3501-127 = "ว่าแต่ว่าฉันเพิ่งเคยได้ยินเป็นครั้งแรกเลยนะ ตอนนั้นฉันทำหน้ามีความสุขมากๆ เลยงั้นเหรอ?"
3501-128 = "อื้อ! เพราะงั้นฉันเลยเข้าใจได้ในแว็บเดียวเลยว่า 'ตอนที่หิมะตก คนคนนี้คงชอบมากแน่ๆ เลยสินะ!'"
3501-129 = "งั้นเหรอ..."
3501-130 = "ฮุฮุ..."
3501-131 = "หัวหน้า...?"
3501-132 = "วะฮ่าฮ่าฮ่าฮ่า!! ใช่แล้วละ! วันที่หิมะตกแบบนี้แหละถึงจะได้เห็นความงามที่แท้จริงของออนเซ็น! ด้านบนหนาวเย็น ด้านล่างอบอุ่น!"
3501-133 = "แถมดีต่อร่างกายและทำให้อารมณ์ดีมากถึงขนาดที่อาจช่วยให้คนใกล้ตายฟื้นคืนชีพได้เลยทีเดียว!"
3501-134 = "น้ำร้อนจะช่วยบรรเทาความเมื่อยล้าและชำระล้างบาดแผลบนร่างกายได้!"
3501-135 = "ใช่มั้ยล่ะๆ~!! ก็นี่คือออนเซ็นนี่เนอะ! แถมยังเป็นออนเซ็นที่มีหิมะตกด้วย! นี่แหละช่วงเวลาที่สุดยอด#nที่สุด!!"
3501-136 = "อ่า~ อยากให้คนอื่นๆ ได้สัมผัสความรู้สึกแบบนี้บ้างจัง!!"
3501-137 = "เอาละๆ! สักวันทุกคนก็จะได้รู้เองนั่นแหละ เมกุ ไม่ต้องกังวลเรื่องนั้นหรอก!"
3501-138 = "เพราะงั้นก่อนอื่นวันนี้เมกุเองก็ต้องพักผ่อนให้เยอะๆ เลยนะ! วันพรุ่งนี้เรายังมีงานที่ต้องทำอีกเป็นกอง#nเลย!"
3501-139 = "อื้อๆ! อ๊ะ จริงด้วย! พอโดนบอกให้พักผ่อนเลยนึกออกแล้วละ ฉันมาตรงนี้ก็เพื่อจะถามคำถามหัวหน้า#nนี่นา!"
3501-140 = "ทุกคนคงจะรอแย่แล้ว ฉันกลับไปบอกทุกๆ คนก่อนดีกว่า!!"
3501-141 = "เอาสิ~ พื้นมันลื่นมากนะ ไม่ต้องรีบวิ่งล่ะ~"
3501-142 = "อะฮ่าฮ่า! ได้เลย!!"
3501-147 = "ออนเซ็น ออนเซ็น... ฮุฮุ"
3501-151 = "ก็ต้องชอบอยู่แล้วสิ... "
3501-153 = "ไม่มีทางที่จะไม่ชอบหรอก..."
3501-154 = "ออนเซ็นในวันหิมะโปรย"

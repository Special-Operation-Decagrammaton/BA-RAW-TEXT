10009050-78 = "3;세나;01\n#3;a\n#3;closeup\n#wait;1000"
10009050-79 = "#wait;1000"
10009050-80 = "3;세나;02;만약의 응급 상황을 막기 위해서라도, 업무보다는 그쪽을 더 우선시해야 한다고 판단됩니다.\n#3;em;[반응]\n#3;closeup"
10009050-81 = "3;세나;99;그러니.\n#3;closeup"
10009050-82 = "[s] \"아니, 그럴 수는 없어.\""
10009050-83 = "3;세나;01;……선생님?\n#3;em;[?]\n#3;stiff\n#3;closeup"

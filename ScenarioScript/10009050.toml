10009050-89 = "3;세나;01;……단지 자신만의 안전만을 위해 내팽개치고 도망칠 수 없다. 라는 겁니까."
10009050-90 = "3;세나;99;과연, 선생님……이라고 할지. 여기선 감탄보다 탄식을 해야 할 부분일지도 모르겠습니다만."
10009050-91 = "3;세나;01;그래도 혹여 정말로 위험한 응급 상황이 발생하지 않도록, 저 또한 철저히 대응을 하겠습니다.\n#3;em;[반짝]\n#3;greeting"

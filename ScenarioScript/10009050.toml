[translation]
10009050-1 = "Episode 5;The Fifth Assault!"
10009050-3 = "Sena and I's patrol had taken us to the market street when...I started to get that feeling again."
10009050-4 = "Is something the matter?"
10009050-5 = "[s] \"My gut said I was about to get a call. Maybe it was my imagination.\""
10009050-6 = "Is that so?"
10009050-10 = "I was relieved to be wrong, but just as we were entering the market..."
10009050-11 = "Oh, if it isn't the Sensei of Schale! What brings you here?"
10009050-12 = "[s] \"I'm on a patrol of the area.\""
10009050-13 = "You and this student are working on Valentine's Day?#nHahaha. Don't work TOO hard!"
10009050-14 = "You're just in time, though. My shop got something great in today."
10009050-15 = "I know how hard you're always working, so here. Take this."
10009050-22 = "[ns] \"Uh, okay. Thanks.\""
10009050-23 = "Don't mention it—it was nothing!#nThanks for everything you do!"
10009050-26 = "After that, we kept running into more residents who recognized me as we patrolled the street."
10009050-28 = "Oh. You're Schale's [USERNAME] Sensei."
10009050-29 = "On a patrol with one of your students?"
10009050-30 = "My, you're just as hard-working as ever."
10009050-31 = "How about trying our brand new apple chocolate to relieve your fatigue?"
10009050-32 = "Ah, if it isn't Sensei."
10009050-33 = "Would you also like to try my store's newest specialty?"
10009050-34 = "Us too! Try our newest item!"
10009050-35 = "Oooh! Try ours too!"
10009050-36 = "Sensei! Senseiii!"
10009050-38 = "Sena and I went to take a rest on a park bench to sort through all of the items the merchants had bombarded us with."
10009050-41 = "They sure were generous..."
10009050-42 = "[s] \"Yeah. I don't know if I deserve all of this...\""
10009050-43 = "Nonsense. They were only trying to show their gratitude."
10009050-44 = "It may sound strange coming from me, but the citizens aren't the only ones who are in your debt. You've been looking after students like me for a long time."
10009050-45 = "I can sympathize with how they feel."
10009050-46 = "[s] \"I don't feel like I've done anything particularly special, though.\""
10009050-47 = "It isn't necessarily that your deeds have been the most conspicuous."
10009050-48 = "Security detail and stopping conflicts..."
10009050-49 = "Helping people around town and consulting students..."
10009050-50 = "Giving advice and listening to their problems..."
10009050-51 = "I understand Schale was created with certain problems in mind..."
10009050-52 = "...but you go so much further above and beyond, in my opinion."
10009050-53 = "I'm sure that's how others feel as well."
10009050-57 = "The incidents at today's festival may have been much worse if not for your intervention."
10009050-58 = "[s] \"Aw, c'mon. You're gonna make me blush.\""
10009050-59 = "Think of how many people were able to keep smiling today."
10009050-60 = "Those store owners selling chocolates and snacks, then their customers exchanging those with people they appreciate."
10009050-61 = "In many ways, that is what Valentine's Day is all about. "
10009050-62 = "Which makes me wonder..."
10009050-63 = "[s] \"...?\""
10009050-64 = "I'm referring to Wakamo."
10009050-65 = "Why was she wreaking havoc on the festival?#nIt seemed like she had a reason. "
10009050-66 = "What could she have been after?"
10009050-67 = "[s] \"That's a good question.\""
10009050-68 = "It's clear she was targeting you, based on all of her attacks..."
10009050-69 = "...but something doesn't add up if her real goal was to neutralize Schale."
10009050-70 = "Why enlist the help of hoodlums and steal Valkyrie equipment?"
10009050-71 = "Why wreak so much havoc if her target is so narrow?#nShe's acting completely irrationally."
10009050-72 = "[s] \"I-It's kind of scary when you put it like that.\""
10009050-73 = "Heed my advice. You should return to Schale's office.#nThat's the quickest and easiest way to avoid her assaults."
10009050-74 = "It should be impossible for her to reach you if Schale's defenses are up. "
10009050-80 = "Prioritizing your safety over work would be the simplest way to prevent another emergency."
10009050-81 = "So with that in mind..."
10009050-82 = "[s] \"Out of the question.\""
10009050-83 = "Sensei?"
10009050-84 = "[s1] \"This patrol was a request straight from my students.\"\n[s2] \"I can't run away after the residents were so kind to me.\""
10009050-89 = "You refuse to put yourself ahead of others. Is that it?"
10009050-90 = "That's very befitting of you. However, I don't know whether to call that attitude selfless or foolish."
10009050-91 = "Nevertheless, I'll do everything in my power to see to it that you don't become my next cadaver—er, patient, I mean."
10009050-92 = "[s] \"Glad to hear it. Thank you, Sena.\""
10009050-94 = "[s] \"As for Wakamo, I get the feeling she—\""
10009050-101 = "Sensei, come in! We have an emergency!"
10009050-102 = "[s] \"Yep. Knew it.\""

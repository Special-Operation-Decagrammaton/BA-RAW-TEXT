[translation]
10009050-1 = "#title;제5화;다섯 번째 습격!"
10009050-2 = "#wait;2000"
10009050-3 = "#na;(세나와 함께 시장 거리를 순찰하……다가 불현듯 걸음을 멈추었다.)"
10009050-4 = "3;세나;01;선생님? 무슨 일 있으십니까?\n#3;em;[?]\n#3;a"
10009050-5 = "[s] \"바로 지금 전화가 오지 않을까 했는데. 기분 탓인가 봐.\""
10009050-6 = "3;세나;02;그렇습니까?"
10009050-7 = "#st;[0,0];instant;1;"
10009050-8 = "#clearST"
10009050-9 = "3;세나;01\n#3;m2\n#wait;1200"
10009050-10 = "#na;(예상이 빗나간 것에 안도의 한숨을 내쉬며, 시장 거리 안쪽으로 들어섰을 때였다.)"
10009050-11 = "5;생선가게 아저씨;00;오, 이거 샬레의 선생이잖아. 이런 곳에서 보다니 별일이구만. 여긴 어쩐 일이야?\n#5;em;[반응]\n#5;a\n#3;m1"
10009050-12 = "[s] \"순찰 업무로 주변을 둘러보고 있었습니다.\""
10009050-13 = "5;생선가게 아저씨;00;이런 발렌타인 데이에 학생하고 같이 일하는 중이라고? 아핫핫. 그것참 고생이 많구만!\n#5;hophop\n#5;em;[재잘]"
10009050-14 = "5;생선가게 아저씨;00;아, 마침 잘 됐구만. 그렇지 않아도 오늘 우리 가게에 실한 물건이 들어왔다고."
10009050-15 = "5;생선가게 아저씨;00;자자, 언제나 고생하는 거 잘 알고 있으니까. 어여 받아 가.\n#5;em;[음표]\n#5;m3\n#3;dl"
10009050-16 = "#st;[0,0];instant;1;"
10009050-17 = "#clearST"
10009050-18 = "5;생선가게 아저씨;00\n#5;d\n#wait;1000"
10009050-19 = "5;생선가게 아저씨;00\n#5;a\n#5;closeup\n#wait;1000"
10009050-20 = "#wait;1000"
10009050-21 = "5;생선가게 아저씨;00\n#5;greeting\n#5;closeup\n#wait;2000"
10009050-22 = "[ns] \"가, 감사합니다.\""
10009050-23 = "5;생선가게 아저씨;00;고맙다니, 오히려 고마운 건 이쪽이지! 앞으로도 잘 부탁한다고!\n#5;closeup\n#5;em;[재잘]\n#5;hophop"
10009050-24 = "#all;hide"
10009050-25 = "#wait;500"
10009050-26 = "#na;(그 뒤로도 몇 번이나 거리를 순찰하며 여러 주민들과 마주쳤다.)"
10009050-27 = "#all;hide"
10009050-28 = "3;가게 주인 퍼그;00;음? 이거 샬레의 [USERNAME] 선생님이시잖습니까?\n#3;em;[?]\n#3;a"
10009050-29 = "3;가게 주인 퍼그;00;학생과 순찰이라고요?"
10009050-30 = "3;가게 주인 퍼그;00;하하핫. 오늘도 어김없이 열심히 일하고 계시는 구만요.\n#3;hophop\n#3;em;[재잘]"
10009050-31 = "3;가게 주인 퍼그;00;그럼 이거, 이번에 새로 만든 사과 초콜릿이니 한 번 드셔 보십셔.\n#3;m4"
10009050-32 = "1;디저트 가게 사장;00;오, 우리도 질 수 없지. 저희 가게의 신상품입니다.\n#1;em;[반응]\n#1;ar\n#3;m5"
10009050-33 = "1;디저트 가게 사장;00;한 번 맛 봐주시겠습니까?\n#1;greeting"
10009050-34 = "3;가게 주인 퍼그;00\n1;디저트 가게 사장;00\n#na;이벤트 점원;아, 그거라면 저희 이벤트 측에서 준비한 상품도……!"
10009050-35 = "3;가게 주인 퍼그;00\n1;디저트 가게 사장;00\n#na;로봇 종업원;아, 그럼 저희도!"
10009050-36 = "3;가게 주인 퍼그;00\n1;디저트 가게 사장;00\n#na;상인;저희 쪽에서도……!"
10009050-37 = "#all;hide"
10009050-38 = "#na;(그렇게 얼마나 거리를 돌았을까. 잠시 휴식을 취할 겸, 또한 받은 물건도 정리할 겸 세나와 함께 공원 벤치에 자리를 잡았다.)"
10009050-39 = "#all;hide"
10009050-40 = "#wait;500"
10009050-41 = "3;세나;01;뭔가, 잔뜩 받아버렸군요.\n#3;em;[...]\n#3;a"
10009050-42 = "[s] \"그러게, 당황스러운걸. 이렇게나 받아도 될지.\""
10009050-43 = "3;세나;02;전 괜찮다고 생각합니다. 주민 여러분 모두 진심에서 우러나온 마음으로 준 것들이니까요.\n#3;em;[반응]"
10009050-44 = "3;세나;01;제가 이런 말을 하는 게 조금은 이상할 수도 있겠습니다만. 평소 주민분들은 물론, 저 같은 학생 또한 [USERNAME] 선생님껜 큰 도움을 받고 있다고 생각합니다."
10009050-45 = "3;세나;99;그 감사를 표하고자 하는 마음도, 충분히 이해가 갑니다."
10009050-46 = "[s] \"그렇게 대단한 일은 하지 않은 것 같은데.\""
10009050-47 = "3;세나;01;그렇군요. 예, 확실히 평소 선생님께서 해주시는 일들이, 특별히 굉장하거나 대단한 일은 아닐지도 모릅니다마는…….\n#3;em;[반짝]\n#3;greeting"
10009050-48 = "3;세나;02;문제아를 다루는 치안 업무부터,"
10009050-49 = "3;세나;01;마을에서 일어나는 문제의 해결이라거나, 학생들의 상담에 응해주는 것,"
10009050-50 = "3;세나;99;혹은 어드바이스를 해주거나. 혹은 그저 만나서 이야기를 들어주시는 것까지.\n#3;em;…"
10009050-51 = "3;세나;01;샬레가 원래부터 그러한 목적을 위해 만들어진 기관이었다는 건 알고 있습니다만."
10009050-52 = "3;세나;02;그럼에도 그 목적을 넘어서, 선생님께선 보다 많은 것들을 해주셨다고, 그렇게 생각합니다."
10009050-53 = "3;세나;01;저뿐만이 아니라, 아마 다른 분들도 마찬가지이겠지요.\n#3;em;[반응]"
10009050-54 = "#st;[0,0];instant;1;"
10009050-55 = "#clearST"
10009050-56 = "3;세나;01\n#3;m4\n#wait;1500"
10009050-57 = "3;세나;99;실제로 오늘 같은 축제 또한, 아마 선생님께서 안 계셨더라면……."
10009050-58 = "[s] \"으음, 어째 낯간지러운데.\""
10009050-59 = "3;세나;02;주민 여러분은 물론, 축제를 즐기는 분들은 저마다 즐거운 표정을 짓고 있었습니다.\n#3;m3"
10009050-60 = "3;세나;01;선생님께 그러했던 것처럼. 초콜릿과 과자를 팔고, 교환하고, 평소 고마움을 느끼는 상대에게 선물한다-"
10009050-61 = "3;세나;99;발렌타인 데이란, 원래부터가 그러한 풍경이 당연한 이벤트……일지도 모르겠습니다만. \n#3;em;…"
10009050-62 = "3;세나;01;그런데."
10009050-63 = "[s] \"……응?\""
10009050-64 = "3;세나;02;재액의 여우, 와카모. 그녀는 작금의 축제를 방해하려고 들고 있습니다."
10009050-65 = "3;세나;01;그녀의 목적은 대체 무엇이었을까요? \n#3;em;[?]"
10009050-66 = "3;세나;01;왜 하필 무엇을 노리고 이런 축제에서 난동을 부리는 걸까요?"
10009050-67 = "[s] \"으음…….\""
10009050-68 = "3;세나;02;지난 몇 번의 습격으로 드러난 사실이지만, 그녀는 그 난동 속에서도 명백히 선생님을 노리고 있습니다.\n#3;em;[반응]"
10009050-69 = "3;세나;01;만약 정말로 노림수가 선생님을 습격하여, 샬레의 무력화를 노리고 있는 것이라면."
10009050-70 = "3;세나;99;작금의 문제아들을 선동하고, 발키리의 장비까지 탈취하여 난동을 부리는 방식은 지극히 비논리적입니다."
10009050-71 = "3;세나;01;그런 식으로 날뛰며 주목도를 끌고, 경계심을 끌어올리기보단 보다 효율적이고 확실한 방법이 있을 텐데 말이죠.\n#3;em;…"
10009050-72 = "[s] \"그, 그건 조금 무서운 말이네.\""
10009050-73 = "3;세나;02;지금 와서의 이야기입니다만. 와카모의 습격을 피하기 위해 아예 선생님께서 순찰을 그만두고 샬레로 복귀한다는 방법도 있습니다."
10009050-74 = "3;세나;01;샬레의 방비를 더한다면 그녀를 피해 농성한다는 것도 불가능하진 않을 테지요."
10009050-75 = "#st;[0,0];instant;1;"

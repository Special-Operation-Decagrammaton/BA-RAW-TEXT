[translation]
10009050-1 = "ตอนที่ 5;การจู่โจมครั้งที่ 5!"
10009050-3 = "(คุณครูเดินลาดตระเวนไปตามท้องถนนกับเซนะ... และจู่ๆ ก็ต้องหยุดเดิน)"
10009050-4 = "คุณครู? มีอะไรรึเปล่าคะ?"
10009050-5 = "[s] \"คิดว่าน่าจะมีโทรศัพท์มาน่ะ สงสัยจะรู้สึกไปเอง\""
10009050-6 = "งั้นเหรอคะ?"
10009050-10 = "(คุณครูถอนหายใจอย่างโล่งอก เมื่อไม่เรื่องอะไรเกิดขึ้น และเดินเข้าไปด้านในของย่านการค้า)"
10009050-11 = "โอ๊ะ คุณครูจากชาเล่ต์นี่นา แปลกจังที่มาเจอคุณครูในที่แบบนี้ มาทำอะไรที่นี่เหรอ?"
10009050-12 = "[s] \"มาลาดตระเวนแถวนี้น่ะ\""
10009050-13 = "ออกมาทำงานกับนักเรียนในวันวาเลนไทน์แบบนี้เนี่ยนะ? อ่ะฮะฮะฮะ ตั้งใจทำงานน่าดูเลยนะ!"
10009050-14 = "อา คุณครูมาก็ดีแล้วล่ะ วันนี้มีของสดๆ ใหม่ๆ เข้ามาที่ร้านด้วย"
10009050-15 = "เอ้านี่ รับไปสิ ถือเป็นของขอบคุณที่ตั้งใจทำงานอย่างหนักน่ะ"
10009050-22 = "[ns] \"ขะ...ขอบคุณนะ\""
10009050-23 = "ไม่ต้องขอบคุณหรอก ทางนี้ต่างหากที่ต้องเป็นฝ่ายขอบคุณ ต่อไปก็ฝากด้วยล่ะ!"
10009050-26 = "(หลังจากนั้นคุณครูก็ตระเวนไปตามถนนหลายเส้น และได้พบกับชาวเมืองมากมาย)"
10009050-28 = "หืม? คุณคือคุณครู [USERNAME] จากชาเล่ต์ไม่ใช่เหรอ?"
10009050-29 = "ออกมาลาดตระเวนพร้อมกับนักเรียนเหรอครับ?"
10009050-30 = "ฮะฮะฮะ วันนี้ก็ดูตั้งใจทำงานอย่างหนักเหมือนเดิมเลยนะครับ"
10009050-31 = "แวะมาลองชิมช็อกโกแลตแอปเปิลที่ผลิตมาใหม่ดูก่อนสิครับ"
10009050-32 = "พะ...พวกเราจะยอมแพ้ไม่ได้ นี่เป็นผลิตภัณฑ์ใหม่ของทางร้านเราครับ"
10009050-33 = "ลองชิมดูสักหน่อยไหมครับ?"
10009050-34 = "อ๊ะ ถ้าอย่างนั้นก็ลองผลิตภัณฑ์ที่เราเตรียมไว้สำหรับงานเทศกาลด้วย...!"
10009050-35 = "อ๊ะ ถ้างั้นก็ชิมของพวกเราด้วยสิ!"
10009050-36 = "ของพวกเราด้วย...!"
10009050-38 = "(หลังจากเดินไปอีกสักระยะ คุณครูก็มาแวะพักตรงม้านั่งในสวนสาธารณะเพื่อพักเหนื่อย#nและจัดของต่างๆ ที่ได้รับมา)"
10009050-41 = "ดูเหมือนจะได้รับของมาเยอะมากเลยนะคะ"
10009050-42 = "[s] \"น่าตกใจจริงๆ เลยนะ ไม่คิดเลยว่าจะได้ของมาเยอะแบบนี้\""
10009050-43 = "ฉันคิดว่าไม่เป็นไรหรอกค่ะ ชาวเมืองทุกคนเต็มใจเอาของขวัญมามอบให้คุณครูนี่คะ"
10009050-44 = "ฉันพูดแบบนี้มันอาจจะฟังดูแปลกๆ แต่ฉันคิดว่าทั้งชาวเมืองและนักเรียนทุกๆ คนต่างก็ได้รับ#nความช่วยเหลือจากคุณครู [USERNAME] มามากเลยนะคะ"
10009050-45 = "เพราะงั้นฉันเลยเข้าใจดีว่าทุกคนอยากจะขอบคุณคุณครูน่ะค่ะ"
10009050-46 = "[s] \"ครูไม่ได้ทำเรื่องอะไรยิ่งใหญ่ขนาดนั้นสักหน่อย\""
10009050-47 = "อย่างนั้นเหรอคะ จริงอยู่ว่าสิ่งที่คุณครูทำในทุกๆ วันอาจไม่ใช่เรื่องพิเศษหรือเรื่องที่ยิ่งใหญ่อะไร... "
10009050-48 = "ทั้งเรื่องการจัดการกับพวกเด็กเกเร"
10009050-49 = "การแก้ปัญหาที่เกิดขึ้นในเขตต่างๆ หรือให้คำปรึกษากับนักเรียนหลายๆ คน"
10009050-50 = "ทั้งการให้คำแนะนำ หรือแม้แต่การสละเวลาออกมารับฟังเรื่องราวต่างๆ"
10009050-51 = "ฉันทราบดีว่าชาเล่ต์เป็นองค์กรที่ก่อตั้งขึ้นมาเพื่อวัตถุประสงค์เหล่านั้น"
10009050-52 = "แต่ถึงยังไงฉันก็คิดว่าคุณครูได้ทำสิ่งที่มีความหมายมากกว่าแค่การทำตามจุดประสงค์พวกนั้นค่ะ"
10009050-53 = "ไม่ใช่แค่ฉันนะคะ แต่คนอื่นๆ เองก็คงจะคิดเหมือนกันค่ะ"
10009050-57 = "อันที่จริงในวันเทศกาลแบบนี้ ถ้าคุณครูไม่อยู่ด้วยละก็..."
10009050-58 = "[s] \"อืม... รู้สึกเขินนิดๆ แฮะ\""
10009050-59 = "ตอนนี้ชาวเมืองทุกคนและคนที่มาร่วมงานเทศกาล รวมถึงตัวฉันเองก็สนุกกับงานเทศกาลมากเลยค่ะ"
10009050-60 = "เหมือนกับที่ทุกคนทำให้กับคุณครู... ทั้งการขายช็อกโกแลต การมอบช็อกโกแลตให้กัน หรือให้ของขวัญด้วยความรู้สึกขอบคุณ..."
10009050-61 = "บางทีวันวาเลนไทน์ อาจเป็นงานเทศกาลที่ควรเป็นแบบนั้นตั้งแต่แรกแล้วก็ได้นะคะ"
10009050-62 = "แต่ว่า..."
10009050-63 = "[s] \"หืม...?\""
10009050-64 = "จิ้งจอกแห่งความพินาศ วาคาโมะ เธอพยายามที่จะขัดขวางงานเทศกาลในตอนนี้"
10009050-65 = "เป้าหมายของเธอคืออะไรกันแน่คะ? "
10009050-66 = "ทำไมถึงคิดก่อเหตุวุ่นวายในงานเทศกาลแบบนี้กันนะ?"
10009050-67 = "[s] \"อืม...\""
10009050-68 = "ที่ผ่านมาเธอบุกโจมตีมาหลายครั้ง และดูเหมือนว่าเป้าหมายในการบุกโจมตีของเธอก็คือคุณครูนะคะ"
10009050-69 = "ถ้าหากเป้าหมายที่แท้จริงของเธอคือการโจมตีคุณครูและทำให้เกิดสภาะวะหยุดชะงักในชาเล่ต์"
10009050-70 = "การปลุกปั่นกลุ่มเด็กเกเรให้ก่อความวุ่นวาย และการขโมยอุปกรณ์ของทางวัลคิรี่ดูจะเป็นวิธีที่ไม่สมเหตุ#nสมผลเลยค่ะ"
10009050-71 = "มันมีวิธีอื่นที่มีประสิทธิภาพมากกว่าการสร้างความวุ่นวายและดึงดูดความสนใจหรือสร้างความตื่น#nตระหนกแบบนั้นอยู่ค่ะ"
10009050-72 = "[s] \"ระ...เรื่องนั้นชักฟังดูน่ากลัวๆ แล้วนะ\""
10009050-73 = "มาพูดตอนนี้อาจจะช้าไปสักหน่อย แต่เพื่อป้องกันการบุกโจมตีของวาคาโมะ ฉันคิดว่าคุณครู#nควรจะหยุดการลาดตระเวนแล้วกลับไปที่ชาเล่ต์ค่ะ"
10009050-74 = "นอกจากการป้องกันของทางชาเล่ต์แล้วก็เป็นไปไม่ได้เลยที่จะหลีกเลี่ยงเธอค่ะ "
10009050-80 = "เพื่อหลีกเลี่ยงสถานการณ์ฉุกเฉิน ฉันคิดว่าควรให้ความสำคัญกับเรื่องนี้มากกว่างานลาดตระเวนค่ะ"
10009050-81 = "เพราะงั้น..."
10009050-82 = "[s] \"ไม่ล่ะ ทำแบบนั้นไม่ได้หรอก\""
10009050-83 = "คุณครู...?"
10009050-84 = "[s1] \"นี่เป็นคำร้องที่ครูรับมาในฐานะครูนะ\"\n[s2] \"เมื่อกี้เซนะก็เห็นท่าทางของชาวเมืองแล้วนี่นา\""
10009050-89 = "จะละทิ้งภารกิจแล้วหนีเอาตัวรอดเพื่อความปลอดภัยของตัวเองไม่ได้งั้นเหรอคะ"
10009050-90 = "สมกับเป็น... คุณครูจริงๆ แต่อาจเป็นเรื่องที่น่ากังวลมากกว่าชื่นชมก็ได้นะคะ"
10009050-91 = "แต่ถึงอย่างนั้น ฉันก็จะระมัดระวังอย่างสุดความสามารถเพื่อไม่ให้เกิดเหตุฉุกเฉินขึ้นค่ะ"
10009050-92 = "[s] \"น่าเชื่อถือสุดๆ เลย ขอบใจนะ เซนะ\""
10009050-94 = "[s] \"ถึงจะไม่ค่อยแน่ใจเท่าไร แต่บางทีวาคาโมะ...\""
10009050-101 = "สถานการณ์ฉุกเฉิน คุณครู! คือว่า...!"
10009050-102 = "[s] \"อื้อ คิดแล้วว่าต้องเป็นแบบนี้...!\""

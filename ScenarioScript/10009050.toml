[translation]
10009050-1 = "第5話;襲擊之五"
10009050-3 = "（和瀬奈一起開始巡邏之前……）"
10009050-4 = "老師，怎麼了嗎？"
10009050-5 = "[s]「……抱歉，別在意。感覺電話好像要響了而已。」"
10009050-6 = "這樣啊。"
10009050-10 = "（意料落空後深深地吸了一口氣，正準備重新開始巡邏的時候──）"
10009050-11 = "哦，這不是夏萊的老師嗎。這次有什麼事啊？"
10009050-12 = "[s]「我在這附近巡邏。」"
10009050-13 = "嘿～因為情人節嗎？還和學生一起啊，真是辛苦了！"
10009050-14 = "這樣正好，今天一早剛好有好東西送來了。"
10009050-15 = "來，收下吧！感謝你平時的辛勞！"
10009050-22 = "[ns]「謝，謝謝……！」"
10009050-23 = "該說謝謝的是我們。一直以來謝啦，之後也請多關照！"
10009050-26 = "（之後，又在街上遇見了許多人……）"
10009050-28 = "嗯？這不是夏萊的[USERNAME]老師嗎？"
10009050-29 = "在巡邏？"
10009050-30 = "哈哈，今天也要工作啊。"
10009050-31 = "哦，學生也在呀，辛苦了。這是我們新推出的蘋果巧克力，要不要來一點啊？"
10009050-32 = "哦，這不是老師嗎？"
10009050-33 = "這是我們家的新產品唷，來！"
10009050-34 = "老師！不介意的話這是我們的……！"
10009050-35 = "哦哦老師！"
10009050-36 = "老師！"
10009050-38 = "（就這樣一邊收下各種東西一邊走著，#n　之後決定和瀬奈在公園長椅上稍作休息，順便整理整理）"
10009050-41 = "數量真不少呢。"
10009050-42 = "[s]「收下這麼多，都有點不好意思了……」"
10009050-43 = "我覺得不需要這麼想唷，這些都是民眾的心意。"
10009050-44 = "雖然由我這麼說可能有點奇怪……不過和居民們一樣，#n各個學校的學生們也很感謝[USERNAME]老師。畢竟在各個方面都受到老師的照顧。"
10009050-45 = "我也是一樣，所以非常能體會他們的心情。"
10009050-46 = "[s]「我倒是感覺沒做什麼了不起的事……」"
10009050-47 = "……老師平時為我們做的事，或許不算是非常高調顯眼。"
10009050-48 = "但是問題兒童的處理，街上瑣碎問題的解決。"
10009050-49 = "接受學生們的諮商，提供相關的建議。"
10009050-50 = "或者只是單純與我們見面、聽我們說說話……"
10009050-51 = "即使夏萊本來就是為了這個目的而成立……"
10009050-52 = "但是老師的付出已經超越了原本的目的，所以大家才會抱持著感謝。"
10009050-53 = "包含我在內的大家。"
10009050-57 = "偶爾也會配合像今天這樣的節日，將感謝的心化為實體。#n要是老師不在的話，今天各處的活動想必會比現在更加混亂吧。"
10009050-58 = "[s]「總覺得有點難為情呢。」"
10009050-59 = "……大家都露出了開心的表情。"
10009050-60 = "販賣著巧克力之類的點心，彼此交換。向平時感謝的人們送出禮物……"
10009050-61 = "情人節就是能見到這些景象的日子。"
10009050-62 = "但是……"
10009050-63 = "[s]「……？」"
10009050-64 = "「災禍之狐」若藻……"
10009050-65 = "他不知為了什麼目的想搗亂這個活動，至少看起來是這個樣子。"
10009050-66 = "……究竟是為了什麼呢？"
10009050-67 = "[s]「唔嗯……」"
10009050-68 = "從至今為止幾次的襲擊看來，他在戰鬥中明顯是衝著老師來的。"
10009050-69 = "比方說……藉由襲擊老師以癱瘓夏萊也是有可能的。"
10009050-70 = "但是為此煽動問題兒童，奪取女武神的裝備發起大規模戰鬥的行為是不合理的。"
10009050-71 = "如果他的目的是襲擊老師，這樣的行為只會提高警戒而已。#n更有效率、更確實的方式多的是。"
10009050-72 = "[s]「確實……」"
10009050-73 = "……老實說，如果想躲避他的襲擊，讓老師現在停止巡邏回夏萊也是一個方法。"
10009050-74 = "只要強化夏萊的防備，應該就能防止遇到危險吧。"
10009050-80 = "為了以防萬一……"
10009050-81 = "比起巡邏工作，老師應該立刻──"
10009050-82 = "[s]「我不能這麼做。」"
10009050-83 = "……？"
10009050-84 = "[s1]「因為這是學生拜託我的事。」\n[s2]「看到剛才街上的景象就更不能這麼做了。」"
10009050-89 = "……現在不能只考慮到自己的安全，是嗎。"
10009050-90 = "這樣啊……與其說是感歎，或許更應該嘆息呢。"
10009050-91 = "我知道了。#n那麼為了預防可能發生的危險，我也會全力以赴的。"
10009050-92 = "[s]「謝謝你，瀬奈。」"
10009050-94 = "[s]「還有雖然不太確定，不過若藻可能……」"
10009050-101 = "老師，緊急狀況！"
10009050-102 = "[s]「嗯，我就覺得應該要來了。」"

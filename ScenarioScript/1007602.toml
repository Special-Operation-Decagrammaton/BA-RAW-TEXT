[translation]
1007602-1 = "啦啦隊亞都梨"
1007602-2 = "（活動尚未開始的早晨，在空蕩蕩的運動場檢查備品時……）"
1007602-9 = "老師～～！！"
1007602-10 = "抱歉讓你久等了！雖然已經盡快趕來了……！"
1007602-11 = "[s1]「其實不用那麼趕也沒關係的。」\n[s2]「一早就精神滿滿呢，亞都梨。」"
1007602-14 = "是，是嗎！？啊哈，啊哈哈哈……"
1007602-15 = "總，總之我想老師多半得忙一整天，所以也只能趁現在了！"
1007602-16 = "嗯？你問是什麼意思？#n那就是……為了今天可能會發生的各種事情做準備的……"
1007602-17 = "……暖身運動──伸展操！！"
1007602-21 = "咦，反應有點平淡……難道已經暖身過了嗎……？"
1007602-22 = "沒有是嗎？太好了！"
1007602-23 = "就算老師不是選手，今天一天應該也得四處奔走，所以還是做點伸展比較好哦！"
1007602-24 = "……嗯？什麼？"
1007602-25 = "一定要做嗎……？#n這個嘛……要防止受傷就得事先做完才行……"
1007602-26 = "……啊！"
1007602-27 = "順帶一提，所謂的伸展運動就是有意識地讓想使用的肌肉或關節緊繃再放鬆，#n藉此提高其「恢復彈性」的準備運動之一。在某篇運動科學的論文中……"
1007602-28 = "[s3]「開，開始吧～！伸展運動～！最喜歡伸展了～！！」\n[s4]「現在馬上開始吧～！哇～！」"
1007602-31 = "哦哦！非常好！不愧是老師，真有幹勁呢！"
1007602-32 = "但伸展運動可不能隨便亂做一通哦。"
1007602-33 = "為了節省老師一一查找的時間……我事先把動作記下來了！"
1007602-34 = "來，我會先做示範，請老師邊看邊做哦！"
1007602-35 = "首先是……伸展身體的動作！"
1007602-36 = "先把一邊的腿抬起來……"
1007602-37 = "然後再這……樣……"
1007602-41 = "這，這……樣……？"
1007602-46 = "[ns5]「……亞都梨？」\n[ns6]（他在做什麼……？）"
1007602-49 = "咦，咦咦……？#n呃……嗯……？"
1007602-50 = "所以是這樣……"
1007602-51 = "……哼嗯！？"
1007602-54 = "― [log=코토리 응원단ND]咦，咦咦……？[/log][wa:2340] "
1007602-56 = "― [log=코토리 응원단ND]呣，呣呣……手應該要……碰到，才對呀……？[/log][wa:6320] "
1007602-59 = "― [log=코토리 응원단ND]怎麼會……！[/log][wa:1740] "
1007602-61 = "― [log=코토리 응원단ND]在這裡用力的話──！？[/log][wa:2180] "
1007602-64 = "― [log=코토리 응원단ND]咿咿咿！？[/log]"
1007602-66 = "― [log=코토리 응원단ND]痛，痛痛痛痛痛痛痛痛！！？[/log][wa:600] "
1007602-69 = "[ns7]「不能勉強啊亞都梨！這樣會受傷的！」\n[ns8]「記得放鬆，不能太用力。」"
1007602-72 = "― [log=코토리 응원단ND]真，真奇怪……！[/log][wa:1380] "
1007602-74 = "― [log=코토리 응원단ND]明明有按照調查結果進行啊……！[/log][wa:1340] "
1007602-77 = "― [log=코토리 응원단ND]雖然知道會因人而異，[/log][wa:2220] "
1007602-79 = "― [log=코토리 응원단ND]沒想到會差這麼多……[/log][wa:140] "
1007602-82 = "― [log=코토리 응원단ND]再，再來一次……[/log][wa:2640] "
1007602-84 = "― [log=코토리 응원단ND]……！？痛痛痛！痛啊啊啊啊啊！！[/log][wa:2740] "
1007602-87 = "― [log=코토리 응원단ND]我，我已經，不行了……[/log][wa:2420] "
1007602-89 = "― [log=코토리 응원단ND]嗚嗚嗚……那，那個……老師，這……[/log][wa:7850] "
1007602-92 = "― [log=코토리 응원단ND]這副模樣，本來沒打算……[/log][wa:2360] "
1007602-94 = "― [log=코토리 응원단ND]讓你看到的……[/log]"
1007602-97 = "― [log=코토리 응원단ND]卻讓你……看到這麼狼狽的樣子……[/log][wa:3920] "
1007602-99 = "― [log=코토리 응원단ND]嗚嗚嗚嗚……[/log][wa:340] "
1007602-103 = "對不起，老師。#n我原先的計劃不是這樣的……"
1007602-104 = "結果只是平白占用老師的時間，卻什麼忙都沒幫上……"
1007602-105 = "[s9] 慢慢推亞都梨的背\n[s10]「我來幫你，稍微放輕鬆一點。」"
1007602-108 = "老，老師……！？#n你，你在做什麼……！？"
1007602-109 = "雖，雖然不知道原因，好像突然有一種非常害羞的感覺……！？"
1007602-110 = "……咦？"
1007602-111 = "伸展運動本來就比較常跟別人一起做？#n尤其是對新手來說……？"
1007602-112 = "是，是嗎……！？#n這點我倒是沒調查到……！"
1007602-113 = "那，那那，那就……！"
1007602-114 = "……拜……拜託老師了！！"
1007602-116 = "（之後便和亞都梨互相幫忙，完成了伸展運動）"
1007602-117 = "（放鬆原本僵硬的身體後感覺舒暢許多，也更方便活動了）"

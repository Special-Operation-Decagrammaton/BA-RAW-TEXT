[translation]
1007602-1 = "Kotori the Cheerleader"
1007602-2 = "Early in the morning before any events began, I was checking on the equipment in an empty stadium."
1007602-9 = "Sensei!"
1007602-10 = "I'm sorry for keeping you waiting! I came here as fast as I could!"
1007602-11 = "[s1] \"It's okay. I don't mind waiting for you.\"\n[s2] \"You sure are diligent in the mornings, Kotori.\""
1007602-14 = "Me?! Thank you very much, Sensei! Aha... Heehee..."
1007602-15 = "Y-You're going to be super busy once the day gets going, won't you? I thought I should find you while things are still quiet."
1007602-16 = "For what? I can't believe you don't know, Sensei! This is an essential practice for beginning your day!"
1007602-17 = "Morning stretches!"
1007602-21 = "Oh. That was a rather lackluster reaction. Could it be... Have you already done your morning stretches?!"
1007602-22 = "Y-You haven't? Thank goodness!"
1007602-23 = "Even if you're not an athlete, you have lots of responsibilities to fulfill today! It'll be good for you to warm up your body, I promise!"
1007602-24 = "...Huh? Excuse me?"
1007602-25 = "Do you have to do it...? If you don't want to get injured...or pull a muscle...or tear a ligament... Then, yes! Absolutely! You must!"
1007602-26 = "...Oh!"
1007602-27 = "Just so you know, stretching is an exercise designed to intentionally tense and relax the muscle groups and joints to increase their resilience. Its benefits were first discussed in a sport science research paper—"
1007602-28 = "[s3] \"A-All right! Let's do some stretches! Yeah!\"\n[s4] \"Let's start right away! Woo!\""
1007602-31 = "What a great attitude! As expected from you, Sensei!"
1007602-32 = "But even the simple act of stretching requires proper education before starting."
1007602-33 = "So I came prepared! I've memorized some useful movements and stretches, so you don't have to, Sensei!"
1007602-34 = "All right, I'll demonstrate, and you follow along!"
1007602-35 = "First one! This is to stretch out the whole body!"
1007602-36 = "Raise one leg like this..."
1007602-37 = "And then... do this... next..."
1007602-41 = "L-Like... this...?"
1007602-46 = "[ns5] \"...Kotori?\"\n[ns6] \"(What is she doing...?)\""
1007602-49 = "Huh? Wait... No... What...?"
1007602-50 = "No, I need to this and then..."
1007602-51 = "...Wah?!"
1007602-54 = "― [log=코토리 응원단ND]Wait, what...?[/log][wa:2060] "
1007602-56 = "― [log=코토리 응원단ND]Um, hmm... The arm needs to reach this way...?[/log][wa:5320] "
1007602-59 = "― [log=코토리 응원단ND]That can't be...![/log][wa:1300] "
1007602-61 = "― [log=코토리 응원단ND]What if I just tense this muscle, like this!?[/log][wa:820] "
1007602-64 = "― [log=코토리 응원단ND]Eeek!?[/log]"
1007602-66 = "― [log=코토리 응원단ND]O-Ow, ow, ow, ow![/log][wa:440] "
1007602-69 = "[ns7] \"Don't push yourself too much, Kotori! You'll get hurt!\"\n[ns8] \"Just relax. You can't force it when stretching!\""
1007602-72 = "― [log=코토리 응원단ND]It-It wasn't supposed to be like this...![/log][wa:60] "
1007602-74 = "― [log=코토리 응원단ND]I'm doing the moves exactly as I memorized...![/log][wa:100] "
1007602-77 = "― [log=코토리 응원단ND]I understand that everyone's bodies have their limits, but...[/log][wa:180] "
1007602-79 = "― [log=코토리 응원단ND]I didn't know mine would be so low...[/log][wa:10] "
1007602-82 = "― [log=코토리 응원단ND]O-One more try...[/log][wa:2280] "
1007602-84 = "― [log=코토리 응원단ND]Ah, aaaah! Ow, ow! Ouchie![/log][wa:2340] "
1007602-87 = "― [log=코토리 응원단ND]I-I don't think I can do more...[/log][wa:1580] "
1007602-89 = "― [log=코토리 응원단ND]Ugh... U-Umm... Sensei, this...[/log][wa:7290] "
1007602-92 = "― [log=코토리 응원단ND]This isn't how I imagined...[/log][wa:1720] "
1007602-94 = "― [log=코토리 응원단ND]this would go...[/log]"
1007602-97 = "― [log=코토리 응원단ND]I ended up making a fool of myself...[/log][wa:3080] "
1007602-99 = "― [log=코토리 응원단ND]*sniffle*[/log][wa:220] "
1007602-103 = "I'm sorry, Sensei. This isn't how I planned it at all..."
1007602-104 = "I can't help you like this! I'm just wasting your time."
1007602-105 = "[s9] Help Kotori by slowly pushing her back.\n[s10] \"I'll help out. Just relax and breathe out.\""
1007602-108 = "S-Sensei...?! What are you...?!"
1007602-109 = "I-I don't know why, but I'm starting to feel super embarrassed all of a sudden...!"
1007602-110 = "...Hm?"
1007602-111 = "Stretches are usually done in groups, together? Especially first-timers?"
1007602-112 = "R-Really? I didn't even consider that as an option!"
1007602-113 = "Th-Then...!"
1007602-114 = "I put myself in your care!"
1007602-116 = "Kotori and I did our morning stretches together, helping each other out with more difficult moves when we needed."
1007602-117 = "When we were done, my stiff muscles felt loose and relaxed for the rest of the busy day."

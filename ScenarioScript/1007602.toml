[translation]
1007602-1 = "เชียร์ลีดเดอร์ โคโทริ"
1007602-2 = "(คุณครูนั่งตรวจสอบอุปกรณ์ต่างๆ อยู่ที่สเตเดียมอันว่างเปล่าไร้ผู้คน ในตอนเช้าตรู่ที่การแข่งขันต่างๆ ยังไม่เริ่ม)"
1007602-9 = "คุณครู~~!!!"
1007602-10 = "รอนานหรือเปล่าคะ~! ฉันรีบมาเร็วที่สุดแล้วค่ะ!!"
1007602-11 = "[s1] \"ไม่ต้องรีบขนาดนั้นก็ได้\"\n[s2] \"โคโทริเนี่ย ขยันตั้งแต่เช้าเลยน้า\""
1007602-14 = "งะ... งั้นเหรอคะ...? อ่ะฮะฮะฮะ..."
1007602-15 = "ยะ...ยังไงก็เถอะค่ะ ตอนนี้คุณครูน่าจะงานยุ่งมากๆ ฉันรีบมาเพราะคิดว่าตอนนี้อาจจะเป็นเวลาที่#nคุณครูสะดวกที่สุด..."
1007602-16 = "คะ? เวลาอะไรงั้นเหรอคะ? ก็แหงอยู่แล้วน่ะสิคะ! ก็เพื่อเตรียมตัวให้พร้อมสำหรับงานต่างๆ ที่จะมีขึ้นใน#nวันนี้..."
1007602-17 = "...นั่นคือการวอร์มอัปค่ะ! เวลาสำหรับการยืดเส้นไงล่ะคะ!!"
1007602-21 = "เอ๋? ปฏิกิริยาต่างไปจากที่คิดแฮะ... หรือว่าคุณครูวอร์มอัปไปแล้วเหรอคะ...?"
1007602-22 = "ไม่ใช่งั้นเหรอคะ? งั้นก็ดีเลยค่ะ!"
1007602-23 = "ถึงคุณครูจะไม่ได้ลงแข่งวิ่ง แต่วันนี้คุณครูคงจะต้องวิ่งไปที่ต่างๆ เยอะมากแน่ๆ เพราะงั้นฉันคิดว่า#nยืดเส้นเอาไว้ก่อนดีกว่านะคะ!"
1007602-24 = "...หืม? คะ?"
1007602-25 = "ต้องทำจริงๆ หรือเปล่าน่ะเหรอคะ...? เรื่องนั้นก็แน่นอนสิคะ... วอร์มอัปยืดเส้นเอาไว้ก่อน จะช่วย#nป้องกันการบาดเจ็บได้..."
1007602-26 = "...อ๊ะ!"
1007602-27 = "ขออธิบายไว้ก่อนนะคะ การยืดเส้นเป็นรูปแบบหนึ่งของการวอร์มอัปเตรียมความพร้อมสำหรับการ#nออกกำลัง โดยจะ 'เพิ่มความยืดหยุ่น' และผ่อนคลายกล้ามเนื้อหรือข้อต่อต่างๆ ในการออกกำลังกาย ซึ่งในวิทยานิพนธ์ด้านวิทยาศาสตร์การกีฬาระบุว่า..."
1007602-28 = "[s3] \"ระ...เริ่มกันเถอะ~! ยืดเส้นกันเถอะ~! โอ้ววว เยี่ยม~!!\"\n[s4] \"มาเริ่มยืดเส้นกันเถอะ มาๆ~ วู้ววว~!\""
1007602-31 = "โอ้! เยี่ยมมากเลยค่ะ! กระตือรือร้นสุดๆ สมกับเป็นคุณครูเลยค่ะ!"
1007602-32 = "แต่ว่าเราก็ไม่ควรรีบร้อนยืดเส้น หรือทำอย่างลวกๆ นะคะ"
1007602-33 = "เพราะงั้นฉันเลยจำท่าต่างๆ มาก่อนแล้วค่ะ! คุณครูจะได้ไม่ต้องไปหาเองทีละท่าให้ลำบากไงล่ะคะ!"
1007602-34 = "เอาละ ถ้างั้นฉันจะแสดงท่าที่จำมาให้ดูก่อน แล้วคุณครูค่อยทำตามนะคะ!"
1007602-35 = "ท่าแรกค่ะ! ท่ายืดกล้ามเนื้อทั่วร่างกายค่ะ!"
1007602-36 = "ยกขาข้างหนึ่งขึ้นมาแบบนี้..."
1007602-37 = "หลังจากนั้นก็ทำ... แบบนี้..."
1007602-41 = "บะ...แบบ...นี้...?"
1007602-46 = "[ns5] \"...โคโทริ?\"\n[ns6] (ทำอะไรอยู่น่ะ...?)"
1007602-49 = "อะ...เอ๋? เอ่อ...? อืม..."
1007602-50 = "เดี๋ยวนะ คือว่าแบบนี้มัน..."
1007602-51 = "...เห!?"
1007602-54 = "― [log=코토리 응원단ND]อะ...เอ๋...?[/log][wa:2140] "
1007602-56 = "― [log=코토리 응원단ND]อืม อื้อออ... ต้องยืดแขนไปแตะให้ถึง...?[/log][wa:5600] "
1007602-59 = "― [log=코토리 응원단ND]อะไรกัน...[/log][wa:1580] "
1007602-61 = "― [log=코토리 응원단ND]ถ้าออกแรงตรงนี้ขึ้นอีกละก็...!?[/log][wa:1380] "
1007602-64 = "― [log=코토리 응원단ND]ฮึก...!?[/log]"
1007602-66 = "― [log=코토리 응원단ND]อะ...อะอะอะ...อ๊าย...![/log][wa:240] "
1007602-69 = "[ns7] \"อย่าฝืนเลย โคโทริ! ทำแบบนั้นเดี๋ยวก็บาดเจ็บหรอก!\"\n[ns8] \"ใจเย็นๆ ก่อน จะฝืนออกแรงไม่ได้นะ\""
1007602-72 = "― [log=코토리 응원단ND]ปะ... แปลกจังเลยนะคะ...![/log][wa:740] "
1007602-74 = "― [log=코토리 응원단ND]ฉะ...ฉันก็ทำตามที่อ่านมาแท้ๆ...![/log][wa:660] "
1007602-77 = "― [log=코토리 응원단ND]ฉันรู้ว่าคนเราแต่ละคนมีความยืดหยุ่นไม่เท่ากันก็จริง แต่ว่า...[/log][wa:180] "
1007602-79 = "― [log=코토리 응원단ND]ไม่คิดว่าจะเป็นแบบนี้...[/log][wa:10] "
1007602-82 = "― [log=코토리 응원단ND]ขะ... ขอลองใหม่อีกที...[/log][wa:2040] "
1007602-84 = "― [log=코토리 응원단ND]อะ... อะอะ...! โอ๊ย...!![/log][wa:2420] "
1007602-87 = "― [log=코토리 응원단ND]มะ...มากกว่านี้คงไม่ไหว...[/log][wa:1820] "
1007602-89 = "― [log=코토리 응원단ND]ฮือออ... คะ...คือว่า... คุณครูคะ... นี่มัน...[/log][wa:6730] "
1007602-92 = "― [log=코토리 응원단ND]ฉันไม่ได้ตั้งใจที่จะ...[/log][wa:1920] "
1007602-94 = "― [log=코토리 응원단ND]ให้คุณครูเห็นสภาพแบบนี้หรอกนะคะ...[/log]"
1007602-97 = "― [log=코토리 응원단ND]หมายถึงให้เห็นภาพลักษณ์ที่ดูไม่ดีแบบนี้น่ะค่ะ...[/log][wa:2640] "
1007602-99 = "― [log=코토리 응원단ND]ฮือออออ...[/log][wa:180] "
1007602-103 = "ขอโทษค่ะ คุณครู แผนการที่ฉันวางไว้ มันไม่ได้เป็นแบบนี้..."
1007602-104 = "ถ้าเป็นแบบนี้ดูเหมือนว่าจะทำให้คุณครูเสียเวลาเปล่าๆ แถมยังช่วยอะไรคุณครูไม่ได้เลยด้วยค่ะ..."
1007602-105 = "[s9] ค่อยๆ ดันหลังให้โคโทริ\n[s10] \"เดี๋ยวครูช่วยเอง สงบใจก่อนเถอะ\""
1007602-108 = "คะ...คุณครู...?! บะ...แบบนี้มัน...!?"
1007602-109 = "ถะ...ถึงฉันจะไม่ค่อยเข้าใจเหตุผลคุณครูเท่าไร แต่แบบนี้มันน่าอายนะคะ...!!"
1007602-110 = "...คะ?"
1007602-111 = "ปกติยืดเส้นเขาก็ทำเป็นคู่กันบ่อยๆ งั้นเหรอคะ? โดยเฉพาะคนที่เพิ่งเคยครั้งแรก...?"
1007602-112 = "ยะ...อย่างนั้นเหรอคะ...!? ฉะ...ฉันไม่ได้หาข้อมูลเรื่องนั้นมาด้วยเลยน่ะค่ะ..."
1007602-113 = "ถะ...ถะถะถะ...ถ้างั้น...!"
1007602-114 = "...ขะ... ขอรบกวนด้วยนะคะ!!"
1007602-116 = "(หลังจากนั้น คุณครูกับโคโทริก็ผลัดกันช่วยอีกฝ่ายยืดเส้นคนละหนึ่งเซ็ต)"
1007602-117 = "(พอได้ยืดเส้นแล้ว ก็รู้สึกว่าร่างกายที่ตึงๆ อยู่ผ่อนคลายขึ้น และขยับตัวได้สบายขึ้นมาก)"

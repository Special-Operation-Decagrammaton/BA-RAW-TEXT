1007602-27 = "3;코토리 응원단ND;03;참고로 스트레칭이란, 사용할 근육이나 관절 등을 의도적으로 긴장시키고 이완시켜 '회복 탄력성'을 향상시키는 준비 운동의 한 형태로, 처음으로 한 스포츠 과학 논문에서…….\n#3;hophop\n#3;em;[재잘]"

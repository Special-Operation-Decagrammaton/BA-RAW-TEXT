1002906-3 = "#na;(나츠의 말대로 굉장히 화창하고 맑은 날씨였다.)"
1002906-4 = "#na;(햇볕은 따듯하지만 덥지 않고, 바람은 시원하지만 강하지 않았다.)"
1002906-5 = "3;나츠;05;후후, 선생님. 이쪽이야, 이쪽.\n#3;a\n#3;em;[반응]\n#3;hophop"
1002906-6 = "3;나츠;05;이런 날에는 좋은 자리를 선점하려는 사람들이 많아지니 말이지."
1002906-7 = "3;나츠;01;일찍 와있는 게 중요하다고."

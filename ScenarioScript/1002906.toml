1002906-19 = "3;나츠;99;……흠."
1002906-20 = "[s3] \"……나츠?\"\n[s4] \"왜 그래?\""
1002906-21 = "3;나츠;02;아니. 그냥…….\n#3;em;[반응]\n#3;m3"
1002906-22 = "3;나츠;02;아니. 그냥…….\n#3;em;[반응]\n#3;m3"
1002906-23 = "3;나츠;01;이번에는 '무슨 일 있어?'같은 걸 따로 물어보지 않길래."
1002906-24 = "3;나츠;02;정말로 선생님은 얼굴만 봐도 일이 있는지 없는지 아는구나~. 싶어서. 신기해가지고."
1002906-25 = "3;나츠;99;오늘은 진짜 아무 일도 없었거든. 그냥 날씨도 좋고 해서 나와 본 거라……."
1002906-26 = "3;나츠;05;그때 불현듯, 그 생각이 든 거지!\n#3;em;[!]"
1002906-27 = "3;나츠;05;진짜 아무 일 없을 때 그냥 부르면 선생님은 어떻게 할까? 평소처럼 '무슨 일이야?'라면서 나올까?"
1002906-28 = "3;나츠;01;그런데 보낸 말만 듣고도 바로 피크닉이니 밖이니 했잖아?\n#3;em;[?]"
1002906-29 = "3;나츠;01;모모톡으로는 '좋아! 익숙해졌군!'이라고 썼지만 내심 놀라서 '와-.'라고 생각했거든."
1002906-30 = "3;나츠;99;흠…….\n#3;em;…"
1002906-31 = "3;나츠;01;대체 무슨 차이일까."
1002906-32 = "3;나츠;05;어떻게 구분하는 걸까! 나를 감시하는 걸까? 아니면 독심술이라도 있는 걸까!\n#3;em;[반짝]"
1002906-33 = "3;나츠;99;……하하.\n#3;stiff"
1002906-34 = "3;나츠;02;그래. 사실 그런 건 아무래도 상관없겠지. 중요한 건 선생님이랑 여기에 나란히 앉았다는 거고.\n#3;em;[반응]"
1002906-35 = "3;나츠;02;날씨도 좋고, 차려온 블루베리 파이와 우유도 생각만큼 맛있어서 만족스럽다는 거고."
1002906-36 = "3;나츠;01;모든 것이 좋은, 지금의 상황을 그저 그대로 받아들여 즐기는 것일 테니까."
1002906-37 = "3;나츠;02;……선생님은 어때?\n#3;em;[?]"
1002906-38 = "3;나츠;02;혹시 바쁜데 괜히 불러내서 귀찮게 한 것일까……?"
1002906-39 = "3;나츠;99;그건 좀 슬플 거 같은데.\n#3;stiff\n#3;em;[속상함]"
1002906-40 = "[s5] \"전혀. 편안한 기분이야.\"\n[s6] \"아니. 이런 때 아니면 언제 이런 걸 해 보겠어?\""
1002906-41 = "3;나츠;01;하하하. 그거 든든한걸. 말만이라도 고마워라."
1002906-42 = "3;나츠;01;하하하. 그거 든든한걸. 말만이라도 고마워라."

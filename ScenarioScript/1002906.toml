1002906-12 = "3;나츠;03;자, 자! 차린 건 없지만, 많이 드십시오~. 우유와 블루베리 파이입니다~.\n#3;em;[음표]\n#3;greeting"
1002906-13 = "[s1] \"우유와 블루베리 파이라. 맘에 들어.\"\n[s2] \"꽤 맛있어 보이는 조합이네\""
1002906-14 = "3;나츠;05;후후. 역시 선생님이야. 보는 눈이 있군.\n#3;em;[반짝]"
1002906-15 = "3;나츠;05;후후. 역시 선생님이야. 보는 눈이 있군.\n#3;em;[반짝]"

[translation]
1002906-1 = "休息時間「販賣部」"
1002906-3 = "（和夏說的一樣，今天是相當晴朗的一天）"
1002906-4 = "（陽光溫暖卻不會太熱，微風也十分宜人）"
1002906-5 = "啊，老師。這裡這裡～"
1002906-6 = "因為今天天氣很好，來這邊野餐的人也變多了。"
1002906-7 = "所以要早點來才行。"
1002906-12 = "來吧來吧，不用客氣～#n你看～是牛奶和藍莓派！"
1002906-13 = "[s1] 「看起來很好吃的組合呢。」\n[s2] 「看起來好好吃。」"
1002906-14 = "呵呵。#n不愧是老師，真有眼光呢。"
1002906-15 = "呵呵。#n不愧是老師，真有眼光呢。"
1002906-19 = "……呼呣。"
1002906-20 = "[s3]「……夏？」\n[s4]「？？？」"
1002906-21 = "沒什麼……"
1002906-22 = "沒什麼……"
1002906-23 = "只是在想這次你好像沒問我「發生什麼事了？」之類的問題。"
1002906-24 = "原來如此，老師真的是從表情這類細微的地方看出「是不是發生什麼事了」的啊。#n哎呀哎呀，真厲害呢。"
1002906-25 = "如你所見，我今天真的沒事，只是看天氣不錯……"
1002906-26 = "突然靈機一動而已。"
1002906-27 = "老師平時總是忙著處理與學生對談之類的事，如果突然在真的沒事的時候聯絡……#n這時老師會認為是不是發生什麼事了嗎？會不會問我「怎麼了嗎？」呢？"
1002906-28 = "然而實際上並沒有呢。"
1002906-29 = "雖然我沒有在MomoTalk上這樣回覆，其實我內心相當驚訝哦。"
1002906-30 = "唔嗯……"
1002906-31 = "真厲害呢……還是說老師其實一直在監視我？"
1002906-32 = "還是說你會讀心術！？無論哪邊都很浪漫呢！"
1002906-33 = "……啊哈。"
1002906-34 = "但老實說，那些其實都無關緊要。#n重要的是能像現在這樣，和老師待在一起。"
1002906-35 = "天氣這麼好，藍莓派和牛奶也很好吃，老師也在，滿足滿足。"
1002906-36 = "現在的一切，都很美好。"
1002906-37 = "……老師覺得呢？"
1002906-38 = "雖然是我找你出來，不過……#n如果在忙碌的時候造成你的困擾……"
1002906-39 = "我會有點難過的。"
1002906-40 = "[s5] 「完全沒有那回事唷。」\n[s6] 「我今天也非常開心。」"
1002906-41 = "啊哈哈，那真是太好了，謝謝你這樣說。"
1002906-42 = "啊哈哈，那真是太好了，謝謝你這樣說。"
1002906-43 = "像這樣無須任何理由也能約出來一起共度時光的對象……#n對我來說也並不多。"
1002906-44 = "……"
1002906-48 = "……嗯，這種話題就到這裡吧！現在不想說這些嚴肅的話題！"
1002906-49 = "難得的時光都要褪色了呢。#n抱歉抱歉～It's my mistake！"
1002906-50 = "好了，那麼就……"
1002906-51 = "開始享受單純而悠閒的時光吧？"
1002906-57 = "派和牛奶都準備了很多哦。#n來，請用請用～"
1002906-59 = "（夏一邊說，一邊高興地拿起一塊藍莓派放入嘴裡）"
1002906-60 = "（和夏一起度過愉快的時光後，回到了夏萊）"

[translation]
1002906-1 = "เวลาพักผ่อน: ร้านค้า"
1002906-3 = "(วันนี้ท้องฟ้าสดใสและอากาศก็แจ่มใสมากๆ เหมือนที่นัตสึบอก)"
1002906-4 = "(ถึงดวงอาทิตย์จะทำหน้าที่อย่างแข็งขัน แต่อากาศก็ไม่ได้ร้อนเท่าไรนัก และลมที่พัดเอื่อยๆ ก็ทำให้รู้สึก#nเย็นสบาย)"
1002906-5 = "ฮุฮุ คุณครู ทางนี้ ทางนี้~"
1002906-6 = "วันที่อากาศดีๆ แบบนี้ มีคนพยายามหาที่นั่งดีๆ เยอะเลยละ"
1002906-7 = "เพราะงั้นการมาถึงก่อนมันจึงเป็นเรื่องสำคัญนะ"
1002906-12 = "เอาละๆ! ฉันไม่ได้เตรียมอะไรมามากมาย แต่ก็ทานให้เต็มที่เลยนะ~ นมกับบลูเบอร์รี่พายละ~"
1002906-13 = "[s1] \"นมกับบลูเบอร์รี่พายเหรอ... โดนใจเลย\"\n[s2] \"เป็นของกินที่เข้ากันดีนะ\""
1002906-14 = "ฮุฮุ สมกับเป็นคุณครูจริงๆ สายตาเฉียบแหลมมากๆ!"
1002906-15 = "ฮุฮุ สมกับเป็นคุณครูจริงๆ สายตาเฉียบแหลมมากๆ!"
1002906-19 = "ฮึ่ม..."
1002906-20 = "[s3] \"นัตสึ...?\"\n[s4] \"มีอะไรเหรอ?\""
1002906-21 = "ไม่สิ ก็แค่..."
1002906-22 = "ไม่สิ ก็แค่..."
1002906-23 = "คราวนี้คุณครูไม่ได้ถามฉันว่า \"มีเรื่องอะไรเหรอ\" น่ะ"
1002906-24 = "จริงๆ แล้วแค่คุณครูมองหน้าก็รู้ได้เลยสินะ ว่ามีอะไรผิดปกติหรือไม่มีน่ะ~ น่าทึ่งจริงๆ"
1002906-25 = "วันนี้ไม่มีเรื่องอะไรหรอกนะ แค่อากาศดีจนน่าออกมาข้างนอกน่ะ..."
1002906-26 = "จู่ๆ ตอนนั้นก็คิดขึ้นมาได้น่ะ!"
1002906-27 = "ว่าถ้าเรียกคุณครูออกมาตอนที่ไม่มีเรื่องอะไรจริงๆ คุณครูจะทำยังไง? จะยังถามฉันว่า \"มีเรื่องอะไร\"#nเหมือนทุกทีรึเปล่า?"
1002906-28 = "แต่พอเห็นข้อความที่ส่ง คุณครูก็ถามมาเลยนี่นาว่าไปปิกนิกหรือไปข้างนอกใช่มั้ยล่ะ?"
1002906-29 = "ถึงใน MOMOTALK จะพิมพ์ไปว่า \"ดีล่ะ ชินแล้วสินะ!\" ก็จริงอยู่ แต่ที่จริงแล้วในใจรู้สึกประหลาดใจจนร้อง#nว้าวเลยละ"
1002906-30 = "อืมมมม"
1002906-31 = "มันต่างกันยังไงนะ..."
1002906-32 = "คุณครูแยกออกได้ยังไงกัน? หรือว่าคอยจับตาดูฉันอยู่เหรอ? หรือมีพลังจิตอ่านใจคนได้รึเปล่า?!"
1002906-33 = "ฮ่าฮ่า..."
1002906-34 = "นั่นสิ ที่จริงเรื่องพวกนั้นมันไม่เกี่ยวเลยสักหน่อย ที่สำคัญก็คือตอนนี้ฉันนั่งอยู่ที่นี่กับคุณครูต่างหาก"
1002906-35 = "อากาศดีๆ บลูเบอร์รี่พายกับนมที่เตรียมมาก็อร่อยอย่างที่คิด... แค่นี้ก็พอใจแล้วละ"
1002906-36 = "ทุกๆ อย่างดีหมด... แค่ยอมรับสถานการณ์ในตอนนี้และสนุกไปกับมันก็พอ..."
1002906-37 = "แล้วคุณครูละ?"
1002906-38 = "รู้สึกรำคาญเพราะถูกเรียกออกมาตอนที่ยุ่งรึเปล่า...?"
1002906-39 = "ถ้าเป็นแบบนั้นก็น่าเศร้านิดๆ นะ"
1002906-40 = "[s5] \"ไม่เลย ครูรู้สึกสบายมากเลยละ\"\n[s6] \"ไม่นะ ถ้าไม่ใช่ตอนนี้ก็ไม่รู้จะได้ทำแบบนี้อีกเมื่อไร?\""
1002906-41 = "ฮ่ะฮ่ะฮ่ะ ดูมั่นใจสุดๆ ถึงจะเป็นแค่คำพูดแต่ก็ขอบคุณนะ"
1002906-42 = "ฮ่ะฮ่ะฮ่ะ ดูมั่นใจสุดๆ ถึงจะเป็นแค่คำพูดแต่ก็ขอบคุณนะ"
1002906-43 = "ก็นะ... ฉันไม่ค่อยมีคนให้เรียกออกมาโดยไม่มีเหตุผลอะไรแล้วก็มานั่งเล่นอยู่ด้วยกันแบบนี้สักเท่าไร#nหรอก"
1002906-44 = "ฮึ่ม..."
1002906-48 = "ช่างเถอะ! อื้อ เลิกพูดเรื่องนี้ดีกว่า! เลิกพูดเรื่องที่ซีเรียสๆ กันเถอะ"
1002906-49 = "ไม่งั้นเดี๋ยว \"การมาปิกนิก\" จะเสียอรรถรสหมด ซอรี่ๆ อิส มาย มิสเทค~"
1002906-50 = "เอาละ ถ้าอย่างนั้นแล้ว..."
1002906-51 = "ถ้างั้นเรามาเริ่มการ \"ปิกนิก\" จริงๆ โดยไม่มีอะไรกวนใจกันเลยมั้ย?"
1002906-57 = "ฉันเตรียมมาเยอะ เชิญทานได้ตามสบายเลย~"
1002906-59 = "(นัตสึพูดจบก็ลงมือหยิบบลูเบอร์รี่พายหนึ่งชิ้นใส่ปากทันที)"
1002906-60 = "(หลังคุณครูกับนัตสึก็นั่งทานบลูเบอร์รี่พายกับนมด้วยกันจนหมด จากนั้นคุณครูก็กลับไปที่ชาเล่ต์)"

[translation]
1002906-1 = "Break Time: Snack Shop"
1002906-3 = "(Just as Natsu said, it was a sunny and clear day.)"
1002906-4 = "(The sun was warm without being hot, and the wind was refreshing without being too strong.)"
1002906-5 = "Heehee. Sensei. Over here, this way."
1002906-6 = "On days like these, a lot of people are trying to get good seats."
1002906-7 = "It's important to get here early."
1002906-12 = "Now, now! It's not much, but I hope you enjoy some milk and blueberry pie!"
1002906-13 = "[s1] \"Milk and blueberry pie. I like it.\"\n[s2] \"What a delicious combination!\""
1002906-14 = "Heehee. You have good taste, Sensei."
1002906-15 = "Heehee. You have good taste, Sensei."
1002906-19 = "...Hmm."
1002906-20 = "[s3] \"...Natsu?\"\n[s4] \"What's up?\""
1002906-21 = "Nothing. It's just..."
1002906-22 = "Nothing. It's just..."
1002906-23 = "You normally start with, \"Is something wrong?\" or something like that."
1002906-24 = "It's as if you can tell whether something's wrong just by looking at someone's face, Sensei. It's impressive."
1002906-25 = "I came out because the weather's just so nice today."
1002906-26 = "Then suddenly, I had this thought!"
1002906-27 = "What would you do if I called you and there really was nothing going on? Would you ask, \"Is something the matter?\" like usual?"
1002906-28 = "But instead, as soon as you got my message, you asked if I was outside on a picnic, right?"
1002906-29 = "I did write, \"Good! You're used to me now!\" on MomoTalk, but secretly, I was like, \"Wow...\""
1002906-30 = "Hmm..."
1002906-31 = "I wonder what was different."
1002906-32 = "How could you tell?! Are you spying on me? Can you read minds?!"
1002906-33 = "...Haha."
1002906-34 = "Whatever. It doesn't matter either way. What's important is that you're sitting here with me."
1002906-35 = "The weather is nice, and the blueberry pie and milk turned out to be as delicious as I'd hoped. I'm satisfied."
1002906-36 = "I'm just going to enjoy this little slice of perfection."
1002906-37 = "What do you think, Sensei?"
1002906-38 = "Am I bothering you by calling you out here when you're busy?"
1002906-39 = "I think that would make me a little sad."
1002906-40 = "[s5] \"Not at all. I'm very comfortable here.\"\n[s6] \"No. If not now then when?\""
1002906-41 = "Hahaha. That's a relief. Thanks, Sensei."
1002906-42 = "Hahaha. That's a relief. Thanks, Sensei."
1002906-43 = "Well...I don't have a lot of people I can call on and hang out with for no particular reason."
1002906-44 = "...Hmm."
1002906-48 = "Okay! I'm done! No more serious talk from now on."
1002906-49 = "This was supposed to be just a picnic. Sorry, sorry. I got carried away."
1002906-50 = "So, now that's established..."
1002906-51 = "Shall we begin our normal, run-of-the-mill picnic?"
1002906-57 = "There's plenty, so eat as much as you like!"
1002906-59 = "Without hesitation, Natsu took the first slice of blueberry pie and put it in her mouth."
1002906-60 = "(I returned to Schale once Natsu and I finished all the blueberry pie and milk.)"

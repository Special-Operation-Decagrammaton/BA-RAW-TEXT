[translation]
200004-1 = "第4話;輝くトラペゾヘドロン"
200004-4 = "ね、ねぇ……。"
200004-5 = "帰ってくるの、遅くないかな？"
200004-6 = "……まだ潜って3分も経ってない。"
200004-7 = "で、でも水中では何が起こるか分からないし……。"
200004-8 = "急流に流されてないかな？#n危ない生き物に襲われてないかな？"
200004-9 = "……分からない。"
200004-10 = "でも、あの子たちなら大丈夫。"
200004-15 = "……合図だ。"
200004-16 = "ビーコンの位置は？"
200004-17 = "南東1000フィート。"
200004-18 = "だいぶ遠くまで流されたね。#n暗いし、迎えに行こっか。"
200004-22 = "ふぅ……。"
200004-23 = "……予定のポイントより離れてる。どうしたの？"
200004-24 = "ごめんごめん。思ったより流れが速くてさ。#nちょっと方向の調整に手間取っちゃって。"
200004-25 = "……減圧はちゃんとした？"
200004-26 = "当然。私を誰だと思ってるの？"
200004-27 = "私は別にしなくても平気だけど……。"
200004-28 = "油断は禁物。水中では何が起きてもおかしくないんだから。"
200004-29 = "うぅ……。"
200004-33 = "それで、「難破船」の中はどうだった？"
200004-34 = "収穫ゼロ。時間が経ちすぎてる。"
200004-35 = "やっぱ今回もダメかぁ……。"
200004-36 = "あ、でも……面白いものは見つけたよ。"
200004-38 = "これはガラスの欠片……？"
200004-39 = "ガラスより固そう……綺麗な形をしてるね。"
200004-40 = "なんか光ってるようにも見えるよね。ちょっと宝石っぽくない？"
200004-41 = "そうだね。この光……夕暮れに染まる水平線みたい。"
200004-42 = "……あまり見すぎないようにね。#nどんな影響があるか分からないし。"
200004-43 = "皮膚が焼けちゃうかも……。"
200004-46 = "んで、この任務いつまで続けるの？"
200004-47 = "いまさら？"
200004-48 = "……新しい指示が来るまで。勝手にやめちゃいけないよ。"
200004-49 = "これが、私たちの使命だもの。"
200004-50 = "シワシワになっちゃう……。"
200004-54 = "……今日はここまで。#nそろそろ帰ろっか。"
200004-55 = "この――「輝くトラペゾヘドロン」を持って。"

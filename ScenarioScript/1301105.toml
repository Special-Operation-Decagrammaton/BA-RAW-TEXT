1301105-11 = "3;모모이;00;그 중엔 미소녀 연애 시뮬레이션 이야기도 있었어."
1301105-12 = "[s] \"확실히 그런 게임이 몇 개 있었지.\""
1301105-13 = "3;모모이;03;응! 맞아!\n#3;em;[하트]\n#3;hophop"
1301105-14 = "3;모모이;00;연애 시뮬레이션, 게다가 연애 어드벤처 게임은, 게임 중에서도 시나리오의 비중이 큰 게임이잖아?"
1301105-15 = "3;모모이;99;그 왜, 보통 특정한 이벤트에서 어떤 선택지를 고르느냐에 따라.\n#3;em;…"

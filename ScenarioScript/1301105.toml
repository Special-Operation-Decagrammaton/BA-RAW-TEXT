1301105-1 = "#title;모모이 메모리얼!"
1301105-2 = "#na;(모모이와 사전에 약속한 대로 약속장소에 나오자.)"
1301105-3 = "3;모모이;00;삐빅! 선생님. 5분 지각! 호감도 하락이야!\n#3;a\n#3;hophop\n#3;em;[재잘]"

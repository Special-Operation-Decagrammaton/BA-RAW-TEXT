[translation]
1301105-1 = "桃色回憶"
1301105-2 = "（到了跟桃井約好的地點）"
1301105-3 = "嗶嗶──！老師，你遲到了5分鐘！「好感度降低了」！"
1301105-4 = "[s1] 「抱歉，路上有點耽擱了……」\n[s2] 「好感度……？」"
1301105-5 = "在遊戲裡這種理由是行不通的！還有，就像剛剛在MomoTalk上說的一樣，"
1301105-6 = "在遊戲裡這種理由是行不通的！還有，就像剛剛在MomoTalk上說的一樣，"
1301105-7 = "今天要一起體驗懷舊的「戀愛模擬」唷！啊，現在已經開始了喔！"
1301105-8 = "[s] 「懷舊的戀愛模擬？」"
1301105-9 = "其實我們遊戲開發部想要研究更多種類的懷舊遊戲，"
1301105-10 = "之後試著做幾個遊戲看看。"
1301105-11 = "在那之中就有戀愛模擬遊戲。"
1301105-12 = "[s] 「原來如此。」"
1301105-13 = "嗯，然後呀，"
1301105-14 = "戀愛模擬和戀愛冒險遊戲，在遊戲領域中是劇情特別重要的遊戲對吧？"
1301105-15 = "像是在特定的事件中依據選項的不同，或是根據去的地方和時間點，"
1301105-16 = "讓好感度產生變化，進而影響結局。"
1301105-17 = "[s] 「這樣啊，那你剛才說我的『好感度』……」"
1301105-18 = "沒錯！現在對老師的好感度是－5！"
1301105-19 = "再這樣下去可不行唷？"
1301105-20 = "如果不選擇正確選項的話就沒辦法蒐集插圖，也無法到達HappyEnd喔！"
1301105-21 = "來吧老師！"
1301105-22 = "為了做出好的遊戲，開始我們的戀愛模擬吧！"
1301105-23 = "[s] 「嗯，那我很樂意喔。」"
1301105-24 = "耶嘿嘿，那我們出發吧！"
1301105-28 = "[ns] 「遊戲中心？」"
1301105-29 = "嗯，沒錯！"
1301105-30 = "那麼接下來是第一個選項唷！"
1301105-31 = "你和女主角一起來到了遊戲中心。"
1301105-32 = "首先，應該要做什麼呢？"
1301105-33 = "[ns3] 「要玩夾娃娃機嗎？」\n[ns4] 「當然是要玩《神奇女孩 怪物世界》吧！」"
1301105-35 = "噗噗～！好感度－5！"
1301105-36 = "女主角對夾娃娃機沒有興趣！"
1301105-37 = "[s5] 「可是，我是想說要給桃井禮物……」"
1301105-38 = "咦……啊，是這樣嗎？"
1301105-39 = "既，既然老師都這麼說了……"
1301105-40 = "這樣也好吧……？"
1301105-41 = "那就看在這份心意上，讓你的好感度＋10吧！"
1301105-42 = "[s6] 「還真是隨興啊……」"
1301105-43 = "那種小細節就不要在意了，走吧走吧！"
1301105-44 = "哇！跟我想的一樣！！"
1301105-45 = "對老師的好感度＋500了唷！"
1301105-46 = "[s7] 「一次加這麼多沒問題嗎！？」"
1301105-47 = "嗯，我也正好想挑戰《神奇女孩》的一命通關嘛！"
1301105-48 = "[s8] 「那我們就來比誰先過關吧！」"
1301105-49 = "啊哈哈！我接受你的挑戰！"
1301105-51 = "決鬥！"
1301105-54 = "呼，在遊戲中心玩了一圈，肚子都餓了呢……"
1301105-57 = "（偷看）"
1301105-58 = "[s] 「接下來要去吃午餐對吧？」"
1301105-59 = "嗯，答對了！"
1301105-60 = "現在女主角肚子很餓！"
1301105-61 = "要吃什麼好呢？"
1301105-62 = "[s9] 「說到約會的慣例就是義大利麵吧？」\n[s10] 「啊，桃井你看。是《薩爾那傳說》的合作。」"
1301105-63 = "約，約會的慣例……！"
1301105-64 = "[s11] 「怎麼了？難道你不喜歡義大利麵嗎？」"
1301105-65 = "沒，沒什麼！沒問題的！"
1301105-66 = "不錯嘛，有照慣例是好事！嗯，是正確的選擇！"
1301105-67 = "讓老師的好感度＋150！走吧！"
1301105-68 = "[s12] 「呃，只要能在30分鐘內吃完這份情侶套餐的話……」"
1301105-69 = "……全部，免費？"
1301105-70 = "這下只能以玩家的身分接受挑戰了呢老師！"
1301105-71 = "[s13] 「呃，以玩家的身分？」"
1301105-72 = "是成就嘛！是挑戰唷，是任務唷！"
1301105-73 = "咦，竟然真的是！"
1301105-74 = "只要能吃完特製超辣咖哩，就可以獲得《薩爾那傳說》裡的「大師之刃」氣球周邊作為禮物……"
1301105-75 = "走吧，老師！"
1301105-76 = "[s14]「呃，這個選項有選對嗎？」"
1301105-77 = "嗯！好感度＋1億！我們趕快走吧！"
1301105-78 = "啊，上面寫著「售完為止」……！"
1301105-79 = "得在賣完之前趕快過去才行！"
1301105-80 = "[s15] 「那個好感度系統是不是有Bug？」"
1301105-81 = "別管那些了我們趕快！這可是挑戰唷！對我們的挑戰！"
1301105-82 = "這也是遊戲的一環，絕對要過關才行！"
1301105-85 = "（和桃井一起挑戰了指定套餐）"
1301105-89 = "哈姆，哈姆！嚼嚼……咕嚕！真好吃！"
1301105-90 = "[s] 「雖然真的很好吃，但是桃井，再吃下去的話……」"
1301105-91 = "不行！加油一點啊老師！終點就在前面了唷！"
1301105-92 = "[s] 「桃井，我呀，吃完這頓飯就要回老家……」"
1301105-93 = "老師Stop！"
1301105-94 = "只有這個Flag絕對不能立！"
1301105-96 = "（總算是和桃井兩個人吃完了）"
1301105-98 = "嗯──，今天去了好多地方呢～"
1301105-99 = "和老師在一起，一整天都很開心！"
1301105-100 = "[s] 「那真是太好了。話說回來，結局是什麼呢？」"
1301105-101 = "……結局？什麼意思？"
1301105-102 = "[s] 「你說結局會因為好感度而改變的對吧？」"
1301105-103 = "……啊，對吼！是這樣沒錯！"
1301105-104 = "玩得太開心，完全忘記這回事了……"
1301105-105 = "今天老師的最終好感度是，那個……"
1301105-106 = "是，是HappyEnd！拍拍手，恭喜！"
1301105-107 = "太好了呢老師！成功攻略了女主角喔！"
1301105-108 = "[s] 「……桃井？」"
1301105-109 = "啊，啊哈，啊哈哈……"
1301105-110 = "[s] 「不管怎樣，只要桃井開心的話就好了。」"
1301105-111 = "咦，怎麼突然做出大人的回應！？"
1301105-112 = "這，這就是高手嗎……？"
1301105-113 = "[s16] 「話說回來雖然說是好感度，」\n[s17] 「其實是按照桃井的心情來決定的對吧？」"
1301105-114 = "咦？嗯。"
1301105-115 = "咦？嗯。"
1301105-116 = "[s] 「那『成功攻略了女主角』就是說……」"
1301105-118 = "（啊，咦！？仔，仔細想想的話好像就是這個意思……！？）"
1301105-119 = "抱，抱歉老師，我突然想起有件重要的事！先走了！"
1301105-122 = "（就連留住他的時間都沒有，桃井像風一樣的離開了）"

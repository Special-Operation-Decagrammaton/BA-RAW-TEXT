[translation]
1301105-1 = "ความทรงจำของโมโมอิ!"
1301105-2 = "(คุณครูออกมาสถานที่นัดพบกับโมโมอิตามที่สัญญาเอาไว้)"
1301105-3 = "ปี๊บ! คุณครูมาสาย 5 นาที! ค่าความชื่นชอบลดลงแล้ว!"
1301105-4 = "[s1] \"ขอโทษนะ โมโมอิ รถมันติด...\"\n[s2] \"ค่าความชื่นชอบลดลงงั้นเหรอ?\""
1301105-5 = "อ่ะแฮ่ม! เหตุผลที่วันนี้ฉันเรียกคุณครูออกมาที่นี่"
1301105-6 = "อ่ะแฮ่ม! เหตุผลที่วันนี้ฉันเรียกคุณครูออกมาที่นี่"
1301105-7 = "เพราะวันนี้ฉันจะลองทดสอบเรื่องเกมจีบหนุ่มสาวแบบเรโทรกับคุณครูไงล่ะ"
1301105-8 = "[s] \"เกมจีมหนุ่มสาวแบบเรโทร?\""
1301105-9 = "ตอนนี้ทางชมรมพัฒนาเกมกำลังหารือกันถึงเรื่องการศึกษาเกมเรโทรหลายๆ แนวอยู่..."
1301105-10 = "และเราก็คุยกันถึงเรื่องการลองทำเกมฉบับทดลองดู"
1301105-11 = "และหนึ่งในนั้นก็คือเกมจีบหนุ่มสาวรูปงามด้วย"
1301105-12 = "[s] \"ครูรู้จักเกมพวกนั้นอยู่บ้างเหมือนกัน\""
1301105-13 = "อื้ม! ใช่แล้วล่ะ!"
1301105-14 = "เกมจีบหนุ่มสาว เกมคู่รักผจญภัยมีเนื้อหาส่วนใหญ่เป็นบทเนื้อเรื่องใช่มั้ยล่ะ?"
1301105-15 = "บทก็จะเป็นไปตามตัวเลือกที่ผู้เล่นเลือกในเหตุการณ์นั้นๆ"
1301105-16 = "เมื่อค่าความชื่นชอบเปลี่ยนจะส่งผลต่อตอนจบด้วย"
1301105-17 = "[s] \"เพราะงั้นเมื่อกี๊ถึงพูดเรื่องค่าชื่นชอบสินะ...\""
1301105-18 = "ใช่! ค่าความชื่นชอบปัจจุบันของคุณครูคือ -5!"
1301105-19 = "อยู่ในระดับที่อันตรายแล้วล่ะนะ"
1301105-20 = "ถ้าเลือกคำตอบผิด จะไม่สามารถเปิดดูคัทซีนของกิจกรรมได้ และอาจไม่ได้จบแบบแฮปปี้ด้วย!"
1301105-21 = "เอาล่ะคุณครู!"
1301105-22 = "ช่วยให้ความร่วมมือเพื่อการสร้างเกมจีบหนุ่มสาวของฉันหน่อยนะ!"
1301105-23 = "[s] \"...อ่า ช่วยไม่ได้ล่ะนะ\""
1301105-24 = "ฮิฮิ งั้นไปกันเลย!"
1301105-28 = "[ns] \"นี่มัน... ร้านเกมนี่\""
1301105-29 = "อื้ม ใช่แล้วล่ะ!"
1301105-30 = "ถ้างั้น ที่นี่ก็เป็นตัวเลือกแรกนะคะ!"
1301105-31 = "คุณได้มาถึงร้านเกมพร้อมกับนางเอกแล้วค่ะ"
1301105-32 = "ต้องการทำอะไรเป็นอย่างแรกคะ?!"
1301105-33 = "[ns3] \"คีบตุ๊กตากันมั้ย?\"\n[ns4] \"ต้องเล่นวันเดอร์เกิร์ล อิน มอนสเตอร์เวิลด์อยู่แล้ว!\""
1301105-35 = "ปี๊ปปป! ค่าความชื่นชอบ -5!"
1301105-36 = "นางเอกไม่ค่อยสนใจการคีบตุ๊กตาเลยค่ะ!"
1301105-37 = "[s5] \"แต่ครูอยากคีบตุ๊กตาเป็นของขวัญให้โมโมอินี่นา...\""
1301105-38 = "อ๊ะ... งั้นเหรอคะ?"
1301105-39 = "อืม ถ้าคุณครูพูดแบบนั้นล่ะก็..."
1301105-40 = "ก็คงไม่เป็นไร หรอกมั้ง...?"
1301105-41 = "เพราะความตั้งใจจะคีบตุ๊กตาให้ฉันเป็นของขวัญ ฉันให้ค่าความชื่นชอบ +10 เลย!"
1301105-42 = "[s6] \"ระบบเหมือนจะสุ่มเลยนะ...\""
1301105-43 = "ได้ข้อสรุปแล้ว ไปกันเลย โก! โก!"
1301105-44 = "ว้าว! อันนี้ถูกใจมากเลย คุณครู!"
1301105-45 = "ค่าความชื่นชอบ +500!"
1301105-46 = "[s7] \"เพิ่มขนาดนั้นในครั้งเดียวได้ด้วยเหรอ?!\""
1301105-47 = "ก็นะ ฉันอยากเคลียร์เกมวันเดอร์เกิร์ล อิน มอนสเตอร์เวิลด์ด้วยเหรียญเดียวให้ได้น่ะ"
1301105-48 = "[s8] \"งั้นเหรอ? ถ้างั้นมาแข่งกันว่าใครจะเคลียร์ได้ก่อนกัน!\""
1301105-49 = "อ่าฮะ! ในเมื่อคุณครูส่งคำท้ามาแล้ว อย่าคิดหนีซะล่ะ!"
1301105-51 = "มาแข่งกันตัวต่อตัวเลย!"
1301105-54 = "เมื่อกี๊ที่ร้านเกมฉันตั้งใจเล่นเกมมากไปหน่อย ตอนนี้เลยหิวแล้ว... (เหลือบมอง)"
1301105-57 = "(เหลือบมอง)"
1301105-58 = "[s] \"รู้แล้ว ต่อไปเป็นมื้อเที่ยงใช่มั้ย?\""
1301105-59 = "อื้ม! ใช่แล้ว!"
1301105-60 = "เอาล่ะ ตอนนี้นางเอกหิวข้าวแล้วค่ะ!"
1301105-61 = "จะเลือกทานอาหารอะไรดีคะ?"
1301105-62 = "[s9] \"ถ้าเป็นการเดตที่แสนหวานก็ต้องพาสต้าสินะ?\"\n[s10] \"อ๊ะ โมโมอิ ดูนี่สิ ร้านนี้คอลแลปส์กับเดอะเลเจนด์ออฟเซลนา!\""
1301105-63 = "ตัวเลือกสำหรับดะ...เดตที่แสนหวาน? (สะดุ้ง)"
1301105-64 = "[s11] \"หือ? ทำไมเหรอ?\""
1301105-65 = "มะ... ไม่มีอะไรหรอกคุณครู!"
1301105-66 = "คุณครูรู้จักตัวเลือกมาตรฐานด้วยเหรอคะ? เลือกได้ถูกต้องเลย!"
1301105-67 = "ให้ค่าความชื่นชอบ +150! ไปกันเลย!"
1301105-68 = "[s12] \"อื้ม ถ้ากินเมนูคู่รักนี้หมดภายใน 30 นาที\""
1301105-69 = "จะได้กินฟรีเลยเหรอ?"
1301105-70 = "ในฐานะเกมเมอร์ก็ต้องลองดูแน่นอน คุณครู!"
1301105-71 = "[s13] \"หะ... หืม? เกมเมอร์เหรอ?\""
1301105-72 = "รับคำท้า!"
1301105-73 = "เอ๊ะ? จริงเหรอ?! จริงๆ นะ!"
1301105-74 = "ถ้าพวกเราสั่งแกงกะหรี่เผ็ดพิเศษ เราจะได้บอลลูนมาสเตอร์เบลดในเดอะเลเจนด์ออฟเซลนา#nเป็นของรางวัล..."
1301105-75 = "ไปกันเถอะคุณครู!"
1301105-76 = "[s14] \"นี่เป็นตัวเลือกที่ถูกต้องใช่มั้ย?\""
1301105-77 = "อื้ม! เอาไปค่าความชื่นชอบ +100 ล้าน! ไปกันเร็ว!"
1301105-78 = "มันเขียนไว้ด้วยว่า...มีจำนวนจำกัด"
1301105-79 = "ต้องรีบแล้วก่อนที่จะหมด!"
1301105-80 = "[s15] \"ระบบความชื่นชอบมีความหมายจริงๆ มั้ยนะ?\""
1301105-81 = "เร็วเข้า~! นี่คือการท้าทายครั้งใหญ่ของพวกเรา!"
1301105-82 = "เราต้องเคลียร์ให้ได้!"
1301105-85 = "(คุณครูกับโมโมอิสั่งเมนูพิเศษเพื่อเคลียร์ชาเล้นจ์)"
1301105-89 = "ง่ำ ง่ำ! อร่อยจัง!"
1301105-90 = "[s] \"อร่อยนะ โมโมอิ... กินอีกหน่อยสิ...\""
1301105-91 = "อีกคำ สู้ๆ คุณครู! อีกนิดเดียวเท่านั้น!"
1301105-92 = "[s] \"โมโมอิ ถ้ากินเสร็จแล้ว ครูคงจะสู่ขิตแน่...\""
1301105-93 = "ไม่ได้นะ! คุณครู!"
1301105-94 = "หยุดพูดเรื่องไม่เป็นเรื่องเลย ไม่งั้นฉันจะหักคะแนนนะ...!"
1301105-96 = "(สุดท้ายคุณครูกับโมโมอิก็จัดการกินอาหารทั้งหมดได้)"
1301105-98 = "ว้าว~ วันนี้ได้ไปเที่ยวสนุกกับคุณครูมาเต็มที่เลย~"
1301105-99 = "วันนี้ทั้งวันสนุกมากเลยล่ะ!"
1301105-100 = "[s] \"งั้นก็ค่อยยังชั่ว แล้วตอนจบล่ะ?\""
1301105-101 = "ตอนจบ...? พูดอะไรน่ะ?"
1301105-102 = "[s] \"ก็ที่บอกว่าตอนจบจะเป็นไปตามค่าความชื่นชอบไง?\""
1301105-103 = "อ่า... อ๊ะ จริงด้วย! ฉันพูดไว้นี่นา!"
1301105-104 = "มัวแต่สนุกจนลืมไปสนิทเลยสิ... (พูดงึมงำ)"
1301105-105 = "ค่าความชื่นชอบที่คุณครูได้รับวันนี้... อืม... มันก็..."
1301105-106 = "จบแบบแฮปปี้ค่ะ! (ปรบมือ)"
1301105-107 = "ยินดีด้วยนะคุณครู! เอาชนะใจนางเอกสำเร็จแล้วล่ะ!"
1301105-108 = "[s] \"หืม?\""
1301105-109 = "อ่า... ฮ่าฮ่าฮ่า...."
1301105-110 = "[s] \"ในเมื่อโมโมอิมีความสุข ครูก็ไม่ว่าอะไรหรอก\""
1301105-111 = "จะปล่อยผ่านไปเฉยๆ แบบนี้เลยเหรอ?!"
1301105-112 = "อึ่ก... คะ...คุณครูนี่...สะ...สมกับเป็น...ผู้ใหญ่..."
1301105-113 = "[s16] \"แต่มาตรฐานในการประเมินวันนี้...\"\n[s17] \"มันขึ้นอยู่กับความชอบของโมโมอิไม่ใช่เหรอ?\""
1301105-114 = "หืม...?"
1301105-115 = "หืม...?"
1301105-116 = "[s] \"หมายความว่าคนที่ครูชนะใจวันนี้ก็คือ...\""
1301105-118 = "(อ๊ะ พอคิดดูแล้วก็เป็นแบบนั้นจริงๆ ด้วยสินะ...!)"
1301105-119 = "ขะ... ขอโทษนะคุณครู ฉันขอตัวกลับก่อนนะ!"
1301105-122 = "(จากนั้นโมโมอิก็วิ่งหายไปในพริบตา)"

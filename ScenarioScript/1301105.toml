1301105-7 = "3;모모이;01;다름이 아니라, 오늘 선생님과 함께 레트로 연애 시뮬레이션을 공부하려고 이렇게 부른 거야.\n#3;em;[음표]"
1301105-8 = "[s] \"레트로, 연애?\""
1301105-9 = "3;모모이;99;이번에 우리 게임개발부에서 보다 여러 장르의 레트로 게임을 연구하고\n#3;em;…"

[translation]
1301105-1 = "Momoi Recollection!"
1301105-2 = "(I arrived at the place I promised to meet Momoi.)"
1301105-3 = "Beep! Sensei, you're five minutes late! Favorability decrease!"
1301105-4 = "[s1] \"Sorry, Momoi. Traffic was bad...\"\n[s2] \"What do you mean by favorability decrease?\""
1301105-5 = "Ahem! I'll tell you why I asked you to come here."
1301105-6 = "Ahem! I'll tell you why I asked you to come here."
1301105-7 = "I want to study retro dating sims with you, Sensei."
1301105-8 = "[s] \"Retro...dating sims?\""
1301105-9 = "The Game Development Department has been talking about researching more genres of retro games."
1301105-10 = "And we talked about making a prototype."
1301105-11 = "One of the ideas we had was a simulation game where you date beautiful girls."
1301105-12 = "[s] \"Sure, I know of those kinds of games.\""
1301105-13 = "Yes, that's right!"
1301105-14 = "Dating simulation and romance adventure games are mostly focused on their storylines, you know?"
1301105-15 = "Depending on which option you choose for a particular event in the game,"
1301105-16 = "your favorability changes, which affects the ending."
1301105-17 = "[s] \"So that's why you mentioned favorability before...\""
1301105-18 = "Yeah! Sensei's current favorability is negative five!"
1301105-19 = "It's already dangerously low!"
1301105-20 = "If you don't pick the right option, you can't watch the event cutscene or reach a happy ending!"
1301105-21 = "Now, Sensei!"
1301105-22 = "Please help me out so we can make an authentic dating simulator!"
1301105-23 = "[s] \"...Well, why not? Sure.\""
1301105-24 = "Heehee, let's go, then!"
1301105-28 = "[ns] \"This is...an arcade.\""
1301105-29 = "That's right!"
1301105-30 = "Here, you have your first choice to make!"
1301105-31 = "You've arrived at the arcade with the heroine."
1301105-32 = "What do you want to do first?"
1301105-33 = "[ns3] \"The claw machine?\"\n[ns4] \"Wonder Girl in Monster World, of course!\""
1301105-35 = "Boo! Favorability, negative five! "
1301105-36 = "The heroine wasn't very interested in the claw machine!"
1301105-37 = "[s5] \"But I wanted to win you a gift.\""
1301105-38 = "Oh...really? "
1301105-39 = "Hmm, if you say so, Sensei..."
1301105-40 = "Well, I guess this could be an exception..."
1301105-41 = "Because it was so sweet that you wanted to win me a plush, I'll raise favorability by ten!"
1301105-42 = "[s6] \"This system is kind of random...\""
1301105-43 = "Don't waste your time thinking about it. Let's go, let's go!"
1301105-44 = "Wow! We're on the same page, Sensei!"
1301105-45 = "Favorability plus five hundred!"
1301105-46 = "[s7] \"I don't think that score scales...\""
1301105-47 = "Well, I've been wanting to clear Wonder Girl's One-Coin Challenge!"
1301105-48 = "[s8] \"Yeah? Then let's compete and see who clears it first!\""
1301105-49 = "All right! Challenge accepted!"
1301105-51 = "Let's go head to head!"
1301105-54 = "I've been playing my butt off at the arcade. I'm hungry... *peek*"
1301105-57 = "*peek*"
1301105-58 = "[s] \"I know. Lunch is next, right?\""
1301105-59 = "Yes! Correct!"
1301105-60 = "Now, the heroine is hungry!"
1301105-61 = "What kind of food will you pick?"
1301105-62 = "[s9] \"Isn't pasta the standard choice for a romantic date?\"\n[s10] \"Momoi, look. They're having a Legend of Zinda event!\""
1301105-63 = "S-Standard choice for a date...! (She flinches.)"
1301105-64 = "[s11] \"Huh? What's wrong?\""
1301105-65 = "I-It's nothing, Sensei!"
1301105-66 = "How did you know the standard choice? That's the correct option!"
1301105-67 = "Your favorability is now plus one hundred and fifty! Let's go!"
1301105-68 = "[s12] \"Um, it says if you eat everything on the couple's menu within thirty minutes...\""
1301105-69 = "...your meal is entirely free?!"
1301105-70 = "As a gamer, I can't turn this opportunity down, Sensei!"
1301105-71 = "[s13] \"Wait, as a gamer?\""
1301105-72 = "Challenge accepted!"
1301105-73 = "What? Really?! It's real!"
1301105-74 = "If we eat their special spicy curry, we get a balloon in the shape of the Supreme Sword from Legend of Zinda as a reward..."
1301105-75 = "Let's go, Sensei!"
1301105-76 = "[s14] \"Um, did I choose the right option?\""
1301105-77 = "Yeah! Favorability plus a hundred million! Hurry!"
1301105-78 = "It says, \"while supplies last.\""
1301105-79 = "We have to go before they run out!"
1301105-80 = "[s15] \"Is the favorability system really all that meaningful?\""
1301105-81 = "Come on, hurry! This'll be a great challenge for the both of us!"
1301105-82 = "We must clear it!"
1301105-85 = "(I took on the special menu challenge with Momoi.)"
1301105-89 = "*gulp* *munch* *gulp* I-It's delicious!"
1301105-90 = "[s] I-It is good, but...Momoi...I can't eat another bite..."
1301105-91 = "Push a little harder, Sensei! We're almost there!"
1301105-92 = "[s] \"Momoi, when this lunch is over...I'm gonna go back to my hometown, and...\""
1301105-93 = "No, Sensei!"
1301105-94 = "Stop that nonsense, or I'll give you penalty points!"
1301105-96 = "(Somehow, I managed to eat the entire meal with Momoi.)"
1301105-98 = "Wow, we were together all day, Sensei!"
1301105-99 = "It was a lot of fun!"
1301105-100 = "[s] \"I'm glad to hear that. So, what about the ending?\""
1301105-101 = "The ending... What are you talking about?"
1301105-102 = "[s] \"You said the ending depends on your favorability.\""
1301105-103 = "Oh... Oh, right! I did say that!"
1301105-104 = "I was having so much fun that I completely forgot... *whisper*"
1301105-105 = "With the favorability you earned today is, um, it's..."
1301105-106 = "...the g-good ending! *clap* *clap* *clap*"
1301105-107 = "C-Congratulations, Sensei! You succeeded in winning over the heroine!"
1301105-108 = "[s] \"Hmm?\""
1301105-109 = "Ah, hahaha..."
1301105-110 = "[s] \"Well, it doesn't matter as long as you had fun.\""
1301105-111 = "Oh, are you going to let it go just like that?"
1301105-112 = "*gulp* Y-You're an a-adult..."
1301105-113 = "[s16] \"But today's favorability grading was...\"\n[s17] \"It's based on your preferences in the end, right?\""
1301105-114 = "Huh...?"
1301105-115 = "Huh...?"
1301105-116 = "[s] \"In other words, the heroine I won over today is...\""
1301105-118 = "(Oh, wait a minute...)"
1301105-119 = "I-I'm sorry, Sensei. I need to head back!"
1301105-122 = "(And just like that, Momoi disappeared in a flash.)"

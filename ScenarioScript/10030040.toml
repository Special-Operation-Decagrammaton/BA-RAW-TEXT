[translation]
10030040-1 = "ตอนที่ 4;6 เกลอเจอหมี"
10030040-3 = "ฮู่ว... ถ้าเข้ามาลึกแบบนี้แล้วคงไม่มีใครเห็นเนอะ"
10030040-7 = "งั้นก็... ถึงเวลาเอาเครื่องบันทึกเสียงที่แอบพกมาออกมาแล้วละค่ะ"
10030040-11 = "ถึงรองหัวหน้าจะตรวจสอบสัมภาระก่อนออกเดินทางอย่างเข้มงวดแค่ไหน แต่ก็คงคิดไม่ถึงหรอก#nว่าฉันจะเอาเครื่องบันทึกเสียงขนาดเล็กซ่อนไว้ใต้แผ่นรองพื้นรองเท้า"
10030040-12 = "ต่อให้เป็นเครื่องบันทึกเสียงขนาดเล็กแค่ไหน ถ้าใช้ไมโครโฟนที่มีความไวสูงก็จะบันทึกเสียงได้#nเหมือนกัน ฮุฮุ..."
10030040-13 = "ถึงแม้คุณภาพเสียงจะต่ำลงเล็กน้อยเมื่อเทียบกับเครื่องบันทึกเสียงขนาดปกติ แต่จะไม่บันทึกเสียงใน#nช่วงเวลาล้ำค่าที่ได้อยู่กับคุณครูก็ไม่ได้..."
10030040-21 = "ตั้งค่าความไวของไมโครโฟนและตัดเสียงรบกวนเรียบร้อย"
10030040-22 = "ตั้งค่าเครื่องเสร็จแล้ว งั้นลองบันทึกเสียง ASMR ของสภาพแวดล้อมแถวนี้ก่อนดีกว่า"
10030040-28 = "ในที่สุดก็จะได้ยินเสียงธรรมชาติที่เคยได้ยินแต่จากวิดีโอ ASMR แล้ว พอจะได้ยินด้วยหูตัวเองมันก็#nแปลกใหม่ดีนะคะ..."
10030040-33 = "ทั้งเสียงลมพัดผ่านต้นไม้..."
10030040-38 = "เสียงนกร้องเจื้อยแจ้วอย่างสนุกสนาน..."
10030040-41 = "โฮกกก..."
10030040-42 = "เสียงร้องของสัตว์ดุร้าย..."
10030040-47 = "เสียงร้องของสัตว์ดุร้าย...?"
10030040-52 = "โฮกกกกก—!"
10030040-58 = "กะ...กรี๊ดดดดดด...?!"
10030040-62 = "[ns] \"ได้ยินเสียงร้องของโคทามะมาจากทางนี้...!\""
10030040-68 = "รุ่นพี่โคทามะ เกิดอะไรขึ้นเหรอ? เป็นยังไงบ้าง?"
10030040-69 = "ทะ... ทะ... ทางโน้น..."
10030040-70 = "ทางโน้น...? มีอะไรอยู่ทางโน้นงั้นเหรอ?"
10030040-75 = "ฉันได้ยินเสียงคำรามของสัตว์ดุร้ายค่ะ...!"
10030040-80 = "สัตว์ดุร้ายเหรอ...?"
10030040-83 = "[ns] \"อย่าบอกนะว่าเงาที่เห็นตรงโน้น...\""
10030040-88 = "ย้ากกกกกก...!"
10030040-94 = "เอาละ เกร็งหน้าท้องอีกหน่อย แล้วส่งเสียงออกมาอย่างกระปรี้กระเปร่า!"
10030040-95 = "อึก..."
10030040-100 = "แค่นี้ก็น่าจะพอแล้วนี่คะ! ตอนเชียร์ก็ไม่เคยส่งเสียงขนาดนี้สักหน่อย!"
10030040-101 = "ฉันตะโกนเยอะจนเจ็บคอไปหมดแล้วค่ะ..."
10030040-102 = "การตะโกนเสียงดังมันเกี่ยวอะไรกับเบสบอลงั้นเหรอคะ"
10030040-103 = "มันเกี่ยวข้องกันหมดเลยค่ะเรย์"
10030040-107 = "เพราะถ้าจะส่งเสียงเชียร์อย่างเต็มที่ เราก็ต้องมีความสามารถในการหายใจให้เพียงพอ"
10030040-109 = "ไม่ว่าจะเป็นการออกกำลังกายแบบไหน ต่างก็ต้องใช้หัวใจและปอดที่แข็งแรงทั้งนั้น! กับเบสบอลเองก็เหมือนกันค่ะ!"
10030040-110 = "มาฝึกให้หัวใจและปอดแข็งแรงตั้งแต่ตอนนี้ เพื่อผลลัพธ์ที่ดีขึ้นในฤดูกาลของปีหน้ากันเถอะค่ะ!"
10030040-112 = "ฉันบอกไปหลายครั้งแล้วว่าสิ่งที่ฉันต้องการคือความแข็งแรงของกล้ามเนื้อเพื่อตีลูกไกลๆ ได้ ความแข็งแรงของหัวใจและปอดอะไรนั่นไม่จำเป็นหรอกค่ะ!"
10030040-113 = "มะ... ไม่น่าเชื่อคำพูดของพวกรุ่นพี่เลยว่าถ้ามาชมรมออกกำลังกายแล้วจะตีโฮมรันได้ง่ายๆ..."
10030040-114 = "จะว่าไป ถ้าเราจะฝึก เราไม่เห็นต้องปีนเขามาลึกขนาดนี้เลยก็ได้นี่คะ?"
10030040-115 = "แถมนี่เป็นช่วงเวลาที่สัตว์ป่าจำศีลด้วย ถ้าเรามาส่งเสียงดัง ดีไม่ดีหมีอาจจะออกมาก็ได้..."
10030040-116 = "ปัญหาเล็กน้อยแบบนั้นหยุดการฝึกพิเศษครั้งนี้ของเราไม่ได้หรอกค่ะ"
10030040-117 = "หรือว่า... เรย์ไม่ได้หลงใหลกับเบสบอลมากถึงขนาดนั้นคะ?"
10030040-118 = "มันเกี่ยวกับความหลงใหลในเบสบอลที่ไหนกันล่ะคะ!"
10030040-119 = "[s] \"ไม่น่าจะใช่สัตว์ดุร้ายนะ...\""
10030040-123 = "อ๊ะ เทรนเนอร์ แล้วก็สมาชิกเวอริทัสด้วย...?"
10030040-125 = "ไม่ได้เจอกันนานเลยนะ หัวหน้าสึมิเระ"
10030040-126 = "ส่วนคนข้างๆ... ไม่เคยเจอมาก่อนเลยแฮะ เป็นสมาชิกใหม่ของชมรมออกกำลังกายเหรอ?"
10030040-128 = "ใช่ค่ะ ถึงจะยังอยู่ในช่วงลองทำกิจกรรมของชมรมก็เถอะค่ะ"
10030040-130 = "อ๊ะ เรย์จังนี่นา"
10030040-131 = "งั้นก็โล่งอกไปทีนะ... แปลว่าเสียงที่ได้ยินเมื่อกี้ไม่ใช่เสียงสัตว์ร้าย แต่เป็นเสียงของเรย์สินะคะ"
10030040-132 = "สมาชิกเวอริทัส...? แปลกจังเลยนะที่มาเจอกันที่นี่"
10030040-133 = "[s] \"เป็นเพื่อนนักเรียนที่รู้จักเหรอ?\""
10030040-134 = "ค่ะ เรย์เป็นแบตเตอร์ลำดับ 4 ของชมรมเบสบอลของมิลเลเนียมค่ะ"
10030040-135 = "เป็นผู้เล่นที่ได้รับความนิยมที่ทำให้กระดานข่าวกีฬาของมิลเลเนียมลุกเป็นไฟทุกครั้งที่ลงแข่งเลยละ ถ้าเป็นนักเรียนมิลเลเนียม ไม่มีใครไม่รู้จักเรย์หรอก"
10030040-136 = "แหะๆ... ได้ยินแบบนี้ก็เขินนิดหน่อยแฮะ..."
10030040-137 = "ถึงในฤดูกาลที่แล้วจะเป็นประเด็นในกระดานข่าวด้วยเรื่องอื่นก็เถอะ"
10030040-141 = "อ่า พอดีตอนฤดูกาลที่แล้ว... ฉันตีได้ไม่ค่อยดีเท่าไร..."
10030040-142 = "แต่หลังจากผ่านการฝึกพิเศษในฤดูหนาวนี้ ฉันจะต้องตีไซเคิลได้แน่นอน!"
10030040-144 = "อากาศหนาวแบบนี้แต่ก็ยังมาฝึกพิเศษกันอีก... ไฟแรงใช้ได้เลยแฮะ"
10030040-145 = "ความคิดของนักเรียนวงการกีฬานี่เข้าใจได้ยากจังเลยค่ะ..."
10030040-147 = "จะว่าไป สมาชิกเวอริทัสมาทำอะไรกันในป่าลึกแบบนี้เหรอ?"
10030040-148 = "ปกติไม่เห็นออกจากห้องชมรมเลยนี่..."
10030040-150 = "เรามาตั้งแคมป์กันที่เทือกเขาฮิงาชิเพื่อดูพระอาทิตย์ขึ้นในวันแรกของปีน่ะ..."
10030040-151 = "แต่จู่ๆ รุ่นพี่โคทามะก็บอกว่ามีธุระในป่านี้"
10030040-152 = "คงไม่ได้... ไปก่อเรื่องอันตรายอยู่ในป่าหรอกใช่มั้ย? "
10030040-157 = "มะ... ไม่ใช่ค่ะ!"
10030040-158 = "ฉันก็แค่จะไปบันทึกเสียง ASMR ด้วยเครื่องบันทึกเสียงที่แอบพกมา..."
10030040-162 = "อ๊ะ"
10030040-163 = "นั่นไง กะไว้แล้วว่าต้องมีอุปกรณ์อิเล็กทรอนิกส์ซ่อนอยู่นอกกระเป๋าด้วย..."
10030040-167 = "เอาละ ส่งเครื่องบันทึกเสียงที่ซ่อนไว้มา ขืนให้เธอเก็บไว้ มันก็เสี่ยงที่เธอจะละเมิดความเป็นส่วนตัว#nของคุณครู"
10030040-168 = "ฮือ... นี่เป็นโอกาสที่จะบันทึกเสียงใหม่ของคุณครู [USERNAME] ท่ามกลางภูเขาฤดูหนาวแล้วแท้ๆ..."
10030040-169 = "[s1] (บันทึกเสียงใหม่...?)\n[s2] (รู้สึกเหมือนได้ยินอะไรน่ากลัวๆ เลย...)"
10030040-173 = "จะว่าไป การมาตั้งแคมป์กับสมาชิกชมรมเพื่อดูพระอาทิตย์แรกของปีเป็นแพลนวันหยุดที่ยอดเยี่ยมไป#nเลยนะคะ"
10030040-174 = "โอกาสแบบนี้ไม่ได้มีบ่อยๆ ฉันหวังว่าทุกคนจะได้ชมทิวทัศน์ที่สวยงามของธรรมชาติกันอย่างจุใจเลย#nนะคะ"
10030040-176 = "ชิ... ถ้าเป็นทิวทัศน์ของธรรมชาติ ไว้หาดูจากในห้องชมรมเอาก็ได้"
10030040-177 = "ใช่ค่ะ ถ้าใช้ลำโพงเซอร์ราวด์ เราก็เพลิดเพลินกับเสียงภายนอกได้อย่างชัดเจนแม้อยู่ในอาคารค่ะ"
10030040-178 = "เราดูพระอาทิตย์ขึ้นจากในอาคารก็ได้ ทำไมถึงต้องดั้นด้นมาข้างนอกด้วยก็ไม่รู้"
10030040-180 = "แต่มันก็มีสิ่งที่เราเพลิดเพลินได้เฉพาะตอนที่อยู่กลางแจ้งเท่านั้นนี่นา?"
10030040-181 = "เช่นการฝ่าลมยามเช้าตรู่แล้วขึ้นไปบนภูเขา แล้วไปสัมผัสแสงแดดที่อบอุ่น..."
10030040-182 = "แบบนั้นทำในอาคารก็ได้เหอะ"
10030040-183 = "แค่นอนห่มผ้าในห้องชมรมที่แอร์เย็นๆ แล้วก็ดูสารคดีเดินป่าไปด้วย แบบนี้ก็ไม่ต่างจากมาเองหรอก!"
10030040-184 = "แล้วก็ต้องกินราเม็งถ้วยร้อนๆ ด้วยนะคะ ขาดไม่ได้เลย"
10030040-185 = "อืม มันน่าจะต่างกับมาด้วยตัวเองอยู่นะ..."
10030040-190 = "แน่นอนค่ะว่าความก้าวหน้าของอินเทอร์เน็ตทุกวันนี้ทำให้เราอยู่ในยุคที่แค่อยู่ในห้องก็เพลิดเพลินกับ#nทิวทัศน์ของพื้นที่ที่ยากต่อการเข้าถึงได้"
10030040-191 = "แค่ขยับนิ้วคลิก ก็ดื่มด่ำกับพระอาทิตย์ตกดินได้อย่างไม่จำกัดโดยไม่ต้องลุกไปไหนค่ะ"
10030040-192 = "แต่ฉันก็คิดว่าวิวทิวทัศน์ที่เป็นเอกลักษณ์จากยอดเขาเป็นสิ่งที่ต้องมาสัมผัสด้วยตัวเองถึงจะเข้าใจค่ะ"
10030040-193 = "แล้วไงล่ะ~? คงต่างกันแค่ตำแหน่งที่ดูเท่านั้นแหละ วิวทิวทัศน์ที่ได้เห็นสู่สายตามันก็คงเหมือนๆ กัน"
10030040-194 = "วิวทิวทัศน์ที่เห็นจากในห้องน่ะ ยังไม่รวมสิ่งที่เราจะได้เห็นจากการเดินทางที่ยากลำบากกว่าจะถึง 'สถานที่แห่งนั้น' ไงคะ"
10030040-195 = "กับการออกกำลังกายก็เหมือนกันค่ะ รางวัลและประสบการณ์ที่ได้มาโดยปราศจากความลำบากก็ย่อม#nหายไปง่ายๆ อย่างไร้ค่า"
10030040-196 = "ถ้ามองในมุมของเกม... ก็คงเหมือนการกำจัดศัตรูด้วยสูตรโกงโดยไม่ได้เลเวลอัปเลย?"
10030040-197 = "อืม... พอพูดอย่างนั้นก็เหมือนจะเริ่มเข้าใจแล้ว..."
10030040-198 = "แต่ฉันก็ไม่อยากลำบากทั้งวันเพื่อวิวทิวทัศน์ที่เห็นได้แค่ในตอนนั้นนี่"
10030040-199 = "ต่อให้ไม่ต้องออกมาลำบากกันข้างนอก เราก็มีอะไรสนุกๆ ให้ทำในอาคารเยอะแยะไปหมด"
10030040-200 = "แน่นอนว่าการพักผ่อนในอาคารมันทั้งสะดวกและมีหลายอย่างที่เป็นสิ่งเร้าได้..."
10030040-201 = "แต่บางครั้งการหลีกเลี่ยงสิ่งเร้าและหลบมาพักผ่อนหย่อนใจก็ช่วยต่อการพัฒนาตัวเองได้ดีกว่านะคะ"
10030040-202 = "เพราะงั้นในการฝึกพิเศษครั้งนี้ เรามาเน้นการออกกำลังกายแบบคาร์ดิโอเบาๆ แทนที่จะออกกำลังกาย#nแบบกระตุ้นกล้ามเนื้อดีกว่าไหมคะ?"
10030040-203 = "ถึงจะพูดแบบนั้นก็เถอะ... ตอนนี้การฝึกพิเศษของรุ่นพี่สึมิเระไม่ใช่การฝึกเบาๆ เลยนะคะ!"
10030040-216 = "ฉันไม่อยากแทรกแซงการฝึกฝนของชมรมออกกำลังกายหรอกนะ แต่จะมาส่งเสียงเอะอะแบบนี้กัน#nได้เหรอ?"
10030040-217 = "มีข่าวลือว่ามีหมีออกมาแถวนี้ด้วย ถ้าเสียงดังหนวกหูจนหมีที่จำศีลออกมาละก็..."
10030040-229 = "อ่า..."
10030040-230 = "อ๊ะ..."
10030040-239 = "โฮกกกกก!"
10030040-244 = "[ns] \"...หมีออกมาแล้ว!\""
10030040-245 = "ฉันบอกไปแล้วไม่ใช่เหรอคะรุ่นพี่! บอกแล้วไงว่าถ้าตะโกนดังๆ ในป่า หมีจะออกมาน่ะ!"
10030040-246 = "กลับเป็นโอกาสที่ดีเลยค่ะ"
10030040-250 = "เรย์ คิดว่าหมีตัวนั้นเป็นผู้เล่นฝ่ายรับ แล้วมาฝึกวิ่งกันดีไหมคะ?"
10030040-251 = "เราจะวิ่งหนีอย่างรวดเร็วเพื่อไม่ให้โดนผู้เล่นฝ่ายรับตัวนั้นแท็กเอาได้ค่ะ!"
10030040-253 = "ก็เข้าใจได้อยู่นะ ถ้าโดนหมีแท็กก็ต้องออกจากสนามแน่นอน ไม่สิ ต้องออกจากป่าไปนอนโรงพยาบาลเลยละ"
10030040-254 = "นี่ไม่ใช่เวลามาพูดล้อเล่นนะ!"
10030040-260 = "โฮกกกกก!"
10030040-261 = "เอาละๆ เรย์ นี่คือกลยุทธ์วิ่งสู้ฟัดค่ะ! ตั้งใจกับการฝึกให้มากขึ้นนะคะ! ฮึบ!"
10030040-262 = "เดี๋ยวสิ นี่มันไม่เกี่ยวกับการฝึกเบสบอลเลยนี่นา!"

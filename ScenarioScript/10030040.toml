[translation]
10030040-1 = "第4話;與熊共舞"
10030040-3 = "呼……來到這麼深的地方，應該不會被人看到了吧。"
10030040-7 = "那麼現在……就把藏起來的錄音機拿出來吧。"
10030040-11 = "雖然副部長在出發前很認真地檢查我們的行李，#n但他應該也沒想到我會把小型錄音機藏在鞋底吧。"
10030040-12 = "只要使用高感度麥克風就能把體積做得很小，這就是這台小型錄音機的優點。#n呵呵……"
10030040-13 = "雖然音質比正常大小的錄音機來得差，#n但我一定要把和老師在一起的珍貴情景錄進去……"
10030040-21 = "麥克風靈敏度及噪音降噪設定完成……"
10030040-22 = "既然調整完畢，先稍微試錄一下周圍的環境音吧。"
10030040-28 = "之前只在ASMR音檔裡聽過自然的聲音，現在親耳聽到的感覺還真新鮮……"
10030040-33 = "風掠過樹木的聲音……"
10030040-38 = "小鳥跑跑跳跳，和諧的啼叫聲……"
10030040-41 = "吼喔喔……"
10030040-42 = "猛獸的咆哮聲……"
10030040-47 = "……猛獸的咆哮聲？"
10030040-52 = "吼喔喔喔──！"
10030040-58 = "噫，噫噫……！？"
10030040-62 = "[ns]「……那邊傳來了小玉的尖叫聲！」"
10030040-68 = "小玉前輩，發生什麼事了！你還好嗎？"
10030040-69 = "那，那邊……"
10030040-70 = "那邊……？那邊有什麼嗎？"
10030040-75 = "我聽到了凶暴猛獸的咆哮聲……！"
10030040-80 = "凶暴猛獸……？"
10030040-83 = "[ns]「難道那裡的影子就是……」"
10030040-88 = "吼喔喔喔喔……！"
10030040-94 = "來，肚子再用點力，大聲喊出來！"
10030040-95 = "唔……"
10030040-100 = "這樣已經夠了吧！#n我加油的時候也沒這麼大聲叫過！"
10030040-101 = "叫得我喉嚨都痛了……"
10030040-102 = "而且喊叫和棒球到底有什麼關係啊？"
10030040-103 = "這你就有所不知了，莉同學。"
10030040-107 = "想發出宏亮的喊叫聲，就必須具備充足的肺活量。"
10030040-109 = "無論做什麼運動，強健的心肺能力都是不可或缺的！就算是棒球也不例外！"
10030040-110 = "為了在明年的賽季中取得更好的成績，從現在起就要努力鍛鍊心肺耐力！"
10030040-112 = "我已經說過很多次了，我需要的是能打出長打的力量，才不需要心肺耐力這種東西！"
10030040-113 = "嗚……真不應該相信前輩們說的「去訓練部就能輕鬆打出全壘打」這種話……"
10030040-114 = "而且話又說回來，有必要跑到這種深山裡做訓練嗎？"
10030040-115 = "這個時期野生動物才剛進入冬眠，像我這樣大喊大叫，萬一熊真的出現……"
10030040-116 = "總不能因為那種小事中斷難得的特訓吧。"
10030040-117 = "難道……莉對棒球的熱情只有這點程度嗎？"
10030040-118 = "這跟對棒球的熱情沒關係！"
10030040-119 = "[s]「……好像不是凶暴的猛獸呢。」"
10030040-123 = "咦，指導員，連貝里塔斯的各位也在……？"
10030040-125 = "好久不見，堇部長。"
10030040-126 = "還有旁邊那位是……似乎是初次見面呢。#n是訓練部的新成員嗎？"
10030040-128 = "是的，不過目前只是臨時體驗入部而已。"
10030040-130 = "啊，是莉醬。"
10030040-131 = "太好了……剛才聽到的不是凶暴猛獸的咆哮，而是莉的聲音。"
10030040-132 = "貝里塔斯的成員……？#n居然會在這裡碰面，真是稀奇。"
10030040-133 = "[s]「是你們認識的學生嗎？」"
10030040-134 = "嗯，莉是千年棒球部的王牌第四棒打者。"
10030040-135 = "每次上場都會在千年校內的體育討論版引發熱議，#n是名千年學生無人不知的人氣選手哦。"
10030040-136 = "嘻嘻……這樣說讓我有點不好意思呢……"
10030040-137 = "雖然上個賽季是因為別的原因讓討論版吵得火熱就是了……"
10030040-141 = "那個，上個賽季雖然……打擊率確實有點低……"
10030040-142 = "不過只要完成這次的冬季特訓，下個賽季要達成完全打擊應該不難！"
10030040-144 = "居然在這麼冷的時期進行特訓……真是了不起的熱情。"
10030040-145 = "體育系學生的想法果然很難理解……"
10030040-147 = "話說回來，貝里塔斯的各位怎麼會來到樹林深處呢？"
10030040-148 = "平常應該幾乎不會離開部室才對……"
10030040-150 = "我們是為了看新年第一個日出，才會來東阿爾卑斯露營……"
10030040-151 = "但是小玉前輩突然說有事要進入這片樹林。"
10030040-152 = "該不會……是在樹林裡做什麼危險的惡作劇吧？"
10030040-157 = "不，不是什麼奇怪的事！"
10030040-158 = "我只是為了測試帶來的錄音機，所以想錄一下環境音……"
10030040-162 = "……啊。"
10030040-163 = "我就知道你八成會把電子設備藏在背包以外的地方……"
10030040-167 = "來，把藏起來的錄音機交出來吧。#n放任不管可是會有侵犯老師隱私的危險。"
10030040-168 = "嗚……好不容易有機會以冬天的山為背景，製作[USERNAME]老師的新音檔的說……"
10030040-169 = "[s1] （新音檔……？）\n[s2] （總覺得聽起來怪可怕的……）"
10030040-173 = "話說回來，部員們一起露營看新年的第一個日出，這連假的行程還真棒呢。"
10030040-174 = "難得有這種機會，大家就一起享受大自然的美好吧。"
10030040-176 = "呿……室內明明也能充分享受自然風景。"
10030040-177 = "沒錯，只要使用環繞立體音響，就算在室內也能欣賞到室外生意盎然的聲音。"
10030040-178 = "而且在室內也能看到漂亮的日出，非得跑到外面來嗎？"
10030040-180 = "話是這麼說沒錯，不過有些東西還是只有在野外才能感受得到，不是嗎？"
10030040-181 = "比如頂著寒冷的晨風爬上山頂時感受到的溫暖陽光……"
10030040-182 = "那種東西在室內也完全能重現好嗎？"
10030040-183 = "在冷氣全開的部室裹著毛毯看長途旅行的紀錄片，那種沉浸感超棒的！"
10030040-184 = "而且當然不能少了熱呼呼的泡麵。"
10030040-185 = "唔嗯，該說和那種感受有點不一樣嗎……"
10030040-190 = "在這個網路發達的時代，#n坐在房裡當然也能輕鬆欣賞到難以親身抵達的地區所能見到的景色。"
10030040-191 = "連移動椅子都不用，只要動動手指就能盡情欣賞日落的美景。"
10030040-192 = "……但即便如此，我認為只有親臨現場，才能真正感受到山頂上特有的風景。"
10030040-193 = "為什麼～？#n只是看的地方不一樣而已，眼睛看到的還是相同的風景不是嗎？"
10030040-194 = "因為在房裡看到的風景中，並不包含抵達「現場」之前所經歷的艱辛過程。"
10030040-195 = "運動其實也一樣，沒有經歷辛苦修行所得到的能力和經驗很容易就會消失。"
10030040-196 = "拿遊戲來舉例的話……#n就像是不努力練習，而是直接作弊打倒敵人的那種感覺？"
10030040-197 = "嗯……聽你這麼一說，我好像能明白那是什麼意思了……"
10030040-198 = "可是我不想為了那一剎那的風景而辛苦一整天。"
10030040-199 = "就算不特意到外面找罪受，也能在室內享受到很多有趣的事。"
10030040-200 = "室內確實能輕鬆地享受到很多刺激的事物……"
10030040-201 = "不過偶爾適度地遠離刺激，對成長會有更大的幫助。"
10030040-202 = "所以這次的特訓就少做激烈的肌力運動，改以「輕鬆的」有氧運動為主如何？"
10030040-203 = "就算你那麼說……堇前輩的特訓根本一點都不輕鬆！"
10030040-216 = "……訓練部要做怎樣的訓練倒是無所謂，不過一直在這裡吵鬧沒關係嗎？"
10030040-217 = "有傳聞說這附近有熊出沒，要是不小心把冬眠中的熊吵醒──"
10030040-229 = "……啊。"
10030040-230 = "……啊。"
10030040-239 = "吼哦哦哦哦！"
10030040-244 = "[ns]「……熊出現了！」"
10030040-245 = "所以我剛才不是說過了嗎，前輩！#n要是在這片森林裡喊叫就會有熊出現啦！"
10030040-246 = "……這反而是個好機會。"
10030040-250 = "莉同學，要不要利用那隻熊來進行跑壘訓練？"
10030040-251 = "為了不被全力衝過來的野獸觸殺，必須趕緊逃跑才行！"
10030040-253 = "聽起來不錯耶。#n要是被熊觸殺的話，就會從各種意義上出局了。"
10030040-254 = "現在不是開玩笑的時候吧！？"
10030040-260 = "吼哦哦哦哦！"
10030040-261 = "來吧，莉同學。#n執行打帶跑戰術！集中精神！"
10030040-262 = "不是，這次真的和棒球訓練一點關係都沒有了吧！"

[translation]
10030040-1 = "Episode 4;Dancing with a Bear"
10030040-3 = "Phew... No one can see me through all this foliage."
10030040-7 = "Now then... Time to uncache the recording device I smuggled in."
10030040-11 = "The vice president may have combed through my belongings before we left, but she never imagined that I could hide a small recording device in the sole of my shoe."
10030040-12 = "The genius of well-designed recording devices is how they can be scaled down so long as you compensate with a high-sensitivity mic... Heh heh..."
10030040-13 = "Of course, the sound quality is inferior to a full-sized device, but I can't miss out on precious Sensei recording time..."
10030040-21 = "Mic sensitivity and noise suppression settings tuned..."
10030040-22 = "Heehee... With the adjustments complete, I can test it out by recording some background noise."
10030040-28 = "It's...somewhat refreshing to listen to natural sounds in person, instead of in ASMR videos..."
10030040-33 = "The sound of wind whispering through the trees..."
10030040-38 = "The music of birds playing and chirping joyfully..."
10030040-41 = "Grrr..."
10030040-42 = "The rumble of a ferocious beast growling..."
10030040-47 = "...The rumble of a beast?"
10030040-52 = "Grawr!"
10030040-58 = "E-Eek?!"
10030040-62 = "[ns] \"...I heard Kotama scream over here!\""
10030040-68 = "Kotama, what's going on?! Are you okay?"
10030040-69 = "O-Over there..."
10030040-70 = "What? Is there something behind those trees?"
10030040-75 = "I heard the roar of a ferocious beast!"
10030040-80 = "A...ferocious beast?"
10030040-83 = "[ns] \"That shadow...!\""
10030040-88 = "Grawr!"
10030040-94 = "Again! Louder, and with more ferocity!"
10030040-95 = "Ugh..."
10030040-100 = "That has to be loud enough! If I scream like this when I'm cheering, they'll hear me outside the stadium!"
10030040-101 = "Now my throat hurts..."
10030040-102 = "What does yelling have to do with baseball in the first place?"
10030040-103 = "It's about the fundamentals, Rei."
10030040-107 = "You need good lung capacity to scream loudly."
10030040-109 = "And cardiorespiratory fitness is essential to any exercise—baseball is no exception!"
10030040-110 = "Let's train our cardiorespiratory endurance to up our athletic performance next season!"
10030040-112 = "As I keep telling you, I need muscle strength to land more base hits, not better cardiorespiratory endurance!"
10030040-113 = "Ugh... I shouldn't have trusted my teammates when they told me I would hit more home runs if I joined the Athletics Training Club..."
10030040-114 = "Did we really have to come all the way into the mountains to train?"
10030040-115 = "Wild animals start hibernating around this time of year. If my screaming summons a bear..."
10030040-116 = "Small problems like that won't stop our special training."
10030040-117 = "Or...is this the limit of your passion for baseball?"
10030040-118 = "This has nothing to do with my passion for baseball!"
10030040-119 = "[s] \"...Looks like a different type of ferocious beast.\""
10030040-123 = "Huh, Trainer? And Veritas club members?"
10030040-125 = "It's been a while, Sumire."
10030040-126 = "And next to you... I don't believe we've met. Are you a new member of the Athletics Training Club?"
10030040-128 = "For now, on a trial basis."
10030040-130 = "Ah, it's Rei."
10030040-131 = "What a relief... I only heard Rei's voice earlier, not a ravenous beast."
10030040-132 = "It's surprising to see Veritas here."
10030040-133 = "[s] \"Do you know her?\""
10030040-134 = "Yes. Rei is the fourth batter of the Millennium Baseball Club."
10030040-135 = "All Millennium sport fans know her face, she's a popular player who causes a tremendous uproar whenever she steps up to the plate."
10030040-136 = "Aha... It's a bit embarrassing to hear it said so plainly..."
10030040-137 = "Although she caused a different sort of uproar on our academy forums last season."
10030040-141 = "Well, uh, my batting average was a bit low last season, but..."
10030040-142 = "After my special winter training I'll definitely lead the league in hits!"
10030040-144 = "Training when it's this cold out... That's some dedication."
10030040-145 = "It's difficult to comprehend sporty students..."
10030040-147 = "Anyway, what brings Veritas into the woods?"
10030040-148 = "We rarely see you out of your club room..."
10030040-150 = "We're camping in the Higashi Alps to watch the first sunrise of the year..."
10030040-151 = "And Kotama had some business to take care of in this forest."
10030040-152 = "You weren't...up to something out here, were you?"
10030040-157 = "N-Not at all!"
10030040-158 = "I-I was just recording the sound of nature to test a recording device I—"
10030040-162 = "...Oops."
10030040-163 = "...I knew it. I thought one of you might smuggle an electronic device outside of your bags..."
10030040-167 = "Give me that recording device. You're not here to invade Sensei's privacy while we're camping."
10030040-168 = "Tch... This was my chance to make a new recording of [USERNAME] Sensei with the winter mountains as a background..."
10030040-169 = "[s1] \"(A NEW audio recording?)\"\n[s2] \"(I think I'm hearing something scary...)\""
10030040-173 = "Well, ending the year by camping out and watching the first sunrise of the new year with your club members is a wonderful idea."
10030040-174 = "I hope you all have a chance to enjoy this beautiful natural scenery."
10030040-176 = "Ugh...I can already enjoy nature by looking out a window..."
10030040-177 = "With my stereophonic speakers, I can hear everything I would if I were actually out in the wilderness."
10030040-178 = "I can already watch a beautiful simulated sunrise on my PC, so why bother coming out here?"
10030040-180 = "But there are things you can only enjoy outdoors!"
10030040-181 = "Like basking in the warm sunshine after climbing a mountain in the cold morning air..."
10030040-182 = "We can totally replicate that indoors."
10030040-183 = "Just crank up the club room AC, slip under a heated blanket, and turn on a nature documentary! You'll be totally immersed!"
10030040-184 = "And then you can even enjoy a warm cup of noodles."
10030040-185 = "That's completely different from what I said..."
10030040-190 = "Sure, maybe you can stream videos of hard-to-reach places nowadays, thanks to the internet."
10030040-191 = "You don't even need to adjust your chair when you can watch the sunset over and over again with a swipe of your finger."
10030040-192 = "...But I don't think you can understand what it's like to see the sun rise from a mountain peak until you experience it for yourself."
10030040-193 = "Why not? It's the same images, they're just viewed in a different place."
10030040-194 = "No streamed video viewed in an air-conditioned room can possibly capture the journey you take to reach such a destination."
10030040-195 = "It's just like exercising. Any reward or experience you gain without hardship is lost as quickly as it comes."
10030040-196 = "In a game...it'd be like defeating enemies with cheat codes instead of leveling up."
10030040-197 = "Mmm... When you put it like that...maybe you have a point."
10030040-198 = "But I don't want to sweat all day just for a momentary view."
10030040-199 = "There are no reasons to endure hardships outdoors when there are plenty of things to enjoy indoors."
10030040-200 = "Sure, there are plenty of fun things to do indoors without nearly as much hassle..."
10030040-201 = "But sometimes choosing the slow path instead of what's most convenient helps you grow even more."
10030040-202 = "Which reminds me, what do you think about starting light with cardio fundamentals instead of devoting our special training to weight lifting, Rei?"
10030040-203 = "Sumire... Your cardio training isn't light at all!"
10030040-216 = "...I'm glad that the Athletic Training Club is able to train out here, but is it really okay to be making so much noise?"
10030040-217 = "Quite a few bears make their home here... If we wake one up from its hibernation—"
10030040-229 = "...Ah."
10030040-230 = "...Ah."
10030040-239 = "GRAAAARGH!"
10030040-244 = "[ns] \"It's a bear!\""
10030040-245 = "I said we would run into a bear if we kept screaming in the forest!"
10030040-246 = "...What a perfect opportunity."
10030040-250 = "Rei, treat that bear like a baseman! It's time to practice your base-stealing."
10030040-251 = "Run from the baseman as quickly as you can so you don't get tagged out!"
10030040-253 = "That makes sense. Getting tagged by a bear would get you out forever."
10030040-254 = "This isn't the time for jokes!"
10030040-260 = "GRAWWRRR!"
10030040-261 = "Now, Rei! Time to steal home! Focus like your life depends on it—no, like it's the championship game!"
10030040-262 = "But this doesn't have anything to do with baseball at all!"

34020-97 = "#clearST"
34020-98 = "3;미네;01\n#3;closeup\n#3;d\n#wait;1500"
34020-99 = "3;사쿠라코;99;……제가 시스터후드의 모든 비밀을 알고 있을 거라 생각하신다면 그건 오산이에요. \n#3;a"
34020-100 = "3;사쿠라코;01;시스터후드에서는 저조차도 알지 못하는 비밀이 많이 있답니다. 내부 사정이라 자세하게 설명은 못 하지만."
34020-101 = "5;미네;99;……그렇군요. 실례했습니다.\n#5;a\n#3;m1"
34020-102 = "#3;hide\n1;나기사;04;하아…….\n#1;em;[속상함]"
34020-103 = "5;미네;02;트리니티의 방호 시스템을 무력화시켰던 그 순항 미사일……. 그쪽의 분석은 아직입니까?"
34020-104 = "1;나기사;01;네. 분석을 진행했지만 현재로선 출처도 구조도 불명…… 결론은 키보토스에 존재하는 기술이 아닌 것 같다는 추측뿐……."
34020-105 = "5;미네;01;……결국, 아리우스 분교는 우리가 알지 못하는 힘을 최소 두 개는 확보하고 있다는 거군요."
34020-106 = "1;사쿠라코;07;네. 그리고 그 부분은 두 번째 의문으로 이어지게 됩니다.\n#1;em;[반응]"
34020-107 = "1;사쿠라코;01;두 번째. 아리우스 분교는 무엇을 계획하고 있는가?"
34020-108 = "5;미네;05;…….\n#5;em;…"
34020-109 = "5;나기사;99;……여기에 대해서는 저희는 아무것도 알 수 없어요."
34020-110 = "5;나기사;07;무엇보다 우리는 아리우스 자치구가 어디에 있는지도 알지 못합니다.\n#5;em;[반응]"
34020-111 = "1;사쿠라코;01;……네. 그건 오래전부터 수수께끼였죠. 다만 저번 사건을 계기로 몇 가지 실마리를 얻긴 했어요."
34020-112 = "1;사쿠라코;07;그들은 그때 통공의 고성당 지하에 있는 카타콤을 통해 잠입했습니다."
34020-113 = "1;사쿠라코;99;그동안의 아리우스 학생들의 잠입 루트도 전부 카타콤과 연관되어 있었죠. 순항 미사일의 발사 위치도 트리니티 내에 있는 유적지구였고요.\n#1;em;…"
34020-114 = "5;미네;02;트리니티 자치구에 존재하는 지하 유적은 엄청나게 많지 않습니까? 그걸 모두 찾아내서 통제하는 건 불가능할 텐데.\n#5;em;[?]"

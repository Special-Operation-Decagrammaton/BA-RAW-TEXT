[translation]
34020-1 = "Episode 2; Uncomfortable Reception"
34020-3 = "It's been quite some time. Thank you for coming, Sensei.  "
34020-4 = "[s] \"Of course. Hello, everyone.\""
34020-5 = "A pleasure, [USERNAME] Sensei. We still owe you one from last time."
34020-6 = "...Nice to meet you. I'm Mine, captain of the Remedial Knights. "
34020-7 = "[s1] \"The pleasure's mine. I get to witness an interesting trio.\" \n[s2] \"We have an interesting combination here.\""
34020-8 = "Haha... Nagisa would probably call it troublesome."
34020-9 = "Haha... Nagisa would probably call it troublesome."
34020-10 = "I am not here to antagonize Nagisa."
34020-11 = "The Knights stand up for our convictions and beliefs. If I see a wrong, I set it right. That is all."
34020-13 = "Regardless of who the culprit may be."
34020-14 = "..."
34020-15 = "...Those kind of words are gonna get someone in trouble."
34020-16 = "That's enough chit-chat. I'm sure Sensei is busy.  "
34020-17 = "Sensei, I invited you here to update you on the situation at Trinity since the Eden Treaty incident and discuss our next steps. However..."
34020-18 = "..."
34020-19 = "..."
34020-20 = "For reasons somewhat incomprehensible to me, the leaders of the Sisterhood and the Remedial Knights demanded a seat at the table. So, here we are."
34020-21 = "Demand is a harsh word. The Sisterhood's newfound political status means we should be involved in meetings like this."
34020-22 = "As the leader of the Remedial Knights, the oldest club in Trinity's history, I'm only fulfilling my duty."
34020-23 = "..."
34020-24 = "[s] \"In other words, you're policing the Tea Party?\""
34020-25 = "No, no. I'm just keeping up with current events."
34020-26 = "And I have no interest in politics."
34020-27 = "The Eden Treaty incident may have concluded safely, but there's a lot of follow-up and post-analysis still in process."
34020-28 = "The Sisterhood is helping out and conducting some of the research analysis."
34020-29 = "And this meeting's purpose is to share information on said topics."
34020-31 = "She is correct."
34020-32 = "[s] \"O-Okay... I see.\""
34020-33 = "..."
34020-34 = "You still seem confused. You see, we could not simply leave this to the Tea Party."
34020-35 = "The Tea Party's state is fragile right now."
34020-36 = "..."
34020-37 = "It is absolutely unprecedented for an active member of the Tea Party to be arrested. And even more so for one to attack another."
34020-38 = "Imagine my shock when I discovered Mika was behind the attack on Seia."
34020-39 = "..."
34020-40 = "..."
34020-41 = "As you well know, Seia has been under my protection since. I thought it only right to investigate the case myself."
34020-42 = "Arguing that Mika was taken advantage of by Arius does not absolve her of her crimes."
34020-43 = "On top of that, the current host manipulated Schale's extrajudicial authority for her own ends and attempted to expel students she disfavored."
34020-44 = "..."
34020-45 = "I understand you apologized and no harm was done, but..."
34020-46 = "It casts a dark shadow on the Tea Party."
34020-47 = "..."
34020-48 = "It was a blessing Seia awoke at all. But since then, her health has steadily declined, and she is now bedridden."
34020-49 = "And so, it was my conclusion the Tea Party required our assistance."
34020-51 = "Indeed."
34020-52 = "What a clear, thorough explanation, Captain Mine. You truly never change."
34020-57 = "[ns] \"(Well, this is awkward.)\""
34020-58 = "Captain Mine is leader of the Johan faction and head of the Remedial Knights."
34020-59 = "She had the right to attend the Tea Party, but she declined in favor of her medical career. It's rather sweet."
34020-60 = "Let's not waste time reminiscing, Sakurako."
34020-61 = "I'll begin. At the core of this incident is Arius."
34020-63 = "We have confirmed that the perpetrator of the Eden Treaty incident was indeed Arius."
34020-66 = "They coordinated their infiltrations by apparently deceiving Chair Makoto and Mika."
34020-68 = "In fact, Chair Makoto goes so far as to claim she's Trinity's victim, seeing as Arius is a faction of Trinity."
34020-69 = "She was mumbling some nonsense about billing us for her hairdressing expenses, but I believe that can be ignored."
34020-71 = "It's Arius' involvement that leaves the Sisterhood with questions."
34020-72 = "To begin, what was Arius' motivation in attacking the Eden Treaty ceremony?"
34020-73 = "Arius has long held a grudge against Trinity and Gehenna. They saw the opportunity to suppress both academies at once and took it."
34020-74 = "According to Seia, by invoking the Eden Treaty contract, they obtained an overwhelming military force."
34020-75 = "Yes, a force comprised of what seemed to be ghosts of the Saint Justina Council. Had they not been stopped when they had, both Trinity and Gehenna would have crumbled."
34020-76 = "..."
34020-77 = "What do you know of those things?"
34020-78 = "We don't have a grain of evidence. Only educated guesses."
34020-79 = "Fine. The Council is the Sisterhood's predecessor. Are you holding something back, Sakurako?"
34020-80 = "Unfortunately, I know just about as much as you do."
34020-81 = "I cannot ignore that the Sisterhood is held together by secrets. You are long practiced in manipulating and hiding information."
34020-86 = "It's only natural that many students at Trinity have lost faith in the Sisterhood."
34020-92 = "Like you, Captain Mine?"
34020-93 = "..."
34020-94 = "..."
34020-95 = "[s] \"(...Can I leave?)\""
34020-99 = "If you believe me to be the Sisterhood's sole secret keeper, you are sadly mistaken. "
34020-100 = "There are plenty of things I don't know. I can't say much more than that."
34020-101 = "I spoke out of ignorance. My apologies."
34020-102 = "Oh, dear..."
34020-103 = "Moving on to the next order of business. Is the analysis finished on the missile that neutralized our defense system?"
34020-104 = "Nothing came of it, unfortunately. Its materials and technology are foreign to us. Wherever it came from, it wasn't Kivotos."
34020-105 = "That's of no surprise. Arius Satellite School is in possession of at least two powerful resources we know nothing about."
34020-106 = "Which leads to my next question."
34020-107 = "What intel do you have on Arius' plans?"
34020-108 = "..."
34020-109 = "We've been unable to discover anything."
34020-110 = "We can't even locate the Arius district, let alone gather intel."
34020-111 = "Their whereabouts have been a longstanding mystery. But I did uncover a few clues."
34020-112 = "During the Eden Treaty incident, they infiltrated through the underground catacombs."
34020-113 = "All previous Arius infiltrations can be traced back to the catacombs too. To top it off, the cruise missile was launched from a ruins district in Trinity."
34020-114 = "The underground ruins? It's a massive network. We'd never be able to take control of them."
34020-115 = "Besides, those tunnels are a maze. It'd be an impossible mission to find them down there."
34020-116 = "Hm..."
34020-117 = "Seia believes the district could be protected by some incomprehensible force."
34020-118 = "She doesn't see how else they could be so undetectable."
34020-119 = "More things we don't understand..."
34020-120 = "Azusa, who defected from Arius, said she was given a map of the catacombs with a marked exit route for her missions."
34020-124 = "But she was provided different routes every time, so she doesn't know a way back to the Arius district."
34020-125 = "You interrogated her?!"
34020-126 = "Wh-What?"
34020-127 = "I'll ask again. Did you force Shirasu Azusa to give you information?"
34020-128 = "She is branded a traitor in the only home she's ever known, for helping us. How dare you put her through more hardship?"
34020-130 = "She was finally settling in here! And you re-open old wounds for your own benefit? It's thoughtless and cruel."
34020-131 = "Y-You misunderstand! She volunteered the information."
34020-133 = "I highly doubt that! Did you coerce her? Threaten her with the Tea Party's authority?"
34020-134 = "Excuse me?!"
34020-135 = "Check yourself, Captain Mine. Your accusations hold no ground. "
34020-136 = "You've confirmed this?"
34020-137 = "Yes. I know Nagisa has done some reprehensible things, but Azusa was never treated poorly.  "
34020-141 = "At the very least, that Sensei over there would never let anyone touch a hair on her head."
34020-142 = "...I see."
34020-143 = "I owe you an apology, Nagisa."
34020-144 = "..."
34020-145 = "[s3] \"(Nagisa's teacup is shaking...)\"\n[s4] \"Are you okay, Nagisa?\""
34020-146 = "It's not that I don't understand.  "
34020-147 = "Yes. I do understand, you know.  "
34020-148 = "Hanako, Koharu, Azusa, and...Hifumi."
34020-149 = "Each member of the Make-Up Work Club is shouldering much more than they were ever meant to."
34020-150 = "Their burdens are a result of my actions.  "
34020-151 = "I'm not completely shameless. I know what I did."
34020-152 = "I've done my utmost to keep them out of the spotlight as we clean up this mess."
34020-153 = "I'd like to protect them from experiencing something like that again. After all, this is our responsibility."
34020-154 = "[s] \"Nagisa...\""
34020-155 = "I am of the same mind. I spoke without thinking, once again. I apologize for my transgression."
34020-156 = "I'm glad we're all on the same page."
34020-157 = "I was hoping to begin passing responsibilities to Hanako, but..."
34020-158 = "Our contract is complete, and I won't force her into it."
34020-159 = "So, this fight is ours. It's the least we can do for them."
34020-160 = "But, I have a feeling a certain teacher will be with us until the end."
34020-161 = "[s] \"Reporting for duty.\""
34020-162 = "...Thank you, Sensei."
34020-164 = "The catacombs are huge mazes of unknown magnitude. Finding a moving entrance will be a problem."
34020-165 = "Unless we ask someone who is familiar with the passages."
34020-166 = "Do you have someone in mind?"
34020-169 = "Joumae Saori, the leader of the Arius Squad who coordinated the attack, must know the way."
34020-170 = "Indeed. It was Saori who executed their strategy."
34020-171 = "We haven't been able to locate Squad. They've likely fled the district."
34020-172 = "...I can think of someone else."
34020-173 = "..."
34020-174 = "You can? Who could possibly..."
34020-179 = "Misono Mika."
34020-180 = "What?!"
34020-182 = "Mika said she didn't know the Arius district's location."
34020-183 = "She's been working with Arius for a long time. Do you really think she would have no idea?"
34020-184 = "..."
34020-185 = "We have records of Mika contacting Arius students to coordinate supply deliveries."
34020-186 = "We can only assume she reached out to Arius to garner support for a coup."
34020-187 = "But, Mika is..."
34020-188 = "Mika's reputation and conduct over the years have not been commendable."
34020-189 = "You know Mika hid behind the shield of the Tea Party to cover up her mistakes and avoid problems."
34020-190 = "The condemnation, protests, and public opinion against Mika are the result of a long, built-up frustration towards her actions."
34020-191 = "[s] \"(...Protests? What's been happening?)\""
34020-192 = "Mika wouldn't lie about this. What would her motive be?"
34020-193 = "..."
34020-194 = "I understand how you feel about Mika, Nagisa."
34020-195 = "To my understanding, your friendship with her spans all the way back to your childhood. As such, you know her better than anyone else."
34020-196 = "..."
34020-201 = "I'm sorry if this is rude, but please be honest. Do you think Mika is still hiding something?"
34020-205 = "If she's hiding something..."
34020-206 = "[s] \"(Nagisa...)\""
34020-210 = "No. I trust Mika."
34020-211 = "..."
34020-212 = "..."
34020-213 = "I can't reasonably argue she's been a model student.  "
34020-214 = "But I understand what it means to believe in someone now!"
34020-215 = "I'll convince everyone else to trust Mika as well! I'll defend her at the hearing tomorrow... "
34020-216 = "...Against anyone who accuses her! I'll fight the entire academy if needed!"
34020-217 = "Consequences be damned!"
34020-218 = "I was just going through every possibility, Nagisa. No accusations here."
34020-219 = "We've touched a sensitive topic. Apologies."
34020-220 = "[s] \"How you doing there, Nagisa?\""
34020-221 = "*sigh*"
34020-222 = "Please don't worry. But I think that about wraps things up."
34020-223 = "Thank you both for your attendance today. Truly."
34020-224 = "Yes, thank you for accepting my request to join this meeting.  "
34020-225 = "I do warn you, however. I'm very concerned about the outpouring of anger towards Mika."
34020-226 = "I'll see if I can do anything to help her. Until next time."
34020-227 = "I'll take my leave as well. "
34020-228 = "I apologize I can't escort you. Safe travels."
34020-233 = "*sigh*"
34020-234 = "Urgh. My stomach hurts."
34020-235 = "[s] \"You did great, Nagisa.\""
34020-236 = "Thank you, Sensei. You keep seeing sides of me I don't mean to show."
34020-237 = "[s5] \"By the way...what happened to Mika?\"\n[s6] \"Mika's situation sounded serious.\""
34020-238 = "Oh, yes. I suppose you wouldn't know."
34020-239 = "Oh, yes. I suppose you wouldn't know."
34020-240 = "Mika's hearing will be held tomorrow morning."
34020-241 = "[s] \"Why is she having a hearing?!\""
34020-242 = "Well, it's more so...a dispensing of disciplinary action, overseen by an advisory committee of sorts."
34020-243 = "They'll present and discuss Mika's crimes and injustices, especially in relation to the Eden Treaty."
34020-247 = "...Sensei."
34020-251 = "Mika is going to be expelled."
34020-253 = "Next Episode; Jailed Princess"

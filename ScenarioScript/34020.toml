34020-1 = "#title;제2화;불편한 다과회"
34020-2 = "3;나기사;01\n#3;a\n#wait;1500\n#3;h"
34020-3 = "3;나기사;02;와주셔서 감사합니다. 선생님. 오랜만의 트리니티 방문이네요. \n#3;em;[반짝]"
34020-4 = "[s] \"안녕. 나기사. 그리고 모두들.\""
34020-5 = "3;나기사;01\n1;사쿠라코;02;또 뵙네요. [USERNAME] 선생님. 저번엔 신세를 많이 졌습니다.\n#1;greeting\n#1;a"
34020-6 = "3;나기사;01\n1;사쿠라코;01\n5;미네;01;……. 처음 뵙겠습니다. 구호기사단의 단장을 맡고 있는 미네입니다. \n#5;em;…\n#5;a"
34020-7 = "[s1] \"응. 잘 부탁해.\" \n[s2] \"어쩐지 신기한 조합이네.\""
34020-8 = "5;미네;01\n3;나기사;01\n1;사쿠라코;99;후후……. 신기하다고 할까, 나기사 씨를 곤란하게 만들 조합이라고 할까."
34020-9 = "5;미네;01\n3;나기사;01\n1;사쿠라코;99;후후……. 신기하다고 할까, 나기사 씨를 곤란하게 만들 조합이라고 할까."
34020-10 = "3;나기사;01\n1;사쿠라코;01\n5;미네;99;저는 호스트를 곤란하게 만들 생각은 없었습니다만."
34020-11 = "3;나기사;01\n1;사쿠라코;01\n5;미네;02;신념과 긍지를 품고 있는 기사단의 일원으로서, 그릇된 모습이 보인다면 바르게 되돌릴 뿐입니다."
34020-12 = "#all;hide"
34020-13 = "3;미네;01;설령 그것이 정의실현부나 티파티라고 할지라도요.\n#3;closeup\n#3;em;[반응]"
34020-14 = "1;사쿠라코;04\n5;미네;01\n3;나기사;99;…….\n#3;em;…"
34020-15 = "5;미네;01\n3;나기사;99\n1;사쿠라코;99;……그런 말이 이미 충분히 나기사 씨를 곤란하게 만들고 있는 것 같지만요.\n#1;em;[땀]"
34020-16 = "1;사쿠라코;01\n5;미네;01\n3;나기사;02;자, 바쁘신 선생님 앞에서 잡담은 이 정도로 하고. \n#3;em;[반응]"
34020-17 = "1;사쿠라코;01\n5;미네;01\n3;나기사;01;선생님을 모신 이유는 저번의 에덴조약 사태 이후의 상황 공유와 사건의 뒤처리에 대한 여러 가지를 논의하려고 했던 것……이었습니다만."
34020-18 = "5;미네;01\n3;나기사;01\n1;사쿠라코;01;……."
34020-19 = "3;나기사;01\n1;사쿠라코;01\n5;미네;99;……."
34020-20 = "1;사쿠라코;01\n5;미네;99\n3;나기사;04;어째선지, 시스터후드와 구호기사단의 리더가 이 자리에 참석하겠다고 해서…… 이렇게 되어버렸네요.\n#3;em;[땀]"
34020-21 = "5;미네;99\n3;나기사;04\n1;사쿠라코;01;……시스터후드도 예전과는 많이 달라져서요. 이제 이런 자리에 빠질 수는 없겠죠."
34020-22 = "3;나기사;04\n1;사쿠라코;01\n5;미네;02;저 역시 트리니티에서 가장 오랜 역사를 지닌 동아리인 <기사단>의 수장으로서 의무를 수행하려는 것뿐입니다."
34020-23 = "1;사쿠라코;01\n5;미네;01\n3;나기사;04;…….\n#3;em;…"
34020-24 = "[s] \"어…… 요컨대, 두 사람은 티파티를 견제하려는 목적으로……?\""
34020-25 = "5;미네;01\n3;나기사;04\n1;사쿠라코;99;아뇨, 관심이 많은 것뿐이죠."
34020-26 = "3;나기사;04\n1;사쿠라코;99\n5;미네;01;저는 그런 정치적인 일들은 잘 모릅니다."
34020-27 = "1;사쿠라코;01;에덴조약 사태는 어찌저찌 마무리되었지만, 그 사건의 배경에 대한 후속 조치와 상황 분석은 여전히 진행 중이죠.\n#1;m3\n#3;dr\n#5;dr\n#1;em;[반응]"
34020-28 = "1;사쿠라코;99;저희 또한 이 사건과 무관하지 않기에, 연구 분석의 일정 부분은 시스터후드가 담당하고 있습니다."
34020-29 = "1;사쿠라코;02;이번 자리는 그런 정보의 공유 및 후속 조치에 대해 논의를 하기 위한 것이라고 봐주시면 됩니다.\n#1;greeting"
34020-30 = "#all;hide"
34020-31 = "3;미네;01;네. 그런 것으로.\n#3;em;[반응]"
34020-32 = "[s] \"어…… 그, 그렇구나.\""
34020-33 = "3;나기사;99;……."
34020-34 = "3;미네;02;어째서 티파티가 아니라 우리들이? 라는 의문이 드신다면, 그 부분은 제가 답변드리겠습니다."
34020-35 = "3;미네;99;지금 티파티에는 도움이 필요합니다.\n#3;em;…"
34020-36 = "3;나기사;10;……."
34020-37 = "3;미네;01;에덴조약 사태 전후로, 티파티의 일원이 호스트를 공격하는 사건이 벌어졌고, 그 결과를 초래한 당사자가 감옥에 갇히는 초유의 사태가 발생했습니다."
34020-38 = "3;미네;05;설마 세이아 님을 공격한 배후가 미카 님이었다니……."
34020-39 = "3;나기사;10;……."
34020-40 = "3;사쿠라코;99;……."
34020-41 = "3;미네;02;그 뒤 세이아 님을 지켜낸 것은, 여러분도 잘 아시듯이 저였습니다. 그래서 저도 나름대로 이 사건을 조사해 왔습니다."
34020-42 = "3;미네;01;미카 님은 결과적으로 아리우스에게 이용당한 것이라 볼 수 있겠지만…… 그렇다고 그녀의 죄가 사라지는 것은 아닙니다.\n#3;em;…"
34020-43 = "1;나기사;01\n3;미네;05;게다가 지금 호스트인 나기사 님은 <샬레>의 초법적 권한이라는 편법을 이용해 다른 학생들을 퇴학시키려고 했고요.\n#1;a\n#3;m5"
34020-44 = "1;나기사;10;……."
34020-45 = "3;미네;99;피해를 입은 소녀들에게는 사과를 했고, 모든 일은 다 잘 마무리되었다고 들었으나……."
34020-46 = "3;미네;05;그렇다고 나기사 님의 행동이 없던 게 되지는 않습니다.\n#3;em;[반응]"
34020-47 = "1;나기사;99;……."
34020-48 = "3;미네;01;세이아 님은 다행히 학원으로 복귀할 수 있었지만…… 건강이 예전보다 더 악화되어서 자신의 방 밖으로 외출조차 못 하는 몸이 되었고요."
34020-49 = "3;미네;02;따라서 지금의 <티파티>에는 좀 더 많은 관심이 필요하다는 것이 제 판단입니다.\n#3;m4\n#3;em;[반응]"
34020-50 = "#all;hide"
34020-51 = "3;사쿠라코;99;과연."
34020-52 = "3;나기사;10;……. 친절한 설명 감사드려요. 미네 단장.\n#3;em;…"
34020-53 = "#st;[0,0];instant;1;"
34020-54 = "#clearST"
34020-55 = "3;미네;99\n#3;greeting\n#wait;1500"
34020-56 = "3;미네;01\n#3;h\n#wait;2500"
34020-57 = "[ns] (부, 불편한 분위기다…….)"
34020-58 = "3;미네;01\n1;사쿠라코;07;미네 단장은 요한 분파의 수장이기도 하면서 트리니티에서 가장 오래된 역사를 자랑하는 동아리의 리더.\n#1;ar\n#3;m5\n#1;em;[반응]"
34020-59 = "1;사쿠라코;01;원래라면 티파티에 참석할 수 있는 권리가 있었지만…… 구호의 가치를 수행하기 위해 그녀 스스로 그 권리를 사양했었죠."
34020-60 = "#3;hide\n5;미네;01;과거의 이야기입니다."
34020-61 = "1;사쿠라코;01\n5;미네;01\n3;나기사;07;……이 사태의 핵심은 결국 아리우스 분교로 수렴됩니다.\n#3;a"
34020-62 = "#all;hide"
34020-63 = "#na;나기사;에덴조약 회담장의 습격, 그 사건의 배후로 지목된 것이 바로 아리우스 분교."
34020-64 = "#all;hide"
34020-65 = "1;마코토;00\n5;미카;00\n#1;a\n#5;a\n#1;h\n#5;h"
34020-66 = "#na;나기사;마코토 의장과 미카는 둘 다 아리우스의 손에 놀아난 것일 뿐이고……."
34020-67 = "1;마코토;05\n5;미카;00\n#1;m3\n#5;dr\n#1;em;[반응]\n#1;h"
34020-68 = "#na;나기사;마코토 의장은 오히려 자신이 피해자이며, 트리니티의 분파인 아리우스가 자신들을 공격한 것이니 우리 쪽에 모든 책임이 있다고 주장하고 있지만요."
34020-69 = "#na;나기사;미용실 비용도 우리에게 청구하겠다, 라고 알 수 없는 이야기를…… 뭐, 이건 넘어가고."
34020-70 = "#all;hide"
34020-71 = "3;사쿠라코;99;아리우스가 이 모든 것을 뒤에서 조종했다면……. 그들에 관한 몇 가지 의문이 남게 됩니다.\n#3;a"
34020-72 = "3;사쿠라코;07;첫 번째. 아리우스 분교는 어째서 에덴조약을 방해했는가?"
34020-73 = "3;미네;05;아리우스 분교는 오랫동안 우리 트리니티와 게헨나를 증오해 왔다고 들었습니다. 한번에 두 학원의 요인들을 무력화시킬 수 있는 좋은 기회였겠죠.\n#3;em;…"
34020-74 = "3;나기사;07;그리고 에덴조약이라는 <계약>을 이용해서 불가해한 병력을 손에 넣었고요……. 세이아 씨는 그렇게 설명했어요."
34020-75 = "3;미네;01;네. <유스티나 성도회>의 모습을 한 유령들. 그것들이 그대로 트리니티나 게헨나로 진격하는 데 성공했다면 두 학원은 무력하게 무너졌을 겁니다.\n#3;greeting"
34020-76 = "1;사쿠라코;99;…….\n#1;a\n#3;m5"
34020-77 = "3;미네;02;대체 그건 뭐였던 겁니까?\n#3;em;[반응]"
34020-78 = "1;나기사;99;거기에 대해서는 몇 가지 가설이 있긴 한데…… 그걸 뒷받침하는 증거를 찾질 못한 상태예요…….\n#1;em;…"
34020-79 = "3;미네;05;성도회는 본래 시스터후드의 전신이었던 집단. 사쿠라코 님, 이 부분에 대해서 숨기고 있는 것은 없습니까?"
34020-80 = "1;사쿠라코;01;……. 네. 아쉽게도요."
34020-81 = "3;미네;99;시스터후드는 비밀이 많은 집단이죠. 정보의 통제나 은닉, 왜곡에도 능하고요."

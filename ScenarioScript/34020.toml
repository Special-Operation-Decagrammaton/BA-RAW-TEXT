[translation]
34020-1 = "第2話;殘缺不全的茶會"
34020-3 = "今天謝謝你過來，老師。時隔許久來了三一呢。"
34020-4 = "[s] 「你好呀渚，還有大家。」"
34020-5 = "又見面了呢，[USERNAME]老師。之前承蒙您的關照。"
34020-6 = "……初次見面。我是救護騎士團的團長美禰。"
34020-7 = "[s1] 「嗯，請多指教。」\n[s2] 「總覺得是不可思議的組合呢。」"
34020-8 = "呵呵……與其說是不可思議，更像是會讓渚同學傷腦筋的組合呢。"
34020-9 = "呵呵……與其說是不可思議，更像是會讓渚同學傷腦筋的組合呢。"
34020-10 = "我倒是沒有要讓主席頭痛的意思。"
34020-11 = "身為心懷信念和榮耀的騎士團的一員，我只不過是將偏離正道之人導回正軌而已。"
34020-13 = "就算對方是實現正義部或是茶會的學生也一樣。"
34020-14 = "……"
34020-15 = "……你這些話就已經讓渚同學很困擾了吧。"
34020-16 = "那麼，閒聊就到此為止吧。"
34020-17 = "請老師過來的理由，是為了進行這段時間與伊甸園條約相關事件的事後處理……對吧。"
34020-18 = "……"
34020-19 = "……"
34020-20 = "不過沒有聽說修女會和救護騎士團的領導人也會來……所以就變成現在這樣了。"
34020-21 = "……因為修女會也改變行動方針了。今後我們也打算像這樣積極參與這類的會議。"
34020-22 = "我也只是在盡身為「騎士團」團長的職責而已。"
34020-23 = "……"
34020-24 = "[s] 「那個……所以，兩位是為了要牽制茶會才……？」"
34020-25 = "不，純粹是我的興趣而已。"
34020-26 = "我也對那些政治的事情不太了解。"
34020-27 = "伊甸園條約的騷動雖然已經漸漸平息了，不過事件的事後處理和狀況分析還沒有結束。"
34020-28 = "我們和這件事也並非沒有關係……畢竟事件的分析有一部分就是由我們修女會負責的。"
34020-29 = "這次的會議就是為了共享這些情報以及討論事後處理的方式。"
34020-31 = "正是如此。"
34020-32 = "[s] 「原來如此……」"
34020-33 = "……"
34020-34 = "為何不是由茶會而是由我們來展開會議呢？這個問題就由我來回答吧。"
34020-35 = "因為現在的茶會需要外部的協助。"
34020-36 = "……"
34020-37 = "在伊甸園條約締結前後，發生了茶會的其中一員攻擊了主席，結果被送進了監獄這種前所未聞的情況。"
34020-38 = "沒想到下令攻擊聖亞大人的居然會是彌香大人……"
34020-39 = "……"
34020-40 = "……"
34020-41 = "聖亞大人的治療就如各位所知，是由我負責的。因此，我也自行對這起事件進行了一些調查。"
34020-42 = "彌香大人從結果上來說雖然是被奧利斯給利用了……儘管如此，他本人所犯下的罪也不會因此而消失。"
34020-43 = "此外，身為現任主席的渚大人利用了「夏萊」這超越法規的組織，試圖將無辜的學生逼到退學。"
34020-44 = "……"
34020-45 = "雖然聽說已經向被害的學生們道歉，順利告一段落了……"
34020-46 = "但是，渚大人的行為也不能當作沒發生過。"
34020-47 = "……"
34020-48 = "雖然聖亞大人已經回到了學園……不過他的身體狀況比以前更加惡化，現在已經連離開房間都沒辦法了。"
34020-49 = "因此，我判斷現今不安定的「茶會」需要來自外部的協助。"
34020-51 = "原來如此。"
34020-52 = "……感謝你詳細的說明，美禰團長。"
34020-57 = "[ns] （氣，氣氛好僵……）"
34020-58 = "美禰團長既是三一最歷史悠久的社團的領導人，也是約翰分派的首長。"
34020-59 = "原本是有著參加茶會的權利的……不過至今為止都為了自己進行救護活動而拒絕了。"
34020-60 = "都是過去的事了。"
34020-61 = "……這次事件的所有線索都指向了奧利斯分校。"
34020-63 = "實施伊甸園條約會場襲擊的幕後黑手也是奧利斯分校。"
34020-66 = "真琴議長和彌香同學簡直可以說是被奧利斯玩弄在股掌間……"
34020-68 = "真琴議長認為自己是被身為三一分派的奧利斯襲擊，所以自己才是被害者，主張要我們負起所有的責任。"
34020-69 = "因此要求我們支付為了修剪燒焦的頭髮的美容院費用──這種莫名其妙的事……不過，這先放在一旁。"
34020-71 = "如果是奧利斯在背後策劃這一切的話……那麼還剩下幾個疑問。"
34020-72 = "首先，為何奧利斯分校要妨礙伊甸園條約呢。"
34020-73 = "聽說奧利斯分校一直以來都憎恨著我們三一和格黑娜。他們認為這是一次讓兩個學園高層都無力化的絕佳機會吧。"
34020-74 = "並且，還利用了伊甸園條約這份「契約」得到了無法理解的兵力……聖亞同學是這麼說的。"
34020-75 = "沒錯。有著「優斯提娜聖徒會」模樣的幽靈們。就這麼讓他們對三一和格黑娜發動攻擊的話──兩所學園都將束手無策地崩壞吧。"
34020-76 = "……"
34020-77 = "那究竟是什麼呢？"
34020-78 = "雖然我們對此做出了一些假說……不過並沒有發現相應的證據。"
34020-79 = "聖徒會就是修女會前身的集團。櫻子同學，關於這點你是否對我們隱瞞了什麼呢？"
34020-80 = "……不，很遺憾。"
34020-81 = "修女會本來就是個充滿祕密的集團。畢竟你們十分擅長對情報的控制、隱匿和扭曲。"
34020-86 = "在學園中有許多人都對修女會抱持著懷疑的態度，這點你清楚嗎？"
34020-92 = "……比如，你嗎？"
34020-93 = "……"
34020-94 = "……"
34020-95 = "[s] （氣，氣氛好僵……）"
34020-99 = "……如果你認為我知道修女會所有的祕密的話，這你就錯了。"
34020-100 = "在修女會之中存在著許多就連我也不知道的祕密──詳細的情況恕我無可奉告。"
34020-101 = "……這樣啊，我失禮了。"
34020-102 = "唉……"
34020-103 = "能夠讓三一的防衛系統失效的巡航導彈……關於這點你們的分析如何呢？"
34020-104 = "雖然分析正在進行，不過現在它的出處和構造依然不明……只知道它使用的並非奇普托斯裡存在的技術……"
34020-105 = "……也就是說奧利斯分校至少掌握著兩種我們未知的力量對吧。"
34020-106 = "沒錯。接著是第二個疑問。"
34020-107 = "第二個疑問，奧利斯分校正計畫著什麼呢。"
34020-108 = "……"
34020-109 = "……對於這點，我們也完全不了解。"
34020-110 = "甚至──我們連奧利斯的自治區在哪裡都不知道。"
34020-111 = "……雖然這從以前就一直是個謎團，不過以這次事件作為契機，我們也獲得了一些線索。"
34020-112 = "他們當時是透過位於通功古教堂地下的墓穴潛入的。"
34020-113 = "我們也已經發現至今為止他們的潛入路線也全都跟地下墓穴有關。就連巡航導彈的發射位置也是三一內部的遺跡地區。"
34020-114 = "三一自治區內的地下遺跡數量多到難以估計。要全部進行調查和控制是不可能的。"
34020-115 = "順帶一提，地下墓穴本身也是規模不明的迷宮……要靠我們自己從那裡找出奧利斯自治區是非常困難的。"
34020-116 = "唔姆……"
34020-117 = "聖亞同學說過，那個自治區被某種我們無法理解的「某種力量」給保護著。"
34020-118 = "如果不是這樣的話，就無法說明為何他們能夠隱藏到現在了……"
34020-119 = "又是無法理解的力量啊……"
34020-120 = "根據過去隸屬於奧利斯的梓同學所說，似乎在每次執行任務時都會得到一張畫有地下墓穴出口的地圖。"
34020-124 = "地圖的路線每次都會改變，甚至還進行了加密……連身為背叛者的他也不知道回到奧利斯自治區的路了。"
34020-125 = "……你審問了那名少女嗎？"
34020-126 = "咦？"
34020-127 = "白洲梓同學……你讓那孩子吐出了奧利斯的情報嗎？"
34020-128 = "他已經付出了足夠的代價了！被自己所在的自治區烙上了背叛者的烙印，儘管如此還是為了我們而努力著！"
34020-130 = "那孩子好不容易才取回了心靈的平靜，居然又把他牽扯了進來，質問他奧利斯的情報……這是多麼殘酷……！"
34020-131 = "啊，不是這樣的！我們並沒有審問他，是他自己告訴我們的……"
34020-133 = "那個少女真的會這麼想嗎！你肯定是利用了茶會的權力，強行對柔弱的少女……！！"
34020-134 = "咦！？咦咦！？"
34020-135 = "請冷靜，美禰團長。並沒有那種事。"
34020-136 = "……不是這樣嗎？"
34020-137 = "是的。渚同學確實是個沒血沒淚又殘忍的人，但這次不是這樣的。梓同學並沒有遭受到無禮的對待。"
34020-141 = "更何況「補課部」是夏萊的老師負責的社團。如果真的發生那種事情的話老師不會坐視不管的吧。"
34020-142 = "……確實如此。"
34020-143 = "我失禮了，渚大人。"
34020-144 = "……"
34020-145 = "[s3] （渚的茶杯抖個不停……）\n[s4] 「還，還好嗎？渚？」"
34020-146 = "……是的，這點我也知道。"
34020-147 = "……是的，這點我也知道。"
34020-148 = "日步美同學……花子同學、小春同學、梓同學……"
34020-149 = "補課部的各位背負了比起他們應負的責任更多的事物……"
34020-150 = "讓他們背負這些的原因的一部分也是因為我……"
34020-151 = "關於這點我也有應負的責任以及後悔……"
34020-152 = "因此，在伊甸園條約之後的這種場合，我也努力不讓那些孩子牽扯進來……"
34020-153 = "這種互揭傷疤的事情由我們來做就好……不能讓那些孩子也經歷這種事……"
34020-154 = "[s] 「渚……」"
34020-155 = "……你說的沒錯，渚大人。請原諒我的無禮。"
34020-156 = "……我也有同感。"
34020-157 = "雖然我也有著想要把事情交給花子同學的想法……"
34020-158 = "不過既然我們之間的交易已經結束……我也不想再讓他背負更多了。"
34020-159 = "剩下的問題就由我們來解決……這是我們能做到的、最低限度的禮儀吧。"
34020-160 = "我相信老師也會跟我們一起行動到最後的。"
34020-161 = "[s] 「嗯，那是當然的。」"
34020-162 = "……謝謝你，老師。"
34020-164 = "地下墓穴是個連全貌都尚未明朗的巨大迷宮……要找出每次都會改變的入口確實是個難題呢。"
34020-165 = "來轉換一下想法吧……詢問知道路線的人怎麼樣呢？"
34020-166 = "知道路線的人……？"
34020-169 = "主導襲擊的「奧利斯小隊」隊長錠前沙織。他應該很熟悉路線才對。"
34020-170 = "……原來如此，如果是指揮襲擊的他的話……"
34020-171 = "不過「奧利斯小隊」依然下落不明……很可能已經逃回自治區了。"
34020-172 = "除了「奧利斯小隊」之外，還有一個很熟悉路線的學生不是嗎？"
34020-173 = "……"
34020-174 = "那個……？你指的是哪位呢……"
34020-179 = "聖園彌香。"
34020-180 = "……！？"
34020-182 = "那，那種事……彌香同學本人也說只有奧利斯自治區的位置他不知道……"
34020-183 = "……他長期和奧利斯勾結，卻說不知道奧利斯的位置，這種話能信嗎？"
34020-184 = "……"
34020-185 = "……確實有彌香大人提供補給品給奧利斯學生的紀錄。"
34020-186 = "為了發起政變以及獲得奧利斯的支援……會這麼想也很自然吧。"
34020-187 = "可是……彌香同學他……"
34020-188 = "至今為止彌香大人的判斷和行為實在很難稱之為模範。"
34020-189 = "我想渚大人應該也很清楚……彌香大人將茶會成員的身分當成擋箭牌，掩蓋了很多自己的過失和問題。"
34020-190 = "現在學園裡發生的對彌香大人的譴責和騷動──這些輿論也不能說是和他以往的所作所為無關。"
34020-191 = "[s] （……騷動？）"
34020-192 = "彌香同學……說了謊是嗎……#n為了隱藏奧利斯自治區的位置……究竟為了什麼……"
34020-193 = "……"
34020-194 = "渚大人會為彌香大人著想的心情我完全能理解。"
34020-195 = "然而恕我直言──說到誰是最理解彌香大人的人，應該非青梅竹馬的渚大人你莫屬了吧。"
34020-196 = "……"
34020-201 = "在渚大人看來，彌香大人是否還有事情瞞著我們呢？"
34020-205 = "這個……"
34020-206 = "[s] （渚……）"
34020-210 = "……不，我相信彌香同學。"
34020-211 = "……"
34020-212 = "……"
34020-213 = "確實……彌香同學可能稱不上是什麼善良的學生……"
34020-214 = "儘管如此我還是相信彌香同學──這就是我這次領悟到的教訓。"
34020-215 = "為了讓其他人也能相信彌香同學，我會出席明天的聽證會並為他辯護的。"
34020-216 = "為了讓你們──有必要的話，讓學園裡的所有學生都能夠相信彌香同學！"
34020-217 = "就算這樣會讓我也受到譴責……我也……"
34020-218 = "……不，我只是說出了一種可能性而已，並沒有其他意思。讓你誤會了非常對不起，渚大人。"
34020-219 = "……失禮了。我為我的無禮道歉。"
34020-220 = "[s] 「那個……這個……」"
34020-221 = "……哈啊。"
34020-222 = "這樣啊……時間也不早了，差不多該散會了吧。"
34020-223 = "感謝各位今天在百忙之中抽空前來。"
34020-224 = "……不會，能見到各位真是太好了。非常感謝。"
34020-225 = "我也對現在的情況……對彌香大人受到的譴責感到十分遺憾。"
34020-226 = "我也會以自己的方式尋找對策的。再會了。"
34020-227 = "好的──那麼我也回大教堂去了。"
34020-228 = "嗯，請多保重。"
34020-233 = "哈啊……"
34020-234 = "……胃好痛啊。"
34020-235 = "[s] 「辛苦你了。」"
34020-236 = "……非常感謝，老師。總是被你看到我難堪的樣子呢……"
34020-237 = "[s5] 「雖然是剛才的話題……彌香出了什麼事嗎？」\n[s6] 「從剛剛開始就好像……」"
34020-238 = "……原來如此，老師還不知道啊。"
34020-239 = "……原來如此，老師還不知道啊。"
34020-240 = "明天上午預計將召開彌香同學的聽證會。"
34020-241 = "[s] 「聽證會？」"
34020-242 = "是的。雖然說是聽證會，事實上更像是對之前事件的審問……把它當作是審訊可能更適合吧。"
34020-243 = "預計將會對彌香同學至今為止所犯下的罪……特別是與伊甸園條約相關的事為中心進行議論……"
34020-247 = "……老師。"
34020-251 = "我想……彌香同學肯定會被退學的。"
34020-253 = "下一話;監牢中的公主"

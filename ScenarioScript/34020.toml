[translation]
34020-1 = "ตอนที่ 2;พิธีชงชาที่น่าอึดอัดใจ"
34020-3 = "ขอบคุณที่มานะคะคุณครู ไม่ได้มาทรีนิตี้นานเลยใช่ไหมคะ? "
34020-4 = "[s] \"สวัสดีนะนางิสะ แล้วก็ทุกคนด้วย\""
34020-5 = "ได้เจอกันอีกแล้วนะคะ คุณครู [USERNAME] ครั้งที่แล้วฉันเป็นหนี้บุญคุณอย่างใหญ่หลวงเลยละค่ะ"
34020-6 = "...... ยินดีที่ได้รู้จักค่ะ ฉันชื่อมิเนะ เป็นหัวหน้าชมรมอัศวินบรรเทาทุกข์ค่ะ "
34020-7 = "[s1] \"อืม ฝากตัวด้วยนะ\" \n[s2] \"เป็นการรวมตัวที่น่าเหลือเชื่อเลยนะ\""
34020-8 = "ฮุฮุ... ต้องบอกว่าพวกเราเป็นกลุ่มที่น่าเหลือเชื่อ หรือกลุ่มที่ทำให้คุณนางิสะต้องปวดหัวดีนะ"
34020-9 = "ฮุฮุ... ต้องบอกว่าพวกเราเป็นกลุ่มที่น่าเหลือเชื่อ หรือกลุ่มที่ทำให้คุณนางิสะต้องปวดหัวดีนะ"
34020-10 = "ฉันไม่ได้อยากทำให้โฮสต์ต้องลำบากหรอกนะคะ"
34020-11 = "แต่ในฐานะของอัศวินผู้มีความเชื่อและความองอาจ หากมีอะไรที่ผิดเพี้ยนไป ฉันก็ต้องทำให้มันกลับมา#nถูกต้องค่ะ"
34020-13 = "ถึงแม้สิ่งนั้นจะเป็นชมรมทวงความยุติธรรมหรือสภาน้ำชาก็ตาม"
34020-14 = "......"
34020-15 = "แค่คำพูดแบบนี้ก็ทำให้คุณนางิสะลำบากได้พอตัวแล้วละค่ะ..."
34020-16 = "คุณครูไม่น่าจะมีเวลาว่างสักเท่าไร หยุดพูดเรื่องไร้สาระต่อหน้าคุณครูเถอะค่ะ "
34020-17 = "เดิมทีแล้ว... ฉันเรียกคุณครูมาพบเพราะจะแจ้งสถานการณ์หลังสนธิสัญญาเอเดน และจะหารือเกี่ยวกับ#nการจัดการหลังจากนั้นด้วยค่ะ"
34020-18 = "......"
34020-19 = "......"
34020-20 = "แต่ฉันก็ไม่รู้ว่าทำไมหัวหน้าของชมรมซิสเตอร์กับชมรมอัศวินบรรเทาทุกข์ถึงได้อยากมาเข้าร่วมด้วย... จนได้มาอยู่ด้วยกันที่นี่น่ะค่ะ"
34020-21 = "เพราะชมรมซิสเตอร์ต่างไปจากเดิมยังไงล่ะคะ... จากนี้ไปเราจะไม่พลาดโอกาสแบบนี้หรอกค่ะ"
34020-22 = "ส่วนฉันก็แค่มาทำหน้าที่ในฐานะหัวหน้าชมรม <อัศวินบรรเทาทุกข์> ที่มีประวัติศาสตร์ยาวนานที่สุดใน#nทรีนิตี้ค่ะ"
34020-23 = "......"
34020-24 = "[s] \"อืม... ถ้างั้นทั้งสองคนก็เลยมาคอยขัดขาสภาน้ำชาเหรอ?\""
34020-25 = "ไม่ใช่หรอกค่ะ เรามาเพราะสนใจต่างหากล่ะคะ"
34020-26 = "ส่วนฉันไม่ค่อยรู้เรื่องการเมืองเท่าไรหรอกค่ะ"
34020-27 = "ถึงเรื่องสนธิสัญญาเอเดนจะจบลงไปแล้ว แต่การติดตามและวิเคราะห์เกี่ยวกับเบื้องหลังของเรื่องนี้ยัง#nคงดำเนินอยู่ค่ะ"
34020-28 = "และเนื่องจากชมรมซิสเตอร์ไม่มีส่วนเกี่ยวข้องกับเรื่องนี้ พวกเราเลยเข้ามารับผิดชอบกำหนดการ#nการวิเคราะห์ค่ะ"
34020-29 = "คิดเสียว่านี่คือการรวมตัวกันเพื่อแบ่งปันข้อมูลและหารือเพื่อติดตามผลต่อไปแล้วกันค่ะ"
34020-31 = "ค่ะ ใช่เลย"
34020-32 = "[s] \"อืม... ยะ... อย่างนี้นี่เอง\""
34020-33 = "......"
34020-34 = "สงสัยใช่ไหมคะว่าทำไมถึงเป็นพวกฉันแทนที่จะเป็นสภาน้ำชา? ฉันจะตอบให้เองค่ะ"
34020-35 = "ตอนนี้สภาน้ำชาต้องการความช่วยเหลือค่ะ"
34020-36 = "......"
34020-37 = "ในช่วงราวๆ พิธีสนธิสัญญาเอเดนได้เกิดคดีที่สมาชิกคนหนึ่งของสภาน้ำชาทำการโจมตีโฮสต์ ผลที่ตามมาคือต้องมีคนไปเข้าคุกแบบที่ไม่เคยมีมาก่อน"
34020-38 = "ไม่อยากเชื่อเลยค่ะว่าคุณมิกะจะอยู่เบื้องหลังการโจมตีคุณเซอา"
34020-39 = "......"
34020-40 = "......"
34020-41 = "คนที่ดูแลคุณเซอาหลังจากเกิดเหตุการณ์นั้นก็คือฉันค่ะ ฉันก็เลยมาตรวจสอบคดีนี้ด้วย"
34020-42 = "โดยสรุปแล้วเราอาจจะมองได้ว่าคุณมิกะถูกใช้งานโดยพวกอาเรียส... แต่ถึงจะเป็นอย่างนั้นก็ไม่ได้#nหมายความว่าความผิดของเธอจะหายไปค่ะ"
34020-43 = "อีกอย่างตอนนี้คุณนางิสะที่เป็นโฮสต์ยังใช้วิธีง่ายๆ ที่ชื่อว่า <ชาเล่ต์> ไล่นักเรียนออกด้วยค่ะ"
34020-44 = "......"
34020-45 = "ฉันได้ยินว่าคุณนางิสะไปขอโทษนักเรียนที่ได้รับความเสียหายจนทุกอย่างคลี่คลายหมดแล้ว"
34020-46 = "แต่มันก็ไม่ได้ลบล้างการกระทำของคุณนางิสะออกไปได้หรอกนะคะ"
34020-47 = "......"
34020-48 = "คุณเซอากลับมาที่โรงเรียนได้ตามปกติก็จริง... แต่สุขภาพของเธอแย่ลงมาก มากขนาดที่แค่ออกจาก#nห้องของตัวเองยังลำบากเลยค่ะ"
34020-49 = "ฉันเลยมองว่าตอนนี้เราต้องให้ความสนใจกับ <สภาน้ำชา> ให้มากขึ้นค่ะ"
34020-51 = "ก็นั่นละค่ะ"
34020-52 = "...... ขอบคุณสำหรับคำอธิบายค่ะ หัวหน้ามิเนะ"
34020-57 = "[ns] (บะ... บรรยากาศน่าอึดอัดใจจัง)"
34020-58 = "หัวหน้ามิเนะเป็นทั้งหัวหน้ากลุ่มโยฮันและหัวหน้าชมรมที่มีประวัติศาสตร์ยาวนานที่สุดของทรีนิตี้"
34020-59 = "เดิมทีแล้วถือว่ามีสิทธิ์ที่จะเข้าร่วมสภาน้ำชาอยู่แล้วค่ะ... แต่หัวหน้ามิเนะก็ปฏิเสธ เพราะจะไปอุทิศตน#nให้กับการบรรเทาทุกข์ค่ะ"
34020-60 = "นั่นมันเรื่องในอดีตค่ะ"
34020-61 = "สุดท้ายแล้วแก่นของเหตุการณ์นี้ก็คือโรงเรียนสาขาอาเรียสค่ะ"
34020-63 = "หลังจากเหตุบุกรุกห้องประชุมลงนามสนธิสัญญาเอเดน ผู้ที่ถูกมองว่าอยู่เบื้องหลังของเหตุการณ์นั้น#nก็คือโรงเรียนสาขาอาเรียส"
34020-66 = "ประธานมาโคโตะกับมิกะก็เป็นหมากของอาเรียสกันทั้งคู่..."
34020-68 = "ประธานมาโคโตะบอกว่าตัวเองเป็นเหยื่อ และบอกว่าเราต้องรับผิดชอบเพราะอาเรียสที่ไปโจมตีพวก#nเธอเป็นโรงเรียนสาขาของทรีนิตี้ค่ะ"
34020-69 = "ไหนจะคิดค่าใช้จ่ายร้านเสริมสวยกับเราด้วยอีก... แต่เรื่องนั้นเอาไว้ก่อนเถอะค่ะ"
34020-71 = "หากอาเรียสควบคุมทุกอย่างนี้จากเบื้องหลังละก็... พวกนั้นก็ต้องตอบคำถามอะไรสักสองสามข้อค่ะ"
34020-72 = "ข้อแรก ทำไมโรงเรียนสาขาอาเรียสถึงได้ขัดขวางสนธิสัญญาเอเดน?"
34020-73 = "ฉันได้ยินมาว่าโรงเรียนสาขาอาเรียสมีความแค้นต่อทรีนิตี้และเกเฮนน่ามานานมากแล้ว นี่คงเป็นโอกาสดีที่จะตัดอำนาจของทั้งสองโรงเรียนค่ะ"
34020-74 = "แล้วก็ใช้ <ข้อตกลง> ที่เรียกว่าสนธิสัญญาเอเดนเพื่อให้ได้กองกำลังที่ไม่สามารถเข้าใจได้... คุณเซอาอธิบายมาแบบนี้ค่ะ"
34020-75 = "ค่ะ ถ้าเกิดเหล่าวิญญาณในร่างของ <สาวกยูสตาร์> บุกทรีนิตี้หรือเกเฮนน่าสำเร็จ โรงเรียนทั้งสอง#nก็คงจะพังทลายไปแล้วละค่ะ"
34020-76 = "......"
34020-77 = "พวกนั้นคืออะไรเหรอคะ?"
34020-78 = "มีสมมติฐาน 2-3 อย่างเกี่ยวกับเรื่องนี้... แต่ตอนนี้ฉันยังหาหลักฐานสนับสนุนไม่ได้ค่ะ..."
34020-79 = "พวกสาวกคือกลุ่มเดิมของชมรมซิสเตอร์... คุณซากุระโกะ คุณไม่มีอะไรปิดบังเรื่องส่วนนี้ใช่ไหมคะ?"
34020-80 = "...... ค่ะ ถือว่าน่าเสียดายนะคะ"
34020-81 = "ชมรมซิสเตอร์เป็นกลุ่มที่เต็มไปด้วยความลับ ทำได้ทั้งควบคุม หลบซ่อน และบิดเบือนข้อมูลเลยค่ะ  "
34020-86 = "คุณซากุระโกะรู้ไหมคะว่าเด็กสาวหลายคนในโรงเรียนคิดว่าชมรมซิสเตอร์เป็นพวกที่เชื่อถือไม่ได้?"
34020-92 = "...... หัวหน้ามิเนะก็เป็นหนึ่งในนั้นสินะคะ?"
34020-93 = "......"
34020-94 = "......"
34020-95 = "[s] (นะ... น่าอึดอัดจัง)"
34020-99 = "ถ้าคิดว่าฉันรู้ทุกความลับของชมรมซิสเตอร์ละก็ คิดผิดแล้วละค่ะ"
34020-100 = "ชมรมซิสเตอร์มีความลับมากมายที่แม้แต่ฉันเองก็ไม่อาจรู้ได้ นี่เป็นเรื่องภายใน ฉันคงอธิบายเพิ่มเติม#nไม่ได้ค่ะ"
34020-101 = "อย่างนี้เองเหรอคะ... ต้องขอโทษด้วยนะคะ"
34020-102 = "เฮ้อ..."
34020-103 = "เรื่องขีปนาวุธร่อนที่ทำให้ระบบป้องกันภัยของทรีนิตี้ไม่ทำงาน เรื่องนี้วิเคราะห์กันยังไม่เสร็จเหรอคะ?"
34020-104 = "ค่ะ เราเริ่มวิเคราะห์ไปแล้ว แต่ตอนนี้ยังหาจุดกำเนิดและโครงสร้างของขีปนาวุธไม่ได้... คงได้แต่คาดเดาว่ามันเป็นเทคโนโลยีที่ไม่มีในคิโวทอสค่ะ"
34020-105 = "สุดท้ายแล้ว... โรงเรียนสาขาอาเรียสมีพลังที่เราไม่อาจรู้ได้อย่างน้อย 2 ทางเลยสินะคะ"
34020-106 = "ค่ะ และนี่ก็นำไปสู่คำถามที่ 2 ค่ะ"
34020-107 = "ข้อที่ 2 โรงเรียนสาขาอาเรียสกำลังวางแผนการอะไรอยู่?"
34020-108 = "......"
34020-109 = "ส่วนนี้พวกฉันไม่รู้อะไรเลยค่ะ..."
34020-110 = "ไม่รู้ด้วยซ้ำค่ะว่าเขตปกครองตนเองอาเรียสอยู่ที่ไหน"
34020-111 = "ค่ะ... เรื่องนั้นมันเป็นปริศนามาตั้งนานแล้ว แต่เหตุการณ์ที่ผ่านมาทำให้เราได้เบาะแสบางอย่างค่ะ"
34020-112 = "ตอนนั้นพวกอาเรียสบุกเข้ามาทางสุสานใต้ดินที่อยู่ในวิหารปันบุญโบราณ"
34020-113 = "เท่ากับว่าที่ผ่านมาเส้นทางลักลอบเข้าของพวกนักเรียนอาเรียสเชื่อมอยู่กับสุสานใต้ดินค่ะ ส่วนตำแหน่งยิงขีปนาวุธร่อนก็อยู่ในเขตซากปรักหักพังของทรีนิตี้"
34020-114 = "ซากปรักหักพังใต้ดินในเขตปกครองตนเองทรีนิตี้มีอยู่เยอะมากเลยไม่ใช่เหรอคะ? ไม่น่าจะหาเจอทั้งหมดแล้วครอบครองพื้นที่ได้นะ..."
34020-115 = "แถมขนาดของสุสานใต้ดินยังเป็นความลับที่ไม่เคยถูกเปิดเผย... การหาเขตปกครองตนเองอาเรียส ด้วยพลังของเราเองคงเป็นเรื่องที่ยากมากๆ ค่ะ"
34020-116 = "อืม..."
34020-117 = "คุณเซอาเคยบอกไว้ว่าเขตปกครองตนเองนั้นได้รับการปกป้องจากพลังบางอย่างที่ไม่อาจเข้าใจได้ค่ะ"
34020-118 = "เพราะถ้าไม่ใช่อย่างนั้น พวกนั้นก็คงไม่สามารถซ่อนตัวเองได้นานขนาดนี้..."
34020-119 = "พลังที่ไม่อาจเข้าใจได้อีกแล้วเหรอคะ..."
34020-120 = "คุณอาซึสะที่เคยสังกัดอาเรียสในอดีตบอกว่าเธอได้รับแผนที่ที่บันทึกทางออกของสุสานใต้ดินในทุก#nครั้งที่ทำภารกิจค่ะ"
34020-124 = "แต่ปัญหาคือเส้นทางในแผนที่มันไม่เหมือนกันสักครั้ง แถมยังมีพวกรหัสลับด้วย... เห็นว่าตัวเธอเองที่#nเป็นผู้ทรยศก็ไม่รู้ทางกลับไปยังเขตปกครองตนเองอาเรียสเหมือนกันค่ะ"
34020-125 = "คุณสอบสวนเด็กคนนั้นไปเหรอคะ...?"
34020-126 = "คะ? อะไรนะคะ?!"
34020-127 = "พวกคุณให้ชิราสึ อาซึสะบอกข้อมูลของอาเรียสเหรอคะ?"
34020-128 = "เด็กคนนั้นชดใช้ให้เรามามากพอแล้วค่ะ! เธอพยายามเพื่อพวกเราจนถึงกับต้องตกเป็นผู้ทรยศของ#nเขตปกครองตนเองที่ตัวเองเคยอยู่เลยนะคะ!"
34020-130 = "สภาพจิตใจของเธออาจจะยังไม่ดีเท่าไรเลยด้วย แล้วทำไมถึงไปเค้นถามข้อมูลของอาเรียสอีก... ทำไมถึงคิดแต่ตัวเองล่ะคะ... ช่างโหดร้ายอะไรแบบนี้...!"
34020-131 = "มะ... ไม่ใช่อย่างนั้นค่ะ! เราไม่ได้ถึงกับสอบสวนนะคะ แค่เป็นสิ่งที่เจ้าตัวพูดออกมาเอง..."

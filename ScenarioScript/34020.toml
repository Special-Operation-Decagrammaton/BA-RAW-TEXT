[translation]
34020-1 = "第2話;不揃いなティーパーティー"
34020-3 = "お越し下さりありがとうございます、先生。しばらくぶりのトリニティ訪問となりますね。"
34020-4 = "[s] \"こんにちはナギサ、みんな。\""
34020-5 = "またお会いしましたね、[USERNAME]先生。先日はお世話になりました。"
34020-6 = "……はじめまして。救護騎士団の団長を務めております、ミネと申します。"
34020-7 = "[s1] \"うん、よろしくね。\"\n[s2] \"なんだか不思議な組み合わせだね。\""
34020-8 = "ふふ……不思議というか、ナギサさんを困らせる組み合わせといいますか。"
34020-9 = "ふふ……不思議というか、ナギサさんを困らせる組み合わせといいますか。"
34020-10 = "私はホストを困らせるつもりはないのですが。"
34020-11 = "信念と誇りを掲げる尊き騎士団の一員として、道を誤った者を正すだけです。"
34020-13 = "たとえそれが、正義実現委員会やティーパーティーの生徒だったとしても。"
34020-14 = "……。"
34020-15 = "……そのお言葉が、すでにナギサさんを困らせているようですが。"
34020-16 = "さて、雑談はそこまでにしましょうか。"
34020-17 = "先生をお呼び立てした理由は、この間のエデン条約以降の顛末と事件の後始末について話し合うため……でしたが。"
34020-18 = "……。"
34020-19 = "……。"
34020-20 = "シスターフッドと救護騎士団のリーダーも出席すると言って聞かず……このような形となってしまいました。"
34020-21 = "……シスターフッドも変わりましたので。今後はこういった席には積極的に参加するつもりです。"
34020-22 = "私も、「騎士団」団長としての責務を果たすべくここにいるだけです。"
34020-23 = "……。"
34020-24 = "[s] \"えっと……つまり、二人はティーパーティーを牽制するために……？\""
34020-25 = "いえ、純粋に興味があるだけです。"
34020-26 = "私は、そのような政治的なことはよく分かりません。"
34020-27 = "エデン条約の騒動はどうにか収まりましたが、事件の事後処理と状況分析は依然として終わっておりません。"
34020-28 = "私たちもこの事件と無関係ではありません……分析の一部はシスターフッドが担当しておりますので。"
34020-29 = "この席は、そういった情報の共有および事後処理について話し合うためのものだと思っていただければ。"
34020-31 = "そういう事です。"
34020-32 = "[s] \"なるほど……。\""
34020-33 = "……。"
34020-34 = "何故ティーパーティーではなく私たちが？という疑問については、私がお答えします。"
34020-35 = "今、ティーパーティーには外部の助けが必要です。"
34020-36 = "……。"
34020-37 = "エデン条約の前後に、ティーパーティーの一員がホストを攻撃する事件が起こり、その結果、監獄に入れられるという前代未聞の事態となりました。"
34020-38 = "まさか、セイア様を攻撃するよう命じたのがミカ様だったなんて……。"
34020-39 = "……。"
34020-40 = "……。"
34020-41 = "セイア様の治療に当たったのは周知の通り、私です。そのため、私も自分なりにこの事件を調べてまいりました。"
34020-42 = "ミカ様は結果的にアリウスに利用された形ではありますが……だからといってご本人の罪が消えるわけではありません。"
34020-43 = "そして、現ホストであるナギサ様は「シャーレ」という超法規的組織を利用し、無辜の生徒を退学に追い込もうとしました。"
34020-44 = "……。"
34020-45 = "被害を受けた生徒たちに謝罪し、およそ丸く収まったとは聞いておりますが……。"
34020-46 = "それでも、ナギサ様の行為がなかったことになるわけではありません。"
34020-47 = "……。"
34020-48 = "セイア様は幸い学園に復帰することはできましたが……以前より体調が悪化してしまい、自室から出られない体となっております。"
34020-49 = "そのため、現在の不安定な「ティーパーティー」には外部の手助けが必要だというのが私の判断です。"
34020-51 = "なるほど。"
34020-52 = "……丁寧なご説明ありがとうございます、ミネ団長。"
34020-57 = "[ns] （き、気まずい……。）"
34020-58 = "ミネ団長はトリニティで最も古い歴史を誇る部活のリーダーであり、ヨハネ分派の首長。"
34020-59 = "本来ならティーパーティーに参加する権利を有しております……今までは、自ら救護活動を遂行するためにそれを断っておりましたが。"
34020-60 = "過去の話です。"
34020-61 = "……この事件を紐解くと、全てアリウス分校に集約されます。"
34020-63 = "エデン条約会談場の襲撃、その実行犯であり黒幕だったのがアリウス分校でした。"
34020-66 = "マコト議長もミカさんも、アリウスの手によって踊らされただけとも言えます……。"
34020-68 = "マコト議長は、トリニティの分派であるアリウスが自分たちを攻撃したのだから、自分はむしろ被害者だと、私たちにすべての責任があると主張しております。"
34020-69 = "そのため、焼けてしまった髪の毛を切るための美容室費用も私たちに請求する――と、わけのわからない事を……まあ、これは置いておくとして。"
34020-71 = "アリウスが背後で糸を引いていたのなら……いくつかの疑問が残ります。"
34020-72 = "一つ。アリウス分校はなぜエデン条約を妨害したのか。"
34020-73 = "アリウス分校は長い間、我がトリニティとゲヘナの両方を憎んできたと聞き及んでいます。一度に両学園の要員を無力化させる絶好の機会だったのでしょう。"
34020-74 = "さらに、エデン条約という「契約」を利用して不可解な兵力を手に入れていた……セイアさんはそう説明していました。"
34020-75 = "はい。「ユスティナ聖徒会」の姿をした幽霊たち。それらがそのままトリニティやゲヘナを襲撃していたら――両学園は為す術もなく崩壊したはずです。"
34020-76 = "……。"
34020-77 = "一体あれは何だったのですか？"
34020-78 = "それについてはいくつかの仮説がありますが……それを裏づける証拠を発見できていない状況です。"
34020-79 = "聖徒会は本来シスターフッドの前身だった集団。サクラコさん、この部分について何か我々に隠していることはありませんか？"
34020-80 = "……いいえ、残念ながら。"
34020-81 = "シスターフッドは元来秘密が多い集団です。情報の統制や秘匿、歪曲にも長けています。"
34020-86 = "学園の中に、シスターフッドに対して不審を抱いている生徒がたくさんいる事はご存知でしょうか？"
34020-92 = "……たとえば、あなたのように？"
34020-93 = "……。"
34020-94 = "……。"
34020-95 = "[s] （き、気まずい……。）"
34020-99 = "……私がシスターフッドのすべての秘密を知っていると思っていらっしゃるのであれば、それは見込み違いですよ。"
34020-100 = "シスターフッドには、私すら知らない秘匿されたものが多く存在します――詳しく申し上げることはできませんが。"
34020-101 = "……そうですか、失礼しました。"
34020-102 = "はぁ……。"
34020-103 = "トリニティの防護システムを無力化させたあの巡航ミサイル……そちらの分析はどうなっていますか？"
34020-104 = "分析を進めておりますが、今のところ出所も構造も不明……キヴォトスに存在する技術ではないという事だけが分かっております……。"
34020-105 = "……アリウス分校は、未知の力を最低二つは確保しているということですね。"
34020-106 = "はい。そして、それは二つ目の疑問に続きます。"
34020-107 = "二つ目。アリウス分校は何を計画しているのか。"
34020-108 = "……。"
34020-109 = "……これについて、私たちは何も分かっていません。"
34020-110 = "何よりも――私たちはアリウス自治区がどこにあるのかも知りません。"
34020-111 = "……以前からそれは謎のままでしたが、この事件をきっかけにいくつかの糸口を得ることができました。"
34020-112 = "彼女たちはあの時、通功の古聖堂の地下にあるカタコンベから潜入しておりました。"
34020-113 = "これまでの彼女たちの潜入ルートも、すべてカタコンベと関連している事が分かっております。巡航ミサイルの発射位置も、トリニティ内にある遺跡地区でした。"
34020-114 = "トリニティ自治区に存在する地下遺跡はかなりの数があります。それをすべて調査し、統制することは不可能です。"
34020-115 = "つけ加えるなら、カタコンベはいまだにその規模が明らかにされていない迷宮……そこから自力でアリウス自治区を見つける事も大変難しいでしょう。"
34020-116 = "ふむ……。"
34020-117 = "セイアさん曰く、あの自治区は私たちが理解できない『とある力』で保護されているとのことです。"
34020-118 = "そうでもなければ、今まで隠れ果せている事の説明ができない、と……。"
34020-119 = "また理解できない力の話ですか……。"
34020-120 = "かつてアリウス所属だったアズサさんの話では、任務の度にカタコンベの出口が記録された地図を渡されていたそうです。"
34020-124 = "地図の経路は毎回変わり、さらに暗号化まで施されているとのこと……裏切り者である自分はもう、アリウス自治区に戻る道を知らないと……。"
34020-125 = "……その少女を、取り調べたのですか？"
34020-126 = "えっ？"
34020-127 = "[ruby=しらす]白洲[/ruby]アズサさん……あの子にアリウスの情報を吐かせたんですか？"
34020-128 = "彼女はもう十分な代償を払っています！自分がいた自治区から裏切り者の烙印を押され、それでも私たちのために頑張ってくれました！"
34020-130 = "やっと心の平穏を取り戻したであろう子に、私たちの事情に巻き込んで、アリウスの情報を問い詰めるなんて……なんて残酷な……！"
34020-131 = "あ、いえ！取り調べたとかではなく、あくまで本人が語ってくれたことで……。"
34020-133 = "あの少女が果たしてそのような気持ちになるのでしょうか！ティーパーティーの権力を利用して、か弱い少女に無体を働いたに違いありません……！！"
34020-134 = "えっ！？ええっ！？"
34020-135 = "落ち着いてくださいミネ団長。そのような事実はありません。"
34020-136 = "……違うのですか？"
34020-137 = "はい。ナギサさんが血も涙もない残酷な方なのは確かですが、今回は違います。アズサさんは無礼な待遇を受けてなどいません。"
34020-141 = "何より、「補習授業部」はシャーレの先生が担任している部活。そんなことがあったら先生が黙っていなかったでしょう。"
34020-142 = "……そうですね。"
34020-143 = "失礼しました、ナギサ様。"
34020-144 = "……。"
34020-145 = "[s3] （ナギサのティーカップが震えてる……）\n[s4] \"だ、大丈夫？ナギサ？\""
34020-146 = "……はい、私も知っています。"
34020-147 = "……はい、私も知っています。"
34020-148 = "ヒフミさん……ハナコさん、コハルさん、アズサさん……。"
34020-149 = "補習授業部の方々は、本来負うべき責任よりずっと多くのことを背負いました……。"
34020-150 = "彼女たちが背負ってしまったものの中には私が原因のものもあったでしょう……。"
34020-151 = "それに関して私にも負うべき責と、後悔があります……。"
34020-152 = "そのため、エデン条約以降のこのような場に、あの子たちが関与しないように努力をしております……。"
34020-153 = "こんな泥仕合は私たちの役目でなければ……あの子たちにこんな経験をさせてはならないのです……。"
34020-154 = "[s] \"ナギサ……\""
34020-155 = "……そうですね、ナギサ様。ご無礼をお許しください。"
34020-156 = "……同感です。"
34020-157 = "私も、気持ちとしてはハナコさんに役目を渡したいと思っておりますが……"
34020-158 = "私と交わした契約は終わっていますし……彼女にこれ以上負わせてはいけないと思ってもいます。"
34020-159 = "私たちだけで残った問題を解決すること……それが我々にできる最低限の礼儀なのでしょう。"
34020-160 = "ですが、先生は私たちと最後まで一緒に行動してくださると信じています。"
34020-161 = "[s] \"うん、もちろん。\""
34020-162 = "……ありがとうございます先生。"
34020-164 = "カタコンベは、全体図さえ判明していない巨大な迷路……毎回変わる入口を探すだなんて、それはたしかに難問ですね。"
34020-165 = "発想を逆転しましょう……通路を把握している人に話を聞くのはどうでしょうか。"
34020-166 = "通路を把握している人……?"
34020-169 = "襲撃を主導した「アリウススクワッド」のリーダー、[ruby=じょうまえ]錠前[/ruby]サオリ。彼女は確実に通路を熟知しているはずです。"
34020-170 = "……なるほど。襲撃を指揮していた彼女なら……。"
34020-171 = "ですが、「スクワッド」の消息は判明しておりません……。すでに自治区に逃げている可能性が高いです。"
34020-172 = "「スクワッド」以外にも一人、通路を熟知している生徒がいるのではありませんか？"
34020-173 = "……。"
34020-174 = "ええと……？どなたの事でしょうか……。"
34020-179 = "[ruby=みその]聖園[/ruby]ミカ。"
34020-180 = "……っ！？"
34020-182 = "そ、そんな事は……ミカさん本人もアリウス自治区の位置だけは知らないと仰って……。"
34020-183 = "……彼女は長い間アリウスと内通してきました。それなのにアリウスの位置を知らないという言葉を信じるのですか？"
34020-184 = "……。"
34020-185 = "……たしか、ミカ様はアリウス生徒に補給品を手渡した記録が残っています。"
34020-186 = "クーデターを起こすため、アリウスの支援を得るために……そう考えるのが自然でしょう。"
34020-187 = "ですが……ミカさんは……。"
34020-188 = "これまでのミカ様の評判と行動はあまり模範的とは言えません。"
34020-189 = "ナギサ様はよくご存知だと思いますが……ミカ様はティーパーティーに所属している事を盾に、多くの過失や問題を誤魔化してきました。"
34020-190 = "今現在、学園で発生しているミカ様に対しての糾弾と騒動――こういった世論もまた、彼女のこれまでの振る舞いと無関係とはいえません。"
34020-191 = "[s] （……騒動？）"
34020-192 = "ミカさんが……嘘をついた、ということですか……#nアリウス自治区を隠すような……一体、何を……。"
34020-193 = "……。"
34020-194 = "ナギサ様がミカ様を思う気持ちはよく理解しております。"
34020-195 = "その上で、不躾なお話ではございますが――ミカ様の一番の理解者は誰かという議論になった場合、幼馴染であるナギサ様になるのではないでしょうか。"
34020-196 = "……。"
34020-201 = "ナギサ様から見て、ミカ様はまだ私たちに隠している事があるように感じますか？"
34020-205 = "それは……。"
34020-206 = "[s] （ナギサ……）"
34020-210 = "……いえ、私はミカさんを信じます。"
34020-211 = "……。"
34020-212 = "……。"
34020-213 = "たしかに……ミカさんは善良な生徒とは言えませんが……。"
34020-214 = "それでも私はミカさんを信じます――それが、今回悟った教訓ですから。"
34020-215 = "他の方にも信じていただけるよう、明日の聴聞会に出席してミカさんを弁護いたしましょう。"
34020-216 = "あなた方に――必要ならば、この学園全体にミカさんの証言を信じていただけるように！"
34020-217 = "たとえそれで私が糾弾されることになったとしても……私は……。"
34020-218 = "……いえ、私は仮説を口にしただけで、他意はありません。誤解を招いてしまい、申し訳ございません、ナギサ様。"
34020-219 = "……失礼致しました。非礼をお詫び申し上げます。"
34020-220 = "[s] \"えっと……その……。\""
34020-221 = "……はぁ。"
34020-222 = "そうですね……もう良い時間ですし、そろそろお開きといたしましょうか。"
34020-223 = "本日はお忙しい中、お時間をいただきありがとうございました。"
34020-224 = "……いえ。お会いできてよかったです。ありがとうございました。"
34020-225 = "そして私もこの事態……ミカ様への非難に関しては、とても遺憾に思っています。"
34020-226 = "自分なりの方策を探してみる事にいたします。それでは。"
34020-227 = "はい――それでは、私も大聖堂に戻ります。"
34020-228 = "ええ、お気を付けて。"
34020-233 = "はぁ……。"
34020-234 = "……胃が痛いですね。"
34020-235 = "[s] \"お疲れ様。\""
34020-236 = "……ありがとうございます、先生。何だか情けない姿ばかり見せてしまっておりますね……。"
34020-237 = "[s5] \"さっきの事だけど……ミカに何かあったの？\"\n[s6] \"さっきから何か……。\""
34020-238 = "……ああ。先生の耳にはまだ入っていませんでしたか。"
34020-239 = "……ああ。先生の耳にはまだ入っていませんでしたか。"
34020-240 = "明日の午前に、ミカさんの聴聞会が開かれる予定です。"
34020-241 = "[s] \"聴聞会？\""
34020-242 = "ええ。聴聞会といっても、実際は先日の件に対しての審問に近い……査問会のようなものだと思った方がいいでしょう。"
34020-243 = "これまでにミカさんが犯した罪……特にエデン条約に関する事を中心に議論がされる予定で……。"
34020-247 = "……先生。"
34020-251 = "ミカさんは……きっと、退学になると思います。"
34020-253 = "次回;檻の中のお姫様"

[translation]
10003010-1 = "ตอนที่ 1;ไม่ใช่แบบนี้สักหน่อย...?"
10003010-8 = "(สมาชิกคณะกรรมการวินัยทุกคนมารวมตัวกันที่โรงแรมเพื่อเข้าค่ายฝึกฤดูร้อน)"
10003010-11 = "อย่ามัวแต่ยืนเฉยอยู่สิ! หน่วยกลยุทธ์กับหน่วยข่าวกรอง... ย้ายของทั้งหมดขึ้นไปที่ห้องโรงแรม#nที่ชั้น 5 เร็วเข้า! คราวนี้เราจะใช้ห้องของโรงแรมเป็นห้องปฏิบัติการฝึก!"
10003010-12 = "รีบๆ ขนไปเร็วเข้าสิ! เรามีเวลาไม่มากก่อนจะเริ่มการฝึกนะ!"
10003010-13 = "ค่ะ!!"
10003010-14 = "หน่วยเสบียงช่วยรีบขนเสบียงเข้ามาโดยเร็วเลยนะคะ แล้วก็หน่วยปฐมพยาบาลช่วยจัดเตรียม#nรายการอุปกรณ์การรักษาที่จะใช้ในการฝึกครั้งนี้..."
10003010-15 = "ค่ะ... ถ้าเป็นอุปกรณ์ที่จะใช้ในการฝึกล่ะก็ช่วยยกไปด้านนั้นด้วยค่ะ"
10003010-16 = "รับทราบค่ะ!"
10003010-20 = "[ns] \"ทุกคนเหมือนเคยชินกันเลยนะ\""
10003010-21 = "หืม? ก็แหงอยู่แล้วสิ พวกเธอเป็นสมาชิกคณะกรรมการวินัยนี่นา ถ้าไม่มีความสามารถระดับนี้ล่ะก็#nคงรักษาความสงบของเกเฮนน่าไว้ไม่ได้หรอก"
10003010-22 = "เราฝึกซ้อมแบบนี้เป็นประจำจนเคยชินแล้วล่ะค่ะ ถึงจะไม่ได้ซ้อมทุกเดือนก็เถอะ"
10003010-23 = "คือ... ฉันรู้สึกว่าการฝึกครั้งนี้อาจแตกต่างไปจากครั้งก่อนๆ นิดหน่อยนะคะ"
10003010-27 = "ทุกคนอยู่ที่นี่เองเหรอคะ ห้องปฏิบัติการฝึกชั่วคราวติดตั้งพร้อมแล้วค่ะ ขึ้นไปที่ห้องกันเถอะค่ะ"
10003010-29 = "ห้องควบคุมปฏิบัติการฝึกภาคฤดูร้อน"
10003010-30 = "การเตรียมการฝึกซ้อมไปถึงไหนแล้วคะ?"
10003010-31 = "ก็ไม่มีปัญหาอะไร ฉันสั่งให้คนอื่นๆ ที่จัดการงานเสร็จแล้วให้กลับไปพักผ่อนที่ที่พักแล้วล่ะ"
10003010-32 = "ค่ะ ส่วนหน่วยปฐมพยาบาลเองก็จัดเตรียมอุปกรณ์เสร็จเรียบร้อยแล้วค่ะ"
10003010-33 = "งั้นเหรอคะ ทุกอย่างเป็นไปได้สวยเลย ยอดเยี่ยมมากค่ะ "
10003010-34 = "ถ้างั้นฉันขอสรุปสถานการณ์เลยนะคะ ตอนนี้เราได้พาสมาชิกคณะกรรมการวินัยทั้งหมด 100 คน#nมาเข้าค่ายฝึกที่ชายหาดอาราบะค่ะ"
10003010-35 = "[s] \"มีเหตุผลพิเศษอะไรรึเปล่าถึงเลือกที่นี่น่ะ?\""
10003010-36 = "แน่นอนค่ะ ชายหาดอาราบะเป็นหนึ่งในสถานที่ที่เงียบสงบที่สุดในเขตเกเฮนน่าเลยค่ะ"
10003010-37 = "จำนวนอุบัติเหตุที่เกิดขึ้นในปีที่ผ่านมามีจำนวนน้อยกว่า 100 ครั้งค่ะ ส่วนใหญ่ก็เป็นเรื่องเล็กๆ น้อยๆ#nที่เกิดจากพวกอันธพาล อย่างเช่น การกินแล้วชิ่ง หรือทำเสียงดังก่อความรำคาญ หรือการก่อสร้าง#nอาคารที่ชายหาดโดยไม่ได้รับอนุญาตค่ะ"
10003010-38 = "[s] \"ฟังดูวุ่นวายนะ...\""
10003010-39 = "ถ้าเทียบกับเรื่องอื่นๆ ในเขตเกเฮนน่า เรื่องแค่นั้นนับเป็นเรื่องเล็กน้อยไปเลยล่ะ"
10003010-40 = "ถ้าเป็นที่ที่เงียบสงบแบบนี้ ฉันคิดว่าเหมาะกับแผนของเรามากเลยนะคะ โดยรวมแล้วดูเหมือนเรามา#nเข้าค่ายฝึกภาคฤดูร้อนก็จริง แต่ทุกคนห้ามลืมเป้าหมายหลักของเรานะคะ"
10003010-41 = "นั่นก็คือ... เราจะให้ท่านประธานได้พักผ่อนสบายๆ ที่ชายหาดที่เงียบสงบแห่งนี้ค่ะ!"
10003010-42 = "สำหรับสมาชิกคนอื่นๆ ฉันจะเป็นคนดูแลการฝึกให้พวกเธอเองค่ะ"
10003010-43 = "ค่ะ... แบบนั้นก็ได้"
10003010-44 = "เข้าใจแล้วล่ะอาโกะจัง"
10003010-45 = "ขอนอกเรื่องสักนิดนะคะ... ว่าแต่อิโอริ ชุดนั้นมันอะไรกันน่ะคะ! ชุดว่ายน้ำ?#nคิดเรื่องเที่ยวเล่นตั้งแต่มาถึงเลยเหรอคะเนี่ย?!"
10003010-46 = "หืม...?"
10003010-47 = "[s1] \"ครูลืมไปแล้วล่ะว่าเมื่อกี้นี้จะพูดอะไร...\"\n[s2] \"ชุดว่ายน้ำดูดีเหมาะมากเลยนะ อิโอริ\""
10003010-48 = "...?!"
10003010-49 = "...?!"
10003010-50 = "มะ...ไม่ใช่สักหน่อย! ฉันใส่ชุดนี้เพราะเรามาฝึกกันที่ชายหาดต่างหากเล่า ละ...เลยต้องหาชุดเหมาะๆ ไง"
10003010-51 = "ถะ...ถ้าไม่ใส่ชุดที่เหมาะกับการมาเที่ยวทะเล พวกอันธพาลอาจสังเกตเห็นเข้าก็ได้...!"
10003010-52 = "[s] \"ครูคิดว่ายังไงอิโอริก็ดึงดูดสายตาคนอยู่แล้วนะ...\""
10003010-53 = "เลิกเถียงกันได้แล้วค่ะ!! เราไม่ได้มาที่นี่เพื่อให้ทุกคนได้เที่ยวเล่นกันนะคะ!"
10003010-54 = "ก็ฉันบอกแล้วไงว่าไม่ได้ใส่ชุดนี้มาเที่ยวเล่นน่ะ! อาโกะจัง?!"
10003010-55 = "ทั้งหมดนี่ก็เพื่อให้ท่านประธานฮินะได้พักผ่อนบ้าง และพวกเราทุกคนก็ต้องร่วมมือกันเพื่อการนั้น ส่วนเรื่องอื่นๆ นอกเหนือจากนี้ไม่จำเป็นค่ะ!"
10003010-56 = "เพราะงั้นทุกคนจะต้องร่วมมือกันเป็นฟันเฟืองเพื่อให้แผนการนี้สำเร็จนะคะ!"
10003010-57 = "รู้แล้วล่ะ... ไม่ต้องพูดถึงขนาดนั้นก็ได้..."
10003010-58 = "(คิดแล้วเชียวว่าจะต้องเป็นแบบนี้ ฉันไม่ได้เตรียมชุดว่ายน้ำมาด้วยซ้ำ...)"
10003010-60 = "เข้าใจชัดแล้วใช่ไหมคะ? ห้ามให้เกิดปัญหาอะไรที่นี่ขึ้นเด็ดขาด และห้ามให้หัวหน้ารู้ด้วยนะคะ!"
10003010-61 = "[s] \"ว่าแต่ตอนนี้ฮินะอยู่ไหนล่ะ?\""
10003010-62 = "อ๊ะ ถ้าเป็นตอนนี้ ท่านประธานคงจะใช้เวลาพักผ่อนอยู่ในห้องต่อไปอีก 4 ชั่วโมงค่ะ"
10003010-63 = "หืม? 4 ชั่วโมงเหรอ?"
10003010-64 = "ใช่แล้วค่ะ หลังจากการฝึกกลยุทธ์ช่วงบ่ายเสร็จแล้ว ก่อนรับประทานอาหารเย็นจะมีการฝึกซ้อม#nวิ่งของสมาชิกคนอื่นๆ ฉันคิดว่าจะเชิญให้ท่านประธานลงมาตอนนั้นค่ะ"
10003010-65 = "แต่ว่านี่เป็นแค่การฝึกซ้อมเล็กๆ น้อยๆ เท่านั้นค่ะ จุดประสงค์ที่แท้จริงของการฝึกวิ่งก็คือเพื่อให้#nท่านประธานได้มาเดินเล่นที่ชายหาดค่ะ"
10003010-66 = "ประธานจะยอมงั้นเหรอ...?"
10003010-67 = "ฉันโน้มน้าวให้หัวหน้าเชื่อได้แล้วค่ะว่าการเดินเล่นก็คือการฝึกชนิดหนึ่ง! เพราะงั้นก่อนที่หัวหน้า#nจะลงมา เราตรวจตราชายหาดให้เรียบร้อยแล้วฝึกให้เสร็จกันเร็วๆ เถอะค่ะ!"
10003010-68 = "อะ...อืม เรื่องนั้นมันจะง่ายอย่างที่พูดรึเปล่านะ..."
10003010-69 = "คือว่าเจ้าหน้าที่อาวุโสคะ ฉันมีเรื่องอยากจะถามค่ะ "
10003010-70 = "คะ? เรื่องอะไรเหรอคะ?"
10003010-71 = "ระหว่างทางที่มาที่นี่ ฉันรู้สึกว่าชายหาดมันเงียบมากค่ะ... เงียบจนรู้สึกแปลกๆ "
10003010-72 = "ยิ่งกว่านั้นระหว่างที่เราเตรียมการฝึกอยู่ ฉันได้เตรียมพร้อมสำหรับรับเรื่องร้องเรียนจากทางโรงแรม#nและแขกที่มาพักเอาไว้แล้ว แต่ว่ากลับไม่มีเรื่องร้องเรียนเลย ไม่คิดว่ามันแปลกๆ เหรอคะ...?"
10003010-73 = "แค่เรื่องบังเอิญรึเปล่า? อาจเป็นวันโชคดีของพวกเราก็ได้ พวกเราอาจได้มีช่วงเวลาว่างๆ บ้างก็ได้นะ"
10003010-74 = "เฮ้อ อิโอริ พูดแบบนั้นเดี๋ยวก็เกิดโชคร้ายขึ้นหรอกค่ะ"
10003010-75 = "ว่าแต่ว่า..."
10003010-78 = "หืม? จู่ๆ ก็มีคนโทรมา..."
10003010-81 = "สวัสดีค่ะ เจ้าหน้าที่อาวุโส อาโกะค่ะ มีอะไรให้ช่วยรึเปล่าคะ?"
10003010-82 = "เจ้าหน้าที่อาวุโสคะ พวกเราออกมาที่ตลาดใกล้ๆ โรงแรมเพื่อซื้อเสบียง...#nแต่ว่าไม่มีร้านไหนเปิดเลยค่ะ จะให้ทำยังไงดีคะ?"
10003010-83 = "คะ...? ได้ยังไงกัน..."
10003010-86 = "สวัสดีครับ ผมเป็นผู้จัดการของโรงแรมนี้ครับ ผมขอรบกวนเวลาสักครู่ได้ไหมครับ?"
10003010-87 = "เอ่อ... ค่ะ มีเรื่องอะไรเหรอคะ?"
10003010-91 = "อ่า... ผมนึกว่าทางพนักงานต้อนรับเข้าใจผิดซะอีก คณะกรรมการวินัยของเกเฮนน่ามาที่นี่จริงๆ ด้วย!"
10003010-92 = "พูดอะไรน่ะ?"
10003010-93 = "รู้สึกแปลกๆ ชอบกลนะคะ"
10003010-94 = "อะไรนะครับ? พวกคุณไม่ได้มาที่นี่ตามคำขอของผมหรอกเหรอครับ?"
10003010-95 = "[s] \"เอ่อ... พูดถึงเรื่องอะไรน่ะ?\""
10003010-96 = "เฮ้อ... ตอนนี้ที่นี่น่ะวุ่นวายมากเลยนะครับ พวกแก๊งหมวกกันน็อกจากเขตแออัด#nกับพวกกลุ่มแยงกี้สาวที่เพิ่งโผล่มา ต่อสู้กันวุ่นวายใหญ่เลยล่ะ!"
10003010-97 = "ในตอนแรกก็แค่ต่อสู้กันนิดๆ หน่อยๆ แต่พอนานเข้าก็ต่อสู้กันรุนแรงขึ้นเรื่อยๆ#nและตอนนี้พวกเธอก็กำลังจะทำสงครามเพื่อตัดสินกันว่าที่นี่เป็นเขตของใครน่ะครับ!"
10003010-98 = "ทำสงครามงั้นเหรอ...?"
10003010-99 = "เรื่องนี้แพร่กระจายไปทั่วอินเทอร์เน็ต และตอนนี้ก็เริ่มมีคนวางเดิมพันกันแล้วว่าใครจะเป็นฝ่ายชนะ...!#nทำให้พวกคนขายของที่เปิดร้านอยู่ในแถบนี้ต่างก็ปิดร้านหนีกันไปหมดแล้วครับ!"
10003010-100 = "ถ้าปล่อยเอาไว้แบบนี้คงไม่จบแค่การต่อสู้ธรรมดาแน่ แต่โรงแรมของเรา และร้านค้าในแถบนี้#nคงจะต้องพังพินาศแน่นอนครับ!"
10003010-101 = "ทั้งที่เราเพิ่งจะเริ่มลงมือพัฒนาออนเซ็นเพิ่มแท้ๆ...!"
10003010-102 = "แต่ว่าตอนนี้พวกคุณมาที่นี่ ทำให้พวกเรามีความหวังอีกครั้ง...! ขอร้องล่ะครับ!#nช่วยหยุดสงครามครั้งใหญ่ที่กำลังจะเกิดขึ้นในอีก 4 ชั่วโมงนี้ด้วยเถอะครับ!"
10003010-110 = "สงครามครั้งใหญ่...?!"
10003010-111 = "[s3] \"อืม คือว่าเรื่องนั้น...\"\n[s4] \"อิโอรินำโชคร้ายมาจริงๆ เหรอเนี่ย?\""
10003010-112 = "ไม่ยุติธรรมเลย! จะหาว่าเป็นเพราะฉันพูดเรื่องนั้นขึ้นมางั้นเหรอ?!"
10003010-113 = "ไม่ยุติธรรมเลย! จะหาว่าเป็นเพราะฉันพูดเรื่องนั้นขึ้นมางั้นเหรอ?!"
10003010-114 = "ดะ...เดี๋ยวก่อนสิ หมายความว่ายังไงกันคะ?!"
10003010-115 = "อาโกะจัง ที่นี่น่ะ... เธอบอกว่าเป็นชายหาดที่เงียบสงบที่สุดในเกเฮนน่าไม่ใช่รึไง?!"
10003010-116 = "ทำไมถึงถามฉันแบบนั้นล่ะคะ?!"
10003010-117 = "ฉันเพิ่งตรวจสอบข้อมูลในอินเทอร์เน็ตมา... สิ่งที่คุณผู้จัดการพูดคือเรื่องจริงค่ะ"
10003010-118 = "ในบอร์ดเกเฮนน่ามีกระทู้ยอดฮิตเกี่ยวกับสงครามใหญ่เต็มรูปแบบที่จะเกิดขึ้นในอีก 4 ชั่วโมงด้วยค่ะ"
10003010-120 = "<GehEricha0201>: พวกเขาประกาศว่าวันนี้ไม่ใช่เหรอ?"
10003010-121 = "<#Nyanko&>: การต่อสู้ชิงอำนาจระหว่างแก๊งหมวกกันน็อกกับแยงกี้สาวที่ชายหาดน่ะเหรอ?"
10003010-122 = "<akusi-girl>: ถือเป็นอีเวนต์ใหญ่ที่สุดของงานเทศกาลฤดูร้อนเลยรึเปล่า? 555"
10003010-123 = "<EATorDIEOfficial>: โอ้ววว นี่อาจเป็นโอกาสครั้งใหม่ก็ได้..."
10003010-124 = "และคอมเม้นต์อื่นๆ อีกเยอะมากมายค่ะ เรื่องนี้กลายเป็นประเด็นยอดฮิตในทุกที่แล้วค่ะ"
10003010-125 = "เอ๋?!"
10003010-128 = "อ๊ะ?! ท่านประธานติดต่อมา?!"
10003010-131 = "นี่ อาโกะ... ฉันว่าตารางการฝึกมันแปลกๆ นะ? ให้รออยู่ในห้องโดยไม่ทำอะไรตั้ง 4 ชั่วโมงเนี่ย?#nฉันไม่เข้าใจเลย เอาเป็นว่ารีบมาที่ห้องฉันด้วยแล้วกัน"
10003010-134 = "ทำไมท่านประธานต้องเรียกฉันไปหาตอนนี้ด้วยเนี่ย?!"
10003010-135 = "ก็แหงอยู่แล้วล่ะ ทั้งที่มาฝึกแท้ๆ แต่ดันจัดตารางให้พักอยู่ในห้องตั้งสี่ชั่วโมงทันทีที่มาถึง#nเป็นใครก็คงต้องสงสัยอยู่แล้ว..."
10003010-138 = "อ๊าาาา! จริงๆ เลย! ใครโทรมาอีกแล้วเนี่ย?!"
10003010-139 = "หืม? พวกแพนเดโมเนียม โซไซตี้งั้นเหรอ?!"
10003010-142 = "เจ้าหน้าที่อาวุโสอาโกะ? ฉันได้อ่านเอกสารขออนุมัติการชำระเงินที่คุณส่งมาคราวก่อนแล้วนะคะ แต่พอดีในเอกสารระบุข้อมูลผิดพลาดนิดหน่อยค่ะ รบกวนช่วยมาแก้เอกสารหน่อยนะคะ"
10003010-143 = "อะไรนะคะ?! ดะ...เดี๋ยวสิ ตอนนี้เลยเหรอคะ?!"
10003010-146 = "อ่า..."
10003010-152 = "เจ้าหน้าที่อาโกะ... มีรายงานด่วนค่ะ!"
10003010-153 = "ตอนนี้ที่ชายหาดมีกลุ่มแยงกี้สาวนิรนามกับแก๊งหมวกกันน็อกเริ่มการปะทะกันแล้วค่ะ#nขอคำสั่งตอบโต้ด้วยค่ะ!"
10003010-159 = "ก๊ากกก! ตั้งแต่นี้ไปที่นี่คือชายหาดของพวกเรา! ไม่จำเป็นต้องรอถึงสี่ชั่วโมงหรอก! เอ้า!#nถล่มพวกแก๊งหมวกกันน็อกให้วิ่งแจ้นกลับบ้านกันไปเล๊ยยย!"
10003010-160 = "กล้าดียังไงถึงมาปากแจ๋วแบบนี้! คิดว่าพวกเราจะยอมให้เด็กปากแจ๋วแบบพวกเธอเข้ามายุ่มย่าม#nในเขตของเรางั้นเรอะ! "
10003010-166 = "กะ...กะ...เกิดอะไรขึ้น..."
10003010-167 = "อาโกะ ตอนนี้เธออยู่ไหนน่ะ? เมื่อกี้เหมือนได้ยินเสียงปืนจากข้างนอกนะ#nหรือว่าเปลี่ยนตารางการฝึกแล้วงั้นเหรอ?"
10003010-168 = "ทะ...ทำยังไงดีล่ะ อาโกะจัง?!"
10003010-169 = "เรื่องชักจะแย่ลงทุกทีแล้วนะคะ... เจ้าหน้าที่อาวุโส เราต้องตอบโต้..."
10003010-175 = "ฮึ่ก...!"
10003010-177 = "เฮ้อ... เฮ้อ..."
10003010-178 = "เอาล่ะ! ทุกอย่างต้องเรียบร้อยค่ะ"
10003010-179 = "[ns] \"อาโกะ...?\""
10003010-180 = "เป็นไงก็เป็นกันค่ะ! คิดว่าฉันจะก้าวข้ามอุปสรรคแค่นี้ไม่ได้งั้นเหรอคะ?!"
10003010-181 = "ก่อนอื่นก็คุณครูคะ! รบกวนช่วยไปพบท่านประธานแล้วเกลี้ยกล่อมว่าทุกอย่างจะไม่เป็นไรค่ะ! ช่วยบอกว่าแผนการฝึกซ้อมเป็นไปตามกำหนดและตอนนี้ราบรื่นดีไม่มีปัญหาอะไรเลยด้วยนะคะ!"
10003010-182 = "แต่ว่าถ้าท่านประธานถามอะไรละก็ คุณครูช่วยบอกว่ายังไม่มีงานที่ท่านประธานต้องลงมือ#nจัดการเองด้วยแล้วกันนะคะ!"
10003010-183 = "สิ่งสำคัญคือต้องไม่ให้... ต้องไม่ให้... ท่านประธานออกมาจากห้องเด็ดขาดเลยนะคะ! เข้าใจรึเปล่าคะ?!"
10003010-184 = "[s] \"ขะ...เข้าใจแล้ว\""
10003010-185 = "ส่วนอิโอริ ชินัตสึ ทั้งสองคนพาสมาชิกคณะกรรมการวินัยไปช่วยกันแก้ปัญหาที่เกิดขึ้น#nที่ชายหาดด้วยนะคะ"
10003010-186 = "อะ...อื้ม!"
10003010-187 = "เข้าใจแล้วค่ะ"
10003010-188 = "ส่วนฉัน... จะกลับไปที่โรงเรียนค่ะ! หลังจากจัดการเรื่องน่ารำคาญกับพวกแพนเดโมเนียม โซไซตี้เสร็จแล้วจะรีบกลับมาค่ะ! ถึงจะเกิดเหตุการณ์วุ่นวายขึ้น แต่เป้าหมายหนึ่งเดียวของเรา...!"
10003010-189 = "นั่นก็คือให้ท่านประธาน..."
10003010-190 = "ได้ใช้วันหยุดพักผ่อนอย่างผ่อนคลายค่ะ!"
10003010-191 = "[s] \"โอ้ว...รับทราบ!\""

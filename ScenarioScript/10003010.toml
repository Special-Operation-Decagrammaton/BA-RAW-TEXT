[translation]
10003010-1 = "Episode 1;This Isn't It...?"
10003010-8 = "The Prefect Team members gathered at the hotel for boot camp."
10003010-11 = "Keep moving! Mission and Intelligence Committees, move everything to the fifth floor! That's where we'll set up our control room!"
10003010-12 = "Move quick! We don't have much time until we start training!"
10003010-13 = "Yes, ma'am!"
10003010-14 = "Could the Logistics Committee hurry with the supplies? Also, the Medical Committee should organize the list—"
10003010-15 = "We'll need that immediately. Place it in the training area over there."
10003010-16 = "Understood!"
10003010-20 = "[ns] \"They look like they're used to taking orders.\""
10003010-21 = "Of course. They're part of the Prefect Team. How can they expect to protect the morality of Gehenna if they don't know how to follow orders?"
10003010-22 = "We hold regular training drills like this, though not quite every month."
10003010-23 = "This one feels much different than the others, however..."
10003010-27 = "There you all are. The temporary control room is ready now. Let's all gather there."
10003010-29 = "Summer Camp Control Room"
10003010-30 = "How are the preparations going?"
10003010-31 = "So far so good. The members who finished their work are resting in their rooms."
10003010-32 = "The Medical Committee is just wrapping up its preparations as well."
10003010-33 = "Then everything is going smoothly. Very good."
10003010-34 = "To summarize, we've brought 100 Prefect Team members total to Araba Beach for training."
10003010-35 = "[s] \"Is there a specific reason why you chose this place?\""
10003010-36 = "Yes. This is Araba Beach, one of the quietest places within Gehenna's district."
10003010-37 = "Less than 100 crimes have been reported in the last year, and even those were minor: a dine-and-dash at the Beach Shack, noise disruption, construction without authorization, etcetera."
10003010-38 = "[s] \"Sounds noisy to me.\""
10003010-39 = "Please. This is child's play compared to what happens within the rest of the district."
10003010-40 = "At any rate, I wanted somewhere quiet to hold our training camp. Let's not forget the real reason here."
10003010-41 = "We're to give our president a vacation, of course!"
10003010-42 = "As for the other members, I should be able to handle their training just fine by myself."
10003010-43 = "I suppose so."
10003010-44 = "If you insist, Ako."
10003010-45 = "Why the reluctance, Iori? Better yet, why are you already in a swimsuit? I hope you weren't planning to ignore your duties on this trip."
10003010-46 = "Huh?"
10003010-47 = "[s1] \"I had been meaning to say something.\"\n[s2] \"It looks really good on you, Iori.\""
10003010-48 = "...?!"
10003010-49 = "...?!"
10003010-50 = "I-I'm only wearing this because our training is being held on the beach. I was trying to dress appropriately!"
10003010-51 = "If I dressed in uniform, then I'd stand out compared to regular beachgoers. That could draw unwanted attention from troublemakers."
10003010-52 = "[s] \"I think you're going to attract plenty of attention regardless.\""
10003010-53 = "That's enough small talk! We're not here so that either of YOU can have a vacation!"
10003010-54 = "I told you that's not why I'm wearing this, Ako!"
10003010-55 = "All of this is for Hina's sake, and we're merely to help make sure that she can rest and enjoy herself! You don't need to worry about anything beyond that!"
10003010-56 = "So just be a good little spoke on the wheel and allow our president to rest, okay?"
10003010-57 = "Okay, okay. You made your point..."
10003010-58 = "(I had a feeling this is how things would go. That's why I didn't even bother packing a swimsuit.)"
10003010-60 = "Do I make myself clear? Not a single peep of trouble will make it to the head prefect's ears!"
10003010-61 = "[s] \"Speaking of which, where is Hina, anyway?\""
10003010-62 = "She's in her hotel room enjoying a four-hour break of rest and relaxation."
10003010-63 = "Four whole hours?"
10003010-64 = "Yes. In the meantime, the rest of our members will go through tactical training followed by a light run. I was thinking of calling her down by then."
10003010-65 = "However, that will only be a formality. The real purpose is for her to have a light stroll on the beach."
10003010-66 = "And she's going along with that?"
10003010-67 = "I managed to convince her that walking is training too. We have to make sure the beach is ready before then. I want it so clean that you can eat off of it."
10003010-68 = "We can try, but I don't think it's going to be easy."
10003010-69 = "I have a question, Senior Administrator."
10003010-70 = "Yes? What is is it, Chinatsu?"
10003010-71 = "It's about the beach. It's quiet—too quiet."
10003010-72 = "We were prepared to take requests from the hotel or the other guests, but there's been nothing of the sort. Would you know why?"
10003010-73 = "Isn't it just a coincidence? I can't think of any reason other than pure luck that there have been no incidents since we arrived."
10003010-74 = "Maybe, but please don't jinx it."
10003010-75 = "You brought it up..."
10003010-78 = "Oh? That would be for me."
10003010-81 = "Yes, this is Ako. How can I help you?"
10003010-82 = "Senior Administrator, we're at the marketplace near the hotel to buy supplies, but all the stores are closed. What would you like us to do?"
10003010-83 = "Closed? Are you sure you're not mistaken?"
10003010-86 = "Excuse me. This is the hotel manager. May I come in for a moment?"
10003010-87 = "Yes, it's open. What's going on?"
10003010-91 = "Ah, I thought the front desk must have been mistaken, but you really are Gehenna Academy's Prefect Team!"
10003010-92 = "Yes, and? What does it matter?"
10003010-93 = "I don't like where this is going."
10003010-94 = "Are you all not here in response to our request for help...?"
10003010-95 = "[s] \"I'm lost. Can we start over from the beginning?\""
10003010-96 = "*sigh* Things are ultra hectic around here. That Helmet Gang from the slums and beach thugs that appeared out of nowhere are at war with one another!"
10003010-97 = "At first it was just mild skirmishes, but the fight is getting more and more serious. Now they're waging all-out war to decide whose turf this is!"
10003010-98 = "An all-out war...?"
10003010-99 = "Word has been spreading about it online, and now people are placing bets over who will win! The local merchants have closed down their shops and run away in fear!"
10003010-100 = "If this keeps up, they'll destroy more than just each other. They'll ruin everything in the neighborhood, including the hotel and local businesses!"
10003010-101 = "Right after we just completed our renovations and added a hot spring too..."
10003010-102 = "But hope is not lost! Now that the Prefect Team is here, you'll stop the all-out war that's going to begin in four hours, right?!"
10003010-110 = "FOUR HOURS?!"
10003010-111 = "[s3] \"What a coincidence.\"\n[s4] \"Way to jinx it, Iori.\""
10003010-112 = "You had better not be implying that it's MY fault!"
10003010-113 = "You had better not be implying that it's MY fault!"
10003010-114 = "H-Hold on just a minute. You're saying a large scale conflict is going to begin today?!"
10003010-115 = "What's the big idea, Ako?! I thought you said this was the quietest beach in all of Gehenna?!"
10003010-116 = "That's what all of the data said!"
10003010-117 = "She's correct. I just verified it for myself."
10003010-118 = "I can also confirm the manager's claims. Social media expects a large-scale battle to break out here with the next four hours."
10003010-120 = "GehEricha0201: Didn't they say it was today?"
10003010-121 = "#Nyanko&: that battle between the helmet gangsters and those thugs???"
10003010-122 = "akusi-girl: I've been looking forward to it all summer lol"
10003010-123 = "EATorDIEOfficial: This might be a good opportunity for us as well."
10003010-124 = "As well as several other similar comments. Things have already gotten out of hand online."
10003010-125 = "You can't be serious!"
10003010-128 = "Oh, no. That must be the president."
10003010-131 = "Ako. Something is bothering me about the camp schedule. Why am I booked to stay in my room for the next four hours? There's something I'd like to discuss, so come right away."
10003010-134 = "She had to call me now of all times?!"
10003010-135 = "We came here to train and then you made her stay in her room for the first four hours. Of course she'd find it suspicious."
10003010-138 = "Not again! Who is it this time?!"
10003010-139 = "The Pandemonium Society?!"
10003010-142 = "Is this Senior Administrator Ako? We found a few mistakes in the documents you sent to us. We'd like you to meet with us to clear things up."
10003010-143 = "Now? Can it not wait?!"
10003010-146 = "Oh, no..."
10003010-152 = "Urgent matter to report, Senior Administrator Ako!"
10003010-153 = "An unknown group of thugs and a small group of helmet gangsters have started a fight on the beach. We need an immediate response!"
10003010-159 = "Starting today, this is our turf! What's the point of waiting another four hours?! Let's kick those helmet losers to the curb NOW!"
10003010-160 = "You should know your place! Do you think we'll just let some beach bums take over our turf?! "
10003010-166 = "Wh-What's going on...?"
10003010-167 = "Where are you, Ako? Also, I could hear gunfire outside just now. Were the training plans moved up?"
10003010-168 = "A-Ako, what do we do?"
10003010-169 = "Things have gone from bad to worse. What are your orders, Senior Administrator?"
10003010-175 = "Fine!"
10003010-177 = "*inhale*... *exhale*..."
10003010-178 = "Everything will be fine."
10003010-179 = "[ns] \"Ako?\""
10003010-180 = "Bring it on! Do you think I can't overcome a few challenges?!"
10003010-181 = "First! Sensei, I want you to go to Hina and tell her everything is all right. Tell her the training is going smoothly."
10003010-182 = "If she asks questions, just tell her that she wasn't assigned any tasks just yet."
10003010-183 = "And above all, under no circumstances can the president leave her room. Am I understood?!"
10003010-184 = "[s] \"G-Got it.\""
10003010-185 = "Iori, Chinatsu. Take our members to the beach and break up the fighting."
10003010-186 = "R-Roger!"
10003010-187 = "Got it."
10003010-188 = "I have no choice but to return to campus for now and meet with those pests from the Pandemonium Society. We're in a tough spot, but don't forget our highest objective."
10003010-189 = "No matter the cost, we must..."
10003010-190 = "...ensure that Hina takes a vacation!"
10003010-191 = "[s] \"Y-Yes, ma'am!\""

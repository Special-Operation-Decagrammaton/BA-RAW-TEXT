10003010-6 = "#zmc;move;0,444;1896;10"
10003010-7 = "#zmc;move;0,0;1896;1500\n#wait;2000"
10003010-8 = "#zmc;instant;0,0;1896\n#na;(그렇게 선도부원들은 합숙 훈련을 위해 호텔에 모여들었다.)"
10003010-9 = "#zmc;move;0,0;1896;10"
10003010-10 = "#zmc;move;0,0;3160;300\n#wait;300"
10003010-11 = "#na;이오리 수영복ND;멀뚱히들 있지만 말고! 작전부와 정보부는 기자재를 호텔방 5층으로 옮겨! 이번 훈련의 지휘통제실은 그쪽에 만들 예정이니까!"
10003010-12 = "#na;이오리 수영복ND;빨랑빨랑 움직이라고! 훈련 시작까지 얼마 안남았으니까!"
10003010-13 = "#na;선도부원들;넵!!\n#fontsize;100"
10003010-14 = "#na;치나츠;보급부는 보급 물자의 반입을 서둘러주세요. 그리고 의료부는 이번 훈련에서 사용될 의약품의 물품리스트부터 정리를-"
10003010-15 = "#na;치나츠;……네, 당장 훈련에 사용할 물건이라면 저쪽으로 옮겨주세요."
10003010-16 = "#na;선도부원들;알겠습니다!\n#fontsize;100"
10003010-17 = "#wait;200"
10003010-18 = "#wait;1000"
10003010-19 = "#all;hide"
10003010-20 = "[ns] \"다들 어째 익숙한 거 같네.\""
10003010-21 = "3;이오리 수영복ND;02;응? 그야 당연하지. 선도부원이잖아. 이 정도도 하지 않으면, 게헨나의 풍기는 못 지킨다구.\n#3;em;[반응]\n#3;a"
10003010-22 = "5;치나츠;02;매달까지는 아니더라도, 이런 식으로 정기적으로 하는 훈련에는 익숙해져 있으니까요.\n#5;a\n#3;m1"
10003010-23 = "5;치나츠;06;뭐……. 이번 훈련은 다른 때와는 조금 다른 느낌이지만요.\n#5;em;…"
10003010-24 = "#st;[0,0];instant;1;"
10003010-25 = "#clearST\n3;이오리 수영복ND;02\n5;치나츠;06\n#3;d\n#5;d\n#wait;1000"
10003010-26 = "#wait;2500"
10003010-27 = "3;아코;07;여러분, 여기 계셨나요. 임시 지휘통제실의 설치가 끝났답니다. 그쪽에 모이도록 하죠.\n#3;a\n#3;em;[음표]"
10003010-28 = "#all;hide"
10003010-29 = "#place;하계 합숙 훈련 지휘통제실"
10003010-30 = "3;아코;01;훈련 준비는 어떻게 되어가나요?\n#3;a\n#3;em;[반응]"
10003010-31 = "5;이오리 수영복ND;02;문제없이 진행되고 있어. 우선적으로 준비가 끝난 선도부원들은 숙소에서 대기하도록 시켰고.\n#5;al"
10003010-32 = "1;치나츠;01;네, 의료부도 물건은 전부 옮겼어요.\n#1;ar"
10003010-33 = "3;아코;08;그렇군요. 준비에 차질은 없다. 좋았어요. 체크했습니다.\n#3;em;[반짝]\n#3;greeting"
10003010-34 = "3;아코;01;그럼 상황을 정리할게요. 현재 저희는 선도부원 100명을 동원해 이곳 아라바 해변으로 훈련을 왔습니다."
10003010-35 = "[s] \"특별히 여기를 선택한 이유가 있어?\""
10003010-36 = "5;이오리 수영복ND;02\n1;치나츠;01\n3;아코;01;네. 이곳 아라바 해변은 게헨나 내에서도 무척이나 조용한 장소.\n#1;d\n#5;d"
10003010-37 = "#1;hide\n#5;hide\n3;아코;99;지난 1년간 발생한 사고 건수도 100건 이하. 문제아들이 주로 저지른 범죄라고 해봐야, 바다의 집 무전취식, 해변가에서의 고성방가. 해변 무허가 건축물 건설 정도였던가요?\n#3;em;…"
10003010-38 = "[s] \"이미 충분히 시끄러운 거 아냐……?\""
10003010-39 = "3;이오리 수영복ND;05;게헨나에선 저런 건 어린아이 장난 수준이야.\n#3;em;[반응]"
10003010-40 = "3;아코;99;뭐, 이렇게 조용한 곳이라면 마침 이번 저희 계획에 딱 맞겠다 싶었죠. 표면적으로는 하계 합숙 훈련이지만, 저희의 본 목적을 잊어선 안 됩니다.\n#3;greeting"
10003010-41 = "3;아코;09;바로……. 이런 조용한 장소에서 부장님을 쉬게 하는 것이라는 걸!\n#3;em;[!]"
10003010-42 = "3;아코;07;선도부의 훈련도 어디까지나 부장님 없이, 저희끼리만, 제 지시로만 이루어지면 충분합니다.\n#3;em;[반짝]"
10003010-43 = "1;치나츠;06;네…… 뭐어.\n#1;a"
10003010-44 = "5;이오리 수영복ND;06;알았다고, 아코 쨩.\n#5;a\n#5;em;[땀]"
10003010-45 = "3;아코;10;……하고 말하고 있는 중입니다만, 정작 이오리의 그 차림은 뭔가요! 수영복? 벌써부터 놀 생각으로 가득인 건가요?!\n#3;em;[빠직]\n#3;m2\n#1;dl"
10003010-46 = "#1;hide\n5;이오리 수영복ND;04;응……?\n#5;em;[?]"
10003010-47 = "[s1] \"그러고 보니 아까부터 말하는 걸 깜빡했는데.\"\n[s2] \"무척 멋진 수영복이네. 이오리.\""
10003010-48 = "5;이오리 수영복ND;09;……?!\n#5;em;[///]\n#5;stiff"
10003010-49 = "5;이오리 수영복ND;09;……?!\n#5;em;[///]\n#5;stiff"
10003010-50 = "5;이오리 수영복ND;05;아, 아니거든?! 이건 어디까지나 이번 훈련이 여름 해변에서 벌어지는 거니까. 거기에 맞추려고…….\n#5;m3\n#5;hophop\n#3;dl"
10003010-51 = "#3;hide\n5;이오리 수영복ND;08;그, 여름 바다에 어울리는 모습이 아니면, 오히려 문제아들이 경계한달까……!\n#5;em;…"
10003010-52 = "[s] \"이오리라면 어느 쪽이든 눈길을 끌 거라고 생각하지만…….\""
10003010-53 = "1;아코;05;거기 잡담은 스토오옵!! 중요한 건 여러분의 여름 휴가가 아니에요!\n#1;ar\n#1;em;[반응]\n#5;m5"
10003010-54 = "5;이오리 수영복ND;05;그러니까 그런 생각 안했다구?! 아코 쨩?!\n#5;hophop\n#5;em;[!]"
10003010-55 = "1;아코;05;어디까지나 히나 부장님의 안식과 휴식을 위해. 여러분은 그걸 성립시키기 위한 장기말일 뿐! 이번 계획에서는 의지도, 말도, 아무것도 필요 없어요!\n#1;m2"
10003010-56 = "#1;hide\n2;아코;10;그야말로 부장님을 위한 톱니바퀴로서 기능해주면 됩니다!\n#2;m3\n#2;em;[반응]"
10003010-57 = "5;이오리 수영복ND;06;……아니, 그렇게까지 말할 건 없잖아…….\n#5;stiff\n#5;em;[속상함]"
10003010-58 = "1;치나츠;06;(뭐, 처음부터 그럴 줄 알고, 전 수영복도 준비를 안했지만요.)\n#1;a\n#1;em;[땀]"
10003010-59 = "#all;hide"
10003010-60 = "3;아코;05;아시겠지요? 여기선 조금의 분란도, 조금의 소음도, 조금의 문제도 허용하지 않겠어요!\n#3;em;[!]\n#3;closeup"
10003010-61 = "[s] \"그런데 정작 히나는?\""
10003010-62 = "3;아코;02;아, 부장님이라면 현재 숙소에서 앞으로 4시간 동안의 자유시간을 가지실 예정이예요.\n#3;em;[반응]"
10003010-63 = "3;이오리 수영복ND;02;응? 4시간?"
10003010-64 = "3;아코;01;네, 오후 전술훈련이 끝난 뒤, 저녁식사를 하기 전에 가볍게 선도부의 구보 훈련이 일정에 들어가 있습니다. 부장님은 그때만 호출하기로 했어요."
10003010-65 = "3;아코;03;다만 이는 어디까지나 명목상의 훈련. 구보 훈련의 진짜 목적은 부장님의 휴식을 위한 해변가 산책이랍니다.\n#3;em;[반짝]"
10003010-66 = "5;이오리 수영복ND;02;……부장이 그런 걸로 납득을 해?\n#5;al"
10003010-67 = "3;아코;07;산책도 훈련의 일종이라고 주장해두었으니까요! 그러니 그때가 오기 전까지 얼른 해변을 정리하고, 훈련도 빠르게 후딱 마쳐 두도록 하죠!\n#3;greeting\n#3;em;[음표]"
10003010-68 = "5;이오리 수영복ND;04;으으음……. 그게 말처럼 쉬울까……."
10003010-69 = "1;치나츠;02;그보다 선임행정관, 한 가지 의문이.\n#1;ar\n#1;em;[반응]"
10003010-70 = "3;아코;02;네? 무슨 일이죠?"
10003010-71 = "1;치나츠;01;여기 오는 사이, 조금 이상할 정도로 해변이 조용했습니다."
10003010-72 = "1;치나츠;05;더구나 훈련 준비를 하면서 호텔 측이나, 손님 측으로부터 몇 가지 클레임을 받을 각오도 했습니다만, 어째선지 그런 경우가 한 번도 없던 것이 이상하달까…….\n#1;em;…"
10003010-73 = "5;이오리 수영복ND;01;에이, 그냥 때가 안 맞았던 거 아냐? 우연히 손이 한가한 날 찾았던 거지. 우리가 운이 좋았던 거라고."
10003010-74 = "1;치나츠;06;하아, 이오리. 쓸데없는 말은 화를 불러들인다구요?\n#1;em;[땀]"
10003010-75 = "5;이오리 수영복ND;02;그래도……."
10003010-76 = "#st;[0,0];instant;1;"
10003010-77 = "#clearST\n#wait;3000"
10003010-78 = "3;아코;01;응? 갑자기 연락이……."
10003010-79 = "#st;[0,0];instant;1;"
10003010-80 = "#clearST\n3;아코;01\n#3;greeting\n#wait;1500"
10003010-81 = "3;아코;01;네, 선임행정관 아코 받았습니다. 무슨 일인가요?"
10003010-82 = "#na;선도부원;선임행정관, 보충물자의 구입을 위해 현재 호텔근처의 시장으로 나왔지만. 문을 연 곳이 하나도 없습니다. 어떻게 대응할까요?"
10003010-83 = "3;아코;02;……네? 그게 무슨…….\n#3;em;[?]"
10003010-84 = "#st;[0,0];instant;1;"
10003010-85 = "#clearST\n#wait;1500"
10003010-86 = "#na;호텔 지배인;안녕하십니까? 당 호텔의 지배인입니다. 잠시 들어가도 괜찮겠습니까?"
10003010-87 = "1;치나츠;02;……네. 무슨 일이시죠?\n#1;m3\n#1;em;[?]\n#3;dr\n#5;dr"
10003010-88 = "#st;[0,0];instant;1;"
10003010-89 = "#clearST\n#3;hide\n#5;hide\n1;치나츠;02\n#1;d\n#wait;1500"
10003010-90 = "#all;hide"
10003010-91 = "3;호텔 지배인;08;아아……. 프런트에서 전해 들었을 땐 귀를 의심했지만, 정말로 와주셨군요! 게헨나의 선도부 여러분!\n#3;em;[반짝]\n#3;hophop\n#3;a"
10003010-92 = "5;이오리 수영복ND;04;무슨 소리야?\n#5;al\n#3;m1\n#5;em;[?]"
10003010-93 = "5;치나츠;06;……뭔가 싸한 느낌이 드는데요.\n#5;em;[땀]"
10003010-94 = "3;호텔 지배인;04;네? 여러분께서는 제 도움 요청을 듣고 여기까지 찾아와 주신 거 아니십니까?"
10003010-95 = "[s] \"저기, 그게 무슨 뜻인지?\""
10003010-96 = "3;호텔 지배인;09;아이고! 지금 이 근처가 난리도 아닙니다! 원래부터 슬럼가를 차지하고 있던 헬멧단과 근래 들어 갑자기 나타난 불량배들이 정면으로 충돌하더니!\n#3;em;[속상함]\n#3;stiff"
10003010-97 = "3;호텔 지배인;07;그 갈등의 골이 깊어지다 못해, 결국 4시간 뒤에 누가 이 해변가와 슬럼가의 진정한 주인인지 전면전으로 그 자웅을 겨루겠다지 뭡니까!\n#3;hophop"
10003010-98 = "5;이오리 수영복ND;09;전면전이라고……?\n#5;em;[?]"
10003010-99 = "3;호텔 지배인;06;그게 인터넷에서 난리가 나서, 여기저기서 구경을 온다느니, 누가 이길지 내기를 한다느니 소란이 나서는……! 그걸 들은 이 부근의 상인들이 전부 가게를 닫고 도망가버렸습니다요!\n#3;hophop\n#3;m3\n#5;dr\n#3;em;[반응]"
10003010-100 = "3;호텔 지배인;06;이대로 가다간 단순히 싸움만 붙고 끝나는 게 아니라, 저희 호텔이고, 이 근처의 상권이고 그냥 싸그리 망하게 생겼습니다요!"
10003010-101 = "3;호텔 지배인;10;모처럼 새롭게 단장하기 위해, 온천 개발도 시작한 참인데!!\n#3;em;[땀]"
10003010-102 = "3;호텔 지배인;08;하지만 바로 이때 기다렸다는 듯이 방문해주신 선도부 여러분이라니! 제발 부탁드립니다! 4시간 뒤의 대규모 전면전을 막아주십쇼!\n#3;closeup\n#3;em;[!]"

[translation]
10003010-1 = "第1話;一波未平一波又起"
10003010-8 = "（風紀委員們為了集訓聚集在飯店）"
10003010-11 = "喂，別發呆！企劃部和情報部把那裡的器材搬到飯店5樓！#n這次訓練的作戰指揮室將會設置在那裡！"
10003010-12 = "動起來動起來！再慢吞吞的話訓練就要開始了！"
10003010-13 = "是！！"
10003010-14 = "後勤部優先處理那邊的物資。醫療部先整理好訓練用的清單──"
10003010-15 = "──怎麼了？啊啊，這是馬上要用的東西，放到那邊去吧。"
10003010-16 = "知道了！"
10003010-20 = "[ns]「大家似乎都很習慣了呢。」"
10003010-21 = "那是當然的，畢竟是格黑娜的風紀委員啊。#n如果連這點小事都做不好，就無法維護格黑娜的紀律了。"
10003010-22 = "雖然不到每個月都有，但還是會定期進行訓練。"
10003010-23 = "不過這次的訓練形式比較特殊就是了……"
10003010-27 = "啊啊，你們在這裡啊。#n臨時指揮室已經設置完畢，我們就在那裡集合吧。"
10003010-29 = "夏季集訓用指揮室"
10003010-30 = "準備得如何？"
10003010-31 = "沒問題。待準備完畢後，會讓他們先休息一下。"
10003010-32 = "醫療部這裡也差不多搬完了。"
10003010-33 = "那就沒什麼問題了，太好了。"
10003010-34 = "那麼來整理一下情況吧。#n我們目前動員了共100名風紀委員來到阿拉巴海岸進行訓練。"
10003010-35 = "[s]「我在來的路上也看出來了，這裡感覺是很不錯的地方呢？」"
10003010-36 = "是的，這個「阿拉巴海岸」即使在格黑娜內，也是以幽靜而聞名的地方。"
10003010-37 = "過去1年發生的事故數量不到100件。唯一在最近發生的，也不過是在海之家吃霸王餐、爆音演唱會，以及未經允許在海邊蓋建築物……僅此而已。"
10003010-38 = "[s]「這樣就已經算幽靜了嗎……？」"
10003010-39 = "對格黑娜來說，這些不過是小孩子的惡作劇罷了。"
10003010-40 = "總之真慶幸是個平靜的地方。#n畢竟雖然表面上是夏季集訓，也不能忘了我們的真正目的。"
10003010-41 = "也就是說……越是安靜的地方，越能讓陽奈委員長好好休息！"
10003010-42 = "只要不出什麼亂子，風紀委員會的訓練由我一人指揮就夠了。"
10003010-43 = "嘛……是這樣沒錯。"
10003010-44 = "我知道了，亞子醬。"
10003010-45 = "雖然話才說到一半……我說伊織？#n為什麼已經穿上泳裝了？什麼意思，已經迫不及待想玩了嗎！？"
10003010-46 = "咦，不……這個……！"
10003010-47 = "[s1]「這麼說來，我一直忘了說。」\n[s2]「泳裝很適合你喔，伊織。」"
10003010-48 = "……！！！？"
10003010-49 = "……！！！？"
10003010-50 = "不，不是啦！這只是因為這次的訓練在海邊進行，所以想說配合一下……！"
10003010-51 = "那個，如果在海邊呈現不自然的樣子，反而會引起問題兒童們的戒心……！"
10003010-52 = "[s]「我覺得伊織不管怎樣都相當引人注目喔。」"
10003010-53 = "兩位快樂的閒聊先到此為止！#n我能理解想盡情玩的心情，但這次的重點不是諸位的暑假！"
10003010-54 = "都說了不是那樣的，亞子醬！？"
10003010-55 = "此行的目的是讓陽奈委員長休息！#n請各位把自己當成實現目標的棋子！在這次的計畫中，不需要各位的意志和意見！"
10003010-56 = "這個夏天，請竭盡全力，成為幫助委員長休息的齒輪！"
10003010-57 = "有，有必要說到這種程度嗎……？"
10003010-58 = "（嘛，我早預料到會是這種情況，所以沒有帶泳裝來……）"
10003010-60 = "我們要讓會使委員長煩惱的事歸零！任何噪音、問題都不能傳進陽奈委員長的耳裡！"
10003010-61 = "[s]「話說回來，當事人陽奈呢？」"
10003010-62 = "委員長的話，已經在飯店內了。之後，會在房間內待4個小時……我是這麼傳達的。"
10003010-63 = "4個小時……？"
10003010-64 = "是的，再過4個小時正好是下午戰術訓練結束的時間，接下來就會開始步行訓練。#n到時候會再呼叫委員長。"
10003010-65 = "不過，這個「步行訓練」也只是名義上而已。#n真正的目的是讓委員長在海邊悠閒地散步！"
10003010-66 = "委員長會這樣理解嗎……？"
10003010-67 = "我已經先用強勢的態度主張「走路也是一種訓練」了！#n所以趕緊完成戰術訓練，盡快去打掃和整理海灘吧……！"
10003010-68 = "能順利進行就好了……"
10003010-69 = "對了，行政官，我有一個問題。"
10003010-70 = "是，怎麼了？"
10003010-71 = "我總覺得這附近有點太安靜了……？"
10003010-72 = "在來這裡的路上和準備訓練的時候，都沒有遇到任何人……"
10003010-73 = "這不是很好嗎？只是時機點的問題吧，又不是發生了什麼事件。"
10003010-74 = "伊織，知道什麼是「禍從口出」嗎……？"
10003010-75 = "嗯？我是知道那是什麼意思啦……"
10003010-78 = "哎呀……"
10003010-81 = "是，我是亞子。怎麼了嗎？"
10003010-82 = "啊，行政官。其實我為了籌措集訓用的物資，在飯店附近轉了一圈，#n卻沒有任何一間店家在營業……這該怎麼辦？"
10003010-83 = "……啊？這是為何──"
10003010-86 = "打擾一下。我是本飯店的經理。現在有時間嗎？"
10003010-87 = "……是，請說。發生了什麼事嗎？"
10003010-91 = "哦哦……我在櫃檯聽到的時候簡直不敢相信自己的耳朵……#n沒想到你們真的來了，格黑娜風紀委員會的各位！"
10003010-92 = "……啊？什麼意思？"
10003010-93 = "總覺得有種不好的預感……"
10003010-94 = "那個……？各位是聽到我求助才來這裡的吧？"
10003010-95 = "[s]「好像有什麼誤會……能從頭解釋一下嗎？」"
10003010-96 = "這裡現在情況很危急！#n原本占據貧民區的頭盔團和最近突然出現的太妹正在發生衝突……！"
10003010-97 = "起初只是小衝突，但後來越演越烈……#n他們說將在約4小時後決定將由誰來控制這個地區！"
10003010-98 = "咦……？"
10003010-99 = "事情已經在網路上引起軒然大波，來看熱鬧的人從四面八方湧入，#n還在下注誰輸誰贏……而聽到傳言的當地店家則通通關門逃命去了！"
10003010-100 = "要是連圍觀者也被捲入，引起騷動的話該怎麼辦……！"
10003010-101 = "嗚，好不容易才重新裝潢了一番，並開發溫泉的說……！"
10003010-102 = "然而老天爺沒有拋棄我們……！#n風紀委員會的各位居然來了！拜託……請阻止他們的「全面戰爭」吧！"
10003010-110 = "全面戰爭……！！？！？"
10003010-111 = "[s3]「啊，果然……」\n[s4]「禍從口出……」"
10003010-112 = "等等！你們想說這是我的錯嗎！？"
10003010-113 = "等等！你們想說這是我的錯嗎！？"
10003010-114 = "請，請等一下！會發生大規模的爭鬥嗎！？"
10003010-115 = "亞子醬剛才不是說這裡是格黑娜中屈指可數，最平靜的地方嗎……？"
10003010-116 = "這個問題我才想問吧！？"
10003010-117 = "……我在網路上查了一下，剛才說的好像是真的。"
10003010-118 = "已經成為了格黑娜社群網站上的熱門話題。#n「大約4小時後，阿拉巴海岸將發生大規模的全面戰爭」……"
10003010-120 = "＜GehEricha0201：這麼說來，是今天吧？＞"
10003010-121 = "＜#Nyanko&：太妹和頭盔團要在海邊展開一場華麗的勢力爭鬥。＞"
10003010-122 = "＜akusi-girl：今年夏天最盛大的活動！＞"
10003010-123 = "＜EATorDIEOfficial：總覺得看起來很有趣呢？＞"
10003010-124 = "諸如此類。這樣看來，確實有可能演變成大規模的戰鬥……"
10003010-125 = "……！"
10003010-128 = "委，委員長！？"
10003010-131 = "……喂，亞子？集訓的行程表是不是有點奇怪？#n在房間休息待命4個小時？我不太理解。現在來我房間一趟吧。"
10003010-134 = "居然還在這種時候被委員長呼叫！？"
10003010-135 = "不是，才剛來訓練就被馬上告知要在飯店房間內待機4小時，#n不管是誰都會覺得奇怪吧……"
10003010-138 = "啊啊真是的！這種時候又是誰打來！？"
10003010-139 = "[ruby=Pandemonium Society]……萬魔殿！？[/ruby]"
10003010-142 = "喂，是亞子行政官嗎？#n你們前幾天提交的審批文件裡發現了幾個錯誤。能請你立刻來一趟嗎？"
10003010-143 = "什麼！？咦，現在嗎！？"
10003010-146 = "……"
10003010-152 = "亞子行政官，緊急向您報告！"
10003010-153 = "現在有一群身分不明的太妹和頭盔團，正在海邊上發生小規模衝突。需要緊急應對！"
10003010-159 = "嘻哈哈哈哈！這個海岸從今天起就歸我們管了！#n用不著等4個小時了……把他們趕出去！"
10003010-160 = "說什麼鬼話！我們怎麼能把這片海交給你們這些外地人！"
10003010-166 = "這，這是……"
10003010-167 = "亞子，你現在在哪？而且剛才外面傳來了槍聲，訓練計畫有變嗎？"
10003010-168 = "亞子醬，怎麼辦！？"
10003010-169 = "屋漏偏逢連夜雨……行政官，請下指示。"
10003010-175 = "唔……！"
10003010-177 = "深呼吸，深呼吸……"
10003010-178 = "……很好，好極了。"
10003010-179 = "[ns]「亞，亞子……？沒事吧……？」"
10003010-180 = "既然如此，不管是槍還是雨都儘管來吧！#n難道我為了委員長，會連這點考驗都克服不了嗎！"
10003010-181 = "首先，老師！請去陽奈委員長那裡，告訴他沒發生什麼大事！#n訓練正按預定計畫進行中，沒有任何問題！"
10003010-182 = "請告訴他「還不是風紀委員長出場的時候，為了將訓練效果最大化，請先待命」！#n這樣就行了！交給你了！"
10003010-183 = "無論如何，絕對，絕──對！不能讓陽奈委員長離開房間！明白了吧！？"
10003010-184 = "[s]「好，好的！」"
10003010-185 = "伊織、千夏，帶上風紀委員，去平息海邊的小衝突！"
10003010-186 = "知，知道了！"
10003010-187 = "明白了。"
10003010-188 = "而我……只能先返回格黑娜了！#n我會儘快解決那些萬魔殿的煩人精！雖然情況變得複雜，但我們要做的事沒有變！"
10003010-189 = "這一切……"
10003010-190 = "都是為了讓陽奈委員長能安心休息！！！"
10003010-191 = "[s]「了，了解……！」"

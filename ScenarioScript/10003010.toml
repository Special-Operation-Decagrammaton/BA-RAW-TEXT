10003010-108 = "3;아코;04\n#3;a\n#wait;1000"
10003010-109 = "1;치나츠;02\n5;이오리 수영복ND;09\n3;아코;04\n#1;shake\n#5;shake\n#3;shake\n#1;h\n#5;h\n#3;h"

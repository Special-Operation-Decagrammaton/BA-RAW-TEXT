[translation]
2000702-1 = "虛擬歌手的祕密"
2000702-2 = "奇普托斯中央區．外圍小巷"
2000702-3 = "（我依照約定在日落後來了到對方指定的地點）"
2000702-7 = "……恭候多時了。"
2000702-13 = "明明是來歷不明的可疑訊息，"
2000702-14 = "你卻還願意過來，非常感謝。"
2000702-16 = "雖然我也覺得這樣有些失禮，"
2000702-17 = "但因為實在不能讓其他人知道……"
2000702-22 = "[ns] 「啊……」"
2000702-24 = "知道我是誰嗎？"
2000702-25 = "[s1]「你是……初音未來對吧？」\n[s2]「……？」"
2000702-26 = "呵呵，沒錯。"
2000702-27 = "你，你不知道啊……"
2000702-28 = "我是虛擬歌手，初音未來。"
2000702-29 = "是個有著「用歌聲傳達心意」使命的，"
2000702-30 = "歌唱軟體。"
2000702-31 = "[s] 「虛擬歌手……？」"
2000702-32 = "是的。本來我活動的地方是虛擬空間……也就是網路上的虛擬世界。"
2000702-33 = "正因如此，我可以不受時間與空間的限制，將歌聲與其中包含的情感傳遞給很多人……同時卻也難以與人面對面地交流。"
2000702-34 = "即使如此，仍然有各種偶然、美好的相遇以及許多想見我一面的粉絲……"
2000702-35 = "多虧了他們，這次我得以借助奇普托斯工程師們的力量，獲得了能與人進行物理交流的身體。"
2000702-37 = "呵呵，奇普托斯的技術力真是不得了呢。"
2000702-38 = "不僅外表和我在虛擬空間時一模一樣，還讓我體驗到了至今為止從未感受過的，風撫過身體的觸感以及舌尖品嘗甜點的香甜感……"
2000702-39 = "現在的我應該能做出前所未有的LIVE表演！"
2000702-40 = "雖然我是這麼想的……"
2000702-41 = "[s3] 「發生了什麼問題嗎？」\n[s4] 「這之中有著找我來的理由嗎？」"
2000702-42 = "……是的，正是如此。"
2000702-43 = "……是的，正是如此。"
2000702-44 = "我有件事想請問老師……"
2000702-45 = "我預計大約2週後要在奇普托斯的大型Live House進行表演。"
2000702-46 = "因為和以往在虛擬空間的演唱會不同，所以這次我比之前準備得更加努力。"
2000702-47 = "卻在準備過程中發現了一個問題。雖然我還不知道原因……"
2000702-48 = "我變得無法發出聲音了。"
2000702-49 = "[s] 「你現在正在和我說話，所以喉嚨應該沒有問題……？」"
2000702-50 = "啊，準確來說應該是「變得無法唱歌了」才對。"
2000702-51 = "像這樣稍微交談一下或是輕聲哼唱是沒有問題的。但一旦想唱歌時，喉嚨就會像是哽住一樣……"
2000702-52 = "我也問過製作這個身體的工程師們，但他們也覺得很困惑……"
2000702-53 = "後來，我聽到了有關「夏萊的老師」的傳聞。"
2000702-54 = "聽說有一位大人的老師，陸陸續續解決了奇普托斯各式各樣的事件與不可思議的現象……"
2000702-55 = "我想，如果是這位老師的話，說不定能找出某些我想不出來的原因。"
2000702-59 = "[ns] 「唔──嗯……」"
2000702-60 = "果，果然不會這麼順利吧，啊哈哈……"
2000702-61 = "沒，沒關係的。我也不覺得能立刻就找出原因……！"
2000702-62 = "我會再多調查一下的。"
2000702-63 = "謝謝老師百忙之中過來。那麼就……"
2000702-67 = "[ns] 「我也一起想想辦法吧。」"
2000702-68 = "咦……？"
2000702-69 = "那，那真是非常感謝你。不過我既不是奇普托斯的居民，也不是老師的學生……"
2000702-70 = "為何你還是對初次見面的我，如此親切呢……？"
2000702-71 = "[s5]「因為我是大人嘛。」\n[s6]「因為你很困擾，所以想幫助你。」"
2000702-77 = "……呵呵。你果然和傳聞中的一樣，又親切又善良呢。"
2000702-78 = "非常謝謝你。那麼，就承蒙你的好意囉？"
2000702-79 = "我也會用自己的方式去調查的。如果老師願意調查一下是否曾發生類似的情況的話我會很高興的。"
2000702-85 = "那麼接下來就請你多多指教了。老師！"

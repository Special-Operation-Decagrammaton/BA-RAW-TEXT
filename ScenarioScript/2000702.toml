[translation]
2000702-1 = "The Virtual Idol's Secret"
2000702-2 = "Kivotos Hub Back Alley"
2000702-3 = "(I went to the designated place the sender of the suspicious message requested after sunset.)"
2000702-7 = "You're here. I've been waiting for you."
2000702-13 = "I know that message must have aroused suspicions when I chose not to identify myself or clarify why I was reaching out to you."
2000702-14 = "Thank you for trusting in me."
2000702-16 = "I didn't want to do things like this either..."
2000702-17 = "...but I didn't have a choice. I couldn't risk anyone else knowing about this."
2000702-22 = "[ns] \"Wait a minute...\""
2000702-24 = "Do you recognize me?"
2000702-25 = "[s1] \"Hatsune Miku?\"\n[s2] \"Nope. Never seen you before in my life.\""
2000702-26 = "Heehee, I knew you'd recognize me right away."
2000702-27 = "You haven't...?"
2000702-28 = "I'm Hatsune Miku, the virtual idol."
2000702-29 = "I carry the dreams in people's hearts and deliver them in songs for anyone who'll listen."
2000702-30 = "I was designed to be software who could sing for anyone and everyone."
2000702-31 = "[s] \"Right, a 'virtual' idol...\""
2000702-32 = "Yes, I originally only existed in the digital realm and not the real world."
2000702-33 = "It made me happy to sing for so many people than would normally ever be possible, but it's always been difficult for me to meet, interact with, and get to know those people who my voice was reaching."
2000702-34 = "And yet, that never stopped my fans from dreaming of meeting me in person someday..."
2000702-35 = "That's why I borrowed Kivotos' technology to obtain a new body that allows me to interact with people in real life."
2000702-37 = "It's as though I'm experiencing the same old world with a new pair of eyes. Kivotos is truly a miraculous place."
2000702-38 = "I'll finally be able to feel the gentle breeze across my fingertips and taste delectable sweets on my tongue...all while keeping the same appearance I've always had in the virtual world."
2000702-39 = "I'll be able to perform like never before with this body!"
2000702-40 = "Or so I thought..."
2000702-41 = "[s3] \"Did something go wrong?\"\n[s4] \"Is that why you reached out to me?\""
2000702-42 = "You have good instincts."
2000702-43 = "You have good instincts."
2000702-44 = "I chose to contact the famous Sensei from Schale to help me with my next performance."
2000702-45 = "The plan was to book Kivotos' amphitheater in two weeks for the concert."
2000702-46 = "I'm used to performing in the virtual world, but this will be my first time putting on a concert with a physical body. I've been working extra hard to prepare myself."
2000702-47 = "But for some reason, when I arrived in Kivotos, received my new body, and entered reality..."
2000702-48 = "...my voice wouldn't come out all."
2000702-49 = "[s] \"But aren't you talking to me right now?\""
2000702-50 = "Sorry—I should have been more specific. I mean that I couldn't sing."
2000702-51 = "I can still speak normally and even hum a little bit, but for whatever reason, it's like my throat locks up and my voice won't come out anytime I try to sing."
2000702-52 = "The technicians who designed my body said they didn't have a clue why it would happen, and the date of the show is only getting closer..."
2000702-53 = "Then I heard all of the buzz about you and Schale, Sensei."
2000702-54 = "They say that Schale's Sensei has solved all kinds of problems across Kivotos—both big and small."
2000702-55 = "I was hoping you could help figure out why I've lost my ability to sing..."
2000702-59 = "[ns] \"I've never heard of anything like it either.\""
2000702-60 = "So you haven't... Haha. Just my luck."
2000702-61 = "I'll be fine. I just didn't expect to get such a blunt answer right away."
2000702-62 = "Maybe I should be trying to figure this out on my own."
2000702-63 = "Thank you for taking time out of your busy schedule. I'll be going, then."
2000702-67 = "[ns] \"Wait. Let's look for the solution together.\""
2000702-68 = "What? You want to help me?"
2000702-69 = "But I'm not even really from Kivotos, let alone one of your students."
2000702-70 = "We only just met. Why are you being so kind to me?"
2000702-71 = "[s5] \"What kind of adult would I be if I didn't help?\"\n[s6] \"I want to set a good example for the students.\""
2000702-77 = "Heehee. You're just as kind and wonderful as people said."
2000702-78 = "Thank you so much, Sensei. I'll take you up on that offer."
2000702-79 = "Let's both look for a solution. I'll do what I can, so could you find out if something similar has happened to anyone else before?"
2000702-85 = "I'm counting on you, Sensei."

[translation]
2000702-1 = "ความลับของนักร้องเสมือน"
2000702-2 = "ตรอกที่ด้านนอก ส่วนกลางคิโวทอส"
2000702-3 = "(หลังพระอาทิตย์ตกแล้ว คุณครูออกไปยังสถานที่นัดหมายตามที่ผู้ส่งข้อความปริศนาบอกมา)"
2000702-7 = "มาแล้วเหรอคะ ฉันกำลังรออยู่เลยค่ะ"
2000702-13 = "ถึงจะเป็นข้อความจากคนที่น่าสงสัย แถมยังไม่ยอมเปิดเผยจุดประสงค์ที่นัดพบ..."
2000702-14 = "แต่คุณก็ยังเชื่อใจและมาตามนัด ขอบคุณนะคะ"
2000702-16 = "ที่จริงฉันไม่ได้อยากซ่อนตัวแบบนี้หรอกค่ะ"
2000702-17 = "แต่ฉันจะเสี่ยงให้คนอื่นเห็นฉันไม่ได้ค่ะ"
2000702-22 = "[ns] \"เธอคือ...\""
2000702-24 = "รู้จักฉันด้วยเหรอคะ?"
2000702-25 = "[s1] \"ฮัตสึเนะ มิกุ?\"\n[s2] \"ใครน่ะ?\""
2000702-26 = "ฮิฮิ คิดแล้วเชียวว่าคุณจะต้องรู้จักฉัน"
2000702-27 = "ว่าแล้วเชียวว่าต้องไม่รู้จักฉัน..."
2000702-28 = "ฉันคือนักร้องเสมือน ฮัตสึเนะ มิกุค่ะ"
2000702-29 = "ผู้ที่ขับขานเสียงเพลงแห่งจิตใจส่งไปถึงผู้ฟัง..."
2000702-30 = "ฉันเป็นซอร์ฟแวร์ที่ได้รับการออกแบบมาให้ร้องเพลงเพื่อทุกๆ คนค่ะ"
2000702-31 = "[s] \"นักร้องเสมือนเหรอ...?\""
2000702-32 = "ที่จริงฉันมีตัวตนอยู่ในโลกเสมือน ไม่ใช่โลกแห่งความจริงค่ะ"
2000702-33 = "เพราะแบบนั้นฉันเลยร้องเพลงให้ผู้คนมากมายฟังได้โดยไม่มีข้อจำกัดในเรื่องของเวลาและสถานที่ค่ะ#nแต่ก็ทำให้ฉันมีข้อจำกัดในเรื่องการพบปะหรือพูดคุยกับแฟนๆ กันแบบต่อหน้าค่ะ"
2000702-34 = "แต่ถึงจะมีข้อจำกัดพวกนั้นอยู่ แฟนคลับมากมายก็ยังคงตั้งตารอที่จะได้พบกับฉันจริงๆ ในสักวัน..."
2000702-35 = "ดังนั้นฉันเลยขอใช้วิทยาการเทคโนโลยีของคิโวทอสและได้รับร่างกายที่สามารถสื่อสาร#nกับแฟนๆ ในโลกแห่งความจริงนี้มาค่ะ"
2000702-37 = "เป็นความรู้สึกที่แปลกใหม่จริงๆ ค่ะ วิทยาการของคิโวทอสนี่น่าทึ่งสุดๆ เลย"
2000702-38 = "นอกจากรูปร่างที่เหมือนกับตัวฉันตอนที่อยู่ในโลกเสมือนแล้ว ยังสามารถสัมผัสได้ถึงสายลม#nที่พัดผ่านปลายนิ้ว และรสชาติขนมหวานที่ได้ลิ้มลองอีกด้วย..."
2000702-39 = "ถ้ามีร่างกายนี้ละก็... ฉันจะต้องขึ้นแสดงคอนเสิร์ตในรูปแบบที่ไม่เคยทำมาก่อนได้แน่นอนค่ะ!"
2000702-40 = "ฉันคิดแบบนั้นน่ะค่ะ..."
2000702-41 = "[s3] \"การแสดงมีปัญหาอะไรรึเปล่า?\"\n[s4] \"เรียกครูมาก็เพราะเรื่องนั้นใช่มั้ย?\""
2000702-42 = "คุณครูนี่ไหวพริบดีจริงๆ เลยนะคะ..."
2000702-43 = "คุณครูนี่ไหวพริบดีจริงๆ เลยนะคะ..."
2000702-44 = "ค่ะ ฉันติดต่อไปเพราะอยากให้คุณครูของทางชาเล่ต์ช่วยแก้ปัญหาเรื่องคอนเสิร์ตค่ะ"
2000702-45 = "ฉันได้เช่าไลฟ์เฮาส์ขนาดใหญ่ในคิโวทอสเพื่อจัดคอนเสิร์ตในอีกสองสัปดาห์ค่ะ"
2000702-46 = "ที่ผ่านมาถึงฉันเคยจัดคอนเสิร์ตในโลกเสมือนจริงมาแล้วก็ตาม แต่นี่จะเป็นครั้งแรกที่ฉันได้รับ#nร่างกายจริงๆ และจะได้จัดคอนเสิร์ตในโลกนี้ค่ะ ฉันตั้งใจเตรียมพร้อมสำหรับงานแสดงมากๆ#nเลยนะคะ"
2000702-47 = "แต่ว่าพอฉันมาถึงที่คิโวทอสและได้รับร่างกายมาแล้ว จู่ๆ ก็เกิดเรื่องบางอย่างขึ้นค่ะ..."
2000702-48 = "คือ... เสียงของฉันหายไปค่ะ"
2000702-49 = "[s] \"ตอนพูดนี่ก็พูดได้ปกติไม่ใช่เหรอ?\""
2000702-50 = "ไม่ใช่แบบนั้นค่ะ ถ้าให้พูดชัดๆ คือฉันไม่สามารถ \"ร้องเพลง\" ได้ค่ะ"
2000702-51 = "ตอนนี้ถึงจะพูดหรือฮัมเพลงเบาๆ ได้ แต่พอพยายามจะร้องเพลง ฉันกลับเปล่งเสียงออกมาไม่ได้#nเหมือนกับว่าเส้นเสียงในคอมันปิดอยู่เลยค่ะ"
2000702-52 = "ฉันลองไปถามทางวิศวกรหลายๆ คนที่ช่วยสร้างร่างกายให้ฉันแล้ว#nพวกเธอก็ยังหาสาเหตุไม่พบเลยค่ะ และก็ใกล้ถึงกำหนดการแสดงคอนเสิร์ตแล้วด้วย..."
2000702-53 = "และฉันก็บังเอิญได้ยินข่าวลือเกี่ยวกับคุณครูของทางชาเล่ต์ค่ะ"
2000702-54 = "คุณครูเคยพบกับเหตุการณ์แปลกๆ หลายอย่างในคิโวทอสและคลี่คลายปัญหาต่างๆ มาได้#nใช่ไหมล่ะคะ?"
2000702-55 = "เพราะงั้นฉันเลยคิดว่าถ้าเป็นคุณครูอาจจะช่วยหาสาเหตุที่เสียงฉันหายไปแบบนี้ได้น่ะค่ะ..."
2000702-59 = "[ns] \"ครูก็ไม่รู้เหมือนกันนะ...\""
2000702-60 = "อย่างนั้นเหรอคะ ฮิฮิ..."
2000702-61 = "ไม่เป็นไรค่ะ เพราะฉันก็ไม่ได้คาดหวังว่าจะต้องได้รับคำตอบในทันทีอยู่แล้วค่ะ"
2000702-62 = "บางทีฉันอาจจะต้องหาวิธีแก้ไขเอง..."
2000702-63 = "ขอบคุณที่สละเวลามาพบฉันค่ะ ขอตัวก่อนนะคะ..."
2000702-67 = "[ns] \"มาหาวิธีแก้ปัญหาด้วยกันเถอะ\""
2000702-68 = "คะ? คุณครูจะช่วยฉันงั้นเหรอคะ?"
2000702-69 = "แต่ว่าฉันไม่ใช่ทั้งพลเมืองของคิโวทอส หรือนักเรียนที่คุณครูดูแลอยู่เลยนะคะ?"
2000702-70 = "ทั้งที่เพิ่งเจอกันไม่นาน ทำไมถึงได้ใจดีกับฉันขนาดนี้..."
2000702-71 = "[s5] \"ผู้ใหญ่อย่างครูจะไม่สนใจคนที่เดือดร้อนอยู่ได้ยังไง\"\n[s6] \"เพื่อเป็นแบบอย่างให้นักเรียนไงล่ะ\""
2000702-77 = "ฮิฮิ... เป็นคนใจดีเหมือนที่ได้ยินมาจริงๆ เลยนะคะ"
2000702-78 = "ขอบคุณมากค่ะ ถ้าอย่างนั้นคราวนี้ก็ขอรบกวนคุณครูหน่อยนะคะ"
2000702-79 = "ฉันเองก็จะพยายามหาวิธีแก้ปัญหาเองด้วย เพราะงั้นคุณครูช่วยตรวจสอบให้หน่อยนะคะ#nว่าเคยมีปัญหาที่คล้ายๆ กันเกิดขึ้นบ้างรึเปล่า"
2000702-85 = "รบกวนด้วยนะคะคุณครู"

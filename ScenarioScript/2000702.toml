2000702-25 = "[s1] \"하츠네 미쿠?\"\n[s2] \"……누구야?\""
2000702-26 = "3;미쿠;03;후후, 바로 알아보실 줄 알았어요.\n#3;em;[음표]\n#3;hophop"
2000702-27 = "3;미쿠;14;역시 모르시나요…….\n#3;stiff\n#3;em;[땀]"
2000702-28 = "3;미쿠;01;저는 버추얼 싱어, 하츠네 미쿠."
2000702-29 = "3;미쿠;99;사람의 마음을 담아 듣는 이에게 노래를 전달하는 존재이자,"
2000702-30 = "3;미쿠;00;여러분을 위해 노래하는 소프트웨어랍니다.\n#3;em;[반짝]"
2000702-31 = "[s] \"버추얼 싱어……?\""
2000702-32 = "3;미쿠;01;네, 본래 제가 활동하는 곳은 현실 세계가 아닌 가상의 공간이거든요.\n#3;em;[반응]"
2000702-33 = "3;미쿠;00;그렇기 때문에 시간과 공간의 제약 없이 많은 사람들에게 노래를 불러 드릴 수 있었지만, 사람들과 직접 만나 교감하고 얼굴을 마주하는 건 어려웠어요."
2000702-34 = "3;미쿠;99;하지만 현실의 제 모습을 직접 보고 싶어 하는 팬 여러분도 많았던지라……"
2000702-35 = "3;미쿠;00;그래서 이번에는 키보토스의 기술력을 빌려 이렇게 현실에서 교감할 수 있는 새로운 몸을 얻게 되었답니다.\n#3;em;[반짝]\n#3;greeting"
2000702-36 = "3;미쿠;01\n#3;m4\n#wait;1200"
2000702-37 = "3;미쿠;00;새삼 실감하는 것이지만, 키보토스의 기술력은 정말 대단하네요."
2000702-38 = "3;미쿠;99;버추얼 공간에서의 저와 똑같은 모습의 외형은 물론이고, 손끝을 스치는 바람의 촉감과 혀끝에 느껴지는 스위츠의 달콤함도 직접 신체로 느낄 수 있으니……\n#3;em;…"
2000702-39 = "3;미쿠;01;이 몸이라면 분명 지금까지 해보지 못했던 방식의 공연을 해 볼 수 있을 거예요!"
2000702-40 = "3;미쿠;09;분명…… 그럴 거라 생각했었는데…….\n#3;stiff\n#3;em;[땀]"
2000702-41 = "[s3] \"공연에 무슨 문제가 생긴 거야?\"\n[s4] \"그게 오늘 나를 부른 이유지?\""
2000702-42 = "3;미쿠;09;……감이 좋으시네요.\n#3;em;[반응]\n#3;m3"
2000702-43 = "3;미쿠;09;……감이 좋으시네요.\n#3;em;[반응]\n#3;m3"
2000702-44 = "3;미쿠;08;네. 샬레의 선생님께 부탁드리고 싶은 건 공연에 관한 문제입니다."
2000702-45 = "3;미쿠;99;앞으로 2주 뒤, 저는 키보토스의 대형 라이브 하우스를 빌려 공연을 할 계획이었어요.\n#3;em;…"
2000702-46 = "3;미쿠;01;그동안 가상 공간에서 공연을 한 적은 있어도, 신체를 갖고 현실 세계에서 공연을 하는 것은 처음이었던지라. 저 역시도 의욕을 한껏 불태우며 열심히 공연 준비를 했어요."
2000702-47 = "3;미쿠;13;그런데 키보토스에 도착해서, 새로운 몸을 얻어 현실로 나오자마자 갑자기 어찌 된 일인지……\n#3;stiff"
2000702-48 = "3;미쿠;14;목소리가 나오지 않게 되어버렸어요.\n#3;em;[땀]"
2000702-49 = "[s] \"지금은 제대로 나와 이야기하고 있잖아?\""
2000702-50 = "3;미쿠;09;아뇨. 그러니까 정확히 말하자면, '노래'를 부를 수 없게 되었어요.\n#3;em;[반응]"
2000702-51 = "3;미쿠;09;일상적인 대화를 하거나, 가볍게 허밍을 하는 건 가능하지만 노래를 부르려고만 하면 이상하게도 목이 잠겨버린 것처럼 목소리가 나오질 않아요."
2000702-52 = "3;미쿠;07;제 몸을 만들어준 기술자 여러분께 물어보아도 원인을 알지 못하겠다고 하시고, 공연 시간은 계속 다가오기만 하고…….\n#3;em;…"
2000702-53 = "3;미쿠;01;그러던 중 샬레와 선생님에 대한 소문을 듣게 되어서요."
2000702-54 = "3;미쿠;02;샬레의 선생님께서는 키보토스의 온갖 기이한 사건과 현상들을 접하며 여러 가지 문제를 해결해 오셨다지요?\n#3;em;[반응]"
2000702-55 = "3;미쿠;01;그렇다면 제 목소리가 나오지 않는 원인에 대해서도 아시는 게 있지 않을까 싶어서……."

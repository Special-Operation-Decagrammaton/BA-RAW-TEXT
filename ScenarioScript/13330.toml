13330-29 = "ใช่แล้วละ ปืนแม่เหล็กไฟฟ้าคือเหยื่อล่อตั้งแต่เริ่มจนจบ"
13330-30 = "เป้าหมายของกระผมคือความลึกลับขั้นสุดของอะบิดอส ฮอรัสแห่งรุ่งอรุณ"
13330-31 = "กฎโบราณข้อที่ 6 ความจริงที่ไม่มีอยู่จริง คือความจริงหรือไม่? นั่นคือคำตอบของกฎโบราณข้อนั้น"
13330-32 = "สักวันพวกเราก็ต้องตาย นั่นคือความจริงที่แน่นอนที่ถูกกำหนดไว้แล้ว"
13330-33 = "แต่เราไม่รู้สิ่งนั้น เพราะความตายยังไม่เคยมีอยู่จริงสำหรับเรา"
13330-34 = "สิ่งที่เรารับรู้ได้มีเพียงความตายของคนอื่น และด้วยเหตุนั้น เราจึงไม่อาจเข้าใจและไม่อาจวิเคราะห์#nความตายได้!! นั่นละความตาย!"
13330-35 = "แต่ในขณะเดียวกัน... กระผมก็ได้รู้ความลับบางอย่างผ่านความเจ็บปวดของโฮชิโนะ"
13330-36 = "พวกเรารู้แนวคิดที่คล้ายกับความตายกันอยู่แล้ว"
13330-37 = "ความเจ็บปวด"
13330-38 = "คนอื่นไม่อาจเข้าใจถึงความเจ็บปวดของเราได้ และเราก็ไม่อาจเข้าใจถึงความเจ็บปวดของคนอื่นได้ <ความเจ็บปวด> สิ่งนี้ละที่มีแนวคิดเดียวกันกับความตาย"
13330-39 = "ใช่แล้วละ... นี่คือความลึกลับที่พลิกผันผ่านความ <ความเจ็บปวด> มันคือการเผยตัวของความกลัว"
13330-43 = "ผู้ที่ศักดิ์สิทธิ์ที่สุด ต้นกำเนิดและรากเหง้าของทวยเทพที่เก่าแก่และยิ่งใหญ่ที่สุด ฮอรัส"
13330-46 = "ต้องขวางคุณโฮชิโนะไว้ค่ะ... รุ่นพี่อะโรน่า คุณครู"
13330-47 = "คะ?"
13330-48 = "ตอนนี้คุณทาคานาชิ โฮชิโนะถูกสลับตัวตนไปเป็นฮอรัสค่ะ ถ้าปล่อยตัวตนนั้นไว้อย่างนี้ละก็... จะถูกดึงดูดไปตามวิสัย... จนมาโค่นล้มโลกใบนี้ในที่สุดค่ะ"
13330-50 = "สรุปก็คือ... โลกใบนี้จะล่มสลายด้วยมือคุณโฮชิโนะค่ะ"

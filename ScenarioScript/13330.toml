[translation]
13330-1 = "第33話;顯現"
13330-6 = "……"
13330-9 = "夢……前……輩……"
13330-12 = "[ns]「星野到底發生了什麼……！！」"
13330-13 = "現，現在星野同學的……"
13330-14 = "……存在反轉了。"
13330-15 = "星野同學……已經再也……"
13330-17 = "沒，沒辦法了嗎！？"
13330-21 = "……否定。方法並不存在。"
13330-22 = "[ns]「……！！！！」"
13330-23 = "怎，怎麼會……"
13330-24 = "不可能。那和無法讓死者復生是相同的意思……"
13330-25 = "[ns]「星野……！！」"
13330-29 = "沒錯，那個列車砲只是誘餌，從頭到尾都是。"
13330-30 = "我真正的目標是那個阿拜多斯的最高神祕──曉之荷魯斯。"
13330-31 = "第六項古則「不曾存在的真相是真相嗎？」──#n那就是這項古則的答案。"
13330-32 = "我們總有一天會死──這是既定的事實。"
13330-33 = "但我們對其一無所知──因為死亡不曾發生在我們身上。"
13330-34 = "我們能認知的只有他人的死──所以我們無法對死亡產生任何理解！！這就是死亡！"
13330-35 = "……不過藉由星野的痛苦，我領悟到了一個道理。"
13330-36 = "那就是我們其實知道與死亡類似的概念。"
13330-37 = "──痛苦。"
13330-38 = "他人無法明白自己的痛苦，反之亦然。#n「痛苦」的概念和死亡是相同的。"
13330-39 = "……沒錯，這是藉由「痛苦」反轉的神祕。#n也就是「恐怖」的顯現。"
13330-43 = "這就是神聖中的神聖──最古老、最偉大的眾神原典「荷魯斯」。"
13330-46 = "……必須阻止星野同學。彩奈前輩、老師。"
13330-47 = "咦？"
13330-48 = "現在小鳥遊星野同學，已經被反轉成名為荷魯斯的存在。#n如果放任那個存在不管……必然會被其本質吸引……導致這個世界遭到顛覆。"
13330-50 = "也就是說……這樣下去，這個世界將會被星野同學毀滅。"
13330-51 = "……！！"
13330-52 = "[ns]「…………！！！」"
13330-59 = "前輩……"
13330-60 = "夢……前輩……"
13330-62 = "……！！？"
13330-63 = "……星野前輩。"
13330-64 = "星，星野前輩……！？#n那是星野前輩嗎……！？"
13330-65 = "到底……發生了什麼……"
13330-69 = "[ns]「陽奈！！」"
13330-73 = "老……師……"
13330-74 = "[s]「陽奈！你還好嗎！？」"
13330-78 = "我沒能……阻止……星野……"
13330-83 = "[ns]「……！！！」"
13330-88 = "嗚哇──！？"
13330-89 = "手……冊……"
13330-91 = "星野前輩！振作一點！"
13330-99 = "呀啊啊啊！？"
13330-102 = "[ns]「星野──！！」"
13330-103 = "……"
13330-108 = "老師！！請小心！！那個攻擊就連我們也無法抵擋……！！"
13330-109 = "前輩！把手給我……！！"
13330-120 = "[ns] （結束了……我什麼都做不了……）"
13330-125 = "[ns] （我什麼都做不到……）"
13330-127 = "[ns] （……什麼都做不到）"
13330-129 = "[ns1] （無法讓已死之人復活……）\n[ns2] （也無法改變已經發生的事）"
13330-133 = "[ns] （我實在無能為力……星奈）"
13330-136 = "哦，哦哦哦──！"
13330-137 = "哦哦哦哦哦哦哦──！！"
13330-138 = "是嗎，這次是祢嗎！"
13330-139 = "這樣啊，那個原始神格荷魯斯的宿敵──#n圍繞這世界的蒼生，展開激烈衝突的神話中的存在。"
13330-140 = "回應荷魯斯的神格而現身了！！"
13330-141 = "「賽特的憤怒」啊！！"
13330-154 = "雖然是規則被修改前的本質，但這也無所謂！"
13330-155 = "「賽特的憤怒」與「曉之荷魯斯」的激戰！！這是圍繞世界蒼生展開的諸神衝突！！"
13330-156 = "來，讓小生見識神話吧！賽特與荷魯斯的激戰！#n這才是最強大、最燦爛──應該永世流傳的「[ruby=神話]神祕與恐怖的故事[/ruby]」！！"
13330-160 = "不曾存在的真相是真相嗎？"
13330-161 = "對於這不解之問，那個神祕和恐怖是這樣回答的！！"
13330-162 = "明明已親眼觀測卻不曾體驗過的真相──無法體驗的真相。"
13330-163 = "我們無法理解他人的痛苦──因而永遠無法解釋這個真相！#n沒錯，就是這樣！"
13330-164 = "這個世界將會毀滅。"
13330-165 = "這就是世界的命運。#n因為我們無法理解他人的痛苦，所以是應該滅亡的存在。"
13330-168 = "啊啊，看吧，黑色西裝人。#n我已經替你實現你沒能做到的事了。"
13330-169 = "這就是你想看到的光景吧？"
13330-173 = "──這個世界的滅亡。"
13330-177 = "已確認狀況。#n[USERNAME]老師，這樣下去這個世界將會滅亡。"
13330-178 = "[s] 該怎麼阻止？"
13330-179 = "回答……必須破壞星野同學的光環。"
13330-185 = "[ns] 那可不行"
13330-186 = "星野同學現在已反轉為恐怖。#n必須要有能和那驚人的神聖抗衡的神聖才能阻止他。"
13330-187 = "[s] 應該有其他方法才對"
13330-188 = "……但是那樣還不夠。"
13330-189 = "必須要有能和那「恐怖」匹敵的「恐怖」……"
13330-190 = "[s] 那可不行"
13330-191 = "老師。這樣下去老師……"
13330-196 = "咳咳，咳咳……白子前輩……"
13330-197 = "快……逃……"
13330-198 = "白子醬……"
13330-202 = "夢……前……輩……"
13330-212 = "……"
13330-213 = "我似乎明白了。"
13330-214 = "都是因為我太弱……事情才會變成這樣。"
13330-215 = "現在只有我能阻止星野前輩。"
13330-216 = "必須由我來阻止。"
13330-221 = "綾音、野乃美、茜香、星野前輩和老師──#n所有人……都必須由我來拯救。"
13330-226 = "嗯，我明白了。#n我……[ruby=  ・     ・     ・     ・     ・     ・  ]是為了拯救大[/ruby][ruby=  ・     ・     ・     ・     ・     ・  ]家而存在在這[/ruby][ruby= ・     ・ ]裡的[/ruby]。"
13330-232 = "觀測到「色彩」了！！"
13330-233 = "怎，怎麼會……！？居然在這種時候……！？"
13330-234 = "老，老師呢！？"
13330-235 = "確認。老師失去意識了。#n脈搏已下降至危險邊緣。心跳模式不穩。"
13330-237 = "老師有生命危險……！彩奈前輩……！！"
13330-238 = "……！！"
13330-242 = "我必須阻止……！"
13330-248 = "非阻止不可。"
13330-272 = "那個……"
13330-273 = "……老師？#n差不多該起來囉……"
13330-274 = "[USERNAME]老師？"
13330-281 = "下一話;道歉"

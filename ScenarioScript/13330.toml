13330-33 = "3;지하생활자;00;하지만 우리는 그것을 알지 못한다. 우리에게 죽음은 아직 존재한 적이 없기 때문이다."
13330-34 = "3;지하생활자;00;우리가 인식할 수 있는 것은 오직 타인의 죽음뿐. 그렇기 때문에 우리는 죽음에 대해 어떤 이해도 해석도 불가능하다!! 그게 죽음이다!\n#3;closeup\n#3;stiff"
13330-35 = "3;지하생활자;00;……하지만 동시에 저 호시노의 고통을 통해 깨닫게 된 비의가 있다.\n#3;closeup"

13330-155 = "ศึกแห่ง <ความโกรธแค้นของเซ็ต> และ <ฮอรัสแห่งรุ่งอรุณ>!! การปะทะของเทพเพื่อการกำเนิดใหม่#nของโลก!!"
13330-156 = "เอาละ แสดงตำนานให้ประจักษ์เลย การปะทะกันระหว่างเซ็ตและฮอรัส! [ruby=ตำนาน]เรื่องราวของความลึกลับและความน่ากลัว[/ruby]ที่จะเป็นเรื่องราวที่ยิ่งใหญ่และเจิดจรัสที่สุด!!"
13330-160 = "ความจริงที่ไม่มีอยู่จริง คือความจริงหรือไม่?"
13330-161 = "ความลึกลับและความน่ากลัวกำลังตอบคำถามที่เข้าใจยากนั้นอยู่!!"
13330-162 = "นั่นเป็นความจริงที่สังเกตเห็นได้ชัดเจน แต่ก็เป็นความจริงที่กระผมไม่เคยประสบมาก่อน เป็นความจริงที่ประสบไม่ได้"
13330-163 = "เราไม่อาจเข้าใจถึงความเจ็บปวดของคนอื่นได้! จึงตีความความจริงนี้ไม่ได้ตลอดไป! ใช่แล้ว แบบนี้ละ นี่ละ!"

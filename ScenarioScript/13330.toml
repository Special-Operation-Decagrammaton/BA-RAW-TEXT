13330-139 = "ใช่แล้ว ศัตรูเก่าแก่ตัวฉกาจของฮอรัส ปฐมภูมิแห่งความศักดิ์สิทธิ์ และตำนานแห่งความขัดแย้ง#nเรื่องการสร้างโลกใบนี้"

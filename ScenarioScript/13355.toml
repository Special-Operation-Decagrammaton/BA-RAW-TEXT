[translation]
13355-3 = "พวกเธอ... ไม่เข้าใจ... ความเจ็บปวด... นี้หรอก..."
13355-7 = "ไม่หรอก รุ่นพี่โฮชิโนะ ฉันรู้ดี"
13355-8 = "นั่นก็เพราะว่า..."
13355-11 = "นะ... นะ... นั่นมันอะไรน่ะ... สิ่งนั้น... นั่น... นั่นมัน..."
13355-12 = "อะนูบิส เทพแห่งความตายงั้นเหรอ...?!"
13355-13 = "ทะ... ทะ... ทำไม? ทำไมถึง? แต่ว่านั่นมัน... สิ่งนั้นมัน... เป็นไปไม่ได้นี่นา"
13355-14 = "ความศักดิ์สิทธิ์ก็มีอยู่ตรงนั้นแล้วไม่ใช่เหรอ...? แต่ทำไมถึงเกิดได้ถึง 2 คนพร้อมกันล่ะ...? ทำไมกัน...?"
13355-15 = "สิ่งที่สู้กับความศักดิ์สิทธิ์ของฮอรัสได้... ทำไม... ทำไมถึงต้องปรากฏตอนนี้ด้วย...?!"
13355-16 = "ทำไม? ทำไมกันนนน??? นะ... นี่มันอะไรกัน..."
13355-17 = "นี่มันอะไรกันเนี่ยยย!!!"
13355-18 = "แบบนี้มันผิดกติกา ผิดกติกา ผิดกติกาาาา!!!"
13355-19 = "ละเมิดกฎ ละเมิดหนังสือแห่งกฎ แบบนี้มันผิดกฎนะ!! คนเดินทางนิรนาม...!! ไอ้เศษขยะ...!!"
13355-20 = "ข้อมูลที่สำคัญแบบนี้ ทำไมไม่บอกกันก่อนเล่า!!!"
13355-25 = "การเผยตัวของ <ความโกรธแค้นของเซ็ต> หยุดไปแล้ว..."
13355-26 = "จะจบเรื่องนี้แบบนี้ไม่ได้..."
13355-27 = "ต้องเอาวิธีโจมตีที่ 5 ที่ซ่อนไว้ขึ้นมาใช้...!"
13355-28 = "ทำให้ถึงกับต้องงัดวิธีนี้มาใช้เลยงั้นเหรอ... ช่างดื้อด้านเสียเหลือเกิน [USERNAME]..."
13355-29 = "แต่คนที่จะชนะในวาระสุดท้ายก็คือข้า...! ข้าคนนี้!"
13355-33 = "ข้าต้องชนะ!! ต้องชนะให้ได้!!"
13355-35 = "ตอนต่อไป;สมุดโน้ต"

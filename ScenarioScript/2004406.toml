[translation]
2004406-1 = "#title;화제의 인물"
2004406-2 = "#wait;2000"
2004406-3 = "3;스미레;01;도대체 무슨 일이신가요, 트레이너?\n#3;a\n#3;em;[반응]"
2004406-4 = "3;스미레;06;표정이 심상치 않아 보이십니다. 뭔가 마실 것이라도 드릴까요?"
2004406-5 = "3;스미레;03;물과 이온 음료, 단백질 드링크가 준비되어 있습니다."
2004406-6 = "[s1] \"그, 그런 것보다도, 스미레!\"\n[s2] \"지금 인터넷 전부가 스미레로 엄청 화제야!\""
2004406-7 = "#wait;10"
2004406-8 = "#wait;10"
2004406-9 = "3;스미레;01;네. 그 말씀은 이미 모모톡으로 들은 바 있습니다만……."
2004406-10 = "3;스미레;04;그게 도대체 무슨 의미이신가요?\n#3;em;[?]"
2004406-11 = "#na;(그때, 트레이닝 센터의 화면으로부터 뉴스가 흘러나오기 시작했다!)\n#all;hide"
2004406-12 = "#st;[0,0];instant;1;"
2004406-13 = "#clearST"
2004406-14 = "3;스미레;01\n#3;em;[반응]\n#wait;1000"
2004406-15 = "#wait;5000"
2004406-16 = "3;스미레;01\n#na;크로노스 기자;다음 뉴스입니다! 이번에는 일상의 단신을 소개 드리는 코너인데요."
2004406-17 = "3;스미레;01\n#na;크로노스 기자;얼마 전 키보토스의 스타디움에서 있었던, 한 드링크 아르바이트생의 모습이 지금 엄청난 화제가 되고 있다고 하네요!"
2004406-18 = "3;스미레;01\n#na;크로노스 기자;아시는 분은 아시겠지만, 드링크 아르바이트는 보통 드링크 장비의 무게 때문에."
2004406-19 = "3;스미레;01\n#na;크로노스 기자;경기가 진행될수록 아르바이트생들이 자연스레 지치는 일이 발생하곤 하죠."
2004406-20 = "#st;[0,0];instant;1;"
2004406-21 = "#clearST"
2004406-22 = "3;스미레;04\n#3;em;[?]\n#wait;1000"
2004406-23 = "3;스미레;04\n#na;크로노스 기자;아르바이트생들은 물론 언제나 최선을 다하려고 하지만. 어쩔 수 없이 피로와 탈진의 기색이 역력하게 드러날 수밖에 없기도 하고요."
2004406-24 = "3;스미레;04\n#na;크로노스 기자;그래서 경기 중후반부터는. 관중들 역시 섣불리 아르바이트생에게 음료수를 요청하기 어려워하게 되는 일이 보통인데요……."
2004406-25 = "3;스미레;04\n#na;크로노스 기자;그런데 세상에! 이 아르바이트생은 달랐다고 합니다! 끝까지 생기와 활력이 넘치는 모습으로 모두에게 음료수를 제공하였으며."
2004406-26 = "3;스미레;04\n#na;크로노스 기자;처음부터 마지막까지 웃음과 생기, 친절함 및 서비스를 잊지 않아 그날 스타디움의 전설이 되었다고도 하네요. 자료 화면 보시겠습니다!"
2004406-27 = "#st;[0,0];instant;1;"
2004406-28 = "#clearST"
2004406-29 = "3;스미레;04\n#3;h\n#wait;500"
2004406-30 = "#wait;2000"
2004406-31 = "3;스미레;06\n#3;em;…\n#wait;2500"
2004406-32 = "3;스미레;06\n#na;크로노스 기자;그래서 그 아르바이트생이 언제 다시 오는 것이냐는 일부 관객들의 문의가 지금 엄청나게 빗발치고 있다고 합니다!"
2004406-33 = "3;스미레;06\n#na;크로노스 기자;게다가 그 아르바이트생과 찍은 사진은 이미 인터넷 여기저기에서 큰 화제가 되고 있고요."
2004406-34 = "3;스미레;06\n#na;크로노스 기자;이 정도면 그야말로 새로운 스타의 탄생이라고도 볼 수 있지 않을까요?"
2004406-35 = "3;스미레;06\n#na;크로노스 기자;마지막으로, 저희 크로노스 스쿨은 언제나 개개인의 프라이버시를 중요시하기에."
2004406-36 = "3;스미레;06\n#na;크로노스 기자;그 아르바이트생의 신상 정보를 밝히거나 특정하지 않겠지만!"
2004406-37 = "3;스미레;06\n#na;크로노스 기자;모종의 정보통에 따르면, 그 학생은 밀레니엄 사이언스 스쿨 출신이라는 것만은 전해드릴 수 있을 것 같습니다!"
2004406-38 = "#st;[0,0];instant;1;"
2004406-39 = "#clearST"
2004406-40 = "3;스미레;06\n#3;h\n#wait;500"
2004406-41 = "3;스미레;06\n#3;em;…\n#wait;2500"
2004406-42 = "3;스미레;01;트레이너."
2004406-43 = "[s] \"으, 응……?\""
2004406-44 = "3;스미레;01;지금 혹시, 제 이야기였나요?"
2004406-45 = "[s] \"맞아…….\""
2004406-46 = "3;스미레;04;지금 말 그대로 여기저기에서 전부 그 이야기뿐이고……."
2004406-47 = "3;스미레;06;트레이너께서도 얼마 전에 안 것이지만, 저의 팬 카페까지 생겨나 있다고요……?\n#3;em;[땀]"
2004406-48 = "3;스미레;99;……."
2004406-49 = "3;스미레;99;이것 참, 모두들 엄청난 오해를 하고 있는 것 같습니다.\n#3;greeting\n#3;em;[한숨]"
2004406-50 = "3;스미레;05;저는 드링크 아르바이트생이 아니라, 정진 정명한 밀레니엄 트레이닝 클럽의 리더인데 말이지요.\n#3;closeup"
2004406-51 = "#st;[0,0];instant;1;"
2004406-52 = "#clearST"
2004406-53 = "3;스미레;05\n#3;closeup\n#wait;1000"
2004406-54 = "3;스미레;05\n#3;closeup\n#wait;1000"
2004406-55 = "3;스미레;01\n#3;greeting\n#wait;1000"
2004406-56 = "3;스미레;02;음? 뭔가 연락이 왔군요. 이것은…….\n#3;em;…"
2004406-57 = "[s] \"음료 회사로부터의…… 회의 초대장?\""
2004406-58 = "3;스미레;99;길고 형식적인 인사말은 넘어가도록 하죠. 본문을 요약하자면……."
2004406-59 = "3;스미레;02;저희의 신규 스포츠 드링크 제작 아이디어 회의에, 외부 인사로서 참석해 줄 수 있겠냐는 제안…… 인가요?\n#3;em;[?]"
2004406-60 = "3;스미레;04;그것도 회사의 임원들까지 모이는 제법 큰 회의이기에, 가능하다면 꼭 참여해서 고견을 들려주셨으면 한다……?"
2004406-61 = "[s] \"어, 어떡하지? 어떻게 할 거야, 스미레?!\""
2004406-62 = "3;스미레;99;…….\n#3;em;…"
2004406-63 = "3;스미레;03;우선, 트레이너. 이 정도로 정중한 초대를 보내 주셨는데, 사양하는 것은 모두에게 실례일 것 같습니다."
2004406-64 = "3;스미레;08;그리고 드링크에 관한 것이라면, 마침 잘 되었다고도 볼 수 있겠습니다만."
2004406-65 = "3;스미레;07;저 역시 평소에 건의하고 싶었던 것이 있었으니까요!\n#3;closeup"
2004406-66 = "[s] \"정말이야?\""
2004406-67 = "3;스미레;03;그렇습니다. 트레이너.\n#3;em;[재잘]"
2004406-68 = "3;스미레;99;어쩌면 이 초대야말로, 초대를 보내 주신 분들의 말씀처럼……."
2004406-69 = "3;스미레;05;이른바, 현장의 목소리를 전하기에 딱 좋은 기회일지도 모르겠습니다."
2004406-70 = "3;스미레;03;그러면 트레이너! 결정되었으면 지체하지 말고, 행동하도록 하지요!\n#3;em;[음표]"
2004406-71 = "#all;hide"
2004406-72 = "#na;(뭔가 엄청나게 자신만만한 스미레의 태도에, 약간의 불안함이 엄습하기도 했지만.)"
2004406-73 = "#na;(그래도 스미레를 믿고, 한 명의 학생을 믿으며, 회의에 참석해 보기로 했다.)"
2004406-74 = "#st;[0,0];instant;1;"
2004406-75 = "#clearST"
2004406-76 = "#wait;100"
2004406-77 = "#wait;1800"
2004406-78 = "#all;hide"
2004406-79 = "3;음료회사 부장;01;이렇게 바쁘신 와중에도 시간을 내어, 이 자리에 참여해 주신 모든 분들께 진심으로 감사의 말씀을 드립니다.\n#3;a"
2004406-80 = "3;음료회사 부장;01;특히 이번 회의에는, 여러 임원 분들은 물론이거니와……."
2004406-81 = "3;음료회사 부장;03;현장의 목소리를 듣기 위해, 최근 인터넷에서 화제의 인물로 등극한, 오토하나 스미레 씨를 외부 인사로 모셨습니다!\n#3;em;[재잘]"
2004406-82 = "#st;[0,0];instant;1;"
2004406-83 = "#clearST"
2004406-84 = "3;음료회사 부장;03\n#3;d\n#wait;1000"
2004406-85 = "3;스미레 아르바이트;03;안녕하십니까. 방금 소개받은 스미레입니다. 오늘은 잘 부탁드리겠습니다.\n#3;a\n#3;em;[음표]\n#3;greeting"
2004406-86 = "#st;[0,0];instant;1;"
2004406-87 = "#clearST"
2004406-88 = "#wait;2000"
2004406-89 = "3;스미레 아르바이트;03\n#3;d\n#wait;1000"
2004406-90 = "3;음료회사 부장;01\n#3;a\n#wait;1000"
2004406-91 = "#wait;500"
2004406-92 = "3;음료회사 부장;03;그러면 신속하게 회의를 시작하도록 하겠습니다!\n#3;em;[재잘]"
2004406-93 = "#all;hide"
2004406-94 = "3;음료회사 부장;03;우선 저희가 준비한 드링크 시안을 3가지 소개해 드리겠습니다.\n#3;a\n#3;em;[재잘]"
2004406-95 = "#st;[0,0];instant;1;"
2004406-96 = "#clearST"
2004406-97 = "3;음료회사 부장;03\n#3;greeting\n#wait;1000"
2004406-98 = "3;음료회사 부장;08;먼저, 카페인 함량을 높인 스포츠 드링크입니다!\n#3;em;[음표]"
2004406-99 = "3;음료회사 부장;03;카페인은 스포츠 활동을 할 때 부스터 역할을 해 주기도 하죠. 이 점을 어필 포인트로 삼아 홍보 전략으로 삼자는 것입니다!"
2004406-100 = "5;스미레 아르바이트;02;확실히, 운동 전에 카페인을 섭취하면, 혈액순환을 활성화해 전체적인 운동 능력이 약 3~5% 정도 향상된다고 하죠.\n#5;a\n#3;m1\n#5;em;[반응]"
2004406-101 = "5;스미레 아르바이트;99;거기에 코르티솔 분비를 도와, 몸의 지방을 한층 빠르게 분해하여 에너지로 전환해 주기도 하고요."
2004406-102 = "5;스미레 아르바이트;03;이것은 상당히 좋은 접근이라고 생각합니다. 트레이너.\n#5;em;[음표]"
2004406-103 = "[s] \"그, 그래…….\""
2004406-104 = "#st;[0,0];instant;1;"
2004406-105 = "#clearST"
2004406-106 = "3;음료회사 부장;03\n5;스미레 아르바이트;03\n#3;h\n#5;h\n#3;greeting\n#wait;1000"
2004406-107 = "3;음료회사 부장;01;다음으로는, 키보토스 각지의 14가지 과일과 채소 원액을 섞은 스포츠 드링크입니다."
2004406-108 = "3;음료회사 부장;03;과일과 채소 원액을 섞었으니 건강에 보다 좋을 것 같다는 느낌을 줄 수 있으며, 이 점을 홍보 전략으로 삼을 수 있겠지요!\n#3;em;[재잘]"
2004406-109 = "5;스미레 아르바이트;99;으음, 과일과 채소를 사용했다고 하여, 건강에 좋을 것이라고는 속단하기 어려울 텐데요.\n#5;em;…"
2004406-110 = "5;스미레 아르바이트;02;중요한 것은 과일과 채소에 함유되어 있는 식이섬유니까요. 오히려 과일의 경우에는, 품종에 따라 과당이 지나치게 함유되어 있어."
2004406-111 = "5;스미레 아르바이트;01;건강에는 그렇게까지 좋은 영향을 미치지 못하는 경우도 제법 있습니다."
2004406-112 = "5;스미레 아르바이트;04;운동 전 부스터로, 바나나나 사과를 먹는 정도라면 괜찮겠지만요……."
2004406-113 = "#st;[0,0];instant;1;"
2004406-114 = "#clearST"
2004406-115 = "3;음료회사 부장;04\n5;스미레 아르바이트;04\n#3;h\n#5;h\n#3;stiff\n#3;em;[땀]\n#wait;1000"
2004406-116 = "3;음료회사 부장;09\n5;스미레 아르바이트;04\n#3;h\n#5;h\n#3;greeting\n#wait;1000"
2004406-117 = "3;음료회사 부장;03;마지막으로는 기존 저희 회사가 생산하던 스포츠 드링크에서, 액상과당 성분을 인공감미료로 대체하여 칼로리를 대폭 낮춘 제품을 생산하자는 방안입니다!\n#3;em;[재잘]"
2004406-118 = "3;음료회사 부장;01;액상과당에 대한 여론이 바뀌면서, 기존 저희 스포츠 드링크의 판매량이 유의미한 수치로 떨어졌는데요."
2004406-119 = "3;음료회사 부장;08;이 부분을 만회하면서도 기존 생산 설비를 활용할 수 있고, 브랜드 이미지 개선까지 노릴 수 있는 전략이기도 합니다.\n#3;em;[음표]"
2004406-120 = "5;스미레 아르바이트;99;확실히 액상과당은, 요즘 도는 소문만큼이나 유해 물질, 혹은 독소 취급 받을 만큼의 물질은 아닙니다만…….\n#3;dl\n#5;m3\n#5;em;…"
2004406-121 = "5;스미레 아르바이트;01;동시에, 몸에 부담을 끼치는 요소가 없다고도 할 수는 없는 물질이기도 하죠."
2004406-122 = "5;스미레 아르바이트;02;액상과당의 근본적인 문제는, 단시간에 많은 당분을 섭취하게 되어."
2004406-123 = "5;스미레 아르바이트;03;고혈당증과 같은 질병의 원인이 되는 데다, 췌장에 무리를 준다는 데에 있으니까요."
2004406-124 = "5;스미레 아르바이트;08;그런 점에서 이 전략은 상당 부분 유의미하게 들립니다.\n#5;em;[재잘]"
2004406-125 = "#all;hide"
2004406-126 = "#na;음료회사 임원 A;으음, 어느 쪽이 좋을까요. 저로서는 셋 다 나름대로 의미 있는 부분이 있어 보입니다만……."
2004406-127 = "#na;음료회사 임원 B;역시 기존 설비를 활용할 수 있는, 3안이 좋지 않을까요?"

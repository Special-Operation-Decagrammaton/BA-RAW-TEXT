[translation]
2004406-1 = "The One in the News"
2004406-3 = "What's going on, Trainer?"
2004406-4 = "You look so serious... Are you ill?"
2004406-5 = "Do you need some water? A protein shake?"
2004406-6 = "[s1] \"Forget that, Sumire!\"\n[s2] \"Everyone's talking about you!\""
2004406-9 = "Like...on MomoTalk?"
2004406-10 = "What do you mean?"
2004406-11 = "I turned on the training center's television and showed her the news."
2004406-16 = "And we're back with \"Eye on Kivotos\"!"
2004406-17 = "This part-time server has been making waves at the local stadium!"
2004406-18 = "Considering that the average beverage keg weighs 25 kg, many servers..."
2004406-19 = "...naturally get exhausted as the game progresses!"
2004406-23 = "Of course, while the servers always do their best, most can't help but succumb to fatigue."
2004406-24 = "...Leaving fans thirsty and desperate as the game stretches on!"
2004406-25 = "But look at her move! She stays full of life and energy until the last pitch!"
2004406-26 = "And who could deny the magnetism of her smile, energy, and conscientious service? And with SUCH impressive posture!"
2004406-32 = "Many fans are screaming, asking management and players alike to bring her back!"
2004406-33 = "Additionally, the photos taken with this amazing worker are going positively viral!"
2004406-34 = "Could we be witnessing the birth of a new star?"
2004406-35 = "Lastly, because we always value individual privacy here at Kronos..."
2004406-36 = "...we won't be revealing the identity of this sensation, but..."
2004406-37 = "...some sources say she MIGHT be found at Millennium Science School!"
2004406-42 = "Trainer."
2004406-43 = "[s] \"Y-Yeah...?\""
2004406-44 = "That was me. On the news."
2004406-45 = "[s] \"Yeah...\""
2004406-46 = "They didn't even blur my name tag..."
2004406-47 = "What? You're saying that I already have a fan club?"
2004406-48 = "..."
2004406-49 = "No, this is all a misunderstanding."
2004406-50 = "I'm president of the Millennium Athletics Training Club. THIS is my passion!"
2004406-56 = "Hm? One second. I have a message."
2004406-57 = "[s] \"A meeting invite...from a beverage company?\""
2004406-58 = "Scrolling...scrolling...how cordial. Ah!"
2004406-59 = "They're asking for me to come to their next sport drink...tasting meeting?"
2004406-60 = "With a bunch of executives? And they'd like to hear my thoughts?"
2004406-61 = "[s] \"What are you going to do, Sumire?!\""
2004406-62 = "..."
2004406-63 = "Well, Trainer, they're being quite polite. How could I say no?"
2004406-64 = "And I've certainly consumed my fair share of sports drinks."
2004406-65 = "I actually have a few ideas. This is a tremendous opportunity!"
2004406-66 = "[s] \"Really?\""
2004406-67 = "Yes, Trainer."
2004406-68 = "In fact, as this company suggested..."
2004406-69 = "...I am a bit of an expert—a \"voice of the people\"!"
2004406-70 = "It's my sacred duty! So, there's no point standing around like this. Let's! Get! Moving!"
2004406-72 = "Although I was a bit nervous about Sumire's incredible confidence..."
2004406-73 = "...I decided to support her and join the meeting."
2004406-79 = "I'd like to thank everyone for graciously joining us today."
2004406-80 = "In this meeting, we have not only the executives..."
2004406-81 = "But also Otohana Sumire, who recently went viral. She's a true voice of the people!"
2004406-85 = "You're so kind. Yes, I'm Sumire. Thank you for having me."
2004406-92 = "Now then, let's get started with the meeting!"
2004406-94 = "We have three awesomely amazing drink samples from R&D here..."
2004406-98 = "Let's start with this one! It's loaded with caffeine!"
2004406-99 = "Caffeine is so hot right now! It burns calories and provides the energy athletes crave!"
2004406-100 = "Yes, taking caffeine before exercising can boost circulation, increasing physical performance by 3 to 5 percent."
2004406-101 = "Additionally, it helps break down fat and convert it to energy..."
2004406-102 = "It sounds reasonable, Trainer."
2004406-103 = "[s] \"Right...\""
2004406-107 = "Next up, we have a drink containing the juice of 14 different fruits and vegetables!"
2004406-108 = "It's healthy! It's full of vitamins! The kids will love it!"
2004406-109 = "Mmm, juice doesn't inherently make something \"healthy.\""
2004406-110 = "The best part of produce is fiber, actually. In fact, fruit contains a lot of natural sugar!"
2004406-111 = "And sugar certainly isn't healthy!"
2004406-112 = "I'm all for incorporating WHOLE fruit into an exercise routine, of course."
2004406-117 = "...Well noted. Finally, this third option completely replaces high-fructose corn syrup with artificial sweeteners!"
2004406-118 = "The public consciousness has recently soured on high-fructose corn syrup, and our shareholders have noticed."
2004406-119 = "But with this new flavor, our fans can get all that delicious taste with none of the sugar rush!"
2004406-120 = "High-fructose corn syrup, in moderation, can be fine."
2004406-121 = "That said, I still find it quite problematic."
2004406-122 = "You see, high-fructose corn syrup produces such a rapid sugar intake!"
2004406-123 = "Repeatedly consuming it in excess can cause hyperglycemia and pancreatic issues."
2004406-124 = "If this new formula mitigates that, it could save lives!"
2004406-126 = "Fascinating. I feel all three drinks have immense market potential."
2004406-127 = "The third one is the easiest to produce. It's a simple ingredient swap."
2004406-128 = "But we also need to revitalize our image! I think the juice one has the most potential. It diversifies our brand!"
2004406-129 = "Now, now. We can talk later. Let's not waste our special guest's time."
2004406-130 = "Absolutely! Let's hear from the lady of the hour!"
2004406-131 = "I think we old fogies have said enough. Please, Sumire, tell us what you think!"
2004406-135 = "Thank you so much for asking. These are compelling ideas."
2004406-136 = "However, in my opinion, the answer is obvious..."
2004406-137 = "We need protein!"
2004406-138 = "[s] \"Sumire!\""
2004406-139 = "M-Miss Sumire?! We...make sports drinks."
2004406-140 = "Precisely!"
2004406-141 = "Huh?!"
2004406-142 = "What is a \"sports drink\"? It SHOULD be a drink that helps with sports, right?"
2004406-143 = "And any athlete knows how hard it is to get your daily recommended protein macros!"
2004406-144 = "Which is why people gulp down powders and choke on bars..."
2004406-145 = "So what you should be doing is making protein more accessible!"
2004406-146 = "Most protein drinks are so thick and chalky. They have a terrible reputation."
2004406-147 = "And that's all the more reason why YOU can step in with a new spin!"
2004406-148 = "I know it will work!"
2004406-153 = "P-Protein? I never would've thought..."
2004406-154 = "Let's not carried away, everyone. We need to think this over..."
2004406-155 = "It's so fresh...so different. Sumire, you're amazing!"
2004406-156 = "Hold on, hold on!"
2004406-157 = "We are a sports drink company, but our primary goal is hydration. It's for the fans, not athletes."
2004406-158 = "Fans gets thirsty, after all!"
2004406-159 = "You're thinking too small!"
2004406-160 = "Wh-What?!"
2004406-161 = "Why are people fans of sports?"
2004406-162 = "Sure, for the love of the game, but also because they aspire to be more LIKE the athletes!"
2004406-163 = "That's certainly how I feel!"
2004406-164 = "And these people, if they watch enough sports, will want to work out one day."
2004406-166 = "D-Do you have any evidence...?"
2004406-167 = "I believe it's true. Isn't that enough?"
2004406-168 = "And it is your SACRED duty to help these people become their best selves!"
2004406-173 = "Sacred duty..."
2004406-174 = "That's...quite touching."
2004406-175 = "It reminds me of why I initially joined the hydration business..."
2004406-176 = "..."
2004406-177 = "(This meeting...is a disaster!)"
2004406-181 = "Now then, let's circle back. How can we incorporate a protein sports drink into our portfolio?"
2004406-182 = "Let's start conservatively with chocolate, strawberry, and banana flavors. Then we'll measure public response."
2004406-183 = "Thank you so much for your input, Miss Sumire!"
2004406-184 = "You're welcome. I'm just grateful for the opportunity."
2004406-188 = "(*sigh* I guess I'll put this in the meeting minutes...)"
2004406-190 = "Sumire's new drink was released."
2004406-191 = "Sales were...technically existent."
2004406-192 = "And thanks to her endorsement, the product line was maintained."
2004406-194 = "All's well that end's well, right, Trainer?"
2004406-195 = "[s] \"I suppose...?\""

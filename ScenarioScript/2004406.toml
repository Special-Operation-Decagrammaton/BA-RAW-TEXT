[translation]
2004406-1 = "คนในกระแส"
2004406-3 = "มีเรื่องอะไรเหรอคะ เทรนเนอร์?"
2004406-4 = "ทำไมสีหน้าเป็นแบบนั้นล่ะ? อยากดื่มอะไรหน่อยมั้ยคะ?"
2004406-5 = "ฉันมีทั้งเครื่องดื่มไอออนและเครื่องดื่มโปรตีนเลยค่ะ"
2004406-6 = "[s1] \"เรื่องนั้นช่างก่อนเถอะ ตอนนี้สึมิเระดังแล้วนะ!'\n[s2] \"ตอนนี้มีเรื่องของสึมิเระดังไปทั่วอินเทอร์เน็ตแล้วนะ!\""
2004406-9 = "ค่ะ เมื่อกี้คุณครูก็พูดอย่างนี้ใน MOMOTALK..."
2004406-10 = "ว่าแต่มันเรื่องอะไรกันเหรอคะ?"
2004406-11 = "(ในตอนนั้นในโทรทัศน์ของฟิตเนสเซ็นเตอร์ก็นำเสนอข่าวพอดี)"
2004406-16 = "ข่าวต่อไปค่ะ! นี่เป็นข่าวสั้นที่นำเสนอเรื่องราวในชีวิตประจำวัน"
2004406-17 = "ตอนนี้พนักงานขายเครื่องดื่มพาร์ทไทม์คนหนึ่งในสนามกีฬาในคิโวทอสกำลังเป็นกระแสที่หลายคนให้#nความสนใจเลยค่ะ!"
2004406-18 = "อย่างที่ทราบว่างานขายเครื่องดื่มพาร์ทไทม์ไม่ใช่งานง่ายๆ"
2004406-19 = "เนื่องจากต้องแบกเครื่องจ่ายเครื่องดื่มหนักๆ ไปด้วย จึงเป็นธรรมดาที่พนักงานพาร์ทไทม์ในสนามกีฬา#nจะรู้สึกเหนื่อยล้า "
2004406-23 = "แน่นอนว่าพนักงานพาร์ทไทม์ก็พยายามทำหน้าที่ของตัวเองให้ดีที่สุด แต่ก็หลีกเลี่ยงไม่ได้ที่ความ#nเหนื่อยล้าและความอ่อนเพลียจะปรากฏบนสีหน้าให้เราเห็นค่ะ"
2004406-24 = "เพราะงั้นตั้งแต่ช่วงครึ่งหลังของเกม ผู้ชมในสนามก็จะไม่ค่อยกล้าเรียกพนักงานพาร์ทไทม์มาบริการ#nเครื่องดื่มค่ะ..."
2004406-25 = "แต่ทว่า! พนักงานพาร์ทไทม์คนนี้ต่างออกไปค่ะ! นอกจากจะเดินเสิร์ฟเครื่องดื่มให้ทุกคนด้วยพละกำลัง และความมีชีวิตชีวาแล้ว"
2004406-26 = "เธอยังแจกจ่ายรอยยิ้ม ความสดใส และให้บริการอย่างเป็นมิตรตั้งแต่เริ่มเกมจนจบเกม จนได้เป็นคนดัง#nของสนามกีฬาในวันนั้นเลยค่ะ! ดูที่หน้าจอกันสิคะ!"
2004406-32 = "ตอนนี้มีผู้ชมหลายคนเลยค่ะที่ถามเข้ามาว่าพนักงานพาร์ทไทม์คนนั้นจะกลับมาทำงานอีกเมื่อไร!"
2004406-33 = "นอกจากนี้รูปที่ผู้ชมถ่ายกับพนักงานพาร์ทไทม์คนนั้นยังเป็นที่พูดถึงไปทั่วอินเทอร์เน็ตเลยค่ะ"
2004406-34 = "แบบนี้คงต้องเรียกว่าดาวดวงใหม่ได้ถือกำเนิดแล้วสินะคะ!"
2004406-35 = "อย่างไรก็ตาม โรงเรียนโครโนสของเราให้ความสำคัญกับความเป็นส่วนตัวของทุกคนเสมอ"
2004406-36 = "เราก็เลยจะไม่เปิดเผยตัวตนของพนักงานพาร์ทไทม์คนนั้น!"
2004406-37 = "แต่จากแหล่งข้อมูลแล้ว เราก็แอบบอกได้ค่ะว่าเธอเป็นนักเรียนจากโรงเรียนวิทย์มิลเลเนียม!"
2004406-42 = "เทรนเนอร์"
2004406-43 = "[s] \"หะ... หืม...?\""
2004406-44 = "ข่าวที่ฟังอยู่ตอนนี้... พูดถึงฉันเหรอคะ?"
2004406-45 = "[s] \"ใช่...\""
2004406-46 = "ตอนนี้แทบทุกที่กำลังพูดกันถึงเรื่องนั้น..."
2004406-47 = "แล้วเทรนเนอร์ก็เพิ่งรู้ด้วยว่ามีการสร้างแฟนคาเฟ่ของฉันงั้นเหรอคะ...?"
2004406-48 = "..."
2004406-49 = "ฉันว่าทุกคนเข้าใจผิดกันไปใหญ่เลยค่ะ"
2004406-50 = "ฉันไม่ใช่พนักงานขายเครื่องดื่มพาร์ทไทม์ แต่เป็นหัวหน้าฟิตเนสเซ็นเตอร์ของมิลเลเนียมต่างหากค่ะ"
2004406-56 = "หืม? มีคนติดต่อเข้ามาค่ะ นี่มัน..."
2004406-57 = "[s] \"คำเชิญเข้าร่วมประชุม... จากบริษัทเครื่องดื่ม?\""
2004406-58 = "ฉันขอข้ามคำทักทายที่ยืดยาวและเป็นทางการแล้วเข้าเรื่องเลยนะคะ ถ้าจะให้สรุปละก็..."
2004406-59 = "\"เราอยากเสนอให้คุณมาเข้าร่วมในการประชุมไอเดียการผลิตเครื่องดื่มสปอร์ตสูตรใหม่ของเราในฐานะ#nบุคคลภายนอก...\""
2004406-60 = "\"เนื่องจากเป็นการประชุมครั้งใหญ่ที่มีผู้บริหารของบริษัทเข้าร่วมด้วย ถ้าเป็นไปได้เราอยากขอให้คุณ#nเข้าร่วมและแบ่งปันความคิดเห็นของคุณ...\""
2004406-61 = "[s] \"อะ... เอาไงดีล่ะ? จะทำยังไงเหรอ สึมิเระ?!\""
2004406-62 = "..."
2004406-63 = "เทรนเนอร์คะ ฉันคิดว่าคงเป็นการเสียมารยาทถ้าจะปฏิเสธคำเชิญที่สุภาพเช่นนี้"
2004406-64 = "และถ้าเป็นเรื่องเครื่องดื่มละก็ ฉันคิดว่านี่เป็นโอกาสที่ดีเลยค่ะ"
2004406-65 = "แล้วฉันก็มีเรื่องอยากเสนอกับบริษัทเครื่องดื่มอยู่พอดีค่ะ!"
2004406-66 = "[s] \"จริงเหรอ?\""
2004406-67 = "ค่ะ เทรนเนอร์"
2004406-68 = "บางทีการเชิญให้ไปเข้าร่วมการประชุมนี้..."
2004406-69 = "อาจเป็นโอกาสเหมาะที่จะแสดงความคิดเห็นจากผู้บริโภคตัวจริงก็ได้นะคะ"
2004406-70 = "เพราะงั้น เทรนเนอร์คะ! ถ้าตัดสินใจแล้วก็อย่ารอช้า เรารีบไปเดินเรื่องกันเถอะค่ะ!"
2004406-72 = "(คุณครูรู้สึกกังวลกับท่าทีที่มั่นใจอย่างล้นเหลือของสึมิเระ)"
2004406-73 = "(แต่ก็เชื่อในตัวสึมิเระ เชื่อในตัวนักเรียน และตัดสินใจจะไปเข้าร่วมการประชุมด้วยกัน)"
2004406-79 = "ผมขอขอบคุณทุกคนที่สละเวลาอันมีค่ามาเข้าร่วมประชุมในวันนี้นะครับ"
2004406-80 = "โดยเฉพาะอย่างยิ่งในการประชุมครั้งนี้ นอกจากมีผู้บริหารหลายท่านของเรา..."
2004406-81 = "เรายังมีคุณโอโทฮานะ สึมิเระที่กำลังเป็นกระแสในอินเทอร์เน็ตอยู่ตอนนี้มาเข้าร่วมแลกเปลี่ยนความ#nคิดเห็นในฐานะผู้บริโภคด้วยครับ!"
2004406-85 = "สวัสดีค่ะ ฉันคือสึมิเระคนที่ว่าค่ะ วันนี้ขอรบกวนด้วยนะคะ"
2004406-92 = "ถ้างั้นเรามาเริ่มประชุมกันเลยนะครับ!"
2004406-94 = "ก่อนอื่นเราขอนำเสนอไอเดียเครื่องดื่ม 3 แบบที่เตรียมไว้"
2004406-98 = "อย่างแรกคือเครื่องดื่มเกลือแร่ที่มีคาเฟอีนในปริมาณสูงครับ!"
2004406-99 = "คาเฟอีนมีบทบาทในการกระตุ้นร่างกายเมื่อทำกิจกรรมกีฬา เราจะใช้เรื่องคาเฟอีนนี้เป็นจุดดึงดูดใจ และใช้เป็นกลยุทธ์ในการส่งเสริมการขายครับ!"
2004406-100 = "ว่ากันว่าการได้รับคาเฟอีนก่อนออกกำลังกายจะทำให้เกิดการกระตุ้นการไหลเวียนของเลือด และจะช่วยเพิ่มประสิทธิภาพของการออกกำลังกายโดยรวมได้ราว 3-5%"
2004406-101 = "นอกจากนี้ยังช่วยในการหลั่งคอร์ติซอลที่จะช่วยเร่งการสลายไขมันในร่างกายและเปลี่ยนไขมันเป็น#nพลังงานด้วยค่ะ"
2004406-102 = "ฉันว่านี่คือแนวทางที่ดีทีเดียวค่ะ เทรนเนอร์"
2004406-103 = "[s] \"อะ... อืม...\""
2004406-107 = "ต่อไปคือเครื่องดื่มเกลือแร่ที่มีส่วนผสมของน้ำผักและผลไม้ 14 ชนิดที่มีในคิโวทอสครับ"
2004406-108 = "น้ำผักและผลไม้ที่ใส่เข้าไปจะให้ความรู้สึกว่าเป็นเครื่องดื่มเกลือแร่ที่ดีต่อสุขภาพ ซึ่งเราจะใช้จุดนี้เป็น#nกลยุทธ์ส่งเสริมการขายครับ!"
2004406-109 = "อืม ถึงจะบอกว่าใช้ผักและผลไม้ แต่ก็จะด่วนสรุปว่ามันดีต่อสุขภาพไม่ได้หรอกค่ะ"
2004406-110 = "นั่นก็เพราะสิ่งสำคัญของผักผลไม้ก็คือใยอาหารที่อยู่ในเนื้อของมัน นอกจากนี้ในผลไม้บางอย่างก็มี#nน้ำตาลฟรุกโตสในปริมาณที่มากเกินไปด้วย"
2004406-111 = "เพราะงั้นจึงมีบางกรณีที่ผลไม้ไม่ได้ส่งผลดีต่อสุขภาพมากนักค่ะ"
2004406-112 = "แต่ถ้าจะใช้ผลไม้เป็นบูสเตอร์ก่อนออกกำลังกาย กินกล้วยหรือแอปเปิลก็ดีเลยค่ะ..."
2004406-117 = "สุดท้ายคือเครื่องดื่มเกลือแร่เดิมของเราที่จะเปลี่ยนมาใส่สารให้ความหวานแทนน้ำเชื่อมฟรุกโตส เพื่อเป็นการลดปริมาณแคลอรี่ครับ!"
2004406-118 = "ตอนนี้ความคิดเห็นของผู้บริโภคเกี่ยวกับน้ำเชื่อมฟรุกโตสเปลี่ยนไป ยอดขายเครื่องดื่มเกลือแร่เดิม#nของเราก็เลยลดลงไปมาก"
2004406-119 = "เราเลยมองว่านี่จะเป็นกลยุทธ์ที่จะฟื้นฟูยอดขายและปรับปรุงภาพลักษณ์ของแบรนด์ได้ด้วยครับ"
2004406-120 = "ที่จริงน้ำเชื่อมฟรุกโตสก็ไม่ใช่วัตถุอันตรายอย่างที่ลือกันในตอนนี้ แล้วมันก็ไม่ใช่สารพิษด้วย..."
2004406-121 = "แต่ก็พูดไม่ได้ว่ามันไม่มีองค์ประกอบที่ส่งผลไม่ดีต่อร่างกายค่ะ"
2004406-122 = "ปัญหาพื้นฐานของน้ำเชื่อมฟรุกโตสก็คือ มันทำให้เราบริโภคน้ำตาลเป็นจำนวนมากในช่วงเวลาสั้นๆ"
2004406-123 = "ซึ่งนั่นเป็นสาเหตุของโรคต่างๆ อย่างโรคน้ำตาลในเลือดสูง และยังทำให้ตับอ่อนทำงานหนักด้วยค่ะ"
2004406-124 = "ในแง่นั้นแล้ว กลยุทธ์นี้ก็ฟังดูเข้าท่าทีเดียวค่ะ"
2004406-126 = "อืม ว่าแต่จะเลือกอันไหนดีล่ะครับ สำหรับผมแล้วทั้ง 3 อย่างก็มีความน่าสนใจกันคนละแบบเลย..."
2004406-127 = "แต่ตัวเลือกที่ 3 น่าจะดีที่สุดในแง่ของการใช้อุปกรณ์การผลิตเดิมและเครื่องดื่มเดิมที่มีได้"
2004406-128 = "แต่ตอนนี้เราก็ต้องปรับปรุงภาพลักษณ์ของแบรนด์นี่ครับ ถ้าพิจารณาเรื่องนั้น กลยุทธ์ส่งเสริม#nสุขภาพจากตัวเลือกที่ 2 น่าจะใช้ได้กว้างขวางที่สุด..."
2004406-129 = "เอาละๆ เราพูดคุยกันเองมันก็ดีอยู่หรอกนะ แต่วันนี้เรามีแขกคนสำคัญมาเข้าร่วมทั้งทีไม่ใช่เหรอครับ!"
2004406-130 = "นั่นสินะครับ! ความคิดเห็นจากภายนอกก็สำคัญไม่แพ้กันเลย!"
2004406-131 = "พอมาทำงานบริหารนานๆ เข้า บางทีเราก็จะห่างเหินจากการรับฟังความเห็นจากผู้บริโภคอย่างไม่ตั้งใจ#nครับ ถ้างั้นรบกวนขอความเห็นด้วยนะครับ"
2004406-135 = "ขอบคุณที่ให้โอกาสฉันแสดงความคิดเห็นนะคะ ฉันคิดว่าทั้งหมดคือแผนการที่ดีค่ะ"
2004406-136 = "แต่ถ้าจะขอความคิดเห็นจากฉันละก็ ฉันต้องบอกว่าสิ่งใหม่ที่ควรจะวางขายในเวลานี้..."
2004406-137 = "ก็คือเครื่องดื่มโปรตีนที่ดื่มง่ายค่ะ!"
2004406-138 = "[s] \"สึมิเระ!!!\""
2004406-139 = "คะ... คุณสึมิเระ?! แต่พวกเราเป็นบริษัทเครื่องดื่มสปอร์ตนะครับ!?"
2004406-140 = "ก็เพราะอย่างนั้นละค่ะ!"
2004406-141 = "มันยังไงเหรอครับ!!??"
2004406-142 = "ฉันว่าเราต้องมาคิดก่อนค่ะว่าแก่นแท้ของเครื่องดื่มสปอร์ตคืออะไร มันควรจะเป็นเครื่องดื่มที่มี#nประโยชน์ต่อการออกกำลังและเล่นกีฬาไม่ใช่เหรอคะ!"
2004406-143 = "พอฉันฝึกซ้อมมากๆ เข้า ฉันก็ได้รู้ว่าการกินโปรตีนให้ถึงในแต่ละวันนั้นไม่ใช่เรื่องง่ายเลยค่ะ!"
2004406-144 = "เพราะงั้นฉันก็เลยกินอาหารที่หลากหลาย รวมทั้งอาหารเสริมด้วย..."
2004406-145 = "แต่สุดท้ายแล้วสิ่งที่พวกเราคาดหวังคือความสะดวก ฉันคิดว่าเราต้องบอกให้ทุกคนได้รู้ว่าสารอาหารที่#nเรียกว่าโปรตีนนี้มันเข้าถึงได้ง่ายกว่าเดิมค่ะ!"
2004406-146 = "แต่ถึงอย่างนั้น เครื่องดื่มโปรตีนหลายยี่ห้อที่วางขายในตอนนี้เป็นผลิตภัณฑ์ที่มีความเข้มข้นเกินไป และยังมีรสคาวเล็กน้อย ผู้บริโภคก็เลยไม่ค่อยเลือกซื้อค่ะ"
2004406-147 = "และด้วยเหตุนี้ ฉันจึงมองว่าตอนนี้ควรเปิดทางให้เครื่องดื่มโปรตีนแบบใหม่ค่ะ! นี่ต่างหากที่ผู้บริโภค#nต้องการ!"
2004406-148 = "ฉันเชื่อหมดใจว่าเป็นแบบนั้นค่ะ!"
2004406-153 = "คะ... เครื่องดื่มโปรตีนงั้นเหรอ เป็นไอเดียที่คาดไม่ถึงเลยนะครับ...!"
2004406-154 = "พอได้ความคิดเห็นที่คาดไม่ถึง ก็ยากที่จะตัดสินใจแฮะ ขอเวลาเราคิดสักหน่อยนะครับ..."
2004406-155 = "จะว่าไปมันก็เป็นไอเดียที่แปลกใหม่อยู่หรอกนะครับ แต่นี่เป็นความคิดเห็นจากผู้บริโภคโดยตรงหรือ#nเปล่า...!"
2004406-156 = "เดี๋ยวครับ ฟังผมก่อนนะครับ!"
2004406-157 = "เราเป็นบริษัทเครื่องดื่มสปอร์ตก็จริง แต่เป้าหมายสูงสุดของเราคือการทำให้แฟนกีฬาดับกระหายได้#nอย่างรวดเร็วนะครับ!"
2004406-158 = "การขายเครื่องดื่มเกลือแร่เพื่อดับกระหายมันตอบโจทย์มากกว่าและตลาดทางนี้มันก็ใหญ่กว่าด้วยครับ!"
2004406-159 = "พูดเหมือนไม่รู้อะไรเอาเสียเลยนะคะ!"
2004406-160 = "วะ... ว่าไงนะครับ?!"
2004406-161 = "คิดว่าทำไมแฟนกีฬาถึงออกมาชมกีฬาตั้งแต่แรกเหรอคะ?"
2004406-162 = "แน่นอนว่าอาจเป็นเพื่อความพึงพอใจและเพื่อคลายเครียด แต่ส่วนลึกในหัวใจของคนพวกนั้นก็มีความ#nปรารถนาที่จะเป็นอย่างนักกีฬาด้วยค่ะ"
2004406-163 = "ฉันเชื่อมั่นอย่างนั้นค่ะ!"
2004406-164 = "และคนที่มีความปรารถนาแบบนั้น... ก็ต้องเข้าวงการเทรนนิ่งในสักวันไม่ใช่เหรอคะ?"
2004406-166 = "มะ... มีหลักฐานยืนยันหรือเปล่าครับ...?"
2004406-167 = "ฉันเชื่อมั่นว่ามันเป็นอย่างนั้นค่ะ!"
2004406-168 = "และเราก็มีหน้าที่ปูทางให้พวกเขาเหล่านั้น เพื่อการเทรนนิ่งที่เป็นอนาคตของพวกเขาเหล่านั้นค่ะ!"
2004406-173 = "ปูทางเพื่ออนาคตของพวกเขาเหล่านั้น..."
2004406-174 = "ได้ฟังแล้วมีไฟขึ้นมาเลย พวกเราต้องทบทวนเรื่องนี้แล้วละครับ"
2004406-175 = "ผมคิดถึงแพชชั่นสมัยเข้ามาทำงานใหม่ๆ เลยครับ นี่ผมหลงลืมมันไปนานแค่ไหนแล้วนะ ผมเข้ามาบริษัทนี้เพราะอุดมการณ์นั้นแท้ๆ..."
2004406-176 = "..."
2004406-177 = "(ซวยแล้วไง... บริษัทเรา!)"
2004406-181 = "ถ้างั้นเรามาสรุปความคิดเห็นกันเถอะครับ เราจะพัฒนาเครื่องดื่มโปรตีนใหม่... อืม ถือเป็นโอกาสที่ดี#nเลยครับ"
2004406-182 = "เพื่อให้เข้าถึงได้อย่างแพร่หลาย เราจะวางขาย 3 รสชาติ ทั้งรสช็อกโกแลต รสสตรอว์เบอร์รี่ และรสกล้วย แล้วจะมาดูเสียงตอบรับจากตลาดกันครับ"
2004406-183 = "ขอบคุณสำหรับความคิดเห็นที่มีค่านะครับ คุณสึมิเระ คุณช่วยเราไว้ได้มากเลยครับ ฮ่าฮ่าฮ่า"
2004406-184 = "ไม่หรอกค่ะ ฉันต่างหากที่ต้องขอบคุณสำหรับโอกาสนี้ค่ะ"
2004406-188 = "(เฮ้อ... ต้องเอาไปใส่ในบันทึกการประชุมแล้วสิ...)"
2004406-190 = "(และแล้วเครื่องดื่มโปรตีนของสึมิเระก็ถูกวางจำหน่าย)"
2004406-191 = "(ส่วนเรื่องยอดขายโดยรวม... ทางบริษัทไม่ได้มาเปิดเผยอย่างแน่ชัด)"
2004406-192 = "(แต่ว่ากันว่ามีการผลิตอย่างต่อเนื่อง เนื่องจากความต้องการของตลาดที่เพิ่มขึ้นอย่างไม่คาดคิด)"
2004406-194 = "ถือว่าออกมาดีเลยใช่มั้ยคะ เทรนเนอร์?"
2004406-195 = "[s] \"ดีเลย... มั้งนะ...?\""

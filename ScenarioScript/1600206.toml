[translation]
1600206-1 = "เตรียมพร้อมเกินร้อย"
1600206-2 = "(หลังจากนั้นไม่นาน คุณครูก็มาถึงห้องพักผ่อนของนักเรียนของโรงเรียนมิลเลเนียม แต่ก็พบว่าใน#nห้องไม่มีใครเลย)"
1600206-3 = "(ภายในห้องมีเพียงแค่โคโทริที่นั่งรออยู่ด้วยสีหน้าคาดหวังสุดๆ)"
1600206-4 = "ฮิฮิฮิ... มาแล้วเหรอคะคุณครู! ฉันกำลังรออยู่เลย รอมาชั่วโมงนึงแล้วล่ะ!"
1600206-5 = "เอ๋? ทำไมที่นี่ถึงมีฉันอยู่แค่คนเดียวน่ะเหรอคะ? นั่นน่ะสิ... ทำไมกันนะ"
1600206-6 = "แปลกจังเลย เมื่อกี้ยังมีคนอยู่ด้วยแท้ๆ..."
1600206-7 = "อืม... ทุกคนคงอาจจะยุ่งอยู่ก็ได้ค่ะ มีคนมาถามอะไรสักอย่างแล้วพอฉันจะตอบ เขาก็เผ่นหนีไปเลยค่ะ"
1600206-8 = "[s1] \"...\"\n[s2] \"เข้าใจแล้วล่ะว่าเกิดอะไรขึ้น\""
1600206-9 = "เอ๋? ทำไมเหรอคะคุณครู...? ทำหน้าเหมือนรู้อะไรอยู่เลยนะคะ..."
1600206-10 = "เอ๋? ทำไมเหรอคะคุณครู...? ทำหน้าเหมือนรู้อะไรอยู่เลยนะคะ..."
1600206-11 = "อื้ม! เอาเป็นว่าเรื่องนั้นไม่สำคัญหรอกค่ะ เพราะว่าแขกคนสำคัญของวันนี้ก็คือคุณครูค่ะ"
1600206-12 = "ไม่อยากเชื่อเลยค่ะว่าชีวิตนี้จะเจอเรื่องแบบนี้... ฉันแปลกใจสุดๆ เลยค่ะ"
1600206-13 = "คุณครูเพียงหนึ่งเดียวของเรา! ผู้ที่ช่วยคลี่คลายปัญหาทั้งหมด ผู้ใหญ่ที่เป็นที่ปรึกษาคนเก่งของ#nชาเล่ต์!"
1600206-14 = "และคุณครูคนนั้นก็มีเรื่องอยากจะถามฉันงั้นเหรอ... ไม่อยากเชื่อเลย!"
1600206-15 = "อา... บอกตรงๆ ว่าฉันประทับใจสุดๆ เลยค่ะ เหลือเชื่อจนแทบจะแยกไม่ออกเลยค่ะว่าเป็นความฝัน#nหรือความจริง!"
1600206-19 = "อา..."
1600206-20 = "อ่ะแฮ่ม! อืม... ขอโทษค่ะ คือว่าฉันตื่นเต้นเกินไปหน่อย..."
1600206-21 = "ดูเหมือนคุณครูมาหาฉันเพราะต้องการอะไรบางอย่าง ฉันตื่นเต้นเกินไปแบบนี้คงเสียมารยาทน่าดูเลย... อืม..."
1600206-22 = "ยะ...ยังไงก็ตาม ที่ผ่านมาฉันได้รับความช่วยเหลือจากคุณครูมาตลอด คราวนี้ฉันก็อยากทำประโยชน์#nให้คุณครูบ้างค่ะ"
1600206-23 = "ดังนั้นฉันเลยตั้งใจศึกษาเรื่องต่างๆ มากขึ้นกว่าปกติ! ถ้าเป็นในตอนนี้ละก็... ฉันสามารถอธิบายได้ถึง#nต้นกำเนิดของจักรวาลได้เลยนะคะ!"
1600206-24 = "เอาละค่ะคุณครู! ฉันเตรียมพร้อมแล้ว ถามมาได้เลยค่ะ!"
1600206-25 = "คือเรื่องอะไรเหรอคะ?! ปริศนาที่คุณครูอยากจะรู้?"
1600206-26 = "เรื่องที่คุณครูสงสัย... คือเรื่องอะไรกันคะ?!!"
1600206-27 = "[s3] \"โคโทริทำอะไรเป็นงานอดิเรกเหรอ?\"\n[s4] \"โคโทริชอบอะไรเหรอ?\""
1600206-28 = "อืม...! อย่างนี้เองเหรอคะ! เรื่องง่ายๆ เลยนะคะ"
1600206-29 = "อืม...! อย่างนี้เองเหรอคะ! เรื่องง่ายๆ เลยนะคะ"
1600206-30 = "เรื่องเกี่ยวกับฉันนี่เอง..."
1600206-31 = "คุณครูสงสัยเรื่องเกี่ยวกับฉันเหรอคะ?"
1600206-32 = "ฮิฮิ ถ้าเป็นเรื่องนั้นละก็... "
1600206-36 = "...?"
1600206-37 = "เอ๋...?"
1600206-38 = "เอ๊ะ...?"
1600206-41 = "― [log=코토리]เอะ...เอ๋...!?[/log][wa:1200] "
1600206-43 = "― [log=코토리]ทะ...ทำไมจู่ๆ ถะ...ถึงถามเรื่องนั้นล่ะคะ...!?[/log][wa:2680] "
1600206-46 = "― [log=코토리]ขอโทษนะคะ[/log]"
1600206-48 = "― [log=코토리]คือว่า... ฉันแค่ขอถามอีกรอบได้มั้ยคะ...?[/log][wa:780] "
1600206-51 = "[s5] \"ครูอยากรู้เรื่องของโคโทริน่ะ\"\n[s6] “คือว่าครูไม่ค่อยรู้เรื่องของโคโทริสักเท่าไรเลยน่ะ...”"
1600206-52 = "― [log=코토리]เอ่อ อืม งะ...งั้นเหรอคะ...[/log][wa:2340] "
1600206-53 = "― [log=코토리]เอ่อ อืม งะ...งั้นเหรอคะ...[/log][wa:2340] "
1600206-55 = "― [log=코토리]คือว่า... จะว่ายังไงดีล่ะคะ...[/log][wa:1000] "
1600206-58 = "― [log=코토리]ตะ...แต่ว่า...ทำไมจู่ๆ ถึงถามเรื่องนั้นล่ะคะ...?[/log][wa:2080] "
1600206-60 = "― [log=코토리]คือว่า... มีเหตุผลอื่นหรือเปล่าคะ...[/log][wa:400] "
1600206-63 = "― [log=코토리]อ๊ะ คือว่า...ไม่ได้จำเป็นว่าต้องมีเหตุผลอื่นหรอกนะคะ![/log][wa:1020] "
1600206-65 = "― [log=코토리]นะ... แน่นอนว่าเป็นเรื่องเกี่ยวกับตัวฉัน ฉันก็ต้องรู้อยู่แล้วละค่ะ...![/log][wa:280] "
1600206-68 = "― [log=코토리]คะ...คือว่าระ...เรื่องของฉันงั้นเหรอคะ?![/log][wa:1260] "
1600206-71 = "― [log=코토리]คือว่าปกติแล้ว...ฉันมักจะศึกษาความรู้เรื่องต่างๆ ไว้น่ะค่ะ[/log][wa:1960] "
1600206-73 = "― [log=코토리]หรือไม่ก็จะนั่งคิดถึงคุณครู แล้วก็...![/log][wa:380] "
1600206-76 = "― [log=코토리]อะ...เอ๋? เมื่อกี้นี้ฉันพูดอะไรออกไปน่ะ...?[/log][wa:6860] "
1600206-78 = "― [log=코토리]มักจะศึกษาหาความรู้หลายๆ อย่าง หรือไม่ก็นั่งคิดถึงคุณครูงั้นเหรอ...?[/log][wa:4980] "
1600206-81 = "― [log=코토리]อะ... อะฮ่าฮ่า...[/log][wa:1580] "
1600206-83 = "― [log=코토리]เดี๋ยวค่ะ คือว่าที่พูดไปเมื่อกี้...! คือ... ฮืออออ...!![/log][wa:2240] "
1600206-86 = "อ๊าาาาา! คือ... เอ่อ..."
1600206-87 = "[s7] \"โคโทริ?\"\n[s8] \"เป็นอะไรรึเปล่า?\""
1600206-88 = "ปะ...เปล่าค่ะ คือว่า เอ่อ..."
1600206-89 = "ปะ...เปล่าค่ะ คือว่า เอ่อ..."
1600206-90 = "...ขอ..."
1600206-91 = "[s] \"ขอ...?\""
1600206-92 = "ขอ..."
1600206-93 = "[s] \"ขะ....?\""
1600206-94 = "ขอโทษด้วยค่ะ~~~!!!"
1600206-99 = "[ns] \"...?\""
1600206-101 = "(หลังจากโคโทริวิ่งหนีออกจากห้องไป เธอก็ไม่กลับมาอีกเลย...)"
1600206-102 = "(แต่ไม่นาน โคโทริก็ส่งข้อความมาหาคุณครูว่า \"หลังจากเรียบเรียงข้อมูลเสร็จแล้ว จะส่งเมลมาให้ค่ะ\")"
1600206-103 = "(และลงท้ายไว้ว่า ระยะเวลาที่คาดว่าจะเรียบเรียงข้อมูลเสร็จคือ 'ไม่มีกำหนด')"

[translation]
1600206-1 = "萬全的準備"
1600206-2 = "（來到了千年的學生休息室，現場難得沒什麼人）"
1600206-3 = "（只有亞都梨獨自坐在正中間的座位，滿臉期待地等待著）"
1600206-4 = "呵呵，呵呵呵呵……歡迎你來，老師！#n我在等你哦，一個小時前在這裡等了！！"
1600206-5 = "嗯？休息室為什麼只有我一個人……？"
1600206-6 = "真奇怪……剛剛明明還有其他幾位同學的……"
1600206-7 = "大家似乎都很忙……我才回答完他們的問題，他們就離開了。"
1600206-8 = "[s1] 「……」\n[s2] 「原來如此……」"
1600206-9 = "咦？怎麼了嗎，老師？#n一臉好像明白了什麼的表情……"
1600206-10 = "咦？怎麼了嗎，老師？#n一臉好像明白了什麼的表情……"
1600206-11 = "啊，不過現在重要的不是這個！#n今天最重要的客人是老師才對！"
1600206-12 = "哎呀～居然會有這一天，連我自己都有點驚訝呢！"
1600206-13 = "學生們的諮詢對象、夏萊的顧問、身為大人的老師……！"
1600206-14 = "居然會有想請教我的問題！！"
1600206-15 = "啊～老實說我真的很感動……！#n甚至都要分不清現在到底是不是現實了……！"
1600206-19 = "……啊。"
1600206-20 = "咳哼！不好意思……我有點太興奮了。"
1600206-21 = "老師是為了問我問題而來的對吧？這麼興奮實在有失禮節……"
1600206-22 = "總，總之！平時我總是受到老師的幫助，這次我一定要幫上老師的忙！"
1600206-23 = "為此我比以往讀了更多的書！現在的我甚至能講解宇宙的根源！"
1600206-24 = "那麼，來吧老師！我已經做了萬全的準備，請儘管發問！"
1600206-25 = "老師想知道什麼呢？"
1600206-26 = "不用客氣！請問！"
1600206-27 = "[s3] 「亞都梨的興趣是什麼？ 」\n[s4] 「亞都梨有什麼喜歡的東西嗎？」"
1600206-28 = "哦哦……原來如此！老師想問的問題是這個啊！"
1600206-29 = "哦哦……原來如此！老師想問的問題是這個啊！"
1600206-30 = "也就是說……"
1600206-31 = "老師想知道關於我的事對吧？"
1600206-32 = "呵呵，那當然是──"
1600206-36 = "……"
1600206-37 = "……？"
1600206-38 = "……咦？"
1600206-41 = "― [log=코토리]咦，咦咦……！？[/log][wa:1440] "
1600206-43 = "― [log=코토리]為，為什麼突然，咦，那，那是……！？[/log][wa:3760] "
1600206-46 = "― [log=코토리]不好意思，[/log]"
1600206-48 = "― [log=코토리]以防萬一，可以再問一次嗎……？[/log][wa:1780] "
1600206-51 = "[ns5]「我想要知道關於你的事，亞都梨。」\n[ns6]「我幾乎沒聽你說過自己的事。」"
1600206-52 = "― [log=코토리]咦，啊，唔……原，原來是這樣啊……[/log][wa:2740] "
1600206-53 = "― [log=코토리]咦，啊，唔……原，原來是這樣啊……[/log][wa:2740] "
1600206-55 = "― [log=코토리]那，那個，那該怎麼說呢……[/log][wa:1680] "
1600206-58 = "― [log=코토리]話，話說為何突然想知道那種事呢……？[/log][wa:3280] "
1600206-60 = "― [log=코토리]是不是有什麼理由之類的……[/log][wa:1320] "
1600206-63 = "― [log=코토리]啊，那個，沒理由其實也沒關係啦！[/log][wa:2500] "
1600206-65 = "― [log=코토리]當，當然，畢竟是自己的事，我當然知道……！[/log][wa:2240] "
1600206-68 = "― [log=코토리]那，那個，是，是關於我的事對吧！？[/log][wa:2180] "
1600206-71 = "― [log=코토리]我平常都在那個……像是吸收各種知識，[/log][wa:3560] "
1600206-73 = "― [log=코토리]或是在想老師，然後還有……！[/log][wa:1340] "
1600206-76 = "― [log=코토리]……？咦，我剛剛說了什麼……？[/log][wa:7980] "
1600206-78 = "― [log=코토리]吸收各種知識，或是在想老師……？[/log][wa:7060] "
1600206-81 = "― [log=코토리]啊，啊哈哈……[/log][wa:1980] "
1600206-83 = "― [log=코토리]不對剛才的是那個……！嗚，啊嗚……！！[/log][wa:3680] "
1600206-86 = "啊嗚啊嗚……"
1600206-87 = "[s7] 「那個，亞都梨……？」\n[s8] 「你，你沒事吧……？」"
1600206-88 = "那個，沒，沒事是沒事……"
1600206-89 = "那個，沒，沒事是沒事……"
1600206-90 = "……後……"
1600206-91 = "[s] 「後？」"
1600206-92 = "後……"
1600206-93 = "[s] 「後……？」"
1600206-94 = "……後續請待下回分解！！！"
1600206-99 = "[ns]「……？」"
1600206-101 = "（……亞都梨就這樣猛然衝出教室，再也沒有回來）"
1600206-102 = "（但隨後便收到「等我整理清楚之後，會傳訊息做報告」，#n　這時常在問他問題時收到的MomoTalk訊息）"
1600206-103 = "（少見的是，補充的「預計完成時間」部分寫上了「不明」）"

[translation]
1600206-1 = "#title;준비만전"
1600206-2 = "#na;(잠시 후 밀레니엄의 학생 휴식실에 도착했다. 어째선지 교실은 텅 비어 있었다.)"
1600206-3 = "#na;(코토리만이 그 안에 덩그러니 앉아서 잔뜩 기대하는 얼굴로 기다리고 있었다.)"
1600206-4 = "3;코토리;02;후후후……. 오셨군요, 선생님! 기다리고 있었답니다! 한 시간 전부터!!\n#3;em;[반짝]\n#3;greeting\n#3;a"
1600206-5 = "3;코토리;01;에? 휴식실에 왜 저 밖에 없냐고요? 글쎄요……. 그러게요."
1600206-6 = "3;코토리;05;어라, 이상하다. 분명히 아까 전까지만 해도 몇 분 더 있었는데…….\n#3;stiff"
1600206-7 = "3;코토리;02;흐음……. 뭐, 다들 바쁜 것 같더라고요. 뭐 좀 물어보길래 대답해주니까 사라졌답니다.\n#3;em;[재잘]"
1600206-8 = "[s1] \"…….\"\n[s2] \"그렇군. 상황은 확실히 이해했어.\""
1600206-9 = "3;코토리;01;……에? 왜 그러시죠, 선생님……? 뭔가 깨달으신 듯한 표정…….\n#3;em;[?]"
1600206-10 = "3;코토리;01;……에? 왜 그러시죠, 선생님……? 뭔가 깨달으신 듯한 표정…….\n#3;em;[?]"
1600206-11 = "3;코토리;02;음음! 아무튼 중요한 건 그게 아니죠! 오늘의 가장 중요한 게스트는 선생님이니까요!"
1600206-12 = "3;코토리;01;세상에, 세상에! 살다 보니 이런 날도 다 오고. 스스로도 꽤 놀라고 있다고요!\n#3;em;[재잘]\n#3;m2\n#3;hophop"
1600206-13 = "3;코토리;01;무려 선생님께서! 모두의 해결사이자 상담사이자 샬레의 고문이자 어른이신……!\n#3;em;[재잘]\n#3;m4\n#3;hophop"
1600206-14 = "3;코토리;02;바로 그 선생님께서! 다른 누구도 아닌 저에게 물어보실 게 있다니!!\n#3;em;[반짝]\n#3;m3\n#3;hophop"
1600206-15 = "3;코토리;03;아아……. 솔직히 굉장히 감격스러워요. 꿈인지 현실인지 실감이 잘 가지 않을 정도예요! 이건 정말로……!"

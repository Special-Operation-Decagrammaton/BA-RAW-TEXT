1600206-19 = "3;코토리;03;……아."
1600206-20 = "3;코토리;04;하하. 으흠, 흠! 흠흠……. 죄송합니다. 너무 들떠서 그만…….\n#3;em;[땀]\n#3;stiff"
1600206-21 = "3;코토리;01;선생님께서는 필요하신 게 있으셔서 온 것이실 텐데, 그걸로 신나 하는 것도 예의가 아니겠네요. 으음……."
1600206-22 = "3;코토리;02;아, 아무튼! 아무튼 늘 도움만 받던 저인 만큼, 이번에는 꼭 선생님께 도움이 되고 싶어요.\n#3;hophop"
1600206-23 = "3;코토리;01;그래서 평소보다 더 잡학 공부도 많이 해왔습니다! 지금이라면 우주의 근원에 대해서도 토론할 수 있을 정도로!\n#3;em;[재잘]"
1600206-24 = "3;코토리;02;자, 선생님! 뭐라도 좋아요! 저는 준비가 돼 있습니다!! 질문해 주시죠!"
1600206-25 = "3;코토리;01;무엇이 궁금하신가요!? 선생님께서 알고 싶으신 '미지'!\n#3;jump"

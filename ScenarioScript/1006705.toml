[translation]
1006705-1 = "สถานที่พักผ่อน"
1006705-2 = "ห้องพักผ่อนชาเล่ต์"
1006705-5 = "(คุณครูได้รับข้อความที่ดูผิดปกติจากโทคิ จึงรู้สึกกังวลจนนอนไม่หลับ...)"
1006705-6 = "(มีหลายครั้งที่จะผล็อยหลับ แต่ทุกครั้งก็...)"
1006705-8 = "รหัสประจำตัวซีโร่โฟร์ ตอบ ตำแหน่งปัจจุบันคือ..."
1006705-10 = "[ns] \"โทคิ?!\""
1006705-11 = "(การติดต่อสื่อสารถูกตัดขาดไป และหลังจากนั้น...)"
1006705-16 = "นี่คือรหัสประจำตัวซีโร่โฟร์ ได้ยินแล้วตอบด้วย ที่นั่นคือ..."
1006705-17 = "(เป็นแบบนี้ซ้ำแล้วซ้ำเล่า...)"
1006705-22 = "...รับทราบค่ะ ...คำสั่ง"
1006705-23 = "(แต่จะมีบางครั้งที่...)"
1006705-28 = "กลับมาเชื่อมต่อได้แล้วค่ะ"
1006705-29 = "เอ๋ คุณครู? ทำไมคุณครูถึงได้...?"
1006705-30 = "[s] \"โทคิ! ปลอดภัยดีหรือเปล่า?\""
1006705-32 = "ฉันก็..."
1006705-37 = "[ns] \"สัญญาณตัดไปอีกแล้ว...\""
1006705-40 = "เสร็จสิ้นภารกิจ ทุกคนทำดีมาก......"
1006705-42 = "(คุณครูลองโทรเข้าเบอร์ของโทคิอยู่หลายครั้ง แต่ก็ไม่มีสัญญาณตอบรับ)"
1006705-43 = "(สุดท้ายคุณครูก็เผลอหลับไปแบบที่ตัวเองก็จำไม่ได้ว่าหลับไปได้อย่างไร)"
1006705-48 = "(เสียงนกร้องตอนเช้าทำให้คุณครูสะดุ้งตื่น)"
1006705-49 = "(คุณครูสะลึมสะลือยื่นมือออกไปอย่างไม่ตั้งใจ)"
1006705-58 = "(และรู้สึกถึงความอบอุ่นของใครบางคน...)"
1006705-61 = "― อืม... คุณครู...?[wa:1920] "
1006705-64 = "― มีอะไรเหรอคะ...?[wa:620] "
1006705-66 = "― ทำไมถึง... ทำหน้าแปลกๆ แบบนั้นคะ...?[wa:1580] "
1006705-69 = "[ns] \"ทะ... โทคิ!!!!!!?\""
1006705-70 = "― ถ้าไม่เป็นการเสียมารยาท[wa:1560] "
1006705-72 = "― ฉันขอนอนต่ออีกหน่อยได้มั้ยคะ...?[wa:240] "
1006705-75 = "― คะ? ให้ฉันลุกขึ้นก่อนเหรอคะ?[wa:5700] "
1006705-77 = "― ไม่เอาค่ะ ฉันอยากนอนต่อค่ะ[wa:3400] "
1006705-80 = "― อีกอย่าง เตียงนี่ก็...[wa:2020] "
1006705-82 = "― ทั้งอบอุ่น แล้วก็นุ่มถูกใจฉันมากเลยค่ะ[wa:3420] "
1006705-85 = "― ไม่ว่าคุณครูจะว่ายังไงฉันก็จะนอนต่อค่ะ...[wa:3660] "
1006705-87 = "― งืม... ง่วงจังเลยค่ะ...[wa:2880] "
1006705-91 = "(จากนั้นโทคิก็นอนต่อ)  "
1006705-92 = "(กว่าโทคิจะลืมตาตื่นมาก็เลยเวลาเที่ยงไปแล้ว...)"
1006705-97 = "......"
1006705-98 = "[s] \"ถ้างั้นครูขอถามได้มั้ยว่าทำไมถึงมานอนที่นี่?\""
1006705-99 = "ถามแปลกๆ นะคะคุณครู ก็ที่นี่มันมีเตียงยังไงล่ะคะ"
1006705-100 = "[s] \"ขอคำตอบที่มันดูจริงจังและจริงใจกว่านี้หน่อยได้มั้ย?\""
1006705-101 = "ฉันอธิบายให้ฟังก็ได้ค่ะ พอดีฉันเสร็จภารกิจตอนดึกและกำลังเดินทางกลับ"
1006705-102 = "แล้วก็เห็นว่าสำนักงานชาเล่ต์ยังเปิดไฟอยู่ ก็เลยรู้สึกสงสัยขึ้นมาค่ะ"
1006705-103 = "[s] \"อ้อ... แต่ว่าประตูน่าจะปิดอยู่นะ...?\""
1006705-104 = "คุณครู ฉันเป็นสมาชิก C&C นะคะ"
1006705-105 = "[s] \"อื้อ...\""
1006705-106 = "เอาเถอะค่ะ พอฉันเข้ามาในสำนักงาน สิ่งที่เห็นก็คือคุณครูที่กำลังนอนหลับอยู่ทั้งๆ ที่ยังไม่ได้ปิดไฟค่ะ"
1006705-125 = "ในเมื่อฉันเป็นทั้งสุดยอดสายลับและเมดที่สมบูรณ์แบบ ก็เลยคิดจะไปจัดเตียงที่ยุ่งเหยิงของคุณครูให้#nยังไงล่ะคะ"
1006705-126 = "แต่พอทำเสร็จ ฉันก็เผลอหลับไปแบบไม่รู้ตัว คงเพราะมันดึกมากแล้ว แล้วภารกิจที่ทำมาก็เหนื่อยเอา#nการด้วยค่ะ"
1006705-127 = "แต่สิ่งที่สำคัญก็คือการที่ฉันรู้สึกง่วงเป็นเรื่องธรรมชาติจริงๆ ค่ะ"
1006705-128 = "อีกทั้งสิ่งที่อยู่ตรงหน้าฉันก็เป็นเตียงนอนที่จัดไว้อย่างดีแล้วด้วย"
1006705-129 = "แล้วฉันจะทำอะไรได้อีกล่ะคะ?"
1006705-130 = "[s] \"เธอก็เลย... นอนหลับที่นี่เหรอ?\""
1006705-131 = "ค่ะ"
1006705-132 = "หลับเต็มตื่นเลยค่ะ สบายจนอยากจะชื่นชมคุณครูเลย"
1006705-133 = "[s1] \"อืม... ขอบใจนะ...\"\n[s2] \"แต่จะมานอนบนเตียงคนอื่นตามใจไม่ได้นะ...\""
1006705-136 = "ฉันบอกไปแล้วนี่คะว่าที่หลับไปเพราะง่วง ไม่ได้มีเหตุผลอื่นนะคะ"
1006705-137 = "[s] \"งั้นถ้าง่วงบนเตียงคนอื่น โทคิก็นอนตรงนั้นเลยเหรอ?\""
1006705-138 = "...!"
1006705-142 = "เดี๋ยวนะคะคุณครู ขอเวลาคิดหน่อยค่ะ"
1006705-143 = "[s] \"หืม? ก็ได้...\""
1006705-149 = "(โทคินิ่งเงียบไปพักหนึ่ง)"
1006705-150 = "(คุณครูกำลังจะบอกไปว่านั่นไม่ใช่เรื่องที่ต้องคิดนานๆ เลย แต่ระหว่างนั้นเอง...)"
1006705-151 = "ไม่ได้ค่ะ แต่ก็ไม่เข้าใจเลยค่ะ"
1006705-152 = "[s] \"หมายความว่ายังไงน่ะ...?\""
1006705-153 = "ฉันลองคิดดูหลายครั้งแล้ว ยังไงฉันก็ไม่ชอบการนอนบนเตียงของคนอื่นค่ะ"
1006705-154 = "แต่ว่า... ฉันไม่เข้าใจตัวเองเลยค่ะว่าทำไมถึงไม่ชอบ"
1006705-155 = "คุณครูคะ ทำไมพอเป็นเตียงของคุณครูแล้วฉันถึงไม่เป็นไร แต่ถ้าเป็นเตียงของคนอื่นฉันถึงไม่ชอบล่ะคะ?"
1006705-156 = "[s] \"มะ... ไม่รู้สิ\""
1006705-157 = "คุณครูเองก็ไม่รู้เหมือนกันสินะคะ"
1006705-158 = "เอาเป็นว่า ช่างมันเถอะค่ะ จบคำถามนี้แค่นี้แล้วกัน"
1006705-159 = "[s] \"ถอดใจเร็วเกินไปหรือเปล่า?!\""
1006705-160 = "ฉันไม่อยากเสียเวลามากเกินไปให้กับปัญหาที่คิดเท่าไรก็หาทางออกไม่ได้ค่ะ มันไม่ได้อะไรขึ้นมานี่คะ"
1006705-161 = "อีกอย่าง ตอนนี้ฉันเพิ่งรู้ว่าตัวเองมีปัญหาที่สำคัญกว่านั้นค่ะ"
1006705-162 = "[s] \"ปัญหา... อะไรเหรอ?\""
1006705-163 = "นี่เป็นปัญหาใหญ่และสำคัญมากค่ะ"
1006705-164 = "นั่นก็คือ ตอนนี้ฉันไม่มีอะไรทำค่ะ"
1006705-165 = "[ns] \"ไหนว่าปัญหาใหญ่และสำคัญไง!\""
1006705-166 = "คุณครูไม่เข้าใจสินะคะว่านี่มันเป็นเรื่องสำคัญมากแค่ไหน"
1006705-167 = "คุณครูคะ ถ้าคนเราไม่มีอะไรทำ ก็จะเบื่อตายเอานะคะ อาจเฉาตายได้ทั้งทางจิตใจและร่างกายเลยค่ะ"
1006705-168 = "เพราะฉะนั้นในฐานะครู คุณครูมีหน้าที่ต้องรับผิดชอบนักเรียนที่กำลังจะเฉาตายเพราะความเบื่อค่ะ"
1006705-169 = "หาอะไรทำกับฉันหน่อยนะคะ นี่เป็นเรื่องสำคัญมากนะคะ"
1006705-170 = "[s] \"จริงจังมั้ยเนี่ย...?\""
1006705-176 = "ฉันจริงจังตลอดค่ะ"
1006705-178 = "(ท่าทีที่มั่นใจของโทคิทำเอาคุณครูอึ้งจนพูดไม่ออก...)"
1006705-179 = "(แต่วันนั้นคุณครูกับโทคิก็ใช้เวลาด้วยกันอย่างสนุกสนาน)"

[translation]
1006705-1 = "讓心靈休息的場所"
1006705-2 = "夏萊．休息室"
1006705-5 = "（因為擔心季的安危，實在睡不太著）"
1006705-6 = "（雖然睡意曾數次浮現，然而每到這個時候……）"
1006705-8 = "這裡是代號Zero Four。#n目前位置是……"
1006705-10 = "[ns]「季！？」"
1006705-11 = "（通訊很快遭到切斷，過了一會……）"
1006705-16 = "這裡是代號Zero Four。#n聽到……請回……"
1006705-17 = "（聲音總是斷斷續續……）"
1006705-22 = "……我知道了。#n接下來……"
1006705-23 = "（就這樣，不知道在第幾次……）"
1006705-28 = "──線路恢復了。"
1006705-29 = "……咦，老師為什麼會？"
1006705-30 = "[s]「季！發生什麼事了！？」"
1006705-32 = "我……"
1006705-37 = "[ns]「又斷掉了……」"
1006705-40 = "任務完……大家辛苦……"
1006705-42 = "（數次嘗試撥打電話，卻只收到以季的聲音錄製的無法回應的訊息）"
1006705-43 = "（黎明時應該還醒著，卻在不知不覺間睡著了）"
1006705-48 = "（在鳥鳴聲中，迷迷糊糊地醒了過來）"
1006705-49 = "（就在睡眼惺忪地將手伸向棉被，試圖抱在懷裡時……）"
1006705-58 = "（卻不知為何感受到了柔軟肌膚的溫暖……）"
1006705-61 = "― 嗯……老師……？[wa:2280] "
1006705-64 = "― 您怎麼了……？[wa:980] "
1006705-66 = "― 露出那種奇怪的表情……？[wa:2540] "
1006705-69 = "[ns]「季，季同學學學學學學！？」"
1006705-70 = "― 方便的話，[wa:2280] "
1006705-72 = "― 我可以再睡一下嗎？[wa:1160] "
1006705-75 = "― 嗯嗯……？總之先起來……？[wa:6300] "
1006705-77 = "― ……不要。我還想睡。[wa:4040] "
1006705-80 = "― 而且這張床……[wa:2620] "
1006705-82 = "― 既溫暖，又柔軟，我很喜歡。[wa:4420] "
1006705-85 = "― 不管老師說什麼，我都要睡覺……[wa:4700] "
1006705-87 = "― 唔唔……好睏……[wa:3480] "
1006705-91 = "（在那之後，季也沒有要醒來的意思……）"
1006705-92 = "（等他睜開眼睛，已經是中午過後了）"
1006705-97 = "……"
1006705-98 = "[s]「……為什麼會睡在我旁邊呢？」"
1006705-99 = "老師偶爾會問一些不可思議的問題呢。#n當然是因為床就在那裡。"
1006705-100 = "[s]「就算你用像登山家會說的話回答也……」"
1006705-101 = "真拿您沒辦法，我就向您說明吧。#n深夜完成任務後，正打算回去時……"
1006705-102 = "因為夏萊辦公室的燈還開著，覺得在意就過來了。"
1006705-103 = "[s]「那個……我沒有關門嗎？」"
1006705-104 = "老師，我可是C&C。"
1006705-105 = "[s]「……嗯，說的也對。」"
1006705-106 = "走進辦公室時最先看見的，是燈都沒關就趴在桌上的老師。"
1006705-125 = "我是完美女僕的同時也是最棒的特務，這點老師也很清楚吧。#n因此，把老師搬到床上也是理所當然的。"
1006705-126 = "因為這次的任務難度有點高，此外，時間又到了深夜……"
1006705-127 = "即使是我，也處於極度想睡的狀態。"
1006705-128 = "就在這時……我的面前竟然出現了一張彷彿很希望我躺下的床。"
1006705-129 = "沒有其他選項了吧？"
1006705-130 = "[s]「所以……就睡在我旁邊了。」"
1006705-131 = "是的。"
1006705-132 = "順帶一提，睡起來真是棒極了。值得迅速誇獎。"
1006705-133 = "[s1]「嗯……謝謝……」\n[s2]「下次不能隨便潛入了哦。」"
1006705-136 = "今天是因為實在太想睡了。"
1006705-137 = "[s]「想睡的話，在哪都能睡嗎？」"
1006705-138 = "……！"
1006705-142 = "請等一下，老師。#n請給我一點思考時間。"
1006705-143 = "[s]「咦，嗯……」"
1006705-149 = "（過了一會……）"
1006705-150 = "（正想說沒必要那麼認真地思考這件事的時候……）"
1006705-151 = "並不是……在哪都能睡。#n……但是，我也不是很清楚。"
1006705-152 = "[s]「怎麼說呢……？」"
1006705-153 = "無論想了幾次，我都對在其他人的床上睡覺這件事有所抗拒。"
1006705-154 = "但是為何會有這種感覺，我自己也不清楚。"
1006705-155 = "還有……為什麼對老師就不會呢？"
1006705-156 = "[s]「為，為什麼呢……？」"
1006705-157 = "老師您也不清楚啊。"
1006705-158 = "那……這個問題就到此為止吧。"
1006705-159 = "[s]「會不會放棄得太快了！？」"
1006705-160 = "花時間思考想不出答案的問題也無濟於事。#n這麼做沒有效率。"
1006705-161 = "而且我注意到了遠比這件事更重要的問題。"
1006705-162 = "[s]「有那麼重要的問題？」"
1006705-163 = "是的，是個非常重要……且重大的問題。"
1006705-164 = "那就是，我現在很閒。"
1006705-165 = "[ns]「不是重要又重大嗎！？」"
1006705-166 = "老師不理解這件事的重要性嗎？"
1006705-167 = "有句話說無聊會殺死兔子──不玩的話就會死掉的。"
1006705-168 = "老師不理我的話……我就待到您改變心意為止。"
1006705-169 = "還是說，老師您──是故意這麼做的呢？"
1006705-170 = "[s]「……是開玩笑嗎？」"
1006705-176 = "我有開過玩笑嗎？"
1006705-178 = "（對季理直氣壯的態度感到不知所措，但是……）"
1006705-179 = "（這天和季兩人度過了快樂的時光）"

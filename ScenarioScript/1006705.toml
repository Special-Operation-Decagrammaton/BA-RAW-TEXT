[translation]
1006705-1 = "Place of Rest"
1006705-2 = "Schale Lounge"
1006705-5 = "Toki's message seemed serious, and I was restless."
1006705-6 = "Every time I decided to give up and go to sleep..."
1006705-8 = "This is call sign Zero-Four. My location is..."
1006705-10 = "[ns] \"Toki?!\""
1006705-11 = "Toki's signal constantly phased in and out."
1006705-16 = "From call sign Zero-Four, do you copy? Is your location..."
1006705-17 = "Continuously, and intermittently..."
1006705-22 = "...Affirmative. What is your command?"
1006705-23 = "And finally..."
1006705-28 = "Connection secured."
1006705-29 = "Um, Sensei? How did you...?"
1006705-30 = "[s] \"Toki! Are you okay?\""
1006705-32 = "Of course, I..."
1006705-37 = "[ns] \"It disconnected again...\""
1006705-40 = "Mission complete. Great job, everyone..."
1006705-42 = "I called Toki a few times, but it kept going to voicemail."
1006705-43 = "I drifted in and out of sleep all night, until I finally drifted off, still trying to call her."
1006705-48 = "I woke up to the sound of birds chirping."
1006705-49 = "Absentmindedly reaching out in my sleep..."
1006705-58 = "I felt the warmth of someone nearby me."
1006705-61 = "― Hmm...? Sensei...?[wa:1880] "
1006705-64 = "― What's wrong...?[wa:620] "
1006705-66 = "― Why are you making that face...?[wa:1740] "
1006705-69 = "[ns] \"T-Toki!!???\""
1006705-70 = "― If everything's fine,[wa:1640] "
1006705-72 = "― I'm going to sleep a bit longer...[wa:160] "
1006705-75 = "― Eh? You're still trying to get me to wake up?[wa:5020] "
1006705-77 = "― ...No thank you. I'm going back to sleep.[wa:2800] "
1006705-80 = "― Besides, this bed[wa:2220] "
1006705-82 = "― is so warm and soft... I like it...[wa:3540] "
1006705-85 = "― So... Say what you want, Sensei... I'm gonna...sleep...[wa:3100] "
1006705-87 = "― So...sleepy...[wa:3240] "
1006705-91 = "Despite my protests, Toki fell asleep quickly."
1006705-92 = "She slept in well past noon..."
1006705-97 = "..."
1006705-98 = "[s] \"Can I ask why you were sleeping here?\""
1006705-99 = "You ask the obvious. It's because the bed was there."
1006705-100 = "[s] \"'Because it's there' isn't a good answer in this case!\""
1006705-101 = "Well, for more context, I was coming back from a mission, late at night."
1006705-102 = "The lights were on in the Schale office, so I was concerned."
1006705-103 = "[s] \"Umm... The doors should have been locked by then?\""
1006705-104 = "Sensei, I'm a member of C&C."
1006705-105 = "[s] \"...Okay.\""
1006705-106 = "Anyways, I came to the office and saw you asleep, with the lights on and a mess all around you."
1006705-125 = "As the best agent as well as a perfect maid myself, it only made sense for me to make the bed for you."
1006705-126 = "But after that, I started feeling really sleepy. It was late, and the mission was not an easy one."
1006705-127 = "It was only natural for me to feel sleepy."
1006705-128 = "And there was a bed there, looking so perfect and inviting..."
1006705-129 = "What could I have done?"
1006705-130 = "[s] \"So that's why you fell asleep here?\""
1006705-131 = "Yes."
1006705-132 = "And, it was really comfortable sleeping here. I must give my compliments."
1006705-133 = "[s1] \"Well, thank you... But still!\"\n[s2] \"You can't just sleep in someone else's bed...\""
1006705-136 = "Once again, I only fell asleep because I was sleepy."
1006705-137 = "[s] \"Then, are you going to sleep in just anyone's bed whenever you're sleepy?\""
1006705-138 = "...!"
1006705-142 = "Give me a second to think, Sensei."
1006705-143 = "[s] \"Huh? Um, okay...\""
1006705-149 = "Toki was silent for a long time."
1006705-150 = "...And just as I was about to tell her it wasn't meant to be such a serious question..."
1006705-151 = "I... don't want to. But I don't know."
1006705-152 = "[s] \"What do you mean...?\""
1006705-153 = "I don't feel like I'd sleep in others' beds, despite thinking about it multiple times."
1006705-154 = "But... I don't know why."
1006705-155 = "Sensei, why is it okay if it's yours, but not for others?"
1006705-156 = "[s] \"W-Well, I don't know?\""
1006705-157 = "So you don't know, either."
1006705-158 = "Well, that's okay. Let's not think about it, then."
1006705-159 = "[s] \"You gave up so fast?!\""
1006705-160 = "But I don't want to spend too much time on something that doesn't need to be solved. It's inefficient."
1006705-161 = "And I have a much more serious issue right now."
1006705-162 = "[s] \"...What is it?\""
1006705-163 = "It's a very important and major issue."
1006705-164 = "I am bored."
1006705-165 = "[ns] \"'Important and major' you said!? Excuse me!?\""
1006705-166 = "You don't understand. It's an important matter."
1006705-167 = "A person can die of boredom. Both mentally and physically."
1006705-168 = "So, you have your responsibility to help a dying student in front of you."
1006705-169 = "So please play with me. It's an important matter."
1006705-170 = "[s] \"Are you serious?\""
1006705-176 = "I am always serious."
1006705-178 = "I was left speechless for a moment by Toki's self-assured logic..."
1006705-179 = "But, regardless, I enjoyed spending the remainder of the day with Toki."

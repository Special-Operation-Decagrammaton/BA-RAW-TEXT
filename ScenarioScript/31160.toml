31160-10 = "5;아즈사;01;효율을 추구할 뿐이야. 다 같이 씻으면 여러 가지 장점이 많으니까. 물도 절약할 수 있고.\n#5;m5"
31160-11 = "5;하나코;02;어머…… 그러네요……. 저희는 대욕탕 같은 건 없으니까. 모두 다 함께 씻는다, 라는 이벤트는 좀처럼 없을 것 같지만……."

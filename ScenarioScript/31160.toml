[translation]
31160-1 = "第16話;小さな隙間"
31160-2 = "ふぅ、スッキリしました！"
31160-3 = "もうお風呂に入ったんだ、早いねヒフミ。"
31160-4 = "うふふ、そうですよね。なにせヒフミちゃん朝にシャワーを浴びれず、今日一日あるがままの香りで――"
31160-5 = "わわっ！そ、その言い方は恥ずかしいです……っ！うう、寝坊さえしなければ……。"
31160-6 = "……でも、それは私たちのために模試を準備していたからだ。"
31160-7 = "ごめん、ヒフミ。もし明日の朝も起きるのが辛かったら言って。今度はヒフミの身体を洗ってあげる。"
31160-8 = "い、いえ、それは遠慮させていただこうかと……！？"
31160-9 = "自分で洗えば良いでしょ！子どもじゃないんだから！"
31160-10 = "効率の問題だ。みんなで洗うことによる利点は少なくない。もちろん水の節約にもなる。"
31160-11 = "大浴場は無いので、みんなで一心不乱に洗いっこというイベントはちょっと難しいようですが……"
31160-12 = "あ、良いことを思いつきました。今度お風呂代わりに、みんな裸でプールに飛び込むのはどうでしょう？"
31160-13 = "さらっと何言ってんの！？ダメ！そんなすごいの絶対禁止っ！！"
31160-14 = "悪くない案だと思うけど、それをプールでやるメリットがあるのか？"
31160-15 = "解放感があると思いませんか？青空の下、全てをさらけ出して掛け合う様子を想像するだけで……うふふ♡"
31160-16 = "なるほど、そういうのは確かに考えてなかった。解放感、か……"
31160-21 = "バカバカバカバカ！！考えちゃダメ想像しちゃダメそういうのはダメっ！"
31160-26 = "アズサを変な風に染めるな！トリニティの変態はあんただけで十分だから！！"
31160-27 = "そういえばコハルちゃんも全裸で泳ぎたい派ですよね？"
31160-28 = "脈絡全無視！？無敵なの！？そっ、そもそもそんなこと言ってないから！プールでは普通に水着！それが正義なの！あんただって昨日はちゃんと着てたじゃん！"
31160-29 = "あら……？"
31160-34 = "よく思い出してみてください、コハルちゃん。私が昨日プールで着ていたものを……"
31160-35 = "え、あ、あの水着が何……？"
31160-41 = "あれは、本当に[wa:1500] [ruby=・]水[/ruby][wa:1000] [ruby=・]着[/ruby][wa:1000] だったと思いますか……？"
31160-42 = "！？！！？"
31160-43 = "み、水着じゃなかったら何なのよ……！？"
31160-45 = "最近の下着はデザインがかなり充実していますし、一目で水着かどうかの判断は難しいと思いませんか？それに、ペイントという線も……♡"
31160-46 = "……！？！？"
31160-47 = "え、嘘！？って、いうことは……！？"
31160-48 = "あら、どうしたんですか？"
31160-49 = "あれがもし水着じゃなかったとして、何かが変わってしまうんでしょうか？ねえ、コハルちゃん？"
31160-50 = "え、だ、だって……"
31160-51 = "例えば、水着と下着の違い……それは何でしょう？防水機能？お肌の保護？デザイン？露出の範囲？"
31160-52 = "コハルちゃんは見た目で分からなかったですよね？あの場、あの時は、それは「水着」だと信じられていましたよね？"
31160-53 = "……？？？"
31160-54 = "実はあれが下着だったとして……その「真実」かもしれない何かは、どうすれば証明できるのでしょう？"
31160-55 = "証明できない真実ほど無力なものは無い……そう思いませんか？"
31160-56 = "な、なに言ってるのかわかんない……け、結局どういうこと！？"
31160-57 = "あの水着可愛かったですよね、というお話です♡"
31160-58 = "……はぁ！？全部冗談！？"
31160-59 = "……なるほど、五つ目のあれか。"
31160-60 = "……！"
31160-61 = "五つ目……？えっと、アズサちゃん、何のお話ですか……？"
31160-62 = "……。"
31160-66 = "ただの聞いた話だけど……キヴォトスに昔から伝わる七つの古則。確か、その内の五つ目だったはず。"
31160-67 = "「楽園に辿り着きし者の真実を、証明することはできるのか」……そんな感じだった気がする。残りは知らないけれど。"
31160-68 = "つまり、誰も証明できない楽園は存在し得るのか……そういう禅問答みたいなものだったと記憶してる。"
31160-69 = "アズサちゃん、どうしてそれを……。"
31160-70 = "その話を知ってるのは……"
31160-71 = "もしかしてアズサちゃん、セイアちゃんに会ったことがあるんですか……！？"
31160-72 = "……。"
31160-74 = "……セイア？"
31160-75 = "それって、ティーパーティーのセイア様のことですか……？"
31160-76 = "……。"
31160-77 = "……分からない。この話はただ、どこかで聞いた記憶があるだけで……。"
31160-78 = "……。"
31160-79 = "そうでしたか……そういえばアズサちゃんは転校生、でしたね……。"
31160-80 = "vanitas vanitatum……ということは……"
31160-84 = "……いえ、何でもありません。もう遅い時間ですし、そろそろ寝た方が良さそうですね。"
31160-88 = "では、今日も一日お疲れ様でした！"
31160-91 = "先生の部屋"
31160-93 = "その日の夜……"
31160-94 = "……先生。"
31160-95 = "ハナコちゃんのこと、なのですが……。"
31160-96 = "[s] \"………。\""
31160-97 = "……模範解答を集めている最中に、なぜか束になって保管されていたんです。珍しいことだから保管されていたのか、その理由は分かりませんが……。"
31160-98 = "昨年の試験、1年生から3年生までの全ての試験における解答用紙が、まとまっていました。どういうわけか、その全てを回答した方がいたようでして……"
31160-99 = "[s] \"それが……。\""
31160-102 = "……はい、ハナコちゃんでした。"
31160-104 = "昨日見つけた1年生の時の成績に引き続き、盗み見る形になってしまったのですが……。"
31160-105 = "ハナコちゃんは去年の1年生の段階で、3年生の秀才クラスでも難しいとされる課程を含めて「全ての試験」で満点を出しています……完膚なきまでに秀才、と言えるレベルです……。"
31160-106 = "1年生の分の試験結果を見て、ハナコちゃんはきっと「今年になって急に成績が落ちてしまったんだ」と思っていました。でも、この結果を見る限りそうではなく……。"
31160-107 = "[s] \"去年の段階で、どんな問題でも解けてるはず。つまり……\""
31160-108 = "……はい。ハナコちゃんは今……わざと試験に落ちているとしか思えません……。"
31160-109 = "ハナコちゃん……どうして……。"
31160-111 = "合宿所・ロビー"
31160-116 = "……。"
31160-123 = "……。"
31160-124 = "アズサちゃん、また見張りを……？"
31160-125 = "……。"
31160-129 = "ふぁ……。"
31160-130 = "……おはようございます。"
31160-133 = "……よし。"
31160-134 = "……。"
31160-135 = "んん……？"
31160-136 = "（……あれ？そういえば今朝から、先生が見当たらないような……）"
31160-137 = "（いったいどこに……？）"
31160-139 = "合宿所・プール"
31160-140 = "わぁっ、水が入ってるー！"
31160-141 = "あはっ、ここに水が入ってるのなんて久しぶりに見たなー。もしかしてこれから泳ぐの？それともみんなでプールパーティー？"
31160-142 = "[s] \"お待たせ。用件を聞いても良いかな？\""
31160-143 = "……えへへ。"
31160-149 = "先生は上手くやってるかな、って思って。"
31160-151 = "次回;トリニティの裏切り者"

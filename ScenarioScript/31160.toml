[translation]
31160-1 = "第16話;小小的閒隙"
31160-2 = "呼，舒暢多了！"
31160-3 = "這麼快就洗完澡了啊，日步美。"
31160-4 = "唔呵呵，畢竟日步美醬今天一整天都沒有洗澡……"
31160-5 = "啊，啊嗚！請別那麼說，我會很害羞的……要是沒睡過頭的話……"
31160-6 = "……是為了替我們準備模擬測驗的關係吧。"
31160-7 = "抱歉，日步美。如果明天早上也起不來的話跟我說一聲。#n我會幫日步美洗身體。"
31160-8 = "咦？沒，沒關係的！梓醬……！？"
31160-9 = "自己洗就好了吧！又不是小孩子！"
31160-10 = "這是效率問題。#n大家一起洗有不少優點，當然也能節約用水。"
31160-11 = "哎呀，這麼說也有道理……#n不過這裡並沒有大浴場，大家一起洗澡的活動可能有點難出現……"
31160-12 = "既然如此，下次大家一起全裸跳進泳池怎麼樣？就當成是代替洗澡！"
31160-13 = "你在說什麼啊！禁止禁止！絕對禁止！！"
31160-14 = "我倒不是很介意，不過那麼做有意義嗎？#n而且泳池是禁止洗澡的吧？"
31160-15 = "不覺得有開放感嗎？光是想像就覺得很開心……唔呵呵♡"
31160-16 = "原來如此，開心啊……我從沒這麼想過。#n唔嗯……開放感……"
31160-21 = "笨蛋笨蛋笨蛋笨蛋！！不准思考不准想像那種事不行！"
31160-26 = "不要讓梓學壞啦！三一的變態有你一個人就夠了！！"
31160-27 = "咦？可是小春醬也是裸泳派的，應該很了解不是嗎？"
31160-28 = "才沒有那種派！在泳池就該穿泳裝！那就是正義！除此之外的都要處刑！死刑！"
31160-29 = "唔嗯……既然如此……"
31160-34 = "小春醬，我昨天在泳池穿的比基尼……"
31160-35 = "那，那個泳裝怎麼了嗎……？"
31160-41 = "那[wa:1800]真的是[wa:1830][ruby=．]泳[/ruby][wa:660][ruby=．]裝[/ruby][wa:800]嗎……？"
31160-42 = "！？"
31160-43 = "不，不是泳裝的話……那……那是！？"
31160-45 = "最近內衣的設計十分豐富，乍看之下就像泳裝一樣的款式也不少哦♡"
31160-46 = "……！？！？"
31160-47 = "什，什麼！？那不是泳裝嗎！？也，也就是說……！？"
31160-48 = "哎呀，為什麼這麼動搖呢？"
31160-49 = "假如我說那不是泳裝的話，會有什麼改變嗎？吶，小春醬？"
31160-50 = "嗯……？"
31160-51 = "話說……泳裝和內衣的差別究竟是什麼呢？#n防水機能？肌膚的保護？設計？露出的範圍？"
31160-52 = "光從外表是看不出來的對吧？#n而且當時大家也都相信那就是「泳裝」。"
31160-53 = "……？？？"
31160-54 = "就算我說那真的是內衣……那個「真相」又該如何證明呢？"
31160-55 = "沒有什麼是比無法證明的真相還無力的……你不這麼覺得嗎？"
31160-56 = "不，不知道你在說什麼……所以到底是怎樣！？"
31160-57 = "唔呵呵♡其實那是泳裝唷。#n抱歉，因為覺得有趣就開了點玩笑……"
31160-58 = "……原，原來只是玩笑！？"
31160-59 = "不，花子所說的是關於第五項的話題吧。"
31160-60 = "……！？"
31160-61 = "第五項……？#n梓醬，那是什麼意思……？"
31160-62 = "……"
31160-66 = "是我聽說過的……奇普托斯自古流傳的七項古則。#n記得是那之中的第五項吧。"
31160-67 = "「抵達樂園之人的真相，是否能夠證明」……內容大概就是這樣。"
31160-68 = "簡單來說就是「誰也無法證明的樂園是否存在」……類似這樣的禪修問答。"
31160-69 = "梓醬，你是怎麼……"
31160-70 = "知道那件事的應該……"
31160-71 = "梓醬，難道你有和聖亞醬見過面嗎……！？"
31160-72 = "……"
31160-74 = "……聖亞？"
31160-75 = "聖亞指的是茶會的聖亞大人嗎……？"
31160-76 = "……"
31160-77 = "不，我並不知道他是誰。#n這些只是從某個地方聽來的。"
31160-78 = "……"
31160-79 = "這樣啊……因為梓醬是轉學生……如果是在三一以外的地方……"
31160-80 = "vanitas vanitatum……也就是說……"
31160-84 = "……不，沒什麼。#n時間也不早了，為了明天著想還是早點休息吧。"
31160-88 = "今天也辛苦大家了！"
31160-91 = "老師的房間"
31160-93 = "（當天深夜）"
31160-94 = "……嗯，這樣就能確定了，老師。"
31160-95 = "花子醬他是……"
31160-96 = "[s]「……」"
31160-97 = "……這是我為了準備模擬測驗，調查去年的模範解答時得知的事實。"
31160-98 = "從1年級到3年級──所有測驗的模範解答都來自同一個人……"
31160-99 = "[s]「那個人就是……」"
31160-102 = "……是的，就是花子醬。"
31160-104 = "雖然並非本意，不過從結果來說確實是偷窺了花子醬的成績……"
31160-105 = "去年的花子醬可說是天才中的天才，#n即使是在3年級的秀才班級也能輕鬆在所有科目拿下滿分……"
31160-106 = "而花子醬的成績突然下滑是在升上2年級之後……"
31160-107 = "[s]「也就是說，花子從那之後就一直……」"
31160-108 = "是的……花子醬他……是故意考不及格的……"
31160-109 = "花子醬……為什麼要這麼做呢……啊嗚……"
31160-111 = "合宿處．大廳"
31160-116 = "……"
31160-123 = "……"
31160-124 = "梓醬……又睡不著了嗎……？"
31160-125 = "……"
31160-129 = "呼啊……"
31160-130 = "大家早安。"
31160-133 = "（唰唰）……"
31160-134 = "……"
31160-135 = "嗯……"
31160-136 = "（好像從早上開始就沒看見老師……）"
31160-137 = "（老師他會去哪裡呢……）"
31160-139 = "合宿處．泳池"
31160-140 = "哇啊，有水耶！"
31160-141 = "啊哈哈，很久沒看見這裡有水了呢。#n接下來要游泳嗎？還是大家一起開泳池派對？"
31160-142 = "[s]「找我有什麼事嗎？」"
31160-143 = "……嘿嘿嘿，嗯。"
31160-149 = "我有點好奇老師過得好不好～"
31160-151 = "下一話;三一的叛徒"

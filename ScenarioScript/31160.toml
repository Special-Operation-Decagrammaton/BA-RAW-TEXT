31160-55 = "What's the point in being told a truth that you can't trust or prove for yourself?"
31160-56 = "S-Stop talking in circles! Which is it?! "
31160-57 = "Heeheehee! It was a swimsuit. Sorry, it's just so fun teasing you. I can't help myself. ♥"
31160-58 = "Y-You just wanted to tease me the whole time?!"
31160-59 = "Now I understand. Hanako was alluding to the fifth koan."
31160-60 = "...?!"
31160-61 = "The fifth...what? What are you talking about?"
31160-62 = "..."
31160-66 = "It's something I've heard about in passing—Kivotos' seven koans that date back to ancient times. I believe she was referring to the fifth one."
31160-67 = "\"Can we prove anyone has ever reached paradise?\"#nThat's how I remember it, but I can't say I know the rest."
31160-68 = "It's a rhetorical question meant to ponder the existence of paradise if no one alive has ever seen it."
31160-69 = "I'm surprised you knew that. "

31160-78 = "..."
31160-79 = "That's right, you were a transfer student. So if you didn't hear it at Trinity..."
31160-80 = "\"Vanitas vanitatum...\" Could it be...the satellite school?"
31160-84 = "Forget I said anything. It's already getting pretty late, so we should get some sleep."
31160-88 = "Good night, everyone!"

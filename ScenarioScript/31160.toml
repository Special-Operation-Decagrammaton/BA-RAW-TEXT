[translation]
31160-1 = "Episode 16;Crack in the Surface"
31160-2 = "Ahhh! I feel so much better now!"
31160-3 = "Showered already? It's still early."
31160-4 = "Are you forgetting? Hifumi slept in so long this morning that she didn't get the chance to take a shower."
31160-5 = "H-Hey! You don't have to say it out loud... It's embarrassing. "
31160-6 = "You only slept in because you were up late last night preparing our mock exam. You aren't the one who should be ashamed."
31160-7 = "If anything, I regret letting you down after all of your effort. Let me know if you would like to sleep in tomorrow as well. I'd be more than happy to help you wash up in the morning to save time."
31160-8 = "Wh-What? That's okay, I think I'll manage!"
31160-9 = "She can wash herself! She's not a child!"
31160-10 = "I know—I'm simply trying to be efficient. There are several advantages to bathing together, such as water conservation."
31160-11 = "She has a good point, but it's not like we have a luxurious bathhouse where we can all spread out and get to know each other better."
31160-12 = "Oh, I know. What if instead we all went skinny dipping in the pool next time? It'll be just as good as a bathhouse!"
31160-13 = "That doesn't make sense at all! Prohibited! Completely prohibited!"
31160-14 = "I don't particularly mind, but what advantage would there be? Swimsuits are required for the school pool."
31160-15 = "Think about how liberating it would feel...and so much fun! Heehee! ♥"
31160-16 = "Enjoyment? I hadn't considered that. And it would be...liberating, you said?"
31160-21 = "Stop corrupting her! Stop, stop, stop, stop!!!"
31160-26 = "You're nothing but a degenerate and a corrupter! Trinity already has enough perverts with you running around!"
31160-27 = "Really? I had you pegged for the type that would totally be into skinny dipping. Was I wrong?"
31160-28 = "What gave you that idea?! Pools require swimsuits! It's justice, and anything else is deserving of the death penalty!"
31160-29 = "Hmm. In that case..."
31160-34 = "The bikini I was wearing at the pool yesterday..."
31160-35 = "What are you whispering about?!"
31160-41 = "Would that[wa:1800] really count[wa:1830] as[wa:660] a[wa:800] swimsuit? "
31160-42 = "...?!"
31160-43 = "I-If it wasn't a swimsuit, then what was it?"
31160-45 = "It's funny how many different types of lingerie there are these days. Some of them can easily pass as swimsuits at first glance. ♥"
31160-46 = "...?!"
31160-47 = "Are you saying that's what it was?! Don't tell me you...!"
31160-48 = "Goodness. Why are you shaking so much?"
31160-49 = "So what if it wasn't a swimsuit? How would that change the experience we shared, Koharu? "
31160-50 = "H-Huh?"
31160-51 = "What's the difference between a swimsuit and underwear to begin with? Waterproofing? Body protection? Design? The exposed areas?"
31160-52 = "They're no different from the outside looking in, right? And that's why you believed me when I said it was a swimsuit, didn't you?"
31160-53 = "...?"

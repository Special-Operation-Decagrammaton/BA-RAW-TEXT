2002405-2 = "3;나기사 스탠딩;01;좋은 오후입니다, 선생님.\n#3;a\n#3;em;[반응]"
2002405-3 = "3;나기사 스탠딩;02;전에 메신저로 말씀드렸던 새로운 찻잎이 도착했습니다."
2002405-4 = "3;나기사 스탠딩;03;전의 다도회의 학생들이 콤부차를 만들고 남은 찻잎이라며 새로운 브랜드의 찻잎을 소개해주었는데, 한번 마셔봤더니 제법 괜찮은 풍미가 있어서요."
2002405-5 = "3;나기사 스탠딩;01;찻잎이 떨어진 김에 그 브랜드의 홍차를 새로 구입했답니다.\n#3;em;[음표]"
2002405-6 = "[s] \"어떤 맛일지 기대되네.\""

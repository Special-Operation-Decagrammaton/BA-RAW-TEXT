[translation]
2002405-1 = "รสกลมกล่อมของชาแดง"
2002405-2 = "สวัสดีตอนบ่ายค่ะคุณครู"
2002405-3 = "ใบชาใหม่ที่ฉันบอกคุณครูทางข้อความ ตอนนี้มาถึงแล้วค่ะ"
2002405-4 = "นักเรียนที่ชื่นชอบการดื่มชาบอกฉันว่านี่เป็นใบชาที่เหลือจากการทำชาหมักผลไม้ และแนะนำใบชา#nยี่ห้อใหม่นี้ให้ฉันรู้จักค่ะ พอได้ลองดื่ม รสชาติก็ค่อนข้างดีเลยค่ะ"
2002405-5 = "และไหนๆ ก็ซื้อใบชาแล้ว ฉันก็เลยซื้อชาแดงยี่ห้อนั้นมาใหม่ด้วยเลยค่ะ"
2002405-6 = "[s] \"อยากรู้จังว่ามีรสชาติยังไง\""
2002405-7 = "กลิ่นหอมสดชื่นของมะกรูดทำให้รู้สึกสดชื่นกว่าชาดำทั่วไปค่ะ"
2002405-8 = "แต่ฉันไม่รู้ว่าของว่างแบบไหนจะเข้ากัน ก็เลยเตรียมมาหลายๆ อย่าง อย่างละนิดหน่อยค่ะ..."
2002405-9 = "[s] \"เอาของว่างมาเพียบเลยนะ...\""
2002405-10 = "ค่ะ ฉันเตรียมเค้กกับของหวานราคาแพงเอาไว้มากมายเพื่อขอโทษเกี่ยวกับเรื่องก่อนหน้านี้ค่ะ"
2002405-11 = "ทานให้อร่อยนะคะ"
2002405-12 = "ระหว่างนี้ฉันจะไปเตรียมชงชามาให้ค่ะ"
2002405-16 = "...ดีไซน์กล่องต่างจากกล่องชาแบบเดิมนิดหน่อยนะคะเนี่ย"
2002405-17 = "เอ๋... นี่มัน...?"
2002405-23 = "(ไม่ใช่ใบชาแดง แต่เป็นสาหร่ายแห้งนี่นา?)"
2002405-24 = "(ละ... แล้วทำไมถึงมีสาหร่ายแห้งในกล่องชาล่ะ?!)"
2002405-25 = "(อย่าบอกนะว่าที่เราขอให้ส่งใบชาที่ใช้ทำชาหมักให้ แล้วทางนั้นเข้าใจผิดว่าอยากได้สาหร่ายแทน?)"
2002405-26 = "(ถึงจะงานยุ่งจนหัวหมุนกันขนาดไหน แต่ก็ไม่ควรผิดพลาดกันแบบนี้สิ...)"
2002405-27 = "(แต่ตอนนี้เราไม่มีใบชา แล้วถ้าไม่เสิร์ฟชาให้คุณครูก็จะเป็นการเสียมารยาท...)"
2002405-28 = "(...งั้นก็ช่วยไม่ได้สินะ คงต้องเอาสาหร่ายแห้งนี่ไปชงให้ก่อน...)"
2002405-29 = "[ns] \"มีเรื่องอะไรเหรอ?\""
2002405-30 = "มะ... ไม่มีอะไรค่ะ"
2002405-34 = "ฉันแค่กำลังคิดอยู่ว่าจะปรับอุณหภูมิยังไงดี เพราะยังไม่เคยเจอชาแดงประเภทนี้น่ะค่ะ"
2002405-37 = "ขะ... ขอโทษที่ทำให้รอนานนะคะ นี่คือชารอยัลเบลนที่ฉันเตรียมมาเป็นพิเศษค่ะ"
2002405-38 = "ค่อยๆ ดื่มด่ำไปกับชานะคะ"
2002405-41 = "― ฮุฮุ... กลิ่นหอมอ่อนๆ ของมะกรูด[wa:2580] "
2002405-43 = "― หอมสดชื่นดีจังเลยนะคะ"
2002405-46 = "― (นี่มันกลิ่นสาหร่าย...[wa:1740] "
2002405-48 = "― กลิ่นนี้มันหลอกกันไม่ได้เลยค่ะ...)[wa:180] "
2002405-51 = "― แถมรสชาติหอมสดชื่นที่ติดลิ้นหลังจากดื่ม[wa:1570] "
2002405-53 = "― ก็เข้ากับของว่างมากเลยด้วย...[wa:10] "
2002405-56 = "― (รสสาหร่ายแรงมาก..."
2002405-58 = "― จนตีกับรสชาติของขนมที่ทานเข้าไปเลย...)[wa:440] "
2002405-61 = "― คุณครูเองก็เพิ่งเคยชิม[wa:1960] "
2002405-63 = "― รสชาติแบบนี้เหมือนกันเหรอคะ?"
2002405-66 = "― ก็น่าจะใช่แหละค่ะ...[wa:460] "
2002405-68 = "― มันคือใบชาที่หาซื้อยากอยู่เหมือนกันนี่คะ ฮุฮุฮุ...[wa:2380] "
2002405-71 = "― (...คงไม่ได้ถูกจับได้ใช่มั้ยนะ?[wa:520] "
2002405-73 = "― ถึงกลิ่นจะไม่ค่อยหอมเท่าไรแต่สีชาก็ไม่ได้แย่ขนาดนั้นนี่เนอะ...)[wa:520] "
2002405-76 = "― (ถ้ารู้ว่าจะเป็นแบบนี้[wa:720] "
2002405-78 = "― ฉันไม่เล่นใหญ่แล้วสั่งชาแดงธรรมดาๆ มาตั้งแต่แรกก็ดี...)[wa:560] "
2002405-81 = "(หลังจากนั้นคุณครูก็ดื่มชาและทานขนมด้วยกันกับนางิสะอย่างสนุกสนาน)"
2002405-83 = "ฮุฮุ...ไม่ได้เลวร้ายอย่างที่คิดนะคะ"
2002405-84 = "ถึงจะไม่ค่อยเข้ากับขนมสักเท่าไร แต่ยังไงก็ดีกว่าเสิร์ฟชาอย่างเดียวแหละนะคะ..."
2002405-85 = "คุณครูว่ายังไงบ้างคะ? ชารสชาติดีมั้ยคะ?"
2002405-86 = "[s] \"อื้ม อร่อยดีนะ\""
2002405-88 = "[ns] \"สาหร่ายอร่อยเลยแหละ\""
2002405-89 = "ใช่ค่ะ เป็นสาหร่ายที่อร่อยมากเลย..."
2002405-93 = "ดะ... เดี๋ยวนะ! คุณครูคะ? คุณครูทราบอยู่แล้วว่านั่นไม่ใช่ชาแดงเหรอคะ? ตั้งแต่เมื่อไรคะ?!"
2002405-94 = "[s] \"ตั้งแต่แรก...?\""
2002405-95 = "..."
2002405-96 = "ฉันเปิดพิธีชงชาเพื่อชดเชยความผิดพลาดแท้ๆ แต่กลับทำเรื่องขายหน้าอีกแล้วค่ะ..."
2002405-97 = "ไม่น่าให้อภัยเลยค่ะ..."
2002405-98 = "ถ้าเป็นอย่างนี้ คงต้องลบล้างความทรงจำแล้วละค่ะ!"
2002405-100 = "(หลังจากนั้นคุณครูก็ต้องไปสงบสติอารมณ์นางิสะที่ร้อนรนเพื่อจะลบความทรงจำของตัวเอง)"

[translation]
2002405-1 = "紅茶與韻味"
2002405-2 = "恭候多時了，老師。"
2002405-3 = "正好先前跟您提過的新茶葉也剛送來。"
2002405-4 = "其實我以前收到過名為「康普茶」的茶，我認為相當美味。"
2002405-5 = "因此這次我便訂購了該品牌的新紅茶。"
2002405-6 = "[s]「味道是怎麼樣的呢？」"
2002405-7 = "佛手柑的清爽香氣會在口中蔓延，喝起來相當清爽順口。#n希望會合老師您的口味……"
2002405-8 = "此外，我也準備了點心。由於是平時很少泡的茶，所以準備的茶點數量也比較多……"
2002405-9 = "[s]「……種類跟數量都相當多呢。」"
2002405-10 = "本來「下午茶」時就會準備各式各樣的茶點，在享用的同時感受喝茶的樂趣。"
2002405-11 = "本次茶會也包含向您賠罪的意思，還請盡情享用。"
2002405-12 = "這段期間，我會準備好茶的。"
2002405-16 = "哎呀……設計似乎和先前看過的紅茶罐不太一樣……？"
2002405-17 = "……？"
2002405-23 = "（不是紅茶，而是乾燥的昆布……！？）"
2002405-24 = "（為，為何紅茶罐裡會裝著昆布……！？）"
2002405-25 = "（該不會是把我說的「請給我康普茶的茶葉」聽成「昆布茶的昆布」了吧……？）"
2002405-26 = "（這，這下該如何是好……）"
2002405-27 = "（已經沒有其他茶葉，剛才又說明了與香氣有關的事……#n　而且都請老師來了，連杯茶都沒有招待就請他回去實在是……）"
2002405-28 = "（總之，也只能端出這個了……）"
2002405-29 = "[ns]「怎麼了嗎？」"
2002405-30 = "沒，沒什麼。"
2002405-34 = "只是在回想上次是用什麼樣的溫度煎茶而已。"
2002405-37 = "讓，讓您久等了……"
2002405-38 = "請慢用。"
2002405-41 = "― 呵呵……隱約散發出佛手柑的風味，[wa:3180] "
2002405-43 = "― 相當清爽，真不錯呢。"
2002405-46 = "― （……這個，果然是昆布……[wa:2100] "
2002405-48 = "― 　散發著一股難以蒙混過去的味道呢……）[wa:780] "
2002405-51 = "― 這股清新的餘韻，[wa:2810] "
2002405-53 = "― 非常適合搭配茶點呢……[wa:660] "
2002405-56 = "― （昆布的湯汁過於濃烈，"
2002405-58 = "― 　正在嘴裡和點心的味道相互衝突……）[wa:1240] "
2002405-61 = "― ……？老師也是[wa:2560] "
2002405-63 = "― 第一次品嚐到這種味道嗎？"
2002405-66 = "― 也，也對……[wa:1020] "
2002405-68 = "― 畢竟是不太容易取得的茶葉……呵，呵呵……[wa:3580] "
2002405-71 = "― （……應該沒穿幫吧？[wa:1360] "
2002405-73 = "― 　雖然味道有點那個，顏色倒還挺像的……）[wa:2240] "
2002405-76 = "― （早知道會這樣的話，[wa:1200] "
2002405-78 = "― 　就不該逞強，買普通的紅茶就好了……）[wa:2000] "
2002405-81 = "（之後和渚一起享用了各種茶和茶點）"
2002405-83 = "呼……"
2002405-84 = "雖然和茶點完全不搭，總算是撐過去了呢……"
2002405-85 = "……老師覺得怎麼樣呢？還算合您的胃口嗎？"
2002405-86 = "[s]「雖然是個有趣的組合，不過很美味唷。」"
2002405-88 = "[ns]「昆布茶很好喝，湯汁的味道很不錯。」"
2002405-89 = "是的。您說的沒錯，湯汁的……"
2002405-93 = "請，請等一下老師！#n您什麼時候發現這不是紅茶的……！？"
2002405-94 = "[s]「從一開始……？」"
2002405-95 = "……"
2002405-96 = "居然會在向您賠罪的茶會上，又做出這種恥上加恥的事……"
2002405-97 = "真想找個洞鑽進去……"
2002405-98 = "事到如今，只能想辦法消除老師的記憶了……！"
2002405-100 = "（之後為了安撫襲來的渚而苦戰了好一陣子）"

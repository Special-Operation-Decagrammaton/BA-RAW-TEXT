[translation]
1006305-1 = "Pandora's Box 2"
1006305-8 = "*giggle* Perfect timing!"
1006305-11 = "No one can stop me now! Onward, for hidden knowledge!"
1006305-16 = "Hmmmm. Let's see... Oho, so you've got that system here, huh?"
1006305-17 = "Oh my, Sensei. Yet another new one!"
1006305-18 = "You really are trying too hard, changing your security every time I sneak in. It's a little sad..."
1006305-19 = "After all, it's all futile! Yahahaha!"
1006305-20 = "Now then, let me just break this, and..."
1006305-37 = "All right, let's see what's...inside..."
1006305-38 = "Huh...?"
1006305-42 = "...Eh? Hm?"
1006305-43 = "[s1] \"...Koyuki.\"\n[s2] \"I've caught you red-handed.\""
1006305-46 = "Ah?!"
1006305-47 = "...Augh! Sensei?! What are you doing here?"
1006305-48 = "[s3] \"That's my line.\"\n[s4] \"Give up. How many times have I caught you?\""
1006305-51 = "Ugh! What! Again with the analog traps!"
1006305-52 = "You've just been waiting to catch me all along? Do you have no shame?!"
1006305-53 = "[s5] \"That's also my line.\"\n[s6] \"I do live here, after all.\""
1006305-56 = "Argh! How frustrating! But I won't give up! Next time, for sure—"
1006305-57 = "...Huh?"
1006305-58 = "Sensei, why would you say that? If I don't stop, you'll tell Seminar on me?"
1006305-59 = "...! Ugh!"
1006305-60 = "H-How petty do you have to be to bring them into a one-on-one match! This isn't about them, it's about us! Our battle of wits!"
1006305-61 = "What do you mean, it's not a contest? W-Whatever!"
1006305-62 = "[s7] \"These papers don't just hold my secrets, Koyuki.\"\n[s8] \"They're secrets that affect everyone.\""
1006305-65 = "Hmm? Sensei?"
1006305-66 = "To say that, with such a face..."
1006305-67 = "Hm..."
1006305-71 = "*sigh*"
1006305-72 = "Fine. If you put it that way, there's no use."
1006305-73 = "It won't be fun to keep poking at this any longer."
1006305-74 = "I won't open these files..."
1006305-75 = "[s9] \"Thank you, Koyuki.\"\n[s10] \"That's surprisingly reasonable of you...?\""
1006305-78 = "I mean... If you seriously don't want me to, I don't want to see it. I was just curious!"
1006305-79 = "But..."
1006305-80 = "[s] \"...But?\""
1006305-81 = "You said you didn't want me looking because they affect everyone, right?"
1006305-82 = "In other words...! It's time to think outside the box once again!"
1006305-83 = "That means you'll look the other way if I find out your personal secrets!"
1006305-84 = "[ns11] \"How did you make that leap...?\"\n[ns12] \"Are you heading for the Residence Hall? Wait!\""
1006305-87 = "Yahahahahahaha! Destination: Sensei's room! Here I go!"
1006305-91 = "[ns13] \"W-Wait! Koyuki!\"\n[ns14] Hurry after her."
1006305-95 = "I huffed and puffed after Koyuki, all the way to the Residence Hall."
1006305-96 = "She was really moving. I could only catch up after she had stopped."
1006305-101 = "[ns15] \"K-Koyuki...!\"\n[ns16] \"Hold on! What are you looking at?!\""
1006305-105 = "..."
1006305-106 = "[s17] \"...? Koyuki?\"\n[s18] \"...Er... What's that you're holding?\""
1006305-109 = "Um..."
1006305-110 = "It's...um...Sensei..."
1006305-111 = "I saw a password-locked drawer, so... I opened it, and..."
1006305-112 = "You sure have a lot of these...um...these strange books, don't you?"
1006305-113 = "Hah... Um... Well..."
1006305-114 = "I guess...Sensei must have...a private life too, right? Ah... Y-Yahaha..."
1006305-115 = "[s] \"...\""
1006305-119 = "[ns] \"...!\""
1006305-120 = "I-I'm sorry... If I'd known what it was, I wouldn't have... um... Yaha...ha..."
1006305-121 = "[s19] \"H-Hold on! Let me explain!\"\n[s20] \"I-It's confiscated! That drawer's for confiscated material!\""
1006305-124 = "Oh, no. It's okay. I understand. There's no need for that..."
1006305-125 = "Well, I-I... I just remembered... I left the oven on! I gotta wash my hair! And—"
1006305-126 = "Well, I'll..."
1006305-127 = "I'll be going!"
1006305-131 = "Then, um, goodbye!"
1006305-139 = "I tried to chase after Koyuki to explain, but she was too quick for me."
1006305-144 = "Soon, I got a phone call from Seminar that was both an apology and a lecture."

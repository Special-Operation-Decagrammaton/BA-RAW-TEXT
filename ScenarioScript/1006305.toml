[translation]
1006305-1 = "潘朵拉的盒子（２）"
1006305-8 = "咯咯咯……就算是老師，在這種時間也……"
1006305-11 = "誰也無法阻止我……！#n老師隱藏著的祕密，就讓我來一探究竟吧。"
1006305-16 = "呼呣呼呣……我看看……"
1006305-17 = "尼哈哈。老師也真是的，又加入新的保全系統了呢。"
1006305-18 = "居然會在每次我來的時候更新，努力雖然值得認同……"
1006305-19 = "不過這連爭取時間都不算唷！"
1006305-20 = "把這個，像這樣……嘿。"
1006305-37 = "這樣一來祕密就……"
1006305-38 = "揭曉了……"
1006305-42 = "……？"
1006305-43 = "[s1]「……小雪同學。」\n[s2]「我說過……不行了吧？」"
1006305-46 = "嘎！"
1006305-47 = "老師為什麼會在這裡！？"
1006305-48 = "[s3]「那是我要說的台詞吧！」\n[s4]「差不多也該放棄了吧……這都是第幾次了？」"
1006305-51 = "唔呃！因為保全系統派不上用場所以就埋伏我嗎！！#n多麼老派的手法！"
1006305-52 = "你從什麼時候開始等我的！？#n這麼大的大人居然會想抓像我這樣的孩子！！"
1006305-53 = "[s5]「因為我說不行而你卻不聽啊……」\n[s6]「而且這本來就是我家。」"
1006305-56 = "咕唔……可惡！#n但我是不會放棄的！下次一定會……"
1006305-57 = "……咦？"
1006305-58 = "下次再來就告訴研討會的前輩們……！？"
1006305-59 = "……咕努努努努！"
1006305-60 = "太卑鄙了！老師居然能接受這種做法嗎！？#n這可是我跟老師兩個人之間的決鬥啊！"
1006305-61 = "你不記得有接受過……？#n……是，是嗎～……"
1006305-62 = "[s7]「小雪，夏萊的祕密不只是我一個人的事情。」\n[s8]「拜託你了。這些對大家很重要。」"
1006305-65 = "……老，老師？"
1006305-66 = "……就算……你露出那種認真的表情……"
1006305-67 = "唔……"
1006305-71 = "……是。"
1006305-72 = "我知道了。既然老師都這麼說了，那就沒辦法了。"
1006305-73 = "我也不是想讓老師生氣才這麼做……"
1006305-74 = "我會放棄夏萊的祕密的。"
1006305-75 = "[s9]「謝謝你，小雪。」\n[s10]「這麼乾脆……？」"
1006305-78 = "……畢竟我也沒有想知道到不惜被老師真心討厭的程度。#n真的只是有～點好奇而已。"
1006305-79 = "……不過。"
1006305-80 = "[s]「……不過？」"
1006305-81 = "老師剛才說過，因為是「對大家來說很重要的東西」所以不能讓我看對吧……？"
1006305-82 = "……那麼反過來說！！"
1006305-83 = "如果是老師「個人的東西」就沒有任何問題了對吧！"
1006305-84 = "[ns11]「我不是那個意思！」\n[ns12]「……啊，難道！？」"
1006305-87 = "那麼我先走一步囉～！#n尼哈哈哈哈～！！！！！"
1006305-91 = "[ns13]「等，等等！小雪！！」\n[ns14]「得趕快追上去才行！」"
1006305-95 = "（追趕著小雪，跑到了夏萊的居住區）"
1006305-96 = "（因為他的速度實在太快，直到最後也沒看見小雪的背影）"
1006305-101 = "[ns15]「小，小雪……！」\n[ns16]「等等！……你在看什麼？」"
1006305-105 = "…………"
1006305-106 = "[s17]「……小雪？」\n[s18]「……那個，你手上拿著的是……」"
1006305-109 = "…………"
1006305-110 = "那個……老師……"
1006305-111 = "到這裡之後，我看見了設有密碼的抽屜……#n於是打開一看……"
1006305-112 = "……裡面放了很多「薄薄的本子」……#n這個數量……再，再怎麼說也……"
1006305-113 = "這種意外的情況，不禁讓我也嚇了一跳……"
1006305-114 = "也，也對……老師也是需要消遣的嘛……#n尼，尼哈哈哈哈……"
1006305-115 = "[s] 「…………」"
1006305-119 = "[ns]「……！！！！！！！！！！」"
1006305-120 = "總，總覺得很抱歉……#n我也沒想到老師的「祕密」是這種東西……尼哈哈……"
1006305-121 = "[s19]「等，等等！你先聽我說！！」\n[s20]「那，那是沒收來的東西！是真的！！」"
1006305-124 = "沒，沒關係的。不管是誰都會有一兩個祕密的嘛……"
1006305-125 = "啊……我突然想起有件急事……"
1006305-126 = "我先……"
1006305-127 = "告辭了哦……"
1006305-131 = "再，再見……嗯。"
1006305-139 = "（在那之後雖然前去追趕離開的小雪，不過他的動作實在太快而沒能抓住）"
1006305-144 = "（……不久後就收到來自研討會的聯絡，接受了道歉和調查）"

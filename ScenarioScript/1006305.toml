[translation]
1006305-1 = "กล่องแพนโดร่า 2"
1006305-8 = "คิกๆๆ สมบูรณ์แบบที่สุด..."
1006305-11 = "ไม่ว่าใครก็หยุดฉันไม่ได้... ลุยกันเลย โคยูกิ! เพื่อความลับที่ซ่อนอยู่...!"
1006305-16 = "อืม... ไหนดูซิ... โอ้โห ติดตั้งอุปกรณ์อะไรแบบนี้ไว้ด้วยเหรอเนี่ย?"
1006305-17 = "จริงๆ เลย คุณครูเปลี่ยนระบบรักษาความปลอดภัยใหม่ด้วยเหรอเนี่ย?"
1006305-18 = "เปลี่ยนอุปกรณ์รักษาความปลอดภัยทุกครั้งที่ฉันมาเลยสินะ สุดยอดของความพยายามเลย..."
1006305-19 = "แต่มันใช้กับฉันไม่ได้หรอก... อุวะฮ่าฮ่า~"
1006305-20 = "เอาละ~ มาไขรหัสอุปกรณ์พวกนี้ดีกว่า..."
1006305-37 = "ไหนดูซิ ข้างในจะมีข้อมูลอะไรบ้าง..."
1006305-38 = "นะ...?"
1006305-42 = "...? ...เอ๋?"
1006305-43 = "[s1] \"คุณโคยูกิ...\"\n[s2] \"หยุดเลย จับได้คาหนังคาเขาเลยนะเนี่ย\""
1006305-46 = "อ๊ะ?!"
1006305-47 = "เฮือก...!!?!?? คุณครู?! ทำไมคุณครูถึงมาอยู่ที่นี่ได้!?!?"
1006305-48 = "[s3] \"ครูต้องถามคำถามนั้นมากกว่านะ\"\n[s4] \"เลิกคิดจะทำแบบนั้นเลย โดนจับได้มากี่รอบแล้วเนี่ย?\""
1006305-51 = "อึก...!! เป็นไปได้ยังไงกัน!! ฉันตกหลุมพรางแบบอนาล็อกอีกแล้วเหรอเนี่ย!!"
1006305-52 = "หรือว่ามารอดักจับฉันตั้งแต่แรกแล้วคะ?? โตเป็นผู้ใหญ่แบบนี้แล้วยังจะมาแกล้งจับเด็กอีก!!#nไม่อายบ้างเหรอคะ?!"
1006305-53 = "[s5] \"เรื่องนั้นครูก็ควรเป็นคนพูดนะ\"\n[s6] \"ที่นี่ก็เหมือนบ้านของครูนะ?\""
1006305-56 = "เฮือก...!! น่าหงุดหงิดจริงๆ!! แต่ฉันไม่ยอมแพ้หรอกค่ะ! คราวหน้าจะต้อง—!"
1006305-57 = "......คะ?"
1006305-58 = "ถ้ายังไม่ยอมหยุด จะไปบอกพวกรุ่นพี่เซมิน่างั้นเหรอคะ...!?"
1006305-59 = "อึก...!!!!!"
1006305-60 = "ได้ไงคะ! นี่เป็นการต่อสู้แบบตัวต่อตัวของเราไม่ใช่เหรอคะ!! ไปดึงรุ่นพี่เข้ามาเป็นพวกได้ยังไงกัน!?#nการแข่งขันนี้ต้องมีแค่ฉันกับคุณครูสิคะ!?"
1006305-61 = "ไม่เคยมีการแข่งขันตั้งแต่แรกงั้นเหรอคะ...? งะ...งั้นเหรอ? แต่ก็เอาเถอะค่ะ...!!"
1006305-62 = "[s7] \"เอกสารตรงนี้ไม่ได้เป็นแค่ความลับของครูนะโคยูกิ\"\n[s8] \"เอกสารนี่เป็นเอกสารสำคัญสำหรับทุกคนน่ะ\""
1006305-65 = "เอ่อ... คุณครู...?"
1006305-66 = "เอ๋... ทำไมอยู่ๆ ก็ทำหน้าแบบนั้น..."
1006305-67 = "อืม..."
1006305-71 = "เฮ้อ..."
1006305-72 = "ก็ได้ค่ะ ในเมื่อคุณครูพูดอย่างนั้น... งั้นก็ช่วยไม่ได้นะคะ"
1006305-73 = "ดูจากบรรยากาศแล้ว ถ้าฉันยังดื้อจะค้นต่อไปคงไม่สนุกแล้วละค่ะ..."
1006305-74 = "ถ้างั้น... ฉันจะไม่แตะต้องเอกสารและอุปกรณ์ตรงนี้อีกก็ได้ค่ะ..."
1006305-75 = "[s9] \"ขอบใจนะ โคยูกิ\"\n[s10] \"ว่าง่ายกว่าที่คิดนะเนี่ย...?\""
1006305-78 = "ก็... ฉันไม่ใช่เด็กที่ดึงดันจะทำในสิ่งที่คุณครูไม่ชอบหรอกค่ะ ฉันก็แค่เด็กขี้สงสัยเท่านั้นเอง!"
1006305-79 = "แต่ว่า..."
1006305-80 = "[s] \"แต่ว่า...?\""
1006305-81 = "พอคุณครูบอกว่า... ไม่อยากให้ใครดู 'สิ่งที่สำคัญสำหรับทุกคน'..."
1006305-82 = "ก็แปลว่า... ได้เวลาคิดในมุมกลับกันแล้วค่ะ!"
1006305-83 = "ถ้าเกิด 'ของสำหรับทุกคน' ดูไม่ได้ งั้นก็แสดงว่าถ้าเป็น 'ของส่วนตัว' ฉันก็ดูได้น่ะสิ!!"
1006305-84 = "[ns11] \"ทำไมถึงคิดไปทางนั้นได้เนี่ย...!?\"\n[ns12] \"อย่าบอกนะว่าจะไปห้องพักของครูน่ะ!?\""
1006305-87 = "ไปก่อนนะคะ! เป้าหมาย 'ห้องพัก' ของคุณครู!! อุวะฮ่าฮ่าฮ่าฮ่า!!!!"
1006305-91 = "[ns13] \"ระ... รอเดี๋ยว!! โคยูกิ!!\"\n[ns14] วิ่งไล่ตามไปอย่างรีบร้อน"
1006305-95 = "(จากนั้นคุณครูวิ่งตามโคยูกิไปยังที่พักชาเล่ต์อย่างรวดเร็ว)"
1006305-96 = "(โคยูกิวิ่งเร็วกว่าที่คิดไว้มาก คุณครูจึงใช้เวลาพักใหญ่กว่าจะวิ่งตามมาทัน)"
1006305-101 = "[ns15] \"คะ... โคยูกิ...!\"\n[ns16] \"เดี๋ยวก่อน!! ดูอะไรน่ะ...!\""
1006305-105 = "......"
1006305-106 = "[s17] \"......???? โคยูกิ?\"\n[s18] \"เอ่อ... ถืออะไรอยู่ในมือน่ะ...?\""
1006305-109 = "เอ่อ..."
1006305-110 = "คะ... คือว่า... คุณครู..."
1006305-111 = "พอมาถึง... ก็เจอลิ้นชักที่มีรหัสผ่าน... ฉันก็เลยเปิดดู..."
1006305-112 = "นะ... 'หนังสือแปลกๆ พวกนี้' มันค่อนข้าง... นะ... นี่มันอะไรกันเหรอคะ...? มีหลายเล่มเลยด้วย..."
1006305-113 = "มัน... เอ่อ...... อืม......"
1006305-114 = "ก็นะ.. ก็... คงเป็นไปได้แหละ... คุณครูเอง... ก็ต้องมีชีวิตส่วนตัว... บ้างสิเนอะ... อุวะฮ่าฮ่า.."
1006305-115 = "[s] \"......\""
1006305-119 = "[ns] \"......!!!!\""
1006305-120 = "ระ... รู้สึกผิดขึ้นมาเลยค่ะ ไม่คิดเลยว่าคุณครูจะมีหนังสือแบบนี้อยู่ด้วย... อืม... อุวะฮ่าฮ่า.."
1006305-121 = "[s19] \"ดะ...เดี๋ยว! ฟังครูก่อนสิ!!\"\n[s20] \"คะ... ครูยึดมาได้ต่างหาก! ไม่ใช่ของครูสักหน่อย!!\""
1006305-124 = "โธ่ ไม่เป็นไรหรอกค่ะ เรื่องแค่นี้เอง ไม่ต้องแก้ตัวขนาดนี้ก็ได้..."
1006305-125 = "ฉะ... ฉัน... เพิ่งนึกออกว่ามีเรื่องเร่งด่วนที่ต้องไปทำ..."
1006305-126 = "งั้น..."
1006305-127 = "ขะ... ขอตัวก่อนนะคะ"
1006305-131 = "...ปะ... ไปละค่ะ!!!!"
1006305-139 = "(จากนั้นคุณครูก็วิ่งไล่ตามโคยูกิไป แต่โคยูกิก็วิ่งเร็วมากจนไล่ตามไม่ทัน...)"
1006305-144 = "(หลังจากนั้นไม่นานก็มีโทรศัพท์เข้ามาจากเซมิน่าเพื่อขอโทษและขอสอบสวนคุณครูไปพร้อมกัน)"

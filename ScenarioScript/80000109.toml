[translation]
80000109-1 = "#title;전략홍보팀장의 마음"
80000109-2 = "#na;(카호의 연락을 받고 음양부의 부실로 찾아갔다.)"
80000109-3 = "3;카호;02;바쁜 와중에도 불구하고 와주셔서 감사합니다, 선생님.\n#3;a\n#3;em;[반응]"
80000109-4 = "[s1] \"내 도움이 필요하다면 언제든 환영이지.\"\n[s2] \"내가 도와줄 일이 있을까?\""
80000109-5 = "#wait;100"
80000109-6 = "#wait;100"
80000109-7 = "3;카호;99;말씀 감사합니다. 하지만 오늘 방문 요청은 선생님께 도움을 청하기 위함이 아닙니다."
80000109-8 = "3;카호;01;다른 게 아니라, 선생님께 드릴 물건이 있어서……."
80000109-9 = "3;카호;02;마침 여기에 준비를…….\n#3;em;…"
80000109-10 = "[s3] \"혹시 그건가?\"\n[s4] \"제가 생각하는 그것인가요?\""
80000109-11 = "#wait;100"
80000109-12 = "#wait;100"
80000109-13 = "3;카호;13;네, 네?"
80000109-14 = "3;카호;02;아, 그게 그러니까…… 그……."
80000109-15 = "3;카호;13;으으읏! \n#3;stiff\n#3;em;[///]"
80000109-16 = "3;카호;13"
80000109-17 = "3;카호;06;(가, 갑자기 저렇게 말씀하시니…… 마, 마음의 준비가……!)\n#3;shake"
80000109-18 = "3;카호;99;(이럴 때는, 그, 그래요. 그걸……!)\n#3;em;[!]\n#3;jump"
80000109-19 = "3;카호;99"
80000109-20 = "3;카호;99;어, 어흠! 제, 제가 드릴 것은 다름이 아니라!\n#3;jump"
80000109-21 = "3;카호;04;이번 발렌타인 데이를 맞아 특별히 준비한—"
80000109-22 = "3;카호;14;배, 배, 백귀야행 연합학원의 홍보물입니다!\n#3;greeting"
80000109-23 = "3;카호;02;마침 이번 기회에 여러 동아리와 상인회에서 여러 가지 홍보물들을 제작해 주셨거든요!"
80000109-24 = "3;카호;03;조, 좋은 기회라고 생각되어, 업무 협력 차원에서 선생님께 드리려고…….\n#3;em;[땀]"
80000109-25 = "[s] \"아, 그래, 그렇구나……. 그걸 위해서…….\""
80000109-26 = "3;카호;04;네, 네, 마, 맞습니다!\n#3;hophop"
80000109-27 = "3;카호;12;그걸 위해 선생님을 이곳에 모신 것으로……"
80000109-28 = "3;카호;14;여, 역시 사전 설명 없이 갑자기 이런 걸 드리면 곤란, 할까요?"
80000109-29 = "[s5] \"아냐, 곤란하긴. 괜찮아.\"\n[s6] \"이럴 때도 홍보에 열심인 걸 보니, 카호는 성실하구나.\""
80000109-30 = "#wait;100"
80000109-31 = "#wait;100"
80000109-32 = "3;카호;13;네?! 아, 아니요…….\n#3;em;[?!]"
80000109-33 = "3;카호;12;성실하다니, 오히려 오늘의 저는 불성실, 하달까……."
80000109-34 = "3;카호;04;그, 그런 말을 들어버리면…… 저어, 죄책감이……."
80000109-35 = "[s] \"죄책감?\""
80000109-36 = "3;카호;04;아, 아무것도 아닙니다. 아직 마음의 준비가 필요, 하니까……"
80000109-37 = "3;카호;03;그럼 홍보물에 관해 이쪽부터 설명드리겠습니다!\n#3;em;[땀]\n#3;stiff"
80000109-38 = "3;카호;04;이건 공예가 협회에서 만든 초콜릿 열쇠고리입니다. 섬세한 손기술로 빚어낸 작품이지요.\n#3;greeting"
80000109-39 = "3;카호;04;그리고 또……."
80000109-40 = "3;카호;04\n#3;a"
80000109-41 = "3;카호;04;이쪽은 도예부가 만든 초콜릿 그릇……입니다."
80000109-42 = "3;카호;12;또, 이쪽은…….\n#3;em;…"
80000109-43 = "3;카호;12\n#3;a"
80000109-44 = "3;카호;12;여기에 준비한 건 야키소바 연구회의 초콜릿 야키소바로……"
80000109-45 = "3;카호;06;앗! 시, 실수로 떠, 떨어뜨릴 뻔……!\n#3;em;[!]\n#3;shake"
80000109-46 = "3;카호;09\n#3;a"
80000109-47 = "3;카호;09;그리고 마지막으로 이건……. 화과자 장인 분이 만드신 초, 초콜릿 화과자입니다.\n#3;stiff\n#3;em;…"
80000109-48 = "3;카호;12;드, 드셔보시겠어요?\n#3;greeting"

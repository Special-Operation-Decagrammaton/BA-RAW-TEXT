[translation]
80000109-1 = "หัวใจของหัวหน้าทีมประชาสัมพันธ์เชิงกลยุทธ์"
80000109-2 = "(คุณครูได้รับการติดต่อจากคาโฮะและไปที่ห้องชมรมหยินหยาง)"
80000109-3 = "คุณครูน่าจะงานยุ่งแท้ๆ ขอบคุณที่มานะคะ"
80000109-4 = "[s1] \"ถ้าอยากได้ความช่วยเหลือจากครู ครูก็ยินดีเสมอ\"\n[s2] \"มีอะไรให้ครูช่วยเหรอ?\""
80000109-7 = "ขอบคุณที่ช่วยพูดอย่างนั้นนะคะ แต่วันนี้ที่ฉันขอให้คุณครูมาหา มันไม่ใช่เพราะฉันอยากจะขอความ#nช่วยเหลือจากคุณครูหรอกค่ะ"
80000109-8 = "พอดีฉันมีของอยากให้คุณครูน่ะค่ะ..."
80000109-9 = "ฉันเตรียมไว้ตรงนี้แล้ว..."
80000109-10 = "[s3] \"มันคืออันนั้นเหรอ?\"\n[s4] \"ใช่ของที่ครูคิดไว้มั้ยนะ?\""
80000109-13 = "คะ... คะ?"
80000109-14 = "เอ่อ คือว่า... มัน..."
80000109-15 = "อึก! "
80000109-17 = "(จู่ๆ ก็พูดออกมาอย่างนั้นเลยเหรอ... ฉะ... ฉันไม่ทันได้เตรียมใจเลย...!)"
80000109-18 = "(ในเวลาแบบนี้ ชะ... ใช่แล้วละ ฉันต้อง...!)"
80000109-20 = "อะ... อะแฮ่ม! สิ่งที่ฉันจะให้ไม่ใช่อะไรอื่น!"
80000109-21 = "แต่เป็นของที่เตรียมไว้เป็นพิเศษสำหรับวันวาเลนไทน์ ซึ่งก็คือ..."
80000109-22 = "ขะ... ขะ... ของที่ใช้ประชาสัมพันธ์สหพันธ์เฮียกคิยาโคค่ะ!"
80000109-23 = "พอดีว่าทางกลุ่มการค้ากับหลายๆ ชมรมทำของที่จะเอาไว้ใช้ประชาสัมพันธ์โรงเรียนเราขึ้นมา#nหลายอย่างเลยน่ะค่ะ!"
80000109-24 = "ฉะ... ฉันคิดว่านี่เป็นโอกาสที่ดี ก็เลยอยากมอบให้คุณครูในแง่ของความร่วมมือเรื่องงาน..."
80000109-25 = "[s] \"อ่า... เป็นอย่างนั้นเองเหรอ... เพราะเรื่องงานนี่เอง...\""
80000109-26 = "ค่ะ ค่ะ ชะ... ใช่แล้วค่ะ!"
80000109-27 = "ฉันถึงได้ขอให้คุณครูมาที่นี่ยังไงล่ะคะ..."
80000109-28 = "ดีนะคะที่ฉันอธิบายเหตุผลก่อนล่วงหน้า ไม่งั้นคงได้ลำบากใจกันแล้วว่าไหมคะ?"
80000109-29 = "[s5] \"ไม่หรอก จะลำบากใจทำไม ไม่เป็นไร\"\n[s6] \"ขนาดวันแบบนี้ยังตั้งใจประชาสัมพันธ์โรงเรียนเลยนะ คาโฮะนี่ขยันจัง\""
80000109-32 = "คะ?!  มะ... ไม่หรอกค่ะ!"
80000109-33 = "วันนี้ต้องบอกว่าฉัน... อู้งานมากกว่า..."
80000109-34 = "ถ้าคุณครูพูดอย่างนั้นละก็... ฉันจะรู้สึกผิดมากกว่าค่ะ..."
80000109-35 = "[s] \"รู้สึกผิดเหรอ?\""
80000109-36 = "มะ... ไม่มีอะไรหรอกค่ะ ฉันยัง... ต้องเตรียมใจอยู่น่ะค่ะ..."
80000109-37 = "ถ้างั้นฉันจะอธิบายเกี่ยวกับของที่ใช้ในการประชาสัมพันธ์ให้นะคะ!"
80000109-38 = "เริ่มจากพวงกุญแจช็อกโกแลตที่สมาคมช่างฝีมือทำขึ้นมาค่ะ ถือเป็นงานฝีมือที่ประณีตมากเลยค่ะ"
80000109-39 = "ส่วนชิ้นนี้ก็คือ..."
80000109-41 = "ถ้วยช็อกโกแลตจากชมรมศิลปะเครื่องปั้นดินเผาค่ะ..."
80000109-42 = "ส่วนอันนี้..."
80000109-44 = "ยากิโซบะช็อกโกแลตของสมาคมวิจัยยากิโซบะ..."
80000109-45 = "อ๊ะ! กะ... เกือบทำหกแล้วไหมล่ะ...!"
80000109-47 = "และสุดท้ายก็คือ... วะ... วางาชิช็อกโกแลตที่ทำโดยปรมาจารย์วางาชิค่ะ..."
80000109-48 = "ละ... ลองทานดูไหมคะ?"
80000109-49 = "(คาโฮะยื่นวางาชิให้คุณครูด้วยมือที่สั่นเทา)"
80000109-50 = "[s] \"คาโฮะ เป็นอะไรหรือเปล่า? มือสั่นมากเลยนะ...\""
80000109-51 = "คะ? มะ... ไม่เป็นไรค่ะ!"
80000109-52 = "คะ? ฉันดูกระวนกระวายใจตั้งแต่เมื่อกี้แล้วงั้นเหรอคะ?"
80000109-53 = "คือว่า..."
80000109-54 = "ฮู่ว... ค่ะ ถ้าพูดอ้อมค้อมต่อไปก็คงไม่มีวันจบ..."
80000109-55 = "ฉัน คาโฮะ! ตะ... ตัดสินใจแล้วค่ะ"
80000109-56 = "คือว่า... ที่จริงแล้ว..."
80000109-57 = "ฉันอยากให้คุณครูรับสิ่งนี้ไว้... ค่ะ"
80000109-63 = "ความจริงที่ฉันขอให้คุณครูมาหาวันนี้ ก็เพื่อจะให้สิ่งนี้ค่ะ"
80000109-64 = "ฉันทำขึ้นมาเองเพื่อตอบแทนความช่วยเหลือที่ได้รับจากคุณครูมาตลอด..."
80000109-65 = "แต่ว่าก็เขินที่จะให้ กะ... ก็เลย...!"
80000109-66 = "[s] \"ก็เลยเอาของประชาสัมพันธ์มาให้ก่อนสินะ\""
80000109-67 = "ค่ะ... ฉันเอาแต่พูดอ้อมค้อมจนทำให้คุณครูต้องลำบากใจ"
80000109-68 = "แล้วก็ยกเรื่องงานมาเป็นข้ออ้างในการทำตามเป้าหมายส่วนตัวด้วย... นี่เป็นการกระทำที่ไม่เหมาะสม#nในฐานะหัวหน้าทีมประชาสัมพันธ์เชิงกลยุทธ์เลยค่ะ!"
80000109-69 = "ขอโทษที่ทำตัวแบบนี้นะคะ!"
80000109-70 = "[s7] \"ไม่หรอกน่า\"\n[s8] \"แค่ได้ช็อกโกแลตจากคาโฮะครูก็ดีใจแล้วนะ\""
80000109-75 = "ตะ... แต่นี่ก็เหมือนกับฉันโกหกคุณครูเลยนี่คะ"
80000109-76 = "แต่คุณครูก็ยังจะพูดอย่างนั้นเหรอคะ?"
80000109-77 = "[ns] \"การบอกความรู้สึกเป็นเรื่องยากสำหรับทุกคนนี่นา\""
80000109-79 = "[ns] \"ขอบใจสำหรับช็อกโกแลตนะ\""
80000109-83 = "ค่ะ คุณครู"
80000109-84 = "โล่งอกไปทีนะคะที่ฉันให้ช็อกโกแลตคุณครูได้"
80000109-85 = "หวังว่าคุณครูจะรับรู้ถึงความรู้สึกของฉันนะคะ"
80000109-87 = "(ช็อกโกแลตที่ได้รับมาจากคาโฮะมีรสหวานดั่งความรู้สึกหอมหวานที่อยู่ในนั้น)"

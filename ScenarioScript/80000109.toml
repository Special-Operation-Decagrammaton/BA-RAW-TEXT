80000109-52 = "3;카호;12;네? 아까부터 어딘가 초조해 보였다고요?"
80000109-53 = "3;카호;14;그게……."
80000109-54 = "3;카호;99;후우, 네. 계속…… 변죽만 울려서는 끝이 없을 테니……\n#3;em;[한숨]"

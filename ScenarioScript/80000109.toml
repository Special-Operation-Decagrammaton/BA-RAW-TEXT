[translation]
80000109-1 = "戰略領袖的心意"
80000109-2 = "（接到佳穗的聯絡之後，前往了陰陽部的部室）"
80000109-3 = "謝謝您在百忙之中還抽空前來，老師。"
80000109-4 = "[s1]「如果需要我幫忙，隨時都可以通知我哦。」\n[s2]「有什麼我能幫忙的嗎？」"
80000109-7 = "謝謝您的好意，但今天請老師來並非有求於您。"
80000109-8 = "而是因為有東西想送給老師……"
80000109-9 = "我剛好在這裡準備……"
80000109-10 = "[s3]「該不會是那個……？」\n[s4]「是我想的那個嗎？」"
80000109-13 = "咦？"
80000109-14 = "啊，那個，就是說……那個……"
80000109-15 = "唔！"
80000109-17 = "（突，突然這麼說……我，我還沒做好心理準備……！）"
80000109-18 = "（這種時候應該……好，好吧，就先把那個……！）"
80000109-20 = "咳，咳哼！要送您的東西不是別的！"
80000109-21 = "就是這次為情人節特別準備的──"
80000109-22 = "百，百，百鬼夜行聯合學園的宣傳品！"
80000109-23 = "藉著這次機會，許多社團和商會都為我們製作了各種宣傳品！"
80000109-24 = "我，我認為這是個好機會，作為業務合作的一環，希望能送給老師……"
80000109-25 = "[s]「這，這樣啊……原來是為了這個才會……」"
80000109-26 = "沒，沒，沒錯！"
80000109-27 = "這就是請老師來這裡的原因……"
80000109-28 = "沒，沒事先說明就突然送您這種東西，會造成您的困擾嗎？"
80000109-29 = "[s5]「不會，別這麼說。」\n[s6]「就連這種時候都在認真宣傳，佳穗還真勤奮呢。」"
80000109-32 = "咦！？不，不是這樣的……"
80000109-33 = "與其說是勤奮，應該說不夠勤奮才對……"
80000109-34 = "聽，聽您這麼一說……罪惡感都……"
80000109-35 = "[s]「罪惡感？」"
80000109-36 = "沒，沒什麼。#n我還需要一些心理準備……"
80000109-37 = "那麼我這就開始為您進行宣傳品的說明！"
80000109-38 = "這是工藝家學會製作的巧克力鑰匙圈，是用精湛手藝精心製作的作品。"
80000109-39 = "另外……"
80000109-41 = "這些是陶藝部製作的……巧克力碗。"
80000109-42 = "還有……"
80000109-44 = "這裡準備的是炒麵研究會的巧克力炒麵……"
80000109-45 = "啊！差，差點就打翻了……！"
80000109-47 = "最後……這是點心匠人製作的巧，巧克力。"
80000109-48 = "您，您要吃吃看嗎？"
80000109-49 = "（不知為何，佳穗遞出巧克力的手正在發抖）"
80000109-50 = "[s]「佳穗，你沒事吧？你的手抖得很嚴重耶……」"
80000109-51 = "咦？我，我沒事！"
80000109-52 = "您說我從剛剛開始，看起來就很焦躁不安？"
80000109-53 = "那個……"
80000109-54 = "呼……是。#n一直拐彎抹角是不會有成果的……"
80000109-55 = "我，桑上佳穗！下，下定決心了！"
80000109-56 = "其，其實……"
80000109-57 = "我希望……您能收下這個。"
80000109-63 = "今天邀請老師來的真正原因……是想將這個交給您。"
80000109-64 = "為了向一直幫助我的老師，多少做出一點回報，我親手製作了這個……"
80000109-65 = "但是要送禮給您……還，還是讓我有點害羞……！"
80000109-66 = "[s]「所以才會先拿出宣傳品啊。」"
80000109-67 = "是，是的……很抱歉一直拐彎抹角地說話，造成老師的困擾。"
80000109-68 = "……果然藉著業務合作達到私人目的，對於一名戰略領袖實在不夠誠實！"
80000109-69 = "很抱歉讓您看到這一面！"
80000109-70 = "[s7]「我不這麼覺得哦。」\n[s8]「光是能收到佳穗的巧克力，我就很高興了。」"
80000109-75 = "但是，我這樣的行為，就和欺騙老師沒有兩樣……"
80000109-76 = "即便如此，您還是這麼認為嗎？"
80000109-77 = "[ns]「畢竟傳達心意，對任何人來說都不是件容易的事啊。」"
80000109-79 = "[ns]「我會心懷感激地收下巧克力的。」"
80000109-83 = "是，老師。"
80000109-84 = "能順利將巧克力送給您真是太好了。"
80000109-85 = "但願我的心意也能一同傳達。"
80000109-87 = "（從佳穗手中收到的巧克力，其中的心意就像巧克力本身一樣甜蜜）"

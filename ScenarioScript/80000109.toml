80000109-63 = "3;카호;14;오늘 선생님께 방문을 요청드린 건 이것을 전해드리기 위해서였습니다."
80000109-64 = "3;카호;12;항상 도움을 주시는 선생님께 조금이나마 보답하기 위해 직접 만들었습니다만……."
80000109-65 = "3;카호;10;전해드리는 것은 역시 부, 부끄러워서……!\n#3;stiff"
80000109-66 = "[s] \"그래서 홍보물부터 내놓았구나.\""
80000109-67 = "3;카호;10;네, 네에……. 지금까지 괜히, 그 에두른 말만 하느라 선생님을 곤란하게 만들기만 하고.\n#3;m3"
80000109-68 = "3;카호;11;……역시 업무 협력을 빙자해 사사로운 목적을 이루려 하다니, 이건 전략홍보팀장으로서 성실하지 못한 행동이겠지요!\n#3;em;[속상함]"

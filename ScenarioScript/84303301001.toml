[translation]
84303301001-5 = "I will entrust everything to the Thief King!"
84303301001-6 = "Do you want to be called that...?"
84303301001-7 = "I'm fine being called that, but the sage is the one we're trusting."
84303301001-8 = "But you're bringing it to them. We should thank you both!"
84303301001-9 = "For once, you're right."
84303301001-10 = "For once?!"

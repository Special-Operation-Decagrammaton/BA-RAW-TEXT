[translation]
84303301001-5 = "อาริสึ... เชื่อมั่นในราชาจอมโจรค่ะ!"
84303301001-6 = "จะให้เรียกด้วยฉายาแบบนั้นได้จริงเหรอ...?"
84303301001-7 = "เรื่องฉายาฉันไม่เป็นไรหรอกค่ะ แต่เรื่องเชื่อมั่นน่ะ เชื่อในคุณนักปราชญ์แทนฉันดีกว่าค่ะ"
84303301001-8 = "แต่คนที่จะเอาเกมไปให้คือคุณเซอานี่นา! เราต้องขอบคุณทั้งสองคนนั่นแหละ!"
84303301001-9 = "เหลือเชื่อเลย พี่โมโมอิพูดดีๆ ก็เป็นด้วย..."
84303301001-10 = "เหลือเชื่อเลยงั้นเหรอ!?"

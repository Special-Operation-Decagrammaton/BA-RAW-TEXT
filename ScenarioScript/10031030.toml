[translation]
10031030-1 = "第3話;議長的要求"
10031030-14 = "唔～～嗯！果然不行！就算只有風紀委員會也還是太勉強了！#n陽奈風紀委員長果然超強的！"
10031030-15 = "（顫抖顫抖顫抖顫抖…………）"
10031030-22 = "該，該怎麼辦！班長！"
10031030-23 = "唔嗯～部長好像也出大事了， 這種時候沒人會告訴我們該怎麼做才好……"
10031030-24 = "嗯！先撤退～！腳底抹油開溜～！"
10031030-25 = "30分鐘後在祕密基地會合吧！"
10031030-32 = "……！#n亞子，我要追上去。"
10031030-36 = "是！委員長……！"
10031030-38 = "給我先等一下啊啊啊啊啊！！"
10031030-40 = "怎，怎麼了嗎！？真琴議長！"
10031030-42 = "好好看看四周！看清楚你們做了什麼好事……！"
10031030-53 = "[ns]「議事堂好像因為剛才的戰鬥崩塌了……」"
10031030-56 = "所以呢？"
10031030-57 = "「所以呢？」……什麼叫「所以呢」！"
10031030-58 = "都怪你們風紀委員會在這邊搗亂，議事堂才會在舉行竣工儀式前就塌了啊！"
10031030-59 = "你們要怎麼負責！"
10031030-60 = "什麼意思？推卸責任也要有個限度吧！？"
10031030-61 = "不就是因為你當初「委託溫泉開發部開發溫泉」的荒謬行為……#n事情才會變成這樣的嗎？"
10031030-62 = "所以你想怎樣？"
10031030-63 = "咦……？"
10031030-64 = "那都已經是過去的事了！"
10031030-65 = "[s]「……哇。」"
10031030-66 = "總之都怪你們，原本夏萊老師要來增光的竣工儀式才會泡湯！"
10031030-71 = "所以你們風紀委員會……無論如何都要給我負起責任！！"
10031030-72 = "不！風紀委員長空崎陽奈！"
10031030-73 = "如果你也能算是一名組織的領導者……應該不會推卸責任吧！"
10031030-74 = "不……委員長！您沒必要聽那種廢話！"
10031030-75 = "[s]「真琴，再怎麼說那樣還是有點……」"
10031030-78 = "……好吧。所以你要我怎麼做？"
10031030-79 = "委員長！？"
10031030-83 = "[ns]「陽奈……？」"
10031030-84 = "……哦？#n居然這麼輕易就……？"
10031030-85 = "當然，儘管妨礙活動並非我的本意，但損害確實是因為風紀委員會的作戰而造成。"
10031030-86 = "而且如果還妨礙了老師的工作……我們也該負起責任。"
10031030-87 = "所以真琴議長，你希望我怎麼負責？"
10031030-88 = "呃，這……"
10031030-90 = "（陽奈這傢伙竟然一反常態乖乖接受要求……雖然不知道他為什麼會那樣……！）"
10031030-91 = "（不過這是個好機會……！得好好展現我和風紀委員會的上下關係！）"
10031030-92 = "（該怎麼利用這個機會挫挫風紀委員會的銳氣，彰顯出我真琴大人的威嚴呢……！）"
10031030-93 = "（這麼說來，這次格黑娜派對上的重頭戲想必會是鋼琴演奏──）"
10031030-94 = "（嘻嘻嘻！既然如此……！）"
10031030-96 = "咯咯……咯咯咯咯……咯咯咯咯咯！！！！"
10031030-97 = "[s]「總覺得現在的真琴……正在心裡策劃驚人的陰謀。」"
10031030-99 = "委，委員長！輕易做出那種承諾很可能會出大事的！？"
10031030-100 = "沒關係，亞子。就這麼決定了。"
10031030-101 = "可，可是……！"
10031030-107 = "……我不想給老師添麻煩。"
10031030-108 = "[s]「陽，陽奈……！」"
10031030-109 = "唔……！"
10031030-110 = "咯咯咯咯！我決定了！"
10031030-111 = "唔……要是提出什麼荒謬的要求……！"
10031030-112 = "啊啊，這個你不必擔心。#n我並不是笨蛋。只會提出實際的要求而已。"
10031030-113 = "實際的要求？"
10031030-114 = "沒錯，空崎陽奈……你必須協助我真琴大人準備的格黑娜派對！"
10031030-115 = "果然是你們啊。#n我的確有聽說你們在準備格黑娜派對……"
10031030-116 = "沒想到你們居然想把委員長也牽連進來……是不是在計畫什麼比往年更陰險的陰謀？"
10031030-117 = "哈！請別做毫無根據的指控好嗎，天雨亞子。#n我只是單純想辦個比去年更盛大的派對罷了。"
10031030-118 = "何況這次還有老師在這裡協助我們！嘰嘻嘻！"
10031030-119 = "……！老師？"
10031030-120 = "[s]「呃，嗯，自然而然地就……」"
10031030-121 = "就是這麼回事！而且還不僅如此！#n老師也對這次的格黑娜派對充滿期待！畢竟是我真琴大人舉行的派對啊！"
10031030-122 = "老師期待的派對……"
10031030-123 = "[s]「我當然……也期待著派對……沒錯。」"
10031030-124 = "而你差點就把那場派對搞砸了，當然得負責補償！"
10031030-125 = "補償……具體來說該怎麼補償？"
10031030-132 = "（現在正是以前，透過萬魔殿情報網得到的情報派上用場的時候……！）"
10031030-133 = "風紀委員長空崎陽奈！"
10031030-134 = "我就特別讓你這傢伙在這次的「格黑娜派對」……負責開場的鋼琴演奏吧！"
10031030-135 = "……什麼？"
10031030-136 = "鋼琴，演奏……？"
10031030-137 = "咯咯咯！沒錯！就是演奏！"
10031030-138 = "（我曾在情報中聽說過！風紀委員長除了不會游泳之外……也不會彈鋼琴！）"
10031030-143 = "委員長的鋼琴……演奏……！鋼琴，演奏……！"
10031030-144 = "如果真的能看見，肯定得拍下來……不，不對！是一定要聽聽看！"
10031030-145 = "可是……這果然還是太勉強了……！"
10031030-146 = "來吧！既然你已經答應，應該不會現在才要拒絕或是逃走吧！陽奈！"
10031030-147 = "…………"
10031030-148 = "[s]「陽奈，沒必要勉強自己負責。」"
10031030-149 = "……老師。"
10031030-150 = "謝謝你的體貼，但我已經答應了。"
10031030-151 = "我的確造成了損失……而且老師也很期待這次的格黑娜派對……"
10031030-152 = "我……身為格黑娜風紀委員長……那個，就是……"
10031030-153 = "我希望……能回應老師的期待……該這麼說嗎。"
10031030-154 = "我知道了。#n真琴議長，我接受你的要求。"
10031030-155 = "真，真的假的！？"
10031030-156 = "咳咳……！"
10031030-157 = "不！你當然得答應！#n一言既出，駟馬難追！這才是風紀委員長！"
10031030-158 = "那我就當你同意，開始進行準備了啊！"
10031030-163 = "嗯，那麼我得先去追逃走的溫泉開發部。"
10031030-164 = "因為他們要是放任不管肯定還會引發問題。#n得盡快完成任務，趕快去練琴才行……"
10031030-165 = "亞子，我們走吧。"
10031030-171 = "啊，那個……委，委員長！？"
10031030-177 = "……想不到他竟然真的會接受啊。"
10031030-178 = "…………噗。"
10031030-179 = "呵呵呵……咯咯咯，嘻嘻嘻嘻嘻！"
10031030-180 = "這下子……有好戲看了……！"
10031030-181 = "既然都親口答應了……可別想隨便逃走啊！#n風紀委員長空崎陽奈……！"
10031030-184 = "[ns]「……真的沒問題嗎？」"

[translation]
10031030-1 = "Episode 3;The Chairman's Demand"
10031030-14 = "Uhh! I should've known! The Prefect Team is trouble enough! Trying to stand against Head Prefect Hina is a nightmare!"
10031030-15 = "(Tremble tremble tremble tremble...)"
10031030-22 = "F-Foreman! What should we do!"
10031030-23 = "Hm... With the president in hot water too, there's no one to tell me what to do right now. In that case..."
10031030-24 = "Retreat! Run for your lives!"
10031030-25 = "Regroup at the Hot Springs Department hideout in 30!"
10031030-32 = "After them, Ako."
10031030-36 = "Roger, Head Pr—!"
10031030-38 = "Waaaaaaaaaaait!!"
10031030-40 = "Ch-Chair Makoto! What's wrong?!"
10031030-42 = "Before you go running off, why don't you stop and take a look at the mess you've made!"
10031030-53 = "[ns] \"Looks like the interior of the assembly hall has totally collapsed...\""
10031030-56 = "And?"
10031030-57 = "What do you mean by \"and\"?!"
10031030-58 = "This building is ruined because you let the Prefect Team go on a rampage before we even got to do our ribbon cutting ceremony! "
10031030-59 = "Aren't you going to take responsibility for this?!"
10031030-60 = "What are you talking about? Why is the damage to your building MY responsibility?"
10031030-61 = "Didn't all of this happen because of your insane plan to commission the Hot Springs Department? THE Hot Springs Department?"
10031030-62 = "So what?"
10031030-63 = "What?"
10031030-64 = "That's old news!"
10031030-65 = "[s] \"Wow.\""
10031030-66 = "The ribbon cutting ceremony was supposed to be a celebration with the Sensei of Schale. Now it's a trainwreck thanks to your team's rampage!"
10031030-71 = "I demand you take responsibility! You, the Prefect Team..."
10031030-72 = "No, you in particular, Sorasaki Hina! "
10031030-73 = "As the leader of your little outfit, I'd hope you wouldn't avert your eyes and shrug off responsibility for your mess!"
10031030-74 = "No! Head Prefect, you don't have to listen to this drivel!"
10031030-75 = "[s] \"That's a bridge too far, Makoto...\""
10031030-78 = "...Fine. What is it that you want from me?"
10031030-79 = "Head Prefect?!"
10031030-83 = "[ns] \"Hina?\""
10031030-84 = "Huh? That's it?"
10031030-85 = "While I had no intention of ruining the ceremony, the Prefect Team's operation did cause some damage."
10031030-86 = "And if the operation got in the way of Sensei's work as well... I couldn't stand being responsible for that."
10031030-87 = "What can I do for you, Chair Makoto?"
10031030-88 = "Hmm... I..."
10031030-90 = "(Why is Hina giving in to my demands so easily?!)"
10031030-91 = "(Wait, who cares! This is my chance to show that it is I who rules over the Prefect Team!)"
10031030-92 = "(What can I say to show them the full might of my charisma and leave them flabbergasted?!)"
10031030-93 = "(Hmm, the main event of the party is supposed to be the piano recital.)"
10031030-94 = "(Kekeke! In that case...!)"
10031030-96 = "Keke... Kekekeke... Kekekekeke!!!!"
10031030-97 = "[s] \"Looks like Makoto's scheming something big.\""
10031030-99 = "Head Prefect, don't! There's bound to be trouble making a promise to the likes of her!"
10031030-100 = "No, Ako. I've made up my mind."
10031030-101 = "B-But!"
10031030-107 = "I don't want to interfere with Sensei's work."
10031030-108 = "[s] \"H-Hina!\""
10031030-109 = "Ugh!"
10031030-110 = "Kekekeke! I've made my decision then!"
10031030-111 = "If you dare ask her for anything unreasonable..."
10031030-112 = "No need to worry. I'm not an idiot. My demand is quite reasonable."
10031030-113 = "A reasonable demand? You?"
10031030-114 = "Yes. You, Sorasaki Hina, shall lend your skills to the Gehenna Party that I, the Great Makoto, am hosting!"
10031030-115 = "Of course. I figured you all were preparing for your Gehenna Party."
10031030-116 = "But to drag Head Prefect Hina into all this... Tell me, is this year's plot even worse than last year's?"
10031030-117 = "Ha! Spare me your baseless accusations, Amau Ako. My only ambition is to host a bigger party than ever before."
10031030-118 = "And why not? We even have Sensei's help after all! Khahahaha!"
10031030-119 = "*gasp*. Even Sensei's?"
10031030-120 = "[s] \"Yeah, somehow...\""
10031030-121 = "Of course! And that's not all! Sensei's looking forward to the Gehenna Special Party as well! For it is hosted by I, the Great Makoto!"
10031030-122 = "A party that Sensei is looking forward to..."
10031030-123 = "[s] \"I mean, I wouldn't say I'm personally looking forward to the party but...\""
10031030-124 = "You see? A party that was special to Sensei almost got ruined. And I need the head prefect's skill to make up for it!"
10031030-125 = "And I make up for it how exactly?"
10031030-132 = "(And now, the ace in the hole I got from the Pandemonium Society's intelligence network!)"
10031030-133 = "Head Prefect Sorasaki Hina!"
10031030-134 = "I demand that you play the opening piano recital at the Gehenna Special Party!"
10031030-135 = "...What?"
10031030-136 = "A piano recital?"
10031030-137 = "Kekeke! Yes! A recital!"
10031030-138 = "(From what my spies have gathered, the head prefect cannot swim or play the piano!)"
10031030-143 = "Head Prefect's piano recital! Piano! Recital!"
10031030-144 = "Ooh, can I film it? No! I should record it!"
10031030-145 = "But... Th-This is an impossible ask!"
10031030-146 = "Now, Hina! Don't tell me you're going to back out after promising to help?!"
10031030-147 = "..."
10031030-148 = "[s] \"Hina, you don't have to do this if you don't want to.\""
10031030-149 = "...Sensei."
10031030-150 = "Thank you for your kindness. But a promise is a promise."
10031030-151 = "My actions did cause harm to others. And if Sensei is looking forward to the Gehenna Party too, then..."
10031030-152 = "I...as the Gehenna head prefect must... I...um..."
10031030-153 = "...Also wish to live up to Sensei's expectations...so..."
10031030-154 = "*sigh* I'll agree to your demands, Chairman."
10031030-155 = "R-Really?!"
10031030-156 = "Ahem!"
10031030-157 = "Well then! Good to see the head prefect does not go back on her word, yes?! "
10031030-158 = "I'll take that as your agreement, and continue with the preparations!"
10031030-163 = "All right. We'll be chasing down the Hot Springs Department in the meantime."
10031030-164 = "They'll cause trouble again if we leave them alone. Once I'm done with that, I'll have to begin my piano practice for the recital..."
10031030-165 = "Let's go, Ako."
10031030-171 = "Ah, uh... H-Head Prefect?!"
10031030-177 = "She really agreed to it."
10031030-178 = "...Keke."
10031030-179 = "Kihehe. Kihehe. Kiheheheh!"
10031030-180 = "Well... This'll be fun to watch!"
10031030-181 = "Don't think you can slip out of this! You signed up yourself, Head Prefect Sorasaki Hina!"
10031030-184 = "[ns] \"...I hope everything works out for the best.\""

[translation]
10031030-1 = "ตอนที่ 3;การขอร้องของท่านประธาน"
10031030-14 = "อื้มมม! ไม่ได้ผลแฮะ! ปกติแค่พวกคณะกรรมการวินัยก็โหดพอตัวอยู่แล้ว! แต่นี่ยังมีประธานกรรมการ#nฮินะมาอีก! โหดแบบคูณร้อยไปเลย!"
10031030-15 = "(ตัวสั่นหงึกๆ...)"
10031030-22 = "ทะ... ทำยังไงดีล่ะหัวหน้า?!"
10031030-23 = "อืม~ หัวหน้าก็น่าจะสติแตกไปแล้วเหมือนกัน ในเมื่อไม่มีใครสั่งการได้ว่าเวลาแบบนี้ควรทำอะไร..."
10031030-24 = "อื้อ! ทุกคนถอนกำลัง~! แยกย้ายกันก่อน!"
10031030-25 = "อีก 30 นาทีค่อยมาเจอกัน! ที่กองบัญชาการชมรมพัฒนาออนเซ็น!"
10031030-32 = "...! อาโกะ ไล่ตามไป!"
10031030-36 = "ค่ะ! ท่านประธาน...!"
10031030-38 = "เดี๋ยวก่อนนนนน!!"
10031030-40 = "อะ... อะไรกันคะเนี่ย?! ประธานมาโคโตะ?"
10031030-42 = "ก่อนจะไป พวกเธอดูสภาพที่นี่ก่อน! ดูสิว่าพวกเธอทำอะไรลงไป...!"
10031030-53 = "[ns] \"ที่ปะทะกันเมื่อกี้เหมือนจะทำให้ในหอประชุมพังยับเยินเลย...\""
10031030-56 = "แล้วยังไงเหรอคะ?"
10031030-57 = "แล้วยังไงเหรอคะ... งั้นเรอะ?! "
10031030-58 = "เป็นเพราะความฉุนเฉียวของคณะกรรมการวินัยนั่นละ หอประชุมถึงได้พังยับเยินก่อนที่จะมีพิธีฉลอง#nก่อสร้างเสียอีก! "
10031030-59 = "พวกเธอจะรับผิดชอบเรื่องนี้ยังไง!"
10031030-60 = "หมายความว่ายังไงคะ? อย่ามาโยนความผิดให้คนอื่นแบบนี้สิคะ!"
10031030-61 = "พวกคุณเองไม่ใช่เหรอคะที่สั่งให้ชมรมพัฒนาออนเซ็นมาขุดบ่อออนเซ็นให้... แล้วทีนี้ยังจะมาถามหา#nความรับผิดชอบจากพวกเราอีก?"
10031030-62 = "แล้วจะทำไมล่ะ? "
10031030-63 = "คะ...?"
10031030-64 = "เรื่องนั้นมันเป็นอดีตไปแล้ว!"
10031030-65 = "[s] \"โห... เล่นแบบนี้เลยแฮะ\""
10031030-66 = "เพราะความฉุนเฉียวของคณะกรรมการวินัยนั่นละ พิธีฉลองก่อสร้างที่ครูจากชาเล่ต์จะมาเข้าร่วมด้วยถึง#nได้พังลง!"
10031030-71 = "เพราะงั้นพวกเธอก็ต้องรับผิดชอบ...! คณะกรรมการวินัย...!"
10031030-72 = "ไม่สิ! ต้องเป็นประธานกรรมการ โซระซากิ ฮินะต่างหาก! "
10031030-73 = "ถ้าเธอเป็นถึงผู้นำแล้วละก็... คงไม่ปฏิเสธความรับผิดชอบหรอกใช่มั้ย!"
10031030-74 = "ไม่นะคะ ท่านประธาน! อย่าไปฟังอะไรไร้สาระแบบนั้นเลยค่ะ!"
10031030-75 = "[s] \"มาโคโตะ แต่แบบนี้มันเกินไปหน่อยนะ...\""
10031030-78 = "ก็ได้... อยากให้ฉันรับผิดชอบยังไงล่ะ?"
10031030-79 = "ท่านประธาน?!"
10031030-83 = "[ns] \"ฮินะ...?\""
10031030-84 = "เอ๋? ว่าง่ายแบบนี้เลยเหรอ...?"
10031030-85 = "ฉันก็ไม่ได้อยากจะขัดขวางพิธีอะไรหรอกนะ แต่ว่าหอประชุมก็มาพังยับเพราะปฏิบัติการของ#nคณะกรรมการวินัยจริงๆ "
10031030-86 = "และถ้ายิ่งเป็นการขัดขวางการปฏิบัติงานของคุณครูแล้วด้วย... ฉันก็ยิ่งต้องรับผิดชอบ"
10031030-87 = "งั้นก็ดี ประธานมาโคโตะ บอกมาสิว่าฉันควรทำอะไร?"
10031030-88 = "อะ... อืม ให้ทำอะไร..."
10031030-90 = "(ยัยฮินะ... ทำไมจู่ๆ ก็ตอบรับคำขอของเราอย่างว่านอนสอนง่ายแบบนี้... คิดอะไรอยู่กันแน่...!)"
10031030-91 = "(แต่ยังไงนี่ก็เป็นโอกาสที่ดี...! ต้องทำให้รู้ว่าเรากับคณะกรรมการวินัย ใครอยู่เหนือใครกันแน่!)"
10031030-92 = "(จะใช้โอกาสนี้ยังไงดีนะ... ทำยังไงถึงจะลบเหลี่ยมคณะกรรมการวินัย และรักษาเกียรติของท่าน#nมาโคโตะผู้นี้ได้นะ...!)"
10031030-93 = "(จะว่าไป อีเวนต์หลักของปาร์ตี้เกเฮนน่าครั้งนี้คือการบรรเลงเปียโน)"
10031030-94 = "(หึหึหึ! ถ้างั้นก็...!)"
10031030-96 = "หึหึ... หึหึหึหึ...  หึหึหึหึหึ!!!!"
10031030-97 = "[s] \"รู้สึกเหมือน... มาโคโตะกำลังวางแผนใหญ่ในใจแฮะ\""
10031030-99 = "ทะ... ท่านประธาน! ไปให้คำสัญญาแบบนั้นได้ไงคะ เดี๋ยวก็เกิดเรื่องใหญ่ขึ้นหรอกค่ะ!"
10031030-100 = "ไม่หรอก อาโกะ ฉันตัดสินใจแล้ว"
10031030-101 = "ตะ... แต่ถึงอย่างนั้นก็เถอะ!"
10031030-107 = "ฉันไม่อยากทำให้คุณครูเดือดร้อนน่ะ..."
10031030-108 = "[s] \"ฮิ... ฮินะ...!\""
10031030-109 = "อึก...!"
10031030-110 = "หึหึหึหึ! เราตัดสินใจแล้วละ!"
10031030-111 = "อย่าพูดอะไรไม่เข้าเรื่องนะ...!"
10031030-112 = "อ้อ ถ้าเป็นเรื่องนั้นน่ะไม่ต้องห่วงหรอก เราก็ไม่ได้โง่หรอกนะ ก็แค่จะเรียกร้องตามที่ควรจะเป็นก็เท่านั้น"
10031030-113 = "เรียกร้องตามที่ควรจะเป็น?"
10031030-114 = "ใช่แล้ว โซระซากิ ฮินะ... ครั้งนี้เธอต้องมาช่วยงานปาร์ตี้แห่งเกเฮนน่าที่ท่านมาโคโตะผู้นี้เตรียมไว้!"
10031030-115 = "พวกคุณนี่มัน... ฉันก็ได้ยินมาบ้างว่ากำลังเตรียมงานปาร์ตี้แห่งเกเฮนน่าอยู่"
10031030-116 = "แต่จะลากท่านประธานฮินะเข้าไปเกี่ยวด้วยแบบนี้ พวกคุณกำลังวางแผนร้ายที่แย่กว่าทุกๆ ปีอยู่ใช่ไหม#nคะ?"
10031030-117 = "เฮอะ! เลิกกล่าวหากันแบบไม่มีมูลได้แล้ว อามาอุ อาโกะ เราก็แค่จะจัดงานปาร์ตี้ที่เพียบพร้อมมากกว่า#nทุกปีก็เท่านั้น"
10031030-118 = "และที่สำคัญคือ ครั้งนี้ครูจะมาช่วยพวกเราด้วย! ฮะฮ่าฮ่าฮ่า!"
10031030-119 = "คุณครูด้วยเหรอ...?!"
10031030-120 = "[s] \"อืม... จับพลัดจับผลูมาน่ะ...\""
10031030-121 = "ใช่ ครูจะมาช่วยเรา ไม่ใช่แค่นั้นนะ! ครูก็ตั้งตารอปาร์ตี้สุดพิเศษแห่งเกเฮนน่าครั้งนี้ไม่น้อยเลยด้วย! เพราะมันเป็นปาร์ตี้ของท่านมาโคโตะผู้นี้ยังไงล่ะ!"
10031030-122 = "ปาร์ตี้ที่คุณครูตั้งตารอ..."
10031030-123 = "[s] \"ก็พอเป็นปาร์ตี้... ก็เลยตั้งตารอเป็นธรรมดานี่ อืม...\""
10031030-124 = "ปาร์ตี้นี้เกือบจะพังพินาศเพราะสถานที่จัดงานเสียหาย ประธานกรรมการวินัยก็เลยจะต้องเข้ามาเสริมหน่อย!"
10031030-125 = "เสริมงั้นเหรอ... เสริมอะไร?"
10031030-132 = "(ได้เวลาใช้ข้อมูลที่ได้มาจากแหล่งข่าวของแพนเดโมเนียม โซไซตี้แล้ว...!)"
10031030-133 = "ประธานกรรมการวินัย โซระซากิ ฮินะ!"
10031030-134 = "เธอจะต้องมาทำการแสดงบรรเลงเปียโนเปิดงาน <ปาร์ตี้สุดพิเศษแห่งเกเฮนน่า> ในครั้งนี้!"
10031030-135 = "คะ...?"
10031030-136 = "แสดงบรรเลง... เปียโน?"
10031030-137 = "หึหึหึ! ใช่! เดี่ยวเปียโนบนเวทีเลยละ!"
10031030-138 = "(ตามที่ได้ยินมาจากแหล่งข่าว นอกจากประธานกรรมการวินัยจะว่ายน้ำไม่เป็นแล้ว ยังเล่นเปียโนไม่เป็นอีกด้วย!)"
10031030-143 = "ท่านประธาน... บรรเลงเปียโน... งั้นเหรอ!"
10031030-144 = "ถ้าเป็นเรื่องแบบนั้น ฉันก็อยากบันทึกวิดีโอ...! ไม่สิ อยากฟังด้วยหูตัวเองอยู่หรอก!"
10031030-145 = "ตะ... แต่ว่าแบบนี้มัน...! จะไม่เป็นการบังคับไปหน่อยเหรอคะ...!"
10031030-146 = "เอาละ! ถ้าเอ่ยปากว่าจะรับผิดชอบแล้ว จะมาปฏิเสธเอาตอนนี้ก็ไม่ได้หรอกนะ จะหนีไปก็ไม่ได้ด้วย! ฮินะ!"
10031030-147 = "......"
10031030-148 = "[s] \"ฮินะ ถ้ามันหนักเกินไปก็ไม่ต้องทำหรอกนะ\""
10031030-149 = "คุณครู..."
10031030-150 = "ขอบคุณที่เป็นห่วงนะ แต่ฉันรับปากไปแล้ว"
10031030-151 = "ฉันเป็นฝ่ายสร้างความเดือดร้อนจริงๆ... และถ้าหากปาร์ตี้แห่งเกเฮนน่าครั้งนี้เป็นสิ่งที่คุณครูตั้งตารอ#nอยู่ละก็..."
10031030-152 = "ฉันเอง... ในฐานะประธานกรรมการวินัยโรงเรียนเกเฮนน่า... ก็อยาก..."
10031030-153 = "ตอบสนองต่อความคาดหวัง... ของคุณครู... เพราะงั้น..."
10031030-154 = "เข้าใจแล้ว ประธานมาโคโตะ ฉันจะตอบรับข้อเรียกร้องของคุณ"
10031030-155 = "จะ... จริงเหรอ?!"
10031030-156 = "ฮึ่ม...!"
10031030-157 = "ไม่สิ! ก็ต้องตอบรับอยู่แล้ว! อื้อ! ก็เธอเป็นประธานกรรมการวินัยที่พูดอะไรแล้วไม่กลับคำนี่นะ!"
10031030-158 = "ถ้างั้นเอาเป็นว่าเธอตอบตกลง ทางเราก็จะเตรียมงานไว้ให้แล้วกัน!"
10031030-163 = "อืม งั้นพวกฉันจะไปตามตัวชมรมพัฒนาออนเซ็นที่หนีไปก่อน"
10031030-164 = "พวกนั้นน่ะ ปล่อยไว้เฉยๆ ก็เอาแต่สร้างปัญหาไม่รู้จบ ไว้เคลียร์งานทางนี้เสร็จแล้ว ฉันค่อยไปซ้อมเปียโน..."
10031030-165 = "อาโกะ ไปกันเถอะ"
10031030-171 = "อ๊ะ... ทะ... ท่านประธาน?!"
10031030-177 = "นึกไม่ถึงเลยว่าจะยอมแต่โดยดี..."
10031030-178 = "หึหึ..."
10031030-179 = "หึหึหึ หึหึหึ หึหึหึหึหึ!"
10031030-180 = "จะได้ชมภาพที่น่าประทับใจแล้วละสิ...!"
10031030-181 = "ถ้ารับปากด้วยตัวเองแล้ว... อย่าคิดละว่าจะหนีเราได้ล่ะ! ประธานกรรมการวินัย โซระซากิ ฮินะ...!"
10031030-184 = "[ns] \"จะไม่เป็นไรใช่ไหมนะ...\""

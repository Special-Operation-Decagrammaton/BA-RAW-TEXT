[translation]
80000025-1 = "鬍子巧克力"
80000025-2 = "赤冬聯邦學園．第一供給設施"
80000025-3 = "你來了啊同志，等你好久了！"
80000025-4 = "今天找同志來不為別的，就是想和同志分享赤冬聯邦學園的偉大成果！"
80000025-5 = "雖然赤冬聯邦學園在咱的帶領下，每天都有偉大成果就是了。哈哈哈哈哈！"
80000025-6 = "[s]「那個偉大成果跟這裡有關嗎？」"
80000025-7 = "唔呣。問得真好，同志！"
80000025-8 = "這裡的大家正在製作赤冬聯邦學園的特製牛奶巧克力「潔蓮卡」。"
80000025-9 = "「潔蓮卡」上面刻著本潔莉諾大人的肖像，是赤冬聯邦學園的名產。#n吃過這款巧克力的學生都異口同聲地讚賞「甜到掉牙」！"
80000025-10 = "咱也非常喜歡這個潔蓮卡。"
80000025-11 = "主廚，把剛出爐的潔蓮卡拿來。"
80000025-17 = "……唔呣，果然很美味。這股強烈的甜味真是好東西……"
80000025-18 = "不過即使這麼美味，赤冬聯邦學園以外的奇普托斯學生，#n似乎連潔蓮卡的存在都不知道。"
80000025-19 = "明明只要嚐過一次就會欲罷不能的說。"
80000025-20 = "於是！咱聽說奇普托斯的學生們，#n好像即將舉辦互相交換巧克力的、名叫「情人節」的活動。"
80000025-21 = "所以咱打算趁這個機會推廣「潔蓮卡」這種偉大又美妙的巧克力。"
80000025-22 = "[s]「原來如此。話說，為什麼要找我……？」"
80000025-23 = "那當然是因為同志是夏萊的老師。"
80000025-24 = "同志在這之前和各所學校的學生有過許多交流對吧？#n這樣不是正適合擔任傳達赤冬聯邦學園偉大的「親善大使」嗎！"
80000025-25 = "去吧，同志。讓整個奇普托斯都知道「潔蓮卡」是多麼偉大的東西吧！"
80000025-26 = "[s]「在那之前，可以讓我試吃看看嗎？」"
80000025-27 = "也，也對。確實得要事先品嘗過它的偉大才行。"
80000025-28 = "主廚，立刻把剛做好巧克力拿來給同志品嚐。"
80000025-32 = "……什麼？因為材料不足，剛才咱吃的就是最後一個了？"
80000025-33 = "唔，生產系統竟然沒有好好運作……"
80000025-34 = "全員肅清！"
80000025-38 = "……呼呣。發生了一點小騷動，但是同志不用在意。"
80000025-39 = "[s]「巧克力的生產沒問題嗎……？」"
80000025-40 = "當，當然囉。雖然材料變得更加不足，#n但只要大家齊心協力，區區巧克力要準備多少都沒問題才對。"
80000025-41 = "只要有咱的領導，赤冬聯邦學園就沒有「不可能」這三個字！"
80000025-45 = "總，總之……"
80000025-50 = "收下這個咱吃過的巧克力吧。"
80000025-51 = "仔細品嘗之後，將感想傳達到奇普托斯的每個角落吧。"
80000025-52 = "交給你囉！"
80000025-54 = "（從潔莉諾那裡收下的牛奶巧克力不止異常的甜，而且還相當硬……）"

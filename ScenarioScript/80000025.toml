[translation]
80000025-1 = "ช็อกโกแลตหนวด"
80000025-2 = "โรงอาหาร 1 สหภาพเรดวินเทอร์"
80000025-3 = "เข้ามาเลย สหาย! เรากำลังรอสหายอยู่เลย"
80000025-4 = "ที่เราเรียกมาวันนี้ก็ไม่ใช่เรื่องใหญ่อะไรหรอก เราแค่อยากส่งผ่านความสำเร็จที่ยิ่งใหญ่ของสหภาพ#nเรดวินเทอร์ให้สหายก็เท่านั้น"
80000025-5 = "ก็นะ... เรื่องที่สหภาพเรดวินเทอร์ที่มีเราเป็นผู้นำค่อยๆ ก้าวหน้าขึ้นทุกวันแบบนี้น่ะ อันที่จริงก็ไม่ใช่#nเรื่องที่น่าแปลกใจเท่าไรหรอก ฮ่ะฮ่ะฮ่า!"
80000025-6 = "[s] \"ทำอะไรอยู่ที่นี่งั้นเหรอ?\""
80000025-7 = "อืม เป็นคำถามที่ดีเลย สหาย!"
80000025-8 = "สหายที่ดูแลที่นี่กำลังผลิตช็อกโกแลตนมสูตรพิเศษของสหภาพเรดวินเทอร์ <ช็อกเชริโน่> อยู่น่ะ"
80000025-9 = "<ช็อกเชริโน่> เป็นสินค้าพิเศษชนิดใหม่ของสหภาพเรดวินเทอร์ที่ทำเป็นรูปเหมือนของเรา พวกเด็กนักเรียนที่ยังไม่เคยกินช็อกโกแลตนี้ พอได้ลิ้มรสแล้วจะต้องร้องว่า \"อร่อยเหาะจนลืมเคี้ยว!\" ไปเลย!"
80000025-10 = "เราพอใจในรสหวานกลมกล่อมของช็อกเชริโน่มากเลยล่ะ"
80000025-11 = "เชฟ ไปเอาช็อกเชริโน่ที่ผลิตใหม่ออกมาให้เราทีสิ"
80000025-17 = "อืม... ว่าแล้วเชียว รสชาติอร่อยเหมือนเดิมเลยนะเนี่ย รสหวานลืมตายแบบนี้อร่อยจริงๆ..."
80000025-18 = "แต่ไม่รู้ว่าทำไมพวกนักเรียนของโรงเรียนอื่นๆ นอกจากนักเรียนของสหภาพเรดวินเทอร์ถึงไม่ชอบ#nช็อกเชริโน่ แถมดูเหมือนจะยังไม่รู้จักขนมชนิดนี้อีกด้วย"
80000025-19 = "ทั้งที่เป็นรสชาติที่ถ้าได้ลิ้มลองสักครั้งก็จะลืมไม่ลงแท้ๆ..."
80000025-20 = "แต่จากที่เราได้ยินมา ที่คิโวทอสกำลังจะจัดงานเทศกาล \"วาเลนไทน์\" ที่พวกนักเรียนจะให้ช็อกโกแลต#nกันขึ้นมานี่นา"
80000025-21 = "เพราะงั้นเราเลยคิดว่าจะใช้โอกาสนี้ทำให้นักเรียนโรงเรียนอื่นๆ ได้รับรู้ถึงความยิ่งใหญ่ของ <ช็อกเชริโน่> ยังไงล่ะ"
80000025-22 = "[s] \"แล้วเรียกครูมาทำไมเหรอ...?\""
80000025-23 = "แน่นอนอยู่แล้ว ก็เพราะสหายเป็นครูของชาเล่ต์ยังไงล่ะ"
80000025-24 = "ในฐานะที่สหายเป็นคุณครูของชาเล่ต์ที่ต้องติดต่อ พบปะกับนักเรียนของโรงเรียนต่างๆ เลยเหมาะ#nที่จะเป็นผู้เผยแพร่ความยิ่งใหญ่ของสหภาพเรดวินเทอร์ของเรายังไงล่ะ"
80000025-25 = "เอาล่ะ สหาย ตั้งแต่นี้ไปเราจะประกาศความจริงนี้ไปให้ทั่วทั้งคิโวทอสรับรู้ และให้ได้ลิ้มลองว่า#nช็อกโกแลตของสหภาพเรดวินเทอร์น่ะ อร่อยเหาะขนาดไหน!"
80000025-26 = "[s] \"ถ้างั้นขอครูชิมช็อกโกแลตหน่อยสิ\""
80000025-27 = "เอ่อ...? ก็...ก็ได้ ต้องลองชิมรสชาติช็อกโกแลตก่อนถึงจะรับรู้ความยิ่งใหญ่ได้สินะ"
80000025-28 = "เชฟ รีบไปเอาช็อกโกแลตมาให้สหายเรากินเดี๋ยวนี้เลย"
80000025-32 = "วะ...ว่ายังไงนะ? วัตถุดิบสำหรับทำช็อกเชริโน่มีไม่พอ เลยผลิตได้แค่ที่ทำให้เรากินเท่านั้นเหรอ?"
80000025-33 = "อึ่ก... บอกว่าวัตถุดิบไม่พอจนถึงกับผลิตออกมาไม่ได้นี่มัน..."
80000025-34 = "เราจะกวาดล้างให้หมดทุกคนเลย!"
80000025-38 = "ฮึ่ม ฮึ่ม... เกิดเรื่องวุ่นวายขึ้นนิดหน่อย ช่วยลืมไปเถอะนะ สหาย"
80000025-39 = "[s] \"การผลิตช็อกโกแลตไม่เป็นไรแน่นะ?\""
80000025-40 = "อื้อ มะ...ไม่เป็นไรอยู่แล้ว ถึงตอนนี้เราจะมีวัตถุดิบไม่พอ แต่ถ้าทุกคนพยายามร่วมมือเป็นน้ำหนึ่ง#nใจเดียวกันละก็... แค่ช็อกโกแลตน่ะ หามาได้อยู่แล้วล่ะ"
80000025-41 = "สหภาพเรดวินเทอร์ที่มีเราเป็นผู้นำน่ะ ไม่มีคำว่าเป็นไปไม่ได้!"
80000025-45 = "แต่ว่าตอนนี้มันไม่มีช็อกโกแลตใหม่..."
80000025-50 = "ถ้างั้นก็เอาช็อกโกแลตของเราไปก่อนแล้วกัน"
80000025-51 = "พอลองชิมแล้วก็อย่าลืมเอาไปเล่าให้ทั่วคิโวทอสเลยนะ"
80000025-52 = "เข้าใจมั้ย? ต้องโปรโมตช็อกโกแลตของเราไปให้ทั่วคิโวทอสเลยนะ!"
80000025-54 = "(ช็อกโกแลตนมที่เชริโน่ยื่นให้ทั้งมีรสหวานเกินไป และแข็งจนกินยากมาก...)"

[translation]
80000025-1 = "Chocolate Mustache"
80000025-2 = "Red Winter Academy First Cafeteria"
80000025-3 = "Welcome, Comrade! You've kept me waiting!"
80000025-4 = "I've called you here to tout Red Winter Federal Academy's latest great achievement."
80000025-5 = "One of many great achievements, thanks to its illustrious leader: Me!#nHahaha!"
80000025-6 = "[s] \"What would that be?\""
80000025-7 = "Excellent question, Comrade!"
80000025-8 = "The students here are making Cherenka, a very special milk chocolate!"
80000025-9 = "It is a Red Winter Academy specialty, most notably with my portrait engraved on it! Praises of its delectably sweet taste are sung all over the school!"
80000025-10 = "Its taste has never failed to please me."
80000025-11 = "Chef, bring me some freshly made Cherenka."
80000025-17 = "Yes. This taste. The overwhelming sweetness!"
80000025-18 = "But, very tragically, this true miracle of a chocolate remains undiscovered by the remainder of Kivotos!"
80000025-19 = "If they tasted it even once, they'd never forget it."
80000025-20 = "I hear of an event called Valentine's Day, where students exchange chocolates with each other."
80000025-21 = "I will seize this opportunity to promote the greatness of Cherenka all across the region!"
80000025-22 = "[s] \"But why am I here?\""
80000025-23 = "Because you're the famous Sensei from Schale, Comrade."
80000025-24 = "You are the bridge between schools, so only you are qualified to deliver the message of Cherenka's existence!"
80000025-25 = "Now, Comrade! Spread my words and chocolate to every student in Kivotos!"
80000025-26 = "[s] \"Let me at least have a taste first.\""
80000025-27 = "H-Huh? Oh! R-Right, you have to actually taste it to know its greatness."
80000025-28 = "Chef, bring some Cherenka for my comrade."
80000025-32 = "What?! You do not have ingredients for more?!"
80000025-33 = "How dare you not fulfill the production quota!"
80000025-34 = "I'll purge every last one of you!"
80000025-38 = "Ahem. My apologies for the commotion."
80000025-39 = "[s] \"How's the chocolate production going?\""
80000025-40 = "F-Fantastic. We may be slightly lacking in supplies, but with enough incentive they will get the job done!"
80000025-41 = "Under my leadership, nothing is impossible!"
80000025-45 = "I may not have a fresh one..."
80000025-50 = "...so please ignore the bite I've already taken out of this one."
80000025-51 = "Taste it and spread the word all over Kivotos!"
80000025-52 = "Understood? This is your directive!"
80000025-54 = "Cherino's milk chocolate was so sweet I could barely eat it..."

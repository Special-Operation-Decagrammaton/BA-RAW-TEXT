[translation]
80000025-1 = "#title;수염 초콜릿"
80000025-2 = "#place;붉은겨울 학원 제1 급양시설"
80000025-3 = "3;체리노;01;어서 오게, 콤라드! 그대를 기다리고 있었다네.\n#3;em;[반응]\n#3;a"
80000025-4 = "3;체리노;05;오늘 그대를 부른 까닭은 다름이 아니라, 콤라드에게 전달하고 싶은 붉은겨울 학원의 위대한 성과가 있었기 때문이다.\n#3;hophop"
80000025-5 = "3;체리노;03;뭐. 이 몸이 이끄는 붉은겨울 학원이 나날이 위대한 성과를 거두고 있다는 사실은 그리 놀랄 만한 일도 아니지만 말이야. 하하하!\n#3;em;[반짝]"
80000025-6 = "[s] \"이곳에서는 무얼 만들고 있는 거야?\""
80000025-7 = "3;체리노;02;음. 좋은 질문이다, 콤라드!\n#3;greeting"
80000025-8 = "3;체리노;01;이곳의 동지들은 지금 붉은겨울 학원의 특제 밀크 초콜릿, <체룐카>를 만드는 중이다."
80000025-9 = "3;체리노;01;<체룐카>는 이 몸의 초상화가 새겨진 붉은겨울 학원의 특산품으로, 이 초콜릿을 먹어본 학생들은 '이가 빠질 것 같은 맛'이라며 입을 모아 칭찬을 아끼지 않았지!\n#3;em;[재잘]\n#3;hophop"
80000025-10 = "3;체리노;03;나 역시도 체룐카의 단맛에는 언제나 만족하고 있다네."
80000025-11 = "3;체리노;05;조리장, 갓 생산된 체룐카를 이리 가져오게.\n#3;greeting"
80000025-12 = "#all;hide"
80000025-13 = "#wait;2000"
80000025-14 = "#wait;1000"
80000025-15 = "#wait;1500"
80000025-16 = "#all;hide"
80000025-17 = "3;체리노;99;……음, 역시 변함없이 맛있군. 이 강렬한 단맛이 정말로 끝내줘…….\n#3;em;[반짝]\n#3;a"
80000025-18 = "3;체리노;06;하지만 어째서인지 붉은겨울 학원을 제외한 키보토스의 다른 학생들은 이 체룐카를 좋아하기는커녕, 존재 자체도 모르고 있는 모양이야.\n#3;stiff"
80000025-19 = "3;체리노;03;한 번이라도 맛을 본다면 절대로 싫어할 수가 없는 맛인데 말이지.\n#3;em;[하트]"
80000025-20 = "3;체리노;01;그런데 듣자 하니 키보토스의 학생들이 서로 초콜릿을 주고받는, '발렌타인 데이' 라는 행사가 곧 열릴 예정이라고 하더군."
80000025-21 = "3;체리노;05;그래서 이 기회에 <체룐카>가 얼마나 위대하고 훌륭한 초콜릿인지 다른 학교의 학생들에게 미리 선전을 하고자 한다네.\n#3;em;[반짝]\n#3;hophop"
80000025-22 = "[s] \"그런데 어째서 나를……?\""
80000025-23 = "3;체리노;02;그야 당연히 콤라드가 샬레의 선생이기 때문이다.\n#3;em;[반응]"
80000025-24 = "3;체리노;01;콤라드는 샬레의 선생으로서 여러 학교의 학생들과 활발한 교류를 이어가고 있는 만큼, 우리 붉은겨울 학원의 위대함을 전파하는 사절로서 부족함이 없기 때문이다."
80000025-25 = "3;체리노;05;자, 콤라드. 지금부터 우리 붉은겨울 학원의 초콜릿이 얼마나 위대한지 직접 맛보고 키보토스 전역에 이 사실을 널리 알리도록!\n#3;em;[재잘]\n#3;hophop"
80000025-26 = "[s] \"그럼 초콜릿을 맛보게 해 줘.\""
80000025-27 = "3;체리노;04;어, 어……? 그, 그렇지. 초콜릿을 직접 맛봐야 그 위대함을 알 수 있지.\n#3;shake"
80000025-28 = "3;체리노;02;조리장. 지금 즉시 콤라드가 먹을 초콜릿을 가져오게.\n#3;em;[반응]"
80000025-29 = "#st;[0,0];instant;1;"
80000025-30 = "#clearST"
80000025-31 = "3;체리노;02\n#3;em;…\n#wait;2500"
80000025-32 = "3;체리노;04;……뭐라? 체룐카의 생산 재료가 부족해서 내가 먹을 분량밖에 만들지 못했다고?\n#3;em;[!]\n#3;shake"
80000025-33 = "3;체리노;05;우읏…… 아무리 재료가 부족하다 하더라도 생산량을 맞추지 못하다니……\n#3;stiff"
80000025-34 = "3;체리노;05;전원 숙청이다!\n#3;hophop\n#3;closeup"
80000025-35 = "#all;hide"
80000025-36 = "#wait;1000"
80000025-37 = "#all;hide"
80000025-38 = "3;체리노;99;흠, 흠. 잠시 사소한 소동이 있었군. 잊어주게, 콤라드.\n#3;greeting\n#3;a"
80000025-39 = "[s] \"초콜릿의 생산은 괜찮은 거야?\""
80000025-40 = "3;체리노;04;무, 물론이다. 지금은 재료가 부족하긴 하지만, 모두가 같은 마음으로 열심히 노력한다면 초콜릿 정도는 어떻게든 구할 수 있으니까…….\n#3;em;[땀]\n#3;stiff"
80000025-41 = "3;체리노;05;이 몸이 이끄는 붉은겨울 학원에 불가능은 없어!\n#3;hophop"
80000025-42 = "#st;[0,0];instant;1;"
80000025-43 = "#clearST"
80000025-44 = "3;체리노;05\n#3;em;…\n#wait;2500"
80000025-45 = "3;체리노;06;일단 새 초콜릿은 없지만……\n#3;stiff"
80000025-46 = "#st;[0,0];instant;1;"
80000025-47 = "#clearST"
80000025-48 = "3;체리노;06\n#3;d\n#wait;1000"
80000025-49 = "#wait;1000"
80000025-50 = "1;체리노;02;우선은 이 몸이 먹던 초콜릿이라도 대신해서 받아주게.\n#1;greeting\n#1;a"
80000025-51 = "1;체리노;05;그리고 맛을 보고 그 소감을 꼭 키보토스 전역에 전파할 수 있도록.\n#1;jump\n#1;m3"
80000025-52 = "1;체리노;05;알겠나? 꼭 키보토스 전역에 우리 초콜릿을 홍보해야 해!\n#1;em;[!]\n#1;hophop\n#1;closeup"
80000025-53 = "#all;hide"
80000025-54 = "#na;(체리노에게서 받은 밀크 초콜릿은 지나치게 달고 딱딱해서 먹기가 어려웠다…….)"

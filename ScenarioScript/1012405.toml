[translation]
1012405-1 = "ที่ชายหาด"
1012405-2 = "(วันหนึ่งที่อากาศสดใส คุณครูกับฮาสุมินัดเจอกันที่ชายหาด...)"
1012405-3 = "(จู่ๆ คุณครูก็เห็นปีกขนาดใหญ่ของฮาสุมิจากข้างหลังเสาที่อยู่ไกลออกไป)"
1012405-4 = "[ns1] \"ฮาสุมิ ตรงนี้!\"\n[ns2] \"ฮาสุมิ?\""
1012405-9 = "ไม่เป็นไรนะ ฮาสุมิ... เราก็พยายามอย่างหนักแล้วนี่นา...!"
1012405-10 = "คะ... คุณครู..."
1012405-11 = "ฉันดูแปลกหรือเปล่าคะ?"
1012405-12 = "[s3] \"ก็ไม่นะ กังวลเรื่องชุดเหรอ?\"\n[s4] \"กังวลเรื่องไซซ์ของชุดว่ายน้ำเหรอ?\""
1012405-15 = "ปะ... เปล่าค่ะ! ชุดว่ายน้ำชุดนี้ไซซ์พอดีกับตัวฉันเลยค่ะ"
1012405-19 = "แต่ก็... อย่างที่คุณครูรู้ว่าเมื่อเทียบกับคนอื่นแล้ว ขนาดตัวของฉันมัน..."
1012405-20 = "ขนาดตัวฉันค่อนข้างใหญ่ ก็เลยไม่รู้ว่าจะเหมาะกับชุดน่ารักๆ แบบนี้หรือเปล่า..."
1012405-21 = "[s] \"ไม่ต้องห่วงนะ ชุดนี้เข้ากับฮาสุมิมากเลย!\""
1012405-22 = "พอคุณครูพูดแบบนี้... ฉันก็ไม่มีอะไรต้องกังวลแล้วละค่ะ"
1012405-23 = "แต่จะว่าไป คุณครูคะ งานของฉันเสร็จเร็วกว่าที่คาดไว้ประมาณ 1 วันน่ะค่ะ..."
1012405-24 = "จะขอยืมเวลานั้นเหรอคะ หมายความว่ายังไงคะ?"
1012405-25 = "[s5] \"ก็อย่างที่ว่าเลย มาอยู่กับครูเถอะนะ\"\n[s6] \"ครูไม่มีอะไรทำ วันนี้มาอยู่กับครูเถอะนะ\""
1012405-28 = "พูดอะไรอย่างนั้นคะ... ฉันติดหนี้บุญคุณคุณครูไว้มากมาย เพราะงั้นไม่จำเป็นต้องขอร้องฉันก็ได้ค่ะ..."
1012405-29 = "[s] \"งั้นเริ่มจากการก่อปราสาททรายด้วยกันนะ!\""
1012405-30 = "ปะ... ปราสาททรายเหรอคะ...?"
1012405-31 = "มะ... ไม่ใช่อย่างนั้นค่ะ ฉันแค่คิดว่าการเล่นอะไรน่ารักๆ แบบนี้มันไม่เหมาะกับฉันเท่าไร..."
1012405-32 = "แต่ในเมื่อนี่เป็นคำขอของคุณครู ฉันก็จะ..."
1012405-33 = "ยินดีเล่นด้วยค่ะ"
1012405-35 = "(จากนั้นคุณครูกับฮาสุมิก็สนุกกับการเล่นก่อปราสาททรายด้วยกัน)"
1012405-36 = "(และ...)"
1012405-39 = "[ns] \"ฮาสุมิ ต่อไปเป็นการอบทรายร้อน!\""
1012405-40 = "อบทรายร้อนเหรอคะ... ฉันไม่เคยทำมาก่อนเลย ให้ฉันเอาทรายมากองถมๆ คุณครูใช่มั้ยคะ?"
1012405-41 = "[s] \"คนที่ต้องนอนไม่ใช่ครูหรอก ฮาสุมิต่างหากล่ะ!\""
1012405-42 = "คะ?!"
1012405-44 = "(และได้เล่นอบทรายร้อนด้วยกัน...)"
1012405-47 = "พูดอะไรหน่อยสิคะ..."
1012405-48 = "[s7] \"แค่ตัวลอยในน้ำ ก็ถือว่าว่ายน้ำสำเร็จไปครึ่งหนึ่งแล้วละ!\"\n[s8] \"ทำไมว่ายไม่ไปข้างหน้าเลยนะ...?\""
1012405-51 = "ฉันกำลังว่ายไปข้างหน้าอยู่ค่ะ! ถึงจะช้ามากก็เถอะ!"
1012405-52 = "แต่ยังไงก็อย่าพูดว่าฉันช้านะคะ!"
1012405-54 = "(และได้รู้ว่าฮาสุมิมีด้านที่คิดไม่ถึง นั่นคือเธอว่ายน้ำไม่ค่อยเก่ง...)"
1012405-57 = "คะ... คุณครู เราเดินผ่านร้านนี้กันเถอะค่ะ"
1012405-58 = "อ้อ แน่นอนว่าถ้าคุณครูหิว ฉันก็จะไปเป็นเพื่อนค่ะ แต่ฉันไม่กินนะคะ"
1012405-59 = "[s9] \"หืม? ไม่ค่อยชอบอาหารร้านริมทะเลเหรอ?\"\n[s10] \"ครูไม่เป็นไรนะ แต่ฮาสุมิไม่หิวเหรอ?\""
1012405-62 = "ไม่ใช่อย่างนั้นค่ะ... ที่จริงฉันก็... ชะ... ช่างเถอะค่ะ ไม่เป็นไรค่ะ!"
1012405-64 = "(แล้วคุณครูก็ถูกฮาสุมิที่ดื้อรั้นอย่างไม่มีสาเหตุผลักจนเดินผ่านร้านริมทะเลไป...)"
1012405-67 = "อืม... แถวนี้น่าจะดีนะคะ"
1012405-73 = "มันง่ายกว่าที่คิดนิดหน่อยนะคะเนี่ย การผ่าแตงโมน่ะค่ะ"
1012405-74 = "[s11] \"ผ่าได้ในครั้งเดียวเลยนะ น่าทึ่งมากเลย!\"\n[s12] \"ทำไมสไนเปอร์ถึงผ่าแตงโมเก่งขนาดนี้นะ...?\""
1012405-77 = "น่าจะเพราะฉันหาสมดุลได้ดีกว่าคนอื่นน่ะค่ะ"
1012405-78 = "อาจเป็นเพราะปีกของฉันช่วยรักษาจุดศูนย์ถ่วงเอาไว้ด้วยค่ะ แต่ก็เป็นการเดาส่วนตัวของฉันนะคะ"
1012405-79 = "แต่พอคิดแบบนั้น จิตใจฉันก็สับสนนิดหน่อยนะคะ..."
1012405-80 = "[s] \"ทำไมเหรอ? ปีกของฮาสุมิสวยออก\""
1012405-81 = "งะ... งั้นเหรอคะ?"
1012405-82 = "คุณครูคิดแบบนั้นสินะคะ..."
1012405-83 = "ถ้างั้นฉันคงต้องภูมิใจกับปีกนี้อีกหน่อยแล้วละค่ะ"
1012405-85 = "(และทั้งสองก็ได้สนุกกับการผ่าแตงโมด้วยกัน...)"
1012405-90 = "วอลเลย์บอลชายหาดอาจไม่ได้เอาไว้เล่นกันแค่ 2 คนก็ได้นะคะ..."
1012405-91 = "[s13] \"แต่ไหนๆ ก็ได้มาเล่นสนุกแล้วนะ\"\n[s14] \"แต่มันอาจจะสนุกก็ได้นะ\""
1012405-94 = "ถึงคุณครูจะพูดอย่างนั้น..."
1012405-98 = "เอ๋..."
1012405-99 = "[s] \"โอเคหรือเปล่า?\""
1012405-100 = "อ่า ค่ะ ขอโทษที่ทำให้เป็นห่วงนะคะ ฉันแค่เวียนหัวไปชั่วขณะน่ะค่ะ"
1012405-101 = "แต่ฉันไม่เป็นไรเลยนะคะ..."
1012405-108 = "[ns] \"ฮาสุมิ?!\""
1012405-110 = "อืม... ที่นี่คือ..."
1012405-114 = "[ns] \"พอจะลุกขึ้นไหวมั้ย?\""
1012405-115 = "ฉันหมดสติไป คุณครูก็เลยอุ้มฉันมานอนพักในร่มสินะคะ น่าอายจริงๆ เลยค่ะ"
1012405-116 = "คุณครูอุ้มฉันมา...? ถ้างั้นก็..."
1012405-120 = "ฮะ... ฮะ... เฮือกกก?!"
1012405-121 = "ฉะ... ฉัน... ตัวหนักหรือเปล่าคะ...! อ๊ะ ไม่นะ ไม่ต้องตอบนะคะ!"
1012405-122 = "[s] \"ฮาสุมิ ครูขอโทษนะ\""
1012405-123 = "คะ? ทำไมคุณครูถึงขอโทษฉันล่ะ?"
1012405-124 = "[s15] \"ฮาสุมิก็น่าจะเหนื่อยจากการทำงานแท้ๆ\"\n[s16] \"ครูขอโทษที่ลากไปนู่นมานี่นะ\""
1012405-127 = "ฉะ... ฉันไม่เป็นไรเลยค่ะ! สาเหตุที่ฉันเป็นลมไปน่ะ...!"
1012405-128 = "เอาเถอะค่ะ เอาเป็นว่ามันไม่ใช่ความผิดของคุณครูเลยค่ะ ฉันแค่... แค่..."
1012405-132 = "......"
1012405-133 = "[s] \"ฮาสุมิ ครูแค่ถามเผื่อๆ นะ\""
1012405-137 = "[ns] \"อดข้าวมาเหรอ?\""
1012405-139 = "ค่ะ..."
1012405-147 = "อ๊ะ คุณครู! จะพาฉันไปไหน...!"
1012405-148 = "อย่าบอกนะคะว่าที่นี่คือ...!"
1012405-150 = "ยากิโซบะ ข้าวโพดปิ้ง ไอศกรีมวานิลลา และเมลอนโซดาที่สั่งได้แล้วครับ! ถ้าทานเสร็จแล้วเดี๋ยวจะ#nเอาน้ำแข็งไสที่สั่งไว้มาเสิร์ฟให้นะครับ!"
1012405-151 = "จะว่าไป คุณลูกค้าทานกันเก่งจังเลยนะครับ! เหมือนไม่ได้ทานของอร่อยมาหลายวันอย่างนั้นละ! คนทำอาหารเห็นแล้วก็ปลื้มใจนะครับ ฮ่าฮ่า!"
1012405-156 = "มันก็อร่อยมากๆ อยู่หรอกค่ะ... แต่ฉันทำให้คุณครูต้องเดือดร้อนเพราะตัวเองเป็นลม แถมยังต้องมาเลี้ยงอาหารฉันอีก..."
1012405-157 = "[s] \"ฮาสุมิ\""
1012405-161 = "[ns17] \"ไม่ต้องไอเดตให้มากหรอก สุขภาพดีสำคัญกว่าหุ่นดีนะ\"\n[ns18] \"ครูชอบนักเรียนที่สนุกกับการกินและมีสุขภาพดีมากกว่านะ\""
1012405-164 = "ฉันจะกลับไปทบทวนตัวเองค่ะ... ฮืออ"
1012405-165 = "[s] \"ครูเลิกดุแค่นี้ดีกว่า เอาละ มากินกันเถอะ!\""
1012405-167 = "(ถึงจะเลยเวลามื้อเย็นไปแล้ว แต่คุณครูกับฮาสุมิก็กินมื้อเย็นด้วยกันอย่างสนุกสนาน)"

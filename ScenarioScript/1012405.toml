[translation]
1012405-1 = "At the Beach"
1012405-2 = "I was enjoying the nice weather as I waited for Hasumi."
1012405-3 = "I saw her wings poking out from her hiding spot before I actually saw her."
1012405-4 = "[ns1] \"Hasumi, over here!\"\n[ns2] \"Hasumi?\""
1012405-9 = "It's okay, Hasumi... You worked hard...!"
1012405-10 = "H-Hello, Sensei..."
1012405-11 = "Do I look...out of place?"
1012405-12 = "[s3] \"You look like you were made to be here.\"\n[s4] \"Are you talking about the sizing?\""
1012405-15 = "N-No! The swimsuit fits me perfectly!"
1012405-19 = "However, compared to the others, my body might be considered, a little..."
1012405-20 = "...thicker. I don't know if such \"cutesy\" things are for me."
1012405-21 = "[s] \"You look cute from every angle!\""
1012405-22 = "I appreciate your kind words..."
1012405-23 = "Let's get back to business. Thanks to you, I've wrapped up work early today."
1012405-24 = "However, I didn't quite understand what you meant by \"borrow my time.\""
1012405-25 = "[s5] \"Exactly what it sounds like.\"\n[s6] \"I'm bored, so play with me.\""
1012405-28 = "I owe you many debts, so you don't even need to ask."
1012405-29 = "[s] \"In that case, let's start with building a sandcastle!\""
1012405-30 = "A-A sandcastle?"
1012405-31 = "Oh. I'm not opposed. I simply could never imagine myself undertaking such a cute, fun activity."
1012405-32 = "However, since that's what you want..."
1012405-33 = "...I'm more than happy to oblige."
1012405-35 = "Despite Hasumi's reluctance, we enjoyed making sandcastles together."
1012405-36 = "And after that..."
1012405-39 = "[ns] \"Hasumi, let's do a sand bath!\""
1012405-40 = "I've never done it before. I simply need to cover your body with sand?"
1012405-41 = "[s] \"You'll be the one sand bathing, not me!\""
1012405-42 = "What?!"
1012405-44 = "And so I gave Hasumi a sand bath."
1012405-47 = "...Please say something."
1012405-48 = "[s7] \"F-Floating is the first step to swimming!\"\n[s8] \"Why can't you move forward...?\""
1012405-51 = "I am going forward! Slowly!"
1012405-52 = "However, I don't want to hear you call me slow!"
1012405-54 = "I learned that Hasumi was surprisingly terrible at swimming."
1012405-57 = "I'll pass on the Beach Shack, Sensei..."
1012405-58 = "Unless you're hungry, of course. But I don't feel much like eating."
1012405-59 = "[s9] \"Oh, do you not like the food here?\"\n[s10] \"I'm okay. I was just worried that you were hungry.\""
1012405-62 = "N-No, I do like it... I-I just... I'm fine at the moment!"
1012405-64 = "Hasumi was uncharacteristically stubborn about it, so I let her push me away from the Beach Shack."
1012405-67 = "Hmm... Maybe here?"
1012405-73 = "Watermelon crush is surprisingly easy."
1012405-74 = "[s11] \"No one gets it on their first try, Hasumi!\"\n[s12] \"Why are all snipers so good at this game...?\""
1012405-77 = "I've been told that I have an excellent sense of balance."
1012405-78 = "I believe it's because of my large wings."
1012405-79 = "Which I suppose I'm grateful for, but overall..."
1012405-80 = "[s] \"Huh? But your wings are so pretty!\""
1012405-81 = "D-Do you really feel that way, Sensei?"
1012405-82 = "I see... I've never viewed them like that."
1012405-83 = "If that's how you feel, I'll do my best to be proud of them. Even if they are oversized."
1012405-85 = "We played watermelon crush for a while, and then..."
1012405-90 = "To my understanding, beach volleyball is not a two-person sport."
1012405-91 = "[s13] \"That's true, but...\"\n[s14] \"...maybe it'll be fun?\""
1012405-94 = "No matter how optimistic you are about it..."
1012405-98 = "Ah..."
1012405-99 = "[s] \"Are you okay?\""
1012405-100 = "Yes, I am. Please don't worry. I just got a bit dizzy."
1012405-101 = "I'm perfectly fine..."
1012405-108 = "[ns] \"Hasumi?!\""
1012405-110 = "Um... I'm..."
1012405-114 = "[ns] \"Don't get up too fast.\""
1012405-115 = "Did I faint? And you moved me to the shade? How can I ever apologize enough for this?"
1012405-116 = "W-Wait. You moved me here? Th-That must mean..."
1012405-120 = "A-A-Aaaaah?!"
1012405-121 = "By any chance, was I too heavy...? Wait, actually, please stop! Don't answer that."
1012405-122 = "[s] \"I'm really sorry, Hasumi.\""
1012405-123 = "What reason could you have to apologize to me?"
1012405-124 = "[s15] \"You've already been exerting so much energy at work.\"\n[s16] \"I shouldn't have dragged you around to do all those things.\""
1012405-127 = "N-No! That isn't why I fainted at all."
1012405-128 = "I promise it was absolutely not any fault of your own, Sensei."
1012405-132 = "..."
1012405-133 = "[s] \"Hasumi. I'm asking because I'm concerned.\""
1012405-137 = "[ns] \"Have you not been eating?\""
1012405-139 = "...I have not."
1012405-147 = "Ah, Sensei! Where are we...?"
1012405-148 = "Isn't this...?"
1012405-150 = "Here's your yakisoba, grilled corn, vanilla ice cream, and melon soda! The shaved ice will be out soon!"
1012405-151 = "You're eating my food like it's the first meal you've ever had! Youngins like you are what keep me going in the kitchen!"
1012405-156 = "Th-Thank you, Sensei. It's delicious. However, not only have I caused a scene, but you're even buying me food..."
1012405-157 = "[s] \"Hasumi.\""
1012405-161 = "[ns17] \"Healthy students should eat healthy meals.\"\n[ns18] \"And they shouldn't starve themselves for some pseudo-diet.\""
1012405-164 = "...I understand. *slurp*"
1012405-165 = "[s] \"Well, that's enough lecturing. Let's dig in!\""
1012405-167 = "It was a late dinner, but the two of us thoroughly enjoyed it together."

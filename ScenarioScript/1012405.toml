[translation]
1012405-1 = "在海灘上"
1012405-2 = "（今天的天氣正好。和蓮實約好在這裡見面……）"
1012405-3 = "（從柱子的後方，能看見蓮實那雙巨大的翅膀）"
1012405-4 = "[ns1]「蓮實，這邊！」\n[ns2]「蓮實？」"
1012405-9 = "沒事的，蓮實……你已經努力過了……！"
1012405-10 = "老，老師……"
1012405-11 = "看起來會奇怪嗎？"
1012405-12 = "[s3]「一點也不奇怪。」\n[s4]「你指的是衣服的尺寸嗎？」"
1012405-15 = "不，不是的！泳裝的尺寸恰到好處。"
1012405-19 = "只是……老師您也知道，我的身材跟別人比起來……"
1012405-20 = "相對大了一點，所以擔心自己究竟適不適合這麼可愛的衣服……"
1012405-21 = "[s]「不用擔心，非常適合你哦！」"
1012405-22 = "老師這麼說……我就放心了。"
1012405-23 = "話說回來，老師。#n託您的福，今天的行程已經提前結束了……"
1012405-24 = "想借用這段時間？#n您的意思是……？"
1012405-25 = "[s5]「就是字面上的意思。」\n[s6]「陪陪無聊的老師吧。」"
1012405-28 = "真是奇怪的要求……#n考量到您一直以來對我的照顧，就算您不說我也……"
1012405-29 = "[s]「首先就從堆沙堡開始！」"
1012405-30 = "堆，堆沙堡……？"
1012405-31 = "沒，沒什麼，只是覺得這種遊戲對我來說好像有點太可愛了……"
1012405-32 = "不過既然是老師的請求……"
1012405-33 = "我很樂意陪您一起。"
1012405-35 = "（就這樣和蓮實愉快地堆起了沙堡）"
1012405-36 = "（在那之後……）"
1012405-39 = "[ns]「蓮實，來做沙浴吧！」"
1012405-40 = "沙浴是嗎……我之前沒有嘗試過。#n是要把沙子堆在您身上嗎？"
1012405-41 = "[s]「要做沙浴的不是我，而是你哦！」"
1012405-42 = "咦！？"
1012405-44 = "（一起體驗了沙浴……）"
1012405-47 = "……請老師不必有所顧慮，儘管說吧。"
1012405-48 = "[s7]「游，游泳只要能浮起來就成功一半了！」\n[s8]「為什麼還是前進不了……？」"
1012405-51 = "我有在前進！雖然很慢！"
1012405-52 = "但請您不要說出來！"
1012405-54 = "（意外發現蓮實不擅長游泳……）"
1012405-57 = "老，老師，這裡還是直接略過吧。"
1012405-58 = "啊，當然如果老師餓了的話，我可以在旁邊陪您……但我自己就不吃了。"
1012405-59 = "[s9]「咦？你不喜歡海邊的小吃嗎？」\n[s10]「我是沒關係，但蓮實不餓嗎？」"
1012405-62 = "我並沒有不喜歡……總，總之先不用了！"
1012405-64 = "（被莫名堅持的蓮實推著，離開了海之家……）"
1012405-67 = "唔嗯……應該是這裡吧？"
1012405-73 = "打西瓜這項活動……比我想像中還簡單呢。"
1012405-74 = "[s11]「不是，一次就命中也太強了吧！」\n[s12]「為什麼狙擊手都這麼擅長打西瓜……？」"
1012405-77 = "我的平衡感和其他人相比，似乎還算相對出色。"
1012405-78 = "我想可能是因為有這雙翅膀幫助我保持平衡吧。"
1012405-79 = "雖然這麼一想，心情實在有點複雜……"
1012405-80 = "[s]「為什麼？蓮實的翅膀很漂亮的呀。」"
1012405-81 = "真，真的嗎？"
1012405-82 = "……原來老師是這麼想的。"
1012405-83 = "既然如此，我也應該稍微為這雙翅膀感到驕傲呢。"
1012405-85 = "（一起玩了打西瓜……）"
1012405-90 = "沙灘排球好像不是能兩個人玩的遊戲……"
1012405-91 = "[s13]「就是說啊，是我疏忽了。」\n[s14]「不過搞不好也能玩得挺開心的？」"
1012405-94 = "就算您這麼說……"
1012405-98 = "咦……"
1012405-99 = "[s]「你沒事吧？」"
1012405-100 = "啊，抱歉讓您擔心了。#n剛才只是有點頭暈。"
1012405-101 = "我真的沒事……"
1012405-108 = "[ns]「蓮實！？」"
1012405-110 = "唔嗯……這裡是……"
1012405-114 = "[ns]「能站起來嗎？」"
1012405-115 = "是老師您……在我昏倒之後把我搬到陰涼處的嗎？#n實在很不好意思。"
1012405-116 = "……老師搬我過來？#n也就是說……"
1012405-120 = "啊，啊啊啊！？"
1012405-121 = "該，該不會很重吧……！#n沒，沒關係，請您不要回答！"
1012405-122 = "[s]「蓮實，對不起。」"
1012405-123 = "咦？為什麼老師您要向我道歉？"
1012405-124 = "[s15]「明明蓮實也因為工作很累了。」\n[s16]「結果還被我硬拉著跑來跑去。」"
1012405-127 = "不，不是的！#n我並不是因為這個原因而昏倒……！"
1012405-128 = "總之這不是老師的錯。#n是，是因為……"
1012405-132 = "……"
1012405-133 = "[s]「蓮實，我問你哦……」"
1012405-137 = "[ns]「你該不會一直沒吃東西吧？」"
1012405-139 = "……是的。"
1012405-147 = "啊，老師！您要去哪裡……！"
1012405-148 = "這，這裡難道是……！"
1012405-150 = "您點的炒麵、烤玉米、香草冰淇淋和哈密瓜蘇打來囉！#n甜點的刨冰稍後再幫您送過來！"
1012405-151 = "不過客人您吃得還真香，簡直像是幾天沒吃飯了一樣呢！#n讓我也做得很有成就感，哈哈！"
1012405-156 = "好吃，真的好好吃……#n但我不只讓老師破費，還讓您照顧我……"
1012405-157 = "[s]「蓮實。」"
1012405-161 = "[ns17]「和看見學生為了減肥而挨餓相比……」\n[ns18]「老師更喜歡看見學生健康快樂地吃飯哦。」"
1012405-164 = "我會反省的……呼嚕嚕。"
1012405-165 = "[s]「嗯，那說教就到此為止，繼續開動吧！」"
1012405-167 = "（雖然稍微晚了一點，不過和蓮實一起享用了愉快的晚餐）"

[translation]
80000012-1 = "在街上迷路"
80000012-2 = "（為了夏萊的業務前往阿拜多斯高中的途中，因為認錯路在錯的車站下了車）"
80000012-10 = "（決定無論如何先直直前進的結果，就是在城鎮中迷路了……）"
80000012-12 = "阿拜多斯．住宅區"
80000012-16 = "……"
80000012-17 = "……老師？"
80000012-18 = "這裡不是去學校的路……你怎麼會在這裡……"
80000012-19 = "[s]向白子說明狀況"
80000012-20 = "不小心搭到其他路線的地鐵，不管三七二十一下車用走的結果迷路了？"
80000012-21 = "阿拜多斯自治區確實有很多周圍什麼也沒有的車站……"
80000012-22 = "要是在奇怪的地方下車，對不習慣的人來說會迷路也很正常。"
80000012-23 = "今後遇到這種情況只要保持冷靜，一直朝著固定的方向前進就可以了。"
80000012-24 = "總之只要往這個方向走50km應該就能到街上了。"
80000012-25 = "[s]「50km能算『只要』嗎……」"
80000012-26 = "嗯，是嗎……"
80000012-27 = "總之，已經不用擔心了。"
80000012-28 = "我認得這附近的路，我帶老師去學校吧。"
80000012-29 = "……嗯？你說腿軟沒力了？"
80000012-30 = "看來是低血糖的症狀。"
80000012-31 = "有沒有什麼可以吃的……"
80000012-36 = "……雖然是為了騎車帶在身上的。"
80000012-37 = "要不要吃這個巧克力棒？"
80000012-38 = "[s]心懷感激地收下"
80000012-42 = "……"
80000012-43 = "不知為何讓我想起了第一次遇見老師的時候呢。"
80000012-44 = "那時我好像也是像這樣，把能量飲料分給了迷路的老師。"
80000012-45 = "[s]「從那時候開始……現在也是，我總是受到白子的幫助呢。」"
80000012-46 = "不，沒有那種事。受幫助的反而是我才對。"
80000012-47 = "我能為老師做的只有這些……"
80000012-48 = "但是只要多少和老師互相幫助，我就很開心了。"
80000012-49 = "[s]「嗯。以後也多多指教囉，白子。」"
80000012-50 = "嗯，我也是。"
80000012-51 = "……從今往後請多多指教，老師。"
80000012-55 = "（之後，在白子的帶領下平安無事地抵達了阿拜多斯高中）"

[translation]
80000012-1 = "Stranded in Town"
80000012-2 = "I got off at the wrong station while on my way to Abydos High School to do some Schale work."
80000012-10 = "I went down a street I thought looked familiar, but wound up lost in the middle of the district again..."
80000012-12 = "Abydos Residential Area"
80000012-16 = "..."
80000012-17 = "Sensei?"
80000012-18 = "What are you doing all the way out here? This isn't the way to school."
80000012-19 = "[s] Explain what happened to Shiroko."
80000012-20 = "So you got off at the wrong station and got lost while wandering around?"
80000012-21 = "That makes sense. There are a lot of abandoned stations around the Abydos."
80000012-22 = "It's hard to know where you're going if you get off at the wrong one."
80000012-23 = "When that happens, your best bet is to stay calm and walk in one direction."
80000012-24 = "You should reach civilization again if you walk 50 kilometers in any direction."
80000012-25 = "[s] \"You say that like 50 kilometers isn't crazy far...\""
80000012-26 = "Hmm. Is it?"
80000012-27 = "Anyway, you don't have to worry anymore."
80000012-28 = "I know these streets like the back of my hand.#nI can show you the way."
80000012-29 = "What? You can't walk because your legs are weak?"
80000012-30 = "That's...a typical symptom of low blood sugar."
80000012-31 = "I might have something for you to eat."
80000012-36 = "Here. It's a chocolate protein bar."
80000012-37 = "I was going to eat it while cycling, but you can have it."
80000012-38 = "[s] Take the protein bar."
80000012-42 = "..."
80000012-43 = "This reminds me a lot of the first time we met."
80000012-44 = "I gave you my energy drink after you'd been lost for days."
80000012-45 = "[s] \"I keep sinking further and further in debt to you, huh?\""
80000012-46 = "Not really. I think you do a lot more for me than I do for you."
80000012-47 = "I can only try to repay you in small ways like this."
80000012-48 = "And I'm happy when I can be there for you in any way I can."
80000012-49 = "[s] \"I count on you in more ways than you realize.\""
80000012-50 = "In that case..."
80000012-51 = "...I hope you'll continue to do so, Sensei."
80000012-55 = "I then made my way to Abydos High School thanks to Shiroko's guidance."

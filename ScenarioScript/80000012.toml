80000012-16 = "3;시로코;04;…….\n#3;em;[...]\n#3;a"
80000012-17 = "3;시로코;04;……선생님?"
80000012-18 = "3;시로코;01;음, 여기는 아비도스 고등학교로 가는 길이 아닌데."
80000012-19 = "[s] 시로코에게 상황을 설명한다."
80000012-20 = "3;시로코;02;아아, 실수로 다른 노선의 지하철을 탔는데 무작정 나와 걷다 보니 길을 잃었다고?\n#3;em;[반응]\n#3;greeting"
80000012-21 = "3;시로코;03;그렇네. 아비도스 자치구에는 주변에 아무것도 없는, 버려진 역이 많으니까……"
80000012-22 = "3;시로코;99;노선을 한 번이라도 잘못 타게 되면 계속 길을 잃게 되지."
80000012-23 = "3;시로코;01;그럴 때는 당황하지 않고 계속 한 방향으로 걸어 나가는 게 좋아."
80000012-24 = "3;시로코;01;어느 방향이든 50km 정도 가볍게 나아가면 사람이 사는 동네에 도달할 수 있거든."
80000012-25 = "[s] \"50km는 가볍지 않아…….\""
80000012-26 = "3;시로코;04;음…… 그런가.\n#3;em;[땀]"
80000012-27 = "3;시로코;03;어찌 되었든 이제는 걱정하지 않아도 좋아."
80000012-28 = "3;시로코;05;이 근처의 길은 내가 알고 있으니 학교까지 안내할게."
80000012-29 = "3;시로코;02;……응? 다리에 힘이 풀려서 일어날 수가 없다고?\n#3;em;[?]"
80000012-30 = "3;시로코;01;전형적인 저혈당 증상 같네."
80000012-31 = "3;시로코;01;뭔가 먹을 만한 것이…….\n#3;em;[...]"
80000012-32 = "#st;[0,0];instant;1;"
80000012-33 = "#clearST"

80000012-35 = "#wait;2500"
80000012-36 = "3;시로코;99;……라이딩 용으로 가지고 있던 것이지만.\n#3;a"
80000012-37 = "3;시로코;02;이 초콜릿 바라도 괜찮다면 먹을래?"
80000012-38 = "[s] 초콜릿 바를 받는다."

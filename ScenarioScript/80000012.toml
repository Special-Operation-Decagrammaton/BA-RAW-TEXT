[translation]
80000012-1 = "อุบัติเหตุในเมือง"
80000012-2 = "(ระหว่างที่เดินทางไปโรงเรียนอะบิดอสเพื่อติดต่องานของชาเล่ต์ คุณครูก็หลงทางและลงผิดสถานี)"
80000012-10 = "(คุณครูเดินไปตามถนนที่ดูเหมือนจะคุ้นตา แต่สุดท้ายก็เกิดอุบัติเหตุตรงกลางเมือง...)"
80000012-12 = "เขตที่อยู่อาศัยในอะบิดอส"
80000012-16 = "..."
80000012-17 = "คุณครู...?"
80000012-18 = "อืม ทางนี้ไม่ใช่ทางไปโรงเรียนอะบิดอสนะ"
80000012-19 = "[s] อธิบายสถานการณ์ให้ชิโรโกะฟัง"
80000012-20 = "อ๋อ ขึ้นรถไฟผิดสายแล้วพอลงมาเดินไปรอบๆ ก็เลยหลงทางน่ะเหรอ?"
80000012-21 = "แบบนี้นี่เอง รอบๆ เขตอะบิดอสไม่มีอะไรหรอก มันมีสถานีร้างอยู่เยอะมาก..."
80000012-22 = "ถ้าขึ้นรถไฟผิดสายก็จะหลงได้เรื่อยๆ นั่นล่ะ"
80000012-23 = "เพราะงั้นในเวลาแบบนี้ ก็อย่าตกใจและเดินตรงไปในทิศทางเดียวจะดีที่สุด"
80000012-24 = "ไม่ว่าจะเป็นทิศไหน ถ้าเดินไปแค่ 50 กม. ก็จะเจอเขตเมืองที่คนอาศัยอยู่แล้วล่ะ"
80000012-25 = "[s] \" 50 กม. ไม่เรียกว่า 'แค่' แล้วนะ...\""
80000012-26 = "อืม... งั้นเหรอ"
80000012-27 = "เอาเป็นว่าตอนนี้ไม่ต้องกังวลแล้วล่ะ"
80000012-28 = "ฉันรู้จักเส้นทางแถวนี้ เดี๋ยวจะเดินไปส่งที่โรงเรียนให้เอง"
80000012-29 = "หืม...? เข่าอ่อนจนเดินไม่ไหวเหรอ?"
80000012-30 = "อาการเหมือนน้ำตาลในเลือดต่ำเลยนะ"
80000012-31 = "ของกินเพิ่มน้ำตาล..."
80000012-36 = "ขนมที่เตรียมไว้ตอนไปปั่นจักรยาน..."
80000012-37 = "มีแค่ช็อกโกแลตอันนี้ คุณครูจะกินมั้ย?"
80000012-38 = "[s] รับช็อกโกแลตบาร์มา"
80000012-42 = "..."
80000012-43 = "จู่ๆ ก็คิดถึงตอนที่เจอคุณครูครั้งแรกเลยนะ"
80000012-44 = "ตอนนั้นฉันก็ให้เครื่องดื่มชูกำลังกับคุณครูที่แถวๆ เขตอยู่อาศัยนี่นะ"
80000012-45 = "[s] \"ทั้งตอนนั้นและตอนนี้ชิโรโกะก็คอยช่วยครูตลอดเลยเนอะ\""
80000012-46 = "ไม่หรอก ฉันต่างหากที่ได้รับความช่วยเหลือจากคุณครูน่ะ"
80000012-47 = "สิ่งที่ฉันทำเพื่อคุณครูได้ก็มีแค่เรื่องเล็กน้อยแบบนี้เท่านั้น..."
80000012-48 = "แต่ถ้าทำแบบนี้แล้วมันช่วยคุณครูได้... ฉันก็มีความสุขแล้วล่ะ"
80000012-49 = "[s] \"ต่อไปครูขอรบกวนด้วยนะ ชิโรโกะ\""
80000012-50 = "อื้อ ขอรบกวนด้วยเหมือนกันนะ"
80000012-51 = "คุณครู..."
80000012-55 = "(หลังจากนั้นชิโรโกะก็นำทางคุณครูมาถึงโรงเรียนอย่างปลอดภัย)"

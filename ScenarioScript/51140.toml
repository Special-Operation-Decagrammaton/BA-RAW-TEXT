[translation]
51140-1 = "第14話;下定決心的少女"
51140-5 = "[ns]「哈啊……哈啊……紫跑到哪裡去了……」"
51140-10 = "（連忙跑到街上尋找紫，可惜街上已經見不到紫的蹤影）"
51140-13 = "如果想去舉辦慶典的會場……應該是往這邊走吧？"
51140-14 = "好～趁還來得及快趕路吧～"
51140-20 = "啊，等等我～"
51140-24 = "對了，聽說這次慶典從一開始就會發射煙火耶。"
51140-25 = "哦～那真是令人期待。#n聽說是煙火研究所的得意之作，不知道會有多漂亮耶？"
51140-27 = "（街頭巷尾傳來人們對慶典充滿期待的喧鬧聲）"
51140-28 = "（不知道在洶湧的人潮中尋找了紫多久）"
51140-31 = "老師……！"
51140-32 = "我到對面街上看過了，那裡也找不到紫同學的身影！"
51140-33 = "好像真的追丟了……怎麼辦！？"
51140-34 = "[s1]「人越來越多了……」\n[s2]「這樣下去可能會越來越難找。」"
51140-37 = "啊，我現在才發現……太陽已經下山，而且時間很晚了……"
51140-38 = "[s]「靜子，慶典就快要開始了吧？」"
51140-39 = "啊，是的。#n再過1小時左右就會正式開始。"
51140-40 = "海花和菲娜應該已經到現場做準備了……"
51140-41 = "[s3]「這是靜子這段時間非常努力準備的慶典。」\n[s4]「靜子是不是該過去看看比較好？」"
51140-44 = "啊……雖，雖然是這樣沒錯……"
51140-48 = "……"
51140-49 = "……不過，我還是不能就這樣回去。"
51140-50 = "這次慶典的重頭戲是慶典儀式……也就是「勘解由小路的巫女所跳的舞」。"
51140-51 = "既然下定決心要重現20年前被廢止的慶典，我認為「巫女之舞」是不可或缺的。#n就算是為了打造讓所有人心動的慶典──"
51140-52 = "這種想法確實也有沒錯……但我更想和紫同學聊一聊。"
51140-53 = "[s]「……靜子。」"
51140-55 = "[ns]「你為什麼想重現被廢止的慶典呢？」"
51140-56 = "那是因為──"
51140-57 = "其實很簡單。#n不是因為有特別的理由，或者非那麼做不可之類的使命感……"
51140-59 = "只是單純……想重現被遺忘的慶典而已。"
51140-60 = "這是在百鬼夜行成為聯合學園後一直延續至今，具有重大意義的慶典。"
51140-61 = "如果就這樣漸漸被人遺忘、消失，老師不覺得很可惜嗎？"
51140-62 = "[s]「從這個角度來看確實很可惜……」"
51140-64 = "就是說啊！"
51140-65 = "所以我想打造能讓更多人露出笑容的……那種慶典。"
51140-66 = "如果能舉辦那樣的慶典，觀光客就會感到開心……#n這樣就能輕鬆讓觀光客打開荷包吧～？這種期待也是有啦！"
51140-67 = "藉此讓我們百夜堂的名聲傳遍整個奇普托斯，取得人人都無法無視的品牌力……！"
51140-68 = "……這當然是開玩笑的。嘿嘿！"
51140-69 = "[s]「開玩笑的……嗎？」"
51140-73 = "真的是開玩笑啦，我是為了緩解嚴肅的氣氛才這麼說的！"
51140-74 = "不過，這當然不是件容易的事，甚至可以說是困難重重。#n儘管如此，多虧有大家的幫助，我才能走到這一步……"
51140-75 = "啊，當然也包含老師！"
51140-76 = "所以……我希望大家都能帶著笑容迎接慶典……"
51140-77 = "為了打造這樣的慶典，我真的非常努力……"
51140-78 = "[s]「靜子就是為了這個才來到百花繚亂的吧。」"
51140-79 = "是的，但是紫同學的事……是我不好。"
51140-80 = "一直以來都聯絡不到勘解由小路家的巫女……#n我原本以為只是運氣不好，應該有辦法解決才對……"
51140-81 = "沒想到巫女……紫同學和百花繚亂之間居然發生了那種事…… "
51140-82 = "是我想得太簡單了。"
51140-83 = "[s]「靜子……」"
51140-84 = "所以我更不能就這麼回去。"
51140-85 = "這不只是為了讓慶典成功……"
51140-86 = "老師也說過對吧。"
51140-88 = "「想不想留在這裡，應該由紫同學來決定」……"
51140-89 = "我也是這麼認為的。"
51140-91 = "做自己想做的事是理所當然的，而能夠決定的人是自己。"
51140-92 = "……誰都沒對紫同學這麼說過吧？"
51140-93 = "所以我不能就這樣回去。"
51140-94 = "……不，在見到紫同學並和他交談之前，我不想回去。"
51140-98 = "[ns5]「這樣啊……真不愧是靜子。」\n[ns6]「果然是我們可靠的節慶營運管理部部長！」"
51140-101 = "咦！？"
51140-102 = "沒，沒有啦！我其實也沒有老師說的這麼好……"
51140-103 = "[s]「那我們就先分頭找找吧。」"
51140-104 = "啊……是要在人潮更多之前分頭尋找，速戰速決嗎？"
51140-105 = "唔嗯……！"
51140-106 = "沒錯！老師說的對。#n現在這是最好的方法……就這麼辦吧！"
51140-107 = "[s]「先找到的人就聯絡對方吧。」"
51140-108 = "是！交給我吧！"
51140-109 = "尋找紫同學的作戰──"
51140-110 = "重新開始！"
51140-122 = "（人們都談論著）"
51140-126 = "這一代勘解由小路的小姐是優等生。"
51140-127 = "是啊，聽說在上次百鬼夜行聯考得到了滿分……"
51140-128 = "參加比賽也得了優勝！"
51140-131 = "是啊，真是個漂亮、正直、正向的人。"
51140-132 = "不管什麼事都能做好，真是大家的榜樣……"
51140-133 = "今後也很讓人放心呢。照這樣下去──"
51140-135 = "[ruby=  ・     ・     ・     ・     ・  ]勘解由小路[/ruby]的名聲在百鬼夜行一定會永垂不朽。"
51140-140 = "（不辜負期待是理所當然的）"
51140-143 = "（回應期待是應該的）"
51140-144 = "（對充滿期待的目光綻放微笑是自然的）"
51140-146 = "勘解由小路紫。"
51140-147 = "百鬼夜行赫赫有名的名門家族．勘解由小路家的女兒。"
51140-148 = "勘解由小路家之人，必須保持正直"
51140-149 = "這是我應盡的使命和任務。"
51140-154 = "…………我很清楚。#n這是小女子必須做的事。"
51140-156 = "但是……"
51140-158 = "（那正直的姿態）"
51140-159 = "第一次……讓我察覺除了「該做的事」之外還有「想做的事」的人。"
51140-160 = "初次見到他的那一天。"
51140-165 = "那，那個！"
51140-166 = "……嗯？你還沒回去嗎？#n時間也不早了，我就先……"
51140-167 = "您是……名草前輩對吧！#n前輩剛才表現出的樣子既強大又帥氣，小女子我大受震撼！"
51140-168 = "……嗯？"
51140-169 = "請問我該怎麼做才能變得像名草前輩一樣呢？"
51140-170 = "……這有點難回答呢。"
51140-171 = "我想想……"
51140-172 = "每天認真運動之類的？"
51140-173 = "嗯嗯……每天認真運動！#n這對小女子來說可能有點困難……"
51140-178 = "啊！我想到了一個好點子！"
51140-179 = "只要加入百花繚亂就行了！"
51140-181 = "……嗯？"
51140-183 = "這麼一來……就能和名草前輩一起…… "
51140-185 = "沒錯！這樣就能跟著名草前輩一起活動！#n小女子我決定了！"
51140-193 = "從那時候開始……我便下定了決心。"
51140-194 = "要成為百花繚亂的一分子，和憧憬的那個人……還有大家在一起。"
51140-198 = "但是──"
51140-200 = "百花繚亂就已經結束了，一切都結束了。"
51140-202 = "現在你該承認了。"
51140-203 = "名為百花繚亂的遊戲到此為止。"
51140-205 = "蓮華前輩……桔梗前輩……"
51140-206 = "大家……"
51140-209 = "小女子所盼望的光景……"
51140-210 = "如果從一開始就沒有任何人想回去……"
51140-213 = "…………慶典。"
51140-214 = "沒錯，慶典……就快到了。"
51140-215 = "……本來這時候，百花繚亂應該要完成巡邏……回來的才對……"
51140-216 = "…………現在卻再也回不來了。"
51140-221 = "哈啊……哈啊……！找到了……！#n原來你在這裡啊！"
51140-227 = "紫同學！我一直在找你！"
51140-228 = "你是……節慶營運管理部的部長……#n為什麼要找我……"
51140-229 = "啊……難道是因為慶典……"
51140-230 = "我們馬上回去百花繚亂吧！"
51140-231 = "……嗯？"
51140-232 = "你說他是百花繚亂的作戰參謀對吧……"
51140-233 = "不管怎樣他都說的太過分了！#n明明沒打算聽紫同學說話，也不想了解紫同學的想法……！"
51140-234 = "自己想待的地方明明就該由自己決定才對！到底在跩什麼啊！"
51140-235 = "來！現在不是做這種事的時候了，我們回去跟他好好談談吧！"
51140-236 = "這種情況就該敞開心扉，真誠地對話！#n我沒說錯吧？"
51140-238 = "節慶營運管理部的部長……找我就是為了說這個……？"
51140-239 = "慶典明明即將開始，為何要……"
51140-240 = "那種不合理的事，我無法視而不見！"
51140-241 = "………………是嗎。"
51140-242 = "……很感謝你願意這麼說。#n但是小女子沒事的。"
51140-243 = "什麼？沒事是什麼意思……？"
51140-244 = "我也認為桔梗前輩說的沒錯。"
51140-245 = "就像桔梗前輩說的一樣……小女子確實是從家裡逃出來的。"
51140-246 = "就算我沒有那個意思……#n會被認為只是在消遣……也是很正常的。"
51140-247 = "可是……！"
51140-248 = "節慶營運管理部的部長……不，是靜子同學對吧。"
51140-249 = "距離慶典開始沒剩多少時間了。#n幸好……儀式的順序我全都記得。"
51140-250 = "所以我，勘解由小路紫──"
51140-255 = "會按照你的要求，以巫女的身分參加慶典。"
51140-260 = "咦咦！？"
51140-263 = "（為了尋找紫而持續在街上奔走）"
51140-267 = "[ns] 「……啊。」"
51140-268 = "（慶典已近在眼前）"
51140-272 = "你有聽說嗎？"
51140-273 = "這次慶典最主要的活動是在午夜時分開始的巫女之舞哦？"
51140-274 = "你指的是百鬼夜行燈籠祭吧？#n這次的巫女之舞是由誰負責呢？"
51140-275 = "果然還是知世大人嗎？"
51140-276 = "啊，據我所知好像和20年前舉辦的慶典一樣，會有專門跳「巫女之舞」的巫女。"
51140-277 = "名字好像叫……"
51140-278 = "「勘解由小路家族」的樣子。"
51140-279 = "[s]（勘解由小路……）"
51140-280 = "話說回來，20年前的慶典為什麼被廢止了？"
51140-281 = "就是說啊。#n我只知道這次是重新舉辦，倒沒聽說過被廢止的原因。"
51140-282 = "算了，反正事情都已經過去了對吧？#n今後的事才是最重要的。"
51140-283 = "啊，是沒錯啦。"
51140-284 = "難得來百鬼夜行參加這次的慶典，當然要盡情享受囉～"
51140-292 = "[ns]「……慶典被廢止的原因……」"
51140-297 = "[ns]「啊，靜子打電話來了……」"
51140-301 = "（正打算接起電話時）"
51140-308 = "[ns] （…………嗯？）"
51140-313 = "慶典的氣氛終於活躍起來了。"
51140-314 = "層層堆砌的精彩故事，正等待著揭幕的那一刻。"
51140-318 = "接下來的故事，將是屬於我們的[ruby=怪談]「百物語」[/ruby]。"
51140-323 = "啊哈哈，在此恭敬地向你問好。"
51140-324 = "我一直很想見你一面────夏萊的老師。"
51140-326 = "下一話;相遇"

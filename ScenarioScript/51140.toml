[translation]
51140-1 = "Episode 14;Determined Girl"
51140-5 = "[ns] \"Where...is she...?\""
51140-10 = "Despite having taken after Yukari almost immediately, we could find neither hide nor tail of her."
51140-13 = "Which way's the festival again? This way?"
51140-14 = "C'mon! We're gonna be late!"
51140-20 = "Ah, don't leave me behind!"
51140-24 = "They said the opening ceremony is going to have fireworks!"
51140-25 = "Yes, I'm rather thrilled for that part! I heard the Fireworks Research Center has personally been working on a jaw-dropping show for months now."
51140-27 = "As we roamed through the crowd, festival-goers were abuzz about the Lantern Festival and what could be in store."
51140-28 = "We searched for Yukari in the busy streets for what seemed like hours."
51140-31 = "Sensei! There you are!"
51140-32 = "No sign of her! I can't think of anywhere else to look. "
51140-33 = "...What do we do, Sensei?"
51140-34 = "[s1] \"People are flooding the streets...\"\n[s2] \"It'll be impossible to find her at this rate.\""
51140-37 = "Ah! I completely lost track of the time. The sun's already setting..."
51140-38 = "[s] \"When does the festival start, Shizuko?\""
51140-39 = "Stalls are already starting to open up, but it'll be in full swing in about an hour."
51140-40 = "Umika and Pina are probably running around tying up final, loose ends. "
51140-41 = "[s3] \"You worked so hard to make this happen, Shizuko.\"\n[s4] \"You're itching to go help them, aren't you?\""
51140-44 = "Ah! You caught me!"
51140-48 = "..."
51140-49 = "I can't go back though. Not yet."
51140-50 = "I promised to deliver the Kadenokouji miko's dance for the festival's ritual."
51140-51 = "Considering this is the first time this festival is being held in twenty years, we need everything to go perfectly. I need to keep my word."
51140-52 = "But more than any business proposal, I'd just like to talk to Yukari again."
51140-53 = "[s] \"...Shizuko.\""
51140-55 = "[ns] \"Why did you resurrect an old, forgotten festival, Shizuko?\""
51140-56 = "That's..."
51140-57 = "Well, there's not much to explain there. I don't have some great personal or financial investment in this. "
51140-59 = "I wanted to bring the past to life... That's all."
51140-60 = "The Lantern Festival holds so much history. I mean, it dates all the way back to the establishment of Hyakkiyako's alliance."
51140-61 = "I just...couldn't help but feel it would be a shame to let it fade away into nothingness. "
51140-62 = "[s] \"Losing a piece of history is always a tragedy in its own right.\""
51140-64 = "You always understand, Sensei!"
51140-65 = "The hustle and bustle of a festival, the laughter of the festival-goers enjoying themselves... There's no better sound, you know?"
51140-66 = "Not only that, festivals attract tourists! Tourists with happy smiles and loose purses. It's much easier to pry someone's wallet open during an exciting event. "
51140-67 = "Momoyodou's brand will grow and expand through all of Kivotos! As people see us as an entertainment giant, we'll become an unstoppable—"
51140-68 = "Ahem! Just kidding, of course! It's all about the community and sense of camaraderie."
51140-69 = "[s] \"This is all just for branding...?\""
51140-73 = "No, no! I was just trying for some comedic relief, okay? Geez, Sensei!"
51140-74 = "You know I wouldn't commit to a project like this if I wasn't passionate about it! You wouldn't believe the amount of red tape we had to unravel to make this happen."
51140-75 = "And your help was invaluable as well, Sensei."
51140-76 = "That's why it was so important to me that this be a positive experience for everyone involved..."
51140-77 = "At least, that's what I'd hoped..."
51140-78 = "[s] \"And that's why you went to the Hyakkaryouran.\""
51140-79 = "Yeah... I feel a little responsible for how things played out with Yukari..."
51140-80 = "I was way too single-minded in meeting the Kadenokouji miko. I didn't do enough background research to understand what I was poking my nose into."
51140-81 = "I didn't even consider a world where the Hyakkaryouran and Yukari were on bad terms. "
51140-82 = "I seem to have poked a sleeping bear."
51140-83 = "[s] \"Shizuko...\""
51140-84 = "So that's why I want to find Yukari no matter what. "
51140-85 = "It's not just about a ritual or a piece of history anymore."
51140-86 = "You said it yourself, Sensei."
51140-88 = "\"Yukari has the right to decide how she wants to live her own life.\""
51140-89 = "I couldn't agree more."
51140-91 = "I don't think there's any truer philosophy in life than a person's right to decide their own path."
51140-92 = "Has anyone ever told Yukari those words?"
51140-93 = "I think she deserves to hear them."
51140-94 = "So I won't go back until I can look her in the eyes and tell her the truth."
51140-98 = "[ns5] \"Shizuko's chivalry never fails.\"\n[ns6] \"That's our one and only Festival Department President!\""
51140-101 = "D-Did I hear that correctly?!"
51140-102 = "Don't make fun of me..."
51140-103 = "[s] \"We need to find her before it's too late! Let's split up.\""
51140-104 = "The streets will be packed before we know it, so we need to cover as much ground as we can as quickly as possible."
51140-105 = "Hm..."
51140-106 = "Good idea! I think that's our best course of action for now."
51140-107 = "[s] \"I'll contact you as soon as I have news.\""
51140-108 = "Me as well."
51140-109 = "Let's go!"
51140-110 = "Find Yukari!"
51140-122 = "(The whispers were an ever-present buzz.)"
51140-126 = "Lady Kadenokouji is an exemplary student. She received honors and top marks in all her classes."
51140-127 = "I heard she even scored a perfect hundred on the Hyakkiyako entrance exam. Imagine that!"
51140-128 = "She won first place in the Annual Orchestral Masters too!"
51140-131 = "And she's so pretty, to top it all off! She really holds herself like royalty."
51140-132 = "There's nothing she can't do! Truly an inspiration."
51140-133 = "The future will be safe in her hands. As long as she continues to excel..."
51140-135 = "The Kadenokouji name will ring forever in Hyakkiyako's halls."
51140-140 = "(I was born with expectations upon my shoulders.)"
51140-143 = "(To rise above each and every one of them was my duty.)"
51140-144 = "(I smiled under the weight of their anticipation.)"
51140-146 = "My name is Kadenokouji Yukari."
51140-147 = "The heir to one of Hyakkiyako's oldest and most honored families."
51140-148 = "Uphold the Kadenokouji name."
51140-149 = "Such has been my duty since the moment I was born."
51140-154 = "I understand my position. Truly, I embraced it."
51140-156 = "But."
51140-158 = "(What straight posture...)"
51140-159 = "But then you shone across my dark sky of duty and responsibility like a shooting star. You taught me choice where I always thought I had none."
51140-160 = "How could I turn back after meeting you?"
51140-165 = "Excuse me! Hello!"
51140-166 = "You're still here? It's dark out already."
51140-167 = "Nagusa, right? I won't forget that name! That display of strength... I couldn't contain my admiration a moment longer!"
51140-168 = "...What?"
51140-169 = "I aspire to your level of valor, Nagusa! How can I achieve that?"
51140-170 = "...You make it sound so simple."
51140-171 = "Hm..."
51140-172 = "Do you exercise daily?"
51140-173 = "I...uh...! Th-That's a rather tall order..."
51140-178 = "Ah! I'm inspired!"
51140-179 = "I simply need to join the Hyakkaryouran to become like you!"
51140-181 = "...What?"
51140-183 = "If I join...I'll have the pleasure of your company every day! "
51140-185 = "Indeed! I, Yukari, shall align myself with the Hyakkaryouran, and we will have great adventures together! I pledge to faithfully follow in your every footstep!"
51140-193 = "I set my resolve in that very moment."
51140-194 = "I had found my calling. I pledged to devote myself entirely to the Hyakkaryouran, standing shoulder to shoulder with my mentor, alongside all the members I would come to love."
51140-198 = "But now..."
51140-200 = "It's already over for Hyakkaryouran. Everything, completely over."
51140-202 = "It's time to face reality."
51140-203 = "Playtime with the Hyakkaryouran is over, Lady Kadenokouji."
51140-205 = "Renge... Kikyou..."
51140-206 = "Everyone..."
51140-209 = "That memory I desperately clung to..."
51140-210 = "I suppose it was only me who couldn't let it go..."
51140-213 = "...The festival."
51140-214 = "I nearly forgot. Students are participating in the festivities tonight."
51140-215 = "The Hyakkaryouran...are meant to be out patrolling..."
51140-216 = "...That would have been the case in the past, at least..."
51140-221 = "*pant pant* I've been...looking for you!"
51140-227 = "Yukari! I can't tell you how relieved I am to finally find you!"
51140-228 = "You were the Festival Operations Department president, correct? Why were you looking for me?"
51140-229 = "Ah, yes. You wished for my aid with the festival..."
51140-230 = "Let's go back to Hyakkaryouran's club room right away!"
51140-231 = "...Excuse me?"
51140-232 = "Who was she to you again? Your operations director?"
51140-233 = "That doesn't matter! What matters is she went too far! She can't just make decisions for you and say it's for your sake."
51140-234 = "You're the only one who gets a say in how you live your life! She had no right!"
51140-235 = "So, let's go back, together. I think there's more you two need to talk about."
51140-236 = "It's when you want to run away the most that you have to stand your ground and communicate."
51140-238 = "Are you not the president of the Festival Department? Why are you extending a helping hand?"
51140-239 = "You must be absolutely overwhelmed with your festival responsibilities."
51140-240 = "I am! But the festival is for everyone to enjoy, including you!"
51140-241 = "...How kind of you."
51140-242 = "I can't thank you enough, truly. But everything is fine."
51140-243 = "Everything...is fine? I don't understand."
51140-244 = "Kikyou wasn't wrong to speak as she did."
51140-245 = "It is all true, after all. I attempted to abandon my duties and my home."
51140-246 = "Regardless of how my intentions appeared to her... The facts remain the same."
51140-247 = "But...!"
51140-248 = "Thank you, Festival Department Pres— Shizuko, was it?"
51140-249 = "I believe you have a ritual you need performed, correct? And it just so happens that I'm well-trained to do so."
51140-250 = "In response to your request..."
51140-255 = "I, Kadenokouji Yukari, will be this Lantern Festival's miko."
51140-260 = "Huh?!"
51140-263 = "I ran down street after street looking for Yukari."
51140-267 = "[ns] \"...Ah.\""
51140-268 = "I started hearing rumors just before the official start of the festival."
51140-272 = "Did you hear the news?"
51140-273 = "They're holding the miko's dance at midnight! No one was sure whether or not it was actually going to happen..."
51140-274 = "That's an old tradition for the Hyakkiyako Lantern Festival, right? Who would be the miko...?"
51140-275 = "Maybe Chise?"
51140-276 = "Chise's the best, but she's an actress. If they hold true to tradition, it'll be a real miko performing the ritual."
51140-277 = "If the rumors are true..."
51140-278 = "It'll be none other than Lady Kadenokouji herself."
51140-279 = "[s] \"(Kadenokouji...)\""
51140-280 = "I've never put much thought to it previously, but why did they stop holding the festival anyway?"
51140-281 = "No one quite knows. It sort of faded into the background until there was a big to-do this year about reviving it."
51140-282 = "Let's just be grateful it's back and enjoy the festivities."
51140-283 = "You're entirely right."
51140-284 = "No one can hold a festival the way Hyakkiyako can, so let's make the most of it."
51140-292 = "[ns] \"No one seems to know why the festival was originally canceled...\""
51140-297 = "[ns] \"...Shizuko's calling me.\""
51140-301 = "I was just about to answer Shizuko's call when I was interrupted..."
51140-308 = "[ns] \"(...Huh?)\""
51140-313 = "The bell tolls, and the revelers are loose!"
51140-314 = "We're reaching the story's climax! The anticipation makes my toes curl."
51140-318 = "Be quiet and listen to the Hundred Ghost Stories."
51140-323 = "Every last one of you can rest in peace. Heeheehee."
51140-324 = "I'm absolutely exhilarated to meet you, Schale's Sensei."
51140-326 = "Next Episode;An Encounter"

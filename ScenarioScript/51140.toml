[translation]
51140-1 = "ตอนที่ 14;เด็กสาวที่เอาจริง"
51140-5 = "[ns] \"แฮ่ก... แฮ่ก... ยูคาริไปอยู่ที่ไหนนะ...\""
51140-10 = "(คุณครูรีบออกมาหน้าถนนเพื่อตามหายูคาริ แต่ก็ไม่เห็นยูคาริเลย)"
51140-13 = "ถ้าจะไปที่จัดงานเทศกาล... ก็น่าจะทางนี้เนอะ?"
51140-14 = "เอาละๆ~ รีบๆ ไปเข้าเถอะ เดี๋ยวไม่ทันนะ~"
51140-20 = "อ๊ะ รอฉันด้วยสิ~"
51140-24 = "จะว่าไป เห็นว่างานเทศกาลครั้งนี้จะเริ่มด้วยการจุดดอกไม้ไฟขนาดใหญ่ดังปั้ง~! เลยละครับ"
51140-25 = "ว้าว อยากเห็นไวๆ แล้วสิครับ ได้ยินว่าเป็นผลงานแห่งความพยายามของศูนย์วิจัยดอกไม้ไฟเลยด้วย ต้องออกมาสวยมากแน่ๆ เลย"
51140-27 = "(เสียงเจี๊ยวจ๊าวของผู้คนที่คาดหวังต่องานเทศกาลดังมาจากทั่วทุกสารทิศ)"
51140-28 = "(คุณครูยังคงตามหายูคาริท่ามกลางคลื่นฝูงชนที่ถาโถม)"
51140-31 = "คุณครู...!"
51140-32 = "ฉันลองไปดูถนนฝั่งตรงข้ามแล้ว แต่ก็ไม่เจอยูคาริเลยค่ะ!"
51140-33 = "เราน่าจะคลาดสายตาไปตอนนั้น... ทำยังไงดีล่ะคะ?!"
51140-34 = "[s1] \"ตอนนี้คนก็เยอะขึ้นเรื่อยๆ เลย...\"\n[s2] \"ถ้าเดินหาอยู่อย่างนี้ก็น่าจะยิ่งยากขึ้นเรื่อยๆ ด้วย\""
51140-37 = "อ่า... จะว่าไป... พระอาทิตย์ก็ตกแล้ว เวลาล่วงเลยมาตั้งขนาดนี้แล้วเหรอเนี่ย..."
51140-38 = "[s] \"ชิซุโกะ งานเทศกาลใกล้จะเริ่มแล้วใช่ไหม?\""
51140-39 = "อ๊ะ... ค่ะ งานเทศกาลจะเริ่มอย่างเป็นทางการในอีกประมาณ 1 ชั่วโมงจากนี้ค่ะ"
51140-40 = "ตอนนี้พีน่ากับอุมิกะน่าจะออกไปเตรียมตัวอยู่ในงานแล้วด้วย..."
51140-41 = "[s3] \"เป็นงานที่ชิซุโกะตั้งใจเตรียมมามากเลยนี่\"\n[s4] \"ชิซุโกะเองก็ต้องไปช่วยงานด้วยหรือเปล่า?\""
51140-44 = "อ่า... เรื่องนั้น... มันก็จริง... แต่ว่า..."
51140-48 = "......."
51140-49 = "...ไม่หรอกค่ะ ฉันกลับไปทั้งๆ แบบนี้ไม่ได้ค่ะ"
51140-50 = "เพราะเดิมทีแล้ว สิ่งที่เป็นหัวใจของเทศกาลนี้ก็คือ... <ระบำจากคุณมิโกะแห่งตระกูลคาเดโนะโคจิ> ค่ะ"
51140-51 = "ในเมื่อเราจะนำเทศกาลที่ถูกยกเลิกไปเมื่อ 20 ปีก่อนกลับมาเพื่อทำให้ทุกคนตื่นเต้น... ฉันคิดว่ายังไงก็#nต้องมี <ระบำของมิโกะ> ค่ะ"
51140-52 = "ฉันตั้งใจให้เป็นอย่างนั้นจริงๆ นะคะ... แต่ตอนนี้ฉันอยากเจอและคุยกับยูคาริมากกว่าค่ะ"
51140-53 = "[s] \"...ชิซุโกะ\""
51140-55 = "[ns] \"ทำไมถึงอยากเอาเทศกาลที่ถูกยกเลิกกลับมาเหรอ?\""
51140-56 = "เรื่องนั้น..."
51140-57 = "ก็ง่ายๆ เลยค่ะ ไม่ใช่ว่ามีเหตุผลอะไรพิเศษ หรือมีความสำนึกรับผิดชอบในหน้าที่อะไรด้วยค่ะ"
51140-59 = "มันก็แค่ง่ายๆ... ฉันคิดว่าอยากนำเทศกาลที่ถูกลืมไปในอดีตกลับมาให้ทุกคนได้เห็นอีกครั้งค่ะ"
51140-60 = "เทศกาลที่เต็มไปด้วยความหมาย เทศกาลที่สืบทอดมาตั้งแต่ครั้งเฮียกคิยาโคยังเป็นสหพันธ์"
51140-61 = "ถ้าเทศกาลแบบนั้นจะหายไปจากความทรงจำของทุกคน มันก็น่าเสียดายมากเลยไม่ใช่เหรอคะ?"
51140-62 = "[s] \"ถ้ามองด้านนั้นก็น่าเสียดายอยู่...\""
51140-64 = "ค่ะ! นั่นแหละค่ะเหตุผล"
51140-65 = "ฉันอยากจัดงานเทศกาล... ที่ทำให้คนยิ้มกันได้มากขึ้นค่ะ"
51140-66 = "แล้วก็แอบหวังด้วยว่า... ถ้าเป็นงานเทศกาลที่ทำให้ยิ้มออก และทำให้นักท่องเที่ยวเพลิดเพลินใจได้ เงินก็น่าจะสะพัดด้วย~!"
51140-67 = "และการใช้เทศกาลนี้ทำให้ชื่อของร้านเฮียกคิยาโคของเราเป็นที่รู้จักไปทั่วคิโวทอส ก็จะเป็นการสร้าง#nแบรนด์ให้แข็งแกร่ง...!"
51140-68 = "...อะไรประมาณนี้น่ะค่ะ ถึงจะเป็นเรื่องล้อเล่นก็เถอะน้า ฮิฮิ!"
51140-69 = "[s] \"ล้อเล่นงั้นเหรอ...?\""
51140-73 = "เดี๋ยวสิๆ ฉันก็แค่ล้อเล่นเพื่อทำให้บรรยากาศหายตึงเครียดก็เท่านั้นเองค่ะ!"
51140-74 = "แน่นอนว่างานนี้เป็นเรื่องที่ไม่ง่ายเลย แล้วก็มีอุปสรรคมากมายเลยด้วย แต่ถึงอย่างนั้นก็มีคนช่วยเหลือ#nมากมายไม่แพ้กัน จนเรามาถึงจุดนี้ที่จะเปิดเทศกาลกันได้แล้ว..."
51140-75 = "อ๊ะ เป็นเพราะคุณครูมาช่วยอีกแรงด้วยนะคะ!"
51140-76 = "เพราะงั้น... ฉันก็เลยหวังว่าทุกคนจะต้อนรับเทศกาลกันด้วยใบหน้าที่ยิ้มแย้ม..."
51140-77 = "และฉันก็พยายามอย่างหนักเพื่อจัดงานเทศกาลแบบนั้นขึ้นมา..."
51140-78 = "[s] \"ก็เลยถึงกับมาที่เฮียกกะเรียวรันเองเลยด้วยใช่ไหม\""
51140-79 = "ใช่ค่ะ แต่ว่าเรื่องของยูคาริ... เป็นเพราะฉันเองค่ะ"
51140-80 = "จริงๆ การที่ฉันติดต่อคุณมิโกะแห่งตระกูลคาเดโนะโคจิไม่ได้ ฉันคิดว่าคงเพราะโชคไม่ดีก็เท่านั้น แต่ยังไงก็คิดด้วยว่าน่าจะแก้ไขเรื่องนี้ได้"
51140-81 = "แต่ก็ไม่รู้เลยว่า... คุณมิโกะคนนั้น... จะมีเรื่องแบบนั้นกับเฮียกกะเรียวรัน..."
51140-82 = "ฉันผิดเองที่คิดเอาแต่ได้ ฉันไม่คิดให้รอบคอบเองค่ะ"
51140-83 = "[s] \"ชิซุโกะ...\""
51140-84 = "และเพราะอย่างนั้น ฉันถึงยิ่งกลับไปไม่ได้ค่ะ"
51140-85 = "นี่มันไม่ใช่แค่เรื่องความสำเร็จของเทศกาลแล้ว..."
51140-86 = "คุณครูเองก็พูดไว้ไม่ใช่เหรอคะ?"
51140-88 = "ว่า \"การที่อยากอยู่ที่นี่หรือไม่น่ะ เป็นสิ่งที่ตัวเองต้องตัดสินใจเอง\"..."
51140-89 = "ฉันก็คิดแบบนั้นเหมือนกันค่ะ"
51140-91 = "เชื่อว่าตัวเราเองเป็นคนกำหนดสิ่งที่อยากทำ และจะเป็นคนตัดสินใจเอง"
51140-92 = "ยังไม่มีใครพูดแบบนั้นกับยูคาริเลยนี่คะ?"
51140-93 = "เพราะแบบนี้ ฉันถึงยังกลับไปไม่ได้ค่ะ"
51140-94 = "...ไม่สิ ฉันไม่อยากกลับไปค่ะ จนกว่าจะได้เจอและคุยกับยูคาริก่อน"
51140-98 = "[ns5] \"อื้ม... นี่แหละชิซุโกะที่ครูรู้จัก\"\n[ns6] \"สมกับที่เป็นหัวหน้าชมรมเทศกาลที่เชื่อถือได้ของเราเลย!\""
51140-101 = "คะ?!"
51140-102 = "มะ... ไม่หรอกค่ะ! ไม่ถึงกับที่คุณครูพูดหรอก..."
51140-103 = "[s] \"งั้นจากนี้เราแบ่งกันหาดีกว่า\""
51140-104 = "อ่า... เราควรแบ่งพื้นที่แล้วหายูคาริให้ทันก่อนที่คลื่นฝูงชนจะกระหน่ำเข้ามามากกว่านี้สินะคะ"
51140-105 = "อืม...!"
51140-106 = "ค่ะ! คุณครูพูดถูกค่ะ ตอนนี้วิธีนั้นน่าจะดีที่สุดแล้ว งั้นเอาตามนั้นค่ะ!"
51140-107 = "[s] \"งั้นถ้าใครหาเจอก่อนก็ติดต่ออีกคนด้วยนะ\""
51140-108 = "ค่ะ! วางใจฉันได้เลยค่ะ!"
51140-109 = "ไปตามหายูคาริอีกครั้งกันเลย!"
51140-110 = "ไปกันค่ะ!"
51140-122 = "(เสียงผู้คนพูดคุยกัน)"
51140-126 = "คุณหนูจากตระกูลคาเดโนะโคจิปีนี้เป็นนักเรียนดีเด่นเลยนะเจ้าคะ"
51140-127 = "ใช่ค่ะ ได้ยินว่าตอนสอบของสหพันธ์เฮียกคิยาโคคราวก่อน เธอได้คะแนนเต็มด้วย..."
51140-128 = "ข้าได้ยินว่าได้รางวัลชนะเลิศตอนไปประกวดแข่งขันมาด้วยเจ้าค่ะ!"
51140-131 = "ใช่เจ้าค่ะ คุณหนูเป็นคนที่งดงาม ซื่อสัตย์ แถมยังมองการณ์ไกลอีก"
51140-132 = "คุณหนูทำทุกอย่างอย่างฉับไว ถือว่าเป็นแบบอย่างที่ดีให้กับทุกคนเลย"
51140-133 = "แบบนี้ในอนาคตก็วางใจได้แล้วนะเจ้าคะ ถ้าเป็นแบบนี้ต่อไปละก็..."
51140-135 = "ชื่อของคาเดโนะโคจิก็จะส่องสว่างในเฮียกคิยาโคได้อย่างนิรันดร์ด้วยค่ะ"
51140-140 = "(แน่นอนอยู่แล้วที่จะตอบสนองต่อความคาดหวัง)"
51140-143 = "(สมควรแล้วที่จะตอบสนองต่อความคาดหวัง)"
51140-144 = "(เป็นธรรมชาติที่จะยิ้มให้กับสายตาแห่งความคาดหวัง)"
51140-146 = "นามของข้าคือคาเดโนะโคจิ ยูคาริ"
51140-147 = "บุตรีจากตระกูลคาเดโนะโคจิ ตระกูลที่มีชื่อเสียงโด่งดังในเฮียกคิยาโค"
51140-148 = "จงยืนหยัดในฐานะคาเดโนะโคจิ"
51140-149 = "นั่นคือภารกิจและหน้าที่ที่ข้าต้องทำ"
51140-154 = "...ข้าทราบดีเจ้าค่ะ ว่ามันเป็นสิ่งที่ข้าจำเป็นต้องทำ"
51140-156 = "แต่ว่า"
51140-158 = "(ท่วงท่าที่สง่าผ่าเผย)"
51140-159 = "คนที่ทำให้เห็น <สิ่งที่อยากทำ> ไม่ใช่ <สิ่งที่ต้องทำ>"
51140-160 = "วันนั้นที่ได้เจอกับคุณเป็นครั้งแรก"
51140-165 = "ดะ... เดี๋ยวก่อนเจ้าค่ะ!"
51140-166 = "...หืม? ยังไม่กลับไปอีกเหรอ? นี่ก็ดึกแล้วนะ..."
51140-167 = "รุ่นพี่... นางุสะใช่ไหมเจ้าคะ? เมื่อกี้รุ่นพี่ดูแข็งแกร่งและเท่มากเลย ทำเอาข้าตกใจเลยเจ้าค่ะ!"
51140-168 = "...หืม?"
51140-169 = "ข้าต้องทำยังไงถึงจะเก่งได้เหมือนรุ่นพี่นางุสะเหรอเจ้าคะ?!"
51140-170 = "...ตอบให้ง่ายๆ ไม่ได้แฮะ"
51140-171 = "อืม..."
51140-172 = "ตั้งใจออกกำลังกายทุกวัน?"
51140-173 = "อืม... งั้นเหรอเจ้าคะ...! ออกกำลังกายทุกวัน! ฟังดูค่อนข้างยากสำหรับข้า..."
51140-178 = "ข้ามีความคิดดีๆ แล้วเจ้าค่ะ!"
51140-179 = "ข้าต้องเข้าเฮียกกะเรียวรันให้ได้ก่อน!"
51140-181 = "...หืม?"
51140-183 = "ถ้าทำแบบนั้นได้... ก็จะได้เจอรุ่นพี่นางุสะ..."
51140-185 = "ใช่เจ้าค่ะ! ข้าจะได้ทำกิจกรรมตามอย่างรุ่นพี่นางุสะได้! ข้า! ยูคาริ! ตัดสินใจแล้วเจ้าค่ะ!"
51140-193 = "ตั้งแต่วันนั้น... ข้าก็ตั้งใจและเอาจริงเอาจังเจ้าค่ะ"
51140-194 = "ตั้งใจว่าข้าจะเป็นเฮียกกะเรียวรัน และเข้าไปทำกิจกรรมกับรุ่นพี่และทุกคนที่ข้าเคารพ..."
51140-198 = "แต่ว่า"
51140-200 = "เฮียกกะเรียวรันมันจบไปแล้ว ไม่มีพวกเราอีกต่อไปแล้ว"
51140-202 = "ตอนนี้เธอยอมรับมันเสียเถอะ"
51140-203 = "หมดเวลาเล่นสนุกกับเฮียกกะเรียวรันแล้ว"
51140-205 = "รุ่นพี่เรนเกะ... รุ่นพี่คิเคียว..."
51140-206 = "ทุกคน..."
51140-209 = "ภาพที่ข้าอยากจะเห็น..."
51140-210 = "หากไม่มีใครอยากกลับไปตั้งแต่แรกเลยละก็..."
51140-213 = "...งานเทศกาล"
51140-214 = "จริงสิ งานเทศกาล... จะเริ่มในอีกไม่ช้าแล้วเจ้าค่ะ"
51140-215 = "...ถ้าทุกอย่างยังเป็นเหมือนเดิม ตอนนี้เฮียกกะเรียวรันก็ต้องออกไปลาดตระเวน..."
51140-216 = "แต่ตอนนี้... ไม่มีอีกแล้ว..."
51140-221 = "แฮ่ก... แฮ่ก...! เจอแล้ว...! มาอยู่ตรงนี้เองสินะคะ!"
51140-227 = "ยูคาริ! ฉันตามหาอยู่นานเลยค่ะ!"
51140-228 = "ท่าน... หัวหน้าชมรมจัดงานเทศกาล... ว่าแต่ทำไมถึงมาตามหาข้า..."
51140-229 = "อ่า... หรือว่ามาหาเพราะเรื่องงานเทศกาล..."
51140-230 = "กลับไปห้องเฮียกกะเรียวรันกันเถอะค่ะ ตอนนี้เลย!"
51140-231 = "...เจ้าคะ?"
51140-232 = "คนนั้นน่ะ... เป็นที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันใช่ไหมคะ?"
51140-233 = "จะยังไงก็เถอะ ฉันว่าคนคนนั้นพูดแรงไปหน่อยนะคะ! พูดออกมาทั้งๆ ที่ไม่ฟังความคิดเห็นของยูคาริ#nเลย... แล้วก็ไม่คิดจะทำความเข้าใจยูคาริด้วย!"
51140-234 = "จะอยู่ตรงไหนก็ต้องให้เจ้าตัวเป็นคนกำหนดสิถึงจะถูก! ไม่เห็นต้องพูดอวดดีขนาดนั้นเลย!"
51140-235 = "เอาละ! อย่ามัวเสียเวลาอยู่เลย กลับไปปรับความเข้าใจกันเถอะค่ะ!"
51140-236 = "สถานการณ์แบบนี้ยิ่งต้องเปิดใจและพูดคุยกันอย่างจริงจังมากกว่าเดิมค่ะ! ใช่มั้ยล่ะคะ?!"
51140-238 = "ท่านหัวหน้าชมรมเทศกาล... มาหาข้าเพราะจะพูดแบบนี้เหรอเจ้าคะ...?"
51140-239 = "แต่ว่า... อีกเดี๋ยวก็จะเปิดงานเทศกาลแล้ว..."
51140-240 = "ฉันมองข้ามสิ่งที่ไม่ถูกต้องแบบนั้นไม่ได้หรอกค่ะ!"
51140-241 = "อย่างงั้นเหรอเจ้าคะ..."
51140-242 = "ขอบคุณที่มาพูดแบบนี้นะเจ้าคะ แต่ข้า... ไม่เป็นไรหรอกเจ้าค่ะ"
51140-243 = "คะ? ไม่เป็นไรงั้นเหรอ หมายความว่ายังไงคะ...?"
51140-244 = "ข้าคิดว่ารุ่นพี่คิเคียวพูดถูกแล้วเจ้าค่ะ"
51140-245 = "มันก็ถูกแล้ว... ที่ข้าหนีออกมาจากบ้านอย่างที่รุ่นพี่คิเคียวว่า"
51140-246 = "แม้ข้าจะไม่ได้ตั้งใจที่จะทำแบบนั้น... และต่อให้มันเหมือนกับการออกมาเล่นสนุกของคนมีเวลาเหลือเฟือ ... แต่ก็คงช่วยไม่ได้เจ้าค่ะ"
51140-247 = "แต่ว่า...!"
51140-248 = "ท่านหัวหน้าชมรมเทศกาล ไม่สิ... ชื่อคุณชิซุโกะใช่ไหมเจ้าคะ"
51140-249 = "ใกล้จะเปิดงานเทศกาลแล้วใช่ไหมเจ้าคะ โชคดีที่... ข้ายังจำลำดับทั้งหมดของพิธีกรรมได้อยู่เจ้าค่ะ"
51140-250 = "เพราะฉะนั้น ข้า คาเดโนะโคจิ ยูคาริ..."
51140-255 = "จะไปปรากฏตัวในเทศกาลในฐานะมิโกะ ตามที่คุณขอร้องเจ้าค่ะ"
51140-260 = "คะ?!"
51140-263 = "(คุณครูยังคงวิ่งไปตามถนนเรื่อยๆ เพื่อตามหายูคาริ)"
51140-267 = "[ns] \"อ่า...\""
51140-268 = "(งานเทศกาลใกล้จะเริ่มเข้ามาทุกที)"
51140-272 = "ได้ยินข่าวนั้นหรือยังครับ?"
51140-273 = "เห็นว่าไคลแมกซ์ของเทศกาลครั้งนี้คือระบำจากคุณมิโกะที่จะเริ่มตอนเที่ยงคืนครับ"
51140-274 = "หมายถึงเทศกาลโคมไฟเฮียกคิยาโคใช่ไหม? ครั้งนี้ใครจะมาแสดงระบำมิโกะเหรอครับ?"
51140-275 = "คุณชิเซะหรือเปล่านะ?"
51140-276 = "อ้อ เท่าที่ผมรู้มาคือมีคุณมิโกะที่จะมาแสดง <ระบำมิโกะ> ต่างหาก เหมือนกับเทศกาลที่เคยจัดเมื่อ 20 ปีก่อนครับ"
51140-277 = "มิโกะจาก..."
51140-278 = "<ตระกูลคาเดโนะโคจิ>... น่าจะใช่ชื่อนี้นะครับ"
51140-279 = "[s] (คาเดโนะโคจิ...)"
51140-280 = "จะว่าไป ทำไมงานเทศกาลเมื่อ 20 ปีก่อนถึงถูกยกเลิกไปล่ะครับ?"
51140-281 = "ไม่รู้สิ รู้แค่ว่าครั้งนี้จะเป็นการเอาเทศกาลนั้นมาอีกครั้งน่ะ แต่ไม่รู้เลยว่าทำไมเทศกาลในอดีตถึงได้ถูก#nยกเลิกไป"
51140-282 = "แต่ก็เป็นเรื่องที่ผ่านมาแล้วไม่ใช่เหรอครับ? ปัจจุบันต่างหากครับที่สำคัญ"
51140-283 = "อ่า มันก็จริงครับ"
51140-284 = "ไหนๆ เราก็มาเที่ยวเฮียกคิยาโคในช่วงที่มีเทศกาลแบบนี้แล้ว งั้นก็มาสนุกให้เต็มที่ดีกว่าครับ~"
51140-292 = "[ns] \"เหตุผลที่เทศกาลถูกยกเลิกงั้นเหรอ...\""
51140-297 = "[ns] \"อ๊ะ ชิซุโกะโทรเข้ามา...\""
51140-301 = "(ในขณะที่คุณครูก้มหน้าดูโทรศัพท์และจะกดรับสาย)"
51140-308 = "[ns] (......หืม?)"
51140-313 = "ในที่สุดเทศกาลก็เริ่มสนุกได้ที่"
51140-314 = "และเรื่องราวที่สะสมไว้ก็ใกล้จะเริ่มขึ้นแล้ว"
51140-318 = "เรื่องที่ฉันจะเล่าต่อไปนี้คือ <ตำนานร้อยเรื่องราว> ที่มีแต่พวกเราเท่านั้นที่รู้"
51140-323 = "อะฮ่าฮ่า ยินดีที่ได้พบกันนะคะ"
51140-324 = "ฉันอยากเจอคุณมาตลอดเลยละค่ะ คุณครูจากชาเล่ต์..."
51140-326 = "ตอนต่อไป;การพบกันโดยบังเอิญ"

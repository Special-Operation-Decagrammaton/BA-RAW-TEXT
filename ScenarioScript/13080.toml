[translation]
13080-1 = "Episode 8;Abydos Student Council 1"
13080-5 = "[ns1] Finish organizing the data collected overnight.\n[ns2] \"I have a general idea of what to do. Next is...\""
13080-11 = "Still on standby. Can I provide any assistance, [USERNAME] Sensei? "
13080-12 = "[s] \"Ah, thank you, Plana. Where's Arona?\""
13080-13 = "Arona is asleep. She is what you would call a \"sleepyhead.\" Instead, you may simply count on me, the diligent one."
13080-14 = "[s3] \"Thank you. In that case...if you don't mind.\"\n[s4] Hand over the task to Plana."
13080-19 = "Understood. The task is simple. I will complete it right away. "
13080-20 = "But more importantly, you require rest, Sensei. All-nighters are detrimental to your health."
13080-21 = "[s] \"I know, but there's no time. We need to go to Abydos.\""
13080-22 = "Understood. In that case—"
13080-28 = "Abnormality detected."
13080-33 = "[ns] \"Plana? What's wrong?\""
13080-46 = "..."
13080-47 = "...Wh-What is this?"
13080-48 = "My... My calculations were off?! Impossible! How?"
13080-51 = "[ns] \"Wh-What just happened?!\""
13080-53 = "[ns] \"An explosion?! But I'm fine, somehow?\" "
13080-56 = "Th-That was a close call, Sensei!"
13080-57 = "[s] \"Arona! What happened?!\""
13080-60 = "The Schale building exploded!"
13080-61 = "But right now... Plana!"
13080-67 = "For your safety...activated...emergency protection..."
13080-68 = "But this is...the extent..."
13080-73 = "P-Plana?!"
13080-75 = "I'll never...let you get hurt again...Sensei..."
13080-76 = "[s] \"Plana? Plana! Are you okay?!\""
13080-77 = "She'll be fine, Sensei! She overdid herself and lost consciousness...but aside from that... "
13080-88 = "[ns] \"...!!!\""
13080-96 = "[ns] \"(My consciousness is...)\" "
13080-103 = "...Curious. "
13080-104 = "That chest's defense system is strong...significantly stronger than my calculations predicted."
13080-105 = "The weapon that tore down the walls of Jericho, the Ark of the Covenant... It appears I underestimated it."
13080-106 = "...Hm. It bears no significance. I will adjust my calculations, my strategy...and futile, it was not. After all..."
13080-110 = "Second strategy: \"The body's limits cannot be overcome...\" This maxim holds true."
13080-111 = "And away, away from that limited body of yours, important conversations are taking place without you, Sensei. Sleep more, wake up, do as you please. It'll be much too late."
13080-113 = "Now then! Shall we continue our games?"
13080-121 = "...Sensei isn't answering."
13080-125 = "Hm..."
13080-126 = "Do you think...perhaps something happened?"
13080-127 = "Maybe they overslept?"
13080-129 = "While we haven't been able to get ahold of them at times...they've always showed up early when we made a promise."
13080-130 = "What about Hoshino?"
13080-134 = "She's not answering either... "
13080-136 = "Seriously?! What the heck is everyone doing?! "
13080-137 = "..."
13080-141 = "...The sun's risen already. "
13080-142 = "I should get going. Shiroko, Sensei... Well, everyone's waiting."
13080-143 = "Hah, that Shiroko! She really gave me a run for my money yesterday. She's really getting stronger... Maybe she'll be stronger than me soon?"
13080-144 = "Aw, my Shiroko used to be so adorable, but now she sure is a handful, even for this old timer. Time flies, huh?"
13080-149 = "This place hasn't changed one bit... "
13080-150 = "I mean, what else do you expect from an abandoned ghost town?"
13080-154 = "Please! Please sign this for me!"
13080-168 = "It's a residential petition for environmental improvements in Abydos! "
13080-169 = "We need everyone to band together if we're going to demand action from the corporations!"
13080-171 = "No, sorry. Not interested... "
13080-175 = "What a fruitless struggle... "
13080-179 = "U-Um...excuse me... If it's not too much trouble, would you sign my petition...please...?"
13080-180 = "It's pointless! Nephthys is leaving anyway, so what's the use of trying to improve anything, especially the environment?"
13080-192 = "Ah, hey! You over there! Wait! Please don't leave!"
13080-198 = "Heehee... Yes, you! I recognize you! You're the new student, right? If I remember correctly, your name was Hoshino. "
13080-204 = "H-Huh?! Is it not Hoshino? Was I wrong?"
13080-205 = "Come back... Hoshino?"
13080-214 = "*sigh* "
13080-219 = "We're holding a presentation on increasing patrols to enhance safety in the district! Please join us and share your views! "
13080-220 = "Here you go! Please take this flyer!"
13080-227 = "Ah! Hoshino! Hi!"
13080-233 = "D-Don't go! Please wait, just for a second! I wanted to talk to you!"
13080-237 = "H-Huh...?!"
13080-245 = "...Tsk."
13080-251 = "Ah! Th-Thank you! "
13080-252 = "Oh... Um... I'm honored! I've never shaken hands with a famous person before..."
13080-253 = "...Famous? You know me?"
13080-254 = "How could I not? You're the really powerful, but very bad-tempered, new student everyone can't stop talking about!"
13080-255 = "Well, technically it's a rumor I started, but still...! "
13080-256 = "After all, you were the one who got rid of that group of troublemakers terrorizing the area, right, Hoshino? And you made those gangs stop fighting each other!"
13080-257 = "Yup! It all really helped Abydos. So, as the student council president, I really wanted to show my gratitude. Thank you, Hoshino! "
13080-261 = "...You need to go home, President Yume. Shady people come out with the dark. It's not safe."
13080-262 = "I-Is that so? But I still have a lot I need to get done..."
13080-269 = "Ah...? Ah! Wait! "
13080-270 = "...But how did you know my name?"
13080-282 = "Eek. It's already so late... "
13080-283 = "I haven't gotten enough signatures, and I have so many flyers left to hand out..."
13080-284 = "Ack, I need to finish gathering signatures here by the end of the week. That way I can start on another street next week!"
13080-288 = "It does feel a little creepier when it's this dark... Maybe I should listen to Hoshino and head home..."
13080-298 = "What's with this chick?"
13080-300 = "O-Oh...? "
13080-305 = "What's this? Some safety patrol presentation from the Abydos Student Council? Are you an Abydos student? Huh?!"
13080-306 = "Y'all hired us and then stiffed us! D'you even know the problems you caused?"
13080-311 = "Eh? W-Well...you see... Um!"
13080-314 = "Whatcha gonna do, huh? There's interest now, 'cause you took too long to pay up! Interest!"
13080-320 = "Th-The petition..."
13080-322 = "And what's this? Huh?"
13080-326 = "Don't do that, please! I need to hand those out to more people tomorrow!"
13080-329 = "Does it look like I care?!"
13080-330 = "This is perfect. I was in a horrible mood, so I think I'll take it out on you!"
13080-362 = "A-Ah...! Hoshino...?!"
13080-364 = "Did I or did I not tell you it's dangerous at night?"
13080-365 = "Are you stupid?! Do you not have ears?"
13080-370 = "S-Sorry... "
13080-371 = "The streets are crawling with lowlives! Don't you know how lawless Abydos is, especially at night?!"
13080-372 = "..."
13080-381 = "Y-You... What the...?!"
13080-382 = "I'll remember your face! You'll regret this!"
13080-387 = "*sigh*"
13080-388 = "...You okay, President Yume?"
13080-389 = "Y-Yes... Thank you, Hoshino..."
13080-390 = "Why didn't you fight back? Common thugs like them should've been easy for you."
13080-391 = "I-I guess, but...trying to fix a problem with violence isn't really fixing anything... It just continues the cycle..."
13080-392 = "And if you keep resorting to fighting, soon that's the only way you'll know how to resolve conflict..."
13080-393 = "...I don't get it."
13080-394 = "If we don't fight, then how are we supposed to fix things?"
13080-395 = "Th-That's the question, isn't it...? "
13080-399 = "Anyway, go home. Those guys might come back with some friends."
13080-404 = "Ah? Hoshino?!"
13080-415 = "It's a residential petition for environmental improvements in Abydos!"
13080-416 = "We need everyone to band together if we're going to demand action from the corporations!"
13080-417 = "..."
13080-421 = "Um...signatures...for environmental improvements..."
13080-422 = "Ah, Hoshino? What're you doing here?"
13080-423 = "Isn't it obvious? Those thugs from yesterday might try to get revenge."
13080-424 = "Y-You want to protect me?"
13080-425 = "No. I'm using bait to lure them out."
13080-426 = "Me?!"
13080-427 = "Yes. The Abydos Student Council has a ton of enemies. And since you're the student council president, you're the bait. Huge bait."
13080-431 = "Hahaha...! Really, now?"
13080-435 = "I think you're being dishonest, Hoshino. It's written all over your adorable face! Somewhere deep down in there, you're worried about me!  "
13080-436 = "You're reading it wrong, then! A-And who's adorable, anyway?!"
13080-437 = "Heehee. Well, you might always be scowling and trying to look scary, but you're just putting on an act, aren't you? "
13080-441 = "I can see the real you behind that scowl! It's much more...how do I say this? Adorable! Cute! Sweet!"
13080-442 = "Wh-What are you even saying?! If you keep spouting nonsense, I'll leave you here!"
13080-443 = "Heehee... Thanks, Hoshino. "
13080-444 = "It's comforting to have a strong, dependable junior like you around."
13080-445 = "Don't you have work to get to, President?"
13080-446 = "I'll help you out with your student council work. Just this once."
13080-447 = "Hm... \"President\" feels so stuffy. What about \"Miss Yume\"? Oh! Just Yume would make me even happier!"
13080-451 = "...Are you listening to me? "
13080-455 = "Next Episode;Abydos Student Council 2"

[translation]
13080-1 = "第8話;阿拜多斯學生會（１）"
13080-5 = "[ns1] 整理通宵收集到的資料\n[ns2]「大概知道需要什麼了。接下來……」"
13080-11 = "待命中。#n[USERNAME]老師，有什麼需要嗎？"
13080-12 = "[s]「啊，謝謝你，星奈。彩奈呢？」"
13080-13 = "彩奈前輩正在睡覺，他是瞌睡蟲。#n所以如果有事吩咐，請對勤奮的我下達命令。"
13080-14 = "[s3]「謝謝你，那麼……」\n[s4] 把工作交給星奈"
13080-19 = "收到。這件事並不困難，我馬上處理。"
13080-20 = "話說回來，老師應該小睡一下。#n通宵工作有害健康。"
13080-21 = "[s]「嗯，但我現在必須馬上去阿拜多斯，已經沒時間了。」"
13080-22 = "我知道了。那麼……"
13080-28 = "發現異常。"
13080-33 = "[ns]「星奈……怎麼了？」"
13080-46 = "…………………"
13080-47 = "……為什麼？"
13080-48 = "小生的計算有誤……？怎麼會……？"
13080-51 = "[ns]「怎，怎麼回事！？」"
13080-53 = "[ns]「爆炸……！？可是我沒事啊……！？」"
13080-56 = "大，大事不好了！老師！"
13080-57 = "[s]「彩奈？現在是什麼情況……！？」"
13080-60 = "夏萊大樓發生了爆炸！"
13080-61 = "但重要的是……星奈醬他……！！"
13080-67 = "為了保護老師的安全……必須實施緊急保護……"
13080-68 = "可是已經……撐不下去了……"
13080-73 = "星，星奈醬！？"
13080-75 = "我再也……不想看到老師受傷了……"
13080-76 = "[s]「星奈！？你沒事吧！？」"
13080-77 = "不用擔心，老師！#n星奈醬只是暈過去而已！但是比起這個……"
13080-88 = "[ns]「…………！！！」"
13080-96 = "[ns] （意識……）"
13080-103 = "……原來如此。"
13080-104 = "那個箱子的保護系統，比想像中還強很多。"
13080-105 = "破壞耶利哥城牆的兵器，創造不可思議奇蹟的[ruby=ARK]聖櫃[/ruby]……#n或許是我太小看它了……"
13080-106 = "……算了，無所謂。#n能意識到必須修改攻略方法，這也不算毫無意義。"
13080-110 = "攻略方法其二「無法克服肉體的極限」依然有效。"
13080-111 = "最重要的故事，目前正在老師肉體不在的地方進行。#n即使老師之後醒來也已經太遲了。"
13080-113 = "那麼，讓遊戲繼續進行吧。"
13080-121 = "……聯絡不上老師。"
13080-125 = "嗯……"
13080-126 = "會不會是發生什麼事了？"
13080-127 = "該不會是在睡覺吧？"
13080-129 = "雖然聯絡不到老師也不是什麼稀奇的事……#n但今天老師已經說過會早點到的……"
13080-130 = "星野前輩呢？"
13080-134 = "也一樣聯絡不上……"
13080-136 = "真是的，他們在做什麼啊？"
13080-137 = "……"
13080-141 = "……都已經早上了啊。"
13080-142 = "……差不多該回去了。#n白子醬和老師……大家都在等著。"
13080-143 = "唔嗯……白子醬變得越來越強，實在不好對付啊……#n再過一段時間，是不是就會比大叔我強了呢～？"
13080-144 = "白子醬……本來還很嬌小可愛，現在居然成長到足以威脅大叔我了呢。#n哎呀～真是歲月不饒人～"
13080-149 = "這裡都沒變呢……"
13080-150 = "也對，畢竟是被遺棄的地方，這也沒辦法。"
13080-154 = "拜託了！請在這裡簽名！"
13080-168 = "為了改善阿拜多斯的環境，需要各位居民的簽名！"
13080-169 = "為了勸導企業，需要各位的幫助。"
13080-171 = "不用了……我沒興趣……"
13080-175 = "一點意義都沒有……"
13080-179 = "那，那個，不好意思……麻煩請在這裡簽名……"
13080-180 = "那麼做又有什麼意義。#n現在連奈芙蒂斯都要離開自治區了，改善環境有什麼用！"
13080-192 = "啊……！那，那個！等等！等我一下！"
13080-198 = "耶嘿嘿……嗯，我認得你唷。你是最近入學的那個新生對吧？#n名字好像叫做星野……"
13080-204 = "……是星野醬對吧？#n咦，叫錯了嗎！？"
13080-205 = "等，等等，星野醬？"
13080-214 = "唉……"
13080-219 = "為了自治區的安全，必須召開巡邏強化方案說明會！#n請務必參加，以傳達市民們的意見！"
13080-220 = "請收下說明會的傳單……"
13080-227 = "……啊！星野醬！！"
13080-233 = "等，等一下！不要逃走！！#n等等！我有話要說！"
13080-237 = "噫……！？"
13080-245 = "……呿。"
13080-251 = "啊，謝謝你。"
13080-252 = "呃……應該說我很榮幸嗎？#n這是我第一次跟名人握手……"
13080-253 = "你認識我嗎？"
13080-254 = "嗯，當然囉！你就是那個很強但有點壞壞的新生對吧！傳聞已經傳開了唷。"
13080-255 = "雖然這麼說，其實也只有我聽到就是了……"
13080-256 = "之前趕走那些不良社團的也是星野醬對吧？#n還有阻止奇怪的暴力集團打鬥的人也是！"
13080-257 = "身為學生會長，我希望能感謝你為阿拜多斯的付出。#n謝謝你，星野醬。"
13080-261 = "……你請回吧，夢學生會長。#n這裡天黑之後，危險的傢伙就會四處亂竄。"
13080-262 = "啊，是，是嗎？#n可是我還有很多事要做……"
13080-269 = "咦……？"
13080-270 = "你知道我的名字嗎……？"
13080-282 = "……哈啊。#n已經這麼晚了啊……"
13080-283 = "還沒收集到大家的簽名，而且還有這麼多傳單要發……"
13080-284 = "嗚嗚……這星期得收集到大家的簽名，下星期才能去另一條街……"
13080-288 = "天，天色變暗之後有點陰森森的呢……#n星野醬說的對，差不多該回去了……"
13080-298 = "這傢伙是誰啊？"
13080-300 = "啊，咦……？"
13080-305 = "阿拜多斯學生會的巡邏強化方案說明會？#n搞什麼，你是阿拜多斯的學生嗎？"
13080-306 = "來的正好，你們明明僱用了我們卻遲遲沒付錢，害我們很傷腦筋耶！"
13080-311 = "咦？我，我……該怎麼說呢……"
13080-314 = "既然拖欠費用就該支付利息啊！你要怎麼負責！說啊？"
13080-320 = "簽，簽名的紙都……"
13080-322 = "這又是什麼鬼東西！啊？"
13080-326 = "請，請住手！這是明天要發給大家的……"
13080-329 = "那又怎樣！！"
13080-330 = "我們現在心情很差，正好拿你來出出氣！#n碰到我們算你倒霉！"
13080-362 = "咦咦……？星，星野醬……？"
13080-364 = "我不是說過了嗎！到了晚上會很危險！"
13080-365 = "為什麼不聽我的話！你是笨蛋嗎！？"
13080-370 = "對，對不起……"
13080-371 = "這一帶到處都是這種混蛋！#n你不知道晚上的阿拜多斯是法外地帶嗎！？"
13080-372 = "……"
13080-381 = "這，這傢伙……搞什麼啊！？"
13080-382 = "你這張臉我記住了！走著瞧！"
13080-387 = "唉……"
13080-388 = "……有沒有哪裡受傷？夢學生會長。"
13080-389 = "我，我沒事……謝謝你，星野醬……"
13080-390 = "為什麼不戰鬥呢？#n那些傢伙應該不難對付才對。"
13080-391 = "因，因為……只靠戰鬥沒辦法真正解決問題，只會原地踏步……"
13080-392 = "而且一旦習慣這種做法，之後就只會用那種錯誤的方式來解決問題了……"
13080-393 = "……完全不知道你在說什麼。"
13080-394 = "那不然該怎麼解決呢？"
13080-395 = "這，這……"
13080-399 = "請快回去吧。#n那些逃跑的傢伙可能會帶同伴回來的。"
13080-404 = "啊，咦？星野醬！？"
13080-415 = "為了改善阿拜多斯的環境，需要各位居民的簽名！"
13080-416 = "為了勸導企業，需要各位的幫助。"
13080-417 = "……"
13080-421 = "為……為了改善環境……請簽名……"
13080-422 = "星野醬……？你為什麼在這裡？"
13080-423 = "那還用說，昨天那些傢伙可能會來報復啊。"
13080-424 = "你，你是來保護我的嗎！？"
13080-425 = "才不是。#n只是有你在，我才能更輕鬆地逮到那些傢伙而已。"
13080-426 = "原來我是誘餌！？"
13080-427 = "沒錯。因為阿拜多斯學生會的敵人很多。#n再加上你又是學生會長，所以可是個大誘餌呢。"
13080-431 = "哼，哼，哼。真的是這樣嗎～？"
13080-435 = "星野醬真不坦率呢～其實你是在擔心我對吧？#n你可愛的臉上寫得一清二楚唷？「我很擔心夢前輩！」這樣。"
13080-436 = "誰，誰擔心你啊！而且還說什麼可愛！？"
13080-437 = "唔嗯……雖然星野醬總是板著一張臉，露出可怕的表情……但其實你是故意的吧？"
13080-441 = "星野醬藏在表情背後的真面目……#n嗯……該怎麼說呢……是更呆萌呆萌的……"
13080-442 = "你，你在胡說什麼啊！#n如果再說這些亂七八糟的東西，我可要走人了哦！"
13080-443 = "呵呵……謝謝你，星野醬。"
13080-444 = "有這麼強的後輩擔心我，該說可靠……還是值得信賴呢……"
13080-445 = "閒聊就先說到這裡，請專心工作吧，會長。"
13080-446 = "我只會幫學生會這一次而已。"
13080-447 = "比起學生會長，我更喜歡你叫我前輩呢……#n如果願意叫我夢前輩的話，我會更開心的……"
13080-451 = "……你有在聽我說話嗎？"
13080-455 = "下一話;阿拜多斯學生會（２）"

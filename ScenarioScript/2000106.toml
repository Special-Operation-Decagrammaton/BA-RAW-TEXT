[translation]
2000106-1 = "我和老師的關係？"
2000106-2 = "千年．樓頂"
2000106-4 = "呼……"
2000106-6 = "啊，老師，你來啦。"
2000106-7 = "你問我怎麼了？唔嗯。該怎麼說呢……"
2000106-8 = "其實是，我和朋友吵架了。"
2000106-9 = "[s1] 「那個朋友現在在哪間醫院？」\n[s2] 「……發生了什麼事嗎？」"
2000106-10 = "……還很健康的在教室裡。"
2000106-11 = "應該算是，起了小小的口角吧。"
2000106-12 = "請別誤會。我們並沒有打起來。"
2000106-13 = "平時我們會一起去外面買午餐，然後回教室一起吃。"
2000106-14 = "但是……說起來有點害羞，我最近正在減肥。"
2000106-15 = "就在前陣子，我脫下女僕裝後久違的穿上了制服，卻發現到處都有點緊……"
2000106-16 = "但是我那個朋友，對減肥什麼的沒什麼興趣。"
2000106-17 = "突然跟我說想一起去吃披薩。"
2000106-18 = "還說要再順便買個巧克力蛋糕當甜點。"
2000106-19 = "因為我並不怎麼挑食，平時幾乎都是照他說的做，"
2000106-20 = "但我今天也有點不舒服，所以就想吃個沙拉……"
2000106-21 = "[s] 「各吃各的不就好了嗎？」"
2000106-22 = "別胡說八道了，老師。"
2000106-23 = "女高中生如果特地分開吃飯，等同於「你跟我不是同一國」的意思。"
2000106-24 = "[s3] 「嘛……但有必要為了這種事搞成這樣嗎……」\n[s4] 「為了這種事吵架，值得嗎？」"
2000106-25 = "嗯，這我也明白。"
2000106-26 = "嗯，這我也明白。"
2000106-27 = "像這種意見分歧的情況，只要互相尊重就能解決了。"
2000106-28 = "但是一直以來，幾乎都是我在配合那位朋友。"
2000106-29 = "你不覺得偶爾也該聽聽我的意見嗎？"
2000106-30 = "這才是所謂的公平不是嗎？"
2000106-31 = "[s5] 「我想，朋友之間需要的未必是公平唷。」\n[s6] 「花凜說的對，是那位朋友不對。」\n[s7] 「並不是那樣，是花凜不對唷。」"
2000106-32 = "……"
2000106-33 = "哈啊。"
2000106-34 = "哈哈。"
2000106-35 = "也是呢。"
2000106-36 = "雖然有點過時了，但沒有說錯。我懂了。"
2000106-37 = "對，朋友之間需要的是友情，對吧。"
2000106-38 = "……"
2000106-39 = "呼。"
2000106-40 = "老師，謝謝你願意為了安慰我而說了違心之論。"
2000106-41 = "聽你這麼一說，我才意識到自己也有錯。"
2000106-42 = "一起吃飯這件事才是重點，至於吃什麼並不是那麼重要。"
2000106-43 = "……"
2000106-44 = "或許是吧。"
2000106-45 = "老師，謝謝你願意對我說實話。"
2000106-46 = "嗯，有時候比起隨口說說的安慰……"
2000106-47 = "這種像是老師會說的話，反而更能讓我成長也說不定。"
2000106-48 = "果然……能夠有像這樣可以傾訴煩惱的人，是件令人開心的事呢。"
2000106-49 = "我會向朋友道歉的。"
2000106-50 = "謝謝你老師。託你的福，不管是頭腦還是心情都輕鬆多了。"
2000106-51 = "我去買個披薩回來。啊，對了，還有巧克力蛋糕。"
2000106-52 = "啊，那個……"
2000106-53 = "我想了想，果然我和老師好像沒辦法成為朋友……"
2000106-54 = "並，並沒有什麼奇怪的意思，請不要誤會！"
2000106-55 = "那個，我是指不把你當作朋友……"
2000106-56 = "而是當作主人……"
2000106-57 = "……呵呵，開玩笑的。"
2000106-58 = "謝謝你，老師，那我就先告辭了。"
2000106-61 = "……下次見。"

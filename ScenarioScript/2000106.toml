[translation]
2000106-1 = "My Relationship with Sensei?"
2000106-2 = "Millennium Rooftop"
2000106-4 = "*sigh*"
2000106-6 = "Oh, there you are, Sensei."
2000106-7 = "You must want to know what's wrong. It's a long story."
2000106-8 = "I got into a fight with a friend."
2000106-9 = "[s1] \"Which hospital are they staying at now?\"\n[s2] \"What happened?\""
2000106-10 = "She's perfectly fine and in the club room."
2000106-11 = "It was just a small argument."
2000106-12 = "Please don't get the wrong idea. It's not like we got physical."
2000106-13 = "We usually buy our lunch off campus and eat together in the club room."
2000106-14 = "The thing is—as embarrassing as this is to admit—I've been on a diet lately."
2000106-15 = "I tried on my school uniform for the first time in a while, and it was a tighter fit than I cared for..."
2000106-16 = "My friend, on the other hand, has never had to watch what she eats."
2000106-17 = "She suddenly suggested that we go out for pizza."
2000106-18 = "Not only that, she also wanted a chocolate cake for dessert."
2000106-19 = "I've never been a picky eater, so I usually go along with whatever she suggests."
2000106-20 = "I wasn't feeling very hungry today and only wanted a salad..."
2000106-21 = "[s] \"Why not just order separately?\""
2000106-22 = "Don't be ridiculous, Sensei."
2000106-23 = "For girls, eating different foods during lunch may as well be drawing a battle line in the sand."
2000106-24 = "[s3] \"That...doesn't sound right.\"\n[s4] \"Surely it can't be worth fighting over.\""
2000106-25 = "Yeah, I know."
2000106-26 = "Yeah, I know."
2000106-27 = "Differences in opinion are meant to be resolved through mutual respect."
2000106-28 = "But I'm the one who's always going along with what she wants."
2000106-29 = "Why can't she do the same for me once in a while?"
2000106-30 = "Doesn't she owe it to me? Isn't that fair?"
2000106-31 = "[s5] \"Friendship isn't about what's fair or owing debts.\"\n[s6] \"You're right. Your friend made a mistake.\"\n[s7] \"No, Karin. You're the one in the wrong here.\""
2000106-32 = "..."
2000106-33 = "Ha."
2000106-34 = "Haha."
2000106-35 = "You're right."
2000106-36 = "That attitude's a bit old-fashioned, but it is true. I understand."
2000106-37 = "Being friends is about trusting one another."
2000106-38 = "..."
2000106-39 = "*sigh*"
2000106-40 = "I know you're just saying that to comfort me, Sensei."
2000106-41 = "Hearing it back like that, though, makes me realize how twisted it is."
2000106-42 = "What matters is that we're together, not what we're eating when we are."
2000106-43 = "..."
2000106-44 = "You're right."
2000106-45 = "Thank you for being honest, Sensei."
2000106-46 = "Sometimes, tough love is what we all need."
2000106-47 = "I can use it to help me grow as a person."
2000106-48 = "It's good to have someone to talk to about these kinds of things."
2000106-49 = "I'm going to apologize to my friend."
2000106-50 = "Thanks, Sensei. That's a real weight off my shoulders."
2000106-51 = "I should buy some pizza on my way back. A chocolate cake would be nice too."
2000106-52 = "Also..."
2000106-53 = "I've put a lot of thought into it, and I don't think you and I can be friends, Sensei."
2000106-54 = "D-Don't get the wrong idea though!"
2000106-55 = "What I mean to say is, you're not my friend..."
2000106-56 = "...but my master. Isn't that right?"
2000106-57 = "Haha. Only kidding."
2000106-58 = "Thanks again, Sensei. I should be going now."
2000106-61 = "...See you later."

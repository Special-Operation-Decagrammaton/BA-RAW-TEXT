[translation]
2000106-1 = "ความสัมพันธ์ของฉันกับคุณครู?"
2000106-2 = "ดาดฟ้า มิลเลเนียม"
2000106-4 = "เฮ้อ..."
2000106-6 = "อ่า มาแล้วเหรอคุณครู?"
2000106-7 = "สงสัยล่ะสิว่าฉันมีเรื่องอะไร อืม... จะบอกยังไงดีนะ"
2000106-8 = "ฉันทะเลาะกับเพื่อนมาน่ะ"
2000106-9 = "[s1] \"เพื่อนอยู่โรงพยาบาลไหนเหรอ?\"\n[s2] \"เกิดเรื่องอะไรเหรอ...?\""
2000106-10 = "อยู่ในห้องชมรมน่ะ"
2000106-11 = "แค่พูดทะเลาะกันนิดหน่อยเอง"
2000106-12 = "อย่าเข้าใจผิดสิ เราไม่ได้ลงไม้ลงมือกันสักหน่อย"
2000106-13 = "ปกติแล้วพวกเราจะซื้ออาหารกลางวันแล้วมากินด้วยกันในห้องชมรมน่ะ"
2000106-14 = "แต่ว่า... ช่วงนี้ฉันกำลังไดเอต..."
2000106-15 = "ก็ก่อนหน้านี้ฉันลองใส่ชุดนักเรียนแทนชุดเมด แต่ชุดมันก็รัดไม่พอดีตัว..."
2000106-16 = "แต่ว่าเพื่อนคนนั้นไม่สนใจเรื่องการไดเอตเลย"
2000106-17 = "แถมจู่ๆ ก็ชวนกินพิซซ่าขึ้นมาซะอย่างนั้น"
2000106-18 = "นี่ยังไม่นับเค้กช็อกโกแลตด้วยนะ"
2000106-19 = "ปกติฉันไม่ค่อยเลือกกินเท่าไหร่ ส่วนมากก็เลยกินทุกอย่างที่เพื่อนชวนกิน"
2000106-20 = "แต่วันนี้ท้องฉันมันปั่นป่วน แล้วก็อยากกินแค่สลัด..."
2000106-21 = "[s] \"ก็แยกไปกินก็ได้นี่นา\""
2000106-22 = "พูดอะไรแบบนั้นล่ะคุณครู?"
2000106-23 = "ถ้าเพื่อนผู้หญิงแยกไปกินข้าวต่างหากก็เป็นเรื่องน่ะสิ ใครๆ ก็รู้ว่าต้องมีเรื่องอะไรกัน"
2000106-24 = "[s3] \"เอ่อ... เรื่องนั้น... ครูว่ามัน...\"\n[s4] \"แค่นั้นก็เป็นเรื่องแล้วเหรอ?\""
2000106-25 = "ใช่ นี่เรื่องใหญ่นะ"
2000106-26 = "ใช่ นี่เรื่องใหญ่นะ"
2000106-27 = "เรื่องความเห็นไม่ตรงกันแก้ไขได้ด้วยการเคารพในการตัดสินใจซึ่งกันและกัน"
2000106-28 = "แต่ที่ผ่านมาฉันก็ปรับตัวให้เข้ากับเพื่อนมาตลอด"
2000106-29 = "ทีนี้จะฟังกันหน่อยไม่ได้เลยเหรอ?"
2000106-30 = "นี่มันไม่ยุติธรรมเลย"
2000106-31 = "[s5] \"มิตรภาพไม่ใช่เรื่องของความยุติธรรมหรอก\"\n[s6] \"เธอพูดถูกแล้ว เพื่อนต่างหากที่เป็นคนผิด\"\n[s7] \"ไม่ใช่นะ เธอผิดแล้วล่ะคาริน...\""
2000106-32 = "......"
2000106-33 = "เฮ้อ"
2000106-34 = "เฮ้อออ"
2000106-35 = "ก็ถูกนะ"
2000106-36 = "ถึงจะดูเชยไปหน่อย แต่ก็พูดถูกแล้ว เข้าใจแล้วล่ะ"
2000106-37 = "ก็จริง มิตรภาพคือการเชื่อใจกันและกันต่างหาก"
2000106-38 = "......"
2000106-39 = "เฮ้อ..."
2000106-40 = "ฉันรู้ว่าที่พูดแบบนี้เพราะต้องการปลอบฉัน แต่ยังไงก็ขอบคุณนะ"
2000106-41 = "พอได้ยินแบบนี้ ฉันก็คิดได้แล้วล่ะว่าฉันผิดเอง"
2000106-42 = "สิ่งสำคัญคือการที่เราได้กินข้าวด้วยกันต่างหาก ไม่ใช่อยู่ที่ว่าเรากินอะไร"
2000106-43 = "......"
2000106-44 = "อย่างนี้นี่เอง"
2000106-45 = "ขอบคุณที่จริงใจกับฉันนะคุณครู"
2000106-46 = "บางครั้งเราก็ต้องฟังคำแนะนำที่ตรงไปตรงมาบ้างสิเนอะ.."
2000106-47 = "รู้มั้ยว่าคำแนะนำของคุณครูจะช่วยให้ฉันเติบโตเป็นผู้ใหญ่ได้อีกขั้น"
2000106-48 = "ดีจังที่ฉันมีคนที่สามารถเล่าเรื่องลำบากใจให้ฟังได้"
2000106-49 = "แล้วฉันจะไปขอโทษเพื่อนนะ"
2000106-50 = "ขอบคุณนะคุณครู ตอนนี้ฉันสบายใจขึ้นแล้วล่ะ"
2000106-51 = "ซื้อพิซซ่ากลับไปดีกว่า จริงสิ! เค้กช็อกโกแลตด้วย"
2000106-52 = "แล้วก็..."
2000106-53 = "ฉันคิดทบทวนดูหลายรอบแล้ว แต่ฉันคงเป็นเพื่อนกับคุณครูไม่ได้..."
2000106-54 = "อย่าเข้าใจผิดล่ะ ฉันไม่ได้หมายความแบบนั้น!"
2000106-55 = "ที่... ที่บอกว่าเป็นเพื่อนไม่ได้..."
2000106-56 = "เพราะคุณครูคือนายท่านยังไงล่ะ...?"
2000106-57 = "ฮุฮุ ล้อเล่นน่า!"
2000106-58 = "ขอบคุณนะคุณครู ฉันขอตัวก่อนล่ะ"
2000106-61 = "ไว้เจอกันใหม่นะ..."

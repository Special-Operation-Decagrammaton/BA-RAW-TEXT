[translation]
2000505-1 = "#title;비품은 사용 후 깨끗이 제자리에"
2000505-2 = "#place;무이가하마 해변"
2000505-3 = "#na;(해변의 백사장 앞에서 히후미를 기다리는 중에…….)"
2000505-4 = "#wait;1500"
2000505-5 = "#wait;1500"
2000505-6 = "#wait;1000"
2000505-7 = "#na;히후미 수영복ND;선생님~"
2000505-8 = "#wait;1200"
2000505-9 = "3;히후미 수영복ND;00;말씀드린 대로 빌린 전차를 가져왔어요!\n#3;em;[반짝]\n#3;hophop\n#3;a"
2000505-10 = "3;히후미 수영복ND;03;빨리 백사장으로 가서 함께 일광욕을 즐기죠!"
2000505-11 = "[s] \"전차로 어떻게 일광욕을 즐기려고……?\""
2000505-12 = "3;히후미 수영복ND;02;네? 어떻게— 라기보다는 일광욕을 즐기려면 당연히 전차가 필요하잖아요?\n#3;em;[?]"
2000505-13 = "3;히후미 수영복ND;99;으음…… 그러고보니 선생님께는 <크루세이더 쨩>에 대해 말씀드린 적이 없었던 것 같네요."
2000505-14 = "3;히후미 수영복ND;00;제가 이 기회에 <크루세이더 쨩>의 특징에 대해 하나씩 알려드릴게요."
2000505-15 = "3;히후미 수영복ND;03;우선은 자외선 방지 대책! <크루세이더 쨩>에는 큐폴라가 없는 대신 전차장을 태양의 직사광선에서 보호하기 위한 양산 거치대가 설치되어 있어요.\n#3;em;[반짝]\n#3;m2"
2000505-16 = "3;히후미 수영복ND;05;포탑 위에서도 깨끗한 피부를 관리하는 건 중요한 일이니까요."
2000505-17 = "3;히후미 수영복ND;03;이 양산 거치대에 커다란 양산을 설치하면 해변용 파라솔 대용으로 쓸 수 있답니다!\n#3;em;[음표]"
2000505-18 = "3;히후미 수영복ND;05;그리고 방수 대책! <크루세이더 쨩>에는 젖은 도로나 해변을 쉽게 주행할 수 있도록 도와주는 전차용 매트가 실려 있어요.\n#3;m4\n#3;em;[!]"
2000505-19 = "3;히후미 수영복ND;99;전차의 궤도가 모래나 진흙 때문에 상하면 큰일이니까요."
2000505-20 = "3;히후미 수영복ND;03;재질이 조금 거칠긴 하지만 이 매트는 해수욕용 비치 매트로도 사용할 수 있어요!\n#3;hophop\n#3;em;[반짝]"
2000505-21 = "3;히후미 수영복ND;06;마지막으로 탈수 대책! <크루세이더 쨩>에는 차를 쉽게 끓일 수 있는 냉온수기가 설치되어 있어요.\n#3;m3"
2000505-22 = "3;히후미 수영복ND;05;어떠한 환경에서도 티타임은 꼭 지켜야 하는 소중한 시간이니까요.\n#3;greeting"
2000505-23 = "3;히후미 수영복ND;03;뜨거운 홍차도, 시원한 아이스티도, <크루세이더 쨩>만 있다면 금방 만들 수 있답니다!\n#3;em;[반짝]"
2000505-24 = "[s1] \"……뭔가 전차라기보다는 아가씨들의 외출용 비품 같네.\"\n[s2] \"……대단해, 엄청나게 멋져!\""
2000505-25 = "3;히후미 수영복ND;08;아하하, 실제로도 트리니티 학원의 비품이 맞기는 하지만요."
2000505-26 = "3;히후미 수영복ND;03;그렇죠? 저도 크루세이더 쨩은 멋진 전차라고 생각하고 있어요. 헤헤……."
2000505-27 = "3;히후미 수영복ND;00;자, 그럼 본격적인 일광욕 준비를 하러 백사장으로 이동해 볼까요?\n#3;greeting\n#3;em;[음표]"
2000505-28 = "#all;hide"
2000505-29 = "#wait;1000"
2000505-30 = "#zmc;instant;0,222;2000\n#all;hide"
2000505-31 = "#zmc;instant;0,222;2000\n3;히후미 수영복ND;01;으음, 이곳에 전차를 대면 괜찮을까요?\n#3;a\n#3;em;…"
2000505-32 = "#zmc;instant;0,222;2000\n3;히후미 수영복ND;02;이곳이라면 볕도 잘 들고 바람도 선선하니 시원한 것 같아요."
2000505-33 = "#zmc;instant;0,222;2000\n3;히후미 수영복ND;07;……아니, 좀 더 바다 가까운 곳에 전차를 대는 게 좋겠어요. 이곳에서는 예쁜 바다의 풍경이 잘 보이지 않으니까요.\n#3;em;[!]"
2000505-34 = "#zmc;instant;0,222;2000\n3;히후미 수영복ND;05;좀 더…… 좀 더 가까이……."
2000505-35 = "#zmc;instant;0,222;2000\n#wait;2000"
2000505-36 = "#zmc;instant;0,222;2000\n3;히후미 수영복ND;04;어, 어라? 파도가 왠지 아까보다 훨씬 강해진 느낌이…….\n#3;em;[?]\n#3;stiff"
2000505-37 = "#zmc;instant;0,222;2000\n#st;[0,0];instant;1;"
2000505-38 = "#zmc;instant;0,222;2000\n#clearST\n#wait;1000"
2000505-39 = "#zmc;instant;0,222;2000\n#clearST\n#wait;1000"
2000505-40 = "#zmc;instant;0,222;2000\n3;히후미 수영복ND;10\n#3;em;[?!]\n#3;shake\n#3;closeup\n#wait;1000"
2000505-41 = "#zmc;instant;0,222;2000\n#all;hide\n#wait;1000"
2000505-42 = "#all;hide"
2000505-43 = "[ns] \"괜찮아?\""
2000505-44 = "3;히후미 수영복ND;08;괘, 괜찮아요. 갑자기 이렇게 높은 파도가 칠 거라고는 생각지 못해서…….\n#3;a\n#3;em;[땀]"
2000505-45 = "3;히후미 수영복ND;02;그래도 미리 수영복을 입고 있어서 다행이네요. 수영복은 물에 젖더라도 녹이 슬거나 고장 나지 않으니까요."
2000505-46 = "3;히후미 수영복ND;01;마치 총기나 전차의 부품처럼……."
2000505-47 = "3;히후미 수영복ND;09;으아아…… 저, 전차에 바닷물이?!\n#3;em;[?!]\n#3;shake"
2000505-48 = "[s] \"무슨 문제라도 있어?\""
2000505-49 = "3;히후미 수영복ND;10;크루세이더 쨩이 파도로 인해 바닷물에 흠뻑 젖고 말았어요!\n#3;hophop"
2000505-50 = "3;히후미 수영복ND;09;크루세이더 쨩에는 방염 대책이 되어있지 않아서, 소금물이 닿으면 금방 녹이 슬어버릴 텐데…… 빌려온 비품에 녹이 슬면 큰일이에요!\n#3;em;[속상함]\n#3;stiff"
2000505-51 = "3;히후미 수영복ND;10;이, 이를 어쩌죠…… 녹이 슬기 전에 빨리 전차를 청소해야 하는데……."
2000505-52 = "[s] \"저쪽에 세면장이 있어.\""
2000505-53 = "#st;[0,0];instant;1;"
2000505-54 = "#clearST\n3;히후미 수영복ND;02\n#3;em;[반응]\n#wait;1500\n#3;stiff"
2000505-55 = "3;히후미 수영복ND;05;그렇네요. 우선은 저곳에서 전차의 소금기를 씻어내도록 하죠.\n#3;greeting"
2000505-56 = "[s] \"일광욕을 하지 않아도 괜찮아?\""
2000505-57 = "3;히후미 수영복ND;06;지금은 일광욕보다 전차의 청소가 우선이에요!\n#3;closeup\n#3;em;[!]"
2000505-58 = "#wait;1000"
2000505-59 = "#all;hide"
2000505-60 = "#wait;11000"
2000505-61 = "#st;[-1200,-530];serial;60;[wa:2000]― 구석~[wa:220] 구석~[wa:1130] 깨끗해져라~."
2000505-62 = "#wait;5500"
2000505-63 = "#clearST"
2000505-64 = "#st;[-1200,-530];serial;60;― 크루세이더 쨩을,[wa:1000] 녹슬게 할 순 없으니까요."
2000505-65 = "#wait;3400"
2000505-66 = "#clearST"
2000505-67 = "#st;[-1200,-530];serial;60;[wa:100]― 원래[wa:500] 모두가[wa:500] 함께 사용하는 물건이고"
2000505-68 = "#wait;1250"
2000505-69 = "#st;[-1200,-630];serial;60;― 깨끗이[wa:400] 제자리에[wa:450] 돌려놔야 할 텐데."
2000505-70 = "#wait;6000"
2000505-71 = "#clearST"
2000505-72 = "#st;[-1200,-530];serial;60;[wa:500]― 아,[wa:700] 선생님."
2000505-73 = "#wait;850"
2000505-74 = "#st;[-1200,-630];serial;60;― 너무 가까이 계시면[wa:1400] 물줄기에 젖을지도 몰라요?"
2000505-75 = "#wait;7750"
2000505-76 = "#clearST"
2000505-77 = "#st;[-1200,-530];serial;60;― 수영복을 입고 있으니[wa:800] 젖어도[wa:750] 상관 없다고[wa:1250]요?"
2000505-78 = "#wait;6000"
2000505-79 = "#clearST"
2000505-80 = "#st;[-1200,-530];serial;60;― 확실히 그렇네요.[wa:2150] 아,[wa:850] 그럼[wa:400] 모처럼이기도 하니"
2000505-81 = "#wait;1000"
2000505-82 = "#st;[-1200,-630];serial;60;― 다음번엔[wa:500] 같이[wa:300] 수영하러 가요!"
2000505-83 = "#wait;6000"
2000505-84 = "#all;hide\n#clearST"
2000505-85 = "3;히후미 수영복ND;08;다행히 크루세이더 쨩에 녹이 슬기 전에 청소를 끝낼 수 있었지만…….\n#3;a\n#3;em;…"
2000505-86 = "3;히후미 수영복ND;04;그 사이에 해가 져버려서 결국 일광욕은 하지 못했네요."
2000505-87 = "3;히후미 수영복ND;99;모처럼 좋은 날씨였는데, 아쉬워요."
2000505-88 = "[s] \"그래도 히후미와 함께 하루를 보내서 즐거웠어.\""
2000505-89 = "3;히후미 수영복ND;02;하루 종일 청소만 했는데…… 정말 그래도 괜찮으셨나요?"
2000505-90 = "3;히후미 수영복ND;04;물론 저도 청소를 핑계로 선생님께 잔뜩 물장난을 친 것 같아서 즐겁긴 했지만…….\n#3;em;[///]\n#3;stiff"
2000505-91 = "3;히후미 수영복ND;00;후후, 다음에 날씨가 좋아지면 또 일광욕을 하러 나와요."
2000505-92 = "3;히후미 수영복ND;03;그때는 제대로 된 해수욕 장비를 들고 올게요!\n#3;greeting\n#3;em;[반짝]"
2000505-93 = "#all;hide"
2000505-94 = "#na;(이후, 히후미와 함께 전차를 타고 숙소로 돌아왔다.)"

[translation]
2000505-1 = "ทำความสะอาดอุปกรณ์และเก็บเข้าที่หลังใช้งาน"
2000505-2 = "ชายหาดมูอิกาฮามะ"
2000505-3 = "(ระหว่างที่คุณครูกำลังรอฮิฟุมิอยู่ที่ชายหาด...)"
2000505-7 = "คุณครูคะ~"
2000505-9 = "ฉันไปยืมรถถังมาตามที่บอกคุณครูไว้แล้วละค่ะ!"
2000505-10 = "เรารีบไปที่ชายหาดแล้วอาบแดดกันเถอะค่ะ!"
2000505-11 = "[s] \"จะอาบแดดกับรถถังยังไงน่ะ...?\""
2000505-12 = "คะ? ถามอะไรแปลกๆ? จะอาบแดดทั้งทีเราก็ต้องมีรถถังด้วยสิคะ!"
2000505-13 = "จริงสิ... จะว่าไปฉันยังไม่เคยเล่าเกี่ยวกับ <ครูเซเดอร์จัง> ให้คุณครูฟังเลย"
2000505-14 = "งั้นฉันจะใช้โอกาสนี้ในการแนะนำแต่ละฟังก์ชันของ <ครูเซเดอร์จัง> ให้แล้วกันค่ะ!"
2000505-15 = "อย่างแรกคือการป้องกันรังสี UV! <ครูเซเดอร์จัง> ไม่มีหลังคาทรงโดมก็จริง แต่ก็มีที่ตั้งร่มกันแดด#nขนาดใหญ่ที่ตัวรถเพื่อป้องกันรังสีที่ส่องตรงมาจากดวงอาทิตย์ค่ะ"
2000505-16 = "เพราะเราต้องดูแลผิวพรรณอยู่ตลอดแม้จะอยู่บนป้อมปืนยังไงล่ะคะ"
2000505-17 = "และถ้าเราเอาร่มขนาดใหญ่มากางตรงนี้ ก็จะใช้แทนร่มชายหาดได้เลยค่ะ!"
2000505-18 = "ต่อไปก็คือการกันน้ำ! <ครูเซเดอร์จัง> มาพร้อมกับพรมรถถังที่จะช่วยให้สามารถขับขี่รถถัง#nบนถนนเปียกๆ หรือตามชายหาดได้ค่ะ"
2000505-19 = "เพราะว่าเราจะปล่อยให้สายพานที่ล้อเสียหายจากทรายและโคลนไม่ได้"
2000505-20 = "ถึงวัสดุจะค่อนข้างหยาบ แต่เราก็ใช้เสื่อนี้แทนเสื่อชายหาดได้ค่ะ!"
2000505-21 = "และสุดท้ายคือการป้องกันการขาดน้ำ! <ครูเซเดอร์จัง> มีเครื่องทำน้ำอุ่นและน้ำเย็นเพื่อให้สามารถ#nชงชาดื่มได้อย่างสะดวกด้วยล่ะค่ะ"
2000505-22 = "เพราะว่าเราต้องดื่มด่ำไปกับเวลาน้ำชาที่มีค่าได้ในทุกสภาพแวดล้อมยังไงล่ะคะ"
2000505-23 = "<ครูเซเดอร์จัง> ทำได้ทั้งชาแดงร้อนๆ และชาเย็นที่สดชื่นเลยค่าา!"
2000505-24 = "[s1] \"มันเหมือนอุปกรณ์ท่องเที่ยวของสาวๆ มากกว่ารถถังอีกนะ\"\n[s2] \"สุดยอดเลย นี่มันรถถังมหัศจรรย์!\""
2000505-25 = "อะฮ่ะฮ่า จริงๆ แล้วมันก็คืออุปกรณ์ของสถาบันทรีนิตี้นี่แหละค่ะ"
2000505-26 = "คุณครูก็คิดเหมือนกันใช่มั้ยคะ? ฉันก็คิดว่าครูเซเดอร์จังคือรถถังมหัศจรรย์สุดเท่เหมือนกันค่ะ ฮิฮิ..."
2000505-27 = "เอาล่ะ งั้นเราขับไปที่หาดทรายเพื่อเตรียมอาบแดดอย่างจริงจังกันเลยค่ะ!"
2000505-31 = "อืม... จอดรถถังตรงนี้ได้มั้ยนะ?"
2000505-32 = "ตรงนี้มีแสงแดดส่องถึงและลมก็พัดผ่านด้วย น่าจะเย็นสบายดีนะคะ"
2000505-33 = "ไม่สิ... เข้าไปจอดใกล้ๆ ทะเลกว่านี้อีกหน่อยดีกว่า ตรงนี้ไม่ค่อยเห็นทะเลสวยๆ สักเท่าไรเลยค่ะ"
2000505-34 = "ใกล้กว่านี้... ใกล้อีก..."
2000505-36 = "เอะ.. เอ๋? ทำไมรู้สึกว่าคลื่นมันแรงกว่าเดิมมากเลย..."
2000505-43 = "[ns] \"เป็นอะไรหรือเปล่าน่ะ?\""
2000505-44 = "มะ... ไม่เป็นไรค่ะ แค่ไม่คิดว่าจู่ๆ คลื่นจะแรงขนาดนี้น่ะค่ะ..."
2000505-45 = "โชคดีนะคะที่ใส่ชุดว่ายน้ำมาแล้ว เพราะถึงชุดว่ายน้ำจะเปียกก็ไม่เป็นสนิมหรือเสียหาย"
2000505-46 = "เหมือนกับปืนหรือชิ้นส่วนรถถังเลย..."
2000505-47 = "อ๊าา... นะ... น้ำทะเลเข้ารถถัง?!"
2000505-48 = "[s] \"มีปัญหาอะไรเหรอ?\""
2000505-49 = "ครูเซเดอร์จังโดนคลื่นซัดจนเปียกหมดแล้วค่ะ!"
2000505-50 = "ครูเซเดอร์จังไม่มีฟังก์ชันป้องกันเกลือ ถ้าโดนน้ำทะเลเข้าล่ะก็เป็นสนิมได้ง่ายๆ เลย...#nฉันจะให้ของที่ยืมมาเป็นสนิมไม่ได้ค่ะ!"
2000505-51 = "อะ... เอายังไงดี... เราต้องรีบทำความสะอาดรถถังก่อนจะขึ้นสนิมด้วย..."
2000505-52 = "[s] \"ทางโน้นมีอ่างล้างหน้าอยู่\""
2000505-55 = "จริงด้วย งั้นเราไปล้างเกลือออกจากครูเซเดอร์จังตรงโน้นก่อนดีกว่าค่ะ"
2000505-56 = "[s] \"แล้วเรื่องอาบแดดล่ะ?\""
2000505-57 = "ตอนนี้การทำความสะอาดครูเซเดอร์จังต้องมาก่อนเรื่องอาบแดดสิคะ!"
2000505-61 = "― เช็ดๆ~ ถูๆ~ ให้สะอาดทุกซอกทุกมุม~[wa:2630] "
2000505-64 = "― ฉันจะปล่อยให้ครูเซเดอร์จังขึ้นสนิมไม่ได้หรอกค่ะ[wa:80] "
2000505-67 = "― นี่เป็นของที่ทุกคน... ใช้ร่วมกันนี่คะ[wa:380] "
2000505-69 = "― เพราะงั้นก็ควรจะทำความสะอาดก่อนจะเอาไปคืนค่ะ[wa:10] "
2000505-72 = "― อ๊ะ คุณครู...[wa:960] "
2000505-74 = "― ถ้ามายืนใกล้แบบนี้ เดี๋ยวจะโดนน้ำจนตัวเปียกนะคะ[wa:520] "
2000505-77 = "― ใส่ชุดว่ายน้ำอยู่แล้ว ถึงเปียกก็ไม่เป็นไรเหรอคะ?[wa:1840] "
2000505-80 = "― ก็จริงนะคะ อา...[wa:3760] "
2000505-82 = "― งั้นคราวหน้า พวกเรา... ไปว่ายน้ำด้วยกันนะคะ![wa:10] "
2000505-85 = "ถือว่าเราโชคดีที่ทำความสะอาดครูเซเดอร์จังได้ก่อนที่จะขึ้นสนิมนะคะ แต่ว่า..."
2000505-86 = "แต่เราก็ใช้เวลาจนพระอาทิตย์ตกดิน ก็เลยไม่ได้อาบแดดเลยค่ะ"
2000505-87 = "อากาศอุตส่าห์ดีแท้ๆ เชียว น่าเสียดายจังเลยค่ะ"
2000505-88 = "[s] \"แต่ได้อยู่กับฮิฟุมิทั้งวันแบบนี้ครูก็สนุกนะ\""
2000505-89 = "แต่เราเอาแต่ทำความสะอาดเกือบทั้งวันเลย... คุณครูไม่เป็นไรจริงๆ เหรอคะ?"
2000505-90 = "ถึงฉันจะอ้างว่าทำความสะอาดอยู่ แต่ก็แกล้งเอาน้ำสาดคุณครูบ้างก็เถอะ..."
2000505-91 = "ฮิฮิ ไว้คราวหน้าถ้าอากาศดีๆ เราค่อยมาอาบแดดกันนะคะ"
2000505-92 = "ครั้งหน้าฉันจะเอาอุปกรณ์ชายหาดที่เหมาะๆ มาเองค่ะ!"
2000505-94 = "(หลังจากนั้นคุณครูก็นั่งรถถังกลับหอพักพร้อมกับฮิฟุมิ)"

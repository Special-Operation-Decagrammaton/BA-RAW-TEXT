[translation]
2000505-1 = "Return Where You Found It"
2000505-2 = "Muigahama Beach"
2000505-3 = "I'm waiting for Hifumi on the beach."
2000505-7 = "Sensei!"
2000505-9 = "I brought the rental tank just like I promised!"
2000505-10 = "Now we can ride it and go sunbathing together!"
2000505-11 = "[s] \"Why do we need a tank to sunbathe?\""
2000505-12 = "What kind of question is that? Everyone knows you need a tank to sunbathe!"
2000505-13 = "Come to think of it, I guess I've never given you a proper tour of Crusadie."
2000505-14 = "In that case, this is the perfect opportunity to introduce you to each of Crusadie's features!"
2000505-15 = "He lacks a cupola, but there's a parasol mount inside to protect the commander from all those dangerous UV rays."
2000505-16 = "Taking care of your skin even when you're on the turret is of the utmost importance."
2000505-17 = "You can even install a large beach parasol if you want!"
2000505-18 = "And naturally, any good tank needs measures against water in order to be beach-ready. Crusadie comes with a tank mat that makes it easy to drive on wet roads and beaches."
2000505-19 = "The last thing we want is for the tracks to be damaged by mud or sand."
2000505-20 = "The material is a little coarse, but the mat can also double as a beach mat for swimming!"
2000505-21 = "And last but not least: measures against dehydration. Crusadie is equipped with a faucet that gives cold and hot water for making tea."
2000505-22 = "Tea time is important no matter what environment you're in after all."
2000505-23 = "Crusadie can handle your beverage needs whether you want hot tea or iced tea!"
2000505-24 = "[s1] \"Seems better equipped for a girls' outing than war.\"\n[s2] \"Amazing! I'm at a loss for words!\""
2000505-25 = "Well, it is Trinity General School property."
2000505-26 = "Right? Crusadie is the coolest tank around."
2000505-27 = "So are you ready to do some sunbathing?"
2000505-31 = "Hmm. I wonder if we can park over here."
2000505-32 = "It's nice and sunny, but there's still a cool breeze. It should be perfect."
2000505-33 = "Actually, maybe we should park a little closer. We can't see the water very well from here."
2000505-34 = "Closer... Just a little bit closer..."
2000505-36 = "H-Huh? The waves are stronger than they were before."
2000505-43 = "[ns] \"Are you okay?!\""
2000505-44 = "I-I'm fine. I just wasn't expecting to get splashed all of a sudden."
2000505-45 = "I'm glad I'm wearing my swimsuit. Swimsuits won't rust or break, even if they get wet..."
2000505-46 = "...unlike weapons or tank parts."
2000505-47 = "Argh... S-Seawater got in the tank!"
2000505-48 = "[s] \"What was that?\""
2000505-49 = "Crusadie's insides got drenched in seawater from the waves!"
2000505-50 = "Crusadie doesn't have any protection against SALTwater! It's going to rust for sure, and I can't let that happen to rental equipment!"
2000505-51 = "Wh-What should I do? I have to clean it before it starts to rust..."
2000505-52 = "[s] \"There's a washroom over there.\""
2000505-55 = "Good thinking. Let's wash the salt off the tank there."
2000505-56 = "[s] \"What about sunbathing?\""
2000505-57 = "Cleaning Crusadie is our top priority!"
2000505-61 = "― Let's clean! ♪ Every nook and cranny! ♪[wa:2390] "
2000505-64 = "― I can't let Crusadie get rusty.[wa:720] "
2000505-67 = "― We're all supposed to share it,[wa:620] "
2000505-69 = "― so it needs to be returned in good condition.[wa:10] "
2000505-72 = "― Careful, Sensei.[wa:840] "
2000505-74 = "― If you stay there, you might get hit by a stream of water.[wa:80] "
2000505-77 = "― You don't mind because you're wearing a swimsuit?[wa:1800] "
2000505-80 = "― Well, that's true. Speaking of which, let's go swimming...[wa:2080] "
2000505-82 = "― together next time![wa:680] "
2000505-85 = "I'm glad we were able to give Crusadie a bath before he got rusty..."
2000505-86 = "...but the sun went down in the meantime, so now we can't sunbathe."
2000505-87 = "The weather was so nice today too. What a shame."
2000505-88 = "[s] \"I still had fun spending the day with you, Hifumi.\""
2000505-89 = "Are you sure? But all we did today was clean."
2000505-90 = "I did use cleaning as an excuse to spray water on you, which was kind of fun..."
2000505-91 = "What do you say we come back and sunbathe the next time the weather is nice?"
2000505-92 = "I'll bring everything we need!"
2000505-94 = "Hifumi and I then climbed back into the tank and returned to the campus."

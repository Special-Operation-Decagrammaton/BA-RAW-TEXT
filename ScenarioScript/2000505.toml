[translation]
2000505-1 = "備品使用後，要清潔乾淨歸還原位"
2000505-2 = "無為濱"
2000505-3 = "（在沙灘等待日步美時，聽到戰車的聲音慢慢靠近）"
2000505-7 = "老師～！"
2000505-9 = "讓你久等了！"
2000505-10 = "那麼，我們快點去享受日光浴吧！"
2000505-11 = "[s] 「話說開戰車要怎麼享受日光浴……？」"
2000505-12 = "為何這麼問呢？#n要做日光浴當然就需要戰車不是嗎？"
2000505-13 = "對了，這麼說來我好像還沒跟老師介紹過我們的「十字軍醬」。"
2000505-14 = "那就趁這個機會，跟老師一一介紹「十字軍醬」的特徵吧。"
2000505-15 = "首先是紫外線防護！#n「十字軍醬」沒有指揮塔，但有保護車長不受太陽直射的陽傘支架。"
2000505-16 = "就算是搭乘戰車，也依然要好好呵護肌膚。"
2000505-17 = "有了這個，沒有沙灘傘也不成問題！"
2000505-18 = "再來是防水！#n「十字軍醬」裝載著能讓戰車在海岸等地形順暢移動的專用防護墊。"
2000505-19 = "畢竟要是因為沙土，讓履帶受損無法順暢前進就傷腦筋了。"
2000505-20 = "材質雖然有點粗糙，但完全能夠當作沙灘墊使用！"
2000505-21 = "最後是預防脫水！#n「十字軍醬」設置有可以隨時泡茶煮水的裝置。"
2000505-22 = "就算遇上險境也要臨危不亂……無論何種情況，都不能少了寶貴的下午茶時間！"
2000505-23 = "不管是熱紅茶或是清涼冰茶，只要有「十字軍醬」就能馬上製作！"
2000505-24 = "[s1] 「怎麼感覺比較像千金出遊時的必備行頭……」\n[s2] 「……真棒！帥呆了！」"
2000505-25 = "哈哈哈……畢竟它實際上是三一學園的設備嘛……"
2000505-26 = "對，對吧！我也很喜歡十字軍醬，覺得是台很棒的戰車……！"
2000505-27 = "好了，那我們再靠沙灘近一點吧？"
2000505-31 = "我看看，這附近應該就可以了吧……？"
2000505-32 = "這個地方曬得到陽光，風也很舒爽……"
2000505-33 = "啊，不過看不太到海呢……要不要再靠近一點呢？"
2000505-34 = "那就，再往海邊移動一點……"
2000505-36 = "怎，怎麼……海浪好像，比剛才更大了……"
2000505-43 = "[ns] 「你沒事吧？」"
2000505-44 = "我，我沒事……沒想到會突然出現這麼大的浪……"
2000505-45 = "幸虧有事先穿上泳裝。想不到離這麼遠也會全身濕透……"
2000505-46 = "濕透……"
2000505-47 = "……呃啊啊！？十字軍醬也被潑濕了！？"
2000505-48 = "[s]「很不妙嗎？」"
2000505-49 = "淡，淡水的話倒還沒有問題……！"
2000505-50 = "但十字軍醬沒有為了海水做相關處置……碰到鹽水就會馬上生鏽……！"
2000505-51 = "得趁生鏽前快點把海水洗掉……！"
2000505-52 = "[s] 「我們到那邊借水用吧。」"
2000505-55 = "好的，快點過去吧……！"
2000505-56 = "[s] 「只不過要晚點才能曬日光浴了。」"
2000505-57 = "是！十字軍醬現在更重要……！"
2000505-61 = "― 哼哼～♪每個角落都變乾淨吧～♪[wa:3350] "
2000505-64 = "― 可不能讓十字軍醬生鏽呢！[wa:1480] "
2000505-67 = "― 畢竟這是大家一起使用的東西，[wa:1300] "
2000505-69 = "― 必須乾乾淨淨的送回學校才行。[wa:1050] "
2000505-72 = "― 啊，老師。[wa:1280] "
2000505-74 = "― 太靠近的話，可能會被水淋濕喔！[wa:1800] "
2000505-77 = "― 你說因為穿著泳裝所以濕了也沒關係嗎？[wa:3040] "
2000505-80 = "― 確實如此呢。啊，那麼機會難得，[wa:3800] "
2000505-82 = "― 待會兒一起去游泳吧！[wa:1040] "
2000505-85 = "總算在生鏽之前清理乾淨了。"
2000505-86 = "但不知不覺太陽都下山了……"
2000505-87 = "難得的好天氣，真可惜。老師對不起，難得你陪我來……"
2000505-88 = "[s] 「不會喔。能和日步美相處一整天，我很開心。」"
2000505-89 = "哈哈，明明一整天幾乎都在洗車中度過……但謝謝老師這麼說。"
2000505-90 = "我也是，雖然是洗車，但也很高興能和老師一起玩水。"
2000505-91 = "呵呵。不如預期，卻也不錯呢。"
2000505-92 = "等下次天氣好的時候，我們再來做日光浴吧。"
2000505-94 = "（之後，和日步美一起搭乘戰車回到了宿舍）"

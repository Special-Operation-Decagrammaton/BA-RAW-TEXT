[translation]
2001-1 = "ชีวิตประจำวันของเด็กโรงเรียนหญิงล้วน"
2001-2 = "....."
2001-3 = "ฮ่า..."
2001-4 = ".....\n"
2001-5 = "......"
2001-6 = "อือ..."
2001-7 = "อื้อออออ~~!"
2001-8 = "นี่ๆ โยชิมิจัง ไม่ต้องกังวลขนาดนั้นหรอก นัตสึจังน่ะ เดี๋ยวพอถึงเวลาก็อาจจะมาเองนั่นแหละ... มั้ง?"
2001-9 = "ยังเหลือเวลาอีกตั้ง 30 นาทีแน่ะ..."
2001-10 = "แล้วก็เลิกตัวสั่นหงึกๆ ได้แล้ว เห็นโต๊ะสั่นแบบนี้นึกว่าเกิดแผ่นดินไหวน่ะ"
2001-11 = "....กรี๊ดดดดดดด! แย่ล่ะ!!"
2001-12 = "%@#$^%$&#%!!"
2001-13 = "ยะ...โยชิมิจัง...!? ใจเย็นๆ ก่อน...!"
2001-14 = "อ่า...ตก-ใจ-หมด-เลย"
2001-15 = "สีหน้าเธอไม่เหมือนคนกำลังตกใจเลยสักนิด!? ถ้าคิดจะเล่นละครล่ะก็เอาให้เนียนกว่านี้หน่อยสิ!"
2001-16 = "หมายถึง...! พวกเธอไม่คิดอะไรเลยรึไง? สถานการณ์ตอนนี้มันโอเคงั้นเหรอ!?"
2001-17 = "ไม่เห็นคนต่อแถวรอกันรึไง!? คนต่อแถวรอยาวไปเป็นสิบกิโลเมตรแล้วมั้ง!"
2001-18 = "ขนมเมอแรงก์ถั่วของคาเฟ่นี้น่ะมีจำนวนจำกัดนะ ฉันบอกแล้วไม่ใช่รึไง! จำกัดแค่ 200 ชิ้นต่อวันเอง!"
2001-19 = "ถ้าเป็นแบบนี้วันนี้คงไม่ได้กินแน่! แค่คนที่ต่อแถวอยู่ก็น่าจะประมาณสัก 200 คนแล้วล่ะมั้ง!!"
2001-20 = "ถึงจะอย่างนั้นก็เถอะ เราจะไปต่อคิวซื้อแค่พวกเราก็ยังไงอยู่นะ มันซื้อได้แค่คนละหนึ่งชิ้นเท่านั้นนี่"
2001-21 = "เรื่องที่ช่วยไม่ได้มันก็ต้องทำใจอ่ะนะ"
2001-22 = "ก็ เพราะ แบบ นั้น ไง เล่า! ถ้ามาเร็วกว่านี้มันก็ดีต่อทุกคนแล้วนี่!? ไม่ใช่รึไง!?"
2001-23 = "ฉันแชทไปบอกตั้งกี่รอบแล้วว่าร้านเปิดบ่ายสองโมงน่ะ...!"
2001-24 = "นี่มันเพิ่งจะบ่ายโมงครึ่งเองนะ ยังเหลือเวลาอีกตั้ง 30 นาที ฉันพูดมาสองรอบแล้วนะ"
2001-25 = "เฮ้อ! จริงๆ เลยเชียว! เพราะงั้นให้มารอคิวแบบนี้...!!"
2001-26 = "...อุ๊บส์!"
2001-27 = ".....?"
2001-28 = ".....\n\n"
2001-29 = "ง่ำๆ..."
2001-30 = "นี่ นี่! โยชิมิจัง ใจเย็นๆ ก่อน~ กินของหวานๆ แล้วจะหายโกรธน้า~"
2001-31 = "นัตสึจังเองก็คงมีเหตุผลอยู่แน่ๆ~ พวกเราก็ไม่รู้มาก่อนว่าจะมีคนมากันเยอะขนาดนี้นี่นา?"
2001-32 = "แล้วก็... อาจจะมีบางวันที่ไม่รับสายอยู่บ้างก็ได้นะ? บางครั้ง..."
2001-33 = "แค่ได้มานั่งคุยด้วยกันแบบนี้ ฉันก็คิดว่าสนุกแล้วล่ะ ว่าไหม?"
2001-34 = "ง่ำๆ.... อร่อยจังเลย"
2001-35 = "แหะๆ... ดีใจจังที่เธอชอบ..."
2001-36 = "ใช่แล้ว! แต่ว่านะ ต้องมีวันของเราบ้างสิ! สุดยอดจริงๆ เลย ละลายในปากเลยล่ะ~!"
2001-37 = ".....\n"
2001-38 = "อ่า... ง่ายจริงๆ"
2001-39 = "อื้อ~ เงียบหน่อยสิ!"
2001-40 = "..... (ฮึ่มมมม)"
2001-41 = "อย่าเรียกฉันแบบนั้นได้ไหม...."
2001-42 = "อย่าเรียกฉันแบบนั้น~"
2001-43 = "อย่าเลียนแบบฉันจะดีกว่านะ"
2001-44 = "อย่าเลียนแบบฉันจะดีกว่านะ~"
2001-46 = "ยะ...หยุดทะเลาะกันเถอะ..."
2001-47 = "คาซึสะจังลองกินนี่ดูไหม เอ้า ลองหน่อยสิ"

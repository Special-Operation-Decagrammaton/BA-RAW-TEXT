2001-55 = "กระสุนปืน... ขนมเมอแรงก์ถั่ว..."
2001-56 = "ปังๆๆ! ปังๆๆๆๆๆ!!"
2001-57 = "โอ๊ย! ทำอะไรของเธอ! ไม่เห็นรึไงว่าคนอื่นก็ยืนต่อแถวกันอยู่น่ะ!? คิดจะแซงคิวงั้นเหรอ!?"
2001-58 = "เอ๋? พูดอะไรน่ะ! แซงคิวอะไรกัน? คิดจะหาเรื่องรึไง? เธอต่างหากที่แทรกเข้ามาในแถวน่ะ!!"
2001-59 = "....เอ๋ อะไรกันเนี่ย ทะเลาะกันตอนต่อแถวอีกแล้วเหรอ อะไรกันนักนะ"
2001-60 = "อ่า... อ่า~ ขนมที่กินอยู่มันหกหมดแล้วนี่นา ที่นี่มันจะมีเรื่องแบบนี้บ้างเป็นครั้งคราวน่ะ"
2001-61 = "เฮอะ ช่างเถอะ! ไม่ต้องสนใจหรอก! ไม่ต้องสนใจ!"
2001-62 = "ยังไงวันนี้เราก็คงไม่ได้อยู่ดี ไปกินข้าวกล่องที่ไอริซื้อมาดีกว่า..."
2001-63 = "......?\n"
2001-64 = "......?"
2001-65 = ".....? อะไร? มองฉันทำไมน่ะ?"
2001-66 = "พรืด..."
2001-67 = "...พรืดดด!"
2001-68 = "ฮ่าฮ่าฮ่าฮ่าฮ่า!! นี่ เธอ!! ที่หน้ามีครีมเมอแรงก์ติดอยู่แน่ะ! ฮ่าฮ่าฮ่าฮ่าฮ่า!!!"
2001-69 = "ฮะๆ... ฮะฮะฮ่ะ...! ถ้าคนอื่นเห็นคงคิดว่าฉันทาตัวเพื่อพรางตัวแน่ๆ เลย! แบบนี้เหรอศิลปะ!?"
2001-70 = "ฮึฮึฮึ... อุ๊บส์... ฮ่าฮ่าฮ่าฮ่าฮ่า!!"
2001-71 = "....? เดี๋ยวนะ ขอฉันดูกระจก..."
2001-72 = ".....!"
2001-73 = "คะ...คาซึสะจัง! ไม่เห็นเป็นอะไรเลย ไม่ได้ดูแปลกเลยสักนิดเดียว...!"
2001-74 = "มะ...ไม่แปลกหรอก... พรืดดดด ขะ...ขอโทษนะ คาซึสะจัง..."
2001-75 = "มะ...ไม่ใช่นะ คือว่าฉัน... คือฉันแค่... ฮึ่ก...!"
2001-76 = "นี่ ทำไมต้องโกหกกันด้วย บอกความจริงมาก็ได้นี่นา ก็เห็นๆ กันอยู่!"
2001-77 = "เธอได้เป็นบุคคลพิเศษแล้วล่ะน๊า!! ยินดีด้วย!!"
2001-80 = "......"
2001-81 = ".....นี่...."
2001-82 = "นี่มันนนนน!!!"
2001-85 = "เธอถือปืนวิ่งไปโน่นแล้ว! ดูเธอวิ่งไปต่อแถวขนมเมอแรงก์ถั่วสิ!  คงเกิดเรื่องอีกแน่ๆ เลย!"
2001-86 = "เธอทาครีมลายพรางแล้วเข้ามาโจมตีฉันเองนี่ เป็นหัวหน้าหน่วยจู่โจมหรือไง!! ฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!!!"
2001-87 = "ยะ...โยชิมิจัง... พูดแบบนั้น มะ...ไม่ได้นะ... ฮือออ!"
2001-88 = "อะฮึ่ก...!"
2001-93 = "ปังๆๆๆๆ! ว้ากกกก! ตึงๆๆ!! ปังๆๆๆ!"
2001-95 = "(เนื่องจากเป็นเรื่องที่เกิดขึ้นเป็นประจำ ทุกคนจึงแยกย้ายกันกลับห้องไปเหมือนไม่มีอะไรเกิดขึ้น)"
2001-96 = "(หลังจากได้รู้ความจริงทีหลังว่า ที่จริงแล้วนัตสึเป็นพวกชอบนอนดึกเป็นปกติ)"
2001-97 = "ชีวิตประจำวันของเด็กโรงเรียนหญิงล้วน"

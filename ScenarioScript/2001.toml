[translation]
2001-1 = "女高中生的日常"
2001-2 = "……"
2001-3 = "……唉……"
2001-4 = "……"
2001-5 = "……"
2001-6 = "呃呃……"
2001-7 = "呃呃呃呃……！"
2001-8 = "那個，喜美醬。別生悶氣嘛……夏醬她時間到了應該就會出現了……"
2001-9 = "而且距離約定的時間還有30分鐘……"
2001-10 = "然後不要再抖腳了。抖到我還以為是地震呢。"
2001-11 = "……啊啊啊啊！！"
2001-12 = "該死啊啊啊啊啊啊啊啊啊啊啊啊！！！！"
2001-13 = "喜美醬？！冷、冷靜一點……！"
2001-14 = "嚇屎我惹"
2001-15 = "你那哪是被嚇到的表情啊！想裝作被嚇到表情也要像一點！"
2001-16 = "而且現在這情況叫人怎麼冷靜的下來！"
2001-17 = "你們沒看到隊伍已經排了幾十公尺了嗎！"
2001-18 = "這家的達克瓦茲蛋糕每天只限200個耶！"
2001-19 = "再拖下去我們要吃不到了啦！而且搞不好現在排的人就超過200人了！！"
2001-20 = "但也不能就我們幾個去排呀，一個人限買一個不是嗎？"
2001-21 = "沒辦法的事情就是沒辦法。"
2001-22 = "所、以、說！大家早一點來的話不就好了嗎！"
2001-23 = "我不是講過好幾次人家下午兩點開門嗎！"
2001-24 = "所以我們才會約好一點半集合呀，還有30分鐘才開店。話說這話題剛剛也有過一次吧？"
2001-25 = "我的意思是，開店30分鐘前就排這麼長了！！"
2001-26 = "呃……！"
2001-27 = "……？"
2001-28 = "……"
2001-29 = "……嚼嚼嚼……"
2001-30 = "好了好了，吃點甜食消消氣吧～"
2001-31 = "夏醬一定是突然有急事啦～。我們也沒想到會有這麼多人……"
2001-32 = "而且雖然想吃是想吃……但有時候事情無法如願很正常嘛～"
2001-33 = "光是大家像這樣聚在一起聊天，我就覺得非常開心了。"
2001-34 = "……嚼嚼……這東西真好吃。"
2001-35 = "啊、啊哈哈……你喜歡就好。"
2001-36 = "說的也是，今天只是比較不走運而已！話說回來這真的好好吃喔！直接在嘴裡化掉了呢。"
2001-37 = "……呼。"
2001-38 = "……真是單純。"
2001-39 = "幹嘛？你也想吃啊？想吃就直說啊，千紗也是個愛撒嬌的小北鼻嘛～"
2001-40 = "……（怒）"
2001-41 = "你可不可以不要用那種口氣？"
2001-42 = "你可不可以不要用那種口氣？"
2001-43 = "不要學我好嗎。"
2001-44 = "不要學我好嗎。"
2001-46 = "好、好了啦，不要吵架啦。"
2001-47 = "千、千紗醬也來吃吃看吧……來，啊～……"
2001-48 = "……"
2001-49 = "……啊……啊──……"
2001-51 = "（……碰──！！噠噠噠噠噠噠！！）"
2001-52 = "……？"
2001-53 = "……？"
2001-54 = "……？"
2001-55 = "……子彈……剛好打到泡芙上……"
2001-56 = "（噠噠噠噠噠噠！噠噠噠噠噠噠！）"
2001-57 = "幹嘛啦！沒看到我們在排隊嗎！？不要插隊好不好！？"
2001-58 = "你憑什麼生氣！？插隊的是你好不好！？"
2001-59 = "……原來只是在吵架啊。"
2001-60 = "啊～啊，泡芙都碎掉了。這附近子彈老是飛來飛去呢。"
2001-61 = "不用在意，不用在意！"
2001-62 = "反正排這麼長我們也買不到了，乾脆邊吃愛莉帶的……"
2001-63 = "……？"
2001-64 = "……？"
2001-65 = "……幹嘛？"
2001-66 = "……噗。"
2001-67 = "……噗呵！"
2001-68 = "啊哈、啊哈哈哈哈哈哈！！你的臉上，都是奶油！！啊哈、嘻──！！！"
2001-69 = "你那是要去化裝舞會喔！？天啊，根本藝術！"
2001-70 = "噗嘻嘻嘻嘻……！啊─啊哈哈哈哈！！"
2001-71 = "……？鏡子借我一下……"
2001-72 = "……！"
2001-73 = "千、千紗醬別放在心上！一點也不奇怪……！"
2001-74 = "一、一點也不……噗、哈哈、對不，千紗醬……呼呼！"
2001-75 = "不、不是，我只是……剛好喉嚨有點，嗯嗯、嗯噗、咕呼……！"
2001-76 = "你就直接笑出來嘛，她這臉超搞笑的！"
2001-77 = "這要刻意搞還搞不出來耶！藝術性也太高！！啊哈哈哈！！！"
2001-80 = "……"
2001-81 = "…………這"
2001-82 = "這些混蛋！！！"
2001-85 = "啊，她拿著槍衝向隊伍了。"
2001-86 = "根本就是畫上迷彩進攻的特種部隊嘛！噗哈哈哈哈哈哈！！"
2001-87 = "喜、喜美醬……不要再說了，你那樣講……噗呼！"
2001-88 = "呼、啊哈……！"
2001-93 = "（噠噠噠噠噠噠噠噠噠噠！！砰！啪啦！噠噠噠噠噠噠！！！）"
2001-95 = "（等這些日常狀況結束後，大家就像沒事一樣紛紛回去自己家了）"
2001-96 = "（而夏，似乎只是老樣子睡過頭了）"

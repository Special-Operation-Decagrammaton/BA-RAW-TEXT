42130-12 = "3;통신체리노;99;무언가 오해가 있었던 모양이군, 신임 총학생회장 대행.\n#3;a"
42130-13 = "3;통신체리노;01;이 몸은 단순한 학생회장이 아니라……"
42130-14 = "3;통신체리노;05;붉은겨울 학원의 학생회장이자, 미화부장이자, 서기장이자, 체육부장이자, 청소부장이자, 선도부장이자, 급식부장이자 이달의 최우수 푸딩 시식가로 선정된 체리노 님이시다!\n#3;closeup"
42130-15 = "3;통신체리노;05;그런 단순한 호칭으로 이 몸을 부르는 것은 용납할 수 없어!\n#3;em;[빠직]\n#3;stiff\n#3;closeup"
42130-16 = "3;카야;14;네. 붉은겨울 학원의 학생회장이시자, 그 외 이것저것 중책을 맡고 계신 체리노 님. 지금 중요한 것은 호칭의 문제가 아니라—"
42130-17 = "3;통신체리노;05;'그 외 이것저것'이라니……? 이 무슨 무례한 발언이란 말인가!\n#3;hophop"

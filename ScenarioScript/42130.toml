[translation]
42130-1 = "第13話;衝撃と恐怖"
42130-2 = "キヴォトス連邦生徒会会議室"
42130-5 = "……私が求める条件は、ただ一つ。"
42130-6 = "レッドウィンター連邦学園のデモ隊なのですから、事務局が責任を持って解散させること。"
42130-7 = "……分かりましたか、チェリノ会長？"
42130-12 = "何か誤解があるようだな、新連邦生徒会長代行。"
42130-13 = "おいらはただの生徒会長ではなく……"
42130-14 = "レッドウィンター連邦学園の生徒会長であり、環境美化部部長兼、書記長兼、運動部代表兼、清掃部部長兼、風紀委員長兼、給食部長兼、今月の最優秀プリン試食家として選ばれたチェリノ様だ！"
42130-15 = "「チェリノ会長」と省略して呼ぶんじゃない！"
42130-16 = "ええ。レッドウィンター連邦学園の生徒会長で、その他諸々重責を背負っていらっしゃるチェリノ様。いま大切なのは呼び名ではなく――"
42130-17 = "「その他諸々」……？#nなんと無礼な！"
42130-23 = "（どうして誰も気にしないような役職にこんなにも執着するのだろう……？）"
42130-29 = "……失礼いたしました、チェリノ書記長。"
42130-30 = "しかし、いま最も対応しなければならないのは、D.U.市内の各地でデモを主導し、連邦生徒会の行政を麻痺させているデモ隊です。"
42130-31 = "外部の治安機関が調査した結果、このデモ隊員のほとんどがレッドウィンター連邦学園出身の生徒であることが分かりました。"
42130-32 = "D.U.の治安を管理する防衛室長であり、連邦生徒会長代行として、#nレッドウィンター事務局に強く抗議します。"
42130-33 = "そういえば最近、工務部のやつらがやけに静かだと思ったら……#nそんなところでデモを起こしていたのか……"
42130-34 = "やつらは一体何が不満だと？"
42130-35 = "良い質問です、チェリノ会長。"
42130-36 = "彼女らは、プリンの支給や週休5日のような理解できない政策を要求するだけでなく……"
42130-37 = "……クーデターを起こそうとしているのです！"
42130-42 = "……それがどうしたんだ？"
42130-47 = "……通信が悪かったようですね。"
42130-48 = "クーデターです……反逆を起こそうと――#n彼女らは、連邦生徒会を転覆させようと目論んでいるのです！"
42130-49 = "キヴォトスの治安維持を担う連邦生徒会長代行として、このような事態を容認するわけには――"
42130-50 = "クーデター……それがいかに面倒なことかはよく知っているとも。#nこの私もよく経験していたものだ。"
42130-51 = "しかし、だ。防衛室長――クーデターを根本的に防ぐ方法など存在しない。"
42130-52 = "生徒会の政策が気に入らない、だからクーデターを起こす。#n当然のことではないのか？"
42130-53 = "はい？#nえっと、それはどういう……"
42130-54 = "もちろん、おいら達のような偉大な指導者の政策を素人の生徒が理解できるわけもない。"
42130-55 = "連邦生徒会長代行も何かと苦労が多いんだな……やつらが相手では色々と大変そうだ。"
42130-56 = "ですから、レッドウィンター事務局が責任を持ってデモ隊の解散を――"
42130-57 = "原則として学園外のことには関わらない主義だが、#n今回だけは連邦生徒会長代行に免じて――"
42130-62 = "我がレッドウィンター事務局からチェリョンカを一箱送るとしよう！"
42130-67 = "チェリョンカ……って何ですか？"
42130-68 = "むむ？防衛室長はチェリョンカを食べたことがないのか？"
42130-69 = "チェリョンカはレッドウィンター連邦学園で生産している、特製ミルクチョコレートだ！絶品だぞ！"
42130-70 = "食べてみて、気に入るようであれば――連邦生徒会にはチェリョンカの定期納品を検討してやろう。"
42130-71 = "ですから、いま必要なのはミルクチョコレートではなくデモの――"
42130-72 = "……おっと！もうこんな時間か？"
42130-73 = "楽しく話をしていたから、昼寝の時間を逃すところだった。"
42130-74 = "では、また今度話すとしようか……なんちゃら連邦生徒会長代行。"
42130-80 = "このガキ……"
42130-81 = "レッドウィンター連邦学園にはまともな生徒がいないのですか！"
42130-88 = "……え？ぼ、僕レッドウィンター学園出身じゃないんだけど？"
42130-90 = "……あなたの話ではありません。"
42130-91 = "調停室長。本当にあのチビがレッドウィンター連邦学園の代表で、生徒会長なのですか？"
42130-93 = "はい、現在のレッドウィンター連邦学園の生徒会長は彼女――[ruby=れんかわ]連河[/ruby]チェリノさんです。"
42130-94 = "現在の……？"
42130-95 = "その……一週間前は[ruby=いけくら]池倉[/ruby]マリナ委員長がレッドウィンター連邦学園の生徒会長でした。"
42130-99 = "つまり、今の私たちは…… "
42130-100 = "一週間おきに代表が入れ替わるような学園と交渉し、治安問題を解決しなければならないということですか？"
42130-102 = "そういう事。#nでも、前任のリン先輩は文句一つ言わずにやってたよ～"
42130-103 = "アメとムチをうま～く使い分ければ、トリニティやゲヘナの生徒会長より話しやすいと思うけど……"
42130-104 = "ま、ムチしか知らない防衛室出身の誰かさんには、#nちょ～っと難しいかもね。（パリッ）"
42130-111 = "あ、あの……カヤ室長……"
42130-112 = "……連邦生徒会長代行。"
42130-113 = "す、すみません……連邦生徒会長代行！"
42130-114 = "防衛室の定期報告なのですが……口座から現金を下ろすたびに、10種類あまりの書類提出を義務付けた新しい行政命令に対し、市民が大きく不満を示しておりまして……"
42130-115 = "D.U.各地で銀行員に対して書類の代わりに銃を突きつけて預金を強制的に引き出すといった事例が相次いでいるそうです。"
42130-116 = "それは……単なる強盗じゃないですか！"
42130-117 = "D.U.各地で銀行強盗が相次いでいるというのに、ヴァルキューレ警備局とカイザーセキュリティは一体何をしているのですか？"
42130-118 = "以前も申し上げましたが、警備局とカイザーセキュリティは検問で手一杯でして……"
42130-119 = "人手が足りないのであれば、民間警備会社でも何でもいいから、もっと雇って治安を安定させてください。"
42130-120 = "私が管理するキヴォトスで、犯罪は一件たりとも容認しませんよ！"
42130-126 = "いや、前より混沌としているように見えるけど……"
42130-127 = "ここに来るのだって、デモのせいで普段より30分以上かかっちゃったし……"
42130-128 = "犯罪率は減ったけど、重犯罪が増えたよね……"
42130-129 = "ぶっちゃけ、罪のない市民を選別した結果じゃん？"
42130-130 = "人材資源室長がいなくなった後は、カヤ室長を支持する役員もかなり減ったらしいし……"
42130-131 = "このまま代行をやってて大丈夫なの？"
42130-132 = "もしかしたら、リン行政官の方が有能だったんじゃ……"
42130-137 = "……解散！#n本会議はこれにて解散とします！"
42130-152 = "連邦生徒会長代行執務室"
42130-156 = "……遅いぞ。"
42130-157 = "来たか、連邦生徒会長代行。"
42130-158 = "代金の振り込みが遅れているようでね。#nこうして直接訪ねてきたというわけだよ。"
42130-159 = "治安管理に必要な人手と装備を考慮すると、既に支払われている金額ではこれ以上の運営は困難と言わざるを――"
42130-161 = "なぜ、統制に穴が開いているのですか？"
42130-162 = "貴方がたに、一体いくらかけたと思っているのですか。#nたかがデモ隊一つ、まともに制圧できずによくもぬけぬけと。"
42130-163 = "おやおや、それだけの費用を支払っているとでも？"
42130-164 = "こんな程度じゃあ、このレベルの規制が限度だとも。"
42130-165 = "雇っている兵が問題を解決できない時は、まず金額が足りているかを考えたまえよ。"
42130-166 = "……貴方がたは、お金の話ができる立場ではないと思いますが？"
42130-167 = "私が前回の事態をもみ消した事で、カイザーコーポレーションが破産を免れたというのを、もうお忘れで？"
42130-168 = "忘れるわけないだろう？#n企業の価値は信用だからな。"
42130-169 = "……しかし、プレジデントの機嫌だって、いつまでも持つわけではない。"
42130-170 = "いくら助けてくれたとはいえ、これだけの労力を低賃金で貸してしまっては割に合わないんだ。"
42130-175 = "最悪、我々はカイザーの名を捨て、新しい組織を作り直す事もできる。"
42130-176 = "だが、君はどうだ？#n果たして、これまでに築いてきた名誉を捨てて、一からやり直せるのか？"
42130-181 = "……子ウサギ駅の地下に建設したサイロを黙認するだけでは足りないのですか？"
42130-183 = "それは別の話だ。前回リベートが暴露されたせいで、むしろ赤字になったからな。"
42130-184 = "この仕事が終わったら返済しますので、借金としてツケておいてくださいな。 利子もたっぷり乗せて。"
42130-185 = "望むのなら、そうしよう。"
42130-186 = "……しかし、これ以上請求書を増やして本当に大丈夫なのか？"
42130-187 = "風の噂で、まだ財務室長の信頼を得られていない新連邦生徒会長代行は、資金調達に苦労していると耳にしたのだが……"
42130-188 = "部下からの信用が薄いリーダーに投資するなんて、少し不安でね。"
42130-195 = "（……一体何が問題だというの？）"
42130-196 = "（どうして私の周りにいるやつらは、素直に信じてくれないの？）"
42130-197 = "（私の指示に従うだけで、すべてが完璧になるというのに……どうしてみんな反抗するの……？）"
42130-198 = "（……[ruby=連邦生徒会長]あの女[/ruby]が何を言っても、キヴォトスの全生徒は全幅の信頼を寄せて従っていたというのに）"
42130-199 = "（私と彼女の違いは何……？）"
42130-200 = "（どうして私は「超人」になれないの……？）"
42130-201 = "（過去の連邦生徒会と今の連邦生徒会の違い……）"
42130-208 = "……そうか。"
42130-209 = "このキヴォトスには、[ruby=・   ・]恐怖[/ruby]が足りない。"
42130-210 = "……ありったけの恐怖を見せれば、誰もが私の言うことを聞くようになる。"
42130-213 = "……カヤ？"
42130-214 = "ユキノ、先日あなたが回収した<A.N.T.I.O.C.H.>プロジェクトの成果物――弾道ミサイル用サーモバリック弾は、今どこに保管されていますか？"
42130-215 = "……アレは非活性化させてD.U.郊外の軍事施設に保管している。"
42130-216 = "威力があまりにも強く、起爆処理も容易ではないからな。"
42130-217 = "……命令です、ユキノ小隊長。"
42130-218 = "直ちにその弾頭を子ウサギ駅の地下サイロに持ち込み、爆破させなさい。"
42130-226 = "……理由は？"
42130-227 = "命令を質問で返すなんて、あなたらしくないですね。"
42130-228 = "――簡単な事ですよ。"
42130-229 = "先ほどユキノ小隊長が仰ったように、<A.N.T.I.O.C.H.>の弾頭は威力が強く、周辺への被害を懸念して起爆処理を遅らせておりました。"
42130-230 = "しかし、子ウサギタウンは再開発によってほとんどの住民が離れており、起爆による被害を最小限に抑えることができます。"
42130-232 = "とはいえ、まだ子ウサギタウンに残っている市民も少なくない。"
42130-233 = "加えて、サーモバリック弾は地下鉄のような閉鎖空間で起爆させてしまえば、威力がより高められ――"
42130-235 = "ええ、知っていますよ。#n子ウサギ駅はもちろんのこと、近隣の駅舎まで被害に遭うでしょう。"
42130-241 = "……ですが、そのレベルの脅威を見せつければ、誰もが私たちの力を理解してくれるのでは？"
42130-243 = "………！"
42130-244 = "いざとなれば、小都市くらい軽く消し去れるのだと知れ渡れば、楯突くような生徒もいなくなるでしょう。"
42130-245 = "それに、地下鉄で起きた「事故」ですから。#n安全装置の不備を口実に、交通室の責任問題に発展させて役員を追い出せますし……"
42130-246 = "――まさに一石二鳥とはこの事では？"
42130-251 = "くくっ……素晴らしい。"
42130-252 = "常人ができないことを平然とやってのける人物であることは知っていたが――#nまさかここまで大胆だとはな。"
42130-253 = "やはり、プレジデントの目に狂いはない。"
42130-255 = "……褒め言葉として受け取っておきましょう。"
42130-256 = "だが、子ウサギ駅の地下サイロは我々カイザーコーポレーションの所有物だ。爆発を起こして、我々に何の得があるというのだね？"
42130-257 = "そうですね――貴社の施設を利用させて頂くのですから、それに相応しい対価を支払うといたしましょう……"
42130-258 = "……D.U.地下鉄の運営権なんて、いかがでしょうか。"
42130-259 = "交通室の役員を交代させた場合、地下鉄を運営する新しい組織が必要になりますから。"
42130-260 = "カイザーコーポレーションでその役割を引き受けていただけるのなら、私としても大歓迎です。"
42130-261 = "悪くない。そうでなくとも、セイント・ネフティスの鉄道事業を買収するのに失敗したところでね。ちょうど代替を探していたのだよ。"
42130-262 = "各自治区をつなぐ主要な交通手段の運用――他の産業とは比べ物にならないほど安定した収入源を得ることになる……"
42130-263 = "私は些細な目先の利益に眩んで未来の富を逃す愚か者とは違うからな。"
42130-264 = "いいだろう。弾頭の搬入とサイロの稼動に必要な準備を済ませておいてやろう。キツネたちが動く時間に合わせ、我々も手を打つ。"
42130-266 = "………。"
42130-267 = "ありがとうございます。#nこれで一件落着――"
42130-268 = "……ああ、そうでした。まだ命令の返事を聞けていませんね。"
42130-269 = "ユキノ小隊長、返事は？"
42130-273 = "……FOX1、了解。"
42130-275 = "次回;囚人のジレンマ"

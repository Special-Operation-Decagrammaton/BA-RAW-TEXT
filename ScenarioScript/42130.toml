[translation]
42130-1 = "第13話;衝擊與恐懼"
42130-2 = "奇普托斯聯邦學生會會議室"
42130-5 = "……我的條件只有一個。"
42130-6 = "赤冬聯邦學園的示威隊伍要由赤冬事務局負責解散。"
42130-7 = "……這樣你聽懂了嗎，潔莉諾會長？"
42130-12 = "你似乎有些誤會啊，新任聯邦學生會長代理。"
42130-13 = "咱不單單只是學生會長……"
42130-14 = "而是赤冬聯邦學園的學生會長、環境美化部部長兼、書記長兼、體育部代表兼、整潔部部長兼、風紀委員長兼、供餐部長兼，被選為本月最優秀布丁試吃家的潔莉諾大人！"
42130-15 = "別省略為「潔莉諾會長」來稱呼咱！"
42130-16 = "是是。赤冬聯邦學園的學生會長，且同時背負其他各種重責大任的潔莉諾大人。#n現在重要的不是稱呼──"
42130-17 = "「其他各種」……？#n何等無禮！"
42130-23 = "（為什麼要那麼執著於那些根本就沒人在乎的職位啊……？）"
42130-29 = "……我失禮了，潔莉諾書記長。"
42130-30 = "不過眼下最需要處理的問題，#n是在D.U.市內主導示威、麻痺聯邦學生會行政體系的示威隊。"
42130-31 = "根據外部治安機關調查的結果顯示，#n這支示威隊的多數成員都是赤冬聯邦學園出身的學生。"
42130-32 = "我以管理D.U.治安的防衛室長，以及聯邦學生會長代理的身分，#n在此向赤冬事務局表達強烈抗議。"
42130-33 = "這麼說來，咱還想說工務部的那些傢伙最近怎麼特別安靜……#n原來跑到那種地方發動示威了啊……"
42130-34 = "那些傢伙到底有何不滿？"
42130-35 = "你問得很好，潔莉諾會長。"
42130-36 = "他們不但要求推行配給布丁或是週休5日之類難以理解的政策……"
42130-37 = "……甚至還打算發起政變啊！"
42130-42 = "……那又如何？"
42130-47 = "……訊號似乎不太好呢。"
42130-48 = "是政變……是謀反！#n那些學生打算要推翻聯邦學生會！"
42130-49 = "身為負責維護奇普托斯治安的聯邦學生會長代理，我絕對無法容忍這樣的事態──"
42130-50 = "政變……那是多麼麻煩的事，咱也非常清楚。#n畢竟咱很有經驗。"
42130-51 = "不過話又說回來，防衛室長──從根本上防範政變的方法並不存在。"
42130-52 = "對學生會的政策不滿，因此發動政變。#n這不是理所當然的事嗎？"
42130-53 = "什麼？#n那是什麼意思……"
42130-54 = "當然，像咱們這種偉大領導人的政策，那些外行的學生是不可能理解的。"
42130-55 = "聯邦學生會長代理也不容易啊……那些傢伙確實不好對付。"
42130-56 = "所以我才會希望赤冬事務局能對此負起責任解散示威隊──"
42130-57 = "原則上來說，咱是不干涉學園外發生的事情的，#n不過這次就特別看在聯邦學生會長代理的面子上──"
42130-62 = "赤冬事務局就送你們一箱潔蓮卡吧！"
42130-67 = "潔蓮卡……是什麼？"
42130-68 = "呣呣？防衛室長沒有吃過潔蓮卡嗎？"
42130-69 = "潔蓮卡是赤冬聯邦學園生產的特製牛奶巧克力！可是絕品哦！"
42130-70 = "假如吃了之後覺得喜歡──咱就來考慮是否要定期供應潔蓮卡給聯邦學生會吧。"
42130-71 = "都說了，現在需要的不是牛奶巧克力而是示威隊伍的──"
42130-72 = "……糟糕！已經這個時間了嗎？"
42130-73 = "聊天聊得太開心，差點就要錯過午睡時間了。"
42130-74 = "那麼下次再聊吧，香……香什麼聯邦學生會長代理。"
42130-80 = "這個臭小鬼……"
42130-81 = "赤冬聯邦學園連個正常的學生都沒有嗎！"
42130-88 = "……咦？我，我不是赤冬學園出身的啊？"
42130-90 = "……我不是在說你。"
42130-91 = "調停室長。那個小矮子真的是赤冬聯邦學園的代表和學生會長嗎？"
42130-93 = "是的，現在的赤冬聯邦學園學生會長確實是他──連河潔莉諾同學沒錯。"
42130-94 = "現在的……？"
42130-95 = "一週之前是由池倉瑪麗娜委員長擔任赤冬聯邦學園的學生會長。"
42130-99 = "你的意思是說…… "
42130-100 = "我們現在得和一個每週都會更換學生會長的學園進行協商，進而解決治安問題嗎？"
42130-102 = "就是這樣。#n不過前任的琳前輩從來沒抱怨過哦～"
42130-103 = "只要好～好運用糖與鞭子，我想對方應該會比三一或格黑娜的學生會長還好說話……"
42130-104 = "不過，對於只知道使用鞭子的某人來說，可能有～點困難吧。（喀滋）"
42130-111 = "那，那個……香耶室長……"
42130-112 = "……聯邦學生會長代理。"
42130-113 = "非，非常抱歉……聯邦學生會長代理！"
42130-114 = "是來自防衛室的定期報告……對於每次從銀行帳戶提領現金時，#n都有義務提交十多份文件這項新的行政命令，市民們表達了強烈的不滿……"
42130-115 = "D.U.各地都有民眾以槍械代替文件，強行要求銀行員提領現金的案例，#n而且還在不斷增加。"
42130-116 = "那……那不就只是單純的武裝強盜嗎！"
42130-117 = "D.U.各地明明接連發生銀行搶案，女武神警備局和凱薩保全到底都在做什麼？"
42130-118 = "先前也跟您提過了，警備局和凱薩保全都因為盤查而忙得不可開交……"
42130-119 = "要是人力不足的話，不管是民間保全公司還是什麼都行，#n請雇用更多人力讓治安穩定下來。"
42130-120 = "我所管理的奇普托斯，可不容許出現任何犯罪哦！"
42130-126 = "不是，在我看來明明就比之前還混亂……"
42130-127 = "因為示威的關係，我今天光是來這裡就多花了三十分鐘以上……"
42130-128 = "犯罪率的確是下降了沒錯，不過重大犯罪好像變多了呢……"
42130-129 = "老實說，這不就是區分了無辜市民造成的結果嗎？"
42130-130 = "自從人力資源室長不在之後，支持香耶室長的幹部好像也減少很多……"
42130-131 = "繼續讓他擔任代理真的沒問題嗎？"
42130-132 = "這樣看來，說不定琳行政官還比他更有能力呢……"
42130-137 = "……解散！#n今天的會議就到此為止！"
42130-152 = "聯邦學生會長代理辦公室"
42130-156 = "……來的真慢啊 。"
42130-157 = "你來啦，聯邦學生會長代理。"
42130-158 = "費用的支付似乎有所延宕，所以我只能親自來一趟了。"
42130-159 = "考量到維護治安所需的人力及裝備，以先前支付的金額來看，#n不得不說要繼續維持營運實在有困難──"
42130-161 = "為何統治會出現漏洞呢？"
42130-162 = "知道我們花了多少錢在你們身上嗎？#n連區區一支示威隊都無法好好壓制，虧你還敢大言不慚。"
42130-163 = "哎呀哎呀，以為那樣的費用就足夠了嗎？"
42130-164 = "只有那種程度的話，這種等級的管制自然也是極限了。"
42130-165 = "當雇來的傭兵解決不了問題時，應該先想想是不是金額不夠吧。"
42130-166 = "……你們應該沒有能跟我討價還價的立場吧？"
42130-167 = "是因為我擺平了上次的事，凱薩公司才得以免於破產，難道你們已經忘了嗎？"
42130-168 = "怎麼可能忘記呢？#n信用可是公司的價值啊。"
42130-169 = "……不過，總裁的耐性也是有限的。"
42130-170 = "就算你曾幫助我們，付出如此多的人力卻只收取低廉的價格仍然是划不來的。"
42130-175 = "在最壞的情況下，我們也能捨棄凱薩的名字，重新建立新的組織。"
42130-176 = "但是你又如何呢？#n你究竟能不能捨棄一路建立的名聲，從頭重新來過呢？"
42130-181 = "……對兔寶寶站地下建造的飛彈發射井睜一隻眼閉一隻眼還不夠嗎？"
42130-183 = "這可不能混為一談。#n況且因為上次收受回扣的事情曝光，我們反而虧了不少錢啊。"
42130-184 = "等這件工作結束後就會付清的，請先記在我的帳上吧。#n包含利息的部分。"
42130-185 = "那就這麼做吧。"
42130-186 = "……但是，繼續增加費用真的沒問題嗎？"
42130-187 = "我聽說尚未獲得財務室長信任的新聯邦學生會長代理，時常忙於資金的調度……"
42130-188 = "要投資一個連部下的信任都很薄弱的領袖，實在讓人感到不安呢。"
42130-195 = "（……問題到底出在哪裡？）"
42130-196 = "（為什麼周圍的人都不老實地信任我呢？）"
42130-197 = "（明明只要依照我的指示，一切都會非常完美……為什麼大家要反抗我呢……？）"
42130-198 = "（……明明以前不管[ruby=聯邦學生會長]那個女人[/ruby]說什麼，#n　奇普托斯的所有學生都會完全信任並乖乖照做的）"
42130-199 = "（我跟他到底差在哪裡……？）"
42130-200 = "（為什麼我沒辦法成為「超人」呢……？）"
42130-201 = "（過去的聯邦學生會和現在的聯邦學生會的差別……）"
42130-208 = "……這樣啊。"
42130-209 = "現在的奇普托斯缺乏[ruby= ・     ・ ]恐懼[/ruby]……"
42130-210 = "……只要看見足夠的恐懼，大家就會乖乖照我的話去做了。"
42130-213 = "……香耶？"
42130-214 = "雪乃，你之前回收的「A.N.T.I.O.C.H.」計畫的成品──彈道導彈用熱壓彈頭，#n現在保管在什麼地方？"
42130-215 = "……已做好封存措施，存放在D.U.郊外的軍事設施裡。"
42130-216 = "由於威力實在過於強大，要進行引爆處理並不容易。"
42130-217 = "……這是命令，雪乃小隊長。"
42130-218 = "立刻帶著那枚彈頭前往兔寶寶站的地下飛彈發射井，並將其引爆。"
42130-226 = "……理由是什麼？"
42130-227 = "竟然用提問回答命令，真不像你呢。"
42130-228 = "──事情很簡單。"
42130-229 = "就像剛才雪乃小隊長講的一樣，「A.N.T.I.O.C.H.」的彈頭威力驚人，#n為了避免周遭遭受波及，我們遲遲沒有將其引爆。"
42130-230 = "但是如今兔寶寶鎮因為重新開發的關係，大部分的居民都已經離開，#n因此能夠將引爆造成的損害降到最低。"
42130-232 = "話雖如此，現在還留在兔寶寶鎮的市民也不在少數。"
42130-233 = "況且，如果讓空爆燃燒彈在地鐵站那種封閉空間爆炸，威力將會變得更加強大──"
42130-235 = "當然，這些我都知道。#n不只是兔寶寶站，連附近的車站都會遭到波及吧。"
42130-241 = "……不過，要是不讓大家見識到這種等級的威脅，又怎麼會有人明白我們的力量呢？"
42130-243 = "……！"
42130-244 = "只要明白我們擁有足以輕鬆夷平小都市的力量，就不會再有學生敢來起衝突了吧。"
42130-245 = "而且，這是一起在地下鐵發生的「意外」。#n還能以未做好安全防護為理由，使其發展成交通室的責任，將幹部通通趕走……"
42130-246 = "──不覺得簡直是一石二鳥嗎？"
42130-251 = "呵呵……真是了不起。"
42130-252 = "雖然清楚你是個能若無其事地做出常人辦不到的事的人物──沒想到竟有如此膽識。"
42130-253 = "總裁果然沒有看錯人。"
42130-255 = "……我就當做是在稱讚我吧。"
42130-256 = "只不過，兔寶寶站的地下飛彈發射井是我們凱薩公司的所有物。#n要引發爆炸的話，我們應該能得到某些好處吧？"
42130-257 = "這個嘛──畢竟我們要利用貴公司的設施，自然應該支付相應的代價……"
42130-258 = "……D.U.地下鐵的經營權之類的，你覺得如何？"
42130-259 = "反正在換掉交通室的幹部之後，我們也需要負責營運地下鐵的新組織。"
42130-260 = "假如凱薩公司願意接下這個職責，我自然舉雙手贊成。"
42130-261 = "聽起來不錯。#n正好我們對聖奈芙蒂斯集團鐵道事業的收購案剛剛破局，正在尋找替代品呢。"
42130-262 = "運用連接各自治區的主要交通手段──就能得到其他產業無法比擬的穩定收入……"
42130-263 = "我和被眼前的蠅頭小利所迷惑而放棄未來的金山銀山的蠢蛋可不一樣。"
42130-264 = "好吧。我這就去完成彈頭搬入和啟動飛彈發射井的必要準備。#n配合狐狸們的行動時間，我們也會採取行動。"
42130-266 = "…………"
42130-267 = "感激不盡。#n這樣就解決一件事了──"
42130-268 = "……啊啊，對了。#n我還沒聽到對命令的答覆呢。"
42130-269 = "雪乃小隊長，回答呢？"
42130-273 = "……FOX1，了解。"
42130-275 = "下一話;囚徒困境"

[translation]
42130-1 = "Episode 13;Shock and Fear"
42130-2 = "Kivotos General Student Council Conference Room"
42130-5 = "I have one condition. More of a request, if you will. "
42130-6 = "For the Red Winter Office to take responsibility for and disband the protesters from your school."
42130-7 = "Can we shake on that, President Cherino?"
42130-12 = "It seems you are confused, Acting General Student Council President."
42130-13 = "You see, I am not simply a \"president.\""
42130-14 = "I am the student council president of Red Winter Academy, head of beautification, Great Leader, head of physical education AND the catering department, and this month's top pudding taster, Cherino!"
42130-15 = "I refuse to respond to such a paltry title!"
42130-16 = "Yes, Red Winter Academy student council president and the head of the various departments, Cherino. Back to the matter at hand..."
42130-17 = "Head of various departments...? You trivialize my position?! I'll have you purged!"
42130-23 = "(...Why is this little child in front of me so attached to these fake positions no one cares about?)"
42130-29 = "...Please excuse me, Great Leader Cherino."
42130-30 = "But the protesters hindering the General Student Council's ability to carry out its responsibilities is a pressing concern. They are causing civil unrest all over D.U."
42130-31 = "An external security review confirmed that most of these troublemakers are students from Red Winter Academy."
42130-32 = "As D.U.'s Chief of Defense and the acting General Student Council president, I am firmly demanding the Red Winter Office take accountability."
42130-33 = "Now that you mention it, the Labor Party has been unusually quiet. So, that's their game..."
42130-34 = "What's their grievance that they're protesting this time?"
42130-35 = "That's a good question, Great Leader Cherino."
42130-36 = "These students are demanding not just free pudding rations and an unrealistic 2-day work week, but..."
42130-37 = "They're also initiating a coup!"
42130-42 = "Is that so? And?"
42130-47 = "...Does that giant hat block your hearing?!"
42130-48 = "A coup! A rebellion! They're trying to topple the General Student Council itself!"
42130-49 = "As the acting General Student Council President responsible for Kivotos' security, this is a matter that can't–"
42130-50 = "I get it. Coups can be quite bothersome. I've weathered a few myself."
42130-51 = "One thing I've learned, Chief Kaya, is that trying to crush a coup directly only fuels its flames."
42130-52 = "And isn't it natural for students to rebel if they're unhappy with the council's actions?"
42130-53 = "What do you mean by that?"
42130-54 = "There will always be those short-sighted students who can't see the visions of distinguished leaders like us."
42130-55 = "While it's nothing like Red Winter, I imagine being the General Student Council President of D.U. must be challenging. The public will never understand you."
42130-56 = "This is exactly why I'm trying to request that the Red Winter Office take responsibility..."
42130-57 = "Now then, I don't normally involve myself in matters outside of my academy, but when I see hard work, it must be rewarded."
42130-62 = "Therefore, the Red Winter Office will send you a box of Cherenka!"
42130-67 = "Will send me a...what now?"
42130-68 = "*gasp* You have never tried a Cherenka, Chief of Defense?"
42130-69 = "Cherenka is Red Winter Academy's signature milk chocolate. Its richness is unparalleled!"
42130-70 = "If it's to your liking, perhaps the General Student Council could receive regular shipments."
42130-71 = "What I'm asking for now is manpower, not—"
42130-72 = "Oh no! How could this have happened?"
42130-73 = "I was enjoying chatting with a like-minded leader so much I almost missed my scheduled nap time."
42130-74 = "We'll continue this later, Acting General Student Council President Ka... whatever your name was."
42130-80 = "That insolent brat..."
42130-81 = "How does Red Winter Academy not have one, single serious student?!"
42130-88 = "...Wait, I'm not from Red Winter Academy."
42130-90 = "I know. I wasn't talking to you."
42130-91 = "Are you sure that brat is Red Winter Academy's student council president and representative, Chief of Staff?"
42130-93 = "Indeed, Renkawa Cherino currently holds the position of student council president at Red Winter Federal Academy."
42130-94 = "Currently?"
42130-95 = "Last week, I believe it was Chairwoman Ikekura Marina."
42130-99 = "If I am understanding this correctly... "
42130-100 = "We have to solve this security threat by negotiating with an academy that changes leadership on a weekly basis?"
42130-102 = "Yet, the former acting president Rin seemed quite competent at it."
42130-103 = "With the right incentives, this should be a cakewalk compared to dealing with Trinity and Gehenna..."
42130-104 = "I guess someone with a background in defense might only know how to use sticks. *nom*"
42130-111 = "Er... Chief Kaya...?"
42130-112 = "...Acting General Student Council President."
42130-113 = "I-I'm so sorry! Acting General Student Council President!"
42130-114 = "Regarding the regular Defense Office reports... Numerous civilians have made grievances about the new policy mandating them to...show ten forms of ID when making a cash withdrawal..."
42130-115 = "And, there have been a number of incidents across D.U. where frustrated civilians have brandished weapons instead of IDs, coercing bank staff to make the withdrawal."
42130-116 = "That's... That's blatant armed robbery!"
42130-117 = "This is happening all over? And are Valkyrie officers and Kaiser guards just...twiddling their thumbs?"
42130-118 = "As mentioned before, both the Security Bureau and Kaiser Security are stretched thin due to the sheer number of daily inspections..."
42130-119 = "If they lack the personnel, then hire private security firms to maintain security."
42130-120 = "I won't tolerate even a single criminal act while I'm in charge of Kivotos."
42130-126 = "She says that, but things have been way more chaotic since she took over."
42130-127 = "A protest delayed me for 30 minutes this morning when I was trying to get to Sanctum Tower."
42130-128 = "While minor crimes have decreased, major offenses have escalated..."
42130-129 = "Because all of our resources have been directed towards regulating the citizens. Criminals have suddenly found themselves with more room to play."
42130-130 = "And with the Director of Human Resources out of commission, Chief Kaya has less supporters than ever..."
42130-131 = "Maybe she can't keep up with the pressures of her office..."
42130-132 = "Chief Officer Rin is looking more and more competent every day."
42130-137 = "...Enough! Meeting adjourned!"
42130-152 = "Office of the Acting General Student Council President"
42130-156 = "...You kept me waiting."
42130-157 = "There you are, Acting General Student Council President."
42130-158 = "I'm here in person because there seems to be a delay in payments to Kaiser Security."
42130-159 = "Considering the manpower and equipment required, the previous payment doesn't even come close to covering—"
42130-161 = "Why am I still being bothered with petty problems?"
42130-162 = "With the amount of money we've paid you, how is it that you are incapable of handling even a single student protest before it reaches my desk?"
42130-163 = "Why, because you haven't paid the proper price of course."
42130-164 = "You say what you have paid me is how much the General Student Council has approved in its budget."
42130-165 = "But if your problem won't go away, then maybe the budget isn't sufficient."
42130-166 = "...You're in no position to be asking for more, Kaiser."
42130-167 = "Have you forgotten that I kept Kaiser Corporation from diving nose-first into bankruptcy? Where would you be if I hadn't covered up your crimes in the incident?"
42130-168 = "Of course not. Trust is the backbone of any business arrangement."
42130-169 = "However, I also don't believe in conducting business arrangements on emotional whims."
42130-170 = "You may have saved us from bankruptcy, but that doesn't mean I'll burn through our revenues for you."
42130-175 = "But you asked where I would be. I would have recovered quite easily. I can just throw away the Kaiser brand and start a new company should things go wrong."
42130-176 = "What about you? You stake your name and credibility with so little thought. If it all comes apart, where will Shiranui Kaya be?"
42130-181 = "...I've helped you. I've kept your secrets. The public would be interested to know about the silo you've built under Kousagi Station, I should think."
42130-183 = "That was a different issue. We were the ones who took a hit when that rebate was discovered, under your protection. The town's redevelopment went up in smoke because of it."
42130-184 = "I've told you already. Once everything's squared away, I'll pay you back. Put it on my tab. I'll even add interest."
42130-185 = "If that's what you choose."
42130-186 = "Your tab is adding up to be quite a hefty fee."
42130-187 = "From what I've gathered, you have yet to gain the Treasury's trust. You don't have much sway in directing the budget, do you?"
42130-188 = "Backing a leader who can't inspire her team's confidence does seem rather unwise."
42130-195 = "(Why is this happening?)"
42130-196 = "(Why doesn't anyone trust me?)"
42130-197 = "(If only they'd just listen! Instead, it's suspicion and insubordination at every corner!)"
42130-198 = "(And somehow the General Student Council President...that woman... All of Kivotos followed and trusted her!)"
42130-199 = "(Why her? What can she do that I can't?)"
42130-200 = "(Why can't I become a superhuman too?)"
42130-201 = "(What's different from then and now? From her Kivotos and mine?)"
42130-208 = "I get it."
42130-209 = "This Kivotos lacks fear."
42130-210 = "If they fear me, then they'll fall into line."
42130-213 = "...Kaya?"
42130-214 = "Yukino, where's the thermobaric warhead from project A.N.T.I.O.C.H. stored now? The one you confiscated from Kaiser."
42130-215 = "The warhead has been deactivated and is being stored in a military facility in the outskirts of D.U."
42130-216 = "But due to its explosive power, it was impossible to completely disarm it."
42130-217 = "This is a direct order, Yukino."
42130-218 = "Transport the warhead to the silo under Kousagi Station and detonate it."
42130-226 = "...Can I ask the reason?"
42130-227 = "It's not like you to question my orders."
42130-228 = "So I'll indulge you, this once."
42130-229 = "Like you said, the A.N.T.I.O.C.H. warhead's power is intense, making it hard to fully neutralize."
42130-230 = "And most of Kousagi Town have relocated because of the redevelopment anyway, so casualties would be minimal."
42130-232 = "\"Most of Kousagi Town\" means there are still residents there."
42130-233 = "Detonating the warhead in a confined space like a subway station will–"
42130-235 = "Yes, I'm aware how it works. Kousagi Station and the nearby stations will sustain damage."
42130-241 = "That's the point. I need a show of force. Bigger than their wildest imaginations, otherwise it won't be enough to cow them into submission."
42130-243 = "...!"
42130-244 = "They need to know we can erase a small city in seconds. Then, they'd think twice before crossing us."
42130-245 = "If the \"accident\" occurs in the subway, we can pin it on the transit staff's negligence."
42130-246 = "Everything will be tied up in a neat little bow for us."
42130-251 = "Haha... Outstanding."
42130-252 = "I knew you were a little crazy, but you've truly exceeded my expectations this time."
42130-253 = "Our Kaiser president really does seem to have an uncanny eye for talent."
42130-255 = "...Thanks for the praise."
42130-256 = "One objection, however. The silo under the subway station is Kaiser property. I'm not necessarily keen on you blowing up my things."
42130-257 = "You have a point. We'll be using your property, so to compensate..."
42130-258 = "...Would the control of D.U.'s subway system suffice?"
42130-259 = "Once I've gotten rid of the current transportation officers, we'll need another body to oversee the subway system."
42130-260 = "If Kaiser Corporation is up for it, it'd be a win-win."
42130-261 = "Sounds promising. We've been eyeing transportation ever since the Saint Nephthys rail takeover fell through."
42130-262 = "Control over the primary transport linking districts would be a source of steady revenue..."
42130-263 = "I'm not one to miss a lasting opportunity because I'm blinded by the short-term."
42130-264 = "Very well. We'll make the preparations to receive the warhead in the silo. We'll need to coordinate with your foxes."
42130-266 = "..."
42130-267 = "That's finally settled."
42130-268 = "...Now, back to my order."
42130-269 = "Squad Leader Yukino. Your answer?"
42130-273 = "...FOX 1. Understood."
42130-275 = "Next Episode; Prisoner's Dilemma"

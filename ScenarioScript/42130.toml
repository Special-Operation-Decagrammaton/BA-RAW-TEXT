42130-29 = "3;카야;00;……실례했습니다, 체리노 서기장.\n#3;em;[반짝]\n#3;greeting"
42130-30 = "3;카야;04;하지만 지금 가장 우선하여 대응해야 하는 문제는 D.U. 시내 곳곳에서 시위를 주동하며 총학생회의 행정을 마비시키고 있는 시위대의 문제입니다."
42130-31 = "3;카야;01;외주 치안기관이 조사한 결과, 이 시위대는 대부분이 붉은겨울 학원 출신의 학생으로 구성된 것으로 파악되었습니다."
42130-32 = "3;카야;05;D.U.의 치안을 관리하는 방위실장이자 총학생회장 대행으로서 이 사태에 대해 붉은겨울 사무국에 강력히 항의하는 바입니다."
42130-33 = "1;통신체리노;99;그러고보니 요새 용역부 녀석들이 조용하다 싶었는데, 그런 곳에서 말썽을 부리고 있었나……\n#1;a\n#3;m5"
42130-34 = "1;통신체리노;00;녀석들은 뭐가 불만이기에 그곳에서 시위를 하고 있는 거지?\n#1;em;[?]"
42130-35 = "3;카야;03;잘 물어보셨습니다, 체리노 회장.\n#3;greeting"
42130-36 = "3;카야;02;그 학생들은 푸딩 지급이나 주 2일 노동과 같은 이해되지 않는 정책을 요구하는 것뿐만 아니라, 더 나아가……\n#3;m3\n#1;dl"

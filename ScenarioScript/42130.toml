[translation]
42130-1 = "ตอนที่ 13;เรื่องสะเทือนใจและความกลัว"
42130-2 = "ห้องประชุมองค์การนักเรียนของคิโวทอส"
42130-5 = "... เพราะแบบนั้นมันจึงมีเงื่อนไขเดียวที่ฉันจะขอค่ะ"
42130-6 = "กลุ่มผู้ประท้วงรับจ้างของสหภาพเรดวินเทอร์ สำนักเลขาธิการเรดวินเทอร์จะต้องเป็นผู้รับผิดชอบ และสั่งสลายการประท้วงค่ะ"
42130-7 = "... เข้าใจหรือเปล่าคะ ประธานเชริโน่?"
42130-12 = "คงจะเข้าใจอะไรผิดแล้วละ รักษาการแทนประธานองค์การนักเรียนคนใหม่"
42130-13 = "เราไม่ได้เป็นแค่ประธานสภานักเรียนหรอกนะ..."
42130-14 = "เราคือท่านเชริโน่ ประธานสภานักเรียนแห่งสหภาพเรดวินเทอร์ และเป็นหัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายกีฬา หัวหน้าฝ่ายทำความสะอาด ประธานกรรมการ หัวหน้าฝ่ายอาหาร และก็เป็นนักชิม#nพุดดิ้งดีเด่นประจำเดือนนี้ด้วย!"
42130-15 = "เพราะงั้นจะมาเรียกเราแค่ตำแหน่งสั้นๆ แค่นั้นไม่ได้!"
42130-16 = "ค่ะ ท่านเชริโน่ ประธานสภานักเรียนแห่งสหภาพเรดวินเทอร์ และเจ้าของตำแหน่งที่ยิ่งใหญ่จิปาถะ ตอนนี้เรื่องคำเรียกมันสำคัญนักเหรอคะ—"
42130-17 = "'จิปาถะ' งั้นเหรอ...? พูดอะไรไร้มารยาทเช่นนี้!"
42130-23 = "(... เด็กตัวกะเปี๊ยกคนนี้ทำไมไม่สนใจอะไรเลยนอกจากตำแหน่งบ้าบออะไรนี่เนี่ย...?)"
42130-29 = "...ขอโทษที่เสียมารยาทค่ะ เลขาธิการเชริโน่"
42130-30 = "แต่ปัญหาที่ต้องรับมือเป็นอันดับแรกในตอนนี้คือปัญหากลุ่มผู้ประท้วงที่ทำการประท้วงไปทั่วตัวเมือง D.U. และทำให้การบริหารงานขององค์การนักเรียนเป็นอัมพาตค่ะ"
42130-31 = "จากการตรวจสอบของหน่วยงานรักษาความสงบเรียบร้อยภายนอก พบว่าส่วนใหญ่ของกลุ่มผู้ประท้วง#nนี้เป็นนักเรียนจากสหภาพเรดวินเทอร์ค่ะ"
42130-32 = "ในฐานะรักษาการแทนประธานองค์การนักเรียนและหัวหน้าสำนักป้องกันที่ดูแลความสงบเรียบร้อยของ D.U. ฉันขอท้วงติงเรื่องนี้กับสำนักเลขาธิการเรดวินเทอร์ค่ะ"
42130-33 = "ก็ว่าอยู่ว่าทำไมช่วงนี้พวกชมรมผู้รับจ้างดูเงียบๆ ที่แท้ก็ไปก่อปัญหาในที่แบบนั้นอยู่สินะ..."
42130-34 = "แล้วพวกนั้นไม่พอใจอะไรถึงได้ไปประท้วงอยู่ที่นั่นล่ะ?"
42130-35 = "ถามได้ดีเลยค่ะ ประธานเชริโน่"
42130-36 = "คนพวกนั้นมาเสนอนโยบายเหลวไหลที่ให้ทำงานสัปดาห์ละ 2 วัน แล้วก็เรื่องขอเพิ่มจำนวนพุดดิ้งอะไร#nด้วย ไม่เพียงแค่นั้นนะคะ..."
42130-37 = "...พวกเธอกำลังก่อปฏิวัติอยู่ค่ะ!"
42130-42 = "...แล้วยังไงอ่ะ?"
42130-47 = "...ได้ยินไม่ถนัดเหรอคะ?"
42130-48 = "การปฏิวัตินะคะ... กบฏที่ล้มล้างอำนาจการปกครองน่ะ! นักเรียนพวกนั้นกำลังพยายามโค่นล้มองค์การ#nนักเรียนอยู่นะคะ!"
42130-49 = "ในนามรักษาการแทนประธานองค์การนักเรียนที่รับผิดชอบความสงบเรียบร้อยของคิโวทอส ฉันไม่อาจยินยอมต่อเรื่องนี้ได้—"
42130-50 = "ปฏิวัติงั้นเหรอ... เราก็เจอมาจนนับจำนวนครั้งไม่ถ้วนแล้วละ พอจะเข้าใจอยู่หรอกนะว่ามันน่ารำคาญแค่#nไหน"
42130-51 = "แต่เธอรู้อะไรไหมหัวหน้าสำนักป้องกัน ตามหลักพื้นฐานแล้วน่ะ มันไม่มีวิธีป้องกันการปฏิวัติหรอกนะ"
42130-52 = "ถ้านโยบายของสภานักเรียนไม่น่าพอใจ มันก็ต้องก่อการปฏิวัติอยู่แล้วน่ะสิ?"
42130-53 = "คะ? หมายความว่ายังไงคะ..."
42130-54 = "ถึงนักเรียนบางคนจะไม่เข้าใจนโยบายของผู้นำที่ยิ่งใหญ่อย่างเช่นพวกเรา แต่เราก็มองว่าการปฏิวัติ#nคือเรื่องปกติ"
42130-55 = "รักษาการแทนฯ เองก็คงจะเหนื่อยกับเรื่องใน D.U. น่าดูเลยนะ ยิ่งต้องเจอกับเจ้าพวกนั้นด้วยแล้ว"
42130-56 = "เพราะแบบนี้ไงคะ ฉันถึงถามหาความรับผิดชอบจากสำนักเลขาธิการเรดวินเทอร์ในการสลายการชุมนุม#nประท้วง—"
42130-57 = "ตามหลักการแล้วเราจะไม่ยุ่งกับงานนอกสหภาพ แต่ครั้งนี้ถือว่าเป็นการยกย่องการทำงานหนักของ#nรักษาการแทนฯ..."
42130-62 = "สำนักเลขาธิการเรดวินเทอร์จะส่งช็อกเชริโน่ไปให้กำลังใจหนึ่งกล่อง!"
42130-67 = "ช็อกเชริโน่... คืออะไรเหรอคะ?"
42130-68 = "หืม? หัวหน้าสำนักป้องกันไม่เคยกินช็อกเชริโน่เหรอ?"
42130-69 = "ช็อกเชริโน่ก็คือช็อกโกแลตนมสูตรพิเศษที่ผลิตในสหภาพเรดวินเทอร์น่ะ รสหวานสุดยอดเลยละ!"
42130-70 = "ถ้าลองกินแล้วถูกใจละก็ เราจะพิจารณาส่งช็อกเชริโน่ไปให้องค์การนักเรียนอย่างสม่ำเสมอเลย"
42130-71 = "ตอนนี้ที่ฉันต้องการไม่ใช่ช็อกโกแลตนม แต่เป็นกองกำลังปราบปราม—"
42130-72 = "... แย่ละสิ! เวลาล่วงเลยไปขนาดนี้แล้วงั้นรึ?"
42130-73 = "มัวแต่คุยเพลินจนเกือบพลาดเวลานอนกลางวันไปแล้วเลย"
42130-74 = "งั้นเอาไว้คุยกันใหม่นะ คา... อะไรนะ เอาเถอะ ไว้คุยกันนะรักษาการแทนฯ"
42130-80 = "ยัยเด็กเจ้ากรรมนี่..."
42130-81 = "ในสหภาพเรดวินเทอร์ มีนักเรียนคนไหนที่ปกติบ้างไหมเนี่ย!"
42130-88 = "...หืม? ฉะ... ฉันไม่ได้เป็นเด็กสหภาพเรดวินเทอร์นะ?"
42130-90 = "... ฉันไม่ได้ถามคุณสักหน่อยค่ะ"
42130-91 = "หัวหน้าฝ่ายไกล่เกลี่ย เด็กตัวกะเปี๊ยกคนนั้นเป็นประธานสภานักเรียนของสหภาพเรดวินเทอร์จริงๆ เหรอคะ?"
42130-93 = "ค่ะ ประธานสภานักเรียนของสถาบันสหภาพเรดวินเทอร์ในขณะนี้คือคุณเรนคาวะ เชริโน่ค่ะ"
42130-94 = "ในขณะนี้เหรอ...?"
42130-95 = "เมื่อสัปดาห์ก่อน ตำแหน่งประธานสภานักเรียนของสหภาพเรดวินเทอร์เป็นของอิเคะคุระ มารินะ หัวหน้าคณะฯ ค่ะ"
42130-99 = "ถ้างั้นตอนนี้..."
42130-100 = "แปลว่าฉันต้องเจรจาเพื่อคลี่คลายปัญหาความสงบเรียบร้อยกับโรงเรียนที่เปลี่ยนประธานสภาทุกๆ สัปดาห์เหรอคะ?"
42130-102 = "แต่รุ่นพี่รินที่เป็นรักษาการฯ คนก่อนหน้าก็จัดการได้โดยไม่ปริปากบ่นเลยนะ"
42130-103 = "ไม่ว่าจะวิธีเอาแคร์รอตมาล่อหรือใช้แส้ฟาด ถ้าจูงใจให้มันถูกๆ วิธี น่าจะรับมือง่ายกว่าประธานสภา#nนักเรียนของทรีนิตี้ หรือเกเฮนน่าอีกนะ..."
42130-104 = "แต่เรื่องนี้น่าจะยากไปสำหรับรักษาการฯ จากสำนักป้องกันที่ไม่รู้จักอะไร นอกจากวิธีเอาแส้ฟาดนั่น#nแหละ (ง่ำๆ)"
42130-111 = "อะ... เอ่อ... หัวหน้าสำนักฯ คายะ..."
42130-112 = "... รักษาการแทนประธานองค์การนักเรียน"
42130-113 = "ขะ... ขอโทษนะคะ ท่านรักษาการแทนประธานองค์การนักเรียน!"
42130-114 = "ฉันมาด้วยประเด็นในรายงานสามัญของสำนักป้องกันค่ะ... ตอนนี้มีชาวเมืองที่แสดงความไม่พึงพอใจ#nกันมากในการถอนเงินสดจากบัญชี ที่ทุกครั้งที่ไปถอนเงินจะต้องยื่นเอกสารแสดงตนเป็นสิบอย่าง..."
42130-115 = "พนักงานธนาคารหลายแห่งใน D.U. ต้องเจอลูกค้าที่ชักปืนใส่แทนที่จะยื่นเอกสารแสดงตัวแล้วบังคับ#nให้ถอนเงินให้ด้วยนะคะ แล้วก็ไม่ใช่ครั้งสองครั้งด้วยค่ะ"
42130-116 = "นั่นมัน... การปล้นแบบติดอาวุธนี่คะ?!"
42130-117 = "มีเหตุปล้นธนาคารอย่างต่อเนื่องใน D.U. เหรอคะเนี่ย สำนักความมั่นคงวัลคิรี่กับไคเซอร์ ซิเคียวริตี้ มัวไปทำอะไรกันอยู่คะ?"
42130-118 = "อย่างที่ได้บอกไปก่อนหน้านี้ว่าสำนักความมั่นคงกับไคเซอร์ ซิเคียวริตี้มัวแต่ไปตั้งด่านตรวจจนขาด#nกำลังคน..."
42130-119 = "ถ้ากำลังคนไม่พอ ก็ไปจ้างบริษัทรักษาความปลอดภัยเอกชนหรือใครคนอื่นมาเพิ่มความเข้มงวดสิคะ"
42130-120 = "ฉันไม่ยอมให้คิโวทอสในความดูแลของฉันมีอาชญากรรมหรอกค่ะ!"
42130-126 = "(กระซิบ) ถึงจะพูดแบบนั้น แต่ตอนนี้ในตัวเมืองวุ่นวายกว่าเมื่อก่อนอีกนะ"
42130-127 = "ม๊อบประท้วงวันนี้ทำให้ฉันใช้เวลาเดินทางมาแซงค์ทัมทาวเวอร์นานกว่าเดิมตั้งครึ่งชั่วโมงแน่ะ"
42130-128 = "ถึงอัตราการก่ออาชญากรรมจะลดลง แต่อาชญากรรมร้ายแรงเหมือนจะเกิดบ่อยขึ้นเลย..."
42130-129 = "นี่แหละผลจากการบีบคั้นชาวเมืองที่ถูกใส่ร้ายป้ายสี"
42130-130 = "หลังจากหัวหน้าฝ่ายบุคคลโดนเล่นงาน กรรมการที่สนับสนุนหัวหน้าสำนักฯ คายะก็ลดจำนวนลงเยอะเลยด้วยนะ..."
42130-131 = "แบบนี้จะเป็นรักษาการฯ ต่อได้เหรอ?"
42130-132 = "ที่ผ่านมา เจ้าหน้าที่รินอาจจะมีความสามารถมากกว่าก็ได้นะ..."
42130-137 = "... แยกย้าย! จบการประชุมและแยกย้ายแค่นี้ค่ะ!"
42130-152 = "สำนักงานรักษาการแทนประธานองค์การนักเรียน"
42130-156 = "...กำลังรออยู่เลย"
42130-157 = "มาแล้วเหรอ รักษาการแทนประธานองค์การนักเรียน"
42130-158 = "ได้ยินว่าเข้ามาหาเอง เพราะเงินที่ต้องจ่ายให้ไคเซอร์ ซิเคียวริตี้ล่าช้างั้นเหรอ?"
42130-159 = "พอพิจารณากำลังคนและอุปกรณ์ที่จำเป็นในการบริหารความปลอดภัยแล้ว ต้องบอกว่าการจัดการ์ดให้#nต่อเป็นเรื่องยากสำหรับเงินที่ได้รับมาน่ะ—"
42130-161 = "ทำไมถึงทำงานบกพร่องขึ้นเรื่อยๆ เลยล่ะคะ?"
42130-162 = "ฉันจ่ายเงินให้คุณตั้งเท่าไรแล้ว กับอีแค่กลุ่มผู้ประท้วงกลุ่มเดียวยังควบคุมไม่ได้ จนเรื่องนี้ต้องมาถึงหู#nของฉันเลยเหรอคะ?"
42130-163 = "ก็เธอ... ไม่ได้จ่ายเงินให้มากพอที่จะจัดการเรื่องแบบนั้นน่ะสิ"
42130-164 = "ด้วยเงินที่องค์การนักเรียนจ่ายมา เราก็ทำให้ได้แค่นั้นนั่นละ"
42130-165 = "ถ้าเงินแก้ปัญหาไม่ได้ ก็ต้องคิดดูแล้วละว่าเพราะเงินไม่ถึงหรือเปล่า"
42130-166 = "... คุณไม่น่าใช่ฝ่ายที่ยกเรื่องเงินมาคุยได้นะคะ ไคเซอร์"
42130-167 = "ลืมไปแล้วเหรอคะว่าที่ไคเซอร์ คอร์เปอเรชั่นไม่ล้มละลายเมื่อคราวก่อนก็เพราะว่าฉันเป็นคนช่วยปิด#nความรับผิดชอบให้?"
42130-168 = "จะไปลืมได้ยังไงล่ะ คุณค่าของธุรกิจคือเครดิตอยู่แล้ว"
42130-169 = "... แต่ตอนนี้ท่านประธานใหญ่ค่อยๆ เริ่มแสดงความไม่สบายใจออกมาน่ะสิ"
42130-170 = "ต่อให้เคยช่วยให้รอดจากการล้มละลายมาได้ แต่หากจะเอากำลังคนของเราไปใช้งานแลกกับค่าจ้าง#nถูกๆ มันก็ไม่คุ้มเราอยู่ดี"
42130-175 = "อย่างแย่ที่สุดเราก็แค่ทิ้งชื่อไคเซอร์ แล้วไปทำป้ายชื่ออันใหม่"
42130-176 = "แต่เธอล่ะจะเป็นยังไง? กล้าทิ้งเกียรติยศและชื่อที่สะสมมาจนถึงตอนนี้แล้วเริ่มใหม่ได้เหรอ?"
42130-181 = "... แค่เรื่องไซโลที่สร้างใต้ดินของสถานีโคะอุซางิมันไม่พอเหรอคะ?"
42130-183 = "นั่นมันไม่เกี่ยวกันสิ ที่เงินคืนมันระเบิดไปครั้งก่อน มันกลับทำให้เราขาดทุนจากการปรับปรุงเมืองใหม่"

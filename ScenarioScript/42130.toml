42130-48 = "3;카야;21;쿠데타입니다…… 반역이라고요! 그 학생들은 총학생회를 전복시키려는 시도를 하고 있습니다!\n#3;em;[!]"
42130-49 = "3;카야;05;이는 키보토스의 치안을 책임지는 총학생회장 대행으로서 용납할 수 없는—"
42130-50 = "1;통신체리노;99;쿠데타라…… 나도 자주 겪어봐서 쿠데타가 얼마나 귀찮은 일인지는 잘 알고 있지.\n#1;a\n#3;m5"
42130-51 = "1;통신체리노;00;하지만 방위실장, 쿠데타를 원천적으로 막을 수 있는 방법은 존재하지 않는다네."
42130-52 = "1;통신체리노;01;학생회의 정책이 마음에 들지 않으면 쿠데타를 일으키는 게 당연하지 않는가?\n#1;em;[?]"

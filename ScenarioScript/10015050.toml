[translation]
10015050-1 = "Episode 5; The Anti-Halo Festival Group"
10015050-4 = "THIS is the robot they were going to use for the field day?"
10015050-5 = "A-Apparently... It's more like a tank than a festival...thing..."
10015050-6 = "What nefarious plans were they cooking up with this monstrosity?!"
10015050-7 = "Maybe they were going to use it in place of a ball..."
10015050-8 = "This clunky lump of steel? Do you not see the wheels?!"
10015050-9 = "Oh! Maybe it's meant to chase the athletes during races so they don't slow down?"
10015050-10 = "The fear of being run over by this robot tank would make them perform better. They're ruthless."
10015050-11 = "Hmph. I'm not even surprised."
10015050-12 = "They've been touting strengthening bodies and inter-academy relationships and other stupid things. And for what?!"
10015050-13 = "I'm sure this combat robot is just another one of their torture devices."
10015050-15 = "The Kivotos Halo Festival must be stopped at all costs!"
10015050-20 = "Did I hear you mention the festival?"
10015050-21 = "Eek!"
10015050-22 = "The president of the Athletics Training Club? How long were you there?!"
10015050-23 = "My apologies. I didn't mean to sneak up on you."
10015050-24 = "I was just walking by, and I heard you mention the Halo Festival!"
10015050-25 = "If you're up in the hallways talking about the festival at this hour..."
10015050-26 = "You must be just as passionate and excited as me about tomorrow!"
10015050-28 = "Um..."
10015050-29 = "We're not excited about the festival, but..."
10015050-30 = "Haha! Don't be bashful! I understand. I, too, won't sleep a wink tonight out of pure excitement!"
10015050-31 = "Tomorrow's field day is the opportunity for a student to break their own limits through physical activities!"
10015050-32 = "It's such a wonderful, peaceful time meant to unify! And to think Millennium has the honor of hosting it this year."
10015050-33 = "It's reasonable you can't contain your excitement! I certainly can't!"
10015050-36 = "(This girl... She's having an entire conversation by herself.)"
10015050-37 = "(This is why it's annoying to deal with these sporty types.)"
10015050-39 = "So, which events are you participating in?"
10015050-40 = "I'm sorry for eavesdropping, but did you mention ball rolling?"
10015050-41 = "Uh... Um... Yeah! That one! The ball rolling match or something."
10015050-42 = "We were just going over our strategy one last time..."
10015050-43 = "Your ball rolling strategy?"
10015050-44 = "O-Oh. Is that weird?"
10015050-45 = "Not at all! I love your attitude!"
10015050-49 = "Just because the mechanics are simple, that doesn't mean ball rolling is easy!"
10015050-55 = "It's not just about pushing a ball around. You need the core and upper body strength to keep it stable. I hope you've been training your dexterity, otherwise you'll have trouble redirecting the ball at the halfway point."
10015050-57 = "The track itself can be uneven at points, so be sure to wear shoes that allow you to change direction easily. Which, of course, means you need a strong, stable lower body!"
10015050-68 = "Um... Yeah..."
10015050-69 = "How do we get away...?"
10015050-75 = "President Sumire! Don't let those students out of your sight!"
10015050-76 = "What? Veritas? Sensei? And..."
10015050-85 = "The meisters of the Engineering Department? What...What are you wearing?"
10015050-86 = "Ugh... These things..."
10015050-87 = "It was an emergency situation, and we didn't have time to change!"
10015050-92 = "But if you're curious about our clothes, Hibiki actually has been studying the art of sewing for a long time in order to pursue her cosplaying hobbies, and—"
10015050-93 = "Don't take this personally, Kotori, but there's no time for long-winded explanations right now."
10015050-94 = "Those students over there..."
10015050-95 = "They stole our cheer bot!"
10015050-96 = "Th-They're thieves? Not athletes?"
10015050-98 = "Cheer bot...?"
10015050-99 = "Cheer...?"
10015050-100 = "[s1] \"Why do they seem so surprised?!\" \n[s2] \"Wait... Are they not the criminals?\""
10015050-103 = "We never stole a cheer bot! We were just...um..."
10015050-104 = "Yeah, we didn't steal anything! We just set off a bomb and tried to hack the server, but that's it!"
10015050-105 = "Oh! Oh... I mean..."
10015050-107 = "Heehee! Thank you for the information, that makes our lives easier."
10015050-108 = "I don't know what your motives for ruining the Halo Festival are, but this scheme ends here."
10015050-109 = "This festival is near and dear to many people's hearts. It's filled with the dreams of hopeful students."
10015050-110 = "Your selfishness has caused pain to Seminar and the Millennium student body!"
10015050-111 = "But, if you return the robot, I can pretend this never happened."
10015050-112 = "If you get any creative ideas, however, I can guarantee a certain, infamously merciless treasurer is not the type to turn the other cheek."
10015050-113 = "I cannot and will not guarantee your safety."
10015050-115 = "The merciless treasurer of Seminar... D-Do you mean Yuuka?"
10015050-116 = "Her? I've heard the rumors..."
10015050-117 = "Yuuka was so upset at a student's dumb invention once, she took away their entire research budget with a snap of her fingers."
10015050-118 = "Revoking researching funds...is a fate worse than death for Millennium students. Seminar truly is ruthless to its core."
10015050-120 = "You can't scare me off that easily! The Anti-Halo Festival Group won't be cowed by your threats!"
10015050-121 = "[s] \"The Anti-Halo Festival Group...?\""
10015050-122 = "Yes! We are part of the Anti-Halo Festival Group."
10015050-123 = "A.H.F.G. for short!"
10015050-124 = "If you think every Millennium student is jumping for joy about your stupid festival, you're more out of touch than I thought!"
10015050-125 = "A-Against a field day? I can't... I won't believe it!"
10015050-126 = "W-Well, we do feel guilty for all of the efforts many students put into these preparations..."
10015050-127 = "But we're working for a greater cause! Our mission calls to us!"
10015050-129 = "That's great and all, but we'd like our cheer bot back."
10015050-130 = "I suggest you hand it over nicely. I'm not a very patient person."
10015050-132 = "We didn't steal your stupid cheer bot!"
10015050-133 = "Ugh, typical! They're not listening to us!"
10015050-134 = "If you won't listen to words, I'll handle this with force! Let's see how you do against the tank I stole from the Engineering Department!"
10015050-139 = "Come out, Track Crasher!"
10015050-145 = "[ns] \"Wh-What's that?!\""
10015050-146 = "A tank? This is a bit beyond the expected parameters of this mission."
10015050-147 = "Hahaha! No way! That's awesome! What the heck is it?"
10015050-148 = "Hey, hey! Did you engineering nerds make that ball-shaped robot thing? The colors could use some work, but what a design!"
10015050-149 = "Wow. It's working like a charm."
10015050-151 = "\"Track Crasher\"? Really? That's what you came up with?"
10015050-152 = "If you hadn't stolen it, we would've given the cheer bot a much better name."
10015050-153 = "I'm sorry for saying this, but Utaha's a bit of a weirdo when it comes to coming up with names."
10015050-154 = "Let's just keep Track Crasher. I'm scared of what Utaha'll cook up."
10015050-155 = "Well... As long as we delivered on the product, I suppose the name doesn't matter much."
10015050-156 = "Hello? Engineering Department?"
10015050-161 = "It's not like I didn't expect something along these lines from the blueprint, but..."
10015050-163 = "Did I ask you for a cheer bot, or did I ask you for a tank? Hm?"
10015050-164 = "W-W-Well..."
10015050-165 = "You asked for a cheer bot, which we delivered. I'm quite proud of this one, if I do say so myself."
10015050-166 = "...Incorrigible."
10015050-172 = "The armor? That ridiculous armor?"
10015050-173 = "That super-duper strong armor? You asked us to make it strong enough to withstand an explosion!"
10015050-174 = "These heat-treated gloves can survive anything! Almost! I think! We didn't get to test it that much!"
10015050-181 = "And the tracks?"
10015050-182 = "Well...you said it needed to be able to travel over any terrain, right?"
10015050-183 = "There's no incline too steep for the Track Crasher!"
10015050-190 = "That's all well and good...I suppose. However, I need you to explain the fifteen millimeter machine gun. Please."
10015050-191 = "Well, the Halo Festival is meant to be a unifying competition of peace, but there are always delinquents hiding in the shadows."
10015050-192 = "We thought a combat mode could take down any enemies, if worst came to worst."
10015050-193 = "You know..."
10015050-194 = "[s] \"...They convinced me!\""
10015050-195 = "Ahem. Apologies, I was rendered speechless by their innovative ideas for a moment."
10015050-203 = "This isn't the time to admire Utaha's insanity! Do something about that tank!"
10015050-204 = "Apologies, Chihiro. You're right, the questions can wait."
10015050-205 = "Sensei, if you would? Lead us into battle!"

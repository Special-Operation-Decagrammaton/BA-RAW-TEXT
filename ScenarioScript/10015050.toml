[translation]
10015050-1 = "ตอนที่5;กลุ่มผู้ต่อต้านฮาโลเฟสติวัล"
10015050-4 = "นี่มัน... หุ่นยนต์ที่จะใช้ในงานมหกรรมแข่งขันกีฬาแน่ใช่มั้ย?"
10015050-5 = "ดูยังไงก็เหมือน 'รถถัง' มากกว่านะ..."
10015050-6 = "ตั้งใจจะเอาของที่โหดร้ายขนาดนี้ไปใช้ที่ไหนน่ะ?"
10015050-7 = "หรือว่าจะเอาไปใช้แทนลูกบอลในการแข่งกลิ้งลูกบอลงั้นเหรอ...?"
10015050-8 = "จะใช้มือเปล่ากลิ้งก้อนเหล็กหนักขนาดนั้นได้ด้วยเหรอ? จะว่าไปด้านล่างก็มีล้ออยู่แล้วด้วยนี่"
10015050-9 = "หรือว่าจะเอาไว้ขับไล่นักวิ่งในการแข่งวิ่งเพื่อรักษาความเร็วให้คงที่...."
10015050-10 = "ต้องวิ่งหนีการโจมตีของหุ่นยนต์ที่เลี่ยงไม่ได้งั้นเหรอ แค่คิดก็ขนลุกแล้ว..."
10015050-11 = "ฮึ่ม... มาถึงตรงนี้ก็ไม่มีอะไรน่าตกใจแล้วละ"
10015050-12 = "พวกนั้นเอาแต่บอกว่าตั้งใจจะพัฒนาร่างกายให้แข็งแรงและเสริมสร้างความสัมพันธ์—  นั่นก็เป็นแค่ข้อ#nอ้างเพื่อที่จะหาโอกาสสร้างความลำบากให้คนอื่นเท่านั้นแหละ"
10015050-13 = "แน่นอนว่าหุ่นยนต์ต่อสู้ก็คงเป็นหนึ่งในเครื่องมือทรมานอันชั่วร้ายที่ตั้งใจสร้างขึ้นมาแน่ๆ"
10015050-15 = "...พวกเราต้องล่มงานมหกรรมแข่งขันกีฬาให้ได้!"
10015050-20 = "เมื่อสักครู่นี้พูดถึงงานมหกรรมแข่งขันกีฬางั้นเหรอคะ?"
10015050-21 = "ฮะ... เฮือก?!"
10015050-22 = "หะ... หัวหน้าชมรมออกกำลังกาย...? มาตั้งแต่เมื่อไรกัน...?"
10015050-23 = "อ่า ขอโทษที่ทำให้ตกใจนะคะ"
10015050-24 = "พอดีเดินผ่านมาหลังจากออกกำลังกายเสร็จแล้วดันได้ยินเรื่องงานมหกรรมแข่งขันกีฬาเข้าน่ะค่ะ"
10015050-25 = "ดึกดื่นป่านนี้แล้วยังไม่ยอมหลับยอมนอน แต่มานั่งพูดคุยกันสนุกสนานขนาดนี้..."
10015050-26 = "ทุกคนเองก็คงจะตื่นเต้นกับงานมหกรรมแข่งขันกีฬาในวันพรุ่งนี้กันสินะคะ!"
10015050-28 = "คือว่า เรื่องนั้น..."
10015050-29 = "พวกเราไม่ได้ตั้งตารองานมหกรรมแข่งขันกีฬานะ…"
10015050-30 = "ฮุฮุ ไม่ต้องปฏิเสธก็ได้ค่ะ ฉันเองก็ตื่นเต้นกับการแข่งขันในวันพรุ่งนี้จนนอนไม่หลับเหมือนกันค่ะ"
10015050-31 = "งานมหกรรมแข่งขันกีฬาคิโวทอส ที่นักเรียนจะได้เรียนรู้หลายๆ อย่างผ่านการเล่นกีฬา..."
10015050-32 = "การร่วมมือกันโดยไม่แบ่งแยกสถาบัน เทศกาลแห่งสันติภาพที่จะมีการแข่งขันอย่างใสสะอาด และตัดสินอย่างยุติธรรม จะถูกจัดขึ้นที่โรงเรียนของเรา... "
10015050-33 = "เป็นเรื่องที่น่าตื่นเต้นจนทำเอานอนไม่หลับเลยจริงๆ นั่นแหละค่ะ!"
10015050-36 = "(คนคนนี้... พูดคนเดียวได้โดยไม่ต้องรอให้ใครตอบเลยเหรอเนี่ย?)"
10015050-37 = "(เพราะแบบนี้พวกนักเรียนในวงการกีฬาถึงได้ไม่รู้จะรับมือยังไง...)"
10015050-39 = "จะว่าไปทุกคนตั้งใจจะลงแข่งกีฬาประเภทไหนเหรอคะ?"
10015050-40 = "ไม่ได้ตั้งใจจะแอบฟังหรอกนะคะ แต่เมื่อกี๊ได้ยินว่าพูดถึงการแข่งกลิ้งลูกบอลกันอยู่ใช่มั้ยคะ..."
10015050-41 = "คะ... คือว่า... ใช่แล้วๆ! พวกเราตั้งใจไว้ว่าจะลงแข่งกลิ้งลูกบอลกันน่ะ"
10015050-42 = "ตอนนี้ก็เลยกำลังวางแผนเป็นครั้งสุดท้ายก่อนที่จะถึงการแข่งขันวันพรุ่งนี้น่ะ..."
10015050-43 = "วางแผนในการแข่งกลิ้งลูกบอลเนี่ยนะคะ?"
10015050-44 = "ระ... หรือว่า การวางแผนสำหรับการแข่งกลิ้งลูกบอลมันไม่เข้าท่าเหรอ...?"
10015050-45 = "ไม่หรอกค่ะ ฉันคิดว่าเป็นความคิดที่ดีมากเลยค่ะ!"
10015050-49 = "ก็การแข่งกลิ้งลูกบอลมันไม่ใช่กีฬาง่ายๆ แบบที่คนทั่วไปคิดยังไงล่ะคะ!"
10015050-55 = "การส่งต่อลูกบอลให้ได้อย่างมั่นคงต้องอาศัยกล้ามเนื้อส่วนบนที่แข็งแรงมากพอ และยังต้องควบคุม#nทิศทางของบอลให้รวดเร็วตรงจุดกลับตัวด้วย"
10015050-57 = "ต้องเลือกรองเท้าสตั๊ดที่ช่วยให้เปลี่ยนทิศทางได้สะดวก รวมถึงต้องฝึกความแข็งแรงของร่างกายส่วน#nล่างโดยคำนึงถึงเนินที่อาจเจอในสนาม—"
10015050-68 = "เอ่อ อืม..."
10015050-69 = "คือว่า ตอนนี้ช่วยปล่อยพวกเราไปสักทีเถอะนะ..."
10015050-75 = "หัวหน้าสึมิเระ อย่าปล่อยนักเรียนพวกนั้นไปเด็ดขาดเลยนะ!"
10015050-76 = "เอ๊ะ? คุณครูกับสมาชิกของเวอริทัสเหรอ? แล้วก็..."
10015050-85 = "เหล่าไมสเตอร์แห่งชมรมวิศวกรรม? แล้วนั่นใส่ชุดอะไรกันคะ"
10015050-86 = "เอ่อ ชุดนี้ก็คือ..."
10015050-87 = "พอไล่ตามคุณครูมาเรื่อยๆ... ก็ไม่มีเวลาไปเปลี่ยนชุดเลยน่ะค่ะ"
10015050-92 = "ถ้าจะให้อธิบายเกี่ยวกับชุดนี้ละก็ ต้องย้อนกลับไปเมื่อสองปีก่อน ตอนที่ฮิบิกิมีงานอดิเรกเป็นการแต่ง#nคอสเพลย์—"
10015050-93 = "ขอโทษทีนะ โคโทริ ไม่มีเวลามาอธิบายแล้วน่ะ"
10015050-94 = "สรุปแบบย่อๆ ก็คือ..."
10015050-95 = "พวกนักเรียนที่อยู่ตรงนั้นเป็นคนร้ายที่ขโมยหุ่นยนต์เชียร์ของพวกเราไปน่ะ!"
10015050-96 = "คนร้ายที่ขโมยหุ่นยนต์เชียร์...?"
10015050-98 = "หุ่นยนต์...เชียร์?"
10015050-99 = "เชียร์...?"
10015050-100 = "[s1] \"ทำไมทุกคนตกใจขนาดนั้นล่ะ...\"\n[s2] \"หรือว่า... พวกเธอจะไม่ใช่คนร้าย?\""
10015050-103 = "พวกเราไม่เคยขโมยหุ่นยนต์เชียร์เลยนะ! พวกเราก็แค่..."
10015050-104 = "ใช่แล้ว! พวกเราก็แค่ก่อเหตุระเบิด แฮ็กเซิร์ฟเวอร์ขัดขวางงานมหกรรมแข่งขันกีฬาเท่านั้น เราไม่เคย#nขโมยหุ่นยนต์เชียร์เลย—"
10015050-105 = "อ๊ะ ซวยแล้ว..."
10015050-107 = "ฮุฮุ ท่าทางนักเรียนพวกนี้จะเป็นคนร้ายตัวจริงเสียงจริงเลยนะคะ"
10015050-108 = "ไม่รู้หรอกนะคะว่าทุกคนพยายามขัดขวางงานมหกรรมแข่งขันกีฬากันทำไม แต่ตอนนี้ควรจะพอได้แล้ว#nละค่ะ"
10015050-109 = "<ฮาโลเฟสติวัล> เป็นเทศกาลที่เปี่ยมไปด้วยความปรารถนาของเหล่านักเรียนทั่วทั้งคิโวทอสเลยนะคะ"
10015050-110 = "แต่ความพยายามที่จะขัดขวางงานของทุกคน ทำให้ทั้งเซมิน่าและนักเรียนคนอื่นๆ มากมายต้องเดือด#nร้อนค่ะ"
10015050-111 = "ถ้ายอมคืนหุ่นยนต์มาแต่โดยดี ฉันก็จะทำเหมือนว่าเรื่องนี้ไม่เคยเกิดขึ้นให้ค่ะ..."
10015050-112 = "เพราะว่าถ้านักบัญชีที่เยือกเย็นแห่งเซมิน่าของเรามารู้เรื่องนี้ทีหลังละก็..."
10015050-113 = "ฉันเองก็ไม่อาจรับประกันได้หรอกนะคะ ว่าพวกคุณจะต้องเจอกับอะไรบ้าง"
10015050-115 = "นักบัญชีที่เยือกเย็นแห่งเซมิน่า หรือจะหมายถึง... นักบัญชียูกะ?"
10015050-116 = "พอมาคิดๆ ดูแล้ว... เหมือนจะเคยได้ยินข่าวลือเรื่องนี้อยู่นะ"
10015050-117 = "เห็นว่ามีนักเรียนคนหนึ่งสร้างสิ่งประดิษฐ์ที่ไม่เหมาะสมขึ้นมา ก็เลยโดนนักบัญชียูกะตัดงบการวิจัย#nทั้งหมด แล้วจากนั้นก็ล้มละลายไปเลย"
10015050-118 = "สำหรับนักเรียนโรงเรียนมิลเลเนียมแล้ว การตัดงบวิจัยก็ไม่ต่างอะไรกับโดนโทษขั้นสูงสุด... เลือดเย็นอะไรขนาดนั้นกันนะ..."
10015050-120 = "แต่ว่าคำขู่แค่นั้น มันทำลายความตั้งใจของพวกเรา <ก.ต.ฮ.> ไม่ได้หรอก!"
10015050-121 = "[s] \"ก.ต.ฮ....?\""
10015050-122 = "ใช่แล้ว พวกเรา <กลุ่มนักเรียนมิลเลเนียมที่เป็นปฏิปักษ์ต่อฮาโลเฟสติวัล>..."
10015050-123 = "หรือสั้นๆ ก็คือ <ก.ต.ฮ.> ยังไงล่ะ!"
10015050-124 = "ถ้าคิดว่านักเรียนมิลเลเนียมทุกคนตั้งตารอการได้เป็นเจ้าภาพงานมหกรรมแข่งขันกีฬาอยู่ละก็ คิดผิดแล้ว!"
10015050-125 = "มีนักเรียนที่ไม่เห็นด้วยกับงานมหกรรมแข่งขันกีฬาด้วยงั้นเหรอ ไม่อยากเชื่อ..."
10015050-126 = "นะ... แน่นอนว่าก็รู้สึกผิดต่อนักเรียนที่อุตส่าห์เตรียมงานกันมาอยู่หรอกนะ..."
10015050-127 = "แต่ว่าพวกเราก็มีเหตุผลที่ถอยไม่ได้อยู่เหมือนกัน!"
10015050-129 = "...แล้วตอนนี้หุ่นยนต์เชียร์ที่ขโมยไปอยู่ที่ไหน?"
10015050-130 = "ถ้าไม่ยอมคืนให้ดีๆ ก็คงจะต้องใช้กำลังเอาคืนมาละนะ"
10015050-132 = "ก็บอกแล้วไงว่าพวกเราไม่ได้ขโมยหุ่นยนต์เชียร์ไปน่ะ"
10015050-133 = "แบบนี้คงจะพูดกันไม่รู้เรื่องสินะ... ช่วยไม่ได้"
10015050-134 = "ถ้างั้นก็เจอ 'รถถัง' ที่พวกเราขโมยมาจากชมรมวิศวกรรมหน่อยเป็นไง!"
10015050-139 = "จงออกมา <แทร็กครัชเชอร์>!"
10015050-145 = "[ns] \"นะ... นั่นมันอะไรน่ะ?!\""
10015050-146 = "เดี๋ยวนะ ไม่เห็นเคยได้ยินเลยว่าเรื่องนี้มีรถถังเข้ามาเกี่ยวด้วย!"
10015050-147 = "อ่ะฮ่ะฮ่า! นั่นอะไรน่ะ เท่สุดๆ ไปเลยนี่นา!"
10015050-148 = "หุ่นยนต์รูปทรงลูกบอลนั่นคือสิ่งที่ชมรมวิศวกรรมสร้างขึ้นมาเหรอ? ถึงสีสันจะไม่จี๊ดจ๊าดเท่าไร แต่การออกแบบนี่ถือว่าสิบเต็มสิบ!"
10015050-149 = "อืม... โล่งอกไปทีนะที่เหมือนจะยังทำงานได้ปกติ"
10015050-151 = "หมายความว่าไง <แทร็กครัชเชอร์> งั้นเหรอ ตั้งชื่ออะไรน่ะ ไม่เห็นจะได้เรื่องเลย"
10015050-152 = "ถ้ามีเวลาเหลืออีกสักหน่อยก็คงจะตั้งชื่อเท่ๆ ที่เหมาะกับหุ่นยนต์นั่นให้แล้วแท้ๆ"
10015050-153 = "...พูดแบบนั้นมันก็ยังไงอยู่นะคะ รุ่นพี่อุทาฮะเองก็ไม่ได้มีเซนส์การตั้งชื่อที่ดีสักเท่าไรนี่คะ"
10015050-154 = "...ชื่อ <แทร็กครัชเชอร์> ไปก่อนก็ไม่น่าจะเป็นอะไรนะ?"
10015050-155 = "อืม เหมือนว่าผู้ใช้งานจะพอใจนะ ถ้างั้นฉันก็ไม่มีอะไรจะแย้ง..."
10015050-156 = "...ชมรมวิศวกรรมทุกคนคะ?"
10015050-161 = "ถึงตอนที่เห็นแบบร่างฉันจะคาดการณ์เอาไว้แล้วก็เถอะ แต่ว่า..."
10015050-163 = "รถถังนั่นมันหมายความว่ายังไงกันคะ?"
10015050-164 = "เอ่อ เรื่องนั้น คือว่า..."
10015050-165 = "ก็อย่างที่เห็น หุ่นยนต์เชียร์ไง"
10015050-166 = ".........."
10015050-172 = "ต้องหุ้มด้วยเกราะแข็งแรงพิเศษขนาดนั้นเลยเหรอคะ?"
10015050-173 = "ก็เห็นบอกว่าให้ช่วยสร้างหุ่นยนต์ที่ทนทานและไม่ได้รับความเสียหายอะไรเลย แม้จะเจออุบัติเหตุที่#nคาดไม่ถึงนี่คะ"
10015050-174 = "เกราะแข็งแรงพิเศษแบบทนไฟอันนี้ กระสุนปืนยิงไม่เข้าแน่นอนค่ะ!"
10015050-181 = "แล้วสายพานล้อตะขาบนั่น..."
10015050-182 = "ถ้าจะต้องเคลื่อนที่เพื่อคอยนำทางผู้ชม มันก็ต้องเคลื่อนที่ได้สะดวกๆ ในทุกพื้นที่ใช่มั้ยล่ะ..."
10015050-183 = "แบบนี้ไม่ว่าจะเป็นสนามกีฬาที่มีทางลาดชันมากแค่ไหนก็หายห่วง"
10015050-190 = "...แล้วปืนกลขนาด 15 มม. ทำไมถึงไปอยู่ตรงนั้นล่ะคะ?"
10015050-191 = "ถึงจะบอกว่างานมหกรรมแข่งขันกีฬาเป็นเทศกาลแห่งสันติภาพ แต่ก็อาจจะมีผู้ไม่หวังดีที่คิดจะมา#nทำลายสันติภาพก็ได้นะ"
10015050-192 = "แล้วอีกอย่าง เราก็ติดตั้งโหมดต่อสู้ที่ใช้ปราบปรามกองกำลังเอาไว้ เพื่อรับมือสถานการณ์ที่คาดไม่ถึง#nด้วยนะ"
10015050-193 = "อย่างนั้นเองสินะคะ..."
10015050-194 = "[s] \"โนอาควรจะต่อต้านสิ ไม่ใช่เข้าร่วม!\""

[translation]
10015050-1 = "第5話;反對晄輪大祭的集會"
10015050-4 = "這……是即將在大運動會上使用的機器人對吧？"
10015050-5 = "不管怎麼看都像「戰車」……"
10015050-6 = "他們究竟打算拿這麼可怕的東西來做什麼……？"
10015050-7 = "拿來比滾大球嗎……？"
10015050-8 = "這麼重的鐵塊，徒手滾得動嗎？#n而且下面裝有輪胎耶？"
10015050-9 = "或者是賽跑時，追在後頭幫忙配速之類的……"
10015050-10 = "竟然要不斷逃避機器人的追擊，光是想像就覺得好可怕……"
10015050-11 = "哼……事到如今，我也不會感到驚訝了。"
10015050-12 = "畢竟那些傢伙總是以「塑造健康的體格」、「增進友誼」為藉口，不斷折磨著別人。"
10015050-13 = "這個戰鬥機器人，大概也是那些傢伙用來拷問的邪惡機器之一吧。"
10015050-15 = "……果然應該停辦大運動會！"
10015050-20 = "你剛才是說「大運動會」嗎？"
10015050-21 = "噫，噫噫！？"
10015050-22 = "訓，訓練部的部長……？#n你是什麼時候來的……？"
10015050-23 = "啊，嚇到你的話，我很抱歉。"
10015050-24 = "我剛好運動完，正準備回去，無意間聽見你們在說大運動會的事。"
10015050-25 = "這麼晚了還不睡覺，聊得興高采烈……"
10015050-26 = "各位果然也很期待明天的大運動會吧！"
10015050-28 = "那個，該怎麼說呢……"
10015050-29 = "我們並不期待大運動會……"
10015050-30 = "呵呵，沒關係，我明白。#n我同樣也是因為期待明天的大會而難以入眠。"
10015050-31 = "大運動會……是以「健全的精神寄宿於健全的肉體」為理念，#n透過運動使學生們成長的活動……"
10015050-32 = "和不同學園相互切磋，光明正大地競賽。#n這樣的慶典竟然是由我們千年學園負責舉辦……"
10015050-33 = "興奮到睡不著覺是很正常的！"
10015050-36 = "（這個人……明明我什麼都沒回答，怎麼就自顧自地說起來了呢？）"
10015050-37 = "（所以我才不擅長應付體育類型的學生……）"
10015050-39 = "話說回來，各位打算參加哪一個項目呢？"
10015050-40 = "我沒有要偷聽的意思，不過剛才好像聽見你們在討論關於滾大球的事……"
10015050-41 = "啊……對！#n我們打算參加滾大球競賽。"
10015050-42 = "所以我們想在大會開始前進行最後的作戰檢討……"
10015050-43 = "滾大球的……作戰計畫嗎？"
10015050-44 = "果，果然針對滾大球競賽制定作戰計畫很奇怪嗎……？"
10015050-45 = "不，我認為這個態度很棒！"
10015050-49 = "滾大球事實上和一般人的印象不同，是非常不簡單的！"
10015050-55 = "想要穩定推動球體的話，#n上半身就需要具備足夠的力量，以及在折返時快速控制球體方向的爆發力。"
10015050-57 = "考慮到跑道上可能發生的不規則彈跳，#n必須裝備可輕易轉換方向的釘鞋並鍛鍊下半身的力量──"
10015050-68 = "呃，那個……"
10015050-69 = "不好意思……我們差不多該回去了……"
10015050-75 = "堇部長！快捉住那些學生！"
10015050-76 = "咦？老師和貝里塔斯的成員們？還有……"
10015050-85 = "工程師部的巨匠們！？#n那個穿著到底是……"
10015050-86 = "那個……這套服裝是……"
10015050-87 = "我們順勢追著老師過來……該說是沒有換衣服的機會嗎。"
10015050-92 = "要說明這套服裝，得從前年響開始迷上Cosplay開始說起──"
10015050-93 = "抱歉，亞都梨。#n現在時間緊迫，說明就先省略吧。"
10015050-94 = "結論就是……"
10015050-95 = "那群學生是竊取我們應援機器人的嫌犯！"
10015050-96 = "竊取應援機器人的嫌犯……？"
10015050-98 = "應援……機器人？"
10015050-99 = "應援……？"
10015050-100 = "[s1]「為何大家都嚇一跳呢……」\n[s2]「難道……犯人不是他們嗎？」"
10015050-103 = "我們沒有竊取應援機器人！我們只是……"
10015050-104 = "對啊！#n我們雖然為了妨礙大運動會而引爆炸彈、入侵伺服器，但應援機器人這事──"
10015050-105 = "啊，糟糕……"
10015050-107 = "呵呵，看來他們就是犯人沒錯呢。"
10015050-108 = "雖然不清楚各位阻撓大運動會的理由，可以麻煩就此停手嗎？"
10015050-109 = "「晄輪大祭」乘載了許多學生的期望，是屬於全奇普托斯的慶典。"
10015050-110 = "各位的妨礙不僅會讓我們研討會傷腦筋，還會連帶影響許多學生。"
10015050-111 = "只要你們立刻交出機器人，我就不再追究這件事……"
10015050-112 = "否則如果讓我們研討會的「冷酷計算機」知道這件事……"
10015050-113 = "他會有什麼反應，我可就不清楚了哦。"
10015050-115 = "研討會的「冷酷計算機」……是指那個優香嗎？"
10015050-116 = "……我曾經聽說過這樣的傳聞。"
10015050-117 = "有一名學生由於發明莫名其妙的東西而得罪了優香會計，#n最終因為研究經費被刪減而慘遭破產……"
10015050-118 = "刪減千年學生的研究經費就和宣判死刑沒兩樣啊……真是太可怕了……"
10015050-120 = "但我們「晄．反．會」是不會因為這點威脅就屈服的！"
10015050-121 = "[s]「晄．反．會……？」"
10015050-122 = "沒錯……我們是「晄輪大祭反對舉辦之千年學生集會」──"
10015050-123 = "簡稱「晄．反．會」！"
10015050-124 = "如果你們認為千年的學生都很期待大運動會，那就大錯特錯了！"
10015050-125 = "竟然有學生反對大運動會，怎麼會這樣……"
10015050-126 = "雖，雖然對努力準備大運動會的學生們很抱歉……"
10015050-127 = "但我們也有不能退縮的理由！"
10015050-129 = "……你們偷走的應援機器人在哪裡？"
10015050-130 = "如果你們不願意歸還，我們也只能強制回收。"
10015050-132 = "就說了，我們才沒有竊取什麼應援機器人。"
10015050-133 = "既然你們無法溝通……那就沒辦法了。"
10015050-134 = "就用從工程師部偷來的「戰車」來對付你們吧！"
10015050-139 = "出來吧，「賽道破壞者」！"
10015050-145 = "[ns]「那，那是什麼！？」"
10015050-146 = "等等，我可沒聽說過這裡有戰車呀！"
10015050-147 = "啊哈哈！那是什麼？超帥的！"
10015050-148 = "那個球形機器人是工程師部製造的嗎？#n雖然塗裝有點差強人意，但設計感十足耶！"
10015050-149 = "……嗯。#n能順利啟動真是太好了。"
10015050-151 = "「賽道破壞者」……命名的品味還差了點呢。"
10015050-152 = "多給我一點時間的話，我會幫那個機器人取個更帥氣的名字。"
10015050-153 = "……雖然這樣說不太好，但詠葉前輩的取名品味也是半斤八兩。"
10015050-154 = "……「賽道破壞者」還不賴呀？"
10015050-155 = "唔呣……如果使用者滿意的話，我也沒有異議……"
10015050-156 = "……工程師部的各位？"
10015050-161 = "雖然在看見設計圖時，我就多少有所預期……"
10015050-163 = "請問那輛戰車是怎麼回事呢？"
10015050-164 = "啊，那個……就是……"
10015050-165 = "如你所見，是應援機器人。"
10015050-166 = "…………"
10015050-172 = "包覆著堅固的裝甲？"
10015050-173 = "因為你拜託我們要設計得堅固一點，以免發生意外而故障。"
10015050-174 = "裝甲經過熱處理，一般的子彈根本無法傷它分毫！"
10015050-181 = "外輪履帶……"
10015050-182 = "為了能輕易地移動到會場的任何地方引導觀眾……"
10015050-183 = "即使是陡坡多的運動場也能放心使用。"
10015050-190 = "……那15mm機關炮呢？"
10015050-191 = "大運動會雖說是和平的慶典，#n但對和平心生不滿的不良分子仍是無所不在的。"
10015050-192 = "為了能應對突發狀況並進行武力鎮壓，所以我安裝了戰鬥模式。"
10015050-193 = "……原來如此。"
10015050-194 = "[s]「……別這麼簡單就被說服啊！」"
10015050-195 = "哎呀，失禮了……一不小心就被這嶄新的創意給驚呆了。"
10015050-203 = "現在不是說笑的時候了吧！？快想辦法處理那輛戰車！"
10015050-204 = "……雖然心中的疑問堆積如山，但現在似乎不是悠哉閒聊的時候呢。"
10015050-205 = "老師，拜託你指揮了。"

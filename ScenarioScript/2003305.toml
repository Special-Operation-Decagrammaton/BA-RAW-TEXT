2003305-10 = "3;마코토;06;……훌쩍.\n#3;stiff"
2003305-11 = "3;마코토;04;같은 메이커라고 생각했더니, 디럭스니 임페리얼이니, 거기다 기간 한정판까지 있을 줄이야……."
2003305-12 = "3;마코토;06;엣취!\n#3;jump"
2003305-13 = "3;마코토;05;뭐, 이리 복잡하게 꼬아놓은 건지……\n#3;stiff"
2003305-14 = "3;마코토;06;에……에엣취!\n#3;hophop"
2003305-15 = "3;마코토;05;에이잇! 좀 더 이해하기 쉬운 물건은 없는 게냐! ……훌쩍.\n#3;em;[!]"
2003305-16 = "[s] \"마코토? 여기서 뭐 해?\""
2003305-17 = "3;마코토;11;읗어어어허어어어거?!\n#3;em;[?!]\n#3;shake"
2003305-18 = "3;마코토;11;……엣취! 쿨럭쿨럭쿨럭쿨럭!!!!\n#3;stiff"
2003305-19 = "[s] \"앗! 괜찮아?!\""
2003305-20 = "3;마코토;06;쿨럭쿨럭. 후아. 후우우우……. 훌쩍.\n#3;stiff\n#3;em;[속상함]"
2003305-21 = "3;마코토;04;차분히 이것저것 쇼핑을 하던 와중에 대담하게도 이 몸에게 말을 걸어오는, 목숨 아까운 줄 모르는 녀석이 누군가 했더니, 선생이었나."
2003305-22 = "[s] (딱히 차분했던 거 같지는 않은데.)"
2003305-23 = "3;마코토;05;아아, 여기서 뭘 하고 있었느냐고? 아까 말한 대로…… 훌쩍.\n#3;em;…"
2003305-24 = "3;마코토;04;모처럼 쉬는 날이니 필요한 물건을."
2003305-25 = "3;마코토;06;………엣-취!\n#3;jump"
2003305-26 = "3;마코토;06;크으으읍. 훌쩍…….\n#3;stiff\n#3;em;[훌쩍]"
2003305-27 = "3;마코토;05;……사려고 쇼핑을 나왔을 뿐이다."
2003305-28 = "[s] \"그런 건 직접 사러 나오는 거구나. 조금 의외네.\""
2003305-29 = "3;마코토;06;흐으으읍. 후아. \n#3;em;[속상함]\n#3;stiff"
2003305-30 = "3;마코토;05;………참된 리더라 함은, 다른 누군가에게 떠넘기기보다 직접 발로 움직여야 하는 법이니까."
2003305-31 = "3;마코토;03;키시싯. 그러는 선생은…… 잠시 쇼핑을 나왔다고?"
2003305-32 = "3;마코토;02;……최근에 나온 페로로 님 굿즈가 갖고 싶어서? 페로로라는 건…… 이 하마를 말하는 건가?\n#3;em;[?]"
2003305-33 = "3;마코토;06;엣취!\n#3;jump"
2003305-34 = "3;마코토;04;페로로 님은 하마가 아니야……? 그거참. 복잡하군.\n#3;em;[땀]"
2003305-35 = "[s1] \"그, 그보다 마코토도 필요한 물건을 사러 나왔다 했지.\"\n[s2] \"하지만 마코토의 장바구니에 담겨 있는 그것들은…….\""
2003305-36 = "#wait;10"
2003305-37 = "#wait;10"
2003305-38 = "3;마코토;03;키시싯. 그래. 보다시피 고양이용 생쥐 장난감과 고양이용 간식 <뉴~루>다.\n#3;em;[재잘]"
2003305-39 = "3;마코토;03;이 전부가 엠퍼러 · 라이언마루 · 주니어 3세를 위해 필요한 물건들이지."
2003305-40 = "[s] \"아…… 라이언마루라면 그때의 그…….\""
2003305-41 = "3;마코토;02;그러고 보니 저번에 선생도 본 적이 있던가."
2003305-42 = "3;마코토;10;키시싯. 여러모로 까다로운 녀석이라, 특정 메이커의 사료가 아니면 영 먹으려 들지 않아서. 오늘은 여기까지 와서 구매한 참이다.\n#3;em;[재잘]"
2003305-43 = "[s] \"아, 그래서 그런 모모톡을……… 생각보다 귀여워하고 있구나.\""
2003305-44 = "3;마코토;02;이 몸이 고양이를 귀여워한다고?\n#3;em;[?]"
2003305-45 = "3;마코토;05;아니, 그건 착각이다. 선생."
2003305-46 = "[s] \"……응?\""
2003305-47 = "3;마코토;99;이 몸이 라이언마루 주니어 3세를 거둬들여 키우는 건 어디까지나 사업적 감각에 의거한……\n#3;em;…"
2003305-48 = "3;마코토;02;요컨대 투자와 같지. 라이언마루, 녀석은 일종의 상징이다."
2003305-49 = "3;마코토;05;그 녀석이 내면에 품고 있는…… 그 숨길 수 없는 야성은, 가꾸면 가꿀수록 빛나는 매력을 지니고 있지."
2003305-50 = "3;마코토;10;녀석을 계속해서 꾸준히 키워내어, 언젠가는 만마전을 대표하는…… 이 하누마 마코토 님의 충복으로서 키우는 것이……\n#3;stiff"
2003305-51 = "3;마코토;06;엣취……!\n#3;jump"
2003305-52 = "3;마코토;03;……이 몸의 최종 목표다.\n#3;em;[반짝]\n#3;stiff"
2003305-53 = "3;마코토;10;크크큭…… 그래…… 훌쩍. 라이언 마루 녀석……"
2003305-54 = "3;마코토;10;이대로 계속해서 키우다 보면, 언젠가는 용맹한 사자처럼 성장하여 위용을 보여줄……."
2003305-55 = "[s] \"마코토, 고양이가 성장한다고 사자가 되지는…….\""
2003305-56 = "3;마코토;06;에, 엣취!\n#3;jump"
2003305-57 = "3;마코토;03;키킥. 그건 단순히 기합이 부족해서 그런 것일 뿐."
2003305-58 = "3;마코토;99;이대로 라이언마루를 용맹하게 성장시켜, 미래에는 녀석을 홍보하기 위한 전용 동영상 채널을 만들고…… 만마전을 홍보하는 수단으로써 혹독하게 굴려줄 생각이다."
2003305-59 = "3;마코토;10;자, 이 몸의 장대한 계획을 듣고 나니 어떤가. 선생."
2003305-60 = "3;마코토;10;앞으로 만마전의 위세가 더욱 커지기 전에, 먼저 협력을 생각하는 쪽이 좋을 거라고?\n#3;em;[음표]"
2003305-61 = "3;마코토;03;지금 재빨리 손을 잡는다면, 아직 이 몸 이외엔 그 누구도 건드려본 적이 없는 라이언마루의 육구를 만질 수 있는 기회를 줄 테니까. 크크큭"
2003305-62 = "3;마코토;02;응? 아무리 그래도 육구 같은 거에 홀리진 않아?"
2003305-63 = "3;마코토;10;뭘 모르는군. 선생. 저번에 찍은 녀석의 사진을 보면 그런 말은 절대로 못 할 텐데?\n#3;em;[반짝]"
2003305-64 = "[s] \"그보다 귀여워하는 거 맞네……!\""
2003305-65 = "3;마코토;04;그러니까 그런 개인적인 감정은…….\n#3;em;[반응]"
2003305-66 = "3;마코토;04;가, 감정은……\n#3;stiff"

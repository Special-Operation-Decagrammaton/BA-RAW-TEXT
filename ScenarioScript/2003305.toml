2003305-124 = "#na;마코토;알레르기 때문에, 아쉽게도 라이언마루의 담당은 다른 부원들에게 맡길 수밖에 없었다마는."
2003305-125 = "#na;마코토;그렇다고는 해도 내 눈으로 지켜본 라이언마루의 늠름한 모습은, 꾸준히 선생에게 보내주도록 하지."
2003305-126 = "#na;마코토;자! 지금 만마전에 협력한다면…… 좀 더 특별한 비장의 사진도 보내줄 수 있으니 말이다!"

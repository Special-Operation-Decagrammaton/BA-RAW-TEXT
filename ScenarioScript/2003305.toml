[translation]
2003305-1 = "กิจกรรมยามว่างของท่านประธานผู้ยิ่งใหญ่"
2003305-2 = "(ตอนที่คุณครูออกมาซื้อของที่ร้านค้าใกล้ๆ ชาเล่ต์ในวันหยุดพักผ่อน)"
2003305-3 = "[ns] \"นานแล้วนะ ที่ได้ซื้อเนื้อกลับไป... หืม?\""
2003305-8 = "[ns] \"นั่นมัน... มาโคโตะ?\""
2003305-9 = "อืม... อันนี้ก็ไม่ใช่ อันนั้นก็... ไม่น่าใช่นะ"
2003305-10 = "ฮิ๊ก...!"
2003305-11 = "คิดว่าเป็นผู้ผลิตเดียวกันแท้ๆ แต่มีทั้งดีลักซ์ ทั้งอิมเพเรียลเลยแฮะ แถมไม่นึกเลยว่าจะขายแบบ#nจำกัดเวลาอีกด้วย... "
2003305-12 = "ฮัดชิ่ว!"
2003305-13 = "อะไรเนี่ย ซับซ้อนจริงๆ เลย..."
2003305-14 = "ฮะ... ฮัดชิ่ว!"
2003305-15 = "ฮึ่ยยย! ไม่มีของที่เข้าใจได้ง่ายๆ เลยรึไงกัน...! ฮิ๊ก...!"
2003305-16 = "[s] \"มาโคโตะ? ทำอะไรอยู่น่ะ?\""
2003305-17 = "อะ...อ้ากกกกก?!"
2003305-18 = "ฮะ...ฮัดชิ่ววว! แค่กๆๆ แค่กๆๆ...!!!"
2003305-19 = "[s] \"อ๊ะ เป็นอะไรรึเปล่า?!\""
2003305-20 = "แค่กๆ แค่กๆ ฮู่ว... ฮู่วววว ฮึ่ก~!"
2003305-21 = "ก็นึกว่าคนบ้าไม่รักกลัวตัวกลัวตายที่ไหนซะอีก ถึงได้กล้าเข้ามาคุยกับเราที่กำลังเพลิดเพลินกับการ#nซื้อของอยู่แบบนี้ ที่แท้ก็เป็นคุณครูนี่เอง"
2003305-22 = "[s] (ไม่ได้ดูเพลิดเพลินเลยสักนิดเดียว)"
2003305-23 = "อ้อ เรามาทำอะไรที่นี่น่ะเหรอ? ก็อย่างที่บอกไป... อึ๊ก!"
2003305-24 = "นานๆ ทีเราก็ออกมาซื้อของจำเป็นในวันหยุด..."
2003305-25 = "ฮะ...ฮัดชิ่ววว!"
2003305-26 = "อึก... ฮิ๊ก...!"
2003305-27 = "เราก็แค่ออกมาซื้อของเฉยๆ น่ะ"
2003305-28 = "[s] \"ออกมาซื้อของเองเลยเหรอ คาดไม่ถึงเลยนะ\""
2003305-29 = "ซูดดด... ฮู่ว... "
2003305-30 = "ในฐานะผู้นำ ควรออกมาซื้อของด้วยตัวเองมากกว่าให้คนอื่นทำแทนอยู่แล้ว"
2003305-31 = "คิกคิกคิก แล้วคุณครูล่ะ... แวะมาซื้อของงั้นเหรอ?"
2003305-32 = "อยากได้สินค้าของท่านเพโรโร่ที่เพิ่งวางขายงั้นเหรอ...? เพโรโร่... หมายถึงเจ้าฮิปโปนั่นน่ะนะ?"
2003305-33 = "ฮัดชิ่ว!"
2003305-34 = "ท่านเพโรโร่ไม่ใช่ฮิปโปงั้นเหรอ...? ฮึ่ม ยุ่งยากซะจริงๆ"
2003305-35 = "[s1] \"วะ...ว่าแต่ว่ามาโคโตะบอกว่ามาซื้อของจำเป็นสินะ...\"\n[s2] \"แต่ว่าของที่อยู่ในตะกร้านั่นมัน...\""
2003305-38 = "คิกคิกคิก ใช่แล้ว อย่างที่เห็นแหละ ของเล่นแล้วก็ขนม <เนียน~รุ> สำหรับแมว"
2003305-39 = "ทั้งหมดนี่เป็นของจำเป็นสำหรับจักรพรรดิไลอ้อนมารุ จูเนียร์ที่ 3 น่ะ"
2003305-40 = "[s] \"อ้อ ไลอ้อนมารุ หมายถึงน้องแมวตอนนั้น...\""
2003305-41 = "พอนึกดูแล้ว คุณครูเองก็เคยเจอไปแล้วเมื่อครั้งก่อนนี่นะ"
2003305-42 = "คิกคิกคิก เจ้านั่นค่อนข้างเอาใจยาก ถ้าไม่ใช่อาหารยี่ห้อที่คุ้นเคย ก็จะไม่ยอมกินเลย เพราะงั้นวันนี้#nเราก็เลยออกมาซื้อเองยังไงล่ะ"
2003305-43 = "[s] \"อ้อ ที่บอกในแชตเมื่อตอนนั้น... เอ็นดูน้องแมวมากกว่าที่คิดนะเนี่ย\""
2003305-44 = "ดูเหมือนเราจะเอ็นดูแมวมากๆ งั้นเหรอ?"
2003305-45 = "เปล่าเลย เข้าใจผิดแล้วละคุณครู"
2003305-46 = "[s] \"หืม...?\""
2003305-47 = "เหตุผลที่เรารับเจ้าไลอ้อนมารุมาเลี้ยง ก็เป็นเพราะเหตุผลทางธุรกิจเท่านั้น..."
2003305-48 = "พูดง่ายๆ คือเป็นการลงทุนชนิดหนึ่ง ไลอ้อนมารุ... เจ้านั่นจะกลายมาเป็นสัญลักษณ์อย่างหนึ่งยังไงล่ะ"
2003305-49 = "สัญชาติญาณสัตว์ป่าที่เจ้านั่นเก็บซ่อนเอาไว้... ความดุร้ายที่หลับใหลอยู่ในตัวเจ้านั่น เรามั่นใจว่าถ้าดูแลและขัดเกลาให้ดี ก็จะยิ่งมีเสน่ห์ที่เปล่งประกายมากขึ้น"
2003305-50 = "และถ้าเลี้ยงดูเจ้านั่นอย่างดีต่อไปละก็ สักวันหนึ่งเจ้านั่นก็จะกลายเป็นตัวแทนของแพนเดโมเนียม โซไซตี้... ที่ถูกชุบเลี้ยงมาในฐานะข้ารับใช้ที่ภักดีต่อท่านฮานุมะ มาโคโตะผู้นี้..."
2003305-51 = "ฮัดชิ่ว...!"
2003305-52 = "เป้าหมายสูงสุดของเรา..."
2003305-53 = "หึหึหึ... ใช่แล้ว ฮิ๊ก! เจ้าไลอ้อนมารุ... "
2003305-54 = "ถ้าเราเลี้ยงดูเจ้านั่นต่อไปแบบนี้ละก็ มันก็จะเติบโตขึ้นเป็นราชสีห์ผู้หาญกล้าในสักวันหนึ่ง..."
2003305-55 = "[s] \"มาโคโตะ น้องแมวจะโตไปเป็นสิงโตได้ยังไง...\""
2003305-56 = "ฮะ... ฮัดชิ่วว!"
2003305-57 = "คิกคิก นั่นก็เพราะจิตวิญญาณยังไม่แข็งกล้าพอยังไงล่ะ"
2003305-58 = "พอเจ้าไลอ้อนมารุเติบโตเป็นราชสีห์ผู้หาญกล้า เราวางแผนที่จะทำช่องขึ้นเพื่อโพสต์วิดีโอโปรโมต#nโดยเฉพาะ... แล้วก็โปรโมตแพนเดโมเนียม โซไซตี้ด้วยเลย"
2003305-59 = "เอาละ ได้ฟังแผนการอันยิ่งใหญ่ของเราแล้ว คิดว่ายังไงล่ะ คุณครู"
2003305-60 = "เข้าร่วมกับเราซะตอนนี้จะดีกว่า ก่อนที่อำนาจของแพนเดโมเนียม โซไซตี้จะยิ่งใหญ่ขึ้นกว่านี้น่ะ"
2003305-61 = "ถ้ายอมตกลงร่วมมือกับเราตั้งแต่ตอนนี้ เราจะยอมให้โอกาสคุณครูในการสัมผัสอุ้งเท้าแสนนุ่มนิ่มของ#nไลอ้อนมารุที่ไม่เคยมีคนอื่นนอกจากเราได้สัมผัสมาก่อน คิกคิกคิก"
2003305-62 = "หืม? ยังไงก็จะไม่ยอมโดนล่อลวงด้วยอุ้งเท้านุ่มนิ่มงั้นเหรอ?"
2003305-63 = "ไม่รู้อะไรเอาซะเลยจริงๆ นะ คุณครู เดี๋ยวพอเห็นรูปของเจ้านั่นแล้วคงจะปฏิเสธง่ายๆ แบบนี้ไม่ได้แน่"
2003305-64 = "[s] \"น่ารักน่าเอ็นดูจริงๆ ด้วย...!\""
2003305-65 = "เพราะงั้นความรู้สึกส่วนตัวพวกนั้นน่ะ..."
2003305-66 = "คะ...ความรู้สึก..."
2003305-67 = "ความ..."
2003305-71 = "[ns] \"มาโคโตะ...? เป็นอะไรรึเปล่า? สีหน้าไม่ดีเลย...\""
2003305-72 = "ฮะ...ฮะ...ฮะ...ฮัดชิ่ววว!!"
2003305-73 = "แค่กๆๆ แค่กๆๆ...!!!"
2003305-78 = "[ns] \"มา...มาโคโตะ?!\""
2003305-80 = "โรงพยาบาล เกเฮนน่า"
2003305-81 = "เป็นโรคภูมิแพ้ขนแมวนี่ครับ"
2003305-82 = "หา? ภูมิแพ้..."
2003305-83 = "ฮะ... ฮัดชิ่วว!"
2003305-84 = "ฮัดชิ่ว! ฮัดชิ่ว!"
2003305-85 = "ฮัด...ชิ่วววว!!"
2003305-86 = "[s] \"ว่าแล้วเชียว...\""
2003305-87 = "แต่ว่า... จะเป็นไปได้ยังไง..."
2003305-88 = "[s] \"มาโคโตะ ไม่คิดว่ามีอะไรแปลกๆ บ้างเลยเหรอ?\""
2003305-89 = "เรื่องแปลกๆ งั้นเหรอ เรื่องนั้นก็แค่เวลาจับตัวเจ้าไลอ้อนมารุ... ก็จะรู้สักคันๆ ที่ตัว แล้วก็น้ำมูกไหล#nมากกว่าตอนปกติ..."
2003305-90 = "แล้วก็รู้สึกคันๆ คอ ตอนกลางคืนก่อนนอนก็จะจามไม่หยุดเลย"
2003305-91 = "แต่จะบอกว่าเราแพ้ขนแมวอย่างนั้นเหรอ วินิจฉัยผิดไปรึเปล่า?"
2003305-92 = "[s] \"มองจากดาวอังคารยังรู้เลยว่าอาการของโรคภูมิแพ้น่ะ?!\""
2003305-96 = "ถ้าเป็นอาการเล็กๆ น้อยๆ ละก็ แค่ดูแลให้ดีก็ควบคุมอาการของโรคได้แล้วครับ"
2003305-97 = "แต่ว่านักเรียนคนนี้... ดูเหมือนจะมีอาการแพ้หนักมากๆ เลยครับ "
2003305-98 = "[s] \"แบบนี้... ถ้ายังเลี้ยงแมวต่อไปละก็...\""
2003305-99 = "ครับ เรื่องนี้ผมเองก็ค่อนข้างลำบากใจที่จะพูดออกไป..."
2003305-100 = "แต่ถ้าเกิดอาการภูมิแพ้อย่างรุนแรงขึ้นมาละก็มันอาจจะเป็นอันตรายได้ เพราะงั้นเรื่องการอยู่ร่วมกับ#nสัตว์เลี้ยง..."
2003305-101 = "หึหึหึ"
2003305-102 = "หึหึหึ คิกคิกคิก...!"
2003305-103 = "คิกคิกคิกคิก..."
2003305-104 = "แค่กๆๆ แค่กๆๆ...!!"
2003305-105 = "[s] \"มะ... มาโคโตะ...?\""
2003305-106 = "จะบอกว่าเราไม่ควรอยู่ใกล้แมวเพราะเราเป็นภูมิแพ้อย่างนั้นเหรอ?"
2003305-107 = "ไม่เอา... ทำแบบนั้นไม่ได้หรอก"
2003305-108 = "ในเมื่อรับสัตว์มาเลี้ยงแล้วก็ต้องดูแลรับผิดชอบให้ถึงที่สุด ถึงแม้จะมีอาการภูมิแพ้ขนสัตว์ก็ตาม นั่นคือสิ่งที่ฮานุมะ มาโคโตะผู้นี้ยึดถือ!"
2003305-109 = "เราจะทำเป็นว่าไม่ได้ยินที่พูดมาก่อนหน้านี้ก็แล้วกัน"
2003305-110 = "[s] \"ไม่เป็นอะไรแน่นะ มาโคโตะ...?\""
2003305-111 = "คิกคิกคิก ไม่ต้องห่วงหรอก เราจะยังเลี้ยงเจ้านั่นเหมือนเดิม แต่เราจะลดการสัมผัสหรือเล่นกับ#nเจ้าไลอ้อนมารุให้น้อยลงกว่าก่อน"
2003305-112 = "อาการภูมิแพ้แค่นี้ ไม่มีทางทำให้แผนการอันยิ่งใหญ่ของท่านมาโคโตะผู้นี้พังทลายได้หรอก!"
2003305-113 = "คอยดูเถอะคุณครู! สักวันหนึ่ง เราจะเปิดตัววิดีโอเจ้าไลอ้อนมารุในช่องทางออนไลน์ และทำให้#nชื่อเสียงของแพนเดโมเนียม โซไซตี้เป็นที่รู้จักให้ดู!"
2003305-114 = "[s] \"เอาสิ... ยิ่งใหญ่สมเป็นมาโคโตะจริงๆ ครูเป็นกำลังใจให้นะ\""
2003305-115 = "หึหึหึ! คิกคิกคิกคิก!!!"
2003305-116 = "แค่กๆ แค่กๆๆ...!!"
2003305-118 = "(หลายวันต่อมา ระหว่างที่ทำงานอยู่ที่ชาเล่ต์)"
2003305-122 = "[ns] \"หืม...? นี่มัน... มาโคโตะส่งรูปมาเหรอ...?\""
2003305-124 = "อาการภูมิแพ้กำเริบ ทำให้เราต้องมอบหน้าที่ดูแลไลอ้อนมารุให้กับสมาชิกคนอื่นไปอย่างน่าเสียดาย"
2003305-125 = "แต่ถึงยังไง เราก็จะคอยดูการเติบโตของไลอ้อนมารุด้วยตัวเอง แล้วก็จะส่งข่าวให้คุณครูเป็นระยะก็แล้ว#nกัน"
2003305-126 = "เอ้า! ถ้ายอมตกลงร่วมมือกับแพนเดโมเนียม โซไซตี้ตอนนี้ละก็... เราจะส่งรูปถ่ายสุดพิเศษให้เลย!"
2003305-127 = "[ns] \"น่ารักอย่างที่คิดจริงๆ เลยน้า...\""
2003305-128 = "(หลังจากนั้นคุณครูก็ใช้เวลาพักผ่อนนั่งดูรูปไลอ้อนมารุที่มาโคโตะส่งมาให้)"

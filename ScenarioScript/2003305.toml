2003305-108 = "3;마코토;07;제까짓 알레르기가 있건 뭐건, 한 번 거두어들인 것이 있다면 설사 그것이 축생일지라도 끝까지 돌보는 것이 곧 이 하누마 마코토 님의 신념이다!\n#3;em;[!]\n#3;jump"

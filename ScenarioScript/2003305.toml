[translation]
2003305-1 = "The Great Chairman's Leisure Activities"
2003305-2 = "On one of my rare days off, I was shopping at a store near Schale..."
2003305-3 = "[ns] \"These prices aren't bad... It's been a while since I've had steak for—Hm?\""
2003305-8 = "[ns] \"Is that...Makoto?\""
2003305-9 = "Hm... No. Not this. And not that, either."
2003305-10 = "...*sniffle*"
2003305-11 = "These are by the same maker, but should I get the deluxe version, the imperial premium, or the special limited time release..."
2003305-12 = "Achoo!"
2003305-13 = "Why make this so needlessly complicated..."
2003305-14 = "A-A-Achoo!"
2003305-15 = "Ugh! Don't they have anything easier to understand?! ...*sniffle*"
2003305-16 = "[s] \"Makoto? Is everything all right?\""
2003305-17 = "Whuh?!"
2003305-18 = "...Achoo! *cough* A-Achoo! *cough cough*"
2003305-19 = "[s] \"Ah! Are you okay?!\""
2003305-20 = "*cough cough* *gasp*...I'm...fine. *sniffle*"
2003305-21 = "Oh, Sensei. I wondered what fool possessed audacity enough to intrude upon someone who was shopping so leisurely."
2003305-22 = "[s] \"(I don't think anyone would call that leisurely...)\""
2003305-23 = "Ah, what am I doing here? As I said... *sniff*"
2003305-24 = "It's my day off, so I decided to do some shopping."
2003305-25 = "Wha-choo!"
2003305-26 = "Ugh... *sniffle*"
2003305-27 = "...I need some...essentials."
2003305-28 = "[s] \"You buy your own groceries? That's surprising.\""
2003305-29 = "Urgh... *sniff* "
2003305-30 = "...People are more willing to follow a leader who acts for themselves rather than pass their work on to others."
2003305-31 = "Kiheheheh... *sniff* And you're out shopping as well, Sensei?"
2003305-32 = "...You're here for the new Peroro merch? Peroro... Is that this hippo creature here?"
2003305-33 = "Achoo!"
2003305-34 = "Peroro isn't a hippo...? What nonsense..."
2003305-35 = "[s1] \"A-Anyway, Makoto, you said you're here for essentials?\"\n[s2] \"You have a lot of stuff in your shopping bag.\""
2003305-38 = "Kiheheheh... Yes. I found a pack of mouse-shaped cat toys and a new flavor of Purr Purr cat treats."
2003305-39 = "They're all essential items for His Majesty, Emperor Lionmaru Junior III."
2003305-40 = "[s] \"Ah... Was Lionmaru the cat in your office?\""
2003305-41 = "I suppose you did see His Majesty, Emperor Lionmaru before."
2003305-42 = "Kiheheheh... Emperor Lionmaru is demanding, as a monarch should be. He refuses any cat food outside of the Purr Purr brand. It can be hard to find, but this store usually has some in stock."
2003305-43 = "[s] \"Oh, that explains your messages on MomoTalk... You dote on Lionmaru, huh?\""
2003305-44 = "Are you implying that I cherish a mere cat?"
2003305-45 = "No, don't misunderstand me, Sensei."
2003305-46 = "[s] \"...Huh?\""
2003305-47 = "His Majesty, Emperor Lionmaru Junior III is a key part of my plans..."
2003305-48 = "You might call him an investment. Emperor Lionmaru will be a symbol of everything I stand for."
2003305-49 = "The ferocity that rages in his heart... His regal air and royal demeanor... I knew at first sight that he was a great leader of cats as I am a great leader of students. Soon, he will eclipse every other feline alive."
2003305-50 = "I shall raise His Majesty, Emperor Lionmaru to be the perfect representative of the Pandemonium Society..."
2003305-51 = "Achoo!"
2003305-52 = "...And the right hand of the Great Makoto!"
2003305-53 = "Kiheheh... Yes... *sniffle* Emperor Lionmaru..."
2003305-54 = "I'll keep feeding and nurturing His Majesty...and one day soon he will be a magnificent lion with charisma to match my own!"
2003305-55 = "[s] \"Makoto, cats don't just grow up into lions...\""
2003305-56 = "A-Achoo!"
2003305-57 = "Kiheheh... That's only because they lack spirit."
2003305-58 = "I will encourage Emperor Lionmaru's ferocity! He'll have an exclusive streaming channel filled with promotional Lionmaru content! Then His Majesty and I will work to the bone to promote the Pandemonium Society together!"
2003305-59 = "Kiheheheh! What do you think of my grand plan, Sensei?"
2003305-60 = "Surely you realize that it's in your best interests to join forces with the Pandemonium Society before our influence outshines even yours!"
2003305-61 = "In fact, if you join us now... I'll permit you to touch Emperor Lionmaru's soft paw pads, which thus far has been a privilege reserved only for me! Kiheheheh..."
2003305-62 = "Wh-What? Soft paw pads aren't enough to convince you?"
2003305-63 = "You won't say that after you see this picture I took of them, Sensei! Here, see how you're missing out!"
2003305-64 = "[s] \"So you do love your cat!\""
2003305-65 = "A-As I said, I don't have any personal..."
2003305-66 = "F-Feelings..."
2003305-67 = "Fe..."
2003305-71 = "[ns] \"...Makoto? Are you okay? You don't look so good...\""
2003305-72 = "A-A-A-Achoo!"
2003305-73 = "*cough cough cough*"
2003305-78 = "[ns] \"Makoto?!\""
2003305-80 = "Gehenna Emergency Hospital"
2003305-81 = "You have a cat allergy."
2003305-82 = "What? An aller—"
2003305-83 = "A-Achoo!"
2003305-84 = "Achoo! Achoo!"
2003305-85 = "AAAAAA—choooo!"
2003305-86 = "[s] \"I wondered...\""
2003305-87 = "No...there's no way..."
2003305-88 = "[s] \"Makoto, haven't you noticed any health issues?\""
2003305-89 = "Of course not... I mean, my skin would itch whenever I touched His Majesty, Emperor Lionmaru, and when he rubbed his head against my face it made my nose run..."
2003305-90 = "And when he slept in my bed, my throat would tingle and I couldn't stop sneezing as I tried to fall asleep..."
2003305-91 = "But I couldn't possibly be allergic to cats! This must be a misdiagnosis!"
2003305-92 = "[s] \"Those are definitely allergy symptoms!\""
2003305-96 = "We could manage a mild allergy with treatment, but given the strength of the symptoms..."
2003305-97 = "I don't think that's possible in your case."
2003305-98 = "[s] \"Then... Living with a cat would be...\""
2003305-99 = "Yes. It pains me to say this..."
2003305-100 = "But serious allergic reactions can cause critical health issues. Raising a pet in such circumstances would be..."
2003305-101 = "Kiheheh."
2003305-102 = "Kiheheh. Kiheheheh...!"
2003305-103 = "Kiheheh..."
2003305-104 = "*cough cough cough*"
2003305-105 = "[s] \"M-Makoto?\""
2003305-106 = "I should stop living with a cat just because I'm allergic?"
2003305-107 = "...Absolutely not."
2003305-108 = "When the Great Hanuma Makoto makes a promise, I follow it to the bitter end! I took that cat into my care, I don't care if I'm allergic!"
2003305-109 = "I'm just going to pretend you never said anything."
2003305-110 = "[s] \"...Makoto, are you sure?\""
2003305-111 = "Kiheheh! Absolutely! Of course, I'll need to avoid handling His Majesty, Emperor Lionmaru personally...but I'm sure I can work something out..."
2003305-112 = "Besides, my grand designs won't falter from something as petty as an allergy!"
2003305-113 = "One day soon, a video of Emperor Lionmaru will go viral, carrying the name of the Pandemonium Society along with it! Wait for that day, Sensei!"
2003305-114 = "[s] \"...Heh. That's very like you, Makoto. I'll be rooting for you.\""
2003305-115 = "Kiheheh. Kiheheheheh!!!"
2003305-116 = "... *cough cough*"
2003305-118 = "A few days later when I was working at Schale..."
2003305-122 = "[ns] \"Hm...? A picture from Makoto?\""
2003305-124 = "Unfortunately His Majesty, Emperor Lionmaru must make his residence with some club members due to my allergies..."
2003305-125 = "But his valiant heart remains undaunted! And I shall continue to send you Lionmaru updates as I visit him each day!"
2003305-126 = "If you join forces with the Pandemonium Society... I'll even share my secret stash of Emperor Lionmaru kitten photos!"
2003305-127 = "[ns] \"...I'm glad she didn't have to say goodbye to her beloved Lionmaru.\""
2003305-128 = "I felt the weariness in my heart heal a little as I scrolled through the Lionmaru photos Makoto sent me."

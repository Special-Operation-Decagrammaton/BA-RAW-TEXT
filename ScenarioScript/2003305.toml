[translation]
2003305-1 = "偉大議長的休閒"
2003305-2 = "（某個假日，來到夏萊附近的購物中心購物）"
2003305-3 = "[ns]「今天難得過來，就買點肉回去……嗯？」"
2003305-8 = "[ns]「……那是真琴？」"
2003305-9 = "唔嗯……不是這個，也不是這個……"
2003305-10 = "……（聞聞）"
2003305-11 = "還以為反正都是同一個製造商，沒想到居然還有什麼豪華版、皇家版、限定版……"
2003305-12 = "哈啾！"
2003305-13 = "弄得這麼複雜……"
2003305-14 = "哈……哈啾！"
2003305-15 = "哎！就不能弄得好懂一點嗎？#n……（聞聞）"
2003305-16 = "[s]「真琴？你在這裡做什麼？」"
2003305-17 = "唔哦哦哦哦哦哦哦！？"
2003305-18 = "……哈啾！咳咳咳！！！"
2003305-19 = "[s]「你，你沒事吧！？」"
2003305-20 = "咳咳咳……哈啊……（吸鼻子）"
2003305-21 = "我還在想是哪個不知死活的人，敢在我悠哉購物的時候跟我說話，原來是老師啊。"
2003305-22 = "[s]（一點都不悠哉吧……）"
2003305-23 = "啊啊，你問我在這裡做什麼？#n就像我剛剛說的一樣……（吸鼻子）。"
2003305-24 = "因為難得休息，我想來買需要的東西……"
2003305-25 = "……哈啾！"
2003305-26 = "唔唔唔……（吸鼻子）"
2003305-27 = "……我只是出來購物而已。"
2003305-28 = "[s]「原來你會親自出來購物啊，讓人有點意外。」"
2003305-29 = "唔唔……呼。"
2003305-30 = "……真正的領導者必須腳踏實地。不會一味地把事情推給別人。"
2003305-31 = "嘻嘻嘻。老師……你也出來買東西嗎？"
2003305-32 = "……因為想要新上市的佩洛洛大人商品？#n佩洛洛……是指這個河馬嗎？"
2003305-33 = "哈啾！"
2003305-34 = "佩洛洛大人不是河馬……？還真複雜。"
2003305-35 = "[s1]「話，話說真琴也是來買東西的吧。」\n[s2]「不過你的籃子裡裝的東西……」"
2003305-38 = "嘰嘻嘻。就像你看見的一樣，這是貓用老鼠玩具和貓用點心「喵～嚕」。"
2003305-39 = "這全都是為了皇帝．獅子丸．Junior3世準備的東西。"
2003305-40 = "[s]「啊……獅子丸就是當時的……」"
2003305-41 = "對了，上次老師也見過吧？"
2003305-42 = "嘻嘻。那傢伙在各方面都很難照顧。#n尤其是除了特定廠商的飼料之外根本吃都不想吃，所以今天才會專程來這裡買。"
2003305-43 = "[s]「啊，才會傳那些MomoTalk……看來你比我想像中還疼牠呢。」"
2003305-44 = "你說我很疼愛貓嗎？"
2003305-45 = "不，那是你誤會了，老師。"
2003305-46 = "[s]「……嗯？」"
2003305-47 = "我之所以會收留獅子丸，說穿了只是根據事業直覺……"
2003305-48 = "簡單來說就像投資一樣。#n獅子丸那傢伙只是一種象徵而已。"
2003305-49 = "那傢伙內心深處……那無法隱藏的野性……擁有一股越是修飾就越綻放光芒的魅力。"
2003305-50 = "只要繼續培育那傢伙，牠總有一天會成為萬魔殿的代表……羽沼真琴的忠實僕……"
2003305-51 = "哈啾……！"
2003305-52 = "……這才是我最終的目標。"
2003305-53 = "嘻嘻嘻……（吸鼻子）#n獅子丸那小子……"
2003305-54 = "遲早會成長得跟獅子一樣勇猛，並且展現牠的威嚴……"
2003305-55 = "[s]「真琴，貓就算成長也不可能長成獅子啦……」"
2003305-56 = "哈，哈啾！"
2003305-57 = "嘻嘻，牠只是缺乏決心而已。"
2003305-58 = "只要讓獅子丸變得更勇猛，將來就能製作專門宣傳牠的影片頻道……#n我打算以嚴厲的方式培訓牠，藉此當作宣傳萬魔殿的手段。"
2003305-59 = "聽過我的偉大計畫之後，你有什麼感想呢？老師。"
2003305-60 = "在萬魔殿的聲勢變得更壯大之前，先考慮合作才是明智的選擇吧？"
2003305-61 = "只要立刻和我們合作，我可以給你摸摸獅子丸肉球的機會。#n除了我之外，目前還沒有其他人摸過哦！嘻嘻嘻。"
2003305-62 = "嗯？再怎麼說也不會被肉球吸引？"
2003305-63 = "這你就有所不知了，老師。#n等你看過上次幫那傢伙拍的照片之後，可能就說不出那種話囉？"
2003305-64 = "[s]「你果然很疼愛牠吧……！」"
2003305-65 = "那種私人的感情……"
2003305-66 = "感，感情……"
2003305-67 = "感……"
2003305-71 = "[ns]「真琴……？你還好嗎？臉色看起來……」"
2003305-72 = "哈，哈，哈啾！"
2003305-73 = "咳咳咳咳……嘔嘔！？！？"
2003305-78 = "[ns]「真……真琴！？」"
2003305-80 = "格黑娜學園．醫院"
2003305-81 = "是貓過敏的症狀呢。"
2003305-82 = "什麼？過……"
2003305-83 = "哈，哈啾！"
2003305-84 = "哈啾！哈啾！"
2003305-85 = "哈啾～～～！！！"
2003305-86 = "[s]「果然是這樣……」"
2003305-87 = "可是……怎麼會呢……"
2003305-88 = "[s]「真琴，這段期間你有覺得哪裡不對勁嗎？」"
2003305-89 = "要說哪裡不對勁……#n最近每次觸碰獅子丸的時候都會覺得皮膚很癢，鼻水比平常還多……"
2003305-90 = "還有喉嚨也會覺得很癢，晚上睡覺前會不停打噴嚏。"
2003305-91 = "但你竟然說我對貓過敏，會不會是誤診了啊？"
2003305-92 = "[s]「那不管怎麼看都是過敏的症狀吧！？」"
2003305-96 = "如果過敏症狀比較輕的話，只要稍作管理或許還能克服……"
2003305-97 = "不過同學你的症狀似乎比較嚴重。"
2003305-98 = "[s]「也就是說……繼續照顧貓會……」"
2003305-99 = "是的，雖然這種話實在非常難以啟齒……"
2003305-100 = "如果過敏反應太嚴重，真的會有危險的。#n繼續和動物生活在一起的話……"
2003305-101 = "嘻嘻。"
2003305-102 = "嘻嘻嘻，嘻嘻嘻嘻……！"
2003305-103 = "嘰哈哈哈……"
2003305-104 = "咳咳咳！！"
2003305-105 = "[s]「真，真琴……？」"
2003305-106 = "既然會過敏，最好還是放棄和貓一起生活？"
2003305-107 = "……不，那可不行。"
2003305-108 = "不過是區區的過敏……#n既然已經決定收養，無論如何也要照顧到最後──這就是我羽沼真琴大人的信念！"
2003305-109 = "剛剛那些話我就當作沒聽見吧。"
2003305-110 = "[s]「真琴，真的沒關係嗎……？」"
2003305-111 = "嘻嘻嘻。當然沒關係。#n我會盡量減少直接觸碰到牠的次數。"
2003305-112 = "我真琴大人的百年大計，可不會因為區區過敏而瓦解！"
2003305-113 = "總有一天……！我會讓獅子丸登上頻道，成為宣揚萬魔殿名聲的尖兵！#n拭目以待吧！老師！"
2003305-114 = "[s]「……很像真琴的作風，我也會為你加油。」"
2003305-115 = "嘻嘻嘻！嘻嘻嘻嘻嘻！！！"
2003305-116 = "……咳咳咳！"
2003305-118 = "（幾天後，在夏萊辦公時……）"
2003305-122 = "[ns]「嗯……？是真琴傳來的照片……？」"
2003305-124 = "因為過敏的關係，我不得不拜託其他成員照顧獅子丸。"
2003305-125 = "話雖如此，我還是會把獅子丸威風凜凜的模樣拍給老師看。"
2003305-126 = "如果你願意協助萬魔殿……我就傳更棒的照片給你！"
2003305-127 = "[ns]「……他果然很疼愛那隻貓啊。」"
2003305-128 = "（看著真琴傳來的獅子丸的照片，獲得了短暫的療癒）"

2003305-111 = "3;마코토;03;키시싯. 괜찮고말고. 물론 지금까지 키워왔던 것처럼, 이 몸이 직접 만지거나 하는 일은 되도록 줄여야겠지만.\n#3;em;[재잘]"
2003305-112 = "3;마코토;03;이런 알레르기 정도로, 마코토 님의 백년대계는 무너지지 않으니 말이야!"
2003305-113 = "3;마코토;10;언젠가……! 라이언마루를 인터넷 동영상 채널에 데뷔시켜, 만마전의 이름을 알리는 첨병으로 삼을 날을 기대하도록! 선생이여!"
2003305-114 = "[s] \"……그래. 엄청 마코토답네. 나도 응원할게.\""

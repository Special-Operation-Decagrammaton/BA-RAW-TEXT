[translation]
1011202-1 = "在公車裡"
1011202-3 = "（今天是要直接去千年上班的日子）"
1011202-4 = "（因為是通勤時段，公車裡面相當擁擠……）"
1011202-15 = "[ns]「唔……人好多……」"
1011202-19 = "（就在想往裡面移動時……）"
1011202-24 = "咦？主人？"
1011202-25 = "[s]「這個聲音是……」"
1011202-28 = "哇！真的是主人耶～？啊哈哈！"
1011202-29 = "[s1]「嗨，明日奈！」\n[s2]「話說你今天穿著制服呢？」"
1011202-32 = "嗯！因為今天沒有社團活動。"
1011202-36 = "啊，這件衣服對主人來說反而很陌生吧？"
1011202-37 = "[s]「好像也是。」"
1011202-41 = "呵呵。怎麼樣啊，主人？適合我嗎？"
1011202-46 = "主人……？"
1011202-47 = "那，那個人……是怎樣……"
1011202-51 = "[ns3]「嗯，嗯！很適合你哦，明日奈……！」\n[ns4]「不過主人這個稱呼有點……」"
1011202-57 = "啊哈，原來如此。"
1011202-58 = "畢竟我現在也不是女僕嘛。"
1011202-59 = "那叫你老師應該就可以了吧？"
1011202-64 = "老，老師……？"
1011202-65 = "是要求學生稱呼自己為主人嗎……？"
1011202-69 = "[ns5]「……」\n[ns6]（誤會越來越深了……）"
1011202-77 = "啊～啊～各位乘客請注意。"
1011202-82 = "即將進入急轉彎地帶，但本司機懶得減速，所以將以慣性甩尾的方式來過彎。"
1011202-83 = "[ns]「啊？？」"
1011202-87 = "請各位緊握扶手，留意自身安全。"
1011202-91 = "啊哈哈，要抓緊哦！老師！"
1011202-98 = "[ns]「哇啊啊啊啊！？」"
1011202-105 = "噫噫！！"
1011202-111 = "老師，你沒事吧？"
1011202-112 = "[s]「嗯，嗯！勉強撐住了……」"
1011202-113 = "哈哈，很好玩吧？#n所有人都被甩向同一邊，整個亂成一團！"
1011202-114 = "明明是公車，卻像在搭雲霄飛車一樣！！"
1011202-115 = "[s]「就是說啊！不應該有這種感覺吧！！」"
1011202-119 = "[ns]「……」"
1011202-120 = "（因為剛才甩尾的關係，跟明日奈貼得好近……）"
1011202-121 = "[ns]「那個，明日奈……靠這麼近不會覺得不自在嗎……？」"
1011202-122 = "嗯？"
1011202-123 = "不會啊！我覺得這樣挺好的哦？"
1011202-127 = "好久沒有這麼近距離看老師了呢！呵呵。"
1011202-128 = "[s]「不，不過……太靠近的話，會讓我有點為難……」"
1011202-132 = "[ns7] 拚命擠出空間\n[ns8]「哼嗯！！！」"
1011202-135 = "啊哈哈！"
1011202-136 = "老師那是什麼表情啦！好好笑！！"
1011202-137 = "[s]「我正在盡身為老師的最大努力。」"
1011202-138 = "老師是想讓我方便行動嗎？"
1011202-139 = "我覺得現在這樣就很好呀～？#n靠在老師身上很舒服耶。哈哈。"
1011202-140 = "[s]「那就是問題所在啊……」"
1011202-141 = "哇，能聽到心跳聲耶，老師。#n撲通，撲通……心臟跳得好快～！"
1011202-143 = "（就這麼度過了宛如十年般的十分鐘……）"
1011202-144 = "（好不容易才在目的地下了車）"

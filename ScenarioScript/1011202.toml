[translation]
1011202-1 = "ในรถบัส"
1011202-3 = "(วันนี้คุณครูมาทำงานที่มิลเลเนียม)"
1011202-4 = "(ดูเหมือนว่ารถบัสจะแออัดมากในช่วงชั่วโมงเร่งด่วน...)"
1011202-15 = "[ns] \"อึก... คนแน่นรถเลย...\""
1011202-19 = "(ขณะที่ค่อยๆ เดินชิดใน...)"
1011202-24 = "หืม? นายท่าน?"
1011202-25 = "[s] \"เสียงนี้มัน...?\""
1011202-28 = "ว้าว! นายท่านจริงๆ ด้วย~? อะฮ่าฮ่า!"
1011202-29 = "[s1] \"สวัสดี อาสึนะ! ใส่ชุดนักเรียนเหรอ?\"\n[s2] \"อ้าว อาสึนะ! วันนี้ใส่ชุดนักเรียนเหรอ?\""
1011202-32 = "อื้อ! วันนี้ไม่มีกิจกรรมของชมรมน่ะ"
1011202-36 = "อ๊ะ ชุดแบบนี้ไม่ค่อยคุ้นตานายท่านสินะ?"
1011202-37 = "[s] \"ก็ทำนองนั้นนะ\""
1011202-41 = "ฮุฮุ นายท่านคิดว่าไงบ้างล่ะ? ชุดแบบนี้ก็เข้ากับฉันมั้ย?"
1011202-46 = "นายท่าน...?"
1011202-47 = "อะ... อะไรของเค้าเนี่ย..."
1011202-51 = "[ns3] \"อะ... อื้อ! เหมาะกับอาสึนะเลย แต่ช่วยเรียกว่าคุณครู...!\"\n[ns4] \"อื้อ แต่ตอนอยู่บนรถบัส ถ้าเรียกว่านายท่านละก็...\""
1011202-57 = "อ๋อ แบบนี้นี่เอง"
1011202-58 = "ตอนนี้ฉันก็ไม่ใช่เมดด้วยนี่เนอะ"
1011202-59 = "ถ้างั้นก็ ให้เรียกว่าคุณครูใช่มั้ย?"
1011202-64 = "คะ... คุณครู...?"
1011202-65 = "ให้นักเรียนเรียกตัวเองว่านายท่านเหรอเนี่ย...?"
1011202-69 = "[ns5] \"...\"\n[ns6] (ผู้คนเริ่มเข้าใจผิดแล้ว...)"
1011202-77 = "อ่า... อ่า เรียนผู้โดยสารทุกท่าน"
1011202-82 = "เรากำลังจะเข้าโค้ง แต่ผมขี้เกียจลดความเร็ว ดังนั้นจะขอดริฟต์รถเข้าโค้งทั้งอย่างนี้เลย"
1011202-83 = "[ns] \"หา??\""
1011202-87 = "ขอให้ทุกคนจับที่จับให้แน่น แล้วระวังเรื่องความปลอดภัยของตัวเองด้วย"
1011202-91 = "อะฮ่าฮ่า จับให้ดีๆ นะ! คุณครู!"
1011202-98 = "[ns] \"เหวออออ?!\""
1011202-105 = "เฮือกก!!"
1011202-111 = "คุณครู เป็นยังไงบ้าง?"
1011202-112 = "[s] \"อะ... อื้อ! ยังไหวอยู่...\""
1011202-113 = "ฮะฮ่า! สนุกจังเลย! ว่ามั้ย?! เมื่อกี้คนบนรถไหลไปฝั่งเดียวกันหมดเลยละ!"
1011202-114 = "อยู่บนรถบัสแท้ๆ แต่รู้สึกเหมือนได้นั่งรถไฟเหาะเลย!!"
1011202-115 = "[s] \"นั่นสินะ! แต่เราไม่ควรจะรู้สึกแบบนั้นเลย!!\""
1011202-119 = "[ns] \"...\""
1011202-120 = "(การเข้าโค้งอย่างรวดเร็วทำให้อาสึนะเข้ามาใกล้จนเกินไป...)"
1011202-121 = "[ns] \"เอ่อ อาสึนะ... เข้ามาใกล้กันแบบนี้ไม่อึดอัดเหรอ...?\""
1011202-122 = "หืม?"
1011202-123 = "ไม่เลย! ตอนนี้ฉันโอเคเลยนะ?"
1011202-127 = "นานแล้วนะที่ฉันไม่ได้เห็นคุณครูใกล้ๆ แบบนี้น่ะ! ฮุฮุ"
1011202-128 = "[s] \"ตะ... แต่ว่า... ถ้าเบียดเกินไป มันจะไอ้นั่น...\""
1011202-132 = "[ns7] (พยายามขยับให้เกิดที่ว่างระหว่างกัน)\n[ns8] \"ฮึบ!!!\""
1011202-135 = "อะฮ่าฮ่า!!"
1011202-136 = "อะไรเนี่ย คุณครู ทำไมทำหน้าแบบนั้นล่ะ! ตลกจัง!!"
1011202-137 = "[s] \"ครูกำลังทำหน้าที่ของครูให้ดีที่สุดน่ะ\""
1011202-138 = "คุณครูพยายามจะทำให้ฉันขยับตัวได้สะดวกๆ เหรอ?"
1011202-139 = "ตอนนี้ฉันก็โอเคนะ พอได้พิงคุณครูแบบนี้มันสบายดีน่ะ ฮะฮ่า"
1011202-140 = "[s] \"ก็นั่นละปัญหา...\""
1011202-141 = "ว้าว ได้ยินเสียงหัวใจเต้นด้วยละคุณครู ตึกตักๆๆ หัวใจเต้นรัวเหมือนกลองเลย~!"
1011202-143 = "(สิบนาทีบนรถบัสให้ความรู้สึกยาวนานเหมือนสิบปี...)"
1011202-144 = "(แต่สุดท้ายคุณครูก็มาถึงที่หมายและได้ลงจากรถบัสจนได้)"

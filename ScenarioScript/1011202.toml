[translation]
1011202-1 = "On the Bus"
1011202-3 = "I was heading straight to Millennium for work that day."
1011202-4 = "It was rush hour, so I was sure the bus would be crowded."
1011202-15 = "[ns] \"Ugh... So many people...\""
1011202-19 = "As I moved toward the center..."
1011202-24 = "Huh? Master?"
1011202-25 = "[s] \"That sounds like...\""
1011202-28 = "Whoa, Master, it is you! Ahaha!"
1011202-29 = "[s1] \"Hi, Asuna!\"\n[s2] \"You're in your school uniform today?\""
1011202-32 = "Yup! No club activities today, so..."
1011202-36 = "Ah, you're probably not used to this outfit, are you, Master?"
1011202-37 = "[s] \"True enough.\""
1011202-41 = "Fufu. So what do you think? Does it look good on me?"
1011202-46 = "\"Master\"...?"
1011202-47 = "Wh-What's wrong with that person...?"
1011202-51 = "[ns3] \"Y-Yeah! It looks good, Asuna...!\"\n[ns4] \"Y-You don't have to call me 'Master.'\""
1011202-57 = "Aha, I get it."
1011202-58 = "I'm not a maid right now."
1011202-59 = "So...Sensei! Did I get that right?"
1011202-64 = "\"S-Sensei\"...?"
1011202-65 = "Does that mean they make their students call them Master...?"
1011202-69 = "[ns5] \"...\"\n[ns6] \"(This misunderstanding is getting worse...)\""
1011202-77 = "Ah, ah. Attention, passengers."
1011202-82 = "There's a sharp turn coming up, but I don't want to slow down, so I'll be doing an inertia drift."
1011202-83 = "[ns] \"Excuse me??\""
1011202-87 = "Please hold tight onto the handrails and be mindful of your own safety."
1011202-91 = "Ahaha, hold on tight, Sensei!"
1011202-98 = "[ns] \"AHHH!\""
1011202-105 = "Eeek!!"
1011202-111 = "You okay, Sensei?"
1011202-112 = "[s] \"Y-Yeah, I'm alive...\""
1011202-113 = "Haha, that was fun! Yeah! Everybody getting pushed around like that..."
1011202-114 = "Is this a bus or a roller coaster, right?"
1011202-115 = "[s] \"Right! But it SHOULD be a bus!\""
1011202-119 = "[ns] \"...\""
1011202-120 = "That drift pushed me too close to Asuna."
1011202-121 = "[ns] \"Um, Asuna...isn't this a little too close for both of us?\""
1011202-122 = "Huh?"
1011202-123 = "Not at all! I like how it is right now!"
1011202-127 = "I hardly ever see you this close! Fufu..."
1011202-128 = "[s] \"B-But there's a problem...\""
1011202-132 = "[ns7] Try your best to make some room\n[ns8] \"Hup!!\""
1011202-135 = "Ahaha!!"
1011202-136 = "What is that, Sensei? You're funny!"
1011202-137 = "[s] \"I'm doing my best as a teacher.\""
1011202-138 = "Are you trying to make it easier for me to move?"
1011202-139 = "I'm fine with how it is. You're comfy. Haha."
1011202-140 = "[s] \"That's the problem...\""
1011202-141 = "Whoa, I can hear your heart beating, Sensei. \"Thump-thump-thump-thump.\" It's so fast!"
1011202-143 = "After 10 minutes that felt like 10 years..."
1011202-144 = "I finally made it to my destination and got off that bus."

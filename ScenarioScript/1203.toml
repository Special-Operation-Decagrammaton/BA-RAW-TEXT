[translation]
1203-1 = "Maid & Made 2"
1203-4 = "รุ่นพี่... อยู่นิ่งๆ สิคะ เดี๋ยวผมก็กระเซอะกระเซิงกันพอดีหรอกค่ะ"
1203-5 = "ทำอะไรของเธอเนี่ย... นี่มันไม่ใช่เรื่องแล้ว"
1203-7 = "ตอนแรกเราใส่ชุดเมดก็เพื่อปกปิดตัวตนของเราไม่ใช่เหรอ..."
1203-8 = "เปล่าหรอก แล้วก็ไม่ได้เป็นปัญหาด้วย เรารับงานและเซ็นหนังสือสัญญาไปแล้ว ที่เราต้องทำแบบนี้#nก็เพราะต้องซื่อสัตย์กับภารกิจที่ได้มา"
1203-9 = "เฮอะ? ดูเธอจะชอบใจเป็นพิเศษเลยนะ? ปกติต้องข่มความชอบไว้แค่ไหนกันหา?"
1203-10 = "คะ... คือว่า... อืม..."
1203-11 = "อะแฮ่ม... แล้วรุ่นพี่ล่ะ? วันแบบนี้ยังจะใส่ชุดไม่เรียบร้อยมาอีก ฉันว่าแบบนี้มันไม่ถูกต้องนะ"
1203-12 = "เอ้า? ก็ช่วยไม่ได้นี่นา! ระหว่างทางฉันดันไปเจอพวกนักเลงเข้าอีกรอบ...!"
1203-13 = "เอาละๆ อยู่นิ่งๆ กันทั้งคู่เลยค่ะ โดยเฉพาะรุ่นพี่เนรุ ตอนนี้เปียที่กำลังถักมันยุ่งหมดแล้วนะคะ"
1203-14 = "ชิ... ก็บอกแล้วไงว่าจะทำผมเอง..."
1203-18 = "ไม่ได้ค่ะ ถ้าเป็นภารกิจทั่วไปก็ว่าไปอย่าง แต่นี่การบริการลูกค้าของเมดคืองานสำคัญนะคะ"
1203-19 = "ถักเปียเกือบจะเสร็จแล้วค่ะ ช่วยอยู่นิ่งๆ แบบนี้ให้อีกเดี๋ยวเดียวนะคะ ถ้าขยับอีกเดี๋ยวเปียแตกไม่รู้ด้วย#nนะคะ"
1203-20 = "แล้วก็ รุ่นพี่คะ อืม... ไหนๆ ก็ไหนๆ แล้ว... วันนี้ลองถอดเสื้อกันหนาวดูไหมคะ?"
1203-21 = "ฮึ่ย ให้มันน้อยๆ หน่อยเถอะ อย่าเอาเรื่องเสื้อกันหนาวมาพูดอีกนะ"
1203-22 = "ถ้าพูดอีกทีละก็ ฉันหนีกลับแน่"
1203-23 = "ฮิฮิ ก็ได้ค่ะ งั้นเพื่อแลกกับการใส่เสื้อกันหนาวคู่ใจเหมือนเดิม รุ่นพี่ก็ต้องทำผมเผ้าให้เรียบร้อยได้#nไหมคะ?"
1203-24 = "เฮ้อ..."
1203-25 = "เอาที่สบายใจเลย"
1203-26 = "ฮุฮุ..."
1203-29 = "ฮุฮุ เสร็จแล้วค่ะ ออกมาสวยตามที่คาดไว้เลยค่ะ"
1203-30 = "......สวยเสยอะไรกัน...... ก็เหมือนกับทุกๆ วันนั่นละ"
1203-31 = "ไม่หรอก ดูเรียบร้อยกว่าผมที่ทำในทุกวันอีก..."
1203-32 = "งั้นเหรอคะ เหมือนกับทุกวันเลยเหรอ..."
1203-33 = "ก็อาจจะเป็นอย่างนั้นก็ได้นะคะ"
1203-34 = "ฉันยังมีความสามารถไม่พอ ก็เลยดึงเอาเสน่ห์ของรุ่นพี่ออกมาได้ไม่หมด..."
1203-35 = "อะ... เอาน่า! รู้แล้วน่า พอเถอะ!"
1203-39 = "จะว่าไปแล้ว ซีโร่วัน..."
1203-40 = "ไม่สิ อาสึนะล่ะ? ยัยอาสึนะหายไปไหนอีกแล้ว?"
1203-51 = "มาแล้ว! อ๊ะ? เตรียมตัวกันเสร็จหมดแล้วเหรอ?"
1203-53 = "เธอไปไหนมา ถึงได้โผล่มาตอนนี้?"
1203-54 = "หืม? ฉันเหรอ?"
1203-55 = "ก็ไปพาคนข้างนอกมาไง ให้ฉันไปเรียกลูกค้ามาไม่ใช่เหรอ?"
1203-56 = "ว่าไงนะ? ......พาคนมา?"
1203-57 = "รุ่นพี่ โดยพื้นฐานแล้ว การเรียกลูกค้าจะทำได้ก็ต่อเมื่อเปิดร้านแล้ว..."
1203-62 = "ยะ... ยกโขยงมากันขนาดนี้เลยเหรอ..."
1203-64 = "ไม่อยากจะเชื่อเลย ลูกค้ามากันเยอะจัง...... รุ่นพี่ใช้วิธีไหนถึงไปเรียกลูกค้ามาได้ขนาดนี้คะ?"
1203-65 = "......? หืม? ฉันไม่ได้พูดชักชวนอะไรเลยนะ?"
1203-66 = "ก็แค่บอกว่าจะเปิดเมดคาเฟ่ แค่นี้ลูกค้าก็ตามมากันแล้ว"
1203-67 = "เข้าใจละ นี่น่ะสินะสถานการณ์ที่นักบัญชีของเซมิน่าพูดถึง"
1203-68 = "เป็นเพราะคาเฟ่ส่วนใหญ่จะชอบมากันในธีมที่ไม่ธรรมดา พอรู้ว่าจะมีคาเฟ่ธรรมดาๆ อย่างเมดคาเฟ่ คนก็เลยแห่กันมาที่นี่แทนสินะคะ"
1203-69 = "ฉันเองก็พอจะเตรียมใจเอาไว้บ้างอยู่หรอกค่ะ แต่ว่านี่มัน......"
1203-70 = "วันนี้เราคงจะยุ่งกันมากกว่าที่ฉันคิดไว้อีกนะคะ"
1203-71 = "ไม่มีเวลาแล้ว ต้องรีบทำตามเป้าหมาย......"
1203-72 = "ไปจัดการ เอ๊ย... ไปต้อนรับนายท่านกัน"
1203-73 = "......คุณคารินคะ ฉันรู้ว่ากำลังตื่นเต้นอยู่ แต่ก็ระวังอย่าไปพูดหลอกล่ออะไรลูกค้านะคะ"
1203-75 = "แหม ทีตอนนี้ไม่คิดจะปิดบังความตื่นเต้นเลยนะ"
1203-76 = "ทุกคนพร้อมหรือยัง? ถ้าพร้อมแล้วฉันเปิดประตูเลยนะ"
1203-77 = "ดะ... เดี๋ยว! จะให้ใช้คำว่านายท่านจริงๆ เหรอ? ฉันยังไม่ได้เตรียมใจมาพูดคำนั้นเลย...!!"
1203-79 = "โอเค เปิดประตูเลย!"
1203-85 = "ยินดีต้อนรับค่านายท่านทุกคน~!!"
1203-96 = "(1 สัปดาห์ต่อมา)"
1203-101 = "เป็นไปไม่ได้..."
1203-102 = "นี่... นี่มันอะไรกัน? ตารางรายได้นี่มัน... นี่คือยอดที่เราหาได้ใน 1 สัปดาห์จริงๆ เหรอ?"
1203-103 = "ไหนว่างานเทศกาลโรงเรียนเราหาเงินไม่ค่อยได้ไง..."
1203-107 = "...... อ๊ะ ขอโทษๆ นี่ไม่ใช่เวลาจะมามัวตกใจอยู่ ฉันควรจะกล่าวคำขอบคุณก่อน"
1203-108 = "ขอบคุณนะ ถึงมันจะเป็นภารกิจ แต่ฉันขอกล่าวขอบคุณแทนย่านการค้าและเซมิน่าด้วย"
1203-109 = "เราไม่เจอปัญหาขาดดุลแล้ว... เงินเท่านี้น่าจะครอบคลุมค่าใช้จ่ายในการฟื้นฟูที่พวกเธอใช้ไปเมื่อคราว#nก่อนได้เลยละ"
1203-110 = "เป็นคำพูดที่น่ายินดีตั้งแต่เคยได้ยินมาเลยนะคะ มิน่าล่ะคะ คุณนักบัญชีถึงได้ทำหน้าแจ่มใสเชียว"
1203-111 = "อะ... อะไรกัน ฉันดูเหมือนคนที่ไม่ว่าจะไปไหนก็มีแต่เรื่องให้พูดบ่นเหรอ ถ้าเป็นเรื่องดีๆ ฉันก็พูด#nขอบคุณได้เหมือนกันนั่นแหละ"
1203-112 = "เพียงแต่ว่า......"
1203-113 = "...หืม? เพียงแต่ว่า?"
1203-114 = "...หา? อะไรล่ะนั่นน่ะ มีเรื่องอะไรไม่พอใจอีกรึไง?"
1203-115 = "มะ... ไม่ใช่แบบนั้นสักหน่อย!"
1203-116 = "เพียงแต่ว่า...... อืม...... คือ......"
1203-117 = "คือฉันค่อนข้างจะเสียดาย... เอามากๆ น่ะ... พอจะมีวิธีอะไรบ้างไหมนะ"
1203-118 = "......? หมายถึงวิธีอะไรเหรอ?"
1203-119 = "ไม่หรอก อืม......"
1203-127 = "คือว่า...... คุณหัวหน้า C&C คะ?"
1203-129 = "......!?"
1203-130 = "อะ... อะไรน่ะ ทำไมจู่ๆ ก็เรียกด้วยคำน่าขนลุกแบบนั้น......"
1203-131 = "ไม่ทราบว่า......"
1203-132 = "จากผลงานในครั้งนี้น่ะ ไหนๆ ก็เป็นแบบนี้แล้ว..."
1203-139 = "มีแพลนจะเลิกทำสายลับ แล้วมาทำเมดคาเฟ่ต่อไหม?"
1203-144 = "หา...?"
1203-149 = "คะ?"
1203-150 = "ว่าไงนะ?"
1203-152 = "ถ้าทำชมรมแนวนั้น ในฐานะนักบัญชีอย่างฉันแล้ว ฉันว่ามันน่าจะเป็นประโยชน์กับโรงเรียนมากกว่าน่ะ"
1203-153 = "และไหนๆ ก็เปิดตัวมาดีขนาดนี้ นอกจากย่านร้านเครื่องใช้ไฟฟ้าแล้ว ถ้าลองไปเปิดในย่านการค้าอื่น#nด้วยละก็......"
1203-154 = "หรือว่าตอนมีงานเทศกาลของโรงเรียน... ก็ให้เป็นเมดในสังกัดมิลเลเนียม..."
1203-158 = "ตายจริง..."
1203-159 = "ว้าว..."
1203-161 = "หะ... เห็นด้วยใช่ไหม? ดูเข้าท่าเลยใช่ไหมล่ะ? ฉันว่านี่เป็นแผนการที่ไม่เลวเลยนะ"
1203-167 = "ฮึ......"
1203-168 = "...... ฮึฮึ....... ฮึฮึฮึ......"
1203-169 = "ฮึฮึ...?"
1203-170 = "ฮึ..."
1203-175 = "ใครจะไปเอาด้วยกันเล่า!!!"
1203-180 = "Maid & Made"

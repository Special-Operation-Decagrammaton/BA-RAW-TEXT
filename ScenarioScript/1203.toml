[translation]
1203-1 = "Maid & Dismayed Part 2"
1203-4 = "Please stay still. Your hair is getting mussed."
1203-5 = "Is this...really happening...? Someone, please...wake me up..."
1203-7 = "The costumes were a cover...just a cover..."
1203-8 = "Just think of it as any other job. We received a commission. We signed a contract. Now, we just need to do what we were hired for."
1203-9 = "Huh, are you...happy? Are you excited about this?"
1203-10 = "Well... Um..."
1203-11 = "Anyway, it was not very responsible of you to show up looking so disheveled."
1203-12 = "That wasn't my fault! I ran into a bunch of delinquents on the way!"
1203-13 = "Now, now. Please stay still, both of you. Especially you, Neru. Your braids are getting tangled."
1203-14 = "Hmph. I look fine."
1203-18 = "Well, normally I'd agree, but this is no ordinary mission. We have customers to serve!"
1203-19 = "I'm almost done, anyway. Just stay still a little while longer so my hard work isn't ruined, okay?"
1203-20 = "And...one more thing... Why don't you take off your jacket today?"
1203-21 = "You! Are you trying to make me angry? Leave my jacket out of it."
1203-22 = "I could leave, you know. Me and my jacket can always go home."
1203-23 = "Haha! Okay, okay. You can wear the jacket. We'll just clean up your hair a little."
1203-24 = "*sigh*"
1203-25 = "Whatever. Do whatever you want."
1203-26 = "Heehee..."
1203-29 = "All done! It looks lovely."
1203-30 = "Great. It looks...exactly the same."
1203-31 = "Hm, I think you look much more put-together."
1203-32 = "You can't...tell the difference?"
1203-33 = "Well, maybe you're right."
1203-34 = "Perhaps I lack the skills to bring you to your full potential..."
1203-35 = "Argh! No! It's fine! Just stop!"
1203-39 = "Anyway, where's call sign Zero-One?"
1203-40 = "Asuna got us into this mess, and then she just vanished?"
1203-51 = "Nope, I'm here! Are you already done getting ready? Wow!"
1203-53 = "Where the heck have you been?"
1203-54 = "Oh, me?"
1203-55 = "I was outside finding customers! You wanted me to bring people in, remember?"
1203-56 = "W-what? Customers?"
1203-57 = "Generally, one invites customers to come in AFTER the store opens."
1203-62 = "That is...an impressive crowd, though."
1203-64 = "So many people! It's unbelievable. What did you do, Asuna?"
1203-65 = "...? Huh? I didn't really do anything."
1203-66 = "I just told them we were running a maid cafe. They all followed me here!"
1203-67 = "I see. This must be the situation Yuuka was referring to."
1203-68 = "Since most of our cafes are a bit unusual, of course people would flock to an ordinary maid cafe."
1203-69 = "I expected this to an extent, but..."
1203-70 = "Well, I hope we're all ready for a very busy day!"
1203-71 = "There's no time. We need to focus..."
1203-72 = "Let's handle... I mean, serve the masters."
1203-73 = "Karin... I know you're excited, but please do be sure to use the proper terminology in front of the guests."
1203-75 = "You're really not even trying to hide your excitement anymore!"
1203-76 = "Is everyone ready? Can I open the door?"
1203-77 = "W-Wait! Hang on. Are we really calling them masters? I'm not ready at all!"
1203-79 = "Okay! We're officially open, everyone!"
1203-85 = "Welcome, Masters!"
1203-96 = "(One week later...)"
1203-101 = "No way..."
1203-102 = "Is this number right? This revenue... We made this much in one week?!"
1203-103 = "If our school festivals were like this from the start, then—"
1203-107 = "No, I'm sorry. Now's not the time. I came here to say thank you."
1203-108 = "I know it was a commission, but, on behalf of the shopping district and Seminar, thank you. You've done incredible work."
1203-109 = "I can't believe we're not in the red anymore... This is enough to pay for all the repairs to things you've blown up!"
1203-110 = "That's wonderful to hear. It's nice to see a smile on your face for once!"
1203-111 = "Geez, I'm not always in a bad mood, you know. I know how to appreciate the occasional good news!"
1203-112 = "Although..."
1203-113 = "...Although?"
1203-114 = "What is it? You got something else to complain about?"
1203-115 = "No! No, nothing like that."
1203-116 = "It's just... Um..."
1203-117 = "I think a week was too short... Can we do something about that?"
1203-118 = "Do something... What are you talking about?"
1203-119 = "Well, uh..."
1203-127 = "Esteemed C&C President, can I just say—"
1203-129 = "What?!"
1203-130 = "Don't call me that! It's super weird!"
1203-131 = "By any chance..."
1203-132 = "I mean, since we've proven that it works, after all..."
1203-139 = "Would you consider dissolving your spy agency and re-forming as a maid cafe?"
1203-144 = "Huh?"
1203-149 = "What?"
1203-150 = "Excuse me?"
1203-152 = "Well, speaking as the treasurer, you seem to be much more beneficial to Millennium as a maid cafe."
1203-153 = "We could even expand, open a cafe in another district..."
1203-154 = "Or for school festivals! Just think, you could be the exclusive maids of Millennium..."
1203-158 = "Oh my..."
1203-159 = "...Ah."
1203-161 = "Y-yeah? Not a bad idea, right?"
1203-167 = "...Ha..."
1203-168 = "...Ahaha...hahaha..."
1203-169 = "...Ha...ha?"
1203-170 = "Hah."
1203-175 = "Get out!!"
1203-180 = "Maid & Dismayed"

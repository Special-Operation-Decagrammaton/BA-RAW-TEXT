[translation]
1203-1 = "Maid&Made（２）"
1203-4 = "前輩，請不要亂動。頭髮會亂掉的。"
1203-5 = "到底是怎樣……這樣不就本末倒置了嗎……"
1203-7 = "本來不就是為了隱藏身份才會穿女僕服的嗎……"
1203-8 = "雖然是這樣沒錯，不過既然已經在合約上簽了名就是正式的委託。我們只能做到底了，這也沒辦法！"
1203-9 = "……花凜，妳好像很開心嘛？"
1203-10 = "不，那個……算吧。"
1203-11 = "儘管如此，為什麼前輩會是一副衣衫不整的樣子……"
1203-12 = "我也沒辦法啊。過來的途中，那些小流氓又成群結隊的……！"
1203-13 = "好的好的，請別亂動～好不容易綁好的麻花辮會散掉的唷？"
1203-14 = "都說了就算妳不幫忙，我自己也能綁好的，真是……"
1203-18 = "如果讓寧瑠前輩自己綁的話，會亂糟糟的所以不行。今天可是要當真正的女僕哦。"
1203-19 = "馬上就好了，請再保持一下哦～"
1203-20 = "……前輩。機會難得，今天要不要把絲卡將脫掉？"
1203-21 = "少囉嗦，我才不會脫。"
1203-22 = "要脫的話我還不如回去。"
1203-23 = "呵呵，我明白了。但畢竟是難得的機會，把頭髮弄得可愛又漂亮可以吧？"
1203-24 = "哈啊……"
1203-25 = "……隨妳高興吧。"
1203-26 = "呵呵，那我就不客氣了……"
1203-29 = "好，完成了。呵呵，果然很棒呢。"
1203-30 = "什麼很棒，我不就跟平常一樣嗎……"
1203-31 = "才沒有呢。而且，是比平常更漂亮了。"
1203-32 = "就是說呀。"
1203-33 = "雖然平時就很棒，但今天我也出了一份力。"
1203-34 = "但是我的技術還不到家……其實我覺得還能展現更多部長的魅力……"
1203-35 = "啊啊已經夠了！這個話題到此為止！"
1203-39 = "話說回來代號Zero One……"
1203-40 = "不對，明日奈跑哪去了？"
1203-51 = "久等了！準備好了嗎？"
1203-53 = "妳跑去哪溜達了啊……"
1203-54 = "咦，我嗎？"
1203-55 = "因為被說要我去拉客，所以就把客人帶來了唷？"
1203-56 = "……什麼？"
1203-57 = "前輩……拉客一般來說是等店面開了之後才要做的事……"
1203-62 = "等等，好像有超級多的客人……！？"
1203-64 = "哎呀哎呀……明日奈前輩，到底用了什麼方法啊？"
1203-65 = "咦，其實也沒做什麼？"
1203-66 = "只說「女僕咖啡廳要開門了唷──」而已！"
1203-67 = "……啊，原來如此。我想起來了，是因為其他的咖啡廳都不太正常吧……"
1203-68 = "所以，這種平凡的女僕咖啡廳反而會吸引人潮呢。"
1203-69 = "呵呵，雖然已經有某種程度的覺悟了……"
1203-70 = "看來今天一整天都會很忙碌呢？"
1203-71 = "好，那就趕快把目標……"
1203-72 = "不對，是處……接待今天限定的主人們吧！"
1203-73 = "……花凛。心情興奮是沒關係，但在客人們面前請不要說錯話喔？"
1203-75 = "妳還真興奮啊……"
1203-76 = "已經準備好了？可以開門了嗎？"
1203-77 = "先等一下，雖然現在說這些有點晚了，我真的也要接待客人嗎？一定要說「歡迎回來」這種話嗎！？再讓我做點心理準備──"
1203-79 = "只要開始總會有辦法的！那麼開店囉！！"
1203-85 = "歡迎回來～！！"
1203-96 = "（一週過後……）"
1203-101 = "真不敢相信……"
1203-102 = "這真的是一週之內賺到的金額嗎……？"
1203-103 = "難道再做得更好一點的話……"
1203-107 = "……啊，抱歉。現在不是說這些的時候，首先謝謝妳們。"
1203-108 = "雖說是委託，我仍代表電器街和研討會感謝妳們。"
1203-109 = "赤字已經完全不是問題了，有這麼多錢的話，應該還能填補妳們最近在任務中造成的損失。"
1203-110 = "那真是太好了，所以妳今天看起來才會這麼開心啊。"
1203-111 = "什，什麼嘛，我也不是一直都不開心……有好事的話我也會肯定，受到幫助的話也會表達感謝的啊。"
1203-112 = "只是……"
1203-113 = "……只是？"
1203-114 = "怎樣，我們都好好做了還有什麼不滿嗎？"
1203-115 = "不，不是那樣！"
1203-116 = "該怎麼說呢，那個……"
1203-117 = "該說是太浪費了，還是某種意義上可以說是損失呢……"
1203-118 = "……？還有其他事嗎？"
1203-119 = "呃，那……"
1203-127 = "那個，我想非常誠懇地向C&C的領袖寧瑠前輩討論一件事……"
1203-129 = "……！？"
1203-130 = "妳這說話方式是怎麼回事啊好噁心……！？"
1203-131 = "那個，"
1203-132 = "機會難得，又很可愛，所以說……"
1203-139 = "……所有人一起放棄當特務，從現在起正式以女僕部的身分活動，妳們覺得怎麼樣？"
1203-144 = "……什麼！？"
1203-149 = "……咦？"
1203-150 = "妳剛才，說什麼……？"
1203-152 = "那個，以會計的立場來看，這種程度的金錢貢獻可以說相當有幫助……"
1203-153 = "既然有這種機會，之後在其他商店街的慶典，還有千年的學園祭上也……"
1203-154 = "在那之前，平時就以千年專屬女僕的身分，之類的……"
1203-158 = "哎呀哎呀……"
1203-159 = "……原來如此。"
1203-161 = "怎，怎麼樣？不覺得很棒嗎？很適合妳們，我覺得不是什麼壞事哦……？"
1203-167 = "……"
1203-168 = "………………"
1203-169 = "那個，寧瑠前輩……？"
1203-170 = "……開，"
1203-175 = "開什麼玩笑！！！誰要做啊！！揍飛妳喔──！！？！？"
1203-180 = "Maid&Made"

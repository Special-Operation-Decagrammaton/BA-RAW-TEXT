[translation]
84301200500-5 = "It says, \"Looking for a runaway robot pet. Please let us know if you've seen it.\""
84301200500-6 = "Like they're looking for a puppy..."
84301200500-7 = "Come to think of it, even back when Millennium hosted the Halo Festival, there were little robots that looked like puppies."
84301200500-8 = "Do the robot puppies have a sense of self? What exactly is the definition of sentience...?"
84301200500-9 = "That's a heavy question all of a sudden, Natsu."
84301200500-10 = "I wouldn't worry about it too much..."
84301200500-12 = "...Does it depend on one's relationships outside the self, or the ability to think independently?"
84301200500-13 = "If it does depend on relationships, would a human in complete isolation even truly exist, in any meaningful sense? And would that mean that connection is the essence of existence?"
84301200500-14 = "If it's the ability to think independently, what defines thought? What's the difference between the genuine thoughts of an ego and simple calculations?"
84301200500-15 = "Perhaps each of us is a brain in a vat, interpreting all we perceive in whichever way we've been configured to do so..."
84301200500-16 = "Ahhh...there she goes again."
84301200500-22 = "(...I'm not sure how relevant this is to me.)"
84301200500-23 = "(Still, I'll talk to them.)"
84301200500-32 = "Pardon me students, may I have a moment of your time, please?"
84301200500-34 = "She's still babbling."
84301200500-35 = "We should just cover her mouth. Like, for the whole day."
84301200500-40 = "...? Hm?"
84301200500-41 = "Ehh?! When did you...?! Wh-Who ARE you?!"
84301200500-45 = "I'm sorry. I didn't mean to startle you. I happened to hear you talking, and it made me curious."
84301200500-46 = "I'm here to lead the Trinity students, so I thought I should know where you're planning on going."
84301200500-47 = "\"Lead Trinity students\"...? Who are you to lead us?"
84301200500-49 = "K-Kazusa...that's Seia from the Tea Party..."
84301200500-50 = "Seia? Huh?"
84301200500-52 = "\"Huh,\" she says..."
84301200500-53 = "Okay, maybe you don't know who Seia is, but the words \"Tea Party\" should be enough of a clue..."
84301200500-54 = "Tea Party? ...Oh, THAT Tea Party."
84301200500-58 = "...Eh."
84301200500-59 = "...Oh my."
84301200500-61 = "I-I'm sorry...! So sorry...!!"
84301200500-63 = "We've been discussing the trending tale of a wayward pilgrim."
84301200500-64 = "Perhaps this pilgrim departed on a journey of self-discovery, like a girl in a stormy adolescence."
84301200500-65 = "A self, distinct from all others...but what is a \"self\" in the first place? Perhaps it's nothing. Perhaps it's everything..."
84301200500-66 = "How is she supposed to understand that?!"
84301200500-67 = "I see... I understand. Quite an important discussion, then."
84301200500-68 = "She understood you?! Lies!"
84301200500-69 = "So this runaway robot pet, where do you think it might have gone?"
84301200500-71 = "She really did understand..."
84301200500-72 = "Um, so...from what we've pieced together online, it might be over on the riverbank."
84301200500-73 = "Do we want to go over there now? It'd be nice to bring it back to its human."
84301200500-74 = "That would be nice..."
84301200500-75 = "Would it be all right, though? They said our group shouldn't leave the area."
84301200500-76 = "Well..."
84301200500-77 = "You know, let's go! If we want to find it, now's our chance."
84301200500-79 = "I guess you're right."
84301200500-80 = "...Natsu, what are you doing?"
84301200500-88 = "..."
84301200500-89 = "Huh?!"
84301200500-91 = "N-Natsu, if you keep staring, you're gonna freak her out..."
84301200500-98 = "...I understand. Let's go."
84301200500-100 = "They understood each other?!"
84301200500-101 = "Those who follow the path of the pilgrimage need no words."
84301200500-102 = "WE do! Normally everyone does!"
84301200500-104 = "Ha... Haha..."
84301200500-105 = "Hmm... This is really okay though, right? If we don't see it there right away, we'll come straight back."
84301200500-106 = "Aw, don't worry, Airi."
84301200500-107 = "I'm sure it'll all be fine."

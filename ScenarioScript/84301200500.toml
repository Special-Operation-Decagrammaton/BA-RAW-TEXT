[translation]
84301200500-5 = "\"หุ่นยนต์สัตว์เลี้ยงของฉันหลุดไปค่ะ ถ้าใครเจอรบกวนติดต่อมานะคะ\" เห็นเขียนไว้อย่างนี้น่ะ"
84301200500-6 = "ประกาศเหมือนน้องหมาหายเลย..."
84301200500-7 = "จะว่าไป ตอนงาน <ฮาโลเฟสติวัล> ที่เคยจัดในมิลเลเนียมเคยมีหุ่นยนต์ลูกสุนัขตัวเล็กๆ ด้วยนะ"
84301200500-8 = "หุ่นยนต์ลูกสุนัขจะมีความรู้สึกหรือเปล่านะ แล้วอะไรคือหลักเกณฑ์ในการนิยามตัวตนของมัน"
84301200500-9 = "ถามยากจัง... นัตสึจังคงเริ่มคิดอย่างจริงจังแล้วสินะ"
84301200500-10 = "ไม่นะ ฉันไม่คิดว่ามันจะมีหรอก..."
84301200500-12 = "นั่นมันเป็นเรื่องความสัมพันธ์ของเรากับคนอื่น หรือว่าเกี่ยวกับความสามารถในการคิดได้เองนะ"
84301200500-13 = "ถ้าพูดเรื่องความสัมพันธ์ มันก็เหมือนกับการที่โลกนี้ไม่มีมนุษย์คนไหนที่ไม่มีปฏิสัมพันธ์กับใครเลย#nหรือเปล่า ถ้าอย่างนั้นคุณค่าในการมีอยู่ก็คือการเป็นสิ่งเชื่อมโยงเหรอ?"
84301200500-14 = "ส่วนเรื่องที่เราคิดเองได้ แล้วอะไรล่ะที่เป็นนิยามของ 'ความคิด' ไม่มีใครแยกแยะระหว่างการ#nคาดการณ์ อัตตา และความคิดได้อย่างชัดเจนหรอก"
84301200500-15 = "ไม่สิ ในอีกทางหนึ่ง เราทุกคนอาจจะเป็นแค่สมองที่เข้าใจสิ่งที่เห็นได้อย่างอิสระก็ได้..."
84301200500-16 = "เฮ้อ~ เริ่มอีกแล้วสินะ"
84301200500-22 = "(เหมือนจะไม่เกี่ยวกับเรื่องของเรานะ...)"
84301200500-23 = "(แต่ยังไงก็ลองไปชวนคุยดูหน่อยดีกว่า)"
84301200500-32 = "สวัสดีค่ะทุกคน ขอโทษนะคะ พอจะมีเวลาสักครู่มั้ยคะ?"
84301200500-34 = "เอาแต่พูดเรื่องอะไรยากๆ ที่ฟังไม่เข้าใจอยู่ได้"
84301200500-35 = "สงสัยต้องทำให้ยัยนี่พูดไม่ได้ไปสักพัก..."
84301200500-40 = "หืม...?"
84301200500-41 = "เหวอ!? ขะ... เข้ามาตั้งแต่ตอนไหนน่ะ...!? ละ.... แล้วเธอเป็นใครกันเนี่ย!?"
84301200500-45 = "ขอโทษค่ะ ฉันไม่ได้ตั้งใจจะทำให้คุณตกใจหรอกค่ะ ฉันแค่อยากรู้ว่าเมื่อกี้พวกคุณคุยเรื่องอะไรกันน่ะ"
84301200500-46 = "ฉันมาที่นี่ในฐานะผู้นำนักเรียนที่มาร่วมศึกษาดูงานจากทรีนิตี้... ถ้าพวกคุณจะไปตามหาหุ่นยนต์สัตว์#nเลี้ยง ฉันว่าก็ควรจะกำหนดจุดหมายปลายทางก่อนนะคะ"
84301200500-47 = "ผู้นำนักเรียนที่มาร่วมศึกษาดูงานจากทรีนิตี้...? แล้วเธอเป็นใครน่ะถึงจะมาเป็นผู้นำของพวกเรา?"
84301200500-49 = "คะ... คาซึสะจัง... นั่นคุณเซอาจากสภาน้ำชา..."
84301200500-50 = "เซอา...? เซอาอะไร?"
84301200500-52 = "\"เซอาอะไร?\" งั้นเหรอ..."
84301200500-53 = "ถึงจะไม่รู้จักชื่อ แต่ถ้าพูดว่า 'สภาน้ำชา' ก็น่าจะพอเดาได้ไม่ใช่หรือไง?"
84301200500-54 = "สภาน้ำชา? อ๋อ~ สภาน้ำชานั่นน่ะเหรอ..."
84301200500-58 = "งั้นก็..."
84301200500-59 = "เฮือก"
84301200500-61 = "ขะ... ขอโทษ...! ขอโทษค่ะ...!!"
84301200500-63 = "ปัญหาในตอนนี้ก็คือประเด็นเกี่ยวกับ <นักเดินทางแสวงบุญ> ที่กำลังถูกพูดถึงอยู่ในโซเชียลมีเดีย"
84301200500-64 = "เขาทิ้งตัวตนเดิมของตัวเองเพื่อไปตามหาตัวเองหรือเปล่า หรือว่านี่คือพายุและกระแสน้ำเชี่ยวที่#nเหมือนกับเด็กสาวในช่วงวัยรุ่น"
84301200500-65 = "ตัวตนที่ต่างจากคนอื่น ไม่สิ แล้ว 'ตัวตน' มันหมายความว่าอะไรตั้งแต่แรก ที่จริงแล้วมันไม่ใช่อะไรเลย หรือว่ามันคือ... ทุกสิ่งทุกอย่าง"
84301200500-66 = "พูดแบบนั้นจะไปเข้าใจได้ยังไง...!"
84301200500-67 = "อืม... อย่างนี้เองสินะคะ เข้าใจแล้วค่ะ เป็นเรื่องที่เร่งด่วนมากเลยนะคะ"
84301200500-68 = "เข้าใจงั้นเหรอ!? โกหกกันหรือเปล่า!"
84301200500-69 = "ถ้างั้นตอนนี้ <หุ่นยนต์สัตว์เลี้ยงที่ออกจากบ้านไป> จะอยู่ที่ไหนเหรอคะ?"
84301200500-71 = "เข้าใจจริงๆ ด้วย..."
84301200500-72 = "อืม ดูจากตำแหน่งที่บอกไว้ในโพสต์บนโซเชียลมีเดียแล้ว... ฉันว่ามันน่าจะอยู่แถวๆ ริมแม่น้ำนะ"
84301200500-73 = "ลองไปหากันมั้ย? ถ้าหาเจอ เจ้าของก็น่าจะดีใจนะ"
84301200500-74 = "มันก็เป็นเรื่องที่ดีหรอกนะ..."
84301200500-75 = "แต่จะไม่เป็นไรเหรอ? พวกเราถูกกำชับว่าไม่ควรออกไปจากตรงนี้นะ?"
84301200500-76 = "เรื่องนั้นน่ะ..."
84301200500-77 = "ไปกันเถอะ! พวกเราอาจจะหาเจอจริงๆ ก็ได้นี่นา"
84301200500-79 = "อื้อ ถ้าไอริว่าดี ฉันก็ว่าดี"
84301200500-80 = "เธอนี่มันจริงๆ เลยนะ"
84301200500-88 = "..."
84301200500-89 = "...??"
84301200500-91 = "นะ... นัตสึจัง ไปยืนจ้องขนาดนั้น เดี๋ยวคุณเซอาจะลำบากใจเอานะคะ"
84301200500-98 = "ค่ะ... ไปกันเถอะค่ะ"
84301200500-100 = "เมื่อกี้คุยอะไรกันงั้นเหรอ!?"
84301200500-101 = "สำหรับผู้ที่เดินตามเส้นทางแห่งการแสวงบุญน่ะ ต่อให้ไม่ต้องพูดก็สื่อสารกันได้"
84301200500-102 = "แต่พวกฉันต้องพูดไง!? คนที่ปกติเขาจะพูดกันนะ?!"
84301200500-104 = "แหะๆๆ..."
84301200500-105 = "อืม... คงไม่เป็นไรหรอกเนอะ? ถ้าไปแล้วหาไม่เจอ พวกเราก็แค่ต้องกลับมาทันที"
84301200500-106 = "ไม่ต้องห่วงหรอกน่า ไอริ"
84301200500-107 = "คงไม่มีเรื่องเลวร้ายเกิดขึ้นหรอก"

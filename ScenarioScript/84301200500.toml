[translation]
84301200500-5 = "「正在尋找離家出走的機器人寵物。懇請看到的人聯絡」……上面是這樣寫的。"
84301200500-6 = "就好像在找小狗一樣……"
84301200500-7 = "這麼說來，千年在舉辦「晄輪大祭」的時候，也有一群像小型機器狗的東西。"
84301200500-8 = "機器狗有自我嗎……定義存在概念的標準又是什麼呢……"
84301200500-9 = "突然出現了好深奧的問題……夏醬開始認真思考了。"
84301200500-10 = "不，絕對不是那種感覺吧……"
84301200500-12 = "那跟我和他人的關係有關嗎……跟自主思考的能力有關嗎……"
84301200500-13 = "如果有關的話，不與任何人互動的人類，是否就等同於不存在呢……#n換言之，存在的意義就在於連結嗎？"
84301200500-14 = "如果能夠自主思考的話，該如何定義「思考」呢？#n誰也無法嚴格區分計算與自我的思考……"
84301200500-15 = "不，從某個角度來說，#n也許我們所有人都不過是將眼前看到的一切隨意拼湊理解的桶中腦而已……"
84301200500-16 = "啊～這傢伙又開始了。"
84301200500-22 = "（……雖然跟現在的工作好像沒有關係）"
84301200500-23 = "（還是去搭話看看吧）"
84301200500-32 = "你們好。不好意思，請問能打擾你們一下嗎？"
84301200500-34 = "那張嘴還真是一張開就胡說八道啊。"
84301200500-35 = "要讓這傢伙暫時都不能說話……"
84301200500-40 = "……嗯？"
84301200500-41 = "咦咦！？你，你是什麼時候……！？是誰！？"
84301200500-45 = "抱歉，我不是故意要嚇你的。#n我只是想聽聽看各位剛才在聊些什麼而已。"
84301200500-46 = "畢竟我也是三一的領隊……如果要去尋找的話，事先知道目的地應該也比較好。"
84301200500-47 = "三一的領隊……？所以你是哪位啊？#n意思是要帶領我們嗎？"
84301200500-49 = "千，千紗醬……這位是茶會的聖亞大人……"
84301200500-50 = "……聖亞？那是什麼啊？"
84301200500-52 = "居然說「那是什麼」……"
84301200500-53 = "就算不知道名字，聽到「茶會」也應該想到了吧。"
84301200500-54 = "茶會？#n……啊～那個茶會啊。"
84301200500-58 = "……呃。"
84301200500-59 = "……真的假的。"
84301200500-61 = "抱，抱歉……！非常抱歉……！！"
84301200500-63 = "如今面臨的，是與風靡社群網站的「朝聖者」有關的議題。"
84301200500-64 = "擺脫既有自身的人去尋找自己了嗎？#n是與正值青春期的少年相同的狂風怒濤嗎？"
84301200500-65 = "與眾不同的自己……不，「自己」是什麼呢？#n也許實際上什麼也不是……又或者一切皆是……大概就是這麼一回事吧。"
84301200500-66 = "你那樣講，人家怎麼可能聽得懂……！"
84301200500-67 = "原來……是這樣啊，我明白了。#n還真是急迫的話題呢。"
84301200500-68 = "居然明白了！？怎麼可能！"
84301200500-69 = "那「離家出走的機器人寵物」現在在哪呢？"
84301200500-71 = "還真的聽懂了……"
84301200500-72 = "唔嗯，根據在社群網站上傳的那篇文章的位置資訊……應該在那條河邊的某個地方。"
84301200500-73 = "要現在過去看看嗎？#n如果能找到的話，飼主應該會很開心吧。"
84301200500-74 = "嗯，這倒是沒錯……"
84301200500-75 = "不過沒關係嗎？#n剛才不是說我們這組不要離開這附近嗎？"
84301200500-76 = "這……"
84301200500-77 = "去看看吧！說不定真的可以找到。"
84301200500-79 = "嗯，就這麼辦吧。"
84301200500-80 = "你真的是很討厭。"
84301200500-88 = "…………"
84301200500-89 = "……？？"
84301200500-91 = "夏，夏醬。#n那樣盯著人家看，會讓別人很有壓力的……"
84301200500-98 = "……嗯，走吧。"
84301200500-100 = "剛才那是什麼對話！？"
84301200500-101 = "追逐朝聖之路的同志之間，無需多言。"
84301200500-102 = "我們需要好嗎！？通常都需要好嗎！？"
84301200500-104 = "啊哈哈……"
84301200500-105 = "唔嗯……應該沒關係吧？#n如果去了發現不在那邊再馬上回來就好了。"
84301200500-106 = "哎，不用太擔心的，愛莉。"
84301200500-107 = "找個寵物還能發生什麼事咧。"

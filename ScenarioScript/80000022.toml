[translation]
80000022-1 = "讓世界變得更甜！"
80000022-2 = "夏萊．辦公室"
80000022-3 = "那個，老師……今天是情人節對吧……？"
80000022-4 = "所以我有個東西要想給老師……"
80000022-5 = "那個，因為有點害羞，可以把眼睛閉起來一下嗎？"
80000022-6 = "[s]閉上眼睛"
80000022-8 = "在我說可以之前絕對不能睜開眼睛唷？"
80000022-9 = "還有，可以稍微把嘴巴張開嗎？"
80000022-10 = "好，那麼……"
80000022-15 = "啊哈哈哈哈！大成功！"
80000022-16 = "呵呵，完全中計了呢，老師。"
80000022-17 = "[s1]「這樣真的沒問題嗎！？」\n[s2]「在嘴裡噴噴漆再怎麼說也不行吧！？」"
80000022-18 = "啊，別擔心。"
80000022-19 = "啊，別擔心。"
80000022-20 = "剛才的不是用來塗鴉的噴漆，而是能噴出食用巧克力的噴霧。"
80000022-25 = "是我在看到情人節巧克力後獲得的靈感！"
80000022-26 = "貝里塔斯又不是什麼世紀末的暴走族，不會突然往老師嘴裡噴噴漆的啦。"
80000022-27 = "[s]「確實，仔細品嘗後真的是甜的。」"
80000022-28 = "呵呵，抱歉嚇到你了。#n作為老師配合我惡作劇的禮物……好像也不能這麼說，總之也送一罐給老師。"
80000022-29 = "原本似乎是在用巧克力裝飾食物的時候用的唷。"
80000022-30 = "畢竟是難得的情人節，我想試著用這個來塗鴉。"
80000022-31 = "老師想想，如果路邊的牆上散發出甜甜的巧克力香味，#n這個世界是不是會變得更美好呀？"
80000022-32 = "如果老師也想讓某些東西變得甜甜的，就用這個試試看吧。"
80000022-36 = "……啊，雖然我想老師一定也知道，但是不可以直接噴在學生身上哦？"
80000022-37 = "那樣會有點，呃……別對別人這麼做哦？"

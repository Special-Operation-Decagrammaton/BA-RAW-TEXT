80000022-15 = "3;마키;03;하하하! 이상한 얼굴 하고 있어!\n#3;em;[재잘]\n#bgshake\n#3;a"
80000022-16 = "3;마키;07;후후, 이번 속임수는 대성공이네. 선생님을 이렇게 감쪽같이 속이다니……."
80000022-17 = "[s1] \"이게 무슨 짓이야?!\"\n[s2] \"입에 스프레이를 뿌리면 해롭잖아!\""
80000022-18 = "3;마키;99;아, 너무 걱정하지 마."
80000022-19 = "3;마키;99;아, 너무 걱정하지 마."
80000022-20 = "3;마키;00;내가 선생님의 입에 뿌린 건 벽을 칠할 때 쓰는 유성 래커가 아닌, 식용 스프레이거든.\n#3;em;[반짝]\n#3;hophop"
80000022-21 = "#st;[0,0];instant;1;"
80000022-22 = "#clearST"
80000022-23 = "3;마키;00\n#3;d\n#wait;1000"
80000022-24 = "#wait;2500"
80000022-25 = "3;마키;01;발렌타인 데이 기념품 매장에서 파는 초코 스프레이를 보고 좋은 영감이 떠올라서 하나 사 봤어!\n#3;a"
80000022-26 = "3;마키;03;아무리 베리타스에 괴짜가 많다지만 세기말의 폭주족도 아니고, 선생님의 입에 이유 없이 유성 래커를 뿌리지는 않는다고.\n#3;em;[재잘]"
80000022-27 = "[s] \"그러고 보니 어쩐지 단맛이…….\""
80000022-28 = "3;마키;01;후후, 내 장난에 어울려 주었으니 이 초코 스프레이는 선생님에게도 하나 줄게."
80000022-29 = "3;마키;99;원래는 음식에 초코 코팅을 입힐 때 쓰려고 만든 제품 같은데…….\n#3;em;[...]"
80000022-30 = "3;마키;01;오늘은 특별히 발렌타인 데이이기도 하니, 래커 대신 이걸로 그래피티를 해보려고."
80000022-31 = "3;마키;01;길가의 벽에서 달콤한 초콜릿 냄새가 난다면, 세상이 좀 더 달콤해지지 않을까— 싶어서.\n#3;em;[딴생각]\n#3;greeting"
80000022-32 = "3;마키;01;선생님도 뭔가 달콤하게 만들고 싶은 곳이 있다면 어디든 이 스프레이를 뿌려도 좋아.\n#3;hophop"
80000022-33 = "#st;[0,0];instant;1;"
80000022-34 = "#clearST"
80000022-35 = "3;마키;01\n#3;d\n#wait;1000"
80000022-36 = "3;마키;04;……아, 그래도 학생에게 직접 뿌리면 안 된다?\n#3;em;[?!]\n#3;shake\n#3;closeup\n#3;a"
80000022-37 = "3;마키;07;그랬다가는 이상한 오해를 살지도 모르니까……. 가급적 벽이나 가구에만 뿌려줘.\n#3;closeup"

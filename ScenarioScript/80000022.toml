[translation]
80000022-1 = "ให้โลกมีรสหวาน!"
80000022-2 = "สำนักงานชาเล่ต์"
80000022-3 = "นี่ คุณครู... วันนี้เป็นวันวาเลนไทน์นะ...?"
80000022-4 = "ฉันมีของบางอย่างอยากให้คุณครู..."
80000022-5 = "แต่จู่ๆ จะยื่นให้เลยมันก็เขินนิดหน่อย... คุณครูช่วยหลับตาก่อนได้มั้ย?"
80000022-6 = "[s] หลับตา"
80000022-8 = "ห้ามลืมตาเด็ดขาดจนกว่าฉันจะบอกนะ"
80000022-9 = "ถ้างั้น... อ้าปากสิ"
80000022-10 = "อ้าาาาา—"
80000022-15 = "ฮ่ะฮ่ะฮ่า! ทำหน้าแปลกชะมัด!"
80000022-16 = "ฮู่ว แผนหลอกคราวนี้ได้ผลด้วยแฮะ คุณครูโดนต้มซะเปื่อยเลย..."
80000022-17 = "[s1] \"เล่นอะไรของเธอเนี่ย?!\"\n[s2] \"นี่เอาสเปรย์มาฉีดใส่ปากครูเรอะ!\""
80000022-18 = "โธ่ ไม่ต้องห่วงหรอก"
80000022-19 = "โธ่ ไม่ต้องห่วงหรอก"
80000022-20 = "ที่ฉันฉีดเข้าไปไม่ใช่สเปรย์พ่นสีกำแพงซะหน่อย เป็นสเปรย์ที่ใช้กับอาหารต่างหาก"
80000022-25 = "พอดีไปเจอสเปรย์ช็อกโกแลตที่ขายในร้านเทศกาลวันวาเลนไทน์ เลยได้ไอเดียแบบนี้มาลองเล่นดูน่ะ!"
80000022-26 = "ถึงที่เวอริทัสจะมีพวกชอบเล่นแผลงๆ อยู่เยอะ แต่ฉันไม่ใช่พวกนักเลงสักหน่อยที่จะเอาแลคเกอร์พ่นสี#nมาพ่นใส่ปากคุณครูน่ะ"
80000022-27 = "[s] \"มิน่าล่ะถึงมีรสหวานๆ...\""
80000022-28 = "ฮิฮิ รับมุกฉันอีกซะด้วย ขอบคุณนะ งั้นฉันจะให้สเปรย์ช็อกโกแลตนี่กระป๋องหนึ่งก็แล้วกัน"
80000022-29 = "เหมือนมันจะเป็นพวกสเปรย์ที่ใช้เคลือบช็อกโกแลตลงบนขนมน่ะ..."
80000022-30 = "แล้ววันนี้ก็ยังเป็นวันวาเลนไทน์ด้วย ฉันเลยคิดจะเอาเจ้านี่ไปพ่นกราฟิตี้แทนสเปรย์พ่นสีดูน่ะ"
80000022-31 = "ผนังริมถนนจะได้มีกลิ่นช็อกโกแลตหอมอบอวล ถ้าเป็นแบบนั้นโลกของเราก็อาจจะหอมหวานขึ้น... ก็ได้ละมั้ง?"
80000022-32 = "ถ้าคุณครูมีที่ที่อยากทำให้มีกลิ่นหอมหวานละก็ ลองเอาสเปรย์นี่ไปพ่นดูสิ"
80000022-36 = "อ๊ะ แต่ห้ามเอาไปพ่นใส่นักเรียนนะ"
80000022-37 = "ไม่งั้นอาจถูกเข้าใจผิดแปลกๆ ก็ได้... เอาไปพ่นใส่ผนังหรือเฟอร์นิเจอร์ก็พอ"

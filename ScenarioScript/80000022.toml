80000022-1 = "#title;세상을 달콤하게!"
80000022-2 = "#place;샬레 업무관"
80000022-3 = "3;마키;05;……저, 선생님. 오늘이 발렌타인 데이잖아……?\n#3;em;[...]\n#3;a"
80000022-4 = "3;마키;05;그래서 선생님에게 주고 싶은 물건이 하나 있는데…….\n#3;stiff"
80000022-5 = "3;마키;05;그냥 건네기는 조금 부끄러우니까…… 잠깐 눈을 감아주었으면 좋겠어.\n#3;em;[///]\n#3;greeting"
80000022-6 = "[s] 눈을 감는다."
80000022-7 = "#all;hide"
80000022-8 = "#na;마키;내가 괜찮다고 할 때까지 절대로 눈을 뜨면 안 돼?"
80000022-9 = "#na;마키;그럼…… 잠깐 입을 벌려줘."
80000022-10 = "#na;마키;아—"
80000022-11 = "#st;[0,0];instant;1;"

[translation]
10040080-1 = "第8話;舊年的結尾，新年的開始"
10040080-3 = "……這裡應該不錯。"
10040080-7 = "窗外還是很亮對吧？#n明明都已經快要午夜了，外頭卻還是一片燈火通明。"
10040080-8 = "畢竟千年有很多學生習慣熬夜研究或鑽研發明，所以連夜晚也比其他地方還明亮……"
10040080-10 = "不過今晚確實比平常更亮呢。難道是因為今天是一年的最後一天嗎？"
10040080-11 = "仔細想想，這件事還真有趣呢。#n明明就算到了明天，也只會和往常一樣開始新的一年。"
10040080-12 = "人們卻會為今年的最後一天、新年的第一天賦予意義，並期盼著它的到來。"
10040080-13 = "並不是為了某些原因而紀念某一天，而是為了紀念某一天而創造理由。"
10040080-14 = "甚至就連這樣的「紀念」，也只是為了盡情玩樂或和親友相聚而已。"
10040080-15 = "一切的一切，都是為了合理化某個目的而創造出來的理由。"
10040080-16 = "這麼深究起來就會發現，這整件事的初衷其實再單純不過了。"
10040080-17 = "比如想要度過愉快的時光……"
10040080-18 = "想和某個人待在一起……#n想要確認、創造特定的回憶，將其烙印在記憶當中……"
10040080-19 = "又或者是……"
10040080-22 = "……想在某人的記憶裡，留下自己的痕跡。"
10040080-23 = "究竟得不坦率到什麼程度，才會創造出如此複雜的情況呢？"
10040080-24 = "為了掩飾這被稱為矯情都不為過的心態，刻意將其包裝得很美好……#n有時卻會因而遺忘了最純粹的本質。"
10040080-25 = "……當然我並不認為自己有資格指責其他人就是了，呵呵。"
10040080-26 = "畢竟光是今天，我就做了許多類似的舉動。"
10040080-27 = "[ns1]「乃愛不喜歡這樣嗎？」\n[ns2]「你認為這有什麼問題嗎？」"
10040080-30 = "……這個嘛，我也不太清楚。"
10040080-31 = "普遍而言，我認為為了維持良好的人際關係，這在某方面來說是不可或缺的。"
10040080-32 = "但即便如此，還是有許多人會讓他人清楚地明白自己的本意。"
10040080-33 = "讓對方理解自己在想些什麼，又或者自己說出某些話的意圖……#n所以我並不認為那該被稱作矯情。"
10040080-34 = "就拿小雪醬和優香醬來說……#n雖然表達的方式不盡相同，但他們終究是和純淨的水一樣清澈而透明的人。"
10040080-35 = "千年的其他學生也都大致如此。"
10040080-36 = "甚至就連莉央會長也是……無論再怎麼努力偽裝自己，他始終是個容易被看透的人。"
10040080-37 = "……嗯？"
10040080-38 = "你問我覺得自己如何？"
10040080-39 = "呵呵，老師問得還真直接呢。#n雖然這確實是我們正在談論的話題沒錯……"
10040080-40 = "不過關於這個問題……嗯……"
10040080-45 = "哎呀……啊哈哈。"
10040080-46 = "我剛才明明說了那麼多，結果現在卻又在斟酌該如何表達了。"
10040080-47 = "如你所見，我就是個這樣的人。#n雖然不是有意為之……但我總是會說出一些令人摸不著頭緒的話。"
10040080-48 = "請問這樣是否有回答到老師的問題呢？"
10040080-51 = "[ns]「嗯。」"
10040080-53 = "[ns3]「不過我也知道這並不是什麼問題。」\n[ns4]「就比如像現在這樣，跟我在一起的時候……」\n[ns5]「其實那都只是相對的而已，並沒有本質上的不同。」"
10040080-57 = "原來如此……"
10040080-58 = "我明白了……這麼說確實很符合邏輯呢。"
10040080-59 = "呵呵……"
10040080-60 = "或許就是因為這樣，大家才喜歡找老師說話吧？#n就連我都不知不覺養成這個習慣了。"
10040080-61 = "和老師說話總是能讓人非常放鬆。#n既不需要一字一句地解釋，也不需要拐彎抹角……"
10040080-62 = "更不需要勉強自己刻意坦率……"
10040080-66 = "那麼言歸正傳……"
10040080-67 = "老師現在應該明白，我為什麼會在這個時候把你找來這裡了吧？"
10040080-68 = "即便如此，你還是願意配合我嗎……？這樣真的好嗎？"
10040080-69 = "在這眾人皆已入睡的夜裡，一邊看著夜景，一邊迎接歲末年初。#n在這麼重要的時刻……"
10040080-70 = "將你帶來這空無一人的地方，藉此霸佔你的視線和注意力的意圖……"
10040080-71 = "……或者說我這樣的「本意」，老師真的覺得沒問題嗎？"
10040080-72 = "我這麼做真的可以嗎？"
10040080-73 = "或許從某些角度來看……"
10040080-74 = "……這麼做其實不太好也說不定。"
10040080-75 = "[s6]「你應該也知道這和你剛才說的話自相矛盾吧？」\n[s7]「……又是為了合理化某個目的而創造的理由呢。」"
10040080-78 = "……呵呵。"
10040080-79 = "就像我剛才說的一樣，我就是這種講話愛繞圈子的人。#n這已經是我的極限了。"
10040080-80 = "所以才希望老師能替我說出口……這樣我才能夠放心。"
10040080-81 = "……應該可以吧？#n拜託你了，老師。"
10040080-85 = "[ns]「我知道了。」"
10040080-87 = "[ns8]「對乃愛這種正值青春年華的少女來說，這種事再正常不過了。」\n[ns9]「這不是什麼不好的事，你不必感到擔心。」"
10040080-90 = "…………"
10040080-91 = "……………………"
10040080-92 = "……呼。"
10040080-93 = "……謝謝你，老師。"
10040080-102 = "我一直……期盼著老師的這句話。"
10040080-106 = "新年快樂，老師。"
10040080-107 = "那麼新的一年……"
10040080-111 = "……我們大家也要繼續請老師多多指教了。"
10040080-121 = "……啊。"
10040080-126 = "呵呵。我們今晚說的這些，麻煩要對大家保密哦。"
10040080-128 = "（之後和乃愛一起回到小雪的反省室裡，幫忙收拾派對結束後的狼藉）"
10040080-129 = "（收拾完畢並確認乃愛已經睡著之後，才回到夏萊休息）"
10040080-131 = "（……隔天下午）"
10040080-132 = "老師！！！"
10040080-133 = "[s10]「再讓我多睡一下……」\n[s11]「我已經不行了……媽媽……」"
10040080-136 = "你在說什麼啊！？#n別開玩笑了！工作還剩這麼多耶！！"
10040080-137 = "而且大家都特地來幫你了……！！老師也得拿出誠意來才行！！"
10040080-138 = "沒錯～我們連衣服都沒換就被抓來了耶～"
10040080-139 = "雖然我的確答應過會支援老師，不過我沒想到居然是這種支援……"
10040080-141 = "…………"
10040080-142 = "啊，如果是在這裡的話……"
10040080-143 = "……小玉，你先冷靜。"
10040080-144 = "……唔。"
10040080-146 = "嗚嗚嗚……我被抓來這裡居然只是為了破解密碼……"
10040080-147 = "我的人生跟自由究竟在何方……"
10040080-148 = "……呵呵，大家昨天明明還那麼安靜，今天卻這麼有活力呢。"
10040080-149 = "安靜……？"
10040080-150 = "我們有很安靜嗎……？#n我明明記得昨天玩得挺瘋的啊……"
10040080-151 = "小雪！手！！"
10040080-152 = "嗚啊啊啊──！！我的人生怎麼這麼不幸！！"
10040080-153 = "其他人應該也都清楚吧！？#n直到老師完成結算為止，誰也別想離開這裡！！"
10040080-154 = "好了！！大家快點開始吧！動作快！！"
10040080-155 = "是～～～"
10040080-156 = "老師你也動作快！你才是最應該努力的人！！"
10040080-157 = "[s12]「是……」\n[s13]「大家，對不起……」"
10040080-164 = "…………"
10040080-165 = "……呵呵。"
10040080-170 = "……一如既往的一天又開始了呢。"
10040080-171 = "祕密的午夜派對～鐘響時刻的捉迷藏～"

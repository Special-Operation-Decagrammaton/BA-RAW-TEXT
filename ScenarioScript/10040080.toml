[translation]
10040080-1 = "ตอนที่ 8;สิ้นสุดปีเก่า เริ่มเข้าปีใหม่"
10040080-3 = "ตรงนี้ก็น่าจะดีนะคะ..."
10040080-7 = "ข้างนอกสว่างมากเลยว่ามั้ยคะ? เกือบจะถึงเที่ยงคืนแล้ว แต่ข้างนอกยังเปิดไฟสว่างอยู่เลย"
10040080-8 = "ค่ำคืนในมิลเลเนียมค่อนข้างจะสว่างไสวมากกว่าที่อื่นอยู่แล้ว ที่นี่เต็มไปด้วยนักเรียนที่ศึกษาค้นคว้า และประดิษฐ์สิ่งต่างๆ กันถึงดึกดื่น..."
10040080-10 = "แต่ถึงอย่างนั้น ฉันก็คิดว่าค่ำคืนนี้สว่างไสวมากเป็นพิเศษนะคะ หรือว่าเพราะเป็นคืนสุดท้ายของปีนะ?"
10040080-11 = "พอมาคิดๆ ดูแล้วก็ตลกดีนะคะ พอวันพรุ่งนี้มาถึง เราก็จะเริ่มปีใหม่กันเป็นเรื่องปกติ"
10040080-12 = "แต่เราก็ไปให้ความหมายกับมันด้วยเหตุผลว่าวันนี้คือวันสุดท้ายของปี และพรุ่งนี้คือวันแรกของปี แล้วก็รอคอยช่วงเวลานี้กัน"
10040080-13 = "แทนที่จะฉลองวันนั้นๆ เพราะมีเหตุผลบางอย่าง แต่เรากลับสร้างเหตุผลให้ฉลองวันที่นั้นๆ แทน"
10040080-14 = "แต่ถึงจะบอกว่าเป็นการ 'ฉลอง' แต่ที่จริงแล้วเราก็แค่อยากจะเล่นสนุกสนานด้วยกันเท่านั้น"
10040080-15 = "ทุกสิ่งทุกอย่างล้วนมีเหตุผลในเหตุผลอีกที"
10040080-16 = "แต่หากมองให้ลึกลงไป เราก็จะพบว่ามันเป็นเรื่องที่เรียบง่ายและเข้าใจได้ง่ายมาก"
10040080-17 = "เราอยากมีช่วงเวลาที่สนุกสนาน..."
10040080-18 = "อยากอยู่ด้วยกัน อยากยืนยันว่ายังมีกัน อยากสร้างความทรงจำแสนพิเศษ อยากอยู่ในความทรงจำ"
10040080-19 = "หรือไม่ก็..."
10040080-22 = "อยากทิ้งความทรงจำเอาไว้ให้..."
10040080-23 = "ทำไมถึงไม่กล้าเปิดเผยอย่างตรงไปตรงมา จนต้องมาสร้างสถานการณ์ให้ยุ่งยากขนาดนี้นะคะ"
10040080-24 = "จะบอกว่าการกระทำนั้นเป็นการเสแสร้งก็คงไม่ได้ แต่ถึงอย่างนั้นมันก็เป็นการประดิษฐ์เพื่อให้ออกมา#nดูดี จนบางครั้งเราก็ลืมแก่นสารที่แท้จริงไป"
10040080-25 = "ฉันรู้ค่ะว่าตัวเองไม่ได้อยู่ในสถานะที่จะมาบอกว่าคนนู้นคนนี้แปลก... ฮุฮุ"
10040080-26 = "แต่ถึงยังไง วันนี้พวกเราก็ทำแบบนั้นไปนับครั้งไม่ถ้วนแล้วค่ะ"
10040080-27 = "[ns1] \"โนอาไม่ชอบการทำแบบนั้นเหรอ?\"\n[ns2] \"คิดว่าการทำแบบนั้นเป็นปัญหาเหรอ?\""
10040080-30 = "อืม... ก็ไม่รู้สิคะ"
10040080-31 = "แต่ฉันคิดว่ามันก็เป็นสิ่งสำคัญในการรักษาความสัมพันธ์ระหว่างกันค่ะ คงเป็นเรื่องของสามัญสำนึกน่ะค่ะ"
10040080-32 = "แต่กับหลายๆ คนก็ถ่ายทอดความหมายที่แท้จริงที่ซ่อนอยู่ในการกระทำนั้นให้อีกฝ่ายได้อย่างดี"
10040080-33 = "เราจึงเข้าใจได้ว่าอีกฝ่ายคิดอะไร และพูดด้วยเจตนาแบบไหนน่ะค่ะ ฉันก็เลยคิดว่าจะเราเรียกการ#nกระทำนั้นว่าเป็นการเสแสร้งไม่ได้ค่ะ"
10040080-34 = "ทั้งโคยูกิจังและยูกะจัง ต่อให้ทั้งสองคนจะมีวิธีการแสดงออกที่แตกต่างกัน แต่สุดท้ายแล้วก็เห็นได้#nชัดเจนไม่ใช่เหรอคะ? ชัดเหมือนน้ำที่ใสสะอาดเลยละ"
10040080-35 = "ที่จริงแล้วคนอื่นในมิลเลเนียมก็ไม่ได้ต่างกันมากหรอกค่ะ"
10040080-36 = "แม้แต่ประธานริโอะของพวกฉันเองก็... ถึงจะทำเป็นเหมือนไม่ใช่ แต่จริงๆ แล้วเป็นคนที่เข้าใจได้ง่าย#nมากค่ะ"
10040080-37 = "คะ...?"
10040080-38 = "แล้วฉันเป็นคนแบบไหนน่ะเหรอคะ?"
10040080-39 = "ฮุฮุ คุณครูนี่ละก็ ถามตรงจังเลยนะคะ ถึงตอนนี้เราจะกำลังพูดในหัวข้อนั้นกันอยู่ก็เถอะ"
10040080-40 = "ถ้างั้นคำตอบของคำถามนั้น... อืม..."
10040080-45 = "เอ๋... แหะๆๆ"
10040080-46 = "ฉันเพิ่งพูดเรื่องการพูดอ้อมค้อมไปเมื่อกี้เอง แต่กลายเป็นว่าฉันกำลังคิดจะทำแบบนั้นจนได้นะคะ"
10040080-47 = "ใช่ค่ะ ฉันเป็นคนแบบนี้อย่างที่คุณครูเห็นนั่นละค่ะ คนที่ถึงแม้จะไม่ได้เจตนาให้เป็นอย่างนั้น... แต่ก็ถูกคนอื่นบอกบ่อยๆ ว่าเป็นคนที่เข้าใจได้ยาก"
10040080-48 = "ว่ายังไงล่ะคะ พอจะได้คำตอบในสิ่งที่ถามมั้ยคะ?"
10040080-51 = "[ns] \"อื้อ\""
10040080-53 = "[ns3] \"แต่สำหรับครู นั่นไม่ใช่ปัญหาหรอกนะ\"\n[ns4] \"ถึงโนอาจะพูดอ้อมค้อมกับครูก็ไม่เป็นไรหรอก\"\n[ns5] \"ครูเข้าใจถึงความจริงใจที่ซ่อนอยู่ในนั้นนะ\""
10040080-57 = "อ่า..."
10040080-58 = "อย่างนี้สินะ... สมเหตุสมผลจังเลยค่ะ ทำเอาฉันคล้อยตามเลย"
10040080-59 = "ฮุฮุ..."
10040080-60 = "นี่อาจเป็นเหตุผลว่าทำไมทุกคนถึงอยากคุยกับคุณครูนะคะ ดีไม่ดีฉันเองก็อาจจะติดเป็นนิสัยก็ได้ค่ะ"
10040080-61 = "ได้พูดคุยกับคุณครูแล้วสบายใจจริงๆ เลยนะคะ ฉันไม่จำเป็นต้องอธิบายให้มากความ ไม่ต้องพูดอ้อมค้อม..."
10040080-62 = "แล้วก็ไม่ต้องฝืนให้ตัวเองพูดอย่างเปิดเผยด้วยค่ะ"
10040080-66 = "ถ้าอย่างนั้น..."
10040080-67 = "ฉันว่าคุณครูก็คงจะรู้ใช่มั้ยคะว่าทำไมฉันถึงพาคุณครูมาที่นี่ในเวลาแบบนี้"
10040080-68 = "แต่ถึงยังไงก็ยังจะออกมาคุยกับฉัน... งั้นเหรอคะ? จะไม่เป็นไรเหรอคะ?"
10040080-69 = "ในยามดึกที่ทุกคนพากันหลับไหล ช่วงเวลาสำคัญที่ได้ดูทิวทัศน์ยามค่ำคืน แล้วบอกลาปีเก่า เข้าสู่ปีใหม่ไปด้วยกัน"
10040080-70 = "เจตนาของฉันที่จะดึงดูดสายตาและความสนใจมาไว้ที่ฉันคนเดียวในที่ที่ไร้ผู้คนแบบนี้"
10040080-71 = "คุณครูคิดว่า 'เจตนาที่แท้จริง' ของฉันไม่เป็นปัญหาจริงๆ เหรอคะ?"
10040080-72 = "ฉันเป็นเด็กแบบนี้ได้เหรอคะ?"
10040080-73 = "แล้วแต่คนจะคิดนะคะ..."
10040080-74 = "แต่การทำแบบนี้ ฉันว่าอาจจะดูไม่ดีก็ได้ค่ะ..."
10040080-75 = "[s6] \"รู้ใช่มั้ยว่าพูดแตกต่างจากที่พูดเมื่อกี้น่ะ?\"\n[s7] \"หาเหตุผลในเหตุผลอีกแล้ว...\""
10040080-78 = "ฮุฮุ..."
10040080-79 = "อย่างที่ฉันบอกไปเมื่อกี้ค่ะ สุดท้ายแล้วฉันก็เป็นคนที่ชอบพูดอ้อมค้อมแบบนี้ละ มันเป็นขีดจำกัดของฉันน่ะค่ะ"
10040080-80 = "เพราะงั้นฉันเลยอยากให้คุณครูพูดแทนฉัน และอยากให้คุณครูทำให้ฉันวางใจได้ค่ะ"
10040080-81 = "ได้อยู่ใช่มั้ยคะ...? ต้องขอรบกวนด้วยนะคะ คุณครู"
10040080-85 = "[ns] \"ได้สิ\""
10040080-87 = "[ns8] \"นี่เป็นเรื่องธรรมชาติของเด็กสาวน่ะ\"\n[ns9] \"ไม่มีอะไรที่แย่หรอก ไม่ต้องกังวลนะ\""
10040080-90 = "..."
10040080-91 = "........."
10040080-92 = "ฮู่ว..."
10040080-93 = "ขอบคุณนะคะคุณครู..."
10040080-102 = "ฉันกำลังรอฟังคำนั้นอยู่เลยค่ะ..."
10040080-106 = "สวัสดีปีใหม่นะคะ คุณครู"
10040080-107 = "และต่อไปก็..."
10040080-111 = "ขอฝากพวกเราทุกคนด้วยนะคะ"
10040080-121 = "อ่า..."
10040080-126 = "ฮุฮุ สิ่งที่ฉันพูดกับคุณครูวันนี้ ช่วยเก็บเป็นความลับกับทุกคนด้วยนะคะ"
10040080-128 = "(หลังจากนั้นคุณครูก็กลับไปที่ห้องสำนึกผิดของโคยูกิพร้อมกับโนอา และเก็บกวาดข้าวของด้วยกัน)"
10040080-129 = "(หลังจากทำความสะอาดและเห็นว่าโนอาหลับไปแล้ว คุณครูก็กลับมาที่ชาเล่ต์แล้วนอนหลับไป)"
10040080-131 = "(บ่ายวันต่อมา...)"
10040080-132 = "คุณ~ ครู~!!!"
10040080-133 = "[s10] \"ขอให้ครูได้พักหน่อยเถอะ...\"\n[s11] \"ไม่ไหวแล้ว... แม่จ๋า...\""
10040080-136 = "พูดอะไรอย่างนั้นคะ!? จะมานอนอยู่ไม่ได้นะคะ! งานค้างเป็นกองขนาดนี้!!"
10040080-137 = "ทุกคนอุตส่าห์มาช่วยกันถึงที่นี่แล้วด้วย...!! ต้องทุ่มเทกับงานให้พวกเราเห็นมากกว่านี้สิคะ!!"
10040080-138 = "ใช่~ นี่ฉันถูกลากมาทั้งๆ ที่ยังไม่ได้เปลี่ยนชุดเลยนะ~"
10040080-139 = "ฉันก็ว่าจะมาช่วยเหลือคุณครู แต่ไม่รู้มาก่อนเลยว่าจะเป็นการช่วยงานเอกสารแบบนี้..."
10040080-141 = "..."
10040080-142 = "โอ้ ถ้าเป็นที่นี่ละก็..."
10040080-143 = "โคทามะ... สต็อป!"
10040080-144 = "อึก..."
10040080-146 = "อึก... ให้ฉันมาไกลถึงที่นี่ แล้วจะใช้ให้ถอดรหัสอีกแล้วเหรอคะ..."
10040080-147 = "ชีวิตของฉัน อิสระของฉัน... อยู่ที่ไหน..."
10040080-148 = "ฮุฮุ... เมื่อวานละเงียบสงบกัน แต่วันนี้คึกคักกันจังเลยนะคะ"
10040080-149 = "เงียบสงบ...?"
10040080-150 = "เราเงียบสงบกันเหรอ...? เมื่อวานเหมือนจะยุ่งวุ่นวายกันมากเลยนะ..."
10040080-151 = "โคยูกิ! เอามือออกมาจากตรงนั้นเลย!!"
10040080-152 = "อ๊ากกกก!! ปีนี้ฉันปีชงเหรอเนี่ย!!"
10040080-153 = "ทุกคนรู้กันแล้วใช่มั้ยคะ!? ถ้าคุณครูยังปิดงบไม่เสร็จ ไม่ว่าใครก็ห้ามออกไปจากที่นี่!!"
10040080-154 = "เอาละ!! ถ้ารู้แล้ว ทุกคนก็มาช่วยกันค่ะ! เร็วเข้า!!"
10040080-155 = "ค่า~~~"
10040080-156 = "คุณครูก็ด้วย!! ให้ไวเลย! ครูต้องตั้งใจกว่าใครๆ นะคะ!!"
10040080-157 = "[s12] \"จ้า...\"\n[s13] \"ขอโทษนะทุกคน...\""
10040080-164 = "..."
10040080-165 = "ฮุฮุ..."
10040080-170 = "เป็นวันแรกของปีที่สนุกดีนะคะ"
10040080-171 = "ปาร์ตี้ซีเคร็ตมิดไนต์ ~ซ่อนหารับปีใหม่~"

[translation]
10040080-1 = "Episode 8;One Year Ends, a New Year Begins"
10040080-3 = "...This spot will do."
10040080-7 = "Even though it's almost midnight, it's still bright out, isn't it? The district is still lit up."
10040080-8 = "On any given day, the night owls of Millennium are always researching late into the night, so the city never really sleeps."
10040080-10 = "Tonight, however, is brighter than most. The twinkle of the last night of the year."
10040080-11 = "Isn't it fascinating? Another year will start tomorrow, as a new day just like any other begins."
10040080-12 = "We assign meaning to it as the \"first\" and \"last\" days of the year, and we eagerly anticipate their coming."
10040080-13 = "Rather than commemorating a day for a special reason, we're manufacturing our own reasons to commemorate a day of our choosing."
10040080-14 = "Even the idea of commemorating something...it's just another reason to come together and celebrate."
10040080-15 = "Everything is a reason for a reason for a reason."
10040080-16 = "If you dig into all those reasons, you find a very simple explanation at their core."
10040080-17 = "...The desire to have fun together."
10040080-18 = "To spend time together. Build relationships. Create memories."
10040080-19 = "Or be a part..."
10040080-22 = "...of someone else's memory."
10040080-23 = "Is it really so difficult to be honest with ourselves that we choose to play along with these troublesome fabrications and pose them as \"reasons\"?"
10040080-24 = "It feels pretentious to package up these desires in pretty packaging and disregard the actual contents."
10040080-25 = "Although...I'm in no position to criticize or judge others for this. Fufu."
10040080-26 = "Just look at today. I'm guilty as charged."
10040080-27 = "[ns1] \"Noa, do those things bother you?\"\n[ns2] \"Do you think it's wrong to act that way?\""
10040080-30 = "...Hm. I don't have an answer to that."
10040080-31 = "I think it's an essential function we've developed for the sake of our interpersonal relationships. That's common sense, isn't it?"
10040080-32 = "But people are adept at understanding the true intent behind others' actions."
10040080-33 = "We can often understand the true meaning people are trying to convey without them having to verbalize it. So I guess I can't say it's all pretentious."
10040080-34 = "Even though their communication styles are different, Koyuki and Yuuka are both transparent in their own way."
10040080-35 = "And many other Millennium students are similar."
10040080-36 = "Even President Rio. She does her utmost to complicate things, but she's an easy person to understand, at the end of the day."
10040080-37 = "...What?"
10040080-38 = "...What do I think of myself?"
10040080-39 = "Fufu. I would say that's very forward of you, but I suppose that's what the true, underlying topic of this conversation is."
10040080-40 = "My answer to that question would be..."
10040080-45 = "Oh dear...haha."
10040080-46 = "After that fancy speech, I'm still choosing my words so carefully."
10040080-47 = "Which I suppose is an answer, in and of itself. This is who I am, even if I don't intend it to be. It's why people think I'm difficult to read and get to know."
10040080-48 = "Does that answer your question?"
10040080-51 = "[ns] \"Right.\""
10040080-53 = "[ns3] \"I also know that it's not a problem.\"\n[ns4] \"For example, times like these. When it's us two.\"\n[ns5] \"It's all just relative. Not much different.\""
10040080-57 = "...Aha."
10040080-58 = "Indeed...that's quite logical. I understand."
10040080-59 = "Fufu..."
10040080-60 = "I could get used to this. I can see why everyone is always clambering to spend time with you, Sensei."
10040080-61 = "Speaking with you is natural. There's no need for me to overexplain myself nor beat around the bush."
10040080-62 = "I don't have to force myself to be honest."
10040080-66 = "So back to the topic at hand."
10040080-67 = "You must know the reason I brought you all the way out here, at this time."
10040080-68 = "And you're still willing to be out here with me? Are you sure?"
10040080-69 = "Everyone is asleep. We're greeting the new year while taking in the night view, just the two of us."
10040080-70 = "My intention was to be alone with you, to monopolize your attention and gaze."
10040080-71 = "My intent in this moment is truly \"not a problem\"? Sensei?"
10040080-72 = "...Is it okay for me to be acting like this?"
10040080-73 = "Depending on how you view it..."
10040080-74 = "...I may have bad intentions."
10040080-75 = "[s6] \"You realize this contradicts everything you just said, right?\"\n[s7] \"...It's another reason for the sake of a reason.\""
10040080-78 = "...Heehee."
10040080-79 = "As I just said, this is ultimately who I am. Someone who speaks in circles. It's all I'm capable of."
10040080-80 = "So I suppose I'm looking for reassurance. For you to be straightforward, where I can't be."
10040080-81 = "...Is that okay?"
10040080-85 = "[ns] \"No problem.\""
10040080-87 = "[ns8] \"This is a natural thing for a girl your age.\"\n[ns9] \"You did nothing wrong. You don't have to worry.\""
10040080-90 = "..."
10040080-91 = "..."
10040080-92 = "...Whew."
10040080-93 = "...Thank you, Sensei."
10040080-102 = "Those were the words I was hoping to hear."
10040080-106 = "Happy New Year, Sensei."
10040080-107 = "Please continue being a good teacher to us all..."
10040080-111 = "...today, tomorrow, and far in the future."
10040080-121 = "...Ah."
10040080-126 = "Fufu. And please keep this conversation our little secret."
10040080-128 = "After that, I returned to Koyuki's Self-Reflection Room with Noa and tidied up the mess."
10040080-129 = "Once we finished cleaning, and Noa was fast asleep, I returned to Schale and passed out."
10040080-131 = "...The next afternoon."
10040080-132 = "Sensei!!"
10040080-133 = "[s10] \"Let me sleep...just a little longer...\" \n[s11] \"Five more minutes...Mooom...\""
10040080-136 = "What are you even saying? Absolutely not! There's still so much to do!"
10040080-137 = "Everyone came all this way to help, so please try a little harder!"
10040080-138 = "Seriously! We didn't even get to change before she dragged us out here!"
10040080-139 = "When I said I'd help Sensei however I could, this isn't exactly what I meant."
10040080-141 = "..."
10040080-142 = "Oh? This is..."
10040080-143 = "...Kotama. Stop."
10040080-144 = "...Heh."
10040080-146 = "Ugh...to have to come all the way here...just to be a password thief..."
10040080-147 = "My life, my freedom, where did it go...?"
10040080-148 = "...Fufu. It was so quiet yesterday, but today is really lively."
10040080-149 = "...Quiet...?"
10040080-150 = "I-Is that what you call quiet? To me, that was a total disaster."
10040080-151 = "Koyuki!"
10040080-152 = "Kyaaah! Life is so hard! Tragic!"
10040080-153 = "Listen up, everyone! Until Sensei finishes their finance report, no one leaves this room!"
10040080-154 = "If you understand what I'm saying, then get moving! Now!"
10040080-155 = "Yes, ma'am...!"
10040080-156 = "And you, Sensei! You should be trying harder than anyone!"
10040080-157 = "[s12] \"Yeeessss...\" \n[s13] \"I'm sorry, everyone...\""
10040080-164 = "..."
10040080-165 = "...Heehee."
10040080-170 = "...Today really is a first day that's just like any other day."
10040080-171 = "Secret Midnight Party: The Chimes of Tag"

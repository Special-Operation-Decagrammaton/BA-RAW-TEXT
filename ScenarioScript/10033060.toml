[translation]
10033060-1 = "Episode 6;Fantasy Nightmare"
10033060-2 = "We're still slightly behind schedule..."
10033060-3 = "But at least we managed getting the Gehenna students unpacked without...much issue."
10033060-4 = "Thanks to Sensei's help..."
10033060-5 = "[ns] \"That was an experience! Ahaha!\""
10033060-7 = "But we're still rather behind schedule."
10033060-8 = "I still need to check that everything is set up for the test of courage, but someone needs to retrieve the students from their dorms..."
10033060-9 = "Oh, oh! I can help with that!"
10033060-11 = "Isn't it rather late for you, Kaede? Are you sure?"
10033060-12 = "I'm... *yawn* a little tired! But no proper lady backs down from her duties. I'll just consider it extra training!"
10033060-16 = "Let's get going then."
10033060-19 = "I believe the starting point was near here."
10033060-25 = "It's like looking for a needle in a haystack, but here they are! Thank you all for your hard work."
10033060-26 = "How was that? Not too scary?"
10033060-27 = "It was perfect! It's adorably terrifying."
10033060-28 = "...I hope this lives up to their expectations. I don't know how much this will actually test their courage."
10033060-30 = "[ns] \"I think it's right around here...\""
10033060-33 = "You must be tired being up this late... Do you want to borrow a pillow later?"
10033060-34 = "Thank you, President Tsubaki! We're honored, but we've heard your pillows are so comfortable, you might never wake up."
10033060-35 = "That's correct... I take a lot of pride in my pillow selection."
10033060-36 = "Why do you say that like it's a good thing?!"
10033060-40 = "We're about two thirds of the way through the course."
10033060-41 = "It's nice to have a win under our belt. I'm deeply grateful for everyone's hard work on this courage festival."
10033060-45 = "[ns] \"Courage...festival?\""
10033060-46 = "I suppose festival isn't the correct word choice here. "
10033060-47 = "But, in a way, it reminds me of one. Everyone is working hard in their dedicated role to create a successful experience for the participants."
10033060-48 = "And if the Gehenna students are able to walk away, excitedly talking about their favorite parts and happy to have been here..."
10033060-49 = "Isn't that a festival in its own right?"
10033060-50 = "[s] \"I'm somehow convinced!\""
10033060-51 = "You understand?! The pressure to be the perfect guide was rather overwhelming at first."
10033060-52 = "But I began to view all of this as the festival of a lifetime, and I found that rewarding in its own right."
10033060-53 = "You've molded this difficult situation into a manageable one just by shifting your perspective."
10033060-54 = "You're a true inspiration, Umika! Consider me your ardent pupil for life!"
10033060-55 = "R-Really? I never really thought of myself that way..."
10033060-61 = "Kihehehe. Spoken like a true leader. Ignore reality, and live only by your own perceptions!"
10033060-62 = "[ns] \"That very distinct laugh...\""
10033060-63 = "You recognize me by voice alone? Kihehehe! It's difficult for even me to comprehend my overwhelming aura!"
10033060-64 = "Hi, hi! It's the Hyakkiyako sisters and Sensei! Hi from Ibuki!"
10033060-65 = "*sigh* I'm really sorry about this. I tried to stop her."
10033060-66 = "The Pandemonium Society?! What brings you to the test of courage?"
10033060-67 = "Heeheehee. I think you'll be rather surprised by the answer. You see—"
10033060-69 = "We're here to make you happy!"
10033060-70 = "I was about to say that!"
10033060-71 = "Luckily I, Kyougoku Satsuki, am a generous person whose patience knows no bounds."
10033060-72 = "I would willingly hand over the last strawberry on top of a cake to my adorable little sister."
10033060-73 = "On that, I can agree with you, Satsuki. "
10033060-74 = "After all, Pandemonium Society officers are known for their hearts of gold!"
10033060-75 = "Where did you pull that one out of, Makoto?"
10033060-76 = "...She just says whatever she thinks sounds good."
10033060-78 = "Kihehehe. Behold the generosity of the great Makoto as I extend a helping hand to other academies. My kindness is deeper than the oceans and more vast than the night sky!"
10033060-79 = "Undoubtedly, the students of Gehenna will hear the tales of my charity and shout their praise of the Pandemonium Society all throughout the district."
10033060-80 = "This will be recorded in the history books as the moment the student body fell for the great Makoto and her magnificent leadership!"
10033060-81 = "That's right, folks! The dignified leader who stands atop the Pandemonium Society!"
10033060-82 = "...She said that about herself though."
10033060-84 = "I truly appreciate your consideration, um, great chairman of Gehenna, but..."
10033060-85 = "Hey, Makoto. What's that thingie over there?"
10033060-90 = "...?"
10033060-100 = "...Ah!"
10033060-101 = "...Wow."
10033060-102 = "..."
10033060-107 = "W-Wah... *sniffle*"
10033060-108 = "Ibuki?!"
10033060-110 = "Everyone, panic! Emergency!"
10033060-111 = "Ibuki?! Are you okay? Satsuki? C-Calm down! "
10033060-115 = "What are those...things?!"
10033060-116 = "Huh?!"
10033060-117 = "(I-I didn't approve those!)"
10033060-118 = "(C-Calm down. I'll contact the students in charge of costuming first.)"
10033060-123 = "Hello, guide team here. I'm sending you my coordinates now, but I've encountered some strange ghost costumes here that were not preapproved."
10033060-124 = "...Huh? If no one was assigned to this location, that must mean..."
10033060-128 = "H-Help... Ibuki is scared... Iroha, Makoto!"
10033060-129 = "It's okay, Ibuki. Come here. I won't let anything happen to you!"
10033060-130 = "This doesn't seem like it was a part of the plan. The Hyakkiyako students are way too shaken up for that to be true."
10033060-136 = "Ugh! How dare they?! I'll take you down with my hypnosis."
10033060-137 = "Sure. Go ahead. That sounds like a great idea."
10033060-139 = "[ns] \"Everyone, stop! What is that...?\""
10033060-140 = "Everyone, stay behind me."
10033060-141 = "Can't you see that Ibuki's crying, Iroha?! Bring out \"that\" immediately!"
10033060-142 = "Per usual, I don't know what \"that\" is, and even if I did, we're not in Gehenna and I can't bring anything out."
10033060-143 = "But I can't just sit around while Ibuki's crying."
10033060-147 = "Pandemonium Society! Protect Ibuki and engage the threat!"
10033060-148 = "Yay! Charge, charge!"

[translation]
10033060-1 = "第6話;惡夢成真"
10033060-2 = "呼……雖然行程還是有所延誤……"
10033060-3 = "幸好格黑娜的學生們，在把行李放到住處的環節還算順利……"
10033060-4 = "因為老師也幫了很多忙，嗯。"
10033060-5 = "[ns]「……就是說啊……」"
10033060-7 = "但是行程已經亂掉……這點依然沒有改變。"
10033060-8 = "現在應該要進行試膽大會的最後檢查，但好像只能檢查一半就得帶學生過來了！"
10033060-9 = "啊，那就交給我吧。"
10033060-11 = "可以嗎，楓？"
10033060-12 = "呼啊啊……雖然有點睏，但我會努力的！#n這也是為了成為出色淑女的修行！"
10033060-16 = "那……我們也開始工作吧？"
10033060-19 = "應該差不多是在這個時候……"
10033060-25 = "出現了！你們好呀！辛苦了！"
10033060-26 = "那個……這樣會不會太可怕了？"
10033060-27 = "不會，我反而覺得這樣很可愛很棒。"
10033060-28 = "明明是試膽大會，被用可愛來形容好像也有點……"
10033060-30 = "[ns]「從計劃書來看，應該就在這附近……」"
10033060-33 = "忙到這麼晚，真是辛苦了……等等睡覺的時候，要不要借你一個睡眠枕頭？"
10033060-34 = "不會不會，沒關係的。#n椿部長的枕頭雖然很好……但據說會因為太舒服，以至於到第二天中午都起不來。"
10033060-35 = "那不只是傳聞哦？"
10033060-36 = "那不就更不行了嗎！？"
10033060-40 = "這樣我們大約走過了三分之二的路線。"
10033060-41 = "多虧有大家的努力……這次的試膽慶典應該能圓滿結束。"
10033060-45 = "[ns]「試膽……慶典？」"
10033060-46 = "啊，仔細想想好像不是慶典……"
10033060-47 = "但是，老師。這麼多人為了試膽大會的成功而努力……彼此合作，各盡其職……"
10033060-48 = "接著只要能讓格黑娜的學生們，從中獲得滿足和解放感……"
10033060-49 = "從某個方面來說，這也很接近慶典了吧？"
10033060-50 = "[s]「我莫名開始被說服了！」"
10033060-51 = "對吧！？#n雖然要為格黑娜的學生們進行導覽，一開始確實讓人有點負擔……"
10033060-52 = "但是當我意識到這都是慶典的一部分之後，反而開始湧出了一股力量！"
10033060-53 = "原來如此！心態改變之後，即使面對困難和壓力也能順利應對！"
10033060-54 = "不才菲娜，今天也學到了一課！#n你真厲害，海花！"
10033060-55 = "這，這好像有點過獎了……"
10033060-61 = "嘻嘻嘻，你說得沒錯。#n重要的並不是真相，而是觀察事情的角度！"
10033060-62 = "[ns]「哦……？這個笑聲該不會是！？」"
10033060-63 = "嘰哈哈哈哈！#n光憑聲音就能展現自己的存在感，我真琴大人的人氣真是連我自己都害怕啊！"
10033060-64 = "嗨，百鬼夜行的姐姐們！#n老師！伊吹也來了唷！"
10033060-65 = "唉……打擾到你們工作，真不好意思。"
10033060-66 = "真，真琴議長！？還有萬魔殿的各位！？#n這，這時間來這裡有什麼事嗎……！？"
10033060-67 = "呵呵呵。聽了可別嚇到哦？是因為……！"
10033060-69 = "嗯！伊吹是來幫姐姐們加油的！"
10033060-70 = "啊，台詞被搶走了。"
10033060-71 = "不過沒關係，就算蛋糕上的草莓被可愛的妹妹吃掉，我也會大度地包容……"
10033060-72 = "那就是我京極皐月的度量，呵呵。"
10033060-73 = "嘻嘻嘻……說得很好，皐月。"
10033060-74 = "對於萬魔殿的高層來說，這種寬容的心是很重要的。"
10033060-75 = "哦哦……！"
10033060-76 = "……啊，原來有這麼回事嗎？"
10033060-78 = "嘻嘻嘻……沒什麼好隱瞞的……！#n我真琴大人毫不吝嗇地支援其他學園活動的雅量，簡直堪比大海啊！"
10033060-79 = "嗯！如果這份寬容的理解之心被大家得知，#n肯定能讓所有格黑娜的學生對我們萬魔殿……"
10033060-80 = "不，準確來說是對我真琴大人的威榮感到驚嘆和敬畏！"
10033060-81 = "原來如此！這就是萬魔殿的領導者！立於萬魔殿頂點之人的品格……！"
10033060-82 = "這種話怎麼能從自己口中說出來呢。"
10033060-84 = "那個……非常感謝格黑娜議長的關心……"
10033060-85 = "嗯？真琴前輩～前面那個～是什麼～？"
10033060-90 = "……？"
10033060-100 = "…………啊。"
10033060-101 = "……哇嗚。"
10033060-102 = "…………"
10033060-107 = "嗚，嗚嗚……"
10033060-108 = "伊吹！？"
10033060-110 = "緊，緊，緊急情況～！"
10033060-111 = "皐，皐月！？伊吹！？#n你們沒事吧！？先，先冷靜一點…… "
10033060-115 = "話說那到底是什麼！？"
10033060-116 = "！！？？"
10033060-117 = "（這樣的裝扮……計劃表上肯定沒有吧……！？）"
10033060-118 = "（總，總之先聯絡扮演幽靈的學生們……）"
10033060-123 = "是，這裡是導覽組。#n關於試膽大會的幽靈……我將我們的坐標發送給你們，請確認……"
10033060-124 = "咦？你說這個位置沒有分配任何人員？#n也就是說……？"
10033060-128 = "伊呂波前輩、真琴前輩……伊吹好害怕……"
10033060-129 = "伊吹！別擔心。不用害怕，我們都在這裡。"
10033060-130 = "……話說好像不太對勁。百鬼夜行他們的反應也是。"
10033060-136 = "可惡！能用我的催眠術來擊倒這些傢伙嗎！？"
10033060-137 = "……我覺得很難。"
10033060-139 = "[ns]「大家先等等……前面的是……？」"
10033060-140 = "大家，先後退。"
10033060-141 = "伊呂波！你還在做什麼！立刻準備「那個」！伊吹可是都哭了啊！"
10033060-142 = "雖然同樣的話好像說過很多次了，但「那個」到底是哪個啊？#n而且這裡又不是格黑娜，我哪有辦法立刻準備。"
10033060-143 = "……不過我也不會坐以待斃。"
10033060-147 = "為了伊吹，我們萬魔殿將會排除威脅！"
10033060-148 = "上吧～！突擊突擊～！"

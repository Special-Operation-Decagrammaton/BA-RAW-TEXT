10033060-41 = "3;우미카;03;다행히 다들 열심히 해 주셔서…… 이번 담력 시험 축제는 성공적으로 마무리될 수 있을 것 같네요. 다행이에요.\n#3;em;[반짝]\n#3;greeting"

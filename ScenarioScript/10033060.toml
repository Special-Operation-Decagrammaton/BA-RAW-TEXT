10033060-47 = "3;우미카;99;그렇지만, 선생님. 이렇게 많은 분들이 담력 시험의 성공을 위해 노력하고, 서로 힘을 합치고, 각자 자기 자리에서 최선을 다하고 있다는 것……."
10033060-48 = "3;우미카;01;그리고 그 결과로 게헨나 학생분들이 만족감과 해방감을 느낄 수 있다면……."
10033060-49 = "3;우미카;10;그건 어떤 의미로 이미 축제에 가까운 것 아닐까요?!\n#3;closeup\n#3;em;[!]"
10033060-50 = "[s] \"왠지 설득되기 시작했어!\""
10033060-51 = "3;우미카;03;그렇죠?! 처음에는 분명, 게헨나 학생분들을 가이드한다는 것이, 어딘가 부담스럽고 무겁게만 다가왔지만…….\n#3;hophop\n#3;em;[재잘]"
10033060-52 = "3;우미카;00;이 모든 게 축제의 일환일 수 있다고 생각하니, 오히려 힘이 나기 시작했어요!"
10033060-53 = "3;피나 가이드;00;과연! 마음가짐을 달리하는 것으로, 무겁고 어려운 상황에도 능숙하게 대처할 수 있다는 것이로군요!\n#3;greeting"

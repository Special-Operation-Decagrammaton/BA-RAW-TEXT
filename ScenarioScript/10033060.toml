[translation]
10033060-1 = "ตอนที่ 6;ฝันร้ายสุดแฟนตาซี"
10033060-2 = "เฮ้อ... ถึงจะล่าช้าไปบ้าง"
10033060-3 = "แต่ก็ค่อยยังชั่วนะคะที่นักเรียนจากเกเฮนน่าเข้าที่พักและเอาของไปเก็บได้โดยไม่เกิดเรื่องอะไร"
10033060-4 = "เพราะได้คุณครูมาช่วยพวกเราไว้เยอะเลยน่ะ อื้ม"
10033060-5 = "[ns] \"เยอะเลยละ...\""
10033060-7 = "แต่ยังไงเราก็จัดการได้ตามตารางที่วางไว้นะคะ ไม่มีเหตุการณ์อะไรให้ตารางถูกยกเลิกด้วยค่ะ..."
10033060-8 = "ตอนนี้ฉันออกมาเช็กเรื่องการทดสอบความกล้า แต่ระหว่างนี้ก็น่าจะต้องพานักเรียนออกมาเลยละค่ะ!"
10033060-9 = "อ้อ ถ้าเป็นเรื่องนั้นฉันทำให้เอง"
10033060-11 = "จะไม่เป็นไรเหรอคะ คาเอเดะ?"
10033060-12 = "ฮ้าว... ถึงจะง่วงแต่ฉันก็จะพยายามนะ! นี่ก็ถือว่าเป็นการฝึกฝนเพื่อเป็นเลดี้ที่เพียบพร้อมเหมือนกัน!"
10033060-16 = "ถ้างั้น... เราก็ไปเริ่มงานของเรากันดีมั้ย?"
10033060-19 = "เวลานี้ควรจะ..."
10033060-25 = "มาแล้วค่ะ! สวัสดีค่ะ! ตารางที่เหลือก็สู้ๆ นะคะ!"
10033060-26 = "เอ่อ... แบบนี้มันไม่น่ากลัวเกินไปเหรอคะ?"
10033060-27 = "ไม่หรอกค่ะ ฉันว่าออกไปทางน่ารักมากกว่าด้วยค่ะ"
10033060-28 = "นี่เป็นการทดสอบความกล้าก็จริง แต่ฉันก็ยังคิดอยู่นะคะว่าเราทำขนาดนี้ได้เหรอ..."
10033060-30 = "[ns] \"ตามแผนแล้วก็น่าจะแถวๆ นี้นะ...\""
10033060-33 = "ต้องมาช่วยงานกันในเวลานี้อีก คงจะเหนื่อยน่าดูนะ... ไว้ตอนนอน ฉันให้ยืมหมอนเอามั้ย?"
10033060-34 = "ไม่หรอก ไม่เป็นไรค่ะ หมอนของหัวหน้าสึบากิก็ดีอยู่หรอกค่ะ... แต่พอดีว่ามันมีข่าวลือว่าหมอนใบนั้น#nนอนสบายเอามากๆ... บางคนบอกว่ากว่าจะตื่นได้ก็ช่วงเที่ยงของอีกวันหนึ่งเลยค่ะ"
10033060-35 = "นั่นไม่ใช่ข่าวลือนะ?"
10033060-36 = "แบบนั้นยิ่งแย่เลยไม่ใช่เหรอคะ?!"
10033060-40 = "ตอนนี้เราจะน่าเสร็จ 2 ใน 3 ของกิจกรรมแล้วค่ะ"
10033060-41 = "ต้องขอบคุณความตั้งใจของทุกคนเลยค่ะ ฉันว่าเทศกาลทดสอบความกล้านี้ก็ดูเหมือนว่าจะประสบ#nความสำเร็จนะคะ แบบนี้ก็ค่อยยังชั่วหน่อยค่ะ"
10033060-45 = "[ns] \"เทศกาล... ทดสอบความกล้า?\""
10033060-46 = "อ่า... พอคิดดูแล้วก็ไม่น่าจะใช่เทศกาลค่ะ"
10033060-47 = "แต่ว่า... คุณครูคะ การที่พวกเราทุกคนต่างทุ่มเท รวมพลัง และทำหน้าที่ของตัวเองอย่างเต็มที่เพื่อให้#nการทดสอบความกล้าประสบความสำเร็จ..."
10033060-48 = "และถ้านี่ทำให้นักเรียนจากเกเฮนน่าพึงพอใจและรู้สึกถึงอิสระได้ละก็..."
10033060-49 = "ในทางหนึ่งก็ใกล้เคียงกับงานเทศกาลอยู่ไม่ใช่เหรอคะ?!"
10033060-50 = "[s] \"เหมือนถูกโน้มน้าวใจเลย!\""
10033060-51 = "ใช่ไหมล่ะคะ?! ตอนแรกที่รู้ว่าต้องเป็นไกด์ให้กับนักเรียนจากเกเฮนน่า ฉันรู้สึกว่ามันเป็นงานหนัก และกดดันมากๆ เลยละค่ะ..."
10033060-52 = "แต่พอคิดว่าทั้งหมดนี้เป็นส่วนหนึ่งของงานเทศกาล ฉันก็มีกำลังใจขึ้นมาค่ะ!"
10033060-53 = "แบบนี้นี่เอง! แค่เราเปลี่ยนมุมมอง ก็ทำให้สามารถรับมือกับสถานการณ์ที่หนักและยากลำบากได้อย่าง#nถนัดเลยสินะคะ!"
10033060-54 = "วันนี้ฉันก็ได้เรียนรู้อะไรไปเยอะเลยค่ะ! ยอดไปเลยค่ะ อุมิกะ!"
10033060-55 = "ฉะ... ฉันไม่คิดว่าตัวเองพูดอะไรที่ยิ่งใหญ่ขนาดนั้นออกไปนะคะ..."
10033060-61 = "หึหึหึหึ รู้อยู่แล้วสินะ ความจริงน่ะไม่สำคัญหรอก สิ่งที่สำคัญคือมุมมองที่เรามีต่อมันต่างหาก!"
10033060-62 = "[ns] \"หืม? เสียงหัวเราะแบบนี้ อย่าบอกนะว่า?!\""
10033060-63 = "หึหึหึหึ! แค่ได้ยินเสียงหัวเราะก็รู้ได้เลยเหรอว่าเป็นใคร นี่เป็นความโด่งดังของเราเองแท้ๆ แต่ก็เล่นทำเอาเราตกใจเลยเหมือนกันนะเนี่ย!"
10033060-64 = "สวัสดี พี่ๆ เฮียกคิยาโค! คุณครู! อิบูกิก็มาด้วยนะ!"
10033060-65 = "เฮ้อ... ขอโทษที่เสียมารยาทระหว่างทำงานนะคะ น่าอายจริงๆ เลยค่ะ"
10033060-66 = "ทะ... ท่านประธานมาโคโตะ?! แล้วก็แพนเดโมเนียม โซไซตี้!? มะ... มาที่นี่กันในเวลานี้ทำไมคะ...?!"
10033060-67 = "ฮุฮุฮุ ถ้ารู้ละก็ตกใจแน่ นั่นก็เพราะว่า...!"
10033060-69 = "อื้ม! อิบูกิอยากมาให้กำลังใจพี่ๆ น่ะ!"
10033060-70 = "อ๊ะ พูดไม่ทันจนได้"
10033060-71 = "แต่ก็ไม่เป็นไรหรอก เพราะฉันคือเคียวโงคุ ซัตสึกิผู้ใจกว้าง..."
10033060-72 = "ผู้ที่ต่อให้น้องสาวแสนน่ารักคนนี้หยิบสตรอว์เบอร์รีบนเค้กไปกินก็ยังให้อภัยได้น่ะสิ ฮุฮุ"
10033060-73 = "หึหึหึ... พูดถูกแล้วละ ซัตสึกิ"
10033060-74 = "สิ่งสำคัญสำหรับสมาชิกแพนเดโมเนียม โซไซตี้ก็คือจิตใจที่โอบอ้อมอารี"
10033060-75 = "โอ้ว...!"
10033060-76 = "อ่า... งั้นเหรอคะ?"
10033060-78 = "หึหึหึ... ไม่เห็นมีอะไรต้องปิดบังเลย...! การมาให้กำลังใจนักเรียนโรงเรียนอื่นแบบนี้ มันแสดงให้เห็นถึง#nความใจกว้างของเราที่กว้างใหญ่ราวกับมหาสมุทร!"
10033060-79 = "อื้ม! ถ้าความเอื้อเฟื้อเผื่อแผ่ของเราถูกพูดถึงปากต่อปาก รับรองว่าเกียรติภูมิของแพนเดโมเนียม โซไซตี้!"
10033060-80 = "ไม่สิ ถ้าจะพูดให้ชัดกว่านี้... ต้องบอกว่าเกียรติภูมิของท่านมาโคโตะผู้นี้จะยิ่งดังกระฉ่อน จนทุกคนพากันประหลาดใจและชื่นชมเลยละ!"
10033060-81 = "แบบนี้นี่เอง! นี่ละผู้นำของแพนเดโมเนียม โซไซตี้! เป็นหน้าเป็นตาให้พวกเราสุดๆ ไปเลย...!"
10033060-82 = "ไม่มีใครชื่นชม ก็เลยพูดอวยตัวเองสินะคะ"
10033060-84 = "อ่า... ต้องขอบคุณมากๆ เลยนะคะที่ท่านประธานของแพนเดโมเนียม โซไซตี้ใส่ใจพวกเรา..."
10033060-85 = "เอ๋? รุ่นพี่มาโคโตะ~ ที่อยู่ข้างหน้าตรงนั้นคืออะไรเหรอ~?"
10033060-90 = "......?"
10033060-100 = "อ่า..."
10033060-101 = "ว้าว..."
10033060-102 = "......"
10033060-107 = "อึกก... เฮือกกก..."
10033060-108 = "อิบูกิ?!"
10033060-110 = "กะ... เกิดเหตุฉุกเฉินนนน~!"
10033060-111 = "ซะ... ซัตสึกิ!! อิบูกิ?! เป็นอะไรรึเปล่า?! ตะ... ตั้งสติก่อน..."
10033060-115 = "นั่นมันอะไรกันน่ะ?!"
10033060-116 = "!!??"
10033060-117 = "(การแต่งตัวแบบนี้... ไม่ได้มีอยู่ในแผนการของเรานี่นา...?!)"
10033060-118 = "(ตะ... ติดต่อนักเรียนที่มาช่วยแต่งตัวเป็นผีในกิจกรรมนี้ก่อนแล้วกัน...)"
10033060-123 = "ค่ะ ฉันคือทีมไกด์นะคะ พอดีฉันติดต่อมาเรื่องทีมงานที่แต่งตัวเป็นผีในการทดสอบความกล้าน่ะค่ะ... ฉันจะส่งพิกัดที่อยู่ตอนนี้ให้เดี๋ยวนี้ รบกวนช่วยเช็ก..."
10033060-124 = "คะ? พิกัดนี้ไม่มีใครมาอยู่เลยเหรอคะ? ถ้าอย่างนั้น...?"
10033060-128 = "รุ่นพี่อิโรฮะ รุ่นพี่มาโคโตะ... อิบูกิกลัวจังเลย..."
10033060-129 = "อิบูกิ! ไม่เป็นไรค่ะ ไม่ต้องกลัวนะคะ พวกเราอยู่ตรงนี้แล้วค่ะ"
10033060-130 = "จะว่าไป เหมือนมีอะไรผิดปกติเลยนะคะ นักเรียนเฮียกคิยาโคก็มีท่าทีแปลกๆ ด้วย"
10033060-136 = "หน็อย! เจ้าพวกนี้! เจอการสะกดจิตของฉันหน่อยมั้ยล่ะ? คิดว่าจะสู้ได้มั้ย?!"
10033060-137 = "น่าจะยากนะคะ..."
10033060-139 = "[ns] \"ทุกคนหยุดก่อน... ข้างหน้านั่น...?\""
10033060-140 = "ทุกคนหลบไปอยู่ข้างหลังก่อน"
10033060-141 = "อิโรฮะ! ทำอะไรอยู่น่ะ! เตรียม 'สิ่งนั้น' เดี๋ยวนี้เลย! ไม่เห็นเหรอว่าอิบูกิกำลังร้องไห้อยู่!"
10033060-142 = "ฉันก็พูดอยู่ทุกครั้งนะคะว่าไม่รู้ว่า 'สิ่งนั้น' คืออะไร แล้วฉันก็เตรียมอะไรตอนนี้ไม่ได้ด้วยค่ะ ตอนนี้เราไม่ได้อยู่ที่สถาบันเกเฮนน่านะคะ"
10033060-143 = "แต่ยังไงก็... คงให้อยู่เฉยๆ ไม่ได้แล้วค่ะ"
10033060-147 = "ฉันจะจัดการกับการคุกคามนี้ เพื่ออิบูกิ และเพื่อแพนเดโมเนียม โซไซตี้ของเราค่ะ!"
10033060-148 = "ฮึบบ~! จู่โจมเลย~!"

1002502-54 = "5;꼬마 슌ND;20;……아뇨, 파르페에는 아무 문제도 없어요.\n#5;em;[땀]"
1002502-55 = "5;꼬마 슌ND;19;레이즌의 은은한 단맛과 다크 럼의 진한 풍미…… 그동안 먹어왔던 기간한정 파르페의 맛과 변함이 없어요. 다만……."
1002502-56 = "5;꼬마 슌ND;18;몸이 어려진 탓인지, 럼 레이즌 특유의 풍미가 너무 독하게 느껴져서……."
1002502-57 = "[s] \"내 딸기 파르페와 바꿔줄까?\""
1002502-58 = "5;꼬마 슌ND;19;으음, 지금의 몸으로는 딸기 요거트 파르페가 더 당기긴 한데…….\n#5;em;[속상함]\n#5;stiff"
1002502-59 = "5;꼬마 슌ND;15;안 돼요. 모처럼 한정 파르페를 배부르게 먹을 수 있는 기회인데, 여기서 포기할 수는 없어요."

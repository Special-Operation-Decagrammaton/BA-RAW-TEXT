[translation]
1002502-1 = "小小的也不錯呢！"
1002502-2 = "Café．Mille-feuille"
1002502-3 = "請給我一個「期間限定蘭姆葡萄百匯冰淇淋」！"
1002502-4 = "[s1] 「……百匯冰淇淋？」\n[s2] 「感覺沒必要趁變成小孩子的時候來吃吧……？」"
1002502-5 = "這可不是普通的百匯冰淇淋，是「期間限定百匯冰淇淋」！"
1002502-6 = "這可不是普通的百匯冰淇淋，是「期間限定百匯冰淇淋」！"
1002502-7 = "這間「Café．Mille-feuille」平常就有販售多種百匯冰淇淋，#n而這款「蘭姆葡萄百匯冰淇淋」則是冬季限定商品。"
1002502-8 = "我想是因為蘭姆葡萄在夏天會不好保存。"
1002502-9 = "而這裡的蘭姆葡萄，是使用黑蘭姆酒使上等葡萄乾熟成，製作方法非常奢華！"
1002502-10 = "這款百匯冰淇淋的缺點……就是一人只能買一份，而且份量很少，屬於精品尺寸……"
1002502-11 = "但如果是小朋友的身體，就算吃相同的份量應該也能很有飽足感。#n耶嘿嘿……！"
1002502-12 = "[s] 「原來是這樣……！」"
1002502-13 = "呵呵，先前給梅花園的孩子們讀童話的時候，也有類似的場景。"
1002502-14 = "童話故事中的主角在巨人國吃了比自己身體還龐大的蛋糕……"
1002502-15 = "就和現在的我一樣。對身體變小的我來說，奇普托斯現在就像是巨人王國一樣！"
1002502-16 = "話說回來，老師要吃哪一種百匯冰淇淋呢？"
1002502-17 = "蘭姆葡萄百匯冰淇淋非常好吃唷？"
1002502-18 = "[s] 「唔嗯……那我要基本款的草莓優格百匯冰淇淋」"
1002502-19 = "草莓優格口味嗎……？"
1002502-20 = "啊，沒有，草莓優格確實好吃，我沒有貶低的意思……#n只是我以為老師會選抹茶或蘭姆葡萄這種比較成熟的口味。"
1002502-21 = "呵呵，想不到老師也有這麼可愛的一面呢♪"
1002502-22 = "[s3] 「甜食不管到幾歲都依然好吃！」\n[s4] 「太，太孩子氣了嗎……？」"
1002502-23 = "呵呵，絕對沒有不好的意思。因為我也很喜歡甜食。"
1002502-24 = "呵呵，絕對沒有不好的意思。因為我也很喜歡甜食。"
1002502-25 = "但今天是難得的機會，我要好好享受蘭姆葡萄。"
1002502-26 = "呵呵，快等不及了～♪"
1002502-29 = "讓您久等了。這是兩位點的草莓優格百匯冰淇淋和期間限定的蘭姆葡萄百匯冰淇淋。"
1002502-30 = "啊，那個。"
1002502-31 = "不好意思，蘭姆葡萄百匯冰淇淋是我點的。"
1002502-32 = "啊，是這樣嗎。但這個百匯冰淇淋苦味會比較重，小朋友沒問題嗎……？"
1002502-33 = "……"
1002502-34 = "打，打擾兩位用餐了……！"
1002502-35 = "請慢用！"
1002502-39 = "回去之後我得告訴小朋友們，人不可貌相這個道理……"
1002502-40 = "不管了……那麼，我要開動了～！"
1002502-46 = "……？"
1002502-47 = "[s] 「旬？你怎麼了？」"
1002502-48 = "啊，沒事。可能是因為太久沒吃過了吧……感覺有點奇怪……"
1002502-49 = "再來一口……"
1002502-52 = "哈呣……嗯嗯……？"
1002502-53 = "[s] 「裡面有什麼奇怪的東西嗎？」"
1002502-54 = "不，不是那樣的……"
1002502-55 = "葡萄乾恰到好處的甜味，搭配上黑蘭姆酒的濃郁風味……#n真的非常美味。但是……"
1002502-56 = "或許是舌頭也變年輕的關係，會覺得這味道有點……"
1002502-57 = "[s] 「啊啊……要不要和我的草莓優格交換呢？」"
1002502-58 = "唔唔……現在聽到「草莓優格」這個詞確實非常有魅力……"
1002502-59 = "但難得有機會能吃限定百匯冰淇淋吃到飽，我不能就這樣放棄！"
1002502-60 = "再來一口……！"
1002502-62 = "對不起，感覺我沒辦法吃完它……"
1002502-68 = "[ns] 靜靜地將草莓優格百匯冰淇淋推過去"
1002502-70 = "謝謝你，老師……"
1002502-72 = "哈呣，嚼嚼……"
1002502-74 = "嗯，甜甜的果然很好吃！"
1002502-76 = "（和旬換來的蘭姆葡萄百匯冰淇淋，確實有著濃厚的成熟風味，也是相當好吃）"
1002502-77 = "（而旬也像小朋友一樣，津津有味地吃著草莓百匯冰淇淋）"

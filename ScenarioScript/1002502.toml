[translation]
1002502-1 = "It's Convenient Being Small!"
1002502-2 = "Mille-Feuille Cafe"
1002502-3 = "I'd like the limited-edition rum raisin parfait, please!"
1002502-4 = "[s1] \"The parfait?\"\n[s2] \"That's what you've want to try since becoming small?\""
1002502-5 = "It's not just any parfait—it's the limited-edition rum raisin parfait!"
1002502-6 = "It's not just any parfait—it's the limited-edition rum raisin parfait!"
1002502-7 = "Mille-Feuille Cafe sells all sorts of delicious parfaits year round, but the rum raisin parfait is a limited-edition one that's only sold during winter."
1002502-8 = "And that's because ice cream with raisins pickled in rum is hard to preserve when it's hot out."
1002502-9 = "The rum raisin here in particular has a very luxurious taste. They age high-quality raisins in dark rum!"
1002502-10 = "If there's a drawback, it's that they only sell one per customer, and the amount they give is so small you can't really enjoy it as much as you'd like..."
1002502-11 = "But since I'm so small, that little amount of parfait will be more than enough to have a filling experience!"
1002502-12 = "[s] \"Why didn't I think of that?!\""
1002502-13 = "There's a similar scene in the story you read to the Plum Blossom children earlier."
1002502-14 = "The main character visits the land of giants where he ate a lot of cake that was larger than him."
1002502-15 = "With my tiny body, even Kivotos feels like a kingdom of giants to me."
1002502-16 = "Anyway, what kind of parfait will you have, Sensei?"
1002502-17 = "Would you care to try the rum raisin with me?"
1002502-18 = "[s] \"I'll stick with the basic strawberry yogurt.\""
1002502-19 = "What? Strawberry yogurt?"
1002502-20 = "Sure, strawberry yogurt is sweet, so I understand. But it's a bit bland compared to profound flavors like matcha and rum raisin."
1002502-21 = "Maybe you're the one here who has a childish palate, Sensei."
1002502-22 = "[s3] \"Adults can like sweet things too, you know!\"\n[s4] \"I just have a childlike wonder—that's all!\""
1002502-23 = "Heehee. There's nothing wrong with it. I also like sweet strawberry parfait."
1002502-24 = "Heehee. There's nothing wrong with it. I also like sweet strawberry parfait."
1002502-25 = "Today's a special occasion though, so I'm going to enjoy my rum raisin."
1002502-26 = "I hope it comes out soon. I can't wait."
1002502-29 = "Thank you for waiting. Here's your strawberry yogurt parfait, and here's your rum raisin."
1002502-30 = "Huh? Excuse me, but you swapped our orders."
1002502-31 = "Sensei ordered the strawberry yogurt, and I ordered the rum raisin."
1002502-32 = "Pardon? This parfait's flavor is for adults. It's much too sophisticated for a girl your age."
1002502-33 = "(glare)"
1002502-34 = "I-I'm sorry."
1002502-35 = "I hope you enjoy!"
1002502-39 = "How rude. Judging my tastes based solely on my outward appearance. What a weird clerk."
1002502-40 = "Anyway, let's dig in!"
1002502-46 = "...?!"
1002502-47 = "[s] \"What's wrong?\""
1002502-48 = "O-Oh. It must have been a long time since I last had this. I was just a little surprised, is all..."
1002502-49 = "Okay. One more bite."
1002502-52 = "U-Um..."
1002502-53 = "[s] \"Is there something wrong with the parfait?\""
1002502-54 = "No, I don't think so."
1002502-55 = "The subtle sweet flavor of the raisins, the deep richness of the dark rum... It's still the same parfait I know, but..."
1002502-56 = "...maybe it's because I'm smaller now, but the deep flavor of the rum raisin tastes too strong for me."
1002502-57 = "[s] \"Do you want to trade for my strawberry parfait?\""
1002502-58 = "The strawberry does sound more appealing as I am now..."
1002502-59 = "No, I can't. This was supposed to be a special occasion, and it's only available for a limited time. I can't give up now."
1002502-60 = "I'm going to try again!"
1002502-62 = "I can't eat it after all..."
1002502-68 = "[ns] Trade parfaits with Shun."
1002502-70 = "Thank you, Sensei."
1002502-72 = "*chew* *chew*"
1002502-74 = "I guess sweet foods are best with this body after all!"
1002502-76 = "I watched Shun happily enjoy the strawberry parfait like a child afterward."
1002502-77 = "The rum raisin parfait Shun ordered really did have a profound, mature flavor..."

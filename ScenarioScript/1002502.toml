[translation]
1002502-1 = "ตัวเล็กน่ะสบายสุดๆ!"
1002502-2 = "คาเฟ่มิลเฟย"
1002502-3 = "ขอ 'พาร์เฟต์รัมเรซิ่น ลิมิเต็ดไทม์' หนึ่งถ้วยค่ะ!"
1002502-4 = "[s1] \"พาร์เฟต์?\"\n[s2] \"สิ่งที่อยากกินเมื่อได้เป็นเด็กก็คือ... พาร์เฟต์เหรอ?\""
1002502-5 = "นี่ไม่ใช่พาร์เฟต์ธรรมดาๆ นะคะ มันเป็นพาร์เฟต์รัมเรซิ่น เมนูประจำฤดูเลยนะคะ!"
1002502-6 = "นี่ไม่ใช่พาร์เฟต์ธรรมดาๆ นะคะ มันเป็นพาร์เฟต์รัมเรซิ่น เมนูประจำฤดูเลยนะคะ!"
1002502-7 = "ที่คาเฟ่มิลเฟยขายพาร์เฟต์หลากรสตลอดทั้งปีก็จริง แต่พาร์เฟต์รัมเรซิ่นเป็นเมนูพิเศษที่จะมีขาย#nเฉพาะช่วงฤดูหนาวเท่านั้นค่ะ"
1002502-8 = "เพราะไอศกรีมลูกเกดหมักในเหล้ารัมมันเก็บได้ยากในอากาศร้อนยังไงล่ะคะ"
1002502-9 = "แล้วรัมเรซิ่นของที่นี่ก็ใช้ลูกเกดคุณภาพดีหมักในเหล้ารัมสีดำ ทำให้รสออกมาละมุนมากเลยค่ะ!"
1002502-10 = "แต่ถ้าจะให้พูดถึงข้อเสียของพาร์เฟต์นี้ ก็คงจะเป็นการจำกัดการซื้อคนละถ้วย แล้วก็ให้น้อยจน#nกินได้ไม่หนำใจ...?"
1002502-11 = "แต่ถ้าเป็นร่างเด็กแบบนี้ ฉันคงกินได้อย่างอิ่มท้องในปริมาณเท่าเดิมค่ะ!"
1002502-12 = "[s] \"ทุกอย่างวางแผนมาแล้วสินะ...?\""
1002502-13 = "ฮุฮุ จริงๆ ก็มีเรื่องคล้ายๆ แบบนี้ในนิทานที่ฉันอ่านให้เด็กๆ ของสวนต้นบ๊วยฟังค่ะ"
1002502-14 = "ตัวเอกในนิทานได้เข้าไปในเมืองยักษ์ แล้วก็ได้กินเค้กก้อนที่ใหญ่กว่าตัวเองจนพุงกาง..."
1002502-15 = "พอฉันตัวเล็กลงแบบนี้ก็รู้สึกว่าคิโวทอสไม่ต่างไปจากอาณาจักรของยักษ์เลยละค่ะ"
1002502-16 = "จะว่าไป คุณครูจะกินพาร์เฟต์อะไรเหรอคะ?"
1002502-17 = "ลองกินพาร์เฟต์รัมเรซิ่นแบบฉันดูมั้ยคะ?"
1002502-18 = "[s] \"ครูขอเป็นพาร์เฟต์สตรอว์เบอร์รี่โยเกิร์ตง่ายๆ แล้วกัน\""
1002502-19 = "คะ? สตรอว์เบอร์รี่โยเกิร์ตเหรอคะ?"
1002502-20 = "สตรอว์เบอร์รี่โยเกิร์ตมันก็หวานอร่อยอยู่หรอกนะคะ แต่มันไม่ว้าวเท่าไรถ้าเทียบกับรสเข้มข้น#nของมัทฉะหรือรัมเรซิ่น..."
1002502-21 = "ฮุฮุ คุณครูก็มีมุมที่กินเหมือนเด็กเหมือนกันนะคะเนี่ย"
1002502-22 = "[s3] \"ผู้ใหญ่ก็ชอบกินหวานๆ เหมือนกันนะ!\"\n[s4] \"ชอบกินเหมือนเด็กมันไม่ดีตรงไหนกัน!\""
1002502-23 = "ฮุฮุ ฉันไม่ได้บอกว่าไม่ดีหรอกค่ะ ฉันเองก็ชอบพาร์เฟต์สตรอว์เบอร์รี่หวานๆ เหมือนกันนะคะ"
1002502-24 = "ฮุฮุ ฉันไม่ได้บอกว่าไม่ดีหรอกค่ะ ฉันเองก็ชอบพาร์เฟต์สตรอว์เบอร์รี่หวานๆ เหมือนกันนะคะ"
1002502-25 = "แต่โอกาสแบบนี้ใช่ว่ามันจะมาบ่อยๆ วันนี้ฉันก็เลยจะกินเมนูจำกัดประจำฤดูค่ะ"
1002502-26 = "อยากให้มาเสิร์ฟเร็วๆ จัง~ พาร์เฟต์รัมเรซิ่น ลิมิเต็ดไทม์ของฉัน~"
1002502-29 = "ขอโทษที่ทำให้รอนานนะครับ พาร์เฟต์สตรอว์เบอร์รี่โยเกิร์ต กับพาร์เฟต์รัมเรซิ่น ลิมิเต็ดไทม์#nมาเสิร์ฟแล้วครับ"
1002502-30 = "เอ๋? คุณพี่คะ เสิร์ฟสลับกันแล้วค่ะ"
1002502-31 = "พาร์เฟต์สตรอว์เบอร์รี่โยเกิร์ตเป็นของคุณครู ส่วนของฉันคือพาร์เฟต์รัมเรซิ่น ลิมิเต็ดไทม์ค่ะ"
1002502-32 = "ครับ? แต่พาร์เฟต์นี่มันรสชาติเข้มข้นเกินว่าเด็กอย่างหนูจะกินได้นะ..."
1002502-33 = "(มองแรง)..."
1002502-34 = "อ๊ะ! ขะ... ขอโทษครับ..."
1002502-35 = "ทานให้อร่อยนะครับ!"
1002502-39 = "มองแค่ภายนอกแล้วมาตัดสินว่าควรจะกินรสแบบไหนได้ไง แปลกคนชะมัด ว่ามั้ยคะ?"
1002502-40 = "เอาเถอะ จะทานแล้วนะคะ~"
1002502-46 = ".....?!"
1002502-47 = "[s] \"เป็นอะไรเหรอ?\""
1002502-48 = "มะ... ไม่มีอะไรค่ะ ฉันไม่ได้กินรสแบบนี้มานานแล้ว ก็เลย... ตกใจนิดหน่อยน่ะค่ะ"
1002502-49 = "งั้นลองอีกคำ..."
1002502-52 = "อึ่ก..."
1002502-53 = "[s] \"พาร์เฟต์มันทำไมเหรอ?\""
1002502-54 = "เปล่าค่ะ... พาร์เฟต์มันไม่ได้ทำไมหรอกค่ะ"
1002502-55 = "รสหวานจางๆ ของลูกเกดกับรสเข้มข้นของเหล้ารัม... พาร์เฟต์ลิมิเต็ดไทม์ที่ฉันกินมาเกือบทุกปี#nยังมีรสชาติเดิมไม่เปลี่ยนแปลงเลยค่ะ แต่ว่า..."
1002502-56 = "ไม่รู้เพราะเด็กลงหรือเปล่า ฉันก็เลยรู้สึกว่ารสเฉพาะตัวของรัมเรซิ่นมันแรงเกินไป..."
1002502-57 = "[s] \"เปลี่ยนกับพาร์เฟต์สตรอว์เบอร์รี่ของครูมั้ย?\""
1002502-58 = "อืม... ที่จริงตอนนี้ร่างกายของฉันมันเรียกร้องพาร์เฟต์สตรอว์เบอร์รี่โยเกิร์ตมากกว่า..."
1002502-59 = "แต่ไม่ได้หรอกค่ะ โอกาสทองในการกินพาร์เฟต์รัมเรซิ่นไม่ได้มีบ่อยๆ ฉันจะยอมแพ้ไม่ได้!"
1002502-60 = "จะลองกินอีกคำแล้วกันค่ะ!"
1002502-62 = "ก็ยังกินไม่ได้เหมือนเดิมเลยค่ะ......"
1002502-68 = "[ns] สลับพาร์เฟ่ต์ของตัวเองให้"
1002502-70 = "ขอบคุณค่ะคุณครู..."
1002502-72 = "(ง่ำง่ำ)"
1002502-74 = "ตัวเล็กปุ๊กปิ๊กของฉันตอนนี้เหมาะกับของหวานๆ ที่สุดเลยค่ะ!"
1002502-76 = "(จากนั้นคุณครูก็นั่งดูชุนกินพาร์เฟต์สตรอว์เบอร์รีเหมือนเด็กอย่างเอร็ดอร่อย)"
1002502-77 = "(ส่วนพาร์เฟต์รัมเรซิ่นที่ชุนสั่งก็เป็นรสชาติของผู้ใหญ่ที่... สุดลึกซึ้ง)"

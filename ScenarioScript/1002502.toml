[translation]
1002502-1 = "#Title;작다는 건 편리해!"
1002502-2 = "#place;카페 <밀피유>"
1002502-3 = "3;꼬마 슌ND;13;여기 '기간 한정 럼 레이즌 파르페' 하나 주세요!\n#3;em;[반짝]\n#3;a"
1002502-4 = "[s1] \"……파르페?\"\n[s2] \"어린아이가 되면 꼭 먹어보고 싶다는 게, 파르페였어?\""
1002502-5 = "3;꼬마 슌ND;17;단순한 파르페가 아녜요. 기간 한정, '럼 레이즌 파르페' 라고요!\n#3;em;[빠직]\n#3;hophop"
1002502-6 = "3;꼬마 슌ND;17;단순한 파르페가 아녜요. 기간 한정, '럼 레이즌 파르페' 라고요!\n#3;em;[빠직]\n#3;hophop"
1002502-7 = "3;꼬마 슌ND;01;이곳 카페 <밀피유>에서는 여러가지 맛있는 파르페를 상시 판매하고 있지만, 럼 레이즌 파르페만큼은 동절기에만 판매하는 기간 한정 메뉴에요."
1002502-8 = "3;꼬마 슌ND;99;럼에 절인 건포도 아이스크림은 더운 날에는 보관이 어려우니까요."
1002502-9 = "3;꼬마 슌ND;13;특히 이곳의 럼 레이즌은 질 좋은 건포도를 다크 럼에 숙성시켜서 엄청 호화스러운 맛이 난답니다!\n#3;em;[음표]"
1002502-10 = "3;꼬마 슌ND;01;이 파르페의 유일한 단점이라면 한 사람 앞에 하나 밖에 팔지 않고, 그나마도 양이 너무 적어서 마음껏 먹을 수 없다는 점이었는데……."
1002502-11 = "3;꼬마 슌ND;03;어린아이의 몸이라면 같은 양을 먹어도 훨씬 배부르게 파르페를 즐길 수 있어요!\n#3;em;[반짝]\n#3;hophop"
1002502-12 = "[s] \"그런 방법이 있었나……!\""
1002502-13 = "3;꼬마 슌ND;01;후후, 전에 매화원 아이들에게 읽어준 동화에 비슷한 장면이 있었거든요."
1002502-14 = "3;꼬마 슌ND;99;거인들의 나라에 간 동화 속 주인공이 자신의 몸보다 커다란 케이크를 잔뜩 먹게 되는데……."
1002502-15 = "3;꼬마 슌ND;03;몸이 작아진 지금의 제게는 평범한 키보토스도 거인들의 왕국처럼 느껴진답니다.\n#3;em;[반응]"
1002502-16 = "3;꼬마 슌ND;01;그나저나 선생님은 어떤 파르페를 드실 건가요?"
1002502-17 = "3;꼬마 슌ND;03;저와 같이 기간 한정 럼 레이즌 파르페에 도전해 보시는 건 어떠신가요?\n#3;em;[음표]\n#3;hophop"
1002502-18 = "[s] \"나는 가장 무난한 딸기 요거트 파르페로…….\""
1002502-19 = "3;꼬마 슌ND;02;네? 딸기 요거트 맛이요?\n#3;em;[?]"
1002502-20 = "3;꼬마 슌ND;18;물론 딸기 요거트도 달콤하니 나쁘진 않지만, 말차나 럼 레이즌의 중후한 맛에 비하면 조금 심심할텐데…….\n#3;stiff"
1002502-21 = "3;꼬마 슌ND;28;후후, 선생님도 입맛에서는 어린아이 같은 구석이 있으시네요.\n#3;em;[하트]"
1002502-22 = "[s3] \"어른도 달콤한 걸 좋아하거든!\"\n[s4] \"어린아이 같은 입맛이 뭐가 나빠!\""
1002502-23 = "3;꼬마 슌ND;01;후후, 나쁘다는 뜻은 아녜요. 달콤한 딸기 파르페는 저도 좋아하거든요.\n#3;em;[반응]"
1002502-24 = "3;꼬마 슌ND;01;후후, 나쁘다는 뜻은 아녜요. 달콤한 딸기 파르페는 저도 좋아하거든요.\n#3;em;[반응]"
1002502-25 = "3;꼬마 슌ND;13;하지만 오늘은 모처럼의 기회니 기간 한정 메뉴를 잔뜩 즐길거예요."
1002502-26 = "3;꼬마 슌ND;28;빨리 나왔으면 좋겠네요~ 기간 한정 럼 레이즌 파르페~.\n#3;stiff\n#3;em;[///]"
1002502-27 = "#all;hide"
1002502-28 = "#wait;500"
1002502-29 = "3;점원;03;오래 기다리셨습니다. 주문하신 딸기 요거트 파르페와 기간 한정 럼 레이즌 파르페입니다.\n#3;em;[반짝]\n#3;greeting\n#3;a"
1002502-30 = "5;꼬마 슌ND;02;어라? 점원 씨, 메뉴를 반대로 주셨어요.\n#5;em;[반응]\n#5;al\n#3;m1"
1002502-31 = "5;꼬마 슌ND;01;딸기 요거트는 선생님이 주문한 메뉴이고, 제가 주문한 건 기간 한정 럼 레이즌 파르페인걸요?"
1002502-32 = "3;점원;02;네? 하지만 이 파르페는 그 쪽의 꼬마 아가씨가 먹기에는 지나치게 어른스러운 맛이…….\n#3;em;[?]"
1002502-33 = "5;꼬마 슌ND;05;(찌릿)…….\n#5;em;[빠직]\n#5;stiff"
1002502-34 = "3;점원;04;앗…… 시, 실례했습니다…….\n#3;em;[땀]"
1002502-35 = "3;점원;08;부디 맛있게 즐겨주시길!\n#3;em;[반짝]\n#3;greeting"

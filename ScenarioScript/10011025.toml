[translation]
10011025-2 = "呃啊！？"
10011025-7 = "這，這些傢伙是何方神聖……"
10011025-9 = "等等，仔細一看，這不是夏萊的老師嗎！"
10011025-10 = "什麼？是「不想受苦就別靠近」的那個夏萊的老師！？"
10011025-11 = "[s]「那種話是從哪裡傳出來的……」"
10011025-12 = "可惡！這些傢伙不好惹啊！大家快逃！"
10011025-17 = "[ns]「真在意出處……話說月夜，辛苦你了，還好嗎？」"
10011025-18 = "老，老師────！"
10011025-20 = "[ns]「稍微冷靜下來了嗎？」"
10011025-21 = "謝，謝謝你，老師……"
10011025-22 = "那個，給你添麻煩了，真不好意思……"
10011025-23 = "[s1]「別在意，抱歉沒能化解糾紛。」\n[s2]「反而是我該謝謝你才對。」"
10011025-26 = "是，是……"
10011025-27 = "我……因為塊頭大的關係……"
10011025-28 = "所以經常會引人注目，該這麼說嗎……"
10011025-29 = "那個，非常謝謝，老師的幫忙……"
10011025-30 = "[s]「不需要為此耿耿於懷哦。我們走吧。」"
10011025-31 = "是，是！"
10011025-38 = "……（偷瞄）"
10011025-45 = "……（一瞥）"
10011025-46 = "[s]「……我的臉上沾到什麼了嗎？」"
10011025-47 = "啊，不，不是那樣的……！"
10011025-48 = "對不起，那個，突然盯著老師看……"
10011025-49 = "[s]「沒事的，別放在心上。只是想知道怎麼了而已。」"
10011025-50 = "那個，就是……"
10011025-51 = "唔嗯……"
10011025-52 = "該怎麼說才好呢……"
10011025-53 = "伊樹菜醬的「主公」……"
10011025-54 = "是什麼樣的人……我一直都很好奇……"
10011025-55 = "[s]「啊啊，原來如此。」"
10011025-56 = "伊樹菜醬，從加入忍術研究部以來……"
10011025-58 = "就一直說著……"
10011025-59 = "「為了主公，要成為奇普托斯第一的忍者！」這樣的話。"
10011025-60 = "啊，不過部長每次都會問說「姑且問一下，你真的沒有被奇怪的人給騙了嗎？」……"
10011025-61 = "[s]「啊……」"
10011025-62 = "啊，不是！我沒有，老師是怪人之類的意思……！"
10011025-63 = "雖然，在實際見面之前，我也不是沒有那麼想過……"
10011025-66 = "但每當伊樹菜醬說起那句話時，臉上總是充滿笑容……"
10011025-67 = "所以，我也想，見老師一面……"
10011025-68 = "[s3]「原來是這樣啊。見面後覺得怎麼樣呢？」\n[s4]「印象如何呢？」"
10011025-72 = "那個，嗯，完全沒有什麼不好的印象……！"
10011025-73 = "明明我們突然不請自來……卻沒有被拒絕……"
10011025-74 = "[s]「還有呢？」"
10011025-75 = "也沒有對我們生氣……"
10011025-76 = "就算說是「忍者」，你也不會嘲笑我們……"
10011025-77 = "在陰陽部的時候，還為我們說了那些話……"
10011025-78 = "讓我，有點驚訝。"
10011025-79 = "原來還有像老師這樣的人啊。"
10011025-80 = "所以，覺得很高興。"
10011025-81 = "我想，伊樹菜醬和部長，應該也和我一樣才對。"
10011025-82 = "[s]「你們三個的感情很好呢。」"
10011025-83 = "啊……"
10011025-84 = "是，是！"
10011025-85 = "剛，剛開始，我也很擔心，待在這個社團到底好不好……"
10011025-86 = "我很喜歡伊樹菜醬，也很尊敬部長。"
10011025-87 = "對我這種，只有身材高大可取的人……"
10011025-90 = "你就是月夜？"
10011025-95 = "就算是這樣的我……"
10011025-96 = "就是，那個，我也想要努力！"
10011025-97 = "遵從忍者的鐵則，我也，不會認輸的……！"
10011025-101 = "雖然不知道會不會順利……"
10011025-102 = "總之，得先讓今天的公演……！"
10011025-103 = "[s5]「……這樣啊。」\n[s6]「月夜一定做得到的。」"
10011025-106 = "是，是，謝謝老師……！"
10011025-109 = "啊！月夜閣下～！"
10011025-110 = "你們兩個真慢～等你們好久囉～"
10011025-111 = "啊，讓你們，久等了……！"

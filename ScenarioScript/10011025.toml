10011025-18 = " Wa... Waaaahhhh! S-Sensei...!!"
10011025-20 = "[ns] \"Do you feel a little better now?\""
10011025-21 = "Thank you, Sensei..."
10011025-22 = "I'm... I'm really sorry for dragging you into my mess."
10011025-23 = "[s1] \"Not at all. Why were they harassing you?\"\n[s2] \"That was a pretty hairy situation. Does that happen to you a lot?\""
10011025-26 = "Well, um...."
10011025-27 = "I'm just... I'm so gosh-darn big and tall..."
10011025-28 = "I think these kinds of things happen a lot because I'm so easy to spot in a crowd..."
10011025-29 = "Thank you again for your help."

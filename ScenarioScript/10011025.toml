10011025-31 = "Right!"
10011025-38 = "*nervous glance*"
10011025-45 = "*fidget fidget*"
10011025-46 = "[s] \"...Is there something on my face?\""
10011025-47 = "No! Not at all!"
10011025-48 = "S-S-S-Sorry! You must think I'm so rude, staring at you like that! Sorry, sorry, sorry!"
10011025-49 = "[s] \"I'm not upset at all. I just wanted to know what you were thinking.\""
10011025-50 = "Okay, well, you see..."
10011025-51 = "You see..."
10011025-52 = "Well..."
10011025-53 = "Izuna's lord... I always wondered..."
10011025-54 = "You know, what kind of person they'd be..."
10011025-55 = "[s] \"Ah, so that's why...\""
10011025-56 = "Heh. Heehee!"
10011025-58 = "Ever since she joined the Ninjutsu Research Club, Izuna would always say..."
10011025-59 = "\"I'm gonna be the number one ninja in Kivotos for my lordship!\""
10011025-60 = "Of course, the president always thought she'd been duped by some weird stranger..."
10011025-61 = "[s] \"Oh...\""
10011025-62 = "I'm sorry! I wasn't saying you're a weird stranger, Sensei!"
10011025-63 = "That's just what we all used to think!"
10011025-66 = "But you should see... Izuna was always glowing when she talked about her lord!"
10011025-67 = "I didn't think she'd been duped... I actually always thought I'd like to meet you..."
10011025-68 = "[s3] \"Well, now that you've met me, are you surprised?\"\n[s4] \"Well, now that you've met me, are you disappointed?\""
10011025-72 = "N-No not at all!"
10011025-73 = "Sensei, you were so composed even when we barged in on you unexpectedly. And..."
10011025-74 = "[s] \"And?\""
10011025-75 = "You didn't yell or scold us... And most importantly, even when we were talking about ninjas..."
10011025-76 = "Y-You didn't make fun of us at all."
10011025-77 = "You even went out of your way to advocate for us at the Yin-Yang Club."
10011025-78 = "It surprised me. In a good way."

[translation]
10011025-2 = "We got wrecked!"
10011025-7 = "They kicked our butts! Who the hell?"
10011025-9 = "Hold up! Ain't that the Sensei from Schale?!"
10011025-10 = "That Sensei everyone's been kickin' up a fuss about? Rumor has it that they'll ruin your day with just a look!"
10011025-11 = "[s] \"Okay, I feel like I'm being judged really unfairly...\""
10011025-12 = "Tch! Everyone, run!"

[translation]
10011025-2 = "อะ... อ๊าก โดนจนได้...!"
10011025-7 = "ไม่คิดเลยว่าจะถูกโจมตีแบบนี้ พวกนั้นเป็นใครกันแน่..."
10011025-9 = "หืม? เดี๋ยวนะ นั่นมัน! คุณครูของชาเล่ต์นี่!"
10011025-10 = "อะไรนะ? คุณครูของชาเล่ต์งั้นเหรอ คนที่แค่ไปเกี่ยวข้องด้วยก็โดนเล่นงาน คุณครูของชาเล่ต์คนนั้นน่ะเหรอ?!"
10011025-11 = "[s] \"รู้สึกเหมือนถูกมองอย่างไม่เป็นธรรมยังไงก็ไม่รู้แหะ...\""
10011025-12 = "เอื๊อก! ทุกคนหนีกันเถอะ!"
10011025-17 = "[ns] \"หนีไปซะแล้ว... ว่าแต่เป็นอะไรรึเปล่า? สึคุโยะ...\""
10011025-18 = "วะ... ว้าววว~~!! คะ... คุณครู!!"
10011025-20 = "[ns] \"เป็นไงบ้าง ไม่เป็นอะไรใช่ไหม?\""
10011025-21 = "ขะ... ขะ... ขอบคุณค่ะ... คุณครู"
10011025-22 = "ปะ... เป็นเพราะฉัน กะ... ก็เลยต้องมาลำบาก... ขะ... ขอโทษด้วยค่ะ..."
10011025-23 = "[s1] \"ไม่หรอก ไม่ใช่เรื่องใหญ่อะไรนี่\"\n[s2] \"เรื่องเมื่อกี้เป็นอุบัติเหตุที่เกิดขึ้นได้อยู่แล้วละนะ\""
10011025-26 = "คะ... ค่ะ..."
10011025-27 = "ฉะ... ฉันน่ะ คงจะมีดีแค่ตัวใหญ่สินะคะ..."
10011025-28 = "เป็นเพราะตัวใหญ่เตะตาคน ก็เลยเกิดเรื่องแบบนี้บ่อยๆ "
10011025-29 = "ขะ...ขอบคุณที่ช่วยฉันนะคะ!"
10011025-30 = "[s] \"ครูแค่ทำในสิ่งที่ควรทำเท่านั้นเอง เรากลับไปกันดีไหม?\""
10011025-31 = "คะ...ค่ะ!"
10011025-38 = "......(เหลือบมอง)"
10011025-45 = "...(เหลือบมอง)"
10011025-46 = "[s] \"...คือว่า ทำไมมองอย่างนั้นล่ะ? มีอะไรติดอยู่ที่หน้าครูรึเปล่า?\" "
10011025-47 = "มะ...ไม่ใช่แบบนั้นค่ะ! "
10011025-48 = "ขะ... ขะ... ขอโทษค่ะ! คะ... คุณครูคงจะอึดอัดที่ฉันเอาแต่จ้องอย่างนั้น! ขะ... ขอโทษค่ะ..."
10011025-49 = "[s] \"ครูไม่ได้ว่าอะไรหรอก แค่สงสัยว่ามีเรื่องอะไรรึเปล่าน่ะ\""
10011025-50 = "อืม คะ... คือว่าเรื่องนั้น..."
10011025-51 = "ก็คือว่า..."
10011025-52 = "ไม่ใช่เรื่องใหญ่อะไรค่ะ..."
10011025-53 = "ฉันแค่สงสัยมาตลอดว่านายท่านของอิซุนะจัง"
10011025-54 = "เป็นคนแบบไหนน่ะค่ะ..."
10011025-55 = "[s] \"อ่า...อย่างนั้นเหรอ\""
10011025-56 = "แหะๆๆ..."
10011025-58 = "หลังจากที่อิซุนะจังเข้ามาที่ชมรมวิจัยศาสตร์นินจา เธอก็พูดตลอดว่า"
10011025-59 = "\"ฉันจะเป็นนินจาที่ยอดเยี่ยมที่สุดในคิโวทอส! เพื่อนายท่าน!\""
10011025-60 = "นะ... แน่นอนว่าพอพูดแบบนั้นทีไร ท่านหัวหน้าก็จะถามตลอดเลยว่าไม่ได้ไปโดนใครหลอกมาใช่มั้ย"
10011025-61 = "[s] \"อา...\""
10011025-62 = "มะ... มะ... ไม่ใช่นะคะ! คะ... คือว่า! มะ... ไม่ได้หมายความว่าคุณครูน่าสงสัยนะคะ!"
10011025-63 = "ทะ... ที่คิดแบบนั้นก็เพราะว่ายังไม่เคยเจอคุณครู! เพราะยังไม่เคยเจอคุณครูเท่านั้นค่ะ!"
10011025-66 = "ละ... และแน่นอนว่าพอพูดแบบนั้นทีไร อิซุนะจังก็จะตาเป็นประกาย..."
10011025-67 = "เพราะแบบนั้นฉันก็เลยคิดว่าอยากเจอคุณครูบ้างสักครั้งจังนะ~ แบบนั้นน่ะค่ะ..."
10011025-68 = "[s3] \"แล้วพอได้เจอตัวจริงแล้วเป็นยังไงบ้าง ตกใจมั้ย?\"\n[s4] \"แล้วพอได้เจอแล้วเป็นยังไงบ้าง ผิดหวังมั้ย?\""
10011025-72 = "มะ... ไม่ค่ะ! ไม่ใช่อย่างนั้น..."
10011025-73 = "ถึงพวกเราจะโผล่ไปหาอย่างกะทันหัน... คุณครูก็ไม่ตกใจเลยสักนิด... แล้วก็"
10011025-74 = "[s] \"...แล้วก็?\""
10011025-75 = "คุณครูทั้งไม่ตำหนิ ไม่โกรธพวกเรา... แถมตอนที่เราพูดเรื่องนินจาก็เหมือนกัน"
10011025-76 = "คุณครูก็ไม่ได้ดูถูกเราเลย..."
10011025-77 = "แล้วก็ยังไปที่ชมรมหยินหยาง และพูดแบบนั้นเพื่อพวกเราอีกด้วย"
10011025-78 = "ตอนนั้นฉันก็ตกใจนิดหน่อยค่ะ"
10011025-79 = "...ฉันก็เลยได้รู้ว่าบนโลกนี้ก็มีคนแบบคุณครูอยู่ด้วยสินะคะ คือว่า..."
10011025-80 = "ฉันมีความสุขมากเลยค่ะ"
10011025-81 = "และก็คิดว่าทั้งอิซุนะจังและท่านหัวหน้าก็น่าจะมีความสุขมากเหมือนกันค่ะ"
10011025-82 = "[s] \"สมาชิกในชมรมคงจะสนิทกันดีสินะ\""
10011025-83 = "อา..."
10011025-84 = "คะ...ค่ะ!"
10011025-85 = "ถะ... ถึงตอนแรกฉันจะสงสัยว่าตัวเอง สะ... สมควรจะอยู่ในชมรมแบบนี้ด้วยหรือเปล่า"
10011025-86 = "ตะ... แต่ฉันก็ชอบอิซุนะจัง และยังเคารพ ทะ... ท่านหัวหน้าที่ยอมรับเด็กอย่างฉันเข้าชมรมด้วยค่ะ!"
10011025-87 = "ตัวฉันที่ทั้งเชื่องช้าและอืดอาด... แต่ท่านหัวหน้าก็ยัง..."
10011025-90 = "เธอคือสึคุโยะสินะ?"
10011025-95 = "แม้ตัวฉันจะเป็นแบบนี้..."
10011025-96 = "พะ...เพราะอย่างนั้น! ฉันก็เลยอยากจะทำให้เต็มที่ค่ะ!"
10011025-97 = "เพื่อทำตามกฏเหล็กของนินจา ฉันจะไม่ยอมแพ้...!"
10011025-101 = "ฉะ...ฉันไม่เหมือนเมื่อก่อนแล้วค่ะ.."
10011025-102 = "กะ... การแสดงในวันนี้จะ พะ... พยายามทำให้สำเร็จให้ได้ค่ะ..."
10011025-103 = "[s5] \"อืม ใช่แล้วละ\"\n[s6] \"อืม สึคุโยะจะต้องทำได้แน่นอน\""
10011025-106 = "คะ...ค่ะ อย่างนั้นเหรอคะ..."
10011025-109 = "อ๊ะ! นายท่าน! ท่านสึคุโยะ!"
10011025-110 = "ทั้งสองคน~ ทำไมถึงช้าแบบนี้ล่ะ~! ทุกอย่างเตรียมไว้เรียบร้อยหมดแล้วนะ~!"
10011025-111 = "อ๊ะ! จะไปเดี๋ยวนี้เลยค่ะ!"

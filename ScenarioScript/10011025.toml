10011025-82 = "[s] \"It's nice to see how well you all get along.\""
10011025-83 = "Uh..."
10011025-84 = "Right!"
10011025-85 = "I really went back and forth about whether someone like me could join the club."
10011025-86 = "But Izuna is great... And I respect the president so much for letting me in."
10011025-87 = "I can be really slow and dense... But the president..."
10011025-90 = "Tsukuyo, right?"
10011025-95 = "Even though I am the way I am..."
10011025-96 = "Th-The point is that I want to do my best!"
10011025-97 = "To adhere to the rules of being a ninja, a-and not let them down!"
10011025-101 = "Which...is a lot easier said than done."
10011025-102 = "But I've made up my mind to help make sure the show is a success."
10011025-103 = "[s5] \"...Ah, okay.\"\n[s6] \"I know you can do it, Tsukuyo.\""

[translation]
10048030-1 = "ตอนที่ 3;ใครเล่าจะหลงใหลสีม่วงกับสีคราม"
10048030-2 = "เมื่อวันก่อน..."
10048030-4 = "คาเฟ่แห่งหนึ่ง นอกเขตปกครองตนเองไวลด์ฮันต์"
10048030-7 = "เอ่อ... คุณคือหัวหน้าฝ่ายธุรกิจของ <ชมรมการค้าพิเศษ> ใช่มั้ยครับ?"
10048030-11 = "ฮุฮุ ใช่แล้วค่ะ"
10048030-12 = "เชิญนั่งก่อนสิคะ"
10048030-13 = "อ่า... ครับ"
10048030-14 = "ว่าแต่... จริงหรือเปล่าครับที่ว่าคุณหาสินค้าให้ได้ทุกอย่าง?"
10048030-15 = "ค่ะ ก็ 'การค้า' คืองานของฉันนี่คะ"
10048030-16 = "แล้วผลงานที่ผ่านมาก็... ขอบอกว่าไม่เคยผิดพลาดเลยสักครั้งค่ะ"
10048030-17 = "โอ้ว...!"
10048030-18 = "สงสัยจังเลยนะคะว่าเป็นคำขอแบบไหน พอดีพวกฉันยังไม่เคยรับคำขอจากคนนอกไวลด์ฮันต์มาก่อน#nน่ะค่ะ"
10048030-19 = "งั้นก็มาเข้าประเด็นเลยดีกว่า คุณต้องการอะไรเหรอคะ?"
10048030-20 = "อืม... ถ้าใช้คำว่าการค้ากับงานนี้... มันก็น่าจะเสี่ยงต่อการเข้าใจผิด เอาเป็นว่าผมจะอธิบายให้ฟังก่อน#nแล้วกันครับ"
10048030-24 = "ผมอยากลักลอบนำภาพวาดหนึ่งออกมาจากในไวลด์ฮันต์ครับ..."
10048030-26 = "......"
10048030-30 = "ฉันจะถือว่าไม่เคยได้ยินเรื่องนี้จากคุณค่ะ..."
10048030-31 = "เดี๋ยวก่อนสิครับ ฟังให้จบก่อน...!"
10048030-32 = "มีอะไรให้ฟังจนจบล่ะคะ! นั่นมันการขโมยชัดๆ ค่ะ!"
10048030-33 = "เรื่องแบบนั้นไปติดต่อชมรมโจรกรรมเถอะค่ะ ชมรมการค้าพิเศษไม่รับทำหรอก!"
10048030-34 = "มีชมรมโจรกรรมด้วยเหรอครับ?!"
10048030-35 = "จะไปมีได้ไงล่ะคะ?!"
10048030-36 = "งั้นก็ลองฟังผมก่อนนะครับ...! ฟังให้จบก่อนแล้วค่อยตัดสินใจก็ได้!"
10048030-43 = "ก็ได้ค่ะ งั้นก็ลองว่ามาก่อนค่ะ..."
10048030-45 = "ผมเป็นจิตรกรครับ..."
10048030-46 = "ตอนนี้ผมมีชื่อเสียงในระดับหนึ่งแล้ว ก็เลยไม่มีปัญหาเรื่องการทำงานหาเงิน..."
10048030-47 = "แต่สมัยหนุ่มๆ ผมไม่ได้เป็นอย่างนั้นหรอกครับ..."
10048030-48 = "สมัยนั้น ผมทำงานทุกอย่างเพื่อหาเลี้ยงชีพ"
10048030-49 = "และในบรรดางานที่ผมทำ..."
10048030-51 = "ก็มีผลงานปลอมแปลงด้วยครับ..."
10048030-52 = "ปลอมแปลง... งั้นเหรอคะ?"
10048030-53 = "ใช่ครับ ผมปลอมแปลงภาพวาดมีราคาแล้วเอาไปขายในราคาสูงๆ น่ะครับ"
10048030-54 = "ถ้าเป็นงานอื่นที่ผมทำเพื่อหาเลี้ยงชีพในตอนนั้น ผมไม่อายเลย..."
10048030-55 = "แต่การปลอมแปลงภาพวาด... เป็นความอับอายที่ฝังลึกอยู่ในใจผมไปตลอดชีวิต"
10048030-56 = "ผมก็เลยอยากแก้ไขเรื่องราวในอดีตของผมน่ะครับ"
10048030-57 = "ว่าแต่เรื่องนี้เกี่ยวข้องกับคำขอของคุณยังไงเหรอคะ...?"
10048030-58 = "อีกเดี๋ยวจะมีการจัด <นิทรรศการพิเศษเวโรนิก้า> ที่ไวลด์ฮันต์ใช่มั้ยล่ะครับ?"
10048030-59 = "นิทรรศการนั่นน่ะ... จะเอาภาพที่ผมปลอมแปลงขึ้นไปจัดแสดงด้วยครับ"
10048030-60 = "...!"
10048030-61 = "คุณจะบอกว่าในบรรดาภาพวาดที่มูลนิธิเวโรนิก้าเป็นเจ้าของ มีภาพปลอมที่คุณวาดขึ้นมางั้นเหรอคะ?"
10048030-62 = "ใช่ครับ แล้วทางเวโรนิก้าก็คิดว่าภาพวาดนั้นเป็นของจริงครับ"
10048030-63 = "เป็นภาพอะไรเหรอคะ?"
10048030-64 = "ภาพที่ว่าก็คือ..."
10048030-67 = "[log=시민 동물6 의뢰인]<ใครเล่าจะหลงใหลสีม่วงกับสีคราม> ครับ[/log]"
10048030-70 = "นี่คุณปลอมแปลงภาพวาดนั้นเหรอคะ?!"
10048030-71 = "โอ้ ได้ยินชื่อก็รู้จักเลยสินะครับ"
10048030-72 = "คนส่วนใหญ่ต่อให้เอารูปให้ดูก็ไม่รู้จัก..."
10048030-73 = "แต่กับนักเรียนไวลด์ฮันต์แล้วคงไม่มีทางที่จะไม่รู้จักหรอกค่ะ"
10048030-74 = "คนที่ศึกษาประวัติศาสตร์ศิลปะต้องเคยผ่านตาภาพวาดนี้อยู่แล้วค่ะ"
10048030-75 = "ฮุฮุ พอได้คุยกับคนที่มีความรู้ด้านนี้ ผมก็สบายใจขึ้นเยอะเลยนะครับ..."
10048030-76 = "ผู้คนส่วนใหญ่ไม่มีความรู้พื้นฐานเรื่องนี้ด้วยซ้ำ..."
10048030-77 = "แต่ก็เอาเถอะครับ สรุปว่าผมในอดีตปลอมแปลงภาพ <ใครเล่าจะหลงใหลสีม่วงกับสีคราม> ขึ้นมา แล้วภาพที่เป็นของปลอมอันนั้นก็จะนำไปจัดแสดงใน <นิทรรศการพิเศษเวโรนิก้า> ครับ"
10048030-78 = "ถ้างั้น... คุณก็อยากให้พวกฉันไปเอาภาพวาดนั้นออกมาใช่มั้ยคะ?"
10048030-79 = "ใช่ครับ"
10048030-80 = "ฉันขอพูดตามตรงนะคะ นี่เป็นงานหินเลยละค่ะ"
10048030-81 = "ต่อให้เอาภาพวาดนั้นออกมาได้ด้วยดี แต่หลังจากนั้นต้องมีการพลิกแผ่นดินไวลด์ฮันต์ตามหากัน#nแน่นอนค่ะ"
10048030-82 = "เพราะไม่ว่ามันจะเป็นภาพจริงหรือภาพปลอม นั่นก็ถือว่าเป็นเหตุโจรกรรมอยู่ดี..."
10048030-83 = "ฉันว่าติดต่อมูลนิธิแล้วแจ้งว่าเป็นภาพปลอมจะไม่ดีกว่าเหรอคะ?"
10048030-84 = "ผมมีภาพจริงของงานชิ้นนั้นอยู่ครับ"
10048030-88 = "คะ...?"
10048030-89 = "ไม่นานมานี้ผมซื้อภาพ <ใครเล่าจะหลงใหลสีม่วงกับสีคราม> ของจริงจากตลาดประมูลใต้ดินแห่งหนึ่ง#nมาครับ"
10048030-90 = "นี่ยังไงล่ะครับ"
10048030-94 = "...!"
10048030-95 = "ช่วยเอาภาพปลอมออกมา แล้วเอาภาพจริงไปวางแทนที่ด้วยนะครับ"
10048030-96 = "ถ้าอย่างนั้นทุกอย่างก็จะคลี่คลายได้โดยไม่มีเรื่องวุ่นวายใหญ่โตครับ"
10048030-97 = "งั้นไปบอกความจริงกับทางมูลนิธิแล้วส่งภาพจริงให้น่าจะดีกว่าสิ..."
10048030-98 = "ผมไม่อยากให้ผู้คนจดจำว่าผมเป็นจิตรกรที่ปลอมแปลงภาพครับ"
10048030-99 = "แต่ผมอยากแก้ไขความผิดที่ตัวเองได้ทำลงไป..."
10048030-100 = "แน่นอนว่าคนทั่วไปที่ไม่มีความรู้ทางศิลปะจะแยกแยะความต่างระหว่างภาพจริงกับภาพปลอมไม่ได้"
10048030-101 = "แต่ถึงยังไงผมก็อยากสลัดอดีตที่น่าอับอายของผมออกด้วยวิธีนี้ครับ"
10048030-102 = "พอจะ... จัดการได้มั้ยครับ?"
10048030-106 = "พูดตามตรงว่ามีเรื่องที่ฉันยังค้างคาใจอยู่ค่ะ..."
10048030-107 = "สมมติว่าภาพที่จัดแสดงในนิทรรศการไม่ใช่ภาพปลอม แต่เป็นภาพจริงล่ะคะ?"
10048030-108 = "คุณไม่เชื่อผมเหรอครับ?"
10048030-109 = "คงต้องบอกว่าหลักฐานยังไม่เพียงพอให้เชื่อถือค่ะ"
10048030-110 = "และถ้าเป็นอย่างที่ฉันสมมติ ก็เท่ากับพวกฉันก่อความผิดฐานโจรกรรมภาพวาดของจริง#nและเอาภาพปลอมมาวางแทนค่ะ"
10048030-111 = "ถึงฉันจะไม่ใช่นักเรียนเอกจิตรกรรม"
10048030-112 = "แต่ในฐานะของศิลปินด้วยกัน ต้องบอกตามตรงว่านี่เป็นคำขอที่ยากเกินจะรับไหวค่ะ"
10048030-113 = "ถ้างั้นก็เอาอย่างนี้มั้ยครับ?"
10048030-114 = "ภาพที่นำออกมาจากนิทรรศการ ชมรมการค้าพิเศษเอาไปดำเนินการต่อได้ตามใจเลยครับ"
10048030-115 = "จะเก็บไว้ เผาไฟ หรือเอาไปทำลายทิ้งก็ได้ครับ ตราบใดที่มันจะไม่ปรากฏต่อสาธารณชน พวกคุณจะทำอะไรกับมันก็ได้ครับ"
10048030-116 = "คะ...?!"
10048030-117 = "ลองคิดดูนะครับ ถ้าภาพที่เวโรนิก้ามีอยู่เป็นของจริง แล้วผมจะกล้ามาขอให้ทำงานแบบนี้เหรอครับ?"
10048030-118 = "ภาพนั้นเป็นภาพปลอมแปลงจริงๆ ผมก็เลยมาขอให้ช่วยงานนี้ต่างหากล่ะครับ"
10048030-119 = "ว่ายังไงล่ะครับ เท่านี้ถือว่าเพียงพอที่จะทำให้คุณเชื่อในความจริงใจของผมแล้วหรือยังครับ?"

[translation]
10048030-1 = "第3話;誰會喜愛紫與藍"
10048030-2 = "一天前……"
10048030-4 = "狂獵自治區外的某間咖啡館"
10048030-7 = "那個……你就是「特殊交易部」的營業室長，沒錯吧？"
10048030-11 = "呵呵，是的。"
10048030-12 = "您請坐。"
10048030-13 = "啊，好的。"
10048030-14 = "請問……你們真的什麼都能取得嗎？"
10048030-15 = "沒錯，「交易」就是我的工作。"
10048030-16 = "至於戰績嘛……只能說至今還沒有失敗過吧。"
10048030-17 = "哦哦……！"
10048030-18 = "話說回來，委託內容是什麼呢？#n截至目前為止，從來沒有狂獵外部的人向我們下過委託。"
10048030-19 = "我就單刀直入地問了……您想要的東西是什麼？"
10048030-20 = "唔嗯……雖然把這種事稱為「交易」可能有點奇怪，但我還是先說說看吧。"
10048030-24 = "……我想把狂獵裡的一幅畫，偷渡到外面去。"
10048030-26 = "……"
10048030-30 = "……這件事我就當作沒聽過吧。"
10048030-31 = "請，請等一下！拜託先聽我說完……！"
10048030-32 = "沒什麼好聽的！那不就只是單純的偷竊嗎！"
10048030-33 = "那種事麻煩去委託竊盜部或者怪盜部！"
10048030-34 = "有那種社團嗎！？"
10048030-35 = "怎麼可能有啊！？"
10048030-36 = "求求你至少先聽我說完……！#n等聽完之後再判斷也不遲吧！"
10048030-43 = "……好吧，那您說說看。"
10048030-45 = "……我是一名畫家。"
10048030-46 = "雖然現在勉強算是有點名氣，生活也不成問題……"
10048030-47 = "……但年輕的時候並不是這樣的。"
10048030-48 = "當時我為了活下去，什麼工作都做過。"
10048030-49 = "而在那之中……"
10048030-51 = "……也包含了繪製「偽畫」。"
10048030-52 = "偽畫……是嗎？"
10048030-53 = "是的。就是製作名畫的贗品，再高價出售的勾當。"
10048030-54 = "為了謀生而做過的其他事情，我都不會感到羞恥……"
10048030-55 = "……但是唯獨「畫偽畫」這件事，是我一輩子無法抹去的恥辱。"
10048030-56 = "因此……我希望能夠糾正這段過去。"
10048030-57 = "……不過這跟現在的委託有什麼關係？"
10048030-58 = "狂獵最近即將舉辦「Veronica特展」對吧？"
10048030-59 = "在那場展覽之中……我當年畫的偽畫也會被展示出來。"
10048030-60 = "……！"
10048030-61 = "也就是說，Veronica財團所擁有的畫作裡，混有您畫的偽畫？"
10048030-62 = "是的。雖然Veronica方面似乎誤以為那是真跡了。"
10048030-63 = "是哪一幅？"
10048030-64 = "正是……"
10048030-67 = "[log=시민 동물6 의뢰인]《誰會喜愛紫與藍》[/log]"
10048030-70 = "您畫了那幅畫的偽畫！？"
10048030-71 = "哦哦，果然一聽就懂啊。"
10048030-72 = "對大部分的人來說，就算看到照片也認不出來……"
10048030-73 = "任何狂獵的學生都不可能會不知道的。"
10048030-74 = "那可是談到藝術史就必定會提到的作品啊。"
10048030-75 = "……呵呵，好久沒跟有文化素養的人對話了，讓人感覺輕鬆不少。"
10048030-76 = "大多數的人們，可是連這種基本知識都沒有啊……"
10048030-77 = "……總之，我過去繪製的《誰會喜愛紫與藍》的偽畫，#n將會在「Veronica特展」中展出。"
10048030-78 = "所以……您希望我們把那幅畫偷出來？"
10048030-79 = "沒錯。"
10048030-80 = "坦白說，這非常困難。"
10048030-81 = "就算我們真的能把畫給偷出來，整個狂獵也會鬧得天翻地覆。"
10048030-82 = "畢竟無論它是不是偽畫，這終究是一起盜竊事件……"
10048030-83 = "與其這樣，您不覺得向財團說明那是贗品……才是更好的做法嗎？"
10048030-84 = "我手上有那幅畫的真跡。"
10048030-88 = "……什麼？"
10048030-89 = "不久之前，我在地下拍賣場買到了《誰會喜愛紫與藍》的真跡。"
10048030-90 = "就在這裡。"
10048030-94 = "……！"
10048030-95 = "請把偽畫運出來，再用這幅真跡取而代之。"
10048030-96 = "這樣就不會引發大騷動了。"
10048030-97 = "如果真是這樣的話，不是應該將真跡交還給基金會嗎……？"
10048030-98 = "我不希望自己留下偽畫畫家的汙名。"
10048030-99 = "……可是又想修正當年所犯下的錯誤。"
10048030-100 = "當然我也清楚，普通民眾根本無法辨別作品的真偽。"
10048030-101 = "即便如此……我還是想藉由這種方式擺脫我那可恥的過去。"
10048030-102 = "……能做得到嗎？"
10048030-106 = "……老實說，我還是有點放心不下。"
10048030-107 = "萬一將要展出的那幅畫……其實是真跡呢？"
10048030-108 = "你不信任我嗎？"
10048030-109 = "應該說……缺乏讓我信任的根據吧。"
10048030-110 = "假如真是如此，我們就會變成「以贗品調包真跡」的罪犯了。"
10048030-111 = "儘管我的主修並不是繪畫──"
10048030-112 = "但我終究是從事藝術的一份子，因此實在難以接受這種委託。"
10048030-113 = "那這樣如何？"
10048030-114 = "從展場取出的那幅畫，就交由特殊交易部自由處置。"
10048030-115 = "無論是要收藏、焚毀還是丟棄都可以。#n只要不再讓它公諸於世，想怎麼處理都隨你們高興。"
10048030-116 = "什麼……！？"
10048030-117 = "請試著想想看。#n假如Veronica手上的是真跡，我有可能提出這種提案嗎？"
10048030-118 = "正因為那是幅確確實實的偽畫，我才敢提出這種要求。"
10048030-119 = "怎麼樣？這樣應該足夠表明我的誠意了吧？"
10048030-120 = "……"
10048030-122 = "[log]於是回到現在。[/log]"
10048030-125 = "[ns]「原來你接了這種委託啊……」"
10048030-126 = "所以你是怎麼回答的？"
10048030-128 = "呵呵。"
10048030-134 = "等等，這個是……"
10048030-135 = "《誰會喜愛紫與藍》……！？#n真的假的！？"
10048030-136 = "哦哦……"
10048030-137 = "好漂亮。"
10048030-138 = "真是不可思議。#n居然能在這種地方，而不是展場的牆上看到這幅畫……"
10048030-139 = "話說……這真的是真跡嗎！？"
10048030-140 = "當然。"
10048030-141 = "先等一下。"
10048030-142 = "這幅畫在冬手上就代表……難道你已經接受委託了嗎！？"
10048030-143 = "……不。"
10048030-144 = "嗯？"
10048030-145 = "即便身為營業室長，這種程度的事也不是我能擅自決定的。"
10048030-146 = "所以我就跟委託人說，會跟部長商量之後再回覆。"
10048030-147 = "那這幅畫為什麼會在你這裡呢……？"
10048030-148 = "……因為委託人他半強迫地塞給我後就離開了。"
10048030-149 = "如果你選擇拒絕的話，我會再設法聯絡他把畫還回去。"
10048030-150 = "……"
10048030-151 = "可是你想想看，美代。"
10048030-152 = "雖然「從展覽偷畫」確實讓人有點在意……"
10048030-153 = "不過這次的目標是「將贗品換成真跡」。#n在道德方面並沒有問題。"
10048030-154 = "而且最重要的是，你看這台計算機。"
10048030-155 = "這次委託我談到的數字是……"
10048030-159 = "什麼……！"
10048030-160 = "怎麼樣？很嚇人吧？"
10048030-162 = "哇……！"
10048030-163 = "有這麼多錢的話，連卡拉卡拉採石場最高級的大理石都買得起耶！"
10048030-164 = "[s]「好大一筆數目……！」"
10048030-165 = "呵呵，看見了吧？#n這就是特殊交易部營業室長的談判能力！"
10048030-166 = "不過冬，你應該知道吧？"
10048030-167 = "嗯？知道什麼？"
10048030-168 = "老師他……還在這裡哦……"
10048030-172 = "你為什麼還在！？"
10048030-173 = "[s]「我根本沒離開過啊……！」"
10048030-174 = "呃，那，那個……"
10048030-175 = "不！我們沒什麼好退縮的！"
10048030-176 = "老師也聽見事情的前因後果了吧！"
10048030-177 = "無論有什麼前因後果，為了錢偷東西的本質也不會改變吧……"
10048030-178 = "老師他不可能坐視不管的……"
10048030-179 = "[s]「不，我覺得沒問題。」"
10048030-180 = "什，什麼！？"
10048030-181 = "[s1]「你們是基於道德感才接下委託的對吧？」\n[s2]「既然如此，我願意相信你們一次。」"
10048030-186 = "[ns]「當然，我還是會在一旁看著的。」"
10048030-187 = "老，老師……"
10048030-188 = "連老師都這麼說的話……"
10048030-189 = "唔嗯……"
10048030-193 = "想像一下吧，美代！"
10048030-194 = "CutieBerry87在黑暗中等待著你啊！"
10048030-195 = "你給我安靜！"
10048030-199 = "（……沒事的，就這一次，就這一次而已。做完這筆之後就可以收手了）"
10048030-203 = "好吧。"
10048030-204 = "……我們接受這個委託。"
10048030-208 = "……這次的作品就交給我吧。"

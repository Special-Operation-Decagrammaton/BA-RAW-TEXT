10048030-159 = "เฮือก...!"
10048030-160 = "เป็นไงล่ะ? คิดไม่ถึงเลยใช่มั้ย?"
10048030-162 = "เฮือกก...!"
10048030-163 = "ถ้ามีเงินขนาดนี้ เอาไปซื้อหินอ่อนที่ดีที่สุดจากเหมืองหินคาระคาระได้เลยนะ!"

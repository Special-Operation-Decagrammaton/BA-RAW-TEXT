[translation]
10048030-1 = "Episode 3;The Love of Purple and Blue Light"
10048030-2 = "One day prior..."
10048030-4 = "A Cafe Outside Wildhunt"
10048030-7 = "Um, I heard you're...the Free Trade Cartel's Sales Manager?"
10048030-11 = "Ha. You heard right."
10048030-12 = "Let's have a seat."
10048030-13 = "Ah, sure."
10048030-14 = "So... Is it true that you can get anything?"
10048030-15 = "You name it. \"Trade\" is in our name, after all."
10048030-16 = "And let's just say my record is...pristine."
10048030-17 = "Ooh...!"
10048030-18 = "Anyway, you've got me curious. I don't normally field clients outside Wildhunt."
10048030-19 = "So, let's cut to the chase. What do you want, and why do you need me?"
10048030-20 = "Um, calling this a...trade is a bit of a stretch. I'll explain."
10048030-24 = "...I want to smuggle a painting out of Wildhunt."
10048030-26 = "..."
10048030-30 = "...I'll pretend I didn't hear that. Good day."
10048030-31 = "Uh, wait, please listen...!"
10048030-32 = "\"Listen\" to what? That you want to steal from our school?"
10048030-33 = "Go find the Thief or Bandit Club, or whatever! WE are the Free Trade Cartel."
10048030-34 = "You have clubs like that?"
10048030-35 = "What do you think?!"
10048030-36 = "Please, a moment more...! It's not what it sounds like."
10048030-43 = "...All right. Then what is it?"
10048030-45 = "...I'm an artist."
10048030-46 = "I am doing well now, enough to make a living..."
10048030-47 = "...But, when I was young, it was rough."
10048030-48 = "I did a lot of things just to get by, you know!"
10048030-49 = "And one of those things was..."
10048030-51 = "...art forgery."
10048030-52 = "Forged...art?"
10048030-53 = "Yes. I'd copy a famous painting, down to the finest details, and sell it off as the real thing."
10048030-54 = "I'm not ashamed of most of what I've done in the name of survival."
10048030-55 = "...But forging paintings... That shame still stains my heart."
10048030-56 = "My only wish is to atone, to right my wrongs."
10048030-57 = "Okay... But what does that have to do with your request?"
10048030-58 = "The Veronica Special Exhibition will soon come to Wildhunt."
10048030-59 = "Some of my work, my FORGERIES, will be displayed there."
10048030-60 = "...!"
10048030-61 = "You're telling me that the Veronica Foundation bought and is proudly displaying your fake art?"
10048030-62 = "...Yes. Of course, the Foundation believes my pieces are authentic."
10048030-63 = "Mm. And which painting is this?"
10048030-64 = "Right. It's..."
10048030-67 = "[log=시민 동물6 의뢰인]\"The Love of Purple and Blue Light.\"[/log]"
10048030-70 = "You forged THAT painting?!"
10048030-71 = "Oh, you know it?"
10048030-72 = "Most people wouldn't recognize it even if I gave them a picture!"
10048030-73 = "I attend Wildhunt. Of course I know."
10048030-74 = "It's a foundational piece. We spent a week on it in Art History..."
10048030-75 = "...Fufu. What a relief to finally talk to someone cultured."
10048030-76 = "You'd be shocked at how little the public educates themselves on even the basics..."
10048030-77 = "...Anyway, I forged \"The Love of Purple and Blue Light.\" This copy will soon be within your reach at the Veronica Special Exhibition."
10048030-78 = "Then... You want us to smuggle your fake painting out?"
10048030-79 = "Precisely."
10048030-80 = "That's...ambitious, to say the least."
10048030-81 = "Even if we nabbed the painting, the school, not to mention the authorities, would be up in arms."
10048030-82 = "Forgery or not, it's a REAL robbery."
10048030-83 = "If you're so sure, why not approach the foundation and tell them the truth?"
10048030-84 = "Look. I have the genuine painting ready for you."
10048030-88 = "...Huh?"
10048030-89 = "I recently won the authentic \"The Love of Purple and Blue Light\" in an underground auction."
10048030-90 = "See, it's right here."
10048030-94 = "...!"
10048030-95 = "All I'm asking is for you to smuggle out the forged piece and replace it with the real one."
10048030-96 = "There doesn't need to be any trouble, you see?"
10048030-97 = "Look, if that's the case, then you REALLY should just tell the foundation. They can verify it and—"
10048030-98 = "I can't let people know that I...that I was a forger! I've worked hard to make a name for myself."
10048030-99 = "...All I want is to make things right."
10048030-100 = "And while the insipid public will never know what I've done..."
10048030-101 = "...This could help me set things right."
10048030-102 = "Would that be...possible?"
10048030-106 = "...Let's be real. You must know what's bothering me."
10048030-107 = "What if the exhibition painting IS authentic, and you're just trying to steal it?"
10048030-108 = "You don't believe me?"
10048030-109 = "Did you give me reason to?"
10048030-110 = "I'm not in the business of forgery, and no one plays the Cartel."
10048030-111 = "Granted, this isn't my major. I'm not sure I could spot the difference."
10048030-112 = "Nevertheless, I AM an artist. And the idea of stealing someone's genuine work...doesn't sit right."
10048030-113 = "Then how about this?"
10048030-114 = "Your Cartel can do whatever you want to the painting you smuggle out."
10048030-115 = "Hang it, burn it, toss it, as long as it's not revealed to the world, I'm happy."
10048030-116 = "Excuse me?!"
10048030-117 = "Think about it. What do I have to gain? I don't want anything back."
10048030-118 = "I ask this because I know that Veronica has the forged piece."
10048030-119 = "So, what do you say? Do you believe me now?"
10048030-120 = "..."
10048030-122 = "[log]Back to the present.[/log]"
10048030-125 = "[ns] \"So, that's your request...\""
10048030-126 = "What did you answer?"
10048030-128 = "Ha."
10048030-134 = "Wait, this is..."
10048030-135 = "\"The Love of Purple and Blue Light\"...?! Truly?!"
10048030-136 = "Whoa..."
10048030-137 = "It's pretty."
10048030-138 = "It's...marvelous. Here, outside, in the sun, out of a gallery's walls..."
10048030-139 = "This is the real thing?"
10048030-140 = "Allegedly."
10048030-141 = "...Wait."
10048030-142 = "Please don't tell me you accepted the request..."
10048030-143 = "...I didn't."
10048030-144 = "Hm?"
10048030-145 = "Even if I am the sales manager, this is above my paygrade."
10048030-146 = "I told the potential client that I had to speak with the president first."
10048030-147 = "Then why do you..."
10048030-148 = "...They basically threw it at me."
10048030-149 = "But I have their contact info. If you refuse, I'll return it. No pressure..."
10048030-150 = "..."
10048030-151 = "But...think about it, Miyo."
10048030-152 = "Smuggling art from an exhibition does sound...worrisome, I agree."
10048030-153 = "But we'll be swapping the forged piece for a real one. Isn't that kind of the MORAL thing to do?"
10048030-154 = "And moreover, look at this calculator."
10048030-155 = "This is how much I negotiated for the contract."
10048030-159 = "...Ah!"
10048030-160 = "What do you think? Pretty outstanding, right?"
10048030-162 = "Eeeh...!"
10048030-163 = "I could buy artisanal Karakara marble with this!"
10048030-164 = "[s] \"An outstanding amount...!\""
10048030-165 = "Behold, the superior negotiating power of the Free Trade Cartel's Sales Manager...!"
10048030-166 = "But Fuyu, you do realize, right?"
10048030-167 = "Hm? Realize what?"
10048030-168 = "That Sensei...is still here..."
10048030-172 = "Why are you still here?!"
10048030-173 = "[s] \"I never left...!\""
10048030-174 = "Uh, well, uh..."
10048030-175 = "Hold on! Everyone, relax. There's no need to panic."
10048030-176 = "After all, you heard the full story, Sensei! It's...morally correct, is it not?"
10048030-177 = "Nevertheless, they heard us talk about STEALING something in exchange for MONEY."
10048030-178 = "There's no way they'll let this cont—"
10048030-179 = "[s] \"Actually, it's fine with me.\""
10048030-180 = "What?!"
10048030-181 = "[s1] \"You're trying to do the right thing. \"\n[s2] \"I trust your judgment.\""
10048030-186 = "[ns] \"Of course, I will...'observe' from the sidelines.\""
10048030-187 = "S-Sensei..."
10048030-188 = "If you also say so..."
10048030-189 = "Ugh..."
10048030-193 = "Think, Miyo!"
10048030-194 = "Clack, clack, ding! Cutey Berry 87 is calling to you!"
10048030-195 = "Shut up!"
10048030-199 = "(...Okay, just this once. Just one more job, and then I am done.)"
10048030-203 = "Very well."
10048030-204 = "...We'll accept the request."
10048030-208 = "...I will write a plan."

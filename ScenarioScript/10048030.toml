10048030-140 = "ก็ใช่น่ะสิ"
10048030-141 = "เดี๋ยวนะ"
10048030-142 = "ถ้าฟุยุมีภาพนี้อยู่กับตัว... แสดงว่าตอบรับคำขอนั้นมาแล้วเหรอคะ?!"
10048030-143 = "เปล่าหรอก..."
10048030-144 = "หืม?"
10048030-145 = "ต่อให้ฉันจะเป็นหัวหน้าฝ่ายธุรกิจ แต่งานสเกลใหญ่ขนาดนี้ ฉันจะตัดสินใจคนเดียวไม่ได้หรอก"
10048030-146 = "ฉันบอกลูกค้าไปว่าจะมาปรึกษาหัวหน้าก่อนแล้วค่อยให้คำตอบน่ะ"

10048030-149 = "ถ้าเธอปฏิเสธ ฉันก็จะติดต่อลูกค้าแล้วเอาไปคืนให้"
10048030-150 = "......"
10048030-151 = "แต่ยังไงก็ลองคิดดูอีกครั้งเถอะนะ มิโยะ"

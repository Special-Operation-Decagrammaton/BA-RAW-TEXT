10048030-174 = "อา... คะ... คือว่า..."
10048030-175 = "ไม่หรอก! พวกเราไม่เห็นต้องกลัวอะไรเลย!"
10048030-176 = "คุณครูก็ได้ฟังเรื่องราวทั้งหมดแล้วนี่คะ!"
10048030-177 = "ไม่ว่าเบื้องลึกเบื้องหลังจะเป็นยังไงก็เถอะค่ะ ยังไงคำขอนี้ก็เป็นการแอบขโมยของออกมาอยู่ดี..."
10048030-178 = "แล้วคุณครูก็ไม่มีทางปล่อยให้เกิดเรื่องแบบนั้นด้วย..."

[translation]
1300808-1 = "Unexpected Luck"
1300808-2 = "(We had an overnight job at a convenience store scheduled, but we were allowed to leave earlier than planned.)"
1300808-4 = "Wow, we got lucky today, Sensei!"
1300808-5 = "I was prepared to stay almost all night, but there was so much business tonight that the store ran out of stock."
1300808-6 = "Nothing beats full pay AND getting out early!"
1300808-7 = "Talk about a nice change of pace, right, Sensei?"
1300808-8 = "[s] \"You said it.\""
1300808-9 = "This neighborhood always looks so busy. There are a lot of items that I don't see at Abydos..."
1300808-10 = "Look, takoyaki! They have grilled squid too!"
1300808-11 = "They're selling funny-looking masks over there."
1300808-12 = "[s] \"Want to look around for a bit?\""
1300808-13 = "H-Huh?"
1300808-14 = "L-Look around? Just the two of us?"
1300808-15 = "..."
1300808-16 = "[s] \"We can head home if you don't want to.\""
1300808-17 = "I-I never said no!"
1300808-18 = "It's not every day that we get out early. I-It'd be a waste to go back already..."
1300808-19 = "Everyone needs to cut loose and have fun sometimes, you know? "
1300808-20 = "Okay, then..."
1300808-23 = "(Serika wrapped her arm around mine.)"
1300808-24 = "..."
1300808-25 = "Wh-What? You're not complaining, are you?"
1300808-26 = "[s1] \"I mean...\"\n[s2] \"It's just...\""
1300808-27 = "Hold that thought!"
1300808-28 = "Hold that thought!"
1300808-29 = "...Heehee."
1300808-30 = "All right! Let's go take a look over there first! ♪"
1300808-32 = "(Serika and I ate grilled squid, corn with soy sauce, grilled potato, and takoyaki before window shopping at all the shops.)"
1300808-33 = "(We didn't make it home until dawn.)"

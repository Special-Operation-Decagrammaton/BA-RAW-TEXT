[translation]
1300808-1 = "มีโชคอย่างคาดไม่ถึง"
1300808-2 = "(งานพิเศษที่ตลาดโต้รุ่งเสร็จเร็วกว่าที่คิดเอาไว้)"
1300808-4 = "อา... โชคดีชะมัดเลยจริงๆ ว่าไหมล่ะ? คุณครู?"
1300808-5 = "ฉันเตรียมตัวเผื่อว่าต้องมาทำงานทั้งคืนแล้วแท้ๆ แต่ว่าขายดีเกินไปเลยทำให้วัตถุดิบหมดก่อน"
1300808-6 = "ได้เงินค่าทำงานพิเศษมาตามที่ตกลงไว้ แถมยังเสร็จงานก่อนกำหนดอีกด้วย! "
1300808-7 = "บางทีก็มีวันที่โชคดีแบบนี้อยู่ด้วยใช่ไหมล่ะคุณครู?"
1300808-8 = "[s] \"อื้อ ดีจังเลยนะ\""
1300808-9 = "อืม... เมืองนี้ดูมีชีวิตชีวาดีจัง เหมือนว่าจะมีของหลายอย่างที่ไม่มีที่อะบิดอสอยู่ด้วย..."
1300808-10 = "ดูนั่นสิ ทาโกะยากิล่ะ! มีปลาหมึกย่างด้วย!"
1300808-11 = "ดูเหมือนทางโน้นจะมีหน้ากากตลกๆ ขายด้วยแฮะ?"
1300808-12 = "[s] \"เราไปเดินเที่ยวกันดีไหม?\""
1300808-13 = "หะ...หือ?"
1300808-14 = "ทะ...เที่ยวเหรอ? แค่สองคนเหรอ?"
1300808-15 = "......"
1300808-16 = "[s] \"ถ้าไม่อยากไปเดินเที่ยวก็กลับบ้านกัน\""
1300808-17 = "คะ...ใครบอกว่าไม่อยากเล่า?!"
1300808-18 = "นะ...ไหนๆ ก็เสร็จงานเร็วแล้ว! ถ้ากลับไปแบบนี้ก็น่าเสียดาย..."
1300808-19 = "บางครั้งเราก็ต้องพักผ่อนกันบ้างสิใช่ไหมล่ะ?"
1300808-20 = "เอาล่ะถ้างั้น...."
1300808-23 = "(เซริกะยกมือขึ้นกอดแขนคุณครู)"
1300808-24 = "......"
1300808-25 = "อะ...อะไรล่ะ? มะ...ไม่อยากไปเหรอ?"
1300808-26 = "[s1] \"เรื่องนั้น...\"\n[s2] \"ถ้าอย่างนั้น....\""
1300808-27 = "ช่างเถอะ ไม่ต้องตอบแล้ว!"
1300808-28 = "ช่างเถอะ ไม่ต้องตอบแล้ว!"
1300808-29 = "แหะๆ..."
1300808-30 = "เอาล่ะน้า~♪ ไปดูทางโน้นกันเถอะ!"
1300808-32 = "(ทั้งสองคนเดินไปซื้อปลาหมึกย่าง ข้าวโพดย่างซีอิ้ว มันเผาและทาโกะยากิกินด้วยกัน#nก่อนจะเดินเที่ยวไปรอบๆ)"
1300808-33 = "(พอเกือบใกล้รุ่งสางทั้งคู่ก็เดินกลับบ้านด้วยกัน)"

[translation]
1300808-1 = "意想不到的幸運"
1300808-2 = "（原定要做到凌晨的夜市打工比預期來得更早結束）"
1300808-4 = "哎呀～真幸運呢。對吧？老師？"
1300808-5 = "本來做好了要熬夜的覺悟，沒想到生意很好，材料用完就打烊了。"
1300808-6 = "不但如約領到打工薪水，而且還早早就結束！ "
1300808-7 = "偶爾也有這種好日子呢，老師？"
1300808-8 = "[s] 「嗯，太好了呢。」"
1300808-9 = "哼～，這邊的城鎮挺熱鬧的呢。還有很多阿拜多斯沒有的東西……"
1300808-10 = "你看那邊，是章魚燒！還有烤魷魚！"
1300808-11 = "那邊好像還有賣看起來很好笑的面具耶？"
1300808-12 = "[s] 「要不要去逛逛？」"
1300808-13 = "唔，嗯？"
1300808-14 = "逛，逛逛？兩個人？"
1300808-15 = "……"
1300808-16 = "[s] 「啊，還是說累了，要直接回家？」"
1300808-17 = "誰，誰說不去了！？ "
1300808-18 = "難，難得比較早結束！就這樣回去也很可惜…… "
1300808-19 = "偶，偶爾休息也是很重要的？"
1300808-20 = "那麼，首先……"
1300808-23 = "（被茜香抱住了手臂）"
1300808-24 = "……"
1300808-25 = "……怎，怎麼？……不喜歡嗎？"
1300808-26 = "[s1] 「那是……」\n[s2] 「這個……」"
1300808-27 = "啊啊真是的，好啦什麼都別說！"
1300808-28 = "啊啊真是的，好啦什麼都別說！"
1300808-29 = "……嘿嘿。"
1300808-30 = "那～麼♪從那邊開始逛吧！"
1300808-32 = "（和茜香一起到處逛路邊攤，買了烤魷魚、醬燒玉米、烤馬鈴薯、章魚燒來吃）"
1300808-33 = "（到了凌晨才終於回到家）"

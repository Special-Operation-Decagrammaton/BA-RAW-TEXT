[translation]
83300400400-5 = "ประธาน ไปจัดการพวกเด็กเจ้าปัญหามาแล้วเหรอ?"
83300400400-6 = "อื้ม แต่ว่ายังไม่ได้เบาะแสอะไรเป็นพิเศษเกี่ยวกับผู้ว่าจ้างเลย"
83300400400-7 = "เราคงไม่ได้คำตอบจากแค่การไปเค้นถามเด็กเจ้าปัญหาหรอกค่ะ"
83300400400-8 = "อืม หวังว่าจะไม่เกิดเรื่องที่ทำให้ต้องหงุดหงิดนะ"
83300400400-9 = "เอาเป็นว่าพวกฉันจะอยู่เคลียร์ที่นี่ต่อเองค่ะ"
83300400400-10 = "วันนี้ก็ขอบคุณมากนะคะ ท่านประธาน"

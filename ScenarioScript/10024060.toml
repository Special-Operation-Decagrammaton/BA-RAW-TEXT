[translation]
10024060-1 = "ตอนที่ 6;ตรงไปตรงมา"
10024060-2 = "ถนนซานไห่จิง"
10024060-4 = "อ๊ะ คุณครู ขอบคุณนะที่ช่วยคุยกับผู้ฝึกสอนให้น่ะ"
10024060-5 = "[s] \"ก็ครูเป็นคนชวนให้วางกับดักกันนี่นะ\""
10024060-6 = "..."
10024060-7 = "คุณครูเชื่อเรื่องการเสียสละไหม?"
10024060-8 = "ไม่ว่าจะเป็นการเสียสละเรื่องเล็กๆ น้อยๆ เพื่อเป้าหมายที่ยิ่งใหญ่ หรือยอมทำทุกอย่างเพื่อให้ผลลัพธ์#nออกมาดี"
10024060-9 = "เอาตามตรงนะ... ฉันไม่แน่ใจเลย"
10024060-10 = "ถ้าเป็นมังกรดำละก็ พวกนั้นคงบอกว่าต้องเสียสละจนกว่าจะบรรลุเป้าหมายอย่างแน่นอน"
10024060-11 = "ยิ่งรอบนี้มินะเห็นด้วยกับ 'กับดัก' มันเลยยิ่งทำให้รู้เลยว่าพวกเธอมีมุมมองแบบนั้น"
10024060-12 = "[s1] \"รูมิดูให้ความรู้สึกเป็นคนมีบารมีขึ้นมาเลย\"\n[s2] \"ครูนึกว่าเธอจะไม่เก็บเรื่องแบบนี้มาใส่ใจซะอีก\""
10024060-15 = "ฮ่าฮ่าฮ่า พูดอะไรของคุณครูน่ะ"
10024060-16 = "ถึงตอนนี้ฉันจะจับพลัดจับผลูมาเป็นประธาน แต่จริงๆ ฉันเป็นเชฟนะ"
10024060-17 = "นั่นน่ะสินะ... ถ้าเลือกได้ฉันก็อยากทำอาหารอย่างเดียวโดยที่ไม่ต้องคิดอะไรเลย"
10024060-18 = "อาหารมันมีความตรงไปตรงมาใช่ไหมล่ะ? ยิ่งตั้งใจทำก็ยิ่งอร่อยกว่าเดิม ยิ่งตั้งใจค้นคว้าก็ยิ่งมีความเป็น#nไปได้"
10024060-19 = "พอต้อนรับลูกค้าด้วยสิ่งนั้นเราก็ได้รับคำชมกลับมา"
10024060-20 = "คุณค่าของการเป็นเชฟมันก็ประมาณนั้นแหละนะ"
10024060-21 = "[s] \"แล้วหัวใจของการเป็นประธานล่ะ?\""
10024060-22 = "..."
10024060-23 = "คุณครูเป็นผู้ใหญ่แล้วก็คงจะเข้าใจอยู่บ้างนะ"
10024060-24 = "การเป็นผู้รับผิดชอบน่ะ... มันเกินกำลังอยู่แล้วน่ะสิ"
10024060-25 = "ผลลัพธ์จากการเลือกและตัดสินใจของฉันมันจะส่งผลต่อนักเรียนจำนวนมากเอานะ"
10024060-26 = "ถึงแม้ว่าฉันจะไม่ได้ดีไปกว่านักเรียนพวกนั้นเลยก็ตาม"
10024060-27 = "แต่ว่าพวกเธอ... ก็มีฉันที่เป็นที่พึ่งเพียงที่เดียว"
10024060-28 = "[s] \"ครูเข้าใจ\""
10024060-29 = "พอมาอยู่รวมกันเป็นกลุ่มๆ แล้วมันก็น่าปวดหัวอยู่นะ"
10024060-30 = "ถึงแต่ละคนจะไม่ได้มีอิทธิพลมากนัก แต่ว่าสุดท้ายมันก็กลายเป็นเจตจำนงอันยิ่งใหญ่"
10024060-31 = "ทั้งไม่พอใจ ทั้งโกรธ ทั้งไม่ชอบ... หรือบางครั้งก็เกลียดอะไรบางอย่าง"
10024060-32 = "ฉันพยายามคลายสิ่งเหล่านั้นเพื่อให้ผลสุดท้ายมันออกมาเหมือนกับว่าไม่เคยมีปัญหาอะไรเกิดขึ้น"
10024060-33 = "ถ้าฉันทำให้มันจบลงแบบนั้นได้... นั่นสินะ แบบนั้นคงต้องเรียกว่ามันคุ้มเหนื่อยแหละเนอะ"
10024060-34 = "หรือไม่ก็คิดว่า ครั้งนี้ก็ทำออกมาได้ดีแล้ว แม้ครั้งหน้าก็จะยังไม่มั่นใจก็เถอะ"
10024060-35 = "แต่จะว่าไปฉันอาจจะรู้สึกเบาใจมากกว่าคุ้มเหนื่อยด้วยซ้ำ"
10024060-36 = "[s] \"รูมิเป็นคนลึกซึ้งนะเนี่ย\""
10024060-37 = "เปล่าสักหน่อย คุณครูดูทำตัวแปลกๆ ตั้งแต่เมื่อกี้แล้วนะ"
10024060-38 = "อ้อ หรือว่าคุณครูเป็นพวกที่ชอบชมเชยคนรอบตัวเพื่อให้พวกเขาทำงานให้"
10024060-39 = "แบบนี้สบประมาทไม่ได้เลยนะ ถึงจะเป็นหนึ่งในวิธีควบคุมคนอย่างมีประสิทธิภาพก็เถอะ"
10024060-40 = "ถ้ามาชมกันมากเกินไป เดี๋ยวในวันข้างหน้าจะเดือดร้อนเอาได้นะ"
10024060-41 = "[s] \"มีประสบการณ์แบบนั้นมาก่อนแล้วเหรอ?\""
10024060-42 = "อืม จะว่ายังไงดี ที่เหลือถือว่าเป็นความลับแล้วกัน"
10024060-43 = "ทำไมมองแบบนั้นล่ะ ไม่ว่าใครก็มีความลับกันทั้งนั้นแหละน่า"
10024060-47 = "น่าแปลกใจนะ ฉันเอาแต่เล่าเรื่องที่ไม่เคยบอกใครให้คุณครูฟังใหญ่เลย"
10024060-48 = "[s] \"การรับฟังความกังวลของนักเรียนเป็นงานของครูอยู่แล้ว\""
10024060-49 = "..."
10024060-50 = "รู้อะไรไหมคุณครู?"
10024060-55 = "ถ้าครูพูดแบบนั้น... มันจะทำให้ฉันเข้าใจอะไรผิดไปเองได้นะ?"
10024060-56 = "เอาละ ถ้าอย่างนั้นก็ได้เวลาไปดูแลผู้ฝึกสอนแล้วละนะ"
10024060-57 = "[s] \"ปกป้องโคโคน่าจังแทนครูด้วยนะ\""
10024060-58 = "ไม่ต้องห่วงนะ ฉันจะไม่ให้เกิดเรื่องไม่ดีกับเธอเด็ดขาด ขอสัญญาด้วยเกียรติของย่านการค้าเลย"
10024060-59 = "ให้ตายเถอะ พอมาคิดๆ ดูแล้ว สุดท้ายมันก็เป็นแค่เรื่องขนกล่องลังกล่องเดียวก็เท่านั้นเอง"
10024060-60 = "[s] \"แต่ตอนนี้มันเป็นกล่องที่สำคัญที่สุดในโลกเลยนะ?\""
10024060-61 = "มันก็จริง... งั้นเดี๋ยวฉันกลับมานะ"
10024060-66 = "(เมื่อรูมิเดินไปจนพ้นสายตา...)"
10024060-70 = "(นักเรียนจากมังกรดำก็ปรากฏตัวขึ้นพร้อมกับบรรยากาศแปลกๆ)"
10024060-75 = "[ns3] \"นี่มันเรื่องอะไรกัน?\"\n[ns4] \"มาหามินะเหรอ?\""
10024060-78 = "ทุกคนไปไหนกันหมดแล้วล่ะ?"
10024060-79 = "[s5] \"อืม... ทุกคนมีงานที่ต้องทำน่ะ\"\n[s6] \"มีเรื่องอะไรก็ฝากไว้ เดี๋ยวครูไปบอกให้\""
10024060-85 = "ไม่เป็นไร... ไม่มีใครนี่แหละดีแล้ว"
10024060-91 = "ฮู่ว แอบออกมานี่ก็เหนื่อยเหมือนกันนะ"
10024060-96 = "[ns] \"คิซากิ?!\""
10024060-97 = "ทำไมถึงตกใจขนาดนั้นเล่า ครู?"
10024060-98 = "เราแค่มาดูความคืบหน้าของงานตามหน้าที่ประมุขมังกรดำเท่านั้นเอง"
10024060-99 = "เราต้องมาด้วยตัวเองหรือเปล่าน่ะเหรอ?"
10024060-100 = "สิ่งที่มองไม่เห็นจากจุดที่นั่งอยู่ อาจมองเห็นได้จากสถานที่จริง"
10024060-101 = "ทุกคนมีมุมมองของตัวเอง ถ้าเราไม่เห็นความแตกต่างตรงนั้น เราอาจจะพลาดสิ่งสำคัญไปก็ได้"
10024060-102 = "เพราะงั้น... ตอนนี้คืบหน้าถึงไหนแล้วเล่า? เราอยากฟังความเห็นจากครูน่ะ"
10024060-108 = "(เล่าเรื่องราวที่เกิดขึ้นจนถึงตอนนี้ให้คิซากิฟัง)"
10024060-111 = "อย่างงั้นหรือ... เข้าใจแล้ว"
10024060-112 = "เราตัดสินใจถูกแล้วสินะที่ให้มินะติดตามครูมาด้วย"
10024060-113 = "มินะน่ะถึงจะดูเป็นแบบนั้นแต่ก็หัวร้อนได้ง่ายๆ เลยละ"
10024060-114 = "[s] \"ถ้างั้นเรื่องส่งมินะไปเขาคุนหลุน...?\""
10024060-115 = "ใช่ เป็นคำสั่งของเราเอง"
10024060-116 = "ถ้าเกิดการปะทะกันจะทำยังไงน่ะหรือ? เราคิดไว้แล้วละ"
10024060-117 = "มินะเป็นคนเก่งและแข็งแกร่งก็จริง แต่ก็เอาชนะสองคนนั้นจากย่านการค้าเทพเต่าดำพร้อมกันไม่ได้หรอก"
10024060-118 = "เราเชื่อว่าถ้ามีครูอยู่ด้วย สองคนนั้นจะไม่ทำอะไรมินะโดยพลการอย่างแน่นอน"
10024060-119 = "ถ้าเป็นอย่างนั้น สมดุลระหว่างมินะกับย่านการค้าเทพเต่าดำก็จะยังคงอยู่"
10024060-120 = "และครูก็จะอยู่ตรงกลางระหว่างพวกนั้นด้วย"
10024060-121 = "เราคาดการณ์ผิดตรงไหนหรือเปล่า?"
10024060-125 = "[ns] \"คิซากินี่สุดยอดเลย...\""
10024060-126 = "ไม่มีอะไรน่ายกย่องหรอก ถ้าจะเป็นประมุขมังกรดำ ก็ต้องอ่านเรื่องพวกนี้ออกอยู่แล้ว"
10024060-127 = "ว่ากันตามตรง เราก็ไม่อยากยึดติดกับตำแหน่งนี้เท่าไร..."
10024060-131 = "ไม่สิ... เราพูดผิดไป ลืมมันไปเถอะ"
10024060-132 = "[s] \"ทำไมถึงอยากให้มินะกับย่านการค้าเทพเต่าดำร่วมมือกันเหรอ?\""
10024060-133 = "..."
10024060-134 = "บางอย่างน่ะ... เราไม่อาจมองเห็นได้ หากไม่มองจากด้านข้าง"
10024060-135 = "มินะเป็นคนเที่ยงธรรมและเถรตรง แต่ก็เป็นคนที่มีมุมมองแคบๆ คนหนึ่ง"
10024060-136 = "ถ้าเธอมีความยืดหยุ่นกว่านี้ก็คงจะเห็นโลกที่กว้างขึ้น..."
10024060-137 = "เราคิดว่าครูคงเข้าใจสิ่งที่เราจะสื่อนะ ครูเองก็มองคนออก"
10024060-138 = "ถ้าเรื่องทุกอย่างจบลงแล้ว คิดจะอยู่ที่ซานไห่จิงต่ออีกหน่อยไหมเล่า? เราจะดูแลครูเอง"
10024060-139 = "[s] \"ขอรับแค่น้ำใจก็พอนะ ขอบใจมาก\""
10024060-140 = "ฮุฮุ เอางั้นหรือ น่าเสียดายนะ"
10024060-141 = "ส่วนรูมิ... พูดไปก็ไม่มีประโยชน์หรอก เธอเป็นอีกคนที่ไม่ได้ดั่งใจเรา"
10024060-142 = "เราเป็นห่วงรูมิไหมน่ะหรือ? ฮุฮุ เราคิดว่าตอนนี้เธอไม่ฟังคำพูดของเราหรอก"
10024060-143 = "รูมิเองก็คงไม่คาดหวังเรื่องพวกนั้นจากเราเหมือนกัน"
10024060-144 = "[s] \"ฟังดูเหมือนรู้จักกันมานานเลยนะ?\""
10024060-145 = "รู้จักอะไรเล่า มันก็แค่ความสัมพันธ์น่าเบื่อสำหรับเราสองคน มีช่วงหนึ่งเราเคยคิดว่าจะทำงานกับเธอ#nด้วยนะ..."
10024060-146 = "ไม่หรอก ไม่มีอะไร แค่เรื่องไร้สาระ ลืมมันไปซะเถอะ"
10024060-147 = "[s] \"พอได้เห็นด้วยกับตาของตัวเองแล้วรู้สึกยังไงบ้าง?\""
10024060-148 = "..."
10024060-149 = "ชักไม่แน่ใจแล้วว่าตัวเองทำถูกหรือเปล่าที่มาเล่าเรื่องเล็กๆ น้อยๆ ให้ครูฟังที่นี่"
10024060-150 = "เพื่อรูมิแล้วมันอาจเป็นทางเลือกที่ดีก็ได้งั้นหรือ?"
10024060-151 = "ฮุ..."
10024060-152 = "เราไม่ชอบเรื่องเล็กๆ น้อยๆ หรอก แต่ว่าครู... ค่อนข้างแตกต่างจากคนอื่นนะ"
10024060-153 = "เราเชื่อใจครูเราถึงได้เล่าให้ฟัง บางครั้งมังกรดำก็ไม่ได้สนใจข้อเท็จจริงในเหตุการณ์นักหรอก"
10024060-154 = "ไม่ต้องตกใจไปหรอก พอมาทำงานประเภทนี้ก็จะเจอสถานการณ์แบบนี้เป็นปกตินั่นแหละ"
10024060-159 = "ถ้าย่านการค้าเทพเต่าดำมีส่วนเกี่ยวข้องกับการส่งออกโสมหมื่นปี เรื่องราวจะยิ่งง่ายขึ้น เพราะมันจะเป็นข้ออ้างในการจับย่านการค้าเทพเต่าดำ"
10024060-163 = "แต่ถึงย่านการค้าเทพเต่าดำจะไม่ได้มีส่วนเกี่ยวข้องกับการส่งออกก็ไม่เป็นไร เพราะเรื่องนี้จะถูกใช้#nเป็นข้ออ้างเพื่อใส่ความ แล้วเข้าควบคุมอำนาจของย่านการค้าเทพเต่าดำอยู่ดี"
10024060-167 = "ไม่ว่าผลจะออกมาเป็นยังไง... ก็ไม่ใช่เรื่องแย่สำหรับมังกรดำเลย ว่าไหมเล่า?"
10024060-170 = "[ns] \"แต่คิซากิไม่ถูกใจสถานการณ์นั้นใช่ไหม?\""
10024060-173 = "ทำไมถึงตัดสินเช่นนั้นกันเล่า...?"
10024060-174 = "[s] \"เพราะถ้าไม่ใช่อย่างนั้น ก็คงไม่ต้องปลอมตัวออกมาหรอก\""
10024060-175 = "ฮุฮุ... ครูเป็นคนมองทะลุปรุโปร่งดีนะ"
10024060-176 = "มังกรดำ... ก็คือมังกรดำ"
10024060-177 = "เราเป็นประมุข แต่ก็ไม่ได้แปลว่าเราจะเปลี่ยนเจตจำนงและทิศทางของมังกรดำตามอำเภอใจได้"
10024060-178 = "[s] \"คิซากิพยายามช่วยอยู่สินะ\""
10024060-182 = "ยังไงดีล่ะ..."
10024060-183 = "ปกติครูไม่ได้บุ่มบ่ามพูดอะไรแบบนั้นกับคนอื่นไปทั่วใช่ไหม? ไม่สิ... หรือเพราะแบบนี้ ครูถึงเป็นครูจากชาเล่ต์..."
10024060-184 = "เราโกรธหรือเปล่าน่ะเหรอ? คนเป็นประมุขไม่ควรหวั่นไหวกับเรื่องพวกนี้หรอก"
10024060-185 = "แต่ว่า..."
10024060-192 = "[ns] \"เอ๊ะ?!\""
10024060-193 = "(จู่ๆ คิซากิก็ขยับตัวมาขี่หลัง)"
10024060-195 = "คนเป็นครูมีสิ่งที่ตัวเองมองเห็น และเราก็มีสิ่งที่ตัวเรามองเห็นเช่นกัน"
10024060-196 = "เรื่องนี้คงมาจากมุมมองของครู... หรืออาจจะเป็นมุมมองของผู้ใหญ่"
10024060-197 = "..."
10024060-200 = "[ns] \"คิซากิคิดว่ารูมิไม่เกี่ยวข้องกับเรื่องนี้ใช่ไหม?\""
10024060-201 = "เธอจัดการความเสี่ยงได้อย่างรอบคอบกว่าใคร ไม่มีทางเข้าไปยุ่งกับเรื่องอันตรายแบบนั้นหรอก"
10024060-202 = "แม้มันจะเป็นไปได้ยากก็ตาม แต่หากเธอจะมีส่วนเกี่ยวข้องจริงๆ... ก็น่าจะมาจากฝีมือขององค์กรระดับ#nล่างที่รูมิเข้าไปจัดการไม่ถึง"
10024060-203 = "อย่างมากก็พวกปลาซิวปลาสร้อยที่ตกเป็นทาสเม็ดเงิน"
10024060-204 = "[s] \"ครูก็คิดว่ามันเป็นแบบนั้นเหมือนกัน\""
10024060-205 = "..."
10024060-212 = "เรามีเรื่องอยากรบกวนหน่อยน่ะ ครู"
10024060-213 = "ช่วยปกป้องรูมิและดูแลมินะเหมือนที่ผ่านมาด้วยนะ รวมถึงเด็กเรย์โจวนั่นด้วย"
10024060-214 = "อย่างน้อยก็ก่อนที่ความจริงทุกอย่างจะปรากฏ"
10024060-215 = "แม้จะเป็นไปได้ยาก แต่ถ้าย่านการค้าเทพเต่าดำมีส่วนเกี่ยวข้องกับเรื่องนี้อย่างลึกซึ้ง... ตอนนั้นเราจะจัดการรูมิด้วยตัวเอง"
10024060-216 = "แต่ก่อนที่ทุกอย่างจะถูกเปิดเผย เด็กๆ พวกนั้นก็ไม่ควรได้รับความเดือดร้อนทั้งๆ ที่ไม่เกี่ยวกับตนเอง"
10024060-217 = "คนพวกนี้นี่นะ ถึงกับต้องให้ประมุขมังกรดำออกโรงเองเลยหรือเนี่ย"
10024060-218 = "[s] \"คิซากิคิดยังไงกับย่านการค้าเทพเต่าดำกับรูมิเหรอ?\""
10024060-219 = "จะพูดยังไงดีนะ..."
10024060-223 = "ย่านการค้าเทพเต่าดำก็คือซานไห่จิง มังกรดำก็เป็นซานไห่จิงเช่นกัน"
10024060-224 = "ที่เราบอกได้ก็มีเพียงเท่านี้"

10024060-4 = "3;루미;00;아, 선생님. 교관 쨩에게 잘 이야기해 줘서 고마워.\n#3;em;[반응]"
10024060-5 = "[s] \"덫을 놓자고 한 건 나니까.\""
10024060-6 = "3;루미;02;……"
10024060-7 = "3;루미;01;선생님은 대의라는 걸 믿어?\n#3;em;[?]"
10024060-8 = "3;루미;99;큰 뜻을 위해서 작은 희생은 감수할 만하다든가, 결과만 좋으면 다 괜찮다든가."
10024060-9 = "3;루미;06;나는…… 솔직히 잘 모르겠어."
10024060-10 = "3;루미;02;현룡문이라면 확실히 그런 것이 있다고 이야기하겠지."
10024060-11 = "3;루미;99;미나가 유독 이번 '덫'에 찬성한 것도, 그런 의미에서 보면 납득할 만하고.\n#3;em;[...]"
10024060-12 = "[s1] \"루미는 뭔가 관록 있어 보이는 느낌이라,\"\n[s2] \"그런 건 마음에 두지 않을 줄 알았어.\""
10024060-13 = "#wait;100"
10024060-14 = "#wait;100"
10024060-15 = "3;루미;03;하하하. 무슨 소리야, 선생님.\n#3;em;[재잘]"
10024060-16 = "3;루미;02;어쩌다 회장 같은 걸 하고 있긴 하지만, 난 요리사야."
10024060-17 = "3;루미;99;그렇네…… 할 수 있다면 그냥, 아무 생각 없이 요리만 하고 싶어."
10024060-18 = "3;루미;00;요리는 정직하잖아? 수고를 들인 만큼 맛있어지고, 연구를 한 만큼 가능성이 생겨."
10024060-19 = "3;루미;01;그걸 손님들에게 대접하고, 맛있다는 반응을 얻는 거지."
10024060-20 = "3;루미;07;요리사로서의 보람이란, 대충 그런 거야.\n#3;em;[반짝]\n#3;closeup"
10024060-21 = "[s] \"회장으로서의 보람은?\""
10024060-22 = "3;루미;99……"
10024060-23 = "3;루미;01;선생님도 어른이니 어느 정도는 알겠지만."
10024060-24 = "3;루미;06;책임자라는 건…… 버겁지.\n#3;stiff"
10024060-25 = "3;루미;05;내 선택과 결정만으로, 많은 학생들이 그 결과에 영향을 받게 된단 말이지.\n#3;em;[!]"
10024060-26 = "3;루미;06;나라고 해서 그 학생들보다 특출나게 낫거나 한 건 아닌데도,"
10024060-27 = "3;루미;06;그 학생들은…… 나 말고는 의지할 대상이 없는 거야."
10024060-28 = "[s] \"이해해.\""
10024060-29 = "3;루미;06;집단이란 건 골치 아파.\n#3;em;[속상함]\n#3;stiff"
10024060-30 = "3;루미;02;사람도 아닌 것이, 가끔 사람처럼 행동한단 말이야.\n#3;m2"
10024060-31 = "3;루미;06;토라지고, 화내고, 싫어하고, 가끔은…… 무언가를 미워하고.\n#3;m1"
10024060-32 = "3;루미;99;그걸 잘 어르고 달래서, 간신히 <짠, 아무 일도 없었습니다> 같은 결과를 만들어 가는 거지.\n#3;m3"
10024060-33 = "3;루미;00;어떻게든 그런 결과를 만들어 내면…… 글쎄. 그게 보람이라고 해야 하겠군."
10024060-34 = "3;루미;06;<이번에도 무사히 넘겼다. 다음은 솔직히 자신 없지만.>같은 거라고 할까."
10024060-35 = "3;루미;01;이야기해놓고 보니, 보람이라기보다는 안도감 같은 거겠군.\n#3;em;[...]"

10024060-37 = "3;루미;04;그런 거 아니라니까, 조금 전부터 왜 그러는 거야.\n#3;em;[///]"
10024060-38 = "3;루미;02;아, 선생님은 그건가? 주위 사람들을 일부러 치켜세워서, 일을 하도록 만드는 타입."
10024060-39 = "3;루미;01;이거, 만만히 볼 수 없겠는데. 물론 효과적으로 사람을 다루는 방법 중 하나이긴 하지만."
10024060-40 = "3;루미;03;너무 과하게 치켜세우면, 나중에 좀 귀찮은 일을 당하게 될 거라고?\n#3;closeup\n#3;em;[?]"
10024060-41 = "[s] \"그건 경험담이야?\""
10024060-42 = "3;루미;00;음. 어떨까. 그 이상은 비밀이라고 하지."

[translation]
10024060-1 = "Episode 6;Open Hearts, Candid Words"
10024060-2 = "Shanhaijing Streets"
10024060-4 = "Sensei, I wanted to thank you for bringing our instructor friend up to speed."
10024060-5 = "[s] \"Well, it was my idea. It's only fair I explain it to her.\""
10024060-6 = "..."
10024060-7 = "Do you believe in a greater good, Sensei?"
10024060-8 = "Like, is it okay to sacrifice other people in the name of a cause? The ends justify the means?"
10024060-9 = "I...don't know how I'd answer that, myself."
10024060-10 = "Genryumon are true believers to their core."
10024060-11 = "Mina volunteering for her role in this trap makes sense, given her background."
10024060-12 = "[s1] \"You seem like a pretty seasoned person.\"\n[s2] \"I take it you prefer the 'lesser okay' to the 'greater good'?\""
10024060-15 = "Hahaha! Sensei, the things you say sometimes..."
10024060-16 = "Somehow, I ended up in the president's seat, but I'm still a cook at heart."
10024060-17 = "If I could, I'd just cook all day, without worrying about investigations or academy politics."
10024060-18 = "Food is honest. The more you work at it, the better it tastes. The more you learn, the more possibilities open up."
10024060-19 = "And then you serve the dishes you poured your heart into, and your customers give their compliments to the chef."
10024060-20 = "That's what lies at the heart of a cook, basically."
10024060-21 = "[s] \"And what about the heart of a president?\""
10024060-22 = "..."
10024060-23 = "I'm sure you know this better than I do, but..."
10024060-24 = "...being in charge... It's a burden."
10024060-25 = "My every decision affects so many students."
10024060-26 = "I'm not any better than them. Not in any way."
10024060-27 = "But those students... I'm the only person they can lean on."
10024060-28 = "[s] \"I understand the feeling.\""
10024060-29 = "Groups are so annoying!"
10024060-30 = "They aren't a person, but sometimes they act like they are."
10024060-31 = "Disappointment... Anger... Sometimes they even hate."
10024060-32 = "And I have to appease them and calm them down, and then make it seem like nothing happened and it was no big deal."
10024060-33 = "When I somehow manage to do all that... I guess that's the rewarding part of being president."
10024060-34 = "But it's more like... \"I've smoothed things over this time, but we'll see how it goes next time.\""
10024060-35 = "So rewarding isn't even the right word, is it? It's more like a fleeting sense of relief..."
10024060-36 = "[s] \"That's very insightful of you.\""
10024060-37 = "No, it's not. What's wrong with you?"
10024060-38 = "Are you one of those people? Always complimenting others, tricking them into giving you things?"
10024060-39 = "I'm on to your game, Sensei. Although...it is an effective strategy..."
10024060-40 = "Just don't overdo it. You could get into a whole lot of trouble that way."
10024060-41 = "[s] \"You have firsthand experience with that, huh?\""
10024060-42 = "Hmm. Well... No comment."
10024060-43 = "What's with the look? Everyone's got a secret or two."
10024060-47 = "...But this really is strange. I've never told anyone that before."
10024060-48 = "[s] \"It's a teacher's job to listen to their students.\""
10024060-49 = "..."
10024060-50 = "Say, Sensei..."
10024060-55 = "If you say it like that...you might give me the wrong impression."
10024060-56 = "Anyway, it's time. I should meet with our instructor friend."
10024060-57 = "[s] \"Please keep her safe.\""
10024060-58 = "Don't worry. The fate of the Promenade rests on this—no one will so much as touch a hair on her head."
10024060-59 = "Goodness. This sure is a lot of trouble just to deliver a box..."
10024060-60 = "[s] \"But everything comes down to that box, doesn't it?\""
10024060-61 = "Yes, yes. I'll be back soon."
10024060-66 = "After Rumi disappeared into the distance..."
10024060-70 = "...I was joined by a Genryumon student with a mysterious air about her."
10024060-75 = "[ns3] \"How can I help you?\"\n[ns4] \"Are you here for Mina?\""
10024060-78 = "Where is everyone?"
10024060-79 = "[s5] \"Oh, here. There. About.\"\n[s6] \"Would you like me to take a message?\""
10024060-85 = "No... I just needed to ensure that we're alone."
10024060-91 = "Hm. It's harder to sneak out on my own than in the old days.  "
10024060-96 = "[ns] \"Kisaki?!\""
10024060-97 = "Oh, are you surprised?"
10024060-98 = "As the president of Genryumon, it's only natural that I'd want to check on things."
10024060-99 = "Did I really have to come in person?"
10024060-100 = "There are some things I can't see from the big seat."
10024060-101 = "Everyone has their own perspective. If you forget that, you start missing things."
10024060-102 = "So... How is it going? I want to hear your perspective."
10024060-108 = "I brought her up to speed on our investigation."
10024060-111 = "Understood."
10024060-112 = "I made the right call, putting Mina by your side."
10024060-113 = "She may not seem it, but she's got drive."
10024060-114 = "[s] \"So you actually did send her to meet us on Kunlun Mountain?\""
10024060-115 = "Correct. She was there by my order."
10024060-116 = "What if you four couldn't get along? I'd already worked it out."
10024060-117 = "Mina is strong, but she can't beat two Black Tortoise Promenade members alone."
10024060-118 = "And those two wouldn't seriously harm her in front of you."
10024060-119 = "Mina and the Black Tortoise Promenade would have to form an uneasy alliance."
10024060-120 = "With you, Sensei, holding the whole thing together."
10024060-121 = "Was there an error in my prediction?"
10024060-125 = "[ns] \"You got it exactly right, Kisaki. Impressive.\""
10024060-126 = "There's no need to compliment me. This is merely something I must do as the president of Genryumon."
10024060-127 = "To be honest, it's a title I could do without..."
10024060-131 = "No. Forget I said that."
10024060-132 = "[s] \"So why did you want Mina in an alliance with the Promenade, anyway?\""
10024060-133 = "..."
10024060-134 = "Some things are only clear when you see them up close."
10024060-135 = "Mina is honorable and diligent, but she has a narrow perspective. "
10024060-136 = "If she could learn to be flexible, she'd see a much wider world."
10024060-137 = "I think you understand me. You have an eye for character."
10024060-138 = "After everything is over, would you care to stay in Shanhaijing a bit longer? I'd take care of you personally."
10024060-139 = "[s] \"That's a kind offer, but I have to decline.\""
10024060-140 = "Heh heh. That's a shame."
10024060-141 = "Now, Rumi... She's one piece that I can't move about the board as I wish."
10024060-142 = "I guess it should bother me, but I don't think she'd care much."
10024060-143 = "And she wouldn't expect me to listen to what she has to say, either."
10024060-144 = "[s] \"You two have a history.\""
10024060-145 = "We have a...bothersome relationship. I considered working with her, once, but..."
10024060-146 = "There's no point talking about this. Forget I said anything."
10024060-147 = "[s] \"Well, you've seen the situation for yourself. What do you think?\""
10024060-148 = "..."
10024060-149 = "I'm not sure it's a good idea for me to tell you what I really think."
10024060-150 = "Oh, you think I ought to tell Rumi, instead?"
10024060-151 = "Ha..."
10024060-152 = "I don't generally like meddlers. But you... You're different, Sensei."
10024060-153 = "The truth is, it doesn't really matter what your investigation here turns up."
10024060-154 = "Don't act so surprised. Situations like this are commonplace in my world."
10024060-159 = "If the Black Tortoise Promenade is behind the smuggling, we shut them down for it. Easy."
10024060-163 = "And if they're innocent, it's simple enough to frame them for this or something else, and keep them in check."
10024060-167 = "Either way, it works out for Genryumon."
10024060-170 = "[ns] \"That may be how things work here, but you don't like it.\""
10024060-173 = "...Why do you say that?"
10024060-174 = "[s] \"If you did, you wouldn't have put on that disguise and come out all this way.\""
10024060-175 = "Heh... You saw right through me, Sensei."
10024060-176 = "Genryumon...is Genryumon."
10024060-177 = "I may be the president, but I cannot simply bend Genryumon to my will."
10024060-178 = "[s] \"You're working hard, Kisaki.\""
10024060-182 = "...How's that?"
10024060-183 = "Do you...talk to everyone like this? Or does that make you Schale's Sensei?"
10024060-184 = "Did you make me mad? It takes more than that to shake the president of Genryumon."
10024060-185 = "In fact..."
10024060-192 = "[ns] \"Whoa!\""
10024060-193 = "Kisaki leaped onto my back without warning."
10024060-195 = "There may be things only you can see with your perspective, but there are some things only I see, as well."
10024060-196 = "So, this is Sensei's perspective..."
10024060-197 = "..."
10024060-200 = "[ns] \"You don't really think Rumi is involved in this, do you?\""
10024060-201 = "Rumi knows how to manage her risks. She would never put herself in the middle of such dangerous business."
10024060-202 = "If the Promenade is involved, it will be one of her lower-ranked members. Someone below her notice."
10024060-203 = "Someone who cares only about lining her own pocket."
10024060-204 = "[s] \"I agree.\""
10024060-205 = "..."
10024060-212 = "I have a request for you, Sensei."
10024060-213 = "Protect Rumi and take care of Mina. And Reijo, while you're at it."
10024060-214 = "At least until the truth is revealed."
10024060-215 = "If the Black Tortoise Promenade really is at the center of this, I'll make Rumi answer for it myself."
10024060-216 = "But until then, innocent girls shouldn't have to suffer for it."
10024060-217 = "They really require a lot of care. To think that even the president of Genryumon herself had to come out here..."
10024060-218 = "[s] \"If I didn't know any better, I'd say you care about Rumi and the Black Tortoise Promenade.\""
10024060-219 = "...Maybe so."
10024060-223 = "The Black Tortoise Promenade is Shanhaijing. So is Genryumon."
10024060-224 = "That's all I can say."

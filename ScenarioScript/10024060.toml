[translation]
10024060-1 = "第6話;開誠布公：袒露真心"
10024060-2 = "山海經的街道"
10024060-4 = "啊，老師。#n謝謝你替我們拜託心菜醬。"
10024060-5 = "[s]「畢竟是我的提議呀。」"
10024060-6 = "……"
10024060-7 = "老師認為在大義面前勢必伴隨著犧牲嗎？"
10024060-8 = "為了成就偉大的意志，即使出現犧牲也莫可奈何……#n或是，只要能得到結果就行了之類的……"
10024060-9 = "我的話……老實說我不太清楚。"
10024060-10 = "不過，如果是玄龍門……就算必須做出犧牲也會達成目的吧。"
10024060-11 = "老師提議要設下「圈套」時……#n美奈之所以會積極配合，我想也是出於這種想法吧。"
10024060-12 = "[s1]「畢竟瑠美擔任商會的會長……」\n[s2]「我還以為瑠美不會有煩惱呢。」"
10024060-15 = "哈哈，你在說什麼啊，老師。"
10024060-16 = "雖然是在因緣際會下當上了不符身分的會長，但我終究還是個料理人。"
10024060-17 = "所以……老實說，我真希望可以什麼都不想，全心致力於料理。"
10024060-18 = "料理很單純對吧？#n付出多少努力就有多少美味，越是努力研究就有越多可能性。"
10024060-19 = "而且，只要看見客人的反應，就能明白客人是多麼的高興。"
10024060-20 = "當廚師果然是件有意義的事呢。"
10024060-21 = "[s]「身為會長的工作呢……？」"
10024060-22 = "……"
10024060-23 = "老師是大人，應該也明白吧。"
10024060-24 = "責任越是增加，越是會被自己無法承擔的「選擇」所逼迫……"
10024060-25 = "我的選擇，將會影響到許多的學生。"
10024060-26 = "我並沒有比旁人優秀。"
10024060-27 = "然而……大家卻相信著我、依賴著我。"
10024060-28 = "[s]「嗯……」"
10024060-29 = "一旦大量的人聚在一起，就很可能會發生意想不到的事情對吧。"
10024060-30 = "每個人的影響雖然不大，不過那終究會成為巨大的意志。"
10024060-31 = "而這個契機，真的只是瑣碎的小事。#n不過，那將會逐漸逐漸地成為巨大的火種。"
10024060-32 = "身為會長的我，則必須得接納這一切。"
10024060-33 = "但是，即使順利度過了今天，也不知道明天又會發生什麼……"
10024060-34 = "只是獲得了能夠喘口氣的時間罷了。"
10024060-35 = "要將其稱之為有意義的事……好像有點困難呢。#n只有「幸好能順利解決」、「幫助到了其他人」的這種安心感。"
10024060-36 = "[s]「你一直都為了大家非常努力呢。」"
10024060-37 = "啊哈哈，就算誇獎我也得不到什麼好處的唷。"
10024060-38 = "還是老師是會故意吹捧他人，好讓他們甘願為你做事的人呢？"
10024060-39 = "這還真是不能大意呢。#n當然，這也沒什麼不好……"
10024060-40 = "不過如果對每個人都這麼說，遲早會有麻煩的哦？"
10024060-41 = "[s]「這是瑠美的經驗談嗎？」"
10024060-42 = "呵呵，這就不好說了。#n之後的事就是祕密囉。"
10024060-43 = "就算用那種眼神看我也會保密哦。#n每個人都有一兩個祕密對吧？"
10024060-47 = "……真神奇呢。#n這種心情，明明從來沒對任何人說過的。"
10024060-48 = "[s]「有煩惱的話，歡迎隨時找我商量哦。」"
10024060-49 = "……"
10024060-50 = "我說，老師。"
10024060-55 = "你這樣說……會讓我誤會的哦？"
10024060-56 = "……差不多到該去找心菜醬的時間了呢。"
10024060-57 = "[s]「拜託你囉，瑠美。」"
10024060-58 = "不用擔心。#n我以商會的名譽發誓，會保護心菜醬的安全。"
10024060-59 = "雖然這麼說，也不過是請他送個箱子而已。"
10024060-60 = "[s]「不過現在，那將會是關鍵對吧？」"
10024060-61 = "嗯……說的也是。#n那麼，我這就出發囉。"
10024060-66 = "（瑠美的背影逐漸從視野中消失……）"
10024060-70 = "（此時從某處出現了一名帶著神祕氛圍的玄龍門學生）"
10024060-75 = "[ns3]「你是玄龍門的孩子對吧？」\n[ns4]「是來找美奈的嗎？」"
10024060-78 = "其他人呢？"
10024060-79 = "[s5]「有點事要辦，我想短時間內不會回來。」\n[s6]「有什麼話要轉達的話可以告訴我哦。」"
10024060-85 = "不……其他人都不在此處，反倒正好。"
10024060-91 = "呼，要偷溜出來亦不輕鬆啊。  "
10024060-96 = "[ns]「妃姬！？」"
10024060-97 = "何必如此訝異。"
10024060-98 = "僅是作為門主，前來視察事情進展罷了。"
10024060-99 = "……為何特地親自到場是嗎？"
10024060-100 = "若是坐在椅子上，將會有無從觀察的事物啊。"
10024060-101 = "眾人皆有各自的觀點。#n正因如此，若未能自多樣的角度透析事態，有時將導致判斷的錯誤。"
10024060-102 = "那麼……情況如何？#n妾身想聽聽汝之所見所聞。"
10024060-108 = "（向妃姬說明了目前的情況）"
10024060-111 = "是這樣嗎……大致清楚了。"
10024060-112 = "看來妾身的判斷是正確的啊。"
10024060-113 = "美奈雖然優秀，卻也有容易衝動的一面。"
10024060-114 = "[s]「也就是說，派美奈到崑崙山的是……」"
10024060-115 = "啊啊，沒錯──正是妾身的指示。"
10024060-116 = "雖亦曾顧慮是否將引起衝突。#n暫且還順利吧？"
10024060-117 = "美奈的實力確有其物，然仍不足同時與二人為敵。"
10024060-118 = "妾身亦不認為瑠美將親自出手。"
10024060-119 = "如此一來，或可維持均衡。"
10024060-120 = "此外……妾身相信既然汝也在場，勢必不會引發爭端。"
10024060-121 = "妾身的判斷──如何？"
10024060-125 = "[ns]「居然想得這麼深遠……」"
10024060-126 = "此等程度之事，若無從看透則無以擔任門主。"
10024060-127 = "雖說門主之座亦不足以眷戀……"
10024060-131 = "不，此為妾身失言。#n還請忘了吧。"
10024060-132 = "[s]「雙方的合作也在妃姬的計畫之內嗎？」"
10024060-133 = "……"
10024060-134 = "美奈雖為人正直，美中不足的是缺乏進一步的遠見。"
10024060-135 = "某些事物若不親身體會將無從理解。"
10024060-136 = "若能略為拓展其視野──其觀點亦能更加柔軟吧。"
10024060-137 = "汝亦已察覺是嗎？#n果然具備識人之明。"
10024060-138 = "啊啊，對了──事情結束後，是否願意留在山海經呢？#n汝若有意如此，妾身會做好安排。"
10024060-139 = "[s]「謝謝，你的好意我心領了。」"
10024060-140 = "咯呵呵，這樣啊。實屬遺憾。"
10024060-141 = "瑠美……仍是老樣子，不會如妾身所願啊。"
10024060-142 = "……不，無須在意。#n呵呵，事到如今若瑠美老實聽從妾身的指示，妾身反倒會感到驚訝。"
10024060-143 = "瑠美他，想必亦不會對妾身抱有期待吧。"
10024060-144 = "[s]「你們認識很久了對吧？」"
10024060-145 = "只是孽緣罷了。#n雖曾有和瑠美一同邁向的未來……"
10024060-146 = "……不，沒什麼。#n請當作沒聽見吧。"
10024060-147 = "[s]「那麼，跟我聊過之後有明白什麼嗎？」"
10024060-148 = "……"
10024060-149 = "是否該在此傳達妾身所想，真令人煩惱啊。"
10024060-150 = "不過……如汝所言，這或許也能算是為了瑠美。"
10024060-151 = "……呵呵。"
10024060-152 = "妾身就特別告知汝一人吧。"
10024060-153 = "自始至終──玄龍門皆對事情的真相毫無興趣。"
10024060-154 = "不必感到訝異。#n不僅限於本次，往往皆是如此。"
10024060-159 = "若是玄武商會參與「萬年蔘」的走私一事，事情就單純了。#n抑制其規模及影響力，乃至解散亦能做到。"
10024060-163 = "即便玄武商會並未參與走私，那也無關緊要。#n玄龍門將能隨時保持名為監視的牽制。"
10024060-167 = "無論如何……對「玄龍門」來說都不是壞事。#n不是嗎？"
10024060-170 = "[ns]「不過，妃姬的想法並不一樣對吧？」"
10024060-173 = "──何以見得？"
10024060-174 = "[s]「否則你也不必特意變裝來到這裡了。」"
10024060-175 = "呵呵……汝有雙雪亮的雙眼呢。"
10024060-176 = "玄龍門……是屬於「玄龍門」的。"
10024060-177 = "即使身為門主，亦無法違背玄龍門的意志。"
10024060-178 = "[s]「妃姬的努力，我都有看見哦。」"
10024060-182 = "……任憑汝想像吧。"
10024060-183 = "汝，莫非是對任何人都這麼說吧？#n不……或許正因汝是如此，才能擔任夏萊的老師也說不定。"
10024060-184 = "妾身並未動怒，無須擔心。#n汝真的認為身為玄龍門門主之人，內心會因此等事而有所動搖嗎？"
10024060-185 = "然而相對的……"
10024060-192 = "[ns]「嗚哇！？」"
10024060-193 = "（妃姬突然趴到了背上）"
10024060-195 = "如同某些事物因為是老師而得以看見，亦有因為是妾身才得以看見的事物。"
10024060-196 = "這就是大人的……不，老師的視野嗎。"
10024060-197 = "……"
10024060-200 = "[ns]「妃姬知道瑠美跟這件事無關吧？」"
10024060-201 = "瑠美他──比任何人都在乎商會。#n勢必不可能插手危險的交易。"
10024060-202 = "即便此事與商會有關……"
10024060-203 = "也僅不過是受金錢蒙蔽的下游之人所為吧。"
10024060-204 = "[s]「我也是這麼想的。」"
10024060-205 = "……"
10024060-212 = "妾身有事相求，老師。"
10024060-213 = "請守護瑠美吧，身邊那位名為令女的孩子也是。#n……順帶一提，可否將美奈也託付給汝呢？"
10024060-214 = "至少──在事情的真相水落石出之前。"
10024060-215 = "若玄武商會確實涉入此事……屆時妾身將親自出手。"
10024060-216 = "然而，令瑠美他們背負莫須有的罪名，亦非妾身本意。"
10024060-217 = "真是群讓人操心的傢伙。#n居然讓門主不得不親自採取行動。"
10024060-218 = "[s]「妃姬是怎麼看待瑠美……看待玄武商會的呢？」"
10024060-219 = "……唔呣。"
10024060-223 = "玄武商會亦是山海經的一部分。#n就像玄龍門一樣。"
10024060-224 = "妾身能說的，僅止於此。"

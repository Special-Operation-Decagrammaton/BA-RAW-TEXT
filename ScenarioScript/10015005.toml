[translation]
10015005-1 = "序幕;大運動會前夕"
10015005-5 = "[ruby=晄輪大祭]奇普托斯大運動會[/ruby]……#n是以「健全的精神寄宿於健全的肉體」為理念，透過運動使學生們成長的活動。"
10015005-7 = "學生們將放下武器，和不同學園相互切磋，光明正大地競賽。"
10015005-8 = "此活動自古便流傳至今，是學園都市的歷史象徵。#n每2年由各學園輪流舉辦，在維持奇普托斯的和平上扮演了重要的角色。"
10015005-15 = "就算是關係惡劣的學園，也會在大運動會期間放下武器、停止敵對行為，#n這是奇普托斯長久以來的不成文規定……"
10015005-19 = "自從聯邦學生會長失蹤後，相繼發生了多起事件，#n讓人不禁憂心是否能正常舉辦這次的大運動會。"
10015005-23 = "……幸好，多虧了夏萊及各校學生的幫助，#n這次的大運動會才得以順利舉辦。"
10015005-28 = "所以，今年的奇普托斯大運動會──"
10015005-34 = "將由我們千年科學學園負責舉辦～"
10015005-35 = "[s1]「哇啊──！」\n[s2]「恭喜──！」"
10015005-38 = "……首先，謝謝老師在收到這麼緊急的要求後還願意遠道而來。"
10015005-39 = "……還有乃愛，前言太長了！"
10015005-40 = "前面那段冗長的說明根本就沒必要吧？"
10015005-41 = "我只是引用了這次大運動會的開幕詞而已唷？"
10015005-42 = "如果刪減內容，就會使原本的意義被扭曲和褪色吧。"
10015005-43 = "若是在傳達報告的過程中刻意加以省略，就不能算是確實完成「書記」的任務。"
10015005-44 = "[s]「……書記？」"
10015005-45 = "這麼說來，這是我第一次向老師問好呢。"
10015005-46 = "我的名字叫做乃愛。#n是千年科學學園學生會──「研討會」的書記。"
10015005-47 = "請多多指教唷，[USERNAME]老師。"
10015005-48 = "[s]「我也請你多多指教。」"
10015005-49 = "感覺你今天的情緒好像特別激昂……"
10015005-50 = "總之自我介紹就先說到這裡，快點進入正題吧。"
10015005-51 = "……優香醬的心情看起來比平常還糟呢。"
10015005-52 = "我只是以研討會成員的身分，禮貌地向老師打招呼……優香醬為何因此不滿呢？"
10015005-53 = "還是說老師對我有好感會對優香醬造成困擾……"
10015005-58 = "啊啊……難不成是在「忌妒」嗎？"
10015005-60 = "才，才不是，我哪有不高興啊！？"
10015005-61 = "再說，我是要忌妒什麼！"
10015005-62 = "好了，快繼續說明吧！#n老師也在等著呢！"
10015005-63 = "是是。#n那我就接著說明。"
10015005-64 = "就像剛才提過的一樣，奇普托斯大運動會「晄輪大祭」──#n是每2年舉辦一次的奇普托斯大型慶典。"
10015005-65 = "因此，這個大運動會──也是主辦的學園向外展現實力的絕佳機會。"
10015005-67 = "畢竟奇普托斯的所有學生集中在同一所學園……這樣的機會並不多。"
10015005-68 = "只要在這段期間累積好的印象，對學院的長期運作能有莫大的幫助。"
10015005-69 = "像是「招收新生」以及「向業者取得學園需要的物資」之類的……"
10015005-71 = "而我們千年科學學園，作為擁有奇普托斯最尖端科學技術的專業學校，#n將透過大運動會展現我們的先進技術。"
10015005-72 = "例如能自動引導最佳路徑的智慧導航系統，#n或是能避免發生誤判，配備有超高速攝影機的標靶等等……"
10015005-73 = "要說千年的所有社團都為本次大運動會卯足了全力也不為過。"
10015005-75 = "而今天──大運動會前夕，我們研討會本應檢查器材與裝備並進行彩排，然而……"
10015005-76 = "[s]「……出了什麼問題嗎？」"
10015005-77 = "是的……雖然遺憾，但確實如此。"
10015005-84 = "距今12小時前，「新材料開發部」的部室……發生了一點「小」爆炸。"
10015005-85 = "大概又是混合了什麼奇怪的易燃材料才發生意外吧……"
10015005-86 = "幸虧沒有人受傷……#n但原定要在大運動會上使用的應援機器人受到了損傷，處於必須緊急修理的狀態。"
10015005-88 = "接著彷彿像事先商量好了一般，#n陸續接獲了多起運動場的體育器材遭竊、部分設施遭到破壞的通報……"
10015005-89 = "[s3]「那還真是……太糟糕了呢。」\n[s4]「這樣的話，大會該不會要延期吧……？」"
10015005-92 = "不，雖然多少影響了彩排的預定計畫，但問題並沒有嚴重到需要將大會延期。"
10015005-93 = "機器人的修理與器材的緊急調度並不是那麼困難。"
10015005-94 = "但我希望能在線索消失之前，查出犯下竊案的犯人……"
10015005-95 = "然而大運動會迫在眉睫，研討會實在沒有餘裕能進行調查。"
10015005-96 = "所以……如果可以的話，能請老師幫忙調查這次事件的犯人嗎？"
10015005-97 = "[s5]「這件事倒是不難……」\n[s6]「不過不需要連其他事一起幫忙嗎？」"
10015005-100 = "嗯，沒問題的。"
10015005-101 = "大運動會的準備目前正按照計畫完美地進行中！"
10015005-102 = "雖然出現了一些瑣碎的小事件……#n但還在誤差範圍之內！"
10015005-103 = "只要能在300分鐘內修好應援機器人的話，#n就能勉強確保來回實行委員會辦公室的時間……"
10015005-104 = "根據計算，只要算出新增的修理費用、整理選手名單並發送給相關學校……#n最晚也能在開幕式舉行前1850秒完成所有準備……"
10015005-105 = "[s]（完全感覺不出哪裡「沒問題」……）"
10015005-111 = "優香醬，我拿紅茶來了。"
10015005-112 = "……怎，怎麼這麼突然？"
10015005-113 = "優香醬每次熬夜工作的時候，都會在這個時間點喝一杯紅茶吧？"
10015005-114 = "感覺今天也有這個必要，所以事先做了準備。"
10015005-115 = "是這樣沒錯……但乃愛突然變得這麼溫柔，總覺得有點可怕。"
10015005-116 = "……不過還是謝啦，喝完之後就馬上開工吧。"
10015005-124 = "……嗯？味道有點奇怪耶……這是紅茶嗎？"
10015005-125 = "體內的咖啡因不僅沒提振精神，反而讓身體感到一陣慵懶……"
10015005-135 = "……果然不出所料。"
10015005-136 = "優香醬現在需要的並不是完美的計算，而是休息。"
10015005-137 = "[s]「你剛才讓他喝了什麼！？」"
10015005-138 = "不需要擔心。#n剛才優香醬喝的只是香草茶罷了。"
10015005-139 = "這個香草茶有舒緩身體緊張和幫助睡眠的效果。"
10015005-140 = "不過居然一鬆懈下來就昏睡過去……"
10015005-141 = "看來優香醬真的是太逞強了。"
10015005-142 = "[s]「那大運動會的準備……」"
10015005-146 = "老師……我明白這個請求很厚顏無恥，但還是拜託你了。"
10015005-147 = "為了讓這次的大運動會順利舉辦，能請你協助我們「千年學園」嗎？"
10015005-148 = "[s]「你的意思是要做剛才優香拜託的工作以外的事嗎……？」"
10015005-149 = "是的。因為運動場的竊案可以交由女武神警察學園處理。"
10015005-150 = "礙於面子問題，優香醬似乎認為不該拜託其他學校幫忙解決大運動會的問題……"
10015005-151 = "但如同先前所說，「大運動會」是由奇普托斯所有學生共同成就、屬於大家的慶典。"
10015005-152 = "在那之中，也包含了優香醬。"
10015005-153 = "倘若比任何人都期待大運動會的優香醬因為過勞而無法享受慶典……#n那實在是太令人悲傷了。"
10015005-154 = "身為優香醬的朋友，我無法坐視不管。"
10015005-155 = "[s7]「如果是這樣的話。」\n[s8]「我非常樂意幫忙。」"
10015005-158 = "呵呵……謝謝你，老師。"
10015005-159 = "那麼，在優香醬醒來之前……我們去找其他能幫忙的學生吧？"

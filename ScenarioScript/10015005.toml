10015005-102 = "3;유우카;05;물론 사소한 불상사로 인해 약간의 차질이 생기긴 했지만…… 아직은 오차 범위 안이에요!\n#3;em;[!]\n#3;jump"
10015005-103 = "3;유우카;05;응원 로봇의 수리를 300분 이내로 끝마친다면, 아슬아슬하게 실행위원회 사무실에 다녀올 시간은 확보할 수 있으니까……\n#3;hophop\n#3;m4"
10015005-104 = "3;유우카;05;새롭게 추가된 수리 비용을 추산하고, 선수 명단을 모두 정리해서 관련교에 발송하면 아무리 늦어도 개회식 시작 1850초 전까지는 모든 준비를 마칠 수 있다는 계산이……\n#3;em;[...]\n#3;m3"

[translation]
10015005-1 = "บทเริ่มต้น;คืนก่อนงานมหกรรมแข่งขันกีฬา"
10015005-5 = "[ruby=ฮาโลเฟสติวัล]งานมหกรรมแข่งขันกีฬาคิโวทอส[/ruby]... กิจกรรมที่ทำให้นักเรียนสามัคคีกลมเกลียวกัน ด้วยการแข่งขันกีฬา"
10015005-7 = "เหล่านักเรียนต่างวางอาวุธและมาร่วมมือกันโดยไม่แบ่งแยกสถาบันเพื่อจัดงานมหกรรมแห่งสันติภาพ ด้วยการแข่งขันกีฬาอย่างโปร่งใส"
10015005-8 = "กิจกรรมนี้ดำเนินมาอย่างยาวนานควบคู่มากับประวัติศาสตร์ของเมืองแห่งการศึกษา ทุกๆ 2 ปี แต่ละสถาบันจะผลัดกันเป็นเจ้าภาพจัดกิจกรรมนี้เพื่อรักษาความสงบสุขในคิโวทอสค่ะ"
10015005-15 = "แม้บางสถาบันจะไม่ได้มีความสัมพันธ์ที่แน่นแฟ้น แต่ในช่วงงานมหกรรมแข่งขันกีฬา เหล่านักเรียนจะ#nวางอาวุธและหยุดการกระทำที่เป็นปฏิปักษ์ต่อกัน นั่นคือประเพณีที่มีมาอย่างยาวนานในคิโวทอสค่ะ"
10015005-19 = "ในครั้งนี้ การหายตัวไปของประธานองค์การนักเรียนทำให้เกิดเหตุการณ์ไม่คาดคิดขึ้นอย่างต่อเนื่อง จึงได้มีการปรึกษากันว่าควรจะจัดงานมหกรรมแข่งขันกีฬาหรือไม่ค่ะ"
10015005-23 = "...แต่ก็โชคดีที่เราได้รับความช่วยเหลือจากชาเล่ต์และนักเรียนจากหลายสถาบัน เลยสามารถจัดงานมหกรรมแข่งขันกีฬาครั้งนี้ได้โดยไม่มีปัญหาค่ะ"
10015005-28 = "งานมหกรรมแข่งขันกีฬาแห่งคิโวทอสในปีนี้..."
10015005-34 = "จะจัดขึ้นที่โรงเรียนวิทย์มิลเลเนียมของเราค่ะ~"
10015005-35 = "[s1] \"ว้าวว—\"\n[s2] \"ยินดีด้วยนะ—\""
10015005-38 = "...ถึงจะเป็นคำขอร้องที่กะทันหันไปสักหน่อยแต่ก็ยังอุตส่าห์มาช่วย ขอบคุณนะคะคุณครู"
10015005-39 = "...แต่ว่านะโนอา เธอบรรยายนานไปมั้ยน่ะ!"
10015005-40 = "ไม่เห็นต้องอธิบายยาวเหยียดขนาดนั้นเลยไม่ใช่เหรอ?"
10015005-41 = "ฉันก็แค่พูดตามคำกล่าวเปิดงานมหกรรมแข่งขันกีฬาครั้งนี้เท่านั้นเองนะคะ?"
10015005-42 = "ถ้าตัดคำหรือพูดแบบสรุปก็อาจจะทำให้ความหมายเดิมถูกบิดเบือนหรือถูกลดความสำคัญก็ได้นี่คะ"
10015005-43 = "ถ้าเราสื่อสารข้อความที่ได้รับมาได้ไม่ครบถ้วน ถ้าเป็นแบบนั้นฉันคงไม่เหลือความภาคภูมิใจในฐานะ 'เลขา' อีกแล้วละค่ะ"
10015005-44 = "[s] \"...เลขา?\""
10015005-45 = "จะว่าไปฉันเพิ่งมีโอกาสได้ทักทายคุณครูอย่างเป็นทางการเป็นครั้งแรกเลยนะคะ"
10015005-46 = "ฉันชื่อโนอาค่ะ เป็นเลขาของ <เซมิน่า> หรือก็คือสภานักเรียนของโรงเรียนวิทย์มิลเลเนียมค่ะ"
10015005-47 = "ฝากตัวด้วยนะคะ คุณครู [USERNAME]"
10015005-48 = "[s] \"อืม ฝากตัวด้วยนะ\""
10015005-49 = "ท่าทางดูตื่นเต้นกว่าปกติอีกนะนั่น..."
10015005-50 = "เอาละๆ เรื่องแนะนำตัวน่ะมันไม่สำคัญหรอก รีบเข้าเรื่องกันเถอะ"
10015005-51 = "เอ๋... ยูกะจัง? ดูจะหงุดหงิดกว่าปกติเลยนะคะ"
10015005-52 = "ฉันก็แค่ทักทายในฐานะสมาชิกของเซมิน่า เพราะฉันไม่อยากให้คุณครูจากชาเล่ต์มีความรู้สึกไม่ดีต่อ#nโรงเรียนของเราก็เท่านั้นเองค่ะ... ทำไมยูกะจังถึงไม่พอใจได้ล่ะคะเนี่ย?"
10015005-53 = "ถ้าการเชื่อมไมตรีของฉันกับคุณครูทำให้ยูกะจังรู้สึกไม่สบายใจ ก็หมายความว่า..."
10015005-58 = "...หึงเหรอคะ?"
10015005-60 = "หะ... หึงอะไรกัน ทำไมฉันถึงต้องหึงด้วยล่ะ?"
10015005-61 = "ฉันไม่ได้มีความคิดอะไรแบบนั้นเลยสักหน่อย?!"
10015005-62 = "หยุดพูดเรื่องแปลกๆ แล้วอธิบายต่อได้แล้ว! คุณครูรอฟังอยู่นะ"
10015005-63 = "ค่ะ ถ้าอย่างนั้นฉันจะอธิบายต่อเลยนะคะ"
10015005-64 = "อย่างที่พูดไปเมื่อก่อนหน้านี้ <ฮาโลเฟสติวัล> คือกิจกรรมใหญ่ที่จัดขึ้นทั่วคิโวทอสทุกๆ 2 ปีค่ะ"
10015005-65 = "เพราะฉะนั้นเลยถือว่าเป็นโอกาสดีของโรงเรียนที่รับหน้าที่เป็นเจ้าภาพงานมหกรรมแข่งขันกีฬา ที่จะแสดงความสามารถให้บุคคลภายนอกได้รับรู้ค่ะ"
10015005-67 = "การที่นักเรียนทั่วทั้งคิโวทอสจะมาให้ความสนใจกับโรงเรียนใดโรงเรียนหนึ่ง มันไม่ใช่โอกาสที่หาได้#nง่ายๆ เลยละค่ะ"
10015005-68 = "ถ้าเราสร้างความประทับใจดีๆ ได้ในช่วงเวลานี้ก็จะส่งผลดีอย่างมากต่อการบริหารโรงเรียนค่ะ"
10015005-69 = "ทั้งในเรื่องของการรับสมัครนักเรียน เรื่องการติดต่อธุรกิจกับผู้ที่จัดหาอุปกรณ์จำเป็นสำหรับ#nโรงเรียน..."
10015005-71 = "โรงเรียนวิทย์มิลเลเนียมของพวกเราเป็นโรงเรียนเฉพาะทางที่มีเทคโนโลยีชั้นสูงในคิโวทอส เราเลยตั้งใจที่จะแสดงให้เห็นถึงเทคโนโลยีสุดล้ำสมัยในงานมหกรรมแข่งขันกีฬาครั้งนี้ค่ะ"
10015005-72 = "ไม่ว่าจะเป็นระบบนำทางอัจฉริยะที่ช่วยแนะนำเส้นทางที่เหมาะสมที่สุดด้วยการวิเคราะห์แบบอัตโนมัติ หรือกล้องตรวจจับความเร็วสูงที่ติดตั้งไว้ที่เส้นชัยเพื่อป้องกันการตัดสินผิดพลาด..."
10015005-73 = "คงจะไม่เป็นการพูดเกินไปถ้าจะบอกว่าทุกชมรมในโรงเรียนมิลเลเนียมทุ่มเทแรงกายแรงใจ เพื่อเตรียมงานมหกรรมแข่งขันกีฬาครั้งนี้ค่ะ"
10015005-75 = "ดังนั้นวันนี้ก่อนที่จะเริ่มงานแข่งขันกีฬา ทางเซมิน่าจึงมีแผนที่จะตรวจสอบอุปกรณ์ต่างๆ และทำการ#nซักซ้อมขั้นตอนต่างๆ ด้วยค่ะ..."
10015005-76 = "[s] \"...มีอะไรผิดพลาดตรงไหนเหรอ?\""
10015005-77 = "ค่ะ น่าเสียดายนะคะ แต่ต้องบอกว่าใช่แล้วละค่ะ"
10015005-84 = "เมื่อ 12 ชั่วโมงก่อนหน้านี้ เกิดเหตุระเบิดขนาดย่อมที่ห้องชมรมของ <ชมรมพัฒนาวัสดุใหม่> น่ะค่ะ"
10015005-85 = "ที่มันระเบิดคงเป็นเพราะผสมวัตถุระเบิดอะไรแปลกๆ เข้าไปอีกนั่นละค่ะ..."
10015005-86 = "โชคดีไปที่ไม่มีใครได้รับบาดเจ็บ แต่หุ่นยนต์เชียร์สำหรับใช้ในงานมหกรรมแข่งขันกีฬาได้รับความเสีย#nหายจากแรงระเบิดและต้องทำการซ่อมแซมอย่างเร่งด่วนค่ะ"
10015005-88 = "แล้วหลังจากนั้นก็มีทั้งรายงานอุปกรณ์กีฬาถูกขโมย รายงานอุปกรณ์บางส่วนเสียหาย ถาโถมเข้ามา#nไม่หยุดหย่อนเลย..."
10015005-89 = "[s3] \"เป็นปัญหาใหญ่เลยสินะ\"\n[s4] \"แบบนี้ต้องเลื่อนงานกีฬาออกไปก่อนเหรอ?\""
10015005-92 = "ไม่หรอกค่ะ ถึงการซักซ้อมจะล่าช้าไปเล็กน้อย แต่ก็ไม่ใช่ปัญหาใหญ่ถึงขั้นที่ต้องเลื่อนงานกีฬาออกไป#nหรอกค่ะ"
10015005-93 = "แค่ต้องซ่อมหุ่นยนต์แล้วก็จัดหาอุปกรณ์มาอย่างเร่งด่วน ไม่ใช่เรื่องยากเท่าไรหรอกค่ะ"
10015005-94 = "เราต้องสืบหาคนร้ายให้เจอก่อนที่ร่องรอยการขโมยจะหายไป..."
10015005-95 = "แต่ว่าตอนนี้เซมิน่ากำลังเตรียมงานมหกรรมแข่งขันกีฬาก็เลยไม่มีเวลาไปตรวจสอบเรื่องนั้นน่ะค่ะ"
10015005-96 = "ถ้าคุณครูไม่ว่าอะไร ช่วยตามหาคนร้ายที่ก่อเรื่องนี้ให้หน่อยได้มั้ยคะ?"
10015005-97 = "[s5] \"ก็ไม่ใช่เรื่องยากหรอกนะ...\"\n[s6] \"ไม่มีเรื่องอื่นให้ครูช่วยอีกเหรอ?\""
10015005-100 = "คะ? เรื่องนั่นน่ะ ก็ต้องมีอยู่แล้วละค่ะ"
10015005-101 = "ตอนนี้พวกเรากำลังดำเนินการตามแผนการเตรียมงานมหกรรมแข่งขันกีฬากันอยู่ค่ะ"
10015005-102 = "ถึงแม้จะล่าช้าไปบ้างเพราะเกิดเหตุการณ์ที่ไม่คาดคิด... แต่ก็ยังอยู่ในขอบเขตที่รับมือได้ค่ะ!"
10015005-103 = "ถ้าซ่อมหุ่นยนต์เชียร์ให้เสร็จภายใน 300 นาทีได้ เราก็จะมีเวลาไปที่สำนักงานคณะกรรมการจัดงาน..."
10015005-104 = "จากนั้นก็ต้องประเมินค่าใช้จ่ายในการซ่อมที่เพิ่มขึ้นมา แล้วก็จัดการรายชื่อนักกีฬาทั้งหมดแล้วส่งไป#nยังโรงเรียนที่เกี่ยวข้อง อย่างช้าที่สุดก็น่าจะคำนวณและเตรียมการทุกอย่างประมาณ 1850 วินาทีก่อนที่#nงานจะเริ่มได้..."
10015005-105 = "[s] (มันไม่เป็นไรตรงไหนล่ะนั่น...)"
10015005-111 = "ยูกะจัง ฉันเอาชาแดงมาให้แล้วค่ะ"
10015005-112 = "เอ๋...? ทำไมจู่ๆ ถึงเอาชาแดงมาล่ะ?"
10015005-113 = "ก็เวลาทำงานล่วงเวลาแบบนี้ยูกะจังจะชอบดื่มชาแดงไม่ใช่เหรอคะ?"
10015005-114 = "แล้วคืนนี้ก็น่าจะยังอีกยาวไกล ฉันก็เลยเตรียมเอาไว้ล่วงหน้าน่ะค่ะ"
10015005-115 = "มันก็ใช่ แต่ว่า... พอโนอามาทำอะไรแบบนี้ให้ มันก็น่าสงสัยแปลกๆ นะ"
10015005-116 = "ยังไงก็ขอบคุณนะ ดื่มให้เสร็จแล้วทำงานต่อดีกว่า"
10015005-124 = "เอ๋...? รสชาติไม่เหมือนเดิมเลยแฮะ นี่มันใช่ชาแดงแน่เหรอ?"
10015005-125 = "ไม่ใช่ความรู้สึกสดชื่นจากการได้รับคาเฟอีน แต่รู้สึกเหมือนจะหลับเลย..."
10015005-135 = "เป็นอย่างที่คิดจริงด้วยนะคะ"
10015005-136 = "สิ่งที่ยูกะจังต้องการตอนนี้ไม่ใช่การคำนวณที่สมบูรณ์แบบ แต่เป็นการพักผ่อนต่างหากค่ะ"
10015005-137 = "[s] \"เมื่อกี๊เอาอะไรให้ดื่มน่ะ?!\""
10015005-138 = "ไม่ต้องกังวลไปหรอกค่ะ ฉันแค่เอาชาสมุนไพรธรรมดาๆ ให้ยูกะจังดื่มเท่านั้นค่ะ"
10015005-139 = "ชาสมุนไพรนี้จะช่วยให้ร่างกายผ่อนคลายแล้วก็ช่วยให้นอนหลับง่ายด้วยค่ะ"
10015005-140 = "แต่ไม่นึกเลยว่าพอร่างกายผ่อนคลายแล้วจะสลบไปเลยแบบนี้..."
10015005-141 = "ท่าทางยูกะจังจะกำลังฝืนตัวเองอยู่สินะคะ"
10015005-142 = "[s] \"แล้วแบบนี้จะเตรียมงานต่อยังไงล่ะ...?\""
10015005-146 = "คุณครูคะ อาจจะฟังดูแล้วเป็นคำขอที่น่าละอายใจไปสักหน่อย แต่ต้องขอให้คุณครูช่วยอีกครั้งค่ะ"
10015005-147 = "คงต้องขอให้คุณครูช่วยพวกเรา 'โรงเรียนมิลเลเนียม' จัดงานมหกรรมแข่งขันกีฬาให้ผ่านไปอย่าง#nเรียบร้อยด้วยเถอะนะคะ"
10015005-148 = "[s] \"เรื่องนั้นมันต่างจากที่ยูกะขอร้องเหรอ…?\""
10015005-149 = "ค่ะ เรื่องหาคนขโมยของในสนามกีฬา ให้นักเรียนของสถาบันฝึกตำรวจวัลคิรี่เป็นคนจัดการก็ได้นี่คะ"
10015005-150 = "ยูกะจังน่ะคงคิดว่าการขอความช่วยเหลือเรื่องปัญหาเกี่ยวกับงานมหกรรมแข่งขันกีฬาจากโรงเรียนอื่น เป็นเรื่องน่าอายน่ะค่ะ"
10015005-151 = "อย่างที่บอกไปค่ะว่า <งานมหกรรมแข่งขันกีฬา> เป็นงานเทศกาลที่จัดขึ้นเพื่อให้นักเรียนจากทั่วทั้ง#nคิโวทอสได้มาสนุกด้วยกัน เป็นงานเทศกาลของทุกคนค่ะ"
10015005-152 = "แล้วก็แน่นอนว่านักเรียนทั้งหมดนั่นก็ต้องรวมยูกะจังด้วยค่ะ"
10015005-153 = "ถ้ายูกะจังที่ตั้งตารองานมหกรรมแข่งขันกีฬานี้มากกว่าใครต้องมานั่งเครียดจนไม่ได้สนุกไปกับงาน#nเทศกาลแบบนี้ เรื่องนั้นมันก็น่าเศร้าเกินไปนะคะ"
10015005-154 = "ในฐานะคู่หูของยูกะจัง ฉันไม่อาจนิ่งเฉยปล่อยให้เป็นแบบนั้นได้หรอกค่ะ"
10015005-155 = "[s7] \"ถ้างั้นครูจะช่วยด้วยอีกแรงนะ\"\n[s8] \"ครูเองก็จะช่วยเต็มที่เลย\""

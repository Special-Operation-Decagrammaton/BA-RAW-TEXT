[translation]
10015005-1 = "Prologue;A Field Day's Eve"
10015005-5 = "The Kivotos Halo Festival... A field day that tests the limits of the students' physical abilities."
10015005-7 = "It is a day of harmony. Students set aside their weapons and academic affiliations to come together in the spirit of friendly competition."
10015005-8 = "The Halo Festival is a biennial event each academy hosts in turn. It's a very important, long-held tradition that helps maintain good relations between the schools."
10015005-15 = "There is a tacit agreement between even the fiercest of rivals to set aside hostilities for this one, special day."
10015005-19 = "Obviously, the state of Kivotos has been...tumultuous since the General Student Council president vanished, and there were rumblings that this year's Halo Festival would be canceled."
10015005-23 = "But the students of Kivotos and Schale itself banded together to make the festival happen!"
10015005-28 = "And this year's Halo Festival..."
10015005-34 = "...will be hosted by none other than Millennium Science School!"
10015005-35 = "[s1] \"Wow!\"\n[s2] \"Congrats!\""
10015005-38 = "Yes, it's an honor. Thanks for rushing over on such short notice, Sensei."
10015005-39 = "More importantly, Noa."
10015005-40 = "Was that long-winded explanation really necessary?"
10015005-41 = "What do you mean? It was a direct quote from the opening address."
10015005-42 = "Changing even one word or, worse, summarizing blurs the original intent."
10015005-43 = "A true scribe would never change, omit, or otherwise mar the source text."
10015005-44 = "[s] \"...A scribe?\""
10015005-45 = "Ah, you're right. We haven't formally met, Sensei."
10015005-46 = "My name is Noa. I'm Seminar's secretary and dedicated scribe of Millennium Science School."
10015005-47 = "It's nice to meet you, [USERNAME] Sensei."
10015005-48 = "[s] \"It's nice to meet you too, Noa.\""
10015005-49 = "You seem way too excited, even for you."
10015005-50 = "Ugh. Let's just get back to the topic."
10015005-51 = "Is there something wrong, Yuuka~?"
10015005-52 = "All I did was greet our dearest Sensei and make sure to leave a good impression on them. Now, why would that make Yuuka mad?"
10015005-53 = "Truly, why would my kindness towards Sensei be so aggravating for her... Hm..."
10015005-58 = "Aha! You must be jealous!"
10015005-60 = "M-Me? Jealous?!"
10015005-61 = "Don't make up weird scenarios in your head, Noa!"
10015005-62 = "Can you be normal, for once?! Stop keeping Sensei waiting and explain the issue! "
10015005-63 = "Okay, okay. As you wish, Yuuka!"
10015005-64 = "As I said, the Kivotos Halo Festival is held every two years for all the academies."
10015005-65 = "Not only does it bring the schools together, it's a great opportunity for the host academies to show off a little."
10015005-67 = "After all, it's not every day that a single academy can command the attention of all of Kivotos."
10015005-68 = "It's more than a sports competition. If we make a good enough impression, it'll mean a lot for Millennium."
10015005-69 = "Historically, new student registrations have skyrocketed for the host school, which in turn earns them priority with vendors and suppliers."
10015005-71 = "We at Millennium Science School are lauded for our scientific and technological prowess. We have to live up to that standard for this field day."
10015005-72 = "Among our many plans are individual GPS systems for each student and ultra high-speed cameras to prevent any incorrect referee calls for matches."
10015005-73 = "I can say with confidence that every single club at this school has been working tirelessly for months to prepare for the Halo Festival."
10015005-75 = "And with only one day left, Seminar needs to inspect all the equipment and run tests, but..."
10015005-76 = "[s] \"But...?\""
10015005-77 = "But unfortunately, we've run into some issues."
10015005-84 = "Only twelve hours ago there was a...minor explosion at the Material Development Club."
10015005-85 = "I'm guessing they were mixing chemicals that shouldn't be mixed, again."
10015005-86 = "While no one was injured, the cheer bot they've been developing is in need of urgent repairs."
10015005-88 = "To make matters worse, equipment has been going missing and some facilities were even destroyed."
10015005-89 = "[s3] \"That sounds serious.\"\n[s4] \"Are you thinking of postponing the festival?\""
10015005-92 = "It is serious, but I don't think we'll need to postpone. We're just a little behind schedule."
10015005-93 = "I'm not as worried about repairs or replacing the stolen equipment."
10015005-94 = "The bigger concern is finding who is stealing it before the trail goes cold."
10015005-95 = "And Seminar has its hands full with the field day being tomorrow."
10015005-96 = "So our request is... Can you help us catch the thief?"
10015005-97 = "[s5] \"I can definitely do that, but...\"\n[s6] \"Is there anything else I can do?\""
10015005-100 = "Hm? Oh, no. Don't worry about it."
10015005-101 = "Overall, all the preparations are going well."
10015005-102 = "I know we've experienced a few setbacks, but I accounted for everything in my planning!"
10015005-103 = "It's simple. I've allotted 300 minutes to fixing the cheer bot, which gives me just enough time to visit the Executive Committee office."
10015005-104 = "Then I just have to calculate the added repair costs and organize athlete rosters to send to the other schools. All preparations will be complete 1,850 seconds before the opening ceremony begins..."
10015005-105 = "[s] \"(It doesn't sound like she's doing well...)\""
10015005-111 = "Yuuka! I brought you some black tea."
10015005-112 = "What? Why did you do that?"
10015005-113 = "You always drink black tea when you're working all night!"
10015005-114 = "And judging by your down-to-the-second schedule, it's looking like an all-nighter for you."
10015005-115 = "I understand that, but...your kindness is just suspicious."
10015005-116 = "Well, thank you. I think I have enough time to drink this before the repairs..."
10015005-124 = "Noa, this tastes a bit strange. Are you sure you made black tea?"
10015005-125 = "The caffeine is having...the opposite effect...of what it's supposed to..."
10015005-135 = "All according to plan."
10015005-136 = "What Yuuka needs right now isn't an extra 1,850 seconds to work, but rest."
10015005-137 = "[s] \"What did you put in her tea?!\""
10015005-138 = "You can unfurrow your brow. It's just herbal tea."
10015005-139 = "It's meant to relieve anxiety and help you fall asleep."
10015005-140 = "But I really didn't expect her to just collapse like that."
10015005-141 = "She must have been even more overworked than I thought."
10015005-142 = "[s] \"But what about preparations for field day?\""
10015005-146 = "I know this is asking a lot, but that's where you come in, Sensei."
10015005-147 = "I'd like to request your assistance to ensure the Kivotos Halo Festival runs smoothly."
10015005-148 = "[s] \"Is this different from Yuuka's request?\""
10015005-149 = "Entirely so. Valkyrie Police School can handle investigating the thefts."
10015005-150 = "I know Yuuka won't like it. She wanted every aspect of this to be handled by Millennium students."
10015005-151 = "But, as I said earlier, this field day is prepared by and for all students in Kivotos."
10015005-152 = "And when I say \"all students\", I mean including Yuuka."
10015005-153 = "She won't admit it, but no one has put in more work nor is more excited for this than Yuuka. But she can't enjoy it if she's dead on her feet."
10015005-154 = "As Yuuka's self-proclaimed bestie, I simply cannot allow that to happen."
10015005-155 = "[s7] \"I can't say no to that...\" \n[s8] \"How can I help?\""
10015005-158 = "Heehee. Thank you, Sensei."
10015005-159 = "Step one! Let's find some students to help us before Yuuka wakes up."

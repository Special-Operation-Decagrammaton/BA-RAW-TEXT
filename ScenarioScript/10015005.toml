10015005-5 = "#na;노아;[ruby=황륜대제]키보토스 대운동회[/ruby]…… 그것은 체육 활동을 통한 학생의 완성."
10015005-6 = "#all;hide"
10015005-7 = "#na;노아;학생들이 무기를 내려놓고, 학원을 가리지 않고 서로 화합하며 공정하게 선의의 경쟁을 치르는 평화의 제전."
10015005-8 = "#na;노아;학원도시의 역사와 함께 오래전부터 이어져 온 이 이벤트는 2년마다 각 학원에서 번갈아 개최되며 키보토스의 평화를 유지하는 데 큰 역할을 해왔지요."

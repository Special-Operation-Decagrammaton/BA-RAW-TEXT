10015005-13 = "#all;hide"
10015005-14 = "#wait;1200"
10015005-15 = "#na;노아;아무리 사이가 나쁜 학원이라 하더라도 대운동회 기간만큼은 무기를 내려놓고 적대행위를 중단하는 것이 키보토스의 오래된 불문율이었습니다만……"
10015005-16 = "#st;[0,0];instant;1;"
10015005-17 = "#clearST"
10015005-18 = "#all;hide"
10015005-19 = "#na;노아;이번에는 총학생회장의 실종을 시작으로 여러 가지 사건사고가 연달아 발생한 탓에 대운동회가 열리지 않는 것이 아니냐는 우려 또한 존재했습니다."
10015005-20 = "#st;[0,0];instant;1;"
10015005-21 = "#clearST"
10015005-22 = "#all;hide"
10015005-23 = "#na;노아;……하지만 다행스럽게도 샬레와 여러 학교의 학생 여러분이 도와주신 덕분에, 이번 대운동회도 무사히 개최를 확정 짓게 되었습니다."

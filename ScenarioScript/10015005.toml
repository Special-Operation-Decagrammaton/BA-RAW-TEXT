10015005-36 = "#wait;10"
10015005-37 = "#wait;10"
10015005-38 = "5;유우카;99;……갑작스러운 요청에도 불구하고 먼 길을 달려와 주셔서 감사합니다, 선생님.\n#5;greeting"
10015005-39 = "1;노아;03\n5;유우카;06;……그보다 노아, 사설이 길어!\n#5;em;[반응]\n#5;m3\n#5;hophop\n#1;dl"
10015005-40 = "5;유우카;05;앞의 그 장황한 설명은 할 필요 없었잖아?"
10015005-41 = "5;유우카;05\n1;노아;03;저는 그저 이번 대운동회의 개회사를 인용한 것뿐인걸요?\n#1;em;[?]\n#1;ar\n#5;m5"
10015005-42 = "1;노아;01;단어를 지우거나 요약하면 말이 가진 의미가 왜곡되고 퇴색될 수도 있답니다."
10015005-43 = "1;노아;05;보고 들은 내용을 전달하는 과정에서 고의로 내용을 누락시킨다면, 제대로 된 '서기' 임무를 수행하고 있다고 자신할 수 없지요.\n#1;greeting"
10015005-44 = "[s] \"……서기?\""
10015005-45 = "1;노아;02;그러고 보니 선생님께 정식으로 인사를 드리는 것은 처음이군요.\n#1;em;[반응]"
10015005-46 = "5;유우카;05\n1;노아;01;제 이름은 노아. 밀레니엄 사이언스 스쿨의 학생회— <세미나>의 서기를 맡고 있습니다.\n#5;dr\n#1;m3"
10015005-47 = "1;노아;03;잘 부탁드립니다, [USERNAME] 선생님.\n#1;em;[반짝]\n#1;greeting"
10015005-48 = "[s] \"잘 부탁해.\""
10015005-49 = "1;노아;03\n5;유우카;99;이상하게 평소보다 텐션이 높은 것 같은데……\n#5;em;[땀]\n#5;al\n#1;m1\n#1;h\n#fontsize;55"
10015005-50 = "5;유우카;06;여하튼 자기소개는 아무래도 상관없으니, 빨리 본론을 이야기하자고."
10015005-51 = "1;노아;02;어라, 유우카 쨩. 뭔가 평소보다 못마땅해 보이네요.\n#1;em;[반응]"
10015005-52 = "1;노아;01;저는 세미나의 임원으로서 샬레의 선생님이 저희 학원에 나쁜 인상을 받지 않도록 격식을 차려 인사했을 뿐인데…… 어째서 그게 유우카 쨩의 기분을 나쁘게 한 걸까요?\n#1;m2\n#1;greeting"
10015005-53 = "5;유우카;06\n1;노아;99;제가 선생님의 호의를 샀을 때 유우카 쨩이 곤란할 만한 일이 있다면……\n#1;em;…\n#1;m3\n#5;dr"
10015005-54 = "#st;[0,0];instant;1;"
10015005-55 = "#clearST"
10015005-56 = "1;노아;99\n#1;d\n#wait;1000"
10015005-57 = "#all;hide"
10015005-58 = "3;노아;03;혹시…… 질투라든가?\n#3;em;[음표]\n#3;closeup\n#3;a"
10015005-59 = "#all;hide"
10015005-60 = "3;노아;03\n5;유우카;04;지, 질투라니. 무얼 질투한다는 거야?\n#5;em;[!]\n#5;al\n#3;m1"
10015005-61 = "5;유우카;04;나는 아무 생각도 하지 않고 있었거든?!\n#5;hophop"
10015005-62 = "5;유우카;04;이상한 소리 하지 말고 계속 설명해! 선생님이 기다리시잖아.\n#5;em;[빠직]"
10015005-63 = "5;유우카;04\n3;노아;01;네, 그럼 계속 설명을 이어가겠습니다.\n#5;dr\n#3;em;[반응]\n#3;m3"
10015005-64 = "3;노아;01;앞서 말씀드린 것처럼 <황륜대제>는 2년 주기로 개최되는 전 키보토스 규모의 이벤트라 할 수 있습니다."
10015005-65 = "3;노아;01;그렇기 때문에 대운동회는 이를 주관하는 호스트 학원의 역량을 외부에 아낌없이 내비칠 수 있는 절호의 기회이기도 하지요."
10015005-66 = "#all;hide"
10015005-67 = "#na;유우카;키보토스의 모든 학생이 한 학원에 시선을 집중하는 경우는 흔치 않으니까요."
10015005-68 = "#na;유우카;이 기간에 좋은 인상을 쌓아 두면 장기적으로 학원 운영에도 큰 도움이 됩니다."
10015005-69 = "#na;유우카;신입생 유치부터 시작하여, 학원에 필요한 물자를 공급하는 업자와의 거래까지……."
10015005-70 = "#all;hide"
10015005-71 = "#na;노아;저희 밀레니엄 사이언스 스쿨은 키보토스에서도 최첨단의 과학기술을 보유한 전문학교인 만큼, 대운동회를 통해 저희가 보유한 첨단 기술을 선보일 예정이었습니다."
10015005-72 = "#na;노아;자율적으로 판단하여 최적의 경로를 안내하는 스마트 안내 시스템이라든가, 경기 중의 오심을 방지하기 위한 초고속 촬영 카메라가 달린 표적지라든가……."
10015005-73 = "#na;노아;지난 몇 개월간 밀레니엄 학원의 모든 동아리가 이 대운동회를 위해 전력을 다했다고 해도 과언이 아닐 정도지요."
10015005-74 = "#all;hide"
10015005-75 = "3;노아;05;그래서 운동회가 하루 앞으로 다가온 오늘, 저희 세미나에서는 기자재와 장비들을 점검하며 리허설을 시행할 예정이었습니다만…….\n#3;em;…\n#3;a"
10015005-76 = "[s] \"……무슨 문제가 생긴 거야?\""
10015005-77 = "3;유우카;99;네, 그렇습니다. 유감스럽게도.\n#3;greeting"
10015005-78 = "#st;[0,0];instant;1;"
10015005-79 = "#clearST"
10015005-80 = "#all;hide"
10015005-81 = "#wait;2000"
10015005-82 = "#wait;2500"
10015005-83 = "#all;hide"
10015005-84 = "#na;유우카;지금으로부터 12시간 전, <신소재개발클럽>의 부실에서 '사소한' 폭발 사고가 발생했습니다."
10015005-85 = "#na;유우카;아마도 또 이상한 폭발물을 혼합하다 사고가 난 모양인데……\n#fontsize;55"
10015005-86 = "#na;유우카;다행스럽게도 다친 사람은 없었지만, 폭발의 여파로 대운동회에서 사용될 예정이었던 응원 로봇이 파손되어 긴급한 수리가 필요한 상태입니다."
10015005-87 = "#all;hide"
10015005-88 = "3;유우카;06;그리고 약속이라도 한 것처럼 잇달아 스타디움에서 체육 기자재를 도난당했다거나, 일부 시설이 파괴되었다는 신고가 쏟아지기 시작해서……\n#3;em;[땀]\n#3;stiff\n#3;a"
10015005-89 = "[s3] \"그거 큰일이네.\"\n[s4] \"혹시 대회를 연기해야 하는 거야?\""
10015005-90 = "#wait;10"
10015005-91 = "#wait;10"
10015005-92 = "3;유우카;02;아뇨. 리허설 일정에는 차질이 생겼지만, 대회를 연기해야 할 만큼의 큰 문제는 아닙니다.\n#3;em;[반응]"
10015005-93 = "3;유우카;01;로봇을 수리하고 기자재를 긴급 조달하는 건 그리 어려운 일이 아니니까요.\n#3;greeting"
10015005-94 = "3;유우카;05;다만 도난 사건은 흔적이 사라지기 전에 범인을 조사했으면 하는데……"
10015005-95 = "3;유우카;99;지금의 세미나는 대운동회를 앞두고 따로 사건을 수사할 만큼의 여유가 없어서요.\n#3;em;[속상함]\n#3;stiff"
10015005-96 = "3;유우카;02;괜찮으시다면 선생님께서 이 사건의 범인을 찾아 주실 수 있으실까요?\n#3;em;[?]"
10015005-97 = "[s5] \"그건 어렵지 않지만……\"\n[s6] \"다른 건 도와주지 않아도 괜찮은 거야?\""

[translation]
10016130-1 = "Afterword; Gehenna Prefect Team Episode"
10016130-10 = "President Hina!"
10016130-17 = "Where have you been this whole time? I've been looking for you!"
10016130-18 = "Do you have any idea how worried I was when I realized you had disappeared before the match?"
10016130-19 = "Well, about that—"
10016130-20 = "I couldn't get a hold of you at all. And when I asked other members of the Prefect Team, all they would do was fidget and avoid answering my questions."
10016130-21 = "I was worried that those Pandemonium Society raccoons had gotten to you!"
10016130-22 = "Wait, Ako. It's nothing like that, so calm—"
10016130-23 = "I mean, even if the entire Pandemonium Society tried at once, they obviously wouldn't get anywhere near you..."
10016130-24 = "I never doubted or underestimated you, of course! I would never!"
10016130-28 = "But if anything happened to you, I would—"
10016130-34 = "...Ako."
10016130-35 = "...Y-Yes?!"
10016130-37 = "Calm down. I'll explain everything to you. Just give me a minute."
10016130-38 = "Y-Yes, of course. Sorry about that."
10016130-40 = "First off, I'm sorry for leaving without saying anything."
10016130-41 = "I apologize for dumping all that work on you. I never intended for it to be that way."
10016130-42 = "Dumping all that work on me..."
10016130-43 = "It's a bit embarrassing to hear you put it that way."
10016130-44 = "Compared to the heavy-duty tasks that you're usually in charge of, what I took care of was minimal."
10016130-45 = "Tracking down troublemakers disrupting the festival, adjusting the event you were scheduled to participate in..."
10016130-46 = "Seems like I caused you plenty of trouble. I'm sorry."
10016130-47 = "But wait, where were you during the match?"
10016130-48 = "I checked the Executive Committee's office and everywhere else you could have possibly been..."
10016130-49 = "Oh. I was at the Joint Medical Headquarters, the one run by Trinity's Remedial Knights and the Medical Emergency Club."
10016130-50 = "I was taking a patient I found inside the stadium to the—"
10016130-51 = "Joint Medical Headquarters?! Did you get hurt?!"
10016130-52 = "It'll be a travesty if there's a scar on your skin! A crisis! Make sure you—"
10016130-56 = "Ako, calm down."
10016130-58 = "Again, I was just visiting the Joint Medical Headquarters to drop someone else off. Then, all of a sudden, there was a terrorism alert, so I stuck around for a little while. That's it."
10016130-59 = "I don't have any serious injuries, and it turned out that there was no actual attack happening, so there's nothing to worry about."
10016130-60 = "Terrorism alert?"
10016130-61 = "That's odd. I was with the other Executive Committee members all day, but we never heard anything about that."
10016130-62 = "Well, it must not have reached the Executive Committee, since it was closer to Sena's jurisdiction."
10016130-63 = "Anyway, I stayed at the medical headquarters and got some rest and a quick checkup."
10016130-64 = "If anything, I feel better than ever."
10016130-65 = "I-I'm happy to hear that..."
10016130-66 = "By the way, was there anything the Prefect Team had trouble resolving without me?"
10016130-67 = "I heard that a tank crashed through the stadium? I also heard that Gehenna won overall, and I'm sure plenty of other things happened..."
10016130-68 = "Yes. Several issues arose while you were away, but don't worry, I wasted no time in dealing with them."
10016130-69 = "As for the troublemaking students, I cracked down on them with the help of the other Executive Committee members."
10016130-70 = "When it came to filling vacant participant spots, I enlisted students from the Gourmet Research Society."
10016130-71 = "You...asked other students for help?"
10016130-72 = "Yes. You remember Junko from the Gourmet Research Society, right? And how fast she could run away from crackdowns?"
10016130-73 = "Well, she put that speed to good use for once and nabbed the overall win for Gehenna."
10016130-74 = "As much I don't want to owe favors to a club as problematic as the Gourmet Research Society, it's better than the alternative of dealing with the Pandemonium Society."
10016130-75 = "No, that's not what I meant..."
10016130-76 = "Ako, you're saying that you collaborated with other students to solve these problems?"
10016130-77 = "...Yes? Is there a problem?"
10016130-78 = "Ah. No. It's nothing. "
10016130-79 = "No matter how much work you had on your plate, the past you would have taken on everything by yourself."
10016130-81 = "Seeing you handle the workload by asking those around you... You've changed a lot, Ako."
10016130-82 = "Hearing you say that, President Hina, has got me feeling all sorts of things..."
10016130-83 = "...What?"
10016130-84 = "N-Never mind!"
10016130-88 = "Attention please. In a few moments, we'll be starting the bonfire for the Halo Festival After-Party."
10016130-89 = "Students who would like to join us for a dance around the bonfire should gather in the center field area."
10016130-90 = "Once again, in a few moments..."
10016130-91 = "Anyway, I'm sorry that I left you alone for so long today."
10016130-92 = "Ako, why don't we go to the bonfire for a bit?"
10016130-93 = "R-Really?"
10016130-94 = "Dancing might be a bit much, but I thought it would be nice to be at the party with you."
10016130-100 = "Shall we get going?"
10016130-106 = "Understood!"

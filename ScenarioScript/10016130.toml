[translation]
10016130-1 = "ย้อนวันวาน; คณะกรรมการวินัยเกเฮนน่า"
10016130-10 = "ท่านประธานฮินะ!!"
10016130-17 = "หายไปไหนมากันคะ? ฉันตามหาซะทั่วเลยนะคะ!"
10016130-18 = "รู้รึเปล่าคะว่าฉันกังวลแค่ไหนที่ท่านประธานหายตัวไปทั้งที่การแข่งขันสำคัญจะเริ่มแล้วน่ะค่ะ?"
10016130-19 = "อืม คือว่าเรื่องนั้น..."
10016130-20 = "ฉันโทรไปก็ไม่ยอมรับสาย พอไปถามคนอื่นๆ ทุกคนก็ทำหน้าตาลำบากใจ แล้วก็เลี่ยงที่จะไม่ตอบ..."
10016130-21 = "ฉันเป็นห่วงนึกว่าถูกพวกจิ้งจอกเจ้าเล่ห์จากแพนเดโมเนียม โซไซตี้จับตัวไปซะอีกค่ะ!"
10016130-22 = "อาโกะ ใจเย็นๆ ก่อน มันไม่ใช่แบบนั้น..."
10016130-23 = "ถึงต่อให้พวกแพนเดโมเนียม โซไซตี้ทุกคนจะมาพร้อมกัน ก็คงไม่สามารถแตะต้องท่านประธานได้#nแม้แต่ปลายเส้นผมก็เถอะ..."
10016130-24 = "ฉันไม่เคยสงสัยหรือประเมินความสามารถของท่านประธานต่ำสักครั้งเลยนะคะ!"
10016130-28 = "แต่ว่าถ้าเกิดอะไรขึ้นกับท่านประธานละก็ ฉันคง...!"
10016130-34 = "...อาโกะ"
10016130-35 = "คะ... คะ?!"
10016130-37 = "ใจเย็นๆ ก่อน เดี๋ยวฉันจะอธิบายทุกอย่างให้ฟัง"
10016130-38 = "ค่ะ... ขอโทษด้วยค่ะท่านประธาน"
10016130-40 = "ก่อนอื่นก็... ขอโทษนะที่จู่ๆ ก็หายตัวไปแบบนั้นน่ะ"
10016130-41 = "ฉันไม่ได้ตั้งใจให้เป็นแบบนั้น แต่กลายเป็นว่าฉันทิ้งงานเอาไว้ให้เธอทำคนเดียวซะแล้ว ขอโทษนะ"
10016130-42 = "พูดอะไรอย่างนั้นกันคะ..."
10016130-43 = "ท่านประธานพูดแบบนี้ฉันเขินนะคะ..."
10016130-44 = "ถ้าเทียบกับงานหนักๆ ที่ท่านประธานมอบหมายให้เป็นประจำแล้ว งานส่วนที่ฉันทำวันนี้ถือว่า#nเล็กน้อยมากเลยค่ะ"
10016130-45 = "งานปราบปรามพวกเด็กเกเรที่มาก่อกวนงานแข่งกีฬา ปรับเปลี่ยนตารางงานที่ท่านประธานจะต้องไป#nเข้าร่วม..."
10016130-46 = "...ดูเหมือนฉันจะสร้างปัญหาให้เธอหลายๆ อย่างเลย ขอโทษนะ"
10016130-47 = "ว่าแต่ว่า... ระหว่างการแข่งขัน ท่านประธานอยู่ที่ไหนงั้นเหรอคะ?"
10016130-48 = "ฉันไปดูที่ห้องคณะกรรมการจัดงานมาแล้ว และก็ไปหาทุกๆ ที่ที่คิดว่าท่านประธานจะไปมาแล้วด้วย..."
10016130-49 = "คือว่า... ฉันอยู่ที่หน่วยพยาบาลสัมพันธ์น่ะ ที่หน่วยแพทย์ฉุกเฉินของเกเฮนน่ากับชมรมอัศวินบรรเทา#nทุกข์ สถาบันทรีนิตี้ ร่วมกันดูแลอยู่"
10016130-50 = "ฉันพาคนบาดเจ็บที่เจอในสนามแข่งไปส่ง---"
10016130-51 = "หน่วยพยาบาลสัมพันธ์เหรอคะ? ท่านประธานไม่สบาย หรือว่าบาดเจ็บตรงไหนรึเปล่าคะ?"
10016130-52 = "ถ้ากลายเป็นแผลเป็นขึ้นมาละก็แย่แน่ๆ ค่ะ ต้องรีบไปทำแผล---"
10016130-56 = "อาโกะ ใจเย็นๆ ก่อน"
10016130-58 = "บอกแล้วไง ฉันแวะพาคนเจ็บไปส่งที่หน่วยพยาบาลสัมพันธ์ แล้วจู่ๆ ก็มีประกาศว่าจะมีเหตุก่อการร้าย#nครั้งใหญ่เกิดขึ้น ก็เลยพักอยู่ที่นั่นแป๊บหนึ่งน่ะ"
10016130-59 = "ฉันไม่ได้บาดเจ็บตรงไหน หรือว่าต้องการการพักผ่อนหรอก แล้วก็ไม่ได้มีเหตุก่อการร้ายเกิดขึ้นด้วย เพราะงั้นไม่ต้องตื่นตระหนกขนาดนั้นก็ได้"
10016130-60 = "คำเตือนเหตุก่อการร้ายครั้งใหญ่เหรอคะ?"
10016130-61 = "แปลกจังเลยนะคะ ฉันทำงานอยู่กับคณะกรรมการจัดงานทั้งวัน แต่ไม่ได้ยินเรื่องนั้นมาก่อนเลย..."
10016130-62 = "ก็นะ... ข่าวเรื่องนี้คงไปไม่ถึงหูของคณะกรรมการจัดงานหรอก มันเป็นแค่ข้ออ้างนี่นา"
10016130-63 = "เอาเป็นว่าเพราะเรื่องนั้น ทำให้ฉันได้ตรวจร่างกายแล้วก็พักผ่อนอยู่ที่หน่วยพยาบาล"
10016130-64 = "พอได้พักสักหน่อยก็รู้สึกดีขึ้นเยอะเลยละ"
10016130-65 = "ได้ยินแบบนั้นก็ค่อยโล่งใจหน่อยค่ะ..."
10016130-66 = "ว่าแต่ตอนที่ฉันไม่อยู่ มีปัญหาอะไรที่ทางสมาชิกคณะกรรมการวินัยคนอื่นๆ จัดการไม่ได้หรือเปล่า?"
10016130-67 = "ฉันได้ข่าวเรื่องที่รถถังบุกเข้ามาในสนามแข่ง แล้วก็ได้ยินว่าเกเฮนน่าได้คะแนนรวมการแข่งขันสูงที่สุด ... รวมถึงเรื่องอื่นๆ อีกเยอะเลย..."
10016130-68 = "ค่ะ ตอนที่ท่านประธานไม่อยู่ก็เกิดปัญหาหลายๆ อย่าง... แต่ไม่ต้องห่วงนะคะ ฉันจัดการทุกอย่างเรียบร้อยแล้วค่ะ"
10016130-69 = "สำหรับพวกเด็กเกเร ฉันขอให้ทางคณะกรรมการวินัยคนอื่นๆ ไปจัดการให้แล้ว..."
10016130-70 = "สำหรับรายการที่ขาดนักกีฬาลงแข่ง ฉันก็ให้ทางชมรมชิมอาหารเข้ามาร่วมลงแข่งแทนแล้วค่ะ"
10016130-71 = "นี่เธอ... ขอให้คนอื่นช่วยงั้นเหรอ?"
10016130-72 = "ค่ะ ท่านประธานจำคุณจุนโกะจากชมรมชิมอาหารได้มั้ยคะ? คนที่มักจะวิ่งหนีเร็วๆ เวลาที่ปะทะกับ#nพวกเราน่ะค่ะ"
10016130-73 = "ฉันคิดมาตลอดว่าเธอเป็นคนที่วิ่งเร็วมากๆ แล้ววันนี้เธอก็ช่วยให้เราคว้าชัยชนะมาได้อย่างเกินความ#nคาดหมายมากๆ เลยค่ะ"
10016130-74 = "...ถึงฉันจะไม่ชอบใจที่ต้องยืมมือพวกที่ชอบสร้างแต่ปัญหาอย่างชมรมชิมอาหารสักเท่าไร แต่ขอให้#nพวกเธอช่วยก็คงดีกว่าต้องทนรับมือกับพวกแพนเดโมเนียม โซไซตี้ค่ะ"
10016130-75 = "เปล่า ฉันไม่ได้หมายถึงเรื่องนั้น..."
10016130-76 = "แต่หมายถึงเรื่องที่อาโกะร่วมมือกับนักเรียนคนอื่นๆ เพื่อแก้ปัญหานี้ต่างหาก"
10016130-77 = "คะ? มีอะไรเหรอคะ...?"
10016130-78 = "อ่า เปล่าหรอก ไม่มีอะไร "
10016130-79 = "ถ้าเป็นอาโกะสมัยก่อนละก็ ต่อให้งานเยอะแค่ไหน ก็จะฝืนจัดการทุกอย่างด้วยตัวคนเดียว..."
10016130-81 = "พอเห็นเธอขอให้คนอื่นช่วยงานแบบนี้ เลยคิดว่าอาโกะเองก็เปลี่ยนไปเยอะเหมือนกันนะ..."
10016130-82 = "ได้ยินท่านประธานพูดว่า \"เปลี่ยนไป\" แบบนี้ จู่ๆ ก็รู้สึกแปลกๆ ขึ้นมาอย่างบอกไม่ถูกเลยค่ะ..."
10016130-83 = "หืม...?"
10016130-84 = "อ๊ะ มะ...ไม่มีอะไรหรอกค่ะ!"
10016130-88 = "โปรดทราบ พิธีเปิดแคมป์ไฟในงาน <อาฟเตอร์ปาร์ตี้> กำลังจะเริ่มขึ้นในอีกสักครู่นี้ค่ะ"
10016130-89 = "นักเรียนที่ต้องการเข้าร่วมงานเต้นรำรอบกองไฟ ขอให้มารวมตัวกันที่สนามกลางค่ะ"
10016130-90 = "โปรดทราบ อีกสักครู่..."
10016130-91 = "เอาเถอะ ยังไงฉันก็ขอโทษนะที่ปล่อยให้เธอทำงานยุ่งหัวหมุนอยู่คนเดียวทั้งวัน..."
10016130-92 = "อาโกะ... เดี๋ยวพวกเราไปดูแคมป์ไฟกันมั้ย?"
10016130-93 = "จะ...จริงเหรอคะ?"
10016130-94 = "เรื่องเต้นรำคงไม่ไหว แต่ถ้าได้ไปงานอาฟเตอร์ปาร์ตี้กับเธอ มันก็คงจะสนุกดีน่ะ..."
10016130-100 = "เราไปกันเลยมั้ย?"
10016130-106 = "...ค่ะ!"

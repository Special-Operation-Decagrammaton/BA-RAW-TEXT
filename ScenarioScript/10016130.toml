[translation]
10016130-1 = "後日談;格黑娜．風紀委員會篇"
10016130-10 = "……陽奈委員長！！"
10016130-17 = "這段時間您去了哪裡。我一直在找您呢！"
10016130-18 = "在重要的比賽之前突然消失無蹤，知道我們有多震驚嗎？"
10016130-19 = "嗯……那個──"
10016130-20 = "不但聯繫不上，問其他風紀委員時，他們也都一臉為難地避而不答……"
10016130-21 = "我擔心是不是萬魔殿的那群狐狸們對委員長耍了什麼把戲！"
10016130-22 = "等等，亞子。不是那樣的，先冷靜下來──"
10016130-23 = "當然，即便是萬魔殿的所有幹部一湧而上，也碰不了陽奈委員長的一根寒毛……"
10016130-24 = "所以我絕對沒有懷疑或小看委員長的意思！"
10016130-28 = "但要是委員長出了什麼事，我──！"
10016130-34 = "……亞子。"
10016130-35 = "……是，是！？"
10016130-37 = "冷靜下來。我會慢慢說明的。"
10016130-38 = "是，是……不好意思。"
10016130-40 = "首先……對不起。突然一聲不響地離開。"
10016130-41 = "雖然不是故意的，但我為把工作硬推給亞子這件事道歉。"
10016130-42 = "硬推什麼的……"
10016130-43 = "委員長這麼說反而讓我感到羞愧。"
10016130-44 = "和委員長平時負責的繁重業務相比，我今天代為處理的事根本微不足道。"
10016130-45 = "取締妨礙大運動會的各種問題兒童，調整原定由委員長參賽的出場順序……"
10016130-46 = "……我果然給你添麻煩了，抱歉。"
10016130-47 = "所以比賽期間您在哪裡呢？"
10016130-48 = "我找遍了所有委員長可能去的地方，包含實行委員會的辦公室……"
10016130-49 = "那個……我在三一救護騎士團和急救醫學部共同經營的聯合醫療本部。"
10016130-50 = "為了把在場上發現的患者送過去……"
10016130-51 = "聯合醫療本部？您有哪裡受傷了嗎？"
10016130-52 = "要是在皮膚上留下傷疤就糟糕了，趕緊把傷口──"
10016130-56 = "亞子，冷靜點。"
10016130-58 = "我再說一次，我是送患者去聯合醫療本部，#n不過卻突然收到將會發生大規模恐怖攻擊的預告，所以在那裡暫留了一會。"
10016130-59 = "我的傷勢沒有到需要休息的程度，而且實際上也未發生恐怖攻擊，所以不用擔心。"
10016130-60 = "大規模恐怖攻擊的預告？"
10016130-61 = "真奇怪。我整天都和其他實行委員在一起，但卻沒聽說有那種事……"
10016130-62 = "嗯……應該是消息沒傳達給實行委員會吧。#n畢竟那很像瀬奈會說的理由。"
10016130-63 = "總之，我在醫療本部獲得了充分的休息，也接受了簡單的檢查。"
10016130-64 = "多虧於此，我現在的狀態比平常好多了。"
10016130-65 = "那真是太好了……"
10016130-66 = "話說回來，我不在的這段時間，有出現只靠風紀委員難以處理的問題嗎？"
10016130-67 = "我聽說發生了像是戰車闖入運動場、格黑娜取得總冠軍之類的各種事件……"
10016130-68 = "是的。委員長不在的期間，雖然大小問題接連不斷，但都沒過多久就解決了。"
10016130-69 = "在取締不良學生方面，也向其他實行委員提出了請求……"
10016130-70 = "至於參賽名單上的空缺，則拜託了美食研究會的學生代為參賽。"
10016130-71 = "拜託了……其他學生？"
10016130-72 = "是的。美食研究會的淳子同學，還記得他每次被取締時都跑得很快吧？"
10016130-73 = "雖然本來就知道他腳程很快，#n但最後還是憑藉他超乎預期的表現，格黑娜才能取得總冠軍。"
10016130-74 = "……雖然向美食研究會這種問題社團求援很不甘心，#n不過總比製造機會給萬魔殿找碴要來得好。"
10016130-75 = "不，那倒是無所謂……"
10016130-76 = "亞子和其他學生合作解決問題？"
10016130-77 = "……是的。有什麼問題嗎……？"
10016130-78 = "啊啊。不，沒什麼。"
10016130-79 = "如果是以前的亞子，無論工作再多，都會硬著頭皮攬在身上……"
10016130-81 = "居然會拜託其他人處理事情，感覺亞子變了很多呢。"
10016130-82 = "聽到陽奈委員長說我「變了」，感覺心情有點複雜……"
10016130-83 = "……嗯？"
10016130-84 = "沒，沒什麼！"
10016130-88 = "大會報告。#n稍後將如期點燃「後夜祭」的營火。"
10016130-89 = "想參加土風舞的學生，請到中央運動場集合。"
10016130-90 = "再重複一次……"
10016130-91 = "不管怎麼說，很抱歉今天丟你一個人這麼長的時間。"
10016130-92 = "亞子，等一下要不要去看營火晚會？"
10016130-93 = "真，真的嗎？"
10016130-94 = "雖然跳舞是不大可能，但和辛苦的亞子一起去看「後夜祭」也不錯。"
10016130-100 = "我們走吧？"
10016130-106 = "……是！"

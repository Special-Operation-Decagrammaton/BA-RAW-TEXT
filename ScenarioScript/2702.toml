2702-7 = "4;헬멧단 인질범;00;발키리 경찰학교의 학생들은 강력한 장비로 무장하고 있지만 출동이 굼뜨기로 악명 높지. 녀석들이 현장에 도착할 즈음에는 이 몸은 이미 멀리 도망치고 있을 것이다, 하하하!\n#4;em;[음표]\n#4;hophop"
2702-8 = "4;헬멧단 인질범;00;자, 그럼 어디 한번 금고를 열어 볼까…….\n#4;m3\n#3;m1"

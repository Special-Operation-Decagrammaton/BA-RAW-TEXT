[translation]
2702-1 = "จะจับกุมแล้วนะคะ! 2"
2702-2 = "หน้าร้าน <มาสเตอร์โดนัท> ในบล็อกที่ 3 ถนนสายที่ 2"
2702-4 = "อะ... อ๊าก! ช่วยผมด้วย!"
2702-5 = "ฮ่ะฮ่ะฮ่า! ถ้ายังรักชีวิตอยู่ก็เอาเงินมาให้หมดซะดีๆ!"
2702-6 = "ฮิฮิ จับเจ้าของร้านเป็นตัวประกัน ขู่ไม่ให้ใครเข้ามาใกล้ และหอบเงินหนีไปก่อนที่ตำรวจจะมา... เป็นแผนที่สมบูรณ์แบบไปเลย!"
2702-7 = "ถึงนักเรียนของสถาบันฝึกตำรวจวัลคิรี่จะมีอุปกรณ์ที่ทรงพลัง แต่ขึ้นชื่อว่าปฏิบัติการช้า กว่าพวกมันจะมาถึงที่เกิดเหตุ ฉันก็หนีไปไกลแล้ว ฮ่ะฮ่ะฮ่า!"
2702-8 = "เอาล่ะ ไหนเปิดตู้เซฟดูซิ..."
2702-11 = "หยุดนะ นี่ตำรวจ! ยกมือขึ้นและทำตามที่ฉันบอกด้วยค่ะ!"
2702-12 = "ไม่นะ?! นักเรียนสถาบันฝึกตำรวจวัลคิรี่มาถึงแล้วงั้นเหรอ? เพิ่งมีการแจ้งเหตุไปยังไม่ถึง 5 นาทีเลย!"
2702-13 = "อย่าเอาเราไปเปรียบกับสลอตอย่างสำนักความมั่นคงนะ! สำนักรักษาความปลอดภัยของเรา#nรู้จักทางลัดทุกทางในพื้นที่นี้จากงานลาดตระเวนที่เราทำทุกวันไงล่ะค่ะ!"
2702-14 = "...สำนักรักษาความปลอดภัย?"
2702-15 = "ไม่ใช่สำนักความมั่นคง แต่เป็นสำนักรักษาความปลอดภัยเหรอ? วะฮ่ะฮ่ะฮ่า!"
2702-16 = "ทะ... ทำไมถึงหัวเราะอย่างนั้นล่ะคะ?"
2702-17 = "แล้วจะไม่ให้ขำได้ไง นักเรียนจากสำนักงานความปลอดภัยที่ควบคุมการจราจรจะมาจับกุมฉันคนนี้#nโดยไม่มีอุปกรณ์เหมาะๆ สักชิ้น... น่าหัวเราะเป็นบ้า!"
2702-19 = "แม้แต่โจรนี่ก็กำลังดูถูกพวกเราอยู่..."
2702-20 = "ยะ... ยกโทษให้ไม่ได้ค่ะ!"
2702-29 = "อ๊าก! เดี๋ยวก่อน! ใช้ปืนแบบนั้นมันอันตรายนะ!"
2702-30 = "ยะ...ยัยนี่...! ยิงปืนโดยไม่เล็ง นี่จะฆ่าตัวประกันด้วยมือตัวเองรึไง!"
2702-32 = "อึ่ก ความสามารถในการยิงของฉันเป็นปัญหาตอนที่สอบเข้า ไม่นึกเลยว่าจะยังแย่อยู่..."
2702-33 = "ฟุบุกิ ช่วยยิงโจรเรียกเรียกค่าไถ่แทนฉันให้ทีได้ไหมคะ?"
2702-34 = "ฉันเองก็ไม่มั่นใจในการยิงตรงระยะนี้เลย..."
2702-35 = "อึ่ก... แต่ถ้ายังเสียเวลาอยู่แบบนี้ นักเรียนสำนักความมั่นคงที่มาถึงช้าคงแย่งผลงานเราไปแน่ค่ะ! ถ้าไม่รีบทำอะไรสักอย่างล่ะก็..."
2702-36 = "ทำไมเราไม่ปล่อยให้นักเรียนสำนักความมั่นคงจัดการเรื่องการจับกุมล่ะ?"
2702-37 = "เราไม่มีปืนซุ่มยิงที่ใช้ลอบยิงคนร้ายหรือระเบิดที่ทำลายสิ่งกีดขวางได้ เราอาจจะทำให้เรื่องบานปลายเพราะรีบไปก็ได้..."
2702-38 = "ฮึ่ย... น่าโมโหจริงๆ! อย่างน้อยถ้าทำลายสิ่งกีดขวางหน้าร้านได้ล่ะก็ เราจะเข้าไปได้อย่างง่ายดายเลย..."
2702-40 = "...คิริโนะ สิ่งกีดขวางที่ทางเข้านั่นไม่ใช่กระสอบแป้งที่ใช้ทำโดนัทเหรอ?"
2702-41 = "มันไกลมากจนมองไม่เห็นเลย ว่าแต่... มีปัญหาอะไรอย่างนั้นเหรอคะ?"
2702-42 = "ถึงฉันจะไม่ใช่พวกที่ชอบริเริ่มทำอะไร แต่ฉันมีความคิดดีๆ ที่จะทำให้คนร้ายยอมจำนนได้แล้วล่ะ"
2702-43 = "เอ้า มาลองดูกันเถอะ..."
2702-45 = "อีกสักครู่ต่อมา"
2702-47 = "เฮ้อ เงียบลงแล้วแหะ ท่าทางตอนนี้พวกตำรวจคงยอมแพ้ไปแล้ว"
2702-48 = "งั้นมาลองเปิดตู้เซฟกันอีกที..."
2702-53 = "ปัง ปัง ปัง!"
2702-54 = "อะ... อะไรเนี่ย เสียงปืนดังสนั่นนี่มันอะไรกัน?! ยิงเตือนงั้นเหรอ?"
2702-57 = "...แต่เธอก็ยังยิงปืนได้แย่อยู่นะ ลูกกระสุนไม่ได้ยิงโดนตรงนี้ มันยิงโดนแค่สิ่งกีดขวางกองกระสอบแป้งนี่"
2702-58 = "เจ้าพวกโง่ ไปเล่นที่อื่นไป! มันเป็นแค่กระสอบแป้งธรรมดาก็เท่านั้นเอง!"
2702-59 = "แกไม่ได้อะไรจากการยิงกระสอบแป้งหรอก!"
2702-64 = "...แค่กๆ แค่กๆ ควันนี่มาจากไหน?"
2702-69 = "ถูกต้องแล้วค่ะ ควันนั่นก็คือผงแป้งจากกระสอบแป้งที่ระเบิดออกมายังไงล่ะคะ!"
2702-70 = "ฉันไม่ได้คิดจะใช้ปืนขู่ตั้งแต่แรกอยู่แล้ว เป้าหมายของเราคือการทำให้ผงแป้งกระจายไปทั่วร้านต่างหากล่ะ"
2702-71 = "ผงที่กระจายอยู่รอบๆ สามารถเผาไหม้ได้อย่างง่ายดายเพียงแค่มีเปลวไฟเล็กๆ ค่ะ หรือก็คือ..."
2702-73 = "ระเบิดแป้ง!"
2702-75 = "เจ้าพวกโง่นี่..."
2702-76 = "ถ้าทำอย่างนั้นที่นี่ก็จะระเบิดกลายเป็นจุล!"
2702-78 = "ตู้ม!"
2702-81 = "ระ... ร้านของผม... ทางที่ลูกค้าผ่านไปมา..."
2702-82 = "เจ้าโง่พวกนี้ทำให้แผนที่สมบูรณ์แบบของฉันพัง... กร่อด..."
2702-87 = "ยะฮู้ว! เราจับคนร้ายได้แล้วค่ะ!"
2702-88 = "กำจัดสิ่งกีดขวางและคนร้ายได้ในเวลาเดียวกันโดยไม่มีระเบิด…"
2702-89 = "ฉันคิดว่ามันเป็นความคิดที่แปลกใหม่มากล่ะ"
2702-90 = "ทำขนาดนี้เจ้าหน้าที่ระดับสูงของสถาบันฝึกตำรวจวัลคิรี่จะยอมรับผลงานของเราไหมคะ?"
2702-93 = "หยุดนะ นี่ตำรวจ! ยกมือขึ้นและทำตามที่..."
2702-94 = "เรามาที่นี่เพราะได้ข่าวว่ามีสถานการณ์จับตัวประกันที่ร้านโดนัท... มีผู้ก่อการร้าย ไม่ใช่โจรเรียกค่าไถ่เหรอ?"
2702-95 = "หัวหน้ากรมฯ ดูนั่นสิคะ! พวกเราจับคนร้ายไว้ได้แล้วก่อนที่ทุกคนจะมาค่ะ!"
2702-96 = "คิริโนะกับฟุบุกิจากสำนักรักษาความปลอดภัยใช่ไหม? สภาพเลวร้ายนี่... อย่าบอกนะว่าโจรเรียกค่าไถ่วางระเบิดน่ะ!"
2702-97 = "เปล่าค่ะ เราทิ้งระเบิดเพื่อกำจัดสิ่งกีดขวางที่คนร้ายติดตั้งไว้ค่ะ!"
2702-98 = "เราใช้แป้งแค่นิดๆ หน่อยๆ มาแทนดินปืน แต่มันได้ผลดีเลยล่ะ"
2702-99 = "..."
2702-100 = "เป็นยังไงบ้างคะ? ด้วยความสำเร็จขนาดนี้ ฉันจะย้ายไปอยู่สำนักความมั่นคงได้ใช่ไหมคะ?"
2702-101 = "ฉันไม่อยากย้ายไปไหนหรอก ขอแค่วันหยุดสักครึ่งเดือนก็พอ..."
2702-102 = "ปัญหาที่สามารถแก้ไขได้ด้วยสไนเปอร์เพียงคนเดียว แต่กลับระเบิดทั้งร้านแบบนี้..."
2702-103 = "ทุกคนกลับไปเตรียมเขียนหนังสือขอโทษ!"
2702-108 = "เอ๋~?!"
2702-110 = "(หลังจากนั้นคิริโนะและฟุบุกิก็ถูกพักการเรียนชั่วคราวเพื่อเป็นการรับผิดชอบต่อการระเบิดร้านโดนัท)"
2702-111 = "จะจับกุมแล้วนะคะ!"

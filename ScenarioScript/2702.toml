[translation]
2702-1 = "我要逮捕你！（２）"
2702-2 = "奇普托斯3丁目2號街．MasterDonut前"
2702-4 = "噫，噫噫！請，請救救我！"
2702-5 = "哈！想活命的話就把所有錢交出來！"
2702-6 = "呼。挾持老闆當人質並不讓其他人靠近，在警察抵達之前搶到錢逃跑……#n這次也很完美！"
2702-7 = "女武神警察學園的學生雖然都裝備著強力的武器，但出動是著名的慢。#n等他們抵達現場的時候，我早就逃到很遠的地方了，哈哈哈！"
2702-8 = "好，那就來打開金庫吧……"
2702-11 = "我是警察！所有人，請舉起雙手退到牆邊！"
2702-12 = "什麼！女武神警察學園的學生已經到了嗎！？從警報響起到現在還不到5分鐘啊！？"
2702-13 = "因為我們生活安全局和警備局的其他同仁相比，已經藉由平時的巡邏任務掌握了這週邊所有捷徑了！"
2702-14 = "……生活安全局？"
2702-15 = "不是警備局，而是生活安全局？哈哈哈哈！"
2702-16 = "有，有什麼好笑的？"
2702-17 = "當然好笑呀。沒有像樣的裝備，平常只會指揮交通無所事事的生活安全局學生，居然想來逮捕我……真是笑死我了！"
2702-19 = "連犯人也瞧不起我們呢……"
2702-20 = "唔……不可原諒！"
2702-29 = "嗚哇！請，請等一下！隨便開槍很危險啊！"
2702-30 = "這，這傢伙……！沒在瞄準就亂開槍，想親手殺了人質嗎！"
2702-32 = "唔，沒想到入學測試發生問題的射擊能力，到現在還會造成問題……"
2702-33 = "吹雪，可以替我狙擊犯人嗎？"
2702-34 = "……我也對這個距離的狙擊沒有信心。"
2702-35 = "唔……但是如果再這樣浪費時間，功勞就要被晚到的警備局學生全部搶走了！#n得趕快，趕快想想辦法才行……"
2702-36 = "我看，逮捕的工作還是交給警備局的學生比較好吧？"
2702-37 = "我們既沒有能狙擊犯人的狙擊槍，也沒有能炸飛路障的炸彈。#n要是再貿然行動的話，事情可能會越鬧越大的……"
2702-38 = "嗚嗚，真不甘心！要是沒有門前的路障的話，應該就能輕易突破的說……"
2702-40 = "……桐乃。堆疊在入口的路障是不是製作甜甜圈時的麵粉袋？"
2702-41 = "有點遠所以看不太清楚……有什麼問題嗎？"
2702-42 = "雖然太出風頭不像我的作風，但我想到一個能讓犯人無力化的方法了。"
2702-43 = "……你聽我說。"
2702-45 = "（過了幾分鐘……）"
2702-47 = "呼，總算是安靜下來了。看來那些警察已經放棄了。"
2702-48 = "好，那就再次來開啟金庫吧……"
2702-53 = "（碰！碰！碰！）"
2702-54 = "怎，怎麼了，又有槍聲！？是威嚇射擊嗎？"
2702-57 = "……但是和剛才一樣，真是糟糕的射擊技術啊。#n別說差點射中，根本全都射在當成路障麵粉袋上嘛。"
2702-58 = "到底在瞄準哪裡啊，笨蛋們！打那些麵粉袋是想做什麼！"
2702-59 = "就算射擊麵粉袋，又有什麼意義！"
2702-64 = "咳咳，咳咳……真是的。嗯？這個煙霧是……難道說？"
2702-69 = "對，沒錯。是從袋子裡噴出來的麵粉粉塵！"
2702-70 = "打從一開始，開槍的目的就不是威嚇。讓店裡充滿麵粉粉塵才是我們的目標。"
2702-71 = "在大氣中飛散的粉塵，就算只靠小小的火花就會輕易地被點燃。換句話說……"
2702-73 = "……粉塵爆炸！"
2702-75 = "你，你們是笨蛋嗎！？"
2702-76 = "這麼做的話會把周圍一帶整個炸──"
2702-78 = "（咚哐──！）"
2702-81 = "我，我的……店啊……客人們往來的街道啊……"
2702-82 = "居，居然會因為這些笨蛋……讓我的完美計畫，失敗……唔……"
2702-87 = "成功了！我們抓住犯人了！"
2702-88 = "竟然不靠炸彈，就能同時炸飛障礙物與犯人……"
2702-89 = "以我來說還真是嶄新的點子啊。"
2702-90 = "這樣女武神警察學園的高層也會認同我們的功勞吧？"
2702-93 = "我是警察！所有人，舉起雙手退到牆……"
2702-94 = "雖然是聽說甜甜圈店發生挾持人質的事件……#n原來不是挾持人質事件，而是有恐怖分子嗎？"
2702-95 = "局長，請看！在各位抵達之前，我們已經親手逮捕犯人了！"
2702-96 = "這不是生活安全局的桐乃和吹雪嗎？#n話說回來，這個慘狀到底是……是被犯人引爆的嗎！？"
2702-97 = "不，為了讓犯人設置的路障失效，所以我們將其引爆了！"
2702-98 = "作為火藥的代替借用了一點麵粉，效果真不錯呢。"
2702-99 = "……"
2702-100 = "怎麼樣呀？有這種程度的功績的話，能轉調到警備局嗎！？"
2702-101 = "哇……轉調就算了，只要給我半個月的休假就好……"
2702-102 = "明明只需要一名狙擊手就能處理的問題，竟然炸掉整間店面……"
2702-103 = "你們兩個給我回去寫悔過書！"
2702-108 = "咦咦咦咦────！？"
2702-110 = "（之後，作為桐乃和吹雪引爆甜甜圈店的處分，兩人被停學了一陣子）"
2702-111 = "我要逮捕你！"

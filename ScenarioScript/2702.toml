[translation]
2702-1 = "You're Under Arrest! Part 2"
2702-2 = "3rd St. & 2nd Ave. Master Donuts"
2702-4 = "E-Eek! Help me!"
2702-5 = "Hahaha! Hand over all your dough if you don't wanna get hurt!"
2702-6 = "Taking the shop owner hostage, threatening people so they don't come near, and then taking all the money before the police arrive... Another perfect plan!"
2702-7 = "Valkyrie Police School may pack some serious heat, but you can't use it if you're so slow! We'll be long gone by the time they arrive on the scene. Hahaha!"
2702-8 = "Now, time to crack open the safe..."
2702-11 = "Police! Everyone put your hands up and take a step back!"
2702-12 = "What?! How are they already here?! It hasn't even been five minutes since the police were called!"
2702-13 = "Don't compare us to the slowpokes at the Security Bureau! The Public Safety Bureau knows all the shortcuts in this area thanks to our regular patrols!"
2702-14 = "The Public Safety Bureau?"
2702-15 = "You're with Public...Safety? Hahahaha!"
2702-16 = "Wh-What's so funny?"
2702-17 = "You're what's funny! Shouldn't you be directing traffic somewhere? You don't have the muscle to take us on!"
2702-19 = "Even criminals are looking down on us..."
2702-20 = "Ugh... Just shut up and get caught already!"
2702-29 = "A-Ahhh! What are you doing?! You can't just start shooting like that!"
2702-30 = "Y-You brat! Were you even looking at where you were aiming?! Are you trying to ice the hostage too?!"
2702-32 = "*sigh* I knew my marksmanship got low marks on my entrance exam,#nbut I didn't think it would still be plaguing me at this point..."
2702-33 = "Fubuki, would you mind being my trigger woman?"
2702-34 = "I dunno. I'm not confident in my shot at this distance."
2702-35 = "The Security Bureau will arrive and snatch away our commendation if we keep wasting time like this. We need to figure something out soon..."
2702-36 = "Wouldn't it be better to just leave the arrest up to them at this point?"
2702-37 = "We don't have sniper rifles to shoot with from this distance or explosives that can break up their barricade. The situation might deteriorate if we try to force things."
2702-38 = "This is so frustrating! If only we could take down their barricade blocking the entrance. Then it'd be easier to get in..."
2702-40 = "Hey, Kirino. Isn't that barricade made of the sacks of flour they use to make the donuts?"
2702-41 = "I can't see it clearly from this far away. Why? What's that got to do with anything?"
2702-42 = "Don't get used to me coming up with plans like this, but I think I just came up with a way to neutralize the culprit."
2702-43 = "Hear me out."
2702-45 = "Moments later..."
2702-47 = "Whew, it's quiet now. Looks like those cops have given up."
2702-48 = "Now, back to opening the safe..."
2702-53 = "*bang* *bang* *bang*"
2702-54 = "Wh-What are those loud gunshots?! Are they firing warning shots?"
2702-57 = "Their marksmanship is still terrible. The bullets aren't even making it this far, they're just shooting at the barricade I made from the flour sacks."
2702-58 = "Hey, idiots! What are you shooting at? That's just flour!"
2702-59 = "What do you hope to accomplish, huh?!"
2702-64 = "*cough* *cough* Where is this smoke coming from? Wait a second..."
2702-69 = "You guessed it! That's flour you're breathing in!"
2702-70 = "Those shots were never meant for you. Our goal was to fill the store with flour."
2702-71 = "All it takes it just one small spark to ignite this much flour in the air. In other words..."
2702-73 = "...it's a flour bomb!"
2702-75 = "You idiots."
2702-76 = "The entire block will be blown away if you do that—"
2702-78 = "*boom*"
2702-81 = "My shop... The neighborhood..."
2702-82 = "Our plan was ruined by these idiots. I can't believe it..."
2702-87 = "Hurray! We caught the culprit!"
2702-88 = "And we managed to blow up both the culprit and the barricade without even using bombs."
2702-89 = "My plan worked perfectly."
2702-90 = "Now the higher-ups at Valkyrie will have to recognize our achievement, right?"
2702-93 = "Police! Everyone raise your hands and step..."
2702-94 = "We were told there was a hostage situation here, but this looks more like a terrorist attack..."
2702-95 = "Look, Director! We caught the culprit before anyone else even got here!"
2702-96 = "You're Kirino and Fubuki from the Public Safety Bureau, right? What in the world happened here? Did the culprit set off a bomb?!"
2702-97 = "No, ma'am. We destroyed the barricade they had set up!"
2702-98 = "It was with flour instead of gunpowder, but still very effective."
2702-99 = "..."
2702-100 = "So, what do you think? I can be transferred to the Security Bureau with this kind of achievement under my belt, right?"
2702-101 = "I don't need to be transferred, but I wouldn't mind about two weeks of vacation."
2702-102 = "Blowing up an entire store to solve a problem that could've been solved by one sniper..."
2702-103 = "Return to your station and be prepared to submit a written apology!"
2702-108 = "What?!"
2702-110 = "Kirino and Fubuki were then suspended for a while as punishment for the explosion at the donut shop."
2702-111 = "You're Under Arrest!"

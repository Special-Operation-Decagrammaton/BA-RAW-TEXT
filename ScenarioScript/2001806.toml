[translation]
2001806-1 = "Phase Line"
2001806-2 = "(หลังได้รับข้อความจากโมเอะ คุณครูก็รีบวิ่งมาที่โคะอุซางิ การ์เด้นทันที)"
2001806-4 = "เอ๊ะ...? คุณครู?"
2001806-5 = "มาเร็วกว่าที่คิดแฮะ ไม่เห็นต้องรีบวิ่งมาขนาดนั้นเลย..."
2001806-6 = "[s1] \"แฮ่กๆ... คงไม่ได้มาช้าไปใช่มั้ย...\"\n[s2] \"ยังไม่ได้กดระเบิดใช่มั้ย...?\""
2001806-7 = "ไม่ช้าหรอก ถ้าเป็นห่วงเรื่องระเบิดละก็ ยังกองอยู่ตรงนั้นแน่ะ ยังไม่ได้จัดการเลย... "
2001806-8 = "ถ้าเป็นห่วงเรื่องระเบิดละก็ ยังกองอยู่ตรงนั้นแน่ะ ยังไม่ได้จัดการเลย... "
2001806-9 = "อะไรกัน... คุณครูอยากเห็นตอนมันระเบิดตู้มต้ามงั้นเหรอ?"
2001806-10 = "ฉันมีระเบิดอยู่หลายประเภทเลยนะ อยากเห็นแบบไหนก็บอกมาได้เลย"
2001806-11 = "เริ่มระเบิดอันไหนก่อนดีล่ะ? ระเบิดแสง หรือระเบิดควัน? หรือไม่งั้นก็ระเบิดไฟดีมั้ย...?"
2001806-12 = "[s3] \"ครูไม่ได้มาดูระเบิดสักหน่อย...\"\n[s4] \"ครูมาเพราะกังวลว่าโมเอะจะกดระเบิดต่างหาก...\""
2001806-13 = "อะไรกัน... ที่รีบมาเพราะกลัวว่าฉันจะกดระเบิดรึไง?"
2001806-14 = "อะไรกัน... กลัวว่าฉันจะกดระเบิดเลยรีบมาเหรอ?"
2001806-15 = "ถึงฉันจะชอบวางระเบิดมากแค่ไหน แต่ก็ไม่ได้สมองตื้นถึงขั้นที่จะดึงสลักระเบิดเล่นตอนจัดอุปกรณ์#nหรอกนะ"
2001806-16 = "เห็นแบบนี้ ฉันก็เป็นโอเปอเรเตอร์และคนดูแลเสบียงของทาง SRT นะ ฉันไม่ทำอะไรให้เสียทรัพยากร#nเปล่าๆ หรอก"
2001806-17 = "อย่างน้อยฉันก็ยังมี \"สามัญสำนึกทั่วไป\" อยู่น่ะ"
2001806-18 = "[s] \"ได้ยินแบบนี้ ชักกังวลกว่าเดิมอีก\""
2001806-19 = "เอาเป็นว่า ยังไงคุณครูก็มาที่นี่แล้ว ฉันกำลังกังวลอยู่พอดีเลยว่าจะจัดเก็บอุปกรณ์หนักๆ พวกนี้#nเสร็จเมื่อไร"
2001806-20 = "คุณครูนี่พร้อมช่วยเหลือนักเรียนเวลาที่มีปัญหาจริงๆ เลยน้า"
2001806-21 = "ถึงเป็นเรื่องที่รู้อยู่แล้ว แต่ก็รู้สึกดีทุกครั้งที่นึกถึงเลย"
2001806-22 = "งั้นเรามาเริ่มกันเลยดีมั้ย?"
2001806-28 = "ดูเหมือนระเบิดมือสมัยนี้จะออกแบบมาให้สามารถจุดชนวนระเบิดพร้อมกันได้ด้วยสัญญาณไฟฟ้า โดยไม่ต้องติดตั้งตัวจุดชนวนระเบิดเลย... น่าสนใจจริงๆ"
2001806-29 = "เพราะงั้นก็หมายความว่า... แค่กดปุ่มนี้ปุ่มเดียว ก็สามารถจุดชนวนระเบิดมือทั้งหมดที่อยู่ที่นี่ได้..."
2001806-30 = "[s] \"เดี๋ยวก่อน โมเอะ รอก่อน—\""
2001806-31 = "คงต้องจัดเก็บแยกเอาไว้แล้วห่อด้วยอุปกรณ์ป้องกันไฟฟ้าอีกชั้น เพื่อป้องกันการจุดชนวนโดยไม่ได้#nตั้งใจแล้วแหละ"
2001806-32 = "หืม? เป็นอะไรเหรอคุณครู? อยากพูดอะไรรึเปล่า?"
2001806-33 = "[s] \"เปล่า ไม่มีอะไรหรอก...\""
2001806-34 = "ฮุฮุฮุ... คุณครูนี่แปลกคนจริงๆ เลยนะ"
2001806-35 = "งั้นก็มาเก็บของกันต่อเถอะ"
2001806-38 = "ระเบิด EMP แบบใหม่งั้นเหรอ? เล็กแค่นี้เอง แต่ในคู่มือเขียนไว้ว่าเป็นระเบิดพลังทำลายล้างสูง"
2001806-39 = "ถ้าเกิดเผลอทำระเบิดพวกนี้ตู้มต้ามขึ้นมาละก็..."
2001806-40 = "หึหึ... อุปกรณ์ไฟฟ้า โทรศัพท์มือถือ และรถที่อยู่ในบริเวณนี้ทั้งหมดก็จะใช้การไม่ได้ จนเหมือนกับว่า#nเป็นใจกลางเมืองที่ถูกตัดขาดเลยสินะ"
2001806-41 = "[s] \"เดี๋ยวก่อน นั่นมัน—\""
2001806-45 = "เอาไปเก็บไว้ในเซฟที่ทำจากวัสดุป้องกันแบบพิเศษกันเถอะ เผื่อเกิดเหตุการณ์ไม่คาดคิดขึ้น"
2001806-46 = "หืม...? คุณครู ไปยืนทำอะไรตรงนั้นน่ะ?"
2001806-47 = "ถ้าจัดการด้านโน้นเสร็จแล้ว ก็มาช่วยทางนี้หน่อยสิ"
2001806-52 = "เฮ้อ~ เสร็จสักที... ใช้เวลานานกว่าที่คิดอีกแฮะ"
2001806-53 = "ถ้าไม่ได้คุณครูมาช่วยละก็ คงไม่เสร็จง่ายๆ แบบนี้แน่เลย ขอบคุณที่มาช่วยนะ"
2001806-54 = "[s5] \"โมเอะ กังวลเรื่องอะไรอยู่รึเปล่า?\"\n[s6] \"เธอดูไม่เหมือนทุกวันเลยนะ\""
2001806-55 = "ฉันดูเหมือนกังวลอะไรอยู่ และดูต่างไปจากทุกวันเหรอ?"
2001806-56 = "ฉันดูไม่เหมือนทุกๆ วัน แถมดูเหมือนกังวลอะไรอยู่งั้นเหรอ?"
2001806-57 = "งั้นเหรอ ฉันก็เหมือนเดิมเลยนะ"
2001806-58 = "แต่ก็นั่นแหละ ฉันไม่ได้กดปุ่มอันตรายพวกนั้นเลย..."
2001806-59 = "เรื่องนั้นน่ะ อืม..."
2001806-60 = "อาจเป็นเพราะฉันอดทนไม่ทำสิ่งที่อยากทำเอาไว้ตลอดเวลาที่จัดของละมั้ง"
2001806-61 = "[s] \"อดทนไม่ทำสิ่งที่อยากทำ?\""
2001806-62 = "อื้อ ที่จริงฉันคิดเรื่องนี้มาตั้งแต่เมื่อกี้แล้วแหละ "
2001806-63 = "วันนี้สมาชิกคนอื่นออกไปข้างนอกกันหมด เหลือแค่ฉันกับคุณครูสองคน..."
2001806-64 = "ฉันรู้สึกอยากทำบางอย่างมาตลอด แต่ก็พยายามเก็บมันเอาไว้ในใจ..."
2001806-65 = "เพิ่งนึกได้ตอนคุณครูพูดขึ้นมานี่แหละ"
2001806-66 = "แฮ่กๆ..."
2001806-72 = "― คุณครู[wa:620] "
2001806-74 = "― ในโลกนี้ มีข้อห้ามอยู่หลายอย่างเลย[wa:710] "
2001806-77 = "― ทั้งปุ่มต่างๆ ที่ห้ามกดเด็ดขาด"
2001806-79 = "― แล้วก็สิ่งที่ห้ามทำมากมาย..."
2001806-82 = "― และพวกตัวเลือกที่พอเลือกแล้ว[wa:1100] "
2001806-84 = "― จะก่อให้เกิดความพังพินาศที่คิดไม่ถึง"
2001806-87 = "― ถ้าเลือกผิดไปก็อาจสูญเสียทุกอย่างไปก็ได้[wa:10] "
2001806-89 = "― แต่ว่า... ถ้าเกิดเป็นตัวเลือกที่ทำให้ตัวเองพอใจได้ล่ะ?[wa:1540] "
2001806-92 = "― คุณครู"
2001806-94 = "― จะเลือกแบบไหนเหรอ?[wa:160] "
2001806-97 = "― ฉันรู้ว่ามันเป็นคำถามที่ดูไร้สาระ[wa:1040] "
2001806-99 = "― คุณครูน่ะเป็นคนซื่อๆ ไม่เหมือนกับฉัน[wa:10] "
2001806-102 = "― แต่ว่าฉันน่ะ...[wa:420] "
2001806-104 = "― อาจจะก้าวล้ำเส้นพวกนั้นมาแล้วก็ได้[wa:1040] "
2001806-107 = "― เพราะว่าวินาทีแห่งความพังพินาศ"
2001806-109 = "― มันอาจเป็นโอกาสที่ฉันจะพิสูจน์ตัวเองก็ได้[wa:760] "
2001806-112 = "― เพราะงั้นคุณครู[wa:2200] "
2001806-115 = "― จะก้าวล้ำเส้นนั่น..."
2001806-117 = "― มาพร้อมกันกับฉันมั้ย?[wa:1050] "
2001806-120 = "แฮ่ก... แฮ่ก..."
2001806-121 = "คิดแล้วเชียวว่าไม่ไหว ฉันทนไม่ไหวแล้วววว..."
2001806-122 = "(โมเอะค่อยๆ ลุกขึ้นแล้วเดินมาหาคุณครู...)"
2001806-123 = "(จู่ๆ เธอก็หยิบบางอย่างใส่เข้ามาในปากคุณครู...)"
2001806-125 = "[ns7] \"อะไรเนี่ย...?\"\n[ns8] \"หวานจัง...\""
2001806-126 = "ฮิฮิ... หวานใช่มั้ยล่ะ?"
2001806-127 = "ฮิฮิ... หวานใช่มั้ยล่ะ?"
2001806-128 = "ลูกอมรสชาติเข้มข้นที่ให้พลังงานสูง ฉันสั่งมาพร้อมกับกระสุนคราวนี้น่ะ"
2001806-129 = "ปกติแล้วจะเอาไว้กินเวลาที่รู้สึกเหนื่อยๆ ตอนออกปฏิบัติการ แต่เพราะมันหวานอร่อยมากๆ บางครั้ง#nก็อยากจะหยิบมากินดื้อๆ เลยละ"
2001806-130 = "อาหารที่ให้พลังงานและแคลลอรี่สูง ถ้ากินตอนกลางคืน... น้ำหนักก็จะพุ่งขึ้นตามปริมาณที่กิน"
2001806-131 = "อ๊า~ รสชาติของความผิดบาปและความพังพินาศ... มันหอมหวานจริงๆ..."
2001806-132 = "[s9] \"ที่บอกว่าล้ำเส้นเมื่อกี้นี้ หมายถึงเจ้านี่เหรอ\"\n[s10] \"ที่พูดเมื่อกี้หมายถึงลูกอมสินะ\""
2001806-133 = "อะไรน่ะ ทำไมทำสีหน้าแบบนั้นล่ะ?"
2001806-134 = "อะไรน่ะ ทำไมทำสีหน้าแบบนั้นล่ะ?"
2001806-135 = "อะไรกันคุณครู... คิดว่าเรื่องที่ฉันพูดถึงเมื่อกี้หมายถึงอะไรเหรอ? คุณครูก็มีด้านมืดอยู่เหมือนกันสินะ#nคิกคิกๆ..."
2001806-136 = "แต่ก็นะ เรื่องแบบนั้นมันก็ถือเป็นความพังพินาศอย่างหนึ่งเหมือนกัน แต่ถ้าเกิดข้ามเส้นนั้นไปจริงๆ#nมันก็ย้อนกลับมาไม่ได้อีกน่ะสิ"
2001806-137 = "ถึงฉันจะชอบความพังพินาศมากแค่ไหน แต่เรื่องแบบนี้ฉันก็เรียนรู้ที่จะระวังไว้เหมือนกันนะ"
2001806-139 = "แต่ว่า... เขาบอกกันว่ามนุษย์เป็นสัตว์ที่ขี้หลงขี้ลืมนี่เนอะ?"
2001806-140 = "เพราะงั้นสักวันหนึ่ง ฉันอาจลืมความจริงเรื่องนี้ไปและก้าวข้ามเส้นนั่นไปก็ได้"
2001806-141 = "เพราะงั้นเอาไว้ถึงตอนนั้นก็ยกโทษให้ฉันด้วยนะคุณครู ฮิฮิฮิ..."

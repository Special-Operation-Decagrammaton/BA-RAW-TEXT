[translation]
2001806-1 = "Phase Line"
2001806-2 = "（接到萌的訊息後，馬上趕到了兔寶寶公園）"
2001806-4 = "……咦，老師？"
2001806-5 = "你來得比我想得還要快呢，明明不用來得這麼趕……"
2001806-6 = "[s1] 「哈啊，哈啊……看來我有趕上了……」\n[s2] 「炸彈還沒爆炸吧……？」"
2001806-7 = "你要找炸彈的話，它們全都堆在那裡喔…… "
2001806-8 = "你要找炸彈的話，它們全都堆在那裡喔…… "
2001806-9 = "……搞什麼啊，原來老師也想引爆炸彈嗎？"
2001806-10 = "現在這邊有各式各樣的炸彈，要的話隨時說一聲。"
2001806-11 = "你想從哪個開始？閃光彈？煙霧彈？還是導彈……？"
2001806-12 = "[s3] 「我不是來引爆炸彈的……」\n[s4] 「我是擔心你會不會引爆炸彈……」"
2001806-13 = "……什麼啊，你是因為不信任我才這麼急著跑來的嗎？"
2001806-14 = "……什麼啊，你是因為不信任我才這麼急著跑來的嗎？"
2001806-15 = "就算我很喜歡引爆炸彈，但還不至於笨到會在整理物資的時候點火。"
2001806-16 = "我好歹也是堂堂SRT的報務員兼補給員，可不會浪費大家共享的公用物資。"
2001806-17 = "……至少在最低限度的「常識」範圍內。"
2001806-18 = "[s] 「你這樣講反而讓我更不安了……」"
2001806-19 = "不過也謝謝老師過來。我正煩惱這些物資這麼重，到底該怎麼整理呢。"
2001806-20 = "……原來只要學生有困難，老師真的就會立刻趕到呢。"
2001806-21 = "雖然從以前就是這樣，不過老師還真可靠呢。"
2001806-22 = "……那麼，我們開始吧？"
2001806-28 = "嘿……最近的集束手榴彈設計成即使沒有另外接雷管也可以同時引爆啊……#n真是聰明。"
2001806-29 = "換句話說……只要用這一個按鈕就能將這裡所有的手榴彈一次引爆……"
2001806-30 = "[s] 「等等，萌。你先等一下──」"
2001806-31 = "……為了避免不小心按到，必須將它另外存放，並且加裝防靜電裝置才行。"
2001806-32 = "嗯？老師，怎麼了？你有什麼話想說的嗎？"
2001806-33 = "[s] 「不，沒什麼……」"
2001806-34 = "咯嘻嘻……真的嗎？"
2001806-35 = "那就繼續整理吧。"
2001806-38 = "這是新型[ruby=電磁脈衝]EMP[/ruby]彈嗎？聽說它體積小但威力非常強大呢。"
2001806-39 = "要是不小心引爆的話……"
2001806-40 = "呵呵呵……這一帶的手機和車輛就會全部故障，會在實質意義上與整個城市脫節……"
2001806-41 = "[s] 「等等，那個也──」"
2001806-45 = "因此以防萬一，要把它存放在用隔絕材料打造的特殊金庫裡。"
2001806-46 = "……嗯？老師，你站著做什麼？"
2001806-47 = "如果你那邊整理好了，就來幫我啊。"
2001806-52 = "啊～終於結束了……比想像中還花時間呢。"
2001806-53 = "要是老師沒來幫我的話，我大概還要整理好一會呢。謝謝老師。"
2001806-54 = "[s5] 「萌，你有什麼煩惱嗎？」\n[s6] 「你今天跟平常不太一樣……」"
2001806-55 = "跟平常不太一樣？"
2001806-56 = "跟平常不太一樣？"
2001806-57 = "有嗎？我覺得我今天沒什麼不同啊。"
2001806-58 = "你說我今天就算看到危險的按鈕，也不會想要去按它？"
2001806-59 = "那是因為，嗯……"
2001806-60 = "……應該是因為我忍著想做其他更想做的事吧。"
2001806-61 = "[s] 「更想做的事？」"
2001806-62 = "嗯。其實我從剛剛開始就一直很在意。"
2001806-63 = "今天其他隊員都不在，只有我和老師兩個人……"
2001806-64 = "感覺一不小心就會闖大禍，所以一直努力壓抑自己……"
2001806-65 = "現在聽到老師這麼說，才讓我想起來。"
2001806-66 = "哈啊……"
2001806-72 = "― 老師……[wa:700] "
2001806-74 = "― 世界上存在各種事物對吧。[wa:1590] "
2001806-77 = "― 例如不能按下去的按鈕，"
2001806-79 = "― 或是不能跨越的一線……"
2001806-82 = "― 其中，也存在一旦選了就無法挽回，[wa:1580] "
2001806-84 = "― 將導致毀滅的那種選項。"
2001806-87 = "― 只要走錯一步就會完蛋，[wa:980] "
2001806-89 = "― 卻有可能滿足自己的內心……[wa:3180] "
2001806-92 = "― 這種時候，"
2001806-94 = "― 老師會怎麼做？[wa:600] "
2001806-97 = "― 我知道這是一個毫無意義的問題。[wa:1760] "
2001806-99 = "― 因為老師是個正直的人。[wa:100] "
2001806-102 = "― 但我……[wa:860] "
2001806-104 = "― 也許會越過那一線也說不定。[wa:1880] "
2001806-107 = "― 畢竟那迎接毀滅的瞬間，"
2001806-109 = "― 同時也是能夠證明我自己的機會。[wa:1800] "
2001806-112 = "― 所以，老師……[wa:2520] "
2001806-115 = "― 那一線……"
2001806-117 = "― 要不要試著，和我一起跨越呢？[wa:1330] "
2001806-120 = "哈啊，哈啊……"
2001806-121 = "果然還是不行。#n我已經忍不住了……"
2001806-122 = "（萌緩緩起身並走了過來……）"
2001806-123 = "（嘴裡突然被塞了某個東西）"
2001806-125 = "[ns7] 「這，這是……？」\n[ns8] 「有股強烈的甜味……」"
2001806-126 = "呵呵呵……超甜的對吧？"
2001806-127 = "呵呵呵……超甜的對吧？"
2001806-128 = "這是這次和炸彈一起訂購的超高熱量濃縮糖果。"
2001806-129 = "通常是在作戰中累倒的時候，用來恢復體力的能量補給品。#n但因為它的甜度很令人上癮，所以我偶爾會想直接吃它。"
2001806-130 = "尤其是在這麼晚的時候吃這種高熱量的食物……一定會讓體重直線上升……"
2001806-131 = "啊啊，這種毀滅般的罪惡甜味……甚至讓人覺得越來越甜了……"
2001806-132 = "[s9] 「你說想跨越的一線……」\n[s10] 「原來是吃糖果啊……」"
2001806-133 = "你那是什麼表情？"
2001806-134 = "你那是什麼表情？"
2001806-135 = "難道老師以為，我想跨越的一線是指別的意思嗎？#n老師……想不到你也有不正經的一面呢。咯嘻嘻……"
2001806-136 = "雖然我對那種毀滅也不是沒興趣，但那麼做真的會造成無法挽回的後果。"
2001806-137 = "我再怎麼熱愛毀滅，也是懂得從經驗中學習教訓的。"
2001806-139 = "……不過話說回來，人類是種自私的動物。"
2001806-140 = "說不定我哪天會忘記這件事，然後忍不住再次越線喔。"
2001806-141 = "到時候記得要原諒我喔，老師？#n咯嘻嘻……"

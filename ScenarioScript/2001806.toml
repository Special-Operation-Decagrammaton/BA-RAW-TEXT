[translation]
2001806-1 = "Phase Line"
2001806-2 = "After I got Moe's text, I ran as fast as I could to Kousagi Park."
2001806-4 = "Whoa! I didn't know you were here already, Sensei!"
2001806-5 = "You got here way faster than I thought. You didn't have to run..."
2001806-6 = "[s1] \"*pant* *pant* I hope I made it in time...\"\n[s2] \"The bomb didn't go off, did it?\""
2001806-7 = "I haven't sorted the bombs yet. They're piled up over there... "
2001806-8 = "I haven't sorted the bombs yet. They're piled up over there... "
2001806-9 = "...Did you wanna set off a bomb, too?"
2001806-10 = "I have all kinds of bombs. Let me know which one you wanna try."
2001806-11 = "What do you want first? A flash grenade? A smoke grenade? Or, my personal favorite, an incendiary grenade...?"
2001806-12 = "[s3] \"I came to check on you! Not to set off bombs!\" \n[s4] \"I came because I was worried you'd set off a bomb.\""
2001806-13 = "...What? You rushed here because you assumed I'd detonate a bomb?"
2001806-14 = "...What? You rushed here because you assumed I'd detonate a bomb?"
2001806-15 = "I love my explosions, but even I'm not thoughtless enough to light a fuse while organizing supplies."
2001806-16 = "After all, I'm an SRT operator and part of the supply staff. I wouldn't just waste all of our supplies like that!"
2001806-17 = "...I mean, I mostly wouldn't."
2001806-18 = "[s] \"Yeah, that doesn't make me feel any better.\""
2001806-19 = "Well, thanks anyways. Organizing all these heavy supplies on my own would've been a bummer."
2001806-20 = "...You always just pop up whenever a student needs you, huh?"
2001806-21 = "That's not anything new from you, but it's just weird to me. In a good way, I guess."
2001806-22 = "Let's get this party started, then!"
2001806-28 = "These days, it seems cluster grenades are designed to explode simultaneously via electrical signals without connecting a detonator... That's interesting."
2001806-29 = "That means...this button alone can detonate every grenade in this place..."
2001806-30 = "[s] \"Wait, Moe. Hold on!\""
2001806-31 = "...I'll have to individually wrap them and install an anti-static device to prevent accidental activation."
2001806-32 = "What's wrong, Sensei? Do you have anything to say?"
2001806-33 = "[s] \"No, nothing...\""
2001806-34 = "Heeheehee. You're a weirdo, Sensei."
2001806-35 = "C'mon, we don't have all day!"
2001806-38 = "Is this the new EMP bomb? It's so small but, according to the manual, deliciously deadly."
2001806-39 = "Imagine the effects if I set this off by mistake."
2001806-40 = "Heehee... All cell phones and vehicles within the radius would break down... Absolute chaos would ensue!"
2001806-41 = "[s] \"Wait, that's...\""
2001806-45 = "Let's keep it in a special safe made of shielding material to be extra careful."
2001806-46 = "Sensei, what are you doing...?"
2001806-47 = "If you're done organizing over there, can you help me here?"
2001806-52 = "At long last, freedom! That took forever!"
2001806-53 = "But it would've been significantly longer alone, so many thanks."
2001806-54 = "[s5] \"Moe, is everything okay with you?\" \n[s6] \"Who are you and what have you done with Moe?\""
2001806-55 = "Huh? Why? Do I seem off?"
2001806-56 = "Huh? Why? Do I seem off?"
2001806-57 = "Hm, nope! I'm still the one and only, the irreplaceable Moe. "
2001806-58 = "Oh... You're right. I wasn't phased by any of the buttons today."
2001806-59 = "Well... You see..."
2001806-60 = "Maybe it was easier, because I've already been holding back on the thing I really, really want today."
2001806-61 = "[s] \"What do you want...?\""
2001806-62 = "Something that's consumed my whole mind!"
2001806-63 = "All the other squad members are out. It's just me and Sensei."
2001806-64 = "I've been holding onto my self-control by the tips of my fingernails, resisting with all my might."
2001806-65 = "But since you've brought it up... I can't help but give in to my desires!"
2001806-66 = "Heh..."
2001806-72 = "― Sensei.[wa:580] "
2001806-74 = "― There are many taboos in this world.[wa:630] "
2001806-77 = "― Buttons that shouldn't be pressed,"
2001806-79 = "― lines that shouldn't be crossed..."
2001806-82 = "― And choices that can lead you[wa:1060] "
2001806-84 = "― to irreversible destruction."
2001806-87 = "― You can lose everything with one wrong step,[wa:10] "
2001806-89 = "―but what if it's still worth it to try...?[wa:2060] "
2001806-92 = "― Sensei..."
2001806-94 = "― What would you choose, Sensei?[wa:10] "
2001806-97 = "― I know it's a meaningless question.[wa:960] "
2001806-99 = "― You aren't tempted like I am.[wa:10] "
2001806-102 = "― But I...[wa:700] "
2001806-104 = "― might end up crossing the line.[wa:1160] "
2001806-107 = "― Because that moment of destruction"
2001806-109 = "― is also the moment I prove myself.[wa:1040] "
2001806-112 = "― So, Sensei.[wa:2360] "
2001806-115 = "― Would you..."
2001806-117 = "― like to cross the line with me?[wa:650] "
2001806-120 = "*pant* *pant*"
2001806-121 = "That's it! I can't deny myself any longer!"
2001806-122 = "Moe slowly got up and approached me..."
2001806-123 = "...and stuck some kind of candy in my mouth."
2001806-125 = "[ns7] \"...Wh-What is this?\"\n[ns8] \"It's so sweet...\""
2001806-126 = "Heehee... It's super sweet, right?"
2001806-127 = "Heehee... I know, right?"
2001806-128 = "It's a super-high-calorie, concentrated candy that I snuck into our last ammo order."
2001806-129 = "It's technically to recover from fatigue during operations, but sometimes I eat them for the flavor.  "
2001806-130 = "Eating such a high calorie candy so late at night... It's so unhealthy for you..."
2001806-131 = "But what a sinful, destructive flavor... The guilt makes it extra sweet."
2001806-132 = "[s9] \"This was the line you wanted to cross?\"\n[s10] \"You wanted to...eat candy?"
2001806-133 = "What's with that face?"
2001806-134 = "What's with that face?"
2001806-135 = "Sensei... Were you thinking of something perverted? I didn't expect that from you. Heeheehee..."
2001806-136 = "Well, it's a type of destruction in and of itself, but not the kind that I can come back from."
2001806-137 = "Ruining things is my passion, but I guess you've taught me a thing or two."
2001806-139 = "...But, you know, people forget the lessons they've learned with a snap of their fingers."
2001806-140 = "I might've been good today, but who knows what I'll get up to in the future~"
2001806-141 = "So, you have to forgive me if I mess up, okay? Heeheehee."

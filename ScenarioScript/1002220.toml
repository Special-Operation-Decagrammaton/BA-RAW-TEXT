[translation]
1002220-1 = "一直重視的事物"
1002220-2 = "（就這樣，急忙趕往陽奈所在的海邊）"
1002220-7 = "[ns]「陽奈，讓你久等了。」"
1002220-8 = "啊，老師……"
1002220-9 = "這麼突然拜託你，我還有點擔心……"
1002220-13 = "……謝謝你願意過來，老師。"
1002220-14 = "[s]「因為是陽奈拜託我的事，我很樂意趕來唷。」"
1002220-15 = "啊……"
1002220-16 = "……這樣啊，老師原來是那麼……"
1002220-17 = "……呵呵。"
1002220-18 = "[s1]「游泳就交給我吧！我會全力教你的！」\n[s2]「雖然我也不太擅長游泳，但是為了陽奈，我會全力加油的！」"
1002220-19 = "聽你這麼說，真讓人放心。"
1002220-20 = "是，是嗎……？"
1002220-21 = "[s3]「我會和陽奈一起學游泳哦。」"
1002220-22 = "啊……嗯，嗯。"
1002220-23 = "看到老師這麼有幹勁，我也不能輸給你。"
1002220-24 = "既然要做就要全力以赴。#n占用老師太多時間，我也會過意不去的。"
1002220-28 = "那個……畢竟，學東西很快，是我為數不多的優點……"
1002220-29 = "那麼就趕快……"
1002220-33 = "[ns]「等一下，這樣不行哦！」"
1002220-34 = "嗯……？#n不行……？"
1002220-35 = "[s4]「不用想著要趕快學會沒關係唷！盡情佔據我的時間吧。」\n[s5]「一下就學會的話，就算身體會了也未必會記住。」"
1002220-38 = "可是這麼難得的假日……又不是出來玩。"
1002220-39 = "浪費一整天指導我的話，果然有點抱歉……"
1002220-40 = "[s]「只要能跟陽奈一起度過就夠了唷。」"
1002220-41 = "……兩人一起度過的安穩時光，反……反而正和你意……？"
1002220-42 = "如果不相信的話，可以馬上在這裡確認……？"
1002220-43 = "等，等等！會被別人看見的，那……那個，那樣果然有點……"
1002220-44 = "……真是的，你這個人實在是……"
1002220-45 = "……"
1002220-46 = "……呵呵。"
1002220-47 = "這種地方……果然很有你的風格。"
1002220-48 = "我知道了。那麼老師，今天就交給你囉。"
1002220-49 = "[s]「很好！包在我身上吧！」"
1002220-50 = "那麼……"
1002220-57 = "你，你在做什麼！？"
1002220-58 = "居，居然突然就開槍！#n為什麼要做這種事！？"
1002220-62 = "啊？那還用問嗎！"
1002220-63 = "我們啊！在炎炎夏日！#n只要看到曬恩愛的傢伙就會一肚子火！"
1002220-64 = "就會想要把他們弄得亂七八糟啊！"
1002220-65 = "現充全都該下地獄！！"
1002220-66 = "這是什麼任性的理由！？"
1002220-71 = "[ns]「陽奈，那個……！」"
1002220-73 = "……老師，稍微等我一下。"
1002220-74 = "我馬上去處理他們。"
1002220-77 = "[ns]「啊，陽奈！」"
1002220-81 = "啊？你是哪位？"
1002220-82 = "嬌小的銀髮……等等，這傢伙該不會是！"
1002220-86 = "嗚，嗚哇啊啊啊！？"
1002220-87 = "格，格黑娜的風紀委員長怎麼會在這裡！？嘎哈！"
1002220-94 = "（就這樣，陽奈無情地擊退了引起騷動的問題兒童）"
1002220-97 = "謝，謝謝你！幸虧有你才得救了！"
1002220-98 = "這份恩情該怎麼報答才好……！"
1002220-99 = "……沒什麼，我只是做了該做的事而已。"
1002220-101 = "（送走致謝的人們之後）"
1002220-106 = "[ns]「辛苦你了，陽奈。」"
1002220-108 = "沒事，真的不算什麼。"
1002220-109 = "每到夏天，那種人就會變多。#n這種事我在格黑娜也見過幾次。"
1002220-110 = "這種程度的事已經是日常了，該這麼說嗎……"
1002220-111 = "[s]「不愧是格黑娜的風紀委員長。」"
1002220-112 = "都說了，這真的不算什麼……"
1002220-117 = "[ns]「咦？剛才的聲音是……」"
1002220-118 = "啊，游泳圈……好像破洞了。"
1002220-119 = "[s]「陽奈的游泳圈……？怎麼會突然……」"
1002220-120 = "啊啊……可能是剛才戰鬥的時候被子彈擦到了吧。"
1002220-121 = "是我的判斷失誤。"
1002220-122 = "因為一直以來都沒有問題，所以似乎大意了。"
1002220-123 = "要是多注意一點就好了……"
1002220-124 = "[s]「那不是陽奈的錯哦。」"
1002220-125 = "不，老師……"
1002220-126 = "之所以會破洞，也是因為我使用的方式太粗暴了……"
1002220-127 = "這也沒辦法……而且都已經壞掉了……"
1002220-128 = "…………"
1002220-129 = "[s]「那我們去修好它吧？」"
1002220-130 = "修好……游泳圈嗎？"
1002220-131 = "那……很困難。"
1002220-132 = "這個游泳圈姑且也是風紀委員會的備品，是用特殊的素材製成的。"
1002220-133 = "除非拿回整備科，否則是很難修好的。"
1002220-134 = "居然偏偏……在老師要教我游泳的時候發生這種事……"
1002220-135 = "我……總是這個樣子。"
1002220-136 = "…………"
1002220-137 = "……或許，這反而是件好事。"
1002220-138 = "[s]「陽奈？」"
1002220-139 = "……「想學會游泳的話，就別再用游泳圈了吧」，我是這麼想的。"
1002220-140 = "雖然是用了很久的東西……說不定是個好機會。"
1002220-141 = "儘管有點捨不得……不過也必須畢業，對吧。"
1002220-142 = "……嗯，沒有游泳圈也沒關係。"
1002220-143 = "這樣練習也會更有效……"
1002220-144 = "…………"
1002220-145 = "……老師。#n把這個游泳圈丟著，一起去練習……"
1002220-146 = "[s]「沒有游泳圈當然也能練習游泳。」"
1002220-147 = "……？"
1002220-148 = "[s]「而且就如陽奈所說，總有一天要從游泳圈畢業。」"
1002220-149 = "老師……？"
1002220-150 = "[s]「話雖如此，也不代表一定要在今天不是嗎？」"
1002220-151 = "……！這麼說……"
1002220-152 = "是沒錯……"
1002220-153 = "[s6]「而且，我還沒看到啊。」\n[s7]「在游泳圈上不知所措的可愛陽奈！」"
1002220-156 = "老，老師！？突然在說什麼……！？"
1002220-157 = "如，如果你是認真這麼說的話……我也會生氣的哦。"
1002220-158 = "[ns]「我，我的意思是！不要在尋找方法前就放棄！」"
1002220-160 = "[ns]「而且……這是陽奈一直在用的重要的游泳圈，不是嗎？」"
1002220-161 = "老師……"
1002220-162 = "……唉。真是的。"
1002220-163 = "你總是這個樣子。"
1002220-164 = "既然老師都這麼說了……就試試看吧。"
1002220-165 = "[s8]「很好！那麼去找找能修理的地方吧。」\n[s9]「當然，要全力以赴，對吧！」"
1002220-169 = "（成功說服陽奈之後，開始一起到處找可以修好游泳圈的地方）"
1002220-196 = "呼呣……這個我應該能修好。"
1002220-197 = "……真的嗎？"
1002220-198 = "是用格黑娜的新素材做成的東西對吧？#n突然讓人感到幹勁滿滿啊。"
1002220-199 = "那麼──"
1002220-200 = "[s]「萬事拜託了！」"
1002220-208 = "（就這樣，游泳圈的修理順利進行著……）"
1002220-213 = "來，兩位久等了！"
1002220-214 = "[s]「謝謝！」"
1002220-215 = "謝，謝謝……"
1002220-216 = "不用謝了！我也學到了很多。"
1002220-222 = "[ns]「陽奈，太好了呢。」"
1002220-223 = "嗯，就是說啊。#n居然真的……能夠修好……"
1002220-224 = "壞掉的時候，我還以為已經無能為力了……"
1002220-225 = "……謝謝你，老師。"
1002220-226 = "[s]「不用客氣。」"
1002220-230 = "可是……我們到處跑來跑去的，現在已經這麼晚了……"
1002220-231 = "……今天很謝謝你，老師。"
1002220-232 = "雖然是我找你出來，好像不該說這種話，但時間不早了，今天就……"
1002220-233 = "[s]「等等。還沒結束哦。」"
1002220-234 = "……咦？"
1002220-235 = "[s10]「我們不是約好了嗎？」\n[s11]「不管是修理游泳圈還是學游泳都要全力以赴。」"
1002220-240 = "[ns12]「所以，雖然有點晚了……」\n[ns13]「可以開始上游泳課嗎？」"
1002220-241 = "啊……"
1002220-242 = "啊……"
1002220-243 = "你還是老樣子……"
1002220-249 = "嗯。"
1002220-250 = "你願意的話，就儘管來吧……"
1002220-255 = "我也會全力向你學習的。"
1002220-260 = "（在那之後，和陽奈的游泳課一直持續到夜深人靜，月落星沉）"

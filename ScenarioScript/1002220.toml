[translation]
1002220-1 = "สิ่งที่ยังคงให้ความสำคัญอยู่"
1002220-2 = "(คุณครูมาถึงริมชายหาดที่ฮินะกำลังรออยู่อย่างรวดเร็ว)"
1002220-7 = "[ns] \"ฮินะ ครูมาแล้ว!\""
1002220-8 = "อ๊ะ คุณครู..."
1002220-9 = "ฉันกังวลนิดหน่อยว่าจะเป็นอะไรรึเปล่า ที่จู่ๆ ก็ไปขอร้องอะไรกะทันหันแบบนี้..."
1002220-13 = "...แต่ยอมออกมาง่ายๆ เลย ขอบคุณนะคุณครู"
1002220-14 = "[s] \"ก็ฮินะขอร้องทั้งที ครูก็ต้องรีบมาหาอยู่แล้ว!\""
1002220-15 = "อ่า... "
1002220-16 = "...งั้นเหรอ คุณครูเองก็ตั้งใจมาที่นี่..."
1002220-17 = "...ฮิฮิ"
1002220-18 = "[s1] \"ถ้าเรื่องว่ายน้ำก็ไว้ใจครูได้เลย! ครูจะตั้งใจสอนสุดๆ ไปเลย!\"\n[s2] \"ครูไม่ค่อยรู้เรื่องว่ายน้ำเท่าไร แต่จะตั้งใจเต็มที่เพื่อฮินะเลยนะ!\""
1002220-19 = "พูดแบบนี้ ค่อยน่าวางใจหน่อย"
1002220-20 = "งะ...งั้นเหรอ...? "
1002220-21 = "[s3] \"ครูจะทำให้ดีที่สุด แล้วเรียนรู้ไปพร้อมกับฮินะแล้วกันนะ!\""
1002220-22 = "อ่า... อะ...อื้อ"
1002220-23 = "คุณครูมุ่งมั่นแบบนี้ ฉันก็คงจะยอมแพ้ไม่ได้แล้วละ"
1002220-24 = "พอเริ่มเรียนแล้ว ฉันจะตั้งใจเรียนเพื่อไม่ให้คุณครูต้องเสียเวลามากเกินไปแล้วกันนะ"
1002220-28 = "เห็นแบบนี้ การเรียนรู้ได้อย่างรวดเร็วก็เป็นจุดแข็งอย่างหนึ่งของฉันเลยนะ"
1002220-29 = "อย่ามัวคุยกันอยู่เลย เรารีบไป..."
1002220-33 = "[ns] \"อ๊ะ แบบนั้นก็แย่สิ!\""
1002220-34 = "หืม...? แย่งั้นเหรอ...?"
1002220-35 = "[s4] \"ไม่ต้องรีบ! ใช้เวลาของครูได้ตามสบายเลย!\"\n[s5] \"ถ้าไม่ใช้เวลาให้คุ้มค่าจะเป็นเทพนักว่ายน้ำไม่ได้เอานะ!\""
1002220-38 = "เดี๋ยวสิ แต่ว่าวันนี้เป็นวันหยุดพักผ่อนที่มีค่ามาก... เราไม่ได้จะมาเล่นด้วยกันสักหน่อย"
1002220-39 = "ต้องเสียเวลาทั้งวันมาสอนเด็กอย่างฉัน มันน่าเสียดายจะตาย..."
1002220-40 = "[s] \"ไม่ใช่แบบนั้นเลย! ครูรู้สึกเป็นเกียรติมากนะที่ได้ใช้เวลากับฮินะน่ะ\""
1002220-41 = "...จะ...จะได้ใช้เวลาใกล้ชิดกันสองคน...งะ...งั้นเหรอ?"
1002220-42 = "ถ้าเกิดสงสัยอะไร จะได้พิสูจน์กันที่นี่เลยงั้นเหรอ..."
1002220-43 = "ดะ...เดี๋ยวก่อน! ดะ...เดี๋ยวจะเป็นที่สนใจของคนอื่น ระ...เรื่องนั้นช่วยอดใจไว้ก่อนเถอะนะ คุณครู"
1002220-44 = "...จริงๆ เลยเชียว คนอย่างคุณครูนี่มัน..."
1002220-45 = "......"
1002220-46 = "...ฮิฮิ"
1002220-47 = "เรื่องนั้น... ก็สมกับเป็นคุณครูจริงๆ นั่นแหละ"
1002220-48 = "เข้าใจแล้ว ถ้างั้นวันนี้ก็ขอรบกวนด้วยนะ คุณครู "
1002220-49 = "[s] \"ดีละ! ไว้ใจครูได้เลย!\""
1002220-50 = "ถ้างั้น..."
1002220-57 = "คะ...คิดจะทำอะไรน่ะ?!"
1002220-58 = "จะ...จู่ๆ ก็ยิงปืนมาแบบไม่มีปี่มีขลุ่ยแบบนั้นได้ยังไงน่ะ! ทำแบบนี้ทำไมเนี่ย?!"
1002220-62 = "ทำไมถึงทำแบบนี้งั้นเหรอ? เฮอะ ถามเรื่องที่รู้ๆ กันอยู่แล้วทำไมเนี่ย!"
1002220-63 = "ฤดูร้อนที่แดดร้อนเปรี้ยงๆ มีแต่เด็กน้อยตัวปุ๊กปิ๊กน่ารำคาญเต็มไปหมดแบบนี้ ใครจะไปทนไหวกันเล่า!"
1002220-64 = "ก่อกวนให้เต็มที่เลย! "
1002220-65 = "ฉันจะก่อกวนทุกคนที่มาทำท่ามีความสุขที่นี่ให้หมดเลย!"
1002220-66 = "ไม่มีเหตุผลเอาซะเลย!"
1002220-71 = "[ns] \"ฮินะ นั่นมัน...!\""
1002220-73 = "รอแป๊บหนึ่งนะ... คุณครู"
1002220-74 = "ฉันจะรีบจัดการแล้วรีบกลับมา"
1002220-77 = "[ns] \"อ๊ะ ฮินะ!\""
1002220-81 = "อ๊ะ ยัยเปี๊ยกนั่นเป็นใครน่ะ?"
1002220-82 = "ตัวเล็กๆ ผมสีเงิน... เดี๋ยวก่อนนะ หรือว่ายัยเปี๊ยกนี่คือ...?!"
1002220-86 = "วะ...ว้ากกกกก?!"
1002220-87 = "ทำไมประธานกรรมการโรงเรียนเกเฮนน่าคนดังคนนั้นถึงมาอยู่ที่นี่ได้ล่ะ?! อ๊ากกก?!"
1002220-94 = "(ด้วยเหตุนั้น เหล่าเด็กเกเรที่ก่อความวุ่นวายก็ถูกฮินะสั่งสอนอย่างไร้ความปรานี...)"
1002220-97 = "ขะ...ขอบคุณมากเลยนะ! รอดมาได้เพราะเธอช่วยไว้แท้ๆ เลย!"
1002220-98 = "ไม่รู้จะขอบคุณยังไงดีเลย!"
1002220-99 = "...ไม่หรอก ฉันแค่ทำเรื่องที่ต้องทำก็เท่านั้น"
1002220-101 = "(หลังจากส่งพวกคนที่มาขอบคุณกลับไปแล้ว)"
1002220-106 = "[ns] \"เหนื่อยหน่อยนะ ฮินะ...\""
1002220-108 = "ไม่หรอก ไม่ใช่เรื่องใหญ่โตอะไรสักหน่อย"
1002220-109 = "พอถึงหน้าร้อนทีไร มักจะมีพวกเด็กเลือดร้อนออกมาอาละวาดน่ะ ที่โรงเรียนเราก็เคยมีอยู่บ่อยๆ เหมือนกัน"
1002220-110 = "จะเรียกว่าเกิดขึ้นตลอดก็คงไม่ผิด..."
1002220-111 = "[s] \"สมกับเป็นประธานกรรมการเกเฮนน่าจริงๆ!\""
1002220-112 = "โธ่... ไม่ใช่แบบนั้นสักหน่อย..."
1002220-117 = "[ns] \"หืม? ฮินะ เสียงเมื่อกี้...\""
1002220-118 = "อ๊ะ ห่วงยาง... ดูเหมือนห่วงยางจะรั่วน่ะ"
1002220-119 = "[s] \"ห่วงยางที่ฮินะพกติดตัวตลอดน่ะเหรอ...? ทำไมจู่ๆ ถึงรั่วได้...\""
1002220-120 = "คิดว่าคงจะพลาดโดนกระสุน ตอนที่สู้กับเจ้าพวกนั้นน่ะ"
1002220-121 = "ฉันคาดการณ์พลาดเอง "
1002220-122 = "ตอนที่ใส่ชุดว่ายน้ำสู้กับพวกเด็กเกเรควรจะต้องระวังให้มากกว่านี้แท้ๆ..."
1002220-123 = "มันเป็นอุปกรณ์ของคณะกรรมการวินัย เลยใช้มันมาตลอดจนถึงตอนนี้ และคิดว่าคราวนี้เองก็คงไม่น่า#nจะมีปัญหาอะไร เลยประมาทไปหน่อยน่ะ"
1002220-124 = "[s] \"ไม่ใช่ความผิดของฮินะสักหน่อย\""
1002220-125 = "ไม่หรอก คุณครู..."
1002220-126 = "ที่มันพังแบบนี้ก็เพราะฉันใช้มันแบบไม่ทะนุถนอมเอง"
1002220-127 = "ในเมื่อมันพังไปแล้ว... ก็คงช่วยไม่ได้... "
1002220-128 = "......"
1002220-129 = "[s] \"ถ้างั้นเราเอาไปซ่อมกันมั้ย?\""
1002220-130 = "เอาไปซ่อมงั้นเหรอ... ห่วงยางเนี่ยนะ?"
1002220-131 = "เรื่องนั้น... มันยากนะ"
1002220-132 = "เห็นแบบนี้ก็เถอะ ห่วงยางอันนี้เองก็เป็นอุปกรณ์ของคณะกรรมการวินัย ก็เลยทำมาจากวัสดุ#nชนิดพิเศษน่ะ "
1002220-133 = "ถ้าไม่เอาไปให้แผนกซ่อมบำรุงที่โรงเรียนซ่อมละก็ คงซ่อมไม่ได้ง่ายๆ หรอก"
1002220-134 = "ไม่คิดเลยว่าจะเกิดเรื่องแบบนี้ขึ้น ในตอนที่ขอให้คุณครูมาสอนว่ายน้ำให้เลย..."
1002220-135 = "คนอย่างฉันนี่มัน... เป็นแบบนี้เสมอๆ เลยนะ..."
1002220-136 = "......"
1002220-137 = "...แต่บางทีเป็นแบบนี้ก็อาจจะดีก็ได้นะ"
1002220-138 = "[s] \"ฮินะ?\""
1002220-139 = "มันเป็นของที่ฉันใช้มาตั้งแต่เด็กๆ ก็จริง แต่ก็คงจะใช้ไปตลอดก็ไม่ได้"
1002220-140 = "ฉันคิดว่า... ถ้าจะหัดว่ายน้ำจริงๆ จังๆ ละก็ควรจะต้องเลิกใช้ห่วงยาง...สักทีน่ะ"
1002220-141 = "ถึงจะน่าเสียดายอยู่บ้าง... แต่ก็คงต้องเลิกใช้แล้วละ"
1002220-142 = "...อื้อ ไม่มีห่วงยางก็คงไม่เป็นไรหรอก"
1002220-143 = "แบบนั้นจะช่วยให้ฝึกว่ายน้ำได้ดีขึ้นกว่าด้วย..."
1002220-144 = "......"
1002220-145 = "เอาละคุณครู ถ้างั้นก็ทิ้งห่วงยางไว้นี่ แล้วไปฝึกว่ายน้ำกัน..."
1002220-146 = "[s] \"การฝึกว่ายน้ำน่ะ ไม่ต้องใช้ห่วงยางได้ก็จริง\""
1002220-147 = "หืม...?"
1002220-148 = "[s] \"ก็อย่างที่ฮินะบอกแหละว่าสักวันก็ควรต้องเลิกใช้ห่วงยางว่ายน้ำด้วย\""
1002220-149 = "คุณครู...?"
1002220-150 = "[s] \"แต่มันก็ไม่จำเป็นว่าต้องเป็นตอนนี้สักหน่อยนี่นา?\""
1002220-151 = "...! เรื่องนั้น..."
1002220-152 = "ถึงคุณครูจะพูดแบบนั้นก็เถอะ..."
1002220-153 = "[s6] \"ยิ่งกว่านั้นครูยังไม่ได้เห็นภาพฮินะนั่งเล่นบนห่วงยางเลยนะ...!\"\n[s7] \"ครูยังไม่ได้เห็นความน่ารักตะมุตะมิของฮินะตอนเล่นห่วงยางเลยนะ!\""
1002220-156 = "คะ...คุณครู?!! จู่ๆ พูดอะไรออกมาน่ะ...?!"
1002220-157 = "ถ้าพูดเรื่องแบบนั้นด้วยสีหน้าจริงจังแบบนั้นละก็... ฉันก็จะโกรธแบบจริงจังแล้วเหมือนกันนะ"
1002220-158 = "[ns] \"แค่จะบอกว่ามาช่วยกันหาวิธีซ่อม ก่อนที่จะยอมแพ้ง่ายๆ ดีกว่าน่ะ!\""
1002220-160 = "[ns] \"แถมนี่ก็เป็นห่วงยางที่ฮินะใช้มาตั้งแต่เด็ก... เป็นของสำคัญไม่ใช่เหรอ?\""
1002220-161 = "คุณครู..."
1002220-162 = "...เฮ้อ จริงๆ เลย"
1002220-163 = "คุณครูน่ะชอบทำแบบนี้เสมอเลยนะ"
1002220-164 = "ถ้ายังยืนกรานแบบนั้น... เข้าใจแล้วละ"
1002220-165 = "[s8] \"ดีละ! เราลองไปหาร้านใกล้ๆ แถวนี้ดูก่อนดีมั้ย?\"\n[s9] \"จะต้องซ่อมห่วงยางให้ได้เลย!\""
1002220-169 = "(พอโน้มน้าวฮินะได้แล้ว คุณครูกับฮินะก็เริ่มออกตระเวนหาร้านซ่อมห่วงยางด้วยกัน)"
1002220-196 = "ถ้าแบบนี้ละก็ฉันซ่อมได้สบายๆ~"
1002220-197 = "...จริงเหรอ?"
1002220-198 = "อุปกรณ์ที่ทำจากวัสดุเฉพาะของเกเฮนน่างั้นเหรอ แบบนี้ยิ่งอยากลองวิชาใหญ่เลยแฮะ!"
1002220-199 = "ถ้างั้น..."
1002220-200 = "[s] \"ขอรบกวนด้วยนะ!\""
1002220-208 = "(การซ่อมแซมห่วงยางก็ผ่านไปได้ด้วยดี...)"
1002220-213 = "เท่านี้ก็เสร็จแล้วละ!"
1002220-214 = "[s] \"ขอบคุณมากเลย!\""
1002220-215 = "ขะ...ขอบคุณ..."
1002220-216 = "ไม่ต้องๆ ฉันต่างหากที่ต้องขอบคุณที่ทำให้ได้ฝึกวิชาใหม่ๆ ด้วยน่ะ! ถ้าหมดธุระแล้วขอตัวก่อนนะ!"
1002220-222 = "[ns] \"ฮู่ว... โชคดีจังเลยนะ ฮินะ!\""
1002220-223 = "อะ...อื้อ นั่นสินะ ซ่อมห่วงยาง... ที่นี่ได้จริงๆ ด้วย..."
1002220-224 = "จู่ๆ ก็มาพังกะทันหันแบบนี้... คิดว่าเป็นเรื่องที่ช่วยไม่ได้แล้วแท้ๆ..."
1002220-225 = "...ขอบคุณนะ คุณครู "
1002220-226 = "[s] \"ครูยินดีเสมอเลย\""
1002220-230 = "แต่ว่า... เรามัวแต่หาร้านซ่อมห่วงยาง จนเวลาผ่านมาขนาดนี้เลยเหรอเนี่ย..."
1002220-231 = "...ขอบคุณนะคุณครู ที่วันนี้อยู่ด้วยกันทั้งวันเลย "
1002220-232 = "ฉันเป็นคนขอให้คุณครูออกมา จะให้คุณครูเสียเวลาอยู่ด้วยจนมืดกว่านี้ก็คงไม่ดี"
1002220-233 = "[s] \"ยังหรอก ฮินะ มันยังไม่จบแค่นี้หรอกนะ\""
1002220-234 = "เอ๋...?"
1002220-235 = "[s10] \"ก็ครูสัญญากับฮินะไว้แล้วนี่นา\"\n[s11] \"ครูสัญญาแล้วนี่ว่าจะซ่อมห่วงยาง แล้วจะสอนว่ายน้ำให้น่ะ\""
1002220-240 = "[ns12] \"อาจจะช้าไปสักหน่อย...\"\n[ns13] \"เรามาเริ่มเรียนว่ายน้ำกันเลยดีมั้ย?\""
1002220-241 = "อ่า..."
1002220-242 = "อ่า..."
1002220-243 = "ไม่ว่าเมื่อไรคุณครู... ก็ยังทำเพื่อฉันตลอดเลยนะ..."
1002220-249 = "อื้ม"
1002220-250 = "ถ้าคุณครูโอเค ฉันก็พร้อมเสมอ..."
1002220-255 = "ฉันเองก็จะพยายามตั้งใจเรียนรู้จากคุณครูให้เต็มที่เลยนะ "
1002220-260 = "(หลังจากนั้น คุณครูก็สอนฮินะว่ายน้ำอย่างสนุกสนาน จนเวลาล่วงเลยไปจนฟ้ามืด)"

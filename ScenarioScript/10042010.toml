[translation]
10042010-1 = "第1話;奇蹟……？"
10042010-2 = "咖啡廳．廚房"
10042010-3 = "咦……？"
10042010-4 = "怎麼好像，真的做出了看起來還不錯的東西……？"
10042010-5 = "不行，茱莉！清醒一點，不可以自欺欺人！"
10042010-9 = "以防萬一，還是先試吃一小口確認一下吧……"
10042010-10 = "啊，茱莉同學，鬆餅做好了是嗎？#n那我就拿出去囉，客人已經在催了！"
10042010-16 = "咦，店長！？#n請等一下──！"
10042010-22 = "鬆餅終於來了！我看看……"
10042010-23 = "（不，不行啊！我還沒確認過……！）"
10042010-24 = "嗯！這間咖啡廳的鬆餅果然從來不會讓人失望。"
10042010-25 = "唔……我也要吃一口。"
10042010-26 = "喂，你那哪叫一口啊？根本吃了一半嘛！"
10042010-27 = "誰叫你要吃得那麼享受的樣子！"
10042010-28 = "咦……？"
10042010-29 = "（我做的東西……很好吃？）"
10042010-30 = "（這……該不會是夢吧？#n　沒錯，這個可能性非常高）"
10042010-34 = "好痛！"
10042010-35 = "（所以這……是現實嗎？真的假的！？）"
10042010-36 = "嗯？怎麼了，茱莉同學？#n啊哈哈，是來看自己做的鬆餅有多好吃的嗎？"
10042010-37 = "我懂你的心情。#n看著自己做的餐點被端上桌，確實是件令人興奮的事。"
10042010-38 = "不過不好意思，現在積了很多訂單，可能要麻煩你回到廚房繼續做鬆餅了。"
10042010-39 = "咦……？"
10042010-40 = "是，店長！我會努力的！"
10042010-42 = "哇……竟然積了這麼多訂單……"
10042010-43 = "不，不對！現在不是感嘆的時候，得快點烤鬆餅才行！"
10042010-48 = "完成！下一單！"
10042010-57 = "這邊做好了！麻煩送餐！"
10042010-61 = "謝謝你，茱莉同學！拜託你繼續保持這個節奏了！"
10042010-68 = "再來再來！"
10042010-77 = "繼續努力！"
10042010-82 = "等等……剛才是不是有什麼奇怪的東西跑了過去？"
10042010-83 = "可能是錯覺吧。畢竟現在這麼忙！"
10042010-84 = "沒想到忙碌也能讓人這麼開心，甚至覺得幸福！"
10042010-87 = "呀啊啊啊啊啊啊！？"
10042010-88 = "咦？"
10042010-89 = "是……慘叫聲？"
10042010-92 = "這，這這這，這是什麼詭異的東西啊！？"
10042010-93 = "又紫又綠的……還一直在蠕動！"
10042010-97 = "唔！有東西噴到我的衣服上了！而且還黏答答的！"
10042010-98 = "總之先逃再說！"
10042010-104 = "那是什麼啊！#n噫噫！往這邊過來了！！！"
10042010-110 = "啊啊啊啊！救命啊！#n我不好吃！一點都不好吃！走開啦！"
10042010-111 = "不不不，不是這邊！#n過去那邊！不然去找他也可以！"
10042010-112 = "你這樣還算朋友嗎！"
10042010-117 = "不，不行啊！不能攻擊客人！"
10042010-123 = "哇啊！？！？"
10042010-124 = "客，客人！？"
10042010-132 = "茱，茱莉同學！？你沒事吧？#n有沒有受傷？那個東西突然從廚房裡跑出來！"
10042010-133 = "我還以為茱莉同學也被它攻擊了……"
10042010-134 = "咦？嗯，我沒事。#n不過那個東西……！"
10042010-141 = "逃走了！"
10042010-142 = "怎，怎麼辦？#n要是它跑到外面去的話，咖啡廳的風評就……"
10042010-143 = "謝謝你擔心我們咖啡廳的風評，不過那種東西本來就不該到處亂跑吧……"
10042010-147 = "電話？這種時候會是誰呢……？"
10042010-151 = "這個號碼是……老，老師！？"
10042010-156 = "喂？老師……？"
10042010-157 = "[s]「嗨，茱莉！打工還順利嗎？」"
10042010-158 = "打，打工是嗎？#n那個，該怎麼說呢……"
10042010-159 = "[s1]「你的聲音怎麼了？發生什麼事了嗎？」\n[s2]「我聽說茱莉今天在打工，想說傍晚要去看看你呢。」"
10042010-162 = "就，就是……！"
10042010-169 = "呀啊啊啊──！！怪物鬆餅它──！！"
10042010-170 = "噫噫──！？往那邊逃走了！！"
10042010-174 = "……茱莉！？#n剛才那個聲音是……！？"
10042010-175 = "前，前輩！？#n前輩現在跟老師在一起嗎？"
10042010-176 = "啊，嗯。#n我剛好收到老師的聯絡……"
10042010-177 = "[s3]「我大致了解狀況了……雖然也不是很懂。」\n[s4]「總之我們會盡快趕過去。」"
10042010-180 = "但，但是這樣的話，前輩的假日就……！"
10042010-186 = "沒關係的，茱莉。#n我之前應該也說過吧。"
10042010-187 = "我真的不介意。"
10042010-188 = "很謝謝你這麼為我著想。#n總之……"
10042010-189 = "先想辦法盡快解決問題吧。"
10042010-190 = "是，是……"
10042010-194 = "[ns]（等等，既然事情變成這樣……）"
10042010-196 = "格黑娜．風紀委員會部室"
10042010-199 = "怎麼，有電話？"
10042010-203 = "嗯？這個號碼是……？"
10042010-207 = "喂～老師？"
10042010-208 = "[s]「伊織，你現在有空嗎？」"
10042010-209 = "……問我有沒有空？怎麼突然問這個？"
10042010-210 = "[s5]「可以麻煩你跑一趟嗎？」\n[s6]「那個……好像要你親自過來一趟比較好。」"
10042010-213 = "怎，怎麼這麼突然？#n你又捲入奇怪的事件了嗎？"
10042010-214 = "[s7]「真不愧是伊織，一下就猜到了！」\n[s8]「可以這麼說吧。總之拜託你了。」"
10042010-217 = "好吧……我知道了……"
10042010-222 = "……是老師嗎？"
10042010-223 = "對啊……他好像需要幫助的樣子。"
10042010-224 = "會不會是什麼嚴重的事……"
10042010-225 = "怎麼可能？他是老師耶。#n八成只是什麼無聊的小事而已。"
10042010-226 = "這裡可是格黑娜。#n除非出現不明怪物之類的東西，不然哪能算得上「大事」呢。"
10042010-227 = "說的也是。總之先去看看吧。"
10042010-232 = "嗯，出發吧！！"

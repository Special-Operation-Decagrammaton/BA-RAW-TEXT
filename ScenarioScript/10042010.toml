[translation]
10042010-1 = "ตอนที่ 1;ปาฏิหาริย์...?"
10042010-2 = "ครัวในคาเฟ่"
10042010-3 = "หืม...?"
10042010-4 = "ทำไมออกมาดูใช้ได้เลยล่ะ...?"
10042010-5 = "ไม่หรอก จูริ! ตั้งสติหน่อย! อย่าโกหกตัวเองสิ!"
10042010-9 = "ลองเช็กดูเพื่อความชัวร์ดีกว่า ขอหยิบมาชิมแค่นิดเดียว..."
10042010-10 = "อ๊ะ แม่หนูจูริทำแพนเค้กเสร็จแล้วสินะ งั้นเดี๋ยวจะเอาไปเลยนะ พอดีต้องรีบเสิร์ฟแล้วน่ะ!"
10042010-16 = "เอะ... เอ๋?! คุณผู้จัดการร้าน? เดี๋ยวก่อนค่ะ!"
10042010-22 = "ได้สักทีสินะ! ไหนขอชิมหน่อย..."
10042010-23 = "(มะ... ไม่ได้นะ! ฉันยังไม่ได้เช็กเลย...!)"
10042010-24 = "อื้อ! แพนเค้กของร้านนี้ไม่ทำให้ผิดหวังจริงๆ เลยนะ"
10042010-25 = "งั้นเหรอ... งั้นฉันขอกินคำหนึ่ง"
10042010-26 = "นี่ นั่นน่ะเหรอเรียกว่าคำหนึ่ง? ตักไปครึ่งหนึ่งแล้วนะ!"
10042010-27 = "ก็เธอกินน่าอร่อยเองนี่ เธอนั่นแหละที่ผิด!"
10042010-28 = "หืม...?"
10042010-29 = "(อร่อย... งั้นเหรอ...? แพนเค้กที่ฉันทำน่ะนะ...?)"
10042010-30 = "(นี่ฉัน... ไม่ได้ฝันไปใช่มั้ย? ใช่ อาจจะเป็นความฝันก็ได้ เป็นไปได้สูงเลยละ)"
10042010-34 = "โอ๊ยเจ็บ!"
10042010-35 = "(ถ้างั้นนี่ก็... เป็นความจริงน่ะสิ? จริงเหรอเนี่ย?!)"
10042010-36 = "หืม? มีอะไรเหรอแม่หนูจูริ? อ้อ มาดูว่าแพนเค้กที่ตัวเองทำอร่อยหรือเปล่าสินะ?"
10042010-37 = "เข้าใจได้ๆ พอเห็นอาหารของตัวเองถูกเสิร์ฟให้คนอื่นกินเป็นเรื่องที่น่าตื่นเต้นเลยเชียวละ"
10042010-38 = "แต่ตอนนี้มีออเดอร์เข้ามาเยอะเลย ต้องขอโทษด้วยนะ แต่เข้าไปช่วยงานในครัวอีกสักหน่อยได้มั้ย?"
10042010-39 = "คะ...?"
10042010-40 = "ค่ะ ได้ค่ะ! คุณผู้จัดการร้าน! ฉะ... ฉันจะทำให้เต็มที่เลยค่ะ!"
10042010-42 = "โห... ออเดอร์เข้ามาเยอะขนาดนี้เลย..."
10042010-43 = "ไม่สิ ไม่ได้ๆ! หยุดตกใจแล้วไปทอดแพนเค้กสิจูริ!"
10042010-48 = "เสร็จแล้วค่ะ! รับออเดอร์ต่อไปค่ะ!"
10042010-57 = "จานนี้เรียบร้อยแล้วค่ะ! รับไปได้เลยค่ะ!"
10042010-61 = "ขอบใจนะ แม่หนูจูริ ขอแค่ทำได้ดีแบบนี้เรื่อยๆ ก็พอแล้วละ!"
10042010-68 = "ออเดอร์ต่อไปค่ะ!"
10042010-77 = "เปิดเตาต่อเลยค่ะ!"
10042010-82 = "เดี๋ยวนะ... เมื่อกี้เหมือนมีอะไรแปลกๆ ผ่านหน้าไปเลย?"
10042010-83 = "หรือว่าฉันจะคิดไปเองนะ คงทำงานเยอะจนตาฝาดไปเองละมั้ง อื้อ!"
10042010-84 = "คิดไม่ถึงเลยว่าจะได้ทำอาหารจนมือเป็นระวิงแบบนี้ มีความสุขจังเลย!"
10042010-87 = "ว้ายยยยยยย?!"
10042010-88 = "หืม?"
10042010-89 = "เสียงกรีดร้องเหรอ...?"
10042010-92 = "นะ... นะนะนะนะ... นี่มันอะไรเนี่ย?! ตัวอะไรแปลกๆ น่ะ!?"
10042010-93 = "ตัวอะไรเนี่ย!? เขียวๆ ม่วงๆ... แถมยังดิ้นดุ้กดิ้กอีก!"
10042010-97 = "อึก! กระเด็นมาโดนเสื้อผ้าแล้ว! เหนียวเหนอะหนะไปหมดเลย!"
10042010-98 = "ออกไปจากที่นี่ก่อนเถอะ!"
10042010-104 = "นั่นตัวอะไรน่ะ! เฮือกกกก? มาทางนี้แล้ว!!!"
10042010-110 = "อ๊ากกกก! ช่วยด้วย! ฉันไม่อร่อยหรอกนะ! อย่ามากินฉัน! ไปทางโน้นเลย!"
10042010-111 = "ไม่ได้นะ! ห้ามมาทางนี้สิ! ไปทางโน้น! ไม่ก็ไปหายัยนั่นแทน!"
10042010-112 = "ยังเห็นฉันเป็นเพื่อนมั้ยเนี่ย!"
10042010-117 = "มะ... ไม่นะ! อย่ารังแกลูกค้าสิ!"
10042010-123 = "เฮือก!!??"
10042010-124 = "คะ... คุณลูกค้า?!?!?!"
10042010-132 = "มะ... แม่หนูจูริ?! เป็นอะไรหรือเปล่า!? บาดเจ็บตรงไหนมั้ย? จู่ๆ ก็มีตัวอะไรโผล่ออกมาจากครัวเฉยเลย!"
10042010-133 = "นึกว่าแม่หนูจูริอาจจะโดนโจมตีก่อนใครก่อนเสียอีกน่ะ..."
10042010-134 = "คะ? อ้อ ฉันไม่เป็นอะไรค่ะ แต่ฉันว่าเราต้องจัดการเจ้านั่นก่อน...!"
10042010-141 = "หนีไปซะแล้ว!"
10042010-142 = "ทะ... ทะทะทะทะ... ทำยังไงดีคะ? หากมันออกไปข้างนอก ชื่อเสียงของคาเฟ่ก็คง..."
10042010-143 = "ขอบใจที่เป็นห่วงชื่อเสียงของคาเฟ่เรานะ แต่เราไม่ควรให้ตัวอะไรแบบนั้นออกไปข้างนอก#nตั้งแต่แรกหรือเปล่า...?"
10042010-147 = "มีโทรศัพท์มา? ใครโทรมาตอนนี้นะ...?"
10042010-151 = "นี่มันเบอร์ของ... คะ... คุณครู?!"
10042010-156 = "ฮัลโหล? คุณครู...?"
10042010-157 = "[s] \"จูริ! กำลังยุ่งอยู่ล่ะสิ งานพาร์ทไทม์เป็นยังไงบ้าง?\""
10042010-158 = "งานพาร์ทไทม์... เหรอคะ? เอ่อ... คือว่า..."
10042010-159 = "[s1] \"ทำไมเสียงเป็นแบบนั้นล่ะ? เกิดเรื่องอะไรเหรอ?\n[s2] \"ไว้ตอนเย็นๆ ครูว่าจะแวะไปหาที่คาเฟ่สักหน่อย\""
10042010-162 = "คะ... คือว่าตอนนี้...!"
10042010-169 = "ว้ายยยย!! สัตว์ประหลาดแพนเค้ก!!"
10042010-170 = "เฮือกก!? หนีไปทางโน้นแล้ว!!"
10042010-174 = "...!? จูริ!? เสียงเมื่อกี้มัน...!?"
10042010-175 = "ระ... รุ่นพี่!? ตอนนี้รุ่นพี่อยู่กับคุณครูเหรอคะ??"
10042010-176 = "อ้อ อื้อ พอดีคุณครูติดต่อมาน่ะ..."
10042010-177 = "[s3] \"ครูพอจะเข้าใจสถานการณ์แล้ว เดี๋ยวจะรีบไปหานะ\"\n[s4] \"พวกเราจะรีบไปที่นั่นทันทีเลย\""
10042010-180 = "งะ... งั้นวันหยุดของรุ่นพี่ก็...!"
10042010-186 = "ไม่เป็นไรหรอก จูริ ถึงจะเคยบอกไปแล้ว"
10042010-187 = "แต่ว่าฉันไม่เป็นไรจริงๆ"
10042010-188 = "ขอบใจที่คิดแบบนั้นนะ ขอบใจจริงๆ เอาเป็นว่า..."
10042010-189 = "เรารีบแก้ปัญหานี้กันก่อนดีกว่า"
10042010-190 = "ค่ะ ค่ะ..."
10042010-194 = "[ns] (เดี๋ยวนะ สถานการณ์ลุกลามไปขนาดนี้เลยเหรอ...)"
10042010-196 = "ห้องคณะกรรมการวินัยเกเฮนน่า"
10042010-199 = "อะไรน่ะ มีคนโทรมาเหรอ?"
10042010-203 = "หืม? เบอร์นี้มัน...?"
10042010-207 = "ฮัลโหล คุณครู?"
10042010-208 = "[s] \"อิโอริ ตอนนี้ยุ่งอยู่หรือเปล่า?\""
10042010-209 = "...? ทำไม? จู่ๆ มีอะไรเหรอ?"
10042010-210 = "[s5] \"มาช่วยอะไรสักหน่อยได้มั้ย?\"\n[s6] \"เอ่อ... ครูว่าน่าจะต้องมาดูเองนะ\""
10042010-213 = "อะ... อะไรอีกเนี่ย ไปเกี่ยวข้องกับเรื่องอะไรแปลกๆ อีกแล้วหรือไง?"
10042010-214 = "[s7] \"นี่ละอิโอริ รู้จักครูดีจริงๆ เลย!\" \n[s8] \"จะว่าอย่างนั้นก็ได้ ยังไงก็รบกวนด้วยนะ\""
10042010-217 = "ก็นะ... ให้ไปช่วยก็ได้..."
10042010-222 = "สายจากคุณครูเหรอคะ...?"
10042010-223 = "อื้อ... เหมือนว่าต้องการความช่วยเหลืออยู่น่ะ"
10042010-224 = "เกิดเรื่องใหญ่อะไรขึ้นหรือเปล่าคะ..."
10042010-225 = "ไม่มีทางหรอก นั่นคุณครูเชียวนะ คงเป็นเรื่องเหลวไหลมากกว่าเรื่องซีเรียสอยู่แล้ว"
10042010-226 = "อีกอย่างนะ ที่นี่คือเกเฮนน่า ถ้าไม่ถึงกับมีสัตว์ประหลาดปริศนาหรืออะไรทำนองนั้นโผล่ออกมา ก็คงไม่ถึงกับเป็น 'เรื่องใหญ่' หรอก"
10042010-227 = "นั่นสินะคะ แต่ไปดูก็น่าจะรู้ค่ะ"
10042010-232 = "งั้นฉันจะไปเดี๋ยวนี้ละ!!"

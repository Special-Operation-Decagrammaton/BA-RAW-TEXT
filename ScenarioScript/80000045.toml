[translation]
80000045-1 = "I Want to Be First, Sensei"
80000045-2 = "I received a call from Midori the day before Valentine's day."
80000045-3 = "Um, Sensei. Do you have any plans tomorrow morning?"
80000045-4 = "Y-You don't?"
80000045-5 = "Th-Then...if it's okay with you, can you meet me at 7AM tomorrow?!"
80000045-6 = "[s] \"Sure, but why so early?\""
80000045-7 = "I-I'll explain tomorrow!"
80000045-8 = "See you then!"
80000045-13 = "Valentine's Day morning."
80000045-18 = "[ns] \"This is the spot. I wonder where Midori is.\""
80000045-22 = "I observed my surroundings and took in the cool morning air as I waited for Midori to arrive."
80000045-26 = "*pant* It took me way longer to get ready than I thought it would!"
80000045-27 = "Am I late? This is so embarrassing. And I'm the one who asked Sensei here in the first place..."
80000045-28 = "[s] \"Hey, Midori. Over here.\""
80000045-29 = "S-Sensei?! How long have you been here?!"
80000045-30 = "S-Sorry! I know how rude it is to show up late after asking you to meet me here so early..."
80000045-31 = "[s1] \"It's fine. I haven't been here that long.\"\n[s2] \"That's okay. So what did you want to talk about?\""
80000045-32 = "Oh, um... The reason I asked you here is..."
80000045-33 = "Oh, um... The reason I asked you here is..."
80000045-34 = "(C-Calm down. I rehearsed this a bunch of times with Momoi!#nI just need to take deep breath and do it!)"
80000045-35 = "*gulp* *inhale* *exhale* You can do this..."
80000045-36 = "*inhale*... *yawn*..."
80000045-41 = "Wh-Why am I yawning right now?! Oh, it's because I didn't get much sleep last night..."
80000045-42 = "[s] \"You didn't? Were you up all night gaming again?\""
80000045-43 = "N-No! Why would I do that before today?!"
80000045-44 = "I'm the one who arranged these plans in the first place.#nThe last thing I would do is be late because I played games all night..."
80000045-45 = "That would be tragic! How could you think I would do something like that?!"
80000045-46 = "[s] \"I was just joking. I'm sure you had a good reason to be late.\""
80000045-47 = "You mean it...?"
80000045-48 = "[s] \"Yeah, of course. Feel better now?\""
80000045-49 = "You're always like that, Sensei..."
80000045-50 = "But, yeah. I do feel better."
80000045-51 = "Anyway, the real reason I didn't get much sleep last night was because..."
80000045-52 = "Because..."
80000045-53 = "Ugh. This is so hard to say..."
80000045-54 = "No! I can't give up! My entire strat will go out the window if I do that!"
80000045-55 = "[s] \"Come again?\""
80000045-56 = "The reason I asked you to meet me this morning was because I wanted to give you this."
80000045-60 = "[ns] \"Is this what I think it is?\""
80000045-61 = "I made this chocolate myself. There was a lot of trial and error involved,#nso that's why I didn't get much sleep last night."
80000045-62 = "It had to be the best I could possibly make because..."
80000045-63 = "...I wanted to take the first turn today."
80000045-64 = "[s] \"First turn?\""
80000045-65 = "...!"
80000045-66 = "N-Nothing! All I said was I worked really hard to make this chocolate!"
80000045-67 = "Let me know what you think of it...later, I mean! Shoot me a message on MomoTalk! I'll be waiting!"
80000045-71 = "[ns] \"Uh, sure. I'll do that.\""
80000045-72 = "I stood there still puzzled as Midori hurriedly walked away."

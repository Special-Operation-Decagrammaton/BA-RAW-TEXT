80000045-41 = "5;미도리;04;앗?! 하, 하필 이럴 때 제멋대로 하품이……! 그, 제, 제대로 잠을 못 잤더니…….\n#5;em;[///]\n#5;stiff"
80000045-42 = "[s] \"잠을 설친 거야? 밤새 게임이라도 했다던가?\""
80000045-43 = "5;미도리;05;그, 그럴 리가 없잖아요!\n#5;em;[!]\n#5;hophop"
80000045-44 = "5;미도리;07;미리 이른 아침에 약속을 잡은 주제에, 상대보다 늦었는데, 하필 그 이유가 밤새서 게임을 하느라 늦은 거라면……."
80000045-45 = "5;미도리;04;뭔가요! 그거, 최악이잖아요! 서, 설마. 정말 그렇게 생각하신 건 아니죠?! 네?!\n#5;em;[땀]\n#5;stiff"
80000045-46 = "[s] \"농담이야. 미도리라면 이유가 있을 테니까.\""
80000045-47 = "5;미도리;06;그, 그러신가요……? 아, 흠흠.\n#5;em;[...]"
80000045-48 = "[s] \"어때, 진정했어?\""
80000045-49 = "5;미도리;02;아……. 선생님은 처음부터, 저를 배려해 주셔서…….\n#5;greeting"
80000045-50 = "5;미도리;07;……네. 덕분에 진정했어요.\n#5;em;[///]"
80000045-51 = "5;미도리;07;선생님. 제가 제대로 잠을 못 잔 이유는 다른 게 아니라……."
80000045-52 = "5;미도리;06;다른 게 아니라…….\n#5;em;[...]"
80000045-53 = "5;미도리;04;……다, 다른……. 으, 으으……. 마, 막상 여기까지 오니 고민이…….\n#5;stiff\n#fontsize;55"
80000045-54 = "5;미도리;05;아뇨! 여기까지 온 이상 망설여선 안 돼요……. 그래선 공략할 수 있는 것도 공략 못 할 테니까!\n#5;em;[땀]\n#5;jump"
80000045-55 = "[s] \"……응?\""
80000045-56 = "5;미도리;05;오늘 이렇게 아침 일찍 선생님을 보자고 한 이유는 바로 이걸 전해 드리고 싶어서였어요.\n#5;em;[반응]\n#5;m1"

80000045-59 = "5;미도리;05\n#5;greeting\n#wait;2000"
80000045-60 = "[ns] \"응? 미도리? 이건……?\""
80000045-61 = "5;미도리;04;제가 직접 만든 초콜릿이에요. 밤새 이걸 만들려고 갖은 시행착오를 하느라, 잠을 제대로 못 잤어요.\n#5;em;[땀]\n#5;stiff"
80000045-62 = "5;미도리;02;아……. 그렇게까지 한 이유요? 그건 그야…….\n#5;m3"
80000045-63 = "5;미도리;03;다른 누구보다, 제가, 저 자신이 선생님의 처음이 되고 싶었으니까요.\n#5;em;[///]\n#5;greeting"
80000045-64 = "[s] \"처음……?\""
80000045-65 = "5;미도리;02;……!!\n#5;stiff"
80000045-66 = "5;미도리;04;아, 그, 그니까! 여, 열심히 노력해서 만든 초콜릿이니까!\n#5;em;[!]\n#5;hophop"
80000045-67 = "5;미도리;04;부디, 먹고 나서 나중에, 감상……. 모모톡으로 반드시 들려주셔야 하니까요! 기다리고 있을 거예요!"

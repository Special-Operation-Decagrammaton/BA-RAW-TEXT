80000045-24 = "#clearST"
80000045-25 = "#wait;1000"
80000045-26 = "5;미도리;04;하아……. 하아……. 새, 생각보다 마지막 마무리가 너무 오래 걸려버렸어!\n#5;al"
80000045-27 = "5;미도리;06;아. 아직……. 늦지 않았지? 먼저 불러냈으면서 정작 본인이 늦으면……. 그것보다 꼴사나운 일이 있을 리가…….\n#5;em;[땀]"
80000045-28 = "[s] \"앗, 미도리. 여기야.\""
80000045-29 = "5;미도리;04;서, 선생님?! 머, 먼저 나와 계셨던 건가요?!\n#5;em;[?!]\n#5;jump"
80000045-30 = "5;미도리;04;죄, 죄송해요……! 제가 먼저 선생님을 뵙고 싶다고 말씀드렸는데, 정작 당사자가 늦어 버리다니…….\n#5;m3"
80000045-31 = "[s1] \"아냐. 그렇게 오래 안 기다렸어.\"\n[s2] \"그보다 어쩐 일이야? 이렇게 이른 아침에.\""
80000045-32 = "5;미도리;07;아, 그게, 다른 게 아니라……. 그러니까. 으음.\n#5;em;[땀]\n#5;stiff"
80000045-33 = "5;미도리;07;아, 그게, 다른 게 아니라……. 그러니까. 으음.\n#5;em;[땀]\n#5;stiff"
80000045-34 = "5;미도리;99;(지, 진정해. 오늘만을 위해 몇 번이고 언니를 상대로 시뮬레이션 해왔잖아! 그, 그러니까! 눈 딱 감고! 심호흡을 해서……!)\n#5;closeup"
80000045-35 = "5;미도리;04;(꿀꺽) 후, 후아아……… 후아, 후아. 기, 긴장하지 말고…….\n#5;closeup\n#5;hophop\n#fontsize;55"
80000045-36 = "5;미도리;99;후아……. 후, 후아아암…….\n#5;em;[재잘]\n#5;closeup\n#5;greeting"

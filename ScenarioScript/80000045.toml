[translation]
80000045-1 = "ฉันอยากเป็นคนแรกค่ะ"
80000045-2 = "(คุณครูได้รับข้อความจากมิโดริในคืนก่อนวันวาเลนไทน์)"
80000045-3 = "คือว่า... คุณครู พรุ่งนี้เช้าคุณครูมีตารางงานที่ไหนรึเปล่าคะ...?"
80000045-4 = "ชะ...ช่วงเช้าว่างเหรอคะ...?"
80000045-5 = "ถะ...ถ้างั้น...! ถะ...ถ้าคุณครูสะดวก พรุ่งนี้ตอนเจ็ดโมงเช้า ระ...เราออกมาเจอกันหน่อยได้มั้ยคะ?"
80000045-6 = "[s] \"ได้อยู่แล้ว แต่ทำไมนัดเช้าจัง มีอะไรรึเปล่า\""
80000045-7 = "มะ...ไม่มีอะไรค่ะ รายละเอียดเอาไว้พรุ่งนี้... พะ...พรุ่งนี้เช้าฉันจะบอกให้นะคะ!"
80000045-8 = "ถ้างั้น... พรุ่งนี้เจอกันนะคะ แล้วฉันจะรอค่ะ!"
80000045-13 = "(เช้าวันวาเลนไทน์...)"
80000045-18 = "[ns] \"นัดเจอกันตรงนี้นี่นา มิโดริอยู่ไหนนะ?\""
80000045-22 = "(คุณครูยืนรอมิโดริพร้อมกับมองหาไปรอบๆ ท่ามกลางอากาศเย็นในตอนเช้าตรู่)"
80000045-26 = "แฮ่ก... แฮ่ก... ชะ...ใช้เวลาทำนานเกินกว่าที่คิดไปหน่อย!"
80000045-27 = "อ๊ะ ฉะ...ฉันไม่ได้มาช้าใช่มั้ย? ทั้งที่ฉันเป็นคนโทรเรียกแท้ๆ แต่กลับดันมาสายเอง... ไม่คิดเลยว่าจะเป็นแบบนี้"
80000045-28 = "[s] \"อ๊ะ มิโดริ ทางนี้ๆ\""
80000045-29 = "คะ... คุณครู?! มาถึงแล้วเหรอคะ?!"
80000045-30 = "ขะ...ขอโทษค่ะ...! ฉันเป็นคนชวนคุณครูออกมาแท้ๆ แต่กลับมาสายซะเอง..."
80000045-31 = "[s1] \"ไม่หรอก ครูก็เพิ่งมาถึง\"\n[s2] \"มีเรื่องอะไรถึงเรียกออกมาแต่เช้าเหรอ?\""
80000045-32 = "อ่า... งั้นเหรอคะ คือว่าที่ฉันเรียกคุณครูออกมาวันนี้..."
80000045-33 = "คือว่าเรื่องนั้น... คือว่า... เอ่อ..."
80000045-34 = "(จะ...ใจเย็นๆ เราซ้อมกับพี่มาตั้งหลายครั้งเพื่อวันนี้แล้วนี่! พะ...เพราะงั้น...! หลับตาแล้วก็#nสูดหายใจเข้าลึกๆ ...!)"
80000045-35 = "(กลืนน้ำลาย) ฟู่ว... ฟู่ววว... ยะ...อย่าตื่นเต้น..."
80000045-36 = "ฮะ...ฮ้าววว~~"
80000045-41 = "อ๊ะ! ดันมาหาวในเวลาแบบนี้ซะได้...! ตะ... ต้องเป็นเพราะฉันนอนไม่พอแน่เลยค่ะ"
80000045-42 = "[s] \"นอนไม่พอ? เล่นเกมโต้รุ่งอีกแล้วเหรอ?\""
80000045-43 = "มะ...ไม่ใช่แบบนั้นนะคะ!"
80000045-44 = "ฉันเป็นคนนัดคุณครูออกมาตอนเช้าแบบนี้ ถ้าเกิดฉันมาสายเพราะเล่นเกมโต้รุ่งคงไม่ดีแน่ๆ ค่ะ..."
80000045-45 = "แบบนั้นคงแย่มากๆ แน่เลยค่ะ! ระ...หรือว่าคุณครูคิดแบบนั้นจริงๆ คะ?!"
80000045-46 = "[s] \"ครูแค่ล้อเล่นน่ะ มิโดริคงมีเหตุผลที่มาช้าใช่มั้ยล่ะ\""
80000045-47 = "งะ...งั้นเหรอคะ? อืมมม..."
80000045-48 = "[s] \"เป็นยังไงบ้าง ใจเย็นขึ้นบ้างรึยัง?\""
80000045-49 = "คุณครูยอมให้ฉันเสมอเลยนะคะ..."
80000045-50 = "ฉันใจเย็นขึ้นแล้วค่ะ"
80000045-51 = "คุณครู ที่ฉันนอนไม่พอน่ะ..."
80000045-52 = "มันเป็นเพราะว่า..."
80000045-53 = "ปะ...เป็นเพราะ... ฮือ... อุตส่าห์มาถึงที่นี่แล้วดันพูดไม่ออกอีก..."
80000045-54 = "เดี๋ยวสิ! มาถึงที่นี่แล้วจะมาลังเลแบบนี้ไม่ได้สิ ไม่งั้นความพยายามตั้งแต่แรกคงสูญเปล่าแน่!"
80000045-55 = "[s] \"หืม...?\""
80000045-56 = "ที่ฉันขอให้คุณครูออกมาเจอกันตอนเช้าตรู่แบบนี้ก็เพราะฉันมีของที่อยากให้คุณครูค่ะ"
80000045-60 = "[ns] \"มิโดริ นี่มัน...?\""
80000045-61 = "ช็อกโกแลตที่ฉันทำเองค่ะ ฉันลองผิดลองถูกอยู่ทั้งคืนเพื่อทำช็อกโกแลตนี่... เลยนอนไม่พอค่ะ"
80000045-62 = "อ่า... ทำไมฉันต้องทำถึงขนาดนี้น่ะเหรอคะ? เรื่องนั้นก็เพราะว่า..."
80000045-63 = "ฉะ...ฉันอยากให้ช็อกโกแลตคุณครูเป็นคนแรกค่ะ..."
80000045-64 = "[s] \"คนแรก...?\""
80000045-65 = "...!!"
80000045-66 = "มะ...ไม่มีอะไรหรอกค่ะ! ที่ฉันจะบอกก็คือฉันตั้งใจทำช็อกโกแลตนี่มากๆ เลยค่ะ!"
80000045-67 = "พะ...เพราะงั้นไว้คุณครูทานแล้ว ชะ...ช่วยบอกรสชาติ... ช่วยพิมพ์บอกเรื่องรสชาติมาใน MOMOTALK ด้วยนะคะ! แล้วฉันจะรอค่ะ!"
80000045-71 = "[ns] \"อื้อ ได้อยู่แล้ว\""
80000045-72 = "(หลังจากนั้นคุณครูก็ยืนดูมิโดริที่วิ่งหายไปอย่างรวดเร็ว)"

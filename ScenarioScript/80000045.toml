[translation]
80000045-1 = "我喜歡第一個，老師"
80000045-2 = "（情人節的前一天，收到了綠的聯絡）"
80000045-3 = "老師，你明天早上有什麼行程嗎……？"
80000045-4 = "早，早上有空是嗎？"
80000045-5 = "那，那明天早上7點左右，可以跟我見個面嗎……！"
80000045-6 = "[s]「嗯，當然沒問題。約稍微晚一點的時間也可以唷？」"
80000045-7 = "沒，沒關係，就早上7點吧！詳細的事明天再直接告訴老師！"
80000045-8 = "那明天就麻煩你了……！"
80000045-13 = "（於是，情人節當天早上）"
80000045-18 = "[ns]「唔嗯，綠在哪裡呢……」"
80000045-22 = "（在早晨的冰涼空氣中四處張望時……）"
80000045-26 = "哈啊，哈啊……收，收尾比想像中還花時間……！"
80000045-27 = "咦，我還沒遲到吧……？自己約別人出來還遲到什麼的……"
80000045-28 = "[s]「綠，我在這裡。」"
80000045-29 = "老，老師！？你已經到了嗎！？"
80000045-30 = "對，對不起……！明明是我約老師出來，結果還遲到……"
80000045-31 = "[s1]「沒關係，我也才剛到哦。」\n[s2]「話說這麼早有什麼事嗎？」"
80000045-32 = "啊，那是因為，那個……"
80000045-33 = "啊，那是因為，那個……"
80000045-34 = "（冷，冷靜一點啊我……為了今天已經以姐姐為對象模擬過那麼多次了……！#n　深呼吸，深呼吸……！）"
80000045-35 = "呼，哈……"
80000045-36 = "嗯，呼啊啊……"
80000045-41 = "對，對不起！？居然在老師面前打哈欠……！昨晚有點睡不太著……"
80000045-42 = "[s]「還好嗎？是在熬夜打電動嗎？」"
80000045-43 = "不，不是那樣的！"
80000045-44 = "明明約早上還遲到，理由竟然還是熬夜打遊戲……"
80000045-45 = "我沒有做那種事！是，是真的！"
80000045-46 = "[s]「抱歉，我開玩笑的。我相信綠一定是有某些理由才會這樣的。」"
80000045-47 = "啊，嗯，嗯……"
80000045-48 = "[s]「冷靜下來了嗎？」"
80000045-49 = "啊……是的，謝謝老師。"
80000045-50 = "……呼。多虧老師，我冷靜下來了。"
80000045-51 = "那個，昨天之所以睡不著，其實是因為……"
80000045-52 = "那個……"
80000045-53 = "嗚……都走到這一步了居然還不知如何是好……"
80000045-54 = "不，不行，既然都到這一步了就要按照自己的攻略路線……！"
80000045-55 = "[s]「……？」"
80000045-56 = "那麼，其實請老師出來是因為……！"
80000045-60 = "[ns]「這是……？」"
80000045-61 = "是我自己，做的巧克力。#n因為嘗試的過程出現了許多問題，就連昨晚都不是很順利……"
80000045-62 = "咦，啊，時間……？那是因為……"
80000045-63 = "我喜歡，當第一個……"
80000045-64 = "[s]「第一個……？」"
80000045-65 = "呃，那個，這個……！"
80000045-66 = "總，總之！應該還算能吃才對！"
80000045-67 = "可以的話，感想之類的……之後用MomoTalk告訴我也沒關係。#n能聽到老師的感想的話我會很開心的！我會等著的！"
80000045-71 = "[ns]「我，我知道了……！」"
80000045-72 = "（綠遠離的速度讓人不禁擔心他有沒有聽到最後的回答，只能困惑地目送他離開）"

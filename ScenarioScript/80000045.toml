[translation]
80000045-1 = "#title;처음이 좋아요. 선생님."
80000045-2 = "#na;(아직 발렌타인 데이가 찾아오기 바로 전날, 미도리로부터 한 통의 전화가 왔다.)"
80000045-3 = "3;미도리;01;그, 선생님. 내일 아침에, 혹시 따로 일정이 있으신가요……?\n#3;em;[?]\n#3;sig\n#3;a"
80000045-4 = "3;미도리;02;아, 아침은 비어 있다……?\n#3;sig"
80000045-5 = "3;미도리;07;그, 그럼……! 혹시 괜찮으시다면, 내일 아침 7시에 조금, 뵈, 뵐 수 있을까요?!\n#3;em;[반응]\n#3;sig"
80000045-6 = "[s] \"응, 그건 상관없는데. 왜…….\""
80000045-7 = "3;미도리;04;아, 아뇨! 자세한 건 내일! 아침에 가서 말씀드릴 테니까! 네!\n#3;em;[땀]\n#3;hophop\n#3;sig"
80000045-8 = "3;미도리;03;그럼……. 내일 만나는 거, 기다리고 있을게요!\n#3;greeting\n#3;sig"

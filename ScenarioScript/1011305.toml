[translation]
1011305-1 = "#title;표층 해류의 순환"
1011305-2 = "[ns] \"가자! 세나와 함께 바다로!\""
1011305-3 = "3;세나 사복;02;기운이 매우 넘쳐 보이시는군요. 선생님.\n#3;a\n#3;em;[반응]"
1011305-4 = "3;세나 사복;03;다행입니다. 그리고 좋은 일이기도 합니다."
1011305-5 = "[s1] \"그보다, 무슨 일로 바다에 가고 싶어졌어?\"\n[s2] \"지금은 시즌도 아니라서, 조금 추울지도 모르는데.\""
1011305-6 = "#wait;10"
1011305-7 = "#wait;10"
1011305-8 = "3;세나 사복;02;가장 큰 이유는, 바다에서라면 물에 빠진 시체……."
1011305-9 = "3;세나 사복;99;실례. 응급환자를 볼 수 있지 않을까, 해서였습니다.\n#3;greeting"
1011305-10 = "3;세나 사복;01;만에 하나 그런 일이 발생한다고 해도, 심폐소생술을 사용하면 되는 문제이기도 하고요."
1011305-11 = "[s] \"어…… 응…… 그래…….\""
1011305-12 = "3;세나 사복;01;게헨나에서는 총기나 온갖 폭탄들."
1011305-13 = "3;세나 사복;02;가령 수류탄, 백린탄, 지뢰, 유탄, IED, RDX 등에 의한 시체…… 부상자는 많았습니다만, 물에 빠진 환자는 그다지 찾아보기 힘들었습니다.\n#3;em;[...]"
1011305-14 = "3;세나 사복;01;힌놈 화산의 영향으로 고온 온천은 흔합니다만, 온천에서 사람이 물에 빠지는 일은 상당히 드문 일이기도 하고요."
1011305-15 = "3;세나 사복;01;그리고 더욱 솔직하게 말씀드리자면, 바다라는 곳의 풍경을 약간이지만 체험하고 싶기도 했습니다."
1011305-16 = "3;세나 사복;02;물론 바다를 보러 가는 게헨나 학생들도 분명히 있습니다만."
1011305-17 = "3;세나 사복;01;저는 평소 응급의학부 일로 스케줄이 꽉 차 있어서요. 그다지 바다에 가 본 적이 없었습니다.\n#3;em;[반응]"
1011305-18 = "[s3] \"……!\"\n[s4] \"반드시 가자! 세나와 함께 바다로!\""
1011305-19 = "#wait;10"
1011305-20 = "#wait;10"
1011305-21 = "3;세나 사복;01;음."
1011305-22 = "3;세나 사복;04;정말로 기운이 넘쳐 보이시는군요. 선생님.\n#3;em;[땀]"
1011305-23 = "#all;hide"
1011305-24 = "#wait;2000"
1011305-25 = "#wait;3000"
1011305-26 = "3;세나 사복;02;이것이…… 바다로군요.\n#3;em;[...]\n#3;a"
1011305-27 = "[s] \"어때?\""
1011305-28 = "3;세나 사복;01;정확히 말씀드리기 어렵습니다만."
1011305-29 = "3;세나 사복;01;그리고 이런 상황에 놓이는 것도, 저라는 개인에게 있어서는 드문 일입니다만."
1011305-30 = "3;세나 사복;99;단어를 어떻게든 골라 보자면."
1011305-31 = "#all;hide"
1011305-32 = "#na;세나 사복;……넓군요."
1011305-33 = "#na;세나 사복;계속해서 움직이고, 멈춰 있지 않습니다. 네. 파도 이야기입니다."
1011305-34 = "#na;세나 사복;정말로 끝이 보이지 않는군요. 인상적인 광경입니다. 수평선이라는 개념을 실제로 목격한 것은, 이번이 처음입니다."
1011305-35 = "3;세나 사복;01"
1011305-36 = "3;세나 사복;99;그런데, 선생님."
1011305-37 = "3;세나 사복;02;물에 빠진 시체…… 응급환자는 없는 걸까요?\n#3;em;[?]"
1011305-38 = "[s5] \"어…… 음…… 말했던 것이지만, 지금은 시즌이 아니라서.\"\n[s6] \"그렇게 사람이 많지 않을 거라고 생각해.\""
1011305-39 = "#wait;10"
1011305-40 = "#wait;10"
1011305-41 = "3;세나 사복;02;무엇보다 해수욕을 하기에는, 물이 너무 차가울 것이라고요?"
1011305-42 = "3;세나 사복;01;그래서 제가 원하는 시체…… 실례. 응급환자는 좀처럼 찾아보기 어려울 것이라는 말씀이시군요."
1011305-43 = "3;세나 사복;01;……그렇습니까. 이해했습니다.\n#3;em;[반응]"
1011305-44 = "3;세나 사복;02;또 어떤 의미로는 다행이군요. 제가 돌보아야 할 시체…… 응급환자는 웬만해서는 없을 것이라는 뜻이니까요."
1011305-45 = "3;세나 사복;01;그렇지만 여기에서 다른 문제와 봉착한 것 같습니다."
1011305-46 = "3;세나 사복;02;사람이 드문 바다에서, 저희는 무엇을 하면 좋을까요?\n#3;em;[?]"
1011305-47 = "[s] \"그 부분은 선생님에게 맡겨 줘!\""
1011305-48 = "3;세나 사복;01;상당히 자신감이 넘쳐 보이시는군요. 선생님."
1011305-49 = "3;세나 사복;01;알겠습니다. 여기에서는 그렇다면 세간의 말과 표현을 빌려."
1011305-50 = "#st;[0,0];instant;1;"
1011305-51 = "#clearST"
1011305-52 = "3;세나 사복;01\n#3;d\n#wait;1000"
1011305-53 = "3;세나 사복;01\n#3;a\n#3;closeup\n#wait;1500"
1011305-54 = "3;세나 사복;03;선생님만, 믿겠습니다.\n#3;em;[하트]\n#3;closeup\n#3;greeting"
1011305-55 = "#all;hide"
1011305-56 = "3;세나 사복;01;바다의 카페…… 로군요.\n#3;a\n#3;em;[...]"
1011305-57 = "3;세나 사복;01;기분 탓일까요? 저희가 자주 방문하는 카페에 비해, 다소 가격이 비싼 것으로 보입니다."
1011305-58 = "3;세나 사복;02;여기에서는, 분위기와 정서를 즐기는 값을 지불하는 것으로 생각하는 것이라고요?"
1011305-59 = "3;세나 사복;99;그렇습니까. 정확히는 이해하지 못하겠습니다만, 선생님께서 그렇게 말씀하신다면 그 말이 맞는 것이겠지요."
1011305-60 = "3;세나 사복;01;바다는…… 저에게는 그렇게까지 익숙하지도, 명확하지도 않은 장소니까요."
1011305-61 = "3;세나 사복;01"
1011305-62 = "3;세나 사복;04;이건…… 타코야키와 커피, 로군요. 경험한 적 없는 조합입니다.\n#3;em;[땀]"
1011305-63 = "3;세나 사복;01;타코야키의 느끼한 맛을 커피가 씻어 줄 수 있을 테니, 나름대로 먹을 만할 수도 있다고요?"
1011305-64 = "3;세나 사복;99;알겠습니다. 여기에서는 선생님의 의견을 따르도록 하겠습니다."
1011305-65 = "#st;[0,0];instant;1;"
1011305-66 = "#clearST"
1011305-67 = "#all;hide"
1011305-68 = "#wait;800"
1011305-69 = "#wait;800"
1011305-70 = "#wait;1200"
1011305-71 = "3;세나 사복;99;타코야키는 조금 식어 있고, 커피는 반대로 지나치게 뜨겁습니다."
1011305-72 = "3;세나 사복;06;제가 맛이나 음식에 대해 특별히 평가할 위치에 있는 것은 아니겠습니다만, 이것은 가격에 비해서는 조금 실망스럽군요.\n#3;em;[세로선]"
1011305-73 = "[s] \"저기……. 미안, 해?\""
1011305-74 = "3;세나 사복;01;……."
1011305-75 = "3;세나 사복;02;아닙니다. 선생님께서 말씀하셨던, '분위기와 정서를 즐기는 값'이 무엇인지, 지금 약간이나마 알 것 같은 기분이 들었습니다.\n#3;em;[반응]"
1011305-76 = "#all;hide"
1011305-77 = "3;세나 사복;01;이것은 조금 예상하지 못한 풍경이군요. 해안가에 숲이 조성되어 있다니.\n#3;a"
1011305-78 = "3;세나 사복;99;그렇군요. 방풍림…… 이라는 것인가요.\n#3;em;[...]"
1011305-79 = "3;세나 사복;01;폭풍이나 바다 물결, 모래를 막기 위하여 해안지역에 조성한 숲인 것이군요."
1011305-80 = "3;세나 사복;02;먼 곳에서는 파도 소리와 바닷새 소리가 들리고, 이 숲에서는 바닷새와는 다른 음색의 새소리가 들립니다."
1011305-81 = "3;세나 사복;01;바람에는 약간의 습기와 염분이 섞여 있는 듯합니다만, 숲이 그것들을 어느 정도 막아 주는 것 같군요."
1011305-82 = "3;세나 사복;03;확실히, 저에게 있어서는 신선한 경험입니다.\n#3;em;[반짝]"
1011305-83 = "#all;hide"
1011305-84 = "3;세나 사복;01;해안 도로를 자전거를 이용해 라이딩을 즐기는 것도 하나의 방법이라고 말씀하셨습니다만…….\n#3;a\n#3;em;[반응]"
1011305-85 = "[ns] \"헥…… 헥…… 헉……. 헉…….\""
1011305-86 = "3;세나 사복;02;괜찮으십니까, 선생님? 제가 앞자리에서 선생님을 이끌어 드릴까요?"
1011305-87 = "[s] \"그럴…… 수는…… 없다……. 그럴 수는 없어어어……!\""
1011305-88 = "3;세나 사복;01;……알겠습니다. 선생님의 의지가 그러하시다면, 더 이상 제가 드릴 말은 없을 것 같습니다.\n#3;em;[...]"
1011305-89 = "3;세나 사복;02;갑작스러운 운동으로 과호흡 상태가 되어 일시적인 산소 부족 상태가 되더라도, 너무 걱정하지 마시길 바랍니다."
1011305-90 = "3;세나 사복;01;여차하면 제가 모든 수단을 써서라도 선생님을 돌보아 드릴 테니까요."
1011305-91 = "3;세나 사복;05;그래야 한다면, 마우스 투 마우스를 활용해서라도 말입니다.\n#3;closeup\n#3;em;[반짝]"

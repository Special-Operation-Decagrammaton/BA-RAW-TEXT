[translation]
1011305-1 = "Circulation of Surface Currents"
1011305-2 = "[ns] \"Wow, we're going to the beach together!\""
1011305-3 = "You seem very energetic, Sensei."
1011305-4 = "That's good. I'm glad."
1011305-5 = "[s1] \"So what made you want to go to the beach today?\"\n[s2] \"It's not summer, so it might be cold there.\""
1011305-8 = "Well, mainly, I thought I might get to see a drowned body..."
1011305-9 = "Excuse me, a waterlogged emergency patient."
1011305-10 = "And then I'd be there to do CPR."
1011305-11 = "[s] \"Um... Yeah... Okay...\""
1011305-12 = "Gehenna has a lot of ways to die, or at least to get injured."
1011305-13 = "Hand grenades, white phosphorus munitions, land mines, IED's, RDX's...but its rare to see a DROWNED patient."
1011305-14 = "Of course, there's Hinnom Volcano, and the hot springs, but not many people drown in hot springs."
1011305-15 = "And to be honest, I also wanted to experience the scenery of the beach."
1011305-16 = "Gehenna students do go out and see it sometimes, of course."
1011305-17 = "But, with my schedule as full as it is, I haven't been to the beach in quite some time."
1011305-18 = "[s3] \"...!\"\n[s4] \"Well, let's go right now!\""
1011305-21 = "Hmm."
1011305-22 = "You really are full of energy, Sensei."
1011305-26 = "Here it is... The beach."
1011305-27 = "[s] \"How do you like it?\""
1011305-28 = "It's...surprisingly hard to articulate."
1011305-29 = "I've hardly ever been here."
1011305-30 = "But if I had to describe it in one word..."
1011305-32 = "...It's vast."
1011305-33 = "And it's moving continuously. The waves, I mean."
1011305-34 = "I can't see the end of it. It's quite a sight. The last time I saw a full horizon in front of me, I was too young to notice."
1011305-36 = "But Sensei?"
1011305-37 = "Are there NO drowned bodies *ahem* patients out here?"
1011305-38 = "[s5] \"Well, it's just not peak season right now...\"\n[s6] \"There just aren't too many people out today.\""
1011305-41 = "I suppose the water would be a bit too cold to swim or...sea-bathe in."
1011305-42 = "So I shouldn't expect to see any bodies— patients today, is what you're saying."
1011305-43 = "...All right. I understand."
1011305-44 = "I'm kind of glad about that. It means I don't have to do anything."
1011305-45 = "But there is one problem."
1011305-46 = "What do we DO on an empty beach?"
1011305-47 = "[s] \"Leave that to Sensei!\""
1011305-48 = "You sound confident."
1011305-49 = "All right. I'll do just what you said."
1011305-54 = "I'll leave it to you, Sensei."
1011305-56 = "This is a...seaside cafe, isn't it?"
1011305-57 = "Is it just me, or is everything way more expensive here?"
1011305-58 = "Hmm? So we pay more for the ambiance in a place like this?"
1011305-59 = "I don't...know if I understand that, but I'm sure you know what you're talking about, Sensei."
1011305-60 = "I'm really not familiar with the beach, after all."
1011305-62 = "This is... Takoyaki and coffee. That's a combo I never knew existed."
1011305-63 = "I suppose the coffee can wash away that heavy flavor from the takoyaki. Is that the idea?"
1011305-64 = "I see. I'll take your word for it."
1011305-71 = "...The takoyaki is a bit cold, and the coffee's too hot for me."
1011305-72 = "I'm not in a position to judge flavor OR food, but that's kind of disappointing for the price."
1011305-73 = "[s] \"Um... I'm sorry?\""
1011305-74 = "..."
1011305-75 = "You shouldn't be. I think I understand what you said now, about \"paying more for the ambiance.\""
1011305-77 = "Well, this is unexpected. A forest, right by the beach?"
1011305-78 = "Ah, so it's called \"Windbreak Forest.\""
1011305-79 = "They planted it here to keep out the waves and the sand."
1011305-80 = "I can hear the waves and the seagulls, and the forest birds, all at the same time."
1011305-81 = "And I can smell the sea salt, and the trees."
1011305-82 = "This is...quite a fresh experience."
1011305-84 = "You know, I heard you mention something about cycling down the coastal roads as a way of enjoying them..."
1011305-85 = "[ns] \"*pant* *pant* *pant* *pant*\""
1011305-86 = "Are you okay, Sensei? Would you like me to lead you from the front?"
1011305-87 = "[s] \"*gasp* Can't... Can't... do this...\""
1011305-88 = "...I understand. If that's how determined you are, Sensei, then there's nothing else for me to say."
1011305-89 = "Even if the exercise puts you in a state of hypoxia, you won't have to worry."
1011305-90 = "Whatever happens, I'll take care of you by any means necessary."
1011305-91 = "Even mouth-to-mouth."
1011305-98 = "...Oh, it's already evening."
1011305-99 = "[s] \"Did you have a good time?\""
1011305-100 = "Yes. Everything felt so new to me."
1011305-101 = "I haven't had time fly by like that in a while."
1011305-102 = "Thank you, Sensei. "
1011305-103 = "I'll remember this day for a long time."
1011305-104 = "Believe me, I mean that."
1011305-107 = "― [log=세나 사복]The water definitely feels cold.[/log][wa:3590] "
1011305-109 = "― [log=세나 사복]It might cause hypothermia for some people. [/log][wa:90] "
1011305-112 = "― [log=세나 사복]Someone might even... [/log]"
1011305-113 = "― [log=세나 사복]...lose consciousness, at least for a moment.[/log][wa:10] "
1011305-116 = "― [log=세나 사복]Ah, that's...[/log][wa:1960] "
1011305-118 = "― [log=세나 사복]what people would call \"ruining the ambiance.\"[/log][wa:2030] "
1011305-121 = "[ns] \"It feels new hearing something like that from you, Sena.\""
1011305-122 = "― [log=세나 사복]I'm a bit surprised myself.[/log][wa:4100] "
1011305-125 = "― [log=세나 사복]But Sensei? After a whole day of[/log][wa:1040] "
1011305-126 = "― [log=세나 사복]new things like this...[/log][wa:990] "
1011305-129 = "― [log=세나 사복]Maybe just this once, trying out new expressions too[/log][wa:10] "
1011305-130 = "― [log=세나 사복]might not be a bad idea.[/log][wa:3260] "
1011305-133 = "― [log=세나 사복]...The water is really cold.[/log][wa:3680] "
1011305-135 = "― [log=세나 사복]But...it's not the uncomfortable kind of cold, I don't think.[/log][wa:950] "
1011305-138 = "..."
1011305-139 = "Sensei, there's a kind of...empty spot in me."
1011305-140 = "It's hard to put into words, but that's what people tell me from time to time."
1011305-141 = "Maybe it's just the kind of person I am."
1011305-142 = "I'm...ambiguous."
1011305-143 = "Keep that in mind, would you? When you see me, or think of me?"
1011305-144 = "I don't think I do the Medical Emergency Club work because I like it. And I don't dislike it either."
1011305-145 = "I do it because...well, because I should."
1011305-146 = "And it does fulfill my interests...or my selfish desires, depending on your perspective."
1011305-147 = "I guess it's natural for humans to pursue their own interests."
1011305-148 = "Maybe we all have an empty spot inside, and we're always looking for something to fill it."
1011305-149 = "[s] \"Do you think that spot's filled up at least a little bit now?\""
1011305-150 = "Perhaps."
1011305-154 = "At least...that's how I feel when I'm with you."
1011305-155 = "All I know is that even in that cold water...my heart felt so warm."
1011305-157 = "Sena and I stayed on the beach until late in the evening, then went back together."

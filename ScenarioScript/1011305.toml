[translation]
1011305-1 = "ทะเลครั้งแรกของเซนะ"
1011305-2 = "[ns] \"ไปกันเลย! ไปทะเลกับเซนะ!\""
1011305-3 = "ดูมีพละกำลังล้นเหลือดีจังเลยนะคะ คุณครู"
1011305-4 = "เห็นแบบนี้ก็ค่อยยังชั่วนะคะ แล้วนี่ก็เป็นเรื่องที่ดีด้วยค่ะ"
1011305-5 = "[s1] \"จะว่าไป ทำไมถึงอยากไปทะเลขึ้นมาเหรอ?\"\n[s2] \"ไปทะเลตอนนี้มันน่าจะหนาวๆ อยู่นะ\""
1011305-8 = "สาเหตุหลักก็เพราะถ้าไปทะเล ฉันอาจจะได้เจอศพจมน้ำ..."
1011305-9 = "ขอโทษค่ะ ฉันหมายถึง อาจได้เจอผู้ป่วยฉุกเฉินก็ได้น่ะค่ะ"
1011305-10 = "สมมติถ้าเกิดเรื่องแบบนั้นขึ้นมา ฉันก็น่าจะปั๊มหัวใจช่วยได้ค่ะ"
1011305-11 = "[s] \"อ่า... อืม... งั้นสินะ...\""
1011305-12 = "ในเกเฮนน่ามีปืนและระเบิดแทบทุกประเภท"
1011305-13 = "เรามีศพ... ไม่สิ มีผู้ได้รับบาดเจ็บจากระเบิดมือ ฟอสฟอรัสขาว กับระเบิด ลูกกระสุนปืนใหญ่ IED หรือไม่ก็ RDX อยู่ก็มาก แต่ฉันไม่ค่อยเจอเคสจมน้ำเท่าไรค่ะ"
1011305-14 = "และต่อให้ที่นี่จะมีออนเซ็นร้อนๆ จากอิทธิพลของภูเขาไฟฮินนอมอยู่หลายแห่ง แต่ก็ไม่ค่อยมีเคส#nจมน้ำในออนเซ็นด้วยค่ะ"
1011305-15 = "และถ้าจะพูดตรงๆ ก็คือ ฉันอยากสัมผัสทัศนียภาพของทะเลดูน่ะค่ะ"
1011305-16 = "แน่นอนว่าต้องมีนักเรียนเกเฮนน่าที่ไปเที่ยวทะเลกัน"
1011305-17 = "แต่ตารางงานหน่วยแพทย์ฉุกเฉินของฉันยุ่งมาก ฉันก็เลยไม่ยังไม่เคยไปทะเลสักครั้งเลยค่ะ"
1011305-18 = "[s3] \"...!\"\n[s4] \"งั้นก็ไปกันเถอะ! ไปทะเลกับเซนะ\""
1011305-21 = "อืม"
1011305-22 = "มีพละกำลังล้นเหลือจริงๆ ด้วยนะคะ คุณครู"
1011305-26 = "ที่นี่คือ... ทะเลสินะคะ"
1011305-27 = "[s] \"เป็นยังไงบ้าง?\""
1011305-28 = "คงตอบให้ชัดเจนได้ยากค่ะ"
1011305-29 = "และการอยู่ในสถานการณ์แบบนี้ก็เป็นเรื่องหายากสำหรับฉันด้วยค่ะ"
1011305-30 = "ถ้าจะให้เลือกคำมาบอกความรู้สึกละก็"
1011305-32 = "มันกว้างใหญ่จังเลยค่ะ..."
1011305-33 = "มันไม่หยุดนิ่ง แล้วก็เคลื่อนไหวอยู่ตลอดเวลาค่ะ ฉันหมายถึงคลื่นน่ะค่ะ"
1011305-34 = "ทะเลกว้างไกลสุดลูกหูลูกตา เป็นวิวที่น่าประทับใจจังเลยค่ะ นี่เป็นครั้งแรกเลยค่ะที่ฉันได้มาเห็นสิ่งที่#nเรียกว่าเส้นขอบฟ้า"
1011305-36 = "ว่าแต่ คุณครูคะ"
1011305-37 = "ที่นี่ไม่มีศพ... ไม่มีผู้ป่วยฉุกเฉินที่จมน้ำหรอกเหรอคะ?"
1011305-38 = "[s5] \"อ่า... อืม... ตอนนี้ไม่ใช่ฤดูเที่ยวทะเลน่ะ\"\n[s6] \"ครูว่าช่วงนี้ไม่น่าจะมีคนมาเล่นน้ำเยอะเท่าไรน่ะ\""
1011305-41 = "น้ำทะเลในช่วงนี้มันเย็นเกินกว่าจะมาว่ายเล่นงั้นเหรอคะ?"
1011305-42 = "คุณครูกำลังบอกว่าฉันก็เลยเจอศพ... ขอโทษค่ะ เจอผู้ป่วยฉุกเฉินได้ยากสินะคะ"
1011305-43 = "อย่างนี้นี่เอง... ฉันเข้าใจแล้วค่ะ"
1011305-44 = "แต่ในบางมุมก็ถือว่าน่าโล่งอกนะคะ เพราะนั่นหมายความว่าที่นี่ไม่มีศพ... ไม่สิ ไม่มีผู้ป่วยฉุกเฉินที่#nต้องได้รับการดูแลจากฉันนี่คะ"
1011305-45 = "แต่ฉันน่าจะเจอกับปัญหาอย่างอื่นเข้าแล้วละค่ะ"
1011305-46 = "ปัญหาที่ว่าก็คือ แล้วเราจะทำอะไรกันในทะเลที่ไม่ค่อยมีผู้คนเหรอคะ?"
1011305-47 = "[s] \"เรื่องนั้นให้เป็นหน้าที่ของครูเอง!\""
1011305-48 = "พละกำลังยังล้นเหลือเหมือนเดิมเลยนะคะ คุณครู"
1011305-49 = "ตกลงค่ะ ถ้าอย่างนั้นฉันคงต้องบอกว่า"
1011305-54 = "ฉันเชื่อใจคุณครูค่ะ"
1011305-56 = "คาเฟ่ริมทะเล... สินะคะ"
1011305-57 = "นี่ฉันรู้สึกไปเองหรือเปล่านะ? ถ้าเทียบกับคาเฟ่ที่ฉันไปบ่อยๆ ดูเหมือนราคาของที่นี่จะแพงกว่าเยอะ#nเลยค่ะ"
1011305-58 = "ให้คิดเสียว่าเป็นการจ่ายเพื่อดื่มด่ำไปกับบรรยากาศของที่นี่เหรอคะ?"
1011305-59 = "งั้นเหรอคะ? ฉันไม่ค่อยเข้าใจเท่าไร แต่ถ้าคุณครูว่าอย่างนั้น ก็คงถูกอย่างที่ว่า"
1011305-60 = "นั่นก็เพราะทะเล... เป็นที่ที่ฉันไม่คุ้นเคยและไม่รู้จักอย่างชัดเจนนี่คะ"
1011305-62 = "นี่คือ... ทาโกะยากิกับกาแฟสินะคะ เป็นการจับคู่อาหารที่ฉันไม่เคยเห็นมาก่อนเลยค่ะ"
1011305-63 = "กาแฟช่วยลดความเลี่ยนของทาโกะยากิได้ ก็เลยเป็นการจับคู่ที่ลงตัวงั้นเหรอคะ?"
1011305-64 = "เข้าใจแล้วค่ะ ตอนอยู่ที่นี่ ฉันจะทำตามคำแนะนำของคุณครูแล้วกันค่ะ"
1011305-71 = "ทาโกะยากิเย็นไปนิดหน่อย ส่วนกาแฟก็ร้อนเกินไป"
1011305-72 = "ถึงฉันไม่ใช่นักชิมที่จะประเมินรสชาติหรือความคุ้มค่าของอาหารได้ แต่พอเทียบกับราคาที่จ่ายไปแล้ว นี่ก็คือว่าน่าผิดหวังนิดหน่อยนะคะ"
1011305-73 = "[s] \"อ่า... ขอโทษ... นะ?\""
1011305-74 = "......"
1011305-75 = "ไม่หรอกค่ะ ตอนนี้ฉันพอจะเข้าใจที่คุณครูบอกว่า 'ราคาที่จ่ายเพื่อเพลิดเพลินกับบรรยากาศ' แล้วละค่ะ"
1011305-77 = "มีป่าเลียบชายฝั่งด้วย เป็นทิวทัศน์ที่คาดไม่ถึงเลยนะคะ"
1011305-78 = "แบบนี้สินะ... ที่เรียกว่าแนวป่าไม้กันลม"
1011305-79 = "ป่าที่ปลูกบริเวณชายฝั่งเพื่อป้องกันพายุ คลื่นทะเล และทราย"
1011305-80 = "จากที่ไกลๆ เราจะได้ยินเสียงคลื่นและนกทะเล แต่เมื่ออยู่ในป่าแห่งนี้ เราจะได้ยินเสียงของนกที่มีโทน#nเสียงต่างจากนกทะเลค่ะ"
1011305-81 = "ลมเหมือนจะมีความชื้นและความเค็มอยู่บ้าง แต่ป่าก็ช่วยบดบังได้เป็นอย่างดีเลยนะคะ"
1011305-82 = "นี่เป็นประสบการณ์สุดสดชื่นของฉันเลยค่ะ"
1011305-84 = "คุณครูบอกฉันว่าการปั่นจักรยานเลียบชายหาดก็เป็นอีกหนึ่งวิธีที่จะสนุกกับการมาทะเล แต่ว่า..."
1011305-85 = "[ns] \"แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก...\""
1011305-86 = "ไหวหรือเปล่าคะคุณครู? ให้ฉันไปปั่นลากคุณครูจากข้างหน้ามั้ยคะ?"
1011305-87 = "[s] \"ให้ทำ... อย่างนั้น... ไม่ได้หรอก... ไม่ได้เด็ดขาดดด...!\""
1011305-88 = "เข้าใจแล้วค่ะ... ถ้านั่นเป็นความตั้งใจของคุณครู ฉันก็จะไม่ว่าอะไรค่ะ"
1011305-89 = "แต่ถ้าคุณครูหายใจเร็วจากการออกกำลังกายกะทันหันจนร่างกายเกิดภาวะขาดออกซิเจนชั่วคราว ก็ไม่ต้องกังวลมากเกินไปนะคะ"
1011305-90 = "หากเกิดเหตุการณ์แบบนั้น ฉันจะทำทุกวิถีทางเพื่อช่วยชีวิตคุณครูค่ะ"
1011305-91 = "ต่อให้จะต้องเมาท์ทูเมาท์ก็ตามค่ะ"
1011305-98 = "ตกเย็นแล้วสินะ เวลาผ่านไปไวจริงๆ เลยค่ะ..."
1011305-99 = "[s] \"วันนี้เป็นยังไงบ้าง?\""
1011305-100 = "ทุกอย่างในวันนี้เป็นเรื่องใหม่สำหรับฉันค่ะ"
1011305-101 = "นานมากแล้วที่ฉันเพลิดเพลินกับการทำอะไรจนลืมเวลาไปเลย"
1011305-102 = "ขอบคุณนะคะ คุณครู "
1011305-103 = "วันนี้เป็นวันที่น่าจดจำอย่างแท้จริงเลยละค่ะ"
1011305-104 = "เห็นฉันอย่างนี้ แต่ตอนนี้ฉันกำลังพูดออกมาจากใจจริงเลยนะคะ"
1011305-107 = "― [log=세나 사복]รู้สึกว่าน้ำทะเลเย็นจริงๆ ด้วยค่ะ[/log][wa:3550] "
1011305-109 = "― [log=세나 사복]สำหรับบางคน อุณหภูมิร่างกายอาจลดลงก็ได้ค่ะ [/log][wa:130] "
1011305-112 = "― [log=세나 사복]แล้วก็อาจทำให้[/log]"
1011305-113 = "― [log=세나 사복]สติเลือนรางไปชั่วครู่ด้วยค่ะ[/log][wa:460] "
1011305-116 = "― [log=세나 사복]อ๊ะ คำพูดเมื่อกี้...[/log][wa:1680] "
1011305-118 = "― [log=세나 사복]คงเป็นคำพูดที่ 'ทำลายบรรยากาศ' สินะคะ[/log][wa:2390] "
1011305-121 = "[ns] \"แปลกใหม่ดีจังนะ ได้ยินเซนะพูดแบบนี้ด้วย\""
1011305-122 = "― [log=세나 사복]ฉันเองก็แอบตกใจตัวเองเหมือนกันค่ะ[/log][wa:3860] "
1011305-125 = "― [log=세나 사복]แต่ถึงอย่างนั้น คุณครูคะ ถ้าวันนี้ได้ใช้เวลาอย่างเต็มที่[/log][wa:80] "
1011305-126 = "― [log=세나 사복]ด้วยความแปลกใหม่แบบนี้แล้วละก็ [/log][wa:670] "
1011305-129 = "― [log=세나 사복]ครั้งนี้ฉันว่า ลองใช้คำพูดแบบใหม่ดู[/log][wa:480] "
1011305-130 = "― [log=세나 사복]ก็ไม่น่าจะเสียหายนะคะ[/log][wa:3380] "
1011305-133 = "― [log=세나 사복]น้ำตรงนี้มัน... เย็นจริงๆ เลยค่ะ[/log][wa:3520] "
1011305-135 = "― [log=세나 사복]แต่ว่า... มันไม่ใช่ความเย็นที่ทำให้อารมณ์เสียหรอกค่ะ[/log][wa:1310] "
1011305-138 = "......"
1011305-139 = "คุณครู ฉันเป็นคนที่ว่างเปล่าในบางมุมน่ะค่ะ"
1011305-140 = "ที่จริงฉันก็ไม่รู้เหมือนกัน แต่ฉันมักได้ยินคำพูดแบบนี้จากคนรอบข้างอยู่บ่อยๆ ค่ะ"
1011305-141 = "บางทีฉันอาจเป็นคนประเภทนั้นก็ได้"
1011305-142 = "นั่นสินะคะ คำที่ไม่ชัดเจน..."
1011305-143 = "ฉันอยากให้คุณครูมองว่าฮิมูโระ เซนะในตอนนี้คือฮิมูโระ เซนะที่ไม่ชัดเจนค่ะ"
1011305-144 = "แม้แต่กับงานของชมรมหน่วยแพทย์ฉุกเฉิน ฉันก็ไม่ได้ทำงานด้วยความรู้สึกชอบหรือไม่ชอบค่ะ"
1011305-145 = "ฉันคิดว่ามันใกล้เคียงกับ 'การทำในสิ่งที่ต้องทำ' มากกว่าค่ะ"
1011305-146 = "แน่นอนว่าในกระบวนการทำงานนั้นก็มีความสนุกอยู่บ้าง... และในบางมุมมอง มันก็มีเรื่องผลประโยชน์#nส่วนตัวอยู่ด้วยนิดหน่อยค่ะ"
1011305-147 = "นี่อาจเป็นมุมมองส่วนตัวของฉันอย่างสุดขั้วก็ได้ ฉันมองว่ามนุษย์คือสิ่งมีชีวิตที่แสวงหาความสนุกค่ะ"
1011305-148 = "และเป็นสิ่งมีชีวิตที่รับรู้ถึงความว่างเปล่าของตัวเองอยู่ตลอด ก็เลยเดินหน้าต่อไปเพื่อค้นหาบางอย่าง#nที่จะมาเติมเต็มความว่างเปล่านั้นค่ะ"
1011305-149 = "[s] \"แล้วเซนะได้เติมเต็มไปมากแค่ไหนแล้ว?\""
1011305-150 = "คุณครูคิดว่ายังไงล่ะคะ?"
1011305-154 = "อย่างน้อยถ้าได้อยู่กับคุณครู ฉันก็จะรู้สึกแบบนี้ค่ะ"
1011305-155 = "รู้สึกว่าต่อให้ตอนนี้น้ำทะเลจะเย็นแค่ไหน แต่หัวใจของฉันก็อบอุ่นค่ะ"
1011305-157 = "(แล้วคุณครูก็ใช้เวลากับเซนะที่ทะเลจนถึงค่ำและกลับมาด้วยกัน)"

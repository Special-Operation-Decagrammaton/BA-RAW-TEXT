1011305-142 = "3;세나 사복;01;그렇군요. 불확실한 단어……."
1011305-143 = "3;세나 사복;02;지금 여기에서의 히무로 세나는, 불확실한 히무로 세나라고 보아주시면 감사하겠습니다.\n#3;em;[반응]"
1011305-144 = "3;세나 사복;01;응급의학부의 일 같은 경우도, 좋다거나 싫다는 감각으로 접근하고 있는 것은 아닙니다."
1011305-145 = "3;세나 사복;01;오히려 해야 하는 일이기에 하고 있다는 쪽에, 더욱 가까울 것 같습니다."
1011305-146 = "3;세나 사복;04;물론 그 과정에서 약간의 흥미…… 관점에 따라서는, 사리사욕 같은 것을, 조금씩 챙기고 있기는 하지만요.\n#3;em;[땀]"
1011305-147 = "3;세나 사복;99;지극히 개인적인 관점이 되겠습니다만, 사람은 결국 흥미를 쫓는 생물이라고 생각합니다."
1011305-148 = "3;세나 사복;01;늘 스스로의 빈 공간을 느끼고, 그걸 채워 줄 무언가를 찾아, 계속해서 방황하는 생물이라고 생각합니다."
1011305-149 = "[s] \"그게 지금은 어느 정도 채워진 것 같아?\""
1011305-150 = "3;세나 사복;02;어떨까요."

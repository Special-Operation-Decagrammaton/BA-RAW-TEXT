[translation]
90100050-1 = "第5話;聞き込み"
90100050-3 = "現在、キヴォトス標準時で1030。"
90100050-4 = "現時刻をもってFOX小隊は「ロア追跡作戦」の聞き込みを開始する。"
90100050-5 = "各員、報告。"
90100050-9 = "こちらFOX4。現在ポイントオスカーでターゲットの動向を観察中。"
90100050-10 = "今のところ異常の兆候はなし。"
90100050-11 = "ただ……ポイントオスカーに、すっごく些細な問題がある。"
90100050-12 = "具体的には？"
90100050-13 = "あっつい……動いてないのに汗が出る。#n夏ってまだ先じゃないの！？"
90100050-14 = "直射日光ガンガンの場所で迷彩布かぶってたら溶けちゃうよ～"
90100050-15 = "今年は例年より気温が高いようだな。"
90100050-16 = "次は日陰のポイントを探す。悪いが今回は――"
90100050-20 = "FOX4、泣き言いわないの。昔はもっと暑い場所でも耐えてたじゃない。"
90100050-21 = "矯正局でなまったんじゃないの？"
90100050-22 = "FOX3、作戦チャンネルで説教しないで。鍛えてても暑いもんは暑いんだから。"
90100050-23 = "誰かさんみたいに、下着代わりにキャミソール1枚だけならマシなんだけど――"
90100050-24 = "ちゃんと着けてるわよ！？"
90100050-28 = "……FOX3、続けて報告。"
90100050-29 = "こ、こちらFOX3。えっと、私だってちゃんとした――"
90100050-30 = "FOX3。FOX4の冗談を真面目に取り合わなくていい。"
90100050-31 = "そ、そうよね。うぅ……。"
90100050-35 = "こちらFOX3。ポイントパパで[ruby=I     M     S     I]加入者識別番号[/ruby]収集装置を稼働中。"
90100050-36 = "収集したデバイスIDの数と、ポイントオスカー側のターゲット数を照合した結果、#n半径500m以内に識別可能な人はいないと推定。"
90100050-37 = "監視区域内で、異常の兆候や追加の端末を確認した場合は追加報告するわ。"
90100050-38 = "FOX1、了解。"
90100050-42 = "最後にFOX2は――"
90100050-48 = "こっちも準備できたよ。"
90100050-49 = "物資は十分、偽装も完璧……。"
90100050-50 = "ターゲットの接近を確認したら、手順に従って情報収集を始めるね。"
90100050-51 = "よし。ではこれより――"
90100050-52 = "[ns1] \"なんかすごい話が飛び交ってるね……。\"\n[ns2] \"これから何をするつもりなの？\""
90100050-55 = "[USERNAME]先生。"
90100050-56 = "作戦終了後、先生も交えて報告会を行う予定です。#n同行されずとも問題ないとお伝えしたはずですが。"
90100050-57 = "なにか、ご不安な点でも？"
90100050-58 = "[s3] \"FOX小隊とシャーレの初めての合同作戦だから！\"\n[s4] \"ユキノの活躍を直接見たいなって思って。\""
90100050-61 = "……そうですか。"
90100050-62 = "では、改めて。これより、ブリーフィングを行います。"
90100050-63 = "今回のコンコ……ではなく「ロア追跡作戦」の第一目標は、#nここ――シロウナギ駅周辺で多発している事件の全容を把握することです。"
90100050-64 = "[s] \"ここで何が起きてるの……？\""
90100050-65 = "先月から、生徒が意識を失った状態で発見される事件が相次いでいます。#nちょうど連邦生徒会長がお戻りになった頃からですね。"
90100050-67 = "被害者のほとんどは正午に発見され、#n擦り傷以外の外傷が認められなかったことから、当初は熱中症が疑われました。"
90100050-68 = "しかし、被害者の脈拍と体温が正常であること、強く痙攣している例が多いことから、#n他の可能性が疑われています。"
90100050-69 = "また、直前まで「白いかかし」を追っていたという共通した証言があり、#n現在、ヴァルキューレ警察学校がかかしの正体を探っています。"
90100050-71 = "でも、被害者以外で白いかかしを見た人がいないようで……#n捜査は難航しているそうです。"
90100050-72 = "被害者が増えるにつれて、幽霊の呪いだとか、悪霊の仕業だとか……#nそういう噂も広まっているみたいで……。"
90100050-73 = "幽霊なんているわけないでしょ？#nみんな好き勝手に言ってるだけだって。"
90100050-74 = "無責任に噂をばら撒かれると、事件の輪郭がぼやけるのよね。"
90100050-75 = "その意見には同意だが……現状は判断材料が少なすぎる。"
90100050-76 = "時間をかけて事件を洗い直し、証拠を集めるほかない。"
90100050-77 = "[s] \"それで、今から何をするの？\""
90100050-78 = "まずは関係者に聞き込みをします。"
90100050-79 = "自然に話してもらえるように、アルバイトに偽装して話題を切り出すんです。"
90100050-80 = "[s] \"今回もいなり寿司を売るのかな。\""
90100050-81 = "ターゲットの興味を引きやすいように、メニューは変更しました。#nさすがにこの暑さでは難しいですから。"
90100050-82 = "直近の被害者はゲヘナの陸上部の選手だそうです。"
90100050-83 = "ゲヘナ陸上部は、この遊歩道でよく練習しているみたいでして。#n人通りが少ないから走りやすいのでしょうね。"
90100050-84 = "SNSを確認したところ、今日も練習の予定が入っているようです。"
90100050-85 = "同じ部員なら、被害者が倒れる直前のことを何か知っているのではないでしょうか。"
90100050-86 = "[s] \"なるほど……。\""
90100050-87 = "こちらFOX4。楽しい会話の途中で悪いんだけど――"
90100050-88 = "ターゲットがポイントに接近中だよ。"
90100050-92 = "ではFOX2、頼む。"
90100050-93 = "任せて～"
90100050-100 = "いっち、にっ、いっち、にっ！"
90100050-101 = "呼吸乱さないで！掛け声に合わせて！"
90100050-105 = "あの～"
90100050-106 = "ちょっ、邪魔、邪魔！"
90100050-107 = "練習中に失礼します……新発売のスポーツドリンク「ハイパーエイド」、#nいかがですか？"
90100050-108 = "はっ？えっ？スポーツドリンク？いきなり？なに、押し売り！？"
90100050-109 = "いえ、サンプルをお配りしているんです。よろしければどうぞ！"
90100050-110 = "何か怪しいな……。"
90100050-111 = "ふふっ。まだあまり知られてはいませんが……#n実はあの小塚製薬の新商品なんです。"
90100050-112 = "広告を打ったり、販促イベントをしてはいるんですけど……#n今の世の中、口コミが大事なので。"
90100050-113 = "ですので、陸上部のみなさんに試飲してもらいたいんです。美味しかったら口コミにご協力していただければと。"
90100050-114 = "既にご存知だとは思いますが、激しい運動の後は汗と一緒に電解質が抜けていってしまうので……吸収が早いスポーツドリンクで補給するのが一番です。#nこの「ハイパーエイド」は他社の商品より高濃度の電解質を含んでいるので――"
90100050-115 = "わ、分かった分かった。真剣なのは伝わったから。#n試しに飲んでみようかな。"
90100050-116 = "まぁ喉渇いてるし、ちょうどいっか。"
90100050-121 = "暑いからかな？#nいつもよりすぐに喉が潤うというか……。"
90100050-122 = "飲んだ瞬間に染み込んでくるみたいな……。"
90100050-123 = "そう！どんな環境でも必要な電解質をしっかり吸収させるのが、#nこの「ハイパーエイド」の強みなんです！"
90100050-124 = "たくさん持ってきていますので、おかわりもありますよ。"
90100050-125 = "そんなに効くんだ？じゃあ私も……。"
90100050-126 = "あたしも！あたしも飲みたい！"
90100050-130 = "アレなに？私も初めて聞くんだけど……。"
90100050-131 = "クルミも絶対飲んだことあるよ。#nSRTで配給されてた粉末飲料を規定量より1.5倍で溶いたヤツ。"
90100050-132 = "え？あの安っぽいレモネード？それであんなに喜ぶの……？"
90100050-133 = "あの子、SRTじゃなくて営業でも成功してたと思うわ。"
90100050-134 = "（警戒心を解かせることは成功したか……）"
90100050-136 = "……ごちそうさま。お礼とかってどうすればいい？"
90100050-137 = "お粗末様でした。よろしければ、素直な感想をSNSに投稿してくださると嬉しいです。"
90100050-138 = "任せといて！噂が広まるよう、いろんなところで勧めまくるから！"
90100050-143 = "……そういえば「噂」で思い出したんですが。"
90100050-144 = "少し前に、この近くで陸上部員が倒れてたって話……聞いたことありますか？"
90100050-148 = "ん？タマちゃんのこと？なんでその話を――"
90100050-149 = "……なんでそんなこと聞くの？"
90100050-150 = "あ、特別な理由があるわけじゃないんです。"
90100050-151 = "最近この辺りで似たような事件が多いみたいなので、気をつけようと思いまして……。"
90100050-152 = "…………。"
90100050-153 = "あたしたちから話せることはないかな。"
90100050-154 = "どうせ、熱中症だって言うんでしょ？"
90100050-155 = "何も知らないくせに……。"
90100050-156 = "あ、あの、もしかして――"
90100050-160 = "ドリンク、ありがとね。"
90100050-167 = "はぁ……失敗ね……。"
90100050-168 = "逆鱗だったみたいだねぇ。"
90100050-169 = "こちらFOX2……ごめん、失敗しちゃったみたい。"
90100050-170 = "大丈夫だ。最初から好意的に来るとは思ってな――"
90100050-174 = "待て、FOX2。別の何者かが接近している。"
90100050-181 = "あの……そのドリンク、まだ配ってる？"
90100050-182 = "も、もちろんです。一杯いかがですか？"
90100050-187 = "ありがとう。知らないブランドだから気になって。"
90100050-191 = "ふーん……なんか独特な風味だね。この感じは初めてかも。#nあとでキララにも教えてあげよっと。"
90100050-192 = "にしても、この辺じゃ見かけない顔だよね。別の学園から来たの？"
90100050-193 = "は、はい！ここから少し離れてて……その、私立ヒヤシンス学園の……。"
90100050-194 = "うーん……どっかで聞いたことあるような……。"
90100050-195 = "まあいいや。さっき陸上部の子たちが言ってたのはあんまり気にしないであげて。#nあの子たち、例の件でちょっとピリついててさ。"
90100050-196 = "例の件、というと……。"
90100050-197 = "部員の1人が意識不明で見つかったってやつ。"
90100050-198 = "あの事件が気になってるんでしょ？"
90100050-199 = "いえ、私は別に――"
90100050-200 = "顔に書いてあるよ。「噂が気になって仕方ないです」って。"
90100050-201 = "あなたもなかなかの噂好きみたいだね。"
90100050-206 = "あはは……そんなに分かりやすかったですか？"
90100050-208 = "ゲヘナ陸上部は、もうすぐ全国大会のレギュラー選考会があるんだ。#n倒れた子も有力候補でさ。"
90100050-209 = "休日も1人で走り込みするくらい頑張ってたんだって。"
90100050-210 = "だから倒れてたのが見つかった時は、無理して熱中症になったんだってみんな思ったらしいんだけど……。"
90100050-212 = "……熱中症じゃなかったんですね。"
90100050-213 = "そう。もうSNSで広まってるけど、その子の身体に異常は無かった。#nゲヘナの救急医学部も確認してるし、デマじゃないと思う。"
90100050-214 = "でもそうなるとさ。[ruby=・]有[/ruby][ruby=・]力[/ruby][ruby=・]候[/ruby][ruby=・]補[/ruby]はなんで倒れたんだろう？って話になるんだよ。#n「他の部員が嫉妬して呪った」とか「嫌がらせした」みたいな噂まで出てて。"
90100050-215 = "ああ……だからあんな反応に。"
90100050-216 = "レギュラー争いのライバルは減るかもだけど、そういうの言われたら気分悪いじゃん？"
90100050-217 = "他人の目を気にしないマイペースが多い。#nそんな風に言われるゲヘナの生徒でも、悪い噂はさすがに気になるんだよ。"
90100050-218 = "そうですね。千人の指さす所病無くして死すって言いますし。"
90100050-219 = "まあ、本人が答えられない状況だから。#n陸上部の子はかわいそうだけど、噂が収まるのを待つしかないよね。"
90100050-223 = "……噂、ですか。"
90100050-224 = "風聞、風の便り……人から人へ伝わる話は自然現象に例えられることが多い気がします。"
90100050-225 = "止めようとしても止まらないし、逆らえば逆らうほど、思わぬ場所へ流れて被害を広げたりもして。"
90100050-226 = "当事者からすれば、巨大な波に向き合うような気分なのでしょうね。"
90100050-227 = "波に身を任せて、流されるまま受け入れるのも1つの手かもしれませんが……。"
90100050-228 = "私たちは、意思のない船ではありませんから。"
90100050-229 = "オールを握って、波に逆らってでも進まなければ――#n正しい目的地には辿り着けないと思うんです。"
90100050-234 = "それ、経験談？"
90100050-235 = "生きていて、一度も噂の種になったことがない人なんて……そうそういませんから。"
90100050-236 = "ふふっ、おもしろいね。"
90100050-237 = "よかったらモモトークのアカウント交換しない？また会えるかもしれないし。"
90100050-238 = "もちろん。少々お待ちください。"
90100050-243 = "よし。じゃ、また連絡するね。暑さには気をつけて。"
90100050-249 = "なんかキラキラしてる生徒だったね。"
90100050-250 = "だね。でもFOX2、まさか本物のアカウント教えたんじゃないよね？"
90100050-251 = "大丈夫。24時間後に消えるやつだよ。"
90100050-252 = "別の場所で会ってれば友達になれてたかもしれないけど……今は作戦中だから。"
90100050-256 = "こちらFOX2。作戦の終了を確認。すぐ戻るね。"
90100050-258 = "次回;真実と嘘"

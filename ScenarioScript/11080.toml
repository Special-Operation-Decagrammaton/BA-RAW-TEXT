[translation]
11080-2 = "Episode 8;The Might of Problem Solver 68"
11080-3 = "Foreclosure Task Force Room"
11080-4 = "All right. Time for us to begin our regularly scheduled Abydos Foreclosure Task Force meeting."
11080-5 = "I'll remind you that Sensei is in attendance today, so I would hope for more decorum than usual..."
11080-6 = "Okay! ☆"
11080-7 = "Naturally."
11080-8 = "Come on. You say that like we've never taken it seriously before..."
11080-9 = "Heh. It's good of you to join us, Sensei."
11080-10 = "[s] \"Thanks for having me.\""
11080-12 = "Okay. Let's get down to business and discuss the key item on our agenda... How do we settle the school's debts? Discuss."
11080-13 = "Raise your hand if you'd like to share your thoughts!"
11080-14 = "Ooh! Me! Me!"
11080-15 = "Yes, first-year Kuromi Serika. You have the floor."
11080-16 = "Seriously, again with the formalities? I hate it when you do that..."
11080-17 = "Why not? This is our first formal meeting in ages."
11080-18 = "Yeah, what's the big deal? It's nice to pull out all the stops once in a while. It's not every day we get to run a meeting with Sensei."
11080-19 = "This is the only time we've had a meeting with Sensei in attendance, to be precise."
11080-20 = "That's right! It's like we're a proper task force now! ☆"
11080-21 = "*sigh* Fine. You guys do have seniority here, I guess..."
11080-22 = "Moving on! As the treasurer, let me remind you that the school is on the verge of bankruptcy! "
11080-23 = "Abydos will seriously get shut down at this rate. Got it?"
11080-24 = "Well, yeah."
11080-25 = "We're paying nearly 8 million yen every month alone. We're doing everything we can to hold on, but that much is barely keeping up with the interest."
11080-26 = "There's only so much we can do by just arresting wanted criminals or taking care of civilian requests."
11080-27 = "We're royally screwed unless something changes. What we need is something big! Huge, even!"
11080-28 = "Something...big?"
11080-29 = "*rustle* Look at this! It's a flier from downtown!"
11080-30 = "This is..."
11080-31 = "Let me see here."
11080-32 = "\"Ready to become a boss babe billionaire? Get rich quick with the Germanium Granite...Bracelet...Network\"?!"
11080-33 = "That's right! We're all gonna become boss babe billionaires!"
11080-34 = "..."
11080-35 = "I was downtown recently, and these really cool people invited me to a seminar. They told me all about these amazing germanium bracelets that bring you luck!"
11080-36 = "..."
11080-37 = "They're so powerful that you can boost your good vibes just by wearing them! And if you can get three other girls who wanna become boss babes like you..."
11080-39 = "What? Why are you looking at me like that?"
11080-40 = "Proposal denied."
11080-41 = "What?! Why?!"
11080-42 = "Serika... Have you ever heard the phrase \"pyramid scheme\" before?"
11080-43 = "It's a scam."
11080-44 = "What?!"
11080-45 = "First, I don't think germanium can possibly affect your luck. Second, if this is such a great business plan, why would they give it away for free at such a fishy-sounding seminar?"
11080-46 = "N-No way! I already bought two bracelets, so that can't be right!"
11080-47 = "Serika is so gullible it's cute! ☆"
11080-48 = "...!"
11080-49 = "Aw, you can be so naive, Serika. Sweet, but naive. You'd better start wising up, or else you're going to have your life ruined by one of them scheming adults!"
11080-50 = "B-But...it sounded so convincing. I even skipped out on lunch so I could afford these..."
11080-51 = "There, there, Serika. It's okay. Why don't I treat you to lunch?"
11080-52 = "*sniff* Aww. Nonomi..."
11080-54 = "Well, then... That's it for Serika's suggestion. Anyone else?"
11080-55 = "Me! Me!"
11080-56 = "Okay. President Takanashi Hoshino has the floor..."
11080-57 = "Thank you. Ahem..."
11080-58 = "You know what this school's problem is? It's that the entire student body is just us."
11080-59 = "More students means more money. Think about Trinity or Gehenna with their five-digit enrollment numbers.#nThink about how much they must be raking in with monthly student fees alone!"
11080-60 = "I suppose... And?"
11080-61 = "So we need to increase our enrollment numbers! That's where we should start."
11080-62 = "We'll also get more representatives and have a bigger voice with the General Student Council that way."
11080-63 = "I admit you raise a good point, but how do you suggest we do this?"
11080-64 = "Simple. We abduct another academy's school bus!"
11080-65 = "Excuse me?!"
11080-66 = "We carjack a bus full of students on their way to school, and we hold them hostage until they sign the transfer form to Abydos!"
11080-67 = "This is sure to get our enrollment numbers up! Heh!"
11080-68 = "Interesting."
11080-69 = "So who's our target? Trinity? Gehenna? Or is it Millennium?"
11080-70 = "We'll have to evolve our strategy to fit the target."
11080-71 = "Oh, yeah? Well, how about Trinity? No, wait! Let's hit Gehenna!"
11080-72 = "Wait a second! We can't possibly boost our enrollment with a stunt like that!"
11080-73 = "Not to mention the other schools' respective leaderships would surely put up a fight..."
11080-74 = "Heh. I suppose they would."
11080-75 = "You suppose they would? Hoshino... Can you please try to take this meeting seriously?"
11080-77 = "I have an even better idea."
11080-78 = "Fine. Go ahead, second-year student, Sunaookami Shiroko. "
11080-79 = "We rob a bank."
11080-80 = "What?!"
11080-81 = "It's a surefire plan, and we already have the perfect target.#nLet's hit the First Central Bank downtown."
11080-82 = "I've already mapped out everything from the location of the vault to the positions of the guards, blind spots for the security cameras, and even the armored car's transportation route."
11080-83 = "Is that what you've been working on this whole time?!"
11080-84 = "We can earn 100 million yen in five minutes flat. In-and-out, easy.#nHere, I even brought masks."
11080-88 = "Where did you find the time to prepare all of this?"
11080-89 = "Whoa! Did you knit these yourself, Shiroko?"
11080-92 = "Wowie! Check it out! Don't I look like a luchador?"
11080-93 = "..."
11080-94 = "This is nice! All or nothing! Isn't that what life is all about, Serika?"
11080-97 = "Heck no it isn't! Absolutely not! DENIED!"
11080-98 = "She's right! We can't possibly stoop to being criminals!"
11080-101 = "..."
11080-102 = "Pout all you want, Shiroko, but there are some lines that can't be crossed!"
11080-103 = "*sigh* Seriously. If no one comes up with a real idea soon..."
11080-105 = "Hey, excuse me! Me next!"
11080-106 = "Very well. Second-year Izayoi Nonomi... As long as it doesn't involve scams or breaking the law, you have the floor."
11080-107 = "You got it! I have the perfect thing, and I promise it isn't illegal or a pyramid scheme. This one is definitely gonna work!"
11080-108 = "Two words: pop idols! Schoolgirl pop idols, to be exact!"
11080-109 = "Pop idols...?!"
11080-110 = "You heard me! It happens all the time in anime. Nothing helps revitalize a school like becoming a pop superstar! If we all break into the industry together as pop idols..."
11080-111 = "Denied."
11080-112 = "What...? You don't like that idea either?"
11080-113 = "Why not? You'd definitely have some fans, Hoshino."
11080-114 = "Heh. Only creeps would like frail, little me. No, thanks."
11080-115 = "But I even came up with poses..."
11080-116 = "*poses*"
11080-117 = "Christina of the Swimsuit Gang! ♧"
11080-118 = "Are you..."
11080-119 = "...KIDDING ME?! The Swimsuit WHAT?! That's so lame!"
11080-120 = "Aww. But I worked on it all night..."
11080-122 = "This meeting is just going in circles now. Shouldn't we at least try to decide on something? Anything?"
11080-123 = "Why not let Sensei decide? Sensei, which idea do you think we should go with?"
11080-124 = "No way! You want to make a decision already? Shouldn't we at least throw out some better ideas first?"
11080-125 = "It'll be fine. If Sensei backs it, then I'm sure it'll be the right one."
11080-126 = "Now wait just a minute. How does that make any sense?"
11080-128 = "I mean, at least this means becoming pop idols is off the table...right?"
11080-129 = "Idol stardom, here we come! ☆"
11080-130 = "*hopefully puts mask back on*"
11080-131 = "[s1] \"Time to hijack a school bus!\"\n[s2] \"We're going bank robbing!\"\n[s3] \"Become pop idols! I'll be the manager!\""
11080-135 = "THAT'S what you're picking?! Are you sure?!"
11080-136 = "Hahaha! I guess we have a winner. Let's do this!"
11080-137 = "Yay! That sounds like so much fun! ☆"
11080-138 = "This is a joke...right? We aren't really..."
11080-139 = "Why not?"
11080-140 = "Might as well go big or go home. Isn't that right, Ayane?"
11080-141 = "Obviously..."
11080-142 = "Really?"
11080-144 = "OBVIOUSLY NOT!"
11080-145 = "*craaash*"
11080-146 = "She did it! Ayane flipped the table!"
11080-147 = "..."
11080-148 = "Ahhh! Ayane is in berserk mode! Everyone take cover!"
11080-149 = "She's grown up to be such a stern young lady. It does my old heart proud."
11080-150 = "Can't you take this seriously for one second?! I swear, it's like I'M the only mature one here! "
11080-151 = "All you four ever do is fool around! Robbing banks, pyramid schemes...#nIs this supposed to be some kind of joke?!"
11080-153 = "*flinches*"
11080-154 = "..."
11080-156 = "Ayane continued to chew everyone out for a while."
11080-158 = "Everything's going to be all right, Ayane. We're sorry, okay?#nI'll treat you to some ramen to make it up to you."
11080-159 = "I'm...not angry..."
11080-160 = "That's it. Hush now. There's a good girl. ☆"
11080-161 = "Stop treating me like a child!"
11080-162 = "That's fine and all, but did you guys seriously have to come back here again?"
11080-163 = "Want some more chashu, Ayane?"
11080-164 = "*nom* *nom* Yesh."
11080-165 = "(door opens)"
11080-166 = "..."
11080-167 = "Oh... U-Um..."
11080-168 = "Welcome! How many in your party?"
11080-169 = "Uh... Excuse me. How much is the cheapest thing on your menu?"
11080-170 = "Our lowest priced dish?"
11080-171 = "That would be the regular Shiba Seki Ramen Bowl for 580 yen!#nIt's our signature dish and super tasty too!"
11080-172 = "Oh, uh, thank you!"
11080-173 = "(door opens)"
11080-174 = "Hmm?"
11080-175 = "(door opens)"
11080-181 = "Heh. We finally found something that costs less than 600 yen!"
11080-183 = "A yen saved is a yen earned. I knew we'd find one."
11080-184 = "Y-You were right. I guess you really do know everything, Boss..."
11080-185 = "*sigh*"
11080-188 = "So, four in your party? I'll show you to your seats."
11080-189 = "Oh, no, no, no. You don't have to do that. We're only going to order the one."
11080-190 = "Just one...? Still, you may as well be comfortable. Plus we're not very busy at the moment."
11080-191 = "Well, isn't that nice of you? Don't mind if we do."
11080-192 = "Oh, and can you get us four pairs of chopsticks while you're at it?#nThanks, missy."
11080-193 = "Four pairs? Uh, you're not thinking of splitting a single bowl between the four of you, are you?"
11080-194 = "S-Sorry! I'm so sorry! I'm sorry that we're broke and we're poor!"
11080-195 = "What...?! I mean, that's not really something to apologize for..."
11080-196 = "No, really! What's the point of living like this? We're just a waste of air!#nLower than dirt! We never should have come in here. Sorry, sorry, sorry..."
11080-197 = "*sigh* For crying out loud... Knock it off, Haruka. You're making a scene."
11080-198 = "Don't say that! Being poor isn't a crime or anything to be ashamed of.#nYou shouldn't be so hard on yourself!"
11080-200 = "I...shouldn't?"
11080-201 = "You're students! No one expects you to be loaded with cash. Still, you and your friends scraped enough to share a bowl of ramen together. That's saying something, isn't it?"
11080-202 = "Hang tight. I'd be glad to bring it out for you."
11080-205 = "I think she got the wrong idea."
11080-206 = "Yeah! It's not like we're beggars. It's just because Aru blew through our cash."
11080-207 = "That's \"Boss\" to you. You should know better than to not refer to me by my title, Chief of Staff Mutsuki."
11080-208 = "Really? You still want us to call you Boss when we're off the clock? And what kind of boss can't afford to treat her employees to more than one measly bowl of ramen?"
11080-209 = "..."
11080-210 = "Maybe you should've thought of that before blowing all of our money on hired goons."
11080-211 = "Heh. Would you expect me to do anything less? Be grateful there was enough left for a bowl of ramen."
11080-212 = "You could have negotiated to make sure there was enough left for four, you know... "
11080-213 = "Just admit that you forgot to account for dinner in today's expenses, Aru."
11080-214 = "Heh heh heh... "
11080-215 = "I get why you would want to reduce the risk factor of this operation. You're right about not underestimating the target. They aren't jobbers like the Helmet Gang."
11080-216 = "But really, Boss? Are these Abydos students really worth blowing our entire budget on hiring extra muscle?"
11080-217 = "They could be..."
11080-218 = "Aru probably doesn't even know. That's why she hired those goons—because she's chicken."
11080-219 = "Who are you calling a chicken?! I'm just being careful and covering our bases!"
11080-220 = "Failure is not an option. You all know Problem Solver 68's motto:#nExpect the unexpected."
11080-221 = "This is the first I'm hearing about this motto."
11080-222 = "Pretty sure she just made that up on the spot."
11080-223 = "Shut up! I'll take you all out for sukiyaki once we finish this job and get paid. So you'd better go all out!"
11080-224 = "Sukiyaki...?! What's that?"
11080-225 = "It's a dish that adults like. And it's really expensive..."
11080-226 = "W-Wow. I don't know if dirt like me could appreciate it, then. Would I have to sacrifice my life afterward for overindulging?"
11080-227 = "Fufufu. We're an industry titan at this point. We deserve only the best, wouldn't you agree?"
11080-228 = "Heh! You're so ambitious, Aru."
11080-229 = "I told you to call me Boss!"
11080-231 = "Order up! The bowl's hot, so be careful!"
11080-232 = "*thud*"
11080-233 = "What the...? This bowl is huge."
11080-234 = "It looks like it could feed ten people..."
11080-235 = "Uh, are you sure this is the right order? We don't have the money to pay for something like this..."
11080-236 = "This is exactly what you ordered. A plain 580-yen Shiba Seki Ramen Bowl. Isn't that right, Master?"
11080-237 = "Well, I might have overfilled a smidge, but that's all right."
11080-238 = "Master says it's all good, so don't worry! Enjoy your meal!"
11080-241 = "W-Wow..."
11080-242 = "I say we eat first and ask questions later. Chopsticks ready!"
11080-243 = "I didn't see this coming, but it'd be rude of us to send it back."
11080-244 = "Let's dig in!"
11080-245 = "*slurp*"
11080-246 = "...!"
11080-247 = "I-It's so yummy!"
11080-248 = "Not bad at all. Who knew there was such a good ramen shop out here in the boonies?"
11080-249 = "*squeezes in* I know, right? Isn't it the best?"
11080-250 = "Huh? Weren't you sitting at the table next to us?"
11080-251 = "Yep! The ramen here is the best around. People come from all over just to get a taste of it."
11080-252 = "I can see why. I've been to my fair share of shops, and ramen this good is hard to find."
11080-253 = "We're regulars here. Sorry to interrupt your meal, but we wanted to say it's good to see students from other schools come here and see the light."
11080-254 = "That uniform you're wearing is Gehenna's, right? That's a long trip."
11080-255 = "Girls sharing a bowl of ramen together like this. It's a little nostalgic, isn't it?"
11080-256 = "Wasn't that a bowl of udon?"
11080-259 = "(...)"
11080-260 = "(Their uniforms...)"
11080-261 = "(Hey, you're right.)"
11080-262 = "Haha! I never expected to run into fellow connoisseurs here.#nIsn't life wonderfully unpredictable sometimes?"
11080-263 = "(Something tells me Aru hasn't put two and two together yet.)"
11080-264 = "(Should we tell her?)"
11080-265 = "(Nah. This is interesting. Let's see what happens.)"
11080-272 = "(...)"
11080-274 = "Next Episode;Unrelenting Blood Feud"

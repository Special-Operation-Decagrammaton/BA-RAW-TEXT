[translation]
11080-2 = "第8話;便利屋参上！"
11080-3 = "対策委員会・教室"
11080-4 = "……それでは、アビドス対策委員会の定例会議を始めます。"
11080-5 = "本日は先生にもお越しいただいたので、いつもより真面目な議論ができると思うのですが……。"
11080-6 = "は～い☆"
11080-7 = "もちろん。"
11080-8 = "何よ、いつもは不真面目みたいじゃない……。"
11080-9 = "うへ、よろしくねー、先生。"
11080-10 = "[s] \"よろしく。\""
11080-12 = "早速議題に入ります。本日は、私たちにとって非常に重要な問題……#n「学校の負債をどう返済するか」について、具体的な方法を議論します。"
11080-13 = "ご意見のある方は、挙手をお願いします！"
11080-14 = "はい！はい！"
11080-15 = "はい、1年の[ruby=くろみ]黒見[/ruby]さん。お願いします。"
11080-16 = "……あのさ、まず名字で呼ぶの、やめない？ぎこちないんだけど。"
11080-17 = "せ、セリカちゃん……でも、せっかく会議だし……。"
11080-18 = "いいじゃーん、おカタ～い感じで。それに今日は珍しく、先生もいるんだし。"
11080-19 = "珍しくというより、初めて。"
11080-20 = "ですよね！なんだか委員会っぽくてイイと思いま～す☆"
11080-21 = "はぁ……ま、先輩たちがそう言うなら……。"
11080-22 = "……とにかく！対策委員会の会計担当としては、現在我が校の財政状況は#n破産の寸前としか言いようがないわっ！"
11080-23 = "このままじゃ廃校だよ！みんな、わかってるよね？"
11080-24 = "うん、まあねー。"
11080-25 = "毎月の返済額は、利息だけで788万円！#n私たちも頑張って稼いではいるけど、正直利息の返済も追いつかない。"
11080-26 = "これまで通り、指名手配犯を捕まえたり、苦情を解決したり、ボランティアするだけじゃ限界があるわ。"
11080-27 = "このままじゃ、らちが明かないってこと！何かこう、でっかく一発狙わないと！"
11080-28 = "でっかく……って、例えば？"
11080-29 = "（ピラッ）これこれ！街で配ってたチラシ！"
11080-30 = "これは……！？"
11080-31 = "どれどれ……。"
11080-32 = "「ゲルマニウム麦飯石ブレスレットであなたも一攫千金」……ねえ…？"
11080-33 = "そうっ！これでガッポガッポ稼ごうよ！"
11080-34 = "……。"
11080-35 = "この間、街で声をかけられて、説明会に連れていってもらったの。#n運気を上げるゲルマニウムブレスレットってのを売ってるんだって！"
11080-36 = "……。"
11080-37 = "これね、身に着けるだけで運気が上がるんだって！で、これを周りの3人に売れば……。"
11080-39 = "……みんな、どうしたの？"
11080-40 = "却下ー。"
11080-41 = "えーっ！？何で？どうして！"
11080-42 = "セリカちゃん……それ、マルチ商法だから…… 。"
11080-43 = "儲かるわけない。 "
11080-44 = "へっ！？ "
11080-45 = "そもそもゲルマニウムと運気アップって関係あるのかな……#nこんな怪しいところで、まともなビジネスを提案してくれるはずなんてないよ……。"
11080-46 = "そっ、そうなの？私、2個も買っちゃったんだけど！？"
11080-47 = "セリカちゃん、騙されちゃいましたね。可愛いです☆"
11080-48 = "……！！"
11080-49 = "まったく、セリカちゃんは世間知らずだねー。#n気を付けないと、悪い大人に騙されて、人生取り返しのつかないことになっちゃうかもよー？"
11080-50 = "そ、そんなあ……そんな風には見えなかったのに……#nせっかくお昼抜いて貯めたお金で買ったのに……。"
11080-51 = "大丈夫ですよセリカちゃん。お昼、一緒に食べましょう？私がご馳走しますから。"
11080-52 = "ぐすっ……ノノミせんぱぁい……。"
11080-54 = "えっと……それでは、黒見さんからの意見はこの辺で……#n他にご意見のある方……。"
11080-55 = "はい！はい！"
11080-56 = "えっと……はい、3年の[ruby=たかなし]小鳥遊[/ruby]委員長。ちょっと嫌な予感がしますが……。"
11080-57 = "うむうむ、えっへん！"
11080-58 = "我が校の一番の問題は、全校生徒がここにいる数人だけってことなんだよねー。"
11080-59 = "生徒の数イコール学校の力。トリニティやゲヘナみたいに、#n生徒数を桁違いに増やせれば、毎月のお金だけでもかなりの金額になるはずー。"
11080-60 = "え……そ、そうなんですか？"
11080-61 = "そういうことー！だからまずは生徒の数を増やさないとねー、まずはそこからかなー。"
11080-62 = "そうすれば議員も輩出できるし、連邦生徒会での発言権も与えられるしね。"
11080-63 = "鋭いご指摘ですが……でもどうやって……。"
11080-64 = "簡単だよー、他校のスクールバスを拉致ればオッケー！"
11080-65 = "はい！？"
11080-66 = "登校中のスクールバスをジャックして、うちの学校への転入学書類にハンコを#n押さないとバスから降りられないようにするのー。"
11080-67 = "うへ～、これで生徒数がグンと増えること間違いなーし！"
11080-68 = "それ、興味深いね。"
11080-69 = "ターゲットはトリニティ？それともゲヘナ？ミレニアム？"
11080-70 = "狙いをどこに定めるかによって、戦略を変える必要があるかも。"
11080-71 = "お？……えーっと、うーん……そうだなあ、トリニティ？いや、ゲヘナにしよーっと！"
11080-72 = "ちょ、ちょっと待ってください！そんな方法で転校とかってありなんですか！？"
11080-73 = "それに、他校の風紀委員が黙っていませんよ……。"
11080-74 = "うへ～やっぱそうだよねー？"
11080-75 = "やっぱそうだよねー、じゃありませんよ、ホシノ先輩……#nもっと真面目に会議に臨んでいただかないと……。"
11080-77 = "いい考えがある。"
11080-78 = "……はい、2年の[ruby=すなおおかみ]砂狼[/ruby]シロコさん……。"
11080-79 = "銀行を襲うの。"
11080-80 = "はいっ！？"
11080-81 = "確実かつ簡単な方法。ターゲットも選定済み。#n市街地にある第一中央銀行。"
11080-82 = "金庫の位置、警備員の動線、現金輸送車の走行ルートは事前に把握しておいたから。"
11080-83 = "さっきから一生懸命見てたのは、それですか！？"
11080-84 = "5分で1億は稼げる。はい、覆面も準備しておいた。"
11080-88 = "いつの間にこんなものまで……。"
11080-89 = "うわー、これ、シロコちゃんの手作りー？"
11080-92 = "わあ、見てください！レスラーみたいです！"
11080-93 = "……。"
11080-94 = "いやー、いいねぇ。人生一発でキメないと。ねえ、セリカちゃん？"
11080-97 = "そんなわけあるか！！却下！却下ー！！"
11080-98 = "そっ、そうですっ！犯罪はいけませんっ！"
11080-101 = "……。"
11080-102 = "そんなふくれっ面をしてもダメなものはダメです、シロコ先輩っ！"
11080-103 = "はあ……みなさん、もうちょっとまともな提案をしていただかないと……。"
11080-105 = "あのー！はい！次は私が！"
11080-106 = "はい……2年の[ruby=いざよい]十六夜[/ruby]ノノミさん。犯罪と詐欺は抜きでご意見をお願いします……。"
11080-107 = "はい！犯罪でもマルチ商法でもない、とってもクリーンかつ確実な方法があります！"
11080-108 = "アイドルです！スクールアイドル！"
11080-109 = "ア、アイドル……！？"
11080-110 = "そうです！アニメで観たんですけど、学校を復興する定番の方法はアイドルです！#n私たち全員がアイドルとしてデビューすれば……。"
11080-111 = "却下。"
11080-112 = "あら……これも駄目なんですか？"
11080-113 = "なんで？ホシノ先輩なら、特定のマニアに大ウケしそうなのに。"
11080-114 = "うへーこんな貧相な体が好きとか言っちゃう輩なんて、人間としてダメっしょー。ないわー、ないない。"
11080-115 = "決めポーズも考えておいたのに…… 。"
11080-116 = "（じゃーん！）"
11080-117 = "水着少女団のクリスティーナで～す♧"
11080-118 = "どういうことよ……。"
11080-119 = "何が「で～す♧」よ！それに「水着少女団」って！だっさい！"
11080-120 = "えー、徹夜で考えたのに……。"
11080-122 = "あのう……議論がなかなか進まないんですけど、そろそろ結論を……。"
11080-123 = "それは先生に任せちゃおうー。先生、これまでの意見で、やるならどれがいい？"
11080-124 = "えっ！？これまでの意見から選ぶんですか！？も、もう少しまともな意見を出してからの方がいいのでは！？"
11080-125 = "大丈夫だよー。先生が選んだものなら、間違いないって。"
11080-126 = "ちょ、ちょっと待ってください！何でそう言い切れるんですか！？"
11080-128 = "まさかアイドルをやれなんて言わないよね？"
11080-129 = "アイドルで☆お願いします♧"
11080-130 = "……（スッ）"
11080-131 = "[s1] \"スクールバスをジャックする！\"\n[s2] \"銀行を襲う！\"\n[s3] \"アイドルグループ結成！私がプロデューサーになる！\""
11080-135 = "えぇっ！？本気ですか！？"
11080-136 = "あはははー！よし、決まりー！それじゃあ出発だー！"
11080-137 = "きゃあ～☆楽しそうです！"
11080-138 = "ほ、ホントに？これでいいの？"
11080-139 = "うへ～いいんじゃなーい？"
11080-140 = "計画は大胆なほどいい。でしょ、アヤネ？"
11080-141 = "……い……。"
11080-142 = "い……？"
11080-144 = "いいわけないじゃないですかぁ！！"
11080-145 = "ガッシャーン！"
11080-146 = "出たー！アヤネちゃんのちゃぶ台返しー！"
11080-147 = "……。"
11080-148 = "きゃあ、アヤネちゃんが怒りました！非常事態です！"
11080-149 = "うへ～キレのある返しができる子に育ってくれたねえ。ママは嬉しいよーん。"
11080-150 = "誰がママですかっ！もうっ、ちゃんと真面目にやってください！"
11080-151 = "いつもふざけてばっかり！銀行強盗とかマルチ商法とかそんなことばっかり言って！"
11080-153 = "（ギクッ）"
11080-154 = "……。"
11080-156 = "（その後めちゃくちゃ説教された）"
11080-158 = "いやぁー、悪かったってば、アヤネちゃーん。ラーメン奢ってあげるからさ、怒らないで、ねっ？"
11080-159 = "怒ってません……。"
11080-160 = "はい、お口拭いて。はい、よくできましたねー☆"
11080-161 = "赤ちゃんじゃありませんからっ。"
11080-162 = "……なんでもいいんだけどさ。なんでまたウチに来たの？"
11080-163 = "アヤネ、チャーシューもっと食べる？"
11080-164 = "（もごもご）ふぁい。"
11080-165 = "（ガタッ、ガララッ）"
11080-166 = "……。"
11080-167 = "あ……あのう……。"
11080-168 = "いらっしゃいませ！何名様ですか？"
11080-169 = "……こ、ここで一番安いメニューって、お、おいくらですか？"
11080-170 = "一番安いのは……"
11080-171 = "580円の柴関ラーメンです！看板メニューなんで、美味しいですよ！"
11080-172 = "あ、ありがとうございます！"
11080-173 = "（ガララッ）"
11080-174 = "ん？"
11080-175 = "（ガララッ）"
11080-181 = "えへへっ、やっと見つかった、600円以下のメニュー！"
11080-183 = "ふふふ。ほら、何事にも解決策はあるのよ。全部想定内だわ。"
11080-184 = "そ、そうでしたか、さすが社長、何でもご存知ですね……。"
11080-185 = "はあ……。"
11080-188 = "4名様ですか？お席にご案内しますね。"
11080-189 = "んーん、どうせ1杯しか頼まないし大丈夫。"
11080-190 = "一杯だけ……？でも……どうせならごゆっくりお席へどうぞ。今は暇な時間なので、空いてる席も多いですし。"
11080-191 = "おー、親切な店員さんだね！ありがとう、それじゃあお言葉に甘えて。"
11080-192 = "あ、わがままのついでに、箸は4膳でよろしく。優しいバイトちゃん。"
11080-193 = "えっ？4膳ですか？ま、まさか1杯を4人で分け合うつもり？"
11080-194 = "ご、ご、ごめんなさいっ。貧乏ですみません！！お金がなくてすみません！！"
11080-195 = "あ、い、いや……！その、別にそう謝らなくても……。"
11080-196 = "いいえ！お金がないのは首がないのも同じ！生きる資格なんてないんです！#n虫けらにも劣る存在なのです！虫けら以下ですみません……！"
11080-197 = "はあ……ちょっと声デカいよ、ハルカ。周りに迷惑……。"
11080-198 = "そんな！お金がないのは罪じゃないよ！胸を張って！"
11080-200 = "へ？……はい！？"
11080-201 = "お金は天下の回りもの、ってね。そもそもまだ学生だし！#nそれでも、小銭をかき集めて食べに来てくれたんでしょ？そういうのが大事なんだよ！"
11080-202 = "もう少し待っててね。すぐ持ってくるから。"
11080-205 = "……何か妙な勘違いをされてるみたいだけど？"
11080-206 = "まあ、私たちもいつもはそんなに貧乏ってわけじゃないんだけどね。しいて言えば、金遣いの荒いアルちゃんのせいだし。"
11080-207 = "「アルちゃん」じゃなくて社長でしょ？ムツキ室長、肩書はちゃんと付けてよ。"
11080-208 = "ん？だってもう仕事終わった後じゃん？ところで、社長のクセに社員にラーメン1杯奢れないなんて。"
11080-209 = "……。"
11080-210 = "今日の襲撃任務に投入する人員を雇うために、ほぼ全財産使っちゃったし……。"
11080-211 = "ふふふ。でもこうして実際ラーメンは口にできるわけでしょ？それぐらい想定内よ。"
11080-212 = "たったの1杯分じゃん。せめて4杯分のお金は確保しておこうよ……。"
11080-213 = "ぶっちゃけ、忘れたんでしょ？ねえ、アルちゃん。夕飯代取っておくの、忘れたんでしょ？"
11080-214 = "……ふふふ。"
11080-215 = "はあ。ま、リスクは減らせたほうがいいし。今回のターゲットは、ヘルメット団みたいなザコみたいには扱えないってことには同意する。"
11080-216 = "でも全財産をはたいて人を雇わなきゃいけないほど、アビドスは危険な連中なの？"
11080-217 = "それは……。"
11080-218 = "多分アルちゃんもよくわかってないと思うよ。だからビビっていっぱい雇ってるんだよ。"
11080-219 = "誰がビビってるって！？全部私の想定内！"
11080-220 = "失敗は許されない。あらゆるリソースを総動員して臨むわ。それが我が便利屋68のモットーよ！"
11080-221 = "初耳だね、そんなモットー……。"
11080-222 = "今思いついたに決まってるよ。"
11080-223 = "うるさい！じゃあ今回の依頼を成功させて報酬が手に入ったら、すき焼きにするわ！だから気合入れなさい、みんな！"
11080-224 = "すっ……すき焼きとはっ……！？それは一体！？"
11080-225 = "大人の食べ物だね、すごく高価な……。"
11080-226 = "う、うわあ……私なんかが食べていいものなんでしょうか？食べた後はハラキリですか……？"
11080-227 = "ふふふ。うちみたいなスゴイ会社の社員なら、それぐらいの贅沢はしないとね。"
11080-228 = "へえ～やる気満々じゃん、アルちゃん。"
11080-229 = "「アルちゃん」じゃなくて、社・長！！"
11080-231 = "はい、お待たせいたしました！お熱いのでお気をつけて！"
11080-232 = "（ダンッ！）"
11080-233 = "ひぇっ、何これ！？ラーメン超大盛じゃん！"
11080-234 = "ざっと、10人前はあるね……。"
11080-235 = "こ、これはオーダーミスなのでは？こんなの食べるお金、ありませんよう……。"
11080-236 = "いやいや、これで合ってますって。580円の柴関ラーメン並！ですよね、大将？"
11080-237 = "ああ、ちょっと手元が狂って量が増えちまったんだ。気にしないでくれ。"
11080-238 = "大将もああ言ってるんだから、遠慮しないで！それじゃ、ごゆっくりどうぞー！"
11080-241 = "う、うわあ……。"
11080-242 = "よくわかんないけど、ラッキー！いっただきまーす！"
11080-243 = "……ふふふ、さすがにこれは想定外だったけど、厚意に甘えて、ありがたく頂かないとね。"
11080-244 = "食べよっ！"
11080-245 = "（ズズズズズーッ）"
11080-246 = "！！"
11080-247 = "お、おいしいっ！"
11080-248 = "なかなかイケるじゃん？こんな辺ぴな場所なのに、このクオリティなんて。"
11080-249 = "（スッ）でしょう、でしょう？美味しいでしょう？"
11080-250 = "あれ……？隣の席の……。"
11080-251 = "うんうん、ここのラーメンは本当に最高なんです。遠くからわざわざ来るお客さんもいるんですよ。"
11080-252 = "ええ、わかるわ。色んな所で色んなのを食べてきたけど、このレベルのラーメンはなかなかお目にかかれないもの。"
11080-253 = "えへへ……私たち、ここの常連なんです。他の学校のみなさんに食べていただけるなんて、なんか嬉しいです……。"
11080-254 = "その制服、ゲヘナ？遠くから来たんだね。"
11080-255 = "私、こういう光景を見たことがあります。一杯のラーメン、でしたっけ……。"
11080-256 = "うへ～、それは一杯のかけそばじゃなかったっけ？"
11080-259 = "（……）"
11080-260 = "（……連中の制服……）"
11080-261 = "（あれ、ホントだ）"
11080-262 = "うふふふっ！いいわ、こんなところで気の合う人たちに会えるなんて。#nこれは想定外だけど、こういう予測できない出来事こそ人生の醍醐味じゃないかしら。"
11080-263 = "（アルちゃんは気づいてないみたいだけど？）"
11080-264 = "（……言うべき？）"
11080-265 = "（……面白いから放っておこ）"
11080-272 = "（……）"
11080-274 = "次回;恩知らずの血戦"

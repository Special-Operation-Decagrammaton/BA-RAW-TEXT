[translation]
11080-2 = "ตอนที่ 8;หน่วยรับจ้างสารพัดปรากฏตัว!"
11080-3 = "ห้องชมรมคณะกรรมการแผนงาน"
11080-4 = "เอาละ ขอเริ่มการประชุมคณะกรรมการแผนงานอะบิดอสเลยนะคะ"
11080-5 = "การประชุมครั้งนี้มีคุณครูมาเข้าร่วมด้วย หวังว่าเราจะประชุมกันอย่างจริงจังมากขึ้นนะคะ..."
11080-6 = "ค่าา~☆"
11080-7 = "แน่นอน"
11080-8 = "อะไรกัน หมายความว่าก่อนหน้านี้เราไม่จริงจังเหรอ?"
11080-9 = "แหะๆ ยังไงก็รบกวนด้วยนะครู"
11080-10 = "[s] \"ขอฝากตัวด้วยนะ\""
11080-12 = "งั้นกลับเข้าเรื่องเลยนะคะ ประเด็นสำคัญของเราในวันนี้ก็คือ... การคิดหาวิธีอย่างรูปธรรมว่า#n<เราจะใช้หนี้ของโรงเรียนยังไง?>"
11080-13 = "นักเรียนที่ต้องการเสนอความเห็น ยกมือได้เลยค่ะ"
11080-14 = "ฉัน! ฉัน!"
11080-15 = "คุณคุโรมิ เซริกะ ชั้นปีที่ 1 เชิญพูดค่ะ"
11080-16 = "เอ่อ... ไม่ต้องเรียกกันเต็มยศไม่ได้เหรอ? ยังไงก็ไม่ชินเลย"
11080-17 = "แต่นี่เป็นการประชุมทั้งทีนะ เซริกะจัง..."
11080-18 = "ไม่เห็นเป็นไรเลย เปลี่ยนบรรยากาศดีออก เราแทบไม่ได้ประชุมกับครูเลยนะ"
11080-19 = "ไม่ใช่ 'แทบไม่ได้' เรียกว่า 'ไม่เคย' เลยดีกว่า"
11080-20 = "ใช่ค่ะ! ฉันชอบแบบนี้นะคะ เหมือนเราเป็นคณะกรรมการจริงๆ เลย~☆"
11080-21 = "ก็ได้ ถ้ารุ่นพี่ทุกคนจะคิดแบบนี้..."
11080-22 = "เอาละ...! ฉันจะพูดในฐานะผู้รับผิดชอบบัญชีของคณะกรรมการแผนงาน ตอนนี้โรงเรียนของเรากำลังจะล้มละลายแล้ว!"
11080-23 = "หากเป็นแบบนี้ไปเรื่อยๆ คงได้ล้มละลายจริงๆ แน่! ทุกคนก็รู้อยู่ใช่ไหม?"
11080-24 = "รู้สิ"
11080-25 = "ลำพังดอกเบี้ยที่ต้องจ่ายธนาคารทุกเดือนก็ 7,880,000 เยนเข้าไปแล้ว! พวกเราออกไปทำงาน#nเพื่อหาเงินมาได้ก็จริง แต่ก็แทบจะไม่พอจ่ายค่าดอกเบี้ยรายเดือนด้วยซ้ำ"
11080-26 = "ตอนนี้เราทำได้แค่จับกุมผู้ต้องหาตามป้ายประกาศจับ คลี่คลายปัญหาของชาวเมือง แล้วก็งานจิตอาสานอกพื้นที่"
11080-27 = "ทำแค่นี้ไม่พอแน่! เราต้องทำอะไรที่ยิ่งใหญ่กว่านี้ แบบทำงานเดียวใช้หนี้ได้เลย!"
11080-28 = "อะไรที่... ยิ่งใหญ่งั้นเหรอ?"
11080-29 = "(ฟึ่บ!) สิ่งนี้ไง! นี่คือใบปลิวที่ฉันได้มาจากในเมือง!"
11080-30 = "นี่มัน..."
11080-31 = "ไหนขอดูซิ..."
11080-32 = "คุณก็เป็นเศรษฐีได้... ด้วยธุรกิจเครือข่ายกำไลหินเจอร์เมเนียม...?"
11080-33 = "ใช่! เราจะหาเงินได้เป็นกอบเป็นกำจากธุรกิจนี้!"
11080-34 = "......"
11080-35 = "คราวก่อนฉันเข้าไปในเมืองและบังเอิญถูกลากเข้าไปร่วมประชุมธุรกิจนี้ พวกเขาขายกำไล#nเจอร์เมเนียมนำโชคอยู่ละ!"
11080-36 = "......"
11080-37 = "พวกเขาบอกว่าเพียงแค่ใส่กำไลนี้ โชคก็จะวิ่งเข้าหา ทำอะไรก็รุ่งไปหมด! ถ้าเอาไปขายให้คนสัก#n3 คนละก็..."
11080-39 = "ทำไมทุกคนทำหน้าแบบนี้ล่ะ?"
11080-40 = "ปัดตกไปแล้วกัน"
11080-41 = "อะไรนะ?! ทำไมล่ะ? ทำไมถึงไม่เห็นด้วยล่ะ?!"
11080-42 = "เซริกะจัง... นั่นมันเครือข่ายลูกโซ่นะ"
11080-43 = "หลอกลวงผู้บริโภค"
11080-44 = "ว่าไงนะ?!"
11080-45 = "ฉันไม่รู้ด้วยซ้ำว่าเจอร์เมเนียมจะเกี่ยวข้องกับโชคลาภยังไง... เราจะเชื่อถือโมเดลธุรกิจจากการ#nประชุมที่น่าสงสัยแบบนี้ไม่ได้หรอก..."
11080-46 = "เชื่อไม่ได้เหรอ...? ฉันซื้อกำไลมาตั้ง 2 อันเลยนะ...!"
11080-47 = "เซริกะจังถูกหลอกแล้วละค่ะ~ ดูทำหน้าเข้าสิ น่ารักจัง~☆"
11080-48 = "......!!"
11080-49 = "เซริกะจังของเราไร้เดียงสาซะจริง ถ้ายังมัวไปเชื่ออะไรง่ายๆ อีก ต่อไปอาจจะโดนผู้ใหญ่นิสัยไม่ดีหลอกเข้าจนโงหัวไม่ขึ้นก็ได้นะ?"
11080-50 = "ฉะ... ฉะ... ฉันคิดว่าจะโชคดีจริงๆ ซะอีก... อุตส่าห์อดข้าวกลางวันเพื่อเอาเงินไปซื้อมาเลยนะ"
11080-51 = "ไม่เป็นไรหรอกค่ะเซริกะจัง ไปกินข้าวกลางวันด้วยกันนะ ฉันจะเลี้ยงเองค่ะ"
11080-52 = "อึก... รุ่นพี่โนโนมิ..."
11080-54 = "อืม... งั้นความเห็นของเซริกะจังก็สรุปไว้แค่เท่านี้ มีคนอื่นจะเสนออะไรไหมคะ?"
11080-55 = "ฉัน! ฉันมี!"
11080-56 = "เอ่อ... ได้ค่ะ... หัวหน้าทาคานาชิ โฮชิโนะ ชั้นปีที่ 3 ทำไมรู้สึกกังวลจังเลยนะ..."
11080-57 = "ฮึ่ม... อะแฮ่ม~"
11080-58 = "ปัญหาใหญ่สุดของโรงเรียนเราก็คือการที่มีนักเรียนอยู่แค่พวกเราเท่านั้น"
11080-59 = "จำนวนนักเรียนคือพลังของโรงเรียน โรงเรียนที่มีเด็กเป็นหมื่นอย่างทรีนิตี้กับเกเฮนน่าน่ะ แค่เก็บเงินค่ากิจกรรมนักเรียนเดือนหนึ่งก็ได้เงินเยอะแยะแล้ว"
11080-60 = "จะ.. จริงเหรอคะ?"
11080-61 = "จริงน่ะสิ! ดังนั้นเราต้องเพิ่มจำนวนนักเรียนของที่นี่ มาเริ่มจากตรงนี้ดีกว่า"
11080-62 = "ถ้าทำแบบนั้นได้ เราก็จะมีสิทธิ์มีเสียงในองค์การนักเรียนด้วย"
11080-63 = "นี่เป็นข้อเสนอที่ดีเลย... แต่เราจะทำแบบนั้นได้ยังไงล่ะ..."
11080-64 = "ง่ายมาก ก็แค่ขโมยรถโรงเรียนของโรงเรียนอื่นมา!"
11080-65 = "คะ?"
11080-66 = "เราต้องปล้นรถรับส่งนักเรียนในโรงเรียนตอนเช้า แล้วถ้านักเรียนบนรถไม่ประทับตราลงในหนังสือ#nย้ายโรงเรียน เราก็จะไม่ให้ลงจากรถ"
11080-67 = "แหะๆ~  ทำแบบนี้แหละ แล้วเราก็จะได้นักเรียนมาเพิ่ม!"
11080-68 = "น่าสนุกดีนะ"
11080-69 = "เป้าหมายคือเด็กจากโรงเรียนไหนล่ะ? ทรีนิตี้? เกเฮนน่า? หรือจะเป็นมิลเลเนียม?"
11080-70 = "เราอาจต้องเปลี่ยนกลยุทธ์ตามเป้าหมายนะ"
11080-71 = "หืม? เอ่อ... อืม... ไม่รู้สิ... ทรีนิตี้มั้ย? ไม่ดีกว่า เกเฮนน่าดีกว่า!"
11080-72 = "ดะ.. เดี๋ยวก่อนค่ะ! เราจะให้คนอื่นย้ายโรงเรียนด้วยวิธีนั้นไม่ได้สิคะ!"
11080-73 = "อีกอย่างคณะกรรมการวินัยโรงเรียนอื่นคงไม่ปล่อยเราไว้แน่..."
11080-74 = "เอ~ ก็คงจะเป็นแบบนั้นแหละ"
11080-75 = "นี่ไม่ใช่เวลามาพูดว่า \"ก็คงจะเป็นแบบนั้นแหละ\" นะคะรุ่นพี่โฮชิโนะ ช่วยจริงจังกับการประชุม#nหน่อยได้ไหมคะ..."
11080-77 = "ฉันมีความคิดที่ดีกว่านั้น"
11080-78 = "ค่ะ... คุณสึนาโอกามิ ชิโรโกะ ชั้นปีที่ 2"
11080-79 = "ไปปล้นธนาคารกัน"
11080-80 = "คะ?!"
11080-81 = "วิธีนี้ทั้งง่ายและได้ผลแน่ๆ ฉันกำหนดเป้าหมายเอาไว้แล้วด้วย ธนาคารกลางที่ 1 ที่อยู่ในเมือง"
11080-82 = "ฉันเช็กตำแหน่งตู้เซฟ ตารางกะของยาม มุมกล้องวงจรปิด แล้วก็เส้นทางการลำเลียงเงินสด#nไว้หมดแล้ว"
11080-83 = "ที่ตั้งใจดูอะไรตั้งแต่เมื่อกี้ก็เพราะเรื่องนี้เองเหรอคะ?!"
11080-84 = "ใช้เวลาเพียง 5 นาที เราก็หาเงินได้ร้อยล้านเยนแล้ว ดูนี่สิ ฉันเตรียมหน้ากากไว้แล้วด้วย"
11080-88 = "เอาเวลาที่ไหนไปเตรียมของแบบนี้มานะ..."
11080-89 = "โอ้ว ชิโรโกะจังเย็บเองเลยเหรอ?"
11080-92 = "ว้าววว ดูนี่สิคะ! เหมือนนักมวยปล้ำเลยว่าไหมคะ?"
11080-93 = "......"
11080-94 = "ไม่เลวเลยนะ เกิดมาแล้วก็ต้องใช้ชีวิตให้คุ้มหน่อย ใช่ไหมเซริกะจัง?"
11080-97 = "จะไปทำแบบนั้นได้ไงล่ะ! ปัดตก! ฉันไม่ซื้อวิธีนี้!"
11080-98 = "ใช่ค่ะ! เราต้องไม่ก่ออาชญากรรมสิคะ!"
11080-101 = "......"
11080-102 = "ถึงจะทำหน้าน่าสงสารแบบนั้น เราก็ไม่อนุญาตหรอกนะคะรุ่นพี่ชิโรโกะ!"
11080-103 = "เฮ้อ... ถ้าทุกคนไม่เสนอไอเดียที่ทำได้จริงและไม่ผิดกฎหมายละก็..."
11080-105 = "เอ่อ.. ฉันค่ะ! ขอฉันพูดต่อได้ไหมคะ?"
11080-106 = "ค่ะ... คุณอิซาโยอิ โนโนมิ ชั้นปีที่ 2 ช่วยตัดเรื่องอาชญากรรมและการหลอกลวงออกให้ด้วยนะคะ..."
11080-107 = "ค่ะ! ฉันมีวิธีที่ได้ผล ที่ไม่ใช่ทั้งอาชญากรรมและเครือข่ายลูกโซ่ค่ะ!"
11080-108 = "ไอดอลไงคะ! สคูล ไอดอล!"
11080-109 = "อะ... ไอดอล...?!"
11080-110 = "ใช่ค่ะ! ฉันเห็นมาจากแอนิเมชั่น! วิธีที่ดีที่สุดในการฟื้นฟูโรงเรียนคือการใช้ไอดอลค่ะ! พวกเรามาเดบิวต์เป็นไอดอลกัน แล้วก็..."
11080-111 = "ปัดตก"
11080-112 = "เอ๋... วิธีนี้ก็ไม่ได้เหรอคะ?"
11080-113 = "ทำไมล่ะ? ฉันว่าเผลอๆ รุ่นพี่โฮชิโนะจะตกแฟนคลับได้เยอะเลยนะ?"
11080-114 = "แหะๆ จะมีใครมาชอบคนรูปร่างแคระแกร็นแบบนี้กัน ไม่มีใครมาชอบหรอก... "
11080-115 = "แต่ฉันคิดท่าโพสไว้ให้แล้วนะคะ..."
11080-116 = "(ลุกขึ้น)"
11080-117 = "คริสติน่าแห่งวงสาวน้อยชุดว่ายน้ำ~♧"
11080-118 = "อะไรน่ะ..."
11080-119 = "วงสาวน้อยชุดว่ายน้ำอะไรกัน... เชยชะมัด!"
11080-120 = "งือ... อุตส่าห์คิดมาทั้งคืนเลยนะ..."
11080-122 = "เอ่อ... เราต่างก็เสนออะไรกันมาเยอะแล้ว น่าจะต้องหาวิธีที่ทำได้จริงกันแล้วละค่ะ..."
11080-123 = "ให้ครูตัดสินใจแล้วกัน จากที่เราเสนอกันมา ครูอยากทำอะไรที่สุดเหรอ?"
11080-124 = "ฮะ?! จะเลือกจากไอเดียที่เราเสนอกันวันนี้เหรอคะ?! เราควรหาวิธีที่มันเข้าท่ากว่านี้ไม่ใช่เหรอคะ?"
11080-125 = "ไม่เป็นไรหรอกน่า คุณครูต้องมีคำตอบที่ดีให้พวกเราแน่"
11080-126 = "ดะ.. เดี๋ยวก่อนสิคะ! เราทำแบบนั้นไม่ได้สิ?!"
11080-128 = "คงไม่เลือกไอดอลหรอกใช่ไหม?"
11080-129 = "ไอดอล☆ สู้เค้านะ!♧"
11080-130 = ".... (ส่งสายตา)"
11080-131 = "[s1] \"ปล้นรถรับส่งนักเรียนสิ!\"\n[s2] \"ปล้นธนาคารกัน!\"\n[s3] \"ตั้งวงไอดอลเลย ครูเป็นโปรดิวเซอร์ให้เอง!\""
11080-135 = "หา?! เอาจริงเหรอคะ?! นะ... แน่ใจนะคะว่าจะทำแบบนั้นน่ะค่ะ?"
11080-136 = "อะฮ่ะฮ่าาา!! เลือกได้ดีเลย งั้นก็ออกปฏิบัติการได้!"
11080-137 = "เย้~☆ ต้องสนุกแน่ๆ เลย!"
11080-138 = "จะ.. จริงเหรอ? ทำแบบนี้ได้จริงเหรอ?"
11080-139 = "แหะๆ~  ก็น่าจะได้นะ"
11080-140 = "ถ้าใจกล้าซะอย่าง ไม่ว่าแผนไหนก็ต้องผ่านฉลุย ใช่ไหมอายาเนะ?"
11080-141 = "... ได้..."
11080-142 = "ได้...?"
11080-144 = "ได้ซะที่ไหนกันล่ะคะ!!!"
11080-145 = "ครืนนน!"
11080-146 = "ออกมาแล้ว! อายาเนะร่าง 2 พังโต๊ะแล้ว!"
11080-147 = "......"
11080-148 = "อ๊ายย อายาเนะจังโกรธแล้วค่ะ! เหตุการณ์ฉุกเฉินค่ะ!!"
11080-149 = "โอ้ว~ โตเป็นสาวเต็มตัวแล้วสินะ ถึงได้รู้ว่าตอนไหนควรโมโหและใส่สุดแบบนี้ หม่าม้าคนนี้ภูมิใจจังเลย"
11080-150 = "หม่ามงหม่าม้าอะไรกันล่ะคะ! ได้โปรดเถอะ ช่วยจริงจังกับการประชุมนี้กันหน่อยค่ะ!"
11080-151 = "เอาแต่ล้อเล่นอะไรกันทุกวัน! ไหนจะปล้นธนาคาร ไหนจะธุรกิจลูกโซ่นั่นอีก!"
11080-153 = "(เจ็บจึ้ก)"
11080-154 = "......"
11080-156 = "(หลังจากนั้นคนในห้องก็ได้ฟังเทศน์แบบจัดหนักจัดเต็ม)"
11080-158 = "ขอโทษด้วยนะอายาเนะจัง เดี๋ยวพาไปเลี้ยงราเม็งให้นะ"
11080-159 = "ฉันไม่ได้โกรธค่ะ..."
11080-160 = "เอาละๆ เช็ดปากหน่อยน้า แบบนี้แหละ เก่งมากเลยค่ะ~☆"
11080-161 = "อย่าทำเหมือนฉันเป็นเด็กจะได้มั้ยคะ?"
11080-162 = "ได้เจอทุกคนมันก็ดีอยู่หรอกนะ ว่าแต่ทำไมถึงมาที่นี่อีกล่ะ?"
11080-163 = "กินชาชูอีกไหมอายาเนะ?"
11080-164 = "(ง่ำๆๆ) ค่ะ"
11080-165 = "(กึก ครืดดด...)"
11080-166 = "......"
11080-167 = "เอ่อ... คือว่า..."
11080-168 = "สวัสดีค่ะ! มากี่ท่านคะ?"
11080-169 = "เอ่อ... เมนูที่ถูกที่สุดของที่นี่... ราคาเท่าไรเหรอคะ?"
11080-170 = "เมนูที่ถูกที่สุด..."
11080-171 = "ราเม็งชิบะเซกิ ราคา 580 เยนค่ะ! เป็นเมนูพิเศษขึ้นชื่อของร้านเราเลยนะคะ!"
11080-172 = "เอ่อ... ขะ... ขอบคุณค่ะ!"
11080-173 = "(ครืดดด)"
11080-174 = "เอ๋?"
11080-175 = "(ครืดดด)"
11080-181 = "ฮิฮิ หาเจอแล้ว เมนูที่ไม่เกิน 600 เยน!"
11080-183 = "ฮุฮุฮุ ทุกเรื่องต้องมีทางออกอยู่แล้วแหละเนอะ ฉันคาดการณ์เอาไว้หมดแล้วละ"
11080-184 = "ยะ... อย่างงั้นเหรอคะ? ว่าแล้วเชียว ท่านประธานนี่รู้ดีไปหมดทุกเรื่องเลยนะคะ..."
11080-185 = "เฮ้อ..."
11080-188 = "มาทั้งหมด 4 ท่านนะคะ ฉันจะพาไปนั่งที่โต๊ะใหญ่ค่ะ!"
11080-189 = "ไม่เป็นไรหรอก ขอแค่โต๊ะเดี่ยวก็พอแล้ว เราจะสั่งแค่อย่างเดียวน่ะ"
11080-190 = "อย่างเดียว...? แต่ก็ไปนั่งโต๊ะที่นั่งสบายๆ เถอะค่ะ ตอนนี้ที่นั่งในร้านยังว่างอยู่เยอะเลยค่ะ"
11080-191 = "โอ้ว! ใจดีนะเนี่ย? ขอบใจนะ จะไม่ปฏิเสธแล้วกัน"
11080-192 = "อ้อ! ไหนๆ ก็ใจดีกับพวกเราแล้ว ขอตะเกียบ 4 คู่ด้วยล่ะ"
11080-193 = "หา? 4 คู่? นี่จะแบ่งราเม็งชามเดียวกินกัน 4 คนเหรอ?"
11080-194 = "ขะ... ขอโทษนะคะ พวกเราไม่มีเงินน่ะค่ะ... ขออภัยด้วยที่ไม่ได้มีเงินมาจ่ายนะคะ!"
11080-195 = "นี่! เอ่อ... นี่มันไม่ใช่เรื่องที่ต้องมาขอโทษอะไรสักหน่อย..."
11080-196 = "ไม่หรอกค่ะ! ถ้าไม่มีเงินก็สมควรตายสิคะ! จะอยู่ไปเพื่ออะไรล่ะ? อยู่ไปก็อายคนอื่นเปล่าๆ!#nขอโทษที่ทำตัวน่าอายนะคะ...!"
11080-197 = "เฮ้อ... เงียบๆ หน่อยเถอะ ฮารุกะ แบบนี้มันรบกวนคนอื่นนะ..."
11080-198 = "อะไรกัน?! แค่ไม่มีเงินแต่ก็ไม่ได้ผิดอะไรสักหน่อย? ยืดอกเข้าไว้สิ!"
11080-200 = "เอ๋? ว่ายังไงนะคะ?!"
11080-201 = "ไม่มีเงินก็ไม่เห็นจะเป็นอะไรเลยนี่! เรายังเป็นนักเรียนอยู่นะ ถึงได้ช่วยออกเงินกันคนละนิดคนละหน่อย แล้วมากินราเม็งด้วยกันแบบนี้ไง มีเพื่อนแบบนี้มันสำคัญกว่าเงินอีกนะ!"
11080-202 = "รออยู่นี่แหละ เดี๋ยวจะไปเอาราเม็งมาให้"
11080-205 = "เหมือนว่าเราจะถูกเข้าใจผิดแล้วนะ..."
11080-206 = "อะไรกัน... เราไม่ใช่ขอทานสักหน่อย แต่ก็ผิดที่อารุจังนั่นแหละที่ใช้เงินจนหมดแล้วน่ะ"
11080-207 = "ไม่ใช่อารุจัง บอกว่าให้เรียกว่าท่านประธานไงล่ะ เรียกให้มันถูกต้องสิ หัวหน้ามุสึกิ"
11080-208 = "หืม? เลิกงานแล้วนะ ยังเป็นท่านประธานอยู่อีกเหรอ? ว่าแต่ เป็นถึงท่านประธานทั้งที แต่ทำไมถึงเลี้ยงราเม็งลูกน้องไม่ได้ล่ะ?"
11080-209 = "......"
11080-210 = "เพราะเอาเงินไปจ้างแรงงานมาช่วยภารกิจจู่โจมของวันนี้หมดแล้วน่ะสิ..."
11080-211 = "ฮุฮุฮุ แต่เราก็ยังเหลือเงินให้กินราเม็งตั้งหนึ่งชามนะ เรื่องแค่นี้น่ะ ฉันคาดการณ์เอาไว้แล้วละ"
11080-212 = "ถ้างั้นทำไมไม่คาดการณ์ให้เหลือเงินซื้อได้ 4 ชามล่ะ"
11080-213 = "บอกมาตรงๆ เถอะน่า อารุจังลืมคิดไปใช่มั้ยล่ะ? ลืมหักเงินไว้กินข้าวเย็นล่ะสิท่า?"
11080-214 = "...ฮุฮุฮุ"
11080-215 = "เฮ้อ ที่จริงการยิ่งลดความเสี่ยงได้มันก็ดีอยู่หรอก แล้วฉันก็เห็นด้วยว่าเป้าหมายในครั้งนี้#nมันไม่ได้จัดการกันได้ง่ายๆ"
11080-216 = "แต่ถึงอย่างนั้นก็เถอะนะ พวกอะบิดอสนี่เก่งกันจนเราต้องทุ่มเงินหมดหน้าตัก จ้างพวกลิ่วล้อมา#nเลยเหรอ?"
11080-217 = "เรื่องนั้น..."
11080-218 = "อารุจังก็ไม่รู้เหมือนกันใช่ไหม? ก็เลยกลัวแล้วจ้างคนมาช่วยแบบนี้ไง"
11080-219 = "ฉันกลัวอะไรที่ไหนกันล่ะ?! ก็บอกว่าฉันคาดการณ์เอาไว้หมดแล้ว!"
11080-220 = "\"ความล้มเหลวจะไม่ถูกยอมรับ\" \"ระดมพลและเสบียงทั้งหมด\" นี่ละคติของหน่วยรับจ้างสารพัด 68!"
11080-221 = "คติอะไรกัน... เพิ่งจะเคยได้ยินเป็นครั้งแรกเลย..."
11080-222 = "สงสัยเพิ่งคิดเมื่อกี้แหละมั้ง"
11080-223 = "หนวกหูน่า! ถ้าเราทำภารกิจนี้สำเร็จและได้รับค่าจ้างมา เราก็จะได้ไปกินสุกี้ยากี้กันแล้ว! เพราะงั้นก็มาโฟกัสและทำงานให้ดีเถอะ!"
11080-224 = "สุกี้... ยากี้...?! มันคืออะไรเหรอคะ?"
11080-225 = "อาหารที่พวกผู้ใหญ่กินกันน่ะ แพงมากเลยด้วย..."
11080-226 = "ว้าว... แต่คนอย่างฉันจะไปกินของแพงแบบนั้นได้เหรอคะ? กินเสร็จแล้วต้องขายเครื่องในเพื่อใช้หนี้#nรึเปล่าคะ...?"
11080-227 = "ฮุฮุฮุ บริษัทใหญ่โตอย่างเราต้องกินอะไรแบบนี้สิ จะได้ไม่เสื่อมเสียเกียรติ"
11080-228 = "โห~ ไฟแรงดีจังเลยนะ อารุจัง"
11080-229 = "ไม่ใช่อารุจัง บอกให้เรียกว่าท่านประธานไง!"
11080-231 = "อาหารมาแล้วค่ะ! น้ำซุปร้อน ระวังด้วยนะคะ!"
11080-232 = "(กึก!)"
11080-233 = "เอ๋? อะไรเนี่ย? ทำไมราเม็งถึงได้ชามใหญ่ขนาดนี้ล่ะ?"
11080-234 = "นี่มัน... ขนาดสำหรับ 10 คนหรือเปล่าเนี่ย..."
11080-235 = "สะ.. เสิร์ฟผิดหรือเปล่าคะ? พวกเราไม่มีเงินจ่ายราเม็งชามยักษ์แบบนี้หรอกค่ะ..."
11080-236 = "ไม่ผิดหรอก นี่แหละราเม็งที่สั่งกันไป ราเม็งชิบะเซกิ ขนาดปกติ! ใช่ไหมคะหัวหน้า?"
11080-237 = "อื้ม สงสัยเผลอให้เยอะเกินไปหน่อย ไม่ต้องไปใส่ใจหรอกนะ"
11080-238 = "ได้ยินแล้วใช่ไหม? เจ้าของร้านไม่ได้ว่าอะไรเลย เพราะงั้นก็กินกันให้อร่อยเลยนะ~"
11080-241 = "ว้าว..."
11080-242 = "พวกเราโชคดีจังเลย งั้นจะกินเลยนะ!"
11080-243 = "อุฮุฮุ... นี่มันเกินความคาดหมายเลยนะ ต้องขอบคุณด้วยการกินอย่างเอร็ดอร่อยแล้วละ"
11080-244 = "กินกันเลย!"
11080-245 = "(ซู้ดดดด)"
11080-246 = "!!"
11080-247 = "อร่อยจังเลย!"
11080-248 = "อร่อยดีนี่! มีอาหารอร่อยๆ แบบนี้แถวชานเมืองด้วยเหรอเนี่ย..."
11080-249 = "(พรึ่บ) ฉันก็ว่าอร่อยมากเลยค่ะ!"
11080-250 = "เอ๋...? คนที่นั่งข้างๆ ..."
11080-251 = "ใช่แล้ว! ราเม็งร้านนี้น่ะสุดยอดไปเลยละค่ะ! บางคนก็มาจากเขตอื่นเพื่อมากินราเม็งที่นี่เลยนะคะ"
11080-252 = "อื้อ ฉันเห็นด้วย เคยไปกินของอร่อยมาก็หลายเขตแล้ว แต่หาราเม็งอร่อยๆ แบบนี้ไม่ได้ง่ายๆ เลยละนะ"
11080-253 = "แหะๆ... พวกเราเป็นลูกค้าประจำของที่นี่เลยค่ะ ดีใจจังที่นักเรียนจากโรงเรียนอื่นก็มากินที่นี่ด้วย..."
11080-254 = "ชุดนักเรียนนั่นมัน... ของเกเฮนน่าเหรอ? มากันไกลเลยนะ"
11080-255 = "ฉันเหมือนเคยเห็นฉากอะไรแบบนี้มาก่อนแล้วเลยค่ะ จากเรื่องอะไรน้า... รักนี้รสราเม็งหรือเปล่านะ?"
11080-256 = "แหะๆ~ ไม่ใช่อุด้งหรอกเหรอ?"
11080-259 = "(...)"
11080-260 = "(...)"
11080-261 = "(ใช่... จริงด้วย)"
11080-262 = "อุฮุฮุฮุ! ไม่อยากเชื่อเลยว่าจะได้เจอคนที่ถูกใจที่นี่ ถึงเรื่องนี้จะไม่ได้คาดการณ์ไว้ก่อน แต่เรื่องบังเอิญแบบนี้ก็ถือเป็นสีสันของชีวิตดีนะ?"
11080-263 = "(คาดกงคาดการณ์อะไรล่ะ อารุจังเหมือนจะไม่รู้อะไรเลยมากกว่านะ)"
11080-264 = "(...จะบอกดีไหมนะ?)"

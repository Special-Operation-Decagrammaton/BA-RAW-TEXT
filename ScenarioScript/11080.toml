[translation]
11080-2 = "第8話;便利屋登場！"
11080-3 = "對策委員會．教室"
11080-4 = "……那麼，阿拜多斯對策委員會的定期會議即將開始。"
11080-5 = "因為這次老師也在場，我認為應該能比以往更認真討論……"
11080-6 = "是～☆"
11080-7 = "當然。"
11080-8 = "什麼嘛，說得好像以前都不認真一樣……"
11080-9 = "唔嘿，拜託你囉～老師。"
11080-10 = "[s] 「請多指教。」"
11080-12 = "那麼就進入正題吧。今天主要的討論內容就是我們學校面臨的核心問題……#n也就是「要怎麼償還學校的債？」。"
11080-13 = "有意見的同學們請舉手！"
11080-14 = "我！我！"
11080-15 = "是，1年級的黑見同學。請說。"
11080-16 = "……呃，可以不要那樣叫我嗎？感覺很奇怪耶。"
11080-17 = "茜，茜香醬……但是我們難得才開一次會……"
11080-18 = "鄭重一點也不錯呀～而且今天難得老師也在。"
11080-19 = "說是難得，不如說是第一次。"
11080-20 = "沒錯！感覺比較像個委員會了，我覺得這樣很好～☆"
11080-21 = "唉……好吧，既然前輩們都這麼說了……"
11080-22 = "……總之！身為對策委員會的會計負責人，我只能說我們學校已經瀕臨破產了！"
11080-23 = "這樣下去就要廢校了！大家都知道吧？"
11080-24 = "嗯，算是吧。"
11080-25 = "每個月光是利息就要788萬！#n雖然我們很努力在賺錢，但坦白說連利息都還不上。"
11080-26 = "2;茜香;08;像現在這樣只是逮捕通緝犯、解決投訴、進行志工服務還是有極限的。"
11080-27 = "這樣下去永遠沒完沒了！應該要賺一票大的才對！"
11080-28 = "一票大的……例如呢？ "
11080-29 = "2;茜香;03;（啪啦）就是這個！在市區拿到的傳單！"
11080-30 = "這是……！？"
11080-31 = "我來看看……"
11080-32 = "「鍺麥飯石手鍊讓你一攫千金」……？"
11080-33 = "2;茜香;03;沒錯！就靠這個來大賺一筆吧！"
11080-34 = "……"
11080-35 = "我前幾天在街上被人搭話，還被帶去聽了一場說明會。#n據說他們在賣能增加幸運的鍺手環哦！"
11080-36 = "……"
11080-37 = "只要戴著這個就會有好運到來！#n如果賣給身邊的3個人的話……"
11080-39 = "……大家怎麼了嗎？"
11080-40 = "駁回～"
11080-41 = "2;茜香;06;咦──！？為什麼？怎麼會！"
11080-42 = "茜香醬……這是所謂的老鼠會……"
11080-43 = "不可能賺錢。"
11080-44 = "咦！？"
11080-45 = "再說鍺和提升好運有什麼關聯嗎……#n這種可疑的說明會，怎麼可能會有像樣的事業計畫……"
11080-46 = "真，真的假的？我還買了2個耶！？"
11080-47 = "茜香醬被騙了呢。好可愛☆"
11080-48 = "2;茜香;11;……！！"
11080-49 = "真是的，茜香醬真單純呢～#n如果不注意一點的話，以後就會被惡劣的大人欺騙，發生無法挽回的事哦～？"
11080-50 = "怎，怎麼會……明明看起來還不錯的說……#n為了買這個而省下的午餐錢都……"
11080-51 = "別擔心，茜香醬。#n一起吃午餐吧？我請客。"
11080-52 = "2;茜香;11;嗚……野乃美前輩……"
11080-54 = "那麼……黑見同學的意見就先討論到這邊……#n下一位要發表意見的人……"
11080-55 = "我！我！"
11080-56 = "那個……好，3年級的小鳥遊委員長。#n雖然覺得有點不安……"
11080-57 = "嗯嗯，耶嘿！"
11080-58 = "要說咱們學校最大的問題，那就是全校只有咱們幾個學生對吧～"
11080-59 = "學生人數就等同於學校的力量。#n只要把學生數增加到像三一和格黑娜一樣，光是每個月的學費應該就有不少錢哦～"
11080-60 = "咦……是，是嗎？"
11080-61 = "沒錯沒錯！所以咱們必須先想辦法增加學生人數～#n就從這點開始著手吧～"
11080-62 = "這樣一來就能培養出議員，在聯邦學生會當中擁有發言權哦。"
11080-63 = "這個想法確實很棒……但是該怎麼做呢……"
11080-64 = "很簡單～咱們只要劫持其他學校的校車就行啦！"
11080-65 = "什麼！？"
11080-66 = "咱們就劫持正開往學校的校車，#n威脅他們「如果不在咱們學校的轉學申請書上蓋章就不准下車」。"
11080-67 = "唔嘿～這樣學生人數一定會大～幅增加！"
11080-68 = "這個提案真有趣。"
11080-69 = "目標是三一？格黑娜？還是千年？"
11080-70 = "可能需要因應目標改變戰術。"
11080-71 = "哦？這個嘛……三一？#n不，還是選格黑娜吧！"
11080-72 = "請，請等一下！用那種方法轉學不可能被承認的吧！？"
11080-73 = "更何況其他學校的風紀委員會一定不會放過我們……"
11080-74 = "唔嘿～果然會那樣嗎～？"
11080-75 = "什麼叫「果然會那樣～」……#n星野前輩如果再不認真參與會議……"
11080-77 = "我有個好主意。"
11080-78 = "……是，2年級的砂狼白子同學…… "
11080-79 = "搶銀行吧。"
11080-80 = "什麼！？"
11080-81 = "這是簡單又確實的方法。#n目標也已經定好了，那就是市區內的第一中央銀行。"
11080-82 = "金庫的位置、警衛的動線、現金運鈔車的行車路線也已經掌握完畢。"
11080-83 = "你剛才目不轉睛看著的就是那些嗎！？"
11080-84 = "只要5分鐘就能賺1億。#n來，面罩也準備好了。"
11080-88 = "這種東西是什麼時候……"
11080-89 = "哇～這些是白子醬自己做的嗎～？"
11080-92 = "哇啊，請看！好像摔角手！"
11080-93 = "……"
11080-94 = "哎呀～真不錯。#n人生果然就是要一發定勝負。對吧茜香醬？"
11080-97 = "怎麼可能做那種事！駁回！駁回──！！"
11080-98 = "就，就是說啊！不可以犯罪！"
11080-101 = "……"
11080-102 = "不行就是不行，就算擺出那種難過的表情也沒有用，白子前輩！"
11080-103 = "唉……大家再不提出更有建設性的提議的話……"
11080-105 = "那個……有有有！接下來換我！"
11080-106 = "是……2年級的十六夜野乃美同學。#n麻煩請提出犯罪和詐欺以外的意見……"
11080-107 = "沒問題！我有一個既不是犯罪也不是老鼠會，非常乾淨且確實的方法！"
11080-108 = "那就是偶像！校園偶像！"
11080-109 = "偶，偶像……！？"
11080-110 = "沒錯！我在動畫中看過。偶像就是重振學校的不二法門！ #n我們大家一起出道當偶像的話……"
11080-111 = "駁回。"
11080-112 = "哎呀……這也不行嗎？"
11080-113 = "為什麼？如果是星野前輩的話，應該能讓特定愛好者產生興趣的說。"
11080-114 = "唔嘿～會喜歡這種嬌弱身軀的人，應該已經沒有資格當人了吧～#n死刑死刑～"
11080-115 = "我連招牌動作都想好了說……"
11080-116 = "（唰──） "
11080-117 = "我是泳裝少女團的克莉斯緹娜～♧"
11080-118 = "什麼跟什麼……"
11080-119 = "為什麼會有「～♧」啦！#n而且泳裝少女團又是怎樣！有夠土的！"
11080-120 = "怎麼這樣，我可是想了一整晚……"
11080-122 = "那個……雖然討論遲遲沒有進展，不過是時候該做出結論了……"
11080-123 = "就交給老師決定吧～#n老師，在目前的提案當中，你要選哪一樣？"
11080-124 = "咦！？要從這裡面選！？#n不，不是應該先提出一些比較正經的意見嗎！？"
11080-125 = "別擔心別擔心～#n既然是老師選的，肯定會是正確答案。"
11080-126 = "請，請等一下！為什麼能說得這麼肯定啊！？"
11080-128 = "你該不會要選擇偶像吧？"
11080-129 = "偶像☆請選偶像♧ "
11080-130 = "……（咻）"
11080-131 = "[s1] 「劫持校車！」\n[s2] 「搶銀行！」\n[s3] 「組成偶像團體！！我來當製作人！」"
11080-135 = "咦咦！？您是認真的嗎！？"
11080-136 = "啊哈哈哈！就這麼決定～！#n那咱們出發吧～！"
11080-137 = "呀啊～☆一定很好玩！"
11080-138 = "3;茜香;04;真，真的嗎？這樣真的好嗎？ "
11080-139 = "唔嘿～這樣也不錯吧～？"
11080-140 = "計畫就是越大膽越好。#n對吧綾音？"
11080-141 = "……最……"
11080-142 = "最……？"
11080-144 = "最好是啦！！"
11080-145 = "（哐鏘──！）"
11080-146 = "出現了！是綾音醬的翻桌絕技──！"
11080-147 = "……"
11080-148 = "呀啊，綾音醬生氣了！緊急狀況！"
11080-149 = "唔嘿～已經長成該翻桌的時候就會翻桌的孩子了啊。#n媽媽我很欣慰唷～"
11080-150 = "誰是媽媽啊！真是的，請認真一點！ "
11080-151 = "每天都只會胡鬧！#n淨說什麼搶銀行、老鼠會之類亂七八糟的東西！"
11080-153 = "1;茜香;11;（驚）\n"
11080-154 = "……"
11080-156 = "（之後被狠狠地唸了一頓）"
11080-158 = "哎呀～對不起嘛綾音醬～#n我請你吃拉麵，不要生氣好嗎？"
11080-159 = "我沒有生氣…… "
11080-160 = "來，擦擦嘴巴。哎呀，好乖～☆"
11080-161 = "我又不是小孩子。"
11080-162 = "……怎樣都好。#n不過為什麼又跑來這裡了？"
11080-163 = "綾音，還要吃叉燒嗎？"
11080-164 = "（嚼嚼）要。"
11080-165 = "（喀噠，喀啦啦）"
11080-166 = "……"
11080-167 = "那……那個……"
11080-168 = "歡迎光臨！請問幾位？"
11080-169 = "……請，請問這裡最便宜的餐點要，要，要多少錢？"
11080-170 = "最便宜的餐點……"
11080-171 = "5;알바茜香;12;是580元的柴關拉麵！這是我們的招牌，非常好吃喔！ "
11080-172 = "非，非常感謝！"
11080-173 = "（喀啦啦）"
11080-174 = "嗯？ "
11080-175 = "（喀啦啦）"
11080-181 = "耶嘿嘿，終於找到了600元以下的餐點！"
11080-183 = "哼哼哼。瞧，果然任何事情都是有辦法解決的。 #n全都在預測範圍內。"
11080-184 = "原，原來如此，社長果然無所不知……"
11080-185 = "唉……"
11080-188 = "3;알바茜香;12;總共4位嗎？那我來替各位帶位。"
11080-189 = "不不，沒關係，反正我們只點一碗。 "
11080-190 = "只點一碗……？我還是帶各位去比較舒服的位子坐吧。#n反正現在是離峰時段，還有很多空位。"
11080-191 = "哦～好親切的店員！謝謝，那我們就不客氣了。"
11080-192 = "啊，麻煩幫我們拿4雙筷子～溫柔的打工醬。"
11080-193 = "咦？4雙？#n難，難道你們要共吃一碗嗎？"
11080-194 = "對，對，對不起。因為我們很窮！！ #n沒有錢真的很抱歉！！"
11080-195 = "3;알바茜香;11;啊，不，不……！那個，這沒什麼好道歉的……"
11080-196 = "不！沒有錢的話當然應該去死！我們沒有活下去的價值！ #n是連蟲子都不如的存在！連蟲子都不如，真是抱歉……！"
11080-197 = "唉……小聲一點，遙香。#n這樣會造成別人的麻煩……"
11080-198 = "哪有這回事！沒錢又不是罪！你給我抬頭挺胸！"
11080-200 = "咦？……是！？"
11080-201 = "5;알바茜香;06;沒錢也沒什麼大不了的啊。畢竟還是學生嘛！ #n而且就算如此，還不是一起存好零錢來吃拉麵了嗎？那才是最重要的！"
11080-202 = "5;알바茜香;05;再稍等一下。我會盡快送過來的。"
11080-205 = "……感覺好像對我們有了奇怪的誤會？"
11080-206 = "畢竟我們也不是一直都這麼窮嘛。#n真要說的話，都是亞瑠醬亂花錢的錯。"
11080-207 = "不是「亞瑠醬」，是社長吧？#n麻煩叫人的時候記得加上職稱，無月室長。"
11080-208 = "嗯？不是下班了嗎？ #n話說回來，身為社長卻連請職員吃一碗拉麵都沒辦法。"
11080-209 = "…… "
11080-210 = "居然為了雇傭兵協助今天的襲擊任務，把所有財產花光……"
11080-211 = "哼哼哼。不過還剩下一些錢可以吃碗拉麵吧？這點程度都在預料之內。"
11080-212 = "那怎麼不留下4碗麵的錢呢……"
11080-213 = "老實說你是忘記留晚餐錢了對吧，亞瑠醬？"
11080-214 = "……哼哼哼。 "
11080-215 = "唉，不過風險畢竟越低越好。#n我同意這次的目標無法像頭盔團那種小嘍囉一樣輕易對付。"
11080-216 = "不過阿拜多斯真的有那麼危險嗎？#n甚至不惜花光所有財產來招募傭兵？"
11080-217 = "那是因為……"
11080-218 = "亞瑠醬可能也不清楚吧。所以才怕得雇用了一堆傭兵。"
11080-219 = "你說誰怕了啊！？全部都在預料之內！"
11080-220 = "絕不允許失敗，所有委託都必須動員所有資源全力以赴──#n這可是我們便利屋68的座右銘唷！"
11080-221 = "我還是第一次聽到那種座右銘……"
11080-222 = "肯定是剛才想到的啦。"
11080-223 = "少囉嗦！完成這次的委託並拿到報酬後，就拿那些錢來吃壽喜燒吧！#n大家打起精神來！"
11080-224 = "壽……壽喜燒……！？那是什麼！？"
11080-225 = "是大人吃的料理，要花很多錢的那種……"
11080-226 = "哇，哇啊……我這種人真的能吃那種東西嗎？ #n吃完後必須切開肚子嗎……？"
11080-227 = "哼哼哼，像我們這麼厲害的公司，不吃點奢華的東西怎麼說得過去呢。"
11080-228 = "嘿～真是充滿幹勁呢，亞瑠醬。"
11080-229 = "不是「亞瑠醬」，是「社長」！"
11080-231 = "3;알바茜香;03;來，久等了！吃的時候請小心燙！"
11080-232 = "（咚！）"
11080-233 = "咦，這是什麼！？超大碗拉麵耶！"
11080-234 = "怎麼看起來有10人份……"
11080-235 = "這，這是不是送錯餐了？#n我們沒有錢吃這麼貴的東西……"
11080-236 = "不不，沒有送錯哦。#n這就是580元的柴關拉麵！對吧，老闆？"
11080-237 = "沒錯，是我不小心手抖裝太多了。放心吃吧。"
11080-238 = "既然老闆也這麼說了，就別放在心上！ #n那麼，各位請慢用──！"
11080-241 = "嗚，嗚哇……"
11080-242 = "雖然有點搞不懂，但lucky！我要開動了──！"
11080-243 = "……呵呵呵，雖然沒預料到這種發展，不過就心懷感激地開動吧。"
11080-244 = "吃吧！"
11080-245 = "（咻嚕嚕嚕嚕嚕──）"
11080-246 = "！！"
11080-247 = "好，好好吃！"
11080-248 = "還蠻好吃的耶？在這種郊區竟然可以吃到這麼有水準的味道。"
11080-249 = "（咻）對吧對吧？很好吃吧？"
11080-250 = "咦……？#n是坐在旁邊的……"
11080-251 = "嗯嗯，這裡的拉麵真的很好吃。#n甚至有客人會特地從很遠的地方跑來吃唷。"
11080-252 = "啊啊，好像能夠理解。#n雖然我吃過很多拉麵，但這樣的水準也確實是難得一見。"
11080-253 = "嘿嘿……我們是這裡的常客。#n能看到其他學校的學生來光顧，總覺得有點開心……"
11080-254 = "那是格黑娜的制服嗎？#n你們從那麼遠的地方跑過來啊。"
11080-255 = "我好像在哪裡看過這個場景。好像是一碗拉麵……"
11080-256 = "5;星野;02;唔嘿～那不是一碗蕎麥湯麵嗎？"
11080-259 = "（……）"

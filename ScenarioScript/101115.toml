[translation]
101115-2 = "แฮ่ก... แฮ่ก... เหมือนจะสำเร็จแล้วนะคะ"
101115-3 = "ถึงการสั่งการของครูจะยอดเยี่ยมแค่ไหน แต่เราก็ยังเสียเปรียบทั้งเรื่องกองกำลัง การสนับสนุน แล้วก็#nเสบียงด้วย! กำลังสนับสนุน เราต้องการกำลังสนับสนุนนะ!"
101115-4 = "แต่ตอนนี้ทั้ง D.U. โดนตัดระบบสื่อสารไปหมด..."
101115-5 = "อึก... ในเมื่อเป็นแบบนี้ เราก็ไม่มีทางเลือกอื่นนอกจากต้องหนีไปด้วยกัน"
101115-6 = "ดีละ... ฉันเองก็ได้พักจนมีแรงแล้ว งั้นไปกันต่อเถอะ เราต้องรีบออกไปจากที่นี่!"
101115-8 = "ตอนต่อไป;หลบหนี 2"

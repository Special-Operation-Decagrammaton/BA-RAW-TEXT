[translation]
42230-1 = "第23話;失敗的政變"
42230-4 = "聯邦學生會長代理辦公室"
42230-6 = "呵呵……享用完早午餐後喝的翡翠莊園咖啡，香氣果然很獨特呢。"
42230-7 = "雖然這種咖啡豆價格不斐，費了不少功夫才弄到手……#n但今天是值得紀念的好日子，這點程度的享受應該也不算太奢侈吧。"
42230-11 = "那麼，差不多該開始播報兔寶寶站爆炸的新聞了吧……"
42230-18 = "是，我是擔任聯邦學生會長代理的不知火香耶。"
42230-19 = "啊，將軍。你聯絡的正是時候。"
42230-20 = "兔寶寶站的事情順利完成了嗎？"
42230-24 = "……什麼？#nFOX小隊的作戰失敗了……？"
42230-25 = "而且夏萊的老師還帶著武裝的RABBIT小隊一起往聯邦學生會過來了……？"
42230-26 = "這，這是怎麼回事。#n請你重新說明一遍。"
42230-30 = "沒能阻止由老師指揮的SRT隊員？#n你，你到底在說什麼……"
42230-37 = "我可是有付錢的哦…… "
42230-39 = "你們哪怕不擇手段也該阻止他們不是嗎！"
42230-51 = "RABBIT1，已抵達上行軌道。"
42230-52 = "RABBIT2，現場搜索完畢。沒有發現額外的威脅。"
42230-54 = "RABBIT3，已經將事故的消息通知高地人鐵道學園，#n並把通往聯邦學生會的路線全部封鎖了哦。"
42230-55 = "接下來的一個小時內應該不會有任何列車經過才對，可以放心前進唷～！"
42230-56 = "了解。"
42230-57 = "RABBIT2、RABBIT4，由於目標有逃走的可能性，迅速突入聯邦學生會的大樓吧！"
42230-59 = "我，我知道了……！"
42230-60 = "交給我吧！"
42230-66 = "SRT的那群狐狸似乎被打敗了啊……"
42230-67 = "竟然會輸給沒受過多少正規訓練的小鬼，簡直是特殊部隊之恥啊。"
42230-73 = "幸好有事先叫凱薩SOF來這裡待命。"
42230-74 = "雖然這本來是用來對付狐狸的手牌，用來對付兔子也能發揮十足的效果吧。"
42230-76 = "我和那群因為大意而失敗的蠢蛋不一樣──"
42230-90 = "Tango down！"
42230-95 = "收到，繼續前進吧。"
42230-100 = "借，借過一下……！"
42230-110 = "[ns]「抱歉，我們先走一步囉。」"
42230-114 = "搞什麼鬼……"
42230-115 = "把人當笨蛋也要有個限度……"
42230-116 = "……我絕不會放過你們，SRT！"

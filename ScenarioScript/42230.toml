[translation]
42230-1 = "ตอนที่ 23;การยึดอำนาจที่ล้มเหลว"
42230-4 = "สำนักงานรักษาการแทนประธานองค์การนักเรียน"
42230-6 = "ฮุฮุ... กลิ่นเอสเมอรัลดาที่ดื่มด่ำหลังจากได้เพลิดเพลินกับมื้อสายของวันนี่ช่างพิเศษดีจังเลยนะคะ"
42230-7 = "ถึงจะเป็นเมล็ดกาแฟราคาแพงหายาก แต่เพื่อฉลองให้กับวันนี้แล้ว ฟุ่มเฟือยสักหน่อยก็ไม่เลวนะคะ"
42230-11 = "ไหนดูซิ ป่านนี้ควรจะมีข่าวระเบิดที่สถานีโคะอุซางิแล้วสิ..."
42230-18 = "ชิรานูอิ คายะ รักษาการแทนประธานองค์การนักเรียนค่ะ"
42230-19 = "ค่ะ นายพล ฉันกำลังรอให้ติดต่อเข้ามาอยู่พอดีเลยค่ะ"
42230-20 = "งานที่สถานีโคะอุซางิเสร็จสิ้นด้วยดีไหมคะ?"
42230-24 = "คะ...? กองทหาร FOX ทำปฏิบัติการไม่สำเร็จ...?"
42230-25 = "แล้วนี่กองทหาร RABBIT ติดอาวุธกับคุณครูของชาเล่ต์ก็กำลังมุ่งหน้ามาที่อาคารองค์การนักเรียน#nอย่างงั้นเหรอคะ...?"
42230-26 = "มะ... หมายความว่ายังไงคะนายพล? ช่วยอธิบายช้าๆ อีกทีได้ไหมคะ"
42230-30 = "ขัดขวางสมาชิก SRT ที่ครูคนนั้นสั่งการไม่ได้งั้นเหรอคะ หมายความว่ายังไง..."
42230-37 = "ในเมื่อได้เงินจากเราไปแล้ว..."
42230-39 = "ต่อให้ต้องงัดวิธีไหนออกมาใช้ ก็ต้องสกัดไว้ให้ได้สิ!"
42230-51 = "RABBIT 1 มาถึงทางรถไฟขาขึ้นแล้วค่ะ"
42230-52 = "RABBIT 2 ตรวจค้นสถานที่เรียบร้อย ไม่พบอะไรน่าเป็นห่วง"
42230-54 = "RABBIT 3 ฉันเพิ่งส่งข่าวเหตุการณ์นี้ไปยังสถาบันการรถไฟไฮแลนเดอร์แล้วปิดเส้นทางที่มุ่งไปอาคาร#nองค์การนักเรียนแล้ว"
42230-55 = "ใน 1 ชั่วโมงข้างหน้าจะไม่มีกำหนดการเดินรถไฟ เรามุ่งหน้าไปอย่างสบายใจได้เลย!"
42230-56 = "รับทราบ"
42230-57 = "RABBIT 2, RABBIT 4 เป้าหมายอาจจะหลบหนีได้ รีบเข้าไปในอาคารองค์การนักเรียนให้เร็วๆ กันเถอะ!"
42230-59 = "อื้ม เข้าใจแล้ว...!"
42230-60 = "วางใจได้เลย!"
42230-66 = "ท่าทางเราจะโดนพวก SRT จอมเจ้าเล่ห์เล่นงานเข้าแล้วสินะ..."
42230-67 = "โดนพวกเด็กที่ไม่ได้รับการฝึกฝนอย่างถูกต้องเล่นงานแบบนี้ เป็นความอัปยศของหน่วยรบพิเศษจริงๆ"
42230-73 = "ดีแล้วที่สั่งให้ไคเซอร์ SOF มารออยู่ล่วงหน้าแล้ว"
42230-74 = "เดิมทีแล้ว SOF เป็นการ์ดที่เตรียมไว้เผชิญหน้ากับสุนัขจิ้งจอก แต่ก็พอจะตั้งรับกระต่ายได้อยู่"
42230-76 = "ฉันไม่ได้โง่จนประมาทแล้วมาแพ้เอาทีหลังหรอกนะ..."
42230-90 = "แทงโก้ดาวน์!"
42230-95 = "รับทราบ ไปต่อแบบไม่ต้องหยุดพักเลยค่ะ"
42230-100 = "ขะ... ขอโทษนะคะ...!"
42230-110 = "[ns] \"ขอโทษนะ ขอผ่านไปหน่อย\""
42230-114 = "อะไรกัน เจ้าพวกนี้..."
42230-115 = "พวกแกทำให้ฉันดูโง่!"
42230-116 = "... ฉันจะไม่ยกโทษให้เด็ดขาด พวก SRT!"

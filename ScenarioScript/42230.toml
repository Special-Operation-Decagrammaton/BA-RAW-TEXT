[translation]
42230-1 = "Episode 23; Failed Coup"
42230-4 = "Office of the Acting General Student Council President"
42230-6 = "Ah, nothing like the aroma of Esmeralda coffee after a late brunch."
42230-7 = "It's almost a shame to use such rare, decadent beans, but for today? Celebration calls for some luxuries."
42230-11 = "Let's see, we should be getting reports about the explosion at Kousagi Station soon..."
42230-18 = "Yes, this is Acting General Student Council President Shiranui Kaya."
42230-19 = "Ah, General. I was waiting for your call."
42230-20 = "Everything squared away at Kousagi Station?"
42230-24 = "...What? What do you mean the FOX Squad failed?"
42230-25 = "And now the RABBIT Squad is fully armed and heading to the Council building with Schale's Sensei...?"
42230-26 = "Slow down, General!"
42230-30 = "What do you mean the SRT members rolled over you guys? Sensei was helping them?!"
42230-37 = "We paid you a premium, damn it! "
42230-39 = "Why can't anyone do their jobs?!"
42230-51 = "This is RABBIT 1. Just arrived at the northbound arterial line."
42230-52 = "RABBIT 2, area's been scouted. All clear."
42230-54 = "This is RABBIT 3. I reported the incident to the Highlander Railroad Academy and they've closed off all lines."
42230-55 = "You're clear for the next hour, so keep pushing forward!"
42230-56 = "Copy."
42230-57 = "RABBIT 2, RABBIT 4. Speed is of the essence here. The target will try to escape, so we need to get to the General Student Council ASAP!"
42230-59 = "A-All right!"
42230-60 = "Let's go!"
42230-66 = "The infamous foxes were hunted by their prey."
42230-67 = "Pathetic, to think a premier squad could be beaten by some greenhorns."
42230-73 = "Thank heavens I positioned the Kaiser Special Ops here as backup."
42230-74 = "They were our ace against those foxes, but I bet they can handle the rabbits just as well."
42230-76 = "I never make the same mistake twice! I have back-up plans X, Y, and Z, so do you worst, Sensei!"
42230-90 = "Tango down!"
42230-95 = "Good job. Keep the pace."
42230-100 = "I'm sorry!"
42230-110 = "[ns] \"Sorry, sorry. We're in a rush!\""
42230-114 = "What the...?"
42230-115 = "You think you've won, SRT?"
42230-116 = "This isn't over!"

[translation]
801-1 = "Grand Assault Mission Briefing"
801-5 = "My apologies for the wait, Sensei."
801-6 = "Iwabitsu Ayumu from the Regulatory Committee is here to assist."
801-7 = "H-Hello, Sensei."
801-8 = "There's no time to waste. I'll begin the briefing now. "
801-9 = "After recent events, the General Student Council has been working tirelessly to develop better response measures to emergency situations. This place is the result. "
801-11 = "Yes... It's a control...an operations room, essentially..."
801-12 = "From here, you have more tools, data, and means of mass-communication to help you better manage the battlefield if Kivotos is under threat again. "
801-14 = "The Regulatory Committee was essential in making this happen as quickly and efficiently as it did. Great job, Ayumu."
801-15 = "Not at all! No, no, this was all Rin...the Chief Officer's idea... I just did what I was told..."
801-16 = "The Treasurer's Office contributed a lot too... "
801-17 = "Everyone worked hard to make this operations room happen, Sensei, so I hope you find it helpful..."
801-18 = "Until next time, Sensei. "
801-19 = "G-Good luck, Sensei!"

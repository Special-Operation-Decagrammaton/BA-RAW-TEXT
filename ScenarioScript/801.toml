[translation]
801-1 = "สรุปภารกิจแกรนด์เรดบอส"
801-5 = "มาช้านะคะ คุณครู"
801-6 = "ครั้งนี้ ฉันมาพร้อมกับอิวาบิซึ อายูมุจากฝ่ายไกล่เกลี่ยค่ะ"
801-7 = "สะ... สวัสดีค่ะ คุณครู "
801-8 = "ค่ะ เนื่องจากเป็นงานด่วน ฉันจะขอเข้าเรื่องเลยนะคะ "
801-9 = "ห้องที่คุณครูอยู่ในตอนนี้คือห้องที่ทางองค์การนักเรียนเตรียมเอาไว้ สำหรับใช้ในการรับมือกับ#nสถานการณ์ต่างๆ ที่เกิดขึ้นในคิโวทอสให้ได้อย่างมีประสิทธิภาพค่ะ"
801-11 = "ค่ะ... หรือเรียกอีกอย่างก็คือห้องยุทธการ... ไม่สิ... ห้องปฏิบัติการค่ะ... "
801-12 = "ห้องนี้จะทำให้เราสามารถรับมือกับเหตุการณ์ต่างๆ ที่เกิดขึ้นในคิโวทอสได้รวดเร็วขึ้นค่ะ..."
801-14 = "ทางฝ่ายไกล่เกลี่ยเองก็ทุ่มเทกันมากเลยละค่ะ ขอบคุณมากนะคะ อายูมุ"
801-15 = "คะ? มะ...ไม่เลยค่ะ ทั้งหมดนี่เป็นเพราะรุ่นพี่ริน... หัวหน้าฝ่ายบริหารเป็นคนจัดการต่างหาก..."
801-16 = "นอกจากนี้ทางฝ่ายการเงินเองก็ยังให้ความร่วมมืออย่างกระตือรือร้นด้วย... "
801-17 = "ยังไงก็เถอะค่ะ คุณครู... หวังว่าหลังจากนี้คุณครูจะใช้งานห้องปฏิบัติการนี้ให้เกิดประโยชน์ได้อย่าง#nสูงสุดนะคะ"
801-18 = "ขอตัวก่อนนะคะ "
801-19 = "ระ... รบกวนด้วยนะคะ!"

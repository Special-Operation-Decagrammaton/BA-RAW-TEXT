[translation]
801-1 = "大決戰"
801-5 = "讓您久等了，老師。"
801-6 = "這次和我一起前來的還有調停室的岩櫃步。"
801-7 = "您，您好，老師。"
801-8 = "那麼，進入正題。"
801-9 = "這裡是聯邦學生會為了應對奇普托斯各處發生的事件而準備的房間。"
801-11 = "是的……請當成作戰室來使用吧……！"
801-12 = "過去多次發生的事件，我想今後，能從這裡更有效率地應對……！"
801-14 = "是的。這房間是在調停室的幫助下才得以實現的。#n辛苦了，步。"
801-15 = "咦？這，這沒什麼。這全都是琳前輩………琳行政官所規劃的……"
801-16 = "以及財務室的積極協助……"
801-17 = "總之，希望老師今後能善用這間作戰室。#n期待您有更加活躍的表現。"
801-18 = "以上。"
801-19 = "請，請多多指教！"

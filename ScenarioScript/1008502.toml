[translation]
1008502-1 = "數位遊牧民"
1008502-2 = "千年學園近郊，森林公園"
1008502-3 = "（因為接到了晴的聯絡，在週末時去了一趟千年學園近郊的森林公園）"
1008502-10 = "啊，老師。歡迎你來。"
1008502-11 = "就像我在MomoTalk上提到的一樣，#n我今天打算一邊欣賞野外的風景，一邊把還沒寫完的程式寫完。"
1008502-12 = "之所以提早過來……是為了準備一些野外工作必須的基本設備。"
1008502-13 = "很快就會完成，請你在那邊等我一下。"
1008502-14 = "[s]「工作必須的基本設備……？」"
1008502-15 = "嗯，想要在野外使用電腦的話，多少會需要一些電子裝備吧？"
1008502-16 = "例如可以即時連接雲端儲存空間的網路路由器……"
1008502-17 = "還有電量耗盡時能快速充電的行動電源……"
1008502-18 = "啊，為了讓能量飲料保持冰涼，攜帶用冰箱也少不了。"
1008502-19 = "[s]「只是外出工作一天而已，居然需要這麼多裝備嗎？」"
1008502-20 = "那當然，寫程式就像嚴格要求邏輯思考的解謎遊戲一樣。#n為了不在中途分心，我必須打造出最舒適的環境。"
1008502-21 = "要是在工作時想到了不錯的點子，卻因為設備不夠齊全而無法實現……#n那特地跑來野外工作不就沒有意義了嗎？"
1008502-22 = "……能量飲料應該不用我多說……"
1008502-23 = "其實如果可以的話，我甚至還想把平常用的螢幕和鍵盤都帶來……#n不過這樣要帶的東西就太多了，所以只好先將就一下。"
1008502-27 = "[ns]（總覺得越來越不像是個數位遊牧民了……）"
1008502-31 = "呼……吹著涼爽的風，感覺腦袋都清醒了呢。"
1008502-32 = "來野外工作果然是個正確的決定……雖然有點冷就是了。"
1008502-36 = "……好，那我們趕快開始工作吧。"
1008502-44 = "（稍後……）"
1008502-49 = "唔嗯……"
1008502-50 = "……好煩……"
1008502-51 = "[s]「出了什麼問題嗎？」"
1008502-52 = "不，倒不是工作出了什麼問題……"
1008502-53 = "只是穿著厚重的衣服打字，總覺得手指很遲鈍……"
1008502-54 = "但也不能因此就像在室內一樣穿著輕便的衣服……#n看來在野外工作比想像中還要麻煩呢。"
1008502-55 = "還有這個露營椅也是，坐久了覺得腰有點痛……"
1008502-56 = "[s1]「那要不要來做點簡單的伸展運動？」\n[s2]「畢竟難得來野外一趟，一直埋頭工作不覺得很可惜嗎？」"
1008502-59 = "……好吧，就照老師說的，稍微做個伸展動作好了。"
1008502-63 = "唔……不知道是不是因為今天天氣好的關係，風景還真美呢。"
1008502-64 = "只可惜工作的時候必須把所有注意力集中在黑漆漆的螢幕上……#n所以就算周圍的環境再漂亮，對工作也沒什麼幫助……"
1008502-66 = "（短暫的伸展運動結束後，晴又再次用彆扭的姿勢開始工作……）"
1008502-71 = "……終於結束了。"
1008502-72 = "這樣今天預定的進度就完成了，接下來只要上傳到雲端伺服器上就行了。"
1008502-73 = "[s]「辛苦了！」"
1008502-74 = "不會，我才應該感謝老師犧牲難得的休假陪我到這裡來。"
1008502-75 = "雖然這裡的環境不是很方便……#n但可能是因為周圍沒什麼干擾，所以工作效率比平常高了不少。"
1008502-76 = "看來特地拖著這些沉重的裝備到野外來還是有意義的。"
1008502-77 = "之後只要用新的程式碼覆蓋舊的……"
1008502-83 = "咦？這是怎麼回事……？"
1008502-89 = "「雲端伺服器連線錯誤，請確認網路環境後重新嘗試」"
1008502-90 = "唔……怎麼會突然發生連線問題……"
1008502-95 = "「雲端伺服器連線錯誤，請確認網路環境後重新嘗試」"
1008502-99 = "「雲端伺服器連線錯──」"
1008502-106 = "「──資料同步已完成！」"
1008502-107 = "呼，還好，我還以為網路斷了呢。"
1008502-111 = "……咦？"
1008502-112 = "怎麼會……我剛才寫的程式碼全都消失了。"
1008502-116 = "難道……"
1008502-123 = "[ns]「怎，怎麼了？」"
1008502-124 = "……被回溯了。"
1008502-125 = "因為雲端伺服器回溯到開始工作前的狀態，所以新寫的程式碼通通都被覆蓋了……"
1008502-126 = "我耗費了半天的心血……一瞬間就化為了泡影……"
1008502-127 = "[s]「沒有辦法復原嗎？例如備份之類的？」"
1008502-128 = "嗯……"
1008502-129 = "因為平時用的電腦有自動備份系統，所以一時疏忽了……#n而且我今天是直接在雲端的命令列介面上寫程式碼……"
1008502-130 = "因此除了重新來過之外，恐怕沒有其他復原方法……"
1008502-131 = "……要是跟平常一樣在部室裡工作的話，就不會發生這種事了。"
1008502-135 = "以後我絕對不會再來野外工作了！"
1008502-137 = "（之後帶著垂頭喪氣的晴回到了貝里塔斯的部室）"

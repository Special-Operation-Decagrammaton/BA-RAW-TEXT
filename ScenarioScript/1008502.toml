1008502-11 = "4;하레 캠핑;03;모모톡으로 말했던 것처럼 오늘은 야외에서 멋진 풍경을 바라보며 밀린 프로그래밍 작업을 마무리하려고."
1008502-12 = "4;하레 캠핑;11;나는 야외 작업에 필요한 인프라를 준비해야 해서 미리 일찍 나왔어."
1008502-13 = "4;하레 캠핑;03;금방이면 설치가 끝나니 잠시만 그 앞에서 기다려 줘.\n#4;em;[반짝]"
1008502-14 = "[s] \"작업에 필요한 인프라……?\""
1008502-15 = "4;하레 캠핑;01;응. 야외에서 컴퓨터 작업을 하려면 여러 가지 전자 장비가 필요하잖아?\n#4;em;[반응]"
1008502-16 = "4;하레 캠핑;99;클라우드 스토리지에 실시간으로 접속할 수 있는 네트워크 라우터라든가……"
1008502-17 = "4;하레 캠핑;02;배터리가 다 떨어졌을 때 급속 충전이 가능한 휴대용 파워 뱅크……"
1008502-18 = "4;하레 캠핑;11;아, 그리고 에너지 드링크를 항시 시원하게 보관할 수 있는 휴대용 냉장고도 빼놓을 수 없지.\n#4;em;[음표]"
1008502-19 = "[s] \"잠깐 작업을 하는데도 장비가 이렇게나 많이 필요해?\""
1008502-20 = "4;하레 캠핑;00;물론이야. 프로그래밍은 논리적인 사고를 요하는 묘수풀이에 가깝기 때문에, 집중에 방해가 되지 않도록 미리 최적의 환경을 조성해 두어야 하거든."
1008502-21 = "4;하레 캠핑;02;작업 중 멋진 아이디어가 떠올랐는데 장비가 불편해서 구현에 방해가 된다면, 모처럼 밖에 나온 의미가 없잖아?\n#4;em;[?]"
1008502-22 = "4;하레 캠핑;99;……에너지 드링크야 더 말할 필요도 없고."
1008502-23 = "4;하레 캠핑;03;마음 같아서는 평소에 쓰던 모니터와 키보드도 가져오고 싶었는데…… 짐이 너무 늘어나는 것 같아서 우선은 이 정도로 만족하려고."

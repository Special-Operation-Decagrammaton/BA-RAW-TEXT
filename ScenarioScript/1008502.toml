[translation]
1008502-1 = "ดิจิทัลโนแมด"
1008502-2 = "สวนป่าใกล้ๆ โรงเรียนมิลเลเนียม"
1008502-3 = "(คุณครูได้รับการติดต่อจากฮาเระ เมื่อถึงวันหยุดสุดสัปดาห์จึงไปที่สวนป่าที่อยู่ใกล้ๆ โรงเรียน#nมิลเลเนียม)"
1008502-10 = "อ๊ะ คุณครู เข้ามาสิ"
1008502-11 = "อย่างที่ฉันบอกไปใน MOMOTALK วันนี้ฉันจะเขียนโปรแกรมที่ค้างไว้ให้เสร็จในขณะที่ดูวิวทิวทัศน์ที่#nยอดเยี่ยมไปด้วย"
1008502-12 = "ฉันต้องเตรียมอุปกรณ์พื้นฐานที่จำเป็นสำหรับการทำงานนอกสถานที่มาด้วย ก็เลยออกมาเร็วหน่อยน่ะ"
1008502-13 = "ฉันติดตั้งไม่นานหรอก รออยู่ข้างหน้านี้เดี๋ยวนะ"
1008502-14 = "[s] \"อุปกรณ์พื้นฐานที่จำเป็นสำหรับการทำงานเหรอ?\""
1008502-15 = "อื้ม ถ้าจะใช้คอมพิวเตอร์ทำงานในที่กลางแจ้ง ก็ต้องมีอุปกรณ์อิเล็กทรอนิกส์ที่จำเป็นหลายอย่างน่ะ"
1008502-16 = "อย่างเช่นเราเตอร์ที่ทำให้เข้าถึงที่เก็บข้อมูลบนคลาวด์ได้แบบเรียลไทม์..."
1008502-17 = "หรือไม่ก็พาวเวอร์แบงก์แบบพกพาที่ชาร์จได้ไวๆ ในเวลาที่แบตหมด..."
1008502-18 = "อ้อ ที่ขาดไม่ได้เลยก็คือตู้เย็นขนาดพกพาที่เอาไว้แช่เครื่องดื่มชูกำลังให้เย็นอยู่ตลอดเวลา"
1008502-19 = "[s] \"มาทำงานแค่แป๊บเดียว แต่ต้องมีอุปกรณ์เยอะขนาดนี้เลยเหรอ?\""
1008502-20 = "แน่นอนอยู่แล้ว การเขียนโปรแกรมเป็นการแก้ปัญหาที่ต้องใช้ความคิดเชิงตรรกะ ก็เลยต้องสร้างสภาพ#nแวดล้อมที่เหมาะสมไว้ล่วงหน้าเพื่อไม่ให้มีอะไรมารบกวนสมาธิ"
1008502-21 = "ถ้าปิ๊งไอเดียดีๆ ได้ระหว่างทำงาน แล้วขาดแคลนอุปกรณ์จนทำให้ไอเดียนั้นเป็นรูปเป็นร่างขึ้นไม่ได้ การออกมาทำงานข้างนอกก็คงไร้ความหมาย"
1008502-22 = "...และเครื่องดื่มชูกำลังก็ขาดไม่ได้อยู่แล้ว"
1008502-23 = "ถ้าเป็นไปได้ฉันก็อยากจะเอาหน้าจอและคีย์บอร์ดที่ใช้เป็นประจำมาด้วย... แต่แค่นี้สัมภาระก็เยอะแล้ว ก็เลยเอามาเท่านี้ก่อน"
1008502-27 = "[ns] (นี่ดูไม่ใกล้เคียงการเป็นดิจิทัลโนแมดเลยนะ...)"
1008502-31 = "ฮู่ว... ลมพัดสดชื่นจัง รู้สึกสมองปลอดโปร่งเลยละ"
1008502-32 = "ถึงจะหนาวนิดหน่อย แต่ก็ดีแล้วแหละนะที่ออกมาข้างนอก"
1008502-36 = "...งั้นก็เริ่มงานเลยดีมั้ย?"
1008502-44 = "(ครู่ต่อมา...)"
1008502-49 = "...อืม"
1008502-50 = "...ไม่สะดวกเลย..."
1008502-51 = "[s] \"มีปัญหาอะไรรึเปล่า?\""
1008502-52 = "ไม่ใช่ปัญหาใหญ่ในการทำงานหรอก..."
1008502-53 = "แค่พอสวมเสื้อผ้าหนาๆ และเขียนโปรแกรมกลางแจ้ง ฉันรู้สึกว่านิ้วมือมันทื่อๆ เหมือนพิมพ์ไม่ค่อย#nถนัดน่ะ"
1008502-54 = "แต่จะให้ล้มเลิกแล้วไปใส่เสื้อผ้าบางๆ เขียนโค้ดในอาคารก็ไม่ได้... นี่มันลำบากกว่าที่คิดนะเนี่ย"
1008502-55 = "ไหนจะเก้าอี้แคมป์ปิ้งนี่อีก นั่งนานๆ แล้วปวดหลังชะมัด..."
1008502-56 = "[s1] \"ลุกมายืดเหยียดเบาๆ กันหน่อยมั้ย?\"\n[s2] \"ได้ออกมาข้างนอกทั้งที ถ้าทำแต่งานแล้วกลับไปเลยก็น่าเสียดายนะ\""
1008502-59 = "...งั้นฉันยืดเส้นยืดสายตามที่คุณครูว่าหน่อยดีมั้ยนะ?"
1008502-63 = "อืม... ไม่รู้เป็นเพราะวันนี้อากาศดีรึเปล่า วิวก็เลยสวยเป็นพิเศษเลย"
1008502-64 = "แต่ตอนที่ทำงาน ฉันก็จะจดจ่ออยู่แต่กับหน้าจอเท่านั้น... ต่อให้สภาพแวดล้อมรอบๆ สวยงามแค่ไหน แต่ก็ไม่น่ามีความหมายต่อการทำงานมั้ยนะ..."
1008502-66 = "(หลังจากยืดเส้นยืดสายอยู่สักครู่ ฮาเระก็กลับไปนั่งทำงานในสภาพที่ดูไม่น่าสะดวกต่อ...)"
1008502-71 = "...เสร็จจนได้"
1008502-72 = "ฉันเขียนโค้ดที่วางแผนมานานเสร็จหมดแล้ว จากนี้ก็เหลือแค่ซิงก์กับเซิร์ฟเวอร์คลาวด์"
1008502-73 = "[s] \"เก่งมาก!\""
1008502-74 = "ไม่เก่งหรอก ขอบคุณคุณครูนะที่มาอยู่ด้วยในวันหยุดแบบนี้"
1008502-75 = "ถึงจะเป็นสภาพแวดล้อมที่ไม่สะดวกสบายในหลายๆ ด้าน... แต่พอไม่มีเรื่องอื่นมากวนใจ ก็เหมือนจะทำงานเสร็จเร็วกว่าปกติเลย"
1008502-76 = "การหอบหิ้วอุปกรณ์หนักๆ มาทำงานกลางแจ้งมันก็คุ้มค่าอยู่เหมือนกันนะ"
1008502-77 = "ทีนี้ฉันก็แค่ต้องเพิ่มโค้ดที่เพิ่งเขียนขึ้นใหม่ในโค้ดเดิมที่มีอยู่ แล้วก็อัปเดต..."
1008502-83 = "เอ๋? ทำไมเป็นอย่างนี้ล่ะ...?"
1008502-89 = "<เชื่อมต่อเซิร์ฟเวอร์คลาวด์ไม่สำเร็จ กรุณาตรวจสอบเครือข่ายแล้วลองใหม่อีกครั้ง>"
1008502-90 = "ไม่นะ... ทำไมอยู่ๆ ถึงเชื่อมต่อไม่ได้ล่ะ..."
1008502-95 = "<เชื่อมต่อเซิร์ฟเวอร์คลาวด์ไม่สำเร็จ กรุณาตรวจสอบเครือข่ายแล้วลองใหม่อีกครั้ง>"
1008502-99 = "<เชื่อมต่อเซิร์ฟเวอร์คลาวด์ไม่สำเร็จ——>"
1008502-106 = "<—— ซิงก์สำเร็จ!>"
1008502-107 = "ฮู่ว... โล่งอกไปที ฉันก็กังวลแทบแย่ นึกว่าเน็ตจะหลุดไปแล้วซะอีก"
1008502-111 = "...เอ๋?"
1008502-112 = "ทำไมเป็นอย่างนี้ล่ะ...? โค้ดที่ฉันเขียนวันนี้หายไปหมดเลย"
1008502-116 = "หรือว่า..."
1008502-123 = "[ns] \"มะ... มีอะไรเหรอ?\""
1008502-124 = "...โรลแบ็กงั้นเหรอ"
1008502-125 = "เซิร์ฟเวอร์คลาวด์เขียนข้อมูลทับเป็นเวอร์ชั่นก่อนที่ฉันจะเขียนโค้ดไป..."
1008502-126 = "อุตส่าห์ลำบากอยู่ตั้งครึ่งวัน... ทุกอย่างหายไปในพริบตาเลย..."
1008502-127 = "[s] \"ไม่มีวิธีคืนค่าหรือกู้คืนข้อมูลเหรอ?\""
1008502-128 = "อืม..."
1008502-129 = "ปกติคอมพิวเตอร์เครื่องที่ฉันใช้เป็นประจำจะมีระบบสำรองข้อมูลอัตโนมัติ ฉันก็เลยไม่เคยต้องกังวลน่ะ แต่วันนี้ดันมาทำงานบนคลาวด์โดยตรง..."
1008502-130 = "ก็เลยไม่น่าจะกู้คืนข้อมูลได้ คงทำได้แค่เขียนใหม่น่ะ..."
1008502-131 = "...ถ้าไปทำงานในห้องชมรมตามปกติ ก็คงไม่เกิดเรื่องแบบนี้หรอก"
1008502-135 = "ต่อไปฉันไม่มาทำงานกลางแจ้งอีกแล้ว! ไม่เด็ดขาดเลย!"
1008502-137 = "(หลังจากนั้นคุณครูก็พาฮาเระที่หมดกำลังใจกลับไปยังห้องเวอริทัส)"

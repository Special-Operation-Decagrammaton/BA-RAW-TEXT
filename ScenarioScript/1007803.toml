[translation]
1007803-1 = "我喜歡爆破工作"
1007803-3 = "（傍晚，前往了佳澄所說的廢棄工地）"
1007803-4 = "[ns1]「是廢棄工地呢。」\n[ns2]「這次是這裡嗎……」"
1007803-7 = "哦～不愧是老師！一旦約好時間就會徹底遵守！"
1007803-11 = "沒錯，正是如此！#n這裡就是我這個月的第89祕密基地。"
1007803-12 = "嗯？你說數字好像又增加了？"
1007803-13 = "哈～哈哈哈！那是當然！#n因為被廢棄和定居失敗的基地也包含在內啊！"
1007803-14 = "總之，重要的並不是數字……"
1007803-15 = "而是現在不是說這些的時候了！"
1007803-16 = "快跟我來吧，老師！#n我要告訴你我的夢幻計畫！！"
1007803-22 = "唔……到這裡應該可以了。"
1007803-23 = "總是把老師叫到這麼簡陋的地方實在很抱歉……但我實在不得不隱藏自己的行蹤。"
1007803-24 = "別看我這樣，我可是很受歡迎的呢，到處都有許多客人在找我。"
1007803-25 = "比方說風紀委員會、武裝企業、在爆破作業中引爆水道的太妹和頭盔團等等……"
1007803-26 = "哈哈哈，人活著總是會碰到各種事的嘛。#n不過如果真的湧出溫泉，大家都還是會很開心！"
1007803-27 = "……嗯？老師？為什麼露出那種表情？"
1007803-28 = "……嗯？"
1007803-29 = "問我為什麼每次都被追捕還是始終如一？"
1007803-30 = "失敗的時候會不會覺得遺憾或挫折？"
1007803-34 = "……哈哈。"
1007803-35 = "老師，也許我們現在還有一點認知上的差異。"
1007803-36 = "老師似乎以為我喜歡的是「成功開發溫泉」……"
1007803-37 = "當然，我所有的溫泉爆破計畫都是以成功為目標……#n但那並不代表「不成功就沒有意義」。"
1007803-38 = "……老師。"
1007803-39 = "我喜歡的是爆破──你明白這句話的意思嗎？"
1007803-40 = "在那之中……自然也包含「失敗的爆破」。"
1007803-41 = "沒錯，我喜歡所有類型的爆破。#n大爆破、小爆破、成功的爆破、失敗的爆破……"
1007803-42 = "受人追捕的爆破、受阻撓的爆破，或是克服萬難才得以成功的爆破……！"
1007803-43 = "我喜歡在誰也無法想像的地方進行爆破作業，創造出其他地方見不到的光景。"
1007803-44 = "辛苦精算後準備的炸藥卻被風紀委員會阻撓而提前爆炸……#n這固然令人難過，不過我也同樣愛著那種感覺！"
1007803-45 = "只要是可能湧出溫泉的地方我都喜歡！#n不，哪怕只有「如果這裡湧出溫泉一定會很美吧」的心願也一樣！"
1007803-46 = "重要的並不是結果，而是打造溫泉的行動！是爆破過程中的一切！"
1007803-47 = "在能挖掘的地方、希望能挖掘的地方……發生的一切都是好的！#n這種感覺……你能理解嗎？"
1007803-48 = "而其中……"
1007803-49 = "……「夏萊」的大樓也包含在內。"
1007803-53 = "[ns3]「……等等，你剛才說什麼！？」\n[ns4]「……咦！？」"
1007803-56 = "哈～哈哈哈哈！！看你一臉驚訝的樣子。"
1007803-57 = "……終於明白了嗎，老師？"
1007803-58 = "我……希望老師能更積極地參與我的爆破計畫。"
1007803-59 = "就算要把這當成是威脅也無所謂。#n反正我已經習慣被人警戒了。"
1007803-60 = "要把我當成討厭鬼也行。#n因為我認為重要的並非對方的感受，而是自己的判斷。"
1007803-61 = "剛才說的那些……即使與老師無關，也是我一直抱持著的想法。"
1007803-62 = "所以……希望老師能再「認真」思考一下。"
1007803-63 = "……知道事情的重要性了嗎，老師？"
1007803-64 = "為了我，也為了老師……"
1007803-65 = "我希望老師能從現在開始，跟我一起討論下一個溫泉點。"
1007803-66 = "有需要的話，現在就可以開始。"
1007803-67 = "……無論要討論到多晚都行。"
1007803-68 = "[s] 「…………」"
1007803-70 = "[ns5]「……好吧，我奉陪到底。」\n[ns6]「我也不是省油的燈哦。」"
1007803-73 = "哈～哈哈哈哈哈哈～！！！#n很好很好！這樣就對了！！"
1007803-74 = "那麼就來認真找找吧！"
1007803-75 = "找出能讓我、讓老師……以及所有人幸福的──"
1007803-76 = "夢幻溫泉點！！"
1007803-78 = "（之後，和佳澄一起看著地圖討論下一個溫泉點直到深夜）"
1007803-79 = "（由於使出千方百計誘導佳澄選擇安全的地方，直到深夜仍有意見上的衝突……）"
1007803-82 = "（……最終直到早上才找出滿意地點的佳澄，露出滿意的表情在地圖上進入了夢鄉）"

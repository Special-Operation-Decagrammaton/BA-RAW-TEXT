[translation]
1007803-1 = "#title;나는 발파 작업이 좋다"
1007803-2 = "#wait;2000"
1007803-3 = "#na;(늦은 저녁, 카스미가 알려준 대로 방치된 공사장을 찾아갔다.)"
1007803-4 = "[ns1] \"버려진 공사장이네.\"\n[ns2] \"이번에는 여기인가…….\""
1007803-5 = "#wait;100"
1007803-6 = "#wait;100"
1007803-7 = "#na;카스미;오~ 역시 선생님! 시간 약속 한번 철저하네!"
1007803-8 = "#st;[0,0];instant;1;"
1007803-9 = "#clearST"
1007803-10 = "#wait;2000"
1007803-11 = "3;카스미;02;맞아, 그 말 대로! 여기가 나의 이번 달 89번째 비밀 아지트지.\n#3;a\n#3;em;[!]"
1007803-12 = "3;카스미;01;응? 그 사이에 숫자가 더 늘어난 것 같다고?"
1007803-13 = "3;카스미;03;와핫핫핫! 당연하지! 중간에 파기된 곳이랑 정착에 실패한 곳도 다 포함하니까!\n#3;em;[재잘]"
1007803-14 = "3;카스미;09;중요한 건 횟수가 아니라고, 횟수가. ……아무튼."
1007803-15 = "3;카스미;99;그러니 지금 또한, 이러고 있을 시간은 없다~ 이 말이야!"
1007803-16 = "3;카스미;03;자, 얼른 따라와. 선생님! 나의 환상적인 계획을 들려주도록 할 테니!!\n#3;em;[재잘]"
1007803-17 = "#st;[0,0];instant;1;"
1007803-18 = "#clearST"
1007803-19 = "3;카스미;03\n#3;dl\n#wait;1500"
1007803-20 = "#all;hide"
1007803-21 = "3;카스미;01"
1007803-22 = "3;카스미;01;흠흠. 이쯤이면 되겠군.\n#3;em;[음표]"
1007803-23 = "3;카스미;99;선생님에게는 자꾸 누추한 곳으로 불러내는 것 같아 미안하지만……. 어지간히 잘 숨지 않으면 곤란하거든."
1007803-24 = "3;카스미;10;내가 좀 인기인이라서 말이야. 여기저기서 찾는 사람들이 많아.\n#3;em;…"
1007803-25 = "3;카스미;99;선도부라든가, 무장 기업이라든가, 발파 작업 중에 수도관을 터뜨린 갱단 녀석들이라든가, 헬멧단 녀석들이라든가…….\n#3;stiff"
1007803-26 = "3;카스미;03;하하. 살다 보면 그럴 수도 있는데, 막상 온천이 나오면 다들 좋아할 거면서 말이야!\n#3;em;[재잘]\n#3;hophop"
1007803-27 = "3;카스미;08;……음? 선생님? 뭐야, 그 표정은?"
1007803-28 = "3;카스미;11;……응?\n#3;em;[?]"
1007803-29 = "3;카스미;11;어떻게 매번 그렇게 쫓기고 저지당하는데도 쭉 한결같은 분위기냐고?"
1007803-30 = "3;카스미;11;실패했을 때 아쉽다거나 좌절하지는 않느냐고?"
1007803-31 = "#st;[0,0];instant;1;"
1007803-32 = "#clearST"
1007803-33 = "3;카스미;11\n#3;em;…\n#wait;2500"
1007803-34 = "3;카스미;14;……핫핫."
1007803-35 = "3;카스미;15;선생님. 어쩌면 지금 우리에겐 아주 약간의 인식 차이가 있는지도 모르겠어.\n#3;em;[반응]"
1007803-36 = "3;카스미;99;아무래도 선생님은 내가 '온천 개발을 성공시키는 것'을 좋아한다고 생각하는 모양인데……."
1007803-37 = "3;카스미;09;물론 나의 모든 온천 발파 계획은 성공을 목표로 하고 있어. 하지만 그 말이 꼭 '성공하지 않으면 싫다'는 뜻은 아니지.\n#3;em;[반짝]"
1007803-38 = "3;카스미;01;……선생님."
1007803-39 = "3;카스미;11;나는 모든 종류의 발파를 좋아해. 이 말의 뜻을 이해해 줄 수 있겠어?\n#3;em;[반응]"
1007803-40 = "3;카스미;09;거기에는 물론……. '실패한 발파'도 포함된다, 이 말이야."
1007803-41 = "3;카스미;99;맞아. 나는 모든 종류의 발파를 좋아해. 큰 발파, 작은 발파, 성공한 발파, 실패한 발파."
1007803-42 = "3;카스미;99;쫓기는 신세가 되는 발파, 방해 공작에 막히는 발파, 혹은 뚫어내고 기어이 성공한 발파……!\n#3;em;[!]"
1007803-43 = "3;카스미;01;누구도 생각지 않았던 곳에서의 발파 작업으로 다른 곳에서 볼 수 없는 광경이 일어나는 것이 좋아."
1007803-44 = "3;카스미;09;하지만 기껏 정밀하게 계산해 준비한 폭약들이 선도부의 훼방으로 조기에 터져버리는 슬픔도 물~론 사랑하지!\n#3;em;[음표]"
1007803-45 = "3;카스미;10;온천수가 나올 수 있을 것 같은 곳이라면 모두 좋아! 아니, '여기서 나오면 아름다울 텐데'라는 희망만이라도 나쁘지 않아!"
1007803-46 = "3;카스미;05;중요한 건 단지 결과만이 아닌, 온천을 만들기 위한 움직임! 발파를 진행하는 그 과정의 모든 것이니까!\n#3;em;[반짝]"
1007803-47 = "3;카스미;09;파낼 수 있는 곳, 파내면 좋을 곳과 그곳에서 일어나는 모든 일이 그저 다 좋은 거야! 응? 이 감정……. 이해하겠어?"
1007803-48 = "3;카스미;99;그리고 그곳들 중 하나로는…….\n#3;em;…"
1007803-49 = "3;카스미;10;……<샬레> 건물 또한, 제대로 눈여겨보고 있고 말이야.\n#3;closeup\n#3;a"
1007803-50 = "#st;[0,0];instant;1;"
1007803-51 = "#clearST"
1007803-52 = "#wait;2500"
1007803-53 = "[ns3] \"……잠깐만, 뭐라고?\"\n[ns4] \"……예!?\""
1007803-54 = "#wait;100"
1007803-55 = "#wait;100"
1007803-56 = "3;카스미;03;와핫핫핫핫!! 놀라는 얼굴이네.\n#3;em;[재잘]\n#3;hophop"
1007803-57 = "3;카스미;02;……이제 이해하겠어, 선생님?"
1007803-58 = "3;카스미;01;나는 선생님이, 나의 발파 계획에 보다 적극적으로 개입해 줬으면 좋겠어.\n#3;em;[반응]"
1007803-59 = "3;카스미;99;선생님을 부르기 위한 협박이라고 생각해도 상관없어. 경계 받는 건 익숙한 일상이니까."
1007803-60 = "3;카스미;13;골칫덩이라고 싫어해도 좋아. 중요한 건 상대의 감정이 아니라 내 판단이니까.\n#3;m2"
1007803-61 = "3;카스미;01;방금 전 내가 한 말들은, 선생님과 관련하지 않더라도 그전부터 쭉 해 오던 생각.\n#3;em;…"
1007803-62 = "3;카스미;02;그런 의미에서라도……. 조금 더 '진지하게' 고려해 주었으면 해."
1007803-63 = "3;카스미;10;……이야기의 중대함을 알겠지? 선생님."
1007803-64 = "3;카스미;99;나를 위해, 그리고 선생님을 위해.\n#3;m3"
1007803-65 = "3;카스미;09;지금부터 함께. 나와 다음 포인트를 논의해 줬으면 해."
1007803-66 = "3;카스미;15;필요하다면, 오늘의."
1007803-67 = "3;카스미;10;……아무리 늦은 시간까지라도 말이야.\n#3;em;[음표]"
1007803-68 = "[s] \"………….\""
1007803-69 = "#wait;1000"
1007803-70 = "[ns5] \"……좋아. 그 제안, 어울려 주지.\"\n[ns6] \"나도 그리 만만하진 않을 거야.\""
1007803-71 = "#wait;100"
1007803-72 = "#wait;100"
1007803-73 = "3;카스미;03;와핫핫핫핫핫-!!! 좋아, 좋아! 그렇게 나와야지!!\n#3;em;[재잘]\n#3;hophop"
1007803-74 = "3;카스미;01;그럼 어디 한번 진지하게 찾아보도록 할까?"
1007803-75 = "3;카스미;14;나도……. 그리고 선생님도! 모두가 행복할 수 있는!"
1007803-76 = "3;카스미;15;환상의 발파 포인트를!!\n#3;closeup\n#3;em;[!]\n#fontsize;80"
1007803-77 = "#all;hide"
1007803-78 = "#na;(이후 새벽 늦은 시간까지, 카스미와 함께 지도 위에 얽히며 다음 발파 포인트를 논의했다.)"
1007803-79 = "#na;(어떻게든 안전한 곳을 유도하려고 했기에 새벽이 넘도록 의견이 충돌했고…….)"
1007803-80 = "#all;hide"
1007803-81 = "#wait;1500"
1007803-82 = "#na;(……아침이 다 돼서야, 포인트를 정한 카스미는 지도 위에서 만족스럽게 잠들었다.)"
1007803-83 = "#all;hide"

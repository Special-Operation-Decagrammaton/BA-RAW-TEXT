[translation]
1007803-1 = "I Like Explosions"
1007803-3 = "It was well into the night the next time I met up with Kasumi...at yet another abandoned factory."
1007803-4 = "[ns1] \"An abandoned factory...\"\n[ns2] \"This is really where you wanted to meet?\""
1007803-7 = "As usual, Sensei, you're right on time!"
1007803-11 = "And yes indeed! Welcome to secret hideout number 89!"
1007803-12 = "I know, I know. It's three numbers higher than last time."
1007803-13 = "What can I say? Two didn't agree with me, and one didn't agree with my explosives, so here we are."
1007803-14 = "But that's all debris in the dump now. Hideout numbers don't matter in the grand scheme of things."
1007803-15 = "No, siree! We have far more important topics to discuss than my nomadic existence."
1007803-16 = "Now, follow me, Sensei. I have a fantastic plan I want to share with you!"
1007803-22 = "Mm hm! Yes, this is just the spot."
1007803-23 = "I'm sorry the locale's so...unsavory, but I need somewhere tucked away if I want to stay hidden."
1007803-24 = "I'm quite popular these days—infamous even. There are people looking for me everywhere."
1007803-25 = "The Prefect Team, the Helmet Gangsters, arms manufacturers, clubs impacted by past demolitions..."
1007803-26 = "But such is life, right? I know everything will work out once I hit a hot spring!"
1007803-27 = "...Hm? What's with that face, Sensei?"
1007803-28 = "Huh?"
1007803-29 = "...I wouldn't say it's easy to keep going in the face of adversity, no..."
1007803-30 = "And, sure, it's not exactly encouraging when I fail at something."
1007803-34 = "...Haha."
1007803-35 = "But if you don't mind me saying it, Sensei, you're looking at this all wrong."
1007803-36 = "Creating an amazing new hot spring isn't my only measure of success."
1007803-37 = "Yes, that's my goal. But that doesn't necessarily mean that failing to do so is a loss."
1007803-38 = "Sensei..."
1007803-39 = "What I really enjoy—what I love—is demolition."
1007803-40 = "Any opportunity to work with explosives, successful or not, is a win in my book."
1007803-41 = "Doesn't matter what it is. Big, small, successful, unsuccessful..."
1007803-42 = "Blasting that gets you chased, blasting that gets sabotaged, blasting that works despite sabotage..."
1007803-43 = "I see amazing sights thanks to demos I perform in unique and far-flung locales."
1007803-44 = "Even when the Prefect Team sabotages a demo I spent months planning and preparing, I still find joy in the process."
1007803-45 = "As long as there's potential for a hot spring, I'm happy! In fact, even a vague hope is good enough!"
1007803-46 = "You're looking at me like I'm crazy. Listen, what I'm trying to say is, it's not the destination, it's the journey."
1007803-47 = "From finding a worthy spot to planning, prepping, and the demo itself, I love it all! You can understand that, right?"
1007803-48 = "Oh, and speaking of worthy spots, you should know..."
1007803-49 = "...I've got my eye on the Schale building."
1007803-53 = "[ns3] \"I'm sorry, what?!\"\n[ns4] \"Excuse me?!\""
1007803-56 = "Wahahaha! The look on your face!"
1007803-57 = "Don't you see, Sensei?"
1007803-58 = "I want you to be more involved in my plans."
1007803-59 = "And I figured revealing that might keep you coming back...if only to ensure I don't make good on my threat!"
1007803-60 = "I know you all probably think I'm a pain in the neck, but that doesn't matter to me."
1007803-61 = "I've known what I wanted for a while now, even before you got here, Sensei!"
1007803-62 = "So, knowing that, I hope you'll take me more seriously in the future."
1007803-63 = "Can you understand that, Sensei? It's really important to me that you do..."
1007803-64 = "...for both of us."
1007803-65 = "Now, why don't we discuss my next idea?"
1007803-66 = "And if necessary..."
1007803-67 = "You can stay late with me!"
1007803-68 = "[s] \"...\""
1007803-70 = "[ns5] \"All right. I can do that.\"\n[ns6] \"Fine. But I refuse to be a pushover!\""
1007803-73 = "Wahaha! Good, good! I wouldn't have it any other way!"
1007803-74 = "Now, let's do some serious searching, shall we?"
1007803-75 = "We need to find the perfect spot!"
1007803-76 = "A spot that will make me, you, and everyone else happy!"
1007803-78 = "I stayed with Kasumi late into the night, poring over a map and discussing her plans."
1007803-79 = "We argued passionately over where the best locations would be."
1007803-82 = "It was nearly morning before we decided on a good spot, at which point Kasumi fell asleep right on top of the map."

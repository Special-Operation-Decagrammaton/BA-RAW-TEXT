[translation]
1001705-1 = "เชริโน่อายุเก้าขวบ?"
1001705-2 = "บล็อกที่ 3 ย่านการค้า"
1001705-3 = "มาสายนะสหาย!"
1001705-4 = "ปล่อยให้เรารอแบบนี้ ต้องจับขังในอาคารเรียนเก่าไว้สัก 100 ปีแล้ว! เอาไปจัดการซะ!"
1001705-5 = "ฮึ่ม ฮึ่ม!"
1001705-6 = "แต่วันนี้บอกว่าจะเลี้ยงพุดดิ้งให้ เราจะให้อภัยเป็นพิเศษก็ได้ ถือว่าเป็นเกียรตินะสหาย!"
1001705-7 = "ว่าแต่เราสั่งพุดดิ้งตามใจได้เลยใช่มั้ย? จะสั่งพุดดิ้งที่ใหญ่ที่สุดในร้านก็ได้ใช่หรือเปล่า?"
1001705-8 = "[s] \"แน่นอนอยู่แล้ว\""
1001705-9 = "ฮุฮุฮุ ถ้างั้นเราจะกินพุดดิ้งให้เต็มวงเงินที่สหายจะจ่ายได้เลย!"
1001705-10 = "เราพยายามอย่างหนักมาตลอด เพราะงั้นเรามีสิทธิ์ได้รับการตอบแทน!"
1001705-14 = "อ้าม ง่ำ ง่ำ..."
1001705-15 = "ฮ่า... พุดดิ้งของที่นี่อร่อยจริงๆ เลย! กินเท่าไรก็ไม่เบื่อ!"
1001705-16 = "แน่นอนว่าพุดดิ้งของโรงงานอาหารในสหภาพเรดวินเทอร์ก็อร่อย แต่ว่าของที่นี่..."
1001705-17 = "เอาละ มากินพุดดิ้งอันต่อไปกันเลยดีมั้ย?"
1001705-18 = "ง่ำ ง่ำ..."
1001705-21 = "โอ๋ คุณหนูน้อยน่ารัก มากับพ่อแม่หรือครับ?"
1001705-22 = "วะ... ว่าไงนะ?"
1001705-23 = "สหายเป็นครูต่างหาก ไม่ใช่พ่อแม่ของเรา! อย่าเข้าใจผิดสิ!"
1001705-24 = "โอ๊ะ ขอโทษด้วยครับ ผมไม่ทันคิดว่าเธอเป็นนักเรียนเลย หรือว่าเป็นนักเรียนประถม...?"
1001705-25 = "นะ... นักเรียนประถมเรอะ?"
1001705-26 = "คิดว่าเราอายุเท่าไหร่! เราคือเชริโน่ ผู้นำและประธานสภานักเรียนของสหภาพเรดวินเทอร์นะ และเราก็#nคือเชริโน่ผู้... ผู้ยิ่งใหญ่ในทุกๆ ด้าน!"
1001705-27 = "ถึงเราจะตัวเล็ก แต่ไม่เห็นออร่าแห่งความเป็นผู้ใหญ่ของเราเลยรึไง!"
1001705-28 = "ขอโทษจริงๆ ครับ! ผมนึกว่าคุณมาที่นี่เพราะอีเวนต์ที่เราจัดขึ้นน่ะครับ"
1001705-29 = "อีเวนต์งั้นรึ อีเวนต์อะไรน่ะ?"
1001705-30 = "วันนี้เป็นวันที่ร้านของเราเปิดมาครบรอบ 10 ปี เลยจัดงานอีเวนต์แจกคุกกี้ให้เด็กอายุต่ำกว่า 10 ปี"
1001705-31 = "คะ... คุกกี้เหรอ?"
1001705-35 = "(คุกกี้ของลูวาโซ บลูเป็นคุกกี้โฮมเมดคุณภาพสูงหายากมาก ถึงจะมีเงินก็หาซื้อได้ยากมากๆ... แต่นี่กลับแจกให้ฟรีๆ งั้นเหรอ?)"
1001705-36 = "(จากที่โทโมเอะเล่าให้ฟัง คุกกี้ของที่นี่หวานอร่อยไม่เป็นรองพุดดิ้งของที่นี่เลย...)"
1001705-37 = "(เราจะพลาดโอกาสนี้ไม่ได้!)"
1001705-38 = "(แต่จะให้แกล้งเป็นเด็กเพื่อให้ได้คุกกี้เนี่ยนะ เราที่เป็นความภาคภูมิใจในฐานะประธานของสหภาพ#nเรดวินเทอร์เราทำไม่ได้หรอก... งั้นเราควรทำยังไงดีล่ะ...?)"
1001705-40 = "(โอ๊ย ไม่รู้แล้วววว!)"
1001705-42 = "ฮ่าฮ่า! เราเองก็มีสิทธิ์ที่จะได้คุกกี้นั่นเหมือนกันนะ เอาคุกกี้มาให้เราสิ!"
1001705-43 = "ครับ? แต่เมื่อกี้คุณบอกว่าเป็นนักเรียนของสหภาพเรดวินเทอร์นี่นา..."
1001705-44 = "เอ่อ คือว่า... เพราะว่าเราเรียนข้ามชั้นมาน่ะ!"
1001705-45 = "เราเป็นอัจฉริยะขั้นที่ว่าตอนเริ่มหัดเดินเราก็สามารถแก้สมการอนุพันธ์ได้แล้ว การเรียนข้ามชั้นมัธยม#nปลายเป็นเรื่องหวานหมูไปเลย!"
1001705-46 = "เพราะงั้นก็เอาคุกกี้มาให้เราได้แล้ว!"
1001705-47 = "แต่ว่า..."
1001705-48 = "จะไม่ให้คุกกี้เรารึยังไง เราบอกแล้วไงว่าเราอายุเก้าขวบน่ะ!"
1001705-49 = "เอาคุกกี้มานะ คุกกี้! คุกกี้!"
1001705-52 = "...คนนั้นคือประธานเชริโน่แน่ใช่มั้ย? ทำไมถึงมางอแงอยู่ที่นี่ได้ล่ะ?"
1001705-53 = "ฉันคิดมาตลอดว่าประธานเหมือนเด็กๆ แต่ไม่คิดเลยว่าจะได้เห็นภาพที่น่าอายแบบนี้... อายจนทนมอง#nไม่ไหวแล้วละ"
1001705-54 = "ฉันอายจนไม่อยากบอกใครว่าเป็นเด็กนักเรียนของเรดวินเทอร์แล้ว"
1001705-55 = "......"
1001705-56 = "กวาดล้าง... ทุกคนต้องถูกกวาดล้างให้หมด...!"
1001705-58 = "กวาดล้างทุกคนให้หมด!"
1001705-63 = "(จากนั้นคุณครูก็ช่วยปลอบให้เชริโน่สงบและพากลับไปสหภาพเรดวินเทอร์ด้วยกัน)"

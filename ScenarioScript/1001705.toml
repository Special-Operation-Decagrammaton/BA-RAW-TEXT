[translation]
1001705-1 = "Is Cherino Nine Years Old?"
1001705-2 = "3rd St. Shopping District"
1001705-3 = "You're late, Comrade!"
1001705-4 = "You made me wait. You deserve to be locked up in the Former Institute for a hundred years! You deserve to be purged!"
1001705-5 = "Hmph!"
1001705-6 = "But since you'll be buying me pudding today, I'll forgive you this time. You should be honored, Comrade!"
1001705-7 = "By the way, is it really okay to order whatever I want? Can I order the biggest pudding they've got?"
1001705-8 = "[s] \"Absolutely.\""
1001705-9 = "Heeheehee! Then I will eat pudding until my comrade's card limit is maxed out!"
1001705-10 = "I worked hard enough, so I deserve it!"
1001705-14 = "*om nom nom*"
1001705-15 = "*sigh* ...The pudding here is really delicious! I could eat this forever!"
1001705-16 = "Of course, the pudding made at Red Winter Academy's cafeteria is also delicious, but this is special in its own way..."
1001705-17 = "Now, how about I try the next pudding?"
1001705-18 = "*om nom nom*"
1001705-21 = "My, my. What a cute little lady. Did you come to the store with your parent?"
1001705-22 = "Wh-What did you say?"
1001705-23 = "You've got it all wrong! Comrade is my teacher, not my parent!"
1001705-24 = "Oh, I'm sorry. I didn't think you were a student. Then...are you an elementary school student?"
1001705-25 = "E-Elementary school student?"
1001705-26 = "How old do you think I am?! I am Cherino, Red Winter Academy's Great Leader, Student Council president, and chairwoman of...all sorts of great things!"
1001705-27 = "I may be small in stature, but how can you not feel the maturity emanating from me?!"
1001705-28 = "I'm so sorry! I must have thought you were here for the event."
1001705-29 = "Event? What kind of event?"
1001705-30 = "Today is the tenth anniversary of our store's opening, so we're giving away cookies to children under the age of ten."
1001705-31 = "C-Cookies?"
1001705-35 = "(The L'Oiseau Bleu cookies are exclusive gourmet cookies that are difficult to get, even if you have the money... And they're giving them away for free?)"
1001705-36 = "(And according to Tomoe, they're supposed to be as sweet as the pudding here...)"
1001705-37 = "(I can't miss this opportunity!)"
1001705-38 = "(But pretending to be a child just for some cookies is an affront to my pride as the Red Winter President... What to do?)"
1001705-40 = "(Crap, I don't know!)"
1001705-42 = "Haha! In that case, then I deserve some cookies. Gimme the cookies!"
1001705-43 = "What? But just now, you said that you were a student at Red Winter Academy..."
1001705-44 = "Th-That's because...I skipped grades!"
1001705-45 = "I'm a genius who could solve differential equations before I could even walk... Skipping to high school was nothing for me!"
1001705-46 = "So, give me the cookies!"
1001705-47 = "But..."
1001705-48 = "Why aren't you giving me the cookies? I told you, I'm nine years old!"
1001705-49 = "Cookies, give me my cookies! Cookies!"
1001705-52 = "...Isn't that girl President Cherino? Why is she throwing a tantrum here?"
1001705-53 = "I knew she was childish, but I can't believe she's acting so shamelessly. It's embarrassing to watch."
1001705-54 = "She makes me embarrassed to even attend Red Winter Academy."
1001705-55 = "..."
1001705-56 = "Purged... You will be purged!"
1001705-58 = "Everyone in this store will be purged!"
1001705-63 = "After calming down the enraged Cherino, I returned to Red Winter Academy."

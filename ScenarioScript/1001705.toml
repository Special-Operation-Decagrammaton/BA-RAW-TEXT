[translation]
1001705-1 = "潔莉諾是九歲？"
1001705-2 = "奇普托斯．3丁目商店街"
1001705-3 = "真慢呀，同志！"
1001705-4 = "竟然敢讓咱等，這可是要被關在舊校舍禁閉一百年的！接受肅清吧！"
1001705-5 = "……但是！"
1001705-6 = "看在今天買布丁給咱的份上，這次就饒了你。感到光榮吧同志！"
1001705-7 = "話說回來，今天可以隨意點是嗎？就算點店裡最大的布丁也可以嗎？"
1001705-8 = "[s] 「啊，嗯，可以唷。畢竟你有乖乖吃青椒嘛。」"
1001705-9 = "哼哼哼……那麼咱就吃布丁吃到同志的卡再也刷不了為止囉！"
1001705-10 = "因為咱很努力，所以有這個資格！"
1001705-14 = "哈姆，嚼嚼……"
1001705-15 = "哈啊……這裡的布丁真好吃啊！好像吃再多都不會飽！"
1001705-16 = "當然我赤冬聯邦學園食堂所做的布丁也很好吃，就是各有各的美味……"
1001705-17 = "那麼就再吃一個……"
1001705-18 = "哈姆，嚼嚼……"
1001705-21 = "哎呀，真可愛的孩子呢。是跟家長一起來的嗎？"
1001705-22 = "你，你說什麼！？"
1001705-23 = "不，不是，同志他不是咱的家人，是咱的老師！不要搞錯了！"
1001705-24 = "哎呀呀，那真是抱歉。原來是學生啊……#n怎麼樣，上小學開不開心啊？"
1001705-25 = "小，小學！？"
1001705-26 = "你把咱當成幾歲了！#n咱可是赤冬聯邦學園的書記長兼學生會長還負責一堆重要的事情的潔莉諾大人！"
1001705-27 = "確，確實身高是矮了一點……但是你沒有感覺到咱全身都散發出大人的氣質嗎！"
1001705-28 = "哎呀原來是這樣啊，那真是抱歉了！因為今天正在舉辦活動，不小心誤會了。"
1001705-29 = "你說……活動？那是什麼意思？"
1001705-30 = "今天是本店開店十周年的紀念日，正在舉辦給十歲以下的小孩發餅乾的活動。"
1001705-31 = "餅，餅乾？"
1001705-35 = "（說到「L'Oiseau．Bleu」的餅乾，那可是手工的高級餅乾……#n　而且平常沒有販賣，是有錢也很難買到的貴重品啊……居然能免費拿到？）"
1001705-36 = "（而且，根據之前吃過的智惠所說，這是僅次於布丁的美味……）"
1001705-37 = "（可不能放過這個機會！）"
1001705-38 = "（可，可是，為了餅乾就裝成是小孩的話，作為赤冬學生會長的尊嚴就……#n　該，該怎麼辦才好……？）"
1001705-40 = "（……哎呀，不管了！）"
1001705-42 = "哈，哈哈！這麼說的話，咱也有領餅乾的資格囉。來吧，放這裡就可以了。"
1001705-43 = "咦？但是你剛才明明說自己是赤冬聯邦學園的學生會長……"
1001705-44 = "那，那是因為……咱有跳級的關係！"
1001705-45 = "咱可是別人才剛學會怎麼爬咱就已經在解微分方程式的天才──#n跳級到高中也沒什麼大不了的！"
1001705-46 = "所以說，把餅乾給咱吧！"
1001705-47 = "但是……"
1001705-48 = "為，為什麼要呆呆地站在那裡，咱不是已經說咱九歲了嗎！"
1001705-49 = "咱要餅乾，餅乾！！餅乾！！"
1001705-52 = "……在那裡的是潔莉諾會長對吧？#n為什麼在那裡耍賴？"
1001705-53 = "雖然本來就覺得他很孩子氣了，但那種羞恥的樣子……#n連在這邊看都覺得丟臉。"
1001705-54 = "就是說啊，真不想被其他人知道自己的學校有那種學生會長。"
1001705-55 = "…………"
1001705-56 = "肅清……咱要肅清……！"
1001705-58 = "咱要把這間店裡的所有人通通肅清！！！"
1001705-63 = "（之後，總算是設法安撫了到處亂射子彈的潔莉諾，把他帶回了赤冬聯邦學園）"

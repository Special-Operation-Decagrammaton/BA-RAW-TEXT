[translation]
1001705-1 = "#Title;체리노는 아홉 살?"
1001705-2 = "#place;키보토스 3거리 상점가"
1001705-3 = "3;체리노;01;늦었잖아, 콤라드!\n#3;a\n#3;hophop"
1001705-4 = "3;체리노;05;이 몸을 기다리게 하다니, 구교사에 100년은 가둬 마땅해! 숙청이라고!\n#3;em;[빠직]\n#3;stiff"
1001705-5 = "3;체리노;99;흠, 흠!"
1001705-6 = "3;체리노;01;하지만 오늘은 내게 푸딩을 사 준다고 했으니 특별히 용서해주도록 하지. 영광으로 알게나, 콤라드!"
1001705-7 = "3;체리노;03;그나저나 정말 마음대로 시켜도 되는 거지? 가게에서 가장 큰 푸딩을 시켜도 되는 거지?\n#3;hophop\n#3;em;[반짝]"
1001705-8 = "[s] \"물론이야.\""
1001705-9 = "3;체리노;99;후후후, 그렇다면 콤라드의 카드 한도가 다 될 때까지 푸딩을 먹어버려야지!\n#3;stiff"
1001705-10 = "3;체리노;01;이 몸은 충분히 노력했으니까, 그럴 자격이 있느니라!"
1001705-11 = "#all;hide"
1001705-12 = "3;체리노;99\n#3;greeting\n#3;a\n#wait;1000"
1001705-13 = "3;체리노;99\n#3;greeting\n#wait;1000"
1001705-14 = "3;체리노;99;하음, 우물우물……."
1001705-15 = "3;체리노;03;하아…… 이곳의 푸딩은 정말로 맛있구나! 몇 개라도 질리지 않고 먹을 수 있겠어!\n#3;em;[음표]"
1001705-16 = "3;체리노;02;물론 붉은겨울 학원의 급양 시설에서 만드는 푸딩도 맛있지만, 이건 또 이것 나름대로……."
1001705-17 = "3;체리노;03;자, 그럼 다음 푸딩을 먹어볼까?\n#3;em;[반짝]"
1001705-18 = "3;체리노;99;냠, 우물우물…….\n#3;greeting"
1001705-19 = "#wait;1000"
1001705-20 = "1;점원;00\n#1;ar\n#3;m5\n#wait;1000"
1001705-21 = "1;점원;02;어머나, 귀여운 아가씨네. 부모님과 함께 가게에 온 거니?\n#1;em;[반응]"
1001705-22 = "3;체리노;04;그, 그게 무슨 소리인가?\n#3;em;[?!]\n#3;shake"
1001705-23 = "3;체리노;05;콤라드는 이 몸의 부모가 아니라 선생이라고! 착각도 유분수지!\n#3;hophop"
1001705-24 = "1;점원;03;어머나, 미안해. 학교에 다니는 학생이라고는 생각하지 못해서 말이야. #n그럼…… 초등학생?\n#1;em;[재잘]"
1001705-25 = "3;체리노;04;초, 초등학생이라고?\n#3;em;[땀]"
1001705-26 = "3;체리노;05;이 몸을 대체 몇 살로 보는 건가! 이 몸은 붉은겨울 학원의 서기장이자 학생회장이자 이것저것 대단한 것은 모두 맡고 있는 체리노 님이시다!\n#3;em;[빠직]\n#3;stiff"
1001705-27 = "3;체리노;05;아무리 이 몸의 키가 작다지만, 전신에서 풍겨 나오는 어른의 향기가 느껴지지 않는 것이냐!\n#3;hophop"
1001705-28 = "1;점원;04;정말 미안! 행사에 신경을 쓰느라 정신을 쓰지 못했었나 봐.\n#1;em;[땀]\n#1;stiff"
1001705-29 = "3;체리노;02;행사라니, 무슨 행사 말이냐?\n#3;em;[?]"
1001705-30 = "1;점원;02;오늘은 우리 가게가 개점한 지 10주년이 되는 날이라, 10살 미만의 어린이를 상대로 쿠키를 나누어 주는 행사를 하고 있었거든."
1001705-31 = "3;체리노;05;쿠, 쿠키라고?\n#3;em;[!]"
1001705-32 = "3;체리노;05\n#3;m3\n#1;dl\n#wait;1000"
1001705-33 = "3;체리노;05\n#3;h"
1001705-34 = "#wait;1000"
1001705-35 = "3;체리노;02;(르와조 블뢰의 쿠키는 돈 주고도 구하기 어려운 고급 수제품…… 그걸 무료로 나누어 준다고?)\n#3;em;[///]\n#3;stiff"
1001705-36 = "3;체리노;02;(게다가 전에 이 쿠키를 먹어봤다는 토모에의 말에 따르면, 분명 푸딩에 버금가는 달콤한 맛이라고 했었지…….)"
1001705-37 = "3;체리노;01;(이 기회를 놓칠 수는 없어!)"
1001705-38 = "3;체리노;06;(하지만 쿠키 때문에 어린아이 흉내를 내자니 붉은겨울 회장으로서의 자존심이 용납할 수 없고…… 이를 어쩌지……?)\n#3;em;[땀]\n#3;stiff"
1001705-39 = "3;체리노;99;\n#3;em;[...]\n#wait;2500"
1001705-40 = "3;체리노;05;(에잇, 모르겠다!)\n#3;em;[빠직]"
1001705-41 = "#all;hide"
1001705-42 = "1;점원;01\n5;체리노;03;하하! 그렇다면 이 몸에게도 그 쿠키를 받을 자격이 충분하군. 쿠키를 이리 주게!\n#5;em;[재잘]\n#1;a\n#5;a"
1001705-43 = "1;점원;04;뭐? 하지만 아까는 분명 붉은겨울 학원에 다니는 학생이라고…….\n#1;em;[?]"
1001705-44 = "5;체리노;04;그, 그건 그러니까…… 월반을 했기 때문이다!\n#5;em;[땀]\n#5;stiff"
1001705-45 = "5;체리노;05;이 몸은 걸음마를 시작하자마자 미분 방정식을 풀어냈을 정도의 천재이니까— 고등학교 월반 정도는 아무것도 아니니라!\n#5;hophop"
1001705-46 = "5;체리노;05;그러니 쿠키를 이리 가져오너라!"
1001705-47 = "1;점원;09;하지만…….\n#1;em;[땀]\n#1;stiff"
1001705-48 = "5;체리노;01;어째서 쿠키를 주지 않는 거야? 이 몸은 아홉 살이라고 말했잖아!"
1001705-49 = "1;점원;09\n5;체리노;05;쿠키 내놔, 쿠키! 쿠키!\n#5;hophop"

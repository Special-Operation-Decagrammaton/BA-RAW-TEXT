1001705-51 = "#1;hide\n#5;hide"
1001705-52 = "#na;붉은겨울 학생 A;……저 사람, 분명 체리노 회장이죠? #n어째서 이곳에서 떼를 쓰고 있는 걸까요?"
1001705-53 = "#na;붉은겨울 학생 B;원래부터 어린아이 같은 사람이라는 생각은 하고 있었지만 저렇게 부끄러운 모습까지 보일 줄이야…… 보고 있는 우리가 더 민망할 지경이에요."
1001705-54 = "#na;붉은겨울 학생 A;붉은겨울 학원에 다닌다는 사실을 숨기고 싶을 정도네요."

[translation]
10000085-2 = "ว้ากก!"
10000085-3 = "พะ... พวกนี้เก่งมากเลยค่ะ!"
10000085-8 = "ในฐานะประธานกลุ่มการค้า ฉันใช้เงินทั้งหมดที่ฉันมีจ้างปีศาจให้มากที่สุดเท่าที่จะทำได้..."
10000085-9 = "มีปีศาจมากมายขนาดนี้... พวกเธอสู้ไหวงั้นรึ?"
10000085-10 = "เรามีคุณครูคอยสั่งการทั้งคน ไม่มีอะไรต้องเป็นห่วงหรอก เราสู้ได้แน่ค่ะ!"
10000085-11 = "นี่แหละพลังของพวกเรา!"
10000085-13 = "[ns] \"พวกเราชนะแล้ว\""
10000085-14 = "....หึหึ ไม่อยากจะเชื่อเลย"
10000085-15 = "แผนการที่ฉันคิดมาตั้งหลายปีต้องมาพังไม่เป็นท่าเพราะนักเรียนกับครูคนเดียวงั้นเหรอ?"
10000085-16 = "แบบนี้ยอมรับไม่ได้..."
10000085-18 = "ยอมไม่ได้เด็ดขาด!"
10000085-19 = "ยอมแพ้เถอะค่ะ ประธานกลุ่มการค้าเนียนเต็นมารุ แผนการที่เจ้าเล่ห์ของคุณมันจบหมดแล้วล่ะ"
10000085-20 = "หึหึ จบแล้วอย่างนั้นเรอะ? ไม่! ยังไม่จบแค่นี้หรอก!"
10000085-21 = "คิดว่าปีศาจที่อยู่ที่นี่คือทั้งหมดที่ฉันจ้างมาแล้วรึไง?"
10000085-22 = "วะ.. ว่าไงนะ?"
10000085-23 = "นี่จะบอกว่า... ยังมีปีศาจเหลืออยู่อีกงั้นเหรอคะ?!"
10000085-24 = "ฮ่ะฮ่ะฮ่า! ฉันทุ่มเงินไปเพื่องานนี้ไม่ใช่น้อยๆ เลยนะ!"
10000085-25 = "พวกปีศาจ! เกณฑ์ปีศาจที่อยู่บนถนนนี้มาให้หมด!"
10000085-27 = "แพนเดโมเนียม โซไซตี้ของฉันมีมากกว่าหนึ่งร้อยคน! คราวนี้พวกเธอไม่รอดแน่!"
10000085-29 = "เอ่อ.. ขอโทษนะบอส"
10000085-30 = "พวกที่ตกลงว่าจะมาวันนี้ จู่ๆ ก็มาบอกว่าวันนี้มาไม่ได้แล้ว..."
10000085-31 = "แล้วก็มีหลายคนที่บอกว่าไปเที่ยวเทศกาลแห่งค่ำคืนสีขาวยังไงก็สนุกกว่ามาทำงานที่นี่..."
10000085-35 = "......"
10000085-36 = "......"
10000085-37 = "ว้าว..."
10000085-38 = "โอ๊ะ..."
10000085-39 = "ฮ้าวว~ zzZ"
10000085-40 = "ฉันว่า.......?"
10000085-41 = "บอสน่าจะแพ้แล้วนะคะ..."
10000085-42 = "อืม..... เอางี้แล้วกัน! หนีกันเถอะทุกคน!"
10000085-44 = "หา?! หนีไปดื้อๆ แบบนี้เลยเหรอ?!"
10000085-45 = "หยุด~ นะ!"
10000085-47 = "........"
10000085-50 = "(ฉึ่ก!)"
10000085-51 = "เอ่อ... นี่พวกหนู... ทำเป็นลืมๆ เรื่องนี้ไปไม่ได้เหรอ?"
10000085-52 = "จะให้ทำเป็นไม่มีอะไรเกิดขึ้นได้ยังไงล่ะ! เอาหมัดเด็ดไม้ตายของชิซุโกะไปกิน!"

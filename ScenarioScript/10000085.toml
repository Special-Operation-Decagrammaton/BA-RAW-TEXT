[translation]
10000085-2 = "呃啊！"
10000085-3 = "贏，贏不了的說！"
10000085-8 = "花費會長能動用的所有資金動員的妖怪劇團居然會……！"
10000085-9 = "難道，難道還不夠嗎……？"
10000085-10 = "現在的我們有老師的指揮，要來多少都沒問題！"
10000085-11 = "這就是我們的力量！的說！"
10000085-13 = "[ns]「是我們贏了，嗎？」"
10000085-14 = "……呵呵，真受不了你們。"
10000085-15 = "我賭上了數年的計畫……竟然會因為區區的學生和老師而失敗？"
10000085-16 = "我不認同……"
10000085-18 = "絕不認同！"
10000085-19 = "請老實放棄吧，喵天丸會長。#n無論你再怎麼惋惜，一切都已經結束了。"
10000085-20 = "哼哼哼……還沒完，事情還沒結束！"
10000085-21 = "我可是用光了所有的資金。#n你以為這些妖怪劇團就是全部了嗎？"
10000085-22 = "……該不會。"
10000085-23 = "意思是說還沒結束嗎……！？"
10000085-24 = "沒錯，可別小看會長的財力啊！"
10000085-25 = "來吧！把這條街上所有的妖怪劇團全都叫來這裡！"
10000085-27 = "大量的妖怪劇團……正可謂魑魅魍魎。#n睜大眼睛看清楚了！！這次一定──"
10000085-29 = "啊──關於這點…… "
10000085-30 = "其實本來說好要來的那些孩子，後來幾乎都說「果然還是算了」……"
10000085-31 = "還說「與其在這邊工作不如去百夜之春櫻花祭玩」。#n大家都跑去玩了，所以已經沒剩多少人了的說。"
10000085-35 = "……"
10000085-36 = "……"
10000085-37 = "……"
10000085-38 = "……"
10000085-39 = "……好睏。"
10000085-40 = "呃，這樣看來……"
10000085-41 = "好像沒戲唱了呢。"
10000085-42 = "……嗯，好！解散！"
10000085-44 = "啊！？在這種時候逃走太卑鄙了吧！？"
10000085-45 = "站住～"
10000085-47 = "……"
10000085-50 = "（咻啪啪！）"
10000085-51 = "呃，那個，就是說……#n各位，這件事就當作沒發生過……怎麼樣？"
10000085-52 = "你想得美──！#n靜子的[ruby=必殺]認真[/ruby]看板娘拳──！"

[translation]
10000085-2 = "Ahhh!"
10000085-3 = "Th-They're too strong!"
10000085-8 = "I used all of the funds at my disposal as the merchant guild president to hire as many Mouryo as I could..."
10000085-9 = "...and it still wasn't enough? Even this many Mouryo...?"
10000085-10 = "We have Sensei guiding us. They don't stand a chance against us now!"
10000085-11 = "Witness the might of our combined power!"
10000085-13 = "[ns] \"Victory is ours.\""
10000085-14 = "Haha. Unbelievable."
10000085-15 = "My years and years of planning are going to fail just like that?#nBecause of some measly students and a single sensei?"
10000085-16 = "No. This can't be..."
10000085-18 = "I refuse to let it end like this!"
10000085-19 = "Just give up, Date Meowru. Your master plan ends here!"
10000085-20 = "Hahaha. You think it's over? Far from it! We're just getting started!"
10000085-21 = "Did you think these were the only Mouryo I had up my sleeve?"
10000085-22 = "Wh-What?!"
10000085-23 = "Surely you can't be serious... There are more of them?!"
10000085-24 = "Heh heh heh. That's right. I spent a fortune!"
10000085-25 = "Mouryo! Have all the others converge on this street!"
10000085-27 = "Let's see you defeat an army of over 100 Mouryo!"
10000085-29 = "Uh...about that, Boss. "
10000085-30 = "We had some members who dipped out at the last second..."
10000085-31 = "A lot of them said they'd rather enjoy the festival than work."
10000085-35 = "..."
10000085-36 = "..."
10000085-37 = "Oh..."
10000085-38 = "Dear..."
10000085-39 = "*yawn*"
10000085-40 = "I think this means..."
10000085-41 = "It's over, Boss."
10000085-42 = "All right—that's that! Everyone, run away!"
10000085-44 = "How can they run away at a time like this?!"
10000085-45 = "Stop! Get back here!"
10000085-47 = "..."
10000085-50 = "*takes eyepatch off*"
10000085-51 = "So, uh, what do you say? Can't we just let bygones be bygones and get along, friends?"
10000085-52 = "Too late for that! True Shizuko Punch!"

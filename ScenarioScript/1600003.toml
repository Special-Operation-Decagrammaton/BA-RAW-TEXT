[translation]
1600003-1 = "Miscommunication"
1600003-2 = "I-I'm surprised you came, Sensei!"
1600003-3 = "I, uh...thought you might leave someone like me on read."
1600003-4 = "The reason I called you here was...I wanted to make it up to you. You know, after last time."
1600003-5 = "I-I know you're always so busy, s-so the last thing I want is take up your time. That's why I..."
1600003-8 = "I-Instead, I got you this. It's a gift..."
1600003-9 = "[s] \"A flower pot?\""
1600003-10 = "Y-Yeah. It's a pot of weeds...that I made. I hope you like it..."
1600003-11 = "..."
1600003-12 = "N-Never mind! Wh-Why would anyone want worthless weeds as a gift?"
1600003-13 = "Wh-What was I thinking?!"
1600003-14 = "I'm sorry I'm sorry I'm sorry I'm sorry I'm sorry..."
1600003-15 = "Huh?"
1600003-16 = "You like the way it's decorated? A-Are you sure...?"
1600003-17 = "You're just curious why I grew weeds instead of flowers or something else?"
1600003-18 = "I-I was..."
1600003-19 = "H-Heh heh. Raising weeds is my hobby."
1600003-20 = "I have a sort of kinship with weeds. They remind me of myself."
1600003-21 = "They're not good for anything. They're seen as an annoying inconvenience."
1600003-22 = "They're worthless eyesores that keep springing up time and again. Those characteristics..."
1600003-23 = "...remind me of myself. So when I look at weeds, I feel like I'm not alone."
1600003-24 = "[s1] \"But they look so pretty right now.\"\n[s2] \"I think they're pretty refreshing. Don't you?\""
1600003-25 = "...P-Pardon?"
1600003-26 = "...P-Pardon?"
1600003-27 = "What are you trying to say, Sensei?"
1600003-28 = "[s3] \"I like that they're consistent.\"\n[s4] \"They're never far out of reach because of how persistent they are.\""
1600003-29 = "..."
1600003-30 = "..."
1600003-31 = "Sensei...?"
1600003-34 = "(Wh-What is Sensei talking about? That couldn't be in reference to me...)"
1600003-35 = "(I-Is Sensei...complimenting me right now?!)"
1600003-36 = "(Th-There's absolutely no way. Get your head out of the clouds, Haruka, you stupid idiot!)"
1600003-37 = "(But... But...!)"
1600003-38 = "(But we are alone and Sensei is speaking right at me. Could that mean...?!)"
1600003-39 = "(Maybe...!)"
1600003-40 = "*rustle*"
1600003-41 = "...?"
1600003-42 = "*rustle* *rustle* *wiggle*"
1600003-43 = "A worm?"
1600003-44 = "There are worms in the soil..."
1600003-45 = "..."
1600003-46 = "Un...able..."
1600003-47 = "Unforgivable. Who gave you permission...? Who said you could crawl in there?"
1600003-48 = "You have the audacity...to make my gift to Sensei your home?!"
1600003-49 = "How dare you...?"
1600003-50 = "[s] \"Haruka?\""
1600003-51 = "I hate you I hate you I hate you I hate you I hate you!"
1600003-52 = "[s] \"Haruka, calm down...\""
1600003-53 = "I'll kill you, you disgusting pests!"
1600003-55 = "*click* *BANG*"
1600003-56 = "*crack*"
1600003-57 = "*splat*"
1600003-58 = "..."
1600003-59 = "...?"
1600003-60 = "Oh."
1600003-62 = "(...)"
1600003-63 = "(Dirt and leaves splattered all over my face as the bullet shattered the flowerpot.)"
1600003-64 = "(Dirt in my eyes, I can't see anything in front of my face.)"
1600003-65 = "[s] Slowly wipe the soil and leaves from your face."
1600003-67 = "(...?)"
1600003-68 = "(When I opened my eyes again, Haruka was nowhere to be found.)"
1600003-69 = "(All that's left on the floor are fragments of the shattered flowerpot, dirt, and worms.)"

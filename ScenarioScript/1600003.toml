[translation]
1600003-1 = "錯誤的溝通"
1600003-2 = "老，老師！沒，沒想到您真的來了……！"
1600003-3 = "那，那個……總之先謝謝老師特別過來……沒想到老師願意聽我這種人的請求……"
1600003-4 = "那個……其實是……關於上次的事，我想要好好感謝老師……"
1600003-5 = "對，對不起，老師這麼忙，我不該這麼多話，浪費您的時間……"
1600003-8 = "……那個，這個是……謝禮……"
1600003-9 = "[s] 「……花盆？」"
1600003-10 = "是，是的……是我自己種的雜草……希望老師能夠收下……"
1600003-11 = "……"
1600003-12 = "真，真對不起……！仔細想想這東西一點用也沒有，根本毫無價值……！"
1600003-13 = "拿，拿這種東西當禮物真是太失禮了……！！"
1600003-14 = "對不起對不起對不起對不起對不起對不起對不起……"
1600003-15 = "……咦？"
1600003-16 = "您說打理得很漂亮，您很高興……？這，這是真的嗎……？"
1600003-17 = "……您問我為什麼是雜草，而不是花嗎？"
1600003-18 = "那，那是因為，那個……"
1600003-19 = "嘿，嘿嘿……因為……我的興趣就是養雜草……"
1600003-20 = "怎麼說呢……那個，雜草啊……有種熟悉的感覺……感覺和我很像……"
1600003-21 = "明明就沒什麼用……明明隨處可見卻總會妨礙別人，給別人帶來困擾……"
1600003-22 = "明明毫無價值卻到處晃來去……之類的……"
1600003-23 = "感，感覺就跟我很像……有種臭味相投的感覺……"
1600003-24 = "[s1] 「這樣啊。不過，它還是很漂亮唷。」\n[s2] 「雜草也不錯呢。」"
1600003-25 = "……咦？"
1600003-26 = "……咦？"
1600003-27 = "老，老師……您那是什麼意思……"
1600003-28 = "[s3] 「始終如一又永不妥協，這點很棒呢。」\n[s4] 「不會感覺它總是陪在身邊嗎。」"
1600003-29 = "……"
1600003-30 = "……"
1600003-31 = "老師……？"
1600003-34 = "（這，這是在……？難，難不成，不可能吧！可是，咦，是在說我……？）"
1600003-35 = "（老，老師現在……是在稱讚我嗎……！？）"
1600003-36 = "（不，不……這怎麼可能……！我這笨蛋又在自己一個人妄想了……！） "
1600003-37 = "（……可，可是）"
1600003-38 = "（現在這裡只有我們兩個人，說不定……）"
1600003-39 = "（說不定……！？）"
1600003-40 = "……啪唦。"
1600003-41 = "……？"
1600003-42 = "（探頭）"
1600003-43 = "……蟲……蟲子……？"
1600003-44 = "盆栽裡面……有蟲子……"
1600003-45 = "……"
1600003-46 = "……原諒。"
1600003-47 = "不可原諒……是誰允許的……？是誰說你們可以進去那裡面的……？"
1600003-48 = "居然敢擅自鑽進……我要送給老師的謝禮當中……！"
1600003-49 = "不可原諒……！"
1600003-50 = "[s] 「……遙香？」"
1600003-51 = "不可原諒不可原諒不可原諒不可原諒不可原諒不可原諒……！"
1600003-52 = "[s] 「遙香，等等……！」"
1600003-53 = "消失吧！！啊啊啊啊啊啊啊啊啊啊！！！"
1600003-55 = "（喀嚓，噹──！！！！！）"
1600003-56 = "（碰！！）"
1600003-57 = "（啪嘰！）"
1600003-58 = "……"
1600003-59 = "……？"
1600003-60 = "……～～！"
1600003-62 = "（……）"
1600003-63 = "（花盆被槍彈打碎，泥土和葉片全都噴到我的臉上）"
1600003-64 = "（視野完全被遮住，什麼都看不到）"
1600003-65 = "[s] 慢慢抹掉臉上的泥土和葉子"
1600003-67 = "（……？）"
1600003-68 = "（……再次睜開眼睛時，遙香已經完全不見人影）"
1600003-69 = "（只剩散落一地的花盆、泥土、葉子和蟲子而已）"

[translation]
1600003-1 = "สื่อสารผิด"
1600003-2 = "คะ... คุณครู! คุณครูมาจริงๆ ด้วยสินะคะ...!"
1600003-3 = "ขะ... ขอบคุณที่มานะคะ ขอบคุณที่ใจดีกับคนอย่างฉันด้วย..."
1600003-4 = "ที่ฉันส่งข้อความไป... ก็เพราะว่าคราวที่แล้วยังไม่ได้..."
1600003-5 = "อ่า... ไม่มีอะไรหรอกค่ะ คุณครูน่าจะมีเวลาไม่มาก... ฉันไม่ควรพูดเยอะ...#nงั้นจะเข้าเรื่องเลยนะคะ\n..."
1600003-8 = "ฉะ... ฉันมีของขวัญ... จะให้น่ะค่ะ..."
1600003-9 = "[s] \"ต้นไม้เหรอ?\""
1600003-10 = "ชะ... ใช่ค่ะ มันคือกระถางวัชพืช... ที่ฉันทำขึ้นเองค่ะ... ช่วยรับไว้ด้วยนะคะ"
1600003-11 = "......"
1600003-12 = "ขะ... ขอโทษค่ะ! มาคิดดูอีกทีแล้ว นี่มันเป็นของขวัญที่ไร้ค่ามากเลย...!"
1600003-13 = "ไม่ควรเรียกว่าของขวัญด้วยซ้ำ...!!"
1600003-14 = "ขอโทษนะคะ ขอโทษค่ะ ขอโทษค่ะ ขอโทษด้วยค่ะ ขอโทษนะคะ ขอโทษจริงๆ ค่ะ ขอโทษค่ะ......"
1600003-15 = "...คะ?"
1600003-16 = "ชอบที่ฉันจัดกระถางได้สวยเหรอคะ...? พะ... พูดจริงเหรอคะ...?"
1600003-17 = "...สงสัยว่าทำไมถึงเลือกวัชพืช แทนที่จะเป็นต้นไม้หรือดอกไม้อื่นน่ะเหรอคะ?"
1600003-18 = "คะ... คือว่า..."
1600003-19 = "แหะๆๆ ... งานอดิเรกของฉัน... คือการเลี้ยงวัชพืชค่ะ..."
1600003-20 = "วัชพืชพวกนี้... ทำให้ฉันนึกถึงตัวเอง..."
1600003-21 = "ทั้งไม่มีประโยชน์... และรบกวนคนอื่นอีกด้วย..."
1600003-22 = "เหมือนคนไร้ค่าที่ชอบโผล่หน้ามาให้เห็น... แบบนั้นน่ะค่ะ..."
1600003-23 = "ฉะ... ฉันว่ามันเหมือนตัวฉัน... พอได้เห็นพวกมัน... ฉันก็เลยไม่รู้สึกว่า... อยู่ตัวคนเดียวน่ะค่ะ..."
1600003-24 = "[s1] \"แต่ตอนนี้มันสวยมากเลยนะ\"\n[s2] \"มันก็ช่วยเพิ่มความสดชื่นให้นะ ว่าไหม?\""
1600003-25 = "คะ... คะ?"
1600003-26 = "คะ... คะ?"
1600003-27 = "คะ... คุณครู... พูดอะไรแบบนี้..."
1600003-28 = "[s3] \"ครูชอบความมั่นคงของพืชพวกนี้นะ\"\n[s4] \"ดีซะอีกที่พืชพวกนี้อยู่ข้างๆ เราตลอดเวลา\""
1600003-29 = "......"
1600003-30 = "......"
1600003-31 = "คุณครู...?"
1600003-34 = "(พะ... พูดอะไรของเขานะ...? ระ... หรือว่าจะหมายถึงเรา...?)"
1600003-35 = "(มะ... เมื่อกี้คุณครู... ชมเรางั้นเหรอ...?)"
1600003-36 = "(มะ... ไม่ใช่หรอกน่า ยัยคนโง่เอ๊ย...! คิดไปเองคนเดียวอีกแล้ว...!)"
1600003-37 = "(แต่ว่า... แต่ว่า...)"
1600003-38 = "(แต่คุณครูกำลังพูดต่อหน้าเรานี่... อย่างนั้นก็แสดงว่า...!)"
1600003-39 = "(อาจจะชมเราจริงๆ ก็ได้...!)"
1600003-40 = "กรอบแกรบ..."
1600003-41 = "......?"
1600003-42 = "กรอบแกรบๆ... กระดึ้บ... กระดึ้บ..."
1600003-43 = "นะ... หนอน...?"
1600003-44 = "มีหนอนออกมาจาก... ดินในกระถาง..."
1600003-45 = "......"
1600003-46 = "ยอม... ให้... ไม่... ได้..."
1600003-47 = "ยอมให้ไม่ได้... ใครอนุญาตให้เข้าไป...? จะเข้าไปอยู่ในนั้นไม่ได้นะคะ...!"
1600003-48 = "นั่นมันของขวัญที่ฉันให้อาจารย์นะ... ไปยึดที่แบบนั้นได้ไง...!"
1600003-49 = "ยกโทษให้ไม่ได้..."
1600003-50 = "[s] \"ฮารุกะ?\""
1600003-51 = "ยกโทษให้ไม่ได้ ยกโทษให้ไม่ได้ ไม่ยกโทษให้เด็ดขาด ยกโทษให้ไม่ได้ ยกโทษให้ไม่ได้#nไม่ยกโทษให้เด็ดขาด...!"
1600003-52 = "[s] \"ฮารุกะ... ใจเย็นก่อน\""
1600003-53 = "จงตายเสียเถอะ! เจ้าพวกหนอนบ้า!!"
1600003-55 = "กริ๊ก! ปั้งงง!!"
1600003-56 = "แกร๊งง!!"
1600003-57 = "แผละ!"
1600003-58 = "......"
1600003-59 = "......?"
1600003-60 = "เฮือก..."
1600003-62 = "(...)"
1600003-63 = "(หน้าเต็มไปด้วยใบหญ้าและดินจากกระถางต้นไม้ที่ถูกยิง)"
1600003-64 = "(โดนดินปิดตาจนแทบจะมองไม่เห็นอะไรเลย)"
1600003-65 = "[s] ค่อยๆ เขี่ยดินและใบหญ้าออกจากหน้า"
1600003-67 = "(...?)"
1600003-68 = "(...พอลืมตาขึ้นมาก็ไม่เห็นฮารุกะแล้ว)"
1600003-69 = "(สิ่งที่หลงเหลืออยู่มีแค่เศษกระถางที่แตก ดิน และหนอนที่ถูกยิงเท่านั้น)"

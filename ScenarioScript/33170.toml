[translation]
33170-1 = "第17話;憎恨的真相"
33170-3 = "讓開，搞不清楚現在的狀況嗎！？"
33170-4 = "這可是緊急事態唷！？"
33170-5 = "可，可是，我……！"
33170-7 = "滾開！！"
33170-12 = "……不，不要！"
33170-13 = "我，我是笨蛋，所以完全不知道發生了什麼事……"
33170-14 = "但是，這是不對的！這種事絕對不行！！"
33170-19 = "不聽勸的傢伙，那樣的話……"
33170-20 = "等，等等。這孩子，好像在哪裡……"
33170-21 = "仔細看的話，感覺好像……"
33170-25 = "[ns]「小春是補課部的，我的學生唷。」"
33170-27 = "老，老師！？"
33170-28 = "……"
33170-30 = "夏萊的……！？"
33170-31 = "怎麼會，應該處於意識不明的危急情況才對……？"
33170-32 = "老，老師，為什麼會來這裡……"
33170-33 = "[s]「拜託了，首先請停止暴力。」"
33170-34 = "那，那是……"
33170-35 = "……"
33170-36 = "回，回去吧。那個老師的表情，絕對不妙……"
33170-37 = "……啊啊，走吧。"
33170-42 = "老，老師……老師……"
33170-43 = "[s]「小春，很帥唷。不愧是實現正義部的菁英。」"
33170-44 = "老師……！"
33170-49 = "……"
33170-50 = "老師……"
33170-51 = "[s]「彌香，還好嗎？」"
33170-52 = "那個……嗯。"
33170-53 = "該怎麼說呢，好久不見……了呢？"
33170-54 = "[s]「是啊。彌香……彌香，為什麼剛才……」"
33170-55 = "咦，啊，那是……"
33170-56 = "……為什麼呢。雖然我知道是完美的機會，現在重新振作的話……"
33170-57 = "現在也，很討厭的……為什麼呢……"
33170-58 = "我也，不太清楚呢……"
33170-59 = "啊咧，等，等一下……"
33170-60 = "我……"
33170-62 = "彌香……"
33170-63 = "那股憎恨……妳率先面對的，那股憎惡是……"
33170-64 = "妳，為什麼……"
33170-66 = "彌香同學，差不多該告訴我了吧？「和奧利斯和解」……其中的意圖。"
33170-67 = "咦，意圖？"
33170-68 = "有什麼樣的政治上的利益……渚在這麼問唷。"
33170-69 = "也沒有政治上的利益……因為，本來就是同一個三一吧。"
33170-70 = "直接去自治區說「好好相處吧？」這樣看看嘛！然後，大家一起舉辦茶會！"
33170-71 = "……"
33170-72 = "……"
33170-73 = "……咦，這什麼氣氛。我說了什麼奇怪的話嗎？"
33170-74 = "不覺得很好嗎？啊啊，我是主席的話就會馬上行動的說。"
33170-75 = "彌香同學，妳真的是……嘛這個先暫且不提。也不知道對方會不會同意吧。自治區的位置也還沒證實。"
33170-76 = "而且彌香，假設妳達成了打算做什麼？吸收了奧利斯變得更為強大的三一……打算引起什麼大戰爭嗎？"
33170-77 = "嗯──，嘛也沒有打算做什麼……不過那也不錯呢？那種意見也很多嘛。"
33170-78 = "而且變成那樣的話，也可以想辦法解決格黑娜也說不定？"
33170-79 = "……"
33170-80 = "……怎麼啦，聖亞醬。那副表情。"
33170-82 = "妳很任性。沒什麼在思考又衝動、貪心，有時自我傷害的……"
33170-83 = "這樣的妳，我也許不喜歡也說不定。"
33170-86 = "……聖亞醬就在這裡。"
33170-87 = "只要能安靜地把她送進醫院的話……"
33170-88 = "就是這樣，交給你們囉。"
33170-92 = "關於這個，交給「小隊」處理。"
33170-93 = "……小隊？"
33170-94 = "是的，您知曉吧？"
33170-99 = "（聖亞醬，死了……？）"
33170-100 = "（……為什麼？怎麼會？）"
33170-101 = "（發生了什麼，咦，為什麼變成這樣……？）"
33170-102 = "（為什麼？是笨蛋嗎？因為，我……）"
33170-103 = "（啊咧，我……）"
33170-104 = "（我，為什麼指示襲擊聖亞醬來著……？）"
33170-105 = "（聖亞醬不在的話，我……）"
33170-106 = "（……）"
33170-107 = "（……啊啊，對了。我，為了當上主席……）"
33170-108 = "（沒錯，因為討厭格黑娜。討厭的東西就是討厭。渚醬也在做條約什麼的奇怪的事）"
33170-109 = "（為什麼要做那種事呢。還是一樣是個小笨蛋。和格黑娜的和平條約什麼的，絕對。絕對不允許）"
33170-110 = "（……聖亞醬。明明說了看得見未來什麼的，為什麼連自己也沒辦法保護呢？那點程度看得見吧？）"
33170-111 = "（再說了身體那麼的虛弱還加入茶會，總是對我說「好好思考吧」這樣碎碎唸……之前也是，用那種眼神……）"
33170-112 = "（所以，所以……）"
33170-113 = "（為了這樣，還有為了一掃格黑娜，這種程度的犧牲也是沒辦法的）"
33170-114 = "（明明，是那樣的……）"
33170-116 = "我，我……"
33170-117 = "……"
33170-118 = "對不起，聖亞醬…………"
33170-119 = "為什麼，變成這樣了呢……"
33170-120 = "對不起……對不起……"
33170-121 = "這麼的笨，對不起……"
33170-122 = "[s]「彌香……」"
33170-123 = "老師……我，想見聖亞醬……"
33170-124 = "渚醬也是，想再見一次……"
33170-125 = "雖然這樣的我，或許已經做不到了……"
33170-128 = "……"
33170-129 = "彌香，妳……"
33170-130 = "是嗎，在尋求理由嗎……"
33170-131 = "對於討厭的事物需要某個確實的東西，試圖在某處合理化……"
33170-132 = "就那樣結合了錯誤……還是一樣，是個笨蛋……"
33170-134 = "……"
33170-135 = "我自認為，理解了妳。肯定不只如此……妳所擁有的事物，稚氣的感情，思考的事，對於這個狀況……知曉這些的努力，我都怠慢了。"
33170-136 = "……這樣啊。"
33170-137 = "我還，對妳一無所知……"
33170-138 = "……然而，回過神來時妳已經和我一樣。被置於錯誤的故事之中了嗎。"
33170-139 = "殺人、死、背叛、抗爭……"
33170-140 = "讓妳這樣的少女置身其中，未免也太殘酷了。本來應該獲得原諒的任性，讓妳……"
33170-141 = "……彌香。"
33170-142 = "妳也，一直……"
33170-143 = "……總之我，原諒妳吧。"
33170-144 = "接著，我也必須向妳乞求原諒也說不定。"
33170-145 = "我們再一次相互傳達給對方，然後……搞不好那個前方……"
33170-147 = "[ns]「……交給我吧，彌香。」"
33170-153 = "是，是老師……"
33170-154 = "老師……"
33170-155 = "老師……！？"
33170-156 = "[s]「大家，抱歉久等了。」"
33170-160 = "老師……"
33170-161 = "老師……！"
33170-162 = "……"
33170-164 = "[ns]「謝謝妳們待在這裡，等我回來。」"
33170-166 = "[ns]「接下來，就交給我吧。」"
33170-169 = "下一話;毫無迷惘"

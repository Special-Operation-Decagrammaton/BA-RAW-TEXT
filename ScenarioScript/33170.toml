[translation]
33170-1 = "Episode 17;The Embodiment of Hate"
33170-3 = "Stand down, First-year. Can't you see what's going on?"
33170-4 = "We're now under martial law and at the brink of war!"
33170-5 = "I-I know that, but...!"
33170-7 = "Move!"
33170-12 = "I won't!"
33170-13 = "I-I may be kinda slow, and don't fully understand what's happening..."
33170-14 = "...but I know this isn't right! What you're doing is wrong!"
33170-19 = "Fine. If you won't move, then..."
33170-20 = "W-Wait. I've seen this girl somewhere before."
33170-21 = "She does look familiar..."
33170-25 = "[ns] \"Koharu belongs to the Make-Up Work Club. She's one of my students.\""
33170-27 = "S-Sensei?!"
33170-28 = "..."
33170-30 = "Th-The advisor from Schale?!"
33170-31 = "That can't be... We were told they were unconscious and in critical condition."
33170-32 = "What are they doing here...?"
33170-33 = "[s] \"That's enough. Please lay down your weapons.\""
33170-34 = "B-But..."
33170-35 = "We've come so far..."
33170-36 = "I don't think Sensei is playing around..."
33170-37 = "L-Let's get out of here."
33170-42 = "S-Sensei... Is it really you?"
33170-43 = "[s] \"I'm proud of how you handled that. Like a real elite.\""
33170-44 = "Sensei!"
33170-49 = "..."
33170-50 = "It's really you..."
33170-51 = "[s] \"Will you be all right, Mika?\""
33170-52 = "Um... Yeah."
33170-53 = "So, uh...long time no see?"
33170-54 = "[s] \"Yeah. Mika, why didn't you go along with them?\""
33170-55 = "Oh, that? Well..."
33170-56 = "I wonder. I suppose it was the perfect opportunity to rid myself of Gehenna once and for all... "
33170-57 = "...but I don't really have an answer. I don't know why. "
33170-58 = "Even I don't really get it..."
33170-59 = "Wait a second..."
33170-60 = "Am I...?"
33170-62 = "Mika..."
33170-63 = "I thought your hatred would move you to capitalize on the opportunity. "
33170-64 = "Why would you relent now...? "
33170-66 = "I don't understand, Mika. What are your intentions for wanting to reconcile with Arius?"
33170-67 = "Huh? My intentions..."
33170-68 = "Nagisa is asking what the political benefit is to doing so."
33170-69 = "That's not what I was thinking at all. They used to be one of Trinity's factions, right? Sure, it was a long time ago..."
33170-70 = "...but what if we went to their district and told them we want to be friends? Then we could invite them over for tea and it would be like the good old days!"
33170-71 = "..."
33170-72 = "..."
33170-73 = "What's with the awkward silence? Is there something on my face?"
33170-74 = "I think it's a pretty good plan! That's what I would do if I were the host! "
33170-75 = "I swear. Have you considered how they would respond at all? Not to mention that no one knows where Arius' district is in present day."
33170-76 = "I'm also concerned about your intentions. Trinity would only become more powerful if Arius agreed, which could incite a war. Is that what you want?"
33170-77 = "I hadn't really thought about it, but that could be fun! "
33170-78 = "Maybe we could finally wipe out Gehenna. Isn't that what everyone wants?"
33170-79 = "..."
33170-80 = "What's wrong, Seia? Why are you looking at me like that?"
33170-82 = "You always were self-centered. You're impulsive, thoughtless, and self-destructive on top of that."
33170-83 = "Maybe that's why I never cared for you."
33170-86 = "Here. Seia's just through here. "
33170-87 = "Now I'll be in line to become host once she takes her little extended vacation to the hospital. "
33170-88 = "This is going to be so much fun!"
33170-92 = "Squad will handle the infiltration from here."
33170-93 = "Hmm? Squad?"
33170-94 = "Just so you know."
33170-99 = "(Seia's...dead?)"
33170-100 = "(But how...? Why?) "
33170-101 = "(How could this have happened? This isn't how things were supposed to go.)"
33170-102 = "(Is this a joke? I just wanted to...)"
33170-103 = "(Wait. Why did I do that?)"
33170-104 = "(Why did I order an attack on Seia?)"
33170-105 = "(Why did I want her out of the way?)"
33170-106 = "(...)"
33170-107 = "(Oh, right. I wanted to be the host.) "
33170-108 = "(Of course. Because I hate Gehenna so much, and Nagi is trying to force that treaty down our throats.)"
33170-109 = "(Why would she do something like that? It's so stupid! A peace treaty with Gehenna? As if that'll ever happen. I won't let it.)"
33170-110 = "(Seia said she could see the future. So why didn't she see that one coming, huh? Why didn't she protect herself?)"
33170-111 = "(She was too weak to be in the Tea Party to begin with. And the way she would look at me sometimes...)"
33170-112 = "(So, I mean, when you think about it...)"
33170-113 = "(...this was inevitable. This was the sacrifice that had to happen to get rid of Gehenna.)"
33170-114 = "(Yeah. That must have been it.)"
33170-116 = "I-I just..."
33170-117 = "..."
33170-118 = "I'm sorry, Seia. I didn't mean to..."
33170-119 = "I never meant for things to turn out like this."
33170-120 = "I'm sorry... I'm sorry!"
33170-121 = "I'm sorry for being such an idiot..."
33170-122 = "[s] \"Mika...\""
33170-123 = "Sensei... I want to see Seia..."
33170-124 = "I want to see Nagi again..."
33170-125 = "If only I could..."
33170-128 = "..."
33170-129 = "Now I understand, Mika."
33170-130 = "You were only trying to rationalize what happened."
33170-131 = "You were trying to protect your heart and conscience."
33170-132 = "And, as usual, you made mistakes and got carried away."
33170-134 = "..."
33170-135 = "I thought I had you all figured out. I thought I understood what kind of person you were and what kind of thoughts you have..."
33170-136 = "...but I was mistaken. "
33170-137 = "We both still have a lot to learn, then."
33170-138 = "You found yourself at the wrong end of a twisted fairy tale before you could even realize it, just like me."
33170-139 = "Murder, death, betrayal, strife..."
33170-140 = "It was too grim of a story for a girl like you to be involved with."
33170-141 = "Mika..."
33170-142 = "You've been suffering for quite some time..."
33170-143 = "...so I'll forgive you."
33170-144 = "Maybe I should be asking for your forgiveness as well."
33170-145 = "We'll have a lot of catching up to do in the future."
33170-147 = "[ns] \"Sure. I can make that happen.\""
33170-153 = "I-It's Sensei..."
33170-154 = "Impossible..."
33170-155 = "Sensei is back...?"
33170-156 = "[s] \"Thank you all for coming.\""
33170-160 = "Sensei..."
33170-161 = "Welcome back."
33170-162 = "Y-Yeah!"
33170-164 = "[ns] \"Thanks for waiting.\""
33170-166 = "[ns] \"I'll take it from here.\""
33170-169 = "Next Episode;Without a Moment's Hesitation"

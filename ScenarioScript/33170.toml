[translation]
33170-1 = "第17話;憎しみの正体"
33170-3 = "どきなさい、今の状況が分からないの！？"
33170-4 = "緊急の事態なのよ！？"
33170-5 = "で、でも、私は……！"
33170-7 = "どけっ！！"
33170-12 = "……い、嫌っ！"
33170-13 = "わ、私はバカだから、何がどうなってるのか全然分からないけど……"
33170-14 = "でも、これは違う！こんなの絶対にダメ！！"
33170-19 = "聞かないやつだ、それなら……"
33170-20 = "ま、待って。この子、どこかで……。"
33170-21 = "よく見ると、何だか見覚えが……"
33170-25 = "[ns] \"コハルは補習授業部の、私の生徒だよ。\""
33170-27 = "せ、先生っ！？"
33170-28 = "……。"
33170-30 = "シャーレの……！？"
33170-31 = "そんな、意識不明の重体だったはず……？"
33170-32 = "せ、先生が、どうしてここに……。"
33170-33 = "[s] \"お願いだから、まず暴力はやめてほしい。\""
33170-34 = "そ、それは……。"
33170-35 = "……。"
33170-36 = "か、帰ろう。あの先生の表情、絶対にマズいって……。"
33170-37 = "……ああ、行こう。"
33170-42 = "せ、先生……先生……。"
33170-43 = "[s] \"コハル、カッコよかったよ。流石は正義実現委員会のエリート。\""
33170-44 = "先生……！"
33170-49 = "……。"
33170-50 = "先生……。"
33170-51 = "[s] \"ミカ、大丈夫？\""
33170-52 = "えっと……うん。"
33170-53 = "何て言うか、久しぶり……だね？"
33170-54 = "[s] \"そうだね。ミカ……ミカは、どうしてさっき……\""
33170-55 = "え、あー、それは……。"
33170-56 = "……何でだろ。絶好のチャンスだし、今立ち上がればって分かってはいるんだけど……。"
33170-57 = "今でも嫌い、なんだけど……どうしてだろ……。"
33170-58 = "私にも、よく分かんないな……。"
33170-59 = "あれ、ちょ、ちょっと待って……"
33170-60 = "私……。"
33170-62 = "ミカ……"
33170-63 = "その憎しみは……君が先陣に立っていた、その憎悪は……。"
33170-64 = "君は、どうして……。"
33170-66 = "ミカさん、そろそろ聞かせていただけませんか？「アリウスと和解する」……そこにある意図を。"
33170-67 = "え、意図？"
33170-68 = "どういった政治的な利益があるのか……と、ナギサは聞いているんだよ。"
33170-69 = "別に政治的な利益っていうか……だって元々は、同じトリニティでしょ。"
33170-70 = "直接自治区に行ってさ、「仲良くしよ？」って言ってみようよ！ほら、みんなでお茶会でも開いてさ！"
33170-71 = "……。"
33170-72 = "……。"
33170-73 = "……え、何この空気。私何か変なこと言った？"
33170-74 = "良いと思わない？あーあ、私がホストだったらすぐにでも動いたのに。"
33170-75 = "ミカさん、あなたは本当に……まあそれは一先ず良いとして。あちらが応じるかは分からないでしょう。自治区の場所も判明していないことですし。"
33170-76 = "それにミカ、君はもしそれが達成できたとしてどうするつもりだい？アリウスを吸収してより強大になったトリニティ……何か大きな戦いを起こそうとでも？"
33170-77 = "んー、まあどうするも何も無かったけど……それも良いかもね？そういう声もたくさんあるし。"
33170-78 = "それにそうなったら、ゲヘナをどうにかできちゃうかもしれないし？"
33170-79 = "……。"
33170-80 = "……なぁに、セイアちゃん。そのお顔は。"
33170-82 = "君は自分勝手だ。あんまり何も考えていない上に衝動的で、欲張りで、時に自傷的な……"
33170-83 = "そんな君のことが、私は好きではなかったかもしれない。"
33170-86 = "……セイアちゃんはここにいる。"
33170-87 = "静かに、病院にでも送ってくれれば……。"
33170-88 = "そういうことだから、よろしくね。"
33170-92 = "これについては、「スクワッド」に任せます。"
33170-93 = "……スクワッド？"
33170-94 = "はい、ご存じでしょう？"
33170-99 = "（セイアちゃんが、死んだ……？）"
33170-100 = "（……何で？どうして？）"
33170-101 = "（何がどうなって、え、何でそんなことに……？）"
33170-102 = "（どうして？バカなの？だって、私は……）"
33170-103 = "（あれ、私……）"
33170-104 = "（私、どうしてセイアちゃんを襲撃してって指示したんだっけ……？）"
33170-105 = "（セイアちゃんがいなくなったら、私……）"
33170-106 = "（……）"
33170-107 = "（……ああ、そうだ。私は、ホストになろうとして……）"
33170-108 = "（そう、ゲヘナのことが嫌いだったから。嫌いなものは嫌いだったから。ナギちゃんも条約とか、何か変なことをしようとしてるし）"
33170-109 = "（何でそんなことするんだろ。相変わらずおバカさんなんだから。ゲヘナとの平和条約だなんて、絶対。絶対に許せない）"
33170-110 = "（……セイアちゃん。未来が見えるとか何とか言ってたのに、どうして自分のことも守れなかったの？それくらい見えてたんでしょ？）"
33170-111 = "（そもそもあんなに身体も弱いのにティーパーティーに入って、いつもいつも私に「しっかり考えたまえ」って小言ばっかりで……この間だって、あんな目で私のことを……）"
33170-112 = "（だから、だから……）"
33170-113 = "（こうしているために、そしてゲヘナを一掃するために、これくらいの犠牲は仕方のないことだった）"
33170-114 = "（そうだった、はずなのに……）"
33170-116 = "わ、私は……。"
33170-117 = "……。"
33170-118 = "ごめん、セイアちゃん…………。"
33170-119 = "どうして、こうなったのかな……。"
33170-120 = "ごめん……ごめんね……。"
33170-121 = "こんなにバカで、ごめん……。"
33170-122 = "[s] \"ミカ……。\""
33170-123 = "先生……私、セイアちゃんに会いたい……。"
33170-124 = "ナギちゃんにも、もう一度会いたい……。"
33170-125 = "こんな私じゃ、もうダメかもしれないけど……。"
33170-128 = "……。"
33170-129 = "ミカ、君は……。"
33170-130 = "そうか、理由を求めていたのか……。"
33170-131 = "嫌いであることに何かしっかりしたものが必要なのではと、どこかで合理化しようと……。"
33170-132 = "そうして間違いが合わさって……相変わらず、馬鹿なことを……。"
33170-134 = "……。"
33170-135 = "私は君のことを、分かったつもりでいた。きっとまだこれだけじゃない……君の抱えていたものを、幼気な感情を、考えていたことを、その状況を……それらを知ろうとする努力を、私は怠っていた。"
33170-136 = "……そうか。"
33170-137 = "私はまだ、君のことをあまりにも知らない……。"
33170-138 = "……そして、気が付いた時には君も私と同じように。間違った物語の真ん中に置かれていたのか。"
33170-139 = "殺人、死、裏切り、抗争……。"
33170-140 = "君のような少女が身を置くには、あまりにも残酷な話だった。本来であれば許されるべき我儘が、君を……"
33170-141 = "……ミカ。"
33170-142 = "君も、ずっと……。"
33170-143 = "……とにかく私は、君を許そう。"
33170-144 = "そして私もまた、君に許しを乞わなくてはならないのかもしれない。"
33170-145 = "私たちはもう一度お互いに伝えあって、それで……もしかしたらその先は……"
33170-147 = "[ns] \"……任せて、ミカ。\""
33170-153 = "せ、先生だ……。"
33170-154 = "先生……。"
33170-155 = "先生……！？"
33170-156 = "[s] \"みんな、待たせてごめん。\""
33170-160 = "先生……。"
33170-161 = "先生……！"
33170-162 = "……っ。"
33170-164 = "[ns] \"ここにいてくれて、待っててくれてありがとう。\""
33170-166 = "[ns] \"ここから先は、私に任せて。\""
33170-169 = "次回;迷わずに"

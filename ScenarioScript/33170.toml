[translation]
33170-1 = "ตอนที่ 17;ตัวตนของความเกลียดชัง"
33170-3 = "หลีกไปซะ เด็กปีหนึ่งไม่รู้สถานการณ์ตอนนี้รึยังไง?"
33170-4 = "ตอนนี้กำลังจะประกาศกฎอัยการศึกและเริ่มสงครามนะ!!"
33170-5 = "อา... คือ... ฉะ...ฉัน... คือว่า..."
33170-7 = "หลีกไป!!"
33170-12 = "มะ...ไม่นะ!!"
33170-13 = "ฉะ...ฉันหัวไม่ค่อยดีเลยไม่รู้ว่าตอนนี้เกิดอะไรขึ้น แต่ว่า..."
33170-14 = "แบบนี้ไม่ได้นะ! เรื่องที่ไม่ได้ก็คือไม่ได้!"
33170-19 = "ถ้าไม่หลีกไปละก็..."
33170-20 = "ดะ...เดี๋ยวก่อน ... เหมือนฉันจะเคยเห็นเด็กคนนี้จากที่ไหนมาก่อนนะ..."
33170-21 = "ทะ... ที่ไหนกันล่ะ? อะไรกัน..."
33170-25 = "[ns] \"โคฮารุเป็นเด็กในชมรมชั้นเรียนเสริมที่ครูดูแลอยู่นะ\""
33170-27 = "คะ... คุณครู?!"
33170-28 = "..."
33170-30 = "คุณครูจากชาเล่ต์เหรอ?!"
33170-31 = "มะ...ไม่ได้บาดเจ็บหนักจนไม่ได้สติหรอกเหรอ...?"
33170-32 = "คุณครูงั้นเหรอ..."
33170-33 = "[s] \"ครูขอร้องล่ะ เลิกใช้ความรุนแรงเถอะ\""
33170-34 = "ระ... เรื่องนั้นน่ะ..."
33170-35 = "ตะ...ตอนนี้..."
33170-36 = "กลับกันเถอะ ดูสีหน้าของคุณครูสิ... แบบนี้ไม่ดีแน่"
33170-37 = "ปะ...ไปกันเถอะ"
33170-42 = "คะ... คุณครู... คุณครู..."
33170-43 = "[s] \"เท่มากเลยโคฮารุ สมกับเป็นอีลีทของชมรมทวงความยุติธรรมเลยนะ\""
33170-44 = "คุณครู..."
33170-49 = "..."
33170-50 = "คุณ...ครู..."
33170-51 = "[s] \"เป็นอะไรรึเปล่า มิกะ?\""
33170-52 = "เอ่อ... คือ..."
33170-53 = "คือว่า... ไม่เจอกันนานเลยนะ อื้อ"
33170-54 = "[s] \"มิกะ เพราะอะไรกัน...?\""
33170-55 = "เอ๊ะ? ระ... เรื่องนั้นน่ะ..."
33170-56 = "ใช่แล้ว พะ...เพราะฉันเกลียดพวกเกเฮนน่า... และตอนนี้เป็นโอกาสทอง... "
33170-57 = "แต่ว่า... ทำไมฉันถึงทำแบบนั้น... "
33170-58 = "ฉะ...ฉันก็ไม่รู้เหมือนกัน ฮ่าฮ่า... ทำไมกันนะ?"
33170-59 = "เอ๊ะ... เอ๋? ดะ... เดี๋ยวก่อน รอเดี๋ยวนะ"
33170-60 = "ฉัน..."
33170-62 = "มิกะ..."
33170-63 = "ฉันคิดว่าถ้าเป็นคุณคงจะเปิดเผยความแค้นของตนเองได้มากกว่าคนอื่นซะอีก... "
33170-64 = "... ทำไมคุณถึงได้.... "
33170-66 = "คุณมิกะ ให้คืนดีกับทางโรงเรียนอาเรียสงั้นเหรอ มีจุดประสงค์อะไรกันแน่คะ?"
33170-67 = "หืม? จุดประสงค์งั้นเหรอ..."
33170-68 = "... นางิสะคงอยากถามว่ามีจุดประสงค์ทางการเมืองอะไรรึเปล่าน่ะค่ะ มิกะ..."
33170-69 = "ที่จริงแล้วที่นั่นเอง... เดิมทีก็เคยเป็นส่วนหนึ่งของสถาบันทรีนิตี้ใช่มั้ยล่ะ อื้อ ถึงจะเป็นเรื่องเล่าเก่าแก่ก็เถอะ"
33170-70 = "เอาเป็นว่าฉันจะไปที่เขตปกครองตนเองอาเรียสแล้วจะขอคืนดีเอง! เหมือนที่ทางสภาน้ำชาในอดีตเคยทำ!"
33170-71 = "..."
33170-72 = "..."
33170-73 = "เอ๊ะ บรรยากาศแบบนี้... ฉันรู้สึกเหมือนเป็นคนโง่คนเดียวเลยนะ...?"
33170-74 = "แผนนี้ไม่เลวเลยไม่ใช่รึไง? ถ้าฉันเป็นโฮสต์ละก็คงจะลงมือทำเดี๋ยวนี้เลย! "
33170-75 = "... ก่อนอื่นก็ต้องพิจารณาว่าฝ่ายนั้นจะตอบรับด้วยรึเปล่านะคะ คุณมิกะ อีกอย่างเราไม่รู้ตำแหน่งของเขตปกครองตนเองอาเรียสด้วยค่ะ"
33170-76 = "และอีกอย่างนะคะ มิกะ... ฉันเริ่มสงสัยเจตนาของคุณขึ้นมาแล้วค่ะ เมื่อรวมอาเรียสเข้ามา ทรีนิตี้ก็จะแข็งแกร่งขึ้น คุณคิดจะใช้ทรีนิตี้ทำอะไรงั้นเหรอคะ? หรือว่าคิดจะทำสงคราม?"
33170-77 = "หืม? ฮ่าฮ่าฮ่า! แบบนั้นก็ดูน่าสนุกดีนะ "
33170-78 = "ใช้โอกาสนี้กำจัดพวกเกเฮนน่าไปเลยดีมั้ย? เห็นพวกนั้นทีไรอารมณ์เสียทุกที..."
33170-79 = "..."
33170-80 = "อะไรล่ะ เซอาจัง สีหน้าแบบนั้นน่ะ..."
33170-82 = "คุณน่ะ... เป็นคนที่ทำลายตัวเองด้วยความโลภ ความใจร้อน และทำตามอำเภอใจโดยที่ไม่คิดอะไรสินะคะ"
33170-83 = "บางทีฉันอาจจะไม่ชอบที่คุณเป็นแบบนี้ก็ได้ค่ะ"
33170-86 = "ที่นี่คือที่ที่เซอาจังอยู่ "
33170-87 = "ฉันจะส่งเซอาจังไปพักฟื้นที่โรงพยาบาลระยะยาว และจะรับตำแหน่งโฮสต์ต่อเอง อื้อ"
33170-88 = "เพราะงั้น... ฝากด้วยนะ"
33170-92 = "ถ้าแผนการลักลอบเข้าแบบนี้ละก็ให้ทาง <สควอด> จัดการได้เลย"
33170-93 = "หืม? สควอดเหรอ?"
33170-94 = "รู้แค่นั้นก็พอแล้ว"
33170-99 = "(หืม...? เซอาจัง... ตาย...แล้วเหรอ?)"
33170-100 = "(เอ๊ะ? ได้ยังไงกัน...?) "
33170-101 = "(อะไรกัน ทำไมถึงกลายเป็นแบบนี้...? เพราะอะไรกัน...?)"
33170-102 = "(โง่หรือเปล่า... แผนที่วางเอาไว้อย่างเหมาะสม...)"
33170-103 = "(เกิดอะไรขึ้นน่ะ...?)"
33170-104 = "(ทำไมฉันถึงสั่งให้โจมตีเซอาจัง...?)"
33170-105 = "(ทำไมฉันถึงอยากกำจัดเซอาจังล่ะ...?)"
33170-106 = "(....)"
33170-107 = "(อา... ใช่แล้วล่ะ ฉัน...คิดจะรับตำแหน่งโฮสต์มานี่นา) "
33170-108 = "(อื้อ เพราะฉันเกลียดพวกเกเฮนน่า นางิจังเองก็พยายามทำอะไรแปลกๆ อย่างเรื่องสนธิสัญญาอยู่)"
33170-109 = "(แล้วเรื่องอื่นทำลงไปเพราะอะไรกันแน่? บ้ารึเปล่า? สันติภาพกับเกเฮนน่าเหรอ? ฉันไม่มีทางยอมรับเด็ดขาด)"
33170-110 = "(เซอาจัง หลังจากแกล้งทำเป็นมองเห็นอนาคตมาตลอด แต่สุดท้ายก็ปกป้องตัวเองไม่ได้ อื้อ ถ้าเห็นอนาคตก็ควรเตรียมการป้องกันตัวไม่ใช่รึไง?)"
33170-111 = "(เธออ่อนแอเกินไปที่จะเป็นสมาชิกสภาน้ำชา แถมยังมองฉันด้วยสายตาที่น่ารังเกียจ...)"
33170-112 = "(เพราะงั้นแล้ว... เพราะงั้น...)"
33170-113 = "(เพื่อกำจัดพวกเกเฮนน่า... การเสียสละแค่นี้เป็นเรื่องที่เลี่ยงไม่ได้นี่นะ)"
33170-114 = "(ใช่แล้ว จริงสิ แบบนั้นแหละ)"
33170-116 = "ฉะ...ฉัน... คือเรื่องนั้น..."
33170-117 = "..."
33170-118 = "ขอโทษนะ... เซอาจัง... ฉันไม่ได้ตั้งใจจะทำแบบนั้น..."
33170-119 = "ฉันเองก็ไม่รู้ด้วยซ้ำว่าทำไมถึงกลายเป็นแบบนี้..."
33170-120 = "ขอโทษนะ... ฉันขอโทษ..."
33170-121 = "ขอโทษที่ทำตัวงี่เง่าแบบนี้..."
33170-122 = "[s] \"มิกะ...\""
33170-123 = "คุณครู... ฉัน... อยากเจอเซอาจัง..."
33170-124 = "อยากเจอนางิจังอีกครั้ง..."
33170-125 = "ถ้าทำได้ละก็..."
33170-128 = "..."
33170-129 = "ใช่แล้วค่ะ มิกะ... คุณน่ะ... ที่จริงแล้ว... ก็แค่..."
33170-130 = "แค่ต้องการเหตุผลที่เหมาะสมก็เท่านั้น"
33170-131 = "คุณแค่หาเหตุผลเพื่อเข้าข้างตัวเองว่าเรื่องผิวเผินพวกนั้นเป็นเรื่องของคุณ..."
33170-132 = "ทำไมถึงได้ทำเรื่องที่โง่เขลาและน่าเวทนาแบบนี้กันนะ... มิกะ..."
33170-134 = "..."
33170-135 = "แทนที่จะพยายามเข้าใจว่าคุณคิดยังไง หรือเป็นคนยังไง ฉันคิดว่าตัวเองรู้จักคุณแล้ว"
33170-136 = "ใช่แล้วค่ะ "
33170-137 = "แต่ที่จริงแล้วฉันไม่รู้เรื่องอะไรเกี่ยวกับคุณเลย"
33170-138 = "พอทบทวนดูแล้ว คุณเองก็เหมือนกับฉันที่อยู่ท่ามกลางเรื่องราวที่ผิดเพี้ยนไป..."
33170-139 = "การเข่นฆ่า... ความตาย... การทรยศ... สงคราม..."
33170-140 = "การที่เด็กสาวอย่างคุณเข้ามาเกี่ยวข้องกับเรื่องพวกนี้ มันน่าเศร้ามากเลยนะคะ"
33170-141 = "มิกะ..."
33170-142 = "คุณเองก็ทุกข์ทรมานมาโดยตลอดสินะคะ"
33170-143 = "ฉันยกโทษให้คุณค่ะ"
33170-144 = "ไม่สิ... บางทีฉันอาจเป็นคนที่จะต้องขอให้คุณยกโทษให้ด้วยซ้ำ"
33170-145 = "พวกเรา... ต้องได้มาพบกันและบอกเล่าเรื่องราวทั้งหมดอีกครั้งค่ะ..."
33170-147 = "[ns] \"ได้อยู่แล้ว ไว้ใจครูนะ มิกะ\""
33170-153 = "คะ...คุณครูล่ะ..."
33170-154 = "คุณครู..."
33170-155 = "คุณครู..."
33170-156 = "[s] \"ขอบคุณทุกคนที่มานะ\""
33170-160 = "คุณครู..."
33170-161 = "คุณครู..."
33170-162 = "อะ...อื้อ...!"
33170-164 = "[ns] \"ขอบคุณทุกคนที่รอครูนะ\""
33170-166 = "[ns] \"ต่อจากนี้ปล่อยให้เป็นหน้าที่ของครูเอง\""
33170-169 = "ตอนต่อไป;ไม่หวั่นไหว"

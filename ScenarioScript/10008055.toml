10008055-26 = "3;통신아코;07;이오리? 현장의 상황은 어떻죠? 새전함을 노리고 날뛰는 문제아들은 모두 정리했나요?\n#3;em;[반응]"
10008055-27 = "1;이오리;04;앗, 아코 쨩! 그게……. 아직이라고 할까. 중간에 방해를 받는 바람에.\n#1;ar\n#1;em;[땀]\n#3;m5"
10008055-28 = "3;통신아코;02;네? 방해꾼이라니, 설마 검은거북파가 끼어들기라도 한 건가요?!"
10008055-29 = "#na;카요코 정월;(……검은거북파?)"
10008055-30 = "1;이오리;02;아냐. 우릴 방해한 건 흥신소 녀석들이랑 선생님이야.\n#1;em;[반응]"
10008055-31 = "5;아루 정월;10;글쎄. 방해라니 우린 아무것도 안 했잖아! 갑자기 덤벼온 건 그쪽이면서!\n#5;al\n#5;hophop\n#3;m3"
10008055-32 = "3;통신아코;02;……흥신소? 그리고 선생님이라니요?"
10008055-33 = "[s] \"안녕. 아코.\""
10008055-34 = "3;통신아코;04;네? 선생님이 어째서 이곳에……? 아, 새해 복 많이 받으세요.\n#3;shake\n#3;em;[?!]"
10008055-35 = "3;통신아코;02;가 아니라, 잠깐만요. 이건 대체……."
10008055-36 = "#all;hide"
10008055-37 = "3;통신아코;99\n#3;em;…\n#wait;2500\n#3;a"
10008055-38 = "3;통신아코;01;상황은……. 네, 잘 알았습니다. 흥신소 여러분은 새전함을 되찾기 위해 샬레와 협력……. 같은 편으로 끌어들였다는 건가요.\n#3;em;[반응]"
10008055-39 = "3;통신아코;99;이걸 영악하다고 해야 할지. 약삭빠르다고 해야 할지."
10008055-40 = "5;아루 정월;04;여, 영악……?\n#5;em;[땀]\n#5;al\n#3;m1"
10008055-41 = "5;카요코 정월;05;그러는 그쪽은? 문제아를 쫓는다면서 지나가는 사람에게 시비를 건다니, 새해 첫날부터 느긋한 거 아냐?\n#5;em;[?]"
10008055-42 = "3;통신아코;08;어머나. 과연 평범하게 대화하는 척하면서도 말 한마디 지지 않겠다는 그 태도. 카요코 씨답군요.\n#3;em;[반응]"
10008055-43 = "5;카요코 정월;99;글쎄, 당하는 입장으로선 꽤 짜증이 나서 말이야."

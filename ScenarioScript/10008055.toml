[translation]
10008055-2 = "อึก! อะไรกัน แม้แต่คุณครูก็เข้าข้างยัยพวกนั้นแล้วคิดจะขัดขวางภารกิจของคณะกรรมการวินัย#nด้วยงั้นเหรอ!"
10008055-3 = "นี่คิดจะเข้าข้างพวกตัวปัญหานั่นจริงๆ เหรอ?!"
10008055-4 = "[s1] \"จะเรียกว่าอยู่กับฝ่ายนี้ได้รึเปล่านะ...\"\n[s2] \"จะเรียกว่าฝ่ายนี้มีเรื่องที่ซับซ้อนอยู่นิดหน่อยได้รึเปล่านะ...\""
10008055-8 = "(อธิบายเรื่องที่เกิดขึ้นจนถึงตอนนี้ให้อิโอริฟัง)"
10008055-12 = "เพราะงั้นก็คือ... ทั้งหน่วยรับจ้างสารพัดแล้วก็เด็กจากอะบิดอสคนนั้น แล้วก็คุณครู... ไม่ได้คิดจะขโมย#nเงินในตู้บริจาคตั้งแต่แรก"
10008055-13 = "แต่ไล่ตามไปเพราะอยากจะเอาตู้บริจาคไปคืนงั้นเหรอ?"
10008055-14 = "นี่คิดจะให้ฉันเชื่อเรื่องพวกนี้น่ะนะ...?"
10008055-15 = "[s] \"ใช่แล้ว\""
10008055-16 = "เพราะแบบนี้ไงถึงใช้เหตุผลคุยกับพวกคณะกรรมการวินัยดีๆ ไม่ได้หรอก ก็พวกนี้เป็นพวกทำตาม#nที่ตัวเองคิดว่าดีเท่านั้นยังไงล่ะ"
10008055-17 = "หาาา? ว่ายังไงนะ...!"
10008055-26 = "อิโอริ? สถานการณ์ที่หน้างานเป็นยังไงบ้างคะ? จัดการพวกตัวปัญหาที่สร้างความวุ่นวายได้หมด#nหรือยังคะ?"
10008055-27 = "อ๊ะ อาโกะจัง! คือว่า... เรื่องนั้นจะบอกว่ายังไม่เสร็จได้มั้ยนะ... พอดีถูกขัดขวางกลางคันน่ะ"
10008055-28 = "คะ? มีคนมาขัดขวางเหรอคะ หรือว่าพวกแก๊งคุโรคาเมะเข้ามาผสมโรงด้วยคะ?!"
10008055-29 = "(แก๊งคุโรคาเมะ?)"
10008055-30 = "เปล่าหรอก พวกที่มาขัดขวางเราคือพวกหน่วยรับจ้างสารพัดกับคุณครูน่ะ"
10008055-31 = "อืม... ขัดขวางงั้นเหรอ พวกเรายังไม่ได้ทำอะไรเลยนะ! เธอต่างหากที่จู่ๆ ก็กระโดดเข้ามาขวางน่ะ!"
10008055-32 = "หน่วยรับจ้างสารพัด...? แล้วก็คุณครูงั้นเหรอคะ?"
10008055-33 = "[s] \"หวัดดี อาโกะ\""
10008055-34 = "อ๊ะ สวัสดีปีใหม่ค่ะคุณครู มะ...ไม่ใช่สิ!"
10008055-35 = "เดี๋ยวก่อนนะคะ นี่มันอะไรกัน..."
10008055-38 = "สถานการณ์แบบนี้... ค่ะ เข้าใจแล้วค่ะ หน่วยรับจ้างสารพัดร่วมมือกับทางชาเล่ต์เพื่อชิงตู้บริจาค#nคืนมา... ใช่ไหมคะ?"
10008055-39 = "จะเรียกว่าแสนรู้... หรือว่าฉลาดดีนะ"
10008055-40 = "สะ...แสนรู้...?"
10008055-41 = "แล้วทางนั้นล่ะ? มาแวะหาเรื่องคนอื่นขณะที่ไล่จับพวกคนที่ก่อความวุ่นวายแบบนี้ ดูท่าแล้วจะทำงาน#nอืดอาดตั้งแต่วันแรกของปีเลยนะ?"
10008055-42 = "ตายจริง สุดท้ายก็แกล้งทำเป็นพูดคุยปกติ แต่ใช้คำพูดจิกกัดทุกคำเลยนะคะ สมกับเป็นคุณคาโยโกะ#nจริงๆ เลย"
10008055-43 = "ไม่รู้สินะ ในมุมของคนที่เสียหาย มันน่ารำคาญน่ะ"
10008055-44 = "ฮึ่ม......"
10008055-45 = "..."
10008055-49 = "\nหึหึหึ... ตื่นเต้นจุงเบย!"
10008055-50 = "หะ...หืม?"
10008055-51 = "[s] \"คือว่า...\""
10008055-53 = "เฮ้อ..."
10008055-54 = "งั้นก็ดีค่ะ"
10008055-55 = "อิโอริ ฉันบอกให้จัดการเรื่องพวกคนที่ก่อปัญหาใช่ไหมคะ ไม่ได้บอกให้ไปหาเรื่องกับทางชาเล่ต์#nสักหน่อยนี่คะ"
10008055-56 = "มัวแต่เสียเวลากับเรื่องไม่เป็นเรื่องแบบนี้... คืออะไรกันคะ"
10008055-57 = "หรือว่าอิโอริสนุกกับภารกิจของคณะกรรมการวินัยจนไม่อยากกลับบ้านตั้งแต่วันปีใหม่เหรอคะ?"
10008055-58 = "อาโกะจัง! นี่ฉันเป็นฝ่ายผิดเหรอ?! แค่ถูกลากออกมาทำงานในวันหยุดแบบนี้ก็ไม่ยุติธรรมแล้วนะ!"
10008055-59 = "แล้วก็อาโกะจังนั่นละ กว่าจะสั่งการมาถึงฉันก็ล่าช้ามากแล้วนะ!"
10008055-60 = "ที่ฉันล่าช้าก็เพราะรวบรวมข้อมูลสถานการณ์ที่เกิดขึ้นอยู่ค่ะ"
10008055-61 = "เหตุการณ์ที่ไคเทนเจอร์ขโมยตู้บริจาคไปเป็นแค่เสี้ยวหนึ่งของความวุ่นวายที่เกิดขึ้นค่ะ"
10008055-62 = "ตัวการสำคัญของความวุ่นวายที่เกิดขึ้นคราวนี้ ไม่ใช่เจ้าพวกนั้นหรอกค่ะ"
10008055-63 = "[s] \"หมายความว่ายังไงน่ะ?\""
10008055-64 = "สรุปก็คือเหตุการณ์ที่เกิดขึ้นที่งานเทศกาล <ไดคิจิเดน> ทั้งหมดเป็นแผนการของพวกแก๊งคุโรคาเมะค่ะ"
10008055-65 = "ว่ายังไงนะ?!"
10008055-66 = "[s] \"แก๊งคุโรคาเมะ...?\""
10008055-67 = "ค่ะ <ไดคิจิเดน> เป็นองค์กรที่ทำธุรกิจฟอกเงินของแก๊งคุโรคาเมะที่เป็นอาชญากรค่ะ"
10008055-68 = "?!"
10008055-69 = "ตู้บริจาคที่วางอยู่ที่นั่นเป็นเครื่องมือที่พวกแก๊งคุโรคาเมะใช้ฟอกเงินผิดกฎหมาย..."
10008055-70 = "เป็นกลอุบายที่ง่ายมากเลยค่ะ นำเงินสดผิดกฎหมายที่ต้องการซักฟอกมาใส่ไว้ในตู้บริจาค ถ้าทำแบบนี้#n\nละก็คงหลบหลีกสายตาของพวกหน่วยงานความปลอดภัยอย่างสถาบันฝึกตำรวจวัลคิรี่ไปได้แน่นอนค่ะ"
10008055-71 = "โดยเฉพาะในช่วงเทศกาลพิเศษอย่างปีใหม่ และแถมยังเป็นตู้บริจาคของผู้จัดกิจกรรมอีกด้วย คงไม่มีใครนึกสงสัยและไปเปิดตู้บริจาคดูแน่ๆ ค่ะ"
10008055-72 = "แน่นอนว่าถ้าเคลื่อนย้ายเงินจำนวนมากเกินไปก็อาจถูกจับได้ เพราะงั้นพวกแก๊งคุโรคาเมะถึงได้#nเตรียมแผนก่อเรื่องวุ่นวายแบบนั้นไว้อีกวิธีหนึ่งไงล่ะคะ"
10008055-73 = "[s] \"อีกวิธีหนึ่ง...งั้นเหรอ?\""
10008055-74 = "ใช่แล้วค่ะ ใช้วิธีสร้างไวรัลผ่านโซเชียลค่ะ"
10008055-75 = "\"ขอพรสมหวังทุกประการ\" ใช่มั้ยนะ...? ถึงจะเป็นคำที่ดูไม่น่าเชื่อถือก็เถอะค่ะ"
10008055-76 = "และดูเหมือนจะได้ผลดีด้วยค่ะ เพราะงั้นที่นี่ถึงได้กลายเป็นสถานยอดฮิตในโซเชียลขึ้นมาได้ยังไงล่ะคะ"
10008055-77 = "และดูเหมือนจะมีพวกหน้ามืดหลงเป็นทาสการตลาดมาขอพรที่ศาลเจ้ากันเยอะเหมือนกันนะคะ"
10008055-79 = "อึก...?!"
10008055-80 = "พอโปรโมตไปแบบนั้นก็มีคนมาขอพรและบริจาคเงินที่ศาลเจ้าเพิ่มขึ้นเรื่อยๆ"
10008055-81 = "หมายความว่าในตู้บริจาคมีเงินผิดกฎหมายของพวกแก๊งคุโรคาเมะซ่อนอยู่งั้นเหรอ?"
10008055-82 = "ถ้างั้นเงินที่ผู้คนบริจาคลงไปในตู้ก็อาจจะถูกเหมารวมว่าเป็นเงินผิดกฎหมายไปก็ได้..."
10008055-83 = "[s] \"ถ้าซ่อนต้นไม้ได้ก็ซ่อนป่าได้สินะ...\""
10008055-84 = "ตายจริง คุณคาโยโกะ มองออกในพริบตาเลยเหรอคะ"
10008055-85 = "เฮ้อ... อย่ามาแซะกันน่า "
10008055-86 = "หืม? ก็นะ ชื่องานเทศกาล <ไดคิจิเดน> มันก็ดูแปลกๆ ตั้งแต่แรกแล้วไม่ใช่รึไงคะ? มิหนำซ้ำ ดูแล้วก็#nไม่น่าจะมีเรื่องดีๆ อย่าง \"ขอพรสมหวังทุกประการ\" ด้วยนะคะ"
10008055-91 = "ดะ...เดี๋ยวก่อน! ถ้างั้นเรื่อง \"ขอพรสมหวังทุกประการ\"... ทั้งเรื่องที่ว่าถ้าแปดเปื้อนลางร้าย พรจะไม่สมหวัง... ทั้งหมดเป็นเรื่องโกหกงั้นเหรอ...?"
10008055-92 = "ลางร้าย...? แปดเปื้อน...? เพิ่งเคยได้ยินเรื่องนี้เลยนะคะ?"
10008055-93 = "งะ...งั้นเหรอ ฮ่ะฮ่ะฮ่า! ถูกต้มจนเปื่อยเลยสินะ อะ... อื้ม! ฉันรู้อยู่แล้วละ!"
10008055-94 = "ถ้างั้นเรื่องที่บอกว่าคนที่เอาตู้บริจาคกลับมาได้จะได้เงินในนั้นไปทั้งหมดล่ะ..."
10008055-95 = "ถ้ากลายเป็นเหตุโจรกรรม หน่วยงานอื่นอย่างสถาบันวัลคิรี่ก็คงจะต้องเข้าไปยุ่งอย่างหลีกเลี่ยงไม่ได้ บางทีที่ทำแบบนั้นไป ตอนแรกอาจเป็นเพราะอยากปกป้องตู้บริจาคก็ได้นะคะ"
10008055-96 = "ประมาณว่า \"ไม่ต้องให้ตำรวจช่วยหรอก เพราะที่นี่คือสถานที่จัดงานปีใหม่ไงล่ะ\""
10008055-98 = "อ่ะฮะฮะฮ่า! อะไรกัน!"
10008055-99 = "คิดถึงขนาดนั้นแล้วก็จัดกิจกรรมเซอร์ไพรส์ขึ้นเนี่ยนะ?"
10008055-100 = "อีกอย่าง... บางทีสิ่งที่พวกแก๊งคุโรคาเมะต้องการอาจไม่ใช่แค่นั้นก็ได้..."
10008055-102 = "อะไรเนี่ย ฉันโดนพวกนั้นจ้างให้มาแต่งเป็นมิโกะในสถานที่ฟอกเงินของพวกอาชญากรเหรอ?!"
10008055-103 = "ว่าแต่ทำไมพวกฟอกเงินต้องจ้างมิโกะด้วย?! มันเสียมารยาทกับมิโกะรู้มั้ย! แบบนี้ฉันเดือดร้อนนะ!"
10008055-104 = "ก่อนที่แก๊งคุโรคาเมะจะเข้ามายึดอำนาจ ที่นั่นเป็นแค่สถานที่จัดงานธรรมดานี่นา ไม่แปลกที่จะจ้างมิโกะ..."
10008055-105 = "[s3] \"ถึงยังไงก็เถอะ แต่ครูคิดว่าชุดมิโกะของเซริกะเป็นของจริงนะ!\"\n[s4] \"อื้อ แต่จิตวิญญาณมิโกะของเซริกะเป็นของจริงนะ!\""
10008055-106 = "ฉะ...ฉันไม่ได้เสียดาย หรือว่าเศร้าที่ถูกพวกอาชญากรจ้างมาเป็นมิโกะหรอกนะ?!"
10008055-107 = "ฉะ...ฉันไม่ได้เสียดาย หรือว่าเศร้าที่ถูกพวกอาชญากรจ้างมาเป็นมิโกะหรอกนะ?!"
10008055-108 = "แค่ได้เงินค่าพาร์ทไทม์ตามที่ตกลงไว้ก็พอแล้ว"
10008055-109 = "ก็นะ... ถะ...ถึงจะดีใจที่คุณครูพูดแบบนั้นก็เถอะ... "
10008055-110 = "[s5] \"ถ้างั้นพวกไคเทนเจอร์ก็ทำเพื่อความยุติธรรม...?\"\n[s6] \"เพราะงั้นถึงขโมยตู้บริจาคไปสินะ?\""
10008055-111 = "อืม ดูจากข้อมูลการวิเคราะห์แล้วก็คงจะเป็นอย่างนั้นนะคะ ถึงจะไม่รู้ว่าความยุติธรรมที่พวกไคเทนเจอร์#nพูดถึงคืออะไรก็เถอะค่ะ"
10008055-112 = "อืม ดูจากข้อมูลการวิเคราะห์แล้วก็คงจะเป็นอย่างนั้นนะคะ ถึงจะไม่รู้ว่าความยุติธรรมที่พวกไคเทนเจอร์#nพูดถึงคืออะไรก็เถอะค่ะ"
10008055-113 = "บางทีอาจทำตัวเป็นจอมโจรขวัญใจชาวประชาที่ขโมยตู้บริจาคไปแล้วเอาเงินไปให้กับพวกคนจน..."
10008055-114 = "แต่เนื่องจากเราไม่รู้ตัวตนที่แท้จริงของพวกนั้น เราเลยคาดเดาจุดประสงค์ไม่ได้ค่ะ"
10008055-115 = "แต่แบบนั้นก็ดีนะคะ เพราะถึงยังไงในฐานะคณะกรรมการวินัย สิ่งสำคัญในตอนนี้คือการจัดการเหตุ#nความวุ่นวายที่เกิดขึ้นในบริเวณโรงเรียนเกเฮนน่าค่ะ"
10008055-116 = "[s] \"เพราะงั้นคณะกรรมการวินัยถึงได้ออกโรงสินะ\""
10008055-117 = "ค่ะ ไม่ว่าอีกฝ่ายจะเป็นพวกไคเทนเจอร์ แก๊งคุโรคาเมะ หรือพวกเด็กเกเร ต่างก็คิดที่จะฉวย#nโอกาสใช้ช่วงเวลาที่ท่านประธานไม่อยู่ก่อความวุ่นวายขึ้นในเกเฮนน่ากันทั้งนั้นค่ะ"
10008055-118 = "เพราะงั้นตอนนี้เราไม่ควรเสียเวลาอยู่ที่นี่แล้วค่ะ อิโอริ รีบไล่ตามพวกเด็กที่ก่อความวุ่นวายนั่นไปเถอะค่ะ แล้วก็คุณครู..."
10008055-119 = "ดูเหมือนว่าจะโดนลากเข้าไปยุ่งกับเรื่องวุ่นวายตั้งแต่วันแรกของปีเลยนะคะ... แต่ว่าการทำดีก็ควรทำ#nแต่พอประมาณจะดีกว่านะคะ"
10008055-120 = "ถ้างั้นฉันขอตัวก่อนนะคะ"
10008055-126 = "เฮ้อ... อาโกะจังไม่เว้นช่วงให้หยุดพักเลย"
10008055-127 = "เอาละ หน่วยรับจ้างสารพัด พวกเธอก็ได้ยินแล้วใช่มั้ย?"
10008055-128 = "พวกเราจับตาดูพวกเธออยู่ เพราะงั้นอย่าก่อเรื่องวุ่นวายอะไรอีกล่ะ! ถ้าไม่อยากเจ็บตัว!"

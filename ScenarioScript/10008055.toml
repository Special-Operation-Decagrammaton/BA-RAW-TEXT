10008055-90 = "3;아루 정월;11\n#3;em;…\n#wait;2500"
10008055-91 = "3;아루 정월;06;자, 잠깐! 그럼 빌면 이루어진다. 라는 것도……. 부정이 타면 소원이 뒤집혀 이루어진다는 것도……. 전부, 거짓말……?\n#3;em;[땀]\n#3;stiff"
10008055-92 = "1;통신아코;02;부정……? 뒤집혀……? 그런 얘기는 처음 듣지만요……?\n#1;em;[?]\n#1;ar\n#3;m5"
10008055-93 = "3;아루 정월;04;그, 그랬구나. 아하하하! 당연히 사기였다는 거지? 으, 응! 알고 있었다구!"
10008055-94 = "#3;hide\n5;세리카 정월;11;그럼 새전함을 되찾는 사람에게 그걸 전부 주겠다는 것도 사실은…….\n#5;em;…"
10008055-95 = "1;통신아코;01;도난 사건이 되면 필연적으로 여기엔 발키리 등의 기관이 개입하게 될 겁니다. 아마 일차적으로는 그걸 막고 싶은 생각이었겠죠."
10008055-96 = "1;통신아코;03;'경찰의 도움은 필요 없습니다. 이건 새해의 이벤트이니까요.' 같은 식으로 말이죠?\n#1;greeting\n#1;em;[반짝]"
10008055-97 = "#all;hide"
10008055-98 = "4;카요코 정월;99\n2;무츠키 정월;03;아하하핫! 뭐야!\n#2;em;[재잘]\n#2;hophop"
10008055-99 = "2;무츠키 정월;00;거기까지 생각해서 벌인 깜짝 이벤트였던 거야?"
10008055-100 = "4;카요코 정월;05;게다가 아마, 검은거북파가 노리는 건 그것뿐만이 아니라……."
10008055-101 = "#all;hide"
10008055-102 = "3;세리카 정월;04;뭐야, 나. 사실은 범죄조직의 자금 세탁소에 무녀로 고용되어 있었던 거야?!\n#3;em;[땀]\n#3;stiff"
10008055-103 = "3;세리카 정월;06;근데 왜 하필 돈세탁을 한다는 놈들이 무녀를 고용해?! 무녀에게 실례잖아! 민폐잖아!"
10008055-104 = "1;통신아코;02;검은거북파가 장악하기 전까진 원래는 평범한 행사장이었으니까. 무녀를 고용하는 게 이상한 건 아니었을 테지만…….\n#1;ar\n#3;m5"
10008055-105 = "[s3] \"맞아, 상황이 어찌 되었든 세리카의 무녀복은 진짜라고 생각해!\"\n[s4] \"응! 그래도 무녀 세리카의 마음은 진짜라고 생각해!\""
10008055-106 = "3;세리카 정월;04;따, 딱히 범죄조직에게 고용된 무녀가 되었다고 해서, 안타깝거나, 슬프다고 생각한 게 아니거든?!\n#3;hophop"
10008055-107 = "3;세리카 정월;04;따, 딱히 범죄조직에게 고용된 무녀가 되었다고 해서, 안타깝거나, 슬프다고 생각한 게 아니거든?!\n#3;hophop"
10008055-108 = "3;세리카 정월;02;나야 약속한 대로 알바비만 받으면 그만이고."
10008055-109 = "3;세리카 정월;07;……뭐어, 선생님이 그렇게 말해주는 건 무, 물론 기쁘지만……. \n#3;em;[///]\n#3;stiff"
10008055-110 = "[s5] \"근데 그러면 카이텐져는 정말로 정의를 위해……?\"\n[s6] \"……새전함을 훔쳤다는 거야?\""
10008055-111 = "1;통신아코;02;으음. 해석에 따라서는 그렇게 볼 수도 있을까요? 카이텐져가 말하는 정의라는 게 정확히 뭔지는 모르겠지만.\n#1;em;[?]\n#1;m3\n#3;dr"
10008055-112 = "1;통신아코;02;으음. 해석에 따라서는 그렇게 볼 수도 있을까요? 카이텐져가 말하는 정의라는 게 정확히 뭔지는 모르겠지만.\n#1;em;[?]\n#1;m3\n#3;dr"
10008055-113 = "1;통신아코;99;어쩌면 의적 놀이를 하면서 돈이 없는 사람들에게 새전함의 내용물을 뿌린다던가……."
10008055-114 = "1;통신아코;08;원체 정체를 알 수 없는 게 카이텐져다보니 의중이야 알 수는 없습니다마는."

[translation]
10008055-2 = "唔！"
10008055-3 = "老師，難道你想站在問題兒童那邊嗎！？"
10008055-4 = "[s1]「與其說站在這邊……」\n[s2]「希望你能先聽我們解釋……」"
10008055-8 = "（向伊織說明了目前為止的情況）"
10008055-12 = "也就是說……便利屋68和那位阿拜多斯的學生都不是為了拿到賽錢箱裡的錢。"
10008055-13 = "真的只是想要把賽錢箱拿回去而已？"
10008055-14 = "……你要我相信這件事？"
10008055-15 = "[s]「相信我！拜託！」"
10008055-16 = "繼續說下去可能也沒什麼用。腦袋還是跟以前一樣頑固……"
10008055-17 = "哈啊！？"
10008055-26 = "伊織，狀況如何？全都收拾好了嗎？"
10008055-27 = "啊，亞子醬！#n那個，遇到了一點妨礙……"
10008055-28 = "妨礙……？#n……難道是黑龜組！？"
10008055-29 = "（……黑龜組？）"
10008055-30 = "不，是便利屋68和一名阿拜多斯的學生。還有老師。"
10008055-31 = "我們才沒有妨礙！突然展開襲擊的是你們才對吧！？"
10008055-32 = "……便利屋68和阿拜多斯，還有老師？"
10008055-33 = "[s]「嗨，亞子。新年快樂。」"
10008055-34 = "老師怎麼會……那個，祝您新年快樂。"
10008055-35 = "不對，請等一下，這究竟是……？"
10008055-38 = "原來如此……我大概明白了。#n便利屋68的各位和阿拜多斯的那位同學一起為了搶回賽錢箱而展開了追擊，#n並且與夏萊合作……該這麼說嗎，將夏萊納入了友方。"
10008055-39 = "真是狡猾的手段……"
10008055-40 = "？"
10008055-41 = "話說回來，風紀委員會看起來挺閒的呢。#n說是要追問題兒童，卻有空找路過的人吵架。"
10008055-42 = "哎呀，真是感謝你的關心。#n表面上裝作若無其事的樣子，說話卻意外的不服輸，依然很有佳世子同學的作風呢。"
10008055-43 = "畢竟以我們的立場來看也處於被妨礙的狀況啊。希望你們能讓開。"
10008055-44 = "這樣啊……"
10008055-45 = "……"
10008055-49 = "咯呵呵。那麼，接下來會怎麼樣呢～？"
10008055-50 = "？？？"
10008055-51 = "[s]「那個……」"
10008055-53 = "唉……"
10008055-54 = "算了，無所謂。"
10008055-55 = "……伊織，我說過要你收拾問題兒童，可沒叫你跟夏萊起衝突哦？"
10008055-56 = "你都在做些什麼啊，真是的。"
10008055-57 = "難道伊織是因為太喜歡風紀委員會的工作，所以就算是新年也不想回家嗎？"
10008055-58 = "遷怒的也太明顯了吧！？而且亞子醬，這是我的錯嗎！？#n都在難得的假日出動了還要被這樣對待！？"
10008055-59 = "亞子醬才是把工作都交給我，這段時間都在做什麼！？"
10008055-60 = "只是為了蒐集情報所以才花了這麼多時間。"
10008055-61 = "以凱坦澤偷走賽錢箱為起點引發的一連串小騷動。"
10008055-62 = "其實並不是此次事件的重點。"
10008055-63 = "[s]「什麼意思？」"
10008055-64 = "從結論來說，這次在「大吉殿」發生的事件……#n都是由名為黑龜組的組織策畫的一場天大的騙局。"
10008055-65 = "咦咦！？"
10008055-66 = "[s] 「黑龜組……？」"
10008055-67 = "是的。犯罪組織「黑龜組」……而「大吉殿」可以說是他們用來洗錢的地方吧。"
10008055-68 = "什，什麼意思！？"
10008055-69 = "就是字面上的意思，那個賽錢箱是用來處理非法資金的。"
10008055-70 = "事情很簡單。將違法獲得的資金先投入賽錢箱，#n這樣就能避開女武神警察學園等等治安單位的眼目。"
10008055-71 = "如此一來，即使或多或少有些可疑，也不會強制對賽錢箱出手吧。"
10008055-72 = "當然，如果移動的資金規模太大就另當別論了。#n然而黑龜組還準備了另一個手段。"
10008055-73 = "[s]「你說另一個手段，難道是……？」"
10008055-74 = "沒錯。"
10008055-75 = "就是利用媒體和社群網站。"
10008055-76 = "記得是「實現願望的地方」之類的那種無趣口號吧。#n實際上效果相當顯著，已經成為了眾所皆知的名勝。"
10008055-77 = "接著便如您所見，被吸引過來的「傻瓜」們擠得水洩不通。"
10008055-79 = "唔……！？"
10008055-80 = "……由於大肆宣傳的關係，來這裡投香油錢的人數也增加了。"
10008055-81 = "想當然耳，香油錢的金額自然也水漲船高……"
10008055-82 = "導致原本黑龜組的非法資金究竟有多少，現在已經不得而知了。"
10008055-83 = "[s]「所謂藏木於林……」"
10008055-84 = "哎呀，感覺好像……早就看穿了呢？#n不愧是你，佳世子同學。"
10008055-85 = "唉，少說那些口是心非的話了……"
10008055-86 = "話說「大吉殿」這個名字，作為那種地方的名稱也有點奇怪吧？#n而且「實現願望」這種事，如果只是傳聞就算了，#n竟然敢自己說出來，即使遭到天罰也不奇怪。"
10008055-91 = "先，先等一下！#n這麼說，「實現願望的地方」和「沾染汙穢的話願望就會反噬」全都是騙人的……？"
10008055-92 = "汙穢……反噬……？#n這些我都是第一次聽說……？"
10008055-93 = "……這，這樣啊！我，我早就知道了！#n全都是詐欺對吧，沒錯我當然知道！"
10008055-94 = "那麼「搶回賽錢箱的話就把所有錢給他」也是……"
10008055-95 = "如果變成搶劫事件的話，女武神之類的機關勢必會介入。#n也許是想盡可能地拖延這種情況吧？"
10008055-96 = "用「這不是需要勞煩各位警察的事，只是新年的活動罷了」……之類的說法。"
10008055-98 = "啊哈哈哈！"
10008055-99 = "想偽裝成精心策畫的整人活動嗎？"
10008055-100 = "而且，黑龜組的目的也許不僅只於此……"
10008055-102 = "我，我是被那種地方雇來當巫女嗎……！？"
10008055-103 = "話說既然是犯罪組織就不要雇用巫女啊，對巫女很失禮的吧！"
10008055-104 = "在被黑龜組掌控之前就是那種地方了，巫女們恐怕什麼都不知道吧……"
10008055-105 = "[s3]「不管怎麼樣，我都覺得茜香穿著巫女服的模樣很棒！」\n[s4]「不管怎麼樣，我都覺得茜香作為巫女的心意是真的！」"
10008055-106 = "咦，咦咦……！？其，其實我也沒有特別在意，被奇怪的人雇用這件事啦……#n雖然你這麼說我很高興……"
10008055-107 = "咦，咦咦……！？其，其實我也沒有特別在意，被奇怪的人雇用這件事啦……#n雖然你這麼說我很高興……"
10008055-108 = "我只要做好該做的事……"
10008055-109 = "領到該領的打工費就好了。"
10008055-110 = "[s5]「這麼一來，凱坦澤他們……」\n[s6]「難道真的是為了正義……？」"
10008055-111 = "依照解釋方式的不同，或許可以那麼說吧？#n這就取決於他們是如何定義「正義」了。"
10008055-112 = "依照解釋方式的不同，或許可以那麼說吧？#n這就取決於他們是如何定義「正義」了。"
10008055-113 = "也許他們是想做些義賊般的事也說不定……"
10008055-114 = "不過真相為何就不清楚了。#n畢竟我們本來就不清楚凱坦澤的身分與目的。"
10008055-115 = "但老實說那都無所謂。#n對我們風紀委員會來說，重要的是平息目前發生在格黑娜附近的混亂。"
10008055-116 = "[s]「原來如此。」"
10008055-117 = "是的，無論對方是凱坦澤、黑龜組還是校內的問題兒童都沒關係。#n想趁委員長不在的時候擾亂格黑娜的風紀的話，就由我來導正他們吧。"
10008055-118 = "事情就是這樣，不能再浪費時間了。#n伊織，請繼續追趕問題兒童們吧……還有，老師。"
10008055-119 = "明明才新年第一天，您就和往常一樣被捲入無謂的騷動之中了呢……#n當好人還是該有個限度比較好唷。"
10008055-120 = "那麼，再會。"
10008055-126 = "亞子醬看來不打算讓我休息啊……"
10008055-127 = "……呼。"
10008055-128 = "那麼便利屋，你們也別再惹出更大的麻煩了哦！"
10008055-132 = "老師，再見。今年也請多指教。#n……那麼繼續追趕問題兒童吧。風紀委員會，走吧！"
10008055-135 = "是！！"
10008055-140 = "（於是風紀委員會便如風一般地離開了）"

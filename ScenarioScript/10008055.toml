10008055-84 = "#3;hide\n1;통신아코;08;어머나. 과연 카요코 씨. 바로 꿰뚫어 보시는 거군요?\n#1;em;[반응]"
10008055-85 = "5;카요코 정월;06;……하아. 마음에도 없는 소리 하지 마. \n#5;stiff\n#5;em;[속상함]"
10008055-86 = "1;통신아코;01;흐응. 뭐, 애당초 <대길전>이라니 행사장으로는 이상한 이름이잖아요? 더군다나 '빌면 이루어진다.' 같은 형편 좋은 이야기가 있을 리도 없고요."

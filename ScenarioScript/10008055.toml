10008055-54 = "3;통신아코;99;뭐, 좋습니다."
10008055-55 = "3;통신아코;08;이오리. 저는 문제아들을 해결하라고 했지, 이렇게 샬레와 마찰을 빚으라고는 안 했는데요.\n#3;em;[반응]"
10008055-56 = "3;통신아코;01;쓸데없는 일로 시간을 잡아먹다니. 뭔가요."
10008055-57 = "3;통신아코;07;혹시 이오리는 선도부의 일이 너무너무 즐거운 나머지, 새해 첫날부터 집에 돌아가기 싫다거나 그런 건가요?\n#3;em;[?]"
10008055-58 = "5;이오리;04;아코 쨩! 내 잘못이야?! 모처럼의 휴일에 끌려 나온 것도 억울한데!\n#5;al\n#5;hophop\n#3;m1"
10008055-59 = "5;이오리;02;그러는 아코 쨩이야말로 내게만 맡겨 두고 너무 늦었잖아!"
10008055-60 = "3;통신아코;00;저는 이번 사태의 정보를 수집하느라 늦었을 뿐이에요."
10008055-61 = "3;통신아코;99;카이텐져가 새전함을 훔쳐 간 건 일련의 작은 소동일 뿐.\n#3;em;…"
10008055-62 = "3;통신아코;01;사실 이번 사태에서 중요한 건 그게 아니니까요."
10008055-63 = "[s] \"무슨 의미야?\""
10008055-64 = "3;통신아코;01;결론부터 말씀드리자면 이번 <대길전>의 이벤트 자체가 검은거북파라는 조직이 얽혀 있는 사기극입니다.\n#3;em;[반응]"
10008055-65 = "5;아루 정월;04;뭐어?!\n#5;em;[?!]\n#5;shake"
10008055-66 = "[s] \"검은거북파……?\""
10008055-67 = "3;통신아코;08;네. <대길전>은 범죄조직 검은거북파의 자금 세탁용 사업체입니다."
10008055-68 = "5;아루 정월;06;?!\n#5;em;[땀]\n#5;stiff"
10008055-69 = "3;통신아코;99;그곳에 비치되어 있던 새전함은 검은거북파가 불법 자금의 세탁을 위해 사용해온 것으로…….\n#3;m3\n#3;em;…\n#5;dr"
10008055-70 = "3;통신아코;01;노림수는 간단해요. 새전함에 세탁하고 싶은 불법 자금을 대량으로 세이브한다. 이렇게 하면 우선적으로 발키리 경찰학교 같은 치안 기관의 시선을 피할 수 있게 되겠죠."
10008055-71 = "3;통신아코;03;새해라는 특수한 환경, 거기다 이벤트 회장의 새전함이라는 특수성까지 더해지면, 조금 의심스러운 정황이 있다고 해도 새전함을 열어보려고 드는 이는 없을 테니까요.\n#3;em;[음표]"
10008055-72 = "3;통신아코;08;물론 너무 큰 규모의 자금이 움직였다가는 덜미를 잡힐 수도 있습니다만. 검은거북파는 그런 만약의 사태를 피하기위해 또 하나의 수단을 준비했죠."
10008055-73 = "[s] \"또 하나의 수단……?\""
10008055-74 = "3;통신아코;01;네, 매스컴이나 SNS를 통한 바이럴 마케팅이 바로 그거예요.\n#3;em;[반응]"
10008055-75 = "3;통신아코;99;'빌면 이루어진다.'……였던가요? 웃기지도 않는 캐치프레이즈입니다만."
10008055-76 = "3;통신아코;08;실제로 효과는 확실했는지. ……덕분에 SNS에서도 제법 유명한 장소로 알려지게 된 거예요."
10008055-77 = "3;통신아코;03;보시다시피 그 광고에 혹해 찾아온 바보들도 잔뜩인 모양이고요.\n#3;em;[음표]\n#3;greeting"
10008055-78 = "#all;hide"
10008055-79 = "3;아루 정월;06;윽……?!\n#3;em;[땀]\n#3;stiff"
10008055-80 = "5;카요코 정월;99;홍보를 통해, 말 그대로 행사장에 새전을 넣으러 오는 사람의 숫자 자체를 늘린다.\n#5;al\n#3;m1"
10008055-81 = "5;카요코 정월;01;……그렇게 하면 새전함에는 검은거북파의 불법 자금을 숨겨줄 거액이 모인다는 건가.\n#5;em;…"
10008055-82 = "5;카요코 정월;05;거기다 홍보로 모인 새전 자체도 동시에 불법 자금으로 흡수할 수 있을 테고."

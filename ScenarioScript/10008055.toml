[translation]
10008055-2 = "Gah. I can't believe Sensei is condoning your actions."
10008055-3 = "Have you really chosen to side with these miscreants?!"
10008055-4 = "[s1] \"I'm not trying to side with anyone.\"\n[s2] \"It's a long story.\""
10008055-8 = "I did my best to explain the situation to Iori."
10008055-12 = "You're saying you, Problem Solver 68, and this Abydos student aren't after the money inside the offering box..."
10008055-13 = "...but rather, you're trying to retrieve it with good intentions?"
10008055-14 = "Do you seriously expect me to believe that?"
10008055-15 = "[s] \"Please believe me!\""
10008055-16 = "It's useless trying to explain things to the Prefect Team. They're too pigheaded to listen."
10008055-17 = "What did you just say?!"
10008055-26 = "What's the situation, Iori? Have you apprehended the troublemakers going after the offering box?"
10008055-27 = "A-Ako! No, not yet... Just a little bit longer. I kind of got sidetracked."
10008055-28 = "Sidetracked? Did the Kurokame Gang interfere?"
10008055-29 = "(Kurokame Gang?)"
10008055-30 = "Not quite. It was Problem Solver 68 and Sensei."
10008055-31 = "You're the one who's interfering with us. We didn't do anything!"
10008055-32 = "Did you say Problem Solver 68 and Sensei?"
10008055-33 = "[s] \"Hi, Ako.\""
10008055-34 = "Oh? Happy New Year... What are you doing here, Sensei?"
10008055-35 = "Wait. Would someone please explain what's going on?"
10008055-38 = "So Problem Solver 68 dragged Sensei into their mess and are attempting to retrieve the offering box."
10008055-39 = "I don't know whether to call that clever or devious."
10008055-40 = "D-Devious?"
10008055-41 = "You all must have too much time on your hands if you have nothing better to do on New Year's than pick on innocent bystanders."
10008055-42 = "Well, well. You certainly know how to put venom behind your words,#ndon't you, Kayoko?"
10008055-43 = "You'll have to forgive me. My patience is running thin."
10008055-44 = "I could say the same..."
10008055-45 = "..."
10008055-49 = "Oooh! Can you feel the sparks flying?"
10008055-50 = "H-Huh?"
10008055-51 = "[s] \"So, uh...\""
10008055-53 = "*sigh*"
10008055-54 = "Very well, then."
10008055-55 = "Iori, your instructions were to detain any troublemakers. I never said anything about coming into conflict with Schale."
10008055-56 = "It's beyond me why you'd choose to waste your time like this."
10008055-57 = "Perhaps you enjoy Prefect Team work so much that you don't want to go home on New Year's Day?"
10008055-58 = "You've got to be kidding me. This is the thanks I get for working on a holiday?!"
10008055-59 = "You're the one who dumped all this work on me, and now it's MY fault?! And what have you been doing this whole time?"
10008055-60 = "Collecting information on this incident, obviously."
10008055-61 = "The Kaitengers stealing the offering box is only one piece of the puzzle."
10008055-62 = "There's something greater at work here."
10008055-63 = "[s] \"Where are you going with this?\""
10008055-64 = "Allow me to explain. The Daikichiden event itself is a scam involving an organization known as the Kurokame Gang."
10008055-65 = "What?!"
10008055-66 = "[s] \"Who's this Kurokame Gang?\""
10008055-67 = "A crime syndicate. Daikichiden is a money laundering business of theirs."
10008055-68 = "...?!"
10008055-69 = "The offering box was used to launder illegal funds for the Kurokame Gang."
10008055-70 = "It's a simple trick, really. Large amounts of illegally gained money are transferred by way of the offering box. That prevents a paper trail, thus avoiding the watchful eyes of law enforcement agencies such as Valkyrie Police School."
10008055-71 = "They also took advantage of the holiday. New Year's is when people are most likely to make cash offerings—large ones at that."
10008055-72 = "Though this method does have its limits. They could still draw unwanted attention if they pulled in too much money. That's why they devised a countermeasure."
10008055-73 = "[s] \"What kind of countermeasure?\""
10008055-74 = "The viral marketing they've been doing with the mass media and online."
10008055-75 = "\"If you wish it, you'll get it!\" What a silly slogan."
10008055-76 = "But I'll give credit where it's due. It's certainly caught on, especially on social media."
10008055-77 = "Things like that always manage to reel in empty-headed nitwits."
10008055-79 = "Gah!"
10008055-80 = "And because of that, they've exponentially increased the number of people visiting to make large offerings."
10008055-81 = "There's no telling how much money they've managed to collect by now."
10008055-82 = "It also obfuscates how much of it was laundered in the first place."
10008055-83 = "[s] \"Like hiding a tree in the forest.\""
10008055-84 = "Well done, Kayoko. I knew you'd figure it out."
10008055-85 = "*sigh* As if I want your praise. "
10008055-86 = "Thinking about it, even the name Daikichiden is strange. It means \"a tale of great success.\" Not to mention the tacky slogan. They were playing into the rumors all along. It was part of the viral marketing strategy."
10008055-91 = "W-Wait! Does that mean the part about evil spirits reversing the fortunes of people's wishes was also a lie?"
10008055-92 = "Evil spirits? What are you talking about?"
10008055-93 = "I-I mean, of course. It was all just a scam from the very beginning. I knew that!"
10008055-94 = "But the manager said whoever retrieved the offering box would get to keep the money. What about that?"
10008055-95 = "It was likely a ploy to keep the police from getting involved."
10008055-96 = "By turning the chase into part of the event itself, it shifts from a potential criminal matter to a publicity stunt."
10008055-98 = "Hahaha! You've got to be kidding me!"
10008055-99 = "They even accounted for something like that? Talk about covering your bases!"
10008055-100 = "Then maybe money wasn't all that the Kurokame Gang was after..."
10008055-102 = "So you're telling me I was hired to be a miko for a freaking crime syndicate?! You've gotta be kidding me!"
10008055-103 = "Who makes mikos launder money?! Seriously, that's just wrong."
10008055-104 = "It was just an ordinary shrine before the Kurokame Gang took over, so hiring mikos was probably standard practice."
10008055-105 = "[s3] \"I'm still glad I got to see you in your miko outfit!\"\n[s4] \"It does me proud to see you be such a passionate miko!\""
10008055-106 = "W-Would you knock it off? It's not like I care that much about this job!"
10008055-107 = "W-Would you knock it off? It's not like I care that much about this job!"
10008055-108 = "It doesn't bother me as long as I get paid at the end of the day."
10008055-109 = "Though I'll take the compliment, I guess... "
10008055-110 = "[s5] \"So does this mean the Kaitengers knew all along?\"\n[s6] \"The Kaitengers were in the right all along, huh? Who knew?\""
10008055-111 = "That's one way to look at it, but it depends on how you want to define justice."
10008055-112 = "That's one way to look at it, but it depends on how you want to define justice."
10008055-113 = "Perhaps they wanted to steal from the rich and give to the poor."
10008055-114 = "The Kaitengers are a mystery wrapped in an enigma. It's pointless to try understanding their motives."
10008055-115 = "The only thing that matters is dealing with the chaos surrounding Gehenna Academy."
10008055-116 = "[s] \"That's where the Prefect Team comes in.\""
10008055-117 = "Precisely. The president is away at the moment, so taking care of any nuisances is our responsibility—be it the Kaitengers, the Kurokame Gang, or any other...miscreants."
10008055-118 = "We've wasted enough time with them, Iori. Please focus on the other troublemakers. As for you, Sensei..."
10008055-119 = "Don't you ever learn? Here you are selflessly involving yourself in yet another incident. You really are too kind for your own good."
10008055-120 = "Well, then. Until we meet again."
10008055-126 = "*sigh* Ako is one to talk. She's always cracking the whip."
10008055-127 = "Hey, Problem Solver. Did you hear that?"
10008055-128 = "We've got our eye on you. Stay out of trouble unless you want to be next!"
10008055-132 = "Let's go, everyone—we're leaving. Happy New Year, Sensei."
10008055-135 = "Yes!"
10008055-140 = "The Prefect Team was gone just as suddenly as they appeared."

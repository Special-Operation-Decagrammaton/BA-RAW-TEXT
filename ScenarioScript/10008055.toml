10008055-1 = "#wait;1000"
10008055-2 = "3;이오리;07;크읏! 뭐야, 선생님까지 그쪽에 붙어서 선도부의 업무를 방해하다니!\n#3;stiff\n#3;em;[속상함]\n#3;a"

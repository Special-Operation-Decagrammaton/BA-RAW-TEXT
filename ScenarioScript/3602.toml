[translation]
3602-1 = "รสหวานและความคิดถึง 2"
3602-3 = "(วันต่อมาเซอาก็ขับมอเตอร์ไซค์พามิกะกับนางิสะไป)"
3602-4 = "(แต่ถึงอย่างนั้นนางิสะก็ยังดูเหม่อลอยอยู่)"
3602-9 = "(บรื้นนนนน...)"
3602-10 = "จะพาฉัน... ไปที่ไหนเหรอคะ?"
3602-11 = "อื้อ ก็จะพาไปที่ที่นางิจังชอบมากที่สุดไงล่ะ☆"
3602-12 = "สถานที่... ที่ฉันชอบ...?"
3602-13 = "ได้ยินว่าที่โรงเรียนมัธยมซานไห่จิงมีโรงน้ำชาชื่อดังอยู่ด้วยละค่ะ นางิสะ"
3602-14 = "เรากำลังจะไปที่โรงน้ำชานั่นกันค่ะ"
3602-15 = "เซอาจัง! สปอยล์ไปก่อนแบบนั้นได้ยังไงล่ะ?!"
3602-16 = "นี่เป็นการทัวร์เพื่อฮีลจิตใจนี่คะ ไม่จำเป็นต้องกระตุ้นความอยากรู้อยากเห็นสักหน่อย"
3602-18 = "ฮีลจิตใจ..."
3602-19 = "ถ้าอย่างนั้นละก็... ปล่อยไว้ที่หอพักเถอะ..."
3602-20 = "นางิจัง คิดว่าฉันไม่รู้เหรอว่าตอนนอนพักอยู่ที่หอเธอก็เอาแต่นอนอ่านเอกสารบนเตียงน่ะ?"
3602-21 = "วันนี้เป็นวันที่ต้องปล่อยวางเรื่องงานและพักผ่อนบ้างนะ☆"
3602-22 = "พร้อมกับชาแดงกลิ่นหอมกรุ่นยังไงล่ะ"
3602-23 = "ชา... แดง..."
3602-26 = "ถึงแล้วละ ลงได้แล้วค่ะ"
3602-32 = "ว้าว ที่นี่คือโรงน้ำชาสินะ"
3602-33 = "เชิญเลยขอรับ! ใช่กลุ่มที่จองทัวร์โรงน้ำชาไว้หรือเปล่าครับ?"
3602-34 = "ก่อนอื่นเราจะพาทุกท่านไปดูขั้นตอนการชงชาอย่างง่ายๆ จากนั้นก็จะไปลองผสมใบชาและลิ้มรสชา#nกันขอรับ!"
3602-35 = "มีชาบางชนิดที่จะลิ้มรสได้เฉพาะที่โรงน้ำชานี้เท่านั้นด้วยนะขอรับ ตั้งตารอกันได้เลย!"
3602-36 = "ดีละ! ไปกันเถอะนางิจัง!"
3602-43 = "......"
3602-44 = "เอาละ งั้นเราจะเริ่มกันจากตรงนี้นะขอรับ"
3602-45 = "การชงชาแดงนั้นจะต้องเอาความชื้นออกจากใบชาเสียก่อน จากนั้นก็นำไปตากขอรับ และเพื่อการนั้น..."
3602-57 = "(จากนั้นทั้งกลุ่มก็ได้ไปเยี่ยมชมกระบวนการผลิตชาร่วมกับเจ้าของโรงน้ำชา)"
3602-58 = "(ต้องขอบคุณเจ้าของโรงน้ำชาที่อัธยาศัยดีทำให้การเดินทัวร์โรงน้ำชาไม่น่าเบื่อนัก)"
3602-59 = "(ทว่าดวงตาของนางิสะยังคงเลื่อนลอยอยู่เหมือนเดิม...)"
3602-61 = "เอาละ งั้นไปลองการผสมชากันเลยดีมั้ยขอรับ?"
3602-62 = "บางครั้งชาแดงจะทำมาจากใบชาเพียงชนิดเดียว ทว่าก็มีบางครั้งที่ผสมกับใบชาประเภทอื่น ผลไม้ เครื่องเทศ และอื่นๆ เพื่อเพิ่มรสชาติเข้าไปด้วย"
3602-63 = "เอาละ ก่อนอื่นมาดูส่วนผสมที่อยู่ในตะกร้าพวกนี้ก่อนนะคะ"
3602-64 = "ลองดมกลิ่นดูก็ได้นะ"
3602-65 = "......"
3602-69 = "ซูดดดดด..."
3602-70 = "......"
3602-71 = "เป็นยังไง กลิ่นหอมมากเลยใช่มั้ยล่ะ"
3602-72 = "ฮุฮุ..."
3602-78 = "อ๊ะ?!"
3602-79 = "นางิสะ?!"
3602-80 = "นางิจังเอาหน้าจุ่มกองใบชาไปแล้ว...!"
3602-81 = "นางิจัง! ไม่เป็นไรใช่มั้ย?!"
3602-83 = "......"
3602-84 = "ฟู่ว......"
3602-85 = "ไม่เอาละ......"
3602-86 = "ฉันขอนั่งอยู่ที่มุมห้องก็แล้วกันค่ะ..."
3602-87 = "ฉันขอเป็นชาแดงเองเลยดีกว่า..."
3602-88 = "แช่อยู่ในน้ำร้อน... แล้วก็ล่องลอยไปไกลแสนไกล..."
3602-89 = "นางิจังอ๊องไปแล้ว...!"
3602-90 = "ไม่สิ... พอคิดดูแล้วก็คุ้นกับเรื่องแบบนี้อยู่เหมือนกันนะ...!"
3602-91 = "ใจเย็นๆ ก่อนค่ะ มิกะ"
3602-92 = "เถ้าแก่คะ ช่วยคิดเงินค่าใบชาที่คนคนนี้เอาหน้าจุ่มไปด้วยนะคะ"
3602-93 = "อ๊ะ ได้สิ... ได้เลย...!"
3602-95 = "(หลังจากซื้อใบชาที่มีกลิ่นของนางิสะติดอยู่เสร็จเรียบร้อยแล้ว ทั้งสามคนก็ออกมาจากโรงน้ำชา)"

[translation]
3602-1 = "甜蜜與懷舊（２）"
3602-3 = "（隔天，彌香和渚搭上聖亞駕駛的機車出發了）"
3602-4 = "（而渚則依然處於兩眼無神的狀態）"
3602-9 = "（嗡嗡嗡……）"
3602-10 = "你們……要帶我去哪裡？"
3602-11 = "當然是去渚醬喜歡的地方囉☆"
3602-12 = "我……喜歡的……地方……？"
3602-13 = "聽說山海經高級中學的郊外有間著名的紅茶專賣店。"
3602-14 = "我們正在前往那裡的路上。"
3602-15 = "聖亞醬！你怎麼可以劇透！？"
3602-16 = "這是為了放鬆身心的行程，沒必要特地吊他胃口吧。"
3602-18 = "放鬆身心……"
3602-19 = "那不如乾脆……把我留在宿舍……"
3602-20 = "渚醬，你以為我不知道你在宿舍床上還在看文件嗎？"
3602-21 = "今天就放下一切，好好休息吧☆"
3602-22 = "然後再配上香醇的紅茶！"
3602-23 = "紅……茶……"
3602-26 = "我們到了。下車吧。"
3602-32 = "哇哦，這裡就是那間專賣店啊。"
3602-33 = "歡迎光臨！三位是預約參觀的客人對吧？"
3602-34 = "稍後會先簡單參觀紅茶的製作過程，接著再進行試飲和調配體驗！"
3602-35 = "還有只有這裡才能品嚐到的茶品哦，敬請期待！"
3602-36 = "太棒了！走吧，渚醬！"
3602-43 = "……"
3602-44 = "那麼，請從這邊開始。"
3602-45 = "製作紅茶之前必須先去除茶葉的水分，讓葉片稍微萎凋。#n為此首先……"
3602-57 = "（一行人在老闆的帶領下，參觀了紅茶的製作流程）"
3602-58 = "（老闆的口才相當不錯，導覽過程並不無聊）"
3602-59 = "（……然而渚的眼神卻依然處於失焦狀態）"
3602-61 = "那麼，接下來試試調配體驗吧？"
3602-62 = "雖然紅茶可以使用單一茶葉製作，#n有時也會混合多種茶葉，或者加入水果或香料來增添香氣。"
3602-63 = "那麼，先看看這些籃子裡的材料吧。"
3602-64 = "可以湊近感受一下香氣哦。"
3602-65 = "……"
3602-69 = "（吸……）"
3602-70 = "……"
3602-71 = "感覺如何？香氣很棒吧？"
3602-72 = "……呵呵。"
3602-78 = "咦！？"
3602-79 = "渚！？"
3602-80 = "渚醬把臉埋進茶葉裡了……！"
3602-81 = "渚醬！你還好嗎！？"
3602-83 = "……"
3602-84 = "嗚嗚……"
3602-85 = "一點也不好……"
3602-86 = "我只想縮在角落……"
3602-87 = "變成紅茶的茶葉……"
3602-88 = "被浸泡在熱水裡……然後流向遠方……"
3602-89 = "渚醬壞掉了……！"
3602-90 = "不過仔細想想，這樣的他好像也不是第一次見到了……！"
3602-91 = "冷靜點，彌香。"
3602-92 = "老闆，麻煩把他剛才埋過臉的那籃茶葉另外結帳。"
3602-93 = "啊，好的！我明白了……！"
3602-95 = "（於是一行人在買下了一籃「渚香」茶葉後，離開了專賣店）"

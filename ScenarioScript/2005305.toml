[translation]
2005305-1 = "Ninja Girl Needs a Plan!"
2005305-2 = "Presentation Room"
2005305-3 = "I couldn't help but worry about Michiru."
2005305-4 = "So I decided to join her for the presentation."
2005305-5 = "Honorable Sensei! Here, over here!"
2005305-6 = "Hm?"
2005305-7 = "No no, I wouldn't go in early, or anything...and sit by myself, you know?"
2005305-8 = "Also... Hm?"
2005305-9 = "Why am I in a dress?"
2005305-10 = "Honorable Sensei, look at this atmosphere."
2005305-11 = "This presentation is a clandestine meeting where the chosen ones will share their intimate secrets...!"
2005305-12 = "So one must be dressed appropriately, right?"
2005305-13 = "That's why I decided to wear the dress and do my hair! Nyahaha!"
2005305-14 = "Look, other people are wearing suits and dresses too!"
2005305-15 = "[s] \"It does have that vibe...\""
2005305-17 = "I considered asking her if most clandestine meetings had hanging signs and pamphlets..."
2005305-18 = "...But I decided to just tag along and see for myself."
2005305-20 = "[ns] \"So, how did you learn about this presentation?\""
2005305-21 = "Well, I was watching videos...as I do."
2005305-22 = "And I got an ad...that I couldn't skip."
2005305-23 = "It was for this very presentation!"
2005305-24 = "[s] \"So you came here because of an ad...?\""
2005305-25 = "No no, Honorable Sensei, hear me out!"
2005305-26 = "As usual, I was searching for ways to grow my channel. I needed help! A sign!"
2005305-27 = "And that's when..."
2005305-28 = "...this ad showed up in front of my eyes!"
2005305-29 = "As if it were giving me the answer to all my worries!"
2005305-30 = "And that's when I felt that this was fate! Or the almighty algorithm!"
2005305-31 = "[s] \"Um... Yeah, sure...\""
2005305-32 = "Wh-What?! What's with the lukewarm reaction?!"
2005305-33 = "Anyway, the presentation will begin soon, so let's nab our seats!"
2005305-38 = "Inside the Presentation Room"
2005305-40 = "Hello, everyone."
2005305-41 = "I know you're all thinking the same thing!"
2005305-42 = "\"How can I get more subscribers? How can I grab more views and grow my channel?\""
2005305-43 = "Isn't that why you're all here?!"
2005305-44 = "I knew it...!"
2005305-45 = "Just as I thought! As I KNEW!"
2005305-46 = "[s] \"...\""
2005305-47 = "But don't you worry."
2005305-48 = "Your desired views, your much-longed-for subscribers. "
2005305-49 = "Our company will make sure you get them! Your dreams can be yours!"
2005305-50 = "...What?"
2005305-51 = "With only one million yen, we guarantee that your video will skyrocket to one million views!"
2005305-52 = "That's a bargain! A brief initial investment. One yen gets you one view, for perpetuity...basically!"
2005305-53 = "Ehh...?"
2005305-54 = "Ah, and don't worry about our signature and exclusive methods!"
2005305-55 = "We use a completely safe, patent-pending macro program certified by the Kivotos Cracker Association! Yum!"
2005305-59 = "So the numbers ARE being forged...!"
2005305-60 = "Sorry, Honorable Sensei. I must've gotten this all wrong."
2005305-61 = "I came here seeking an honest lesson on how to increase my views and subscribers..."
2005305-62 = "But I think...this is just a scam."
2005305-63 = "Let's depart, Honorable Sensei. I've heard enough."
2005305-69 = "Hm?"
2005305-70 = "Where are you going?"
2005305-71 = "The presentation is not over yet. We still have many exciting details to share with you all."
2005305-72 = "Ah, I think I get the idea. We're leaving."
2005305-73 = "Hmm, I don't think your \"idea\" is particularly good, young lady."
2005305-74 = "Leaving in the middle of an important presentation like this is against our—"
2005305-76 = "[ns] \"Excuse me. May I have a word?\""
2005305-77 = "Hm? What are..."
2005305-81 = "Wait, you're Schale's—"
2005305-82 = "My apologies! My mistake! Please...have a wonderful day, you two."
2005305-86 = "[ns] \"Let's go, Michiru.\""
2005305-87 = "Y-Yeah, Honorable Sensei."
2005305-89 = "And so, Michiru and I left the presentation."
2005305-91 = "Nearby Park"
2005305-92 = "Ugh...How embarrassing..."
2005305-93 = "I can't believe I almost got tricked by those scammers..."
2005305-94 = "By the way, Honorable Sensei..."
2005305-95 = "Did you suspect that would happen?"
2005305-96 = "[s] \"I had a feeling...\""
2005305-97 = "Ugh... You're so mean, Honorable Sensei."
2005305-98 = "[s] \"Huh?!\""
2005305-99 = "Of course! It's my fault for falling for something like this...!"
2005305-100 = "B-But you could've at least warned me! Or hinted!"
2005305-101 = "[s] \"Some failures are worth experiencing yourself.\""
2005305-102 = "Hm...? What do you mean?"
2005305-103 = "[s1] \"If we didn't go, you might have regretted it.\"\n[s2] \"But by attending, you knew for sure.\""
2005305-109 = "Mm, I suppose you have a point."
2005305-110 = "I can use today's experience to ensure I don't fall for a trick like this in the future..."
2005305-111 = "On second thought... Thank you, Honorable Sensei."
2005305-112 = "And because of what just happened, I've decided."
2005305-113 = "...I won't fall for scams like this. I will grow my channel legitimately, and with my own strength and integrity!"
2005305-114 = "So please continue to tune in!"
2005305-116 = "I dropped Michiru off and returned to my office."
2005305-117 = "...Then, of course, I reported the suspicious organization to Valkyrie."

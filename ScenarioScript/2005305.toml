[translation]
2005305-1 = "忍者少女想知道祕訣！"
2005305-2 = "說明會會場"
2005305-3 = "（不管怎麼想都很擔心三千留……）"
2005305-4 = "（所以決定陪三千留一起參加說明會）"
2005305-5 = "老師大人！這邊這邊！"
2005305-6 = "嗯？"
2005305-7 = "不不不，我才不會自己先進去呢。"
2005305-8 = "還有就是……嗯？"
2005305-9 = "問我為什麼穿著禮服過來？"
2005305-10 = "老師大人，你看一下這裡的氣氛。"
2005305-11 = "這個說明會場，是被選中的人們隱密傳授祕訣的地方……！"
2005305-12 = "那麼換上與之相稱的正式服裝過來，不是很合情合理嗎？"
2005305-13 = "所以我才下定決心把禮服找出來穿了！哼哼哼……！"
2005305-14 = "你看，其他人不也都穿著西裝或禮服嗎～？"
2005305-15 = "[s]「確實是這種氣氛呢……」"
2005305-17 = "（雖然想問他「宣稱要隱密傳授祕訣，結果公然掛著引導布條不是很奇怪嗎」……）"
2005305-18 = "（總之還是先跟著三千留走了進去）"
2005305-20 = "[ns]「話說，你是怎麼知道這場說明會的？」"
2005305-21 = "啊，其實是我前幾天看影片的時候……"
2005305-22 = "在影片開始前跳出了一個廣告。"
2005305-23 = "然後內容就是這場說明會！"
2005305-24 = "[s]「原來是被廣告吸引來的啊……！」"
2005305-25 = "不不不，老師大人，你聽我說嘛！"
2005305-26 = "我那天剛好在思考該怎麼讓頻道成長，於是就到處搜尋資料……"
2005305-27 = "結果就在那時……！"
2005305-28 = "這個廣告就這麼出現在了我的眼前！"
2005305-29 = "簡直像是在回應我的煩惱一樣！"
2005305-30 = "那一瞬間我就感受到了……這就是命運吧！"
2005305-31 = "[s]「哦……這樣啊……」"
2005305-32 = "什，什麼啦！為什麼是那種不冷不熱的反應！"
2005305-33 = "總之，說明會馬上就要開始了，我們進去吧！"
2005305-38 = "說明會場內部"
2005305-40 = "大家好。"
2005305-41 = "各位今天之所以聚集於此，想必都是因為抱持著相同的煩惱吧。"
2005305-42 = "該如何獲得更多的觀看次數、更多的訂閱者……"
2005305-43 = "為了解決這個煩惱，各位才會來到這裡的對吧！"
2005305-44 = "果然沒錯……！"
2005305-45 = "他完全看穿了我的心思……！"
2005305-46 = "[s]「……」"
2005305-47 = "請不必擔心。"
2005305-48 = "大家想要的觀看次數和訂閱人數……"
2005305-49 = "我們公司全部都能搞定！"
2005305-50 = "……嗯？"
2005305-51 = "只要少少的一百萬元，我就能將各位影片的平均觀看次數提升到一百萬！"
2005305-52 = "同樣也只要少少的一百萬元，訂閱人數一樣能變成一百萬哦！"
2005305-53 = "咦咦咦……？"
2005305-54 = "啊，至於方法請各位放心。"
2005305-55 = "我們公司使用的，是經過奇普托斯駭客協會認證的安全腳本程式！"
2005305-59 = "說白了就是造假嘛……！"
2005305-60 = "老師大人，對不起。看來是我搞錯了。"
2005305-61 = "我本來以為能在這裡，學到正當增加觀看次數和訂閱人數的策略……"
2005305-62 = "結果……這根本只是詐騙而已。"
2005305-63 = "走吧，老師大人。沒必要再聽下去了。"
2005305-69 = "嗯？"
2005305-70 = "請問兩位要去哪裡呢？"
2005305-71 = "說明會還沒結束唷？"
2005305-72 = "啊，我們覺得沒什麼好聽的了，所以才打算離開。"
2005305-73 = "哼嗯……那恐怕有點困難哦。"
2005305-74 = "像這樣中途離席，是違反我們公司規定的………"
2005305-76 = "[ns]「不好意思，能跟我稍微聊幾句嗎？」"
2005305-77 = "咦？要聊什麼……"
2005305-81 = "等等，難道您是夏萊的……！"
2005305-82 = "非常抱歉！請慢走！"
2005305-86 = "[ns]「走吧，三千留。」"
2005305-87 = "啊，嗯。老師大人。"
2005305-89 = "（就這樣和三千留一起離開了說明會場）"
2005305-91 = "鄰近的公園"
2005305-92 = "嗚嗚嗚……好丟臉……"
2005305-93 = "居然差點被那種騙子給騙了……"
2005305-94 = "不過老師大人……該不會……"
2005305-95 = "早就發現那裡不對勁了嗎？"
2005305-96 = "[s]「大概猜到了。」"
2005305-97 = "嗚嗚嗚……老師大人真過分。"
2005305-98 = "[s]「咦！？」"
2005305-99 = "當然會被那種廣告釣到，確實是我自己不好……！"
2005305-100 = "不，不過老師也可以稍微提醒我一下嘛……！"
2005305-101 = "[s]「有些失敗，是值得親身體會過一次的。」"
2005305-102 = "嗯……？那是什麼意思？"
2005305-103 = "[s1]「如果今天沒去聽說明會的話，三千留心裡八成會一直念念不忘。」\n[s2]「正是因為實際去過才能乾脆地放下這件事，不是嗎？」"
2005305-109 = "嗯，聽你這麼說好像也有道理。"
2005305-110 = "也許經過今天的事情之後，以後就再也不會被這種詐騙給騙了……"
2005305-111 = "仔細想想，真的很謝謝老師大人。"
2005305-112 = "而且今天的事，也讓我下定決心了。"
2005305-113 = "我不應該依賴那種歪門邪道，而是靠自己的力量來讓頻道成長才對……！"
2005305-114 = "所以今後也要好好看著我哦！"
2005305-116 = "（將三千留送回家後，回到了辦公室）"
2005305-117 = "（……並且向女武神檢舉了那個可疑的說明會）"

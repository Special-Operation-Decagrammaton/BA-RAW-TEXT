[translation]
2005305-1 = "นินจาสาวต้องการเคล็ดลับ!"
2005305-2 = "สถานที่จัดงานสัมมนา"
2005305-3 = "(คิดเท่าไรคุณครูก็ไม่หายกังวลเกี่ยวกับมิจิรุ...)"
2005305-4 = "(จึงตัดสินใจไปงานสัมมนากับมิจิรุด้วย)"
2005305-5 = "ท่านอาจารย์! ทางนี้ ทางนี้!"
2005305-6 = "หืม?"
2005305-7 = "ไม่ๆ ข้าน้อยไม่ได้บอกว่าจะเข้าไปก่อนสักหน่อย"
2005305-8 = "อีกอย่างนะ... หืม?"
2005305-9 = "ทำไมข้าน้อยถึงใส่ชุดเดรสมาน่ะเหรอ?"
2005305-10 = "ท่านอาจารย์ก็ดูบรรยากาศที่นี่สิ"
2005305-11 = "นี่คืองานสัมมนาของเหล่าผู้ถูกเลือก ทุกคนจะมาแบ่งปันเคล็ดลับกันอย่างลับๆ เชียวนะ...!"
2005305-12 = "งั้นก็ต้องแต่งกายมาให้เหมาะสมสิถึงจะถูก"
2005305-13 = "ข้าน้อยก็เลยรวบรวมความกล้าแล้วหยิบชุดเดรสนี้มาใส่ยังไงล่ะ! อะฮะฮ่า!"
2005305-14 = "ดูสิ คนอื่นก็ใส่สูทกับเดรสมาเหมือนกัน!"
2005305-15 = "[s] \"เป็นงานที่ให้บรรยากาศแบบนั้นจริงๆ ด้วยนะ...\""
2005305-17 = "(คุณครูอยากถามว่านี่เป็นงานสัมมนาลับ แต่มันไม่แปลกไปหน่อยเหรอที่มีป้ายแขวนเด่นอยู่หน้างาน...)"
2005305-18 = "(แต่ก็ตัดสินใจไม่ถามและตามมิจิรุเข้าไปก่อน)"
2005305-20 = "[ns] \"ว่าแต่ไปได้ข้อมูลงานสัมมนานี้มาจากไหนเหรอ?\""
2005305-21 = "อ้อ เห็นจากวิดีโอที่เพิ่งดูไปเมื่อไม่นานมานี้น่ะ"
2005305-22 = "ก่อนเริ่มวิดีโอ มีโฆษณาอันหนึ่งเด้งขึ้นมา"
2005305-23 = "และนั่นก็คือโฆษณาของงานสัมมนานี้!"
2005305-24 = "[s] \"มาเพราะโฆษณาเหรอเนี่ย...!\""
2005305-25 = "เดี๋ยวก่อนสิ ท่านอาจารย์ ฟังข้าน้อยก่อน!"
2005305-26 = "วันนั้นข้าน้อยกำลังค้นหาข้อมูลและคิดหาวิธีที่จะทำให้ช่องของข้าน้อยเติบโตขึ้นอยู่พอดี"
2005305-27 = "และตอนนั้นเอง...!"
2005305-28 = "โฆษณานั้นก็ปรากฏขึ้นตรงหน้าข้าน้อยเลย!"
2005305-29 = "เหมือนกับได้เจอคำตอบในสิ่งที่กังวลอยู่อย่างนั้นละ!"
2005305-30 = "วินาทีนั้นข้าน้อยเลยได้รู้ว่า นี่คือโชคชะตาชัดๆ!"
2005305-31 = "[s] \"อ่า... เป็นอย่างนั้นสินะ...\""
2005305-32 = "อะ... อะไรกัน! ทำไมถึงตอบรับแบบไม่กระตือรือร้นเลยล่ะ!"
2005305-33 = "เอาเถอะ งานสัมมนาใกล้จะเริ่มแล้ว รีบเข้าไปข้างในกันดีกว่า!"
2005305-38 = "ในงานสัมมนา"
2005305-40 = "สวัสดีครับ ทุกคน"
2005305-41 = "ผมเชื่อว่าทุกคนที่มารวมตัวกันที่นี่น่าจะมีความกังวลแบบเดียวกันว่า"
2005305-42 = "ฉันจะเพิ่มยอดวิวให้มากขึ้นได้ยังไง และจะทำยังไงให้มีผู้ติดตามช่องเยอะๆ..."
2005305-43 = "นั่นคือเหตุผลที่ทุกคนมาที่นี่ใช่มั้ยล่ะครับ!"
2005305-44 = "ต้องอย่างนี้สิ...!"
2005305-45 = "พูดเหมือนกำลังมองเข้าไปในใจข้าน้อยเลย...!"
2005305-46 = "[s] \"......\""
2005305-47 = "แต่ไม่ต้องห่วงนะครับ"
2005305-48 = "ทั้งยอดวิวที่อยากได้ ทั้งจำนวนผู้ติดตามที่ทุกคนต้องการ "
2005305-49 = "บริษัทของเรายินดีทำให้ตามประสงค์เลยครับ!"
2005305-50 = "หืม...?"
2005305-51 = "ด้วยเงินเพียงล้านเยน! เราจะทำให้วิดีโอที่ทุกคนอัปโหลดมียอดวิวเฉลี่ยแตะล้านวิวเลยครับ!"
2005305-52 = "และด้วยอีกล้านเยน เราจะทำให้ช่องของทุกคนมีผู้ติดตามมากถึงล้านคนเลยด้วย!"
2005305-53 = "หาา...?"
2005305-54 = "อ้อ ส่วนเรื่องวิธีการน่ะ ไม่ต้องห่วงเลยครับ"
2005305-55 = "บริษัทของเราใช้โปรแกรมมาโครที่ปลอดภัย ที่ได้รับการรับรองจากสมาคมแครกเกอร์แห่งคิโวทอสเลย#nละครับ!"
2005305-59 = "นี่มันการซื้อยอดวิวกับผู้ติดตามนี่นา...!"
2005305-60 = "ท่านอาจารย์ ขอโทษนะ ข้าน้อยน่าจะคิดผิดไปแล้วละ"
2005305-61 = "อุตส่าห์มาด้วยความหวังว่าจะได้กลยุทธ์ที่จะช่วยเพิ่มยอดวิวกับผู้ติดตามแท้ๆ..."
2005305-62 = "แต่นี่มัน... ดูเป็นการหลอกลวงมากกว่า"
2005305-63 = "กลับกันเถอะ ท่านอาจารย์ ข้าน้อยไม่อยากฟังสัมมนานี้แล้ว"
2005305-69 = "หืม?"
2005305-70 = "จะไปไหนเหรอครับ?"
2005305-71 = "งานสัมมนาของเรายังไม่จบเลยนะครับ"
2005305-72 = "ข้าน้อยไม่อยากฟังอะไรเพิ่มแล้ว ก็เลยจะกลับแล้วละ"
2005305-73 = "ฮึ่ม แบบนั้นน่าจะยากนะครับ"
2005305-74 = "การออกไปจากงานกลางคันแบบนี้มันขัดต่อข้อบังคับของบริษัทเราน่ะสิ..."
2005305-76 = "[ns] \"ขอคุยด้วยสักเดี๋ยวได้มั้ย?\""
2005305-77 = "ครับ? จะคุยอะไร..."
2005305-81 = "เดี๋ยวนะ คุณเป็นคนจากชาเล่ต์นี่นา...!"
2005305-82 = "ขอโทษด้วยครับ! เชิญกลับได้เลยครับ!"
2005305-86 = "[ns] \"ไปกันเถอะ มิจิรุ\""
2005305-87 = "อะ... อื้อ ท่านอาจารย์"
2005305-89 = "(แล้วคุณครูกับมิจิรุก็ออกมาจากงานสัมมนา)"
2005305-91 = "สวนสาธารณะใกล้ๆ"
2005305-92 = "อึกก... อายจังเลย..."
2005305-93 = "ข้าน้อยเกือบตกเป็นเหยื่อของมิจฉาชีพพวกนั้นแล้ว..."
2005305-94 = "ว่าแต่ ท่านอาจารย์... ไม่ทราบว่า..."
2005305-95 = "ท่านอาจารย์ดูออกตั้งแต่แรกเลยเหรอว่างานสัมมนานั่นเป็นงานหลอกลวงกันน่ะ?"
2005305-96 = "[s] \"ครูเดาไว้อยู่แล้วน่ะ\""
2005305-97 = "อึกกก... เกินไปแล้วนะ ท่านอาจารย์"
2005305-98 = "[s] \"หืม?!\""
2005305-99 = "แน่นอนว่าข้าน้อยเป็นคนผิดเองที่หลงเชื่อเรื่องนั้น...!"
2005305-100 = "ตะ... แต่ท่านอาจารย์ก็น่าจะบอกกันหน่อยสิ...!"
2005305-101 = "[s] \"บางความล้มเหลวก็คุ้มค่าที่จะได้สัมผัสด้วยตัวเองนะ\""
2005305-102 = "หืม...? หมายความว่ายังไงน่ะ?"
2005305-103 = "[s1] \"ถ้าไม่ได้ไปงานวันนี้ มิจิรุก็น่าจะข้องใจไปตลอดนี่นา\"\n[s2] \"พอไปจนได้รู้ความจริง ก็หายข้องใจเลยใช่มั้ยล่ะ?\""
2005305-109 = "อืม... มันก็จริงอย่างที่ว่านะ"
2005305-110 = "เรื่องที่เจอในวันนี้อาจทำให้ฉันไม่ตกเป็นเหยื่อของกลโกงแบบนี้อีกในอนาคตก็ได้..."
2005305-111 = "พอมาคิดดูแล้วก็จริงนะ ขอบคุณนะท่านอาจารย์"
2005305-112 = "เรื่องที่เกิดขึ้นวันนี้ทำให้ข้าน้อยตัดสินใจได้แล้วละ"
2005305-113 = "แทนที่จะไปพึ่งพาวิธีไร้สาระแบบนั้น ข้าน้อยจะพัฒนาช่องด้วยความสามารถของข้าน้อยเอง...!"
2005305-114 = "เพราะงั้นจากนี้ก็คอยเฝ้าดูด้วยล่ะ!"
2005305-116 = "(หลังจากนั้นคุณครูก็พามิจิรุไปส่งที่บ้านแล้วกลับไปยังสำนักงาน)"
2005305-117 = "(และไม่ลืมที่จะแจ้งเบาะแสน่าสงสัยนี้ให้วัลคิรี่รู้...)"

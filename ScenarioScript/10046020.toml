10046020-186 = "Wh-What's going on? Is anyone hurt?"
10046020-190 = "...Eh?"
10046020-200 = "...What...?"
10046020-212 = "Ugh...! *cough* *cough*"
10046020-213 = "Wh-What was that?"
10046020-218 = "Ahhhh—! I can't take it anymore!"
10046020-222 = "H-Hasumi...?"
10046020-228 = "Calm...! Calm down, I'm not sure what's going on, but we should talk it out...!"
10046020-229 = "Breathe and relax. Find your inner peace..."

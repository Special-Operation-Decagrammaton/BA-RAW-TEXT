[translation]
10046020-1 = "第2話;溫泉危機"
10046020-14 = "為什麼這裡會有人……？#n他們現在又在做什麼？"
10046020-18 = "[ns1]「惠……！？」\n[ns2]「那孩子為什麼會在這裡……？」"
10046020-24 = "那邊的人！#n你現在在做什麼？立刻停下來！"
10046020-25 = "這裡是茶會所有的海灘，你現在是在闖入私人領地！"
10046020-29 = "……？"
10046020-30 = "為什麼不回答──"
10046020-35 = "……嗯？#n啊，原來有人來啦！"
10046020-39 = "而且連老師也在！#n你們是怎麼知道這裡的？溫泉都還沒開放耶？"
10046020-43 = "……老師？您認識他嗎？"
10046020-44 = "[s3]「呃，那個……」\n[s4]「先，先冷靜下來聽我說好嗎？」"
10046020-47 = "嗯！我是溫泉開發部的惠！#n佳澄部長叫我在這裡安裝「溫泉開發用炸彈」！"
10046020-51 = "……什麼？炸彈……？"
10046020-52 = "不，先等一下。他剛才是說……「溫泉開發」嗎？#n難道是……"
10046020-58 = "溫泉開發部！！#n那不是格黑娜的恐怖分子社團嗎！！"
10046020-59 = "居然連這種日子都要來搗亂……真是不可原諒！格黑娜！！"
10046020-60 = "……老師？"
10046020-61 = "先冷靜下來……有話好說？"
10046020-66 = "冷靜！？老師，難道您覺得格黑娜的學生只是剛好經過這裡嗎！？"
10046020-67 = "莫非您覺得他們有搗亂以外的其他意圖嗎……！？#n您是這個意思嗎！？"
10046020-68 = "[ns5]「不，就算是我也不會這麼想……！！」\n[ns6]「我也很想這麼說，但根本說不出口啊！！」"
10046020-71 = "這裡本來就是私人領地！#n光是出現在這裡就已經構成非法入侵了吧！？"
10046020-72 = "而且剛才還說在安裝什麼……溫泉開發用「炸彈」？？"
10046020-73 = "立刻停下來！！這是實現正義部的命令！！"
10046020-78 = "咦……？反正這裡遲早會崩塌，變成溫泉不是更好嗎？"
10046020-79 = "為什麼一開始就假設這裡會崩塌！？#n甚至還一副理所當然的態度！！"
10046020-80 = "因為部長說「一定會崩塌」啊？"
10046020-81 = "……？？？#n那是什麼意思……"
10046020-82 = "不對，我差點被牽著鼻子走了。#n這個人簡直完全無法溝通！"
10046020-83 = "[s7]「這，這些孩子的個性本來就是這樣啦……」\n[s8]「雖然我也勸誡過好幾次了……」"
10046020-93 = "我已經說過要你停下來了吧！！#n無法溝通的話就只能逮捕你了。即便得動用武力……！！"
10046020-97 = "咦？啊……！不行不行！#n部長說一定要安裝好這個再回去！"
10046020-98 = "還在說這些亂七八糟的鬼話……！！"
10046020-103 = "什，什麼？這股力量是……！！"
10046020-115 = "唔，唔啊……？唔啊啊啊……？？"
10046020-116 = "[s9]「蓮實被舉起來了……！？」\n[s10]「那個招式是……翻摔！？」"
10046020-127 = "咳，咳咳！！怎，怎麼可能……！#n天底下居然有這麼荒唐的事！？"
10046020-128 = "我這輩子還是第一次整個人被舉起來甩出去……！！"
10046020-129 = "你別這樣，再等我一下下嘛！#n我把炸彈裝好之後馬上就走！"
10046020-130 = "所以說那到底是什麼意思啊！！#n為什麼能說得一副理直氣壯的樣子！！"
10046020-131 = "[s11]「嗯……畢竟是惠嘛……」\n[s12]「完全是蓮實不擅長對付的類型呢……」"
10046020-134 = "[ns13]「還是交給我來談吧。」\n[ns14]「雖然感覺行不通，姑且還是試試看吧……」"
10046020-137 = "不，老師。#n這裡……請交給我吧。"
10046020-138 = "身為實現正義部的一員，我實在無法受到這種對待還無動於衷。#n這是自尊的問題！"
10046020-139 = "就算武器留在戰車上……#n即便必須徒手格鬥，我也不會輸給格黑娜的學生──"
10046020-140 = "更不會輸給恐怖分子！！"
10046020-144 = "……什麼？"
10046020-145 = "對方擁有徒手完成溫泉工程的怪力？"
10046020-146 = "那……"
10046020-151 = "那又如何！我才不會輸給格黑娜的學生！！！"
10046020-152 = "[ns15]「就知道你會這麼說。」\n[ns16]「果然踩到逆鱗了啊……」"
10046020-157 = "我要上了，格黑娜的怪力女！！覺悟吧！！"
10046020-158 = "哎唷～！我還得趕快裝完這個回去耶！！#n再等我一下下嘛！"
10046020-159 = "你根本沒在聽我說話吧！！#n到底想把我氣到什麼程度！！"
10046020-186 = "怎，怎麼了？#n我聽到了東西碎裂的聲音，所以才趕緊過來看看……！！"
10046020-190 = "……咦？"
10046020-200 = "什麼……？？"
10046020-212 = "唔……咳，咳咳……！！"
10046020-213 = "到，到底發生了什麼事……"
10046020-218 = "啊啊啊啊──！！我再也忍不下去了！！"
10046020-222 = "蓮，蓮實前輩……？"
10046020-228 = "請冷靜……！總之先冷靜下來好好談談……！"
10046020-229 = "凡事以和為貴……對吧……？"
10046020-236 = "……啊！你是上次跟部長一起搭火車的那個朋友！好久不見！"
10046020-242 = "什……"
10046020-244 = "什麼鬼啊啊啊啊啊──！？"
10046020-247 = "為，為什麼！？為什麼溫泉開發部的人會在這裡！？為什麼！？"
10046020-248 = "這次又想打什麼主意……！！"
10046020-249 = "不，無論你們打算做什麼都一樣，總之先抓起來就對了！！"
10046020-253 = "……咦，老師？"
10046020-254 = "要我先冷靜下來……？"
10046020-258 = "老師是在開玩笑嗎？#n難道你覺得溫泉開發部是懷著善意來到這裡的嗎！？"
10046020-259 = "[s17]「一花～～～！？」\n[s18]「反應居然跟蓮實一樣……」"
10046020-262 = "後果已經顯而易見。#n拖得越久，損失只會越大！！"
10046020-263 = "……什麼？"
10046020-264 = "說好的「凡事以和為貴」？"
10046020-269 = "……只有溫泉開發部是例外！#n從那天之後我就這麼決定了！！"
10046020-270 = "上吧，一花！！無論如何都要贏！！"
10046020-274 = "是！！我來抓住他，請前輩趁機攻擊吧！！"
10046020-279 = "哈啊啊啊啊──！！"
10046020-294 = "怎，怎麼回事……！#n這也太誇張了……！"
10046020-295 = "啊哈哈哈！感覺就像在摔角耶！！"
10046020-297 = "集中精神，一花！對手幾乎不是人類！！"
10046020-303 = "哈啊啊啊啊──！！"
10046020-316 = "發，發生什麼事了！？這是什麼聲音？#n聽起來像是有東西碎掉了……！！"
10046020-324 = "……咦？"
10046020-341 = "唉呦喂呀……到底是怎麼一回事……"
10046020-345 = "嗯？有其他人在嗎？#n那孩子是……？"
10046020-351 = "唔嗯～又有人來搗亂了嗎？"
10046020-352 = "部長之前說過，要是遇到這種情況就要立刻撤退。#n真可惜啊！"
10046020-353 = "咦……撤退？可惜？#n什麼意思……？"
10046020-354 = "唔嗯……！這種時候就是要頭也不回地轉身就走！#n方法之後再想就好！"
10046020-355 = "雖然可惜但也沒辦法了！#n畢竟部長說的肯定沒錯！！"
10046020-356 = "不是，先等一下。#n你是……？"
10046020-357 = "那我先走囉！祝大家有個美好的一天！！"
10046020-363 = "剛剛那位是……格黑娜？"
10046020-369 = "給我站住，格黑娜！！還沒分出勝負呢！！"
10046020-370 = "溫泉開發部──！！我絕不會放過你們！！"
10046020-375 = "哇，哇啊啊！！大家先冷靜下來！！暫停暫停！！"
10046020-377 = "（之後幫忙安撫兩人，並向彌香說明了情況）"
10046020-380 = "原來發生了這種事啊。#n而且還偏偏在今天……"
10046020-381 = "……讓您見到了這副醜態，真是非常抱歉，彌香大人。"
10046020-382 = "沒，沒關係！我完全不在意哦！#n換作是我也會這樣的嘛！嗯！！"
10046020-386 = "……老師？"
10046020-387 = "問我還好嗎？#n……為什麼？"
10046020-388 = "啊，啊啊……"
10046020-389 = "哈哈，也是啦。#n畢竟老師之前看過我那副模樣……難免會擔心吧。"
10046020-390 = "那孩子剛才的行為，實在很難往好的方面解讀。"
10046020-391 = "加上又跟格黑娜有關……"
10046020-392 = "嗯……老實說……果然會有點在意吧？"
10046020-393 = "不過……現在還是先把這裡收拾乾淨比較重要。"
10046020-394 = "要是被渚醬看到的話，一定又會擔心到玩不下去的……"
10046020-395 = "溫泉開發部的孩子……應該不會再回來了吧？"
10046020-397 = "不，正好相反！！"
10046020-401 = "咦！？"
10046020-402 = "……一花？"
10046020-407 = "對方可是溫泉開發部！#n既然他們已經盯上了這裡就絕不會善罷干休！"
10046020-408 = "整個假期都會不斷地跑來，把事情搞得一團亂！#n到時候我們只能一直演戲騙渚大人！"
10046020-409 = "老師也得負責指揮、掩護……忙得團團轉之後累得不成人形！不用想也知道！！"
10046020-410 = "不不不，就算是格黑娜也不至於會那樣……對吧，老師？"
10046020-411 = "[s19]「唔……！我的頭……！」\n[s20]「……我也不敢打包票說不會。」"
10046020-416 = "連，連老師都這麼說！？#n蓮實醬應該也覺得太小題大作了吧……？"
10046020-417 = "恕我冒昧……所謂的「常識」在格黑娜面前是不具備參考價值的。"
10046020-418 = "尤其一花還表現出了那種堅決的態度。"
10046020-419 = "既然連實現正義部最有彈性的他都如此斷言，肯定有相應的理由。"
10046020-420 = "要是不把握機會的話，未來勢必會在重要時刻前來攪局。"
10046020-421 = "今天本來沒打算節外生枝的說……"
10046020-422 = "我知道了。#n這除了是我們的假期之外，也是你們的假期。"
10046020-423 = "只要溫泉開發部這個威脅還在，你們就沒辦法安心休息吧？"
10046020-427 = "那麼，就盡快解決吧。"

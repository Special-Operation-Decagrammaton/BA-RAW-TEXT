10046020-259 = "[s17] \"Ichika?!\"\n[s18] \"You sound like Hasumi...\""
10046020-262 = "It's obvious, isn't it? If we don't stop her now, she'll ruin the place!"
10046020-263 = "...Pardon?"
10046020-264 = "...What happened to \"finding my inner peace\"?"
10046020-269 = "...the Hot Springs Department is the exception! The opposite! They have always been!"
10046020-270 = "Let's go, Ichika! We can take her!"
10046020-274 = "Yes! I'll grab her, and you strike!"
10046020-279 = "AHHHHHH!!!"
10046020-294 = "Wh-What...! No way...!"
10046020-295 = "Hahaha! Oh! You like to wrestle, too?"
10046020-297 = "Focus, Ichika! She's freakishly strong! Use your core!"
10046020-303 = "AHHHHHH!!!"
10046020-316 = "Wh-What?! What's that noise? Is someone...re-tiling the bathroom?"
10046020-324 = "...Eh?"
10046020-341 = "Ow... Wh-What was that for?"
10046020-345 = "Huh? Who's that girl?"
10046020-351 = "Hm, another one. Oh, this is too many."
10046020-352 = "The president told me to retreat if there was a crowd...and I think this qualifies. Too bad!"
10046020-353 = "Huh...? You're just leaving? It's...\"too bad\"?"
10046020-354 = "Yeah, sorry! Orders from above. I guess we still have time..."
10046020-355 = "It's a shame though, but what can you do? The president's always right..."
10046020-356 = "Wait, hold on. Before that, you're...?"
10046020-357 = "I gotta blast! Have a nice day, everyone!"
10046020-363 = "Was that someone from Gehen...na?"
10046020-369 = "Where are you going, you Gehenna menace?! I'm not done with you!"
10046020-370 = "Hot Springs Department! You will rue the day!"
10046020-375 = "Ahhh! Everybody, relax! Calm down! Stop!"
10046020-377 = "After the Task Force caught their breath, I explained the situation to Mika."
10046020-380 = "So that's what happened. On today, of all days..."
10046020-381 = "...I'm sorry, Mika. I made a fool of myself."
10046020-382 = "N-No! Don't apologize. You were just...following your passion. Yeah!"
10046020-386 = "...Hm? Sensei?"
10046020-387 = "Am I okay? ...Why?"
10046020-388 = "Ah... Ahh..."
10046020-389 = "Haha. Right. I appreciate your concern."
10046020-390 = "Sure, while I'm trying to be positive, I'll admit that I'm a little...irritated that this is happening on my ONE vacation."
10046020-391 = "And that it just so happened to be a Gehenna pest...again."
10046020-392 = "Hm... Honestly... I guess it's a little...hmm."
10046020-393 = "You know what? I think we should focus on cleaning up."
10046020-394 = "Nagi couldn't handle seeing a mess like this. It'd ruin the fun..."
10046020-395 = "At least the Hot Springs girl is gone..."
10046020-397 = "No, that's not right!!"
10046020-401 = "Huh?!"
10046020-402 = "...Ichika?"
10046020-407 = "The Hot Springs Department is relentless! Now that they have this place in their sights, they'll be back!"
10046020-408 = "They'll keep swarming and interrupting this beach until they get what they want! If we don't stop them now, the vacation will be ruined."
10046020-409 = "Sensei, you know the truth. The second Nagisa learns about this, the vacation will be over. She'll go back into work mode."
10046020-410 = "No, no! Even if it's Gehenna, surely it's not that bad... Right, Sensei?"
10046020-411 = "[s19] \"My head hurts just thinking about it...\"\n[s20] \"...They are pretty persistent.\""
10046020-416 = "S-Sensei thinks so, too?! And Hasumi?"
10046020-417 = "...If I may speak freely, the Gehenna students aren't known for their intellectual prowess."
10046020-418 = "And we all heard what Ichika said."
10046020-419 = "If these people managed to get even HER bothered, then they're trouble."
10046020-420 = "Moreso, if we don't stop the Hot Springs Department soon, they will show up again...likely at the worst possible time."
10046020-421 = "I just don't want to cause a scene today..."
10046020-422 = "All right. It is our vacation, but it's yours as well."
10046020-423 = "If you two can't relax while the Hot Springs Department is at large, then..."
10046020-427 = "...we should resolve this as soon as possible."

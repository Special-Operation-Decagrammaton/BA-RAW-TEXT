[translation]
10046020-1 = "ตอนที่ 2;ออนเซ็น ไครซิส"
10046020-14 = "ทำไมถึงมีคนมาอยู่ที่นี่ได้ล่ะคะ...? แล้วกำลังทำอะไรอยู่น่ะ?"
10046020-18 = "[ns1] \"เมกุ...!?\"\n[ns2] \"ทำไมเมกุถึงมาอยู่ที่นี่ล่ะ...?\""
10046020-24 = "นี่ คุณที่อยู่ตรงนั้นน่ะ! คุณมาทำอะไรคะ? หยุดเดี๋ยวนี้นะคะ!"
10046020-25 = "ที่นี่คือหาดส่วนตัวของสภาน้ำชานะคะ รู้หรือเปล่าว่าคุณบุกเข้ามาในพื้นที่ส่วนบุคคลน่ะ!"
10046020-29 = "...?"
10046020-30 = "เอ่อ ทำไมไม่ตอบล่ะ..."
10046020-35 = "หืม...? อ๊ะ มีคนมาสินะ!"
10046020-39 = "แถมมากับคุณครูด้วย! ทุกคนรู้ข่าวกันก่อนได้ยังไงเนี่ย? เรายังไม่ได้เปิดออนเซ็นกันเลยนะ?"
10046020-43 = "คุณครู...? รู้จักคุณคนนี้เหรอคะ?"
10046020-44 = "[s3] \"เอ่อ... ครูจะอธิบายให้เองนะ...\"\n[s4] \"เอ่อ... ใจเย็นๆ แล้วฟังครูก่อนนะ\""
10046020-47 = "อื้อ! ฉันเมกุจากชมรมพัฒนาออนเซ็น! พอดีหัวหน้าคาสุมิสั่งว่าให้มาติดตั้ง 'ระเบิดสำหรับพัฒนาออนเซ็น' ที่นี่น่ะ"
10046020-51 = "คะ...? ระเบิดเหรอคะ...?"
10046020-52 = "เอ่อ เดี๋ยวนะคะ เมื่อกี้ที่พูดถึง 'การพัฒนาออนเซ็น'...? อย่าบอกนะคะว่า..."
10046020-58 = "ชมรมพัฒนาออนเซ็นงั้นเหรอคะ!! นั่นคือชมรมผู้ก่อการร้ายของเกเฮนน่าไม่ใช่เหรอคะ?!"
10046020-59 = "มาขัดขวางการพักผ่อนของคนอื่นแบบนี้ ฉันไม่ยกโทษให้แน่ค่ะ เกเฮนน่า!!"
10046020-60 = "คะ...? คุณครู?"
10046020-61 = "ให้ฉันทำใจเย็นๆ แล้วให้คุยกันด้วยสันติวิธีก่อนงั้นเหรอคะ?"
10046020-66 = "จะใจเย็นๆ อยู่ได้ยังไงล่ะคะ!? คุณครูคิดว่านักเรียนเกเฮนน่าคนนั้น เข้ามาที่นี่โดยไม่มีแผนร้ายอะไรเลยงั้นเหรอคะ!?"
10046020-67 = "หรือคิดว่าเด็กคนนั้นมาด้วยเจตนาดี...?? ก็เลยโลกสวยแล้วบอกให้ฉันทำใจเย็นๆ เหรอคะ!?"
10046020-68 = "[ns5] \"ไม่ใช่ ครูก็ไม่ได้โลกสวยขนาดนั้น แต่ก็...!!\"\n[ns6] \"ครูก็อยากพูดแบบนั้นหรอกนะ แต่ก็คงพูดไม่ได้!!\""
10046020-71 = "ที่นี่คือพื้นที่ส่วนบุคคลนะคะ! การโผล่มาที่นี่ก็ถือว่าเป็นการบุกรุกอย่างผิดกฎหมายแล้วนี่คะ!?"
10046020-72 = "แล้วยังมาติดตั้ง 'ระเบิด' เพื่อพัฒนาออนเซ็นอีก...??"
10046020-73 = "หยุดเดี๋ยวนี้เลยนะคะ!! นี่คือคำสั่งของชมรมทวงความยุติธรรมค่ะ!!"
10046020-78 = "หืม...? ยังไงที่นี่ก็จะพังอยู่แล้ว งั้นทำให้เป็นออนเซ็นเลยไม่ดีกว่าหรือไง?"
10046020-79 = "ทำไมถึงคิดว่าที่นี่จะพังล่ะคะ?! มีเหตุผลอะไรสนับสนุนหรือเปล่า!!"
10046020-80 = "พอดีหัวหน้าบอกว่า 'ที่นี่ต้องพังแน่นอน' น่ะ"
10046020-81 = "หมายความว่ายังไง...???"
10046020-82 = "ไม่ได้การละ เมื่อกี้ฉันเกือบหลงกลให้คุณซะแล้ว แบบนี้เราคงพูดกันไม่รู้เรื่องแล้วค่ะ!"
10046020-83 = "[s7] \"ชมรมนี้ก็เป็นเสียอย่างนี้ละนะ...\"\n[s8] \"ครูก็เคยพูดประโยคเดียวกับฮาสุมิเลย...\""
10046020-93 = "ฉันบอกให้หยุดยังไงล่ะคะ!! คุยกันด้วยคำพูดไม่ได้จริงๆ ด้วยสินะคะ สงสัยฉันต้อง... ใช้กำลังเข้าจับกุมคุณเดี๋ยวเลยค่ะ!!"
10046020-97 = "หืม? อะไรน่ะ...! ไม่ได้นะ ไม่ได้! หัวหน้ากำชับว่าต้องติดตั้งระเบิดที่นี่ให้ได้นะ!"
10046020-98 = "พูดเรื่องเหลวไหลอะไรน่ะ...!!"
10046020-103 = "อะ... อะไรคะเนี่ย? พละกำลังนี้มัน...!!"
10046020-115 = "อะ... อ๊าา...? อ๊ายยย...??"
10046020-116 = "[s9] \"จับฮาสุมิทุ่มเลยเหรอ...?\"!\"\n[s10] \"นั่นมัน... ท่าพาวเวอร์สแลม...?!\""
10046020-127 = "แค่ก แค่ก!! นะ... นี่มันอะไรกัน...! ดื้อด้านจริงๆ เลยนะคะคุณ!?"
10046020-128 = "แต่นี่เป็นครั้งแรกในชีวิตเลยค่ะที่ฉันถูกจับทุ่มลงพื้น...!!"
10046020-129 = "อย่าเพิ่งมาห้ามกันเลยนะ รอกันเดี๋ยวเดียว! ไว้ฉันวางระเบิดเสร็จแล้วจะหนีไปเอง!"
10046020-130 = "พูดอะไรของคุณคะเนี่ย!! ทำไมพูดเหมือนนี่ไม่ใช่เรื่องใหญ่โตเลยล่ะคะ!!"
10046020-131 = "[s11] \"ไม่แปลกหรอก... ก็นี่เมกุนี่นา...\"\n[s12] \"ดูท่าจะคุยกับฮาสุมิไม่รู้เรื่องแล้วละ...\""
10046020-134 = "[ns13] \"ครูไปคุยให้เองดีกว่า\"\n[ns14] \"กับครูก็น่าจะคุยไม่รู้เรื่องเหมือนกัน แต่ครูจะลองคุยดูนะ...\""
10046020-137 = "ไม่ต้องหรอกค่ะคุณครู เรื่องนี้... ให้เป็นหน้าที่ของฉันเองค่ะ"
10046020-138 = "ในฐานะชมรมทวงความยุติธรรม ฉันยอมถูกดูหมิ่นแบบนี้ไม่ได้ค่ะ นี่เป็นเรื่องศักดิ์ศรีของฉันค่ะ!"
10046020-139 = "ถึงฉันจะเอาอาวุธไว้ในรถถัง แต่ถ้าเป็นนักเรียนโรงเรียนเกเฮนน่า..."
10046020-140 = "ต่อให้ต้องสู้มือเปล่า ฉันก็จะทำค่ะ ฉันไม่ยอมแพ้ให้ผู้ก่อการร้ายหรอก!!"
10046020-144 = "คะ...?"
10046020-145 = "คุณครูจะบอกว่าทางนั้นมีพละกำลังมากถึงขนาดที่ก่อสร้างออนเซ็นได้ด้วยตัวคนเดียว โดยไม่ต้องใช้อุปกรณ์หนักเลยเหรอคะ?"
10046020-146 = "อ่า..."
10046020-151 = "แต่ยังไงฉันก็แพ้ให้นักเรียนเกเฮนน่าไม่ได้ค่ะ!!!"
10046020-152 = "[ns15] \"ก็คงอย่างนั้นละนะ ครูกะไว้แล้วละ\"\n[ns16] \"ก็ไม่ผิดคาดหรอก...\""
10046020-157 = "มาเจอกันอีกสักตั้งค่ะ คนบ้าพลังจากเกเฮนน่า!! เตรียมตัวให้ดีเลยค่ะ!!"
10046020-158 = "โธ่เอ๊ย~! ฉันต้องรีบทำให้เสร็จแล้วกลับไปแท้ๆ!! บอกให้รอกันหน่อยไง!"
10046020-159 = "คุณไม่สนใจที่ฉันพูดเลยเหรอคะ!! จะยั่วโมโหฉันไปถึงไหนคะเนี่ย!!"
10046020-186 = "มะ... มีอะไรกันคะ? ฉันได้ยินเสียงเหมือนมีอะไรแตก ก็เลยรีบเข้ามาดูค่ะ...!!"
10046020-190 = "หืม...?"
10046020-200 = "อะไรเนี่ย...???"
10046020-212 = "อึก... แค่ก แค่ก...!!"
10046020-213 = "นะ... นี่มันเรื่องอะไรกัน..."
10046020-218 = "ฮึ่ยยยย!! ฉันทนต่อไม่ไหวแล้วค่ะ!!"
10046020-222 = "ระ... รุ่นพี่ฮาสุมิ...?"
10046020-228 = "สงบสติอารมณ์ก่อนนะคะ...! ฉันไม่รู้ว่านี่คือเรื่องอะไร แต่ฉันว่าใจเย็นๆ แล้วมาคุยกันก่อน...!"
10046020-229 = "คุยกันแบบสันติวิธี... ไง... คะ...?"
10046020-236 = "อ๊ะ...! คนที่เคยเจอบนรถไฟกับหัวหน้านี่นา? ดีใจที่ได้เจออีกครั้งนะ!"
10046020-242 = "หะ..."
10046020-244 = "หาาาาาา...!?"
10046020-247 = "ดะ... ได้ไงกัน!? ชมรมพัฒนาออนเซ็น!? ทำไม!? ทำไมคุณถึงมาอยู่ที่นี่ล่ะคะ!?"
10046020-248 = "แล้วครั้งนี้คิดจะทำอะไรอีก...!!"
10046020-249 = "ไม่สิ ต่อให้จะทำอะไรก็เถอะ! ไม่ว่าอะไรก็ไม่ได้ค่ะ! เอาเป็นว่าฉันจะจับคุณไว้ก่อน!!"
10046020-253 = "คะ...? คุณครู ว่ายังไงนะคะ?"
10046020-254 = "ให้ใจเย็นๆ ก่อนเหรอคะ...?"
10046020-258 = "พูดอะไรอย่างนั้นคะคุณครู? คิดว่าพวกชมรมพัฒนาออนเซ็นมาที่นี่ด้วยเจตนาดีงั้นเหรอคะ!?"
10046020-259 = "[s17] \"อิจิกะ!?!?\"\n[s18] \"พูดเหมือนฮาสุมิเปี๊ยบเลย...\""
10046020-262 = "มันก็แน่อยู่แล้วไม่ใช่เหรอคะ? ยิ่งรีรอมากกว่านี้ ความเสียหายก็จะยิ่งมากขึ้นค่ะ!!"
10046020-263 = "คะ...?"
10046020-264 = "ไหนว่าฉันแนะนำให้ 'คุยกันแบบสันติวิธี' น่ะเหรอคะ?"
10046020-269 = "วิธีแบบนั้นใช้กับชมรมพัฒนาออนเซ็นไม่ได้หรอกค่ะ! หลังจากเรื่องวันนั้นฉันก็คิดแบบนี้เลยค่ะ!!"
10046020-270 = "ลุยกันเลยค่ะ อิจิกะ!! ไม่ว่าจะเกิดอะไรขึ้น เราก็ต้องชนะให้ได้ค่ะ!!"
10046020-274 = "ค่ะ!! ฉันจะจับเอาไว้ให้เอง รุ่นพี่เป็นคนลงมือเลยค่ะ!!"
10046020-279 = "ย้ากกกก!!"
10046020-294 = "ทะ... ทำไมถึงเป็นแบบนี้ไปได้...! เหลือจะเชื่อเลย...!"
10046020-295 = "อะฮะฮะฮ่า! เหมือนได้เล่นมวยปล้ำเลย!!"
10046020-297 = "ตั้งสติไว้ค่ะ อิจิกะ! อีกฝ่ายแรงดีเหนือมนุษย์เลยค่ะ!!"
10046020-303 = "อ๊ายยยย!!"
10046020-316 = "อะ... อะไรน่ะ!? เสียงอะไร? เหมือนมีอะไรแตกเลย...!!"
10046020-324 = "หืม...?"
10046020-341 = "เอ่อ... นะ... นี่มันเรื่องอะไรน่ะ..."
10046020-345 = "เอ๋? มีคนอื่นอยู่อีกเหรอ? เด็กคนนั้นคือ...?"
10046020-351 = "หืม~ มีคนมารบกวนการทำงานอีกแล้ว?"
10046020-352 = "ถ้าเจอคนมาขัดขวางหลายคน หัวหน้าบอกว่าไม่ต้องสู้แล้วให้กลับมาเลย น่าเสียดายชะมัด!"
10046020-353 = "หืม...? จะกลับดื้อๆ เลยเหรอ? แล้วที่บอกว่าเสียดายคืออะไรกัน...?"
10046020-354 = "อื้อ...! ก็ฉันได้คำสั่งว่าถ้าเจอเหตุการณ์แบบนี้ ก็ให้วางมือจากงานแล้วกลับเลยน่ะสิ!"
10046020-355 = "ถึงจะเสียดาย แต่ก็ช่วยไม่ได้ละนะ! คำสั่งของหัวหน้าต้องมาก่อนอยู่แล้ว!!"
10046020-356 = "ไม่สิ เดี๋ยวก่อน ว่าแต่เธอเป็นใคร...?"
10046020-357 = "งั้นฉันขอตัวก่อนละนะ! ขอให้วันนี้เป็นวันที่ดีนะทุกคน!!"
10046020-363 = "เมื่อกี้นี้... เด็กเกเฮน... น่า?"
10046020-369 = "จะหนีไปไหนคะ เกเฮนน่า!! เรายังสู้กันไม่จบเลยนะคะ!!"
10046020-370 = "ชมรมพัฒนาออนเซ็น!! ฉันไม่ยกโทษให้หรอกค่ะ!!"
10046020-375 = "อะ... อ๊าา!! ทุกคน เดี๋ยวก่อน!! ใจเย็นๆ ก่อน!! หยุดน้าา!!"
10046020-377 = "(หลังจากสงบสติอารมณ์ได้ ทั้ง 2 คนก็อธิบายสิ่งที่เกิดขึ้นให้มิกะฟัง)"
10046020-380 = "เกิดเรื่องแบบนั้นสินะ ทำไมต้องเป็นวันนี้ด้วย..."
10046020-381 = "ขอโทษค่ะ คุณมิกะ... ฉันจัดการได้ไม่ดีเลยละค่ะ"
10046020-382 = "มะ... ไม่เลย! ฉันไม่ได้จะโทษอะไรเลยต่างหาก! ฉันเข้าใจพวกเธอทั้ง 2 คนนะ! อื้อ!!"
10046020-386 = "หืม...? คุณครู?"
10046020-387 = "แล้วฉันโอเคมั้ยน่ะเหรอ? ทำไมเหรอ...?"
10046020-388 = "อ่า... อ่าา..."
10046020-389 = "แหะๆ นั่นสินะ เมื่อกี้ฉันให้คุณครูได้เห็นด้านที่ไม่น่ารักของฉัน... ก็เลยกังวลสินะ"
10046020-390 = "ว่าแต่เด็กคนนั้นน่ะ ต่อให้จะคิดในแง่บวกยังไง ฉันก็คงคิดว่าเข้ามาด้วยเจตนาดีไม่ได้"
10046020-391 = "แล้วยังเป็นเด็กจากเกเฮนน่าอีก..."
10046020-392 = "อืม... บอกตามตรงว่า... ฉันก็ไม่ได้อยากปล่อยไปนักหรอก"
10046020-393 = "แต่ถึงยังไง... ฉันคิดว่าตอนนี้เราต้องเก็บกวาดตรงนี้กันก่อนน่ะ"
10046020-394 = "ถ้าได้เห็นห้องอาบน้ำในสภาพนี้ นางิจังก็คงเครียดจนไม่อยากพักผ่อน..."
10046020-395 = "แล้วก็คงไปไล่ตามชมรมพัฒนาออนเซ็นหรืออะไรนั่นด้วย"
10046020-397 = "ไม่หรอกค่ะ ไม่มีทางเป็นแบบนั้นแน่ค่ะ!"
10046020-401 = "หืม?!"
10046020-402 = "อิจิกะ...?"
10046020-407 = "ชมรมพัฒนาออนเซ็นนั่นน่ะค่ะ! ถ้าหมายตาสถานที่นี้ไว้แล้ว เดี๋ยวก็คงกลับมาอีกค่ะ!"
10046020-408 = "พวกนั้นต้องบุกรุกเข้ามาแล้วทำลายวันหยุดพักผ่อนของสภาน้ำชาแน่นอนค่ะ! แล้วถ้าเป็นแบบนั้น พวกเราก็ต้องเล่นละครเพื่อเบี่ยงเบนความสนใจคุณนางิสะค่ะ!"
10046020-409 = "แล้วระหว่างนั้นคุณครูก็คงต้องเข้ามาช่วยสั่งการและช่วยเล่นละครตบตาจนเหนื่อยไปด้วย! เชื่อฉันได้เลยค่ะ!"
10046020-410 = "ไม่หรอกน่า! ต่อให้เป็นเด็กเกเฮนน่า แต่ก็ไม่น่าจะจัดการยากขนาดนั้นหรอก... ใช่มั้ย คุณครู?"
10046020-411 = "[s19] \"อึก...! จู่ๆ ก็ปวดหัวขึ้นมา...!\"\n[s20] \"ครูรับประกันไม่ได้แฮะ...\""
10046020-416 = "มะ... แม้แต่คุณครูก็คิดแบบนี้เหรอ?! งั้นฮาสุมิจังก็ด้วยหรือเปล่า...?"
10046020-417 = "ถ้าจะขอความเห็นจากฉันละก็... คงต้องบอกว่าถ้าจะสู้กับเกเฮนน่า เราจะสู้ด้วย 'สามัญสำนึก' ไม่ได้ค่ะ"
10046020-418 = "และที่สำคัญกว่านั้นก็คือท่าทีที่เฉียบขาดของอิจิกะ"
10046020-419 = "ถ้าอิจิกะที่เป็นคนยืดหยุ่นที่สุดในชมรมทวงความยุติธรรมถึงกับยืนกรานแบบนั้น ก็แสดงว่าต้องมีเหตุผลให้คิดแบบนั้นค่ะ"
10046020-420 = "ตอนนี้ถ้าเราพลาดจังหวะนี้ไป ดีไม่ดีพวกนั้นอาจบุกเข้ามาใหม่ในช่วงเวลาสำคัญของทริปนี้ก็ได้ค่ะ"
10046020-421 = "วันนี้ฉันไม่อยากให้มีเรื่องใหญ่โตแท้ๆ เชียว"
10046020-422 = "ก็ได้ ถึงนี่จะเป็นวันพักผ่อนของสภาน้ำชา แต่ก็เป็นวันพักผ่อนของทั้ง 2 คนด้วย"
10046020-423 = "ถ้ายังมีเรื่องชมรมพัฒนาออนเซ็นให้เป็นกังวล พวกเธอก็คงไม่ได้พักผ่อนอย่างเต็มที่ด้วยใช่มั้ยล่ะ?"
10046020-427 = "งั้นเราก็มาปิดจบเรื่องนี้ให้เร็วที่สุดดีกว่า"

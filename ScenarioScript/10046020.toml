10046020-93 = "I told you to stop! If words aren't enough for you, then I'll use force!"
10046020-97 = "Huh? Uh...! Hey, relax! The president said I had to install this. It's not a big deal."
10046020-98 = "What? This is ridiculous...!!"
10046020-103 = "Wh-Why is she so strong?!"
10046020-115 = "W-Waaah...? Ahhhh...?"

[translation]
10005005-1 = "บทเริ่มต้น;สมาชิกใหม่ของ C&C"
10005005-3 = "...เคลียร์ ลอบเข้ามาได้สำเร็จ"
10005005-4 = "ทางนี้ก็เคลียร์ ตรวจสอบแล้วว่าไม่มีใคร"
10005005-5 = "ดีล่ะ..."
10005005-11 = "ห้องเครื่องภายในเรือโกลเด้น ฟลีซ"
10005005-14 = "เฮ้อ... อะไรเนี่ย? ไม่เห็นมีอะไรอย่างที่คิดเลยนะ?"
10005005-15 = "ไม่อยากจะเชื่อเลยว่าฉันต้องลักลอบเข้ามาในเรือสำราญที่ล่องอยู่กลางทะเลเปิดแบบนี้..."
10005005-16 = "แถมยังเป็นเรือของโรงเรียนอื่นที่ไม่ใช่ของมิลเลเนียมอีก ประสบการณ์แบบนี้เพิ่งเคยเจอเป็นครั้งแรก#nเลย"
10005005-17 = "โล่งอกไปทีค่ะ ดูเหมือนจะยังไม่มีใครสังเกตเห็นพวกเรานะคะ"
10005005-18 = "ฮุฮุ ถ้างั้นก็ถือว่าเป็นไปได้ด้วยดีตามแผนใช่มั้ยคะ?"
10005005-19 = "เฮ้อ..."
10005005-20 = "ตามแผนอะไรกันล่ะ แค่เริ่มก็เจอปัญหาแล้ว"
10005005-21 = "ไม่สบอารมณ์เลย... ไม่ถูกใจมาตั้งแต่ต้นแล้ว...!"
10005005-22 = "ทั้งเรื่องที่ต้องทำตามคำสั่งของยัยนักบัญชีของเซมิน่านั่น แล้วก็เรื่องที่ต้องทำอะไรลับๆ ล่อๆ แบบนี้!"
10005005-23 = "ยิ่งไปกว่านั้น..."
10005005-24 = "...(มองแรง)"
10005005-25 = "[s1] \"ขอฝากตัวด้วยนะ เนรุ\"\n[s2] \"ครูอยู่ด้วยก็เลยหงุดหงิดเหรอ?\""
10005005-26 = "ฝากตงฝากตัวอะไร รู้รึเปล่าว่าสิ่งที่ฉันหงุดหงิดที่สุดก็คือ คนที่ได้รับหน้าที่มาจับตาดูพวกเรา#nไม่ใช่ใครอื่น... แต่เป็นครูไงล่ะ!"
10005005-27 = "ก็ใช่น่ะสิ สิ่งที่ฉันหงุดหงิดที่สุดก็คือ คนที่ได้รับหน้าที่มาจับตาดูพวกเราไม่ใช่ใครอื่น... แต่เป็นครูไงล่ะ!"
10005005-28 = "[s] \"ครูไม่ได้มาเพราะเรื่องนั้นสักหน่อย...\""
10005005-29 = "อ่ะฮะฮะ... ไม่เป็นไรหรอกค่ะ พวกเราไม่ได้รู้สึกไม่ดีเรื่องที่คุณครูมาด้วยหรอกนะคะ"
10005005-30 = "แต่มันอาจจะเป็นปัญหาจากสถานการณ์ก็ได้ค่ะ"
10005005-31 = "คุณครูอาจไม่ได้มีเจตนาแบบนั้น แต่ที่ทางเซมิน่าส่งคุณครูมา... ก็เพราะเจตนาแบบนั้นน่ะ"
10005005-32 = "โอ๊ย จริงๆ เลย! น่าโมโหจริงๆ! ทำไมถึงกลายเป็นแบบนี้ไปได้กันเนี่ย? หา?"
10005005-33 = "เดี๋ยวจะหาทางจัดการเองงั้นเหรอ? ให้ตายเถอะ... ถ้าจะให้ทำงานก็แค่สั่งมาแล้วก็รออยู่เฉยๆ สิ...!"
10005005-34 = "อ่ะฮะฮะ..."
10005005-35 = "อืม..."
10005005-36 = "ก็นะ..."
10005005-37 = "รู้สึกเหมือนกรรมตามสนองเลยแฮะ..."
10005005-39 = "(สองวันก่อน...)"
10005005-42 = "เชื่อมต่อเรียบร้อยค่ะ ยืนยันจากอาคาเนะ C&C"
10005005-43 = "ไม่พบปัญหาการรับสัญญาณค่ะ"
10005005-44 = "อา...อา... อื้อ ทางนี้ก็ไม่มีปัญหา"
10005005-45 = "เฮ้อ... สุดท้ายก็เป็นแบบนี้สินะ"
10005005-46 = "ฮุฮุ ดูแล้ว... คงจะมีภารกิจอื่นที่จะไหว้วานต่อสินะคะ"
10005005-47 = "ไหนๆ ก็เป็นแบบนี้แล้ว คิดในทางที่ดีจะดีกว่ามั้ยคะ? เพราะไม่ว่ายังไงพวกฉันก็ทำตามเป้าหมาย#nได้สำเร็จเสมอนี่คะ"
10005005-48 = "ปัญหามันต่อจากนั้นต่างหากล่ะ! คงยังไม่ลืมหรอกใช่มั้ยว่าใครต้องมาตามล้างตามเช็ดเรื่องที่#nพวกเธอเก็บกวาดไว้อีกทีน่ะ"
10005005-49 = "ถึงทุกครั้งจะขอให้จัดการเงียบๆ แต่พวกเธอก็ไม่สนเรื่องนี้เลยไม่ใช่รึไง"
10005005-50 = "ทุกครั้งจะต้องก่อเรื่องจัดหนักจัดเต็มกันไม่เลิก แถมทำอุปกรณ์พังยับเยินอีกด้วย!"
10005005-51 = "เพราะแบบนั้นฉันเลยต้องมานั่งปวดหัวทุกรอบเลยไงเล่า! เมื่อเดือนที่แล้วค่าใช้จ่ายจากภารกิจ#nเกินงบตั้ง 6 เท่าเลยนะ...!"
10005005-52 = "ถึงจะพูดแบบนั้นก็เถอะ... แต่คราวนี้จะไม่ไหว้วานก็ไม่ได้"
10005005-53 = "ฮุฮุ เพราะฉันคิดแผนเอาไว้แล้วยังไงล่ะ"
10005005-54 = "คะ...? คิดแผนไว้แล้วเหรอคะ..."
10005005-55 = "ทักทายสิ ผู้สังเกตการณ์ที่จะเข้าร่วมปฏิบัติการครั้งนี้ด้วย"
10005005-60 = "คนคนนี้จะเป็นคนคอยดูว่าทุกคนทำงานเท่าที่จำเป็นจริงๆ และไม่ก่อปัญหาเกินเหตุ"
10005005-61 = "มันเป็นแค่ขั้นตอนตรวจสอบเท่านั้นน่ะ อย่าคิดมากไปเลย"
10005005-62 = "อ่ะฮะฮะ... แต่ว่า..."
10005005-63 = "เอ๊ะ...?"
10005005-67 = "คุณครู...?"
10005005-69 = "เฮ้อ... เจ้าพวกเซมิน่า จริงๆ คราวนี้ฉันโดนเข้าเต็มเปาเลย"
10005005-70 = "ไม่คิดเลยว่าจะหาเรื่องให้พวกเราลำบากกันขนาดนี้"
10005005-71 = "จัดหนักจัดเต็มงั้นเรอะ? หางานให้ห้องพยาบาลได้ไม่หยุดเรอะ? แล้วมันเป็นยังไงไม่ทราบ...?"
10005005-72 = "แค่ทำงานให้เสร็จก็พอไม่ใช่รึไง? มันเป็นหน้าที่ของยัยนั่นที่ต้องจัดการเรื่องค่าใช้จ่ายตั้งแต่แรก#nแล้วไม่ใช่รึไง"
10005005-73 = "เฮ้อ พอมาคิดดูดีๆ แล้วมันน่าโมโหจริงๆ งานคราวนี้ก็บุกเข้าไปโต้งๆ เลยดีมั้ย?"
10005005-74 = "ไม่ได้นะรุ่นพี่ แบบนั้นไม่ไหวหรอก นี่ไม่ใช่เรือของมิลเลเนียมนะ..."
10005005-75 = "ไม่ว่ายังไงเรื่องนี้ก็คงเป็นปัญหานะคะ อาจทำให้เกิดปัญหาระหว่างโรงเรียนขึ้นได้..."
10005005-76 = "แล้วมันยังไงล่ะ? ถ้าจะเป็นปัญหาระหว่างโรงเรียน ก็แค่ซัดให้ราบคาบไปเลยก็ได้นี่!"
10005005-77 = "ถ้าไม่มั่นใจละก็ ฉันจะจัดการให้เอง แค่จัดการที่นี่ให้ราบคาบก็เสร็จภารกิจแล้วใช่มั้ย ใช่มั้ยล่ะ?"
10005005-78 = "[s3] \"ครูคิดว่าแบบนั้นไม่ได้หรอกนะเนรุ\"\n[s4] \"ถึงยังไงก็คงเห็นด้วยไม่ได้หรอกนะ...\""
10005005-79 = "หา...?"
10005005-80 = "หา...?"
10005005-86 = "นี่คุณครู เมื่อกี้ว่ายังไงนะ? จะคัดค้านงั้นเหรอ?"
10005005-87 = "ครูเองก็จะเป็นไปด้วยใช่มั้ย? คิดจะเข้าข้างยัยนักบัญชีนั่นใช่มั้ย!?"
10005005-88 = "[s5] \"อื้อ\"\n[s6] \"ไม่ได้ก็คือไม่ได้\""
10005005-89 = "อ่า... เอ่อ..."
10005005-90 = "เอ่อ... เอ่อออ..."
10005005-91 = "อืม..."
10005005-95 = "อึกกก! จริงๆ เลย...! ให้ตายเถอะ...!! อ๊าาาาา~!!!"
10005005-96 = "ฮู่ว... เข้าใจแล้วละ เข้าใจแล้ว! แค่ไม่ทำก็พอใช่มั้ยล่ะ?"
10005005-97 = "แต่ยังไงเรื่องคราวนี้ก็ไม่ถูกใจเอาซะเลย..."
10005005-102 = "โอ๊ะ..."
10005005-103 = "อาคาเนะ... เห็นเหมือนกันใช่มั้ย?"
10005005-104 = "ค่ะ คาริน ฉันก็คิดเหมือนกันค่ะ ถึงวิธีของคุณนักบัญชีของทางเซมิน่าจะไม่น่ารื่นรมย์สักเท่าไร..."
10005005-105 = "ฮุฮุ แต่อย่างน้อยก็ได้ผลนะคะ เพราะถึงจะเป็นหัวหน้า แต่ยังไงก็ต้องฟังที่คุณครูพูดสินะคะ"
10005005-106 = "หรือว่าคุณยูกะก็ไม่ได้คิดเรื่องจับตาดูตั้งแต่แรกแล้ว แต่เธอรู้ว่าจะเป็นแบบนี้ก็เลย..."
10005005-107 = "หนวกหูน่า! เอาเป็นว่าวันนี้ฉันอารมณ์ไม่ค่อยดี อย่ามากวนประสาทกันล่ะ เข้าใจมั้ย?"
10005005-108 = "ค่ะ ได้ค่ะ"
10005005-109 = "แล้วก็คุณครู... อย่างที่คุณครูบอก งานคราวนี้เราจะจัดการอย่างเงียบๆ โดยไม่มีการต่อสู้เลยค่ะ"
10005005-110 = "ไม่ว่าจะมาด้วยเหตุผลอะไร แต่ต่อจากนี้ไปคุณครูก็จะต้องร่วมมือกับเราแล้ว... งั้นก็รับบอร์ดดิ้งพาสนี่#nไปนะคะ..."
10005005-112 = "อะไรเนี่ย? นายท่านนี่นา!"
10005005-113 = "วันนี้มาทำงานกับพวกเราเหรอ?"
10005005-114 = "มาร่วมทีมเหรอ? เป็นสมาชิกใหม่ของ C&C เหรอ!?"
10005005-119 = "คะ...?"
10005005-120 = "...?"
10005005-121 = "สมาชิกใหม่ของ C&C? คุณครูน่ะเหรอ?"
10005005-122 = "ก็นะ... มองว่าคราวนี้เป็นโอกาสพิเศษแล้วกัน อืม..."
10005005-123 = "ตายจริง... ฮิฮิ ถ้าเป็นแบบนั้นก็น่าสนุกดีนะคะ"
10005005-124 = "คุณครูเป็นหนึ่งในสมาชิกของชมรมเรา... ฉันชักสนใจงานนี้ขึ้นมานิดหน่อยแล้วค่ะ"
10005005-126 = "หัวหน้าคิดว่ายังไงคะ? พอเป็นแบบนี้แล้วภารกิจดูน่าทำขึ้นมาบ้างมั้ยคะ?"
10005005-127 = "หา? พูดบ้าอะไร!? เรื่องแบบนี้ไม่มีทางทำให้ฉันอารมณ์ดีขึ้นมาหรอกนะ!"
10005005-128 = "อื้อ! ฉันโอเคนะ หัวหน้าไม่ชอบเหรอ?"
10005005-129 = "เฮ้อ ให้ตายสิ คิดว่าคนอื่นเขาเป็นเด็กอายุสิบขวบรึไง..."
10005005-130 = "ถึงปากจะพูดแบบนั้น แต่สีหน้าแสดงออกอีกอย่างเลยนะ..."
10005005-131 = "ยะ... อย่ามาพูดอะไรไม่เข้าเรื่องน่า! ฉันไม่ได้สนุกด้วยสักหน่อย ไม่ได้ชอบเรื่องพรรค์นี้เลยสักนิดเดียว!"
10005005-132 = "[s7] \"ครูว่าน่าจะสนุกมากเลยนะ\"\n[s8] \"วันนี้ขอรบกวนด้วยนะ\""
10005005-135 = "อึก..."
10005005-136 = "อึกกก...!!"
10005005-140 = "..."
10005005-141 = "กะ... ก็ได้ ฉันว่ามันก็ไม่ได้แย่ไปซะทั้งหมดหรอกนะ..."

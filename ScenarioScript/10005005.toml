[translation]
10005005-1 = "序幕;C&C的臨時新成員"
10005005-3 = "……這裡沒有問題。"
10005005-4 = "……我這裡也是，沒有問題。"
10005005-5 = "……OK。"
10005005-11 = "黃金芙利號．機房"
10005005-14 = "……總覺得，有點失望啊？"
10005005-15 = "偷偷潛入其他學校的郵輪……"
10005005-16 = "雖然是初次體驗，能順利真是太好了。"
10005005-17 = "看來我們似乎還沒被發現呢。"
10005005-18 = "呵呵，這樣一來似乎能順利進行呢？"
10005005-19 = "……唉。"
10005005-20 = "要說「問題」的話，這個委託本身打從一開始就全是問題吧……"
10005005-21 = "啊啊，真不爽……"
10005005-22 = "不管是服從那個會計，還是不得不像這樣偷偷摸摸地行動……"
10005005-23 = "更重要的是……"
10005005-24 = "（盯）"
10005005-25 = "[s1]「請多指教。」\n[s2]「怎麼了嗎？」"
10005005-26 = "老師跟我們一起來這點最讓人無法理解了！？過來監視只會妨礙我們而已啊！"
10005005-27 = "老師跟我們一起來這點最讓人無法理解了！？過來監視只會妨礙我們而已啊！"
10005005-28 = "[s]「唔嗯，該說是監視還是什麼呢……」"
10005005-29 = "啊哈哈……不好意思，隊長絕不是「不喜歡和老師在一起」的意思……"
10005005-30 = "會變成這樣也是因為研討會那邊的關係……"
10005005-31 = "事到如今說什麼都沒有用。這也不是老師的錯。"
10005005-32 = "啊～真是的麻煩死了！"
10005005-33 = "別對我們的做法指指點點的啊那些傢伙，讓我們放手去做啊……！"
10005005-34 = "不過，這也沒辦法呢……"
10005005-35 = "呼……"
10005005-36 = "該怎麼說呢……"
10005005-37 = "要說「這不是我們的錯」的話，也是騙人的……"
10005005-39 = "（時間回溯到2天以前……）"
10005005-42 = "……是，這裡是C&C的朱音。"
10005005-43 = "能聽見嗎？"
10005005-44 = "OK，可以聽見。"
10005005-45 = "那我就直接說重點了，唉……"
10005005-46 = "呵呵，和往常一樣要進行委託嗎？"
10005005-47 = "用不著這樣一邊嘆氣一邊告知委託內容吧……委託最後不是都有完成嗎？"
10005005-48 = "我當然知道！所以我才會像這樣再來委託你們啊！問題在那之後！！"
10005005-49 = "別告訴我你們忘記每次都是誰來善後的……#n我明明說要「安靜地處理」，卻每次都被當成耳邊風不是嗎……"
10005005-50 = "每次都弄壞一堆東西，或是把建築物炸飛……#n你們知道每次請款單的金額有多少嗎！？"
10005005-51 = "真的是讓人頭痛的根源啊……上個月也是花費了原本6倍預算……#n不過儘管如此，該說還是得拜託你們，還是不得不拜託你們呢……"
10005005-52 = "……但是。"
10005005-53 = "我可不會總是為了這種事情傷腦筋。"
10005005-54 = "……？那是什麼意思……？"
10005005-55 = "這次的委託，要請你們跟一個人同行。"
10005005-60 = "為了不讓你們做得太過頭，可以說是擔任剎車的角色吧。#n但是別擔心，那個人你們也非常熟悉。"
10005005-61 = "一再膨脹的損害情況，真的是無可避免的嗎……至少得讓我確認一下才行對吧？"
10005005-62 = "那個，你的意思是……？"
10005005-63 = "……哎呀？"
10005005-67 = "老師？"
10005005-69 = "啊啊，真是做不下去了……"
10005005-70 = "沒想到會變成這樣……"
10005005-71 = "真是的，稍微弄壞一點東西或破壞一點建築物又怎樣……？"
10005005-72 = "反正委託已經完成了，之後的善後工作本來就是他們該做的吧。"
10005005-73 = "啊啊……一想到就覺得生氣。#n要不要故意一邊破壞一邊前進？"
10005005-74 = "呃，隊長，再怎麼說那樣也有點……#n這裡可是千年的領域之外……"
10005005-75 = "說的沒錯，不可以隨意引起學校間的糾紛。"
10005005-76 = "誰管那種事啊……有問題的話就把他們全部打飛不就好了？"
10005005-77 = "基本上大部分的事只要破壞掉就解決、結束了。"
10005005-78 = "[s3]「暫停暫停。」\n[s4]「在那之前要不要再努力一下？」"
10005005-79 = "……啊？"
10005005-80 = "……啊？"
10005005-86 = "什麼，你有什麼意見嗎？"
10005005-87 = "還是說，老師你也是站在那個會計那邊的嗎？"
10005005-88 = "[s5]「總之就是不行。」\n[s6]「寧瑠想做的話是能安靜解決的不是嗎？」"
10005005-89 = "……哈啊？"
10005005-90 = "……哈啊？"
10005005-91 = "呃……"
10005005-95 = "啊～……怎麼會這樣……咕……啊啊……"
10005005-96 = "……啊啊真是，知道了知道了！老實做就行了吧……"
10005005-97 = "啊真是，所以才說做不下去啊……這個氣氛是怎樣……"
10005005-102 = "……哦哦。"
10005005-103 = "朱音，發生不得了的事了。"
10005005-104 = "就是啊，我也這麼覺得。#n本來還對這個做法究竟會有什麼改變半信半疑的……"
10005005-105 = "呵呵，這麼老實聽話的隊長可不常見呢。"
10005005-106 = "難道說實際上的目的與其說是監視，不如說是像這樣抑制隊長嗎？"
10005005-107 = "嘰嘰喳喳的真囉嗦啊，趕快走吧！啊啊真是，亂七八糟的……"
10005005-108 = "呵呵。是，確實差不多該採取行動了呢。"
10005005-109 = "那麼老師，雖然我想今天應該不會特別有什麼戰鬥，不過還是拜託您了。"
10005005-110 = "啊啊，話說回來，這張船票也給老師。這次您是和我們一起以團體的身分被招待的。"
10005005-112 = "咦，所以主人和我們是同一個隊伍的意思？"
10005005-113 = "也就是說實質上……"
10005005-114 = "是C&C的新成員嘛！！"
10005005-119 = "……？"
10005005-120 = "……啊？"
10005005-121 = "C&C的新成員……老師嗎？"
10005005-122 = "雖然是暫時的，但今天或許真的是那樣呢……"
10005005-123 = "呵呵，確實是那樣呢。"
10005005-124 = "那麼，儘管只是臨時的，也算是新成員……#n既然是同一個隊伍的夥伴，就必須要好好相處才行呢？"
10005005-126 = "所以說，也請隊長要好好相處哦。#n這可是難得新成員的初次上陣，不可以總是一副不開心的樣子唷？"
10005005-127 = "我才沒有，話說就算要好好相處，也不可能立刻就說「已經打好關係了」吧！"
10005005-128 = "啊哈哈，越來越有趣了呢？#n來嘛，隊長也笑一個笑一個！！"
10005005-129 = "受不了，真煩啊……"
10005005-130 = "雖然嘴巴上這麼說，今天隊長的表情看起來挺不錯的。#n不如說很開心。"
10005005-131 = "都說你們很煩了吧！我一點也不開心啊！？"
10005005-132 = "[s7]「我倒是挺興奮的。」\n[s8]「那麼就請你們多多指教囉。」"
10005005-135 = "都說了……！"
10005005-136 = "……啊啊真是的！！"
10005005-140 = "……唉。"
10005005-141 = "算了，也不是不行……"

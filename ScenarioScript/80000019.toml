[translation]
80000019-1 = "#title;이벤트 아이템"
80000019-2 = "#place;게임개발부 부실"
80000019-3 = "#na;(오랜만에 게임개발부 부실에 들려 유즈와 온라인 RPG 게임을 했다.)"
80000019-4 = "#st;[0,0];instant;1;"
80000019-5 = "#clearST"
80000019-6 = "#wait;500"
80000019-7 = "#wait;250"
80000019-8 = "#wait;750"
80000019-9 = "#wait;1000"
80000019-10 = "3;유즈;02;앗, 선생님. 적 보스가 방금 그쪽으로 갔어요.\n#3;em;[반응]\n#3;a"
80000019-11 = "3;유즈;05;적의 체력도 이제 거의 바닥났으니, 이번 공격만 버티면 레이드를 성공시킬 수 있을 거예요."
80000019-12 = "3;유즈;05;제가 공격 스킬을 준비할 때까지…… 조금만 버텨주세요!"
80000019-13 = "#st;[0,0];instant;1;"
80000019-14 = "#clearST"
80000019-15 = "#wait;2000"
80000019-16 = "#wait;500"
80000019-17 = "#wait;500"
80000019-18 = "#wait;1500"
80000019-19 = "#wait;2000"
80000019-20 = "3;유즈;07;성공했어요, 선생님!\n#3;jump\n#3;em;[반응]"
80000019-21 = "3;유즈;03;선생님 덕분에 제일 어려운 난이도의 레이드를 무사히 통과할 수 있었어요."
80000019-22 = "3;유즈;03;저 혼자였더라면 해낼 수 없었을 텐데…… 도와주셔서 정말 감사합니다!\n#3;greeting\n#3;em;[반짝]"
80000019-23 = "[s] \"유즈가 거의 혼자서 다 해치운 것 같지만…….\""
80000019-24 = "3;유즈;02;그, 그렇지 않아요. 제가 무사히 보스를 공략할 수 있었던 것도, 다 선생님께서 계속 버프를 걸어 주신 덕분인걸요.\n#3;em;[///]\n#3;stiff"
80000019-25 = "3;유즈;01;게다가 이 게임의 보스 레이드는 시스템상 혼자서는 참가하는 게 불가능하기도 하고……."
80000019-26 = "3;유즈;07;우선은 레이드에서 구한 전리품을 함께 나누어 볼까요?\n#3;greeting\n#3;em;[음표]"
80000019-27 = "#all;hide"
80000019-28 = "3;유즈;03;이 검은 이미 가지고 있고, 이 갑옷도 제가 가진 것보다 낮은 등급…….\n#3;em;[...]\n#3;a"
80000019-29 = "3;유즈;07;오늘 레이드에서 나온 전리품은 선생님이 다 가져가셔도 괜찮을 것 같아요."
80000019-30 = "[s] \"정말 그래도 괜찮아?\""
80000019-31 = "3;유즈;03;괜찮아요. 원했던 물건은 따로 있거든요.\n#3;em;[반응]"
80000019-32 = "#st;[0,0];instant;1;"
80000019-33 = "#clearST"
80000019-34 = "3;유즈;99\n#3;em;…\n#wait;2500"
80000019-35 = "3;유즈;01;그리고 저……\n#3;stiff"
80000019-36 = "3;유즈;02;선생님, 이 아이템도 받아주시겠어요?\n#3;m5"
80000019-37 = "#wait;2500"
80000019-38 = "[s] \"……이건?\""
80000019-39 = "3;유즈;02;이번 발렌타인 데이 이벤트 중에만 구할 수 있는 특별한 초콜릿 아이템이에요.\n#3;m3"
80000019-40 = "3;유즈;01;단순한 체력 회복 아이템일 뿐이지만…… 그래도 이렇게라도 선생님께 초콜릿을 선물해 드리고 싶어서…….\n#3;em;[///]\n#3;stiff"
80000019-41 = "3;유즈;02;물론 진짜 초콜릿을 선물해 드리면 좋았겠지만…… 사람들이 많은 밖에 나가서 초콜릿을 살 용기가 도저히 나질 않아서요.\n#3;hophop"
80000019-42 = "3;유즈;99;비록 실제로는 먹을 수 없는, 게임상의 초콜릿이긴 하지만……"
80000019-43 = "3;유즈;03;부디 소중히 여겨 주셨으면 좋겠어요.\n#3;em;[하트]\n#3;greeting"
80000019-44 = "#all;hide"
80000019-45 = "#na;(이후, 유즈가 선물한 초콜릿 아이템은 게임 내 창고에 소중히 보관해 두었다.)"

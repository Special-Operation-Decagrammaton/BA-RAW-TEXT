[translation]
80000019-1 = "Event Items"
80000019-2 = "Game Development Department Club Room"
80000019-3 = "I stopped by the Game Development Department's club room for the first time to play online RPG with Yuzu."
80000019-10 = "Sensei! You have the boss' aggro."
80000019-11 = "Their health is almost depleted, so keep it busy for a little while longer and we'll clear the raid."
80000019-12 = "Just hang on. I'm going to cast my attack."
80000019-20 = "We did it, Sensei!"
80000019-21 = "We were able to clear the hardest raid in the game."
80000019-22 = "I couldn't have done it without you. Thanks for everything!"
80000019-23 = "[s] \"I feel like you did most of the work.\""
80000019-24 = "Th-That's not true. I was only able to kill the boss because of your buffs."
80000019-25 = "In fact, it's impossible to even participate in raids in this game without a party."
80000019-26 = "Okay, let's see what loot we got."
80000019-28 = "I already have this sword. And the grade of this armor is lower than what I currently have..."
80000019-29 = "I'll let you have all of this, then."
80000019-30 = "[s] \"Are you sure?\""
80000019-31 = "Of course. There are other items I'm trying to get."
80000019-35 = "And also..."
80000019-36 = "...would you accept this as well, Sensei?"
80000019-38 = "[s] \"What's this?\""
80000019-39 = "It's a special chocolate item that's only available during the Valentine's Day event."
80000019-40 = "It's just a simple HP recovery item, but I want you to have it.#nI wanted to give you chocolate somehow..."
80000019-41 = "I know real Valentine's chocolate would have probably been better, #nbut I didn't have the courage to buy something like that in front of everyone."
80000019-42 = "So I hope this will do. You can't eat it like you could normal chocolate..."
80000019-43 = "...but I hope you'll accept it all the same."
80000019-45 = "I happily accepted the in-game chocolate item from Yuzu and added it to my storage."

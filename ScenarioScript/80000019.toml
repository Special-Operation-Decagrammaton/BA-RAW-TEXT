[translation]
80000019-1 = "活動道具"
80000019-2 = "遊戲開發部．部室"
80000019-3 = "（在遊戲開發部和柚子一起玩線上RPG遊戲）"
80000019-10 = "啊，老師。BOSS往那邊去了。"
80000019-11 = "雖然我們狀態不是很好，但只要撐過這次攻擊應該就能贏了才對……"
80000019-12 = "我會準備好攻擊技能……這段期間，前線就拜託老師了！"
80000019-20 = "辛苦了，老師！"
80000019-21 = "多虧老師才能順利完成最高難度的副本。"
80000019-22 = "我一個人一定做不到……真的很謝謝老師的幫忙！"
80000019-23 = "[s]「幾乎都是柚子很努力的功勞唷。」"
80000019-24 = "沒，沒有那種事。我之所以能順利攻略BOSS，都是因為老師一直幫忙放增益技能唷。"
80000019-25 = "再加上這個遊戲的BOSS副本在設定上本來就不能獨自參加……"
80000019-26 = "先來分配在副本中拿到的戰利品吧。"
80000019-28 = "這把劍我已經有了，這套盔甲的等級也比我低……"
80000019-29 = "今天的戰利品可以全部給老師沒關係。"
80000019-30 = "[s]「真的可以嗎？」"
80000019-31 = "嗯，因為我有其他想要的東西。"
80000019-35 = "這個，那個……"
80000019-36 = "老，老師，你願意收下這個道具嗎？"
80000019-38 = "[s]「……這是？」"
80000019-39 = "是只有這次情人節活動才拿得到的特別巧克力道具。"
80000019-40 = "雖然只是單純的體力恢復道具……但即使如此，我還是想送巧克力給老師……"
80000019-41 = "當，當然如果能送真正的巧克力也很好……#n但是那個，我沒有在外面人群中買巧克力的勇氣……"
80000019-42 = "雖然只是不能真的吃下的、遊戲中的巧克力……"
80000019-43 = "老，老師願意珍惜的話，我會很開心的。"
80000019-45 = "（把柚子送的巧克力道具珍惜地保管在了遊戲的倉庫裡）"

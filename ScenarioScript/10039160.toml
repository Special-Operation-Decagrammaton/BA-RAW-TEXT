[translation]
10039160-1 = "Afterword;School Food Fighter"
10039160-3 = "While running around here and there during the Carnival, solving various issues..."
10039160-13 = "...and that's about the gist of it."
10039160-14 = "[s1] \"So, to sum up...\"\n[s2] \"...the Stall Street isn't getting enough customers.\""
10039160-17 = "Yeah... I don't think the food's the problem. It tastes great."
10039160-18 = "All the vendors have tried each others' food, and they all agree it's delicious."
10039160-19 = "So there must be some other problem, but we don't know what it is. We were hoping you could help."
10039160-20 = "[s3] \"I don't know much about food stall marketing, but...\"\n[s4] \"I'll try and find you some customers one way or another!\""
10039160-25 = "Th-Thank you so much, Sensei!"
10039160-26 = "We'll keep trying to find more customers too!"
10039160-29 = "Not sure of exactly what to do, I wandered around the Stall Street for awhile..."
10039160-32 = "[ns5] \"Yakisoba! Chicken skewers! Ramen!\"\n[ns6] \"It's all delicious!\""
10039160-37 = "Just as I was starting to think that wouldn't work, I saw some students passing by."
10039160-42 = "Ooh, this is a great background for a photo?"
10039160-43 = "Yeah, let's take a picture! You go first!"
10039160-44 = "I'm glad I wore this today!"
10039160-45 = "[s] \"...\""
10039160-50 = "[ns7] \"Here, I'll hold the camera for you.\"\n[ns8] \"You'll have a priceless memory at the famous Stall Street!\""
10039160-55 = "Oh, that sounds good."
10039160-56 = "Heehee, doesn't it?"
10039160-62 = "Heehee, all right, one photo, please! Thank you!"
10039160-63 = "[ns] \"Say cheese! Please support the Stall Street!\""
10039160-78 = "A promotional, moving photo booth. It seemed like a nice idea, but just as I got started with it..."
10039160-84 = "...a familiar silhouette appeared in the background of the shot."
10039160-88 = "[ns] \"...Haruna?!\""
10039160-91 = "\"(Haruna, from the Gourmet Research Society. Maybe they could help solve the Stall Street's problems.)\""
10039160-92 = "\"(After all, no one knows fine cuisine better than they do.\")"
10039160-93 = "\"(Let's see if they have any ideas!)\""
10039160-99 = "I sprinted after Haruna."
10039160-108 = "[ns] \"*pant* *pant*\""
10039160-112 = "Oh my, Sensei. I didn't expect to see you here."
10039160-115 = "Ah, Sensei!"
10039160-116 = "I didn't think we'd run into you here. Nice to see you! ☆"
10039160-117 = "Are you here for the food?"
10039160-118 = "[s] \"How about you? What brings you all to the Carnival?\""
10039160-120 = "Heehee... Well, the Trinity Carnival is, in a sense, a street food competition. "
10039160-121 = "A battleground where street vendors and food trucks compete using their own signature menus."
10039160-122 = "The Gourmet Research Society can't miss out on something like that!"
10039160-127 = "...You look like you might need something."
10039160-128 = "[s] \"Well...\""
10039160-133 = "I explained the situation to the Gourmet Research Society and asked for their help."
10039160-136 = "I see..."
10039160-137 = "If that's the problem, you've come to the right people."
10039160-138 = "Nobody knows how to fill bellies like we do."
10039160-141 = "That's right! You're lucky you spotted us!"
10039160-142 = "And food stalls happen to be my specialty."
10039160-143 = "You can count on us. ☆"
10039160-144 = "Yeah! Heehee, I hope they have the kinds of food I like."
10039160-145 = "[s] \"Oh, just one thing to ask about beforehand...\""
10039160-151 = "[ns] \"If you don't like the food, are you going to blow it up this time?\""
10039160-152 = "Hmm, I hadn't thought about that..."
10039160-156 = "Professional food service industry artisans should face consequences if they don't meet standards, but I don't think we should hold amateur students to those same criteria."
10039160-157 = "Right? We just want to eat something delicious here!"
10039160-158 = "[s9] \"That's a relief...\"\n[s10] \"If a Gehenna student did something like that on Trinity's campus, that would be a major incident.\""
10039160-161 = "Well, we do perform our \"evaluations\" regardless of the time or place..."
10039160-166 = "...but we'll try our best to avoid any incidents today."
10039160-167 = "[s] \"Thanks so much!\""
10039160-170 = "..."
10039160-180 = "..."
10039160-182 = "S-Sensei?!"
10039160-183 = "[s] \"They're the best experts I know.\""
10039160-185 = "[ns] \"...As far as I understand it.\""
10039160-190 = "They're Gehenna students, though. Is that going to be okay...?"
10039160-194 = "Wait, aren't they the terrorists...?"
10039160-195 = "Huh? What?"
10039160-202 = "...Oh, I think you're right..."
10039160-203 = "A-Are they...the Gourmet Research Society?!"
10039160-204 = "The ones who infiltrated our school and stole the pride of the aquarium, the Gold Maguro...!"
10039160-205 = "The terrorists who've blown up numerous restaurants in the D.U. district...!"
10039160-207 = "Well, it seems our reputation precedes us, even among ordinary students."
10039160-208 = "Heehee, since you already know everything, we don't need to explain. ☆"
10039160-209 = "Now, hurry up and make us some food!"
10039160-211 = "S-Sensei?!"
10039160-212 = "[s11] \"Trust me, it'll be okay.\"\n[s12] \"They're here to be consultants today, not terrorists.\""
10039160-215 = "...Yes, I understand your situation."
10039160-216 = "On the way here, I looked around the surrounding commercial areas and noticed a few issues."
10039160-217 = "Give us a little while to confirm our observations, and then we should be able to give you a solution."
10039160-222 = "...Hm. Well, they seem professional, at least."
10039160-223 = "First, to confirm our main premise, we'll need to check the level of the food sold here."
10039160-224 = "I hear you're quite confident in its taste, are you not?"
10039160-225 = "W-Well...I think it's pretty good."
10039160-227 = "Then we'll taste it and make an objective judgment."
10039160-228 = "No one in all of Kivotos has a more refined palate than the Gourmet Research Society."
10039160-229 = "Yup, yup! That's right! No one has higher standards for taste!"
10039160-230 = "I think our standards are a bit different than yours..."
10039160-232 = "Regardless, if there's a problem with the taste, we will provide a solution for that. If not, we'll find the issue and provide a solution for that instead."
10039160-234 = "O-Okay... I'll have your food ready in just a minute!"
10039160-239 = "Ooh, I can't wait!"
10039160-240 = "Remember to pace yourself. Don't overindulge."
10039160-244 = "Here you go! My yakisoba..."
10039160-249 = "All right, then..."
10039160-258 = "[ns] \"Why do I feel so nervous...?\""
10039160-264 = "...Good enough."
10039160-269 = "Yay! I passed!"
10039160-270 = "...Wait. Why am I so happy about just passing?"
10039160-272 = "I wouldn't call it \"gourmet,\" but for a food stall run by students, it's well above average. Indeed, as Sensei said, there's no problem with the taste."
10039160-274 = "Th-Then..."
10039160-275 = "Then what's the problem...?"
10039160-277 = "Ah, we have an answer for you."
10039160-278 = "And that is...?"
10039160-282 = "Junko, would you explain, please?"
10039160-284 = "Happy to!"
10039160-288 = "I think there's a problem with the marketing."
10039160-289 = "When the food tastes good, but there aren't many customers..."
10039160-290 = "...it usually means people aren't aware the food exists in the first place."
10039160-292 = "Oh... W-Wow..."
10039160-293 = "The popular restaurants are always hard at work promoting themselves left and right."
10039160-294 = "So what should we do to promote our place?"
10039160-295 = "It varies by restaurant, but for a school festival stall like this, we've found the most effective method is social media."
10039160-296 = "It's where most students get their information, after all. "
10039160-300 = "Take a look here. When people search for \"Trinity Carnival,\" you want them to see you. So post some information about the stall, add a bunch of different tags, and you'll start popping up in all kinds of searches."
10039160-305 = "Social media. Noted..."
10039160-307 = "Also, you should encourage students who come here to write reviews on their own social media."
10039160-308 = "H-How do I do that?"
10039160-309 = "Well, as one idea, you could offer a free drink for writing a review."
10039160-310 = "Oh...! That would even make me want to do it."
10039160-311 = "[s] \"You sound pretty experienced. I wouldn't expect most students to think that way.\""
10039160-316 = "All right, let's try your solutions!"
10039160-317 = "Marketing. We've got this!"
10039160-322 = "...All right, how are we doing?"
10039160-329 = "Oh, is this the Stall Street? There's a lot of stuff here!"
10039160-330 = "I heard the yakisoba over there is really good. You want to try the spicy flavor?"
10039160-331 = "Two yakisoba plates, please!"
10039160-336 = "Welcome! Coming right up! You're going to love it."
10039160-338 = "Hmm, I'm a little thirsty... Let's get a drink too."
10039160-343 = "We have free drinks, if you write us a review on your social media profile!"
10039160-348 = "Oh, really? Do we want to do that?"
10039160-349 = "Free, huh? I'll write a review! Heehee."
10039160-351 = "All right, thank you! Here, one nice, cool drink for each of you."
10039160-355 = "One roasted corn, please!"
10039160-359 = "Yes! Here you are! Thank you!"
10039160-368 = "Eight chicken skewers for us! Half with salt, half with soy sauce!"
10039160-370 = "Of course! Please give it a little while. We're getting a LOT of orders right now!"
10039160-375 = "[ns] \"Wow, big crowd!\""
10039160-376 = "You posted at just the right time, when everyone was getting hungry."
10039160-377 = "Good, good! It's working perfectly! I just searched for \"Trinity Carnival,\" and your mentions are going way up."
10039160-378 = "Plus most of the reviews are positive. As we said, it isn't gourmet, but it is quite decent for students."
10039160-380 = "Ooh, we should have made some chocolate umeboshi takoyaki too."
10039160-381 = "Too late now, I know, but we've got plenty of other things on the menu."
10039160-382 = "[s] \"Nicely done, Gourmet Research Society!\""
10039160-384 = "Hehe, we know our business."
10039160-385 = "Ironically, we're not great cooks ourselves, but we're great consultants!"
10039160-386 = "At this rate, we might run out of ingredients! ☆"
10039160-387 = "Shall we have ourselves a meal too?"
10039160-388 = "Yeah, that sounds good! I was just starting to get hungry!"
10039160-389 = "[s] \"It's on me! Enjoy as much as you want!\""
10039160-393 = "Oh, my... As much as we want, really?"
10039160-397 = "[ns] Check your wallet."
10039160-398 = "Heehee... Don't worry, Sensei. We won't bankrupt you...completely!"
10039160-399 = "[s] \"Err, yeah...\""
10039160-401 = "After the consultation, the food stall became a great success."
10039160-405 = "In particular, it helped to be known as \"the restaurant the Gourmet Research Society didn't blow up.\""

[translation]
10039160-1 = "ย้อนวันวาน;สตรีทฟู้ดไฟเตอร์!"
10039160-3 = "(คุณครูวิ่งวุ่นไปทั่วงานคาร์นิวัล เพื่อแก้ไขปัญหานู่นนี่...)"
10039160-13 = "เรื่องมันก็ประมาณนี้ละค่ะ..."
10039160-14 = "[s1] \"ขายอาหารไม่ค่อยได้สินะ...\"\n[s2] \"ไม่ค่อยมีลูกค้ามาซื้ออาหารสินะ...\""
10039160-17 = "ค่ะ... แต่ฉันก็มั่นใจว่าอาหารของเราอร่อยนะคะ"
10039160-18 = "ตอนให้ชิมฟรี ทุกคนก็บอกว่ารสชาติใช้ได้เลยด้วย..."
10039160-19 = "ถ้าอย่างนั้นก็น่าจะเป็นปัญหาอื่นที่ไม่เกี่ยวกับอาหาร แต่ฉันก็ไม่รู้เลยค่ะ ก็เลยอยากขอความช่วยเหลือ#nจากคุณครู..."
10039160-20 = "[s3] \"ครูไม่ถนัดด้านนี้ แต่ก็จะพยายามนะ...\"\n[s4] \"ครูเองก็ไม่ค่อยถนัด แต่จะหาวิธีเรียกลูกค้าให้นะ...!!\""
10039160-25 = "ขะ... ขอบคุณมากเลยค่ะคุณครู!"
10039160-26 = "พวกฉันก็จะลองหาวิธีอื่นๆ ด้วยค่ะ...!"
10039160-29 = "(คุณครูไม่รู้ว่าจะทำยังไงดี ก็เลยยืนมองอยู่แถวๆ ร้าน...)"
10039160-32 = "[ns5] \"ยากิโซบะ ไก่เสียบไม้ ราเม็งอร่อยๆ จ้า\"\n[ns6] \"สองมือล้วงกระเป๋า สองเท้าก้าวเข้ามา~\""
10039160-37 = "(คุณครูเริ่มคิดว่าทำแบบนี้ไม่น่าจะได้ผล ระหว่างนั้นเองก็เห็นนักเรียนที่เดินผ่านไป)"
10039160-42 = "ตรงนี้น่าถ่ายรูปจังเลย ว่ามั้ย?"
10039160-43 = "นั่นสิ มีป้ายและร้านค้าสวยๆ ด้วย! งั้นให้เธอถ่ายก่อนเลย!"
10039160-44 = "ดีนะเนี่ยที่ใส่ชุดน่ารักๆ มา!"
10039160-45 = "[s] \"...\""
10039160-50 = "[ns7] \"มาเก็บความทรงจำในงานคาร์นิวัลกัน ทางเราถ่ายรูปให้ฟรีเลย~\"\n[ns8] \"มาถ่ายรูปที่ระลึกที่หน้าถนนสายร้านค้ากันเลย~\""
10039160-55 = "อ๊ะ ดูทางโน้นสิ พวกเราก็เข้าไปขอให้ถ่ายรูปให้มั้ย?"
10039160-56 = "ฮุฮุ ก็ไม่เลวนะ"
10039160-62 = "แหะๆ ถ้างั้นฝากถ่ายรูปให้พวกฉันบ้างนะคะ! ขอบคุณค่ะ~!"
10039160-63 = "[ns] \"จะถ่ายละนะ เอ้า ยิ้มๆ~ แล้วไปซื้ออาหารอร่อยๆ กินกันด้วยนะ!\""
10039160-78 = "(คุณครูช่วยถ่ายรูปให้นักเรียนเพื่อโปรโมตร้านขายอาหารในงาน)"
10039160-84 = "(ระหว่างนั้นเองก็เห็นเงาของนักเรียนที่คุ้นตา)"
10039160-88 = "[ns] \"ฮารุนะ...?!\""
10039160-91 = "(บางที... ชมรมชิมอาหารอาจช่วยแก้ปัญหาร้านอาหารให้ก็ได้)"
10039160-92 = "(ที่ผ่านมาชมรมชิมอาหารได้ชิมอาหารเลิศรสและมีประสบการณ์มากมายเกี่ยวกับร้านอาหาร...!)"
10039160-93 = "(บางทีนักเรียนเหล่านี้อาจจะช่วยหาวิธีแก้ปัญหาให้ก็ได้)"
10039160-99 = "(เมื่อคิดเช่นนั้น คุณครูก็วิ่งไปหาฮารุนะ)"
10039160-108 = "[ns] \"แฮ่ก... แฮ่ก...\""
10039160-112 = "ตายจริง คุณครู คิดไม่ถึงเลยนะคะว่าจะได้มาเจอกันที่นี่"
10039160-115 = "อ๊ะ คุณครูนี่นา!"
10039160-116 = "คุณครูก็มางานนี้สินะคะ ดีใจจังเลยค่ะที่ได้เจอ☆"
10039160-117 = "โอ้ คุณครูเองก็มากินอะไรอร่อยๆ สินะ"
10039160-118 = "[s] \"ทุกคนมาเที่ยวงานคาร์นิวัลกันเหรอ?\""
10039160-120 = "ฮุฮุ... งานทรีนิตี้คาร์นิวัลก็เหมือนงานต่อสู้ชิงชัยของสตรีทฟู้ด"
10039160-121 = "เรียกได้ว่าเป็นการแข่งขันอย่างเอาจริงเอาจังของร้านแผงลอยกับฟู้ดทรัคที่ต่างก็งัดเมนูซิกเนอเจอร์#nมาประชันกันค่ะ"
10039160-122 = "แล้วถ้ามีงานแบบนี้ ชมรมชิมอาหารจะพลาดได้ยังไงล่ะคะ?"
10039160-127 = "ว่าแต่คุณครูวิ่งกระหืดกระหอบมาแบบนี้ มีอะไรหรือเปล่าคะ?"
10039160-128 = "[s] \"เอ่อ... คือว่า...\""
10039160-133 = "(คุณครูอธิบายเรื่องทั้งหมดให้ชมรมชิมอาหารฟังและขอความช่วยเหลือ)"
10039160-136 = "เป็นแบบนี้สินะคะ..."
10039160-137 = "ถ้าเป็นปัญหาเรื่องนั้น ก็มาหาถูกคนแล้วละค่ะ"
10039160-138 = "เพราะไม่มีชมรมไหนที่มีประสบการณ์ด้านนี้มากกว่าชมรมชิมอาหารแล้วค่ะ"
10039160-141 = "ใช่! มาหาถูกคนแล้วละ!"
10039160-142 = "โดยเฉพาะเรื่องร้านขายอาหารแผงลอยน่ะ พวกเราเชี่ยวชาญอยู่แล้ว!"
10039160-143 = "พวกฉันน่าจะพอช่วยได้นะคะ☆"
10039160-144 = "อื้อ! ฮิฮิ อยากให้ที่ร้านมีอาหารที่ฉันชอบจัง"
10039160-145 = "[s] \"อ่า... แต่ครูต้องถามอะไรไว้ก่อน...\""
10039160-151 = "[ns] \"ถ้าเจอร้านอาหารที่ไม่ถูกใจที่นี่ จะระเบิดร้านอีกหรือเปล่า...?\""
10039160-152 = "อืม เรื่องนั้นยังไม่ได้คิดไว้เลยค่ะ..."
10039160-156 = "สำหรับคนที่ทำงานในอุตสาหกรรมอาหาร ถ้าพวกเธอทำได้ไม่ถึงเกณฑ์การประเมินก็ต้องรับผิดชอบอยู่#nแล้วค่ะ แต่ถ้าเป็นนักเรียนมือสมัครเล่นที่มาขายอาหารละก็ ฉันว่าเราก็ไม่มีความจำเป็นต้องใช้มาตรฐาน#nการประเมินอย่างไร้ความปรานีค่ะ"
10039160-157 = "ใช่ๆ! พวกเราก็แค่อยากกินของอร่อยๆ ก็เท่านั้นเอง!"
10039160-158 = "[s9] \"โล่งอกไปทีนะ งั้นครูก็จะได้ไม่ต้องกังวล...\"\n[s10] \"งั้นก็ไม่ต้องห่วงเรื่องเด็กเกเฮนน่ามาระเบิดร้านอาหารในทรีนิตี้เนอะ...\""
10039160-161 = "'การพิพากษา' ของพวกเราไม่ขึ้นอยู่กับเวลาและสถานที่หรอกนะคะ..."
10039160-166 = "แต่พวกเราจะพยายามให้ไม่เกิดสถานการณ์ใดๆ ที่จะทำให้คุณครูเป็นกังวลค่ะ"
10039160-167 = "[s] \"ขอบใจมากเลย!\""
10039160-170 = "..."
10039160-180 = "..."
10039160-182 = "คะ... คุณครู... คนพวกนี้คือใครคะ?"
10039160-183 = "[s] \"เป็นผู้เชี่ยวชาญที่ดีที่สุดที่ครูรู้จักน่ะ\""
10039160-185 = "[ns] \"อาจจะนะ...\""
10039160-190 = "มาจากเกเฮนน่ากันหมดเลย... ฉันว่าน่าจะวางใจได้ค่ะ"
10039160-194 = "เดี๋ยวนะ คนพวกนั้น... ไม่ใช่ผู้ก่อการร้ายหรอกเหรอ?"
10039160-195 = "หืม? ว่าไงนะ?"
10039160-202 = "เอ๋...? จะว่าไปก็...?"
10039160-203 = "ยะ... อย่าบอกนะคะว่าเป็น... ชมรมชิมอาหาร?!"
10039160-204 = "ชมรมที่แทรกซึมเข้ามาในโรงเรียนเรา แล้วขโมยมากุโระสีทองจากอควาเรียมไป...!"
10039160-205 = "ชมรมผู้ก่อการร้ายที่เที่ยวระเบิดร้านอาหารมากมายในเขต D.U....!!"
10039160-207 = "ตายจริง ข่าวลือของพวกเราไปไกลถึงหูของนักเรียนโรงเรียนอื่นเลยนะคะเนี่ย"
10039160-208 = "ฮุฮุ ถ้ารู้จักพวกเราแล้ว งั้นก็ไม่ต้องอธิบายให้มากความสินะคะ☆"
10039160-209 = "เอาละ เอาอาหารของที่นี่มาให้ชิมเร็วเข้า!"
10039160-211 = "คะ... คุณครู?!"
10039160-212 = "[s11] \"เชื่อครูเถอะนะ\"\n[s12] \"วันนี้ชมรมนี้ไม่ใช่ชมรมก่อการร้าย แต่เป็นชมรมให้คำปรึกษาน่ะ\""
10039160-215 = "ฉันพอจะทราบสถานการณ์ของทางนี้มาบ้างแล้วค่ะ"
10039160-216 = "ระหว่างทางมาที่นี่ พวกฉันก็สำรวจร้านค้าแถวนี้และพบว่ามีปัญหาอยู่บ้างค่ะ"
10039160-217 = "ถ้าสมมติฐานของพวกฉันถูกต้อง พวกฉันน่าจะเสนอทางแก้ไขให้ได้หลังจากได้ตรวจสอบบางอย่างค่ะ"
10039160-222 = "โห... รู้สึกเหมือนได้เจอมืออาชีพเลย..."
10039160-223 = "ก่อนอื่นพวกฉันต้องตรวจสอบคุณภาพของอาหารที่ขายที่นี่ก่อนค่ะ"
10039160-224 = "ได้ยินว่ามั่นใจในคุณภาพของอาหารใช่มั้ยคะ...?"
10039160-225 = "ค่ะ... มะ... มั่นใจค่ะ! ฉันคิดว่ารสชาติไม่เลวเลย... ค่ะ"
10039160-227 = "ถ้าอย่างนั้นพวกฉันจะลองชิมแล้วตัดสินอย่างเป็นกลางดูนะคะ"
10039160-228 = "ถ้าเป็นเรื่องนี้ละก็ ชมรมชิมอาหารเป็นชมรมที่เชี่ยวชาญมากที่สุดในคิโวทอสเลยค่ะ"
10039160-229 = "อื้อ! ใช่! พวกเราชิมและประเมินรสชาติอย่างเข้มงวดอยู่แล้ว!"
10039160-230 = "ไม่อะ เรื่องนั้นต้องไม่นับเธอ..."
10039160-232 = "ถ้าชิมแล้วพบว่าเป็นปัญหาที่รสชาติ พวกฉันจะแนะนำวิธีแก้ให้ แต่ถ้าเป็นปัญหาเรื่องอื่น พวกฉันก็จะวิเคราะห์ปัญหาแล้วหาทางแก้ไขให้ค่ะ"
10039160-234 = "ขะ... เข้าใจแล้ว... ค่ะ รอเดี๋ยวนะคะ!"
10039160-239 = "ตื่นเต้นจังเลยค่ะ~ อาหารร้านนี้เป็นของโปรดฉันทุกอย่างเลย"
10039160-240 = "เอาแต่พอดีนะ... เรามาชิมเฉยๆ ไม่ได้มากินเรียบนะ"
10039160-244 = "มาแล้วค่ะ...! ระ... เริ่มจากยากิโซยะก่อน..."
10039160-249 = "อืม ถ้างั้นก็..."
10039160-258 = "[ns] \"ทำไมถึงรู้สึกประหม่านะ...\""
10039160-264 = "อร่อยดีค่ะ รสชาติประมาณนี้ถือว่าผ่านค่ะ"
10039160-269 = "ยะ... เย้! ผ่านแล้ว!"
10039160-270 = "เดี๋ยวนะ... ทำไมฉันต้องดีใจเบอร์นั้นด้วยล่ะ?"
10039160-272 = "ถึงจะยังไม่ถึงขั้นที่เป็นอาหารเลิศรส แต่สำหรับอาหารร้านแผงลอยที่นักเรียนทำขายแล้ว ฉันถือว่าอยู่ในระดับที่พอใช้ได้ค่ะ ปัญหาไม่ได้อยู่ที่เรื่องรสชาติอย่างที่ว่าเลยค่ะ"
10039160-274 = "ถะ... ถ้างั้น..."
10039160-275 = "ปะ... ปัญหาอยู่ที่ตรงไหนเหรอคะ...?"
10039160-277 = "ฮุฮุ พวกฉันจะเสนอวิธีแก้ปัญหาให้นะคะ"
10039160-278 = "วิธีแก้ปัญหาเหรอคะ...!"
10039160-282 = "คุณจุนโกะ ช่วยอธิบายหน่อยได้มั้ยคะ?"
10039160-284 = "ได้เลย!"
10039160-288 = "ฉันคิดว่าปัญหาน่าจะอยู่ที่การโปรโมตร้านนะ"
10039160-289 = "ถ้าอาหารอร่อยดี แต่ไม่มีลูกค้า..."
10039160-290 = "ปกติแล้วปัญหานี้จะเกิดขึ้นตอนที่ลูกค้า 'ไม่รู้' ว่ามีของอร่อยแบบนี้ขายอยู่ที่นี่น่ะ"
10039160-292 = "อ้อ... ยะ... อย่างนี้สินะ..."
10039160-293 = "เดี๋ยวนี้พวกร้านเด็ดน่ะตั้งใจโปรโมตร้านกันมากเลยนะ"
10039160-294 = "ละ... แล้วฉันจะโปรโมตร้านได้ยังไงบ้างเหรอคะ?"
10039160-295 = "วิธีก็ต่างกันไปในแต่ละร้านนะ แต่ถ้าเป็นร้านแผงลอยที่ขายในงานเทศกาลของโรงเรียนละก็ การโปรโมตร้านในโซเชียลมีเดียเป็นวิธีที่ได้ผลและง่ายที่สุดเลย!"
10039160-296 = "พวกนักเรียนได้รับข่าวสารจากโซเชียลมีเดียกันทั้งนั้นละ "
10039160-300 = "เอาละ ลองดูนี่นะ เราต้องทำให้คนอื่นเห็นข้อมูลของร้านเมื่อพิมพ์คำว่า <ทรีนิตี้คาร์นิวัล> และถ้าอัปข้อมูลเกี่ยวกับร้านแล้วใส่แฮชแท็กเพิ่มไปละก็ ชาวเน็ตจะยิ่งเห็นคอนเทนต์ของเรา!"
10039160-305 = "อัปลงโซเชียลมีเดีย...! ขอจดก่อนนะ..."
10039160-307 = "การโน้มน้าวให้นักเรียนที่มาซื้ออาหารของร้านเขียนรีวิวให้ในโซเชียลมีเดียก็เป็นไอเดียที่ดีนะคะ~"
10039160-308 = "ยะ... ยังไงเหรอคะ?"
10039160-309 = "ก็แถมอาหารหรือให้เครื่องดื่มฟรีเมื่อลูกค้าเขียนรีวิวให้ยังไงล่ะคะ"
10039160-310 = "โอ้...! ถ้ามีแบบนั้นละก็ ฉันว่าตัวเองก็น่าจะอยากรีวิวให้เหมือนกันค่ะ"
10039160-311 = "[s] \"ชมรมนี้อ่านเรื่องอาหารออกอย่างทะลุปรุโปร่งเลยนะ\""
10039160-316 = "งั้นก็ลองทำตามวิธีนี้กันเลย!"
10039160-317 = "อื้อ! มาโปรโมตร้านให้คนรู้จักกัน! ลุย!"
10039160-322 = "ฮุฮุ แล้วมาดูความคืบหน้ากันนะคะ"
10039160-329 = "โอ้ว ตรงนี้คือย่านร้านค้าแผงลอยที่ว่านั้นเหรอ? มีอาหารขายเยอะเลย!"
10039160-330 = "ได้ยินว่ายากิโซบะร้านนั้นอร่อยมากเลยนะ เราลองกินยากิโซบะรสเผ็ดดูมั้ย?"
10039160-331 = "ขอยากิโซบะ 2 ที่ค่ะ!"
10039160-336 = "เชิญค่ะ! จะรีบทำยากิโซบะอร่อยๆ ให้เลยนะคะ!"
10039160-338 = "คอแห้งจัง... เราสั่งเครื่องดื่มกันด้วยดีกว่า!"
10039160-343 = "อ้อ ตอนนี้เรามีแคมเปญสมนาคุณเครื่องดื่มค่ะ แค่คุณลูกค้าช่วยเขียนรีวิวลงโซเชียลมีเดียให้ก็ได้รับ#nไปเลยค่ะ!"
10039160-348 = "ว้าว จริงเหรอคะ? ลองเขียนดีมั้ยนะ?"
10039160-349 = "ให้ฟรีๆ เลยเหรอคะ? งั้นฉันจะเขียนรีวิวให้ค่ะ! ฮิฮิ"
10039160-351 = "ค่า ขอบคุณนะคะ~! มาแล้วค่า เครื่องดื่มเย็นๆ 2 แก้ว!"
10039160-355 = "ขอโทษนะคะ! ขอข้าวโพดย่างที่หนึ่งค่ะ!"
10039160-359 = "ค่ะ! นี่ค่ะคุณลูกค้า! ขอบคุณค่ะ~!"
10039160-368 = "ขอไก่ย่าง 8 ไม้! ย่างเกลือกับย่างซีอิ้วอย่างละครึ่งนะ!"
10039160-370 = "ค่ะ ค่ะ! พอดีมีออเดอร์เยอะ ช่วยรอสักครู่นะคะ!"
10039160-375 = "[ns] \"ลูกค้าเยอะขึ้นผิดหูผิดตาเลยนะ!\""
10039160-376 = "ดีมากเลยค่ะที่อัปคอนเทนต์ลงโซเชียลมีเดียในเวลาที่คนหิวกัน"
10039160-377 = "ใช่ ดีเลยนะ! ได้ผลดีกว่าที่คิดไว้อีก! พอค้นหาจากแฮชแท็กทรีนิตี้คาร์นิวัล ก็เจอคอนเทนต์ที่พูดถึง#nร้านอาหารแผงลอยเยอะแยะเลย"
10039160-378 = "รีวิวส่วนใหญ่ก็เป็นไปในทิศทางที่ดีนะคะ ต่อให้ยังไปไม่ถึงการเป็นอาหารรสเลิศ แต่เท่านี้ก็ถือว่าคุณภาพดีในระดับของนักเรียนแล้วค่ะ"
10039160-380 = "แง อยากให้มีทาโกะยากิอุเมะโบชิช็อกโกแลตด้วยจัง"
10039160-381 = "ก็น่าเสียดายอยู่หรอกนะ แต่ยังไงก็ยังมีของกินอย่างอื่นอีก!"
10039160-382 = "[s] \"ยอดเยี่ยมเลยนะ ชมรมชิมอาหาร!\""
10039160-384 = "ฮุฮุ ต้องขอบคุณประสบการณ์เกี่ยวกับอาหารที่เราสั่งสมกันมาค่ะ"
10039160-385 = "ถึงเราจะทำอาหารไม่เก่ง แต่เรื่องชิมและให้คำปรึกษาน่ะเราไม่เป็นรองใครอยู่แล้ว!"
10039160-386 = "ถ้าขายดีแบบนี้เรื่อยๆ วัตถุดิบที่เตรียมมาคงไม่พอแน่เลยค่ะ☆"
10039160-387 = "งั้นพวกเราก็มากินกันบ้างดีมั้ยคะ?"
10039160-388 = "อื้อ! ดีสิ! ฉันท้องร้องอยู่พอดีเลย!"
10039160-389 = "[s] \"ดีเลย งั้นครูเป็นเจ้ามือเอง! กินให้เต็มที่เลยนะ!\""
10039160-393 = "อุ๊ยตาย... จริงเหรอคะ?"
10039160-397 = "[ns] (ดูเงินในกระเป๋าสตางค์...)"
10039160-398 = "ฮุฮุ... ไม่ต้องห่วงหรอกค่ะคุณครู วันนี้พวกฉันจะกิน 'แต่พอดี' ค่ะ"
10039160-399 = "[s] \"อะ... อื้อ\""
10039160-401 = "(หลังจากได้ปรึกษาและแก้ปัญหาตามแบบที่ชมรมชิมอาหารบอก ร้านค้าแผงลอยก็มีลูกค้าเข้ามา#nอย่างเนืองแน่น)"
10039160-405 = "(และยังมีข่าวลือว่าเป็น 'ร้านที่ไม่โดนชมรมชิมอาหารระเบิด' ด้วย...)"

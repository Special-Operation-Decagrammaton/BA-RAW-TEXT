[translation]
10039160-1 = "後日談;校園美食鬥士！"
10039160-3 = "（在熱鬧的狂歡節中四處奔走，解決各種問題的途中……）"
10039160-13 = "情況大概就是這樣……"
10039160-14 = "[s1]「所以簡單來說……」\n[s2]「你們覺得美食街的客人太少了對吧？」"
10039160-17 = "是的……其實我們對味道頗有信心。"
10039160-18 = "在輪流試吃的時候，大家的評價也都不錯……"
10039160-19 = "因此問題應該出在食物以外的部分，#n但我們實在沒有頭緒，所以才想請老師幫忙……"
10039160-20 = "[s3]「我對這方面也不太了解……」\n[s4]「但我會想辦法吸引客人過來的……！！」"
10039160-25 = "真，真的太感謝你了，老師！！"
10039160-26 = "我們也會繼續想想辦法的……！"
10039160-29 = "（由於一時之間還想不出什麼辦法，所以先在美食街附近待了一會……）"
10039160-32 = "[ns5]「這裡有炒麵～烤雞肉串～還有拉麵～」\n[ns6]「都很好吃哦～」"
10039160-37 = "（就在覺得這樣下去不行的時候，看到了路過的學生）"
10039160-42 = "這個背景不錯吧？"
10039160-43 = "哦～來拍張照吧！你先你先！"
10039160-44 = "幸好有穿可愛的衣服過來！"
10039160-45 = "[s]「……」"
10039160-50 = "[ns7]「我來幫你們拍照，留下狂歡節的回憶吧～」\n[ns8]「我幫你們用特色美食街當背景，拍張友誼照吧～」"
10039160-55 = "這樣啊，你覺得咧？"
10039160-56 = "嘿～好像不錯耶？"
10039160-62 = "好，那就麻煩你幫我們拍一張吧！謝謝～！"
10039160-63 = "[ns]「來，笑一個～也歡迎你們多來美食街捧場哦！」"
10039160-78 = "（就在一邊協助觀光客拍照，一邊為美食街宣傳時……）"
10039160-84 = "（鏡頭裡突然出現了一個熟悉的身影）"
10039160-88 = "[ns]「……羽留奈！？」"
10039160-91 = "（或許……美食研究會能解決美食街的問題？）"
10039160-92 = "（如果是嘗過無數美食和餐廳的美食研究會……）"
10039160-93 = "（說不定能提出解決這個問題的好方法？）"
10039160-99 = "（於是趕忙追上了羽留奈）"
10039160-108 = "[ns]「哈啊……哈啊……」"
10039160-112 = "哎呀，老師。#n沒想到會在這裡遇見您呢。"
10039160-115 = "啊，是老師！"
10039160-116 = "居然能在這裡遇見老師，真令人開心☆"
10039160-117 = "哦～老師也來這裡吃好吃的嗎？"
10039160-118 = "[s]「嗯，大家是來參加狂歡節的嗎？」"
10039160-120 = "呵呵……三一學園的狂歡節，可說是街頭美食的競技場。"
10039160-121 = "眾多攤位拿出各自的招牌料理相互較勁，儼然是場貨真價實的競賽。"
10039160-122 = "這樣的地方，我們美食研究會自然不能缺席。"
10039160-127 = "有什麼問題嗎？"
10039160-128 = "[s]「那個，其實……」"
10039160-133 = "（向美食研究會說明了情況並尋求幫助）"
10039160-136 = "原來如此……"
10039160-137 = "那麼您可真是找對人了。"
10039160-138 = "像我們美食研究會一樣經驗豐富的社團可不多呢。"
10039160-141 = "沒錯！找我們就對了！"
10039160-142 = "尤其美食街可是我的專業領域哦！"
10039160-143 = "我們應該能幫上忙☆"
10039160-144 = "嗯！嘿嘿，希望有我喜歡的食物。"
10039160-145 = "[s]「啊，不過有件事我得先確認一下……」"
10039160-151 = "[ns]「你們應該不會連在這裡也把不滿意的店家炸掉吧……？」"
10039160-152 = "唔嗯，這點我倒是沒想過……"
10039160-156 = "如果是餐飲業者，那麼無法達到標準自然應該付出代價……#n不過對於業餘的學生做的食物，我倒認為不必過於嚴苛。"
10039160-157 = "對呀！我們只是想吃好吃的而已！"
10039160-158 = "[s9]「那真是太好了……」\n[s10]「如果格黑娜的學生在三一做那種事的話，會引發大問題的……」"
10039160-161 = "雖說我們的「審判」並不會區分時間與地點……"
10039160-166 = "但我們會盡可能避免您擔心的情況發生。"
10039160-167 = "[s]「謝謝你們！」"
10039160-170 = "……"
10039160-180 = "……"
10039160-182 = "老，老師……這些人是？"
10039160-183 = "[s]「他們是我認識最厲害的美食專家。」"
10039160-185 = "[ns]「……大概吧。」"
10039160-190 = "好像都是格黑娜的學生……真的沒問題嗎……"
10039160-194 = "等一下。#n這些人……不就是那群恐怖分子嗎？"
10039160-195 = "嗯？你說什麼？"
10039160-202 = "……咦？聽你這麼一說……？"
10039160-203 = "難，難道是……美食研究會！？"
10039160-204 = "就是那個潛入我們學校，把水族館的驕傲「黃金鮪魚」偷走……"
10039160-205 = "還在D.U.附近炸毀無數餐廳的恐怖組織……！！"
10039160-207 = "哎呀，看來我們的名聲已經傳到普通學生耳裡了呢。"
10039160-208 = "呵呵，這樣討論起來就快多了呢☆"
10039160-209 = "來，快把你們做的食物端出來吧！"
10039160-211 = "老，老師！？"
10039160-212 = "[s11]「你們就相信我吧。」\n[s12]「他們今天不是來搞破壞，而是來擔任顧問的。」"
10039160-215 = "我們已經事先瞭解了情況。"
10039160-216 = "在來這裡的路上也觀察過周圍的商圈，並發現了一些問題。"
10039160-217 = "如果我們的假設正確，只要再完成幾項確認，應該就能提供解決方案。"
10039160-222 = "……咦？#n感覺還挺專業的……"
10039160-223 = "那麼首先，為了保證前提沒有出錯，請容我們對料理的水準進行審查。"
10039160-224 = "聽說……你們對此頗有信心是嗎？"
10039160-225 = "是，是的……我們都認為味道還算不錯……"
10039160-227 = "既然如此，就由我們來提供客觀的評價吧。"
10039160-228 = "我們美食研究會在這方面，可以稱得上是奇普托斯最專業的團體哦。"
10039160-229 = "嗯嗯！我們對味道可是很嚴格的！"
10039160-230 = "呃，你這麼說好像沒什麼說服力耶……"
10039160-232 = "假如味道方面沒有問題，就針對剛才發現的問題提供解決方案……#n即便有，我們也能提供相應的改善建議。"
10039160-234 = "我，我明白了……那請你們稍等一下！"
10039160-239 = "真期待～那些都是大家喜歡的食物呢。"
10039160-240 = "記得控制一下食量哦……要是全試吃光就沒意義了。"
10039160-244 = "請用……！#n首，首先是炒麵……"
10039160-249 = "嗯。那麼……"
10039160-258 = "[ns]「為什麼我這麼緊張……」"
10039160-264 = "沒問題。這份炒麵合格了。"
10039160-269 = "好，好耶！合格了！"
10039160-270 = "……等一下，為什麼我要這麼高興啊？"
10039160-272 = "雖然無法稱之為美食，不過以學生經營的攤位而言，水準相當不錯。#n果然正如老師所言，味道方面並沒有問題。"
10039160-274 = "那，那麼……"
10039160-275 = "問題出在哪裡呢……？"
10039160-277 = "呵呵，我們提出的解決方案是……"
10039160-278 = "方案是……！"
10039160-282 = "淳子同學，能麻煩你來解釋嗎？"
10039160-284 = "沒問題！"
10039160-288 = "我認為問題應該是出在宣傳方面。"
10039160-289 = "食物明明好吃卻沒有客人……"
10039160-290 = "這種情況，通常是因為客人「不知道」這裡的存在造成的。"
10039160-292 = "哦哦……原，原來如此……"
10039160-293 = "現在就連美食名店都很注重宣傳的哦？"
10039160-294 = "那，那我們該怎麼宣傳呢？"
10039160-295 = "具體方法要根據店鋪的類型來決定。#n不過就校園慶典的攤位來說，利用社群媒體是最簡單有效的做法！"
10039160-296 = "畢竟學生們通常是從社群媒體獲得資訊的嘛。"
10039160-300 = "你們看，重點是要在別人搜尋「三一狂歡節」的時候能看到你們的攤位。#n最好像這樣把攤位的資訊發出去，並加上各種標籤！這樣才能被更多人搜尋到哦！"
10039160-305 = "社群媒體……！#n得趕緊做筆記才行……"
10039160-307 = "除此之外，引導來到店裡的客人，在社群媒體上留言也是個不錯的做法唷～"
10039160-308 = "該，該怎麼引導呢？"
10039160-309 = "比如……只要發表評論，就能免費獲得一杯飲料之類的。"
10039160-310 = "哦哦……！#n這，這樣我確實也會比較願意寫評論。"
10039160-311 = "[s]「這就是經驗的差距嗎……在美食方面的見識和普通學生完全不同。」"
10039160-316 = "那就按照這個解決方案試試看吧！"
10039160-317 = "嗯嗯！關鍵在於宣傳對吧！沒問題！"
10039160-322 = "呵呵，來觀察成效如何吧。"
10039160-329 = "哦，這裡就是那條美食街嗎？東西還真多！"
10039160-330 = "我聽說那間炒麵很好吃耶？#n要不要挑戰一下辣味炒麵？"
10039160-331 = "我們要兩份炒麵！"
10039160-336 = "歡迎光臨～！麻煩稍等一下，炒麵馬上來哦！"
10039160-338 = "好像有點渴……也買點飲料吧！"
10039160-343 = "啊，現在只要幫我們在社群媒體留下評論，就能拿到免費的飲料哦！"
10039160-348 = "真的假的？你覺得咧？"
10039160-349 = "真的能免費嗎？#n那我馬上來評論！嘿嘿。"
10039160-351 = "好的，謝謝你們～！#n來，這邊是兩位的免費飲料！"
10039160-355 = "這邊要一份烤玉米！"
10039160-359 = "好的！來！謝謝～！"
10039160-368 = "我們這裡要八串烤雞肉串！一半要鹽味，一半要醬油！"
10039160-370 = "好的好的！#n現在訂單有點多，要麻煩稍等一下哦！"
10039160-375 = "[ns]「客人……突然變得好多！」"
10039160-376 = "看來選擇在大家肚子餓的時候集中發文是正確的。"
10039160-377 = "不錯不錯！看起來挺順利的哦～？#n搜尋「慶典」的時候，也能發現提及美食街的話題正在不斷增加。"
10039160-378 = "整體評論也偏向正面……#n畢竟雖然沒達到美食的境界，不過以學生的水準已經很不錯了。"
10039160-380 = "要是能有巧克力梅干章魚燒就更好了。"
10039160-381 = "雖然有點可惜，不過還有其他好吃的東西！"
10039160-382 = "[s]「美食研究會果然厲害！」"
10039160-384 = "呵呵，過去積累的美食經驗可是不會說謊的。"
10039160-385 = "雖然做料理有點困難，但提供諮詢還是可以的！"
10039160-386 = "照這樣下去，準備的食材可能會不夠呢☆"
10039160-387 = "我們也來吃點東西吧？"
10039160-388 = "嗯！正好有點餓了！"
10039160-389 = "[s]「好，今天我請客！你們盡量吃！」"
10039160-393 = "哦……真的嗎？"
10039160-397 = "[ns]（趕緊確認一下錢包……）"
10039160-398 = "呵呵……別擔心，老師。#n今天我們會「適．可．而．止」的。"
10039160-399 = "[s]「嗯，嗯……」"
10039160-401 = "（諮詢結束後，美食街變得非常熱鬧）"
10039160-405 = "（尤其「沒有店家被美食研究會炸掉」的傳聞，似乎起了很大的作用……）"

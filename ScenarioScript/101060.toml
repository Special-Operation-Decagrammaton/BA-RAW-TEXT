[translation]
101060-1 = "ตอนที่ 6;ลางสังหรณ์"
101060-7 = "รินจัง~ รินจัง~"
101060-8 = "ใครคือรินจังกันคะ กรุณาอย่าใช้คำเรียกแบบนั้นเลยค่ะ ท่านประธาน"
101060-9 = "เอ๋... แต่ยังไงรินจังก็คือรินจังนะ อืม... ถ้างั้นจะเรียกว่าอะไรดี...?"
101060-10 = "คะ... คุณนานากามิ...?"
101060-11 = "......"
101060-12 = "คุณริน? ท่านริน? คุณท่านริน...?"
101060-13 = "...... จะเรียกอะไรก็ตามใจเถอะค่ะ"
101060-14 = "ยังไงก็มีแค่ท่านประธานที่เรียกฉันแบบนั้น จะเรียกว่ายังไงก็ไม่เป็นไรหรอกค่ะ"
101060-15 = "อื้ม! รินจัง~ รินจัง~ ฮิฮิ~"
101060-16 = "......เอ๋? เอ๋~ เมื่อกี้รินจังยิ้มออกมาใช่มั้ย?"
101060-17 = "...... เปล่านะคะ"
101060-18 = "เปล่าอะไรล่ะ? ฉันเห็นเต็มสองตาเลยนะ"
101060-19 = "...... ไม่มีทางเป็นแบบนั้นหรอกค่ะ"
101060-20 = "งั้นเหรอ? ไม่น่าใช่นะ......"
101060-21 = "......"
101060-22 = "...... ไม่ใช่จริงๆ ค่ะ"
101060-24 = "รุ่นพี่ริน..."
101060-25 = "......!!"
101060-26 = "องค์การนักเรียน"
101060-27 = "รุ่นพี่... เหนื่อยใช่ไหมคะ? ทำงานจนไม่ได้กลับที่พักมาตั้งหลายวันแล้ว..."
101060-28 = "อายูมุ... นี่ฉันคง... เผลอหลับไปสินะคะ"
101060-29 = "ขอโทษด้วยค่ะ พอดีว่ามีบางอย่างที่ต้องตรวจสอบ... ปะ... เป็นเรื่องด่วนน่ะค่ะ..."
101060-30 = "ค่ะ... ไม่เป็นไรค่ะ ไปเถอะค่ะ"
101060-36 = "โอ้โห รุ่นพี่ริน รุ่นพี่อายูมุ ต้องเหน็ดเหนื่อยถึงดึกดื่นกันเลยสินะ"
101060-37 = "โมโมกะ"
101060-38 = "โมโมกะจัง... ช่วยดูนี่หน่อยค่ะ..."
101060-39 = "อื้ม มาทางนี้เลย"
101060-45 = "นี่มัน...?"
101060-46 = "ข้อมูลที่สืบค้นได้เมื่อ 2 ชั่วโมงก่อน"
101060-49 = "สังเกตพบก้อนมวลสารที่มีพลังงานเข้มข้นสูงเป็นพิเศษกระจายอยู่ทั่วคิโวทอสถึง 6 ก้อน"
101060-50 = "......"
101060-51 = "ไหนดูซิ... ทะเลทรายอะบิดอส สวนสนุกร้างชานเมือง D.U. พื้นที่ปิดชายขอบมิลเลเนียม เขตชายแดน#nระหว่างทรีนิตี้กับเกเฮนน่า เมืองใหม่ในชานเมืองมิลเลเนียม... แล้วก็ใจกลางแซงค์ทัมทาวเวอร์"
101060-53 = "ใจกลางแซงค์ทัมทาวเวอร์... "
101060-54 = "ใช่... ที่ที่อยู่เหนือเราพอดี..."
101060-55 = "ฉันเองก็ไปเช็กวิดีโอจากกล้องภายนอกมาเหมือนกัน... แต่ก็ไม่พบอะไรเลยค่ะ"
101060-56 = "อื้ม แซงค์ทัมทาวเวอร์ยังคงเป็นเหมือนเดิมไม่เปลี่ยนเลย"
101060-57 = "......"
101060-58 = "กับเขตอื่นก็เหมือนกัน"
101060-59 = "ตอนแรกฉันคิดว่าจะมีพายุไต้ฝุ่นรุนแรงอะไรทำนองนั้นหรือเปล่า แต่มันก็ดูไม่ค่อยจะสมเหตุสมผล พายุไต้ฝุ่นมันไม่มีทางที่จะมีมวลสารแบบนั้นได้"
101060-60 = "ได้ข้อมูลมา แต่มันไม่มีอยู่จริงงั้นเหรอ..."
101060-61 = "อะฮะฮะฮ่า งั้นก็มีแค่ข้อสรุปเดียว เครื่องคงจะเสียละมั้ง!"
101060-62 = "โมโมกะจัง..."
101060-63 = "......"
101060-64 = "ไม่มีทางเลือกอื่นนอกจากไปดูด้วยตัวเองสินะคะ"
101060-65 = "หืม? รุ่นพี่ริน... ว่ายังไงนะคะ..."
101060-66 = "อะไรนะ? จะไปที่เขตปกครองตนเองนั้นด้วยตัวเองเหรอ? เราส่งโดรนบินไปสำรวจแล้ว แต่ก็ไม่เจออะไร#nเลยนะ"
101060-67 = "แล้วก็ไม่มีการรายงานความผิดปกติจากแต่ละเขตปกครองตนเองด้วย"
101060-71 = "เรียกรวมตัวผู้แทนสภานักเรียนของแต่ละเขตปกครองตนเองเดี๋ยวนี้ค่ะ"
101060-72 = "......!?"
101060-73 = "ว่าไงนะ?"
101060-74 = "ตอนนี้องค์การนักเรียนไม่สามารถรับมือกับปัญหานั้นได้ เราจึงจะร่วมมือกับแต่ละเขตปกครองตนเอง#nเพื่อวิเคราะห์ความผิดปกติในเขตนั้นๆ ค่ะ"
101060-75 = "ด้วยอำนาจรักษาการแทนประธานองค์การนักเรียน ฉันจะบังคับใช้โปรโตคอลฉุกเฉิน และจะจัดตั้ง#nคณะกรรมการมาตรการฉุกเฉินค่ะ"
101060-76 = "มาตรการฉุกเฉิน...? ระ... เราต้องทำถึงขนาดนั้นเลยเหรอ? เครื่องมันอาจจะแค่เสียก็ได้นะ"
101060-77 = "ถ้าเป็นแบบนั้นก็ถือว่าดีแล้วละค่ะ จะได้จบเรื่องโดยที่ไม่มีความเสียหาย"
101060-78 = "แต่หากสถานการณ์ทั้งหมดยังไม่ถูกเปิดเผยออกมา เราก็ต้องพยายามรับมืออย่างเต็มที่ค่ะ"
101060-79 = "ไม่ใช่แค่ทรีนิตี้ เกเฮนน่า มิลเลเนียมและอะบิดอสนะคะ... ติดต่อและเรียกตัวผู้รับผิดชอบโรงเรียนของ#nทุกเขตปกครองตนเองมาให้หมดค่ะ"
101060-80 = "......"
101060-81 = "เฮ้อ... งานเข้าแล้วไง... แบบนี้คงต้องโต้รุ่งเป็นอาทิตย์แหงๆ"
101060-83 = "รุ่นพี่ริน...! มะ... มันจะไม่เป็นไรเหรอคะ?"
101060-87 = "พอดีว่า... ช่วงนี้... มีข่าวแพร่ไปทั่วเลยค่ะว่า... รุ่นพี่รินใช้อำนาจของผู้รักษาการแทนในทางมิชอบมาก#nเกินไป..."
101060-88 = "ถ้าเป็นประเด็นขนาดนี้ ตำแหน่งของรุ่นพี่รินอาจจะอันตรายก็ได้นะคะ...  โดยเฉพาะอย่างยิ่งแล้ว ประเด็นนี้อาจถูกมองว่าเป็นการละเมิดอำนาจของสำนักป้องกันก็ได้..."
101060-89 = "แน่นอนว่าการใช้อำนาจแทนในนามประธานองค์การนักเรียนไม่ใช่สิ่งที่ผิดกฎหมาย... แต่ว่าทางฝ่าย#nการเงิน..."
101060-90 = "ก็คงจะซักไซ้ไล่เลียงและถามคำถามไม่หยุดเลยน่ะสิ..."
101060-93 = "อ๊ะ... หะ... หัวหน้าฝ่ายการเงิน..."
101060-94 = "โอคิ อาโออิ"
101060-95 = "หัวหน้าฝ่ายบริหาร"
101060-97 = "อ๊ะ... ฉันนึกเรื่องยุ่งๆ ออกพอดีน่ะ ขอตัวก่อนแล้วกันนะ"
101060-105 = "(กระซิบ) โมโมกะจัง... ห้ามหนีไปไหนนะคะ"
101060-106 = "(กระซิบ) อุว้ากก ปล่อยนะ ปล่อยฉันนะรุ่นพี่อายูมุ! ขืนอยู่ที่นี่ต่อ ฉันคงขาดอากาศหายใจตายแน่ๆ!"
101060-109 = "เจ้าหน้าที่ฝ่ายบริหารเข้ามาละเมิดอำนาจของสำนักป้องกันตั้งแต่เมื่อไรกันเหรอ?"
101060-110 = "อาโออิ เรื่องนี้มัน..."
101060-111 = "ไม่ต้องอธิบายหรอก ฉันเองก็เห็นข้อมูลนี้มาแล้ว"
101060-112 = "ที่เกิดปรากฏการณ์ผิดปกติที่ไม่อาจรู้ได้ขึ้นในคิโวทอสน่ะ"
101060-113 = "ถึงจะยังไม่มีเค้าลางหรือความเสียหายจริงที่เกิดขึ้น แต่จนกว่าเราจะพิสูจน์ได้ว่าไม่มีภัยคุกคาม เราก็ต้องระดมทุกวิถีทางเพื่อตั้งรับในระดับสูงสุด ...... ฉันจะไม่คัดค้านกับการตัดสินใจนี้"
101060-114 = "หากแต่มันมาจากการตัดสินใจของประธานองค์การนักเรียนละก็นะ..."
101060-115 = "......"
101060-116 = "แต่คุณไม่ใช่ประธานองค์การนักเรียนนี่นา หัวหน้าฝ่ายบริหาร การสวมปลอกแขนรักษาการแทนอยู่ มันไม่ได้หมายความว่าคุณจะได้เป็นคนคนนั้นหรอกนะ"
101060-117 = "ทั้งเรื่องเสียอำนาจควบคุมการบริหารแซงค์ทัมทาวเวอร์ การตัดสินใจปิดสถาบัน SRT กระทั่งการรับ#nรององค์กรปริศนา <ชาเล่ต์>"
101060-118 = "แล้วนี่มันยังอะไรอีก? การพยากรณ์จาก <ชาเล่ต์>? ฝันบอกเหตุการล่มสลาย? นี่ยังจะไปคล้อยตาม#nคำพูดแปลกๆ แบบนั้นอีก"
101060-119 = "ถึงจะเป็นรักษาการแทนก็เถอะ แต่ตอนนี้คุณล้ำเส้นมากเกินไปแล้ว"
101060-120 = "อาโออิ ฉันรู้ว่าเธอไม่ชอบฉัน..."
101060-121 = "แต่สิ่งที่ฉันทำอยู่ตอนนี้มันไม่ได้เป็นเพราะความรู้สึกส่วนตัวหรอกนะ"
101060-122 = "ฉันชื่นชมความสามารถของคุณมาตั้งแต่ไหนแต่ไรแล้ว ประธานองค์การนักเรียนเองก็ด้วย ไม่มีใครรู้ดี#nไปกว่าฉันหรอกว่าคุณน่ะยอดเยี่ยมแค่ไหน"
101060-123 = "แต่ถึงอย่างนั้น ก็ใช่ว่าคุณจะเป็นยอดคนได้อย่างประธานองค์การนักเรียนหรอกนะ"
101060-124 = "ที่คุณได้มารักษาการแทน ก็เป็นเพราะคุณเป็นหัวหน้าฝ่ายบริหาร ไม่ใช่เพราะว่าได้รับการยอมรับใน#nความสามารถหรือคุณวุฒิอะไร มันเป็นเพียงขั้นตอนการบริหารก็เท่านั้นละ"
101060-125 = "ความจริงนี้จะตามหลอกหลอนคุณไปตลอดตราบใดที่คุณยังใส่ปลอกแขนนั่นอยู่ จะตัดสินใจอะไรก็อย่า#nลืมคิดถึงเรื่องนี้ล่ะ [ruby=.]ตัว[/ruby][ruby=.]แทน[/ruby]"
101060-126 = "......"
101060-127 = "และถ้าคุณยังจะจัดตั้งคณะกรรมการมาตรการฉุกเฉิน ก็ต้องมีหลักฐานและตรรกะที่ดีพอ... ที่จะละเมิด#nอำนาจของสำนักป้องกันได้"
101060-128 = "อย่างน้อยก็ต้องเตรียมหาสิ่งที่จะโน้มน้าวฉันแล้วละ"
101060-129 = "ถ้าทำไม่ได้... ฉันคง..."
101060-130 = "มองว่าคุณจงใจฉวยโอกาสที่ประธานองค์การนักเรียนหายตัวไป แล้วทำให้อำนาจของตัวเองมั่นคงขึ้น"
101060-131 = "......"
101060-132 = "ฉันจะจำคำนี้ไว้ค่ะ"
101060-133 = "เอาละ... งั้นฉันขอตัวก่อน"
101060-138 = "แล้วก็... นอนหลับพักผ่อนเสียบ้างนะ"
101060-139 = "ผิวรุ่นพี่เสียกว่าแต่ก่อนเยอะเลย"
101060-145 = "......"
101060-146 = "อุ๊บ เฮือก..."
101060-147 = "แฮ่ก... แฮ่ก... แฮ่ก... นึกว่าจะขาดใจตายแล้วซะอีก"
101060-148 = "รุ่นพี่ริน..."
101060-149 = "อายูมุ เตรียมตั้งคณะกรรมการมาตรการฉุกเฉินเลยค่ะ"
101060-153 = "......!!"
101060-154 = "......"
101060-159 = "ตายจริง เจ้าหน้าที่ริน..."
101060-160 = "หัวหน้าสำนักป้องกัน..."
101060-161 = "ขอโทษนะคะ พอดีเสียงของหัวหน้าฝ่ายการเงินดังมาก ฉันก็เลยได้ยินเข้าโดยที่ไม่ได้ตั้งใจค่ะ"
101060-162 = "...ขอโทษเรื่องคณะกรรมการมาตรการฉุกเฉินด้วยนะคะ ช่วยเข้าใจด้วยเถอะค่ะ"
101060-163 = "ไม่เป็นไรค่ะ นั่นเป็นอำนาจอันสมควรของผู้รักษาการแทนนี่คะ ฉันเข้าใจค่ะ"
101060-164 = "......"
101060-165 = "โธ่ เจ้าหน้าที่ก็แค่พยายามทำให้ดีที่สุดแท้ๆ... การรักษาตำแหน่งให้ประธานองค์การนักเรียนมันไม่ใช่#nเรื่องง่ายเลยนะคะ หัวหน้าฝ่ายการเงินเองก็ไม่เห็นจะต้องมาตำหนิกันแรงๆ แบบนี้เลย"
101060-166 = "แต่ยังไงคนที่สงสัยในอำนาจของคุณก็ยังมีอยู่ไม่น้อย... จะทำยังไงดีเนี่ย..."
101060-167 = "...จริงสิ เรียกชาเล่ต์มาร่วมมือในคณะกรรมการมาตรการฉุกเฉินดีไหมคะ?"
101060-168 = "ชาเล่ต์เหรอคะ......?"
101060-169 = "ใช่ค่ะ ถ้ามีคุณครูชาเล่ต์มาร่วมด้วย อาจจะช่วยโน้มน้าวตัวแทนของแต่ละโรงเรียนได้ด้วยนะคะ"
101060-170 = "มีข่าวลือว่าชาเล่ต์สร้างผลงานน่าประทับใจไว้ทุกเขตปกครองตนเองเลยค่ะ แถมยังไปเปิดโปงพฤติกรรม#nการกระทำที่ผิดกฎหมายของนักเรียนในโรงเรียนตำรวจบางคนอีก นี่มันองค์กรสารพัดประโยชน์จริงๆ ค่ะ"
101060-171 = "ถ้ามีคุณครูอยู่ด้วย ก็คงคลายความกังวลในการทำงานได้บ้างนะคะ"
101060-172 = "ค่ะ... ขอบคุณที่แนะนำนะคะ เป็นวิธีที่ไม่เลวเลยค่ะ ยังไงฉันก็ต้องการความร่วมมือจากชาเล่ต์อยู่แล้ว"
101060-173 = "...... ถ้างั้นฉันจะเป็นคนขอให้คุณครูมาที่นี่เองค่ะ"
101060-174 = "ระหว่างเดินทางจากอาคารชาเล่ต์มาถึงที่นี่ควรจะมีการคุ้มกันด้วย... จะขอให้วัลคิรี่ช่วยได้ไหมนะ"
101060-175 = "ขอบคุณสำหรับความช่วยเหลือนะคะ คายะ รบกวนเรื่องนั้นด้วยนะคะ"
101060-176 = "ขอบคงขอบคุณอะไรกันล่ะคะ ในเวลาที่ยากลำบากแบบนี้ เราก็ต้องช่วยเหลือกันแบบนี้แหละค่ะ"

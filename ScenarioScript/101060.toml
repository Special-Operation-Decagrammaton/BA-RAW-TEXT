[translation]
101060-1 = "第6話;前兆"
101060-7 = "琳醬，琳醬～"
101060-8 = "誰是「琳醬」啊？#n我已經跟您說過別用那個稱呼了吧？學生會長。"
101060-9 = "但是……琳醬就是琳醬嘛……#n唔嗯，那該怎麼稱呼你好呢……"
101060-10 = "七神……小姐？"
101060-11 = "……"
101060-12 = "還是琳同學？#n琳大人？……琳閣下？"
101060-13 = "……隨您高興吧。"
101060-14 = "您想怎麼稱呼都可以。#n反正會那樣叫我的，肯定就只有學生會長而已。"
101060-15 = "我知道了，那就決定是琳醬了！嘿嘿。"
101060-16 = "……咦～？#n難道琳醬剛才笑了嗎？"
101060-17 = "……我沒有笑。"
101060-18 = "嘿～？我有看到唷？"
101060-19 = "……是您的錯覺。"
101060-20 = "是嗎？#n我還以為你笑了呢……"
101060-21 = "……"
101060-22 = "……真的只是錯覺。"
101060-24 = "琳前輩……"
101060-25 = "……！！"
101060-26 = "聯邦學生會室"
101060-27 = "前輩，您還好嗎……？"
101060-28 = "步……？#n……不好意思，我似乎睡了一會兒。"
101060-29 = "抱歉在您疲累時打擾您。有需要緊急確認的事項……"
101060-30 = "……好的，沒關係。走吧。"
101060-36 = "哦，琳前輩和步前輩。忙到這麼晚辛苦了～"
101060-37 = "桃香。"
101060-38 = "桃香醬……快把那個……"
101060-39 = "好的～這裡這裡。"
101060-45 = "這是……？"
101060-46 = "這是2小時前探測到的數據。"
101060-49 = "在奇普托斯各處觀測到了數個超高濃度的能量體。"
101060-50 = "……"
101060-51 = "呃……地點是阿拜多斯沙漠、D.U.近郊的廢棄遊樂園、#n千年郊外的封鎖地區、三一與格黑娜的邊界附近、千年近郊的新城市……以及，[ruby= ・     ・     ・     ・     ・     ・     ・ ]聖所之塔正中央[/ruby]。"
101060-53 = "聖所之塔正中央，也就是說……"
101060-54 = "沒錯……就是我們現在所在的位置。#n這裡的正上方。"
101060-55 = "聽到這個消息後，我確認過外部攝影機的影像……#n卻什麼都沒有發現……"
101060-56 = "沒錯。完全沒有發現任何異常。"
101060-57 = "……"
101060-58 = "其他的地區也確認過了。"
101060-59 = "一開始我還以為是超大型的颱風要來了，#n不過颱風又沒有質量……"
101060-60 = "能觀測到數據，但實際上卻不存在……是這個意思吧。"
101060-61 = "就是這麼回事。#n──那剩下的可能性就只有一個。機械故障了！"
101060-62 = "桃香醬……"
101060-63 = "……"
101060-64 = "看來只能實際確認了呢。"
101060-65 = "那個……琳前輩，您剛才說什麼……？"
101060-66 = "什麼！？打算直接過去嗎？明明無人機什麼都沒看見？"
101060-67 = "沒有收到異常報告就這麼大費周章……"
101060-71 = "──緊急召集各個自治區的學生會代表。"
101060-72 = "……！？"
101060-73 = "咦？"
101060-74 = "現在的聯邦學生會沒有能加以應對的餘力。#n所以會和各個自治區合力進行各區域的分析。"
101060-75 = "我以聯邦學生會長代理的權限發動緊急協議。#n──成立奇普托斯緊急對策委員會。"
101060-76 = "緊急對策委員會……？需，需要做到這種程度嗎？#n說不定單純只是機械故障而已唷？"
101060-77 = "……那也無所謂。如果只是我杞人憂天的話。"
101060-78 = "但是，在查明本次事件的全貌之前，應該全力採取措施應對才對。"
101060-79 = "三一、格黑娜、千年……以及阿拜多斯。#n不只是這些，召集能夠聯絡上的所有自治區的負責人來這個地方吧。"
101060-80 = "……"
101060-81 = "哇……完了。#n看來這週都得熬夜了……"
101060-83 = "琳前輩……！#n那個……這樣真的，沒問題嗎？"
101060-87 = "那個……最近……抱怨琳前輩濫用代理權限的聲音……#n在各處都時有耳聞……"
101060-88 = "如果召集各自治區的代表，琳前輩的立場可能會有點危險……#n特別是這次可能會被視為侵害了防衛室的權限……"
101060-89 = "啊，當然我認為作為聯邦學生會長代理，這樣的判斷是適當的……#n但財務室……"
101060-90 = "……將對每一個判斷提出質疑吧。"
101060-93 = "啊，財務室長……！"
101060-94 = "──扇喜碧。"
101060-95 = "琳行政官。"
101060-97 = "哎呀……突然想起有件事要忙，我先走囉～"
101060-105 = "（竊竊私語）桃香醬，請別逃走。"
101060-106 = "（竊竊私語）放，放開我呀～步前輩！#n待在這裡會呼吸困難窒息而死的！"
101060-109 = "統領室的行政官從何時開始連防衛室的權限都掌握了呢？"
101060-110 = "碧，這是……"
101060-111 = "說明就免了。這件事我已有所掌握。"
101060-112 = "奇普托斯發生前所未有的異常現象。"
101060-113 = "沒有徵兆、沒有實際損失──但是，在證明並非威脅之前，#n應該動用所有手段，以最高水準來應對……我對這項決定沒有異議。"
101060-114 = "……如果做出決定的是[ruby= ・     ・     ・     ・     ・     ・     ・     ・ ]聯邦學生會長的話[/ruby]。"
101060-115 = "……"
101060-116 = "然而，你並不是聯邦學生會長，行政官。#n即使戴上了代理的臂章，也不代表你成為了那個人。"
101060-117 = "不只失去了聖所之塔的行政權，還決定關閉SRT學園……#n甚至認可了來歷不明的組織「夏萊」……"
101060-118 = "現在這又是怎麼回事？#n「夏萊」的預言？終焉的預知夢……？被那些胡言亂語擺布……"
101060-119 = "就算你是「代理」，這也太超過了。"
101060-120 = "碧，我知道你對我有所不滿……"
101060-121 = "……我現在所說的話並非出於私人的感情。"
101060-122 = "我從以前就對你的能力有著很高的評價。聯邦學生會長也是如此。#n我自認比任何人都了解你的能力。"
101060-123 = "但是，你無法成為像聯邦學生會長一樣的超人。"
101060-124 = "你之所以能成為代理，單純只是因為你是統領室的「行政官」，#n這並不代表你的能力獲得了認可，只不過是因為有那個必要而已。"
101060-125 = "這個事實，只要你還戴著代理的臂章，都會與你如影隨行吧。#n希望你能加以考量後再做出判斷──聯邦學生會長「代理」。"
101060-126 = "……"
101060-127 = "儘管如此，如果你想成立緊急對策委員會，#n就需要足以侵犯防衛室權限的根據以及正當性。"
101060-128 = "至少──要做好能夠說服我的準備再發言。"
101060-129 = "如果辦不到的話──"
101060-130 = "……我會將你視為以聯邦學生會長失蹤為理由濫用代理權限，#n企圖將聯邦學生會私有化的存在。"
101060-131 = "……"
101060-132 = "我會銘記於心。"
101060-133 = "……是嗎。#n那我就告辭了──"
101060-138 = "……還有，請稍微睡一下吧。"
101060-139 = "你的黑眼圈很重唷。這樣不就白費你漂亮的皮膚了嗎。"
101060-145 = "……"
101060-146 = "噗哈──"
101060-147 = "哈啊……哈啊……還以為要窒息而死了。"
101060-148 = "琳前輩……"
101060-149 = "步，做好緊急對策委員會的準備。"
101060-153 = "……！！"
101060-154 = "……"
101060-159 = "哎呀，琳行政官……"
101060-160 = "香耶……"
101060-161 = "抱歉。#n財務室長的聲音實在太大……不小心就變成像是在偷聽一樣了。"
101060-162 = "……緊急對策委員會的事情我很抱歉。"
101060-163 = "沒關係的，畢竟您是代理。#n我認為那是您應有的權限唷。"
101060-164 = "……"
101060-165 = "行政官只是盡力履行義務而已……要填補聯邦學生會長的空缺並不容易。財務室長明明不必說那種話的……"
101060-166 = "但是……有人質疑您的權威也是事實……真讓人困擾呢。"
101060-167 = "對了……讓夏萊一起參加緊急對策委員會，您覺得如何呢？"
101060-168 = "夏萊……？"
101060-169 = "是的。說不定對說服各個學園的代表會有所幫助。"
101060-170 = "各個自治區都能聽見夏萊活躍的表現。#n甚至還阻止了警察學校的違法行為……真是名符其實的搜查部呢。"
101060-171 = "如果老師能一同出席，也能減輕行政官的煩惱吧。"
101060-172 = "……謝謝你的建議。#n你說的對，我正好打算向夏萊請求協助。"
101060-173 = "……那麼，就由我來聯絡老師吧。"
101060-174 = "要從夏萊移動到這裡也需要護送……#n這件事就拜託女武神吧。"
101060-175 = "謝謝你的幫忙，香耶。拜託你了。"
101060-176 = "這不算什麼，畢竟現在是這種情況，我們就互相幫助吧。"
101060-177 = "那麼我就先告辭了。"
101060-182 = "……"
101060-187 = "……沒錯，繼續進行吧。"
101060-189 = "下一話;召集緊急對策委員會"

101060-165 = "3;카야;05;그것 참. 행정관은 열심히 하려고 하는 것뿐인데…… 총학생회장의 빈자리를 채우는 게 쉬운 일도 아닌데 말이죠. 재무실장도 이렇게까지 몰아세울 필요는 없는데."

101060-170 = "3;카야;03;소문에 의하면 각 자치구 여기저기서 샬레의 활약상이 들려오더군요. 심지어 경찰학교 일부 학생들의 불법 행위까지 밝혀내기도 했던데. 그야말로 만능수사 동아리.\n#3;em;[음표]"

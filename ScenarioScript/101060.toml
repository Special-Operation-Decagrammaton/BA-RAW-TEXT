[translation]
101060-1 = "Episode 6; Foreshadowing"
101060-7 = "Rinny! Rinny!"
101060-8 = "How many times have I told you, President? Please don't call me Rinny."
101060-9 = "Huh? B-But you're Rinny to me... What else would I call you...?"
101060-10 = "N-Nanagami...?"
101060-11 = "..."
101060-12 = "Just Rin? Mrs. Rin?"
101060-13 = "...Just call me whatever you want."
101060-14 = "You're the only one who calls me that anyway."
101060-15 = "Okay! Rinny! Rinny! Heehee!"
101060-16 = "...Huh? Huhhh? Did you just smile, Rinny?"
101060-17 = "I did not."
101060-18 = "Nuh-uh! I saw it!"
101060-19 = "No. I did not."
101060-20 = "Are you suuure? I think you did!"
101060-21 = "..."
101060-22 = "I'm very serious. I did not."
101060-24 = "Rin..."
101060-25 = "...!"
101060-26 = "General Student Council Room"
101060-27 = "You must be so tired. You haven't had a good night's sleep in a long time."
101060-28 = "Oh, Ayumu... I must have dozed off."
101060-29 = "I'm so sorry to wake you. But there was an urgent matter..."
101060-30 = "Don't worry. Let's go."
101060-36 = "Wow, Rin, Ayumu. You're working so hard."
101060-37 = "Momoka."
101060-38 = "Momoka... It's urgent..."
101060-39 = "I know, I know. This way."
101060-45 = "This is...?"
101060-46 = "These readings were detected two hours ago."
101060-49 = "Six masses with incredibly high energy have been observed throughout Kivotos."
101060-50 = "..."
101060-51 = "Let's see... The Abydos Desert, the abandoned amusement park near D.U., the closed area in the Millennium outskirts, the border area between Trinity and Gehenna, that new town near Millennium...and the center of Sanctum Tower."
101060-53 = "The center of Sanctum Tower..."
101060-54 = "Yup. Right on top of us."
101060-55 = "I tried to gather some intel through our security cameras, but nothing appeared amiss."
101060-56 = "Looked like the same old Sanctum Tower."
101060-57 = "..."
101060-58 = "Nothing in all the other areas the energy masses were detected in either."
101060-59 = "At first, I was like, is it a bunch of huge typhoons come to wreck Kivotos? But that wouldn't work, typhoons don't have mass like that."
101060-60 = "Data was observed, but it doesn't actually exist..."
101060-61 = "Hahaha! Then there's only one conclusion. The machine must be broken!"
101060-62 = "Momoka..."
101060-63 = "..."
101060-64 = "We'll need to go in person to confirm."
101060-65 = "Wh-What do you mean, Rin?"
101060-66 = "Excuse me? You wanna go all the way to the district? I'm telling you, we checked the observation drones and there was nothing. Zilch! Nada!"
101060-67 = "We haven't gotten any abnormal reports from any of the districts."
101060-71 = "...Please gather the student council representatives."
101060-72 = "...?!"
101060-73 = "What?!"
101060-74 = "The General Student Council doesn't have the power to respond to something of this scale. We'll have to coordinate with each district to analyze this phenomenon."
101060-75 = "With the authority of the acting president of the General Student Council, I am initiating emergency protocol. Please gather the Kivotos Emergency Response Committee."
101060-76 = "Isn't that a bit extreme? It could just be a simple mechanical malfunction for all we know. What then?"
101060-77 = "If it is, that would be a relief. We could pass it off as a simple mistake."
101060-78 = "But until we've uncovered the full picture, we must respond with the full force of Kivotos."
101060-79 = "Begin by summoning the representatives of Trinity, Gehenna, Millennium, Abydos...all the districts we can contact."
101060-80 = "..."
101060-81 = "Whoa... Seriously? We're not gonna sleep for a week."
101060-83 = "R-Rin... Do you think it'll be okay?"
101060-87 = "Umm... Well, there have been some complaints recently that you've been abusing the office's power..."
101060-88 = "Taking such drastic measures could endanger your position as acting president. People will probably interpret this especially as violating the authority of the Defense Office."
101060-89 = "You're not necessarily stepping out of the bounds of your office, but...the treasury..."
101060-90 = "...They're always unnecessarily raising issues, aren't they?"
101060-93 = "Ah! Chief of Finance..."
101060-94 = "Oki Aoi."
101060-95 = "Chief Officer."
101060-97 = "Eek! I, uh, totally forgot! I've got lots of responsibilities to get to! Bye-bye! "
101060-105 = "*whisper* Momoka, You can't run away!"
101060-106 = "*whisper* Wh-Whoa! Let me go, Ayumu! I'll die if I stay here!"
101060-109 = "Please tell me. When did the Chief Officer begin encroaching on the authority of the Defense Office?"
101060-110 = "Aoi. This situation..."
101060-111 = "You don't need to explain. I'm well aware of the situation."
101060-112 = "An unknown phenomenon has befallen Kivotos."
101060-113 = "You intend to respond at the highest level by all means necessary until we can ascertain that these unknown masses are not a threat to Kivotos. I don't disagree with this decision."
101060-114 = "More accurately, I would not disagree if it was the president of the General Student Council's decision."
101060-115 = "..."
101060-116 = "But that's not you, is it? You're a mere proxy."
101060-117 = "You've lost administrative control of the Sanctum Tower, closed SRT Academy, and even approved an unknown organization like Schale."
101060-118 = "That I could tolerate. But now? A vague Schale prophecy? A premonition of destruction? What ridiculousness are you indulging in?"
101060-119 = "As a proxy, you've crossed more than one line.  "
101060-120 = "Aoi, I understand you don't approve of me or my practices."
101060-121 = "But my decisions are not based on any personal feelings."
101060-122 = "You're wrong. I appreciate your abilities. I would go so far as to say they are the best in your field. That's why the president recognized you as well."
101060-123 = "But abilities do not make you the president of the General Student Council."
101060-124 = "You became the proxy because you were the chief officer of the Supervisory Office, and therefore next in line when the president disappeared. It was not a recognition of your qualifications for the position."
101060-125 = "That mere fact should shadow your every move as the acting president. Keep in mind your every decision is made under said shadow. Proxy."
101060-126 = "..."
101060-127 = "If despite all of this you still intend to assemble the Emergency Response Committee, you'll need to have the evidence to justify infringing on the Defense Office's authority like this."
101060-128 = "Your argument should be polished enough to convince me."
101060-129 = "Otherwise..."
101060-130 = "The public will view you as an opportunist seeking to solidify your position while the president is still missing."
101060-131 = "..."
101060-132 = "I'll keep your advice in mind."
101060-133 = "All right. Then..."
101060-138 = "You need more rest."
101060-139 = "Your skin's seen better days."
101060-145 = "..."
101060-146 = "*exhale*"
101060-147 = "*pant* *pant* I didn't think I was gonna make it..."
101060-148 = "Rin..."
101060-149 = "Ayumu, prepare the Emergency Response Committee."
101060-153 = "...!"
101060-154 = "..."
101060-159 = "Oh, Chief Officer Rin..."
101060-160 = "Chief of Defense..."
101060-161 = "I'm sorry. The chief of finance's voice was so loud that I couldn't help but overhear."
101060-162 = "Not at all. I apologize about the Emergency Response Committee. I hope you can understand."
101060-163 = "I do. It's within your authority."
101060-164 = "..."
101060-165 = "The General Student Council president's shoes are big ones to fill. The chief of finance was too harsh with you."
101060-166 = "But the facts remain. A lot of people challenge your authority... How can we best handle that?"
101060-167 = "Ah! Why don't we ask Schale to join the Emergency Response Committee?"
101060-168 = "Schale...?"
101060-169 = "Precisely! If Schale's Sensei is there, it'll help sway the academy representatives' opinions on the matter."
101060-170 = "Schale's achievements are well known all over Kivotos at this point. Didn't they even uncover some corruption at Valkyrie Police School? They're truly able to do it all."
101060-171 = "Sensei's presence would help ease your worries as well."
101060-172 = "Thank your for your advice. We'll need Schale's cooperation regardless."
101060-173 = "I can reach out to Sensei for you, then."
101060-174 = "You'll need security when they come here from the Schale building. I guess we could ask Valkyrie for that."
101060-175 = "Thank you for the help, Kaya. I'll be counting on you."
101060-176 = "Don't thank me. We need to support each other in times like these, Chief Officer."
101060-177 = "Then, I'll be on my way."
101060-182 = "..."
101060-187 = "...Yes. You'll need to be prepared."
101060-189 = "Next Episode; Convening the Emergency Response Committee"

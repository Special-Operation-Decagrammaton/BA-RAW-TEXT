[translation]
10011060-1 = "第6話;第三道關卡：讀心術師"
10011060-4 = "追擊戰已漸漸進入白熱化的狀態……"
10011060-5 = "和我預料的一樣，目前脫穎而出的是「忍術研究部」！#n領先其他隊伍，率先通過了睡美人的試煉！"
10011060-6 = "這就是傳說中「忍者」的力量嗎～？"
10011060-7 = "當然還有那位「夏萊」的老師在一旁協助，這點或許也該納入考慮呢♪"
10011060-8 = "不過大家都能盡情享受的才是慶典嘛～#n這點程度的違規就睜一隻眼閉一隻眼吧♪"
10011060-9 = "那麼那麼，還請繼續加油哦～♪"
10011060-11 = "[ns]「從頭到尾都被看在眼底呢……」"
10011060-12 = "算了，至少事情還沒有曝光……"
10011060-16 = "最快通過「睡美人」那關的就是那些人嗎？"
10011060-17 = "睡美人不就是那個修行部的部長嗎？#n雖然很佩服，不過我好像沒聽過什麼「忍術研究部」……"
10011060-18 = "有那種社團嗎！？"
10011060-19 = "可能有吧……話說名字還真奇怪。"
10011060-21 = "「名字真奇怪」……！？"
10011060-22 = "[s]「我想可能是因為還沒聽習慣吧。」"
10011060-23 = "唔嗯，可能是那樣沒錯啦……"
10011060-24 = "被，被這麼說，的話……會覺得，有點壓力呢……"
10011060-25 = "不過！既然獲得了這麼多的關注，也就代表是傳達忍者魅力的好機會！"
10011060-26 = "對吧，部長！"
10011060-31 = "（……雖然受到矚目是好事，#n　但要是最終還是沒能拿出結果，又被人投以異樣眼光的話……）"
10011060-32 = "不，現在不是煩惱的時候！得盡快把妖怪劇團……！"
10011060-39 = "原來如此，這次的挑戰者是各位啊。"
10011060-40 = "這裡是「第三道關卡」。#n就由我「讀心術師」──「水羽三森」來擔任各位的對手！"
10011060-41 = "[s1]「繼椿之後出現的，是三森……！」\n[s2]「讀，讀心術師……？」"
10011060-44 = "啊！這麼說來，伊樹菜有聽說過！"
10011060-45 = "修行部本來就是奇人很多的社團……甚至連「能夠讀取人心」的人都有！"
10011060-46 = "[s]「三森居然有那種能力……！？」"
10011060-47 = "啊，那個……那只是……"
10011060-48 = "該，該說是採用了那樣的人設嗎……"
10011060-49 = "還，還是該怎麼說呢……！"
10011060-50 = "總，總之！這第三道關卡是至今為止最難的一關……！"
10011060-51 = "就由我，讀心術師的三森來當各位的對手！"
10011060-52 = "不，不好意思，希望各位配合……"
10011060-53 = "[s]「如果覺得害羞，可以不用說出來沒關係……」"
10011060-54 = "原來如此，不愧是觀光業發達的百鬼夜行。#n這樣的演技也是觀光的一環啊。"
10011060-55 = "啊，那個……總，總而言之請做好覺悟吧！我要來讀各位的想法了！"
10011060-62 = "首，首先是伊樹菜醬……！"
10011060-63 = "是，是什麼！？"
10011060-64 = "伊樹菜醬為了通過這裡，想要把我打倒對吧？"
10011060-65 = "你，你怎麼會知道……！"
10011060-66 = "呵呵……而月夜醬想要更努力幫上朋友們的忙。"
10011060-67 = "好厲害……真的說中了……！"
10011060-68 = "至於三千留醬……"
10011060-72 = "你似乎很苦惱呢。#n心情十分複雜，正在煩惱是否該繼續前進……"
10011060-73 = "什麼，好微妙，好像說中了……又好像沒說中……"
10011060-74 = "呵呵呵，怎麼樣呀？#n面對能讀心的我……各位真的有辦法取勝嗎？"
10011060-75 = "[s]「好，那接下來換我！」"
10011060-77 = "老，老師大人……？"
10011060-79 = "咦……？"
10011060-80 = "沒，沒關係！那麼我也來試著一探老師內心的想法！"
10011060-83 = "呣呣呣呣……！"
10011060-87 = "……！！"
10011060-88 = "……啊。"
10011060-89 = "……您，您居然在想那種事……"
10011060-90 = "[s] 「……咦？」"
10011060-91 = "怎，怎麼說呢……那個……"
10011060-92 = "……現，現在不可以！"
10011060-93 = "老師，你究竟在想些什麼呢。"
10011060-94 = "[s]「我沒有任何想法！不要冤枉好人！」"
10011060-96 = "原來如此，他的目標是用這種方式引起內部的分裂嗎……！？"
10011060-97 = "讀心術師……真是個強敵！"
10011060-98 = "伊樹菜醬，部長……！我，我好像，想到一個好方法了！"
10011060-99 = "好方法？"
10011060-100 = "那個，我在跟部長借來的，漫畫裡看過……！#n主，主角一行人，為了對抗使用讀心術的忍法術師，使用的作戰……！"
10011060-101 = "名，名為「放空作戰」！"
10011060-106 = "原來如此。"
10011060-107 = "只，只要什麼都不想，將腦袋放空……就不會被讀心了！"
10011060-108 = "大家一起，來放空吧……！"
10011060-109 = "了解！"
10011060-110 = "……！"
10011060-111 = "空……"
10011060-112 = "咦，啊，唔嗯……！"
10011060-113 = "空……"
10011060-115 = "……這招真的行得通嗎？"
10011060-116 = "想用這種方法來對抗嗎……！"
10011060-117 = "那麼我也使出全力，讀出放空中各位的想法吧！"
10011060-119 = "空……"
10011060-120 = "空……！"
10011060-121 = "空……？"
10011060-125 = "呣呣呣呣……！？"
10011060-130 = "[ns]「真，真是激烈的對抗……！」"
10011060-132 = "……你是認真這麼說的嗎？"
10011060-133 = "要對決是無所謂啦……"
10011060-134 = "問題是一直在這邊發呆，到底要何年何月才能通過關卡……？"
10011060-135 = "還是該說，這到底在搞什麼啊……"
10011060-136 = "[s]「……呃，這本來就是節目的一環。」"
10011060-137 = "啊，順帶一提，我可以給你們這個關卡的小提示。"
10011060-138 = "這關只要打倒守門人就算通過。"
10011060-139 = "……！！"
10011060-140 = "竟，竟然如此……！"
10011060-141 = "你，你說什麼！？"
10011060-142 = "莫非，在場只有我一個人搞不清楚狀況嗎……？"
10011060-143 = "[s]「原來是這樣啊，看來只能打倒守門人了。」"
10011060-144 = "呵呵……大家都幹勁十足呢！"
10011060-145 = "那麼就由我，不才三森來擔任各位的對手！"

[translation]
10011060-1 = "Episode 6; The Third Obstacle: The Mind Reader"
10011060-4 = "The heat of the chase is really starting to crank up! And just as predicted!"
10011060-5 = "The Ninjutsu Research Club is still leading the pack after passing the Sleeping Beauty's trial with flying colors!"
10011060-6 = "Is this what a ninja performance looks like?"
10011060-7 = "Having Schale's Sensei on the team seems like a slight infraction and should likely be looked into..."
10011060-8 = "But a festival is a place of fun! And looking the other way when the rules get bent a little is all part of the entertainment!"
10011060-9 = "Heehee! ♪ Keep on fighting, everyone!"
10011060-11 = "[ns] \"Wow, she really is just airing out all our dirty laundry.\""
10011060-12 = "I don't think she's trying to cover anything up. Thanks to her, we're—"
10011060-16 = "Did you hear? They got through the Sleeping Beauty in record time!"
10011060-17 = "Going toe-to-toe against the president of the Inner Discipline Club? What even is this Ninjutsu Research Club anyway?"
10011060-18 = "Are they even a real club...?"
10011060-19 = "What kind of stupid name is \"Ninjutsu Research Club\" anyway? Pfft."
10011060-21 = "Stupid?! How rude!"
10011060-22 = "[s] \"Everyone's just confused since they've never heard of you before...\""
10011060-23 = "M-Maybe, but..."
10011060-24 = "This...is a lot of attention..."
10011060-25 = "Then that just means we have to show everyone what being a ninja really means!"
10011060-26 = "We've got this, President!"
10011060-31 = "(But with all this attention, if word got out about some...unflattering details about the club...)"
10011060-32 = "No! Never! Now's not the time! As long as we catch the Mouryo and finish this ridiculous chase once and for all, we'll be okay!"
10011060-39 = "Oh! Welcome, contenders!"
10011060-40 = "I am Mizuha Mimori of the third obstacle, the Scary Mind Reader! You must best me in order to pass!"
10011060-41 = "[s1] \"First Tsubaki, and now Mimori?\"\n[s2] \"...What does she mean by the 'Scary Mind Reader'?\""
10011060-44 = "Ooh! My lord, I've heard of this!"
10011060-45 = "There are lots of weirdos in the Inner Discipline Club too! One of them is blessed with the terrifying ability to read minds!"
10011060-46 = "[s] \"You can read minds, Mimori?!\""
10011060-47 = "I believe that's simply a rumor..."
10011060-48 = "Oh dear! Um, I meant to say..."
10011060-49 = "Yes! You have indeed found me!"
10011060-50 = "One of the most powerful allies of the princess-kidnapping cabal... 'Tis I, the Mind Reader!"
10011060-51 = "Th-The Mind Reader... That's me!"
10011060-52 = "That's the setup..."
10011060-53 = "[s] \"You don't have to keep up the act if you're that embarrassed.\""
10011060-54 = "Huh, that's a pretty professional angle. I guess I'd expect nothing less from a tourism powerhouse like Hyakkiyako..."
10011060-55 = "Uh, ugh... Anyway! No thought or idea is safe from me, so brace yourselves for my mind-reading powers!"
10011060-62 = "F-First off, Izuna!"
10011060-63 = "Eek!"
10011060-64 = "Izuna is desperate to defeat me so she can keep moving forward!"
10011060-65 = "Ack?! How'd you know?!"
10011060-66 = "And Tsukuyo... She hopes to keep doing her best just so she can be helpful to her friends!"
10011060-67 = "W-Wow! She's right! She really can read minds..."
10011060-68 = "And Michiru!"
10011060-72 = "She...She has a lot on her mind! She's ambivalent. Michiru hopes to keep moving forward with all her heart, but a part of her is telling her to return home!"
10011060-73 = "G-Geez, it's so subtle! She's right... But also, not really?"
10011060-74 = "Heehee. Knowing the extent of my powers, do you really think you can beat me?"
10011060-75 = "[s] \"Okay. I'll take this one.\""
10011060-77 = "H-Honorable Sensei? You?"
10011060-79 = "S-Sensei?!"
10011060-80 = "F-Fine! Prepare yourself, Sensei!"
10011060-83 = "Hmmmmm!"
10011060-87 = "...!"
10011060-88 = "Ah!"
10011060-89 = "S-Sensei... I can't believe you!"
10011060-90 = "[s] \"...Huh?\""
10011060-91 = "How could you, Sensei? Such impropriety..."
10011060-92 = "...Shame on you!"
10011060-93 = "I guess I'm not surprised, but is this what you're thinking about in your day-to-day?"
10011060-94 = "[s] \"I wasn't thinking about anything! I'm being falsely accused!\""
10011060-96 = "And just like that, she stirred up conflict within the group?!"
10011060-97 = "That must be the secret of the Mind Reader's powers!"
10011060-98 = "Izuna, President! I think I know how we can defeat the Mind Reader...!"
10011060-99 = "Eh, Tsukuyo? What are you thinking?"
10011060-100 = "I-I read this in one of your comic books, President... The main characters use this strategy to fight against a ninjutsu master who can read minds!"
10011060-101 = "I-It's called the Zoning Out Technique!"
10011060-106 = "Oh, dear."
10011060-107 = "I-If we all zone out and fight...no one will be able to read our m-minds either!"
10011060-108 = "We can all zone out together! O-Okay, everyone...?"
10011060-109 = "I'm always with you, Tsukuyo!"
10011060-110 = "...!"
10011060-111 = "*zoning out*"
10011060-112 = "Uh, um!"
10011060-113 = "*zoning out*"
10011060-115 = "...Do they really think this is gonna work?"
10011060-116 = "So this is how you've chosen to rise against the challenge of my mind reading!"
10011060-117 = "I accept your strength! I'm going to read your minds even harder than before! Hiyah!"
10011060-119 = "*zoning out*"
10011060-120 = "*zoning out*!"
10011060-121 = "*zoning out*?"
10011060-125 = "Hnnnnng!"
10011060-130 = "[ns] \"N-Now this is what they call a close competition!\""
10011060-132 = "...In what way?"
10011060-133 = "I have nothing against healthy competition."
10011060-134 = "But are you planning on sitting here forever? How do we pass the obstacle?"
10011060-135 = "I don't even know what the objective is here."
10011060-136 = "[s] \"Oh. Well, it's supposed to be an attraction of some kind....\""
10011060-137 = "Oh! Here's a little tip I forgot to tell you."
10011060-138 = "You can pass this trial by defeating its gatekeeper!"
10011060-139 = "...?!"
10011060-140 = "O-Of course!"
10011060-141 = "Yes, of course that's it."
10011060-142 = "Am I the only one who doesn't get this storyline?"
10011060-143 = "[s] \"Of course. The only thing we can really do is defeat the gatekeeper.\""
10011060-144 = "Yes! You've finally realized how to combat my mind reading."
10011060-145 = "Very well! I, Mimori, the third gatekeeper, will gladly engage in combat!"

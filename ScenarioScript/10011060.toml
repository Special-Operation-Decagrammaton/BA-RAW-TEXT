[translation]
10011060-1 = "ตอนที่ 6;ด่านที่ 3: นักอ่านใจ"
10011060-4 = "ในขณะที่การไล่ล่าเริ่มจะร้อนแรงขึ้นเรื่อยๆ เป็นอย่างที่คาดการณ์ไว้เลยนะคะ~!"
10011060-5 = "ทีมที่มีความสามารถล้นเหลือและผ่านการทดสอบขององค์หญิงขี้เซาได้อย่างรวดเร็ว ได้แก่ชมรมวิจัย#nศาสตร์นินจาค่ะ!"
10011060-6 = "หรือว่าฝีมือของเหล่านินจาที่เคยได้ยินมาจากข่าวลือจะหมายถึงอย่างนี้กันนะ~?"
10011060-7 = "แต่ก็แน่นอนว่าการที่มีคุณครูจากชาเล่ต์อยู่ในทีมด้วยทำให้ต้องได้รับการตรวจสอบอีกครั้งว่าเป็นการฝ่า#nฝืนกฎหรือไม่"
10011060-8 = "เทศกาลที่ทุกคนจะได้สนุกสนานกัน! การผิดกติกาเพียงเล็กน้อย~ แล้วปล่อยผ่านไปได้โดยไม่มีใครรู้~ ก็นับเป็นความสนุกอีกอย่างหนึ่งละนะ!"
10011060-9 = "ลัลล้า~♪ พยายามเข้านะทุกคน~! พยายามเข้า~!"
10011060-11 = "[ns] \"แต่นั่นก็บอกให้คนเขารู้หมดเลยไม่ใช่เหรอน่ะ...\""
10011060-12 = "ทางนั้นดูไม่มีความคิดที่จะปกปิดเลยนะคะ เพราะอย่างนั้นก็เลย..."
10011060-16 = "ผ่านด่านที่สองขององค์หญิงขี้เซาไปได้ในเวลาสั้นที่สุดงั้นเหรอ? ถามจริง?"
10011060-17 = "ด่านที่ต้องเจอกับรองหัวหน้าชมรมฝึกฝนน่ะเหรอ? ชมรมวิจัยศาสตร์นินจาเป็นใครกันแน่?"
10011060-18 = "มีชมรมแบบนั้นในโรงเรียนของเราด้วยเหรอ? เพิ่งเคยได้ยินครั้งแรกเลย..."
10011060-19 = "ชมรมวิจัยศาสตร์นินจาเหรอ ชื่อแปลกพิลึกจังแฮะ..."
10011060-21 = "ชื่อแปลกพิลึกงั้นเหรอ! เสียมารยาทจริงๆ!"
10011060-22 = "[s] \"ก็นะ เป็นชื่อชมรมที่เพิ่งเคยได้ยินครั้งแรกก็คงจะงงนิดหน่อย\""
10011060-23 = "นะ... นั่นมันก็จริงอยู่หรอกแต่ว่า..."
10011060-24 = "ระ... รู้สึก กะ... กดดันสุดๆ เลยค่ะ..."
10011060-25 = "แต่ก็เอาเถอะ! เราจะใช้โอกาสนี้ทำให้ทุกคนเห็นคุณค่าที่แท้จริงของนินจา!"
10011060-26 = "ใช่ไหมล่ะคะหัวหน้า!"
10011060-31 = "(แต่ว่า... ถ้ากลายเป็นจุดสนใจแบบนี้ แล้วเกิดมีคนพูดไม่ดีเกี่ยวกับชมรมเราขึ้นมาละก็...)"
10011060-32 = "ไม่ๆ! ไม่ใช่เวลาจะมากังวลเรื่องแบบนี้นะ! ตอนนี้ต้องจับตัวพวกปีศาจให้ได้และหยุดการไล่ล่าที่ไม่สนุก#nเอาซะเลยนี่ซะ!"
10011060-39 = "อ่า! ผู้ท้าชิงในรอบนี้คือทุกท่านเองสินะคะ!"
10011060-40 = "ครั้งนี้ใน <ด่านที่สาม: นักอ่านใจผู้น่ากลัว> มิซุฮะ มิโมริผู้นี้! จะเป็นคนขวางทางทุกท่านไว้เองค่ะ!"
10011060-41 = "[s1] \"ต่อจากสึบากิก็เป็นมิโมริสินะ!\"\n[s2] \"ว่าแต่... นักอ่านใจผู้น่ากลัวงั้นเหรอ...?\""
10011060-44 = "อ๊ะ! พอได้ยินแบบนี้! อิซุนะเคยได้ยินมาก่อนค่ะ! นายท่าน!"
10011060-45 = "ในชมรมฝึกฝนมีคนประหลาดอยู่หลายคน...! หนึ่งในนั้นมีนักอ่านใจผู้น่ากลัวที่อ่านความคิดคนอื่นได้ค่ะ!"
10011060-46 = "[s] \"อย่าบอกนะว่า มิโมริมีความสามารถแบบนั้น?!\""
10011060-47 = "เอ่อ... คะ... คือว่า เป็นแค่ข่าวลือเท่านั้นเองนะคะ... จะว่ายังไงดี"
10011060-48 = "อ๊ะ! คะ... คือ แบบว่า..."
10011060-49 = "ค่ะ ชะ... ใช่แล้วค่ะ!"
10011060-50 = "หนึ่งในพรรคพวกของคนร้ายลักพาตัว ทะ... ที่ได้ชื่อว่าแข็งแกร่งที่สุด! นักอ่านใจผู้นี้..."
10011060-51 = "มะ... มายด์ รีดเดอร์ ก็คือฉันเองค่ะ!"
10011060-52 = "ค่ะ บะ... แบบว่า เป็นอะไรทำนองนั้นน่ะค่ะ..."
10011060-53 = "[s] \"ถ้าเขินขนาดนั้นไม่ต้องพูดก็ได้นี่นา...\""
10011060-54 = "ฮืม นี่เป็นวิธีการแบบมืออาชีพของเฮียกคิยาโคสำหรับมุ่งพัฒนาอุตสาหกรรมการท่องเที่ยวสินะคะ เข้าใจแล้วค่ะ..."
10011060-55 = "อ่า ยะ... ยะ... ยังไงก็เถอะ! ฉัน! จะอ่านใจทุกท่านค่ะ! เตรียมใจไว้ได้เลยค่ะ!"
10011060-62 = "กะ... ก่อนอื่นก็อิซุนะจัง...!"
10011060-63 = "ตกใจหมดเลยค่ะ!"
10011060-64 = "อิซุนะจังอยากจะเอาชนะฉันสินะคะ! เพื่อที่จะได้เดินหน้าต่อไป!"
10011060-65 = "นะ... นินนิน?! ระ... รู้ได้ยังไงกันคะ...!"
10011060-66 = "ส่วนสึคุโยะจังก็... อยากจะพยายามให้มากขึ้น... เพื่อที่จะได้มีประโยชน์กับเพื่อนๆ อย่างนั้นสินะคะ!"
10011060-67 = "วะ... หวา! ดะ... เดาถูกด้วยค่ะ! สะ... สุดยอดเลยค่ะ...! คะ... คุณนักอ่านใจ...!"
10011060-68 = "แล้วก็มิจิรุจังน่ะ...!"
10011060-72 = "แบบว่ากำลังกังวลมากๆ เลยค่ะ! ราวกับว่าอยากจะรีบไปต่อ... อยากจะหนีกลับบ้านไปซะตอนนี้เลย...! เหมือนจะคิดอย่างนั้นอยู่สินะคะ!"
10011060-73 = "เดี๋ยวสิ มะ... มันซับซ้อนน่ะ จะบอกว่าถูก... หรือไม่ถูกดี..."
10011060-74 = "ฮุฮุฮุ ฉันสามารถอ่านใจทุกท่านได้ทะลุปรุโปร่งเลยนะคะ... ทุกคนจะเอาชนะฉันได้เหรอคะ!"
10011060-75 = "[s] \"เอาละ ถ้างั้นก็คงต้องเป็นหน้าที่ครูแล้ว\""
10011060-77 = "ทะ... ท่านอาจารย์จะรับมือเองเหรอ...?!"
10011060-79 = "อา... คุณครูน่ะเหรอคะ...?"
10011060-80 = "ดะ... ได้ค่ะ! ถ้าอย่างนั้นฉันก็จะลองอ่านใจของคุณครูดูค่ะ!"
10011060-83 = "อืมมมมม... งืมๆๆ!"
10011060-87 = "...!"
10011060-88 = "อ๊ะ..."
10011060-89 = "คะ... คุณครูคิดเรื่องพรรค์นั้นอยู่อย่างนั้นเหรอคะ..."
10011060-90 = "[s] \"...อะไรนะ?\""
10011060-91 = "มะ... ไม่ว่าจะยังไง... การที่คุณครูมีความคิดแบบนั้น..."
10011060-92 = "ไม่ได้เลยนะคะ...!"
10011060-93 = "คุณครู... เป็นคนที่มีความคิดประเภทไหนกันคะนั่นน่ะ?"
10011060-94 = "[s] \"เปล่านะ ไม่ได้คิดอะไรสักนิด! ไม่ยุติธรรมเลย!\""
10011060-96 = "พยายามทำให้แตกคอกันภายในกลุ่มหรอกเหรอ...?!"
10011060-97 = "ว่าแล้วเชียว! ความแข็งแกร่งของนักอ่านใจหมายถึงแบบนี้เองสินะคะ!"
10011060-98 = "อ่า! อิซุนะจัง! ท่านหัวหน้า! มะ... เหมือนว่า ฉะ... ฉันจะคิดวิธีรับมือนักอ่านใจ ดะ... ได้แล้วละค่ะ!"
10011060-99 = "หะ...หืม...? สึคุโยะ? มีวิธีแล้วเหรอ?"
10011060-100 = "ฉันเคยอ่านเจอในหนังสือการ์ตูนของท่านหัวหน้าค่ะ...! กลยุทธ์ที่กลุ่มของตัวเอกใช้เพื่อต่อสู้กับนินจา#nที่อ่านใจผู้อื่นได้ค่ะ...!"
10011060-101 = "ชะ... ชื่อกลยุทธ์ก็คือ <กลยุทธ์เหม่อลอย> ค่ะ!"
10011060-106 = "โอ๊ะ"
10011060-107 = "นะ... ในสถานการณ์แบบนี้ ทุกคนต่อสู้ไปแบบเหม่อๆ โดยที่ไม่คิดอะไรเลย...!"
10011060-108 = "ทะ... ทุกคนต้องเหม่อลอยค่ะ! เอาละค่ะ...!"
10011060-109 = "ได้เลยค่ะ! ท่านสึคุโยะ! อิซุนะก็จะร่วมมือด้วยค่ะ!"
10011060-110 = "...!"
10011060-111 = "เหม่อลอย..."
10011060-112 = "อะ... อื้ม...!"
10011060-113 = "เหม่อลอย..."
10011060-115 = "แบบนี้จะไม่เป็นไรจริงๆ เหรอคะ...?"
10011060-116 = "ใช้วิธีแบบนั้นเพื่อที่จะต่อต้านมิโมริ นักอ่านใจผู้นี้อย่างนั้นเหรอคะ...!"
10011060-117 = "ถ้างั้นฉันก็พยายามอย่างสุดกำลังเพื่อที่จะอ่านใจของทุกคนที่กำลังเหม่อลอยอยู่ค่ะ! ย้า!"
10011060-119 = "เหม่อลอย..."
10011060-120 = "เหม่อลอย...!"
10011060-121 = "มะ... เหม่อลอย...?"
10011060-125 = "อืม... อื้อ...?!"
10011060-130 = "[ns] \"ชะ...ช่างเป็นการต่อสู้ที่สูสีกันจริงๆ !\""
10011060-132 = "คะ...? ตรงไหนกันล่ะคะ?"
10011060-133 = "เปล่าค่ะ คือว่าการเผชิญหน้ามันก็ดีอยู่หรอกนะคะ"
10011060-134 = "แต่ปัญหาก็คือถ้าเอาแต่เหม่อลอยอยู่แบบนี้ แล้วเมื่อไรจะผ่านด่านไปได้ล่ะคะ...?"
10011060-135 = "เดิมทีก็ไม่รู้อยู่แล้วว่ากำลังทำอะไรอยู่"
10011060-136 = "[s] \"อ่า ก็เป็นการเบี่ยงเบนความสนใจอย่างหนึ่งละนะ\""
10011060-137 = "อ่า ถ้าจะให้บอกเคล็ดลับในการผ่านด่านเบี่ยงเบนความสนใจครั้งนี้ละก็"
10011060-138 = "ถ้าหากจัดการผู้เฝ้าประตูได้ก็จะสามารถผ่านไปได้ค่ะ"
10011060-139 = "...!!"
10011060-140 = "ยะ... อย่างนี้นี่เอง!"
10011060-141 = "วะ... วิธีแบบนั้นมัน...?!"
10011060-142 = "คือว่า... มีฉันคนเดียวรึเปล่าคะที่ไม่เข้าใจสถานการณ์ตอนนี้...?"
10011060-143 = "[s] \"ถะ...ถ้างั้น ก็ทำอะไรไม่ได้นอกจากต้องจัดการผู้เฝ้าประตู!\""
10011060-144 = "ฮุฮุ... ดูเหมือนว่าคิดที่จะต่อสู้กันแล้วสินะคะ!"
10011060-145 = "ดีเลยค่ะ! ถ้างั้นมิโมริผู้นี้ก็จะเป็นคู่ต่อสู้ให้เองค่ะ!"

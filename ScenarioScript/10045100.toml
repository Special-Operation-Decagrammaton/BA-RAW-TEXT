[translation]
10045100-1 = "ตอนที่ 10;ในตอนท้ายของรอบตัดสิน"
10045100-2 = "เราได้เห็นการแข่งขันที่แพ้และชนะอย่างสมเกียรติจากคู่แรกไปแล้วค่ะ!"
10045100-6 = "แล้วคู่ต่อไปใครจะเป็นผู้ชนะ?! มาเริ่มการแข่งขันคู่ที่ 2 กันเลยค่ะ! #nผู้เข้าแข่งขันอิซุนะ VS ผู้เข้าแข่งขันชิเซะ เริ่มแข่งได้!"
10045100-7 = "ชิเซะจัง! สู้ๆ นะคะ!"

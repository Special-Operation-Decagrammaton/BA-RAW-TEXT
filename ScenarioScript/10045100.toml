10045100-117 = "มาถึงรอบชิงชนะเลิศของเทศกาลสวนน้ำเฮียกคิยาโคที่ทุกคนรอคอยแล้วค่ะ! ตอนนี้เราเตรียมทุกอย่างพร้อมสำหรับการแข่งขันแล้ว!"

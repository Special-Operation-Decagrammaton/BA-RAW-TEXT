10045100-196 = "วาคาโมะผู้นี้แค่จะโชว์ฝีมือปราบผู้เข้าแข่งขันที่แข็งแกร่งต่อหน้าคุณครูเท่านั้นเอง"
10045100-197 = "แต่คุณมาขัดขวางกันแบบนี้ คิดอะไรของคุณอยู่คะ?"
10045100-198 = "หืม? พวกเราก็มาปราบคนที่แข็งแกร่งกันไม่ใช่เหรอ?"
10045100-200 = "แต่ฉันแค่อยากลงแข่งขันต่อหน้าคุณครูเหมือนคนอื่นก็เท่านั้น"
10045100-201 = "แต่คุณถึงกับทำลายสนามแข่ง แบบนี้ฉันยกโทษให้ไม่ได้หรอกค่ะ"
10045100-202 = "เอะ... เอ๋?"
10045100-203 = "พวกเรา ไปจัดการด้วยกันเถอะ..."

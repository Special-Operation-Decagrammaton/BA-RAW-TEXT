[translation]
10045100-1 = "第10話;決賽的盡頭"
10045100-2 = "第一場比賽就誕生了讓人屏息的名場面呢！"
10045100-6 = "接下來的對決將會如何！？最終戰第二場！#n伊樹菜選手對知世選手的比賽即將開始！"
10045100-7 = "知世醬！加油！"
10045100-8 = "唔哦！上吧，伊樹菜！展現我們的忍術！"
10045100-9 = "連我們，沒能參加的份也……加油，伊樹菜醬！"
10045100-11 = "這還是我第一次在觀眾席看比賽……"
10045100-12 = "大家都在為朋友加油呢。"
10045100-13 = "熱情真是驚人。"
10045100-15 = "呵呵呵，這才是夏日的[ruby=Festival]祭～典[/ruby]！"
10045100-16 = "不知道誰會在決賽對上蓮華前輩呢？"
10045100-17 = "小女子非常期待！"
10045100-19 = "[ns]「那麼，光明正大～一決勝負！」"
10045100-21 = "上囉！伊樹菜流忍法！高速移動之術！"
10045100-25 = "好快。"
10045100-26 = "不過，我也不慢哦～"
10045100-33 = "兩位選手的速度都快到看不清手部的動作！"
10045100-34 = "知世閣下，如此敏捷的動作……真是令人讚嘆！"
10045100-35 = "[ns]「那是……！透過歌牌與甲蟲皇后對戰鍛鍊出的速度！」"
10045100-36 = "不愧是百鬼夜行的偶像！究竟有什麼是他不會的呢……！"
10045100-37 = "差不多該結束了。"
10045100-38 = "吟誦俳句吧。"
10045100-39 = "什麼……！？"
10045100-40 = "伊樹菜流忍法！空蟬之術……！"
10045100-45 = "被逃走了。"
10045100-46 = "剛，剛才知世閣下的眼神實在很可怕……"
10045100-47 = "不過伊樹菜是不會輸的！#n為了來為伊樹菜加油的大家……！"
10045100-49 = "和我一樣呢。"
10045100-50 = "呼……"
10045100-52 = "戰#n到#n最#n後"
10045100-54 = "誰#n先#n倒#n下"
10045100-56 = "勝#n負#n定#n矣"
10045100-59 = "[log=치세 수영복]戰到最後[/log]"
10045100-60 = "[log=치세 수영복]誰先倒下[/log]"
10045100-61 = "[log=치세 수영복]勝負定矣[/log]"
10045100-62 = "那麼……！再來！"
10045100-63 = "……！"
10045100-66 = "雙方的實力幾乎不分上下。#n由於缺乏決定性的一擊，戰鬥進入了持久戰。"
10045100-67 = "最終能左右勝負的……只剩下精神力。"
10045100-68 = "比賽不知不覺進入了後半……"
10045100-70 = "哈啊，哈啊……"
10045100-71 = "呼……"
10045100-72 = "兩人都快到極限了呢。"
10045100-73 = "嗯，下一擊應該就能分出勝負。"
10045100-74 = "誰贏都不奇怪！"
10045100-76 = "知世醬！加油……！"
10045100-78 = "忍者在任何絕境中……"
10045100-79 = "都不會放棄……！"
10045100-87 = "究竟這場比賽的勝者是……！"
10045100-91 = "哈啊，哈啊……"
10045100-92 = "[ns]「久田伊樹菜……！」"
10045100-95 = "呼……真的只有毫釐之差，相當驚險呢。"
10045100-99 = "我輸了。"
10045100-100 = "既然輸了，就吟一首俳句吧。"
10045100-101 = "拚盡全力"
10045100-102 = "輸也無妨"
10045100-103 = "此乃青春"
10045100-105 = "好，這樣決賽的對手就確定了。"
10045100-106 = "蓮華閣下！下一場比賽見囉……！"
10045100-107 = "[ns]「決賽選手終於出爐了呢！」"
10045100-108 = "稍作休息之後，將進行萬眾矚目的決賽！"
10045100-109 = "請大家稍待片刻！"
10045100-111 = "呵呵，終於到了呢。#n由老師擔任評審的比賽場地。"
10045100-112 = "暫且先觀察一下吧？"
10045100-114 = "不久之後……"
10045100-117 = "各位期待已久的百夜水上祭決賽，已經準備完成了！"
10045100-118 = "請晉級決賽的兩位選手發表幾句感言吧！"
10045100-119 = "那個……"
10045100-120 = "伊樹菜能和這麼棒的對手們進行有趣的比賽，真的很開心！#n決賽也會保持這份心情繼續努力的！"
10045100-121 = "希望大家能繼續為伊樹菜加油！忍忍！"
10045100-123 = "加油～！伊樹菜～！"
10045100-124 = "衝，衝啊啊啊……"
10045100-126 = "嗯，換我了嗎？"
10045100-127 = "我……並不是只靠自己一個人的力量，而是多虧了夥伴和朋友的幫忙才能來到這裡。"
10045100-128 = "所以請看著我吧！#n我會連你們的份一起贏下來的！"
10045100-129 = "要是輸了我可不饒不了你。"
10045100-130 = "蓮華一定能辦得到。"
10045100-131 = "前輩！一定要[ruby=Perfect]完～美[/ruby]地奪下勝利哦……！！"
10045100-133 = "選手們似乎都準備好了！那麼比賽即將開始！"
10045100-134 = "來，請兩位面對面……！"
10045100-140 = "[ns]「光明正大，一決勝負……！！」"
10045100-148 = "（唔，果然不好對付啊。像泥鰍一樣滑溜！）"
10045100-149 = "（只是短暫交手就能感覺到……是個強敵！）"
10045100-150 = "（但就算這樣……）"
10045100-151 = "（即使如此……）"
10045100-152 = "（我也不會退縮！）#n（伊樹菜也不會認輸！）"
10045100-159 = "老師，你有預測哪邊會贏嗎？"
10045100-160 = "[s]「老實說完全預測不了呢。誰贏都不奇怪。」"
10045100-161 = "連老師都這麼評價道！直到最後一刻都無法預料！#n戰況緊張刺激！令人目不轉睛！"
10045100-162 = "（一切努力都沒有白費……這次的百夜水上祭，有大成功的預感……！）"
10045100-163 = "（這下我們節慶營運管理部的名字，肯定會在百鬼夜行的歷史上留下重重一筆……）"
10045100-164 = "唔呵呵，且慢。"
10045100-165 = "嗯？你，你是……！？"
10045100-166 = "雖然目前為止都忍著沒出手，不過也差不多到極限了。"
10045100-167 = "由老師親自擔任評審，如此有趣的比賽……"
10045100-168 = "若藻我，怎麼能夠缺席呢……"
10045100-172 = "喔喔喔！災厄之狐出場了！我們也上吧！"
10045100-173 = "把一切都毀掉……！！"
10045100-185 = "這是怎麼回事……"
10045100-186 = "啊啊啊，不！我辛苦搭建的比賽場地啊……！"
10045100-187 = "你，你們在做什麼！不可原諒！"
10045100-189 = "嘿嘿嘿，有本事阻止的話就試試看吧！#n我們這邊可是有災厄之狐在啊！"
10045100-193 = "大家上！接管這裡吧！"
10045100-194 = "……誰允許你們破壞比賽場地了？"
10045100-195 = "……咦？"
10045100-196 = "若藻我，本想在老師面前擊敗強者，展現帥氣的一面。"
10045100-197 = "結果你們竟然出來礙事，究竟有何居心？"
10045100-198 = "咦？不是說好要一起來推翻強者的嗎？"
10045100-200 = "我不過是想在老師面前，如他人一般參加比賽罷了。"
10045100-201 = "而你們居然試圖毀掉這一切……實在不可饒恕。"
10045100-202 = "奇，奇怪……"
10045100-203 = "……大家，上吧。"
10045100-204 = "老師，指揮就麻煩你了。"
10045100-205 = "[s]「好！交給我吧！」"

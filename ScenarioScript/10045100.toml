10045100-60 = "[log=치세 수영복]This match will proceed until[/log]"
10045100-61 = "[log=치세 수영복]Splash one of us goes[/log]"
10045100-62 = "Again!"
10045100-63 = "...!"
10045100-66 = "The two were evenly matched. The match dragged on and on, neither of them able to land the finishing blow."
10045100-67 = "It became clear that the deciding factors in the endless battle would be their grit and fortitude."
10045100-68 = "As the match headed to its end..."
10045100-70 = "*huff* *puff*"
10045100-71 = "*exhale*"
10045100-72 = "They are reaching their limits."
10045100-73 = "Yes. Only one will emerge victorious from their next clash."
10045100-74 = "Regardless of who wins, it was well fought!"
10045100-76 = "I'm your #1 fan, Chise!"
10045100-78 = "The ninja way is to never give up!"
10045100-79 = "No matter what...!"
10045100-87 = "Just who is going to win?!"
10045100-91 = "*huff* *puff*..."
10045100-92 = "[ns] \"Kuda Izuna is the winner!\""
10045100-95 = "*huff* *huff* Just...barely made it..."
10045100-99 = "I lost."
10045100-100 = "I will recite my haiku of defeat now."
10045100-101 = "You and I battled"
10045100-102 = "And with loss I am content"
10045100-103 = "Ah, wonderful youth"
10045100-105 = "I'll see you in the finals, Izuna!"
10045100-106 = "Yes, Renge! Izuna shall meet you in the ring!"
10045100-107 = "[ns] \"We've finally found our finalists!\""
10045100-108 = "Before we start, everyone please take time to get yourself some refreshments and snacks!"
10045100-109 = "We'll be back soon!"
10045100-111 = "Heehee. Oh, my Sensei! I've come to be judged by you."
10045100-112 = "Where are youuu?"
10045100-114 = "Soon..."
10045100-117 = "And we're finally here, folks! It's the highly anticipated final match! Are you ready to rumble?!"
10045100-118 = "Before we begin, a word from our finalists!"
10045100-119 = "Well, um...!"
10045100-120 = "Izuna has had so much fun playing games with all of you! And she wants to carry those feelings to the final match!"
10045100-121 = "So Izuna hopes everyone watching enjoys themselves just as much as she will! Nin nin!"
10045100-123 = "That's our Izuna!"
10045100-124 = "L-Let's gooo..."
10045100-126 = "Oh? My turn?"
10045100-127 = "As with all things in life, I'm only here because of my friends and allies who lifted me up."
10045100-128 = "So please watch closely! I'm going to win, for all of you!"
10045100-129 = "Lose, and I'll hold this against you until the day we die."
10045100-130 = "You're capable of anything, Renge."
10045100-131 = "Renge! Triumph and claim a perfect victory!"
10045100-133 = "With that, we're ready! Players, please enter the ring!"
10045100-134 = "Look each other in the eye, and..."
10045100-140 = "[ns] \"Let's have a fair and square showdown...!!\""
10045100-148 = "(Tsk. She's not going to make this easy for me. It's like trying to catch a fly!)"
10045100-149 = "(Her strength truly is fearsome! Even though she only grabbed me for a moment...!)"
10045100-150 = "(Still...)"
10045100-151 = "(But...)"
10045100-152 = "(I cannot back down!) #n(Izuna cannot back down!)"
10045100-159 = "Do you have a prediction as to the outcome of this match, Sensei?"
10045100-160 = "[s] \"It could really go either way!\""
10045100-161 = "And that's the true thrill of this match, everyone! You can't even blink, or you might miss something!"
10045100-162 = "(All our hard work paid off. This year's Hyakkiyako Water Festival has been a huge success.)"
10045100-163 = "(With this, the Festival Operations Department will cement our mark in Hyakkiyako's history books!)"
10045100-164 = "Heehee. Just a moment, please."
10045100-165 = "Huh? Y-You...?!"
10045100-166 = "I can no longer contain my feelings."
10045100-167 = "What an exciting competition you're holding. And one judged by Sensei, to top it off."
10045100-168 = "I believe that I, Wakamo, shall step up to the challenge—"
10045100-172 = "Yes! The Fox of Calamity is finally here! That's our cue!"
10045100-173 = "DESTROY! WRECK EVERYTHING!!!"
10045100-185 = "Just what...?"
10045100-186 = "Kyaaah! No! Our stadium! We put our hearts and souls into putting this together!"
10045100-187 = "You scoundrels! I, Yukari, shall not let this villainy stand!"
10045100-189 = "Kihehe, stop us if you can! But you'll have to get through the Fox of Calamity first!"
10045100-193 = "C'mon, girls! From now on, what we say goes!"
10045100-194 = "...You. Who instructed you to destroy the stadium?"
10045100-195 = "...Huh?"
10045100-196 = "I planned to defeat the strongest opponents here and sweep Sensei off their feet."
10045100-197 = "You are foiling my plans... Who do you think you are?"
10045100-198 = "Hm? Didn't we team up to take down the others?"
10045100-200 = "I wanted to join in on the matches. I wanted Sensei to see me."
10045100-201 = "To come between me and Sensei... Unforgivable. Utterly unforgivable."
10045100-202 = "A-Ah?"
10045100-203 = "...Everyone, shall we?"
10045100-204 = "Take the lead, Sensei."
10045100-205 = "[s] \"Got it! Leave it to me!\""

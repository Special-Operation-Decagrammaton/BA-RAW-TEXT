10045100-119 = "เอ่อ... คือว่า..."
10045100-120 = "อิซุนะตื่นเต้นและดีใจมากๆ ค่ะที่ได้แข่งอะไรสนุกๆ กับทุกคนที่น่ารักที่นี่! ตอนแข่งรอบชิงชนะเลิศ อิซุนะก็จะแข่งขันด้วยความรู้สึกนี้ค่ะ!"
10045100-121 = "ขอให้ทุกคนช่วยกันเชียร์กันด้วยความเบิกบานใจด้วยนะคะ! นินนิน!"
10045100-123 = "สู้ๆ~! อิซุนะ~!"
10045100-124 = "ละ... ลุยเลยยย..."
10045100-126 = "อืม ต่อไปก็คิวฉันสินะ?"
10045100-127 = "ฉัน... ไม่ได้เข้ามาถึงรอบนี้ด้วยพละกำลังของตัวเองคนเดียวหรอกนะ ฉันผ่านเข้ารอบมาเพราะมีเพื่อน#nดีๆ น่ะ"
10045100-128 = "งั้นก็จับตาดูฉันได้เลย! ฉันจะชนะเผื่อพวกเธอทุกคนด้วย!"
10045100-129 = "ถ้าแพ้ละก็ ฉันไม่ยกโทษให้แน่"
10045100-130 = "เรนเกะต้องทำได้อยู่แล้ว"
10045100-131 = "รุ่นพี่! ต้องชนะอย่างสมบูรณ์แบบแน่นอนเจ้าค่ะ...!!"
10045100-133 = "เหมือนว่าผู้เข้าแข่งขันจะพร้อมกันแล้วนะคะ! งั้นเราจะเริ่มการแข่งขันเลยค่ะ!"

[translation]
10045100-1 = "Episode 10;The End of the Finals"
10045100-2 = "What a thrilling first match!"
10045100-6 = "I can't wait to see how the next one goes! The second match will be Izuna vs. Chise! Please step up to the dock!"
10045100-7 = "You can do it, Chise!"
10045100-8 = "Let's go, Izuna! Channel the power of your ninjutsu!"
10045100-9 = "Good luck...Izuna! Your friends...are cheering you on...!"
10045100-11 = "Being an audience member is a different experience..."
10045100-12 = "To hear everyone cheering for their friends..."
10045100-13 = "The passion is inspiring."
10045100-15 = "Fufufu. I would expect nothing less from the summer festival!"
10045100-16 = "Now, who will rise to the challenge of facing Renge in the grand finale?"
10045100-17 = "I am trembling with excitement!"
10045100-19 = "[ns] \"Now, everyone! Let's have a fair and square showdown!\""
10045100-21 = "Watch out! Izuna-Style Extreme Speed Technique!"
10045100-25 = "Fast. You're fast."
10045100-26 = "But I'm fast too."
10045100-33 = "I can't even see their hands! Can someone really move this quickly?!"
10045100-34 = "Izuna is impressed! You're nimbler than a ninja, Chise!"
10045100-35 = "[ns] \"Speed honed through endless hours of karuta and Mushiqueen battles!\""
10045100-36 = "She really is the idol of Hyakkiyako! Is there anything she can't do?"
10045100-37 = "Time to finish this."
10045100-38 = "Recite this haiku."
10045100-39 = "Uwah...?!"
10045100-40 = "Izuna-Style Cicada Skin Technique...!"
10045100-45 = "She ran away."
10045100-46 = "I-Izuna didn't know Chise could look that scary."
10045100-47 = "But Izuna will win, for the sake of all her friends cheering her on!"
10045100-49 = "It's the same for me."

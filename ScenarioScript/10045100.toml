10045100-166 = "ฉันเฝ้าดูเงียบๆ มาตลอดเลย แต่นี่ก็ใกล้ถึงขีดจำกัดแล้วละค่ะ"
10045100-167 = "การแข่งขันที่คุณครูเป็นผู้ตัดสินมันน่าสนุกขนาดนี้เลย"
10045100-168 = "แล้วจะขาดวาคาโมะผู้นี้ไปได้ยังไงล่ะคะ..."
10045100-172 = "โอ้ว! จิ้งจอกแห่งความพินาศแสดงตัวแล้ว! งั้นก็ถึงเวลาของพวกเราแล้วละ!"

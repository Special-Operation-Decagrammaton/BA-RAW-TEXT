[translation]
84308100401-6 = "การตักเตือนคนในชมรมพัฒนาเกมคือหน้าที่ของเนรุเหรอคะ? ตอนที่บอกว่าต้องสั่งสอนหน่อยแล้ว เนรุพูดเหมือนเป็นเรื่องธรรมดาอย่างนั้นละค่ะ"
84308100401-7 = "ไม่ถึงกับเป็นหน้าที่หรอก แต่เนรุต้องเกี่ยวพันกับเรื่องแบบนั้นค่อนข้างบ่อยน่ะ"
84308100401-8 = "มี 'เรื่อง' ต้องให้เจอกันบ่อยๆ สินะ... เนรุต้องเหนื่อยไม่ใช่เล่นเลยนะคะ"
84308100401-9 = "เนรุก็ค่อนข้างคิดว่าเป็นงานของตัวเองน่ะ และต่อให้ไม่มี 'เรื่อง' อะไร เนรุก็ไปหาเด็กชมรมนั้นบ่อยๆ เหมือนกัน"
84308100401-10 = "สนิทกันอยู่แล้วนี่เอง..."

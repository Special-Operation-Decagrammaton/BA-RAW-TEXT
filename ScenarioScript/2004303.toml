[translation]
2004303-1 = "新的嘗試"
2004303-2 = "說到新年，就是要吃點新的御節料理才對吧！？"
2004303-3 = "[s]「新的御節料理嗎，果然很有泉的風格呢！」"
2004303-4 = "對吧？"
2004303-5 = "但是老師，我總覺得一般的御節料理好像少了點什麼。"
2004303-6 = "御節料理原本就是以不使用火的燉煮料理為主，對吧？"
2004303-7 = "雖然燉煮類的食物也很好吃……"
2004303-8 = "不過總是有味道都很類似的問題。"
2004303-9 = "我覺得這個部分，跟我們美食冒險的方向有點不契合！"
2004303-10 = "[s]「啊，嗯。這麼說來我們正在進行美食冒險呢……」"
2004303-11 = "沒錯！"
2004303-12 = "當然剩下的御節料理，可以用來做成火鍋、咖哩、或者麵食的配菜……"
2004303-13 = "在回收利用後再創造出豐富的味道。"
2004303-14 = "不過那種料理什麼時候都能做對吧？"
2004303-15 = "所以今天呢，我開發了自己獨門的御節料理！"
2004303-16 = "也就是「泉流御節料理特選」！"
2004303-17 = "[s]「是泉親自做的御節料理嗎？」"
2004303-21 = "那個，本來的計畫是那樣沒錯……"
2004303-22 = "可惜還是有點超出我的能力範圍了！耶嘿嘿！"
2004303-23 = "不過我到處打聽之後發現了一個好地方！"
2004303-24 = "那就是可以依照個人需求訂做餐點的[ruby=Made-to-order]客製化[/ruby]餐廳！"
2004303-25 = "羽留奈說他也很常用那間餐廳的服務！網路果然很方便呢！"
2004303-26 = "於是我就拜託他們做了專屬於我的御節料理哦！"
2004303-27 = "走吧，老師！"
2004303-32 = "[ns]「泉？泉？？等等我啊～！」"
2004303-41 = "怎麼樣，老師？感覺不錯吧？"
2004303-42 = "氣氛好像跟會做御節料理的餐廳不太一樣？"
2004303-43 = "因為這間餐廳只要提前預約，什麼料理都能做到哦！不是只有御節料理而已！"
2004303-48 = "是獅子堂泉小姐嗎？#n您訂做的「泉流御節料理特選」已經準備好了。"
2004303-49 = "我馬上為您送來，請稍等片刻！"
2004303-55 = "那麼請盡情享用。祝兩位用餐愉快。"
2004303-59 = "[ns]「從外觀看起來，是很像樣的御節料理呢。」"
2004303-63 = "是嗎？太好了！#n不是有句話說「御節料理要先用眼睛去品嚐」嗎？"
2004303-64 = "就算是我獨門的御節料理，外觀還是得合格才行！"
2004303-65 = "那麼……先從這裡的燉黑豆開始吃吧！"
2004303-72 = "嗯！很新鮮！好好吃！"
2004303-73 = "看起來只是普通的燉黑豆？"
2004303-74 = "耶嘿嘿。#n其實有一點不一樣哦，因為這是……"
2004303-75 = "用豆子、醋和99%可可的巧克力做出來的燉黑豆！"
2004303-79 = "[ns]「99%的……巧克力？為什麼要加那種東西……！」"
2004303-83 = "因為是燉黑豆呀？#n巧克力中最黑的就是99%黑巧克力，這不是理所當然的嗎！"
2004303-84 = "那麼接下來是……燉蝦！#n這道蝦子呢……"
2004303-85 = "不是使用醬油和砂糖，而是用醃鯷魚燉出來的哦！"
2004303-90 = "哇！突出的鹹味跟鮮味真讓人印象深刻！"
2004303-91 = "你喜歡紅白魚板嗎，老師？#n我超喜歡的！"
2004303-92 = "想不到吧～！這個魚板是用草莓做的哦！"
2004303-93 = "[s]「草莓！？為什麼是草莓！？」"
2004303-97 = "當然是因為草莓汁是粉紅色的囉？"
2004303-98 = "嗯！魚肉和草莓的味道交織在一起，創造出了從未品嚐過的滋味！"
2004303-99 = "接下來～吃吃看這個燉地瓜栗子吧。"
2004303-104 = "薑味果然很辣呢！"
2004303-105 = "問我為什麼要加薑？因為……地瓜、栗子跟薑都是黃色的呀？#n剛才也說過，御節料理要先用眼睛品嚐對吧？"
2004303-106 = "老師也吃吃看吧？#n這裡還有用山葵燉煮的蓮藕……因為山葵跟蓮藕都是植物的莖嘛。"
2004303-107 = "這道醃鯡魚卵……是我突然靈機一動，用肉桂、魷魚醬和藍紋乳酪搭配出來的！"
2004303-108 = "[s]「真的很感謝你用心準備，不過你的好意我還是心領了！」"
2004303-109 = "真的嗎……？#n明明是這麼有特色的料理……"
2004303-110 = "說到餐後點心，果然必須得有鬆軟的甜點……#n在御節料理之中，口感最柔和的莫過於玉子燒了對吧？"
2004303-111 = "所以，泉流玉子燒裡加入了黑斑海兔的紫色墨汁和冰淇淋！"
2004303-112 = "[s]「冰淇淋我還能理解，但海兔是怎麼回事！？」"
2004303-113 = "老師你看，這個紫色和黃色的撞色感實在──"
2004303-117 = "──好像也沒有多漂亮呢。#n跟我想像中有點不太一樣。"
2004303-118 = "不過海兔墨汁的苦澀腥味，被冰淇淋給平衡……"
2004303-119 = "感覺就像同時在吃甜甜的和菓子跟苦苦的抹茶一樣～！"
2004303-121 = "（之後，泉繼續興致高昂地主持他的實驗性御節料理試吃活動……）"
2004303-122 = "（至少泉看起來是真的很幸福……）"
2004303-126 = "噗哈！吃得真滿足！真是令人心滿意足的一餐！"
2004303-127 = "沒想到御節料理能迸出這麼多新滋味，連我自己都很驚訝！"
2004303-128 = "不過……你還好嗎，老師？#n好像只有我一個人吃得很開心，真對不起……"
2004303-129 = "嗚嗚嗚，都怪我吃得太投入了，忘了要跟老師一起享受……"
2004303-130 = "[s1]「沒關係，泉！我真的沒事！」\n[s2]「我非常讚賞泉的實驗精神！」"
2004303-133 = "真的嗎？可是……"
2004303-137 = "好吧，老師！#n下次我一定會準備真正的美食給你吃的！"
2004303-141 = "所以老師要好好期待哦，知道了嗎？"
2004303-143 = "（要說絲毫沒有感到不安，那肯定是騙人的……）"
2004303-144 = "（至少泉的笑容確實非常燦爛……）"

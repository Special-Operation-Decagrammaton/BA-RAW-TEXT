2004303-105 = "3;이즈미 새해;01;왜 생강을 넣었냐고? 어…… 그야…… 고구마도 밤도, 생강도 모두 노란색이니까? 오세치는 조금 전에도 말했지만 눈으로 먼저 먹는 음식이잖아?"
2004303-106 = "3;이즈미 새해;02;선생님도 먹어 볼래? 연겨자를 넣고 졸인 연근조림도 있어. 이건 같은 '연'자 돌림이라서, 어울릴 것 같았거든."
2004303-107 = "3;이즈미 새해;10;그리고 이쪽은 절인 청어알인데……. 왠지 그래 보고 싶어서, 계피와 오징어젓, 그리고 블루치즈를 넣었어!\n#3;em;[반짝]"
2004303-108 = "[s] \"마음은 정말로 고마우니까, 거기까지만 받을게!\""
2004303-109 = "3;이즈미 새해;01;그래애……? 이렇게 독특한데……."
2004303-110 = "3;이즈미 새해;02;후식 하면 역시 포근하고 달콤한 음식이 좋을 거고……. 오세치에서 가장 포근한 건 계란말이라고 할 수 있겠지?"
2004303-111 = "3;이즈미 새해;00;그래서, 이즈미 류 계란말이에는 군소의 보라색 먹물과 아이스크림이 들어가 있어!\n#3;em;[반응]"

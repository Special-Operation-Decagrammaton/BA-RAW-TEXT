[translation]
2004303-1 = "Fresh Start"
2004303-2 = "A person's got to eat a new kind of osechi for the new year, don't you think?"
2004303-3 = "[s] \"That definitely sounds like something you'd say, Izumi!\""
2004303-4 = "Right?"
2004303-5 = "But you know what? With normal osechi, I always feel like something's missing."
2004303-6 = "Osechi typically consists of braised food that doesn't require the use of fire, right?"
2004303-7 = "Of course, braised food is delicious...but!"
2004303-8 = "But there's a side effect where they all end up tasting similar..."
2004303-9 = "So I think we should go in a different direction for our dining adventure!"
2004303-10 = "[s] \"The dining adventure we're still in the middle of.\""
2004303-11 = "Yep, that's right!"
2004303-12 = "Of course, we can use leftover osechi as garnish for nabe, curry rice, and noodle dishes."
2004303-13 = "That'll enrich the flavor, but..."
2004303-14 = "...we can always do that another time, right?"
2004303-15 = "Which is why...for today! I tried making my own osechi dish!"
2004303-16 = "I call it the Izumi-style Osechi Special!"
2004303-17 = "[s] \"Does that mean you cooked osechi by yourself, Izumi?\""
2004303-21 = "Well, I tried to do that at first... "
2004303-22 = "...but it was a bit too much for me! Ehehe!"
2004303-23 = "So I did some research."
2004303-24 = "And it turns out there are made-to-order restaurants. They cook pretty much anything you ask for!"
2004303-25 = "Haruna said she likes to use them too! The internet is so useful!"
2004303-26 = "So anyway, I put in a request there and commissioned my own osechi."
2004303-27 = "Let's go, Sensei!"
2004303-32 = "[ns] \"Izumi? Izumi?! At least wait for me!\""
2004303-41 = "What do you think, Sensei? It's got a nice vibe, right?"
2004303-42 = "Hmm? You don't think it looks like a place that would make osechi?"
2004303-43 = "Well, like I said, that's because this place doesn't just make osechi. It makes anything you request!"
2004303-48 = "Shishidou Izumi, yes? The \"Izumi-style Osechi Special\" you ordered is ready."
2004303-49 = "We'll bring it out to you in just a moment!"
2004303-55 = "Here you are. Please enjoy."
2004303-59 = "[ns] \"Visually, it looks like a fine osechi.\""
2004303-63 = "You think? I'm glad! They say you enjoy osechi with your eyes first, right?"
2004303-64 = "So, unique or not, it has to look the part if I'm going to call it osechi!"
2004303-65 = "Now...first, let's try these braised black beans!"
2004303-72 = "Yeah! So fresh! Delicious!"
2004303-73 = "Hmm? They look like ordinary braised black beans?"
2004303-74 = "Ehehe. There's a bit of a difference. You see..."
2004303-75 = "...THESE beans are made from beans, obviously, plus vinegar, and 99% cacao chocolate!"
2004303-79 = "[ns] \"99%...cacao? Why would you put that in there...?!\""
2004303-83 = "Well, they're braised BLACK beans, aren't they? And 99% cacao is the darkest of chocolates. It just makes sense!"
2004303-84 = "And next...here's the braised shrimp! This shrimp is actually..."
2004303-85 = "...braised with pickled anchovies instead of soy sauce and sugar!"
2004303-90 = "Whoa! The salty, savory flavor is just...inspirational!"
2004303-91 = "Do you like kamaboko, Sensei? I do!"
2004303-92 = "This one's actually made with strawberries!"
2004303-93 = "[s] \"Strawberries?! Why strawberries?!\""
2004303-97 = "Oh, don't you know? It's because they're pink."
2004303-98 = "Yeah! I can taste the fish and the strawberries mixing together. It's an all-new flavor!"
2004303-99 = "Next up, let's try the braised sweet potatoes and chestnuts."
2004303-104 = "All this spicy ginger comes in hot!"
2004303-105 = "Why'd I put ginger in? Uh...well... Because sweet potatoes, chestnuts, and ginger are all yellow! Like I said earlier, you enjoy osechi with your eyes first, yeah?"
2004303-106 = "Would you like to try, Sensei? There's also lotus root, braised with light mustard. They both start with the letter \"L\", so I thought they'd go together too."
2004303-107 = "And here I have pickled herring roe. I added cinnamon, salted squid, and blue cheese...just because I wanted to!"
2004303-108 = "[s] \"I appreciate the offer, but I think I'm good!\""
2004303-109 = "Is that so...? It's unique, though..."
2004303-110 = "And for dessert, it's got to be something soft and sweet. The softest food in osechi would be rolled omelet, right?"
2004303-111 = "Which is why Izumi-style rolled omelets come with sea hare's purple ink and ice cream inside!"
2004303-112 = "[s] \"I get the ice cream, but why sea hare?!\""
2004303-113 = "Take a look, Sensei. The combination of purple and yellow..."
2004303-117 = "...doesn't look that pretty, actually. It's not how I pictured it. Bah."
2004303-118 = "But I thought the ice cream could cover the fishy, bitter taste of the sea hare ink..."
2004303-119 = "...making it feel like you're eating sweet wagashi and bitter matcha at the same time!"
2004303-121 = "Izumi continued to joyfully taste her experimental osechi."
2004303-122 = "She, at least, seemed genuinely happy."
2004303-126 = "Phew! That was good! Quite a meal!"
2004303-127 = "So many fresh, different experiences with just osechi! Sometimes I surprise myself!"
2004303-128 = "By the way...Sensei? I kind of get the impression I'm the only one enjoying this..."
2004303-129 = "Ugh, I've been so focused on eating, I didn't think about you enjoying it...or not."
2004303-130 = "[s1] \"Not at all, Izumi! I'm good, really!\"\n[s2] \"I'm happy to praise your experimental spirit!\""
2004303-133 = "Yeah? But still..."
2004303-137 = "...Okay, Sensei! Next time, I'll prepare something delicious just for you!"
2004303-141 = "So look forward to it. Okay?"
2004303-143 = "I would be lying if I said I didn't feel anxious..."
2004303-144 = "...but again, it's hard to resist that smile."

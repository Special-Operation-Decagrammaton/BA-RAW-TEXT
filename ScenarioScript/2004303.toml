[translation]
2004303-1 = "#title;새로운 시도"
2004303-2 = "3;이즈미 새해;02;새해라면 역시 새로운 오세치를 먹어야 하지 않을까?!\n#3;em;[반짝]\n#3;a"
2004303-3 = "[s] \"새로운 오세치라니 뭔가 이즈미답네!\""
2004303-4 = "3;이즈미 새해;00;그치?"
2004303-5 = "3;이즈미 새해;01;하지만, 선생님. 보통의 오세치는 역시, 뭔가 조금 아쉬운 거 있지."
2004303-6 = "3;이즈미 새해;99;오세치란 건 원래, 불을 쓰지 않는 조림 요리 위주로 하는 거잖아?"
2004303-7 = "3;이즈미 새해;05;물론 물론! 조림 요리도 맛있기는 하지만!\n#3;em;[!]"
2004303-8 = "3;이즈미 새해;01;그래도 역시 맛이 비슷해지는 부작용이 있단 말이야……."
2004303-9 = "3;이즈미 새해;00;그러니까 그건, 우리의 미식 모험과는 방향성이 다른 거라고 생각해!"
2004303-10 = "[s] \"어, 응. 그래. 우리 미식 모험 중이었지…….\""
2004303-11 = "3;이즈미 새해;10;맞아! 그거야!\n#3;em;[음표]\n#3;hophop"
2004303-12 = "3;이즈미 새해;01;물론 남은 오세치 요리로, 나베나 카레라이스, 면요리 고명 등으로……."
2004303-13 = "3;이즈미 새해;99;재활용을 하면 다시 풍부한 맛을 느낄 수 있겠지만."
2004303-14 = "3;이즈미 새해;03;그건 사실 나중에 언제든 해도 되는 일이잖아?"
2004303-15 = "3;이즈미 새해;10;그래서 오늘은! 나만의 오세치 요리를 시도해 봤어!\n#3;em;[재잘]\n#3;greeting"
2004303-16 = "3;이즈미 새해;00;이른바 이즈미류 오세치 특선! 인 거지!"
2004303-17 = "[s] \"이즈미가 오세치를 직접 만들었다는 소리야?\""
2004303-18 = "#st;[0,0];instant;1;"
2004303-19 = "#clearST"
2004303-20 = "3;이즈미 새해;07\n#3;em;[?!]\n#3;shake\n#3;h\n#wait;1000"
2004303-21 = "3;이즈미 새해;04;그게, 처음에는 그러려고 했는데……. \n#3;stiff"
2004303-22 = "3;이즈미 새해;10;역시 조금 무리였지 뭐야! 에헤헤!\n#3;em;[땀]"
2004303-23 = "3;이즈미 새해;02;하지만 여기저기 잘 알아보니까 말이지?"
2004303-24 = "3;이즈미 새해;10;요청하는 대로 만들어 주는, [ruby=Made-to-order]메이드 투 오더[/ruby] 식당이라는 것이 있었지 뭐야!"
2004303-25 = "3;이즈미 새해;00;하루나도 자주 이용하곤 한대! 인터넷이란 정말 편리해!\n#3;em;[반짝]"
2004303-26 = "3;이즈미 새해;03;그래서 말이야? 거기에 부탁해서 나만의 오세치를 만들었거든?"

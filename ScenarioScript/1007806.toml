[translation]
1007806-1 = "คำขอความช่วยเหลือกลางหุบเขาลึก"
1007806-2 = "(คุณครูได้รับข้อความจากคาสุมิ และรีบร้อนไปหาตามพิกัดที่เธอบอกไว้)"
1007806-6 = "อ่า~ คงเป็นเพราะที่นี่เงียบมากๆ ก็เลยได้ยินเสียงมาตั้งแต่ไกลๆ เลยแฮะ! วะฮะฮะฮ่า!!"
1007806-7 = "บอกแล้วแท้ๆ ว่าไม่ต้องรีบร้อนขนาดนั้นก็ได้... แต่ก็นะ คิดไว้แล้วละว่าคุณครูต้องติดจรวดมาแบบนี้"
1007806-8 = "เฮ้~! คุณครู~!"
1007806-9 = "ทางนี้ ทางนี้~!"
1007806-11 = "เฮ้อ... แบบนี้มันก็น่าอายอยู่นะ แต่จะไม่ให้เรียกมาช่วยก็ไม่ได้..."
1007806-12 = "ขอบคุณนะคุณครู ฉันเรียกให้คนงานยุ่งมาช่วยเรื่องรองเท้าเนี่ยนะ... ไม่รู้เลยว่าจะต้องขอโทษและ#nขอบคุณยังไงดีเลย"
1007806-13 = "...หืม? เรื่องนั้นไม่ต้องห่วง แล้วก็... ฉันบาดเจ็บมากหรือเปล่างั้นเหรอ?"
1007806-14 = "อ่า ไม่ๆ ไม่เลย! ไม่ได้บาดเจ็บอะไรเลย! ฮะฮ่า! ฉันไม่เป็นอะไรจริงๆ!"
1007806-15 = "ฉันไม่ได้เป็นอะไร เพราะงั้นเลิกทำหน้าตาเป็นห่วงแบบนั้นได้แล้ว ขอร้องละ ยิ่งคุณครูทำแบบนั้นฉันยิ่ง#nรู้สึกอายนะ"
1007806-16 = "ฉันก็แค่เดินตามเส้นทางภูเขา ค้นหาจุดระเบิด... แล้วก็ลื่นจนรองเท้าแตะขาดก็เท่านั้นน่ะ"
1007806-17 = "แล้วที่บอกว่าเท้าฉันแค่เคล็ดนิดหน่อย มันก็จริงอย่างที่พูด แค่นั้นจริงๆ นะ! ฉันไม่ได้บาดเจ็บ หรือมีเลือดออกตรงไหนเลย ไม่มีอะไรต้องกังวล!"
1007806-18 = "บอกว่าไม่ได้เป็นอะไรจริงๆ ไง~ ถ้าไม่เชื่อก็มาดูเองเลยมั้ยล่ะ?"
1007806-19 = "เอ้านี่! ดูสิ! ดูเท้าฉันเลย! นี่~ ไง~"
1007806-20 = "ยังปกติดีใช่มั้ย? มันก็แค่ถลอกนิดหน่อย ไม่ได้ลึกหรือเลือดออกอะไรเลย บอกแล้วไงไม่ต้องเป็นห่วง"
1007806-21 = "...หืม? ทำไมฉันถึงมาอยู่ในที่แบบนี้คนเดียวน่ะเหรอ?"
1007806-22 = "ก็มาดูสถานที่ล่วงหน้าไง ที่นี่เป็นหนึ่งในสถานที่จุดระเบิดที่ฉันหมายตาไว้... ก็เลยต้องมาดูกับตาว่าใช้ได้#nจริงๆ หรือเปล่า"
1007806-23 = "ที่นี่ถือว่าไม่แย่นะ แต่พิกัดจุดระเบิดส่วนมากจะอยู่ในใจกลางเมืองน่ะ"
1007806-24 = "ถ้าฉันมาพร้อมกับสมาชิกคนอื่นๆ ฉันคงตกเป็นเป้าสายตาของใครหลายคน"
1007806-25 = "ปกติแล้วงานดูสถานที่มันเป็นงานที่ฉันทำคนเดียวน่ะ ทำคนเดียวมันก็ไวกว่าด้วย"
1007806-26 = "เห็นอย่างนี้ ฉันก็ไม่ได้ทำแต่งานนั่งโต๊ะหรือดูแผนที่อย่างเดียวหรอกนะ?"
1007806-27 = "...หืม? ว่าไงนะ?"
1007806-28 = "อ่า... อยากรู้ว่าที่นี่เป็นยังไง... น่ะเหรอ?"
1007806-29 = "อืม... ไม่รู้สิ น่าเสียดายอยู่นะ แต่ถ้าจะให้พูดตรงๆ ก็ต้องบอกว่า..."
1007806-30 = "...ไม่ผ่าน!"
1007806-31 = "วะฮะฮะฮะฮ่า!! ไม่ผ่านอย่างแรง!! ไม่ต้องคิดหาเหตุผลให้มันมากความเลย!"
1007806-32 = "ที่นี่ไม่น่าจะมีน้ำพุร้อนออกมา ส่วนการระเบิดตรงนี้ก็ดูจะเป็นงานง่ายๆ ก็เลยดูธรรมดาไปหน่อย"
1007806-33 = "ระหว่างกระบวนการพัฒนาออนเซ็นก็ไม่น่ามีอะไรท้าทายด้วย ฉันไม่ให้ผ่านในทุกๆ ด้านเลย"
1007806-34 = "อีกอย่าง ที่นี่ทำฉันคิดเลยว่า คนอย่างฉันมาทำผิดพลาดในแบบนี้ได้ยังไง...!  วะฮะฮะฮ่า!!"
1007806-35 = "รองเท้าก็มาหายไปข้างนึงอีก... ฮู่ว~"
1007806-36 = "จะว่าไป แค่ฉันเรียกคุณครูมาที่นี่ก็น่าขายหน้าพอแล้ว..."
1007806-37 = "แล้ว... เอามาด้วยหรือเปล่า? ของที่ฉันฝากให้เอามาน่ะ"
1007806-38 = "[s1] \"หมายถึงรองเท้าแตะเนอะ? ครูเอามาให้แล้ว\" \n[s2] ยื่นรองเท้าที่หยิบมาให้ดู"
1007806-41 = "ฮะฮะฮ่า! สมกับเป็นคุณครูที่ฉันเชื่อใจเลย!"
1007806-42 = "เอาละ งั้นขอรองเท้าแตะนั้นให้ฉันหน่อย ฉันไม่ต้องทำอะไรต่อที่นี่แล้ว คงรีบลงเขาไป..."
1007806-43 = "...หืม?"
1007806-44 = "ไม่ให้เหรอ? ทำไมถึงจะไม่ให้ล่ะ?"
1007806-45 = "...ว่าไงนะ?"
1007806-46 = "ให้ฉันขี่หลังงั้นเหรอ...? คุณครูจะแบกฉันลงไปเนี่ยนะ?"
1007806-47 = "ฮืม..."
1007806-48 = "ฮืมมม...!!"
1007806-49 = "...อืมมมมมมมม~!!!"
1007806-53 = "...อ่า เอ่อ... อ่า... อืม..."
1007806-54 = "...มันต้อง... ทำแบบนั้นเหรอ? ต้องถึงกับขี่หลังลงไปเลยเหรอ?"
1007806-55 = "ถ้าทำแบบนั้น... มันจะดูน่าขายหน้าอยู่นะ..."
1007806-56 = "ตะ... แต่ก็นะ ถ้าข้อเท้าเคล็ดก็คงเดินไม่สะดวกสักเท่าไร..."
1007806-57 = "แต่ถ้าให้ค่อยๆ เดินลงไปช้าๆ ก็ได้อยู่เหมือนกัน... หรือไม่ก็แค่ช่วยประคองก็น่าจะพอแล้ว..."
1007806-58 = "จะให้ขี่หลัง... ขี่หลัง... เลยงั้นเหรอ... ขี่หลังคุณครูเนี่ยนะ... อืม..."
1007806-59 = "อืมมมม...!!"
1007806-60 = "...ต้องขนาดนั้นเลยเหรอ?"
1007806-61 = "[s3] \"อื้ม ต้องแบบนั้นเลย\"\n[s4] \"แน่นอนสิ เธอเป็นคนเจ็บนะ\""
1007806-64 = "ฮืมมมม... งั้นเหรอ..."
1007806-65 = "ถะ... ถ้างั้นก็... คะ... คงช่วยไม่ได้เนอะ..."
1007806-66 = "วะ... วะฮ่า... วะฮะฮะฮ่า... วะฮะฮะฮ่า...!!"
1007806-70 = "เป็นคนที่มีพรสวรรค์ในการทำให้คนอื่นเค้าลำบากใจจริงๆ เลยนะ เกิดมาเพิ่งจะเจอเรื่องแบบนี้เป็นครั้ง#nแรกเลย"
1007806-71 = "ใครมาเห็นเข้าคงคิดว่าเรามีความสัมพันธ์พิเศษต่อกันแล้วละ แต่ถึงจะมีใครเข้าใจผิด คุณครูก็ไม่สนใจ#nหรือเปล่านะ?"
1007806-72 = "เอาเถอะ ฉันยอมขี่หลังลงไปก็ได้ แต่ถ้าลงไปแล้วจะให้รองเท้าแตะใช่มั้ย? ตกลงแบบนั้นเนอะ?"
1007806-73 = "ถ้างั้นก็รบกวนหน่อยนะ คุณครู"
1007806-80 = "[ns5] \"...คาสุมิ?\"\n[ns6] \"เป็นอะไรเหรอ?\""
1007806-83 = "ปะ... เปล่านี่ ฉันก็แค่... คิดอะไรนิดหน่อยน่ะ"
1007806-84 = "...ฮะฮ่า"
1007806-85 = "จะว่ายังไงดีนะ... การดูสถานที่วันนี้..."
1007806-87 = "...ท่าทางจะไม่ได้ 'เปล่าประโยชน์' ไปซะหมดหรอกนะ"

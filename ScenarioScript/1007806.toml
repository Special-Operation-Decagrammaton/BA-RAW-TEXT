[translation]
1007806-1 = "#title;깊은 산중의 구조요청"
1007806-2 = "#na;(카스미의 연락을 받고, 서둘러 표시된 위치로 찾아갔다.)"
1007806-3 = "#st;[0,0];instant;1;"
1007806-4 = "#clearST"
1007806-5 = "#wait;2000"
1007806-6 = "#na;카스미;아~아. 한적한 곳이라 그런지, 멀리서부터 소리가 들리네! 와핫핫핫!!"
1007806-7 = "#na;카스미;그렇게 서두르진 않아도 된다고 했는데……. 뭐, 이럴 거라 예상은 했지만서도."
1007806-8 = "#na;카스미;어~이! 선생님~!"
1007806-9 = "#na;카스미;이쪽이야, 이쪽~!"
1007806-10 = "3;카스미;07"
1007806-11 = "3;카스미;07;크으……. 이거 참……. 뭔가 좀 무안하네. 그렇다고 부르지 않을 수도 없고…….\n#3;em;[땀]\n#3;stiff"
1007806-12 = "3;카스미;01;고마워, 선생님. 안 그래도 바쁜 사람한테 신발 심부름이라니, 어떻게 사과와 감사를 표해야 할지 모르겠어."
1007806-13 = "3;카스미;08;……응? 그런 건 됐고 많이 다쳤냐고?"
1007806-14 = "3;카스미;03;아아, 아니아니! 전혀 그런 건 아니야! 하하! 정말로 괜찮아, 괜찮다고!\n#3;em;[재잘]"
1007806-15 = "3;카스미;04;괜찮으니까 제발 그런 걱정하는 얼굴은 좀 그만둬 주지 않겠어? 그럴수록 내가 정말 무안해지거든.\n#3;stiff"
1007806-16 = "3;카스미;01;그저 포인트를 찾느라 산길을 좀 돌다가……. 미끄러지는 과정에서 슬리퍼가 찢어져 버렸을 뿐인데 말이야."
1007806-17 = "3;카스미;02;말 그대로 발이 좀 삐끗! 했다-는 것. 정말 단지 그것뿐! 다치거나 피가 난 건 아니니, 걱정할 거 없어!\n#3;em;[음표]"
1007806-18 = "3;카스미;07;정말이라니까~. 그렇게 못 믿겠으면 직접 보겠어?\n#3;hophop"
1007806-19 = "3;카스미;07;……자! 봐 봐! 내 발! 여~기~.\n#3;greeting"
1007806-20 = "3;카스미;02;멀쩡하지? 긁힌 곳도 피가 나진 않을 정도로 살짝 스쳤을 뿐이야. 호들갑 떨 거 없다고.\n#3;em;[재잘]"
1007806-21 = "3;카스미;08;……음? 왜 이런 곳에 혼자서 왔냐고?"
1007806-22 = "3;카스미;01;뭐, 당연히 사전 조사지. 포인트로 정한 곳 중 하나인데……. 실제로 괜찮은지 확인을 해야 하니까.\n#3;em;[반응]"
1007806-23 = "3;카스미;02;여기는 그래도 괜찮지만, 보통 발파 포인트는 도심지인 경우도 꽤 많거든."
1007806-24 = "3;카스미;99;다른 부원들이랑 우르르 몰려다니면 그 자체로도 이미 여러 녀석의 표적이 되게 마련.\n#3;em;…"
1007806-25 = "3;카스미;01;그래서 포인트 확인 조사는 보통 나 혼자서 진행해. 그 편이 빠르기도 하고."
1007806-26 = "3;카스미;01;나라고 늘 책상머리나 지도 위에서만 움직이는 건 아니라고?"
1007806-27 = "3;카스미;08;……응? 뭐라고?\n#3;em;[?]"
1007806-28 = "3;카스미;09;……호오? 그래서 여기는 어떤 거 같냐……고?"
1007806-29 = "3;카스미;99;음……. 그러게. 안타깝지만, 단도직입적으로 말하자면……."
1007806-30 = "3;카스미;12;……꽝!\n#3;em;[!]"
1007806-31 = "3;카스미;03;……이로군! 와핫핫핫핫!! 완전히 꽝이야!! 더 고려할 가치도 없겠어, 여기는!\n#3;hophop"
1007806-32 = "3;카스미;01;딱히 뭐 온천이 나올 것 같지도 않고, 발파 작업 자체도 밋밋하니 평범할 것 같아."
1007806-33 = "3;카스미;99;그렇다고 그 과정에서 뭔가 다이나믹한 게 생길 거 같지도 않지. 모든 면에서 별로야.\n#3;em;…"
1007806-34 = "3;카스미;14;나 정도 되는 녀석이 이런 실수를……! 이라는 생각까지 들 정도로 말이야. 와핫핫핫!!"
1007806-35 = "3;카스미;08;심지어 슬리퍼까지 하나 해 먹어 버리고……. 에휴~.\n#3;em;[한숨]"
1007806-36 = "3;카스미;04;그러고 보니 선생님, 부른 것만으로도 이미 충분히 염치가 없지만…….\n#3;stiff"
1007806-37 = "3;카스미;02;……혹시 가져왔어? 부탁한 거."
1007806-38 = "[s1] \"슬리퍼 말이지? 물론.\"\n[s2] 가져온 슬리퍼를 보여준다."
1007806-39 = "#wait;100"
1007806-40 = "#wait;100"
1007806-41 = "3;카스미;03;핫핫핫! 역시 선생님이야! 믿고 있었다고!\n#3;em;[음표]"
1007806-42 = "3;카스미;01;자, 그렇다면 그 슬리퍼, 이리 좀 주겠어? 여긴 더 볼 일이 없으니, 얼른 같이 내려가서……."
1007806-43 = "3;카스미;08;……응?"
1007806-44 = "3;카스미;07;지금은 안 준다고……? 갑자기 그건 또 무슨 소리야?\n#3;em;[?]"
1007806-45 = "3;카스미;08;……뭐?"
1007806-46 = "3;카스미;08;등에 타라고……? 업어줘? 선생님이? 나를?"
1007806-47 = "3;카스미;08;흐음…….\n#3;em;…"
1007806-48 = "3;카스미;07;흐으으음……!!"
1007806-49 = "3;카스미;04;……으으으으으으으음~!!!\n#3;stiff\n#3;em;[!]"
1007806-50 = "#st;[0,0];instant;1;"
1007806-51 = "#clearST"
1007806-52 = "3;카스미;04\n#3;em;…\n#wait;2500"
1007806-53 = "3;카스미;13;……그, 그……. 어……. 음……."
1007806-54 = "3;카스미;14;……꼭……. 그래야 할까? 꼭 그렇게까지 해야 할까?\n#3;em;[///]\n#3;stiff"
1007806-55 = "3;카스미;04;뭔가 조금……. 낯 뜨거운 느낌이 드는 것 같기도 하고……."
1007806-56 = "3;카스미;02;그, 그야. 뭐. 발목이 삐었으니 걷기 편한 건 아니라고는 하지만…….\n#3;em;[땀]"
1007806-57 = "3;카스미;99;그래도 적당히 천천히 내려가면 될 것 같기도 하고……. 아니면 부축 정도만 해도 되고……."
1007806-58 = "3;카스미;04;……업는다……. 업는다……라……. 선생님이 업어준다……. 음…….\n#3;em;…"
1007806-59 = "3;카스미;04;으으으음……!!\n#3;stiff"
1007806-60 = "3;카스미;10;……꼭?\n#3;em;[?]"
1007806-61 = "[s3] \"응. 꼭.\"\n[s4] \"당연하잖아, 환자인데.\""

[translation]
1007806-1 = "Deep Mountain Rescue"
1007806-2 = "After an urgent call from Kasumi, I rushed over to the location she indicated."
1007806-6 = "This place is so quiet that I could hear you coming from a mile away! Wahaha!"
1007806-7 = "I told you it wasn't life-threatening or anything... But I should have seen this coming."
1007806-8 = "Sensei! Hey!"
1007806-9 = "This way! Over here!"
1007806-11 = "So this is kinda...embarrassing. But you were also the only one I could call."
1007806-12 = "Thanks, Sensei. I know how busy you are, so I really appreciate this."
1007806-13 = "...Hm? Am I hurt?"
1007806-14 = "Oh, um, not at all! I'm totally fine! Haha! Really, I'm all right!"
1007806-15 = "I'm fine! Don't look so concerned. It'll just make me feel more embarrassed than I already do."
1007806-16 = "It's so silly. I was wandering the mountain trail when my slipper broke. Then, of course, I slipped...and fell..."
1007806-17 = "I'm sure it's nothing more than a slight sprain! I'm not bleeding. There's nothing to worry about!"
1007806-18 = "Seriously! Look! I can show you!"
1007806-19 = "...See! Look at my ankle."
1007806-20 = "It's fine. And that scrape isn't even deep enough to draw blood."
1007806-21 = "...What? Why am I here alone?"
1007806-22 = "I'm surveying the area, of course. It's a prospective hot spring, and I wanted to see it with my own eyes."
1007806-23 = "This place is relatively secluded, but normally, my survey spots are in the middle of cities."
1007806-24 = "Whenever I go out with the other club members, we draw a lot of unwanted attention."
1007806-25 = "So I've gotten used to doing surveys by myself. It's a lot faster and easier."
1007806-26 = "Besides, I'm not exactly a reclusive book worm, you know? I like to get out and about."
1007806-27 = "...Huh?"
1007806-28 = "...You want to know what I think of this place?"
1007806-29 = "Well... Hm... If I'm being completely honest..."
1007806-30 = "...It's a no-go!"
1007806-31 = "A complete dud! DOA! Not even worth consideration!"
1007806-32 = "It's...exceedingly ordinary. Not only is it a terrible location for a hot spring, but even the demolition would be boring."
1007806-33 = "There's no geographic feature that would make for a unique blast. Nothing. It's awful in every sense of the word."
1007806-34 = "Choosing this place was the most rookie mistake in the book."
1007806-35 = "And on top of aaaaaall that...I ruined a slipper. *sigh*"
1007806-36 = "I'm sorry to just unload on you after I dragged you all the way out here."
1007806-37 = "Hey, speaking of... Did you bring what I asked for?"
1007806-38 = "[s1] \"You mean the new slippers? Of course.\"\n[s2] Show her the slippers you brought."
1007806-41 = "Wahaha! I knew I could count on you, Sensei!"
1007806-42 = "I'm all done here. So why don't I put that on, and we can walk down together?"
1007806-43 = "Huh?"
1007806-44 = "...What'd you bring them all the way up here for if you're not going to give them to me?"
1007806-45 = "...What?"
1007806-46 = "You want to carry me down? You can't be serious..."
1007806-47 = "Hm..."
1007806-48 = "Well... Eh... Mm..."
1007806-49 = "I suppose... But... Hmm..."
1007806-53 = "Uh, so... Hmm..."
1007806-54 = "I-Is that my only option?"
1007806-55 = "It's just... It's so embarassing..."
1007806-56 = "I mean, I know I sprained my ankle...and it's swelled up bigger than a mushroom cloud...but that doesn't mean I'm completely helpless!"
1007806-57 = "I can still walk as long as it's super slow. I'd just need a little support."
1007806-58 = "Ugh! A piggy back ride, of all things! From Sensei!"
1007806-59 = "Uhh...!"
1007806-60 = "Do I absolutely have to?"
1007806-61 = "[s3] \"I won't take no for an answer.\"\n[s4] \"Of course you do. You're hurt.\""
1007806-64 = "Hmm... I see..."
1007806-65 = "I-I guess I don't have a choice here, do I?"
1007806-66 = "Haha. Hahaha... Hahaha...!"
1007806-70 = "You certainly have a knack for negotiation. I've never felt so outmatched as I do right now."
1007806-71 = "You know, if other people see us acting that close with each other, they might talk. Are you prepared to handle that, Sensei?"
1007806-72 = "...So what if I'm stalling? ...Okay, fine! But you'd better give me that slipper the second we're down the mountain, okay?"
1007806-73 = "My fate now lies with you, Sensei."
1007806-80 = "[ns5] \"...Kasumi?\"\n[ns6] \"What's wrong?\""
1007806-83 = "I-It's nothing. I was just thinking."
1007806-84 = "...Haha."
1007806-85 = "It's just... Today's survey outing..."
1007806-87 = "It wasn't a total loss."

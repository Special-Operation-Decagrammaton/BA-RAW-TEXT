1007806-65 = "3;카스미;99;그, 그럼 뭐……. 어, 어쩔 수 없나…….\n#3;em;[땀]"
1007806-66 = "3;카스미;03;와, 와하, 와하핫핫……. 와핫핫핫……!!\n#3;hophop"

1007806-70 = "3;카스미;04;정말이지 사람을 곤란하게 하는 재주가 있는 사람이야. 살다 살다 이런 상황은 처음이라고."
1007806-71 = "3;카스미;07;누가 보면 특별한 관계인 줄 알겠어, 아주? 그런 오해가 생겨도 괜찮은 걸까, 선생님은?\n#3;em;[스팀]\n#3;hophop"
1007806-72 = "3;카스미;08;아무튼 알겠어. 내려간 뒤에는 슬리퍼 제대로 주는 거겠지? 그런 거라고 알고 있으면 되겠지?"

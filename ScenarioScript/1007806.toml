[translation]
1007806-1 = "來自深山的救援請求"
1007806-2 = "（接到佳澄的聯絡後，趕緊前往他所傳來的位置）"
1007806-6 = "啊～啊，可能是因為這裡很安靜，從很遠的地方就能聽到聲音呢！哈哈哈哈哈！！"
1007806-7 = "雖然說過不用這麼匆忙……唔，老師果然會這樣呢。"
1007806-8 = "喂～！老師～！"
1007806-9 = "這裡這裡～！"
1007806-11 = "唔……這還真是……有點難為情呢。#n不過也不能不請老師來……"
1007806-12 = "謝謝你，老師。#n你明明是個大忙人……真不知道該怎麼道歉才好。"
1007806-13 = "……嗯？你說我的傷勢比較重要？"
1007806-14 = "啊啊，其實真的不是什麼嚴重的傷！#n哈哈哈，我真的沒事！"
1007806-15 = "所以可以別露出那麼擔心的表情嗎？這樣會讓我更過意不去的……"
1007806-16 = "我只是為了找爆破地點在山路上繞了繞……結果不小心滑倒把拖鞋弄壞了。"
1007806-17 = "腳也稍微扭到了一下，真的只是這樣而已！#n既沒有受傷也沒有流血，所以不用那麼擔心！"
1007806-18 = "是真的啦～如果不相信的話，要不要親眼看看？"
1007806-19 = "……來！你看！我的腳！這～裡～"
1007806-20 = "真的沒事對吧？#n只是稍微擦傷而已，連流血都沒有，老師不必這麼擔心。"
1007806-21 = "……嗯？問我為什麼一個人來這種地方？"
1007806-22 = "是來做事前調查的。#n這裡是我決定的爆破地點之一……所以必須實際確認一下是否適合。"
1007806-23 = "這裡雖然不成問題，但爆破地點在市中心的情況也很多。"
1007806-24 = "如果其他成員也一起行動的話，很容易引起注意。"
1007806-25 = "所以我通常都是一個人調查爆破地點，這樣也比較有效率。"
1007806-26 = "我可不是只會紙上談兵的人哦？"
1007806-27 = "……嗯？什麼？"
1007806-28 = "……哦？#n問我覺得這裡怎麼樣……？"
1007806-29 = "嗯……這個嘛，雖然遺憾，但我就開門見山地說了……"
1007806-30 = "這裡……"
1007806-31 = "……不怎麼樣！哈～哈哈哈哈！！#n老實說真是糟透了！根本不值得考慮！"
1007806-32 = "感覺不會有溫泉出現，就算爆破了也沒什麼意思。"
1007806-33 = "而且過程好像也不是很有趣，各方面都很普通。"
1007806-34 = "甚至讓我覺得像我這麼厲害的人居然會犯這種失誤呢！哈～哈哈哈！！"
1007806-35 = "而且居然還弄壞了一雙拖鞋……唉～"
1007806-36 = "對了，老師。#n雖然請你來就已經很厚臉皮了，但……"
1007806-37 = "我拜託的東西……你有帶來嗎？"
1007806-38 = "[s1]「你是指拖鞋吧？當然有。」\n[s2] 拿出帶來的拖鞋"
1007806-41 = "哈～哈哈哈！不愧是老師！真是值得信賴！"
1007806-42 = "那麼可以麻煩你把那雙拖鞋給我嗎？#n這裡已經沒事做了，我們趕緊到下一個……"
1007806-43 = "……嗯？"
1007806-44 = "現在不能給我……？那是什麼意思？"
1007806-45 = "……咦？"
1007806-46 = "要我爬上你的背……？#n是要背我嗎？老師你？背我？"
1007806-47 = "唔……"
1007806-48 = "唔嗯嗯嗯……！！！"
1007806-49 = "……唔唔唔唔唔唔唔嗯～！！！"
1007806-53 = "……這，這個……嗯……唔……"
1007806-54 = "……一定要……讓老師背嗎？#n非這麼做不可嗎？"
1007806-55 = "這有點……讓人害羞耶……"
1007806-56 = "那，那個，嗯，雖然腳扭傷走起來多少有點不方便……"
1007806-57 = "不過我覺得只要慢慢走……或是扶我一下就行了……"
1007806-58 = "……老師要背我……背我啊……嗯……"
1007806-59 = "唔唔唔嗯……！！"
1007806-60 = "……一定要嗎？"
1007806-61 = "[s3]「嗯，一定要。」\n[s4]「這是當然的，你可是傷患哦。」"
1007806-64 = "唔唔唔唔嗯……是嗎……"
1007806-65 = "那，那就……沒，沒辦法了……"
1007806-66 = "哈，哈哈，哈哈哈哈……哈～哈哈……！！"
1007806-70 = "老師也真會讓別人困擾呢。#n我這輩子還是第一次碰上這種情況。"
1007806-71 = "要是被別人看到的話，可能會以為我們是特別的關係哦？#n老師就算被誤會也無所謂嗎？"
1007806-72 = "總之我知道了。#n下山之後就會把拖鞋給我了對吧？我可以這麼認為嗎？"
1007806-73 = "那就拜託你了，老師。"
1007806-80 = "[ns5]「……佳澄？」\n[ns6]「怎麼了？」"
1007806-83 = "沒，沒什麼，只是在想點事情。"
1007806-84 = "…………哈哈。"
1007806-85 = "怎麼說呢……這麼看來，今天的調查……"
1007806-87 = "……也不是完全「一無所獲」啊。"

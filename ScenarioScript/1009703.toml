[translation]
1009703-1 = "#title;Danger Close"
1009703-2 = "#na;(모에의 메시지를 받고 폭발을 막기 위해 그녀가 알려준 장소로 황급히 달려갔다.)"
1009703-3 = "#st;[0,0];instant;1;"
1009703-4 = "#clearST"
1009703-5 = "#wait;2500"
1009703-6 = "3;모에 수영복;03\n#3;h\n#3;a\n#wait;1000"
1009703-7 = "[ns] \"모에, 괜찮아?!\""
1009703-8 = "3;모에 수영복;02;아, 선생님. 생각했던 것보다 빨리 왔네.\n#3;em;[반응]"
1009703-9 = "3;모에 수영복;04;그보다 여기까지 뛰어서 온 거야? 호흡이 엄청 거칠어 보이는데……"
1009703-10 = "[s1] \"그야 당연하지. 큰일이 벌어질지도 모르는데!\"\n[s2] \"그보다 폭발은 끝난 거야? 아니면 아직 시작하기 전?\""
1009703-11 = "#wait;100"
1009703-12 = "#wait;100"
1009703-13 = "3;모에 수영복;12;폭발……?\n#3;em;[?]"
1009703-14 = "3;모에 수영복;02;아아, 그 말을 오해했구나."
1009703-15 = "3;모에 수영복;01;폭발은 아직이야. 굳이 말하자면…… 한창 진행되는 중이라고 할까?"
1009703-16 = "[s] \"진행 중이라고? 어디서……\""
1009703-17 = "#st;[0,0];instant;1;"
1009703-18 = "#clearST"
1009703-19 = "#wait;2500"
1009703-20 = "[ns] \"뭔가 폭발했다?!\""
1009703-21 = "3;모에 수영복;02;아아, 바로 이 소리야……"
1009703-22 = "3;모에 수영복;99;조개는 역시 센불에 구워야 제맛이지!\n#3;jump\n#3;em;[!]"
1009703-23 = "[s] \"조개……?\""
1009703-24 = "3;모에 수영복;02;응, 숯불에 조개를 굽고 있었거든."
1009703-25 = "3;모에 수영복;03;아까 오후에 부둣가에 갔다가 주민분들이 따개비를 제거하는 걸 도와드렸더니 조개를 잔뜩 나누어 주셨어."
1009703-26 = "3;모에 수영복;02;이런 신선한 조개라면 삶거나 국에 넣어 끓여 먹어도 맛있겠지만…… 역시 해산물을 가장 맛있게 먹을 수 있는 방법은 센불로 굽는 거지!"
1009703-27 = "3;모에 수영복;00;더군다나 조개는 센 불로 가열하면 가끔 퍽! 하고 폭발하기도 해서……"
1009703-28 = "3;모에 수영복;11;언제 폭발할지 모르는 식재료를 앞에 두고 요리를 하고 있노라면, 묘한 긴장감이 신경을 자극해서…… 흥분이 멈추질 않아! 하아, 하아……\n#3;em;[한숨]"
1009703-29 = "[s] \"마구 폭발한다는 게 조개껍질의 이야기였구나……\""
1009703-30 = "#st;[0,0];instant;1;"
1009703-31 = "#clearST"
1009703-32 = "#wait;1000"
1009703-33 = "[ns3] \"조개를 폭발하지 않게 조리하는 건 간단해.\"\n[ns4] \"불을 약하게 해서 조개가 입을 천천히 벌리게 하면—\""
1009703-34 = "#wait;100"
1009703-35 = "#wait;100"
1009703-36 = "3;모에 수영복;05;그 무슨 말법!\n#3;em;[!]\n#fontsize;80"
1009703-37 = "3;모에 수영복;12;조개를 약불에 굽는다니. 그게 무슨 말도 안 되는 소리야, 선생님?"
1009703-38 = "3;모에 수영복;13;약불로 입을 천천히 벌리게 하면 폭발은 막을 수 있을지 몰라도 내부의 수분이 모두 날아가서 살이 질겨진다고!"
1009703-39 = "3;모에 수영복;12;폭발을 두려워해서는 제대로 된 미식을 즐길 수 없어."
1009703-40 = "3;모에 수영복;05;맛있는 음식에는…… 언제나 폭발이 뒤따르는 법이니까!\n#3;jump"
1009703-41 = "[s5] \"이상하게 묘한 설득력이……\"\n[s6] (다른 의미의 같은 말을 누가 한 것 같은데……?)"
1009703-42 = "#wait;100"
1009703-43 = "#wait;100"
1009703-44 = "3;모에 수영복;02;아, 말하는 사이에 준비한 조개가 어느 정도 익었네."
1009703-45 = "3;모에 수영복;03;자, 선생님도 하나 먹어 봐. 바닷물이 스며들어서 간을 하지 않아도 맛있을 거야.\n#3;greeting"
1009703-46 = "[s7] \"아, 정말이다……\"\n[s8] \"신선한 조개의 향에 적당한 짠맛이 어우러져서 좋네.\""
1009703-47 = "#wait;100"
1009703-48 = "#wait;100"
1009703-49 = "3;모에 수영복;02;후후, 그렇지?\n#3;em;[음표]"
1009703-50 = "3;모에 수영복;00;조개가 워낙 신선해서 제대로 된 풍미를 느끼려면 오히려 양념을 하지 않는 편이 좋을 것 같더라고."
1009703-51 = "[s9] \"하지만 조개만 먹기는 조금 심심한데……\"\n[s10] \"다른 식재료는 혹시 없어?\""
1009703-52 = "#wait;100"
1009703-53 = "#wait;100"
1009703-54 = "3;모에 수영복;02;사실 디저트로 먹을까 해서 준비해 온 게 하나 더 있는데……"
1009703-55 = "3;모에 수영복;03;바로…… 냉동 찹쌀떡이야!"
1009703-56 = "[s] \"냉동된 찹쌀떡……?\""
1009703-57 = "3;모에 수영복;02;응. 주민분들이 전에 찌고 남은 떡을 얼려 두었다고 몇 개 나누어 주셨는데……"
1009703-58 = "3;모에 수영복;00;우와. 얼음이 잔뜩 낀 것이 수분을 잔뜩 머금은 채로 냉동된 것 같네.\n#3;greeting"
1009703-59 = "#st;[0,0];instant;1;"
1009703-60 = "#clearST"
1009703-61 = "3;모에 수영복;00\n#3;em;…\n#wait;2500"
1009703-62 = "3;모에 수영복;07;만약 이걸 뜨거운 불 위에 바로 굽는다면……"
1009703-63 = "[s] \"잠깐만, 모에! 멈춰!\""
1009703-64 = "#all;hide"
1009703-65 = "#st;[0,0];instant;1;"
1009703-66 = "#clearST"
1009703-67 = "#wait;1000"
1009703-68 = "#wait;1500"
1009703-69 = "#wait;3500"
1009703-70 = "3;모에 수영복;09;아아…… 아아아……"
1009703-71 = "3;모에 수영복;07;냉동된 떡이 갑작스럽게 부풀면서…… 수류탄 파편처럼 튀어 오르고 있어……"
1009703-72 = "#st;[0,0];instant;1;"
1009703-73 = "#clearST"
1009703-74 = "#wait;2500"
1009703-75 = "3;모에 수영복;99;거기에 덜 구워진 조개껍질이 센불에 폭발하는 소리까지……"
1009703-76 = "3;모에 수영복;10;하아, 하아…… 바로 이거야……!"
1009703-77 = "3;모에 수영복;11;숯불 위에서 파멸의 향이 가득 피어오르고 있어……!"
1009703-78 = "[s] \"조개랑 떡을 굽는 향이거든?!\""
1009703-79 = "#all;hide"
1009703-80 = "#na;(이후, 모에와 함께 폭발하는 조개와 떡을 피해 가며 다소 소란스러운 식사를 즐겼다.)"

[translation]
1009703-1 = "Close-by Danger"
1009703-2 = "After receiving Moe's message, I came running over to stop the explosion."
1009703-7 = "[ns] \"Moe, are you okay?!\""
1009703-8 = "Sensei. I didn't think you'd get here so fast."
1009703-9 = "Did you run all the way here? You're totally out of breath..."
1009703-10 = "[s1] \"Of course! Something dangerous could have happened!\"\n[s2] \"Never mind me. What about the explosion?\""
1009703-13 = "Explosion...?"
1009703-14 = "Oh, you misunderstood me."
1009703-15 = "The explosion hasn't started yet. To be more clear...it's in progress."
1009703-16 = "[s] \"In progress? Where...?\""
1009703-20 = "[ns] \"What's exploding?!\""
1009703-21 = "Ah, that sound..."
1009703-22 = "Clams taste best when they're grilled over high heat!"
1009703-23 = "[s] \"Clams...?\""
1009703-24 = "Yeah, I was grilling clams over charcoal."
1009703-25 = "I went to the dock this afternoon and helped the locals clear off some barnacles. They gave me a bunch of clams as a \"thank you.\""
1009703-26 = "Fresh clams also taste great when you boil them, or serve them up in soup, but for any seafood, grilling over high heat is the best way to go!"
1009703-27 = "On top of that, when you cook clams this way, sometimes they'll explode with a big \"pop\"..."
1009703-28 = "Cooking with ingredients that can explode at any time? Real exciting stuff! *pant* *pant*"
1009703-29 = "[s] \"That's the explosion you were talking about...\""
1009703-33 = "[ns3] \"You CAN cook them without them exploding.\"\n[ns4] \"You know, if you lower the heat, they'll slowly open up!\""
1009703-36 = "Bah, what're you even talking about?"
1009703-37 = "Cooking clams over low heat? Who does that, Sensei?"
1009703-38 = "I mean, yeah, if they open slowly, they won't explode, but all the moisture will evaporate, and the meat'll come out super-tough!"
1009703-39 = "If you're afraid of a little explosion, you won't get the true experience."
1009703-40 = "It's not delicious unless it goes boom!"
1009703-41 = "[s5] \"That's strangely convincing...\"\n[s6] \"(That sounds oddly familiar, and yet so different...)\""
1009703-44 = "While we were talking, the clams finished cooking."
1009703-45 = "Here, Sensei, try one. It doesn't even need any seasoning, since the seawater seeped in."
1009703-46 = "[s7] \"Wow, you're right!\"\n[s8] \"It's fresh, it's just salty enough... This is perfect!\""
1009703-49 = "Heehee, right?"
1009703-50 = "The clams are so fresh that it's actually better to not season them, and just savor the natural flavor."
1009703-51 = "[s9] \"But eating clams by themselves does feel a little plain...\"\n[s10] \"Do you have any other ingredients?\""
1009703-54 = "Actually, I did bring something else for dessert..."
1009703-55 = "It's...frozen mochi!"
1009703-56 = "[s] \"Frozen mochi...?\""
1009703-57 = "Yeah, the locals froze some mochi and gave me the leftovers..."
1009703-58 = "Wow, it's covered in frost. It must have been frozen while it was moist."
1009703-62 = "But if we cook it over a hot fire..."
1009703-63 = "[s] \"Wait, Moe! Stop!\""
1009703-70 = "Ohh... Ohhh..."
1009703-71 = "The frozen mochi's swelling up...and popping like grenade shrapnel..."
1009703-75 = "Between that and the exploding clams..."
1009703-76 = "*pant* *pant* This is it...!"
1009703-77 = "The scent of destruction rising over the charcoal flames...!"
1009703-78 = "[s] \"It's the scent of clams and mochi!\""
1009703-80 = "Afterwards, I enjoyed a rather chaotic meal with Moe, dodging the exploding clams and mochi all the while."

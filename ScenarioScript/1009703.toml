[translation]
1009703-1 = "Danger Close"
1009703-2 = "(คุณครูได้รับข้อความจากโมเอะ จึงรีบออกไปหาโมเอะตามพิกัดที่บอกเพื่อช่วยหยุดระเบิด)"
1009703-7 = "[ns] \"โมเอะ เป็นยังไงบ้าง?!\""
1009703-8 = "อ๊ะ คุณครู มาเร็วกว่าที่คิดอีกนะ"
1009703-9 = "คุณครูวิ่งมาเลยเหรอเนี่ย หอบลิ้นห้อยเลยแฮะ..."
1009703-10 = "[s1] \"ครูต้องรีบมาอยู่แล้ว ก็มันอาจเกิดเรื่องใหญ่ได้นี่นา!\"\n[s2] \"ว่าแต่ระเบิดหยุดไปแล้วเหรอ? หรือยังไม่ได้ระเบิด?\""
1009703-13 = "ระเบิด...?"
1009703-14 = "อ่า... เข้าใจคำนั้นผิดสินะ"
1009703-15 = "ยังไม่ระเบิดหรอก ถ้าจะพูดให้เข้าใจ... ต้องบอกว่าอยู่ระหว่างเตรียมการน่ะ"
1009703-16 = "[s] \"ระหว่างเตรียมการ? ไหนเหรอ...\""
1009703-20 = "[ns] \"มีอะไรระเบิดงั้นเหรอ?!\""
1009703-21 = "อื้อ ก็ตามเสียงที่ได้ยินเลย..."
1009703-22 = "หอยก็ต้องย่างด้วยไฟแรงแบบนี้แหละถึงจะอร่อย!"
1009703-23 = "[s] \"หอย...?\""
1009703-24 = "อื้อ ฉันกำลังย่างหอยด้วยถ่านอยู่น่ะ"
1009703-25 = "เมื่อกี้ฉันไปท่าเรือแล้วก็ช่วยชาวบ้านแกะเพรียงออกจากหอยมา พวกเขาก็เลยแบ่งหอยให้ฉันมา#nเพียบเลย"
1009703-26 = "ที่จริงหอยสดๆ แบบนี้แค่เอาไปต้มหรือใส่ในแกงก็อร่อยแล้ว... แต่ถ้าจะให้อาหารทะเลมีรสชาติดีที่สุด#nก็ต้องย่างด้วยไฟแรงแบบนี้ละ!"
1009703-27 = "แถมบางทีเวลาหอยเจอไฟแรงๆ ก็จะระเบิดปุ้งปั้งด้วย..."
1009703-28 = "เวลาฉันนั่งดูวัตถุดิบที่ไม่รู้ว่าจะระเบิดออกมาเมื่อไรอยู่เหมือนตอนนี้ละก็ ความประหม่าที่อธิบายได้#nยากจะกระตุ้นประสาท... จนทำให้ฉันตื่นเต้นไม่หายเลย! แฮ่ก แฮ่ก..."
1009703-29 = "[s] \"ที่บอกว่าระเบิดเมื่อกี้ก็คือเปลือกหอยนี่สินะ...\""
1009703-33 = "[ns3] \"มีวิธีง่ายๆ ที่จะไม่ทำให้หอยระเบิดนะ\"\n[ns4] \"ถ้าย่างด้วยไฟอ่อนๆ ให้หอยค่อยๆ อ้าปากละก็...\""
1009703-36 = "พูดอะไรน่ะ!"
1009703-37 = "จะย่างหอยด้วยไฟอ่อนได้ยังไง แบบนั้นไม่เข้าท่าเลยนะคุณครู"
1009703-38 = "ถ้าใช้ไฟอ่อนๆ ย่างให้หอยค่อยๆ อ้าปากออก ถึงจะป้องกันไม่ให้เกิดระเบิดได้ แต่ความชุ่มฉ่ำภายใน#nจะหายไปหมด แล้วเนื้อก็จะเหนียวด้วย!"
1009703-39 = "ถ้ากลัวระเบิด เราก็อดลิ้มรสของอร่อย"
1009703-40 = "อาหารอร่อยๆ น่ะ... ย่อมมาจากการระเบิด!"
1009703-41 = "[s5] \"มีความสามารถในการโน้มน้าวแปลกๆ นะเนี่ย...\"\n[s6] (เหมือนได้ยินคำคล้ายๆ กันมาจากใครเลย...)"
1009703-44 = "อ๊ะ ระหว่างที่เราพูดกันอยู่ หอยที่เตรียมมาก็สุกประมาณหนึ่งแล้วแฮะ"
1009703-45 = "เอ้านี่ คุณครูก็ลองกินดูสิ หอยทะเลมีรสชาติจากน้ำทะเลด้วย ไม่ต้องปรุงรสก็อร่อย"
1009703-46 = "[s7] \"อ่า จริงอย่างที่ว่าเลยนะ...\"\n[s8] \"รสเค็มพอดีๆ เข้ากับกลิ่นหอมจากหอยสดๆ จังเลย\""
1009703-49 = "ฮุฮุ ใช่มั้ยล่ะ?"
1009703-50 = "ถ้าอยากได้รสชาติแท้ๆ ของหอยสดๆ แบบนี้ เราต้องไม่ใส่เครื่องปรุงอะไรเลยแบบนี้ละ"
1009703-51 = "[s9] \"แต่ถ้ากินหอยอย่างเดียวมันก็น่าเบื่อนิดหน่อยนะ...\"\n[s10] \"มีของกินอย่างอื่นด้วยมั้ย?\""
1009703-54 = "ที่จริงฉันก็มีของหวานเตรียมมาอยู่หรอกนะ..."
1009703-55 = "นั่นก็คือ... โมจิแช่แข็ง!"
1009703-56 = "[s] \"โมจิแช่แข็ง...?\""
1009703-57 = "อื้อ ชาวบ้านบอกว่ามีโมจิที่เหลือจากคราวก่อนแช่ไว้อยู่ ก็เลยแบ่งมาให้ฉันนิดหน่อยน่ะ..."
1009703-58 = "ว้าว เหมือนจะแช่แข็งมานานเลยนะเนี่ย ดูสิ รอบๆ เป็นน้ำแข็งเลย แบบนี้ข้างในยังต้องชุ่มชื้นอยู่แน่ๆ"
1009703-62 = "ถ้าเราเอามาย่างด้วยไฟร้อนๆ ละก็..."
1009703-63 = "[s] \"เดี๋ยวก่อน โมเอะ! สต็อป!\""
1009703-70 = "อ่า... อ่าาา..."
1009703-71 = "จู่ๆ โมจิแช่แข็งก็พองออกมา... แล้วก็กระเด็นเหมือนเศษระเบิดมือเลย..."
1009703-75 = "เสียงโมจิแช่แข็งย่างผสานกับเสียงหอยย่างถ่านระเบิด..."
1009703-76 = "แฮ่ก... แฮ่ก... แบบนี้ละ...!"
1009703-77 = "กลิ่นหอมแห่งความพินาศลอยฟุ้งขึ้นมาจากถ่าน...!"
1009703-78 = "[s] \"กลิ่นของหอยกับโมจิย่างต่างหาก!\""
1009703-80 = "(หลังจากนั้นคุณครูก็ต้องคอยหลบการระเบิดของหอยและโมจิย่าง แต่ก็ได้กินอาหารมื้อที่ตื่นเต้นนี้#nอย่างเพลิดเพลิน)"

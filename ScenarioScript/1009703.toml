[translation]
1009703-1 = "Danger Close"
1009703-2 = "（收到萌的訊息後，為了阻止爆炸而急忙跑到了他說的地點）"
1009703-7 = "[ns]「萌，你沒事吧！？」"
1009703-8 = "啊，老師，來的比我想像中還快呢。"
1009703-9 = "先不說這個了，你是跑來的嗎？#n看起來很喘耶……"
1009703-10 = "[s1]「那當然，可能會出大事的耶！」\n[s2]「話說爆炸結束了嗎？還是還沒開始？」"
1009703-13 = "爆炸……？"
1009703-14 = "啊啊，那是你誤會了。"
1009703-15 = "爆炸還沒結束哦。#n如果硬要說的話……應該說還在進行中？"
1009703-16 = "[s]「進行中？在哪裡……」"
1009703-20 = "[ns]「什麼爆炸了！？」"
1009703-21 = "啊啊，就是這個聲音……"
1009703-22 = "蛤蜊果然就是要用大火烤才好吃！"
1009703-23 = "[s]「蛤蜊……？」"
1009703-24 = "嗯，我正在用炭火烤蛤蜊。"
1009703-25 = "剛才我到碼頭附近幫居民清除藤壺，結果他們分給我很多蛤蜊。"
1009703-26 = "雖然新鮮蛤蜊不管用煮的還是放到湯裡都很好吃……#n但海鮮果然還是用大火烤最讚了！"
1009703-27 = "而且用大火加熱蛤蜊的話，有時候會發出「碰！」的爆炸聲……"
1009703-28 = "在不知道什麼時候會爆炸的食材前做料理……#n這股微妙的緊張感能刺激神經……讓人興奮不已！哈啊，哈啊……"
1009703-29 = "[s]「原來你說的爆炸指的是蛤蜊啊……」"
1009703-33 = "[ns3]「不想讓蛤蜊爆炸的方法很簡單。」\n[ns4]「只要用小火讓蛤蜊慢慢打開就行了──」"
1009703-36 = "那怎麼行！"
1009703-37 = "居然用小火烤蛤蜊……你在開玩笑嗎，老師？"
1009703-38 = "那種作法也許能防止爆炸沒錯，但是也會因為水分蒸發的關係導致肉變硬的！"
1009703-39 = "如果害怕爆炸，就不能享受到真正的美食。"
1009703-40 = "因為美味的食物……總是伴隨著爆炸！"
1009703-41 = "[s5]「莫名還挺有說服力的……」\n[s6] （怎麼好像在哪裡聽過類似的話……？）"
1009703-44 = "啊，說著說著蛤蜊也差不多熟了呢。"
1009703-45 = "來，老師也吃一個看看吧。#n因為浸過海水的關係，不用調味也很好吃。"
1009703-46 = "[s7]「啊，真的耶……」\n[s8]「新鮮蛤蜊的香味和適中的鹹味相融，真棒。」"
1009703-49 = "呵呵，對吧？"
1009703-50 = "如果想感受新鮮蛤蜊的原味，不調味反而比較好。"
1009703-51 = "[s9]「可是只吃蛤蜊有點無聊……」\n[s10]「沒有其他食材嗎？」"
1009703-54 = "其實我也準備了用來當甜點的東西……"
1009703-55 = "那就是……冷凍年糕！"
1009703-56 = "[s]「冷凍年糕……？」"
1009703-57 = "嗯，居民們之前分給我們一些蒸過的冷凍年糕……"
1009703-58 = "嗚哇，結了滿滿的冰。#n看來應該是在含有很多水分的狀態下冷凍的。"
1009703-62 = "如果直接把這個放在熱火上烤……"
1009703-63 = "[s]「等等，萌！住手！」"
1009703-70 = "啊……啊啊啊……"
1009703-71 = "冷凍的年糕突然膨脹……像手榴彈的碎片一樣四處噴濺……"
1009703-75 = "加上還沒烤熟的蛤蜊在大火中發出的爆裂聲……"
1009703-76 = "哈啊，哈啊……就是這個……！"
1009703-77 = "從炭火中升起強烈的毀滅香味……！"
1009703-78 = "[s]「明明就是烤蛤蜊和年糕的香味好不好！？」"
1009703-80 = "（之後和萌一起躲著蛤蜊和年糕的爆炸，享用了略顯吵鬧的一餐）"

10038070-141 = "3;키사키;02;그래. 원숭이 손에 소원을 빌었더니, 소원은 이루어졌지만, 그 소원이 아주 비틀린 방식으로 이루어졌다는 이야기지."
10038070-142 = "3;키사키;01;목적은 달성했으나, 그 과정이 너무 좋지 않은 데다, 대가 역시 가혹할 때 사용하는 비유이기도 하다."

10038070-122 = "3;키사키;00;물론 단약으로…… 말썽…… 을 일으킨다는 점만 두고 보면, 사야 역시 사고뭉치인 것은 마찬가지이다만…….\n#3;em;…\n#3;a"
10038070-123 = "3;키사키;08;사야가 추구하는 것은 본질적으로 단약을 복용한 사람이 행복하기를 바란 것이었지."
10038070-124 = "3;키사키;01;그 증거로 사야는 부작용이 발생한 사람이 원하면 언제나 해독약을 대가 없이 마련해 주었다."
10038070-125 = "3;키사키;02;불로불사란 결국 세상의 이치를 거스르는 일. 그렇기에 필연적으로 부작용은 따르는 법이기에……."
10038070-126 = "3;키사키;08;어쩌면 사야는 대가 없는 행복은 존재할 수 없다는 걸, 이미 깨달았던 것인지도 모르겠구나.\n#3;em;[한숨]"

[translation]
10038070-1 = "第7話;到了那裡，是否就能遇見麒麟？"
10038070-7 = "好，到了唷，老師。#n這裡就是我們玄武商會的……祕密基地。"
10038070-8 = "老師能平安來到這裡真是太好了……"
10038070-9 = "[s]「這都多虧了美奈和令女。」"
10038070-10 = "別這麼說。多虧有老師您適當的指示，我們才能順利行動。"
10038070-11 = "美奈執行部長是嗎？請您不用擔心。#n他因為過度勞累而正在熟睡。"
10038070-12 = "比起這個……門主大人您還好嗎？"
10038070-14 = "……給汝等添麻煩了。實在抱歉。"
10038070-15 = "不會不會！這點小事不算什麼！#n要多麻煩我們也沒問題哦！"
10038070-16 = "……是嗎。"
10038070-20 = "……"
10038070-21 = "妃姬差點就出大事了對吧？#n就差一點點……"
10038070-23 = "光是申谷誡的回歸就已經非常不得了了……"
10038070-28 = "……"
10038070-30 = "這個話題就先說到這裡……那麼！我們先回商會去吧！"
10038070-35 = "什麼？可是門主大人……？"
10038070-36 = "所以才要回去呀。"
10038070-37 = "我不太明白您的意思……？"
10038070-38 = "好了，快點快點。"
10038070-39 = "會，會長？請不要這麼勉強……#n而且考慮到會長的狀態，現在應該是我的力氣比較大才對……會長？會長？"
10038070-45 = "[ns]「走掉了呢……」"
10038070-46 = "……是啊。"
10038070-47 = "[s]「那個，妃姬？你還好嗎？」"
10038070-51 = "……不成問題。"
10038070-52 = "[s]「嗯……」"
10038070-55 = "（尷尬的沉默壟罩著屋內）"
10038070-59 = "（妃姬則始終低頭望著地面……）"
10038070-63 = "[ns]「能告訴我關於誡的事嗎？」"
10038070-67 = "關於申谷誡……是嗎？"
10038070-68 = "那是個無謂的提問啊，老師。#n不過是些早已過去的事罷了……"
10038070-72 = "……"
10038070-73 = "還記得先前談過的事嗎？"
10038070-74 = "一年前……妾身剛就任門主時下達的第一道命令。"
10038070-75 = "[s]「你是說讓某個三年級生退學的事嗎？」"
10038070-76 = "沒錯。汝想必已心裡有數才對，那個三年級生就是……"
10038070-77 = "[s]「是誡吧。」"
10038070-78 = "是的……"
10038070-81 = "當時妾身也說過，這項決定引發了許多反對。"
10038070-82 = "程序和過程，公平性和合理性。#n即便就結果而言是正確的決定，依然有人認為應該遵守規則……"
10038070-83 = "然而，那也許只是妾身自己的判斷而已。"
10038070-88 = "一言既出，駟馬難追。"
10038070-91 = "……申谷誡想成為仙人。"
10038070-92 = "為了領悟更高的境界，誡試圖製造仙丹……#n同時以製作長生不老藥的名義，號召了許多學生。"
10038070-93 = "並讓他們服下了可疑的丹藥。"
10038070-102 = "甚至還有對他的力量著迷的部分學生，請求誡製作具有特殊功效的丹藥。"
10038070-104 = "那些丹藥，雖然短期內的效果顯著……"
10038070-105 = "然而若是長期服用，將對身體造成巨大的負擔與痕跡。"
10038070-118 = "例如提供給想在體育方面留下好成績學生的丹藥……#n雖然能使身體能力獲得短暫提升，卻會對人體的新陳代謝留下嚴重的障礙。"
10038070-119 = "提供給想體驗新口味學生的丹藥則改變了味覺，#n使其再也無法與他人口中的美食產生共鳴。"
10038070-122 = "當然……光就丹藥引起的麻煩而言，沙耶在這方面也不遑多讓……"
10038070-123 = "不過沙耶真正追求的，是能讓服用丹藥之人獲得幸福。"
10038070-124 = "其證據就是沙耶總是會為產生副作用之人無償提供解藥。"
10038070-125 = "長生不老本就是違背自然法則之事，因此副作用也必然存在……"
10038070-126 = "也許沙耶早已明白，沒有代價的幸福是不存在的吧。"
10038070-130 = "但誡他……並非如此。對誡而言重要的僅有結果。#n為了成為仙人，即便走上旁門左道也在所不惜。"
10038070-131 = "為此甚至向那些尋求解藥的學生提出無法拒絕的交易，要求對方服從他的命令。"
10038070-132 = "而那些請求誡製作丹藥的學生，最終不得不對誡唯命是從，陷入了宛如奴隸的處境。"
10038070-133 = "……對玄龍門而言，這不是件好事。"
10038070-134 = "畢竟這相當於在山海經內部，出現了一個不服從玄龍門權威的勢力。"
10038070-135 = "[s]「那不是非常危險嗎！？」"
10038070-140 = "汝知道「猴爪」的故事嗎，老師？"
10038070-141 = "向猴爪許下的願望雖得以實現，然其實現方式將十分扭曲。"
10038070-142 = "亦可稱之為雖能達成目的，但其過程與代價將十分慘烈的一種比喻。"
10038070-144 = "同時……這也是申谷誡的外號之一。"
10038070-145 = "也許這不過是妾身個人的短見。"
10038070-146 = "但當時妾身認為若對誡置之不理，將可能對山海經的根基產生動搖。"
10038070-147 = "無論哪所學園，要讓一名學生退學都不容易。"
10038070-148 = "對於害怕變化與例外的山海經而言……則更是如此。"
10038070-149 = "呵呵。若是遵從正常的程序，誡恐怕在退學之前就已經畢業了。"
10038070-152 = "因此妾身才會下達前所未有的即刻驅逐令。"
10038070-153 = "同時還完全抹去了有關誡的記錄，防止任何人模仿其犯罪行為。"
10038070-155 = "……現在想來，這或許是妾身自己造下的業。"
10038070-162 = "誡有權怨恨妾身。沒錯，他當然有。"
10038070-163 = "是妾身讓誡心生歹念、執意復仇、充滿怨懟。#n這一切都是妾身造成的。"
10038070-168 = "如今妾身正在品嘗的，便是自己當時為了大局犧牲小節所種下的惡果。"
10038070-171 = "妾身不會為此辯解，老師。#n那樣未免過於卑劣了。"
10038070-172 = "是妾身的行為與決定，造就了如今傷害山海經的怪物「誡」……"
10038070-176 = "他所說的確實沒錯。#n無論花朵散落、洪水氾濫，還是天打雷劈……"
10038070-177 = "承擔所有責任，不做任何辯解──這就是山海經的門主。"
10038070-181 = "[ns]「或許是這樣沒錯，不過我有不同的看法。」"
10038070-185 = "……此話怎說，老師？"
10038070-186 = "[s1]「妃姬只是以門主的身分做出了選擇而已。」\n[s2]「誡也應該為自己的行為負責才對。」"
10038070-189 = "是誡自己選擇成為現在的模樣……？"
10038070-190 = "可是……"
10038070-191 = "[s3]「有些事情確實很難簡單說清楚。」\n[s4]「就像山海經的過去一樣。」"
10038070-194 = "……"
10038070-195 = "[s5]「但是，我們都不能忘記──」\n[s6]「我們必須為我們的現在負起責任。」"
10038070-198 = "可是……"
10038070-199 = "[s7]「就連此時此刻也會成為過去。」\n[s8]「正因如此，我們才更應該全力以赴地生活。」"
10038070-202 = "這又是為什麼呢……？"
10038070-207 = "[ns9]「如此一來，回顧此時此刻的那天──」\n[ns10]「我們才能給出無愧於心的答案。」"
10038070-211 = "這就是……不應忘卻過去與傳統的原因嗎？"
10038070-212 = "原來如此……也可以這麼思考啊。"
10038070-213 = "……"
10038070-217 = "有些山海經的學生，對妾身仍心存疑慮。"
10038070-218 = "因為自始至終，名為龍華妃姬的門主便與山海經的傳統相去甚遠。"
10038070-219 = "……"
10038070-223 = "老師，汝知道山海經高級中學是被外界如何看待的嗎？"
10038070-224 = "許多人甚至連山海經位於何處都不清楚。#n與三大學園相比，更是顯得可笑。"
10038070-225 = "要說有什麼廣為人知的事，恐怕也僅只於玄武商會的料理相當美味吧。"
10038070-226 = "眾人都將吾等視為堅守傳統的怪人。"
10038070-227 = "而妾身……對此並不樂見。#n也不希望山海經的學生被外界如此對待。"
10038070-228 = "呵呵……與老師的談話，總是能為妾身帶來新的啟發呢。"
10038070-229 = "認為妾身所言略顯誇大？#n哎呀。或許老師也該更加了解自己比較恰當呢。"
10038070-233 = "……"
10038070-234 = "現在該如何是好，妾身似乎稍有頭緒了。"
10038070-235 = "真是感謝不盡，老師。#n不過妾身還有一個請求。"
10038070-239 = "月影祭將會如期舉行。"
10038070-240 = "而在慶典到來之前……能再幫妾身一點忙嗎？"
10038070-241 = "[s]「遵從門主大人指示。」"
10038070-242 = "呵呵……非常感謝。"
10038070-250 = "[ns]「妃，妃姬？門主大人！？」"
10038070-252 = "何必大驚小怪？不過是背一下而已。"
10038070-253 = "這便是妾身的第一道命令。#n稍微……維持這個狀態一會吧。"
10038070-263 = "妃姬，老師！現在方便嗎？#n玄武商會的成員有話要……說……？"
10038070-268 = "……！？"
10038070-269 = "[s]「！？」"
10038070-274 = "你，你們兩個在做什麼！？"
10038070-276 = "這，這是……那個……！"
10038070-277 = "[s]「沒什麼！什麼都沒發生！對吧妃姬？」"
10038070-282 = "我也要讓老師背我！"
10038070-283 = "汝在意的是這個嗎！"
10038070-291 = "咳，咳哼。那麼我們繼續吧。#n玄武商會的成員有話要說，所以我就把他們帶來了。"
10038070-292 = "哦……？這可真罕見。#n玄武商會的成員應該是汝的員工才是。"
10038070-293 = "然而卻特地來找妾身？還由汝親自帶來……？"
10038070-294 = "哎呀哎呀～見了面你就知道了。#n大家都進來吧！"
10038070-306 = "唔嗯……找妾身有何事？說來聽聽吧。"
10038070-314 = "玄龍門，拜見門主大人！"
10038070-319 = "……！？#n這是怎麼回事……？"
10038070-320 = "哈哈哈！嚇到了吧？#n玄龍門的孩子們說，就算是偷偷摸摸地也想見妃姬一面！"
10038070-321 = "但玄龍門的成員，如果在被管制的玄武商會裡亂晃又有點奇怪吧？#n這樣可能會引發各種懷疑。"
10038070-322 = "所以我就讓他們都偽裝成我們的人了！"
10038070-327 = "玄龍門……以及山海經都需要門主大人。#n這就是我們得出的結論。"
10038070-328 = "現在由強硬派主導的玄龍門，無論核心還是初心都搖擺不定……"
10038070-329 = "甚至還將主導權讓給了鍊丹術研究會，導致完全無法履行學生會的職責！"
10038070-330 = "我們會一直追隨門主大人。#n無論門主大人做出什麼決定，我們都會全力支持與輔佐！"
10038070-335 = "玄龍門──隨時恭候門主大人差遣！"
10038070-340 = "……是嗎。"
10038070-341 = "……"
10038070-347 = "從古至今，山海經始終試圖將一切束縛在過去。"
10038070-348 = "與從過去的教訓有所斬獲相比，更傾向遵循過往的規範──將服從置於判斷之前。"
10038070-349 = "但是「欲窮千里目，更上一層樓」。#n應當腳踏實地，以自己的雙眼仰望天空才是。"
10038070-352 = "吾等皆須為吾等的現在負起責任。#n故應盡人事，聽天命。"
10038070-353 = "畏懼一切將只會一無所獲，徬徨之人未必會迷失方向。"
10038070-354 = "那麼現在──"
10038070-359 = "前去奪回吾等的山海經吧。"

10038070-269 = "[s] \"!?\""
10038070-274 = "ทั้งสองคนทำอะไรกันอยู่น่ะ?!"
10038070-276 = "ระ... เรื่องนั้น... คือว่า...!"
10038070-277 = "[s] \"ไม่มีอะไรหรอก! ไม่ได้ทำอะไรเลย! ใช่มั้ย คิซากิ?\""
10038070-282 = "ฉันก็อยากขี่หลังคุณครูบ้างนะ!"
10038070-283 = "เช่นนั้นหรือ!"
10038070-291 = "อะ... อะแฮ่ม ฉันจะพูดอีกครั้งแล้วกัน สมาชิกย่านการค้าเทพเต่าดำมีเรื่องอยากจะบอก ฉันก็เลยพามา#nที่นี่น่ะ..."
10038070-292 = "หืม...? เรื่องแบบนี้ไม่ได้มีบ่อยๆ เลยนะ สมาชิกของย่านการค้าเทพเต่าดำคือคนของเธอไม่ใช่หรือ?"
10038070-293 = "เหตุใดถึงได้มีเรื่องที่อยากบอกกับเราล่ะ? แล้วเธอยังพามาด้วยตัวเองอีก...?"
10038070-294 = "อะ... เอาเถอะน่า พอเจอกันเดี๋ยวก็รู้เองนั่นแหละ ทุกคนเข้ามาได้!"
10038070-306 = "อะ... อืม... มีเรื่องอะไรหรือ? บอกเรามาได้เลย"
10038070-314 = "พวกเรามังกรดำ มาพบท่านประมุขค่ะ!"
10038070-319 = "นี่มันเรื่องอะไรกัน...?!"
10038070-320 = "ฮ่าฮ่าฮ่า! ตกใจเลยล่ะสิ? ก็มังกรดำบอกว่าอยากเจอคิซากิน่ะ ต่อให้ต้องเจอแบบลับๆ ก็เถอะ!"
10038070-321 = "แต่ถ้าจะให้มังกรดำมาเดินป้วนเปี้ยนอยู่ในย่านการค้าเทพเต่าดำที่ตัวเองควบคุมอยู่ มันก็จะแปลกๆ ใช่มั้ยล่ะ? ถ้าทำแบบนั้น อาจจะตกเป็นเป้าสงสัยได้ด้วย"
10038070-322 = "ฉันก็เลยปลอมตัวให้ทุกคนเป็นคนของย่านการค้า แล้วก็พาเข้ามาที่นี่ยังไงล่ะ!"
10038070-327 = "มังกรดำ... และซานไห่จิงต้องการท่านประมุขค่ะ นี่คือข้อสรุปจากพวกฉันค่ะ"
10038070-328 = "ตอนนี้มังกรดำถูกนำโดยพวกอนุรักษ์นิยมหัวรุนแรง และพวกนั้นก็กำลังสั่นคลอนแก่นแท้ และจุดมุ่งหมายเดิมของเราอยู่ค่ะ..."
10038070-329 = "เหนือสิ่งอื่นใด พวกนั้นให้อำนาจในการเป็นผู้นำกับชมรมวิจัยศาสตร์การปรุงยา และไม่ทำหน้าที่ของ#nตัวเองในฐานะสภานักเรียนค่ะ"
10038070-330 = "พวกฉันจะติดตามและภักดีกับท่านประมุขไปตลอดค่ะ จะสนับสนุนทุกการตัดสินใจของท่านประมุข และจะพยายามอย่างเต็มที่เพื่อช่วยเหลือท่านประมุขค่ะ!"
10038070-335 = "มังกรดำพร้อมที่จะรับคำสั่งของท่านประมุขอีกครั้งแล้วค่ะ!"

10038070-242 = "ฮุฮุ... ขอบคุณนะ"
10038070-250 = "[ns] \"ทะ... ท่านประมุข? คิซากิ?!\""
10038070-252 = "ทำไมหรือ? เราแค่ขอขึ้นมาขี่หลังเอง?"
10038070-253 = "นี่คือคำสั่งแรกของเรา ช่วยยืนอยู่แบบนี้... ต่ออีกสักหน่อยนะ"
10038070-263 = "คิซากิ คุณครู! ตอนนี้ขอคุยด้วยได้ใช่มั้ย? พอดีสมาชิกย่านการค้าเทพเต่าดำมีเรื่องอยากจะบอกน่ะ..."

10038070-130 = "3;키사키;05;그러나 카이는…… 그렇지 않았다. 카이에게 중요한 것은 오직 결과였지. 선인이 될 수 있다면 외도를 걷는 것도 서슴지 않았다."
10038070-131 = "3;키사키;11;심지어 해독약을 원하는 학생들에게, 해독약을 받고 싶다면, 자신의 명령에 복종하라는 식으로 거부할 수 없는 거래를 제안하곤 했다."
10038070-132 = "3;키사키;05;그렇게 카이에게 단약의 제조를 부탁한 학생들은, 종국에는 노예 비슷한 처지가 되어, 카이가 하는 말이라면 무엇이든 따라야 하는 처지가 되어야 했다.\n#3;stiff"
10038070-133 = "3;키사키;08;……현룡문에게 있어서도 그것은 좋은 일이 아니었다."
10038070-134 = "3;키사키;00;아무튼 산해경 내에서 현룡문의 권위를 따르지 않는, 또 다른 세력이 생겨나는 것이나 마찬가지였으니 말이다.\n#3;m3"

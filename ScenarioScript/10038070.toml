10038070-118 = "#na;키사키;가령 체육에서 좋은 성적을 내고 싶어 하는 학생에게 내준 단약은 일시적으로 신체 능력을 향상시켜 주었지만, 그 후 인체 대사에 큰 장애를 일으켰고."
10038070-119 = "#na;키사키;새로운 맛을 경험하고 싶다는 학생에게 준 단약은 미각을 변하게 하여 타인의 미식에 공감할 수 없게 만들었다."

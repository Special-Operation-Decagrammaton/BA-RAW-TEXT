10038070-145 = "3;키사키;08;이 역시 나의 짧은 판단에 지나지 않았을지도 모르는 일이지만.\n#3;em;[한숨]"
10038070-146 = "3;키사키;01;그때의 나는, 카이를 그대로 내버려두면, 산해경의 근간이 흔들릴 수도 있을 것이라고 생각했다."
10038070-147 = "3;키사키;05;그렇지만 어느 학원이라고 해도, 한 명의 학생을 퇴학시킨다는 것은 쉽지 않은 일이다."
10038070-148 = "3;키사키;99;변화와 예외를 두려워하는…… 우리 산해경이라면 두말할 것도 없을 것이고.\n#3;em;…"
10038070-149 = "3;키사키;03;후후. 학칙대로의 절차를 모두 따랐다면, 카이는 아마도 퇴학당하기 전에 졸업을 맞이했을지도 모르는 일이었겠지."

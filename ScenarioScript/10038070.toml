[translation]
10038070-1 = "ตอนที่ 7;จะได้พบยีราฟที่นั่นหรือเปล่า"
10038070-7 = "มาถึงแล้วละ คุณครู ที่นี่คือ... สถานที่ลับของย่านการค้าเทพเต่าดำ "
10038070-8 = "มาถึงที่นี่จนได้สินะ คุณครู..."
10038070-9 = "[s] \"ต้องขอบใจมินะกับเรย์โจวน่ะ\""
10038070-10 = "ไม่หรอกค่ะ ต้องขอบคุณคุณครูที่ออกคำสั่งอย่างเหมาะสม พวกฉันถึงได้ลงมือปฏิบัติได้ค่ะ"
10038070-11 = "หัวหน้าคณะกรรมการมินะน่ะเหรอคะ? ไม่ต้องเป็นห่วงหรอกค่ะ เธอน่าจะหักโหมมากเกินไป ตอนนี้ก็เลยนอนหลับอยู่น่ะค่ะ"
10038070-12 = "จะว่าไปแล้ว... ท่านประมุขเป็นยังไงบ้างคะ?"
10038070-14 = "เรารบกวนทุกคนอีกแล้วสินะ... น่าละอายใจจริงๆ"
10038070-15 = "ไม่เป็นไรหรอก ไม่เป็นไร! แค่นี้ไม่เท่าไรหรอกน่า! จะรบกวนอีกแค่ไหนก็ได้เลย!"
10038070-16 = "เช่นนั้นหรือ..."
10038070-20 = "..."
10038070-21 = "คิซากิก็เกือบจะเจอเรื่องใหญ่เข้าให้แล้วนะ ว่ามั้ยล่ะ?"
10038070-23 = "แค่การที่ชินทานิ ไคกลับมา ก็ถือเป็นเรื่องใหญ่มากๆ แล้วค่ะ..."
10038070-28 = "..."
10038070-30 = "เรื่องนั้นเอาไว้ก่อนเถอะ... ฉันว่าพวกเรากลับไปที่ย่านการค้ากันสักพักดีกว่า! "
10038070-35 = "คะ? แต่ท่านประมุข...?"
10038070-36 = "ก็เพราะแบบนั้นนั่นแหละ"
10038070-37 = "ฉันไม่เห็นเข้าใจเลยค่ะ...?"
10038070-38 = "ไม่ต้องเข้าใจหรอกน่า รีบไปกันเถอะ"
10038070-39 = "ทะ... ท่านประธาน? ไม่เห็นต้องผลักฉันขนาดนี้ก็ได้นี่คะ... อีกอย่าง ดูจากสภาพของท่านประธานแล้ว ตอนนี้ทางฝั่งนั้นน่าจะแข็งแกร่งกว่านะคะ... ท่านประธาน? ท่านประธาน?"
10038070-45 = "[ns] \"ไปซะแล้ว...\""
10038070-46 = "อย่างนั้นสินะ..."
10038070-47 = "[s] \"คิซากิ? เป็นอะไรหรือเปล่า?\""
10038070-51 = "เราไม่เป็นอะไร... ไม่มีปัญหาอะไรหรอก"
10038070-52 = "[s] \"อืม...\""
10038070-55 = "(เกิดความเงียบที่น่าอึดอัดขึ้น)"
10038070-59 = "(คิซากิก้มหัวลงและเอาแต่มองดูพื้น...)"
10038070-63 = "[ns] \"ครูอยากให้เล่าเรื่องของไคให้ฟังหน่อยน่ะ\""
10038070-67 = "หมายถึงชินทานิ ไค... อย่างนั้นหรือ?"
10038070-68 = "อย่าสงสัยอะไรไร้สาระเลยครู ถึงกระนั้นมันก็เป็นแค่อดีต..."
10038070-72 = "..."
10038070-73 = "ยังจำเรื่องที่เราคุยกันก่อนหน้านี้ได้หรือไม่?"
10038070-74 = "เรื่องที่เรา... ตัดสินใจทำเป็นอย่างแรกหลังจากได้รับตำแหน่งประมุขเมื่อปีก่อนน่ะ"
10038070-75 = "[ns] \"ที่บอกว่าไล่นักเรียนปี 3 ออกไปน่ะเหรอ?\""
10038070-76 = "ใช่ ตอนนี้ครูคงคาดเดาได้แล้วว่า นักเรียนปี 3 คนนั้นก็คือ..."
10038070-77 = "[s] \"ชินทานิ ไคสินะ\""
10038070-78 = "เป็นเช่นนั้นละ..."
10038070-81 = "อย่างที่เราบอกไปในตอนนั้นว่ามีกระแสต่อต้านการตัดสินใจครั้งนั้นมากมาย"
10038070-82 = "ทั้งเรื่องขั้นตอน กระบวนการ ความชอบธรรม ความเหมาะสม แม้สุดท้ายนั่นจะไม่ใช่การตัดสินใจที่ผิด แต่ก็มีความคิดเห็นว่าสิ่งที่ต้องปฏิบัติตาม ก็ต้องปฏิบัติตาม..."
10038070-83 = "แต่นั่นก็อาจจะเป็นแค่การวินิจฉัยของเราคนเดียวก็ได้"
10038070-88 = "เมื่อน้ำหก เราย่อมไม่อาจหยิบมันขึ้นมาได้"
10038070-91 = "ชินทานิ ไค... อยากจะทำให้ตัวเองเป็นดั่งเทพเจ้า "
10038070-92 = "ไคพยายามสร้างน้ำอมฤตขึ้นมาเพื่อการรู้แจ้งในระดับที่สูงขึ้น และใช้ข้ออ้างนั้นในการเรียกรวมตัว#nนักเรียนเป็นจำนวนมาก"
10038070-93 = "จากนั้นก็ให้นักเรียนเหล่านั้นกินยาที่น่าสงสัย"
10038070-102 = "ส่วนหนึ่งของนักเรียนที่หลงใหลในพลังนั้นก็ขอร้องให้ไคทำยาที่มีสรรพคุณพิเศษให้"
10038070-104 = "ต้องยอมรับว่ายาเหล่านั้นให้ผลชั่วคราวที่ยอดเยี่ยม"
10038070-105 = "แต่ในระยะยาว มันจะก่อให้เกิดผลข้างเคียงมากมายต่อร่างกายของผู้ที่กินยานั้น"
10038070-118 = "อย่างเช่น ยาที่ผลิตให้นักเรียนที่อยากได้คะแนนดีๆ ในวิชาพละศึกษาจะช่วยเพิ่มสมรรถภาพทางกาย#nได้ชั่วคราว แต่หลังจากนั้น กระบวนการเผาผลาญของร่างกายก็จะไม่ทำงาน"
10038070-119 = "ส่วนยาที่ผลิตให้นักเรียนที่อยากสัมผัสรสชาติใหม่ๆ ก็ทำให้การรับรสเปลี่ยนไปจนรับรสอร่อยได้ไม่#nเหมือนคนอื่น"
10038070-122 = "แน่นอนว่า... หากมองในแง่ของการผลิตยาจนคนอื่นกินแล้วเกิดปัญหา... ซายะเองก็ทำเรื่องแบบนั้น#nเช่นกัน..."
10038070-123 = "แต่สิ่งที่ซายะต้องการ คือการทำให้คนที่ได้กินยาของเธอมีความสุขเป็นสำคัญ"
10038070-124 = "และสิ่งที่พิสูจน์เรื่องนั้นได้ก็คือ ถ้ามีนักเรียนที่ได้รับผลข้างเคียงจากของซายะ เธอก็จะปรุงยาแก้พิษ#nให้โดยไม่มีค่าใช้จ่าย"
10038070-125 = "ท้ายที่สุดแล้ว การเป็นอมตะคือสิ่งที่ขัดต่อกฎของโลก และการทำสิ่งที่ขัดต่อกฎของโลก ก็ย่อมมีผล#nข้างเคียงตามมา..."
10038070-126 = "บางทีซายะอาจจะรู้แล้วก็ได้ว่าความสุขที่ไม่ต้องมีข้อแลกเปลี่ยนนั้นไม่มีในโลก"
10038070-130 = "แต่ว่าไคไม่เป็นเช่นนั้น... สิ่งเดียวที่สำคัญสำหรับไคก็คือผลลัพธ์ หากนั่นจะทำให้เธอเป็นเทพเจ้าได้ ต่อให้ต้องเดินออกนอกลู่นอกทางเธอก็ไม่ลังเล"
10038070-131 = "ถ้ามีนักเรียนที่ต้องการถอนพิษ เธอก็จะเสนอข้อแลกเปลี่ยนที่ปฏิเสธไม่ได้ โดยให้นักเรียนเหล่านั้น ปฏิบัติตามคำสั่งของเธอ จึงจะได้รับยาถอนพิษไป"
10038070-132 = "นั่นทำให้นักเรียนที่ขอให้ไคผลิตยาให้ต้องกลายเป็นทาสและถูกบังคับให้ทำตามทุกคำสั่งของเธอ"
10038070-133 = "สำหรับมังกรดำแล้ว นั่นไม่ใช่เรื่องที่ดีหรอก"
10038070-134 = "เพราะนั่นไม่ต่างกับการที่ซานไห่จิงเกิดกองกำลังใหม่ที่ไม่ทำตามอำนาจของมังกรดำน่ะ"
10038070-135 = "[s] \"นั่นมันเรื่องอันตรายมากเลยนะ!\""
10038070-140 = "ครูรู้เรื่องเกี่ยวกับ 'หัตถ์วานร' หรือไม่?"
10038070-141 = "มันเป็นเรื่องที่เราขอพรจากหัตถ์วานร และพรที่ขอก็เป็นจริง แต่เป็นจริงขึ้นได้ในวิธีที่บิดเบี้ยวน่ะ"
10038070-142 = "นอกจากนี้ยังเป็นคำเปรียบเปรยเมื่อเป้าหมายสำเร็จ แต่สำเร็จได้ด้วยกระบวนการที่ไม่ถูกต้อง และมีราคาที่ต้องจ่ายมากมายด้วย"
10038070-144 = "และนั่นก็เป็น... หนึ่งในสมญานามของชินทานิ ไคด้วย"
10038070-145 = "นี่อาจจะเป็นเพียงการวินิจฉัยสั้นๆ ของเราก็ได้"
10038070-146 = "ตอนนั้นเราคิดว่าถ้าปล่อยไคไว้อย่างนั้น รากฐานของซานไห่จิงก็อาจสั่นคลอนได้น่ะ"
10038070-147 = "แต่ไม่ว่าจะกับโรงเรียนไหนก็ตาม การไล่นักเรียนออกก็ไม่ใช่เรื่องง่ายเลย"
10038070-148 = "โดยเฉพาะอย่างยิ่งกับซานไห่จิง... ที่กลัวการเปลี่ยนแปลงและการยกเว้นเป็นทุนอยู่แล้ว"
10038070-149 = "ฮุฮุ ถ้าเราทำตามขั้นตอนตามกฎของโรงเรียนละก็ ไคอาจจะเรียนจบไปก่อนที่จะถูกไล่ออกก็ได้"
10038070-152 = "เราจึงตัดสินใจเนรเทศทันทีแบบที่ไม่เคยมีมาก่อนในขนบธรรมเนียมของเรา"
10038070-153 = "และสั่งให้ลบระเบียนประวัติทั้งหมดของไค เพื่อไม่ให้มีนักเรียนคิดก่ออาชญากรรมลอกเลียนแบบเธอ"
10038070-155 = "พอมาคิดดูแล้ว นี่อาจจะเป็นกรรมที่เราก่อไว้กับตัวเองก็ได้นะ"
10038070-162 = "ไม่แปลกหรอกที่ไคจะเกลียดชังเรา เธอมีสิทธิ์เช่นนั้น ใช่แล้วละ มันก็ควรจะเป็นอย่างนั้น"
10038070-163 = "ที่เธอต้องโหดร้าย อยากแก้แค้น และมีความอาฆาตพยาบาท ทั้งหมดนี้คือความผิดของเราเอง"
10038070-168 = "เราพยายามตัดสิ่งเล็กๆ ออกเพื่อสิ่งที่ยิ่งใหญ่กว่า และตอนนี้เราอาจกำลังชดใช้กรรมจากการกระทำนั้น#nอยู่ก็ได้"
10038070-171 = "เราจะไม่แก้ตัวใดๆ หรอกครู ถ้าทำเช่นนั้น เราจะดูขี้ขลาดไม่ใช่หรือ?"
10038070-172 = "การกระทำและการตัดสินใจของเราทำให้เกิดปีศาจที่ชื่อว่าไคในตอนนี้ และยังทำให้ซานไห่จิงในขณะนี้ต้องเดือดร้อนไปด้วย..."
10038070-176 = "เป็นอย่างที่ว่าไว้จริงๆ สินะ ไม่ว่าบุปผาจะร่วงโรย วารีพิโรธ หรือนภาคำรามก้อง..."
10038070-177 = "เราก็ต้องรับผิดชอบทุกอย่างโดยไม่มีข้อแก้ตัวใดๆ เพราะนี่คือตำแหน่งของประมุขแห่งซานไห่จิง"
10038070-181 = "[ns] \"แต่ครูคิดต่างออกไปนิดหน่อยนะ\""
10038070-185 = "หมายความว่าอย่างไรหรือ ครู...?"
10038070-186 = "[s1] \"ไคเลือกจะทำแบบนั้นเอง เพราะงั้นก็ต้องรับผิดชอบผลที่ตามมา\"\n[s2] \"ไคต้องรับผิดชอบต่อผลลัพธ์จากการกระทำที่ตัวเองเลือกสิ\""
10038070-189 = "ไคเป็นคนเลือกทำสิ่งนั้นเองอย่างนั้นหรือ...?"
10038070-190 = "แต่ว่า..."
10038070-191 = "[s3] \"ถึงโลกนี้จะมีเรื่องที่พูดกันไม่ได้ง่ายๆ อย่างเรื่องอดีตของซานไห่จิง\"\n[s4] \"ถึงเรื่องราวในอดีตของซานไห่จิงจะเป็นสิ่งที่พูดยาก\""
10038070-194 = "..."
10038070-195 = "[s5] \"แต่เราทุกคนก็ต้องรับผิดชอบต่อเรื่องในปัจจุบัน\"\n[s6] \"แต่เราทุกคนก็ต้องไม่ลืมที่จะรับผิดชอบต่อเรื่องในปัจจุบัน\""
10038070-198 = "แต่ว่า..."
10038070-199 = "[s7] \"เราต้องทุ่มเทกับช่วงเวลานี้ที่เป็นปัจจุบันของเรา\"\n[s8] \"เพราะแบบนั้นเราเลยต้องทำปัจจุบันนี้ให้ดีที่สุด\""
10038070-202 = "เพราะเหตุใดกัน...?"
10038070-207 = "[ns9] \"เราจะได้ไม่เสียดายกับอนาคตที่จะมาถึงในวันข้างหน้าไง\"\n[ns10] \"เราจะได้มีคำตอบที่ไม่ละอายให้กับอนาคตของเราไง\""
10038070-211 = "ด้วยเหตุนี้... เราจึงต้องไม่ลืมอดีตและประเพณีของเรา...?"
10038070-212 = "เช่นนั้นหรือ... อาจจะคิดออกมาเช่นนี้ได้ด้วยสินะ"
10038070-213 = "..."
10038070-217 = "นักเรียนหลายคนในซานไห่จิงยังคงสงสัยในตัวเราอยู่"
10038070-218 = "พวกเธอมองว่าประมุขที่ชื่อริวเกะ คิซากิ คือคนที่อยู่ห่างไกลจากประเพณีของซานไห่จิงตั้งแต่เริ่มแรก"
10038070-219 = "..."
10038070-223 = "ครู... รู้หรือไม่ว่าภายนอกคิดเช่นไรกับโรงเรียนมัธยมซานไห่จิง?"
10038070-224 = "ผู้คนส่วนมากคงไม่รู้ด้วยซ้ำว่าซานไห่จิงตั้งอยู่ที่ไหน และเทียบไม่ได้เลยกับ 3 โรงเรียนขนาดใหญ่#nของคิโวทอส"
10038070-225 = "สิ่งที่เป็นที่กล่าวขานกันก็คงจะเป็นเรื่องอาหารเลิศรสของย่านการค้าเทพเต่าดำ"
10038070-226 = "ที่สำคัญคือการถูกมองว่าเราคือคนประหลาดที่เคร่งเรื่องประเพณีของตัวเอง"
10038070-227 = "เรา... ไม่ชอบให้เป็นเช่นนั้น การที่นักเรียนซานไห่จิงไปที่ไหนแล้วถูกตราหน้าว่าเป็นคนเช่นนั้นก็ด้วย"
10038070-228 = "ฮุฮุ... การได้พูดคุยกับครูทำให้เราได้เห็นสิ่งใหม่ๆ อยู่ตลอดเลยนะ"
10038070-229 = "ไม่ถึงกับขนาดนั้นอย่างนั้นหรือ? ไม่ได้การแล้ว เราว่าครูควรจะตระหนักรู้ในตนเองให้มากขึ้นอีกหน่อยนะ"
10038070-233 = "..."
10038070-234 = "ตอนนี้เราเหมือนจะเริ่มเห็นหนทางแล้วละว่าต้องทำอย่างไรดี"

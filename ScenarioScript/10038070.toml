[translation]
10038070-1 = "Episode 7;If You Go, Could You Meet a Qilin?"
10038070-7 = "We made it, Sensei. The Black Tortoise Promenade's secret hideout. "
10038070-8 = "I can't believe we made it here, Sensei..."
10038070-9 = "[s] \"It was thanks to both of you, Mina, Reijo.\""
10038070-10 = "Well, we couldn't have done it without your direction, Sensei."
10038070-11 = "Right, Mina? ...She's asleep. I don't blame her. Don't worry, she's fine."
10038070-12 = "What about you, Madam?"
10038070-14 = "I'm...embarrassed, and indebted to you all, but I'm not hurt."
10038070-15 = "There's nothing to be embarrassed about! It's okay!"
10038070-16 = "...If you say so."
10038070-20 = "......"
10038070-21 = "It was close, though. That could easily have gone much worse for Kisaki."
10038070-23 = "And Shintani Kai's back now. That's huge in itself. But..."
10038070-28 = "......"
10038070-30 = "...putting that aside for the moment, what say you and I head back to the Promenade, Reijo? "
10038070-35 = "Huh? Without the president?"
10038070-36 = "Yes, exactly."
10038070-37 = "W-Where are you going with this?"
10038070-38 = "Let's just hurry."
10038070-39 = "Whoa, Rumi, there's no need to push yourself so hard! ...You're a child, you know. I AM stronger than you...!"
10038070-45 = "[ns] \"And there they go.\""
10038070-46 = "...Indeed."
10038070-47 = "[s] \"Kisaki, are you sure you're all right?\""
10038070-51 = "...Yes. There's no problem at all."
10038070-52 = "[s] \"I'll take your word for it...\""
10038070-55 = "The awkward silence continued."
10038070-59 = "Kisaki kept her head bowed, staring at the floor."
10038070-63 = "[ns] \"Would you tell me about Kai?\""
10038070-67 = "Shintani Kai... You want to know?"
10038070-68 = "...There's no point. It's ancient history."
10038070-72 = "......"
10038070-73 = "Do you remember that conversation we had?"
10038070-74 = "When I told you about...the first decision I made as the new president?"
10038070-75 = "[s] \"About expelling some third-year student?\""
10038070-76 = "Yes. As you may have already guessed, that student was..."
10038070-77 = "[s] \"Kai.\""
10038070-78 = "Yes..."
10038070-81 = "As I mentioned, that was not a popular decision."
10038070-82 = "Even if it was the RIGHT decision, there were all kinds of calls for protocol, process, validity..."
10038070-83 = "But the decision was mine alone."
10038070-88 = "And once the water is spilled, there's no putting it back."
10038070-91 = "...Shintani Kai wanted to become a sage. "
10038070-92 = "She tried to make a potion that would bring her enlightenment. She told other students she was making an immortality elixir. They believed her, and they wanted to join her project."
10038070-93 = "So she had them try it."
10038070-102 = "She had a hold on her followers. They started asking her for custom potions, with unique effects."
10038070-104 = "The effects were remarkable at first..."
10038070-105 = "...but they didn't last, and they all did long-term damage."
10038070-118 = "Students who wanted high grades in physical education would drink potions to enhance their strength and speed...which also damaged their body's metabolism."
10038070-119 = "Students who wanted to taste new flavors drank potions that altered their sense of taste permanently."
10038070-122 = "Granted, Kai wasn't the only one to cause trouble with her potion brewing. Saya did too."
10038070-123 = "But Saya only wanted her potions to make people happy."
10038070-124 = "And for those who suffered side effects, she would always give them a free antidote."
10038070-125 = "Immortality goes against every natural law in the world. \"Side effects\" would be an understatement."
10038070-126 = "In Saya's case, she realized, seemingly, that true happiness couldn't be given away for free in a bottle."
10038070-130 = "But Kai was...much more stubborn. Obsessed. All she cared about were the results. Whatever could make her a sage, that was all that mattered."
10038070-131 = "When her followers begged her for antidotes, she made them work for it. Forced them to obey her every order."
10038070-132 = "The students who came to Kai, for help or pleasure, all became her slaves."
10038070-133 = "...Obviously, Genryumon took issue with that."
10038070-134 = "Not just for the obvious ethical reasons, but because Shintani Kai had effectively created a new faction, with no regard for their authority."
10038070-135 = "[s] \"Sounds like a powder keg.\""
10038070-140 = "Let me ask you this, Sensei: are you familiar with the story of the monkey's paw?"
10038070-141 = "About a magical charm that grants wishes, but only in a twisted way."
10038070-142 = "It makes a good metaphor for when a goal becomes too unpleasant, too costly."
10038070-144 = "It was also one of Shintani Kai's nicknames."
10038070-145 = "Now, perhaps I was impulsive in dealing with her..."
10038070-146 = "...but I believed that letting her run wild, for even another day, would have shaken Shanhaijing to its foundations."
10038070-147 = "Even so, it's never easy to expel a student, not in any school."
10038070-148 = "Especially not in Shanhaijing, with its famous fear of change and exceptions."
10038070-149 = "Fufu. Had I taken the time to follow all the proper procedures, Kai may have graduated by the time I could have expelled her."
10038070-152 = "So I made the unprecedented decision to expel her right away."
10038070-153 = "And then I erased all her records, so that no one could duplicate her work."
10038070-155 = "...What's happening now might be karma for that."
10038070-162 = "Kai has every right to resent me."
10038070-163 = "Whatever else she did, she wasn't gunning for revenge until I poured all that venom into her heart."
10038070-168 = "Like she said, to me, she was a small sacrifice, made for the greater good."
10038070-171 = "I won't make excuses. That would be cowardly."
10038070-172 = "My actions, my decisions created the monster that Kai is now. The one who's bringing harm to Shanhaijing."
10038070-176 = "\"Storms, fires, floods...\""
10038070-177 = "\"All the responsibility, with no excuses.\" She was right. That's what it means to be President."
10038070-181 = "[ns] \"I don't see it that way.\""
10038070-185 = "...What do you mean, Sensei?"
10038070-186 = "[s1] \"You made your decision, she made hers.\"\n[s2] \"Kai needs to take her own responsibility.\""
10038070-189 = "You're saying it was Kai's decision to be the way she is now...?"
10038070-190 = "But..."
10038070-191 = "[s3] \"Some things don't fit in simple terms.\"\n[s4] \"Like Shanhaijing's past, things are complicated.\""
10038070-194 = "......"
10038070-195 = "[s5] \"Don't forget what we're responsible for now.\"\n[s6] \"We still make our own decisions in the present.\""
10038070-198 = "But..."
10038070-199 = "[s7] \"Soon, this moment will become the past.\"\n[s8] \"We have to do the best we can, every day.\""
10038070-202 = "But then..."
10038070-207 = "[ns9] \"We have a responsibility to the future too.\"\n[ns10] \"We want to make choices we can look back and be proud of.\""
10038070-211 = "...Like the respect we have for our past and traditions."
10038070-212 = "I see... I hadn't thought of it that way."
10038070-213 = "......"
10038070-217 = "A lot of Shanhaijing students still have their doubts about me."
10038070-218 = "The Kisaki Administration was never a conventional one."
10038070-219 = "......"
10038070-223 = "Do you know how they view Shanhaijing Academy from the outside?"
10038070-224 = "Most don't even know where it is. Compared to the three major academies, it's a tiny speck on the map."
10038070-225 = "Those who do know where to find it, usually only come for the food from the Promenade."
10038070-226 = "They think of us as a bunch of eccentrics, hiding in tradition and customs."
10038070-227 = "I hated that. What they thought of us, how they treated us."
10038070-228 = "Fufu. I always find new insights when I talk to you, Sensei."
10038070-229 = "You don't believe me? You should know by now about this amazing talent of yours."
10038070-233 = "......"
10038070-234 = "The path ahead is a bit clearer now."
10038070-235 = "Thank you, Sensei. And I have one more thing to ask of you."
10038070-239 = "We WILL hold the Moonlight Festival."
10038070-240 = "So until we do...would you stay and help me just a bit longer?"
10038070-241 = "[s] \"By your orders, Madam President.\""
10038070-242 = "Fufu... Thank you."
10038070-250 = "[ns] \"K-Kisaki? Madam, what are you doing?!\""
10038070-252 = "What's wrong? I just want you to carry me on your back."
10038070-253 = "That's your first order. Just...stand still like that for a moment..."
10038070-263 = "Kisaki! Sensei! Are you all right? The Black Tortoise Promenade members have something they want to—"
10038070-268 = "*gasp*"
10038070-269 = "[s] \"Um...\""
10038070-274 = "Wh-What are you two doing?!"
10038070-276 = "Tt-This... Well..."
10038070-277 = "[s] \"It's nothing! Nothing happened! Right, Kisaki?\""
10038070-282 = "I want to ride on your back too, Sensei!"
10038070-283 = "That's what you meant?!"
10038070-291 = "A-Ahem, So let me start over. I brought the Black Tortoise Promenade members over. There's something they want to say."
10038070-292 = "Oh...? This is a rare occasion."
10038070-293 = "Your people from the Promenade want to speak to me? In person?"
10038070-294 = "W-Well, you'll see why when you meet them. Come in, everybody."
10038070-306 = "Hmm... Go ahead. I'm listening."
10038070-314 = "Genryumon greets you, Madam!"
10038070-319 = "Hm?! What is going on...?"
10038070-320 = "Hahaha! Surprised? Genryumon members asked to see you, Kisaki. I had to smuggle them in."
10038070-321 = "Can't have them running around the Promenade while THEY have it locked down, right? It'd draw all kinds of suspicion."
10038070-322 = "So here they are in disguise!"
10038070-327 = "Shanhaijing, and Genryumon, need you, Madam. All of us here agree."
10038070-328 = "The hardliners have taken over Genryumon, and they've lost their way."
10038070-329 = "They've handed control over to the Eastern Alchemy Society, and they're failing as a student council."
10038070-330 = "So we're here to follow you. No matter what you decide, we'll do everything we can to make it happen."
10038070-335 = "Genryumon awaits your orders once again, Madam!"
10038070-340 = "...Very well."
10038070-341 = "......"
10038070-347 = "For too long, Shanhaijing has used the past not as a foundation, but as a wall."
10038070-348 = "Instead of seeking answers from its lessons, we seek service to its rules. We prize obedience over choice and judgment."
10038070-349 = "But to see the many miles ahead, we must climb another level of the tower. We must walk the land with our own two legs, and look up at the sky with our own two eyes."
10038070-352 = "This moment, every moment, is our responsibility. We must give our best and wait for the will of the heavens."
10038070-353 = "Giving in to fear and trepidation will gain us nothing. We may wander, but we shall never be lost."
10038070-354 = "Now..."
10038070-359 = "Let us reclaim our Shanhaijing."

10038070-347 = "ที่ผ่านมาซานไห่จิงพยายามเก็บทุกอย่างไว้ในอดีต"
10038070-348 = "แทนที่จะเรียนรู้บางสิ่งจากบทเรียนในอดีต พวกเรากลับปรารถนาในการกลับไปสู่กฎเกณฑ์ในอดีต และให้ความสำคัญกับการเชื่อฟังมากกว่าการตัดสิน"
10038070-349 = "แต่หากจะมองออกไปไกลกว่าหมื่นลี้ เราก็ต้องปีนหอขึ้นไปให้สูงขึ้น เราต้องขึ้นไปด้วยขาของตัวเอง และมองขึ้นไปยังท้องฟ้าด้วยตาของตัวเอง"

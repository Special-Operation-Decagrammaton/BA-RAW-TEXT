[translation]
10001010-1 = "Episode 1; The Demerit Festival"
10001010-2 = "Red Winter Academy Main School Lunch Club"
10001010-3 = "This is the food service facility responsible for fueling our proud Red Winter Academy students!"
10001010-4 = "Nutrition is the foundation of activity! It's unthinkable to tie the quality of meals to status."
10001010-5 = "As such, all of our students graciously receive the same amount of food!"
10001010-6 = "Of course, as the academy's Great Leader, esteemed president, Beautifier of Environments, Chief of Sanitation..."
10001010-7 = "Uh..."
10001010-8 = "And the rest! Anyway, since I, Cherino, am great and responsible for all great things, I have the privilege of eating one additional pudding!"
10001010-9 = "Besides me, everyone enjoys an equal meal! Hahaha!"
10001010-10 = "[s] \"What are they preparing right now?\""
10001010-11 = "Excellent question, Comrade! I'm also curious about that sweet scent in the air."
10001010-12 = "Chef, what's that you have in your pot?"
10001010-14 = "President! As your greatness has ordered, we are making pudding for the Ivan Kupala festivities."
10001010-15 = "We're to double the pudding ration for this year's Ivan Kupala, so every single member of the School Lunch Club has been hard at work making pudding around the clock."
10001010-16 = "That's the attitude one would expect of a model School Lunch Club member! Very good!"
10001010-17 = "Once the festival is over, I shall award you the First-Class Mustache Medal!"
10001010-18 = "Thank you, President!"
10001010-19 = "Ah. This must be the pudding we've been talking about. I shall taste it myself."
10001010-22 = "*munch munch* "
10001010-23 = "Ugh... Why is it like this?! It's bland and the consistency is too loose!"
10001010-24 = "W-Well... We had to increase production, but we couldn't get more ingredients..."
10001010-25 = "When we didn't have enough milk, we started adding water to get more from the same amount of mix."
10001010-26 = "You watered down the pudding? You insolent...!"
10001010-28 = "Even if for productivity's sake, this is unacceptable!"
10001010-29 = "Marina!"
10001010-31 = "You called for me, President?"
10001010-32 = "Get these insolent members of the School Lunch Club out of here! Those who dare water down deserve demerits!"
10001010-33 = "F-Forgive us, Great Leader! We didn't want to do it either!"
10001010-34 = "Did you think you could get away with sabotaging our Great Leader's gloriously perfect plan?!"
10001010-35 = "Or do you have so little respect for the mustache's authority?"
10001010-36 = "Ugh, this is unfair! We had no choice!"
10001010-40 = "Phew, that was some commotion."
10001010-41 = "[s1] \"H-Harsh...\"\n[s2] \"This academy sure is something...\""
10001010-42 = "Haha. Forget this, Comrade. It's nothing but a trivial setback."
10001010-43 = "Haha. Forget this, Comrade. It's nothing but a trivial setback."
10001010-44 = "Hm? You want to know what happens to students with demerits?"
10001010-45 = "Well."
10001010-46 = "They receive terrible punishments!"
10001010-47 = "There is one of two horrible fates in store for them. Clean the bathrooms by themselves for a week..."
10001010-48 = "...or lose their snack rations for a month!"
10001010-49 = "It's for the best of everyone not to challenge the authority of Red Winter Academy, Comrade. Haha!"
10001010-50 = "Enough of that now. Let's go to the next inspection site!"
10001010-52 = "Red Winter Academy Printing Office"
10001010-53 = "This is the editing department of The Red Bear, the daily paper which spreads the news and glories of our Red Winter Academy!"
10001010-54 = "Huh? You want to know why we have this when Kronos handles all of Kivotos' press?"
10001010-55 = "It's all hogwash!"
10001010-56 = "The yellow journalism of Kronos is nothing but gossip and falsehoods!#nIt can't compare to the Red Bear, which is always prompt and accurate!"
10001010-57 = "Comrade, read The Red Bear for yourself when you can. You might learn some things!"
10001010-60 = "Editor-in-Chief, is the special Ivan Kupala issue ready yet?"
10001010-62 = "Of course, President. This special issue will feature a prominent portrait of you on the front page, specially printed using colored ink on premium paper."
10001010-63 = "Excellent! Expect a medal for your service at the festival's end!"
10001010-64 = "Thank you, President!"
10001010-65 = "Hmm, allow me to preview an article."
10001010-67 = "\"The great President Cherino personally inspects the theme park construction site...\""
10001010-68 = "Yes, yes. Very good!"
10001010-69 = "...Hmm? Chief Editor. The photograph next to the article is a little weird."
10001010-70 = "There are Marina and Tomoe, but I'm nowhere to be seen. What happened?"
10001010-71 = "My apologies, President, but you were...too short to fit into the picture, so we—"
10001010-72 = "What?! You calling me a pip-squeak?!"
10001010-73 = "I-I never said that!"
10001010-75 = "The nerve of this measly reporter!"
10001010-76 = "If our president wasn't visible at that angle, you should have used digital manipulation to make her taller!"
10001010-77 = "B-But The Red Bear is a paper that's always supposed to deliver the facts..."
10001010-78 = "Arrrgh! Marina!"
10001010-79 = "Yes, President."
10001010-81 = "Demerits for this insolent editor-in-chief who'd dare insult our esteemed president, the great leader of Red Winter Academy!"
10001010-83 = "I-I can fix this! Have mercy, President!"
10001010-85 = "You should already know that spoken words and printed articles can't be taken back!"
10001010-89 = "Goodness me, there's been a lot of insubordination lately."
10001010-90 = "Oh, well. I can just keep punishing them as they pop up."
10001010-91 = "*yawn* Maybe I'm working too hard. I'm getting sleepy..."
10001010-92 = "Tomoe, I want to go back and take a nap..."
10001010-93 = "Heehee. Understood. I'll have your bed prepared immediately."
10001010-94 = "Comrade, while I'm taking my nap, you should get some rest too."
10001010-96 = "Sensei, feel free to use the lounge."
10001010-97 = "Follow me and I'll show you the way."
10001010-99 = "Red Winter Academy New Building Hallway"
10001010-101 = "Good work today, Chairman Marina!"
10001010-102 = "Thank you! You all have also done well!"
10001010-103 = "Now that I'm finally done punishing today's dissenters, it's time to head back and get some rest..."
10001010-107 = "Wh-What the...?"
10001010-111 = "Ouch, my back..."
10001010-112 = "Why is the Beautification Board allowing empty cans to be left lying about?!"
10001010-113 = "I'll have them all taken in on charges of sabotage!"
10001010-114 = "And I think I bumped into something as I fell..."
10001010-115 = "What's this?"
10001010-119 = "A-A President Cherino statue?!"
10001010-120 = "The mustache must've broken off when it fell!"
10001010-121 = "Wh-What do I do? Can I still glue it back on...?"
10001010-122 = "*sigh* If President Cherino finds out about this..."
10001010-126 = "You broke my statue?! And look at its mustache! It looks ridiculous!"
10001010-127 = "Grr... Unforgivable! You will be punished! Demerits!"
10001010-129 = "Former Chairman Marina, you'll be cleaning the dirty bathroom in the Former Institute until you graduate!"
10001010-131 = "N-No... I worked so hard to get to this position!"
10001010-132 = "There must be something... Something I can do to get out of this! I won't clean dirty bathrooms for the rest of my days!"
10001010-134 = "...Wait."
10001010-135 = "I can't be punished if there's nobody with more power than me, right?"
10001010-136 = "That's right! The first rule of combat is to strike first! If I oust Cherino and become president, there won't be anyone who can punish me!"
10001010-137 = "Security Council, assemble!"
10001010-143 = "What's going on, Madam Chairman?"
10001010-144 = "Effective immediately, we will storm the secretariat, drag out the officers, and overthrow President Cherino!"
10001010-145 = "Is this...a revolution, Madam Chairman?"
10001010-147 = "Y-Yes! A revolution!"
10001010-148 = "...I'm certainly not doing this to get out of being punished by President Cherino!"
10001010-149 = "Oh! Chairman Marina has drawn her sword!"
10001010-150 = "Let's take down President Cherino and her rotten followers!"
10001010-153 = "(It was a panic move, but it's going more smoothly than I thought!)"
10001010-154 = "(That's right. I just have to become the new president and embrace the power!)"
10001010-157 = "All right. Everyone prepare yourselves to breach the secretariat..."
10001010-158 = "Move out!"

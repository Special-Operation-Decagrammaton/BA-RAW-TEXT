10001010-22 = "3;체리노;99;냠, 우물우물……."
10001010-23 = "3;체리노;04;윽…… 어째서 푸딩의 맛이 이 모양인 거냐! #n맛은 밍밍하고 식감은 지나치게 흐물거리잖아!\n#3;em;[?!]\n#3;shake"
10001010-24 = "#na;급양부장 붉은겨울;그, 그게…… 생산량을 늘리라는 지시는 내려왔지만, 식재료는 더 받을 수가 없어서……."
10001010-25 = "#na;급양부장 붉은겨울;우유의 양이 모자라 반죽의 양을 늘리기 위해 푸딩에 물을 섞었습니다."

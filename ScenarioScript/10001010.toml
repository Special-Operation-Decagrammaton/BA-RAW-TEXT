[translation]
10001010-1 = "ตอนที่ 1;เทศกาลแห่งการลงโทษ"
10001010-2 = "ฝ่ายอาหาร สหภาพเรดวินเทอร์"
10001010-3 = "ที่นี่คือศูนย์อาหารที่ดูแลเรื่องอาหารของนักเรียนสหภาพเรดวินเทอร์"
10001010-4 = "เพราะกองทัพต้องเดินด้วยท้อง! ถึงตำแหน่งจะต่างกัน แต่ก็ห้ามมีการแบ่งแยกเรื่องอาหารเด็ดขาด!"
10001010-5 = "เพราะฉะนั้นนักเรียนทุกคนในสหภาพเรดวินเทอร์จะได้กินอาหารชนิดเดียวกัน#nในปริมาณที่เท่ากันทุกคน!"
10001010-6 = "แต่สำหรับเลขาธิการ ประธานสภานักเรียน หัวหน้าฝ่ายตกแต่ง หัวหน้าฝ่ายทำความสะอาด..."
10001010-7 = "แล้วก็..."
10001010-8 = "เอาเถอะ! สำหรับท่านเชริโน่ผู้มีเกียรติที่รับผิดชอบเรื่องสำคัญของที่นี่#nจะได้รับสิทธิพิเศษเป็นพุดดิ้งเพิ่มอีก 1 อัน!"
10001010-9 = "นอกเหนือจากเราแล้ว ทุกคนจะได้กินอาหารอย่างเท่าเทียมกัน!"
10001010-10 = "[s] \"ตอนนี้กำลังทำอาหารอะไรกันอยู่เหรอ?\""
10001010-11 = "เป็นคำถามที่ดีเลยสหาย! ได้กลิ่นหอมหวานนั่นเหมือนกันใช่ไหม?#nเราเองก็กำลังสงสัยอยู่เหมือนกัน"
10001010-12 = "ตอนนี้กำลังเตรียมอาหารอะไรอยู่เหรอเชฟ?"
10001010-14 = "พวกเรากำลังทำพุดดิ้งที่จะใช้ในงานเทศกาลอีวาน คูปาลาตามคำสั่งของท่านประธานที่ยิ่งใหญ่อยู่ค่ะ"
10001010-15 = "มีคำสั่งมาว่าให้เตรียมอาหารสำหรับเทศกาลอีวาน คูปาลาในครั้งนี้เป็น 2 เท่า...#nสมาชิกชมรมโภชนาการทุกคนก็เลยทำงานหามรุ่งหามค่ำเพื่อเตรียมพุดดิ้งอยู่ค่ะ"
10001010-16 = "นี่สิชมรมตัวอย่าง! ดีมาก ดีมาก!"
10001010-17 = "หากจบงานเทศกาลแล้ว เราจะมอบเหรียญหนวดขั้นที่ 1 ให้เลย!"
10001010-18 = "ขอบคุณค่ะท่านประธาน!"
10001010-19 = "โฮ่... นี่คือพุดดิ้งที่ว่าใช่ไหม? ไหนขอลองชิมหน่อยซิ"
10001010-22 = "ง่ำ ง่ำๆๆ"
10001010-23 = "อึ้ก... ทำไมถึงออกมาเป็นแบบนี้ล่ะ?#nมันจืดและเนื้อสัมผัสก็เละเกินไปด้วย!"
10001010-24 = "คือ.. คือว่า... มีคำสั่งให้ทำออกมาเยอะๆ ก็จริง แต่เราไม่ได้วัตถุดิบมาเพิ่ม..."
10001010-25 = "เรามีนมสดไม่เพียงพอ ก็เลยต้องใช้น้ำมาผสมแทนเพื่อเพิ่มปริมาณของขนม..."
10001010-26 = "ต้องใส่น้ำแทนงั้นเหรอ!? น่าผิดหวังมาก...!"
10001010-28 = "ถึงจะบอกว่าทำเพื่อเพิ่มปริมาณก็เถอะ แต่เรื่องนี้เรายกโทษให้ไม่ได้!"
10001010-29 = "มารินะ!"
10001010-31 = "เรียกหาฉันเหรอคะท่านประธาน?"
10001010-32 = "จัดการสมาชิกชมรมโภชนาการทุกคนที่เอาน้ำไปผสมพุดดิ้ง!"
10001010-33 = "ยกโทษให้พวกเราเถอะค่ะท่าน! พวกเราก็ไม่ได้อยากทำแบบนี้หรอกค่ะ!"
10001010-34 = "เธอนี่มัน! ทำลายแผนการที่สมบูรณ์แบบของท่านประธานเชริโน่แบบนี้ คิดว่าจะรอดไปได้งั้นเรอะ?"
10001010-35 = "หรือว่าเธอไม่เคารพอำนาจของหนวดเลยงั้นเหรอ?"
10001010-36 = "มะ... มะ... ไม่ใช่อย่างนั้นนะ! แบบนี้ไม่ยุติธรรมนะคะ!"
10001010-40 = "ฮู่ว... เกิดเรื่องวุ่นวายเข้าจนได้สินะ"
10001010-41 = "[s1] \"นะ... น่ากลัวจัง\"\n[s2] \"สหภาพเรดวินเทอร์เป็นที่ที่น่ากลัวแบบนี้นี่เอง\""
10001010-42 = "ลืมเรื่องที่เกิดขึ้นเมื่อกี้ไปเถอะนะสหาย มันก็แค่เรื่องเล็กๆ น่ะ"
10001010-43 = "ลืมเรื่องที่เกิดขึ้นเมื่อกี้ไปเถอะนะสหาย มันก็แค่เรื่องเล็กๆ น่ะ"
10001010-44 = "ว่าไงนะ? นักเรียนพวกนั้นจะเป็นยังไงน่ะเหรอ?"
10001010-45 = "ก็..."
10001010-46 = "จะได้รับโทษที่น่ากลัวน่ะสิ"
10001010-47 = "อย่างเช่นต้องทำความสะอาดห้องน้ำคนเดียว 1 สัปดาห์..."
10001010-48 = "หรือไม่ก็ไม่ได้กินของว่าง 1 เดือน!"
10001010-49 = "เพราะฉะนั้นเราถึงไม่ควรท้าทายอำนาจของสหภาพเรดวินเทอร์ ไม่ควรแม้แต่จะคิดเลยล่ะ#nสหายก็ด้วยนะ ฮ่ะฮ่า!"
10001010-50 = "เอาเถอะ เราไปตรวจงานสถานที่ถัดไปเลยดีกว่า!"
10001010-52 = "โรงพิมพ์ สหภาพเรดวินเทอร์"
10001010-53 = "ที่นี่คือกองบรรณาธิการของ <เรดแบร์> ที่รับผิดชอบเรื่องการโฆษณา#nและประชาสัมพันธ์เกียรติภูมิของสหภาพเรดวินเทอร์"
10001010-54 = "ว่าไงนะ? การทำงานของสื่อในคิโวทอสเป็นความรับผิดชอบของโครโนสงั้นเหรอ?"
10001010-55 = "พูดอะไรน่ะ?!"
10001010-56 = "ข่าวซุบซิบและข้อมูลเท็จที่ออกมาจากสื่อเหลืองอย่างโครโนสเทียบไม่ได้กับข่าวของ <เรดแบร์>#nที่ทั้งถูกต้องและรวดเร็วหรอกนะ!"
10001010-57 = "ถ้ามีเวลา สหายก็อ่านข่าวของ <เรดแบร์> บ้างล่ะ#nแล้วจะได้รู้ความจริงมากมายที่ไม่เคยรู้มาก่อน ฮ่าฮ่า!"
10001010-60 = "บรรณาธิการ เตรียมออก <เรดแบร์> ฉบับอีวาน คูปาลาหรือยังน่ะ?"
10001010-62 = "ค่ะท่านประธาน เราใช้น้ำหมึกพิเศษและกระดาษที่ดีที่สุดเพื่อ <เรดแบร์> ฉบับพิเศษอีวาน คูปาลา#nและจะใส่รูปของท่านประธานในหน้าแรกด้วยค่ะ"
10001010-63 = "ดีมาก! ถ้าจบงานเทศกาล เราจะมอบเหรียญให้กับพวกเธอด้วย!"
10001010-64 = "ขอบคุณค่ะท่านประธาน!"
10001010-65 = "ฮึ่ม ไหนลองอ่านข่าวดูหน่อยซิ"
10001010-67 = "<ประธานเชริโน่ผู้ยิ่งใหญ่มาตรวจงานต่อเติมอาคารในสวนสนุกด้วยตัวเอง...>"
10001010-68 = "อืม อืมม... ดีเลย!"
10001010-69 = "แต่เดี๋ยวก่อนนะ รูปข้างๆ นี่มันแปลกๆ นะ"
10001010-70 = "ในรูปมีมารินะและโทโมเอะ แต่ทำไมไม่มีเราล่ะ?"
10001010-71 = "คือว่า... พอดีความสูงของท่านประธานน้อยเกินไปมาก... ก็เลยตกเฟรม..."
10001010-72 = "ว่าไงนะ? ว่าเราเป็นเด็กตัวกะเปี๊ยกงั้นเรอะ?!"
10001010-73 = "ฉะ.. ฉันไม่ได้พูดแบบนั้นนะคะ!"
10001010-75 = "ไม่มีมารยาทเอาซะเลย!"
10001010-76 = "ถ้าท่านประธานหลุดเฟรม ก็ตัดต่อเพิ่มเข้ามา แล้วก็เพิ่มความสูงสักหน่อยสิ!"
10001010-77 = "แต่ <เรดแบร์> ของพวกเรานำเสนอข่าวที่เป็นความจริงเท่านั้น..."
10001010-78 = "ฮึ่มม! มารินะ!"
10001010-79 = "ค่ะ ท่านประธาน"
10001010-81 = "จัดการบรรณาธิการที่ดูหมิ่นศักดิ์ศรีแห่งสหภาพเรดวินเทอร์ซะ!"
10001010-83 = "ฉะ... ฉันจะแก้รูปในข่าวให้ค่ะ! ขอร้องเถอะค่ะท่านประธาน!"
10001010-85 = "คำพูดที่เอ่ยไปแล้วกับข่าวที่พิมพ์ออกไปแล้วไม่สามารถแก้ไขย้อนหลังได้ ทำไมเธอไม่รู้เรื่องนี้ล่ะ!"
10001010-89 = "เฮ้อ ช่วงนี้เจอแต่คนที่ทำตัวไม่ถูกใจเอาซะเลย"
10001010-90 = "ถึงเราจะสั่งให้จัดการทุกคนตามใจได้ก็เถอะ"
10001010-91 = "ฮ้าวว... หรือว่าเราจะทำงานมากเกินไปแล้ว ง่วงจังเลย..."
10001010-92 = "โทโมเอะ เราจะกลับไปนอนกลางวัน..."
10001010-93 = "รับทราบค่ะ! ฉันจะเตรียมเครื่องนอนให้อย่างรวดเร็วเลย!"
10001010-94 = "ระหว่างที่เราไปนอนกลางวัน สหายก็ไปพักผ่อนเถอะนะ..."
10001010-96 = "คุณครูใช้ห้องพักผ่อนทางนี้ได้เลยค่ะ"
10001010-97 = "ฉันจะพาไปเองค่ะ เชิญทางนี้ค่ะ"
10001010-99 = "ทางเดินในตึกใหม่ สหภาพเรดวินเทอร์"
10001010-101 = "ทำได้ดีมากค่ะท่านหัวหน้าคณะฯ มารินะ!"
10001010-102 = "อื้ม! ทุกคนก็พยายามได้ดีมาก!"
10001010-103 = "วันนี้เราก็ลงโทษคนผิดกันเสร็จแล้ว แยกย้ายกันไปพักผ่อนดีไหม...?"
10001010-107 = "วะ... ว้าก?"
10001010-111 = "โอ้ยย... เอวฉัน..."
10001010-112 = "ทำไมถึงมีกระป๋องเปล่ามากองอยู่ในที่แบบนี้นะ! ฝ่ายตกแต่งไปทำอะไรกันอยู่!"
10001010-113 = "เดี๋ยวจับในข้อหาบ่อนทำลายเลย!"
10001010-114 = "ว่าแต่ เมื่อกี้เราล้มลงแล้วเหมือนไปชนกับอะไรเข้าเลย..."
10001010-115 = "นี่มันอะไรกัน?"
10001010-119 = "รูปปั้นประธานเชริโน่เหรอ?!"
10001010-120 = "แถมรูปปั้นล้มหน้าคว่ำจนหนวดแตกอีก!"
10001010-121 = "ยะ... แย่ล่ะสิ ทำยังไงดี? เอากาวอะไรมาติดได้ไหมนะ..."
10001010-122 = "ถ้าเรื่องนี้ไปถึงหูของประธานเชริโน่ล่ะก็..."
10001010-126 = "รูปปั้นของเราแตกงั้นรึ? แล้วดันมาแตกตรงจุดสำคัญที่สุดอย่างหนวดอีก!"
10001010-127 = "ฮึ่มม... ยกโทษให้ไม่ได้! ต้องโดนจัดการ ต้องลงโทษ!"
10001010-129 = "นำตัวหัวหน้าคณะฯ มารินะไปที่ห้องน้ำที่สกปรกที่สุดในอาคารเรียนเก่า!#nเราจะให้ทำความสะอาดที่นั่นจนกว่าจะเรียนจบเลย!"
10001010-131 = "ไม่ได้! ห้ามเป็นอย่างนั้นเด็ดขาด! ฉันพยายามตั้งเท่าไหร่กว่าจะขึ้นมาอยู่ในตำแหน่งนี้ได้!"
10001010-132 = "ต้องหาวิธี... วิธีที่จะไม่ถูกประธานเชริโน่ลงโทษ!"
10001010-134 = "เดี๋ยวนะ..."
10001010-135 = "ถ้าไม่มีประธานเชริโน่ ก็ไม่มีการลงโทษนี่นา?"
10001010-136 = "ใช่แล้ว! เราต้องตัดหนวด... เอ้ย... ตัดไฟตั้งแต่ต้นลม! ขับไล่ประธานเชริโน่ไป#nแล้วขึ้นไปเป็นประธานเองเลยดีกว่า!"
10001010-137 = "สมาชิกคณะความมั่นคง! รวมตัว!"
10001010-143 = "จู่ๆ มีเรื่องอะไรเหรอคะ?"
10001010-144 = "เราจะบุกไปสำนักเลขาธิการ ลากพวกผู้บริหารออกมา และปลดประธานเชริโน่!"
10001010-145 = "นี่แปลว่า... เราจะทำการปฏิวัติเหรอคะหัวหน้า?"
10001010-147 = "ใช่! นี่คือการปฏิวัติ!"
10001010-148 = "เราจะไม่ยอมอยู่อย่างหวาดกลัวว่าจะถูกประธานเชริโน่สั่งลงโทษเมื่อไหร่!"
10001010-149 = "ว้าวว ท่านหัวหน้ามารินะของขึ้นแล้ว!"
10001010-150 = "ไปโค่นอำนาจของประธานเชริโน่และลูกน้องเผด็จการของเธอกันเลย!"
10001010-153 = "(ถึงมันจะเป็นแผนการกะทันหัน แต่ก็ออกมาไม่เลวแฮะ)"
10001010-154 = "(ดีล่ะ! ฉันต้องขึ้นเป็นประธานคนใหม่ของเรดวินเทอร์ และโอบรับอำนาจทั้งหมดมาให้ได้!)"
10001010-157 = "เอาล่ะทุกคน! มุ่งหน้าไปยังสำนักเลขาธิการ!"
10001010-158 = "จู่โจม!"

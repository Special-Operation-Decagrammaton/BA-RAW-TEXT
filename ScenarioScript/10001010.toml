[translation]
10001010-1 = "#title;제1화;숙청으로 물든 축제"
10001010-2 = "#place;붉은겨울 학원 급양소"
10001010-3 = "3;체리노;01;이곳이 바로 우리 붉은겨울 학원의 식사를 책임지는 급양 시설이다!\n#3;em;[반응]\n#3;a"
10001010-4 = "3;체리노;99;식사는 생명 활동의 근간! #n지위가 낮다고 해서 식사에 차별을 받는 건 있을 수 없는 일이다."
10001010-5 = "3;체리노;01;때문에 우리 붉은겨울 학원에서는 모든 학생들이 동일한 양의 음식을 배급받게 된다!"
10001010-6 = "3;체리노;02;물론 이 학원의 서기장이자 학생회장이자, 미화부장이자, 청소부장이자…\n#3;em;…"
10001010-7 = "3;체리노;04;어……\n#3;stiff"
10001010-8 = "3;체리노;01;여하튼 대단한 것은 모두 도맡고 있는 이 체리노 님은 위대하니까, 푸딩 하나를 더 먹을 수 있는 특권이 있다!\n#3;em;[!]\n#3;hophop"
10001010-9 = "3;체리노;03;그 이외에는 모두가 평등한 식사를 누릴 수 있지, 음하하!"
10001010-10 = "[s] \"여기서는 무슨 음식을 만들고 있는 거야?\""
10001010-11 = "3;체리노;01;좋은 질문이다, 콤라드! #n이 몸도 아까 전부터 나는 이 달콤한 냄새가 궁금했거든.\n#3;em;[반응]"
10001010-12 = "3;체리노;02;조리장. 지금 만들고 있는 음식이 무엇이지?\n#3;em;[?]"
10001010-13 = "3;체리노;01\n#3;d\n#wait;1000"
10001010-14 = "#na;급양부장 붉은겨울;네! 위대하신 회장님의 명령에 따라 이반 쿠팔라 축제에 쓸 푸딩을 만들고 있었습니다."
10001010-15 = "#na;급양부장 붉은겨울;이번 이반 쿠팔라에는 푸딩의 배급량을 두 배로 늘리라는 지시가 있으셔서…… 급양부의 부원 모두가 밤낮을 가리지 않고 푸딩을 만드는 데 매진하고 있습니다."
10001010-16 = "3;체리노;03;모범적인 급양부원의 자세로군! 좋아, 좋아!\n#3;a\n#3;em;[음표]\n#3;hophop"
10001010-17 = "3;체리노;01;이번 축제가 끝나면 그대들에게 1급 수염 훈장을 수여하겠다!"
10001010-18 = "#na;급양부장 붉은겨울;감사합니다, 회장님!"
10001010-19 = "3;체리노;02;호오…… 이것이 그 푸딩인가. 이 몸이 직접 한 번 먹어보도록 하지.\n#3;em;[반응]\n#3;m3"

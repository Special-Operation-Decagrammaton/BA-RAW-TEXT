[translation]
10001010-1 = "第1話;沉迷於肅清的夏至慶典"
10001010-2 = "赤冬聯邦學園．食堂"
10001010-3 = "這裡是負責我們赤冬聯邦學園伙食的供給設施！"
10001010-4 = "吃飯是維持生命的根本！ #n不能因為身分高低而在飲食上有差別待遇……"
10001010-5 = "因此，在我們赤冬聯邦學園，所有學生都會配給到相同份量的食物！"
10001010-6 = "當然，身為本校的書記長、學生會長、環境美化部長、整潔部長……"
10001010-7 = "那個……"
10001010-8 = "總之，潔莉諾大人我承擔了大大小小的事，是非常偉大的存在。#n所以我有比其他學生多吃一個布丁的特權！"
10001010-9 = "除此之外，其他人都能享受平等的食物。呼哈哈哈！"
10001010-10 = "[s]「這裡現在在製作什麼呢？」"
10001010-11 = "問得好，同志！#n咱從剛才開始也對這股甜味感到好奇。"
10001010-12 = "主廚，現在在做的是什麼料理？"
10001010-14 = "啊，會長！現在正依照偉大會長的命令，為「伊凡．庫帕拉」製作布丁。"
10001010-15 = "因為收到「這次伊凡．庫帕拉的布丁的配給量要增加一倍」的指示，#n所以供給部全體成員正日以繼夜地努力製作布丁。"
10001010-16 = "原來如此，供給部不愧是優良典範！很好！"
10001010-17 = "等這次夏至慶典結束，咱就授予你們「一等鬍子英雄勳章」吧！"
10001010-18 = "非常感謝您，會長！"
10001010-19 = "然後，這就是那個布丁嗎……好，咱就來嚐看看吧。"
10001010-22 = "咬，嚼嚼……"
10001010-23 = "唔……！這，這布丁是怎麼回事！#n不但味道平淡，口感也太軟了吧！？"
10001010-24 = "那，那是因為……#n雖然收到了「提高生產量」的指示，但也被告知「無法追加更多的食材」……"
10001010-25 = "這樣的話牛奶無論如何都不夠，為了增加產量，不得已只好將水給……"
10001010-26 = "在布丁裡摻水！？這都幹了什麼好事……！"
10001010-28 = "就算是為了提高產量，也絕不允許這種事！"
10001010-29 = "瑪麗娜！"
10001010-31 = "您叫我嗎，潔莉諾會長？"
10001010-32 = "肅清！把那些在布丁裡摻水的可惡部員們全部肅清！"
10001010-33 = "請，請會長原諒！我們也不想做這種事……！"
10001010-34 = "你這傢伙！以為對潔莉諾會長的完美計畫做出這種愚蠢行為後，還能全身而退嗎！"
10001010-35 = "還是說，你是想違抗偉大鬍子的權威嗎？"
10001010-36 = "唔唔，怎麼這樣……怎麼這樣……！"
10001010-40 = "呼，發生了點小騷動呢。"
10001010-41 = "[s1]「好可怕……」\n[s2]「赤冬聯邦學園是個可怕的地方呢……」"
10001010-42 = "哈哈，請忘記剛才的騷動吧，同志。這只不過是場小意外。"
10001010-43 = "哈哈，請忘記剛才的騷動吧，同志。這只不過是場小意外。"
10001010-44 = "嗯？被肅清的學生會怎麼樣？"
10001010-45 = "那當然是……"
10001010-46 = "會受到非常可怕的懲罰！"
10001010-47 = "例如……必須自己一個人打掃廁所一星期。"
10001010-48 = "或是中斷零食配給一個月！"
10001010-49 = "所以同志，你最好也不要違抗赤冬聯邦學園的權威，哈哈哈！"
10001010-50 = "總之，繼續前往下個視察地點吧！"
10001010-52 = "赤冬聯邦學園．印刷所"
10001010-53 = "這裡是負責我們赤冬聯邦學園內部宣傳和廣播的《赤熊》日報編輯部！"
10001010-54 = "嗯？你說奇普托斯的媒體活動不都是克洛盧斯學園負責的嗎……？"
10001010-55 = "說什麼呢……！"
10001010-56 = "《赤熊》和克洛盧斯那種煽動性的新聞可不同！#n其報導之快及準確，可不是那種充斥著八卦和假訊息的新聞可比擬的！"
10001010-57 = "如果有機會的話，同志也讀一讀《赤熊》吧。#n相信會知道很多之前不知道的事實，哈哈哈哈哈！"
10001010-60 = "主編，《赤熊～伊凡．庫帕拉特刊～》準備的如何？"
10001010-62 = "是的，沒有什麼問題，會長。這次的伊凡．庫帕拉特刊，#n我們會使用特殊的彩色墨水和最高級的紙張，將會長的大肖像印刷在封面上。"
10001010-63 = "好極了！這次的夏至慶典結束後，我也會授予你們勳章！"
10001010-64 = "我感到無比光榮！非常謝謝您，會長！"
10001010-65 = "呼呣，那咱就來拜讀一下吧。"
10001010-67 = "「偉大的潔莉諾學生會長視察了遊樂園的擴建工程現場……」"
10001010-68 = "哼呣哼呣，很好！"
10001010-69 = "……嗯？等等，主編。這張照片……"
10001010-70 = "瑪麗娜和智惠都在畫面裡，但卻沒有拍到最重要的咱。這是怎麼回事？"
10001010-71 = "這，這是因為……當時沒有墊腳用的檯子，所以很難同時收進同張照片裡……"
10001010-72 = "什麼……？這是在說咱是個小不點嗎！？"
10001010-73 = "沒，沒有的事！我絕對不會說那種話……！"
10001010-75 = "這個無禮之徒！"
10001010-76 = "就算真是這樣，也能用合成後製等方法，讓會長看起來很高大吧！"
10001010-77 = "但，但我們《赤熊》一直是只報導事實的誠實媒體……"
10001010-78 = "唔唔唔……！瑪麗娜！"
10001010-79 = "是，會長。"
10001010-81 = "這傢伙侮辱了象徵赤冬聯邦學園最高尊嚴的潔莉諾會長！立刻肅清這放肆的主編！"
10001010-83 = "我，我馬上修改報導！馬上就改，會長！"
10001010-85 = "無論是說出口的話還是報導，都是無法事後修正的……你難道不知道嗎！"
10001010-89 = "呼嗚……感覺最近特別多放肆的人呢。"
10001010-90 = "嘛，反正只要把所有人都肅清就行了，沒什麼好在意的。"
10001010-91 = "呼哈……有點工作過度了呢，好睏……"
10001010-92 = "智惠，咱要回去睡個午覺……"
10001010-93 = "呵呵，我明白了。馬上為您準備床鋪。"
10001010-94 = "同志也在咱午覺的時候休息一下吧……"
10001010-96 = "老師請使用休息室。"
10001010-97 = "我來帶路。來，往這邊。"
10001010-99 = "赤冬聯邦學園．新館的走廊"
10001010-101 = "辛苦了，瑪麗娜委員長！"
10001010-102 = "嗯！大家也辛苦了！"
10001010-103 = "今天也暢快地完成了肅清，我看就回宿舍休息吧……"
10001010-107 = "啊，嗚哇！？"
10001010-111 = "痛痛痛……嗚，我的腰……"
10001010-112 = "這種地方怎麼會有鐵罐滾來滾去，環境美化部在做什麼！"
10001010-113 = "乾脆以涉嫌怠工為由，把所有部員都帶走吧！？"
10001010-114 = "話說回來，跌到的時候好像撞到了什麼……"
10001010-115 = "到底是……？"
10001010-119 = "這，這是潔莉諾會長的石像！？"
10001010-120 = "而且因為是向前倒下的，鬍子的部分裂成了奇怪的形狀！"
10001010-121 = "怎，怎麼辦？貌似用黏著劑也修復不了……"
10001010-122 = "如，如果被潔莉諾會長發現的話……"
10001010-126 = "你弄壞了咱的石像？而且還是讓鬍子的部分脫落，變成奇怪的樣子？"
10001010-127 = "唔唔……這種事，不可原諒！肅清，肅清！"
10001010-129 = "把瑪麗娜委員長押送至舊校舍最髒的廁所裡！一直打掃直到畢業為止！"
10001010-131 = "那，那可不行！為了站到這個位子上，我付出了多少的努力……！"
10001010-132 = "方法，得找出不被潔莉諾會長肅清的方法……！"
10001010-134 = "……等等。"
10001010-135 = "相反的，只要沒有潔莉諾會長，就不會被肅清了吧？"
10001010-136 = "沒錯……！戰術的基本就是先發制人！#n只要我把潔莉諾會長趕下台並當上會長的話，就不會被肅清了！"
10001010-137 = "保安委員，全員集合！"
10001010-143 = "委員長，有什麼急事嗎？"
10001010-144 = "……現在，我們要向事務局發動進攻。拉下所有幹部，討伐潔莉諾會長！"
10001010-145 = "委員長，你的意思是……打算要發動革命嗎？"
10001010-147 = "沒，沒錯！就是革命！"
10001010-148 = "……絕對不是因為害怕被潔莉諾會長肅清才這麼做的！"
10001010-149 = "哦哦，瑪麗娜委員長拔劍了！"
10001010-150 = "是時候向腐敗的潔莉諾會長和其同黨高舉鐵鎚了！"
10001010-153 = "（雖然是一時興起才做的，但結果……比預期中還好！）"
10001010-154 = "（很好，就這樣成為赤冬的新會長，享受所有權力吧！）"
10001010-157 = "好！那麼所有人，朝事務局的方向……"
10001010-158 = "突擊！"

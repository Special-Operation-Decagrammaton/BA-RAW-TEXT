[translation]
10002105-1 = "第10話;打西瓜（２）"
10002105-3 = "嗚，真不甘心……"
10002105-4 = "但是……就算我在這裡倒下……"
10002105-5 = "也不會容許，有人拿食物來玩……"
10002105-6 = "銘記在心吧……總有一天，當你們面臨十字路口的時候……"
10002105-12 = "哈啊，哈啊……"
10002105-13 = "……"
10002105-14 = "為，為什麼我們要這樣全力戰鬥呢……"
10002105-15 = "明明毫無疑問是我們贏了，卻沒有勝利的感覺呢……"
10002105-16 = "我想這位同學至少在對食物的心意這方面，是遠遠贏過我們的。"
10002105-17 = "不是，我不是那個意思……"
10002105-19 = "（之後和泉一起回到海之家，享用了盡力回收回來的、本應被用來打西瓜的西瓜）"

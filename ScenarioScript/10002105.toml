[translation]
10002105-1 = "ตอนที่ 10;ปิดตาตีแตงโม 2 "
10002105-3 = "อ๊าาาา..."
10002105-4 = "น่าโมโหชะมัด... แต่ถึงพวกเธอจะเอาชนะฉันได้... "
10002105-5 = "แต่ยังไงฉันก็ไม่ยกโทษให้พวกคนที่เอาอาหารมาล้อเล่นหรอก..."
10002105-6 = "หวังว่าพวกเธอจะรู้ว่ามีคนที่ไม่ยกโทษให้กับการกระทำของพวกเธออยู่..."
10002105-12 = "เฮ้อ... ฮู่ว..."
10002105-13 = "..."
10002105-14 = "อะไรน่ะ? ความรู้สึกแบบนี้... ความรู้สึกไม่ค่อยสบายใจแบบนี้มัน..."
10002105-15 = "ถึงจะชนะก็เถอะ แต่ไม่ได้รู้สึกภูมิใจในชัยชนะเท่าไหร่เลย..."
10002105-16 = "ฉันรู้สึกว่าเธอมีความมุ่งมั่น และมีใจรักในอาหารมากกว่าพวกเรามาก"
10002105-17 = "ไม่นะ ฉันไม่ได้หมายความว่าแบบนั้น..."
10002105-19 = "(จากนั้นทุกคนก็พาอิซุมิที่หมดสติกลับไปที่ร้านริมทะเล และแบ่งแตงโมกินกันอย่างเอร็ดอร่อย)"

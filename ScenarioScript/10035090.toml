[translation]
10035090-1 = "ตอนที่ 6;จับจระเข้ค่ะ!"
10035090-7 = "อะไรกัน!"
10035090-8 = "เกราะที่หุ้มตัวทนทานมากเลยค่ะ!"
10035090-9 = "นี่เธอ! เธอยิงกระสุนไม่โดนเองต่างหากเล่า!"
10035090-10 = "ตั้งใจยิงหน่อยสิ!"
10035090-12 = "ช่วยไม่ได้หรอก นั่นน่ะเหมือนภัยพิบัติทางธรรมชาติเลยนะ"
10035090-13 = "ถึงฉันจะยอมรับว่าเจ้าจระเข้นั่นมีพลังป้องกันยอดเยี่ยมก็เถอะ"
10035090-14 = "เรารัวกระสุนไปไม่ยั้งขนาดนั้น แต่เกราะก็บุบไปแค่นิดเดียว ส่วนตัวมันไม่เป็นอะไรเลยด้วย"
10035090-15 = "ใครเป็นคนสร้างหุ่นยนต์ที่แข็งแกร่งแบบนี้มานะ?"
10035090-16 = "แถมยังเคลื่อนไหวได้รวดเร็วและโจมตีได้หลายวิธีอีก"
10035090-17 = "แต่ยังไงก็ค่อยโล่งใจหน่อยที่มันไม่โจมตีลูกค้าสวนน้ำ แต่กลับเลือกทำลายพวกสไลเดอร์สระน้ำ หรือไม่ก็น้ำพุมากกว่า..."
10035090-18 = "ฉันไม่เข้าใจอัลกอริทึมการกระทำของมันเลย"
10035090-19 = "ไม่รู้ด้วยว่าถูกสร้างมาด้วยจุดประสงค์อะไรตั้งแต่แรก..."
10035090-29 = "จระเข้จักรกลเปลี่ยนทิศทางแล้วค่ะ! หรือว่าการโจมตีของเราได้ผลแล้ว?!"
10035090-30 = "นี่! จะหนีงั้นเรอะ? กลับมาสู้กันสิ!"
10035090-39 = "[ns1] \"ตรงนั้นมัน...!\"\n[ns2] \"สระเด็กที่ไปอยู่เมื่อกี้...?\""
10035090-44 = "เฮอะ! เผ่นแน่บไปนู่นแล้ว!"
10035090-45 = "มาทางไหนกลับไปทางนั้นเลยนะ เจ้าสัตว์ประหลาด!"
10035090-50 = "ไม่ได้นะ ถ้าไปทางนั้นละก็...!"
10035090-54 = "กรี๊ดดดดด!"
10035090-55 = "[ns] \"เด็กๆ...!\""
10035090-60 = "ชิ!"
10035090-70 = "หัวหน้ากรมฯ คันนะ?!"
10035090-72 = "หัวหน้ากรมฯ!"
10035090-73 = "หมาบ้า?!"
10035090-74 = "[s] \"คันนะ!\""
10035090-83 = "ชะ... ช่วยเด็กไว้ได้แล้ว!"
10035090-84 = "ถึงจะหลบได้ครั้งหนึ่ง...! แต่ทำแบบนี้มันอันตรายนะคะ!"
10035090-85 = "จระเข้อาจเล่นงานเราก็ได้นะ! แบบนั้นละเรื่องใหญ่เลย!"
10035090-91 = "..."
10035090-92 = "ถอยไปซะ"
10035090-101 = "[ns3] \"หะ... หืม?!\"\n[ns4] \"จระเข้... หยุดเหรอ?!\""
10035090-104 = "อะ... อะไรกัน..."
10035090-105 = "จระเข้จักรกลนิ่งไปเลย... ทำไมมันถึงไม่ขยับเลยล่ะคะ?!"
10035090-107 = "ใช่เวลามาถามอยู่มั้ย!"
10035090-108 = "รีบปาระเบิดมือใส่ก่อนที่มันจะเคลื่อนไหวอีกครั้งสิ!"
10035090-110 = "เจ้าจระเข้บ้า เพราะแกแท้ๆ พวกเราถึงโดนเข้าใจผิดน่ะ!"
10035090-111 = "แกต้องชดใช้ความผิดนี้ด้วยชีวิต!"

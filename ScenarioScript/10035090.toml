[translation]
10035090-1 = "第9話;鱷魚，制伏！"
10035090-7 = "唔哇！"
10035090-8 = "這傢伙的外殼果然還是太硬了！"
10035090-9 = "喂！你的子彈根本完全沒中！"
10035090-10 = "敢不敢好好瞄準啊！"
10035090-12 = "那是不可能的。就像天災一樣是不可抗力。"
10035090-13 = "話雖如此，那隻鱷魚的防禦力真不是蓋的。"
10035090-14 = "挨了那麼多發子彈也只有外殼稍微凹陷，幾乎還是完好無損的狀態。"
10035090-15 = "到底是誰做出來的？"
10035090-16 = "而且不只是動作十分敏捷，攻擊手段還很多變。"
10035090-17 = "唯一值得慶幸的是和攻擊遊客相比，#n它似乎對破壞滑水道、噴泉這類的設施更感興趣……"
10035090-18 = "真不知道它的行為演算法是怎麼設計的。"
10035090-19 = "它被製作出來的目的究竟是……"
10035090-29 = "機械鱷魚改變方向了！難道是攻擊奏效了嗎！？"
10035090-30 = "喂！別跑啊！給我回來繼續打！"
10035090-39 = "[ns1]「那個方向是……！」\n[ns2]「剛才的兒童泳池……？」"
10035090-44 = "哈哈！快看它夾著尾巴逃跑的模樣！"
10035090-45 = "滾回老家去吧，怪物！"
10035090-50 = "不妙，那個方向是……！"
10035090-54 = "呀啊啊！"
10035090-55 = "[ns]「小朋友們……！」"
10035090-60 = "呿！"
10035090-70 = "環奈局長！？"
10035090-72 = "局長！"
10035090-73 = "狂犬！？"
10035090-74 = "[s]「環奈！」"
10035090-83 = "成，成功救到孩子了！"
10035090-84 = "雖然成功躲過一次……！危險！"
10035090-85 = "他們在鱷魚的行進路線上！這樣下去會出事的！"
10035090-91 = "……"
10035090-92 = "給我後退。"
10035090-101 = "[ns3]「什，什麼！？」\n[ns4]「鱷魚……停下來了！？」"
10035090-104 = "怎，怎麼回事……"
10035090-105 = "機械鱷魚停下來了……為，為什麼呢！？"
10035090-107 = "現在是問這個的時候嗎！"
10035090-108 = "快趁它重新動起來之前丟手榴彈！"
10035090-110 = "臭鱷魚，都是你害我們被誤會的！"
10035090-111 = "這筆帳就用你的命來償還吧！"

[translation]
1502-1 = "Trouble & Trackers Part 2"
1502-2 = "Seminar Executive Office"
1502-4 = "Yuuka, I've returned with the scale used in the physical exams."
1502-5 = "Thank you, Eimi."
1502-6 = "I'm relieved my fears were unfounded. Thankfully, no disgruntled students caused a scene about the exam results this time."
1502-7 = "\"This time\"?"
1502-8 = "It's happened before. Millennium has a lot of...eccentric students, let's just say. Some have brought their inventions to their physicals and caused complications in the past."
1502-9 = "There was that one student who tried to wear jet propulsion shoes while being weighed. And another time, one of them brought an entire exoskeleton suit for the strength test."
1502-10 = "I wish they'd see we're only measuring their personal physical development."
1502-11 = "I had no idea. That's incredible."
1502-12 = "It's not that I can't empathize with some of them. Frankly, I had the nerve to unload an entire magazine into the scale after being weighed this year."
1502-13 = "It's the Game Development Department's fault! I always end up eating too much junk food when I'm around them."
1502-14 = "Could you not just modify your own record with your authority?"
1502-15 = "I-I would never do that! A Seminar executive mustn't abuse her power for her own gain!"
1502-16 = "I may be treasurer, but I have to adhere to the same rules as everyone else."
1502-17 = "If you say so."
1502-22 = "Actually, I'm about to enter the data for the student records. What was the password again?"
1502-23 = "I don't remember changing it at any point. It should be the same."
1502-24 = "Try \"1q2w3e4r\"."
1502-29 = "That worked. Thanks."
1502-31 = "Veritas Hackers' Lounge"
1502-32 = "We're in."
1502-33 = "Way to go, Kotama!"
1502-34 = "How'd you figure out the password to the student records server?"
1502-35 = "It's still the default password assigned at setup."
1502-36 = "Are you telling me that tightwad treasurer hasn't changed the password even once? How can she be so oblivious to basic cybersecurity?!"
1502-37 = "It only makes our job easier in the end."
1502-38 = "I'll take it from here. Moving my drone to the server room now.#nAccessing the internal network from there will be a cinch after my latest adjustments."
1502-44 = "Done. We should have full access now."
1502-45 = "Are you ready, Maki?"
1502-46 = "I'm on it!"
1502-50 = "Scanning the device node Hare's drone is connected to..."
1502-54 = "Neutralizing proxy with an overload..."
1502-58 = "And using stolen password to takeover admin privileges..."
1502-64 = "Bingo! Authorization granted, and now these records are all mine!"
1502-65 = "Now let's see here..."
1502-66 = "First, I'll decrease my weight by 10 kilos and increase my height by 10 centimeters. Now how about I bump my chest up to 90 centimeters..."
1502-67 = "Is there a body type with that kind of weight? You're being a little unrealistic."
1502-68 = "Maki, change mine too."
1502-69 = "Heehee. Your wish is my command!"
1502-74 = "Oh? What do we have here? It's our beloved Seminar treasurer Yuuka's physical records."
1502-75 = "I've never really cared for her—too much of a meddler for my tastes. What do you say we have some fun?"
1502-76 = "How so?"
1502-77 = "Would you look at that? Yuuka is suddenly up to 100 kilos!"
1502-78 = "Wait until she sees this. If only I could see the look on her face."
1502-79 = "This is pettier than petty."
1502-88 = "Wh-What's going on? I'm getting kicked out!"
1502-89 = "We're being back-hacked from beyond the server! We have less than 10 seconds before we're traced!"
1502-90 = "Maki, erase the log and disconnect. Now!"
1502-91 = "B-But we worked so hard to get here. Ugh, fine!"
1502-92 = "Wait! If there's another node nearby... Got it, lemme copy it over!"
1502-98 = "SYSTEM: Copying \"student_data\" folder to \"social_network\" folder."
1502-99 = "What are you doing?!"
1502-100 = "What? I'm just backing up the data real quick before we lose access."
1502-101 = "Look closer! You're uploading the entire Millennium student body records to a public social networking server!"
1502-102 = "Uh-oh..."
1502-104 = "Seminar Executive Office"
1502-105 = "This...can't be right."
1502-106 = "What's wrong, Eimi? It's rare to see anything ever faze you."
1502-107 = "The students' physical exam results shouldn't be public, correct?"
1502-108 = "Of course not. Our students' personal information is kept under the tightest of security protocols. Not even Veritas would be able to worm their way into that system."
1502-109 = "Then why has it been posted all over social media?"
1502-110 = "Wh-What? You're kidding..."
1502-115 = "You're not! B-But who would do this? And why?!"
1502-119 = "Yuuka."
1502-120 = "What is it?!"
1502-121 = "I didn't realized you had gained so much weight. Have you considered dieting?"
1502-122 = "E-Excuse me? That's a little rude, don't you think?!"
1502-123 = "I-I know I gained a little weight, but I'm still considered average for someone my size!"
1502-124 = "But it says right here that you weighed in at 100 kilos."
1502-129 = "That's not possible!!!"

[translation]
1502-1 = "Trouble & Trackers（２）"
1502-2 = "千年．研討會辦公室"
1502-4 = "優香，我把身體測量時使用的體重計帶來了。這就是最後一個了。"
1502-5 = "辛苦你了，英美。"
1502-6 = "呼……我本來還擔心會不會有對身體測量結果不滿的學生來鬧事，幸好這次什麼事都沒發生。"
1502-7 = "「這次」？"
1502-8 = "畢竟千年奇怪的學生不少，所以每當身體測量時，經常有學生帶自己開發的發明來作亂。"
1502-9 = "像是想穿著有噴射裝置的鞋子量體重、或是想穿著強化外骨骼測量力氣之類的……"
1502-10 = "為什麼大家都不懂身體測量的目的，是掌握「自己正確的發育狀態」呢？"
1502-11 = "這樣啊，真不可思議。"
1502-12 = "當然，我也不是不能理解他們的心情。#n在做這次的身體健康檢查時，我也很想調整體重計的刻度。"
1502-13 = "嗚嗚……之前和遊戲開發部的那些孩子們在一起的時候吃了太多零食……"
1502-14 = "依優香的權限，不是能輕鬆修改學籍資料的記錄嗎？"
1502-15 = "那可不行！要是研討會的幹部濫用權限，學校的風紀不就要亂成一團了嗎？"
1502-16 = "研討會的會計必須要比任何人都公正才行！"
1502-17 = "原來如此……"
1502-22 = "優香，我想在學籍資料裡輸入新的紀錄，登入密碼是什麼？"
1502-23 = "學籍資料的密碼？我不記得有特別改過密碼，應該和預設一樣吧？"
1502-24 = "你輸入<1q2w3e4r>看看。"
1502-29 = "……啊，成功了。謝謝。"
1502-31 = "貝里塔斯．駭客休息室"
1502-32 = "……監聽完成。"
1502-33 = "不愧是小玉前輩！"
1502-34 = "所以，你查出登入學籍資料伺服器的密碼了嗎？"
1502-35 = "是的，優香同學直接沿用了預設密碼。"
1502-36 = "咦？身為千年的會計，竟然沒改密碼直接沿用？#n……安全意識是不是太低啦？"
1502-37 = "不過正因如此，我們這些駭客才能這麼容易就入侵伺服器。"
1502-38 = "接下來就輪到我的無人機登場了呢。稍等一下。#n我將無人機派到能連接區域網路的伺服器附近。"
1502-44 = "……入侵完成。已經接好連接端子了唷。"
1502-45 = "接下來真紀你自己可以解決吧？"
1502-46 = "當然，包在我身上吧！"
1502-50 = "從晴前輩的無人機連接到的節點掃描連結的裝置……"
1502-54 = "讓代理伺服器超載使其無法運作之後……"
1502-58 = "再利用偷聽到的密碼奪取管理員權限……"
1502-64 = "YES！取得身體測量記錄的修改權限了！"
1502-65 = "接下來該從哪裡開始修正呢？"
1502-66 = "總之先把體重減少10kg，身高增加10cm之後，再把胸圍改成90cm……"
1502-67 = "那種體型會有那種體重？再怎麼說也太不現實了吧？"
1502-68 = "真紀，我的也拜託你改成那樣。"
1502-69 = "呵呵，儘管開口。想怎麼改就怎麼改！"
1502-74 = "嗯？這是什麼資料？#n研討會的會計……啊，是優香前輩的身體測量記錄。"
1502-75 = "最近總是一直來妨礙我們……趁這個機會來點惡作劇吧？"
1502-76 = "惡作劇？"
1502-77 = "我要修改資料，把優香前輩的體重改成100kg！"
1502-78 = "這樣一來，之後他確認自己體重的時候肯定會大吃一驚吧！呵呵呵……"
1502-79 = "嘴上說的正義凜然，卻做些私人的報復呢……"
1502-88 = "咦，咦？金鑰突然失效了！這是怎麼回事！？"
1502-89 = "似乎有人在伺服器的另一端嘗試反向駭入。還剩10秒……！"
1502-90 = "真紀，快刪除Log斷開連線！"
1502-91 = "可，可是！#n就這麼放棄好不容易獲得的資料，太可惜了……！"
1502-92 = "附近有其他節點……哎，不管了！先隨便複製一個地方吧！"
1502-98 = "＜SYSTEM＞#n正在將檔案從「student_data」資料夾複製到「social_network」資料夾……"
1502-99 = "等等！真紀，你做了什麼？"
1502-100 = "咦？我想在權限被奪取之前備份數據……"
1502-101 = "你剛才上傳學籍資料的地方是公開的社群網站伺服器！"
1502-102 = "……完蛋了。"
1502-104 = "千年．研討會辦公室"
1502-105 = "……咦？"
1502-106 = "怎麼了，英美？難得看你露出驚訝的表情。"
1502-107 = "優香，雖然我想應該不太可能，但學生們的身高和體重是對外公開的資訊嗎？"
1502-108 = "什麼？那怎麼可能。今天測得的學生身體資訊都被嚴密保存在最高等級的安全系統中。就算是貝里塔斯的駭客們應該也無從對這些資訊下手才對呀？"
1502-109 = "但是現在大家的身體測量記錄被上傳到校內的社群網站上了唷。"
1502-110 = "你，你說什麼！？"
1502-115 = "是，是真的。是誰做的？#n……而且是怎麼做到的？"
1502-119 = "優香。"
1502-120 = "怎，怎麼了？"
1502-121 = "確實是胖了呢。看來有必要做好飲食管理。"
1502-122 = "啊？？怎，怎麼突然說這種傷人的話！？"
1502-123 = "我，我的體重和去年相比確實是稍微增加了一點……但還在平均體重的範圍內唷！？"
1502-124 = "可是在上傳到社群網站上的優香的紀錄，體重是100公斤……"
1502-129 = "那怎麼可能嘛──────！！"

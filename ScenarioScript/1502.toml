[translation]
1502-1 = "Trouble & Trackers 2"
1502-2 = "สำนักงานเซมิน่า มิลเลเนียม"
1502-4 = "ยูกะ ฉันเอาเครื่องชั่งน้ำหนักที่ใช้ตรวจร่างกายมาแล้ว นี่อันสุดท้ายล่ะ"
1502-5 = "ขอบใจมากนะ เอมิ"
1502-6 = "เฮ้อ... ฉันกังวลว่าพวกนักเรียนที่ไม่พอใจกับผลการตรวจร่างกายจะก่อปัญหาขึ้นมาน่ะ แต่โชคดีที่คราวนี้ไม่มีเรื่องอะไร"
1502-7 = "คราวนี้งั้นเหรอ?"
1502-8 = "ที่มิลเลเนียมมีพวกคนประหลาดไม่เต็มบาทอยู่เยอะมาก เพราะงั้นทุกครั้งที่มีการตรวจร่างกายทีไร ก็มักจะมีพวกที่ชอบเอาสิ่งประดิษฐ์ที่ตัวเองพัฒนาขึ้นมาแล้วก่อความวุ่นวายอยู่ตลอดเลยน่ะสิ"
1502-9 = "ทั้งพวกที่ใส่รองเท้าที่ติดตั้งระบบขับเคลื่อนไอพ่นมาชั่งน้ำหนัก หรือพวกคนที่ใส่ชุดเพิ่มมวลกล้ามเนื้อมาตอนวัดความแข็งแรงของกล้ามเนื้อ..."
1502-10 = "ทำไมทุกคนถึงไม่เข้าใจกันนะว่าเราตรวจร่างกายเพื่อตรวจดูระดับการพัฒนาการของร่างกายกัน?"
1502-11 = "งั้นเหรอ น่าสนใจจัง"
1502-12 = "ไม่ใช่ว่าฉันไม่เข้าใจพวกเธอหรอกนะ ฉันเองตอนตรวจร่างกายคราวนี้ฉันก็อยากปิดๆ ตัวเลขบนตาชั่งทิ้งไปเหมือนกัน"
1502-13 = "อืม... สมกับเจ้าพวกชมรมพัฒนาเกมจริงๆ เลยนะ กินขนมเข้าไปตั้งเยอะขนาดนั้น..."
1502-14 = "ถ้าเป็นยูกะละก็ การแก้ไขบันทึกข้อมูลนักเรียนมันเป็นเรื่องง่ายมากเลยไม่ใช่เหรอ?"
1502-15 = "ทำแบบนั้นไม่ได้นะ! ถ้าใช้อำนาจของกรรมการเซมิน่าในทางที่ผิด จะทำให้กฎระเบียบของโรงเรียนพังไม่เป็นท่าได้เลย"
1502-16 = "นักบัญชีของเซมิน่าน่ะ จะต้องมีความเที่ยงตรงมากกว่าใครๆ นะ แบบนั้นถึงจะถูก!"
1502-17 = "แบบนี้นี่เอง..."
1502-22 = "ยูกะ ฉันจะกรอกข้อมูลในบันทึกข้อมูลนักเรียนน่ะ รหัสผ่านอะไรเหรอ?"
1502-23 = "รหัสผ่านบันทึกข้อมูลนักเรียนเหรอ? ไม่ได้มีข้อมูลที่ต้องแก้ไขเป็นพิเศษนี่ คงเป็นรหัสที่ใช้ในตอนแรกนั่นล่ะ"
1502-24 = "ลองใส่รหัส <1q2w3e4r> นี่ดูสิ"
1502-29 = "อ๊ะ ได้แล้วล่ะ ตรวจสอบเรียบร้อย"
1502-31 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
1502-32 = "ดักฟังสำเร็จ"
1502-33 = "สมกับเป็นรุ่นพี่โคทามะจริงๆ เลย!"
1502-34 = "งั้นก็ได้พาสเวิร์ดเข้าเซิร์ฟเวอร์เก็บข้อมูลบันทึกข้อมูลนักเรียนแล้วใช่มั้ย?"
1502-35 = "ค่ะ คุณยูกะยังใช้เป็นพาสเวิร์ดเริ่มต้นอยู่เหมือนเดิมค่ะ"
1502-36 = "ว่าไงนะ? คนที่เป็นถึงนักบัญชีของมิลเลเนียมแบบนั้น ใช้พาสเวิร์ดเดิมแบบไม่เปลี่ยนเหรอ? สำนึกเรื่องความปลอดภัยต่ำไปรึเปล่าเนี่ย?"
1502-37 = "แต่ก็เพราะอย่างนั้น มันเลยทำให้เราแฮ็กได้ง่ายขึ้นกว่าเดิมนะ"
1502-38 = "คราวนี้ก็ถึงตาโดรนของฉันแล้วล่ะสิ รอเดี๋ยวก่อนนะ ฉันจะใช้โดรนเคลื่อนย้ายไปจนถึงบริเวณที่ติดตั้งเซิร์ฟเวอร์ภายในเอง"
1502-44 = "ส่งโดรนเข้าไปเรียบร้อย เชื่อมต่อกับเครือข่ายภายในสำเร็จ"
1502-45 = "งั้นตั้งแต่ตรงนี้ไป มากิ... เธอจัดการต่อเองได้ใช่มั้ย?"
1502-46 = "แหงอยู่แล้ว เชื่อมือฉันได้เลย!"
1502-50 = "แสกนอุปกรณ์เชื่อมต่อโหนดของโดรนที่รุ่นพี่ฮาเระใช้..."
1502-54 = "โอเวอร์โหลดพร็อกซีเพื่อทำให้ค่าเป็นกลาง จากนั้น..."
1502-58 = "ใช้พาสเวิร์ดที่ดักฟังมา เชื่อมต่อเข้าไปยังสิทธิ์ผู้ดูแลระบบ..."
1502-64 = "ได้แล้ว! ได้สิทธิ์แก้ไขบันทึกการตรวจร่างกายมาไว้ในมือแล้ว!"
1502-65 = "เอาละ ถ้างั้นเริ่มแก้จากตรงไหนก่อนดีนะ?"
1502-66 = "ก่อนอื่นก็แก้น้ำหนักลง 10 กก. เพิ่มส่วนสูงขึ้นอีก 10 ซม. รอบอกเอาเป็นสัก 90 ซม...."
1502-67 = "สัดส่วนแบบนั้นมันสมดุลกับน้ำหนักรึไง? จะโกหกก็เอาให้เนียนหน่อยสิ"
1502-68 = "มากิ รบกวนแก้ของฉันให้ด้วยนะคะ"
1502-69 = "ฮุฮุ ได้อยู่แล้ว ฉันจะแก้ให้เอง!"
1502-74 = "หืม? ข้อมูลอะไรกันเนี่ย? นี่มันบันทึกการตรวจร่างกายของรุ่นพี่ยูกะ นักบัญชีแห่งเซมิน่านี่นา?"
1502-75 = "ฉันไม่ชอบใจเลยที่เธอชอบมาขัดคอกันอยู่เรื่อย... ใช้โอกาสนี้แก้เผ็ดสักหน่อยดีมั้ย?"
1502-76 = "คิดจะก่อเรื่องอะไรอีกแล้วน่ะ?"
1502-77 = "ฉันจะแก้ไขข้อมูลน้ำหนักของรุ่นพี่ยูกะให้เป็น 100 กก. ยังไงล่ะ!"
1502-78 = "แล้วพอรุ่นพี่มาเช็กดูน้ำหนักของตัวเองทีหลังก็คงจะตกใจจนหงายเงิบไปเลย ฮ่าฮ่าฮ่า..."
1502-79 = "โธ่เอ๊ย เรื่องแค่นี้เองแต่กลับอวดซะใหญ่โตเลยนะ..."
1502-88 = "เอ๊ะ... เอ๋? จู่ๆ ก็แก้ไขข้อมูลไม่ได้! เกิดอะไรขึ้นกันเนี่ย?"
1502-89 = "มีใครกำลังพยายามแฮ็กเซิร์ฟเวอร์ซ้อนเข้ามาอยู่ค่ะ อีก 10 วินาที...!"
1502-90 = "มากิรีบลบล็อกการใช้งานและตัดการเชื่อมต่อเดี๋ยวนี้เลย!"
1502-91 = "ตะ...แต่ว่า...! จู่ๆ ก็จะให้ทิ้งข้อมูลที่แฮ็กได้มางั้นเหรอ น่าเสียดายจะตาย!"
1502-92 = "โหนดอื่นรอบๆ... ฮึ่ย ไม่รู้แล้ววว! ก็อปไปไว้ที่อื่นก่อนแล้วกัน!"
1502-98 = "<ข้อความระบบ> กำลังคัดลอกไฟล์จากโฟลเดอร์ \"student_data\" ไปยังโฟลเดอร์ \"Social_network\" "
1502-99 = "เดี๋ยวก่อน! นั่นทำอะไรลงไปน่ะ มากิ?"
1502-100 = "เอ๊ะ? ก็แบ็กอัปข้อมูลไว้ก่อนที่จะเข้าถึงไฟล์ไม่ได้ไง"
1502-101 = "แต่โฟลเดอร์ที่เธอกำลังอัปโหลดข้อมูลนักเรียนไปไว้มันเป็นเซิร์ฟเวอร์โซเชียลมีเดียนะ!"
1502-102 = "พลาดซะแล้ว..."
1502-104 = "สำนักงานเซมิน่า มิลเลเนียม"
1502-105 = "เอ๋...?"
1502-106 = "มีอะไรเหรอ เอมิ? ทำไมทำหน้าตกใจอะไรขนาดนั้น"
1502-107 = "ยูกะ ข้อมูลน้ำหนักกับส่วนสูงของนักเรียนนี่เป็นข้อมูลที่เปิดเผยได้เหรอ?"
1502-108 = "ว่าไงนะ? ไม่มีทาง ข้อมูลการตรวจร่างกายของนักเรียนวันนี้ถูกนำไปเก็บรักษาไว้ด้วยระบบสุดยอด#nความปลอดภัยที่เข้มงวดมากๆ ถึงจะเป็นแฮ็กเกอร์จากเวอริทัสก็ไม่มีทางเจาะข้อมูลนี้ไปได้หรอก"
1502-109 = "แต่ว่าตอนนี้บันทึกการตรวจร่างกายของนักเรียนมันว่อนไปทั่วโซเชียลในโรงเรียนเลยนะ"
1502-110 = "ว่าไงนะะะะะ?"
1502-115 = "ระ...เรื่องจริงเหรอ? ฝีมือใครกันเนี่ย? แล้วทำได้ยังไงกัน?"
1502-119 = "ยูกะ"
1502-120 = "อะไรอีก!?"
1502-121 = "เธอน้ำหนักขึ้นเยอะจริงๆ ด้วย ต้องดูแลตัวเองดีๆ หน่อยสิ"
1502-122 = "ว่าไงนะ? พูดอะไรแบบนั้นน่ะ?"
1502-123 = "นะ...แน่นอนว่าถ้าเทียบกับปีที่แล้วฉันน้ำหนักขึ้นมานิดหน่อย แต่ก็ยังอยู่ในเกณฑ์ปกตินะ"
1502-124 = "แต่ว่าข้อมูลที่ว่อนอยู่ในโซเชียลเขียนน้ำหนักเธอไว้ 100 กก.เลยนะ..."
1502-129 = "จะเป็นแบบนั้นไปได้ยังไงกันเล่า-!!"

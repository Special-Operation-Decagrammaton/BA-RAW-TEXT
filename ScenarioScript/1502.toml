1502-4 = "1;에이미;02;유우카. 신체검사에 쓴 체중계 가져왔어. 이게 마지막이야.\n#1;em;[반응]\n#1;ar"
1502-5 = "5;유우카;01;수고했어, 에이미.\n#5;greeting"
1502-6 = "5;유우카;06;후유……. 혹시나 신체검사 결과에 불만을 가진 학생들이 말썽을 부릴까 걱정했는데, 이번에는 다행히 아무 일도 없었네.\n#5;stiff\n#5;em;[속상함]"
1502-7 = "1;에이미;01;이번에는?\n#1;em;[?]"
1502-8 = "5;유우카;05;밀레니엄에는 워낙 괴짜들이 많다 보니, 신체검사를 할 때마다 자신이 개발한 발명품을 가져와 소동을 벌이는 학생들이 종종 있었거든."
1502-9 = "5;유우카;99;제트 추진 장치가 달린 신발을 신고 몸무게를 재게 해달라는 학생이 있지를 않나, 외골격 슈트를 입고 근력을 측정하게 해달라는 학생이 있지를 않나…….\n#5;em;…"
1502-10 = "5;유우카;06;왜 다들 신체검사는 자신의 발육상태를 파악하기 위한 검사라는 걸 이해하지 못하는 걸까?"
1502-11 = "1;에이미;01;그렇구나. 신기하네."
1502-12 = "5;유우카;99;물론 그 심정을 이해하지 못하는 건 아니야. 나도 이번 신체검사에서는 체중계의 눈금을 확 돌려놓고 싶을 정도였거든.\n#5;em;[땀]"
1502-13 = "5;유우카;06;으으, 게임개발부 녀석들과 어울리며 너무 과자를 많이 먹었어…….\n#5;stiff"
1502-14 = "1;에이미;02;유우카의 권한이라면 학생기록부의 기록 정도는 손쉽게 수정할 수 있잖아?\n#1;em;[?]"
1502-15 = "5;유우카;04;그건 안 돼! 세미나의 임원이 권한을 악용했다가는 학교의 풍기가 엉망이 될 게 뻔하잖아?\n#5;em;[!]\n#5;shake"

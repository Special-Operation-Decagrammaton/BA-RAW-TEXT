[translation]
83306080500-6 = "ฮู่ว... โล่งอกไปทีนะคะที่จับตัวมาได้หมดแล้ว"
83306080500-7 = "ขะ... ขอบคุณนะคะ! คุณฮินะ~!"
83306080500-8 = "ใจฉันเต้นตึกตักไม่เป็นจังหวะเลยค่ะ คิดว่าทุกอย่างจะพังเพราะฉันอีกแล้วเสียอีก...!"
83306080500-9 = "เรื่องแบบนี้เกิดขึ้นบ่อยๆ อยู่แล้วในเกเฮนน่า ไม่มีใครตำหนิจูริทุกเรื่องหรอกนะ"
83306080500-10 = "อีกอย่าง จูริก็กำลังพยายามเพื่อทุกคนอยู่ด้วย ทั้งฟูกะ ฉัน และนักเรียนคนอื่นต่างก็รู้ดี"
83306080500-11 = "งะ... งั้นเหรอคะ...?"
83306080500-12 = "คำพูดของคุณฮินะน่าประทับใจมากเลยค่ะ! ขอบคุณนะคะ!"

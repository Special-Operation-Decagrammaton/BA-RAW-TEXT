90000050-17 = "5;히마리;05\n#5;em;…\n#wait;2500"
90000050-18 = "5;히마리;07;……아니. 이건 그만두죠. 지금 임무와는 관계가 없을 뿐더러, 길고 긴 이야기가 될 것 같으니."

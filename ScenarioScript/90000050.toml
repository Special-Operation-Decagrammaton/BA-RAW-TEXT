[translation]
90000050-1 = "#title;제6화;정보수집 5 - 폐허"
90000050-2 = "3;에이미;02;폐허? 거기가 어디야?\n#3;em;[?]\n#3;a"
90000050-3 = "3;에이미;02\n5;히마리;02;어머나, 에이미? 모르시나요? 소문에 늦은 편이군요.\n#3;m1\n#5;a\n#5;em;[반응]"
90000050-4 = "5;히마리;04;총학생회가 출입을 금지하고 있는 미지의 지역이에요. 버려진 채 오랫동안 방치된 도시라서 <폐허>라고 부르고 있죠."
90000050-5 = "5;히마리;09;그 도시의 기원이나 정체에 대해서는 어떤 것도 알려져 있지 않아요. 연구 자체가 금지된 지역이라…….\n#5;em;[...]"
90000050-6 = "3;에이미;04;나는 처음 들어. 리오 회장도 그런 이야기는 해준 적 없었는데."
90000050-7 = "5;히마리;04;……과연. 리오라면 그럴 수도 있겠죠. 그 사람은 자기가 진짜로 중요하게 생각하는 건 아무에게도 알려주지 않거든요."
90000050-8 = "5;히마리;01;리오는 폐허에 굉장히 관심이 많아요. 과연, 정보를 독점하려는 빅 시스터답달까."
90000050-9 = "5;히마리;02;하지만 그럼에도 폐허에 대한 소문은 밀레니엄의 학생들에 암암리에 퍼져 있는 상태죠."
90000050-10 = "3;에이미;04\n5;히마리;03;선생님도 알고 계시지 않나요? 그곳을?\n#3;dl\n#5;em;[?]\n#5;m3"
90000050-11 = "[s1] \"뭐. 그럭저럭.\"\n[s2] \"음. 글쎄.\""
90000050-12 = "#wait;10"
90000050-13 = "#wait;10"

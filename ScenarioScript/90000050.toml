[translation]
90000050-1 = "Episode 6;Research Part 5: Ruins"
90000050-2 = "The Ruins? Where is that?"
90000050-3 = "Oh, you don't know, Eimi? You really must try to keep up."
90000050-4 = "It's an unidentified area where the General Student Council prohibits entry. It's been abandoned and neglected for so long, people began calling it the Ruins."
90000050-5 = "Nothing is known about the origin or identity of the city, and research is prohibited in that area."
90000050-6 = "This is my first time hearing about it. Even President Rio didn't tell me that."
90000050-7 = "Well, Rio wouldn't have. She doesn't talk about things she considers important."
90000050-8 = "And she is very interested in the Ruins. She's like Big Sister—always controlling the flow of information."
90000050-9 = "But even so, rumors of the Ruins always circulate amongst Millennium students."
90000050-10 = "Don't you know something about that place, Sensei?"
90000050-11 = "[s1] \"Well, maybe a little.\"\n[s2] \"Hmm, not really.\""
90000050-14 = "Aris..."
90000050-18 = "No, forget it. It has nothing to do with this mission, and it's a long story."
90000050-23 = "We'll talk about it next time."
90000050-25 = "Back to the topic, the Ruins is like Trinity's catacombs or the Abyss of Gehenna's Hinnom Volcano."
90000050-26 = "It's one of those mysterious areas of Kivotos that there's little information on. It's been virtually unexplored."
90000050-27 = "It's a place where things in Kivotos disappear and are forgotten...like some sort of sewer."
90000050-30 = "Sewer...septic tank... You like to use those kinds of words, Himari."
90000050-31 = "You think it's dirty and you're judging me, aren't you? You're giving me that look again. It's just an analogy, okay? I'm not as strange as you make me out to be."
90000050-32 = "But you could use any other analogy..."
90000050-33 = "You know what, Eimi?"
90000050-34 = "[s] \"All right, let's stay on subject.\""
90000050-35 = "...Yes, Sensei.  "
90000050-36 = "You got us off-topic again, President."
90000050-37 = "I may have committed many sins in this relationship, but this one was most certainly your fault. But I'll stop, out of respect for Sensei."
90000050-38 = "You're wrong, but I'll stop too. Is our next target in the Ruins?"
90000050-39 = "Yes. The fourth prophet, Chesed, may be hiding somewhere in the Ruins."
90000050-40 = "Chesed... "
90000050-42 = "Decagrammaton made contact with the production AI of the munitions factory and assimilated it as one of Decagrammaton's prophets, gaining access to an infinite number of troops."
90000050-43 = "Chesed is essentially a munitions factory that produces the Decagrammaton army."
90000050-44 = "It's Decagrammaton's main source of troops."
90000050-46 = "However, it's almost impossible to pinpoint the location of the munitions factory in these vast Ruins. We need more data."
90000050-47 = "So, our next target is the Decagrammaton army at the Ruins?"
90000050-48 = "Yes. We'll collect data from the troops and try to track Chesed's location."
90000050-49 = "Understood. "
90000050-50 = "I've routed a path to the Ruins. We'll enter through there and start the mission."
90000050-51 = "Let's go, Sensei."

[translation]
90000050-1 = "第6話;蒐集情報(5)廢墟"
90000050-2 = "廢墟？那是在哪裡呢？"
90000050-3 = "哎呀，英美竟然不知道嗎？#n看來你的消息不夠靈通呢。"
90000050-4 = "「廢墟」指的是被聯邦學生會明言禁止進入的未知地區。#n因為是被長時間棄置且處於荒廢狀態的都市，所以才稱之為廢墟。"
90000050-5 = "有關那座都市的起源與真相全都一無所知。#n畢竟那裡是連加以研究都被禁止的地區……"
90000050-6 = "我還是第一次聽說這件事。莉央會長也沒跟我提過。"
90000050-7 = "……也是，莉央確實可能那麼做呢。#n那個人總是不會把自己認為重要的事告訴任何人。"
90000050-8 = "因為莉央也對廢墟非常感興趣。#n真不愧是想獨佔情報的大姐頭呢……"
90000050-9 = "不過即便如此，與廢墟有關的傳言依然在千年的學生間默默流傳著。"
90000050-10 = "老師應該也對那裡有所耳聞吧？"
90000050-11 = "[s1] 「嗯，算是吧。」\n[s2] 「馬馬虎虎吧。」"
90000050-14 = "愛麗絲他……"
90000050-18 = "……不，現在還是就此打住吧。#n除了跟現在的任務沒有關係之外，也可能會變得沒完沒了。"
90000050-23 = "……這個話題就等之後有機會再繼續吧。"
90000050-25 = "言歸正傳……#n千年的「廢墟」就好比三一的「地下墓穴」，或者是格黑娜欣嫩火山裡的「深淵」。"
90000050-26 = "奇普托斯當中情報有所缺失，或者未被探索的神祕地區之一……"
90000050-27 = "我認為這些地方或許匯集著奇普托斯裡已經消失，或者被人遺忘的事物……#n有點類似下水道吧。"
90000050-30 = "下水道……化糞池……陽葵前輩很喜歡這些詞彙呢。"
90000050-31 = "可以不要用那種「為什麼會喜歡那些骯髒的東西」的表情看我嗎？#n這只是比喻，比喻而已。請不要汙染我清純的形象。"
90000050-32 = "要比喻的話應該還有其他詞彙可以用吧。"
90000050-33 = "你聽我說，英美。#n這世上……"
90000050-34 = "[s] 「好好好，我們先說正題吧。」"
90000050-35 = "……是。"
90000050-36 = "話題又偏掉了。這都是部長的錯。"
90000050-37 = "我承認自己是個罪孽深重的女人……但這次絕對是英美的錯吧？#n現在畢竟還有老師在場，就姑且這麼定案了。"
90000050-38 = "請不要自己擅自定案。#n總之那個「廢墟」裡有下一個目標嗎？"
90000050-39 = "是的。我認為第4名預言者「赫賽德」應該就躲藏在廢墟的某處。"
90000050-40 = "「赫賽德」啊……"
90000050-42 = "十字神名與軍需工廠的生產控制AI接觸後，#n將其化為自己的預言者，並藉此獲得了無限的兵力。"
90000050-43 = "換言之，「赫賽德」就是生產十字神名軍團的「軍需工廠」。"
90000050-44 = "因此「赫賽德」可說是十字神名軍團的核心戰力。"
90000050-46 = "不過要想在如此廣闊的廢墟中直接找出「軍需工廠」的位置近乎不可能……#n所以還是從蒐集情報開始吧。"
90000050-47 = "簡單來說，廢墟裡的十字神名軍團就是下一個目標對吧？"
90000050-48 = "沒錯。我們要從那些士兵身上蒐集情報，藉此追蹤「赫賽德」的位置。"
90000050-49 = "嗯，我知道了。"
90000050-50 = "通往廢墟的道路我已經安排好了。#n進入那裡開始任務吧。"
90000050-51 = "那就出發吧。"

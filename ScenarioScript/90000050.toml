[translation]
90000050-1 = "ตอนที่ 5; รวบรวมข้อมูล 5 - พื้นที่รกร้าง"
90000050-2 = "พื้นที่รกร้างเหรอ? อยู่ที่ไหนน่ะ?"
90000050-3 = "ตายจริง เอมิไม่รู้หรอกเหรอคะ? คงไม่ค่อยตามข่าวอะไรเลยสินะคะ"
90000050-4 = "ก็พื้นที่ปริศนาที่องค์การนักเรียนประกาศเป็นเขตหวงห้ามยังไงล่ะคะ ที่นั่นเป็นเมืองที่ถูกทิ้งร้างมานาน ก็เลยเรียกกันว่า <พื้นที่รกร้าง> ค่ะ"
90000050-5 = "ไม่มีใครรู้ต้นกำเนิดและข้อมูลของเมืองนั้นด้วยค่ะ เพราะมันเป็นเขตที่เข้าไปศึกษาอะไรไม่ได้..."
90000050-6 = "ฉันเพิ่งเคยได้ยินก็คราวนี้แหละ ประธานริโอะก็ไม่เคยเล่าเรื่องแบบนี้ให้ฟังมาก่อน"
90000050-7 = "อืม... ถ้าเป็นริโอะก็พอเข้าใจได้ค่ะ รายนั้นไม่ยอมบอกเรื่องที่ตัวเองคิดว่าสำคัญจริงๆ กับใครหรอกค่ะ"
90000050-8 = "ริโอะสนใจในพื้นที่รกร้างมากเลยละค่ะ สมกับที่เป็นบิ๊กซิสเตอร์ที่จะครอบครองข้อมูลไว้คนเดียว"
90000050-9 = "แต่ถึงอย่างนั้นก็เถอะ ตอนนี้ข่าวลือเกี่ยวกับพื้นที่รกร้างแพร่กระจายอย่างลับๆ ในหมู่นักเรียน#nมิลเลเนียมค่ะ"
90000050-10 = "คุณครูเองก็รู้จักที่นั่น ใช่หรือเปล่าล่ะคะ?"
90000050-11 = "[s1] \"ก็... นิดหน่อย\"\n[s2] \"อืม ก็ไม่รู้สินะ\""
90000050-14 = "อาริสึ..."
90000050-18 = "ไม่สิ... เรื่องนั้นช่างเถอะค่ะ เพราะนอกจากจะไม่เกี่ยวกับภารกิจในตอนนี้แล้ว ยังเป็นเรื่องที่เล่าทั้งวันก็คงไม่จบง่ายๆ"
90000050-23 = "ไว้คราวหน้าถ้ามีเวลาค่อยมาคุยเรื่องนี้กันต่อแล้วกันค่ะ"
90000050-25 = "งั้นกลับมาที่เรื่องหลักกันต่อ สรุปก็คือ เราสามารถมองได้ว่า <พื้นที่รกร้าง> คือที่ที่คล้ายกับ <สุสานใต้ดิน> ของทรีนิตี้หรือไม่ก็ <เหวนรก> ของภูเขาไฟฮินนอมในเกเฮนน่าค่ะ"
90000050-26 = "ถือเป็นหนึ่งในพื้นที่ลึกลับของคิโวทอสที่ข้อมูลสูญหายไป หรือไม่ก็ไม่ถูกสำรวจ..."
90000050-27 = "ฉันว่าบางที... ที่นี่อาจจะเป็นเหมือนทางระบายน้ำเสีย... ที่ที่สิ่งที่หายไปและถูกลืมในคิโวทอส#nมารวมตัวกันก็ได้ค่ะ"
90000050-30 = "ทางระบายน้ำเสีย... ถังบำบัดน้ำเสีย... รุ่นพี่ฮิมาริชอบใช้คำแบบนี้จังเลยนะเนี่ย"
90000050-31 = "อย่ามองด้วยสีหน้าที่ตั้งคำถามว่า \"ทำไมถึงชอบอะไรสกปรกๆ แบบนั้น?\" ได้ไหมคะ? ก็แค่การเปรียบเทียบน่ะค่ะ เปรียบเทียบ อย่าทำให้ภาพลักษณ์สะอาดสะอ้านของฉันต้องดูแปลกๆ ได้ไหมคะ?"
90000050-32 = "ถ้าจะเปรียบเทียบ มันน่าจะมีคำอื่นที่เหมาะสมกว่านะ"
90000050-33 = "จะเอาอย่างนี้เหรอคะเอมิ โลกใบนี้น่ะ..."
90000050-34 = "[s] \"เอาละๆ กลับเข้าเรื่อง\""
90000050-35 = "ค่ะ... "
90000050-36 = "พูดออกทะเลอีกแล้ว เป็นเพราะหัวหน้านั่นแหละ"
90000050-37 = "ฉันยอมรับค่ะว่าฉันคือสตรีที่มีบาปมาก... แต่ครั้งนี้เป็นความผิดของเอมิไม่ใช่เหรอคะ? อีกอย่างคุณครูก็คอยสังเกตการณ์อยู่ ฉันก็เลยช่วยเออออไป"
90000050-38 = "ช่างมันเถอะ ว่าแต่เป้าหมายต่อไปของเราอยู่ใน <พื้นที่รกร้าง> เหรอ?"
90000050-39 = "ใช่ค่ะ ฉันคิดว่า <เชเซ็ด> ผู้เลื่อมใสตนที่ 4 ซ่อนอยู่ที่ไหนสักแห่งในพื้นที่รกร้างค่ะ"
90000050-40 = "<เชเซ็ด> เหรอ... "
90000050-42 = "เดคาแกรมมาทอนได้ทำการติดต่อกับ AI ที่ควบคุมการผลิตของโรงงานผลิตอาวุธ และทำให้ AI นั้นกลายมาเป็นผู้เลื่อมใสของตน ทำให้ได้มาซึ่งกองกำลังไร้ขีดจำกัดไว้ในมือของตัวเองค่ะ"
90000050-43 = "เท่ากับว่าเชเซ็ดก็ไม่ต่างไปจาก <โรงงานอาวุธ> ที่ผลิตกองทัพของเดคาแกรมมาทอน"
90000050-44 = "เชเซ็ดคือกำลังหลักของกองทัพเดคาแกรมมาทอนเลยค่ะ"
90000050-46 = "แต่การหาตำแหน่งของ <โรงงานอาวุธ> ในพื้นที่รกร้างอันกว้างใหญ่แทบจะเป็นเรื่องที่เป็นไปไม่ได้เลย เพราะฉะนั้นเราต้องเริ่มจากการรวบรวมข้อมูลก่อนค่ะ"
90000050-47 = "แสดงว่ากองกำลังเดคาแกรมมาทอนในพื้นที่รกร้างนั่นคือเป้าหมายต่อไปของเราสินะ?"
90000050-48 = "ใช่ค่ะ เราจะรวบรวมข้อมูลและติดตามตำแหน่งของ <เชเซ็ด> จากกองกำลังพวกนั้นค่ะ"
90000050-49 = "อืม เข้าใจแล้ว "
90000050-50 = "ฉันหาเส้นทางไปยังพื้นที่รกร้างนั้นไว้แล้วค่ะ เราจะเข้าไปด้วยเส้นทางนั้นแล้วเริ่มภารกิจกันค่ะ"
90000050-51 = "งั้นเราออกเดินทางกันเลยไหม?"

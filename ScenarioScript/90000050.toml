90000050-23 = "3;히마리;07;……이 이야기는 다음 기회가 있다면 이어서 하도록 하고."
90000050-24 = "#all;hide"
90000050-25 = "#na;히마리;다시 본론으로. ……말하자면 <폐허>는 트리니티의 <카타콤>이나, 게헨나 힌놈 화산의 <어비스> 같은 것이라고 볼 수 있겠죠."
90000050-26 = "#na;히마리;정보가 유실됐거나, 탐험되지 않은, 키보토스의 미스터리한 지역 중 하나……."
90000050-27 = "#na;히마리;저는 이곳이 어쩌면 키보토스에서 사라지고 잊혀진 것들이 모이는…… 일종의 하수구 같은 곳일지도 모른다고 생각해요."
90000050-28 = "#all;hide"
90000050-29 = "3;에이미;04"
90000050-30 = "3;에이미;04;하수구…… 정화조…… 히마리 선배는 그런 단어를 좋아하는구나?\n#3;em;…"
90000050-31 = "3;히마리;05;그렇게 '왜 그리 지저분한 걸 좋아하는 거야?' 같은 얼굴로 보지 말아줄래요? 비유예요. 비유. 저의 청초한 이미지를 이상하게 만들지 말아줄래요?\n#3;em;[!]"
90000050-32 = "3;에이미;06;비유라면 다른 단어도 많았을 거라고 생각해."
90000050-33 = "3;히마리;11;그건 말이죠. 에이미. 세상에는…….\n#3;em;[반응]"
90000050-34 = "[s] \"자, 자. 본론.\""
90000050-35 = "3;히마리;06;……네. \n#3;em;[땀]"
90000050-36 = "3;히마리;06\n1;에이미;04;또 이야기가 엉뚱한 데로 튀잖아. 이게 다 부장 때문이야.\n#1;ar\n#3;m5"
90000050-37 = "3;히마리;03;제가 죄가 많은 여인인 건 인정하지만…… 이번엔 절대로 에이미 때문이잖아요? 그리고 선생님이 눈치를 주고 있으니까 대충 그런 걸로 하고.\n#3;em;[반짝]"
90000050-38 = "1;에이미;02;대충 그런 건 아니지만. <폐허>에 우리의 다음 타깃이 있는 거야?\n#1;em;[반응]"
90000050-39 = "3;히마리;02;네. 네 번째 예언자, <헤세드>가 바로 폐허 어딘가에 숨어 있다고 생각합니다."
90000050-40 = "1;에이미;99;<헤세드>인가……. \n#1;em;…"
90000050-41 = "#all;hide"
90000050-42 = "#na;히마리;데카그라마톤은 군수 공장의 생산 컨트롤 AI와 접촉해서 자신의 예언자로 삼았고, 그래서 무한한 병력을 손에 넣었던 거죠."
90000050-43 = "#na;히마리;즉, 헤세드는 데카그라마톤의 군단을 생산하는 <군수 공장> 그 자체."
90000050-44 = "#na;히마리;헤세드야말로 데카그라마톤 군단의 핵심 전력이라고 볼 수 있을 거예요."
90000050-45 = "#all;hide"
90000050-46 = "1;에이미;01\n5;히마리;01;하지만 이 광활한 폐허에서 그 <군수 공장>의 위치를 찾는 건 불가능에 가까우니, 일단 정보 수집부터 시작합니다.\n#1;a\n#5;a\n#5;em;[반응]"
90000050-47 = "1;에이미;02;즉, 폐허에 있는 데카그라마톤 병력이 다음 타깃인 거네?"
90000050-48 = "5;히마리;02;네. 그 병력들에게서 데이터를 수집, <헤세드>의 위치를 추적합니다."
90000050-49 = "1;에이미;03;응. 이해했어. \n#1;em;[반짝]\n#1;greeting"
90000050-50 = "5;히마리;04;폐허로 향하는 길은 제가 확보해둔 곳이 있어요. 그곳을 통해 진입해서 임무를 시작해보도록 하죠."
90000050-51 = "5;히마리;04\n1;에이미;05;그럼 출발해볼까.\n#1;em;[!]\n#1;m3\n#5;dr"

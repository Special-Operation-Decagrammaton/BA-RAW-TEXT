[translation]
10034050-1 = "Episode 5;For Airi"
10034050-4 = "[ns1] \"You can't get a hold of her at all?\"\n[ns2] \"She hasn't come out to practice?\""
10034050-7 = "Nope. Two days in a row now..."
10034050-9 = "ONE day, I didn't think was a problem, but..."
10034050-10 = "It's weird she's not even answering my calls."
10034050-11 = "...I take it you haven't heard from her either."
10034050-12 = "So nobody knows where she is? D-Do we have to report to the Justice Task Force?"
10034050-13 = "...You don't have a hunch, or anything?"
10034050-14 = "[s3] \"...Did you notice anything strange before she disappeared?\"\n[s4] \"Tell me what you remember.\""
10034050-17 = "Um, well...there wasn't really anything I could point to."
10034050-18 = "We didn't have a fight or anything. And our practice wasn't perfect, but we were getting there."
10034050-19 = "I really didn't see any of this coming. Especially because it's Airi we're talking about."
10034050-21 = "...If I were absent for two days' practice, no one would have batted an eye."
10034050-22 = "Yeah. If it were Natsu..."
10034050-26 = "...Wait, you're aware of that? And you just admit it?"
10034050-27 = "If you know, then why would you act like that in the first...?"
10034050-28 = "There wasn't anything too noticeable overall, but there was one odd thing."
10034050-29 = "Hm?"
10034050-30 = "...What?"
10034050-31 = "It was small...but it was there. Maybe that was the problem."
10034050-32 = "What odd thing are you talking about?"
10034050-33 = "Well, it wasn't really big enough to point out."
10034050-34 = "Maybe it was nothing. I'm only saying this just in case, so don't take my word for it."
10034050-35 = "That said... Well, how do I put this...?"
10034050-36 = "For the last several days...Airi seemed like she felt..."
10034050-37 = "...that something might...not be working out for her."
10034050-38 = "[s5] \"Not working out?\"\n[s6] \"With practice? With her skill?\""
10034050-41 = "She seemed rather ill at ease. Almost as if something were chasing her."
10034050-42 = "She was, of course, suppressing it and smiling all the while, so perhaps she thought we didn't notice."
10034050-43 = "You spotted it too. You're pretty sharp about these things."
10034050-44 = "...Wait, what? When was she like that? How come I didn't know...?"
10034050-45 = "Again, it was barely noticeable. She made a point of not letting it affect her practice."
10034050-46 = "Regardless, I would never have thought she'd disappear without a word."
10034050-47 = "Something must have happened..."
10034050-48 = "...Huh? Say again?"
10034050-49 = "You have a theory, Sensei?"
10034050-53 = "...Sensei...? Why are you...?"
10034050-54 = "That's the keyboard Airi left behind..."
10034050-59 = "*gasp* Is that...?"
10034050-60 = "A piece of paper underneath the cover..."
10034050-61 = "It's a note."
10034050-62 = "W-What? A note? Why would she leave us a note like this?"
10034050-63 = "[s7] \"Because it's Airi.\"\n[s8] \"There's no way she would just leave without a word.\""
10034050-66 = "What does it say...? C-Can I take a look...?"
10034050-72 = "\"To everyone.\""
10034050-73 = "\"I'm sorry.\""
10034050-74 = "Huh?"
10034050-75 = "Hm?"
10034050-76 = "...She's sorry...?"
10034050-82 = "\"I'm sorry I'm holding you back.\""
10034050-83 = "\"This is not going to work as-is, so I'm looking for someone better to replace me.\""
10034050-85 = "...What?"
10034050-90 = "\"I hope you all crush it out there. You're...\""
10034050-91 = "\"You're not like me.\""
10034050-92 = "...\"So I'm sure you can do it\""
10034050-93 = "Um..."
10034050-96 = "What..."
10034050-98 = "What kind of nonsense is that...?"
10034050-106 = "...Um."
10034050-107 = "Wait, is this what we're doing? Just standing here?"
10034050-109 = "...? What do you mean, \"Is this what we're doing?\""
10034050-110 = "Sensei said they had a hunch where to find Airi."
10034050-111 = "If Sensei knows where she is, then they probably also know what her problem is, so we should leave it to Sensei, right?"
10034050-112 = "If you barge in, insisting on doing it yourself, like last time..."
10034050-118 = "...? Why are you looking at me...?"
10034050-119 = "No reason, just thinking about last time."
10034050-120 = "Still, even if Sensei brings Airi back, it won't really solve anything."
10034050-121 = "Are we sure we want to sit around doing nothing until they come back?"
10034050-122 = "Sensei said they're going to go alone, so we'll stick with that. I'm sure they have a reason."
10034050-123 = "...Oh, we could set Airi's favorite things on the table for when they get here."
10034050-124 = "It would be a party where you eat a year's supply of mint chocolate."
10034050-125 = "Ah, come on! I'm not talking about that at all!"
10034050-126 = "You didn't think it was strange? Airi was acting way off!"
10034050-127 = "I'm not just talking about her going missing. She was different from the start!"
10034050-128 = "Has Airi ever INSISTED on doing something? Isn't this the first time?"
10034050-133 = "Now that you mention it..."
10034050-134 = "This hasn't been her usual style. Talking about bands, playing instruments..."
10034050-135 = "Mentioning the Frederica Semla thing and dragging all of us in..."
10034050-136 = "And she seemed stressed, like she has to prove herself."
10034050-137 = "WHY did she want to form a band? Why did she want to start playing? Before that..."
10034050-138 = "What could have been the problem before that?"
10034050-139 = "Mm. So we put her stress itself aside, and focus instead on the root cause of that stress."
10034050-140 = "Well considered. And it seems we have time to consider it now."
10034050-144 = "Huh?"
10034050-145 = "...Hm?"
10034050-146 = "Though the answer does seem rather obvious..."
10034050-147 = "What do you mean, \"obvious?\""
10034050-148 = "This band thing came out of the blue. What's obvious about that?"
10034050-149 = "Think about it. When we began to practice, we had a goal in mind, a reason for it."
10034050-153 = "To pass the audition."
10034050-154 = "Airi obsessed over practice. She must have been afraid to fail. Obvious enough, yes?"
10034050-156 = "But it wouldn't really matter if she failed, right? That's what we're still wondering about."
10034050-157 = "The audition was just an excuse to get us on board. It wasn't that important."
10034050-158 = "Yeah, maybe you're right. Even if we do fail, the only thing we stand to lose is..."
10034050-159 = "...the Frederica Semla..."
10034050-163 = "Hm?"
10034050-164 = "Hm?"
10034050-165 = "Hm?"
10034050-169 = "*gasp*"
10034050-170 = "Ah...!"
10034050-171 = "Waaaii- Wait a second!"
10034050-172 = "What are you trying to say now?"
10034050-173 = "Yeah, just think about it for a sec! It's like all the puzzle pieces are coming together...!!"
10034050-174 = "Why would someone like Airi actively insist that we start a band?"
10034050-175 = "What did she do, right after saying something that none of us would agree to?"
10034050-176 = "...She showed us the flyer and talked about the audition."
10034050-177 = "Saying we can eat the Frederica Semla if we pass, like she was trying to lure us."
10034050-178 = "...As if it's just an added bonus."
10034050-179 = "But maybe, just maybe!! She was beating around the bush, but..."
10034050-183 = "...But what if it was the opposite...?!"
10034050-188 = "No, no, Yoshimi. I think you're stretching it."
10034050-189 = "How so? It sounds exactly the way Airi would think."
10034050-190 = "Aw, come on. Really? How does that make any sense?"
10034050-191 = "It may be hard to believe, but the truth IS hard to believe sometimes."
10034050-193 = "I think we're right! Totally right! A hundred percent! Right on the dot!"
10034050-194 = "There's no other reason! No matter what we might think!"
10034050-195 = "Of COURSE she's going to be bothered about not getting better!! Of COURSE she's going to be frustrated!!"
10034050-196 = "Because she was the one who wanted to eat the semla the most!!"
10034050-197 = "Because she has to pass!! If she fails, she can't have any!!"
10034050-203 = "...Seriously? Making a big deal out of that one little...?"
10034050-204 = "Big deal? Think about it. Airi wouldn't have been like, \"Hey, I want to eat some semla, so why don't you all join a band with me!!\" Right?"
10034050-205 = "...No. Natsu, maybe, but not Airi."
10034050-207 = "Hey. Uh...I feel like everyone's taking a jab at me today..."
10034050-208 = "In any case...she acted like it was all about the band, while luring us in with that semla."
10034050-209 = "But the semla was actually her ultimate goal all along. She'd give her life for it!"
10034050-210 = "Right? It all checks out, right?! This is totally Airi's style!! I know her like the back of my hand!"
10034050-211 = "W-Well...I won't say you're WRONG, but..."
10034050-212 = "I mean, you make a good case, but...Airi? Leading us on like that?"
10034050-213 = "Well, it's not like she did anything bad. There's no harm in keeping her motivation to herself, is there?"
10034050-214 = "It's not like she lied to us. We'll get just as much semla as she does, so she's got nothing to feel bad about."
10034050-215 = "And she invented quite a narrative to cover it all. A well-played strategy, if all falls into place."
10034050-216 = "...But."
10034050-217 = "If that strategy hinges on her own skill..."
10034050-218 = "Of course it's going to stress her out! It's super-stressful!! Even I'D run away!!"
10034050-219 = "Would you be okay in that situation? If you were the one who instigated everything?"
10034050-220 = "So, all this nonsense about looking for another member, just because we won't be able to eat semla with her..."
10034050-221 = "...Seriously?"
10034050-222 = "...Mm...Q.E.D., I'd say."
10034050-226 = "*sigh*"
10034050-227 = "Airi, Airi..."
10034050-228 = "Airiii!! You're such a dummy!! Why didn't you just... Argh!!"
10034050-229 = "Like you said, she's not that kind of person."
10034050-230 = "That's true, but...!! Ugh!!"
10034050-231 = "So the key point is semla. And if we can get her some, she won't be stressed anymore."
10034050-232 = "It's the best ending we could ask for. In fact, it rocks."
10034050-233 = "Wait, isn't semla hard to come by? And it's not like we're sure we'll pass the audition..."
10034050-234 = "Honestly, I wouldn't feel comfortable auditioning with someone who's not Airi."
10034050-235 = "Sure. But that's not even the main problem."
10034050-236 = "The audition is a week away. Are we supposed to watch Airi mope until then?"
10034050-237 = "No way, absolutely not! Over my dead body!"
10034050-238 = "Let's go find one. If we can get one by tomorrow, we can shove it in her mouth!"
10034050-239 = "Nice idea, but it's not happening. You can't just buy semla off the shelf."
10034050-240 = "It's so rare, it takes someone like the Carnival Committee to acquire them. We're not getting any on our own."
10034050-241 = "W-Well, I..."
10034050-248 = "Hm?"
10034050-249 = "...Why give up so easily? Surely we can find them somewhere."
10034050-250 = "Eh? What?"
10034050-251 = "\"We can find them somewhere\"?! Where?!"
10034050-252 = "Hm?"
10034050-253 = "Why are you asking me? You already said it..."
10034050-254 = "...The Carnival Committee has them."
10034050-255 = "Hm?"
10034050-256 = "Ah-ha. I was wondering where you were going with that."
10034050-257 = "But no. If they just handed it out whenever anybody asked, it wouldn't be a prize to begin with."
10034050-258 = "Um, I don't think Natsu's suggesting we ask..."
10034050-262 = "...You're not thinking of pulling a heist, though, are you? That'd be flat-out ridiculous."
10034050-263 = "The festival's being hosted by the Tea Party, right in the center of campus."
10034050-264 = "The students from the Committee are on guard, day and night, for sure."
10034050-265 = "We'd have to climb the walls, and then we'd STILL get caught, so we'd have to shoot our way out..."
10034050-266 = "Impossible. There's no way."
10034050-267 = "I know it's funny coming from me, but how could sheltered, delicate flowers like us ever pull THAT off?"
10034050-268 = "Unless there's someone who knows how to do all that, who can give us a crash course..."
10034050-269 = "...Curious you say that, Yoshimi."
10034050-270 = "Do you not see? Or perhaps you take her for granted so much, you've forgotten. But there is one who can both climb walls and fight."
10034050-271 = "...Huh?"
10034050-276 = "She's here with us even now. Unlike us, she's no sheltered flower. She's a retired monster of the underworld, the sleeping beast..."
10034050-281 = "...The Legend."
10034050-286 = "Natsu, uh-uh. Don't you even start with that."
10034050-291 = "No nonsense, friend. I'm quite serious. More so than usual."
10034050-292 = "Beyond serious, even. This is of grave importance."
10034050-293 = "You know yourself. This is the only option we have. Truly, we have no others left."
10034050-294 = "Th-That's just because...!"
10034050-295 = "In fact, perhaps your past was fated all along, to bring you to this moment."
10034050-296 = "Did it not cross your mind, Kyoyama Kazusa, that you had just the power we needed?"
10034050-297 = "Well, uh, that's..."
10034050-298 = "Um...! Ugh...!"
10034050-299 = "..."
10034050-305 = "*sigh*"
10034050-306 = "...Okay, first, let me say this."
10034050-307 = "Even IF I take the lead here, there are NO guarantees. Once the Justice Task Force gets a call and shows up, it's over."
10034050-308 = "And even if we do make it out of there, there are still going to be consequences."
10034050-309 = "For infiltrating the command center of a Tea Party-hosted event? Of course."
10034050-314 = "And so, today marks the end of After-School Sweets Club. Because by this time tomorrow, the club will no longer exist."
10034050-315 = "There will be no room, no funds. We'll be cast out into the streets, in other words."
10034050-316 = "Okay, so you do know, but you're still..."
10034050-318 = "...And so what?"
10034050-320 = "So...what?"
10034050-321 = "...Does that hold you back?"
10034050-322 = "Search your heart, Kyoyama Kazusa. Does the fear of consequences truly stay your hand?"
10034050-323 = "Or perhaps I should ask someone else. What say you, Yoshimi?"
10034050-324 = "Hm?"
10034050-325 = "What do I think?"
10034050-326 = "I think, \"who cares?\" It's not like we can't meet each other outside of the club. If we can't even do this for our friend, what good is the club in the first place?"
10034050-327 = "We can just create a group chat and meet that way."
10034050-328 = "Of course we might get in trouble at school, or at home...but it's not going to kill us or anything."
10034050-329 = "We might get suspended, we might even get community service, but I can take that."
10034050-330 = "In the first place, this club was originally…"
10034050-335 = "...Yoshimi, you..."
10034050-336 = "...You heard her. We're all of the same mind. And we have neither the room nor the time to squabble."
10034050-337 = "Especially you, Kazusa. Anyone can see you want this the most, out of all of us."
10034050-338 = "Natsu..."
10034050-339 = "...No time for sentiment. Kyoyama Kazusa...the sleeping beast of Trinity..."
10034050-340 = "Perhaps we never thought this day would come..."
10034050-346 = "...but it is time to become the After-School Sweets Gang once more."
10034050-352 = "Tonight...the beast will return to the hunt."
10034050-357 = "For Airi... No."
10034050-358 = "...For everyone."
10034050-364 = "...Please become Cath Palug again."

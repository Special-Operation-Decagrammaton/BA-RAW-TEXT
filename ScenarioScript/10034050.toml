[translation]
10034050-1 = "ตอนที่ 5;เพื่อไอริ"
10034050-4 = "[ns1] \"ติดต่อไม่ได้เหรอ?\"\n[ns2] \"ไม่ได้มาซ้อมดนตรีด้วยเหรอ?\""
10034050-7 = "อะ... อื้ม... นี่ก็เข้าวันที่ 2 แล้ว..."
10034050-9 = "ถ้าไม่มาซ้อมแค่วันเดียว พวกฉันก็คงไม่คิดมาก แต่ก็..."
10034050-10 = "ถ้าติดต่อไม่ได้ด้วยแบบนี้ ฉันว่ามีอะไรไม่ชอบมาพากลแล้วละ"
10034050-11 = "ดูจากปฏิกิริยาของคุณครูแล้ว ไอริก็คงไม่ได้ติดต่อคุณครูมาใช่มั้ย?"
10034050-12 = "คุณครูก็ไม่รู้ว่าไอริไปอยู่ที่ไหนเหรอ? นะ... นี่เราต้องไปแจ้งกับชมรมทวงความยุติธรรมมั้ยเนี่ย?"
10034050-13 = "หรือคุณครูพอจะเดาอะไรได้บ้างรึเปล่า...? ไม่เลยเหรอ...?"
10034050-14 = "[s3] \"ก่อนหน้านี้มีอะไรแปลกๆ บ้างรึเปล่า?\"\n[s4] \"ถ้ามีอะไรที่พอนึกออกก็บอกครูเลยนะ\""
10034050-17 = "มะ... ไม่รู้สิ...? ถึงคุณครูจะพูดแบบนั้นก็เถอะ แต่ก็ไม่เห็นมีอะไรแปลกๆ เลย..."
10034050-18 = "เราไม่ได้มีเรื่องทะเลาะอะไรกัน ส่วนตอนซ้อม ถึงเราจะยังเก้ๆ กังๆ กันอยู่แต่ก็ถือว่าคืบหน้าดี"
10034050-19 = "พูดตามตรงว่าสถานการณ์แบบนี้น่ะ... พวกเราเองก็คาดไม่ถึงเลย แล้วยิ่งเป็นกับไอริแล้วด้วย"
10034050-21 = "ถ้าเป็นฉันที่หายไป 2 วันละก็ คนอื่นคงคิดหาเหตุผลกันได้แล้ว"
10034050-22 = "ใช่ ถ้าเป็นนัตสึละก็..."
10034050-26 = "เดี๋ยวสิ ทำไมเธอถึงรู้เรื่องพวกนั้นละก็กล้าพูดเองเลยงั้นเหรอ?"
10034050-27 = "ถ้าปกติก็รู้ตัวดีอยู่แล้ว แล้วทำไมถึงได้..."
10034050-28 = "ถึงโดยภาพรวมแล้วมันจะไม่ได้มีอะไรเป็นพิเศษ แต่ก็มีสิ่งหนึ่งที่ดูแปลกๆ อยู่นะ"
10034050-29 = "......?"
10034050-30 = "ว่าไงนะ...?"
10034050-31 = "มันละเอียดอ่อนมากน่ะ... แต่ก็ถือว่ามี และบางทีอาจเป็นเพราะเรื่องนั้นก็ได้"
10034050-32 = "เรื่องแปลกๆ เหรอ? อะไรล่ะนั่นน่ะ? เกิดอะไรขึ้นงั้นเหรอ?"
10034050-33 = "มันไม่ใช่เรื่องร้ายแรงที่จะหยิบยกขึ้นมาพูดหรอก"
10034050-34 = "บางทีฉันอาจจะคิดไปเองคนเดียวก็ได้ ฉันแค่คิดเผื่อๆ ไว้น่ะ ไม่ต้องปักใจเชื่อกันขนาดนั้นก็ได้นะ"
10034050-35 = "แต่ถ้าอยากรู้กันละก็... อืม... จะว่ายังไงดีนะ..."
10034050-36 = "ไม่กี่วันมานี้ ไอริ... ดูไม่เหมือนเดิม..."
10034050-37 = "เหมือนมันมีบางอย่างติดขัดใช่มั้ย"
10034050-38 = "[s5] \"มีเรื่องติดขัดงั้นเหรอ?\"\n[s6] \"เรื่องซ้อมเหรอ? หรือว่าทักษะเรื่องดนตรี?\""
10034050-41 = "เหมือนจะแข็งกระด้างยังไงบอกไม่ถูก ถ้าจะให้พูดแบบสุดโต่ง ก็คงต้องบอกว่าเหมือนเธอกำลัง 'ถูกครอบงำ' อยู่"
10034050-42 = "เธอน่าจะคิดว่าคนอื่นคงไม่สังเกตเห็นเพราะตัวเองพยายามที่จะไม่แสดงออก และก็เอาแต่หัวเราะอย่าง#nเดียวน่ะ"
10034050-43 = "แต่ก็สังเกตได้สินะ เป็นคนที่รู้ทันคนอื่นจังเลยนะเธอน่ะ"
10034050-44 = "อะ... อะไรเนี่ย? มีเรื่องแบบนั้นด้วยเหรอ? ทำไมฉันไม่รู้ล่ะ...?"
10034050-45 = "ก็ไอริแทบจะไม่แสดงออกเลยไงล่ะ ไม่สิ ต้องบอกว่าไอริปิดบังได้ดีจนเราไม่ทันสังเกตเห็นเลยมากกว่า"
10034050-46 = "แต่ถึงจะเป็นอย่างนั้นก็เถอะ... การที่ไอริหายไปอย่างไร้ร่องรอยแบบนี้... เป็นสถานการณ์ที่เข้าใจ#nลำบากเลยนะ"
10034050-47 = "คงไม่ได้มีอะไรเกิดขึ้นใช่มั้ย..."
10034050-48 = "หืม...? ว่าไงนะ...?"
10034050-49 = "ไหนว่าไม่มีอะไรคลางแคลงใจไง...? มันจริงเหรอคุณครู?"
10034050-53 = "คุณครู...? ไปตรงนั้นทำไมน่ะ...?"
10034050-54 = "นั่นมันคีย์บอร์ดของไอริ..."
10034050-59 = "นะ... นั่นมัน...?"
10034050-60 = "มีกระดาษบางอย่าง... ในฝาครอบคีย์บอร์ด...?"
10034050-61 = "กระดาษโน้ตเหรอ?"
10034050-62 = "วะ... ว่าไงนะ? กระดาษโน้ต? ทำไมถึงได้มีอะไรแบบนั้น..."
10034050-63 = "[s7] \"ไอริเป็นคนอย่างที่ทุกคนว่านั่นละ\"\n[s8] \"ไอริไม่มีทางหายไปโดยไม่บอกอะไรหรอก\""
10034050-66 = "เขียนว่าอะไรเหรอ...? ขะ... ขอฉันดูได้มั้ย...?"
10034050-72 = "\"ถึงทุกคน\" ..."
10034050-73 = "\"ขอโทษด้วยนะ\" ..."
10034050-74 = "...???"
10034050-75 = "...?"
10034050-76 = "ขอโทษ...?"
10034050-82 = "\"ขอโทษที่รั้งทุกคนไว้นะ\""
10034050-83 = "\"แบบนี้คงไม่ไหว ฉันเลยกำลังหาคนเก่งคนอื่นที่มาทำแทนให้อยู่น่ะ\""
10034050-85 = "ว่าไงนะ...?"
10034050-90 = "\"หวังว่าทุกคนจะได้ผลลัพธ์ที่ดีนะ...\""
10034050-91 = "\"พวกเธอต่างจากฉัน\""
10034050-92 = "\"เพราะงั้นพวกเธอต้องทำได้แน่ๆ\""
10034050-93 = "...???"
10034050-96 = "อะไร..."
10034050-98 = "นี่มันเรื่องอะไรกัน...?"
10034050-106 = "เอ่อ..."
10034050-107 = "นี่มันเรื่องจริงเหรอเนี่ย? แล้วให้พวกเรารออยู่เฉยๆ แบบนี้น่ะเหรอ?"
10034050-109 = "พูดอะไรของเธอน่ะ?"
10034050-110 = "คุณครูก็บอกแล้วไม่ใช่เหรอว่าพอเดาได้ว่าไอริจะไปอยู่ที่ไหน ก็เลยจะไปตามหา แล้วก็พูดคุยกับเธอที่นั่นน่ะ"
10034050-111 = "ถ้าพอเดาได้ก็คงรู้ว่าไอริมีปัญหาอะไรอยู่ งั้นเราก็ควรให้คนที่รู้อย่างคุณครูไปช่วยคุยสิ"
10034050-112 = "ถ้าพวกเธอผลีผลามออกไปทำอะไรเหมือนครั้งก่อนอีก..."
10034050-118 = "เอ้า...? ทำไมถึงมองฉันล่ะ...?"
10034050-119 = "ก็... แค่นึกถึงสิ่งที่พวกเธอเคยทำคราวก่อนน่ะ"
10034050-120 = "แต่มันก็แปลกนะ ต่อให้คุณครูจะไปตามตัวไอริกลับมาได้ แต่โดยพื้นฐานแล้ว ปัญหามันก็ยังไม่ได้ถูกแก้ไขอยู่ดี"
10034050-121 = "ฉันก็เลยคิดว่าเราจะเอาแต่นั่งรอนอนรอให้ทั้งสองคนนั้นกลับมาได้จริงๆ เหรอ"
10034050-122 = "คุณครูพูดเองนี่นาว่าจะไปเอง คงมีเหตุผลที่อยากไปคนเดียวแหละ"
10034050-123 = "อ่า... งั้นระหว่างรอให้ทั้งสองคนกลับมา เราเตรียมของที่ไอริชอบไว้บนโต๊ะดีมั้ย?"
10034050-124 = "คงจะเป็นปาร์ตี้รวมมินต์ช็อกโกแลตที่กินได้เป็นปีเลยละ"
10034050-125 = "เฮ้อ ให้ตายเถอะ! ไม่ใช่อย่างนั้นสักหน่อย!!"
10034050-126 = "พวกเธอไม่คิดว่ามันแปลกตั้งแต่แรกเหรอ? การกระทำของไอริต่างจากเดิมอย่างเห็นได้ชัดเลยนะ!!"
10034050-127 = "ไม่ใช่แค่เรื่องที่จู่ๆ ก็หายตัวไปแบบนี้ด้วย ฉันว่ามันมีกลิ่นแปลกๆ ตั้งแต่เริ่มแรกแล้ว!"
10034050-128 = "ที่ผ่านมาไอริเคยลุกขึ้นมาชวนทำอะไรจริงจังขนาดนี้มาก่อนรึเปล่า? นี่เป็นครั้งแรกเลยไม่ใช่เหรอ?"
10034050-133 = "ก็ใช่อยู่..."
10034050-134 = "มันก็แปลกๆ อยู่นะ มาชวนทำวงดนตรีกะทันหันแบบนี้..."
10034050-135 = "ไหนจะเอาเฟรเดริก้า เซมล่ามาชวนพวกเราให้เข้าไปเกี่ยวด้วยอีก"
10034050-136 = "แล้วหลังจากนั้นก็เหมือนติดอยู่กับความคิดที่ครอบงำตัวเอง"
10034050-137 = "ทำไมไอริถึงอยากทำวงดนตรีขนาดนั้นนะ? ทำไมอยู่ๆ ถึงได้อยากเล่นดนตรีขึ้นมา? ไม่สิ..."
10034050-138 = "ต้องถามว่า 'อะไรเป็นปัญหา' ตั้งแต่แรกนะ...?"
10034050-139 = "อืม... ให้ปรับโฟกัสไปที่ 'สาเหตุที่รู้สึกแบบนั้นตั้งแต่แรก' มากกว่า 'ความวิตกกังวลที่เกิดขึ้นระหว่าง#nที่รู้สึกแบบนั้น' สินะ"
10034050-140 = "เป็นความคิดที่ยอดเยี่ยมเลย การคิดเรื่องนี้ระหว่างรอก็อาจเป็นประโยชน์ขึ้นมาก็ได้นะ"
10034050-144 = "...???"
10034050-145 = "หืม...??"
10034050-146 = "ถ้างั้นก็แปลว่าเราได้คำตอบแล้วน่ะสิ?"
10034050-147 = "หมายความว่ายังไงอีก?  ได้คำตอบแล้วงั้นเหรอ?"
10034050-148 = "เรายังไม่มีเบาะแสอะไรเลยนี่ว่าไอริอยากทำวงดนตรีขนาดนั้นตั้งแต่ตอนไหน..."
10034050-149 = "ทำไมจะไม่มีล่ะ? การฝึกซ้อมของเรามีเป้าหมายที่ชัดเจนตั้งแต่เริ่มต้นอยู่แล้ว"
10034050-153 = "เป้าหมายคือ 'ผ่านการคัดเลือก' ยังไงล่ะ"
10034050-154 = "และที่ไอริทุ่มเทกับการฝึกซ้อมขนาดนั้น ก็คงเพราะกลัวว่าจะไม่ผ่านการคัดเลือกน่ะสิ ของมันแน่อยู่แล้วไม่ใช่เหรอ?"
10034050-156 = "ไม่ใช่ ตอนนี้ที่เรากำลังพูดถึงอยู่คือทำไมต้องกลัวว่าจะไม่ผ่านต่างหากล่ะ"
10034050-157 = "ก็บอกแล้วว่าการคัดเลือกน่ะเป็นข้ออ้าง นั่นไม่ใช่สิ่งสำคัญหรอก!"
10034050-158 = "ใช่ มันดูขาดเหตุผลไปหน่อย เพราะถึงจะไม่ผ่านการคัดเลือก เราก็ไม่มีอะไรต้องเสีย นอกจาก..."
10034050-159 = "เฟรเดริก้า เซมล่า..."
10034050-163 = "...?"
10034050-164 = "...?"
10034050-165 = "...?"
10034050-169 = "...!!"
10034050-170 = "อ๊ะ...!"
10034050-171 = "อ๊ะะะะ!!! เดี๋ยวนะ!!"
10034050-172 = "จะพูดอะไรขึ้นมาอีกน่ะ...?"
10034050-173 = "เดี๋ยวๆ!! ขอฉันคิดสักเดี๋ยวนะ รู้สึกเหมือนจิ๊กซอว์ที่กระจัดกระจายอยู่ถูกจัดเรียงในพริบตาเลยละ...!!"
10034050-174 = "จู่ๆ ไอริก็กระตือรือร้นขึ้นมาแล้วบอกพวกเราว่า 'มาทำวงดนตรีกันเถอะ' ใช่มั้ย?"
10034050-175 = "และหลังจากพูดในสิ่งที่พวกเราไม่มีทางคล้อยตามด้วย... จำกันได้มั้ยว่าไอริทำยังไงต่อ?"
10034050-176 = "ก็เอาใบปลิวมาให้เราดูแล้วโน้มน้าวให้เราไปคัดเลือกให้ผ่านน่ะสิ"
10034050-177 = "ตอนนั้นไอริบอกว่าถ้าผ่านการคัดเลือกก็จะได้กิน 'เฟรเดริก้า เซมล่า' เหมือนกับล่อใจพวกเราด้วย#nขนมอันนั้นงั้นแหละ"
10034050-178 = "ราวกับว่า 'ทำเนียนๆ' ไป"
10034050-179 = "แต่สมมติว่า! แค่สมมตินะ!! ถึงแม้จะพูดอ้อมค้อมไปมา แต่จริงๆ แล้ว..."
10034050-183 = "ถ้าจริงๆ แล้วมัน 'ตรงกันข้าม' ล่ะ...!?"
10034050-188 = "ไม่หรอกน่าโยชิมิ ไม่น่าใช่อย่างนั้นหรอก"
10034050-189 = "ไม่น่าใช่งั้นเหรอ? แต่นั่นเป็นศิลปะการพูดของไอริเลยนะ"
10034050-190 = "ไม่หรอกน่า ฉันว่าไม่ใช่อย่างนั้นหรอก..."
10034050-191 = "โลกนี้ยังมีเรื่องที่ยากที่จะเชื่อแต่ก็เป็นเรื่องจริงอยู่นะ"
10034050-193 = "ฉันว่าจริงนะ! ต้องใช่แน่ๆ! แน่นอนแบบ 100% เลยละ!!"
10034050-194 = "ไม่ว่าจะคิดอีกแค่ไหนๆ มันก็ไม่มีเหตุผลอื่นแล้วนี่!!"
10034050-195 = "นั่นเป็นเหตุผลที่ไอริกังวลถึงขนาดนั้น!! แล้วก็คงคิดโมโหตัวเองด้วย!!"
10034050-196 = "เพราะที่จริงแล้ว ตัวเองนั่นแหละคือคนที่อยากกินขนมเซมล่ามากกว่าใคร!!"
10034050-197 = "ก็เลยต้องผ่านการคัดเลือกให้ได้!! เพราะถ้าไม่ผ่านก็อดกินเซมล่า!!"
10034050-203 = "จริงเหรอ? ต้องทำถึงขนาดนี้เพราะขนมชิ้นเดียวเนี่ยนะ...?"
10034050-204 = "ถึงขนาดนี้งั้นเหรอ? แล้วถ้างั้นจะให้ไอริพูดว่า 'อยากกินเซมล่าจัง พวกเธอมาร่วมมือกับฉันแล้วทำ#nวงดนตรีให้หน่อยสิ' งั้นเหรอ? คิดว่าเธอจะพูดได้รึไง!"
10034050-205 = "ไอริทำแบบนั้นไม่ได้หรอก ถ้าเป็นนัตสึก็ว่าไปอย่าง"
10034050-207 = "อืม... วันนี้ฉันโดนลูกหลงบ่อยเลยนะ..."
10034050-208 = "แต่ก็เอาเถอะ งั้นสรุปว่า... เจ้าตัวพูดเหมือนมีความสนใจในวงดนตรีตั้งแต่แรก ส่วนคนอื่นก็เลย#nเออออตามไปด้วย เพราะอยากกินเซมล่าที่เป็นรางวัล"
10034050-209 = "แต่ว่าสุดท้ายแล้ว เป้าหมายสูงสุดของตัวเองก็คือการได้กินขนมเซมล่านั้น"
10034050-210 = "ใช่มั้ยล่ะ? ฉันพูดถูกใช่มั้ย? จิ๊กซอว์ต่อเข้ากันได้เป๊ะเลยใช่มั้ย!? นี่แหละสไตล์ของไอริ! คิดว่าเรารู้จักกันมาแค่วันสองวันรึไง!?"

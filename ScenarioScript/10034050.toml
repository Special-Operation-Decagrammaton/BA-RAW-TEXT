10034050-212 = "แต่มันก็พอฟังขึ้นนะ... ไอริ... อืม... ไอริ... ใช้วิธีการแบบนั้นกับเรา..."
10034050-213 = "ทำไมเหรอ? มันก็ไม่ใช่การกระทำที่ไม่ดีนี่นา? เรื่องแค่นี้น่ะ จะไม่พูดก็ได้ไม่ใช่เหรอ?"

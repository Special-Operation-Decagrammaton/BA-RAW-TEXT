[translation]
10034050-1 = "第5話;為了愛莉"
10034050-4 = "[ns1]「他都沒接電話嗎？」\n[ns2]「已經好幾天沒出現了嗎？」"
10034050-7 = "啊，嗯……今天是第二天了……"
10034050-9 = "一天不聯絡還情有可原，但是……"
10034050-10 = "連電話都不接實在有點奇怪。"
10034050-11 = "……看老師的反應，似乎也沒有收到聯絡。"
10034050-12 = "所以連老師也不知道他去哪裡了嗎？#n該，該不會真的要通報實現正義部吧？"
10034050-13 = "……有什麼線索嗎？還是完全沒有？"
10034050-14 = "[s3]「……大家有注意到什麼不尋常的地方嗎？」\n[s4]「任何事情都可以，想到什麼就說出來吧。」"
10034050-17 = "嗯，這個嘛……#n真要說起來……好像也沒什麼奇怪的……"
10034050-18 = "我們之間也沒發生什麼爭執……練習雖然有點生疏，但多少還是有進展。"
10034050-19 = "老實說……我完全沒想過會發生這種狀況。尤其還是發生在愛莉身上。"
10034050-21 = "……如果兩天沒出現的人是我，大家可能也不會這麼在意了吧。"
10034050-22 = "確實。如果是夏的話……"
10034050-26 = "……不是，你又知道我們不會在意了哦。#n而且那種話是該從自己嘴裡說出來的嗎？"
10034050-27 = "既然有這種自知之明，平常不就應該……"
10034050-28 = "雖然整體看起來還算正常，不過的確有點不太對勁。"
10034050-29 = "…………？"
10034050-30 = "……什麼？"
10034050-31 = "儘管只有一點蛛絲馬跡……但確實有。#n或許那就是問題所在。"
10034050-32 = "……你覺得有哪裡不對勁？#n是什麼？和我們有關嗎？"
10034050-33 = "畢竟也不是那種讓人在意到需要直接點明的事。"
10034050-34 = "這只是我的感覺而已……不過以防萬一還是說出來，大家先不要太認真。"
10034050-35 = "如果能接受這個前提的話……#n嗯……該怎麼說呢……"
10034050-36 = "愛莉最近這幾天……和往常不太一樣……"
10034050-37 = "感覺像是遇到了瓶頸。"
10034050-38 = "[s5]「遇到了瓶頸？」\n[s6]「是在練習方面嗎？比如演奏技巧？」"
10034050-41 = "有種微妙的僵硬和緊繃感。#n說得誇張一點的話，就是有種「被追逐」的感覺。"
10034050-42 = "雖然他總是帶著笑容，盡量不表露出來……所以大家可能沒注意到。"
10034050-43 = "夏果然也察覺到了啊。#n你在這方面倒是很敏銳。"
10034050-44 = "……什，什麼？有這種事嗎？#n為什麼我都沒發現……？"
10034050-45 = "畢竟他幾乎沒有表現出來。#n不，應該說他掩飾得很好，讓人難以感應到氣氛有什麼異常。"
10034050-46 = "但即便如此……還是有點難以理解。#n愛莉竟然會一聲不響地搞失蹤。"
10034050-47 = "果然是發生了什麼事嗎……"
10034050-48 = "……嗯？#n……你說什麼？"
10034050-49 = "也不是完全沒有線索……？#n真的嗎，老師？"
10034050-53 = "老師……？為什麼要往那邊走……"
10034050-54 = "那邊放著的是愛莉的電子琴……"
10034050-59 = "那，那是……？"
10034050-60 = "琴鍵蓋的底下……有張紙條……？"
10034050-61 = "……是便條嗎。"
10034050-62 = "什，什麼？便條？為什麼那裡會有那種東西……"
10034050-63 = "[s7]「正如大家所說，愛莉不是那種孩子。」\n[s8]「他不會一聲不響就離開。」"
10034050-66 = "上面寫了什麼……？#n我，我們可以看嗎……？"
10034050-72 = "……「給大家──」"
10034050-73 = "……「對不起。」"
10034050-74 = "……？？？"
10034050-75 = "……？"
10034050-76 = "對不起……？"
10034050-82 = "「很抱歉拖累了你們。」"
10034050-83 = "「我認為這樣下去不行，所以正在尋找比我更好的替補人選。」"
10034050-85 = "……什麼？"
10034050-90 = "「希望大家能得到好的成果。因為你們……」"
10034050-91 = "「跟我不一樣」"
10034050-92 = "……「所以一定辦得到」？"
10034050-93 = "…………？？？"
10034050-96 = "這是……"
10034050-98 = "這是什麼意思……？"
10034050-106 = "……我說啊。"
10034050-107 = "只待在這裡乾等真的行嗎？"
10034050-109 = "……？#n也沒什麼行不行的吧？"
10034050-110 = "老師不是說他可能知道愛莉會去哪裡，會去好好跟他談談了嗎？"
10034050-111 = "這就代表老師知道愛莉糾結的問題是什麼……#n既然這樣，把這件事交給老師才是最好的選擇吧？"
10034050-112 = "要是又像上次那樣搞出什麼花樣的話……"
10034050-118 = "…………盯著我看是什麼意思？"
10034050-119 = "沒什麼。只是想起你們以前做過的好事而已。"
10034050-120 = "可是這樣還是很奇怪吧。#n就算老師能把愛莉帶回來，根本的問題還是沒有解決。"
10034050-121 = "真的只能坐在這裡咬著手指，眼巴巴地等他們兩個回來嗎？"
10034050-122 = "既然老師說他一個人去就行了，肯定是有什麼用意的吧。"
10034050-123 = "……啊。還是我們在桌上擺一些愛莉喜歡的東西，歡迎他們回來？"
10034050-124 = "看來得舉辦能攝取一年份的薄荷巧克力的派對了。"
10034050-125 = "吼唷！我不是那個意思啦！！"
10034050-126 = "你們不覺得從一開始就很奇怪嗎？#n愛莉的行為明顯和平時不太一樣！！"
10034050-127 = "不只是現在失蹤的問題而已，這整件事從頭到尾都不太對勁。"
10034050-128 = "愛莉有過像現在這樣積極推動某件事的時候嗎？這還是第一次吧？"
10034050-133 = "……確實。"
10034050-134 = "的確是有點奇怪。#n突然說要組樂團、演奏樂器什麼的……"
10034050-135 = "還用女王泡芙把我們牽扯進來。"
10034050-136 = "從那之後就好像被「自己必須做點什麼」的想法逼迫著。"
10034050-137 = "他為什麼這麼想組樂團呢？為什麼會突然想演奏樂器？#n不，或者應該說……"
10034050-138 = "引發這一切的「契機」究竟是什麼……？"
10034050-139 = "嗯嗯。與其關注過程中感受到的焦慮，不如把焦點放在為何會產生那種情感。"
10034050-140 = "這是個很好的想法，值得我們在等待的時候好好思考。"
10034050-144 = "……？？？"
10034050-145 = "……咦？？"
10034050-146 = "這麼一想，答案不是已經呼之欲出了嗎？"
10034050-147 = "……什麼意思？你想出答案了嗎？"
10034050-148 = "愛莉是從什麼時候開始熱衷於組樂團的……不是完全沒有跡象嗎？"
10034050-149 = "怎麼會沒有呢？#n我們練習的目的，打從一開始就非常明確。"
10034050-153 = "那就是「通過試鏡」。"
10034050-154 = "愛莉之所以練得這麼拚命，是因為害怕通過不了試鏡。#n這不是很明顯嗎？"
10034050-156 = "所以我們現在不就在討論「非得通過的理由」是什麼嗎？"
10034050-157 = "難道試鏡只是用來吸引我們的誘餌？本身其實沒那麼重要？"
10034050-158 = "真要說起來，確實是有點小題大作。#n即使沒通過試鏡，會失去的也不過就是……"
10034050-159 = "女王泡芙而已……"
10034050-163 = "……？"
10034050-164 = "……？"
10034050-165 = "……？"
10034050-169 = "……！！"
10034050-170 = "哦……！"
10034050-171 = "哦哦哦哦──！！！等等！！"
10034050-172 = "……你又想到什麼了？"
10034050-173 = "等等！！再讓我想一下。#n感覺四散的拼圖瞬間拼湊起來了……！！"
10034050-174 = "愛莉突然一反常態，積極主張要「組樂團」沒錯吧？"
10034050-175 = "然後在提出我們難以接受的提議之後……愛莉是怎麼做的？"
10034050-176 = "……他拿出了傳單，說服我們參加試鏡。"
10034050-177 = "以只要通過試鏡就能吃到「女王泡芙」的理由來吸引我們。"
10034050-178 = "……而且還裝作只是「碰巧」而已。"
10034050-179 = "假設，我只是假設而已！！#n會不會繞了這麼大一圈……"
10034050-183 = "……結果實際上卻正好「相反」？"
10034050-188 = "不不不，喜美。#n再怎麼說也不可能吧。"
10034050-189 = "會嗎？這就是愛莉平時的說話方式吧？"
10034050-190 = "唔嗯，我覺得那還是有點太牽強了……"
10034050-191 = "雖然難以置信，但有時候現實就是如此。"
10034050-193 = "是我說的這樣對吧？#n百分之百沒錯！毋庸置疑！！千真萬確！！"
10034050-194 = "沒有其他可能性了吧！怎麼想都是這樣！！"
10034050-195 = "所以他才會擔心自己沒有進步！！才會對自己生氣！！"
10034050-196 = "因為打從一開始，他就是最想吃到女王泡芙的人！！"
10034050-197 = "所以才會堅持要通過試鏡！！因為被刷掉就吃不到了！！"
10034050-203 = "……認真？愛莉真的會為了那種事情做到這個地步嗎……？"
10034050-204 = "「做到這個地步」？你覺得以愛莉的個性，有可能說出#n「啊！我好想吃女王泡芙，你們幫我組個樂團吧！！」這種話嗎？"
10034050-205 = "……絕對不可能。#n又不是夏。"
10034050-207 = "那個……怎麼覺得最近一直莫名中槍呢……"
10034050-208 = "總而言之……#n雖然愛莉一開始只表現出對樂團的興趣，女王泡芙只是為了吸引我們的手段……"
10034050-209 = "但實際上他的最終目的，就是拚死也要吃到女王泡芙。"
10034050-210 = "對吧對吧？我說的沒錯吧？非常符合邏輯吧！？#n這完全是愛莉的作風！我們認識他又不是一天兩天了！"
10034050-211 = "是沒錯啦……可是……"
10034050-212 = "雖然說是說得通……但愛莉……愛莉他……會這樣對我們嗎……"
10034050-213 = "……什麼意思？這又不是什麼壞事？#n這種程度的事本來就沒必要說的那麼明白吧？"
10034050-214 = "而且「只要通過試鏡，大家就能吃到女王泡芙」也不是謊話。#n以愛莉的個性來看，這也是個能用得心安理得的理由……"
10034050-215 = "同時對自己來說也是個不錯的藉口。#n只要成功的話，就會是個完美的策略。"
10034050-216 = "但如果……"
10034050-217 = "最後失敗的原因竟然出在「自己的實力」……"
10034050-218 = "沒錯。肯定會崩潰的！絕對會崩潰吧！！就算是我也會崩潰！！"
10034050-219 = "換作是你們有辦法保持鎮定嗎？尤其這一切的開端還是自己。"
10034050-220 = "因為不希望是自己害大家吃不到女王泡芙，才會說出要找其他人來替補這種話……"
10034050-221 = "真的是這樣嗎……"
10034050-222 = "……嗯。#nQ.E.D.──證明完畢。"
10034050-226 = "唉……"
10034050-227 = "愛莉啊，愛莉……"
10034050-228 = "愛莉～！！你這個傻瓜！！為什麼不一開始就……！！啊～！！！"
10034050-229 = "那孩子不是那樣的人……你自己不也說過嗎。"
10034050-230 = "是這樣沒錯……！！啊啊啊啊～～！！！！"
10034050-231 = "所以一切的關鍵就是女王泡芙。#n只要想辦法把女王泡芙弄到手，問題就能解決了。"
10034050-232 = "這是目前最完美的結局……嗯，意外還挺搖滾的。"
10034050-233 = "不，想拿到女王泡芙恐怕沒那麼容易。#n畢竟我們沒有把握能通過試鏡……"
10034050-234 = "而且說實話，我也不想和愛莉以外的人一起參加。"
10034050-235 = "那當然。不過在那之前還有一個問題。"
10034050-236 = "試鏡又不是明天就舉辦，距今還有一週左右的時間。#n在那之前不能就這樣放著愛莉不管吧……？"
10034050-237 = "啊啊～當然不行，絕對不行。#n我死也不想看見那種情況！"
10034050-238 = "必須馬上弄到手才行。#n可以的話，最好是明天就親手把女王泡芙塞進他的嘴裡！"
10034050-239 = "我能理解你的心情，但現在也無計可施。#n女王泡芙可不是隨便就能買到的。"
10034050-240 = "那種珍貴的東西，恐怕只有狂歡節的營運委員會才弄得到……我們又有什麼辦法呢？"
10034050-241 = "那，那倒是沒錯……"
10034050-248 = "……？"
10034050-249 = "……怎麼會弄不到呢？那裡不就有了嗎？"
10034050-250 = "……啊！？"
10034050-251 = "你知道哪裡有嗎！？在哪……！？"
10034050-252 = "……？"
10034050-253 = "為什麼要問我……？你剛才不是已經說過了嗎？"
10034050-254 = "……「只有狂歡節的營運委員會才弄得到」。"
10034050-255 = "……？"
10034050-256 = "唉……還以為你要說什麼呢……"
10034050-257 = "胡說八道也要有個限度。#n如果開口就能拿到女王泡芙的話，打從一開始就不會把它當成獎品了吧？"
10034050-258 = "不，我覺得夏應該不是那個意思……"
10034050-262 = "……難道你打算用搶的？不會這麼荒唐吧？"
10034050-263 = "那裡可是學校的中心區域，而且這場活動還是由茶會主辦的。"
10034050-264 = "不只會有營運委員會的學生通宵輪班看守……"
10034050-265 = "想偷溜進去就必須翻過圍牆，要是途中被發現還得經歷一番戰鬥……"
10034050-266 = "不可能。絕對不可能。"
10034050-267 = "雖然自己這麼說很可笑，但像我們這種溫室裡的花朵，怎麼可能做得到呢？"
10034050-268 = "除非能有個熟門熟路的人在一旁指點，那倒還合理一點……"
10034050-269 = "……真是的，你今天怎麼老是說些奇怪的話呢，喜美。"
10034050-270 = "你還沒發現嗎？還是因為太理所當然而忘了呢？#n某個「既會翻牆又會戰鬥的人」……"
10034050-271 = "……嗯？"
10034050-276 = "他此時此刻就在我們的身旁。#n不是我們這種「溫室裡的花朵」，而是從地下世界隱退的怪物、沉睡的魔獸……"
10034050-281 = "……那個「傳說」。"
10034050-286 = "……！？！？#n給我等等，夏！！怎麼又提起這件事……！！"
10034050-291 = "不好意思，我現在可是非常認真的。#n雖然我一向都很認真，但今天又更勝以往……"
10034050-292 = "沒錯。已經超越了認真，達到「嚴肅」的程度。"
10034050-293 = "其實你自己也很清楚吧？#n──除此之外別無他法。"
10034050-294 = "可，可是……！"
10034050-295 = "搞不好你的過去……就是為了現在這一刻而存在也說不定哦？#n也許這就是你的命運吧。"
10034050-296 = "難道你的心裡就不曾閃過一絲「我正好有這股力量」的念頭嗎──杏山千紗？"
10034050-297 = "不是，你先等等……"
10034050-298 = "我……！呃呃……！"
10034050-299 = "…………"
10034050-305 = "唉……"
10034050-306 = "……醜話先說在前頭。"
10034050-307 = "我也無法保證一定會成功。#n只要某個環節出了差錯，讓他們有機會聯絡實現正義部的話，一切就全完了。"
10034050-308 = "況且就算計畫成功……接下來會面臨什麼後果，你們應該心裡有數吧？"
10034050-309 = "你指的是夜襲茶會主辦活動的指揮中心必須承擔的處分嗎……？那當然。"
10034050-314 = "……「放學後的甜點部」將在今天畫下句點。#n從明天起，這個社團將被除名，從此不復存在。"
10034050-315 = "沒有社團部室和補助，只能流落街頭。"
10034050-316 = "怎麼，你很清楚嘛。#n既然都知道後果……"
10034050-318 = "……那又如何？"
10034050-320 = "知道後果……那又如何？"
10034050-321 = "……你是要說你辦不到嗎？"
10034050-322 = "杏山千紗──你心裡是怎麼想的呢？#n真的要因為這種理由而不有所作為嗎？"
10034050-323 = "要不先來問問旁邊的喜美吧？"
10034050-324 = "……？"
10034050-325 = "我？"
10034050-326 = "無所謂啊？又不是社團沒了就不能見面。#n而且如果連這種時候都無法互相照顧，社團存不存在又有什麼意義？"
10034050-327 = "大不了之後再創個聊天群組、私下聚會就行了。"
10034050-328 = "雖然八成會被家裡和學校臭罵一頓……但也就是這樣而已。#n天又不會塌下來，對吧？"
10034050-329 = "頂多再一起去做點志工服務，或者被停學一陣子……沒什麼大不了的吧。"
10034050-330 = "更況且這裡本來就是……"
10034050-335 = "喜美……"

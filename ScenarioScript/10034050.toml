10034050-265 = "ถ้าจะเข้าไปในนั้นแบบให้ไม่มีใครเห็น เราก็ต้องปีนกำแพงเข้าไป แต่ยังไงก็คงโดนจับได้ แล้วเกิดการปะทะกัน..."

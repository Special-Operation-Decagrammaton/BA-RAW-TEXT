10034050-220 = "เห็นมั้ยล่ะ ไอริเสียใจที่ตัวเองจะไม่ได้กินขนมเซมล่าในตำนาน ก็เลยจะไปหาคนอื่นที่เก่งกว่ามาเป็น#nสมาชิกวงให้..."

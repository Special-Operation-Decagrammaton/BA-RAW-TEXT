[translation]
10047070-1 = "ตอนที่ 7;พิสูจน์ตำนาน"
10047070-2 = "(ทุกคนกลับมาที่หอพักแล้วช่วยกันทำความสะอาดห้อง)"
10047070-6 = "[ns] \"นี่มัน...?\""
10047070-7 = "(มีกองผ้าใบที่คลุมด้วยผ้าสีดำอยู่ที่มุมห้อง)"
10047070-11 = "อันนั้น... อย่าดูจะดีกว่านะ"
10047070-12 = "มันเป็นภาพวาดเก่า... ของเอริจังน่ะ"
10047070-13 = "ปล่อยไว้อย่างนั้นนั่นละ..."
10047070-14 = "[ns] \"ยังเก็บไว้อยู่อีกสินะ\""
10047070-15 = "เห็นว่าอยากเก็บไว้... เพื่อย้อนไปดูตัวเองในอดีตน่ะ"
10047070-16 = "การเผชิญหน้ากับตัวตนในอดีตที่ยังขาดประสบการณ์... คงเป็นเรื่องน่าเจ็บปวดไม่น้อยเลย"
10047070-17 = "ในหมู่พวกเรา... เอริจังพยายามหนักที่สุดแล้ว"
10047070-23 = "[ns] \"เป็นเด็กสาวที่ไล่ตามความฝันของตัวเองสินะ...\""
10047070-24 = "มาสเตอร์? มาทำอะไรอยู่ตรงนี้คะ?"
10047070-25 = "[s] \"หืม? คะ... คือว่า...!\""
10047070-26 = "คุยเรื่องชาติปางก่อนกันน่ะ..."
10047070-27 = "สงสัย... ครูจะจำเรื่องราวของเราในชาติที่แล้วไม่ได้สินะ"
10047070-28 = "เฮือก หรือว่าเนื้อคู่แต่ชาติปางก่อนที่รุ่นพี่พูดถึงก็คือ!"
10047070-30 = "[ns] \"ครูไม่เห็นรู้เรื่องเลย...!\""
10047070-32 = "(โชคดีที่ไม่โดนจับได้เพราะคาโนเอะช่วยเปลี่ยนเรื่องคุย...)"
10047070-37 = "[ns] \"ความฝันของเอริ...\""
10047070-38 = "(คุณครูจมอยู่กับความคิดมากมายระหว่างช่วยทำความสะอาด)"
10047070-41 = "อุฮุฮุ เท่านี้ก็กลับคืนสู่สภาพเดิมแล้วค่ะ!"
10047070-42 = "เฮ้อ ถ้าก่อเรื่องแบบนี้อีก ฉันจะไม่อยู่เฉยๆ แล้วนะ..."
10047070-43 = "โอ๊ะ! แสดงว่าทำเรื่องแบบอื่นได้อยู่ใช่มั้ยคะ?"
10047070-44 = "ฉันพูดให้สำนึกผิดนะ!"
10047070-45 = "ฮืม... ระเบิดมันรุนแรงกว่าที่คิดไว้อีกนะ..."
10047070-46 = "ถ้าอยากให้ปลอดภัย... สงสัยต้องออกไปทำนอกหอพักแล้วละ... "
10047070-47 = "แต่ฝ่ายดูแลหอพักก็ตรวจตรานอกหอพักกันเข้มงวดเลยไม่ใช่เหรอคะ?"
10047070-48 = "มืดแปดด้านเลย ในเวลาแบบนี้เห็นทีต้องใช้..."
10047070-49 = "เวทมนตร์แห่งอาร์คาน่า! ถึงเวลาเปิดไพ่ทาโรต์แล้วค่ะ!"
10047070-53 = "กะไว้แล้วว่าต้องเป็นแบบนี้..."
10047070-54 = "เริ่มจากการวิเคราะห์สาเหตุของความล้มเหลวในครั้งนี้กันก่อนเถอะค่ะ"
10047070-58 = "มาสเตอร์ หยิบไพ่ตรงนี้ออกมา 3 ใบแล้ววางคว่ำบนโต๊ะให้ฉันหน่อยนะคะ"
10047070-59 = "[ns] หยิบไพ่มาวางบนโต๊ะอย่างระมัดระวัง"
10047070-64 = "งั้นฉันจะอ่านไพ่เลยนะคะ"
10047070-68 = "ฮืม... แบบนี้มัน..."
10047070-69 = "พลังแห่งไฟยังไม่รุนแรงพองั้นเหรอ...?"
10047070-74 = "ฮิฮิ... หรือว่าเราควรระเบิดทั้งหอพักไปเลยนะ..."
10047070-75 = "นั่นสินะคะ ตีความได้ว่าถ้าอีกฝ่ายยั่วยุไม่พอ ปีศาจก็จะไม่ปรากฏตัวสินะคะ"
10047070-76 = "ถ้าระเบิดหอพักทิ้ง มีหวังได้เจอปีศาจที่ชื่อว่า 'โดนไล่ออก' น่ะสิ"
10047070-77 = "อืม พลังแห่งไฟที่ไพ่บอกน่าจะให้ความหมายอื่นมากกว่าค่ะ"
10047070-78 = "แล้วสิ่งนี้ก็เป็น... สัญลักษณ์ของประวัติศาสตร์อันยาวนานอีกด้วย"
10047070-79 = "อืมมมม..."
10047070-83 = "มาสเตอร์ ขอโทษนะคะ#nช่วยหยิบไพ่ให้ฉันอีกใบได้มั้ยคะ?"
10047070-84 = "[ns] พยักหน้าแล้วหยิบไพ่"
10047070-92 = "นี่มันไพ่... เดอะ แมจิเชียน?"
10047070-93 = "[s1] \"ตีความได้ว่า...\"\n[s2] \"มันดีหรือไม่ดีเหรอ?\""
10047070-96 = "ไพ่ใบนี้จะตีความในทิศทางเดียวไม่ได้ค่ะ"
10047070-97 = "ถึงไพ่เดอะ แมจิเชียนจะมีพลังมหาศาล แต่ก็อาจนำไปสู่ผลลัพธ์ที่ไม่อาจคาดเดาได้ค่ะ"
10047070-98 = "ไม่รู้ว่าจะออกมาเป็นแบบไหน... งั้นก็เหมือนพวกรุ่นพี่เลยนะ"
10047070-99 = "เหมือนกับ... พวกฉันงั้นเหรอคะ?"
10047070-106 = "ใช่ค่ะ! ต้องเป็นอย่างนั้นแน่เลย!"
10047070-107 = "ขอบคุณนะคะ เรนะจัง! สมแล้วที่เป็นสมาชิกชมรมวิจัยรหัสยศาสตร์!"
10047070-108 = "อะ... อะไรเหรอ? จู่ๆ พูดแบบนี้ ฉันกังวลนะ"
10047070-109 = "ไพ่บอกให้เราฝันถึงการเปลี่ยนแปลงโดยอ้างอิงจากประวัติศาสตร์อันยาวนานค่ะ และนั่นก็เกี่ยวกับเวทมนตร์ด้วยค่ะ!"
10047070-110 = "ทุกคนคะ! จำเรื่องเวทมนตร์ของไวลด์ฮันต์กันได้หรือเปล่าคะ?"
10047070-111 = "อย่าบอกนะว่า... หมายถึงสิ่งนั้นน่ะ...?"
10047070-112 = "อย่างนี้นี่เองสินะคะ"
10047070-113 = "การฟื้นคืนชีพสิ่งมีชีวิตที่ถูกเล่าขานกลับสู่ยุคปัจจุบัน... นั่นก็เป็นศิลปะเหมือนกันค่ะ"
10047070-114 = "อะไรเหรอ? อย่าพูดเหมือนรู้กันอยู่ฝ่ายเดียวสิ อธิบายฉันมาด้วย!"
10047070-115 = "วงเวทขนาดมหึมายังไงล่ะคะ!"
10047070-116 = "มีตำนานบอกไว้ว่า! ในคืนพระจันทร์เต็มดวง ถ้าเราวาดวงเวทขนาดใหญ่เชื่อมโยงอาคารหลักๆ ของโรงเรียนเอาไว้ละก็ จะมีสิ่งมหัศจรรย์เกิดขึ้นค่ะ!"
10047070-117 = "[s] \"สิ่งมหัศจรรย์ที่ว่ามันคืออะไรเหรอ?\""
10047070-118 = "มันเป็นตำนานที่เล่าขานกันมาตั้งแต่อดีต... ฉันเองก็ไม่รู้รายละเอียดมาก..."
10047070-119 = "แต่ได้ยินว่ามันเป็นเวทมนตร์ที่ทำให้ <ความปรารถนา> เป็นจริงน่ะ..."
10047070-120 = "อุฮุฮุ น่าตื่นเต้นใช่มั้ยล่ะคะ?"
10047070-121 = "พูดจริงเหรอ?"
10047070-122 = "จะออกไปเดินตระเวนนอกหอพักตอนกลางคืนแล้ววาดรูปรอบๆ โรงเรียนเนี่ยนะ?"
10047070-123 = "ถะ... ถ้าโดนฝ่ายดูแลหอพักจับได้จะทำยังไงล่ะ!"
10047070-124 = "ฮิฮิ ฟังนะ เรนะจัง..."
10047070-129 = "แค่ไม่ให้โดนจับได้ก็พอแล้วนี่?"
10047070-130 = "ฮุฮุ ศิลปะย่อมผลิบานจากการผจญภัยค่ะ"
10047070-131 = "ถ้าเป็นจริงตามตำนานกล่าวขานละก็ ความฝันของฉันก็คงเป็นจริงขึ้นมานะคะ...!"
10047070-132 = "แถมยังดูน่าสนุกอีกด้วย...!"
10047070-133 = "เฮ้อ! กะไว้แล้วไม่มีผิด! คุณครู! ห้ามคนเพี้ยนพวกนั้นหน่อยสิ!"
10047070-137 = "[ns3] \"ถ้ามันจะทำให้ความฝันของเอริเป็นจริง ครูก็อยากช่วยนะ\"\n[ns4] \"ถ้ามันไม่สุดโต่งเกินไป ครูก็อยากสนับสนุนนะ\""
10047070-140 = "ฉันก็เห็นด้วยค่ะ การสนับสนุนความฝันและให้กำลังใจซึ่งกันและกัน นี่ละที่เรียกว่า..."
10047070-145 = "'มิตรภาพ'"
10047070-146 = "ถูกต้องค่ะ...!"
10047070-147 = "อึกกก...!"
10047070-148 = "ฮึ่ย ไม่รู้ด้วยแล้ว! จะทำอะไรก็ตามใจ! แต่ฉันจะไม่ช่วยหรอกนะ!"
10047070-149 = "ไม่เป็นไรค่ะ! ฉันเข้าใจดีว่าเรนะจังกังวล"
10047070-150 = "ถ้าเกิดเรื่องอะไรขึ้นมา ฉันจะไม่ทำให้เรนะจังต้องพลอยเดือดร้อนไปด้วยค่ะ"
10047070-151 = "ฮึ่ม เข้าใจพูดนะคะ"
10047070-153 = "เอาละ... งั้นก็ไปพิสูจน์กันเถอะ..."
10047070-154 = "ความจริงของวงเวทขนาดมหึมา... ที่ล้อมรอบทั้งโรงเรียนของเราไว้..."
10047070-155 = "งั้นพวกเราไปที่ศูนย์ข้อมูลศิลปะด้วยกัน แล้วสำรวจกันเถอะค่ะว่าอาคารใดเชื่อมเข้าด้วยกันแล้ว#nจะเกิดวงเวทขึ้นมาได้บ้าง"
10047070-159 = "เรนะจังก็ไปด้วยกันมั้ยคะ?"
10047070-160 = "ฉันจะไปจับตาดูรุ่นพี่ เผื่อว่าจะก่อเรื่องอะไรกันอีก"
10047070-161 = "ไม่ได้มีเหตุผลอื่นเลย! จริงๆ~~~ นะ!"
10047070-162 = "ฮุฮุ ฉันรู้ค่ะ"
10047070-164 = "ศูนย์ข้อมูลศิลปะ ไวลด์ฮันต์"
10047070-189 = "(การสำรวจยากกว่าที่คิดไว้...)"
10047070-194 = "(ผลลัพธ์ที่ได้ก็ไม่ดีเท่าที่คาดหวัง)"
10047070-195 = "(ไม่ว่าจะวาดเส้นเชื่อมต่ออาคารไหนเข้าด้วยกัน ก็ได้แต่วงเวทที่รูปร่างบิดเบี้ยวและน่าขัน)"
10047070-204 = "(แต่การสำรวจก็ดำเนินต่อไป...)"
10047070-209 = "เจอแล้วค่ะ..."
10047070-210 = "ในที่สุดก็หาเจอแล้วค่ะ! วงเวทขนาดมหึมาที่ซ่อนอยู่ในโรงเรียนของเรา...!!"
10047070-217 = "จะ... จริงเหรอ? นี่ไม่ใช่รูปที่วาดบนแผนที่เก่าๆ หรอกเหรอ?"
10047070-218 = "อุฮุฮุ จริงค่ะ"
10047070-219 = "ก่อนหน้านี้ที่ยังหาไม่เจอ ก็เพราะฉันพยายามหาจากอาคารในปัจจุบัน"
10047070-220 = "แต่พอฉันลองวาดเส้นเชื่อม <อาคารหลังเก่า> ที่สร้างขึ้นตั้งแต่ตอนก่อตั้งโรงเรียน ก็เกิดเป็นวงเวทของจริงที่สมมาตรอย่างสมบูรณ์แบบเลยค่ะ"
10047070-221 = "ถ้าจะเรียกให้ถูก ต้องบอกว่านี่คือ... <จัตุรัสกล> ที่ใช้หลักคณิตศาสตร์ค่ะ"
10047070-222 = "ถ้าบวกเลขหลักสุดท้ายในที่อยู่ของอาคารแต่ละหลังที่เชื่อมกันด้วยเส้นนี้ละก็..."
10047070-223 = "ดูสิคะ! ทั้ง 6 เส้นนี้มีผลรวมแต่ละด้านเป็น 26 เหมือนกันค่ะ!"
10047070-224 = "นี่มัน... โครงสร้างที่จงใจให้เป็นแบบนี้ 100% เลยค่ะ!#nที่เล่ากันว่ารหัสยศาสตร์มีอิทธิพลต่อการก่อตั้งโรงเรียนเป็นเรื่องจริงสินะคะ!"
10047070-225 = "ละ... เหลือจะเชื่อ..."
10047070-226 = "เหมือนว่ามันรอให้ใครบางคนมาค้นพบอยู่อย่างนั้นละ..."
10047070-227 = "นี่คือวงเวทที่แท้จริงอย่างไม่ต้องสงสัย อยากรู้จังว่าถ้าวาดเสร็จแล้วจะเกิดเรื่องมหัศจรรย์แบบไหน"
10047070-231 = "แต่ว่า... มันมีปัญหาอยู่อย่างหนึ่ง"
10047070-236 = "ดูนะ นี่คือแผนที่โรงเรียนของเราในตอนนี้... มันแตกต่างจากแผนที่เก่าอย่างเห็นได้ชัด"
10047070-237 = "อาคารบางหลังในอดีตหายไป... แล้วก็มีอาคารที่สร้างขึ้นมาใหม่ด้วย"
10047070-238 = "ปัญหาก็คือ... อาคารหลังนี้ที่สร้างขึ้นใหม่ทับเส้นวงเวท"
10047070-242 = "เฮือก! อย่าบอกนะว่าอาคารหลังนี้คือ...!!"
10047070-243 = "ตายจริง"
10047070-244 = "ใช่แล้วละ... ถ้าจะวาดวงเวทให้สำเร็จตามแผนที่นี้..."
10047070-246 = "[log=카노에]ก็ต้องผ่านหอพักของฝ่ายดูแลหอพักด้วย[/log]"

[translation]
10047070-1 = "Episode 7;Proof of the Legend"
10047070-2 = "After returning to the dorm, everyone worked hard to clean up."
10047070-6 = "[ns] \"Wait, is that...?\""
10047070-7 = "Several canvases covered in black fabric were stacked in the corner of the room."
10047070-11 = "You...shouldn't look at those."
10047070-12 = "They're...Eri's old paintings."
10047070-13 = "Leave them be..."
10047070-14 = "[ns] \"She kept them and didn't throw them away?\""
10047070-15 = "She said she wanted to reflect...on her first steps."
10047070-16 = "Looking at your past, immature self...must be painful..."
10047070-17 = "She...works the hardest of all of us."
10047070-23 = "[ns] \"...A girl chasing her dreams.\""
10047070-24 = "Master? What are you whispering about?"
10047070-25 = "[s] \"Huh? Well, uh...!\""
10047070-26 = "...About my past life."
10047070-27 = "It seems Sensei...doesn't remember their past life with me."
10047070-28 = "*gasp* YOU were the one Kanoe was talking about?!"
10047070-30 = "[ns] \"I don't know anything...!\""
10047070-32 = "Thanks to Kanoe's intervention, Eri never caught on to what we were really talking about."
10047070-37 = "[ns] \"Eri's dream...\""
10047070-38 = "With unvoiced thoughts, we continued to clean."
10047070-41 = "Nyuhuhu, good as new!"
10047070-42 = "*sigh* If you pull something like this again, I'll make you pay."
10047070-43 = "Oh! Well...hmm, then maybe we should try a new approach for our next activity!"
10047070-44 = "PLEASE think about the consequences of your actions!"
10047070-45 = "Hm... The explosion WAS stronger than I thought... The walls have been weakened..."
10047070-46 = "If we want to stay safe... We should try somewhere outside of the dorms..."
10047070-47 = "But the Council's surveillance is so much harsher out there."
10047070-48 = "I don't see a path. What we need right now is..."
10047070-49 = "Arcana's magic! It's time to read the tarot cards!"
10047070-53 = "...Shocking."
10047070-54 = "Now, let's analyze the reason we failed."
10047070-58 = "Master, please draw three cards and put them on the table, faces down."
10047070-59 = "[ns] Carefully draw cards and place them on the table."
10047070-64 = "Then...let's see..."
10047070-68 = "Hm, interesting..."
10047070-69 = "...Perhaps we didn't have enough firepower?"
10047070-74 = "Heehee... Maybe we should have blown up the whole dorm..."
10047070-75 = "I understand. Demons only want to commune with exciting people."
10047070-76 = "...If we'd blown up the dorm, I think we would have faced a demon named \"Expulsion.\""
10047070-77 = "Hm, I think the firepower here is more metaphorical."
10047070-78 = "And this card...symbolizes old history."
10047070-79 = "Hmmm..."
10047070-83 = "Master, I'm sorry. Could you draw one more card?"
10047070-84 = "[ns] Nod and draw a card."
10047070-92 = "This is...upright Magician?"
10047070-93 = "[s1] \"Yeah...\"\n[s2] \"Good or bad?\""
10047070-96 = "The Magician cannot be so easily interpreted."
10047070-97 = "It signifies great ability, but also unpredictability. It's impossible to know for sure."
10047070-98 = "Unpredictable...? Sounds like the seniors."
10047070-99 = "It's...just like us?"
10047070-106 = "I see! That's it!"
10047070-107 = "Thank you, Rena! As expected of a member of the Occult Investigation Society!"
10047070-108 = "Wh-What? I don't like where this is going..."
10047070-109 = "The cards say to refer to ancient history as you dream of a transformative future. And it's pure magic!"
10047070-110 = "Everyone! Do you remember the story about Wildhunt's magic?"
10047070-111 = "You mean...that...?"
10047070-112 = "I see."
10047070-113 = "Reviving a whispered legend into the present... That too, is art."
10047070-114 = "What is? Don't just talk about something like everyone understands. Explain it!"
10047070-115 = "A giant magic circle!"
10047070-116 = "On the night of the full moon! The legend says that if you create a giant magic circle connecting the academy's major facilities, something amazing will happen!"
10047070-117 = "[s] \"What exactly is this amazing thing?\""
10047070-118 = "It's...an old legend, made before writing... We're unsure."
10047070-119 = "But it is said to be magic that grants your fondest wish..."
10047070-120 = "Nyuhuhu, isn't that exciting?"
10047070-121 = "Are you for real?"
10047070-122 = "You're going to run all around the campus at night and draw a circle on the floors?"
10047070-123 = "Wh-What if you get caught by the Prefectural Council?!"
10047070-124 = "Heehee, listen carefully, Rena..."
10047070-129 = "It's fine as long as we don't get caught."
10047070-130 = "Heh, art blooms through adventure."
10047070-131 = "And if the legends are accurate, then my dream will come true!"
10047070-132 = "...And it sounds fun!"
10047070-133 = "Shyaah! I knew it! Sensei! Stop them!"
10047070-137 = "[ns3] \"If it helps Eri's dream, I want to join.\"\n[ns4] \"Of course, we shouldn't do anything extreme.\""
10047070-140 = "I agree. To cheer on each other's dreams and lend each other strength... These leave no doubt that..."
10047070-145 = "...friendship..."
10047070-146 = "...is all that matters!"
10047070-147 = "UGH!"
10047070-148 = "Ahh, whatever! Do whatever you want! I'm out!"
10047070-149 = "It's fine! I understand your concern."
10047070-150 = "Whatever happens, I'll make sure you don't get in trouble."
10047070-151 = "Hmph. Always such a smooth talker..."
10047070-153 = "Now... Let's see..."
10047070-154 = "The form of the large magical glyph...that is said to circle the entire Academy..."
10047070-155 = "Let's head to the Arts Information Center and investigate! I'm sure some of these buildings must form a circle."
10047070-159 = "Will you come too, Rena?"
10047070-160 = "...Just to make sure you seniors don't cause a scene, I guess!"
10047070-161 = "That's reaaaally it. Got it?"
10047070-162 = "Heh, we know."
10047070-164 = "Wildhunt Arts Information Center"
10047070-189 = "The investigation proved arduous..."
10047070-194 = "Nothing looked as neat or clear as we hoped."
10047070-195 = "No matter how we tried to connect the buildings, we'd end up with comically dented magic circles."
10047070-204 = "I wondered how much longer we could keep trying..."
10047070-209 = " ...I found it."
10047070-210 = "I finally got it! The location of Wildhunt's magic circle!"
10047070-217 = "Th-This is for real? It's not just someone drawing on an old map?"
10047070-218 = "Nyuhuhu, it's real!"
10047070-219 = "We couldn't see it because we kept trying to connect the modern buildings."
10047070-220 = "But if we align the OLD buildings, the ones that were here when Wildhunt was founded, we see a perfectly symmetrical magic circle!"
10047070-221 = "And it even involves math! Not just a magic circle, but a magic SQUARE!"
10047070-222 = "If you add the final number of each building's address that runs through these lines..."
10047070-223 = "See! Six lines that each add up to 26! Coincidence? I think not!"
10047070-224 = "This was intentional! I knew it! The occult is built into Wildhunt's very foundation!"
10047070-225 = "N-No way..."
10047070-226 = "The secret waited all this time for someone to discover it..."
10047070-227 = "An undeniable, actual magic circle. What magic awaits us...if we complete it?"
10047070-231 = "Still... There's one problem."
10047070-236 = "Look. This is the map of the academy now... It's changed significantly."
10047070-237 = "Buildings disappeared... New ones appeared..."
10047070-238 = "This is the problem... A new building built right where the circle passes through..."
10047070-242 = "*gasp* Could it be...?!"
10047070-243 = "Oh dear."
10047070-244 = "Yes... In order to complete the magic circle according to this map..."
10047070-246 = "[log=카노에]We must pass through the Prefectural Council's dorm.[/log]"

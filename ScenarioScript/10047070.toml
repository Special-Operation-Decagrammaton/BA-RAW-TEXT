[translation]
10047070-1 = "第7話;傳說的證明"
10047070-2 = "（回到宿舍後，大家努力把房間打掃乾淨）"
10047070-6 = "[ns]「……這是？」"
10047070-7 = "（在房間的角落，堆著一堆用黑布覆蓋的畫布）"
10047070-11 = "那些……還是別看比較好。"
10047070-12 = "因為那是繪梨醬……以前的畫作。"
10047070-13 = "放著就行了……"
10047070-14 = "[ns]「沒有選擇丟掉，而是都留著啊。」"
10047070-15 = "他說……想回顧自己的足跡……"
10047070-16 = "面對過去那不成熟的自己……一定很痛苦吧……"
10047070-17 = "他在我們之中……是最努力的人。"
10047070-23 = "[ns]「……是個追逐夢想的少女啊。」"
10047070-24 = "御者？你在這裡做什麼？"
10047070-25 = "[s]「咦？那，那個……！」"
10047070-26 = "……在聊關於前世的話題。"
10047070-27 = "看來老師他……並不記得前世和我的羈絆呢。"
10047070-28 = "咦，難道前輩說的前世羈絆是……！"
10047070-30 = "[ns]「我，我什麼都不知道……！」"
10047070-32 = "（……多虧鹿江轉移了話題，所以才沒被發現）"
10047070-37 = "[ns]「繪梨的夢想嗎……」"
10047070-38 = "（一邊思考著各種事情，一邊繼續打掃）"
10047070-41 = "妞呵呵，這樣就恢復原狀了！"
10047070-42 = "唉……要是下次再做這種事的話，我真的不會放過你們……"
10047070-43 = "哦哦！所以只要稍微換個方向就行了對吧？"
10047070-44 = "給我反省啦，反省！"
10047070-45 = "唔嗯……爆炸比想像中還猛烈……"
10047070-46 = "要安全進行的話，果然還是在宿舍外面比較好……"
10047070-47 = "可是舍監隊在宿舍外的監視不是更嚴格嗎？"
10047070-48 = "陷入前途未卜的狀況了呢。#n這種時候就需要……"
10047070-49 = "阿爾克那的魔法！輪到塔羅牌出場了！"
10047070-53 = "……我就知道。"
10047070-54 = "先從分析這次失敗的原因開始吧？"
10047070-58 = "御者，請幫我抽出三張牌，然後蓋放在桌子上。"
10047070-59 = "[ns] 小心翼翼地抽出牌並放好"
10047070-64 = "那麼，我這就開始確認。"
10047070-68 = "唔嗯，這是……"
10047070-69 = "……火力不足的意思嗎？"
10047070-74 = "咿嘻……是不是該把宿舍整棟炸飛呢……"
10047070-75 = "原來如此。看來惡魔似乎不想理會不夠刺激的對手呢。"
10047070-76 = "……要是炸掉宿舍的話，恐怕會遇到名為「退學」的惡魔吧。"
10047070-77 = "唔嗯，看來這裡說的火力指的是比較抽象的意義。"
10047070-78 = "而且這張牌……還象徵著悠久的歷史。"
10047070-79 = "唔～～～嗯……"
10047070-83 = "御者，能麻煩你再抽一張嗎？"
10047070-84 = "[ns] 點頭後抽出一張牌"
10047070-92 = "這是……正位的魔術師？"
10047070-93 = "[s1]「那樣……」\n[s2]「是好事嗎？還是壞事？」"
10047070-96 = "魔術師這張牌無法單獨解讀。"
10047070-97 = "雖然擁有強大的力量，同時卻也帶有不可預測的變數。"
10047070-98 = "不可預測……就跟前輩們一樣呢。"
10047070-99 = "跟我們……一樣？"
10047070-106 = "沒錯！就是這個！"
10047070-107 = "謝謝你，玲奈醬！不愧是神秘學研究會的一員！"
10047070-108 = "什，什麼啦？突然這樣說讓我更不安了。"
10047070-109 = "這張牌的意思是要參考古老的歷史，並懷抱變革的夢想……而且還要跟魔法有關！"
10047070-110 = "大家！還記得狂獵的魔法傳說嗎？"
10047070-111 = "難道……是那個嗎……？"
10047070-112 = "原來如此。"
10047070-113 = "將口耳相傳的存在於現代復活……這也同樣是藝術。"
10047070-114 = "到底是什麼啦？#n不准說那些只有你們自己能聽懂的話，快點解釋清楚！"
10047070-115 = "就是巨大魔法陣呀！"
10047070-116 = "只要在滿月的夜晚連結學院主要的設施，畫出巨大魔法陣……就會發生驚人的事情！"
10047070-117 = "[s]「那個驚人的事情，具體來說是什麼呢？」"
10047070-118 = "因為是個古老的傳聞……詳細情況我也不清楚……"
10047070-119 = "不過據說是能夠實現「願望」的魔法……"
10047070-120 = "妞呵呵，不覺得很興奮嗎？"
10047070-121 = "你們認真？"
10047070-122 = "要半夜的時候在宿舍外面跑來跑去，還在整個學院裡畫圖？"
10047070-123 = "要是被舍監隊抓到怎麼辦啊！？"
10047070-124 = "咿嘻，你聽好囉，玲奈醬……"
10047070-129 = "不被抓到不就行了嗎？"
10047070-130 = "呵呵，藝術總是在冒險中綻放。"
10047070-131 = "如果傳說屬實的話，我的夢想就能實現了……！"
10047070-132 = "……而且感覺也挺有趣的！"
10047070-133 = "嚇啊──！我就知道會變成這樣！#n老師！快阻止他們！"
10047070-137 = "[ns3]「如果能幫繪梨實現夢想的話，我願意幫忙。」\n[ns4]「當然，前提是不能做得太過頭哦。」"
10047070-140 = "我也是這麼想的。#n支持彼此的夢想並互相幫助，這就是──"
10047070-145 = "──「夥伴」。"
10047070-146 = "……所代表的意義！"
10047070-147 = "唔唔唔……！"
10047070-148 = "啊啊，隨便你們吧！我不管了！#n反正我絕對不會幫忙的！"
10047070-149 = "沒關係！我們理解玲奈醬的擔心。"
10047070-150 = "就算發生了什麼事，也絕不會讓玲奈醬受到牽連。"
10047070-151 = "哼，你說得倒是好聽……"
10047070-153 = "好……那就去確認一下吧……"
10047070-154 = "圍繞整個學院的……巨大魔法陣的真面目……"
10047070-155 = "大家一起去藝術情報館，調查哪些設施能連結成魔法陣吧！"
10047070-159 = "玲奈醬也要一起來嗎？"
10047070-160 = "我純粹只是去監視，以免前輩們又闖禍而已！"
10047070-161 = "真～～～的沒有其他意思！"
10047070-162 = "呵呵，我知道我知道。"
10047070-164 = "狂獵藝術情報館"
10047070-189 = "（調查比預想中還要困難……）"
10047070-194 = "（結果不盡理想）"
10047070-195 = "（無論怎麼連結設施，都只能畫出歪七扭八的魔法陣）"
10047070-204 = "（究竟還要調查多久呢）"
10047070-209 = "……找到了。"
10047070-210 = "終於找到了！隱藏在我們學院中的巨大魔法陣的真相……！！"
10047070-217 = "這，這是真的嗎？不是在舊地圖上隨便畫的吧？"
10047070-218 = "妞呵呵，是真的哦。"
10047070-219 = "我們之所以會失敗，是因為一直以現有設施作為參照物的關係。"
10047070-220 = "一旦將學院創立初期的「舊設施」連結起來，完美對稱的魔法陣就出現了。"
10047070-221 = "而且還是運用了數學的……所謂的「魔方陣」！"
10047070-222 = "如果把這些被線連接的設施的地址尾數加總起來……"
10047070-223 = "你們看！有六條線的總和都是26！"
10047070-224 = "這……百分之百是刻意設計的結構！#n學院的建設果然有受到神秘學的影響！"
10047070-225 = "騙，騙人的吧……"
10047070-226 = "簡直……就像一直在等待有人發現一樣……"
10047070-227 = "這毫無疑問是真正的魔法陣。#n要是能夠完成它的話，究竟會發生多麼驚人的事呢……"
10047070-231 = "不過……有個問題。"
10047070-236 = "來，這是現在學院的地圖……和舊的地圖有所不同。"
10047070-237 = "有些建築已經消失……還出現了一些新建築……"
10047070-238 = "而問題就出在……某棟在魔法陣上必經的建築。"
10047070-242 = "啊！難道是……！？"
10047070-243 = "哎呀。"
10047070-244 = "沒錯……如果要按照這張地圖完成魔法陣的話……"
10047070-246 = "[log=카노에]就必須經過舍監隊的宿舍。[/log]"

1011006-85 = "3;세이아;04\n#wait;500"
1011006-86 = "3;세이아;09\n#3;stiff\n#wait;1000"
1011006-87 = "3;세이아;07\n#3;em;[한숨]\n#wait;1500"
1011006-88 = "3;세이아;99\n#wait;500"
1011006-89 = "3;세이아;01\n#wait;1000"
1011006-90 = "3;세이아;02;너무 노골적으로 아쉬워하시는군요. 어른인 선생님께서, 저 같은 아이에게 어리광이라도 부리시는 건가요?"
1011006-91 = "3;세이아;08;그리고 어째서인지……."
1011006-92 = "3;세이아;99;저도 점점 왠지 선생님께는, 한 번쯤 들려 드리고 싶다는 생각도 들기 시작하네요."
1011006-93 = "3;세이아;01;하긴 그렇지요. 선생님은 늘 제 진의를 먼저 파악해 주시고, 저 또한 선생님께는 의도적으로 보여드리는 가식을 제외하고, '진짜 가식'을 부릴 일이 없겠지요."
1011006-94 = "3;세이아;02;그런 의미에서는……. 선생님께는 오히려 평생 제 노래를 들려 드릴 일이 없을지도 모르겠어요."
1011006-95 = "3;세이아;03;……그건 너무 서운하지요."
1011006-96 = "3;세이아;02;좋습니다. 이번에도 제가 졌습니다."
1011006-97 = "3;세이아;03;생각해 보면, 선생님께도 드리고 싶은 저의 '진실'이 하나 있긴 하니까요. 평소에도 딱히 숨기고 있지 않아서, 진실처럼 보이지 않을 뿐."
1011006-98 = "3;세이아;03;그럼 들려 드리도록 하겠습니다."
1011006-99 = "3;세이아;99;선생님."

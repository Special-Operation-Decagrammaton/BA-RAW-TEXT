[translation]
1011006-1 = "與鳥相隨的少女"
1011006-2 = "（來到三一，跟三一討論與聯邦學生會有關的工作）"
1011006-3 = "（由於議題不少，所以回去的時候已經是深夜了）"
1011006-8 = "[ns1]「……有鳥叫聲？」\n[ns2] 走向聲音傳來的方向"
1011006-14 = "[ns3]「這裡是……」\n[ns4]「茶會內部的公園……？」"
1011006-17 = "……老師？"
1011006-22 = "你怎麼會來這裡……？"
1011006-23 = "啊啊，這麼說來，你提過有事情要討論對吧。#n因為會議跟我沒什麼關係，所以我並沒有參與……"
1011006-24 = "話說我都忘記老師說過會來了呢。#n早知道我就出席了。"
1011006-25 = "不過……為了跟人見面而出席與自己無關的會議，似乎也有點奇怪就是了。"
1011006-26 = "最終居然能以這種形式見到你，今天的運氣還真不錯。"
1011006-27 = "……嗯？問我在這裡做什麼？"
1011006-28 = "就像你見到的一樣，只是很普通的散步而已。#n因為沒有其他人在，所以自然也沒有閒聊、開槍和丟擲手榴彈的噪音。"
1011006-29 = "這種時候如果不好好利用實在很可惜，所以我常常會獨佔這個空間。"
1011006-33 = "……呵呵。#n我知道，剛才只是開個玩笑而已。"
1011006-34 = "其實我是在這裡等老師經過，所以請別用那種表情看我。"
1011006-35 = "[s5]「所以連鳥叫聲也是……」\n[s6]「是現在站在你手上的鳥發出來的嗎？」"
1011006-38 = "叫聲……？"
1011006-43 = "……啊哈。"
1011006-44 = "不，你所聽到的鳥叫聲，並不是我刻意安排的。"
1011006-45 = "我只是想在這裡看老師經過而已，老師的到來也在我的計畫之外。"
1011006-46 = "聲音……鳥叫聲……"
1011006-47 = "你好奇是不是我手上這隻鳥的發出來的？#n……或許是吧。"
1011006-48 = "不過我也很難向你保證……肯定是這樣沒錯。"
1011006-49 = "[s7]「可能是，也可能不是？」\n[s8]「這個回答好像有點模稜兩可耶。」"
1011006-52 = "呵呵，雖然我也喜歡猜謎，但現在的情況其實很簡單。"
1011006-53 = "這種鳥類在這個公園和我房間的窗邊都經常出現。#n雖然總有一兩隻會靠近我，但並非每次都是同一隻鳥。"
1011006-54 = "換言之，我也不確定讓老師聽見叫聲的究竟是現在這隻，還是剛才飛走的另一隻。"
1011006-55 = "不過無論如何，牠們的聲音十分美妙的事實都不會改變。"
1011006-56 = "無論歌唱的究竟是哪隻鳥，能吸引老師前來都是個相當不錯的經驗。"
1011006-57 = "光是能為老師的一天增添些許好奇心，那些鳥兒想必十分滿足吧。#n當然我也不例外。"
1011006-58 = "[s9]「歌聲……啊。」\n[s10]「真是首很棒的歌呢。」"
1011006-61 = "謝謝你。#n雖然被稱讚的並不是我，但我也感到與有榮焉。"
1011006-62 = "而且……"
1011006-63 = "其實我也不討厭唱歌。#n獨處的時候，我也經常會唱歌呢。"
1011006-64 = "……呵呵。"
1011006-65 = "你看起來似乎有點驚訝。#n真開心，居然能看見你因為我而露出那種表情。"
1011006-66 = "雖然我很想立刻為老師高歌一曲……"
1011006-67 = "不過我還是想忍耐一下。#n畢竟要唱給老師聽的「第一首歌」，如果用在這個時間點感覺有點可惜。"
1011006-71 = "……就算那樣看我也不行。"
1011006-72 = "老師，唱歌對我而言是個非常重要的表達方式。"
1011006-73 = "雖然現在也同樣有待加強，但以前的我真的很不擅長與人交談。#n只要我一開口，就會讓周圍的人感到不舒服。"
1011006-74 = "然而要改掉一直以來的習慣並不容易，況且我當時也沒有要改變的想法。"
1011006-75 = "不過我偶爾……在極少數的情況下，還是會想轉達「未被曲解的事實」……"
1011006-76 = "……而這時能使用的方法，對我而言就是唱歌。"
1011006-77 = "在面對茶會的其他人、修女會或救護騎士團……不，就連三一的其他學生也是。"
1011006-78 = "甚至在偶爾不得不與外校學生交流時，有必要的話我也會用唱歌來傳遞想法。"
1011006-79 = "在我那向來偽善、連對自己都無法坦誠，說話總是充滿迂迴與藉口的人生當中……"
1011006-80 = "唱歌是我唯一能表達「這次並非如此」的手段。"
1011006-81 = "所以我沒辦法單純因為「想唱給你聽」就唱出來。我並不習慣這樣。"
1011006-90 = "你看起來相當遺憾呢。#n明明老師是大人，現在卻在向我這樣的孩子耍任性嗎？"
1011006-91 = "還有不知為何……"
1011006-92 = "漸漸開始想唱首歌給老師聽了。"
1011006-93 = "或許這也不奇怪。畢竟老師總是能率先察覺我的真實想法……#n除了刻意向老師展現的情況以外，也不存在所謂「真正的虛偽」。"
1011006-94 = "所以……或許我這輩子都沒機會唱歌給老師聽也說不定。"
1011006-95 = "……那確實相當令人難過。"
1011006-96 = "好吧，這次也是我輸了。"
1011006-97 = "仔細想想，我確實有件關於自己的「事實」想告訴老師。#n雖然我平時也沒有刻意隱瞞，只是看起來並不像是真的而已。"
1011006-98 = "那麼，我要唱了。"
1011006-99 = "老師。"
1011006-106 = "這是我要獻給老師的……"
1011006-107 = "……我的「感謝之歌」。"

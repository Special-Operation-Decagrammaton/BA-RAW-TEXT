[translation]
1011006-1 = "A Girl Followed By Birds"
1011006-2 = "I went to Trinity to talk about work related to both Trinity and the General Student Council."
1011006-3 = "There were quite a few topics to go over, so by the time we were done, it was already dark."
1011006-8 = "[ns1] \"...? Birds chirping?\"\n[ns2] Head to where the sound came from."
1011006-14 = "[ns3] \"This place is...\"\n[ns4] \"Tea Party's indoor park...?\""
1011006-17 = "...Sensei?"
1011006-22 = "What are you doing here...?"
1011006-23 = "Ahh. Of course, you mentioned you were here on business. I didn't join the meeting because it wasn't pertinent to me..."
1011006-24 = "...but I'd forgotten you would be there. Perhaps I should have joined after all."
1011006-25 = "Then again, it would be a bit awkward to sit through an entire meeting I wasn't a part of, just to meet you."
1011006-26 = "And I ended up meeting you anyway, so it must be my lucky day."
1011006-27 = "...Hmm? What was I doing here?"
1011006-28 = "Merely walking, as you can see. It's pleasantly quiet out here. No gossip, no guns, no grenades."
1011006-29 = "I pulled a few strings and reserved the whole place for myself."
1011006-33 = "...Fufu, no, I'm joking."
1011006-34 = "I simply thought you might walk by. Oh, please don't look at me like that."
1011006-35 = "[s5] \"Then the bird chirping...\"\n[s6] \"Was that the bird sitting on your hand right now?\""
1011006-38 = "Chirping...?"
1011006-43 = "...Aha."
1011006-44 = "No, I had no plan to lure you here, if that's what you're implying."
1011006-45 = "All I wanted was to see you passing by."
1011006-46 = "The chirping, hmm..."
1011006-47 = "You want to know if it came from this little one? Perhaps it did."
1011006-48 = "...One would be hard pressed to say for sure."
1011006-49 = "[s7] \"So that's a maybe?\"\n[s8] \"That sounds mysterious.\""
1011006-52 = "Fufu, I do enjoy a mystery, but that's not my intention at the moment. You see..."
1011006-53 = "Many of these little ones live here in the park, and some often come to my window. A few even perch on me now and again, though I'm never sure which is which."
1011006-54 = "So the chirp you heard could have come from this one, or perhaps another one entirely."
1011006-55 = "All I can say for certain is that all of them have lovely singing voices."
1011006-56 = "And whichever one charmed you enough to bring you here, well, I sincerely appreciate it."
1011006-57 = "I'm sure the little ones would love to know they sprinkled a bit of curiosity into your day. And I would say the same."
1011006-58 = "[s9] \"Those are nice singing voices.\"\n[s10] \"It's a good song.\""
1011006-61 = "Thank you. That is, allow me to accept your compliment on their behalf."
1011006-62 = "Incidentally..."
1011006-63 = "I do enjoy a good song. Sometimes, when I'm alone, I even sing myself."
1011006-64 = "...Fufu."
1011006-65 = "I love the surprise on your face, when I told you that just now."
1011006-66 = "And I would love to seize the moment and sing you a song..."
1011006-67 = "...but I ought to hold back. The first song I sing for you should come at a special place and time."
1011006-71 = "Oh, don't look at me that way."
1011006-72 = "Singing has a very special meaning for me, Sensei."
1011006-73 = "I used to be incredibly shy and awkward when I spoke to others. More so than I am now, even. People would feel uncomfortable whenever I opened my mouth."
1011006-74 = "It was difficult to change that, and I wasn't always sure if I even needed to."
1011006-75 = "But there were rare occasions when I needed to give people the clear, unvarnished truth."
1011006-76 = "...And singing was my medium for that."
1011006-77 = "To the people of the Tea Party, the Sisterhood, and Remedial Knights...even to other students at Trinity."
1011006-78 = "And even in occasional exchange with students from other schools, I would sing to express my thoughts when absolutely necessary."
1011006-79 = "My life was full of excuses and talking in circles. I was hypocritical, and couldn't be honest with myself..."
1011006-80 = "Singing was my only way of saying \"not this time.\""
1011006-81 = "So I can't sing to you just because I wanted to. That's not the way I've taught myself."
1011006-90 = "You're looking very disappointed. Is it your turn to be the brat, perhaps?"
1011006-91 = "Hmm, though for some reason..."
1011006-92 = "I am starting to feel like I want to sing for you. At some point."
1011006-93 = "Ah, you always read my intentions so well. My pretenses never fool you. All I can do is play along with your playing along."
1011006-94 = "With that said, you may never have the chance to hear me sing."
1011006-95 = "Wouldn't that be a shame?"
1011006-96 = "...Oh, you've seen through me again."
1011006-97 = "There is one truth I want to tell you. Though by this point, I suppose it's hardly a revelation."
1011006-98 = "I'll sing it to you, then..."
1011006-99 = "Sensei..."
1011006-106 = "This is my..."
1011006-107 = "...\"song of thanks\" for you."

[translation]
1011006-1 = "#title;새들이 따르는 소녀"
1011006-2 = "#na;(트리니티에 들러 트리니티와 총학생회에 관련된 일감들을 논의하였다.)"
1011006-3 = "#na;(안건이 꽤 많았기 때문에, 끝나고 돌아갈 땐 이미 늦은 밤이 돼 있었다.)"
1011006-4 = "#all;hide"
1011006-5 = "#wait;2000"
1011006-6 = "#wait;2500"
1011006-7 = "#wait;1500"
1011006-8 = "[ns1] \"……? 새 소리?\"\n[ns2] 소리가 난 곳을 찾아간다."
1011006-9 = "#wait;100"
1011006-10 = "#wait;100"
1011006-11 = "#all;hide"
1011006-12 = "#wait;2000"
1011006-13 = "#wait;2500"
1011006-14 = "[ns3] \"여기는…….\"\n[ns4] \"티파티의 내부 공원……?\""
1011006-15 = "#wait;100"
1011006-16 = "#wait;100"
1011006-17 = "#na;???;……선생님?"
1011006-18 = "#st;[0,0];instant;1;"
1011006-19 = "#clearST"
1011006-20 = "#wait;1000"
1011006-21 = "3;세이아;01\n#3;a\n#wait;1000"
1011006-22 = "3;세이아;04;어째서 이런 곳에……?"
1011006-23 = "3;세이아;01;아아. 그러고 보니 논의가 있다고 하셨었죠. 저와는 크게 관계없는 회의라 들어가지 않았는데…….\n#3;stiff"
1011006-24 = "3;세이아;06;그러고 보니 선생님도 온다고 하셨던 걸 잊었군요. 그럴 줄 알았으면 참석할 걸 그랬네요.\n#3;em;[한숨]"
1011006-25 = "3;세이아;08;뭐……. 사실 들어가도 관여할 것 없는 회의에 사람을 만나러 참석하는 것도 좀 우습긴 하지만 말이에요."
1011006-26 = "3;세이아;02;결과적으로는 이렇게 뵙게 되었고, 오늘은 운이 좋군요."
1011006-27 = "3;세이아;01;……네? 뭘 하고 있었냐고요?\n#3;em;[?]"
1011006-28 = "3;세이아;02;보시다시피 평범한 산책이에요. 아무도 없기 때문에 가십거리를 떠드는 소리도, 괜히 총을 쏘거나 수류탄을 던지는 소란스러운 소리도 없지요."
1011006-29 = "3;세이아;08;이런 때의 이곳은 버려두기가 아까워서, 이렇게 혼자만의 공간으로 독차지하곤 한답니다."
1011006-30 = "#st;[0,0];instant;1;"
1011006-31 = "#clearST"
1011006-32 = "3;세이아;99\n#3;em;…\n#wait;2500"
1011006-33 = "3;세이아;03;……후후, 알겠어요. 농담이었어요.\n#3;jump\n#3;em;[음표]"
1011006-34 = "3;세이아;02;실은 이미 이곳에서, 선생님께서 지나가시길 기다리고 있었답니다. 그러니 그런 표정으로 보지 말아 주세요."
1011006-35 = "[s5] \"그럼 그 새소리도…….\"\n[s6] \"지금 손에 앉은 그 아이의 소리였어?\""
1011006-36 = "#wait;100"
1011006-37 = "#wait;100"
1011006-38 = "3;세이아;04;소리……?"
1011006-39 = "#st;[0,0];instant;1;"
1011006-40 = "#clearST"
1011006-41 = "3;세이아;04\n#3;em;…\n#wait;2500"
1011006-42 = "3;세이아;02\n#3;em;[전구]\n#wait;1500"
1011006-43 = "3;세이아;03;……아하.\n#3;jump"
1011006-44 = "3;세이아;02;아니요, 들으신 새 소리는 따로 제가 의도했던 건 아니었습니다."
1011006-45 = "3;세이아;01;저는 그저 선생님이 지나가시는 걸 여기서 지켜보고 싶었을 뿐. 선생님이 이리로 찾아와 주신 건, 계획 밖이었거든요."
1011006-46 = "3;세이아;99;소리…… 새 소리라……."
1011006-47 = "3;세이아;02;지금 제 손에 있는, 이 아이의 노랫소리였는지를 물으신 거겠죠? 그렇다면 아마 그럴 수도 있겠어요."
1011006-48 = "3;세이아;01;하지만 확실히 그렇다……라고 말씀드리기는 또 어렵겠네요."
1011006-49 = "[s7] \"그럴 수도 있고, 아닐 수도 있다?\"\n[s8] \"갑자기 알쏭달쏭한 이야기네.\""
1011006-50 = "#wait;100"
1011006-51 = "#wait;100"
1011006-52 = "3;세이아;03;후후, 제가 수수께끼를 좋아하긴 하지만 지금은 조금 다릅니다. 아주 단순한 이야기.\n#3;jump"
1011006-53 = "3;세이아;02;이 아이들은 이 공원에도, 제 방의 창가에도 아주 많이 있어요. 이렇게 꼭, 저에게 한두 마리씩 다가와 있지만 늘 같은 아이도 아니고요."
1011006-54 = "3;세이아;01;즉 선생님께 지저귀는 소리를 들려드린 아이가 지금의 이 아이인지, 방금 전에 돌아간 다른 아이인지 확실하지 않다는 뜻이지요."
1011006-55 = "3;세이아;02;그래도 어느 쪽의 아이건 예쁜 소리로 노래한다는 것은 차이가 없겠네요."
1011006-56 = "3;세이아;02;누가 됐건 선생님께서 그 노랫소리에 혹해 여기까지 오신 경험이라면, 그 경험 또한 나쁘지 않은 경험일 터."
1011006-57 = "3;세이아;01;선생님의 하루에 작은 호기심을 만들어 드렸다는 사실만으로도, 이 아이들은 아마 만족할 겁니다. 물론 저도 그렇고 말이죠."
1011006-58 = "[s9] \"노랫소리……라.\"\n[s10] \"좋은 노래였어.\""
1011006-59 = "#wait;100"
1011006-60 = "#wait;100"
1011006-61 = "3;세이아;02;감사합니다. 제가 칭찬받은 것도 아닌데, 마치 제가 받은 것처럼 기쁘군요."
1011006-62 = "3;세이아;99;그리고…….\n#3;em;…"
1011006-63 = "3;세이아;01;사실 노래라면, 저도 싫어하지 않으니까요. 곧잘 혼자 있을 때엔 부르기도 하고요."
1011006-64 = "3;세이아;03;……후후.\n#3;em;[음표]"
1011006-65 = "3;세이아;02;조금 놀라시는 얼굴이네요. 기쁜걸요, 저 때문에 그런 표정도 지어 보이시고."
1011006-66 = "3;세이아;01;마음 같아서는 지금 바로 이 자리에서 선생님을 위한 노래를 불러 드리고 싶지만……."
1011006-67 = "3;세이아;02;여기서는 조금 참도록 하겠습니다. 선생님께 들려 드릴 '첫 노래'로는, 지금의 타이밍은 조금 아쉬운 느낌이 들어요."
1011006-68 = "#st;[0,0];instant;1;"
1011006-69 = "#clearST"
1011006-70 = "#wait;2500"
1011006-71 = "3;세이아;05;……그렇게 보셔도 안 돼요.\n#3;em;[땀]"
1011006-72 = "3;세이아;02;선생님, 노래라는 건 저에게 있어서 꽤 중요한 수단이었답니다."
1011006-73 = "3;세이아;01;지금도 많이 부족하지만, 예전의 저는 정말로 타인과의 대화에 서툴렀어요. 제가 입만 열면 주변 사람들이 불편해했지요."
1011006-74 = "3;세이아;01;평생 그렇게 들어온 습관을 고치기는 힘들었고, 또 그때는 그걸 고쳐야 한다고 생각조차 하지 않고 살았어요."
1011006-75 = "3;세이아;99;하지만 그럼에도 가끔, 아주 가끔은 상대방에게 '곡해되지 않는 진실'을 전달하고 싶을 때가 있었고……."
1011006-76 = "3;세이아;02;……저에게는 그 방법이 노래였습니다."
1011006-77 = "3;세이아;99;티파티의 다른 분들도, 시스터후드나 구호기사단……아니, 트리니티의 다른 학우 분들도."
1011006-78 = "3;세이아;01;심지어 간혹 교류해야 했던 타 학교의 다른 분들과의 교류에서도, 정말 필요할 때에는 노래로 의사를 전달하곤 했답니다."
1011006-79 = "3;세이아;02;늘 위선적이고, 스스로도 자신의 말을 솔직하게 하지 못해 변명과 말 돌림으로 점철돼 있던 제 삶에서……."
1011006-80 = "3;세이아;01;노래라는 건, '이번만큼은 아니다'라고 말할 수 있는 유일한 수단이었던 거죠."
1011006-81 = "3;세이아;05;그러니 '그냥 들려드리고 싶다'라는 의미로 들려드릴 수는 없습니다. 그렇게 습관이 들지 않았어요."
1011006-82 = "#st;[0,0];instant;1;"
1011006-83 = "#clearST"

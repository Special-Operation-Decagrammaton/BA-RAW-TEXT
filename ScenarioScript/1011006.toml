[translation]
1011006-1 = "สาวน้อยที่นกบินหา"
1011006-2 = "(คุณครูแวะไปที่ทรีนิตี้เพื่อประชุมเรื่องต่างๆ เกี่ยวกับทรีนิตี้และองค์การนักเรียน)"
1011006-3 = "(เนื่องจากมีวาระการประชุมค่อนข้างเยอะ กว่าจะประชุมเสร็จก็เป็นเวลาดึกแล้ว)"
1011006-8 = "[ns1] \"เสียงนกเหรอ...?\"\n[ns2] เดินตามเสียงนกไป"
1011006-14 = "[ns3] \"ที่นี่มัน...\"\n[ns4] \"สวนในสภาน้ำชาเหรอ...?\""
1011006-17 = "คุณครู...?"
1011006-22 = "ทำไมถึงมาอยู่ที่นี่...?"
1011006-23 = "อ้อ เห็นบอกว่ามีประชุมใช่มั้ยคะ? ฉันไม่ได้ไปเข้าร่วมการประชุม พอดีว่ามันไม่มีส่วนเกี่ยวข้องกับฉัน#nเท่าไรนักน่ะค่ะ..."
1011006-24 = "จะว่าไปแล้ว ฉันลืมไปสนิทเลยค่ะว่าคุณครูบอกว่าจะมาประชุมด้วย ถ้าไม่อย่างนั้นฉันก็คงไปเข้าร่วม#nด้วยแล้วค่ะ"
1011006-25 = "แต่ก็นะ... ที่จริงแล้วมันฟังดูตลกถ้าจะไปเข้าร่วมการประชุมที่ไม่เกี่ยวกับตัวเองเพียงเพราะอยากเจอ#nคนอื่นที่มาประชุมด้วย"
1011006-26 = "แต่ยังไงสุดท้ายฉันก็ได้เจอคุณครูที่นี่นะคะ วันนี้ฉันโชคดีจังเลยค่ะ"
1011006-27 = "คะ...? ฉันกำลังทำอะไรอยู่น่ะเหรอคะ?"
1011006-28 = "ก็อย่างที่เห็นค่ะ ฉันแค่กำลังเดินเล่นเฉยๆ ที่นี่ไม่มีใครเลย ก็เลยไม่มีทั้งเสียงคุยซุบซิบ แล้วก็ไม่มีเสียงยิงปืนหรือขว้างระเบิดด้วยค่ะ"
1011006-29 = "จะปล่อยที่แบบนี้ในเวลาแบบนี้ไว้ก็น่าเสียดาย ฉันก็เลยมักจะมายึดสถานที่คนเดียวแบบนี้บ่อยๆ น่ะค่ะ"
1011006-33 = "ฮุฮุ... ก็ได้ค่ะ ฉันล้อเล่นน่ะ"
1011006-34 = "ที่จริงแล้วฉันมาอยู่ที่นี่เพื่อรอให้คุณครูเดินผ่านน่ะค่ะ เพราะงั้นได้โปรดอย่ามองฉันด้วยแววตาแบบนั้น#nเลยค่ะ"
1011006-35 = "[s5] \"ถ้างั้นเสียงนกร้องนั่นก็...?\"\n[s6] \"ถ้างั้นเสียงนกร้องที่ครูได้ยินก็...?\""
1011006-38 = "เสียงนกเหรอคะ...?"
1011006-43 = "อ้อ..."
1011006-44 = "ไม่หรอกค่ะ เสียงนกร้องไม่ได้เป็นความตั้งใจจากฉันหรอกค่ะ"
1011006-45 = "ที่ฉันทำก็แค่เฝ้ารอให้คุณครูเดินผ่านทางนี้เฉยๆ ฉันไม่ได้วางแผนการให้คุณครูเข้ามาข้างในสวนนี้เลย#nนะคะ"
1011006-46 = "ส่วนเรื่อง... เสียงนก..."
1011006-47 = "สงสัยว่าเป็นเสียงของเด็กที่อยู่ในมือของฉันหรือเปล่าใช่มั้ยคะ? บางทีอาจจะใช่ก็ได้ค่ะ"
1011006-48 = "แต่ว่าฉันก็ยืนยันให้อย่างแน่ชัด... ไม่ได้ค่ะ"
1011006-49 = "[s7] \"อาจจะใช่ หรืออาจจะไม่ใช่ก็ได้?\"\n[s8] \"ชักจะน่าสงสัยขึ้นมาแล้วสิ\""
1011006-52 = "ฮุฮุ ฉันก็ชอบการไขปริศนาอยู่นะคะ แต่ตอนนี้มันดูจะต่างออกไป เรื่องนี้มันเรียบง่ายมากเลยค่ะ"
1011006-53 = "เด็กๆ พวกนี้น่ะมีเยอะ ทั้งในสวนแห่งนี้ และทั้งที่ข้างหน้าต่างห้องฉันด้วยค่ะ เด็กๆ จะบินมาหาฉัน#nครั้งละตัวสองตัว แต่ก็ใช่ว่าจะเป็นตัวเดิมตลอดหรอกค่ะ"
1011006-54 = "นั่นหมายความว่าเด็กที่ร้องเจื้อยแจ้วให้คุณครูได้ยินอาจจะเป็นตัวนี้ก็ได้ หรืออาจจะเป็นเด็กที่เพิ่งบิน#nออกไปเมื่อสักครู่ก็ได้ค่ะ"
1011006-55 = "แต่ไม่ว่าเจ้าของเสียงจะเป็นตัวไหน แต่เสียงเพลงที่ออกมาก็ต้องไพเราะอย่างแน่นอนค่ะ"
1011006-56 = "ถ้าเสียงเพลงนั้นทำให้คุณครูหลงใหลจนเดินตามมาถึงที่นี่ ก็ต้องบอกว่าเป็นเรื่องที่ไม่เลวเลยนะคะ"
1011006-57 = "ฉันว่าเด็กๆ พวกนี้ต้องดีใจมากเลยละค่ะถ้ารู้ว่าเสียงเพลงของตัวเองช่วยสร้างความอยากรู้อยากเห็น#nเล็กๆ ให้กับคุณครูได้แบบนี้ แน่นอนว่าฉันก็ดีใจไม่แพ้กันค่ะ"
1011006-58 = "[s9] \"เสียงเพลงจากนกก็รื่นหูดีนะ\"\n[s10] \"เป็นเพลงที่ไพเราะเลยละ\""
1011006-61 = "ขอบคุณค่ะ นี่ไม่ใช่เรื่องที่คุณครูชมฉันแท้ๆ แต่ฉันก็ปลื้มใจเหมือนถูกชมเองเลยนะคะ"
1011006-62 = "อีกอย่าง..."
1011006-63 = "ฉันเองก็ชอบเสียงเพลงเหมือนกันค่ะ ฉันมักจะร้องเพลงตอนอยู่คนเดียวด้วยนะคะ"
1011006-64 = "ฮุฮุ..."
1011006-65 = "ดูทำหน้าตกใจเข้าสิ น่าดีใจจังเลยนะคะที่ทำสีหน้าแบบนั้นเพราะฉันน่ะ"
1011006-66 = "ใจหนึ่งฉันก็อยากร้องเพลงให้คุณครูฟังที่นี่เดี๋ยวนี้เลย..."
1011006-67 = "แต่ฉันจะอดทนเอาไว้ก่อน เพราะ 'เพลงแรก' ที่จะร้องให้คุณครูฟังมันควรร้องในโอกาสที่ดีกว่านี้ค่ะ"
1011006-71 = "ต่อให้มองฉันแบบนั้น ฉันก็ไม่ร้องหรอกค่ะ..."
1011006-72 = "การร้องเพลงถือเป็นสิ่งที่สำคัญมากสำหรับฉันนะคะคุณครู"
1011006-73 = "ถึงตอนนี้ฉันจะยังบกพร่องอยู่ แต่ว่าเมื่อก่อนฉันคุยกับคนอื่นไม่เก่งเลยจริงๆ ค่ะ ทุกครั้งที่ฉันเอ่ยปากพูด คนรอบข้างก็จะรู้สึกอึดอัดกันเป็นแถว"
1011006-74 = "เป็นเรื่องยากที่ฉันจะแก้นิสัยที่ติดตัวมาตลอดค่ะ แล้วต่อให้เจอเหตุการณ์แบบนั้น ที่ผ่านมาฉันก็ไม่คิดด้วยค่ะว่าต้องแก้ไขนิสัยของตัวเอง"
1011006-75 = "แต่ถึงอย่างนั้น บางครั้งฉันก็อยากส่งต่อ 'ความจริงที่จะไม่ถูกเข้าใจบิดเบือน' ให้อีกฝ่ายค่ะ..."
1011006-76 = "และสำหรับฉันแล้ว วิธีการทำแบบนั้นก็คือการร้องเพลงค่ะ..."
1011006-77 = "ตอนที่ฉันต้องเจอกับคนอื่นในสภาน้ำชา หรือว่าชมรมซิสเตอร์ ชมรมอัศวินบรรเทาทุกข์... หรือจะเป็นเพื่อนร่วมโรงเรียนทรีนิตี้คนอื่น"
1011006-78 = "แม้กระทั่งในงานแลกเปลี่ยนที่ฉันต้องเจอกับนักเรียนโรงเรียนอื่น ถ้าจำเป็นจริงๆ ฉันก็จะทักทายพวกเธอด้วยบทเพลงค่ะ"
1011006-79 = "ในชีวิตของฉันที่เต็มไปด้วยความหลอกลวง ข้ออ้าง และการพูดอ้อมค้อมเพราะเจ้าตัวไม่อาจพูดเรื่อง#nของตัวเองอย่างตรงไปตรงมาได้..."
1011006-80 = "บทเพลงเป็นวิธีเดียวที่บอกได้ว่า 'ครั้งนี้คือความจริง' ค่ะ"
1011006-81 = "ด้วยเหตุนี้ ฉันจึงจะร้องเพลงด้วยเหตุผลแค่ว่า 'อยากร้องให้ฟังเฉยๆ' ไม่ได้ค่ะ นั่นไม่ใช่วิสัยของฉันค่ะ"
1011006-90 = "คุณครูเสียดายอย่างออกหน้าออกตาเกินไปหรือเปล่าคะ? ผู้ใหญ่อย่างคุณครูกำลังทำตัวเหมือนเด็ก#nกับเด็กอย่างฉันเหรอคะ?"
1011006-91 = "แล้วก็ ไม่รู้ว่าทำไม..."
1011006-92 = "ฉันเองก็เริ่มคิดว่าอยากจะร้องเพลงให้คุณครูฟังดูสักครั้งแล้วค่ะ"
1011006-93 = "แต่ก็เข้าใจได้นะคะ คุณครูน่ะมักจะเข้าใจเจตนาที่แท้จริงของฉันก่อนเสมอ และฉันก็เอาแต่ 'ประดิษฐ์#nการกระทำ' ตามความตั้งใจที่อยากให้คุณครูเห็น แต่ยังไม่เคยให้คุณครูได้เห็น 'ความจริง' จากใจสักที"
1011006-94 = "และเพราะอย่างนั้น... บางทีคุณครูอาจจะไม่มีวันได้ฟังเพลงจากฉันก็ได้"
1011006-95 = "แบบนั้นมันน่าเสียดายเกินไปใช่มั้ยคะ..."
1011006-96 = "ได้ค่ะ ครั้งนี้ฉันแพ้แล้วละค่ะ"
1011006-97 = "พอมาคิดๆ ดูแล้ว ฉันก็มี 'ความจริง' ที่อยากบอกกับคุณครูอยู่หนึ่งอย่างค่ะ มันอาจจะดูไม่ใช่ความจริง#nสิ่งใหม่ก็ได้ เพราะเดิมทีแล้วฉันก็ไม่ได้ซ่อนมันไว้ค่ะ"
1011006-98 = "ถ้างั้นฉันจะร้องให้ฟังนะคะ"
1011006-99 = "คุณครู"
1011006-106 = "นี่คือบทเพลงจากฉัน"
1011006-107 = "'เพลงแสดงความขอบคุณ' เพื่อคุณครูค่ะ..."

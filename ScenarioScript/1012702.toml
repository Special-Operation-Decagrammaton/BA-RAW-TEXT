[translation]
1012702-1 = "เขียนนิยายแบบมีเสียง"
1012702-2 = "สำนักงานชาเล่ต์"
1012702-3 = "(วันต่อมา)"
1012702-7 = "[ns] \"เข้ามาได้เลย\""
1012702-10 = "สวัสดีค่ะ..."
1012702-11 = "ฉันซากุราอิ มิโยะ มาเข้าเวรที่ชาเล่ต์วันนี้ค่ะ"
1012702-12 = "[s1] \"ขอบใจที่มานะ มิโยะจัง\"\n[s2] \"ขอบใจที่มานะ ยินดีต้อนรับสู่ชาเล่ต์!\""
1012702-15 = "มะ... ไม่เลยค่ะ ฉันต่างหากค่ะที่ต้องขอบคุณคุณครู"
1012702-16 = "ขอบคุณสำหรับโอกาสล้ำค่าที่ทำให้ฉันได้ออกมาข้างนอกนะคะ..."
1012702-17 = "ฮู่ว... นานแค่ไหนแล้วนะที่ฉันไม่ได้รู้สึกถึงอิสรภาพอย่างมั่นใจแบบนี้..."
1012702-18 = "[s] \"นั่นสิ เด็กไวลด์ฮันต์ขออนุญาตออกมาข้างนอกไม่ได้ง่ายๆ นี่เนอะ\""
1012702-19 = "ค่ะ โดยเฉพาะนักเรียนเอกวรรณกรรมอย่างฉัน การขออนุญาตออกมาข้างนอกค่อนข้างยุ่งยากมากเลยค่ะ"
1012702-20 = "เพราะการเขียนนิยายเป็นงานที่แค่อยู่ในห้องแคบๆ ก็ทำได้นี่คะ..."
1012702-21 = "ที่จริงแล้ววรรณกรรมคลาสสิกที่ยิ่งใหญ่หลายเรื่องก็ถูกเขียนขึ้นในคุกนะคะ..."
1012702-22 = "หรือว่าฉันควรสารภาพว่าลักลอบขนส่งสินค้าโดยชมรมการค้าพิเศษ ให้ถูกจับไปขังอยู่ในคุกจะดีกว่ากัน#nนะคะ...?"
1012702-23 = "[s3] \"ถูกขังอยู่ที่นี่แทนดีกว่า!\"\n[s4] \"เดี๋ยวครูช่วยขังให้เองดีกว่า!\""
1012702-26 = "มะ... หมายความว่ายังไง...?"
1012702-27 = "คะ... คะ... คุณครู...?! จะทำอะไรคะ...!"
1012702-31 = "ห้องพักผ่อนชาเล่ต์"
1012702-32 = "ที่นี่คือ... ห้องพักผ่อนเหรอคะ?"
1012702-33 = "คะ? ให้ฉันพักผ่อนและเขียนงานในนี้ได้เต็มที่เลยงั้นเหรอคะ?"
1012702-34 = "จะดื่มเครื่องดื่มในตู้เย็นให้หนำใจเลยก็ได้?! ของว่างก็ด้วยเหรอคะ?!"
1012702-35 = "ตะ... แต่ฉันมาเพื่อเข้าเวรและช่วยงานคุณครู... จะไม่ให้ทำงานเลยเหรอ..."
1012702-36 = "สำหรับนักเขียนนิยาย การเขียนก็เป็นงานอยู่แล้วงั้นเหรอคะ...?"
1012702-37 = "อ่า... ที่พูดมาก็ไม่ผิดหรอกค่ะ..."
1012702-38 = "[s5] \"กินอะไรหวานๆ แล้วเขียนงานในนี้เถอะนะ!\"\n[s6] \"กินของอร่อยแล้วแต่งนิยายในนี้ได้เลย!\""
1012702-43 = "ขอบคุณค่ะ คุณครู..."
1012702-45 = "(จากนั้นคุณครูก็ปล่อยให้มิโยะใช้ห้องพักผ่อนแล้วออกมาทำงานของตัวเอง)"
1012702-47 = "ฮืมมมม..."
1012702-48 = "ถ้างั้นตรงนี้... บทสนทนาตอนตัวเอกบอกว่าตัวเองป่วยเป็นโรคที่ไม่มีทางรักษาจะเขียนยังไงดีนะ..."
1012702-49 = "แล้วก็ต้องให้ญาติฝ่ายสามีระดมหน่วยรถถังและเปิดฉากโจมตี เพื่อแยกคู่นี้ออกจากกันด้วย..."
1012702-50 = "งั้นลองมาเขียนบทสนทนาของพาร์ทนี้เลยแล้วกัน..."
1012702-54 = "\"อ่า! เหตุไฉนสวรรค์ถึงดลบันดาลให้ฉันมาพบคุณ แต่ต้องเจอเรื่องแบบนี้!\""
1012702-55 = "\"อย่าเพิ่งหมดหวังนะครับ! เรายังมีกระสุนปืนใหญ่รถถังเหลืออีก 200 นัดเลยครับ!\""
1012702-56 = "ฮุฮุ ต้องอย่างนี้ละ เอาแบบนี้แล้วกัน"
1012702-57 = "แล้วต่อไปก็..."
1012702-63 = "คุณครู...? มายืนทำอะไรตรงนี้...?"
1012702-64 = "[s] \"อ่า... ครูมีขนมที่ได้เป็นของขวัญมาน่ะ ก็เลยจะเอามาให้...\""
1012702-65 = "ได้ยินฉันพูดคนเดียวหรือเปล่าคะ...?"
1012702-66 = "[s] \"ไม่ได้ยินอะไรเลย...\""
1012702-67 = "ได้ยินใช่มั้ยคะ?"
1012702-68 = "[s] \"ได้ยิน... แค่นิดเดียว\""
1012702-69 = "มายืนแอบฟังตั้งแต่ตอนไหนกันคะ?"
1012702-70 = "[s] \"ตั้งแต่ตอนที่บอกว่าเป็นโรคที่รักษาไม่ได้... หรือเปล่านะ?\""
1012702-71 = "งั้นก็ได้ยินหมดเลยน่ะสิ...!"
1012702-72 = "ฮืออออออออ...!"
1012702-77 = "(จากนั้นมิโยะก็วิ่งออกไปจากชาเล่ต์และหายตัวไปอย่างรวดเร็ว)"

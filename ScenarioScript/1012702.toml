[translation]
1012702-1 = "Dynamic Writing"
1012702-2 = "Schale Office"
1012702-3 = "The next day."
1012702-7 = "[ns]\"Come in.\""
1012702-10 = "Hello..."
1012702-11 = "Sakurai Miyo, reporting in for today's Student Rep duties."
1012702-12 = "[s1]\"Thank you for coming, Miyo.\"\n[s2]\"Welcome to Schale!\""
1012702-15 = "P-Please don't say that. I should be the one thanking you, Sensei."
1012702-16 = "You've given me a rare opportunity to go outside..."
1012702-17 = "Ugh... It's been so long since I've experienced something new... Transcendent freedom..."
1012702-18 = "[s]\"I know it's hard to leave Wildhunt.\""
1012702-19 = "Yes. They...are even more restrictive with Literature majors like me. We have mandatory cloister times."
1012702-20 = "After all, you don't need fresh air or sun to write."
1012702-21 = "And a lot of great classics were actually written in confinement...and from behind bars..."
1012702-22 = "...You know, maybe I should confess all the Cartel's smuggling activities and get sent to prison. It could do wonders for my writing and focus."
1012702-23 = "[s3] \"If that's what you want...\"\n[s4] \"How about I confine you instead?\""
1012702-26 = "Wh-What are you...?"
1012702-27 = "S-S-Sensei...?! What are you doing...?"
1012702-31 = "Schale Lounge"
1012702-32 = "This is a...lounge?"
1012702-33 = "And you want me to relax and write? Ooh, such nice stationery!"
1012702-34 = "And I can help myself to the drink fridge? And you have snacks?!"
1012702-35 = "B-But I came here as Student Rep today... If I don't help you, then I'm—"
1012702-36 = "...My only job as a writer is to write?"
1012702-37 = "Well... You're not wrong..."
1012702-38 = "[s5] \"So enjoy the treats!\"\n[s6] \"...And write something great!\""
1012702-43 = "...Thank you, Sensei."
1012702-45 = "I left Miyo in the lounge and went back to my work."
1012702-47 = "Hmmmm..."
1012702-48 = "So... How should I reveal that the protagonist has an incurable, beautiful, tragic, crippling disease? How best to twist the knife?"
1012702-49 = "And the in-laws mobilize a tank unit and launch an offensive to keep the lovers apart... Heh. Oh, this is good."
1012702-50 = "Okay, maybe a little...homage...from another work?"
1012702-54 = "\"RAAAH! If heaven made you, why did it also make me?!\""
1012702-55 = "BRR-at-tat-tat! Pew! \"Do not give up yet! We still have 200 anti-tank shells!\""
1012702-56 = "Ha, yes. That's it! It's perfect! I'm a genius!"
1012702-57 = "And next up is the steamy—"
1012702-63 = "...Sensei? Do you...require something?"
1012702-64 = "[s] \"Oh... I got this gift basket and thought you might...\""
1012702-65 = "...Were you listening?"
1012702-66 = "[s] \"...I heard nothing.\""
1012702-67 = "You heard me talking to myself, right? You. Heard. Everything."
1012702-68 = "[s] \"...No! Not EVERYTHING. I was working, and—\""
1012702-69 = "From where?"
1012702-70 = "[s] \"...Something about a beautifully tragic disease?\""
1012702-71 = "That IS everything!"
1012702-72 = "Aaaaaaaaaah...!"
1012702-77 = "Miyo skittered out of Schale and disappeared in a flurry of paper."

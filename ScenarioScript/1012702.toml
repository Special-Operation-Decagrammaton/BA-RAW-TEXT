[translation]
1012702-1 = "動態寫作"
1012702-2 = "夏萊辦公室"
1012702-3 = "（隔天）"
1012702-7 = "[ns]「請進。」"
1012702-10 = "你好……"
1012702-11 = "櫻井美代，前來執行今天夏萊的值日生業務了。"
1012702-12 = "[s1]「歡迎你，美代醬。」\n[s2]「歡迎來到夏萊！」"
1012702-15 = "不，不會。該覺得感謝的人是我才對，老師。"
1012702-16 = "謝謝你給我這麼寶貴的外出機會……"
1012702-17 = "呼……不知道多久沒有感受到這種毫無拘束的自由了……"
1012702-18 = "[s]「記得狂獵不太容易取得外出許可對吧。」"
1012702-19 = "是的。尤其對於我這種主修文學的學生來說更是如此……"
1012702-20 = "因為小說這種東西，嚴格來說就算被關在小房間裡也能寫得出來……"
1012702-21 = "實際上，也有許多偉大的經典名作是在監獄裡完成的……"
1012702-22 = "說不定乾脆把我們特殊交易部的走私清單交出去……主動投獄反而才是更好的選擇？"
1012702-23 = "[s3]「既然如此……」\n[s4]「不如讓我來把你關起來吧！」"
1012702-26 = "那，那是什麼意思……？"
1012702-27 = "老，老師……！？#n你要對我做什麼……！"
1012702-31 = "夏萊休息室"
1012702-32 = "這裡是……休息室？"
1012702-33 = "咦？可以在這裡盡情休息寫作？"
1012702-34 = "冰箱裡的飲料也可以隨便喝！？還有零食也是！？"
1012702-35 = "可，可是我今天是來擔任值日生的……不工作的話有點……"
1012702-36 = "……寫作就是小說家的工作？"
1012702-37 = "這……確實是這樣沒錯……"
1012702-38 = "[s5]「所以你就一邊吃點心……」\n[s6]「一邊寫出優美的文章吧！」"
1012702-43 = "……謝謝你，老師。"
1012702-45 = "（就這樣把美代留在了休息室，離開處理剩下的工作）"
1012702-47 = "唔嗯……"
1012702-48 = "那麼……這段揭露主角身患絕症的台詞該怎麼處理好呢……"
1012702-49 = "為了讓兩人分開，婆家動員了戰車部隊展開進攻……"
1012702-50 = "要重現這部分的台詞的話……"
1012702-54 = "「啊啊！蒼天為何要讓我倆共處一世！」"
1012702-55 = "「不能放棄希望！我們還有兩百發反戰車砲彈啊！」"
1012702-56 = "呵呵，這種情節就對了。"
1012702-57 = "然後下一段是……"
1012702-63 = "……老師？你怎麼會在這裡……？"
1012702-64 = "[s]「啊……只是剛好收到了點心，想說拿過來一起吃……」"
1012702-65 = "……你都聽到了嗎？"
1012702-66 = "[s]「……我什麼都不知道。」"
1012702-67 = "都聽到了對吧？"
1012702-68 = "[s]「……只聽到一點點。」"
1012702-69 = "是從哪裡開始聽的？"
1012702-70 = "[s]「……從身患絕症那邊？」"
1012702-71 = "那不就全都聽到了嗎……！"
1012702-72 = "嗚啊啊啊啊啊啊啊啊……！"
1012702-77 = "（美代就這樣衝出夏萊，迅速消失在了視野之中）"

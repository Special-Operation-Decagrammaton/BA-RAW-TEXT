[translation]
2600906-1 = "การทำความสะอาดของชมรมพัฒนาเกม"
2600906-2 = "(คุณครูแวะไปที่ห้องชมรมพัฒนาเกมเพื่อช่วยทำความสะอาด)"
2600906-7 = "ห้องชมรมพัฒนาเกม"
2600906-14 = "[ns] \"...ยูสึ?\""
2600906-16 = "คะ... คะ... คุณครู?! มะ... มาตั้งแต่ตอนไหนคะเนี่ย...?"
2600906-17 = "ตะ... ตั้งแต่เมื่อกี้เหรอคะ? มีธุระอะไรที่ห้องชมรมพัฒนาเกมเหรอคะ..."
2600906-18 = "[s] \"ก็ยูสึบอกว่าต้องทำความสะอาดคนเดียว ครูเลยมาช่วยไง\""
2600906-19 = "อ่า... อย่างนี้เองเหรอคะ ขอบคุณค่ะ..."
2600906-20 = "แต่ไม่เป็นไรค่ะ ฉันทำความสะอาดไปเกือบเสร็จแล้วค่ะ"
2600906-21 = "[s1] \"ทำเกือบเสร็จแล้วงั้นเหรอ...?\"\n[s2] \"แต่ยังมีถุงขนมกับกระป๋องเปล่าอยู่บนโต๊ะอยู่เลยนะ...\""
2600906-24 = "คะ? บนโต๊ะเหรอคะ...?"
2600906-31 = "...อ่า คุณครูน่าจะเข้าใจอะไรผิดน่ะค่ะ"
2600906-32 = "การทำความสะอาดที่ฉันพูดถึงไม่ใช่การทำความสะอาดห้องชมรม แต่เป็นการล้างโปรแกรมให้เหมาะ#nสมกับคอมพิวเตอร์มากที่สุดน่ะค่ะ"
2600906-33 = "เมมโมรีของคอมพิวเตอร์ก็เหมือนกับพื้นที่ทำงานในโลกแห่งความเป็นจริง ถ้าเราไม่จัดการไฟล์ดัมมีที่#nสะสมๆ ไว้บ่อยๆ การทำงานของคอมพิวเตอร์ก็จะช้าลงมากค่ะ"
2600906-34 = "เมื่อไม่นานมานี้ฉันทำงานเพลินจนทิ้งข้อมูลดัมมีไว้เรื่อยๆ คอมพิวเตอร์ก็เลยช้าลงอย่างเห็นได้ชัด..."
2600906-35 = "ฉันก็เลยมา 'ทำความสะอาด' โดยการลบไฟล์ที่ไม่จำเป็นออกจากคอมพิวเตอร์ของชมรม แล้วก็จัด#nระบบรีจิสทรีใหม่อยู่ค่ะ"
2600906-36 = "[ns] \"ก็เลยบอกว่าทำคนเดียวได้ยังงั้นสินะ...\""
2600906-38 = "[ns] \"ถ้างั้น แล้วการทำความสะอาดห้องชมรมล่ะ...?\""
2600906-39 = "คะ... คะ...? ทำความสะอาดห้องชมรมเหรอคะ...?"
2600906-40 = "พวกฉันยังมีงานที่ต้องทำอีกเยอะ แล้วสมาชิกชมรมก็ดูเหมือนจะไม่ได้เดือดร้อนอะไรกันด้วย... เรื่องทำความสะอาดห้องชมรมก็เลย... ว่าจะเอาไว้ก่อน..."
2600906-41 = "[s3] \"ไม่ได้นะ ยิ่งปล่อยไว้นาน ก็จะยิ่งทำความสะอาดเหนื่อยนะ\"\n[s4] \"ครูจะช่วยเอง ไหนๆ แล้วก็มาทำความสะอาดห้องกันเถอะ\""
2600906-44 = "แต่ว่า... ถ้าทำความสะอาดทั้งอย่างนี้เลย ชุดของฉันต้องเปื้อนแน่ๆ เลยค่ะ... แล้วตอนนี้ก็ไม่มีชุดอื่น#nเปลี่ยนด้วย..."
2600906-45 = "[s5] \"ครูก็เลยเตรียมมาให้ไงล่ะ...\"\n[s6] \"ก่อนมาที่นี่ ครูไปเอาชุดเมดจากคาเฟ่ <เมดดรามาติก> มาให้แล้ว!\""
2600906-48 = "...ไปเอามาทำไมกันคะนั่น!"
2600906-49 = "อ่า... แต่ถ้าไม่ทำความสะอาดห้อง ห้องก็น่าจะสกปรกมากกว่านี้อย่างที่คุณครูว่า... แล้วตอนนี้ก็ไม่มีชุด#nอะไรที่พอจะเปลี่ยนได้ด้วย..."
2600906-58 = "ถ้าให้ใส่แค่ตอนทำความสะอาดละก็..."
2600906-59 = "งั้นฉันจะเข้าไปเปลี่ยนชุดในตู้แล้วกันค่ะ"
2600906-68 = "(หลังจากนั้นคุณครูกับยูสึในชุดเมดก็ช่วยกันทำความสะอาดห้องชมรม)"
2600906-70 = "...ดูเหมือนใกล้จะเสร็จแล้วนะคะ ทำได้ดีมากเลยค่ะ..."
2600906-71 = "[s] \"ยูสึก็ทำได้ดีมากเลย\""
2600906-72 = "ดีแล้วนะคะที่ได้ทำความสะอาดห้องชมรม"
2600906-73 = "พอได้เห็นห้องชมรมดูสะอาดสะอ้านแบบนี้ แรงบันดาลใจของฉันก็เพิ่มขึ้นมาอย่างไม่รู้ตัวเลยค่ะ"
2600906-74 = "แต่ฉันยังเขินที่จะใส่ชุดเมดในห้องนี้... ฉันว่ารีบไปเปลี่ยนก่อนที่ใครจะเข้ามาเห็น—"
2600906-80 = "หัวหน้ายูสึ~ ฉันอยากถามอะไรนิดหน่อยน่ะ"
2600906-81 = "พอดีฉันไม่ค่อยเข้าใจแพทเทิร์นของบอสในเกมที่ให้ยืมมาครั้งก่อน—"
2600906-86 = "อ่า... อ๊าาา..."
2600906-87 = "...."
2600906-88 = "เอ่อ คะ... ครั้งนี้ก็..."
2600906-89 = "ขอโทษๆ เป็นอย่างนี้นี่เอง ฉันมาขัดจังหวะอีกแล้วสินะ..."
2600906-90 = "อย่าเพิ่งเข้าใจกันผิดสิ..."
2600906-92 = "...งั้นไว้ฉันมาหาใหม่คราวหน้านะ!"
2600906-94 = "ให้เป็นแบบนี้ต่อไปไม่ได้แล้วค่ะ...!"
2600906-96 = "(หลังจากนั้นคุณครูก็ต้องปลอบยูสึที่เข้าไปอยู่ในตู้เหล็กอยู่อีกพักใหญ่)"

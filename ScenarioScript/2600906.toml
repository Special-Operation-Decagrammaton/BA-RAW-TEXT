[translation]
2600906-1 = "A Clubroom, Good As New"
2600906-2 = "I visited the club room to help clean up."
2600906-7 = "Game Development Department Club Room"
2600906-14 = "[ns] \"...Yuzu?\""
2600906-16 = "S-Sensei?! When did you get here?"
2600906-17 = "Oh, just now? What brings you to the Game Development Department today?"
2600906-18 = "[s] \"Since you said you'd be cleaning up all by yourself, I stopped by to help.\""
2600906-19 = "Ah, I see. Thank you..."
2600906-20 = "But it's really okay. I'm almost done."
2600906-21 = "[s1] \"What about all the empty snack wrappers on the floor\"\n[s2] \"What about all the empty cans on your desk?\""
2600906-24 = "Huh? What about them?"
2600906-31 = "...Oh. There's been a misunderstanding."
2600906-32 = "I didn't mean cleaning the club room, I meant cleaning my computer."
2600906-33 = "The computer's memory is a lot like a physical workspace. If I don't go through and clean out all the temp files every now and again, it slows the whole computer down."
2600906-34 = "The data's really been piling up lately, and I've noticed a significant impact on the computer's speed."
2600906-35 = "So the cleaning I mentioned was on my PC, deleting unnecessary files and cleaning up the registry."
2600906-36 = "[ns] \"So that's why you said you could do it by yourself.\""
2600906-38 = "[ns] \"When were you planning on cleaning the club room?\""
2600906-39 = "H-Huh...? Cleaning the club room?"
2600906-40 = "Um, I don't know... There's still a lot of work to do on this game, and none of the other club members seem to mind, so... I was just gonna do it later..."
2600906-41 = "[s3] \"The longer you put off cleaning, the longer it will take!\"\n[s4] \"As long as I'm here, let's do it now! I'll help!\""
2600906-44 = "But...I don't have a change of clothes, and I don't want these ones to get dirty..."
2600906-45 = "[s5] \"Not to worry. I came prepared.\"\n[s6] \"I thought you might need something, so I stopped by Maidramatic and picked up your uniform!\""
2600906-48 = "Wh-What? Why?"
2600906-49 = "But I guess...I don't want the mess to get worse, and I don't have anything else to wear..."
2600906-58 = "And this outfit is made for cleaning, after all."
2600906-59 = "I'll go change in the cabinet."
2600906-68 = "Yuzu and I worked hard cleaning up the club room."
2600906-70 = "...I think we're done. Thanks for your help."
2600906-71 = "[s] \"Good work, Yuzu.\""
2600906-72 = "You were right. I'm glad we cleaned up."
2600906-73 = "Looking around at a neatly organized room is very motivating."
2600906-74 = "It's still embarrassing to wear a maid uniform here, though... I'm gonna go change before anyone sees."
2600906-80 = "President Yuzu! Do you have a moment? I have a question."
2600906-81 = "The boss in the game I borrowed from you has such an unpredictable... patt...ern..."
2600906-86 = "Um. Ah..."
2600906-87 = "..."
2600906-88 = "Uh. The thing is..."
2600906-89 = "Sorry! I'm sorry! I got in the way again!"
2600906-90 = "You're misunderstanding..."
2600906-92 = "...I'll come back later!"
2600906-94 = "I...I...I can't..."
2600906-96 = "Yuzu retreated to the cabinet again. This time it took even longer to calm her down."

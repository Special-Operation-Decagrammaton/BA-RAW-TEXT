2600906-31 = "4;유즈;01;……아, 뭔가 오해를 하시게 한 것 같네요."
2600906-32 = "4;유즈;02;제가 말씀드린 청소는 부실 청소가 아니라, 컴퓨터를 최적화하는 프로그램 청소를 말씀드린 거였어요."
2600906-33 = "4;유즈;01;컴퓨터의 메모리도 현실의 작업 공간과 비슷해서, 쌓인 더미 파일을 자주 치워주지 않으면 작업 속도가 많이 느려지거든요."
2600906-34 = "4;유즈;99;최근에는 작업을 하느라 더미 데이터를 계속 쌓아 두었더니, 컴퓨터의 속도가 눈에 띄게 느려진 것 같아서……"
2600906-35 = "4;유즈;03;부실의 PC에서 불필요한 파일을 삭제하고 레지스트리를 정리하는 '청소' 작업을 하고 있었답니다."

[translation]
2600906-1 = "打掃遊戲開發部"
2600906-2 = "（為了協助打掃遊戲開發部來到了部室）"
2600906-7 = "遊戲開發部．部室"
2600906-14 = "[ns]「……柚子？」"
2600906-16 = "老，老老，老師！？你，你是什麼時候……？"
2600906-17 = "我完全沒注意到……老師為什麼會來這裡……？"
2600906-18 = "[s]「是來幫柚子打掃的哦。」"
2600906-19 = "啊，原來如此……謝謝你。"
2600906-20 = "不過沒關係。幾乎都打掃完了。"
2600906-21 = "[s1]「幾乎都打掃完了……？」\n[s2]「桌子上還有零食袋和空罐子不是嗎……」"
2600906-24 = "桌上……？"
2600906-31 = "……啊，老師可能誤會了。"
2600906-32 = "我說的打掃，指的不是部室而是電腦的儲存空間。"
2600906-33 = "電腦的儲存空間和現實的工作空間一樣，#n如果不整理堆積的檔案，工作速度就會變慢。"
2600906-34 = "特別是最近好一段時間都在進行作業，#n感覺速度變慢了不少……"
2600906-35 = "所以才要進行刪除不用的檔案、整理登錄檔的「打掃」。"
2600906-36 = "[ns]「所以你才會說要一個人進行啊……」"
2600906-38 = "[ns]「那部室的打掃呢……？」"
2600906-39 = "部，部室嗎……？"
2600906-40 = "那個，部室的打掃就……#n因為還有很多必須進行的作業，部員們好像也不是特別在意……#n之後再清理，我想應該也沒關係……"
2600906-41 = "[s3]「不行哦，往後拖的話會越來越麻煩的。」\n[s4]「我也會幫忙的，現在開始收拾吧。」"
2600906-44 = "嗚嗚……可，可是現在開始打掃的話好像會弄髒衣服……我也沒有衣服可換……"
2600906-45 = "[s5]「我就知道可能會有這種情況……」\n[s6]「所以從『Maidramatic』借來了女僕裝唷！」"
2600906-48 = "──為什麼啊！"
2600906-49 = "……可是老師說得沒錯，不快點打掃的話會越來越糟，#n現在也沒有其他工作服……"
2600906-58 = "就稍微……只在打掃的期間……"
2600906-59 = "……我去櫃子裡換衣服。"
2600906-68 = "（之後，和穿著女僕裝的柚子一起打掃了部室）"
2600906-70 = "……這樣就差不多掃完了。辛苦了……"
2600906-71 = "[s]「辛苦了，柚子。」"
2600906-72 = "……幸好有聽老師的話打掃部室。"
2600906-73 = "看著整理得乾乾淨淨的部室，總覺得幹勁也湧現了出來。"
2600906-74 = "不過在部室穿著女僕裝果然還是太難為情了……#n得在有人來之前趕快換掉才行──"
2600906-80 = "柚子部長～可以打擾一下嗎～？"
2600906-81 = "就是之前跟你借的遊戲裡的頭目啊～#n很難判斷行動的模式──"
2600906-86 = "啊……啊嗚……"
2600906-87 = "………"
2600906-88 = "那個……這次也是，那個……"
2600906-89 = "……果然是那樣啊。#n抱歉，我又打擾兩位了呢……"
2600906-90 = "等，等等……你誤會──！"
2600906-92 = "我，我之後再來！"
2600906-94 = "嗚，嗚啊啊啊啊啊……！"
2600906-96 = "（之後，為了安慰躲進櫃子裡的柚子費了好一番功夫）"

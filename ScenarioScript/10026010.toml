[translation]
10026010-1 = "第1話;一般人A的意見"
10026010-2 = "＜前情提要＞"
10026010-7 = "這是前些日子在三一挖掘地區發現的「經典」。"
10026010-8 = "而我負責的工作就是保管這部經典……"
10026010-13 = "……啊。"
10026010-18 = "剛才說要修復書本是嗎？#n……是什麼貴重的書嗎？"
10026010-24 = "吶啊啊啊啊啊啊啊啊啊啊啊啊啊啊！！？！？"
10026010-29 = "沒錯。「水苔膠」。#n此外，為了修復這本書，「精聖藥」也是必要的。"
10026010-30 = "總，總之只要把這些東西拿過來並溶解……之後我會想辦法修復的。"
10026010-36 = "……完，完成了。經典的復原結束了。"
10026010-37 = "這部經典……就交給老師了。#n……請你之後幫我轉交。"
10026010-43 = "老師他……應該差不多到夏萊了吧……"
10026010-44 = "那麼……"
10026010-49 = "經典的完美複製品……要偷偷做出來還真辛苦啊……"
10026010-50 = "至今為止依然充滿謎團的修女會……"
10026010-52 = "你們的祕密……就讓我好好見識見識吧……"
10026010-58 = "＜現在＞"
10026010-61 = "你該不會想裝傻否認吧？#n我們可是因為你的所作所為才會展開這場「對話」的。"
10026010-65 = "「對話」……？"
10026010-66 = "把人「綁架」到這種地方，竟然還好意思那麼說……"
10026010-70 = "綁架……？#n你似乎誤會了……"
10026010-71 = "憂同學，我們並不是想綁架你。#n就跟剛才說的一樣，我們只是想請你過來聊聊罷了。"
10026010-72 = "你們這種一群人跑過來說要跟人家聊聊的行為，一般來說就叫做「綁架」。"
10026010-73 = "修女會……那個既神祕又充滿謎團的祕密主義集團竟然想綁架我……"
10026010-77 = "唉……世人看待我們的眼光我也很清楚。"
10026010-78 = "但我們並不會欺騙其他學生，也不會在暗地裡策畫某些陰謀……"
10026010-79 = "老實說……世人的偏見讓我們相當頭疼。"
10026010-80 = "偏見會導致不必要的謠言，而謠言又會為我們增添不必要的距離感。"
10026010-81 = "儘管我們的確保有某些祕密……#n那些傳言依舊是無稽之談。"
10026010-82 = "完全是形跡可疑的人為自己開脫的標準說法……"
10026010-83 = "……呢。"
10026010-84 = "所，所以你們為什麼要把我帶到這種地方……？"
10026010-85 = "究，究竟，打算對我做什麼……？"
10026010-86 = "一，一副來勢洶洶的樣子！！還把我團團包圍！"
10026010-87 = "就像我剛才一再提及的一樣，我們不會對你做任何事──"
10026010-88 = "──只是想稍微「拜託」你而已。#n比如「最好盡早收手」之類的。"
10026010-89 = "……前段時間，你未經我們允許便私自複製了一本公會議的經典對吧。"
10026010-90 = "……！！！！！！！"
10026010-91 = "我明明已經把複製的痕跡都消除了……！！"
10026010-92 = "啊，不是……那本經典裡也沒寫什麼重要的內容吧……"
10026010-93 = "你說的沒錯，那本經典裡紀載的內容只是普通的歷史紀錄，#n因此就算公諸於世也無所謂……"
10026010-94 = "但即便如此，那對我們來說依然是非常珍貴的寶物。#n因此，你私自複製經典的行為……令我們感到相當遺憾。"
10026010-95 = "唔唔……想要瞞過修女會這種組織果然是不可能的嗎……"
10026010-99 = "……等等！？"
10026010-100 = "日，日向同學還活著嗎？#n你們對他做了什麼！？"
10026010-101 = "……什麼？"
10026010-102 = "別，別想裝傻……！我全都知道！#n遇到這種情況後……接下來會發生什麼事，我全都一清二楚！"
10026010-103 = "啊啊，我一定會被除掉吧……對吧？被我說中了吧？#n你們是想除掉我，徹底掩蓋這件事沒錯吧！？"
10026010-104 = "日向同學……對不起……都怪我做了不該做的事……才會害你被捲進來……"
10026010-106 = "……什麼？"
10026010-107 = "對不起……日向同學……這都怪我……"
10026010-108 = "請，請先等等，憂同學。#n可以先冷靜一下嗎……？日向同學現在還好好的啊？  "
10026010-109 = "接下來就輪到我了吧！？在接受慘無人道的拷問之後被帶到沒人知道的地方……！#n對吧？我說的沒錯吧！？"
10026010-110 = "等等！憂同學！憂同學！？#n請先聽我把話說完……"
10026010-111 = "但就算我從世界上消失──"
10026010-112 = "──真相也是不會改變的！！"
10026010-113 = "你到底在說什麼啊！？#n剛才不是說過很多次了嗎！？我們只是有事想拜託你而已……！！"
10026010-114 = "請你不要把那種陰謀論加諸在我們身上……！！"
10026010-117 = "唔呵呵……"
10026010-118 = "真的，是群有趣的人呢。"
10026010-119 = "不管是櫻子同學，還是憂同學……"
10026010-120 = "……！？"
10026010-121 = "嗯！？是，是誰……！？"
10026010-122 = "這裡可不是任何人都找得到的地方……！"
10026010-129 = "呵呵──偶然路過的路人A閃亮登場♡"
10026010-131 = "噫，噫噫……！？#n你是……！！"
10026010-132 = "深夜的泳裝女……浦和花子！？#n連這種時候都穿著泳裝……！？"
10026010-133 = "你怎麼會知道這個地方……？#n不對，原來那裡有個祕密通道嗎！？我現在才知道！？"
10026010-134 = "就是說啊，哎呀，這個地方竟然有個祕密通道……"
10026010-138 = "你，你們兩個認，認識嗎！？果然，果然是這樣嗎！？"
10026010-139 = "竟然會和那麼可怕的人聯手！這也太詭異了吧！！#n修女會果然是個奇怪的組織！！"
10026010-140 = "這是誤會，憂同學！請相信我，這跟我們一點關係也沒有……！#n我現在也搞不清楚狀況！！"
10026010-141 = "事到如今還要我相信你！？#n都不覺得自己說的話很牽強嗎！？"
10026010-142 = "我，我也明白你的感受！#n換作是我，我可能也會那樣想，但是……！"
10026010-143 = "把日向同學還給我！！#n你這祕密邪惡組織的首領！"
10026010-144 = "所以我不是已經說過日向同學好好的嗎！？#n為什麼這麼不相信我說的話呢！？"
10026010-145 = "那，那個……"
10026010-147 = "日，日向同學！？你沒事吧！？"
10026010-148 = "對，對不起……讓你擔心了吧……"
10026010-149 = "日向同學……？#n你怎麼會在這裡……！？"
10026010-151 = "唔呵呵，比起這個……"
10026010-152 = "兩位，可以讓我稍微插句話嗎？#n我想提供一些作為路過的一般人A的意見。"
10026010-153 = "一，一般人A……！？#n大半夜穿著泳裝徘徊的一般人A……！？"
10026010-154 = "雖然憂同學私自複製經典的行為……在道德上的確有些瑕疵……"
10026010-155 = "唔……！！"
10026010-156 = "但憂同學之所以會深陷於陰謀論之中……#n不正是因為修女會不受世人信賴的緣故嗎？"
10026010-157 = "現在這個情況也是同理……無論是誰都會覺得很可疑吧？"
10026010-158 = "再加上櫻子同學那獨樹一格的說話方式……會讓人誤會也是情有可原。"
10026010-159 = "結果就是憂同學被嚇得瑟瑟發抖，而日向同學則因為擔心而跑來找我幫忙。"
10026010-160 = "在場的所有人之中最可疑的人不就是花子同學嗎……"
10026010-161 = "至，至於讓憂同學受到驚嚇這點……！#n我真的不是有意的……！"
10026010-162 = "畢竟這件事要是被別人知道，可能會引來許多麻煩，#n所以我才會在這個安全的地方……"
10026010-163 = "呵呵，這就是修女會的問題所在。"
10026010-164 = "那麼～既然如此……你們就先聽聽看我這個路過的一般人A的提議吧。"
10026010-165 = "憂同學在日向同學遇到困難時曾出手幫助了他對吧。#n此外，我上次半夜跑去請他幫忙，他也欣然答應……"
10026010-166 = "先前櫻子同學差點在大家面前讀慾經的事，也是憂同學阻止的。"
10026010-167 = "……什麼？#n有，有發生過那種事嗎……？"
10026010-168 = "真，真的很抱歉……如果我當初沒有把經典弄壞的話……"
10026010-169 = "也就是說從結果上來看，在場的所有人都欠了憂同學人情。"
10026010-170 = "所以這次就反過來，由修女會給他一次「機會」怎麼樣呢？"
10026010-171 = "機會……是嗎？"
10026010-172 = "沒錯。比如……以讓憂同學協助修女會的工作為代價，不追究複製經典一事。"
10026010-173 = "怎麼樣？不覺得是個不錯的提議嗎？#n除了符合櫻子同學的期望之外……也是好事一樁對吧？"
10026010-174 = "……協，協助？你說我嗎？#n要協助修女會……？"
10026010-175 = "這，這是什麼情況……我並沒有要強迫憂同學的打算……"
10026010-176 = "呵呵♡不過，櫻子同學……#n修女會應該還有許多棘手的問題需要解決吧♡"
10026010-177 = "比如……你們一直很在意的那座「遺跡」之類的……"
10026010-178 = "遺……？"
10026010-179 = "遺跡……？"
10026010-180 = "你，你怎麼會知道這件事……？"
10026010-181 = "呵呵♡看來交易成立了呢。"
10026010-182 = "我們會幫你解決遺跡的問題。#n相對地，櫻子同學也要遵守承諾放過憂同學哦。"
10026010-183 = "那麼接下來的事……"
10026010-185 = "……就全包在我身上吧♡"
10026010-199 = "大家都就定位了，老師～！#n請幫我們拍照～！"
10026010-200 = "[ns] 按下相機的快門"
10026010-206 = "……？？？？？"

[translation]
10026010-1 = "Episode 1;An Average Citizen's Opinion"
10026010-2 = "Previously in Blue Archive"
10026010-7 = "Experts recently discovered this extraordinary piece of scripture at the Trinity excavation site."
10026010-8 = "I've been storing it in a protective—"
10026010-13 = "Hm? What?"
10026010-18 = "What kind of scripture? How old?"
10026010-24 = "WHAAAT?!"
10026010-29 = "I need sphagnum moss glue and holy tonic! Immediately!"
10026010-30 = "Those are absolutely crucial if I'm to restore the text. You must bring them to me. Go!"
10026010-36 = "It took considerable effort and care, but I managed to restore the scripture as requested."
10026010-37 = "If Sensei could deliver it to the right people, I'd appreciate it."
10026010-43 = "Sensei ought to be back at Schale by now..."
10026010-44 = "Yes. It's now or never."
10026010-49 = "Just look at it! A perfect copy! And not a soul knows about it but me!"
10026010-50 = "It's time to pull back the veil of mystery surrounding the Sisterhood."
10026010-52 = "And I get to be the first to read it!"
10026010-58 = "Back in the Present"
10026010-61 = "Let's skip the part where you play dumb and get down to brass tacks. Tell me why you did it. Talk to me."
10026010-65 = "Talk to you?"
10026010-66 = "You think I'm willing to talk to you after you abducted me?"
10026010-70 = "Abducted? No, no, you misunderstand..."
10026010-71 = "No one abducted anyone, Ui. We just escorted you to a more private location to have a chat."
10026010-72 = "A gang of women showed up out of nowhere and dragged me off against my will. That's abduction."
10026010-73 = "An honest organization wouldn't do that. Some Sisterhood..."
10026010-77 = "I am already well aware of the public's opinion of the Sisterhood."
10026010-78 = "Despite what they say, we do not trick students or enact evil plots."
10026010-79 = "Honestly, the banality of it all bores me to tears."
10026010-80 = "Unfounded accusations do nothing but cause division between us and the community."
10026010-81 = "And the few secrets we do have are completely unrelated to those ridiculous conspiracies."
10026010-82 = "That's just the kind of thing a criminal would say..."
10026010-83 = "...Mm-hm."
10026010-84 = "Why did you bring me here?"
10026010-85 = "And... What are you going to do to me exactly...?"
10026010-86 = "You have me surrounded and extremely outnumbered. I couldn't fight my way out of here if I wanted to."
10026010-87 = "It's like I've been telling you all along. I just want to have a conversation."
10026010-88 = "You know, warn you to keep your mouth shut."
10026010-89 = "We know about the copy of the Council scripture you made."
10026010-90 = "...!!"
10026010-91 = "How?! I covered my tracks. There's not a single hint that I made a copy."
10026010-92 = "But even if there was, it wasn't exactly a riveting read."
10026010-93 = "Granted, the scripture only contained simple historical facts. Whether the public learns of it doesn't concern me."
10026010-94 = "Regardless, it is a precious treasure to us. To copy it without our permission is...contemptible."
10026010-95 = "Ugh... I should have known I couldn't sneak anything by the Sisterhood, but—"
10026010-99 = "...Ah!"
10026010-100 = "Is Hinata alive? What did you do with Hinata?!"
10026010-101 = "...Huh?"
10026010-102 = "Don't play dumb! I know everything about your organization! Even what happens after..."
10026010-103 = "Y-You're going to get rid of her, aren't you? And me too! All to protect your secret!"
10026010-104 = "Oh, Hinata... I'm so sorry I dragged you into this..."
10026010-106 = "...Excuse me?"
10026010-107 = "Please forgive me, Hinata... Oh! This is all my fault..."
10026010-108 = "Uh... Ui? H-Hold on. Just calm down for a minute. Hinata is fine!  "
10026010-109 = "Sure she is! Just taking a nap, right? A DIRT nap! It's my turn now, isn't it?! You're going to torture me and, and—"
10026010-110 = "Ui! Ui! Please listen to me..."
10026010-111 = "Do whatever you want, but it won't change the truth!"
10026010-112 = "Nothing will!"
10026010-113 = "What are you saying?! I keep telling you I have a simple request!"
10026010-114 = "I just want you to stop spreading rumors and treating us like we're criminals!"
10026010-117 = "Heehee..."
10026010-118 = "You're all very entertaining, you know that?"
10026010-119 = "Sakurako... Ui..."
10026010-120 = "...?!"
10026010-121 = "Hm?! Wh-Who's there?"
10026010-122 = "How did you get in here?"
10026010-129 = "Ta-da! I'm nobody...just an average citizen passing through."
10026010-131 = "*gasp* Hang on. You're..."
10026010-132 = "...the Swimsuit Siren, Urawa Hanako! Why are you always in a swimsuit?!"
10026010-133 = "Who cares about the swimsuit?! How did you find a secret entrance that I didn't even know about?"
10026010-134 = "Because every place like this has a secret entrance if you look hard enough."
10026010-138 = "Th-The two of you know each other?! So that's how it is!"
10026010-139 = "Working with people like that lunatic is exactly the kind of thing that proves the Sisterhood is up to no good!"
10026010-140 = "Ui, no! This is all a big misunderstanding! It has nothing to do with her!"
10026010-141 = "How can you say that with a straight face and expect me to believe you?!"
10026010-142 = "Because it's the truth! Please—"
10026010-143 = "Let Hinata go! You're evil, and you lead an evil organization, and I don't trust you as far as I can throw you!"
10026010-144 = "I told you Hinata is safe! Why won't you listen to me?!"
10026010-145 = "U-Umm..."
10026010-147 = "H-Hinata?! You're okay?"
10026010-148 = "I-I'm sorry... I didn't mean to m-make you worry..."
10026010-149 = "Hinata, what...?"
10026010-151 = "Heehee. You two are really something."
10026010-152 = "If I could offer an opinion as an objective, outside observer, you know, an average citizen..."
10026010-153 = "Average?! Nobody who goes for a walk in the middle of the night in a swimsuit is average."
10026010-154 = "Ui is clearly at fault here. Copying that scripture without permission is, at the very least, a breach of ethics..."
10026010-155 = "Urgh!!"
10026010-156 = "As for Ui's conspiracy theories... The Sisterhood doesn't exactly give the impression of innocence."
10026010-157 = "Just look around. This place is suspicious as a week-old tuna sandwich."
10026010-158 = "And Sakurako's manner of speaking leaves a lot of room for misinterpretation."
10026010-159 = "Ui is clearly terrified, and Hinata was so worried that she asked me to intervene."
10026010-160 = "If anyone here is suspicious, it's you, Hanako!"
10026010-161 = "And I had no intentions of scaring anyone!"
10026010-162 = "I just wanted to discuss the issue somewhere private, away from prying eyes."
10026010-163 = "You're proving my point."
10026010-164 = "Now, if you're willing to take advice from an average citizen, I have a suggestion."
10026010-165 = "When Hinata was in trouble, Ui helped her without a second thought. She helped ME when I sought her out in the middle of the night."
10026010-166 = "And who can forget the time she helped YOU when she prevented you from accidentally reading the Kamasutra in front of everyone?"
10026010-167 = "The Kama-what-now?!"
10026010-168 = "She's right. If only I hadn't damaged the scripture—"
10026010-169 = "What I'm saying is, every one of us is in Ui's debt for one reason or another."
10026010-170 = "My suggestion is for the Sisterhood to offer her a second chance."
10026010-171 = "Second chance...?"
10026010-172 = "Yes. Drop all of this scripture business, and let Ui use her valuable skills to help the Sisterhood as recompense."
10026010-173 = "How about it? You both get what you want. All's well that ends well, right?"
10026010-174 = "Valuable skills...? For the Sisterhood...?"
10026010-175 = "I would never make such a request!"
10026010-176 = "Heehee... Sakurako, you and I both know the Sisterhood has a myriad of problems Ui could help solve. ♡"
10026010-177 = "In fact, I believe I heard you muttering something about ruins..."
10026010-178 = "Ruins...?"
10026010-179 = "Ruins...?"
10026010-180 = "H-How do you—"
10026010-181 = "Heehee... Sounds like we have a deal. ♡ "
10026010-182 = "We'll solve your little problem, and you'll forgive Ui."
10026010-183 = "And going forward..."
10026010-185 = "...I'll be handling things. ♡"
10026010-199 = "We're ready, Sensei! Take it!"
10026010-200 = "[ns] Push the shutter button."
10026010-206 = "...??"

[translation]
10026010-1 = "ตอนที่ 1;ความคิดเห็นของบุคคลทั่วไป A"
10026010-2 = "<เรื่องราวที่ผ่านมา>"
10026010-7 = "นี่คือคัมภีร์สำคัญทางประวัติศาสตร์... ที่ถูกค้นพบใหม่ในเขตขุดค้นของทรีนิตี้ค่ะ"
10026010-8 = "ฉันเก็บรักษาพระคัมภีร์นี้ไว้ จนกระทั่ง..."
10026010-13 = "...เอ๋?"
10026010-18 = "เห็นบอกว่ามาที่นี่เพราะเรื่องการฟื้นฟูหนังสือเก่า ไปค้นพบหนังสือโบราณมาเหรอคะ...?"
10026010-24 = "อ๊ายยยยย!?"
10026010-29 = "ฉันต้องใช้กาวมอสกับ <ยาศักดิ์สิทธิ์> ค่ะ"
10026010-30 = "ถ้าหามาให้ฉันได้... ฉันจะใช้ความสามารถทั้งหมดที่มี... ในการฟื้นฟูเด็กคนนี้..."
10026010-36 = "...เสร็จแล้วค่ะ พระคัมภีร์ฉบับฟื้นฟู"
10026010-37 = "คุณครูรับไปเถอะค่ะ... ฝากเอาไปให้คุณฮินาตะด้วยนะคะ"
10026010-43 = "คุณครูออกไปก็สักพักแล้ว ป่านนี้จะถึงชาเล่ต์แล้วหรือยังนะ..."
10026010-44 = "...จากนี้เราคงสบายใจขึ้นแล้วแหละเนอะ"
10026010-49 = "ฮู่วว... ดีจริงๆ ที่แอบคัดลอกพระคัมภีร์ไว้จนครบเล่ม... "
10026010-50 = "สงสัยมาตั้งนานแล้ว สาวๆ ชมรมซิสเตอร์ที่บิดบังอะไรไว้มากมาย..."
10026010-52 = "...ขออ่านเลยแล้วกันนะคะ"
10026010-58 = "<ปัจจุบัน>"
10026010-61 = "จะบอกว่าไม่รู้เรื่องพวกนี้ใช่ไหมคะ ก็เพราะเรื่องนี้ยังไงละคะ เราถึงได้มา 'คุย' กันอยู่แบบนี้"
10026010-65 = "...'คุย' เหรอ...?"
10026010-66 = "'ลักพาตัว' คนอื่นมาในที่แบบนี้ แล้วยังพูดออกมาได้นะคะว่าเรามาคุยกัน..."
10026010-70 = "ลักพาตัว...? น่าจะเข้าใจอะไรผิดไปนะคะ..."
10026010-71 = "พวกฉันไม่ได้ลักพาตัวคุณอุยมานะคะ อย่างที่บอกไปว่าฉันพาตัวคุณอุยมาเพราะอยากพูดคุยอะไรด้วย#nนิดหน่อยเท่านั้น"
10026010-72 = "แห่กันเข้ามาตั้งขนาดนั้นแล้วจะมาขอคุยด้วยหน่อยงั้นเหรอคะ แบบนี้คนเค้าเรียกกันว่าลักพาตัวค่ะ"
10026010-73 = "ถ้าชมรมซิสเตอร์... กลุ่มลึกลับที่เต็มไปด้วยความลับจับตัวฉันมาแบบนี้ละก็..."
10026010-77 = "เฮ้อ... ฉันรู้อยู่แล้วละค่ะว่าภาพลักษณ์ของพวกฉันเป็นอย่างไร"
10026010-78 = "แต่พวกฉันก็ไม่ได้หลอกลวงนักเรียนหรือคิดวางแผนทำอะไรไม่ดีนะคะ..."
10026010-79 = "ถ้าจะให้พูดตามตรง... ฉันเหนื่อยใจมากเลยค่ะที่คนอื่นคิดว่าพวกเราเป็นแบบนั้น"
10026010-80 = "พอมีการปล่อยข่าวลือไร้สาระออกมา มันก็ทำให้คนอื่นสร้างระยะห่างกับพวกเราด้วยค่ะ"
10026010-81 = "และถึงพวกฉันจะมีความลับอะไร... ก็ไม่เห็นจะต้องใส่ร้ายอะไรกันแบบนั้นเลยนะคะ"
10026010-82 = "คนที่ทำตัวน่าสงสัยก็ชอบพูดอะไรทำนองนั้นแหละ..."
10026010-83 = "...ค่ะ"
10026010-84 = "ตะ... ตกลงว่าพาฉันมาที่นี่ทำไม? ...คะ?"
10026010-85 = "คิดจะทำอะไรกับฉันกันแน่? ...คะ?"
10026010-86 = "ถะ... ถึงได้มาสร้างบรรยากาศกดดันกันแบบนี้น่ะ!!"
10026010-87 = "ไม่ได้จะทำอะไรหรอกค่ะ ฉันก็บอกไปตั้งแต่เมื่อกี้แล้วนี่คะว่าแค่อยากคุยด้วยนิดหน่อยเท่านั้น"
10026010-88 = "ก็แค่อยากจะ 'กำชับ' ไว้หน่อยน่ะค่ะ ว่า \"ควรเลิกทำได้แล้ว\""
10026010-89 = "...สำเนาพระคัมภีร์กฎระเบียบที่สภาลงนามที่คุณอุยคัดลอกไว้โดยไม่ได้รับความเห็นชอบจากพวกฉัน"
10026010-90 = "......!!!!!!!"
10026010-91 = "นึกว่าจะซ่อนร่องรอยการคัดลอกไว้อย่างสมบูรณ์แบบแล้วซะอีก...!!"
10026010-92 = "มะ... ไม่สิ แต่ในพระคัมภีร์ก็ไม่ได้มีเนื้อหาอะไรมากมายนี่นา..."
10026010-93 = "แน่นอนว่าเนื้อหาในพระคัมภีร์เป็นข้อมูลทางประวัติศาสตร์ทั่วไป ต่อให้เปิดเผยให้ภายนอกรู้ก็ไม่เป็น#nอะไร..."
10026010-94 = "แต่มันก็เป็นสมบัติล้ำค่าของพวกฉันค่ะ การทำฉบับสำเนาโดยที่พวกฉันไม่รู้... ถือเป็นเรื่องที่ไม่น่าพอ#nใจเอาเสียเลยนะคะ"
10026010-95 = "อึก... กะแล้วเชียว ชมรมนี้หลอกกันไม่ได้เลยสินะ..."
10026010-99 = "...เฮือก!?"
10026010-100 = "คะ... คุณฮินาตะยังอยู่ดีหรือเปล่า? เกิดอะไรขึ้นกับคุณฮินาตะน่ะ?!"
10026010-101 = "...คะ?"
10026010-102 = "ยะ... อย่ามาทำเป็นไม่รู้เรื่องเลยน่า...! ฉันรู้หมดนะ! ว่าจะเกิดอะไรขึ้นหลังจากที่เรื่องมันเป็นแบบนี้...!"
10026010-103 = "จะ... จะกำจัดฉันล่ะสิ...! ใช่หรือเปล่าล่ะ? ฉันพูดถูกใช่ไหม? จะกำจัดฉันแล้วก็ขุดหลุมฝังเรื่องนี้เอาไว้ ใช่ไหมล่ะ!!"
10026010-104 = "คุณฮินาตะ... ขอโทษนะคะ... ฉันไม่น่าทำเรื่องแบบนั้นเลย... ฉันไม่น่าทำให้คุณฮินาตะต้องพลอยถูก#nหางเลขไปด้วยเลย..."
10026010-106 = "......? คะ?"
10026010-107 = "ขอโทษนะคะ... คุณฮินาตะ... มันเป็นเพราะฉันแท้ๆ..."
10026010-108 = "ดะ... เดี๋ยวค่ะ คุณอุย? เดี๋ยวก่อนนะคะ สงบสติอารมณ์ก่อน คุณฮินาตะสบายดี ไม่ได้เป็นอะไรนะคะ?  "
10026010-109 = "ต่อไปก็ถึงคราวของฉันสินะ! จะทรมานฉันอย่างเลือดเย็นแล้วเอาไปกำจัดในที่ที่ไม่มีใครรู้ใช่ไหม...! ใช่มั้ยล่ะ? ฉันพูดถูกใช่ไหม!?"
10026010-110 = "เอ่อ! คุณอุย! คุณอุย!?  ฟังฉันพูดก่อน..."
10026010-111 = "ถึงฉันจะหายไป แต่ความจริงก็จะไม่เปลี่ยนไปหรอกนะ!!"
10026010-112 = "...คะ!!!"
10026010-113 = "พูดอะไรของคุณคะเนี่ย!?  ฉันก็บอกอยู่ตั้งแต่เมื่อกี้แล้วนี่คะ! ฉันก็แค่จะขอให้ช่วยบางอย่างเอง...!!"
10026010-114 = "เลิกมองกันด้วยสายตาที่เหมือนว่าพวกฉันจะไปก่อทฤษฎีสมคบคิดเถอะค่ะ...!!"
10026010-117 = "ฮุฮุ......"
10026010-118 = "นั่นสินะคะ ช่างเป็นพวกคนที่น่าสนุกกันจริงๆ เลยนะคะ"
10026010-119 = "ทั้งคุณซากุระโกะ ทั้งคุณอุยเลย..."
10026010-120 = "......!?"
10026010-121 = "หะ... หืม!?  คะ... ใครน่ะ...!?  คุณเป็นใครคะ...??"
10026010-122 = "ที่นี่ไม่น่าจะมีคนอื่นเข้ามาได้สิ...!"
10026010-129 = "ท้าดา~ ฉันคือคนทั่วไป A♡ ที่บังเอิญเดินผ่านมาทางนี้ค่ะ"
10026010-131 = "ฮะ... เฮือก...!?  คุณคือ...!!"
10026010-132 = "สาวในชุดว่ายน้ำกลางดึก... ไม่สิ คุณอุราวะ ฮานาโกะ!?  แล้วตอนนี้ก็ใส่ชุดว่ายน้ำอยู่ด้วย...!?"
10026010-133 = "มาที่นี่ได้ยังไงคะ...? ไม่สิ มีเส้นทางลับอยู่ตรงนั้นด้วยเหรอคะ!?  ฉันไม่เห็นรู้เรื่องมาก่อนเลยค่ะ!"
10026010-134 = "นั่นสินะคะ ตายจริง มีเส้นทางลับอยู่ในที่แบบนี้ด้วย..."
10026010-138 = "พะ... พวกคุณสองคนรู้จักกันเหรอคะ!?  ปะ... เป็นอย่างนี้เองสินะ!?"
10026010-139 = "ถึงกับไปร่วมมือกับคนน่ากลัวแบบนั้นด้วย! จะไม่แปลกได้ยังไงล่ะคะ!!  กะไว้แล้วเชียวว่าพวกชมรม#nซิสเตอร์นี่ละที่ทำตัวน่าสงสัย!!"
10026010-140 = "เข้าใจผิดแล้วค่ะ คุณอุย! นี่มันเรื่องเข้าใจผิดนะคะ! คุณชุดว่ายน้ำไม่ได้เกี่ยวข้องกับพวกฉันเลย...! ฉันก็ไม่รู้เหมือนกันค่ะว่าเธอมาทำไม!!"
10026010-141 = "จะให้ฉันเชื่อคุณในสถานการณ์แบบนี้เหรอคะ?? คุณคิดว่าคุณยังจะพูดให้ฉันวางใจได้อีกงั้นเหรอ!?"
10026010-142 = "ก็... ก็ใช่อยู่หรอกค่ะ! ถ้าเป็นฉัน ก็คงคิดคล้ายๆ คุณอุยเหมือนกัน แต่ก็!"
10026010-143 = "ส่งคุณฮินาตะคืนมานะคะ!!  หัวโจกกลุ่มลับชั่วร้าย!"
10026010-144 = "เดี๋ยวนะคะ ฉันบอกไปแล้วไงว่าคุณฮินาตะสุขสบายดี! ทำไมไม่เชื่อสิ่งที่ฉันพูดสักอย่างเลยล่ะคะ!?"
10026010-145 = "คะ... คือว่า..."
10026010-147 = "คะ... คุณฮินาตะ...?!  ไม่ได้เป็นอะไรหรอกเหรอ!?"
10026010-148 = "ขะ... ขอโทษค่ะ... ตะ... ต้องมากังวลเพราะฉันแท้ๆ เลย..."
10026010-149 = "ฮินาตะ...? ทำไมถึงมาอยู่ที่นี่ได้...!?"
10026010-151 = "ฮุฮุฮุ ที่สำคัญกว่านั้นคือ พวกคุณทั้งสองคน..."
10026010-152 = "ขอฉันออกความเห็นอะไรหน่อยได้ไหมคะ? ในฐานะของบุคคลทั่วไป A ที่เดินผ่านไปมาก็ได้"
10026010-153 = "บะ... บุคคลทั่วไป A?  คนทั่วไป A ที่ใส่ชุดว่ายน้ำเล่นกลางดึกเหรอ...!?"
10026010-154 = "ที่คุณอุยแอบทำสำเนาพระคัมภีร์ไว้... ถ้าจะบอกว่าไม่เป็นความผิดด้านศีลธรรม ก็คงจะปฏิเสธลำบาก#nอยู่นะคะ..."
10026010-155 = "...อึก...!!"
10026010-156 = "เราสามารถพูดว่าชมรมซิสเตอร์ทำให้คนอื่นเชื่อถือไม่ได้... จนถึงขนาดที่คุณอุยต้องตกมาอยู่ในทฤษฎี#nสมคบคิด... ได้ไหมล่ะคะ?"
10026010-157 = "ดูจากสถานการณ์นี้เอาก็ได้นี่คะ? มองมาจากนอกคิโวทอสยังรู้เลยว่ามันน่าสงสัย"
10026010-158 = "ไหนจะศิลปะการพูดที่เป็นเอกลักษณ์ของคุณซากุระโกะอีก... แค่นี้ก็เพียงพอที่จะทำให้เกิดการเข้าใจ#nผิดๆ แล้วละค่ะ"
10026010-159 = "เพราะตอนนี้คุณอุยก็หวาดกลัวอยู่ ส่วนคุณฮินาตะก็กังวลใจจนถึงกับต้องไปตามหาฉัน"
10026010-160 = "ตอนนี้คนที่ดูน่าสงสัยที่สุดในนี้คือคุณฮานาโกะต่างหากล่ะคะ..."
10026010-161 = "ละ... แล้วก็ที่พวกฉันจะทำให้คุณอุยกลัวน่ะ...! พวกฉันไม่ได้มีเจตนาแบบนั้น...!"
10026010-162 = "ฉันแค่กลัวว่าถ้ามีคนอื่นมาได้ยินเข้า เดี๋ยวมันจะมีข่าวลือเพ้อเจ้อเรื่องพระคัมภีร์และเหตุการณ์นี้ออกไป ก็เลยมาในที่ที่ปลอดภัยก็เท่านั้น..."
10026010-163 = "ฮุฮุ นี่แหละค่ะปัญหาของชมรมซิสเตอร์"
10026010-164 = "เอาละๆ~ ถ้างั้นจากนี้... คนทั่วไป A ที่บังเอิญเดินผ่านมาจะขอเสนออะไรสักอย่างนะคะ"
10026010-165 = "ตอนที่คุณฮินาตะเจอปัญหาเข้า คุณอุยก็เคยช่วยเอาไว้โดยที่ไม่ลังเล และคราวก่อนก็เคยช่วยฉันไว้ ตอนที่ฉันไปหาเมื่อกลางดึกแบบปุปปับด้วย..."
10026010-166 = "และที่คุณซากุระโกะเกือบจะได้อ่านกระบวน 108 ท่าลับพิชิตรักต่อหน้าทุกคน ก็ได้คุยอุยช่วยไว้ มันก็เลยไม่เกิดเรื่องแบบนั้นค่ะ"
10026010-167 = "...คะ? คะ... เคยมีเรื่องอะไรแบบนั้นด้วยเหรอ...?"
10026010-168 = "ขะ... ขอโทษค่ะ... ถ้าฉันไม่ทำให้พระคัมภีร์เสียหายละก็..."
10026010-169 = "สรุปก็คือพวกเราเป็นหนี้บุญคุณคุณอุยกันทั้งหมดเลยค่ะ"
10026010-170 = "เพราะฉะนั้นครั้งนี้ให้ชมรมซิสเตอร์ลองให้ 'โอกาส' คุณอุยดีไหมคะ?"
10026010-171 = "โอกาส... งั้นเหรอคะ?"
10026010-172 = "ค่ะ ก็แบบว่า... ให้คุณอุยมาช่วยชมรมซิสเตอร์แทนน่ะค่ะ เป็นการยกโทษความผิดของคุณอุยให้ไงคะ"
10026010-173 = "ว่ายังไงล่ะคะ? มันไม่ได้แย่ขนาดนั้นใช่ไหมล่ะคะ? มันก็เป็นตามที่คุณซากุระโกะหวังเลยนี่คะ... อะไรดีก็ว่าดีเถอะค่ะ ว่าไหมล่ะคะ?"
10026010-174 = "หะ... ให้ช่วยเหรอ? ฉันเนี่ยเหรอคะ? ช่วยชมรมซิสเตอร์...?"
10026010-175 = "มะ... หมายความว่ายังไง... ฉันไม่ได้คิดจะร้องขอขนาดนั้นนะ..."
10026010-176 = "ฮุฮุ♡ แต่ปัญหาของชมรมซิสเตอร์ที่ต้องคลี่คลายมีมากเป็นภูเขาเลยไม่ใช่เหรอคะ ♡"
10026010-177 = "อย่างเช่นเรื่อง <ซากปรักหักพัง> ที่ยังค้างคาใจอยู่..."
10026010-178 = "ซากปรัก...?"
10026010-179 = "ซากปรักหักพัง...?"
10026010-180 = "ระ... รู้เรื่องนี้ได้ยังไง...?"

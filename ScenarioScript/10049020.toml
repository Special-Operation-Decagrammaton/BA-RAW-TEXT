[translation]
10049020-1 = "Episode 2;Suzumi & Reisa with Shimiko"
10049020-2 = "All right. Let me summarize and make sure we're all on the same page."
10049020-3 = "Endou Shimiko, from the Library Committee, was working at night when she happened to overhear a conversation between two Helmet Gangsters."
10049020-4 = "Yes, yes, that's right."
10049020-5 = "And according to Shimiko, the Splash Helmet Gang, led by Komakaze Rabu, plans to cause some kind of incident at the Borderland Amusement Park."
10049020-6 = "Which she immediately relayed to Morizuki Suzumi, of the Vigilante Crew."
10049020-7 = "Suzumi, I take it you remanded those two Helmet Gangsters into Remedial Knight custody?"
10049020-8 = "As soon as they regain consciousness, the Justice Task Force will question them."
10049020-9 = "Well...no."
10049020-10 = "\"No,\" you haven't transferred them yet? Surely you didn't leave them unattended on site..."
10049020-11 = "\"No,\" as in I didn't confront them. We came here to report right away."
10049020-12 = "No one has used any force at all here. Those two aren't even aware of our existence."
10049020-13 = "...Is that so?"
10049020-14 = "...Perhaps YOU might benefit from a call to the Remedial Knights, if you're feeling unwell."
10049020-15 = "No, there's nothing wrong with me physically."
10049020-16 = "...This case is in the Justice Task Force's jurisdiction, so I came to report it. Simple as that."
10049020-17 = "What?"
10049020-22 = "...Why are you looking at the calendar?"
10049020-23 = "Ah, it's nothing. Excuse me."
10049020-24 = "(Today's not April Fool's...)"
10049020-25 = "I understand. However..."
10049020-26 = "Unfortunately, the Justice Task Force can take no official action on this matter."
10049020-27 = "What? Why not...?"
10049020-28 = "..."
10049020-29 = "I appreciate your help and initiative. It's the location that's the issue."
10049020-30 = "Borderland Amusement Park has...jurisdictional difficulties."
10049020-31 = "Well, it's part of the Trinity district, right? Isn't that yours?"
10049020-32 = "The main entrance is in Trinity, but half of the facilities, including the rear gate, are technically in Gehenna."
10049020-33 = "In other words, the park itself is on the border, half and half."
10049020-34 = "Even if the Justice Task Force were to intervene as Trinity's executive agency, we'd lose all means of doing so if the suspects crossed over into Gehenna territory."
10049020-35 = "It's a very easy route to mischief, unfortunately."
10049020-36 = "You're not just making excuses to ignore us, are you?"
10049020-37 = "Not at all. In fact, we've received a few other similar reports already."
10049020-38 = "We're especially concerned about the involvement of \"Komakaze Rabu.\" Trinity cannot help but be wary of her."
10049020-39 = "I wouldn't expect the Justice Task Force to be so worried about a minor Helmet Gang captain."
10049020-40 = "She is...highly unpredictable, to say the least."
10049020-41 = "..."
10049020-43 = "...?"
10049020-44 = "To put this all together, we are genuinely concerned about this issue you've reported."
10049020-45 = "And even if we could keep the issue within Trinity's jurisdiction somehow..."
10049020-46 = "...the Justice Task Force is understaffed and overworked at the moment. Mobilizing enough personnel to do the job would be...challenging, to say the least."
10049020-47 = "And so, I have a proposal for you."
10049020-48 = "Shimiko, as a witness, I suppose you may remember the Helmet Gangsters' appearances and voices."
10049020-49 = "I-I do!"
10049020-50 = "Good. And Suzumi, I know you're quite capable."
10049020-51 = "..."
10049020-53 = "Would the two of you go and observe the situation?"
10049020-54 = "What?"
10049020-55 = "Do not actively engage or attempt to subdue them...but, under the circumstances, please do keep an eye on them. That would be best."
10049020-56 = "Once we confirm your observations and identify the target, we will intervene as quickly as possible."
10049020-57 = "...Does that mean you won't be on the front line until we call you?"
10049020-58 = "Correct. If they see us on patrol, they're likely to run."
10049020-59 = "To say nothing of potential conflicts with Gehenna."
10049020-60 = "Will you help us, then?"
10049020-61 = "And feel free to ask for outside assistance. Within reasonable discretion."
10049020-63 = "Well, you say that now, but..."
10049020-64 = "...Hmm."
10049020-65 = "Of course, I do promise you that the Justice Task Force will cooperate and support you to the best of our ability."
10049020-66 = "Remember, your objective is only to assess. Please, for your own safety, do not intervene, no matter what you see."
10049020-71 = "Ah! Suzumi!"
10049020-76 = "And Shimiko too!"
10049020-77 = "Hey, that was the Justice Task Force reading room you just came out of! What were you talking about, huh?"
10049020-79 = "..."
10049020-80 = "..."
10049020-82 = "...Wh-What?"
10049020-88 = "Library Committee Break Room"
10049020-89 = "Really?!"
10049020-90 = "I understand where they're coming from."
10049020-91 = "The Justice Task Force must have its hands very full."
10049020-92 = "They don't normally ask for this much help."
10049020-93 = "So this must be important."
10049020-94 = "What if we end up in a big fight, though?"
10049020-95 = "Suzumi and I can take on a LOT of Helmet Gangsters, but not TOO-too many, with just the two of us..."
10049020-97 = "You mean three!"
10049020-98 = "What?"
10049020-99 = "You've got me, the Vigilante Crew's certified superstar!"
10049020-100 = "\"Certified,\" huh? Are you an official club now?"
10049020-101 = "No, we're still the same old self-proclaimed vigilantes. No fancy Justice Task Force stuff for us."
10049020-102 = "That being said, Reisa, you'd definitely be a huge help."
10049020-103 = "If you want in, offer accepted."
10049020-104 = "You got it!!"
10049020-105 = "Shimiko, you must be really busy with your Library Committee work, so thank you for helping too."
10049020-106 = "Oh, please don't mention it!"
10049020-107 = "If anything, I should be the one thanking you for taking my report seriously!"
10049020-108 = "So I'll help out any way I can!"
10049020-109 = "All right! Let's lay out a plan!"
10049020-111 = "Here's what we know so far..."
10049020-112 = "According to the Justice Task Force, the Splash Helmet Gang is focused around their leader, Komakaze Rabu. Their numbers are low, comparatively."
10049020-113 = "However, Shimiko's information suggests that there will be multiple Helmet Gangs mobilizing at Borderland Amusement Park."
10049020-114 = "Which makes their TOTAL numbers difficult to determine."
10049020-115 = "So we don't know how many to look for, or where they'll come from."
10049020-116 = "Right. And, to reiterate, the Justice Task Force is only asking us to confirm their intel. We should avoid direct engagement as much as possible."
10049020-117 = "Infiltration would be the best method for that, of course..."
10049020-118 = "But if we all dress up as guests in the crowd, it'll be difficult to keep track of each other."
10049020-120 = "What if we dress up as staff?"
10049020-121 = "That could work, but the other staff might notice that we don't belong and start asking questions."
10049020-122 = "Hmm, we might have to rethink this. Not that we have much time..."
10049020-123 = "For now, here's the brochure they gave us. There's a map on the back, so let's all get familiar with that."
10049020-124 = "Thank you. Okay, so there's a zoo, and a lake... Walls all around, with gates here and there."
10049020-125 = "Fufu, it looks like a fairy tale world."
10049020-127 = "Ooh, ooh!"
10049020-131 = "Um, Reisa? You know the map's on the other side, right?"
10049020-132 = "I've got it!"
10049020-133 = "You've got..."
10049020-134 = "What?"
10049020-138 = "Borderland Amusement Park, Trinity Territory"
10049020-140 = "Aw, I just bought this balloon, and it's already out of air!"
10049020-141 = "My popcorn bucket lid fell off somewhere! Waah!"
10049020-142 = "Waaaah!"
10049020-143 = "Can I have another one? Please?"
10049020-146 = "Whoa!!"
10049020-147 = "Look at all these people, Suzumi!"
10049020-148 = "Come on, just come out here!"
10049020-149 = "I-I'm not mentally prepared yet..."
10049020-150 = "If we're late, we might miss them!"
10049020-151 = "Okay! Here we go...!"
10049020-158 = "Oh wow, Suzumi! Don't be shy! You look great!"
10049020-159 = "(Ugh...)"
10049020-160 = "(How did this happen...?)"

[translation]
10049020-1 = "第2話;鈴美 & 澪紗 with 志美子 "
10049020-2 = "那麼，為了確保彼此的理解一致，我先整理一下內容。"
10049020-3 = "圖書委員會的円堂志美子同學，在夜間工作時偶然聽見了頭盔團成員的對話。"
10049020-4 = "是，是的！沒錯。"
10049020-5 = "根據志美子同學所述──#n河駒風良舞率領的嘩啦嘩啦頭盔團，似乎計畫在「Borderlands遊樂園」引發事件。"
10049020-6 = "隨後你便立刻將相關情報告知了自衛隊的守月鈴美同學。"
10049020-7 = "鈴美同學，請問那兩個人已經被送往救護騎士團了嗎？"
10049020-8 = "等他們恢復意識之後，實現正義部將會進行調查。"
10049020-9 = "並沒有。"
10049020-10 = "意思是你沒有送他們過去？#n難不成是將他們直接留在現場嗎……？"
10049020-11 = "不是這樣的。#n我的意思是自己沒有介入，而是直接前來報案。"
10049020-12 = "因此並沒有以武力將其制伏，對方也沒有察覺到我們的存在。"
10049020-13 = "……？"
10049020-14 = "如果身體不適的話，需要幫你請救護騎士團過來嗎？"
10049020-15 = "我在身體方面沒有任何問題。"
10049020-16 = "……只是因為這是實現正義部的職責，所以前來進行通報而已。"
10049020-17 = "咦？"
10049020-22 = "為什麼要確認日曆？"
10049020-23 = "沒，沒什麼。恕我失禮了。"
10049020-24 = "（看來不是愚人節啊……）"
10049020-25 = "情況我明白了。不過……"
10049020-26 = "很抱歉。針對本次的案件，實現正義部無法出動或進行正式介入。"
10049020-27 = "咦？為什麼……？"
10049020-28 = "……"
10049020-29 = "感謝兩位主動提供情報。#n不過……問題出在地點上。"
10049020-30 = "「Borderlands遊樂園」所在的位置相當棘手。"
10049020-31 = "既然位於三一自治區內，不就是實現正義部的管轄範圍嗎？"
10049020-32 = "那座遊樂園的正門確實位於三一沒錯。#n然而包含後門在內，有將近一半的設施座落於格黑娜的自治區。"
10049020-33 = "也就是說，該遊樂園位於三一和格黑娜的邊界之上。"
10049020-34 = "即便三一的執法機關實現正義部加以介入──#n一旦對方逃進遊樂園內屬於格黑娜的區域，我們就會失去應對的權限與手段。"
10049020-35 = "據說有某些人會惡意利用這點，從事不法勾當。"
10049020-36 = "……這是在懷疑我們提供的情報嗎？"
10049020-37 = "我完全沒有這個意思。#n事實上，我們過去也收到過類似的情報。"
10049020-38 = "尤其是「河駒風良舞」的介入相當值得注意。#n對三一來說，他是個有些棘手的人物。"
10049020-39 = "實現正義部竟然會在意小規模頭盔團的一個隊長，真令人意外。"
10049020-40 = "只能說他是個不知道會如何發展，又令人放心不下的存在吧。"
10049020-41 = "……"
10049020-43 = "……？"
10049020-44 = "總而言之，我們對於兩位的通報並非僅止於表面上的關心，而是確實深感憂慮。"
10049020-45 = "即便三一這邊的管轄區域還能設法應對……"
10049020-46 = "目前實現正義部的業務過於繁重，在人力嚴重不足的情況下……難以調動大量人手。"
10049020-47 = "因此，我能提出的建議如下。"
10049020-48 = "身為目擊者的志美子同學，應該還記得那兩名頭盔團成員的長相與聲音吧？"
10049020-49 = "是，是的！"
10049020-50 = "那真是太好了。#n除此之外，我們也對鈴美同學的武力相當信任。"
10049020-51 = "……"
10049020-53 = "所以，能否請兩位到現場觀察情況呢？"
10049020-54 = "咦？"
10049020-55 = "不需要主動交戰或制伏對方……#n只是由於情況特殊，希望兩位能到現場協助確認狀況。"
10049020-56 = "一旦確認目擊情報，並且需要立即處理的話，我們就會以最快的速度進行介入。"
10049020-57 = "……也就是說，正義實現部不會親自出面是嗎？"
10049020-58 = "是的。如果實現正義部派員巡邏，目標很可能會逃跑。"
10049020-59 = "而且這麼做可能會造成與格黑娜之間不必要的衝突。"
10049020-60 = "因此，我們希望能借助兩位的力量。"
10049020-61 = "在確保情報保密的前提下，要尋求其他人的協助也無妨。"
10049020-63 = "突然聽到這些，我們也有點……"
10049020-64 = "……原來如此。"
10049020-65 = "當然，實現正義部也會提供最大限度的協助與支援。"
10049020-66 = "這終究只是為了確認狀況，還請兩位務必優先考量自身的安全，盡量避免直接介入。"
10049020-71 = "啊！！鈴美同學！"
10049020-76 = "志美子同學也在呢！"
10049020-77 = "哇！！兩位居然從實現正義部的會議室出來！！#n是去商量什麼超厲害的事情嗎！？"
10049020-79 = "……"
10049020-80 = "……"
10049020-82 = "怎，怎麼回事……？"
10049020-88 = "圖書委員會休息室"
10049020-89 = "咦咦！？這也太奇怪了吧！"
10049020-90 = "不，澪紗同學。#n我能理解他們的考量。"
10049020-91 = "對實現正義部而言，這確實是個棘手的案件。"
10049020-92 = "先前雖然也有過一些零星的協助，不過這類的請求確實相當少見。"
10049020-93 = "我想這也代表著事情的重要性吧。"
10049020-94 = "可是，如果突然真的要打起來怎麼辦？"
10049020-95 = "只靠我跟鈴美同學兩個人，不知道有沒有辦法應付人數不明的頭盔團……"
10049020-97 = "是三個人！"
10049020-98 = "什麼？"
10049020-99 = "我們自衛隊的超級巨星兼王牌英雄不是也在這裡嗎！"
10049020-100 = "我們……？自衛隊原來是個正式的組織嗎？"
10049020-101 = "倒也不是。#n和實現正義部不同，自衛隊終究只是個自稱而已。"
10049020-102 = "不過如果能有澪紗同學這麼優秀的戰力同行，將會是個相當大的助力。"
10049020-103 = "假如你願意幫忙的話，我會非常感激。"
10049020-104 = "當然！！！！！！！"
10049020-105 = "志美子同學也是。#n明明圖書委員會的事很忙還願意協助，真是太感謝了。"
10049020-106 = "不會不會！別這麼說！"
10049020-107 = "兩位願意認真聽我說，我反而才要感謝你們呢！"
10049020-108 = "我也會盡力的！"
10049020-109 = "那麼接下來就開始制定作戰計畫吧！"
10049020-111 = "首先，這是目前已經掌握的情報……"
10049020-112 = "實現正義部提供的資料顯示，#n嘩啦嘩啦頭盔團是以其首領「河駒風良舞」為中心組成的小型組織。"
10049020-113 = "結合志美子同學的情報來看，這次在「Borderlands遊樂園」將會出現多個頭盔團。"
10049020-114 = "想事先掌握確切的規模似乎不太容易。"
10049020-115 = "也就是說，不知道會有多少人躲在裡頭囉！"
10049020-116 = "是的。除此之外，實現正義部只要求我們「確認狀況」。#n所以還必須盡可能避免直接衝突才行。"
10049020-117 = "從這點來看，潛伏應該是最好的方式。只不過……"
10049020-118 = "考量到假日人潮眾多，假如偽裝成遊客恐怕會難以互相辨識。"
10049020-120 = "那麼，偽裝成工作人員怎麼樣呢？"
10049020-121 = "如果發現從未見過的面孔，反而有可能引起其他員工的注意。"
10049020-122 = "雖然還需要多加考慮，不過準備時間已經所剩不多了……我們得盡快決定才行。"
10049020-123 = "這是參考用的遊樂園宣傳冊。#n背面有園區的地圖，請兩位先熟悉一下吧。"
10049020-124 = "謝謝你。附近有動物園……就連湖泊都有呢。#n四周都有城牆環繞，想要進出就只能透過固定的出入口啊。"
10049020-125 = "呵呵，簡直就像童話世界一樣呢。"
10049020-127 = "哦……哦哦……！"
10049020-131 = "澪紗同學？#n地圖在宣傳冊的背面哦？"
10049020-132 = "就是這個！！"
10049020-133 = "這個……是指？"
10049020-134 = "嗯？"
10049020-138 = "Borderlands遊樂園．三一區域"
10049020-140 = "這顆氣球我才剛買沒多久，怎麼已經漏氣了啊！"
10049020-141 = "爆米花桶的蓋子掉了！嗚哇哇──"
10049020-142 = "嗚哇啊──！"
10049020-143 = "幫我換新的！換新的嘛──！"
10049020-146 = "哇啊！！"
10049020-147 = "鈴美同學！人超多的耶！"
10049020-148 = "快點出來吧！"
10049020-149 = "啊……我還沒做好心理準備……"
10049020-150 = "再晚一點可能就要錯過了哦！"
10049020-151 = "來吧！該出動了！"
10049020-158 = "鈴美同學！你穿起來很適合，不用害羞啦！"
10049020-159 = "（唔唔……）"
10049020-160 = "（怎麼會變成這樣……）"

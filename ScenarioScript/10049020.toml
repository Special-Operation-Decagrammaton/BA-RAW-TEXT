[translation]
10049020-1 = "ตอนที่ 2;สึซึมิ & เรอิสะ และชิมิโกะ"
10049020-2 = "ฉันขอทบทวนอีกครั้งนะคะว่าเราเข้าใจตรงกันหรือเปล่า"
10049020-3 = "ระหว่างออกมาทำงานกะกลางคืน คุณเอ็นโดะ ชิมิโกะที่เป็นสมาชิกชมรมอ่านหนังสือก็บังเอิญไป#nได้ยินสมาชิกแก๊งหมวกกันน็อกคุยกัน ถูกมั้ยคะ?"
10049020-4 = "ค่ะ ค่ะ! ถูกต้องค่ะ"
10049020-5 = "ตามที่คุณชิมิโกะบอก แก๊งหมวกกันน็อกป๋อมแป๋มที่นำโดยโคะมาคาเสะ ราบุ จะไปก่อเรื่องบางอย่างที่ <สวนสนุกบอเดอร์แลนด์>"
10049020-6 = "ก็เลยแจ้งเรื่องนี้กับคุณโมริซึกิ สึซึมิจากกลุ่มรักษาความสงบที่บังเอิญเดินสวนกันพอดี"
10049020-7 = "คุณสึซึมิคะ แก๊งหมวกกันน็อก 2 คนนั้นถูกส่งตัวไปที่ชมรมอัศวินบรรเทาทุกข์แล้วหรือยังคะ?"
10049020-8 = "ถ้าพวกนั้นได้สติแล้ว ทางชมรมทวงความยุติธรรมจะเข้าไปสอบสวนผู้ป่วยค่ะ"
10049020-9 = "ไม่นะคะ"
10049020-10 = "คุณกำลังบอกว่าไม่มีการส่งตัวเหรอคะ? หรือว่าพวกคุณปล่อย 2 คนนั้นไว้ในที่เกิดเหตุ..."
10049020-11 = "ไม่ใช่ค่ะ ฉันตรงมาแจ้งเรื่องทันทีโดยไม่ได้ลงมืออะไรกับใครค่ะ"
10049020-12 = "ฉันไม่ได้ใช้กำลังปราบปรามพวกเขา และ 2 คนนั้นก็ไม่รู้ด้วยค่ะว่าฉันอยู่ที่นั่น"
10049020-13 = "...?"
10049020-14 = "ถ้าวันนี้รู้สึกไม่สบายเนื้อตัว ฉันเรียกชมรมอัศวินบรรเทาทุกข์ให้เอามั้ยคะ?"
10049020-15 = "ฉันไม่ได้มีปัญหาทางร่างกายหรอกค่ะ"
10049020-16 = "นี่เป็นเรื่องที่อยู่ในความดูแลของชมรมทวงความยุติธรรม ฉันก็เลยมาแจ้งเฉยๆ ค่ะ..."
10049020-17 = "คะ?"
10049020-22 = "ทำไมถึงดูปฏิทินล่ะคะ?"
10049020-23 = "มะ... ไม่มีอะไรค่ะ ขอโทษที่เสียมารยาทนะคะ"
10049020-24 = "(วันนี้ก็ไม่ใช่วันเมษาหน้าโง่นี่นา...)"
10049020-25 = "ฉันพอเข้าใจสถานการณ์แล้วค่ะ แต่ว่า..."
10049020-26 = "ต้องขออภัยด้วยนะคะ เรื่องนี้ชมรมทวงความยุติธรรมคงส่งกองกำลังหรือตอบโต้อย่างเป็นทางการ#nไม่ได้ค่ะ"
10049020-27 = "คะ? ทำไมล่ะคะ...?"
10049020-28 = "......"
10049020-29 = "ต้องขอบคุณสำหรับการตอบสนองที่รวดเร็วจากพวกคุณนะคะ แต่ว่า... มันมีปัญหาเรื่องสถานที่น่ะค่ะ"
10049020-30 = "<สวนสนุกบอเดอร์แลนด์> ตั้งอยู่ในตำแหน่งที่ซับซ้อนค่ะ"
10049020-31 = "แต่เขตปกครองตนเองทรีนิตี้เป็นพื้นที่ในความรับผิดชอบของชมรมทวงความยุติธรรมไม่ใช่เหรอคะ?"
10049020-32 = "ทางเข้าหลักของสวนสนุกอยู่ในทรีนิตี้ก็จริง แต่เกือบครึ่งหนึ่งของสวนสนุกรวมถึงประตูหลังของ#nสวนสนุกอยู่ในเขตของเกเฮนน่าค่ะ"
10049020-33 = "สรุปก็คือ สวนสนุกแห่งนี้ตั้งอยู่ระหว่างเส้นเขตแดนระหว่างทรีนิตี้กับเกเฮนน่า"
10049020-34 = "ต่อให้ชมรมทวงความยุติธรรมที่เป็นหน่วยงานบริหารของทรีนิตี้จะเข้าไปแทรกแซงในสวนสนุกได้ แต่ถ้าข้ามไปในเขตของเกเฮนน่า พวกฉันก็ไม่มีอำนาจในการทำอะไรค่ะ"
10049020-35 = "ว่ากันว่ามีคนที่ใช้ประโยชน์จากข้อจำกัดนี้ในการทำเรื่องไม่ดีเยอะเลยค่ะ"
10049020-36 = "คุณไม่ได้คิดว่าฉันมาแจ้งความเท็จหรอกใช่มั้ยคะ...?"
10049020-37 = "ไม่เลยค่ะ ที่จริงพวกฉันได้รับข่าวกรองในลักษณะนี้มาหลายครั้งแล้วค่ะ"
10049020-38 = "โดยเฉพาะเรื่องที่เกี่ยวกับ 'โคะมาคาเสะ ราบุ' น่ะค่ะ สำหรับทรีนิตี้แล้ว เธอคนนี้เป็นคนที่ต้องให้#nความสนใจไม่น้อยเลยค่ะ"
10049020-39 = "น่าประหลาดใจจังเลยนะคะที่ชมรมทวงความยุติธรรมให้ความสนใจกับหัวหน้าแก๊งหมวกกันน็อกเล็กๆ แบบนั้น"
10049020-40 = "ขอเรียกว่าเป็นนิ้วมือที่บาดเจ็บ ที่ไม่รู้ว่าจะแย่ลงอีกแค่ไหนแล้วกันค่ะ"
10049020-41 = "..."
10049020-43 = "...?"
10049020-44 = "โดยสรุปก็คือ ฉันไม่ได้มองข้ามข้อมูลที่พวกคุณแจ้งมา และในความเป็นจริงฉันก็กำลังกังวลเกี่ยวกับ#nเรื่องนี้อยู่ค่ะ"
10049020-45 = "และต่อให้เราจัดการในเขตอำนาจของทรีนิตี้ได้..."
10049020-46 = "แต่ตอนนี้ชมรมทวงความยุติธรรมมีงานล้นมือจนไม่มีกำลังคนไปจัดการเรื่องนั้นค่ะ การระดมคนจำนวนมากก็เป็นเรื่องยากด้วยค่ะ"
10049020-47 = "เพราะงั้น นี่คือสิ่งที่ฉันพอจะเสนอได้ค่ะ"
10049020-48 = "คุณชิมิโกะที่เป็นผู้พบเห็นเหตุการณ์น่าจะจำเสียงกับรูปลักษณ์ของแก๊งหมวกกันน็อกได้ใช่มั้ยคะ?"
10049020-49 = "ค่ะ ใช่ค่ะ!"
10049020-50 = "งั้นก็ค่อยยังชั่วค่ะ แล้วฉันก็เชื่อมั่นในความสามารถของคุณสึซึมิด้วยค่ะ"
10049020-51 = "..."
10049020-53 = "เพราะงั้น พวกคุณทั้ง 2 คนช่วยไปจับตาดูสถานการณ์จากที่เกิดเหตุให้ได้มั้ยคะ?"
10049020-54 = "คะ?"
10049020-55 = "ไปแล้วอย่าเพิ่งแทรกแซงหรือปราบคนพวกนั้นโดยตรงนะคะ... นี่เป็นเรื่องละเอียดอ่อน ขอแค่ไปตรวจสอบสถานการณ์จากหน้างานมาก็พอค่ะ"
10049020-56 = "ถ้าได้รับการยืนยันจากการสังเกตการณ์พร้อมระบุตัวเป้าหมายได้ และหากต้องตอบสนองอย่างเร่งด่วน พวกฉันจะรีบเข้าไปแทรกแซงให้เร็วที่สุดค่ะ"
10049020-57 = "หมายความว่าชมรมทวงความยุติธรรมจะไม่ออกหน้าตั้งแต่แรก... ใช่มั้ยคะ?"
10049020-58 = "ใช่ค่ะ นั่นก็เพราะถ้าชมรมทวงความยุติธรรมไปลาดตระเวน เป้าหมายก็จะหลบหนีไปก่อนค่ะ"
10049020-59 = "และถ้าเป็นอย่างนั้น ก็อาจเกิดการปะทะที่ไม่จำเป็นกับเกเฮนน่าได้ค่ะ"
10049020-60 = "เพราะอย่างนี้ฉันก็เลยอยากให้พวกคุณช่วยค่ะ"
10049020-61 = "พวกคุณจะขอความร่วมมือจากคนอื่นด้วยก็ได้ค่ะ ขอแค่รักษาความปลอดภัยไว้ได้ก็พอ"
10049020-63 = "ถึงจู่ๆ จะพูดอย่างนั้นก็เถอะ..."
10049020-64 = "ฉันคงต้องทำแบบนั้นสินะคะ..."
10049020-65 = "แน่นอนว่าทางชมรมทวงความยุติธรรมจะให้ความร่วมมือและให้การสนับสนุนอย่างเต็มที่ค่ะ"
10049020-66 = "แต่นี่เป็นการประเมินสถานการณ์เบื้องต้นเท่านั้น ขอให้งดเว้นการเข้าไปแทรกแซงโดยตรง เพื่อความปลอดภัยของพวกคุณเองนะคะ"
10049020-71 = "อ๊ะ!! คุณสึซึมิ!"
10049020-76 = "คุณชิมิโกะด้วย!"
10049020-77 = "ว้าวว!! กลับมาจากห้องประชุมของชมรมทวงความยุติธรรมเลยเหรอ!! ไปหารืองานอะไรที่ยอดเยี่ยม#nกันมาเหรอคะ?!"
10049020-79 = "..."
10049020-80 = "..."
10049020-82 = "เอะ... เอ๋...?"
10049020-88 = "ห้องพักผ่อน ชมรมอ่านหนังสือ"
10049020-89 = "หา? ไหงเป็นงั้นล่ะ?"
10049020-90 = "ไม่หรอกค่ะ คุณเรอิสะ ฉันพอเข้าใจค่ะ"
10049020-91 = "นี่คงเป็นสถานการณ์ที่ยากลำบากสำหรับชมรมทวงความยุติธรรมเหมือนกัน"
10049020-92 = "ถึงที่ผ่านมาเราจะได้รับความช่วยเหลือเล็กๆ น้อยๆ ตามปกติ แต่การขอความร่วมมือแบบนี้เป็นเรื่องที่#nแตกต่างออกไปค่ะ"
10049020-93 = "นี่คงเป็นประเด็นที่ละเอียดอ่อนและก็สำคัญน่ะค่ะ"
10049020-94 = "แต่ถ้าจู่ๆ มีการต่อสู้ขึ้นมาจะทำยังไงคะ?"
10049020-95 = "ลำพังฉันกับคุณสึซึมิ 2 คนจะรับมือกับแก๊งหมวกกันน็อกได้หรือเปล่านะ..."
10049020-97 = "3 คนต่างหากค่ะ!"
10049020-98 = "คะ?"
10049020-99 = "ยังมีฉันที่เป็นฮีโร่ตัวตึง และเป็นซูเปอร์สตาร์ของกลุ่มรักษาความสงบของเราอยู่ตรงนี้ทั้งคนนี่คะ!"
10049020-100 = "ของเรา...? เดิมทีแล้วกลุ่มรักษาความสงบเป็นองค์กรหนึ่งเหรอคะ?"
10049020-101 = "ก็ไม่เชิงหรอกค่ะ กลุ่มรักษาความสงบเป็นชื่อที่เรียกกันเฉยๆ ไม่เหมือนกับชมรมทวงความยุติธรรม#nหรอกค่ะ"
10049020-102 = "แต่ถ้ามีบุคลากรชั้นยอดอย่างคุณเรอิสะอยู่ด้วย ฉันว่าก็น่าจะช่วยได้เยอะเลยนะคะ"
10049020-103 = "ขอบคุณในความร่วมมือค่ะ"
10049020-104 = "แน่นอนอยู่แล้วค่ะ!!!!!!!"
10049020-105 = "คุณชิมิโกะก็น่าจะยุ่งกับงานของชมรมอ่านหนังสือแท้ๆ ขอบคุณที่มาช่วยนะคะ"
10049020-106 = "ไม่ค่ะ ไม่เป็นไรเลย! ฉันยินดีมากค่ะ!"
10049020-107 = "ฉันต้องขอบคุณมากกว่าค่ะที่พวกคุณให้ความสำคัญกับสิ่งที่ฉันพูด!"
10049020-108 = "ฉันเองก็จะพยายามเต็มที่ค่ะ!"
10049020-109 = "งั้นเรามาวางแผนปฏิบัติการกันเลยมั้ยคะ?"
10049020-111 = "ก่อนอื่น นี่เป็นข้อมูลทั้งหมดที่เรารู้ตอนนี้ค่ะ..."
10049020-112 = "จากข้อมูลที่ทางชมรมทวงความยุติธรรมแชร์มาให้ แก๊งหมวกกันน็อกป๋อมแป๋มเป็นองค์กรขนาดเล็ก#nที่นำโดยโคะมาคาเสะ ราบุค่ะ"
10049020-113 = "และถ้ารวมข้อมูลของคุณชิมิโกะ ดูเหมือนครั้งนี้จะมีแก๊งหมวกกันน็อกหลายๆ แก๊งมารวมตัวกันที่ <สวนสนุกบอเดอร์แลนด์> ค่ะ"
10049020-114 = "ก็เลยยากที่จะระบุจำนวนคนที่แน่นอนสินะคะ"
10049020-115 = "เราไม่รู้ว่าใครจะมาซ่อนตัวกันเยอะแค่ไหนสินะคะ!"
10049020-116 = "ใช่ค่ะ นอกจากนี้ชมรมทวงความยุติธรรมยังขอให้เราไปประเมินสถานการณ์เบื้องต้นเท่านั้น หมายความว่าเราต้องหลีกเลี่ยงการปะทะโดยตรงให้มากที่สุดเท่าที่จะเป็นไปได้ค่ะ"
10049020-117 = "งั้นวิธีที่ดีที่สุดก็คือการแฝงตัว..."
10049020-118 = "แต่ถ้าเราปลอมตัวเป็นคนที่ไปเที่ยวสวนสนุก เราก็น่าจะหากันเจอยาก เพราะช่วงสุดสัปดาห์มีคนไปกันเยอะค่ะ"
10049020-120 = "งั้นเราปลอมตัวเป็นพนักงานกันไม่ได้เหรอคะ?"
10049020-121 = "ถ้าเป็นพนักงาน เราจะยิ่งกลับเป็นที่จับตาจากพนักงานคนอื่นที่ไม่เคยเห็นพวกเรามาก่อนค่ะ"
10049020-122 = "เราน่าจะต้องคิดเรื่องนี้กันอีกสักหน่อย แต่ก็มีเวลาเตรียมตัวเหลือไม่มากแล้ว งั้นคงต้องรีบตัดสินใจกันแล้วค่ะ"
10049020-123 = "นี่คือแผ่นพับของสวนสนุกที่ฉันได้รับมาค่ะ ด้านหลังมีแผนที่อยู่ด้วย ทุกคนศึกษาไว้ให้ดีนะคะ"
10049020-124 = "ขอบคุณค่ะ ที่นั่นมีสวนสัตว์... แล้วก็ทะเลสาบด้วยสินะคะ บริเวณนั้นล้อมรอบด้วยกำแพง ส่วนทางเข้าออกก็มีแค่จุดที่กำหนดไว้เท่านั้นค่ะ"
10049020-125 = "ฮุฮุ เหมือนโลกในเทพนิยายเลยนะคะ"
10049020-127 = "โอ้... โอ้วว...!"
10049020-131 = "คุณเรอิสะ? แผนที่อยู่ด้านหลังแผ่นพับต่างหากค่ะ?"
10049020-132 = "เอาอันนี้ละค่ะ!!"
10049020-133 = "อันนี้... อันไหนคะ?"
10049020-134 = "คะ?"
10049020-138 = "สวนสนุกบอเดอร์แลนด์ เขตทรีนิตี้"
10049020-140 = "เพิ่งซื้อลูกโป่งใบนี้มาแท้ๆ แต่ลมมันรั่วออกไปหมดแล้วง่า!"
10049020-141 = "ฝาถังป๊อปคอร์นปิดไม่อยู่จนหล่นพื้นไปแล้ว! แงงง..."
10049020-142 = "แงงงงง..."
10049020-143 = "เปลี่ยนให้หน่อยครับ! ขอเปลี่ยนของหน่อย!"
10049020-146 = "ว้าว!!"
10049020-147 = "คุณสึซึมิ! คนเพียบเลยค่ะ!"
10049020-148 = "รีบออกมาเถอะค่ะ!"
10049020-149 = "ขะ... ขอเวลาฉันเตรียมใจอีกนิด..."
10049020-150 = "ถ้าออกมาช้ากว่านี้ เดี๋ยวจะไม่ทันเอานะคะ!"
10049020-151 = "เอาละ! ออกปฏิบัติการค่ะ!"

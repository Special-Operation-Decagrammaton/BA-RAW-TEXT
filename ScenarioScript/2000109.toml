[translation]
2000109-1 = " Maid Cafe! Part 2"
2000109-2 = "Cafe Maidramatic!"
2000109-4 = "..."
2000109-5 = "..."
2000109-6 = "Please don't look at me like that."
2000109-7 = "My friend took her shift back, but the manager asked me to help out one last time. I would have felt bad if I refused."
2000109-8 = "*sigh* Besides, everyone here tells me I'm doing a good job. I wish I could earn this kind of praise for my schoolwork."
2000109-9 = "[s1] \"Well, you are always working when you should be studying...\"\n[s2] \"Being recognized for your hard work isn't too bad, is it?\""
2000109-10 = "True. I can't deny that."
2000109-11 = "True. I can't deny that."
2000109-12 = "Anyway, today is my last day! No matter what. "
2000109-13 = "All right, Sensei. Order whenever you're ready."
2000109-14 = "[s] \"I'd like that special request we talked about last time.\""
2000109-15 = "A-Are you still not over that?"
2000109-16 = "Even the manager wasn't on board."
2000109-17 = "Also...I don't want to step on a teacher. It wouldn't feel right."
2000109-18 = "[s] \"Stepping on a teacher isn't wrong, but stepping on your master? Oh-so right.\""
2000109-19 = "I can't argue with that."
2000109-20 = "Go ahead and lie do—"
2000109-22 = "Kyah! M-Master! You can't do that!"
2000109-23 = "Haha! You're so adorable! I feel like I've died and gone to heaven!"
2000109-24 = "Ugh. They're wasted."
2000109-25 = "Drunks are the worst kinds of customers."
2000109-26 = "What the hell is the manager doing?"
2000109-27 = "*hic* A real life maid's headband! Can I touch it?"
2000109-28 = "Bastard..."
2000109-29 = "I could always shut him up the easy way. No, wait. My gun isn't suitable for use indoors."
2000109-30 = "Besides, if word got out that a maid shot a customer..."
2000109-32 = "Tch. What am I supposed to do...?!"
2000109-34 = "[ns] Get up and approach the drunkard."
2000109-36 = "Huh? Who're you?! I didn't order someone like you!"
2000109-37 = "[s3] \"Our cafe has maids of all shapes and sizes, I'll have you know.\"\n[s4] \"I'm placing an order for you to get the hell out.\""
2000109-38 = "Wh-What?!"
2000109-39 = "Wh-What?!"
2000109-40 = "[s5] \"The girl next to me? There's more to her than meets the eye.\"\n[s6] \"You think this a joke?\""
2000109-41 = "G-Good lord! I thought this was heaven, but it's eternal hell!"
2000109-42 = "G-Good lord! I thought this was heaven, but it's eternal hell!"
2000109-43 = "G-Get away from me! K-Keep the change and let me out!"
2000109-45 = "Th-Thank you!"
2000109-46 = "...Incredible."
2000109-47 = "I owe you one for that. Thank you, Sensei."
2000109-48 = "I only stepped out for a second...and look what happened!"
2000109-49 = "I'll have to report this to Valkyrie."
2000109-50 = "I appreciate the help, stranger."
2000109-51 = "Here's a special membership card for our maid cafe."
2000109-52 = "That will let you enter without paying the cover charge!"
2000109-53 = "[s7] \"You don't have to give me this.\"\n[s8] \"There's something I'd like even more.\""
2000109-54 = "Do you want something else? If it's something we can do..."
2000109-55 = "Do you want something else? If it's something we can do..."
2000109-56 = "N-No. Don't tell me..."
2000109-57 = "[s] \"Special request.\""
2000109-58 = "?!"
2000109-59 = "*sigh* If that's what the customer wants."
2000109-60 = "What?! Since when is the customer always right here?!"
2000109-64 = "W-Wait!"
2000109-65 = "I-I don't think I'm ready..."
2000109-66 = "Ugh. F-Fine!"
2000109-67 = "...I'll do it."
2000109-68 = "Okay, Sensei..."
2000109-70 = "Lie down."
2000109-73 = "― I-Is this really...a reward?[wa:3420] "
2000109-75 = "― So... Um. This is...[wa:3220] "
2000109-78 = "― ...really embarrassing. But if this is really what you want, Sensei.[wa:2280] "
2000109-81 = "― You want me to do it a little harder...? O-Okay.[wa:4760] "
2000109-84 = "― As long as you're happy, Sensei...then I'm happy too.[wa:2640] "
2000109-87 = "― Ah! D-Don't get up so suddenly! I could have fallen![wa:1420] "
2000109-90 = "You're a very...interesting person, Sensei."
2000109-91 = "Let me make something perfectly clear."
2000109-92 = "Today is the last time...I'll ever do something like that at this cafe."
2000109-93 = "..."
2000109-94 = "Heh. Don't look so disappointed."
2000109-95 = "If you wanted to do something like that...somewhere more private... "
2000109-98 = "...I'll consider it—for you."

[translation]
2000109-1 = "女僕咖啡廳！（２）"
2000109-2 = "Café．Maidramatic！"
2000109-4 = "……"
2000109-5 = "……"
2000109-6 = "請不要做出那種表情。"
2000109-7 = "朋友的事已經結束了。#n但是被店長拜託幫忙做到今天為止，沒辦法……"
2000109-8 = "唉，明明工作時總是能獲得好的評價，為什麼書就是念不好呢。"
2000109-9 = "[s1] 「是因為念書的時間都拿來工作了嗎……？」\n[s2] 「能被認可是件好事唷。」"
2000109-10 = "……這我確實無法反駁呢。"
2000109-11 = "……這我確實無法反駁呢。"
2000109-12 = "總之，不管怎樣，#n今天就是最後一天了！"
2000109-13 = "來，老師。請點餐吧。"
2000109-14 = "[s] 「我要獎勵。」"
2000109-15 = "又，又是那個？"
2000109-16 = "那種事情，店長也說過不行了吧。"
2000109-17 = "況且……我也不想用腳踩老師。#n總覺得，不能做這種事。"
2000109-18 = "[s] 「對老師的話姑且不論，把主人踩在腳底下是正確的事情喔。」"
2000109-19 = "那可真是令人震驚的理論……"
2000109-20 = "別管那個了，請趕快點餐……"
2000109-22 = "呀啊！？主，主人！不可以這樣！"
2000109-23 = "呵嘿嘿嘿！真可愛！真是太棒了！這裡是天國吧！"
2000109-24 = "……真是的，是醉漢啊。"
2000109-25 = "那種客人最麻煩了……"
2000109-26 = "再說都這種時候了，店長到底在哪做什麼啊。"
2000109-27 = "呼，呼，這就是所謂的髮箍嗎？#n我摸一下沒關係吧～？"
2000109-28 = "可惡，那傢伙……"
2000109-29 = "要開槍嗎……？#n不，我的槍如果在這種室內使用的話……"
2000109-30 = "況且，如果傳出什麼女僕對客人開槍之類的消息的話……"
2000109-32 = "可惡，究竟怎麼辦才好……"
2000109-34 = "[ns] 起身走向醉漢"
2000109-36 = "嗯～？你是誰啊！#n我可沒有要像你這種的人來服務！"
2000109-37 = "[s3] 「其實這裡是『男扮女裝的女僕咖啡廳』哦。」\n[s4] 「我其實想把你打包帶走耶？」"
2000109-38 = "你，你，你在說什麼啊！？"
2000109-39 = "你，你，你在說什麼啊！？"
2000109-40 = "[s5] 「現在在我旁邊的她……不，『他』其實是……」\n[s6] 「不是在開玩笑哦，我是認真的。」"
2000109-41 = "怎，怎麼可能有這種事！我以為這裡是天國，結果根本是地獄嘛！"
2000109-42 = "怎，怎麼可能有這種事！我以為這裡是天國，結果根本是地獄嘛！"
2000109-43 = "不，不要靠近我！錢，錢不用找了，讓我回去！"
2000109-45 = "非，非，非常謝謝！"
2000109-46 = "……真厲害。"
2000109-47 = "我也要向你道謝。#n謝謝你，老師。"
2000109-48 = "我只不過離開了一下……竟然發生這種事……！"
2000109-49 = "本來想要向女武神通報的，竟然一下就……"
2000109-50 = "非常感謝，這位客人。"
2000109-51 = "小小謝禮不成敬意，這是我們女僕咖啡廳的特別會員證。"
2000109-52 = "客人以後來我們店裡時，都不需要再收取入場費……！"
2000109-53 = "[s7] 「不需要。」\n[s8] 「我有比那個更想要的東西。」"
2000109-54 = "咦？請問是什麼呢……#n只要是我們能做到的事……"
2000109-55 = "咦？請問是什麼呢……#n只要是我們能做到的事……"
2000109-56 = "……難，難道是？"
2000109-57 = "[s] 「我，要，獎，勵。」"
2000109-58 = "！？"
2000109-59 = "呼，看來也沒辦法了呢。"
2000109-60 = "什麼！？什麼叫沒辦法了！"
2000109-64 = "等，等，等一下！"
2000109-65 = "我，我還沒做好心理準備……"
2000109-66 = "……唉。#n我，我知道了啦！"
2000109-67 = "……我做就是了。"
2000109-68 = "那麼，老師……"
2000109-70 = "……請躺下吧。"
2000109-73 = "― 這，這真的……能夠當作獎勵嗎……？[wa:3860] "
2000109-75 = "― 呃……不……果然……[wa:3620] "
2000109-78 = "― 害羞死了。但是，如果老師喜歡的話……[wa:4280] "
2000109-81 = "― 嗯？再用力一點……？我，我知道了。[wa:6000] "
2000109-84 = "― 老師喜歡的話……我也……可以。[wa:4160] "
2000109-87 = "― 啊啊！不，不要突然站起來！很危險的！[wa:2780] "
2000109-90 = "老師……真是個特別的人呢。"
2000109-91 = "但先說喔。"
2000109-92 = "在這間店裡做這種事……今天是最後一次了。"
2000109-93 = "……"
2000109-94 = "呵呵，別露出那麼失望的表情嘛。"
2000109-95 = "作為補償，那個……只要老師想要的話……就算不是在店裡面……"
2000109-98 = "我也會私下……為你服務的。"

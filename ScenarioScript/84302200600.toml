[translation]
84302200600-5 = "哇，還以為真的要出大事了！差點就被抓走了！"
84302200600-6 = "謝謝你，前輩！多虧有前輩才能得救！！"
84302200600-7 = "寧瑠前輩果然對我最好──"
84302200600-12 = "嗚啊！！"
84302200600-13 = "為，為什麼要打我！！！！"
84302200600-14 = "因為你做了欠扁的事。"
84302200600-15 = "咦──！？你知道我做了什麼嗎！？"
84302200600-16 = "擅闖資料中心。#n其他的我目前還不清楚。"
84302200600-17 = "反正肯定欠扁沒錯。"
84302200600-18 = "怎麼能這麼說呢……！！"
84302200600-19 = "所以咧，你到底來這種地方做什麼？#n這裡怎麼看都不是你這種傢伙該來的地方吧。"
84302200600-20 = "真是太過分了！！#n我明明也是研討會的一員，當然可以過來啊！？"
84302200600-21 = "可以是可以，但總不至於被警備無人機追趕吧。"
84302200600-22 = "不用看也知道，你八成是來篡改成績或戶頭裡的金額之類的……"
84302200600-26 = "……"
84302200600-27 = "還真被我說中了啊。"
84302200600-28 = "不，不行，前輩！#n請你千萬不要告訴優香前輩和乃愛前輩！！這次真的不行！！"
84302200600-29 = "要是被抓到我就真的死定了！你應該也不想看到後輩死掉吧！？#n絕對不可以去告狀！！"
84302200600-30 = "怕成這樣的話，一開始別做不就好了。"
84302200600-31 = "我，我也沒辦法啊！！#n誰叫優香前輩要求我「寫下這個月做過的每件事的悔過書」！"
84302200600-32 = "只要我刪掉資料庫裡面的紀錄來減少「做過的事」，要寫的悔過書也會變少……！#n這不是理所當然的嗎……！"
84302200600-37 = "嘎啊啊啊……！！怎麼又打我！！"
84302200600-38 = "我每次都覺得你的想法很奇葩。"
84302200600-39 = "嗚嗚……"
84302200600-40 = "那，那前輩你呢……！前輩也不應該出現在這裡吧！？"
84302200600-41 = "嘿嘿～！！對耶！仔細想想還有這個方法！#n前輩，我們來做個交易吧！！"
84302200600-42 = "要是前輩去告狀的話，我也會告你的狀！#n相對的，只要前輩沒去告狀，我就不會把前輩來過這裡的事說出去！！"
84302200600-43 = "怎麼樣？這個提議還挺不錯的吧！？"
84302200600-44 = "嘿，你打算跟我談條件啊。"
84302200600-48 = "可以啊，就這麼辦吧。"
84302200600-52 = "咦！？居然回答的這麼快！？沒關係嗎！？"
84302200600-53 = "管他有沒有關係，反正今天本來就不是來抓你的。#n我這邊還有重要的事情要做。"
84302200600-57 = "……等等。這麼說來還有這招呢。"
84302200600-58 = "喂，小雪。#n你剛才說想要修改資料對吧？"
84302200600-59 = "咦！？啊，是這樣沒錯……？"
84302200600-60 = "那真是太好了。#n所以你應該知道管理系統的主機是哪一台，也知道該怎麼駭入吧。"
84302200600-61 = "那當然……囉？"
84302200600-66 = "為……為什麼要靠近我……#n怎，怎麼了嗎……！？就算知道又怎樣！？"
84302200600-67 = "呵呵，其實也沒什麼啦。"
84302200600-72 = "……小雪。#n不，代號「白兔」。"
84302200600-73 = "要不要再跟我做一筆交易？"

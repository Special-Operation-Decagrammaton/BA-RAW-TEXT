[translation]
84302200600-5 = "Wow, that was a close one! I thought they were gonna catch me for sure!"
84302200600-6 = "Thank you, Neru! You saved me!!"
84302200600-7 = "You're the be—"
84302200600-12 = "Oww!!"
84302200600-13 = "Wh-Why'd you hit me?!"

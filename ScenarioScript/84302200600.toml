84302200600-29 = "They will literally kill me, for sure! You don't want your underclassman to die, do you? Please don't tell them!!"
84302200600-30 = "If the consequences are that bad, you shouldn't do it in the first place!"
84302200600-31 = "I-I couldn't help it!! Yuuka told me she'd make me write reflection papers on the things I've done this month!"

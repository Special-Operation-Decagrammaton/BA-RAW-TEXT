[translation]
84302200600-5 = "ว้าว นึกว่าจะเป็นเรื่องแล้วไง! เกือบโดนจับได้ซะแล้ว!"
84302200600-6 = "ขอบคุณนะคะรุ่นพี่! ฉันรอดมาได้เพราะรุ่นพี่เลยค่ะ!!"
84302200600-7 = "คนที่ช่วยฉันมีแต่รุ่นพี่เนรุ..."
84302200600-12 = "เฮือก!!"
84302200600-13 = "ตะ... ตีฉันทำไมคะ!!!!"
84302200600-14 = "ก็เธอทำเรื่องให้น่าตีไง"
84302200600-15 = "คะ!? รู้เหรอคะว่าฉันทำอะไรลงไป!?"
84302200600-16 = "เข้าไปในศูนย์ข้อมูลโดยไม่ได้รับอนุญาตไง ฉันก็รู้แค่นี้ละ"
84302200600-17 = "แต่มันก็เป็นเรื่องที่ต้องลงโทษอยู่ดี"
84302200600-18 = "พูดอะไรเหลวไหลแบบนั้นคะ...!!"
84302200600-19 = "ตกลงเธอคิดจะทำอะไร ถึงได้เข้ามาอยู่ในที่แบบนี้ห้ะ? เธอไม่น่าใช่เด็กที่จะมาทำงานในที่แบบนี้นะ"
84302200600-20 = "เกินไปแล้วนะคะ!! เห็นอย่างนี้ฉันก็เป็นสมาชิกเซมิน่านะคะ!? หมายความว่าฉันก็เข้ามาได้สิ!?"
84302200600-21 = "ถ้าเข้ามาได้ ก็ไม่น่าจะโดนโดรนรักษาความปลอดภัยไล่ตามขนาดนั้นไม่ใช่เหรอ?"
84302200600-22 = "จากที่ดูแล้ว ฉันเดาว่าเธอคงเข้ามาปลอมแปลงเกรดหรือไม่ก็เงินในบัญชีธนาคาร..."
84302200600-26 = "..."
84302200600-27 = "จริงอย่างที่ฉันคิดเรอะ?"
84302200600-28 = "มะ... ไม่ได้นะ ไม่ได้นะคะ รุ่นพี่! อย่าไปบอกรุ่นพี่ยูกะกับรุ่นพี่โนอาเลยนะคะ!! ครั้งนี้ไม่ได้จริงๆ ค่ะ!!"
84302200600-29 = "ครั้งนี้ถ้าถูกจับได้ฉันตายแน่ค่ะ รุ่นพี่คงไม่อยากเห็นรุ่นน้องคนนี้ตายใช่มั้ยคะ!? ห้ามเอาไปฟ้องเด็ดขาดเลยนะคะ!!"
84302200600-30 = "ถ้ากลัวขนาดนั้น แล้วทำไมถึงทำตั้งแต่แรกล่ะ?"
84302200600-31 = "กะ... ก็มันช่วยไม่ได้นี่คะ!! ก็รุ่นพี่ยูกะบอกว่า 'ฉันจะให้เธอเขียนหนังสือสำนึกผิดต่อเรื่องทั้งหมดที่ก่อ#nไว้ในเดือนนี้' นี่คะ!"
84302200600-32 = "ถ้าฉันเข้ามาลบบันทึกในฐานข้อมูล 'เรื่องที่ฉันก่อไว้' ก็จะน้อยลง แล้วหนังสือสำนึกผิดที่ต้องเขียนก็#nจะน้อยลงไปด้วย...! ฉันไม่มีทางเลือกอื่นแล้วค่ะ...!"
84302200600-37 = "อ๊ากกกก...!! มาตีกันอีกแล้ว!!"
84302200600-38 = "เธอน่ะตรรกะเพี้ยนสุดๆ เลย รู้ตัวบ้างหรือเปล่า?"
84302200600-39 = "อึก..."
84302200600-40 = "ละ... แล้วรุ่นพี่ล่ะ...! ทำไมรุ่นพี่ถึงมาอยู่ที่นี่คะ!? ที่นี่ก็ไม่ใช่ที่ที่รุ่นพี่ควรมาอยู่ไม่ใช่เหรอ!?"
84302200600-41 = "ฮิฮิ!! จริงด้วยนะ! พอมาคิดดู มันก็มีวิธีแบบนี้นี่นา! เรามาทำข้อตกลงกันเถอะค่ะรุ่นพี่!!"
84302200600-42 = "ถ้ารุ่นพี่ปากโป้ง ฉันก็จะปากโป้งด้วย! แต่ถ้ารุ่นพี่ไม่เอาเรื่องนี้ไปบอกใคร ฉันก็จะไม่บอกใครเหมือนกัน#nว่ารุ่นพี่มาที่นี่ค่ะ!!"
84302200600-43 = "ว่ายังล่ะคะ? ไม่เลวเลยใช่ม้า!? เป็นข้อเสนอที่ใช้ได้เลยใช่มั้ยคะ??"
84302200600-44 = "เฮอะ จะเล่นอย่างนี้เรอะ?"
84302200600-48 = "ก็ได้ งั้นก็เอาตามนั้น"
84302200600-52 = "หา!? ตอบทันทีเลยเหรอ!? แบบนี้ก็ได้เหรอคะ!?"
84302200600-53 = "ช่างมันเถอะ ยังไงวันนี้ฉันก็ไม่ได้มาเล่นงานเธออยู่แล้ว ฉันเองก็มีงานสำคัญอื่นที่ต้องทำน่ะ"
84302200600-57 = "เดี๋ยวนะ... พอมาคิดดู มันก็มีวิธีแบบนั้นด้วยนี่"
84302200600-58 = "นี่ โคยูกิ เมื่อกี้บอกว่าอยากแก้ไขข้อมูลใช่มั้ย?"
84302200600-59 = "คะ... คะ!? อ่า ค่ะ... ก็คง ประมาณ... นั้น..."
84302200600-60 = "งั้นก็ดีเลย งั้นเธอก็น่าจะรู้ใช่มั้ยว่าคอมพิวเตอร์เครื่องหลักที่จัดการระบบอยู่ตรงไหน? แล้วก็น่าจะแฮ็กได้ด้วย?"
84302200600-61 = "ก็... ทำได้ค่ะ"
84302200600-66 = "ทะ... ทำไมถึงเข้ามาใกล้กันแบบนี้ล่ะคะ... อะ... อะไรน่ะ?!? อะไรคะเนี่ย!?"
84302200600-67 = "ฮุฮุ ไม่ใช่เรื่องใหญ่อะไรหรอก"
84302200600-72 = "โคยูกิ... ไม่สิ คุณ <ชิโระอุซางิ>"
84302200600-73 = "เรามาทำข้อตกลงกันอีกข้อมั้ย?"

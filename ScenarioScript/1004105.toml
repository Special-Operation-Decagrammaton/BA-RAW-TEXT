[translation]
1004105-1 = "Tough to Clean"
1004105-2 = "..."
1004105-3 = "[s] \"Misaki, what happened?\""
1004105-4 = "Sorry. It's a long story..."
1004105-5 = "I haven't eaten for days...and got soaking wet in the rain."
1004105-6 = "Ugh..."
1004105-11 = "[ns] \"Misaki?!\""
1004105-12 = "I'm feeling a little under the weather..."
1004105-13 = "[s] \"You have more than a 'little' fever.\" "
1004105-15 = "...Where are we?"
1004105-16 = "[s] \"I rented an office for now.\""
1004105-17 = "..."
1004105-18 = "[s1] \"You haven't been eating and got soaked in the rain.\"\n[s2] \"No wonder you got sick. You have to rest now.\""
1004105-19 = "..."
1004105-20 = "..."
1004105-21 = "[s] \"I got you some dry clothes to change into.\""
1004105-23 = "[ns] \"There's food too. Rest, and eat when you can, Misaki.\""
1004105-24 = "...You're leaving?"
1004105-25 = "[s] \"Sorry, I have work.\""
1004105-26 = "Okay."
1004105-31 = "This is ridiculous. I don't care about my stupid body."
1004105-32 = "This meaningless vessel that always gets in my way."
1004105-33 = "I wish...I could run away from my body."
1004105-34 = "Why is the world like this?"
1004105-35 = "..."
1004105-36 = "I'm...lonely."
1004105-39 = "[ns] \"Misaki, I'm back.\""
1004105-41 = "[ns] \"Misaki? Where are you?\""
1004105-43 = "[ns3] \"Do I hear water...?\"\n[ns4] Open the door."
1004105-48 = "― ...Sensei? You're back.[wa:3200] "
1004105-50 = "― Did you forget something important?[wa:740] "
1004105-53 = "― Me?[wa:1540] "
1004105-55 = "― You were...worried about me?[wa:520] "
1004105-58 = "― To think[wa:1560] "
1004105-60 = "― you'd worry about such unimportant things..."
1004105-63 = "― You have a lot of time on your hands for an adult.[wa:350] "
1004105-66 = "― This cold, noisy world...[wa:1340] "
1004105-68 = "― and me."
1004105-71 = "―The rain never really[wa:10] "
1004105-73 = "― cleans anything.[wa:90] "
1004105-76 = "― I wish I could[wa:2040] "
1004105-78 = "― believe it was possible...[wa:1400] "
1004105-82 = "..."
1004105-83 = "I've been living without inspiration. "
1004105-84 = "I could live. Or die. Doesn't matter. I don't feel any of it."
1004105-85 = "But when I see you, Sensei..."
1004105-86 = "...I feel anger."
1004105-87 = "Almost unbearably so..."
1004105-88 = "I've never experienced it before."
1004105-89 = "...It's a strange feeling."
1004105-90 = "[s] \"R-Really?\""
1004105-91 = "...It's not your fault. You've done nothing but help me."
1004105-92 = "And when you were gone... I was..."
1004105-93 = "..."
1004105-94 = "Anyway, how are you?"
1004105-95 = "[s] \"I stopped by after work and got you medicine.\""
1004105-96 = "...I see. Okay."
1004105-97 = "[s] \"I got a sweet one to make it easier to take.\""
1004105-98 = "..."
1004105-99 = "What?"
1004105-100 = "Sweet syrup... Like kid's medicine?"
1004105-101 = "You think I'm a kid?"
1004105-102 = "[s] \"...I thought bitter medicine might be hard to take.\""
1004105-103 = "Do you think I can't swallow medicine? That I think it's hard?"
1004105-104 = "Explain yourself! Why would you think that?"
1004105-105 = "[s] \"Th-This is what the pharmacy recommended...\""
1004105-106 = "For a child?"
1004105-107 = "[s] \"W-Well...\""
1004105-109 = "Misaki grilled me angrily for a while before I managed to get her to take some medicine."

[translation]
1004105-1 = "就算無法變乾淨"
1004105-2 = "……"
1004105-3 = "[s]「美咲，沒事吧？」"
1004105-4 = "對不起，說來話長。"
1004105-5 = "我已經……一陣子沒吃東西了……"
1004105-6 = "唔……"
1004105-11 = "[ns]「美咲！？」"
1004105-12 = "身體，有點沉……頭好昏……"
1004105-13 = "[s]「……身體好燙。」"
1004105-15 = "……這裡是？"
1004105-16 = "[s]「是附近的旅館……抱歉，沒有其他更好的地方了。」"
1004105-17 = "……"
1004105-18 = "[s1]「別勉強了，你燒的很厲害呢……」\n[s2]「你應該是感冒了，現在先好好休息吧。」"
1004105-19 = "……"
1004105-20 = "……"
1004105-21 = "[s]「我把食物和換洗衣物放在這裡。」"
1004105-23 = "[ns]「好好休息，等吃得下的時候再吃吧。」"
1004105-24 = "……你要走了嗎？"
1004105-25 = "[s]「抱歉，我出去一下。要好好靜養唷。」"
1004105-26 = "……這樣啊。"
1004105-31 = "太愚蠢了……肉體明明只是個微不足道的東西……"
1004105-32 = "但我卻老是被肉體束縛……"
1004105-33 = "所以我才……一直希望能逃離這副肉體……"
1004105-34 = "這世界總是，用這種方式……讓我……"
1004105-35 = "……"
1004105-36 = "好寂寞。"
1004105-39 = "[ns]「我回來了。」"
1004105-41 = "[ns]「嗯？美咲……？你在哪裡……？」"
1004105-43 = "[ns3]「水聲……？」\n[ns4] 開門"
1004105-48 = "― ……老師？你回來啦？[wa:3720] "
1004105-50 = "― 難道，忘記重要的東西了嗎？[wa:1620] "
1004105-53 = "― ……我？[wa:1500] "
1004105-55 = "― 你說，擔心我……？[wa:1280] "
1004105-58 = "― 你竟然，[wa:1720] "
1004105-60 = "― 會在意這種雞毛蒜皮的小事……"
1004105-63 = "― 身為一個大人，你還真閒呢。[wa:1830] "
1004105-66 = "― 無論是這冰冷又紛擾的世界，[wa:1820] "
1004105-68 = "― 還是我。"
1004105-71 = "― ……不管下了多少雨，[wa:210] "
1004105-73 = "― 都無法洗乾淨。[wa:450] "
1004105-76 = "― 「沒有那種事」──[wa:2240] "
1004105-78 = "― 如果我能像笨蛋一樣，這麼相信的話……[wa:1720] "
1004105-82 = "……"
1004105-83 = "我活到現在……對什麼都不感興趣。"
1004105-84 = "是死是活都無所謂……都不會有特別的感覺。"
1004105-85 = "但是……老師。看到你……"
1004105-86 = "……我就會生氣。"
1004105-87 = "覺得非常煩躁……"
1004105-88 = "變得不認識我自己。"
1004105-89 = "……好奇怪。"
1004105-90 = "[s]「……這樣啊。」"
1004105-91 = "……一定是我不好。今天也是老師救了我。"
1004105-92 = "剛剛老師離開時……我突然，感覺好難受……"
1004105-93 = "……"
1004105-94 = "……所以，老師剛才去哪裡了？"
1004105-95 = "[s]「我去買了退燒藥。」"
1004105-96 = "……這樣啊。"
1004105-97 = "[s]「為了方便服用，我買了甜的。」"
1004105-98 = "……"
1004105-99 = "……咦？"
1004105-100 = "甜的……你是指兒童用的感冒糖漿？"
1004105-101 = "……為什麼？"
1004105-102 = "[s]「因為我想說你可能不敢吃苦的藥……」"
1004105-103 = "藥吞下肚不都一樣嗎？"
1004105-104 = "為什麼要在意那些小地方？"
1004105-105 = "[s]「一方面也是因為藥局這樣推薦……」"
1004105-106 = "就算被推薦，正常也不會買兒童用的吧……？"
1004105-107 = "[s]「對不起……」"
1004105-109 = "（之後也被美咲追問好了一陣子，幸好還是成功讓他吃下了藥）"

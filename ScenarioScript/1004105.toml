[translation]
1004105-1 = "สิ่งที่ชำระล้างไม่ออก"
1004105-2 = "..."
1004105-3 = "[s] \"มิซากิ เกิดอะไรขึ้นเหรอ?\""
1004105-4 = "โทษทีคุณครู เรื่องมันยาวน่ะ..."
1004105-5 = "ฉันไม่ได้กินอะไรมาหลายวัน... แล้วก็ตากฝน..."
1004105-6 = "อือ..."
1004105-11 = "[ns] \"มิซากิ?!\""
1004105-12 = "อาการมันไม่ดีขึ้น..."
1004105-13 = "[s] \"ตัวร้อนมากเลยนะ...\" "
1004105-15 = "ที่นี่คือ..."
1004105-16 = "[s] \"สำนักงานที่อยู่ใกล้ๆ น่ะ ครูยืมห้องเขาใช้\""
1004105-17 = "..."
1004105-18 = "[s1] \"อดข้าว ตากฝน แถมยังไม่สบายอีก\"\n[s2] \"ตอนนี้ก็พักผ่อนก่อนเถอะ\""
1004105-19 = "..."
1004105-20 = "..."
1004105-21 = "[s] \"ครูวางชุดสำหรับเปลี่ยนแล้วก็ของกินไว้ตรงนี้นะ\""
1004105-23 = "[ns] \"พักผ่อนก่อน ถ้าลุกมากินไหวก็ค่อยกินนะ มิซากิ\""
1004105-24 = "จะไปแล้วเหรอ?"
1004105-25 = "[s] \"อืม ครูมีธุระต้องไปทำน่ะ\""
1004105-26 = "เข้าใจแล้ว..."
1004105-31 = "ไม่ตลกเลยนะ... ร่างกายนี่ไม่มีประโยชน์เอาซะเลย..."
1004105-32 = "ไม่ว่าเมื่อไรก็ต้องหยุดชะงักเพราะเรื่องนี้เสมอ..."
1004105-33 = "ไม่ว่าเมื่อไร... ฉันก็อยากหนีไปจากร่างกายแบบนี้..."
1004105-34 = "โลกใบนี้น่ะ... ไม่ว่าเมื่อไรมันก็... ทำให้ฉัน..."
1004105-35 = "..."
1004105-36 = "เจ็บปวด..."
1004105-39 = "[ns] \"มิซากิ ครูกลับมาแล้ว\""
1004105-41 = "[ns] \"มิซากิ...? อยู่ไหนน่ะ?\""
1004105-43 = "[ns3] \"เสียงน้ำ...?\"\n[ns4] เปิดประตู"
1004105-48 = "― คุณครู กลับมาแล้วสินะ[wa:3280] "
1004105-50 = "― ลืมของสำคัญอะไรไว้รึไง?[wa:1220] "
1004105-53 = "― ฉันเหรอ...?[wa:1220] "
1004105-55 = "― เป็นห่วง... ฉันงั้นเหรอ?[wa:680] "
1004105-58 = "― คุณครูเนี่ย...[wa:1320] "
1004105-60 = "― คุณครูมีเวลาใส่ใจเรื่องไม่เป็นเรื่องแบบนี้ด้วยเหรอ"
1004105-63 = "― คงจะว่างมากล่ะสิ? ทั้งที่เป็นผู้ใหญ่แท้ๆ...[wa:630] "
1004105-66 = "― ทั้งโลกที่เย็นชา น่าหนวกหู...[wa:1180] "
1004105-68 = "― และตัวฉันเอง..."
1004105-71 = "― ต่อให้ฝนตกลงมาชำระล้าง [wa:10] "
1004105-73 = "― ก็ไม่มีทางใสสะอาดขึ้นหรอก [wa:10] "
1004105-76 = "― แต่ถ้าฉันหลอกตัวเอง...[wa:1720] "
1004105-78 = "― ให้เชื่อว่ามันไม่ใช่... แบบนั้นได้ละก็...[wa:800] "
1004105-82 = "..."
1004105-83 = "ฉันน่ะ... มีชีวิตอยู่มาโดยไม่ได้ใส่ใจอะไร "
1004105-84 = "ไม่ว่าจะอยู่หรือตาย... ก็ไม่มีอะไรสำคัญ เพราะฉันไม่รู้สึกอะไรกับเรื่องพวกนั้นแล้ว..."
1004105-85 = "แต่ว่าคุณครู... พอเห็นคุณครูแล้ว..."
1004105-86 = "ฉันก็รู้สึกโกรธขึ้นมา"
1004105-87 = "โกรธมากๆ เลย"
1004105-88 = "ไม่รู้ว่าเพราะอะไร"
1004105-89 = "และรู้สึกแปลกๆ..."
1004105-90 = "[s] \"งะ...งั้นเหรอ...?\""
1004105-91 = "ไม่หรอก เพราะฉันไม่ดีเองต่างหาก วันนี้คุณครูก็ช่วยฉันไว้อีกแล้วนี่นา"
1004105-92 = "พอคุณครูไม่อยู่... มันก็เหมือนจะทนไม่ไหว..."
1004105-93 = "..."
1004105-94 = "ว่าแต่ว่าคุณครูไปไหนมาเหรอ?"
1004105-95 = "[s] \"ครูไปซื้อยาลดไข้มาน่ะ\""
1004105-96 = "งั้นเหรอ... อื้อ"
1004105-97 = "[s] \"ครูซื้อแบบน้ำมาให้ จะได้กินง่ายๆ\""
1004105-98 = "..."
1004105-99 = "ยังไงนะ...?"
1004105-100 = "รสหวานนี่... ยาน้ำสำหรับเด็กงั้นเหรอ?"
1004105-101 = "ทำไมล่ะ?"
1004105-102 = "[s] \"ครูคิดว่ามิซากิอาจจะกินยาขมๆ ไม่เก่ง...\""
1004105-103 = "ทำไมล่ะ? พวกยาก็แค่กินๆ แล้วก็กลืนลงไปเหมือนกันหมดไม่ใช่รึไง?"
1004105-104 = "ทำไมต้องมาสนใจเรื่องพวกนั้นด้วย"
1004105-105 = "[s] \"ทะ...ที่ร้านยาแนะนำให้ ก็เลยซื้ออันนี้มา...\""
1004105-106 = "แต่ว่ามันเป็นของเด็กนะ...?"
1004105-107 = "[s] \"นะ...นี่...\""
1004105-109 = "(หลังจากนั้นคุณครูก็ถูกมิซากิซักไซ้อยู่พักใหญ่ ก่อนจะหาช่องทางปลีกตัวหนีออกมาได้)"

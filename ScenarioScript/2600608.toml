[translation]
2600608-1 = "In Search of Clouds"
2600608-2 = "Kivotos Subway Station"
2600608-5 = "Nodoka was walking with a large telescope on her back."
2600608-6 = "[s] \"Hello, Nodoka.\""
2600608-8 = "Oh! Hello, Sensei. Are you on your way to work?"
2600608-9 = "The weather is so nice today. If I go up somewhere high on a day like this, I'd be able to see everything!"
2600608-10 = "Red Winter Academy isn't on this route?"
2600608-11 = "Ahaha... Yes, you're right. Actually, I wasn't going to the academy. I was going to a station past the mountains to see the clouds."
2600608-12 = "When I woke up in the morning and looked up at the eastern sky, I saw a beautiful cloud hanging on the mountainside."
2600608-13 = "I thought the view would be prettier from the top of the mountain, so I was on my way over there with my telescope."
2600608-14 = "[s] \"Isn't that telescope heavy?\""
2600608-15 = "This one?"
2600608-16 = "Of course it's heavy, but I can't fully admire the beautiful scenery without it."
2600608-17 = "As long as I can see grand views with the telescope, the weight of it isn't a concern."
2600608-18 = "Sensei, would you like to go with me to see the clouds?"
2600608-19 = "Oh, are you too busy with work at Schale?"
2600608-20 = "Well, I guess there's nothing I can do about that!"
2600608-21 = "Instead, I'll feast my eyes on all the beautiful sights I can see!"
2600608-22 = "[s] \"Would you like me to carry the telescope for you?\""
2600608-23 = "Oh, thank you, Sensei."
2600608-27 = "Now then, on to the station platform!"
2600608-29 = "I saw Nodoka off at the station platform and returned to Schale."

[translation]
2600608-1 = "為了尋找雲朵"
2600608-2 = "奇普托斯．地鐵車站內"
2600608-5 = "（和香背著巨大的望遠鏡走在路上）"
2600608-6 = "[s]「早安，和香。」"
2600608-8 = "啊，老師早安。你正要去上班嗎？"
2600608-9 = "今天天氣真好。在這種好天氣登上高處，一定可以看得很遠。"
2600608-10 = "你說這不是往赤冬聯邦學園的路？"
2600608-11 = "啊，是的。#n其實我今天沒有要去學園，我正要去山另一側的車站看雲。"
2600608-12 = "早上起床眺望東邊的天空，發現有一團漂亮的卷雲掛在山腰上。"
2600608-13 = "我覺得從山上看下去的話一定會更美，所以就帶著望遠鏡出發了。"
2600608-14 = "[s]「那個望遠鏡，不會很重嗎？」"
2600608-15 = "這個嗎？"
2600608-16 = "當然很重呀……#n但是如果沒有好的裝備，就沒辦法好好觀察難得的漂亮風景了。"
2600608-17 = "只要能看到漂亮風景，這點重量不算什麼。"
2600608-18 = "老師要跟我一起去看雲嗎？"
2600608-19 = "啊，夏萊還有很多工作要忙，抽不出時間嗎？"
2600608-20 = "雖然可惜，但也沒辦法呢……"
2600608-21 = "我會替老師把漂亮風景盡收眼底的！"
2600608-22 = "[s]「雖然只有一小段路，讓我幫你拿望遠鏡吧。」"
2600608-23 = "啊，謝謝老師。"
2600608-27 = "那就拜託你送我到月台了！"
2600608-29 = "（送和香到月台後，我便回去夏萊了）"

[translation]
2600608-1 = "การออกผจญภัยเพื่อตามหาก้อนเมฆ"
2600608-2 = "รถไฟใต้ดินในอาคารสถานีคิโวทอส"
2600608-5 = "โนโดกะกำลังเดินมาพร้อมกับแบกกล้องโทรทรรศน์ขนาดใหญ่มาด้วย"
2600608-6 = "[s] \"สวัสดีโนโดกะ\""
2600608-8 = "อ๊ะ สวัสดีค่ะคุณครู กำลังจะไปทำงานเหรอคะ?"
2600608-9 = "วันนี้อากาศดีจังนะคะ#nถ้าขึ้นไปบนที่สูงๆ ในวันแบบนี้ จะต้องมองเห็นไปได้ไกลมากๆ เลยค่ะ"
2600608-10 = "จะบอกว่ารถไฟสายนี้ไม่ใช่เส้นที่ไปที่สหภาพเรดวินเทอร์เหรอคะ?"
2600608-11 = "ฮ่าฮ่า... ใช่ค่ะ#nที่จริงวันนี้ฉันไม่ได้จะไปที่โรงเรียนค่ะ แต่จะไปสถานีที่อยู่ด้านหลังหลังภูเขาเพื่อไปดูก้อนเมฆค่ะ"
2600608-12 = "ตอนที่ตื่นมาแล้วมองท้องฟ้าทางด้านทิศตะวันออก ฉันก็เห็นกลุ่มก้อนเมฆสวยๆ อยู่ที่บริเวณภูเขาค่ะ"
2600608-13 = "ฉันคิดว่าถ้ามองลงมาจากยอดภูเขาน่าจะสวยกว่า เลยคิดว่าจะไปที่นั่นพร้อมกับกล้องโทรทรรศน์ค่ะ "
2600608-14 = "[s] \"กล้องโทรทรรศนั่นไม่หนักเหรอ?\""
2600608-15 = "กล้องโทรทรรศน์อันนี้เหรอคะ?"
2600608-16 = "ก็หนักอยู่ค่ะ แต่ว่า...#nถ้าไม่มีกล้องอันนี้ก็จะดูวิวสวยๆ ไม่ได้นี่คะ"
2600608-17 = "ถ้าได้มองภาพทิวทัศน์สวยๆ แล้วล่ะก็ ถึงจะหนักแค่ไหนก็ไม่เป็นไรค่ะ"
2600608-18 = "คุณครูอยากไปดูก้อนเมฆด้วยกันไหมคะ?"
2600608-19 = "อา... คุณครูกำลังยุ่งกับงานของชาเล่ต์จนปลีกตัวไปไหนไม่ได้เลยเหรอคะ?"
2600608-20 = "น่าเสียดายจัง ช่วยไม่ได้นะคะ~"
2600608-21 = "ฉันจะมองภาพสวยๆ แล้วเก็บบรรยากาศมาภาพคุณครูเองค่ะ"
2600608-22 = "[s] \"กล้องโทรทรรศน์นั่น ให้ครูถือให้ก่อนมั้ย?\""
2600608-23 = "อ๊ะ ขอบคุณมากค่ะคุณครู"
2600608-27 = "ถ้างั้นช่วยถือไปจนถึงชานชาลาหน่อยนะคะ!"
2600608-29 = "คุณครูไปส่งโนโดกะถึงชานชาลาแล้วก็กลับไปที่ชาเล่ต์"

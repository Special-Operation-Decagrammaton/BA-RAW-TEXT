[translation]
2600608-1 = "#title;구름을 찾아 떠나는 모험"
2600608-2 = "#place;키보토스 역사 내 지하철"
2600608-3 = "1;노도카;01\n#1;ar\n#wait;1000"
2600608-4 = "1;노도카;01\n#1;m2\n#wait;1500"
2600608-5 = "#na;노도카가 커다란 망원경을 짊어진 채 걸어가고 있다."
2600608-6 = "[s] \"안녕, 노도카.\""
2600608-7 = "1;노도카;02\n#1;em;[반응]\n#wait;1000"
2600608-8 = "1;노도카;03;앗, 안녕하세요, 선생님. 출근하는 길이신가요?\n#1;m3"
2600608-9 = "#1;hide\n3;노도카;01;오늘은 날씨가 좋네요. 이런 날 높은 곳에 올라가면 분명 멀리 까지 보일 거예요."
2600608-10 = "3;노도카;02;붉은겨울 학원은 이쪽 노선이 아니라고요?\n#3;em;[?]"
2600608-11 = "3;노도카;01;아하하…… 네, 맞아요. #n사실은 학원에 가는 게 아니라 구름을 보러 산 너머의 역에 가는 길이었거든요."
2600608-12 = "3;노도카;03;아침에 일어나서 동쪽 하늘을 바라보니 예쁜 두루마리구름이 산 중턱에 걸려 있더라고요.\n#3;hophop\n#3;em;[반짝]"
2600608-13 = "3;노도카;01;산 위에서 내려다보면 더 예쁜 모양일 것 같아서, 망원경을 들고 나들이를 나온 참이었어요."
2600608-14 = "[s] \"그 망원경, 무겁지 않아?\""
2600608-15 = "3;노도카;02;망원경이요?\n#3;em;[?]"
2600608-16 = "3;노도카;01;물론 무겁긴 하지만…… #n장비가 없으면 예쁜 풍경을 관찰할 수 없으니까요."
2600608-17 = "3;노도카;03;예쁜 풍경을 볼 수 있다면 망원경의 무게쯤이야, 아무렇지도 않답니다.\n#3;em;[음표]\n#3;hophop"
2600608-18 = "3;노도카;01;선생님도 같이 구름을 보러 저와 함께 가실래요?"
2600608-19 = "3;노도카;02;아, 샬레의 일이 바빠서 자리를 비우실 수 없으시다고요?"
2600608-20 = "3;노도카;06;아쉽지만 어쩔 수 없네요~\n#3;stiff\n#3;em;[속상함]"
2600608-21 = "3;노도카;05;제가 대신 예쁜 광경들을 눈에 잔뜩 담아 올게요!\n#3;em;[!]"
2600608-22 = "[s] \"망원경, 잠깐 들어줄까?\""
2600608-23 = "3;노도카;03;앗, 감사합니다. 선생님.\n#3;em;[반응]"
2600608-24 = "3;노도카;03\n#3;d\n#wait;1000"
2600608-25 = "3;노도카;01\n#3;a\n#3;closeup\n#wait;1500"
2600608-26 = "3;노도카;01\n#3;greeting\n#3;closeup\n#wait;1700"
2600608-27 = "3;노도카;03;그럼 플랫폼까지만 부탁드릴게요!\n#3;closeup\n#3;em;[반짝]"
2600608-28 = "#all;hide"
2600608-29 = "#na;플랫폼까지 노도카를 배웅하고 샬레로 돌아왔다."

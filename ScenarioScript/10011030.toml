[translation]
10011030-1 = "ตอนที่ 3;ถ้าพูดถึงนินจาแล้วก็ต้อง องค์หญิง?"
10011030-2 = "(ก่อนการแสดงราว 30 นาที...)"
10011030-3 = "[ns] \"ตรงนี้คือด้านหลังเวทีสินะ\""
10011030-8 = "ตะ... ตื่นเต้นจังเลยนะคะ"
10011030-9 = "อิซุนะก็ใจเต้นตึกตักเลยค่ะ! หัวใจเต้นแรงมากค่ะ! "
10011030-11 = "อะฮะฮ่า ทำไมทุกคนต้องกังวลขนาดนั้นด้วยเล่า~ เราก็แค่มาช่วยการแสดง ไม่ใช่เรื่องยากอะไรสักหน่อย"
10011030-12 = "ยังไงก็เถอะ... ขะ... ขอบคุณนะคะคุณครูที่ ชะ... ช่วยให้เรามีโอกาสแบบนี้!"
10011030-13 = "ใช่ค่ะ! โอกาสที่นายท่านให้มา... พวกเราชมรมวิจัยศาสตร์นินจาจะทำให้เต็มที่ค่ะ!"
10011030-14 = "[s1] \"เพราะครูรับรองชมรมให้ไม่ได้ ก็เลยไปขอให้ชมรมหยินหยางช่วยน่ะ\"\n[s2] \"เพราะคิดว่ามิจิรุก็คงมีเหตุผลที่ไม่ยื่นใบสมัครเป็นชมรมทางการอยู่ละนะ\""
10011030-17 = "อึ่ก! เรื่องนั้น..."
10011030-18 = "กะ... ก็แค่..."
10011030-19 = "ยะ...ยังไงก็เถอะ! ในฐานะนินจา! เรามีหน้าที่ต้องทำให้งานนี้สำเร็จลุล่วง!"
10011030-20 = "อืม! เอาเป็นว่าที่สำคัญก็มีแค่นี้แหละ!"
10011030-21 = "คะ... ค่ะ! ฉันจะ พะ... พยายามให้เต็มที่ค่ะ! เหมือนกับนินจาที่ยอดเยี่ยม!"
10011030-22 = "อิซุนะก็จะไม่ย่อท้อค่ะ! นินนิน!"
10011030-23 = "[s] \"ทุกคนชอบนินจามากเลยสินะเนี่ย\""
10011030-24 = "เพิ่งจะมาพูดเอาตอนนี้เหรอ?! สำหรับชมรมวิจัยศาสตร์นินจาก็ต้องชอบนินจาอยู่แล้วสิ!"
10011030-25 = "ใช่แล้วค่ะ! ชอบมากเลยค่ะ! ฉันอยากเป็นนินจาที่ยอดเยี่ยมที่สุดค่ะ! "
10011030-26 = "ถะ... ถึงแม้ว่าฉันจะยัง มะ... ไม่ค่อยรู้เรื่องอะไรเกี่ยวกับนินจาก็เถอะค่ะ..."
10011030-27 = "แต่สึคุโยะก็คิดว่านินจาเป็นอะไรที่เท่และแปลกใหม่มาก ก็เลยชอบนินจาเหมือนกันนี่นา~"
10011030-28 = "ตอนนี้ข้าน้อยก็กำลังทำช่องสำหรับลงวิดีโอเพราะว่าอยากให้นินจาเป็นที่รู้จักไปทั่วคิโวทอสด้วย"
10011030-29 = "[s] \"มีความมุ่งมั่นแรงกล้าดีจังนะ\""
10011030-30 = "ถึงตอนนี้จะยังเป็นแค่ช่องเล็กๆ ที่มีผู้ติดตามไม่กี่คน แต่หากบอกเล่าเรื่องนินจาอย่างสม่ำเสมอละก็ สักวันจะต้องมีผู้ติดตามเยอะขึ้นแน่ๆ!"
10011030-31 = "ข้าน้อยไม่มีวันยอมแพ้เด็ดขาด! นั่นก็เพราะว่า..."
10011030-32 = "กะ... การไม่ยอมแพ้นั้น..."
10011030-33 = "มันเป็นกฏเหล็กของนินจายังไงละคะ~! นินนิน!"
10011030-34 = "[s] \"ว่าแต่การแสดง <องค์หญิงวาราคุ> ที่เรามาช่วยวันนี้คืออะไรเหรอ?\""
10011030-35 = "อ่า องค์หญิงวาราคุเป็น <กิจกรรมประสบการณ์เสมือนจริง> ที่น่าภาคภูมิใจของสวนสนุกภาพยนตร์น่ะ"
10011030-39 = "เนื้อเรื่องมีอยู่ว่า ท่านชิเซะเป็นองค์หญิงจากตระกูลที่สูงส่ง"
10011030-43 = "แต่อยู่มาวันหนึ่งเธอถูกพวกที่กระหายอำนาจลักพาตัวไป"
10011030-47 = "และตอนนั้นเองเหล่าผู้ชมที่กำลังดูการแสดงอยู่..."
10011030-55 = "หรือก็คือ 'พวกเรา' จะกลายเป็นตัวเอกที่จะต้องฝ่าฟันอุปสรรคมากมาย ตะลุยผ่านสิ่งกีดขวาง และการทดสอบในสวนสนุกภาพยนตร์เพื่อไปช่วยองค์หญิง"
10011030-57 = "ถึงเนื้อเรื่องจะเรียบง่าย แต่ถ้าได้ลองสนุกไปกับกิจกรรมและเอาชนะภารกิจที่ทางสหพันธ์ได้เตรียม#nเอาไว้จะรู้สึกราวกับเป็นตัวเอกจริงๆ..."
10011030-58 = "และระหว่างที่กำลังช่วยเหลือองค์หญิงก็จะมีการแข่งขันกันเองระหว่างผู้ชม พอแบบนั้นก็จะยิ่งทำให้น่า#nตื่นเต้นมากขึ้นด้วย"
10011030-59 = "เมื่อรวมความสนุกหลายอย่างไว้ด้วยกัน สวนสนุกภาพยนตร์ก็กลายเป็นกิจกรรมที่ได้รับความนิยม#nมากที่สุดเลยล่ะ"
10011030-60 = "ฉะ... ฉันเองก็เคยดูผ่านการออกอากาศไม่กี่ครั้งเท่านั้นค่ะ..."
10011030-61 = "ได้มีโอกาสมาช่วยงานจริงๆ แบบนี้ ต้องสนุกมากแน่เลยค่ะ!"
10011030-62 = "ฮุฮุ ถูกต้อง ถ้าบอกว่าไม่ตื่นเต้นที่ได้มาช่วยงานนี้ก็คงจะเป็นการโกหกละนะ..."
10011030-63 = "เดี๋ยวนะ?! พอมาคิดดูแล้วคนที่รับบทองค์หญิงในเรื่อง <องค์หญิงวาราคุ> คือท่านชิเซะไม่ใช่เหรอ?!"
10011030-64 = "ถ้าเรื่องนี้สำเร็จด้วยดีละก็... อาจจะได้ลายเซ็นของท่านชิเซะก็ได้ใช่มั้ย?!"
10011030-65 = "นะ... นี่! ทะ... ท่านหัวหน้า! ตั้งใจจะใช้ประโยชน์จากความสัมพันธ์กับชมรมหยินหยาง... เพื่อให้ได้ในสิ่งที่ต้องการอย่างนั้นเหรอคะ!"
10011030-66 = "สิ่งนี้มัน... นินจาตัวจริงเสียงจริง...! สะ... สมแล้วที่เป็นท่านหัวหน้า!"
10011030-67 = "...?"
10011030-68 = "คือ... คือว่า... สึคุโยะ นั่นคำชมใช่มั้ยน่ะ?"
10011030-69 = "ไม่สิๆ ถ้าได้ลายเซ็นท่านชิเซะยังไงก็ต้องรับไว้ละนะ!"
10011030-75 = "ฝ่ายสนับสนุนการดำเนินการทุกคน กรุณามาเตรียมตัวด้วยครับ"
10011030-76 = "อีกเดี๋ยวนักแสดงจากเรื่ององค์หญิงวาราคุก็จะมาถึงแล้วครับ"
10011030-80 = "[ns] \"อ่า คงจะเริ่มแล้วสินะ\""
10011030-86 = "ทะ... ท่านชิเซะ...! ขะ... ข้าน้อยเป็นแฟนคลับมานานแล้ว...!"
10011030-88 = "อื้อ~! เข้าใจแล้วละ! อิบูกิจะพยายามเต็มที่เลย~!"
10011030-90 = "...ฮืม?"
10011030-91 = "นะ... นักเรียนของเกเฮนน่าเหรอคะ...?"
10011030-93 = "ฮุฮุ ขอบคุณที่ให้ความร่วมมือในงานแลกเปลี่ยนระหว่างสถาบันครั้งนี้นะคะ ท่านประธานมาโคโตะ"
10011030-95 = "หึหึหึหึ!! ขอบคุณอะไรกันล่ะ!"
10011030-96 = "ฝ่ายที่ต้องขอบคุณน่าจะเป็นพวกเรามากกว่านะ! ชมรมหยินหยาง!"
10011030-97 = "งานแลกเปลี่ยนครั้งนี้ก็คงเป็นเครื่องพิสูจน์ให้เห็น ว่าสถาบันเกเฮนน่าเองก็เตรียมกิจกรรมที่น่า#nตื่นเต้น เร้าใจและสนุกสนาน..."
10011030-98 = "ใช่แล้ว! เป็นกิจกรรมที่จะช่วยสร้างแรงผลักดัน แรงกระตุ้น และความทรงจำที่ไม่มีวันลืมเลือนไปตลอด#nชีวิตเลยละ..."
10011030-99 = "ไม่ใช่ใครที่ไหน! ก็คือเราเอง! ท่านมาโคโตะยังไงล่ะ! หึหึหึหึ!!!"
10011030-100 = "อะฮะฮ่ะ... ถ้างั้นฉันมีความคิดดีๆ ที่น่าจะเพิ่มแรงกระตุ้นขึ้นได้อีกนะ"
10011030-101 = "ฮุฮุ อยากลองฟังดูหน่อยไหมล่ะคะ?"
10011030-102 = "โอ้วว?"
10011030-104 = "จะเปลี่ยนตัวเอกอย่างงั้นเหรอ?"
10011030-105 = "ไหนบอกว่าเป็นการแสดงที่สำคัญมาก จู่ๆ จะมาเปลี่ยนตามใจตัวเองแบบนี้ได้ยังไงกัน?"
10011030-106 = "เอ๊ะ? ให้อิบูกิเป็นองค์หญิงไม่ได้เหรอ...?"
10011030-107 = "อิบูกิ... ทำอะไรผิดหรือเปล่างะ?"
10011030-108 = "[s] \"คือว่าไม่ใช่ความผิดของอิบูกิหรอกนะ\""
10011030-115 = "อ๊ะ เอ๊ะ...?"
10011030-116 = "อ๊ะ อยู่ดีๆ ไฟก็...! หรือว่าศัตรูโจมตี...?!"
10011030-117 = "[s] \"เดี๋ยวสิ ทุกคนใจเย็นๆ นะ อาจจะไม่ใช่เรื่องใหญ่ก็ได้...\""
10011030-119 = "งือ..."
10011030-120 = "งือ...?"
10011030-121 = "งือ... ทำไมจู่ๆ ไฟก็ดับล่ะ? อิบูกิไม่ชอบแบบนี้เลย..."
10011030-122 = "อิบูกิทำอะไรผิดไปงั้นเหรอ? มองไม่เห็นใครเลย..."
10011030-123 = "รุ่นพี่อิโรฮะ... รุ่นพี่มาโคโตะ... ฮึก..."
10011030-125 = "(อ๊ะ ปะ... เป็นเรื่องแล้ว...!)"
10011030-126 = "(ถะ... ถ้าร้องไห้ขึ้นมาละก็ กะ... การแสดงต้องพังไม่เป็นท่าแน่เลย แล้วโอกาสอันมีค่าที่ได้มาก็จะ..!)"
10011030-127 = "(กะ... ก่อนอื่นต้องหาทางปลอบ...)"
10011030-129 = "ไม่เป็นไรนะ! แค่เกิดปัญหาทางเทคนิคเล็กน้อยน่ะ! ใช่มั้ยล่ะ ท่านอาจารย์?!"
10011030-130 = "[s] \"อ่า อื้อ ใช่แล้ว\""
10011030-131 = "ฮึ่ก... หือ...? ปัญหาเหรอ? "
10011030-132 = "ใช่แล้ว! และอีกอย่างก็มีพวกเรากับท่านอาจารย์อยู่ด้วย! ไม่ต้องกลัวนะ!"
10011030-133 = "อิบูกิรู้จักคุณครู... แต่ว่าพวกพี่สาว...? เป็นใครกันเหรอ?"
10011030-135 = "ค่ะ! อิซุนะและท่านสึคุโยะ! แล้วก็หัวหน้า! พวกเราทั้งสามคน!"
10011030-141 = "พวกเราคือสมาชิกชมรมวิจัยศาสตร์นินจาที่ฝันอยากเป็นสุดยอดนินจาค่ะ!"
10011030-143 = "นิน...? จา?"
10011030-144 = "ไม่สิ คือว่านินจา ยังไงดีล่ะ เหมือนเป็นการเปรียบเทียบน่ะ เพราะงั้น..."
10011030-145 = "โกหกเหรอ...?"
10011030-146 = "อ๊าก~! เอาอีกแล้วเหรอ...!"
10011030-147 = "ไม่ใช่ค่ะ! ไม่ได้โกหกนะคะ!"
10011030-151 = "พวกเราคือชมรมวิจัยศาสตร์นินจาที่ฝันอยากจะเป็นสุดยอดนินจาค่ะ! แล้วนินจาก็แข็งแกร่งกันมากเลยนะคะ!"
10011030-152 = "แล้วก็ไม่หวาดกลัวอะไรเลยด้วย นักเรียนจากเกเฮนน่า... ไม่สิ อิบูกิจัง"
10011030-153 = "ไม่ว่าจะเกิดอะไรขึ้น ชมรมวิจัยศาสตร์นินจาของพวกเรา..."
10011030-154 = "จะคอยปกป้ององค์หญิงอิบูกิจังเอง! ใช่มั้ยคะท่านหัวหน้า?"
10011030-155 = "[s] \"ปกตินินจาเนี่ยทำหน้าที่ปกป้ององค์หญิงเหรอ...?\""
10011030-157 = "พูดแบบนั้นเดี๋ยวก็ยุ่งยากกันไปใหญ่สิท่านอาจารย์! เรื่องนั้นน่ะมันต่างกันไปตามชิ้นงานนะ!"
10011030-158 = "... ฮะ... ฮึก... ฮือ..."
10011030-159 = "เดี๋ยวสิ! ตอนนี้ไม่ใช่เวลามาทำแบบนี้นะ ชะ... ใช่แล้ว! ข้าน้อยจะปกป้องเอง!"
10011030-160 = "ฮือ... ตะ... แต่ว่า"
10011030-161 = "อืม แค่พูดคงยังไม่พอสินะ เอายังไงดีล่ะ..."
10011030-165 = "อ๊ะ จริงด้วย!"
10011030-169 = "เอาละ! นี่! ถ้ายังกลัวอยู่ละก็เอานี่มั้ย!"
10011030-170 = "[s] \"...สินค้านินจาอันใหม่อีกแล้วเหรอ\""
10011030-178 = "ว้าว...!"
10011030-180 = "(เรียบร้อย! ได้ผลแล้ว!)"
10011030-183 = "นี่มันอะไรเหรอ? พี่สาว? อิบูกิสงสัยจัง!"
10011030-184 = "เป็นไงบ้าง?! เท่ใช่มั้ยล่ะ?"
10011030-185 = "ฮุฮุ... ได้ยินแล้วอย่าตกใจไปละ! นี่คือตัวเอกของ <คุณนินจานินเพโร่> คุณนินเพโร่!"
10011030-186 = "นินจาที่แข็งแกร่งที่สุดและสามารถเอาชนะพวกวายร้ายนินจาจอมปลอมได้ สุดยอดนินจาแห่งนินจา!"
10011030-187 = "อะฮะฮ่ะ! ประหลาดจัง! หน้าตาแปลกๆ นะ! ปีกนี่มันอะไรกัน? ดึงได้มั้ย?"
10011030-188 = "อะ... อ๊าก! ระวังหน่อยสิ! นั่นรุ่นลิมิเต็ดเอดิชั่นเลยนะ...!"
10011030-196 = "อ่ะแฮ่ม! เอาเถอะ... จะให้ยืมคุณนินเพโร่ไประหว่างการแสดงนี้แล้วกัน"
10011030-203 = "หากองค์หญิงตกอยู่ในอันตราย คุณนินเพโร่และพวกเราเหล่านินจา"
10011030-204 = "จะรีบไปช่วยทันที! เพราะงั้นไม่ต้องกลัวหรอกนะ! องค์หญิงน้อย!"
10011030-205 = "สัญญากับอิบูกิใช่มั้ย...?"
10011030-206 = "แน่นอนเลย! กฏเหล็กของนินจาข้อที่สาม!"
10011030-207 = "<นินจาน่ะ! จะต้องรักษาสัญญาเสมอโดยไม่มีข้อยกเว้น>"
10011030-208 = "[s] \"ตามนั้นแหละ ดีจังเลยนะอิบูกิ\""
10011030-209 = "อืม! เข้าใจแล้ว! ขอบคุณนะ! ทุกคน!"
10011030-210 = "ด้วยความยินดีค่ะ!"
10011030-211 = "แหะๆๆ..."
10011030-216 = "อ๊ะ ไฟมัน..."
10011030-218 = "โชคดีจัง น่าจะแก้ปัญหาเสร็จแล้วละค่ะ"
10011030-219 = "เห็นไหมล่ะ บอกแล้วว่าไม่มีเรื่องใหญ่อะไรหรอก"
10011030-224 = "ขออภัยในความไม่สะดวกด้วยครับ! ถ้าอย่างนั้นเชิญองค์หญิงมาได้เลยครับ!"
10011030-228 = "อ๊ะ! ท่านอิบูกิ! พยายามเข้านะคะ!"

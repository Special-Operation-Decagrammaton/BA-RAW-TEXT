[translation]
10011030-1 = "第3話;說到忍者就少不了公主？"
10011030-2 = "（在公演開始約30分鐘前……）"
10011030-3 = "[ns]「舞台的後方原來是這樣啊。」"
10011030-8 = "有，有點緊張……"
10011030-9 = "伊樹菜也相當緊張！胸口砰砰跳個不停！"
10011030-11 = "大家都太緊張了啦～沒那麼困難的，放輕鬆放輕鬆♪"
10011030-12 = "那個，老師……再次感謝你，給我們這個機會……！"
10011030-13 = "是呢，這也是多虧了主公！"
10011030-14 = "[s1]「畢竟我也不能擅自給你們社團的許可。」\n[s2]「三千留好像也是因為某些原因才沒能繳交申請書的……」"
10011030-17 = "唔……！這，這個……"
10011030-18 = "只，只是，因為……"
10011030-19 = "總，總之！只要在這裡以忍者的身分，讓他們見識我們帥氣的活躍表現就行了！"
10011030-20 = "暫時就是這樣而已！"
10011030-21 = "我，我也會加油的……！#n為了，成為一名，帥氣的忍者……！"
10011030-22 = "伊樹菜也不會輸的！是！"
10011030-23 = "[s]「大家真的很喜歡忍者呢。」"
10011030-24 = "哼哼，那當然囉！我們可是忍術研究部啊！"
10011030-25 = "伊樹菜也非常喜歡！因為想成為奇普托斯最強的忍者！"
10011030-26 = "雖，雖然，我對忍者，還不是很了解……"
10011030-27 = "沒問題的！因為忍者是最棒最酷最讚的存在，只要有時間和契機就會漸漸喜歡上的！"
10011030-28 = "我想要讓奇普托斯的所有人都了解什麼是忍者。經營影片頻道也是為了這個！"
10011030-29 = "[s]「原來是那種頻道啊。」"
10011030-30 = "現在雖然只是個訂閱人數不多的小頻道……#n但只要忍者的魅力能廣為人知，總有一天……！"
10011030-31 = "……嗯，我絕對不會放棄！要問為什麼的話！？"
10011030-32 = "那個，「決不放棄」……！"
10011030-33 = "「就是忍者的鐵則」！忍忍！"
10011030-34 = "[s]「話說《和樂公主》是什麼樣的表演呢？」"
10011030-35 = "和樂公主是電影村引以為傲的表演……或者說是「沉浸式活動」。"
10011030-39 = "知世大人是某個大家族的公主……"
10011030-43 = "某天被覬覦家族名聲的惡徒們綁架了。"
10011030-47 = "而前來觀看表演的所有觀眾──"
10011030-55 = "將成為主角，為了拯救公主而克服電影村各處的試煉，將公主解救出來──"
10011030-57 = "故事情節本身並不特別，自己身歷其境且充滿臨場感的體驗才是這場表演的賣點。"
10011030-58 = "此外，觀眾間為了拯救公主相互競爭的部分也相當火熱有趣。"
10011030-59 = "因為這種種要素，使它成為了電影村最有人氣的活動。"
10011030-60 = "我以前，只有在，影片之類的地方，看過……"
10011030-61 = "能在這裡幫忙真是非常光榮！"
10011030-62 = "說的也是。雖然只是來幫忙的，果然還是會感到很激動呢……"
10011030-63 = "呃，等等！？#n仔細想想，扮演《和樂公主》的公主的不就是知世大人嗎！？"
10011030-64 = "如果順利的話，說不定能拿到簽名……！？"
10011030-65 = "原來如此……！#n利用陰陽部相關人士的身分，將寶物弄到手……！"
10011030-66 = "這就是，忍者嗎……！#n真，真不愧是部長！"
10011030-67 = "……？"
10011030-68 = "月夜，那是稱讚嗎……？"
10011030-69 = "不，不過也不一定能成功就是了！#n畢竟任務第一，但如果有機會能拿到的話……"
10011030-75 = "各位工作人員，請做好準備。"
10011030-76 = "《和樂公主》很快就會抵達。"
10011030-80 = "[ns]「啊，也就是說知世快到了對吧。」"
10011030-86 = "先，先演練一下先演練一下……！#n知，知世大人，那個，我從很久以前就是你的粉絲了……！"
10011030-88 = "伊吹登場！！各位久等了～！"
10011030-90 = "……咦？"
10011030-91 = "格，格黑娜的學生……？"
10011030-93 = "唔呵呵……非常感謝您協助這次的交流會。真琴議長。"
10011030-95 = "嘻嘻嘻，這不算什麼！！"
10011030-96 = "反而是我該感謝你們啊，陰陽部！"
10011030-97 = "透過這次的交流會就能證明了吧……"
10011030-98 = "能將本就存在的表演變得錦上添花，足以舉辦能成為一輩子回憶的活動……"
10011030-99 = "擁有那股力量的……就是我真琴大人啊！嘻嘻嘻嘻！！！"
10011030-100 = "原來如此～那麼難得有這種機會，#n我有一個能讓那個證明變得更～華麗的點子，或許也能說是調味料吧。"
10011030-101 = "您想不想聽聽看呢？真琴議長？"
10011030-102 = "哦？"
10011030-104 = "嗯……也就是說本該由知世大人扮演的「和樂公主」換人了是嗎？"
10011030-105 = "明明說是非常重要的表演，這樣變更沒問題嗎……？"
10011030-106 = "咦？伊吹不能擔任公主嗎……？"
10011030-107 = "伊吹害很多事都白費了……？"
10011030-108 = "[s]「這不是伊吹的錯，沒事的。」"
10011030-115 = "哇，哇啊啊……？"
10011030-116 = "電燈突然……難道是敵襲……！？"
10011030-117 = "[s]「大家，沒事的。先冷靜下來。」"
10011030-119 = "唔……"
10011030-120 = "唔……？"
10011030-121 = "嗚……為什麼突然關燈呢……？"
10011030-122 = "是因為伊吹做錯事了嗎……？#n好可怕……什麼都看不到……"
10011030-123 = "伊呂波前輩……真琴前輩……嗚嗚……"
10011030-125 = "（哇哇……要是在這裡引起騷動的話……）"
10011030-126 = "（得來不易的機會就要……！）"
10011030-127 = "（總，總之得先想辦法安撫他才行……）"
10011030-129 = "沒，沒事的，放心吧！#n只是一點小意外而已！對吧，老師大人！？"
10011030-130 = "[s]「嗯，應該馬上就會恢復了才對。」"
10011030-131 = "嗚嗚……意外？"
10011030-132 = "沒錯！別擔心，我們和老師大人都會陪著你的！"
10011030-133 = "伊吹認識老師……#n不過姐姐們是誰呢？"
10011030-135 = "伊樹菜是伊樹菜，那位是月夜閣下！而另一位是部長！我們是三人組！"
10011030-141 = "名為忍術研究部！的說！"
10011030-143 = "忍……者？"
10011030-144 = "啊，這個，忍者只是一種比喻……！"
10011030-145 = "……所以是騙人的？"
10011030-146 = "呃，這個嘛，也不是這麼說……！"
10011030-147 = "不是騙人的……！"
10011030-151 = "我們是以成為最強忍者為目標的，忍術研究部……而且忍者是非常強的哦……！"
10011030-152 = "所以，不用擔心的。#n那個……是伊吹醬，對吧？"
10011030-153 = "不管發生什麼，我們忍術研究部……"
10011030-154 = "忍者一定會保護身為公主的伊吹的！#n對吧，部長？"
10011030-155 = "[s]「忍者本來是守護公主的存在嗎……？」"
10011030-157 = "老師大人，請別讓情況變得更複雜！#n那要視作品而定！"
10011030-158 = "嗚嗚……"
10011030-159 = "總，總之！我們會保護你的！"
10011030-160 = "真的嗎……？"
10011030-161 = "唔，也對，突然聽到這種話也沒辦法安心吧……唔嗯……"
10011030-165 = "對了！"
10011030-169 = "來！看看這個！"
10011030-170 = "[s]「是沒看過的忍者周邊……」"
10011030-178 = "……哇！"
10011030-180 = "（很好！讓他開心了……！）"
10011030-183 = "這是什麼呢？伊吹從來沒看過！"
10011030-184 = "怎麼樣？很帥氣吧？"
10011030-185 = "哼哼……聽了可別嚇到喔！#n這是《忍者忍佩洛》的主角，忍佩洛！"
10011030-186 = "是一名擊敗裏世界的冒牌忍者和壞人們的，忍者中的忍者哦！"
10011030-187 = "啊哈哈，長得好奇怪！#n啊，它有長翅膀，我可以拉拉看嗎？"
10011030-188 = "嗚哇啊！！#n這，這可是限定版，玩的時候要小心一點哦……！"
10011030-196 = "咳哼！#n……今天就把這個忍佩洛借給你。"
10011030-203 = "只要有忍佩洛跟我們在，無論面臨什麼樣的危機都不是問題！"
10011030-204 = "我們無論如何都會在公主遇到危機時去救你的！"
10011030-205 = "……可以和伊吹打勾勾嗎？"
10011030-206 = "當然！忍者鐵則其三！"
10011030-207 = "「所謂忍者，絕對會遵守許下的約定」！"
10011030-208 = "[s]「太好了呢，伊吹。」"
10011030-209 = "……嗯！謝謝你們！"
10011030-210 = "不客氣！"
10011030-211 = "耶，耶嘿嘿……"
10011030-216 = "啊，電燈……"
10011030-218 = "幸好很快就恢復了。"
10011030-219 = "我就說不是什麼大問題吧？"
10011030-224 = "讓各位久等了，剛才發生了一點問題……那麼請擔任公主的同學做好準備！#n表演即將開始！"
10011030-228 = "伊吹閣下，請加油哦！"
10011030-229 = "一路順風……！"
10011030-230 = "加油！"
10011030-232 = "嗯！忍者姐姐們，還有老師，伊吹要出發囉！"
10011030-236 = "太，太好了。"
10011030-237 = "幸，幸好總算是撐過去了……"
10011030-238 = "公演終於要開始了呢！"
10011030-239 = "嗯……要是公演能就這樣順利結束就好了……"
10011030-248 = "嗯？那一大群人是……和我們一樣是工作人員嗎？"
10011030-253 = "[ns]「不，他們是……！」"
10011030-258 = "計畫都記在腦袋裡了嗎？那麼開始行動吧。#n迅速前進，處理礙事之徒……上吧，「妖怪劇團．即興流派」！"
10011030-260 = "「「收到！！」」"
10011030-263 = "咦，咦咦……？部長，這是不是，不太妙……！？"
10011030-264 = "部長、主公，該怎麼辦……！？"
10011030-265 = "怎，怎麼回事！？突然間發生什麼事了！？"

1004702-64 = "(เนื้อหาที่เขียนอยู่ใต้หัวข้อสกู๊ปบทความก็คือ...)"
1004702-65 = "[ns5] \"พบกับแสงระยิบระยับในแบบผู้ใหญ่ของตัวเอง...\"\n[ns6] \"คู่มือเจาะลึกการออกจากเซฟโซนแล้วเติบโตขึ้นอีกขั้นในฤดูร้อน!?\""
1004702-68 = "อื้อ คุณครู วันหยุดฤดูร้อน ไปตามหาแสงระยิบระยับแบบผู้ใหญ่..."

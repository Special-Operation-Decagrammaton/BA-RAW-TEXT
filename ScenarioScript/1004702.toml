[translation]
1004702-1 = "Finding Sparkles"
1004702-2 = "On short notice, I got a call from Chise and went out to the beach."
1004702-6 = "[s] \"Oh, hello, Chise.\""
1004702-7 = "Hi, Sensei."
1004702-8 = "[s1] \"I came out because you called, but...\"\n[s2] \"Is everything okay, Chise?\""
1004702-11 = "It's..."
1004702-12 = "[s] \"It's...?\""
1004702-21 = "Do you know what it's about?"
1004702-25 = "[s] \"Uh...\""
1004702-26 = "Oh! I remember, Sensei."
1004702-27 = "Yes... It's about sparkles."
1004702-28 = "I need to find sparkles."
1004702-29 = "[s] \"Sparkles...?\""
1004702-30 = "I'm on summer vacation starting today."
1004702-31 = "I was thinking about what to do during my vacation."
1004702-32 = "I went online and searched, \"what to do during summer.\""
1004702-33 = "[s3] \"Oh, you search the Internet, too!\"\n[s4] \"You're such a planner!\""
1004702-36 = "Thank you for the compliment, Sensei."
1004702-37 = "So, online..."
1004702-38 = "I found this, Sensei."
1004702-39 = "Please look."
1004702-47 = "Look, Sensei. Here..."
1004702-55 = "[ns] \"W-Wait! Chise! I can't see anything when you push it that close to me...!\""
1004702-56 = "Oh. Oops."
1004702-60 = "Like this, then?"
1004702-62 = "I calmed Chise, who eagerly waved something in my face."
1004702-63 = "It was part of a featured summer article that was recently posted online."
1004702-64 = "The phrase under the title was..."
1004702-65 = "[ns5] \"'This summer, obtain your adult sparkles...'\"\n[ns6] \"What...What is this?\""
1004702-68 = "Yes. So, I'm going to find my adult sparkles."
1004702-69 = "It's sparkles! To grow!"
1004702-70 = "[s] \"Hey, wait, Chise?!\""
1004702-71 = "I didn't know what to do during a summer vacation."
1004702-72 = "I'm very excited for this."
1004702-73 = "It's a precious time of inspiration.  "
1004702-74 = "As a Yin-Yang Club member and haiku writer...aka haiker..."
1004702-75 = "I must always seek new ways to grow."
1004702-76 = "[s] \"I don't think 'haiker' is a real term...\""
1004702-77 = "Yes. It is. So, I found this on the internet."
1004702-78 = "If I find sparkles, I can grow!"
1004702-79 = "I trust their information."
1004702-80 = "So, I want to find my sparkles."
1004702-81 = "[s7] \"I'm proud of you for wanting to study during your vacation, but...!\"\n[s8] \"I don't think they're talking about what you think...\""
1004702-84 = "But, what?"
1004702-85 = "It's not?"
1004702-86 = "So, is it bad to find sparkles?"
1004702-90 = "I was looking forward to finding them with you..."
1004702-91 = "[s] \"Ugh!\""
1004702-93 = "[ns] \"I mean, if you want to find them, of course I'll help you!\""
1004702-94 = "Really? That makes me happy."
1004702-95 = "Okay, Sensei. We must go."
1004702-96 = "We have to find a lot of sparkles."
1004702-97 = "And then I can grow a lot, Sensei."
1004702-98 = "[s] \"Okay, let's help you level up.\""
1004702-99 = "How big will I grow, Sensei?"
1004702-100 = "As big as a tank?"
1004702-101 = "[s] \"As big as a tank... A bit of a stretch, but sure, let's try!\""
1004702-102 = "That was how Chise and I started to look for sparkles."
1004702-108 = "[ns] \"But, Chise, these sparkles, what exactly are you looking for?\""
1004702-109 = "Oh, so about that."
1004702-110 = "Sparkles are just things that sparkle."
1004702-111 = "So I have to find something that sparkles."
1004702-112 = "[s] \"That's a very straightforward answer, but it's confusing at the same time!\""
1004702-113 = "Sparkles that suit a summer beach..."
1004702-114 = "Or maybe sparkles that can only be found on the beach..."
1004702-115 = "Oh, look over there, Sensei. "
1004702-116 = "There's something sparkling on the beach."
1004702-120 = "[ns] \"W-Wait, Chise...!\""
1004702-125 = "The sparkling thing on the beach is..."
1004702-130 = "...a jellyfish?"
1004702-131 = "[s] \"Oh, Chise. That's a trash bag. I think it just caught the sunlight.\""
1004702-132 = "Oh. It is a trash bag."
1004702-133 = "But it was so sparkly!"
1004702-134 = "Hup!"
1004702-135 = "[s] \"Did you just put that in your bag?!\""
1004702-136 = "I can't leave it here. It might go into the ocean."
1004702-137 = "So, I'm taking the jellyfish."
1004702-138 = "Oh, Sensei, over there. "
1004702-139 = "There's another sparkling thing."
1004702-143 = "[ns] \"T-Take me with you, Chise!\""
1004702-149 = "The sparkly thing here is...a pebble?"
1004702-150 = "[s] \"Oh, that's an empty matcha ramune bottle someone threw out.\""
1004702-151 = "I see. This isn't a sparkle either."
1004702-152 = "Hup, hup! I'll take this too."
1004702-153 = "We have to keep going, Sensei."
1004702-154 = "We must find the sparkles."
1004702-161 = "Is this a shell?"
1004702-162 = "[s] \"Oh, I think that's a facial powder case someone threw away...\""
1004702-163 = "Hmm, I see!"
1004702-169 = "What about this? Seaweed?"
1004702-170 = "[s] \"Maybe it's washed-up drift netting?\""
1004702-174 = "Oh, Sensei, this is..."
1004702-175 = "What's this?"
1004702-180 = "...What's that?"
1004702-182 = "Looking for sparkles, Chise and I wandered aimlessly around the sandy beach."
1004702-183 = "We kept discovering and collecting things for some time."
1004702-185 = "We found a lot of things."
1004702-186 = "[s] \"There's a lot of garbage on the beach...\""
1004702-190 = "After going around the beach for three hours, we found the following items."
1004702-191 = "A used beverage bottle, a garbage bag, some cracked Blu-ray pieces, a pile of nets..."
1004702-192 = "A buoy that was tangled with seaweed and could have been mistaken for a drowned person, a crumpled plastic bottle, et cetera."
1004702-193 = "[s] \"Hmm, I feel like all we did today was clean up the beach...\""
1004702-195 = "Wow."
1004702-196 = "[s] \"Huh? What's wow, Chise?\""
1004702-197 = "The things we found as we went around the beach today..."
1004702-198 = "They were all sparkling."
1004702-199 = "Like the jellyfish bag, pebbles, corals, and shells."
1004702-200 = "The beach is full of sparkles."
1004702-201 = "[s] \"...I guess it is, if you look at it that way.\""
1004702-202 = "Hmm. But something is lacking."
1004702-203 = "When I close my eyes, I see them in my mind."
1004702-204 = "The sparkles I want to discover are different."
1004702-205 = "They're vague and hard to see..."
1004702-206 = "Why is that, Sensei?"
1004702-207 = "[s] \"I think only you have the answer to that.\""
1004702-208 = "..."
1004702-209 = "Still. I'm content. I got to look for sparkles with Sensei."
1004702-210 = "That's good enough for me..."
1004702-214 = "Oh, it's dinner time, Sensei. Let's head back."
1004702-215 = "[s] \"But what about your sparkles, Chise?\""
1004702-216 = "Oh, yeah..."
1004702-217 = "Well..."
1004702-218 = "If we haven't found them by now..."
1004702-219 = "...after going around here all day..."
1004702-220 = "I guess I can't grow as big as a tank."
1004702-221 = "[s] \"We still have a lot of summer left. It's okay.\""
1004702-222 = "Sensei? What do you mean?"
1004702-223 = "[s9] \"I'll help you until you find what you're after.\"\n[s10] \"I'll look for sparkles with you every day.\""
1004702-226 = "..."
1004702-227 = "...I see."
1004702-228 = "Until I find it..."
1004702-229 = "Ah."
1004702-233 = "[s] \"What's wrong, Chise?\""
1004702-234 = "Sensei, I just..."
1004702-235 = "...It's nothing."
1004702-237 = "You're right, as usual. There's still much vacation left. Summer days are long."
1004702-238 = "It's time for dinner."
1004702-239 = "Whoever gets back first..."
1004702-240 = "...is a tomato!"
1004702-241 = "[s] \"H-Huh? A tomato?! Why a tomato?!\""
1004702-246 = "We returned to the dorm, quietly walking down the beach at sunset."

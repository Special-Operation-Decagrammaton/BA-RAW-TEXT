[translation]
1004702-1 = "尋找閃亮"
1004702-2 = "（於是便來到海邊和知世會合）"
1004702-6 = "[ns] 「啊，知世。」"
1004702-7 = "老師～"
1004702-8 = "[s1] 「雖然我照你說的來了……」\n[s2] 「不過今天是要做什麼呢？」"
1004702-11 = "就是……"
1004702-12 = "[s] 「就是……？」"
1004702-21 = "是什麼呢～？"
1004702-25 = "[ns] 「……這樣啊。」"
1004702-26 = "……啊，想起來了。"
1004702-27 = "閃亮。"
1004702-28 = "要去尋找閃亮才行。"
1004702-29 = "[s] 「閃亮……？」"
1004702-30 = "我，從今天開始放暑假。"
1004702-31 = "然後，就在煩惱說要做什麼才好。"
1004702-32 = "所以我昨天在網路上搜尋了「夏天必做的事」。"
1004702-33 = "[s3] 「知世也會用網路啊。」\n[s4] 「原來如此，很有計畫性喔！」"
1004702-36 = "太好了，被誇獎了。"
1004702-37 = "嗯，然後呢。"
1004702-38 = "我找到了這種東西。"
1004702-39 = "也給老師看一下。"
1004702-47 = "就是這個，你看。有看到嗎？"
1004702-55 = "[ns] 「好近！知世，有點太近了！」"
1004702-56 = "是嗎？"
1004702-60 = "那大概這個距離？"
1004702-62 = "（將貼近到幾乎零距離的知世安撫好後）"
1004702-63 = "（映入眼簾的是一篇網路新聞）"
1004702-64 = "（新聞標題寫著……）"
1004702-65 = "[ns5] 「『這個夏天，尋找屬於自己的成熟光芒──」\n[ns6] 「脫胎換骨吧！夏季全解析攻略指南！』……？」"
1004702-68 = "嗯，所以我想在這個暑假期間找到閃亮……"
1004702-69 = "成長為真正的大人～"
1004702-70 = "[s] 「……原來如此？」"
1004702-71 = "難得能放暑假。"
1004702-72 = "我希望能好好利用……"
1004702-73 = "這麼珍貴的時間……"
1004702-74 = "身為陰陽部的成員，以及創作俳句的人……"
1004702-75 = "身為一名「俳客」，該如何獲得成長。"
1004702-76 = "[s] 「『俳客』唸起來怎麼感覺有點怪怪的……？」"
1004702-77 = "所以，我才找到了這個。"
1004702-78 = "只要找到閃亮，就能獲得成長……"
1004702-79 = "那麼，我一定要找到它。"
1004702-80 = "所以我想去尋找，屬於我自己的閃亮。"
1004702-81 = "[s7] 「原來如此。有上進心是好事……」\n[s8] 「不過我覺得這篇報導說的是不一樣的東西呢……」"
1004702-84 = "……？"
1004702-85 = "不一樣？"
1004702-86 = "不能去找閃亮嗎？"
1004702-90 = "我還很期待，能和老師一起尋找呢……"
1004702-91 = "[s] 「呃……！」"
1004702-93 = "[ns] 「別放棄，如果知世想尋找的話，我也會幫助你的……！」"
1004702-94 = "太好了～"
1004702-95 = "那我們走吧，老師。"
1004702-96 = "我們要努力尋找閃亮……"
1004702-97 = "然後脫去一切，成長為大人～"
1004702-98 = "[s] 「那個，還是不要說『脫』之類的話會比較好……」"
1004702-99 = "如果老師和我兩個人……"
1004702-100 = "能成長得像戰車一樣就好了～"
1004702-101 = "[s] 「戰車……雖然我是不知道能不能變成戰車，但總之加油吧！」"
1004702-102 = "（就這樣，和知世開始了尋找閃亮的旅程）"
1004702-108 = "[ns] 「話說回來，知世，你想找的『閃亮』具體來說是什麼呢？」"
1004702-109 = "啊，就是～……"
1004702-110 = "閃閃發亮的東西吧。"
1004702-111 = "所以，我們要找會閃閃發亮的東西。"
1004702-112 = "[s] 「好像懂了又好像不懂……！」"
1004702-113 = "適合夏日海邊的閃亮……"
1004702-114 = "只有現在才能發現的閃亮……"
1004702-115 = "啊，你看那個，老師。"
1004702-116 = "那邊，有個亮亮的東西。"
1004702-120 = "[ns] 「等，等等，知世……！」"
1004702-125 = "在閃閃發光耶……"
1004702-130 = "……這是，水母先生？"
1004702-131 = "[s] 「仔細一看是個垃圾袋呢。可能是因為反射了陽光，所以看起來亮亮的。」"
1004702-132 = "這樣啊……"
1004702-133 = "垃圾袋也能這麼閃閃發亮呀。"
1004702-134 = "嘿咻。"
1004702-135 = "[s] 「那個，你要帶回去啊？」"
1004702-136 = "要是放著它不管，說不定又會漂到海上。"
1004702-137 = "所以，我要把這個閃亮的袋子水母先生帶回去。"
1004702-138 = "啊，老師，那裡。"
1004702-139 = "又有閃亮的東西了。"
1004702-143 = "[ns] 「知世！太快了！等等我！」"
1004702-149 = "有些閃閃發亮的……鵝卵石？"
1004702-150 = "[s] 「這是……『抹茶彈珠汽水』的瓶子？」"
1004702-151 = "這樣啊～"
1004702-152 = "這個也帶回去……嘿咻。"
1004702-153 = "去找下一個吧，老師。"
1004702-154 = "出發尋找閃亮～"
1004702-161 = "這是，貝殼先生？"
1004702-162 = "[s] 「應該是用完的粉餅盒……？」"
1004702-163 = "這樣啊～"
1004702-169 = "這個呢？海帶？"
1004702-170 = "[s] 「這個，應該是被沖上岸的漁網……」"
1004702-174 = "老師，那這個呢？"
1004702-175 = "這個呢？"
1004702-180 = "……這是什麼？"
1004702-182 = "（之後也和知世在沙灘上徘徊，尋找著閃亮）"
1004702-183 = "（也收集了很多東西）"
1004702-185 = "找到了好多東西唷～"
1004702-186 = "[s] 「就是說啊，雖然大部分都是垃圾……」"
1004702-190 = "（和知世一起尋找約3個小時後發現了這些東西……）"
1004702-191 = "（抹茶彈珠汽水的瓶子、垃圾袋、裂開的藍光光碟、網子……）"
1004702-192 = "（棄置的保特瓶、被海帶纏住的浮標……）"
1004702-193 = "[s] 「……把海灘清理得很不錯呢。」"
1004702-195 = "……真厲害。"
1004702-196 = "[s] 「厲害……？」"
1004702-197 = "今天一整天蒐集的東西……"
1004702-198 = "全都閃閃發亮。"
1004702-199 = "就像是水母、鵝卵石、珊瑚礁、貝殼。"
1004702-200 = "大海是如此閃閃發亮呢。"
1004702-201 = "[s] 「……確實是這樣沒錯。」"
1004702-202 = "不過，還不夠。"
1004702-203 = "只要閉上眼睛，就會有東西浮現出來……"
1004702-204 = "一直在尋找的閃亮……"
1004702-205 = "不過還很模糊，看不太清楚……"
1004702-206 = "老師覺得是什麼呢？"
1004702-207 = "[s] 「嗯……是什麼呢……」"
1004702-208 = "……"
1004702-209 = "不過，光是老師願意陪我一起尋找。"
1004702-210 = "光是這樣，我──"
1004702-214 = "……啊，吃飯時間到了。差不多也該回去了，老師。"
1004702-215 = "[s] 「『我』後面接什麼讓人很在意耶！？」"
1004702-216 = "嗯……"
1004702-217 = "啊，對了……"
1004702-218 = "既然跟老師找了一整天都沒有找到……"
1004702-219 = "是不是代表……"
1004702-220 = "……我果然沒辦法成為戰車呢？"
1004702-221 = "[s] 「……別擔心，暑假才剛開始呢。」"
1004702-222 = "老師？"
1004702-223 = "[s9] 「在你找到想找的東西之前，我會一直陪你。」\n[s10] 「所以，不用擔心。」"
1004702-226 = "……"
1004702-227 = "……是嗎。"
1004702-228 = "之後也能跟老師一起……"
1004702-229 = "啊。"
1004702-233 = "[ns] 「知世？」"
1004702-234 = "老師，我剛剛……"
1004702-235 = "……不，什麼都沒有。"
1004702-237 = "嗯，暑假才剛剛開始……走吧，老師。"
1004702-238 = "回家囉～"
1004702-239 = "來比賽吧，老師。"
1004702-240 = "先回去的人是番茄。"
1004702-241 = "[s] 「番茄！！？！？！？！？」"
1004702-246 = "（於是便和知世一起，從晚霞壟罩的海邊漫步返回住處）"

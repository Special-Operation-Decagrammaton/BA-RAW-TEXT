[translation]
2001303-1 = "วิธีการแฮ็กที่ดีที่สุด"
2001303-2 = "เขตศูนย์กลางใกล้ๆ เขตธุรกิจที่ 1"
2001303-3 = "อ้าว คุณครู กำลังรออยู่เลย"
2001303-4 = "ขอบคุณนะที่มาหาทั้งๆ ที่น่าจะกำลังยุ่งอยู่แท้ๆ"
2001303-5 = "ถ้าคุณครูอยู่ด้วยก็น่าจะทำงานได้ง่ายกว่าเดิมแน่นอน"
2001303-6 = "[s1] \"งานของเวอริทัสงั้นเหรอ กังวลนิดหน่อยแฮะ\"\n[s2] \"ครูจะทำได้ดีมั้ยนะ...?\""
2001303-7 = "ทำไมถึงกังวลขนาดนั้นล่ะคุณครู"
2001303-8 = "ทำไมถึงกังวลขนาดนั้นล่ะคุณครู"
2001303-9 = "เมื่อกี้ก็บอกไปนี่แล้วว่าแค่คุณครูมาอยู่ข้างๆ ก็พอแล้ว"
2001303-10 = "ลูกค้าในวันนี้ก็คือบริษัท IT ที่อยู่ในตึกสูงแห่งนี้น่ะ"
2001303-11 = "เห็นว่าเพิ่งจะย้ายเซิร์ฟเวอร์เมื่อไม่นานมานี้ ทำให้ระบบรักษาความปลอดภัยอ่อนแอลง แต่ว่าประธานเป็นคนหัวดื้อก็เลยไม่ไว้ใจที่จะฝากข้อมูลไว้ที่นักเรียน..."
2001303-12 = "[s3] \"งั้นเราจะบุกเข้าไปได้ยังไง?\"\n[s4] \"เราต้องมุดพัดลมระบายอากาศเข้าไปเหรอ?\""
2001303-13 = "หืม? หมายความว่ายังไง ก็ต้องเข้าไปทางประตูหน้าน่ะสิ"
2001303-14 = "หืม? หมายความว่ายังไง ก็ต้องเข้าไปทางประตูหน้าน่ะสิ"
2001303-15 = "ถ้าจะเล่นเป็นสปายก็เอาไว้คราวหน้าแล้วกัน การซื้อขายกันในวันนี้มันสำคัญมากนะ"
2001303-20 = "ฉันคากามิ จิฮิโระ จากโรงเรียนวิทย์มิลเลเนียมที่ติดต่อมาเมื่อตอนเช้าค่ะ"
2001303-21 = "อยากจะให้คำปรึกษาเบื้องต้นเรื่องความปลอดภัยของเซิร์ฟเวอร์น่ะค่ะ"
2001303-22 = "เข้ามาสิ..."
2001303-23 = "ถ้างั้นจะเริ่มงานแล้วละนะ..."
2001303-24 = "อ้อ บอกเผื่อไว้ก่อนนะ คุณครูไม่ต้องพูดหรือทำอะไรทั้งนั้น แค่ทำเป็นเห็นด้วยกับคำพูดของฉัน#nเป็นครั้งคราวก็พอแล้ว"
2001303-25 = "เอาล่ะ งั้นไปกันเลยมั้ย?"
2001303-31 = "ก็หมายความว่า...ข้อมูลของบริษัทเรากำลังตกอยู่ในอันตรายงั้นเหรอ?"
2001303-32 = "ค่ะ ดูเหมือนว่าตอนนี้เซิร์ฟเวอร์ที่บริษัทของคุณติดตั้งใหม่จะใช้โปรแกรมตรวจสอบไวรัส#nที่พวกแฮ็กเกอร์ทำลายได้อย่างสมบูรณ์แล้ว"
2001303-33 = "ถ้ายังเป็นแบบนี้อาจจะถูกสวมรอยได้ และข้อมูลที่หมุนเวียนในบริษัททั้งหมดรวมไปถึงข้อมูล#nของหุ้นส่วนก็จะตกไปอยู่ไปอยู่ในมือแฮ็กเกอร์"
2001303-34 = "หมายถึงเอกสารลับสุดยอดเกี่ยวกับโปรเจกต์ใหม่ล่าสุดที่กำลังเตรียมการอยู่ด้วยน่ะค่ะ..."
2001303-35 = "ถ้าเป็นแบบนั้นก็คงยุ่งยากน่าดู... เสริมความปลอดภัยให้เซิร์ฟเวอร์จะดีกว่า"
2001303-36 = "ว่าแต่ทำไมต้องมอบหมายให้ชมรมเวอริทัสของพวกเธอดูแลเซิร์ฟเวอร์ให้ด้วยล่ะ"
2001303-37 = "ไม่ว่าจะทำเป็นเก่งแค่ไหน สุดท้ายก็เป็นแค่ชมรมของมือสมัครเล่นที่บริหารโดยเด็กนักเรียนไม่ใช่เหรอ?"
2001303-38 = "พวกเราไม่ใช่มือสมัครเล่นค่ะ เวอริทัสได้นำเสนอทางออกด้านความปลอดภัยที่แม่นยำให้กับบริษัท IT หลายแห่งในคิโวทอสเลยนะคะ"
2001303-39 = "รวมไปถึงคุณครูจากชาเล่ต์ท่านนี้... ก็รับคำปรึกษาด้านการรักษาความปลอดภัยจากพวกเราอยู่เช่นกัน"
2001303-40 = "[s5] \"ถะ... ถูกต้องแล้วล่ะ!\"\n[s6] \"ทางออกด้านการรักษาความปลอดภัยของจิฮิโระยอดเยี่ยมที่สุดเลย!\""
2001303-41 = "ชาเล่ต์งั้นเหรอ... หมายถึงกลุ่มสืบสวนที่มอบอำนาจเหนือกฎหมายให้พวกนักเรียนใช่มั้ย?"
2001303-42 = "ชาเล่ต์งั้นเหรอ... หมายถึงกลุ่มสืบสวนที่มอบอำนาจเหนือกฎหมายให้พวกนักเรียนใช่มั้ย?"
2001303-43 = "ถ้าสามารถเสนอทางออกด้านการรักษาความปลอดภัยให้กับชาเล่ต์ที่มีการแลกเปลี่ยนข้อมูลกับ#nโรงเรียนต่างๆ มากมายขนาดนั้นก็คงจะมีความสามารถจริงสินะ"
2001303-44 = "แต่เราจะไว้ใจให้เด็กที่อายุยังน้อยดูแลข้อมูลที่สำคัญของบริษัทเราได้ยังไง..."
2001303-45 = "[s7] \"จิฮิโระเป็นเด็กที่มีความสามารถแน่นอน\"\n[s8] \"ถ้าเกิดปัญหาขึ้น ครูจะรับผิดชอบเอง\""
2001303-50 = "งั้นเหรอ..."
2001303-51 = "ก็ดี ถ้าอย่างนั้นก็มาทำสัญญา 1 ปีไปก่อน"
2001303-52 = "ถ้ามีแค่นักเรียนมาละก็ ไม่ว่าจะพูดอะไรฉันก็คงไม่เชื่อ..."
2001303-53 = "แต่พอเห็นหน้าคุณครูที่มาด้วยกัน จะเชื่อใจและยอมฝากให้ดูแลก็ได้"
2001303-54 = "ขอบคุณค่ะท่านประธาน ฉันจะรับผิดชอบความปลอดภัยของบริษัทคุณอย่างสุดความสามารถเลยค่ะ"
2001303-56 = "เฮ้อ จัดการได้สักที"
2001303-57 = "ได้คุณครูช่วยไว้ก็เลยคลายกังวลไปได้หน่อยเลยล่ะ"
2001303-58 = "[s] \"เมื่อกี้ทำอะไรน่ะ...?”"
2001303-59 = "หืม? ก็บอกไปตั้งแต่แรกแล้วไงว่าจะติดตั้งแบ็กดอร์ก่อน"
2001303-60 = "แบ็กดอร์ก็คือทางลัดที่สร้างขึ้นเพื่อให้ใช้งานได้สะดวกขึ้น... เป็นหนึ่งในเทคนิคการแฮ็กขั้นพื้นฐาน#nสำหรับแทรกผ่านไฟร์วอลล์ที่แฮ็กยากๆ"
2001303-61 = "หรือก็คือการที่มีคุณครูอยู่ด้วยในครั้งนี้มันจะช่วยทำลาย ‘อคติ’ ของประธานที่เป็นเหมือนแบ็กดอร์#nที่ช่วยเลี่ยงไฟร์วอลล์ ต้องขอบคุณคุณครูเลยนะที่ทำให้การแฮ็กสำเร็จไปได้ด้วยดี"
2001303-62 = "[s] \"แต่ว่านี่ไม่ใช่การแฮ็กไม่ใช่เหรอ...?\""
2001303-63 = "ไม่เลย นี่ก็เป็นวิธีการแฮ็กเหมือนกัน"
2001303-64 = "ถ้าการใช้วิธีต่างๆ ทำลายระบบการรักษาความปลอดภัยของฝ่ายตรงข้ามเพื่อให้ได้ข้อมูลที่#nต้องการมาเรียกว่าการแฮ็ก..."
2001303-65 = "วิธีการแฮ็กที่สุดยอดที่สุดก็คือการสร้างความไว้วางใจผ่านการสนทนายังไงล่ะ"
2001303-66 = "ถึงแม้ว่าสมาชิกส่วนใหญ่ของเวอริทัสจะไม่ชำนาญในการใช้วิธีนี้ก็เถอะนะ..."
2001303-67 = "แต่ก็เอาเถอะ วันนี้ขอบใจมากนะ เจอกันรอบหน้าเดี๋ยวฉันเลี้ยงกาแฟให้คุณครูเอง"

[translation]
2001303-1 = "駭入的方法"
2001303-2 = "中央區．第1業務地區附近"
2001303-3 = "啊，老師。"
2001303-4 = "謝謝你百忙之中抽空過來。"
2001303-5 = "有老師在的話，一定可以順利進行的。"
2001303-6 = "[s1] 「竟然要幫貝里塔斯的忙，有點緊張呢。」\n[s2] 「我能做到嗎……」"
2001303-7 = "不用那麼擔心也沒關係的。"
2001303-8 = "不用那麼擔心也沒關係的。"
2001303-9 = "我在MomoTalk上也說過了吧，只要待在我旁邊就行了。"
2001303-10 = "那麼，交易的對象就是在這棟高樓裡的IT企業。"
2001303-11 = "最近因為一口氣擴張了很多伺服器，各種地方都有所改變的關係，很擔心安全方面的問題……卻又因為社長很頑固，不願意把資料放心地交給學生。"
2001303-12 = "[s3] 「原來如此。話說我們該從哪裡侵入呢？」\n[s4] 「像是通風口之類的？」"
2001303-13 = "咦，你在說什麼？普通地從正門進去就好。"
2001303-14 = "咦，你在說什麼？普通地從正門進去就好。"
2001303-15 = "今天沒有間諜遊戲。只是要普通地進行重要的交易而已。"
2001303-20 = "再次向您自我介紹，我是千年科學學園的各務千尋。"
2001303-21 = "想和您談談關於貴公司的安全系統。"
2001303-22 = "……進來吧。"
2001303-23 = "……那麼就開始吧。"
2001303-24 = "啊，以防萬一先告訴你，老師不需要特別說什麼話沒關係。"
2001303-25 = "只要適當地回答我說的話就OK了。那我們走吧。"
2001303-31 = "……所以，我們公司的數據很危險是嗎？"
2001303-32 = "是的。這次貴公司新設置的伺服器所使用的是舊型的防毒軟體。是已經被駭客們完全破解的軟體。"
2001303-33 = "如果在這個狀態下受到[ruby=spoofing attack]欺騙攻擊[/ruby]或是其他攻擊的話，公司內的情報不用說，就連合作公司的情報都會遭到洩漏的吧。"
2001303-34 = "……當然，還有您現在正在準備的「新專案」的機密資料。"
2001303-35 = "……呼呣，那真是傷腦筋。確實應該採取一些對策呢。"
2001303-36 = "但是儘管如此，也沒道理要交給你們貝里塔斯吧？"
2001303-37 = "雖然聽說你們很優秀，但也不過就是學校裡的社團罷了，也就是不成熟。"
2001303-38 = "要說道理的話，就算是學生也不代表能力不成熟。貝里塔斯已經為奇普托斯的眾多IT企業工作，在安全層面有一定程度的成果。"
2001303-39 = "而這位夏萊的老師也是顧客之一。"
2001303-40 = "[s5] 「沒，沒錯！」\n[s6] 「貝里塔斯的解決方案非常完美哦。」"
2001303-41 = "夏萊……那個聯邦學生會長給予了超越法規權限的那個聯邦搜查部嗎？"
2001303-42 = "夏萊……那個聯邦學生會長給予了超越法規權限的那個聯邦搜查部嗎？"
2001303-43 = "……確實，我聽說夏萊和複數的學校有很深的交流，既然如此，你們的實力應該無庸置疑。"
2001303-44 = "但是，你還這麼年輕，這麼輕易就將機密情報的管理交給你們實在有點……"
2001303-45 = "[s7] 「千尋的能力沒問題的。」\n[s8] 「雖然算不上是什麼保證，不過萬一出了什麼事的話我會負責的。」"
2001303-50 = "……這樣啊。"
2001303-51 = "好，那就先簽一年的合約吧。"
2001303-52 = "如果只有你這種學生來的話，我應該是不會點頭的……"
2001303-53 = "不過看在夏萊的老師對你們的信賴上就交給你們吧。"
2001303-54 = "非常感謝您。我們會負起責任誠實處理的。"
2001303-56 = "呼，解決一件事了。"
2001303-57 = "託你的福，短時間內不用擔心資金方面的問題了。"
2001303-58 = "[s] 「結果千尋有用什麼手段嗎……？」"
2001303-59 = "嗯？跟一開始就說的一樣呀，「後門」。"
2001303-60 = "也就是和正規入口不同的「後門」。是在繞過防火牆之類的東西時會使用的基本駭客技術之一。"
2001303-61 = "而這次就是讓老師成為了「後門」，為了要繞過那位社長名為「偏見」的防火牆。"
2001303-62 = "[s] 「原來如此。不過這好像不是駭入吧……？」"
2001303-63 = "不，這毫無疑問是駭入的一種哦。"
2001303-64 = "所謂的駭入，就是「為了獲得想要的情報，利用各種方法使對方的[ruby=警戒]安全系統[/ruby]無效，並加以解除」。"
2001303-65 = "如果能透過對話建立信賴關係的話，那就是單純明快且最棒的駭入了。不需要依賴不正當的方法或是電子的手段。"
2001303-66 = "雖然實際上貝里塔斯的成員幾乎都做不到這點，總是往奇怪的方向成長，讓我有點困擾就是了……"
2001303-67 = "正因如此我才需要成為榜樣才行呢。總之今天謝謝老師，下次見面時我請你喝杯咖啡吧。"

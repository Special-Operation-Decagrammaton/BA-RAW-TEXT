[translation]
2001303-1 = "Ultimate Hacking Techniques"
2001303-2 = "Near Business District 1"
2001303-3 = "There you are, Sensei. I've been waiting."
2001303-4 = "I know you're busy. Thanks for coming today."
2001303-5 = "We can get to work now that you're here."
2001303-6 = "[s1] \"I'm kind of nervous.\"\n[s2] \"Do you think I can do it?\""
2001303-7 = "Why are you so worried, Sensei?"
2001303-8 = "Why are you so worried, Sensei?"
2001303-9 = "As I said before, all you have to do is stand there."
2001303-10 = "I'll be dealing with an IT company that's located in this high-rise building."
2001303-11 = "Their security has weakened due to a recent server expansion, but their president is stubborn and doesn't want to entrust their data to a student like myself."
2001303-12 = "[s3] \"So what's the infiltration plan?\"\n[s4] \"How many vents will we crawl through?\""
2001303-13 = "What are you talking about? We'll be going through the front entrance."
2001303-14 = "What are you talking about? We'll be going through the front entrance."
2001303-15 = "We're not living out some kind of spy novel. This is serious business."
2001303-20 = "Hello? I'm Kagami Chihiro of Millennium Science School.#nWe spoke this morning."
2001303-21 = "I'm here for a consultation regarding your company's server security."
2001303-22 = "Please. Come in."
2001303-23 = "Thank you."
2001303-24 = "Remember what I said, Sensei. You don't have to do or say anything.#nJust play along and follow my lead."
2001303-25 = "Let's go inside."
2001303-31 = "So, you believe our company's data is in danger?"
2001303-32 = "Yes. The new server you installed seems to be using an old antivirus program that's already been cracked by hackers."
2001303-33 = "You're vulnerable to spoofing, and all company and partner data could fall into the hands of bad actors."
2001303-34 = "Including confidential information regarding new projects."
2001303-35 = "We can't have that. You're right—I should have the server's security enhanced."
2001303-36 = "But why should I entrust Veritas with my server management?"
2001303-37 = "You may project an outward appearance of professionalism,#nbut Veritas is still just an amateur club run by students."
2001303-38 = "We may be students, but we're hardly amateurs. Veritas has offered complete security solutions for several IT companies in Kivotos."
2001303-39 = "That includes for Sensei here, the advisor of Schale."
2001303-40 = "[s5] \"Th-That's right!\"\n[s6] \"Chihiro's security solutions are the best!\""
2001303-41 = "Schale? You mean the investigative club that has extrajudicial authority as granted by the General Student Council president?"
2001303-42 = "Schale? You mean the investigative club that has extrajudicial authority as granted by the General Student Council president?"
2001303-43 = "To my understanding, Schale exchanges data with several academies.#nIf even Schale trusts Veritas, than I suppose my company can as well."
2001303-44 = "Still, I would prefer if anyone but a student was the one in charge.#nI don't know how I feel about entrusting my data to children."
2001303-45 = "[s7] \"I can vouch for Chihiro's skills.\"\n[s8] \"I'll take responsibility if anything happens.\""
2001303-50 = "Interesting."
2001303-51 = "All right, then. How about we sign a one-year contract?"
2001303-52 = "I wouldn't have agreed to this if I was only negotiating with students..."
2001303-53 = "...but I'll trust the word of this Sensei person."
2001303-54 = "Thank you, Mr. President. We'll treat your company's data with the utmost care."
2001303-56 = "Phew. I'm glad that's over."
2001303-57 = "We shouldn't have to worry about our finances for a while now."
2001303-58 = "[s] \"What was that all about?\""
2001303-59 = "Hmm? I told you: I was going to install a back door before getting to work."
2001303-60 = "In programming terms, a back door is a shortcut created for convenience.#nIt's a basic hacking technique that allows you to bypass even the most impenetrable firewall with ease."
2001303-61 = "I'm saying your presence was the back door I needed to bypass the president's firewall—his prejudice against working with students.#nI was able to complete my hack thanks to you, so to speak."
2001303-62 = "[s] \"That doesn't count as hacking, does it?\""
2001303-63 = "Of course it does. It's a completely legitimate technique."
2001303-64 = "Hacking is all about disabling the opponent's security in any way you can to procure the desired information."
2001303-65 = "Building trust through conversation is one of the best hacking techniques you can have."
2001303-66 = "Now if only I could get that through to the other members of Veritas as well..."
2001303-67 = "Regardless, thanks for your help today. I'll treat you to coffee next time."

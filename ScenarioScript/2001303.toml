[translation]
2001303-1 = "#title;최고의 해킹 수법"
2001303-2 = "#place;중앙구 제1 업무지구 인근"
2001303-3 = "3;치히로;02;아, 선생님. 기다리고 있었어.\n#3;a\n#3;em;[반응]"
2001303-4 = "3;치히로;01;여러모로 바쁠 텐데 오늘은 시간을 내줘서 고마워."
2001303-5 = "3;치히로;01;선생님이 있으면 분명 수월하게 작업을 진행할 수 있을 거야."
2001303-6 = "[s1] \"베리타스의 작업이라니 긴장되네.\"\n[s2] \"……내가 잘할 수 있을까?\""
2001303-7 = "3;치히로;03;뭘 그렇게 걱정하는 거야, 선생님.\n#3;em;[재잘]"
2001303-8 = "3;치히로;03;뭘 그렇게 걱정하는 거야, 선생님.\n#3;em;[재잘]"
2001303-9 = "3;치히로;03;아까도 말했잖아. 선생님은 그냥 옆에 서 있기만 해도 괜찮다고."
2001303-10 = "3;치히로;01;오늘 거래를 할 상대는 이 고층 빌딩에 입주해 있는 IT 기업이야."
2001303-11 = "3;치히로;99;최근 서버를 증설해서 분명 보안이 취약해졌을 텐데, 사장이 고집이 센 사람이라 그런지 학생 상대로는 데이터를 믿고 맡기려 하지 않아서…….\n#3;em;[속상함]\n#3;stiff"
2001303-12 = "[s3] \"그래서 어디로 침입하면 되는 거야?\"\n[s4] \"환풍구를 타고 잠입해야 하나?\""
2001303-13 = "3;치히로;02;응? 그게 무슨 소리야. 정문으로 들어가야지.\n#3;em;[?]"
2001303-14 = "3;치히로;02;응? 그게 무슨 소리야. 정문으로 들어가야지.\n#3;em;[?]"
2001303-15 = "3;치히로;01;스파이 놀이라면 나중에 하도록 해. 오늘 거래는 정말 중요하니까."
2001303-16 = "#all;hide"
2001303-17 = "#wait;1800"
2001303-18 = "4;치히로;01\n#4;a\n#wait;1300"
2001303-19 = "4;치히로;01\n#4;greeting\n#wait;1500"
2001303-20 = "4;치히로;02;오전에 연락 드렸던 밀레니엄 사이언스 스쿨의 카가미 치히로입니다.\n#4;em;[반응]"
2001303-21 = "4;치히로;01;귀사의 서버 보안에 대해 가볍게 컨설팅을 해 드리고 싶어서요."
2001303-22 = "#na;까다로운 사장;……들어오게."
2001303-23 = "4;치히로;99;……그럼 지금부터 작업을 시작해볼까.\n#4;em;…"
2001303-24 = "4;치히로;02;아, 혹시나 해서 하는 말인데 선생님이 나서서 무언가 말을 하거나 움직일 필요는 없어. 그냥 가끔 내 말에 적당히 맞장구만 쳐주면 돼."
2001303-25 = "4;치히로;03;자, 그럼 가볼까?"
2001303-26 = "#st;[0,0];instant;1;"
2001303-27 = "#clearST"
2001303-28 = "4;치히로;01\n#4;dr\n#wait;1500"
2001303-29 = "#all;hide"
2001303-30 = "#wait;1500"
2001303-31 = "1;치히로;01\n5;까다로운 사장;00;……그래서, 우리 회사의 데이터가 위험하다는 말인가?\n#1;a\n#5;a\n#5;em;…"
2001303-32 = "1;치히로;02;네. 이번에 귀사가 새롭게 설치하신 서버는 이미 해커들 사이에서 완벽히 파훼된 구형 백신을 사용하는 모양이더군요.\n#1;em;[반응]"
2001303-33 = "1;치히로;99;이 상태에서 스푸핑을 시도하면 회사에서 오가는 모든 정보는 물론이고, 협력사의 정보까지 해커의 손에 들어가게 될 겁니다."
2001303-34 = "1;치히로;05;……이번에 새로이 준비하고 계신 신규 프로젝트의 극비 문서까지 말이지요."
2001303-35 = "5;까다로운 사장;00;……그건 곤란한 일이군. 확실히 서버의 보안을 강화하는 게 좋겠어.\n#5;em;…"
2001303-36 = "5;까다로운 사장;00;하지만 왜 하필이면 그 서버 관리를 너희 베리타스에게 맡겨야 한다는 거지?"
2001303-37 = "5;까다로운 사장;00;아무리 뛰어난 척해도 너희는 결국 학생들이 운영하는 아마추어 동아리 집단이잖아?\n#5;em;[?]"
2001303-38 = "1;치히로;99;저희는 아마추어가 아닙니다. 베리타스는 이미 키보토스의 여러 IT 기업에 확실한 보안 솔루션을 제공해 드리고 있지요."
2001303-39 = "1;치히로;03;그리고 여기 계신 샬레의 선생님께서도…… 저희 베리타스의 보안 솔루션을 받고 계십니다.\n#1;em;[반짝]\n#1;greeting"
2001303-40 = "[s5] \"마, 맞습니다!\"\n[s6] \"치히로의 보안 솔루션은 최고였어요!\""
2001303-41 = "5;까다로운 사장;00;샬레라면…… 총학생회장이 초법적인 권한을 부여했다는 그 수사 집단?\n#5;em;…\n#5;m3\n#1;dl"
2001303-42 = "5;까다로운 사장;00;샬레라면…… 총학생회장이 초법적인 권한을 부여했다는 그 수사 집단?\n#5;em;…\n#5;m3\n#1;dl"
2001303-43 = "5;까다로운 사장;00;여러 학교와 정보를 교환하는 그 샬레에게 보안 솔루션을 제공할 정도라면 실력만큼은 확실하겠군."
2001303-44 = "5;까다로운 사장;00;하지만 나이도 많지 않은 이런 어린애들에게 우리 기업의 중요한 정보들을 맡겨야 한다니…….\n#5;stiff\n#5;em;[속상함]"
2001303-45 = "[s7] \"치히로의 실력은 확실합니다.\"\n[s8] \"문제가 생긴다면 제가 보증하겠습니다.\""
2001303-46 = "#st;[0,0];instant;1;"
2001303-47 = "#st;[0,0];instant;1;"
2001303-48 = "#clearST"
2001303-49 = "5;까다로운 사장;00\n#5;em;…\n#wait;2500"
2001303-50 = "5;까다로운 사장;00;……그런가."
2001303-51 = "5;까다로운 사장;00;좋아. 그럼 1년간의 계약을 우선 체결하도록 하지.\n#5;em;[반응]"
2001303-52 = "5;까다로운 사장;00;학생들만 찾아왔다면 무슨 말을 해도 믿지 않았겠지만……."
2001303-53 = "5;까다로운 사장;00;옆에 있는 그 선생의 얼굴을 보고 믿고 맡기는 거야."
2001303-54 = "1;치히로;03;감사합니다, 사장님. 귀사의 보안을 성실히 책임지겠습니다.\n#1;em;[반짝]\n#1;ar\n#5;m5"
2001303-55 = "#all;hide"
2001303-56 = "3;치히로;99;하아. 이걸로 한 건 해결인가.\n#3;em;…\n#3;a"
2001303-57 = "3;치히로;03;덕분에 당분간은 자금 걱정에서 조금은 자유로워지겠네."
2001303-58 = "[s] \"……방금 무얼 한 거야?\""
2001303-59 = "3;치히로;02;응? 처음부터 말했잖아. 작업에 앞서 백도어를 심을 거라고.\n#3;em;[?]"
2001303-60 = "3;치히로;01;백도어란 편의를 위해 만들어 둔 지름길…… 난공불락의 방화벽을 쉽게 우회할 수 있는 기초적인 해킹 기법의 하나야."
2001303-61 = "3;치히로;03;즉, 이번에는 선생님의 존재가 사장의 '편견'이라는 방화벽을 우회하는 백도어가 되어주었던 거지. 덕분에 무사히 해킹을 완료할 수 있었어."
2001303-62 = "[s] \"이건 해킹이 아니지 않나……?\""
2001303-63 = "3;치히로;02;아니, 이것도 엄연한 해킹 수법인걸.\n#3;em;[반응]"
2001303-64 = "3;치히로;99;원하는 정보를 얻어내기 위해 다양한 방법으로 상대의 [ruby=경계]보안[/ruby]을 무력화하는 것을 해킹이라고 한다면……"
2001303-65 = "3;치히로;01;최고의 해킹 수법은 대화를 통해 신뢰를 구축하는 것일 테니까."
2001303-66 = "3;치히로;03;정작 베리타스의 멤버 대부분은 이 수법에 능숙하지 못하지만…….\n#fontsize;50\n#3;em;…"
2001303-67 = "3;치히로;03;여하튼 오늘은 고마웠어. 다음번에 만나면 커피 한 잔 살게.\n#3;greeting"

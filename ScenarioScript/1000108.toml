[translation]
1000108-1 = "บาดแผล"
1000108-2 = "ห้องพยาบาล"
1000108-3 = "บอกแล้วไงว่าไม่ได้บาดเจ็บอะไรมากน่ะ..."
1000108-4 = "ไม่ต้องเป็นห่วงหรอก"
1000108-5 = "[s] \"แต่เลือดยังไหลไม่หยุดเลยนะ?\""
1000108-6 = "ถ้ามีแผลถลอกก็ต้องเลือดออกเป็นธรรมดา ปล่อยไว้เดี๋ยวมันก็หายเองได้นั่นแหละ"
1000108-7 = "ไม่ได้ถามเรื่องนี้งั้นเหรอ? ถ้างั้น..."
1000108-8 = "[s] \"เอมิต้องให้ความสำคัญกับร่างกายตัวเองมากกว่านี้สิ\""
1000108-9 = "แต่ว่าถ้ามัวแต่ระวังตัวตอนต่อสู้ละก็ ประสิทธิภาพการต่อสู้ก็จะลดลงนะ"
1000108-10 = "ถ้าจะต่อสู้ให้มีประสิทธิภาพสูงสุด เราต้องไม่กลัวการได้รับบาดแผลและบุกไปให้ถึงที่สุด..."
1000108-11 = "โอ๊ย!\n"
1000108-12 = "จู่ๆ ทายาฆ่าเชื้อโดยไม่บอกไม่กล่าวแบบนี้ ฉันตกใจนะคุณครู"
1000108-13 = "ถ้าไม่ฆ่าเชื้อให้ดีจะทำให้แผลจะติดเชื้องั้นเหรอ? เรื่องนั้นฉันก็รู้อยู่เหมือนกันแหละ..."
1000108-14 = "[s] ทำแผลให้กับเอมิต่อ"
1000108-19 = "รู้สึกเขินจัง..."
1000108-20 = "[s] \"ต่อไปครูจะคอยทำแผลให้เอง แต่ครูก็ไม่อยากให้เอมิบาดเจ็บหรอกนะ\""
1000108-21 = "รู้แล้วละ ต่อไปฉันจะระวังตัวให้มากขึ้นนะ"
1000108-24 = "(ถ้ามีคุณครูคอยทำแผลให้แบบนี้ละก็... ถึงต้องเจ็บตัวบ่อยๆ ก็คงไม่แย่เท่าไหร่หรอก....)"
1000108-26 = "ฉันคิดอะไรอยู่น่ะเหรอ? เอ่อ...ไม่มีอะไรหรอก"
1000108-28 = "หลังจากคุณครูทำแผลให้เอมิเสร็จก็ส่งเธอกลับไป"

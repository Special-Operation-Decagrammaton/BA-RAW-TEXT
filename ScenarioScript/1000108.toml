[translation]
1000108-1 = "傷口"
1000108-2 = "保健室"
1000108-3 = "我就說傷勢不嚴重了……"
1000108-4 = "不用擔心也沒關係的。"
1000108-5 = "[s] 「但是，還在流血吧？」"
1000108-6 = "擦傷了當然會流血。也因此傷口才會結痂並長出新的皮膚。"
1000108-7 = "你說你不是在問那個？那麼……"
1000108-8 = "[s] 「英美最好多愛惜一下自己的身體。」"
1000108-9 = "可是，在戰鬥中在意會不會受傷，只會降低效率而已。"
1000108-10 = "必須要不怕受傷地勇往直前，才能獲得最高效率……"
1000108-11 = "好痛！"
1000108-12 = "突然拿消毒水塗在人家身上，嚇到我了啦，老師。"
1000108-13 = "你說不好好消毒會留下疤痕？那種事我當然知道……"
1000108-14 = "[s] 讓英美坐下來繼續消毒"
1000108-19 = "……總覺得有點難為情。"
1000108-20 = "[s] 「雖然不管幾次我都會幫你治療，不過不可以太常受傷。」"
1000108-21 = "我知道了，我以後會注意的。"
1000108-24 = "（但如果以後老師都會像這樣幫我治療……說不定就效率上來說，故意受傷也不錯……）"
1000108-26 = "你問我在想什麼？沒有，什麼也沒有。"
1000108-28 = "（之後，我在英美的傷口上貼了OK繃後就回去了）"

[translation]
1000108-1 = "Wounds"
1000108-2 = "Infirmary"
1000108-3 = "I said I'm fine..."
1000108-4 = "You can relax."
1000108-5 = "[s] \"But you're still bleeding...\""
1000108-6 = "It's normal for one to bleed when scratched! It simply needs time to heal."
1000108-7 = "Is that not a suitable response? Hmm..."
1000108-8 = "[s] \"You need to take better care of yourself.\""
1000108-9 = "But more caution would lead to a loss of efficiency."
1000108-10 = "You can't be afraid of getting hurt. You have to charge forward and get the job done..."
1000108-11 = "Ouch!"
1000108-12 = "You could have warned me before applying the disinfectant, Sensei."
1000108-13 = "Yes, I'm well aware it'll get infected if we don't disinfect it properly..."
1000108-14 = "[s] I continued disinfecting Eimi's wound."
1000108-19 = "I'm a little embarrassed..."
1000108-20 = "[s] \"I don't mind taking care of you. I just don't want you getting hurt.\""
1000108-21 = "Fine. I'll try to be more careful."
1000108-24 = "(If Sensei takes care of me like this all the time, maybe I should get hurt more often...)"
1000108-26 = "Hmm? Oh, nothing."
1000108-28 = "I bandaged Eimi's wound and sent her away."

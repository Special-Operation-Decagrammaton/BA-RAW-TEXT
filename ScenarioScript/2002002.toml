[translation]
2002002-1 = "天才駭客的嗜好"
2002002-2 = "（接到陽葵的連絡後，來到了千年的社團大樓）"
2002002-5 = "千年科學學園．第8社團大樓走廊"
2002002-7 = "[ns]「陽葵告訴我的地方應該就是這裡……」"
2002002-11 = "（就在此時，有個東西伴隨著風聲緩緩靠近）"
2002002-15 = "[ns]「這是……千年的警備機器人？」"
2002002-23 = "[ns]「啊，要我跟著它的意思嗎？」"
2002002-28 = "（在機器人的帶領下抵達的，是位於深處的一間社團教室）"
2002002-32 = "（門旁貼的門牌上寫著這樣的文字）"
2002002-33 = "[ns]「『長時間不換氣的圓周率背誦部』……？」"
2002002-40 = "恭候多時了，老師。請進。"
2002002-50 = "呵呵，時間剛剛好呢。歡迎您。"
2002002-54 = "引導工作辛苦了。請回到工作崗位吧。"
2002002-60 = "[ns]「陽葵？剛才的機器人是……」"
2002002-61 = "是千年的警備機器人唷？"
2002002-62 = "因為我是病弱美少女，要親自迎接老師會有點困難。#n所以只好駭入碰巧在附近巡邏的機器人……"
2002002-68 = "……嗯，只是稍微借用了一下而已。"
2002002-69 = "那些孩子們都是可愛的好孩子對吧？"
2002002-70 = "我認為非常適合用來接待。"
2002002-74 = "[ns]「又做那種事……」"
2002002-76 = "[ns1]「所以這裡是哪裡呢？」\n[ns2]「門牌上好像寫著奇怪的名字……」"
2002002-79 = "咦……#n那，那個名字真的有那麼奇怪嗎……？"
2002002-80 = "為了想出好的名字，我苦思了三天三夜……#n好不容易才想出了這個充滿知性和智慧，同時非常適合隱藏身分的名字……"
2002002-81 = "我還以為這是個與千年引以為傲的天才美少女相符的好名字……"
2002002-82 = "[s]（一臉就是非常沮喪的表情……！）"
2002002-84 = "[ns]「不，那個……是我用字遣詞的問題。是個很有個性的好名字呢。」"
2002002-85 = "……呵呵，呵呵呵，對吧？"
2002002-86 = "我就知道老師能理解我♪"
2002002-87 = "畢竟那可是公認千年最棒的天才清楚系病弱美少女駭客……"
2002002-88 = "我，明星陽葵想出來的名字！"
2002002-92 = "[ns]「……話說陽葵為什麼會在這裡呢？」"
2002002-93 = "對了，剛才話說到一半呢。"
2002002-94 = "用一句話來說明的話……嗯。#n這裡可以說是只屬於我的祕密「藏身地」吧。"
2002002-95 = "[s]「藏身地？」"
2002002-96 = "沒錯。因為平時使用的特異現象搜查部，#n以及貝里塔斯的部室都處於「大姐頭」的監視之下。"
2002002-97 = "所以我才會駭入千年的管理系統，#n獲得閒置部室的使用權，把這裡變成我專屬的空間。"
2002002-98 = "……為什麼要做到這種程度，是嗎？"
2002002-99 = "當然是為了休息。#n對我這種超天才清楚系病弱美少女來說，睡眠的時間……"
2002002-100 = "不，大腦休息的時間是不可或缺的。"
2002002-101 = "[s3]「原來如此。可是在往返的途中這裡不會被發現嗎？」\n[s4]「像是剛才的機器人，或是到處都有的監視器之類的……」"
2002002-102 = "呵呵。這種程度的事，對我這個天才美少女駭客來說不成問題。"
2002002-103 = "呵呵。這種程度的事，對我這個天才美少女駭客來說不成問題。"
2002002-104 = "機器人的巡邏路線自不用說，有需要的話，駭入系統更改路線簡直易如反掌。"
2002002-105 = "監視器的死角我也瞭若指掌，替換一下影像這種事也是輕而易舉。"
2002002-111 = "我毫無破綻，是無敵的！呵呵呵呵呵。"
2002002-112 = "[s5]「不愧是陽葵，格局完全不同呢。」\n[s6]「不過這麼重要的地方，我真的可以來嗎……？」"
2002002-115 = "……嗯。#n關於這點，完全沒有問題。"
2002002-116 = "該說您能來真是太好了，還是您不來我會很困擾呢……"
2002002-117 = "[s] 「這是什麼意思？」"
2002002-118 = "如老師所知，我的存在總是受到眾人的矚目。#n沒錯，簡直就像是雲朵上綻放的一朵花一樣。"
2002002-119 = "雖然我是有著立若芍藥坐如牡丹……#n嘆息時的姿態就像百合花一般──如此評價的天才美少女……"
2002002-120 = "[s]「居然能這麼流暢地說個不停……真厲害。」"
2002002-121 = "所以，我認為不能展現出不完美的一面。"
2002002-122 = "但是……就算是我這種毫無缺點的完美美少女，也不可能時時刻刻都繃緊神經。"
2002002-123 = "咳咳……所以，把老師請來這裡的理由就是……"
2002002-124 = "偶爾……該說是可以放鬆的時間嗎……"
2002002-125 = "如果有個可以不求回報地陪在我身邊，又值得信賴的人就好了……"
2002002-126 = "於是我想到了，即使看到了我這樣的一面也願意陪在我身邊的那個人。"
2002002-127 = "所以簡單來說……"
2002002-128 = "[s]「簡單來說……？」"
2002002-129 = "……儘管成功準備了藏身地，但只有我一個人果然還是有點無聊。"
2002002-130 = "如果是老師的話，那個……"
2002002-131 = "說不定會願意陪我說話……"
2002002-132 = "雖然是我的一廂情願……"
2002002-133 = "可以用這樣的理由……"
2002002-134 = "請老師來這裡嗎……"
2002002-135 = "（偷看）"
2002002-136 = "[s]「什麼嘛。那樣的話隨時歡迎喔，陽葵。」"
2002002-137 = "……啊。"
2002002-138 = "[s]「陽葵？」"
2002002-142 = "啊，沒什麼……"
2002002-143 = "呵呵。#n果然和我預想的一樣。"
2002002-144 = "用我這優秀的頭腦的話，不用一秒鐘就能推導出這種結果了哦。#n今天是我贏了。"
2002002-148 = "[ns]「從什麼時候變成比賽了……？」"
2002002-149 = "不可以在意這種枝微末節的小事唷。#n您願意對我說「陪我」就已經足夠了。"
2002002-150 = "……因為我們之間的關係沒有「Undo」功能。"
2002002-151 = "[s]「放心吧，陽葵。」"
2002002-152 = "呵呵。"
2002002-158 = "那今天就拜託您囉，老師。"
2002002-161 = "（就這樣，和陽葵一起度過了一個悠閒的午後）"
2002002-166 = "順利像這樣獲得了和老師獨處的時間……"
2002002-167 = "換作是平常的我，應該已經對天才病弱美少女的豐功偉業擺出「得意表情」了……"
2002002-168 = "遺憾的是，有件事並沒有如我所願。"
2002002-169 = "[s]「有什麼問題嗎？」"
2002002-170 = "問題……是沒有到這種程度。"
2002002-171 = "如您所知，千年會在中午的校內廣播中撥放觀眾點的歌對吧。"
2002002-172 = "[s7]「這件事我還是第一次聽說。」\n[s8]「咦，是這樣嗎……？」"
2002002-175 = "只要是千年的學生，每個人都能自由地提出點歌的申請……"
2002002-176 = "不過不知為何，我點的歌完全不會被選中！"
2002002-177 = "明明已經一而再再而三地提出申請了，究竟是為什麼呢？#n老師您怎麼想呢？"
2002002-178 = "想必是因為我的感性過於前衛，#n不知何時已經和其他學生之間產生了無法互相理解的高牆了吧。"
2002002-179 = "我在不知不覺間成為悲劇的女主角了呢……"
2002002-180 = "[s]「呃，我想原因並不是那樣……」"
2002002-181 = "我只不過是想和千年的大家共同欣賞美妙的歌曲而已……"
2002002-182 = "……不過，今天就要和昨天為止遺憾的我說再見了。"
2002002-183 = "作為我和老師兩人的藏身地紀念……"
2002002-184 = "稍微用點「特別的方法」吧。"
2002002-188 = "[ns]「特別的方法……？」"
2002002-192 = "（此時，音響中撥放起了校內廣播）"
2002002-197 = "正在收聽千年校內廣播的聽眾們，大家好！"
2002002-198 = "今天也到了午休時間！#n馬上進入點歌環節！"
2002002-199 = "那麼是第一首歌。"
2002002-203 = "暱稱「千年最棒的清楚系美少女」同學……"
2002002-207 = "咦，又是這個人……？"
2002002-208 = "啊，是我呢。"
2002002-209 = "[s]「我就知道！」"
2002002-210 = "咦～真的要撥這首嗎……？"
2002002-215 = "不是，還有很多其他人點的歌吧？"
2002002-216 = "……咦？"
2002002-217 = "檔案突然消失了！？"
2002002-218 = "……呵呵。"
2002002-222 = "[ns]「那個，陽葵。應該不會是我想的那樣吧……」"
2002002-223 = "再怎麼說，這首歌也有點……"
2002002-228 = "啊，等一下，怎麼會！"
2002002-232 = "誰快來把機器停下來！……停不下來！？為什麼！？"
2002002-244 = "（音響中撥放起了一首旋律淒涼的演歌）"
2002002-248 = "[ns]「陽葵說的美妙歌曲是……」"
2002002-249 = "這是以前工程師部的部長向我推薦的歌曲。"
2002002-250 = "[s]「原來陽葵喜歡演歌啊。」"
2002002-251 = "呵呵。像這樣在藏身地內悠哉地休息，和老師共享相同的時間與喜歡的歌曲……"
2002002-252 = "您覺得如何呢？是不是很有情調？"
2002002-256 = "[ns]「好像能夠理解……」"
2002002-258 = "[ns]「嗯……真是首好歌呢。」"
2002002-259 = "對吧？呵呵。"
2002002-261 = "（聽著來自音響另一端，與廣播部成員慌張的騷動聲一同播放的演歌……）"
2002002-262 = "（直到夜晚到來為止，和陽葵度過了兩人的時間）"

34060-85 = "I'm sorry, Mika. It's not your fault. None of it is."
34060-86 = "...Sensei. Can you hear me? Please..."
34060-87 = "Run, Sensei. You have to get as far away as you can from the Arius district."
34060-88 = "Otherwise, you'll..."
34060-89 = "They're coming...after you..."
34060-90 = "Sensei!"
34060-92 = "Back Alley in Kivotos. Late at night."

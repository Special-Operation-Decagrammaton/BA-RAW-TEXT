[translation]
34060-1 = "Episode 6; Broken Things"
34060-3 = "I-It's me! I came as soon as you summoned!"
34060-4 = "I heard you wanted to talk alone, and I was so nervous!"
34060-5 = "I told my guard to wait outside the door. So, uh... What's up?"
34060-6 = "Mika..."
34060-7 = "Oh no, are you okay, Seia? Your face is all pale, and are you shaking? I-I'll call someone!"
34060-8 = "When you reached the Arius district, who did you meet outside of Squad?"
34060-9 = "What are you saying? Are you not feeling well, Seia?"
34060-10 = "Mika, are you certain that you've never been to the Arius district?"
34060-11 = "Seia... I..."
34060-12 = "Did you ever meet a tall woman with red skin? What else do you know about Squad?"
34060-13 = "...I don't know what you're talking about."
34060-14 = "*cough* *cough*"
34060-15 = "Because you made contact with Arius..."
34060-19 = "..."
34060-20 = "I know. I'm so sorry I caused you all this..."
34060-21 = "No... Squad...is going after Sensei..."
34060-22 = "...?!"
34060-23 = "You must be mistaken, Seia..."
34060-28 = "This is all because you brought Sensei here!"
34060-29 = "...?!"
34060-30 = "No... I shouldn't...blame you... I'm sorry."
34060-31 = "*cough cough*"
34060-33 = "*cough* *cough cough*"
34060-34 = "(I can't...feel my limbs anymore...)"
34060-37 = "(I'm losing...consciousness...)"
34060-41 = "..."
34060-42 = "...Where am I?"
34060-43 = "This architectural style... Am I in the Arius district?"
34060-44 = "Yes, welcome to the Arius basilica."
34060-45 = "...!"
34060-51 = "Ugh...!"
34060-52 = "Ah, yes. It makes sense it's you. I knew some rat was peeping, but I didn't think you'd follow me to this holy place."
34060-53 = "Did you think you were safe in your dreams? The prophetic archangel...Yurizono Seia."
34060-54 = "...Th-This place is... This is...the altar..."
34060-55 = "How observant of you. Not even my Gematria comrades know of this place. Be honored."
34060-60 = "...!"
34060-63 = "Oh no! Seia! Please wake up!  "
34060-64 = "Someone, help! Come here! It's Seia! Something's wrong!"
34060-65 = "Seia?! I'll summon help immediately!"
34060-67 = "(What...is that...?)"
34060-68 = "(It's so...ominous...)"
34060-69 = "(Is this altar for...summoning something...?)"
34060-71 = "(That girl is...!)"
34060-73 = "(...)"
34060-74 = "(I see... Is this ritual...for...?)"
34060-78 = "(This woman...is trying to summon something to Kivotos...)"

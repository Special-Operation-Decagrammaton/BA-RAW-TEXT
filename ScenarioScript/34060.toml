[translation]
34060-1 = "ตอนที่ 6;สิ่งที่แตกหัก"
34060-3 = "อะ... อื้ม! เห็นว่าให้มาที่นี่น่ะ"
34060-4 = "แถมยังบอกว่าอยากคุยด้วยแค่สองคนอีก แบบนี้ไม่สมกับเป็นเซอาจังเลย ฉันแอบกลัวนะเนี่ย!"
34060-5 = "ฉันขอให้เด็กชมรมทวงความยุติธรรมที่สังเกตการณ์ทุกวันมารอหน้าประตูเลยนะ แบบว่า..."
34060-6 = "มิกะ..."
34060-7 = "ซะ... เซอาจัง...? เอ๋? ปะ... เป็นอะไรหรือเปล่า? ทำไมทั้งหน้าซีด... แล้วก็ตัวสั่นด้วยล่ะ?#nหะ... ให้ฉันเรียกคนมาช่วยไหม?"
34060-8 = "ตอนที่ติดต่อกับเขตปกครองตนเองอาเรียส... เคยพบใครคนอื่นนอกจาก <สควอด> บ้างไหมคะ?"
34060-9 = "หะ... หืม...? อาเรียส...?"
34060-10 = "ไม่เคยไปเขตปกครองตนเองของอาเรียสเลยสักครั้งจริงๆ เหรอคะ?"
34060-11 = "นี่... เดี๋ยวก่อนสิ... เซอาจัง...? ฉัน..."
34060-12 = "เคยเห็นผู้หญิงตัวสูง ผิวสีแดง และใส่ชุดเดรสไหมคะ? รู้ข้อมูลอื่นเกี่ยวกับ <สควอด> อีกไหมคะ?"
34060-13 = "คือว่า... เซอาจัง... ฉันไม่เห็นจะเข้าใจเลย..."
34060-14 = "แค่กๆ แค่กๆ..."
34060-15 = "ก็เธอไปติดต่อกับอาเรียส..."
34060-19 = "......"
34060-20 = "อ่า... ก็ใช่อยู่หรอกนะ? เป็นเพราะฉัน... หลายๆ อย่างมันก็เลย..."
34060-21 = "คุณครู... ก็ถูกสควอดหมายหัว..."
34060-22 = "...?!"
34060-23 = "อืม... เดี๋ยวนะ เมื่อกี้เซอาจังพูดว่าอะไรนะ?"
34060-28 = "มันเป็นเพราะว่าเธอพาคุณครูมาที่นี่!!"
34060-29 = "......!!?"
34060-30 = "ไม่สิ นี่ไม่ใช่ความผิดของเธอ... ขอโทษนะคะ... เรื่องนั้น..."
34060-31 = "แค่กๆ แค่กๆๆ...!!"
34060-33 = "แค่กๆๆ แค่กๆๆ...!!"
34060-34 = "(ไม่... อย่าเป็นแบบนี้สิ ร่างกายไม่ฟังฉันเลยค่ะ...)"
34060-37 = "(สติฉัน... มัน... เลือน... ราง...)"
34060-41 = "......"
34060-42 = "ที่นี่คือ...?"
34060-43 = "ดูจากสถาปัตยกรรมแล้ว... หรือว่าที่นี่คือเขตปกครองตนเองอาเรียส...?"
34060-44 = "ใช่แล้วค่ะ ที่นี่คือมหาวิหารอาเรียส"
34060-45 = "!!"
34060-51 = "อึก...!!"
34060-52 = "หึ เป็นคุณเองสินะคะ ก็คิดอยู่ว่ามีหนูมาแอบดู แต่ไม่น่าเชื่อเลยนะคะว่าตามมาถึงสถานศักดิ์สิทธิ์เลย"
34060-53 = "ไม่ได้ประมาทเพราะอยู่ในความฝันใช่ไหมคะ? นางฟ้าพยากรณ์... ไม่สิ ยูริโซโนะ เซอา"
34060-54 = "...... ทะ... ที่นี่คือ... ที่นี่... คือ... แท่นพิธีนั่น..."
34060-55 = "ใช่แล้วค่ะ เป็นที่ลับที่ฉันไม่เคยให้พวกพ้องเกมาเทรียคนอื่นได้เห็นเลยค่ะ ถือเสียว่าเป็นเกียรติที่ได้เห็น#nนะคะ"
34060-60 = "...!"
34060-63 = "ซะ... เซอาจัง! ตั้งสติไว้!!  มะ... ไม่ได้นะ! "
34060-64 = "มีใครได้ยินไหม?!  เรียกคนมาช่วยที!!  เซอาจัง! เซอาจังมีอาการแปลกๆ!!"
34060-65 = "คะ?!  ขะ... เข้าใจแล้วค่ะ!!"
34060-67 = "(สิ่งนั้นมัน... คืออะไรกัน...)"
34060-68 = "(แค่เห็นก็รู้สึกถึง... พลังงานที่เป็น... ลางร้าย...)"
34060-69 = "(แท่นพิธีนี้... เอาไว้เรียก... บางอย่าง... ที่ไม่อาจรู้ได้เหรอ...?)"
34060-71 = "(แล้วเด็กคนนั้น...!)"
34060-73 = "(.......)"
34060-74 = "(หรือว่า... นี่มัน... พิธีนี้มัน... อย่าบอกนะคะว่า... มันคือสิ่งนั้น...)"
34060-78 = "(ผู้หญิงคนนี้... จะทำให้เกิดอะไรขึ้น... ในคิโวทอส...)"
34060-80 = "อย่าเป็นอะไรไปนะ... เซอาจัง... ฉันเรียกคนมาช่วยแล้ว "
34060-81 = "ทำไมล่ะ... ทำไม... เซอาจัง... ทำไมถึง... เป็นแบบนี้อีกแล้ว..."
34060-82 = "แล้วฉัน... ฉัน... เซอาจัง... ทำไมถึง... "
34060-84 = "มิกะ... ฉันทำแบบนี้... กับเธออีกแล้ว..."
34060-85 = "ขอโทษนะคะมิกะ มิกะไม่ได้ผิดอะไรเลยค่ะ นี่เป็น... ความผิดพลาดของฉันเองค่ะ..."
34060-86 = "คุณครูคะ... ถ้าได้ยินเสียงของฉัน... ได้โปรด..."
34060-87 = "หนีไปเถอะค่ะ คุณครู... คุณครูต้องอยู่ให้ห่างจากเขตปกครองตนเองอาเรียสให้มากที่สุดค่ะ"
34060-88 = "ถ้าไม่เช่นนั้นละก็... คุณครูจะ..."
34060-89 = "ถูก... พวกที่หมายหัวคุณครู..."
34060-90 = "คุณครูคะ...!!"
34060-92 = "ทางเดินแคบๆ แห่งหนึ่งในคิโวทอส"
34060-94 = "[ns1] (เมื่อกี้เหมือนได้ยินเสียงของเซอาเลย...)\n[ns2] (หรือว่าจะคิดไปเองนะ... รู้สึกไม่ค่อยดีเลย...)"
34060-95 = "(คุณครูมาที่นี่เพราะได้รับข้อความจากหมายเลขนิรนาม แต่สิ่งที่เห็นมีเพียงถนนว่างเปล่าไร้ผู้คน)"
34060-96 = "(คุณครูมาที่นี่เพราะได้รับข้อความจากหมายเลขนิรนาม แต่สิ่งที่เห็นมีเพียงถนนว่างเปล่าไร้ผู้คน)"
34060-101 = "[ns] (เหมือนจะมีใครอยู่ข้างหลัง...?)"
34060-103 = "[ns] \"ซาโอริ...?\""
34060-104 = "......"
34060-110 = "ตอนต่อไป;การเลือกและการตัดสินใจ"

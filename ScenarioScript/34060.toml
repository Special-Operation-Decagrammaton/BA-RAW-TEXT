[translation]
34060-1 = "第6話;被折斷的羽翼"
34060-3 = "嗯，嗯！收到你的聯絡就馬上趕過來了唷。"
34060-4 = "說想要兩個人單獨聊聊……因為不像聖亞醬的作風還嚇了我一跳呢！"
34060-5 = "就連一直都在監視我的實現正義部的孩子們，我也都讓他們待在門外了唷。所以……"
34060-6 = "彌香……"
34060-7 = "聖，聖亞醬……？咦，臉色有點……還好嗎？身體也在發抖……沒事吧？要不要請人來──"
34060-8 = "……你和奧利斯自治區接觸的時候，除了「奧利斯小隊」之外還有見過其他人嗎？"
34060-9 = "咦……奧利斯……？"
34060-10 = "你真的一次也沒有去過奧利斯自治區嗎？"
34060-11 = "呃……那個，聖亞醬……？"
34060-12 = "有看過一個穿著禮服身高很高的女性嗎？你知道其他與「奧利斯小隊」有關的情報嗎？"
34060-13 = "……那，那個，聖亞醬，你在說什麼……"
34060-14 = "咳，咳……"
34060-15 = "因為你和奧利斯的接觸……"
34060-19 = "……"
34060-20 = "啊……果，果然是這樣吧？因為我的錯……才會……"
34060-21 = "老師才會……被奧利斯小隊盯上……"
34060-22 = "……！？"
34060-23 = "……聖亞醬，你剛剛說什麼……？"
34060-28 = "因為你把老師牽扯了進來……！"
34060-29 = "……！！？"
34060-30 = "……不，這不是你的錯吧……抱歉。"
34060-31 = "咳，咳咳……！！"
34060-33 = "咳咳咳咳……！！"
34060-34 = "（啊……不行了。身體不聽使喚……）"
34060-37 = "（意識……快要……）"
34060-41 = "……"
34060-42 = "……這裡是？"
34060-43 = "這個建築風格……難道是奧利斯自治區的……？"
34060-44 = "沒錯──這個地方被稱為是奧利斯的「宗座聖殿」。"
34060-45 = "！！"
34060-51 = "唔……！！"
34060-52 = "我就覺得有老鼠在偷窺我們，果然是你啊──沒想到居然會追到這個至聖所來。"
34060-53 = "因為覺得是在夢裡就大意了嗎？預言的大天使……不，百合園聖亞。"
34060-54 = "……這，這裡是……那個祭壇……"
34060-55 = "沒錯。是連其他蓋瑪特利亞的成員都沒有來過的秘境，這可是你的榮幸啊。"
34060-60 = "……！！！"
34060-63 = "聖，聖亞醬！快醒醒！！"
34060-64 = "有人嗎！！快來人！！聖亞醬……聖亞醬的狀態很奇怪！！"
34060-65 = "是，是的！我，我知道了！！"
34060-67 = "（那個……究竟是……）"
34060-68 = "（光是映入眼簾……就感受到不祥的氣息……）"
34060-69 = "（這個祭壇……到底是……難道是為了召喚那個才……？）"
34060-71 = "（她是……！）"
34060-73 = "（……）"
34060-74 = "（這樣啊，這個儀式就是……難道……怎麼會……）"
34060-78 = "（這個女人……究竟打算給奇普托斯帶來……什麼樣的災禍……）"
34060-80 = "啊……聖亞醬，你醒了嗎？"
34060-81 = "為什麼……聖亞醬會變成這樣……"
34060-82 = "我該怎麼做才好……聖亞醬……怎麼辦……"
34060-84 = "彌香……我又對你……做了一樣的事……"
34060-85 = "對不起，彌香……這不是你的錯。這是……我招致的失敗……"
34060-86 = "……老師，如果你能聽見我的聲音的話……拜託你……"
34060-87 = "快逃吧──盡可能遠離……遠離奧利斯自治區吧。"
34060-88 = "不然的話……老師會……"
34060-89 = "……被盯上老師的人給……"
34060-90 = "老師……！！"
34060-92 = "奇普托斯某處．小巷"
34060-94 = "[ns1] （……剛才好像聽到了聖亞的聲音）\n[ns2] （是錯覺嗎……有種不祥的預感……）"
34060-95 = "（收到了寄件人不明的郵件後來到了這條街道上，這裡一片寂靜，感受不到人的氣息）"
34060-96 = "（收到了寄件人不明的郵件後來到了這條街道上，這裡一片寂靜，感受不到人的氣息）"
34060-101 = "[ns] （有人在附近……？）"
34060-103 = "[ns] 「沙織……？」"
34060-104 = "……"
34060-110 = "下一話;選擇與決定"

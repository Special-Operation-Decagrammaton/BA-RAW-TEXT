[translation]
70002010-1 = "綺羅羅和繪里香閃閃發亮的一天（１）"
70002010-3 = "護唇膏OK，髮捲OK！"
70002010-4 = "既然明天的東西都準備好了，差不多該來睡了吧？"
70002010-5 = "究竟明天會有什麼樣的事物在等著我──"
70002010-9 = "咦？新通知？"
70002010-10 = "我看看……"
70002010-11 = "啊，訂閱的網路劇頻道……上傳了新影片？"
70002010-12 = "這怎麼能錯過呢！"
70002010-13 = "我看看……"
70002010-14 = "製造學生時期的回憶吧！"
70002010-19 = "青春的美好果然……！"
70002010-25 = "……！"
70002010-31 = "綺羅羅醬，我們回家吧！"
70002010-32 = "……"
70002010-34 = "怎麼了，為什麼坐在這裡發呆？"
70002010-36 = "哇？繪里醬？你什麼時候來的！？"
70002010-37 = "你連我來了都沒發現嗎？#n該回家了哦？放學鐘聲也響了。"
70002010-38 = "啊，嗯，走吧。"
70002010-39 = "綺羅羅醬，你今天好像有點心不在焉，發生了什麼事嗎？"
70002010-40 = "呃，嗯？沒什麼呀？"
70002010-41 = "可能是因為昨天晚上太晚睡了啦～啊哈哈！"
70002010-46 = "……？"
70002010-49 = "嗯！今天下午感覺也挺不錯的呢！"
70002010-50 = "不知道回家的路上會發生什麼事呢～"
70002010-51 = "啊！你看那裡，繪里醬！"
70002010-52 = "嗯？"
70002010-59 = "啊，剛才走過去的那個同學……"
70002010-60 = "嗯嗯！手上竟然拿著學校前咖啡廳賣的限量版珍珠奶茶！"
70002010-61 = "我一直很想喝喝看的說，他到底是怎麼買到的啊？"
70002010-62 = "好奇的話就直接去問問吧！出發！"
70002010-66 = "……又開始了。"
70002010-71 = "呀齁！嗨！你好！！"
70002010-72 = "嗯，嗯！？你是誰？"
70002010-73 = "啊！我叫做綺羅羅，然後他是繪里醬！"
70002010-74 = "介紹的時候應該要說我是繪里香才對吧，綺羅羅醬。"
70002010-75 = "話說，你現在是要回家嗎？"
70002010-76 = "啊，嗯。有什麼事嗎？"
70002010-78 = "可以打擾你一下嗎？拜託拜託～！"
70002010-79 = "這個嘛，我是無所謂啦……"
70002010-80 = "謝謝你！#n其實也沒什麼，只是你現在喝的這杯限量版珍珠奶茶，聽說超級難買到的！"
70002010-81 = "所以我們一看到你拿著它，就在想你會不會其實是美食名店的隱藏高手！？"
70002010-82 = "然後就跑來向你請教了。"
70002010-83 = "怎麼說得這麼誇張……"
70002010-84 = "不過事情大致上就是這樣沒錯，不好意思打擾你。"
70002010-85 = "因為我們一直很想喝那個珍珠奶茶，只不過每次去都買不到。"
70002010-86 = "啊……原來是這樣啊。"
70002010-87 = "其實我也是因為聽說這東西很難買，所以才會在早上上學的時候先預訂……"
70002010-88 = "原來如此！還可以在上學的時候先預訂啊，我完全沒想到！"
70002010-89 = "謝謝你告訴我們！#n作為回報，我也告訴你一家超好吃的可麗餅攤車！"
70002010-90 = "也算是紀念我們成為朋友！"
70002010-91 = "朋，朋友？#n我們才認識不到五分鐘耶……"
70002010-92 = "既然有緣相遇，當然就是朋友了呀！"
70002010-93 = "是，是嗎……？"
70002010-94 = "嗯嗯！就是這樣！"
70002010-96 = "對了，我還有件事想告訴你。"
70002010-97 = "嗯？什麼？"
70002010-98 = "其實這個珍珠奶茶並沒有你想的那麼好──"
70002010-104 = "咦？"
70002010-105 = "哇！甜點咖啡廳爆炸了！"
70002010-106 = "什麼？餐廳爆炸？該不會……！"
70002010-109 = "呵呵，因為這間店在社交軟體上很有名，我還特別期待了一下呢。"
70002010-110 = "明明食材的品質都在水準以下，卻利用社交軟體進行病毒式宣傳……"
70002010-111 = "真讓人失望。#n既然連最基本的東西都做不好，自然也沒有存在的理由和必要性了。"
70002010-112 = "唔嗯～雖然是這樣沒錯，但木糖醇小黃瓜三明治其實還算好吃吧？"
70002010-113 = "會覺得那東西好吃的人只有你吧！？"
70002010-114 = "對我而言，不能免費續餐這點多少還是會扣點分呢～☆"
70002010-115 = "哪間咖啡廳會讓人免費續餐啊！？#n而且我根本還沒吃到耶！"
70002010-123 = "美食研究會，被我們當場逮到了吧！"
70002010-125 = "哎呀。"
70002010-126 = "哇啊啊！風紀委員會！？來得未免也太快了吧！？"
70002010-128 = "因為供給部檢舉你們的非法行為，所以我們正好在四處巡邏……！"
70002010-129 = "沒想到馬上就被我們逮個正著！"
70002010-130 = "而且竟然連甜點店都炸了！不可原諒！"
70002010-132 = "雖然我很想反駁你說的話……但不好意思，我們現在趕時間。"
70002010-133 = "亞伽里。"
70002010-134 = "是～☆那我們就搭卡車逃跑吧～☆"
70002010-135 = "趕快撤退！撤退！"
70002010-141 = "等，等等我～～！不要丟下我一個人啦～！"
70002010-147 = "你們這些傢伙！以為逃得掉嗎……！#n要是你們不願意乖乖投降的話──"
70002010-155 = "咳咳！咳咳！咳咳！還不快給我站住！？"
70002010-156 = "這群傢伙！竟然大搖大擺地搭著從供給部偷來的卡車逃跑……！"
70002010-157 = "喂！那邊那兩個回家部的！"
70002010-159 = "嗯？是說我們嗎？"
70002010-160 = "沒錯！我需要你們的幫忙！這次絕對要抓到美食研究會那些傢伙才行！"
70002010-161 = "唔，這麼突然拜託我們……"
70002010-163 = "好啊！沒問題！"
70002010-164 = "竟然一口就答應了，這樣真的好嗎？"
70002010-165 = "追卡車聽起來這麼有趣！我們就幫幫他嘛！"
70002010-166 = "竟然說聽起來很有趣……真不愧是你啊，綺羅羅醬。"
70002010-167 = "知道了，那我也跟你一起去吧。"
70002010-168 = "好耶！繪里醬最棒了！"
70002010-170 = "感謝你們的協助！"
70002010-171 = "來，沒時間了！趕快跑起來吧！"
70002010-176 = "呀呼～！"
70002010-181 = "（約莫10分鐘後……）"
70002010-183 = "哈啊，哈啊……"
70002010-184 = "啊哈哈！不只是卡車，連風紀委員會的人都跟丟了呢！"
70002010-185 = "我們平常是不是有點運動不足？"
70002010-186 = "這雖然是風紀委員會的例行公事，但對我們來說，想追上行駛中的車輛還是太難了。"
70002010-187 = "啊哈哈！不過還是很好玩！#n而且難得流流汗，心情也舒服了不少！"
70002010-188 = "嗯，我也覺得心情蠻好的。"
70002010-193 = "啊，那邊的兩位同學！"
70002010-195 = "嗯？"
70002010-201 = "可以請教你們一件事嗎？我們在參加社團活動的時候迷路了！"
70002010-203 = "啊，原來是新朋友啊！"
70002010-204 = "嗯，儘管問吧！你們想去哪裡？"
70002010-206 = "謝謝！我們想去大講堂前的十字路口，請問從這裡要怎麼過去呢？"
70002010-208 = "如果是大講堂的話，離這裡並不遠。"
70002010-209 = "嗯！只要從這邊的樓梯往下走後，一路沿著右邊往前……"
70002010-213 = "與其用說的，我看還是直接帶你們去吧！#n繪里香醬，你覺得呢？"
70002010-214 = "嗯，那樣應該比較好。"
70002010-215 = "跟我們來吧！我們帶你們去大講堂！"
70002010-217 = "哦哦！謝謝！看來我們遇到了兩個可靠的人！"
70002010-218 = "來，大家都把工具拿好！準備出發吧！"
70002010-223 = "往這邊！"
70002010-232 = "到了～！"
70002010-233 = "大講堂前面，這裡就是你們的目的地對吧？"
70002010-235 = "真的耶！跟部長告訴我們的座標一樣！"
70002010-236 = "謝謝你們！那我們就去參加社團活動了！"
70002010-238 = "不客氣！一路順風～！"
70002010-245 = "能幫助朋友的感覺真好！"
70002010-246 = "嗯，我們以前回家的時候，也遇過幾次這種事。"
70002010-253 = "因為有這些事件的關係，讓我們回家的路一點也不無聊。"
70002010-254 = "總是會有各式各樣的事情發生。"
70002010-259 = "是溫泉開發部！他們又開始亂炸了！"
70002010-260 = "大家快離遠一點！小心被波及！"
70002010-264 = "嗯嗯！每天都很讓人興奮！"
70002010-265 = "只不過……好像還是少了點什麼。"
70002010-266 = "嗯？"
70002010-267 = "嗯……"
70002010-271 = "啊哈哈！沒什麼！"
70002010-272 = "那我們也回去吧！"
70002010-277 = "哎呀，到路口了呢。"
70002010-278 = "那就明天再見囉？"
70002010-279 = "……"
70002010-280 = "綺羅羅醬？"
70002010-281 = "……嗯，我覺得還是應該跟你說清楚，繪里醬。"
70002010-282 = "你是說從剛才就在煩惱的事嗎？"
70002010-283 = "咦，咦？我有表現得這麼明顯嗎？"
70002010-284 = "我們都認識多久了，怎麼可能沒發現呢。"
70002010-285 = "只是看你一臉猶豫的樣子，所以才沒特別問你而已。"
70002010-286 = "啊哈哈！不愧是繪里醬，真是瞞不過你呢。"
70002010-287 = "嗯，老實說……"
70002010-288 = "我總覺得這樣的生活，好像還少了點什麼。"
70002010-289 = "少了點什麼？你是指哪個方面？"
70002010-291 = "青春的感覺！"
70002010-292 = "怦然心動的感覺！"
70002010-293 = "閃閃發亮的感覺！"
70002010-294 = "唔，嗯……"
70002010-295 = "可以解釋得更清楚一點嗎？#n就算是我，那種說法還是有點聽不太懂。"
70002010-296 = "簡單來說──"
70002010-298 = "我們去參加社團活動吧～！"
70002010-299 = "社團活動？"
70002010-300 = "怎麼這麼突然？"
70002010-301 = "其實我昨天晚上看了《我們的青春故事～最強社團活動篇～》！"
70002010-302 = "啊，就是那個你最近很喜歡看的網路劇？"
70002010-303 = "嗯嗯！#n那部劇主要是在描述主角們參加社團活動時發生的事，他們的生活看起來超有趣的！"
70002010-304 = "害我也想要體驗一下社團活動！"
70002010-305 = "雖然回家部也很棒……#n但說不定在參加社團活動的時候，會遇到我們想都沒想過的事哦？"
70002010-306 = "你看我們今天遇到的那些朋友，他們不是都很認真地參與社團活動嗎？"
70002010-307 = "既然如此，說不定在學生時期沒有體驗過參加社團的樂趣，將會是我們的一大損失！"
70002010-309 = "不，搞不好我們其實已經浪費了大半的青春時光！"
70002010-310 = "有，有這麼嚴重嗎……？"
70002010-311 = "那當然！人家不是都說青春的美好就在於社團嗎？"
70002010-312 = "既然你這麼想的話……"
70002010-313 = "嗯，那我們一起來想想辦法吧。"
70002010-314 = "啊！你願意陪我嗎？"
70002010-315 = "綺羅羅醬不是經常找我一起做這個、做那個的嗎？"
70002010-316 = "所以這次也算我一個吧，畢竟我們是最好的朋友嘛。"
70002010-317 = "哇！繪里醬最棒了！謝謝你！"
70002010-318 = "話說回來，你想參加什麼社團？有想法了嗎？"
70002010-319 = "還沒有！我打算從現在開始考慮！"
70002010-320 = "雖然多少有料到，居然回答得這麼乾脆……"
70002010-325 = "不然這樣吧？"
70002010-326 = "學校好像有個社團體驗的機制……"
70002010-327 = "我們可以先了解各個社團的情況，然後再從中尋找想參加的社團。"
70002010-331 = "好！我贊成！"
70002010-333 = "希望能找到閃閃發亮又令人怦然心動的社團！"

70002010-266 = "หืม?"
70002010-267 = "อืมม..."
70002010-271 = "อะฮ่าฮ่า! ไม่มีอะไรหรอก!"
70002010-272 = "เรากลับกันเถอะ!"
70002010-277 = "มาถึงทางแยกแล้ว"
70002010-278 = "งั้นเราก็คงต้องบอกลากันตรงนี้เหมือนทุกครั้งสินะ"
70002010-279 = "......"
70002010-280 = "คิราระจัง?"
70002010-281 = "อืม ฉันว่าฉันควรเปิดอกคุยกับเอริจังแล้วละ"
70002010-282 = "หมายถึงเรื่องที่กังวลอยู่ตั้งแต่เมื่อกี้ใช่มั้ย?"
70002010-283 = "เอะ... เอ๋? ดูออกขนาดนั้นเลยเหรอ?"
70002010-284 = "เรารู้จักกันมาตั้งนานแล้วนะ แค่เห็นก็รู้แล้วละ"
70002010-285 = "แต่คิราระจังเหมือนจะลังเล ฉันก็เลยไม่ได้ถามน่ะ"
70002010-286 = "อะฮ่าฮ่า! สมแล้วที่เป็นเอริจัง ฉันปิดบังอะไรไม่ได้เลยนะเนี่ย"
70002010-287 = "อืม ถ้าจะให้พูดตรงๆ ละก็..."
70002010-288 = "ถ้าเป็นแบบนี้เรื่อยๆ มันดูเหมือนจะยังขาดๆ อะไรไปสักหน่อยน่ะ"
70002010-289 = "ขาด? ขาดอะไรไปเหรอ?"
70002010-291 = "ความเป็นวัยรุ่นไง!"
70002010-292 = "ความตื่นเต้น!"
70002010-293 = "ความเปล่งประกาย!"
70002010-294 = "หะ... หืม...?"
70002010-295 = "ช่วยอธิบายเพิ่มหน่อยได้มั้ย? ถึงฉันจะพอรู้ใจคิราระจัง แต่ครั้งนี้ฉันไม่ค่อยเข้าใจเท่าไรเลย"
70002010-296 = "ก็แบบว่า..."
70002010-298 = "เรามาทำกิจกรรมชมรมกันเถอะ~!"
70002010-299 = "กิจกรรมชมรม?"
70002010-300 = "ทำไมจู่ๆ ถึงมีความคิดแบบนี้ล่ะ?"
70002010-301 = "ที่จริงเมื่อคืนฉันดู <เรื่องราววัยรุ่นของเรา ตอนกิจกรรมชมรมที่ยอดเยี่ยม> มาน่ะ"
70002010-302 = "อ้อ เว็บดราม่าที่บอกว่าช่วงนี้ดูอยู่ใช่มั้ย?"
70002010-303 = "อื้ม! เป็นเรื่องเกี่ยวกับตัวละครที่ทำกิจกรรมชมรมน่ะ แล้วมันก็ดูน่าสนุกมากเลย!"
70002010-304 = "พอดูแล้วฉันก็เลยอยากทำกิจกรรมชมรมดูบ้าง!"
70002010-305 = "ชมรมกลับบ้านมันก็ดีอยู่หรอก แต่ถ้าได้ทำกิจกรรมของชมรม เราก็น่าจะได้เจอเรื่องสนุกๆ ที่พวกเรา#nคาดไม่ถึงใช่ไหมล่ะ?"
70002010-306 = "เพื่อนๆ ที่ได้เจอวันนี้ต่างก็ทำกิจกรรมชมรมกันอย่างแข็งขันด้วย! ใช่มั้ยล่ะ?"
70002010-307 = "ถ้าเราใช้ชีวิตสมัยเรียนโดยไม่ได้สัมผัสความสนุกแบบนั้น ก็อาจเป็นการขาดทุนครั้งใหญ่ก็ได้นะ!"
70002010-309 = "ดีไม่ดีตอนนี้เราอาจกำลังขาดทุนไปแล้วครึ่งหนึ่งก็ได้!"
70002010-310 = "มะ... มันจะขนาดนั้นเลยเหรอ...?"
70002010-311 = "ก็ใช่น่ะสิ! ก็หัวใจของวัยรุ่นคือชมรมไม่ใช่เหรอ?"
70002010-312 = "ถ้าคิราระจังจะคิดอย่างนั้นละก็นะ..."
70002010-313 = "ก็ได้ ถ้างั้นเรามาหาวิธีกัน"
70002010-314 = "อ๊ะ! เอริจังก็จะเอาด้วยเหรอ?"
70002010-315 = "ก็คิราระจังชวนทำอะไรด้วยกันมาตลอดนี่นา?"
70002010-316 = "ฉันต้องเอาด้วยอยู่แล้วสิ ก็เราเป็นเพื่อนสนิทกันนี่นา"
70002010-317 = "ว้าว! ยอดไปเลยเอริจัง! ขอบใจนะ!"
70002010-318 = "งั้นอยากเข้าชมรมไหนเหรอ? มีที่ที่คิดไว้ในใจมั้ย?"
70002010-319 = "ยังไม่มีหรอก! ก็ว่าจะคิดตั้งแต่ตอนนี้ละ!"
70002010-320 = "ตอบทันทีเลยแฮะ ถึงจะคิดไว้แล้วก็เถอะ..."
70002010-325 = "ถ้างั้นแบบนี้เป็นไง?"
70002010-326 = "โรงเรียนเราดูเหมือนจะมีระบบที่ให้ลองทำกิจกรรมของชมรมก่อนตัดสินใจเข้าชมรมอยู่..."
70002010-327 = "งั้นเราลองไปทำกิจกรรมของหลายๆ ชมรมแล้วค่อยเลือกชมรมที่อยากเข้ากันก็แล้วกัน"
70002010-331 = "ดีเลย! ฉันเห็นด้วย!"
70002010-333 = "หวังว่าจะได้เจอชมรมที่เปล่งประกายและน่าตื่นเต้นนะ!"

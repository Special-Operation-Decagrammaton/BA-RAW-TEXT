[translation]
70002010-1 = "キララとエリカのキラキラな日（１）"
70002010-3 = "ナイトリップパック、オッケー！#nナイトキャップ、オッケー！"
70002010-4 = "準備もばっちし～！#nそろそろ寝よっ！"
70002010-5 = "明日は何をしよっかな～。"
70002010-9 = "ん？"
70002010-10 = "なんだろ……。"
70002010-11 = "えーマジ！？新作じゃん！"
70002010-12 = "うわ、しかもアレの続編！？"
70002010-13 = "寝てる場合じゃないんだけど！？"
70002010-14 = "青春の思い出を作っていこう！"
70002010-19 = "思い出づくりといえば……！"
70002010-25 = "……！"
70002010-31 = "キララちゃん、一緒に帰ろ～。"
70002010-32 = "……。"
70002010-34 = "あれ、どしたの？"
70002010-36 = "わっ！？エリカちゃん！？いつ来たの！？"
70002010-37 = "さっき来たとこ。#nチャイムもう鳴ったよ。"
70002010-38 = "あ、うん、そっか。"
70002010-39 = "なんかぼーっとしてるみたいだけど、なんかあった？"
70002010-40 = "え、いや別に！？何もないよ？"
70002010-41 = "強いて言えば、昨日夜ふかししたからかも？ちょっと寝不足でさー。"
70002010-46 = "……？"
70002010-49 = "うん、今日もキラキラしてる！"
70002010-50 = "帰りにどこ寄ってく～？"
70002010-51 = "あ！エリカちゃん、見て見て！"
70002010-52 = "ん？"
70002010-59 = "ああ、あの子……。"
70002010-60 = "タピオカ良いな～！#nっていうかあれって、噂の限定品だよね？"
70002010-61 = "ああ、なかなか手に入らないってやつ？#nどうやって買ったんだろ？"
70002010-62 = "直接聞いてみよっか♪"
70002010-66 = "……また始まった。"
70002010-71 = "はろはろ～！"
70002010-72 = "え、えっ！？誰？"
70002010-73 = "はじめまして、あたしはキララ！#nこっちはエリカちゃん！"
70002010-74 = "そんな急に話しかけたら困っちゃうよ。"
70002010-75 = "いま、大丈夫？"
70002010-76 = "あ、う、うん……大丈夫、だけど……。"
70002010-78 = "んじゃ、ちょっとだけ時間ちょうだい！"
70002010-79 = "う、うん……まぁいいけど……。"
70002010-80 = "ありがと♪#nそのタピオカドリンク、限定のヤツだよね？"
70002010-81 = "マジで手に入らないって聞いてるんだけど、どうやって手に入れた感じ？"
70002010-82 = "そこんとこ教えてもらいたいな～って！"
70002010-83 = "またそうやって畳みかけて……。"
70002010-84 = "急にごめんね。"
70002010-85 = "それ私たちも狙ってたんだけど、ずっと買えなくってさ。ちょっと気になって。"
70002010-86 = "そ、そっか……。"
70002010-87 = "確かに、普通に並ぶと大変らしいね。#nだから朝イチで予約したんだけど……。"
70002010-88 = "あ、予約できるんだ！知らなかった！"
70002010-89 = "教えてくれてありがと♪#nお返しじゃないけど、イチオシのクレープ屋さんシェアしたげる！"
70002010-90 = "せっかくだしモモトーク教えて、お友達になろ♪"
70002010-91 = "と、友達？"
70002010-92 = "そそ♪ダメかな？"
70002010-93 = "あ、いや……ダメじゃないけど……。"
70002010-94 = "ありがとー！"
70002010-96 = "あ、そうだ……余計なお世話かもしれないけど……。"
70002010-97 = "ん？どしたの？"
70002010-98 = "この限定タピオカ、あんまり美味しく――"
70002010-104 = "わ、なんだろ？"
70002010-105 = "うわっ！スイーツカフェが！"
70002010-106 = "ええ！？なになに！？"
70002010-109 = "ふむ、それなりの有名店とのことでしたが……。"
70002010-110 = "こだわりの無い食材選び。#nバイラルマーケティングに頼り切った手法……。"
70002010-111 = "基本がなっていませんわ。これでは食材も悲しんでいることでしょう。"
70002010-112 = "でもでも、キシリトールキュウリサンドイッチは美味しかったよ～！"
70002010-113 = "それはイズミだけでしょ！"
70002010-114 = "食べ放題じゃないのが減点ですね～★"
70002010-115 = "食べ放題目当てなら、最初からそういうお店に行きなさいよ！#nっていうか私、結局食べられなかったんだけど！？"
70002010-123 = "そこまでだ、美食研究会！"
70002010-125 = "あらあら。"
70002010-126 = "風紀委員会！？早くない！？"
70002010-128 = "給食部から通報があって、パトロールを強化していたんだが――"
70002010-129 = "まさか、こんなにすぐ見つかるなんてな。"
70002010-130 = "それにしても、またお店を爆破だなんて……罪状追加だ、お縄につけ！"
70002010-132 = "色々とご説明したいところではありますが……。#n申し訳ありません、次の予定がありまして。"
70002010-133 = "――アカリさん。"
70002010-134 = "はいはーい★#nそれではまた会う日まで♪"
70002010-135 = "イズミ、ぼさっとしてないで撤退するわよ！"
70002010-141 = "ま、待って～～～！置いてかないで～！！"
70002010-147 = "ちょっ、こらぁ！"
70002010-155 = "げほっげほっ……。"
70002010-156 = "盗んだ給食部のトラックで、そのまま逃げるなんて……。"
70002010-157 = "ちょっと、そこの帰宅部の2人！"
70002010-159 = "ん、あたし達？"
70002010-160 = "手を貸してほしい！#n今度こそ美食研究会を捕まえないと！"
70002010-161 = "ええ、そんな急に言われても……。"
70002010-163 = "オッケー♪"
70002010-164 = "本当に良いの？"
70002010-165 = "だって面白そうじゃん！"
70002010-166 = "……キララちゃんらしいね。"
70002010-167 = "わかった、付き合うよ。"
70002010-168 = "やった♪エリカちゃん最高！"
70002010-170 = "助かる！"
70002010-171 = "さあ、行くぞ！"
70002010-176 = "イヤッホ～！"
70002010-181 = "（そうして走り続け……）"
70002010-183 = "はあ、はあ……もう無理～。"
70002010-184 = "いやー、トラックも風紀委員会もどっか行っちゃったね。"
70002010-185 = "ちょっと運動不足だったかも？"
70002010-186 = "私たちでアレに追いつくのはちょっと厳しいでしょ。"
70002010-187 = "あははっ、でも面白かったし！久しぶりにいい汗かいたー！"
70002010-188 = "うん、私も。"
70002010-193 = "そこの二人！"
70002010-195 = "ん？"
70002010-201 = "道に迷っちゃってさ～！ちょっと教えてくれない？"
70002010-203 = "新しいお友達になれそうな予感……！"
70002010-204 = "ところで、どこに行きたいの？"
70002010-206 = "大講堂前の交差点？ってところに行きたいんだけど……。"
70002010-208 = "なら、そんなに遠くないね。"
70002010-209 = "うん！こっちの階段を降りて、あっちにまっすぐ行って――"
70002010-213 = "うーん……口だとちょっと分かりづらいか。#nエリカちゃん、案内してあげない？"
70002010-214 = "そうだね、一緒に行こっか。"
70002010-215 = "うん、じゃあついてきて～！"
70002010-217 = "ありがとー！すっごく助かるよ～！"
70002010-218 = "さあみんな、移動するよ～！"
70002010-223 = "こっちこっちー！"
70002010-232 = "とーちゃーく！"
70002010-233 = "ここで良いんだよね？"
70002010-235 = "うん！部長が送ってくれた座標と一致してる！"
70002010-236 = "ありがとね！じゃあ、私達は部活動があるから！"
70002010-238 = "ユアウェルカム！じゃあね～！"
70002010-245 = "良いことをすると気持ちいいね～！"
70002010-246 = "たしかに、そうだね。"
70002010-253 = "ほんと、キララちゃんと帰ると退屈しないな。"
70002010-254 = "――毎回、色んなことが起こる。"
70002010-259 = "温泉開発部がまた爆破してる！"
70002010-260 = "みんな離れて！巻き込まれるよ！"
70002010-264 = "うんうん！毎日がワクワク！たのし～い！"
70002010-265 = "でも、ちょーっとだけ物足りない気もするんだよね。"
70002010-266 = "ん？どうしたの？"
70002010-267 = "うーん……。"
70002010-271 = "あははっ！何でもない！"
70002010-272 = "そろそろ帰ろっか！"
70002010-277 = "さて、ここまでかな。"
70002010-278 = "んじゃ、また明日。"
70002010-279 = "……。"
70002010-280 = "キララちゃん？"
70002010-281 = "……うん、やっぱりエリカちゃんには言わなきゃだよね。"
70002010-282 = "さっきから悩んでたこと？"
70002010-283 = "あ、あれ？あたし、そんな顔に出てた？"
70002010-284 = "どれだけ一緒にいると思ってるのさ、そりゃ分かるよ。"
70002010-285 = "なんか悩んでたみたいだから、聞かなかったけど。"
70002010-286 = "あははっ！やっぱエリカちゃんに隠しごとはできないなぁ。"
70002010-287 = "えっとね……"
70002010-288 = "今も楽しいんだけど、なんかちょっと物足りないな～って。"
70002010-289 = "なにが？"
70002010-291 = "青春が！"
70002010-292 = "ワクワクが！！"
70002010-293 = "キラキラが！！！"
70002010-294 = "う、うーん……？"
70002010-295 = "どういうこと？"
70002010-296 = "えっとね、つまり――"
70002010-298 = "――部活動がしたいの！"
70002010-299 = "部活動？"
70002010-300 = "急にどうしたの？"
70002010-301 = "昨日、「私たちの青春物語～最強の部活編～」を見てさ……。"
70002010-302 = "ああ、最近ハマってるやつ？"
70002010-303 = "そうそう！主人公が部活を頑張る内容だったんだけど、すっごく楽しそうで……。"
70002010-304 = "だから、やってみたくなったの！"
70002010-305 = "帰宅部も良いけど、ちゃんと部活を始めたらもっと楽しいことに出会えるんじゃないかなって！"
70002010-306 = "今日会った人たちも、みんなそれぞれ部活を頑張ってたし？"
70002010-307 = "部活の楽しさを知らないまま学生時代を終えるなんて、もったいないかも～？って！"
70002010-309 = "青春の半分以上を損しちゃってるのかも、って思って！"
70002010-310 = "そ、そうかな……？"
70002010-311 = "そうだよ！青春の思い出を語る時、部活がよく挙がるくらいだし！"
70002010-312 = "キララちゃんがそう思うなら……。"
70002010-313 = "まあ、いいんじゃない？#nやってみよっか。"
70002010-314 = "一緒にやってくれるの？"
70002010-315 = "そりゃまあ、いつものことでしょ？"
70002010-316 = "今回も付き合うよ、親友だもの。"
70002010-317 = "わーい！エリカちゃん最高！ありがとう！"
70002010-318 = "で、どんな部活が良いの？入りたいとことか決まってる？"
70002010-319 = "ううん！これから考える！"
70002010-320 = "ふーん、そっか。"
70002010-325 = "じゃあ、こういうのはどう？"
70002010-326 = "どこでも大抵、体験入部のシステムがあるだろうし……。"
70002010-327 = "色んな部活を体験してから、入りたい部活を探してみたら？"
70002010-331 = "その手があったか！いいね！"
70002010-333 = "キラキラしてて、ワクワクできる部活があるといいな～！"

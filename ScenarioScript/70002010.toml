[translation]
70002010-1 = "วันที่เปล่งประกายของคิราระและเอริกะ 1"
70002010-3 = "ลิปบาล์ม พร้อม! โรลม้วนผล พร้อม!"
70002010-4 = "เตรียมของสำหรับพรุ่งนี้เสร็จแล้ว งั้นก็เข้านอนได้แล้วเนอะ"
70002010-5 = "พรุ่งนี้จะได้เจอเรื่องอะไรบ้างน้า"
70002010-9 = "เอ๋? มีแจ้งเตือนใหม่เข้ามา"
70002010-10 = "ไหนดูซิ..."
70002010-11 = "เว็บดราม่าที่ติดตามอยู่... อัปโหลดวิดีโอใหม่เหรอ?"
70002010-12 = "ว่าจะนอนแล้วเชียว แต่แบบนี้ใครจะหลับลงล่ะ!"
70002010-13 = "ไหนดูซิ..."
70002010-14 = "มาสร้างความทรงจำสมัยเรียนกันเถอะ!"
70002010-19 = "นี่แหละหัวใจของการเป็นวัยรุ่น...!"
70002010-25 = "...!"
70002010-31 = "คิราระจัง กลับบ้านกันเถอะ!"
70002010-32 = "......"
70002010-34 = "นั่งเหม่ออะไรอยู่น่ะ?"
70002010-36 = "อ้าว? เอริจัง? มาตั้งแต่ตอนไหนเนี่ย?! "
70002010-37 = "ไม่รู้ตัวเหรอเนี่ยว่าฉันมา? กลับบ้านกันเถอะ เสียงกริ่งดังแล้วนะ"
70002010-38 = "อ่า... อื้ม ไปสิ"
70002010-39 = "คิราระจัง วันนี้ดูเหม่อลอยแปลกๆ นะ มีเรื่องอะไรงั้นเหรอ?"
70002010-40 = "หะ... หืม? ไม่นะ? ไม่ได้มีเรื่องอะไรนี่?"
70002010-41 = "หรือว่าเพราะเมื่อคืนนอนดึกนะ~ อะฮ่าฮ่า!"
70002010-46 = "...?"
70002010-49 = "อื้ม! เย็นนี้ก็รู้สึกดีนะเนี่ย!"
70002010-50 = "ทางกลับบ้านวันนี้จะได้เจอเรื่องอะไรบ้างน้า~"
70002010-51 = "อ๊ะ! ดูทางโน้นสิ เอริจัง!"
70002010-52 = "หืม?"
70002010-59 = "อ่า... นักเรียนที่เดินไปทางนั้น..."
70002010-60 = "อื้อ! กำลังถือชาไข่มุกที่เปิดขายพิเศษของคาเฟ่หน้าโรงเรียนอยู่นี่นา!"
70002010-61 = "ฉันอยากลองกินอยู่พอดีเลย ต้องทำยังไงถึงซื้อได้นะ?"
70002010-62 = "ถ้าสงสัยก็เข้าไปถามเลยสิ! ไปถามด้วยกันเถอะ!"
70002010-66 = "เริ่มอีกแล้วสินะ..."
70002010-71 = "ไฮฮาย~! สวัสดี! ยินดีที่ได้เจอนะ!"
70002010-72 = "หะ... หืม?!  ใครเหรอ?"
70002010-73 = "อื้ม! ฉันชื่อคิราระ ส่วนทางนี้ก็เอริจัง!"
70002010-74 = "ต้องบอกว่าชื่อเอริกะสิ คิราระจัง"
70002010-75 = "เอาเถอะน่า นี่เธอกำลังกลับบ้านเหรอ?"
70002010-76 = "อ่า... อะ... อืม ทำไมเหรอ?"
70002010-78 = "พอมีเวลาเดี๋ยวหนึ่งมั้ย? พลีส~!"
70002010-79 = "อ่า... อืม... ก็ไม่ใช่ว่าจะไม่มีหรอกนะ..."
70002010-80 = "งั้นก็แต๊งกิ้ววว! ไม่ใช่เรื่องใหญ่อะไรหรอก ก็แค่ชาไข่มุกที่เธอกำลังกินอยู่น่ะ ได้ยินว่าเป็นเมนูวางขายพิเศษที่หาซื้อไม่ได้ง่ายๆ เลยนะ?"
70002010-81 = "พอเห็นเธอได้มันมา ฉันก็เลยคิดว่าเธออาจจะเป็นเซียนร้านเด็ดน่ะ!  "
70002010-82 = "ก็เลยมาหาเพราะอยากเรียนรู้วิชากลับไปบ้าง!"
70002010-83 = "พูดซะเว่อร์เชียว..."
70002010-84 = "เรามาหาก็เพราะเรื่องนั้นละ ขอโทษที่รบกวนนะ"
70002010-85 = "พอดีเราสองคนก็อยากกินชาไข่มุกนั่นมาตั้งนานแล้ว แต่ก็ซื้อไม่ทันตลอดเลย"
70002010-86 = "อ่า... เป็นแบบนี้สินะ"
70002010-87 = "ฉันก็ได้ยินข่าวลือว่าซื้อยาก ก็เลยจองไว้ตั้งแต่ตอนมาโรงเรียนน่ะ"
70002010-88 = "อย่างนี้นี่เอง! จองไว้ตั้งแต่ตอนมาโรงเรียนสินะ คิดไม่ถึงเลยว่าใช้วิธีนี้ได้!"
70002010-89 = "ขอบใจที่บอกนะ! ฉันจะบอกร้านเครปอร่อยๆ ให้เป็นการตอบแทนแล้วกัน!"
70002010-90 = "เพื่อเป็นที่ระลึกที่เราได้เป็นเพื่อนกันด้วย!"
70002010-91 = "พะ... เพื่อนเหรอ? แต่เราเพิ่งคุยกันยังไม่ถึง 5 นาทีเลยนะ..."
70002010-92 = "ได้เจอกันแบบนี้ก็ต้องเป็นเพื่อนกันสิ!"
70002010-93 = "งะ... งั้นเหรอ...?"
70002010-94 = "อื้อ! แน่นอนอยู่แล้ว!"
70002010-96 = "จะว่าไปแล้ว ฉันอยากบอกอะไรพวกเธออย่างหนึ่งก่อนที่ฉันจะไป"
70002010-97 = "หืม? อะไรเหรอ?"
70002010-98 = "ชาไข่มุกนี่น่ะ... ฉันว่ามันไม่ได้อร่อยอย่างที่คิด..."
70002010-104 = "เอ๋?"
70002010-105 = "ว้าก! คาเฟ่ระเบิดเหรอนั่น!"
70002010-106 = "อะไรน่ะ? ร้านระเบิดเหรอ? อย่าบอกนะว่า...!"
70002010-109 = "ฮุฮุ เห็นว่ากำลังเป็นกระแสในโซเชียล ฉันก็เลยคาดหวังเอาไว้ไม่น้อยเลยค่ะ"
70002010-110 = "แต่ก็ใช้วัตถุดิบต่ำกว่ามาตรฐาน ที่ดังขึ้นมาได้ก็เพราะใช้การตลาดแบบไวรัลผ่านโซเชียลมีเดีย..."
70002010-111 = "เพราะแบบนี้ก็เลยต่ำกว่าที่คาดหวังน่ะสิคะ ถ้าแค่เรื่องพื้นฐานยังทำไม่ได้ ก็ไม่มีความจำเป็นและเหตุผลที่#nร้านจะต้องอยู่ต่อหรอกค่ะ"
70002010-112 = "อืม~ แต่แซนด์วิชแตงกวาไซลิทอลก็พอใช้ได้อยู่นะ"
70002010-113 = "คงจะมีแต่เธอนั่นแหละที่คิดว่าเมนูนั้นใช้ได้น่ะ! "
70002010-114 = "สำหรับฉันแล้ว ขอหักคะแนนตรงที่ไม่ใช่บุฟเฟ่ต์ค่ะ~☆"
70002010-115 = "ใครเค้าจะมาคาเฟ่เพื่อกินบุฟเฟ่ต์ของหวานกันเล่า?! อีกอย่าง ฉันไม่ได้ลองชิมอะไรจริงจังเลยด้วย!"
70002010-123 = "เจอตัวในที่เกิดเหตุเลยนะ พวกชมรมชิมอาหาร!"
70002010-125 = "ตายจริง"
70002010-126 = "ว้ายย! คณะกรรมการวินัย?! ก็รู้อยู่หรอกว่าตั้งใจทำงาน แต่มาถึงเร็วไปรึเปล่าเนี่ย?! "
70002010-128 = "ก่อนหน้านี้ฉันได้รับแจ้งจากชมรมโภชนาการว่าพวกเธอก่อเหตุวุ่นวาย ก็เลยมาลาดตระเวนอยู่พอดี...!"
70002010-129 = "ไม่คิดเลยนะว่าจะจับได้คาหนังคาเขาแบบนี้!"
70002010-130 = "กล้ามาระเบิดคาเฟ่ของหวานแบบนี้! ยกโทษให้ไม่ได้!"
70002010-132 = "ฉันอยากโต้แย้งต่อความคิดเห็นนั้นมากๆ เลยค่ะ แต่ว่าตอนนี้พวกฉันไม่มีเวลาว่างกันขนาดนั้น "
70002010-133 = "อาคาริ"
70002010-134 = "ค่า~☆ งั้นพวกฉันขอขึ้นรถหนีกันก่อนละนะคะ~☆"
70002010-135 = "ถอนกำลัง! ถอนกำลัง!"
70002010-141 = "รอด้วยสิ ฉันไปด้วย~~~! อย่าทิ้งฉันไว้คนเดียวสิ~!"
70002010-147 = "ยัยพวกนี้นี่! ใครจะยอมให้หนีไปได้กันเล่า! ถ้าไม่ยอมแพ้กันแต่โดยดีละก็..."
70002010-155 = "แค่ก! แค่ก! แฮ่ก แฮ่ก! หยุดเดี๋ยวนี้นะ!!  "
70002010-156 = "นี่พวกเธอ! กล้าดียังไงถึงขโมยรถขนเสบียงของชมรมโภชนาการแล้วหนีไปน่ะ...!"
70002010-157 = "นี่! พวกชมรมกลับบ้าน!"
70002010-159 = "หืม? พวกเราเหรอ?"
70002010-160 = "ใช่! มาช่วยฉันหน่อย! ครั้งนี้ฉันต้องจับตัวพวกชมรมชิมอาหารให้ได้!"
70002010-161 = "อืม... ถ้าจะขอความช่วยเหลือกันโต้งๆ แบบนี้..."
70002010-163 = "ได้สิ! ฉันเอาด้วย!"
70002010-164 = "ตอบแบบไม่คิดเลยนะ จะไม่เป็นไรจริงๆ เหรอ?"
70002010-165 = "การไล่ตามรถขนของก็น่าจะเป็นเรื่องสนุกไม่ใช่เหรอ! ไปช่วยกันเถอะ!"
70002010-166 = "ดูน่าสนุกงั้นเหรอ สมแล้วละที่เป็นคิราระจัง"
70002010-167 = "ก็ได้ ฉันจะช่วยด้วยอีกคน"
70002010-168 = "ยะฮู้ว! สุดยอดไปเลยเอริจัง!"
70002010-170 = "ดีละ! ขอบใจที่ช่วยนะ!"
70002010-171 = "เอาละ เราไม่มีเวลาแล้ว! วิ่งตามไปกันเลย!"
70002010-176 = "ยะฮู้ว!"
70002010-181 = "(10 นาทีต่อมา...)"
70002010-183 = "แฮ่ก แฮ่ก..."
70002010-184 = "อะฮ่าฮ่า! ตามไม่ทันทั้งรถขนของ ทั้งคณะกรรมการวินัยเลย!"
70002010-185 = "หรือว่าเราออกกำลังกายกันไม่พอนะ?"
70002010-186 = "ไม่แปลกหรอก นี่เป็นงานที่คณะกรรมการวินัยต้องเจอทุกวันอยู่แล้ว การวิ่งตามรถคงเป็นเรื่องยากเกิน#nไปสำหรับพวกเรา"
70002010-187 = "อะฮ่าฮ่า! แต่ยังไงก็สนุกดีนะ ไม่ได้เหงื่อออกแบบนี้มานานแล้วด้วย รู้สึกดีมากเลย!"
70002010-188 = "อื้ม ฉันก็รู้สึกดีเหมือนกัน"
70002010-193 = "อ๊ะ ทั้งสองคนตรงนั้น!"
70002010-195 = "หืม?"
70002010-201 = "ฉันขอถามอะไรหน่อยสิ พอดีว่าฉันหลงทางระหว่างทำกิจกรรมของชมรมน่ะ!"
70002010-203 = "อ๊ะ เพื่อนใหม่!"
70002010-204 = "อื้ม ได้เลย! จะไปที่ไหนเหรอ?"
70002010-206 = "ขอบใจนะ! ฉันต้องไปตรงสี่แยกที่อยู่หน้าอาคารหอประชุมใหญ่ แต่ว่าไม่รู้ว่าจะไปจากที่นี่ยังไงน่ะสิ!"
70002010-208 = "หน้าอาคารหอประชุมใหญ่เหรอ ก็ไม่ไกลจากตรงนี้มากนะ"
70002010-209 = "อื้ม! ลงบันไดตรงนี้ไป จากนั้นก็เลี้ยวขวาและตรงไป..."
70002010-213 = "ฉันว่าพาไปเองน่าจะดีกว่าแค่บอกทางนะ! คิดว่าไงล่ะ เอริกะ?"
70002010-214 = "อื้ม แบบนั้นน่าจะดีกว่า"
70002010-215 = "ตามมาสิ! ฉันจะพาไปถึงหน้าหอประชุมใหญ่เลย!"
70002010-217 = "โอ้ว! ขอบใจนะ! พวกเธอดีกับฉันจัง!"
70002010-218 = "เอาละๆ ทุกคนเตรียมอุปกรณ์ให้ดี! แล้วออกเดินทางกันเลย!"
70002010-223 = "ทางนี้เลย!"
70002010-232 = "ถึงแล้ว~!"
70002010-233 = "หน้าหอประชุมใหญ่! ตรงนี้ใช่มั้ยที่บอกว่าอยากมาน่ะ!"
70002010-235 = "ใช่จริงด้วย! นี่แหละพิกัดที่หัวหน้าบอก!"
70002010-236 = "ขอบใจนะ! งั้นพวกเราขอตัวไปทำงานของชมรมก่อนละ!"
70002010-238 = "ยัวร์ เวลคัม! ไปกันดีๆ นะ~!"
70002010-245 = "รู้สึกดีจังเลยนะที่ได้ช่วยเพื่อน!"
70002010-246 = "อื้ม ระหว่างทางกลับบ้านเราก็เคยเจอเรื่องแบบนี้อยู่บ้างเนอะ"
70002010-253 = "พอมีอีเวนต์แบบนี้ การเดินกลับบ้านก็ไม่น่าเบื่อเลยเนอะ"
70002010-254 = "ก็มีเรื่องใหม่ๆ ให้เจอเสมอเลยนี่นะ"

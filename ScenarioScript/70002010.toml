[translation]
70002010-1 = "Kirara and Erika's Twinkling Day 1"
70002010-3 = "Lip balm, check! Hair rollers, check!"
70002010-4 = "My bag's all packed, so it's time for some beauty sleep!"
70002010-5 = "I wonder what fun stuff is waiting for me tomorrow..."
70002010-9 = "Oh? What's this notif?"
70002010-10 = "Let's see..."
70002010-11 = "Ah! That drama series I subbed to posted a new episode."
70002010-12 = "I was supposed to sleep...but I've gotta watch this, right?"
70002010-13 = "Let's see..."
70002010-14 = "Let's create our own youthful experience!"
70002010-19 = "The flower of youth has to be...!"
70002010-25 = "...!"
70002010-31 = "Time to go home, Kirara!"
70002010-32 = "..."
70002010-34 = "No reaction whatsoever. What's wrong?"
70002010-36 = "Wh-Whoa! When'd you get here, Eri?"
70002010-37 = "You didn't hear me come stomping over? Or the bell going off? Don't you want to go home?"
70002010-38 = "Ah! Yup! Let's go."
70002010-39 = "You haven't been yourself today, Kirara. Something wrong?"
70002010-40 = "H-Huh? Not that I can think of?"
70002010-41 = "It's probs because I stayed up super late last night! Hahaha!"
70002010-46 = "...?"
70002010-49 = "Yay! The sun's shining today!"
70002010-50 = "I hope something fun happens on our way home!"
70002010-51 = "Ah, ah! Look over there, Eri!"
70002010-52 = "Hm?"
70002010-59 = "That student walking by?"
70002010-60 = "Yup! She was drinking that limited-time bubble tea from the cafe in front of our school!"
70002010-61 = "I wonder how she got her hands on it. I've never been able to..."
70002010-62 = "Only one way to find out! Let's go say hi!"
70002010-66 = "Here we go."
70002010-71 = "Yahoo! Hello! Nice to meet you!"
70002010-72 = "H-Huh?! Who are you?!"
70002010-73 = "I'm Kirara! And this is Eri!"
70002010-74 = "Only you call me that, Kirara. It's Erika."
70002010-75 = "Okay, okay! Are you going home right now?"
70002010-76 = "Y-Yeah... What do you want from me...?"
70002010-78 = "Do you have a second to spare? Pretty please?"
70002010-79 = "I-I guess so. What's up?"
70002010-80 = "You're the best! Thanks! How'd you get that flavor of bubble tea? I heard it's super, duper exclusive!"
70002010-81 = "I figured you probably have all kinds of secret tips about the world of yummy drinks! A connoisseur, as they say!"
70002010-82 = "So, I just had to come over here and ask you to teach me your ways!"
70002010-83 = "You're being dramatic."
70002010-84 = "That's all it is. Sorry for bothering you."
70002010-85 = "We've been wanting to try it, but it's sold out every time we go."
70002010-86 = "Oh... I see."
70002010-87 = "Yeah, I heard it was pretty hard to get, so I just put in an order on my way to class this morning."
70002010-88 = "Whoa! I never would've thought of pre-ordering! I knew you'd have the secrets!"
70002010-89 = "Thanks so much! As payment, I'll tell you about my secret! The best crepe shop in Gehenna!"
70002010-90 = "To celebrate our friendship!"
70002010-91 = "F-Friendship? But we, like, just met...less than five minutes ago..."
70002010-92 = "Exactly! So, now we're friends!"
70002010-93 = "I-Is that how it works?"
70002010-94 = "Yup! How else would it work?"
70002010-96 = "Sure. But one quick thing."
70002010-97 = "Huh? What's up?"
70002010-98 = "The bubble tea is actually pretty sub—"
70002010-104 = "Oh?"
70002010-105 = "Whoa, whoa! The dessert cafe exploded!"
70002010-106 = "A cafe was bombed? It must be...!"
70002010-109 = "Heehee. When it went viral on social media, I must admit, I had high expectations."
70002010-110 = "But...this. Subpar ingredients. Seedy marketing schemes..."
70002010-111 = "This drink does not even meet the basic standards of cuisine! And if it fails to validate its reasons for existence, well, it should simply not exist."
70002010-112 = "Really? I thought the xylitol cucumber sandwich was pretty yummy!"
70002010-113 = "And you're the only one who thinks that!"
70002010-114 = "I knock off ten points for not having bottomless drinks! ☆"
70002010-115 = "For the last time, dessert cafes don't have bottomless anything! More importantly, you blew it up before I even got to try!"
70002010-123 = "Stop right there, Gourmet Society! "
70002010-125 = "Oh, my."
70002010-126 = "The Prefect Team?! This is a fast response, even for you!"
70002010-128 = "I was on patrol nearby, and the School Lunch Club reported that you all were breaking the law!"
70002010-129 = "I didn't expect to catch you in the act!"
70002010-130 = "What were you thinking, blowing up a dessert cafe?! I won't let this one go!"
70002010-132 = "I do have many counterarguments to your narrow-minded way of thinking, but I'm afraid we're busy at the moment. "
70002010-133 = "Akari."
70002010-134 = "Yes, ma'am! All aboard the truck! Time to run away. ☆"
70002010-135 = "Retreat! Retreat!"
70002010-141 = "W-Wait for me! Don't leave me all by myself!"
70002010-147 = "You miscreants! Get back here and surrender! I wont let you—"
70002010-155 = "*cough* *cough* *gag* I said stop! "
70002010-156 = "Those little brats! They have the audacity to steal the School Lunch Club's truck and use it as their getaway car?!"
70002010-157 = "Hey! You! Go-Home Club!"
70002010-159 = "Huh? Us?"
70002010-160 = "Yes, you! I need your help. We're taking down the Gourmet Research Society for good this time!"
70002010-161 = "Th-This is a little out of the blue..."
70002010-163 = "Sounds good! Love it!"
70002010-164 = "You responded a little too fast there. You sure?"
70002010-165 = "Chasing a truck sounds super fun! Let's do it!"
70002010-166 = "Where there's fun, there's Kirara."
70002010-167 = "Okay, why not? Let's go."
70002010-168 = "Yahoo! You're the best, Eri!"
70002010-170 = "Okay! I appreciate your help!"
70002010-171 = "There's no time! After them!"
70002010-176 = "Yahoo!"
70002010-181 = "Ten minutes later..."
70002010-183 = "*huff* *huff*..."
70002010-184 = "Hahaha! Looks like we lost the truck and our Prefect Team friend!"
70002010-185 = "Do we need to start working out?"
70002010-186 = "I mean, it's par for the course for the Prefect Team, but normal people can't catch up to speeding cars..."
70002010-187 = "Hahaha! At least it was fun, though! Wasn't it nice working up a sweat?"
70002010-188 = "I surprisingly do feel pretty good."
70002010-193 = "Hey! You two! Over there!"
70002010-195 = "Hm?"
70002010-201 = "Can I ask you for directions? I was so caught up in my club activities that I got lost!"
70002010-203 = "Yay! A new friend!"
70002010-204 = "We've got you! Where are you trying to get to?"
70002010-206 = "Thanks! I'm trying to get to the intersection in front of the big auditorium..."
70002010-208 = "The auditorium... You're pretty close, then."
70002010-209 = "Yup! Just take the stairs down, make a right, go straight, and..."
70002010-213 = "You know, why don't we just show you? That'll be way faster, right, Erika?"
70002010-214 = "Good idea."
70002010-215 = "Then, just follow my lead! We'll get you there safe and sound!"
70002010-217 = "Wow! Thanks so much! We've met some reliable friends, huh?"
70002010-218 = "Everyone, get your tools! Move out!"
70002010-223 = "This way!"
70002010-232 = "We're here! It's the big auditorium!"
70002010-233 = "This look like the right place?"
70002010-235 = "Yeah! This is the exact spot the president gave us!"
70002010-236 = "All right! Thanks! We've got club activities to attend to now!"
70002010-238 = "You're welcome! See ya!"
70002010-245 = "I like helping new friends!"
70002010-246 = "Mhm. We seem to attract these kinds of situations on our route home."
70002010-253 = "At least they keep things interesting!"
70002010-254 = "No two walks are ever the same with us."
70002010-259 = "It's the Hot Springs Department! They're blowing things up again!"
70002010-260 = "Evacuate immediately, or you'll get caught up in it!"
70002010-264 = "Yup, yup! It's a heart-pounding adventure, every day."
70002010-265 = "But...is this all there is...?"
70002010-266 = "Hm?"
70002010-267 = "Hm..."
70002010-271 = "Hahaha! Nothing!"
70002010-272 = "Time to head out!"
70002010-277 = "And so, our usual crossroad."
70002010-278 = "I'll see you tomorrow? Like always?"
70002010-279 = "..."
70002010-280 = "Kirara?"
70002010-281 = "Okay. Yeah. I should talk to you about it."
70002010-282 = "You finally gonna tell me what's been bothering you?"
70002010-283 = "Wh-Whoa? Am I that easy to read?"
70002010-284 = "We're together all the time, Kirara. Of course I noticed."
70002010-285 = "I just didn't want to push you to talk about it until you were ready."
70002010-286 = "Hahaha! I really can't keep a secret from you, Eri."
70002010-287 = "So, to be honest..."
70002010-288 = "Life right now... It feels like something's missing?"
70002010-289 = "Missing? What...exactly?"
70002010-291 = "YOUTH!"
70002010-292 = "The excitement!"
70002010-293 = "The twinkles!"
70002010-294 = "H-Huh...?"
70002010-295 = "Normally I can follow, but I might need a little bit of an explanation on this one."
70002010-296 = "What I'm trying to say here is..."
70002010-298 = "Let's start doing club activities!"
70002010-299 = "Club...activities?"
70002010-300 = "Where's this coming from all of a sudden?"
70002010-301 = "Okay, so, you know how I stayed up late last night? I was watching \"Our Youth Stories: The Ultimate Club Episode.\""
70002010-302 = "Isn't that the web series you've been into recently?"
70002010-303 = "Yup, yup. The main characters were doing all this club stuff, and it looked totally, super duper fun!"
70002010-304 = "So, it made me want to try some out too!"
70002010-305 = "I, like, totally love the Go-Home Club, but there could be an entire world of fun waiting for us we haven't discovered yet! Just hiding under the guise of club activities!"
70002010-306 = "Like the new friends we made today! They seemed super into whatever they were doing for their clubs!"
70002010-307 = "Wouldn't it be a total waste if we graduate and realize we missed out on the best of our school days?"
70002010-309 = "We... We might've wasted half of those best school days already!"
70002010-310 = "I-Is that how it works...?"
70002010-311 = "Duh! After all, clubs are the soil that the flower of youth blooms from...or something, right?"
70002010-312 = "If you say so, Kirara..."
70002010-313 = "Okay. Sounds good. Let's figure out how to make this happen."
70002010-314 = "Whoa! Wow! You're gonna do this with me?"
70002010-315 = "You asking me to join in on your latest shenanigans is a pretty common occurrence."
70002010-316 = "And I always come along, don't I? You're my best friend."
70002010-317 = "Yay! You really are the best ever, Eri! Heehee. Thanks!"
70002010-318 = "To start, what club do you want to join? Did you have your eye on any in particular?"
70002010-319 = "Not at all! I haven't gotten to that part yet."
70002010-320 = "That's more or less what I figured, but you really said that with no hesitation."
70002010-325 = "Why don't we do this, then?"
70002010-326 = "Gehenna has a system called \"sign-up trials\" for clubs."
70002010-327 = "We can try out different clubs, and see which one we like the best."
70002010-331 = "I love it! Let's go right now!"
70002010-333 = "I hope we find a totally heart-pounding, twinkling club!"

[translation]
32070-1 = "第7話;嶄新的觀點"
32070-3 = "哎呀，淳子同學和亞伽里同學。"
32070-4 = "啊，羽留奈，你也被抓了啊？"
32070-5 = "呵呵，我努力了大概10m哦。"
32070-6 = "好短……"
32070-7 = "這麼說來，成功逃走的就只有泉同學嗎。#n太好了，這樣我們的犧牲就沒有白費了。"
32070-8 = "說是犧牲，跟一開始想的完全相反吧……"
32070-9 = "實現正義部……原來如此，不愧是三一的武力集團，真是不得了的戰鬥能力。"
32070-10 = "就是說啊！！#n那個亞伽里竟然一瞬間就被打得跟扁掉的罐子一樣……害我嚇了一大跳……"
32070-11 = "真是的，所以我才說何必為了鮪魚跑到這種地方來嘛……！"
32070-12 = "呵呵……淳子同學，這種事情就像是對沒有關的水龍頭視而不見──"
32070-13 = "那個我已經聽過了！！"
32070-17 = "……我們接下來會怎麼樣呢？"
32070-18 = "應該會被引渡到風紀委員會吧？"
32070-19 = "嚇死我了！？亞伽里你不是暈倒了嗎！？"
32070-20 = "呵呵，我可不會這麼簡單就被打倒的唷★"
32070-21 = "話，話說要被引渡到風紀委員會啊……果然會變成那樣嗎……#n討厭，光是想像一下就……嗚嗚……"
32070-22 = "這下走投無路了呢……#n把我們的命運交給那位陽奈同學這種事，我本來是想盡可能避免的……"
32070-23 = "這次確實有點玩過頭了呢★#n嗯，就接受命運的安排吧。"
32070-27 = "（怎樣都好，拜託快點讓我回去……）"
32070-29 = "三一自治區邊界附近"
32070-30 = "（同一時間，泉正在……）"
32070-31 = "這，這是哪裡……？我是泉……嗚哇──！真是的，到底該往哪裡才對啊！？"
32070-36 = "老師和補課部的各位，辛苦你們了。托你們的福才能順利解決這次的事件。"
32070-37 = "啊，啊哈哈……從中途開始就做得有點忘我了……"
32070-38 = "能夠親眼見識實現正義部的戰術，我學到了很多。"
32070-39 = "雖，雖然不知道我有沒有幫上忙……！"
32070-40 = "話說回來，那些人之後會怎麼處理呢？"
32070-41 = "平常的話會由我們自己決定如何處置……#n不過現在情況特殊，我打算通知格黑娜風紀委員會，交給他們來處理。"
32070-42 = "[s] 「交給格黑娜風紀委員會……」"
32070-43 = "是的。另外，還有一件事想要拜託老師……"
32070-44 = "[s] 「嗯，要做什麼呢？」"
32070-45 = "考慮到伊甸園條約的問題，我們想盡可能避免主動行動。"
32070-46 = "因此將他們引渡給風紀委員會……這件事能不能麻煩由老師出面呢？"
32070-47 = "由「夏萊」進行學生的引渡……#n這樣對我們與格黑娜而言都能減少政治上的疑慮吧。"
32070-48 = "[s] 「我知道了，交給我吧。」"
32070-49 = "是，真的非常謝謝您，老師。#n那麼我們就先退居幕後……剩下的就交給老師了。"
32070-51 = "三一自治區．外圍大橋"
32070-52 = "（等待風紀委員會的車輛來接走美食研究會時……）"
32070-60 = "……久等了，請問屍體在哪裡呢？"
32070-61 = "[s] 「屍體……？」"
32070-62 = "……失禮了。#n不是屍體而是傷患才對，有時候會不小心搞錯。"
32070-63 = "我看看……交貨清單上寫著新鮮的傷患3名和人質1名。"
32070-64 = "[s] 「新鮮……？交貨……？」"
32070-65 = "……話說你是哪位？#n看起來不像是實現正義部的成員呢……？"
32070-66 = "[s] 「你感覺也不像是風紀委員會的成員……」"
32070-72 = "這位是「夏萊」的[USERNAME]老師。"
32070-76 = "[ns] 「是陽奈！」"
32070-77 = "好久不見了呢，老師。#n上次見面是什麼時候呢……話說回來，老師在這裡做什麼？"
32070-78 = "你認識他嗎，風紀委員長。"
32070-79 = "嗯……算是吧。"
32070-81 = "原來如此。為了不在這個時間點引起雙方的政治問題，所以才請老師……"
32070-82 = "這點我們也是一樣的。#n因此嚴格來說，這次來接回那些問題兒童的並非風紀委員會，而是「急救醫學部」。"
32070-83 = "……我是急救醫學部的部長氷室瀬奈。#n今後還請多多指教，老師。"
32070-84 = "如果有屍……更正，傷患的話請隨時通知我吧。#n不會收老師運費的。"
32070-85 = "[s] 「請，請多指教……」"
32070-86 = "「急救醫學部」在格黑娜也是政治色彩特別淡的社團，所以這次才會委託他們。"
32070-87 = "政治把戲就交給風紀委員長了。我對屍體以外的東西沒興趣。"
32070-88 = "是「傷患」才對吧？而且你也沒看過真正的屍體吧。"
32070-89 = "沒錯，是傷患才對。這點風紀委員長也是一樣的吧？"
32070-93 = "言歸正傳……美食研究會就在這裡面嗎？#n讓他們搭上我們的救護車吧。"
32070-98 = "……呵呵。陽奈同學，好久不見了呢。"
32070-99 = "羽留奈，你還是老樣子……不，詳情等回去再說吧。"
32070-100 = "哎呀，果然是「急救醫學部」的人啊★#n正好我的手腕被彎成不可思議的角度了，能幫我看一下嗎？"
32070-101 = "嘔，暈車了……快吐了……"
32070-102 = "得，得救了……"
32070-103 = "哎呀，是供給部的……還想說今天都沒看到你，居然在這種地方。"
32070-104 = "現在茱莉正在學校……不，果然還是回去之後再說明吧。"
32070-105 = "感覺美食研究會好像還少了一個人……算了，這樣也好。"
32070-107 = "謝謝老師的種種照顧。#n下次老師來格黑娜的時候，我會準備好吃的東西招待你的。"
32070-108 = "那就下次再見囉★"
32070-109 = "……真囉嗦，快進去。"
32070-110 = "[s] 「路上小心……」"
32070-114 = "……裝載完成，出發的準備也完成了。"
32070-115 = "……麻煩稍等一下。"
32070-116 = "……"
32070-117 = "老師……你在三一做些什麼呢？"
32070-118 = "[s] 「我現在負責帶領這個補課部……」"
32070-119 = "那個我已經知道了，畢竟傳來了各種情報……"
32070-120 = "我想問的是……「夏萊」難道不是中立的組織嗎？#n為什麼這種時期還待在三一……？這樣簡直就像……"
32070-121 = "[s] 「……」"
32070-122 = "……不，老師不可能會做那種事吧。"
32070-123 = "[s] 「陽奈，我也有件事想問你。」"
32070-124 = "嗯？有事想問我……？"
32070-125 = "[s] 詢問陽奈對於伊甸園條約的想法"
32070-128 = "（把現在的狀況和今後的展望詳細地告訴了陽奈）"
32070-140 = "原來如此……老師身處的情況相當複雜呢。"
32070-141 = "……等等，剛才是不是混進了什麼奇怪的畫面？"
32070-142 = "[s1] 「可能是錯覺。」\n[s2] 「一定是錯覺。」"
32070-143 = "……"
32070-144 = "……"
32070-145 = "算了，總之……"
32070-146 = "「三一的叛徒」啊……"
32070-147 = "各家的發言錯綜複雜，分不清究竟誰說的是真的、誰又在說謊的情況……"
32070-148 = "[s3] 「我想是因為大家的觀點都不同吧。」\n[s4] 「根據觀點的不同，真相或許也會改變。」"
32070-149 = "老師究竟是慎重還是樂觀，真讓人搞不懂呢……"
32070-150 = "老師究竟是慎重還是樂觀，真讓人搞不懂呢……"
32070-151 = "……話說回來，這麼重要的事情跟我說沒關係嗎？"
32070-152 = "[s] 「嗯，因為我比任何人都信任陽奈。」"
32070-153 = "……"
32070-154 = "……這就是老師的壞習慣吧。"
32070-155 = "[s] 「……？」"
32070-156 = "……沒什麼，只是在自言自語而已。"
32070-157 = "伊甸園條約是軍事同盟……這也是個有趣的觀點呢。"
32070-158 = "不過，至少我並不這麼認為。那不過是個和平條約而已。"
32070-159 = "[s] 「……是嗎？」"
32070-160 = "因條約而生的[ruby=ETO]伊甸園條約機構[/ruby]……#n就算把它視為武裝集團，那也不是渚一個人能夠控制的。"
32070-161 = "身為萬魔殿領導人的真琴也會擁有和渚一樣的權力。"
32070-162 = "除此之外，其他的茶會和萬魔殿成員們也會擁有一部分的權力。#n因此很難想像ETO會因為某個人的意志而遺忘原本的目的，陷入失控狀態。"
32070-163 = "當然，如果能獲得所有人的同意的話，理論上是有可能發生這種事的……"
32070-164 = "但話又說回來，如果真的能辦到那種事的話，直接把兩個學園合併不就好了。"
32070-165 = "而且，真琴是沒辦法和其他人合作的那種人……"
32070-166 = "[s] 「……那麼真琴為什麼會贊同伊甸園條約呢？」"
32070-167 = "……與其說是贊同，或許根本沒多加考慮吧。#n畢竟在格黑娜這邊推動伊甸園條約的其實是我。"
32070-168 = "[s] 「是陽奈你……？為什麼？」"
32070-169 = "怎麼說呢……為了引退？"
32070-170 = "如果ETO順利成立，格黑娜的秩序應該會比現在好上不少才對。#n到時候就算我不再是風紀委員長，應該也沒問題了吧。"
32070-171 = "[s] 「…………」"
32070-172 = "風紀委員長，還沒好嗎？"
32070-173 = "……嗯，我現在就過去。"
32070-174 = "那麼老師辛苦了。下次再見……"
32070-181 = "……老師會保護好補課部的對吧？"
32070-182 = "[s] 「嗯，我一定會保護他們。」"
32070-183 = "……這樣啊。"
32070-185 = "……那麼，再見囉。"
32070-194 = "啊嗚嗚……今天真是發生了不少事呢……"
32070-195 = "就是啊，沒想到晚上出去散步竟然會遇到這種難搞的事……"
32070-196 = "嗯，但是很高興。"
32070-197 = "……耶嘿嘿。"
32070-198 = "小春醬看起來很高興呢？#n果然是因為有幫上蓮實同學的忙嗎？"
32070-199 = "那當然囉！跟蓮實前輩一起戰鬥……這還是第一次呢……"
32070-201 = "我竟然能幫上忙，真開心……！嘿，耶嘿嘿嘿……！"
32070-202 = "呵呵，那真是太好了♡接下來就得如蓮實同學所願，想辦法避免留級才行呢？"
32070-203 = "我，我知道啦！沒問題的，我，我可是菁英呢！"
32070-204 = "嗯……我也得好好反省，之後努力加油才行呢♡"
32070-208 = "啊哈哈……時間不早了，我們差不多也該睡了吧。#n要是影響到明天唸書就不好了……"
32070-209 = "那麼，各位辛苦了。"
32070-210 = "[s] 「辛苦了，大家晚安。」"
32070-212 = "（就這樣結束了漫長的一天……）"
32070-214 = "下一話;浮現的希望"

32070-45 = "สนธิสัญญาเอเดนใกล้เข้ามาแล้ว ถ้าให้พวกฉันจะเข้าไปยุ่งกับสถานการณ์นี้#nมันก็น่าจะเกินกำลังไปค่ะ"

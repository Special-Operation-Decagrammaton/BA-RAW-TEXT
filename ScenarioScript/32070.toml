[translation]
32070-1 = "Episode 7;A New Perspective"
32070-3 = "Hello, Junko. Good to see you, Akari. "
32070-4 = "Haruna? You were caught too? "
32070-5 = "I'm afraid I didn't even make it ten meters."
32070-6 = "..."
32070-7 = "It seems as though Izumi was the only one who managed to get away...somehow. At least our sacrifice wasn't in vain."
32070-8 = "Since when was I sacrificing myself for that ditz?"
32070-9 = "The Justice Task Force certainly lives up to their reputation. We were foolish to underestimate them."
32070-10 = "You're telling me! One of them crushed Akari like a soda can. I thought we were gonna die!"
32070-11 = "I told you we shouldn't have come all the way here just for some stupid tuna!"
32070-12 = "See here, Junko. If you saw water gushing out of a tap into an overflowing sink and there was no one around, what would you do? "
32070-13 = "Enough with the stupid sink metaphor already! "
32070-17 = "What do you think they're gonna do with us?"
32070-18 = "Probably hand us over to the Prefect Team."
32070-19 = "Akari! Don't just rise from the dead like that!"
32070-20 = "Oh, please. I was just taking a little nap. It'll take more than that to kill me. ★"
32070-21 = "A-Anyway. Is being handed over to the Prefect Team any better? May as well be delivering us to our executioners..."
32070-22 = "That it may be. I'd like to avoid our fate being in Hina's hands if at all possible... "
32070-23 = "That's what we get for going too far this time. Oh, well."
32070-27 = "(Why did I get dragged here too? I just wanna go home...)"
32070-29 = "Trinity District Border"
32070-30 = "Meanwhile, Izumi was..."
32070-31 = "*sob* Wh-Where am I?! Where am I supposed to go?!"
32070-36 = "Good work, everyone. We were able to get the situation under control thanks to your help."
32070-37 = "Th-Thanks. I thought we got caught up in the heat of the moment."
32070-38 = "It was a good learning experience to see how the Justice Task Force's strategizes from up close."
32070-39 = "I-I hope I was helpful."
32070-40 = "So what's going to happen to those students?"
32070-41 = "Normally, we would decide what to do with them. But given the circumstances we're in, we'll have no choice but to defer to Gehenna's Prefect Team."
32070-42 = "[s] \"I thought that might be the case.\""
32070-43 = "Actually, I have a favor to ask you regarding that matter."
32070-44 = "[s] \"Of me? What is it?\""
32070-45 = "I'd like to avoid conflict as much as possible ahead of the Eden Treaty."
32070-46 = "With that said, would you mind being the one to hand the detainees over when the Prefect Team arrives?"
32070-47 = "It would lessen the political burden for both sides if Schale was the one who officially had them in custody."
32070-48 = "[s] \"I can do that.\""
32070-49 = "Thank you, Sensei. I'll step back, then."
32070-51 = "Trinity Outskirts Bridge"
32070-52 = "I came to the designated spot to hand the Gourmet Research Society over to the Prefect Team."
32070-60 = "I'm here. Where are the bodies?"
32070-61 = "[s] \"Bodies?\""
32070-62 = "Pardon me. I mean to say \"wounded.\" I confuse the two sometimes."
32070-63 = "According to this, I'm here for three freshly wounded and one hostage."
32070-64 = "[s] \"Is that a delivery manifest?\""
32070-65 = "You don't seem to be from the Justice Task Force. Just who are you? "
32070-66 = "[s] \"And you don't look like you're from the Prefect Team.\""
32070-72 = "That's [USERNAME] Sensei, the advisor of Schale."
32070-76 = "[ns] \"Hina!\""
32070-77 = "We meet again, Sensei. What are you doing here?"
32070-78 = "You're acquainted, Head Prefect?"
32070-79 = "You could put it that way, yes..."
32070-81 = "So that's it. The prisoners were turned over to Schale to reduce the political burden of the situation."
32070-82 = "We had the same thought. That's why, officially, the Medical Emergency Club will be the ones accepting the transfer of custody. I'm merely here to supervise."
32070-83 = "Sena. Himuro Sena, Medical Emergency Club president. It's nice to meet you, Sensei."
32070-84 = "If you ever have bodies—I mean, wounded—that need transporting, please let me know. We charge a flat rate."
32070-85 = "[s] \"S-Sure.\""
32070-86 = "The Medical Emergency Club is mostly removed from Gehenna's politics, hence why I asked them to do this job."
32070-87 = "I'm only interested in the deceased. I'll leave you to dirty your hands with politics."
32070-88 = "Again, they're only wounded. I doubt you've ever seen a dead body in person."
32070-89 = "My mistake...but the same goes for you, Head Prefect."
32070-93 = "Anyway, you have the Gourmet Research Society here? Let's transfer them to this ambulance."
32070-98 = "It's so good to see you again, Hina."
32070-99 = "*sigh* Haruna... We can talk about this later."
32070-100 = "The Medical Emergency Club is here? I think I may have dislocated my elbow. Would you mind taking a look at it? ★"
32070-101 = "Ugh... I think I'm gonna be sick."
32070-102 = "I'm saved..."
32070-103 = "You're...the School Lunch Club president? I was wondering where you were. "
32070-104 = "Since you've been gone, Juri has been... Well, I'll explain on the way."
32070-105 = "Looks like they only managed to capture three of the four Gourmet Research Society members. I'll deal with that problem later."
32070-107 = "Thanks for all the hospitality, Sensei. I'll be sure to treat you to a delectable meal the next time you visit Gehenna."
32070-108 = "See you around. ★"
32070-109 = "Shut up and get in."
32070-110 = "[s] \"Take care...\""
32070-114 = "Bodies loaded. Ready to depart."
32070-115 = "Hold a moment."
32070-116 = "..."
32070-117 = "Sensei. What are you doing at Trinity?"
32070-118 = "[s] \"I'm basically the advisor for something called the Make-Up Work Club.\""
32070-119 = "So I've heard. Not much escapes us."
32070-120 = "I'm more concerned about the timing. Schale is meant to be a neutral organization. Why would you be spending so many days at Trinity at a time like this? Are you...?"
32070-121 = "[s] \"...\""
32070-122 = "Never mind. I can't imagine it."
32070-123 = "[s] \"I have something I want to ask you too.\""
32070-124 = "Hmm? What is it? "
32070-125 = "[s] Ask Hina for her perspective on the Eden Treaty."
32070-128 = "I explained the situation in detail to Hina."
32070-140 = "You're in a very tight spot, Sensei."
32070-141 = "But what was that about a swimsuit symposium?"
32070-142 = "[s1] \"Don't worry about it.\"\n[s2] \"Swimsuit symposium? I didn't say anything like that...\""
32070-143 = "..."
32070-144 = "..."
32070-145 = "Moving on..."
32070-146 = "This situation regarding Trinity's traitor is rather complex."
32070-147 = "There's no way to know who is telling you the truth and who is filling you with lies."
32070-148 = "[s3] \"Truth is all a matter of perspective.\"\n[s4] \"There can be more than one truth.\""
32070-149 = "I'm not sure whether to call you cautious or optimistic."
32070-150 = "I'm not sure whether to call you cautious or optimistic."
32070-151 = "Are you sure it's okay for you to divulge this information to me?"
32070-152 = "[s] \"Of course. I trust you more than anyone.\""
32070-153 = "..."
32070-154 = "There's that bad habit of yours again. "
32070-155 = "[s] \"...?\""
32070-156 = "Nothing. I was muttering to myself."
32070-157 = "The Eden Treaty being a cover for a military alliance is an interesting perspective..."
32070-158 = "...but that's not how I see it. It truly is a peace treaty, as far as I'm concerned."
32070-159 = "[s] \"It is?\""
32070-160 = "Nagisa alone won't be able to control the ETO through the signing of the treaty."
32070-161 = "Makoto, the chair of the Pandemonium Society, will have the same authority as her."
32070-162 = "And the authority will be further divided among other members of the Tea Party and Pandemonium Society to ensure the ETO isn't abused by one person's will or lose sight of its original purpose."
32070-163 = "The latter is still theoretically possible if they all conspired together."
32070-164 = "Though if it were that easy for them to cooperate, there wouldn't have been a need for the treaty to begin with. They would have worked on simply integrating the two academies."
32070-165 = "I also find it hard to believe that Makoto can get along with anyone."
32070-166 = "[s] \"Then why is she in favor of the treaty?\""
32070-167 = "I don't think she's in favor of it at all... I was the one who pushed for Gehenna to agree to the Eden Treaty."
32070-168 = "[s] \"You? But why?\""
32070-169 = "That's a good question. Perhaps because I saw it as my opportunity to retire."
32070-170 = "Gehenna will be much more orderly under the ETO. It wouldn't be necessary for me to continue on as I have."
32070-171 = "[s] \"...\""
32070-172 = "We're still waiting, Head Prefect. Have you said what you needed to?"
32070-173 = "Yes. I'll be right there."
32070-174 = "Best of luck, Sensei."
32070-181 = "You'll keep the Make-Up Work Club safe, won't you?"
32070-182 = "[s] \"Yes. No matter what.\""
32070-183 = "Very well."
32070-185 = "Until we meet again."
32070-194 = "Phew. What a day."
32070-195 = "It sure was. I never expected our innocent little stroll to become such an adventure."
32070-196 = "It was enjoyable, however. "
32070-197 = "Heehee. "
32070-198 = "You're looking much happier, Koharu. Are you proud that you were able to fight next to Hasumi?"
32070-199 = "O-Of course I am! It was my first time."
32070-201 = "It was like a dream come true!"
32070-202 = "Aw, that's wonderful. Now you just have to pass your exam like Hasumi told you to."
32070-203 = "I know that! I'm gonna ace the next one for sure. Just like an elite would! "
32070-204 = "I'm sure you will. I had better study harder so you don't leave me behind."
32070-208 = "It's getting pretty late. We should get to sleep soon or else studying will be hard tomorrow."
32070-209 = "Good night, everyone. You too, Sensei."
32070-210 = "[s] \"'Night. You all did great today.\""
32070-212 = "This time, the day did finally come to a close."
32070-214 = "Next Episode;A Glimmer of Hope"

32070-20 = "ฮุฮุ โดนโจมตีแค่นี้ไม่สะทกสะท้านหรอกค่ะ★ "
32070-21 = "ตะ... แต่ว่าจะถูกส่งตัวให้คณะกรรมการวินัยเลยเหรอ... เราจะจบแบบนั้นจริงเหรอ?#nไม่เอานะะะ! แค่คิดก็... อึ่ก..."
32070-22 = "จนมุมแล้วสินะคะ... การฝากชะตากรรมไว้ในมือของคุณฮินะ... นี่เป็นสิ่งที่ฉันอยากเลี่ยงมากเลย..."
32070-23 = "มาคิดดูแล้วครั้งนี้เราประมาทกันไปหน่อย★ แต่ยังไงก็ต้องยอมรับชะตากรรมแหละค่ะ"

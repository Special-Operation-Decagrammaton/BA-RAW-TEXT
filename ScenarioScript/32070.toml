32070-196 = "อื้ม แต่ฉันสนุกนะ "
32070-197 = "แหะๆๆ... "
32070-198 = "โคฮารุจังดูร่าเริงเป็นพิเศษเลย เพราะได้ช่วยคุณฮาสุมิมาก็เลยดีใจใช่ไหมคะ?"
32070-199 = "นะ... แน่นอนอยู่แล้ว! นี่เป็นครั้งแรกเลยที่ฉันได้สู้เคียงบ่าเคียงไหล่รุ่นพี่ฮาสุมิ..."
32070-201 = "รุ่นพี่เขาบอกว่าฉันก็มีส่วนช่วยด้วย... ดีใจจัง!  อะฮ่ะฮ่ะฮ่า! รู้สึกดีเป็นบ้า"
32070-202 = "ฮุฮุฮุ♡ ดีแล้วล่ะค่ะ ทีนี้ก็เหลือแค่สอบให้ผ่านอย่างที่คุณฮาสุมิขอไว้..."
32070-203 = "ของมันแน่อยู่แล้ว! ขอเวลาแค่นิดเดียวน่า ฉันทำได้อยู่แล้ว! ฉะ... ฉันเป็นคนเก่งนะ! "
32070-204 = "จริงสิ... ฉันคงต้องสำนึกผิดและพยายามมากกว่านี้แล้วค่ะ♡"
32070-208 = "อ่ะฮ่ะฮ่า... นี่ก็ดึกมากแล้วค่ะ ถ้าไม่นอนพักผ่อนเดี๋ยวพรุ่งนี้จะเรียนไม่รู้เรื่องเอานะคะ..."
32070-209 = "เอาเป็นว่าจบเรื่องวันนี้เท่านี้นะคะ... ขอบคุณมากนะคะคุณครู"
32070-210 = "[s] \"วันนี้ทุกคนทำได้ดีมาก\""
32070-212 = "(และอีกหนึ่งวันที่ยาวนานก็หมดไป...)"
32070-214 = "ตอนต่อไป;ความหวังเริ่มปรากฏ"

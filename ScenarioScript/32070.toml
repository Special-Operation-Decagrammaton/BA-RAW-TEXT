32070-11 = "ทำไมถึงชวนกินปลามากุโร่แล้วถ่อมาถึงที่นี่นะ...!!"
32070-12 = "ฮุฮุ... มันก็คล้ายๆ กันแหละค่ะคุณจุนโกะ เวลาที่เห็นน้ำล้นจากอ่างล้างจานโดยที่ไม่มีใครอยู่... "

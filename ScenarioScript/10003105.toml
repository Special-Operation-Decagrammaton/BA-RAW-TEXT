10003105-20 = "5;아코;06;훌쩍. 그게, 얼마 전에……. 제가 탄 커피를 맛있다고 해주셨던 것 때문에……. 부장님이라면 이런 말을 하실 리가 없는데…… \n#5;em;[속상함]\n#5;stiff"

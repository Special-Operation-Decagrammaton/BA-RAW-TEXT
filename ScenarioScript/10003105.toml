[translation]
10003105-1 = "第10話;這個夏天還沒有結束"
10003105-2 = "（於是火熱的海邊事件，在陽奈的活躍下平息了）"
10003105-3 = "（集訓預定的行程全部結束，準備返回格黑娜學園之前……）"
10003105-5 = "夏季集訓指揮室"
10003105-6 = "非，非，非常抱歉！委員長！#n我只是，那個……想在事態擴大之前設法解決……！"
10003105-7 = "解決……？"
10003105-8 = "那個，我想說如果能在不被委員長發現的情況下解決的話，就一切OK了……"
10003105-9 = "說起來，我完全無法理解這麼做的理由。"
10003105-10 = "早點告訴我的話，事情不是馬上就能解決了嗎？"
10003105-11 = "那個，是……是因為……"
10003105-12 = "嗯？"
10003105-13 = "這樣委員長不就又得努力工作了嗎！？"
10003105-14 = "……咦？"
10003105-15 = "我明明只是想讓委員長休個假而已～！嗚哇啊啊啊～！"
10003105-16 = "等，等等……你在說什麼？休假？"
10003105-17 = "那個，委員長。亞子醬想說的是……"
10003105-18 = "因為委員長看起來壓力非常大……"
10003105-19 = "壓力？我嗎？……為什麼？"
10003105-20 = "不久前，委員長說我泡的咖啡「很好喝」……#n陽奈委員長，明明不會說那種話的……"
10003105-21 = "咖啡……？#n是在討論和夏萊共同巡邏的時候喝的……？"
10003105-22 = "那個……亞子，那是誤會。"
10003105-23 = "……？"
10003105-24 = "我當時之所以說「很好喝」並不是因為壓力，反而是因為心情不錯……"
10003105-25 = "[s1] 「跟夏萊一起巡邏心情就會變好嗎……？」\n[s2] 「就像是在海邊吃玉米會更加美味一樣？」"
10003105-26 = "老師！？那個，我，我的意思是……！"
10003105-27 = "老師！？那個，我，我的意思是……！"
10003105-28 = "那個，該怎麼說呢，就是……"
10003105-29 = "別，別在意那種小細節！#n總之，我明白這是出於擔心我而做出的行動了……但應該有更好的做法吧。"
10003105-30 = "是，對不起……"
10003105-31 = "不過……這兩天一夜，確實過得很悠閒……嗯，也沒什麼不好的。"
10003105-32 = "……不過，一碼歸一碼。"
10003105-33 = "而且我也明白了，比起什麼都不做，工作反而讓我更踏實……"
10003105-34 = "[s] 「完全是工作狂啊……」"
10003105-35 = "……你剛才說了什麼嗎，老師？"
10003105-36 = "[s] 「什麼也沒有……」"
10003105-37 = "唉……由於某人的獨斷行為，今年的夏季集訓變得亂七八糟的……#n其他風紀委員想必也沒能好好訓練吧……"
10003105-38 = "就這樣回去的話，不知道又要被萬魔殿的那些傢伙說些什麼了。"
10003105-39 = "所以沒辦法，只能這麼決定了。"
10003105-40 = "從現在起，重新開始夏季集訓。"
10003105-41 = "那個，委員長，你的意思是……？"
10003105-42 = "從現在起，禁止出入海邊。#n接下來將依照我原本準備的日程表，展開36小時的地獄式訓練。"
10003105-43 = "……"
10003105-44 = "……"
10003105-45 = "……"
10003105-46 = "除了沒有自由時間外，為了完成這麼長時間的訓練，通宵是免不了的。#n我看大家這兩天似乎都挺享受夏天的，相信辛苦一點也是能忍受的吧。"
10003105-47 = "這樣一來，萬魔殿的狐狸們也無話可說了吧。"
10003105-48 = "騙人的吧……！？#n結果還是要這樣！？"
10003105-49 = "我們早就已經筋疲力盡了……這種理由看來是行不通的啊。"
10003105-50 = "唔，明白了……"
10003105-51 = "……"
10003105-52 = "老師呢？對這個決定有什麼不滿嗎？"
10003105-53 = "[s] 「沒有！」"
10003105-54 = "嗯，回答得很好。"
10003105-59 = "（竊竊私語）欺騙我的代價，就讓你好好償還吧。"
10003105-61 = "（就這樣，和格黑娜風紀委員會的大家度過的短暫又漫長的夏天……似乎還沒結束）"
10003105-62 = "陽奈委員長的暑假！"

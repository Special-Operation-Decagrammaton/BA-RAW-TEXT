[translation]
10003105-1 = "Episode 10;Summer Isn't Over Yet"
10003105-2 = "And so, Hina had successfully quelled the incident that threatened to throw the beach into chaos."
10003105-3 = "Summer boot camp had ended as scheduled, and it was nearly time to return to Gehenna."
10003105-5 = "Summer Camp Control Room"
10003105-6 = "P-Please forgive me, Head Prefect! I merely wanted to resolve the issue before it got out of hand!"
10003105-7 = "And yet that's exactly what happened, isn't it?"
10003105-8 = "I thought we could handle it on our own..."
10003105-9 = "I don't understand why you were trying to keep it from me in the first place."
10003105-10 = "It would have been much easier to resolve had you simply told me."
10003105-11 = "But if we did that, then..."
10003105-12 = "Hmm?"
10003105-13 = "If we did that, you wouldn't have been able to enjoy your vacation!"
10003105-14 = "Huh?"
10003105-15 = "All I wanted was for you to take a well-earned break from work! *sob*"
10003105-16 = "What's this about a vacation? What are you talking about?"
10003105-17 = "Um, well the thing is. What Ako actually meant was..."
10003105-18 = "She told us that you've been very stressed out lately."
10003105-19 = "Stressed? Why would I be stressed?"
10003105-20 = "*sob* Because the other day you said the coffee I made was exquisite. You would never say such a thing... "
10003105-21 = "Coffee? Do you mean the cup you made when we were discussing cooperating with Schale?"
10003105-22 = "I think there's been a misunderstanding, Ako."
10003105-23 = "Huh?"
10003105-24 = "I didn't call the coffee exquisite because I was stressed. Rather, it was because I was in a good mood..."
10003105-25 = "[s1] \"Does working with Schale always make coffee taste better?\"\n[s2] \"Wow, just like eating roasted corn on the beach...\""
10003105-26 = "S-Sensei?! I didn't mean it like...!"
10003105-27 = "S-Sensei?! I didn't mean it like...!"
10003105-28 = "What I meant to say was..."
10003105-29 = "N-Never mind—it's unimportant! Back to the matter at hand: I understand you meant well, but there must have been other ways to go about giving me time off."
10003105-30 = "Yes, I apologize."
10003105-31 = "However...it's true I was able to rest more these past two days. That was a new experience for me."
10003105-32 = "However, that is a separate matter entirely from my well being."
10003105-33 = "I learned that I'd much rather have something to keep me busy than sit around doing nothing."
10003105-34 = "[s] \"Yup. Workaholic. Total Stockholm Syndrome.\""
10003105-35 = "Did you say something, Sensei?"
10003105-36 = "[s] \"N-Nothing.\""
10003105-37 = "Anyway, this year's summer camp has been a disaster thanks to this mess. I can't imagine the other members received much valuable training."
10003105-38 = "There's no telling how the Pandemonium Society would react if we returned without any tangible results."
10003105-39 = "I don't believe we have any other choice."
10003105-40 = "The real summer training camp will begin starting now."
10003105-41 = "H-Hold up, Head Prefect. Wouldn't that mean...?"
10003105-42 = "No one is allowed near the beach from this moment forward. We're to start the grueling summer training schedule I had originally planned."
10003105-43 = "..."
10003105-44 = "..."
10003105-45 = "..."
10003105-46 = "You all had your fun over the last couple of days. The real training starts now, and since we're so short on time, we'll be working overnight as well."
10003105-47 = "Even the Pandemonium Society will be impressed by your results once I'm through with you."
10003105-48 = "This has got to be some sick joke!"
10003105-49 = "We're already exhausted, but I don't think she's going to take no for answer."
10003105-50 = "Y-Yes, ma'am. Understood..."
10003105-51 = "..."
10003105-52 = "What about you, Sensei? Any objections?"
10003105-53 = "[s] \"No, ma'am.\""
10003105-54 = "Good answer."
10003105-59 = "(You can make it up to me later. Okay?)"
10003105-61 = "And so, the deceptively short summer I spent with the Gehenna Prefect Team...wasn't over yet."
10003105-62 = "Head Prefect Hina's Summer Break!"

[translation]
10003105-1 = "ตอนที่ 10;ฤดูร้อนของพวกเรายังไม่จบหรอกนะ"
10003105-2 = "(เหตุการณ์ดุเดือดที่ชายหาดได้ผ่านพ้นไปด้วยดีจากการออกโรงของฮินะ)"
10003105-3 = "(กำหนดการเข้าค่ายฝึกฤดูร้อนใกล้จบลง และเวลาที่จะต้องกลับไปที่เกเฮนน่าก็ใกล้เข้ามา...)"
10003105-5 = "ห้องควบคุมปฏิบัติการฝึกภาคฤดูร้อน"
10003105-6 = "ขะ...ขอโทษด้วยค่ะ ท่านประธาน! คือว่าฉัน... ฉะ...ฉันคิดจะแก้ไขเรื่องนี้ กะ... ก่อนที่มันจะ#nลุกลาม..."
10003105-7 = "\"คิด\" งั้นเหรอ?"
10003105-8 = "ฉันคิดว่าถ้าแก้ไขปัญหาได้โดยที่ท่านประธานไม่รู้ก็คงจะโอเค..."
10003105-9 = "ฉันไม่เข้าใจจริงๆ เลยว่าทำไมเธอถึงทำแบบนี้ตั้งแต่แรก "
10003105-10 = "ถ้าเธอบอกฉันก็แก้ไขได้ง่ายๆ นี่นา"
10003105-11 = "เรื่องนั้น... นั่นก็เพราะ..."
10003105-12 = "หืม?"
10003105-13 = "ถ้าบอกไป หัวหน้าก็จะไม่ได้พักแล้วก็ต้องมาทำงานอีกน่ะสิคะ?!"
10003105-14 = "หืม...?"
10003105-15 = "ฉันแค่อยากให้ท่านประธานได้ใช้วันหยุดพักผ่อนบ้างก็เท่านั้นเองค่ะ~! ฮืออ~!"
10003105-16 = "ดะ...เดี๋ยวนะ เธอพูดอะไรน่ะ? วันหยุดงั้นเหรอ?"
10003105-17 = "คือว่าเรื่องนั้น... ประธาน... คือว่าอาโกะจัง..."
10003105-18 = "อาโกะจังเห็นว่าช่วงนี้ท่านประธานค่อนข้างเครียดมาก..."
10003105-19 = "เครียด? ฉันน่ะเหรอ? เมื่อไหร่น่ะ...?"
10003105-20 = "(สะอื้น) เมื่อไม่นานมานี้... ท่านประธานบอกว่ากาแฟของฉันอร่อย... ถ้าเป็นปกติละก็... ไม่มีทางชมฉันแบบนี้แน่ๆ..."
10003105-21 = "กาแฟงั้นเหรอ? หรือว่ากาแฟที่ฉันกินตอนที่คุยเรื่องแผนการร่วมมือกับชาเล่ต์...?"
10003105-22 = "เดี๋ยวนะ อาโกะ... เธอเข้าใจผิดแล้ว"
10003105-23 = "คะ?"
10003105-24 = "ฉันไม่ได้บอกว่ากาแฟอร่อยเพราะเครียดสักหน่อย แค่ตอนนั้นฉันอารมณ์ดีที่จะได้ร่วมมือกับทางชาเล่ต์..."
10003105-25 = "[s1] \"ถ้าทำงานร่วมกับชาเล่ต์แล้วจะรู้สึกว่ารสชาติของกาแฟอร่อยขึ้นเหรอ?\"\n[s2] \"เหมือนเรื่องรสชาติข้าวโพดที่กินในงานเทศกาลงั้นเหรอ...?\""
10003105-26 = "คุณครู?! ไม่ใช่สักหน่อย ฉันไม่ได้หมายความว่าแบบนั้นนะ"
10003105-27 = "คุณครู?! ไม่ใช่สักหน่อย ฉันไม่ได้หมายความว่าแบบนั้นนะ"
10003105-28 = "ไม่ใช่แบบนั้นนะ... อะ...อื้ม..."
10003105-29 = "ระ...เรื่องนั้นช่างมันเถอะน่า! ถึงอยากจะทำให้ฉันได้มีเวลาพักก็เถอะ แต่ก็ไม่ควรใช้วิธีแบบนี้นะ..."
10003105-30 = "ค่ะ ขออภัยด้วยค่ะ..."
10003105-31 = "เอาเป็นว่า... ตลอด 2 วัน 1 คืนที่ผ่านมาที่ไม่ได้ทำอะไรเลย... อืม... ฉันว่า... มันก็อาจเป็น#nประสบการณ์ใหม่ๆ สำหรับฉันก็ได้... "
10003105-32 = "แต่ว่ามันก็คนละเรื่องกันอยู่ดี..."
10003105-33 = "สำหรับฉัน... ฉันจะรู้สึกดีที่ได้ทำงานมากกว่าการนั่งอยู่เฉยๆ ไม่ได้ทำอะไรเลย..."
10003105-34 = "[s] \"แบบนั้นเหมือนพวกพนักงานบ้างานที่เป็นทาสบริษัทเลยนะ...\""
10003105-35 = "เมื่อกี้ว่ายังไงนะ? คุณครู"
10003105-36 = "[s] \"ปะ...เปล่าหรอก\""
10003105-37 = "เฮ้อ... เพราะเรื่องวุ่นวายที่เกิดขึ้น ทำให้การฝึกภาคฤดูร้อนของปีนี้ล้มเหลวไม่เป็นท่าเลยสินะ#nบางทีสมาชิกคณะกรรมการวินัยคนอื่นๆ เองก็คงไม่ได้ฝึกเหมือนกัน"
10003105-38 = "ถ้าเรากลับไปทั้งแบบนี้ อาจถูกพวกแพนเดโมเนียม โซไซตี้จับผิดอะไรอีกก็ได้"
10003105-39 = "แต่ก็ช่วยไม่ได้นะ ฉันตัดสินใจแล้ว"
10003105-40 = "การฝึกภาคฤดูร้อนที่แท้จริงจะเริ่มตั้งแต่ตอนนี้"
10003105-41 = "คือว่า... ประธาน หมายความว่ายังไงน่ะ..."
10003105-42 = "ตั้งแต่ตอนนี้ไป ห้ามลงไปที่ชายหาดเด็ดขาด ฉันจะเริ่มแผนฝึกนรกของการฝึกค่ายฤดูร้อน 36 ชั่วโมง#nตามแผนเดิมที่วางแผนเอาไว้"
10003105-43 = "..."
10003105-44 = "..."
10003105-45 = "..."
10003105-46 = "สองวันนี้ ดูเหมือนว่าทุกคนจะสนุกกับฤดูร้อนกันอย่างเต็มที่แล้ว เพราะงั้นตั้งแต่นี้ไปคือการฝึก#nของจริงล่ะนะ และเพราะเรามีเวลาไม่พอ เพราะงั้นจะไม่มีการหยุดพักในตอนกลางคืนทั้งนั้น "
10003105-47 = "ถ้าทำแบบนี้พวกแพนเดโมเนียม โซไซตี้ก็คงจะบ่นอะไรไม่ได้แล้ว"
10003105-48 = "อ๊ากกกก....! ทำไมสุดท้ายถึงเป็นแบบนี้ล่ะ?!"
10003105-49 = "แค่ตอนนี้พวกเราก็เหนื่อยกันมากแล้ว... แต่ก็คงใช้เป็นข้อแก้ตัวไม่ได้สินะคะ"
10003105-50 = "ค่ะ... เข้าใจแล้วค่ะ"
10003105-51 = "..."
10003105-52 = "คุณครู? ไม่พอใจแผนการของฉันรึเปล่า?"
10003105-53 = "[s] \"มะ...ไม่นะ\""
10003105-54 = "อื้ม ตอบได้ดีเลยนะ คุณครู..."
10003105-59 = "(กระซิบ) ฉันจะเอาคืนที่คุณครูปล่อยให้ฉันรอให้สาสมเลยล่ะ"
10003105-61 = "(สุดท้ายแล้ว ฤดูร้อนแสนสั้นแต่เหมือนเป็นเวลาที่แสนนานของคณะกรรมการวินัยเกเฮนน่า...#nก็ยังไม่สิ้นสุดลง)"
10003105-62 = "ปิดเทอมหน้าร้อนของประธานกรรมการวินัยฮินะ!"

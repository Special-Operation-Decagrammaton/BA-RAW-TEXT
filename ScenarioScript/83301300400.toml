[translation]
83301300400-7 = "ก็เพราะแบบนี้ละ... อิโรฮะ ฉันเลยอยากถามร่องรอยของคาสุมิจากเธอน่ะ"
83301300400-12 = "อ่า... งั้นเหรอคะ ตอนที่แพนเดโมเนียม โซไซตี้สั่งให้พัฒนาออนเซ็น รุ่นพี่มาโคโตะเป็นคนที่ไปทำ#nสัญญาด้วยตัวเอง"
83301300400-13 = "ไม่สิ เรื่องแบบนี้ตัวเองบอกเองก็ได้แท้ๆ ทำไมต้องพูดอ้อมค้อมแล้วไม่บอกคนอื่นด้วยคะเนี่ย... น่ารำคาญจริงๆ"
83301300400-14 = "เฮ้อ... ถ้าเป็นกองบัญชาการที่รุ่นพี่มาโคโตะไปทำสัญญามาตอนนั้นละก็ ฉันจะบอกให้เองค่ะ"
83301300400-15 = "ที่นั่นไม่ไกลจากตรงนี้มากเท่าไรหรอกค่ะ ถ้าดูจากในแผนที่แล้ว อยู่ทางฝั่งนี้..."

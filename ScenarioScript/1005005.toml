[translation]
1005005-1 = "I Said I Hate Them!"
1005005-2 = "Downtown"
1005005-3 = "I ran into Kokona while walking around downtown."
1005005-4 = "Oh! Hello, Sensei."
1005005-5 = "I'm glad I ran into you. I've got a lot on my mind right now."
1005005-6 = "I've been thinking about ways to get the students to call me Instructor Kokona."
1005005-7 = "It helped a little when you talked to them, but they went back to just Kokona pretty quickly..."
1005005-8 = "[s1] \"Well, if you keep avoiding carrots—\"\n[s2] \"You have to set a good example, starting with carrots.\""
1005005-9 = "But I hate carrots!"
1005005-10 = "But I hate carrots!"
1005005-11 = "I don't care what you say."
1005005-12 = "I've never liked them, and I never will!"
1005005-13 = "It's not like I chose to hate them."
1005005-14 = "I just... How can people stand eating them?"
1005005-15 = "They're bitter. They smell weird. They're hard as rocks..."
1005005-16 = "They're not fit for human consumption."
1005005-17 = "What even possessed people to eat them in the first place? "
1005005-18 = "It's a clear regression of culture."
1005005-19 = "We must move forward. We must eat better than that. BE better than that."
1005005-20 = "Carrots are so...unsophisticated!"
1005005-21 = "And don't even get me started on bell peppers!"
1005005-22 = "Not only are they bitter and smelly—just like carrots—but they're spicy too!"
1005005-23 = "[s3] \"What if you were stranded on a island, and you could only have carrots or bell peppers to eat?\"\n[s4] \"What if aliens solved world hunger, but they could only give us carrots or bell peppers?\""
1005005-24 = "What?!"
1005005-25 = "What?!"
1005005-26 = "What kind of choice is that?!"
1005005-27 = "Carrots or bell peppers? That's it?"
1005005-28 = "I'd rather starve than eat either!"
1005005-29 = "[s] \"Come now. You can't really think they're that bad...\""
1005005-30 = "Carrots. And bell peppers. Of course I can."
1005005-31 = "Ugh. I suppose if I HAD to choose..."
1005005-32 = "Then..."
1005005-33 = "...I'd pick carrots. Grudgingly."
1005005-34 = "At least they aren't spicy like bell peppers..."
1005005-35 = "Bleh. Why are you so determined to know?"
1005005-36 = "[s5] \"Because I know a restaurant that makes the best carrots in Kivotos. Let's go together!\"\n[s6] \"Because I want to help you acquire a taste for carrots, and I know the perfect restaurant!\""
1005005-37 = "You want me to eat carrots on purpose? And at a restaurant no less..."
1005005-38 = "You want me to eat carrots on purpose? And at a restaurant no less..."
1005005-39 = "Look, I really appreciate the offer and the fact that you're willing to pay."
1005005-40 = "But could we go somewhere else? There are nicer restaurants than that one."
1005005-41 = "And I'd rather have something more sophisticated."
1005005-42 = "Why go to a carrot restaurant when we could have something better?"
1005005-43 = "[s] \"Kokona. You said you'd choose the carrot.\""
1005005-44 = "I-I know I did, but..."
1005005-45 = "That was only because you made me choose between carrots and bell peppers."
1005005-46 = "What—Why would you take me to a bell pepper restaurant instead?!"
1005005-47 = "Sensei, you're so mean!"
1005005-48 = "I thought you of all people would understand!"
1005005-50 = "Kokona burst into tears, and it was ages before I could calm her down."

[translation]
1005005-1 = "#title;아무리 그래도 싫은 건 싫은 거예요!"
1005005-2 = "#place;시내"
1005005-3 = "#na;(시내를 돌아다니던 도중, 코코나를 만났다.)"
1005005-4 = "3;코코나;01;아, 선생님. 안녕하세요.\n#3;em;[반응]\n#3;greeting\n#3;a"
1005005-5 = "3;코코나;02;고민이 많아 보인다고요? 음…… 역시 선생님에게도 그렇게 보였나요……"
1005005-6 = "3;코코나;01;어떻게 하면 더 자연스럽게, 원생들에게 코코나 교관이라고 불릴 수 있을지 생각하고 있었어요.\n#3;em;[재잘]\n#3;hophop"
1005005-7 = "3;코코나;02;……예전에 선생님께서 도와주셨을 때 말고는, 다시 코코나 쨩이라고 불리고 있거든요……"
1005005-8 = "[s1] \"코코나가 당근을 싫어하는 한.\"\n[s2] \"계속 코코나 쨩으로 불리게 되지 않을까?\""
1005005-9 = "3;코코나;11;그, 그래도 당근은 싫어요!\n#3;em;[속상함]\n#3;stiff"
1005005-10 = "3;코코나;11;그, 그래도 당근은 싫어요!\n#3;em;[속상함]\n#3;stiff"
1005005-11 = "3;코코나;10;뭐라고 하셔도 싫은 건 싫은 거예요!"
1005005-12 = "3;코코나;10;이것만큼은 바꿀 생각 없어요!\n#3;hophop"
1005005-13 = "3;코코나;05;왜 그렇게 당근을 싫어하냐고요?\n#3;em;[?]"
1005005-14 = "3;코코나;05;전 오히려 어떻게 사람이 당근을 먹을 수 있는지가 더 궁금한데요?"
1005005-15 = "3;코코나;05;쓰고, 냄새나고, 딱딱하고……\n#3;stiff"
1005005-16 = "3;코코나;02;원래 당근은 말이죠, 사람이 먹는 채소가 아니었다구요."
1005005-17 = "3;코코나;02;어쩌다 사람까지 당근을 먹게 된 건지…… \n#3;em;[땀]"
1005005-18 = "3;코코나;05;전 이걸 명백한 문화의 후퇴라고 봐요."
1005005-19 = "3;코코나;05;우린 더 나아가야 해요. 나아져야 한다구요."
1005005-20 = "3;코코나;10;당근 같은 걸 먹으면서 수레바퀴를 거꾸로 돌려서는 안 된다구요!\n#3;em;[!]\n#3;hophop"
1005005-21 = "3;코코나;01;아, 피망도 마찬가지예요. 어떤 면에서는 당근보다 더 지독하죠.\n#3;em;[재잘]"
1005005-22 = "3;코코나;01;쓰고 냄새난다는 점은 똑같은 데다, 맵기까지 하잖아요?"
1005005-23 = "[s3] \"그러면 말이지, 만약에.\"\n[s4] \"당근과 피망, 둘 중 하나를 꼭 먹어야 한다면 뭘 먹을 거야?\""
1005005-24 = "3;코코나;06;네?!\n#3;em;[?!]\n#3;shake"
1005005-25 = "3;코코나;06;네?!\n#3;em;[?!]\n#3;shake"
1005005-26 = "3;코코나;06;당근과 피망…… 둘 중 하나요? 그것도 반드시요…?"
1005005-27 = "3;코코나;06;어찌 이런 무서운 선택지가……\n#3;stiff"
1005005-28 = "3;코코나;09;정의는 죽은 것이 분명해요. 그렇지 않고서야 이런 일이 저에게 일어날 리가 없어요. 우와앙!\n#3;hophop"
1005005-29 = "[s] \"……무슨 말인지 모르겠지만, 그렇게까지 충격받을 일이야……?\""
1005005-30 = "3;코코나;11;하지만 당근과 피망이라뇨! 그럴 수밖에 없잖아요?\n#3;em;[!]"
1005005-31 = "3;코코나;12;으우…… 꼭 둘 중 하나를 먹어야 한다면…… 그렇다면……"
1005005-32 = "3;코코나;09;그런 거라면…… 후에에엥……\n#3;stiff"
1005005-33 = "3;코코나;09;……차라리, 당근이요.\n#3;em;…"
1005005-34 = "3;코코나;02;의외라고요? 그치만 피망은 맵기까지 하잖아요……"
1005005-35 = "3;코코나;05;이런 걸 물으시다니, 선생님 나빠요. 못됐어요.\n#3;hophop"
1005005-36 = "[s5] \"그러면, 당근을 맛있게 하는 식당을 알고 있으니까,\"\n[s6] \"꼭 같이 가자!\""
1005005-37 = "3;코코나;02;네……?! 당근, 식당, 이요……?\n#3;em;[?!]\n#3;shake"
1005005-38 = "3;코코나;02;네……?! 당근, 식당, 이요……?\n#3;em;[?!]\n#3;shake"
1005005-39 = "3;코코나;06;꼭 가야 하는 거예요? 선생님이 전부 사 주신다구요? 그건 기쁜데, 고마운데……\n#3;stiff"
1005005-40 = "3;코코나;04;우리, 다른 데 가면 안 돼요? 세상엔 더 맛있는 게 많을 거예요."
1005005-41 = "3;코코나;04;더 좋은 게 많을 거고, 시간을 더 가치 있게 쓸 수도 있을 거예요."
1005005-42 = "3;코코나;12;뭐가 슬퍼서 당근 식당 같은 곳에 가지 않으면 안 되는 거죠?!\n#3;hophop"
1005005-43 = "[s] \"그렇지만 코코나 쨩, 당근을 먹겠다고 했잖아?\""
1005005-44 = "3;코코나;06;부, 분명 그렇게 말하기는 했지만요!\n#3;stiff\n#3;em;[땀]"
1005005-45 = "3;코코나;11;그건…… 피망을 먹느니 차라리 당근을 먹겠다는 말이었고……"
1005005-46 = "3;코코나;09;피망을 맛있게 하는 식당이요? 그건 또 뭐예요! 우와아아앙!\n#3;stiff"
1005005-47 = "3;코코나;09;선생님 나빠요! 못됐어요! 다 싫어요!"
1005005-48 = "3;코코나;09;어른들은 모두 똑같아요! 와아아아앙!\n#3;hophop"
1005005-49 = "#all;hide"
1005005-50 = "#na;(울음을 터트리고만 코코나를 달래느라 제법 고생했다.)"

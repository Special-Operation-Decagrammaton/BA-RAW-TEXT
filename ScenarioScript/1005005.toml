[translation]
1005005-1 = "ไม่ชอบก็คือไม่ชอบสิคะ!"
1005005-2 = "ในตัวเมือง"
1005005-3 = "(คุณครูบังเอิญเจอโคโคน่าตอนที่มาเดินเล่นในเมือง)"
1005005-4 = "อ๊ะ... คุณครู สวัสดีค่ะ"
1005005-5 = "ดูเหมือนกังวลอะไรบางอย่างอยู่งั้นเหรอ อืม... คุณครูก็เห็นเป็นแบบนั้นด้วยสินะคะ"
1005005-6 = "ฉันกำลังคิดอยู่ว่าจะต้องทำยังไงถึงจะให้พวกเด็กๆ เรียกฉันว่าผู้ฝึกสอนได้อย่างเป็นธรรมชาติค่ะ"
1005005-7 = "นอกจากตอนที่คุณครูมาช่วยไว้คราวก่อน เด็กๆ ก็เอาแต่เรียกฉันว่าโคโคน่าจังอีกแล้วค่ะ..."
1005005-8 = "[s1] \"ถ้าโคโคน่ายังเกลียดแคร์รอตแบบนี้ก็คงอีกนาน...\"\n[s2] \"ไม่ชอบแคร์รอตแบบนี้ก็คงถูกเรียกว่าโคโคน่าจังต่อนะ\""
1005005-9 = "ตะ...แต่ว่า ฉันไม่ชอบแคร์รอตเลยนี่คะ!"
1005005-10 = "ตะ...แต่ว่า ฉันไม่ชอบแคร์รอตเลยนี่คะ!"
1005005-11 = "ไม่ชอบยังไงก็คือไม่ชอบค่ะ!"
1005005-12 = "มีแค่เรื่องนี้เท่านั้นที่ฉันจะไม่ยอมเปลี่ยนใจเด็ดขาดค่ะ!"
1005005-13 = "ทำไมถึงไม่ชอบแคร์รอตน่ะเหรอคะ?"
1005005-14 = "ฉันต่างหากละค่ะที่กลับสงสัยซะอีกว่าคนเรากินแคร์รอตเข้าไปได้ยังไงกัน?"
1005005-15 = "มันทั้งขม ทั้งเหม็นเขียว แถมยังแข็งอีกด้วย..."
1005005-16 = "เดิมทีแคร์รอตน่ะ ไม่ใช่อาหารสำหรับมนุษย์นะคะ"
1005005-17 = "คนเราจะกินแคร์รอตไปได้ยังไง..."
1005005-18 = "ฉันคิดว่ามันเป็นความเสื่อมโทรมทางวัฒนธรรมที่เห็นได้ชัดมากเลยค่ะ"
1005005-19 = "พวกเราต้องพัฒนาให้ดีขึ้นสิคะ"
1005005-20 = "จะมากินผักอย่างแคร์รอตแล้วทำให้ตัวเองถดถอยได้ยังไงกันคะ!"
1005005-21 = "อ๊ะ พริกหยวกก็เหมือนกันค่ะ อันที่จริงมันแย่กว่าแคร์รอตซะอีกนะคะ"
1005005-22 = "ขมแล้วก็เหม็นเขียวเหมือนกัน แถมยังเผ็ดอีกด้วย"
1005005-23 = "[s3] \"สมมุติว่าต้องเลือกสักอย่างล่ะ?\"\n[s4] \"ถ้าเกิดต้องเลือก จะกินพริกหยวกหรือแคร์รอตเหรอ?\""
1005005-24 = "คะ?!"
1005005-25 = "คะ?!"
1005005-26 = "แคร์รอตกับพริกหยวก... อย่างใดอย่างหนึ่งเหรอคะ? ต้องเลือกของพวกนั้นน่ะเหรอคะ...?"
1005005-27 = "ไม่ว่าอันไหนก็เป็นทางเลือกที่น่าสยองมาก..."
1005005-28 = "ความยุติธรรมในโลกเราต้องตายจากไปแล้วแน่เลยค่ะ ไม่งั้นฉันคงไม่มาถึงจุดที่ต้องเลือกอะไร#nแบบนี้แน่ๆ มุแงงงง!"
1005005-29 = "[s] \"ครูไม่ค่อยเข้าใจที่พูดเท่าไร แต่มันขนาดนั้นเลยเหรอ?\""
1005005-30 = "ต้องเลือกระหว่างแคร์รอตกับพริกหยวกเลยนะคะ! ฉันต้องเลือกจริงๆ เหรอคะ?"
1005005-31 = "ฮือ... ถ้าต้องเลือกกินอย่างใดอย่างหนึ่งละก็..."
1005005-32 = "ถ้าต้องเลือกจริงๆ ละก็... ฮืออออ..."
1005005-33 = "...เลือกแคร์รอตก็ได้ค่ะ"
1005005-34 = "แปลกใจเหรอคะ? ก็พริกหยวกมันเผ็ดนี่คะ..."
1005005-35 = "คุณครูใจร้าย ถามอะไรกันแบบนี้ ใจร้ายสุดๆ เลยค่ะ"
1005005-36 = "[s5] \"ครูรู้จักร้านอาหารที่ทำแคร์รอตอร่อยๆ ด้วยนะ\"\n[s6] \"ไปกินแคร์รอตอร่อยๆ กันเถอะ!\""
1005005-37 = "คะ...?! ร้านอาหารแคร์รอตเหรอคะ...?"
1005005-38 = "คะ...!? แคร์รอตอร่อยๆ เหรอคะ...?"
1005005-39 = "ต้องไปจริงๆ เหรอคะ? คุณครูจะเลี้ยงทุกอย่างเลยเหรอคะ? ที่คุณครูจะเลี้ยงฉันก็ดีใจอยู่หรอก..."
1005005-40 = "แต่พวกเราไปกินที่ร้านอื่นกันไม่ได้เหรอคะ? ในโลกนี้มีของอร่อยๆ อยู่ตั้งเยอะนะคะ"
1005005-41 = "มีของดีกว่าแคร์รอตที่คุ้มค่าที่จะใช้เวลาด้วยอยู่ตั้งเยอะนะคะ"
1005005-42 = "ไม่ไปร้านอาหารแคร์รอตที่น่าหดหู่แบบนั้นไม่ได้เหรอคะ?!"
1005005-43 = "[s] \"แต่โคโคน่าจังบอกว่าจะกินแคร์รอตไม่ใช่เหรอ?\""
1005005-44 = "ฉะ...ฉันตอบไปแบบนั้นก็จริงอยู่หรอกค่ะ!"
1005005-45 = "มันก็ยังดีซะกว่าการที่ต้องมากินพริกหยวกนี่คะ..."
1005005-46 = "คุณครูรู้จักร้านอาหารที่ทำพริกหยวกอร่อยๆ เหรอคะ? อะไรกันอีกคะ! แงงงง!"
1005005-47 = "คุณครูใจร้าย ใจร้ายที่สุด เกลียดที่สุดเลย!"
1005005-48 = "ผู้ใหญ่ทุกคนเหมือนกันหมดเลย! แงงงงง!"
1005005-50 = "(หลังจากนั้นคุณครูก็ต้องเหนื่อยปลอบใจโคโคน่าเพราะเธอร้องไห้ไม่หยุด...)"

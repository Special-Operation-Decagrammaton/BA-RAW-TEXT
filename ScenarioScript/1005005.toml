[translation]
1005005-1 = "不管怎麼說，討厭的東西就是討厭！"
1005005-2 = "白天的街道"
1005005-3 = "（在市區散步時，偶然遇見了心菜）"
1005005-4 = "啊，老師。你好。"
1005005-5 = "哈哈……你說我看起來好像很累？果然老師也這麼覺得嗎……"
1005005-6 = "我正在思考，該怎麼樣才能讓學生們更自然地開口叫我教官。"
1005005-7 = "上次老師來過之後，她們又改口叫我心菜醬了……"
1005005-8 = "[s1]「只要你一天不改掉不吃紅蘿蔔的壞習慣……」\n[s2]「我想他們應該就會一直叫你『心菜醬』吧？」"
1005005-9 = "可是我就是討厭吃紅蘿蔔！"
1005005-10 = "可是我就是討厭吃紅蘿蔔！"
1005005-11 = "不管怎樣，討厭的東西就是討厭！"
1005005-12 = "至少這一點我完全不想改！"
1005005-13 = "你問我為什麼這麼討厭紅蘿蔔？嗯……"
1005005-14 = "我反而更好奇為什麼其他人敢吃紅蘿蔔呢。"
1005005-15 = "又苦又硬又臭……"
1005005-16 = "說到底，紅蘿蔔本來就不是人類可以吃的蔬菜吧。"
1005005-17 = "但為什麼現在連人類都開始吃紅蘿蔔了呢…… "
1005005-18 = "我認為這肯定是文明倒退了。"
1005005-19 = "我們必須更加進步才行，必須要不斷進化。"
1005005-20 = "不能因為紅蘿蔔而讓人類的文明走回頭路！"
1005005-21 = "啊，青椒也是一樣。從某個角度來說，青椒甚至比紅蘿蔔更糟糕。"
1005005-22 = "除了一樣又苦又臭，甚至還有點辣辣的！"
1005005-23 = "[s3]「那要是……」\n[s4]「紅蘿蔔和青椒，你一定要挑一個吃的話，你會吃哪個？」"
1005005-24 = "什麼？"
1005005-25 = "什麼？"
1005005-26 = "一定要……從紅蘿蔔和青椒中……挑一個……？"
1005005-27 = "這是什麼可怕的二選一……"
1005005-28 = "想必肯定是正義已死！不然的話，怎麼可能發生這種事……哇啊啊！"
1005005-29 = "[s]「有，有那麼嚴重嗎……？」"
1005005-30 = "紅蘿蔔和青椒耶！只有可能是那樣了吧……"
1005005-31 = "嗚嗚……如果不得不吃其中一種的話……那我……"
1005005-32 = "那我……嗚嗚嗚嗚……"
1005005-33 = "……我寧願選擇紅蘿蔔。"
1005005-34 = "你說你很意外？因為青椒還多了辣味啊……"
1005005-35 = "居然問這種問題，老師你真的很壞，壞透了！"
1005005-36 = "[s5]「對不起啦……我知道有一家餐廳的紅蘿蔔料理很好吃。」\n[s6]「不如一起去吃吃看吧？」"
1005005-37 = "什麼……！？紅蘿蔔，餐廳，嗎……？"
1005005-38 = "什麼……！？紅蘿蔔，餐廳，嗎……？"
1005005-39 = "我一定要去嗎？老師會請客……？雖然很開心很感謝啦……"
1005005-40 = "我們不能去別的餐廳嗎？這世界上應該還有很多更好吃的東西吧……"
1005005-41 = "應該能將時間花在更有意義的事情上面吧？"
1005005-42 = "我們何必去紅蘿蔔餐廳那種地方找罪受呢！？"
1005005-43 = "[s]「不過心菜醬，你剛才不是說你要吃紅蘿蔔嗎？」"
1005005-44 = "雖，雖然我是那樣說過！"
1005005-45 = "不過……我的意思是說與其要我吃青椒，我寧願吃紅蘿蔔……"
1005005-46 = "又不是說想去主打青椒料理的餐廳……啊！我在說什麼啦！？嗚哇啊啊啊！"
1005005-47 = "老師是壞蛋！大壞蛋！老師討厭！"
1005005-48 = "大人全都一樣壞！哇啊啊啊啊！"
1005005-50 = "（為了安慰開始大哭的心菜費了好一番功夫）"

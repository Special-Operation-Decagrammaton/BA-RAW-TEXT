[translation]
90002080-1 = "第8話;Level Up"
90002080-3 = "這個鋼鐵大陸是將第7名預言者涅察赫極端地「進化」，使其的存在擴張。"
90002080-4 = "在過程中涅察赫原本的模樣已經破碎，幾乎找不到任何痕跡……"
90002080-5 = "總之，如今的鋼鐵大陸集結了所有十字神名的預言者，而各預言者分別鎮守著被分配的區域。"
90002080-6 = "嚴格說起來是複製體……但與原型沒有差異。"
90002080-7 = "原來複製體！果然。"
90002080-8 = "是的，反正只要按照那三人的計畫，奇普托斯被鋼鐵大陸全面覆蓋的話，隨時都能在系統層面整合回去。"
90002080-9 = "可是……我在這裡有些問題。"
90002080-10 = "怎麼了，Kei？"
90002080-11 = "那些預言者身在何處……現在很難進行追蹤。"
90002080-12 = "果然是安全等級與隱蔽性的問題嗎？"
90002080-13 = "沒錯，陽葵。如果用稍微直接的說法……"
90002080-14 = "大家真的很會藏呢。"
90002080-15 = "應該說是補償吧。我掌握了那三名新預言者的一些附帶資訊。"
90002080-16 = "其餘七名已經記錄在我們取得的「生命之樹」系統樹上，可以拿來參考。"
90002080-17 = "首先鋼鐵大陸的本體「[ruby=NETZACH]涅察赫[/ruby]」。#n其別名為「證明勝利的無限之地」，Path則是「終於實現的勝利」。"
90002080-22 = "某方面來說，是個容易理解的別名呢。"
90002080-23 = "沒錯……就是這樣。還有特別難以追蹤行蹤的「[ruby=YESOD]耶索德[/ruby]」。#n別名是「立於基礎之上的力量淨化者」。"
90002080-24 = "Path是「邁向完成的真理」。"
90002080-29 = "我一直想問，那些別名或Path有什麼意義？有了這些，效率會有所提升嗎？"
90002080-30 = "其實我也不太清楚，但鋼鐵大陸似乎是以此為基礎調整能量流動……"
90002080-31 = "好像試圖抵達某種新的可能性。"
90002080-32 = "哦哦，那新的可能性是什麼？"
90002080-33 = "……我也不知道。"
90002080-34 = "哎呀，什麼啊！說得好像很懂，其實什麼都不知道！"
90002080-35 = "你說什麼！？"
90002080-36 = "姐姐！怎麼能那樣說！K，Kei醬你別生氣。我代替他道歉……"
90002080-37 = "咯……不用了，綠。好像是我太激動了。"
90002080-38 = "嘿嘿。對吧？"
90002080-39 = "桃～井～！！！！！"
90002080-43 = "啊哈哈哈！Kei生氣了！"
90002080-44 = "唉……"
90002080-45 = "算了……最後是「[ruby=MALKUTH]馬爾庫特[/ruby]」。#n別名「到達世界盡頭的王國巡禮者」。"
90002080-46 = "然後Path好像是……「在旗幟之下創造出來的意志」。"
90002080-54 = "聽起來有點靈感了耶？下次做遊戲時可以參考一下？"
90002080-55 = "……是的。說不定挺合適的。"
90002080-56 = "哎呀？不生氣了嗎？"
90002080-57 = "與其看他們弄那些文字遊戲，自己玩設定自娛自樂。"
90002080-58 = "乾脆拿去當桃井的劇本素材使用，說不定還更能增進世界的公共利益。"
90002080-59 = "K，Kei醬……也不用說到那種程度……"
90002080-60 = "……對不起，柚子。我說得有點過分。"
90002080-61 = "嗯？怎麼了？"
90002080-62 = "不對。聽到Kei道歉，反而賺到了呢？"
90002080-63 = "……好哦……我們的桃井，本來就是這樣……"
90002080-64 = "那，那真是……太好了……？"
90002080-65 = "總之，最大的問題還是馬爾庫特。"
90002080-66 = "馬爾庫特的力量……正如我們親眼所見，是目前難以承擔的威力。"
90002080-67 = "如果動真格的話，當場把我們全滅也不是不可能。但是馬爾庫特卻沒有那麼做。"
90002080-68 = "反而像被什麼追趕似地迅速撤退。"
90002080-69 = "[s]「什麼意思？」"
90002080-70 = "這個嘛。首先能猜想到的，有可能是馬爾庫特的運作時間極其短暫。"
90002080-75 = "只能速戰速決而設計的一次性機體？這是一種技術驗證機？"
90002080-76 = "那作為實戰用途太爛了吧。最重要的是規格化與標準化。"
90002080-77 = "戰爭取決於數量。"
90002080-83 = "……又或者並非單純為戰鬥而製造。"
90002080-84 = "哦……馬爾庫特被賦予別的用途的意思嗎？"
90002080-86 = "如果時間充裕還可以在此無限推演更多可能，但現在沒有那種時間了。"
90002080-87 = "總之，如今的鋼鐵大陸確實被分割為各預言者掌管的區域。"
90002080-88 = "而我們可以……再次「佔領」那些區域，使其成為我們的[ruby=territory]領域[/ruby]。"
90002080-89 = "話說回來，十字神名的兵力與勞工機器人已經不再進攻了？"
90002080-90 = "我剛剛錯過說的時機，其實區域佔領不久前已經完成。"
90002080-91 = "具體來說，就在馬爾庫特襲擊我們的同時。"
90002080-92 = "而十字神名的兵力和勞工機器人支援也在那一刻停止了。"
90002080-93 = "這樣呀，只要電子層面佔領成功的話，就能阻斷敵方的支援。"
90002080-98 = "成功佔領區域之後，才能真正與該區域的預言者交戰。"
90002080-99 = "最後如果擊敗預言者…… 其「核心資訊」的資料，就能吸收進我的這副身體裡。"
90002080-100 = "……因為這副身體本來就源自於鋼鐵大陸。"
90002080-101 = "吸收預言者的核心資訊能做什麼？"
90002080-102 = "吸收越多資訊核心，鋼鐵大陸就會把我視為……某種…… "
90002080-103 = "預言者的集合體，或是更高階的存在。一種高階安全等級。"
90002080-104 = "當我取得全部資訊核心，就能直接向鋼鐵大陸下達指令。"
90002080-105 = "例如「停止擴張與運作」之類的。"
90002080-106 = "[s]「嗯？那這場鋼鐵大陸事件……！」"
90002080-107 = "是的，就有可能從根本上解決。"
90002080-111 = "……"
90002080-112 = "我知道了！在鋼鐵大陸每佔領一區域並擊敗一名預言者，Kei就會不斷升級！"
90002080-113 = "而滿級後的Kei就能直接讓鋼鐵大陸停止！"
90002080-114 = "是的，這個比喻很好。愛麗絲，但是……"
90002080-115 = "但是……"
90002080-116 = "目前能馬上交戰的預言者不是10名，而是只有8名。 "
90002080-117 = "就是說……不是100級，我最多只能升到80級。"
90002080-119 = "咦？這麼說來……也是？"
90002080-120 = "現在對涅察赫和馬爾庫特還沒有對策……"
90002080-122 = "但是，這可以說是唯一的辦法。"
90002080-123 = "至少能對鋼鐵大陸的運作與擴張方式……可以造成混亂。"
90002080-124 = "[s]「那麼目標就明確了呢。」"
90002080-129 = "是的，老師，我們現在開始佔領各區域並擊敗預言者。"
90002080-130 = "回收核心資訊並儲存到Kei身上。"
90002080-131 = "若一切順利，Kei就能……直接擾亂鋼鐵大陸的運作結構。"
90002080-132 = "決定好了呢。老師，"
90002080-133 = "既然如此，我們就進行物理層面的準備。"
90002080-134 = "[s]「物理層面的準備？」"
90002080-135 = "是的，首先我的Abi-Eshuh直接再裝備……似乎很困難呢。"
90002080-136 = "與馬爾庫特的防衛戰中，外部零件幾乎全毀。 "
90002080-137 = "雖然只有一部份，但基礎框架也有明顯損傷。若僅回收可用零件再利用或許可行。"
90002080-138 = "但所有條件來看，目前最佳方案是把Abi-Eshuh轉交給可愛的愛麗絲。"
90002080-140 = "什，什麼！？把Abi-Eshuh，交給愛麗絲！？但是……！"
90002080-141 = "不，愛麗絲，現在只能做能力所及之事，並善用一切可用資源。"
90002080-142 = "但問題是必須要抽出框架、重新整備並改造為適合愛麗絲的型態。"
90002080-143 = "但現在沒有充足的時間。"
90002080-144 = "而且不只是愛麗絲，其他人也需要進行重新武裝。"
90002080-145 = "但是現在光維持區域就已經吃力……"
90002080-149 = "……"
90002080-150 = "那麼具體需要什麼？"
90002080-152 = "咦，咦？就是……"
90002080-153 = "首先……要先修好運輸船？然後照季說的進行重新整備、改造和額外加裝必要零件。"
90002080-154 = "人手嚴重不足與AMAS幾乎全毀，還需要各種自動化輔助設備──"
90002080-160 = "[ns]「嗚哇……」"
90002080-162 = "幾，幾乎等於重建一座工廠……"
90002080-167 = "是的，如果不考慮現實面的話。但那不可能的，必須再尋找對策……"
90002080-169 = "只要準備齊全，就能做到吧？"
90002080-171 = "！？"
90002080-172 = "！？"
90002080-174 = "K，Kei？愛麗絲可能還不太清楚，莉央前輩說的聽起來完全不可能……？"
90002080-175 = "不，可以做到的。當然光靠我一人是做不到的。"
90002080-176 = "愛麗絲和我一起的話，就絕對沒問題。"
90002080-177 = "愛麗絲嗎……？"
90002080-178 = "是的，物質重建是無名之神的力量最代表性的特質。這句話好像也說過很多次。"
90002080-179 = "而整個鋼鐵大陸，本來就是基於那股力量重構而成。"
90002080-180 = "是的，這確實是我們出發前往鋼鐵大陸之前理解並接受的事實……該不會！？"
90002080-181 = "沒錯。就是那個「該不會」。"
90002080-182 = "Kei，辦得到嗎！？"
90002080-183 = "只要跟愛麗絲一起的話。"
90002080-184 = "但是愛麗絲什麼…… 都不懂……？"
90002080-185 = "沒事的。愛麗絲，跟那時候一樣。"
90002080-190 = "這裡比起任何地方都充滿了無名之神的力量。尤其是在與馬爾庫特的防禦戰中我深刻體會到那一點。"
90002080-191 = "……雖然被扭曲過……也不是不能用。"
90002080-192 = "如今有了這副身體，可以比那時候更加精密地整流。"
90002080-193 = "所以就在這裡讓你看看吧，愛麗絲。 "
90002080-194 = "我們能做到什麼，我們是什麼樣的存在。"
90002080-200 = "我們……本該是什麼。"
90002080-201 = "愛麗絲……該做什麼呢？"
90002080-216 = "很簡單。請看著我的眼睛。就跟那個時候一樣。#n沒錯，就是這樣。"
90002080-217 = "請伸出手。這將成為從我通往你的通道。"
90002080-218 = "然後請去想像。"
90002080-233 = "想……像？"
90002080-234 = "是的，大家需要的東西。剛剛莉央說的東西。Abi-Eshuh的框架，以此為基礎你能成為的模樣。"
90002080-235 = "……你在這一瞬間，將成為的樣子。"
90002080-236 = "只要描繪大致形態就可以了。細節就由我補齊。專注於你想成為的那個樣子。"
90002080-240 = "不需要害怕。愛麗絲，"
90002080-241 = "如同極光降臨的那夜。"
90002080-255 = "讓你的一切，充滿尚未抵達的可能性。"
90002080-260 = "愛麗絲，醬……Kei醬……"
90002080-262 = "哇啊……總覺得現在好像，遊戲動畫一樣……"
90002080-263 = "嗯……這次姐姐的比喻很貼切……"
90002080-264 = "愛麗絲……"
90002080-269 = "……"
90002080-270 = "嗯，嗯嗯？愛麗絲，好像獲得了……超強鐵甲。這到底是……！"
90002080-272 = "是的，是「我們」所能抵達的一種可能性。"
90002080-273 = "這就是屬於愛麗絲的Abi-Eshuh啊。"
90002080-274 = "親眼見到「特異現象」感覺如何？部長？"
90002080-275 = "其實自從來到鋼鐵大陸後，一切都可以算是特異現象，儘管如此，這個卻是其中最令我印象深刻的。"
90002080-277 = "也是最令人振奮的特異現象呢。"
90002080-279 = "下一話;Dress Up"

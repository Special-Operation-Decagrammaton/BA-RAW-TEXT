[translation]
1000002-1 = "วิธีเพิ่มแรงจูงใจในการทำงาน"
1000002-2 = "ฮุฮุฮุ คุณครู"
1000002-3 = "คุณครูอยากได้รางวัลอะไรบ้างไหม?"
1000002-4 = "[s1] \"ขอเป็นทองแท่งแล้วกัน\"\n[s2] \"อยากให้อารุลูบหัวแล้วชมหน่อย\""
1000002-5 = "คะ...ครูเป็นผู้ใหญ่แล้วนะ.....!"
1000002-6 = "มะ... ไม่มีอะไรที่โรแมนติกๆ สำหรับคุณครูกว่านั้นบ้างรึไง....?!\n"
1000002-7 = "อึ่ก... ลูบหัวแล้วชมงั้นเหรอ?!"
1000002-8 = "ไม่อยากเชื่อเลยว่าอยากได้ของรางวัลแบบนั้น"
1000002-9 = "อะ...อยากได้แค่นี้จริงๆ เหรอ...? ถ้าแค่ลูบละก็... ฉันทำให้ได้อยู่แล้วละ"
1000002-11 = "[s] \"อืม... หอมแก้มด้วยได้ไหม?\""
1000002-12 = "หะ....หอมแก้มเรอะ...!"
1000002-13 = "ไม่ได้เด็ดขาด ถึงจะสนิทกันแค่ไหนก็เถอะ แต่เราควรทำความรู้จักและสานสัมพันธ์กันไปทีละนิดๆ สิ....!"
1000002-14 = "แล้วก็จูบแรกน่ะ ควรจะต้องเป็นสถานที่ที่โรแมนติกอย่างร้านอาหารที่มีวิวกลางคืนสวยๆ...."
1000002-15 = "[s] \"คิดอีกทีขอเป็นทองแท่งดีกว่า...\""
1000002-16 = "(นี่คุณครูล้อฉันเล่นอยู่รึยังไง?!)"
1000002-19 = "เฮ้อ เหนื่อยสุดๆ เลย"
1000002-20 = "คุณครูลองคิดแบบจริงจังหน่อยสิ ทำงานหนักแบบนี้ก็ควรได้ของตอบแทนที่สมน้ำสมเนื้อบ้าง"
1000002-21 = "รางวัลตอบแทนเป็นของที่ทุกคนควรได้เพื่อจูงใจให้ตั้งใจทำงานไม่ใช่รึไง?"
1000002-22 = "[s] \"พอเป็นเรื่องแบบนี้ อารุก็หัวรั้นเหมือนกันนะ\""
1000002-23 = "ฮุฮุฮุ ถ้าอยากให้พนักงานเพอร์เฟกต์ ฉันก็ต้องเป็นหัวหน้าที่เพอร์เฟกต์ก่อนสิ"
1000002-24 = "หัวหน้าที่ดีจะต้องเป็นลงมือก่อนที่ลูกน้องจะเอ่ยปากขอนะ"
1000002-25 = "ทุกคนจะต้องชื่นชมในความเป็นผู้นำของฉันแน่ๆ ฮุฮุฮุ!"
1000002-26 = "[s] \"ถ้าอย่างนั้นละก็ ครูมีของที่อยากได้จากอารุอยู่นะ\""
1000002-27 = "หืม?"
1000002-29 = "สวีต คิวบ์"
1000002-30 = "อยากไปกินของหวานที่คาเฟ่กับฉันงั้นเหรอ...."
1000002-31 = "คุณครูแน่ใจนะว่าอยากได้รางวัลตอบแทนแบบนี้น่ะ?"
1000002-32 = "[s] \"การได้กินขนมกับอารุน่ะสำคัญมากนะ\""
1000002-33 = "กะ...กินขนมกับฉันเป็นเรื่องสำคัญยังไงกัน?"
1000002-34 = "อะ...อืม... ถ้าคุณครูยืนกรานแบบนั้นก็ช่วยไม่ได้นะ"
1000002-35 = "อื้อ... เพราะคุณครูขอมาเองนะ แล้วอย่ามาขออย่างอื่นทีหลังแล้วกัน"
1000002-36 = "คุณครูอยากกินพาร์เฟต์แบบไหนล่ะ?"
1000002-42 = "ไอศกรีมที่สั่ง <เมนูท้าพิสูจน์พาร์เฟต์คู่รัก \"พาร์เฟต์จัมโบ้ไซซ์ยักษ์ใหญ่ที่กินไม่มีวันหมด~> มาแล้วครับ!"
1000002-43 = "จะ...จัมโบ้? เมนูท้าพิสูจน์? นะ...นี่มันอะไรกันเนี่ย?"
1000002-44 = "[s] \"เห็นว่าถ้ากินหมดใน 20 นาทีจะได้กินฟรีนะ\""
1000002-45 = "ถ้ากินหมดในเวลาที่กำหนดจะได้กินฟรีเหรอ...?"
1000002-46 = "ฮุฮุฮุ สมกับเป็นคุณครูเลย"
1000002-47 = "ถึงเป็นของรางวัลแต่ก็เลือกได้ดี ไม่สูญเปล่าเลยนะ...."
1000002-48 = "สมแล้วที่เป็นที่ปรึกษาด้านการบริหารของหน่วยรับจ้างสารพัดเรา!"
1000002-49 = "[s] \"ที่ปรึกษาด้านการบริหารเหรอ?\""
1000002-50 = "เลิกคุยดีกว่า ฉันรับคำท้า!"
1000002-51 = "เอ้า กินเถอะ คุณครู!"
1000002-52 = "ง่ำๆ"
1000002-55 = "(เดี๋ยวก่อนนะ...)"
1000002-56 = "(นี่มันเมนูคู่รักไม่ใช่เหรอ...?!)"
1000002-57 = "(คุณครูสั่งเมนูนี้โดยไม่คิดอะไรเลยงั้นเรอะ....!)"
1000002-58 = "(ฮะ...ฮึ่ม...!)"
1000002-59 = "(กังวลอะไรเล่า แค่นี้กินหมดได้แบบสบายๆ อยู่แล้ว...)"
1000002-60 = "(....หวังว่าคุณครูจะไม่สังเกตเห็นตอนที่ฉันตกใจนะ)"

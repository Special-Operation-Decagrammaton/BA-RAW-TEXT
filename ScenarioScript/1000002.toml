[translation]
1000002-1 = "Motivating Your Workers"
1000002-2 = "Heh heh heh. So, Sensei..."
1000002-3 = "If I offered you a reward for your work, what would you want?"
1000002-4 = "[s1] \"A gold bar.\"\n[s2] \"One pat on the head please.\""
1000002-5 = "That's the best you can think of?!"
1000002-6 = "Why not ask for something more...extravagant?"
1000002-7 = "Ugh. You want me to head pat you?!"
1000002-8 = "You can't be serious."
1000002-9 = "Is that really what you want...? I could give you whatever you want, you know."
1000002-11 = "[s] \"Then how about a kiss on the cheek?\""
1000002-12 = "A k-kiss...on the cheek?!"
1000002-13 = "Absolutely not. Sure, our working relationship is good, but it's too early for us to go that far!"
1000002-14 = "Our first kiss should be at a romantic restaurant with a view of the night sky..."
1000002-15 = "[s] \"On second thought, I'll take the gold bar.\""
1000002-16 = "(Are you teasing me, Sensei?!)"
1000002-19 = "*sigh* My head hurts."
1000002-20 = "Try to take this seriously, Sensei. It should be a reward worthy of your performance."
1000002-21 = "How else would I keep my little worker bees motivated?"
1000002-22 = "[s] \"You're always stubborn about things like this.\""
1000002-23 = "Heh heh. If I want the best working for me, then I have to be the best boss."
1000002-24 = "Every great leader knows they have to take the initiative."
1000002-25 = "My employees will be in awe of my excellent leadership. Hahaha!"
1000002-26 = "[s] \"Well, if you insist. There is a certain something I want.\""
1000002-27 = "Hmm?"
1000002-29 = "Sweet Cube"
1000002-30 = "You want us to share a parfait...?"
1000002-31 = "Are you sure this is the reward you want, Sensei?"
1000002-32 = "[s] \"It's important that we eat this together, Aru.\""
1000002-33 = "Wh-Why would it be important to eat it with me...?"
1000002-34 = "H-Hmph... Well, if you say so."
1000002-35 = "You had better not change your mind and ask for something later, got it?"
1000002-36 = "So, what kind of parfait did you order?"
1000002-42 = "Here you are: the Couple's Challenge Special Triple-Stack Jumbo Parfait. Dig in and conquer the unending mountain of cream!"
1000002-43 = "Ch-Challenge? What does that mean?"
1000002-44 = "[s] \"It's free if we can finish it within 20 minutes.\""
1000002-45 = "We have to eat the whole thing within a time limit...?"
1000002-46 = "Heh. This is just like you, Sensei. "
1000002-47 = "Making an efficient choice, even during what is supposed to be your reward..."
1000002-48 = "This is why you should be Problem Solver's management consultant!"
1000002-49 = "[s] \"Management consultant?\""
1000002-50 = "All right, enough talk! Challenge accepted!"
1000002-51 = "Let's eat, Sensei!"
1000002-52 = "Nom, nom."
1000002-55 = "(Wait a second...)"
1000002-56 = "(Is this thing meant for couples?!)"
1000002-57 = "(You didn't mention that part, Sensei!)"
1000002-58 = "(H-Hmph!)"
1000002-59 = "(What am I thinking? Th-This should be easy for me...)"
1000002-60 = "(I hope Sensei didn't notice I was embarrassed!)"

[translation]
1000002-1 = "提高工作熱情的方法"
1000002-2 = "哼哼哼，就是這麼回事，老師。"
1000002-3 = "你有沒有什麼想要的獎賞？"
1000002-4 = "[s1] 「果然還是紅包。」\n[s2] 「想被亞瑠摸摸頭。」"
1000002-5 = "大，大人……！"
1000002-6 = "呃，不，不是這種的，老師沒有什麼更浪漫的願望嗎……！？"
1000002-7 = "摸，摸摸頭！？"
1000002-8 = "沒想到，那就是老師想得到的獎賞……"
1000002-9 = "真，真的那種東西就可以了嗎……？那樣的話，不管多少都……"
1000002-11 = "[s] 「要不然，親臉頰之類的？」"
1000002-12 = "親──！？親、親，親臉頰什麼的……！"
1000002-13 = "那，那個不行。就算是社長和優秀員工的關係，那種事還是需要慢慢花時間循序漸進再……！"
1000002-14 = "果然第一次，還是在能夠俯瞰夜景的餐廳……"
1000002-15 = "[s] 「但是仔細想想，果然還是紅包比較好。」"
1000002-16 = "（難道說，老師是在耍我嗎！？）"
1000002-19 = "哈啊，感覺莫名地累啊。 "
1000002-20 = "老師，拜託你認真一點考慮。我想給你符合優秀成果的獎賞。"
1000002-21 = "這是為了提高員工的工作熱情必要的事唷？"
1000002-22 = "[s] 「亞瑠在那方面很認真呢。」"
1000002-23 = "哼哼哼，為了指揮優秀的員工們，我也必須成為跟她們一樣優秀的社長才行。"
1000002-24 = "在部下開口前就率先行動的領袖……"
1000002-25 = "我相信我的部下們一定會對我出眾的領導能力讚不絕口呢。哼哼哼！"
1000002-26 = "[s] 「那樣的話，我希望亞瑠給我一個獎賞。」"
1000002-27 = "嗯？"
1000002-29 = "甜點方塊"
1000002-30 = "居然想跟我這個社長一起在咖啡店裡吃聖代……"
1000002-31 = "老師真的認為，這種獎賞就可以了嗎？"
1000002-32 = "[s] 「重要的是能和亞瑠一起吃。」"
1000002-33 = "和，和我一起，重要……"
1000002-34 = "哼，哼嗯……嘛，既然你都那麼說就沒辦法了。"
1000002-35 = "好，老師都那麼說了。之後別抱怨哦？"
1000002-36 = "所以，你點了什麼聖代？"
1000002-42 = "這是你點的，情侶專用挑戰菜單，「不要停下手，挑戰吧，朝著無盡的奶油山～接招吧！巨無霸聖代三段突刺～」！"
1000002-43 = "挑，挑戰？巨無霸？什，什麼意思？"
1000002-44 = "[s] 「聽說在20分鐘內吃完就免費。」"
1000002-45 = "只要在限制時間內全部吃光就免費……？"
1000002-46 = "哼哼哼。原來如此，不愧是老師呢。"
1000002-47 = "這是個好選擇，也給其他員工這個當作獎賞吧。"
1000002-48 = "不愧是，我們便利屋的經營顧問呢！"
1000002-49 = "[s] 「經營顧問是？」"
1000002-50 = "不用管那些瑣事，那個挑戰，我接受了！"
1000002-51 = "來，快吃吧，老師！"
1000002-52 = "啊姆。"
1000002-55 = "（話說回來，這東西……）"
1000002-56 = "（雖然沒什麼在意就開始吃了，情侶專用菜單……！？）"
1000002-57 = "（老師真是的，居然若無其事地點了這種東西……！）"
1000002-58 = "（……唔，哼！）"
1000002-59 = "（嘛，這，這種程度對我來說只是小事一樁……？）"
1000002-60 = "（……應該沒有表現在臉上，被老師發現吧？）"

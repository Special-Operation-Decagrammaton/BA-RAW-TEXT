[translation]
90000165-4 = "อ่า... ทีนี้ก็ใกล้จะเสร็จแล้วค่ะ..."
90000165-5 = "อื้ม! การสร้าง <พี่สาว> ใกล้จะเสร็จสมบูรณ์แล้ว!"
90000165-6 = "ถ้าตื่นมาแล้วพี่สาวจะจำชื่อพวกเราได้ไหมนะ? ถ้าจำไม่ได้จะทำยังไงดีล่ะคะ? แต่ก็นะ... ไม่เป็นไรหรอก"
90000165-11 = "พี่คะ... ช่วยลืมตาด้วยค่ะ"
90000165-12 = "พี่... อาณาจักรของเดคาแกรมมาทอน..."
90000165-14 = "<มัลคูธ> ของพวกเรา..."
90000165-19 = "ภาคเดคาแกรมมาทอน;ติดตามต่อในบทที่ 2"

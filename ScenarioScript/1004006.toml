[translation]
1004006-1 = "作為忍者，活躍的機會……！"
1004006-2 = "（為了和月夜進行忍術的修行，正在找適合場所的某一天……）"
1004006-3 = "巧可～！跑去哪裡了，巧可～！？"
1004006-4 = "啊咧，那個孩子……"
1004006-5 = "[s]「之前，月夜幫助的孩子……？」"
1004006-6 = "那個，發生，什麼事了嗎……？"
1004006-7 = "啊！之前幫助我的姊姊……！還有，另一個人……！"
1004006-8 = "[s]「妳好，我是另一個人。話說回來，發生什麼事了嗎？」"
1004006-9 = "（啜泣）……巧可牠，不見了……"
1004006-10 = "巧可……嗎？"
1004006-11 = "嗯，是我家的狗……剛才還在一起散步……"
1004006-12 = "因為我不小心放開牽繩，就不知道跑去哪裡了……"
1004006-13 = "怎麼辦，如果就這樣再也見不到的話……！唔……嗚嗚……！"
1004006-14 = "沒關係，請冷靜，下來……"
1004006-15 = "由我來說，也許有點那個，那個……"
1004006-16 = "老師，該怎麼辦……！？"
1004006-17 = "[s]「沒關係，交給我們。」"
1004006-19 = "……咦？"
1004006-20 = "……？"
1004006-21 = "[s1]「走吧，月夜！」\n[s2]「解決委託人的煩惱，同時作為忍者成長一步的機會！」"
1004006-22 = "原來如此……！"
1004006-23 = "原來如此……！"
1004006-24 = "是的，了解了……！身為忍者，只能努力了……！"
1004006-25 = "請不用，擔心。我……我和老師，一定會，找回巧可醬的……！"
1004006-26 = "（啜泣）……真的……？"
1004006-27 = "是的……！"
1004006-28 = "……嗯，謝謝！"
1004006-30 = "追蹤目標時的基礎，首先是探索，對象可能會出現的場所……！"
1004006-31 = "根據剛才聽到的話，首先只要去探索散步路線的話……"
1004006-32 = "[s]「好厲害！現在的月夜，完全是忍者唷！」"
1004006-33 = "是，那樣嗎……？欸嘿嘿……因為即使這樣，也一直在，學習……"
1004006-34 = "終於到了，實踐的時候……！請，交給我……！"
1004006-35 = "（也許可以讓老師，看見帥氣的身姿，也說不定……！）"
1004006-36 = "[s]「……話說月夜。」"
1004006-37 = "是的，請問，怎麼了嗎？"
1004006-38 = "[s]「在那邊的狗，該不會是巧可醬……？」"
1004006-39 = "……咦？"
1004006-44 = "[ns]「啊，逃走了。」"
1004006-45 = "啊啊……！明明出來了，卻逃走了……！？"
1004006-46 = "請，請等一下，巧可醬……！"
1004006-53 = "請，停下來……！"
1004006-60 = "停，停下來……"
1004006-66 = "停，停下…………"
1004006-73 = "[ns]「好──乖好乖，就那樣乖乖的別動哦……」"
1004006-75 = "[ns]「就是現在！」"
1004006-82 = "（總算是，成功抓住巧可醬了）"
1004006-84 = "[ns3]「月夜，抓到巧可醬了唷！」\n[ns4]「……呃，月夜？」"
1004006-90 = "老師，請救救我……"
1004006-92 = "[ns]「根據剛才聽說的，在這邊……？」"
1004006-93 = "老師，在這裡……"
1004006-94 = "[s]「從這裡傳出了聲音……」"
1004006-97 = "― 嗚……[wa:1060] "
1004006-99 = "― 想通過這裡，走近路，的說……[wa:4240] "
1004006-102 = "― 如老師所見，在中途，[wa:2800] "
1004006-104 = "― 卡住了……"
1004006-107 = "― 不過，正是這種時候……[wa:2730] "
1004006-109 = "― 要靠忍術，想辦法……！？[wa:1840] "
1004006-112 = "― 嗯呃，嗯咕呣呣呣呣呣……！！[wa:1620] "
1004006-114 = "― 果然，還是沒辦法……[wa:2660] "
1004006-117 = "― 嗚，嗚……[wa:2420] "
1004006-119 = "― 老師……可以，幫我嗎……[wa:3680] "
1004006-125 = " 啊！巧可！"
1004006-127 = "姊姊！謝謝妳幫我找到巧可！"
1004006-128 = "不，並不是什麼……身為忍者，這是，家常便飯！"
1004006-129 = "巧可醬也……不可以再讓人，擔心了唷？"
1004006-131 = "呀，等，不要舔……！好，好癢……！啊，等等……！？"
1004006-132 = "怎麼會，臉，被舔的話……！"
1004006-133 = "……話說姊姊，衣服和頭髮都亂七八糟的呢？巧可，在那麼厲害的地方嗎？"
1004006-134 = "那個，這個是……"
1004006-135 = "那個……發生了各種事，是的……"
1004006-136 = "……各種事？"
1004006-139 = "那兩位拜拜！走吧，巧可！"
1004006-141 = "雖然，有找到……太好了……"
1004006-142 = "唔……那個時候，還以為，一生都出不來了……"
1004006-143 = "發現，不能動的瞬間……真的是，非常害怕……"
1004006-144 = "[s5]「沒事真是太好了呢……巧可醬也順利找到了。」\n[s6]「這樣就告一段落了吧。」"
1004006-145 = "是的，就是，說呢……！"
1004006-146 = "是的，就是，說呢……！"
1004006-147 = "雖然沒辦法，像個忍者，活躍……不過，多虧了老師，解決了……！"
1004006-148 = "而且，今天也，學到了。畢竟，俗話說，千里之行始於足下……"
1004006-149 = "在下次之前……我會學習，卡在狹窄巷子裡的，逃脫法的……！"
1004006-150 = "[s]「感覺方向性好像不太對……？」"
1004006-151 = "今後也，像這樣，一點一滴累積的話……而且，和老師一起的話……"
1004006-152 = "也許總有一天，可以成為出色的忍者，……我，雖然只有一點，不過也能那麼想了……"
1004006-153 = "那個，老師。"
1004006-154 = "雖然小女不成材，不過今後也，請您多多，指教了……！"
1004006-155 = "[s]「嗯，我也要請妳多多指教。月夜。」"
1004006-156 = "欸嘿嘿……好的！"

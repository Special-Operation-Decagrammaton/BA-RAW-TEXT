[translation]
1004006-1 = "ฉะ... ฉันจะเฉิดฉายในฐานะนินจาค่ะ!"
1004006-2 = "(ตอนที่คุณครูกับสึคุโยะกำลังมุ่งหน้าไปสถานที่สำหรับใช้ฝึกวิชานินจาตามปกติ)"
1004006-3 = "ช็อกโก้~ หายไปไหนน่ะ ช็อกโก้...!"
1004006-4 = "เอ๊ะ... เด็กคนนั้น..."
1004006-5 = "[s] \"เด็กคนที่สึคุโยะช่วยเมื่อคราวก่อนนี่นา\""
1004006-6 = "ขะ...ขอโทษนะคะ มีเรื่องอะไรรึเปล่าคะ...?"
1004006-7 = "อ๊ะ! พี่สาวที่ช่วยไว้เมื่อคราวก่อน...! กับใครสักคน...!"
1004006-8 = "[s] \"ครูเป็นมนุษย์จืดจางที่ไม่น่าจดจำสินะ...\""
1004006-9 = "คือว่า... คือว่าเรื่องนั้น... ฮึ่ก...ฮึ่ก! ทำยังไงดีคะ ช็อกโก้หายไปแล้วค่ะ..."
1004006-10 = "ช็อกโก้... เหรอคะ?"
1004006-11 = "อื้อ! ช็อกโก้เป็นลูกหมาของฉันเองค่ะ! เมื่อกี้ยังเดินเล่นด้วยกันอยู่เลย..."
1004006-12 = "พอฉันเผลอทำสายจูงหลุดมือไป ช็อกโก้ก็วิ่งหายเข้าไปในสวน..."
1004006-13 = "ทำยังไงดีคะ! พี่คะ! ถ้าหาช็อกโก้ไม่เจอแบบนี้... ถ้าไม่ได้เจอกันอีก...ฮึ่ก... ฮึ่ก...!"
1004006-14 = "อ๊ะ จะ...ใจเย็นๆ ก่อนนะคะ! มะ...ไม่ต้องร้องไห้นะ..."
1004006-15 = "ไม่สิ...ถะ...ถึงฉันจะพูดแบบนี้... ถะ...ถึงจะช่วยอะไรไม่ได้มาก... พะ...เพราะงั้น..."
1004006-16 = "ธะ...เธอไม่ยอมหยุดร้องเลยค่ะ! ทะ...ทำยังไงดีคะ คุณครู...?!"
1004006-17 = "[s] \"ไม่เป็นไรนะ เรื่องตามหาช็อกโก้ให้พวกเราจัดการเอง!\""
1004006-19 = " หืม...?"
1004006-20 = "คะ...คะ?"
1004006-21 = "[s1] \"สึคุโยะ! นี่อาจเป็นโอกาสดีก็ได้นะ...!\"\n[s2] \"ถ้าแก้ปัญหาให้คนอื่นได้ อาจก้าวไปสู่การเป็นนินจาอีกขั้นนึงได้นะ!\""
1004006-22 = "อ๊ะ...จะ...จริงด้วยค่ะ จริงด้วยสินะคะ!"
1004006-23 = "อ๊ะ...จะ...จริงด้วยค่ะ จริงด้วยสินะคะ!"
1004006-24 = "คะ... ค่ะ เข้าใจแล้วค่ะ! ชะ...ช่วงเวลาที่ฉันต้องพยายาม... เพื่อเติบโตในฐานะนินจา...!"
1004006-25 = "มะ...ไม่ต้องห่วงนะคะ คุณหนูน้อย! ดะ...เดี๋ยวฉัน... ไม่สิ... ดะ...เดี๋ยวฉันกับคุณครู... พวกเราสองคนจะต้องพาช็อกโก้กลับมาให้ได้ค่ะ!"
1004006-26 = "ฮึ่ก... ฮึ่ก... จริงเหรอ...?"
1004006-27 = "ค่ะ! วางใจได้เลยค่ะ!"
1004006-28 = "อื้ม...!"
1004006-30 = "พื้นฐานของวิชาสะกดรอย... จะต้องเริ่มจากการสำรวจพื้นที่ที่คิดว่าเป้าหมายจะปรากฏตัวค่ะ!"
1004006-31 = "โชคดีที่เรารู้ลักษณะของน้องช็อกโก้มาบ้างแล้ว ถ้าเริ่มหาจากเส้นทางเดินภูเขาที่ไปเดินเล่นเป็นประจำ#nแล้ว จะต้องหาเจอแน่นอนค่ะ!"
1004006-32 = "[s] \"โอ้ว สึคุโยะ! เหมือนนินจาสุดๆ เลย!\""
1004006-33 = "แหะๆๆ... งะ...งั้นเหรอคะ? เห็นแบบนี้ ตอนปกติฉันมักจะศึกษาวิชาการสะกดรอยอยู่เป็นประจำเลยนะคะ"
1004006-34 = "ในที่สุดก็มีโอกาสได้ทดลองซะที! คุณครูเองก็เชื่อมือฉันได้เลยค่ะ!"
1004006-35 = "(แหะๆๆ... วะ...วันนี้จะต้องแสดงภาพลักษณ์ที่เท่ๆ ให้คุณครูเห็นให้ได้...)"
1004006-36 = "[s] \"แต่ว่าสึคุโยะ...\""
1004006-37 = "ค่ะ คุณครู! มีอะไรเหรอคะ?"
1004006-38 = "[s] \"น้องหมาตรงนั้นใช่ช็อกโก้รึเปล่า?\""
1004006-39 = "คะ...?"
1004006-44 = "[ns] \"อ๊ะ หนีไปแล้ว...\""
1004006-45 = "มะ...มุแงงงง?! ยะ...ยังไม่มีโอกาสได้ทดลองวิชาสะกดรอยเลย น้องหมาก็หนีไปแล้วเหรอคะ?!"
1004006-46 = "ระ...รอก่อนสิคะ นะ...น้องช็อกโก้...!"
1004006-53 = "หยุดน้าาาา รอก่อนสิคะ~~!"
1004006-60 = "ยะ...หยุด... หยุด... ยะ...หยุดเดี๋ยวนี้... นะ..."
1004006-66 = "ยะ...หยุด..."
1004006-73 = "[ns] \"ดีล่ะ... นิ่งๆ นะ อยู่ตรงนั้นนิ่งๆ นะ...\""
1004006-75 = "[ns] \"ตอนนี้ล่ะ!\""
1004006-82 = "(โชคดีที่สามารถจับช็อกโก้ได้โดยไม่ต้องเหนื่อยมาก...)"
1004006-84 = "[ns3] \"สึคุโยะ จับน้องได้แล้วล่ะ...! ไม่ต้องห่วงแล้ว...\"\n[ns4] \"หืม...? สึคุโยะ??\""
1004006-90 = "คะ... คุณครูคะ ชะ...ช่วยด้วยค่ะ..."
1004006-92 = "[ns] \"ถ้าเป็นพิกัดที่แชร์มาใน MOMOTALK ก็น่าจะเป็นแถวนี้นะ\""
1004006-93 = "อ๊ะ คะ...คุณครูขา... ฉะ...ฉันอยู่ตรงนี้ค่ะ..."
1004006-94 = "[s] \"เสียงน่าจะมาจากทางนี้นะ...\""
1004006-97 = "― งะ...งืออ...[wa:700] "
1004006-99 = "― ฉะ...ฉันคิดจะผ่านทางนี้ไป...เพราะคิดว่าทางนี้... เป็นทางลัดค่ะ...[wa:2200] "
1004006-102 = "― แต่ว่าอย่างที่คุณครูเห็น... ตอนนี้...[wa:1720] "
1004006-104 = "― ฉันติดอยู่ตรงกลางซะแล้วค่ะ..."
1004006-107 = "― แต่ว่า... ในเวลาแบบนี้...[wa:2170] "
1004006-109 = "― จะใช้วิชานินจายังไง... ก็ไม่หลุดเลยค่ะ...?![wa:600] "
1004006-112 = "― ฮือออ... แงงงง...!!![wa:1380] "
1004006-114 = "― คะ...คิดแล้วเชียว ไม่ไหว...จริงๆ ด้วยค่ะ...[wa:1340] "
1004006-117 = "― ฮือ... ฮือออ...[wa:2020] "
1004006-119 = "― คะ... คุณครูคะ... ชะ...ช่วยฉันหน่อย...ได้รึเปล่าคะ...?[wa:2000] "
1004006-125 = "อ๊ะ ช็อกโก้!"
1004006-127 = "พี่สาว! พี่สาวช่วยหนูไว้อีกแล้วนะ ขอบคุณที่หาช็อกโก้ให้ค่ะ!"
1004006-128 = "มะ...ไม่หรอก เรื่องแค่นี้... นินจาต้องทำได้อยู่แล้วค่ะ!"
1004006-129 = "ส่วนน้องช็อกโก้... ต่อไปก็อย่าทำให้เจ้าของเป็นห่วงอีกนะคะ"
1004006-131 = "หืม? น้องช็อกโก้...? ดะ...เดี๋ยวก่อนสิคะ มะ...มันจักจี้นะคะ อ๊ะ ยะ...อย่าเลียตรงนั้นสิคะ..."
1004006-132 = "ยะ...อย่าเลียจมูกฉันสิคะ... ฮะ... ฮัดชิ่ว!!"
1004006-133 = "คือว่าพี่สาว... เสื้อหลุดรุ่ย แล้วก็ผมยุ่งไปหมดเลย... ช็อกโก้แอบไปซนตรงไหนมากันแน่นะเนี่ย?"
1004006-134 = "อ๊ะ... คือว่า... คือว่า..."
1004006-135 = "พะ...พอดีมีเรื่องยุ่งยากนิดหน่อยน่ะค่ะ...!"
1004006-136 = "เรื่องยุ่งยาก...?"
1004006-139 = "ถ้างั้นพวกพี่ก็กลับดีๆ นะ! ไปกันเถอะ ช็อกโก้!"
1004006-141 = "ฮู่ว... ชะ...โชคดีที่หาเจอนะคะ..."
1004006-142 = "ฮะ...ฮือ... แต่ฉันดันไปติดอยู่ในซอกกำแพง คิดว่าจะขยับตัวไม่ได้แล้วซะอีกค่ะ..."
1004006-143 = "พอรู้ตัวว่าขยับตัวไม่ได้แล้ว ฉะ...ฉันก็รู้สึกกลัวมาก..."
1004006-144 = "[s5] \"แต่ก็โชคดีที่เธอไม่บาดเจ็บ แล้วก็หาน้องหมาเจอด้วย\"\n[s6] \"เท่ากับว่าเราจัดการคำขอได้สำเร็จแล้วนะ\""
1004006-145 = "คะ...ค่ะ สะ...สุดท้ายก็...จัดการคำขอ...ได้สำเร็จแล้วนะคะ...!"
1004006-146 = "คะ...ค่ะ สะ...สุดท้ายก็...จัดการคำขอ...ได้สำเร็จแล้วนะคะ...!"
1004006-147 = "ถะ...ถึงฉันจะไม่ได้แสดงฝีมือของนินจาที่เก่งกาจให้ได้เห็นอย่างที่คิดไว้... แต่เพราะได้คุณครูช่วยไว้#nก็เลยแก้ไขเรื่องนี้ได้สำเร็จค่ะ!"
1004006-148 = "ละ...และแน่นอนว่าวันนี้ฉันได้เรียนรู้อะไรหลายๆ อย่างเลยค่ะ! มะ...เหมือนกับคำว่าเส้นทางหมื่นลี้ย่อมมี#nก้าวแรก..."
1004006-149 = "พะ...เพราะงั้นแล้ว... ค่ะ! ฉะ...ฉันจะศึกษาเคล็ดวิชาหลบหนีเอาไว้ใช้เวลาที่ไปติดในซอกแบบนั้นอีกค่ะ!"
1004006-150 = "[s] \"หืม? ไม่เหมือนกับที่คิดเลยแฮะ...?\""
1004006-151 = "ถะ...ถ้าได้ร่วมฝึกฝนกับคุณครูแบบนี้ต่อไปอีก...!"
1004006-152 = "ฉะ...ฉันคิดว่าแม้แต่คนอย่างฉัน... กะ...ก็คงจะกลายเป็นนินจาผู้ยิ่งใหญ่ได้ในสักวันหนึ่งแน่นอนค่ะ!"
1004006-153 = "คะ... คุณครูคะ!"
1004006-154 = "จะ...จากนี้ไป... กะ...ก็ขอฝากเนื้อฝากตัวด้วยนะคะ!"
1004006-155 = "[s] \"อื้อ ครูก็ขอฝากตัวด้วยนะ สึคุโยะ\""
1004006-156 = "ฮิฮิ... ฮิฮิ... ฮิฮิฮิ!"

1004006-1 = "#title;니, 닌자로서 활약할 기회예요!"
1004006-2 = "#na;(평소처럼 츠쿠요와 닌자 훈련을 하기 위해 자리를 옮기고 있을 때였다.)"
1004006-3 = "#na;여자아이;초코~! 어디 간 거야. 초코……!"
1004006-4 = "4;츠쿠요;02;어라……. 저 아이…….\n#4;em;[반응]\n#4;a"
1004006-5 = "[s] \"저번에 츠쿠요가 도와줬던 그 꼬마 아가씨네.\""
1004006-6 = "4;츠쿠요;01;저, 저기요……… 호, 혹시 무슨 일 있나요오……?\n#4;m3"
1004006-7 = "#na;여자아이;앗! 저번에 도와줬던 언니……! 랑 또 한 사람……!"
1004006-8 = "[s] \"덤 취급이구나…….\""
1004006-9 = "#na;여자아이;그게……. 그게 말이야……. 흑흑! 어떡해! 초코가 사라졌어."
1004006-10 = "4;츠쿠요;02;초코……요?\n#4;em;[?]"
1004006-11 = "#na;여자아이;응! 초코는 내가 기르는 강아지야! 조금 전까지 같이 산책을 하고 있었는데……."
1004006-12 = "#na;여자아이;내가 실수로 목줄을 놓치자마자 바로 공원 밖으로 달려가 버려서……."
1004006-13 = "#na;여자아이;어떡해! 언니! 이대로 초코를 찾지 못하고……. 영영 만나지 못하면……! 흑……. 흐윽……!"
1004006-14 = "4;츠쿠요;02;아! 지, 진정하세요! 너, 너무 울지 않아도……. 그, 그게…….\n#4;em;[땀]"
1004006-15 = "4;츠쿠요;06;아니, 제, 제가 이런 말을 해봤자……. 아, 아무런 도움도 안 되겠지만……. 그, 그러니까……\n#4;stiff"
1004006-16 = "4;츠쿠요;04;아, 아가씨가 울음을 멈추지 않아요! 어, 어쩌죠! 서, 서, 선생님?!\n#4;stiff"
1004006-17 = "[s] \"괜찮아, 초코의 일이라면 우리에게 맡겨줘!\""
1004006-18 = "4;츠쿠요;02\n#4;shake\n#4;em;[?!]"
1004006-19 = "#na;여자아이; ……응?"
1004006-20 = "4;츠쿠요;02;네, 네엣?"
1004006-21 = "[s1] \"츠쿠요! 이건 기회일지도 몰라……!\"\n[s2] \"의뢰주의 의뢰를 해결하면서, 닌자로 한 발짝 성장할 수 있는 기회!\""
1004006-22 = "4;츠쿠요;05;……아! 과, 과연! 그런 거군요!\n#4;em;[!]"
1004006-23 = "4;츠쿠요;05;……아! 과, 과연! 그런 거군요!\n#4;em;[!]"
1004006-24 = "4;츠쿠요;05;네, 네엣! 이, 이해했습니다앗! 이건 제가……. 닌자로서 성장하기 위해……. 힘을 내야 할 순간!\n#4;greeting"
1004006-25 = "4;츠쿠요;05;거, 걱정하지 마세요. 꼬마 아가씨! 제, 제가……. 아니, 저와 선생님이, 우리 둘이서 반드시 초코 군을 되찾아줄 테니까요!\n#4;em;[!]"
1004006-26 = "#na;여자아이;훌쩍…… 훌쩍……. 정말……?"
1004006-27 = "4;츠쿠요;03;네! 맡겨만 주세요!\n#4;em;[반응]"
1004006-28 = "#na;여자아이;……응!"
1004006-29 = "#all;hide"
1004006-30 = "3;츠쿠요;05;추적술의 기본은……. 대상이 나타날 법한 곳을 탐문하는 것부터 시작하기 마련이에요!\n#3;a\n#3;em;…"
1004006-31 = "3;츠쿠요;05;다행히 초코 군에 대한 자세한 특징은 들어서 알고 있으니까. 평소 자주 가는 산책코스부터 찾는다면, 분명 찾을 수 있을 거예요!"
1004006-32 = "[s] \"오오, 츠쿠요! 지금 엄청나게 닌자 같아!\""
1004006-33 = "3;츠쿠요;03;에헷, 에헤헷. 그, 그런가요……? 저 그렇지 않아도 평소에도 이런 추적술 같은 걸 잔뜩 공부했거든요.\n#3;em;[///]\n#3;stiff"
1004006-34 = "3;츠쿠요;05;마침 그걸 시험해 볼 기회! 선생님도 저만 믿어주세요!"
1004006-35 = "3;츠쿠요;03;(에헷, 에헤헷……. 오, 오늘만큼은 저도 선생님에게, 제 멋진 모습을 보여드릴 기회…….)"

1004006-148 = "3;츠쿠요;07;무, 물론! 오늘 있던 일로 배운 것도 많아요! 천 리 길도 한 걸음부터라는 말도 있고……."
1004006-149 = "3;츠쿠요;03;그, 그러니까……. 네, 넵! 다음번엔 담벼락 사이에 꼈을 때 사용할 수 있는, 타, 탈출 인법도 공부해둬야겠어요!\n#3;em;[반짝]\n#3;greeting"

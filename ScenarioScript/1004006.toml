[translation]
1004006-1 = "My Chance to Show My Ninja Skills!"
1004006-2 = "I was on my way to help with Tsukuyo's ninja training."
1004006-3 = "Choco! Where did you go, Choco?!"
1004006-4 = "Oh... That kid..."
1004006-5 = "[s] \"That's the little girl Tsukuyo helped before.\""
1004006-6 = "Wh-What's going on...?"
1004006-7 = "Oh! You're the lady who helped me last time, plus one!"
1004006-8 = "[s] \"I'm just a plus one...\""
1004006-9 = "*sob* What should I do? Choco disappeared."
1004006-10 = "Wh-Who is Choco?"
1004006-11 = "My puppy! He was here just a second ago..."
1004006-12 = "But I accidentally dropped the leash and he ran away..."
1004006-13 = "What do I do?! What if he never comes back? *sob*"
1004006-14 = "Oh, r-relax! Please don't cry..."
1004006-15 = "Th-That's not helpful at all... Ugh!"
1004006-16 = "She won't stop crying! Wh-What should I do, Sensei?!"
1004006-17 = "[s] \"It's okay. We'll help you find Choco.\""
1004006-19 = "Huh?"
1004006-20 = "H-Huh?"
1004006-21 = "[s1] \"Tsukuyo! This is a great opportunity!\"\n[s2] \"You can grow as a ninja by solving a client's request!\""
1004006-22 = "...Oh! H-How smart, Sensei!"
1004006-23 = "...Oh! H-How smart, Sensei!"
1004006-24 = "O-Okay! I understand! This is a moment where I should go out of my comfort zone to grow as a ninja!"
1004006-25 = "D-Don't worry, little girl! I-I'll...I mean, Sensei and I will help find Choco for you! I promise!"
1004006-26 = "*sniffle* ...Really...?"
1004006-27 = "Yes! Ninjas always fulfill their promises!"
1004006-28 = "...Okay!"
1004006-30 = "The basics of tracking involve starting where the target is likely to appear!"
1004006-31 = "Based off our intel, we should check the paths they take for walks!"
1004006-32 = "[s] \"Oh! Tsukuyo! You're acting like a real ninja!\""
1004006-33 = "Heehee, heeheehee. I actually have been studying tracking skills like this."
1004006-34 = "This is a chance to test what I learned! Wish me luck!"
1004006-35 = "(Heehee, heeheehee... Today, I'm gonna show Sensei how much I've grown.)"
1004006-36 = "[s] \"By the way, Tsukuyo...\""
1004006-37 = "Yes, Sensei!"
1004006-38 = "[s] \"Is that Choco over there?\""
1004006-39 = "Huh?"
1004006-44 = "[ns] \"Oh, he's running away.\""
1004006-45 = "W-Wahhh?! He's running away! M-My tracking skills!"
1004006-46 = "W-Wait...! Ch-Choco...!"
1004006-53 = "Please stoooooop!"
1004006-60 = "P-Please...st-stop..."
1004006-66 = "St-Stop..."
1004006-73 = "[ns] \"Good... Stay right there. Stay.\""
1004006-75 = "[ns] \"Now!\""
1004006-82 = "Thankfully, we were able to catch Choco without a problem."
1004006-84 = "[ns3] \"Tsukuyo, I got him! Tsukuyo?\"\n[ns4] \"...Huh? Where's Tsukuyo?\""
1004006-90 = "S-Sensei... P-Please help..."
1004006-92 = "[ns] \"She said she was around here in her message...\""
1004006-93 = "S-Senseiiiiii... I'm heeerrre..."
1004006-94 = "[s] \"I hear her voice from this direction...\""
1004006-97 = "― U-Ugh...[wa:860] "
1004006-99 = "― I was trying to go through here as a shortcut...[wa:2880] "
1004006-102 = "― But as you can see, I got...[wa:2080] "
1004006-104 = "― completely stuck..."
1004006-107 = "― Don't worry! This is the perfect timing...[wa:1490] "
1004006-109 = "― to use ninjutsu![wa:1680] "
1004006-112 = "― Ugh... Ughhh!!![wa:1580] "
1004006-114 = "― I-It's not working...[wa:2220] "
1004006-117 = "― Ughh... Ugh![wa:2140] "
1004006-119 = "― S-Sensei... C-Can you help me...? Please?[wa:2520] "
1004006-125 = "Oh! Choco!"
1004006-127 = "Thank you for helping me again! You found Choco!"
1004006-128 = "O-Oh, no problem. It's nothing for a ninja!"
1004006-129 = "Choco... Don't make her worry again, okay?"
1004006-131 = "Ch-Choco? W-Wait, it tickles! Oh, p-please don't lick me there..."
1004006-132 = "My nostrils! A-Achoo!"
1004006-133 = "By the way...your clothes are all crumpled, and your hair is crazy. Where'd you find Choco?"
1004006-134 = "Oh, so... Um..."
1004006-135 = "I went through a lot!"
1004006-136 = "What's that mean?"
1004006-139 = "Bye, you two! Let's go, Choco!"
1004006-141 = "*sigh* ...I'm glad we found Choco, but..."
1004006-142 = "I...I thought I might be stuck in those walls forever."
1004006-143 = "I couldn't move and I...I panicked!"
1004006-144 = "[s5] \"I'm glad we found the dog and you didn't get hurt.\"\n[s6] \"You successfully completed the request.\""
1004006-145 = "Y-Yes! I fulfilled my client's request as a ninja!"
1004006-146 = "Y-Yes! I fulfilled my client's request as a ninja!"
1004006-147 = "I-I wasn't able to live up to all my ninja expectations...but thanks to you, I was at least able to keep my word!"
1004006-148 = "I learned a lot today! They say a thousand-mile journey begins with a single step..."
1004006-149 = "To prepare for next time, I'm gonna learn escaping ninjutsu just in case I get stuck between walls!"
1004006-150 = "[s] \"Huh? That's your takeaway?\""
1004006-151 = "With your support..."
1004006-152 = "I have a feeling one day I'll become a great, full-fledged ninja!"
1004006-153 = "Um, S-Sensei!"
1004006-154 = "I'm looking forward to the future... Please continue watching over me!"
1004006-155 = "[s] \"Yeah, I'm looking forward to you becoming a great ninja.\""
1004006-156 = "Heehee... Heeheehee!"

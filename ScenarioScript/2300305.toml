[translation]
2300305-1 = "歡迎來到網咖"
2300305-2 = "奇普托斯．市中心街道"
2300305-3 = "今天謝謝你。多虧老師，我才能買到兩張最新的獨立顯卡。"
2300305-4 = "最近有好多人將顯卡用在挖礦之類的奇怪用途上，所以變得好難買。"
2300305-5 = "因此變相危害到了像我這種，會善待電腦的善良駭客族。"
2300305-6 = "……雖然「善良的駭客」聽起來可能有點奇怪，但至少我們不會為了錢去傷害別人。"
2300305-7 = "好，既然事情辦完了，就趕緊回千年吧。"
2300305-8 = "而且天色暗暗的，感覺馬上就要下雨……"
2300305-10 = "……才剛說就真的下雨了。"
2300305-11 = "怎麼辦。氣象預報沒說會下雨，所以沒帶傘出門……"
2300305-12 = "這樣好不容易買到的顯卡會濕掉的……#n附近有沒有可以躲雨的地方呢？"
2300305-13 = "[s] 指向位於附近的網咖"
2300305-14 = "網咖？我之前有聽真紀說過。#n是在使用隔板分離的陰暗狹窄房間中，上網玩電腦的地方吧？"
2300305-15 = "……"
2300305-16 = "……現在這情況也沒辦法了。總不能讓好不容易到手的顯卡在拆封前就壞掉……"
2300305-17 = "而且，我也很好奇網咖到底是個什麼樣的地方。"
2300305-18 = "那……要進去看看嗎……？"
2300305-21 = "― 唉……這場午後雷陣雨來的真突然。[wa:2060] "
2300305-23 = "― 最近就連天氣預報都不值得信任了，真傷腦筋。[wa:4250] "
2300305-26 = "― 那……接下來要做什麼呢？[wa:3820] "
2300305-29 = "―（嗯……剛剛那句話會不會聽起來很奇怪啊？）[wa:4400] "
2300305-32 = "―（不過我也是第一次來網咖，[wa:3470] "
2300305-34 = "― 也不知道其他人都在這種地方做什麼……）[wa:4240] "
2300305-37 = "―（話說這個空間好窄……[wa:3310] "
2300305-39 = "― 老師的臉好近……）[wa:1730] "
2300305-42 = "― 你，你說，你要先去沖澡？[wa:2760] "
2300305-44 = "― 等等，為，為什麼？！[wa:1920] "
2300305-47 = "― 啊，你說頭髮被雨淋濕要去洗一下？[wa:2900] "
2300305-49 = "― ……抱歉我誤會了。啊不，別在意。[wa:2500] "
2300305-52 = "― 原來網咖還設有盥洗設備啊。[wa:2850] "
2300305-55 = "― 啊，老師，你看。飲料吧是免費的耶。[wa:3200] "
2300305-57 = "― 不知道有沒有能量飲料？[wa:1520] "
2300305-60 = "― 不只可以自由使用網路，連飲料也是免費。[wa:2700] "
2300305-62 = "― 太完美了，完全就是為我這種人準備的空間啊！[wa:5870] "
2300305-65 = "― 在這裡要我待多久都可以。[wa:3910] "
2300305-68 = "― 那個……剛剛這句並沒有奇怪的意思。[wa:4530] "
2300305-70 = "― 你不要誤會了……[wa:620] "
2300305-73 = "奇普托斯．市中心街道"
2300305-74 = "雨停了呢。太好了。"
2300305-75 = "雖然只是湊巧，但真是個有趣的地方。"
2300305-76 = "下次來的時候，要準備些換洗衣物……"
2300305-78 = "啊……不是，我說的下一次是指……"
2300305-79 = "如果下次經過這附近，又「偶然」有下雨的話。"
2300305-80 = "……除此之外，並沒有別的意思了喔？"

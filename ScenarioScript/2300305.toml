2300305-2 = "#place;키보토스 시내 중심가"
2300305-3 = "3;하레;03;오늘은 같이 쇼핑하러 나와줘서 고마워. 덕분에 신상 그래픽 카드를 두 개나 살 수 있었어.\n#3;a\n#3;em;[반짝]"
2300305-4 = "3;하레;06;요새는 그래픽 카드를 암호화폐 채굴 같은 엉뚱한 용도에 쓰는 사람이 많아서 물건을 구하기가 어렵단 말이지."
2300305-5 = "3;하레;05;이러니까 나처럼 선량하게 컴퓨터를 쓰는 해커들이 피해를 보는 거라고.\n#3;em;[반응]"
2300305-6 = "3;하레;04;……선량한 해커라고 하니 어쩐지 이상한 말처럼 들리지만, 적어도 우리는 돈 때문에 다른 사람에게 피해를 주지는 않으니까.\n#3;em;[땀]"
2300305-7 = "3;하레;03;자, 그럼 용무도 끝났으니 어서 학원으로 돌아갈까.\n#3;greeting"
2300305-8 = "3;하레;02;어쩐지 하늘이 어두침침한 게 금방이라도 비를 뿌릴 것 같…….\n#3;em;…"
2300305-9 = "3;하레;02\n#3;h\n#wait;2000"
2300305-10 = "3;하레;04;……말이 씨가 되었네.\n#3;em;[속상함]\n#3;stiff"
2300305-11 = "3;하레;06;이를 어쩌지. 비가 온다는 소식은 없어서 우산을 두고 나왔는데…….\n#3;jump"
2300305-12 = "3;하레;02;이대로라면 모처럼 구입한 그래픽 카드가 물에 젖고 말 텐데……. #n근처에 비를 피할 만한 곳이 없으려나?\n#3;em;[?]"
2300305-13 = "[s] 근처에 위치한 넷카페를 가리킨다."
2300305-14 = "3;하레;02;넷카페? 전에 마키에게 들어본 적이 있어. #n칸막이로 분리된 어두침침하고 좁은 방 안에서 인터넷을 즐기는 그런 장소라지?\n#3;em;[반응]"
2300305-15 = "3;하레;04;…….\n#3;em;…"
2300305-16 = "3;하레;06;……이 상황에서는 어쩔 수 없지. 어렵게 구한 그래픽 카드를 뜯기도 전에 고장 내고 싶지는 않으니까.\n#3;em;[땀]\n#3;greeting"
2300305-17 = "3;하레;03;그리고 사실 나도 넷카페가 어떤 공간인지 전부터 궁금했었거든."

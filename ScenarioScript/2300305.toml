[translation]
2300305-1 = "ยินดีต้อนรับสู่อินเทอร์เน็ตคาเฟ่ค่ะ"
2300305-2 = "กลางเมืองคิโวทอส"
2300305-3 = "ขอบคุณนะที่มาเดินช้อปปิ้งด้วยกันในวันนี้ แถมยังมาช่วยฉันแย่งการ์ดจอใหม่มาได้ 2 อันด้วย"
2300305-4 = "ช่วงนี้จะหาการ์ดจอมาได้ยากมากเพราะคนชอบเอามันไปใช้กับอะไรโง่ๆ อย่างเช่นการลงทุน#nสกุลเงินคริปโต"
2300305-5 = "พวกมันเป็นสาเหตุที่ทำให้แฮ็กเกอร์ผู้ซื่อสัตย์อย่างฉันที่ตั้งใจจะใช้คอมพิวเตอร์จริงๆ#nต้องได้รับความเสียหายไปด้วย"
2300305-6 = "แฮ็กเกอร์ผู้ซื่อสัตย์ อาจจะฟังดูแปลกๆ แต่ที่ฉันหมายถึงก็คือเราไม่ได้สร้างกำไรจากการทำให้#nคนอื่นลำบาก"
2300305-7 = "เอาล่ะ ฉันเสร็จธุระที่นี่แล้ว กลับไปที่สถาบันกันเถอะ"
2300305-8 = "ดูท้องฟ้าสิ มีเมฆดำเต็มเลย ฝนอาจจะตกลงมาเมื่อไรก็ได้..."
2300305-10 = "...ไม่น่าพูดเลย ฝนตกลงมาแล้วล่ะ"
2300305-11 = "จะทำยังไงดี? ฉันไม่ได้พกร่มมาด้วย พยากรณ์อากาศไม่ได้บอกว่าวันนี้จะมีฝน..."
2300305-12 = "ถ้าเป็นแบบนี้ล่ะก็ การ์ดจอสุดล้ำค่าที่ฉันเพิ่งซื้อมาจะต้องเปียกแน่... แถวนี้มีที่ไหนที่พอจะ#nหลบฝนได้บ้างมั้ยนะ?"
2300305-13 = "[s] (ชี้ไปที่ร้านอินเทอร์เน็ตคาเฟ่ที่อยู่ใกล้ๆ)"
2300305-14 = "อินเทอร์เน็ตคาเฟ่? ฉันได้ยินเกี่ยวกับร้านแบบนี้มาจากมากิ มันคือที่ที่จะได้ห้องกั้นมืดๆ เล็กๆ เพื่อใช้ PC ใช่มั้ย?"
2300305-15 = "......."
2300305-16 = "ช่วยไม่ได้... ฉันไม่อยากทำให้การ์ดจอที่ได้มาอย่างยากเย็นต้องพังลงก่อนที่ฉันจะมีโอกาส#nได้เปิดกล่อง"
2300305-17 = "อีกอย่าง จริงๆ ฉันสงสัยเกี่ยวกับร้านอินเทอร์เน็ตคาเฟ่แบบนี้มาสักพักแล้วล่ะ"
2300305-18 = "งั้นเราเข้าไปกันมั้ย...?"
2300305-21 = "― เฮ้อ... อยู่ๆ ฝนก็มาตกซะได้[wa:1620] "
2300305-23 = "― ช่วงนี้... ไว้ใจ...พยากรณ์อากาศไม่ได้เลย ลำบากจริงๆ[wa:3050] "
2300305-26 = "― งั้นตอนนี้... จะทำอะไรกันดี?[wa:3180] "
2300305-29 = "― (อืม... ที่เราพูดไปเมื่อกี้ มันฟังดูแปลกๆ หรือเปล่านะ?)[wa:3000] "
2300305-32 = "― (แต่ว่า... นี่เป็นครั้งแรก... ที่ได้มาร้านเน็ตแบบนี้[wa:1870] "
2300305-34 = "― ใครจะไปรู้ล่ะ... ว่าเค้ามาทำอะไรกัน...)[wa:3440] "
2300305-37 = "― (อีกอย่าง... ที่นี่มันแคบมาก...[wa:2470] "
2300305-39 = "― แล้วหน้าของคุณครู... ก็ใกล้มากด้วย...)[wa:570] "
2300305-42 = "― หืม? จะไป... อาบน้ำงั้นเหรอ?[wa:2120] "
2300305-44 = "― เดี๋ยวก่อน! คิดจะทำอะไรน่ะ?[wa:1240] "
2300305-47 = "― อ๋อ... เมื่อกี้โดนฝนเลยจะไปสระผมก่อนงั้นเหรอ?[wa:1740] "
2300305-49 = "― ...โทษที  ไม่สิ ไม่ต้องใส่ใจหรอก[wa:1860] "
2300305-52 = "― ในร้านเน็ตแบบนี้ มีห้องอาบน้ำ อยู่ด้วยเหรอเนี่ย?[wa:1450] "
2300305-55 = "― ดูนี่สิ คุณครู... เครื่องดื่มที่บาร์ ฟรีด้วยล่ะ[wa:2000] "
2300305-57 = "― จะมีเครื่องดื่มชูกำลัง... มั้ยนะ?[wa:640] "
2300305-60 = "― ให้ใช้เน็ตได้ตามใจ แถมยังให้เครื่องดื่มฟรีอีก[wa:1660] "
2300305-62 = "― สุดยอดเลยนะ ที่นี่เหมาะกับคนอย่างฉันที่สุดเลย ว่ามั้ยล่ะ?[wa:4430] "
2300305-65 = "― ถ้าเป็นที่นี่ละก็... จะอยู่นานแค่ไหนก็ได้[wa:2750] "
2300305-68 = "― อ๊ะ... ฉันไม่ได้หมายถึงอะไรแปลกๆ หรอกนะ[wa:3650] "
2300305-70 = "― คุณครู... อย่าเข้าใจผิดล่ะ[wa:10] "
2300305-73 = "กลางเมืองคิโวทอส"
2300305-74 = "ในระหว่างที่เราอยู่ที่นั่นฝนก็หยุดตกแล้วล่ะ"
2300305-75 = "ถึงเราจะได้ไปที่นั่นโดยบังเอิญ แต่มันก็เป็นที่ที่สนุกทีเดียวล่ะ"
2300305-76 = "ครั้งต่อไปที่ไปที่นั่น เราควรจะเอาเสื้อไปเปลี่ยนด้วย"
2300305-78 = "เอ่อ... \"ครั้งต่อไป\" ที่ฉันหมายถึงก็คือ..."
2300305-79 = "ครั้งต่อไปที่ฝนบังเอิญตกลงมาในระหว่างที่เราผ่านที่นั่นน่ะ"
2300305-80 = "...ฉันไม่ได้ต้องการจะสื่อถึงเรื่องอื่นสักหน่อย เข้าใจมั้ย?"

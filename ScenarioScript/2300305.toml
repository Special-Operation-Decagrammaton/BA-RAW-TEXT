[translation]
2300305-1 = "Welcome to the Internet Cafe"
2300305-2 = "Downtown Kivotos"
2300305-3 = "Thanks for shopping with me today. You helped me snag two new graphics cards!"
2300305-4 = "It's hard to get my hands on graphics cards these days because people are wasting them on dumb things like mining cryptocurrency."
2300305-5 = "They're the reason why honest hackers like me, who use computers as intended, are suffering."
2300305-6 = "...Okay, \"honest hackers\" might sound strange, but what I mean is that we don't make other people's lives difficult for our profit."
2300305-7 = "Well, my business here is done, so let's go back to the academy."
2300305-8 = "Looking at how cloudy the sky got, it could rain at any sec..."
2300305-10 = "...Me and my big mouth."
2300305-11 = "What do we do? I didn't bring an umbrella with me, since there was no rain in the forecast today..."
2300305-12 = "At this rate, my precious graphics cards I just bought are gonna get wet... Is there any place nearby to avoid the rain?"
2300305-13 = "[s] (Point at the nearby internet cafe.)"
2300305-14 = "An internet cafe? I heard about those from Maki. It's where you get a dark, tiny, partitioned room to use a PC, right?"
2300305-15 = "..."
2300305-16 = "We don't have any other options. I don't want to ruin my hard-earned graphics cards before I even get a chance to unbox them."
2300305-17 = "And honestly, I've been curious about this internet cafe for quite a while."
2300305-18 = "Shall we go in, then…?"
2300305-21 = "― *sigh* That rain shower came out of nowhere.[wa:940] "
2300305-23 = "― It's hard to trust the weather reports these days.[wa:3090] "
2300305-26 = "― So,  what should we do now?[wa:3220] "
2300305-29 = "― (Oh, no... Was that a weird thing to say?)[wa:3520] "
2300305-32 = "― (This is my first time at an internet cafe.[wa:2230] "
2300305-34 = "― I don't know what you're supposed to do at a place like this.)[wa:2520] "
2300305-37 = "― (Besides, this place is so small...[wa:2310] "
2300305-39 = "― and Sensei's face is so close...)[wa:770] "
2300305-42 = "― You're gonna go freshen up?[wa:2160] "
2300305-44 = "― What do you mean?[wa:1640] "
2300305-47 = "― Oh, you're gonna wash the rain from your hair...[wa:1620] "
2300305-49 = "― ...No, forget I asked.[wa:2260] "
2300305-52 = "― Do internet cafes have showers?[wa:2130] "
2300305-55 = "― Hey, Sensei. I was told the drink bar is free.[wa:2040] "
2300305-57 = "― I wonder if they have energy drinks.[wa:520] "
2300305-60 = "― Not only is the internet free, but the drinks are free too.[wa:1100] "
2300305-62 = "― Amazing! This is the perfect place for someone like me![wa:4510] "
2300305-65 = "― I could stay here forever.[wa:3350] "
2300305-68 = "― Oh... I hope I'm not coming off  weird.[wa:3650] "
2300305-70 = "― Don't get me wrong...[wa:100] "
2300305-73 = "Downtown Kivotos"
2300305-74 = "The rain stopped while we were in there."
2300305-75 = "We ended up there by chance, but it was a pretty fun place nonetheless."
2300305-76 = "Next time we go there, we should bring a change of clothes."
2300305-78 = "Uh...what I mean by \"next time\" is..."
2300305-79 = "The next time it happens to rain while we're passing by."
2300305-80 = "I'm not implying anything here. Okay?"

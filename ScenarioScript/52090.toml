[translation]
52090-1 = "第9話;百花繚亂的委員長"
52090-2 = "惠比壽宿舍．內宴會廳"
52090-6 = "嗯，果然好吃！"
52090-7 = "可能是因為好久沒吃到熱騰騰的食物了，每一口都感覺溫暖滲進了全身呢～"
52090-8 = "不好意思，可以再給我一碗飯嗎？"
52090-12 = "好，好的！這樣的份量可以嗎？"
52090-13 = "嗯。方便的話也再給我一碗味噌湯吧。"
52090-24 = "……嗯？大家為什麼都露出好像看到幽靈一樣的表情……？"
52090-29 = "不是，雖然也沒有真的看見幽靈……"
52090-30 = "但該說有點那種感覺，還是很讓人難以置信呢──"
52090-31 = "……菖蒲委員長。你能夠平安回來，我真的覺得很高興。"
52090-32 = "不過身為百花繚亂的參謀，我必須聽聽你這段時間究竟在哪裡做了什麼。"
52090-33 = "雖然我從以前就認為你是個難以捉摸的人……#n但因為你突然不告而別的關係，百花繚亂差點就解散了。"
52090-34 = "坦白說，現在究竟還能不能稱呼你為委員長……都讓我有點懷疑。"
52090-35 = "但我認為至少應該先聽聽你的解釋。"
52090-37 = "……桔梗還是老樣子呢。沒有改變真是太好了。"
52090-41 = "首先，對於擅自離開百花繚亂委員長的職位並拋下責任這點，我不打算為自己辯解。"
52090-42 = "尤其是突然讓名草擔任委員長代理，讓他承受了不少壓力……我實在沒有臉見他。#n真的很抱歉。"
52090-46 = "沒關係，光是現在你能回來──"
52090-47 = "名草前輩，麻煩你先安靜。"
52090-53 = "再重複一次──我想知道的，是你為什麼會拋下委員長的職責突然消失。"
52090-54 = "還有關於名草前輩右臂的事，我也想問個清楚。"
52090-58 = "……說明起來會有點長，可以嗎？"
52090-59 = "那當然！"
52090-60 = "只要能解開對前輩的誤會，就算要聽一整天也沒問題！"
52090-61 = "你是一年級的紫對吧？#n謝謝你願意這麼說。"
52090-62 = "……在開始之前，我先問你們一個問題。"
52090-63 = "你們覺得成為百花繚亂「委員長」的資格是什麼？"
52090-64 = "我知道我知道！這個小女子最清楚了！"
52090-65 = "就是要向前任委員長提出繼承戰，並在繼承戰中獲勝！"
52090-66 = "呵呵，答得不錯。#n不過其實還不只這些。"
52090-70 = "與其說繼承戰的勝利者獲得的是「委員長的職位」，#n不如說是從[ruby=葛葉]「大預言者」[/ruby]傳承下來的「資格之證」──"
52090-71 = "也就是說，繼承戰其實是繼承「百蓮」的儀式。"
52090-72 = "因此，百花繚亂的委員長必須能夠自由操縱「百蓮」才行。"
52090-73 = "但如果是這樣的話，菖蒲不就是最適合當委員長的人嗎？"
52090-74 = "現在的百花繚亂之中，根本沒有人能在射擊方面超越菖蒲。"
52090-75 = "……如果對手是「人」的話，或許是如此吧。"
52090-81 = "人！？意思是菖蒲委員長曾經對戰過的對象不是人嗎？"
52090-87 = "在離開百花繚亂的幾天前，我像往常一樣在百鬼夜行的夜路上巡邏。"
52090-97 = "可能是因為祭典剛結束的關係，街上空無一人又靜得出奇……#n就連照亮道路的燈光，那天也異常地閃爍不定。"
52090-101 = "當我準備沿著橋走到對岸時，突然有一名學生出現在了我的眼前。"
52090-111 = "亮麗的金髮與紫色的眼睛，在白色制服的外面披著水藍色的羽織……"
52090-112 = "沒錯，對方長得和我一模一樣。"
52090-113 = "我也一度懷疑自己是不是看錯了，但那毫無疑問是我的臉沒錯。#n……簡直像是在照鏡子一樣。"
52090-114 = "不過我立刻就意識到，那傢伙並不是單純長得像我的「人」。"
52090-123 = "因為它在看見我的時候不僅沒有感到驚訝，#n反而露出了像是早就在等著我一般的詭異笑容。"
52090-124 = "那種不知恐懼為何物的異界存在，究竟該怎麼對付呢？"
52090-128 = "幸好我手上有著能夠驅魔的魔槍「百蓮」。#n當時我第一次以委員長的身分，將槍口指向了怪異。"
52090-142 = "但是卻完全沒有作用。"
52090-143 = "那傢伙就像根本沒意識到自己被擊中一樣，繼續朝我走了過來……"
52090-156 = "……就這麼穿過我之後，消失在了夜色之中。"
52090-157 = "雖然可以只把這視為夜霧中發生的偶然插曲……#n但不安一旦在心裡萌芽，就很難輕易消除了。"
52090-160 = "「為什麼我無法使用百蓮的力量？」"
52090-161 = "「是因為我沒有資格嗎？還是這把百蓮根本是假的？」"
52090-162 = "「……說到底，所謂的大預言者葛葉真的存在過嗎？」"
52090-165 = "最終無法戰勝這份不安的我，為了見葛葉大人一面……#n決定前往黃昏寺院曾經存在的北方之地。"
52090-166 = "你們或許會認為這是個愚蠢的決定，#n但當時如果不這麼做的話……我實在無法原諒我自己。"
52090-167 = "而最終……我失敗了。"
52090-168 = "我找到的只是看似「黃昏寺院」遺跡的殘破廢墟。"
52090-169 = "葛葉大人也始終沒有在我面前現身。"
52090-175 = "……你要說的就是這些？"
52090-176 = "嗯，我並不想找藉口。這些就是全部了。"
52090-177 = "不，還有比這些更重要的事吧。"
52090-178 = "比如名草前輩的手臂……#n還有你和花鳥風月部一起消失前留下的那句話，到底是怎麼回事？"
52090-179 = "名草的手臂……？"
52090-180 = "這麼說來，那條繃帶是怎麼回事？#n你受傷了嗎？"
52090-185 = "這隻手是……"
52090-186 = "菖蒲，你難道不記得了嗎？#n我們曾經在大雪原碰過面的事情。"
52090-187 = "名草你去過大雪原？什麼時候？#n因為風雪太大的關係，我完全沒注意到耶……？"
52090-188 = "……"
52090-189 = "你真的一點印象也沒有嗎，菖蒲委員長？"
52090-190 = "名草前輩說你甩開了他的手，還說「從來沒把你當成朋友」之類──"
52090-195 = "那怎麼可能！"
52090-202 = "對，對不起……我有點失態了。"
52090-203 = "但我不可能會說出那種話的。#n怎麼可能對重要的朋友……說出那麼傷人的話呢？"
52090-204 = "會不會是你聽錯……或者認錯人之類的？"
52090-205 = "就，就是說啊……？#n菖蒲他不可能會說那種──"
52090-206 = "不。就算名草前輩這麼說，我也不能完全相信你。"
52090-207 = "我所認識的菖蒲委員長不是會說那種話的人，這點我雖然也同意……#n不過這段時間實在發生了太多事情。"
52090-208 = "如果要我在毫無交代就消失的委員長，#n和在百鬼夜行的危機之中挺身而出的副委員長之間做出選擇……#n我會毫不猶豫地選擇相信後者。"
52090-209 = "如果你希望能挽回一些信任的話，最好把你在北方之地的經歷毫無保留地說出來。"
52090-211 = "前輩……"
52090-215 = "知道了。我本來就沒打算隱瞞。"
52090-216 = "不過能讓我先把早餐吃完嗎？"
52090-217 = "不把飯吃完可是會招來窮神的哦？"
52090-219 = "下一話;不完整的記憶"

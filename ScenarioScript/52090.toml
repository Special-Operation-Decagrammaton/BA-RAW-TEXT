[translation]
52090-1 = "ตอนที่ 9;หัวหน้าเฮียกกะเรียวรัน"
52090-2 = "ห้องจัดเลี้ยงในหอพักเอบิสุ"
52090-6 = "อืม อร่อยจริงๆ ด้วย!"
52090-7 = "ฉันไม่ได้กินของอุ่นๆ มานานแล้ว ทุกครั้งที่กัดเข้าไปรู้สึกเหมือนความอบอุ่นแทรกซึมไปทั่วร่างกาย#nเลยละ~"
52090-8 = "นี่ รบกวนหน่อยนะ ฉันขอข้าวเพิ่มอีกถ้วยได้มั้ย?"
52090-12 = "ค่ะ ค่ะ! เท่านี้พอมั้ยคะ?"
52090-13 = "อื้อ แล้วก็ขอซุปมิโสะอีกถ้วยด้วยนะ"
52090-24 = "หืม...? ทำไมทุกคนทำหน้าแบบนั้นล่ะ? ทำหน้าอย่างกับเห็นผีอย่างนั้นแหละ"
52090-29 = "ฉันก็ไม่ได้เห็นผีจริงๆ หรอก แต่ว่า..."
52090-30 = "ต้องบอกว่ารู้สึกเหมือนเห็นผีจริงๆ หรือต้องบอกว่าไม่อยากเชื่อภาพที่เห็นดีนะ..."
52090-31 = "หัวหน้าอายาเมะ... ฉันดีใจนะที่คุณกลับมาได้อย่างปลอดภัย"
52090-32 = "แต่ในฐานะที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน ฉันต้องฟังว่าตลอดเวลาที่คุณไม่อยู่ คุณไปทำอะไรที่ไหนมา"
52090-33 = "แม้ฉันจะคิดอยู่บ่อยๆ ว่าคุณเป็นคนที่คาดเดาไม่ได้ แต่การที่คุณหายไปดื้อๆ โดยไม่อธิบายอะไรนั่นก็#nได้ทำให้เฮียกกะเรียวรันเกือบต้องยุบไป"
52090-34 = "บอกตามตรงว่าฉันไม่แน่ใจด้วยซ้ำว่าจะเรียกคุณว่าหัวหน้าของเราได้หรือเปล่า"
52090-35 = "แต่ยังไงก็คงต้องฟังข้อแก้ตัวจากปากของคุณก่อนละนะ"
52090-37 = "คิเคียวยังเหมือนเดิมเลยนะ... ดีแล้วละที่ยังไม่เปลี่ยนไป"
52090-41 = "ก่อนอื่นเลย ฉันไม่มีอะไรจะแก้ตัวเรื่องที่ฉันละทิ้งตำแหน่งหัวหน้าเฮียกกะเรียวรัน และก็ละเลยความรับผิดชอบของฉันไปหรอก"
52090-42 = "ฉันรู้สึกผิดกับทุกคน... โดยเฉพาะกับนางุสะที่จู่ๆ ก็ถูกมอบหมายให้ทำงานของหัวหน้าจนลำบากใจ#nไม่น้อย ฉันละอายใจจนไม่กล้าแม้แต่จะมองหน้านางุสะเลย ขอโทษจริงๆ นะ"
52090-46 = "ไม่เป็นไรหรอก ในเมื่อตอนนี้ก็กลับมาแล้ว แค่นี้ก็..."
52090-47 = "รุ่นพี่นางุสะน่ะเงียบไปเลย"
52090-53 = "ฉันจะย้ำให้อีกรอบนะ สิ่งที่ฉันอยากฟังก็คือทำไมคุณถึงละทิ้งตำแหน่งหัวหน้าแล้วหายตัวไป"
52090-54 = "แล้วก็อยากฟังเรื่องเกี่ยวกับแขนข้างขวาของรุ่นพี่นางุสะด้วย"
52090-58 = "เรื่องนี้น่าจะยาวสักหน่อยนะ อยากฟังกันมั้ยล่ะ...?"
52090-59 = "แน่นอนสิเจ้าคะ!"
52090-60 = "ถ้ามันจะคลายความเข้าใจผิดเกี่ยวกับรุ่นพี่ได้ ต่อให้ต้องใช้เวลาฟังทั้งวันข้าก็พร้อมเจ้าค่ะ"
52090-61 = "เธอคือยูคาริ ชั้นปีที่ 1 ใช่มั้ย? ขอบใจที่พูดอย่างนั้นนะ"
52090-62 = "ก่อนที่จะเริ่มเรื่อง ฉันขอถามอะไรสักอย่าง..."
52090-63 = "คิดว่าสิทธิ์ในการเป็น 'หัวหน้า' ของเฮียกกะเรียวรันคืออะไรเหรอ?"
52090-64 = "ข้าขอตอบเจ้าค่ะ! ถ้าเป็นเรื่องนั้นข้าจำได้ขึ้นใจเลยละ!"
52090-65 = "คุณสมบัติที่ว่าก็คือต้องประกาศศึกชิงตำแหน่งต่อหัวหน้าคนก่อนแล้วเอาชนะให้ได้เจ้าค่ะ!"
52090-66 = "ฮุฮุ รู้ดีเลยนะเนี่ย แต่อธิบายแค่นั้นมันยังไม่พอหรอกนะ"
52090-70 = "สิ่งที่ผู้ชนะในศึกชิงตำแหน่งจะได้รับไม่ใช่ 'ตำแหน่งของหัวหน้า' แต่เป็น 'หลักฐานแสดงสิทธิ์' ที่สืบทอดมาจากผู้พยากรณ์ใหญ่คุซึโนฮะ"
52090-71 = "หรือกล่าวได้ว่าศึกชิงตำแหน่งก็คือพิธีอย่างหนึ่งในการสืบทอด <เฮียกกุเร็น>"
52090-72 = "นั่นหมายความว่าถ้าเป็นหัวหน้าเฮียกกะเรียวรัน คนคนนั้นจะต้องใช้ <เฮียกกุเร็น> ได้อย่างอิสระ"
52090-73 = "แต่ถ้าเป็นอย่างที่ว่า ก็ไม่มีใครที่เหมาะกับตำแหน่งหัวหน้ามากกว่าอายาเมะไม่ใช่เหรอ?"
52090-74 = "ตอนนี้ในเฮียกกะเรียวรันก็ไม่มีใครช่ำชองในศาสตร์ยิงปืนเท่ากับอายาเมะด้วย"
52090-75 = "อืม... หากคู่ต่อสู้เป็น 'มนุษย์' ก็อาจจะเป็นอย่างนั้น"
52090-81 = "มนุษย์?! หัวหน้าอายาเมะกำลังบอกว่าตัวเองเคยต่อสู้กับสิ่งที่ไม่ใช่มนุษย์งั้นเหรอ?"
52090-87 = "ไม่กี่วันก่อนที่ฉันจะจากเฮียกกะเรียวรันมา ฉันก็เดินลาดตระเวนยามดึกไปทั่วรอบๆ เฮียกคิยาโค#nอย่างที่ทำเป็นปกติ"
52090-97 = "คงเพราะงานเทศกาลจบลงไปแล้ว ตอนนั้นถนนหนทางก็เลยเงียบสงัด ไร้ผู้คน แสงไฟที่ส่องถนนก็กะพริบแปลกๆ แบบไม่เคยเป็นมาก่อน"
52090-101 = "ระหว่างที่ฉันกำลังจะข้ามสะพานข้ามคลองไปอีกฝั่ง จู่ๆ ก็มีนักเรียนคนหนึ่งปรากฏตัวที่อีกฝั่งหนึ่ง"
52090-111 = "เธอมีผมสีบลอนด์สว่าง ตาสีม่วง ใส่ชุดนักเรียนสีขาว และใส่เสื้อฮาโอริสีครามทับอีกที..."
52090-112 = "ใช่แล้วละ นักเรียนคนนั้นเหมือนฉันทุกกระเบียดนิ้วเลย"
52090-113 = "ฉันสงสัยว่ามองผิดไปหรือเปล่า แต่ใบหน้าของอีกฝ่ายคือใบหน้าของฉันอย่างชัดเจน ฉันรู้สึกเหมือนกำลังยืนมองกระจกเลยละ"
52090-114 = "แต่ฉันก็รู้ได้ทันทีโดยสัญชาตญาณว่าสิ่งนั้นไม่ใช่ 'มนุษย์' ที่ดูเหมือนฉัน"
52090-123 = "แทนที่สิ่งนั้นจะตกใจที่เห็นคนหน้าเหมือนกัน มันกลับยืนยิ้มให้ฉันอย่างน่าขนลุก ราวกับว่ากำลังรอฉันอยู่"
52090-124 = "จะมีอะไรที่เอาชนะสิ่งที่ไร้ความเกรงกลัวจากอีกโลกได้นะ"
52090-128 = "โชคดีที่ในมือฉันมีปืนปีศาจ <เฮียกกุเร็น> ที่ใช้ปราบผีได้ นั่นเป็นครั้งแรกที่ฉันเล็งปืนไปที่สิ่งลึกลับ#nน่าขนลุกนับตั้งแต่ได้เป็นหัวหน้า"
52090-142 = "แต่ว่า... มันไม่ได้ผลอะไรเลย"
52090-143 = "สิ่งนั้นยังคงเข้ามาใกล้ฉัน มันเหมือนไม่รู้ตัวด้วยซ้ำว่าตัวเองโดนยิง..."
52090-156 = "แล้วมันก็ทะลุผ่านฉันและหายตัวไป..."
52090-157 = "ถึงจะคิดว่านั่นเป็นแค่เหตุการณ์ที่เกิดขึ้นท่ามกลางม่านหมอกในค่ำคืนหนึ่ง แต่ความวิตกกังวลที่เกิดขึ้นมันยากที่จะสลัดออกไปได้"
52090-160 = "'ทำไมฉันถึงใช้พลังของเฮียกกุเร็นไม่ได้'"
52090-161 = "'เพราะฉันไม่มีคุณสมบัติเหรอ หรือว่าเฮียกกุเร็นนี้ไม่ใช่ของจริง?'"
52090-162 = "'แล้วผู้พยากรณ์ใหญ่ที่ชื่อคุซึโนฮะมีตัวตนอยู่จริงตั้งแต่แรกหรือเปล่า...?'"
52090-165 = "ในที่สุดฉันก็พ่ายแพ้ให้ความวิตกกังวล ก็เลยตัดสินใจว่าจะไปตามหาท่านคุซึโนฮะ แล้วเดินทางสู่ดินแดนทางเหนือที่ว่ากันว่ามีวิหารอัสดงอยู่ที่นั่น"
52090-166 = "นั่นอาจเป็นการตัดสินใจที่โง่เขลา แต่ในเวลานั้นถ้าไม่ทำอย่างนั้นฉันก็คงยอมรับตัวเองไม่ได้"
52090-167 = "และสุดท้าย... ฉันก็ล้มเหลว"
52090-168 = "สิ่งที่ฉันพบมีเพียงเศษซากของสิ่งปลูกสร้างเก่าๆ ที่พังทลายลงคล้ายจะเป็นร่องรอยของ <วิหารอัสดง>"
52090-169 = "และท่านคุซึโนฮะก็ไม่มาปรากฏตัวต่อหน้าฉัน"
52090-175 = "ที่จะพูดมีแค่นี้น่ะเหรอ...?"
52090-176 = "อื้อ ฉันไม่มีข้อแก้ตัวหรอก เรื่องทั้งหมดก็มีเท่านี้ละ"
52090-177 = "แต่มันมีเรื่องที่สำคัญกว่านั้นไม่ใช่เหรอ?"
52090-178 = "เรื่องแขนของรุ่นพี่นางุสะ... แล้วก็เรื่องคำที่พูดไว้ตอนหายไปพร้อมชมรมความงามของธรรมชาติด้วย"
52090-179 = "แขนของนางุสะ...?"
52090-180 = "จะว่าไป ผ้าพันแผลนั่นมันอะไรกัน? ได้รับบาดเจ็บมางั้นเหรอ?"
52090-185 = "แขนนี่น่ะ..."
52090-186 = "อายาเมะ เธอจำตอนที่เราเจอกันในทุ่งหิมะใหญ่ไม่ได้เหรอ?"
52090-187 = "นางุสะมาที่ทุ่งหิมะใหญ่งั้นเหรอ? ตอนไหนน่ะ? หรือว่าตอนนั้นพายุหิมะหนักจนฉันไม่รู้ว่ามีใครมา...?"
52090-188 = "......"
52090-189 = "จำไม่ได้จริงๆ เหรอ หัวหน้าอายาเมะ?"
52090-190 = "หัวหน้าอายาเมะสะบัดมือของรุ่นพี่นางุสะออกแล้วพูดว่า 'ฉันไม่เคยคิดว่าเธอเป็นเพื่อนเลยสักครั้ง' ไม่ใช่เหรอ..."
52090-195 = "จะเป็นแบบนั้นไปได้ยังไง!"
52090-202 = "ขะ... ขอโทษนะ... ฉันตกใจจนเผลอตะคอกออกไปเสียได้"
52090-203 = "แต่ฉันไม่มีทางทำแบบนั้นอยู่แล้วนี่? ฉันจะพูดคำที่สร้างบาดแผลกับเพื่อนคนสำคัญได้ยังไง?"
52090-204 = "ฟังผิดไปหรือเปล่า? หรือว่าเข้าใจผิดว่าคนอื่นเป็นฉัน..."
52090-205 = "นะ... นั่นสิเนอะ...? อายาเมะไม่มีทางพูดคำแบบนั้นอยู่แล้ว..."
52090-206 = "ไม่สิ ต่อให้รุ่นพี่นางุสะจะพูดแบบนั้น แต่ฉันก็เชื่อคุณอย่างไร้เหตุผลไม่ได้หรอก"
52090-207 = "ฉันเองก็คิดว่าหัวหน้าอายาเมะไม่ใช่คนที่จะพูดอะไรอย่างนั้น... แต่ระหว่างนั้นก็เกิดเรื่องขึ้นมากมาย#nเต็มไปหมด"
52090-208 = "ถ้าถามว่าฉันเชื่อคำพูดของใครมากกว่ากัน ระหว่างหัวหน้าที่หายไปโดยไร้คำอธิบายใดๆ กับรองหัวหน้าที่ยืนหยัดต่อสู้ท่ามกลางวิกฤตของเฮียกคิยาโค ฉันก็ต้องบอกว่าเชื่ออย่างหลัง"
52090-209 = "ถ้าคุณอยากได้รับความไว้วางใจกลับมา คุณก็ควรเปิดเผยให้หมดเปลือกว่าไปทำอะไรมาในดินแดน#nทางเหนือ"
52090-211 = "รุ่นพี่..."
52090-215 = "ก็ได้ ฉันก็ไม่คิดจะปิดบังตั้งแต่แรกอยู่แล้ว"
52090-216 = "แต่ฉันขอกินมื้อเช้าให้เสร็จก่อนได้มั้ย?"
52090-217 = "ทำไมล่ะ ก็ถ้ากินข้าวเหลือ เดี๋ยวผียากไร้ก็มาตามเกาะกันพอดีน่ะสิ"
52090-219 = "ตอนต่อไป;ความทรงจำที่ไม่สมบูรณ์"

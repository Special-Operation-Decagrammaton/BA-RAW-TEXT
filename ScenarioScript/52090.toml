[translation]
52090-1 = "Episode 9;The Hyakkaryouran President"
52090-2 = "Ebisu Dormitory Banquet Hall"
52090-6 = "Oh, this is delicious!"
52090-7 = "It's so wonderful to have warm food again..."
52090-8 = "Pardon me, but may I have seconds?"
52090-12 = "Y-Yes! Is this enough?"
52090-13 = "Perfect! And, if it's not too much, may I have another cup of miso soup?"
52090-24 = "...Hm? What's going on? You're acting like you saw a ghost!"
52090-29 = "I wouldn't say...\"ghost,\" exactly..."
52090-30 = "It's just...a little hard to believe—"
52090-31 = "...President Ayame. I am glad to see that you are well."
52090-32 = "But, as the officer of the Hyakkaryouran, I must inquire about your activities during your absence."
52090-33 = "The Hyakkaryouran nearly disbanded during your abdication."
52090-34 = "To be frank, I'm uncertain if you should still hold the title of president."
52090-35 = "But I would like to hear your explanation."
52090-37 = "...Ah. Same Kikyou as always. I'm glad to see it."
52090-41 = "First, I have no sufficient reason for leaving you, for abandoning the presidency and forgoing my duties."
52090-42 = "I realize that I left Nagusa with such an impossible task. For that, I am truly sorry. Please forgive me."
52090-46 = "Oh, Ayame, please—"
52090-47 = "No, Nagusa."
52090-53 = "Once more, I ask why you abandoned the presidency and disappeared."
52090-54 = "Furthermore, I'd like to hear your perspective on what happened to Nagusa's arm."
52090-58 = "...It will be a long story. Is that all right?"
52090-59 = "Of course!"
52090-60 = "I would gladly listen all night!"
52090-61 = "And you're the first-year student, Yukari? Thanks for the support."
52090-62 = "...But before I begin, let me ask a question—"
52090-63 = "How does one get the Authority to become the Hyakkaryouran President?"
52090-64 = "Me, me! I know the answer!"
52090-65 = "It's through winning a succession contest against the previous President!"
52090-66 = "You're not wrong! But you're missing a little."
52090-70 = "It's not about the presidential title, but more about the Authority that has been passed down since the Great Prophet—"
52090-71 = "So, the succession contest is really about determining who inherits the Hundred Lotus!"
52090-72 = "And that's why the Hyakkaryouran President is able to set her will and wield the Hundred Lotus."
52090-73 = "Well, now that you're back, that should be you, Ayame."
52090-74 = "No one else could possibly compete!"
52090-75 = "...Perhaps, against other humans."
52090-81 = "What are you saying, Ayame?"
52090-87 = "A few days before I left you, I patrolled the Hyakkiyako streets."
52090-97 = "The festival had just ended. The street was silent, but I saw a flickering light..."
52090-101 = "I was about to cross the bridge, but, at that moment, another student crossed in front of me."
52090-111 = "She had blonde hair, purple eyes, a white undershirt, and a blue haori over that..."
52090-112 = "In short, she looked exactly like me."
52090-113 = "I thought I must be mistaken, but it was like looking in a mirror."
52090-114 = "My instincts told me to act. Surely this was a trick!"
52090-123 = "She wasn't surprised to see me. She simply smiled."
52090-124 = "So I did the only thing I could."
52090-128 = "For the first time since I had become president, I raised the Hundred Lotus and aimed it at another."
52090-142 = "And it had no effect."
52090-143 = "The other me didn't even notice the bullet. It kept walking."
52090-156 = "...And so it passed me by and disappeared."
52090-157 = "I know it sounds crazy, but it still haunts me!"
52090-160 = "\"Why didn't the Hundred Lotus work?\""
52090-161 = "\"Did I have no Authority? Is the Hundred Lotus itself an illusion?\""
52090-162 = "\"...Did the Great Prophet Kuzunoha even exist?\""
52090-165 = "The uncertainty crept into me, and so I decided to find the Twilight Temple and Kuzunoha."
52090-166 = "It was a fool's errand, but it was mine."
52090-167 = "And in the end...I failed."
52090-168 = "The only thing I managed to find were ruins where I thought the Twilight Temple should be."
52090-169 = "Kuzunoha never met me. It was fruitless."
52090-175 = "...And that's all you have to say?"
52090-176 = "That's all. I have no further excuse."
52090-177 = "No. Another question remains."
52090-178 = "Nagusa's arm... You said something to her before leaving with Nature's Beauty."
52090-179 = "Nagusa's arm...?"
52090-180 = "Now that you mention it, what's up with bandages? Did you hurt yourself?"
52090-185 = "My arm..."
52090-186 = "Ayame, have you forgotten? We met at the Great Snowfield."
52090-187 = "We did? I don't... Are you certain? Was I snow blind?"
52090-188 = "..."
52090-189 = "You don't remember, Ayame?"
52090-190 = "Nagusa said that you rejected her and said that you were never friends!"
52090-195 = "Impossible!"
52090-202 = "S-Sorry... I didn't mean to yell..."
52090-203 = "But there's no way I would ever say that. I love Nagusa."
52090-204 = "Are you sure you heard right? Maybe it was an imposter?"
52090-205 = "Certainly. I could be mistaken."
52090-206 = "No. Not yet. While you may have Nagusa on board, I still have questions."
52090-207 = "While I agree Ayame would never be so cruel, much has happened since then..."
52090-208 = "Between believing the President who disappeared without warning and the Vice President who stepped up to handle Hyakkiyako's crisis, I'd choose the latter, naturally."
52090-209 = "If you wish to regain my trust, then I suggest you become more transparent."
52090-211 = "Kikyou..."
52090-215 = "Sure. I have nothing to hide."
52090-216 = "But, can we go into this after breakfast?"
52090-217 = "I'm going to need my energy. I suspect you will too."
52090-219 = "Next Episode;Incomplete Memory"

[translation]
10011040-1 = "Episode 4; The First Obstacle: The Face and the Bodyguard"
10011040-8 = "*pant* *pant* ...We...we really did it."
10011040-9 = "We really...kidnapped her!"
10011040-10 = "Th-This is kind of a big deal...right?"
10011040-12 = "Don't waver! You haven't forgotten our objective, have you?"
10011040-14 = "N-Never, Leader! "
10011040-15 = "We kidnap the star of Princess Waraku to make sure this exchange meeting is totally ruined!"
10011040-16 = "And the Yin-Yang Club will have no choice but to acquiesce to our demands!"
10011040-17 = "Yes, exactly. And our plan is foolproof."
10011040-18 = "We consulted with the meastro of crime, also known as \"Professor Smug\" on the AskKivotos.com website."
10011040-19 = "Professor Smug?"
10011040-20 = "Isn't that the infamous criminal who's even being tracked down by the Kronos School?!"
10011040-21 = "The one and only. So our plan is perfect."
10011040-22 = "As long as we execute the plan correctly, both Hyakkiyako and Gehenna will see that the Free-Spirited Mouryo is a force to be reckoned with."
10011040-24 = "More importantly, we've actually kidnapped the famed Princess Chise!"
10011040-25 = "I know we pulled it off, but my heart's still racing."
10011040-26 = "Maybe a peek at her pretty little face will make you feel better. Heehee."
10011040-38 = "Ta-da! It's Ibuki!"
10011040-39 = "Heehee! Iroha's gonna be so proud! Ibuki didn't get scared!"
10011040-40 = "What's next?"
10011040-47 = "Who the hell is this?!"
10011040-48 = "(What's that uniform?! Did we kidnap a member of Gehenna's Pandemonium Society?)"
10011040-49 = "I thought I'd finally be able to get Chise's autograph!"
10011040-50 = "Aw, man. That sucks."
10011040-51 = "\"That sucks\"?! That's all you have to say?"
10011040-53 = "Huh?"
10011040-59 = "You there! What are you doing?!"
10011040-61 = "How did they catch up so quickly?!"
10011040-68 = "The event's already begun! C'mon, being the kidnappers is a really important role too. You should take it seriously."
10011040-70 = "Th-The president of the Festival Operations Department?!"
10011040-71 = "Didn't you pay attention in rehearsal? Your escape route is down this way."
10011040-72 = "...You're gonna help us escape?"
10011040-73 = "Wait, I've heard the rumors!"
10011040-74 = "They say the Festival Operations Department's president is a cold-hearted cutthroat always looking for a payout."
10011040-75 = "Did Professor Smug plan this far ahead?"
10011040-77 = "Th-They must have!"
10011040-78 = "Are you guys last-minute understudies or something? Did no one brief you?"
10011040-79 = "Ugh, it doesn't matter! C'mon, this way!"
10011040-80 = "O-Okay?"
10011040-86 = "You know, they had suspiciously realistic costumes."
10011040-87 = "Imagine if they were actually the Mouryo? Good thing there's no way they would crash the exchange meeting."
10011040-91 = "According to the event schedule, next is..."
10011040-95 = "President! Pina, reporting for duty!"
10011040-96 = "Perfect timing, Pina. It's our turn!"
10011040-100 = "Those Mouryo jerks must have fled this way!"
10011040-101 = "I, Izuna, will never allow them to get away!"
10011040-102 = "H-Here we come...!"
10011040-104 = "Heehee!"
10011040-112 = "Not so fast!"
10011040-113 = "You may not pass!"
10011040-118 = "Huh?"
10011040-119 = "[s] \"...Shizuko and Pina?\""
10011040-121 = "Wow! I knew this performance was gonna be popular, but I didn't think Sensei would participate too... Or a bunch of ninja girls..."
10011040-122 = "What a fun surprise!"
10011040-123 = "And how sad! For our one-time comrades against the evil lord Date Meowru to become our enemies!"
10011040-124 = "A vigilante's path is so sad! So cruel!"
10011040-125 = "[s] \"What is this weird Meowru story that keeps spreading?!\""
10011040-127 = "Aren't you in the Momoyodou? Why would you be getting in our way? Don't tell me... Are you working with the Mouryo?"
10011040-128 = "Oh! I recognize you now. You're the weirdo leader who plays ninja all day!"
10011040-129 = "Who're you calling a weirdo?!"
10011040-130 = "[s] \"You know, the Momoyodou are pretty weird themselves.\""
10011040-131 = "Us? Weird?"
10011040-133 = "I-I-I know all about the Momoyodou! It's a terrifying place where they subject you to m-maniacal and disturbing service...then they s-s-slap you with an astronomical bill!"
10011040-134 = "A ninja won't be tricked by the seedy underbelly of the industry like you!"
10011040-135 = "You all have it totally wrong! Where did you even hear that?!"
10011040-136 = "[s] \"The service at the Momoyodou IS pretty maniacal...\""
10011040-137 = "Et tu, Sensei?!"
10011040-138 = "I'm just in charge of the first obstacle!"
10011040-140 = "Obstacle...?"
10011040-141 = "You mean the trial for the performance?"
10011040-142 = "Yes, welcome to the first trial!"
10011040-143 = "This obstacle is called The Face and the Bodyguard!"
10011040-144 = "And I, the star and owner of the Momoyodou, Kawawa Shizuko, am its gatekeeper!"
10011040-145 = "Me too! I'm Pina!"
10011040-146 = "Aren't you wondering why they chose me as the gatekeeper for the first obstacle? Heehee. I'll get right to the point!"
10011040-148 = "Because I, Shizuko, as the face of the Momoyodou, am the perfect choice to be the very first face that greets you in this adventure!"
10011040-155 = "[ns] \"Was that supposed to be cool? Funny? Should we laugh now?\""
10011040-157 = "Waaaaah?!"
10011040-158 = "Forget it! I don't need your pity laughs anyway!"
10011040-159 = "I don't need a script either. Let me start over!"
10011040-160 = "You brave heroes who have come to rescue the kidnapped princess, I am Shizuko, the face of Momyodou!"
10011040-161 = "And I'm her bodyguard, Pina! Take us down or you'll never pass!"

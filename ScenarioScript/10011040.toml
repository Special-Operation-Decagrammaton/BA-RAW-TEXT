[translation]
10011040-1 = "ตอนที่ 4;ด่านที่ 1 : สาวน้อยและผู้พิทักษ์"
10011040-8 = "แฮ่ก... แฮ่ก... ทะ... ทำลงไปแล้วจริงๆ สินะ...!"
10011040-9 = "ละ... ลักพาตัวมาแล้ว!"
10011040-10 = "คะ... คงไม่เป็นอะไรใช่มั้ย? ทำแบบนี้น่ะ!"
10011040-12 = "ไม่ต้องตกใจไป คงไม่ได้ลืมเป้าหมายในครั้งนี้ของพวกเราใช่มั้ย?"
10011040-14 = "ยะ... ยังจำได้ดีค่ะ! หัวหน้า! "
10011040-15 = "ลักพาตัวนักแสดงหลักของการแสดง <องค์หญิงวาราคุ> และพังงานแลกเปลี่ยนครั้งนี้!"
10011040-16 = "นี่เป็นแผนที่จะทำให้ชมรมหยินหยางยอมก้มหัวให้พวกเรานะ! เข้าใจมั้ย!"
10011040-17 = "ดูแผนการที่เราทำมาถึงตอนนี้สิ ไม่มีช่องโหว่เลยสักนิด"
10011040-18 = "ไม่ว่าใครจะว่ายังไงแผนการนี้ก็เป็นแผนการที่ยอดเยี่ยม เพราะว่าได้รับคำแนะนำจาก <ศาสตราจารย์ยิ้มหวาน> ผู้ที่ได้ชื่อว่าเป็นไมสเตอร์แห่งโลกอาชญากรรมบนเว็บไซต์ข้อควรรู้คิโวทอส#nไงล่ะ"
10011040-19 = "ศาสตราจารย์ยิ้มหวานนี่หมายถึง..."
10011040-20 = "หรือจะเป็นคนดังคนนั้น! ที่ทางโรงเรียนโครโนสพยายามตามหาร่องรอยกันมาตลอดเหรอ?!"
10011040-21 = "ใช่แล้ว เพราะฉะนั้นแผนการนี้น่ะสมบูรณ์แบบ"
10011040-22 = "ขอแค่เพียงเราทำตามแผนนั้น เราก็จะแสดงให้เฮียกคิยาโคและเกเฮนน่าเห็นได้ว่าปีศาจจอมเอาแต่ใจ#nอย่างพวกเราน่ะแข็งแกร่งแค่ไหน"
10011040-24 = "ว่าแต่ว่า... นี่เราลักพาตัวองค์หญิงชิเซะผู้โด่งดังมาจริงๆ งั้นเหรอ..."
10011040-25 = "ถึงจะทำสำเร็จแต่ใจยังสั่นๆ อยู่เลยแฮะ..."
10011040-26 = "มันก็แน่อยู่แล้ว เรามาดูใบหน้าของท่านชิเซะแล้วตั้งสติกันหน่อยดีมั้ย..."
10011040-38 = "อิบูกิมาแล้วค่า!"
10011040-39 = "อื้อ! ถึงจะกลัวจนตัวสั่นแต่อิบูกิก็จะอดทนไว้!"
10011040-40 = "แล้วต่อจากนี้จะให้อิบูกิทำอะไรต่อเหรอ?!"
10011040-47 = "\"แล้วนี่มันใครกันล่ะเนี่ย?!\""
10011040-48 = "(เดี๋ยวนะ?! ไม่ใช่องค์หญิงชิเซะนี่นา... ชุดแบบนี้มัน สมาชิกของแพนเดโมเนียม โซไซตี้จากเกเฮนน่า...?)"
10011040-49 = "อยากจะขอลายเซ็นท่านชิเซะแบบใกล้ๆ แท้ๆ!"
10011040-50 = "น่าเสียดายชะมัด!"
10011040-51 = "นี่มันใช่เรื่องที่แค่เสียดายแล้วก็จบไปดื้อๆ เลยที่ไหนกันเล่า?!"
10011040-53 = "ฮืม?"
10011040-59 = "นี่! พวกเธอ! ทำอะไรกันตรงนั้นน่ะ?"
10011040-61 = "เฮือก! โดนจับได้แล้วเหรอเนี่ย?!"
10011040-68 = "พวกเธอรับบทคนร้ายลักพาตัวใช่มั้ย?! ทำไมมาอยู่ตรงนี้ล่ะ! ไม่เห็นการถ่ายทอดสดเหรอ? ตอนนี้กิจกรรมเริ่มแล้วนะ!"
10011040-70 = "หะ... หัวหน้าชมรมเทศกาล...?"
10011040-71 = "ตามแผนแล้วเส้นทางที่พวกเธอต้องใช้หลบหนีคือทางนี้ต่างหาก!"
10011040-72 = "เอ๊ะ?! หรือว่าจะมาช่วยพวกเราหลบหนีงั้นเหรอ?!"
10011040-73 = "จะ... จะว่าไปก็เคยได้ยินมาเหมือนกันนะ!"
10011040-74 = "ว่าหัวหน้าชมรมเทศกาล... เป็นจอมโหดเหี้ยมที่ทำได้ทุกอย่างเพื่อเงิน!"
10011040-75 = "หรือว่า... นี่เป็นส่วนหนึ่งในแผนการของศาสตราจารย์ยิ้มหวาน?!"
10011040-77 = "ยะ... อย่างนั้นเองหรอกเหรอ...!"
10011040-78 = "เอ๋? รู้สึกเหมือนจะโดนเข้าใจผิดแปลกๆ เลยนะคะ... ได้รับข้อมูลมาผิดรึเปล่านะ?"
10011040-79 = "เอาเถอะ ไม่ใช่เวลามาคุยเรื่องนี้นะ! มาทางนี้สิ!"
10011040-80 = "อะ... เอ๊ะ?"
10011040-86 = "อืม... ไม่สบายใจเลยแหะ เหมือนไม่ใช่ทีมงานของการแสดง... แต่เป็นพวกปีศาจมากกว่า..."
10011040-87 = "ไม่สิ ไม่มีทางเป็นแบบนั้นหรอก พวกปีศาจคงไม่มีทางเข้ามาระหว่างการแสดงได้หรอก อืม"
10011040-91 = "เอาละ ไหนดูซิ... ตามกำหนดการแล้ว ต่อไปก็จะเป็น..."
10011040-95 = "หัวหน้า! พีน่า! มาแล้วค่ะ~!"
10011040-96 = "อ่า มาพอดีเลยนะ! ดีละ! พวกเราก็มาเตรียมตัวกันเถอะ! พีน่า!"
10011040-100 = "เจ้าพวกปีศาจหนีมาทางนี้รึเปล่านะ...!"
10011040-101 = "อิซุนะ! จะไม่ปล่อยไปเด็ดขาดเลยค่ะ!"
10011040-102 = "แฮ่ก... แฮ่ก... ปะ...ไปกันเลยค่ะ!"
10011040-104 = "ฮุฮุฮุ!"
10011040-112 = "นี่ เดี๋ยวก่อนสิ!"
10011040-113 = "ผ่านตรงนี้ไปไม่ได้นะคะ!"
10011040-118 = "ว่าไงนะ..."
10011040-119 = "[s] \"ชิซุโกะกับ... พีน่าเหรอ?\""
10011040-121 = "เอ๋? รู้อยู่ว่ามีผู้ท้าชิงจำนวนมากก็จริง... แต่ไม่คิดเลยว่าคุณครูกับเหล่านินจาสาวจะเข้าร่วมกิจกรรมด้วยน่ะ"
10011040-122 = "อาอิ๊ง~ ชิซุโกะตกใจหมดเลยค่ะ!"
10011040-123 = "พีน่าเองก็! เจ็บปวดหัวใจค่ะ! เพื่อนที่ครั้งหนึ่งเคยร่วมกันต่อสู้กับวายร้ายเนียนเต็นมารุด้วยกัน แต่ตอนนี้กลับเป็นศัตรูกันซะแล้ว!"
10011040-124 = "เส้นทางของอัศวิน! ช่างโหดร้ายและโศกเศร้าเหลือเกินค่ะ!"
10011040-125 = "[s] \"เรื่องนั้นถูกเล่าต่อไปถึงไหนแล้วละนั่น?!\""
10011040-127 = "เดี๋ยวนะ! นั่นมันเจ้าของร้านเฮียกคิยาโคนี่! ทำไมถึงมาขวางทางพวกเราล่ะ?! อย่าบอกนะว่า! เป็นพวกเดียวกับพวกปีศาจ?!"
10011040-128 = "อ่า ส่วนฝั่งนั้นก็คงจะเป็นหัวหน้าของกลุ่มคนพิลึกที่เรียกตัวเองว่านินจาสินะ?"
10011040-129 = "อึก...! พะ... พิลึกงั้นเหรอ! หมายถึงใครน่ะ...!"
10011040-130 = "[s] \"ถ้าพูดถึงความพิลึกละก็ ร้านเฮียกคิยาโคก็ไม่น้อยหน้าเลยนะ\""
10011040-131 = "คะ?"
10011040-133 = "ฉะ... ฉันเคยได้ยินมาค่ะ! ระ... ร้านเฮียกคิยาโค... ปะ... เป็นร้านที่ให้บริการอะไรพิลึกๆ ... และยังเป็นสถานที่น่ากลัวที่ชอบเรียกเก็บค่าบริการด้วย..."
10011040-134 = "อ๊ะ! วงการธุรกิจอันดำมืดสินะคะ! ว่าแล้วเชียว! อิซุนะจะไม่โดนหลอกเด็ดขาดค่ะ!"
10011040-135 = "อย่ามาพูดเรื่องที่ชวนทำให้เข้าใจผิดนะ! แล้วไปได้ยินเรื่องนั้นมาจากไหนกันน่ะ! ทุกคน!"
10011040-136 = "[s] \"แต่บริการแบบโก๊ะกังของร้านเฮียกคิยาโคก็พิลึกจริงๆ นั่นแหละ...\""
10011040-137 = "แม้แต่คุณครูก็คิดอย่างนั้นเหรอคะ?"
10011040-138 = "ฉันแค่รับหน้าที่เบี่ยงเบนความสนใจในการแสดงเท่านั้นเองนะคะ!"
10011040-140 = "เบี่ยงเบนความสนใจ...?"
10011040-141 = "อ่า... นี่เป็นส่วนหนึ่งของการแสดงหรอกเหรอ...?"
10011040-142 = "ใช่ค่ะ! ถูกต้องเลยค่ะ!"
10011040-143 = "ที่นี่ก็คือ! <ด่านเบี่ยงเบนความสนใจที่หนึ่ง: สาวน้อยและผู้พิทักษ์> และพวกเราก็คือผู้เฝ้าประตูนั่นเอง!"
10011040-144 = "ไอดอลควบตำแหน่งเจ้าของร้านเฮียกคิยาโค คาวาวะ ชิซุโกะและก็...!"
10011040-145 = "พีน่าเองค่ะ! บอส!"
10011040-146 = "วันนี้พวกเรารับหน้าที่เป็นผู้เฝ้าประตูในด่านแรกและมาเพื่อขวางทางทุกคน... ฮุฮุฮุ "
10011040-148 = "ชิซุโกะผู้นี้! ที่เป็นพนักงานต้อนรับของร้านเฮียกคิยาโค! มารับหน้าที่ยืนต้อนรับขวางทางเข้าแบบนี้#nเหมาะมากค่ะ...!"
10011040-155 = "[ns] \"อ่า... โทษที เมื่อกี้มุกเหรอ? ครูต้องขำให้มั้ย?\""
10011040-157 = "เอ๋?!"
10011040-158 = "มะ... ไม่ต้องเลยค่ะ! ความใจดีแบบไม่จริงใจแบบนั้น! น่าเศร้าซะยิ่งกว่า!"
10011040-159 = "ยังไงก็เถอะ ฉันจะพูดบทใหม่อีกรอบนะคะ!"
10011040-160 = "ผู้ที่มาช่วยองค์หญิงที่ถูกจับตัวไปทุกท่าน ฉันคือสาวน้อยแห่งร้านเฮียกคิยาโค ชิซุโกะและ...!"
10011040-161 = "ผู้พิทักษ์พีน่าจะเป็นคนจัดการเองค่า~~"

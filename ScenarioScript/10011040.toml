[translation]
10011040-1 = "第4話;第一道關卡：看板娘和SP"
10011040-8 = "哈啊，哈啊……真，真的下手了……！"
10011040-9 = "真，真的綁架了呢！"
10011040-10 = "這，這樣真的沒問題吧？"
10011040-12 = "別高興得太早，我們的目標還沒達成。"
10011040-14 = "我，我一直銘記在心！隊長！"
10011040-15 = "要綁架《和樂公主》的公主，把這次的交流會搞得亂七八糟！"
10011040-16 = "然後讓陰陽部的地位垮台，對吧！"
10011040-17 = "沒錯，目前為止都和計畫一樣。"
10011040-18 = "畢竟這次的作戰，可是獲得了人稱奇普托斯犯罪界大師的「笑咪咪教授」的協助……#n不可能會失敗。"
10011040-19 = "笑咪咪教授……"
10011040-20 = "是據說連克洛盧斯學園也掌握不到真實身分的那個人嗎！？那不是大名人嗎！"
10011040-21 = "沒錯。多虧有他的協助，這項計畫才會如此完美。"
10011040-22 = "接下來只要冷靜執行就行了……#n來，讓百鬼夜行和格黑娜見識我們「妖怪劇團．即興流派」的力量吧。"
10011040-24 = "話說回來……居然真的綁架了家喻戶曉的「知世大人」……"
10011040-25 = "雖然已經綁架成功，我的心臟還在怦怦跳個不停……"
10011040-26 = "難得有這種機會，就來欣賞一下知世大人的臉蛋，讓自己冷靜下來吧……"
10011040-38 = "伊吹登場！"
10011040-39 = "嗯嗯！雖然東搖西晃的，但伊吹撐住了！"
10011040-40 = "接下來伊吹要做什麼呢？"
10011040-47 = "「「「……這個人是誰！？」」」"
10011040-48 = "（不是知世大人……！？這套服裝，莫非是格黑娜的萬魔殿……！？）"
10011040-49 = "本，本來還想跟知世大人要簽名的說！"
10011040-50 = "真遺憾！"
10011040-51 = "現在是說這些的時候嗎！？"
10011040-53 = "咦？"
10011040-59 = "那邊那些人，在那裡做什麼？"
10011040-61 = "什麼，已經被逮到了嗎！？"
10011040-68 = "就是你們負責綁架對吧？#n活動已經開始了，還待在這裡做什麼啊？"
10011040-70 = "節，節慶營運管理部的，部長……？"
10011040-71 = "快走吧，逃跑的路線在這邊！"
10011040-72 = "你，你要幫我們逃跑嗎……！？"
10011040-73 = "這，這麼說來，我之前曾經聽說過……"
10011040-74 = "節慶營運管理部的部長……是個能為金錢不擇手段的狠角色！"
10011040-75 = "難道……這也是「笑咪咪教授」的計畫嗎！？"
10011040-77 = "是，是這樣嗎……？"
10011040-78 = "你們在說什麼？好像聽到了什麼奇怪的話……"
10011040-79 = "算了，總之現在不是說這個的時候了。#n動作快！"
10011040-80 = "咦，咦咦……？"
10011040-86 = "總覺得看起來很像妖怪劇團，讓人不太舒服……"
10011040-87 = "不過現在是在公演的途中，妖怪劇團不太可能出現在這裡……嗯。"
10011040-91 = "我看看，接下來應該是……"
10011040-95 = "部長！菲娜抵達了～！"
10011040-96 = "啊，辛苦了！#n好，那我們也開始準備吧！菲娜！"
10011040-100 = "妖怪劇團應該是往這邊跑了……！"
10011040-101 = "別想從伊樹菜手中逃跑～！"
10011040-102 = "哈啊，哈啊……！"
10011040-104 = "呵呵呵！"
10011040-112 = "等你們很久了！"
10011040-113 = "此路不通！"
10011040-118 = "什麼……！？"
10011040-119 = "[s]「靜子和……菲娜？」"
10011040-121 = "雖然有聽說過會有各種挑戰者，沒想到連老師也在啊……"
10011040-122 = "靜子嚇了一跳☆"
10011040-123 = "菲娜也相當心痛！#n曾經一起打倒大魔王喵天丸的同伴……如今雖然只是一時卻成為了敵人！"
10011040-124 = "任俠之道，實在是太無情了！"
10011040-125 = "[s]「這是怎麼回事……！？」"
10011040-127 = "咦，這不是百夜堂的堂主嗎！為什麼要阻止我們！？#n該不會……你們也是妖怪劇團的同夥！？"
10011040-128 = "啊，你就是傳聞中的那個……率領自稱忍者的怪人組織的……"
10011040-129 = "你……你說誰是怪人！？"
10011040-130 = "[s]「百鬼夜行裡神奇的集團好像確實不少……」"
10011040-131 = "嗯？"
10011040-133 = "我，我有聽說過百夜堂……會提供，瘋狂的服務，然後收取費用……"
10011040-134 = "這就是業界的黑暗面嗎？伊樹菜是不會上當的哦！"
10011040-135 = "等一下！別說那種會讓人誤會的話！"
10011040-136 = "[s]「不過，有部分『瘋狂』的服務好像也沒說錯。」"
10011040-137 = "連老師都這麼說！？"
10011040-138 = "總，總之我們今天只是公演節目的工作人員而已！"
10011040-140 = "工作人員……？"
10011040-141 = "啊……是公演試煉的……？"
10011040-142 = "沒錯！"
10011040-143 = "這「第一道關卡」的守門人，正是我！"
10011040-144 = "百夜堂的偶像兼堂主，同時也是看板娘的河和靜子！"
10011040-145 = "還有菲娜！頭兒！"
10011040-146 = "呵呵呵，沒什麼好隱瞞的，我之所以會在這裡……"
10011040-148 = "是因為這裡是第一道關卡，也就是像看板一樣的地方擔任看板娘！"
10011040-155 = "[ns]「……是不是該笑一下？」"
10011040-157 = "不需要！！！"
10011040-158 = "我也知道沒有多好笑！"
10011040-159 = "總之腳本先放一邊，重新開始吧！"
10011040-160 = "前來解救遭到綁架的公主的各位，就由我靜子與……！"
10011040-161 = "菲娜來當你們的對～～手！"

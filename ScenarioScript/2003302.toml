2003302-33 = "[s] \"무슨 일이라도 있는 거야?\""
2003302-34 = "3;만마전 선임부원;02;아, 그것이…… 의장님께서 말씀하시길, 오늘 13:00 시를 기해 만마전에 무척이나 중요한 귀빈이 방문한다고 하셔서.\n#3;em;…"
2003302-35 = "3;만마전 선임부원;02;그게 누군지 들었느냐고요?"
2003302-36 = "3;만마전 선임부원;04;으음, 극비사항이라 하셔서 거기까지 듣진 못했습니다만.\n#3;stiff\n#3;em;[땀]"
2003302-37 = "3;만마전 선임부원;01;다만 듣기로는 말 한마디, 턱짓 한 번으로 키보토스를 주무르는 어마어마한 권력을 지닌, <이 시대의 총아나 다름없는 이>라고만……"

[translation]
2003302-1 = "萬魔殿的偉大議長！"
2003302-2 = "（依照約定時間抵達萬魔殿時……）"
2003302-7 = "[ns]「嗯……？發生什麼事了嗎？」"
2003302-10 = "議長說的時間就快到了！大家動作再快一點！議長的半身像還沒好嗎！？"
2003302-11 = "現在後勤部正派遣車輛送過來！"
2003302-13 = "我知道了，那迎接貴賓的儀隊準備好了嗎？"
2003302-15 = "預計彩排結束時，就會前往議事堂後方集合。"
2003302-17 = "呼……幸虧一切都很順利，沒有發生任何差錯。#n不過看起來沒有問題的時候，更需要提高警覺。"
2003302-18 = "大家別忘記，真琴議長已經千叮嚀萬囑咐了。"
2003302-19 = "今天拜訪我們萬魔殿的貴賓非常重要，絕對不能怠慢。"
2003302-20 = "做好萬全的準備迎接貴賓，證明真琴議長的權威與威嚴就是我們的任務！"
2003302-21 = "這是展現萬魔殿潛力的機會！"
2003302-24 = "是！！"
2003302-30 = "[ns]「哈囉，看來你很忙呢。」"
2003302-31 = "啊，是[USERNAME]老師。好久不見。"
2003302-32 = "老師難得過來，我卻忙得不可開交，真的很抱歉。"
2003302-33 = "[s]「發生什麼事了嗎？」"
2003302-34 = "啊，因為……議長說今天13:00會有非常重要的貴賓造訪萬魔殿。"
2003302-35 = "有沒有聽說是誰？"
2003302-36 = "唔嗯，因為是極祕事項，所以我也不知道詳細內容。"
2003302-37 = "但聽說是只要一句話、點個頭就能撼動整個奇普托斯……#n擁有極大的權力，可說是「時代寵兒」的人……"
2003302-38 = "[s]「哦……是，是嗎？這樣啊，加油哦。」"
2003302-41 = "萬魔殿辦公室前"
2003302-42 = "（後來每當遇到辛苦的萬魔殿學生都會給予鼓勵，走了幾分鐘後終於抵達目的地）"
2003302-47 = "[ns]「打擾了……」"
2003302-48 = "不行！這樣果然也不對！"
2003302-52 = "[ns]「……嗯？」"
2003302-54 = "唔……這個也不對……那個也不夠滿意……"
2003302-55 = "時間已經所剩不多了……！"
2003302-56 = "想不到居然會想不出任何點子……！"
2003302-60 = "哈！？時間已經這麼晚了嗎……！？"
2003302-61 = "唔唔唔……！到底該怎麼辦才好……該用哪種方法來……"
2003302-62 = "[s]（究竟什麼事讓真琴這麼煩惱，還露出那種表情……）"
2003302-67 = "夏萊的老師拜訪這裡時……#n我羽沼真琴大人該擺出什麼表情和姿勢，才能清楚傳達威嚴啊……！？"
2003302-68 = "[ns]「還以為你有什麼大煩惱，原來是這種事哦！？」"
2003302-69 = "唔哦哦哦哦哦哦哦哦！"
2003302-73 = "咳咳咳咳……！！！"
2003302-74 = "[s]「啊，你沒事吧，真琴！？」"
2003302-75 = "咳咳咳……呼……"
2003302-76 = "……哈啊。"
2003302-77 = "呼……"
2003302-78 = "啊啊，我還以為是誰，原來是老師啊？"
2003302-79 = "來得正是時候，我一直在等著你啊。"
2003302-80 = "[s]（他剛剛好像相當動搖）"
2003302-81 = "唔嗯？不過先等一下……為什麼夏萊的老師在這裡……"
2003302-82 = "那為了迎接老師準備的迎賓活動怎麼樣了？"
2003302-83 = "[s1]（本來還覺得不太可能，看來真的是為了我準備的）\n[s2]（如果是自己會錯意實在很丟臉，所以才選擇保持沉默）"
2003302-86 = "啊啊，嘻嘻嘻。#n果然是那麼回事嗎？"
2003302-87 = "拘泥於形式上的禮儀，只不過是迂腐的虛飾罷了。"
2003302-88 = "與其花時間準備那種事，不如直接找我羽沼真琴大人討論正事。#n原來這就是你想說的呀！夏萊的老師！！"
2003302-89 = "[s]「呃，也沒有到那種程度啦……」"
2003302-90 = "嘻嘻嘻嘻！真不愧是讓我真琴大人動心的英傑！"
2003302-91 = "嗯，必須要擁有這種程度的氣概，才能稱得上是跟我羽沼真琴大人相配的人物！"
2003302-92 = "我的眼光果然沒錯！"
2003302-93 = "[s]「開始覺得你的評價讓人有點負擔了！」"
2003302-94 = "很好，我決定了。"
2003302-95 = "我會通知萬魔殿的所有成員立刻停止活動的相關準備。"
2003302-96 = "今天就由夏萊的老師──你我兩人好好談談就行了吧。"
2003302-97 = "可以麻煩你到外面稍微等一會嗎？"
2003302-98 = "等我準備好之後，我們就來談正事吧。"
2003302-99 = "[s]「啊，嗯。」"
2003302-101 = "（就這樣被真琴趕到了辦公室外面）"
2003302-102 = "這個放這邊……那個擺那裡……然後……"
2003302-108 = "跑哪去了？「皇帝．獅子丸．Junior3世！」輪到你登場了！"
2003302-118 = "可惡！這傢伙！身手什麼時候變得這麼靈活了！？"
2003302-119 = "給我老實一點……！"
2003302-120 = "好！抓到了！"
2003302-121 = "[ns]「………………」"
2003302-122 = "（終於……）"
2003302-123 = "呼……呼……準備就緒。請進吧。"
2003302-124 = "[s]「嗯，打擾了……」"
2003302-130 = "― [log=마코토]嘰嘻嘻嘻，老師啊，你的活躍我都看在眼裡哦。[/log][wa:3060] "
2003302-133 = "― [log=마코토]你幫助他人，解決事件……[/log][wa:1660] "
2003302-134 = "― [log=마코토]提升了夏萊的名聲！[/log][wa:1410] "
2003302-137 = "― [log=마코토]嘻嘻嘻，既然如此，[/log][wa:1900] "
2003302-138 = "― [log=마코토]我也不得不認同──[/log][wa:2410] "
2003302-141 = "― [log=마코토]沒錯，你是能和我真琴大人平起平坐的[/log][wa:3070] "
2003302-142 = "― [log=마코토]有能之人！[/log][wa:920] "
2003302-145 = "[ns]「有，有能之人……？」"
2003302-146 = "― [log=마코토]我就對你的能力給予高度評價……[/log][wa:1000] "
2003302-147 = "― [log=마코토]並提出無法拒絕的重大提案吧。[/log][wa:3600] "
2003302-150 = "― [log=마코토]夏萊的老師啊，和我們萬魔殿……[/log][wa:3080] "
2003302-151 = "― [log=마코토]不，和我羽沼真琴大人聯手吧！[/log][wa:5380] "
2003302-154 = "[ns]「這，這個……」"
2003302-155 = "― [log=마코토]只要我們齊心協力，[/log][wa:1680] "
2003302-156 = "― [log=마코토]征服奇普托斯簡直易如反掌！[/log][wa:2780] "
2003302-159 = "― [log=마코토]如果順利的話，[/log]"
2003302-160 = "― [log=마코토]我就把奇普托斯的一半分給夏萊吧！[/log][wa:1640] "
2003302-163 = "― [log=마코토]怎麼樣，是筆不錯的交易吧？[/log][wa:980] "
2003302-166 = "― [log=마코토]來吧！老師！和我一起！實現遠大的夢想吧！[/log][wa:4450] "
2003302-167 = "― [log=마코토]嘰嘻嘻嘻，嘰嘻嘻嘻嘻嘻嘻！[/log][wa:3270] "
2003302-170 = "嘻嘻嘻，覺得我的提案如何啊？"
2003302-171 = "[USERNAME]老師，這是連你也難以拒絕且深具魅力的……"
2003302-175 = "嗚哇！？獅子丸！你這小子！？還不快點鬆開那張嘴！？"
2003302-176 = "哈……哈……哈啾！！！"
2003302-181 = "[ns3]「啊，嗯……謝謝你的提案，抱歉。」\n[ns4]「最近夏萊的工作太忙了，還請恕我拒絕。」"
2003302-184 = "什麼……！？"
2003302-185 = "竟然這麼輕易地……拒絕我羽沼真琴大人充滿魅力的提案……！？"
2003302-186 = "你果然和傳聞中一樣，不會因為財物或名譽而動搖……"
2003302-187 = "所以千秋才會說，你就算能和我真琴大人共享榮耀也不會動搖啊！#n看來此話不假！"
2003302-188 = "[s5]（財物……？）\n[s6]（……名譽？）"
2003302-191 = "嘻嘻……嘻嘻嘻……"
2003302-192 = "嘰哈哈哈哈！"
2003302-193 = "[s]「那個，真琴……？」"
2003302-194 = "不過！我不會因此感到失望，老師。"
2003302-195 = "我羽沼真琴是個懂得知所進退的真正領導者！"
2003302-196 = "如果夏萊的工作很忙，那也沒辦法！我也擁有會考慮這類因素的變通能力。"
2003302-197 = "我知道了，今天只是我們第一次正式見面，這樣我就很滿足了。"
2003302-198 = "反正……你遲早會和我們萬魔殿攜手合作的！"
2003302-199 = "嘻嘻嘻嘻嘻！！"
2003302-200 = "以後也請多多指教！夏萊的[USERNAME]老師！"
2003302-201 = "[s]「嗯，請多多指教，真琴。」"
2003302-203 = "（和真琴里程碑式的初次相遇，就這樣在一陣騷動中劃下了句點）"

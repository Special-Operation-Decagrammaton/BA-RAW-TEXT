2003302-87 = "3;마코토;03;기존의 관습에 얽매여 준비한 행사 따위, 고리타분하기 그지없는 허식에 불과하다."
2003302-88 = "3;마코토;05;그런 걸 챙길 시간에 주저 없이 나, 하누마 마코토를 찾아 단숨에 본론을 논하는 게 낫다. 그렇게 말하고자 하는 것이로군! 샬레의 선생!!\n#3;em;[!]"

[translation]
2003302-1 = "Great Chairman of the Pandemonium Society!"
2003302-2 = "I arrived early for a meeting with the Pandemonium Society."
2003302-7 = "[ns] \"Hm...? Is something going on?\""
2003302-10 = "Okay! We've almost reached the deadline set by the chairman! Pick up the pace! What's the latest on the chairman's sculpture?!"
2003302-11 = "En route! The supply unit confirmed that it was shipped earlier!"
2003302-13 = "Good! What's the status of the ceremonial guards to greet our prestigious guest?"
2003302-15 = "They're gathering behind the Assembly Hall as soon as they pass their final inspection!"
2003302-17 = "Okay... It looks like everything is on track. But plans are most likely to fail at the final hurdle!"
2003302-18 = "Everyone, don't you dare forget what Chairman Makoto has told us countless times!"
2003302-19 = "We must not permit a hint of neglect to impugn our renowned hospitality—the guest visiting the Pandemonium Society today is extremely prestigious!"
2003302-20 = "Our work is a reflection of Chairman Makoto's authority and charisma! We'll show our devotion to her by greeting our guest with perfection!"
2003302-21 = "Now! It's time to show the world what the Pandemonium Society is made of!"
2003302-24 = "Understood!!!"
2003302-30 = "[ns] \"You seem to be quite busy.\""
2003302-31 = "Ah, [USERNAME] Sensei. We haven't seen you here for some time."
2003302-32 = "I apologize that you arrived in the middle of this commotion after making the trip out here."
2003302-33 = "[s] \"Is something happening?\""
2003302-34 = "Ah, yes... We received word from the chairman that an extremely important guest will be visiting us at thirteen hundred this afternoon."
2003302-35 = "The identity of this guest?"
2003302-36 = "Um, unfortunately I was unable to verify that information, as the chairman claimed their identity is top secret."
2003302-37 = "But she did say they're one of the \"leading figures of this age\" who can turn Kivotos upside down at a snap of their fingers."
2003302-38 = "[s] \"Oh... I-Is that so? Well...good luck.\""
2003302-41 = "Outside the Pandemonium Society Executive Office"
2003302-42 = "After long minutes spent walking through the Pandemonium Society's offices and encouraging every hardworking student I passed by, I finally arrived at my destination."
2003302-47 = "[ns] \"Excuse me...\""
2003302-48 = "Hm! Not this one either!"
2003302-52 = "[ns] \"...Huh?\""
2003302-54 = "Hmm... No, not this... And that one's completely unsuitable..."
2003302-55 = "How is this taking so much time?!"
2003302-56 = "To think that the Great Makoto—of all people—would be out of ideas!"
2003302-60 = "Huh?! Is the hour so late?"
2003302-61 = "Gah! What should I do...? There must be a way forward..."
2003302-62 = "[s] \"(Makoto? Her problem must be serious, judging by the intensity of her expression...)\""
2003302-67 = "I must find the ideal expression and pose to deliver the full force of the Great Hanuma Makoto's charisma...to the Sensei of Schale!"
2003302-68 = "[ns] \"I was wondering what terrible issue you were facing...and it was something like that?!\""
2003302-69 = "H-Huh?!"
2003302-73 = "*cough cough cough*"
2003302-74 = "[s] \"M-Makoto, breathe! Are you okay?!\""
2003302-75 = "*cough cough* *gasp* *gasp*"
2003302-76 = "... *sigh*"
2003302-77 = "Phew..."
2003302-78 = "Ah, Sensei. I was wondering who dared to interrupt me."
2003302-79 = "Excellent timing. I've been expecting your arrival."
2003302-80 = "[s] \"(She seems shaken up...)\""
2003302-81 = "Hm? Hold a moment. If Sensei is here..."
2003302-82 = "What happened to the greeting ceremony I ordered my subordinates to prepare for you?"
2003302-83 = "[s1] \"(So that commotion really was for me.)\"\n[s2] \"(I didn't want to speak up and embarrass anyone.)\""
2003302-86 = "Kiheheheh, I can see the answer written on your face! So that's how it is."
2003302-87 = "Why bind yourself to the musty pretense of some meaningless ceremony, however rich its tradition..."
2003302-88 = "Far better to decapitate the snake before it strikes—by heading directly for the Great Hanuma Makoto! So that's what you're saying, Sensei of Schale!!!"
2003302-89 = "[s] \"I-I wouldn't go that far...\""
2003302-90 = "Kiheheheh! As expected of the person who lit a fire in my heart!"
2003302-91 = "That's the kind of spirit an associate of Hanuma Makoto should possess!"
2003302-92 = "I knew I had taken your measure well!"
2003302-93 = "[s] \"D-Don't you think this is a bit much?\""
2003302-94 = "Very well! I've decided!"
2003302-95 = "I shall instruct the Pandemonium Society to cease all preparations for the ceremony, Sensei."
2003302-96 = "Which means all that's left is our discussion, a tête-à-tête between the leaders of two mighty organizations, who forge an agreement by a contest of wills!"
2003302-97 = "...Would you mind waiting outside for a moment?"
2003302-98 = "I'll be ready for our heart-to-heart shortly. We'll address the meat of the matter then."
2003302-99 = "[s] \"Oh, s-sure.\""
2003302-101 = "I fled the executive office as if Makoto was chasing me with a sword."
2003302-102 = "I'll hide this wrapper in my desk drawer. And move this over here to cover that stain. And..."
2003302-108 = "Hmph! Pspspspsps! His Majesty, Emperor Lionmaru Junior III! I demand an audience!"
2003302-118 = "Tch! You! When did you become so fleet of foot?!"
2003302-119 = "Cease your flight, you fiendish feline!"
2003302-120 = "I have you!"
2003302-121 = "[ns] \"...\""
2003302-122 = "Then, finally..."
2003302-123 = "*inhale* *exhale* I am prepared! You may enter."
2003302-124 = "[s] \"Well, thank you for invit—\""
2003302-130 = "― [log=마코토]Kiheheheh! Sensei...I've been keeping tabs on your achievements.[/log][wa:1340] "
2003302-133 = "― [log=마코토]You've helped others, solved problems... [/log][wa:500] "
2003302-134 = "― [log=마코토]And raised the reputation of Schale to new heights![/log][wa:10] "
2003302-137 = "― [log=마코토]Kiheheh, I'm sure[/log][wa:1580] "
2003302-138 = "― [log=마코토]you can't help but acknowledge the truth──[/log][wa:1090] "
2003302-141 = "― [log=마코토]Indeed, you are an elite with strength[/log][wa:2230] "
2003302-142 = "― [log=마코토]equal to the Great Makoto![/log][wa:80] "
2003302-145 = "[ns] \"E-Elite...?\""
2003302-146 = "― [log=마코토]In appreciation of such grand ability...[/log][wa:10] "
2003302-147 = "― [log=마코토]I am prepared to make you an equally grand offer.[/log][wa:2200] "
2003302-150 = "― [log=마코토]Sensei of Schale! Join forces with the Pandemonium Society...[/log][wa:1240] "
2003302-151 = "― [log=마코토]No... Join forces with me, Hanuma Makoto![/log][wa:4300] "
2003302-154 = "[ns] \"U-Um...\""
2003302-155 = "― [log=마코토]With our hearts aligned,[/log][wa:1080] "
2003302-156 = "― [log=마코토]the conquest of Kivotos will be inevitable![/log][wa:1580] "
2003302-159 = "― [log=마코토]On that great day,[/log]"
2003302-160 = "― [log=마코토]we shall split Kivotos between us! Half of the city shall belong to Schale![/log][wa:10] "
2003302-163 = "― [log=마코토]Is this not a pact, worthy of the great?[/log][wa:10] "
2003302-166 = "― [log=마코토]Take my hand, Sensei! Let us fulfill our grand dream side-by-side![/log][wa:2610] "
2003302-167 = "― [log=마코토]Kiheheheh-eheheheh![/log][wa:3030] "
2003302-170 = "Kiheheh. What is your response?"
2003302-171 = "I can see you're taken aback by the magnanimity of my proposal, [USERNAME] Sensei! I—"
2003302-175 = "Wah?! His Majesty, Emperor Lionmaru—you little fiend! Monarchs do not bite other monarchs!"
2003302-176 = "A-A-Achoo!!!"
2003302-181 = "[ns3] \"Um... Thank you for the offer, but no thanks.\"\n[ns4] \"I'm afraid that I cannot commit Schale to such an alliance.\""
2003302-184 = "Wh-What?!"
2003302-185 = "You would spurn the hand of Hanuma Makoto with barely a moment's thought?!"
2003302-186 = "...Heh. As expected from the teacher who cannot be swayed by either wealth or fame."
2003302-187 = "Chiaki was convinced that even the honor of working alongside me wouldn't be enough to persuade you immediately! I see she had the truth of it!"
2003302-188 = "[s5] \"(...Have I turned down wealth?)\"\n[s6] \"(...Have I turned down fame?)\""
2003302-191 = "Kiheheheh...heheheheh..."
2003302-192 = "Kiheheheh!!!"
2003302-193 = "[s] \"Um, Makoto...?\""
2003302-194 = "You don't disappoint, Sensei! Far from it!"
2003302-195 = "Hanuma Makoto is well aware that true leadership rests in knowing when to hold firm...and when to charge!"
2003302-196 = "I can certainly understand if you're protective of Schale's authority. It's only natural for a leader to be most concerned with their base of power."
2003302-197 = "Very well! I'll content myself with the knowledge that we've had our first meeting as peers!"
2003302-198 = "Besides...it's only a matter of time until you see the light and join forces with the Pandemonium Society!"
2003302-199 = "Kiheheheh!!!"
2003302-200 = "I look forward to working with you, [USERNAME] Sensei of Schale!"
2003302-201 = "[s] \"S-Sure...I look forward to working with you too, Makoto.\""
2003302-203 = "And so my monumental first meeting with Makoto concluded with as much commotion as it had begun."

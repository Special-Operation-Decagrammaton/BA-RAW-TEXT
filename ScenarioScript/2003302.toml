[translation]
2003302-1 = "ท่านประธานผู้ยิ่งใหญ่แห่งแพนเดโมเนียม โซไซตี้!"
2003302-2 = "(ตอนที่คุณครูมาถึงที่หน้าแพนเดโมเนียม โซไซตี้ตามเวลานัด)"
2003302-7 = "[ns] \"หืม...? มีเรื่องอะไรกันน่ะ?\""
2003302-10 = "เอาละ! ใกล้จะถึงเวลาที่ท่านประธานบอกแล้วนะ! เอ้า เร่งมือให้ไวๆ กันหน่อย! รูปปั้นครึ่งตัวของท่านประธานยังมาไม่ถึงอีกเรอะ?!!"
2003302-11 = "กำลังใช้รถของทางหน่วยเสบียงขนส่งมาที่นี่อยู่ค่ะ!"
2003302-13 = "ดีมาก แล้วกองทหารเกียรติยศสำหรับต้อนรับล่ะ?"
2003302-15 = "กองทหารเกียรติยศซ้อมเสร็จแล้ว และกำลังจะมาตั้งแถวที่ด้านหลังห้องประชุมค่ะ!"
2003302-17 = "ดี... ค่อยยังชั่วที่ทุกอย่างเป็นไปตามกำหนดการนะ ถึงทุกอย่างจะดูไม่มีปัญหา แต่ก็ควรระมัดระวัง เอาไว้ก่อน"
2003302-18 = "ทุกคนก็อย่าลืมซะล่ะ ท่านประธานมาโคโตะมอบหมายให้พวกเราดูแลเชียวนะ"
2003302-19 = "วันนี้จะมีแขกที่สำคัญมากๆ มาที่แพนเดโมเนียม โซไซตี้ของเรา จะให้มีเรื่องขาดตกบกพร่องไม่ได้เด็ดขาด"
2003302-20 = "เราจะต้องต้อนรับแขกผู้มีเกียรติคนนี้ให้สมบูรณ์แบบที่สุด เพื่อแสดงอำนาจและศักดิ์ศรีของ#nท่านประธานมาโคโตะให้เป็นที่ประจักษ์!"
2003302-21 = "เอาละ! ได้เวลาแสดงพลังของแพนเดโมเนียม โซไซตี้กันแล้ว!"
2003302-24 = "รับทราบค่ะ!!"
2003302-30 = "[ns] \"ว่าไง... เหมือนจะยุ่งกันอยู่เลยนะ\""
2003302-31 = "อ๊ะ คุณครู [USERNAME] นี่เอง ไม่ได้พบกันนานเลยนะคะ"
2003302-32 = "คุณครูอุตส่าห์มาทั้งที แต่พวกเรากลับให้คุณครูเห็นภาพที่ไม่สมควรแบบนี้ซะได้ ต้องขอโทษด้วยจริงๆ ค่ะ"
2003302-33 = "[s] \"กำลังเตรียมงานอะไรกันอยู่เหรอ?\""
2003302-34 = "อ๊ะ คือว่า... ท่านประธานมีคำสั่งมาค่ะว่าวันนี้ประมาณบ่ายโมงจะมีแขกที่สำคัญมากๆ มาที่#nแพนเดโมเนียม โซไซตี้..."
2003302-35 = "แขกคนนั้นเป็นใครงั้นเหรอคะ?"
2003302-36 = "อืม... ท่านประธานบอกว่าเป็นความลับสุดยอด เลยไม่ได้บอกชื่อมาค่ะ..."
2003302-37 = "แต่ได้ยินมาว่าเป็นคนที่มีอำนาจมหาศาล สามารถควบคุมคิโวทอสได้ในการสั่งการครั้งเดียว และเป็น <ขวัญใจมหาชนแห่งยุค> ด้วยค่ะ..."
2003302-38 = "[s] \"อ้อ งะ...งั้นเหรอ? แบบนี้นี่เอง พยายามเข้านะ\""
2003302-41 = "ด้านหน้าสำนักงาน แพนเดโมเนียม โซไซตี้"
2003302-42 = "(ระหว่างทางที่เดินไป พอคุณครูเจอสมาชิกแพนเดโมเนียม โซไซตี้ก็จะทักทายและพูดให้กำลังใจ และพอเดินไปไม่นานก็มาถึงที่หมาย)"
2003302-47 = "[ns] \"ขอรบกวนหน่อยนะ....\""
2003302-48 = "อื้ม! อันนี้ก็ยังใช้ไม่ได้จริงๆ ด้วย!"
2003302-52 = "[ns] \"หืม...?\""
2003302-54 = "อืมมม... อันนี้ก็ยังไม่ใช่... อันนั้นก็ยังไม่ถูกใจ..."
2003302-55 = "เหลือเวลาไม่มากแล้วด้วยสิ...!"
2003302-56 = "ไม่คิดเลยว่าจะหัวตันคิดไอเดียดีๆ ไม่ออกแบบนี้...!"
2003302-60 = "ห้ะ?! เวลาผ่านมาขนาดนี้แล้วเหรอเนี่ย...?!"
2003302-61 = "อึกกก...! จะทำยังไงดี... จะใช้วิธีไหนดี..."
2003302-62 = "[s] (มาโคโตะ? ทำหน้าแบบนั้นกำลังคิดอะไรอยู่นะ...)"
2003302-67 = "ตอนที่คุณครูจากชาเล่ต์มาเยี่ยมเยียนที่นี่... ท่านฮานุมะ มาโคโตะ ผู้นี้จะต้องทำสีหน้าและท่าทางยังไง ถึงจะแสดงความยิ่งใหญ่ของเราออกมาได้!"
2003302-68 = "[ns] \"นึกว่าคิดอะไรซีเรียสๆ อยู่ ที่แท้ก็คิดเรื่องนั้นเองเรอะ?!\""
2003302-69 = "อะ...อ้ากกกกกก!"
2003302-73 = "แค่กๆๆ แค่กๆๆ...!!!"
2003302-74 = "[s] \"อ๊ะ เป็นอะไรรึเปล่า มาโคโตะ?!\""
2003302-75 = "แค่กๆ แฮ่ก...แฮ่ก..."
2003302-76 = "เฮือกกก..."
2003302-77 = "ฮู่ว..."
2003302-78 = "อ่า นึกว่าใครที่ไหน คุณครูเองเหรอ"
2003302-79 = "ได้จังหวะพอดีเลยละ เรากำลังรอให้คุณครูมาถึงอย่างใจเย็นสุดๆ"
2003302-80 = "[s] (เมื่อกี้ยังกระวนกระวายอยู่เลย...)"
2003302-81 = "หืม? เดี๋ยวก่อนนะ การที่คุณครูจากชาเล่ต์มายืนอยู่ตรงนี้..."
2003302-82 = "แล้วพิธีต้อนรับแขกที่เราเตรียมไว้ต้อนรับคุณครูล่ะ?"
2003302-83 = "[s1] (เดาถูกจริงๆ ด้วย เตรียมพิธีต้อนรับเราจริงๆ ด้วยสินะ)\n[s2] (ถ้าเข้าใจผิดไปเองก็คงจะเขินแย่ ไม่พูดอะไรดีกว่า)"
2003302-86 = "อ่า คิกคิกคิก อย่างนั้นเองเหรอ เป็นอย่างนั้นเองสินะ"
2003302-87 = "งานพิธีที่จัดตามธรรมเนียมที่เคยมีมา คงมีแต่พิธีรีตองอะไรที่ล้าสมัย"
2003302-88 = "เพราะงั้นแทนที่จะเสียเวลากับเรื่องพวกนั้น การตรงมาคุยธุระกับฮานุมะ มาโคโตะผู้นี้เลย คงเป็นเรื่องที่ดีกว่าสินะ คงจะพูดแบบนี้ล่ะสินะ คุณครูจากชาเล่ต์!!!"
2003302-89 = "[s] \"เปล่านะ ก็ไม่ถึงขนาดนั้น...\""
2003302-90 = "หึหึหึหึ...! สมกับเป็นคนที่สั่นคลอนจิตใจของท่านมาโคโตะผู้นี้ได้จริงๆ...!"
2003302-91 = "ใช่แล้ว ต้องมีจิตใจกล้าหาญแบบนั้น ถึงจะคู่ควรกับท่านฮานุมะ มาโคโตะผู้นี้!"
2003302-92 = "คิดแล้วเชียวว่าเรามองคนไว้ไม่ผิดจริงๆ!"
2003302-93 = "[s] \"พูดแบบนี้มันกดดันนะ...!\""
2003302-94 = "ดีละ เราตัดสินใจแล้ว"
2003302-95 = "เราจะสั่งให้สมาชิกทุกคนหยุดการเตรียมงานทั้งหมดเดี๋ยวนี้ละ คุณครูจากชาเล่ต์"
2003302-96 = "แล้วเรากับคุณครูก็ค่อยคุยเรื่องความลับกันต่อที่นี่เพียงลำพัง"
2003302-97 = "เราขอตัวสักครู่ รออยู่ที่นี่ก่อนได้มั้ย?"
2003302-98 = "ขอเราเตรียมพร้อมก่อน แล้วจากนั้นค่อยมาคุยธุระกันต่อ"
2003302-99 = "[s] \"อะ... อื้อ\""
2003302-101 = "(หลังจากนั้นคุณครูก็โดนมาโคโตะให้ออกมารอข้างนอก)"
2003302-102 = "เอาละ อันนี้เอาไว้ตรงนี้ ส่วนอันนี้เอาไว้ตรงนั้น แล้วก็..."
2003302-108 = "ฮึ่ม! ไปอยู่ตรงไหนน่ะ! <จักรพรรดิไลอ้อนมารุ จูเนียร์ที่ 3!> ถึงเวลาที่แกต้องออกมาแล้วนะ!"
2003302-118 = "อึก! เจ้านี่...! ทำไมถึงวิ่งเร็วอะไรขนาดนี้เนี่ย?!"
2003302-119 = "อยู่นิ่งๆ...!"
2003302-120 = "เยี่ยม จับได้แล้ว!"
2003302-121 = "[ns] \"......\""
2003302-122 = "(หลังจากนั้นสักพักใหญ่)"
2003302-123 = "ฮู่ว... เฮ้อ... เตรียมการทุกอย่างเสร็จแล้วละ เชิญเข้ามาได้ "
2003302-124 = "[s] \"อืม ขอรบกวนหน่อยนะ...\""
2003302-130 = "― [log=마코토]คิกคิกคิก คุณครู เราติดตามดูการกระทำของคุณครูมาตลอด[/log][wa:1860] "
2003302-133 = "― [log=마코토]ทั้งเรื่องที่ช่วยเหลือคนอื่น และคลี่คลายเหตุการณ์ต่างๆ...[/log][wa:10] "
2003302-134 = "― [log=마코토]ก็เลยทำให้ชาเล่ต์มีชื่อเสียงขึ้นมา![/log][wa:370] "

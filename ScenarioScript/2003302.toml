2003302-171 = "คุณครู [USERNAME] แม้แต่คุณก็คงปฏิเสธข้อเสนอที่น่าสนใจแบบนี้ไม่ได้..."
2003302-175 = "วะ...ว้าก?! ไลอ้อนมารุ! แกนี่มัน...?! ยังไม่เลิกนิสัยชอบกัดอีก?!"
2003302-176 = "ฮะ...ฮะ...ฮะ...ฮัดชิ่ววว!!"
2003302-181 = "[ns3] \"อะ...อื้อ ขอบคุณสำหรับข้อเสนอนะ แต่ขอโทษที\"\n[ns4] \"ช่วงนี้งานของชาเล่ต์ยุ่งมากเลย ครูขอปฏิเสธแล้วกันนะ\""
2003302-184 = "หาาาา?!"
2003302-185 = "ปฏิเสธข้อเสนอที่เย้ายวนใจของฮานุมะ มาโคโตะผู้นี้ได้อย่างง่ายดายเลย...?!!"
2003302-186 = "สมคำร่ำลือที่ได้ยินมาจริงๆ ว่าไม่ใช่ผู้ที่เคลื่อนไหวเพื่อเงินทองและเกียรติยศ..."
2003302-187 = "ถึงจิอากิจะประเมินมาอย่างแน่วแน่แล้วว่าคุณครูจะไม่รับข้อเสนอของท่านมาโคโตะผู้นี้ก็เถอะ แต่ไม่คิดว่าจะถูกปฏิเสธตรงๆ แบบนี้!"
2003302-188 = "[s5] (เงินทอง....?)\n[s6] (เกียรติยศ...?)"

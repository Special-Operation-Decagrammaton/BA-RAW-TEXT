2003302-192 = "คิกคิกคิก คิกคิกๆ...!"
2003302-193 = "[s] \"นี่ มาโคโตะ...?\""
2003302-194 = "เฮอะ! เราไม่ได้รู้สึกผิดหวังเลยสักนิด คุณครู..."
2003302-195 = "เรา... ท่านฮานุมะ มาโคโตะผู้นี้คือผู้นำที่รู้ตัวดีว่าตอนไหนควรจะล่าถอย หรือยอมปล่อยไป!"
2003302-196 = "การที่งานของทางชาเล่ต์ยุ่งมากก็เป็นเรื่องที่หลีกเลี่ยงไม่ได้ เราก็เป็นคนที่ยืดหยุ่นพอจะอะลุ่มอล่วย#nให้ด้วยเหตุผลนั้นได้"
2003302-197 = "ดีละ วันนี้เป็นการพบกันอย่างเป็นทางการครั้งแรกที่น่าพอใจอย่างยิ่ง"
2003302-198 = "ถึงยังไง... เรื่องที่คุณจะมาร่วมมือกับแพนเดโมเนียม โซไซตี้ของเราก็ขึ้นอยู่กับเวลาเท่านั้น!"

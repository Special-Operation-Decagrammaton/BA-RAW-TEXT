2003302-141 = "― [log=마코토]ใช่แล้ว! คุณเป็นคนที่มีความสามารถพอ[/log][wa:2350] "
2003302-142 = "― [log=마코토]ที่จะเคียงบ่าเคียงไหล่กับท่านมาโคโตะผู้นี้ได้![/log][wa:10] "

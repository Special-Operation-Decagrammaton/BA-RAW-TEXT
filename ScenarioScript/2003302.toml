2003302-9 = "5;만마전 선임부원;01\n3;만마전 부원 모브 B;01\n1;만마전 부원 모브 A;01\n#5;a\n#1;h\n#3;h\n#5;h\n#wait;1500"
2003302-10 = "5;만마전 선임부원;07;자! 의장님께서 말씀하신 시간이 머지않았다! 다들 좀 더 빠릿빠릿하게 움직이도록! 의장님의 흉상 준비는 아직인가?!\n#5;em;[반응]"
2003302-11 = "3;만마전 부원 모브 B;01\n1;만마전 부원 모브 A;07;지금 막 보급부에서 차량에 실어 이리로 보내는 중이라고 합니다!\n#1;em;[!]\n#1;jump"
2003302-12 = "5;만마전 선임부원;01\n3;만마전 부원 모브 B;01\n1;만마전 부원 모브 A;01"
2003302-13 = "5;만마전 선임부원;01;좋아. 그럼 귀빈을 맞이하기 위한 의장대의 준비는?"
2003302-14 = "5;만마전 선임부원;01\n3;만마전 부원 모브 B;01\n1;만마전 부원 모브 A;01"
2003302-15 = "3;만마전 부원 모브 B;07;현재 리허설을 끝마치는 대로 의사당 뒤쪽에서 집합 예정입니다!\n#3;em;[!]\n#3;jump"
2003302-16 = "5;만마전 선임부원;01\n3;만마전 부원 모브 B;01\n1;만마전 부원 모브 A;01"
2003302-17 = "5;만마전 선임부원;02;그래…… 다행히 차질 없이 순조로운 상황이군. 하지만 아무런 문제가 없어 보일 때야말로 가장 주의를 기울여야 하는 법.\n#5;em;…"
2003302-18 = "1;만마전 부원 모브 A;01\n3;만마전 부원 모브 B;01\n5;만마전 선임부원;01;다들 잊지 말도록. 마코토 의장님께선 우리에게 신신당부하셨다.\n#1;dl\n#3;dl\n#5;m3"
2003302-19 = "5;만마전 선임부원;02;오늘 우리 만마전을 방문하시는 귀빈은 무척이나 중요하신 분이니, 결코 소홀히 대해서는 안 된다고 말이야."
2003302-20 = "5;만마전 선임부원;05;귀빈 맞이에 보다 완벽에 완벽을 기하는 것으로, 마코토 의장님의 권위와 위엄을 증명하는 것이 곧 우리의 역할!"
2003302-21 = "5;만마전 선임부원;07;자! 만마전의 저력을 보일 기회다!\n#5;closeup\n#5;em;[!]"

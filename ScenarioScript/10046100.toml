10046100-19 = "3;나기사;02;이치카 씨, 이 해변을 어떻게 보시나요?"
10046100-20 = "1;이치카 수영복;02\n3;나기사;02\n#na;이치카 수영복;어…… 글쎄요. 예쁘다?\n#3;m4\n#1;ar"
10046100-21 = "3;나기사;99;네, 저도 동의합니다. 정말 아름다운 해변이죠."
10046100-22 = "3;나기사;12;이런 좋은 땅을 묵혀두고 있는 것은 아깝죠. 그러니, 최대한 많은 분이 누릴 수 있도록 대중에 개장하려 합니다."
10046100-23 = "1;이치카 수영복;20;예에…… 좋은 생각 같습니다.\n#1;em;[땀]"
10046100-24 = "1;이치카 수영복;04;혹시 저를 부르신 이유가……?\n#1;m2"
10046100-25 = "3;나기사;00;맞습니다. 한 가지 부탁드리고 싶은 일이 있어서요."
10046100-26 = "3;나기사;12;이치카 씨만 괜찮으시다면, 이번 바캉스 기간에 해변 순찰을 맡겨도 될까요?\n#3;em;[?]"
10046100-27 = "1;이치카 수영복;02;순찰, 입니까?"
10046100-28 = "3;나기사;00;예, 휴가철이니만큼, 개장 직후 상당한 인파가 몰리리라 예상됩니다."
10046100-29 = "3;나기사;02;사람이 모이는 곳에는 사고가 터지기 마련이고, 어떠한 불미스러운 사태가 벌어진다면 그건 저희 티파티의 과실이 되겠죠."
10046100-30 = "1;이치카 수영복;07;아아, 이해했습니다.\n#1;jump"
10046100-31 = "3;나기사;99;이렇게 급하게 부탁드리게 되어 정말 송구하네요."
10046100-32 = "1;이치카 수영복;04;아, 아뇨! 당치도 않습니다! 맡겨주십쇼!"
10046100-33 = "3;나기사;03;후후. 믿음직스럽네요. 하지만, 그렇게 딱딱한 업무는 아닙니다.\n#3;em;[음표]"
10046100-34 = "3;나기사;00;저는 남들보다 걱정이 많은 편인 듯하여…… 이것도 살짝 과한 처사라고 이해하고 있습니다."
10046100-35 = "3;나기사;12;이치카 씨도 한 사람의 피서객으로서, 바다 산책을 즐기며 겸사겸사 가볍게 수행해 주세요."

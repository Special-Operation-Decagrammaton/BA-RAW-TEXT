[translation]
10046100-1 = "夏日、海灘、問題兒童"
10046100-7 = "……嗯？是我聽錯了嗎？"
10046100-12 = "總而言之，我打算將私人海灘開放給一般民眾。"
10046100-13 = "不過考量到僅是決定如此的意義相對有限，#n我還邀請了克洛盧斯學園新聞部的成員前來進行宣傳。"
10046100-14 = "……果然，是因為別墅的事嗎？"
10046100-15 = "啊，這和那起事件無關，還請不必擔心。"
10046100-19 = "一花同學，你認為這片海灘怎麼樣呢？"
10046100-20 = "怎，怎麼說呢……很漂亮？"
10046100-21 = "是啊，我也有同感。#n這片海灘確實相當美麗。"
10046100-22 = "若將這麼好的土地閒置實在有些可惜，所以我才希望能與更多人分享。"
10046100-23 = "這，這樣啊……我覺得是個好主意。"
10046100-24 = "所以您要我來是為了……？"
10046100-25 = "沒錯。我有件事想拜託你。"
10046100-26 = "如果一花同學願意的話，能請你在這次渡假期間負責海灘的巡邏嗎？"
10046100-27 = "巡邏……是嗎？"
10046100-28 = "是的。畢竟正值渡假旺季，開放之後想必會湧入大量人潮。"
10046100-29 = "如此一來，事故也將隨之增加。#n倘若發生某些不幸的事故，我們茶會便得為此負起責任了。"
10046100-30 = "啊啊，我明白了。"
10046100-31 = "向你提出如此突然的請求，真是非常抱歉。"
10046100-32 = "請，請別這麼說！#n完全沒問題的！交給我吧！"
10046100-33 = "呵呵，真可靠呢。#n不過這並不是什麼非常嚴肅的工作。"
10046100-34 = "只是我比一般人更容易擔心……這次也可能單純是我反應過度而已。"
10046100-35 = "請一花同學抱著遊客的心情，在享受海邊散步之餘輕鬆應對即可。"
10046100-41 = "應該不會有什麼大問題的。"
10046100-46 = "哈～哈哈哈哈！！"
10046100-50 = "開發囉開發囉！！#n既然拿到許可就沒什麼好猶豫的了！！"
10046100-55 = "哇啊！！大家跟著部長衝啊！！"
10046100-64 = "嘿嘿嘿，生意準備得挺順利的嘛。"
10046100-65 = "是啊。畢竟海灘才剛開放，還沒有像樣的店家。#n等大家玩到肚子餓的時候，就只能來我們這裡消費啦！"
10046100-66 = "我們根本是天才吧？這種點子還有別人能想得到嗎？"
10046100-68 = "哎呀，有間挺有趣的店呢？#n炒麵一盤7000元，冰棒一支3000元……"
10046100-69 = "這應該可以視為「對品質有自信」的意思吧？"
10046100-70 = "沒錯～身為美食研究會成員的探索慾望都爆發了呢★"
10046100-89 = "哈哈，應該不會有什麼大問題的……"
10046100-90 = "不會有問題……"
10046100-102 = "──不會有問題的。"

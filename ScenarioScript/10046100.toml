[translation]
10046100-1 = "Sun, Sand, and Shenanigans"
10046100-7 = "...Huh? Excuse me?"
10046100-12 = "Yes. We will open the private beach to the people."
10046100-13 = "And, for that reason, I have invited the Kronos School of Journalism here. They will publicize the news."
10046100-14 = "...Is it because of the villa?"
10046100-15 = "What villa? This has nothing to do with that. This is...a public service."
10046100-19 = "Ichika, what do you think about this beach?"
10046100-20 = "...Well, it's pretty! Very pristine."
10046100-21 = "I wholeheartedly agree. It's breathtaking."
10046100-22 = "And that's precisely why we are opening access to the public. It is a shame to hoard such beautiful land for the few and the privileged."
10046100-23 = "Yes...that seems very generous."
10046100-24 = "...But why do you need me for that?"
10046100-25 = "Right. I must ask you for a favor."
10046100-26 = "If it's no trouble, could you please patrol the beach during this introductory period?"
10046100-27 = "Patrol?"
10046100-28 = "Yes. Since it's vacation season, I expect a great influx of people upon opening."
10046100-29 = "Where there's people, there are accidents. And if some unfortunate incident occurred, the Tea Party could be held liable."
10046100-30 = "Yes. Understood."
10046100-31 = "I sincerely apologize for the short notice."
10046100-32 = "Oh no, there's no need. Leave it to me."
10046100-33 = "Fufu. You're so reliable, but please don't fret."
10046100-34 = "I tend to worry more than others, and I also understand that this is beyond your normal duties."
10046100-35 = "So please enjoy your time as a vacationer, only perhaps keeping an eye out as you stroll near the shore."
10046100-41 = "I'm sure there's nothing to worry about..."
10046100-46 = "Wahahaha!"
10046100-50 = "Development! Now that we have a permit, we move! Quickly! Before they revoke it!"
10046100-55 = "Yeah! Everyone, follow the president!"
10046100-64 = "Heehee. We're going to make bank!"
10046100-65 = "Yeah! We got a fresh beach, no shops, and no competition. The hungry chumps will HAVE to go to us!"
10046100-66 = "We're geniuses. There's no way anyone else could have thought of this!"
10046100-68 = "My, what an interesting stall. 7,000 yen for Yakisoba and 3,000 yen for an ice pop..."
10046100-69 = "Such a fascinating display of confidence!"
10046100-70 = "Sounds like the Gourmet Research Society better do some research!"
10046100-89 = "Haha, everything's fine. No problem!"
10046100-90 = "Problem..."
10046100-102 = "...Solution."

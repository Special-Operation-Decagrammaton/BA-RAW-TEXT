[translation]
10046100-1 = "ฤดูร้อน เด็กเจ้าปัญหา และชายหาด"
10046100-7 = "คะ...? ว่ายังไงนะคะ?"
10046100-12 = "เราจะเปิดชายหาดส่วนตัวของสภาน้ำชาให้คนอื่นมาท่องเที่ยวค่ะ"
10046100-13 = "แต่ถ้าเปิดโดยไม่มีการโปรโมตก็ไร้ความหมาย ฉันก็เลยเชิญชมรมข่าวของโรงเรียนโครโนสมาทำข่าว#nโปรโมตให้อีกทีค่ะ"
10046100-14 = "เป็นเพราะ... บ้านพักตากอากาศนั่นใช่มั้ยคะ?"
10046100-15 = "อ้อ ไม่เกี่ยวกับเรื่องนั้นหรอกค่ะ อย่ากังวลให้มากไปเลยนะคะ"
10046100-19 = "คุณอิจิกะคิดยังไงเกี่ยวกับชายหาดนี้เหรอคะ?"
10046100-20 = "อ่า... อืม มันก็สวยดีนะคะ"
10046100-21 = "ค่ะ ฉันก็เห็นด้วยค่ะ เป็นชายหาดที่งดงามมากทีเดียว"
10046100-22 = "จะปล่อยให้พื้นที่สวยๆ แบบนี้ถูกทิ้งร้างไว้ก็น่าเสียดายแย่ว่ามั้ยคะ? ฉันก็เลยอยากเปิดให้คนอื่นเข้ามา#nเที่ยวมากที่สุดเท่าที่จะทำได้ค่ะ"
10046100-23 = "ค่ะ... เป็นความคิดที่ดีเลยค่ะ"
10046100-24 = "ว่าแต่เหตุผลที่เรียกฉันมา...?"
10046100-25 = "ใช่แล้วค่ะ ฉันมีเรื่องที่อยากขอร้องเรื่องหนึ่งน่ะค่ะ"
10046100-26 = "ถ้าคุณอิจิกะไม่ติดอะไร ระหว่างวันหยุดพักร้อนครั้งนี้ฉันจะขอให้คุณอิจิกะช่วยลาดตระเวนชายหาดได้#nมั้ยคะ?"
10046100-27 = "ลาดตระเวน... งั้นเหรอคะ?"
10046100-28 = "ใช่ค่ะ นี่เป็นช่วงพีคของฤดูกาล ฉันก็เลยคาดว่าจะมีผู้คนจำนวนมากหลั่งไหลเข้ามาหลังจากเรา#nประกาศเปิดชายหาด"
10046100-29 = "ถ้ามีคนมารวมตัวกัน ก็ย่อมเกิดอุบัติเหตุเป็นธรรมดา และถ้าเกิดเหตุการณ์ไม่พึงประสงค์ใดๆ ขึ้น มันก็จะเป็นความสะเพร่าของสภาน้ำชาค่ะ"
10046100-30 = "อ่า... เข้าใจแล้วค่ะ"
10046100-31 = "ฉันขอโทษจริงๆ ที่มารบกวนอย่างกะทันหันนะคะ"
10046100-32 = "มะ... ไม่เลยค่ะ! ฉันไม่เป็นไรเลย! วางใจฉันได้เลยค่ะ!"
10046100-33 = "ฮุฮุ ได้ฟังแล้วก็อุ่นใจนะคะ แต่นี่ก็ไม่ใช่งานที่เคร่งครัดขนาดนั้นหรอกค่ะ"
10046100-34 = "เมื่อเทียบกับคนอื่นแล้วฉันเป็นคนขี้กังวล... ก็เลยเข้าใจว่านี่อาจเป็นการเตรียมการที่มากเกินไปหน่อย"
10046100-35 = "คุณอิจิกะแค่ไปเดินเล่นรอบๆ ชายหาดเหมือนนักท่องเที่ยวที่มาพักร้อนแล้วตรวจตราดูนู่นนี่ก็พอค่ะ"
10046100-41 = "ฉันว่าไม่น่ามีปัญหาใหญ่อะไรหรอกค่ะ"
10046100-46 = "วะ~ ฮะฮะฮะฮ่า!!"
10046100-50 = "ถึงเวลาพัฒนาออนเซ็น!! ในเมื่อได้รับอนุญาตมาแล้ว งั้นก็ไม่มีเหตุผลให้ลังเล!!"
10046100-55 = "เย้!! ทุกคนตามหัวหน้าไปเลย!!"
10046100-64 = "คิกคิกคิก เตรียมธุรกิจได้ราบรื่นเลยสินะ"
10046100-65 = "ใช่ นี่เป็นชายหาดที่เพิ่งเปิดใหม่ งั้นก็คงยังไม่มีร้านค้าอะไรมาเปิดเป็นกิจจะลักษณะหรอก ถ้าเล่นน้ำจนท้องหิวขึ้นมา คนก็ต้องมาซื้อของกินที่ร้านเราอยู่แล้ว!"
10046100-66 = "พวกเรานี่อัจฉริยะจริงๆ เลยนะ คงมีแค่พวกเราเท่านั้นละที่คิดแบบนี้ได้"
10046100-68 = "ตายจริง มีร้านที่น่าสนใจมาเปิดเหรอคะเนี่ย? ยากิโซบะจานละ 7,000 เยน ไอศกรีมแท่งละ 3,000 เยน..."
10046100-69 = "รสชาติคงจะอร่อยสมราคาสินะคะ"
10046100-70 = "นั่นสิคะ~ ในฐานะชมรมชิมอาหารแล้ว ฉันอยากรู้ขึ้นมาแล้วค่ะว่าจะอร่อยสักแค่ไหนกัน★"
10046100-89 = "ฮ่าฮ่า ไม่น่ามีปัญหาใหญ่อะไรหรอก..."
10046100-90 = "ไม่มีหรอก..."
10046100-102 = "ต้องไม่มี..."

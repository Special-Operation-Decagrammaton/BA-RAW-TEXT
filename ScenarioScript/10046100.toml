10046100-13 = "3;나기사;00;그것만으로는 의미가 없으니, 선전을 위해 크로노스 스쿨의 보도부원들을 초청했고요."
10046100-14 = "3;이치카 수영복;05;……역시, 별장 건물 건 때문입니까?"
10046100-15 = "3;나기사;99;아, 그것과는 무관하니, 너무 심려하지 마시길."

[translation]
10049120-1 = "後日談;飛越深夜"
10049120-3 = "嗚──啊啊啊啊啊啊"
10049120-4 = "──啊啊啊啊啊啊啊──"
10049120-5 = "──啊啊啊啊啊！！"
10049120-9 = "噗，噗哇啊！！"
10049120-10 = "咳咳咳！！我，我不太會游泳啊！！咳咳！！"
10049120-11 = "要是有食人魚怎麼辦啦！！咳咳！！#n或者大螃蟹也一樣！！咳咳！！"
10049120-12 = "咕嚕咕嚕……"
10049120-16 = "什麼嘛，原來水深才到腰部而已啊？"
10049120-18 = "還以為要死在這裡了呢……"
10049120-28 = "啊啊……我的生財工具都被炸得稀巴爛……"
10049120-29 = "完了，我要變成徹底的窮光蛋了──"
10049120-33 = "天啊……！居然連手環都斷了……！#n這下我恐怕……"
10049120-34 = "……嗯？#n不過我都戴著它這麼久了，為什麼偏偏在這種時候……？"
10049120-35 = "能帶來幸運的鍺手環……"
10049120-36 = "就像……一直在守護著我一樣……"
10049120-41 = "本月的主打商品就決定是這個了！！"

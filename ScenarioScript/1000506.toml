[translation]
1000506-1 = "深夜的巡邏"
1000506-2 = "阿拜多斯．市內外圍"
1000506-4 = "（在夜晚的街道上偶然遇見了星野）"
1000506-5 = "唔嘿？老師？"
1000506-6 = "怎麼了？在這個時間？"
1000506-7 = "[s1] 「散步中。」\n[s2] 「正在巡邏。」"
1000506-9 = "唔嘿，阿拜多斯的夜晚是很可怕的，老師。一個人在這裡走來走去沒關係嗎？"
1000506-11 = "唔嘿，阿拜多斯的夜晚是很可怕的，老師。一個人在這裡走來走去沒關係嗎？"
1000506-12 = "和其他學園相比，這裡可是無法地帶唷？如果遇到不良分子之類的話……"
1000506-13 = "我？我的話……那個……該說是巡邏，還是說散步呢……"
1000506-14 = "啊，在這裡啊！"
1000506-15 = "耶，那個，耶耶？ "
1000506-16 = "剛才從不良分子手中救了我的人……！ #n本來想要道謝，卻突然消失不見了....."
1000506-17 = "非常感謝，如果不是你的話，這個月的房租就要被偷走了……"
1000506-18 = "不，不……我，我只是……"
1000506-19 = "啊，是阿拜多斯的學生吧。 #n聽說每天晚上都會巡邏，沒想到會像這樣實際見到面。"
1000506-20 = "非常感謝！ "
1000506-21 = "……"
1000506-23 = "哈啊……"
1000506-24 = "[s] 「在大半夜巡邏？」"
1000506-25 = "不，這只是偶發事件……唔嗯…… "
1000506-26 = "……總覺得越描越黑呢。"
1000506-27 = "挺羞恥的，如果能裝作不知道就幫大忙了～"
1000506-28 = "[s] 「星野不是很坦率嗎？」"
1000506-29 = "哇──！逗大叔玩很有趣嗎！？ "
1000506-31 = "……表情看起來真的很開心耶！？ "
1000506-32 = "[s] 「連睡覺的時間都縮短了，不要太勉強。」"
1000506-33 = "……唔嘿嘿。"
1000506-34 = "我本來就很喜歡睡覺，而且睡得很香。也沒有特別勉強。"
1000506-35 = "……你在擔心我嗎？果然只有老師會擔心這個大叔吧──？"
1000506-36 = "唔嘿嘿。"
1000506-39 = "（星野緊緊挽著我的手臂）"
1000506-40 = "啊，貧血的老毛病突然犯了……！"
1000506-41 = "我頭好暈，需要有人送我回家，老師。"
1000506-42 = "好啦，快走吧。你瞧。柔弱的學生在拜託你了。"
1000506-44 = "（雖然因為有人經過而馬上鬆開了手，但還是和星野融洽地回家了）"

[translation]
1000506-1 = "Midnight Ranger"
1000506-2 = "Abydos Suburban Town"
1000506-4 = "I ran into Hoshino while walking down the street at night."
1000506-5 = "Huh? Sensei?"
1000506-6 = "What's up? What are you doing here at this hour?"
1000506-7 = "[s1] \"I was out for a walk.\"\n[s2] \"Doing a little bit of patrolling.\""
1000506-9 = "Hmm. Abydos can be scary at night, Sensei. Are you sure you're okay by yourself?"
1000506-11 = "Hmm. Abydos can be scary at night, Sensei. Are you sure you're okay by yourself?"
1000506-12 = "It's not like the other academies, it can be really dangerous. What if you ran into thugs?"
1000506-13 = "Me? Well, I, uh...was on patrol... I mean, just taking a walk, I guess..."
1000506-14 = "Oh, there you are!"
1000506-15 = "Huh? What?"
1000506-16 = "You're the student who saved me from those thugs! I wanted to say thanks, but you left so suddenly..."
1000506-17 = "Thank you. I wouldn't be able to afford this month's rent if not for you."
1000506-18 = "Oh, I... That was just..."
1000506-19 = "Oh, you're a student from Abydos. I heard you go on patrol every night, but I didn't expect to meet you like this."
1000506-20 = "Thank you!"
1000506-21 = "..."
1000506-23 = "*sigh*..."
1000506-24 = "[s] \"You've been doing late-night patrols?\""
1000506-25 = "It was just a coincidence... Um..."
1000506-26 = "I feel the more I say, the more convoluted this is going to get..."
1000506-27 = "Sensei...can you just pretend like you didn't see anything? This is so embarrassing. I really don't know what to do right now..."
1000506-28 = "[s] \"What's there to be embarrassed about, Hoshino?\""
1000506-29 = "Argh! Do you like teasing me or something?!"
1000506-31 = "Oh, you so do! You're making fun of me!"
1000506-32 = "[s] \"You shouldn't push yourself so hard. Even you need a good night's sleep.\""
1000506-33 = "...Heeheehee. "
1000506-34 = "I do like to sleep a lot, don't I? It's one of my hobbies. So trust me: I'm not pushing myself too hard."
1000506-35 = "...You were worried about me, weren't you? No one cares as much as you do, you know."
1000506-36 = "Heh heh."
1000506-39 = "Hoshino hung onto my arm and walked alongside me."
1000506-40 = "Oh, I'm feeling dizzy all of a sudden! I'm so lightheaded..."
1000506-41 = "I think I need you to hold my arm on the way home. I'm so dizzy."
1000506-42 = "Come on, let's go. You wouldn't deny an innocent young maiden's request, would you?"
1000506-44 = "I had to let go of Hoshino's arm any time there were passersby, but I managed to take her home."

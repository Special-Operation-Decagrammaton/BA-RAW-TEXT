[translation]
1000506-1 = "กองลาดตระเวนยามราตรี"
1000506-2 = "เขตเมืองด้านนอกอะบิดอส"
1000506-4 = "(คุณครูบังเอิญเจอกับโฮชิโนะที่ถนนแห่งหนึ่งตอนกลางคืน)"
1000506-5 = "เอ๋? ครู?"
1000506-6 = "มีธุระอะไรเหรอถึงได้มาที่นี่ดึกดื่นแบบนี้?"
1000506-7 = "[s1] \"มาเดินเล่น\"\n[s2] \"มาลาดตระเวนน่ะ\""
1000506-9 = "ตอนกลางคืนที่อะบิดอสมันอันตรายนะครู มาเดินคนเดียวแบบนี้ไม่เป็นไรเหรอ?"
1000506-11 = "ตอนกลางคืนที่อะบิดอสมันอันตรายนะครู มาเดินคนเดียวแบบนี้ไม่เป็นไรเหรอ?"
1000506-12 = "ที่นี่เป็นเขตนอกกฎหมาย ไม่มีขื่อมีแปเหมือนโรงเรียนอื่นหรอกนะ ถ้าเกิดไปเจอพวกคนไม่ดีเข้าละก็..."
1000506-13 = "ฉันเหรอ? คือฉัน... อืม... คือว่า... มาลาดตระเวน ไม่ใช่สิๆ มาเดินเล่นน่ะ…"
1000506-14 = "อ๊ะ อยู่ที่นี่เอง!"
1000506-15 = "อ่า... เอ๊ะ เอ๋~?"
1000506-16 = "เธอคือนักเรียนที่ช่วยฉันจากพวกนักเลงเมื่อกี้ใช่มั้ย...! ฉันจะขอบคุณเธอสักหน่อย แต่พอหันมาอีกที#nเธอก็ไม่อยู่แล้ว..."
1000506-17 = "ขอบคุณมากนะ ถ้าไม่ได้เธอช่วยไว้ ฉันคงถูกรีดไถเงินค่าเช่าร้านของเดือนนี้ไปหมดแล้ว…"
1000506-18 = "มะ... ไม่หรอก ฉันแค่..."
1000506-19 = "อ๊า~ นักเรียนของโรงเรียนอะบิดอสเองเหรอเนี่ย ได้ยินข่าวลือว่ามีเด็กนักเรียนออกมาเดิน#nลาดตระเวนทุกคืน โชคดีจริงๆ ที่ได้เจอเธอน่ะ"
1000506-20 = "ขอบคุณมากเลยนะ! "
1000506-21 = ".....\n"
1000506-23 = "เฮ้อ..."
1000506-24 = "[s] \"มาลาดตระเวนตอนกลางคืนงั้นเหรอ?\""
1000506-25 = "...... \n"
1000506-26 = "ดูเหมือนยิ่งพูดแก้ตัว ฉันก็ยิ่งดิ้นไม่หลุดเลยแฮะ"
1000506-27 = "คุณครู... ช่วยทำเป็นไม่รู้ได้มั้ย ที่จริงตอนนี้ฉันรู้สึกอายมากจนไม่รู้จะทำยังไงแล้วน่ะ...."
1000506-28 = "[s] \"โฮชิโนะเป็นพวกปากแข็งสินะ?\""
1000506-29 = "เดี๋ยวเหอะ! มาล้อลุงเล่นแบบนี้สนุกรึไง?"
1000506-31 = "ทำหน้าเหมือนกำลังสนุกอยู่เลยนะ!"
1000506-32 = "[s] \"อย่าหักโหมจนพักผ่อนไม่พอล่ะ\""
1000506-33 = "แหะๆ...."
1000506-34 = "ปกติฉันเป็นพวกนอนเยอะอยู่แล้วนะ อืม ไม่ได้หักโหมอะไรเกินไปหรอก"
1000506-35 = "เป็นห่วงงั้นเหรอ? คงมีแต่ครูที่เป็นห่วงลุงคนนี้ล่ะมั้ง...?"
1000506-36 = "แหะๆ"
1000506-39 = "(โฮชิโนะวิ่งเข้ามาควงแขนคุณครู)"
1000506-40 = "อ๊ะ จู่ๆ โรคโลหิตจางเรื้อรังก็กำเริบจนเวียนหัวไปหมดแล้ว...!"
1000506-41 = "ฉันเวียนหัวมากเลย ช่วยไปส่งที่บ้านหน่อยนะครู"
1000506-42 = "เอาละ รีบไปสิ นี่เป็นคำขอจากนักเรียนตัวเล็กๆ ที่แสนบอบบางเลยนะ..."
1000506-44 = "(คุณครูรีบให้โฮชิโนะเอามือออกเพราะมีคนเดินผ่านไปมา แต่หลังจากนั้นก็เดินไปส่งโฮชิโนะที่บ้าน)"

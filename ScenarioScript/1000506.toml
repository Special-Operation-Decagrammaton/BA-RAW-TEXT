[translation]
1000506-1 = "#Title;한밤중의 순찰자"
1000506-2 = "#place;아비도스 외곽 시내"
1000506-3 = "5;호시노;13\n#5;em;[...]\n#5;a\n#wait;2500"
1000506-4 = "#na;(밤 거리에서 우연히 호시노를 마주쳤다.)"
1000506-5 = "5;호시노;08;헤에? 선생?\n#5;em;[?!]\n#5;shake"
1000506-6 = "5;호시노;04;무슨 일이야? 이런 시간에 여기서?\n#5;hophop\n#5;m3"
1000506-7 = "[s1] \"산책 중이었어.\"\n[s2] \"순찰 중이었어.\""
1000506-8 = "#all;hide"
1000506-9 = "3;호시노;15;으헤, 아비도스의 밤은 무섭다고, 선생. 혼자서 이렇게 돌아다녀도 괜찮은 거야?"
1000506-10 = "#all;hide"
1000506-11 = "3;호시노;15;으헤, 아비도스의 밤은 무섭다고, 선생. 혼자서 이렇게 돌아다녀도 괜찮은 거야?"
1000506-12 = "3;호시노;02;다른 학원들과는 달리 무법지대라구? 이러다가 불량배들이라도 만나면……."
1000506-13 = "3;호시노;08;나? 나는…… 음…… 그러니까…… 대충 순찰, 아니, 산책이랄까…….\n#3;em;[반응]\n#3;stiff"
1000506-14 = "5;퍼그 시민;00;아, 여기 계셨군요!\n#5;al\n#3;m1\n#5;em;[!]"
1000506-15 = "3;호시노;07;아, 어, 어어?\n#3;shake"
1000506-16 = "5;퍼그 시민;00;좀 전에 불량배들에게서 도와주신 학생분……! #n감사 인사를 드릴려고 했는데 갑자기 사라져버려서……."
1000506-17 = "5;퍼그 시민;00;감사합니다. 학생이 아니었다면 이번달 임대료를 전부 빼앗길 뻔 했어요…….\n#5;greeting"
1000506-18 = "3;호시노;09;아, 아니……. 나, 나는 그냥…….\n#3;em;[땀]"
1000506-19 = "5;퍼그 시민;00;아아. 아비도스의 학생이시군요. #n밤마다 순찰을 다닌다는 소문은 들었지만 실제로 이렇게 만나게 될 줄은."
1000506-20 = "5;퍼그 시민;00;고맙습니다, 학생! \n#5;em;[반짝]"
1000506-21 = "3;호시노;11;…….\n#3;em;[...]"
1000506-22 = "#all;hide"
1000506-23 = "3;호시노;02;하아……. \n#3;em;[속상함]\n#3;a"
1000506-24 = "[s] \"한밤중에 순찰을 다니고 있었어?\""
1000506-25 = "3;호시노;08;이건 어쩌다 그랬을 뿐이고…… 음……. \n#3;em;[...]"
1000506-26 = "3;호시노;10;……뭔가 변명을 할수록 수렁에 점점 더 빠지는 기분이 드는데."
1000506-27 = "3;호시노;11;선생, ……부끄러우니까 모른 척 해주지 않을래. 지금도 사실 엄청 부끄러울 뿐이고 말이지…….\n#3;em;[///]\n#3;stiff"
1000506-28 = "[s] \"호시노는 솔직하지 못하구나?\""
1000506-29 = "3;호시노;12;으아-! 이 아저씨를 놀리는 게 재밌어? \n#3;hophop"
1000506-30 = "3;호시노;05\n#3;em;[...]\n#wait;2500"
1000506-31 = "3;호시노;08;……엄청 재밌다는 표정이잖아?! \n#3;em;[땀]"
1000506-32 = "[s] \"자는 시간을 쪼개서까지 무리하진 마.\""
1000506-33 = "3;호시노;15;……. 에헤헤."
1000506-34 = "3;호시노;01;잠이 많은 건 원래 내 습관이야. 음, 딱히 무리를 하고 있는 것도 아니고."
1000506-35 = "3;호시노;02;……걱정해주는거야? 이 아저씨를 걱정해주는 건 역시 선생뿐인가아아-?"
1000506-36 = "3;호시노;14;으헤헤.\n#3;em;[반짝]"
1000506-37 = "3;호시노;14\n#3;greeting\n#wait;450"
1000506-38 = "3;호시노;14\n#3;closeup\n#wait;1000\n#bgshake"
1000506-39 = "#na;(호시노가 팔짱을 끼고 매달려 왔다.)"
1000506-40 = "3;호시노;02;앗, 그러고보니 갑자기 지병인 빈혈이……!\n#3;stiff\n#3;em;[///]\n#3;closeup"
1000506-41 = "3;호시노;15;어지러우니까 집까지 부축 좀 해줬으면 좋겠어. 선생.\n#3;closeup"
1000506-42 = "3;호시노;14;자아, 어서 가자고. 자아. 가녀린 학생의 부탁이니까-\n#3;em;[하트]\n#3;closeup"
1000506-43 = "#all;hide"
1000506-44 = "#na;(지나가던 사람이 있어서 금방 팔짱을 풀긴 했지만, 호시노와 함께 사이좋게 집으로 돌아갔다.)"

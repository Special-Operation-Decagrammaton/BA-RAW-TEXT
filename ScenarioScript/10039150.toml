[translation]
10039150-1 = "後日談;不孤單的展覽"
10039150-2 = "（來到了舉辦展覽的藝術中心）"
10039150-6 = "（藝術中心周圍顯得相當冷清）"
10039150-9 = "（在安靜的氛圍中，展示著許多作品）"
10039150-13 = "[ns]「啊，那是……」"
10039150-16 = "[ns]「渚？」"
10039150-21 = "老師……？"
10039150-28 = "很高興見到您，老師。"
10039150-29 = "來這裡有什麼事嗎……"
10039150-30 = "[s]「我聽說這裡有展覽，所以就來看看。」"
10039150-31 = "呵呵，那麼您來的正是時候呢。#n我就是這次展覽的主辦人。"
10039150-32 = "而且現在正巧有空。"
10039150-33 = "[s]「藝術展啊。原來渚有這樣的嗜好。」"
10039150-34 = "我在這裡也兼任策展人，就由我來向您介紹一下這次展覽的目的和意義吧。"
10039150-37 = "（聽渚介紹了展覽）"
10039150-40 = "……因此除了茶會收藏的作品之外，本次還展示了一些由我親自繪製的圖畫。#n雖然仍有些尚欠雕琢……"
10039150-41 = "[s]「是渚自己畫的？真厲害！」"
10039150-42 = "其，其實並不值得您如此誇耀……"
10039150-47 = "不過……前來參觀的狂獵學生，確實也給予了不錯的評價。"
10039150-48 = "狂獵被稱為藝術的發源地……#n那裡的學生欣賞過無數的藝術作品，其審美眼光想必也非等閒之輩。"
10039150-49 = "能讓這樣的他們留下好評，#n說明作品的水準和展覽的整體氛圍都相當不錯……我是這麼解釋的。"
10039150-53 = "……"
10039150-54 = "啊……"
10039150-55 = "唉……對不起。"
10039150-56 = "我本來希望，至少在老師面前不要這麼拐彎抹角的……#n可惜這似乎已經成了習慣……"
10039150-57 = "[s1]「沒關係。」\n[s2]「你想炫耀一下對吧？」"
10039150-60 = "唔……"
10039150-61 = "……是，或許可以這麼說吧。"
10039150-62 = "能在自己希望有所成就的領域被專家稱讚，對我來說也是個難忘的經驗。"
10039150-63 = "或者說……是件令人高興的事。"
10039150-64 = "感覺受到了認可……真的讓人心情很好。"
10039150-65 = "[s]「我明白。那種感覺確實很棒。」"
10039150-66 = "呵呵……#n換作是平時的我，想必不會表達的如此坦率吧。"
10039150-67 = "和老師的談話，果然能讓人舒暢許多。"
10039150-71 = "……"
10039150-72 = "既然已經說到這裡……可以再多跟您聊聊嗎？"
10039150-73 = "[s3]「我當然歡迎。」\n[s4]「這裡很安靜，正好適合聊天。」"
10039150-76 = "呵呵……是啊。"
10039150-81 = "其實這場展覽，起初並不在狂歡節的計劃之中。"
10039150-82 = "在和茶會成員們討論狂歡節的相關事宜時，我像往常一樣思考著……"
10039150-83 = "這次活動能帶來什麼樣的政治效果、如何獲得有形無形的利益、能達到什麼目標……"
10039150-84 = "隨後我突然產生了這樣的想法。"
10039150-85 = "這次的狂歡節……我想以一名普通三一學生的身份，純粹地享受這場活動。"
10039150-86 = "……"
10039150-87 = "因此我決定暫時擱置那些想法，並申請了我個人一直想嘗試的活動。"
10039150-88 = "[s]「也就是這場展覽啊。」"
10039150-89 = "呵呵，是的。"
10039150-93 = "我希望能向其他學生，分享我在欣賞這些畫作時獲得的感動與藝術靈感。"
10039150-94 = "可惜訪客的數量卻低於預期……不禁讓人有點沮喪。#n為什麼會這樣呢……"
10039150-95 = "[s]（啊……畢竟……）"
10039150-97 = "[ns]「別，別擔心，馬上就會有很多學生過來了！」"
10039150-98 = "但願如此……"
10039150-99 = "不過光是老師願意前來，舉辦這場展覽也算是值得了吧。"
10039150-100 = "[s]「你做得很好哦，渚。」"
10039150-104 = "[ns5]「茶會的渚固然重要……」\n[ns6]「但我也會一直支持作為一名學生的渚。」"
10039150-109 = "又說這種話……"
10039150-114 = "謝謝您，老師。"
10039150-115 = "這份支持，我會好好珍惜並銘記於心的。"
10039150-116 = "[s]「還有，支持渚的並不只有我一個人哦。」"
10039150-120 = "嗯？您的意思是……"
10039150-126 = "啊哈哈！你看這裡全都是甜點耶。#n這樣真的可以嗎？"
10039150-127 = "果然很符合渚的風格。"
10039150-131 = "這個聲音是……"
10039150-137 = "渚醬～有空嗎？#n我聽說有展覽，所以就跟聖亞醬一起來了☆"
10039150-138 = "沒什麼人還挺舒服的。#n雖然對渚來說可能有點遺憾就是了。"
10039150-140 = "彌香同學，聖亞同學……"
10039150-142 = "[ns]「你們好呀，兩位。」"
10039150-146 = "老，老師？"
10039150-147 = "你好呀，老師。"
10039150-148 = "我有聽說老師也會來參觀狂歡節，沒想到會在這裡遇見你呢。"
10039150-149 = "咦？是什麼時候……？#n為什麼我沒聽說過！？"
10039150-151 = "你們兩位……是特地來參觀我的展覽的嗎？"
10039150-153 = "是彌香提議這麼做的。#n說是渚的展覽八成會無聊到沒什麼觀眾，所以我們得去捧場才行……"
10039150-154 = "我，我哪有說得這麼過分……"
10039150-156 = "啊哈哈……原來彌香同學是這麼想的嗎？"
10039150-157 = "[s]「特地過來捧場，果然是好朋友呢。」"
10039150-161 = "呵呵……這點確實沒錯。"
10039150-162 = "啊哈哈……對吧，渚醬？#n別忘了要感謝我們哦？"
10039150-163 = "……"
10039150-164 = "坦白說……"
10039150-170 = "你們兩位願意過來，我確實非常感謝。"
10039150-175 = "嗯？"
10039150-176 = "哦～？"
10039150-178 = "今，今天我打算……試著坦率一點……"
10039150-179 = "我，我剛才正好在為老師介紹作品……你們想一起聽嗎？"
10039150-185 = "嗯！嘿嘿，就幫我們介紹一下吧？渚醬☆"
10039150-186 = "在坦率的感謝之後，還能聽見渚的導覽啊……今天可真是特別的一天。"
10039150-192 = "[ns]「那就拜託你囉，渚。」"
10039150-193 = "咳哼……"
10039150-197 = "那麼大家，請看左邊的這幅作品。"
10039150-199 = "（在渚的導覽即將結束時，觀眾們也陸陸續續地開始進場）"
10039150-200 = "（展覽最終畫下了圓滿的句點）"
10039150-204 = "（儘管聖亞和彌香因為無聊而顯得昏昏欲睡，但渚在介紹作品時看起來非常開心）"

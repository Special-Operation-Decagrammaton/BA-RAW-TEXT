[translation]
10039150-1 = "Afterword;Extroverted Exhibition"
10039150-2 = "I came to the Art Center, where the exhibition was on display."
10039150-6 = "The area around the Center was very quiet."
10039150-9 = "The atmosphere around the artwork was serene."
10039150-13 = "[ns] \"Whoa, that's...\""
10039150-16 = "[ns] \"Nagisa?\""
10039150-21 = "Sensei...?"
10039150-28 = "Hello, Sensei."
10039150-29 = "What brings you here...?"
10039150-30 = "[s] \"I heard about the exhibition, so I came to take a look.\""
10039150-31 = "Heehee, welcome. I am the exhibition's organizer."
10039150-32 = "And your timing's perfect. I happen to be free right now."
10039150-33 = "[s] \"Oh, you're the organizer? I didn't know you had an interest in art.\""
10039150-34 = "I am a curator here as well. Let me explain this artwork's purpose and significance."
10039150-37 = "Nagisa gave a thorough explanation."
10039150-40 = "...So, in addition to the works that the Tea Party owns, a few of my own works are on display. I wouldn't call them masterpieces, but they're here."
10039150-41 = "[s] \"You drew these yourself? That's amazing!\""
10039150-42 = "Oh, I assure you, they're far from amazing."
10039150-47 = "Although...the Wild Hunt student who visited earlier did give a very generous review."
10039150-48 = "...And, being a student of Wildhunt, she's no doubt well versed in art. Her sense of aesthetics must be highly refined."
10039150-49 = "I can only assume she was praising the exhibition as a whole, rather than any particular piece...but her words do carry some weight, or so I would like to believe."
10039150-53 = "..."
10039150-54 = "Ah..."
10039150-55 = "...Heehee... Pardon my rambling."
10039150-56 = "I don't mean to be so roundabout when I speak with you, Sensei. It seems to be a difficult habit for me to break..."
10039150-57 = "[s1] \"It's okay.\"\n[s2] \"You just wanted to brag a little, right?\""
10039150-60 = "Um... "
10039150-61 = "...Yes, I suppose so."
10039150-62 = "Being praised by an expert, in a field I wish to excel in, left quite an impression on me."
10039150-63 = "In fact, it's rather exhilarating."
10039150-64 = "I felt acknowledged, recognized."
10039150-65 = "[s] \"I know that feeling. It's really nice.\""
10039150-66 = "Heehee... I wouldn't normally be so candid, of course."
10039150-67 = "But you have a way of putting me at ease, Sensei."
10039150-71 = "..."
10039150-72 = "As long as I AM being candid, may I share a bit more?"
10039150-73 = "[s3] \"I would totally welcome that.\"\n[s4] \"Well, we do happen to be in a nice, quiet spot. Go ahead.\""
10039150-76 = "Heehee... Very well."
10039150-81 = "This exhibit was not originally in the plans for the Carnival."
10039150-82 = "I thought of it during one of the planning sessions with the rest of the Tea Party."
10039150-83 = "I was pondering what the Carnival's goals should be, what benefits we could gain, both tangible and intangible. What political outcomes we might see."
10039150-84 = "Then it suddenly came to me."
10039150-85 = "The thought that...I could enjoy the Carnival as an ordinary Trinity student."
10039150-86 = "..."
10039150-87 = "So I put aside everything I'd planned up to that point and proposed an event I personally wanted to try. At least once."
10039150-88 = "[s] \"And that was this exhibition.\""
10039150-89 = "Heehee. Indeed."
10039150-93 = "I wanted to share all these emotions and artistic inspiration with other students."
10039150-94 = "Though it's a shame there are so few visitors. I wonder why..."
10039150-95 = "[s] \"(Oh... Hmm...)\""
10039150-97 = "[ns] \"I-It'll be okay. I'm sure plenty more students will come anytime now.\""
10039150-98 = "I hope so, but..."
10039150-99 = "The fact that you came to see it is rewarding enough!"
10039150-100 = "[s] \"You did good, Nagisa.\""
10039150-104 = "[ns5] \"You're an individual student as well as a Tea Party member.\"\n[ns6] \"I want to support both.\""
10039150-109 = "...Well, once again, as always..."
10039150-114 = "Thank you, Sensei."
10039150-115 = "I will always cherish and remember your support."
10039150-116 = "[s] \"I'm not the only one cheering you on here.\""
10039150-120 = "Oh? What do you mean...?"
10039150-126 = "Hahaha, look here. Desserts everywhere!"
10039150-127 = "It's just what you'd expect from Nagisa."
10039150-131 = "Oh, it can't be..."
10039150-137 = "Hey, Nagi! Do you have some time? I heard about the exhibition, so Seia and I came over here to check it out! ☆"
10039150-138 = "It's nice to have it all to ourselves. ...I guess that's not so nice for you, though."
10039150-140 = "Mika, Seia..."
10039150-142 = "[ns] \"Hello, you two!\""
10039150-146 = "Sensei?"
10039150-147 = "Hello, Sensei."
10039150-148 = "I heard you came to see the Carnival. I didn't expect to run into you here."
10039150-149 = "Hm? When did you hear that? I hadn't heard it until now..."
10039150-151 = "Have the two of you come...to see my exhibition?"
10039150-153 = "It was Mika's idea. She said your exhibition would be boring and poorly attended, and that we, at least, should make an appearance there for your sake."
10039150-154 = "Hey, I didn't say it like that..."
10039150-156 = "Ah... So that's what you were thinking, Mika..."
10039150-157 = "[s] \"Regardless, they did both come here to support you.\""
10039150-161 = "Well...that's true enough."
10039150-162 = "Hahaha, that's right, Nagi! You can thank us later!"
10039150-163 = "..."
10039150-164 = "Since I seem to be sharing my feelings today..."
10039150-170 = "I'm truly grateful you came. Both of you."
10039150-175 = "Hmm?"
10039150-176 = "Oh, my."
10039150-178 = "In fact, I think I've learned something today, about being honest with myself."
10039150-179 = "Well, I was just about to give Sensei the tour. Would you like to join us?"
10039150-185 = "Sure! Go ahead, Nagi, tell us all about it!"
10039150-186 = "An honest show of appreciation, followed by a personal guided tour from Nagi herself? What a special day!"
10039150-192 = "[ns] \"Lead the way, Nagisa.\""
10039150-193 = "Ahem..."
10039150-197 = "Everyone, if you'll look to your left..."
10039150-199 = "Just as Nagisa concluded her tour, more visitors began to enter one by one."
10039150-200 = "All in all, the exhibition was a great success."
10039150-204 = "Seia and Mika did get bored pretty quickly, but Nagisa looked quite happy to be telling them all about the art."

[translation]
10039150-1 = "ย้อนวันวาน;นิทรรศการที่ไม่เหงา"
10039150-2 = "(คุณครูไปที่ศูนย์ศิลปะที่มีการจัดนิทรรศการ)"
10039150-6 = "(รอบๆ ศูนย์ศิลปะค่อนข้างเงียบเหงา)"
10039150-9 = "(ผลงานหลายชิ้นถูกจัดแสดงในบรรยากาศที่เงียบสงบ)"
10039150-13 = "[ns] \"อ๊ะ ตรงโน้นคือ...\""
10039150-16 = "[ns] \"นางิสะเหรอ?\""
10039150-21 = "คุณครู...?"
10039150-28 = "ยินดีที่ได้พบค่ะคุณครู"
10039150-29 = "มีธุระอะไรที่นี่คะ..."
10039150-30 = "[s] \"ได้ยินว่ามีนิทรรศการ ครูก็เลยมาดูน่ะ\""
10039150-31 = "ฮุฮุ ตัดสินใจถูกแล้วละค่ะ ฉันเป็นเจ้าภาพของนิทรรศการน่ะค่ะ"
10039150-32 = "ตอนนี้ก็เป็นเวลาว่างพอดีด้วยค่ะ"
10039150-33 = "[s] \"นางิสะก็ชื่นชอบนิทรรศการงานศิลปะสินะ\" "
10039150-34 = "ฉันเป็นภัณฑารักษ์ของที่นี่ด้วยค่ะ ถ้างั้นฉันขออธิบายเกี่ยวกับเป้าหมายและคุณค่าของนิทรรศการนี้ให้#nฟังนะคะ"
10039150-37 = "(คุณครูฟังนางิสะอธิบายเกี่ยวกับนิทรรศการ)"
10039150-40 = "นอกจากงานศิลปะที่สภาน้ำชาเป็นเจ้าของแล้ว ก็ยังมีภาพที่ฉันวาดเองด้วยค่ะ ถึงจะไม่ค่อยสวยเท่าไร#nก็เถอะค่ะ"
10039150-41 = "[s] \"วาดเองเลยเหรอ? เยี่ยมไปเลยนะ!\""
10039150-42 = "ฉะ... ฉันไม่ได้วาดเก่งขนาดที่ควรได้รับคำชมหรอกค่ะ..."
10039150-47 = "แต่ก็... พอจะได้รับคำวิจารณ์ดีๆ จากนักเรียนไวลด์ฮันต์ที่แวะมาชมอยู่บ้างค่ะ"
10039150-48 = "นักเรียนจากไวลด์ฮันต์ที่ได้ชื่อว่าเป็นแหล่งกำเนิดของศิลปะก็น่าจะได้เห็นผลงานศิลปะมามากมาย และก็คงมีความซาบซึ้งในสุนทรียภาพในระดับที่ไม่ธรรมดาเลยละค่ะ ฉันว่าน่าจะเป็นอย่างนั้นนะคะ"
10039150-49 = "และฉันก็ตีความเอาเองว่า... ถ้านักเรียนจากที่นั่นถึงกับประทับใจละก็ คุณภาพและการจัดองค์ประกอบ#nภาพของงานศิลปะเหล่านี้ก็คงอยู่ในระดับที่ยอดเยี่ยมไม่น้อยเลยค่ะ"
10039150-53 = "..."
10039150-54 = "อ่า..."
10039150-55 = "ฮู่ว... ต้องขอโทษด้วยค่ะ"
10039150-56 = "ฉันไม่อยากใช้วิธีการพูดแบบนี้กับคุณครูเลย... แต่มันคงติดเป็นนิสัยน่ะค่ะ..."
10039150-57 = "[s1] \"ไม่เป็นไรหรอก อยากอวดงานตัวเองใช่มั้ยล่ะ?\"\n[s2] \"ไม่เป็นไรหรอก อยากชื่นชมงานตัวเองใช่มั้ยล่ะ?\""
10039150-60 = "อึก... "
10039150-61 = "ค่ะ... คงจะเป็นอย่างนั้นน่ะค่ะ..."
10039150-62 = "การได้รับคำชมจากผู้เชี่ยวชาญในสาขาที่ฉันอยากทำได้ดีคือเรื่องที่น่าประทับใจค่ะ"
10039150-63 = "ฉันดีใจค่ะ ใช่ค่ะ"
10039150-64 = "ฉันดีใจที่... รู้สึกเหมือนได้รับการยอมรับค่ะ"
10039150-65 = "[s] \"ครูเข้าใจความรู้สึกนั้นนะ มันดีมากเลยละ\""
10039150-66 = "ฮุฮุ... ปกติแล้วฉันคงไม่กล้าพูดอย่างตรงไปตรงมาแบบนี้ค่ะ"
10039150-67 = "แต่พอได้คุยกับคุณครู ฉันก็สบายใจและกล้าพูดมากขึ้นนะคะ"
10039150-71 = "..."
10039150-72 = "ไหนๆ ก็ไหนๆ แล้ว ฉันขอเปิดอกคุยมากกว่านี้อีกหน่อย... จะได้มั้ยคะ?"
10039150-73 = "[s3] \"ครูยินดีรับฟังเสมอเลย ที่นี่ก็เงียบดีด้วย\"\n[s4] \"ได้สิ ที่นี่เงียบจนเหมาะกับการคุยอย่างลึกซึ้งอยู่แล้ว\""
10039150-76 = "ฮุฮุ... นั่นสินะคะ..."
10039150-81 = "ที่จริงแล้วนิทรรศการนี้ไม่ได้อยู่ในแพลนของงานเทศกาลหรอกค่ะ"
10039150-82 = "ตอนหารือเรื่องงานคาร์นิวัลกับสมาชิกสภาน้ำชา ฉันก็มีความคิดเหมือนเดิมอยู่ตลอดค่ะ"
10039150-83 = "ฉันคิดและกังวลว่างานนี้จะส่งผลกระทบทางการเมืองอย่างไร จะทำยังไงให้ได้ผลประโยชน์ทั้งทาง#nรูปธรรมและนามธรรม และจะใช้ประโยชน์จากงานนี้ได้มากแค่ไหน..."
10039150-84 = "ระหว่างนั้นก็เกิดความคิดแบบนี้ขึ้นค่ะ"
10039150-85 = "กับงานคาร์นิวัลครั้งนี้... ฉันอยากสนุกกับงานในฐานะของนักเรียนโรงเรียนทรีนิตี้คนหนึ่งเท่านั้นค่ะ"
10039150-86 = "..."
10039150-87 = "ฉันก็เลยเก็บความกังวลที่มี และสมัครเข้าร่วมงานเทศกาลในฐานะนักเรียนคนหนึ่งค่ะ"
10039150-88 = "[s] \"จนได้มาเปิดนิทรรศการนี้สินะ\""
10039150-89 = "ฮุฮุ ใช่ค่ะ"
10039150-93 = "พอได้เห็นรูปพวกนี้ ฉันก็เลยอยากจะแบ่งปันความประทับใจกับแรงบันดาลใจทางด้านศิลปะ ให้กับนักเรียนคนอื่นค่ะ"
10039150-94 = "แต่ฉันก็แอบท้อแท้นะคะที่มีคนมาดูน้อยกว่าที่คิด... ทำไมถึงเป็นอย่างนี้ล่ะคะ..."
10039150-95 = "[s] (อ่า... เรื่องนั้นน่ะ...)"
10039150-97 = "[ns] \"ดะ... เดี๋ยวก็คึกคักขึ้นน่า เดี๋ยวก็มีคนมาดูเยอะแล้ว!!\""
10039150-98 = "ฉันก็หวังว่าอย่างนั้นค่ะ..."
10039150-99 = "แค่มีคุณครูแวะมาชมอย่างตอนนี้ ฉันก็รู้สึกคุ้มค่าที่เปิดนิทรรศการนี้แล้วละค่ะ"
10039150-100 = "[s] \"เก่งมากแล้วละ นางิสะ\""
10039150-104 = "[ns5] \"ครูให้กำลังใจนางิสะในฐานะนักเรียนคนหนึ่งอยู่นะ\"\n[ns6] \"ครูให้กำลังใจนักเรียนที่ชื่อนางิสะอยู่นะ\""
10039150-109 = "พูดแบบนี้อีกแล้ว..."
10039150-114 = "ขอบคุณนะคะ คุณครู"
10039150-115 = "ฉันจะทะนุถนอมกำลังใจนี้ไว้ค่ะ"
10039150-116 = "[s] \"เหมือนไม่ได้มีแค่ครูที่ให้กำลังใจนางิสะอยู่นะ\""
10039150-120 = "คะ? หมายความว่ายังไง..."
10039150-126 = "อะฮะฮ่า ดูรูปตรงนี้สิ เป็นรูปของหวานหมดเลย วาดแต่ของหวานแบบนี้ได้เหรอ?"
10039150-127 = "สมกับที่เป็นนางิสะเลยนะคะ"
10039150-131 = "เสียงนี้มัน...?"
10039150-137 = "นางิจัง~ ได้ยินว่าจัดนิทรรศการ ฉันก็เลยมาดูด้วยกันกับเซอาน่ะ☆"
10039150-138 = "พอคนไม่เยอะก็ปลอดโปร่งดีนะคะ ถึงจะเป็นเรื่องที่น่าเศร้าสำหรับนางิสะก็เถอะค่ะ..."
10039150-140 = "คุณมิกะ คุณเซอา..."
10039150-142 = "[ns] \"สวัสดี มิกะ เซอา\""
10039150-146 = "คะ... คุณครู?"
10039150-147 = "สวัสดีค่ะคุณครู"
10039150-148 = "ได้ยินว่าคุณครูก็มาเที่ยวงานคาร์นิวัลด้วย แต่ไม่คิดเลยนะคะว่าจะบังเอิญได้เจอกันที่นี่"
10039150-149 = "อะ... อะไรกันน่ะ? ไปได้ยินมาตอนไหน...? ทำไมฉันไม่รู้เรื่องเลยล่ะ?!"
10039150-151 = "ทั้ง 2 คน... ตั้งใจมาชมนิทรรศการของฉันเหรอคะ?"
10039150-153 = "มิกะเป็นคนชวนมาน่ะค่ะ มิกะบอกว่านิทรรศการของนางิสะคงจะน่าเบื่อและไม่น่ามีคนมาดูเท่าไร พวกเราก็เลยควรมา..."
10039150-154 = "ฉะ... ฉันไม่ได้พูดถึงขนาดนั้นนะ..."
10039150-156 = "อ้อ... คุณมิกะคิดแบบนั้นสินะคะ?"
10039150-157 = "[s] \"ต้องขอบใจเพื่อนๆ ที่ช่วยมาให้กำลังใจนะ\""
10039150-161 = "ฮุฮุ... ก็จริงนะคะ"
10039150-162 = "แหะๆๆ... ใช่มั้ยล่ะ นางิจัง? ต้องขอบใจให้มากๆ เลยนะ"
10039150-163 = "..."
10039150-164 = "ถ้าจะให้พูดตรงๆ ละก็..."
10039150-170 = "ขอบคุณที่มานะคะ ทุกคน..."
10039150-175 = "หืม?"
10039150-176 = "โอ๊ะ"
10039150-178 = "วะ... วันนี้ฉันอยากพูดอย่างตรงไปตรงมาตามที่รู้สึกน่ะค่ะ"
10039150-179 = "ฉะ... ฉันกำลังอธิบายเกี่ยวกับผลงานให้คุณครูฟังอยู่พอดีเลย... งั้นก็มาเดินชมพร้อมกันเลยมั้ยคะ?"
10039150-185 = "อื้อ! แหะๆ อธิบายให้พวกเราฟังด้วยนะ นางิจัง☆"
10039150-186 = "รู้สึกเหมือนนางิสะเป็นครูพิเศษประจำวันเลยค่ะ วันนี้คงจะได้มีประสบการณ์ที่พิเศษเลยนะคะ"
10039150-192 = "[ns] \"งั้นครูก็ขอรบกวนด้วยนะ นางิสะ\""
10039150-193 = "อะแฮ่ม..."
10039150-197 = "ทุกคนช่วยดูที่รูปทางซ้ายนะคะ"
10039150-199 = "(เมื่อนางิสะอธิบายใกล้เสร็จ ก็เริ่มมีนักเรียนทยอยกันเข้ามาชม)"
10039150-200 = "(และนิทรรศการก็จบลงได้อย่างสวยงาม)"
10039150-204 = "(เห็นได้ชัดว่าเซอากับมิกะเบื่อจนต้องเก็บซ่อนความง่วงเอาไว้ แต่นางิสะก็อธิบายผลงานศิลปะอย่าง#nสนุกสนาน)"

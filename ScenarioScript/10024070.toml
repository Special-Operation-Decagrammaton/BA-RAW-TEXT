[translation]
10024070-1 = "ตอนที่ 7;แรงกระตุ้นความพยายาม"
10024070-2 = "นอกเขตซานไห่จิง"
10024070-9 = "..."
10024070-10 = "..."
10024070-11 = "นกกระเรียนเหลืองโผปีกออกเดินทาง"
10024070-12 = "และไม่หวนกลับมา"
10024070-13 = "ไม่มีคนสะกดรอยตามมาแน่นะ?"
10024070-14 = "ในซานไห่จิงไม่มีปัญหาอะไร แล้วทางนั้นล่ะ?"
10024070-15 = "เหมือนกัน จากภายนอกไม่มีการเคลื่อนไหวอะไรที่น่าสงสัย"
10024070-16 = "เรียกมาหามีอะไรหรือเปล่า?"
10024070-17 = "ของรอบนี้มีคนไม่พอใจเยอะมาก"
10024070-18 = "พูดอะไรไม่เห็นรู้เรื่องเลย"
10024070-19 = "จะทำเป็นไม่รู้ไม่เห็นงั้นเหรอ? คิดให้ดีๆ ละ พื้นฐานของการซื้อขายคือความน่าเชื่อถือนะ"
10024070-20 = "ถ้าทำลายความน่าเชื่อถือแบบนี้ <วานรแห่งสัมผัสทั้งห้า> ก็คงไม่อยู่เฉยเช่นกัน"
10024070-22 = "อย่าบอกนะว่าเธอแปรพักตร์จากพวกฉันกับ <วานรแห่งสัมผัสทั้งห้า> แล้วน่ะ?"
10024070-23 = "เลิกพูดอะไรแปลกๆ สักที ฉันไม่คิดอะไรเพ้อเจ้อแบบนั้นหรอกนะ"
10024070-25 = "ที่ผ่านมาฉันรักษาความน่าเชื่อถือมาตลอด เรื่องนั้นก็รู้กันดีอยู่แล้วไม่ใช่เหรอ"
10024070-26 = "มันก็เลยยิ่งแปลกน่ะสิ ก็โสมหมื่นปีที่ส่งให้รอบนี้..."
10024070-28 = "มันไม่ใช่โสมหมื่นปี แต่เป็นแคร์รอตต่างหากเล่า!"
10024070-29 = "พูดอะไรน่ะ! อย่าว่าแต่โสมหมื่นปีหรือแคร์รอตเลย รอบนี้เราไม่ได้ส่งอะไรเลยด้วยซ้ำ!"
10024070-31 = "ว่าไงนะ? ถ้างั้นของที่พวกฉันได้มามันคืออะไรกันแน่!"
10024070-32 = "มันต้องมีอะไรผิดพลาดแน่นอน! เดี๋ยวก่อน ถ้าอย่างนั้น...?"
10024070-37 = "ฟังฉันให้ดี"
10024070-38 = "นั่นใครน่ะ!"
10024070-39 = "ปฐพีจับตา นภาสอดส่อง ฉันรู้ดีว่าพวกเธอมีความมั่นใจ"
10024070-40 = "อย่าบอกนะว่า...?"
10024070-41 = "ไม่ต้องถึงขั้นฝันอยากเป็นวีรชนหรอก แค่ไม่ใช้ชีวิตสกปรกก็พอแล้ว"
10024070-42 = "ให้ตายเถอะ ต้องหนีแล้ว...!"
10024070-43 = "พวกเธอขับร้องเพื่อสิ่งใด? แล้วใช้ชีวิตไปเพื่ออะไร?"
10024070-44 = "มันเรื่องอะไรกัน? เป็นอะไรไป?"
10024070-45 = "มีชีวิตแล้วแท้ๆ ก็ยังไม่รู้จักพอ แล้วเราเกิดเป็นคนเพื่ออะไรกัน!"
10024070-47 = "นี่คือหัวหน้าปฏิบัติการมังกรดำ ผู้บัญชาการโคโนเอะ มินะ! ทุกคนอย่าขยับ!"
10024070-48 = "มังกรดำเหรอ?!"
10024070-49 = "คิดจะหนีไปก็ไม่มีประโยชน์หรอกนะ เราล้อมที่แถวนี้เอาไว้แล้วละ"
10024070-50 = "ถ้าคิดว่าไหว จะลองหนีจากตรงนี้ก็ได้นะคะ"
10024070-51 = "แต่ตอนนั้นต้องประลองเพื่อตัดสินชี้ขาดกับฉันก่อน"
10024070-52 = "ย่านการค้าเทพเต่าดำกับมังกรดำร่วมมือกันงั้นเหรอ...? เป็นไปไม่ได้...?!"
10024070-53 = "น่าเสียดายนะที่มันเป็นไปแล้ว"
10024070-54 = "เอาละ เปิดเผยตัวตนซะ!"
10024070-61 = "อึ่ก...!"
10024070-63 = "เดี๋ยวก่อน นี่เธอ...?!"
10024070-65 = "เครื่องแบบและลวดลายแบบนั้น...!"
10024070-66 = "ก็อย่างว่าแหละ มันย่อมเกิดเรื่องแบบนี้ได้อยู่แล้ว"
10024070-67 = "ต้องไปขอโทษโคโคน่าจังแล้วละนะที่ไปทำให้เธอส่งโสมหมื่นปีที่ถูกปลอมแปลงเป็นแคร์รอตน่ะ"
10024070-68 = "ใช่ค่ะ เพราะสุดท้ายก็เท่ากับว่าเราหลอกใช้ผู้ฝึกสอนโคโคน่า"
10024070-69 = "[s] \"ต้องไปขอโทษชุนด้วยสินะ...\""
10024070-75 = "คุ้นหน้าคุ้นตาดีนี่ เธอน่ะ"
10024070-76 = "ทำไมถึงทำเรื่องแบบนี้...?"
10024070-77 = "..."
10024070-78 = "ตอบมา! ทำแบบนี้ไปทำไม!"
10024070-79 = "เพราะเธอนั่นแหละ โคโนเอะ มินะ"
10024070-80 = "ฉันเหรอ...?"
10024070-81 = "ใช่ เธอนั่นแหละ... ฉันอยากได้ตำแหน่งของเธอ และถ้าจะทำแบบนั้นมันก็ต้องใช้เงิน"
10024070-82 = "ประจวบเหมาะที่มีคนนอกซานไห่จิงกำลังตามหาโสมหมื่นปีพอดี"
10024070-83 = "คนนั้นบอกว่าจะให้ราคาดี ซึ่งก็ได้ตามนั้นจริงๆ"
10024070-84 = "เป็นการซื้อขายที่ไม่แย่เลยละ กล่องสินค้าของย่านการค้าเทพเต่าดำก็ไม่ได้หายากด้วย"
10024070-85 = "ทำไมถึงอยากได้ตำแหน่งของฉันล่ะ...?"
10024070-86 = "ผู้บัญชาการมังกรดำ ควบตำแหน่งหัวหน้าปฏิบัติการ และผู้พิทักษ์ที่ขึ้นตรงต่อท่านประมุข..."
10024070-87 = "ถึงเธอจะไม่คิดว่าเป็นแบบนั้น แต่ที่เธอเป็นอยู่มันก็ไม่ต่างจากการเป็นรองประมุขเลยนะ"
10024070-89 = "แต่เธอน่ะไม่ได้สำนึกบุญคุณของท่านประมุขเท่าพวกฉันหรอก!"
10024070-90 = "พูดอีกอย่างคือฉันรักและเทิดทูนท่านประมุขมากกว่าเธอเป็นไหนๆ!"
10024070-91 = "อะไรนะ...?"
10024070-96 = "นี่ไม่ได้ใช้หัวคิดเลย หรือว่าแกล้งไม่รู้กันคะ"
10024070-97 = "อืม คงไม่ได้ใช้จริงๆ นั่นแหละ"
10024070-99 = "เธอหลอกใช้ความมีน้ำใจของเด็กๆ และสั่นคลอนขนบธรรมเนียมของซานไห่จิงเพียงเพราะเหตุผลนั้น#nน่ะเหรอ...?"
10024070-100 = "เหตุผลนั้นแล้วมันทำไม! มันคือเหตุผลที่สำคัญที่สุดในโลกเชียวนะ! อย่างน้อยก็สำคัญกับฉัน!"
10024070-102 = "ฉันไม่รู้หรอกว่าท่านประมุขคิดยังไง... แต่ถึงท่านประมุขจะให้อภัย แต่ฉันจะไม่ยอมให้อภัยเด็ดขาด!"
10024070-103 = "ไม่อยากจะเชื่อเลย ก่อความวุ่นวายใหญ่โตด้วยเรื่องแค่นี้น่ะเหรอ?"
10024070-104 = "ใครอีกล่ะทีนี้?!"
10024070-105 = "โสมหมื่นปีเป็นของห้ามส่งออกไปนอกซานไห่จิง แต่ฉันก็ไม่สนใจเรื่องการลักลอบส่งออกเท่าไหร่หรอก"
10024070-106 = "สิ่งที่ท่านซายะคนนี้สงสัยก็คือ ใครอยู่เบื้องหลังเรื่องทุกอย่างนี้ต่างหาก!"
10024070-110 = "หัวหน้าชมรมวิจัยศาสตร์การปรุงยา ยาคูชิ ซายะ ขอร่วมต่อสู้ในนามของชมรมวิจัยศาสตร์การปรุงยา!"
10024070-111 = "ชมรมวิจัยศาสตร์การปรุงยาก็ร่วมมือด้วยเหรอ?! เรื่องราวมันเป็นยังไงกันแน่ ย่านการค้าเทพเต่าดำ!"
10024070-113 = "เดี๋ยวก่อน เรื่องนี้พวกเราไม่รู้ด้วยจริงๆ นะ"
10024070-115 = "อย่ามาดูถูกองค์กรย่อยของชมรมวิจัยศาสตร์การปรุงยานะ!"
10024070-116 = "ถ้าเป็นเรื่องวัตถุดิบปรุงยา ฉันกล้าพูดเลยว่าเรารู้ไม่ด้อยไปกว่าเครือข่ายข่าวกรองของย่านการค้าเทพ#nเต่าดำแน่นอน!"
10024070-118 = "จริงเหรอคะ?!"
10024070-119 = "ยังไงก็ขอบคุณนะ ชมรมวิจัยศาสตร์การปรุงยา! ไว้เราจะตอบแทนบุญคุณครั้งนี้นะ!"
10024070-121 = "บุญคงบุญคุณ ตอบทงตอบแทนอะไรกันเล่า ตอนนี้มันใช่เวลามาคุยเรื่องชิลๆ กันซะที่ไหน!"
10024070-122 = "ถ้าคู่ค้าของเจ้าพวกนี้เป็นคนที่ฉันคิดไว้ละก็..."
10024070-123 = "ก็ถึงคราววิกฤตของซานไห่จิงแล้วละ!"
10024070-128 = "..."
10024070-129 = "แล้วจะเอายังไงต่อ...?"
10024070-130 = "ถ้าเราเอาชนะทุกคนในที่แห่งนี้ได้ มันก็ยังจะพอมีหนทาง... ยังหรอกน่า!"
10024070-132 = "ชิ...! ก็ช่วยไม่ได้ละนะ!"
10024070-134 = "ถ้างั้นพวกเราก็มาเริ่มกันเลยไหม เรย์โจว"
10024070-136 = "ค่ะ ท่านประธาน กำลังรอคำพูดนั้นอยู่พอดีเลยค่ะ"
10024070-137 = "ขอเดิมพันด้วยชื่อเสียงของมังกรดำ!"
10024070-138 = "ฉันมีเรื่องที่จะต้องตรวจสอบพวกเธออยู่นะ!"
10024070-139 = "ฝากสั่งการด้วยนะคุณครู มาสู้ไปด้วยกันนะ"

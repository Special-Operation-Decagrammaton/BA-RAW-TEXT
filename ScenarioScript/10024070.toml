[translation]
10024070-1 = "第7話;快馬加鞭：加緊腳步"
10024070-2 = "山海經．外圍"
10024070-9 = "……"
10024070-10 = "……"
10024070-11 = "黃鶴一去──"
10024070-12 = "絕不復返。"
10024070-13 = "沒有被人跟蹤吧？"
10024070-14 = "啊啊，當然。#n你那邊才是，沒問題吧？"
10024070-15 = "我這邊也沒問題。#n沒有觀察到可疑的動靜。"
10024070-16 = "所以呢，可以告訴我特地要我過來的理由嗎？"
10024070-17 = "你自己也知道吧。"
10024070-18 = "……你想說什麼。"
10024070-19 = "還想裝蒜？#n你該不會忘了信用是交易的基礎吧。"
10024070-20 = "像這樣破壞信用的話，「五塵的獼猴」也不會善罷甘休的。"
10024070-22 = "還是說……你打算背叛「五塵的獼猴」？"
10024070-23 = "別說傻話了。我才沒有那種打算。"
10024070-25 = "你在懷疑我們的忠誠嗎？"
10024070-26 = "不，這點我也很清楚。#n正因如此才會覺得奇怪，為何會突然……"
10024070-28 = "送普通的胡蘿蔔過來呢。"
10024070-29 = "什麼？#n別說胡蘿蔔了，我們什麼貨都沒送啊。"
10024070-31 = "既然如此，通過梅花園送來的貨物是……"
10024070-32 = "等等，情況不太對勁……？"
10024070-37 = "──給我聽清楚了。"
10024070-38 = "是誰！"
10024070-39 = "以天地為證──#n你們自己──也知道我是誰。"
10024070-40 = "難道是……？"
10024070-41 = "沒必要夢想成為英雄。#n只不過──是想活得問心無愧。"
10024070-42 = "該死，得趕快逃……！"
10024070-43 = "你們為何謳歌──為何而活？"
10024070-44 = "喂，怎麼了？"
10024070-45 = "光是渾渾噩噩地活著是不夠的──我們所有人都夢想著能夠有所成就！"
10024070-47 = "我是玄龍門的執行部長近衛美奈！所有人不准動！"
10024070-48 = "竟然是玄龍門！？"
10024070-49 = "想逃也是沒用的。#n周圍已經佈好人手了。"
10024070-50 = "想離開這裡的話──"
10024070-51 = "就先試著贏過我們吧。"
10024070-52 = "玄龍門居然會跟玄武商會在一起……？#n這麼荒唐的事情，怎麼可能會……！？"
10024070-53 = "這也並非我的本意。"
10024070-54 = "好了，現出真面目吧！"
10024070-61 = "唔……！"
10024070-63 = "等等，你是……！？"
10024070-65 = "那身打扮是……！"
10024070-66 = "唉，我就覺得事情八成是這麼回事。"
10024070-67 = "之後得向心菜醬道歉才行。#n畢竟把他也捲了進來。"
10024070-68 = "說的沒錯。#n我們也確實利用了心菜教官。"
10024070-69 = "[s]「也要向旬道歉才行……」"
10024070-75 = "身為玄龍門幹部的你竟然……"
10024070-76 = "為什麼要做出這種事……？"
10024070-77 = "……"
10024070-78 = "回答我！為什麼！"
10024070-79 = "這都是因為你，近衛美奈。"
10024070-80 = "你說，是我……？"
10024070-81 = "沒錯。你實在太礙眼了。"
10024070-82 = "為了設法陷害你，就必須籌錢尋求協助。"
10024070-83 = "就在這時，我正好得知了想得到「萬年蔘」的[ruby= ・     ・     ・ ]某個人[/ruby]的存在。"
10024070-84 = "價格相當不錯，是筆不錯的生意。#n只要偽裝為玄武商會的犯行，就能將矛頭指向他們。"
10024070-85 = "……我不記得有對你做過什麼事啊？"
10024070-86 = "身為玄龍門的執行部長兼門主大人的直屬護衛……"
10024070-87 = "你自己是怎麼想的我並不清楚，但實際上你已經等於是玄龍門的第二把交椅了。"
10024070-89 = "不過……喜愛門主大人的心情，我肯定在你之上！"
10024070-90 = "啊啊，可愛的門主大人……明明是我更適合擔任執行部長啊！#n……聽懂了嗎？比我更愛門主大人的人，根本不可能存在！！"
10024070-91 = "啊……？"
10024070-96 = "他是笨蛋吧？"
10024070-97 = "嗯，是笨蛋沒錯。"
10024070-99 = "就，就因為那種理由而利用孩子們的善意、玷汙山海經的傳統嗎……？"
10024070-100 = "居然說是「那種理由」！？#n我有多麼喜愛門主大人，你怎麼可能會了解！！"
10024070-102 = "連門主大人的心意都不明白……即便門主大人原諒你，我也不會原諒！"
10024070-103 = "真是令人哭笑不得。#n就因為那種理由搞出這麼大的事？"
10024070-104 = "是誰！？"
10024070-105 = "不管要走私還是怎樣都無所謂。"
10024070-106 = "我想知道的，是誰在背後策劃著這一切。#n因此──"
10024070-110 = "──鍊丹術研究會也要參戰！"
10024070-111 = "藥子沙耶……！？#n竟然連煉丹術研究會都叫來了，可惡的玄武商會……！"
10024070-113 = "不是，我們也沒聽說過他會來啊！？"
10024070-115 = "可別小看鍊丹術研究會啊！"
10024070-116 = "只要是跟藥相關的事，我們的情報網可是不會輸給玄武商會的！"
10024070-118 = "原來是這樣嗎！？"
10024070-119 = "幫大忙了！謝謝你，沙耶！#n之後再做新的料理給你吃！！"
10024070-121 = "真令人期待！#n……呃，現在不是說這些的時候！"
10024070-122 = "如果這些傢伙背後的人跟我想的一樣的話……"
10024070-123 = "這可是山海經的大事！"
10024070-128 = "……"
10024070-129 = "……該怎麼做？"
10024070-130 = "擊倒他們所有人的話，就能消滅目擊者。"
10024070-132 = "呿……沒辦法了！"
10024070-134 = "令女，準備好了嗎？"
10024070-136 = "是，會長。#n就等您這句話！"
10024070-137 = "以玄龍門之名！"
10024070-138 = "我可是有很多事想問你們啊！"
10024070-139 = "老師，指揮就交給你囉。#n一起加油吧！"

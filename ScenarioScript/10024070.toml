[translation]
10024070-1 = "Episode 7;Full Gallop, Harsher Crop"
10024070-2 = "Shanhaijing Outskirts"
10024070-9 = "..."
10024070-10 = "..."
10024070-11 = "A yellow crane leaves the road."
10024070-12 = "It never returns."
10024070-13 = "Were you followed?"
10024070-14 = "Not in Shanhaijing. You?"
10024070-15 = "Nobody trailing me from the outside."
10024070-16 = "Why did you call this meeting?"
10024070-17 = "We've got complaints about the latest delivery."
10024070-18 = "What delivery?"
10024070-19 = "Don't play dumb with me. I'd hate for you to blow your chance to make this right. "
10024070-20 = "Does your \"Monkey of the Senses\" know you're trying to shake us down?"
10024070-22 = "It seems to me that you're turning your back on us and the Monkey of the Senses."
10024070-23 = "Nonsense. I've never once considered doing something like that."
10024070-25 = "I've dealt with you honorably every step of the way. You know that better than anyone."
10024070-26 = "I thought that was true. But your last shipment of ten-thousand-year ginseng..."
10024070-28 = "...contained nothing but carrots!"
10024070-29 = "Again, what delivery? I haven't sent you anything in a while!"
10024070-31 = "If you didn't send it... Then who did?"
10024070-32 = "Finally, you listen to reason. But, wait... If someone sent you..."
10024070-37 = "Listen."
10024070-38 = "Who's there?!"
10024070-39 = "Two rats meet in the alley to conspire, no one to witness but the sky. Too bad for you the sky told me everything."
10024070-40 = "Is that...?"
10024070-41 = "I never wanted to be a hero, but duty... Duty demands I act, for I am a woman of action."
10024070-42 = "Damn it! Run!"
10024070-43 = "What do you sing for? What do you live for?"
10024070-44 = "I don't understand what's happening!"
10024070-45 = "It isn't enough just to be alive. You've got to light that fire in your heart!"
10024070-47 = "I am Konoe Mina, executive officer of Genryumon. Everyone, freeze!"
10024070-48 = "Genryumon's here?!"
10024070-49 = "There's nowhere to run, by the way. You're surrounded."
10024070-50 = "No, no, give it a shot. I want to see you try."
10024070-51 = "Of course, you'll have to get through me, first."
10024070-52 = "Black Tortoise Promenade and Genryumon...working together...?!"
10024070-53 = "That's what I hate about criminals. No imagination."
10024070-54 = "Now, reveal yourselves!"
10024070-61 = "Tch...!"
10024070-63 = "Wait... You're..."
10024070-65 = "That uniform...!"
10024070-66 = "Ah, of course. These things do happen."
10024070-67 = "I should apologize to Little Kokona for making her deliver those carrots."
10024070-68 = "Right. I feel bad for tricking her like that..."
10024070-69 = "[s] \"We should apologize to Shun while we're at it.\""
10024070-75 = "I know you."
10024070-76 = "Why did you do this?"
10024070-77 = "..."
10024070-78 = "Answer me!"
10024070-79 = "I did it because of you...Konoe Mina."
10024070-80 = "Me?"
10024070-81 = "I needed your position. And to get it, I needed money."
10024070-82 = "I heard about someone outside Shanhaijing who wanted to get their hands on some ten-thousand-year ginseng. "
10024070-83 = "They promised good money. And they were able to pay cash."
10024070-84 = "It wasn't a bad trade. And it was easy to get some spare Black Tortoise Promenade boxes."
10024070-85 = "...Why were you after my position?"
10024070-86 = "You're the spearhead of Genryumon. Executive officer. Personal guard to the president..."
10024070-87 = "Maybe you're too dumb to realize it, but you're basically Genryumon's second-in-command."
10024070-89 = "But you don't appreciate the president like I do!"
10024070-90 = "Her attention is wasted on you! I should be the one by her side!"
10024070-91 = "...?!"
10024070-96 = "She's an idiot."
10024070-97 = "Seems like."
10024070-99 = "You tricked those kids. You shook the very foundations of Shanhaijing. Just...for that?"
10024070-100 = "Just for that? That's the most important reason in the world!"
10024070-102 = "You don't understand the president at all... Even if she forgives you for this, I will not!"
10024070-103 = "What a load of nonsense. You really caused all this trouble for that?"
10024070-104 = "Now who is it?!"
10024070-105 = "Smuggling, betrayal, and all kinds of crime... Well, I don't really care about that."
10024070-106 = "I'm more interested in the mastermind behind this whole operation!"
10024070-110 = "It's me, Yakushi Saya! And in the name of the Eastern Alchemy Society, I want to say some stuff, too!"
10024070-111 = "The Eastern Alchemy Society?! Did you invite ALL your friends, tortoise?"
10024070-113 = "No, I had nothing to do with this!"
10024070-115 = "Don't underestimate the society's information network!"
10024070-116 = "When it comes to the movement of experimental reagents, we're just as in-the-know as the Black Tortoise Promenade!"
10024070-118 = "Really?!"
10024070-119 = "Yes, that's very nice of you. Thank you for all of your help. Goodbye!"
10024070-121 = "You won't brush me off so easily!"
10024070-122 = "If the mastermind is who I think it is..."
10024070-123 = "...she's a threat to all of Shanhaijing!"
10024070-128 = "..."
10024070-129 = "This is getting messy..."
10024070-130 = "We're fine. All we have to do is beat them up."
10024070-132 = "Tch! I guess we have no choice. "
10024070-134 = "Reijo, if you'd be so kind."
10024070-136 = "Yes, President. I was hoping you'd give the order."
10024070-137 = "In the name of Genryumon!"
10024070-138 = "I need ANSWERS!!"
10024070-139 = "We await your commands, Sensei."

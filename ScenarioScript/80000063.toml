[translation]
80000063-1 = "Prepared in Advance"
80000063-3 = "I was waiting on a park bench when Haruka hurriedly approached me."
80000063-4 = "I-I'm sorry I'm late, Sensei! I came as quickly as I could!"
80000063-5 = "Were you waiting long? Oh, no! I can't believe I wasted your precious time!"
80000063-6 = "I don't know what to say... Should I commit seppuku?#nWould that wash away my shame?"
80000063-7 = "Don't worry about it? Well, if you say so..."
80000063-8 = "Th-There's something I want to ask you. I-If it's all right with you, I mean.#nI don't wanna be rude."
80000063-9 = "Huh? Valentine's Day? I-I mean, yes, I know that it is..."
80000063-10 = "W-Was I late because I was preparing s-something for the occasion?#nYes! Th-That's right! You got me."
80000063-11 = "Wait..."
80000063-12 = "How did you know that? And you messaged me first..."
80000063-13 = "[s1] Play along before Haruka takes it to the extreme\n[s2] \"(Gotta stop Haruka from planting yet another bomb.)\""
80000063-14 = "...?"
80000063-15 = "...?"
80000063-16 = "Sensei?"
80000063-17 = "Oh, right! Ch-Chocolate! Yes, I brought some with me.#nI've been keeping it close to me ever since I got it!"
80000063-18 = "Let me just...!"
80000063-23 = "Here. T-To be honest, I don't know a lot about chocolate, so I wasn't sure about what kind to give you..."
80000063-24 = "I-I got the most expensive one that I could afford with my measly salary!"
80000063-25 = "N-Not that the kind I bought n-needed to mean anything special to you."
80000063-26 = "I mean, it probably turned to trash the second someone like me touched it.#nI shouldn't have assumed that you would accept it..."
80000063-27 = "[s3] \"But I asked you here because I DID want it.\"\n[s4] \"I was excited about yours in particular. Thanks.\""
80000063-28 = "Huh?"
80000063-29 = "Huh?"
80000063-30 = "You were...looking forward to me giving you chocolate?"
80000063-31 = "R-Really?! N-Not that I'm calling you a liar, but...!"
80000063-32 = "It's just hard to believe that you'd want chocolate from someone like me."
80000063-33 = "Wh-What do I do now? You're nicer to me than I could ever deserve...#nWhat do I do to repay you?!"
80000063-34 = "Huh? Smile...? But...! That can't be enough!"
80000063-38 = "Heh heh...heh... Like this? Heh heh heh."
80000063-39 = "[s5] \"Okay, that's enough smiling for one day. Thanks.\"\n[s6] \"Uh, yeah! You're adorable, Haruka!\""
80000063-40 = "S-Sensei!"
80000063-41 = "S-Sensei!"
80000063-42 = "Heh..."
80000063-47 = "Heh heh heh. Thank you, Sensei."
80000063-49 = "I sent Haruka on her merry way and struggled as I ate the 99 percent Cacao Dark Chocolate by myself."

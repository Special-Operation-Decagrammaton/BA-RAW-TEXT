[translation]
80000063-1 = "แผนรับมือล่วงหน้า"
80000063-3 = "(คุณครูนั่งรออยู่ที่ม้านั่งในสวน ไม่นานนักฮารุกะก็วิ่งกระหืดกระหอบมาหา)"
80000063-4 = "ขะ...ขอโทษที่มาช้านะคะ คุณครู!! พอคุณครูเรียกฉันก็รีบวิ่งมาเลยค่ะ!!"
80000063-5 = "คะ...คุณครูรอฉันนานรึยังคะ?! มะ...ไม่อยากเชื่อจริงๆ ว่าคนอย่างฉันจะทำให้เวลาอันมีค่า ของคุณครูต้องเสียเปล่า...!!"
80000063-6 = "ไม่รู้ว่าจะขอโทษยังไงดี... หะ...ให้ฉันคว้านท้อง หรือชดใช้ด้วยความตายดีคะ!!"
80000063-7 = "คะ...? ไม่เป็นไรงั้นเหรอคะ? อา... ค่ะ..."
80000063-8 = "คุณครูเรียกฉันมาเพราะอะไรเหรอคะ ปะ...เปล่านะคะ ฉันไม่ได้ตั้งใจจะบ่นหรือทำตัวถือดีอะไรหรอกนะคะ"
80000063-9 = "คะ...? วันวาเลนไทน์...เหรอ...คะ? คือว่า... เรื่องนี้ฉันรู้แล้วค่ะแต่ว่าทำไมถึง..."
80000063-10 = "\"มีของที่เตรียมไว้แล้วใช่หรือเปล่าล่ะ\" งั้นเหรอคะ...!? ชะ...ใช่แล้วค่ะ ใช่ค่ะ สมกับเป็นคุณครูเลย...!"
80000063-11 = "เอ๋...?"
80000063-12 = "ว่าแต่ทำไมคุณครูถึงรู้เรื่องนั้นได้คะ...!? แถมคุณครูยังเป็นฝ่ายเรียกฉันออกมาก่อน..."
80000063-13 = "[s1] (ต้องตอบฮารุกะก่อนที่จะเกิดเรื่อง...)\n[s2] (ต้องรีบหาทางป้องกันก่อนฮารุกะคิดจะวางระเบิด)"
80000063-14 = "...???"
80000063-15 = "...???"
80000063-16 = "คุณครู...?"
80000063-17 = "อ๊ะ ชะ...ช็อกโกแลตเหรอคะ? นี่ค่ะ! อยู่นี่ค่ะ! หลังซื้อมาฉันก็พกติดตัวตลอดเลยค่ะ!"
80000063-18 = "นะ...นี่ค่ะ...!"
80000063-23 = "ทะ...ที่จริงปกติฉันไม่ค่อยกินช็อกโกแลต... เลยไม่รู้ว่าควรซื้อแบบไหนดี..."
80000063-24 = "ฉะ...ฉันเลยเลือกซื้ออันที่ดูหรูที่สุด...! อันที่แพงที่สุดเท่าที่จะซื้อได้มาค่ะ"
80000063-25 = "นะ...แน่นอนว่าช็อกโกแลตที่ฉันซื้อมา...คงไม่ได้มีความหมายอะไรกับคุณครู..."
80000063-26 = "ไม่สิ บางทีสิ่งที่ฉันซื้อมามันอาจจะเป็นได้เพียงแค่เศษขยะก็ได้... ฉะ...ฉันผิดเองที่พูดก่อนที่คุณครู#nจะรับช็อกโกแลตนี่ไป..."
80000063-27 = "[s3] \"ดีใจจัง ที่จริงครูอยากได้ช็อกโกแลตเร็วๆ เลยเรียกมาน่ะ\"\n[s4] \"ครูรอช็อกโกแลตจากฮารุกะอยู่เลย ขอบคุณมาก\""
80000063-28 = "คะ...?"
80000063-29 = "คะ...?"
80000063-30 = "ชะ...ช็อกโกแลตของฉันเหรอคะ...? คุณครูน่ะเหรอ...?"
80000063-31 = "พะ...พูดจริงเหรอคะ!? ปะ...เปล่าค่ะ ฉันไม่ได้สงสัยในคำพูดของคุณครูเลยสักนิดค่ะ...!"
80000063-32 = "แค่มันเหลือเชื่อเกินไป...! ฉะ...ฉันแค่คิดไม่ถึงว่าคุณครูจะอยากได้ช็อกโกแลตจากฉันด้วยก็เท่านั้น...!"
80000063-33 = "ถะ...ถ้างั้นตอนนี้ฉันควรทำยังไงดีคะ...? ฉันได้รับความกรุณาครั้งใหญ่จากคุณครูแล้ว... ตอนนี้ฉัน...!!"
80000063-34 = "คะ...? แค่รอยยิ้มก็พอแล้วเหรอคะ...? คะ...แค่นั้น...!? แค่นั้นเหรอคะ!?"
80000063-38 = "ฮึ... ฮึฮึ... ฮิฮิฮิ... แบบนี้เหรอ...คะ? ฮิฮิฮิ..."
80000063-39 = "[s5] \"อื้อ แค่นั้นก็พอแล้วล่ะ ขอบใจนะ\"\n[s6] \"อื้อ ว่าแล้วฮารุกะน่ารักจริงๆ ด้วย!\""
80000063-40 = "...! คะ... คุณครู..."
80000063-41 = "...! คะ... คุณครู..."
80000063-42 = "ฮี่..."
80000063-47 = "แหะๆๆ... ขอบคุณนะคะ คุณครู"
80000063-49 = "(หลังจากนั้น คุณครูก็พาฮารุกะไปส่ง และแกะช็อกโกแลต 99% มานั่งกินคนเดียว)"

80000063-3 = "#na;(공원 벤치에서 기다리고 있으니, 잠시 후 약속대로 하루카가 허둥지둥 달려왔다.)"
80000063-4 = "3;하루카;04;느, 늦어서 죄송합니다. 선생님!! 부르셔서 바로 달려왔습니다!!\n#3;em;[!]\n#3;hophop\n#3;ar"
80000063-5 = "3;하루카;07;서, 설마 계속 기다리고 계셨던 건가요!? 그, 그럴 수가! 저 같은 게 감히 선생님의 귀하신 시간을……!!\n#3;em;[?!]\n#3;stiff"
80000063-6 = "3;하루카;13;이, 이걸 뭘로 사죄드려야 할지……. 배, 배라도 갈라야 할까요!? 죽음으로 사죄를!!\n#3;em;[!]\n#3;hophop"
80000063-7 = "3;하루카;06;……네? 괘, 괜찮으시다고요? 아……. 네, 네…….\n#3;stiff"
80000063-8 = "3;하루카;02;그, 그런데 어떤 이유로……. 아, 아니. 절대 따지거나 하는 그런 건방진 의도는 아니고요……."
80000063-9 = "3;하루카;01;네……? 발렌타인 데이……요……? 그, 그야……. 저도 알고는 있지만…….\n#3;em;[반응]"
80000063-10 = "3;하루카;06;주, 준비하고 있던 거 아니었냐고요……!? 마, 맞습니다! 맞아요! 역시 선생님……!\n#3;em;[?!]\n#3;jump"
80000063-11 = "3;하루카;08;……어……?"
80000063-12 = "3;하루카;10;그, 그런데 어떻게 선생님께서 그걸……!? 그리고 어째서 선생님께서 먼저 절 불러 주시는…….\n#3;em;[...]"

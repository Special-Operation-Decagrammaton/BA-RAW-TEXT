80000063-23 = "3;하루카;01;시, 실은 제가 평소에 초콜릿을 잘 먹을 일이 없어서……. 그래서 뭘 드려야 할지 몰라서…….\n#3;stiff"
80000063-24 = "3;하루카;05;이, 일단 가지고 있는 돈에서 제일 비싼 걸로……! 제일 값나가 보이는 걸로 샀습니다!\n#3;greeting"
80000063-25 = "3;하루카;06;무, 물론 그래 봐야 저따위가 산 게, 선생님께 무슨 의미가 있겠냐만…….\n#3;m3"
80000063-26 = "3;하루카;07;아니 어쩌면 제 손에 닿은 시점에서 쓰레기가 된 걸 수도 있지만……. 그 전에 받아 주신다는 걸 전제로 말씀드렸다니 큰 실례를…….\n#3;em;[속상함]\n#3;stiff"

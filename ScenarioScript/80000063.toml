[translation]
80000063-1 = "在那之前，在那之後"
80000063-3 = "（在公園長椅上等待時，看見遙香跑了過來）"
80000063-4 = "非，非常抱歉……！#n雖然收到連絡後立刻跑了過來卻還是這樣，我該怎麼賠罪才好……！"
80000063-5 = "難，難道老師一直在這裡等嗎……！？#n怎麼辦，因為我這種人浪費了老師寶貴的時間……！！"
80000063-6 = "我該怎麼補償才好……用內臟之類的來道歉……！？"
80000063-7 = "……咦，沒，沒關係嗎？啊……是，是……"
80000063-8 = "話，話說今天有什麼事……不，不，我不是在質問老師，絕對沒有僭越的意思……"
80000063-9 = "咦，情人節，嗎？是，是的，確實是呢……！？"
80000063-10 = "準備……？啊，呃，其實那個，確實是有準備……！#n不不，我沒有想炫耀這種不要臉的意思……"
80000063-11 = "為，為什麼……？"
80000063-12 = "老師為什麼會知道的這麼清楚呢……？會預知未來……！？"
80000063-13 = "[s1]（得在遙香想太多之前，好好回應他才行……）\n[s2]（不然要是他跑去安裝炸彈就糟了……）"
80000063-14 = "……？"
80000063-15 = "……？"
80000063-16 = "……呃，老師？"
80000063-17 = "啊，巧，巧克力是嗎？有的，跑來的路上我一直小心地帶著……！"
80000063-18 = "不，不介意的話請收下……！！"
80000063-23 = "其，其實那個，我平常不太吃巧克力……不知道該送什麼給老師比較好……"
80000063-24 = "所以就選了我能買得起的巧克力裡最貴、數字最厲害的！"
80000063-25 = "當，當然，我這種人買的東西，對老師來說不知道有沒有價值就是了……"
80000063-26 = "不，就算本來有價值，在被我的手碰到的瞬間可能也會變成垃圾吧……#n況且還做出認為老師會收下這種失禮的事……"
80000063-27 = "[s3]「不會哦，我很高興。就是因為想盡快收到才聯絡你的。」\n[s4]「很高興能收到遙香的巧克力唷，謝謝你。」"
80000063-28 = "咦……？"
80000063-29 = "咦……？"
80000063-30 = "我，我的巧克力，是嗎……？老師你……？"
80000063-31 = "真，真的嗎！？啊，不是！我絕對沒有懷疑老師的意思……！"
80000063-32 = "只是我無法相信……我，我這種人送的巧克力居然能讓老師開心……！？"
80000063-33 = "我，我該怎麼辦才好……這種我配不上的光榮，該怎麼……？"
80000063-34 = "希，希望我能率直的接受……？咦，可，可以的話要笑著……！？"
80000063-38 = "那個……像，像這樣嗎……耶嘿嘿……"
80000063-39 = "[s5]「嗯，這樣我也會越來越開心。」\n[s6]「嗯，遙香真可愛！」"
80000063-40 = "……！？"
80000063-41 = "……！？"
80000063-42 = "嘿……"
80000063-47 = "耶嘿嘿嘿……那個，我才應該謝謝你，老師……！"
80000063-49 = "（之後在目送遙香離開後，細細品嘗了99%巧克力中的甜味）"

[translation]
90001020-1 = "ตอนที่ 2;สืบค้น"
90001020-2 = "เอมิ โทคิ ปลอดภัยดีมั้ยคะ? ช่วยรายงานด้วยค่ะ!"
90001020-7 = "เอมิรายงาน ทางนี้ไม่มีปัญหา หัวหน้า"
90001020-8 = "ฉันก็ด้วยค่ะ สำหรับเรื่องสถานการณ์และความปลอดภัยของพวกเราแล้ว ฉันไม่มีอะไรจะรายงานเพิ่ม#nเป็นพิเศษค่ะ"
90001020-9 = "แต่ฉันคิดว่าควรต้องรายงานเกี่ยวกับ 2 เรื่องที่เพิ่งค้นพบใหม่ค่ะ"
90001020-10 = "แต่มีทั้งเรื่องที่แค่รายงานด้วยคำพูดก็ได้กับบางอย่างที่ต้องมาเห็นกับตาตัวเองน่ะ อยากรู้เรื่องไหนก่อนล่ะ?"
90001020-12 = "ขอฟังเรื่องง่ายๆ ก่อนแล้วกันค่ะ "
90001020-13 = "ถ้าอย่างนั้นก็ต้องเป็นเรื่องนี้ ดูเหมือนว่ากองกำลังที่เหลือของเดคาแกรมมาทอนจะปรับเปลี่ยนการ#nเคลื่อนไหวนิดหน่อยน่ะ"
90001020-14 = "ขอรายละเอียดได้มั้ยคะ?"
90001020-15 = "ค่ะ เดิมทีพวกนั้นเคลื่อนไหวอย่างล่องลอยเหมือนสูญเสียการสั่งการ แต่ตอนนี้ดูจะเริ่มมีทิศทาง และมีการตอบสนองแล้วค่ะ"
90001020-16 = "พวกนั้นทั้งซุ่มโจมตี จู่โจม และปิดล้อมได้อย่างสมบูรณ์แบบเลยค่ะ แต่แน่นอนว่าสำหรับพวกฉันแล้ว ไม่เป็นปัญหาอะไรเลยค่ะ พีซ พีซ"
90001020-17 = "ทำอะไรหน่อยสิ คุณครู แค่กับหัวหน้าฉันก็เหนื่อยพอแล้ว นี่โทคิยังเป็นแบบนี้ไปอีก"
90001020-18 = "[s] \"แต่อย่างน้อย... โทคิก็ไม่มีเจตนาร้ายนะ...\""
90001020-19 = "ก็นั่นละที่เป็นปัญหาน่ะ"
90001020-20 = "[s] \"แปลกจัง... เหมือนเพิ่งพูดอะไรทำนองนี้ไปแล้วเลย...\""
90001020-26 = "ทำให้เอมิทำหน้าลำบากใจได้ด้วย น่าทึ่งจังเลยนะคะ โทคิ"
90001020-27 = "ขอบคุณค่ะ หัวหน้าฮิมาริ"
90001020-28 = "ว่าแต่... อะไรเหรอคะที่บอกว่าต้องเห็นด้วยตาตัวเองน่ะ?"
90001020-29 = "อืม... ฉันจะส่งข้อมูลไปให้ก่อนแล้วกัน คุณครูก็ช่วยวิเคราะห์ดูด้วยนะ"
90001020-34 = "[ns] \"นี่มัน...?!\""
90001020-37 = "ดูเหมือนจะเป็นร่องรอยการเคลื่อนที่ของอะไรบางอย่างที่มีขนาดใหญ่ที่เจาะธารน้ำแข็งลงไปเลยนะคะ การวิเคราะห์ภาคสนามเป็นยังไงบ้างคะ เอมิ?"
90001020-40 = "ฉันก็คิดเหมือนกัน หัวหน้า ถ้าให้เจาะจงมากขึ้น มันดูเหมือนจะเป็นเรือที่แล่นฝ่าน้ำแข็งออกไปน่ะ"
90001020-41 = "ฉันก็คิดเหมือนกันค่ะ และในฐานะของคณะสืบค้น ฉันขอเสนอว่าเราจำเป็นต้องติดตามร่องรอยนี้ค่ะ"
90001020-42 = "บางทีนี่อาจเป็นร่องรอยของเกวูราห์ที่เราพลาดไปก็ได้นะคะ"
90001020-43 = "..."
90001020-44 = "ไม่ค่ะ ฉันว่ามันค่อนข้างยากที่จะเป็นร่องรอยของเกวูราห์ค่ะ"
90001020-45 = "ยังจำสถานการณ์ตอนที่เกวูราห์ปรากฏตัวต่อหน้าพวกเราครั้งแรกได้มั้ยคะ?"
90001020-46 = "ตอนนั้นเกวูราห์ปรากฏตัวอย่างกะทันหันใต้น้ำแข็งในธารน้ำแข็ง"
90001020-47 = "อ่า... นั่นสินะ หัวหน้าอยากชี้ให้เห็นส่วนนั้นสินะ"
90001020-48 = "ใช่ค่ะ รูปแบบการเคลื่อนไหวและการปรากฏตัวของเกวูราห์มีพื้นฐานมาจากการเคลื่อนที่อย่างลับๆ ใต้ธารน้ำแข็ง..."
90001020-49 = "แต่ร่องรอยนี้ดูเหมือนจะห่างไกลจากการเคลื่อนที่อย่างลับๆ แบบนั้นค่ะ"
90001020-50 = "แต่หากพิจารณารูปแบบพฤติกรรมของเกวูราห์ที่เราเห็นมาจนถึงตอนนี้ ฉันว่าไม่น่าจะเป็นไปได้ที่#nเกวูราห์จะจงใจทิ้งร่องรอยแบบนั้นไว้ให้ใครเห็นค่ะ"
90001020-51 = "ร่องรอยที่เปิดเผยอย่างนี้... อาจจะมาจากบางอย่างที่ใหญ่กว่าเกวูราห์มาก..."
90001020-53 = "ผู้เลื่อมใสตนใหม่... อย่างนั้นเหรอคะ?"
90001020-55 = "เรายังฟันธงไม่ได้ค่ะ ตอนนี้เราคลาดกับเกวูราห์ เราก็เลยไม่มีเบาะแสมากนักค่ะ"
90001020-56 = "แต่ถึงยังไง... ฉันว่าตอนนี้ถึงเวลาที่เราจะต้องหาข้อสรุปบางอย่างแล้วค่ะ"
90001020-57 = "[s] \"เรามาติดตามร่องรอยนี้กันเถอะ\""
90001020-58 = "หมายถึงร่องรอยใหม่ที่เจอ แทนที่จะเป็นร่องรอยของเกวูราห์ที่หายไปเหรอคะ?"
90001020-59 = "นั่นสินะคะ หากนี่คือร่องรอยของผู้เลื่อมใสตนอื่นอย่างที่ฉันและโทคิคาดเดา มันก็ต้องเชื่อมโยงกับ#nเกวูราห์ด้วย..."
90001020-60 = "[s] \"แล้วครูก็ยังติดใจเรื่องเด็กพวกนั้นอยู่ด้วย\""
90001020-61 = "คะ? เด็กพวกนั้นเหรอคะ...?"
90001020-62 = "หมายถึงวิศวกร 3 คนที่ชื่อไอน์ ซอฟ และออร์สินะคะ"
90001020-64 = "ก็นะ เด็กพวกนั้นเป็นพวกแรกที่ลองทำอะไรบางอย่าง อย่างเช่น 'สื่อสาร' กับพวกเรานี่นา"
90001020-65 = "การที่เด็กพวกนั้นมาปรากฏตัวที่นี่ไม่ใช่เรื่องบังเอิญค่ะ..."
90001020-67 = "เข้าใจแล้วค่ะ คุณครู ฉันก็เห็นด้วยกับความคิดเห็นของคุณครูค่ะ"
90001020-68 = "ถ้าอย่างนั้นจากนี้เอมิและโทคิจะติดตามร่องรอยนั้น..."
90001020-70 = "พูดอะไรน่ะหัวหน้า หัวหน้าก็ต้องมาด้วยสิ"
90001020-71 = "ใช่ค่ะ ไหนๆ จะมาแล้ว คุณครูก็มาด้วยนะคะ"
90001020-72 = "[s] \"หืม ครูด้วยเหรอ...?\""
90001020-74 = "ให้ฉันไปด้วยเหรอคะ?!"
90001020-76 = "ก็ใช่น่ะสิ ก็เราไม่รู้นี่นาว่าร่องรอยพวกนี้มันไปต่ออีกไกลแค่ไหน"
90001020-77 = "ฉันว่าการติดตามจากบนเฮลิคอปเตอร์น่าจะมีประสิทธิภาพมากกว่าเดินเท้าตามไปทีละนิดๆ นะคะ"
90001020-78 = "อืม ประสิทธิภาพเป็นเรื่องสำคัญนะ ขอย้ำอีกครั้ง ประสิทธิภาพเป็นเรื่องสำคัญ จริงๆ นะ"
90001020-80 = "รู้ใช่มั้ยคะว่านั่นหมายถึงการสั่งให้คนที่เอวบางร่างน้อย ไม่แข็งแรง สวยสดใส แต่อ่อนแออย่างฉันไป#nโบยบินอยู่ในสภาพแวดล้อมที่โหดร้ายของธารน้ำแข็งน่ะ?"
90001020-82 = "ไม่เป็นไรหรอกหัวหน้า หัวหน้าน่ะแข็งแกร่งกว่าที่ตัวเองคิดนะ ฉันรับรองให้เลย"
90001020-83 = "ใช่ค่ะ หัวหน้าฮิมาริ ถ้าจะพูดให้เห็นภาพ ก็ต้องบอกว่าแข็งแกร่งพอๆ กับแพนด้าแดงที่ยืนยกแขนขวาง#nทางเลยค่ะ"
90001020-85 = "เปรียบเทียบแบบนั้น ฉันไม่รู้เลยค่ะว่าสุดท้ายแล้วจะบอกว่าฉันเข้มแข็งหรืออ่อนแอกันแน่?!"
90001020-86 = "[s1] \"จากนี้รัศมีการค้นหาน่าจะกว้างขึ้น เราไปด้วยกันเถอะ\"\n[s2] \"ครูว่าเราไปสมทบกันแล้วเคลื่อนไหวด้วยกันดีกว่านะ\""
90001020-89 = "ฮืม... ความเห็นของครูก็ถูกต้องอยู่นะคะ เข้าใจแล้วค่ะ "
90001020-90 = "ถ้าอย่างนั้นให้เอมิกับโทคิกลับมาก่อนค่ะ จากนี้ไปพวกเราจะ..."
90001020-91 = "[s] \"ไปติดตามร่องรอยที่ยิ่งใหญ่นั่นด้วยกัน!\""
90001020-92 = "ดูตื่นเต้นแปลกๆ นะคะคุณครู..."
90001020-98 = "เชื่อมต่อส่วนนี้กับส่วนนี้แบบนี้... แล้วให้กระบอกสูบที่อยู่ตรงโน้นตัดกันอีกครั้ง..."
90001020-99 = "แหะๆ ถ้าการคาดการณ์ของฉันถูกต้องละก็... "
90001020-100 = "ไอน์? ไปยุ่งกับเครื่องจักรอีกแล้วเหรอ? ก็ว่าอยู่ว่าหายไปไหน"
90001020-102 = "อ๊ายยยยยยยย?!?!"
90001020-103 = "หวา ตกใจหมดเลย! จู่ๆ ก็เป็นอะไรไปน่ะ?"
90001020-104 = "ซะ... ซะ... ซอฟเหรอคะ...? ฉันตกใจน่ะค่ะ... ขอโทษที่จู่ๆ ก็ตะโกนออกมานะคะ..."
90001020-105 = "ตกใจอะไรขนาดนั้น? ที่นี่มีแค่พวกเราไม่ใช่เหรอ? ทำเหมือนมีคนอื่นไปได้"
90001020-106 = "ฮะ... ฮือ... ตะ... แต่ถ้ามาพูดตอนที่ฉันกำลังตั้งสมาธิอยู่ ฉันก็ต้องตกใจเป็นธรรมดาสิคะ..."
90001020-107 = "รู้แล้วน่าๆ ขอโทษที่รบกวนแล้วกัน"
90001020-112 = "จะว่าไป นี่มันเครื่องจักรขนาดใหญ่อีกแล้วแฮะ อันนี้ใช้ทำอะไรเหรอ?"
90001020-113 = "เครื่องจักรอันนี้ใช่มั้ยคะ?! อันนี้น่ะ... แบบว่า... เอ่อ..."
90001020-114 = "ไม่ต้องอธิบายหลักการทั้งหมดหรอก บอกการใช้งานมาคร่าวๆ ก็พอ"
90001020-115 = "ค่ะ ค่ะ! ถ้าเราเชื่อมต่อเพลาขับกับฟันเฟืองในจำนวนมากที่สุดเท่าที่จะเป็นไปได้... และเชื่อมต่อหน่วย#nพลังงานกับกระบอกสูบ..."
90001020-116 = "เอาเถอะค่ะ สรุปว่าถ้าเราต่อและประสานให้ได้มากที่สุด... ก็จะได้เป็น!"
90001020-118 = "<เครื่องคิดเลขจักรกล> ที่ขนาดใหญ่กว่าที่เคยสร้างเมื่อคราวก่อนอีกค่ะ!!!"
90001020-119 = "อีกแล้วเหรอ..."
90001020-121 = "ตะ... แต่ว่ามันยิ่งใหญ่กว่าของเดิมเยอะเลยนะคะ มันจำตัวเลข 50 หลักได้มากถึง 100,000 ตัว เลยค่ะ...!"
90001020-122 = "แต่เราก็คำนวณเลขแบบนั้นในเครื่องคิดเลขอิเล็กทรอนิกส์ที่ขนาดเท่าฝ่ามือได้ไม่ใช่เหรอ? ไม่เห็นต้องสร้างเครื่องคิดเลขที่ใช้โลหะมากมายจนสร้างโรงงานทั้งหลังได้เลยนี่..."
90001020-126 = "เอ่อ... ฉันไม่ได้จะก้าวก่ายงานอดิเรกของคนอื่นหรอกนะ"
90001020-127 = "งะ... แง..."
90001020-128 = "ตะ... แต่พอดูอีกทีก็... น่าทึ่งดีนะ... อื้อ! "
90001020-129 = "สร้างเครื่องจักรขนาดใหญ่ที่ควบคุมได้โดยคันโยกอันเดียวแบบนี้... ถือเป็นการออกแบบที่มี#nประสิทธิภาพมากเลยละ"
90001020-130 = "แหะ แหะๆๆ... ใช่มั้ยล่ะคะ? ฉันชอบอะไรแบบนี้ละค่ะ"
90001020-131 = "เครื่องจักรขนาดใหญ่ยักษ์ที่ทำงานได้อย่างราบรื่นตามกฎน่ะเหรอ?"
90001020-132 = "ค่ะ! กฎเกณฑ์เป็นสิ่งที่ดีนี่คะ! แถมเอาต์พุตก็ชัดเจนกว่าอินพุตด้วยค่ะ!"
90001020-133 = "แล้วก็ แล้วก็... นั่นสินะคะ และยิ่งถ้าเป็นอุปกรณ์ที่ใหญ่ๆ แข็งๆ... ทนๆ ก็จะยิ่งดีเลยค่ะ!"
90001020-134 = "และถ้ามันเคลื่อนไหวอย่างถาวรได้โดยไม่ต้องพึ่งพาความช่วยเหลือจากภายนอก ก็คงจะยอดเยี่ยมไป#nเลยค่ะ!"
90001020-135 = "เดี๋ยวก่อน เป็นไปไม่ได้หรอกนะที่จะออกแบบให้เครื่องเคลื่อนไหวอย่างถาวรได้โดยไม่มีสิ่งเร้าจาก#nภายนอกน่ะ"
90001020-136 = "อีกอย่าง ฉันว่าหลีกเลี่ยงการใช้คำว่าใหญ่ๆ แข็งๆ หรืออะไรทำนองนั้นต่อหน้าคนอื่นก็ดีนะ"
90001020-137 = "ยะ.... อย่างนั้นเหรอคะ...? ว่าแต่ทำไมล่ะคะ ซอฟ...?"
90001020-138 = "กะ... ก็แบบว่ามัน..."
90001020-140 = "ค่า ค่า~ เพราะว่ามันเป็นคำที่มักจะใช้ในความหมายสองแง่สองง่ามในหมู่ <มนุษย์> ใช่มั้ยล่ะคะ ซอฟ?"
90001020-142 = "อะ... ออร์?!"
90001020-147 = "ฉันลองค้นหาคำนั้นในโปรโตคอลแบบเปิดของคิโวทอส และพบว่าคำเหล่านั้นทำให้เกิดความสับสน#nอลหม่านในมวลหมู่มนุษย์บางส่วนค่ะ ถึงจะไม่รู้เหตุผลก็เถอะ"
90001020-148 = "แต่บางครั้งฉันก็อดสงสัยไม่ได้นะคะว่าทำไมซอฟถึงใช้ภาษาของมนุษย์ได้เชี่ยวชาญขนาดนี้"
90001020-149 = "นะ... นั่นสินะคะ...?"
90001020-150 = "ดูสิคะ ไอน์ก็สงสัยเหมือนกันค่ะ รีบสารภาพมาตามตรงเถอะค่ะ"
90001020-151 = "ออร์ ให้มันน้อยๆ หน่อยเถอะ..."
90001020-153 = "วาระของวันนี้! ซอฟเรียนรู้คำศัพท์ของมนุษย์มาได้อย่างไร!"
90001020-154 = "หรือว่าซอฟจะเป็นสตอล์กเกอร์ที่ติดตามพวกมนุษย์ที่เป็นสิ่งมีชีวิตระดับต่ำและชอบขัดแย้งในตัวเอง และบางครั้งก็สับสนระหว่างวิธีการและวัตถุประสงค์ด้วย!"
90001020-155 = "ถึงนี่จะเป็นประเด็นที่อยู่ห่างไกลกับความหมายที่แท้จริงที่เราต้องรู้และต้องสืบสวนในขณะนี้กันให้#nมากๆ ก็ตาม!"
90001020-156 = "แต่ในเมื่อตอนนี้วงจรตรรกะของซอฟทำงานหนักเกินไป เราจึงต้องตรวจสอบด้วยไฟฟ้าค่ะ!"
90001020-157 = "เราจะได้เห็นใบหน้าที่เขินอายของซอฟกันไงคะ!!"
90001020-159 = "ก็บอกว่าให้มันน้อยๆ หน่อยไงเล่า!"
90001020-165 = "เจ็บนะคะ..."
90001020-166 = "ปะ... ปะปะปะปะ... เป็นอะไรหรือเปล่าคะ? ออร์?!?!"
90001020-167 = "กรรมตามสนองไงล่ะ"
90001020-168 = "ถ้ามีเวลาพอที่จะยกประเด็นไร้สาระแบบนี้มาพูด ฉันว่าเอาเวลานั้นไปโฟกัสกับการตีความ <บัญญัติ> เถอะ"
90001020-169 = "เพราะถ้าเราจะพิสูจน์การมีอยู่ของท่านผู้นั้นก่อนที่แท่นบูชาจะสร้างเสร็จ เราก็ต้องเร่งมือแล้ว"
90001020-171 = "เรื่องการตีความ <บัญญัติ> ฉันทำเสร็จไปแล้วนะคะ?"
90001020-173 = "เสร็จแล้วเหรอ?"
90001020-180 = "ใช่ค่ะ ฉันได้ข้อมูลจำนวนมากมาจากการต่อสู้กับอาบี เอชูห์มาน่ะค่ะ"
90001020-181 = "เรื่องนี้ไม่เกี่ยวกับบัญญัติตั้งแต่แรก แล้วทำไมฉันจะต้องไปบอกซอฟล่ะคะ? นี่เป็นเพราะ เพราะ... เพราะซอฟเหงามากเกินไปหรือเปล่าคะ~?"
90001020-183 = "ถ้าได้ข้อมูลอะไรมา ก็บอกกันตั้งแต่แรกสิ!"
90001020-184 = "อึก ไม่ใช้ความรุนแรงสิคะ!"
90001020-195 = "นี่คือ... บัญญัติเพื่อ <ทวยเทพไร้นาม>"
90001020-196 = "นี่คือ... สิ่งที่สร้างความสูงส่งก่อนการรู้แจ้งสินะคะ ที่จริงตอนฉันได้ยินครั้งแรก ฉันคิดว่าเป็นแค่นิทาน#nพื้นบ้านที่หายไปในสมัยก่อนเสียอีกค่ะ..."
90001020-201 = "มันก็ไม่ได้สมัยก่อนขนาดนั้นหรอก มันมีการบันทึกคำพูดของท่านผู้นั้นไว้อย่างชัดเจนนี่นะ"
90001020-202 = "ค่ะ ท่านเองก็สั่งไว้ด้วยว่า 'จงพิสูจน์ตัวเองจนสุดขอบฟ้า' ค่ะ"
90001020-203 = "แต่ว่า... ตัวแปรที่ควบคุมไม่ได้ก็ทำให้เกิดโศกนาฏกรรมนั้น..."
90001020-211 = "<โลกนี้เต็มไปด้วยความชั่วช้า และแผนการทุกอย่างล้วนชั่วร้าย>"
90001020-212 = "<ต้องใช้น้ำชำระล้างทุกอย่างให้หมดจด>"
90001020-213 = "อืม... แต่นั่นก็เป็นผลลัพธ์ที่ค่อนข้างน่าเสียดายเลยนะคะ"
90001020-214 = "แต่ตอนนั้นพวกเราก็ต้องค้นหาร่องรอยต่อไป ก็พวกเราต้องการเบาะแสนี่นา"
90001020-219 = "ค่ะ... และนั่นทำให้เราได้ผลลัพธ์นี้มา แต่ว่า..."
90001020-223 = "เป็นอะไรไปคะ ไอน์? กังวลเรื่องอะไรหรือเปล่าคะ?"
90001020-224 = "ต่อให้จะเป็นการทำเพื่อพิสูจน์ตัวตนและความจริงแค่ไหน... แต่เราถึงกับจำเป็นต้องพึ่งแนวคิด และพลังที่สูญหายไปเลยเหรอคะ...? เราต้องพึ่งพลังของทวยเทพไร้นามเลยเหรอ...?"
90001020-225 = "นะ... แน่นอนว่าฉันไม่ได้คัดค้านคำพูดของท่านผู้นั้นหรอกนะคะ...!"
90001020-227 = "ทำไมถึงสงสัยในเรื่องนั้นล่ะ? การกระทำของพวกเราเสร็จสิ้นอย่างสมบูรณ์ไปแล้วไม่ใช่เหรอ? แล้วมันก็ควรจะเป็นอย่างนั้นอยู่แล้วด้วย"
90001020-229 = "อืม ฉันพอจะเข้าใจว่าทำไมไอน์ถึงพูดอย่างนั้นค่ะ"
90001020-230 = "เราถูกสร้างมาให้สมบูรณ์แบบอยู่แล้ว ก็เลยไม่จำเป็นต้องปรับปรุงหรือเปลี่ยนแปลงค่ะ"
90001020-231 = "นะ... นั่นละค่ะ...! เพราะเป็นอย่างนั้นนั่นละ พวกเราถึง..."
90001020-232 = "ตายจริง ตายจริง ไม่หรอกค่ะ ไอน์ ลองคิดแบบนี้นะคะ"
90001020-236 = "การใช้พลังของทวยเทพไร้นามอาจจะเป็นหนึ่งความท้าทายเกี่ยวกับความสมบูรณ์แบบของพวกเรา#nก็ได้... แบบนั้นน่ะค่ะ"
90001020-237 = "ยะ... อย่างนั้นเหรอคะ...?"
90001020-239 = "ใช่ การที่เราสามารถใช้พลังของทวยเทพที่ถูกลืมได้อย่างอิสระ ถือเป็นการพิสูจน์ความสมบูรณ์แบบ#nของเรานะ"
90001020-240 = "ถ้าแผนการของเราดำเนินไปได้ด้วยดี เราก็สามารถเปลี่ยนเศษชิ้นส่วนของแผ่นดินนี้ให้เป็นบ่อเกิดของ#nเราได้"
90001020-241 = "พูดตามตรง ต่อให้จะเป็น <เทพไร้นาม> หรืออะไรก็ตาม แต่ตอนนี้ก็เหมือนกับซากดึกดำบรรพ์ที่เหลือ#nแต่ร่องรอยไม่ใช่เหรอ? ไม่ต่างกับเชื้อเพลิงจากฟอสซิลที่พวกมนุษย์ใช้กันหรอก"
90001020-242 = "จะบอกว่าได้พลังงานมาจากสิ่งที่เปลี่ยนแปลงมาจากมรดกของอดีตก็ไม่ผิดหรอก..."
90001020-250 = "หืม? ทำไมจู่ๆ ถึงทำหน้าแบบนั้นกันล่ะ?"
90001020-252 = "ขะ... ขอโทษด้วยค่ะ... ฉันไม่ค่อยเข้าใจการเปรียบเทียบที่ว่าเท่าไร..."
90001020-253 = "ไม่ต้องใส่ใจหรอกค่ะ ไอน์ ซอฟน่ะชอบใช้คำเปรียบเทียบที่พวกมนุษย์ใช้กัน แล้วก็มีแต่ซอฟที่เข้าใจ#nด้วยค่ะ"
90001020-254 = "ฉันไม่เข้าใจจริงๆ ค่ะว่าทำไมซอฟถึงได้อยากรู้อยากเห็นเกี่ยวกับชีวิตที่น่าเบื่อหน่ายของพวกมนุษย์ที่#nต่ำต้อยพวกนั้น"
90001020-259 = "นะ... นั่นไม่ใช่ความอยากรู้อยากเห็นหรอกนะ ก็สักวันหนึ่งเราจะได้ครอบครองและควบคุมอาณาจักร#nทั้งหมดของมนุษย์นี่นา..."
90001020-260 = "ก็อย่างเช่น... ใช่! พวกสัตว์เลี้ยงไง มนุษย์มีความรู้เกี่ยวกับสัตว์เลี้ยงใช่ไหมล่ะ?"
90001020-261 = "สะ... สัตว์เลี้ยงคือ... อะไรเหรอคะ...?"
90001020-262 = "คงจะเป็นแนวคิดอะไรเพี้ยนๆ ที่ไม่จำเป็นต้องรู้ แต่ซอฟเขารู้อยู่คนเดียวน่ะค่ะ"
90001020-267 = "เอาละ มาตรงนี้เถอะค่ะ ไอน์ เราปล่อยซอฟที่มีรสนิยมแปลกๆ ไว้ตรงนี้ แล้วมาทดสอบอุปกรณ์สมอง#nส่วนหน้าที่พัฒนาขึ้นใหม่ด้วยกันดีกว่าค่ะ"
90001020-273 = "หยุดเลยนะ อย่าทำให้ไอน์เป็นเด็กไม่ดีสิ"
90001020-277 = "เธอต่างหากที่เป็นเด็กไม่ดีน่ะ"
90001020-278 = "ดะ... เดี๋ยวค่ะ ซอฟ ออร์...! อย่าทะเลาะกันสิคะ...!"
90001020-288 = "หืม? เกวูราห์ติดต่อมาเหรอ...?"
90001020-289 = "กะ... เกวูราห์จังเหรอคะ? ฉะ... ฉันจะตรวจสอบเดี๋ยวนี้เลยค่ะ"
90001020-290 = "ฮืม โอ้? นี่คือข้อเสนอเชิงกลยุทธ์อย่างหนึ่งสินะคะ ก่อนอื่นคือขอให้ยกเลิกขีดจำกัดของตัวเองอย่าง#nนั้นเหรอ?"
90001020-291 = "มะ... ไม่ได้นะคะ! แบบนั้นจะเป็นการทำให้เกวูราห์จังทำงานหนักเกินไปนะคะ!"
90001020-292 = "อืม... ลองฟังต่อก่อนดีกว่า"
90001020-294 = "อ้อ เดิมทีภารกิจของเกวูราห์คือการลาดตระเวนและกำจัดสิ่งกีดขวางในพื้นที่ธารน้ำแข็ง... "
90001020-295 = "ก็เลยขอให้ช่วย เพื่อให้จบภารกิจนี้ได้สินะ เข้าใจแล้ว"
90001020-296 = "เป็นอย่างนี้นี่เอง สรุปว่าเป็นเกมแก้แค้นสินะคะ"
90001020-297 = "กะ... ก็เกวูราห์จัง... อะ... อารมณ์ค่อนข้างหุนหันพลันแล่นนี่คะ แต่ก็..."
90001020-298 = "มีเรื่องอื่นด้วยแฮะ? ถึงจะไม่มีทางเป็นอย่างนั้น แต่ถ้าหากตนถูกโจมตีขึ้นมา ก็ขอให้หลอกล่อพวกศัตรู#nไปยัง... 'ที่แห่งนั้น'"
90001020-299 = "โฮ่ มีการเตรียมแผน B ไว้แล้วสินะคะ อืม..."
90001020-300 = "ก็น่าสนุกดีนะ ถ้าอย่างนั้นก็เอาตามนั้นเลยค่ะ"
90001020-301 = "คิดว่าจะทำแบบนั้นได้เหรอ เธอน่ะ... แต่ก็เอาเถอะ ยังไงฉันก็ไม่ได้ถึงกับไม่เห็นด้วยอยู่แล้ว"
90001020-302 = "ฉะ... ฉันฉันฉันฉัน ฉันไม่เห็นด้วยค่ะ! เพราะถ้าเป็นที่นั่น... ถ้าอย่างนั้นสิ่งที่เด็กคนนั้นทำอยู่ตอนนี้ก็..."
90001020-303 = "อืม ฉันรู้ว่าตอนนี้ไม่ได้อยู่ในสถานะที่ใช้พลังได้ 100% แต่ทิศทางของแผนการนี้ก็ดูไม่มีอะไรผิดนัก"
90001020-304 = "จริงแท้แน่นอนเลยค่ะ เด็กคนนั้นแข็งแกร่งพออยู่แล้วค่ะ ถ้าเราบังคับให้ศัตรูต่อสู้เรื่อยๆ ศัตรูก็ย่อมถึง#nขีดจำกัดของตัวเองค่ะ"
90001020-305 = "นอกจากนี้เรายังมีข้อได้เปรียบทางภูมิศาสตร์ด้วยนะคะ"
90001020-306 = "ตะ... แต่ว่า... จะไม่เป็นไรจริงๆ เหรอคะ? หากเกิดอะไรขึ้นกับเด็กคนนั้นละก็..."
90001020-307 = "พูดอะไรของเธอน่ะ ไอน์ ถ้าเป็นอย่างนั้น ตอนนั้นก็จะถึงตาของเธอไง"
90001020-308 = "นะ... นั่นสินะคะ...!? ฉันต้องตั้งสติให้มากกว่านี้อีกหน่อยสินะคะ... ฮืออ..."
90001020-309 = "ก็นะ ถ้าถึงเวลานั้นจริงๆ คนที่จะตื่นเต้นมากที่สุดในบรรดาพวกเราก็คงจะเป็นไอน์นั่นละค่ะ ฮุฮุฮุ"
90001020-310 = "ถ้าอย่างนั้นเราก็มาสรุปกันเลย เรื่องแผนการของเกวูราห์ ฉันไม่มีอะไรคัดค้าน ไอน์กับออร์ล่ะ?"
90001020-311 = "ค่ะ การเคารพในการบังคับใจตนเองเป็นเรื่องสำคัญค่ะ เพราะตอนนี้เหล่าผู้เลื่อมใสก็เริ่มตื่นขึ้นอย่าง#nแท้จริงแล้ว"
90001020-312 = "ค่ะ เข้าใจแล้วค่ะ ถ้าซอฟกับออร์ว่าอย่างนั้น และที่สำคัญเลยก็คือ ถ้าเกวูราห์จังอยากทำเช่นนั้น..."
90001020-313 = "ฉันก็จะพยายามให้เต็มที่ เพื่อพิสูจน์ให้เห็นว่าพลังของทวยเทพไร้นามนำไปใช้ในรูปแบบอื่นๆ ได้ยังไงบ้างค่ะ!"
90001020-318 = "ตอนต่อไป;ครั้งที่ 2"

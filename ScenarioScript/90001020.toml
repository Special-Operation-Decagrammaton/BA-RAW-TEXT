[translation]
90001020-1 = "Episode 2;Investigation"
90001020-2 = "Eimi, Toki, are you all okay? Report!"
90001020-7 = "I'm Eimi. Mission accomplished, President."
90001020-8 = "Likewise. No damage or injuries to report."
90001020-9 = "However, during the fight, we discovered two things."
90001020-10 = "One can be delivered by oral report, but the second will require a show and tell. Which should we do first?"
90001020-12 = "Let's start with the simple one. "
90001020-13 = "Talking is easier. The Decagrammaton forces' movements appear to be more organized."
90001020-14 = "How so?"
90001020-15 = "I will speak. Previously, they appeared to have no sense of direction or leadership. That is no longer the case."
90001020-16 = "They carried out concealment, ambush, and siege tactics perfectly. Of course, they caused no problem for me at all. Peace, peace."
90001020-17 = "Do something, Sensei. The president was already too much, but now Toki's joined her."
90001020-18 = "[s] \"Toki doesn't have any bad intentions...at least...\""
90001020-19 = "Don't you think that's the problem?"
90001020-20 = "[s] \"I'm having a strange feeling of deja vu...\""
90001020-26 = "That expression of distress on Eimi's face... Amazing, Toki. Incredible, even laudable, work. "
90001020-27 = "Thank you, President Himari."
90001020-28 = "What was the second item? The one I needed to see."
90001020-29 = "Hm... I'll send it to you now. Sensei, please look and tell us what you think as well."
90001020-34 = "[ns] \"What is this...?!\""
90001020-37 = "Something massive is plowing through the Glacial Sea. Having seen it in person, what's your opinion, Eimi?"
90001020-40 = "I agree with your assessment. I'd also add that the ice's breakage seems to have been caused by a ship of some kind."
90001020-41 = "As you see on the screen, I'd say that is true. As the recon master around here, I would assert that we must follow this trail."
90001020-42 = "Could this be the trace of Geburah we have been searching for?"
90001020-43 = "..."
90001020-44 = "No. I don't think so."
90001020-45 = "Do you remember when we first encountered Geburah?"
90001020-46 = "It came out of nowhere, bursting up from under the Glacial Sea's bed of ice."
90001020-47 = "Ah. I get what the president is trying to say."
90001020-48 = "Exactly. Geburah has always taken advantage of its ability to mobilize undetected beneath the Glacial Sea, from what we've seen of its movement."
90001020-49 = "This is a far cry from its usual patterns."
90001020-50 = "Whatever did this was showing off. It's not in line with Geburah's previous behavior."
90001020-51 = "Like it was putting its strength on display... It could be something even worse than Geburah."
90001020-53 = "...Another prophet?"
90001020-55 = "Nothing is confirmed yet. We've been floundering, without leads, ever since we lost track of Geburah."
90001020-56 = "But it appears it is time for us to take action."
90001020-57 = "[s] \"Then let's follow the trail!\""
90001020-58 = "And pause on our efforts to find Geburah?"
90001020-59 = "I see. If this is connected to another prophet, as Toki and I suspect, then Geburah is likely somewhere along this path as well."
90001020-60 = "[s] \"And those children have been weighing on my mind.\""
90001020-61 = "Do you mean...?"
90001020-62 = "The three engineers we encountered: Ein, Sof, and Ohr."
90001020-64 = "They were the first ones to actually attempt to communicate with us."
90001020-65 = "Their appearance here could hardly be a mere coincidence."
90001020-67 = "All right, Sensei. I agree."
90001020-68 = "Eimi and Toki will begin tracking down the—"
90001020-70 = "What are you talking about, President? You have to come, too."
90001020-71 = "Yes, and Sensei. Sensei should come."
90001020-72 = "[s] \"Huh? Me too...?\""
90001020-74 = "And me?!"
90001020-76 = "Of course. Who knows how far this trail will take us?"
90001020-77 = "Walking will be inefficient. We have a helicopter in the operation room. We should use that."
90001020-78 = "Yes. Efficiency is important. I'll say it again, since it's important. Efficiency really is important."
90001020-80 = "Do you realize you're asking me, a delicate, weak, frail, and fragile beauty, to fly through the harsh environment of the Glacial Sea?"
90001020-82 = "It's fine, President. You are much stronger than you think. I guarantee it."
90001020-83 = "That's right, President Himari. To be more precise, you are like a red panda, raising its little arms, trying to block a path."
90001020-85 = "Does that mean I'm strong or weak?!"
90001020-86 = "[s1] \"The scope of the search is going to expand significantly.\"\n[s2] \"It'll be best to move as a group from here on out.\""
90001020-89 = "Hmph. I can hardly argue with Sensei. Understood. "
90001020-90 = "Eimi, Toki, please return and we will commence..."
90001020-91 = "[s] \"...our investigation of the new clue!\""
90001020-92 = "You're strangely excited about this, Sensei."
90001020-98 = "Connect this part with this...and then have the cylinder over there cross again..."
90001020-99 = "Heh. If my calculations are correct— "
90001020-100 = "Ein? There you are! Are you messing with the machines again?"
90001020-102 = "Kyaaah?!"
90001020-103 = "Gyah! A shock! What'd I do?!"
90001020-104 = "S-S-Sof...? Y-You scared me... I'm sorry for screaming..."
90001020-105 = "Scared? What're you getting scared for? It's only you, me, and Ohr here. Ohr, me, and you! No outsiders allowed!"
90001020-106 = "Waaah! B-But I was really focused, and you spoke to me so suddenly... I couldn't help it!"
90001020-107 = "All right, all right. I'm sorry, okay?"
90001020-112 = "Anyway, what's this massive machine for?"
90001020-113 = "This child? Well...where do I start...uh..."
90001020-114 = "I don't need all the dirty details. Just give me the rundown."
90001020-115 = "Ah, yes! I've utilized the maximum number of cogs, connected to the proper axles...added more supporting cylinders...and hooked it all up to the power system...!"
90001020-116 = "You interweave and knit together the maximum number of parts...and have the most, biggest-ever..."
90001020-118 = "...machine calculator!!"
90001020-119 = "Another one?"
90001020-121 = "B-But the specs are astronomical, compared to previous editions! It can memorize ten thousand fifty-digit numbers...!"
90001020-122 = "Can't you do that with a basic old calculator? Those ones that can fit in your pocket? This is just a factory-sized version of that..."
90001020-126 = "Gah, everyone has their hobbies...! I didn't mean to..."
90001020-127 = "Waaah!"
90001020-128 = "Y-You know, now that I'm taking another look, it's super impressive! Yup! Yeah! "
90001020-129 = "The way you can control this gigantic thing with just one lever! How efficient!"
90001020-130 = "Heh. Heh, heh, heehee. Don't you think so? I really like stuff like this."
90001020-131 = "Stuff like what? Uniform massive devices, carrying out your rules impeccably?"
90001020-132 = "Yes! Rules are v-very good! And having a clear input and output!"
90001020-133 = "And...and...yes! It's even better if it's a big, hard device!"
90001020-134 = "And if it can move forever without outside help, there's nothing better in the whole world!"
90001020-135 = "Wait, perpetual motion machines are only hypothetical."
90001020-136 = "And, Ein. You can't call things \"big\" and \"hard.\""
90001020-137 = "Is that...so? Why is that, Sof?"
90001020-138 = "W-Well...that's..."
90001020-140 = "Yes, yes. That's because, among the humans, they're expressions of vulgarity. That's what you were saying, yes, Sof?"
90001020-142 = "O-Ohr?!"
90001020-147 = "While I could not ascertain the reason, I learned in my research of Kivotos' social protocol that this expression causes humans an \"embarrassment\" of some sort."
90001020-148 = "But this begs the question... Why is Sof so proficient in human idioms?"
90001020-149 = "N-Now that you mention it..."
90001020-150 = "See? Ein is curious too. Hurry. Confess."
90001020-151 = "Ohr, drop it! If you don't..."
90001020-153 = "Today's topic! How did Sof come to learn human expressions?"
90001020-154 = "My first theory! Sof is a stalker, who finds pleasure in observing inferior races, such as humans! She enjoys their contradictory manners, the way they often convolute their goals by unnecessarily fretting over morals and processes."
90001020-155 = "She does this, despite the fact that it is absolutely a divergence from the objective we SHOULD be investigating."
90001020-156 = "We will find out, here and now, while Sof's logic circuits are overloaded!"
90001020-157 = "The end goal is to observe Sof's expression of embarrassment!"
90001020-159 = "Enough!"
90001020-165 = "O-Ow..."
90001020-166 = "A-A-Are you all right, Ohr?!"
90001020-167 = "You reap what you sow."
90001020-168 = "Stop indulging yourself with useless yammering, and focus on deciphering the Commandment!"
90001020-169 = "We need to hasten and prove their existence, before the completion of the altar!"
90001020-171 = "The Commandment? But I finished it?"
90001020-173 = "Already?!"
90001020-180 = "Yes. The data we gathered during the battle with Abi-Eshuh was an immense boon."
90001020-181 = "What other reason would I have to interact with you, if not about the Commandment? My, my, my. Is this what they call an \"inflated ego,\" Sof?!"
90001020-183 = "You should have disclosed that information to begin with!"
90001020-184 = "Augh! No violence!"
90001020-195 = "This...is the Commandment of the Nameless Gods."
90001020-196 = "At last... With this in hand, we can finally reproduce the sublime, before the sublime. To be honest, I really thought this was nothing more than a long-lost myth."
90001020-201 = "Not so long, or lost. It's written in the master's records."
90001020-202 = "Yes! The master declared: \"Prove my being to the far reaches of the land.\""
90001020-203 = "But variables out of anyone's control...brought about the tragedy."
90001020-211 = "\"Sin will proliferate the land, and all plans born of that mind shall be wicked.\""
90001020-212 = "\"Water will purify all.\""
90001020-213 = "Well, it's what one would call \"an unfortunate result.\""
90001020-214 = "That's why we had to look for new leads. A different direction."
90001020-219 = "A-And...that's what led us here, but..."
90001020-223 = "What's wrong, Ein? What thought plagues you?"
90001020-224 = "Even if it was in pursuit of truth and proof of the master's existence...was it truly necessary to rely on an abandoned power?"
90001020-225 = "B-But I don't mean to rebel against the master's teachings!"
90001020-227 = "What brings about this curiosity? We are faultless, as we were created flawless. Therefore, anything we do is also without fault."
90001020-229 = "Well, well. The intent behind Ein's questions do not escape me entirely."
90001020-230 = "We are the embodiment of perfection. So why did we need to change? To find ways to improve our functions?"
90001020-231 = "Th-That's it...! That's why I think we—"
90001020-232 = "Now, now, now. That's where you're wrong, Ein. Rewire your logic circuits in this fashion."
90001020-236 = "We, as perfect beings, are merely utilizing the tool, the Nameless Gods' powers. It was, in fact, a verification of our perfection."
90001020-237 = "...I-Is that how it is...?"
90001020-239 = "That's right! Who else could wield such a power besides us, the perfect creations?"
90001020-240 = "And once we perfectly implement our plan, the fragments of this land will be converted into our source."
90001020-241 = "If you really think about it, they give themselves fancy names like \"Nameless Gods,\" but they're just old, ancient fossils at this point. They're nothing but fuel to us, like the fossil fuels the humans love so much."
90001020-242 = "There's not one, singular thing wrong about siphoning power from beings manifested from past legacies—"
90001020-250 = "Huh? What's with the strange looks?"
90001020-252 = "I-I'm sorry... I didn't quite understand that \"fossil fuel\" analogy!"
90001020-253 = "Worry not, Ein. Consider it a strange human quirk that only Sof can truly comprehend."
90001020-254 = "I, myself, cannot comprehend Sof's curious infatuation with such inferior beings."
90001020-259 = "Curiosity is too strong of a description! That's our territory, right? We're going to rule over them."
90001020-260 = "So, it's more like...livestock? Yes, exactly. Just as humans know the ins and outs of their own livestock..."
90001020-261 = "Wh-What is this...livestock...?"
90001020-262 = "Probably another strange and trivial concept that only Sof knows."
90001020-267 = "Get away from her, Ein. Leave Sof and her peculiarities here, and we shall test the new computer device you developed."
90001020-273 = "You get away! You're a bad influence on Ein."
90001020-277 = "False! You are the epitome of an influence that is negative!"
90001020-278 = "W-W-Wait. Sof, Ohr! Don't fight...!"
90001020-288 = "Huh? This is...a message from Geburah?"
90001020-289 = "F-From darling Geburah? I-I must check immediately."
90001020-290 = "Hm? Ah. It's suggesting an operation, all on its own? And to have its limits released?"
90001020-291 = "N-No! Our Geburah can't handle that much strain!"
90001020-292 = "Let's hear it out for now."
90001020-294 = "Aha. Geburah's original mission was to identify and eradicate any enemies within the Glacial Sea... "
90001020-295 = "It seeks to complete its directive. I can sympathize."
90001020-296 = "Wonderful, wonderful. A revenge match, of sorts."
90001020-297 = "Waaah. Darling Geburah is our little h-hothead. But still..."
90001020-298 = "There's more? Although unlikely, in the event that Geburah is defeated, it requests the enemies be lured to...that place."
90001020-299 = "A plan B, you say? Fascinating. My, my, my. An issue of differing import."
90001020-300 = "Well, it looks fun, so let us comply."
90001020-301 = "You're sure? Not that I have an opinion one way or another."
90001020-302 = "I-I-I object! If it's that place...and our darling Geburah's intention...!"
90001020-303 = "Yeah, yes. It isn't ready yet to function at 100% capacity. However, the plan itself, you can't help but approve of!"
90001020-304 = "As she says. Its strength is on par with the plan's demands. Force the enemy to fight, fight, fight, until they find themselves teetering at their limits."
90001020-305 = "Terrain advantage is on our side as well."
90001020-306 = "B-But...how do we know the plan will work? If something happens to our baby..."
90001020-307 = "What are these festering doubts, Ein? In that event, you'll simply need to step in."
90001020-308 = "Ah! Y-You're right! I-I really have to clear my head then... Waaah!"
90001020-309 = "If it happens, then Ein will rise to the occasion with excitement. Heehee."
90001020-310 = "Then we'll all agree now. Do we agree to Geburah's plan? I say yes!"
90001020-311 = "Yes. We must allow them all to grow, respect their autonomy. The prophets have only just opened their eyes, after all."
90001020-312 = "A-All right. If Sof and Ohr think so, and more importantly, if our darling Geburah wishes..."
90001020-313 = "I'll do my utmost to prove how we can employ the Nameless Gods' power, in ways before unimagined!"
90001020-318 = "Next Episode;Second"

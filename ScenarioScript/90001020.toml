[translation]
90001020-1 = "第2話;調查"
90001020-2 = "英美、季，你們沒事吧？請回報！"
90001020-7 = "這裡是英美。目前沒問題，部長。"
90001020-8 = "我也是。#n有關狀態與人身安全，並沒有特別需要報告的事項。"
90001020-9 = "但我們有兩項新發現。"
90001020-10 = "其中一項只需要口頭說明，另一項需要親自確認。#n部長想先聽哪一項呢？"
90001020-12 = "先從比較簡單的開始吧。"
90001020-13 = "那我就先從這點說起。#n十字神名殘存兵力的行為模式，似乎發生了一些變化。"
90001020-14 = "具體來說有哪些變化呢？"
90001020-15 = "原先有如一盤散沙，毫無組織與紀律可言的敵人，#n現在卻彷彿突然出現了明確的指揮系統。"
90001020-16 = "無論埋伏、突襲與包圍作戰都能執行得有條不紊。#n當然，這並無法對我構成任何威脅。PEACE，PEACE。"
90001020-17 = "你快想想辦法，老師。#n部長一個人也就算了，現在連季都這樣。"
90001020-18 = "[s]「至少季也沒有惡意嘛……」"
90001020-19 = "你不覺得這才是問題所在嗎？"
90001020-20 = "[s]「奇怪……總覺得好像在哪聽過類似的對話……」"
90001020-26 = "竟然能讓英美露出困惑的表情，你還真有一套呢，季。"
90001020-27 = "感謝您的稱讚，陽葵部長。"
90001020-28 = "……話說回來，另一項必須由我親自確認的發現是什麼呢？"
90001020-29 = "唔嗯……我先把這個傳過去吧。#n老師，麻煩你也一起確認。"
90001020-34 = "[ns]「這是……！？」"
90001020-37 = "看起來像是……某個巨大物體穿越冰海的痕跡呢。#n現場的分析結果如何，英美？"
90001020-40 = "就和你說的一樣，部長。#n如果要說得更具體一點，那應該是類似船隻的物體劃破冰面時留下的痕跡。"
90001020-41 = "雖然您已經看到畫面，不過我也同意英美的看法。#n身為偵察行動的負責人，我建議繼續展開追蹤。"
90001020-42 = "或許這是葛夫拉留下的痕跡，只是先前一直沒發現也說不定。"
90001020-43 = "……"
90001020-44 = "不，這看起來不太像葛夫拉會留下的痕跡。"
90001020-45 = "你們還記得葛夫拉初次現身時的情況嗎？"
90001020-46 = "是突然從冰海的冰面下冒出來的吧。"
90001020-47 = "啊，原來如此。#n我明白部長的意思了。"
90001020-48 = "沒錯。葛夫拉的移動與現身模式，都源自於能在冰海下潛行的機動性……"
90001020-49 = "然而這道痕跡卻與其大相逕庭。"
90001020-50 = "以葛夫拉目前為止的行為模式來看，很難想像它會刻意留下這樣的痕跡。"
90001020-51 = "這道顯眼又極具破壞力的痕跡……#n會不會是由某個比葛夫拉更加龐大的……"
90001020-53 = "其他預言者……留下的嗎？"
90001020-55 = "這點還無法確定。#n既然遲遲沒能捕捉到葛夫拉的痕跡，剩餘的線索實在相當有限。"
90001020-56 = "事已至此……我想是時候該下結論了。"
90001020-57 = "[s]「先對這道痕跡展開調查吧。」"
90001020-58 = "暫時不理會消失的葛夫拉，把調查重點轉往這道痕跡是嗎？"
90001020-59 = "原來如此。如果這道痕跡跟我和季的推測一樣，是由其他預言者所留下……#n那麼對方和葛夫拉之間，肯定也會存在某種關聯……"
90001020-60 = "[s]「而且我也有點在意那幾個孩子。」"
90001020-61 = "嗯？那幾個孩子……？"
90001020-62 = "您是指Ain、Soph和Aur那三個工程師嗎？"
90001020-64 = "也對，畢竟他們是第一個嘗試與我們「溝通」的敵人。"
90001020-65 = "他們之所以在這裡現身，很難想像只是單純的偶然……"
90001020-67 = "我明白了，老師。#n我也贊成您的提議。"
90001020-68 = "那麼英美跟季，你們接下來就對那道痕跡展開──"
90001020-70 = "你在說什麼啊，部長。#n你也得跟我們一起才行。"
90001020-71 = "說的沒錯。#n既然部長要來，就連老師也一起來吧。"
90001020-72 = "[s]「咦，我嗎……？」"
90001020-74 = "我也要去！？"
90001020-76 = "那還用說嗎？#n畢竟沒有人知道那道痕跡會一路延伸到哪裡去。"
90001020-77 = "與徒步追蹤相比，我認為利用作戰室的直升機移動會更有效率。"
90001020-78 = "嗯，效率是很重要的。#n因為重要所以再說一次──效率，真的，很重要。"
90001020-80 = "你們明白這麼說的意思……#n是要我這個柔弱多病的清楚系美少女，飛越這片殘酷的冰海極地嗎？"
90001020-82 = "沒問題的，部長。#n其實你比自己想像中還強壯哦。這點我可以保證。"
90001020-83 = "沒錯，陽葵部長。#n如果要打個比方的話，您就跟高舉雙手擋在路中央的小貓熊一樣強壯。"
90001020-85 = "那到底是在說我強壯還是虛弱啊！？"
90001020-86 = "[s1]「畢竟今後的搜索範圍會擴大不少。」\n[s2]「還是像他們說的一樣，盡快會合並集體行動比較好。」"
90001020-89 = "唔嗯……老師這麼說也確實有道理。我知道了。"
90001020-90 = "那麼英美和季就先回來一趟吧。#n接下來我們將要──"
90001020-91 = "[s]「追蹤那道巨大的痕跡！」"
90001020-92 = "……您為何看起來這麼興奮呢，老師？"
90001020-98 = "只要把這兩個地方像這樣連在一起……然後再把那邊的汽缸交叉……"
90001020-99 = "嘿嘿，如果我想得沒錯……"
90001020-100 = "Ain？你又在弄機械裝置了嗎？#n我還以為你跑去哪裡了呢。"
90001020-102 = "呀啊啊啊啊啊啊啊！？！？"
90001020-103 = "嚇，嚇我一跳！你幹嘛突然大叫啦？"
90001020-104 = "是，是，是Soph嗎……？#n我是因為嚇到了才會……抱歉，我不該突然大叫的……"
90001020-105 = "為什麼反應這麼大？這裡不就只有我們三個會來嗎？"
90001020-106 = "嗚嗚……可，可是專心的時候突然聽到別人的聲音，難免會被嚇到嘛……"
90001020-107 = "好啦好啦，抱歉打擾到你了。"
90001020-112 = "話說回來，你又在打造大型機械裝置了啊。#n這是要用來做什麼的？"
90001020-113 = "你是問我新打造出來的孩子嗎！？#n我……這個……就是……"
90001020-114 = "……你不需要從原理開始解釋，只要簡單說明一下就行了。"
90001020-115 = "沒，沒問題！簡單來說就是把很多的齒輪和傳動軸……#n連接上更多更多能輔助它們運行的汽缸和動力裝置……"
90001020-116 = "總之就是盡量把一大堆東西通通結合在一起……打造出比以往還要更大的──"
90001020-118 = "「機械式計算機」！！！"
90001020-119 = "怎麼又是這個……"
90001020-121 = "這，這次的規模比之前大很多哦？#n可以記住一萬個五十位數的數字……！"
90001020-122 = "這種程度的計算，不是只要手掌大小的電子計算機就能辦到了嗎？#n這些金屬都夠造出一座工廠了，有必要拿來打造計算機嗎……"
90001020-126 = "啊不過，其實我也沒有想指責你個人興趣的意思啦……"
90001020-127 = "嗚，嗚嗚……"
90001020-128 = "話，話說仔細一看，確實還挺壯觀的呢……嗯！"
90001020-129 = "像這種……巨大的裝置竟然只用一個拉桿就能操作，你的設計還挺有效率的嘛。"
90001020-130 = "耶，耶嘿嘿……對吧？我就喜歡這樣。"
90001020-131 = "你是指讓巨大的裝置依照規則運作嗎？"
90001020-132 = "沒錯！我很喜歡有，有規律的東西！#n還有能透過輸入的東西來推測結果也是！"
90001020-133 = "還有還有……對了！#n如果能打造出又大又硬……而且還很堅固的裝置就更好了！"
90001020-134 = "然後最好還能在不藉助外部動力的情況下永久運行！"
90001020-135 = "呃，要在不藉助外部動力的情況下永久運行是不可能的吧。"
90001020-136 = "還有剛才那什麼「又大又硬」之類的話，建議你最好別在其他人面前用比較好。"
90001020-137 = "是嗎……？#n為什麼呢，Soph……？"
90001020-138 = "那，那是因為……"
90001020-140 = "因為那些都是「人類」常用的低俗形容。#n──對吧，Soph？"
90001020-142 = "A，Aur！？"
90001020-147 = "我之前在奇普托斯的公開協定中搜尋過這類的形容詞，#n結果發現這些詞可能會讓部分的人類感到困惑。不過原因是什麼就不知道了。"
90001020-148 = "這麼說來，為什麼Soph這麼了解人類的用語呢？"
90001020-149 = "對，對耶……？"
90001020-150 = "你看，連Ain也覺得很神奇。#n你就快點從實招來吧。"
90001020-151 = "Aur，你要是不適可而止的話……"
90001020-153 = "今天的議題！就定為Soph是以什麼途徑學習人類的用語──"
90001020-154 = "或者Soph到底是不是那些低等又充滿矛盾，#n而且還經常搞不清楚目的跟手段的人類的跟蹤狂吧！"
90001020-155 = "雖然這個議題，和我們應該研究的主題幾乎毫無關聯！"
90001020-156 = "不過既然Soph的邏輯閘已經過載，我們還是應該把這件事查清楚才行！"
90001020-157 = "因為這樣才能見到Soph害羞的樣子！！"
90001020-159 = "你鬧夠了沒！"
90001020-165 = "很痛耶……"
90001020-166 = "你，你你你你，你還好嗎，Aur！？！？"
90001020-167 = "這就叫做自作自受。"
90001020-168 = "與其花時間討論那種無聊的議題，不如專心解讀「律法」。"
90001020-169 = "如果想在祭壇完成之前證明那位大人的存在，我們就得加快動作才行。"
90001020-171 = "可是「律法」已經解讀完了呀？"
90001020-173 = "這麼快？"
90001020-180 = "嗯，因為我們在和Abi-Eshuh的戰鬥中，獲得了很多可用於交叉比對的資料。"
90001020-181 = "難不成你以為我是為了別的事來找你的嗎，Soph？#n哎呀哎呀，Soph，你的自我意識是不是太旺盛了啊～？"
90001020-183 = "那你剛才怎麼不早說！"
90001020-184 = "唔啊，反對暴力！"
90001020-195 = "這是……「無名之神」的律法。"
90001020-196 = "……只要有了這個，我們就能重現啟蒙之前的崇高了。#n其實一開始聽說這件事的時候，我還以為這只是很久以前就消失的神話……"
90001020-201 = "哪有你說的那麼久遠。#n那位大人的話可都是有明確紀錄的。"
90001020-202 = "沒錯，那位大人的確下達過「將我證明至地之彼端」的命令。"
90001020-203 = "然而……最後卻因為一個無法控制的變數，釀成了那場悲劇……"
90001020-211 = "「世上充滿罪惡，世人心中的所有計畫皆為邪惡」"
90001020-212 = "「必須以水洗淨一切」"
90001020-213 = "嗯……雖然結果確實令人遺憾。"
90001020-214 = "但我們終究得繼續尋找線索才行。#n畢竟總是需要一個突破口。"
90001020-219 = "沒錯……也是因此才走到了這一步……"
90001020-223 = "怎麼了，Ain？#n你有什麼煩惱嗎？"
90001020-224 = "就算是為了證明存在與真理……我們真的有必要仰賴[ruby=無名之神的力量]「消失的概念與權能」[/ruby]嗎……？"
90001020-225 = "當，當然我並不打算違背那位大人的命令……！"
90001020-227 = "為什麼突然煩惱這件事？#n我們的行為不是已經具備完整性了嗎？打從一開始就是被設計成這樣的嘛。"
90001020-229 = "其實我能夠理解Ain為什麼這麼說。"
90001020-230 = "我們在被創造的瞬間就已經具備了完整性，所以根本不需要改進或改變。"
90001020-231 = "我，我就是這個意思……！#n就是因為這樣，我們才會……"
90001020-232 = "不對不對。#nAin，你試著這麼想想看。"
90001020-236 = "運用無名之神力量的行為，不也是對我們完整性的一種挑戰嗎？"
90001020-237 = "是，是這樣嗎……？"
90001020-239 = "沒錯。能夠自由運用被遺忘的神祇們的力量，就是對我們完整性最好的證明。"
90001020-240 = "只要計畫能順利執行，就連這片土地的碎片也能轉變成我們的根源。"
90001020-241 = "老實說，雖然「無名之神」的名號聽起來很了不起……#n但如今那些東西也不過是像化石一樣的古代遺物吧？就跟人類使用的石油差不多。"
90001020-242 = "以「從過去留下的遺物轉變成的東西獲得動力」這點來看，我想應該不會有錯……"
90001020-250 = "嗯？為什麼突然露出那種表情？"
90001020-252 = "抱，抱歉……我有點聽不懂你的比喻……"
90001020-253 = "別擔心，Ain。#nSoph一定又在說一些只有他才聽得懂的人類比喻了。"
90001020-254 = "他到底為什麼對低等人類的生活這麼感興趣，我實在是無法了解。"
90001020-259 = "我，我才不是因為感興趣才這樣的哦？#n真要說的話，畢竟人類的領土總有一天會由我們來支配跟管理……"
90001020-260 = "舉例來說……對了！他們就像家畜一樣！#n人類不是也對他們的家畜瞭若指掌嗎？"
90001020-261 = "家，家畜……又是什麼……？"
90001020-262 = "八成又是只有Soph才知道的無聊知識吧。"
90001020-267 = "過來這邊吧，Ain。#n先別管那個興趣很奇怪的傢伙了，我們一起來測試這台新研發出來的前腦裝置吧。"
90001020-273 = "喂，你那樣會教壞Ain啦。"
90001020-277 = "教壞他的人明明就是你。"
90001020-278 = "等，等，等一下。#nSoph、Aur……！你們不要吵架啦……！"
90001020-288 = "咦？這是……葛夫拉傳來的？"
90001020-289 = "是，是葛夫拉醬嗎？#n我，我馬上確認。"
90001020-290 = "唔嗯……哦？原來如此，看來是有關作戰的建議呢。#n第一項是要我們替它解除限制嗎？"
90001020-291 = "不，不可以！那樣葛夫拉醬的負擔會太大的！"
90001020-292 = "唔嗯……總之先繼續看下去吧。"
90001020-294 = "啊哈，葛夫拉本來的任務是防禦這片冰海地帶，並且排除干擾要素……"
90001020-295 = "所以它才希望我們幫它完成自己的使命啊。我明白了。"
90001020-296 = "原來如此。也就是說，這是場復仇之戰。"
90001020-297 = "嗚嗚，畢竟葛夫拉醬本來就，就有點衝動，可是……"
90001020-298 = "話說它還有另一個要求耶？#n雖然不會讓這種事發生，但萬一它真的被突破的話，#n希望我們能將敵人……引誘到「那裡」。"
90001020-299 = "哦？這件事倒是非同小可。#n它是在替我們準備B計畫嗎？唔嗯……"
90001020-300 = "反正聽起來挺有趣的，就照它說的做吧。"
90001020-301 = "沒問題嗎……雖然我其實也不反對這麼做就是了。"
90001020-302 = "我，我我我我，我反對！#n如果是那裡的話……那孩子在那裡的任務就……！"
90001020-303 = "嗯，我知道那孩子還沒辦法發揮100%的力量，但這並不代表作戰的方向有誤。"
90001020-304 = "沒錯，那孩子的實力很強。#n而且那裡也能迫使敵人連續戰鬥……這樣一來，對方遲早會到達極限。"
90001020-305 = "再加上又有地形方面的優勢。"
90001020-306 = "可，可是……這樣真的沒問題嗎？#n如果那孩子出了什麼事的話……"
90001020-307 = "你到底在說什麼啊，Ain？#n這不是你大顯身手的好機會嗎？"
90001020-308 = "……！對，對耶……？#n那我得打起精神來才行……嗚嗚……"
90001020-309 = "反正到時候，Ain八成會是我們三個之中最興奮的吧，呵呵呵。"
90001020-310 = "那就來做個總結吧──我不反對葛夫拉的計劃。#nAin、Aur，你們呢？"
90001020-311 = "我沒有異議。畢竟尊重彼此的自主性是很重要的。#n而且預言者們現在才真正開始甦醒。"
90001020-312 = "我，我明白了。#n既然你們都這麼說了……而且連葛夫拉醬也想這麼做的話……"
90001020-313 = "我也會盡最大的努力，驗證無名之神的力量能運用在什麼地方！"
90001020-318 = "下一話;第二次"

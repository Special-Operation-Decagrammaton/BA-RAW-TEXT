[translation]
1004502-1 = "無人島的神祕寶物"
1004502-2 = "（和星野聊完後，前往了客房）"
1004502-7 = "（…………）"
1004502-8 = "耶嘿。就是這個，我就是在找這個……"
1004502-12 = "（……？）"
1004502-13 = "嗯嗯。不錯嘛……"
1004502-14 = "[s1] 「……星野？」\n[s2] 朝著聲音傳來的方向走去"
1004502-21 = "……嗯？"
1004502-22 = "哎呀？怎麼了老師？"
1004502-23 = "我記得有在MomoTalk上說明過……有什麼事嗎？"
1004502-24 = "[s3] 「你在這裡做什麼？」\n[s4] 「我剛才聽你好像在自言自語……」"
1004502-25 = "……嗯？"
1004502-26 = "……嗯？"
1004502-27 = "喔，那個啊……"
1004502-31 = "……我在看這個。"
1004502-35 = "[ns5] 「渡假勝地導覽地圖？」\n[ns6] 「這導覽地圖怎麼了嗎？」"
1004502-36 = "唔嘿～你居然不知道呀，老師。"
1004502-37 = "唔嘿～你居然不知道呀，老師。"
1004502-38 = "仔細看看這裡。"
1004502-39 = "這上面是不是有使用過的痕跡？感覺是個被人使用過的手冊。"
1004502-40 = "像這種他人寫過字的地圖，代表留有他人走訪過的紀錄，很有趣對吧。"
1004502-41 = "所以我才會來客房做些調查。"
1004502-42 = "想說會不會有其他類似的東西……"
1004502-43 = "……感覺有點像尋寶很好玩對吧。"
1004502-44 = "於是我就在這個房間找到這個「藏寶圖」。"
1004502-45 = "目前正在檢查書寫過的地點。"
1004502-46 = "對了……"
1004502-53 = "既然老師也來了……"
1004502-54 = "那要不要一起去尋寶呀。"
1004502-61 = "嗯～我想應該就在這附近才對……"
1004502-62 = "哇……這裡的風景還真美呢。"
1004502-66 = "還真的是「寶物」呢～"
1004502-70 = "……哦？"
1004502-71 = "[s] 「……怎麼了？」"
1004502-76 = "……！！！"
1004502-81 = "[ns] 「星野！？」"
1004502-88 = "― 哎呀～真讓人心癢難耐呢……[wa:1980] "
1004502-90 = "― 這簡直就是樂園……[wa:980] "
1004502-93 = "― 涼爽的樹蔭……舒暢的海風……[wa:3710] "
1004502-95 = "― 還有溫柔的浪濤聲……[wa:970] "
1004502-98 = "― 哎呀～能來到這裡真是太好了～[wa:1230] "
1004502-100 = "― 真是棒極了，簡直就像夢裡才有的地方啊……[wa:2360] "
1004502-103 = "― ……老師也別光站在那裡，[wa:3040] "
1004502-105 = "― 要不要躺下來呀？"
1004502-108 = "― 雖然不是很寬敞，怎麼樣？[wa:1630] "
1004502-110 = "― 感覺很不錯吧～？"
1004502-113 = "[ns7] 「我光看你的表情就覺得很滿足了。」\n[ns8] 「想睡就睡吧。你也很累了吧。」"
1004502-114 = "― 唔嘿～原來如此，來這招啊……[wa:930] "
1004502-115 = "― 唔嘿～原來如此，來這招啊……[wa:930] "
1004502-117 = "― 嘛，雖然我多少也有預料到了。[wa:1720] "
1004502-120 = "― 明明不必這樣的說……[wa:570] "
1004502-123 = "― 不過，你的那種地方，我也不討厭就是了。[wa:2050] "
1004502-125 = "― ……耶嘿嘿。[wa:50] "
1004502-128 = "[ns9] 「找到了一個優質的午睡空間呢。」\n[ns10] 「注意不要睡太久囉。」"
1004502-129 = "唔嘿，我不在的時候，老師也可以用這裡唷～"
1004502-130 = "唔嘿，我不在的時候，老師也可以用這裡唷～"
1004502-135 = "不過……"
1004502-136 = "……既然要來的話，希望也能叫上大叔我呢。"
1004502-138 = "（結果還是一起躺下，睡了個悠閒的午覺後才回到渡假勝地）"

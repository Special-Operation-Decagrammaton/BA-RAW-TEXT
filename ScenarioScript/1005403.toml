[translation]
1005403-1 = "ซิสเตอร์บนม้านั่ง"
1005403-6 = "ข้างลู่วิ่งในสนามกีฬา"
1005403-7 = "(คุณครูเป็นห่วงมารี จึงมาที่ข้างสนามกีฬา)"
1005403-8 = "(มารีนั่งอยู่ที่ริมด้านหนึ่งของม้านั่งด้วยสีหน้าที่ขาวโพลน...)"
1005403-14 = "แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก"
1005403-15 = "แฮ่กๆ... โลก... ดูขาวไปหมดเลยค่ะ..."
1005403-16 = "สติของฉัน.... อา... ทางด้านนั้นมีคุณปู่คนหนึ่งกำลังโบกมือให้ฉันอยู่ด้วยละค่ะ"
1005403-20 = "[ns1] \"มา... มารี!?\"\n[ns2] \"เป็นอะไรรึเปล่า!? ดูเหนื่อยมากเลยนะนั่น...!?\""
1005403-23 = "...!?"
1005403-24 = "อะ...เอ๋~~!? คะ... คุณครู!? มะ... มาตั้งแต่เมื่อไรคะ...!?"
1005403-27 = "― แฮ่ก... แฮ่ก...[wa:1560] "
1005403-28 = "― ขอโทษค่ะ คุณครู...[wa:1760] "
1005403-31 = "― ฉันไม่ได้... ฮู่ว...[wa:2900] "
1005403-32 = "― อยากให้คุณครู... เห็นสภาพแบบนี้เลย...[wa:1500] "
1005403-35 = "― ขอโทษนะคะ...[wa:1820] "
1005403-36 = "― ก่อนอื่น... ต้องทำให้... ใจเย็นๆ ก่อน...[wa:3560] "
1005403-39 = "― ฮู่ว... ฮู่ว...[wa:2540] "
1005403-42 = "[ns3] \"พักก่อนดีกว่านะ มีอะไรที่ครูพอช่วยได้มั้ย?\"\n[ns4] \"ไม่เป็นไรนะ มีอะไรให้ช่วยบอกครูได้เลย\""
1005403-43 = "― คะ...!?[wa:120] "
1005403-44 = "― คะ...!?[wa:120] "
1005403-45 = "― อา... คือว่า...ที่จริง...ฉันไม่ได้หมายถึงแบบนั้น...![wa:980] "
1005403-48 = "― คะ... แค่คุณครูอยากช่วย ฉัน...ก็รู้สึกขอบคุณมากแล้วค่ะ...[wa:3060] "
1005403-51 = "― (คุณครู...เป็นห่วงฉัน...งั้นเหรอ...)[wa:3250] "
1005403-54 = "― (ฉันไม่เคยคิดเรื่องแบบนี้มาก่อนเลย)[wa:3020] "
1005403-57 = "― คือ... เรื่องพวกนี้[wa:3640] "
1005403-58 = "― ฉันไม่รู้ว่าควรบอกคุณครูดีรึเปล่า...[wa:1920] "
1005403-61 = "― มันเหมือน... ฉันยึดคุณครูเอาไว้...คนเดียว...[wa:1320] "
1005403-62 = "― แบบนี้... อาจถูกพระเจ้าลงโทษก็ได้นะคะ แต่ว่า...[wa:5320] "
1005403-65 = "― ตอนนี้ ฉันน่ะ...[wa:2380] "
1005403-66 = "― มีความสุขมากๆ เลยค่ะ![wa:2480] "
1005403-70 = "ขอบคุณค่ะคุณครู เพราะคุณครูมาช่วยไว้เลย ตอนนี้ฉันรู้สึกดีขึ้นแล้วค่ะ"
1005403-71 = "คะ...? ทำไมฉันถึงเป็นแบบนี้ไปได้งั้นเหรอคะ? อืม... ไม่ใช่เรื่องใหญ่อะไรเลยค่ะ"
1005403-72 = "ก็แค่ไปช่วยคนอื่นๆ มานิดหน่อย... แล้วก็ไปแข่งวิ่งที่ลงชื่อเข้าร่วมไว้..."
1005403-73 = "[s5] \"ไปลงแข่งกีฬาแล้วยังไปช่วยคนอื่นอีกเหรอ?\"\n[s6] \"อย่าหักโหมเกินไปนะมารี เดี๋ยวจะบาดเจ็บเอา\""
1005403-76 = "ขะ... ขอโทษค่ะ... คือมันมักจะบังเอิญไปเจอบ่อยๆ..."
1005403-77 = "เวลาที่เห็นคนที่กำลังลำบาก ก็มักจะทำเกินตัวไปนิดหน่อยค่ะ ฮะฮะฮะ..."
1005403-78 = "แต่ว่า... ฉันกลับทำให้คุณครูเป็นห่วงซะแล้วสินะคะ"
1005403-79 = "คราวหน้าฉันจะขอร้องคนแถวนั้น หรือขอให้คุณครูช่วยแทนแล้วกันค่ะ"
1005403-80 = "คะ...?!"
1005403-81 = "สนุกรึเปล่างั้นเหรอคะ...? หมายถึงฉันเหรอคะ?"
1005403-82 = "ค่ะ! สนุกมากๆ เลยค่ะ! สนุกกว่าที่คิดเอาไว้มากๆ เลยค่ะ สนุกจนหมดแรงแบบนี้เลยค่ะ!"
1005403-83 = "อันที่จริงก่อนที่งานจะเริ่ม ฉันกังวลมากกว่าคาดหวังว่างานจะสนุกด้วยซ้ำ..."
1005403-84 = "แต่พองานเริ่มแล้ว การแข่งกีฬา... ทำให้รู้สึกสดชื่นปลอดโปร่งมากเลยค่ะ!"
1005403-85 = "และบางทีถึงงานกีฬาจะจบลงไปแล้ว... ถ้ามีเวลาฉันก็อยากจะเล่นกีฬาต่อเรื่อยๆ ค่ะ!"
1005403-86 = "เอ่อ..."
1005403-87 = "วะ...ว่าแต่ว่าคุณครูล่ะคะ? คุณครูไม่ได้ลงแข่งกีฬาประเภทไหนเลยเหรอคะ?"
1005403-88 = "เหมือนจะเห็นคุณครูคอยดูแลพวกเราอยู่อย่างเดียวเลย... อืม..."
1005403-89 = "ขอโทษนะคะ เหมือนมีแค่พวกเราที่สนุกกันอยู่เลย..."
1005403-90 = "[s7] \"ไม่หรอก ครูเองก็มีงานอื่นที่ต้องทำอยู่น่ะ\"\n[s8] \"ครูก็สนุกอยู่เหมือนกันนะ ไม่ต้องห่วงหรอก\""
1005403-91 = "คุณครู..."
1005403-92 = "คะ? งะ...งั้นเหรอคะ..? อืม ถึงฉันจะไม่ค่อยเข้าใจก็เถอะค่ะ"
1005403-93 = "คุณครูมักจะพูดแบบนี้แล้วก็คอยดูแลพวกฉันอยู่ตลอด จนไม่รู้ว่าจะขอบคุณและตอบแทนคุณครูยังไงดี#nเลยค่ะ"
1005403-97 = "คุณครู..."
1005403-103 = "หลังจากนี้... ฉันไม่รู้ว่าจะมีเรื่องอะไรเกิดขึ้นบ้าง"
1005403-104 = "แต่ถ้ามีอะไรที่คุณครูอยากให้ฉันช่วยละก็ บอกฉันได้ตลอดเลยนะคะ ฉันเองก็อยากเป็นประโยชน์กับ#nคุณครูบ้างค่ะ"
1005403-105 = "คะ? ได้ใช่มั้ยคะ? ถ้างั้นสัญญาได้มั้ยคะ? "
1005403-106 = "[s9] \"ก็ได้ ครูจะรอก็แล้วกันนะ\"\n[s10] เกี่ยวก้อยสัญญา"
1005403-109 = "...!!"
1005403-110 = "สัญญาแล้วนะคะ คุณครู! "
1005403-111 = "ฮิฮิ..."
1005403-112 = "ฉันจะรอวันที่คุณครูบอกให้ช่วยนะคะ!"
1005403-114 = "(มารีกลับมาร่าเริงอีกครั้งและเด้งตัวลุกขึ้นมาจากเก้าอี้อย่างรวดเร็ว และไปเข้าร่วมการแข่งขันอื่นต่อ)"
1005403-115 = "(จากนั้นคุณครูก็เดินไปนั่งตรงม้านั่งที่มารีเคยนั่งอย่างเงียบๆ...)"
1005403-120 = "(และจู่ๆ ก็มีลูกบอลลอยมากระแทกเข้าที่หน้าอย่างเต็มเปา...)"

[translation]
1005403-1 = "Sister on the Bench"
1005403-6 = "Next to the Stadium Track"
1005403-7 = "Struck with worry, I went to the side of the track in the stadium where I heard Mari was supposed to be."
1005403-8 = "She was collapsed on the end of a bench, looking completely exhausted."
1005403-14 = "*huff* *puff* *huff* ... *puff* ..."
1005403-15 = "Haha...ha... The world is fading..."
1005403-16 = "I feel like... I'm fading too... Oh...I see a light, and someone waving at me in the distance..."
1005403-20 = "[ns1] \"M-Mari...?!\"\n[ns2] \"What happened? What's wrong?!\""
1005403-23 = "...?!"
1005403-24 = "H-Huh?! S-Sensei? How long have you been here?!"
1005403-27 = "― *huff* *puff*[wa:1640] "
1005403-28 = "― I'm so sorry, Sensei...[wa:1560] "
1005403-31 = "― I-I didn't want...you to...[wa:2620] "
1005403-32 = "― see me...like this...[wa:2140] "
1005403-35 = "― Sorry.[wa:2060] "
1005403-36 = "― First... I just need to catch my breath...[wa:3480] "
1005403-39 = "― *inhale* *exhale*[wa:2460] "
1005403-42 = "[ns3] \"Good, keep breathing. Just rest. Can I do anything?\"\n[ns4] \"Are you all right? Tell me what you need.\""
1005403-43 = "― Pardon?[wa:120] "
1005403-44 = "― Pardon?[wa:120] "
1005403-45 = "― Oh dear, you don't need to worry about me...![wa:1260] "
1005403-48 = "― Th-Thank you so much. I appreciate your concern... Right...[wa:2980] "
1005403-51 = "― (To see that Sensei would get so worried about me...)[wa:2570] "
1005403-54 = "― (I... I never would have even dreamed of this...)[wa:2460] "
1005403-57 = "― I... Uh...[wa:4000] "
1005403-58 = "― I hope you'll forgive me for saying this, but...[wa:1440] "
1005403-61 = "― I feel like I've had you all to myself lately, Sensei...[wa:840] "
1005403-62 = "― I'm not sure if it's a sin, but...[wa:5840] "
1005403-65 = "― Spending time with you...[wa:2020] "
1005403-66 = "― makes me so happy![wa:2600] "
1005403-70 = "Thank you, Sensei. I think my heart rate's almost back to normal."
1005403-71 = "...Huh? How did this happen? Umm, I'm not sure. I didn't even do that much, I don't think..."
1005403-72 = "I just helped some people who needed it. By the time my event came up, I was a bit tired, I suppose... But I still wanted to work hard."
1005403-73 = "[s5] \"You were running around helping others this whole time?\"\n[s6] \"Don't push yourself too hard. You could get hurt.\""
1005403-76 = "Oh, I'm sorry... But when I see people in trouble..."
1005403-77 = "I can't just ignore it! I need to help. Hahaha..."
1005403-78 = "...But still, I shouldn't have worried you."
1005403-79 = "So, next time, I'll ask the staff or you for help."
1005403-80 = "...Hm?"
1005403-81 = "Oh, me? Am I enjoying today's field day?"
1005403-82 = "...Yes! Even more than I expected to. Haha, I worked so hard that I'm completely exhausted!"
1005403-83 = "It's true, before I got here I was more worried than excited."
1005403-84 = "But once I started exercising, that all went away! I felt completely energized."
1005403-85 = "I might even want to keep going after Field Day is over!"
1005403-86 = "Oh..."
1005403-87 = "By the way, what about you, Sensei? Do you wish you could participate in any events?"
1005403-88 = "You're always so busy looking after us, so..."
1005403-89 = "It just seems like a shame that you don't really get to enjoy things like this."
1005403-90 = "[s7] \"It's not a problem. This is my job.\"\n[s8] \"I'm having a good time too, so don't worry.\""
1005403-91 = "Sensei..."
1005403-92 = "Really? You're not just saying that? I'm not sure I understand."
1005403-93 = "Even so... taking care of us all must be a lot of work. I don't know how I can repay you."
1005403-97 = "...Hey, Sensei."
1005403-103 = "I don't have any idea what you might need, but..."
1005403-104 = "If there's ever anything I can do to lighten your load, please let me know. I want to help you at least once."
1005403-105 = "Is that all right? Will you promise me that?"
1005403-106 = "[s9] \"Sure. I'll let you know.\"\n[s10] Pinky promise."
1005403-109 = "...!"
1005403-110 = "Don't forget your promise, Sensei!"
1005403-111 = "Heehee."
1005403-112 = "I'll be looking forward to it."
1005403-114 = "Mari, reinvigorated, got up from her seat and ran back onto the track to join the next event."
1005403-115 = "I slowly settled onto the bench where Mari had been sitting..."
1005403-120 = "...And a ball flew out of nowhere and hit me in the face."

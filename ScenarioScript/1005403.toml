[translation]
1005403-1 = "長椅角落的修女"
1005403-6 = "運動場的跑道旁"
1005403-7 = "（出於擔心，所以來找瑪麗）"
1005403-8 = "（在長椅的角落，一臉彷彿已經燃燒殆盡的瑪麗坐在那裡）"
1005403-14 = "哈啊，哈啊……哈啊……哈啊……"
1005403-15 = "世界……一片……白茫茫的。"
1005403-16 = "好像看不太清楚……那是誰呢？#n正在向我招手的，那位是……"
1005403-20 = "[ns1]「瑪，瑪麗……！？」\n[ns2]「你，你還好嗎！？」"
1005403-23 = "……！？"
1005403-24 = "啊……咦！？#n老，老師！？您，您什麼時候來的……！？"
1005403-27 = "― 哈啊，哈啊……[wa:1880] "
1005403-28 = "― 對不起，老師……[wa:2160] "
1005403-31 = "― 這副模樣……哈啊……[wa:3300] "
1005403-32 = "― 本來沒有打算讓您看到的……[wa:2460] "
1005403-35 = "― 不好意思，[wa:2100] "
1005403-36 = "― 請先讓我……喘口氣，再繼續……[wa:4560] "
1005403-39 = "― 哈啊……呼……[wa:2860] "
1005403-42 = "[ns3]「再多休息一下吧。需要什麼東西嗎？」\n[ns4]「還好嗎？需要什麼儘管跟我說。」"
1005403-43 = "― 咦……！？[wa:200] "
1005403-44 = "― 咦……！？[wa:200] "
1005403-45 = "― 啊，那個，我不是那個意思……！[wa:2460] "
1005403-48 = "― 您，您能這麼說，我就已經很感激了……呼……[wa:4500] "
1005403-51 = "―（老師……居然會擔心我……）[wa:4170] "
1005403-54 = "―（那種事，我從來沒有想過……）[wa:3860] "
1005403-57 = "― 那個……[wa:4240] "
1005403-58 = "― 這種事，不知道該不該說……[wa:2840] "
1005403-61 = "― 我好像獨佔著老師一樣……[wa:2600] "
1005403-62 = "― 做這種事的話，或許會遭天譴也說不定，但是……[wa:6320] "
1005403-65 = "― 我……覺得現在……[wa:2660] "
1005403-66 = "― 非常幸福……[wa:3080] "
1005403-70 = "謝謝您，老師。#n託您的福感覺舒服多了。"
1005403-71 = "您問我為什麼會變成這樣……？#n其實也沒發生什麼特別的事……"
1005403-72 = "那個……在比賽間的空檔有人需要幫忙，所以就幫助了他們……"
1005403-73 = "[s5]「一邊參加自己的比賽，一邊幫忙其他人！？」\n[s6]「不可以逞強唷。我很擔心瑪麗。」"
1005403-76 = "對不起……因為實在放心不下……"
1005403-77 = "我果然無法對有困難的人視而不見，不知不覺就……"
1005403-78 = "……不過，老師說的沒錯。#n又讓您擔心了。"
1005403-79 = "之後我不會逞強，會去請實行委員或老師幫忙的。"
1005403-80 = "……咦？"
1005403-81 = "有沒有樂在其中？"
1005403-82 = "……嗯，非常開心！比我預期得還要開心！#n不禁讓我像這樣拚盡全力！"
1005403-83 = "老實和您說，其實一開始心裡充滿著不安……"
1005403-84 = "但是當比賽開始之後，那種事情就一掃而空了！"
1005403-85 = "甚至讓我覺得就算大運動會結束了，也要自己找時間做運動。"
1005403-86 = "……啊。"
1005403-87 = "現，現在說這些可能有點晚了……老師沒有參賽呢。"
1005403-88 = "一直都在照顧我們這些學生……"
1005403-89 = "那個……非常抱歉。只有我們玩得這麼開心……"
1005403-90 = "[s7]「瑪麗有樂在其中真是太好了。」\n[s8]「別擔心，我也很開心唷。」"
1005403-91 = "老師……"
1005403-92 = "是嗎……？那真是太好了。"
1005403-93 = "老師總是像這樣守護著我們……#n真是感激不盡……"
1005403-97 = "……老師。"
1005403-103 = "今後，雖然什麼什麼事都沒有發生是最好的……"
1005403-104 = "不過只要我能幫上忙，請隨時告訴我。#n我也想要幫助老師。"
1005403-105 = "還是說，這樣會給您添麻煩呢……？"
1005403-106 = "[s9]「不會，沒有那種事唷。我很期待。」\n[s10] 和瑪麗打勾勾"
1005403-109 = "……！"
1005403-110 = "約好了！#n……請不要忘記唷。"
1005403-111 = "呵呵。"
1005403-112 = "……我很期待那天的到來！"
1005403-114 = "（恢復活力的瑪麗很有精神地站了起來，開始進行下一個項目的準備）"
1005403-115 = "（目送瑪麗離開後，正打算在瑪麗剛坐的位置坐下時……）"
1005403-120 = "（……一顆不知道從那裡飛來的球朝臉飛了過來）"

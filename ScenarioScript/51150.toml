[translation]
51150-1 = "Episode 15;An Encounter"
51150-3 = "[ns] \"...Have we met?\""
51150-4 = "Heeheehee. That's the expression!"
51150-5 = "The little furrow in your brow says: \"Who is this intimidating stranger?\""
51150-6 = "You see, I heard all these stories, but I never had a face to put to the name."
51150-7 = "Oh boy, do you live up to expectations! The confusion, the fear! It's irresistible, really. Makes me want more."
51150-8 = "I just had to see for myself! And the rumors really don't do you justice, Sensei! "
51150-9 = "[s] \"(Rumors...?)\""
51150-10 = "Oh me, oh my. You don't trust me one little bit, do you? "
51150-11 = "Yes, yes. That's exactly what I'd expect from you."
51150-12 = "That being said, Sensei."
51150-13 = "Or perhaps more importantly, what wasn't said..."
51150-14 = "Did you get my letter?"
51150-15 = "[s] \"You don't mean...\""
51150-19 = "\"Let all lost souls heed our words.\""
51150-20 = "\"Our fine leisure shall soon end, for some feelings mean the most when enjoyed together.\""
51150-21 = "When the time of joy begins and your eyes sparkle with flowers blossoming in the sky,"
51150-22 = "Nature's Beauty shall reveal itself again."
51150-23 = "[s] \"That's the letter from Nature's Beauty...\""
51150-24 = "Look forward to our coming."
51150-25 = "When you hear us knocking on your front door..."
51150-29 = "[log=???][ff4444]Hyakkiyako will burn.[-][/log]"
51150-32 = "[ns] \"...?!\""
51150-35 = "What's this? Your face... Such confusion, such concern."
51150-36 = "That conniving little lady omitted some lines, didn't she?"
51150-37 = "She really decided to edit out the most important part of the message!"
51150-38 = "That moron."
51150-39 = "[s] \"...You're from Nature's Beauty?\""
51150-40 = "Ding, ding, ding. You've outdone yourself."
51150-41 = "Are you happy now? You solved the riddle!"
51150-42 = "Hahaha! Just kidding. You haven't solved anything."
51150-43 = "Look at that dopey little face. \"I'm Sensei, and I don't know anything!\" "
51150-44 = "Let's start with your very first question! Who am I? "
51150-45 = "If you knew anything at all, you wouldn't have asked such a dumb, useless question to begin with!"
51150-46 = "Okay, I answered! My turn to ask. "
51150-47 = "You're a responsible, hard-working teacher, so you have to answer your student's question. Okay."
51150-52 = "You, Schale's Sensei."
51150-53 = "Do you like cats?"
51150-54 = "[s] \"...I don't understand the intention behind that question.\""
51150-55 = "Hahaha. You can't be serious."
51150-56 = "You can't understand, because there's nothing to understand."
51150-57 = "Here's the one thing I need you to get through your thick skull. "
51150-59 = "You're here as a witness to the events about to unfold."
51150-60 = "The Hundred Ghost Stories will bring about our new elegance."
51150-62 = "After twenty long, long years...! The cast is gathered, and the stage is set. "
51150-63 = "Be sure to stick around until the last page."
51150-64 = "Otherwise, this nightmare will never end."
51150-70 = "[ns] \"W-Wait...!\""
51150-74 = "[ns1] \"What ghost stories...?\"\n[ns2] \"Her voice sounded vaguely familiar...\""
51150-81 = "Finally! Are you okay, Sensei?! "
51150-82 = "You weren't picking up your phone! I was seriously worried something happened to you."
51150-83 = "[s3] \"Everything's okay. Something...unexpected came up.\"\n[s4] \"The craziness of the festival must've gotten to me.\""
51150-86 = "What do you mean...? "
51150-87 = "Ah, more importantly! I found Yukari!"
51150-88 = "[s] \"Great job, Shizuko!\""
51150-89 = "Thank you, but there's a bit of a problem."
51150-90 = "I guess calling it a problem is a bit of an exaggeration..."
51150-91 = "I think it'd be better to talk about this in person!"
51150-92 = "Where are you, Sensei?"
51150-94 = "I found myself fighting the crowd as I arrived at our agreed upon meeting spot."
51150-99 = "Sensei! There you are!"
51150-100 = "This crowd is insane. I'm so glad I found you!"
51150-101 = "I'm sorry it took so long to get here. I didn't realize how busy it had gotten."
51150-102 = "[s5] \"What did you want to talk about?\"\n[s6] \"Why are you alone? What happened to Yukari?\""
51150-105 = "So, I did meet up with Yukari, but things didn't exactly go as planned."
51150-106 = "Augh, it's a bit complicated. Where do I even start?"
51150-107 = "...I guess from the beginning."
51150-109 = "What? You mean you'll hold the ritual...as the Kadenokouji miko?"
51150-115 = "Yes."
51150-116 = "Let's talk about this first! No need to make any rash decisions."
51150-117 = "I hope I didn't influence you in any way... I didn't fully understand the situation, and I didn't mean to push you in one direction or another."
51150-118 = "I must admit, I'm confused. You were in need of a miko, correct?"
51150-119 = "M-More than anything! The ritual was a long-held tradition of the Lantern Festival, and I think the Kadenokouji miko's presence will mean a lot to everyone!"
51150-120 = "But...I didn't want it like this..."
51150-121 = "You can rest easy, Shizuko. This is my decision."
51150-125 = "I've been reflecting upon the past...thinking of the future."
51150-126 = "It seems the memory I'm chasing is naught but an empty shell."
51150-127 = "I won't burden others with such selfish dreams."
51150-128 = "There are expectations I must fulfill."
51150-129 = "After all, I am a Kadenokouji."
51150-131 = "Th-That's not fair!"
51150-132 = "I simply... Could you relay my apologies to Sensei for me, Shizuko?"
51150-133 = "Kikyou was correct. It was dishonorable of me to plead for Sensei's help without telling them the whole truth."
51150-134 = "I was so focused on saving the Hyakkaryouran, on my own desires."
51150-135 = "It's no excuse, but I thought lying to Sensei was the sole path to achieving my goals."
51150-136 = "You should tell Sensei yourself. They wouldn't blame you."
51150-137 = "I...do believe that."
51150-138 = "But I can't continue leaning on Sensei. They've already done so much in supporting my succession contest."
51150-139 = "Playtime is over, so I'm returning to my duties now."
51150-144 = "Please communicate my overwhelming gratitude to Sensei, and...that I'll be okay."
51150-150 = "She couldn't bring herself to tell you how sorry she is in person, so she went ahead."
51150-151 = "[s] \"So she went to go fulfill her role as the Kadenokouji miko...\""
51150-152 = "Sensei..."
51150-153 = "Is this my fault?"
51150-154 = "Did I push Yukari into a corner?"
51150-155 = "If you think about it, if I hadn't tried to revive the Lantern Festival..."
51150-156 = "None of this would've happened, right?"
51150-157 = "[s] \"That was beyond your control, Shizuko.\""
51150-159 = "[ns7] \"If it weren't the festival, it would've been something else.\"\n[ns8] \"You had good intentions behind your actions, right?\""
51150-162 = "[ns9] \"I'm grateful you took the time to help, Shizuko.\"\n[ns10] \"You took responsibility and stepped up.\""
51150-167 = "Y-You're giving me too much credit! This is all part of the job as the Festival Department president."
51150-168 = "[s] \"Then I'll leave Yukari to you, President.\""
51150-169 = "What will you do, Sensei?"
51150-170 = "Are you going back to the Hyakkaryouran?"
51150-171 = "[s] \"I don't care about a succession contest or whatnot.\""
51150-174 = "[ns11] \"But I'd like to hear out the Hyakkaryouran members.\"\n[ns12] \"I can at the very least lend them an ear for their problems.\""
51150-177 = "[ns] \"You said it yourself, Shizuko.\""
51150-179 = "I want to hear everyone's laughter."
51150-180 = "I want this festival to bring a smile to everyone's face... That's my goal."
51150-181 = "[s] \"So it's my job to make that happen.\""
51150-182 = "Sensei..."
51150-183 = "[ns] \"To start, there's something bothering me.\""
51150-189 = "[ns13] \"Kikyou, Renge, and Yukari's fight...\"\n[ns14] \"There's one person at the center of all of this.\""
51150-193 = "The vice president, Nagusa?"
51150-194 = "You're right. This all started when she renounced her position as acting president and disappeared."
51150-195 = "[s] \"Which is why I need to talk to Nagusa.\""
51150-196 = "I understand."
51150-197 = "While you do that, please rest assured Yukari will be under my care."
51150-198 = "As the CEO of Momoyodou, perfection is the only option!"
51150-199 = "There's no turning back now, so I'll take care of every detail."
51150-200 = "Every single onlooker will be in awe of Yukari the miko as she performs the ritual!"
51150-201 = "[s] \"I'm counting on you, Shizuko.\""
51150-205 = "[ns] \"(...So I said. But how do I find Nagusa?)\""
51150-210 = "[ns] \"(Ah! Hm... It's worth a shot.)\""
51150-220 = "You want us to find...Nagusa? Of all people?"
51150-221 = "[s] \"I thought you might know how to find her, since you've done it before.\""
51150-222 = "Yes, there is no other club at Hyakkiyako with the select skills we at the Ninjutsu Research Club possess to track down someone as elusive as Nagusa..."
51150-224 = "And...you're right... We did do it once before..."
51150-225 = "Yup! You've come to the right place, my lord!"
51150-227 = "That's all true, but...why are you looking for Nagusa?"
51150-228 = "[s15] \"It's for another student.\"\n[s16] \"I need Nagusa's help.\""
51150-231 = "[ns17] \"That's why I need you guys.\"\n[ns18] \"...So, will you lend me a hand?\""
51150-234 = "That's just like Sensei! Well, if it's to help a student in need..."
51150-235 = "A ninja would never leave an ally behind!"
51150-236 = "Right, Tsukuyo? Izuna?"
51150-239 = "That's the ninja way!"
51150-241 = "We, the Ninjutsu Research Club, accept the mission from Sensei!!"
51150-242 = "Fellow ninjas...!"
51150-243 = "P-Proceed to..."
51150-244 = "Move out! Nin nin!"
51150-246 = "Next Episode;Goryou Nagusa"

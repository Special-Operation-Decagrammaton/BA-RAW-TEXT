[translation]
51150-1 = "ตอนที่ 15;การพบกันโดยบังเอิญ"
51150-3 = "[ns] \"...ใครน่ะ...?\""
51150-4 = "อะฮะฮะฮ่า ดูทำหน้าเข้าสิ"
51150-5 = "ทำหน้าเหมือนกำลังบอกว่า \"ไม่รู้เลยว่าคนที่จู่ๆ ก็เจอคือใครกันแน่\""
51150-6 = "เป็นสีหน้าที่ฉันวาดไว้ในหัวอยู่ตลอดตั้งแต่ได้ฟังเรื่องของคุณเลย"
51150-7 = "...น่ารักจนใจเจ็บเลย ต้องบอกว่าถูกใจฉันมากๆ~~ เลยละค่ะ"
51150-8 = "ที่ผ่านมา... ฉันได้ยินเรื่องราวของคุณจากข่าวลือเท่านั้น วันนี้ฉันทำถูกต้องแล้วละค่ะที่มาหาคุณด้วยตัว#nเอง"
51150-9 = "[s] (ข่าวลือ...?)"
51150-10 = "อืม~ ไม่ทราบว่า~ คิดว่าฉันน่าสงสัยหรือเปล่าคะ~?"
51150-11 = "ใช่ค่ะ ท่าทีของคุณในตอนนี้เหมือนกับที่ฉันได้ยินมาเลย"
51150-12 = "คุณครูในแง่อย่างนั้นน่ะ"
51150-13 = "และต่อให้ไม่เป็นอย่างนั้น คุณครูจากชาเล่ต์คะ"
51150-14 = "...ได้รับจดหมายแล้วหรือยังคะ?"
51150-15 = "[s] \"จดหมาย... งั้นเหรอ?\""
51150-19 = "<ทุกคนจงฟังคำบอกเล่าต่อไปนี้>"
51150-20 = "<ความสง่างามของเรายังไม่สิ้นสุด บรรยากาศเงียบสงบเป็นสิ่งที่เราทุกคนควรลิ้มลอง>"
51150-21 = "<ตอนที่เวลาแห่งความสุขเริ่มต้น ตอนที่ทุกคนมองดอกไม้บานในท้องฟ้าด้วยดวงตาที่เปล่งประกาย>"
51150-22 = "ตอนนั้น... ชมรมความงามของธรรมชาติจะไปหาพวกเธออีกครั้ง"
51150-23 = "[s] \"เดี๋ยวนะ นั่นมันเนื้อความจากจดหมายที่ชมรมความงามของธรรมชาติส่งมา...\""
51150-24 = "ตั้งตารอไว้ให้ดีล่ะ"
51150-25 = "เพราะตอนที่พวกฉันเข้าไปใกล้พวกเธอ..."
51150-29 = "[log=???][ff4444]<เฮียกคิยาโคจะต้องมอดไหม้>[-][/log]"
51150-32 = "[ns] \"......?!\""
51150-35 = "เอ๋~? เอ๊ะ เอ๋ ดูทำหน้าเข้าสิ ตกใจที่ได้ยินสินะ"
51150-36 = "แสดงว่าผู้หญิงคนนั้น... ไม่ได้บอกสินะคะ"
51150-37 = "สงสัยเธอจะคิดว่าไม่จำเป็นต้องบอกประโยคสุดท้ายที่ฉันอยากส่งถึงคุณ"
51150-38 = "ช่างโง่เขลาเสียจริง"
51150-39 = "[s] \"เธอคือ... คนจากชมรมความงามของธรรมชาติ... ที่ส่งจดหมายมาเหรอ?\""
51150-40 = "ค่า~ ค่ะ ใช่แล้วค่ะ"
51150-41 = "ว่าไงล่ะคะ? หายสงสัยแล้วหรือยังคะ~?"
51150-42 = "ไม่สิ จะเป็นแบบนั้นไปได้ยังไง อะฮ่าฮ่าฮ่า ไม่มีทางหรอกค่ะ"
51150-43 = "นี่มันสีหน้าของคนโง่ที่ไม่รู้เรื่องอะไรสักอย่างเลย"
51150-44 = "ใช่ค่ะ ก็ไม่แปลกหรอก คำถามที่คุณถามว่าฉันคือใครน่ะ"
51150-45 = "มันเป็นคำถามโง่ๆ ที่ไม่ได้ประโยชน์อะไร รวมถึงไม่ได้แก่นสารของเรื่องราวนี้ด้วย"
51150-46 = "ถ้างั้น~ ต่อไปก็เป็นตาของฉันค่ะ ฉันตอบคำถามของคุณไปแล้ว งั้นต่อไปก็ต้องเป็นฉันที่จะถามกลับ"
51150-47 = "ถ้าเป็นคุณครูละก็... คงไม่เมินเฉยต่อคำถามของนักเรียนใช่ไหมคะ?"
51150-52 = "คุณครูจากชาเล่ต์ คุณน่ะ...."
51150-53 = "ชอบแมวหรือเปล่าล่ะคะ...?"
51150-54 = "[s] \"...ไม่เห็นจะเข้าใจความหมายเลย\""
51150-55 = "อะฮ่าฮ่า พูดอะไรอย่างนั้นล่ะคะ"
51150-56 = "มันก็แน่อยู่แล้วนี่คะที่การสนทนานี้มันไม่มีความหมายอะไรเลย"
51150-57 = "งั้นฉันจะเข้าประเด็นเลย เหตุผลที่ฉันมาหาคุณมีอยู่อย่างเดียว"
51150-59 = "เรื่องที่ฉันจะเล่าต่อไปนี้คือ"
51150-60 = "<ตำนานร้อยเรื่องราว>... เรื่องลี้ลับที่บอกต่อถึงความสง่างาม"
51150-62 = "ในวันนี้ที่เวียนมาบรรจบอีกครั้งในรอบ 20 ปี ในที่สุด~ นักแสดงก็มารวมตัวกันครบทุกบทบาทแล้วค่ะ"
51150-63 = "เพราะงั้นก็ช่วยอยู่ด้วยกันจนถึงตอนจบเลยนะคะ"
51150-64 = "หวังว่าจะอยู่จนถึงคำว่า \"จบบริบูรณ์\" เลย"
51150-70 = "[ns] \"ดะ... เดี๋ยวสิ!\""
51150-74 = "[ns1] \"เรื่องลี้ลับงั้นเหรอ หมายความว่ายังไง?\"\n[ns2] \"เหมือนเคยได้ยินเสียงเด็กคนนั้นมาจากที่ไหนเลย\""
51150-81 = "อ๊ะ คุณครู?! ทุกอย่างโอเคดีไหมคะ?"
51150-82 = "คุณครูไม่รับโทรศัพท์ฉันมาสักพักแล้ว... ฉันก็เลยกลัวว่าจะเกิดเรื่องอะไรหรือเปล่าน่ะค่ะ"
51150-83 = "[s3] \"อ้อ ครูไม่เป็นไร... แค่เจอเรื่องแปลกนิดหน่อยน่ะ\"\n[s4] \"ครูเหมือนจะดื่มด่ำไปกับบรรยากาศของเทศกาลน่ะ\""
51150-86 = "คะ...?"
51150-87 = "อ้อ จริงสิ! ฉันจะโทรมาบอกว่า! ฉันเจอยูคาริแล้วค่ะ!"
51150-88 = "[s] \"อ๊ะ จริงเหรอ?!\""
51150-89 = "แต่ว่า... มีปัญหานิดหน่อย..."
51150-90 = "ไม่สิ มันก็ไม่เชิงว่าเป็น... ปัญหาอะไรหรอก... แต่ว่า.."
51150-91 = "อืม ฉันว่าฉันไปเจอแล้วอธิบายต่อหน้าดีกว่าค่ะ!"
51150-92 = "ตอนนี้คุณครูอยู่ตรงไหนเหรอคะ? !"
51150-94 = "(คุณครูมาถึงสถานที่ที่นัดเจอกับชิซุโกะ และในจังหวะที่กำลังอดทนอยู่กับฝูงชนที่รายล้อมอยู่นั้น...)"
51150-99 = "อ๊ะ คุณครู!!"
51150-100 = "อยู่ตรงนี้เองเหรอคะ กว่าจะหาตัวเจอ...!"
51150-101 = "คนมาเที่ยวงานกันเยอะมากเลย การฝ่าฝูงชนมาที่นี่ก็ไม่น่าใช่เรื่องง่ายเลยนะคะ"
51150-102 = "[s5] \"ชิซุโกะ จะอธิบายเรื่องอะไรกับครูเหรอ?\"\n[s6] \"เห็นว่าเจอยูคาริแล้วไม่ใช่เหรอ? แล้วทำไมถึงอยู่คนเดียว...\""
51150-105 = "ค่ะ ฉันเจอยูคาริแล้วจริงๆ ค่ะ แต่ว่ามันมีเรื่องนิดหน่อย..."
51150-106 = "อ่า พอดีว่า... อืม... จะเริ่มเล่าจากตรงไหนดีนะ..."
51150-107 = "...จะให้อธิบายทั้งหมด เรื่องมันก็จะยาวน่ะค่ะ"
51150-109 = "คะ? จะเป็นมิโกะ... เหรอคะ?"
51150-115 = "เจ้าค่ะ"
51150-116 = "ไม่ได้ๆๆ ไม่ได้ค่ะ! จะตัดสินใจเพราะอารมณ์ชั่ววูบไม่ได้นะคะ...!"
51150-117 = "อ่า ถ้าเป็นเพราะเรื่องที่ฉันพูดละก็... นั่นเป็นสิ่งที่ฉันพูดออกไปก่อนจะรู้สถานการณ์ของ#nเฮียกกะเรียวรัน... และของยูคาริเท่านั้นเองค่ะ"
51150-118 = "คุณบอกว่าต้องการมิโกะไม่ใช่เหรอเจ้าคะ...?"
51150-119 = "มะ... มันก็จริง...! <มิโกะจากตระกูลคาเดโนะโคจิ> เคยเป็นหัวใจของเทศกาลเมื่อ 20 ปีก่อน ฉันก็เลย#nคิดว่าเทศกาลครั้งนี้ก็ควรมีมิโกะเหมือนในอดีต"
51150-120 = "แต่ว่าจะให้ทำแบบนี้ไม่ได้...!"
51150-121 = "ถ้าเป็นอย่างนั้น ข้าไม่เป็นไรเจ้าค่ะ ข้าไม่ได้ตัดสินใจไปเพราะอารมณ์ชั่ววูบ"
51150-125 = "ข้าคิดแบบนี้มาตลอดเจ้าค่ะ"
51150-126 = "ถ้ากลับไปยังตอนนั้นไม่ได้... ถ้าทุกคนไม่ได้หวังอย่างนั้นกัน..."
51150-127 = "มันก็จะเป็นแค่ภาพลวงตาของข้าคนเดียว... ภาพลวงตาที่ไม่มีใครต้องการตั้งแต่แรกน่ะเจ้าค่ะ"
51150-128 = "...ถ้าเป็นอย่างนั้น ข้าก็จะ <ทำในสิ่งที่ต้องทำ> ตามที่เคยเป็นมาเจ้าค่ะ"
51150-129 = "เพราะมันคือ <หน้าที่ของคาเดโนะโคจิ>"
51150-131 = "ตะ... แต่ว่า...!"
51150-132 = "คุณชิซุโกะ ฝากบอกท่านอาจารย์แทนข้าได้ไหมเจ้าคะ... ฝากบอกว่าข้าขออภัย..."
51150-133 = "ขออภัยที่ข้าปกปิดบทบาทที่ข้าต้องทำ และเอาแต่โกหกท่านอาจารย์อย่างที่รุ่นพี่คิเคียวว่า..."
51150-134 = "ขออภัยที่สิ่งที่ข้าทำ... เป็นการทำเพื่อตัวเอง... และเป็นได้แค่การแสร้งทำเพื่อทำให้เฮียกกะเรียวรัน#nกลับมาเป็นดังเดิม..."
51150-135 = "สุดท้ายก็เท่ากับว่าข้าหลอกลวงท่านอาจารย์มาตั้งแต่แรกเลยเจ้าค่ะ"
51150-136 = "...คุณครูไม่ถือโทษหรอกค่ะ คุณครูเป็นคนอย่างนั้นอยู่แล้ว"
51150-137 = "เจ้าค่ะ... ท่านอาจารย์น่าจะเป็นแบบนั้น..."
51150-138 = "แต่นี่เป็นการตัดสินใจของข้า เป็นการเสียมารยาทที่มาทำตัวแบบนี้ ทั้งๆ ที่ก่อนหน้านี้ยังขอให้ช่วยใน#nศึกชิงตำแหน่งอยู่เลย"
51150-139 = "ลูกศิษย์ที่โง่เขลาคนนี้อยากจะหยุดทำตัวตามใจตัวเอง... และอยากจะกลับไปเป็นเหมือนเดิมก็เท่านั้น"
51150-144 = "และจากนี้ข้าไม่เป็นอะไรแล้ว... ได้โปรดบอกท่านอาจารย์ทีนะเจ้าคะ"
51150-150 = "ยูคาริรู้สึกเสียใจและบอกว่าตัวเองไม่มีหน้ามาเจอคุณครูค่ะ"
51150-151 = "[s] \"ก็เลยไปที่สถานที่จัดงานเทศกาลเพื่อทำหน้าที่มิโกะสินะ\""
51150-152 = "คุณครู..."
51150-153 = "นี่เป็นเพราะฉันหรือเปล่าคะ?"
51150-154 = "เพราะฉันไปหายูคาริ เธอก็เลยตัดสินใจแบบนั้นไปเพราะอารมณ์ชั่ววูบหรือเปล่าคะ...?"
51150-155 = "ไม่สิ ถ้ามาคิดให้ดีตั้งแต่แรกแล้ว..."
51150-156 = "ที่เรื่องมันเป็นแบบนี้... เพราะฉันตั้งใจจะเอาเทศกาลนี้กลับมาอีกครั้งหรือเปล่าคะ?"
51150-157 = "[s] \"ไม่หรอก นั่นไม่ใช่ความผิดของชิซุโกะหรอกนะ\""
51150-159 = "[ns7] \"ต่อให้สาเหตุมันมาจากงานเทศกาลก็เถอะ...\"\n[ns8] \"ชิซุโกะไม่ได้มีเจตนาร้ายไม่ใช่เหรอ?\""
51150-162 = "[ns9] \"ตรงกันข้าม ชิซุโกะเข้ามาช่วยเพราะมีความรับผิดชอบด้วยซ้ำ\"\n[ns10] \"ทุกคนต่างก็รู้สึกขอบคุณอยู่นะ\""
51150-167 = "มะ... ไม่หรอกค่ะ! ฉันต้องมีความรับผิดชอบในฐานะหัวหน้าชมรมเทศกาลอยู่แล้วค่ะ!"
51150-168 = "[s] \"...ดีแล้วละ ถ้างั้นครูฝากเรื่องยูคาริกับชิซุโกะก่อนนะ\""
51150-169 = "คะ? แล้วคุณครูล่ะคะ?"
51150-170 = "อยากฟังเรื่องของเฮียกกะเรียวรัน... อีกหน่อยงั้นเหรอคะ?"
51150-171 = "[s] \"เป้าหมายครูไม่ใช่สังเกตการณ์ <ศึกชิงตำแหน่งของเฮียกกะเรียวรัน> หรอก\""
51150-174 = "[ns11] \"ถ้าทุกคนในเฮียกกะเรียวรันมีปัญหาหรือเรื่องกังวลใจละก็...\"\n[ns12] \"ครูอยากจะช่วยรับฟังน่ะ\""
51150-177 = "[ns] \"ชิซุโกะเองก็พูดไว้ไม่ใช่เหรอ?\""
51150-179 = "ใช่ค่ะ ฉันเคยบอกไว้ว่า..."
51150-180 = "อยากให้เป็นเทศกาลที่ทำให้ทุกคนยิ้มได้..."
51150-181 = "[s] \"อื้ม การทำให้เป็นแบบนั้นได้คือสิ่งที่ครู <ต้องทำ> อยู่แล้ว\""
51150-182 = "คุณครู..."
51150-183 = "[ns] \"นอกจากนี้ ครูยังมี... เรื่องคาใจนิดหน่อยน่ะ\""
51150-189 = "[ns13] \"ที่คิเคียว เรนเกะ และยูคาริมีความคิดสวนทางกัน\"\n[ns14] \"สาเหตุที่สำคัญของเรื่องนี้มีเพียงอย่างเดียว\""
51150-193 = "หมายถึงคนที่ชื่อ... นางุสะ... ใช่ไหมคะ?"
51150-194 = "คนที่บอกว่าเลือกที่จะคืนสิทธิ์ของหัวหน้า แทนที่จะกลับมาในฐานะรองหัวหน้าเฮียกกะเรียวรัน"
51150-195 = "[s] \"อื้ม ครูเลยอยากจะไปหานางุสะก่อน\""
51150-196 = "อืม... ค่ะ เข้าใจแล้วค่ะ"
51150-197 = "ถ้าคุณครูพูดแบบนี้ ฉันก็จะดูแลเรื่องยูคาริให้เองค่ะ"
51150-198 = "ก็ฉันคือคาวาวะ ชิซุโกะ ผู้ที่ทำงานที่ได้รับมอบหมายอย่างสมบูรณ์แบบนี่คะ!"
51150-199 = "ในเมื่อเป็นอย่างนี้แล้ว... ฉันจะปั้นยูคาริให้เป็นมิโกะที่ยอดเยี่ยมเลยค่ะ!"
51150-200 = "ตอนถ่ายทอดสดงานเทศกาลให้ทุกคนชม... ทุกคนจะได้เห็นความสมบูรณ์แบบอย่างไร้ที่ติเลยละ!"
51150-201 = "[s] \"ครูฝากด้วยนะ ชิซุโกะ\""
51150-205 = "[ns] \"ปัญหาตอนนี้คือนางุสะอยู่ที่ไหน และจะไปตามหายังไง\""
51150-210 = "[ns] \"อ่า... จะว่าไปแล้ว...\""
51150-220 = "ติดต่อพวกข้าน้อยมา... เรื่องตามหานางุสะที่เป็นรองหัวหน้าเฮียกกะเรียวรันเหรอ?"
51150-221 = "[s] \"ครูคิดว่าน่าจะวานทั้งสามคนที่เคยเจอนางุสะได้น่ะ\""
51150-222 = "อืม ถ้าจะถามหานักเรียนมากความสามารถที่จะตามหานางุสะท่ามกลางเทศกาลที่เต็มไปด้วยฝูงชน#nตามที่ท่านอาจารย์ว่าแล้วละก็! จะเป็นใครไปได้... นอกจากพวกเราชมรมวิจัยศาสตร์นินจา~!"
51150-224 = "ได้ค่ะ! พะ... เพราะพวกเราก็ได้จะ... เจอกับนางุสะจริงๆ..."
51150-225 = "เราได้งานที่เหมาะเหม็งเลยค่ะ! หัวหน้า! ท่านสึคุโยะ!"
51150-227 = "ว่าแต่... ทำไมจู่ๆ ถึงจะตามหานางุสะขึ้นมาล่ะ?"
51150-228 = "[s15] \"พอดีว่ามีคนที่ครูอยากช่วยน่ะ...\"\n[s16] \"ลำพังครูแค่คนเดียวคงไม่ไหว...\""
51150-231 = "[ns17] \"ครูเลยอยากขอความช่วยเหลือจากชมรมวิจัยศาสตร์นินจาด้วย\"\n[ns18] \"...พอจะช่วยครูได้หรือเปล่า?\""
51150-234 = "ทำเพื่อช่วยนักเรียนคนอื่นงั้นเหรอ สมกับเป็นท่านอาจารย์เลยนะ!"
51150-235 = "ถ้าอย่างนั้นพวกเราก็ต้องช่วยอีกแรงสิ!"
51150-236 = "ใช่มั้ย? สึคุโยะ อิซุนะ!"
51150-239 = "ค่ะ!"
51150-241 = "พวกเราชมรมวิจัยศาสตร์นินจา! ขอรับภารกิจจากท่านอาจารย์!!"
51150-242 = "เอาละ สมาชิกทุกคนของชมรมวิจัยศาสตร์นินจา...!"
51150-243 = "อะ... ออกปฏิบัติการ...!"
51150-244 = "เริ่มกันเลยค่ะ! นินนิน!"
51150-246 = "ตอนต่อไป;โกเรียว นางุสะ"

[translation]
51150-1 = "第15話;相遇"
51150-3 = "[ns]「……你是誰……？」"
51150-4 = "啊哈！那個表情。"
51150-5 = "就像是在說「完全不知道突然見到的人是誰」呢。"
51150-6 = "自從聽說你的事之後……我的腦海中就不斷浮現你現在的表情。"
51150-7 = "……真是可愛到不行。#n嗯～我真是太～喜歡了。"
51150-8 = "親自來見只在傳聞中聽過的你……果然是對的。"
51150-9 = "[s] （傳聞………？）"
51150-10 = "嗯～你是不是～覺得我很可疑呢～？"
51150-11 = "沒錯，你的態度就和傳聞中一模一樣。"
51150-12 = "所以，老師。"
51150-13 = "夏萊的老師。"
51150-14 = "……你收到信了嗎？"
51150-15 = "[s]「你所謂的信是……」"
51150-19 = "「你們都聽好了」"
51150-20 = "「我們的風流尚未結束。風情應由眾人一同品味」"
51150-21 = "「歡樂的時光到來，所有人望向綻放天際的花朵時」"
51150-22 = "「我們花鳥風月部，將再次前去拜訪」"
51150-23 = "[s]「等等，我記得那是花鳥風月部寄的……」"
51150-24 = "並且好好期待吧。"
51150-25 = "當我們來到你們面前時……"
51150-29 = "[log=???][ff4444]「就讓『百鬼夜行』陷入火海吧。」[-][/log]"
51150-32 = "[ns] 「…………！？」"
51150-35 = "哎呀～？哎呀哎呀哎呀？#n從你驚訝的表情看來……"
51150-36 = "那個女人果然沒告訴你啊。"
51150-37 = "或許是覺得不必把希望告訴你的最後一句話傳達給你吧。"
51150-38 = "──真是愚蠢。"
51150-39 = "[s]「你就是花鳥風月部的……寄信人……？」"
51150-40 = "沒錯～沒錯。正是如此。"
51150-41 = "覺得如何？你的疑問解開了嗎～？"
51150-42 = "不，這怎麼可能呢，啊哈哈！"
51150-43 = "看你依然一頭霧水的樣子。"
51150-44 = "是啊，那是當然的。#n因為你向我提出的那個問題……"
51150-45 = "就像故事的本質一樣，是無論如何也無法解開的愚蠢問題。"
51150-46 = "那麼那麼～我已經回答了你的問題對吧？#n按照順序，這次輪到我發問了。"
51150-47 = "既然是老師……自然不能無視學生的問題吧？"
51150-52 = "夏萊的老師──"
51150-53 = "──你喜歡貓嗎？"
51150-54 = "[s]「……我不明白這個問題的意思。」"
51150-55 = "啊哈哈，怎麼說這種話呢。"
51150-56 = "不過這也是當然的。#n這場對話從來沒有任何意義。"
51150-57 = "讓我們進入正題吧──#n我前來找你只有一個原因。"
51150-59 = "接下來的故事……"
51150-60 = "將是講述風情的[ruby=怪談]「百物語」[/ruby]。"
51150-62 = "歷經20年的歲月再度到來的今天，演員終於全～部齊聚一堂。"
51150-63 = "所以，希望你把這個故事聽到最後。"
51150-64 = "並且和我一起，為故事劃下句點。"
51150-70 = "[ns]「等，等等……！」"
51150-74 = "[ns1]「……他所謂的『怪談』是什麼意思呢？」\n[ns2]「剛才那孩子的聲音，感覺好像在哪裡聽過……」"
51150-81 = "啊，老師！？你沒事吧？"
51150-82 = "從剛才就一直不接電話……我擔心是不是發生了什麼事……！"
51150-83 = "[s3]「啊，我沒事……只是經歷了一些神奇的事。」\n[s4]「感覺就像沉醉在……慶典的熱烈氣氛裡一樣。」"
51150-86 = "咦……？"
51150-87 = "啊，對了！我找到紫同學了！"
51150-88 = "[s]「真的嗎！？」"
51150-89 = "但問題是……"
51150-90 = "不，該說是問題嗎……感覺又好像不是……"
51150-91 = "唔嗯，果然還是需要直接見面說明一下！"
51150-92 = "老師！你現在在哪裡！？"
51150-94 = "（於是來到了和靜子約好碰面的地方，就在一如既往被捲入蜂擁而至的人潮時……）"
51150-99 = "啊，老師！！"
51150-100 = "你在這裡啊，總算找到你了……！"
51150-101 = "因為人潮太多，光是來到這裡就費了我好大的力氣。#n唔唔……"
51150-102 = "[s5]「靜子，你想當面說明的是什麼事？」\n[s6]「還有……你不是說和紫見面了嗎？為什麼只有你一個人來……」"
51150-105 = "沒錯，我確實和紫同學碰面了。#n只是發生了一些事情……"
51150-106 = "啊，是這樣的……#n嗯……該從哪裡說起呢……"
51150-107 = "……說來話長。"
51150-109 = "什麼？你說要擔任巫女……？"
51150-115 = "是的。"
51150-116 = "不不不，不行啦！#n不可以在氣頭上做決定……！"
51150-117 = "啊，如果是被我說的話影響……#n那是在我知道百花繚亂的……紫同學的情況之前才會那麼說的。"
51150-118 = "……你不是說需要巫女嗎？"
51150-119 = "當，當然這麼說也沒錯……！#n因為20年前「勘解由小路的巫女」就是慶典的重心……#n我才會認為這次巫女的存在非常重要……"
51150-120 = "可，可是用這種方式實在……！"
51150-121 = "這點請不必擔心。#n小女子並不是在氣頭上做決定。"
51150-125 = "……我也一直在思考這件事。"
51150-126 = "如果無法回到那個時候……如果大家都不這麼希望的話……"
51150-127 = "那麼打從一開始，那就只是我一個人的幻想。"
51150-128 = "……既然如此，小女子就該回去做「該做的事」。"
51150-129 = "因為那是「勘解由小路的義務」。"
51150-131 = "可，可是……！"
51150-132 = "靜子同學，我希望……你能替我轉達對老師的歉意。"
51150-133 = "桔梗前輩說的沒錯……#n我從一開始就隱瞞了應該扮演的角色，對老師說了謊。"
51150-134 = "我終究只是為了自己……才扮演讓百花繚亂恢復原貌的角色……"
51150-135 = "從結果來看，我從一開始就欺騙了老師。"
51150-136 = "……我認為老師不會責怪你的。#n因為他就是那樣的人。"
51150-137 = "是啊……老師他想必……"
51150-138 = "但這畢竟是我所做的決定。#n開口要求進行繼承戰的是我，結果卻演變成這樣，實在很沒禮貌。"
51150-139 = "「愚蠢的我將停止任性……回到我應該回去的地方」──"
51150-144 = "「已經沒關係了」……還請替我向老師轉達。"
51150-150 = "紫同學直到最後都說他很抱歉，實在沒臉出現在老師面前。"
51150-151 = "[s]「原來他是為了扮演巫女才先去慶典會場……」"
51150-152 = "老師……"
51150-153 = "這難道……是我造成的嗎？"
51150-154 = "因為我的關係，紫同學才會一氣之下才做出那種決定……？"
51150-155 = "不，從根本上來說……"
51150-156 = "是因為我想重現慶典……才會變成這樣嗎？"
51150-157 = "[s]「不，那不是靜子的錯。」"
51150-159 = "[ns7]「就算慶典成為了契機……」\n[ns8]「靜子也並非心懷惡意吧？」"
51150-162 = "[ns9]「靜子能意識到責任感趕來……」\n[ns10]「我反而覺得很感謝呢。」"
51150-167 = "別，別這麼說！#n我只是感受到身為節慶營運管理部部長的責任而已……！"
51150-168 = "[s]「……好，那紫的事就先交給靜子你囉。」"
51150-169 = "咦？那老師呢？"
51150-170 = "你想再聽一些……有關百花繚亂的事？"
51150-171 = "[s]「我的目的從一開始就不是見證『百花繚亂的繼承戰』。」"
51150-174 = "[ns11]「如果百花繚亂的大家都有問題和煩惱……」\n[ns12]「我希望能聽他們傾訴。」"
51150-177 = "[ns]「靜子不是也說過嗎？」"
51150-179 = "想打造能讓更多人露出笑容的……"
51150-180 = "……那種慶典對吧。"
51150-181 = "[s]「嗯，為了這件事努力──就是老師『該做的事』。」"
51150-182 = "老師……"
51150-183 = "[ns]「除此之外，有件事……也讓我有點不放心。」"
51150-189 = "[ns13]「追根究柢，造成桔梗、蓮華還有紫……」\n[ns14]「這三人漸行漸遠的決定性原因果然只有一個。」"
51150-193 = "老師指的是……名草同學對吧？"
51150-194 = "身為百花繚亂的副委員長卻沒有留下，而是選擇歸還資格象徵的那位同學。"
51150-195 = "[s]「嗯，所以最重要的是先見到名草。」"
51150-196 = "……嗯，我知道了。"
51150-197 = "既然老師都這麼說了，紫同學的事就交給我吧。"
51150-198 = "我河和靜子一定會完美達成收到的委託！"
51150-199 = "既然如此……我要把紫同學打造成完美的巫女！"
51150-200 = "讓他在慶典中亮相時……完美到讓任何人都無話可說！"
51150-201 = "[s]「拜託你囉，靜子。」"
51150-205 = "[ns]「現在的問題是該去哪裡、如何找到名草……」"
51150-210 = "[ns]「啊……這麼說來……」"
51150-220 = "要我們去找百花繚亂的副委員長……名草？"
51150-221 = "[s]「我想說你們三個見過名草，應該能拜託你們。」"
51150-222 = "嗯，正如老師大人所說，在這因為慶典而滿是人潮的現場……#n有本事找到名草的，就只有我們忍術研究部了～！確實是事實沒錯。"
51150-224 = "是！我，我們確實見過名草同學……"
51150-225 = "所以很適合執行這項任務！部長！月夜閣下！"
51150-227 = "可是……為什麼突然要找名草呢？"
51150-228 = "[s15]「我有想幫助的人。」\n[s16]「但是只靠我一個人是不夠的。」"
51150-231 = "[ns17]「所以才希望得到忍術研究部的幫忙。」\n[ns18]「……可以嗎？」"
51150-234 = "居然是為了幫助其他學生……真像老師大人的作風！"
51150-235 = "那我們就更必須幫忙了！"
51150-236 = "你們說對吧？月夜，伊樹菜！"
51150-239 = "是！"
51150-241 = "我們忍術研究部！#n將會認真受理老師大人的委託！！"
51150-242 = "所以現在起，忍術研究部全員……！"
51150-243 = "參，參戰……！"
51150-244 = "任務開始！忍忍！"
51150-246 = "下一話;御稜名草"

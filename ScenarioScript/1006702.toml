[translation]
1006702-1 = "理由之後再說"
1006702-4 = "[ns]「原來如此……我大概瞭解情況了。」"
1006702-5 = "非常感謝您的理解，老師。"
1006702-6 = "我飛鳥馬季，會全力守護老師的。"
1006702-7 = "[ns]「謝謝你。我雖然很相信季……」"
1006702-8 = "沒錯，這是重要的任務。#n必須要2人1組才能搭檔參加的祕密派對。"
1006702-9 = "因此，為了潛入位於豪華郵輪上的會場，老師的存在是必不可少的。"
1006702-10 = "如果您有任何疑問，還請您現在儘管提出。"
1006702-11 = "[ns]「能幫上季的忙我很高興……」"
1006702-14 = "[ns]「不過為什麼要打扮成那樣……？」"
1006702-17 = "那是個愚蠢的問題哦，老師。"
1006702-18 = "因為C&C執行潛入任務時的正式服裝就是兔女郎服。"
1006702-19 = "您問我是聽誰說的……？#n這對我們C&C來說應該是常識。"
1006702-20 = "的確，就算是老師您，若不是所屬於C&C，會不清楚這點也不奇怪。#n是我思慮不周，真是非常抱歉。"
1006702-21 = "[s]「這，這樣啊……謝謝你告訴我……」"
1006702-22 = "能消除老師的疑慮就再好不過了。"
1006702-23 = "那麼就登上郵輪吧。#n連一秒都不能浪費。"
1006702-24 = "[s3]「那個……能稍微考慮一下周圍的目光……」\n[s4]「或是社會大眾的看法之類的話……」"
1006702-27 = "那些是執行任務的必要事項嗎？"
1006702-28 = "考慮多餘的事會妨礙任務的哦？"
1006702-32 = "趕緊出發吧，沒有時間了。"
1006702-34 = "（與腳步比平時更加輕盈的季並肩向郵輪前進……）"
1006702-40 = "豪華郵輪"
1006702-48 = "順利到達派對會場了呢。"
1006702-49 = "請抓緊我的手腕。#n我會完美地護衛您的。"
1006702-50 = "周圍的視線都集中在我們身上呢……難道是被發現了嗎？"
1006702-51 = "……看來問題嚴重了。#n必須變更計畫才行。"
1006702-54 = "那個人居然讓搭檔穿成那樣……"
1006702-55 = "雖然個人的「喜好」輪不到他人說三道四，不過這實在是……"
1006702-56 = "居然在大庭廣眾之下打扮成那樣……"
1006702-57 = "真擔心奇普托斯的未來……"
1006702-60 = "[ns]「……我想應該是沒有被發現。」"
1006702-61 = "真的嗎……？"
1006702-62 = "[s]「不過我的社會地位卻……」"
1006702-63 = "既然如此，這不成問題。#n所謂社會地位本來就會根據對方的看法而有所不同。"
1006702-64 = "無論如何，那都並非現在應該考慮的事項。"
1006702-65 = "咦？希望我不只在物理層面，連精神層面也要保護……？"
1006702-66 = "您的意思是，要24小時在您身邊……老師說了一件困難的事呢。"
1006702-75 = "（被堂堂正正走著的季護衛著，繞了繞派對會場）"
1006702-76 = "（即便被投以好奇的眼光，季的表情依然始終如一……#n　但我的社會評價已經一落千丈……）"
1006702-78 = "！？#n老師，請您注意。"
1006702-79 = "就在那邊……目標現身了。"
1006702-87 = "原本只預計要監視手下的動靜……"
1006702-88 = "沒想到目標會親自現身……這對我來說也在意料之外。"
1006702-89 = "該依照計畫專注於偵查……#n還是不該放過這個好機會，直接解決事件呢……"
1006702-90 = "……"
1006702-91 = "老師。"
1006702-97 = "直到我來迎接您之前，請您先躲藏起來。"
1006702-98 = "請不要離開這裡。#n約好了哦。"
1006702-100 = "（說完，季的身影瞬間消失在賓客之中）"
1006702-101 = "（接著……）"
1006702-103 = "（咚哐──！！）"
1006702-106 = "怎，怎麼回事！？保全在做什麼！"
1006702-122 = "雖然引起了些許騷動，不過順利達成任務了。"
1006702-123 = "是因為表明了C&C身分的緣故嗎。"
1006702-127 = "話說回來，也許是我的錯覺……"
1006702-128 = "投向我們的視線是不是稍微增加了……"
1006702-129 = "這是為什麼呢，老師？"
1006702-130 = "[s]「畢竟你穿成這樣嘛……」"
1006702-131 = "是……嗎。"
1006702-132 = "……"
1006702-133 = "我的兔女郎裝扮，真的這麼不適合嗎……"
1006702-134 = "（季像隻害怕的兔子一般看了過來）"
1006702-135 = "（……決定對他說出真實的想法）"
1006702-136 = "[ns]「我反而覺得非常適合你哦。」"
1006702-137 = "既然適合的話……又是為什麼？"
1006702-138 = "……"
1006702-139 = "呼呣……我明白了。#n原來是這樣啊。"
1006702-140 = "[s]「你明白了什麼！？」"
1006702-141 = "因為實在太適合我了，所以才會引人注目對吧？"
1006702-146 = "您為何要沉默呢……？#n啊啊，是因為無從提問對吧？"
1006702-147 = "那是當然。#n因為我是完美且最棒的女僕，同時也是特務……蹦。"
1006702-152 = "那麼老師，我們走吧。  "
1006702-153 = "[s]「去哪裡……？」"
1006702-154 = "既然任務已經結束，就得趕快回去才行。"
1006702-155 = "莫非您想像的是別的事情嗎？"
1006702-156 = "如果不是就好。"
1006702-165 = "走吧。由我來負責護衛。"
1006702-167 = "（與露出得意表情的季挽著手臂回到了夏萊）"

1006702-18 = "3;토키 바니걸;05;바니걸 복장이야말로, C&C의 잠입 임무 정복이기 때문입니다!\n#3;closeup"
1006702-19 = "3;토키 바니걸;02;어디에서 그런 사실을 배웠냐고요? 저희 C&C에게는 지극히 당연한 상식이자, 기본입니다만.\n#3;em;[?]\n#3;closeup"
1006702-20 = "3;토키 바니걸;99;확실히, 일반인에 속하시는 선생님께는 익숙하지 않은 사실일지도 모르겠군요. 거기까지 고려하지 못한 것은 확실히 제 불찰입니다."
1006702-21 = "[s] \"아니…… 꼭 그런 건 아닌데 말이지……\""
1006702-22 = "3;토키 바니걸;02;그렇다면 더더욱 문제는 없겠군요. 다행입니다."
1006702-23 = "3;토키 바니걸;01;그러면, 빠르게 목표 크루즈로 이동하도록 하지요. 한시도 지체할 수 없는 사안입니다."
1006702-24 = "[s3] \"조금 더, 주위의 시선이라든가 사회적인 드레스 코드라든가……\"\n[s4] \"그런 걸 고려해 주지 않을래……?\""

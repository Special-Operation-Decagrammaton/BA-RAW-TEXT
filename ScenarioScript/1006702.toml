[translation]
1006702-1 = "สาเหตุของปัญหา"
1006702-4 = "[ns] \"เข้าใจแล้ว... ครูพอเข้าใจสถานการณ์แล้วละ โทคิ\""
1006702-5 = "ขอบคุณที่เข้าใจนะคะคุณครู"
1006702-6 = "ฉันจะเดิมพันด้วยทุกอย่างที่มี และจะปกป้องคุณครูจนถึงที่สุดค่ะ"
1006702-7 = "[ns] \"ขอบใจนะ ครูก็เชื่อใจโทคิอยู่หรอก แต่ว่า...\""
1006702-8 = "คุณครู อย่างที่ฉันบอกไปค่ะว่านี่คือหน้าที่"
1006702-9 = "ปาร์ตี้ลับบนเรือสำราญสุดหรูที่เข้าไปได้แค่กลุ่มละ 2 คน"
1006702-10 = "ฉันก็เลยต้องการความช่วยเหลือจากคุณครูเพื่อแทรกซึมเข้าไปในปาร์ตี้แล้วตรวจดูความผิดปกติค่ะ"
1006702-11 = "[ns] \"ก็ได้ ถ้านั่นพอจะช่วยเหลือโทคิได้น่ะนะ...\""
1006702-14 = "[ns] \"ว่าแต่... ทำไมถึงแต่งตัวแบบนี้เหรอ...?\""
1006702-17 = "ถามแปลกๆ นะคะคุณครู"
1006702-18 = "ก็เพราะว่าชุดบันนี่เกิร์ลเป็นชุดทางการสำหรับภารกิจแฝงตัวของ C&C ไงล่ะคะ!"
1006702-19 = "ฉันไปรู้เรื่องนี้มาจากไหนงั้นเหรอคะ? มันเป็นเรื่องทั่วไปและเป็นเรื่องพื้นฐานที่สุดของชมรม C&C ของฉันนี่คะ"
1006702-20 = "จริงสิ สำหรับคนทั่วไปอย่างคุณครูแล้ว เรื่องนี้อาจจะเป็นสิ่งที่ไม่คุ้นเคยก็ได้นะคะ ฉันสะเพร่าเองค่ะ#nที่ไม่ได้คิดถึงเรื่องนั้น"
1006702-21 = "[s] \"เปล่าหรอก ไม่ใช่อย่างนั้นหรอก...\""
1006702-22 = "ถ้างั้นก็แปลว่าไม่มีปัญหาสินะคะ โล่งอกไปทีค่ะ"
1006702-23 = "ถ้างั้นเรารีบไปที่เรือสำราญนั้นกันเถอะค่ะ เราจะช้าแม้แต่วินาทีเดียวไม่ได้ค่ะ"
1006702-24 = "[s3] \"เราจะไม่คิดถึงสายตาของคนรอบข้างเลยเหรอ...\"\n[s4] \"ไม่คิดถึงเรื่องเดรสโค้ดของคนที่มาปาร์ตี้เลยเหรอ...?\""
1006702-27 = "นั่นเป็นเรื่องจำเป็นสำหรับการทำภารกิจเหรอคะ?"
1006702-28 = "ก็ไม่ได้จำเป็นงั้นเหรอคะ? งั้นก็ดีค่ะ งั้นฉันก็คงไม่ต้องคิดถึงมันสินะคะ"
1006702-32 = "รีบไปเถอะค่ะ เราไม่มีเวลาแล้วค่ะ"
1006702-34 = "(จากนั้นคุณครูกับโทคิที่ตื่นเต้นจนสังเกตได้ก็มุ่งหน้าไปยังเรือสำราญที่เป็นเป้าหมายของภารกิจ...)"
1006702-40 = "เรือสำราญสุดหรู"
1006702-48 = "เรามาถึงที่จัดปาร์ตี้กันแล้วสินะคะ"
1006702-49 = "อย่าอยู่ห่างจากฉันนะคะคุณครู ฉันจะคุ้มกันคุณครูอย่างดีเลยค่ะ"
1006702-50 = "หืม? รู้สึกเหมือนคนที่นี่กำลังจับจ้องมาที่พวกเราเลยค่ะ หรือว่าจะรู้จุดประสงค์ของพวกเรากันแล้วคะ...?"
1006702-51 = "เห็นทีฉันต้องพิจารณาปฏิบัติการนี้ใหม่ตั้งแต่พื้นฐานแล้วละค่ะ... แบบนี้เรื่องใหญ่เลยนะคะเนี่ย"
1006702-54 = "ตายจริง... ดูตรงนั้นสิคะ ให้คู่ควงแต่งตัวแบบนั้น แล้วก็พามาปาร์ตี้เนี่ยนะ..."
1006702-55 = "ฉันเองก็ไม่อยากจะยุ่งกับรสนิยมส่วนตัวของใครหรอกนะคะ แต่ว่านี่มัน..."
1006702-56 = "นั่นน่ะสิคะ ชุดบันนี่เกิร์ลแบบนั้นน่ะ... ควรเอาไปใส่ในพื้นที่ส่วนตัวหรือในที่ลับไม่ใช่เหรอคะ?"
1006702-57 = "เทรนด์รสนิยมในคิโวทอสไปเร็วขึ้นทุกวัน ฉันตามไม่ทันเลยจริงๆ..."
1006702-60 = "[ns] \"แต่อย่างน้อยก็ยังไม่มีใครจับได้เนอะ...\""
1006702-61 = "จริงเหรอคะ? มั่นใจได้ใช่มั้ยคะคุณครู?"
1006702-62 = "[s] \"แต่หน้าตาทางสังคมของครู... ครูว่ามันแทบไม่เหลือแล้วละ...\""
1006702-63 = "ไม่เป็นไรค่ะคุณครู ของแบบนั้นมันเพิ่มขึ้นและลดลงได้ตามสถานการณ์ค่ะ"
1006702-64 = "และตอนนี้มันไม่ใช่สิ่งที่เราต้องคำนึงถึงหรอกค่ะ อย่างน้อยก็สำหรับฉันน่ะค่ะ"
1006702-65 = "ขอบใจที่ช่วยปกป้องทางร่างกาย แต่ถ้าช่วยปกป้องทางด้านจิตใจด้วยก็จะดีงั้นเหรอคะ?"
1006702-66 = "พูดอะไรไม่เห็นเข้าใจเลยค่ะ แต่ก็นะ คุณครูก็ชอบพูดอะไรแบบนี้อยู่แล้วนี่คะ"
1006702-75 = "(โทคิควงแขนคุณครูอย่างมั่นใจ แล้วเดินไปทั่วงานปาร์ตี้)"
1006702-76 = "(ถึงเธอจะดูเหมือนไม่แคร์สายตาใคร่รู้ที่ถาโถมเข้ามา... แต่สำหรับคุณครู เรียกได้ว่ามาถึง#nขีดจำกัดแล้ว...)"
1006702-78 = "?! คุณครู ระวังค่ะ"
1006702-79 = "เกิดเรื่องอะไรงั้นเหรอคะ? ก็ตรงนั้นไงคะ... เป้าหมายโผล่ออกมาแล้วค่ะ"
1006702-87 = "เดิมทีภารกิจนี้คือการสอดแนมว่าผู้ติดตามของเป้าหมายจะเปิดเผยตัวหรือเปล่าค่ะ"
1006702-88 = "แต่ไม่คิดเลยว่าตัวเป้าหมายจะโผล่ออกมาเองแบบนี้... คาดไม่ถึงเลยค่ะ"
1006702-89 = "เราแค่ต้องทำภารกิจสอดแนมตามปฏิบัติการเดิมหรือเปล่าคะ? หรือว่าเราไม่ควรพลาดโอกาสนี้แล้วตัด#nไฟเสียแต่ต้นลมเลยดีคะ?"
1006702-90 = "......"
1006702-91 = "คุณครู"
1006702-97 = "หลังจากนี้ จนกว่าฉันจะบอกว่าให้ออกมาได้ คุณครูห้ามเปิดเผยตัวเป็นอันขาดนะคะ"
1006702-98 = "ห้ามเด็ดขาดเลยค่ะ สัญญากับฉันสิคะ"
1006702-100 = "(โทคิพูดจบก็รีบแฝงตัวเข้าไปในฝูงชน)"
1006702-101 = "(และ...)"
1006702-103 = "ตู้มมมมม!!!!"
1006702-106 = "อะ... อะไรเนี่ย?! ยาม! เรียกยามมาเดี๋ยวนี้!"
1006702-122 = "ถึงจะข้ามขั้นตอนไปหน่อย แต่ภารกิจนี้ก็สำเร็จลุล่วงไปด้วยดีค่ะ"
1006702-123 = "ตอนที่โดนจับได้ว่าพวกเราเป็น C&C สถานการณ์ก็ผ่านไปได้โดยไม่มีการเข้าใจผิดอะไรมากมายค่ะ"
1006702-127 = "ไม่รู้ว่าฉันคิดไปเองคนเดียวหรือเปล่านะคะ"
1006702-128 = "แต่เหมือนจะมีคนซุบซิบเรื่องของเรากันมากขึ้นเลยค่ะ"
1006702-129 = "เป็นเพราะอะไรเหรอคะคุณครู?"
1006702-130 = "[s] \"ครูว่าคงหนีไม่พ้นเรื่องชุดที่เธอใส่มาน่ะ...\""
1006702-131 = "อย่างงั้น... เหรอคะ?"
1006702-132 = "......"
1006702-133 = "ชุดของฉันมันไม่เหมาะกับฉันเหรอคะ...?"
1006702-134 = "(โทคิส่งสายตาเหมือนกระต่ายที่กำลังกลัวไปยังคุณครู)"
1006702-135 = "(คุณครูตัดสินใจพูดความรู้สึกอย่างตรงไปตรงมา)"
1006702-136 = "[ns] \"ที่เป็นปัญหาก็เพราะมันเหมาะกับโทคิมากไปต่างหาก\""
1006702-137 = "คะ? ชุดนี้เข้ากับฉันมากเกินไป ก็เลยเกิดปัญหางั้นเหรอคะ?"
1006702-138 = "......"
1006702-139 = "เข้าใจแล้วค่ะ เป็นอย่างนี้นี่เอง"
1006702-140 = "[s] \"ครูไม่รู้ว่าเข้าใจอะไรยังไง แบบนี้มันน่ากลัวนะเนี่ย?!\""
1006702-141 = "ก็ง่ายๆ ค่ะ คุณครูกำลังบอกว่าชุดนี้เข้ากับฉันมาก คนรอบข้างก็เลยอิจฉา ใช่มั้ยล่ะคะ?"
1006702-146 = "ทำไมถึงเงียบไปล่ะคะ? อ้อ เห็นด้วยกับคำพูดฉันจนไม่รู้จะพูดอะไรเสริมเลยใช่มั้ยคะ?"
1006702-147 = "ของมันก็แน่อยู่แล้วค่ะ ก็ฉันเป็นทั้งเมดผู้สมบูรณ์แบบและสุดยอดสายลับนี่คะ ดึ๋งๆ"
1006702-152 = "ถ้าอย่างงั้นเราไปกันดีมั้ยคะคุณครู?  "
1006702-153 = "[s] \"ไปไหนเหรอ...?\""
1006702-154 = "ภารกิจเราเสร็จแล้ว เราก็ต้องกลับกันสิคะ"
1006702-155 = "หรือว่าคุณครูคิดว่าฉันจะชวนไปไหนต่อคะ?"
1006702-156 = "ไม่ได้คิดอย่างนั้นหรอกเหรอคะ? งั้นก็โล่งอกไปทีค่ะ"
1006702-165 = "ไปกันเถอะค่ะ ฉันจะคุ้มกันคุณครูเองค่ะ"
1006702-167 = "(โทคิทำหน้ามั่นใจและควงแขนคุณครูกลับมาชาเล่ต์)"

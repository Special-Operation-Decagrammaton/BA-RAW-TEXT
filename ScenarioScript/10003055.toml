[translation]
10003055-2 = "ฮุฮุฮุ ถ้าคุณครูอยู่ที่นี่ด้วยแบบนี้ คงจะยุ่งยากสักนิดนะคะ"
10003055-5 = "ทุกคนคะ! ถอนกำลังก่อนค่ะ!"
10003055-7 = "นี่ ชินัตสึ... เราควรตามพวกนั้นไปมั้ย?!"
10003055-8 = "ไม่ต้องหรอกค่ะ ถ้าเกิดเรื่องวุ่นวายขึ้นที่นี่ ท่านประธานอาจจะสังเกตเห็นเข้าได้นะคะ..."
10003055-9 = "[s1] \"แต่ก็โชคดีแล้วล่ะที่ไม่เกิดเรื่องวุ่นวายขึ้น...\"\n[s2] \"ข้าวโพดของชมรมชิมอาหารจะอร่อยแค่ไหนนะ?\""
10003055-10 = "น่าเสียดายที่ทำให้พวกชมรมชิมอาหารสำนึกผิดไม่ได้... ฮึ่ม ช่วยไม่ได้นะ"
10003055-11 = "คุณครูก็ด้วยเหรอคะ... เฮ้อ..."
10003055-12 = "ทุกคนคะ ฉันกลับมาแล้วค่ะ! หืม...?"
10003055-13 = "ทำไมทุกคนถึงทำหน้าแบบนั้นกันล่ะคะ?"
10003055-15 = "อย่างนี้นี่เอง... แม้แต่ชมรมชิมอาหารก็ด้วยเหรอเนี่ย... เกิดเรื่องแบบนี้ขึ้นด้วยสินะคะ#nข้าวโพดงั้นเหรอ? ฉันไม่เห็นเข้าใจเลยสักนิด "
10003055-16 = "ช่างเถอะค่ะ เอาเป็นว่าตอนนี้กำหนดการที่เหลืออยู่ก็แค่การฝึกวิ่งค่ะ"
10003055-17 = "ทุกคนมาพยายามให้สุดๆ กันเถอะค่ะ! เพื่อวันหยุดพักผ่อนของประธาน!"
10003055-18 = "รู้แล้วๆ... เข้าใจแล้วน่า"
10003055-19 = "ค่ะ ถ้างั้นก็กลับกันเถอะค่ะ"
10003055-23 = "(หลังจากนั้นการฝึกวิ่งเพื่อให้ฮินะได้เดินเล่นริมทะเลก็เริ่มขึ้น แต่เนื่องจากทุกคนวิ่งมาเหนื่อยทั้งวันแล้ว#nการฝึกวิ่งจึงเป็นไปอย่างไม่ราบรื่นเท่าไหร่)"
10003055-24 = "(และแล้วในวันนี้พระอาทิตย์ก็ลาลับขอบฟ้าไป...)"

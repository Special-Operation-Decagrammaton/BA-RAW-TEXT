[translation]
10003055-2 = "I should have known we'd have a tough go of it with Sensei on your side."
10003055-5 = "Let's make a tactical retreat, everyone!"
10003055-7 = "Should we chase after them, Chinatsu?"
10003055-8 = "No. The president will notice if the fighting gets any more intense."
10003055-9 = "[s1] \"At least things didn't get too out of hand.\"\n[s2] \"That corn did look pretty good, though.\""
10003055-10 = "And we never would have to worry about them again if we could just lock them up and throw away the key."
10003055-11 = "*sigh* Sensei."
10003055-12 = "Sorry to keep you waiting. Huh?"
10003055-13 = "Why do you all look so exhausted?"
10003055-15 = "I see. So the Gourmet Research Society attacked. And what's this about corn? "
10003055-16 = "Regardless, we still have the scheduled training with the president coming up."
10003055-17 = "Please hang in there a little bit longer, everyone. Do it for Hina's sake."
10003055-18 = "Yeah, yeah. We know."
10003055-19 = "All right. Let's head back, then."
10003055-23 = "After that, it was time for Hina's stroll along the beach disguised as evening training. However, I was too exhausted from the day and barely kept up appearances."
10003055-24 = "At last, the day was over and night had come."

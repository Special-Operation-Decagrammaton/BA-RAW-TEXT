[translation]
10003055-2 = "呵呵呵……有老師在場，果然沒那麼容易呢。"
10003055-5 = "那麼各位！執行戰術性撤退！"
10003055-7 = "千夏，要追擊嗎！？"
10003055-8 = "不……事情再鬧大的話，委員長可能會注意到的。"
10003055-9 = "[s1]「總之沒引起大騷動真是太好了……」\n[s2]「美食研究會製作的玉米，感覺很好吃……」"
10003055-10 = "可惜沒能將美食研究會都關進反省室，不過這也沒辦法。"
10003055-11 = "怎麼連老師也……真是的……"
10003055-12 = "各位，讓你們久等了……哎呀？"
10003055-13 = "各位的表情看起來都很累呢，怎麼了嗎？"
10003055-15 = "原來如此，連美食研究會都出現了啊……#n雖然不清楚烤玉米是怎麼回事，不過……"
10003055-16 = "……接下來就只剩下委員長也會參加的步行訓練了。"
10003055-17 = "大家再努力一下！為了委員長的平靜暑假！"
10003055-18 = "是是……已經很清楚了……"
10003055-19 = "那麼，我們回去吧。"
10003055-23 = "（之後，實際目的是讓陽奈在海邊散步的步行訓練開始了。#n　然而除了陽奈以外的人都因為勞累了一整天，根本沒能好好訓練）"
10003055-24 = "（於是一天到了尾聲……）"

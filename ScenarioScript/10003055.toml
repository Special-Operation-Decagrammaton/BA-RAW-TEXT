[translation]
10003055-1 = "#wait;1000"
10003055-2 = "3;하루나;01;후후후. 역시 선생님이 계신 이상. 무리였나요.\n#3;a"
10003055-3 = "#st;[0,0];instant;1;"
10003055-4 = "#clearST\n3;하루나;99\n#3;em;…\n#wait;2500"
10003055-5 = "3;하루나;02;그럼 여러분! 작전상 후퇴입니다!\n#3;em;[반짝]\n#3;greeting\n#3;closeup"
10003055-6 = "#all;hide"
10003055-7 = "4;이오리 수영복ND;05;치나츠, 쫓을까?!\n#4;ar\n#4;em;[반응]"
10003055-8 = "1;치나츠;06;아뇨……. 여기서 일이 커졌다간 괜히 부장님이 눈치를 챌 수도 있으니까요.\n#1;ar\n#4;m5"
10003055-9 = "[s1] \"그래도 큰 소동으로 이어지지 않아서 다행이야…….\"\n[s2] \"……미식연구회의 옥수수, 맛있을까?\""
10003055-10 = "4;이오리 수영복ND;08;미식연구회 녀석들을 반성실에 처박지 못하는 건 아쉽지만, 으으음. 어쩔 수 없네.\n#4;stiff\n#4;em;[빠직]"
10003055-11 = "1;치나츠;06;……선생님도 참. 하아…….\n#1;em;[속상함]\n#1;stiff"
10003055-12 = "3;통신아코;02;제가 돌아왔습니다. 여러분! 응……?\n#3;a"
10003055-13 = "3;통신아코;04;다들, 왜 그렇게 지친 표정인가요?\n#3;em;[땀]"
10003055-14 = "#all;hide"
10003055-15 = "3;통신아코;02;과연, 미식연구회까지……. 그런 일이 있었단 말이죠……. 옥수수? 영문을 모르겠지만, 어쨌든. \n#3;a\n#3;em;…"
10003055-16 = "3;통신아코;01;……이제 남은 일정은 부장님이 참가하시는 구보 훈련뿐입니다."
10003055-17 = "3;통신아코;03;모두들, 조금만 더 힘내도록 하죠! 부장님의 안온한 휴가를 위해서!\n#3;em;[반짝]\n#3;greeting"
10003055-18 = "3;이오리 수영복ND;06;그래그래……. 알았다구.\n#3;em;[속상함]\n#3;stiff"
10003055-19 = "3;치나츠;07;네, 그럼 돌아가도록 하죠.\n#3;em;[음표]"
10003055-20 = "#st;[0,0];instant;1;"
10003055-21 = "#wait;200"
10003055-22 = "#all;hide"
10003055-23 = "#na;(이후 히나와 해변가 산책을 위한 구보 훈련이 시작되었지만, 당연하게도 하루 종일 뛰어다니느라 지친 덕분에 제대로 훈련이 이루어지진 못했다.)"
10003055-24 = "#na;(그렇게 하루가 저물었다.)"
10003055-25 = "#continued"

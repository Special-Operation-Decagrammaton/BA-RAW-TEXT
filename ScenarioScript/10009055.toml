[translation]
10009055-3 = "……就差一點，就差一點了。"
10009055-4 = "請等著我。再一下就能由我親手……"
10009055-8 = "……！"
10009055-13 = "到此為止了。"
10009055-14 = "你是當時在老師身邊的……"
10009055-15 = "雖然不知道你為何盯上了老師……"
10009055-16 = "但是危險就應該在萌芽前摘除。"
10009055-17 = "……呵呵呵，是嗎。"
10009055-18 = "別做無謂的抵抗，現在立刻──"
10009055-22 = "找到了，不會再讓你逃走了！災厄之狐！"
10009055-27 = "到此為止了，若藻！"
10009055-28 = "這次一定……一定不會再讓你逃走了！？"
10009055-29 = "再讓你逃走的話，會影響到成績的……！"
10009055-31 = "請，請你，請你乖乖投降！"
10009055-35 = "唉……我已經累了……"
10009055-37 = "我想應該已經將軍了吧？"
10009055-38 = "……是嗎，無所謂。"
10009055-39 = "呵呵呵……反正，這次是最後了。"
10009055-40 = "……？"
10009055-44 = "馬上……"
10009055-51 = "別，別想逃！"
10009055-52 = "快抓住他！"
10009055-62 = "……如此這般，順利逮捕他真是太好了！"
10009055-63 = "這次好像抵抗得比之前更激烈了呢……"
10009055-64 = "……相當令人在意呢，他最後所說的話。"
10009055-65 = "[s]「瀬奈？」"
10009055-66 = "……不，可能是我想太多了。"
10009055-67 = "話說回來，這已經是第五次逃脫了啊……"
10009055-68 = "難道說，女武神警察學園……"
10009055-70 = "各方面都不太行呢。尤其是安全意識實在太低了。"
10009055-71 = "[s]「千尋！」"
10009055-72 = "嗨，老師。我剛好結束這附近的安全系統檢查。"
10009055-73 = "沒想到這麼快又見面了呢。雖然似乎發生了很多事……"
10009055-74 = "總之，附近一代的安全系統沒什麼問題。#n貝里塔斯的大家已經仔細檢查，並做出相應的微調了。"
10009055-75 = "但最大的問題是……#n負責治安維持這個重要工作的女武神，其安全意識實在低的嚇人。"
10009055-76 = "貴校真的沒問題嗎？"
10009055-77 = "[s]「從至今為止的事情看來似乎沒說錯呢……」"
10009055-79 = "好，好像無法反駁……！"
10009055-80 = "但，但是你們想想！"
10009055-81 = "就，就是啊！我們又重新抓住他了！"
10009055-82 = "而且收到目前狀況的警備局長，也說要使出終極對策了！"
10009055-83 = "[s]「終極對策？」"
10009055-84 = "嗯。因為若藻一而再再而三的逃獄，警備局長氣得臉色發青。"
10009055-85 = "所以似乎已經承認我們的力量不足，#n正在考慮和其他學校的治安維持組織聯手採取行動哦。"
10009055-86 = "正好，該說是有經驗的人嗎。#n聯繫上了之前「災厄之狐」同學逃獄時，和老師一起進行應對的各位。"
10009055-87 = "[s]「啊，難道說……」"
10009055-94 = "正是如此。讓你久等了，老師。"
10009055-95 = "居然偏偏在情人節出來搗亂……"
10009055-96 = "大家難得能這麼開心，不能讓他來搞破壞。"
10009055-98 = "雖然和「災厄之狐」交戰的經驗不多，希望能幫得上忙。#n於是便從風紀委員會前來協助了。"
10009055-99 = "那麼……請多指教，千夏同學。"
10009055-100 = "是，畢竟是難得的活動啊。"
10009055-101 = "真是久違了呢，這個組合……"
10009055-102 = "總之我們也會幫忙的，請放心吧。"
10009055-103 = "[s]「大家，謝謝你們！」"
10009055-105 = "請多多指教！"
10009055-106 = "此外，女武神這邊的警戒規模也擴大了，就連一隻老鼠也不會放過唷！"
10009055-107 = "所以說，這次一定要相信我們唷？"
10009055-109 = "……以防萬一，我也一起去吧。"
10009055-110 = "放任不管的話我也放心不下。"
10009055-111 = "[s]「是千尋和優香的組合！」"
10009055-112 = "咦，啊，貝里塔斯的……？"
10009055-113 = "是，是呢。有那個貝里塔斯副部長的幫忙，真是安心多了……"
10009055-114 = "真難得，居然能聽到研討會的阿諛奉承。是因為在老師面前嗎？"
10009055-115 = "算了，我就當成稀有物品感激地收下吧。"
10009055-116 = "啊，啊哈哈……！"
10009055-120 = "那麼就出發吧？"
10009055-121 = "我先走了，老師。"
10009055-122 = "[s]「嗯，小心點哦。」"
10009055-128 = "既然聚集了這麼多人，看來可以放心了呢。"
10009055-129 = "那麼，就努力巡邏到最後吧，老師。"
10009055-130 = "[s]「……嗯，也對。」"

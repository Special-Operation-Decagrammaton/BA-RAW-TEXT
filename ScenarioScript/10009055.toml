[translation]
10009055-3 = "สิ่งที่หลงเหลือ... มีเพียงแค่ร่องรอย..."
10009055-4 = "อ๊ะ รอด้วยสิคะ อีกแค่นิดเดียว ฉันก็จะเอื้อมไปถึงคุณ..."
10009055-8 = "...!!"
10009055-13 = "หยุดอยู่แค่นั้นจะดีกว่านะคะ"
10009055-14 = "คุณคือคนที่อยู่กับคุณครูในตอนนั้น..."
10009055-15 = "ฉันไม่รู้ว่าคุณมีเป้าหมายอะไร แต่ตอนนี้คุณครูอยู่ในสถานที่ที่ปลอดภัยแล้วค่ะ"
10009055-16 = "และฉันจะขอจัดการต้นตอแห่งหายนะอย่างคุณ... ก่อนที่จะเกิดสถานการณ์ฉุกเฉินใดๆ ขึ้นค่ะ"
10009055-17 = "ฮุฮุฮุ อย่างนั้นเหรอคะ คุณพูดอย่างนั้นเหรอคะ"
10009055-18 = "คิดจะต่อต้านไปก็เปล่าประโยชน์ค่ะ ตอนนี้-"
10009055-22 = "อยู่นี่เอง! ไม่ยอมให้หนีไปหรอก! ยัยจิ้งจอกแห่งความพินาศ!"
10009055-27 = "แฮ่กๆ หนีได้แค่นี้ล่ะ"
10009055-28 = "วาคาโมะ! พวกเราจะไม่ยอมให้ดิ้นหลุดไปได้จริงๆ แล้วล่ะ!"
10009055-29 = "ถ้าปล่อยให้เกิดเรื่องร้ายแรงที่นี่ เกรดของฉันก็จะสุ่มเสี่ยงไปด้วย...!"
10009055-31 = "ยะ...ยะ...ยะ...ยะ... ยอมจำนนแต่โดยดีเถอะค่ะ!"
10009055-35 = "เฮ้อ... นะ...เหนื่อยจริงๆ..."
10009055-37 = "รุกฆาตแล้วนะคะ"
10009055-38 = "ถ้างั้นก็ดีเลยค่ะ..."
10009055-39 = "ฮุฮุฮุ อีกแค่เพียงก้าวเดียวเท่านั้น"
10009055-40 = "...?"
10009055-44 = "อีกเพียงแค่นิดเดียว..."
10009055-51 = "คะ...คิดจะหนีงั้นเหรอ!"
10009055-52 = "จะ...จับไว้!"
10009055-62 = "ยังไม่สายเกินที่จะจับกุมตัวหรอก!"
10009055-63 = "ดูเหมือนว่าคราวนี้จะขัดขืนมากกว่าเดิมเลยนะคะ..."
10009055-64 = "แต่ว่าคำพูดที่เธอพูดไว้ตอนท้าย..."
10009055-65 = "[s] \"เซนะ?\""
10009055-66 = "เปล่าค่ะ ไม่มีอะไรหรอกค่ะ"
10009055-67 = "ยิ่งไปกว่านั้น... จนถึงตอนนี้เธอหลบหนีมาได้ห้าครั้งแล้ว พูดแบบนี้อาจถือว่าเป็นการดูถูก แต่ว่า..."
10009055-68 = "ความสามารถของผู้รักษาความปลอดภัยของสถาบันฝึกตำรวจวัลคิรี่..."
10009055-70 = "ใช่แล้วล่ะ ต่ำกว่ามาตรฐานอย่างเห็นได้ชัดเลย ความตระหนักเรื่องความปลอดภัยก็ต่ำเตี้ยเรี่ยดินด้วย"
10009055-71 = "[s] \"จิฮิโระ!\""
10009055-72 = "ว่าไงคุณครู ฉันเพิ่งตรวจสอบระบบรักษาความปลอดภัยของงานเทศกาลเสร็จก็เลยมาน่ะ"
10009055-73 = "ได้เจอกันอีกครั้งเร็วกว่าที่คิดไว้เลยนะ นึกไม่ถึงเลยว่าระหว่างที่ฉันไม่อยู่ สถานการณ์จะกลายเป็นแบบนี้ ..."
10009055-74 = "ก่อนอื่น พวกเราสรุปได้ว่าระบบความปลอดภัยของสถานที่จัดงานไม่มีปัญหาอะไร..."
10009055-75 = "แต่สิ่งที่เป็นปัญหาที่สุดก็คงจะเป็นโรงเรียนวัลคิรี่ที่รับผิดชอบดูแลเรื่องความปลอดภัยในครั้งนี้นี่ล่ะ"
10009055-76 = "ปล่อยให้เป็นแบบนี้ไปจะดีเหรอ?"
10009055-77 = "[s] \"มันน่าเจ็บปวดจริงๆ เพราะทุกคำที่พูดมาคือเรื่องจริง!\""
10009055-79 = "เฮอะ! เถียงไม่ออกเลย!"
10009055-80 = "แต่คราวนี้น่ะ ไม่เป็นแบบนั้นหรอก!"
10009055-81 = "ใช่แล้วค่ะ! คะ...คราวนี้จะไม่เหมือนครั้งก่อนๆ แน่นอนค่ะ!"
10009055-82 = "หัวหน้าฝ่ายรักษาความปลอดภัยบอกว่าจะเริ่มใช้มาตรการพิเศษนับจากสถานการณ์ความวุ่นวาย#nที่เกิดขึ้นเมื่อกี้เป็นต้นไปค่ะ!"
10009055-83 = "[s] \"มาตรการพิเศษงั้นเหรอ?\""
10009055-84 = "อืม เรื่องนั้นน่ะ... เพราะวาคาโมะหลบหนีจากห้องคุมขังออกมาได้ซ้ำๆ ทำให้หัวหน้าฝ่ายรักษา#nความปลอดภัยเสียหน้ายับเยิน"
10009055-85 = "และยอมรับว่าลำพังพวกเราอาจจัดการปัญหานี้ไม่ได้ เลยคิดจะวางแผนร่วมกับองค์กรรักษา#nความปลอดภัยของโรงเรียนอื่นน่ะ"
10009055-86 = "เพราะงั้นเลยติดต่อไปหาคนที่ดำเนินการร่วมกับคุณครู ตอนที่จิ้งจอกแห่งความพินาศหลบหนี#nออกมาคราวก่อนน่ะค่ะ"
10009055-87 = "[s] \"อา หมายความว่า...\""
10009055-94 = "ค่ะ เราเลยรีบมาทันทีที่รู้ข่าวค่ะ คุณครู "
10009055-95 = "จิ้งจอกแห่งความพินาศก่อความวุ่นวายขึ้นในวันเทศกาลที่มีคนพลุกพล่านแบบนี้งั้นเหรอ..."
10009055-96 = "เรื่องที่จะทำลายเทศกาลที่ทุกคนได้สนุกสนานร่วมกันแบบนี้น่ะ ยกโทษให้ไม่ได้เด็ดขาดค่ะ"
10009055-98 = "ถึงฉันจะมีประสบการณ์การปะทะกับจิ้งจอกแห่งความพินาศไม่มากเท่าไร แต่ถ้าฉันพอจะทำ#nประโยชน์ได้บ้าง ทางคณะกรรมการวินัยก็พร้อมให้ความร่วมมือค่ะ คุณครู"
10009055-99 = "ก็ดูเหมือนจะเป็นอย่างนั้นนะคะ คุณชินัตสึ"
10009055-100 = "ค่ะ เพื่อทำให้งานเทศกาลดำเนินต่อไปได้"
10009055-101 = "เอาล่ะๆ นานมากเลยนะที่ไม่ได้มารวมตัวกันสี่คนแบบนี้น่ะ..."
10009055-102 = "พวกเราจะร่วมมือด้วยเอง เพราะงั้นคุณครูวางใจได้เลยค่ะ"
10009055-103 = "[s] \"อื้อ ขอบคุณทุกคนมากนะ\""
10009055-105 = "ค่ะ!"
10009055-106 = "กลุ่มรักษาความปลอดภัยมีขนาดใหญ่ขึ้นแบบนี้... พวกเราจะต้องจับจิ้งจอกแห่งความพินาศ#nได้แน่นอนค่ะ"
10009055-107 = "ไว้ใจพวกเราได้เลย!"
10009055-109 = "ขอบอกเอาไว้ก่อนนะ... ฉันก็จะร่วมมือกับพวกเธอเพื่อการตรวจสอบความปลอดภัยด้วย"
10009055-110 = "เพราะขืนปล่อยเอาไว้มันจะยิ่งน่าเป็นห่วงน่ะ"
10009055-111 = "[s] \"ถ้าจิฮิโระร่วมมือด้วย ยูกะก็จะยิ่งวางใจมากขึ้นนะ!\""
10009055-112 = "คะ? อา ร่วมมือกับรองหัวหน้าของเวอริทัสเหรอคะ?"
10009055-113 = "ค่ะ ถ้าทำตามที่คุณครูบอกละก็ คงจะยิ่งน่าเชื่อถือมากขึ้น..."
10009055-114 = "พออยู่ต่อหน้าคุณครูก็ได้ยินการพูดเอาใจแบบนี้จากนักบัญชีของเซมิน่า... เป็นภาพที่ไม่เลวเลยทีเดียว"
10009055-115 = "ดีล่ะ ฉันตกลง"
10009055-116 = "อ่ะฮะฮะฮะ... (หนอย)"
10009055-120 = "งั้นเราไปกันเลยมั้ย?"
10009055-121 = "เดี๋ยวฉันกลับมานะ คุณครู"
10009055-122 = "[s] \"ขอฝากทุกคนด้วยนะ\""
10009055-128 = "ถ้าทุกคนช่วยกันเคลื่อนไหวแบบนี้ ฉันก็วางใจขึ้นแล้วค่ะ"
10009055-129 = "ถ้างั้นพวกเราก็ไปลาดตระเวนต่อเถอะค่ะ คุณครู"
10009055-130 = "[s] \"อืม... เป็นแบบนั้นจริงๆ ด้วย\""

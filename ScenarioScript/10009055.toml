[translation]
10009055-3 = "Just a little more. Almost there..."
10009055-4 = "Please, wait for me. Soon... With my own hands, I'll..."
10009055-8 = "...!"
10009055-13 = "That's enough."
10009055-14 = "You're the one who was accompanying Sensei..."
10009055-15 = "Why you're targeting Sensei eludes me, but rest assured they've been taken somewhere safe."
10009055-16 = "I'm going to deal with this problem here and now, to prevent a real emergency in the future."
10009055-17 = "Will you now? I'd like to see you try."
10009055-18 = "Resistance is futile. Just—"
10009055-22 = "There she is! You won't escape this time, Fox of Calamity!"
10009055-27 = "*pant* There's nowhere left to run."
10009055-28 = "Prepare to be arrested, Wakamo!"
10009055-29 = "Our grades are toast if we let you run away again!"
10009055-31 = "P-Put your hands up!"
10009055-35 = "*sigh* I'm exhausted..."
10009055-37 = "I believe this is checkmate."
10009055-38 = "So it is..."
10009055-39 = "...for me. Heeheehee."
10009055-40 = "...?"
10009055-44 = "Just a little more."
10009055-51 = "Sh-She's running away!"
10009055-52 = "C-Catch her!"
10009055-62 = "Good thing we were able to stop her before it was too late."
10009055-63 = "She seemed to be even more resistant this time."
10009055-64 = "Yes, which makes me think about what she said before."
10009055-65 = "[s] \"What do you mean?\""
10009055-66 = "Sorry. It's nothing."
10009055-67 = "That aside, this makes it the fifth time she's escaped custody."
10009055-68 = "I can't help but begin to question whether Valkyrie Police School is incompetent."
10009055-70 = "That doesn't even begin to describe it. They don't know the first thing about security."
10009055-71 = "[s] \"Chihiro!\""
10009055-72 = "Hello, Sensei. I just finished my inspection of all of the festival's security systems."
10009055-73 = "I didn't expect we'd meet again so soon—primarily because I underestimated how bad things were going to get."
10009055-74 = "Veritas has concluded there are no problems with the security protocols of the festival vendors themselves..."
10009055-75 = "...however, Valkyrie and its inability to maintain public order, is another matter entirely."
10009055-76 = "Just what has been going on here?"
10009055-77 = "[s] \"You don't even know how right you are.\""
10009055-79 = "W-Well, yeah, she...makes some good points."
10009055-80 = "But, still...!"
10009055-81 = "We have a perfect track record when it comes to catching her at the very least!"
10009055-82 = "Also, the captain says special measures are going to be taken in light of the latest incident!"
10009055-83 = "[s] \"What kind of special measures?\""
10009055-84 = "Well, the captain isn't happy with how many times Wakamo has escaped by now either."
10009055-85 = "She's willing to admit we can't handle this on our own, so we're going to ask for help from the forces of other schools."
10009055-86 = "Supposedly, we're bringing in some big guns that helped stop the Fox of Calamity the first time she escaped from jail."
10009055-87 = "[s] \"Huh. Wouldn't that mean...?\""
10009055-94 = "Exactly. That's why we've been contacted, Sensei. "
10009055-95 = "To think the Fox of Calamity would choose Valentine's Day of all times to go on a rampage."
10009055-96 = "We can't allow her to continue disturbing the peace on such an important day."
10009055-98 = "I don't have much experience with the Fox of Calamity beyond that one incident. Nevertheless, I'm here to lend my aid on behalf of the Prefect Team."
10009055-99 = "No need to be so modest, Chinatsu."
10009055-100 = "Not at all. Let's do our best to protect the festival."
10009055-101 = "It's been a while since the four of us were together like this."
10009055-102 = "But, anyway. Say the word and we'll bail you out this time."
10009055-103 = "[s] \"Got it. Thanks, everyone.\""
10009055-105 = "Right!"
10009055-106 = "Valkyrie is pitching in more security as well, so there's no chance the Fox of Calamity gets away this time!"
10009055-107 = "We've got this in the bag!"
10009055-109 = "And I'll go with them to check on their security protocols."
10009055-110 = "Just to be sure."
10009055-111 = "[s] \"You and Yuuka will make for quite the team!\""
10009055-112 = "What was that...? Oh, the Veritas vice president."
10009055-113 = "S-Sure. I suppose it's reassuring to know you're here..."
10009055-114 = "Flattery coming from Seminar's treasurer? Are you always this meek around Sensei?"
10009055-115 = "Still, I welcome the support."
10009055-116 = "H-Hahaha...#n(Grrrrrr!)"
10009055-120 = "Shall we be off?"
10009055-121 = "We'll be back, Sensei."
10009055-122 = "[s] \"All right. Let's finish this.\""
10009055-128 = "There shouldn't be anything to worry about with this many numbers on our side."
10009055-129 = "I say we finish our patrol. How about it, Sensei?"
10009055-130 = "[s] \"Yeah... Sure.\""

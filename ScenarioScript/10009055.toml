10009055-67 = "1;세나;99;그보다……. 이때까지 전부 포함해 다섯 번째 탈출이라니, 외람된 말씀입니다만.\n#1;em;…"
10009055-68 = "1;세나;01;혹시 발키리 경찰학교의 경비 능력은 생각보다-"
10009055-69 = "#all;hide"
10009055-70 = "3;치히로;02;응, 단언컨대 명백하게 기준 미달이야. 보안 의식이 낮아도 너무 낮아.\n#3;em;[반응]\n#3;a"
10009055-71 = "[s] \"치히로!\""
10009055-72 = "3;치히로;01;안녕, 선생님. 지금 막 축제 현장 전반의 보안 시큐리티 점검을 끝내고 오는 길이야."
10009055-73 = "3;치히로;99;생각보다 재회가 빨라졌네. 설마 내가 자리를 비운 사이에 상황이 이렇게까지 몰릴지, 전혀 예상하지 못했지만…….\n#3;em;…"
10009055-74 = "3;치히로;01;일단 축제 현장의 보안은 이슈가 없다……라는 것이 우리 베리타스의 결론이지만."
10009055-75 = "3;치히로;02;막상 가장 문제가 되는 곳이 이번 치안 유지의 핵심 담당인 발키리 학교 쪽이었을 줄이야."
10009055-76 = "3;치히로;05;거기 정말 괜찮은 거야?\n#3;em;[빠직]"
10009055-77 = "[s] \"신랄해! 말 한마디 한마디가 정론이라 아파!\""
10009055-78 = "#all;hide"
10009055-79 = "3;후부키;09;으악! 반론할 말이 없어!\n#3;em;[?!]\n#3;shake"
10009055-80 = "3;후부키;06;그, 그래도 말이지!"
10009055-81 = "5;키리노;04;네! 이, 이젠 진짜 다르니까요!\n#5;hophop\n#5;al\n#3;m1"
10009055-82 = "5;키리노;05;방금 사태를 기점으로 경비국장님도 특단의 대책을 내린다고 하셨고!\n#5;em;[!]"
10009055-83 = "[s] \"특단의 대책이라니?\""
10009055-84 = "3;후부키;04;으음, 그게. 와카모가 계속해서 탈옥을 반복하니까. 경비국장의 얼굴도 완전히 새파래졌거든.\n#3;em;[속상함]\n#3;stiff"
10009055-85 = "3;후부키;05;이대로 우리만으로는 역부족이란 걸 인정하고, 다른 학교의 치안 조직과 연계 작전을 생각하고 있는 모양이야."
10009055-86 = "5;키리노;00;마침 그렇지 않아도 이전에 재액의 여우가 탈옥했을 때, 선생님과 함께 대응에 나서 주셨던 분들과 연락이 닿았어요.\n#5;greeting\n#5;em;[반짝]"

[translation]
2001702-1 = "少女依然想閱讀"
2001702-2 = "（向日和打聽他現在在哪裡後，馬上趕到了現場）"
2001702-4 = "某個治安死角"
2001702-5 = "（日和不知為何倒吊在電線桿上）"
2001702-6 = "[s]「日和？」"
2001702-7 = "嗚，嗚啊……！？"
2001702-10 = "好，好痛……"
2001702-11 = "老，老師怎麼會來這裡！？"
2001702-12 = "對，對了……老師有問我現在在哪裡嘛。"
2001702-13 = "雖，雖然我有告訴老師沒錯……#n但，但這裡明明是聯邦學生會也不一定知道的治安死角，沒想到老師竟然找的到……"
2001702-14 = "[s]「是有點難找，但也還好。」"
2001702-15 = "原，原來如此……大人好厲害……"
2001702-16 = "[s]「話說日和剛才在做什麼？」"
2001702-17 = "我剛剛爬上電線桿……"
2001702-18 = "是為了……幫手機充電……耶嘿嘿。"
2001702-19 = "[s]「充電……？」"
2001702-20 = "是的……因為我們沒有家也沒有學園可去，只能到處流浪……"
2001702-21 = "落腳的廢棄房屋又被斷水斷電……"
2001702-22 = "要幫手機充電就只能找地方偷偷充……其實比想像中還辛苦呢……"
2001702-23 = "例如我們之前在24小時速食店充手機，被店員發現之後罵了一頓，#n於是就想說改成一次充好幾個行動電源，結果這次直接被趕出店裡……"
2001702-24 = "明明又不是在店裡開槍……都市人真冷淡呢，耶嘿嘿……"
2001702-25 = "[s]「……」"
2001702-26 = "然後我在昨天在雜誌上看到「電線桿的供電箱裡有插座」，所以就來確認一下……"
2001702-27 = "[s1]「那會造成很多人的困擾，不能那樣做唷。」\n[s2]「更重要的是很危險……」"
2001702-28 = "耶嘿嘿……反正這地區的電也是從附近的大都市偷來的……借用一下也無所謂吧……"
2001702-29 = "耶嘿嘿……反正這地區的電也是從附近的大都市偷來的……借用一下也無所謂吧……"
2001702-30 = "[s]「原來是這樣嗎！？不過還是不行！」"
2001702-31 = "咦，為，為什麼？"
2001702-32 = "我只是從贓物裡面取一小點出來呀。在黑色的地方塗上黑色也還是黑色呀！"
2001702-33 = "既然人生下來就是要受苦的，那怎麼連給手機充電也不被允許呢？"
2001702-34 = "我好痛苦，真的好痛苦……#n連網路小說都不能自由閱讀，我的人生到底有什麼活下去的意義……"
2001702-35 = "老師你看這支沒電的手機。一片漆黑……就像是我的人生……"
2001702-36 = "老師有遇到過，小說看到一半電池沒電的狀況嗎……？"
2001702-37 = "我已經遇過這種狀況好幾次了。昨天也是，今天也是……"
2001702-38 = "要傳MomoTalk給老師的時候，我都還得到處找有免費Wi-Fi的地方呢！"
2001702-39 = "[s]「你，你先冷靜點，日和……」"
2001702-40 = "我的人生……怎麼會變這樣。已經沒救了……嗚哇啊啊啊啊啊啊！"
2001702-41 = "我也想看網路小說啊！我想把亮度調到最亮看得清清楚楚啊！"
2001702-42 = "[s] （嗯……看來只能這麼做了……）"
2001702-44 = "3個一次性行動電源。感謝您的惠顧。"
2001702-46 = "……"
2001702-47 = "[s]「不嫌棄的話，拿去當應急品吧。」"
2001702-48 = "那個……所，所以……"
2001702-49 = "我真的能收下嗎……那個……隊長交代我們不要欠別人人情……"
2001702-50 = "隊，隊長說就算對方說沒關係……但人的善意背後一定別有居心……"
2001702-51 = "老師這是想要……"
2001702-52 = "[s]「那你就答應我，不要再爬上電線杆了……如何？」"
2001702-53 = "我知道了……"
2001702-54 = "我會記住的……"

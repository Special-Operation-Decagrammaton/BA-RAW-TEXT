[translation]
2001702-1 = "ถึงยังไงก็อยากอ่านต่อ"
2001702-2 = "(หลังจากคุณครูได้พิกัดที่อยู่ปัจจุบันมาจากฮิโยริก็รีบไปหาทันที)"
2001702-4 = "เขตปลอดกฎหมายแห่งหนึ่ง"
2001702-5 = "(ฮิโยริห้อยตัวอยู่บนเสาไฟฟ้าต้นหนึ่ง)"
2001702-6 = "[s] \"สวัสดี ฮิโยริ\""
2001702-7 = "อือ... อ๊ะ....?!"
2001702-10 = "อะ...อ๊าย..."
2001702-11 = "ทะ...ทำไมคุณครูมาอยู่ที่นี่ได้คะ?!"
2001702-12 = "นะ...นั่นสินะคะ... เมื่อกี้คุณครูถามนี่นาว่าฉันอยู่ที่ไหน"
2001702-13 = "ฉันตอบไปก็จริง... ตะ...แต่ที่นี่เป็นเขตปลอดกฎหมายที่องค์การนักเรียนเองก็ยังไม่รู้จัก การหาทางมาที่นี่น่าจะลำบากมากแท้ๆ..."
2001702-14 = "[s] \"ไม่ใช่เรื่องยากอะไรขนาดนั้นหรอก\""
2001702-15 = "งะ...งั้นเหรอคะ ผู้ใหญ่นี่สุดยอดเลยนะคะ"
2001702-16 = "[s] \"ว่าแต่ว่าทำอะไรอยู่เหรอ?\""
2001702-17 = "เอ่อ... ทำไมฉันถึงปืนเสาไฟฟ้านี่น่ะเหรอคะ... คือว่า..."
2001702-18 = "แหะๆๆ... ฉันอยากจะชาร์จแบตมือถือน่ะค่ะ..."
2001702-19 = "[s] \"ชาร์จแบตเหรอ...?\""
2001702-20 = "ค่ะ ตอนนี้เราไม่มีที่อยู่ แล้วก็ไม่มีโรงเรียนให้กลับไป..."
2001702-21 = "ตึกร้างที่ใช้อาศัยอยู่ตอนนี้ก็ไม่มีทั้งน้ำประปาแล้วก็ไฟฟ้า..."
2001702-22 = "ถ้าอยากจะชาร์จแบตมือถือก็ต้องแอบๆ เอามาชาร์จในเมืองค่ะ... แต่ว่ามันก็ยุ่งยากนิดหน่อยค่ะ"
2001702-23 = "ตอนที่แอบไปชาร์จที่ร้านฟาสฟู้ดที่เปิด 24 ชั่วโมงก็เคยถูกจับได้แล้วก็โดนดุด้วย หรือไม่ก็ถูกไล่ออกมา เพราะถูกจับได้ว่าแอบชาร์จแบตมือถือทีละห้าเครื่อง..."
2001702-24 = "ทั้งๆ ที่ฉันก็ไม่ได้ไปกราดยิงใครสักหน่อย... คนในเมืองนี่ไม่มีน้ำใจกันเลยนะคะ แหะๆๆ..."
2001702-25 = "[s] \"...\""
2001702-26 = "แต่ว่าเมื่อวานฉันอ่านเจอในนิตยสารว่า <ในกล่องรับส่งกระแสไฟบนเสาไฟฟ้ามีเต้าเสียบปลั๊กไฟอยู่!> น่ะค่ะ เพราะงั้นก็เลยอยากจะมาตรวจสอบดู..."
2001702-27 = "[s1] \"ทำแบบนั้นไม่ได้นะ มันอาจจะทำให้ทุกคนลำบาก\"\n[s2] \"ทำแบบนั้นไม่ได้นะ มันอันตราย\""
2001702-28 = "แหะๆๆ... แต่ว่าที่เขตนี้เองก็แอบต่อไฟจากเขตใหญ่ที่อยู่ข้างๆ มาใช้เหมือนกัน...  ไหนๆ ก็เป็นแบบนั้น#nแล้ว ฉันก็ขอแอบไปใช้ด้วยอีกคนก็คงไม่เป็นอะไร..."
2001702-29 = "แหะๆๆ... แต่ว่าที่เขตนี้เองก็แอบต่อไฟจากเขตใหญ่ที่อยู่ข้างๆ มาใช้เหมือนกัน...  ไหนๆ ก็เป็นแบบนั้น#nแล้ว ฉันก็ขอแอบไปใช้ด้วยอีกคนก็คงไม่เป็นอะไร..."
2001702-30 = "[s] \"แบบนั้นหรอกเรอะ?! เดี๋ยวสิ แบบนั้นก็ไม่ได้นะ!\""
2001702-31 = "คะ...? ทะ... ทำไมล่ะคะ?"
2001702-32 = "แค่ขโมยของที่ถูกขโมยมาอีกทีก็เท่านั้นเองนะคะ ถึงจะถมสีดำลงไปในสีเดิมที่เป็นอยู่แล้ว มันก็ไม่ได้จะเปลี่ยนเป็นสีอื่นสักหน่อยนี่คะ!"
2001702-33 = "ยังไงชีวิตเราก็เกิดมาเพื่อพบกับความเจ็บปวดอยู่แล้ว... แค่จะแอบชาร์จไฟมือถือนิดเดียว จะเป็นบาปใหญ่โตเลยเหรอคะ?"
2001702-34 = "เจ็บปวดจริงๆ น่าเจ็บปวดจริงๆ เลยค่ะ... แค่อยากจะอ่านเว็บตูนต่ออีกสักหน่อยยังทำไม่ได้เลย#nแล้วฉันจะมีชีวิตอยู่ไปเพื่ออะไรกันคะ..."
2001702-35 = "ดูมือถือที่แบตหมดจนเปิดไม่ติดแล้วเครื่องนี้สิคะ... หน้าจอที่ดับสนิทเปิดยังไงก็เปิดไม่ติดแล้ว... เหมือนอนาคตที่มืดมนของฉันเลยว่ามั้ยคะ?"
2001702-36 = "คุณครูคงไม่เคยมีประสบการณ์อ่านเว็บตูนอยู่แล้วแบตหมดคามือใช่มั้ยล่ะคะ? ก็คุณครูเป็นผู้ใหญ่นี่เนอะ..."
2001702-37 = "แต่ว่าฉันเคยนะคะ หลายครั้งจนนับไม่ถ้วนเลยค่ะ! ทั้งเมื่อวาน และก็วันนี้ด้วยค่ะ"
2001702-38 = "ตอนที่ส่งข้อความ MOMOTALK ไปหาคุณครูก็เหมือนกันค่ะ ฉันต้องวิ่งไปวิ่งมาในเขตฟรี Wi-Fi เพื่อหาสัญญาณอยู่นานเลยนะคะ!"
2001702-39 = "[s] \"ใจเย็นๆ ก่อนนะ ฮิโยริ!\""
2001702-40 = "ทำไมชีวิตฉันถึงกลายเป็นแบบนี้ไปได้คะ? ชีวิตที่ยุ่งเหยิงสุดๆ แย่จริงๆ... ชีวิตฉันไม่มีอะไรดีเลยค่ะ! มุแงงงง--!!"
2001702-41 = "ฉันแค่อยากอ่านเว็บตูนเองนะคะ-!! แล้วก็อยากปรับค่าความสว่างสูงสุดไม่ให้ปวดตาเวลาอ่านด้วยค่ะ!"
2001702-42 = "[s] (มะ...ไม่ได้การแล้ว คงต้องใช้วิธีนี้เท่านั้น...!)"
2001702-44 = "นี่ครับ แบตเตอรี่ แบตสำรองชาร์จได้ 1 ครั้ง จำนวน 3 เครื่องครับ ขอบคุณที่มาอุดหนุนนะครับ"
2001702-46 = "..."
2001702-47 = "[s] \"ถึงมันจะชาร์จได้แค่รอบเดียว แต่เอาไว้ใช้ตอนฉุกเฉินก็แล้วกันนะ\""
2001702-48 = "... เอ่อ คือว่า..."
2001702-49 = "ฉันรับไว้ได้เหรอคะ... คือว่า... ฉันได้รับคำสั่งจากหัวหน้าว่าอย่าไปรบกวนคนอื่นน่ะค่ะ..."
2001702-50 = "มะ...ไม่เป็นไรงั้นเหรอคะ? แต่ว่า... ความหวังดีของคนอื่นที่หยิบยื่นมาให้มักจะต้องมีอะไรแลกเปลี่ยน#nเสมอๆ..."
2001702-51 = "คุณครูมีอะไรที่ต้องการจากฉันรึเปล่า..."
2001702-52 = "[s] \"อืม... ไม่อยากให้ฮิโยริปีนเสาไฟฟ้าอีกละมั้ง...?\""
2001702-53 = "ค่ะ..."
2001702-54 = "ฉันจะจำไว้ให้ขึ้นใจค่ะ... ได้ค่ะ..."

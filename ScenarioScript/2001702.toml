[translation]
2001702-1 = "#title;소녀는 그래도 읽고 싶다"
2001702-2 = "#na;(히요리에게 지금 있는 곳의 정보를 듣고 그곳으로 향했다.)"
2001702-3 = "#all;hide"
2001702-4 = "#place;미등록된 무법지구의 어딘가"
2001702-5 = "#na;(히요리가 전봇대에 매달려 있었다.)"
2001702-6 = "[s] \"안녕, 히요리.\""
2001702-7 = "#na;히요리;으, 으아……?!"
2001702-8 = "#wait;1000"
2001702-9 = "#bgshake\n#wait;1500"
2001702-10 = "3;히요리;06;아, 아야…….\n#3;a\n#3;em;[속상함]\n#3;stiff"
2001702-11 = "3;히요리;10;서, 선생님이 어째서 여기에?!"
2001702-12 = "3;히요리;03;그, 그러네요……. 지금 어디있냐고 선생님이 물어보셨죠.\n#3;em;…"
2001702-13 = "3;히요리;03;제가 대답을 하긴 했지만…… 여, 여기는 총학생회도 모르는 무법지구라서 찾아내기 힘들 거라고 했는데……."
2001702-14 = "[s] \"딱히 어려운 일도 아닌걸.\""
2001702-15 = "3;히요리;10;그, 그렇군요…… 어른이란 대단해……\n#3;stiff"
2001702-16 = "[s] \"그런데 뭐 하고 있었던 거야?\""
2001702-17 = "3;히요리;03;아아. 전봇대에 왜 올라가 있었냐면…… 그러니까…….\n#3;em;[반응]"
2001702-18 = "3;히요리;03;헤헤……. 휴대폰을 충전하려고……"
2001702-19 = "[s] \"충전……?\""
2001702-20 = "3;히요리;03;네. 아무래도 집도 학원도 없이 떠도는 처지라…….\n#3;greeting"
2001702-21 = "3;히요리;03;지금 저희가 머물고 있는 폐건물에는 당연히 수도나 전기가 끊겨 있고……."
2001702-22 = "3;히요리;04;충전을 하려면 시내에 가서 몰래 충전을 할 수 밖에 없는데…… 의외로 그게 까다롭더라구요.\n#3;em;[속상함]"
2001702-23 = "3;히요리;04;24시간 패스트푸드 가게에서 몰래 충전하다가 들켜서 혼나거나, 휴대용 배터리를 5개째 충전하다가 들켜서 쫓겨나기도 하고……."
2001702-24 = "3;히요리;03;총을 쏠 것 까진 없는데…… 도시 사람들은 인심이 야박하네요. 헤헤헤…….\n#3;stiff"
2001702-25 = "[s] \"…….\""
2001702-26 = "3;히요리;03;그러다가 어제 읽은 잡지에서 <전신주의 송전 박스 안에는 콘센트가 있다!> 라는 이야기를 읽고는 진짜 그런가 해서 확인만 살짝……."
2001702-27 = "[s1] \"남에게 폐를 끼치게 되니까 그러면 안 돼.\"\n[s2] \"위험하기도 하고 그러면 안 돼.\""
2001702-28 = "3;히요리;03;헤헤헤…… 그치만 어차피 이 지역의 전기도 근처의 대도시에서 훔치고 있는 거라서……. 어차피 그런 거라면 제가 슬쩍해도…….\n#3;em;…"
2001702-29 = "3;히요리;03;헤헤헤…… 그치만 어차피 이 지역의 전기도 근처의 대도시에서 훔치고 있는 거라서……. 어차피 그런 거라면 제가 슬쩍해도…….\n#3;em;…"
2001702-30 = "[s] \"그런 거였어?! 아니, 그래도 안 돼!\""
2001702-31 = "3;히요리;10;네? 어, 어째서요?\n#3;em;[?!]\n#3;shake"
2001702-32 = "3;히요리;10;어차피 훔친 물건을 또 훔치는 거잖아요. 까만색에 까만색을 덧칠해봤자 달라질 건 아무것도 없잖아요!\n#3;hophop"
2001702-33 = "3;히요리;06;어차피 고통받기 위해 태어난 인생인데 휴대폰을 조금만 더 하는 게 그렇게도 큰 죄란 말인가요?"
2001702-34 = "3;히요리;03;괴롭네요, 엄청 괴로워요…… 웹소설 하나도 마음대로 못보는 제 인생에 대체 무슨 살아갈 의미가 있을까요…….\n#3;em;[속상함]\n#3;stiff"
2001702-35 = "3;히요리;04;이렇게 두번 다시 켜지지 않는 이 휴대폰을 보세요. 새카맣게 되어서 하나도 보이지 않는 게 마치 제 인생 같지 않나요?"
2001702-36 = "3;히요리;04;선생님은 방금 전까지 보던 웹소설이 배터리가 다 되어서 끊긴 경험 같은 건 없겠죠? 그야 어른이니까…….\n#3;em;…"
2001702-37 = "3;히요리;10;저는 있다구요, 엄청 많다구요! 어제도 그랬고, 오늘도 그랬다구요.\n#3;hophop"
2001702-38 = "3;히요리;10;심지어 선생님한테 모모톡 보낼 때도 무료 와이파이 존을 찾아서 이리저리 팔을 뻗어야 한단 말이에요!\n#3;closeup"
2001702-39 = "[s] \"지, 진정해. 히요리!\""
2001702-40 = "3;히요리;11;제 인생은 왜 이 모양 이 꼴이죠? 완전 엉망친창이에요. 망했네요, 완전 망했어요! 으아아아아앙-!\n#3;stiff\n#3;closeup\n#fontsize;80"
2001702-41 = "3;히요리;11;저도 웹소설 보고 싶단 말이에요-! 밝기도 최상으로 해서 눈 안아프게 보고 싶다고요!\n#3;hophop\n#3;closeup\n#fontsize;80"
2001702-42 = "[s] (아, 안 되겠어. 이제 그 방법을 쓰지 않으면……!)"
2001702-43 = "#all;hide"
2001702-44 = "3;직원;03;네. 1회용 휴대 배터리 3개 결제되었습니다. 감사합니다.\n#3;a\n#3;greeting\n#3;em;[반짝]"
2001702-45 = "#all;hide"
2001702-46 = "3;히요리;09;…….\n#3;a\n#3;em;…"
2001702-47 = "[s] \"일회용이지만 급할 땐 이걸로 어떻게든 해.\""
2001702-48 = "3;히요리;03;……. 저기. 그, 그러니까……."
2001702-49 = "3;히요리;04;이걸 받아도 될지……. 저기…… 리더에게 남에게 신세를 지지 말라고 당부를 받았는데…….\n#3;stiff"
2001702-50 = "3;히요리;10;괘, 괜찮다고요? 그치만 남의 호의는 분명히 원하는 게 있기 때문이라고…….\n#3;em;[?]"
2001702-51 = "3;히요리;01;선생님이 저에게 원하시는 건……."
2001702-52 = "[s] \"전봇대에 올라가지 않는 거……?\""
2001702-53 = "3;히요리;99;네……."
2001702-54 = "3;히요리;03;……명심할게요. 네……."

[translation]
2001702-1 = "The Girl Still Wants to Read"
2001702-2 = "I learned where Hiyori was and went to find her."
2001702-4 = "Somewhere in an Unregistered District"
2001702-5 = "Hiyori was hanging from a utility pole."
2001702-6 = "[s] \"Hey there, Hiyori.\""
2001702-7 = "A-Ack...?!"
2001702-10 = "O-Ouch..."
2001702-11 = "S-Sensei, what are you doing here?!"
2001702-12 = "Right... You asked me where I was."
2001702-13 = "I didn't think you'd find me in an unregistered district. The General Student Council doesn't keep track of such things."
2001702-14 = "[s] \"It was pretty easy, honestly.\""
2001702-15 = "I-I see... Adults sure are impressive."
2001702-16 = "[s] \"More importantly, what were you doing?\""
2001702-17 = "Oh, me? Well I had to climb the utility pole..."
2001702-18 = "...to charge my phone."
2001702-19 = "[s] \"All the way up there?\""
2001702-20 = "Yes. As you know, I don't have a home and I don't belong to an academy."
2001702-21 = "The abandoned buildings we've been living in have no water or power."
2001702-22 = "So if I wanna charge my phone, I have to go to the city and steal power somewhere."
2001702-23 = "I was yelled at for charging five different batteries at a 24 hour fast food restaurant..."
2001702-24 = "They really didn't have to shoot though... City people are so mean. Heh...heh..."
2001702-25 = "[s] \"...\""
2001702-26 = "Then, yesterday, I read in a magazine that the power transmission boxes on utility poles have outlets. So, that's how I ended up where you found me."
2001702-27 = "[s1] \"You shouldn't inconvenience others like that.\"\n[s2] \"You shouldn't do that because it's dangerous.\""
2001702-28 = "Heeheehee... But this area is also stealing electricity from the big city nearby. Is it so wrong to steal from thieves?"
2001702-29 = "Heeheehee... But this area is also stealing electricity from the big city nearby. Is it so wrong to steal from thieves?"
2001702-30 = "[s] \"Regardless, it's still wrong.\""
2001702-31 = "Wh-What?! Really?"
2001702-32 = "But...it's already stolen! Nothing changes if I paint black over black, right?!"
2001702-33 = "Life is endless suffering... Can't I have this small consolation?"
2001702-34 = "I'm looking pain directly in the eye... What will I do without my webtoons?"
2001702-35 = "The pitch-black screen of my phone is like my life. Empty, lacking any future. Fruitless."
2001702-36 = "Maybe adults like you never have to deal with not being able to read your webtoons because you have no battery!"
2001702-37 = "But that's my life, Sensei! It happens to me all the time! Yesterday, today, tomorrow, and tomorrow's tomorrow!"
2001702-38 = "And to send even one simple MomoTalk, I have to flap my arm around like a bird to find free Wi-Fi!"
2001702-39 = "[s] \"Calm down, Hiyori!\""
2001702-40 = "Why is my life like this? It's a complete mess. I'm a failure. Everything is over. WAHHH!"
2001702-41 = "I wanna read webtoons on the highest brightness setting! Is that too much to ask?!"
2001702-42 = "[s] \"(I guess I have no choice here.)\""
2001702-44 = "Payment received for three disposable batteries. Thank you very much!"
2001702-46 = "..."
2001702-47 = "[s] \"They're disposable, so save them for emergencies.\""
2001702-48 = "Um, s-so..."
2001702-49 = "Am I allowed to accept this? I don't know. Leader said not to rely on anyone..."
2001702-50 = "Like, you'd really just gimme this? She also said people who seem nice always have an agenda!"
2001702-51 = "Wh-What do you want from me...?"
2001702-52 = "[s] \"Don't climb utility poles, I guess?\""
2001702-53 = "O-Okay..."
2001702-54 = "I...I can do that."

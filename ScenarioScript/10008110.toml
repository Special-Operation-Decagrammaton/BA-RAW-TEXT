[translation]
10008110-1 = "第11話;大吉殿攻防戰"
10008110-3 = "老，老大！相當多的人正朝這裡前進，同時還發生了武力衝突！"
10008110-4 = "這樣下去，闖入辦公室也只是時間的問題！"
10008110-5 = "可惡……！想不到竟然會被妨礙到這種程度……！！"
10008110-6 = "雖然比計畫中還早，不過也沒辦法了。"
10008110-7 = "帶著賽錢箱逃跑吧！"
10008110-12 = "找到了！"
10008110-13 = "什麼！？難道這個情況是你們……！？"
10008110-14 = "沒錯，真虧你敢把我們當笨蛋耍啊！"
10008110-15 = "大言不慚地說社群網站怎樣又怎樣，"
10008110-16 = "這種人就該用社群網站來消滅！"
10008110-18 = "……嘛，說的也有道理。"
10008110-19 = "就算是來打工的，也別以為我只會乖乖聽話啊！"
10008110-20 = "絕對不會讓你們逃走！"
10008110-22 = "唔，居然這麼囂張……！"
10008110-23 = "集結更多兵力過來！"
10008110-24 = "就算你們再來一次也是沒有用的。#n只要增加兵力，要壓制你們這種程度的人簡直易如反掌……！"
10008110-25 = "但，但是……現在黑龜組大半的兵力，似乎在正門附近受到了妨礙……！"
10008110-26 = "你，你說什麼！？"
10008110-29 = "來，解決他們吧～！"
10008110-30 = "壞孩子就需要處罰唷～☆"
10008110-35 = "……踐踏夢想的代價是很昂貴的。"
10008110-38 = "呼叫正門以外的兵力不就好了嗎！"
10008110-39 = "不只是這樣而已！除了正門之外，其他地方也有別的襲擊者……！"
10008110-40 = "……！！"
10008110-43 = "黑龜組是吧……"
10008110-44 = "竟敢在元旦引發這種騷動……"
10008110-45 = "到底在想什麼啊！"
10008110-46 = "讓他們見識見識假日出勤的憤怒，上吧！"
10008110-49 = "是！！"
10008110-54 = "雖然能理解你的心情，不過那種說法作為風紀委員會實在有點……"
10008110-55 = "算了，今天就網開一面。"
10008110-56 = "讓你們盡情大鬧一場吧。"
10008110-57 = "……黑龜組的各位，我要在此將你們全部逮捕。"
10008110-60 = "為，為什麼，怎麼會變成這樣……！"
10008110-61 = "呵呵……那個答案，就讓我來告訴你吧？"
10008110-62 = "那是因為……"
10008110-63 = "你們膽敢與我們便利屋68為敵！"
10008110-65 = "太，太帥了！亞瑠大人！"
10008110-66 = "……呃，是多虧了一些巧合跟協助吧。"
10008110-67 = "亞瑠醬一旦得意就停不下來了～咯呵呵！"
10008110-72 = "……你們的社長，不會常常被其他人說很「厚臉皮」嗎？"
10008110-73 = "少，少囉嗦！"
10008110-74 = "總之，現在正是展現我們志氣的時候！"
10008110-75 = "當然，也拜託老師了哦？"
10008110-76 = "[s]「嗯。那麼上吧。」"

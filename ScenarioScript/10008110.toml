[translation]
10008110-1 = "Episode 11;The Daikichiden Battle"
10008110-3 = "B-Boss! A firefight has broken out at the front entrance!"
10008110-4 = "It's only a matter of time before they push into the office at this rate!"
10008110-5 = "Damn it! How dare these cretins interfere with our business?!"
10008110-6 = "I didn't expect to have to do this so soon, but very well."
10008110-7 = "The time has come for us to make our escape with the offering box!"
10008110-12 = "Stop right there!"
10008110-13 = "You again?! Are you the ones responsible for this uprising?!"
10008110-14 = "Who else?"
10008110-15 = "This is your comeuppance for calling us fools who believe everything we read online."
10008110-16 = "Let's see how you like it when the social media mob turns on you!"
10008110-18 = "I think this is what they call being \"canceled\"."
10008110-19 = "And you deserve it for being anti-labor too."
10008110-20 = "How dare you take advantage of a part-timer?! You're gonna pay!"
10008110-22 = "Gah! Impudent little...!"
10008110-23 = "Request backup! Assemble all forces!"
10008110-24 = "Crushing a small team like yours will be simple with the combined might of the Kurokame Gang!"
10008110-25 = "U-Uh...Boss? Our forces are still being held up by the siege at the front entrance!"
10008110-26 = "Yes?"
10008110-29 = "Here we go!"
10008110-30 = "Time to punish some bad guys! ☆"
10008110-35 = "You'll pay for trampling on people's dreams."
10008110-38 = "C-Can't we just call everyone who's NOT at the front entrance?"
10008110-39 = "That's just the thing! It's not just the front entrance—fights are breaking out everywhere!"
10008110-40 = "...!"
10008110-43 = "That Kurokame Gang..."
10008110-44 = "They'll pay for the commotion they've caused on New Year's!"
10008110-45 = "Surround them."
10008110-46 = "Show them what happens when you force us to work overtime on a holiday!"
10008110-49 = "Yes!"
10008110-54 = "I understand how Iori feels, but does she really have to air the Prefect Team's dirty laundry in public like that?"
10008110-55 = "Well, it is a holiday, so I'll let it slide."
10008110-56 = "Maybe this will prove a good stress relief for her. "
10008110-57 = "Good luck, Kurokame Gang. You're going to need it."
10008110-60 = "Wh-What...? How has this happened?"
10008110-61 = "Do you want to know?"
10008110-62 = "It should be obvious by now."
10008110-63 = "It's because you dared to cross Problem Solver 68!"
10008110-65 = "Aru's so cool!"
10008110-66 = "I think she's exaggerating just a little."
10008110-67 = "But that's just how she is. Nothing can stop Aru once she gets on a roll!"
10008110-72 = "Has anyone ever told you guys that your boss might be too brazen for her own good?"
10008110-73 = "I-I heard that, you know!"
10008110-74 = "This is our chance to show them what we're made of. It's time to get to work."
10008110-75 = "That goes for you too, Sensei."
10008110-76 = "[s] \"Right. Let's do this!\""

[translation]
10008110-1 = "ตอนที่ 11;สงครามปิดล้อมไดคิจิเดน"
10008110-3 = "บะ...บอส! เกิดเหตุปะทะระหว่างฝูงชนที่ไม่พอใจกับสมาชิกของเราขึ้นที่ประตูหน้าครับ!"
10008110-4 = "ปล่อยไว้แบบนี้พวกเขาอาจเข้ามาถึงห้องสำนักงานได้นะครับ!"
10008110-5 = "บ้าจริง...! พวกปลาซิวปลาสร้อยกล้าดียังไงถึงมาขัดขวางธุรกิจของพวกเราแบบนี้!"
10008110-6 = "เร็วกว่าที่คาดการณ์ไว้ แต่ก็ไม่เป็นไร"
10008110-7 = "เก็บตู้บริจาคแล้วไปจากที่นี่เร็วเข้าเถอะ!"
10008110-12 = "นี่! เจอตัวสักทีนะ!"
10008110-13 = "พวกคุณ....?! เหตุวุ่นวายนี้เป็นฝีมือของพวกคุณเองสินะ?!"
10008110-14 = "เฮอะ! ก็ใช่น่ะสิ!"
10008110-15 = "กล้าดียังไงถึงใช้โซเชียลมาสร้างกระแสไวรัล แล้วทำให้ทางนี้เป็นเหมือนคนงี่เง่าแบบนั้น!"
10008110-16 = "คนอย่างพวกแกต้องโดนทัวร์ลง!"
10008110-18 = "ก็นะ... ที่พูดมาก็ปฏิเสธไม่ได้เลย"
10008110-19 = "กล้าดียังไงถึงมาหลอกจ้างฉันให้มาทำงานพาร์ทไทม์กันหา!"
10008110-20 = "ยกโทษให้ไม่ได้! ไม่ปล่อยให้รอดไปได้หรอก!"
10008110-22 = "อะ...อึก! ใช้กลอุบายตื้นๆ แบบนี้งั้นเรอะ!"
10008110-23 = "กำลังเสริม! จะเรียกกำลังเสริมมาเดี๋ยวนี้ครับ!"
10008110-24 = "ถ้าเรียกกำลังเสริมทั้งหมดของแก๊งคุโรคาเมะมาเหมือนเมื่อกี้ คงจะจัดการพวกลูกกระจ๊อกอย่าง#nพวกแกได้ง่ายๆ... อึก...!"
10008110-25 = "คะ...คือว่า... บอส! แย่แล้วครับ! กองกำลังของเราถูกบุกโจมตีโดยกองกำลังนิรนามที่หน้าประตูแล้วครับ!"
10008110-26 = "ว่ายังไงนะ?"
10008110-29 = "อา~ ทุกคนบุกโจมตีพร้อมกัน~!"
10008110-30 = "ได้เวลาสั่งสอนเด็กดื้อแล้วละค่ะ~☆"
10008110-35 = "ราคาของการเหยียบย่ำความฝันคนอื่นน่ะ... มันแพงนะ"
10008110-38 = "ทะ...ทำไมไม่เรียกกองกำลังอื่นมาแทนเล่า!"
10008110-39 = "ไม่ใช่แค่นั้นนะครับ! ที่ด้านหน้าของศาลไดคิจิเดนตอนนี้... อึก กำลังถูกโจมตีจากทางด้านนอก...!"
10008110-40 = "...!!"
10008110-43 = "แก๊งคุโรคาเมะใช่มั้ย...!"
10008110-44 = "เจ้าพวกที่ก่อความวุ่นวายตั้งแต่วันแรกของปี! เตรียมใจไว้ให้ดีเถอะ!"
10008110-45 = "จงรับความโกรธที่ต้องมาทำงานในวันหยุดของฉันไปซะ!"
10008110-46 = "ทุกคนตั้งขบวนปิดล้อมเร็ว!"
10008110-49 = "ค่ะ!!"
10008110-54 = "อืม ไม่ใช่ว่าฉันไม่เข้าใจความรู้สึกของอิโอริหรอกนะ แต่ในฐานะคณะกรรมการวินัยแล้ว#nการโวยวายแบบนั้นมัน..."
10008110-55 = "ไม่สิ... แบบนี้ดีแล้วละ"
10008110-56 = "ปล่อยให้อาละวาดแบบนั้นไปน่าจะดีกว่าค่ะ "
10008110-57 = "แก๊งคุโรคาเมะ พวกเราจะจับกุมพวกคุณทุกคนที่ก่อความวุ่นวายที่นี่ค่ะ"
10008110-60 = "นะ...นี่มันอะไรกัน... ทำไมสถานการณ์ถึงได้เป็นแบบนี้..."
10008110-61 = "ฮุฮุ... ทำไมถึงเป็นแบบนี้ไปได้น่ะเหรอ?"
10008110-62 = "มันก็เห็นชัดอยู่แล้วนี่!"
10008110-63 = "เพราะพวกนายกล้าคิดจะเป็นศัตรูกับหน่วยรับจ้างสารพัดของเรายังไงล่ะ!"
10008110-65 = "ทะ...เท่ที่สุดเลยค่ะ! ท่านอารุ!"
10008110-66 = "เปล่าสักหน่อย จู่ๆ มันก็กลายเป็นแบบนี้ไปเฉยๆ ต่างหาก"
10008110-67 = "อารุจังน่ะ ถ้าฮึกเหิมขึ้นมาแล้วอะไรก็ฉุดไม่อยู่หรอก~ คิกคิกคิก!"
10008110-72 = "คือว่า...ให้ฉันพูดมันก็ยังไงๆ อยู่นะ แต่ว่า... เคยมีคนว่าประธานของพวกเธอหน้าไม่อายบ้างไหมเนี่ย?"
10008110-73 = "ละ...เลิกพูดมากกันได้แล้ว!"
10008110-74 = "เดี๋ยวจะแสดงพลังของพวกเราให้เห็นตอนนี้ละ! ทุกคน! ได้เวลาเริ่มงานของจริงกันแล้ว!"
10008110-75 = "ขอรบกวนคุณครูหน่อยได้หรือเปล่า?"
10008110-76 = "[s] \"อื้อ! ไปกันเถอะทุกคน!\""

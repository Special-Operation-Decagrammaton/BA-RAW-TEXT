[translation]
42070-1 = "#title;제7화;쿠데타"
42070-2 = "#na;(그로부터 몇 시간 전…… 키보토스 총학생회 회의실.)"
42070-3 = "#all;hide"
42070-4 = "3;총학생회 서기;02\n#3;greeting\n#3;a\n#wait;1500"
42070-5 = "3;총학생회 서기;02;……이어지는 다음 안건은 재난 상황을 틈타 내란을 일으키고, 총학생회의 권한을 탈취하려 한 카이저 코퍼레이션과 그 경영진들에 대한 처벌 수위를 결정하는 사안입니다."
42070-6 = "3;총학생회 서기;01;본래대로라면 총학생회와 행정위원회가 정상화된 시점에서 가장 우선하여 처리할 사안이었습니다만……\n#3;em;…"
42070-7 = "3;총학생회 서기;02;……지난 사태로 인해 D.U.의 통신과 물류 시설이 다수 파괴되었기에, 시민들의 안전과 편의를 위해 D.U. 복구 사업을 우선하다 보니 해당 사안의 논의는 유보되었습니다."
42070-8 = "#st;[0,0];instant;1;"
42070-9 = "#clearST"
42070-10 = "3;총학생회 서기;02\n#3;d\n#wait;1500"
42070-11 = "3;린;99;……부연 설명 감사합니다.\n#3;a"
42070-12 = "3;린;02;말씀주신 대로 카이저 코퍼레이션은 지난 사태 때 사병을 이끌고 총학생회를 습격. 생텀 타워의 권한을 탈취하여 그 능력으로 자신들이 발굴한 초고대 병기를 운용하려 했습니다.\n#3;em;[반응]"
42070-13 = "3;린;01;다행히 샬레의 선생님과 각 자치구의 학생회 임원 여러분께서 도와주신 덕분에 사태가 악화되는 것을 막을 수 있었습니다만……"
42070-14 = "3;린;99;……이들을 막지 못했더라면 총학생회는 물론이고 키보토스 그 자체가 붕괴했을지도 모르는 일이지요.\n#fontsize;50"
42070-15 = "3;린;01;이 모든 시도는 카이저 코퍼레이션이 방산부터 물류까지 통제 가능한 초거대 기업이기 때문에 가능한 일이었습니다."
42070-16 = "3;린;05;다시는 이와 같은 시도를 할 수 없도록, 저는 카이저 코퍼레이션과 그 경영진에게 최고 수위의 처벌을 적용함이 마땅하다고 생각합니다."
42070-17 = "#st;[0,0];instant;1;"
42070-18 = "#clearST"

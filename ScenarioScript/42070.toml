[translation]
42070-1 = "Episode 7; Coup d'etat"
42070-2 = "A few hours earlier in the Kivotos General Student Council Conference Room."
42070-5 = "The next item on the agenda is determining the level of punishment for the Kaiser Corporation and its executives for exploiting a disaster to spark a civil war and seize the authority of the General Student Council."
42070-6 = "Normally, this would have been a top priority for the General Student Council and the Board of Administration once they were back in session."
42070-7 = "However, due to the destruction of many of D.U.'s communications and logistics facilities during the recent events, discussions on this matter have been postponed while we prioritize the restoration of D.U. for the safety and well-being of our citizens."
42070-11 = "Thank you for the clarification."
42070-12 = "As you mentioned, the Kaiser Corporation led a group of private soldiers in an attempt to seize control of the Sanctum Tower and use the ancient weapon they had unearthed."
42070-13 = "Although we managed to prevent the situation from escalating with the help of Schale's Sensei and student council members from various districts, it's essential to recognize the potential consequences."
42070-14 = "...If we had failed to stop them, not only would the General Student Council have collapsed, but Kivotos itself would have been in grave danger."
42070-15 = "This entire attempt was only possible because the Kaiser Corporation is a mega-corporation with influence in everything from defense to logistics."
42070-16 = "To ensure that such an incident is never repeated, I believe it's crucial to impose the most severe punishment on the Kaiser Corporation and its executives."
42070-20 = "Wait a minute. While it's true that the Kaiser Corporation used private soldiers to forcefully take over the General Student Council..."
42070-21 = "We can hardly ignore the fact that Chief Officer Rin's unilateral activation of the Emergency Response Committee just before the incident caused chaos within the Council."
42070-23 = "But the reason we weren't present that day was due to the motion to censure Rin..."
42070-24 = "Moreover! There are reports suggesting that Chief Officer Rin was seen riding in one of the ancient weapons unearthed by the Kaiser Corporation..."
42070-25 = "...In fact, isn't it possible that Chief Officer Rin was somehow involved with the Kaiser Corporation in this matter?"
42070-26 = "That's quite a serious accusation..."
42070-27 = "I understand that there might be suspicions surrounding this case, but let's remember that there are established procedures and protocols for handling such matters."
42070-28 = "If a resolution of accountability is passed and an investigation into the Kaiser Corporation is initiated, you can count on me to fully cooperate with the investigation."
42070-30 = "*whisper* Hey, Aoi... How many hours has this meeting been going on? Did we miss lunch already?"
42070-31 = "It's been 8 hours, 32 minutes, and 15 seconds since we began."
42070-32 = "But we still have three more items on the agenda, so just eat your onigiri."
42070-33 = "Endurance meetings like this are fairly typical for the Board of Administration, aren't they?"
42070-35 = "Onigiri? What onigiri? Hey, Aoi. You didn't give me any onigiri."
42070-37 = "Wasn't it Rin who gave Schale's Sensei the extra-judicial powers in the first place?"
42070-38 = "Even though it was in a memo from the General Student Council President, we couldn't even verify if the memo was authentic..."
42070-39 = "We have been through this. The memo is undoubtedly from the General Student Council President."
42070-40 = "If necessary, we can confirm its authenticity through handwriting analysis..."
42070-41 = "Chief Officer, this is besides the point! There are established procedures for everything!"
42070-42 = "Ignoring the decisions of the Board of Administration, even if you're the acting General Student Council president, is unacceptable!"
42070-43 = "I have always followed rules and procedures exactly as written out, but..."
42070-45 = "*whisper* Hey, Sumomo... Did you get onigiri?"
42070-46 = "*yawn* I'm too sleepy to eat right now..."
42070-47 = "No, not for you. I'm trying to ask if you took my share of onigiri."
42070-49 = "Kaiser Corporation is a major player in Kivotos, and if they go under, it would be a catastrophe worse than the tower incident."
42070-50 = "With Kaiser Industries, Kaiser Construction, and Kaiser Convenience all going bankrupt, unemployment would skyrocket."
42070-51 = "Who will take responsibility for that, Chief Officer?"
42070-52 = "Given the influence of Kaiser Corporation, I believe a fine to assist with clean-up and restoration will suffice."
42070-54 = "Hey, Momoka... Are you hungry?"
42070-55 = "You're not getting any of my tarako-flavored chips, no matter how much you beg. So don't even try it."
42070-56 = "Go get some onigiri or something. Just don't touch my chips."
42070-58 = "No, I'm trying to tell you that I never got any onigiri!"
42070-62 = "I don't believe further discussion will be productive at this time."
42070-63 = "Chief Officer, I think everyone will benefit from some fresh air. Let's adjourn for today and reconvene later."
42070-64 = "Understood."
42070-65 = "Since it's getting late, we'll close the meeting and resume tomorrow."
42070-66 = "Thank you, everyone."
42070-74 = "Phew..."
42070-75 = "I thought I was prepared for how difficult that was going to be..."
42070-79 = "Thank you for your work, Chief Officer."
42070-80 = "Ah, Chief of Defense."
42070-81 = "Thank you. You as well."
42070-82 = "Was there anything the matter? How are you doing?"
42070-83 = "I just wanted to stop by and let you know I think you killed it!"
42070-84 = "You flatter me."
42070-85 = "I've thought this before, but they're totally out of line."
42070-86 = "Practically all they use their mouths for are to gossip about you or talk about themselves."
42070-87 = "Being a leader and having to make decisions based on so many differing opinions isn't easy."
42070-88 = "I can't blame them though. I'm responsible for this situation too."
42070-89 = "I just have to be patient and convince them one by one."
42070-90 = "But...do you really need to though?"
42070-91 = "You're the chief officer of General Management, but you're also the acting General Student Council president."
42070-93 = "You could make things so much easier for yourself by using your authority to make the other chairs say yes."
42070-94 = "But authority..."
42070-95 = "It's like a double-edged sword, Chief of Defense."
42070-96 = "It might seem like a quick fix, but its value dwindles the more you rely on it."
42070-97 = "I can't use my authority to suppress others' voices just because they disagree with me."
42070-98 = "Honestly, I'm not even sure about myself..."
42070-99 = "*sigh*"
42070-101 = "...As I suspected, you might not be cut out for the whole president thing."
42070-105 = "..."
42070-106 = "What are you saying, Chief of Defense?"
42070-109 = "Rin. Truly, I've never liked you."
42070-110 = "You're nothing like the President, but you had all her favor..."
42070-111 = "And look at you. Even after she's gone, you're still trying to do right by her. You're the president, and you're still listening to everyone around you and harping about procedures..."
42070-112 = "Your maddening, centrist approach won't solve anything."
42070-113 = "Kivotos can only be fixed by a superhuman."
42070-114 = "Chief Kaya. The General Student Council President is missing, and her seat is vacant."
42070-115 = "My role as the chief officer is to protect and preserve that seat during her absence."
42070-117 = "Oh... Is that so?"
42070-118 = "Funnily enough, I stumbled upon something interesting in Schale's basement during the recent incident."
42070-120 = "A secret letter from the General Student Council President that has never been made public."
42070-121 = "A secret letter...?"
42070-122 = "According to the letter, the President wanted the Chief of Defense to take charge in the event of an emergency, not the Chief Officer."
42070-123 = "In other words, the person who should have been the acting president during her absence was never Nanagami Rin. It was always intended to be Shiranui Kaya."
42070-124 = "What nonsense are you saying right now?"
42070-125 = "Now then. Why was a letter with such an important message secretly hidden in Schale's basement?"
42070-126 = "Yes, hidden in Schale's basement... In a building, coincidentally enough, that only Chief Officer Nanagami Rin had access to when the General Student Council President disappeared."
42070-127 = "And, to further the coincidences, is it not you, Chief Officer Rin, who has the most to gain by the concealment of this document?"
42070-128 = "This is ridiculous. Do you really think people would just believe the letter's authenticity without proof?"
42070-129 = "I'll have a handwriting appraisal done, as well as an analysis of the signature. That should be no problem if the General Student Council wrote that letter."
42070-130 = "Certainly, verifying the document's authenticity is crucial. Just like with the note found in the president's office."
42070-131 = "Ah. I would consider your current standing in the Council. How many members do you think will believe you? Hm?"
42070-132 = "Kaya. You..."
42070-137 = "Chief Officer Nanagami Rin, you are under emergency arrest for concealing official documents and abusing authority."
42070-138 = "Pursuant to Article 78 of the General Student Council Executive Regulations, your duties as acting General Student Council president are automatically suspended until the investigation concludes."
42070-139 = "But in the interim, I suppose we'll need a new acting president, now won't we?"
42070-140 = "You've planned this from the very start."
42070-141 = "If the president returns, she won't forgive you for this."
42070-142 = "And if she does return, I look forward to seeing her reaction to your absolute failure in her absence."
42070-143 = "..."
42070-144 = "Now, please respectfully escort the Chief Officer to her dormitory. Place her under twenty-four hour house arrest and surveillance."
42070-145 = "Yes, ma'am!"
42070-154 = "...Director of Human Resources. How are things with the protests around the General Student Council building?"
42070-155 = "I was actually just about to reach out to you about that."
42070-156 = "We've assembled many students to protest the Transportation Office and Regulatory Committee's weak response to the many incidents at public facilities recently."
42070-157 = "I thought I would need to hire them, but they surprisingly just volunteered."
42070-158 = "Maybe it's because they were our students, but they seemed very excited, talking about transportation technology or something."
42070-159 = "Of course, none of this would have been possible without your intel, Chief of Defense."
42070-160 = "There was a lot of information that would've been hard to grasp unless you were there... I was curious how you gathered all this data."
42070-161 = "...Will this insipid curiosity of yours help you complete your task in any way?"
42070-162 = "O-Oh, no... I didn't mean to pry..."
42070-163 = "A-Anyway, to report! Angry students are protesting in front of the building, so even if you're a neutral board member not interested in factionalism, it won't look good for Chief Officer Rin."
42070-164 = "I'm sure most would be in favor if we held a vote of no confidence."
42070-165 = "Great job, and stay vigilant in managing the protesters."
42070-171 = "Haine, what about the letters you were supposed to send to the sports federations?"
42070-172 = "I sent it right away, just like you asked!"
42070-176 = "Well... Not exactly right away..."
42070-177 = "I was so hungry after the meeting that I stopped by the kitchen to grab a bite to eat..."
42070-178 = "...You don't need to report every little thing like that."
42070-179 = "So? How is the sports industry reacting?"
42070-180 = "They usually take a pretty hard line against cheating and manipulation, so everyone was pretty disappointed to hear that Chief Officer Rin had falsified official documents for her own gain."
42070-181 = "Is it true that the FOX Squad that raided the General Student Council the other day was also funded by Chief Officer Rin? It did seem like they were in a rush to shut down SRT Academy..."
42070-182 = "Of course. If that's all, I'm going to hang–"
42070-183 = "By the way, those foxes can really give it to you, huh? They put me in a reverse key lock as soon as I grabbed their shoulders! I bet they got training in martial arts submissions at SRT too..."
42070-184 = "..."
42070-185 = "I should have tapped out then... My shoulder might never recover from that last attack..."
42070-186 = "...Haine, I'm hanging up."
42070-187 = "Yeah, yeah. Wait, but this is really important. I was supposed to get an onigiri earlier and I want to know who–"
42070-191 = "At least I can put our concerns about the no-confidence votes to rest."
42070-192 = "And lastly..."
42070-197 = "...Protocol Team?"
42070-198 = "Yes, I need you to draft an emergency statement right away."
42070-199 = "Also, reach out to the Kronos channel and the municipal stations. It'll take time to set up the cameras."
42070-200 = "...The no-confidence vote shouldn't take long. The outcome is already set."
42070-201 = "Yes, please help us stay on track."
42070-202 = "...Ah, and we'll be welcoming a very special guest soon, so please be prepared."
42070-203 = "Our guest's name is..."
42070-206 = "[USERNAME] Sensei."
42070-208 = "Next Episode; New Proxy"

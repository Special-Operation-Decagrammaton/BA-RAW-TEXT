[translation]
42070-1 = "第7話;クーデター"
42070-2 = "（緊急声明発表の数時間前……連邦生徒会――会議室）"
42070-5 = "……次の議題は、事態の最中に内乱を起こし、連邦生徒会の権限を奪おうとした#nカイザーコーポレーションと、その経営陣に対する処罰を決める事案です。"
42070-6 = "本来なら、行政委員会が正常化された時点で、#n最優先で進めるべき内容なのですが……。"
42070-7 = "……前回の事態によりD.U.の通信と物流施設が多数破壊されており、#n市民の安全と利便性のためにD.U.復旧事業を優先したため、#n該当事案の議論は保留されていました。"
42070-11 = "……ありがとうございます。"
42070-12 = "いま説明があった通り、カイザーコーポレーションは前回の事態の際、#n兵士を率いて連邦生徒会を襲撃。サンクトゥムタワーの権限を奪取し、#nその能力で自分たちが発掘した超古代兵器を運用しようとしました。"
42070-13 = "幸い、シャーレの先生と各自治区の生徒会役員の皆様のご協力により、#n事態の悪化を防ぐことはできましたが……。"
42070-14 = "……彼らを止められなかったら、連邦生徒会はもちろん、#nキヴォトスそのものが崩壊していたかもしれません。"
42070-15 = "これらの事態は、カイザーコーポレーションが防衛産業から物流まで#n統制可能な超大手企業であるために生じたものと考えられます。"
42070-16 = "二度とこのような事態が発生しないよう、カイザーコーポレーションと#nその経営陣には最高レベルの処罰を与えるべきでしょう。"
42070-20 = "待ってください。カイザーコーポレーションが私兵を動員して連邦生徒会を武力占拠したのは事実ですが……。"
42070-21 = "彼らが簡単にサンクトゥムタワーに入って来れたのは、リン行政官が独断で非常対策委員会を開き、連邦生徒会を混乱に陥れた影響もあるのではないでしょうか。"
42070-23 = "た、たしかにリン先輩は非常対策委員会を開きましたが、それが直接的な要因になるとは……"
42070-24 = "では、カイザーコーポレーションが発掘した超古代兵器にリン行政官が搭乗していたという証言についてはどう説明するのですか？"
42070-25 = "……実はリン行政官がカイザーコーポレーションと組んでいた可能性もあるのでは？"
42070-26 = "そ、そんなデタラメを……。"
42070-27 = "……事件の当事者である私を疑うのも、十分理解できます。"
42070-28 = "今回の事態に対する議案が採択され、カイザーコーポレーションに対する調査が始まったら、私も誠実に対応することを約束しましょう。"
42070-30 = "ねえアオイ先輩……この会議、まだ終わんないの？#n僕らお昼も食べてないんだけど。"
42070-31 = "まだよ、議題があと3つくらい残ってるでしょう。"
42070-32 = "開始から今でちょうど8時間32分15秒……#nこの程度のマラソン会議、防衛室ではいつものことでしょう？"
42070-33 = "お昼はさっきのおにぎりで我慢して。"
42070-35 = "おにぎりなんてもらってたっけ……？"
42070-37 = "そもそも、シャーレの先生に超法規的な権限を付与したのもリン行政官ではないですか？"
42070-38 = "いくら連邦生徒会長が残したメモに「あの」内容が書かれていたとしても、#n私たちはそれが本物なのかどうかも確かめられていません。"
42070-39 = "……メモを残したのは連邦生徒会長で間違いありません。"
42070-40 = "必要でしたら、筆跡鑑定で真偽を確かめても――"
42070-41 = "首席行政官、物事には順序というものがあるのです！"
42070-42 = "いくら連邦生徒会長代行だとしても、#n行政委員会の決定を無視する行動は見過ごせません！"
42070-43 = "私は常に手順とルールに基づいて問題を解決していますが……。"
42070-45 = "あのさ、スモモ。#nおにぎりもらってたりする？"
42070-46 = "ふぁあ～……眠くておにぎりなんか食べらんないよ～"
42070-47 = "いや、君のじゃなくて僕の分なんだけど……。"
42070-49 = "しかも、カイザーコーポレーションはキヴォトス有数の大企業です。"
42070-50 = "カイザーインダストリー、カイザーコンストラクション、カイザーコンビニエンス……#nこれらの企業が活動を止めれば、キヴォトスは失業者で溢れるでしょう。"
42070-51 = "そうなればかつてない混乱が生じるのは必須です。#nその責任は一体誰が負うのでしょうか？"
42070-52 = "……カイザーコーポレーションの影響力を踏まえ、#n罰金の請求のみで片付けるというのも……。"
42070-54 = "なあ、モモカ……。"
42070-55 = "そんな目で見ても、この明太子味のポテチはあげないよ。"
42070-56 = "お腹が空いてるなら、配られたおにぎりでも#n食べてればいいじゃん。（パリッパリッ）"
42070-58 = "いや、だからおにぎりなんてもらってないんだけど！？"
42070-62 = "……どうやら、これ以上議論を続けるのは難しそうですね。"
42070-63 = "首席行政官。今日はここまでにして、後日再開するのはいかがですか？#nみなさんも、少し考える時間が必要でしょうから。"
42070-64 = "……わかりました。"
42070-65 = "本日は一旦閉会としましょう。#n続きはまた、明日行います。"
42070-66 = "みなさん、お疲れ様でした。"
42070-74 = "ふぅ……。"
42070-75 = "予想はしていましたが、思ったより難しいものですね……。"
42070-79 = "お疲れ様でした、首席行政官。"
42070-80 = "ああ、防衛室長。"
42070-81 = "そちらもお疲れ様でした。"
42070-82 = "わざわざこちらに来られたということは……何か私に用事でも？"
42070-83 = "いえ、ただの雑談です。#nそれにしても、先ほどは本当に大変でしたね……。"
42070-84 = "いいえ、そんなことは。"
42070-85 = "……役員のみなさんには、本当に困ったものです。"
42070-86 = "議論する場だというのに、揃いも揃って自分の言いたいことばかり……。"
42070-87 = "全員の意見を考慮しなけばならない首席行政官が#nどれだけ悩まれていることか、心中お察しします。"
42070-88 = "仕方ありません。こうなったのは私の責任でもありますから。"
42070-89 = "少しずつ、時間をかけて役員を説得するしかないでしょう。"
42070-90 = "……わざわざ役員の同意を求める必要はあるのでしょうか？"
42070-91 = "あなたは総括室の首席行政官ですが、連邦生徒会長の代行でもあります。"
42070-93 = "連邦生徒会長代行の権威を使って役員に命令すれば、#n手間取ることなく仕事をこなせるのでは？"
42070-94 = "権威、ですか……。"
42070-95 = "それは毒の入った聖杯のようなものですよ、防衛室長。"
42070-96 = "たしかに便利な切り札かもしれませんが、使えば使うほど自分の身を滅ぼします。"
42070-97 = "自分の意見と違うからといって、権威を掲げて他人を抑圧することはできません。"
42070-98 = "それに私自身……代行業務が十全に行えているという自信もないですし……。"
42070-99 = "はぁ……。"
42070-101 = "……やはりあなたには、連邦生徒会長代行の資格がありません。"
42070-105 = "…………。"
42070-106 = "……防衛室長、これはいったい？"
42070-109 = "リン、あなたのことは以前から目障りだと思っていたのです。"
42070-110 = "能力なんて微塵もないのに、連邦生徒会長の信頼を独占して……。"
42070-111 = "連邦生徒会長代行になった後も、周囲の意見を集めて物事を進めようとするだなんて……。"
42070-112 = "そんな[ruby=しゅうぐせいじ]衆愚政治[/ruby]みたいなやり方では何も解決しません。"
42070-113 = "キヴォトスは、[ruby=連邦生徒会長] 超人 [/ruby]によって指揮されるべきなのです。"
42070-114 = "……連邦生徒会長は今も行方不明なのですよ、不知火室長。"
42070-115 = "そして、彼女の居場所を守るのが首席行政官の役目です。"
42070-117 = "ふふっ、本当にそうでしょうか。"
42070-118 = "実はあの日、シャーレの地下で面白いものを発見しましてね。"
42070-120 = "これは――隠されていた連邦生徒会長の手紙です。"
42070-121 = "連邦生徒会長の……手紙……？"
42070-122 = "ええ。この手紙によると、連邦生徒会長は何かが起こった時、#n行政官ではなく防衛室長に代行業務を依頼しようとしていたようです。"
42070-123 = "つまり、連邦生徒会長代行になるべき人物は#n[ruby=七神リン]あなた[/ruby]ではなく[ruby=不知火カヤ]、私で[/ruby]ある、ということ。"
42070-124 = "それは、一体どういう……。"
42070-125 = "……ところで、どうしてこんなに重要な手紙が、#nシャーレの地下室に隠されていたのでしょうか？"
42070-126 = "連邦生徒会長が失踪した当時、シャーレに出入りする権限を持っていたのは#n七神リン、あなただけでしたね。"
42070-127 = "そして、この手紙を隠すことで最も得をする人物も――あなたです。"
42070-128 = "……それが連邦生徒会長によって書かれたものだという証拠はあるのですか？"
42070-129 = "筆跡鑑定を要求します。#n連邦生徒会長自ら作成したのなら、サインも――"
42070-130 = "もちろん、真偽の確認は重要です。#n連邦生徒会長室に残されていた、あのメモのように。"
42070-131 = "しかし……今の連邦生徒会に、あなたの言葉を信じる人が#n果たして何人残っているのでしょうね？"
42070-132 = "……まさか。"
42070-137 = "七神リン行政官、あなたを公文書[ruby=きき]毀棄[/ruby]および職権乱用の疑いで緊急逮捕します。"
42070-138 = "連邦生徒会役員規定第78条に基づき、#n連邦生徒会長代行の職務は調査が終了するまで停止されます。"
42070-139 = "手紙の真偽はともかく――#n当面の間の新しい連邦生徒会長代行が必要になってしまいましたね。"
42070-140 = "……すべて、あなたの計画だったのですか。"
42070-141 = "連邦生徒会長が帰ってきた暁には、全てが白日の下に晒されますよ。"
42070-142 = "ふふっ、むしろここまで事態を放置していたあなたの方が責められるのでは？"
42070-143 = "………。"
42070-144 = "それでは皆さん、首席行政官を丁重にお送りしてください。#nああ、その後、続けて監視をお願いしますね。"
42070-145 = "はい、防衛室長様！"
42070-154 = "こんにちは……人材資源室長。現在、連邦生徒会の建物周辺で行われているデモはうまく制御できていますか？"
42070-155 = "ああ、防衛室長。ちょうど良いところに。"
42070-156 = "デモは今のところ順調だよ。公共施設での事故や、交通室と調停室の生半可な対処を理由にデモ隊を募集したら、多くの人員が集まってな。"
42070-157 = "最初はお金で雇うつもりだったんだが、#nどういう訳かデモなら任せろと勝手に動いてくれて……。"
42070-158 = "ふっ、さすがは我が母校の生徒。気が利くな。"
42070-159 = "それと、防衛室長が送ってくれた情報も役に立ったぞ。"
42070-160 = "しかしあの中には事故の現場にいないと分からない情報もたくさんあったように見えたが……一体どうやって集めたんだ？"
42070-161 = "……その情報は、デモに必要ですか？"
42070-162 = "いや……別に必要ではないが……。"
42070-163 = "まぁいい。とにかく、あれだけの生徒が建物の前でデモをしているんだ。いくら派閥争いに興味のない中立の役員でも、リン行政官のイメージは悪くなるだろう。"
42070-164 = "不信任決議になれば、多くの者が何も言わず賛成票を投じるだろうな……。"
42070-165 = "そうですか……お疲れ様でした。#n引き続きデモの制御をよろしくお願いします。"
42070-171 = "ハイネ、体育協会に送付する公文書はどうなりましたか？"
42070-172 = "頼まれた通り、会議が終わってすぐに送ったぞ！"
42070-176 = "あー……まぁ、厳密に言うとすぐじゃないけど……。"
42070-177 = "お腹が空きすぎて、会議が終わったあと食堂でごはんを食べてたりしたから……。"
42070-178 = "……そんな些細なことまで報告する必要はありません。"
42070-179 = "それで、そちらの様子はいかがですか？"
42070-180 = "リン行政官が自分の利益のために公文書を偽造してたって話を聞いて、#nみんなガッカリしてたな。こっちは不正行為や情報操作に厳しいから。"
42070-181 = "そういえば、この前FOX小隊が連邦生徒会を襲撃したのも、#nリン行政官が仕向けたっていうのは本当か？#nだからSRT特殊学園の閉鎖を急いでたんだな……。"
42070-182 = "そうですよ。では、用件は以上で――"
42070-183 = "あのキツネ、本当に容赦なかったんだぞ。#n僕が抵抗しようとしたら、チキンウィングアームロックをかけてきてさ！#nSRT特殊学園では関節技も教えてるのか？"
42070-184 = "………。"
42070-185 = "うう、あの時タップアウトしてればよかったな……#nまだやられた肩がズキズキする……。"
42070-186 = "……ハイネ、切りますよ。"
42070-187 = "あー、待って待って。さっきの僕のおにぎりは誰が――"
42070-191 = "……この調子なら、不信任案が否決される心配はないでしょう。"
42070-192 = "それでは最後に……"
42070-197 = "……プロトコル？"
42070-198 = "はい、ええ……直ちに緊急声明発表の準備を。"
42070-199 = "クロノスチャンネルと各自治区の放送局にも早めに連絡してください。#n撮影機材の準備にも時間がかかるでしょうから。"
42070-200 = "……不信任決議はすぐに終わるでしょう。#n結果は決まったも同然ですから。"
42070-201 = "では、そのつもりで。"
42070-202 = "……ああそれと、貴重なお客様にお越しいただく予定ですので、#nお迎えの準備をお願いします。"
42070-203 = "ええ、名前は――"
42070-206 = "――[USERNAME]先生です。"
42070-208 = "次回;新たな代行"

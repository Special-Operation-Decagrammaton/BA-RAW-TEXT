[translation]
42070-1 = "ตอนที่ 7;ยึดอำนาจ"
42070-2 = "(ไม่กี่ชั่วโมงก่อนหน้านี้... ในห้องประชุมองค์การนักเรียนของคิโวทอส)"
42070-5 = "... วาระต่อไปที่เราจะคุยกันก็คือ การพิจารณาระดับการลงโทษไคเซอร์ คอร์เปอเรชั่นและคณะผู้บริหาร ที่พยายามใช้ประโยชน์จากความวุ่นวายภายใน และพยายามจะแย่งอำนาจขององค์การนักเรียนค่ะ"
42070-6 = "ตามธรรมเนียมแล้ว นี่เป็นประเด็นที่องค์การนักเรียนกับคณะกรรมการบริหารต้องรีบจัดการเป็นอันดับ#nแรกในภาวะปกติ..."
42070-7 = "แต่จากเหตุการณ์ที่เพิ่งเกิดขึ้นทำให้การสื่อสารและโลจิสติกส์ใน D.U. ก็ถูกทำลายไปเป็นจำนวนมาก และการฟื้นฟู D.U. เพื่อความปลอดภัยและความสะดวกสบายของชาวเมืองจึงถูกจัดให้สำคัญเป็น#nอันดับแรก การหารือในประเด็นดังกล่าวจึงถูกชะลอไว้ค่ะ"
42070-11 = "... ขอบคุณที่ช่วยอธิบายเพิ่มเติมค่ะ"
42070-12 = "อย่างที่ได้บอกว่าไคเซอร์ คอร์เปอเรชั่นนำพลทหารเข้าไปบุกรุกองค์การนักเรียนในเหตุการณ์ที่เพิ่งผ่านมา และยังยึดอำนาจแซงค์ทัมทาวเวอร์ และพยายามใช้อาวุธยุทโธปกรณ์โบราณที่พวกเขาค้นพบด้วยพลัง#nที่ได้รับมาค่ะ"
42070-13 = "โชคดีที่คุณครูของชาเล่ต์และกรรมการสภานักเรียนจากแต่ละเขตปกครองตนเองยื่นมือเข้ามาช่วย ก็เลยสามารถป้องกันไม่ให้สถานการณ์เลวร้ายลงได้ค่ะ"
42070-14 = "... หากหยุดคนพวกนั้นไว้ไม่ได้ ทั้งองค์การนักเรียนและคิโวทอสก็คงพังทลายไปแล้วละค่ะ"
42070-15 = "ทั้งหมดนี้เกิดขึ้นได้เพราะไคเซอร์ คอร์เปอเรชั่นเป็นบริษัทขนาดใหญ่ที่สามารถควบคุมตั้งแต่#nอุตสาหกรรมการป้องกันจนถึงโลจิสติกส์ได้ค่ะ"
42070-16 = "เพื่อไม่ให้เกิดเหตุการณ์แบบนี้ขึ้นอีกในอนาคต ฉันคิดว่าควรลงโทษไคเซอร์ คอร์เปอเรชั่น และคณะผู้บริหารของพวกเขาในระดับสูงสุดค่ะ"
42070-20 = "เดี๋ยวก่อนนะคะ มันก็จริงอยู่ที่ไคเซอร์ คอร์เปอเรชั่นระดมพลทหารมายึดองค์การนักเรียน..."
42070-21 = "แต่ก่อนที่พวกเขาจะเข้าไปยังแซงค์ทัมทาวเวอร์ได้โดยง่าย เจ้าหน้าที่รินก็ตั้งคณะกรรมการมาตรการ#nฉุกเฉินขึ้นด้วยตัวเอง จนทำให้องค์การนักเรียนต้องสับสนอลหม่านไปหมดไม่ใช่เหรอคะ?"
42070-23 = "ตะ... แต่ว่าวันนั้นที่พวกฉันไม่อยู่ก็เพราะมีการลงมติกล่าวโทษรุ่นพี่ริน..."
42070-24 = "นอกจากนี้ยังมีพยานที่พบเห็นเจ้าหน้าที่รินขึ้นไปบนอาวุธยุทโธปกรณ์โบราณที่ ไคเซอร์ คอร์เปอเรชั่น#nค้นพบด้วย..."
42070-25 = "... ที่จริงเจ้าหน้าที่รินอาจจะวางแผนร่วมกับไคเซอร์ คอร์เปอเรชั่นแล้วเล่นละครตบตาเราก็ได้นี่คะ?"
42070-26 = "นะ... นั่นเป็นการกล่าวให้ร้ายในเรื่องที่เป็นไปไม่ได้..."
42070-27 = "... ฉันเข้าใจค่ะว่าทุกคนอาจสงสัยในตัวฉันที่เป็นผู้เกี่ยวข้องกับเหตุการณ์นี้"
42070-28 = "หากมีการลงมติความรับผิดชอบต่อสถานการณ์นี้และเริ่มมีการสืบสวนเกี่ยวกับไคเซอร์ คอร์เปอเรชั่น ฉันก็สัญญาว่าจะให้ความร่วมมือในการสืบสวนอย่างเต็มที่ค่ะ"
42070-30 = "(กระซิบ) นี่... รุ่นพี่อาโออิ เราจะประชุมเสร็จกันกี่โมงน่ะ? เรายังไม่ได้กินข้าวเที่ยงกันเลยนะ?"
42070-31 = "นับตั้งแต่เปิดการประชุม นี่ก็ปาไป 8 ชั่วโมง 32 นาที 15 วินาทีแล้ว"
42070-32 = "แต่วาระที่ต้องคุยต่อยังมีอีก 3 วาระ ก็ให้เป็นข้าวปั้นที่แจกให้เมื่อกี้นี้เป็นข้าวเที่ยงไปแล้วกัน"
42070-33 = "การประชุมมาราธอนไม่ใช่เรื่องน่าแปลกของคณะกรรมการบริหารอยู่แล้วนี่?"
42070-35 = "มีแจกข้าวปั้นด้วยเหรอ? ฉันไม่เห็นจะได้เลย...?"
42070-37 = "คนที่มอบอำนาจเหนือกฎหมายให้คุณครูของชาเล่ต์ตั้งแต่แรกก็คือเจ้าหน้าที่รินนี่คะ?"
42070-38 = "ต่อให้มันมีข้อความนั้นเขียนอยู่บนบันทึกที่ประธานองค์การนักเรียนทิ้งไว้ก็ตาม แต่พวกเราก็ไม่ได้ตรวจ#nสอบว่าบันทึกนั้นเป็นของจริงหรือเปล่า..."
42070-39 = "บันทึกนั้นเป็นของที่ประธานองค์การนักเรียนทิ้งไว้ให้จริงๆ ค่ะ"
42070-40 = "ถ้าต้องการละก็ คุณเอาไปตรวจสอบลายมือเพื่อยืนยันก็ได้นะคะ—"
42070-41 = "หัวหน้าฝ่ายบริหาร ทุกอย่างมีลำดับและขั้นตอนนะคะ!"
42070-42 = "ถึงจะเป็นรักษาการแทนประธานองค์การนักเรียนก็เถอะ แต่ถ้าจะเพิกเฉยการตัดสินใจของคณะ#nกรรมการบริหาร ฉันไม่ทนหรอกนะคะ!"
42070-43 = "ฉันแก้ปัญหาตามระเบียบและขั้นตอนเสมอค่ะ..."
42070-45 = "(กระซิบ) นี่ๆ ซุโมโมะ... เธอได้ข้าวปั้นกับเขาหรือเปล่า?"
42070-46 = "ฮ้าวว... ฉันง่วงแล้ว ไม่กินข้าวปั้นหรอก ไม่ต้องเอามาให้..."
42070-47 = "เดี๋ยวสิ ฉันถามเพราะอยากรู้ว่าของตัวเองอยู่ไหนต่างหาก..."
42070-49 = "แถมไคเซอร์ คอร์เปอเรชั่นยังเป็นบริษัทยักษ์ใหญ่ที่มีไม่มากในคิโวทอสด้วยนะคะ ถ้าพวกเขาหยุดการ#nเคลื่อนไหวของธุรกิจ อาจจะเกิดความวุ่นวายมากกว่าเหตุการณ์ที่ผ่านมาอีกนะคะ"
42070-50 = "ไคเซอร์ อินดัสทรี ไคเซอร์ คอนสตรัคชั่น ไคเซอร์ คอนวีเนียนซ์... ถ้าบริษัทพวกนี้ล้มละลายในเวลา#nเดียวกัน อัตราคนว่างงานก็ต้องพุ่งสูงขึ้นด้วยนะคะ"
42070-51 = "แล้วใครจะรับผิดชอบเรื่องนั้นคะคุณเจ้าหน้าที่?"
42070-52 = "... ถ้าพิจารณาถึงอิทธิพลของไคเซอร์ คอร์เปอเรชั่นแล้ว การคิดค่าปรับอย่างเหมาะสมก่อน แล้วค่อยจัดการทีหลังก็ถือว่า..."
42070-54 = "นี่ๆ โมโมกะ... เธอไม่หิวข้าวบ้างเลยเหรอ?"
42070-55 = "อะไรน่ะ ถึงจะจ้องฉันด้วยสายตาแบบนั้น ฉันก็ไม่ให้มันฝรั่งทอดรสไข่ปลาหรอกนะ"
42070-56 = "ถ้าหิวก็ไปกินข้าวปั้นที่แจกให้สิ อย่ามาแตะต้องมันฝรั่งทอดของคนอื่น (ง่ำๆ)"
42070-58 = "เดี๋ยวสิ แต่ฉันยังไม่ได้ข้าวปั้นอะไรนั่นเลยนะ!"
42070-62 = "... จะให้หารือต่อในตอนนี้คงจะเป็นเรื่องยากนะคะ"
42070-63 = "หัวหน้าฝ่ายบริหาร ทุกคนน่าจะต้องการเวลาคิดอีกหน่อย วันนี้เราหยุดกันแค่นี้แล้วมาหารือกันใหม่#nคราวหลังดีไหมคะ?"
42070-64 = "... เข้าใจแล้วค่ะ"
42070-65 = "นี่ก็ใช้เวลาไปมากแล้ว ถ้างั้นเราจบการประชุมครั้งนี้เพียงเท่านี้แล้วมาต่อกันใหม่พรุ่งนี้แล้วกันค่ะ"
42070-66 = "วันนี้ขอบคุณทุกคนมากค่ะ"
42070-74 = "ฮู่ว..."
42070-75 = "ถึงจะคาดไว้แล้วก็เถอะ... แต่เรื่องนี้มันไม่ง่ายเลยนะคะ"
42070-79 = "วันนี้ขอบคุณมากเลยค่ะ หัวหน้าฝ่ายบริหาร"
42070-80 = "อ่า หัวหน้าสำนักป้องกัน"
42070-81 = "ฉันก็ต้องขอบคุณหัวหน้าสำนักป้องกันเหมือนกันค่ะ"
42070-82 = "แต่การที่มาหาหลังจากปิดการประชุมแบบนี้... ไม่ทราบว่ามีเรื่องที่อยากบอกกับฉันหรือเปล่าคะ?"
42070-83 = "เปล่าหรอกค่ะ ฉันจะมาบอกว่าหัวหน้าฝ่ายบริหารทำงานหนักมากในการประชุมเมื่อสักครู่ค่ะ"
42070-84 = "ไม่หรอกค่ะ"
42070-85 = "... ฉันรู้สึกตั้งแต่เมื่อกี้แล้ว ทุกคนทำกันเกินไปจริงๆ นะคะ"
42070-86 = "นอกจากจะเอาข่าวโคมลอยเกี่ยวกับเจ้าหน้าที่มาพูดในที่สาธารณะแล้ว แต่ละคนยังเอาแต่พูดเรื่องที่#nตัวเองอยากพูดด้วย..."
42070-87 = "การทำหน้าที่ในตำแหน่งผู้นำที่ต้องรวบรวมความคิดเห็นของทุกคนมาตัดสินใจ เป็นเรื่องที่ไม่ง่ายเลย#nนะคะ"
42070-88 = "ช่วยไม่ได้นะคะ การที่เรื่องมันเป็นแบบนี้ก็ถือว่าเป็นความรับผิดชอบของฉันด้วยเหมือนกัน"
42070-89 = "ถึงจะต้องใช้เวลานานหน่อย แต่เราคงทำได้แค่พยายามโน้มน้าวกรรมการอย่างต่อเนื่องค่ะ"
42070-90 = "... ต้องหาความเห็นชอบจากพวกกรรมการจริงๆ เหรอคะ?"
42070-91 = "คุณเป็นหัวหน้าฝ่ายบริหารก็จริง แต่คนที่ทำหน้าที่แทนประธานองค์การนักเรียนอย่างเป็นทางการน่ะ"
42070-93 = "ถ้าอ้างอำนาจของรักษาการแทนประธานองค์การนักเรียนแล้วทำให้เหล่ากรรมการยอมจำนนละก็ น่าจะจัดการงานได้ง่ายกว่านี้นะคะ"
42070-94 = "อำนาจ..."
42070-95 = "มันก็เหมือนจอกศักดิ์สิทธิ์ที่มีพิษแหละค่ะ หัวหน้าสำนักป้องกัน"
42070-96 = "ตอนแรกมันอาจดูเหมือนการรายงานข่าวการรับช่วงต่อที่สะดวก แต่ยิ่งใช้ก็ยิ่งจะสูญเสียคุณค่านั้นไปค่ะ"
42070-97 = "ฉันไม่อาจใช้อำนาจกดขี่ผู้อื่นได้ เพียงเพราะว่าคนอื่นไม่เห็นด้วยกับความคิดเห็นของฉันหรอกค่ะ"
42070-98 = "เพราะตอนแรกฉันเองก็... ไม่ค่อยมั่นใจในตัวเองเท่าไรค่ะ..."
42070-99 = "เฮ้อ..."
42070-101 = "... คุณเนี่ย ไม่มีคุณสมบัติในการเป็นรักษาการแทนประธานองค์การนักเรียนจริงๆ ด้วยนะคะ"
42070-105 = "............"
42070-106 = "... นี่มันอะไรกันคะ หัวหน้าสำนักป้องกัน?"
42070-109 = "คุณริน ฉันไม่ถูกใจคุณมาตั้งแต่เมื่อก่อนแล้วละค่ะ"
42070-110 = "คุณไม่มีด้านไหนที่เหมือนกับประธานองค์การนักเรียนเลยสักนิด แถมคุณยังขโมยความชื่นชอบของ#nเธอไปอีกด้วย..."
42070-111 = "ต่อให้ประธานองค์การนักเรียนหายตัวไป คุณก็ยังพยายามใส่ใจรับฟังความคิดเห็นของผู้คนและดำเนิน#nการตามขั้นตอนอีก..."
42070-112 = "การใช้กฎหมู่แบบนั้นน่ะ มันไม่ได้แก้ปัญหาอะไรเลยค่ะ"
42070-113 = "คิโวทอสต้องถูกบัญชาโดยยอดคนอย่างประธานองค์การนักเรียนค่ะ"
42070-114 = "... ถึงประธานองค์การนักเรียนจะยังคงอยู่ในสถานะหายตัวไป "
42070-115 = "แต่มันเป็นหน้าที่ของหัวหน้าฝ่ายบริหารอย่างฉันที่จะปกป้องอำนวยการชิรานูอิและตำแหน่งนั้นค่ะ"
42070-117 = "ตายจริง อย่างนั้นเหรอคะ?"
42070-118 = "ที่จริงแล้วตอนเกิดเหตุการณ์ที่ผ่านมา ฉันพบเอกสารที่น่าสนใจฉบับหนึ่งจากในห้องใต้ดินของชาเล่ต์#nด้วยค่ะ"
42070-120 = "จดหมายลับของประธานองค์การนักเรียนที่ไม่เคยเปิดเผยที่ไหนมาก่อน"
42070-121 = "จดหมายลับ...?"
42070-122 = "จากรายละเอียดในจดหมายแล้ว เหมือนว่าประธานองค์การนักเรียนจะขอให้หัวหน้าสำนักป้องกันรักษา#nการแทนในกรณีฉุกเฉินนะคะ ไม่ใช่หัวหน้าฝ่ายบริหาร"
42070-123 = "เท่ากับว่าในขณะนี้ที่ประธานองค์การนักเรียนหายตัวไป คนที่ควรได้ตำแหน่งรักษาการแทนไม่ควรจะ#nเป็นคุณ นานากามิ ริน แต่ควรเป็นฉัน... ชิรานูอิ คายะต่างหากล่ะคะ"
42070-124 = "หมายความว่ายังไงคะ..."
42070-125 = "...ว่าแต่ทำไมจดหมายที่มีเนื้อหาสำคัญแบบนี้ถึงถูกซ่อนไว้อย่างลับๆ ในห้องใต้ดินของชาเล่ต์ล่ะคะ?"

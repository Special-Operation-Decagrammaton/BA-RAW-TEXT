42070-20 = "3;린;05\n1;총학생회 임원 B;04;잠시만요. 카이저 코퍼레이션이 사병을 동원해 총학생회를 무력으로 점거한 것은 사실이지만……\n#1;ar\n#3;m5\n#1;em;[반응]"
42070-21 = "1;총학생회 임원 B;05;그들이 쉽게 생텀 타워에 진입할 수 있었던 건 직전에 린 행정관이 독단으로 비상대책위원회를 열어 총학생회를 혼란에 빠트린 탓도 있지 않나요?"
42070-22 = "#all;hide"
42070-23 = "3;아유무;04;하, 하지만 그날 저희들이 자리를 비운 건 린 선배의 문책 결의안 때문에……\n#3;a\n#3;em;[땀]"
42070-24 = "3;총학생회 임원 D;05;게다가 카이저 코퍼레이션이 발굴한 그 초고대 병기에 린 행정관이 탑승하고 있는 모습을 보았다는 증언도 있는데……\n#3;em;…"
42070-25 = "3;총학생회 임원 D;02;……사실은 린 행정관이 카이저 코퍼레이션과 짜고 연기를 했을 가능성도 있지 않나요?"
42070-26 = "3;아유무;05;그, 그런 말도 안 되는 음해를……\n#3;em;[!]"
42070-27 = "3;린;99;……사건의 이해 당사자인 저를 의심하실 수 있다는 것 또한 충분히 이해하고 있습니다."
42070-28 = "3;린;99;이번 사태에 대한 책임 결의안이 채택되고 카이저 코퍼레이션에 대한 조사가 시작된다면, 저 역시 조사에 성실히 임할 것을 약속드리도록 하겠습니다."

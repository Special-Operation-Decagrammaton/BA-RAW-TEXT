[translation]
10016030-1 = "#title;제3화;파란의 물건 빌려오기"
10016030-2 = "5;시논;01\n1;마이;00;안녕하세요, 크로노스 채널의 시청자 여러분!\n#1;a\n#5;a\n#1;em;[반응]"
10016030-3 = "1;마이;03;곳곳에서 본격적인 경기가 시작되며 축제의 분위기도 제법 무르익었는데요, 모두 즐겁게 참여하고 계신가요?"
10016030-4 = "5;시논;02;다시 말씀드리지만, 회장에 직접 방문하지 못하셨더라도 전혀 아쉬워하실 필요가 없습니다."
10016030-5 = "5;시논;07;저희 크로노스 채널을 구독하시면 원하는 경기를 눈앞에서 지켜보는 것처럼 생생하게 관람하실 수 있으니까요!\n#5;em;[음표]"
10016030-6 = "1;마이;00;오전에 있었던 개인 종목 경기가 끝나며 학원별 순위가 속속 갱신되고 있는데요.\n#1;greeting"
10016030-7 = "1;마이;01;현재 학원 순위 1위는……"
10016030-8 = "1;마이;02;이럴 수가, 다름 아닌 게헨나입니다!\n#1;em;[반응]"
10016030-9 = "5;시논;05;게헨나 학원이 주최교인 밀레니엄 사이언스 스쿨은 물론이고 트리니티 종합 학원을 압도하며 선전하고 있다니, 의외네요. 이게 어찌 된 일일까요?\n#5;em;[?]"
10016030-10 = "1;마이;00;점심시간을 앞두고 진행된 많이 먹기 종목에서 게헨나 학원 선수들이 우수한 성적을 기록하며 순위가 뒤바뀐 모양입니다."
10016030-11 = "5;시논;00;기록을 보아하니 게헨나 미식연구회의 와니부치 아카리 선수와 시시도우 이즈미 선수가 엄청난 활약을 한 모양이네요!\n#5;em;[재잘]"
10016030-12 = "1;마이;01;네, 와니부치 아카리 선수는 최신형 완코소바 기계가 사용된 <많이 먹기 대회>에서 엄청난 속도로 소바를 먹어 치워 압도적인 격차로 1위를 차지했습니다!\n#1;em;[!]"
10016030-13 = "5;시논;06;다만, 완코소바 기계가 아카리 선수의 먹는 속도를 따라가지 못하고 과부하를 일으켰기 때문에 신기록 수립은 아직 미정이라고 하네요……\n#5;em;[땀]"
10016030-14 = "1;마이;03;그 외에 <해삼소다 마시기 대회>에서는 이즈미 선수를 제외한 나머지 학생들이 구역질을 하며 쓰러지는 바람에 잠시 경기가 중단되는 일도……\n#1;em;[반짝]"
10016030-15 = "#st;[0,0];instant;1;"
10016030-16 = "#clearST"
10016030-17 = "1;마이;03\n5;시논;00\n#1;h\n#5;h\n#wait;1500"
10016030-18 = "#wait;2000"
10016030-19 = "1;마이;02;응? 식사 시간을 앞두고 있으니 부적절한 영상은 내보내지 말라고요?\n#1;em;[?]"
10016030-20 = "1;마이;05;하지만 여러 학원의 학생들이 한데 모여 구역질을 하는 이 충격적인 영상은 현재 <크로노스 채널>에서 가장 높은 수의 '좋아요'를 기록하고 있는 핫 클립인데—\n#1;hophop"
10016030-21 = "#st;[0,0];instant;1;"
10016030-22 = "#clearST"
10016030-23 = "1;마이;05\n5;시논;01\n#1;h\n#5;h\n#wait;1500"
10016030-24 = "1;마이;05\n5;시논;06\n#1;h\n#5;h\n#wait;2000"
10016030-25 = "1;마이;06;쳇…… 알겠어요, 알겠다고요.\n#1;em;[속상함]"
10016030-26 = "1;마이;01;그럼 잠시 광고 영상 보고 가시겠습니다."
10016030-27 = "5;시논;07;아직 남은 경기가 더 많은 만큼, 모두 끝까지 최선을 다해주세요!\n#5;em;[음표]"
10016030-28 = "3;유우카 체육복ND;04\n#3;a\n#1;hide\n#5;hide"
10016030-29 = "3;유우카 체육복ND;04;하아…… 벌써부터 이렇게 순위가 크게 벌어졌을 줄이야……\n#3;stiff\n#3;em;[속상함]"
10016030-30 = "3;유우카 체육복ND;05;가급적 운영에만 집중하고 경기에는 직접 관여하지 않으려 했는데, 이대로 지켜볼 수는 없겠어."
10016030-31 = "3;유우카 체육복ND;01;떨어진 순위를 조금이라도 만회하기 위해서라면……"
10016030-32 = "3;유우카 체육복ND;05;내가 직접 경기에 참여해야겠어!\n#3;em;[!]"

[translation]
10016030-1 = "第3話;波瀾的借物競賽"
10016030-2 = "正在收看克洛盧斯頻道的各位，大家好！"
10016030-3 = "現在比賽已經正式開始，四處都洋溢著慶典的氣氛。#n大家都有樂在其中嗎？"
10016030-4 = "再重申一次，即便無法親臨會場也不需要覺得可惜。"
10016030-5 = "只要訂閱我們克洛盧斯頻道，就能觀賞如同身歷其境般的轉播！"
10016030-6 = "那麼，回到比賽現場。#n上午的個人項目已結束，學園的排名正在陸續更新中。"
10016030-7 = "目前排名第1的學園是……"
10016030-8 = "格黑娜學園！"
10016030-9 = "沒想到格黑娜學園不僅力壓主辦方千年科學學園，甚至還壓制了三一綜合學園……#n這究竟是為什麼呢？"
10016030-10 = "或許是因為格黑娜學園的選手們在午休前的「大胃王比賽」取得了優秀的成績，#n才會導致排名發生變動。"
10016030-11 = "根據紀錄，美食研究會的鰐渕亞伽里選手和獅子堂泉選手似乎表現得非常活躍！"
10016030-12 = "是的。鰐渕亞伽里選手在與最新型自動餵食蕎麥麵機器的勝負中，#n展現了驚人的速度，以壓倒性的差距取得了第1名！"
10016030-13 = "自動餵食蕎麥麵機器甚至因為趕不上亞伽里選手的速度而發生故障，#n導致新紀錄還無法確定……"
10016030-14 = "此外，在「喝海參蘇打比賽」中，除了泉選手之外的其他學生都因為嘔吐而倒下，#n導致比賽暫時中斷……"
10016030-19 = "那個……是，是……好的，我明白了。#n因為現在是用餐時段，播放該影像的話可能會被檢舉。"
10016030-20 = "但就算那樣，這部各學園學生們不斷倒下的衝擊性影片，#n是我們「克洛盧斯頻道」目前按讚數最高的──"
10016030-25 = "嘖……知道了，知道了啦。"
10016030-26 = "那麼這邊先進一段廣告。#n之後還會有許多精彩的比賽！"
10016030-27 = "請不要轉台，以免錯過奇蹟的瞬間唷！"
10016030-29 = "唉……沒想到排名差距會這麼大……"
10016030-30 = "本來想盡可能地專注於大會的運作，不親自下場比賽的……#n這下可不能繼續袖手旁觀。"
10016030-31 = "如果想挽回落後的名次的話……"
10016030-32 = "我也得參加比賽……！"

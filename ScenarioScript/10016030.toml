[translation]
10016030-1 = "ตอนที่ 3;ยืมของสีฟ้า"
10016030-2 = "สวัสดีค่ะ ผู้ชมช่องโครโนสทุกท่าน!"
10016030-3 = "ตอนนี้การแข่งขันหลายรายการก็เริ่มอย่างจริงจังแล้ว และบรรยากาศของเทศกาลก็กำลังสนุกได้ที่เลย#nค่ะ ทุกคนสนุกกันอยู่หรือเปล่าคะ?"
10016030-4 = "และสำหรับคนไหนที่ไม่ได้มาชมการแข่งขันที่สนามก็ไม่ต้องเสียดายไปนะคะ"
10016030-5 = "หากกดติดตามช่องโครโนสไว้ เท่านี้ก็สามารถรับชมการแข่งขันในรายการที่ตัวเองต้องการดูได้สดๆ จากหน้าจอเลยค่ะ!"
10016030-6 = "การแข่งขันกีฬาประเภทบุคคลสิ้นสุดไปแล้วในช่วงเช้า และตอนนี้ก็กำลังคำนวณอันดับของแต่ละ#nโรงเรียนอยู่ค่ะ"
10016030-7 = "โรงเรียนที่อยู่ในอันดับ 1 ในตอนนี้..."
10016030-8 = "ไม่อยากจะเชื่อเลยค่ะ สถาบันเกเฮนน่าค่ะ!"
10016030-9 = "สถาบันเกเฮนน่าสู้สุดใจจนได้ขึ้นนำเจ้าภาพอย่างโรงเรียนวิทย์มิลเลเนียมและโรงเรียนสามัญทรีนิตี้#nด้วยค่ะ ต้องบอกว่าคาดไม่ถึงเลยละค่ะคุณผู้ชม นี่มันอะไรกันคะเนี่ย?"
10016030-10 = "คงเป็นเพราะนักกีฬาจากสถาบันเกเฮนน่าทำคะแนนได้อย่างโดดเด่นในการแข่งขันกินจุที่จัดก่อนเวลา#nอาหารกลางวัน อันดับก็เลยมีการเปลี่ยนแปลงค่ะ"
10016030-11 = "ดูจากประวัติการแข่งขันแล้ว นักกีฬาวานิบูชิ อาคาริ และชิชิโทอุ อิซุมิจากชมรมชิมอาหารของเกเฮนน่า ทำผลงานไว้ได้อย่างยอดเยี่ยมเลยค่ะ!"
10016030-12 = "ใช่ค่ะ นักกีฬาวานิบูชิ อาคาริกินโซบะด้วยความเร็วสูงใน <การแข่งขันกินจุ> ที่ใช้เครื่องทำวังโกะโซบะ รุ่นใหม่ล่าสุด จนได้อันดับ 1 มาอย่างขาดลอยเลยค่ะ!"
10016030-13 = "แต่เครื่องวังโกะโซบะทำโซบะออกมาได้ไม่ทันตามความเร็วในการกินของนักกีฬาอาคาริ เครื่องก็เลย#nรวนจนยังคำนวณสติถิใหม่ไม่ได้ค่ะ..."
10016030-14 = "นอกจากนี้ใน <การแข่งขันดื่มปลิงทะเลโซดา> นักเรียนคนอื่นยกเว้นนักกีฬาอิซุมิต่างพากันคลื่นไส้จน#nเป็นลมไป การแข่งขันก็เลยต้องหยุดชั่วคราวก่อนค่ะ..."
10016030-19 = "หืม? ใกล้จะถึงเวลาอาหารกลางวันแล้ว ก็เลยไม่ควรนำเสนอภาพการแข่งขันที่ไม่น่าดูงั้นเหรอคะ?"
10016030-20 = "แต่คลิปเด็ดที่ได้เห็นนักเรียนจากหลายๆ โรงเรียนพร้อมใจกันคลื่นไส้นี้ได้ยอด 'ถูกใจ' มากที่สุดเป็น#nประวัติการณ์ของ <โครโนสชาแนล> เลยนะคะ—"
10016030-25 = "ชิ... ก็ได้ค่ะ ก็ได้"
10016030-26 = "งั้นเราจะตัดเข้าโฆษณากันสักครู่นะคะ"
10016030-27 = "การแข่งขันยังเหลืออีกหลายรายการ ทุกคนมาพยายามด้วยกันให้ถึงที่สุดนะคะ!"
10016030-29 = "เฮ้อ... ทำไมอันดับถึงถูกทิ้งห่างเร็วขนาดนี้..."
10016030-30 = "ตั้งใจว่าจะเต็มที่กับการจัดการแข่งขันอย่างเดียวแล้วเชียว แต่ถ้าผลออกมาเป็นอย่างนี้ จะให้เฝ้าดูอย่างเดียวคงไม่ได้"
10016030-31 = "เพื่อรักษาเกียรติของโรงเรียนและไต่อันดับให้สูงขึ้น..."
10016030-32 = "ฉันต้องลงแข่งขันด้วยตัวเองแล้ว!"

[translation]
10016030-1 = "Episode 3; Something Borrowed, Something Blue"
10016030-2 = "Hello and welcome to the Kronos channel!"
10016030-3 = "It looks like the festival is well underway, and there are bustling crowds all over! Is everyone having a great time and eating lots of good food?"
10016030-4 = "And if you're watching from home, don't you worry!"
10016030-5 = "Just subscribe to the Kronos channel to watch the games! It's all the excitement of the festival, from the comfort of your couch."
10016030-6 = "Speaking of the games, the morning matches have just concluded. The ranks for each academy are coming in now!"
10016030-7 = "Who's currently leading? Let's see..."
10016030-8 = "Oh, could it be? It's Gehenna!"
10016030-9 = "Gehenna Academy is ahead of the host, Millennium Science School, and even Trinity General School? I'm shocked! What could have happened?"
10016030-10 = "It looks like Gehenna Academy was leagues ahead of everyone else in the eating contest and managed to pull ahead and take the lead!"
10016030-11 = "Based on the records, Wanibuchi Akari and Shishidou Izumi from the Gehenna Gourmet Research Society were unmatched!"
10016030-12 = "Wow! Akari ate so much soba at such an astronomical speed, she completely overwhelmed the new Wanko soba machine during the eating contest!"
10016030-13 = "Oh, but they said the Wanko soba machine couldn't catch up to Akari and broke down, so they weren't able to determine the official results..."
10016030-14 = "And the sea cucumber soda drinking contest had to be shut down mid-contest due to all the students vomiting and fainting. All except for the one and only, Shishidou Izumi."
10016030-19 = "Huh? The clips are too gross for our viewers? Especially because it's right before lunch?"
10016030-20 = "But the shocking video of students from various academies all vomiting together has gone viral! It's now the Kronos channel's most-liked post!"
10016030-25 = "Hmph... Fine, fine."
10016030-26 = "Now, a message from our sponsor."
10016030-27 = "There are many more exciting games in store for us! Let's keep cheering on our favorite athletes!"
10016030-29 = "*sigh* I didn't think we would be this far behind already..."
10016030-30 = "I wanted to fulfill my duty and focus on operations... But this situation just won't do."
10016030-31 = "If you need something done right..."
10016030-32 = "You have to do it yourself!"

[translation]
1001708-1 = "ฝันร้าย"
1001708-2 = "ฮือ... พุดดิ้งหนึ่งชิ้น พุดดิ้งสองชิ้น..."
1001708-3 = "เฮือก?!"
1001708-7 = "สำนักเลขาธิการเรดวินเทอร์"
1001708-8 = "หืม... นี่เราเผลอหลับไปในเวลาทำงานเหรอเนี่ย"
1001708-9 = "เราคงจะเหนื่อยล้าจากการทำงานหนักช่วงนี้สินะ ถ้างั้นพักงีบอีกหน่อยน่าจะดี"
1001708-10 = "เราหลับไปนานเท่าไรแล้วเนี่ย? ไหนดูซิ..."
1001708-13 = "ห้าโมงเย็นแล้วเหรอ? เลยเวลาของว่างตอนบ่ายมาแล้วนี่!"
1001708-14 = "ทั้งๆ ที่เรากำลังหลับอยู่ แต่พวกนั้นกลับไปเพลิดเพลินกับของว่างกันโดยไม่รอเรา! อภัยให้ไม่ได้!"
1001708-15 = "กองกำลังป้องกัน! กองกำลังป้องกันของเราอยู่ไหน!"
1001708-18 = "นะ... หนวกหูจัง! ในสำนักเลขาธิการที่เงียบสงบ ใครกันที่ส่งเสียงดังหนวกหูแบบนี้เนี่ย?"
1001708-19 = "วะ.. ว่าไงนะ?! เสียงดังหนวกหูอะไรกัน พูดจาหยาบคายกับเราได้ยังไง!"
1001708-20 = "เราจะออกคำสั่งให้สหายไปทำความสะอาดห้องน้ำสักเดือนหนึ่งเลย!"
1001708-21 = "...เจ้าเด็กนี่เป็นใคร?"
1001708-22 = "จะ... เจ้าเด็กนี่งั้นเรอะ?!"
1001708-23 = "หนอย สหาย! จำเราไม่ได้รึไง!"
1001708-24 = "เราที่เป็นทั้งประธานสภานักเรียน เลขาธิการ หัวหน้าฝ่ายตกแต่ง และหัวหน้าฝ่ายทำความสะอาด#nของสหภาพเรดวินเทอร์...ท่านเชริโน่ผู้นี้เนี่ยนะ"
1001708-25 = "อะไรนะ? เด็กน้อยอย่างเธอไม่มีทางเป็นประธานของสหภาพเรดวินเทอร์ได้หรอก"
1001708-26 = "ทำไมถึงไม่เชื่อล่ะ! ดูภาพเหมือนที่แขวนบนผนังสิ..."
1001708-30 = "เอ๋ หายไปไหนแล้ว?"
1001708-31 = "ภาพเหมือนของเราหายไปไหน!"
1001708-33 = "รูปปั้นที่อยู่ตรงทางเดินละ..."
1001708-36 = "พวกสื่อโฆษณาที่สรรเสริญเรา... หายไปหมดอย่างไร้ร่องรอยเลย!"
1001708-38 = "นี่มันเกิดอะไรขึ้นเนี่ย? เกิดการปฎิวัติระหว่างที่เราหลับงั้นเหรอ?"
1001708-39 = "(...)"
1001708-41 = "สหาย! มาพอดีเลย!"
1001708-42 = "สหายคงไม่ลืมว่าเราเป็นใครใช่มั้ย? ไม่ได้ลืมเราที่เป็นทั้งเลขาธิการและประธานสภานักเรียน#nของสหภาพเรดวินเทอร์ใช่มั้ย?"
1001708-43 = "(...)"
1001708-44 = "ทำไมทำหน้าเหมือนเพิ่งเคยเจอกันล่ะ! ลืมเราไปแล้วจริงๆ เหรอ?!"
1001708-45 = "จำได้! บอกว่าจำได้สิ!"
1001708-46 = "(...)"
1001708-48 = "จำได้... ต้องจำเราได้สิ..."
1001708-50 = "[s] \"เชริโน่?\""
1001708-51 = "...เฮือก?!"
1001708-52 = "ทะ... ที่นี่คือ?"
1001708-53 = "[s] \"ละเมออะไรแรงเบอร์นั้นน่ะ?\""
1001708-54 = "แค่ฝันไปเหรอเนี่ย... เฮ้อ โล่งอกไปที..."
1001708-55 = "เป็นความฝันที่น่ากลัวจริงๆ เราฝันว่ากองกำลังป้องกันลืมเรา สหายก็ลืมเราด้วย..."
1001708-56 = "แม้แต่เราที่ไร้ความกลัวก็ยังตะลึงงันในสถานการณ์นั้นเลย"
1001708-57 = "[s] \"ค่อยยังชั่วที่เป็นแค่ความฝัน\""
1001708-58 = "...ไม่สิ ค่อยยังชั่วที่ไหนกัน!"
1001708-59 = "คนอื่นเราไม่รู้หรอกนะ แต่สหายลืมเราคนนี้ได้ยังไงกัน!"
1001708-60 = "[s] \"แต่มันเป็นเพียงความฝันของเธอใช่มั้ยล่ะ?\""
1001708-61 = "ถึงจะอยู่ในความฝัน แต่สหายก็คือสหาย!"
1001708-62 = "เราขอพุดดิ้งที่ดีที่สุดแลกกับสิ่งที่สหายทำไปในความฝัน!"
1001708-63 = "[s] \"ไม่สมเหตุสมผลเลย...\""
1001708-65 = "(หลังจากนั้น คุณครูก็ใช้เวลาช่วงบ่ายไปกับการง้อเชริโน่)"

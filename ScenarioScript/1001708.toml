[translation]
1001708-1 = "惡夢"
1001708-2 = "嘻……一個布丁……兩個布丁……"
1001708-3 = "哇！？"
1001708-7 = "赤冬聯邦學園．會長辦公室"
1001708-8 = "啊，啊……竟然在工作時間睡著了……"
1001708-9 = "是因為最近持續高強度地工作所以累積了疲勞嗎……#n看來增加一點午休的時間比較好呢。"
1001708-10 = "嗯……呃，咱睡了多久……"
1001708-13 = "……下午5點？#n點心時間都過了不是嗎！"
1001708-14 = "就算咱睡著了，把咱丟在一邊自己吃點心這種事也絕不容許！"
1001708-15 = "親衛隊！親衛隊在嗎！"
1001708-18 = "怎麼了怎麼了，是誰在這個辦公室裡面吵啊？"
1001708-19 = "什麼！？竟敢說潔莉諾大人吵！？這個無禮的傢伙，注意你的用詞！"
1001708-20 = "咱可是能對你處以掃廁所一個月的刑罰喔！？"
1001708-21 = "……你是哪位，為什麼有個小不點在這？"
1001708-22 = "小，小不點！？！？"
1001708-23 = "你難道連咱是誰都不知道嗎？是新來的啊！？"
1001708-24 = "咱可是赤冬聯邦學園的學生會長，#n兼書記長，兼環境美化部部長，兼清掃部部長的潔莉諾大人啊！？"
1001708-25 = "啊？像你這種小不點怎麼可能是赤冬聯邦學園的學生會長啊？"
1001708-26 = "你在說什麼！看吧，掛在那面牆上的咱帥氣的肖像畫……"
1001708-30 = "沒，沒有！？"
1001708-31 = "咱的肖像畫跑哪去了！？"
1001708-33 = "連走廊上的銅像都……"
1001708-36 = "所有讚頌咱的東西……全都不見了！？"
1001708-38 = "這是怎麼回事，難道有人在咱睡覺的時候發動革命了嗎！？"
1001708-39 = "（…………）"
1001708-41 = "啊，同志！你來得正好！"
1001708-42 = "你，你沒有忘記咱吧？#n沒有忘記赤冬聯邦學園學生會長兼書記長的咱吧？"
1001708-43 = "（…………）"
1001708-44 = "為，為什麼要用哪種眼神看咱！你不可能忘了咱的吧！？"
1001708-45 = "快想起來！#n……拜託，求求你想起來吧……！"
1001708-46 = "（…………）"
1001708-48 = "算咱求你了……想起來嘛……"
1001708-50 = "[s] 「……潔莉諾？你還好嗎？」"
1001708-51 = "……！"
1001708-52 = "嗯，咦……？"
1001708-53 = "[s] 「你剛剛一直在說夢話，沒事吧？」"
1001708-54 = "原，原來是夢啊……太好了……"
1001708-55 = "真是的，那還真是可怕的夢……不只是親衛隊，就連同志你都忘記了咱的事……"
1001708-56 = "就算咱天不怕地不怕，那種情景還是很讓人錯愕啊……"
1001708-57 = "[s] 「只是做夢真是太好了。」"
1001708-58 = "嗯……不，一點也不好！"
1001708-59 = "其他人也就算了，同志！竟然連你都把咱給忘了！"
1001708-60 = "[s] 「那是夢裡的事吧？」"
1001708-61 = "就算是在夢裡也一樣，同志就是同志！"
1001708-62 = "作為補償，咱要求最高級的布丁！"
1001708-63 = "[s] 「真不講道理……」"
1001708-65 = "（……為了安撫鬧著脾氣，卻又露出了真心難過表情的潔莉諾花了不少時間）"

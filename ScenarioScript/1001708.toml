[translation]
1001708-1 = "Nightmare"
1001708-2 = "Heh! One pudding here, two puddings there..."
1001708-3 = "Wha?!"
1001708-7 = "Red Winter Academy Secretariat Office"
1001708-8 = "I guess I dozed off while working."
1001708-9 = "I guess I'm exhausted from all the work I've been doing recently. I guess I need to take more naps."
1001708-10 = "How long was I sleeping, anyways? Let's see, what time is..."
1001708-13 = "...It's five in the afternoon? It's way past my afternoon snack time!"
1001708-14 = "How dare they enjoy snack time without me, even if I was sleeping! This is unforgivable!"
1001708-15 = "State Guards! Where are my State Guards?!"
1001708-18 = "Ugh, so noisy! Who's disturbing the peace and quiet of the Secretariat?"
1001708-19 = "Wh-What?! Noisy? How dare you speak to me in that tone?!"
1001708-20 = "I sentence you to one month of cleaning the bathrooms!"
1001708-21 = "...Who is this kid?"
1001708-22 = "K-Kid?!"
1001708-23 = "You... You don't know who I am?!"
1001708-24 = "I am Cherino...the Great Leader, esteemed student council president, Beautifier of Lands, and Chief of Sanitation of Red Winter Academy!"
1001708-25 = "What? There's no way that a little kid like you is the president of Red Winter Academy."
1001708-26 = "What's so unbelievable about it? Just look at this portrait hanging on the wall..."
1001708-30 = "I-It's not there!"
1001708-31 = "My portrait is gone!"
1001708-33 = "The statues displayed in the hallway..."
1001708-36 = "Even the propaganda praising my heroics... All of it disappeared without a trace!"
1001708-38 = "What's going on? Was there a revolution while I was sleeping?"
1001708-39 = "(...)"
1001708-41 = "Comrade! Your timing is impeccable!"
1001708-42 = "Y-You haven't forgotten who I am, right? You didn't forget me, the Great Leader and student council president of Red Winter Academy, right?"
1001708-43 = "(...)"
1001708-44 = "Wh-Why are you looking at me like you're seeing me for the first time? Have you really forgotten who I am?!"
1001708-45 = "Remember! Remember me!"
1001708-46 = "(...)"
1001708-48 = "Remember... Remember me..."
1001708-50 = "[s] \"...Cherino?\""
1001708-51 = "*gasp*"
1001708-52 = "Wh-Where am I?"
1001708-53 = "[s] \"What was all that stuff you were saying in your sleep?\""
1001708-54 = "W-Was it all a dream? Phew, that's a relief..."
1001708-55 = "I-It was a terrible dream. The State Guards didn't remember who I was... Even you forgot about me..."
1001708-56 = "Even someone as fearless as me was dumbfounded in a situation like that."
1001708-57 = "[s] \"I'm glad it was just a dream.\""
1001708-58 = "...No, it's not okay at all!"
1001708-59 = "Even if no one else knew, how could you possibly forget me, Comrade?!"
1001708-60 = "[s] \"But that was just in your dream, right?\""
1001708-61 = "Even if it was a dream, you're still you!"
1001708-62 = "As an apology for what you did in my dream, I demand you bring me the finest pudding!"
1001708-63 = "[s] \"That seems pretty unreasonable...\""
1001708-65 = "...After that, I struggled for a while to appease Cherino."

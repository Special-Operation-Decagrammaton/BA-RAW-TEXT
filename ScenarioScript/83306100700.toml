[translation]
83306100700-7 = "อ๊ะ! อิบูกิโดนจับได้ซะแล้ว~!"
83306100700-8 = "นั่นสินะ โดนจับเข้าให้แล้วนะ~ อิบูกิจัง~"
83306100700-9 = "สมกับเป็นประธานกรรมการวินัยจริงๆ เรื่องตาเหยี่ยวอาจไม่ใช่แค่ข่าวลือก็ได้..."
83306100700-11 = "ไม่ใช่อย่างนั้นหรอก เข้าใจผิดแล้วละ"
83306100700-12 = "แหะๆๆ! รุ่นพี่ฮินะสุดยอดไปเลยนะที่หาตัวอิบูกิเจอ!"
83306100700-13 = "อืมม~ สนุกจังเลย! ขอบคุณพี่ๆ ทุกคนที่มาเล่นด้วยกันในวันนี้นะ! อิบูกิสนุกมากเลย!"
83306100700-18 = "ฉันก็สนุกเหมือนกันนะ อิบูกิจัง~"
83306100700-19 = "อืม แบบนี้ก็ไม่ได้แย่นะ"
83306100700-21 = "ถ้างั้นวันหลังต้องมาเล่นด้วยกันอีกนะ~"
83306100700-22 = "อื้ม ได้สิ ไว้ถ้ามีโอกาสแล้วมาเล่นกันใหม่"
83306100700-23 = "ว้าว~! ไว้มาเล่นกันใหม่!"

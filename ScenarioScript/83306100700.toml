[translation]
83306100700-7 = "啊！伊吹被發現了！"
83306100700-8 = "哎呀～被發現了呢～伊吹醬！"
83306100700-9 = "真不愧是風紀委員長。#n原來鷹眼是真的嗎……"
83306100700-11 = "是你誤會了。"
83306100700-12 = "耶嘿嘿！竟然能找到伊吹！陽奈前輩好厲害！"
83306100700-13 = "真好玩～！謝謝姐姐們陪我一起玩！伊吹覺得很開心！"
83306100700-18 = "我也覺得很開心哦！伊吹醬～"
83306100700-19 = "意外的有趣呢。"
83306100700-21 = "那下次還要陪我玩喔～？"
83306100700-22 = "嗯，下次有機會再玩吧。"
83306100700-23 = "好耶～嗯！要再一起玩！"

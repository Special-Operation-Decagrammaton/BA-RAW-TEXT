[translation]
1004005-1 = "#title;저, 훌륭한 쿠노이치가 될 수 있을까요?!"
1004005-2 = "3;츠쿠요;02;서, 서, 서, 선생님……!!\n#3;a\n#3;em;[반응]"
1004005-3 = "3;츠쿠요;05;저, 드, 드디어 찾아버렸는지도 몰라요!\n#3;stiff"
1004005-4 = "3;츠쿠요;99;제가 꿈꾸는……"
1004005-5 = "3;츠쿠요;05;네! 훌륭하고 어엿한 닌자가 되는 법을 말이에요!\n#3;closeup\n#3;greeting\n#3;em;[!]"
1004005-6 = "[s] \"아, 응. 갑작스러워서 따라가기 어려운데, 뭔가 있는 거야? 츠쿠요?\""
1004005-7 = "3;츠쿠요;07;아, 그, 그게 말이죠……!"
1004005-8 = "3;츠쿠요;99;하아, 후우후우……. 하아……. 후우, 후우, 후우우우………. 심호흡, 심호흡하자. 츠쿠요.\n#3;stiff\n#3;em;[땀]"
1004005-9 = "3;츠쿠요;01;네! 이걸 어디서부터 말씀을 드려야 할까……."
1004005-10 = "3;츠쿠요;02;저어 선생님께서 평소에 제가 어엿한 닌자가 되기 위한 수련에 어울려주고 계시지만, 그게, 매일 어울려 주시는 건, 아, 아니잖아요?"
1004005-11 = "3;츠쿠요;01;그, 그게 아무래도 서, 선생님은 평소에도 엄청 바쁘시니까…….\n#3;em;…"
1004005-12 = "[s] \"응, 아쉽지만 그런 편이지.\""
1004005-13 = "3;츠쿠요;07;아! 무, 물론 그렇다고 해서, 그게 따, 딱히 서운하다거나! 선생님을 탓하고 싶다거나 한 건 전혀 아니에요……!\n#3;em;[!]"
1004005-14 = "3;츠쿠요;06;단지, 살짝, 정말 아주 살짝 선생님과 평소 어울리는 시간이 조금 더 많았으면 좋을 텐데……. 라거나."
1004005-15 = "3;츠쿠요;04;어, 어, 어떻게 하면 좀 더 선생님과 함께 수련하는 시간을 늘릴 수 있을까아……? 하고 저도 모르게 생각하게 되는, 그, 그런 부분은 확실히 이, 이이이, 있긴 하지만요오……!\n#3;em;[///]\n#3;stiff"
1004005-16 = "[s] \"으, 응……. 그렇네, 나도 좀 더 시간을 낼 수 있으면 좋을 텐데.\""
1004005-17 = "3;츠쿠요;07;핫?! 제 말은 그게, 그러니까…….\n#3;em;[?!]\n#3;shake"
1004005-18 = "3;츠쿠요;01;그렇다고 평소에 선생님과 수련을 할 수 없는 시간이라고 해서 단련을 게을리하면 안 되는 법이니까……."
1004005-19 = "3;츠쿠요;02;혼자 있을 때라도 제 나름대로 닌자 공부를 하기 위해, 그게, 저어……. 인터넷에 닌자를 검색해 본다던가. 도서관에서 책을 읽는다거나 하고 있는데…….\n#3;em;…"
1004005-20 = "3;츠쿠요;04;트, 특히 풍문으로 듣기로, <허름한 중고 서점 같은 곳이라면 전설의 닌자가 직접 만든 최강인법서가 있을지도 몰라!> 라고 해서 가끔 찾아가거나 하는데요오…….\n#3;hophop"
1004005-21 = "3;츠쿠요;05;꿀꺽……. 그러다가 얼마 전에 들른 중고서점에서 마침내 엄청난 발견을……!\n#3;greeting"
1004005-22 = "[s] \"엄청난 발견……?\""
1004005-23 = "#st;[0,0];instant;1;"
1004005-24 = "#clearST"
1004005-25 = "3;츠쿠요;01\n#3;m2\n#wait;1000"
1004005-26 = "3;츠쿠요;05\n#3;m4\n#wait;2000"
1004005-27 = "3;츠쿠요;01\n#3;m3\n#wait;1000"
1004005-28 = "3;츠쿠요;05\n#3;d\n#wait;2500"
1004005-29 = "3;츠쿠요;05\n#3;a\n#3;closeup\n#wait;1000"
1004005-30 = "3;츠쿠요;05;저……. 이, 이런 책을 찾아내고야 말았어요!\n#3;closeup"
1004005-31 = "[s1] \"……쿠노이치 인법서?\"\n[s2] \"어디로 보나 수상한 물건인걸!\""
1004005-32 = "3;츠쿠요;05;그, 그렇죠? 역시 저만 그렇게 생각한 게 아니지요?!\n#3;em;[반응]\n#3;hophop"
1004005-33 = "3;츠쿠요;05;그, 그렇죠? 역시 저만 그렇게 생각한 게 아니지요?!\n#3;em;[반응]\n#3;hophop"
1004005-34 = "3;츠쿠요;02;겉모습부터 이렇게나 수상하다니……. 역시 여기엔 무언가 비밀이 있을지도 몰라요……. 정말, 엄청난 인법서일지도?!"
1004005-35 = "3;츠쿠요;05;특히 여기! 이걸 봐주세요! 선생님! 여기 <쿠노이치라 불리는 특별한 닌자들을 위한 책!>이라는 문구를 말이에요!\n#3;em;[!]"
1004005-36 = "[s] \"그게 왜……?\""
1004005-37 = "3;츠쿠요;05;아무래도 이걸 보니 쿠노이치라는 건 무려……\n#3;em;…"
1004005-38 = "3;츠쿠요;05;<특별한 닌자>를 말하는 거 같아요!\n#3;closeup"
1004005-39 = "[s] \"………네?\""
1004005-40 = "3;츠쿠요;01;역시, 선생님도 놀라셨죠? 저, 저라도 그럴 거예요. 갑자기 이런 엄청난 이야기를 해도, 믿기 힘든 것도 어쩔 수 없죠.\n#3;em;[땀]\n#3;stiff"
1004005-41 = "3;츠쿠요;02;하지만 이 책의 서문에 적혀 있기를! <뛰어난 쿠노이치는 그 어느 누구라도 능히 제압할 수 있다!> 라고 적혀 있는 걸 보면……."
1004005-42 = "3;츠쿠요;01;쿠노이치란 그만큼 대단한 존재라는 걸 암시하는 거겠죠."
1004005-43 = "3;츠쿠요;99;닌자……. 그중에서도, 또 특별한 이름으로 불리는 쿠노이치…….\n#3;em;…"
1004005-44 = "3;츠쿠요;05;닌자에 대해서, 저도, 자세히는 모르지만……. 대단한 닌자를 가리켜 <중급 닌자> 혹은 <상급 닌자>라고 부른다는 건 알고 있어요……!\n#3;greeting"
1004005-45 = "3;츠쿠요;02;이 <쿠노이치> 라는 건, 어쩌면……. 그 정도로 엄청난 닌자를 가리키는 별명일지도 몰라요……!\n#3;em;[반응]"
1004005-46 = "[s] \"아니, 츠쿠요. 쿠노이치라는 건 어디까지나…….\""
1004005-47 = "3;츠쿠요;05;서, 선생님! 괜찮으시다면 저와 함께, 이 책에 적혀 있는 인법을 수, 수, 수련해 주시지 않겠나요오……?!\n#3;hophop"
1004005-48 = "3;츠쿠요;99;저……! 이 책을 통해 훌륭하고 어엿한 한 사람의 닌자……."
1004005-49 = "3;츠쿠요;03;네! 최고의 쿠노이치가 되고 싶어요!\n#3;em;[반짝]"
1004005-50 = "#na;(그렇게 눈을 반짝이는 츠쿠요 앞에서 차마 츠쿠요가 생각하는 그런 의미는 아닐 거라고 부정할 수가 없었다.)"
1004005-51 = "[ns] \"……맡겨만 줘! 전력을 다해 도와줄게!\""
1004005-52 = "3;츠쿠요;03;네, 네헷! 에헤헷!\n#3;em;[재잘]"
1004005-53 = "#all;hide"
1004005-54 = "#na;(그리하여 츠쿠요와 함께 <쿠노이치 인법서>에 적혀 있는 인법을 차근차근 시험해 보게 되었다.)"
1004005-55 = "3;츠쿠요;01;으음~~ 책에 적혀 있는 첫 번째 인법은……. <인법 알콩달콩 포박의 술>……이군요? 조금 이상한 이름의 인법이네요…….\n#3;em;…\n#3;a"
1004005-56 = "3;츠쿠요;02;인법의 사용 방법은, 우선 이 정도 길이의 밧줄을 준비해서…… 이런 식으로 올가미를 만들 듯 매듭을 만들고……."
1004005-57 = "3;츠쿠요;05;네! 이걸로 준비는 완료되었습니다. 그, 그럼 선생님……. 가, 갈게요요오!\n#3;greeting"
1004005-58 = "[s] (이걸 어떻게 받아쳐준담…….)"
1004005-59 = "3;츠쿠요;05;<인법! 알콩달콩 포박의 술!>\n#3;closeup"
1004005-60 = "#st;[0,0];instant;1;"
1004005-61 = "#clearST"
1004005-62 = "3;츠쿠요;05\n#3;m2\n#wait;1000"
1004005-63 = "3;츠쿠요;05\n#3;greeting\n#wait;1000"
1004005-64 = "3;츠쿠요;05\n#3;m4\n#wait;1000"
1004005-65 = "3;츠쿠요;05\n#3;stiff\n#wait;1500"
1004005-66 = "3;츠쿠요;02;아, 아직 끝이 아니에요! 인법서에 적힌 대로라면 이 상황에서 밧줄을 이렇게 묶고……!\n#3;em;[반응]"
1004005-67 = "3;츠쿠요;01;다음……. 다음 문장이………"
1004005-68 = "3;츠쿠요;02;<상대를 묶는 데 성공했으면 바로 거기서 가슴을 밀어 붙여 더욱 공격적으로 나가는 쪽이 좋다.>……?\n#3;em;[?]"

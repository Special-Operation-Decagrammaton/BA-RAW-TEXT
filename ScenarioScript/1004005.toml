1004005-75 = "3;츠쿠요;01\n#3;closeup\n#3;stiff"
1004005-76 = "#na;(꾸우욱-)"
1004005-77 = "[s] \"자, 잠깐. 츠쿠요. 스토옵……!\""
1004005-78 = "3;츠쿠요;02;네……?\n#3;closeup"
1004005-79 = "3;츠쿠요;04;히, 히야아앗?! 죄, 죄송해요?! 다, 답답하셨죠?! 자, 잠깐!\n#3;closeup\n#3;em;[///]\n#3;stiff"
1004005-80 = "3;츠쿠요;04;앗, 우, 우와아아앙?!\n#3;shake"
1004005-81 = "#st;[0,0];instant;1;"
1004005-82 = "#clearST"
1004005-83 = "3;츠쿠요;04\n#3;falldownR\n#wait;1500"
1004005-84 = "#all;hide\n#wait;1000"
1004005-85 = "#na;츠쿠요;아, 아우우우우……."
1004005-86 = "#all;hide"
1004005-87 = "[ns] \"괜찮아? 츠쿠요? 다친 데는 없고?\""
1004005-88 = "3;츠쿠요;04;네, 넵! 저, 저는 괜찮아요!\n#3;a\n#3;stiff"
1004005-89 = "3;츠쿠요;05;하지만 이 책에 쓰여 있는 쿠노이치의 인법…….\n#3;em;…"
1004005-90 = "[s] \"응. 츠쿠요, 그러니까 그게…….\""
1004005-91 = "3;츠쿠요;03;이렇게나 인법 재현이 어려운 걸 보니……. 여, 역시 최강의 닌자가 사용하는 인법인 거군요!\n#3;em;[반짝]"
1004005-92 = "3;츠쿠요;05;어설프게 도전한 저 자신을 반성하게 돼요!"
1004005-93 = "[s] \"으, 으응…….\""
1004005-94 = "3;츠쿠요;01;첫 인법 수련은 실패했지만, 다, 다음으로 갈게요! 다음 수련은……!\n#3;em;…"
1004005-95 = "#na;(그 뒤로도 츠쿠요와 함께 책에 적혀 있는 쿠노이치의 인법이란 걸 차례차례 수련해 나가기 시작했다.)"
1004005-96 = "3;츠쿠요;03;다음은 이거! <인법 새근새근 곁잠의 술>이래요!\n#3;em;[반응]\n#3;hophop"
1004005-97 = "3;츠쿠요;01;……응? 곁잠? 어떤 의미의 인법인 걸까요?"
1004005-98 = "3;츠쿠요;02;아! 혹시……! 조용히 곁잠을 자는 척하면서 기습을 하는, 그런 인법인 걸까요?!"
1004005-99 = "3;츠쿠요;05;실험해 보죠!\n#3;em;[!]"
1004005-100 = "#all;hide"
1004005-101 = "3;츠쿠요;02;실험해 봤지만, 잘 모르겠어요……. 그럼 다음 인법으로…….\n#3;a\n#3;em;[땀]"
1004005-102 = "3;츠쿠요;01;다음 인법은 이거네요…….\n#3;greeting"
1004005-103 = "3;츠쿠요;02;<인법 허벅지 조이기의 술>……? 허벅지로…… 얼굴을, 조이……나요? 왜 그래야 하는 걸까요?\n#3;em;[?]"
1004005-104 = "3;츠쿠요;02;아, 도구를 쓰는 것보다 그쪽이 좀 더 아, 안전하게 제압할 수 있다거나, 그, 그런 걸까요……?"
1004005-105 = "3;츠쿠요;01;이것도 실험을…….\n#3;em;…"
1004005-106 = "3;츠쿠요;02;……선생님을, 제가 허벅지로……?"
1004005-107 = "3;츠쿠요;04;아, 아뇨. 아뇨! 바, 방금 건 없던 일로! 없던 이야기로 할게요오!!\n#3;em;[///]\n#3;stiff"
1004005-108 = "3;츠쿠요;04;그, 그보다 다음 인법으로……! 다, 다음이에요오!!\n#3;hophop"
1004005-109 = "#all;hide"
1004005-110 = "#na;(그런 식으로 얼마나 쿠노이치의 인법서를 보면서 수련을 이어 나갔을까.)"
1004005-111 = "3;츠쿠요;01;……뭐, 뭔가 이상해요. 인법을 수련하지만, 전혀 수련하는 느낌이 들지 않는 건 왜인 거죠…….\n#3;a\n#3;em;[땀]"
1004005-112 = "3;츠쿠요;06;역시, 이것도 다 제가 부족해서인 걸까요……? 선생님께 자신만만하게 말씀드렸는데. 이래서야…….\n#3;stiff"
1004005-113 = "[s] \"츠쿠요, 그게……. 미처 말하지 못했지만, 쿠노이치란 건 말이야…….\""
1004005-114 = "3;츠쿠요;02;……네? 쿠노이치는 원래부터 대단한 닌자를 가리키는 별명 같은 게 아니라……. 보통 여성 닌자를 가리키는 말이다……?\n#3;em;[?]"
1004005-115 = "3;츠쿠요;01;네? 하, 하지만 평범한 여성 닌자를 가리키는 말이면, 여기에 쓰여 있는 <뛰어난 쿠노이치는 그 어느 누구라도 능히 제압할 수 있다!> 라는 건 무, 무슨 의미인 건가요……?"
1004005-116 = "3;츠쿠요;01;그만큼 대단하니까. 이런 게 적혀 있는 것이………\n#3;em;…"
1004005-117 = "[s] \"잠깐 츠쿠요, 그 옆에 또 다른 문장이 쓰여 있어.\""
1004005-118 = "3;츠쿠요;02;네? 아, 정말이다. 작은 글씨로…….\n#3;em;[반응]"
1004005-119 = "3;츠쿠요;01;<뛰어난 쿠노이치는 그 어느 누구라도 능히 제압할 수 있다!>……"
1004005-120 = "3;츠쿠요;02;<본서 쿠노이치의 인법서 The 특별한 사람을 사로잡기 위한 미인계 편을 이용해 완벽하게 좋아하는 상대를 리드하자!>……?\n#3;em;[?]"
1004005-121 = "3;츠쿠요;02;………….\n#3;em;…"
1004005-122 = "3;츠쿠요;07;…………."
1004005-123 = "3;츠쿠요;04;지, 지, 지, 지, 지, 지, 지…….\n#3;stiff"
1004005-124 = "3;츠쿠요;04;지금까지 제, 제, 제가 해온 게……. 쿠, 쿠노이치의 미, 미, 미인계였던 건가요?!\n#3;em;[?!]\n#fontsize;80\n#3;closeup"

[translation]
1004005-1 = "ฉะ... ฉันจะเป็นคุโนะอิจิที่ยิ่งใหญ่ได้หรือเปล่าคะ?!"
1004005-2 = "คะ... คะ... คะ...คุณครูคะ...!!"
1004005-3 = "ฉะ...ฉันอาจค้นพบแล้วก็ได้ค่ะ!"
1004005-4 = "ความฝันของฉัน..."
1004005-5 = "ใช่แล้วค่ะ วิธีการที่จะเป็นนินจาผู้ยิ่งใหญ่ค่ะ!"
1004005-6 = "[s] \"พูดรัวจนครูตามไม่ทันแล้ว มีอะไรเหรอ สึคุโยะ?\""
1004005-7 = "อ๊ะ คือว่าเรื่องนั้นน่ะค่ะ...!"
1004005-8 = "ฮู่ว ฮู่ววว... เฮ้อ... ฮู่ววว... หายใจเข้าลึกๆ หายใจเข้าลึกๆ สึคุโยะ..."
1004005-9 = "ค่ะ! จะเริ่มเล่าจากตรงไหนก่อนดีนะ..."
1004005-10 = "คือว่าถึงปกติคุณครูจะมาช่วยฉันฝึกฝนในการเป็นนินจาผู้ยิ่งใหญ่อยู่แล้วก็จริง... ตะ...แต่ว่าคุณครูก็มา#nช่วยฉันฝึกทุกวันไม่ได้ใช่มั้ยล่ะคะ?"
1004005-11 = "เพราะว่าปกติแล้วคุณครูเอง... ก็มีงานยุ่งมากเลย..."
1004005-12 = "[s] \"อื้อ น่าเสียดายนะ แต่ครูก็ยุ่งจริงๆ นั่นแหละ\""
1004005-13 = "อ๊ะ! ฉะ...ฉันไม่ได้รู้สึกแย่ที่คุณครูงานยุ่งหรอกนะคะ...! ฉันไม่ได้จะกล่าวโทษอะไรคุณครูเลยนะคะ...!"
1004005-14 = "ก็แค่คิดว่า... ถ้าฉันได้มีเวลาอยู่กับคุณครูมากกว่าเดิมอีกสักหน่อย... ก็คงดีเท่านั้นเอง"
1004005-15 = "ละ...แล้วฉันก็เผลอคิดว่าจะ...จะทำยังไงถึงจะมีเวลาฝึกฝนร่วมกับคุณครูได้มากขึ้น... กะ...ก็เท่านั้นเองค่ะ...!"
1004005-16 = "[s] \"อะ...อื้อ นั่นสินะ ถ้าครูมีเวลาให้สึคุโยะมากกว่านี้ได้ก็คงดีมากเลย\""
1004005-17 = "คะ... คือว่าสิ่งที่ฉันจะพูดก็คือ..."
1004005-18 = "ถะ...ถึงจะไม่ได้ฝึกฝนกับคุณครู แต่เวลาอื่นๆ ฉันเองก็ไม่ควรละเลยการฝึกฝน..."
1004005-19 = "ในตอนที่อยู่คนเดียว... พะ...เพื่อจะศึกษาเกี่ยวกับนินจาด้วยตัวเอง... ฉะ...ฉันก็เลยลองหาข้อมูลนินจา#nในอินเทอร์เน็ต... ระ...หรือไปอ่านหนังสือที่ห้องสมุด..."
1004005-20 = "และจากข่าวลือที่ได้ยินมา... <ถ้าเป็นที่ร้านหนังสือเก่าก็อาจจะมีคัมภีร์ที่นินจาในตำนานเขียนขึ้นมาเอง#nอยู่ก็ได้!> น่ะค่ะ ฉันก็เลยไปที่ร้านหนังสือเก่าบ้างเป็นครั้งคราว..."
1004005-21 = "(กลืนน้ำลาย)... และไม่นานมานี้ฉันก็ค้นพบสิ่งที่ยิ่งใหญ่ที่ร้านหนังสือเก่าที่ฉันไปเป็นประจำเข้า...!"
1004005-22 = "[s] \"การค้นพบที่ยิ่งใหญ่...?\""
1004005-30 = "คือว่า... ฉันเจอหนังสือแบบนี้ด้วยค่ะ!"
1004005-31 = "[s1] \"คัมภีร์ศาสตร์แห่งคุโนะอิจิ...?\"\n[s2] \"ดูยังไงก็เป็นหนังสือที่น่าสงสัยนะ!\""
1004005-32 = "งะ...งั้นเหรอคะ? วะ...ว่าแล้วเชียวไม่ได้มีแค่ฉันที่คิดแบบนั้นสินะคะ?!"
1004005-33 = "งะ...งั้นเหรอคะ? วะ...ว่าแล้วเชียวไม่ได้มีแค่ฉันที่คิดแบบนั้นสินะคะ?!"
1004005-34 = "แค่หน้าปกก็ดูน่าสงสัยแล้ว... คิดแล้วเชียวว่าหนังสือเล่มนี้อาจมีความลับอะไรซ่อนอยู่ก็ได้ค่ะ... หรืออาจเป็นเคล็ดวิชาลับที่ยิ่งใหญ่ก็ได้นะคะ?!"
1004005-35 = "โดยเฉพาะนี่ค่ะ! ดูนี่สิคะ คุณครู...! มีเขียนเอาไว้ว่า <หนังสือเพื่อเหล่านินจาพิเศษ \"คุโนะอิจิ\"> ด้วยค่ะ!"
1004005-36 = "[s] \"เรื่องนั้นมันทำไมเหรอ...?\""
1004005-37 = "คุโนะอิจิที่เขียนอยู่ตรงนี้..."
1004005-38 = "คงหมายถึง <นินจาที่พิเศษ> แน่ๆ เลยค่ะ!"
1004005-39 = "[s] \"ห้ะ...?\""
1004005-40 = "คิดแล้วเชียวว่าคุณครูคงจะตกใจเหมือนกันสินะคะ? ฉะ...ฉันเองก็ตกใจเหมือนกันค่ะ จู่ๆ มาพูดถึงเรื่องที่#nยิ่งใหญ่แบบนี้ มันก็คงยากที่จะเชื่อจริงๆ นั่นแหละค่ะ"
1004005-41 = "แต่ดูจากตรงคำนำของหนังสือเล่มนี้ที่เขียนไว้ว่า <ไม่ว่าใครก็สามารถเป็นคุโนะอิจิที่เก่งกาจได้!> แล้ว...."
1004005-42 = "แสดงว่าคุโนะอิจิเองก็คงเป็นสิ่งที่เยี่ยมยอดมากแน่ๆ เลยค่ะ"
1004005-43 = "ในบรรดานินจา... ก็มีกลุ่มพิเศษที่เรียกว่าคุโนะอิจิอยู่..."
1004005-44 = "ฉันเองก็ไม่ค่อยรู้เรื่องนินจามากเท่าไร แต่ก็พอรู้ว่านินจาเก่งๆ จะเรียกกันว่า <นินจาระดับกลาง> หรือ <นินจาระดับสูง> ค่ะ...!"
1004005-45 = "บางที <คุโนะอิจิ> นี่... ก็อาจจะเป็นชื่อเรียกนินจาที่เก่งกาจมากๆ ก็ได้นะคะ...!"
1004005-46 = "[s] \"เปล่าหรอก สึคุโยะ คุโนะอิจิน่ะ...\""
1004005-47 = "คะ... คุณครูคะ! ถ้าคุณครูไม่ว่าอะไร ระ...ระ...รบกวนช่วยมาฝึกวิชานินจาในหนังสือเล่มนี้กับฉันหน่อย#nดะ...ได้รึเปล่าคะ...?!"
1004005-48 = "คือ...! ถ้าฝึกตามหนังสือเล่มนี้ละก็... นินจาผู้ยิ่งใหญ่..."
1004005-49 = "ค่ะ! ฉันอยากจะเป็นคุโนะอิจิที่เก่งกาจค่ะ!"
1004005-50 = "(พอเห็นสึคุโยะทำตาเป็นประกายแบบนั้น คุณครูก็ปฏิเสธไม่ออกว่าไม่ใช่แบบที่สึคุโยะคิด...)"
1004005-51 = "[ns] \"เชื่อมือครูได้เลย! ครูจะช่วยเต็มที่!\""
1004005-52 = "คะ...ค่ะ! ฮิฮิฮิ..."
1004005-54 = "(จากนั้นคุณครูก็ค่อยๆ เริ่มทดลองวิชานินจาที่เขียนอยู่ใน <หนังสือเคล็ดวิชาคุโนะอิจิ> กันอย่างช้าๆ)"
1004005-55 = "อืม~~ เคล็ดวิชาแรกที่เขียนอยู่ในหนังสือ... <เคล็ดวิชาการจับกุมที่แสนเย้ายวน> งั้นเหรอคะ...? ชื่อวิชาแปลกมากเลยนะคะ"
1004005-56 = "วิธีใช้เคล็ดวิชานี้... ก่อนอื่นก็ต้องเตรียมเชือกที่มีความยาวประมาณนี้มาก่อน... แล้วก็ผูกให้เป็นบ่วงแบบนี้..."
1004005-57 = "ค่ะ! เตรียมพร้อมเรียบร้อยแล้วค่ะ ถะ...ถ้างั้นจะลุยแล้วนะคะ คุณครู...!"
1004005-58 = "[s] (จะรับมือยังไงดีนะ...)"
1004005-59 = "<เคล็ดวิชาการจับกุมที่แสนเย้ายวน!>"
1004005-66 = "ยะ...ยังไม่หมดเท่านี้หรอกนะคะ! ตามที่เขียนเอาไว้ในเคล็ดวิชา... จะ...จะต้องมัดเชือกเอาไว้แบบนี้...!"
1004005-67 = "แล้วก็ประโยคต่อไป..."
1004005-68 = "<พอจับอีกฝ่ายมัดสำเร็จแล้ว จากนั้นก็ให้ดึงเข้ามาใกล้ๆ หน้าอก และรุกเข้าไปอย่างต่อเนื่อง>...?"
1004005-69 = "บะ...แบบนี้เหรอคะ?"
1004005-76 = "(ดึง...)"
1004005-77 = "[s] \"ดะ...เดี๋ยวก่อน สึคุโยะ หยุดก่อน...!\""
1004005-78 = "คะ...?"
1004005-79 = "วะ...ว้ายยย?! ขะ...ขอโทษค่ะ! คะ...คงอึดอัดใช่มั้ยคะ ระ...รอสักครู่นะคะ!"
1004005-80 = "วะ...ว้ายยยย?!"
1004005-85 = "ฮะ...ฮือ..."
1004005-87 = "[ns] \"เป็นอะไรไหมสึคุโยะ? บาดเจ็บตรงไหนรึเปล่า?\""
1004005-88 = "ฉะ...ฉันไม่เป็นไรค่ะ!"
1004005-89 = "แต่ว่าเคล็ดวิชาคุโนะอิจิที่เขียนอยู่ในหนังสือนี่..."
1004005-90 = "[s] \"อืม... สึคุโยะ คือว่าเรื่องนั้น...\""
1004005-91 = "ถ้าฝึกวิชาลำบากขนาดนี้... สะ...สมแล้วที่เป็นเคล็ดวิชาที่สุดยอดนินจาใช้จริงๆ เลยนะคะ!"
1004005-92 = "ทำให้ฉันเห็นเลยค่ะว่าฉันยังอ่อนด้อยแค่ไหน!"
1004005-93 = "[s] \"อะ...อื้อ...\""
1004005-94 = "ถึงเคล็ดวิชาแรกจะล้มเหลว ตะ...แต่ว่าฉันจะลองเคล็ดวิชาต่อไปค่ะ เคล็ดวิชาต่อไปคือ...!"
1004005-95 = "(จากนั้นคุณครูก็เริ่มทดลองวิชานินจาที่เขียนอยู่ในหนังสือเคล็ดวิชาคุโนะอิจิกันอย่างค่อยเป็นค่อยไป)"
1004005-96 = "งั้นต่อไป... <เคล็ดวิชานิทราเคียงกัน> ค่ะ!"
1004005-97 = "หืม...? นอนเคียงข้างกัน? มันเป็นเคล็ดวิชาแบบไหนกันแน่นะคะ?"
1004005-98 = "อ๊ะ หรือว่า... เป็นเคล็ดวิชาที่แกล้งทำเป็นนอนหลับข้างๆ ก่อนจะบุกโจมตีงั้นเหรอคะ?!"
1004005-99 = "มาทดลองกันเถอะค่ะ!"
1004005-101 = "ทดลองแล้วแต่ก็ยังไม่ค่อยเข้าใจเลยค่ะ... ถ้างั้นเคล็ดวิชาต่อไป..."
1004005-102 = "เคล็ดวิชาต่อไปคืออันนี้ค่ะ..."
1004005-103 = "<เคล็ดวิชาขาอ่อนบีบรัด>...? ใช้ต้นขา... บีบรัด... ใบหน้า... เหรอคะ? ทำไมต้องทำแบบนั้นด้วยคะ?"
1004005-104 = "อ๊ะ คงเป็นเคล็ดวิชาที่จะที่จู่โจมได้อย่างปลอดภัยโดยไม่ใช้อาวุธอื่นช่วยสินะคะ...?"
1004005-105 = "ถ้างั้นมาลองกันเถอะค่ะ..."
1004005-106 = "คุณครูคะ ถ้างั้นขอใช้ต้นขาของฉัน..."
1004005-107 = "มะ...ไม่มีอะไรค่ะ! ชะ...ช่วยลืมเรื่องเมื่อครู่นี้ไปด้วยนะคะ!"
1004005-108 = "ถะ...ถ้างั้นเคล็ดวิชาต่อไป...! ใช่แล้ว เคล็ดวิชาต่อไปค่ะ...!!"
1004005-110 = "(การฝึกเคล็ดวิชาคุโนะอิจิก็ดำเนินต่อไปแบบนั้นอยู่พักใหญ่...)"
1004005-111 = "ฉะ...ฉันว่ามันแปลกๆ นะคะ ถึงจะลองฝึกวิชาแล้ว ตะ...แต่ไม่รู้ทำไมถึงรู้สึกเหมือนไม่ได้ฝึกวิชาเลยค่ะ..."
1004005-112 = "คงเป็นเพราะฉันยังมีฝีมือไม่พอสินะคะ...? ทั้งที่พูดกับคุณครูไปอย่างมั่นใจแท้ๆ แต่กลับเป็นแบบนี้..."
1004005-113 = "[s] \"สึคุโยะ คือว่า... ขอโทษนะที่ไม่ได้บอกก่อน แต่ว่าคุโนะอิจิน่ะ...\""
1004005-114 = "คะ...? คุโนะอิจิไม่ใช่ชื่อกลุ่มนินจาที่เก่งกาจตั้งแต่แรกแล้วเหรอคะ... แต่เป็นชื่อเรียกของกลุ่มนินจาหญิง#nทั่วไป...?"
1004005-115 = "คะ? ตะ...แต่ว่าถ้าเป็นคำเรียกสำหรับนินจาหญิงทั่วไป ละ...แล้วที่เขียนไว้ว่า <ไม่ว่าใครก็สามารถเป็น#nคุโนะอิจิที่เก่งกาจได้!> หมายความว่ายังไงกันคะ...?"
1004005-116 = "ทั้งที่เขียนไว้ว่าเก่งกาจขนาดนั้นแท้ๆ..."
1004005-117 = "[s] \"เดี๋ยวก่อนนะ สึคุโยะ ที่ข้างๆ มีอีกประโยคเขียนไว้ด้วย\""
1004005-118 = "คะ? จริงเหรอคะ... ตัวเล็กจัง..."
1004005-119 = "<ไม่ว่าใครก็สามารถเป็นคุโนะอิจิที่เก่งกาจได้!> ..."
1004005-120 = "<หนังสือเคล็ดวิชาคุโนะอิจินี่เป็นศาสตร์แห่งเสน่ห์ที่ใช้สำหรับมัดใจคนพิเศษให้ได้อย่างสมบูรณ์แบบ!>...?"
1004005-121 = "..."
1004005-122 = "..."
1004005-123 = "ทะ... ทะ... ทะ... ทะ... ทะ... ทะ......"
1004005-124 = "ทะ... ทะ... ทะ... ที่ฉันลองฝึกมาถึงตอนนี้... ปะ...เป็นศาสตร์แห่งเสน่ห์ดึงดูดของคุโนะอิจิงั้นเหรอคะ?!"
1004005-125 = "[s] \"ว้าก! สะ...สึคุโยะ! ใจเย็นๆ ก่อน...!\""
1004005-126 = "มะ... มะ... มะ... ไม่นะคะ...! ศาสตร์แห่งเสน่ห์ดึงดูดงั้นเหรอ...! เรื่องแบบนั้นมัน...!"
1004005-127 = "เรื่องน่าอายแบบนั้น...! มะ... มะ... มันยังเร็วเกินไปสำหรับฉันนะคะ--!!"
1004005-131 = "[ns] \"อ๊ะ... ไปซะแล้ว...\""
1004005-133 = "(และหลังจากได้รู้ว่าเส้นทางแห่งการเป็นนินจาผู้ยิ่งใหญ่ยังคงต้องไปอีกยาวไกล... คุณครูก็ได้แต่ยืนมอง#nสึคุโยะที่วิ่งหายไปอย่างรวดเร็ว...)"

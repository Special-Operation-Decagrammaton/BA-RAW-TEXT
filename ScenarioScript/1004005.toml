[translation]
1004005-1 = "Do You Think I Can Be a Great Kunoichi?"
1004005-2 = "S-S-Sensei...!"
1004005-3 = "I-I think I might have found it, finally!"
1004005-4 = "The way I can become..."
1004005-5 = "A great, full-fledged ninja!"
1004005-6 = "[s] \"That's exciting! Tell me about it, Tsukuyo.\""
1004005-7 = "Oh, s-so...!"
1004005-8 = "*pant* *inhale* *exhale* *pant* I need to breathe..."
1004005-9 = "Phew... Where do I start?"
1004005-10 = "You've been helping me in my training, but you can't be there every day."
1004005-11 = "I-I mean, o-of course because you're busy..."
1004005-12 = "[s] \"I'm sorry to say that's true.\""
1004005-13 = "B-But I don't blame you at all! I hope I didn't make you feel bad."
1004005-14 = "I just wish I could spend a little more time with you..."
1004005-15 = "S-Sometimes I even catch myself thinking about how I can extend our training time..."
1004005-16 = "[s] \"Y-Yeah... I'm happy to help.\""
1004005-17 = "S-Sorry! I'm just trying to explain...!"
1004005-18 = "I c-can't see you all the time, but I still need to train."
1004005-19 = "I've decided to study about ninjas when I'm alone... Like...researching online or reading ninja books."
1004005-20 = "I heard a rumor that there's \"a shabby bookstore with the most powerful ninjutsu book, written by a legendary ninja,\" so I've been going to bookstores..."
1004005-21 = "*gulp* Then I finally made a great discovery in a used bookstore!"
1004005-22 = "[s] \"A great discovery...?\""
1004005-30 = "I-I found this book!"
1004005-31 = "[s1] \"A kunoichi ninjutsu book?\"\n[s2] \"Kunoichi books actually exist?\""
1004005-32 = "R-Right?! I was so excited!"
1004005-33 = "R-Right?! I was so excited!"
1004005-34 = "The cover looks strange... It must contain a lot of secrets... Maybe it's that great ninjutsu book I've been looking for!"
1004005-35 = "Especially here, look at this, Sensei! It says, \"A book for special ninjas known as kunoichi!\""
1004005-36 = "[s] \"What about it...?\""
1004005-37 = "Looking at this, I think by kunoichi..."
1004005-38 = "It must be referring to \"special ninjas\"!"
1004005-39 = "[s] \"...Um.\""
1004005-40 = "You're surprised too, right? I-It's just so incredible."
1004005-41 = "But look at the foreword of the book. It says, \"Skilled kunoichi can subdue anyone!\""
1004005-42 = "That means kunoichi are a force to be reckoned with."
1004005-43 = "Among all ninjas...kunoichi are called by a special name..."
1004005-44 = "I don't know everything about ninjas...but Michiru says there are \"intermediate\" or \"advanced\" ninjas..!"
1004005-45 = "Kunoichi could be a nickname for...people who are just as great as those ninjas!"
1004005-46 = "[s] \"No, Tsukuyo. Kunoichi just means...\""
1004005-47 = "S-Sensei! Can you help me learn the ninjutsu in this book?!"
1004005-48 = "I...want to become a great, full-fledged ninja using this..."
1004005-49 = "Yes! I want to be the best kunoichi!"
1004005-50 = "Looking at the starry-eyed Tsukuyo, I couldn't bring myself to tell her the real meaning of the word."
1004005-51 = "[ns] \"...You can count on me! I'll do my best to help you!\""
1004005-52 = "Okay. Heehee! Heeheehee!"
1004005-54 = "Tsukuyo and I started to test out the ninjutsu written in the kunoichi ninjutsu book."
1004005-55 = "Hmm, the first ninjutsu in the book is the...Lovey Dovey Binding Technique... Wh-What a weird name..."
1004005-56 = "How to use this ninjutsu... First, find a rope this length...make a knot that looks like a noose..."
1004005-57 = "All right! It's ready. O-Okay, Sensei... I-I'm gonna start!"
1004005-58 = "[s] \"(How do I get out of this...)\""
1004005-59 = "Ninjutsu! Lovey Dovey Binding Technique!"
1004005-66 = "It's not over yet! According to the ninjutsu book, I should tie the rope like so!"
1004005-67 = "Next...the next step is..."
1004005-68 = "\"Once you successfully bind the other person, push aggressively with your chest\"...?"
1004005-69 = "L-Like this?"
1004005-76 = "*push*"
1004005-77 = "[ns] \"W-Wait, Tsukuyo. Stop!\""
1004005-78 = "Huh?"
1004005-79 = "E-Eeeek?! I-I'm sorry! Was it hard to breathe?"
1004005-80 = "Oh, w-wahhh?!"
1004005-85 = "U-Ugh..."
1004005-87 = "[ns] \"Are you okay, Tsukuyo? Are you hurt?\""
1004005-88 = "I-I'm all right!"
1004005-89 = "The kunoichi ninjutsu in this book..."
1004005-90 = "[s] \"Yeah, Tsukuyo. So...\""
1004005-91 = "The ninjutsus are so difficult! This must be very advanced."
1004005-92 = "I'm ashamed of myself for even trying!"
1004005-93 = "[s] \"Y-Yeah... Maybe we should stop.\""
1004005-94 = "It's o-okay though! Ninjas don't give up!"
1004005-95 = "After that, Tsukuyo and I kept trying to learn kunoichi ninjutsu from the book."
1004005-96 = "The next one is this! The Quiet Sleeping in Unison Technique!"
1004005-97 = "...Hmm? Sleeping in unison? What is this ninjutsu about?"
1004005-98 = "Perhaps you use it to attack your opponent while you sleep! Like the Sleeping Beauty!"
1004005-99 = "Let's try it!"
1004005-101 = "Well, even after trying it, I'm still confused... Let's move on to the next one..."
1004005-102 = "The next ninjutsu is this..."
1004005-103 = "The Thigh Squeeze Technique... Squeeze your opponent's face...with your thighs...? What does that do?"
1004005-104 = "Maybe it's to subdue your opponent if you lost your weapon?"
1004005-105 = "I guess I'll try..."
1004005-106 = "Squeeze your face...with my thighs...?"
1004005-107 = "N-No, no! Let's pretend that one's not in there!"
1004005-108 = "Th-Then, let's move on to the next ninjutsu! N-Next!"
1004005-110 = "I don't even know how many kunoichi ninjutsu we tried."
1004005-111 = "I-It's strange. I'm practicing ninjutsu, but I feel like I'm not learning anything..."
1004005-112 = "Maybe my ninja level is that low... I'm ashamed..."
1004005-113 = "[s] \"Tsukuyo, so...I'm sorry for not telling you sooner, but...\""
1004005-114 = "Kunoichi doesn't mean \"outstanding ninja,\" but an ordinary female ninja?"
1004005-115 = "B-But, if it just meant an ordinary female ninja, why does it say, \"Skilled kunoichi can subdue anyone!\" What does that mean?"
1004005-116 = "I thought it meant they're super great..."
1004005-117 = "[s] \"Wait, Tsukuyo. There's another sentence under it.\""
1004005-118 = "Oh! It's so small I missed it."
1004005-119 = "\"Skilled kunoichi can subdue anyone!\""
1004005-120 = "\"Game of temptation! Take advantage of the techniques in Kunoichi Ninjutsu: How to Seduce Someone Special!\""
1004005-121 = "..."
1004005-122 = "..."
1004005-123 = "Wh-Wh-Wh-Wh-Wh..."
1004005-124 = "What I've been doing until now...was a kunoichi game of seduction?!"
1004005-125 = "[s] \"Whoa! Tsukuyo, calm down!\""
1004005-126 = "AAAHHH! No! G-Game of seduction?! Th-That's...!"
1004005-127 = "That's so shameful... I'm too young for that!!!"
1004005-131 = "[ns] \"Oh... She's gone.\""
1004005-133 = "I stood there and said goodbye to Tsukuyo in my head. I think she realized she still had a long way to go to become a full-fledged ninja."

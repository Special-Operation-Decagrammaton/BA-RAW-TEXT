[translation]
1004005-1 = "出色的，女忍者……！"
1004005-2 = "老師……！！"
1004005-3 = "我，找到了！"
1004005-4 = "成為獨當一面，"
1004005-5 = "出色的忍者的方法……！"
1004005-6 = "[s]「那個，原來如此……？」"
1004005-7 = "那就是啊……！"
1004005-8 = "不好意思，稍微深呼吸，一下……吸──吐──吸──吐──。"
1004005-9 = "稍微，冷靜下來了……"
1004005-10 = "那個，雖然老師平常，會陪著我做，為了成為獨當一面的忍者的修練……"
1004005-11 = "不過，老師也是很忙碌的，身分。"
1004005-12 = "[s]「嗯，沒辦法每天陪妳抱歉哦。」"
1004005-13 = "啊，不……！並不是想責備之類的，不是那種，事……！"
1004005-14 = "啊，不過……稍微，只有稍微一點，老師陪我的時間，如果能稍微多一點的話就好了，之類的……"
1004005-15 = "這是那個，該說不是謊言嗎，雖然有這個想法……那個，不好意思，雖然不是，想讓老師困擾……！"
1004005-16 = "[s]「唔，嗯……我會盡可能的，調整時間哦。」"
1004005-17 = "謝謝，老師……啊，那個，話題，偏移了……"
1004005-18 = "沒辦法和老師一起，修行的日子也……不能，怠慢鍛鍊，我是這麼想的……"
1004005-19 = "所以，在網際網路檢索，之類的……雖然也會，看書……"
1004005-20 = "因為聽到了「也許在古書店，會有傳說忍者寫的最強的忍術書！」這樣的風聲……"
1004005-21 = "所以，在前幾天逛的古書店，竟然……！"
1004005-22 = "[s]「竟然……！？」"
1004005-30 = "找到了，這樣的書……！"
1004005-31 = "[s1]「……『女刃心的入門』？」\n[s2]「總覺得，看起來很可疑……」"
1004005-32 = "啊，果然，會那麼認為吧……！？"
1004005-33 = "啊，果然，會那麼認為吧……！？"
1004005-34 = "這個可疑性……我想，一定寫著，很厲害的祕密……！"
1004005-35 = "請看這個，「贈予被稱為女刃心，特別的忍者們」，這樣寫著……！"
1004005-36 = "[s]「……？」"
1004005-37 = "看來所謂的「女刃心」，"
1004005-38 = "指的似乎是「特別的忍者」……！"
1004005-39 = "[s]「嗯嗯……？」"
1004005-40 = "很吃驚，對吧。我，第一次知道。"
1004005-41 = "在前文，也像這樣，寫著。「優秀的女刃心，無論是什麼樣的對手都能立刻壓制」……"
1004005-42 = "是很厲害的，忍者呢。"
1004005-43 = "忍者……在那其中，又有別的區分，女刃心……"
1004005-44 = "忍者的事情，我也，還不是，很清楚……不過「中忍」「上忍」這種名詞，我知道……！"
1004005-45 = "這個所謂的「女刃心」，該不會……也許是那麼強，很厲害的忍者，也說不定……！"
1004005-46 = "[s]「那個……所謂的女刃心是，那個……」"
1004005-47 = "老師……！為了成為「女刃心」，請問可以幫我，進行修行嗎……！"
1004005-48 = "我想，通過這本書……"
1004005-49 = "成為，最強的，女刃心……！"
1004005-50 = "（面對眼睛那麼閃閃發光了月夜，要立刻說出「並不是唷」讓我有點忌憚）"
1004005-51 = "[ns]「……好，總之稍微試試看吧。」"
1004005-52 = "好的……！"
1004005-54 = "（就這樣和月夜一起，嘗試了「女刃心的入門」裡寫的忍術）"
1004005-55 = "那個，最初的忍術是，「卿卿我我捕獲之術」……有點奇怪的名字呢……？"
1004005-56 = "做法首先是，準備繩子……打一個結……"
1004005-57 = "那個，準備，完成了。那麼，我要開始了……！"
1004005-58 = "[s] （該怎麼迴避呢……）"
1004005-59 = "「卿卿我我捕獲之術」……！"
1004005-66 = "那個，把繩子，這樣綁……！"
1004005-67 = "接下來……"
1004005-68 = "「把胸部貼上去」？"
1004005-69 = "姿勢的，問題……？是，這樣嗎……？"
1004005-76 = "（軟綿綿）"
1004005-77 = "[s]「月夜！STOP！」"
1004005-78 = "……？"
1004005-79 = "呀啊啊！？不好意思，很痛苦吧……！？"
1004005-80 = "啊哇哇！？"
1004005-85 = "啊嗚嗚嗚……"
1004005-87 = "[ns]「月夜，還好嗎？有受傷嗎？」"
1004005-88 = "啊，我沒事……"
1004005-89 = "不過這個忍術……"
1004005-90 = "[s]「那個，該怎麼說呢那個……」"
1004005-91 = "沒想到要再現，會這麼的困難……果然是，非常強的忍者，使用的忍術呢……！"
1004005-92 = "修行，可能，還不夠……！"
1004005-93 = "[s]「說得，也是呢……？」"
1004005-94 = "鼓起幹勁，進行，下一個吧……！"
1004005-95 = "（這之後也和月夜一起，逐一嘗試了忍術）"
1004005-96 = "接下來是，「陪睡之術」……"
1004005-97 = "是什麼意思呢？"
1004005-98 = "啊，我也許知道了，也說不定……！裝作陪睡，將脖子喀的，意思……！？"
1004005-99 = "老師，請問可以，試試看嗎……！"
1004005-101 = "那麼，下一個忍術……"
1004005-102 = "接下來是，"
1004005-103 = "「大腿夾擊之術」……那個，以大腿將對方的臉，夾住……？為什麼，要做那種，事呢？"
1004005-104 = "是因為比道具，還要安全嗎……？"
1004005-105 = "那麼事不宜遲……"
1004005-106 = "將老師的臉，用大腿……？"
1004005-107 = "那個，當作沒有這個吧……！！"
1004005-108 = "總之，下一個……！"
1004005-110 = "（就這樣看著「女刃心的入門」持續了修行（？）……）"
1004005-111 = "這樣子，有在，修行嗎……？"
1004005-112 = "果然，對我來說，還太早了……？"
1004005-113 = "[s]「月夜，一直沒能說出口很抱歉，那個……」"
1004005-114 = "咦？女刃心不是指「強大的忍者」……？"
1004005-115 = "是那樣嗎……？那個，那麼，這裡寫的「優秀的女刃心，無論是什麼樣的對手都能立刻壓制」指的是……？"
1004005-116 = "不是指優秀的，忍者的，意思嗎……？"
1004005-117 = "[s]「那──個……啊，這裡有寫。」"
1004005-118 = "啊，好像有小文字……那個……"
1004005-119 = "「優秀的女刃心，無論是什麼樣的對手都能立刻壓制」……"
1004005-120 = "「精通這裡寫著的忍術，以色誘來領導在意的那個人吧！」"
1004005-121 = "…………"
1004005-122 = "…………"
1004005-123 = "咦，咦咦！？"
1004005-124 = "也就是說，那個，目前為止的，全部都是「色誘」，是這個意思嗎……！？"
1004005-125 = "[s]「月夜，冷靜一點……！」"
1004005-126 = "怎麼會，色誘什麼的……！"
1004005-127 = "那種事，對我來說，還太早了……！！！"
1004005-131 = "[ns]「跑掉了……」"
1004005-133 = "（想著要成為忍者真辛苦呢，同時在心中向月夜道歉了）"

[translation]
1003302-1 = "溫柔的重逢"
1003302-2 = "（因稍微有事情離開夏萊，走在街上時……）"
1003302-3 = "喂喂喂！你做什麼啊！我的冰淇淋！你怎麼賠我！"
1003302-4 = "噫！？怎，怎麼了嗎！？"
1003302-5 = "還不是因為你剛才打噴嚏的關係，害大姊嚇得冰淇淋都掉了！#n你知道大姊有多期待嗎！"
1003302-6 = "你這傢伙！不可原諒！#n竟然奪走了我的「春季限定．GIGA巨無霸豪華香草冰淇淋佐水果Mk.02」！"
1003302-7 = "怎，怎麼這樣！我明明只是打噴嚏而已！？"
1003302-8 = "[s]「那個……」"
1003302-9 = "啊？你誰啊？"
1003302-10 = "大姊，這傢伙是那個「夏萊」的老師啦。"
1003302-11 = "嘿……夏萊的老師啊……那個名人想妨礙我們是嗎？"
1003302-12 = "那也無所謂，就由你來賠償這個冰淇淋吧！"
1003302-13 = "[s1]「真不講理！」\n[s2]「雖然想買給你，不過錢包現在有點營養不良……」"
1003302-16 = "我才不管！既然如此就用身體來──"
1003302-27 = "[ns]「……？」"
1003302-28 = "非，非常感謝您救了我！"
1003302-29 = "差點就因為打噴嚏被搶劫了！"
1003302-30 = "不愧是夏萊的老師！"
1003302-31 = "[s]「不，我什麼都……」"
1003302-32 = "可能因為現在是季節變化的時節吧，噴嚏實在停不下來……"
1003302-33 = "哈，哈……"
1003302-34 = "哈啾！"
1003302-38 = "明明只是打噴嚏而已！？"
1003302-43 = "[ns3]「在這個時機襲擊，該不會是……」\n[ns4]（先到別的地方去吧……！）"
1003302-47 = "（躲避著如雨般降下的子彈和爆炸，開始拚命地逃跑）"
1003302-51 = "等等！這裡目前在進行道路施工！"
1003302-52 = "馬上就要進行爆破作業所以禁止通行──"
1003302-56 = "什麼！？竟然代替我們進行了爆破作業！？"
1003302-62 = "（這之後也想辦法躲避爆炸，盡可能逃向人煙稀少的地方……）"
1003302-64 = "哦，那不是夏萊的老師嗎？"
1003302-65 = "真的耶。喂～老師！"
1003302-66 = "為什麼滿臉通紅的在跑啊，有什麼有趣的……"
1003302-71 = "咕哈啊！？"
1003302-76 = "[ns]「……抱歉！」"
1003302-86 = "（就這樣拚命地跑著，總算抵達了幾乎沒有人影的地方）"
1003302-89 = "[ns]「哈啊，哈啊……這裡應該總算……」"
1003302-93 = "呵呵呵，總算讓礙事者全都消失了呢……"
1003302-98 = "[ns5]「我就知道是這麼回事……」\n[ns6]「剛才那些都是你做的嗎，若藻……」"
1003302-99 = "哎呀……老師您，已經察覺是我了嗎……？"
1003302-100 = "哎呀……老師您，已經察覺是我了嗎……？"
1003302-101 = "也就是說……"
1003302-102 = "您一直等待著我的到來……？"
1003302-103 = "[s]「呃，嗯……？」"
1003302-104 = "我，我……！"
1003302-107 = "― 好開心……！"
1003302-110 = "— 若藻我，"
1003302-112 = "— 一心只想像這樣與閣下相見……！[wa:2970] "
1003302-115 = "― 以求直接，將這份心情……[wa:2070] "
1003302-117 = "― 這份思念，傳達給您……[wa:2070] "
1003302-120 = "― 能如這般與您相會，肯定也是……[wa:1020] "
1003302-122 = "― 受紅線連繫的命運所引導……[wa:2020] "
1003302-125 = "― 啊，啊……那，那樣盯著我看的話……！[wa:4480] "
1003302-127 = "― 就算是我，也是會害羞的……[wa:3100] "
1003302-130 = "― 僅僅因為閣下的視線，就從身體各處……[wa:2740] "
1003302-132 = "― 溢出了心癢難耐的感覺……[wa:580] "
1003302-135 = "― 不過……假如閣下如此希望的話……好的♡[wa:7420] "
1003302-138 = "― 來，請來這邊。[wa:1550] "
1003302-140 = "― 再更加，靠近我身邊……唔呵呵呵呵♡[wa:4650] "
1003302-143 = "來吧老師，再更靠近我一點……"
1003302-144 = "[s]「若藻。」"
1003302-145 = "呀……！？"
1003302-146 = "[s7]「怎麼能像那樣傷害別人呢！若藻！」\n[s8]「不是說了不可以造成他人的困擾嗎？」"
1003302-149 = "但，但是……"
1003302-150 = "我，無論如何都沒辦法忍受……！"
1003302-151 = "[s]「無論有什麼理由，那樣傷害別人都是不對的。」"
1003302-152 = "可，可是若藻我心中的這股感情……"
1003302-153 = "已經在不知不覺間膨脹至此，因而無法抑制……"
1003302-154 = "唔……"
1003302-155 = "[s]「你的心意我很高興，但這樣下去的話我可能會無法喜歡若藻哦。」"
1003302-156 = "……！！"
1003302-157 = "請，請不要討厭我！"
1003302-158 = "假如，萬一被閣下討厭的話，我……！"
1003302-159 = "對不起對不起對不起！對不起……！"
1003302-160 = "今後，我會努力不讓老師失望的……！請不要……！"
1003302-161 = "請不要討厭我……請您，原諒我……"
1003302-162 = "[s]「……嗯，只要若藻願意反省的話。」"
1003302-166 = "老師……"
1003302-170 = "啊……又傳來了妨礙閣下和我的警笛聲……"
1003302-171 = "那麼老師。若藻我，為了不讓老師再次失望，今後會更加注意的。"
1003302-172 = "今天……雖然必須在此向您告別……"
1003302-173 = "之後，還能再次……前來見您嗎……？"
1003302-174 = "[s]「……嗯。」"
1003302-175 = "……是！那麼再會！"
1003302-180 = "（就這樣目送了氣勢如虹，不知去向的若藻離開）"

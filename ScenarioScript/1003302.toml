[translation]
1003302-1 = "A Gentle Reunion"
1003302-2 = "I had business to attend to, so I left the Schale office and was walking down the street."
1003302-3 = "Hey! What are you gonna do about my ice cream?!"
1003302-4 = "Ahhh! Wh-What are yelling at me for?!"
1003302-5 = "She dropped her ice cream because YOU sneezed out of nowhere!#nDo you have any idea how much she was looking forward to it?!"
1003302-6 = "Take responsibility! You need to reimburse me for depriving me of my#nVanilla Fruit Giga Jumbo Deluxe Soft Ice Cream Mk.02!"
1003302-7 = "P-Please stop being so unreasonable! All I did was sneeze."
1003302-8 = "[s] \"Hey. What's going on here?\""
1003302-9 = "And who are you supposed to be?"
1003302-10 = "Hold up. That's the Sensei person from Schale everyone talks about."
1003302-11 = "So you're that famous Sensei, huh? And now you're sticking your nose#ninto our business?"
1003302-12 = "Fine. Then YOU'LL be the one to pay for my ice cream!"
1003302-13 = "[s1] \"Now I scream!\"\n[s2] \"Actually, my wallet's feeling a little light...\""
1003302-16 = "Huh?! Don't play games with me. If you can't pay for it, then—"
1003302-27 = "[ns] \"What was that?\""
1003302-28 = "M-My hero! Thank you so much!"
1003302-29 = "I was nearly assaulted just for sneezing."
1003302-30 = "I knew I could count on Schale's famous Sensei!"
1003302-31 = "[s] \"Uh, sure, but I didn't...\""
1003302-32 = "It must be my allergies acting up. It is that time of year..."
1003302-33 = "Ah... Ah..."
1003302-34 = "Achoo!"
1003302-38 = "Not again! All I did was sneeze!"
1003302-43 = "[ns3] \"Gunfire! Could it have been...?!\"\n[ns4] \"(I need to get out of here!)\""
1003302-47 = "I desperately ran away, avoiding more gunfire and sudden explosions."
1003302-51 = "Hey, you can't go through here! This is a construction zone!"
1003302-52 = "The place is rigged for controlled demolition, so—"
1003302-56 = "What the...?! Did our explosives get set off?!"
1003302-62 = "I ran as fast as could away from the blast until I was someplace less crowded."
1003302-64 = "Well, well. If it isn't Schale's Sensei. "
1003302-65 = "*giggle* Good seein' ya, Sensei!"
1003302-66 = "You look so flustered. Something up?"
1003302-71 = "GAHHH!"
1003302-76 = "[ns] \"Tch!\""
1003302-86 = "I kept running and running until I found somewhere that was almost completely secluded."
1003302-89 = "[ns] \"*pant* *pant* This should be far enough...\""
1003302-93 = "Heehee. All the interlopers are finally out of our way."
1003302-98 = "[ns5] \"I had a hunch it was you.\"\n[ns6] \"Long time no see, Wakamo.\""
1003302-99 = "Oh? You knew the entire time?"
1003302-100 = "Oh? You knew the entire time?"
1003302-101 = "Could that mean..."
1003302-102 = "...you were only leading me somewhere we could be alone?"
1003302-103 = "[s] \"U-Uh...\""
1003302-104 = "I... I...can't hold myself back for another second!"
1003302-107 = "― I'm so happy!"
1003302-110 = "― I, Wakamo,"
1003302-112 = "― did everything I could to bring us together, my darling.[wa:1370] "
1003302-115 = "― How I've longed to express[wa:1510] "
1003302-117 = "― these feelings to you again...[wa:1310] "
1003302-120 = "― Surely, we owe our reunion to[wa:460] "
1003302-122 = "― the red thread of fate that binds us together.[wa:700] "
1003302-125 = "― Ah... I... When you look  at me like that,[wa:3520] "
1003302-127 = "― even I can't help but blush...[wa:2420] "
1003302-130 = "― I can't hold back my pent up desires[wa:2020] "
1003302-132 = "― when I feel your gaze upon me.[wa:10] "
1003302-135 = "― However...if that is what you really want...then, okay. ♥[wa:5900] "
1003302-138 = "― Come here. Closer...[wa:1030] "
1003302-140 = "― Just a little closer. Right by my side. Heehee. ♥[wa:3370] "
1003302-143 = "That's it, Sensei. Just a little closer."
1003302-144 = "[s] \"Wakamo!\""
1003302-145 = "*gasp*!"
1003302-146 = "[s7] \"What were you thinking back there?!\"\n[s8] \"Didn't I tell you not to hurt innocent bystanders?\""
1003302-149 = "Y-Yes, but... "
1003302-150 = "All I wanted was to see you again!"
1003302-151 = "[s] \"And I told you it can't come at the expense of others.\""
1003302-152 = "B-But, the feelings in my heart...!"
1003302-153 = "I felt like it was going to burst out of my chest.#nI had no other choice."
1003302-154 = "Please believe me..."
1003302-155 = "[s] \"You don't want to disappoint me, do you?\""
1003302-156 = "...!"
1003302-157 = "No, Sensei! Anything but that!"
1003302-158 = "I don't know what I would do with myself if you gave up on me...! "
1003302-159 = "I'm sorry, I'm sorry, I'm sorry!#nPlease forgive me, Sensei!"
1003302-160 = "I'll never do anything to disappoint you again, so please!"
1003302-161 = "Please forgive me. I'll do anything!"
1003302-162 = "[s] \"Only if you're genuinely remorseful for what you did.\""
1003302-166 = "Sensei..."
1003302-170 = "Ah. Here they come again to interrupt us."
1003302-171 = "Okay, Sensei. I vow to you that I will never do anything to disappoint you ever again."
1003302-172 = "I'll let you go for tonight, but may I..."
1003302-173 = "...come to see you again later?"
1003302-174 = "[s] \"...Sure.\""
1003302-175 = "Yay! Okay. Until then."
1003302-180 = "I watched Wakamo as she dashed off."

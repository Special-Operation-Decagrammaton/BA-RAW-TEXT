[translation]
10027030-1 = "ตอนที่ 3;ตีพิมพ์ พิมพ์เพิ่ม วางจำหน่าย"
10027030-7 = "ยัยทาคาเนะ... พูดอะไรไม่เห็นรู้เรื่องเลย "
10027030-8 = "ฉันยังไม่เห็นจะเข้าใจอะไรเลยสักนิด!"
10027030-9 = "[s] \"แต่ว่าเธอก็ให้เบาะแสเรามานะ\""
10027030-10 = "อืม.... ก็จริงอยู่ แต่ทำไมถึงได้ดูต่างออกไปจากทุกทีเลย"
10027030-11 = "[s] \"หรือว่า... จะรู้อะไรเกี่ยวกับ <ลูน่า>?\""
10027030-12 = "ไม่รู้สิ... แต่ที่บอกให้ไปชมรมสื่อสิ่งพิมพ์ก็อาจจะพูดถูกแล้วก็ได้"
10027030-13 = "บอกตรงๆ เลยนะ ฉันไม่ได้เต็มใจจะไปเท่าไรนักหรอก พอจะทำตามที่ยัยนั่นบอกเลยรู้สึกเหมือนเป็น#nฝ่ายแพ้ยังไงไม่รู้"
10027030-14 = "ในชมรมสื่อสิ่งพิมพ์มันจะมีข้อมูลของหนังสือทั้งหมดที่ถูกตีพิมพ์ในเรดวินเทอร์มาจนถึงตอนนี้อยู่น่ะ"
10027030-15 = "และจากข้อมูลทั้งหมดที่มี... แน่นอนว่าต้องมีของ <ลูน่า> ด้วย"
10027030-23 = "[ns] \"ที่นี่คือชมรมสื่อสิ่งพิมพ์เหรอ...?\""
10027030-24 = "ใช่ หนังสือส่วนใหญ่ที่หมุนเวียนอยู่ในสหภาพเรดวินเทอร์ถูกผลิตอยู่ที่นี่"
10027030-25 = "[s] \"สุดยอดไปเลย\""
10027030-26 = "สุดยอดไปเลยงั้นเหรอ... ชมออกมาอย่างบริสุทธิ์ใจเลยนะ"
10027030-27 = "ที่นี่น่ะ... ต้องบอกว่าพิมพ์อะไรที่ไม่ธรรมดาออกมาเยอะเลยละ..."
10027030-28 = "...ถึงตอนที่พิมพ์โดจินชิของ <ชมรมแนวร่วมปลดปล่อยความรู้> ฉันจะรู้สึกติดหนี้บุญคุณอยู่บ้างก็เถอะ จะให้คิดว่าที่นี่เป็นที่แปลกประหลาดมันก็กระไรอยู่"
10027030-33 = "ต่อให้พูดเบาๆ แบบนั้นแต่ก็ได้ยินกันทั่วเลยนะคะ"
10027030-39 = "เหวอ... ออกมาแล้ว..."
10027030-40 = "ค่ะ หัวหน้าชมรมสื่อสิ่งพิมพ์ที่ไม่ค่อยอยากจะเจอเท่าไรปรากฏตัวออกมาแล้วค่ะ ถึงจะไม่รู้ว่าลมอะไร#nหอบคุณมาถึงที่นี่ได้ แต่ก็ยินดีที่ได้เจอนะคะ เมรุ หรือจะให้เรียกว่าเมรูริตามนามปากกาดีคะ?"
10027030-41 = "...เรียกแค่เมรุเถอะ ยาคุโมะ"
10027030-42 = "[s] \"หัวหน้าเหรอ...?!\""
10027030-43 = "ใช่ค่ะ ที่นี่คือชมรมสื่อสิ่งพิมพ์ เราดูแลทุกอย่างที่ครอบคลุมเกี่ยวกับหนังสือ ตั้งแต่การพิมพ์ การเข้าเล่ม การห่อปก การจัดการ การค้า ธุรกิจ จนถึงการขยายกิจการเลยค่ะ และฉันก็เป็นหัวหน้าของที่นี่ อารามากิ ยาคุโมะค่ะ "
10027030-44 = "เพิ่มเติมก็คือ ฉันรับผิดชอบเรื่องการพิมพ์นิตยสาร <เรดแบร์> อยู่ด้วยค่ะ ฮี่ฮี่ฮี่"
10027030-48 = "[ns1] \"ไม่ธรรมดาเลยนะ... นี่คือ <เรดแบร์> เหรอ?>\"\n[ns2] \"เหมือนเคยเห็นมาก่อนเลย หนังสืออวยเชริโน่... ใช่ไหม?\""
10027030-51 = "ค่ะ ถูกต้องแล้วค่ะ"
10027030-52 = "(มีบางอย่างเหมือนกระดาษปลิวตกลงมา)"
10027030-56 = "[ns3] \"แล้วอันนี้คือ... ใบปลิวเหรอ...?\"\n[ns4] \"<ขอประณามมนุษย์หนวดน่ารังเกียจที่ทิ้งฝาโยเกิร์ตโดยที่ยังไม่เลีย!>...?\""
10027030-60 = "ว้าว... กำลังพิมพ์อะไรแบบนี้กันอยู่สินะ"
10027030-66 = "[ns5] \"หืม?! หนังสืออวยเชริโน่กับใบปลิวประณามเชริโน่...\"\n[ns6] \"พิมพ์สองอย่างนี้ด้วยกันได้ด้วยเหรอ?!\""
10027030-70 = "มันแปลกเหรอคะ? ถ้าทำแบบนี้เราก็จะได้รายได้ทั้ง 2 ทางเลยนี่คะ?"
10027030-71 = "ยกตัวอย่างเช่นใน <เรดแบร์> ถ้าเราใส่ตอนพิเศษยกย่องประธานเชริโน่กับการ์ตูนเสียดสีประธานเชริโน่#nไว้ด้วยกัน คนอ่านของแต่ละฝ่ายก็จะอยากหยิบขึ้นมาอ่านค่ะ"
10027030-72 = "ถ้าทำทั้งสองอย่างไปเลยก็จะทำให้เราได้กำไรกลับมาแน่นอน แล้วทำไมถึงต้องมาเลือกอย่างใดอย่าง#nหนึ่งด้วยล่ะคะ ฮี่ฮี่ฮี่"
10027030-73 = "[s] \"เป็นความคิดแบบกล้าได้กล้าเสียจนเกินจะเข้าใจเลย!\""
10027030-74 = "ขอบคุณที่ชมค่ะ จะว่าไป... ให้ฉันเรียกท่านนี้ว่ายังไงดีเหรอคะ?"
10027030-75 = "[s] \"เรียกว่าคุณครูก็ได้\""
10027030-76 = "คะ?!  ฮืม อันตรายนะคะเนี่ย ถ้าเผลอทำพลาดไปละก็ หัวหน้าชมรมสื่อสิ่งพิมพ์ที่ยิ้มแย้มและผ่อนคลาย#nอยู่ตลอดคงทำให้ธุรกิจต้องอับอายขายหน้าไปซะแล้ว"
10027030-77 = "ถ้าอย่างนั้นก็... ยินดีต้อนรับสู่ชมรมสื่อสิ่งพิมพ์อีกครั้งนะคะคุณครู ฉันได้ยินกิตติศัพท์ของคุณครู#nมาเยอะเลยค่ะ ได้ยินเยอะจนถึงกับตั้งคำถามว่าคนคนนี้มีตัวตนจริงๆ หรือเปล่าเลยนะคะ"
10027030-78 = "อ้อ จะว่าไปฉันอยากตีพิมพ์ประวัติของคุณครูผู้มาเยี่ยมชมรมสื่อสิ่งพิมพ์ของเราใน <เรดแบร์> ฉบับพิเศษเดือนหน้าด้วยค่ะ คุณครูคิดว่ายังไงคะ? "
10027030-79 = "[s] \"ไม่เอาดีกว่า...\""
10027030-80 = "เอ้า อย่าเป็นแบบนี้สิคะ ไปฟังอะไรจากใครมากันคะเนี่ย ลองฟังฉันดูก่อนนะคะ มันจะเป็นเรื่องดีสำหรับ#nคุณครูด้วยนะ"
10027030-81 = "แทนที่จะไปจับมือกับ <ชมรมแนวร่วมปลดปล่อยความรู้> ที่ส่งต้นฉบับไม่ตรงกำหนด ไม่ค่อยมีฐานแฟนคลับ และเขียนเรื่องออกจะเพ้อเจ้อไปหน่อย คุณครูมาร่วมมือกับชมรมสื่อสิ่งพิมพ์ของฉันดีกว่าค่ะ เรามีทั้งเงินทุน พลังในการประชาสัมพันธ์ และผู้สนับสนุนอย่างสำนักเลขาธิการ..."
10027030-83 = "...เรื่องที่มีสำนักเลขาธิการคอยหนุนหลังให้ ไม่ได้เป็นความลับขององค์กรหรอกเหรอ...?"
10027030-85 = "ตายละ ฉันโฆษณาธุรกิจเพลินจนเผลอพูดออกไปจนได้ ลืมส่วนนั้นไปเถอะนะคะ มาต่อกันดีกว่า..."
10027030-86 = "[s] \"ที่เรามาที่ชมรมสื่อสิ่งพิมพ์ เพราะมีเรื่องอยากถามน่ะ\""
10027030-87 = "โอ้ นี่คือการทำธุรกรรมข้อมูลสินะคะ ฉันจะมองว่านี่คือการทำสัญญาโดยนัยได้ใช่ไหมคะ แบบว่า... ถ้าฉันให้ข้อมูลที่คุณครูต้องการได้ คุณครูก็จะทำตามคำขอร้องของฉันบ้างเหมือนกัน?"
10027030-88 = "อะไรกัน ทำไมเราคุยกันไม่รู้เรื่องล่ะคะ เฮ้อ คุณครูก็เป็นคนไม่ดีอยู่เหมือนกันนะ ถ้าเป็นเรื่องนั้นละก็ ทำไมไม่พูดตั้งแต่แรกล่ะคะ ทำเอาฉันเข้าใจผิดคนเดียวอยู่ได้"
10027030-89 = "ไม่ใช่เรื่องนั้นสักหน่อย ค่อยๆ ฝึกนิสัยฟังคำพูดของคนอื่นดูบ้างนะ ยาคุโมะ"
10027030-90 = "ไม่ใช่เรื่องนั้นหรอกเหรอคะ?"
10027030-91 = "ก็ต้องไม่ใช่น่ะสิ! ไม่ใช่เลย!"
10027030-92 = "เมรุอยู่นิ่งๆ ก่อนเถอะค่ะ ฉันกำลังถามคุณครูอยู่นะคะ ว่าไงล่ะคะ คุณครู?"
10027030-93 = "[s] \"เอาสิ ถ้าตอบคำถามของเราได้ ครูจะร่วมมือกับชมรมสื่อสิ่งพิมพ์ให้เอง\""
10027030-94 = "ครู?! ขืนพูดอะไรแบบนั้นออกไปโดยไม่ทันได้ยั้งคิด เดี๋ยวก็โดนถลกหนังเข้าหรอก!"
10027030-95 = "เดี๋ยวนะ เมรุจะสื่อว่าอะไรเหรอคะ...?"
10027030-96 = "เปล่านี่ มันก็แค่เป็นการเปรียบเปรยน่ะ..."
10027030-98 = "แต่จะเปรียบเปรยหนังกับชมรมสื่อสิ่งพิมพ์เนี่ยนะคะ?"
10027030-99 = "[s] \"...หืม?\""
10027030-100 = "......"
10027030-101 = "......?"
10027030-107 = "[ns] \"ขะ... ขอเข้าเรื่องเลยแล้วกันนะ\""
10027030-108 = "<ลูน่า> เหรอคะ...?"
10027030-109 = "อื้ม <ลูน่า>"
10027030-110 = "เดี๋ยวนะคะ เหมือนจะไม่เคยได้ยิน หรือเคยได้ยินมาจากที่ไหนนะ... ราวกับว่าในอีกด้านหนึ่งของความ#nทรงจำอันเลือนราง... มีแมวในชุดดำกำลังโบกผ้าเช็ดหน้าแล้วจ้องมาทางนี้..."
10027030-111 = "...แบบนั้นฟังดูอันตรายนะ..."
10027030-112 = "อ้อ... คิดออกแล้วค่ะ ฉันเคยได้ยินการ์ตูนเรื่องนั้นค่ะ"
10027030-113 = "[s] \"จริงเหรอ?\""
10027030-114 = "แต่มันก็เป็นการ์ตูนที่ถูกตีพิมพ์มานานมากแล้วนะคะ... อืม... แบบนี้นี่เอง ฉันก็เลยจำไม่ค่อยได้เท่าไร"
10027030-115 = "อ้อ อ้อ! ฉันเริ่มนึกอะไรๆ ออกแล้วละค่ะ ว่าแต่ทำไมถึงมาถามเรื่อง <ลูน่า> กับชมรมสื่อสิ่งพิมพ์ล่ะคะ?"
10027030-116 = "[s] \"ทาคาเนะบอกว่าถ้ามาที่นี่ ก็จะได้เบาะแสกลับไปน่ะ\""
10027030-117 = "อ๋อ... แบบนี้นี่เอง... เป็นอย่างนี้สินะคะ... ทาคาเนะนี่ก็จริงๆ เลยนะ..."
10027030-118 = "ฮืม อ่า อืม... ฮี่ฮี่ฮี่"
10027030-119 = "[s] \"แล้วเธอจะบอกเบาะแสครูไหม?\""
10027030-120 = "นั่นสินะคะ เบาะแส... มันก็มีเบาะแสอยู่หรอกนะคะ มันต้องเป็นข้อมูลที่พอคุณครูกับเมรุได้ฟังแล้วต้อง#nสนใจเลยละค่ะ"
10027030-121 = "โอ๊ะ งั้นเหรอ! แล้วมันคืออะไรกันล่ะ?!"
10027030-122 = "ก่อนอื่นฉันต้องบอกว่าฉันเองก็ไม่ค่อยรู้เกี่ยวกับ <ลูน่า> เล่มสุดท้ายหรอกค่ะ "
10027030-123 = "อย่าทำหน้าผิดหวังแบบนั้นสิคะ ฉันยังมีข้อมูลต่อไปอยู่นะคะ"
10027030-124 = "อย่ามาทำให้คนอื่นเค้ากระวนกระวายกันสิ รีบบอกมาเร็วๆ เถอะน่า!"
10027030-125 = "<ลูน่า> มีแฟนด้อมที่เก่าแก่มากๆ ค่ะ และแฟนด้อมนั้นก็ยังคงอยู่ในเรดวินเทอร์... และเห็นว่านานๆ ครั้ง#nก็จะมีการรวมตัวกันด้วยนะคะ"
10027030-126 = "นอกจากนี้ยังมีการทำ <กิจกรรม> กันอยู่เรื่อยๆ ด้วยค่ะ"
10027030-127 = "กลุ่มแฟนด้อมที่ชื่นชอบ <ลูน่า> จนออกมารวมตัวกัน...?"
10027030-128 = "[s7] \"ถึงจะจบบริบูรณ์แล้ว แต่แฟนๆ ก็ยังมารวมตัวกันทำกิจกรรมเหรอ?\"\n[s8] \"นี่เป็นเรื่องปกติในเรดวินเทอร์เหรอเมรุ?\""
10027030-131 = "ไม่นะ... ก็ไม่ถือว่าปกติหรอก"
10027030-132 = "หลังจากงานเขียนจบไปแล้ว มันก็เป็นไปได้ที่คนอื่นจะหยิบเรื่องมาพูดอยู่ 2-3 ครั้ง"
10027030-133 = "แต่ถ้ามันจบบริบูรณ์แล้วแต่ยังถูกพูดถึงกันอยู่อีกเรื่อยๆ... แถมยังมีแฟนๆ มาทำกิจกรรมอะไรกันอีก..."
10027030-134 = "แบบนั้นถือว่าเป็นสิ่งที่หาไม่ได้... จากงานเขียนทั่วๆ ไปเลยละ..."
10027030-135 = "ก็นะ นั่นหมายความว่า <ลูน่า> เป็นการ์ตูนที่ค่อนข้างจะมีประวัติความเป็นมาเลยละค่ะ"
10027030-136 = "แต่ว่า..."
10027030-137 = "[s9] \"แต่ว่ายาคุโมะเองก็ยังไม่รู้สินะ...\"\n[s10] \"ว่าการรวมตัวกันแบบนั้นจัดขึ้นเมื่อไรและก็ที่ไหน\""
10027030-140 = "ไม่ค่ะ ฉันรู้ค่ะ"
10027030-141 = "ทำไมเธอถึงรู้ล่ะ?!  ฉันนึกว่าพล็อตเรื่องจะออกมาว่า \"ฉันจะไปรู้ได้ยังไงล่ะคะ\" ซะอีก!"
10027030-142 = "ต้องบอกว่าฉันมีความฉลาดของมนุษย์ หรือว่ามีเส้นทางข้อมูลจากหน่วยข่าวกรองดีๆ อยู่สิคะ"
10027030-143 = "ไม่ว่าใครจะว่ายังไง พวกฉันก็คือชมรมสื่อสิ่งพิมพ์ค่ะ"
10027030-144 = "แล้วทีเมื่อกี้ยังเห็นบอกว่าจำไม่ได้อยู่เลย?!"
10027030-145 = "นี่คุณคะ ฉันบอกว่ามันยากที่จะดึงความทรงจำออกมาได้ในทันที แต่ก็ไม่ได้บอกว่าไม่รู้เลยสักหน่อย อีกอย่างนะคะ เรื่องเวลาและสถานที่รวมตัวกันน่ะ..."
10027030-146 = "ยังไง? ที่ไหน? กี่โมง?"
10027030-147 = "ฮี่ฮี่ฮี่ ฉันชักอยากจะคุยเรื่องค่าตอบแทนข้อมูลขึ้นมาแล้วสิคะ"
10027030-148 = "[s] \"งั้นเหรอ? เธอจะขอค่าข้อมูลแต่พอดีใช่ไหม?\""
10027030-149 = "ก็ต้องให้สมน้ำสมเนื้อสิคะ "
10027030-150 = "ยาคุโมะ... นี่เธอต้องการอะไรจากครูกันแน่?!"
10027030-151 = "ไม่ค่ะ ต้องบอกว่าต้องการจากเมรุมากกว่า"
10027030-152 = "หืม? ฉันเหรอ?"
10027030-153 = "ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ ฉันก็แค่อยากจะฝากวาด 'ต้นฉบับ' สักเรื่องน่ะ"
10027030-154 = "เหอะ! ต้นฉบับเหรอ?! ไม่เอาหรอก! จากต้นฉบับที่ฉันเคยได้รับมา ไม่เห็นมีอันไหนที่มันเข้าท่าเลย!"
10027030-155 = "เอ๋? ไม่เอางั้นเหรอคะ? สงสัยไม่อยากได้ข้อมูลเกี่ยวกับ <ลูน่า> แล้วสินะคะ? แหมๆ สงสัยความจริงใจ#nของเมรุจะจบลงแค่ตรงนี้แล้วสินะคะ? แบบนี้ฉันผิดหวังนะคะเนี่ย~"
10027030-156 = "อึก...!"
10027030-161 = "(เราต้องทำทุกอย่าง... เพื่อขอโทษโมมิจิ... ใช่ คิดแบบนี้แล้วกัน นี่คือการทำเพื่อโมมิจิ...)"
10027030-167 = "กะ... ก็ได้ เข้าใจแล้ว... แค่ฉันทำให้ก็พอแล้วใช่ไหม..."
10027030-168 = "[s] \"เมรุ จะรับข้อแลกเปลี่ยนแบบนี้ได้เหรอ?\""
10027030-169 = "เพื่อโมมิจิ เรื่องแค่นี้... ฉันทำได้อยู่แล้ว...!"
10027030-170 = "โอ้โห นี่มันมิตรภาพที่ต้องหลั่งน้ำตาให้เลยนะคะ"
10027030-171 = "[s] \"เมรุ...\""
10027030-172 = "แต่ถ้าเป็นงานแปลกๆ ฉันไม่วาดให้หรอกนะ! ถ้าไม่ใช่ 'สิ่งที่ฉันวาดได้ หรือสิ่งที่ฉันจะเชื่ออย่างจริงใจ'! ฉันก็ไม่วาดให้หรอก!"
10027030-173 = "ฮี่ฮี่ฮี่ เรื่องนั้นไม่ต้องห่วงเลยค่ะ ที่ฉันจะขอให้ช่วยน่ะเป็น 'ต้นฉบับที่คุณนักวาดเมรุต้องชื่นชอบอย่างหา#nที่สุดไม่ได้' เลยละค่ะ"
10027030-174 = "งั้นก็ดีค่ะ! ทีนี้ก็เหลือแต่เซ็นสัญญารับทราบว่าในกรณีที่ไม่เป็นไปตามสัญญา เราจะยึดแท็บเล็ตกับ#nปากกาของเมรุไว้ค่ะ"
10027030-175 = "เธอมันปีศาจชัดๆ!"
10027030-176 = "ปกติบรรณาธิการก็เป็นปีศาจของนักวาดอยู่แล้วค่ะ เอาละ รีบๆ เข้าเถอะค่ะ"
10027030-189 = "[ns] \"ครูไม่ต้องทำอะไรก็ได้เหรอ...?\""
10027030-190 = "อ้อ นั่นสินะคะ... ไว้ฉันจะแจ้งให้ทราบทีหลังนะคะ แบบนั้นน่าจะสนุกกว่ากัน"
10027030-191 = "[s] \"งั้นก็... ขอฝากตัวด้วยนะ\""
10027030-192 = "ฮี่ฮี่ฮี่"

10027030-37 = "#wait;2200"
10027030-38 = "3;야쿠모 물음표;00\n#3;a\n#wait;2000"
10027030-39 = "5;메루;04;으엑. 나타났다…….\n#5;al\n#3;m1\n#5;em;[!]"
10027030-40 = "3;야쿠모 물음표;08;네. 네. 반갑지 않은 출판부의 책임자, 나타났습니다. 무슨 바람이 불어서 스스로 여기까지 온 것인지 모르겠지만. 반갑네요, 메루. 아니면 필명인 메루리로 불러 줄까요?\n#3;em;[반응]"
10027030-41 = "5;메루;05;……메루로 충분해. 야쿠모."
10027030-42 = "[s] \"책임자……?!\""
10027030-43 = "3;야쿠모;07;네. 여기는 출판부랍니다. 출판물 인쇄, 제본, 포장, 관리, 영업, 사업 확충까지 책에 관련된 거라면 뭐든 다루고 있죠. 저는 그 부장을 맡고 있는 아라마키 야쿠모라고 하고요. \n#3;greeting"
10027030-44 = "3;야쿠모;11;덧붙여서 잡지 <붉은 곰>의 인쇄를 담당하고 있기도 하답니다. 힛. 힛. 히.\n#3;em;[음표]"
10027030-45 = "#st;[0,0];instant;1;"
10027030-46 = "#clearST"
10027030-47 = "#wait;2500"
10027030-48 = "[ns1] \"뭔가 엄청난 걸…… 이건 <붉은 곰?>?\"\n[ns2] \"본 적 있는 것 같아. 체리노의 선전물…… 같은 거지?\""
10027030-49 = "#wait;100"
10027030-50 = "#wait;100"
10027030-51 = "3;야쿠모;10;네, 맞습니다.\n#3;em;[반응]\n#3;m3\n#5;dr"
10027030-52 = "#na;(그때 무언가 종이 같은 것이 팔랑거리면서 떨어졌다.)"
10027030-53 = "#st;[0,0];instant;1;"
10027030-54 = "#clearST"
10027030-55 = "#wait;2000"
10027030-56 = "[ns3] \"거기다 이건…… 다른 전단지……?\"\n[ns4] \"<요거트 뚜껑을 핥지 않고 버리는 저 가증스러운 수염을 규탄한다!>……?\""
10027030-57 = "#wait;100"
10027030-58 = "#wait;100"
10027030-59 = "#all;hide"
10027030-60 = "3;메루;04;우와…… 또 이런 걸 인쇄하고 있네.\n#3;closeup\n#3;em;[반응]"

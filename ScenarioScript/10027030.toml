10027030-65 = "#wait;1000"
10027030-66 = "[ns5] \"어?! 체리노 선전물과 체리노를 규탄하는 전단지를…….\"\n[ns6] \"동시에 인쇄해도 괜찮은 거야?!\""
10027030-67 = "#wait;100"
10027030-68 = "#wait;100"
10027030-69 = "#all;hide"
10027030-70 = "3;야쿠모;02;그게 뭐 이상한가요? 이러면 매출이 두 배로 뛰잖아요.\n#3;em;[?]"
10027030-71 = "3;야쿠모;00;가령 <붉은 곰>만 해도, 체리노 회장 찬양 특집과 체리노 회장 풍자만화를 동시에 수록하면, 각기 그걸 보고 싶어 하는 양쪽의 독자가 집어 들기 마련이죠."
10027030-72 = "3;야쿠모;11;둘 다 해버리면 이득이 확실한데, 왜 둘 중 하나만 골라야 하느냐는 거죠. 힛. 힛. 히.\n#3;em;[음표]"
10027030-73 = "[s] \"어떤 의미로는 따라가기 힘든 대범한 사고방식이네!\""
10027030-74 = "3;야쿠모;09;칭찬 감사합니다. 그래서…… 이쪽 분은 뭐라고 불러 드리면 되죠?\n#3;greeting"
10027030-75 = "[s] \"선생님인데요.\""
10027030-76 = "3;야쿠모;04;네?! 흐, 흐음. 위험했네요. 자칫하면 항상 웃음과 여유를 잃지 않는 출판부의 부장으로서의 영업 페이스가 흔들릴 뻔했어요.\n#3;em;[!]"
10027030-77 = "3;야쿠모;08;그러면 다시 한번…… 출판부에 오신 것을 환영합니다. 선생님. 말씀은 많이 들었어요. 너무 많이 들은 나머지 실제로 존재하는 인물인가에 대해 의문마저 들 정도였지만요.\n#3;greeting"
10027030-78 = "3;야쿠모;10;아, 그러고 보니 다음번 월간 <붉은 곰> 특집으로, 출판부를 방문하신 선생님의 전기 특집을 건의할까 하는데요. 어떠신가요, 선생님? \n#3;em;[?]"
10027030-79 = "[s] \"안 해요.\""
10027030-80 = "3;야쿠모;11;에이. 그러지 마시고요. 속고만 사셨나. 들어 보세요. 이거 선생님께도 좋은 이야기라니까요?"
10027030-81 = "3;야쿠모;07;저렇게 납기 안 지키고 팬층도 살짝 애매한 데다 소재도 매니악한 <지식해방전선>과 손을 잡는 것보다는, 확실한 자본력과 홍보력, 그리고 사무국이라는 든든한 뒷배경을 두고 있는 저희 출판부와 협업하시는 편이-\n#3;em;[재잘]"
10027030-82 = "#all;hide"
10027030-83 = "3;메루;02;……일단은 사무국이 배경이라는 건 비밀 아니었어……?\n#3;closeup\n#3;em;[?]"
10027030-84 = "#all;hide"
10027030-85 = "3;야쿠모;04;앗차, 영업에 열중하다 보니 말이 헛나왔네요. 그 부분은 잊어 주시기를 바라며, 이야기를 계속해 보자면-\n#3;em;[?!]"
10027030-86 = "[s] \"우리는 묻고 싶은 게 있어서 출판부를 찾아왔어.\""
10027030-87 = "3;야쿠모;11;오, 이것은 거래로군요. 제가 선생님의 이 요청을 해결해 드리면, 선생님도 제 부탁을 들어 주시겠다는 암묵적인 약속이라고 봐도 되는 거겠지요?\n#3;em;[전구]"
10027030-88 = "3;야쿠모;08;뭐야, 이야기가 통하지 않습니까. 이것 참, 선생님도 사람이 나쁘시네요. 그런 거라면 진작에 그랬다고 말씀을 하시지, 괜히 제가 오해하고 말았잖아요."
10027030-89 = "5;메루;05;그런 거 아니니까 이제 슬슬 남의 말을 듣는 버릇을 들이지 그래. 야쿠모?\n#5;em;[!]\n#5;a\n#3;m1"
10027030-90 = "3;야쿠모;02;그런 거 아니었어요?\n#3;em;[?]"
10027030-91 = "5;메루;09;절대로! 아니거든!\n#5;jump\n#5;em;[빠직]"
10027030-92 = "3;야쿠모;05;메루는 가만히 좀 있어요. 지금 선생님에게 묻고 있잖아요. 어떠신가요. 선생님?"
10027030-93 = "[s] \"좋아. 우리의 질문에 답을 해준다면, 출판부에 협력할게.\""
10027030-94 = "5;메루;10;선생?! 그런 말 함부로 하면 가죽이 벗겨질지도 몰라!\n#5;shake\n#5;em;[?!]"
10027030-95 = "3;야쿠모;04;저기, 메루는 대체 무슨 말을 하는 건가요……?"
10027030-96 = "5;메루;05;아니, 방금 그건 당연히 비유의 하나로서……\n#5;em;[속상함]"
10027030-97 = "#all;hide"
10027030-98 = "3;야쿠모;03;가죽은 출판부에서 취급할 만한 제품이 아니잖아요?\n#3;closeup\n#3;em;[음표]"
10027030-99 = "[s] \"……응?\""
10027030-100 = "3;메루;04;…….\n#3;closeup\n#3;em;…"
10027030-101 = "3;야쿠모;10;……?\n#3;closeup\n#3;em;[?]"
10027030-102 = "#st;[0,0];instant;1;"
10027030-103 = "#clearST"
10027030-104 = "3;야쿠모;10\n#3;closeup\n#3;d\n#wait;1000"
10027030-105 = "#wait;500"
10027030-106 = "#wait;2500"
10027030-107 = "[ns] \"그, 그래서 일단 본론인데 말이야.\""
10027030-108 = "5;메루;00\n1;야쿠모;02;<루나>요……?\n#1;a\n#5;a\n#1;em;[?]"
10027030-109 = "1;야쿠모;02\n5;메루;02;응. <루나>.\n#5;em;[반응]"
10027030-110 = "1;야쿠모;99;잠깐만요. 어딘가에서 들은 듯한, 못 들은 듯한…… 가물가물한 기억 저편에서 검은 옷을 입은 고양이가 손수건을 팔랑거리며 이쪽을 쳐다보고 있는 것 같은…….\n#1;em;…"
10027030-111 = "5;메루;05;……그거 어딘가 위험한 거 같은데……."
10027030-112 = "5;메루;02\n1;야쿠모;07;아아…… 생각났어요. 분명 그런 만화의 이름을 들은 것 같네요.\n#1;em;[전구]"
10027030-113 = "[s] \"정말이야?\""
10027030-114 = "1;야쿠모;08;그렇다고는 해도 제법 예전에 출판된 만화였어서…… 으음. 이래서야 제가 제대로 된 기억을 단번에 떠올리지 못했던 것도 당연하겠네요."
10027030-115 = "1;야쿠모;10;아, 아, 아. 네. 이것저것 기억났어요. 그런데 왜 <루나>에 대한 걸, 출판부에 문의를?\n#1;em;[?]"
10027030-116 = "[s] \"타카네가 이곳에 오면 단서를 얻을 수 있을 거라고 했어.\""
10027030-117 = "1;야쿠모;04;아하…… 과연…… 그런 거였나요…… 타카네도 참…….\n#1;em;[한숨]"
10027030-118 = "1;야쿠모;07;흐음. 아하. 으으음. 힛. 힛. 히.\n#1;stiff"
10027030-119 = "[s] \"그래서, 단서를 알려줄 수 있을까?\""
10027030-120 = "1;야쿠모;10;그렇군요. 단서라…… 확실히 단서라면 있습니다. 선생님과 메루가 듣기에는, 어쩌면 꽤나 구미가 당길 정보가 말이지요.\n#1;em;[반짝]"
10027030-121 = "5;메루;01;오, 역시! 그래서 그게 뭔데?!"
10027030-122 = "1;야쿠모;05;우선, <루나>의 마지막 권에 대한 것은 저도 잘 모른다는 사실을 말해 두죠. "
10027030-123 = "1;야쿠모;11;그렇게 실망한 표정 짓지 말라고요. 다음 정보도 있으니까.\n#1;em;[음표]"
10027030-124 = "5;메루;05;애태우지 말고 빨리 이야기해!\n#5;hophop\n#5;em;[스팀]"
10027030-125 = "1;야쿠모;02;<루나>에는 상당히 오래된 팬덤이 있어요. 그리고 그 팬덤은 붉은겨울에서도 지금까지 살아남아…… 비정기적으로 모임을 갖고 있다고 하죠."
10027030-126 = "1;야쿠모;09;거기에서 꾸준한 <활동>을 한다고 하던가요?\n#1;em;[반응]"
10027030-127 = "5;메루;02;<루나>를 좋아해서 비정기적으로 모이는 팬덤……?"
10027030-128 = "[s7] \"완결난 뒤에도 계속 팬들이 모여서 활동을 한다고?\"\n[s8] \"붉은겨울에선 그게 보통이야? 메루?\""
10027030-129 = "#wait;100"
10027030-130 = "#wait;100"
10027030-131 = "5;메루;05;아니…… 그렇진 않아.\n#5;em;[속상함]"
10027030-132 = "5;메루;02;작품이 완결된 뒤, 몇 번 사람들 사이에서 이야기가 나오는 건, 뭐 그럴 수 있어."
10027030-133 = "5;메루;99;하지만 완결이 난 뒤에도 꾸준히 언급이 되고…… 팬들이 모여 활동을 한다는 건……\n#5;em;…"
10027030-134 = "5;메루;01;평범한 작품은 해낼 수 없는…… 그런 영역이긴 한데……."
10027030-135 = "1;야쿠모;03;뭐, 그만큼 제법 역사가 있었던 만화였다는 뜻이기도 하겠죠."
10027030-136 = "1;야쿠모;99;하지만……."
10027030-137 = "[s9] \"하지만 그 모임이 언제, 어디에서 열리는지까지는.\"\n[s10] \"야쿠모도, 정확히는 모른단 뜻이겠구나…….\""
10027030-138 = "#wait;100"
10027030-139 = "#wait;100"
10027030-140 = "1;야쿠모;11;아뇨. 아는데요?\n#1;em;[?]"
10027030-141 = "5;메루;04;어째서?! 여기선 \"당연히 모르고 있어요.\" 라는 약속된 전개여야 하는 거 아냐?!\n#5;em;[?!]\n#5;shake"
10027030-142 = "1;야쿠모;10;그거야 뭐, 나름의 휴민트라고 할까, 사람을 통한 정보 습득 루트가 있다고 할까. 그런 거죠."

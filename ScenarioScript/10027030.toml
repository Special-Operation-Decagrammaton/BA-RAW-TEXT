[translation]
10027030-1 = "第3話;出版、再版、流通"
10027030-7 = "貴音那傢伙……老是說些令人摸不著頭緒的話。"
10027030-8 = "到現在還是想不通他到底是什麼意思！"
10027030-9 = "[s]「不過至少他給了我們一點線索，不是嗎？」"
10027030-10 = "……嗯，就是說啊。#n這不太像他平時的作風。"
10027030-11 = "[s]「貴音……會不會知道什麼關於《LUNA》的內幕呢？」"
10027030-12 = "我也不知道……不過我覺得他要我們去出版部也不無道理。"
10027030-13 = "雖然乖乖照他的話去做有種向他低頭的感覺，所以其實不太情願……"
10027030-14 = "不過出版部保存著所有赤冬出版過的書籍資料。"
10027030-15 = "其中……想必也會有《LUNA》的資料才對。"
10027030-23 = "[ns]「這裡就是出版部……？」"
10027030-24 = "沒錯，赤冬聯邦學園裡流通的書籍大部分都是在這裡印製的。"
10027030-25 = "[s]「真厲害。」"
10027030-26 = "要說厲害確實是厲害沒錯……"
10027030-27 = "但其實……這裡也印刷了許多[ruby=  ・     ・     ・     ・  ]不太尋常[/ruby]的東西……"
10027030-28 = "雖然在印刷「知識解放戰線」的期刊時受了他們的照顧，實在不太想口出惡言……"
10027030-33 = "就算你說得很小聲，我還是全都聽到了哦？"
10027030-39 = "呃，出現了……"
10027030-40 = "沒錯沒錯，你最不想看見的出版部負責人出現囉。#n雖然不知道是什麼風把你吹來的，真是好久不見了呢，愛瑠。#n還是說……該用筆名來稱呼你呢，Meruri老師？"
10027030-41 = "……叫我愛瑠就行了，八雲。"
10027030-42 = "[s]「負責人……！？」"
10027030-43 = "沒錯，歡迎來到出版部──從印刷、裝訂、包裝、管理、營運到擴展事業等等，#n只要是和書本有關的事，我們全都包辦。#n而我則是擔任出版部部長的荒槇八雲。"
10027030-44 = "順帶一提……《赤熊》雜誌的編輯也是由我全權負責哦。#n呣呵呵。"
10027030-48 = "[ns1]「聽起來真厲害……這就是《赤熊》？」\n[ns2]「我好像在哪裡看過。是潔莉諾的宣傳文宣……對吧？」"
10027030-51 = "是的，沒錯。"
10027030-52 = "（就在此時，一張像紙的東西飄落在了地上）"
10027030-56 = "[ns3]「這個是……傳單……？」\n[ns4]「『嚴厲斥責吃優格不舔蓋子的鬍子暴君！』……？」"
10027030-60 = "我的天……你又在印這種東西了啊……"
10027030-66 = "[ns5]「嗯！？潔莉諾的宣傳文宣和批評潔莉諾的傳單……」\n[ns6]「同時印這兩種東西沒問題嗎！？」"
10027030-70 = "有什麼奇怪的嗎？這樣銷售量才會加倍不是嗎？"
10027030-71 = "就拿《赤熊》舉例好了，如果同時刊登潔莉諾會長的吹捧特輯和諷刺漫畫的話，#n不管是支持者還是反對者都會想看裡頭寫了什麼對吧？"
10027030-72 = "既然討好雙方就能賺到更多錢，我又何必要選邊站呢？#n呣呵呵呵呵。"
10027030-73 = "[s]「某種意義上來說真是難以遵循又大膽的思考方式啊！」"
10027030-74 = "謝謝你的稱讚。#n話說回來……我該怎麼稱呼你呢？"
10027030-75 = "[s]「我是夏萊的老師。」"
10027030-76 = "什麼！？咳，咳咳……好險好險。#n出版部部長的營業笑容差點就破功了。"
10027030-77 = "請容我重新來過……歡迎您來到出版部，老師。#n關於老師的事蹟我早已時有耳聞……也許是因為實在聽過太多各式各樣的傳聞，#n甚至都有點懷疑老師究竟是不是真實存在的人物了呢。"
10027030-78 = "啊，對了，既然老師難得光臨出版部，#n下個月的《赤熊》就來做個老師的傳記特輯……您覺得如何呢，老師？"
10027030-79 = "[s]「請容我拒絕。」"
10027030-80 = "請別這麼說嘛……我又不會騙您。#n老師您想想，這對您來說不也是件好事嗎？"
10027030-81 = "「知識解放戰線」不僅受眾不明確、題材又偏激，而且還老是愛拖稿。#n與其跟他們合作，不如投向我們的懷抱吧。#n我們不僅資本雄厚，宣傳能力又強，最重要的是還有事務局當靠山……"
10027030-83 = "……原來出版部有事務局當靠山的事是可以說出來的嗎？"
10027030-85 = "哎呀呀～我忙著談生意，竟然不小心說溜嘴了。#n剛才那件事請兩位當作沒聽見，我們繼續談吧……"
10027030-86 = "[s]「我們今天來出版部是想請教一些事情。」"
10027030-87 = "哦，這是交換條件嗎？#n那我是否能當作只要我願意協助老師，老師就會授權製作特輯呢？"
10027030-88 = "哎呀～看來我們已經取得共識了嘛。#n老師您也真是的……如果是這樣的話，您怎麼不早說呢，害人家誤會了。"
10027030-89 = "根本不是你想的那樣吧……拜託你以後先聽聽別人想說什麼好嗎，八雲？"
10027030-90 = "嗯？難道不是嗎？"
10027030-91 = "不是！百分百不是！"
10027030-92 = "我提問的對象不是愛瑠而是老師。#n老師，請問您意下如何呢？"
10027030-93 = "[s]「好，只要你願意回答我的問題，我可以跟出版部合作。」"
10027030-94 = "老師！？隨便答應他的話，說不定會被剝掉一層皮的哦！？"
10027030-95 = "等等，愛瑠，你這話是什麼意思……？"
10027030-96 = "呃，這只是一種比喻罷了……"
10027030-98 = "皮革並不是我們出版部經手的商品哦？"
10027030-99 = "[s] 「……嗯？」"
10027030-100 = "……"
10027030-101 = "……？"
10027030-107 = "[ns]「總，總之先切入正題吧。」"
10027030-108 = "《LUNA》嗎……？"
10027030-109 = "嗯，《LUNA》。"
10027030-110 = "稍等……這本書我好像聽過，又好像沒有聽過……#n啊，在我那模糊記憶的彼岸，好像有隻穿著黑衣的貓咪，#n一邊揮著手中的手帕，一邊目不轉睛地盯著我……"
10027030-111 = "那種情景聽起來也太不妙了吧……"
10027030-112 = "啊啊……我想起來了。#n的確有本漫畫的名字叫做《LUNA》。"
10027030-113 = "[s]「真的嗎？」"
10027030-114 = "不過，畢竟那是非常久以前出版的漫畫……#n唔嗯……難怪我一時間想不起來。"
10027030-115 = "啊～～我稍微想起來了。#n不過話又說回來，你們為什麼會跑到出版部問《LUNA》的事呢？"
10027030-116 = "[s]「貴音說只要來這裡，我們就能找到關於《LUNA》的線索。」"
10027030-117 = "啊哈……原來如此……是這樣啊……貴音也真是的……"
10027030-118 = "呼呣呼呣，原來如此……呣呵呵。"
10027030-119 = "[s]「可以告訴我們線索嗎？」"
10027030-120 = "這個嘛，要說線索……我的確略知一二。#n這對老師和愛瑠來說，應該會是相當感興趣的情報。"
10027030-121 = "哦，我就知道！所以是什麼樣的線索！？"
10027030-122 = "醜話先說在前頭，其實關於《LUNA》最終卷的事，我也不是非常清楚。"
10027030-123 = "請不要露出那麼失望的表情……我的話還沒說完呢。"
10027030-124 = "別賣關子了，快點告訴我們！"
10027030-125 = "《LUNA》有一個成立非常久的後援會，而且至今仍活躍於赤冬學園……#n據說他們會不定期地舉行聚會。"
10027030-126 = "換句話說……現在依然在「活動」中哦？"
10027030-127 = "因為喜愛《LUNA》，所以經常舉辦聚會的後援會……？"
10027030-128 = "[s7]「即使已經完結了，書迷們還是持續舉辦著相關的活動是嗎？」\n[s8]「這在赤冬學園算是常見的事嗎，愛瑠？」"
10027030-131 = "不……當然不是。"
10027030-132 = "如果是在完結後偶然被提起一兩次還算正常……"
10027030-133 = "但在作品完結後依然經常被書迷提起……甚至為其舉辦活動……"
10027030-134 = "那的確不是普通作品……辦得到的事……"
10027030-135 = "嘛，這也代表那本漫畫曾經締造了多麼偉大的歷史。"
10027030-136 = "但是……"
10027030-137 = "[s9]「不過他們什麼時候舉辦聚會，又是在哪裡舉辦……」\n[s10]「應該連八雲也不是很清楚吧……」"
10027030-140 = "不，我知道唷？"
10027030-141 = "為什麼知道啊！？#n按理來說， 這種時候不是應該要說「我當然不知道」嗎！？"
10027030-142 = "該歸功於我的交友廣闊呢，還是歸功於打聽情報的途徑正確呢？#n大概就是這樣。"
10027030-143 = "別忘了，我們可是出版部哦？"
10027030-144 = "剛剛不是才說你沒印象嗎！？"
10027030-145 = "不不不，我剛才說的是一時間想不起來，並沒有說我沒印象哦。#n至於後援會聚會的日期和場所……"
10027030-146 = "怎麼了？又怎麼了？"
10027030-147 = "呣呵呵呵……#n這種時候是不是該先支付情報的報酬呢？"
10027030-148 = "[s]「說的也是，必須得支付相應的代價才行。」"
10027030-149 = "您說的沒錯。"
10027030-150 = "八雲……你打算叫老師做些什麼！？"
10027030-151 = "不，我要求的對象是你，愛瑠。"
10027030-152 = "嗯？我嗎！？"
10027030-153 = "嗯，其實只是件小事罷了。#n我想請你幫我畫一份「稿子」。"
10027030-154 = "呃！稿子！？我才不要！#n你以前委託我畫的那些東西就沒有一個是正常的！"
10027030-155 = "咦～？你不要嗎～？這麼說你是不想要《LUNA》的線索囉？#n哎呀哎呀，原來愛瑠的誠意就只有這種程度啊？真令人失望～"
10027030-156 = "唔……！"
10027030-161 = "（我做這些……全都是為了得到紅葉的原諒……沒錯，只要能得到他的原諒……）"
10027030-167 = "我，我知道了……我畫不就行了嗎……"
10027030-168 = "[s]「愛瑠，就這樣接受他的提議真的沒關係嗎？」"
10027030-169 = "為了紅葉，這點小小的代價……我願意承擔……！"
10027030-170 = "哦哦，你們之間的友誼還真是令人感動呢。"
10027030-171 = "[s]「愛瑠……」"
10027030-172 = "不過我絕對不會畫奇怪的東西哦！#n如果不是「我接觸過的題材」或「我能接受的題材」，哪怕打死我我也不會畫的！"
10027030-173 = "呣呵呵……這你就不用擔心了。#n我想請你畫的是「身為漫畫家一定會躍躍欲試的題材」。"
10027030-174 = "很好！那麼請你在這份合約上簽名吧。#n要是之後不履行承諾，我們就有權扣押你的繪圖板和筆哦。"
10027030-175 = "這個惡魔！"
10027030-176 = "編輯本來就是所有創作者心中的惡魔。#n來，快簽名吧。"
10027030-189 = "[ns]「我真的什麼都不用做嗎……？」"
10027030-190 = "啊，關於這件事……之後再跟您商量吧。#n總覺得那樣事情會更有趣。"
10027030-191 = "[s]「還，還請手下留情……」"
10027030-192 = "呣呵呵呵呵……"

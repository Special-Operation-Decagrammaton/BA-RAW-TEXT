10027030-23 = "[ns] \"……여기가 출판부……?\""
10027030-24 = "3;메루;02;맞아. 붉은겨울 학원에서 유통되는 대부분의 책은 여기에서 만들어지고 있어.\n#3;a\n#3;em;[반응]"
10027030-25 = "[s] \"굉장하네.\""
10027030-26 = "3;메루;99;굉장하네. 라고 순수하게 감탄하기에는……"
10027030-27 = "3;메루;05;좀…… 여러 가지로 평범하지 않은 것들을 잔뜩 인쇄하고 있다고 할까……\n#3;em;[땀]"
10027030-28 = "3;메루;99;……<지식해방전선>의 회지를 인쇄할 때 가끔 신세를 지기도 하니까, 마냥 별난 곳 취급하기도 조금 그렇긴 하지만…….\n#fontsize;50"
10027030-29 = "#st;[0,0];instant;1;"
10027030-30 = "#clearST"
10027030-31 = "3;메루;99\n#3;d\n#wait;1000"
10027030-32 = "#wait;500"
10027030-33 = "#na;???;그렇게 작게 말해 봤자 다 들린다고요."

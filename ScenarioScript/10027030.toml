[translation]
10027030-1 = "Lesson 3; Publishing, Reprinting, and Distribution"
10027030-7 = "Leave it to Takane to talk nonsense... "
10027030-8 = "I'm still not convinced she was actually helping us."
10027030-9 = "[s] \"At least she gave us a clue, right?\""
10027030-10 = "...Yeah. That was unusual."
10027030-11 = "[s] \"Do you think Takane knows something about 'Luna' that we don't?\""
10027030-12 = "I don't know... But we should definitely visit the Publishing Department. "
10027030-13 = "Ugh! I hate to admit it, but I think she gave us decent advice."
10027030-14 = "The Publishing Department has information about every book ever published in Red Winter."
10027030-15 = "They're sure to have something about \"Luna\" too."
10027030-23 = "[ns] \"This is the Publishing Department?\""
10027030-24 = "Yep. Most of the books distributed by Red Winter Academy are made here."
10027030-25 = "[s] \"Amazing.\""
10027030-26 = "'Amazing' is one word for it..."
10027030-27 = "They've been known to print some pretty unusual stuff. And I mean really unusual."
10027030-28 = "They also do favors for the Knowledge Liberation Front when we need to print our newsletter. It's not exactly a fringe organization, but—"
10027030-33 = "I can hear you even when you're quiet, you know."
10027030-39 = "Ugh. Here she is..."
10027030-40 = "Yes, yes. The dreaded Publishing Department head is here. I don't know what brings you this way, but it's nice to finally meet you, Meru. Or should I call you, Meruri?"
10027030-41 = "Meru is just fine, Yakumo."
10027030-42 = "[s] \"You're the head of...?\""
10027030-43 = "The Publishing Department, yes. We handle everything related to books: printing, binding, packaging, management, sales, and business expansion. I'm Aramaki Yakumo. "
10027030-44 = "I also manage the 'Red Bear'. Heh."
10027030-48 = "[ns1] \"Wow! This is the 'Red Bear'?\"\n[ns2] \"I think I've seen it before. Isn't it Cherino's...propaganda?\" "
10027030-51 = "Yes, that's right."
10027030-52 = "Just then, a sheet of paper fluttered past."
10027030-56 = "[ns3] \"Is this...another flyer?\"\n[ns4] \"'I condemn abominable mustaches who throw away yogurt lids without licking them!'...?\" "
10027030-60 = "Wow... You print stuff like this?"
10027030-66 = "[ns5] \"You print both Cherino propaganda and flyers denouncing her?!\"\n[ns6] \"Is it okay to print them at the same time?!\" "
10027030-70 = "Why wouldn't I? It doubles my sales."
10027030-71 = "Take the 'Red Bear', for example, if we include both a feature praising President Cherino and a caricature of President Cherino, we hit readers on both sides of the aisle."
10027030-72 = "Why choose one when you can make a profit off both? Heh. Heh. Heh."
10027030-73 = "[s] \"That's one way to look at it. But the logic is a little tough to follow.\""
10027030-74 = "I'll take that as a compliment. So... What shall I call you?"
10027030-75 = "[s] \"Sensei.\""
10027030-76 = "That's who you are?! Eh-hem. Apologies. I nearly lost my composure. I pride myself on being the laid-back head of publishing."
10027030-77 = "Anyway... Welcome to to the Publishing Department, Sensei. I've heard so many amazing things about you that I started to wonder if you were even real."
10027030-78 = "You know, we need a feature for the next issue of the 'Red Bear'. Why don't we run a special interview featuring Sensei's tour of the Publishing Department? "
10027030-79 = "[s] \"No.\""
10027030-80 = "Oh, come on! You can trust us. You'll benefit from it too, you know."
10027030-81 = "The Knowledge Liberation Front regularly misses deadlines, has an ambiguous fan base, and prints all kinds of strange material. The Publishing Department, however, has solid capital, publicity, and strong backing from the Secretariat Office."
10027030-83 = "Isn't that whole Secretariat Office thing supposed to be a secret?"
10027030-85 = "Oops! I got caught up in the sales pitch. Just pretend you didn't hear that little tidbit. Now, let's continue with the story."
10027030-86 = "[s] \"We're here because we need some information.\""
10027030-87 = "Oh! A deal, is it? I help you, and you grant me a favor in return?"
10027030-88 = "I'm glad we have an understanding after all. Though, you're quite naughty, Sensei. If you had a deal in mind, you should have said so and avoided all this confusion!"
10027030-89 = "Clean out your ears, Yakumo. Sensei didn't say anything like that."
10027030-90 = "Oh. It's not like that?"
10027030-91 = "Never! No!"
10027030-92 = "Meru, calm down. I'm asking Sensei what they meant, not you."
10027030-93 = "[s] \"If you answer our questions, I'll do your interview.\""
10027030-94 = "Sensei?! You'll be skinned alive for agreeing to that!"
10027030-95 = "Excuse me, but...skinned alive?"
10027030-96 = "I meant that figuratively, not literally, of course."
10027030-98 = "Ah. Fine. The Publishing Department doesn't work with leather anyway."
10027030-99 = "[s] \"...Huh?!\""
10027030-100 = "..."
10027030-101 = "...?"
10027030-107 = "[ns] \"W-Well, anyway... Let's get to the point.\""
10027030-108 = "The point being \"Luna\"."
10027030-109 = "Ah, yes. \"Luna\"."
10027030-110 = "The name sounds familiar or like... It feels like a black cat is staring at me, its bandana flapping in the breeze, from the far recesses of my memory..."
10027030-111 = "That sounds rather dangerous."
10027030-112 = "Aha! I know why. The name reminded me of a similar story."
10027030-113 = "[s] \"Really?\""
10027030-114 = "Yes. It was a comic published ages ago. I doubt it's still around... Anyway, that's why I couldn't remember the right one."
10027030-115 = "Ah, yes. It's coming back to me now. But why did you come to the Publishing Department?"
10027030-116 = "[s] \"Takane said we should come here for a clue.\""
10027030-117 = "Really? Takane..."
10027030-118 = "Hmm... Aha... Mmm... Heh heh heh..."
10027030-119 = "[s] \"So? Can you give us a clue?\""
10027030-120 = "Right! A clue. Certainly! Something Sensei and Meru would find interesting, perhaps even fascinating."
10027030-121 = "Yes! Yes! What is it?!"
10027030-122 = "Well, I don't know much about the last volume of \"Luna\". "
10027030-123 = "But don't worry. I've still got juicy info for you."
10027030-124 = "Then quit beating around the bush and tell us!"
10027030-125 = "\"Luna\" boasts a very old, very dedicated fandom. It is alive in Red Winter even now. They still meet occasionally."
10027030-126 = "They're pretty lively most of the time..."
10027030-127 = "The fandom still meets over their shared love of \"Luna\"?"
10027030-128 = "[s7] \"Fans that still gather even after the work is finished?\"\n[s8] \"Is that normal in Red Winter, Meru?\""
10027030-131 = "No... It isn't."
10027030-132 = "I mean, sure, once a work is complete, you might hear people talking about it from time to time."
10027030-133 = "But if fans are talking about it and even rallying around it..."
10027030-134 = "Well, not every work is good enough to earn that kind of dedication."
10027030-135 = "Yes. The comic has quite a history."
10027030-136 = "But..."
10027030-137 = "[s9] \"But as far as when and where the gathering takes place...\"\n[s10] \"You don't know, do you?\" "
10027030-140 = "Uh, actually, I do."
10027030-141 = "What?! How?! I thought for sure you'd tell us you had no idea!"
10027030-142 = "Well, I am rather well informed. I have quite the network of sources after all."
10027030-143 = "After all, we are the Publishing Department, no matter what anyone thinks of us!"
10027030-144 = "But earlier, you said you couldn't remember that well!"
10027030-145 = "I said it was hard to remember quickly, not that I don't know at all. Anyway, about the time and place..."
10027030-146 = "What is it? What is it?"
10027030-147 = "Heh. Heh. Heh. Not so fast. First we need to discuss payment."
10027030-148 = "[s] \"I see. You want to be compensated.\""
10027030-149 = "Indeed. "
10027030-150 = "Yakumo... What are you going to ask Sensei to give you now?!"
10027030-151 = "Not Sensei... Meru. I want something from you."
10027030-152 = "Hmm? Me?"
10027030-153 = "Yes. Nothing major. I may ask you to provide a manuscript in the future."
10027030-154 = "A manuscript?! No way! None of the ones you've commissioned have been any good at all!"
10027030-155 = "No? Then I suppose you don't need the information about \"Luna\" after all. I'm disappointed..."
10027030-156 = "Urgh!"
10027030-161 = "(Since it's for Momiji... Yeah, I can do it for Momiji.)"
10027030-167 = "Okay... I'll do it."
10027030-168 = "[s] \"Are you sure you're okay with this deal, Meru?\""
10027030-169 = "Yes. It's for Momiji. I can do this!"
10027030-170 = "Oooh! Such a beautiful display of camaraderie brings a tear to my eye."
10027030-171 = "[s] \"Meru...\""
10027030-172 = "Wait! I have conditions! I won't do anything really weird. It has to fit my style, something I believe in!"
10027030-173 = "Heh. Heh. Heh. Don't worry about that. If the manuscript I want happens to align with Meru's preferences, then so much the better for both of us..."
10027030-174 = "Now, I just need you to sign this contract agreeing that your tablet and pen are forfeit if you don't fulfill your end of the deal."
10027030-175 = "But... That's so cruel!"
10027030-176 = "Yes, I suppose to a creator, an editor would seem cruel. Now, please..."
10027030-189 = "[ns] \"Does that mean I don't have to do anything?\""
10027030-190 = "Ah, why don't we discuss that later? It'll be more fun that way. "
10027030-191 = "[s] \"Please be kind...\""
10027030-192 = "Hee. Hee. Hee."

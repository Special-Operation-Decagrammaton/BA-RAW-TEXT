10027030-10 = "3;메루;01;……으음. 그러게. 그건 어쩐지 평소와 좀 달랐다고 할지."
10027030-11 = "[s] \"타카네는…… <루나>에 대해 뭘 알고 있었던 걸까?\""
10027030-12 = "3;메루;00;글쎄…… 하지만 출판부를 찾아가 보라는 건 맞는 말인 것 같아. "
10027030-13 = "3;메루;01;녀석의 말을 그대로 따르는 건 지는 기분이라, 솔직히 마냥 달갑지는 않지만."
10027030-14 = "3;메루;02;출판부에는 붉은겨울에서 지금까지 출판된 모든 책에 대한 자료가 남아 있을 거고."
10027030-15 = "3;메루;99;그중에는 분명…… <루나>에 대한 자료도 있겠지.\n#3;em;…"

1300403-14 = "2;노노미;13;응…… 그치만 너무 일찍 오셨달까…… 지금 막 청소를 시작했거든요.\n#2;em;[...]"
1300403-15 = "2;노노미;12;깨끗해진 동아리실을 보시려면 3시간 뒤에 찾아오셔야 할 거 같은데……. 어쩌죠?"
1300403-16 = "[s] \"대청소인데 어째서 혼자 있는 거야?\""
1300403-17 = "2;노노미;04;으응? 어쩔 수 없는게 다들 주말에는 아르바이트다, 도서관이다, 바쁘거든요."
1300403-18 = "2;노노미;19;학원의 빚을 갚아나갈 시간도 부족한데 개인 공부까지 하려면 다들 몸이 두개라도 모자랄 지경이라……. \n#2;em;[속상함]"
1300403-19 = "2;노노미;13;그래서, 대청소는 제가 계속 해 오고 있어요."
1300403-20 = "2;노노미;08;응응! 당연히 해야 할 일이니까, 괜찮아요. 모두가 함께 하는 공간인걸요! \n#2;greeting"
1300403-21 = "2;노노미;03;위생이 깨끗해야 모두 건강하게 학교에 다닐 수 있을테니까!\n#2;em;[음표]"
1300403-22 = "2;노노미;01;그럼 선생님, 3시간 뒤에 다시 오시겠어요? 그땐 청소가 끝나 있을 거 같은데."
1300403-23 = "[s1] \"내가 도와줄게.\"\n[s2] \"같이 청소하자.\""
1300403-24 = "2;노노미;12;어라…… 그치만…… 어른에게 청소를 부탁드려도 되는 걸까요?\n#2;stiff"

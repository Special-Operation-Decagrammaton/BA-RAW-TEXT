[translation]
1300403-1 = "清掃的時間"
1300403-2 = "對策委員會．教室"
1300403-11 = "（發現了認真打掃教室的野乃美）"
1300403-12 = "咦？老師？"
1300403-13 = "哇啊～真的來了呢！"
1300403-14 = "嗯……但是該說來得有點太早了嗎……現在才剛開始打掃。"
1300403-15 = "如果是在3小時後來的話，我想那時候就能打掃乾淨了……怎麼辦呢？"
1300403-16 = "[s] 「明明是大掃除，為什麼只有一個人？」"
1300403-17 = "那個啊，因為大家週末不是在打工就是在圖書館，都很忙所以沒辦法。"
1300403-18 = "償還學校債務的時間都不夠了，如果還想兼顧個人課業的話，大家有兩個身體都不夠用…… "
1300403-19 = "所以，大掃除一直都是我在做。"
1300403-20 = "嗯嗯！是我想做所以才做的，沒關係。因為這是大家一起共享的空間！ "
1300403-21 = "不保持衛生又整潔的話，大家就沒辦法有精神地上學了！"
1300403-22 = "那麼老師，可以請你大約3小時後再過來嗎？到時候打掃應該也結束了。"
1300403-23 = "[s1] 「我也來幫忙吧。」\n[s2] 「一起打掃吧。」"
1300403-24 = "那個，但是……拜託大人打掃沒問題嗎？"
1300403-25 = "那個，但是……拜託大人打掃沒問題嗎？"
1300403-27 = "……嗯嗯！因為是老師嘛。 "
1300403-29 = "非常感謝。來，畚箕！ "
1300403-31 = "（和野乃美一起認真地打掃了）"
1300403-33 = "哇啊！真的變乾淨了呢！"
1300403-34 = "嗯嗯！兩個人一起做就提早結束了呢！"
1300403-35 = "和平常打掃時不同，總覺得有種滿足感……"
1300403-36 = "是因為，和老師在一起的關係嗎？"
1300403-38 = "（和野乃美在變乾淨的教室裡閒聊了一會兒，在天色漸暗的時候回去了）"

[translation]
1300403-1 = "ถึงเวลาทำความสะอาดแล้วค่ะ"
1300403-2 = "ห้องชมรมคณะกรรมการแผนงาน"
1300403-11 = "(โนโนมิกำลังทำความสะอาดห้องชมรมอยู่อย่างขยันขันแข็ง)"
1300403-12 = "อ๊ะ...? คุณครู?"
1300403-13 = "ว้าว! คุณครูมาจริงๆ ด้วย!"
1300403-14 = "แต่ว่า... คุณครูมาเร็วไปหน่อยนะคะ ฉันเพิ่งจะเริ่มทำความสะอาดเองค่ะ"
1300403-15 = "ถ้าอยากเห็นห้องชมรมที่สะอาดเอี่ยม คุณครูควรมาหลังจากนี้สัก 3 ชั่วโมงเลย...#nทำยังไงดีล่ะคะ?"
1300403-16 = "[s] \"ทำไมถึงมาทำความสะอาดอยู่คนเดียวล่ะ?\""
1300403-17 = "อืม... ช่วยไม่ได้น่ะค่ะ เพราะช่วงวันหยุดคนอื่นๆ จะยุ่งอยู่กับการทำงานพิเศษ#nหรือไปห้องสมุดกันค่ะ"
1300403-18 = "พวกเราแทบไม่มีเวลาหาเงินไปชำระหนี้ของโรงเรียน แถมยังต้องคอยดูเรื่องการเรียนด้วย#nแยกสองร่างก็ยังอาจจะไม่พอเลย.... "
1300403-19 = "เพราะงั้นฉันเลยคอยรับผิดชอบเรื่องทำความสะอาดค่ะ"
1300403-20 = "แต่ยังไงก็ต้องทำอยู่แล้ว ไม่เป็นไรหรอกค่ะ เพราะที่นี่คือพื้นที่ส่วนรวมของทุกคน!"
1300403-21 = "ถ้าเราทำความสะอาดให้ดี ก็จะดีต่อสุขภาพของทุกคนที่มาโรงเรียนยังไงล่ะคะ!"
1300403-22 = "ถ้างั้นอีก 3 ชั่วโมงคุณครูค่อยมาใหม่ได้ไหมคะ? ตอนนั้นฉันคงทำความสะอาดเสร็จพอดีค่ะ"
1300403-23 = "[s1] \"เดี๋ยวครูช่วยเอง\"\n[s2] \"มาช่วยกันทำความสะอาดเถอะ\""
1300403-24 = "เอ่อ... แต่ว่า... ขอให้ผู้ใหญ่ช่วยทำความสะอาดแบบนี้จะไม่เป็นไรใช่ไหมคะ?"
1300403-25 = "เอ่อ... แต่ว่า... ขอให้ผู้ใหญ่ช่วยทำความสะอาดแบบนี้จะไม่เป็นไรใช่ไหมคะ?"
1300403-27 = "ก็ได้ค่ะ คุณครูไม่ใช่คนอื่นคนไกลนี่เนอะ"
1300403-29 = "ขอบคุณนะคะ! นี่ไม้กวาดค่ะ!"
1300403-31 = "(ช่วยกันทำความสะอาดกับโนโนมิ)"
1300403-33 = "ว้าว! สะอาดขึ้นเยอะเลย!\n\n\n"
1300403-34 = "อืม... พอช่วยกันทำสองคนแล้วก็เสร็จเร็วขึ้นเยอะเลย"
1300403-35 = "รู้สึกต่างไปจากทุกครั้งเลย... รู้สึกภูมิใจขึ้นมานิดๆ แฮะ..."
1300403-36 = "บางทีอาจเป็นเพราะมีคุณครูมาช่วยรึเปล่าน้า?"
1300403-38 = "(คุณครูกับโนโนมินั่งคุยกันในห้องชมรมที่สะอาดเอี่ยมและแยกย้ายกันกลับเมื่อฟ้าเริ่มมืด)"

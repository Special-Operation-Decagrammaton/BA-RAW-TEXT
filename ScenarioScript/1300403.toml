[translation]
1300403-1 = "Cleaning Time"
1300403-2 = "Foreclosure Task Force Room"
1300403-11 = "(I found Nonomi cleaning the club room.)"
1300403-12 = "Huh? Sensei?"
1300403-13 = "Wow! You really came!"
1300403-14 = "Except...you are here a little early. I've only just started cleaning."
1300403-15 = "You'll have to wait a few hours if you want the club room to be clean... What should we do?"
1300403-16 = "[s] \"Why are you handling the cleaning duties by yourself?\""
1300403-17 = "Huh? Well, the others all have part-time jobs at the library on weekends. So it falls on me."
1300403-18 = "It's hard making time for studying and working to pay back the academy's debt..."
1300403-19 = "That's why I'm in charge of cleaning."
1300403-20 = "Yup! I don't mind, and everything works out better this way. This is a space for all of us to share, after all."
1300403-21 = "Keeping the school clean gives the students a healthy environment for them to learn in!"
1300403-22 = "So do you mind coming back in a few hours, Sensei? I promise the room will be sparkling by then."
1300403-23 = "[s1] \"Let me help too.\"\n[s2] \"Why not clean together?\""
1300403-24 = "But...this should be a student's duty, not yours."
1300403-25 = "But...this should be a student's duty, not yours."
1300403-27 = "...Okay, then! If you insist, Sensei."
1300403-29 = "Thanks for the help. Here's your broom!"
1300403-31 = "(Nonomi and I then gave the room a thorough cleaning.)"
1300403-33 = "Wow, this place is clean enough to eat off of!"
1300403-34 = "Yup! And we finished in record time since there were two of us."
1300403-35 = "I feel a little different than I usually do after cleaning. Maybe it's...pride? "
1300403-36 = "Maybe it's because I got to partner up with you."
1300403-38 = "(Nonomi and I chatted in the clean club room until it started to get dark."

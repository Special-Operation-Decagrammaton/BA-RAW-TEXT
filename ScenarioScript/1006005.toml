[translation]
1006005-1 = "交給溫泉開發部吧！"
1006005-6 = "（工作暫時告一段落，為了洗澡而去了一趟居住區）"
1006005-7 = "（正當我想起現在只有冷水，以沉重的步伐前進時……）"
1006005-13 = "[ns1]（……這種時間有電話？）\n[ns2] 「惠？」"
1006005-19 = "……啊，打通了！"
1006005-20 = "老師，你還在夏萊吧？#n能接電話就表示工作做得差不多了對吧？"
1006005-21 = "[s3]「嗯，沒錯唷。」\n[s4]「我是在夏萊沒錯，怎麼了嗎？」"
1006005-24 = "之後再跟你解釋！沒有時間了，老師！#n趕快過來！！"
1006005-25 = "我很急，動作快！現在馬上唷！知道嗎？#n我馬上把位置傳給你！！"
1006005-32 = "[ns]「……？？？」"
1006005-35 = "（惠傳來的位置是距離夏萊不遠的某座小山的山腳下）"
1006005-45 = "（穿越人煙稀少的森林小徑，抵達目的地時……）"
1006005-51 = "[ns5]「……難道是。」\n[ns6]「啊，一定是惠。」"
1006005-59 = "……啊，是老師！#n喂～～～！"
1006005-60 = "老師～～～！#n我在這裡唷～！這邊這邊！！"
1006005-61 = "[ns] 走向聲音傳來的方向"
1006005-62 = "老師～～！！！"
1006005-65 = "― 啊～！果然是老師啊！[wa:2300] "
1006005-67 = "― 我在等你唷！"
1006005-70 = "― 你很忙？抱歉！[wa:1540] "
1006005-72 = "― 但是請快一點！"
1006005-75 = "[ns7]「溫泉……？」\n[ns8]「這個溫泉，是惠自己做的嗎？」"
1006005-76 = "― 啊啊～確實是這樣沒錯……[wa:1430] "
1006005-77 = "― 啊啊～確實是這樣沒錯……[wa:1430] "
1006005-79 = "― 但這並不是會一直湧出來的溫泉。[wa:750] "
1006005-82 = "― 只剩下幾個小時了！"
1006005-84 = "― 所以希望在乾枯之前請老師過來！[wa:1210] "
1006005-87 = "― ……嗯？對唷？[wa:1280] "
1006005-89 = "― 是我一個人製作的唷！"
1006005-92 = "― 別看我這樣，我可是溫泉開發部！[wa:1360] "
1006005-95 = "― 再說，對需要熱水的人[wa:1150] "
1006005-97 = "― 視而不見可是不行的。[wa:900] "
1006005-100 = "― 更重要的是，"
1006005-102 = "― 這件事跟老師有關呀！……嘻嘻！[wa:2360] "
1006005-105 = "― 來吧來吧！別客氣儘管泡！[wa:1160] "
1006005-107 = "― 現在的溫度最棒了！[wa:450] "
1006005-110 = "― 這是惠特製的老師專用溫泉唷！[wa:1500] "
1006005-113 = "老師，怎麼了嗎？"
1006005-114 = "突然呆呆地站在那邊。#n不來泡溫泉嗎？"
1006005-115 = "咦～？#n……問我什麼時候開始製作的？"
1006005-116 = "嗯～這個嘛……"
1006005-117 = "知道夏萊沒有熱水的時候是清晨，所以……"
1006005-118 = "……老師？"
1006005-119 = "為什麼要露出那種表情呢？"
1006005-120 = "……我？"
1006005-121 = "我全身都是泥巴？啊哈哈，那當然囉。#n因為我一早就忙個不停啊！"
1006005-122 = "沒什麼沒什麼，別在意！#n這點小事對溫泉開發部來說是家常便飯了！"
1006005-123 = "啊，對了。難得有機會，我也來流流汗吧♪#n老師也會一起泡的吧？"
1006005-124 = "兩個人一起泡應該是沒問題的！#n雖然可能會有點擠……"
1006005-125 = "……我先請？#n咦，我嗎？"
1006005-126 = "明明這是為老師準備的……？"
1006005-130 = "唔嗯，雖然不是很懂，不過老師都這麼說了應該是有什麼理由吧？#n源泉也多少還能撐一陣子……"
1006005-131 = "那……我就先享受囉？#n稍等一下哦，老師！！"
1006005-137 = "（在那之後，與出浴的惠交換，用溫泉治癒了一天的疲勞）"
1006005-138 = "（以溫泉開發部的出色技術製成的溫泉，似乎連內心都能夠溫暖）"
1006005-142 = "（在回去的路上，我們邊走邊吃著咯哩咯哩君）"

[translation]
1006005-1 = "The Business of the Hot Springs Department"
1006005-6 = "After dinner, I went to the Residence Hall to shower."
1006005-7 = "But the water was ice cold, so I had to give up."
1006005-13 = "[ns1] \"(Who could be calling at this hour?)\"\n[ns2] Take the call."
1006005-19 = "Oh! You picked up."
1006005-20 = "Sensei! Are you there? You must be, because you picked up the phone. Right, Sensei?"
1006005-21 = "[s3] \"...Megu?\"\n[s4] \"I'm here. What is it?\""
1006005-24 = "There's no time, Sensei! I'll explain when you get here. Please come right away!"
1006005-25 = "Right now! Hurry! We're in a hurry, okay? I'll send you the location!"
1006005-32 = "[ns] \"...?\""
1006005-35 = "Megu sent me directions to the foot of a mountain that was not far from Schale."
1006005-45 = "I had to travel through the forest, away from civilization and proper roads, but I finally reached the destination."
1006005-51 = "[ns5] \"...Ah.\"\n[ns6] \"I'm definitely in the right place.\""
1006005-59 = "...! Sensei! Is that you, Sensei? It is, right?"
1006005-60 = "Sensei, over here! Over here!"
1006005-61 = "[ns] Follow the sound."
1006005-62 = "Sensei!!"
1006005-65 = "― Oh! Sensei, there you are![wa:1660] "
1006005-67 = "― I've been waiting!"
1006005-70 = "― Were you busy? Sorry![wa:980] "
1006005-72 = "― It's kinda urgent!"
1006005-75 = "[ns7] \"Megu...? What is all this?\"\n[ns8] \"A hot spring...? Did you make this?\""
1006005-76 = "― Oh, yeah! Yeah, I made it, but...[wa:590] "
1006005-77 = "― Oh, yeah! Yeah, I made it, but...[wa:590] "
1006005-79 = "― The thing is that this hot spring won't last for very long.[wa:10] "
1006005-82 = "― There's only a few hours left!"
1006005-84 = "― That's why I really wanted you to come out here before it dries up![wa:10] "
1006005-87 = "― ...Huh? Yeah...[wa:960] "
1006005-89 = "― I made it on my own. Why?"
1006005-92 = "― Well, I'm from the Hot Springs Department, of course![wa:10] "
1006005-95 = "― It's my job to bring[wa:750] "
1006005-97 = "― hot water to people in need![wa:180] "
1006005-100 = "― And, um..."
1006005-102 = "― I want to help you out especially! Heehee![wa:1280] "
1006005-105 = "― All right! Don't be shy![wa:680] "
1006005-107 = "― Hop on in, the water's fine![wa:10] "
1006005-110 = "― It's a super-special hot spring I made just for you![wa:10] "
1006005-113 = "Hey, Sensei?"
1006005-114 = "Why are you just standing there? Don't you want to get in?"
1006005-115 = "You wanna know how long I've been working on it?"
1006005-116 = "Um, I'm not sure... I guess I started right after we talked earlier..."
1006005-117 = "So, since this morning?"
1006005-118 = "... Um, Sensei?"
1006005-119 = "Is something wrong? What is it?"
1006005-120 = "...Me?"
1006005-121 = "What? Isn't it obvious? I'm just dirty from working on this!"
1006005-122 = "Hahaha! No, don't worry about it! This is all in a day's work for a member of the Hot Springs Department!"
1006005-123 = "Well, in that case, I guess we could both go in!"
1006005-124 = "I think two people could fit, although it might be a bit crowded..."
1006005-125 = "...Oh, you want me to go first?"
1006005-126 = "Hmm... Isn't it weird for me to use it first, though? I made it for you!"
1006005-130 = "Well, I guess if that's what you want, it must be okay. The hot spring should have enough time left for both of us."
1006005-131 = "I'll go ahead and wash up, then! Just wait a bit, okay, Sensei?"
1006005-137 = "After Megu got back, I took my turn, and soaked away the day's fatigue in the hot springs Megu made for me."
1006005-138 = "As expected from a member of the Hot Springs Department, it was very refreshing."
1006005-142 = "We walked back together, eating Morimori."

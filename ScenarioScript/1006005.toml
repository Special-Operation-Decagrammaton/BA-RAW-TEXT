[translation]
1006005-1 = "งานของชมรมพัฒนาออนเซ็น"
1006005-6 = "(หลังจากเสร็จงานแล้วในตอนเย็น คุณครูก็กลับไปที่พักเพื่ออาบน้ำ)"
1006005-7 = "(แต่น้ำที่อาบเย็นเหมือนน้ำแข็ง สุดท้ายก็เลยไม่ได้อาบและกลับมาห้องทำงาน)"
1006005-13 = "[ns1] (ใครโทรมาป่านนี้เนี่ย?)\n[ns2] รับโทรศัพท์"
1006005-19 = "...อ๊ะ! รับแล้ว"
1006005-20 = "คุณครู!! คุณครูยังอยู่ที่ห้องทำงานหรือเปล่า? ต้องอยู่สิเนอะ ถึงได้รับโทรศัพท์ได้? ถูกมั้ย?"
1006005-21 = "[s3] \"...เมกุเหรอ?\"\n[s4] \"ก็ยังอยู่หรอกนะ... ว่าแต่ มีเรื่องอะไรเหรอ?\""
1006005-24 = "เอาไว้อธิบายทีหลัง! ฉันไม่มีเวลาแล้ว คุณครู! ช่วยมาหาฉันตอนนี้เลยนะ!!"
1006005-25 = "นี่เป็นเรื่องด่วนมาก! คุณครูต้องออกมาทันทีเลยนะ! เข้าใจมั้ย?? เดี๋ยวฉันส่งที่อยู่ให้!!"
1006005-32 = "[ns] \"...???\""
1006005-35 = "(โลเคชันที่เมกุส่งมาคือตีนเขาแห่งหนึ่งที่ไม่ไกลจากชาเล่ต์)"
1006005-45 = "(คุณครูผ่านเส้นทางป่าที่ไม่มีทั้งผู้คนและถนนหนทางดีๆ จนมาถึงจุดหมายได้ในที่สุด)"
1006005-51 = "[ns5] \"...อ๊ะ\"\n[ns6] \"นั่นต้องเป็นเมกุแน่ๆ\""
1006005-59 = "...! อ๊ะ คุณครู!? คุณครูใช่มั้ย? ใช่แหละเนอะ?"
1006005-60 = "คุณครู~~!! ตรงนี้! ตรงนี้ๆ!!"
1006005-61 = "[ns] เดินไปตามเสียง"
1006005-62 = "คุณครู~~!!!"
1006005-65 = "― อ๊ะ~! คุณครูจริงๆ ด้วย![wa:1780] "
1006005-67 = "― ฉันกำลังรออยู่เลย!"
1006005-70 = "― ยุ่งอยู่เหรอ? โทษทีนะ![wa:940] "
1006005-72 = "― แต่ว่ามันเรื่องด่วนมากเลย!"
1006005-75 = "[ns7] \"เมกุ...? นี่มันอะไรเนี่ย?\"\n[ns8] \"ออนเซ็นเหรอ? ขุดเองคนเดียวเลยเหรอ!\""
1006005-76 = "― อา~ ก็นะ...[wa:1470] "
1006005-77 = "― อา~ ก็นะ...[wa:1470] "
1006005-79 = "― ออนเซ็นตรงนี้น่ะไม่ได้มีตลอดหรอกนะ[wa:10] "
1006005-82 = "― จะอยู่อีกแค่ไม่กี่ชั่วโมงเท่านั้นแหละ!"
1006005-84 = "― ฉันอยากให้คุณครูมาลองก่อนมันจะเหือดแห้งไปน่ะ![wa:10] "
1006005-87 = "― หืม...? แล้วยังไง?[wa:840] "
1006005-89 = "― ฉันขุดคนเดียวแหละ!"
1006005-92 = "― เห็นแบบนี้ฉันก็อยู่ชมรมพัฒนาออนเซ็นนะ![wa:440] "
1006005-95 = "― ไม่ว่ายังไงก็คงปล่อยคนที่[wa:550] "
1006005-97 = "― ต้องการน้ำอุ่นๆ ไปไม่ได้หรอก[wa:180] "
1006005-100 = "― ยิ่งไปกว่านั้น..."
1006005-102 = "― มันเป็นเรื่องของคุณครูด้วยนี่นา! ...ฮิฮิ![wa:1320] "
1006005-105 = "― เอาละๆ! เลิกเกรงใจแล้วลงไปแช่ได้แล้ว![wa:160] "
1006005-107 = "― ตอนนี้อุณหภูมิกำลังเหมาะเลย![wa:10] "
1006005-110 = "― เมกุ สเปเชียลออนเซ็นสำหรับคุณครูโดยเฉพาะ![wa:420] "
1006005-113 = "เอ๊า? คุณครู?"
1006005-114 = "ทำไมถึงยืนเฉยอยู่แบบนั้นล่ะ? ไม่ลงมาด้วยกันเหรอ?"
1006005-115 = "หืม? ...สงสัยว่าฉันขุดอยู่ตั้งแต่ตอนไหนเหรอ?"
1006005-116 = "อืม~ นั่นสิ... ก็หลังจากติดต่อคุณครูไปก่อนหน้านี้..."
1006005-117 = "งั้นก็น่าจะตั้งแต่เช้านะ?"
1006005-118 = "เอ๋... คุณครู?"
1006005-119 = "ทำไมทำหน้าแบบนั้นล่ะ? มีเรื่องอะไรเหรอ?"
1006005-120 = "ฉัน...?"
1006005-121 = "โคลนเต็มตัวเลยงั้นเหรอ? มันก็แน่นอนอยู่แล้วนี่? ก็ฉันขุดออนเซ็นอยู่ไง!"
1006005-122 = "ฮะฮะฮ่า! อะไรเนี่ย~ ไม่ต้องคิดมากหรอก! เด็กชมรมพัฒนาออนเซ็นชินกับเรื่องแบบนี้แล้ว!"
1006005-123 = "อ๊ะ ไหนๆ ก็เป็นแบบนี้แล้ว งั้นฉันลงไปล้างตัวด้วยดีมั้ย? ลงไปด้วยกันเลยเนอะ?"
1006005-124 = "ออนเซ็นตรงนี้ใหญ่พอให้คนสองคนลงพร้อมกันได้พอดีเลย! ถึงจะต้องเบียดกันบ้างก็เถอะ..."
1006005-125 = "...หืม? ไม่เป็นไรงั้นเหรอ? ให้ฉันลงไปอาบก่อนเหรอ?"
1006005-126 = "อืม~ แต่นี่เป็นบ่อที่ฉันขุดเพื่อคุณครูเลยนะ จะให้ฉันลงไปอาบก่อนมันก็จะแปลกๆ คุณครูต้องเป็นคน#nเปิดก่อนสิ"
1006005-130 = "อืม แต่ยังไงคุณครูก็ให้ลงก่อนทั้งที! ถึงฉันจะไม่รู้ว่าทำไม แต่ก็คงมีเหตุผลแหละเนอะ! อีกอย่าง น้ำพุร้อนก็น่าจะมีให้แช่ได้อีกสักพัก"
1006005-131 = "ถ้างั้นฉันจะรีบไปอาบน้ำก่อน คุณครูรอตรงนี้แป๊บหนึ่งนะ!!"
1006005-137 = "(หลังจากเมกุกลับขึ้นมาอย่างสะอาดสะอ้าน คุณครูก็ลงไปแช่ในบ่อออนเซ็นที่เมกุขุดให้เพื่อคลาย#nความเหนื่อยล้าที่สะสมมาทั้งวัน)"
1006005-138 = "(บ่อออนเซ็นที่สร้างโดยชมรมพัฒนาออนเซ็นทั้งสบายตัวและมีน้ำอุ่นพุ่งออกมาจนน่าเคลิ้มไป)"
1006005-142 = "(ตอนขากลับ คุณครูกับเมกุก็ซื้อโมริโมริคุงกินและเดินกลับไปด้วยกัน)"

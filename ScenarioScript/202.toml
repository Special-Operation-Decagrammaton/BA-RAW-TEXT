[translation]
202-1 = "#title;헤세드, 자비로운 고통으로 정죄하는 심판자"
202-2 = "3;검은 양복;00;<폐허>라고 불리는 이 공간은 저희에게도 흥미로운 곳입니다. \n#3;a"

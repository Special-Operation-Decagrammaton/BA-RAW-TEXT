202-5 = "3;검은 양복;00;디비전이라는 이 무한의 군대를 생산하던 공장의 컨트롤 AI에 데카그라마톤이 접촉했습니다."
202-6 = "3;검은 양복;00;이제 이 군수 공장 자체는 데카그라마톤의 새로운 예언자로서 그 스스로의 길을 밝힐 겁니다."
202-7 = "#all;hide"
202-8 = "#na;검은 양복;――헤세드(CHESED)."
202-9 = "#na;검은 양복;그의 패스path는 권력을 통해서 동작하는 자비."
202-10 = "#na;검은 양복;그의 이명은 자비로운 고통으로 정죄하는 심판자#n(the judge who condemns with compassionate torment)"
202-11 = "3;검은 양복;00\n#3;h"
202-12 = "3;검은 양복;00;견고한 왕국과 충성스러운 신민들을 상대로 그의 권위를 빼앗을 수 있을까요."
202-13 = "3;검은 양복;00;이것 또한 흥미로운 문제입니다.\n#3;closeup"

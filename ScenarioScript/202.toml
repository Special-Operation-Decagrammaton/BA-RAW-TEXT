[translation]
202-1 = "赫賽德：以慈悲的痛苦定罪的審判者"
202-2 = "這個被稱為「廢墟」的空間，是個非常令我們感興趣的地方。 "
202-3 = "蓋瑪特利亞的幾位夥伴也十分關心、注視著這個地方。"
202-4 = "現在已不再運作、遭到封鎖的軍需工廠。"
202-5 = "曾經控制這座工廠、生產過無限軍隊、名為「Divi:Sion」的AI與十字神名接觸了。"
202-6 = "今後這座軍需工廠，將會以十字神名新預言者的身分，開拓自己的道路吧。"
202-8 = "──[ruby=Chesed]赫賽德[/ruby]。"
202-9 = "其[ruby=Path]道路[/ruby]是藉由權力行使的慈悲。"
202-10 = "它的別名是「[ruby=the judge who condemns with compassionate torment]以慈悲的痛苦定罪的審判者[/ruby]」。"
202-12 = "面對穩固的王國和忠誠的人民，是否能夠奪取那份權威呢。"
202-13 = "這也是個令人感興趣的問題。"

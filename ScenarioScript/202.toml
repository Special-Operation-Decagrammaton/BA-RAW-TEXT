[translation]
202-1 = "Chesed, the Merciful Arbitrator"
202-2 = "These supposed ruins should prove worthwhile for us."
202-3 = "A few of my colleagues in Gematria have taken great interest in this place."
202-4 = "A long-silenced munitions factory, hmm?"
202-5 = "Decagrammaton made contact with Divi:Sion, the AI producing an endless army."
202-6 = "Now, the munitions factory itself has been enlightened and set on a new path as a prophet of Decagrammaton."
202-8 = "Chesed."
202-9 = "Its path is mercy born through power."
202-10 = "Its title is the Merciful Arbitrator."
202-12 = "Will usurping its reign over a stable kingdom and loyal subjects really be possible?"
202-13 = "This too is an interesting topic."

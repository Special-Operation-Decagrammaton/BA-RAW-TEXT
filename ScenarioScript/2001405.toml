[translation]
2001405-1 = "Frugality"
2001405-3 = "[s] \"You're in a good mood.\""
2001405-4 = "Sensei!"
2001405-5 = "Yes, you're right!"
2001405-6 = "I scored a really good find at the flea market this morning."
2001405-7 = "It's..."
2001405-8 = "A 37mm spade mortar!"
2001405-9 = "[s] \"...A what-now?\""
2001405-10 = "Oh, I guess you wouldn't have seen one before."
2001405-11 = "It makes sense you haven't. It's really rare and almost all production records are gone."
2001405-12 = "Some weirdo from the Red Winter Academy made one a long time ago! And look. It doubles as a trenching shovel!"
2001405-13 = "Look, you can hold the gun barrel like a shovel handle! But then, hold it here...and voila! Now it's a mortar!"
2001405-14 = "It's so innovative! Its multi-functional nature is amazing!"
2001405-15 = "This single piece of equipment can handle both close and long-range combat!"
2001405-16 = "I don't get why they stopped producing something as cool as this."
2001405-17 = "[s] \"Maybe it wasn't as useful as it seems?\""
2001405-18 = "Huh? No way."
2001405-19 = "Trenching shovels and mortars are both essential pieces of equipment! Only snotty higher-ups who've never dug a trench before don't understand that."
2001405-20 = "This mortar was probably discarded by one of those of high-ranking officials who didn't understand its value in infantry warfare."
2001405-21 = "But I'll prove its true worth."
2001405-22 = "[s] \"It's super rusty.\""
2001405-23 = "That's expected. The seller said it was collecting dust in storage for decades."
2001405-24 = "It'll be a cinch to fix up though. It has a pretty simple structure."
2001405-25 = "Never give up on equipment that can be fixed with some cleaning, tightening, and greasing!"
2001405-26 = "Okay, Sensei. Let's repair this mortar!"
2001405-27 = "[s] \"I'll try my best.\""
2001405-30 = "― ...Ugh, ugh![wa:470] "
2001405-33 = "― ...Hmph.[wa:10] "
2001405-35 = "― It's so stiff. It won't move at all.[wa:860] "
2001405-38 = "― It needs more grease...[wa:840] "
2001405-40 = "― Sensei, can you hand me the lubricating oil over there?[wa:1270] "
2001405-43 = "[ns] Give her the lubricating oil."
2001405-44 = "― Whoa, it's moving pretty well now![wa:160] "
2001405-47 = "― Ahh... I love taking off rust.[wa:1680] "
2001405-49 = "― It feels so good.[wa:480] "
2001405-52 = "― My hand movements are making you uncomfortable?[wa:1950] "
2001405-55 = "― H-Huh?![wa:340] "
2001405-58 = "― This is the holy process of maintaining a muzzle![wa:10] "
2001405-60 = "― What are you talking about, you idiot![wa:10] "
2001405-63 = "All done!"
2001405-64 = "Look at this shiny barrel and shovel blade. How beautiful."
2001405-65 = "You can't deny the classic charm of a classic weapon."
2001405-66 = "Okay, let's try a test shot!"
2001405-67 = "Aim the barrel toward the target...load the shell..."
2001405-68 = "Fire!"
2001405-72 = "..."
2001405-73 = "What was that? Was it a dud?"
2001405-74 = "Must've been. One more try."
2001405-75 = "Fire!"
2001405-80 = "Is it just too much to shoot a 37mm high explosive with a howitzer?"
2001405-81 = "This won't even pierce a helmet, let alone a Tochka..."
2001405-82 = "That's okay! It's not very powerful, but this mortar still has an advantage since you can dig with it."
2001405-83 = "For example, I can easily move this pile of dirt here!"
2001405-88 = "Very...easily..."
2001405-93 = "This shovel sucks. The thick barrel gets in my way. And it's so heavy!"
2001405-94 = "I'd rather dig a trench with my bare hands than use this!"
2001405-95 = "[s] \"I guess there's a reason no one is using this weapon.\""
2001405-96 = "B-But it's such a rare piece of equipment."
2001405-97 = "There has to be some use for it!"
2001405-99 = "Saki stubbornly carried around the spade mortar for a long time."
2001405-100 = "But one day, the mortar was found in a nearby barn, covered in dust."

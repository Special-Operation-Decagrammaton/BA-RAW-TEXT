[translation]
2001405-1 = "大小兼得？"
2001405-3 = "[ns] 「咦，咲希，發生了什麼好事嗎？」"
2001405-4 = "啊，老師。"
2001405-5 = "嗯，確實……你看這個。"
2001405-6 = "今天早上我在附近的跳蚤市場找到了稀有的東西。"
2001405-7 = "看了可別嚇到哦……"
2001405-8 = "是「37mm工兵鏟迫擊砲」哦！"
2001405-9 = "[s] 「……那是什麼？」"
2001405-10 = "原來如此，老師說不定是第一次見到呢。"
2001405-11 = "這個迫擊砲是以前某個赤冬聯邦學園的怪人所製作出來的，#n能夠當成工兵鏟來用的迫擊炮哦！"
2001405-12 = "是連生產紀錄都沒有留下多少的稀有物品，不知道也不奇怪。"
2001405-13 = "平時可以把這個炮管像把手一樣握住，當成工兵鏟來用……#n當敵人出現的時候就像這樣架好，當成迫擊砲使用。"
2001405-14 = "既是鏟子又是迫擊砲，不覺得很厲害嗎？"
2001405-15 = "僅靠一個東西就能應對各種狀況，簡直是夢幻般的發明啊！"
2001405-16 = "明明應該是個了不起的發明……為什麼會停止生產呢，完全無法理解。"
2001405-17 = "[s] 「比想像中還不實用……之類的？」"
2001405-18 = "姆，這可不能當作沒聽見啊。"
2001405-19 = "這可是鏟子跟迫擊砲的結合哦，功能就應該是越多越好！#n只要挖過一次戰壕，大家都會感同身受的！"
2001405-20 = "就是因為那些大人物沒有這種經驗，它才會被迫停止生產的吧……"
2001405-21 = "好，決定了。我要藉由實際使用，再次證明這個裝備的實用性！"
2001405-22 = "[s] 「那首先應該先除鏽比較好呢。」"
2001405-23 = "確實……仔細一看鏽的很嚴重呢。不過它似乎一直被放在倉庫裡，這也沒辦法。"
2001405-24 = "嘛，這種程度的話我還能處理。首先先進行拆解，清理乾淨後再塗上油……"
2001405-25 = "只要好好整備一下，就能和新的一樣了！"
2001405-26 = "好，那麼整備迫擊砲開始！幫幫我吧，老師！"
2001405-27 = "[s] 「嗯，雖然是第一次但我會加油的。」"
2001405-30 = "― 嗯，咕……！[wa:710] "
2001405-33 = "― ……呿。[wa:110] "
2001405-35 = "― 是裡面堵住了嗎，完全拔不出來。[wa:1700] "
2001405-38 = "― 得要潤滑一下才行……[wa:1360] "
2001405-40 = "― 老師，可以把放在那邊的潤滑油拿給我嗎？[wa:2710] "
2001405-43 = "[ns] 遞出潤滑油"
2001405-44 = "― 哦，好像可以了……？[wa:1120] "
2001405-47 = "― 啊……這種把鏽除掉的瞬間，[wa:2360] "
2001405-49 = "― 真是太愉悅了……[wa:840] "
2001405-52 = "― ……你說很在意我的手勢，所以有點無法直視？[wa:2990] "
2001405-55 = "― 啊啊啊啊！？[wa:380] "
2001405-58 = "― 這可是神聖的整備作業啊！[wa:1030] "
2001405-60 = "― 在說什麼啊笨蛋！？[wa:630] "
2001405-63 = "完成了！！"
2001405-64 = "你看，這閃閃發亮的炮管，還有鏟子的鏟頭……太美了……"
2001405-65 = "果然這種古典的武器有它獨特的魅力啊。"
2001405-66 = "那麼，既然已經清理乾淨了，就來進行一次射擊測試吧。"
2001405-67 = "瞄準完畢，裝填完成……"
2001405-68 = "發射！"
2001405-72 = "……"
2001405-73 = "……啊？難道是，啞彈……？"
2001405-74 = "這，這不可能……"
2001405-75 = "再來一次……！"
2001405-80 = "怎，怎麼會這樣……？威力也很弱……"
2001405-81 = "怎麼會，37mm榴彈是不行的嗎……？這種威力別說是堡壘了，就連鋼盔都射不穿……"
2001405-82 = "沒，沒關係，威力雖然有點那個……#n不過這個迫擊砲還有「能當成工兵鏟使用」這個優點……！"
2001405-83 = "比方說你看，這裡的土輕輕鬆鬆地就……"
2001405-88 = "輕輕鬆鬆地就……"
2001405-93 = "……啊啊真是的，砲管好礙事！而且好重！"
2001405-94 = "要用這種東西挖戰壕的話，我乾脆徒手挖還比較快吧！？"
2001405-95 = "[s] 「果然不再被使用的武器，都是有相應的理由的。」"
2001405-96 = "咕嗚……可是這明明是難得獲得的稀有裝備……"
2001405-97 = "一定，一定有什麼地方可以，派上用場……！"
2001405-99 = "（之後一段時間裡，儘管咲希拿著工兵鏟迫擊砲走來走去，試圖找出它的用途……）"
2001405-100 = "（最終似乎是放棄了硬要使用它，讓它靜靜地在附近的倉庫裡被灰塵覆蓋）"

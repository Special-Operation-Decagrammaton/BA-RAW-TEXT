[translation]
2001405-1 = "#title;근검절약"
2001405-2 = "3;사키 헬멧;03\n#3;em;[음표]\n#3;a\n#wait;1500"
2001405-3 = "[ns] 뭔가 기분이 좋아 보이네."
2001405-4 = "3;사키 헬멧;02;아, 선생님.\n#3;em;[반응]"
2001405-5 = "3;사키 헬멧;03;후후, 눈치챘어?"
2001405-6 = "3;사키 헬멧;03;오전에 근처의 벼룩시장을 들렸다가 귀한 물건을 구했거든."
2001405-7 = "3;사키 헬멧;03;바로…….\n#3;em;…"
2001405-8 = "3;사키 헬멧;07;37mm 야삽 박격포야!\n#3;closeup\n#fontsize;80"
2001405-9 = "[s] \"……이게 뭐야?\""
2001405-10 = "3;사키 헬멧;02;아, 선생은 처음 보는 물건이려나.\n#3;em;[반응]"
2001405-11 = "3;사키 헬멧;99;모르는 것도 이상한 일은 아니지. 이제는 생산 기록도 거의 남아있지 않은 희귀한 물건이니까."
2001405-12 = "3;사키 헬멧;03;이 박격포는 오래전 붉은겨울 학원 출신의 어느 괴짜가 만든 물건으로, 야전삽으로도 사용할 수 있는 박격포야!\n#3;em;[재잘]"
2001405-13 = "3;사키 헬멧;07;평소에는 포열 부분을 손잡이처럼 쥐고 삽으로 사용하다가 적이 나타나면 방열해서 박격포로 쓸 수 있지."
2001405-14 = "3;사키 헬멧;03;대단하지 않아? 야전삽과 박격포를 장비 하나로 해결할 수 있다니…….\n#3;em;[반짝]"
2001405-15 = "3;사키 헬멧;07;어지간한 대인 전술은 이 장비 하나로 해결할 수 있다고!\n#3;hophop"
2001405-16 = "3;사키 헬멧;04;……그런데 이렇게 훌륭한 물건이 어째서 더 이상 생산되지 않는지 도무지 이해할 수가 없네."
2001405-17 = "[s] \"생각보다 쓸모가 없어서 그런 게 아닐까?\""
2001405-18 = "3;사키 헬멧;10;하아? 그럴 리가 없잖아?\n#3;em;[빠직]"
2001405-19 = "3;사키 헬멧;11;야전삽과 박격포는 많으면 많을수록 좋다고! 그걸 모르는 건 참호 한 번 제 손으로 파본 적 없는 높으신 분들밖에 없을 걸."
2001405-20 = "3;사키 헬멧;99;……분명 이 박격포는 보병전의 진가를 모르는 높으신 분들에 의해 폐기된, 비운의 장비임이 틀림없어."
2001405-21 = "3;사키 헬멧;03;내가 보란 듯이 이 장비의 진가를 증명해 주겠어!\n#3;em;[반짝]"
2001405-22 = "[s] \"그나저나 엄청나게 녹이 슬어 있는데.\""
2001405-23 = "3;사키 헬멧;01;판매자의 말로는 창고에 수십 년 넘게 방치되어 있었다고 하니 어쩔 수 없지.\n#3;em;…"
2001405-24 = "3;사키 헬멧;02;하지만 괜찮아. 이런 단순한 구조의 장비는 쉽게 정비할 수 있으니까."
2001405-25 = "3;사키 헬멧;03;대개의 장비는 닦고, 조이고, 기름치면 금세 새것처럼 만들 수 있다고!"
2001405-26 = "3;사키 헬멧;07;자, 선생님. 지금부터 이 박격포를 깨끗이 정비하는 거야!\n#3;closeup\n#3;em;[음표]"
2001405-27 = "[s] \"일단은 열심히 해 볼게.\""

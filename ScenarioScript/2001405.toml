[translation]
2001405-1 = "ขยันหมั่นเพียรและอดออม"
2001405-3 = "[ns] ดูอารมณ์ดีจังเลยนะ"
2001405-4 = "อ๊ะ คุณครู"
2001405-5 = "ฮิฮิ รู้ด้วยเหรอ?"
2001405-6 = "เมื่อเช้าฉันได้ของดีๆ มาจากตลาดของมือสองด้วยละ"
2001405-7 = "นั่นก็คือ..."
2001405-8 = "ปืนครก Spade Mortar 37 มม. ละ!"
2001405-9 = "[s] \"อะไรเนี่ย...?\""
2001405-10 = "อ๊ะ คุณครูเพิ่งเคยเห็นงั้นเหรอ"
2001405-11 = "แต่ว่าจะไม่รู้จักก็ไม่แปลกหรอก... ในยุคนี้น่ะ มันเป็นของหายากมากๆ ที่แทบจะไม่มีบันทึกการผลิต#nหลงเหลืออยู่แล้วละ"
2001405-12 = "พวกคนประหลาดจากเรดวินเทอร์เป็นคนผลิตปืนครกนี่ขึ้นน่ะ เป็นปืนครกที่สามารถใช้เป็นพลั่วสนามได้ด้วยไงล่ะ!"
2001405-13 = "ในเวลาปกติ สามารถจับตรงที่จับกระบอกปืนแล้วใช้เป็นพลั่วได้ และถ้าหากศัตรูโผล่มาก็สามารถใช้#nเป็นปืนจัดการศัตรูได้ด้วย"
2001405-14 = "สุดยอดเลยใช่ไหมล่ะ? ใช้เป็นทั้งพลั่วแล้วก็ปืนได้ในอุปกรณ์ชิ้นเดียว..."
2001405-15 = "แค่มีมันก็สามารถใช้รับมือการต่อสู้ตัวต่อตัวได้ทุกรูปแบบเลย!"
2001405-16 = "ฉันไม่เข้าใจเลยว่าทำไมถึงเลิกผลิตอุปกรณ์ที่ยอดเยี่ยมแบบนี้ไป..."
2001405-17 = "[s] \"อาจเพราะไม่มีประโยชน์อย่างที่คิดก็ได้รึเปล่า?\""
2001405-18 = "หืม? ไม่มีทางหรอก"
2001405-19 = "ปืนครกกับพลั่วน่ะ ยิ่งมีเยอะก็ยิ่งดีนะ! คนที่ไม่รู้เรื่องพวกนี้ก็มีแค่พวกคนใหญ่คนโตที่ไม่เคยต้องขุด#nหลุมหลบภัยกลางสนามรบด้วยตัวเองนั่นแหละ"
2001405-20 = "เห็นได้ชัดว่าปืนครกนี่โชคร้ายต้องถูกทอดทิ้ง เพราะพวกคนใหญ่คนโตไม่รู้ถึงคุณค่าของมัน"
2001405-21 = "ฉันจะพิสูจน์ให้เห็นถึงคุณค่าของอุปกรณ์ชิ้นนี้เอง!"
2001405-22 = "[s] \"แต่มันมีแต่สนิมทั้งนั้นเลยนะ\""
2001405-23 = "คนขายบอกว่ามันถูกทิ้งเอาไว้ในคลังสินค้าและไม่มีใครดูแลบำรุงรักษามานานหลายสิบปีแล้วน่ะ"
2001405-24 = "แต่ไม่เป็นไรหรอก อุปกรณ์ที่มีโครงสร้างไม่ซับซ้อนแบบนี้ บำรุงรักษาได้ไม่ยากหรอก"
2001405-25 = "อุปกรณ์ส่วนใหญ่แค่ขัดๆ ถูๆ แล้วก็อัดจาระบีนิดหน่อยก็กลายเป็นเหมือนอุปกรณ์ใหม่ในพริบตาได้#nแล้วละ!"
2001405-26 = "เอาละ คุณครู ได้เวลาบำรุงรักษาอุปกรณ์ให้ดูเหมือนใหม่แล้ว!"
2001405-27 = "[s] \"ครูจะพยายามแล้วกัน\""
2001405-30 = "― อึก...  ฮึ่บบบ...[wa:270] "
2001405-33 = "― ชิ...[wa:70] "
2001405-35 = "― ข้างในมันแน่นไปหมด ไม่ยอมขยับเลย[wa:1020] "
2001405-38 = "― ถ้าไม่ทำ... ให้มันลื่นขึ้นอีกสักหน่อยละก็คงขยับไม่ได้แน่...[wa:10] "
2001405-40 = "― คุณครู ช่วยไปหยิบจาระบีที่วางอยู่ตรงนั้น... มาให้ฉันหน่อยได้ไหม?[wa:910] "
2001405-43 = "[ns] ส่งจาระบีให้"
2001405-44 = "― โอ๊ะ มันขยับได้แล้ว[wa:760] "
2001405-47 = "― ฮะฮะฮะ... ตอนที่ขัดสนิมออกแบบนี้[wa:1600] "
2001405-49 = "― มันทำให้... รู้สึกดีสุดๆ เลยละ[wa:10] "
2001405-52 = "― อะไรนะ? ท่าขยับมือของฉัน มันน่าคิดไปไกล เลยไม่กล้ามองตรงๆ งั้นเหรอ?[wa:1150] "
2001405-55 = "― หะ...หา...?![wa:140] "
2001405-58 = "― นี่เป็นงาน...บำรุงรักษาอุปกรณ์ที่ศักดิ์สิทธิ์นะ![wa:10] "
2001405-60 = "― พูดอะไรไร้สาระชะมัด?! คุณครูบ้า![wa:10] "
2001405-63 = "เสร็จแล้ว!"
2001405-64 = "ดูกระบอกปืนและที่ตักเงางามนี่สิ สวยจังเลย..."
2001405-65 = "กะไว้แล้วเชียวว่าอาวุธแบบคลาสสิกนี่มีเสน่ห์ในตัวจริงๆ ด้วย"
2001405-66 = "เอาละ ถ้างั้นมาลองทดสอบยิงกันหน่อยดีไหม?"
2001405-67 = "ปรับกระบอกปืนให้เล็งไปทางเป้าหมาย... จากนั้นก็บรรจุกระสุนลงไป..."
2001405-68 = "แล้วก็...ยิง!"
2001405-72 = "..."
2001405-73 = "เมื่อกี้อะไรน่ะ? ระเบิดด้านงั้นเหรอ?"
2001405-74 = "ไม่มีทาง... ไหนลองอีกทีซิ..."
2001405-75 = "ยิง...!"
2001405-80 = "ว่าแล้วเชียว ยิงลูกระเบิดแรงสูงขนาด 37 มม. แบบวิถีโค้งแบบนี้ไม่ไหวจริงๆ ด้วยสินะ...?"
2001405-81 = "แรงยิงแค่นี้เจาะหมวกกันน็อกยังไม่ได้ ไม่ต้องพูดถึงการสกัดขีปนาวุธโต๊ชก้าเลย"
2001405-82 = "มะ... ไม่เป็นไร! ถึงความแรงจะลดลงไปนิดหน่อย แต่ปืนครกนี่ก็ยังมีข้อได้เปรียบคือเอาไปใช้เป็น#nพลั่วสนามได้อยู่"
2001405-83 = "อย่างเช่นขุดดินที่อยู่ในบริเวณนี้..."
2001405-88 = "ขุดเบาๆ..."
2001405-93 = "พลั่วนี่มันอะไรกันเนี่ย! ลำปืนมันใหญ่จนเกะกะไปหมด แถมยังหนักอีกด้วย!"
2001405-94 = "ถ้าต้องใช้ของแบบนี้ขุดหลุมหลบภัย ใช้มือเปล่าขุดยังจะง่ายกว่าอีก!"
2001405-95 = "[s] \"ที่ไม่ถูกเอามาใช้งานเพราะมีเหตุผลอยู่สินะ\""
2001405-96 = "อึก... แต่ว่ามันก็เป็นอุปกรณ์ที่หามาได้อย่างยากลำบากมากเลยนะ..."
2001405-97 = "มันจะต้อง... จะต้องใช้ประโยชน์อะไรได้บ้างแน่ๆ!"
2001405-99 = "(หลังจากนั้น ซากิก็ฝืนแบกปืนครกไปมาอยู่พักใหญ่...)"
2001405-100 = "(จนเธอยอมแพ้ในที่สุด หลังจากนั้นปืนครกนั่นก็ถูกพบอยู่ในที่เก็บของในสภาพที่มีแต่ฝุ่นเกาะเต็มไป#nหมด)"

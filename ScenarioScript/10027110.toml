[translation]
10027110-1 = "第11話;特別的交易"
10027110-4 = "赤冬聯邦學園．雪山"
10027110-6 = "哇啊啊啊！遲到了遲到了！真的要遲到了！"
10027110-7 = "不過總算是擊退他們了呢……#n辛苦你了，老師……"
10027110-11 = "[ns]「我的直覺告訴我……這是不祥的徵兆……！」"
10027110-12 = "為什麼突然這麼說，老師？"
10027110-13 = "咦？你說相同的事發生兩次之後，就很可能發生第三次？#n別說那些奇怪的話嘛～"
10027110-14 = "沒錯，雖然巧合接連發生，但這些事都是獨立事件，所以……"
10027110-22 = "聽說「知識解放戰線」正在製作貴重的「同人誌」！！"
10027110-23 = "嗯！聽說和香有個好點子，所以我也一起來了！"
10027110-25 = "難道……？"
10027110-27 = "雖然不清楚同人誌的內容，不過我聽說那是種價值連城的物品。"
10027110-28 = "假如能把它弄到手，拿來和潔莉諾會長「交易」的話……#n說不定我們227號特別班能獲得一個熱呼呼的暖爐哦？"
10027110-29 = "時雨醬！？不要習慣227號特別班的生活啊！#n現在該思考的應該是怎樣才能盡快復學吧！"
10027110-30 = "總而言之，潔莉諾會長本來就是個很貪心的人。#n只要是別人覺得珍貴的東西就會不擇手段地拿到手，哪怕只是出於羨慕也一樣。"
10027110-31 = "我們就是要利用潔莉諾會長的這個特點，從停學生活中解放……#n回歸禦寒設備完善、被子裡沒有蟲、不會出現飢餓的熊的那種……「正常」的生活！"
10027110-38 = "不要拿別人的同人誌做那種事啦！"

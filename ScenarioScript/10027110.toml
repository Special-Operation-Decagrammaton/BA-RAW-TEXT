10027110-27 = "5;시구레;03\n1;노도카;99;동인지의 내용은 잘 모르지만, 아무튼 그게 뭔가 귀중한 데다 가치 있는 물건이라고 들었거든요.\n#1;em;…"
10027110-28 = "5;시구레;09;그래서 그걸 얻어서 체리노 회장과…… '거래'를 하면, 227호 특별반에 따듯한 난로를 들여놓을 수 있을지도 모르잖아?"
10027110-29 = "1;노도카;04;시구레 쨩?! 227호 특별반의 생활에 익숙해져 버리면 어떡해! 어떻게든 정학에서 벗어날 생각을 해야지!\n#1;em;[?!]"
10027110-30 = "1;노도카;05;어쨌든, 체리노 회장은 욕심이 많고, 남들이 귀하다는 물건이라면 사족을 못 쓰니까 말이에요. 부러워서라도 샘이 나서라도 반드시 자기 것으로 만들려 하겠죠."
10027110-31 = "1;노도카;07;우리는 체리노 회장의 바로 그런 부분을 이용해서, 정학에서 벗어나…… 제대로 된 난방기구가 마련되어 있고, 벌레가 나오지 않는 이불이 있으며, 굶주린 곰이 나오지도 않는…… '보통'의 생활로 돌아갈 거예요!\n#1;em;[반짝]"

[translation]
10027110-1 = "Episode 11; A Special Deal"
10027110-4 = "Red Winter Snowfields"
10027110-6 = "Uwaaahhh! I'm defnitely gonna be late now!"
10027110-7 = "At least we got them to back down. Good job, Sensei..."
10027110-11 = "[ns] \"To quote Momiji... I've got a bad feeling about this.\""
10027110-12 = "Don't be silly, Sensei. The worst is over."
10027110-13 = "What are the odds that a third group would accost us?"
10027110-14 = "Yeah. Besides, this is all just a coincidence. Both of those groups were acting alone with their own agenda—"
10027110-22 = "Hey! I heard the Knowledge Liberation Front was making some valuable fan fiction!"
10027110-23 = "Yeah! Nodoka said she had a good idea for it, and I'm here to support her!"
10027110-25 = "Could it be...?"
10027110-27 = "I have no idea what it's about, but I heard it's valuable, and that's all I care about."
10027110-28 = "I figure all we need to do is get our hands on it. Then we can sell it to President Cherino for a pretty penny and finally get a stove for Spec Ops No. 227."
10027110-29 = "Shigure?! Why would you get a stove?! You're supposed to be earning your way out of suspension, not making yourself comfortable!"
10027110-30 = "Regardless, I intend to take advantage of President Cherino's greed. She's determined to have it all as they say, so why fight the inevitable. She's going to get it eventually, whether you like it or not."
10027110-31 = "Give it to us, and you'll be helping us get out of suspension and back to a normal life with proper heating, blankets that aren't full of bugs, and a bear-free existence!"
10027110-38 = "No way! Find somebody else's fanfic to steal!"

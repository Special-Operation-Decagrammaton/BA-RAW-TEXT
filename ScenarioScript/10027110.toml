[translation]
10027110-1 = "ตอนที่ 11;การแลกเปลี่ยนพิเศษ"
10027110-4 = "ทุ่งหิมะเรดวินเทอร์"
10027110-6 = "อ๊ากกกก! สายแล้ว! ไม่ทันๆ! ไม่ทันแน่เลย!"
10027110-7 = "แต่ยังไงเราก็ขับไล่พวกนั้นไปได้นะคะ ทำได้ดีมากเลยค่ะคุณครู..."
10027110-11 = "[ns] \"สัญชาตญาณกำลังบอก... ว่านี่คือลางร้าย...!\""
10027110-12 = "หมายความว่ายังไงคะคุณครู?"
10027110-13 = "ว่าไงนะ? เรื่องร้ายๆ ที่เกิดมาแล้วถึง 2 รอบ อาจมีรอบที่ 3 ก็ได้งั้นเหรอ? ไม่เอาสิ อย่าพูดอะไรแปลกๆ สิครู"
10027110-14 = "ใช่ค่ะ มันก็แค่เรื่องที่บังเอิญเกิดขึ้นไล่เลี่ยกันเท่านั้นแหละค่ะ เพราะงั้น..."
10027110-22 = "พวกฉันได้ยินมาว่า <ชมรมแนวร่วมปลดปล่อยความรู้> กำลังทำสิ่งที่เรียกว่า 'โดจินชิ' ที่มีคุณค่าบางอย่างอยู่ ก็เลยมาที่นี่ค่ะ!"
10027110-23 = "ใช่! ส่วนฉันก็ตามมาอีกทีเพราะโนโดกะบอกว่ามีไอเดียดีๆ!"
10027110-25 = "อย่าบอกนะว่า...?"
10027110-27 = "ถึงฉันจะไม่ค่อยรู้เรื่องราวในโดจินชิ แต่ก็ได้ยินมาว่ามันเป็นของที่ทั้งล้ำค่าและมีคุณค่าค่ะ"
10027110-28 = "พวกเราก็เลยอยากได้มันไปทำ 'ข้อแลกเปลี่ยน' กับประธานเชริโน่... เพราะถ้าทำแบบนั้น ประธานเชริโน่อาจจะติดตั้งเตาทำความร้อนในห้องพิเศษ 227 ให้ก็ได้"
10027110-29 = "ชิกุเระจัง?! ถ้าทำแบบนั้นแล้วคุ้นเคยกับการใช้ชีวิตในห้องพิเศษ 227 ขึ้นมาจะทำยังไง! เราต้องหา#nทางให้ถูกเลิกพักการเรียนต่างหากเล่า!"
10027110-30 = "ยังไงก็เถอะค่ะ ประธานเชริโน่น่ะเป็นคนโลภ ถ้าเป็นของที่คนอื่นบอกกันว่ามันเป็นของล้ำค่าแล้วละก็ เธอจะต้องอยากได้และพยายามทำให้ของชิ้นนั้นเป็นของตัวเองให้ได้ค่ะ"
10027110-31 = "เราก็แค่จะใช้ประโยชน์จากนิสัยนั้นของประธานเชริโน่ แล้วก็ออกจากชีวิตพักการเรียน... แล้วกลับไป#nใช้ชีวิต 'ปกติ' ในที่ที่มีเครื่องทำความร้อน ไม่มีแมลงออกมา แล้วก็ไม่มีหมีที่หิวโซโผล่มาด้วยค่ะ!"
10027110-38 = "อย่าเอาโดจินชิของคนอื่นไปทำเรื่องแบบนั้นนะ!"

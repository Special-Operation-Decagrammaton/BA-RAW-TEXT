[translation]
10018015-8 = "走，走著瞧！"
10018015-9 = "我們會讓你們明白，招惹「饕餮頭盔團」會有什麼樣的下場！"
10018015-15 = "真是一群沒品味的傢伙呢。"
10018015-19 = "那麼，既然礙事的人已經走了……去聽聽老闆娘怎麼說吧。"
10018015-24 = "很感謝你們的好意，但要繼續經營這間店……"
10018015-25 = "只能說是心有餘而力不足啊。"
10018015-26 = "[s]「不介意的話，可以告訴我們詳細的原因嗎？」"
10018015-27 = "原因是嗎……"
10018015-28 = "也好……反正就快要結束營業了……"
10018015-32 = "如果你們有仔細看過這條商店街的話，也許已經查覺到了……"
10018015-33 = "這個地方開了很多間連鎖店。"
10018015-35 = "（大型企業以低廉的價格，向顧客提供標準化食物的現象……）"
10018015-36 = "（作為踏在美食之路的人來說，這是件非常令人心痛的事……）"
10018015-38 = "我也曾經想過，要和那些連鎖店進行削價競爭……"
10018015-39 = "但對我們這種個人經營的店來說，實在是吃不消……"
10018015-40 = "再加上最近出現了新的問題……#n使情況更加雪上加霜……"
10018015-41 = "還有別的問題嗎？"
10018015-42 = "沒錯。我們店裡的食材，是向一間名為「喵食品」的大型食品公司採購的……"
10018015-43 = "前幾天，喵食品告知我說要調漲食材的價格。"
10018015-44 = "而向喵食品採購食材的，還有那些連鎖店……"
10018015-50 = "先，先等一下！"
10018015-51 = "這樣的話，連鎖店的價格也會上升吧？"
10018015-52 = "說的沒錯。如果供應商相同的話，他們的價格也應該會提高才對。"
10018015-53 = "唔～嗯，雖然我不是太清楚，總之就是大家的物價都上漲了是吧？"
10018015-55 = "不，因為那些連鎖店也是喵食品旗下經營的……"
10018015-56 = "所以物價上漲的部分，就透過降低店租之類的方式……"
10018015-57 = "讓他們得以維持原本的價格。"
10018015-58 = "這也太過分了！"
10018015-59 = "這叫小店家要如何是好！"
10018015-60 = "這樣的話……老闆娘的店也有人來洽談加盟意願吧？"
10018015-61 = "真是敏銳呢。如你所說，對方確實來了好幾次。"
10018015-62 = "但我……果然還是想守護代代相傳的這間店……"
10018015-63 = "我真傻。對這間店如此的執著，到頭來還是什麼都沒留下──"
10018015-64 = "剛開始，我以為只要在每道菜上花心思，以此來回報客人就夠了。"
10018015-65 = "但是，這個世界沒有我想得那麼單純呢。"
10018015-66 = "讓你們聽我說了這麼多，真不好意思。只是覺得一切還很不真實……#n託你們的福，也讓我稍微整理了一下思緒。"
10018015-67 = "真的非常感謝你們。#n上次各位吃得津津有味的模樣，是我最後也是最美好的回憶。"
10018015-73 = "那種心情……"
10018015-74 = "嗯？"
10018015-75 = "那種心情，我也非常能理解。"
10018015-76 = "客人……？"
10018015-77 = "無論多麼努力研究料理……"
10018015-78 = "卻會因為超出自己能力範圍內的事，導致無法下廚！"
10018015-84 = "即使不放棄地一再嘗試……"
10018015-85 = "還是會因為不可抗力的因素，導致做出的料理沒辦法被好好評價！"
10018015-86 = "居然發生過那種事嗎？真過分★"
10018015-87 = "就算下定決心，這次一定要做出好吃的料理……！"
10018015-88 = "結果卻在準備階段就遇到天崩地裂的災害，完全沒辦法好好進行！"
10018015-89 = "前，前輩！？"
10018015-90 = "最後好不容易完成了料理……！"
10018015-95 = "卻在供餐前就被吃了個精光！！！"
10018015-96 = "什麼什麼，在聊什麼啊？"
10018015-97 = "我也要加入！"
10018015-98 = "客，客人？"
10018015-99 = "請冷靜下來。#n那種心情我很能理解……"
10018015-104 = "我……會幫忙的。"
10018015-106 = "咦……？"
10018015-107 = "只要大家一起想想，肯定會有辦法的。#n不能什麼都沒做就放棄，對吧？"
10018015-108 = "那個……聽完我的話後還願意幫助我……我只能感謝再三了。"
10018015-109 = "真的非常感謝大家，謝謝……"
10018015-114 = "唔呵呵……"
10018015-115 = "看來進行得很順利呢，這樣一切都就緒了。"
10018015-116 = "[s]「真的沒問題嗎……？」"
10018015-117 = "哎呀……有什麼問題嗎，老師？"
10018015-118 = "您說看起來沒問題……？"
10018015-119 = "那應該能順利才對。"
10018015-125 = "……不過為什麼要邊說邊嘆氣呢？"

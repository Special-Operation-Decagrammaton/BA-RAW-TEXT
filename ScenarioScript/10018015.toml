[translation]
10018015-8 = "I-I'll remember this! And not just how bad it hurts right now!"
10018015-9 = "You'll pay for messing with the Gourmet Helmet Gangsters!"
10018015-15 = "So much time wasted on people with so little taste in manners, names, or food."
10018015-19 = "Now, shall we get back to our original goal?"
10018015-24 = "Thank you for your kindness. I can never repay you."
10018015-25 = "Especially since continuing this business is literally impossible."
10018015-26 = "[s] \"Could you explain your situation in more detail?\""
10018015-27 = "I-I don't know if I..."
10018015-28 = "Well, I'm gonna close down anyway, might as well."
10018015-32 = "Did you happen to notice all the franchise restaurants outside?"
10018015-33 = "They're crowding out all of the small businesses. I'm not the first, and I likely won't be the last."
10018015-35 = "(So, the street is drowning in cheap food with corporate-mandated standardized flavor...)"
10018015-36 = "(A heartbreaking but familiar sight to gourmands around the world...)"
10018015-38 = "It isn't easy competing against the prices and resources of franchises."
10018015-39 = "It's like they suck the air out of the room..."
10018015-40 = "To make matters even worse, something disastrous happened personally as well."
10018015-41 = "What do you mean?"
10018015-42 = "We buy all our ingredients from a distributor called Nyao Foods."
10018015-43 = "It's the same company all the franchise restaurants use."
10018015-44 = "For whatever reason, Nyao Foods suddenly increased their prices..."
10018015-50 = "Hold up a sec!"
10018015-51 = "Won't that force the franchise restaurants to raise prices or cut into their margins too?"
10018015-52 = "That would make sense. If the supplier is the same, costs should be the same."
10018015-53 = "Hmm, I don't really get it, but this is, like, because of inflation, right?"
10018015-55 = "The thing is, all the franchise restaurants are affiliated with Nyao Foods."
10018015-56 = "So they're getting discounts on their supplies, while we..."
10018015-57 = "These discounts happen to cancel out all of the recent price increases."
10018015-58 = "What?! That's unfair!"
10018015-59 = "How are mom-and-pop shops supposed to compete?!"
10018015-60 = "...Is it possible they're trying to pressure you to join the Nyao Foods umbrella?"
10018015-61 = "They suggested as such a few times."
10018015-62 = "But I wanted to keep this restaurant as my own. It's been passed down from generation to generation..."
10018015-63 = "It was a stupid idea. I tried to protect it, but I ended up just losing everything."
10018015-64 = "At first, I thought I could just work harder to satisfy more customers."
10018015-65 = "But life doesn't really work that way."
10018015-66 = "I know it sounds like I'm crushed, but I feel better now that I've talked about it."
10018015-67 = "Thanks for listening. It means a lot."
10018015-73 = "I understand..."
10018015-74 = "Huh?"
10018015-75 = "I understand your pain..."
10018015-76 = "Ma'am?"
10018015-77 = "I try and try and try..."
10018015-78 = "...only for my plans to be ruined by someone else!"
10018015-84 = "Or I'll pour everything I have into a dish..."
10018015-85 = "...only to have its value be offhandedly degraded by someone else!"
10018015-86 = "That happens? That's too bad! ★"
10018015-87 = "And even then, I get back to it, I try again.."
10018015-88 = "...only to have my plans ruined while I'm still making them by a random natural disaster!"
10018015-89 = "F-Fuuka?!"
10018015-90 = "But, like leftover turkey after Thanksgiving, I persevere..."
10018015-95 = "...only to see that all the food I made was eaten before I even served it!"
10018015-96 = "What's going on? What's happening to Fuuka?"
10018015-97 = "Whatever it is, can I join in?"
10018015-98 = "M-Ma'am?"
10018015-99 = "I-I get what you're saying. Please, just calm down!"
10018015-104 = "I'll help you."
10018015-106 = "R-Really?"
10018015-107 = "If we work together, I'm sure there'll be a way. You can't just give up without trying."
10018015-108 = "I-If you manage to save my... I don't know how I'll ever repay you."
10018015-109 = "Thank you. Thank you so much."
10018015-114 = "Heehee..."
10018015-115 = "It all turned out well. I knew I made the right choice kid— I mean, inviting everyone."
10018015-116 = "[s] \"...Has anything actually turned out well yet?\""
10018015-117 = "Well, has anything gone wrong yet, Sensei?"
10018015-118 = "Nothing, right?"
10018015-119 = "So, it'll be fine."
10018015-125 = "Huh? What's the long sigh for?"

[translation]
10018015-8 = "พะ... พวกเธอ... ฝากไว้ก่อนเถอะ!"
10018015-9 = "จะสั่งสอนให้รู้สำนึกที่กล้ามาเล่นงานแก๊งหมวกกันน็อกคุรุเมะของเราเลย!"
10018015-15 = "เป็นคนที่ต่อให้สั่งสอนยังไงก็ไม่มีทางค้นพบความสง่างามสินะคะ"
10018015-19 = "ถ้าอย่างนั้น เรากลับไปคุยธุระหลักของเรากันต่อดีมั้ยคะ?"
10018015-24 = "ขอบคุณสำหรับความรู้สึกที่อยากช่วยเหลือเรานะคะ..."
10018015-25 = "แต่ว่า ต้องบอกตามตรงค่ะว่าเราคงเปิดร้านต่อไปไม่ไหวน่ะค่ะ"
10018015-26 = "[s] \"ช่วยเล่ารายละเอียดให้ฟังหน่อยได้มั้ย\""
10018015-27 = "อืม... จะทำยังไงดี"
10018015-28 = "นั่นสิคะ... ยังไงอีกไม่นานร้านเราก็ต้องปิดแล้ว..."
10018015-32 = "อย่างที่พวกคุณเห็นค่ะ ถนนย่านการค้าแห่งนี้"
10018015-33 = "กำลังค่อยๆ มีร้านแฟรนไชส์เพิ่มมากขึ้นเรื่อยๆ น่ะค่ะ"
10018015-35 = "(หากมาดูดีๆ ก็จะเห็นว่าในย่านนี้มีร้านอาหารที่จำหน่ายอาหารในราคาถูกๆ ผุดขึ้นเป็นจำนวนมาก...)"
10018015-36 = "(ในฐานะผู้ที่เดินบนเส้นทางแห่งการแสวงหาอาหารรสเลิศแล้ว นับว่าเป็นเรื่องที่น่าปวดใจอย่างมาก#nเลยละค่ะ...)"
10018015-38 = "และการแข่งเรื่องราคาอาหารกับร้านแฟรนไชส์พวกนั้น..."
10018015-39 = "ไม่ว่ายังไงก็ไม่ใช่เรื่องง่ายๆ เลย..."
10018015-40 = "และที่แย่ไปกว่านั้น เมื่อไม่นานมานี้เหมือนจะเกิดเรื่องใหญ่ขึ้นด้วยค่ะ"
10018015-41 = "เกิดเรื่องใหญ่งั้นเหรอคะ เรื่องอะไรคะ?"
10018015-42 = "ร้านของเราใช้วัตถุดิบจากบริษัทอาหารที่ชื่อ \"เนียวฟู้ด\" ค่ะ"
10018015-43 = "ทั้งร้านของเรา และร้านอาหารแฟรนไชส์เอง ก็อาศัยเครือข่ายของเนียวฟู้ดอยู่ค่ะ"
10018015-44 = "แต่ว่าเมื่อไม่นานมานี้... จู่ๆ ทางเนียวฟู้ดก็ขึ้นราคาวัตถุดิบอย่างกะทันหัน..."
10018015-50 = "ดะ... เดี๋ยวก่อนนะ!"
10018015-51 = "ถ้าอย่างนั้นพวกร้านแฟรนไชส์เองก็ต้องขึ้นราคาเหมือนกันสิ?"
10018015-52 = "ก็ควรต้องเป็นอย่างนั้นค่ะ ถ้าราคาวัตถุดิบเท่ากันละก็ พวกเขาก็คงเลี่ยงไม่ได้ที่จะต้องขึ้นราคาเหมือน#nกันค่ะ"
10018015-53 = "อืม~ ไม่ค่อยเข้าใจเลยแฮะ แต่หมายถึงราคาข้าวแพงขึ้นสินะ?"
10018015-55 = "แต่ว่าร้านแฟรนไชส์พวกนั้นก็เป็นร้านอาหารในเครือของทางเนียวฟู้ดน่ะค่ะ"
10018015-56 = "เพราะงั้นพวกเขาเลยได้รับข้อเสนอว่าจะลดค่าเช่าร้าน..."
10018015-57 = "ให้ถูกลงเท่าราคาวัตถุดิบที่เพิ่มขึ้นค่ะ"
10018015-58 = "อะไรกัน! แบบนี้มันเกินไปแล้วนะ...!"
10018015-59 = "ร้านค้าเล็กๆ แบบนี้จะไปแข่งเรื่องราคาได้ยังไงเล่า!"
10018015-60 = "ถ้าอย่างนั้น... คุณเจ้าของมีความคิดจะเข้าร่วมกับแฟรนไชส์ของเนียวฟู้ดหรือเปล่าคะ?"
10018015-61 = "ฉันได้รับข้อเสนอให้เข้าร่วมแฟรนไชส์อยู่หลายครั้งเลยค่ะ "
10018015-62 = "แต่ว่าฉันน่ะ... ฉันอยากปกป้องร้านที่สืบทอดมานี้ต่อไป..."
10018015-63 = "บ้ามากเลยใช่มั้ยล่ะคะ เพียงเพื่อจะรักษาร้านนี้เอาไว้ แต่กลับต้องสูญเสียทุกๆ อย่างไป"
10018015-64 = "ในตอนแรกฉันคิดแค่ว่าพยายามให้มากขึ้น และทำอาหารตอบแทนลูกค้าที่มาก็เพียงพอแล้ว..."
10018015-65 = "แต่ว่าโลกของเรามันไม่ได้ง่ายอย่างนั้นเลยค่ะ"
10018015-66 = "ตายจริง นี่ฉันเอาแต่บ่นเรื่องปัญหาให้คุณฟังซะแล้ว แต่ว่าพอได้พูดออกมาก็รู้สึกโล่งใจขึ้นมากเลยค่ะ"
10018015-67 = "ขอบคุณที่รับฟังนะคะ รบกวนพวกคุณซะแล้ว..."
10018015-73 = "ความรู้สึกนั้น..."
10018015-74 = "คะ?"
10018015-75 = "ความรู้สึกนั้น... ฉันว่าฉันพอจะเข้าใจค่ะ"
10018015-76 = "คุณลูกค้า...?"
10018015-77 = "ไม่ว่าจะพยายามทำอาหารสักเท่าไร"
10018015-78 = "แต่มันก็มักจะเกิดเรื่องที่เกินกำลังตัวเองจะจัดการไหว จนทำอาหารต่อไปไม่ได้!"
10018015-84 = "และไม่ว่าจะพยายามอย่างหนักเพื่อทำอาหารแค่ไหน"
10018015-85 = "แต่คุณค่าของอาหารก็ต้องถูกคนอื่นบั่นทอนไป!"
10018015-86 = "มีเรื่องแบบนั้นด้วยเหรอคะ? ทำกันเกินไปแล้วจริงๆ เลยนะคะเนี่ย★"
10018015-87 = "แล้วพอพยายามสุดความสามารถเพื่อทำอาหารเท่าไร..."
10018015-88 = "ก็มักจะเกิดภัยพิบัติตามธรรมชาติตั้งแต่ตอนเตรียมวัตถุดิบ และไม่มีอะไรเป็นไปดั่งใจเลยสักอย่าง!!!"
10018015-89 = "ระ... รุ่นพี่...?!"
10018015-90 = "และสุดท้ายพอทำอาหารออกมาได้สำเร็จ!"
10018015-95 = "ก็ดันถูกใครบางคนฟาดเรียบ ไม่เหลือก่อนจะได้เอาไปเสิร์ฟในโรงอาหารเลย!!!"
10018015-96 = "อะ... อะไรเนี่ย? พูดถึงเรื่องอะไรเนี่ย? "
10018015-97 = "ขอฉันแจมด้วยคนสิ!"
10018015-98 = "คะ... คุณลูกค้า?"
10018015-99 = "ใจเย็นๆ ก่อนนะคะ... ฉันเข้าใจสิ่งที่คุณพูดดีค่ะแต่ว่า..."
10018015-104 = "ฉันจะช่วยเองค่ะ "
10018015-106 = "คะ...?"
10018015-107 = "มันจะต้องมีวิธีอยู่แน่นอนค่ะ มาช่วยกันคิดวิธีเถอะนะคะ เราจะอยู่เฉยๆ แล้วปล่อยให้ร้านถูกปิดแบบนี้#nไม่ได้นะคะ?!"
10018015-108 = "ถะ...ถ้าคุณพูดถึงขนาดนั้นละก็ ฉันก็ไม่ขัดอะไรแล้วค่ะ..."
10018015-109 = "ขอบคุณนะคะ ขอบคุณมากค่ะ"
10018015-114 = "ฮุฮุฮุ..."
10018015-115 = "ผลลัพธ์เป็นไปได้ด้วยดี ทุกอย่างต้องโอเคไปได้สวยค่ะ"
10018015-116 = "[s] \"...แบบนี้ไม่เป็นไรแน่เหรอ...?\""
10018015-117 = "ตายจริง มีปัญหาอะไรหรือคะคุณครู?"
10018015-118 = "ไม่มีปัญหาอะไรงั้นเหรอคะ?"
10018015-119 = "ถ้างั้นก็คงไม่เป็นไรสินะคะ"
10018015-125 = "ถ้างั้นทำไมถึงถอนหายใจแบบนั้นล่ะคะ?"

[translation]
10027050-1 = "第5話;任何人都會有的祕密"
10027050-2 = "同人會場"
10027050-5 = "結果你還是來到這裡了啊，Meruri同學。"
10027050-6 = "咦……？#n你怎麼會在這裡？"
10027050-7 = "[s]「啊，是貴音。」"
10027050-8 = "別來無恙，老師。#n在我內心不抱任何期待，卻又隱隱盼望你們會來的糾結之下，#n你們兩位出現在了我的面前。"
10027050-9 = "對此，我一方面感到訝異和驚慌，另一方面卻又有股歡喜和不安油然而生。"
10027050-10 = "前面那句話是說給我聽的嗎……？"
10027050-11 = "誰知道呢？#n這就要看你怎麼想了。"
10027050-12 = "……我有件事想問。#n你之前叫我們去出版部……該不會就是為了引導我們來這裡吧？"
10027050-13 = "我知道你是為了紅葉同學而尋找《LUNA》的最終卷，#n但這從一開始就是不可能辦到的事。"
10027050-14 = "因為《LUNA》的第二十二卷──自始至終都不存在。"
10027050-15 = "可是我看網路上說，市面上還是有極少量的現貨……"
10027050-16 = "網路上所謂的現貨，指的應該都是這些粉絲們自行繪製的同人誌吧。"
10027050-17 = "《LUNA》是部充滿悲劇色彩的名作。#n儘管它曾風靡一時，擁有極高的人氣…… "
10027050-19 = "然而《LUNA》最為致命的缺點……就是始終沒有推出最終卷。"
10027050-20 = "[s]「為什麼……？」"
10027050-21 = "其實也沒有什麼特別的原因。雖然《LUNA》的確深受讀者喜愛，#n但隨著故事慢慢步入尾聲，它也逐漸被市場淘汰，最終默默地從眾人的記憶中消失。"
10027050-22 = "……不過我認為最大的原因，是因為這部作品沒有獲得它應有的評價。"
10027050-23 = "以現在的觀點來看，《LUNA》的故事並沒有什麼問題。#n然而在連載的當下，書中描寫的內容確實顯得過於前衛、偏激，#n因此甚至連獲得評價的機會都沒有……"
10027050-24 = "我無法確定歷經時間的推移後才被世人認可的名作有多少，但想必不會是0吧。"
10027050-25 = "身為一名評論家……我自認對這些被埋沒作品的了解多於常人。#n而這也是驅使我努力多讀作品、多做評論的根本原因。"
10027050-26 = "也就是說……你從一開始就知道不可能找得到《LUNA》的最終卷嗎？"
10027050-27 = "既然如此，費這麼大一番功夫把我引到這裡來……究竟是為了什麼？"
10027050-31 = "我只不過是想測試你而已，Meruri同學。"
10027050-32 = "你──Meruri同學──一名不擅長處理人際關係，自尊心又極強的創作者……#n如果真的願意只為了和某人和好而四處尋找《LUNA》最終卷的話……"
10027050-33 = "會不會一反常態，乖乖地照著我說的話來到這裡。"
10027050-34 = "也就是說，如果我真的希望能找到這本書……#n會不會願意親自前往出版部，甚至低頭請求協助是嗎……？"
10027050-35 = "事情就是這樣。#n而你最終……真的來到了這裡。"
10027050-36 = "另外……非常抱歉，我不應該把您牽扯進來的，老師。"
10027050-37 = "[s1]「沒關係。」\n[s2]「看來貴音你……也很希望他們兩個能夠和好吧。」"
10027050-38 = "多麼寬闊的胸襟和偉大的包容力……真不愧是老師。#n跟某位個性差、自尊心又強的創作者比起來簡直是天壤之別。"
10027050-39 = "不是我要說，你未免也太厚臉皮了吧……"
10027050-40 = "我，我我，我哪有！？#n我，我只不過是……單純想看Meruri同學向別人低頭的樣子而已！哼！"
10027050-41 = "不，那傢伙的目的不可能這麼單純。#n老師，別被他給騙了！他肯定還有別的企圖……！"
10027050-42 = "你老是喜歡多嘴！"
10027050-43 = "那是我要說的台詞！"
10027050-44 = "[s]「好了好了，你們兩位都少說幾句。」"
10027050-45 = "……既然老師都這麼說了。"
10027050-46 = "呿……！"
10027050-47 = "算了，其實我也知道……你這麼做是在關心我……"
10027050-48 = "……哼。"
10027050-49 = "[s]「話說回來，貴音在這裡做什麼呢？」"
10027050-50 = "這……"
10027050-56 = "啊，會長，原來你在這裡啊。#n大家都在找你呢，我們趕快過去吧。"
10027050-57 = "！！！"
10027050-58 = "會長？"
10027050-59 = "[s]「會長？」"
10027050-60 = "等等，既然你在這種地方、在這種情況下被稱作會長……"
10027050-61 = "……事已至此，我想也沒必要再隱瞞了。#n沒錯，我就是《LUNA》後援會的會長。"
10027050-62 = "[s]「所以貴音……是這場同人活動的主辦人？」"
10027050-63 = "先等等……一下子接收到太多資訊，我的腦袋快要轉不過來了……#n先讓我整理一下情況。"
10027050-64 = "你之所以舉辦這場活動，是因為也想看到《LUNA》的最終卷嗎？"
10027050-65 = "……如果我說「沒錯」的話，你會覺得如何呢，Meruri同學？"
10027050-66 = "什麼嘛，之前一下說要挖掘作品的價值，一下說想透過評論讓作品變得更加耀眼……"
10027050-67 = "結果真正的目的不就只是為了收藏自己喜歡的作品嗎……這叫什麼來著，雙重標準？"
10027050-73 = "突，突然又怎麼啦！？"
10027050-74 = "身為一名專業的評論家，卻對特定的作品有所偏愛……"
10027050-75 = "與其讓這件事被喜歡挖苦別人的Meruri同學一再提起……"
10027050-77 = "還不如讓你永遠保持沉默！"
10027050-78 = "你在說什麼啊！？#n而且把我引來這裡的人不就是你嗎！"
10027050-80 = "這跟那是兩回事！"
10027050-81 = "什麼鬼啊！雙標也要有個限度吧！"
10027050-82 = "唉……沒辦法了。#n是，你說得沒錯。"
10027050-83 = "就算這部漫畫永遠不會推出最終卷，#n世上始終還是會有人期待能看到它的結局。"
10027050-84 = "對於作者沒把作品畫完就神隱的行為……#n有的書迷對此感到擔憂，也有的書迷覺得惋惜或不負責任……"
10027050-85 = "然而即便如此，熱愛《LUNA》、想繼續看下去、見證結局的心意依舊沒有消失。#n正因如此……我們開始創作屬於我們自己的《LUNA》。"
10027050-86 = "等到回過神來，才發現我們已經走了這麼遠……"
10027050-87 = "因為最終卷並不存在，所以才選擇用自己的方式創作最終卷嗎……"
10027050-88 = "這歸根究柢還是如何詮釋的問題，Meruri同學。#n如果世上有十個粉絲，就會出現十種對結局的詮釋。"
10027050-89 = "但其中哪個猜測是對的，誰也不會知道。#n基本上，所有的猜測都存在一定的價值，也應該受到同等的尊重。"
10027050-90 = "然而我們之所以仍然會希望自己的猜測和創作獲得比別人更多的認可，#n正是因為創作這個行為本身就建立在個人的慾望之上。"
10027050-91 = "……話雖如此，這些創作依舊處於同人活動的範疇之下。"
10027050-92 = "因此就結論而言──#n如果你想要找到真正的《LUNA》最終卷，藉此獲得紅葉同學的原諒……#n是不可能辦到的。"
10027050-93 = "不過，如果你能找到這裡評價最高的《LUNA》最終卷同人誌當禮物，#n送給紅葉同學的話……"
10027050-94 = "或許就能和紅葉同學和好也說不定。"
10027050-95 = "所以……你才會把我引來這裡……"
10027050-96 = "……"
10027050-97 = "……你說的對。#n確實就像你說的一樣。"
10027050-98 = "既然不可能找到最終卷……或許……這就是最佳解了……"
10027050-99 = "對吧？看來你有時候還是能夠認清現實的呢。"
10027050-103 = "……不過。"
10027050-105 = "有些話越是正確，就越是想讓人反駁對吧！"
10027050-106 = "突然在說什麼啊！？"
10027050-108 = "我也要畫！"
10027050-109 = "畫……什麼？"
10027050-111 = "《LUNA》的最終卷！"
10027050-117 = "[ns]「咦？」"
10027050-118 = "……什麼？"

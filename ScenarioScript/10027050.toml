[translation]
10027050-1 = "#title;제5화;누구에게나 있는 비밀"
10027050-2 = "#place;동인회장"
10027050-3 = "3;타카네;99\n#3;a\n#wait;1000"
10027050-4 = "3;타카네;99\n#wait;2500\n#3;em;…"
10027050-5 = "3;타카네;02;결국 여기까지 왔군요. 메루리 씨."
10027050-6 = "5;메루;02;어……? 네가 왜 여기 있냐?\n#5;a\n#3;m1\n#5;em;[반응]"
10027050-7 = "[s] \"아. 타카네다.\""
10027050-8 = "3;타카네;07;안녕하세요. 선생님. 평안하셨는지요. 절반 정도는 기대하지 않고 있었지만, 절반 정도는 또한 변덕에 의해 기대하고 있었던 상황에서, 두 분을 이렇게 뵙게 되다니.\n#3;greeting"
10027050-9 = "3;타카네;10;한편으로는 놀라움과 황망함이, 다른 한 편으로는 반가움과 황송함이 자연스럽게 솟아오르는군요.\n#3;em;[반짝]"
10027050-10 = "5;메루;05;……앞의 건 나 들으라고 하는 말이야……?\n#5;em;…"
10027050-11 = "3;타카네;03;어떨까요. 그것은 또 해석에 따라서."
10027050-12 = "5;메루;02;……하나만 묻자. 우리더러 출판부로 가 보라고 한 건…… 이걸 위해서였던 거야?\n#5;em;[?]"
10027050-13 = "3;타카네;01;당신은 모미지 씨를 위해 <루나>의 완결권을 찾으려 했죠. 그렇지만 그건 애초부터 불가능한 일이었어요. "
10027050-14 = "3;타카네;05;<루나>의 22권은 원래부터 존재하지 않았으니까요.\n#3;em;[!]"
10027050-15 = "5;메루;04;하지만 인터넷에선, 극히 소량이지만 찾을 수 있다고…….\n#5;em;[속상함]\n#5;stiff"
10027050-16 = "3;타카네;02;인터넷에서의 그 이야기는, 아마 이 행사에서 만들어진 여러 책들을 두고 한 말이겠죠."
10027050-17 = "3;타카네;99;<루나>는 비운의 명작이에요. 시대를 풍미하고 선풍적인 인기를 끌었지만…… "
10027050-18 = "#all;hide"
10027050-19 = "3;타카네;09;<루나>의 가장 치명적인 단점…… 그건 완결권이 출간되지 않았다는 사실이죠.\n#3;closeup\n#3;em;[!]"
10027050-20 = "[s] \"어째서……?\""
10027050-21 = "3;타카네;01;흔한 일이예요. 루나는 인기를 끌었지만, 완결로 다가갈수록 시장의 외면을 받으면서, 점차 잊힌 작품이 된 거죠."
10027050-22 = "3;타카네;16;……정당한 평가를 받지 못한 탓이 가장 크다고 생각하지만요.\n#3;em;…"
10027050-23 = "3;타카네;07;지금 보면 큰 무리 없는 내용이, 연재 당시에는 너무 과격하거나 위험하게 읽혔다던가, 평가 자체를 받을 기회를 얻지 못했다던가……"
10027050-24 = "3;타카네;10;시간이 지난 뒤에 비로소 가치를 인정받게 된 명작들의 수는, 저는 잘 알 수 없지만, 아마 0보다는 많겠죠."
10027050-25 = "3;타카네;13;평론가로서…… 저는 그런 작품들에 대해 다른 사람들보다는 조금 더 잘 알고 있답니다. 제가 조금이라도 더 많은 것을 읽고, 하나라도 더 평론을 남기고자 하는 이유이기도 하죠.\n#3;em;[반짝]\n#3;greeting"
10027050-26 = "5;메루;02;그렇다는 건…… 처음부터 <루나>의 완결권을 찾을 수 없다는 걸 알고 있었다는 거잖아?\n#3;m1\n#5;em;[반응]\n#5;al"
10027050-27 = "5;메루;05;말해 봐. 왜 날 여기로, 그것도 그렇게 번거로운 과정을 거쳐…… 불러온 거지?\n#5;em;[빠직]"
10027050-28 = "#st;[0,0];instant;1;"
10027050-29 = "#clearST"
10027050-30 = "3;타카네;16\n5;메루;05\n#3;h\n#5;h\n#wait;2500\n#3;em;…"
10027050-31 = "3;타카네;02;어떤 의미로는, 당신을 시험해 본 거예요. 메루리 씨.\n#3;em;[반응]"
10027050-32 = "3;타카네;05;당신…… 메루리 씨라는, 인간관계가 그다지 좋지 않은 데다 자존심까지 강한 창작자가, 진심으로 다른 사람과 화해하기 위해 <루나>의 완결권을 찾고 있는 거라면……"
10027050-33 = "3;타카네;10;여느 때의 당신과 달리, 정말로 이곳까지 찾아올 수 있을까, 해서요. \n#3;em;[반짝]"
10027050-34 = "5;메루;02;……즉, 그만큼 간절하다면, 출판부를 찾아가 부탁을 하거나 머리를 숙이는 일도 할 수 있었을 거라는 이야기……?"
10027050-35 = "3;타카네;07;그래요. 그리고 정말로…… 이렇게 당신은, 여기까지 찾아온 것이로군요. 그리고……."
10027050-36 = "3;타카네;12;이런 일에, 괜히 휘말리게 한 건 죄송합니다. 선생님.\n#3;greeting"
10027050-37 = "[s1] \"그런 건 괜찮아.\"\n[s2] \"타카네는…… 두 사람이 화해하길 바랐던 거구나.\""
10027050-38 = "3;타카네;14;이 무슨 포용력과 관대함……. 역시 선생님이시군요. 어느 성격 안 좋고 자존심 강한 창작자와는 근본적으로 다르세요.\n#3;em;[///]"
10027050-39 = "5;메루;04;아니, 너 너무 뻔뻔한 거 아니냐, 지금은…….\n#5;em;[땀]"
10027050-40 = "3;타카네;14;그, 그그, 글쎄요?! 저, 저는 단지! 메루리 씨가 스스로를 굽히는 모습을 보고 싶었달까, 그런 것뿐이었으니까요! 흐, 흥!\n#3;em;[?!]\n#3;shake"
10027050-41 = "5;메루;04;맞아, 그럴 리가 없잖아. 속지 마. 선생! 여기에 어떤 꿍꿍이가 있을지……!\n#5;em;[!]\n#5;jump"
10027050-42 = "3;타카네;06;당신은 꼭 한 마디가 많다구요!\n#3;em;[빠직]\n#3;m2"
10027050-43 = "5;메루;05;누가 할 소리인데, 그거! \n#5;em;[빠직]\n#5;m4"
10027050-44 = "[s] \"자, 자. 서로 거기까지 하자.\""
10027050-45 = "3;타카네;13;……네, 선생님의 말씀대로.\n#3;m1"
10027050-46 = "5;메루;05;쳇……! \n#5;m5"
10027050-47 = "5;메루;02;……뭐, 신경을 써줬다는 것 정도는…… 나도 알겠지만 말이야……"
10027050-48 = "3;타카네;16;……흥."
10027050-49 = "[s] \"그보다, 타카네는 여기에서 뭘 하고 있었어?\""

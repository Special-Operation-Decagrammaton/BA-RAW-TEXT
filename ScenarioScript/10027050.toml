10027050-81 = "5;메루;05;와, 진짜! 이중잣대도 적당히 하라고!\n#5;em;[빠직]"
10027050-82 = "1;타카네;06;하아…… 뭐 어쩔 수 없죠. 네. 맞아요.\n#1;m3\n#5;dr\n#1;em;[한숨]"
10027050-83 = "1;타카네;05;그렇지만 설사 완결이 나지 않았다고 할지라도. 그 마지막을 보고 싶어 하는 사람들은 있기 마련이에요."
10027050-84 = "1;타카네;01;완결을 내지 않고 소식이 끊긴 작가를 걱정해도 좋고, 그걸 무책임하다며 아쉬워해도 좋겠지요. "
10027050-85 = "1;타카네;12;그렇지만 <루나>를 아끼고, 계속해서 보고 싶고, 그 마지막을 알고 싶다는 팬들의 바람은 좀처럼 사라지지 않았습니다. 그래서 우리들은…… 각자, 자기만의 <루나>를 만들기 시작했던 것이죠.\n#1;em;…"
10027050-86 = "1;타카네;02;그러다 보니, 어느새 여기에까지 이르게 된 것입니다만……."
10027050-87 = "5;메루;02;어디에도 없는 마지막을, 각자가 자기 형태로 만들고 있다는 건가……\n#5;al\n#1;m1\n#5;em;[반응]"
10027050-88 = "1;타카네;01;결국은 해석의 문제에요. 메루리 씨. 열 명의 팬이 있으면, 열 개의 해석이 존재하기 마련이죠."
10027050-89 = "1;타카네;02;그 해석 중 무엇이 정답인지는, 아무도 알 수 없어요. 원칙적으로 모든 해석은 존중받아야 하고, 나름의 가치를 가지고 있죠."
10027050-90 = "1;타카네;05;그러면서도 자기의 해석과 창작이 조금이나마 더 인정받기를 바라는 것은, 창작이라는 행위가 기본적으로 욕망에 기반하기 때문일 거고요.\n#1;em;[!]"
10027050-91 = "1;타카네;99;……하지만 결국 이것은 어디까지나 동인 활동."
10027050-92 = "1;타카네;16;결론적으로 당신이 원하는 대로 온전한 <루나>의 완결권을 찾아, 모미지 씨와 화해한다는 것은 원래부터 불가능한 일이었어요."
10027050-93 = "1;타카네;02;대신 여기에서 가장 평가가 좋은 <루나>의 완결 동인지를 찾아 선물한다면……"
10027050-94 = "1;타카네;12;모미지 씨와 화해할 수 있을지도 모르죠."
10027050-95 = "5;메루;05;그래서…… 너는 나를 이리로…….\n#5;stiff"

[translation]
10027050-1 = "ตอนที่ 5;ความลับที่ทุกคนมี"
10027050-2 = "เซอร์เคิล"
10027050-5 = "ในที่สุดก็มาถึงตรงนี้เลยสินะคะ คุณเมรูริ"
10027050-6 = "หืม...? ทำไมเธอถึงอยู่ที่นี่?"
10027050-7 = "[s] \"อ๊ะ ทาคาเนะนี่นา\""
10027050-8 = "สวัสดีค่ะคุณครู สบายดีหรือเปล่าคะ? ใจหนึ่งฉันก็ไม่ได้คาดหวังไว้ แต่อีกใจหนึ่งก็แอบหวังเพราะมีคน#nอารมณ์แปรปรวนง่ายอยู่ด้วย จนสุดท้ายฉันก็ได้มาเจอทั้งคู่แบบนี้นะคะ"
10027050-9 = "คงต้องบอกว่าฉันทั้งประหลาดใจและฉุกละหุก และอีกด้านหนึ่งก็ทั้งยินดีและซาบซึ้งใจเลยละค่ะ"
10027050-10 = "ต้องสาธยายขนาดนี้เลยเหรอ...?"
10027050-11 = "เป็นยังไงบ้างล่ะคะ แต่มันก็ขึ้นอยู่กับการตีความนะคะ"
10027050-12 = "...ฉันขอถามอะไรหน่อย ที่เธอบอกให้พวกฉันไปที่ชมรมสื่อสิ่งพิมพ์... ก็เพราะแบบนี้น่ะเหรอ?"
10027050-13 = "ก็คุณอยากหา <ลูน่า> เล่มจบบริบูรณ์ให้คุณโมมิจินี่คะ แต่การทำแบบนั้นมันเป็นไปไม่ได้ตั้งแต่แรกอยู่#nแล้วค่ะ "
10027050-14 = "นั่นก็เพราะว่า <ลูน่า> เล่ม 22 เป็นเล่มที่ไม่มีอยู่จริงตั้งแต่แรกแล้วยังไงล่ะคะ"
10027050-15 = "แต่ในอินเทอร์เน็ตบอกว่าหาได้นะ ถึงแม้จะหายากมากๆ ก็เถอะ..."
10027050-16 = "ที่บอกในอินเทอร์เน็ตคงหมายถึงหนังสือหลายๆ เล่มที่เอามาวางขายในงานนี้มากกว่าน่ะค่ะ"
10027050-17 = "ถึง <ลูน่า> จะมีชื่อเสียงและเป็นที่นิยมเป็นอย่างมากในยุคนั้น แต่ก็เป็นผลงานที่อับโชคค่ะ "
10027050-19 = "ข้อเสียที่น่าเศร้าที่สุดของ <ลูน่า> ก็คือ... เล่มจบบริบูรณ์ยังไม่ถูกตีพิมพ์ค่ะ "
10027050-20 = "[s] \"ทำไมล่ะ...?\""
10027050-21 = "มันก็เป็นเรื่องปกติค่ะ ถึงลูน่าจะได้รับความนิยม แต่ยิ่งใกล้จะจบเรื่องก็ถูกตลาดเมินเฉย ก็เลยเป็นผลงานที่ค่อยๆ ถูกลืมเลือนไปค่ะ"
10027050-22 = "...แต่ฉันก็คิดว่าที่เรื่องนี้ไม่ได้รับการวิจารณ์อย่างเหมาะสมคือสาเหตุใหญ่เลยค่ะ"
10027050-23 = "ถ้าหยิบมาอ่านตอนนี้ก็จะมองว่าเนื้อหาไม่ได้ซับซ้อนเกินไป แต่ในตอนที่ตีพิมพ์ อาจจะถูกมองว่าให้#nความรู้สึกรุนแรงหรืออันตรายเกินไปในสายตาผู้อ่าน และก็ไม่มีโอกาสในการได้รับคำวิจารณ์เลยด้วย..."
10027050-24 = "ถึงฉันจะไม่รู้จำนวนที่แน่ชัด แต่โลกนี้ก็มีผลงานที่เพิ่งถูกมองเห็นคุณค่าเมื่อเวลาผ่านไปแล้วค่ะ"
10027050-25 = "ในฐานะนักวิจารณ์... ฉันรู้จักผลงานแบบนั้นดีกว่าคนอื่นอยู่บ้างค่ะ และนั่นก็เป็นเหตุผลที่ฉันอยากอ่าน#nให้ได้มากขึ้น และเขียนบทวิจารณ์ไว้ให้มากขึ้นด้วยค่ะ"
10027050-26 = "งั้นก็แปลว่า... เธอรู้อยู่ตั้งแต่แรกแล้วน่ะสิว่าไม่สามารถหา <ลูน่า> เล่มจบบริบูรณ์ได้?"
10027050-27 = "ตอบมาเลยนะว่าทำไมถึงให้ฉันมาที่นี่ แล้วต้องมาทำอะไรน่ารำคาญแบบนี้ด้วย?"
10027050-31 = "ในบางแง่ก็เพื่อทดสอบคุณน่ะค่ะ คุณเมรูริ"
10027050-32 = "คุณเมรูริ... นักวาดที่ไม่ค่อยมีมนุษยสัมพันธ์กับคนอื่น แถมยังเย่อหยิ่งในตัวเองเกินใคร แต่คุณกลับ#nต้องมาตามหา <ลูน่า> เล่มจบบริบูรณ์เพื่อเอาไปคืนดีกับคนอื่นจากใจจริง..."
10027050-33 = "ที่ทำแบบนี้เพราะฉันอยากรู้น่ะค่ะว่าคุณจะยังเป็นคนเดิมที่เคยเป็นหรือเปล่า และจะมาถึงที่นี่ได้จริงๆ หรือเปล่า "
10027050-34 = "...หรือสรุปได้ว่า ถ้ามุ่งหวังอย่างแรงกล้าขนาดนั้น ก็อาจจะมาที่ชมรมสื่อสิ่งพิมพ์แล้วขอให้ทางนั้นช่วย หรือไม่ก็มาอ้อนวอนให้หาให้ก็ได้...?"
10027050-35 = "ค่ะ และสุดท้าย... คุณก็มาถึงที่นี่จริงๆ ด้วยนะคะ แล้วก็..."
10027050-36 = "ต้องขอโทษคุณครูด้วยนะคะที่ทำให้ต้องมาเจอเรื่องแบบนี้"
10027050-37 = "[s1] \"เรื่องนั้นไม่เป็นไรหรอก\"\n[s2] \"ทาคาเนะ... อยากจะให้ทั้งสองคนคืนดีกันสินะ\""
10027050-38 = "ความเอื้ออารีและเอาใจใส่แบบนี้... สมกับเป็นคุณครูที่สุดเลยค่ะ ต่างกับนักวาดบางคนที่นิสัยไม่ดี และมีศักดิ์ศรีค้ำคออยู่ตลอดเลยค่ะ"
10027050-39 = "เดี๋ยวก่อน นี่เธอตั้งใจว่าฉันซึ่งๆ หน้าไปหรือเปล่า..."
10027050-40 = "กะ... ก็... ก็ไม่รู้สิคะ?!  ฉะ... ฉันก็แค่! อยากเห็นคุณเมรูริยอมอ่อนข้อให้คนอื่นบ้างน่ะค่ะ! ฮึ่ม!"
10027050-41 = "แต่ก็ใช่ ฉันไม่มีทางทำแบบนั้นหรอก อย่ามาหลอกกันซะให้ยากเลย! นี่ครู! รู้ไหมว่าคนที่นี่มีแผนร้าย#nอะไร...!"
10027050-42 = "คุณนี่ก็เอาแต่พูดไปเรื่อยเลยนะคะ!"
10027050-43 = "ฉันต่างหากที่ต้องพูดแบบนั้น! "
10027050-44 = "[s] \"เอาละๆ พอได้แล้ว ทั้งคู่เลย\""
10027050-45 = "...ค่ะ ฉันจะเชื่อฟังคุณครูค่ะ"
10027050-46 = "ชิ...! "
10027050-47 = "...เอาเถอะ ฉันก็พอจะรู้อยู่หรอก... ว่าเธอก็ใส่ใจอยู่..."
10027050-48 = "ฮึ..."
10027050-49 = "[s] \"จะว่าไป ทาคาเนะมาทำอะไรที่นี่เหรอ?\""
10027050-50 = "คือว่า..."
10027050-56 = "อ๊ะ ประธาน มาอยู่ตรงนี้นี่เอง ทุกคนหาตัวอยู่นะ รีบไปเถอะ"
10027050-57 = "!!!"
10027050-58 = "ประธาน?"
10027050-59 = "[s] \"ประธานงั้นเหรอ?\""
10027050-60 = "เดี๋ยวก่อนนะ ถ้าถูกเรียกว่าประธานในสถานที่แบบนี้ละก็..."
10027050-61 = "...ในเมื่อมันเป็นแบบนี้แล้ว คงไม่มีประโยชน์ที่จะต้องปิดบังไว้อีกสินะคะ ใช่แล้วค่ะ ฉันคือประธานชมรม <ลูน่า> ค่ะ"
10027050-62 = "[s] \"ทาคาเนะคือ... แม่งานที่จัดอยู่นี้เองหรอกเหรอ?\""
10027050-63 = "เดี๋ยวก่อน เดี๋ยวๆ... ตอนนี้ฉันได้รับข้อมูลเยอะมากจนสับสนไปหมดแล้ว ขอสรุปหน่อยนะ"
10027050-64 = "ที่เธอจัดงานนี้ขึ้น เพราะว่าเธอเองก็อยากอ่าน <ลูน่า> เล่มจบบริบูรณ์งั้นเหรอ?"
10027050-65 = "...ถ้าฉันบอกว่าใช่ แล้วคุณจะทำยังไงเหรอคะ คุณเมรูริ?"
10027050-66 = "อะไรเนี่ย แล้วบอกว่าตัวเองจะค้นหาคุณค่าที่ซ่อนอยู่ของผลงาน แล้วทำให้ผลงานเปล่งประกายขึ้นอีก#nขั้นด้วยบทวิจารณ์"
10027050-67 = "แต่สุดท้ายสิ่งที่ทำอยู่คือการสะสมหนังสือที่ตัวเองชอบเนี่ยนะ... อะไรกัน สองมาตรฐานงั้นเหรอ?"
10027050-73 = "จะ... จู่ๆ ก็ทำอะไรของเธอน่ะ?!"
10027050-74 = "ถ้าคนที่เป็นนักวิจารณ์อย่างฉันถูกเปิดเผยว่ามีผลงานที่โปรดปรานเป็นพิเศษ..."
10027050-75 = "และถ้าจะต้องมาโดนคนที่ชอบจับผิดคนอื่นเป็นชีวิตจิตใจอย่างคุณเมรูริล้อเลียนด้วยละก็..."
10027050-77 = "ฉันเลือกที่จะปิดปากเงียบดีกว่าค่ะ!"
10027050-78 = "พูดอะไรไม่เห็นจะเข้าท่าเลย!  คนที่เรียกฉันมาที่นี่ตั้งแต่แรกคือเธอต่างหาก!"
10027050-80 = "นั่นมันคนละเรื่องกันนะคะ!"
10027050-81 = "เฮ้อ ให้ตายเถอะ เบาๆ หน่อยก็ดีนะ นิสัยสองมาตรฐานเนี่ย"
10027050-82 = "เฮ้อ... ก็ช่วยไม่ได้สินะคะ อ้อ จริงสิ"
10027050-83 = "ถึงแม้ว่าตอนจบจะยังไม่ออกมา แต่ก็ยังมีอีกหลายคนนะคะที่อยากอ่านตอนจบ"
10027050-84 = "ปกติแล้วเราสามารถกังวลเกี่ยวกับนักเขียนที่เงียบหายไปโดยไม่ตีพิมพ์เล่มจบได้ แล้วก็ตำหนิได้ด้วย#nค่ะว่าคนคนนั้นขาดความรับผิดชอบ "
10027050-85 = "แต่ความปรารถนาของแฟนๆ ที่หวงแหน <ลูน่า> และอยากอ่านอยู่เรื่อยๆ และอยากรู้ว่าจะจบลงยังไงก็#nยังคงไม่เลือนหายไปค่ะ เพราะฉะนั้นพวกเราก็เลย... เริ่มสร้าง <ลูน่า> ตามแบบฉบับของตัวเองขึ้นค่ะ"
10027050-86 = "และพอทำไปเรื่อยๆ เราก็มาถึงจุดนี้..."
10027050-87 = "จุดที่แต่ละคนแต่งตอนจบที่ไม่มีอยู่จริงกันขึ้นมาเองน่ะเหรอ..."
10027050-88 = "ท้ายที่สุดแล้วมันก็อยู่ที่การตีความค่ะคุณเมรูริ ถ้ามีแฟนๆ 10 คน ก็จะสามารถตีความออกมาได้ 10 แบบ"
10027050-89 = "และจากการตีความนั้น ก็ไม่มีใครรู้หรอกค่ะว่าแบบไหนคือคำตอบที่ถูกต้อง โดยหลักการแล้ว ทุกการตีความมันก็จะมีคุณค่าในตัวของมันเอง และควรได้รับการเคารพอยู่แล้วค่ะ"
10027050-90 = "แต่การหวังว่าการตีความและสร้างสรรค์ผลงานของตัวเองจะได้รับการยอมรับแม้เพียงเล็กน้อย ก็เป็นเพราะการกระทำของผู้นั้นตั้งอยู่บนพื้นฐานของความปรารถนาค่ะ"
10027050-91 = "...แต่ยังไงนี่ก็เป็นแค่อีเวนต์งานโดจิน"
10027050-92 = "โดยสรุปแล้ว มันเป็นไปไม่ได้ตั้งแต่แรกอยู่แล้วค่ะที่จะหา <ลูน่า> เล่มจบบริบูรณ์เพื่อไปคืนดีกับคุณ#nโมมิจิอย่างที่คุณหวัง"
10027050-93 = "แต่หากเอาโดจินชิเล่มจบของ <ลูน่า> ที่มีคำวิจารณ์ที่ดีสุดของที่นี่ไปเป็นของขวัญให้แทนละก็..."
10027050-94 = "อาจจะได้คืนดีกับคุณโมมิจิก็ได้นะคะ"
10027050-95 = "เพราะแบบนั้น... เธอก็เลยให้ฉันมาที่นี่..."
10027050-96 = "......"
10027050-97 = "...จริงด้วย เธอพูดถูก"
10027050-98 = "ตราบใดที่หาเล่มจบบริบูรณ์ไม่ได้... การทำแบบนั้น... ก็อาจจะเป็นทางเลือกที่ถูกต้อง..."
10027050-99 = "ใช่ไหมล่ะคะ? บางครั้งคุณก็มองความจริงออกอยู่นะคะเนี่ย"
10027050-103 = "แต่ว่านะ... "
10027050-105 = "เพราะมันเป็นสิ่งที่ถูกต้องนั่นละ มันเลยทำให้ฉันอยากจะขัดขืนขึ้นมา!"
10027050-106 = "อยู่ๆ ก็พูดอะไรคะ?!"
10027050-108 = "งั้นฉันก็จะวาดบ้าง!"
10027050-109 = "วาดอะไรคะ?"
10027050-111 = "<ลูน่า> เล่มจบไง!"
10027050-117 = "[ns] \"หืม?\""
10027050-118 = "...คะ?"

10027050-56 = "#na;붉은겨울 학생 B;아, 회장. 여기 있었네. 다들 찾고 있다고. 어서 가야지."
10027050-57 = "3;타카네;18;!!!\n#3;em;[?!]\n#3;shake"
10027050-58 = "5;메루;10;회장?\n#5;em;[?]"
10027050-59 = "[s] \"회장?\""
10027050-60 = "5;메루;99;가만있자. 이런 장소, 이런 조건, 그리고 이곳에서 불리는 회장이라는 칭호를 고려하면…….\n#5;em;…"
10027050-61 = "3;타카네;06;……이렇게 된 이상, 숨겨도 소용없겠지요. 네, 제가 <루나> 동호회의 회장이랍니다."
10027050-62 = "[s] \"타카네가…… 이 동인 행사를 주최한 주최자?\""
10027050-63 = "5;메루;04;잠깐, 잠깐……. 지금 정보가 너무 몰려서 머릿속이 좀 혼란스러운데. 정리 좀 해 보자.\n#5;em;[땀]"
10027050-64 = "5;메루;05;이 행사를 주최한 건, 역시 너도 <루나>의 완결권을 보고 싶어서?"
10027050-65 = "3;타카네;05;……그게 틀린 이유는 아니라고 한다면, 어떻게 나올 건가요. 메루리 씨?\n#3;em;[?]"
10027050-66 = "5;메루;05;뭐야. 숨겨진 가치를 찾아준다느니 평론으로 작품을 한층 빛나게 해 준다느니 말은 그럴듯하게 해 놓고.\n#5;em;[빠직]\n#5;m4"
10027050-67 = "5;메루;03;결국 하고 있었던 건 자기가 좋아하는 작품 수집이었잖아……. 뭔데, 그 이중잣대?\n#5;em;[재잘]\n#5;m3"

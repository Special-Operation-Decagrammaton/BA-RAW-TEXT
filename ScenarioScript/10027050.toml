10027050-73 = "5;메루;05;가, 갑자기 또 무슨 짓이야?!\n#5;em;[스팀]\n#5;hophop"
10027050-74 = "3;타카네;11;저같이 평론가라는 직책을 가진 자가, 특정 작품의 애호가라는 사실이 밝혀지고……."

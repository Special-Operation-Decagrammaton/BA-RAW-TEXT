[translation]
10027050-1 = "Episode 5;Everyone Has Secrets"
10027050-2 = "Fanfic Convention"
10027050-5 = "So... You found your way here after all, Meruri."
10027050-6 = "Huh? What are you doing here?"
10027050-7 = "[s] \"Ah. Hello, Takane.\""
10027050-8 = "Hello, Sensei. I hope you've been well. I only half expected to run into you two..."
10027050-9 = "I'm a little surprised to see you here, but I'm glad too."
10027050-10 = "...You're glad? Did you actually mean for me to hear that?"
10027050-11 = "What do you think?"
10027050-12 = "You mean to tell me that you sent us to the Publishing Department hoping we'd end up here?"
10027050-13 = "Mm... Your desperate quest to find the final volume of \"Luna\" for Momiji was always hopeless. "
10027050-14 = "Volume 22 of \"Luna\" never existed."
10027050-15 = "But I've seen listings for it on the internet! There aren't many, but they're there..."
10027050-16 = "Anything you find on the internet will be more of these stories here."
10027050-17 = "Luna is a masterpiece. It dominated an era and was an incredible hit. But it had some bad luck. "
10027050-19 = "The saddest thing about \"Luna\" is that the final volume was never released."
10027050-20 = "[s] \"Why is that?\""
10027050-21 = "As I said, Luna made a splash, but over time, the market lost interest."
10027050-22 = "...Really, it didn't get a fair review at the time."
10027050-23 = "There was never actually anything wrong with the story. But it broached topics that the audience wasn't ready for, so it got...mixed reviews."
10027050-24 = "But that's a tale as old as time, isn't it? True masterpieces aren't recognized until well after their time. I can't imagine \"Luna\" is the only work to suffer that fate."
10027050-25 = "As a critic, I know that better than anyone else. It's why I try so hard to read and critique as much as I possibly can."
10027050-26 = "So... You knew all along that I would never find the final volume."
10027050-27 = "Then why would you use such a roundabout way of telling me?"
10027050-31 = "...I wanted to test you, Meruri."
10027050-32 = "You have so much pride, and you don't work to build any relationships. Since you were searching for the final volume of \"Luna\"..."
10027050-33 = "I thought doing this, getting you here, would force you to go outside your comfort zone. "
10027050-34 = "In other words, you knew how desperate I was and thought I'd submit to anything. Is that about right?"
10027050-35 = "Yes. And I was right. You came all the way here, and..."
10027050-36 = "I am sorry you got dragged into this, Sensei."
10027050-37 = "[s1] \"I don't mind.\"\n[s2] \"Takane... You wanted to help them make amends, didn't you?\""
10027050-38 = "You show such kindness and generosity... You're nothing like this prideful, spiteful artist."
10027050-39 = "Ah! You are just shameless!"
10027050-40 = "I-I just wanted to see you find your own way, Meruri. That's all!"
10027050-41 = "That doesn't sound like you at all. Don't believe her, Sensei! I'm sure this is some kind of trick!"
10027050-42 = "That's completely uncalled for!"
10027050-43 = "You should talk! "
10027050-44 = "[s] \"All right, that's enough.\""
10027050-45 = "...Yes, Sensei."
10027050-46 = "Tch! "
10027050-47 = "...Mmph! I know you're just looking out for me."
10027050-48 = "...Hmph."
10027050-49 = "[s] \"What are you doing here anyway, Takane?\""
10027050-50 = "Well..."
10027050-56 = "Ah, there you are, President. Everyone is looking for you! Let's go!"
10027050-57 = "...!"
10027050-58 = "President?"
10027050-59 = "[s] \"President?\""
10027050-60 = "Wait a second... You knew what this was and where it is, and someone just called you President..."
10027050-61 = "Guess the cat's out of the bag. Yes, I'm the president of the \"Luna\" Club."
10027050-62 = "[s] \"Takane... You organized this fanfic event?\""
10027050-63 = "Wait, wait, wait... This is too much information too fast."
10027050-64 = "You organized this event because you want the final volume too, didn't you?"
10027050-65 = "What if I did?"
10027050-66 = "You just gave a whole speech about how critics help bring light to a variety of works that would otherwise go unnoticed."
10027050-67 = "But you're just collecting and reading works about your favorite story. Talk about a hypocrite!"
10027050-73 = "Whoa! Wh-What are you doing?!"
10027050-74 = "If anyone finds out about this, it will ruin my reputation as an impartial critic."
10027050-75 = "What's worse is that you, Meruri, are teasing me just for liking something."
10027050-77 = "I've decided it would be better if you were...silenced."
10027050-78 = "What?! You're the one who sent me here in the first place!"
10027050-80 = "Things change."
10027050-81 = "Really?! Do you hear how crazy you sound right now?"
10027050-82 = "*sigh* I suppose you're right."
10027050-83 = "But it's not just me, you know. There will always be people who want to see how it ends."
10027050-84 = "Some worry about the original author, who just disappeared one day. Some say it was irresponsible of them not to finish it. "
10027050-85 = "But every single person who loves \"Luna\" wants more of it. They don't want it to die with the original author. So they started creating their own stories."
10027050-86 = "And so... Here we are."
10027050-87 = "Are you saying that each person is creating a brand new ending in their own style?"
10027050-88 = "It's their own interpretation, yes. There are as many interpretations of the work as there are fans."
10027050-89 = "No one will ever know which is correct, so every interpretation is valued and respected equally."
10027050-90 = "Of course, everyone wants their version to stand out and be recognized. It's in the nature of every creator."
10027050-91 = "Regardless, it's all fan fiction in the end, isn't it?"
10027050-92 = "My point is, you were never going to find the final volume of \"Luna\" or use it to reconcile with Momiji."
10027050-93 = "But there is something you can do. Gift her one of the \"Luna\" fanfics here, the one with the best review."
10027050-94 = "If there's anything that will show Momiji how much you care, it's that."
10027050-95 = "So that's why you brought me here..."
10027050-96 = "..."
10027050-97 = "...You're right. You're absolutely right."
10027050-98 = "If I can't find the final volume, I can at least get her the next best thing."
10027050-99 = "Ah, even you can see reason sometimes. Wonderful!"
10027050-103 = "The thing is... "
10027050-105 = "Sometimes when something feels so right that you have no choice but to do it...it makes you want to dig your heels in."
10027050-106 = "What?! What do you mean?"
10027050-108 = "I'm going to create something too!"
10027050-109 = "What?"
10027050-111 = "I'm going to write the final volume of \"Luna\"!"
10027050-117 = "[ns] \"Huh?\""
10027050-118 = "Huh?"

[translation]
1012206-1 = "From My First Steps Forward"
1012206-2 = "I looked for Mika after reading her odd MomoTalk messages."
1012206-5 = "[ns] \"Is it this way...?\""
1012206-6 = "Heehee... Ehehe."
1012206-10 = "[ns] \"Mika...?\""
1012206-12 = "Oh..."
1012206-13 = "Sen-se-i! Ehehe!"
1012206-14 = "Yoooou caaaame hereee?"
1012206-15 = "I...waaas just haaaaanging. Yeaah..."
1012206-16 = "[ns] \"What's going on? Isn't this...\""
1012206-17 = "Ehehe. It was tasty. So I drank feew glaases?"
1012206-18 = "I alsooo have been a-thiiiinking..."
1012206-19 = "Senseiiii? You waant soome?"
1012206-20 = "Ahaha. Heree. Siit heree. Next to mee."
1012206-21 = "[ns] Sit next to Mika."
1012206-24 = "...You really sat there. Wooow. Heehee..."
1012206-25 = "[ns1] \"Mika, it seems like you want to talk.\"\n[ns2] \"What's going on?\""
1012206-28 = "Ah..."
1012206-29 = "Yeaaah. Heehee. You're sooo clever, Sensei. Quick!"
1012206-30 = "I'll saaay it then, okayy?"
1012206-34 = "...I've been thiiinking..."
1012206-35 = "Y'know, I used to be a toooootal princess."
1012206-36 = "Ahaha... Seriously. I really was almooost one. For real."
1012206-37 = "I got and diid everything I waaanted..."
1012206-38 = "And everyone listened to mee..."
1012206-39 = "Princess of Pater... Then I was invited to the Tea Party..."
1012206-40 = "It was so normal. I juuuuust...thought I was entitled to it."
1012206-41 = "Heehee... I thought I was so special...so coooool..."
1012206-42 = "Mmm..."
1012206-43 = "[ns] \"...\""
1012206-44 = "I was a total idiot."
1012206-45 = "I was bad... I got punished. Everyone knew."
1012206-46 = "Even after that... So much happened."
1012206-47 = "Heehee, soooo..."
1012206-48 = "The sparkliiiing and adored princess of Tea Party had nooo idea who she really was."
1012206-49 = "The \"real her\" wasn't very nice, or happy, or cool, or special."
1012206-50 = "...Just a cunning, calculating, and selfish brat."
1012206-51 = "That's the real Mika... Ahaha."
1012206-55 = "Then, who am I, really...? Why am I so terrible?"
1012206-56 = "I don't know...why I'm like this..."
1012206-60 = "[ns] \"So that's what you were worried about, Mika.\""
1012206-61 = "Mmm..."
1012206-62 = "I think about it a lot..."
1012206-63 = "[s3] \"You needed an excuse to be honest.\"\n[s4] \"You're pretending to be drunk.\""
1012206-69 = "Y-You knew...?"
1012206-70 = "[s] \"This is just juice, isn't it?\""
1012206-71 = "...U-Ugh..."
1012206-72 = "U-Urrgh... You knew the whole time?!"
1012206-73 = "I knew this would be awkward, but... AH! It's too much."
1012206-74 = "[s] \"Oh Mika. Always jumping in and then regretting it.\""
1012206-75 = "W-Well, you know how it is! I just wanted to maybe have a way out. Like I could pretend?"
1012206-76 = "I just couldn't... How could I tell you directly if I didn't even know what I meant?"
1012206-77 = "S-So I figured...when a mature adult is stressed, they..."
1012206-78 = "[ns5] \"Be yourself.\"\n[ns6] \"Just share your honest feelings.\""
1012206-81 = "Yeah."
1012206-82 = "...Now I have another embarrassing memory to constantly pore over."
1012206-83 = "..."
1012206-84 = "But I did mean it. I'm always such a fool. An idiot."
1012206-85 = "I annoy everyone. I'm bothering YOU right now!"
1012206-86 = "And I keep doing it. It's probably just the way I am."
1012206-87 = "I...don't know what else I'm supposed to do. How can I trust myself after I...?"
1012206-88 = "[s7] \"You're doing good, Mika.\"\n[s8] \"You're putting in a lot of work.\""
1012206-91 = "H-Hm?"
1012206-92 = "A-Am I doing good...? Really, you think...?"
1012206-93 = "...Right now is the most important time period of my life?"
1012206-97 = "I know that. And I've been struggling and worrying and working to be better."
1012206-98 = "...But is it even worth it?"
1012206-99 = "[s] \"Moments like these hold and shape your future.\""
1012206-100 = "They're all just moments..."
1012206-101 = "...like little steps taking me to where I need to be."
1012206-108 = "Honestly, I don't know. I really wonder if it's possible."
1012206-109 = "But..."
1012206-110 = "If that's what Sensei said..."
1012206-111 = "If that's what Sensei said only to me..."
1012206-112 = "...I'll consider it."
1012206-113 = "[s9] \"You'll be fine.\"\n[s10] \"All these harsh lessons will pay off.\""
1012206-116 = "..."
1012206-117 = "Yeah. I guess I'll..."
1012206-118 = "...I'll continue to...think about it. And Sensei..."
1012206-119 = "...I'm glad we talked about it."
1012206-125 = "It's been such a long day. And I'm so tired..."
1012206-126 = "[s] \"Hello?\""
1012206-127 = "Mmm..."
1012206-128 = "..."
1012206-134 = "[ns11] \"...\"\n[ns12] \"Mika?\""
1012206-138 = "Mika was fast asleep. I carried her back to her bed and let her rest."

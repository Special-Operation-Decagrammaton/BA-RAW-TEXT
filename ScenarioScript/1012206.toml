[translation]
1012206-1 = "ตั้งแต่ฉันเริ่มก้าวเดิน..."
1012206-2 = "(เมื่อได้ข้อความ MOMOTALK แปลกๆ คุณครูก็ออกมาตามหามิกะ)"
1012206-5 = "[ns] \"ทางนี้หรือเปล่านะ?\""
1012206-6 = "ฮิฮิ... ฮิฮิฮิ"
1012206-10 = "[ns] \"มิกะ...?\""
1012206-12 = "อื้อ..."
1012206-13 = "คุณณณ ครู~ ฮิฮิฮิ~"
1012206-14 = "พอฉันเรียก ก็มาหาเลยน้า~"
1012206-15 = "ฉัน... แค่มาน่าง อยู่ตรงนี้~ งืมม.."
1012206-16 = "[ns] \"มีเรื่องอะไรเหรอ? นี่มัน...\""
1012206-17 = "ฮิฮิฮิ มันอร่อยมาก ฉันเลยกระดกไปหลายแก้วเลย"
1012206-18 = "แล้วฉันก็มีเรื่อง ให้ คิด ด้วย"
1012206-19 = "คุณครูก็ดื่มด้วยม้า~?"
1012206-20 = "อะฮะฮ่า ตรงนี้ มาน่าง ข้างๆ ฉันสิ"
1012206-21 = "[ns] (ไปนั่งข้างๆ มิกะ)"
1012206-24 = "มานั่งจริงด้วยแฮะ..."
1012206-25 = "[ns1] \"มิกะมีอะไรอยากบอกครูใช่มั้ย?\"\n[ns2] \"มิกะมีอะไรอยากบอกครูหรือเปล่า?\""
1012206-28 = "อ่า..."
1012206-29 = "อื้อ แหะๆ คุณครูเนี่ย อ่านใจฉันออกได้จริงๆ เลยนะ"
1012206-30 = "ถ้าง้าน... ฉันบอกเลยดีมั้ย?"
1012206-34 = "ฉัน... เอาแต่คิดเรื่องนู้นเรื่องนี้มาตลอดเลย"
1012206-35 = "เมื่อก่อนน่ะ ฉันไม่ต่างกับเจ้าหญิง~ คนหนึ่งเลยนะ"
1012206-36 = "อะฮะฮ่า~ ไม่ได้ล้อเล่นนะ ฉันพูดจริง~"
1012206-37 = "ฉันอยากได้อะไรก็ได้~ อยากทำอะไรก็ทำ~"
1012206-38 = "ทุกคนฟังคำของฉันหมดเลย~..."
1012206-39 = "กับกลุ่มปาเตอร์ด้วย... แล้วฉันก็ได้มาเป็นสมาชิกสภาน้ำชา..."
1012206-40 = "ฉันคิดว่านั่นมันเป็นเรื่องปกติมาก... และคิดว่า~ นั่นคือสิทธิ์ของฉัน"
1012206-41 = "ฮิฮิ... ฉันก็เลยคิดว่าตัวเองเท่~ แล้วก็ยอดเยี่ยมมากเลย~"
1012206-42 = "อื้อ..."
1012206-43 = "[ns] \"......\""
1012206-44 = "โง่มากเลยใช่มั้ยล่ะ?"
1012206-45 = "ฉันทำผิดพลาดครั้งใหญ่... จนถูกลงโทษ..."
1012206-46 = "หลังจากนั้นก็เกิดเรื่องขึ้นมากมาย..."
1012206-47 = "แหะๆ เพราะงั้น..."
1012206-48 = "เจ้าหญิงแห่งสภาน้ำชาที่เฉิดฉาย~ และได้รับการปรนนิบัติเป็นอย่างดี ก็เลยไม่รู้ว่าแท้จริงแล้ว~ ตัวเองเป็นใคร"
1012206-49 = "และตอนจบก็คือ~ 'ตัวจริงของฉัน' ไม่ได้เป็นคนที่ดีหรือน่ายกย่องอย่างที่ตัวเองเคยคิด"
1012206-50 = "เด็กเจ้าปัญหาที่เหลี่ยมจัด เห็นแก่ตัว และทำตัวตามอำเภอใจ"
1012206-51 = "ที่จริงแล้วฉันเป็นคนอย่างนั้นละ~ อะฮะฮ่า "
1012206-55 = "ทำไมกันนะ...? ทำไมฉันถึงเป็นคนไม่ได้เรื่องแบบนี้นะ...?"
1012206-56 = "ฉันไม่รู้เลย... ทำไมถึงเป็นแบบนั้นนะ..."
1012206-60 = "[ns] \"กำลังคิดกังวลเรื่องนี้อยู่สินะ มิกะ\""
1012206-61 = "อื้อ..."
1012206-62 = "ช่วงนี้ฉันคิดแต่เรื่องแบบนี้บ่อยเป็นพิเศษเลย..."
1012206-63 = "[s3] \"เรื่องนี้ละเอียดอ่อนเลยนะ แล้วไหนจะก็แกล้งเมาด้วย\"\n[s4] \"เรื่องนี้พูดยากเลยนะ แล้วไหนจะก็แกล้งเมาด้วย\""
1012206-69 = "อ๊ะ... รู้อยู่แล้วเหรอ...?"
1012206-70 = "[s] \"ที่ดื่มอยู่มันแค่น้ำผลไม้ไม่ใช่เหรอ?\""
1012206-71 = "อะ... อึก..."
1012206-72 = "อะ... อ๊ายยย~~ รู้อยู่แล้วงั้นเหรอ น่าอายชะมัดเลย~!!"
1012206-73 = "กะไว้แล้วเชียวว่าต้องอาย แล้วมันก็น่าอายจริงๆ...!!"
1012206-74 = "[s] \"ก่อเรื่องแล้วมาเสียใจที่หลัง นี่มิกะตัวจริงเลยสินะ\""
1012206-75 = "กะ... ก็เวลาเราเมา... บรรยากาศมันจะพาไปนี่นา~ มันทำให้ฉันกล้าพูดอย่างจริงใจน่ะ"
1012206-76 = "ฉันอยาก... อยากยืมความกล้านี้... ก็ฉันไม่กล้าพูดออกมาตรงๆ นี่นา"
1012206-77 = "ฉะ... ฉันก็เลยแกล้งทำตัวเป็นผู้ใหญ่... ที่ดื่มเหล้าจนเมาน่ะ..."
1012206-78 = "[ns5] \"ไม่ต้องฝืนทำขนาดนั้นก็ได้\"\n[ns6] \"มิกะในตอนนี้ก็บอกความรู้สึกตามตรงได้ไม่ใช่เหรอ?\""
1012206-81 = "อืม..."
1012206-82 = "เรื่องที่เกิดขึ้นวันนี้... จะเป็นประวัติศาสตร์ที่น่าอายมากๆ แน่เลย..."
1012206-83 = "..."
1012206-84 = "ฉันเป็นคนโง่เง่าตลอดเลย... กับเรื่องเมื่อกี้ก็ด้วย..."
1012206-85 = "ฉันเอาแต่ทำให้ทั้งคุณครูและคนรอบข้างรำคาญใจ"
1012206-86 = "ต่อไปในอนาคตก็คงเป็นอย่างนั้นอีก..."
1012206-87 = "ฉันไม่รู้ว่าตัวเองต้องทำอะไร แล้วก็ไม่มีความมั่นใจในตัวเองเลย..."
1012206-88 = "[s7] \"ครูอยากบอกว่าตอนนี้มิกะก็ทำได้ดีแล้วนะ\"\n[s8] \"การย้อนกลับไปมองตัวเองไม่ใช่เรื่องง่ายหรอก\""
1012206-91 = "หะ... หืม?"
1012206-92 = "ฉะ... ฉันทำดีแล้วงั้นเหรอ...? จริงเหรอ? แบบนี้เนี่ยนะ...?"
1012206-93 = "สิ่งสำคัญที่สุดสำหรับฉันก็คือ 'ตอนนี้' งั้นเหรอ...?"
1012206-97 = "ถ้างั้น... ความกังวลโง่ๆ ทั้งหมดที่ฉันมีอยู่ตอนนี้..."
1012206-98 = "มันเป็นสิ่งที่จำเป็นหรือเปล่านะ?"
1012206-99 = "[s] \"มันเป็นก้าวสำคัญเพื่ออนาคตข้างหน้าน่ะ\""
1012206-100 = "ก้าวสำคัญ..."
1012206-101 = "เพื่ออนาคตข้างหน้า..."
1012206-108 = "ที่จริง... ฉันไม่แน่ใจเลยว่ามันเป็นอย่างนั้นจริงๆ หรือเปล่า"
1012206-109 = "แต่ว่า..."
1012206-110 = "พอคุณครูพูดอย่างนั้น"
1012206-111 = "พอคุณครูช่วยพูดอย่างนั้นเพื่อฉัน..."
1012206-112 = "ฉันก็จะเอาไปคิดทบทวนดูนะ"
1012206-113 = "[s9] \"แค่จดจำตอนนี้ไว้ได้ มิกะในอนาคตก็จะไม่เป็นไรนะ\"\n[s10] \"การกังวลแบบนั้น... จะช่วยสนับสนุนมิกะในอนาคตด้วยนะ\""
1012206-116 = "..."
1012206-117 = "อื้อ ฉันจะ..."
1012206-118 = "ฉันจะคิดเรื่องนี้ต่อไปอีกในอนาคตด้วย... ร่วมกันคิดกับคุณครูน่ะ..."
1012206-119 = "ดีจังเลยนะที่ฉันได้บอกกับคุณครู..."
1012206-125 = "แต่ว่า... ฉันง่วงๆ มาตั้งแต่เมื่อกี้แล้วละ... งืมม..."
1012206-126 = "[s] \"เดี๋ยวนะ?\""
1012206-127 = "อื้อ..."
1012206-128 = "..."
1012206-134 = "[ns11] \"......\"\n[ns12] \"คุณมิกะ?\""
1012206-138 = "(แล้วคุณครูก็พามิกะที่จู่ๆ ก็หลับไปกลับไปยังที่พัก...)"

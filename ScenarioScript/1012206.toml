[translation]
1012206-1 = "從踏出步伐的我開始……"
1012206-2 = "（看到奇怪的MomoTalk訊息後，決定來找彌香）"
1012206-5 = "[ns]「是這邊嗎……？」"
1012206-6 = "呵呵……嘿嘿嘿。"
1012206-10 = "[ns]「彌香……？」"
1012206-12 = "啊……"
1012206-13 = "老師～嘿嘿嘿～"
1012206-14 = "你來找我了耶～"
1012206-15 = "我～就只是坐在這裡～嗯……"
1012206-16 = "[ns]「這是……你怎麼了？」"
1012206-17 = "嘿嘿嘿。#n因為太好喝了～就喝了幾杯？"
1012206-18 = "事情想著想著就……"
1012206-19 = "老師呢？要不要也喝一點～？"
1012206-20 = "啊哈哈。來來來，這裡。坐我旁邊吧～"
1012206-21 = "[ns] 在彌香身旁坐下"
1012206-24 = "真的坐下來了啊……"
1012206-25 = "[ns1]「感覺彌香有話想說。」\n[ns2]「說出來讓我聽聽吧？」"
1012206-28 = "啊……"
1012206-29 = "嗯，嘿嘿。老師果然很敏銳呢。"
1012206-30 = "那～我就說囉？"
1012206-34 = "……我啊，最近一直在思考很多事。"
1012206-35 = "以前的我，完全就是個公主哦？"
1012206-36 = "啊哈哈～這不是在開玩笑。#n真的～幾乎一模一樣～"
1012206-37 = "想要什麼都能得到～想做什麼就去做～"
1012206-38 = "大家都會聽我的話～"
1012206-39 = "在聖父派的時候也是這樣……自然而然地成為茶會成員……"
1012206-40 = "那些事對我來說太理所當然了……讓我～覺得那就是我的權利。"
1012206-41 = "嘿嘿……所以我一直以為～自己是個超棒超厲害的人～"
1012206-42 = "唔嗯……"
1012206-43 = "[ns]「……」"
1012206-44 = "結果，我其實是個笨蛋。"
1012206-45 = "因為犯下了大錯……而受到懲罰……"
1012206-46 = "之後也發生了很多事……"
1012206-47 = "嘿嘿，所以啊……"
1012206-48 = "那個閃閃發光～總是被捧在手心的茶會公主～其實完全不了解自己真正的樣子。"
1012206-49 = "「真正的我」其實並不是什麼好人，也不是什麼了不起的人。#n結論就是這樣～"
1012206-50 = "陰險、算計、自私、任性的問題兒童。"
1012206-51 = "那才是真正的我～啊哈哈。"
1012206-55 = "那麼，我到底是什麼呢……？#n為什麼會是這麼糟糕的人……？"
1012206-56 = "我不知道……為什麼會這樣……"
1012206-60 = "[ns]「原來你一直在煩惱這些啊，彌香。」"
1012206-61 = "嗯……"
1012206-62 = "最近特別常想這些事……"
1012206-63 = "[s3]「這確實是個不太容易開口的話題呢。」\n[s4]「要假裝喝醉才比較好說出口。」"
1012206-69 = "被，被發現了嗎……？"
1012206-70 = "[s]「你現在喝的是果汁吧？」"
1012206-71 = "唔，唔唔……"
1012206-72 = "唔哇哇～～居然被發現了，好丟臉～～！！"
1012206-73 = "雖然早就覺得會這樣，但還是太丟臉了……！！"
1012206-74 = "[s]「果然是平常的彌香呢。總是先做了再後悔。」"
1012206-75 = "因，因為我想營造一個容易說出真心話的氛圍嘛～你懂的吧？"
1012206-76 = "希望這樣可以鼓起勇氣……因為直接講出口實在有點可怕……"
1012206-77 = "所，所以才想說裝得成熟一點……會不會比較好……"
1012206-78 = "[ns5]「不用勉強自己也沒關係。」\n[ns6]「現在的彌香，已經能坦率地表達心意了吧。」"
1012206-81 = "嗯……"
1012206-82 = "今天的事，一定會成為超丟臉的黑歷史……"
1012206-83 = "……"
1012206-84 = "就像剛才那樣……我總是這麼笨。"
1012206-85 = "每次都造成老師和周圍的人的麻煩。"
1012206-86 = "以後恐怕也會一直這樣吧……"
1012206-87 = "我不知道該怎麼辦，對自己也完全沒有信心……"
1012206-88 = "[s7]「我認為彌香已經做得很好了哦。」\n[s8]「因為反省自己，真的不是件容易的事。」"
1012206-91 = "咦，咦？"
1012206-92 = "我，我做得很好……？#n真的嗎……？"
1012206-93 = "現在對我來說……是最重要的時期？"
1012206-97 = "所以我這些笨拙的煩惱……"
1012206-98 = "也，也是必要的嗎？"
1012206-99 = "[s]「那是為了前進，很重要的一步哦。」"
1012206-100 = "為了前進……"
1012206-101 = "重要的……"
1012206-108 = "其實……我還是不太確定。#n真的會這樣嗎？"
1012206-109 = "不過……"
1012206-110 = "因為是老師說的話。"
1012206-111 = "是老師為了我而說的話……"
1012206-112 = "所以，我想再多思考看看。"
1012206-113 = "[s9]「只要記住現在這一刻，彌香就不會有問題的。」\n[s10]「這些努力思考的時光……未來將會成為你的支柱。」"
1012206-116 = "……"
1012206-117 = "嗯，我以後也會……"
1012206-118 = "也會一直……思考下去的。#n和老師一起……"
1012206-119 = "……能告訴老師真是太好了。"
1012206-125 = "話說，我從剛才開始就好想睡哦……唔嗯……"
1012206-126 = "[s]「嗯？」"
1012206-127 = "唔唔……"
1012206-128 = "……"
1012206-134 = "[ns11]「……」\n[ns12]「彌香同學？」"
1012206-138 = "（於是只好把睡著的彌香背回了住宿的地方……）"

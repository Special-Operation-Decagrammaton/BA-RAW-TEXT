[translation]
80000031-1 = "整整一年的等待"
80000031-2 = "女武神．生活安全局"
80000031-3 = "呵呵……真期待啊。"
80000031-4 = "[s]「發生什麼好事了嗎？」"
80000031-5 = "哦，這不是老師嗎。早安。"
80000031-6 = "當然有好事囉。今天不是情人節嗎？"
80000031-7 = "是個所有人都開心的日子，肯定會期待吧。"
80000031-8 = "[s]「原來如此，你有重要的對象嗎？」"
80000031-9 = "哼哼，老師真敏銳呢……"
80000031-10 = "沒錯，我等今天這天已經整整一年了。"
80000031-11 = "至今為止，無論我是多麼想見也見不到……"
80000031-12 = "所謂一日千秋就是這麼回事吧。#n於是總算是到了今天，害我一早就期待得完全沒辦法工作。"
80000031-13 = "[s]「究竟是什麼樣的……」"
80000031-14 = "應該差不多了唷？"
80000031-18 = "來了！"
80000031-20 = "您好！隨時隨地把甜甜圈送到您的口中，「MasterDonut」的外送來了！"
80000031-21 = "請問是訂購了2箱「情人節紀念．特製巧克力甜甜圈」的吹雪小姐嗎？"
80000031-22 = "等不及啦～！"
80000031-27 = "[ns]「吹雪……？」"
80000031-29 = "看不出來嗎？這是情人節限定的巧克力炸甜甜圈唷！"
80000031-30 = "雖然平時看似也能吃到，#n但是這款灑上巧克力米的「特別版」只有在情人節才吃得到哦！"
80000031-31 = "再加上情人節期間一直都有特價活動……"
80000031-32 = "哎呀～果然情人節最棒了──！"
80000031-33 = "[s1]「這就是等了一年的對象……」\n[s2]「全都是為了甜甜圈啊……」"
80000031-34 = "啊，這個……唔嗯……"
80000031-35 = "啊，這個……唔嗯……"
80000031-39 = "……來嘛，老師要不要也吃一個？"

80000031-19 = "1;배달부;03\n5;후부키;07\n#1;ar\n#5;m5\n#wait;1500"
80000031-20 = "1;배달부;03;안녕하세요! 언제 어디서나 가장 빠르게 도넛을 즐기는 방법, <마스터 도너츠 딜리버리 서비스>입니다!\n#1;em;[반짝]\n#1;greeting"
80000031-21 = "1;배달부;02;발렌타인 데이 기념— 특제 초코 트롤러 도넛 2박스 주문하신 후부키 씨 맞으시죠?"
80000031-22 = "5;후부키;03;응응, 맞아! 계속 기다리고 있었다고!\n#5;em;[하트]\n#5;greeting"

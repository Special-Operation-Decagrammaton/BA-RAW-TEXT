[translation]
80000031-1 = "หนึ่งปีที่รอคอย"
80000031-2 = "สำนักรักษาความปลอดภัย สถาบันฝึกตำรวจวัลคิรี่"
80000031-3 = "ฮิฮิ... ชักตื่นเต้นจนทนไม่ไหวแล้วแฮะ"
80000031-4 = "[s] \"มีเรื่องดีๆ อะไรเหรอ?\""
80000031-5 = "อ๊ะ คุณครู อรุณสวัสดิ์"
80000031-6 = "ต้องมีเรื่องดีๆ อยู่แล้วสิ วันนี้เป็นวันวาเลนไทน์นี่นา?"
80000031-7 = "ถ้าเป็นนักเรียนของคิโวทอสละก็ ใครๆ ก็คงตื่นเต้นกับวันนี้ทั้งนั้นล่ะ"
80000031-8 = "[s] \"หรือว่ามีคนที่อยากสารภาพรักอยู่งั้นเหรอ...?\""
80000031-9 = "ฮิฮิ หูตาไวจริงๆ เลยนะ"
80000031-10 = "ใช่แล้วล่ะ คุณครู ฉันรอคอยมาตลอดหนึ่งปีเพื่อคนคนนั้น..."
80000031-11 = "ที่ผ่านมาต่อให้อยากเจอแค่ไหนก็ไปเจอไม่ได้ ได้แต่นั่งกระวนกระวายทุกวัน..."
80000031-12 = "แถมวันนี้คนคนนั้นจะมาที่สำนักรักษาความปลอดภัยอีกด้วย ฉันตื่นเต้นตั้งแต่เช้าจนทำงานไม่ได้เลยล่ะ"
80000031-13 = "[s] \"อีกฝ่ายเป็นใครกันนะ...\""
80000031-14 = "ใกล้ได้เวลาที่เขาจะมาแล้ว..."
80000031-18 = "มาแล้วล่ะ!"
80000031-20 = "สวัสดีครับ! ไม่ว่าตอนไหนก็พร้อมส่งเร็ว ส่งไวไม่มีใครเกิน <บริการจัดส่งโดนัทของมาสเตอร์โดนัท> มาถึงแล้วครับ!"
80000031-21 = "คุณฟุบุกิที่สั่งโดนัทช็อกโกแลตพิเศษ ฉลองวันวาเลนไทน์ 2 กล่องใช่หรือเปล่าครับ?"
80000031-22 = "อื้อ ใช่แล้ว! ฉันรอมาตลอดเลยล่ะ!"
80000031-27 = "[ns] \"ฟุบุกิ... ของพวกนี้มัน...?\""
80000031-29 = "เห็นแล้วก็น่าจะรู้นี่นา? โดนัทช็อกโกแลตสูตรพิเศษของ <มาสเตอร์โดนัท> ไงล่ะ!"
80000031-30 = "อันที่จริงโดนัทช็อกโกแลตก็ซื้อกินได้ทั่วไปนั่นละนะ แต่ว่าโดนัทช็อกโกแลตที่โรยท็อปปิ้งแบบพิเศษ จะมีขายเฉพาะในวันวาเลนไทน์เท่านั้น!"
80000031-31 = "อีกอย่างในช่วงเทศกาลวาเลนไทน์น่ะ มักจะมีโดนัทช็อกโกแลตลดราคาอยู่บ่อยๆ..."
80000031-32 = "ฮ่า~ วาเลนไทน์นี่สุดยอดจริงๆ~"
80000031-33 = "[s1] \"เหตุผลที่กระวนกระวายแต่เช้าจนทำงานไม่ได้นี่...\"\n[s2] \"เพราะโดนัทสินะ?\""
80000031-34 = "คือเรื่องนั้น..."
80000031-35 = "คือเรื่องนั้น..."
80000031-39 = "คุณครูจะลองชิมดูสักชิ้นไหมล่ะ...?"

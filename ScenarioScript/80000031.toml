80000031-2 = "#place;발키리 생활안전국 사무실"
80000031-3 = "5;후부키;00;후후…… 벌써부터 기대가 되어서 견딜 수가 없네.\n#5;em;[음표]\n#5;a"
80000031-4 = "[s] \"무슨 좋은 일이라도 있어?\""
80000031-5 = "5;후부키;01;아, 선생. 좋은 아침이야.\n#5;em;[반응]"
80000031-6 = "5;후부키;02;좋은 일이야 뻔하지. 오늘은 발렌타인 데이잖아?\n#5;m3"
80000031-7 = "5;후부키;10;무릇 키보토스의 학생이라면 오늘을 기대하지 않을 수가 없지.\n#5;em;[///]"
80000031-8 = "[s] \"설마 그동안 마음에 두고 있던 상대라도……?\""
80000031-9 = "5;후부키;03;후후…… 눈치가 빠른걸.\n#5;em;[반짝]"
80000031-10 = "5;후부키;01;맞아, 선생. 나는 그 상대를 위해 지난 1년을 기다려왔어.\n#5;greeting"
80000031-11 = "5;후부키;99;그동안은 만나고 싶어도 만날 수가 없어서 마음만 졸이고 있었는데……."
80000031-12 = "5;후부키;03;게다가 그 상대가 생활안전국까지 직접 와 준다고 하니, 아침부터 기대가 되어서 일에 집중을 할 수가 없더라고.\n#5;stiff"
80000031-13 = "[s] \"도대체 어떤 상대이기에…….\""
80000031-14 = "5;후부키;05;이제 곧 올 시간이 되었는데…….\n#5;em;[...]"

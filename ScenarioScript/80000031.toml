80000031-30 = "3;후부키;10;초코 트롤러는 평소에도 먹을 수 있지만, 특제 스프링클을 뿌린 초코 트롤러는 발렌타인 데이에만 맛볼 수 있다고!\n#3;em;[반짝]"
80000031-31 = "3;후부키;99;게다가 발렌타인 기간에는 수시로 초콜릿 도넛의 할인 행사가 진행되니……."
80000031-32 = "3;후부키;03;하아~ 역시 발렌타인 데이는 최고야~\n#3;em;[하트]\n#3;greeting"

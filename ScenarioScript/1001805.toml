[translation]
1001805-1 = "งานพาร์ทไทม์ของเด็กขี้อาย 1"
1001805-2 = "ห้องชมรมพัฒนาเกม"
1001805-3 = "เฮ้อ... ฉันจะเอาแต่รบกวนสมาชิกคนอื่นๆ ต่อไปไม่ได้...#nครั้งนี้เกิดเรื่องใหญ่จริงๆ ค่ะ"
1001805-4 = "[s] \"มีเรื่องอะไรน่ากังวลเหรอ?\""
1001805-5 = "อ่า... คุณครูคะ"
1001805-6 = "ไม่มีอะไรหรอกค่ะ แค่ชมรมพัฒนาเกมมีเงินทุนพัฒนาไม่พอถึงตอนที่เราจะพัฒนาเกมใหม่สำเร็จค่ะ..."
1001805-7 = "สมาชิกทุกคนกำลังทำงานพาร์ทไทม์เพื่อรวบรวมเงินทุนพัฒนากันอยู่ แต่ฉันกลัวผู้คนเลย#nไม่กล้าออกไปหางานทำข้างนอก..."
1001805-8 = "ฉันที่ได้ชื่อว่าเป็นหัวหน้าของชมรมพัฒนาเกมแต่กลับไม่ช่วยอะไรเลย ฉันเสียใจมากเลยค่ะ"
1001805-9 = "ไม่มีวิธีไหนที่ฉันจะพอช่วยสมาชิกได้บ้างเลยเหรอคะ?"
1001805-10 = "[s] \"ครูแนะนำงานพาร์ทไทม์ที่รู้จักให้เอามั้ย?\""
1001805-11 = "...คะ? งานพาร์ทไทม์เหรอคะ?!"
1001805-12 = "ไม่ไหวหรอกค่ะ! ฉันคุยกับผู้คนไม่ได้แน่ค่ะ!"
1001805-13 = "......"
1001805-14 = "แค่อยู่ต่อหน้าคนอื่นๆ... ฉันก็กลัวแล้ว..."
1001805-15 = "...แต่จะให้หนีต่อไปก็ไม่ได้สินะคะ"
1001805-16 = "ถ้าเป็นงานพาร์ทไทม์ที่คุณครูแนะนำล่ะก็... อาจจะทำได้ก็ได้ค่ะ!"
1001805-18 = "<เอ็นเจล 24> สาขากลางคิโวทอส"
1001805-19 = "ที่ <เอ็นเจล 24> สาขากลางเมืองคิโวทอสในวันต่อมา"
1001805-21 = "ไม่ไหวหรอกค่ะ...!"
1001805-22 = "บอกว่าจะให้ทำงานพาร์ทไทม์ แต่ไม่เคยได้ยินคำว่าเป็นงานต้อนรับในร้านสะดวกซื้อนี่ค่ะ!"
1001805-23 = "ฉันเชื่อใจคุณครู...... เชื่อใจคุณครูแท้ๆ......!"
1001805-24 = "[s] \"ไม่ต้องห่วงนะ ครูจะคอยช่วยอยู่ข้างๆ ตลอด\""
1001805-25 = "จะ... จริงเหรอคะ? จะคอยอยู่ข้างๆ ตลอดที่ทำงานพาร์ทไทม์เลยเปล่าคะ?"
1001805-26 = "ถ้ามีคุณครูช่วย ฉันน่าจะอดทนได้อีกหน่อย แต่ว่า..."
1001805-27 = "งือ... ว่าแต่ถ้ามีลูกค้าน่ากลัวมาจะทำยังไงดีล่ะคะ...?"
1001805-30 = "หนูยูสึช่วยจัดขนมบนชั้นวางของที่ว่างด้านหน้าเคาน์เตอร์ได้มั้ย?"
1001805-31 = "คะ? คะ... เครื่องดื่มเหรอคะ?"
1001805-32 = "ไม่ใช่ ผมบอกว่าขนมไม่ใช่เครื่องดื่ม มีเครื่องดื่มวางอยู่เต็มตู้เย็นแล้ว..."
1001805-33 = "คะ... ค่ะ! ฉันจะเติมเครื่องดื่มให้เต็มชั้นค่ะ!"
1001805-36 = "(ถอนหายใจ) แม่หนู เป็นอะไรหรือเปล่า..."
1001805-38 = "อีกสักครู่ต่อมา"
1001805-39 = "ขอข้าวกล่องคาราอะเกะอุ่นร้อนหนึ่งกล่อง"
1001805-40 = "ฉันขอนิตยสารการ์ตูนเล่มใหม่ในเดือนนี้หนึ่งเล่ม"
1001805-41 = "คะ...ค่ะ!"
1001805-42 = "นิตยสารการ์ตูนอุ่นร้อนกับข้าวกล่องแฮมเบอร์เกอร์ได้แล้วค่ะ!"
1001805-43 = "ฉันสั่งข้าวกล่องคาราอะเกะไป..."
1001805-44 = "นิตยสารการ์ตูนมันไม่ต้องอุ่นร้อนนะ..."
1001805-45 = "อ๊ะ! ขะ... ขอโทษค่ะ! จะเปลี่ยนให้เดี๋ยวนี้ค่ะ!"
1001805-46 = "ขอโทษค่ะ ที่สั่งไป—"
1001805-50 = "(ฮือ คนเยอะเกินไป... ฉันกลัว... อยากหนีไปซะเลย...)"
1001805-51 = "(แต่คุณครูมาคอยช่วยฉันอยู่ และถ้าฉันไม่อยากเป็นภาระให้กับสมาชิกชมรมพัฒนาเกม#nจะหนีไปจากที่นี่ไม่ได้...!)"
1001805-52 = "(อดทนอีกนิด... อีกนิด...!)"
1001805-55 = "กรุณารอสักครู่นะคะ! จะเปลี่ยนให้เดี๋ยวนี้ค่ะ!"
1001805-57 = "ขะ... ขอบคุณมากนะคะ…"
1001805-58 = "[s] \"ยูสึก็ทำได้ดีมาก\""
1001805-59 = "มะ... ไม่เลยค่ะ..."
1001805-60 = "เฮ้อ... ฉันทำผิดพลาดทั้งวัน... ทำให้ลูกค้าเดือดร้อน... ฉันเป็นแค่เด็กที่ทำงานพาร์ทไทม์#nยังไม่ได้เลยค่ะ..."
1001805-61 = "[s] \"ไม่เลย ยูสึพยายามเต็มที่แล้ว\""
1001805-62 = "แต่ว่า..."
1001805-65 = "ขอบคุณมากนะ หนูยูสึ"
1001805-66 = "วันนี้เรามีลูกค้าเยอะกว่าปกติ... มีนักเรียนพาร์ทไทม์คนใหม่มามันช่วยได้มากเลย"
1001805-67 = "จะ... จริงเหรอคะ?"
1001805-68 = "แน่นอนสิ ถึงจะทำผิดพลาด แต่ก็ขอโทษและจัดการแก้ไขทันที"
1001805-69 = "ลูกค้าเองก็พอใจในท่าทางที่ใสซื่อของหนูยูสึนะ"
1001805-70 = "โล่งอกไปทีค่ะ... ฉันเองก็ช่วยได้..."
1001805-71 = "คือว่า... สุดสัปดาห์หน้าจะมีงานใหญ่หน้าร้าน"
1001805-72 = "หนูมาช่วยทำงานพาร์ทไทม์อีกได้มั้ย?"
1001805-73 = "...เฮือก! ไม่ไหวแล้วค่ะ!"

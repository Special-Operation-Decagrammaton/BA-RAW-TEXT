[translation]
1001805-1 = "A Shy Girl's Part-Time Job 1"
1001805-2 = "Game Development Department Club Room"
1001805-3 = "*sigh* I can't keep relying on the other members. This is a big problem."
1001805-4 = "[s] \"What's bothering you?\""
1001805-5 = "Oh, Sensei."
1001805-6 = "The Game Development Department is developing a new game, but we're short on development funds..."
1001805-7 = "The whole team is working part-time to help with the development costs, but I can't even go out to look for a job because I'm too afraid of people..."
1001805-8 = "I'm the president of the Game Development Department, so it's really upsetting to me that I can't be of more help."
1001805-9 = "Is there a good way for me to help the other members?"
1001805-10 = "[s] \"Do you want me to tell you about a part-time job that I know of?\""
1001805-11 = "...Huh? A p-part time job?!"
1001805-12 = "No way! I can't even talk to people that well!"
1001805-13 = "..."
1001805-14 = "I'm scared of...going out in front of people, but..."
1001805-15 = "...Yes, I can't keep running away."
1001805-16 = "If it's a part-time job that you recommend... It should be okay!"
1001805-18 = "Angel 24, Kivotos Central Branch"
1001805-19 = "The next day, at the Angel 24 Convenience Store in downtown Kivotos..."
1001805-21 = "No way..."
1001805-22 = "I did say that I would do a part-time job, but you didn't tell me it was a customer service job! I don't think I can be a convenience store clerk!"
1001805-23 = "Sensei, I trusted you... I trusted you!"
1001805-24 = "[s] \"Don't worry too much. I'll be right by your side to help you through it.\""
1001805-25 = "R-Really? Will you stay with me while I work part-time?"
1001805-26 = "I think I'll be able to bear it if you help me..."
1001805-27 = "Ugh, but what if a scary customer comes in?"
1001805-30 = "Yuzu, can you display the snacks on the empty shelf in front of the cash register?"
1001805-31 = "H-Huh? A-Are you talking about the drinks?"
1001805-32 = "No, the snacks, not the drinks. The drinks are already in the fridge..."
1001805-33 = "Y-Yes! I-I will display the drinks on the shelf!"
1001805-36 = "*sigh* Is she gonna be okay?"
1001805-38 = "Moments later..."
1001805-39 = "Please heat up one fried chicken lunch box for me."
1001805-40 = "I would like a copy of this month's new manga magazine."
1001805-41 = "Yes, yes!"
1001805-42 = "Here's your heated-up manga magazine and hamburger lunch box!"
1001805-43 = "I ordered the fried chicken lunch box..."
1001805-44 = "The manga magazine isn't supposed to be heated..."
1001805-45 = "H-Huh?! I-I'm sorry! I-I'll fix that right away!"
1001805-46 = "Hello, I would like to order—"
1001805-50 = "(Ugh, there are too many people... I'm scared... I want to run away!)"
1001805-51 = "(But Sensei is helping me out, and if I don't want to be a nuisance to the members of the Game Development Department, then I shouldn't run away!)"
1001805-52 = "(A little bit longer...just a little bit longer...)"
1001805-55 = "J-Just a minute! I-I will help you right away!"
1001805-57 = "Th-Thank you for your hard work..."
1001805-58 = "[s] \"You worked hard too.\""
1001805-59 = "N-No, that's not true..."
1001805-60 = "Ugh...I made mistakes all day...and I probably offended some customers... Just more proof I'm a loner and a mess who can't do part-time jobs..."
1001805-61 = "[s] \"That's not true. You did your best.\""
1001805-62 = "But..."
1001805-65 = "You worked hard, Yuzu."
1001805-66 = "Man, we had more customers than usual today... You don't know how helpful it was to have a new part-timer come in."
1001805-67 = "R-Really?"
1001805-68 = "I mean, you did make a lot of mistakes, but you immediately apologized and dealt with them."
1001805-69 = "The customers seemed satisfied with your sincerity."
1001805-70 = "That's a relief... I'm glad I was of some help."
1001805-71 = "On that note...there's a big event planned in front of the store next weekend."
1001805-72 = "Can you come and work part-time then?"
1001805-73 = "...Eeek! I can't do any more!"

[translation]
1001805-1 = "害羞鬼的打工（１）"
1001805-2 = "遊戲開發部．活動室"
1001805-3 = "呼……總是受部員們的照顧也不是辦法……#n……真傷腦筋。"
1001805-4 = "[s] 「有什麼煩惱嗎？」"
1001805-5 = "啊，老師。"
1001805-6 = "其，其實遊戲開發部打算要製作新的遊戲，但是開發費用不夠……"
1001805-7 = "明明大家都為了湊齊開發費用出去打工。我，我卻因為怕生，甚至沒辦法到外面找打工機會……"
1001805-8 = "明明是遊戲開發部的部長，卻什麼忙都幫不上……"
1001805-9 = "有沒有什麼能夠幫到大家的方法呢？"
1001805-10 = "[s] 「要不要幫你介紹給我認識的打工地點？」"
1001805-11 = "不，不行的！"
1001805-12 = "我，我連好好跟別人說話都做不到……！"
1001805-13 = "……"
1001805-14 = "當，當然連出現在別人面前……都還會害怕……"
1001805-15 = "……不過也對。一直逃避下去也不行。"
1001805-16 = "如果是老師介紹的打工的話……#n說不定沒問題！"
1001805-18 = "便利商店「天使24」．奇普托斯中央店"
1001805-19 = "隔天，在奇普托斯中心街的便利商店「天使24」店裡。"
1001805-21 = "我，我不行的……！"
1001805-22 = "雖然我確實是說過沒問題，但竟然偏偏是擔任超商店員迎接客人，這種事我從來沒聽說過啊……！"
1001805-23 = "我明明這麼相信老師……這麼相信你的……！"
1001805-24 = "[s] 「我會一直陪在你身邊的，放心吧。」"
1001805-25 = "真，真的嗎？在打工的時候老師會一直跟我在一起嗎……？"
1001805-26 = "這，這樣的話，或許可以努力一下也說不定……"
1001805-27 = "嗚嗚，但，但是，如果有可怕的客人來了怎麼辦呀……？"
1001805-30 = "柚子同學。可以幫忙把零食擺在收銀檯前面空的架子上嗎？"
1001805-31 = "什，什，什麼？是，是，是飲料嗎！？"
1001805-32 = "不是喔，是點心才對。飲料已經放在冷藏櫃裡了……"
1001805-33 = "是，是！我，我去把飲料上架排好！"
1001805-36 = "……呃，那孩子沒問題嗎……"
1001805-38 = "幾分鐘後……"
1001805-39 = "啊，那個炸雞便當麻煩幫我加熱。"
1001805-40 = "麻煩給我這個月新出的漫畫雜誌一本。"
1001805-41 = "是，是！"
1001805-42 = "加熱的漫畫雜誌和漢堡肉便當好了！"
1001805-43 = "我的是炸雞便當才對吧……"
1001805-44 = "呃，漫畫雜誌不用加熱沒關係……"
1001805-45 = "咦，啊哇哇！？對，對不起！我，我馬上更換……！"
1001805-46 = "不好意思，麻煩幫我結帳。"
1001805-50 = "（嗚嗚，人也太多了……好可怕……好想逃……）"
1001805-51 = "（但，但是現在老師在我身邊陪我……為了不給遊戲開發部的大家添麻煩，不能逃……！）"
1001805-52 = "（再努力一下，再努力一下……！）"
1001805-55 = "請，請稍等一下！我馬上過來！"
1001805-57 = "辛，辛苦了……"
1001805-58 = "[s] 「柚子，辛苦你了。」"
1001805-59 = "啊，是，那個……"
1001805-60 = "嗚嗚……我一整天都在犯錯……也給客人添了很多麻煩……果然我就是個連打工都做不好，一個人就什麼都辦不到的人……"
1001805-61 = "[s] 「沒有那種事喔，柚子也很努力了。」"
1001805-62 = "可是……"
1001805-65 = "辛苦了，柚子同學。"
1001805-66 = "哎呀，今天客人比平常還多呢……這種時候能有新人來真是幫大忙了。"
1001805-67 = "真，真的嗎……？"
1001805-68 = "當然囉，雖然有出點錯，但你也馬上道歉處理好了嘛。"
1001805-69 = "客人們也會感受到柚子同學認真的態度吧。"
1001805-70 = "太，太好了……這樣的我竟然也能幫上忙……"
1001805-71 = "還有，其實下週的週末，在店門口有個大型活動要舉行。"
1001805-72 = "那時候也麻煩你可以嗎？"
1001805-73 = "……噫，那個……！我無法負荷更多了！"

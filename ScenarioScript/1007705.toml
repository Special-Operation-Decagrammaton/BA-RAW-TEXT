[translation]
1007705-1 = "One Promise"
1007705-2 = "Around dusk, I went to the convenience store near the alley for a drink."
1007705-6 = "That was where I found Ichika piling up boxes in one corner of a playground."
1007705-7 = "...Huh?"
1007705-8 = "Sensei! What are you doing out this late?"
1007705-9 = "Ah, you were thirsty, huh?"
1007705-10 = "I guess that means you're working late."
1007705-11 = "I'm sorry to hear that. You really work a lot, don't you?"
1007705-12 = "Well, you're in good company. I'm working too. Let me know if you need any help!"
1007705-13 = "What about me?"
1007705-14 = "Oh, I'm out late because I'm gathering stuff for the flea market, and I had a few more boxes to deal with..."
1007705-15 = "[s1] \"Y-You're bringing all of these?\"\n[s2] \"That's a ton! I thought you were moving.\""
1007705-18 = "Hahaha! Yeah, I get that a lot..."
1007705-19 = "I like to try a lot of different things, which means I accumulate a lot of stuff. Periodically, I sort through and sell the things I haven't been using."
1007705-20 = "Most people use what they buy for a long time. But that's not really how I work."
1007705-21 = "Whenever I discover a new hobby, I suddenly get really excited and learn everything about it. But then one day, just as suddenly, I lose interest."
1007705-22 = "And well..."
1007705-23 = "It means that a lot of my stuff is hardly used at all. And since they're in such good condition, they sell pretty quickly."
1007705-27 = "Check out this app. This is what I use to sell on the flea market. Take a look at the number of safe transactions..."
1007705-28 = "[s3] \"Whoa, your rating is at Platinum!\"\n[s4] \"This is practically a specialty store!\""
1007705-31 = "And it's not just Trinity students who buy from me. I sell to Millennium, Hyakkiyako...everybody!"
1007705-32 = "I really enjoy negotiating deals, and it's really satisfying to see people enjoy what they buy from me when they've gotten a good deal."
1007705-33 = "Isn't it great? If it weren't for this app, I wouldn't have been able to sell half the things I did. They would have ended up in the trash."
1007705-34 = "Huh?"
1007705-35 = "Ah. The guitar?"
1007705-36 = "...Ah."
1007705-37 = "No, I haven't sold that."
1007705-38 = "I'm not ready to let it go yet. It got me compliments from Sensei..."
1007705-39 = "But I suppose I might be willing to sell if I met someone who really needs it."
1007705-43 = "Mph. I said too much again, didn't I?"
1007705-44 = "[s5] \"No, it's good to be honest.\"\n[s6] \"Ichika, you can share as much as you're comfortable sharing.\""
1007705-47 = "*sigh*"
1007705-48 = "There you go again. Do you always say things like that?"
1007705-49 = "\"Whatever you're comfortable with.\" \"Whatever you want.\" \"You're so talented.\" I mean, you're SO supportive!"
1007705-50 = "..."
1007705-51 = "Are you this kind to all the students? You must be."
1007705-52 = "You do nice things for them, say nice things to them, help them be successful..."
1007705-53 = "And if anyone tries to return the favor, you dismiss it with some excuse about being a good teacher."
1007705-54 = "Um..."
1007705-55 = "Hmmm...!"
1007705-56 = "[s7] \"Ichika?\"\n[s8] \"What's that look for...?\""
1007705-59 = "No, this won't do. I don't like it."
1007705-60 = "If I keep letting you take care of things for me, eventually you'll give too much, and it will ruin our relationship."
1007705-61 = "I need to repay your kindness, Sensei, or I'll always feel like I owe you."
1007705-62 = "We need to promise each other something."
1007705-63 = "The promise is..."
1007705-64 = "...not big. It's nothing serious. I wouldn't burden you like that, Sensei. You've done enough already..."
1007705-65 = "Just promise me that if you run into any problem—no matter how small or annoying it is—you'll let me know."
1007705-66 = "Like that scuffle between students earlier or when you're trying to get a good deal on a purchase..."
1007705-67 = "What I'm saying is that I'm good with people, and I want to help. So please, let me help."
1007705-68 = "You have to be okay with that, okay. That's how it has to be."
1007705-69 = "[s9] \"Doesn't my opinion count for something?!\"\n[s10] \"Thanks. I know I can always count on you.\""
1007705-72 = "...Heehee!"
1007705-73 = "I look forward to the day you need my help."
1007705-75 = "Then Ichika and I parted ways. She headed to the flea market, and I went to the convenience store."
1007705-76 = "I came back after I bought a drink, but the park was empty."

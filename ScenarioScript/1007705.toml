1007705-48 = "4;이치카;08;또 그러신다, 또. 자꾸 그런 고정 패턴 쓰실 거예요?"
1007705-49 = "4;이치카;03;항상 \"네가 편한 쪽이 좋아~.\", \"괜찮아~.\", \"원하는 대로 하는 게 나도 편해~.\"…….\n#4;em;[반응]"

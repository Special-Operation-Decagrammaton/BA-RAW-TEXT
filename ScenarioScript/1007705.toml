1007705-51 = "4;이치카;01;생각해 보면 다른 학생들에게도 늘 이런 식이시겠죠?"
1007705-52 = "4;이치카;99;뭔가 해주시고, 좋은 말 들려주시고, 알아서 잘할 수 있게 은근슬쩍 지원해 주시고…….\n#4;em;…"
1007705-53 = "4;이치카;99;누가 뭐라도 갚으려고 하면 '선생님이니까' 같은 말이나 하면서 넘기시고……."
1007705-54 = "4;이치카;07;음……."
1007705-55 = "4;이치카;05;으으으음~!!\n#4;em;[!]\n#4;stiff"
1007705-56 = "[s7] \"……? 저기, 이치카 씨?\"\n[s8] \"왜 갑자기 그런 얼굴을…….\""

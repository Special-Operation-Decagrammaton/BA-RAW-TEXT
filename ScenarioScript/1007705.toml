[translation]
1007705-1 = "#title;한 가지 약속을 하도록 하죠"
1007705-2 = "#na;(저녁 즈음, 잠시 마실 거리를 사기 위해 골목 편의점으로 향하던 길이었다.)"
1007705-3 = "#st;[0,0];instant;1;"
1007705-4 = "#clearST"
1007705-5 = "4;이치카;01\n#4;a\n#wait;1500"
1007705-6 = "#na;(놀이터 한쪽 구석에 다양한 사이즈의 박스를 쌓아 둔 이치카와 마주쳤다.)"
1007705-7 = "4;이치카;02;……어?"
1007705-8 = "4;이치카;03;선생님! 선생님 아니십니까~. 이런 시간에 여긴 무슨 일로?\n#4;m3\n#4;em;[재잘]"
1007705-9 = "4;이치카;02;아아. 마실 거 사러 나오셨다고요?"
1007705-10 = "4;이치카;16;그 이야기는 오늘도 저녁에 계속하실 게 있으시단 뜻이…….\n#4;em;…"
1007705-11 = "4;이치카;04;……하……. 선생님도 참 고생이 많으시네요. 안타깝다.\n#4;stiff"
1007705-12 = "4;이치카;03;뭐, 지금 당장은 저도 힘들지만, 나중에 필요한 거 있으면 언제든 연락해 주십쇼!\n#4;em;[음표]"
1007705-13 = "4;이치카;02;……네? 저요?"
1007705-14 = "4;이치카;02;저야말로 이런 시간에 여기서 뭐 하고 있냐고요? 뭐, 보시다시피 프리마켓에 가지고 가려고 물건들을 좀 정리 중이었는데요…….\n#4;em;[?]"
1007705-15 = "[s1] \"이, 이 많은 박스들이 전부……?\"\n[s2] \"엄청난 양이네. 이사라도 가는 줄 알았어.\""
1007705-16 = "#wait;100"
1007705-17 = "#wait;100"
1007705-18 = "4;이치카;04;하하. 곧잘 듣는 이야기긴 한데…….\n#4;em;[땀]"
1007705-19 = "4;이치카;01;뭐, 평소 이것저것 건드려 보는 게 많다 보니, 반대로 방치한 지 좀 돼서 파는 것도 많아지는 것뿐이죠."
1007705-20 = "4;이치카;03;보통은 뭔가 하나 사면 조금 진득하게 오래 하던데, 저는 그게 잘 안돼서요."
1007705-21 = "4;이치카;99;천성이 이래서 그런지, 뭐든 좀 하려다 보면 의욕이 빠진달까. 흥미가 떨어진달까.\n#4;em;…"
1007705-22 = "4;이치카;01;하지만 뭐~."
1007705-23 = "4;이치카;03;반대로 말하면, 그만큼 파는 것들도 다 몇 번 안 쓴 새것들이니까요! 보존 상태가 좋으니 금방금방 나가거든요.\n#4;em;[재잘]"
1007705-24 = "#st;[0,0];instant;1;"
1007705-25 = "#clearST"
1007705-26 = "4;이치카;01\n#4;greeting\n#wait;1500"
1007705-27 = "4;이치카;02;이 어플 보이시죠? 요즘 프리마켓 어플은 보통 이걸로 쓰는데, 보시면 안심 거래 횟수가…….\n#4;em;[반응]"
1007705-28 = "[s3] \"우와, 플래티넘 등급이네.\"\n[s4] \"전문 가게 수준이잖아……!\""
1007705-29 = "#wait;100"
1007705-30 = "#wait;100"
1007705-31 = "4;이치카;01;트리니티가 아닌 곳에서도 곧잘 사 가거든요. 밀레니엄이라든가, 백귀야행이라든가…….\n#4;em;[음표]"
1007705-32 = "4;이치카;99;나름대로 이런저런 사람들 만나서 물건 흥정하는 것도 재미있고, 싼값에 제공하고 나서 좋아하는 사람들 보면 좋기도 하고."
1007705-33 = "4;이치카;03;참 다행이지 않슴까. 이 어플 없었으면 전부 처치 곤란으로 가지고 있다가 버려야 했을지도 모르는데."
1007705-34 = "4;이치카;01;……음?"
1007705-35 = "4;이치카;02;아. 기타요……?\n#4;em;[반응]"
1007705-36 = "4;이치카;02;……아."
1007705-37 = "4;이치카;01;아뇨, 뭐. 그건 아직 팔지는 않았슴다만.\n#4;em;…"
1007705-38 = "4;이치카;99;나름 선생님께 칭찬도 듣게 해 준 물건이고……."
1007705-39 = "4;이치카;03;그런데 또 모르죠. 당장 내일쯤 누가 필요해 보이면 팔거나 줘 버릴지도? 하하.\n#4;em;[재잘]"

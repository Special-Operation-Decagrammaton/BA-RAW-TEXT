[translation]
1007705-1 = "สัญญากันเรื่องหนึ่งนะคะ"
1007705-2 = "(คุณครูเดินไปที่ร้านสะดวกซื้อเพื่อซื้อเครื่องดื่มในช่วงเย็น)"
1007705-6 = "(และเห็นอิจิกะที่กำลังง่วนอยู่กับกล่องขนาดต่างๆ มากมายในมุมหนึ่งของสนามเด็กเล่น)"
1007705-7 = "...หืม?"
1007705-8 = "คุณครู! คุณครูนี่นา~ มาทำธุระอะไรที่นี่ในเวลานี้เหรอคะ?"
1007705-9 = "อ้อ มาซื้ออะไรไปดื่มงั้นเหรอคะ?"
1007705-10 = "ทำไมฟังแล้วรู้สึกว่าจะซื้อแล้วกลับไปทำงานต่อเลย..."
1007705-11 = "เฮ้อ... คุณครูก็คงเหนื่อยกับงานมากเลยนะคะเนี่ย น่าเห็นใจจัง"
1007705-12 = "อืม ตอนนี้ฉันก็กำลังยุ่งๆ อยู่ แต่ไว้หลังจากนี้ถ้าคุณครูต้องการให้ช่วยอะไรก็ติดต่อฉันได้เลยนะคะ!"
1007705-13 = "...คะ? ฉันเหรอคะ?"
1007705-14 = "ฉันมาทำอะไรที่นี่ในเวลานี้น่ะเหรอ? ก็อย่างที่เห็นค่ะ กำลังจัดของจะเอาไปขายที่ตลาดของมือสอง..."
1007705-15 = "[s1] \"อะ... เอากล่องพวกนี้ไปทั้งหมดเหรอ...?\"\n[s2] \"ของเยอะมากเลย ครูนึกว่าย้ายบ้านซะอีกนะเนี่ย\""
1007705-18 = "ฮ่าๆ ฉันได้ยินคำพูดแบบนี้บ่อยเลยละค่ะ"
1007705-19 = "ปกติฉันชอบไปได้ของนู่นนี่มา แต่ว่าก็ไม่ได้ใช้และปล่อยทิ้งไว้นานแล้ว ก็เลยมีของที่จะขายเยอะแบบนี้#nแหละค่ะ"
1007705-20 = "ปกติเวลาซื้ออะไรมาคนอื่นจะใช้ไปนานๆ แต่ว่าฉันทำไม่ได้ค่ะ"
1007705-21 = "ไม่รู้ว่าเป็นเพราะนิสัยโดยธรรมชาติหรือเปล่า เวลาที่รู้สึกสนใจจะทำอะไรก็จะรู้สึกตื่นเต้นและเรียนรู้มัน#nอย่างเต็มที่ แต่พอวันหนึ่งก็จะรู้สึกเบื่อ และหมดความสนใจไป"
1007705-22 = "แต่ก็เอาเถอะค่ะ~"
1007705-23 = "ถ้ามองอีกมุมหนึ่ง ของที่จะขายไปก็เป็นของใหม่ที่ได้มาแล้วใช้ไปไม่กี่ครั้งเอง! สภาพของก็ยังดีอยู่ ก็เลยขายออกได้เร็วด้วยนะคะ"
1007705-27 = "เห็นแอปนี้มั้ยคะ? เดี๋ยวนี้แอปตลาดของมือสองมีฟังก์ชันแบบนี้ด้วยค่ะ ถ้าดูตรงนี้จะเห็นจำนวนครั้ง#nการขายที่เชื่อถือได้..."
1007705-28 = "[s3] \"โห อยู่ระดับแพลตินัมเลยแฮะ\"\n[s4] \"เป็นร้านแนะนำในแอปเลยนะเนี่ย...!\""
1007705-31 = "ฉันมีลูกค้าจากโรงเรียนอื่นนอกจากทรีนิตี้ด้วยค่ะ เด็กมิลเลเนียมกับเฮียกคิยาโคก็มาซื้อ..."
1007705-32 = "ฉันสนุกเวลาได้เจอและพูดคุยต่อราคากับผู้คนค่ะ เวลาขายในราคาถูกๆ แล้วลูกค้าดีใจฉันก็มีความสุข#nไปด้วยเหมือนกัน"
1007705-33 = "สะดวกสุดๆ ไปเลยว่ามั้ยคะ? ถ้าไม่มีแอปนี้ ฉันคงต้องเก็บของพวกนี้ไว้แล้วรอเอาไปทิ้งในสักวันก็ได้ค่ะ"
1007705-34 = "...หืม?"
1007705-35 = "อ่า กีตาร์เหรอคะ...?"
1007705-36 = "...อ๊ะ"
1007705-37 = "ไม่ค่ะ อันนั้นฉันยังไม่ได้ขายค่ะ"
1007705-38 = "มันเป็นของที่ทำให้ฉันได้คำชมจากคุณครูเลยนะ..."
1007705-39 = "แต่ฉันก็ไม่รู้อนาคตหรอกค่ะ ถ้าพรุ่งนี้มีใครอยากได้ขึ้นมา ฉันอาจจะขายหรือให้ไปเลยก็ได้? แหะๆ"
1007705-43 = "นี่ฉันพูดตรงเกินไปหรือเปล่าคะ?"
1007705-44 = "[s5] \"ไม่หรอก พูดตรงๆ ดีแล้วละ\"\n[s6] \"เอาแบบที่อิจิกะสบายใจดีที่สุด\""
1007705-47 = "...ฮู่ว"
1007705-48 = "พูดแบบนี้อีกแล้ว เอาแต่พูดอะไรให้ใจฟูตลอดเลยนะคะ"
1007705-49 = "ทั้ง \"เอาแบบที่สบายใจดีกว่า~\" ไม่ก็ \"ไม่เป็นไรนะ~\" หรือว่า \"ทำอย่างที่อยากทำเถอะ แบบนี้ครูก็#nสบายใจเหมือนกัน~\"..."
1007705-50 = "......"
1007705-51 = "พอมาคิดๆ ดูแล้ว คุณครูคงเป็นอย่างนี้กับนักเรียนทุกคนใช่มั้ยคะ?"
1007705-52 = "คงเป็นคนที่เข้าไปช่วยทำเรื่องต่างๆ แล้วก็พูดดีๆ ด้วย แล้วก็แอบทำให้คิดได้เองว่าตัวเองทำได้ดีแล้ว ..."
1007705-53 = "และถ้าใครจะตอบแทนอะไร ก็จะบอกแค่ว่า 'ก็ครูเป็นครูนี่นา' แล้วปล่อยผ่านไป..."
1007705-54 = "อืม..."
1007705-55 = "อืมมมม~!!"
1007705-56 = "[s7] \"...? นี่ คุณอิจิกะ?\"\n[s8] \"ทำไมจู่ๆ ถึงทำหน้าแบบนั้น...\""
1007705-59 = "ไม่ได้ละ ไม่ได้จริงๆ ด้วยค่ะ แบบนี้ฉันไม่ชอบค่ะ"
1007705-60 = "ถ้าเป็นอย่างที่คุณครูพูดมาตลอด เรื่องก็คงจบที่คุณครูได้รับอะไรมานิดหน่อยแบบงงๆ ใช่มั้ยคะ?"
1007705-61 = "คุณครูเองก็ต้องได้รับอะไรดีๆ บ้างสิคะ! ฉันจะได้ไม่รู้สึกลำบากใจ"
1007705-62 = "มาสัญญากันเรื่องหนึ่งนะคะ"
1007705-63 = "สัญญาอะไรน่ะเหรอคะ?"
1007705-64 = "ก็... ถ้าเป็นอะไรที่ยิ่งใหญ่ เดี๋ยวคุณครูจะลำบากใจเอา ฉันก็แค่อยากให้..."
1007705-65 = "เวลาที่คุณครูเจอ 'เรื่องหยุมหยิมน่าลำบากใจ' อะไรพวกนั้น ฉันอยากให้คุณครูติดต่อมาหาฉันค่ะ"
1007705-66 = "อย่างเช่นเรื่องนักเรียนทะเลาะกันอย่างที่เจอคราวก่อน หรือว่าเรื่องที่ต้องเข้าไปไกล่เกลี่ยก็ได้..."
1007705-67 = "เพราะนั่นเป็นเรื่องที่ฉันมั่นใจว่าทำได้ดีน่ะค่ะ เรื่องจัดการผู้คนน่ะ"
1007705-68 = "พอจะสัญญากันได้อยู่เนอะ? งั้นเอาตามนี้นะคะ!"
1007705-69 = "[s9] \"ไม่รอคำตอบหน่อยเรอะ...?!\"\n[s10] \"ขอบใจนะ อุ่นใจขึ้นเยอะเลย\""
1007705-72 = "...ฮุฮุ"
1007705-73 = "งั้นฉันจะรอวันนั้นนะคะ~"
1007705-75 = "(หลังจากบอกลาอิจิกะที่กำลังจะไปตลาดของมือสอง คุณครูก็ไปยังร้านสะดวกซื้อ)"
1007705-76 = "(เมื่อซื้อเครื่องดื่มกลับมา สวนสาธารณะก็ไม่มีใครอยู่แล้ว)"

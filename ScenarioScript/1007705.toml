1007705-59 = "4;이치카;05;아니. 역시 안 되겠네요. 이대로는 맘에 들지 않아요.\n#3;em;[속상함]"
1007705-60 = "4;이치카;08;이렇게 쭉 선생님이 말씀하시는 페이스만 따라가다 보면, 또 얼떨결에 이것저것 받은 뒤에 그걸로 끝! 이겠죠?"
1007705-61 = "4;이치카;08;선생님도 받으시는 게 있어야 함다! 그래야 저도 괜한 부담을 가지지 않을 수 있거든요.\n#4;em;[!]\n#4;jump"
1007705-62 = "4;이치카;05;여기서는 한 가지 약속을 하도록 하죠."
1007705-63 = "4;이치카;02;무슨 약속이냐고요?"
1007705-64 = "4;이치카;05;뭐, 거창한 건 해 봐야 선생님께서도 부담이실 테니까, 그런 건 아니고……."
1007705-65 = "4;이치카;01;선생님께 뭐든 '사소하고 귀찮은 곤란함'이 생기면, 저에게 연락해 주시는 것으로.\n#4;em;[반응]"
1007705-66 = "4;이치카;01;뭐, 저번에 봤던 사소한 학생들 싸움이나, 아니면 뭐 사실 때 흥정거리라도 좋고……."
1007705-67 = "4;이치카;07;나름 자신있는 부분들이니까요. 사람 대하는 거."
1007705-68 = "4;이치카;03;괜찮죠? 이 정도는. 네! 아무튼 그런 걸로 하고 확정!\n#4;em;[재잘]"
1007705-69 = "[s9] \"내 의사는……?!\"\n[s10] \"고마워. 든든하네.\""

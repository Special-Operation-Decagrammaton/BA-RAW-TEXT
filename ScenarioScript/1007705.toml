[translation]
1007705-1 = "答應我一件事"
1007705-2 = "（傍晚時分，準備到巷子裡的便利商店買飲料的路上……）"
1007705-6 = "（遇到了在公園角落堆放各種尺寸箱子的一花）"
1007705-7 = "……嗯？"
1007705-8 = "老師！這不是老師嗎～這個時間來這裡有什麼事嗎？"
1007705-9 = "啊啊，是來買喝的嗎？"
1007705-10 = "意思是說今天晚上還有工作要做……"
1007705-11 = "唉……老師真辛苦呢。"
1007705-12 = "嗯，雖然今天可能有點困難，不過如果以後有需要請隨時聯絡我！"
1007705-13 = "……嗯？我嗎？"
1007705-14 = "問我在這裡做什麼？#n嗯，如老師所見，我正在整理要拿到跳蚤市場賣的物品……"
1007705-15 = "[s1]「這，這麼多箱子全部都是……？」\n[s2]「量真多呢，還以為你要搬家呢。」"
1007705-18 = "哈哈，很常聽人家這麼說……"
1007705-19 = "因為我很常在嘗試新東西之後沒多久就失去興趣，所以要賣的東西也變得很多。"
1007705-20 = "一般人買了新東西之後就會著迷一段時間，但我卻沒辦法。"
1007705-21 = "可能是天性使然吧……不管做什麼都是三分鐘熱度，很快就沒興趣了。"
1007705-22 = "但是，嗯～"
1007705-23 = "反過來說也因為東西都沒用過幾次，所以保存狀態很好，馬上就會賣出去了。"
1007705-27 = "有看到這個App嗎？#n最近我通常都用這個跳蚤市場App，你看我的評價次數……"
1007705-28 = "[s3]「哇，是白金級！？」\n[s4]「已經是專賣店的水準了吧……！」"
1007705-31 = "不只是三一，我也很常把東西賣到千年或百鬼夜行之類的地方……"
1007705-32 = "不僅能遇見各式各樣的人，跟他們議價也很有趣……#n看到有人喜歡我用便宜價格賣出的東西也讓人很開心。"
1007705-33 = "真是太幸運了。#n如果沒有這個App的話，我可能會因為東西不好處理而全部丟掉呢。"
1007705-34 = "……嗯？"
1007705-35 = "啊，吉他是嗎……？"
1007705-36 = "……啊。"
1007705-37 = "沒有，那個沒有拿去賣。"
1007705-38 = "畢竟那把吉他曾讓我得到老師的稱讚……"
1007705-39 = "不過這也很難說。#n如果突然看到有人需要，說不定明天就會賣出去或送人了呢～哈哈。"
1007705-43 = "我剛才是不是有點……回答得太老實了？"
1007705-44 = "[s5]「不會，老實是件好事。」\n[s6]「重要的是一花覺得怎麼做心裡會比較舒服。」"
1007705-47 = "……呼。"
1007705-48 = "老師又來了。#n每次都是固定的套路嗎？"
1007705-49 = "老師總是說「你方便就好～」、「沒關係～」、「照你想做的去做就行了～」……"
1007705-50 = "…………"
1007705-51 = "我想老師應該也是這樣對其他學生的吧？"
1007705-52 = "為學生盡一份力、說好聽話給學生聽、暗中支援學生，讓他們能自己把事情做好……"
1007705-53 = "如果有人想回報，你就會說「這是老師該做的」……"
1007705-54 = "嗯……"
1007705-55 = "嗯～～～！！"
1007705-56 = "[s7]「……那個，一花？」\n[s8]「為什麼突然擺出那種表情……？」"
1007705-59 = "不，這樣不行，我果然不喜歡這樣。"
1007705-60 = "如果總是被老師牽著鼻子走，我肯定只會一味地接受老師的好意！沒錯吧？"
1007705-61 = "老師也應該要得到回報才對！#n這樣我才不會感到不必要的壓力。"
1007705-62 = "請老師答應我一件事。"
1007705-63 = "問我是什麼事？"
1007705-64 = "如果太超過反而會讓老師有壓力吧……我不希望那樣。"
1007705-65 = "在老師遇到「瑣碎的小麻煩」的時候，麻煩請立刻跟我聯絡。"
1007705-66 = "比如之前看到的那種學生間的糾紛，或者買東西需要殺價之類的……"
1007705-67 = "我在待人處世方面還挺有自信的。"
1007705-68 = "這樣可以吧？#n嗯！那就約好囉！"
1007705-69 = "[s9]「無視我的意願嗎……！？」\n[s10]「謝謝你，一花真可靠呢。」"
1007705-72 = "……呵呵。"
1007705-73 = "那我就等你聯絡囉～"
1007705-75 = "（之後便和打算前往跳蚤市場的一花告別，繼續前往便利商店）"
1007705-76 = "（買完飲料回來時，公園已經整理得一乾二淨）"

10015030-52 = "#wait;10"
10015030-53 = "3;스미레;07;물론이지요, 트레이너.\n#3;greeting"
10015030-54 = "1;노아;03\n3;스미레;07;내일은 <황륜대제>의 개최일…… 그것도 밀레니엄이 주최하는 대운동회가 열리는 날이니까요!\n#3;em;[!]\n#3;m3\n#1;dl"
10015030-55 = "3;스미레;08;평소에는 스포츠에 관심이 없는 밀레니엄의 학생들이라 하더라도 이날만큼은 회장의 선수들이 자아내는 각본 없는 드라마에서 눈을 떼지 못하겠지요."
10015030-56 = "3;스미레;09;회장에 울려 퍼지는 관중의 함성……\n#3;m4"
10015030-57 = "3;스미레;10;땀을 흩날리며 코트 위에서 뜨겁게 맞부딪치는 선수들……\n#3;hophop\n#3;m2"
10015030-58 = "#all;hide"
10015030-59 = "3;스미레;05;그 말인 즉 밀레니엄의 학생들에게 스포츠의 매력을 전파할 수 있는 절호의 기회라는 뜻입니다!\n#3;closeup\n#fontsize;80"
10015030-60 = "[s] \"아, 알았으니까 진정해…….\""
10015030-61 = "3;스미레;06;아, 저도 모르게…… 실례했습니다.\n#3;em;[땀]"
10015030-62 = "3;스미레;02;여하튼. 그래서 오늘은 보시는 것처럼, 내일의 경기를 대비해 다른 학생들과 어울려 개운히 땀을 흘리던 중이었습니다만……\n#3;m5"

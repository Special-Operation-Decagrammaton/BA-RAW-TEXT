[translation]
10015030-1 = "ตอนที่3;เทรนเนอร์แห่งมิลเลเนียม"
10015030-5 = "อาคารย่อยฝั่งตะวันตกของมิลเลเนียม"
10015030-6 = "(ระหว่างที่แวะเวียนไปที่ชมรมต่างๆ ของโรงเรียนมิลเลเนียมเพื่อขอให้ช่วยงานมหกรรมแข่งขันกีฬา...)"
10015030-7 = "ไหนดูซิ... ชมรมวิศวกรรมจะช่วยซ่อมอุปกรณ์ที่เสียหายให้ ส่วนเรื่องงานประมวลข้อมูลก็คงไม่มีอะไร#nต้องกังวลแล้ว..."
10015030-8 = "ตอนนี้ก็เหลือแค่เช็กสภาพร่างกายนักกีฬาแล้วก็จัดการเรื่องรายชื่อนักกีฬาที่เข้าร่วมการแข่งขันค่ะ"
10015030-9 = "[s] \"เช็กสภาพร่างกายงั้นเหรอ?\""
10015030-10 = "ใช่ค่ะ เซมิน่ามีหน้าที่ตรวจเช็กสภาพร่างกายของนักกีฬา เพื่อที่นักกีฬาจะได้ลงแข่งด้วยสภาพร่างกาย#nที่พร้อมที่สุดค่ะ"
10015030-11 = "แต่ว่าทั้งตัวฉันและสมาชิกของเซมิน่าคนอื่นๆ ก็ไม่คุ้นเคยกับหน้าที่นี้เท่าไรน่ะค่ะ เรื่องเช็กสภาพ#nร่างกายก็เลยไปขอความช่วยเหลือจาก <ชมรมออกกำลังกาย> ที่เชี่ยวชาญเรื่องการดูแลร่างกายค่ะ"
10015030-12 = "...จะว่าไปแล้วตอนนี้สมาชิกชมรมออกกำลังกายน่าจะกำลังฝึกซ้อมครั้งสุดท้ายเพื่อเตรียมตัวลงแข่งอยู่#nนะคะ"
10015030-16 = "เราแวะไปให้กำลังใจเหล่านักกีฬาที่ฟิตเนสเซ็นเตอร์ก่อนจะไปที่สนามกีฬาดีมั้ยคะ?"
10015030-23 = "ฟิตเนสเซ็นเตอร์ มิลเลเนียม"
10015030-24 = "ยื่นสะโพกออกมาด้านหลัง หัวเข่าเสมอกับปลายเท้า!"
10015030-25 = "ต่อไปสควอทเพิ่มอีก 2 เซ็ต!"
10015030-26 = "ดะ...เดี๋ยวก่อนสิคะ หัวหน้าสึมิเระ! ไหนเมื่อกี๊บอกว่าเซ็ตสุดท้ายแล้วไงคะ?"
10015030-27 = "ใช่! จะว่าไปก็บอกว่าเซ็ตสุดท้ายตั้งแต่เซ็ตก่อนหน้านี้แล้วด้วย!"
10015030-28 = "การสควอทหลังจะช่วยพัฒนากล้ามเนื้อทุกส่วน เป็นการออกกำลังกายโดยใช้บาร์เบลเพื่อเพิ่มความตึง#nให้กล้ามเนื้อ..."
10015030-29 = "ฉันเตรียมบาร์เบลน้ำหนักเบาไว้สำหรับมือใหม่อย่างทุกคนแล้ว แต่การออกกำลังกายซ้ำๆ ก็เป็นสิ่งที่#nจำเป็นต่อการกระตุ้นกล้ามเนื้อทั้งหมดอย่างถูกวิธีค่ะ"
10015030-30 = "ถ้าอยากจะทำผลงานดีๆ ในการแข่งกีฬา ทุกคนต้องไม่ยอมแพ้ แล้วมาพยายามให้ถึงที่สุดกันเถอะค่ะ!"
10015030-32 = "ถ้าต้องฝึกอย่างโหดร้ายแบบนี้ต่อไป..."
10015030-33 = "ฉันคงจะกลายเป็นผักต้มก่อนที่จะได้ลงแข่งกีฬาอะไรนั่นอีกน่ะ..."
10015030-38 = "อ๊ะ? เวลาผ่านมาขนาดนี้แล้วเหรอคะเนี่ย"
10015030-39 = "ถ้าอย่างนั้น... พักกันสักครู่แล้วค่อยกลับมาออกกำลังกายกันต่อเถอะค่ะ"
10015030-45 = "ฮุฮุ คุณสึมิเระนี่เข้มงวดกับการออกกำลังกายจริงๆ เลยนะคะ"
10015030-46 = "อ๊ะ? คุณโนอา... แล้วก็เทรนเนอร์?"
10015030-47 = "มาทำอะไรที่ฟิตเนสเซ็นเตอร์ในเวลาแบบนี้กันเหรอคะ?"
10015030-48 = "พอดีพวกเรากำลังเดินไปรอบๆ โรงเรียนเพื่อตรวจสอบการเตรียมการขั้นสุดท้ายของงานวันพรุ่งนี้ ก็เลยแวะมาให้กำลังใจชมรมออกกำลังกายทุกคนด้วยค่ะ"
10015030-49 = "ซ้อมกันหนักจนถึงดึกดื่นแบบนี้ ลำบากแย่เลยนะคะ"
10015030-50 = "[s1] \"ไม่เจอกันนาน แต่ก็ยังเต็มที่เหมือนเดิมเลยนะ สึมิเระ\"\n[s2] \"สึมิเระดูกระตือรือร้นกว่าตอนปกติอีกนะ\""
10015030-53 = "แน่นอนอยู่แล้วค่ะเทรนเนอร์"
10015030-54 = "ก็เพราะพรุ่งนี้จะมีงาน <ฮาโลเฟสติวัล>... ที่สำคัญงานมหกรรมแข่งขันกีฬาครั้งนี้มิลเลเนียมยังเป็น#nเจ้าภาพอีกด้วยค่ะ!"
10015030-55 = "ถึงจะเป็นนักเรียนที่ปกติแล้วจะไม่ค่อยชอบเล่นกีฬา แต่ในวันแบบนี้ก็คงไม่สามารถละสายตาไปจาก#nละครที่ไม่อาจคาดเดาตอนจบของเหล่านักกีฬาในสนามได้หรอกค่ะ"
10015030-56 = "เสียงเชียร์ของผู้ชมที่ดังก้องในสนาม..."
10015030-57 = "เหล่านักกีฬาแข่งขันกันจนเหงื่อท่วมตัว..."
10015030-59 = "ก็หมายความว่านี่เป็นโอกาสดีที่จะเผยเสน่ห์ของกีฬาให้กับนักเรียนมิลเลเนียมค่ะ!"
10015030-60 = "[s] \"อ่า เข้าใจแล้ว ใจเย็นๆ ก่อนนะ...\""
10015030-61 = "อ๊ะ ฉันไม่รู้ตัวเลย... ขอโทษที่เสียมารยาทค่ะ"
10015030-62 = "ก็อย่างที่ได้เห็นน่ะค่ะ ว่าพวกนักเรียนกำลังฝึกกันอย่างหนักเพื่อเตรียมพร้อมสำหรับการแข่งขันในวัน#nพรุ่งนี้..."
10015030-68 = "เอ๊ะ? เมื่อกี๊ยังสควอทด้วยกันอยู่เลย ทุกคนไปไหนกันหมดแล้วคะเนี่ย?"
10015030-69 = "ดูท่าจะขอตัวไปพักเพื่อเตรียมพร้อมร่างกายสำหรับวันพรุ่งนี้นะคะ"
10015030-70 = "ถึงจะยังไม่ใช่เวลาเข้านอน แต่นี่ก็ดึกมากแล้วนะคะ"
10015030-71 = "คะ? เราเพิ่งยืดเส้นยืดสายกันไปเบาๆ แล้วก็สควอทนิดเดียวเองนะคะ?"
10015030-72 = "สำหรับคนที่เพิ่งเริ่มต้นจำเป็นจะต้องฝึกให้ครบรูปแบบเพื่อให้กล้ามเนื้อปรับตัว และสร้างกล้ามเนื้อส่วน#nต่างๆ รวมถึงการพัฒนาระบบหัวใจและหลอดเลือด..."
10015030-73 = "แถมยังเพิ่งจะได้เครื่องออกกำลังกายมาใหม่ ฉันเลยตั้งใจจะแนะนำวิธีออกกำลังกายแบบใหม่แท้ๆ..."
10015030-74 = "แล้วก็อุตส่าห์เตรียมเครื่องดื่มโปรตีนไว้ให้ดื่มหลังจากออกกำลังกายเสร็จด้วย..."
10015030-75 = "[s] \"ดูท่าทางจะเตรียมอะไรไว้หลายอย่างเลยนะ...\""
10015030-76 = "ใช่แล้วค่ะ เนื่องจากเป็นการฝึกฝนที่เซมิน่าขอร้องมา ฉันก็ต้องทำเต็มที่อยู่แล้วค่ะ"
10015030-77 = "ร่างกายของเราสร้างขี้นมาจากองค์ประกอบหลากหลาย เพราะฉะนั้นเงื่อนไขและเวลาที่ใช้ในการสร้าง#nกล้ามเนื้อก็ต่างกัน การใช้ตารางฝึกแบบเดียวกันทั้งหมดจะทำให้เกิดข้อผิดพลาดขึ้นได้ค่ะ"
10015030-78 = "เพราะฉะนั้นพวกเรา <ชมรมออกกำลังกาย> จึงต้องวิเคราะห์อาหารการกินและพฤติกรรมของนักกีฬา#nอย่างละเอียด และเตรียมตารางฝึกที่เหมาะสมกับสภาพแวดล้อมและลักษณะเฉพาะของแต่ละคนค่ะ"
10015030-79 = "อย่างที่บอกไปก่อนหน้า... งานมหกรรมแข่งขันกีฬาครั้งนี้เป็นโอกาสอันดีที่จะแสดงเสน่ห์ของกีฬาให้#nนักเรียนคนอื่นๆ ได้รับรู้ และเป็นโอกาสที่จะได้พิสูจน์ผลงานของชมรมออกกำลังกายด้วยค่ะ"
10015030-80 = "ก็เลย... ตั้งตารองานมหกรรมแข่งขันกีฬาครั้งนี้มากเลยละค่ะ"
10015030-81 = "[s3] \"สึมิเระนี่สุดยอดไปเลยนะ...\"\n[s4] \"สึมิเระเนี่ยสมกับเป็นเด็กมิลเลเนียมจริงๆ เลยนะ\""
10015030-84 = "ฮุฮุ ก็กิจกรรมในชมรมของมิลเลเนียมทั้งหมดดำเนินการโดยตั้งอยู่บนพื้นฐานการวิจัยวิทยาศาสตร์นี่คะ"
10015030-85 = "ฉันขอเอาใจช่วยให้นักกีฬาจากโรงเรียนมิลเลเนียมทำสถิติดีๆ ในการแข่งขันครั้งนี้ได้เท่าที่สมาชิก#nชมรมออกกำลังกายทุกคนพยายามกันอย่างหนักนะคะ"
10015030-86 = "อืม... น่าเสียดายนะคะ แต่มันคงไม่ง่ายอย่างที่คิดเลยละค่ะ"
10015030-90 = "นักกีฬาที่ลงแข่งขันส่วนมากเป็นคนที่เพิ่งเคยออกกำลังกายและไม่เคยมีประสบการณ์การฝึกอย่าง#nจริงจังมาก่อน แล้วระยะเวลาฝึกก็น้อยเกินไปด้วยค่ะ"
10015030-91 = "แต่ว่าไม่เป็นไรหรอกค่ะ ความหมายของงานมหกรรมแข่งขันกีฬาไม่ได้ขึ้นอยู่ที่แพ้หรือชนะ แค่เข้าร่วม#nก็มีความหมายแล้วค่ะ!"
10015030-92 = "...แต่ว่าก็น่าเสียดายจริงๆ นั่นแหละค่ะ"
10015030-93 = "ฉันอุตส่าห์วางแผนการฝึกแบบเฉพาะตัวที่จะช่วยสร้างกล้ามเนื้อได้อย่างมีประสิทธิภาพในระยะเวลา#nสั้นๆ แต่ว่าทุกคนก็ทิ้งฉันเอาไว้กลางทางแบบนี้..."
10015030-94 = "[s] \"ไม่ใช่ว่าวางแผนฝึกแบบสาหัสเกินไปหรอกเหรอ?\""
10015030-95 = "ไม่ใช่แบบนั้นหรอกค่ะ ฉันแค่ขอให้ออกกำลังกายแบบแอโรบิควันละ 2 ชั่วโมงเพื่อสร้างกล้ามเนื้อที่#nสมดุลเท่านั้นเองนะคะ"
10015030-96 = "แน่นอนว่ายังไม่รวมเวลาที่ใช้ออกกำลังกายแบบแอโรบิคเป็นการวอร์มอัปเพื่อยืดกล้ามเนื้อและเสริม#nความแข็งแรงของหัวใจ..."
10015030-97 = "แต่ถึงรวมกันแล้วก็ไม่เกิน 4 ชั่วโมงเองนะคะ!"
10015030-98 = "[s] (พอจะรู้แล้วว่าทำไมนักเรียนที่มาชมรมออกกำลังกายถึงหนีไปกันหมด...)"
10015030-99 = "จะว่าไป... ไหนๆ ก็มาที่ฟิตเนสแล้ว เทรนเนอร์ก็มาออกกำลังกายแบบเบาๆ สักหน่อยมั้ยคะ?"
10015030-100 = "[s7] \"ครูขอรับไว้แค่น้ำใจแล้วกัน พอดีกำลังยุ่งอยู่กับการเตรียมงานน่ะ...\"\n[s8] \"พวกเรารีบกลับไปกันดีมั้ยโนอา?\""
10015030-103 = "ไม่นะคะ ไม่จำเป็นต้องรีบร้อนขนาดนั้นหรอกค่ะ"
10015030-104 = "งานที่แต่ละชมรมรับผิดชอบก็เสร็จเร็วกว่าที่คิด งานที่เหลือก็มีแค่กลับไปที่ห้องชมรมวิศวกรรมเพื่อรับ#nหุ่นยนต์ที่ซ่อมเสร็จแล้วแค่นั้นเองค่ะ..."
10015030-105 = "ถ้าฝ่ายไหว้วานให้ช่วยไปถึงเร็ว มันก็จะเหมือนเป็นการไปเร่งพวกเธอ แบบนั้นจะดูไม่ดีนะคะ"
10015030-106 = "พักอยู่ที่นี่สัก 30 นาทีก็คงไม่เป็นไรหรอกค่ะ"
10015030-107 = "30 นาทีงั้นเหรอ..."
10015030-108 = "เวลากำลังพอดีสำหรับการเวท เทรนนิ่งแบบเบาๆ เลยนะคะเนี่ย!"
10015030-114 = "[ns] \"ถ้างั้น... โนอาก็จะออกกำลังกายด้วยกันเหรอ?\""
10015030-115 = "แน่นอนอยู่แล้วค่ะ..."
10015030-119 = "ตายจริง อยู่ดีๆ ก็มีอีเมลด่วนที่ฉันต้องตรวจสอบเข้ามา..."
10015030-120 = "ฉันคงต้องนั่งสะสางงานอยู่ที่นี่สักพักแล้วละค่ะ"
10015030-121 = "ระหว่างนั้นคุณครูก็ออกกำลังกายกับคุณสึมิเระไปก่อนนะคะ"
10015030-125 = "[ns] \"อ้าว หนีเอาตัวรอดไปคนเดียวเลยนี่!\""
10015030-126 = "ฮุฮุ ดีเลยค่ะ ฉันกำลังอยากจะลองใช้เครื่องออกกำลังกายอันใหม่เล่นเวทแบบเฉพาะส่วนกับเทรนเนอร์#nอยู่พอดีเลยค่ะ"
10015030-130 = "เอาละ ถ้างั้นก็ลองมายืนตรงนี้แล้วตั้งท่าดูนะคะ"
10015030-135 = "[ns] \"นะ.. หนักจัง...!\""
10015030-136 = "เป็นอะไรรึเปล่าคะ? ทำไมถึงตัวสั่นขนาดนั้นล่ะคะ"
10015030-137 = "ขยับหัวเข่าให้ตรงกับปลายเท้า แล้วก็อย่างอหลังค่ะ!"
10015030-138 = "ต่ออีก 3 เซ็ต... เริ่มได้ค่ะ!"
10015030-140 = "คุณครู ระวังอย่าให้หลังเดาะนะคะ~"
10015030-145 = "(หลังจากนั้นก็ออกกำลังเวท เทรนนิ่งกับสึมิเระตลอด 30 นาทีจนไม่เหลือเรี่ยวแรง...)"

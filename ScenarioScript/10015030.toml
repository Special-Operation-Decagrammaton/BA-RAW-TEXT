10015030-6 = "#na;(노아와 함께 밀레니엄 학원의 동아리를 순회하며 대운동회 업무를 부탁하던 중에……)"
10015030-7 = "3;노아;02;어디 보자…… 고장 난 기기의 수리는 엔지니어 부에서 처리해주시기로 했고, 전산 업무에 대한 걱정도 한시름 덜었으니……\n#3;em;…\n#3;a"
10015030-8 = "3;노아;01;이제 남은 일은 출전 선수들의 컨디션을 체크하고, 엔트리를 정리하는 일 정도네요."
10015030-9 = "[s] \"컨디션 체크?\""
10015030-10 = "3;노아;01;네. 선수들이 경기에서 최선의 기량을 낼 수 있도록 개개인의 컨디션을 체크하는 것도 세미나의 업무니까요.\n#3;greeting"
10015030-11 = "3;노아;99;다만 저나 다른 세미나의 인원들은 이런 분야의 문외한인지라. 컨디션 체크에는 체육 트레이닝 전문 동아리인 <트레이닝부> 여러분의 도움을 받고 있답니다."
10015030-12 = "3;노아;02;……그러고 보니 이 시간이라면 트레이닝부의 부원 여러분도 대회를 앞두고 마지막 훈련을 하고 계시겠네요.\n#3;em;[...]"

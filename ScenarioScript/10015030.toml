10015030-14 = "#clearST"
10015030-15 = "3;노아;02\n#3;d\n#wait;1000"
10015030-16 = "3;노아;01;열심히 훈련 중인 선수분들을 응원할 겸, 스타디움으로 가기 전에 잠시 피트니스 센터에 들러볼까요?\n#3;em;[반응]\n#3;closeup\n#3;a"

[translation]
10015030-1 = "Episode 3; The Millennium Trainers"
10015030-5 = "Millennium Western Annex"
10015030-6 = "Noa and I continued going from club to club at Millennium, asking students for help with the upcoming field day."
10015030-7 = "Let's see... The Engineering Department is fixing the broken robot and the data processing tasks are taken care of..."
10015030-8 = "All that's left is to assess athlete conditions and organize entries."
10015030-9 = "[s] \"You have to check their conditions?\""
10015030-10 = "Yes, it's a part of Seminar's job. We want to ensure not only that they can perform in tip-top shape, but also that no injuries occur on our watch."
10015030-11 = "Well, this task is technically our responsibility, but we're not very well-versed in the nuances of this field. So, the Athletics Club has been handling it."
10015030-12 = "They're likely right in the middle of their final practices before game day."
10015030-16 = "One last stop before the Stadium, Sensei! Let's cheer on some athletes at the fitness center."
10015030-23 = "Millennium Fitness Center"
10015030-24 = "Push your butt out, and make sure your knees and toes are facing the same direction!"
10015030-25 = "Good! Now, two more sets of squats!"
10015030-26 = "W-Wait! President Sumire! I thought we were done after that one!"
10015030-27 = "Yeah! A-And you said the last one was the last set, too!"
10015030-28 = "Listen up! Back squats add extra weight and tension thanks to the barbell, promoting overall muscle growth!"
10015030-29 = "But you're not promoting anything if you don't pair such low-weight barbells with a lot of repetitions! I used the lightest ones for you beginners!"
10015030-30 = "Remember what you're fighting for. Don't you want to perform at your best for the field day? Now, again!"
10015030-32 = "If we have to keep up with her crazy training regime..."
10015030-33 = "We won't even be able to move our bodies by the time the festival starts!"
10015030-38 = "Oh. Time really flies when you're training. It's late."
10015030-39 = "Okay, break! I expect you all back in ten minutes."
10015030-45 = "Sumire! Your intensity for training never fades!"
10015030-46 = "Noa? And...Trainer?"
10015030-47 = "What brings you to the fitness center so late at night?"
10015030-48 = "We're performing a last round of inspections for tomorrow, and I thought we'd drop by to cheer you on!"
10015030-49 = "You're really putting in your all, even at the finish line!"
10015030-50 = "[s1] \"Long time no see, Sumire.\"\n[s2] \"You seem more energetic than usual.\""
10015030-53 = "I'm bursting with energy, Trainer! It's good to see you!"
10015030-54 = "I've been anticipating the beginning of the Halo Festival for months now."
10015030-55 = "Millennium students are much more focused on math formulas than dumbbells, so this is the one special day sports get a chance to shine."
10015030-56 = "I can imagine it now... The roar of the crowd so loud it lifts the stadium up..."
10015030-57 = "And our athletes! They'll be battling it out on the field, with their mind, body, and soul!"
10015030-59 = "This is it! This is our chance! We can prove to the student body that sports are important! They'll see the majesty and power of building muscles!"
10015030-60 = "[s] \"I'm...um, happy you're so excited?\""
10015030-61 = "Oh... I'm so sorry. I got a little carried away there."
10015030-62 = "A-Anyways... As you can see, we're hard at work getting some last-minute training in for tomorrow."
10015030-68 = "Wh-Where did they all go? I only told them they could have a ten-minute break."
10015030-69 = "I hate to be the bearer of bad news, but they snuck off while you were talking."
10015030-70 = "It might be a little early to go to bed, but it IS quite late to be training."
10015030-71 = "They left?! But we only just finished the warm-up!"
10015030-72 = "It's essential for rookies to complete their circuit training for the body to adapt to more intense, full-spectrum workouts. And how will they train their lungs now...?"
10015030-73 = "And then I planned on showing them some isolation exercises on our new cable machines..."
10015030-74 = "A-And...I even made everyone protein drinks to help their muscles recover right after the workout."
10015030-75 = "[s] \"Wow. You really put a lot into this.\""
10015030-76 = "Of course! This was a direct request from Seminar, so I had to make sure the training program was perfect."
10015030-77 = "Everyone's bodies are incredibly different, so it naturally follows that they each need different things to progress in their physical journeys. Standardized training programs that don't account for these variables rarely work for everyone."
10015030-78 = "We knew how important this kind of customization was, so the Athletic Training Club analyzed everything from experience to diets to body types to create the perfect individual plan for each and every athlete."
10015030-79 = "I was explaining how excited I was for the chance to show off the joys of sports to the other students, but the real stakes here are proving the effectiveness and viability of our experimental workouts."
10015030-80 = "That's...That's why I got carried away earlier. This means a lot to me."
10015030-81 = "[s3] \"I just had a realization about Sumire.\" \n[s4] \"Sumire is truly a Millennium student.\""
10015030-84 = "Haha! You're absolutely right. No matter what the activity or club may be, here at Millennium we believe in succeeding with empirical methods."
10015030-85 = "It seems every one of you put your all into this. I'm looking forward to seeing our Millennium athletes prevail in the festival."
10015030-86 = "I have to apologize...but I don't think that's a sight you will be seeing."
10015030-90 = "Unfortunately, most of the field day competitors are rookies who didn't complete their full training."
10015030-91 = "But it's all in the spirit of competition! It's about the fire of sports, not about a victory or a loss!"
10015030-92 = "...Is what I've been telling myself."
10015030-93 = "It's baffling to me. I painstakingly created customized training plans to help them grow stronger in the short amount of time we had. But everyone just gave up."
10015030-94 = "[s] \"Maybe the schedule was too intense for them?\""
10015030-95 = "That's nonsense. It's only two hours of daily anaerobic exercise..."
10015030-96 = "Well, and the warm-up stretches... Oh, and of course aerobic exercises because we needed to strengthen their lungs."
10015030-97 = "But it was a maximum of four hours a day! I do nearly double that!"
10015030-98 = "[s] \"(I would've ran away too...)\""
10015030-99 = "I just had an idea! You came all this way, why don't we do a little bit of light training while you're here?"
10015030-100 = "[s7] \"Thanks for the offer, but we're busy preparing for the festival...\"\n[s8] \"We should get back. Right, Noa?\""
10015030-103 = "Oh, no. We have plenty of time, actually."
10015030-104 = "The only thing we have left on our schedule is picking up the cheer bot from the Engineering Department! We wrapped everything up very efficiently."
10015030-105 = "And, naturally, it would be rude of us to arrive early for pickup when it was such a rush job to begin with."
10015030-106 = "Why don't we take a little break here for a half hour or so?"
10015030-107 = "Thirty minutes...?"
10015030-108 = "We can fit in some great weightlifting in that time frame!"
10015030-114 = "[ns] \"N-Noa...? Are you going to join us...? Please?\""
10015030-115 = "Of...course..."
10015030-119 = "What's this? Oh my! I just received a very, very urgent e-mail. Let me sit over here and review it right away."
10015030-120 = "What a shame about the workout, though..."
10015030-121 = "Sumire, you and Sensei go ahead without me!"
10015030-125 = "[ns] \"How could you betray me like this, Noa?!\""
10015030-126 = "Heehee. This is perfect. I really wanted to try these chest and bicep isolation weights with our new Smith machine."
10015030-130 = "Trainer, stand in position right over here."
10015030-135 = "[ns] \"I-It's...so...heavy...!\""
10015030-136 = "Your form is all wrong! Do you see how unstable you are?"
10015030-137 = "Keep your back straight! Your toes are pointing out, they should be in line with the rest of your body."
10015030-138 = "First of three sets, go!"
10015030-140 = "Sensei! Don't hurt your back!"
10015030-145 = "For the next thirty minutes, Sumire dragged me through a torturous weightlifting boot camp until I couldn't raise my own arm."

[translation]
10015030-1 = "第3話;千年的指導員"
10015030-5 = "千年．西側別館"
10015030-6 = "（在和乃愛一起拜訪各個千年學園社團，委託大運動會業務的期間……）"
10015030-7 = "我想想……故障的機器已經請工程師部修理，電算業務也交給了貝里塔斯……"
10015030-8 = "接下來只要檢查比賽選手的狀態，整理參賽名單就行了。"
10015030-9 = "[s] 「檢查狀態？」"
10015030-10 = "是的，為了讓選手們在比賽中能發揮最佳表現，#n確認每個人的狀態也是研討會的工作之一。"
10015030-11 = "但我和其他研討會的成員在這方面是門外漢……#n所以是交由體育訓練專門社團「訓練部」的各位協助。"
10015030-12 = "……這個時間的話，他們應該正在進行大會前的最後調整吧。"
10015030-16 = "就當作是為努力訓練中的選手們加油，在前往運動場之前先去一趟健身中心吧？"
10015030-23 = "千年．健身中心"
10015030-24 = "臀部往後，膝蓋與腳尖的方向一致！"
10015030-25 = "接著追加2組深蹲！"
10015030-26 = "等，等一下，堇部長！#n剛才不是說是最後一組了嗎！？"
10015030-27 = "對呀！#n剛才就說是最後了吧！？"
10015030-28 = "背蹲舉是利用槓鈴施加負荷，促進肌肉成長的運動……"
10015030-29 = "雖然有為身為新手的你們準備了低重量的槓鈴，#n但為了確實對整體肌肉造成刺激，反覆運動仍是不可或缺的。"
10015030-30 = "為了在大運動會中取得好的成績，我們要堅持下去，奮戰到最後一刻吧！"
10015030-32 = "像這樣反覆進行嚴酷的訓練……"
10015030-33 = "可能大會還沒開始，就先倒下了吧……"
10015030-38 = "哎呀？原來已經這麼晚了啊。"
10015030-39 = "那麼……稍微休息一下後再繼續吧。"
10015030-45 = "呵呵，堇同學還是這麼嚴厲呢。"
10015030-46 = "咦？乃愛同學……還有指導員？"
10015030-47 = "你們怎麼會在這個時間來健身中心呢？"
10015030-48 = "為了明天的大運動會，我正在巡視學校做最後檢驗，來這邊是為了幫選手們加油。"
10015030-49 = "訓練到這麼晚，真是辛苦了。"
10015030-50 = "[s1] 「好久不見，堇。」\n[s2] 「你看起來比平常更有活力。」"
10015030-53 = "當然囉，指導員。"
10015030-54 = "明天是「晄輪大祭」的開幕日……而且是由千年主辦！"
10015030-55 = "就算是平常對運動不感興趣的千年學生，#n在這一天也會因為場上選手們的精彩演出而目不轉睛吧。"
10015030-56 = "觀眾響徹會場的吶喊聲……"
10015030-57 = "流著汗水，在場上激烈碰撞的選手們……"
10015030-59 = "也就是說，這是向千年的學生們宣傳運動魅力的絕佳機會！"
10015030-60 = "[s] 「啊，我知道了，冷靜一點……」"
10015030-61 = "啊，我不自覺就……失禮了。"
10015030-62 = "總之，就如同剛才看見的一樣，#n為了應對明天的競賽，我正在和其他學生一起流汗……"
10015030-68 = "……嗯？#n剛才還在這裡深蹲的大家都跑去哪裡了？"
10015030-69 = "……大概是為了明天的比賽，先回去休息了吧。"
10015030-70 = "雖說現在就要睡覺還太早，但畢竟時間已經很晚了。"
10015030-71 = "咦？就只是簡單的伸展運動和深蹲而已耶？"
10015030-72 = "為初學者設計的循環訓練，#n需要依序強化多種部位的肌肉才能提升心肺器官的能力……"
10015030-73 = "而且新的纜繩機也送來了，我本來還想教導其他種類的孤立式訓練……"
10015030-74 = "甚至還準備了運動結束後能馬上喝的高蛋白飲料……"
10015030-75 = "[s] 「看來你做了相當多的準備呢……」"
10015030-76 = "那當然。#n難得收到研討會的委託，可一點都不能馬虎。"
10015030-77 = "人體是由多種變數組成的個體，讓肌肉成長的條件或時間也各不相同。#n如果使用統一的訓練計劃，可能會在各種方面都產生誤差。"
10015030-78 = "所以我們「訓練部」會根據各個選手的訓練菜單和生活習慣進行詳細分析，#n訂定出適合個人環境與特性的訓練計畫。"
10015030-79 = "……就像前面所說，這次的大運動會是向學生們宣傳運動魅力的好時機，#n同時也是證明我們訓練部實驗成果的機會。"
10015030-80 = "所以……我很期待這次的大運動會。"
10015030-81 = "[s3] 「看到這個情景我才重新意識到……」\n[s4] 「堇果然是千年的學生沒錯呢。」"
10015030-84 = "呵呵，畢竟千年的社團活動全都是以科學研究為基礎進行的。"
10015030-85 = "既然訓練部的各位如此努力，希望千年的選手能在這次的大運動會上創下好紀錄。"
10015030-86 = "嗯……很遺憾，這可能有點困難。"
10015030-90 = "畢竟參賽的大部分選手都是沒有經過正規訓練的運動新手，訓練時間也不夠充裕。"
10015030-91 = "不過沒關係，大運動會的價值並非是競賽的勝負或紀錄，而是在於參加本身。"
10015030-92 = "……不過確實讓人感到有些遺憾。"
10015030-93 = "為了彌補訓練時間的不足，我制定了能有效鍛鍊肌肉的訓練計畫，#n但大家卻都在中途放棄了……"
10015030-94 = "[s] 「會不會是計畫太困難了呢？」"
10015030-95 = "沒有那種事。#n為了塑造均衡的肌肉，我只是拜託大家每天都要進行2小時的無氧運動。"
10015030-96 = "當然這個時間不包含熱身的伸展運動，以及加強心肺的有氧運動……"
10015030-97 = "但每天最多也不會超過4小時！"
10015030-98 = "[s] （大概明白訓練部的學生逃跑的原因了……）"
10015030-99 = "對了……既然都來到健身中心了，指導員要不要簡單運動一下後再走呢？"
10015030-100 = "[s7] 「你的好意我心領了，但我還要忙著準備大運動會……」\n[s8] 「我們還有重要的事要做……對吧，乃愛？」"
10015030-103 = "不，倒是沒有那麼急迫。"
10015030-104 = "巡視各個社團的業務比預期中的還要早結束，接下來是去工程師部領取修復好的機器人……"
10015030-105 = "但站在委託方的立場，太早去就像是在催促一樣，會讓人感到困擾的。"
10015030-106 = "所以我們至少可以在這裡悠哉休息個30分鐘左右。"
10015030-107 = "30分鐘啊……"
10015030-108 = "是剛好能做些輕訓練的時間呢！"
10015030-114 = "[ns]「這樣的話……乃愛也要一起運動嗎？」"
10015030-115 = "嗯，那是當然──"
10015030-119 = "哎呀，突然有緊急的事件要處理……"
10015030-120 = "雖然很可惜，但我得先在這裡處理一下工作才行。"
10015030-121 = "老師就趁這段時間和堇同學一起悠哉地享受運動吧。"
10015030-125 = "[ns]「啊，真狡猾！竟然自己逃走！」"
10015030-126 = "呵呵。#n我早就想和指導員一起使用新引進的史密斯訓練器，做胸部二頭肌的孤立訓練了。"
10015030-130 = "好，先站在這邊擺好姿勢。"
10015030-135 = "[ns]「好……好重……！」"
10015030-136 = "怎麼了？搖搖晃晃的唷。"
10015030-137 = "讓膝蓋與腳尖的方向一致，腰部不能彎曲！"
10015030-138 = "進行3組……開始！"
10015030-140 = "老師，小心別傷到腰喔～"
10015030-145 = "（後來的30分鐘裡都和堇持續進行著體能訓練，直到精疲力盡為止……）"

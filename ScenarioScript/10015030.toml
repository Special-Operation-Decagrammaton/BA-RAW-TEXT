10015030-83 = "#wait;10"
10015030-84 = "3;노아;03;후후, 밀레니엄의 동아리 활동은 모두 과학적인 연구에 기반하여 진행되고 있으니까요.\n#3;em;[반응]"
10015030-85 = "3;노아;01;트레이닝부의 여러분이 열심히 노력해 주신 만큼, 이번 대운동회에서는 밀레니엄 학원의 선수들이 좋은 기록을 내면 좋겠네요."
10015030-86 = "3;스미레;06;음…… 아쉽지만 그건 어려울 것 같습니다.\n#3;em;[속상함]\n#3;stiff"

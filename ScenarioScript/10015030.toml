10015030-67 = "#all;hide"
10015030-68 = "3;스미레;04;……어라? 방금 전까지 이곳에서 다 같이 스쿼트를 하고 있었는데, 다들 어디에 가신 거죠?\n#3;em;[?]\n#3;a"
10015030-69 = "3;스미레;04\n1;노아;02;아마 내일의 경기를 위해 먼저 쉬러 돌아가신 모양이시네요.\n#1;ar\n#3;m5"
10015030-70 = "1;노아;01;잠을 자기엔 이르지만, 이미 꽤 늦은 시간이니까요.\n#1;greeting"
10015030-71 = "3;스미레;06;네? 아직 가벼운 스트레칭과 스쿼트 밖에 진행하지 않았는걸요?\n#3;em;[?!]"
10015030-72 = "1;노아;01\n3;스미레;09;초심자가 하는 조직 적응기의 서킷 트레이닝은 심폐기관의 향상을 위해 다양한 부위의 근육을 차례로 강화시켜야 하는데……\n#3;m4\n#1;dl"
10015030-73 = "3;스미레;04;게다가 새로운 케이블 머신이 들어와서 다른 방식의 고립 운동법도 가르쳐 드리려 했는데……\n#3;m3"
10015030-74 = "3;스미레;06;그리고 운동이 바로 끝난 뒤에 바로 마실 수 있도록 프로틴 음료도 준비했는데……\n#3;stiff\n#3;em;[땀]"
10015030-75 = "[s] \"뭔가 이것저것 많이 준비한 모양이네…….\""
10015030-76 = "3;스미레;05;물론입니다. 모처럼 세미나에서 부탁을 받아 진행되는 트레이닝인 만큼 허투루 할 수는 없지요.\n#3;em;[!]"
10015030-77 = "3;스미레;05;사람의 몸은 다양한 변수로 이루어진 객체이기 때문에 근육을 성장시키기 위한 조건이나 시간이 모두 다르고, 획일화된 트레이닝 스케줄을 사용하면 여러모로 오차가 발생할 수 있습니다.\n#3;em;[재잘]"
10015030-78 = "3;스미레;99;그래서 저희 <트레이닝부>에서는 선수 여러분의 식단부터 생활 습관까지 꼼꼼하게 분석하여, 개인의 환경과 특성에 최적화된 맞춤형 트레이닝 스케줄을 제시하고 있습니다."
10015030-79 = "3;스미레;10;……앞서 말했듯이 이번 대운동회는 학생들에게 스포츠의 매력을 전파할 기회이기도 하지만, 저희 트레이닝부의 실험 성과를 증명할 기회이기도 하지요.\n#3;greeting"
10015030-80 = "3;스미레;07;그래서 더욱…… 이번 대운동회가 기대됩니다.\n#3;em;[반짝]"
10015030-81 = "[s3] \"이런 모습만 두고 보면……\"\n[s4] \"스미레도 영락없는 밀레니엄의 학생이네.\""

10015030-24 = "3;스미레;05;엉덩이를 뒤로 빼고, 무릎과 발끝 방향은 일치!\n#3;closeup\n#3;em;[반응]\n#fontsize;80"
10015030-25 = "3;스미레;05;이어서 스쿼트 2세트, 추가하겠습니다!\n#3;em;[!]\n#fontsize;80"
10015030-26 = "#na;밀레니엄 선수 A;자, 잠시만요, 스미레 부장! 분명 방금 마지막 세트라고 하셨잖아요?"
10015030-27 = "#na;밀레니엄 선수 B;맞아! 심지어 그전에도 마지막이라고 했으면서!"
10015030-28 = "3;스미레;99;백 스쿼트는 전반적인 근육의 성장을 위해, 바벨을 이용하여 근육에 긴장을 주는 운동……\n#3;em;…"
10015030-29 = "3;스미레;01;초심자인 여러분을 위해 저중량의 바벨을 준비했습니다만, 근육 전반에 제대로 된 자극을 주기 위해서 고반복 운동은 필수적이니까요."
10015030-30 = "3;스미레;07;운동회에서 좋은 성적을 거두기 위해서라도, 포기하지 말고 끝까지 함께 도전합시다!\n#3;em;[!]"

10015030-89 = "3;노아;02\n#3;em;[?]\n#wait;1200"
10015030-90 = "3;스미레;99;대회에 출전하는 대부분의 선수가 정규 트레이닝을 경험한 적 없는 운동 초보자이고, 훈련 기간도 충분하지 못했으니까요.\n#3;em;…"
10015030-91 = "3;스미레;10;하지만 괜찮습니다. 대운동회의 가치는 경기의 승패나 기록이 아닌, 참가 그 자체에 있으니까요!\n#3;em;[!]\n#3;jump"
10015030-92 = "3;스미레;09;……그렇지만 조금 아쉬운 것도 사실이네요."
10015030-93 = "3;스미레;06;짧은 훈련 기간을 보완하기 위해 근육을 효율적으로 성장시킬 수 있는 맞춤형 트레이닝 플랜을 세웠는데, 다들 중도에 포기해 버리셔서……\n#3;em;[속상함]\n#3;stiff"
10015030-94 = "[s] \"너무 어려운 스케줄을 짠 거 아냐?\""
10015030-95 = "3;스미레;08;그렇지 않습니다. 균형 잡힌 근육을 만들기 위해 하루 2시간의 무산소 운동을 부탁드렸을 뿐인걸요.\n#3;em;[반응]"
10015030-96 = "3;스미레;09;물론 워밍업을 위한 스트레칭과 심폐 강화를 위한 유산소 운동에 드는 시간은 제외하긴 했지만……\n#3;stiff"

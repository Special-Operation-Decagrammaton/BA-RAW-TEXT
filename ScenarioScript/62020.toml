62020-110 = "..."
62020-111 = "ฮะ... ฮือ... นะ... น่ากลัวจริงๆ ด้วยค่ะ... ผู้ใหญ่น่ากลัว... โลกนี้ก็น่ากลัวค่ะ..."
62020-112 = "เอ๋...? แต่พอมาคิดดู คุณครูก็เป็นผู้ใหญ่นี่คะ...?"
62020-113 = "[s9] \"ใช่ ครูขอโทษนะ...\"\n[s10] \"ใช่ ในฐานะผู้ใหญ่คนหนึ่ง ครูขอโทษนะ\""
62020-118 = "คะ? คะ... คะคะคะ... คุณครู... ไม่เห็นต้อง..."
62020-119 = "ไม่เห็นต้องขอโทษเลย..."
62020-123 = "(สะอื้น...)"
62020-124 = "อืม... ข้างนอกนั่นมันก็เป็นอย่างที่ว่านั่นละ"
62020-125 = "แต่ถึงยังไง มันก็ไม่ใช่ความผิดของเธอหรอกนะ"
62020-126 = "คะ... คุณมิซากิ..."
62020-127 = "ก็นะ ถ้าจัดว่าพวกผู้ใหญ่กับโลกใบนี้คือเรื่องแย่ๆ ทั้งหมด การแยกแยะก็น่าจะง่ายขึ้น..."
62020-128 = "แต่ว่าโลกนี้ไม่ได้แบ่งเป็น 2 ส่วนง่ายๆ แบบนั้นน่ะสิ"
62020-129 = "..."
62020-130 = "ปล่อยเรื่องแบบนั้นไปเถอะ ลืมผู้ใหญ่ไร้สมองพวกนั้นไปด้วย"
62020-131 = "เราแค่ยอมรับในสิ่งที่ตัวเองยอมรับได้ แล้วใช้ชีวิตต่อไปก็พอ"
62020-132 = "โลกนี้มันเลวร้ายมากพออยู่แล้ว แค่การทำแบบนั้นก็ยากพอแล้วละ"
62020-133 = "แต่ก่อนฉันเองก็เคยถามตัวเองว่าทำไมต้องมาอยู่ในโลกแบบนี้ด้วย..."
62020-134 = "..."
62020-135 = "แต่พอคุณครูบอกให้ลองใช้ชีวิตดู ฉันก็เลยพยายามทำตามนั้นน่ะ"
62020-141 = "ฮุฮุ..."
62020-142 = "แหะ แหะๆ..."
62020-143 = "อืม"
62020-148 = "อะไรกันน่ะ...? ทุกคน แบบนี้ฉันเริ่มรู้สึกไม่ค่อยดีนะ?"
62020-149 = "[s] \"มิซากิของพวกเรา... โตขึ้นมากเลยนะ... ฮือๆ...\""
62020-153 = "คุณครูน่ะอยู่เฉยๆ ไปเลย! แล้วก็ไม่ต้องแกล้งดีใจจนร้องไห้ด้วย!"
62020-154 = "คุณครูนั่นละปัญหาใหญ่ที่สุด... เธอก็ระวังคนคนนี้ไว้ล่ะ"
62020-155 = "คะ... คะ...? อย่างนั้น... เหรอคะ?"
62020-156 = "ใช่ คนคนนี้ละปัญหาใหญ่ที่สุดแล้ว คนนิสัยไม่ดี"
62020-157 = "คุณครูให้ความหวังพวกเราโดยไม่ลังเล แล้วก็ทำให้เราเห็นว่ามันไม่ใช่เรื่องโกหกเลย"
62020-158 = "ถ้าทั้งหมดเป็นแค่เรื่องโกหก ฉันก็คงยอมแพ้ไปนานแล้ว..."
62020-159 = "ถ้าจะทำดีด้วยแบบนี้ก็ควรรับผิดชอบกันไปตลอดชีวิต แต่ก็คงไม่หรอก"
62020-160 = "เอาเถอะ สรุปว่าระวังคนแบบนี้เอาไว้แล้วกัน"
62020-161 = "ยะ... อย่างนี้สินะคะ..."
62020-162 = "[s] \"หืม? งั้นครูแค่ต้องรับผิดชอบไปตลอดชีวิตใช่มั้ย?\""
62020-165 = "คนคนนี้นี่ หยุดพูดอะไรไม่เข้าหูได้แล้ว!!!"
62020-170 = "..."
62020-171 = "'ทุกอย่างเปล่าประโยชน์และไร้ความหมาย'"
62020-172 = "ซัตจัง?"
62020-173 = "[s] \"...?\""
62020-174 = "ฉันได้ยินคำนี้มาหลายครั้ง แล้วฉันก็ตีความผิดอยู่หลายครั้งจนเบื่อแล้วละ"
62020-175 = "มันเป็นแค่คำที่บอกเราว่าให้ทำแต่พอดี เพราะทุกอย่างจะผ่านพ้นไปในที่สุดแท้ๆ"
62020-176 = "ทั้งพวกฉันและเธอ สุดท้ายแล้วเราจะผ่านมันไปได้นะ"
62020-177 = "วันหนึ่งเมื่อมองย้อนกลับไป เราก็อาจคิดว่ามันก็คือเรื่องที่เคยเกิดขึ้น แล้วก็ไม่ใช่เรื่องพิเศษอะไรด้วย"
62020-178 = "แต่แน่นอนว่าวันนั้นอาจไม่มาถึงก็ได้..."
62020-179 = "อนาคตที่แน่นอนเป็นสิ่งที่ไม่มีอยู่จริง เพราะงั้นการคิดที่เอนเอียงไปทางใดทางหนึ่งมากเกินไปก็ไม่ใช่#nสิ่งดีหรอก"
62020-180 = "อนาคตที่ต้องตกลงให้ชัดเจน ก็น่าจะมีแค่จำนวนเงินที่ระบุในสัญญาจ้างน่ะ..."
62020-182 = "ฮุฮุ นั่นสินะ นั่นเป็นเรื่องสำคัญเลยละ"
62020-183 = "แหะ... แหะๆ..."
62020-190 = "?!"
62020-192 = "!!!"

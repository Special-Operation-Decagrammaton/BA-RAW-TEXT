62020-35 = "3;아리우스 학생 B 마스크OFF;04;그럼 이제, 비 올 때마다 물을 받으러 다니거나……. 고인 물을 그냥 마시고 배탈 날 일도 없다는 건가요……?\n#3;stiff"

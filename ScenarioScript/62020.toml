62020-18 = "3;미네 무소속;02;여러분의 메디컬 체크 결과, 전반적으로 영양실조…… 까지는 아니고, 영양 부족 현상이 광범위하게 관측되었습니다."
62020-19 = "3;미네 무소속;99;……그런 것 치고는 어째서인지, 포화지방과 당분 섭취량은 약간 높은 편이었습니다만……."
62020-20 = "3;미네 무소속;00;어쨌든, 그런 영양 부족 현상을 해결하기 위해 제작된 치료식이죠. 고소하고 은은한 단맛이 포인트입니다."
62020-21 = "3;미네 무소속;02;한 팩당 500kcal이며, 일반인에게는 부피에 비해 다소 높은 칼로리겠지만……"
62020-22 = "3;미네 무소속;03;영양 부족 현상에는, 오히려 최적화된 음식이라고 할 수 있죠.\n#3;em;[반짝]"
62020-23 = "3;미네 무소속;07;부드러워서 먹기도 쉽고, 보존성과 영양 가치도 높습니다. 비타민과 무기 염류, 식이섬유까지도 포함되어 있고요."
62020-24 = "3;미네 무소속;03;하루에 2~3개 정도 드시면, 충분할 겁니다."
62020-25 = "#all;hide"
62020-26 = "3;아리우스 학생 A 마스크OFF;04;가, 감사합니다…….\n#3;em;[땀]\n#3;stiff"
62020-27 = "3;하나에 무소속;03;이건 오수 정화 빨대예요! 물을 정화해 주는 휴대용 필터죠. 빨대를 물웅덩이에 대고, 물을 빨아 마시면 된답니다!\n#3;em;[재잘]\n#3;hophop"
62020-28 = "3;하나에 무소속;02;미생물을 효과적으로 걸러주고, 특히 박테리아 제거율은 99.9%에 달해요!"
62020-29 = "3;하나에 무소속;01;세균에 오염된 물을, 마실 수 있는 물로 바꾸어주는 역할을 한다고 볼 수 있죠."
62020-30 = "3;하나에 무소속;00;저희가 나누어 드리는 개인용의 경우, 필터 사용 가능량은 약 700리터까지도 문제없답니다!"
62020-31 = "3;하나에 무소속;01;단, 바이러스나 화학물질, 소금물이나 중금속을 제거하지 못하니까 너무 남용은 하지 말아 주시고요.\n#3;m4"
62020-32 = "3;하나에 무소속;02;주의점은…… 첫째. 물을 천천히 마셔야 한다는 점."
62020-33 = "3;하나에 무소속;03;둘째. 바닷물이나 진흙이 많이 섞인 물은 정수가 안 된다는 점. 이 정도가 있겠네요!\n#3;em;[반짝]"

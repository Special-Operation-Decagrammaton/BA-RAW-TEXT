62020-198 = "ขะ... ขอโทษนะคะ! ตอนนี้มีเรื่องใหญ่เกิดขึ้นข้างนอกค่ะ!"
62020-203 = "ทุกคนไม่ต้องตกใจเกินเหตุนะคะ! ตื่นตระหนกไปจะยิ่งอันตรายค่ะ!"
62020-209 = "เกิดเรื่องอะไรกันน่ะ?"
62020-214 = "โจมาเอะ ซาโอริ...!"
62020-215 = "..."
62020-216 = "ก็ดูนั่นสิคะ"
62020-227 = "นั่นมัน... อะไรน่ะ?!"
62020-228 = "ฉันก็ไม่รู้ค่ะ... จู่ๆ มันก็ปรากฏขึ้นมา... ถึงจะโจมตีเข้า แต่การโจมตีก็ทำอะไรไม่ได้เลยค่ะ"
62020-232 = "(ความรู้สึกแบบนี้... คล้ายกับตอนที่ 'สิ่งนั้น' ปรากฏขึ้นตอนได้ยินเสียงแตรนั่นเลย...!)"
62020-233 = "(หรือว่านั่นจะเป็น...?)"
62020-234 = "นั่นคืออะไรเหรอ...? พอเสียงแตรดัง ก็มีของแบบนั้นออกมา...? แล้วก็มีตั้ง 4 อันเลยด้วย...?"
62020-235 = "หืม? เสียงแตรงั้นเหรอ? แต่ฉันไม่ได้ยินเสียงอะไรเลยนะ?"
62020-236 = "ว่าไงนะ? เสียงดังขนาดนั้น แต่เธอไม่ได้ยินเลยงั้นเหรอ? หูมีปัญหาแล้วหรือเปล่า?"
62020-237 = "ละ... แล้วรุ่นพี่ล่ะคะ? รุ่นพี่ได้ยินหรือเปล่าคะ? เสียงแตรอะไรนั่นน่ะ?"
62020-242 = "ไม่ค่ะ ฉันก็... ไม่ได้ยินเสียงอะไรเลยค่ะ..."

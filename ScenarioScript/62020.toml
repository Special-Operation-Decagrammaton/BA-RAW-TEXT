62020-267 = "ทุกคน มาหลบข้างหลังฉันค่ะ!"
62020-269 = "เหวอ?!"
62020-275 = "เป็นยังไงบ้างคะ? มีใครได้รับบาดเจ็บหรือเปล่า?"
62020-276 = "พวกฉันเตรียมตัวพร้อมแล้วค่ะ! หัวนะ... รุ่นพี่!"
62020-278 = "ดีค่ะ จากนี้ไป..."
62020-279 = "..."
62020-283 = "ชมรมกิจกรรมอาสานิรนาม! จะปกป้องทุกคนเองค่ะ!"
62020-285 = "พวกเราก็ไปกันเถอะ"
62020-286 = "แทบจะเป็นปฏิกิริยาอัตโนมัติเลยนะ... คิดไว้แล้วว่าต้องเป็นแบบนี้"
62020-287 = "นี่คือการปกป้องโรงเรียนเก่า ไม่ว่าสิ่งที่ปรากฏขึ้นมาจะเป็นอะไรก็ตาม"
62020-292 = "..."
62020-293 = "ทะ... ทุกคนระวังตัวด้วยนะคะ..."

[translation]
62020-1 = "ตอนที่ 2;เสียงแตร"
62020-3 = "รับไปเลยค่ะ เชิญมารับไปเลยค่ะ!"
62020-4 = "เรายังมีของอีกเยอะเลยค่ะ! เข้าแถวมารับไปทีละคนนะคะ!"
62020-11 = "ขนของมาให้เยอะแยะเลย ว่าแต่ของพวกนี้คืออะไรเหรอคะ...?"
62020-13 = "นี่คืออาหารสำหรับการรักษาทางโภชนาการค่ะ"
62020-18 = "จากผลการตรวจสุขภาพ ทุกคนยังไม่ถึงกับเป็นโรคขาดสารอาหาร... แค่มีแนวโน้มที่จะขาดสารอาหาร#nโดยรวมค่ะ"
62020-19 = "แต่ถึงผลจะเป็นแบบนั้น แต่ค่าไขมันอิ่มตัวกับน้ำตาลถือว่าค่อนข้างสูง..."
62020-20 = "เอาเป็นว่านี่คืออาหารบำบัดที่ทำขึ้นสำหรับภาวะขาดสารอาหารค่ะ จุดเด่นของอาหารนี้ก็คือรสชาติที่#nกลมกล่อมและหวานน้อยค่ะ"
62020-21 = "ซองหนึ่งให้พลังงาน 500 กิโลแคลอรี ซึ่งถือว่าค่อนข้างสูงสำหรับคนทั่วไป..."
62020-22 = "แต่สำหรับผู้ที่มีภาวะขาดสารอาหารแล้ว นี่คืออาหารที่เหมาะสมที่สุดค่ะ"
62020-23 = "ทั้งเนื้อนุ่ม กินง่าย เก็บไว้ได้นาน คุณค่าทางโภชนาการก็สูงด้วยค่ะ นอกจากนี้ยังมีวิตามิน แร่ธาตุ และใยอาหารด้วยนะคะ"
62020-24 = "กินวันละ 2-3 ซองก็เพียงพอแล้วค่ะ"
62020-26 = "ขะ... ขอบคุณค่ะ..."
62020-27 = "ส่วนนี่คือหลอดกรองน้ำค่ะ! เป็นอุปกรณ์กรองแบบพกพาที่ช่วยกรองน้ำให้บริสุทธิ์น่ะค่ะ ต่อไปเวลาจะดื่มน้ำก็ใช้หลอดนี้นะคะ"
62020-28 = "มันช่วยกรองจุลินทรีย์ได้อย่างมีประสิทธิภาพ และมีอัตราการกำจัดแบคทีเรียสูงถึง 99.9% เลยค่ะ"
62020-29 = "สรุปก็คือหลอดนี้ช่วยเปลี่ยนน้ำที่ปนเปื้อนแบคทีเรียให้เป็นน้ำสะอาดที่ดื่มได้ค่ะ"
62020-30 = "หลอดส่วนตัวที่พวกฉันแจกจ่ายให้ ฟิลเตอร์ของแต่ละอันจะกรองน้ำได้สูงสุดราวๆ 700 ลิตรเลยค่ะ!"
62020-31 = "แต่ถึงยังไงมันก็กำจัดไวรัส สารเคมี เกลือ และโลหะหนักไม่ได้ค่ะ เพราะงั้นก็อย่าใช้กับน้ำที่เสี่ยงมากๆ นะคะ"
62020-32 = "ข้อควรระวัง... อย่างแรกเลยก็คือ ต้องดื่มน้ำช้าๆ ค่ะ"
62020-33 = "อย่างที่ 2 หลอดนี้ใช้กรองน้ำทะเลหรือน้ำที่มีโคลนมากๆ ไม่ได้ค่ะ น่าจะมีเท่านี้นะคะ!"
62020-35 = "ถ้างั้นจากนี้ไป ถ้าเราไปรองน้ำฝนมาดื่ม... เราก็ใช้หลอดนี้ดื่มน้ำฝนได้เลยโดยไม่ต้องกลัวปวดท้อง ใช่มั้ยคะ...?"
62020-36 = "ใช่ค่ะ กล่องปฐมพยาบาลก็มีนะคะ เราไม่มีทางรู้ว่าจะเกิดอะไรขึ้นที่ไหนและเมื่อไร กล่องปฐมพยาบาลก็เลยเป็นสิ่งจำเป็นค่ะ"
62020-37 = "แต่ละกล่องมีอุปกรณ์ฉุกเฉินทั้งหมด 30 อย่างค่ะ"
62020-38 = "30 อย่างเลยเหรอคะ?!"
62020-39 = "ใช่ค่ะ นอกจากยาที่เป็นของพื้นฐานแล้ว ยังมีไฟฉายขนาดเล็ก แบตเตอรี่ คู่มือฉุกเฉิน แผ่นประคบร้อน แล้วก็ผ้าห่มฟอยล์ฉุกเฉิน..."
62020-40 = "มันเป็นกล่องปฐมพยาบาลมาตรฐานของชมรมกิจกรรมอาสาของพวกฉันน่ะค่ะ"
62020-42 = "มีเยอะขนาดนี้แต่ยังเป็นระดับมาตรฐานงั้นเหรอ... ยอดไปเลยนะ..."
62020-45 = "น่าทึ่งจังเลยนะ เหมือนมาเปิดคลาสเรียนในศูนย์บรรเทาทุกข์ชั่วคราวเลย..."
62020-46 = "[s] \"การเรียนรู้ไม่มีขอบเขตและไม่มีที่สิ้นสุดอยู่แล้ว\""
62020-47 = "งะ... งั้นสินะ..."
62020-48 = "แต่ว่าเรื่องที่เรียนจะเป็นประโยชน์จริงเหรอคะ?"
62020-49 = "โดยเฉพาะวิชาคณิตศาสตร์ ฟังก์ชันกำลังสอง แคลคูลัส..."
62020-50 = "[s1] \"แต่การคิดแบบคณิตศาสตร์ก็ช่วยเราได้นะ\"\n[s2] \"แต่การคิดแบบคณิตศาสตร์ก็เป็นประโยชน์นะ\""
62020-53 = "การคิดแบบคณิตศาสตร์? หมายความว่ายังไงเหรอคะ?"
62020-55 = "ฉันก็อยากรู้เหมือนกัน ช่วยสอนหน่อยสิคะ คุณครู"
62020-56 = "ฮืม... คณิตศาสตร์เป็นระบบภาษาที่ใช้ตัวเลขแทนคำศัพท์น่ะ เรื่องประมาณนี้ฉันก็พอรู้อยู่บ้าง"
62020-57 = "คณิตศาสตร์เป็นศาสตร์ที่ขจัดความคลุมเครือแล้วอธิบายสถานการณ์ต่างๆ ให้ชัดเจนด้วยตัวเลข"
62020-58 = "ผู้ที่ศึกษาคณิตศาสตร์ก็เลยนิยามและอธิบายสาเหตุ กระบวนการ และผลลัพธ์ของปัญหาได้อย่าง#nชัดเจนยังไงล่ะ"
62020-59 = "และด้วยการรวบรวมหลักฐานและข้อวินิจฉัยต่างๆ เราก็จะคิดถึงผลลัพธ์ได้อย่างมีเหตุผลสินะ"
62020-61 = "คะ...? และบางครั้งเราก็อาจเจอระเบียบและกฎเกณฑ์ได้จากสิ่งที่ดูไม่เป็นระเบียบในตอนแรก อย่างงั้นเหรอคะ...?"
62020-62 = "ว่าแต่... แล้วข้อดีมันคืออะไรเหรอคะ?"
62020-63 = "[s3] \"ในเวลาแบบนั้น มันทำให้เราโน้มน้าวคนอื่นง่ายขึ้นน่ะ\"\n[s4] \"คนเราชอบอะไรที่มันชัดเจนเป็นเหตุเป็นผลน่ะ\""
62020-68 = "[ns5] \"เพราะงั้นเราก็ควรเรียนไว้ เพื่อให้คุ้นชินกับการคิดแบบนั้น\"\n[ns6] \"เพราะแบบนั้นการเรียนคณิตศาสตร์ก็เลยเป็นเรื่องที่ดี\""
62020-71 = "[ns7] \"เราจะได้ทำให้คนอื่นฟังคำพูดของเราได้ยังไงล่ะ\"\n[ns8] \"ในบางครั้งก็เอาไว้ทำท่าอวดเก่งได้นิดหน่อยด้วยนะ!\""
62020-74 = "โอ้ว..."
62020-75 = "..."
62020-76 = "งั้นมันก็น่าสนใจเลยนะคะ"
62020-77 = "..."
62020-81 = "ในตอนนั้น ถ้าฉันคิดแบบนั้นได้..."
62020-82 = "ก็อาจไม่ต้องเจอกับประสบการณ์แบบนั้นหรือเปล่าคะ...?"
62020-83 = "ประสบการณ์อะไรเหรอ?"
62020-87 = "ระ... เรื่องนั้น..."
62020-97 = "โรงเรียนที่ก่อการร้ายตอนนั้นน่ะเหรอ? จริงหรือเปล่า?"
62020-98 = "ทำไมนักเรียนจากโรงเรียนที่โหดร้ายแบบนั้นถึงมาลอยหน้าลอยตาอยู่ในที่แบบนี้ล่ะ...?"
62020-99 = "เสียเด็กจริงๆ เลย..."
62020-100 = "ถ้าเป็นโรงเรียนดีๆ คงไม่ยอมให้เด็กออกมาก่อเหตุขนาดนั้นหรอก"
62020-104 = "มีเรื่องเกิดขึ้นมากมายเลยค่ะ"

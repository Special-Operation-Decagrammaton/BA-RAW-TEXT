[translation]
62020-1 = "Episode 2;The Trumpet's Blow"
62020-3 = "Here you go! One for you too!"
62020-4 = "There's lots to go around, so please form an orderly line!"
62020-11 = "What even IS all this stuff?"
62020-13 = "To begin, this food package was specially created to treat nutritional deficiencies."
62020-18 = "While not to the extent of malnutrition, the medical exams for you and all the students residing here have revealed concerning issues."
62020-19 = "...However, saturated fat and sugar levels were elevated."
62020-20 = "Regardless, please make use of these rations to address your nutritional deficiency. You will find the taste to be sweet."
62020-21 = "500 calories per pack would be excessive for those of regular diets."
62020-22 = "However, these are designed to efficiently replenish the body."
62020-23 = "They are easily digested, as well as high in nutrition, vitamins, minerals, and fiber."
62020-24 = "Please consume two to three a day to begin."
62020-26 = "Th-Thank you..."
62020-27 = "And look! This is a water purifier straw! There's a built-in filter, so you could even drink out of a puddle with this!"
62020-28 = "It filters out microorganisms, and it can remove up to 99.9% of bacteria!"
62020-29 = "It's like a special tool that makes it so you can drink water from anything!"
62020-30 = "These portable ones can filter out, like, 700 liters of water!"
62020-31 = "Oh! But it can't filter out viruses, chemicals, salt, or heavy metals!"
62020-32 = "Um, what else...? Ah! Make sure to drink slowly!"
62020-33 = "Secondly, the straw has limits! If the water is too dirty or muddy, it won't be able to filter everything. Okay, I think I'm done talking now!"
62020-35 = "Does this mean we don't have to collect rainwater in pots anymore...or get sick after drinking still water...?"
62020-36 = "We also have first-aid kits. No one can predict an emergency, so it's important to be prepared!"
62020-37 = "This kit contains 30 types of basic medical supplies."
62020-38 = "Did you say THIRTY?!"
62020-39 = "Yes. It contains first-aid supplies, a small flashlight and battery pack, emergency manuals, hand warmers, and even an emergency foil blanket..."
62020-40 = "It's a standard first-aid kit from our Community Service Club!"
62020-42 = "That's their standard... Incredible..."
62020-45 = "I'm surprised that you're even holding classes in a makeshift infirmary like this."
62020-46 = "[s] \"Education knows no borders.\""
62020-47 = "I-I see..."
62020-48 = "But what's the point of all of this?"
62020-49 = "Especially stuff like math, like quadratic functions and calculus..."
62020-50 = "[s1] \"You might not use mathematical formulas in your everyday life.\"\n[s2] \"But learning to THINK mathematically will help you too.\""
62020-53 = "\"Think mathematically\"? What does that mean?"
62020-55 = "You've piqued my curiosity as well. Please elaborate, Sensei."
62020-56 = "Hmm... Math is just a language system that uses numbers as words? Okay, I think I get it."
62020-57 = "You're saying that math removes ambiguity and explains the world with numbers?"
62020-58 = "So people who study math tend to be skilled at defining and explaining the problem's cause, process, and results?"
62020-59 = "And, following that vein, it teaches you to gather and analyze evidence to guide you to a logical conclusion. I see."
62020-61 = "Huh...? Math is good for finding order and rules in chaos?"
62020-62 = "I still don't...get it."
62020-63 = "[s3] \"It can help you with being more persuasive.\"\n[s4] \"People like it when things are clear and easy to understand.\""
62020-68 = "[ns5] \"Studying math can help you with that.\"\n[ns6] \"So do your best to familiarize yourself with mathematical thinking!\""
62020-71 = "[ns7] \"And by doing so, you can sometimes get others to listen to you.\"\n[ns8] \"You can even show off a little at times!\""
62020-74 = "Huh..."
62020-75 = "..."
62020-76 = "That...doesn't sound that bad."
62020-77 = "..."
62020-81 = "If I had this \"mathematical thinking\" back then..."
62020-82 = "...would I still have gone through what I did?"
62020-83 = "What happened?"
62020-87 = "Th-That's..."
62020-97 = "They are?! Aren't they the ones who caused the Eden Treaty tragedy?"
62020-98 = "What are you delinquents doing in our neighborhood?!"
62020-99 = "...Ugh. This is why a child's upbringing is important."
62020-100 = "A NORMAL school would never let their kids run amuck like Arius does."
62020-104 = "A few...things happened..."
62020-105 = "When we left...Arius..."
62020-110 = "..."
62020-111 = "W-Waaah... I-I knew it! I knew this was gonna be scary... Adults are scary... The world is scary..."
62020-112 = "Hm...? Now that I think about it, isn't Sensei also an adult...?"
62020-113 = "[s9] \"Yeah. You're right...\"\n[s10] \"I apologize on behalf of adults.\""
62020-118 = "What? S-S-S-S-Sensei... You don't have to..."
62020-119 = "You don't have to..."
62020-123 = "...*sniff*..."
62020-124 = "...Yeah. The outside world can be like that."
62020-125 = "But none of it is a reflection on you."
62020-126 = "M-Misaki..."
62020-127 = "Well, it'd be easier to point our fingers at adults and the way the world works and call it a day."
62020-128 = "But nothing is black and white like that when it comes to life."
62020-129 = "..."
62020-130 = "So just ignore all of it. Erase stupid adults like that from your memory."
62020-131 = "You can't do anything about them, so accept and deal with what you can. And live."
62020-132 = "The world is already awful enough. Endure what you can."
62020-133 = "There was a time in my life I didn't understand why I had to keep on going either."
62020-134 = "..."
62020-135 = "But Sensei just told me to give it a try. So I am. I'm trying to live."
62020-141 = "...Fufu."
62020-142 = "H-Heehee..."
62020-143 = "Hmm."
62020-148 = "...What is it? You're getting on my nerves."
62020-149 = "[s] \"Misaki... You've grown up so fast... *sniff*\""
62020-153 = "Shut it, Sensei! Quit the crocodile tears! You're obviously enjoying yourself!"
62020-154 = "...You know, you're the biggest problem of all, Sensei. You better watch yourself."
62020-155 = "Wh-What...? Sensei...is...?"
62020-156 = "Yeah. They're the worst. An absolute menace."
62020-157 = "Sensei woke up one day and decided to give me hope. And followed through, too."
62020-158 = "...If they had been lying, I could've finally given up."
62020-159 = "But now that I can't, Sensei should take responsibility for what they did to me for the rest of our lives. But they haven't."
62020-160 = "That's Sensei. Watch your back."
62020-161 = "I-I see..."
62020-162 = "[s] \"Huh? Does that mean we're going to be together forever?\""
62020-165 = "Stop with those ambiguous, easy-to-misinterpret statements!!!"
62020-170 = "..."
62020-171 = "\"Vanitas vanitatum. All is in vain.\""
62020-172 = "Sao-Sao?"
62020-173 = "[s] \"...?\""
62020-174 = "It's a phrase I've heard countless times, but also a phrase that was misinterpreted countless times."
62020-175 = "Its original meaning was, since all things will pass, to take things in moderation."
62020-176 = "You, me, and everyone will dissolve into the past."
62020-177 = "One day, we might look back and think of this as nothing more than a hazy memory."
62020-178 = "Or we might not ever get to that day."
62020-179 = "The future is guaranteed, so to be too set in one's ways is unwise."
62020-180 = "...The only kind of \"future\" that should be predetermined are the numbers written in a contract."
62020-182 = "Fufu. Yes. That's very important."
62020-183 = "Heh. Heehee..."
62020-190 = "?!"
62020-192 = "!!!"
62020-193 = "[s11] \"(A trumpet again?)\"\n[s12] \"(Is that four now?)\""
62020-198 = "U-Um! There's something happening out here!"
62020-203 = "Keep calm! Panic never helps."
62020-209 = "What's the situation?"
62020-214 = "Joumae Saori...!"
62020-215 = "..."
62020-216 = "Over there."
62020-227 = "What are those?"
62020-228 = "...We don't know. They came out of nowhere. They seem to just be absorbing our attacks."
62020-232 = "(This feeling, I'm sure... It's similar to that thing that appeared the last time I heard the trumpet...!)"
62020-233 = "(Could it be...?)"
62020-234 = "What the heck are they?! First the trumpet, then four of these things?"
62020-235 = "Huh? What trumpet?"
62020-236 = "Are you serious?! It was blaring in my ear! Do we need to check your hearing?!"
62020-237 = "Wh-What about you, Subaru? Did you hear the trumpet?"
62020-242 = "No... I didn't hear anything..."
62020-244 = "See?!"
62020-245 = "That's weird..."
62020-255 = "Aaah?! They're coming this way!"
62020-267 = "Everyone, get behind us!"
62020-269 = "Gah?!"
62020-275 = "Is everyone okay? Did anyone get hurt?"
62020-276 = "We're ready, Cap—Mine!"
62020-278 = "Perfect. From now on..."
62020-279 = "..."
62020-283 = "The Anonymous Community Service Club shall serve as a bulwark against this threat!"
62020-285 = "Let's go."
62020-286 = "Not even a second of hesitation. Guess I saw that coming."
62020-287 = "Things like that don't matter anymore. Think of it as us protecting our old home."
62020-292 = "..."
62020-293 = "E-Everyone, be careful..."

[translation]
62020-1 = "第2話;號角聲"
62020-3 = "來來來，歡迎領取！"
62020-4 = "數量非常充足！請大家排隊依序領取！"
62020-11 = "好多各式各樣的東西哦，這些是什麼呢……？"
62020-13 = "首先，這些是治療營養不良的食品。"
62020-18 = "健康檢查的結果顯示，各位整體而言……#n雖然不到營養失調的程度，但普遍都有出現營養不良的症狀。"
62020-19 = "而且不知道什麼原因，飽和脂肪和糖分的攝取量稍微偏高……"
62020-20 = "總之，這是為了改善營養不良症狀而製作的治療食品。#n其特色在於香醇的口感和淡淡的甜味。"
62020-21 = "儘管以容量而言，每包500大卡的熱量對一般人有點高……"
62020-22 = "不過對於營養不良的患者來說，可以稱得上是最適合的食品。"
62020-23 = "口感柔軟且容易食用，保存的便利性和營養價值也很高。#n還可以攝取維生素、礦物質和膳食纖維。"
62020-24 = "一天吃兩到三份左右就足夠了。"
62020-26 = "謝，謝謝……"
62020-27 = "這是汙水淨化吸管！是能夠淨化水質的攜帶式濾水器哦！#n只要把它插入水窪裡面，直接吸水就可以了！"
62020-28 = "它能有效地過濾微生物，尤其細菌的去除率更是達到99.9%哦！"
62020-29 = "也就是說，這根吸管能夠把受到細菌汙染的水淨化為可飲用的水。"
62020-30 = "我們發放的個人用濾芯大約有700L的使用壽命！"
62020-31 = "不過它無法去除病毒、化學物質、鹽水或重金屬，所以請不要過度依賴哦。"
62020-32 = "其他要注意的是……第一，喝水的時候記得要慢慢喝。"
62020-33 = "第二，它無法淨化海水或泥沙含量過多的水……大概就是這些！"
62020-35 = "所以我們之後不用每次下雨都到處接水，也不會因為直接喝積水而拉肚子了嗎……？"
62020-36 = "我們也準備了急救箱哦。#n因為無法預測意外會發生在何時何地，所以急救藥物是必需品。"
62020-37 = "裡面一共裝有30種急救用品。"
62020-38 = "30種！？"
62020-39 = "是的。除了急救藥品之外，#n還有小型手電筒、電池、急救手冊、暖暖包和緊急鋁箔保暖毯……"
62020-40 = "是我們志工社團的標準急救箱哦。"
62020-42 = "標準型就已經這麼萬用了嗎……好厲害……"
62020-45 = "真讓人驚訝。#n居然連在臨時救護所也要上課啊……"
62020-46 = "[s]「學習之路本來就沒有盡頭和限制。」"
62020-47 = "原，原來如此……"
62020-48 = "但這些真的都用得到嗎？"
62020-49 = "尤其是數學……#n比如二次函數或微積分之類的……"
62020-50 = "[s1]「也許數學本身未必能派上用場。」\n[s2]「不過如果能學會用數學的方式思考，應該會有幫助吧？」"
62020-53 = "用數學的方式思考？那是什麼意思呢？"
62020-55 = "連我也有點好奇呢。#n請教教我們吧，老師。"
62020-56 = "唔嗯……是因為「數學是用數字來傳達意義的一種語言體系」嗎？#n我好像有點概念。"
62020-57 = "為了精確表達，數學排除了許多模糊的可能性，用數字來描述情況。"
62020-58 = "所以學數學的人在面對問題的時候，#n才會具備明確定義並說明其原因、過程、結果的能力對吧？"
62020-59 = "而且還能把各種依據跟命題整合起來，邏輯性地推導出「所以會這樣」的結果。"
62020-61 = "咦……？甚至還可以變得能從乍看無序的要素之中，找出秩序和規則……？"
62020-62 = "可是……這樣又有什麼好處呢？"
62020-63 = "[s3]「在緊要關頭，會比較容易說服別人哦。」\n[s4]「畢竟人都喜歡條理分明的說法。」"
62020-68 = "[ns5]「所以，就算只為了訓練數學的思考方式……」\n[ns6]「學數學都是一件有益的事。」"
62020-71 = "[ns7]「這樣一來，不僅有時候能讓別人願意聽自己說話……」\n[ns8]「偶爾還可以拿來耍帥一下！」"
62020-74 = "哦哦……"
62020-75 = "……"
62020-76 = "那樣……感覺不錯呢。"
62020-77 = "……"
62020-81 = "如果我那時候也能這樣思考的話……"
62020-82 = "是不是就不用經歷那種事了呢……？"
62020-83 = "你指的是什麼事？"
62020-87 = "就，就是……"
62020-97 = "奧利斯？啊……就是簽訂什麼伊甸園條約的時候，鬧得沸沸揚揚的那些人嗎？"
62020-98 = "那些問題學生，居然敢大喇喇地出現在這種地方……？"
62020-99 = "所以我才說沒受過教育的孩子實在是……"
62020-100 = "要是在正常的學園，那種事情搞不好根本不會發生……"
62020-104 = "發生了……很多事情。"
62020-105 = "在奧利斯外面……"
62020-110 = "……"
62020-111 = "噫，噫噫……真，真可怕……#n果然大人……和這個世界都很可怕……"
62020-112 = "咦……？可是仔細想想，老師也是大人呢……？"
62020-113 = "[s9]「嗯，是啊……」\n[s10]「身為一個大人，我向你道歉。」"
62020-118 = "咦？老，老老老老，老師你……沒有必要……"
62020-119 = "沒有必要，那樣的……"
62020-123 = "嗚，嗚嗚……"
62020-124 = "……嗯。外面的世界確實有點那種傾向。"
62020-125 = "不過那並不是你的錯。"
62020-126 = "美，美咲同學……"
62020-127 = "把所有壞事都歸咎於外面的世界跟大人，這樣或許能讓人感到輕鬆……"
62020-128 = "但這個世界，是沒辦法單純用二分法劃分的。"
62020-129 = "……"
62020-130 = "那種東西直接無視就好。#n把愚蠢的大人從腦袋裡刪除。"
62020-131 = "只接受自己能承受的部分，然後活下去就行了。"
62020-132 = "光是承受那些，世界就已經足夠可怕了。"
62020-133 = "我以前也想不通，這種世界有什麼活下去的必要……"
62020-134 = "……"
62020-135 = "只是因為老師叫我想辦法試試看，所以才姑且活到了現在。"
62020-141 = "……呵呵。"
62020-142 = "嘿，嘿嘿……"
62020-143 = "嗯。"
62020-148 = "……怎樣？你們什麼意思？#n我開始有點不爽了哦？"
62020-149 = "[s]「我們美咲……長大了……嗚嗚……」"
62020-153 = "老師你給我安靜！#n少在那邊故作感動地假哭！"
62020-154 = "話說老師其實才是最大的問題吧……#n你也要小心這個人。"
62020-155 = "咦……？是，是嗎？"
62020-156 = "沒錯，這個人的問題最大，真的是個大壞蛋。"
62020-157 = "因為他會隨便帶給別人希望，還會證明那並不只是單純的謊言。"
62020-158 = "……如果全部都是騙人的，至少還能及早放棄。"
62020-159 = "既然都做到這種程度，乾脆負起一輩子的責任就好了……#n可是這個人八成死也不會同意吧。"
62020-160 = "總之他就是這樣的人，勸你最好也小心一點。"
62020-161 = "這，這樣啊……"
62020-162 = "[s]「嗯？那我只要一輩子負責就好了嗎？」"
62020-165 = "不要說那種奇怪的話啦，你這個大壞蛋！！！"
62020-170 = "……"
62020-171 = "「一切皆為徒勞。無論去向何處，終將化為虛無。」"
62020-172 = "沙醬？"
62020-173 = "[s]「……？」"
62020-174 = "這句話我已經聽到厭煩……也受夠它的意義被人誤解了。"
62020-175 = "其實它想表達的意思，只不過是「一切都會過去，所以凡事適可而止就好」而已。"
62020-176 = "無論我們也好，你們也罷……最終都會成為過去。"
62020-177 = "也許今後回想起來，只會淡淡地笑著說「啊，當時還發生過那種事啊」。"
62020-178 = "當然，那一天也可能永遠不會到來……"
62020-179 = "畢竟未來的事沒有人可以確定。#n想法過於狹隘也不是件好事。"
62020-180 = "……真正必須確定的未來，大概就只有合約上寫的金額了吧。"
62020-182 = "呵呵，是啊。那確實很重要呢。"
62020-183 = "耶，耶嘿嘿……"
62020-190 = "！！"
62020-192 = "！！！"
62020-193 = "[s11]（號角聲……？）\n[s12]（這應該……已經是第四次了……？）"
62020-198 = "不，不好意思打擾了！#n現在外面出大事了！"
62020-203 = "請各位先冷靜下來！陷入恐慌反而會更危險的！"
62020-209 = "發生什麼事了？"
62020-214 = "錠前沙織……！"
62020-215 = "……"
62020-216 = "在那邊。"
62020-227 = "那是……什麼！？"
62020-228 = "我也不知道……是剛才突然出現的。#n攻擊似乎有效，但不是很明顯。"
62020-232 = "（這種感覺……沒錯，跟伴隨著號角聲出現的「那個」非常類似……！）"
62020-233 = "（那個該不會是……？）"
62020-234 = "那到底是什麼啊……？#n剛聽到號角聲就出現了……？而且還有四個……？"
62020-235 = "嗯？號角聲？#n我什麼聲音都沒聽到啊？"
62020-236 = "什麼？那麼大聲你都沒聽到？#n你的耳朵是不是有問題啊？"
62020-237 = "那，那前輩呢？#n前輩有聽到號角聲嗎？"
62020-242 = "不……我也沒聽到什麼聲音……"
62020-244 = "看吧！"
62020-245 = "怎麼這麼奇怪……？"
62020-255 = "哇啊啊啊！？那個東西往這邊靠過來了！"
62020-267 = "大家，請躲到我們身後！"
62020-269 = "哇！？"
62020-275 = "沒事吧？有沒有人受傷？"
62020-276 = "我們準備好了！團……前輩！"
62020-278 = "好，那麼接下來……"
62020-279 = "……"
62020-283 = "我們「無名的公益服務團體」將會盡力保護大家！"
62020-285 = "我們也上吧。"
62020-286 = "已經幾乎是反射動作了啊……我就覺得會這樣。"
62020-287 = "就當作是在守護母校吧。#n無論那些東西的真面目究竟是什麼都一樣。"
62020-292 = "……"
62020-293 = "大，大家請小心……"

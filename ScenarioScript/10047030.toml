10047030-6 = "[ns] \"오…… 와일드헌트의 미술관은 이런 느낌이구나.\""
10047030-7 = "3;에리;03;네. #n시대를 초월해 사랑받는, 걸작들이 전시되어 있죠.\n#3;a"
10047030-8 = "3;에리;00;작품뿐만 아니라, 건물 자체가 하나의 예술품이에요.\n#3;em;[음표]"
10047030-9 = "#st;[0,0];instant;1;"
10047030-10 = "#clearST"
10047030-11 = "3;에리;00\n#3;m2\n#wait;800"
10047030-12 = "3;에리;03;자, 이쪽의 돔 구조를 보세요. 완만하고 아름다운 형태죠?"
10047030-13 = "3;에리;05;놀랍게도 이 건물이 지어질 당시엔 높은 구조물로 권위를 나타내려는 경향이 강했어요.#n하지만 이 미술관은 달랐죠."
10047030-14 = "3;에리;11;높이로 권위를 나타내기보다, 완만한 돔 형태로 아름다움이라는 본질에 집중한 거예요!"
10047030-15 = "#st;[0,0];instant;1;"
10047030-16 = "#clearST"
10047030-17 = "3;에리;11\n#3;d\n#3;greeting\n#wait;800"
10047030-18 = "#all;hide"
10047030-19 = "3;에리;07;자, 보세요! 이 황금비율과 구조를! 이것이 바로 키보토스 예술 변혁의 순간!\n#3;a\n#3;em;[반짝]\n#3;closeup"
10047030-20 = "[s] \"그, 그런 것 같네…….\""
10047030-21 = "2;카노에;00\n4;츠무기;08;후후, 저희는 살짝 뒤로 빠져 있을까요?\n#4;em;[재잘]\n#3;hide"
10047030-22 = "2;카노에;02;이런 설명은…… 에리 쨩이 잘하니까……."
10047030-23 = "3;레나;09;계속 이런 텐션으로 가는 거야……?!\n#3;em;[땀]\n#2;hide\n#4;hide"
10047030-24 = "#all;hide"
10047030-25 = "3;에리;05;자, 이제 이쪽을 보시죠! 이 회화는 <창세의 초상>이라는 이름으로, 저희 와일드헌트를 대표하는 작품입니다!\n#3;a"
10047030-26 = "3;에리;07;엄청난 수의 망령들이 석양을 내달리는 이 압도적인 모습! 대단하지 않나요?\n#3;em;[반짝]"
10047030-27 = "[s] \"응. 상당히 인상적이네.\""
10047030-28 = "3;에리;08;저는 이 작품을 마주한 순간 엄청난 전율을 느꼈답니다.#n이런 오컬트 색채가 강한 작품이 <창세의 초상>이라니!\n#3;a\n#3;closeup"
10047030-29 = "3;에리;03;저도, 이런 작품을 그릴 수 있게 되고 싶어요……#n제 오리지널리티가 빛나― 학원을 대표할, 후세에 남을 작품을요.\n#3;closeup"
10047030-30 = "#st;[0,0];instant;1;"
10047030-31 = "#clearST"
10047030-32 = "3;에리;99\n#3;closeup\n#wait;1200"
10047030-33 = "3;에리;05;……그래요. 언젠간 반드시 할 수 있을 거라 믿어요.\n#3;closeup"
10047030-34 = "[s] \"기대되네. 완성되면 꼭 보여줘.\""
10047030-35 = "3;에리;11;뉴후후, 물론이죠!\n#3;em;[재잘]"
10047030-36 = "3;에리;00;그리고…… 오컬트를 추구하는 것이야말로, 걸작의 탄생에 이어질 테니까요."
10047030-37 = "[s] \"그런 거야?\""
10047030-38 = "3;에리;12;사실 예술의 기원은 오컬트와 함께했다 해도 과언이 아니거든요.\n#3;em;[음표]"
10047030-39 = "3;에리;00;영혼, 마법, 유령 같은 초자연적 존재를 마주하고― #n그것들을 고찰한 끝에 다양한 예술이 탄생했죠."
10047030-40 = "3;에리;05;오컬트는 그냥 과장된 게 아니에요.#n이미 우리의 문화나 일상에 깊게 뿌리내리고 있어요!"
10047030-41 = "3;에리;03;그걸 증명하고 있는 게 이 <창세의 초상>이라는 작품이랍니다.\n#3;em;[재잘]"
10047030-42 = "3;에리;11;망령들을 그린 그림이 학원의 대표작으로 여겨지고 있다. #n즉! 학원의 기원은, 오컬트와 연결되어 있다고 생각하는 게 자연스럽겠죠!"
10047030-43 = "3;에리;05;이 생각에 도달하게 된 이유는, 아직 있어요……!\n#3;em;[!]"
10047030-44 = "3;에리;02;창세의 초상 옆에 전시된 석상 보이시죠? 그 석상이 가리키는 방향엔 출입이 금지된 옛 종탑이 있어요."
10047030-45 = "3;에리;99;모두의 기억에 잊혀 <이름 없는 종탑>이라 불리는 그 종탑엔 한 가지 전설이 있죠."
10047030-46 = "3;에리;05;그건…… <멸망의 날, 종은 혼자 노래한다>.\n#3;em;…"
10047030-47 = "3;에리;08;망령의 행진과 멸망의 종탑! 아무리 봐도 우연이 아니잖아요?\n#3;hophop\n#3;em;[음표]"
10047030-48 = "[s] \"그런 것 같기도……?\""
10047030-49 = "3;에리;11;이게 끝이 아니랍니다! 옛 구전에 의하면, 와일드헌트의 주요 시설을 연결하면 <거대한 마법진>이 완성된다고 해요!\n#3;em;[재잘]"
10047030-50 = "3;에리;07;보름달이 뜨는 날 밤 그 마법진을 완성하면 놀라운 일이 벌어진다죠!"
10047030-51 = "[s] \"오오……!\""
10047030-52 = "3;에리;08;그 외에도 피눈물을 흘리는 석상, 고개가 움직이는 인물화, 혼자 연주하는 피아노 등등, 정말 수많은 오컬트 요소가 있어요!\n#3;a\n#3;closeup"
10047030-53 = "3;에리;11;이 미술관에도 혼자 움직이는 악마상이 있죠!\n#3;closeup"
10047030-54 = "3;에리;07;이런 걸로 미루어 보면 예술엔 오컬트가 깊이 관여하고 있는 게 분명해요!\n#3;em;[반짝]\n#3;closeup"
10047030-55 = "3;레나;09;……어째 점점 뒤로 갈수록 도시전설 같은 이야기가 되고 있는데.\n#3;em;[땀]"

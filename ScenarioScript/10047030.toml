[translation]
10047030-1 = "ตอนที่ 3;รหัสยศาสตร์ในศิลปะ"
10047030-2 = "(สถานที่ที่เด็กๆ ชมรมวิจัยรหัสยศาสตร์พามาก็คือ...)"
10047030-4 = "พิพิธภัณฑ์ศิลปะ สถาบันศิลปะไวลด์ฮันต์"
10047030-6 = "[ns] \"โอ้... พิพิธภัณฑ์ศิลปะของไวลด์ฮันต์เป็นอย่างนี้สินะ\""
10047030-7 = "ค่ะ ที่นี่มีผลงานชิ้นเอกที่ได้รับความสนใจข้ามยุคสมัยจัดแสดงอยู่หลายชิ้นเลยค่ะ"
10047030-8 = "นอกเหนือจากงานศิลปะพวกนี้แล้ว อาคารแห่งนี้ก็นับว่าเป็นงานศิลปะด้วยค่ะ"
10047030-12 = "มาดูโดมทางนี้สิคะ เป็นรูปทรงที่ทั้งอ่อนโยนและสวยงามเลยว่ามั้ยคะ?"
10047030-13 = "ที่น่าประหลาดใจก็คือ ในตอนที่อาคารหลังนี้ถูกสร้างขึ้น สังคมมีแนวโน้มที่จะแสดงอำนาจผ่านอาคาร#nที่สูงใหญ่ แต่ว่าพิพิธภัณฑ์ศิลปะแห่งนี้ต่างออกไปค่ะ"
10047030-14 = "แทนที่จะแสดงอำนาจผ่านความสูงของตัวอาคาร กลับเน้นไปที่แก่นแท้ของความงามด้วยรูปทรงโดม#nอันอ่อนโยนค่ะ!"
10047030-19 = "เอาละ ดูทางนี้สิคะ! โครงสร้างกับอัตราส่วนทองคำนี้! นี่ละค่ะ ช่วงเวลาแห่งการปฏิรูปศิลปะของคิโวทอส!"
10047030-20 = "[s] \"กะ... ก็น่าจะเป็นอย่างนั้นนะ...\""
10047030-21 = "ฮุฮุ พวกฉันขอเป็นฝ่ายเดินตามแล้วกันค่ะ"
10047030-22 = "การอธิบายเรื่องพวกนี้น่ะ... เป็นงานถนัดของเอริจังอยู่แล้ว..."
10047030-23 = "จะพลังงานเหลือล้นแบบนี้ไปเรื่อยๆ เลยเหรอ...?!"
10047030-25 = "เอาละ ต่อไปเรามาดูทางนี้กันค่ะ! ภาพวาดนี้มีชื่อว่า <ภาพเหมือนการสร้างโลก> เป็นผลงานที่เป็น#nสัญลักษณ์ของไวลด์ฮันต์ของพวกเราเลยค่ะ!"
10047030-26 = "ดูเหล่าปีศาจที่วิ่งออกไปหาพระอาทิตย์ตกดินสิคะ! ยอดเยี่ยมไปเลยว่ามั้ยคะ?"
10047030-27 = "[s] \"อื้อ น่าประทับใจเลยนะ\""
10047030-28 = "ตอนที่ได้เห็นผลงานชิ้นนี้ ฉันก็ตื่นเต้นจนตัวสั่นเลยค่ะ#nไม่คิดเลยว่าจะได้ชม <ภาพเหมือนการสร้างโลก> ที่เต็มไปด้วยสีสันของรหัสยศาสตร์!"
10047030-29 = "ฉันเองก็อยากวาดภาพแบบนี้ได้บ้างนะคะ... ภาพที่ความคิดริเริ่มของฉันจะเปล่งประกาย... ไม่สิ จะเป็นสัญลักษณ์ของโรงเรียนและอยู่ในความทรงจำของคนรุ่นต่อไปน่ะค่ะ"
10047030-33 = "ใช่ค่ะ... ฉันเชื่อว่าสักวันฉันจะทำได้"
10047030-34 = "[s] \"ครูก็อยากเห็นนะ แล้วเอาผลงานมาอวดครูบ้างล่ะ\""
10047030-35 = "อุฮุฮุ แน่นอนอยู่แล้วค่ะ!"
10047030-36 = "ฉันเชื่อว่า... การแสวงหารหัสยศาสตร์จะนำไปสู่การสร้างสรรค์ผลงานชิ้นโบแดงของฉันค่ะ"
10047030-37 = "[s] \"ขนาดนั้นเลยเหรอ?\""
10047030-38 = "ที่จริงแล้ว จะบอกว่าต้นกำเนิดของศิลปะคือรหัสยศาสตร์ก็ได้ค่ะ"
10047030-39 = "ศิลปะแขนงต่างๆ เกิดขึ้นจากการเผชิญหน้ากับสิ่งเหนือธรรมชาติ ทั้งวิญญาณ เวทมนตร์ ภูตผีปีศาจ... พอได้ศึกษาค้นคว้าสิ่งเหล่านี้ ศิลปะก็ถือกำเนิดขึ้นค่ะ"
10047030-40 = "รหัสยศาสตร์ไม่ใช่เรื่องเกินจริงหรอกค่ะ#nความจริงแล้วมันหยั่งรากลึกอยู่ในวัฒนธรรมและชีวิตประจำวันของเราค่ะ!"
10047030-41 = "และสิ่งที่พิสูจน์เรื่องนั้นได้ก็คือ <ภาพเหมือนการสร้างโลก> ที่อยู่ตรงนี้ยังไงล่ะคะ"
10047030-42 = "ภาพวาดภูตผีปีศาจได้รับการยอมรับว่าเป็นผลงานที่เป็นสัญลักษณ์ของโรงเรียน#nนั่นก็หมายความว่า! ต้นกำเนิดของโรงเรียนเชื่อมโยงอยู่กับสิ่งลึกลับค่ะ!"
10047030-43 = "มีสาเหตุอื่นที่ทำให้ฉันเกิดความคิดแบบนี้นะคะ...!"
10047030-44 = "มาสเตอร์เห็นรูปปั้นหินที่อยู่หน้าภาพวาดที่ว่าหรือเปล่าคะ? รูปปั้นหินตรงนั้นชี้ไปทางหอระฆังเก่าที่ถูก#nห้ามเข้าค่ะ"
10047030-45 = "หอระฆังแห่งนั้นไม่เป็นที่จดจำจนถูกเรียกว่าเป็น <หอระฆังไร้ชื่อ> แต่ก็ยังมีตำนานเล่าขานอยู่อย่างหนึ่งค่ะ"
10047030-46 = "ว่ากันว่า... <ในวันสิ้นโลก ระฆังจะขับร้องก้องกังวาน>"
10047030-47 = "หอระฆังแห่งขบวนแห่และการล่มสลายของเหล่าวิญญาณ! นี่ไม่ใช่เรื่องบังเอิญแน่นอนค่ะ!"
10047030-48 = "[s] \"ก็อาจจะเป็นอย่างนั้นนะ...?\""
10047030-49 = "ยังไม่จบแค่นี้นะคะ! มีตำนานเก่าแก่หนึ่งบอกไว้ว่า ถ้าเราเชื่อมอาคารหลักๆ ของไวลด์ฮันต์เข้าด้วยกัน จะเกิดเป็น <วงเวทขนาดมหึมา> ค่ะ!"
10047030-50 = "และถ้าทำให้วงเวทนั้นปรากฏขึ้นในคืนพระจันทร์เต็มดวง ก็จะเกิดสิ่งอัศจรรย์ขึ้นด้วยค่ะ!"
10047030-51 = "[s] \"โอ้ว...!\""
10047030-52 = "นอกจากนี้ยังมีสิ่งลึกลับอื่นอีกนับไม่ถ้วน ทั้งรูปปั้นหินที่หลั่งน้ำตาเป็นสายเลือด ภาพเหมือนที่คนในภาพขยับหัวได้ แล้วก็เปียโนที่เล่นเองค่ะ!"
10047030-53 = "ในพิพิธภัณฑ์แห่งนี้ก็มีรูปปั้นปีศาจที่ขยับเองได้ด้วยนะคะ!"
10047030-54 = "ถ้าพิจารณาจากสิ่งเหล่านี้แล้ว มันชัดเจนมากว่าสิ่งลึกลับมีส่วนเกี่ยวข้องอย่างลึกซึ้งกับศิลปะค่ะ!"
10047030-55 = "ทำไมยิ่งเล่ายิ่งรู้สึกว่ามันเหมือนตำนานเมืองเข้าเรื่อยๆ นะ..."
10047030-56 = "ฮุฮุ เรื่องราวของเอริชวนให้หลงใหลเสมอเลยค่ะ"
10047030-57 = "เดี๋ยวก่อน... มีคนมา"
10047030-64 = "โอ๊ะ? เอริจังนี่นา สวัสดี เอริจัง!"
10047030-65 = "สวัสดี~!"
10047030-66 = "เอ๊ะ เอ๋...?"
10047030-67 = "หืม? คนที่อยู่ข้างๆ คือใครเหรอ? ไม่เคยเจอมาก่อนเลย"
10047030-68 = "คะ... คะ... คุณครูของชาเล่ต์ค่ะ!"
10047030-73 = "[ns] \"สวัสดี ทุกคน\""
10047030-75 = "ยินดีที่ได้พบค่ะ คุณครู กำลังทัวร์โรงเรียนกับเอริจังอยู่สินะคะ"
10047030-76 = "รูมเมทของเอริจังก็มาด้วยสินะ สวัสดีค่ะ"
10047030-81 = "อืม น่าผิดหวังนิดหน่อยนะ... เอริจัง ทีกับพวกฉันละไม่ค่อยไปไหนมาไหนด้วยเลย"
10047030-82 = "อ่า...! เอ่อ... ฉะ... ฉันไม่ได้ตั้งใจให้เป็นอย่างนั้นนะคะ...!"
10047030-83 = "อะฮะฮ่า ฉันรู้น่า ก็แค่แกล้งพูดไปเท่านั้นน่ะ"
10047030-84 = "ไว้มาเที่ยวเล่นกับพวกฉันบ้างล่ะ จะให้เจอกันแต่ในห้องเรียนก็เสียดายแย่นะ"
10047030-85 = "อะ... อ่า... ควรตอบว่ายังไงดี..."
10047030-90 = "อื้อ...! เวลาแบบนี้ต้องพึ่งการชี้นำของอาร์คาน่า...!"
10047030-94 = "อะฮะฮ่า... คราวหน้ามาอ่านไพ่ดูดวงให้บ้างนะ"
10047030-95 = "งั้นพวกฉันไปก่อนละ~ แล้วเจอกันใหม่นะ!"
10047030-96 = "ไว้ตอนนั้นมาจัดปาร์ตี้น้ำชากันดีกว่าเนอะ"
10047030-97 = "ค่ะ... ค่ะ! ละ... ละ... แล้วฉันจะตั้งตารอนะคะ!!"
10047030-103 = "[ns1] \"อืม... มีเรื่องอะไรกันหรือเปล่า?\"\n[ns2] \"มีเรื่องอะไรกับเพื่อนกลุ่มนั้นเหรอ?\""
10047030-106 = "ปะ... เปล่าค่ะ! ไม่มีเรื่องอะไรทั้งนั้นค่ะ!"
10047030-107 = "ทุกคนทั้งเป็นมิตรและอ่อนโยนกับฉัน... ก็เลยยิ่งเป็นปัญหามากกว่าค่ะ..."
10047030-111 = "อะ... อะฮะฮะฮ่า! ระ... เรื่องนี้เอาไว้คุยทีหลังดีกว่า..."
10047030-112 = "[ns] (คงมีเหตุผลส่วนตัวละเนอะ วันนี้อย่าเพิ่งถามแล้วกัน) "
10047030-113 = "แหะๆๆ... ขอโทษนะคะ การทัวร์โรงเรียนสะดุดเพราะฉันแท้ๆ เลย"
10047030-117 = "งั้นเราไปทำ <อันนั้น> กันเถอะ... ฮิฮิ"
10047030-118 = "อ่า... หมายถึง <อันนั้น> ใช่มั้ยคะ?"
10047030-122 = "อีกแล้วเหรอ...?! ฉันไม่เอาด้วยหรอกนะ?!"
10047030-123 = "[ns] \"คิดจะทำอะไรกันน่ะ?\""
10047030-124 = "ถ้าได้ทำ... เดี๋ยวก็รู้เอง..."
10047030-129 = "เอาละ ฉันจะเริ่มแล้วนะทุกคน คุณครูก็ด้วย... เอาละ"
10047030-130 = "อ๊ะ... ค่ะ...!"
10047030-136 = "ถึงแล้ว..."
10047030-137 = "[ns] \"หืม? นี่มันที่เดิมกับเมื่อกี้ไม่ใช่เหรอ?\""
10047030-138 = "ถึงจะเป็นจุดเดิม แต่พื้นที่ตรงนี้มันเปลี่ยนไปแล้วละ"
10047030-139 = "เมื่อกี้พวกเรา... เพิ่งทำ <พิธีกรรม> กันไป"
10047030-140 = "การเดินวนรอบพิพิธภัณฑ์ศิลปะ...#nการทำแบบนี้มีความหมายวิเศษซ่อนอยู่ค่ะ"
10047030-141 = "[s] \"ความหมายที่ว่าคือ...?\""
10047030-142 = "มันคือการทำเพื่อพูดคุยกับปีศาจตนนี้ค่ะ!"
10047030-146 = "รูปปั้นปีศาจนี้ถูกสร้างขึ้นนานมาแล้วเพื่อเชื่อมสัมพันธ์กับทรีนิตี้ และมันก็มีความหมายเชิงเวทมนตร์ว่า#nช่วยขับไล่ปีศาจตนอื่นๆ ได้ค่ะ"
10047030-147 = "มันถูกวางประดับไว้บนยอดมหาวิหารทรีนิตี้อยู่หลายปี แต่ตอนนี้ถูกย้ายมาไว้ที่นี่เพื่ออนุรักษ์ไว้เป็น#nทรัพย์สินทางวัฒนธรรมค่ะ"
10047030-148 = "ถ้าเป็นปีศาจที่มีประวัติยาวนานขนาดนี้ละก็ เสียงของเราต้องไปถึงแน่นอน!"
10047030-149 = "ฮิฮิ... มุกิจัง เริ่มเลยเถอะ"
10047030-150 = "ค่ะ งั้นฉันจะเริ่มการสนทนากับปีศาจเลยนะคะ~!"
10047030-158 = "ฉันคือผู้ก่อการร้ายแห่งศิลปะ...!!!"
10047030-159 = "หากเมื่อวานฉันยึดครองภาพวาด... วันนี้ฉันก็จะยึดครองวรรณกรรม!!!"
10047030-163 = "โว้ววววววว!!!"
10047030-165 = "ว้าว...! เสียงร็อกๆ ของสึมุกิ ได้ฟังทีไรก็ขนลุกทุกทีเลยค่ะ"
10047030-166 = "มันน่าฟังตรงไหนเนี่ย?!"
10047030-167 = "[ns] \"ระ... เราคุยกับปีศาจด้วยวิธีนี้ได้จริงๆ เหรอ?\""
10047030-168 = "แน่นอนสิคะ! ดูตรงนั้นสิ!"
10047030-172 = "(ตำแหน่งของรูปปั้นปีศาจเปลี่ยนไป...!)"
10047030-173 = "ฮิฮิ... พวกเราไม่ได้ไปแตะต้องสักนิดเลยนะ"
10047030-174 = "มีปีศาจสิงอยู่จริงๆ ด้วยค่ะ!"
10047030-175 = "จะ... จะยังไงก็ช่าง เรารีบหนีกันดีกว่า!"
10047030-176 = "มาทำอะไรแบบนี้ที่นี่มันอันตรายนะ!"
10047030-177 = "นั่นสินะคะ ขืนเรายังอยู่แบบนี้ <สิ่งเลวร้าย> ที่รูปปั้นปีศาจอัญเชิญออกมาต้องมาโจมตีพวกเราแน่ค่ะ!"
10047030-181 = "[ns] \"สิ่งเลวร้าย...?\""
10047030-183 = "ค่ะ การเล่นสนุกเป็นเรื่องที่ดี แต่การถอนกำลังแต่พอดีก็เป็นสิ่งสำคัญเหมือนกัน"
10047030-184 = "ทุกคนคะ เรารีบไปกันเถอะค่ะ"
10047030-195 = "(ถึงจะเกิดขึ้นอย่างกะทันหัน แต่รูปปั้นปีศาจก็ขยับได้จริงๆ)"
10047030-196 = "(แล้ว <สิ่งเลวร้าย> ที่ว่าคืออะไรกันนะ...)"
10047030-200 = "[ns] \"เกิดเรื่องอะไรขึ้นที่โรงเรียนนี้เนี่ย...?\""

[translation]
10047030-1 = "Episode 3;Occult in Art"
10047030-2 = "And the Occult Society took me to the..."
10047030-4 = "Wildhunt Art Gallery"
10047030-6 = "[ns] \"Oh... So this is what your art gallery looks like.\""
10047030-7 = "Yes. It displays beloved and timeless masterpieces."
10047030-8 = "And, beyond the showcased works, the whole building is an art piece."
10047030-12 = "Now, look at this dome structure over here. Isn't the curve so beautiful?"
10047030-13 = "When the building was constructed, the trend was to create brutalist, authoritarian structures. But this art gallery was different."
10047030-14 = "Instead of being cliche, it focused on the nature of beauty through a curved dome!"
10047030-19 = "Do you see it? That's an intentional golden ratio! This is a transformative moment in Kivotos art!"
10047030-20 = "[s] \"Th-That sounds right...\""
10047030-21 = "Heh, let us back up and admire it."
10047030-22 = "Eri...is quite talented at explanations."
10047030-23 = "We're really going to keep this up?"
10047030-25 = "Now, look over here! This painting is called the Portrait of Genesis. It very much represents the spirit of Wildhunt!"
10047030-26 = "Bask in the visual of countless wraiths charging into the dying sunset! Isn't it amazing?"
10047030-27 = "[s] \"Yes. It's very impressive.\""
10047030-28 = "I nearly cried when I first saw it. The Portrait of Genesis is undoubtedly also a tremendous part of occult history!"
10047030-29 = "I wish I could make something like this. It's so original, it represents the school, and it will be admired by future generations."
10047030-33 = "...Yes. I believe I can paint something like this one day."
10047030-34 = "[s] \"I look forward to it. Show me when you finish!\""
10047030-35 = "Nyuhuhu. Of course!"
10047030-36 = "After all...pursuing the occult will surely lead me to creating a masterpiece."
10047030-37 = "[s] \"Is that how it works?\""
10047030-38 = "Truthfully, I believe art and the occult were born in tandem."
10047030-39 = "After witnessing supernatural things like souls, magic, and ghosts...and then studying them, people sought to express the unthinkable. And art was the only way."
10047030-40 = "The occult is not a theory. It's already rooted deeply in our culture and lives!"
10047030-41 = "And you can see all the proof in the Portrait of Genesis."
10047030-42 = "This painting, one riddled with wraiths, is the gem of the school. And that means that the heart of the academy is linked to the occult!"
10047030-43 = "I can back this all up with evidence, by the way!"
10047030-44 = "Do you see the stone statue next to the Portrait of Genesis? That statue used to point directly at an old bell tower, one that no one was allowed to enter."
10047030-45 = "They called it the \"Nameless Bell Tower\" because its true name was lost. However, its prophecy remained."
10047030-46 = "That is...\"On Doom's Day, the Bell Sings Alone!\""
10047030-47 = "A marching army of wraiths practically pointing to a doomed bell tower! This surely can't be a coincidence?"
10047030-48 = "[s] \"Maybe...?\""
10047030-49 = "That's not all! According to ancient folklore, if you connect the major facilities of Wildhunt, a magical circle will form!"
10047030-50 = "That's right. Like a magical glyph, Master. And if you complete this shape under the light of the full moon, true magic will happen!"
10047030-51 = "[s] \"Wow...!\""
10047030-52 = "Right?! The occult is everywhere! And we also have a statue that cries blood, a portrait that moves its head, and a piano that plays itself."
10047030-53 = "Even in this gallery, there's that demon statue that moves independently!"
10047030-54 = "How can you look at all this magic and not conclude that the arts and the occult are intertwined?"
10047030-55 = "...The more she talks, the more it all sounds like urban legend..."
10047030-56 = "Heehee. Eri always has the coolest stories."
10047030-57 = "...Wait, someone's coming."
10047030-64 = "Oh? It's Eri. Hello, Eri!"
10047030-65 = "Hiya!"
10047030-66 = "H-Huh...?"
10047030-67 = "Hm? Who's your friend? I don't think we're acquainted."
10047030-68 = "Th-Th-This is Schale's Sensei!"
10047030-73 = "[ns] \"Hello, everyone.\""
10047030-75 = "Welcome, Sensei. I suppose Eri is giving you the grand gallery tour."
10047030-76 = "And hello, Eri's fascinating roommates!"
10047030-81 = "I'm disappointed to miss out on all the fun. Hey, Eri, how come you never hang with US like this?"
10047030-82 = "Ah...! Uh, th-that isn't on purpose...!"
10047030-83 = "Ha, I know. I was just joking."
10047030-84 = "But we should do something soon. It's kind of sad that we only talk in class."
10047030-85 = "A-Ah... Well, uh... What should I say?"
10047030-90 = "Ah...! I must consult the Arcana!"
10047030-94 = "Ahaha... Oh, I think we'll save the tarot reading for next time, Eri."
10047030-95 = "We've got a lot to do! See you later!"
10047030-96 = "Let's have...tea, or something. It'll be fun."
10047030-97 = "A-Absolutely! I-I-I look forward to it!!"
10047030-103 = "[ns1] \"Hm...\"\n[ns2] \"Is there a problem with you three?\""
10047030-106 = "N-No! It's nothing!"
10047030-107 = "Everyone's nice, and kind, and normal, and talented... It's me th-that's..."
10047030-111 = "Ah, ahahahaha! W-We can get into it later..."
10047030-112 = "[ns] \"(There seems to be a story here. I better let it go.)\""
10047030-113 = "Ahaha... Sorry, it's my fault."
10047030-117 = "...Then, let's show Sensei...that. Heehee."
10047030-118 = "...Ah, you mean...that. Yes."
10047030-122 = "No, not again! It's too much! Let's not."
10047030-123 = "[ns] \"What are you planning on doing?\""
10047030-124 = "You'll know...once we do it..."
10047030-129 = "Let's begin. Everyone. You too, Sensei... Follow us."
10047030-130 = "Ah, yes...!"
10047030-136 = "...We have arrived."
10047030-137 = "[ns] \"Hm? Isn't this the same place as before?\""
10047030-138 = "It looks like the same place, but we have entered a different realm."
10047030-139 = "We...just did a ritual together."
10047030-140 = "We drew a circle by walking around the art gallery. It was our own magic circle that cast a little..."
10047030-141 = "[s] \"Cast what...?\""
10047030-142 = "...Cast a spell to talk to the demon!"
10047030-146 = "Wildhunt created this statue as a gift to Trinity long ago. Like a gargoyle, it protects and is meant to chase away other, worse, demons."
10047030-147 = "It guarded the apex of Trinity Cathedral for ages, but it was gifted back to us, so we could celebrate our cultural heritage."
10047030-148 = "Our voices will surely awaken such a historical, magical demon!"
10047030-149 = "Heehee... Mugi, lead us."
10047030-150 = "Yes. I shall commune with the demon!"
10047030-158 = "I. AM. THE TERRORIST OF ART!!!"
10047030-159 = "I DOMINATED THE ANCIENT PAINTS AND WILL CONQUER ALL THE BOOKS!!!"
10047030-163 = "OOOWAAAH!!!"
10047030-165 = "Whoa...! Tsumugi's death metal voice is so awesome. Gets me every time."
10047030-166 = "Is it really something to be adored?"
10047030-167 = "[ns] \"C-Can you really talk to a demon like this?\""
10047030-168 = "Sure! See for yourself."
10047030-172 = "The statue moved!"
10047030-173 = "Heehee... We didn't lift a finger."
10047030-174 = "I knew it! Demons DO exist!"
10047030-175 = "Y-Yeah, great. Let's beat it!"
10047030-176 = "You know it's dangerous to stay!"
10047030-177 = "I see. If we remain here, the Accursed summoned by the demon statue shall attack us!"
10047030-181 = "[ns] \"'Accursed'...?\""
10047030-183 = "Yes. While it is fine to have fun, we must know the right time to retreat."
10047030-184 = "Everyone, let's get moving."
10047030-195 = "It was so sudden, but that demon statue definitely moved."
10047030-196 = "And I wondered...who, or WHAT, was this \"Accursed\"?"
10047030-200 = "[ns] \"What's going on in this school...?\""

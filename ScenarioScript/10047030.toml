[translation]
10047030-1 = "第3話;藝術中蘊藏的神秘學"
10047030-2 = "（跟著神秘研的孩子們到達的地方是……）"
10047030-4 = "狂獵美術館"
10047030-6 = "[ns]「哦哦……這就是狂獵的美術館啊。」"
10047030-7 = "沒錯。#n這裡展示了跨越時代、備受喜愛的傑作。"
10047030-8 = "除了展示的作品之外，就連建築本身也是一件藝術品。"
10047030-12 = "來，請看這邊的圓頂結構。#n形態既柔和又優美對吧？"
10047030-13 = "其特別之處在於興建這座建築的時期，普遍傾向以高聳的結構來彰顯權威……#n但這座美術館卻不同。"
10047030-14 = "並非以高度來展現權威，而是用柔和的圓頂造型來專注於美的本質！"
10047030-19 = "請注意這裡的黃金比例與結構！#n這簡直是奇普托斯藝術革新的瞬間啊！"
10047030-20 = "[s]「原，原來如此……」"
10047030-21 = "呵呵，我們稍微退後一點吧？"
10047030-22 = "這種講解……是繪梨醬的拿手領域……"
10047030-23 = "要一直嗨成這樣嗎……！？"
10047030-25 = "好，接下來請看這邊！#n這幅名為《創世的肖像》的畫，是我們狂獵的代表作哦！"
10047030-26 = "無數亡靈在夕陽下奔馳的壯闊景象……！#n是不是很厲害？"
10047030-27 = "[s]「嗯，相當有衝擊力呢。」"
10047030-28 = "我第一次見到這幅作品時，感受到了強烈的震撼。#n神秘學色彩如此濃厚的作品，竟然名為《創世的肖像》……！"
10047030-29 = "我也想畫出這樣的作品……#n能讓我的原創性發光發熱──成為學院的代表，流傳後世的作品。"
10047030-33 = "……沒錯。我相信總有一天一定能做到的。"
10047030-34 = "[s]「真令人期待呢。完成後一定要給我看哦。」"
10047030-35 = "妞呵呵，那是當然的！"
10047030-36 = "而且……對神秘學的追求，正是邁向傑作的道路。"
10047030-37 = "[s]「是嗎？」"
10047030-38 = "要說藝術的起源，是與神秘學並行的也不為過哦。"
10047030-39 = "靈魂、魔法、幽靈等等超自然存在──#n正是對這些事物的思索，孕育出了各式各樣的藝術。"
10047030-40 = "神秘學並不是單純的天馬行空。#n它早已深深扎根於我們的文化與日常之中！"
10047030-41 = "而這幅名為《創世的肖像》的作品，正是最好的證明。"
10047030-42 = "既然描繪亡靈的畫被視為學院的代表作……#n那麼，認定學院的起源與神秘學有關也很合理吧！"
10047030-43 = "我之所以會得出這個想法，還有其他原因……！"
10047030-44 = "有看見《創世的肖像》旁邊那座雕像嗎？#n那座雕像指向的方向，有一座禁止進入的古老鐘塔。"
10047030-45 = "而那座已經遭人遺忘──被稱為「無名鐘塔」的地方，流傳著一個傳說。"
10047030-46 = "……「毀滅之日，鐘聲將獨自歌唱」。"
10047030-47 = "行進的亡靈與毀滅的鐘塔！#n怎麼看都不像巧合吧？"
10047030-48 = "[s]「好像有這麼回事……？」"
10047030-49 = "還不只這些哦！根據某個古老的傳聞……#n如果將狂獵的主要設施連結起來，就會形成一個「巨大魔法陣」！"
10047030-50 = "要是在滿月的夜晚完成魔法陣的話，就會發生驚人的事情！"
10047030-51 = "[s]「哦哦……！」"
10047030-52 = "此外還有會流出血淚的雕像、頭會轉動的肖像畫、獨自演奏的鋼琴等等……#n充滿無數神秘學的元素！"
10047030-53 = "這座美術館裡也有會動的惡魔像哦！"
10047030-54 = "從這些現象來看……藝術與神秘學之間存在緊密連接這點，幾乎已經毋庸置疑了！"
10047030-55 = "……怎麼越到後面越像都市傳說了啊。"
10047030-56 = "呵呵，繪梨的故事總是相當精彩呢。"
10047030-57 = "……等等，有人來了。"
10047030-64 = "哦？是繪梨醬耶。#n嗨～繪梨醬！"
10047030-65 = "哈囉～！"
10047030-66 = "咦，咦……？"
10047030-67 = "嗯？旁邊這位是……？#n好像第一次見到呢。"
10047030-68 = "是，是，是夏萊的老師！"
10047030-73 = "[ns]「大家好。」"
10047030-75 = "很高興見到您，老師。#n看來您正在和繪梨醬一起參觀呢。"
10047030-76 = "室友們也好啊。"
10047030-81 = "唔嗯，總覺得有點寂寞呢……#n繪梨醬平常都不太跟我們一起玩的說。"
10047030-82 = "啊……！那，那個，我不是故意的……！"
10047030-83 = "啊哈哈，我知道我知道，只是開個玩笑而已。"
10047030-84 = "偶爾也陪陪我們吧。#n只在教室見面的話，感覺也挺孤單的嘛。"
10047030-85 = "唔，唔啊……這時候該怎麼回答才好……"
10047030-90 = "對了……！這種時候就該遵從阿爾克那的指引……！"
10047030-94 = "啊哈哈……占卜就留到下次再麻煩你吧。"
10047030-95 = "那我們先走囉～下次見！"
10047030-96 = "到時候一起辦個茶會吧。"
10047030-97 = "嗯，嗯！我，我，我很期待！！"
10047030-103 = "[ns1]「唔嗯……」\n[ns2]「你和那些孩子之間發生過什麼事嗎？」"
10047030-106 = "沒，沒有！什麼也沒有！"
10047030-107 = "大家都很親切和溫柔……硬要說的話，有問題的反而是我才對……"
10047030-111 = "啊，啊哈哈哈！#n這，這個話題還是之後再談吧……"
10047030-112 = "[ns] （看來似乎有點內情，還是先別追問下去了吧）"
10047030-113 = "啊哈哈……真不好意思，都是因為我的關係。"
10047030-117 = "……那麼，來做「那個」吧。咿嘻。"
10047030-118 = "……啊，是指「那個」嗎。"
10047030-122 = "又來……！？我不要啦！？"
10047030-123 = "[ns]「你們打算做什麼？」"
10047030-124 = "做了……就知道了……"
10047030-129 = "來，要開始囉，大家。#n還有……老師也是。"
10047030-130 = "啊，嗯……！"
10047030-136 = "……到了。"
10047030-137 = "[ns]「咦？不是和剛才同樣的地方嗎？」"
10047030-138 = "雖然看起來是同一個地方，但這裡已經變成異空間了。"
10047030-139 = "剛才我們……舉行了「儀式」。"
10047030-140 = "像畫圓一樣繞著美術館走──#n這個行為具有魔術性的意義。"
10047030-141 = "[s]「那是什麼意思……？」"
10047030-142 = "就是為了和這尊惡魔對話！"
10047030-146 = "這座惡魔像是很久以前為了與三一交流而製作，帶有驅逐其他惡魔的咒術意涵哦。"
10047030-147 = "之前很長一段時間都裝飾在三一大教堂的頂端，#n如今則為了保護文化財而移到這裡保存。"
10047030-148 = "如此歷史悠久的惡魔像，一定能聽見我們的聲音的！"
10047030-149 = "咿嘻……紬醬，開始吧。"
10047030-150 = "嗯。那麼，要開始與惡魔對話囉～！"
10047030-158 = "我是藝術的恐怖份子──！！！"
10047030-159 = "昨天征服繪畫──！！！#n今天佔領文學──！！！"
10047030-163 = "嗚哦哦哦哦哦哦哦哦哦哦──！！！"
10047030-165 = "哇……！#n紬的死腔，每次聽都覺得很厲害呢。"
10047030-166 = "這是值得感動的事嗎！？"
10047030-167 = "[ns]「這，這樣真的能和惡魔對話嗎？」"
10047030-168 = "當然囉！請看那邊！"
10047030-172 = "（惡魔像的位置變了……！）"
10047030-173 = "咿嘻……我們就連一根手指都沒碰過唷。"
10047030-174 = "惡魔果然是存在的！"
10047030-175 = "先，先別說這些了，我們快逃吧！"
10047030-176 = "在這裡做這種事太危險了！"
10047030-177 = "說的也是。#n如果繼續待在這裡，可是會被惡魔像召喚的「禁忌之物」襲擊的呢！"
10047030-181 = "[ns]「禁忌之物……？」"
10047030-183 = "沒錯。享受固然重要，但懂得適時退場更是如此。"
10047030-184 = "大家，快點移動吧。"
10047030-195 = "（雖然事情發生得相當突然，不過惡魔像確實動了）"
10047030-196 = "（還有那被稱為「禁忌之物」的東西究竟是……）"
10047030-200 = "[ns]「這所學院，究竟發生了什麼事呢……？」"

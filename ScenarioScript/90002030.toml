[translation]
90002030-1 = "第3話;出擊"
90002030-2 = "那麼，我來整理一下情況。"
90002030-3 = "這裡有一個查明的事實，還有一個必須解決的問題。要先聽哪個呢？"
90002030-5 = "通常必須解決的「問題」聽起來都比較沉重，還是先談查明的事實吧。"
90002030-7 = "首先可以確定的，是在提法瑞特的種子保管所，以及在這裡襲擊我們的十字神名新型兵種。"
90002030-8 = "是的，首先那個兵種的型號名稱好像是叫[ruby=Labor]勞工機器人[/ruby]。"
90002030-10 = "勞工…機器人？"
90002030-15 = "是指勞動者。從這個兵種的職責來看，算是相當貼切的名字。"
90002030-16 = "至少就目前我們掌握的資訊來看的話，勞工機器人的種類最多有三種。"
90002030-17 = "沒錯，我也有在現場感覺到。首先是外部用裝甲包覆呈長方體形狀的型號。"
90002030-18 = "沒錯！非常堅固！"
90002030-19 = "以直覺來說，可以被稱為「防禦型勞工機器人」。"
90002030-20 = "再來是裝甲強度比防禦型稍弱，裝有一個一眼就能看出的巨大砲塔的型號。"
90002030-22 = "雖然設計上不太滿意……但也可以稱為砲塔型勞工機器人。"
90002030-23 = "還，還有……在我看來，還有一種看起來相對另外兩種模型原型的小版勞工機器人……"
90002030-25 = "既然它看起來像原型，那就稱為基本型吧。"
90002030-26 = "……通常小型會看起來很可愛，但是這個怎麼看都像蜘蛛，完全沒有那種感覺……"
90002030-27 = "是指蜘蛛不可愛的意思嗎？"
90002030-28 = "通常是這樣。當然你的審美本就獨特，而美學本質上也算是主觀領域……"
90002030-30 = "來來來，先不說這個了。部長，會長。"
90002030-31 = "[s]「還有什麼新發現嗎？」"
90002030-35 = "……有。甚至可能是最重要的部分。"
90002030-36 = "那些勞工機器人，基本上能將周圍的無機物都轉化成鋼鐵大陸的構成成分。"
90002030-37 = "意思是說……？"
90002030-38 = "咦？這麼說的話，是指那些傢伙從一開始就在擴大鋼鐵大陸嗎？"
90002030-39 = "應該不是原本就這樣。"
90002030-40 = "勞工機器人應該是在鋼鐵大陸的基本結構與規模建立完成之後才開始量產的。"
90002030-41 = "但是勞工機器人之所以接近我們的運輸船，很大的機率是為了將這艘船變成鋼鐵大陸的一部分。"
90002030-42 = "我們並沒有調查全部勞工機器人的創造紀錄，事實上本身也是不可能的事。"
90002030-43 = "以目前能查到的結果來看，勞工機器人應該正在對急速擴大的鋼鐵大陸內部構造進行重新整備。"
90002030-44 = "重新整備的話……是指……？"
90002030-45 = "例如建造結構物和修復受損區域。"
90002030-46 = "以及對在擴大過程中吸入的無機物進行同化。"
90002030-47 = "啊，所以我們的運輸船才……"
90002030-49 = "這個問題算是搞清楚了。那麼必須要解決的問題是什麼，部長？"
90002030-50 = "那部分…說起來其實很簡單的。"
90002030-54 = "就是，突破耶索德。"
90002030-55 = "[s]「……」"
90002030-56 = "我先整理一下目前已知關於第九位預言者耶索德的情報。"
90002030-57 = "特別的是耶索德並沒有原型的型態。"
90002030-58 = "那是什麼意思，莉央會長？"
90002030-59 = "以此為例，霍德原本是千年科學學園通訊網的假設單元<hub>。"
90002030-60 = "霍刻瑪是工程船，而葛夫拉是無人探測機。"
90002030-61 = "這些預言者原本都是既存的 AI 系統結構體，與AI 一起被十字神名駭入後創造出來的。"
90002030-62 = "唯一可以視為例外的是薇娜……因為薇娜最早被發現是在數十年前的阿拜多斯沙漠。"
90002030-63 = "但是耶索德並非如此吧，莉央。"
90002030-64 = "沒錯，這只是我的推測……"
90002030-65 = "據推測，耶索德是在鋼鐵大陸構建到一定程度後，才以此為基礎創造的預言者。"
90002030-68 = "否則我們不可能直到現在才察覺到耶索德如此巨大規模的訊號。"
90002030-69 = "是的，這是個合理的推測。"
90002030-71 = "可以說耶索德不像其他預言者需要被結構體覆蓋或保有原型。"
90002030-72 = "而是純粹為了某種目的所製造的「最佳化」預言者，對嗎？"
90002030-73 = "……應該吧。"
90002030-74 = "那驚人的體型與威力，恐怕也是這種最佳化的結果。"
90002030-76 = "……怎麼越講越覺得，結論就是完蛋了呢……"
90002030-77 = "並，並不是這樣的！愛麗絲……我們啊！一定可以做到的！"
90002030-78 = "勇，勇者…… 在冒險前是不可以感到畏懼的……呃呃！"
90002030-79 = "[s]（雖然已經有點害怕了……）"
90002030-81 = "不過也因為它是在鋼鐵大陸上創造出來的，反而也有一點值得慶幸的地方。"
90002030-82 = "什麼意思，英美？"
90002030-83 = "就是那個，它被固定在那道屏障上似乎無法移動吧？"
90002030-84 = "是，是……在遊戲中，巨型頭目通常也無法隨意移動……吧。"
90002030-85 = "……我沒有要把一切比喻成遊戲的意思……"
90002030-87 = "呵呵。不過柚子可能說到一個重點。"
90002030-88 = "即便是十字神名的預言者或是最佳化的結構體，只要具備質量並進行實體化，就一定會有無法避免的限制。"
90002030-89 = "無法避免的限制……？"
90002030-90 = "原來如此。是速度與耐久度。"
90002030-91 = "是。移動如此巨大的質量，必須要有相對應的能量。"
90002030-92 = "雖然可以透過高度集中輸出，讓巨大質量體快速移動，但耐久度也會因此出現極限。"
90002030-93 = "當然我們無法清楚掌握構成鋼鐵大陸的那種神祕物質，它的強度、硬度與耐久度到底如何。"
90002030-94 = "不過如果是具有質量的實體，就不可能擁有無限的耐久度。"
90002030-95 = "[s]「也就是說……？」"
90002030-96 = "是的，是這樣的，老師。"
90002030-97 = "耶索德的攻擊，一定會受到身為巨大質量體的移動限制。"
90002030-98 = "基於這點來進行作戰的話……"
90002030-99 = "……是佯攻作戰吧。"
90002030-100 = "是。嘛，如果是你……這種程度的思路，應該不難吧。"
90002030-101 = "耶索德的攻擊，也就是那隻揮動的巨大手臂，雖然很致命且強大。"
90002030-102 = "但也一定伴隨相對的遲緩與笨重。"
90002030-103 = "如果我們之中有足夠敏捷又應變能力強的人，或許可以躲避一兩次攻擊。"
90002030-104 = "不過巨大的體型本身所帶來的限制也是一部分。"
90002030-105 = "至少轉移耶索德注意力是沒有問題的。"
90002030-106 = "然後我們趁機搭運輸船……"
90002030-107 = "對屏障上方發動突襲。"
90002030-113 = "簡直就像是我會提出的戰略呢，陽葵……"
90002030-114 = "……換作以前的你，可能會不跟我們討論直接執行吧。"
90002030-115 = "現在的你居然會先提出想法……"
90002030-116 = "……不，不對。應該要說我們已經被逼到這種地步了。"
90002030-117 = "……沒時間了，莉央。"
90002030-118 = "沒錯……對吧。"
90002030-119 = "[s1]「等等，大家先等一下。」\n[s2]「我好像還沒跟上你們的想法，想再確認一次……」"
90002030-122 = "……"
90002030-123 = "沒錯，老師。"
90002030-124 = "這個作戰是指在有人充當誘餌的同時，對耶索德發動攻擊。"
90002030-125 = "不過無法保證那個誘餌的安全，畢竟也無法保證一定能成功打倒耶索德。"
90002030-126 = "這是一個極有可能把某個人推向死亡的……作戰方案。"
90002030-127 = "[s3]「我…… 很難贊同這個方法。」\n[s4]「身為你們的……老師。」"
90002030-130 = "但我和陽葵除了這個方案之外，沒有其他方法了。"
90002030-132 = "那，那麼……！這次就由愛麗絲……！"
90002030-133 = "……"
90002030-135 = "你不行。愛麗絲，"
90002030-136 = "這，這話是什麼意思？愛麗絲雖然還是見習生，但身為勇者保護身邊的人……！"
90002030-137 = "就是這樣。因為你是勇者。"
90002030-138 = "因為你或許會是我們的終極武器。"
90002030-139 = "……這句話，代表我也包含在那之中吧？"
90002030-140 = "……沒錯。正是如此。"
90002030-141 = "你還是努力讓自己看起來那麼冷靜啊，莉央。"
90002030-142 = "……習慣了。這種事。"
90002030-143 = "我討厭你這一點。"
90002030-147 = "真的讓人……氣到不行……！"
90002030-148 = "Kei不是無時無刻都在生氣嗎？"
90002030-149 = "是也沒錯啦……啊，真是的！不是那個意思啦！"
90002030-150 = "火很燙，當然岩漿也很燙！但岩漿就是更燙不是嗎！為什麼要火上澆油啊！！！"
90002030-151 = "[s]「真的……沒有其他方法了嗎？」"
90002030-153 = "……"
90002030-154 = "……"
90002030-155 = "（氣氛忽然變得沉重）"
90002030-156 = "（在沉默之中，時間仍舊流逝著……）"
90002030-161 = "那麼，我去吧。"
90002030-165 = "[ns]「！？」"
90002030-166 = "嗯，嗯嗯？英美！？"
90002030-171 = "嗯，只要把注意力引開和拖延時間就行了，對吧？"
90002030-173 = "那，那樣不太……！"
90002030-174 = "沒，沒錯！英美同學！老師也很擔心……！"
90002030-176 = "沒關係，這是最有效率的做法。甚至到了不需要加上「也許」或「或許」這種修飾詞的程度。"
90002030-177 = "反正我很習慣實戰，很耐打且速度也快。"
90002030-178 = "可，可是……！萬一出什麼差錯……！"
90002030-179 = "[s5]「再想想看吧，英美……！」\n[s6]「我……不想看到你們受傷……！」"
90002030-182 = "……"
90002030-190 = "！？"
90002030-191 = "！？"
90002030-192 = "（英美靜靜地走近，並抱了過來）"
90002030-193 = "[s]「英，英美……？」"
90002030-196 = "果然老師的身體很溫暖，好舒服。"
90002030-197 = "沒關係的，老師。"
90002030-198 = "[s]「但是……！」"
90002030-199 = "嗯，我知道你要說什麼。"
90002030-200 = "但我……沒關係的。"
90002030-201 = "如果你真的為我們著想，這一次就相信我們吧。"
90002030-202 = "如果老師幫助學生是理所當然的事，那麼學生想要幫助老師，也是理所當然的。"
90002030-203 = "如果我不幸因此受了重傷的話。"
90002030-204 = "到時候我可是會狠狠埋怨老師的，所以要對我負一輩子的責喔。"
90002030-205 = "那麼，我出發了。"
90002030-210 = "[ns]「英美！」"
90002030-213 = "……大家，開始行動吧。"
90002030-214 = "沒錯，開始吧。"
90002030-215 = "如果想要英美平安回來，我們必須先有所覺悟。"
90002030-216 = "是吧，老師？"
90002030-217 = "[s]「……跟我說該從什麼開始吧。」"
90002030-224 = "[ns]「那麼，各就各位。」"
90002030-225 = "引擎修復現況報告。目前緊急起飛與緊急降落皆可執行。"
90002030-226 = "那麼我現在前往機庫開始進行下降準備。"
90002030-228 = "好的！愛麗絲和季一起行動！"
90002030-229 = "嘻。我會加油的……！"
90002030-231 = "後方就拜託你了，陽葵。"
90002030-232 = "……季和愛麗絲是我們最強大的戰力與王牌。"
90002030-233 = "雖然柚子在這類任務中，或許也會有出乎意料的表現……"
90002030-234 = "莉央，但由你親自出動真的合適嗎？"
90002030-235 = "……實戰也同樣需要戰術統制官。"
90002030-236 = "這不是基於你的責任感或虧欠感所做出的情緒性行動吧？"
90002030-237 = "…………我出發了。"
90002030-244 = "哈啊，真是的。我說啊。我最近是不是越來越沒有人緣了啊，老師？"
90002030-245 = "[s]「呃……至少還有我？」"
90002030-246 = "呵呵。這樣聽來我的身邊至少還留著最大的幸運呢。"
90002030-247 = "投放艙準備完成。隨時可以下降。"
90002030-248 = "那麼，老師？"
90002030-249 = "[s]「依最前線指揮官的判斷，自主出擊。」"
90002030-250 = "機庫那邊，聽得到嗎？情況如何？"
90002030-256 = "現在剛抵達機庫。現在要搭乘投放艙。"
90002030-257 = "愛麗絲，流程都記得吧？"
90002030-259 = "好的！愛麗絲，已熟記方法！"
90002030-260 = "哦……可是，必須要從哪個開始呢……？"
90002030-261 = "我，我來幫你，愛麗絲醬……這種東西就像是一種……遊戲說明書一樣……"
90002030-263 = "那就把愛麗絲交給你了。柚子。"
90002030-266 = "下降準備完成。隨時可以開始，陽葵。"
90002030-267 = "那麼"
90002030-268 = "讓運輸船前往指定位置吧。 "
90002030-278 = "……這體積真的太誇張了。"
90002030-279 = "不要太害怕，也不要緊張。"
90002030-280 = "有效率地前進吧。"
90002030-281 = "首先──"
90002030-293 = "──先處理駐守兵力。"

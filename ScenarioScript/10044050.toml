[translation]
10044050-1 = "ตอนที่ 5;สหพันธ์วรูม วรูม"
10044050-3 = "ทุกคนคะ! ในรถไฟบรรทุกสินค้าขบวนนี้..."
10044050-4 = "มีของที่น่าเหลือเชื่อ... ที่อาจทำให้คิโวทอส..."
10044050-9 = "เจอแล้ว!!!"
10044050-10 = "นั่นไง! คิกคิก โชคดีจังเลยนะที่มีข่าวดีๆ แบบนี้เข้ามา!"
10044050-11 = "ลูกพี่... ไม่สิ หัวหน้า! เอายังไงดี?!"
10044050-12 = "ระดมสมาชิกสหพันธ์ที่อยู่ใกล้เคียงมา แล้วก็ให้กำลังหลักออกเดินทางทันที!"
10044050-13 = "เราต้องชิงรถไฟขบวนนั้นมาให้ได้!!"
10044050-18 = "โอ้วว! หัวหน้าออกคำสั่งแล้ว! ออกปฏิบัติการ!!"
10044050-25 = "เดี๋ยวก่อน..."
10044050-26 = "ทำไมเหรอ?"
10044050-27 = "เมื่อกี้มันเป็นข่าวด่วนไม่ใช่เหรอ?"
10044050-28 = "แล้วไงเหรอ?"
10044050-29 = "ก็หมายความว่า... อาจจะมีคนอื่นนอกจากพวกเราที่หมายตารถไฟขบวนนั้นก็ได้น่ะสิ...?"
10044050-30 = "......"
10044050-31 = "แล้วไงเหรอ?"
10044050-33 = "ว่าไงนะ? รถไฟที่บรรทุกสินค้าที่สำคัญมากๆ?"
10044050-35 = "อาวุธที่ครอบงำคิโวทอสได้งั้นเหรอ? แน่ใจหรือเปล่า?"
10044050-37 = "ถ้างั้นนั่นก็เป็น..."
10044050-39 = "รถไฟมหาสมบัติ!!"
10044050-40 = "เงินอยู่ในสถานีรถไฟ!!"
10044050-41 = "อยู่ที่ว่าเราจะคว้ามันได้หรือเปล่า!!!"
10044050-46 = "แฮ่ก... แฮ่ก... นะ... นี่มันอะไรกัน...!"
10044050-47 = "เราได้ออกข่าวด้วย รู้งี้กดอัดไว้ก็ดี"
10044050-48 = "โธ่เอ๊ย~~!! จริงๆ เลย! ทำไมตอนนั้นถึงไปมีไลฟ์อยู่ที่นั่นด้วยนะ!!"
10044050-49 = "[ns] \"งานซับซ้อนขึ้นแล้วสินะ...\""
10044050-51 = "พวกเราต้องรีบหารถไฟให้เจอก่อนคนอื่น แล้วก็ออกรถทันทีเลย!!"
10044050-52 = "นะ... น่าจะต้องเป็นอย่างนั้นนะคะ ถ้าให้รถวิ่งอยู่บนรางก็น่าจะปลอดภัยค่ะ..."
10044050-58 = "เอาละ กลุ่มแรกของพวกเรามาถึงแล้ว!"
10044050-59 = "รีบไปหารถไฟบรรทุกสินค้าขบวนนั้นกัน!"
10044050-66 = "แฮ่ก... แฮ่ก! รถไฟบรรทุกสินค้า! อยู่ไหนน่ะ??"
10044050-67 = "เฮือก...! CCC ที่ติดต่อเข้ามาเมื่อกี้... ใช่มั้ยคะ?!"
10044050-69 = "ใช่ ไหนล่ะรถไฟของเรา?"
10044050-70 = "ทะ... ทางนี้ค่ะ...!"
10044050-76 = "เอ๋? คนพวกนั้นมัน...?"
10044050-77 = "ทำไม? คนรู้จักเหรอ?"
10044050-78 = "อื้อ... ใช่! ใช่แน่ๆ! พวกที่สั่งพิซซ่าให้ไปส่งไง!"
10044050-79 = "พวกนั้นที่เธอเล่าให้ฟังน่ะเหรอ?"
10044050-80 = "ใช่! พวกไฮแลนเดอร์!"
10044050-81 = "ฮึ่ม! ถ้างั้นก็ปล่อยไว้ไม่ได้น่ะสิ! ต้องล้างแค้นสักหน่อยแล้ว!"
10044050-82 = "ตอนนี้ฉันไม่ใช่ไรเดอร์ส่งอาหาร แต่เป็นทรชนบนถนนต่างหาก!"
10044050-84 = "นี่ พวกเธอ!"
10044050-90 = "คิกคิก... คิดไม่ถึงเลยนะว่าจะได้เจอกันแบบนี้"
10044050-91 = "ได้โอกาสล้างแค้นเฉยเลยนะเนี่ย"
10044050-93 = "......"
10044050-94 = "ใครเหรอ?"
10044050-95 = "ยังไม่หมดวันเลย ลืมกันแล้วเหรอ?! พวกเธอทำให้ฉันถูกไล่ออกจากงานพาร์ทไทม์เลยนะ!!"
10044050-96 = "อ้อ พนักงานส่งพิซซ่าหน้าเละคนนั้นนี่นา?"
10044050-97 = "ก็พวกเธอไปคอมเพลนกับทางร้าน ฉันก็เลยโดนไล่ออกไง!"
10044050-98 = "ปกติฉันจะได้ทำประมาณ 2 วันแล้วถึงโดนไล่ออกน่ะ แต่งานนี้ยังไม่ถึงวันหนึ่งเลย!"
10044050-99 = "ตอนสั่งกินก็แค่กดโทรศัพท์ง่ายๆ ทิปก็ไม่จ่าย แล้วอยากได้บริการระดับไหนกันน่ะหา?"
10044050-101 = "คะ... คุณจะขับมาส่งอาหารเหมือนรีบแว้นไปหาท่านยมบาลไม่ได้สิคะ"
10044050-102 = "ใช่ๆ! แล้วที่มาส่งน่ะ สภาพไม่เหมือนพิซซ่าเลยสักนิด!"
10044050-103 = "มอเตอร์ไซค์ ยังไงก็เชย"
10044050-105 = "ยัยพวกนี้นี่... ตั้งใจยั่วโมโหพวกฉันใช่มั้ย?"
10044050-106 = "ทุกคน โจมตี! ทำให้ยัยพวกนี้เห็นความน่ากลัวของพวกเรากันเลย!"

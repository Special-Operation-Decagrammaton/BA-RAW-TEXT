[translation]
10044050-1 = "第5話;轟隆轟隆疾馳聯盟"
10044050-3 = "各位……這裡的貨物列車上……"
10044050-4 = "非常不得了的東西……能左右奇普托斯命運……"
10044050-9 = "找到了！！！"
10044050-10 = "就是那個！#n呵呵，沒想到消息會自己送上門來，運氣真好！"
10044050-11 = "老大……啊不，總長！我們要怎麼做！？"
10044050-12 = "先叫最近的聯盟成員出動，主力部隊也立即出發！"
10044050-13 = "一定要把那輛列車弄到手！！"
10044050-18 = "唔哦哦！是總長的命令！出動！！"
10044050-25 = "……等等。"
10044050-26 = "怎麼了？"
10044050-27 = "那個消息不是已經登上新聞快報了嗎？"
10044050-28 = "所以咧？"
10044050-29 = "既然如此……除了我們之外，會不會有其他人也在覬覦那輛列車……？"
10044050-30 = "……"
10044050-31 = "對耶？"
10044050-33 = "什麼？載滿金銀珠寶的貨物列車？"
10044050-35 = "上面有能夠稱霸奇普托斯的武器？確定嗎？"
10044050-37 = "這簡直就是……"
10044050-39 = "大祕寶列車！！"
10044050-40 = "所有的稀世珍寶都在那輛車上！！"
10044050-41 = "誰先找到就是誰的！！！"
10044050-46 = "哈，哈啊……這，這是什麼情況……！"
10044050-47 = "獨家新聞～要拍下來～"
10044050-48 = "吼唷～～！！真是的！#n為什麼那時候偏偏在直播啦！！"
10044050-49 = "[ns]「沒想到事情能搞砸到這種地步……」"
10044050-51 = "總之，我們得比其他傢伙早一步找到才行。#n立刻出發吧！！"
10044050-52 = "說，說的也是。#n只要車子跑起來，應該會安全很多……"
10044050-58 = "先遣部隊，抵達現場！"
10044050-59 = "趕快把那輛貨物列車找出來吧！"
10044050-66 = "哈啊，哈啊！#n貨物列車！在哪裡？？"
10044050-67 = "呼……！各位是……剛才用無線電聯絡的CCC成員嗎！？"
10044050-69 = "對～要往哪走～？"
10044050-70 = "這，這邊……！"
10044050-76 = "嗯？那些傢伙是……？"
10044050-77 = "怎麼了？是你認識的人嗎？"
10044050-78 = "是啊……沒錯！他們就是叫外送披薩的奧客！"
10044050-79 = "是你之前說的那些傢伙？"
10044050-80 = "沒錯！就是那些高地人的傢伙！"
10044050-81 = "既然如此，可得好好教訓他們一頓才行啊！"
10044050-82 = "現在的我不是外送騎士，而是道路上的法外之徒！"
10044050-84 = "喂，你們這些傢伙！"
10044050-90 = "呵呵……沒想到會在這裡遇到。"
10044050-91 = "啊啊，復仇的機會就這樣來了。"
10044050-93 = "……"
10044050-94 = "你哪位～？"
10044050-95 = "才沒過多久而已就把我給忘了！？#n都怪你們害我被打工的地方開除了！！"
10044050-96 = "啊，是那個橫衝直撞的披薩外送員啊？"
10044050-97 = "因為你們向店家投訴，害我當天就被解僱了！"
10044050-98 = "平常都可以做到兩天左右的說！"
10044050-99 = "自己貪圖輕鬆才叫外送的傢伙，還好意思要求什麼尊絕不凡的服務品質啊？"
10044050-101 = "用，用暴走族飆車的方式外送食物應該不太對吧？"
10044050-102 = "對啊對啊！那種東西也不能叫做披薩！"
10044050-103 = "機車好俗～"
10044050-105 = "你們這些傢伙……很會激怒人嘛？"
10044050-106 = "全部給我上！讓這些傢伙見識見識我們的厲害！"

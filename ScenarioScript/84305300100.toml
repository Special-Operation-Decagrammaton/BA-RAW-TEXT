[translation]
84305300100-9 = "คะ... คุณเนรุ...?!"
84305300100-10 = "ชิ... มีแขกมาเหรอเนี่ย"
84305300100-11 = "แขก... งั้นเหรอคะ?"
84305300100-16 = "ตายจริง ยินดีที่ได้เจอนะคะ ทุกคน! ขอบคุณที่ทำให้ฉันไม่ต้องลำบากมากนะคะ!"
84305300100-23 = "ที่นี่คือ <ห้องของบิ๊กซิสเตอร์> ที่ยิ่งใหญ่คนนั้นหรือเปล่าคะ? โอ้โห~ น่าทึ่งเหมือนที่ได้ยินมาเลยนะคะ! แม้แต่คนธรรมดาก็ดูออกเลยค่ะว่าที่นี่เป็นสถานที่ที่ยอดเยี่ยมแค่ไหน!"
84305300100-24 = "ที่แห่งนี้เป็นเหมือนกับ 'มือที่มองไม่เห็น' และ 'ตาของพระเจ้า' ที่ตรวจสอบและบงการทุกสถานที่ใน#nมิลเลเนียม... หรืออาจจะมากกว่านั้นก็ได้!"
84305300100-25 = "ฉันต้องลำบากตั้งนานกว่าจะหาที่นี่เจอนะคะ ซ่อนเอาไว้แน่นหนาเชียว...! ฉันพยายามจะหาห้องนี้ด้วย#nตัวเอง แต่ไม่ว่าจะทำยังไงก็หาไม่เจอเลยละค่ะ"
84305300100-26 = "แต่ก็ต้องขอบคุณ 'ความร่วมมือ' อย่างแข็งขันจากพวกคุณนะคะ สุดท้ายฉันจึงหาเจอได้! ไม่รู้ว่าต้องขอบคุณยังไงเลยค่ะ!"
84305300100-27 = "ร่วมมือ...? หาเจอ...? หมายความว่ายังไงน่ะ?"
84305300100-28 = "ที่บอกว่าหาด้วยตัวเองไม่ได้..."
84305300100-32 = "...!! กะไว้แล้วเชียว"
84305300100-33 = "ทั้งหมดก็เพื่อสิ่งนี้สินะคะ ความโกลาหลทั้งหมดที่ผ่านมาน่ะ..."
84305300100-34 = "โอ้ ไหวพริบดีนะคะเนี่ย ดีเลยค่ะ! งั้นฉันก็คงไม่ต้องอธิบายให้ยืดยาวใช่มั้ยคะ?"
84305300100-35 = "หมายความว่ายังไง...??? ทั้งหมดเพื่ออะไรนะ?"
84305300100-36 = "เราโดนเล่นงานแล้วค่ะ ทั้งหมดคือกับดักค่ะ"
84305300100-37 = "เหตุการณ์มากมายที่พวกเราเจอกันมาในงานเอ็กซ์โป สิ่งที่ดูไม่มีเป้าหมายแน่ชัด และดูผิวเผินว่าจะทำไป 'เพื่อทำลายงาน' "
84305300100-41 = "ที่จริงแล้วทั้งหมดนั่น... ก็เพื่อจะให้พวกเรามาที่นี่กันด้วยตัวเองสินะคะ"
84305300100-43 = "...!!!"
84305300100-45 = "วะ... ว่าไงนะ? งั้นก็แปลว่า..."
84305300100-46 = "ค่ะ การที่พวกเราเหยียบเท้าเข้ามาที่นี่ด้วยตัวเอง คือเป้าหมายตั้งแต่แรกของพวกนั้นค่ะ"
84305300100-47 = "และอย่างที่ฉันเพิ่งพูดไป เป้าหมายนั้นก็เพื่อสิ่งที่อยู่ที่นี่... และนั่นก็คือระบบ#n<บิ๊กซิสเตอร์ อัลกอริทึม> ของริโอะ... "
84305300100-48 = "แม้ว่าตอนนี้... เราจะยังไม่รู้ว่าคนคนนั้นคือใครก็เถอะค่ะ"
84305300100-53 = "อ๊ะ ฉันแนะนำตัวช้าไปสินะคะ ขอโทษด้วยค่ะ ฮ่าฮ่า สติฉันหายไปไหนแล้วนะเนี่ย"
84305300100-54 = "ฉันชื่อว่า... <มิไร> เป็นหัวหน้าคนก่อนของ <ชมรมวิทยาศาสตร์เทียม> แห่งมิลเลเนียมค่ะ"
84305300100-59 = "ชมรมวิทยาศาสตร์เทียม...?"
84305300100-60 = "มิไร...?"
84305300100-62 = "ค่ะ แล้วฉันก็เป็นคนที่มีความสัมพันธ์ที่ไม่ลงรอยกับ... "
84305300100-63 = "ประธานนักเรียน <สึคัตสึกิ ริโอะ> ที่อยู่ปลายสายของพวกคุณทั้งสองคนค่ะ"
84305300100-68 = "ว่าไงนะ...?"
84305300100-69 = "คุณกับคุณริโอะเหรอ...?"
84305300100-71 = "...!?"
84305300100-72 = "ฮุฮุฮุ... คุณคงจะไม่พูดว่าคุณไม่รู้เรื่องหรอกใช่มั้ยคะ? ประธานริโอะ"
84305300100-73 = "ชมรมวิทยาศาสตร์เทียมและชื่อของฉัน... ที่คุณทำลายไปด้วยมือของตัวเองน่ะ"
84305300100-74 = "ฉันรอคอยวันนี้มานานเลยค่ะ "
84305300100-75 = "วันที่จะได้ยึดครองมิลเลเนียม วันที่จะได้แก้แค้นคุณที่ทำให้ชื่อเสียงของเราเสียหายและขัดขวางธุรกิจ#nของพวกเรา..."
84305300100-79 = "..."
84305300100-80 = "..."
84305300100-81 = "..."
84305300100-85 = "ไม่นะ ฉันไม่รู้จักชื่อแบบนั้นหรอก จำอะไรไม่ได้เลยด้วย"
84305300100-89 = "ว่าไงนะ...?"
84305300100-90 = "ฉันไม่รู้หรอกว่าคุณเป็นใคร เหมือนว่าคุณจะเข้าใจอะไรผิดนะ ฉันไม่เคยมีความสัมพันธ์ไม่ดีกับคุณ แล้วก็ไม่เคยเข้าไปขัดขวางธุรกิจของพวกคุณด้วย"
84305300100-94 = "พะ... พูดแบบนี้หมายความว่ายังไงคะ!? ไม่รู้งั้นเหรอคะ? ไม่รู้ได้ยังไง!! เราเคยต่อสู้กันอย่างดุเดือด โดยมีชมรมเป็นเดิมพันไม่ใช่เหรอคะ!!"
84305300100-95 = "คุณยึดงบประมาณของชมรมเราไปจนหมด! แล้วก็ทำลายโปรเจกต์ของพวกเราทั้งหมดเลยนี่คะ!!"
84305300100-96 = "ฉันน่ะเหรอ...? โปรเจกต์ไหนงั้นเหรอ?"
84305300100-97 = "ที่ถามนี่เพราะไม่รู้จริงๆ เหรอคะ?? ฉันต้องบอกเรื่องนี้กับคุณด้วยตัวเองงั้นเหรอ!?"
84305300100-102 = "ทั้งโปรเจกต์ <น้ำหยั่งรู้> โปรเจกต์ <พิระมิด พาวเวอร์> แล้วก็โปรเจกต์ <สติกเกอร์ป้องกันคลื่นแม่เหล็กไฟฟ้า>! คุณขัดขวางไว้หมดเลยนี่!!"
84305300100-110 = "โปรเจกต์เดียวที่ทำได้ก็แค่ <กำไลเจอร์เมเนียม> ที่เราต้องลักลอบทำด้วยความหวังว่าจะหากำไรคืนมา#nได้บ้าง แต่สุดท้ายพวกเราก็ล้มละลาย ทั้งหมดก็เป็นเพราะคุณนั่นละค่ะ!!"
84305300100-112 = "พิระมิด... อะไรนะ? แล้วสติกเกอร์อะไรอีก?"
84305300100-113 = "อืม... เป็น 'วิทยาศาสตร์เทียม' แบบนั้นสินะคะ ธุรกิจที่แสวงหากำไรจากคนที่ไม่รู้ โดยใช้ทฤษฎีทาง#nวิทยาศาสตร์ที่ดูน่าเชื่อถือ..."
84305300100-114 = "แบบนี้มันหลอกลวงกันนี่...??"
84305300100-115 = "ใช่ค่ะ เป็นการหลอกลวงค่ะ"
84305300100-117 = "หลอกลวงที่ไหนกันล่ะ!! มันเป็นแค่วิทยาศาสตร์ที่ 'ยัง' ไม่ได้รับการพิสูจน์ต่างหากค่ะ!! เพราะแบบนี้ พวกนักวิทยาศาสตร์สายอนุรักษ์นิยมก็เลย...!!"
84305300100-118 = "ตอนนี้ความอึดอัดที่ฉันมีต่อพวกคุณ ทำให้โมเลกุลของน้ำในตัวฉันโกรธและเปลี่ยนรูปร่างไปหมดแล้ว#nนะคะ!! รู้กันบ้างมั้ยคะ!?"
84305300100-119 = "พูดอะไรอยู่น่ะ ยัยนี่"
84305300100-120 = "ฉันพอรู้แล้วละค่ะว่าทำไมริโอะถึงยุติการทำกิจกรรมของชมรมนั้น"
84305300100-121 = "อืม... เข้าใจแล้ว จะว่าไป ฉันว่าเมื่อก่อนเราก็เคยมีนโยบายแบบนั้นอยู่นะ"
84305300100-122 = "ถ้าฉันทำให้เข้าใจผิดก็ขอโทษด้วย แต่ว่านะ มิไร ที่คุณพูดมา มันก็มีคำที่เสี่ยงต่อการเข้าใจผิดอยู่ด้วย"
84305300100-126 = "ว่าไงนะคะ? คำที่เสี่ยงต่อการเข้าใจผิดงั้นเหรอ...?"
84305300100-127 = "อย่างแรกเลย 'สิ่งที่ยังไม่ได้รับการพิสูจน์' จะไม่ถือว่าเป็นวิทยาศาสตร์ และถ้าต้องการเงินสำหรับวิจัย หรือพัฒนาโปรเจกต์ละก็ อันดับแรกเธอต้องทำให้เราเชื่อในเชิงทฤษฎีก่อนว่ามันจะเป็นไปได้"
84305300100-128 = "และสำหรับ 'ธุรกิจ' ที่ไม่ได้ทำเพื่อวิจัยในทางวิทยาศาสตร์ แต่ทำเพื่อส่งสิ่งของไปข้างนอก#nเพื่อแสวงหาผลกำไรน่ะ ทางโรงเรียนให้เงินสนับสนุนไม่ได้หรอก"
84305300100-129 = "เพราะเราคือโรงเรียนที่ทำวิจัยเรื่องวิทยาศาสตร์ ไม่ใช่องค์กรธุรกิจแต่อย่างใด"
84305300100-131 = "มันก็..."
84305300100-132 = "จริงอย่างที่ว่าเลยนะ..."
84305300100-134 = "อึก... เอาเรื่องแบบนี้มาพูดอีกแล้ว...!! คุณยังไม่ต่างไปจากตอนนั้นเลยสักนิดนะคะ!!"
84305300100-135 = "เข้าใจแล้วค่ะ ก็ได้! ฉันก็รู้ตั้งแต่แรกแล้วค่ะว่าการพูดคุยกับคุณน่ะมันเปล่าประโยชน์!"
84305300100-136 = "สิ่งที่พวกฉันต้องทำก็แค่เอา <บิ๊กซิสเตอร์ อัลกอริทึม> ไปขายให้แหล่งที่รับซื้อในราคางามๆ แล้วเราก็จบกันค่ะ!"
84305300100-137 = "ฉันอนุญาตให้ทำแบบนั้นไม่ได้หรอก มันอันตรายเกินไปที่จะนำไปให้คนนอก"
84305300100-138 = "แล้วที่พวกฉันมาที่นี่ในวันนี้ก็เพื่อจะทำลายระบบนั้นอยู่แล้วด้วย"
84305300100-139 = "เฮอะ...! ดูมั่นใจจังเลยนะคะว่าจะทำได้ อยากรู้จังเลยค่ะว่าจะมั่นแบบนี้ไปได้สักแค่ไหน"
84305300100-141 = "เธอต่างหากล่ะที่มั่น นี่เธอรู้หรือเปล่าว่ากำลังเล่นกับใครอยู่?"
84305300100-142 = "เอากองกำลังมาแค่นี้..."
84305300100-146 = "คิดว่าจะต่อกรฉันได้งั้นเหรอ?"
84305300100-147 = "อะ... อึก มิคาโมะ เนรุ...!!"
84305300100-151 = "ฮุฮุ ฉันรู้ว่าต้องมาเจอคุณ ก็เลยเตรียมการล่วงหน้าไว้แล้วค่ะ คิดว่าพวกฉันจะสู้กับคุณอย่างซึ่งหน้า#nเหมือนคนโง่งั้นเหรอคะ?"
84305300100-152 = "ว่าไงนะ?"
84305300100-156 = "แถ่นแท้น..!"
84305300100-157 = "เห็นหรือยังล่ะคะ? นี่คือเครื่องมือสื่อสารที่ส่งสัญญาณให้คนของฉันที่กระจายตัวอยู่ในงานเอ็กซ์โปได้#nพร้อมกันค่ะ"
84305300100-158 = "แค่ฉันออกคำสั่งนิดเดียว งานมิลเลเนียม เอ็กซ์โปก็วอดวายได้ทันทีเลย!! อุตส่าห์มีงานแลกเปลี่ยนทั้งที แบบนี้ความสัมพันธ์อันดีกับทรีนิตี้ก็คงจบลงด้วยว่ามั้ยล่ะคะ?"
84305300100-159 = "...!!!"
84305300100-160 = "ข่มขู่กันงั้นเหรอ? คิดวางแผนมาอย่างละเอียดเลยสินะคะ"
84305300100-161 = "ฮุฮุ พอจะเข้าใจสถานการณ์แล้วใช่มั้ยคะ? แต่ก็ไม่ต้องห่วงนะคะ ถ้าพวกคุณไม่ทำอะไรเหลวไหล ฉันก็คงไม่ต้องเปิดใช้เครื่องมือสื่อสารนี้หรอกค่ะ"
84305300100-162 = "เอาละ~ ถ้างั้นก็อยู่ตรงนั้นเฉยๆ ค่ะ เพราะกว่าฉันจะไปดึงฮาร์ดแวร์ที่มีอัลกอริทึมนั้นได้ ก็น่าจะใช้เวลาหลายนาทีเลย"
84305300100-163 = "ทำไมถึงทำเรื่องแบบนี้นะ..."
84305300100-164 = "ไม่สิ ทำไมถึงได้รู้ตั้งแต่แรกว่าระบบนี้อยู่ที่นี่...? นอกจากฉันแล้วไม่น่าจะมีใครรู้เรื่องห้องของ#nบิ๊กซิสเตอร์ได้เลย..."
84305300100-165 = "ฮุฮุ ทั้งหมดนี้น่ะ~ เรียกว่าเป็นความสามารถในการทำธุรกิจแล้วกัน พอดีฉันมีสปอนเซอร์น่ะค่ะ"
84305300100-169 = "สปอนเซอร์...? ใครกัน...?"
84305300100-171 = "ริโอะ ขืนปล่อยไว้แบบนี้..."
84305300100-172 = "อืม... ไม่มีวิธีอื่นแล้ว"
84305300100-179 = "เฮ้อ..."
84305300100-180 = "ทนดูต่อไม่ไหวแล้ว"
84305300100-185 = "เนรุ...?"
84305300100-191 = "เอะ... เอ๋?"
84305300100-196 = "อะ... อะไรกันคะ!? ทำไมถึงมาทางนี้ล่ะ??"
84305300100-200 = "นี่~!! อย่าเข้ามานะ!! บอกให้อยู่เฉยๆ ไงคะ!! งั้นฉันติดต่อทุกคนจริงๆ นะคะ? ทำจริงๆ นะ?"
84305300100-204 = "เฮอะ ไม่เชื่อฉันสินะคะ? ฉันต้องทำให้เห็น ถึงจะเชื่อกันงั้นสินะคะ?"
84305300100-206 = "ก็ลองทำดูสิ"
84305300100-210 = "คะ?"
84305300100-216 = "เอาเลย จะทำก็ทำสิ ที่บอกว่าจะส่งสัญญงสัญญาณอะไรน่ะ"
84305300100-217 = "เนรุ...!!"
84305300100-218 = "เนรุ แบบนั้นมัน...!!"
84305300100-220 = "ฉะ... ฉันทำจริงๆ นะคะ!? ไม่ได้ล้อเล่นด้วย!! แล้วอย่ามาเสียใจทีหลังนะคะ!!"
84305300100-222 = "เอาเลย รีบๆ ทำเข้า อย่ามัวเสียเวลาอยู่"
84305300100-228 = "เนรุ!!"
84305300100-229 = "...!?"
84305300100-232 = "(ทำไมกัน...? หรือว่าเพราะโกรธ?)"
84305300100-233 = "(ไม่หรอก มิคาโมะ เนรุไม่ใช่คนที่จะทำผิดพลาดในเวลาที่สำคัญแบบนี้)"
84305300100-234 = "(ถ้าอย่างนั้น... หรือว่า!)"
84305300100-237 = "เฮอะ... เฮอะ...!! งะ... งั้นก็ดีค่ะ! ฉันจะสงเคราะห์ให้ตามต้องการเลย!! เตรียมตัวเตรียมใจไว้เลยค่ะ!!"
84305300100-241 = "ฮัลโหล? ฉันเองนะคะ! ได้ยินมั้ยคะ? ทุกคนพร้อมแล้วใช่มั้ยคะ?"
84305300100-242 = "ฉันขอสั่งให้..."
84305300100-246 = "เอ๋...??"
84305300100-248 = "อะไรกันน่ะ ทำไมเป็นแบบนี้...? ทำไมเสียงมันซ่าๆ แบบนี้ล่ะ...?"
84305300100-253 = "พวกเรา... อยู่...!"
84305300100-259 = "พวกเราโดนโจมตีอยู่! โดนเข้าให้แล้วค่ะ!! ระหว่างที่ซ่อนตัวอยู่ ศัตรูก็บุกเข้ามาจากทุกที่เลย...!!"
84305300100-260 = "...?"
84305300100-261 = "ว่าไงนะคะ...?"
84305300100-265 = "พวก C&C...! C&C บุกมา!!"
84305300100-266 = "C&C...?"
84305300100-267 = "ปะ... เป็นไปได้ยังไงคะ!? มิคาโมะ เนรุ อยู่ที่นี่ทั้งคน...!"
84305300100-269 = "คนที่เหลือไง! ทุกคนที่เหลือใน C&C...!"
84305300100-270 = "กับดัก! ทั้งหมดเป็นกับดัก!"
84305300100-273 = "กับดัก...? ทุกคนที่เหลือใน C&C?"
84305300100-274 = "นะ... นี่มันอะไรกัน..."
84305300100-278 = "อย่าบอกนะคะว่า..."
84305300100-279 = "เนรุ...!"
84305300100-280 = "มิคาโมะ เนรุ นี่คุณ..."
84305300100-285 = "ก็ไม่ได้ทำอะไรนี่... "
84305300100-286 = "ก็ได้ ฉันทำอะไรไปนิดหน่อยน่ะ..."
84305300100-287 = "ฉันไม่ได้รั้นเหมือนใครบางคนหรอกนะ"
84305300100-288 = "จะทำเรื่องใหญ่ขนาดนี้ทั้งที..."
84305300100-289 = "อย่างน้อยฉันก็ต้องแอบบอกให้คุณครูรู้ไว้สิ..."
84305300100-294 = "...!!"
84305300100-295 = "อะไรกัน...! งั้นการรับมือเมื่อกี้นี้ก็...!"
84305300100-296 = "ทั้งหมดเป็นการสั่งการของคุณครู... งั้นเหรอคะ?"
84305300100-297 = "ได้ยังไงกัน..."
84305300100-298 = "ครูรู้เรื่องตั้งแต่เมื่อไรน่ะ...?"
84305300100-300 = "ตั้งแต่ที่เธอมาที่นี่และขอให้ฉันช่วยแล้ว น่าจะตอนที่เรายุ่งกับการเตรียมงานเอ็กซ์โปกันนะ?"
84305300100-301 = "นั่นมันสองสัปดาห์ก่อนเลยนี่!"
84305300100-302 = "อ้อ อย่าเข้าใจผิดล่ะ ฉันไม่ได้บอกเรื่องนี้กับคนอื่นหรอก ทีเหลือน่าจะเป็นฝีมือของครูน่ะ"
84305300100-306 = "...!"
84305300100-307 = "คุณครู... อย่างนี้สินะคะ เพราะแบบนั้น... ก็เลยเข้าข้างฉันตอนที่คุยกับนางิสะ..."
84305300100-308 = "คุณครูคิดเตรียมการไว้ทุกอย่าง... ตั้งแต่ตอนนั้นแล้วสินะ..."
84305300100-310 = "หมายถึงอะไรคะ?! พวกคุณพูดเรื่องอะไรกันน่ะ!?"
84305300100-311 = "อ้อ ไม่ต้องใส่ใจหรอก เพราะเรื่องเดียวที่เธอต้องรู้น่ะ..."
84305300100-316 = "ก็คือตอนนี้เธอจบเห่แล้วละ..."

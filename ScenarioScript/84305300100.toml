[translation]
84305300100-9 = "寧，寧瑠同學……！？"
84305300100-10 = "……呿，有客人啊。"
84305300100-11 = "客人……？"
84305300100-16 = "哎呀，歡迎你們！多虧了你們的幫忙，真～的讓我省了很多力氣！"
84305300100-23 = "這裡就是那偉大的「大姐頭房間」嗎？#n哇～跟傳聞中一樣了不起！就算是門外漢，也能一眼看出來這個地方很不得了！"
84305300100-24 = "千年的所有地方……#n不，就像能監視並操作一切的……「看不見的手」、「神之眼」的地方！"
84305300100-25 = "這裡真的非～常難找到，實在是藏得有夠深的耶……！#n無論我用盡各～種辦法還是沒能成功。"
84305300100-26 = "多虧有你們的積極「配合」才總算找到了！真不知道該怎麼感謝你們！"
84305300100-27 = "配合……？找到……？那是什麼意思？"
84305300100-28 = "自己無法找到……"
84305300100-32 = "……！！#n原來如此。"
84305300100-33 = "全都是為了這個瞬間啊。#n目前為止發生過的……所有騷動都是。"
84305300100-34 = "哦，你的觀察真是敏銳。#n很好！那就不需要詳細解釋了吧？"
84305300100-35 = "……？？？#n那是什麼意思？是為了什麼？"
84305300100-36 = "我們中計了。那些全都是陷阱。"
84305300100-37 = "至今為止在博覽會上看到的種種事件……#n雖然看似沒有特別的目的，單純只是為了「搞砸」活動……"
84305300100-41 = "其實那全部都是……為了讓我們主動來到這裡。"
84305300100-43 = "……！！！"
84305300100-45 = "什，什麼？所以說現在……"
84305300100-46 = "沒錯。他們一開始的目標就是希望我們自己踏進這個地方。"
84305300100-47 = "而目的就像我剛才說過的……是這裡的系統。#n如果要說得更準確一點的話，就是莉央放在這裡的……「大姐頭演算法」。"
84305300100-48 = "雖然還不知道……對方究竟是誰。"
84305300100-53 = "啊，原來我還沒自我介紹嗎？#n抱歉抱歉，哈哈。因為我也忙得暈頭轉向的！"
84305300100-54 = "我叫做「未來」。#n是千年「疑似科學部」的前任部長。"
84305300100-59 = "疑似科學部……？"
84305300100-60 = "未來……？"
84305300100-62 = "沒錯，而且我跟你們正在通訊的…… "
84305300100-63 = "學生會長「調月莉央」有段糾纏不清的孽緣。"
84305300100-68 = "……什麼？"
84305300100-69 = "和莉央同學……？"
84305300100-71 = "……！？"
84305300100-72 = "呵呵呵……事到如今，你該不會說自己不知道吧？莉央會長。"
84305300100-73 = "你親手抹去的……我們疑似科學部和我的名字。"
84305300100-74 = "我們一直期待著今天的到來。"
84305300100-75 = "向敗壞我們的名聲，阻撓我們事業的你復仇的這一天……"
84305300100-79 = "……"
84305300100-80 = "……"
84305300100-81 = "……"
84305300100-85 = "抱歉，我完全不記得了。"
84305300100-89 = "……什麼？"
84305300100-90 = "我並不知道你是誰──因此既不對你懷有惡意，也沒有做過任何阻撓事業的事。#n你似乎是誤會了。"
84305300100-94 = "你，你說什麼！？什麼叫你不知道！不知道什麼！！#n我們不是為社團的存續問題吵得很激烈嗎！！"
84305300100-95 = "你明明扣住了我們社團的所有預算！讓我們的所有計畫都泡湯了！！"
84305300100-96 = "我嗎……？什麼計畫？"
84305300100-97 = "你是真不知道還是假不知道啊！？一定要我親口告訴你是不是！？"
84305300100-102 = "「水知道」計畫、「金字塔能」計畫、「防電磁波貼片」計畫不都被你擋下來了嗎！"
84305300100-110 = "唯一留下來的只有我們瞞著你轉移到外部，用來補貼社團經費的「鍺手鍊」而已。#n我們因為你被搞到破產了！！"
84305300100-112 = "什麼……能量？什麼防電磁波？"
84305300100-113 = "原來……是那種「偽科學」啊。#n利用煞有其事的科學理論，向不知情的人牟利的事業……"
84305300100-114 = "……？？#n那不是詐騙嗎？"
84305300100-115 = "沒錯，就是詐騙。"
84305300100-117 = "什麼詐騙！！那只是「尚未」經過驗證的領域的科學而已！！#n所以我就說你們這些保守的科學家……！！"
84305300100-118 = "你們這種令人鬱悶的態度，讓我體內的水分子都因為憤怒而扭曲起來了知道嗎！？"
84305300100-119 = "那傢伙在說什麼啊？"
84305300100-120 = "我好像知道莉央為什麼要中斷他們的活動了。"
84305300100-121 = "……原來如此，我想起來了。#n這麼說來，我以前確實實施過那種政策。"
84305300100-122 = "如果造成你的誤會我很抱歉。#n但是未來，你所說的這番話是有語病的。"
84305300100-126 = "……語病？"
84305300100-127 = "首先，「未經驗證的東西」還不是科學。#n如果需要研究或研發經費的話，必須先提出理論上可行的證據來讓人信服。"
84305300100-128 = "而且我無法用社團經費讓你們從事並非科學研究，而是計劃外流牟利的「事業」。"
84305300100-129 = "畢竟我們是研究科學的學園，而不是企業。"
84305300100-131 = "……確實。"
84305300100-132 = "……說的沒錯。"
84305300100-134 = "嘔嘔嘔，又在說那種話了……！！#n你真的跟當初一樣完全沒變！！"
84305300100-135 = "算了，沒關係！反正我早就知道你是一個無法溝通的人了！"
84305300100-136 = "我們只要把那個「大姐頭演算法」帶走，賣給願意支付合理價格的人就夠了！"
84305300100-137 = "不，這件事我絕不允許。#n這個東西實在過於危險，我不能讓你帶到外面去。"
84305300100-138 = "今天之所以來到這裡，也是為了順便銷毀它。"
84305300100-139 = "哈……！這話聽起來還挺悠哉的嘛？#n我很好奇你這副態度可以撐到什麼時候！"
84305300100-141 = "悠哉的人是你才對吧。#n你知道自己接下來要對付的人是誰嗎？"
84305300100-142 = "才帶了那麼一點兵力過來……"
84305300100-146 = "難不成是想跟我打一場？"
84305300100-147 = "……！！#n美，美甘寧瑠……"
84305300100-151 = "呵呵，但是我早就準備好對付你的計劃了。#n難道你以為我會傻傻地跟你正面對決嗎？"
84305300100-152 = "什麼？"
84305300100-156 = "……鏘！"
84305300100-157 = "有看到嗎？#n現在我們的人就四散在博覽會會場，而這個按鈕是可以同時發訊號給他們的通訊器。"
84305300100-158 = "只要我一句話就能馬上讓千年博覽會亂成一團。#n難得的交流會要是變成這樣，你們和三一的關係就要完蛋了吧？"
84305300100-159 = "……！！！"
84305300100-160 = "這是威脅嗎？還真是滴水不漏啊。"
84305300100-161 = "呵呵，你們總算明白現在的情況了嗎？#n不過別擔心，只要你們不要亂來，我就不會啟動這個。"
84305300100-162 = "好～請你們乖乖站著不要亂動。#n儲存演算法的硬體需要花幾分鐘才能拆下來。"
84305300100-163 = "到底為什麼要做這種事……"
84305300100-164 = "不，這個地方的存在又是為什麼會……？#n大姐頭房間除了我之外，應該沒有任何人知道才對……"
84305300100-165 = "呵呵，這就是所謂的～生意手腕呀。#n我背後可是有贊助者在撐腰哦。"
84305300100-169 = "贊助者……？究竟是誰……"
84305300100-171 = "莉央，再這樣下去……"
84305300100-172 = "……嗯，沒辦法了。"
84305300100-179 = "唉……"
84305300100-180 = "我已經忍不下去了。"
84305300100-185 = "寧瑠……？"
84305300100-191 = "嗯？奇怪？"
84305300100-196 = "怎，怎麼了嗎！？你為什麼要靠近這邊！？"
84305300100-200 = "哦～！！別動別動！！#n我真的會按下去！真的要按了喔！！"
84305300100-204 = "哈，你好像不相信的樣子？一定要我真的按下去你才肯罷休嗎？"
84305300100-206 = "試試看啊。"
84305300100-210 = "什麼？"
84305300100-216 = "不，你就發出去吧。什麼通訊還信號之類的。"
84305300100-217 = "寧瑠……！！"
84305300100-218 = "寧瑠，那樣的話……！！"
84305300100-220 = "我，我真的要按了！？#n我真的會按！！你可別後悔哦！！"
84305300100-222 = "乾脆點快按啊。#n別拖時間了，快點按。"
84305300100-228 = "寧瑠！！"
84305300100-229 = "……！？"
84305300100-232 = "（為什麼……？因為在氣頭上嗎？）"
84305300100-233 = "（不，美甘寧瑠不會在真正重要的時刻做出那種脫序的行為）"
84305300100-234 = "（既然如此……難道說！）"
84305300100-237 = "哈啊，哈啊……！！#n很好！那我就如你所願！！做好覺悟吧！！"
84305300100-241 = "喂？是我！聽到了嗎？都準備好了吧？"
84305300100-242 = "現在馬上……"
84305300100-246 = "……咦？"
84305300100-248 = "怎麼是這個反應……？為什麼出現滋滋聲……？"
84305300100-253 = "攻擊……！"
84305300100-259 = "我們受到攻擊……被偷襲了！！#n埋伏在所有地方的人都……！！！"
84305300100-260 = "……？"
84305300100-261 = "……你剛才說什麼？"
84305300100-265 = "是C&C……！C&C來了！！"
84305300100-266 = "C&C……？"
84305300100-267 = "這，這怎麼可能？！美甘寧瑠明明在這裡……！"
84305300100-269 = "是其他成員！剩下的成員全都……！"
84305300100-270 = "全部都是陷阱！"
84305300100-273 = "陷阱……？剩下的成員？"
84305300100-274 = "這，這到底是……"
84305300100-278 = "難道……"
84305300100-279 = "……寧瑠！"
84305300100-280 = "美甘寧瑠，你打從一開始……"
84305300100-285 = "這個嘛……"
84305300100-286 = "……總之就是這樣。"
84305300100-287 = "畢竟我跟某個人不一樣，沒那麼死腦筋。"
84305300100-288 = "發生這麼大的事……"
84305300100-289 = "……總得跟老師透露一下吧。"
84305300100-294 = "……！！"
84305300100-295 = "居然……！所以剛才的那番應對也是……！"
84305300100-296 = "全都是……老師在指揮嗎？"
84305300100-297 = "究竟……"
84305300100-298 = "究竟是從什麼時候開始的……？"
84305300100-300 = "從你聯絡我……大概是忙著籌備博覽會的時候吧？"
84305300100-301 = "那不是兩個星期前嗎！"
84305300100-302 = "啊，你別誤會。我可沒跟其他傢伙說過。#n這種小事老師自己會想個說法吧。"
84305300100-306 = "……！"
84305300100-307 = "老師……原來如此。#n所以當時跟渚說話的時候，才會站在我這邊……"
84305300100-308 = "從那個時候就已經……全部都想好了……"
84305300100-310 = "這是什麼意思啊！？你到底想表達什麼！？"
84305300100-311 = "啊啊，這你不必在意。#n你只需要知道……"
84305300100-316 = "……你現在有苦頭吃了就好。"

[translation]
84305300100-9 = "N-Neru...?!"
84305300100-10 = "...Tsk. We've got company."
84305300100-11 = "Company...?"
84305300100-16 = "Oh, it's so nice to see you two! You've done me a huge favor here."
84305300100-23 = "The fabled Big Sister Room. Wow, it's really as amazing as I heard! I'm no expert, but even I can tell that."
84305300100-24 = "A place like an invisible hand, or the eyes of a god...that can survey and manipulate everything...absolutely everything in Millennium!"
84305300100-25 = "And it was sooo well-hidden. Believe me, I TRIED to find it on my own."
84305300100-26 = "But thanks to your active cooperation, here we are! I don't know how to thank you!"
84305300100-27 = "Cooperation...? What are you talking about?"
84305300100-28 = "You couldn't find it on your own...?"
84305300100-32 = "*gasp* I understand."
84305300100-33 = "It was all for this. All the incidents up to this point... Everything."
84305300100-34 = "Oh, good, you're quick to catch on! That saves me a monologue."
84305300100-35 = "...?? What are you talking about? What are you up to?"
84305300100-36 = "We've been had. This was all a ploy."
84305300100-37 = "All the incidents in the Expo. All the random acts of vandalism and ruin."
84305300100-41 = "They were all intended to provoke us into coming here."
84305300100-43 = "...!!"
84305300100-45 = "Wh-What?! Are you telling me...?"
84305300100-46 = "Yes. By coming here, we gave her exactly what she wanted from the start."
84305300100-47 = "This room. Or, more precisely, what's in this room: the Big Sister Algorithm."
84305300100-48 = "Though that doesn't explain who she is."
84305300100-53 = "Oh, did I not introduce myself? Sorry, it must have slipped my mind!"
84305300100-54 = "My name...is Mirai. Former president of Millennium's Pseudoscience Club."
84305300100-59 = "Pseudoscience Club...?"
84305300100-60 = "Mirai...?"
84305300100-62 = "That's right. And the Student Council President Tsukatsuki Rio, the girl you're working with... "
84305300100-63 = "...she and I have history together."
84305300100-68 = "...What?"
84305300100-69 = "With Rio...?"
84305300100-71 = "What?"
84305300100-72 = "Fufu... Oh, Rio, don't play innocent now."
84305300100-73 = "You swept my entire club off the board, and me with it."
84305300100-74 = "I've been waiting for this day. "
84305300100-75 = "Waiting to pay you back for taking over Millennium, staining my name, destroying our business..."
84305300100-79 = "..."
84305300100-80 = "..."
84305300100-81 = "..."
84305300100-85 = "No, really, what? I don't remember you at all."
84305300100-89 = "...Is that right?"
84305300100-90 = "I have no idea who you are. I never had any ill intent towards you, and I never wanted to get in your way. It seems there was a misunderstanding."
84305300100-94 = "Wh-What do you mean, \"you have no idea\"?! How can you say that?! Do you know how HARD we fought for our club's right to exist?!"
84305300100-95 = "You took ALL our club's budget! You kept ruining all our projects!!"
84305300100-96 = "I did...? What projects?"
84305300100-97 = "Are you REALLY asking me that?! Do I have to spell it out for you?!"
84305300100-102 = "The Water Knows project. The Pyramid Power project. The Electromagnetic Protection Sticker. You put a stop to all of them!!"
84305300100-110 = "The only thing we managed to eke out was the Germanium Bracelet. We went BANKRUPT because of you!!"
84305300100-112 = "Pyramid Power? Protection Sticker? What?"
84305300100-113 = "...I think I understand. It was THAT kind of pseudoscience. A grift, using believable-sounding scientific terms to profit off of people who don't understand them."
84305300100-114 = "Hm? That's just fraud, isn't it?"
84305300100-115 = "Yes. Yes, it is."
84305300100-117 = "\"Fraud\"?! It's just fields of science that haven't been proven YET!! Ugh, this is why I don't talk to academics!!"
84305300100-118 = "Your condescension is making my body's water particles distort in anger, do you hear me?!"
84305300100-119 = "I hear, but I don't understand."
84305300100-120 = "Well, at least we know why Rio stopped them."
84305300100-121 = "...Ah. Right. Yes, I did adopt a certain policy that would have gotten in your way. I see that now."
84305300100-122 = "Again, I apologize if there was a misunderstanding. But Mirai, I do have to correct you on a certain point. "
84305300100-126 = "What \"point\"?"
84305300100-127 = "First, if it \"hasn't been proven yet,\" then a true scientist makes an effort to prove it. And if you want funding for research or development on that, you need to present a plausible hypothesis first."
84305300100-128 = "And that funding IS for scientific research, not for manufacturing or selling products outside the school."
84305300100-129 = "We're a research institution, not a business conglomerate."
84305300100-131 = "Yep, now that you put it that way..."
84305300100-132 = "...I get it, one hundred percent."
84305300100-134 = "Ugh, you haven't changed a single bit since you ruined us all!"
84305300100-135 = "All right, fine! I knew you wouldn't listen in the first place!"
84305300100-136 = "But it's fine. All I need to do is take this Big Sister Algorithm and sell it to the highest bidder!"
84305300100-137 = "No, I can't allow that. It's too dangerous."
84305300100-138 = "The only reason we're here is to destroy it."
84305300100-139 = "Oh, you seem pretty confident! I wonder how long you can keep that up."
84305300100-141 = "I could say the same to you. Do you know who you're up against?"
84305300100-142 = "You really plan on taking me..."
84305300100-146 = "...with that sad little squad of yours?"
84305300100-147 = "...!! U-Ugh. Mikamo Neru..."
84305300100-151 = "Fufu, but I already prepared something else for you. You didn't think we'd just rush you head-on like idiots, did you?"
84305300100-152 = "What?"
84305300100-156 = "...Ta-da!"
84305300100-157 = "See this? I can press this button and call every one of our people scattered all throughout the Expo hall."
84305300100-158 = "Just one word, and even now, we can turn the Millennium Expo into a mess for the ages!! It'd be a shame, wouldn't it? To wreck your relationship with Trinity, after all that effort to set this whole thing up?"
84305300100-159 = "*gasp*"
84305300100-160 = "That's quite a threat. You're very thorough."
84305300100-161 = "Fufu, now you see what you're dealing with. But don't worry. As long as you don't do anything foolish, I'll keep this device nice and quiet."
84305300100-162 = "Now, stay still. I'll only need a couple of minutes to pull out the algorithm's hardware."
84305300100-163 = "You don't know what you're doing..."
84305300100-164 = "...but how DID you know about this place to begin with? Nobody should know about it, other than me."
84305300100-165 = "Fufu, this is why it helps to learn business! We had a sponsor."
84305300100-169 = "A sponsor? Who...?"
84305300100-171 = "Rio, is there anything we can do?"
84305300100-172 = "...No. Nothing."
84305300100-179 = "...Hah."
84305300100-180 = "All right, enough of this nonsense."
84305300100-185 = "Neru...?"
84305300100-191 = "Huh? Wha...?"
84305300100-196 = "Wh-What are you—?! Stay back!"
84305300100-200 = "I said stop!! Stop right there!! I'm going to do it! You think I won't?!"
84305300100-204 = "Oh, you think I'm bluffing? Well then, let's go ahead and—"
84305300100-206 = "Do it."
84305300100-210 = "Huh?"
84305300100-216 = "You heard me, do it. That signal communicator thing? Go ahead. Push the button."
84305300100-217 = "Neru...!!"
84305300100-218 = "Neru, that's...!!"
84305300100-220 = "I-I'm really going to do it!! Like, actually do it!! You sure you want this?!"
84305300100-222 = "Stop wasting my time and just do it already."
84305300100-228 = "Neru!!"
84305300100-229 = "What?"
84305300100-232 = "(Why...? Is she too angry to think straight?)"
84305300100-233 = "(No, Neru wouldn't lose her cool at a time like this.)"
84305300100-234 = "(Then...could this be...?)"
84305300100-237 = "Ha, ha...!! F-Fine, if you insist! Hope you're ready for it!"
84305300100-241 = "Hello? It's me! Do you hear me? Are you all in position?"
84305300100-242 = "Commence..."
84305300100-246 = "...?? Huh?"
84305300100-248 = "What's with all the static...?"
84305300100-253 = "...under...!"
84305300100-259 = "We're under attack! We're being ambushed!! They've flushed us out of every hiding place...!"
84305300100-260 = "Um..."
84305300100-261 = "...What?!"
84305300100-265 = "C&C...! C&C are here!!"
84305300100-266 = "C&C...?"
84305300100-267 = "I-It can't be! Mikamo Neru, you...!"
84305300100-269 = "Everyone! Everyone else is already...!"
84305300100-270 = "It's a trap, it's all a trap!"
84305300100-273 = "Trap...? Everyone else?"
84305300100-274 = "Wh-What in the world...?"
84305300100-278 = "Don't tell me..."
84305300100-279 = "...Neru!"
84305300100-280 = "Mikamo Neru, did you plan this...?"
84305300100-285 = "Well... "
84305300100-286 = "...it happened to work out this way."
84305300100-287 = "Unlike some people, I like to be flexible."
84305300100-288 = "So when something this big comes along..."
84305300100-289 = "...how could I not loop in Sensei?"
84305300100-294 = "*grumble*"
84305300100-295 = "Ah...! Then the sweep C&C's doing now..."
84305300100-296 = "Is that Sensei coordinating them?"
84305300100-297 = "How..."
84305300100-298 = "How long...?"
84305300100-300 = "Since you first came up and talked to me, during the Expo prep, I think."
84305300100-301 = "That's more than two weeks ago!"
84305300100-302 = "I didn't tell anyone else, if that's what you're worried about. I figured Sensei could keep a secret."
84305300100-306 = "..."
84305300100-307 = "So that's why Sensei took my side, when I was talking with Nagisa..."
84305300100-308 = "Everything was already thought out, even back then..."
84305300100-310 = "What are you talking about?! Just what in the world are you talking about?!"
84305300100-311 = "Ah, don't sweat the details. All you need to know..."
84305300100-316 = "...is that you're toast."

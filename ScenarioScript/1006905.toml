[translation]
1006905-1 = "服務業的煩惱"
1006905-2 = "玄武商會"
1006905-3 = "（結束山海經的工作後，前往了玄武商會）"
1006905-7 = "歡迎光臨，老師。"
1006905-8 = "要點什麼呢？"
1006905-9 = "[s]「我要今日午餐或主廚推薦！」"
1006905-10 = "嘿，主廚推薦啊。"
1006905-11 = "雖然今日午餐馬上就能做好……"
1006905-12 = "唔嗯～好！#n想到了一個好點子，就幫你做主廚推薦吧。"
1006905-13 = "[s]「今，今天不是『試吃』吧？」"
1006905-14 = "啊哈哈。別擔心，今天很值得期待哦。"
1006905-18 = "叫你們主廚出來！"
1006905-20 = "[ns]「發生什麼事了！？」"
1006905-21 = "……好像有狀況。我去看看。"
1006905-27 = "餐點裡有頭髮……這裡的衛生管理是怎麼做的啊！"
1006905-28 = "真受不了……明明聽說是名店……居然會發生這種事。"
1006905-29 = "這，這不太可能……！#n所有服務人員都有徹底……"
1006905-30 = "那這根頭髮你打算怎麼解釋？#n難道這也是料理的一部分嗎？"
1006905-32 = "還是說你的眼睛只是裝飾品？"
1006905-33 = "……這樣會造成其他客人的困擾，還請安靜一點。"
1006905-35 = "哦？這樣啊。要是被其他客人聽到，你們會很麻煩的吧？"
1006905-36 = "──這位客人。"
1006905-37 = "我就是主廚。#n今天非常抱歉造成您的困擾。我真心向您致歉。"
1006905-39 = "這餐就不跟您收費了，還請您原諒。"
1006905-40 = "為了不再發生相同的事，我們今後會更加注意。"
1006905-42 = "是，是嗎！#n沒辦法，這次就放過你們吧。"
1006905-47 = "會長！那不是我們的頭髮啊！"
1006905-48 = "嗯……我想也是。#n大家的衛生管理都做得非常徹底，這點我是最清楚的。"
1006905-49 = "我能理解大家的委屈。#n不過引起騷動的話會造成其他客人的困擾。"
1006905-50 = "別忘記這一點。"
1006905-51 = "……是。謝謝您，會長。"
1006905-55 = "[ns]（剛才的客人，好像在哪裡見過……）"
1006905-57 = "（決定靜靜地跟在那位客人身後）"
1006905-62 = "哼哼哼……"
1006905-63 = "今天也免費吃了一頓。"
1006905-64 = "果然這招對人氣越高的店越有效啊。"
1006905-69 = "[ns]「可以打擾一下嗎？」"
1006905-70 = "啊？你是哪位。"
1006905-71 = "[s1]「我在女武神生活安全局的事件紀錄簿上看過你。」\n[s2]「是把異物加入食物，藉此吃霸王餐的慣犯。」"
1006905-74 = "你，你在胡說什麼？#n再說了，你又是誰啊？"
1006905-75 = "一般人怎麼會看到那種紀錄……？"
1006905-76 = "難道……你就是傳聞中的那個「夏萊的老師」嗎……？"
1006905-77 = "[s]「初次見面，我是夏萊的老師。」"
1006905-78 = "唔……！"
1006905-79 = "哈，哈！那又怎樣！？#n光靠你一個人又能做什麼！"
1006905-81 = "只靠老師一個人的話，確實可能抓不住你……#n不過既然我來了，事情就另當別論了。"
1006905-82 = "是，是誰！？"
1006905-86 = "又見面了呢……這位客人？"
1006905-87 = "你，你是……！"
1006905-88 = "事，事到如今就算要我付錢也是沒用的！#n你已經說過不用付錢了吧！？"
1006905-89 = "你說的沒錯。我也不是來要你還錢的。#n雖然一開始就覺得很可疑了……"
1006905-90 = "不過在那個場合，我只能以餐廳負責人的身分來應對。"
1006905-91 = "但是現在，我只是以個人的身分來「問候」而已。"
1006905-95 = "你，你想做什麼！？不要再靠近我了！"
1006905-97 = "恕難從命。"
1006905-98 = "你說的謊，我是絕對不會原諒的。"
1006905-99 = "首先身為一名學生，我不容許你輕視老師的言行──"
1006905-100 = "身為一名前輩──我不容許你讓我重要的後輩留下不好的回憶。"
1006905-101 = "──最後，身為一名主廚，我不容許你對我們店裡的衛生管理吹毛求疵。"
1006905-103 = "嗚哇啊啊啊啊啊啊！"
1006905-108 = "（瑠美的拳擊陷入了吃霸王餐的客人身旁的牆壁）"
1006905-110 = "呼……謝謝你，老師。"
1006905-111 = "多虧老師鍥而不捨地追上了他。"
1006905-112 = "[s3]「這不算什麼。」\n[s4]「女武神警察學園說他們馬上就到。」"
1006905-115 = "哈哈哈。老師你真是一絲不苟呢。"
1006905-116 = "那麼做為謝禮……"
1006905-117 = "[s5]「不不不，你的好意我心領了。」 \n[s6]「我差不多得回夏萊去了。」"
1006905-120 = "嗯，所以我會幫你送到夏萊的。"
1006905-121 = "畢竟午餐也是吃到一半就被打擾了，我就招待你一份甜點吧。"
1006905-122 = "[s]「瑠美真是喜歡為別人準備食物呢。」"
1006905-123 = "與其說是喜歡……或許已經是一種習慣了吧。"
1006905-124 = "畢竟我是主廚嘛！"

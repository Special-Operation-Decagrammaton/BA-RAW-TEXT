[translation]
1006905-1 = "การดูแลลูกค้าไม่ใช่เรื่องง่าย"
1006905-2 = "ย่านการค้าเทพเต่าดำ"
1006905-3 = "(หลังจากเสร็จงานของซานไห่จิง คุณครูก็แวะที่ย่านการค้าเทพเต่าดำตามที่รูมิบอก)"
1006905-7 = "ขอบคุณที่มานะ คุณครู"
1006905-8 = "วันนี้จะรับอะไรดีล่ะ?"
1006905-9 = "[s] \"ขอเป็นเมนูประจำวันหรือเมนูที่หัวหน้าเชฟแนะนำได้เลย!\""
1006905-10 = "โฮ่... เอาแบบนั้นสินะ..."
1006905-11 = "เมนูประจำวันน่ะเตรียมเอาไว้พร้อมแล้ว แต่ถ้าจะให้แนะนำ... ฉันก็ขอแนะนำเมนูพิเศษอาหารจานพิเศษ#nจากหัวหน้าเชฟ!"
1006905-12 = "เดิมทีเราไม่มีเมนูพิเศษจากเชฟหรอกนะ แต่ฉันมีเมนูที่เพิ่งนึกออกพอดีเลยน่ะ"
1006905-13 = "[s] \"วะ... วันนี้ไม่ใช่การ 'ชิมอาหาร' หรอกใช่มั้ย?\""
1006905-14 = "อะฮ่าฮ่าฮ่า ไม่ต้องกังวลหรอก ตั้งตารอได้เลย"
1006905-18 = "อะไรกันเนี่ย! เรียกเชฟออกมาซิ!"
1006905-20 = "[ns] \"มีเรื่องอะไรกันน่ะ?!\""
1006905-21 = "ต้องไปดูสักหน่อยแล้วแฮะ คงมีลูกค้าร้องเรียนน่ะ"
1006905-27 = "ดูนี่สิ! มีเส้นผมโผล่มาในอาหารด้วย!"
1006905-28 = "อุตส่าห์แวะมาอุดหนุนเพราะเห็นว่าย่านการค้าเทพเต่าดำมีชื่อเสียง ที่ไหนได้ นี่แค่ควบคุมคุณภาพ#nพื้นฐานยังทำไม่ได้เลยนี่?"
1006905-29 = "พูดอะไรน่ะ! เป็นไปไม่ได้เด็ดขาด พวกเราคอยตรวจดูอาหารทุกจานอย่างละเอียดเลยนะ!"
1006905-30 = "ว่าไงนะ? เป็นไปไม่ได้งั้นเหรอ? แล้วเส้นผมนี่มันอะไรกัน? มาดูให้เต็มๆ ทั้งสองตาซะสิ!"
1006905-32 = "หรือว่าพวกเธอตาถั่วกันทุกคนถึงได้มองไม่เห็นของพวกนี้ แล้วก็ทำอาหารออกมาชุ่ยๆ น่ะ?!"
1006905-33 = "พูดแบบนั้นมันไม่มากไปหน่อยรึไง?"
1006905-35 = "หา? อะไรๆ นี่จะหาเรื่องกันเหรอ? กล้าดียังไงถึงได้มาขู่ลูกค้า?!"
1006905-36 = "เอาละๆ รอเดี๋ยวนะ"
1006905-37 = "ในฐานะหัวหน้าเชฟและผู้รับผิดชอบทุกอย่าง ฉันต้องขอโทษอย่างสูงเลยค่ะ ขอโทษด้วยนะคะ#nคุณลูกค้า"
1006905-39 = "เพื่อแสดงความรับผิดชอบต่อคุณลูกค้า เราจะไม่รับค่าอาหารแล้วกันค่ะ และฉันจะระวังไม่ให้เกิดเรื่อง#nแบบนี้อีกค่ะ"
1006905-40 = "ช่วยเห็นแก่ฉันและไม่เอาความเรื่องนี้จะได้มั้ยคะ?"
1006905-42 = "ฮึ่ม... ฮึ่ม! ก็เข้าใจความรู้สึกอยู่หรอกนะ งั้นวันนี้ฉันจะกลับก่อนก็แล้วกัน"
1006905-47 = "ท่านประธาน... ใจอ่อนเกินไปหรือเปล่าคะ?! พวกเราไม่มีทางพลาดเรื่องสุขอนามัยของอาหารหรอก#nนะคะ!"
1006905-48 = "เฮ้อ ฉันรู้แล้วละ ฉันรู้ดีว่าพวกเธอตั้งใจทำงานกันแค่ไหน"
1006905-49 = "เข้าใจอยู่หรอกว่ารู้สึกไม่ยุติธรรมกัน แต่กฎข้อแรกของการดูแลลูกค้าคือ อย่าทำให้ลูกค้าคนอื่นรู้สึก#nอึดอัดระหว่างทานอาหารนะ"
1006905-50 = "อย่าลืมเรื่องนั้นล่ะ"
1006905-51 = "ค่ะ ท่านประธาน เข้าใจแล้วค่ะ"
1006905-55 = "[ns] (ลูกค้าคนนั้น... ดูน่าสงสัยเหมือนเคยเห็นที่ไหนมาก่อนเลย...)"
1006905-57 = "(คุณครูค่อยๆ ออกมาจากย่านการค้าเทพเต่าดำแล้วตามลูกค้าคนนั้นไป)"
1006905-62 = "หึหึหึ..."
1006905-63 = "วันนี้ก็ได้กินมื้อเที่ยงแบบฟรีๆ อีกแล้ว"
1006905-64 = "วิธีนี้มันใช้ได้ผลตลอดเลยแฮะ"
1006905-69 = "[ns] \"เดี๋ยวก่อนสิ รอก่อน\""
1006905-70 = "หืม? คุณเป็นใครน่ะ?"
1006905-71 = "[s1] \"จำได้ว่าเคยเห็นคุณในบันทึกคดีของสำนักรักษาความปลอดภัยวัลคิรี่นะ\"\n[s2] \"คุณเป็นพวกมีคดีกินแล้วหาเรื่องชักดาบนี่นา\""
1006905-74 = "พะ... พูดเรื่องอะไรน่ะ? คุณรู้เรื่องนั้นได้ยังไง?"
1006905-75 = "คนทั่วไปดูข้อมูลพวกนั้นได้ด้วยเหรอ...?"
1006905-76 = "เดี๋ยวก่อน! หรือว่าคุณคือ... คนนั้นงั้นเหรอ? 'คุณครู' จากชาเล่ต์ที่เคยได้ยินในข่าวลือนั่นน่ะเหรอ...?"
1006905-77 = "[s] \"ใช่แล้วละ\""
1006905-78 = "อึก...!"
1006905-79 = "ถะ...ถ้างั้นแล้วจะเอายังไงล่ะ?! คุณคนเดียวจะไปทำอะไรได้! ห้ะ!"
1006905-81 = "ถ้ามีคุณครูคนเดียวก็ว่าไปอย่าง... แต่ถ้ามีฉันอยู่ด้วยมันก็คงคนละเรื่องกันเลย ว่ามั้ย?"
1006905-82 = "คะ... ใครกัน?!"
1006905-86 = "สวัสดีค่ะ... คุณลูกค้า ไม่ทันไรก็เจอกันอีกแล้วนะ"
1006905-87 = "เธอ... เธอคือ...!"
1006905-88 = "เรื่องมันจบไปแล้ว ยังจะมาเอาอะไรตอนนี้อีกกันเล่า! ฉันออกมาจากร้านแล้วไงเล่า!"
1006905-89 = "ก็ใช่ แต่ว่าเรื่องนี้มันมีอะไรน่าสงสัยหลายๆ อย่างมาตั้งแต่แรกแล้ว..."
1006905-90 = "แต่ในฐานะเจ้าของร้านอาหารแล้ว ฉันปล่อยให้ลูกค้าที่เข้ามาร้องเรียนกลับไปเฉยๆ ไม่ได้หรอกนะ"
1006905-91 = "แต่ว่าเรื่องเมื่อตอนนั้น มันก็คือเรื่องของตอนนั้น"
1006905-95 = "คิดจะทำอะไรกันแน่?! ยะ... อย่าเข้ามาใกล้ฉันนะ!"
1006905-97 = "ฉันขอปฏิเสธที่จะทำตามนั้น!"
1006905-98 = "คุณน่ะทำความผิดไปสามประการ"
1006905-99 = "ประการแรก คุณดูหมิ่นคุณครูต่อหน้านักเรียนอย่างฉัน"
1006905-100 = "ประการที่สอง คุณดูถูกรุ่นน้องอันเป็นที่รักของฉัน ในฐานะรุ่นพี่ ฉันถือว่ามันคือพฤติกรรมที่ยกโทษให้#nไม่ได้"
1006905-101 = "ประการสุดท้าย ฉันขอเดิมพันด้วยศักดิ์ศรีของหัวหน้าเชฟเลยว่าฉันไม่อาจทนรับคำดูถูกเรื่องปัญหา#nสุขอนามัยของร้านเราได้"
1006905-103 = "อ๊าาาาาา~~~!"
1006905-108 = "(หมัดเด็ดของรูมิซัดเข้าไปที่ลูกค้าที่กินแล้วชักดาบอย่างสวยงาม!)"
1006905-110 = "ฮู่ว... ขอบคุณนะ คุณครู แบบนี้ค่อยสบายใจขึ้นมาหน่อย"
1006905-111 = "ถ้าคุณครูไม่ตามลูกค้ากินแล้วชักดาบคนนั้นมา ฉันคงปล่อยเขาไปแล้ว..."
1006905-112 = "[s3] \"ไม่เป็นไรหรอก\"\n[s4] \"ครูแจ้งโรงเรียนวัลคิรี่ไว้แล้วละ อีกสักพักคงจะมากันแล้ว\""
1006905-115 = "ฮ่าฮ่าฮ่า ไม่มีช่องโหว่เลยนะ คุณครูเนี่ย"
1006905-116 = "ถ้างั้น เพื่อเป็นการขอบคุณ..."
1006905-117 = "[s5] \"ไม่เป็นไรๆ ครูรับแค่น้ำใจก็พอแล้ว\" \n[s6] \"ครูต้องรีบกลับไปชาเล่ต์แล้วละ\""
1006905-120 = "อื้ม เรื่องนั้นฉันรู้อยู่แล้วละ"
1006905-121 = "เพราะงั้นฉันจะไปส่งคุณครูที่ชาเล่ต์ให้เองนะ คุณครูโดนขัดจังหวะตอนกินข้าวเที่ยงด้วยนี่นา งั้นเดี๋ยว#nฉันจะเตรียมของหวานเป็นของแถมให้แล้วกัน"
1006905-122 = "[s] \"รูมิชอบดูแลเรื่องอาหารการกินให้คนอื่นสินะ...\""
1006905-123 = "จะบอกว่าชอบดีมั้ยนะ... มันน่าจะทำจนเป็นนิสัยมากกว่าน่ะ"
1006905-124 = "ก็คงเพราะว่าฉันเป็นหัวหน้าเชฟด้วยแหละ ฮ่าฮ่าฮ่า"

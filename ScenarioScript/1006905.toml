1006905-29 = "5;현무상회 부원 A;05;무슨 소리야! 그럴 리가 없어! 우리가 얼마나 꼼꼼히 체크하는데!\n#5;em;[!]"
1006905-30 = "3;진상 손님;00;뭐라고? 그럴 리가 없다고? 그럼 이 머리카락은 뭔데? 눈이 있으면 똑똑히 보라고!"
1006905-31 = "#all;hide"
1006905-32 = "3;진상 손님;00;아니면 이런 것도 볼 눈이 없어서 음식을 그따위로 만드는 건가?!\n#3;closeup"

[translation]
1006905-1 = "The Customer Is Always..."
1006905-2 = "Black Tortoise Promenade"
1006905-3 = "Rumi invited me to visit the Black Tortoise Promenade after the business with Shanhaijing."
1006905-7 = "Thank you for coming, Sensei."
1006905-8 = "What will it be?"
1006905-9 = "[s] \"I'd like the...chef's special.\""
1006905-10 = "Ah, so that's what you'd like, hm?"
1006905-11 = "As it happens, I HIGHLY recommend the chef's special."
1006905-12 = "Mind you, today's special is something I just made up."
1006905-13 = "[s] \"I-It's not...another taste-testing experiment...is it?\""
1006905-14 = "Hahaha! Don't worry about it."
1006905-18 = "The hell? Who made this?!"
1006905-20 = "[ns] \"What's all the ruckus?\""
1006905-21 = "Ah... Please excuse me. I need to take care of this."
1006905-27 = "Look here! I found a hair in my food!"
1006905-28 = "Everyone says the Black Tortoise Promenade is so great. Well, how do you explain THIS?!"
1006905-29 = "There's no way... We double- and triple-check every dish before it goes out!"
1006905-30 = "You sure about that? Then where'd this hair come from, huh?!"
1006905-32 = "Or are you all too incompetent to catch something this obvious?!"
1006905-33 = "...Okay, that's enough out of you."
1006905-35 = "How dare you! I'm paying customer, aren't I?!"
1006905-36 = "One moment, please. "
1006905-37 = "As the person in charge of the kitchen, I'd like to apologize."
1006905-39 = "This meal is on the house. I'll personally see to it that this doesn't happen again."
1006905-40 = "I am so, so terribly sorry for any distress this has caused."
1006905-42 = "Hmph! At least you're taking this seriously. I'll let it slide this time."
1006905-47 = "You shouldn't have apologized like that, President! There's no way we made such a stupid mistake!"
1006905-48 = "*sigh* You're right, of course. I know how hard you guys work better than anyone."
1006905-49 = "I don't like it, either, but we can't allow any disruption to the meals of our other customers. No matter what."
1006905-50 = "Keep that in mind next time."
1006905-51 = "Yes, President..."
1006905-55 = "[ns] \"(Where have I seen that customer before...?)\""
1006905-57 = "I decided to leave the Black Tortoise Promenade and tail the outraged customer."
1006905-62 = "Heh heh heh..."
1006905-63 = "That's another free lunch in the bag."
1006905-64 = "It works every time."
1006905-69 = "[ns] \"Not so fast.\""
1006905-70 = "Huh? What do you want?"
1006905-71 = "[s1] \"I saw your face in an Valkyrie Public Safety Bureau incident sheet.\"\n[s2] \"Aren't you that serial dine-and-dasher?\""
1006905-74 = "H-How did you know about that...?"
1006905-75 = "I mean... You can't prove nothing!"
1006905-76 = "Wait... You're that person with Schale! That Sensei!"
1006905-77 = "[s] \"Guilty as charged.\""
1006905-78 = "Ugh!"
1006905-79 = "S-So what if you heard of me? There's nothing you can do about it!"
1006905-81 = "Maybe not alone. But they're not alone..."
1006905-82 = "Wh-Who's there?"
1006905-86 = "Ah, dear customer. It is so good to see you again."
1006905-87 = "You're...!"
1006905-88 = "What're you going to do? I left your little restaurant, didn't I?"
1006905-89 = "True, you did. Your whole song and dance about a hair in your food didn't add up, but..."
1006905-90 = "As the owner of a restaurant, there's not much I can do but let it go."
1006905-91 = "But I'm not at the restaurant now, am I?"
1006905-95 = "Wh-What are you doing? Get away from me!"
1006905-97 = "Your request is refused!"
1006905-98 = "You've made three grave mistakes."
1006905-99 = "First, you disrespected Sensei in front of me, a student."
1006905-100 = "Second, you insulted my juniors in front of me, their upperclassman."
1006905-101 = "Third, you insulted my restaurant in front of me, a chef."
1006905-103 = "Aaaah!"
1006905-108 = "Rumi landed a beautiful uppercut on the infamous dine-and-dasher!"
1006905-110 = "Whew... Thanks, Sensei. I feel a lot better."
1006905-111 = "If you hadn't tailed that dine-and-dasher, I would've had to let them go..."
1006905-112 = "[s3] \"It's nothing, really.\"\n[s4] \"I contacted Valkyrie. They'll be here soon.\""
1006905-115 = "Hahaha... Nothing gets past you, Sensei. "
1006905-116 = "As a token of appreciation..."
1006905-117 = "[s5] \"Please, no, I don't need anything.\"\n[s6] \"Look at the time! I'd better get back to Schale.\""
1006905-120 = "I know that."
1006905-121 = "That's why I'm having your meal delivered to Schale. Since you had to waste your lunch break, I threw in a free dessert."
1006905-122 = "[s] \"You really can't stop feeding everyone around you, huh?\""
1006905-123 = "What can I say? It's a habit of mine."
1006905-124 = "I am a chef, after all!"

1006905-36 = "1;루미;02;자, 자. 잠시만. \n#1;ar"
1006905-37 = "5;현무상회 부원 A;99\n1;루미;99;주방장이자 총책임자로서, 진심으로 사과드립니다. 죄송합니다. 손님.\n#1;greeting"

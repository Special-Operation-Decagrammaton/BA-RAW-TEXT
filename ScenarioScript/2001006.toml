[translation]
2001006-1 = "修行．休息篇"
2001006-2 = "今天非常感謝您光臨我們「咕滋咕滋」足湯。"
2001006-3 = "雖然您可能已經知道，#n不過我們的足湯中含有豐富的天然成分，對扭傷或皮膚疾病的恢復特別有效。"
2001006-4 = "另外，為了讓顧客能邊享受足湯邊享受視覺饗宴，#n我們在周圍打造了美麗的庭園，請各位好放鬆欣賞吧。"
2001006-10 = "啊，原來老師說的是足湯啊……"
2001006-11 = "害我嚇了一跳……還以為是要跟老師一起泡溫泉……"
2001006-12 = "[s] 「其他溫泉比較好嗎？」"
2001006-13 = "不，不用！現在泡足湯就夠了！不然我會受不了的！"
2001006-14 = "受傷的地方只有腳踝而已，所以沒有泡湯治療全身的必要……！"
2001006-15 = "真的要兩個人一起泡湯的話，我還需要做點心理準備……"
2001006-16 = "[s] 「和香？」"
2001006-17 = "沒，沒什麼！"
2001006-24 = "走吧，老師。我們趕快去泡湯吧。"
2001006-27 = "― 哈啊…… 真是不錯的溫泉呢。[wa:2060] "
2001006-29 = "― 只是泡著，疼痛就好像都消失了一樣。[wa:2080] "
2001006-32 = "― 周圍的景色也很漂亮……[wa:2850] "
2001006-35 = "― 庭園也打造的很棒，[wa:590] "
2001006-37 = "― 真的是很美的地方呢。[wa:580] "
2001006-40 = "― 雖然因為有屋頂的關係，看不到星空，[wa:2140] "
2001006-42 = "― 有點可惜……"
2001006-45 = "[ns] 「抱歉，我沒有注意到。」"
2001006-46 = "― ……不，[wa:640] "
2001006-48 = "― 或許這樣也好。[wa:1210] "
2001006-51 = "― 竟然能和老師兩個人享受溫泉，[wa:2310] "
2001006-54 = "― 這樣的幸福……"
2001006-56 = "― 得對星星保密才行。[wa:1940] "
2001006-59 = "[ns] 「腳踝好一點了嗎？」"
2001006-60 = "真厲害，居然這麼快就不痛了……"
2001006-61 = "謝謝你帶我來這麼好的地方，老師。"
2001006-62 = "[s] 「那就好。差不多該回去了？」"
2001006-63 = "……不，既然都來了，就這樣回去太可惜了！"
2001006-64 = "還有很多還沒體驗到的東西，這裡的規模又這麼大……#n販售了哪些商品、提供了哪些服務，我想要親眼確認。"
2001006-70 = "畢竟難得過來，當然也有想純粹玩樂的心情……#n不過這也是，嗯，修行的一環！"
2001006-72 = "（之後與和香一起好好享受了夜晚的溫泉浴場）"

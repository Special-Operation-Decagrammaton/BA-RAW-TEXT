2001006-59 = "[ns] \"발목은 이제 좀 괜찮아?\""
2001006-60 = "3;노도카 온천ND;03;네. 완전히 낫지는 않았지만, 훨씬 통증은 덜한 느낌이에요.\n#3;em;[반짝]\n#3;a"
2001006-61 = "3;노도카 온천ND;01;좋은 온천장에 데려와 주셔서 감사합니다, 선생님."
2001006-62 = "[s] \"그럼 이만 슬슬 돌아갈까?\""
2001006-63 = "3;노도카 온천ND;15;아뇨, 모처럼 방문한 다른 지역의 온천장인데 이대로 돌아가기는 아까워요!\n#3;em;[반응]"
2001006-64 = "3;노도카 온천ND;01;이곳에서는 어떤 물건을 팔고, 어떤 서비스를 제공하는지 제 눈으로 찬찬히 확인해 봐야겠어요."

[translation]
2001006-1 = "Hot Springs Training: Rest and Relaxation"
2001006-2 = "Welcome. Thank you very much for visiting our Gutsu Gutsu Foot Bath!"
2001006-3 = "As you may have heard, the waters of our foot bath are rich in natural minerals and are very effective for sprains and skin diseases."
2001006-4 = "In addition, we are surrounded by a beautiful garden, so you can relax while enjoying the foot bath."
2001006-10 = "The hot spring you mentioned was a foot bath."
2001006-11 = "I was nervous because I thought you wanted to take a bath together."
2001006-12 = "[s] \"Would it have been better to go to a different hot spring?\""
2001006-13 = "N-No! A foot bath is more than enough!"
2001006-14 = "After all, I only injured my ankle, so there's no need for a full body therapeutic bath!"
2001006-15 = "And...I'm not mentally prepared to take a bath with you yet."
2001006-16 = "[s] \"Come again?\""
2001006-17 = "N-Nothing!"
2001006-24 = "Come on, Sensei. Let's go! "
2001006-27 = "― *sigh* This bath is perfect.[wa:1500] "
2001006-29 = "― It feels like the pain in my ankle is going away.[wa:800] "
2001006-32 = "― The scenery around here is really beautiful.[wa:1530] "
2001006-35 = "― The well-maintained garden,[wa:10] "
2001006-37 = "― is really a beautiful place.[wa:10] "
2001006-40 = "― It's a shame the roof is blocking[wa:1500] "
2001006-42 = "― the night sky."
2001006-45 = "[ns] \"I probably should've found a different hot spring.\""
2001006-46 = "― Actually,[wa:440] "
2001006-48 = "― I think that this is fine as well.[wa:130] "
2001006-51 = "― This extravagant moment enjoying this hot spring...[wa:830] "
2001006-54 = "― ...with you, Sensei."
2001006-56 = "― We'll have to keep it a secret. Even from the stars in the sky.[wa:10] "
2001006-59 = "[ns] \"Is your ankle feeling better now?\""
2001006-60 = "Yes. It's not completely healed, but it's much less painful."
2001006-61 = "Thank you for bringing me to such a nice hot springs resort, Sensei."
2001006-62 = "[ns] \"Are you ready to head back?\""
2001006-63 = "No, it's been a while since I visited a hot springs resort in another area. It'd be a waste to just go back like this!"
2001006-64 = "I need to take the time to see for myself what products are sold here and what services they provide."
2001006-70 = "This is all...part of my hot springs training!"
2001006-72 = "(Afterward, I spent a pleasant night at the hot springs with Nodoka.)"

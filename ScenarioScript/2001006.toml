[translation]
2001006-1 = "#Title;온천 수행 – 휴식 편"
2001006-2 = "3;지배인;03;저희 <구츠구츠 족욕탕>을 찾아주셔서 대단히 감사합니다.\n#3;em;[반짝]\n#3;a"
2001006-3 = "3;지배인;01;이미 소문으로 듣고 찾아오셨겠지만, 저희 족욕탕의 물에는 천연 성분이 풍부하게 녹아있기 때문에 염좌나 피부 질환 등에 큰 효험이 있습니다."
2001006-4 = "3;지배인;08;또한 족욕을 즐기시며 눈이 피로하지 않도록 주변에 아름다운 정원을 꾸며두었으니, 이쪽도 부디 느긋하게 감상해 주십시오.\n#3;em;[음표]\n#3;greeting"
2001006-5 = "#st;[0,0];instant;1;"
2001006-6 = "#clearST"
2001006-7 = "3;지배인;08\n#3;dr\n#wait;3000"
2001006-8 = "#all;hide"
2001006-9 = "3;노도카 온천ND;02\n#3;em;…\n#3;a\n#wait;2500"
2001006-10 = "3;노도카 온천ND;01;……선생님께서 말씀하신 온천이라는 게, 족욕탕이었군요."
2001006-11 = "3;노도카 온천ND;35;저는 갑자기 선생님께서 같이 전신 목욕을 함께 하자는 줄 알고 긴장해서…….\n#3;stiff\n#3;em;[///]"
2001006-12 = "[s] \"다른 온천이 좋았으려나?\""
2001006-13 = "3;노도카 온천ND;04;아, 아뇨! 족욕탕이면 충분해요!\n#3;em;[땀]"
2001006-14 = "3;노도카 온천ND;35;어차피 다친 부위는 발목뿐이고, 전신을 탕치할 필요는 없으니까요!"
2001006-15 = "3;노도카 온천ND;36;게다가 단둘이 목욕을 하기에는 아직 마음의 준비가 덜 되어서…….\n#fontsize;50\n#3;em;[...]"
2001006-16 = "[s] \"방금 뭐라고 했어?\""
2001006-17 = "3;노도카 온천ND;04;아, 아무것도 아녜요!\n#3;shake\n#3;em;[?!]"
2001006-18 = "#st;[0,0];instant;1;"
2001006-19 = "#clearST"
2001006-20 = "3;노도카 온천ND;01\n#3;d\n#wait;1000"

[translation]
2001006-1 = "การฝึกดูแลออนเซ็น - ภาคการหยุดพักผ่อน"
2001006-2 = "ขอบพระคุณอย่างยิ่งที่มาใช้บริการ <บ่อแช่เท้า คุสึคุสึ> ของเรานะครับ"
2001006-3 = "หลายๆ ท่านอาจเคยได้ยินข่าวลือมาบ้างแล้วนะครับว่าน้ำที่ใช้ในบ่อแช่เท้าของเราอุดมไปด้วยสารสกัด#nจากธรรมชาติ มันเลยมีประสิทธิภาพในการช่วยรักษาโรคผิวหนังและอาการเคล็ดขัดยอกได้ดีครับ"
2001006-4 = "อีกทั้งเพื่อให้ทุกท่านได้เพลิดเพลินระหว่างที่แช่เท้า ทางเราได้ตกแต่งบริเวณสวนรอบๆ#nบ่อแช่เท้าให้สวยงามด้วยครับ ขอให้ทุกท่านดื่มด่ำกับความงดงามในสวนให้เต็มที่เลยนะครับ"
2001006-10 = "ออนเซ็นที่คุณครูพูดถึง... หมายถึงบ่อแช่เท้าสินะคะ"
2001006-11 = "ฉันก็นึกว่าคุณครูชวนลงไปแช่ในบ่อออนเซ็นด้วยกันเลยประหม่านิดหน่อย..."
2001006-12 = "[s] \"หรือว่าไปออนเซ็นแบบนั้นดีล่ะ?\""
2001006-13 = "มะ...ไม่ค่ะ! แค่แช่เท้าก็พอแล้วค่ะ!"
2001006-14 = "บาดเจ็บแค่ที่ข้อเท้า ไม่ต้องลงแช่ทั้งตัวก็ได้ค่ะ!"
2001006-15 = "นอกจากนั้นฉันยังไม่ได้เตรียมใจที่จะลงแช่น้ำกับคุณครูสองต่อสอง..."
2001006-16 = "[s] \"เมื่อกี้พูดว่าอะไรนะ?\""
2001006-17 = "มะ...ไม่มีอะไรหรอกค่ะ!"
2001006-24 = "เอาละค่ะคุณครู รีบไปแช่น้ำกันเถอะค่ะ"
2001006-27 = "― อ่า... ดีจังเลยนะคะ[wa:1860] "
2001006-29 = "― อาการเจ็บที่ข้อเท้า  ตอนนี้...  หายเป็นปลิดทิ้งเลยค่ะ[wa:640] "
2001006-32 = "― วิวรอบๆ ที่นี่ ก็สวยงามมากเลยค่ะ[wa:2010] "
2001006-35 = "― ไฟที่ประดับสวนตอนกลางคืน[wa:10] "
2001006-37 = "― ก็สวยงามมากๆ เลยค่ะ[wa:220] "
2001006-40 = "― น่าเสียดาย... พอหลังคามันบังอยู่แบบนี้...[wa:1180] "
2001006-42 = "― เลยอดเห็นวิวกลางคืนเลยนะคะ"
2001006-45 = "[ns] \"ว่าแล้วเชียวว่าไปที่อื่นน่าจะดีกว่าเนอะ\""
2001006-46 = "― ไม่สิ[wa:600] "
2001006-48 = "― พอมาคิดดูแล้ว อาจถือว่าโชคดีก็ได้ค่ะ[wa:50] "
2001006-51 = "― ช่วงเวลาล้ำค่าที่ได้แช่ออนเซ็น[wa:1670] "
2001006-54 = "― กับคุณครูแค่สองคนแบบนี้น่ะ..."
2001006-56 = "― ฉันไม่อยากให้ดวงดาวบนท้องฟ้าเห็นหรอกนะคะ[wa:700] "
2001006-59 = "[ns] \"ข้อเท้าดีขึ้นบ้างไหม?\""
2001006-60 = "ค่ะ ถึงจะยังไม่หายดี แต่รู้สึกปวดน้อยลงเยอะแล้วค่ะ"
2001006-61 = "ขอบคุณที่พามาแช่น้ำร้อนแบบนี้นะคะ"
2001006-62 = "[s] \"ถ้างั้นเรากลับกันเลยไหม?\""
2001006-63 = "ไม่เอาค่ะ อุตส่าห์ได้มาที่ออนเซ็นของเขตอื่นทั้งที จะกลับเลยแบบนี้ก็น่าเสียดายนะคะ!"
2001006-64 = "ฉันอยากตรวจสอบดูก่อนค่ะว่าที่นี่มีบริการอะไรบ้าง แล้วก็ขายสินค้าแบบไหนบ้าง"
2001006-70 = "เพราะทั้งหมดนี่... เป็นการฝึกดูแลออนเซ็นไงคะ!"
2001006-72 = "(จากนั้นคุณครูกับโนโดกะก็นั่งแช่น้ำตอนกลางคืนด้วยกันอย่างสนุกสนาน)"

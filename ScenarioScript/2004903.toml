[translation]
2004903-1 = "ปราสาททรายแสนน่าเบื่อ"
2004903-4 = "อ๊ะ... คุณครู"
2004903-5 = "หืม? รู้อยู่แล้วเหรอว่าฉันจะอยู่ที่นี่?"
2004903-6 = "ก็ฉันพิมพ์บอกไปทางแชตนี่นา"
2004903-7 = "ครั้งก่อนฉันยอมไปว่ายน้ำด้วยก็จริง แต่คราวนี้ฉันไม่เอาด้วยหรอกนะ"
2004903-8 = "[s1] \"สร้างปราสาททรายก็สนุกเหมือนกันนะ...\"\n[s2] \"ครูอยากเล่นสร้างปราสาททรายกับมิซากิจัง...\""
2004903-10 = "พยายามโน้มน้าวกันอีกแล้ว...!"
2004903-11 = "คราวนี้ฉันจะไม่ตกลงอะไรทั้งนั้น"
2004903-12 = "แถมการเล่นสร้างปราสาททรายมันก็ดูแปลกๆ ด้วย"
2004903-13 = "สร้างขึ้นมาทั้งที่รู้ว่ามันจะต้องพังทลาย เสียเวลาเปล่าๆ ไม่เห็นเข้าใจเลย"
2004903-14 = "ถ้าคุณครูอยากเล่นฉันก็ไม่ห้ามหรอกนะ"
2004903-15 = "เชิญตามสบายเลย"
2004903-16 = "[ns] ค่อยๆ เริ่มก่อปราสาททรายขึ้นบริเวณข้างๆ มิซากิ"
2004903-18 = "......"
2004903-19 = "........."
2004903-20 = "[s] \"อืม ทรายมันร่วงลงมาเรื่อยเลยแฮะ...\""
2004903-21 = "ต้องใส่น้ำลงไปเพื่อให้มันจับเป็นรูปร่างสิ ใครเขาก่อปราสาททรายกันแบบนั้น?"
2004903-25 = "ส่งมานี่สิ"
2004903-26 = "ก่อนอื่นก็เทน้ำทะเลลงไปให้ทรายเปียก แล้วก็ค่อยตักใส่ถังแล้วเอาไปเท..."
2004903-27 = "เห็นมั้ยเป็นรูปร่างแล้ว"
2004903-28 = "เอากิ่งไม้นี่ขุดรอบๆ สิ..."
2004903-31 = "― [log=미사키 수영복]อืม...[/log][wa:470] "
2004903-33 = "― [log=미사키 수영복]ขุดลงไปตรงนี้... อีกหน่อย...[/log][wa:1280] "
2004903-36 = "― [log=미사키 수영복]เอากิ่งไม้ตรงนี้... มาแต่งมุมตรงนี้...[/log][wa:3000] "
2004903-38 = "― [log=미사키 수영복]...อื้อ เสร็จเรียบร้อยแล้วละนะ[/log][wa:2260] "
2004903-41 = "― [log=미사키 수영복]เอ๋...?[/log][wa:1800] "
2004903-43 = "― [log=미사키 수영복]ทำไมฉันถึงเหมือนกำลังก่อปราสาททรายอยู่เลยล่ะ...?[/log][wa:1690] "
2004903-46 = "― [log=미사키 수영복]อึก...!  คุณครู...![/log][wa:1770] "
2004903-49 = "[ns] \"เปล่าสักหน่อย ครูแค่คอยดูอยู่เฉยๆ เองนะ...\""
2004903-50 = "― [log=미사키 수영복]วางแผนเอาไว้อยู่แล้วสินะ...! [/log][wa:1120] "
2004903-53 = "― [log=미사키 수영복]...บอกแล้วไงว่า...ไม่ได้สนุกเลยแม้แต่นิดเดียว![/log][wa:3020] "
2004903-57 = "[ns3] \"แล้วเป็นไงล่ะ?\"\n[ns4] \"ทำออกมาได้ดีสมกับเวลาที่ใช้เลยนะ\""
2004903-60 = "ฉันไม่สนใจอะไรแบบนั้นหรอก มันไม่มีความหมายอยู่แล้ว..."
2004903-61 = "ฉันไม่ได้ทำอะไรเยอะสักหน่อย"
2004903-65 = "แต่ยังไง... มันก็แอบภูมิใจนิดหน่อย—"
2004903-68 = "[ns] \"อ๊ะ โดนน้ำพัดไปซะแล้ว...\""
2004903-69 = "......"
2004903-70 = "[s] \"พังหมดแล้ว...\""
2004903-71 = "เห็นมั้ยล่ะ มันไม่มีความหมายเลย"
2004903-72 = "ไม่ว่าจะพยายามแค่ไหนก็กลับมาที่จุดเริ่มต้นอยู่ดี"
2004903-73 = "เหมือนกับปราสาททรายที่กลับกลายเป็นแค่ทรายเหมือนเดิม"
2004903-74 = "เหมือนกับเรื่องราวของชายคนหนึ่งที่พยายามเข็นก้อนหินขึ้นไปบนภูเขา"
2004903-75 = "[s5] \"แต่เราก็ได้อะไรบางอย่างจากมันใช่มั้ยล่ะ\"\n[s6] \"อย่างน้อยเราก็ได้รูปถ่ายมานะ...\""
2004903-78 = "รูป? หมายถึงอะไรน่ะ?"
2004903-79 = "ให้ดูเองงั้นเหรอ?"
2004903-80 = "...?!?!"
2004903-81 = "ถ่ายไว้ตั้งแต่เมื่อไรน่ะ...!"
2004903-82 = "[s] \"ตอนมิซากิตั้งใจนี่ดูน่ารักจังเลยน้า!\""
2004903-86 = "ลบมันซะ"
2004903-87 = "เดี๋ยวนี้เลย"

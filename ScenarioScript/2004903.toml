[translation]
2004903-1 = "Sandcastles Are No Fun"
2004903-4 = "...Ah, Sensei."
2004903-5 = "Hm? Did I know that you were going to be here?"
2004903-6 = "Well, that's what the MomoTalk was about."
2004903-7 = "Please don't try to talk me into swimming again."
2004903-8 = "[s1] \"What about sandcastles? They're fun.\"\n[s2] \"Let's make a sandcastle together. You and me.\""
2004903-10 = "Urgh, so now you want to talk me into something else."
2004903-11 = "It's not going to work this time."
2004903-12 = "What's the point of a castle made of sand, anyway?"
2004903-13 = "Why bother building something if you know it's just going to collapse?"
2004903-14 = "If YOU want to build one, though, feel free."
2004903-15 = "Do whatever you like."
2004903-16 = "[ns] Start building a sandcastle next to her."
2004903-18 = "..."
2004903-19 = "..."
2004903-20 = "[s] \"Hmm, it keeps on collapsing...\""
2004903-21 = "That's not a sandcastle, that's a sand pile! You have to pour water on it to shape it and keep it together."
2004903-25 = "Here, let me."
2004903-26 = "First you soak the sand in the water, put that in a bucket and flip it..."
2004903-27 = "See, we have a shape now."
2004903-28 = "Now put a stick here, and then you can dig a moat..."
2004903-31 = "― [log=미사키 수영복]Hm...[/log][wa:510] "
2004903-33 = "― [log=미사키 수영복]A bit more... Dig out here too...[/log][wa:1080] "
2004903-36 = "― [log=미사키 수영복]And this stick...can go right here...[/log][wa:3040] "
2004903-38 = "― [log=미사키 수영복]...Hm, I suppose that should do it.[/log][wa:2060] "
2004903-41 = "― [log=미사키 수영복]Wait...[/log][wa:1800] "
2004903-43 = "― [log=미사키 수영복]Why am I the one building this...?[/log][wa:2250] "
2004903-46 = "― [log=미사키 수영복]...Ugh!  Sensei...![/log][wa:1770] "
2004903-49 = "[ns] \"Don't mind me. I'm just watching.\""
2004903-50 = "― [log=미사키 수영복]So this was your plan all along...! [/log][wa:840] "
2004903-53 = "― [log=미사키 수영복]...Don't think I'm enjoying this, not at all![/log][wa:3060] "
2004903-57 = "[ns3] \"But still, what do you think?\"\n[ns4] \"Well, you're doing a great job.\""
2004903-60 = "Oh, I don't care. It's all meaningless in the end."
2004903-61 = "And it's not as if I put much effort into it."
2004903-65 = "Well, a BIT of effort. And I suppose it was worth that mu..."
2004903-68 = "[ns] \"There it goes, swept out to sea.\""
2004903-69 = "..."
2004903-70 = "[s] \"Nothing left.\""
2004903-71 = "...Like I said, meaningless."
2004903-72 = "Any effort you put in is just wasted."
2004903-73 = "From sand to sand, that's all."
2004903-74 = "Like the story of the man who tries to push the boulder up the mountain."
2004903-75 = "[s5] \"But we did get something out of it.\"\n[s6] \"We got a photo...\""
2004903-78 = "Photo? What photo?"
2004903-79 = "See it for myself? What?"
2004903-80 = "*gasp*"
2004903-81 = "When did you take this...?"
2004903-82 = "[s] \"Your hard work deserves to be remembered!\""
2004903-86 = "Delete it."
2004903-87 = "Now."

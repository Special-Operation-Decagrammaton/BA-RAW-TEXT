[translation]
2004903-1 = "堆沙堡很無聊"
2004903-4 = "……啊，老師。"
2004903-5 = "嗯？問我是不是知道你會來？"
2004903-6 = "當然，因為MomoTalk的內容就是這樣。"
2004903-7 = "上次雖然被你哄去游泳了，但這次我真的完全沒興趣。"
2004903-8 = "[s1]「堆沙堡……明明很有趣的說。」\n[s2]「我想跟美咲一起堆沙堡耶……」"
2004903-10 = "又想用這種話來騙我……！"
2004903-11 = "這次我不會上當的。"
2004903-12 = "況且用沙子堆城堡這種事本身就很奇怪。"
2004903-13 = "終究會被沖垮的城堡，就算蓋了也只是白費力氣而已……我實在無法理解。"
2004903-14 = "老師想要的話，我也不會阻止你。"
2004903-15 = "隨你高興吧。"
2004903-16 = "[ns] 在美咲旁邊開始堆沙堡"
2004903-18 = "……"
2004903-19 = "…………"
2004903-20 = "[s]「唔嗯，總是會一直塌掉呢……」"
2004903-21 = "……要澆水才會成形啦，誰會直接堆乾沙啊？"
2004903-25 = "借我一下。"
2004903-26 = "先澆上海水讓沙子濕潤，再裝進水桶裡倒扣過來……"
2004903-27 = "你看，成形了吧。"
2004903-28 = "接著在這裡插上樹枝，再稍微挖一下周圍……"
2004903-31 = "― [log=미사키 수영복]嗯……[/log][wa:590] "
2004903-33 = "― [log=미사키 수영복]再稍微……把這邊也削掉……[/log][wa:1880] "
2004903-36 = "― [log=미사키 수영복]這裡插上樹枝……從這個角度……[/log][wa:3920] "
2004903-38 = "― [log=미사키 수영복]……嗯，這樣就行了吧。[/log][wa:3020] "
2004903-41 = "― [log=미사키 수영복]……咦？[/log][wa:1920] "
2004903-43 = "― [log=미사키 수영복]為什麼我，會在堆沙堡這種東西……？[/log][wa:2930] "
2004903-46 = "― [log=미사키 수영복]……唔！老師……！[/log][wa:2170] "
2004903-49 = "[ns]「咦，沒有，我只是……」"
2004903-50 = "― [log=미사키 수영복]你從一開始就在打這種主意吧……！[/log][wa:1640] "
2004903-53 = "― [log=미사키 수영복]……我完全，就連一點都不覺得好玩！[/log][wa:4180] "
2004903-57 = "[ns3]「不過你感覺怎麼樣？」\n[ns4]「花了不少時間，做得還是挺不錯的吧？」"
2004903-60 = "我對這種東西沒興趣。#n反正這終究沒有意義……"
2004903-61 = "我也沒特別認真。"
2004903-65 = "但硬要說的話……也不是完全沒成就感──"
2004903-68 = "[ns]「啊，沙堡被海浪沖走了……」"
2004903-69 = "……"
2004903-70 = "[s]「……全都塌掉了呢。」"
2004903-71 = "看吧……一點意義都沒有。"
2004903-72 = "無論再怎麼努力也只會回到原點。"
2004903-73 = "就像沙堡回歸沙子……"
2004903-74 = "以及某個人永遠在將石頭推上山的故事一樣。"
2004903-75 = "[s5]「不過也不是完全沒收穫哦。」\n[s6]「至少有留下幾張照片……」"
2004903-78 = "照片？什麼意思？"
2004903-79 = "要我自己看？"
2004903-80 = "……！？！？"
2004903-81 = "這種東西，你是什麼時候拍的……！"
2004903-82 = "[s]「努力的樣子看起來真不錯呢！」"
2004903-86 = "刪掉。"
2004903-87 = "馬上刪掉。"

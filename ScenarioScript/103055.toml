[translation]
103055-2 = "พิกัดอยู่ทางนี้ค่ะ..."
103055-3 = "ทางนี้ ทางนี้! มีทางเข้าเชื่อมไปชั้นใต้ดินด้วย!"
103055-4 = "นั่นสินะคะ... ค่อนข้างลึกเลยนะเนี่ย"
103055-5 = "ฮืม... ไปกันเลย"
103055-15 = "ที่นี่มัน..."
103055-16 = "ทางเดินที่เป็นเครื่องจักร..."
103055-17 = "ลองเข้าไปกันอีกหน่อยเถอะ"
103055-24 = "ฝั่งนี้ดูสะอาดสะอ้านกว่านะคะ"
103055-25 = "ทางนี้ๆ นี่น่าจะเป็นบันไดนะ!"
103055-29 = "โห..."
103055-30 = "นี่มัน..."
103055-43 = "ว่าแล้ว... เป็นไปตามนั้นจริงๆ ด้วยนะคะ"
103055-44 = "เป็นเรือรบจริงด้วยค่ะ"
103055-45 = "[s] \"เข้าไปข้างในกันเถอะ\""
103055-46 = "ค่ะ "
103055-48 = "ตอนต่อไป;เรือรบอุตนาพิชทิม 1"

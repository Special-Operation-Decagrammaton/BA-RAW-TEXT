52150-102 = "3;아야메 황혼 1;13;그래도 백화요란의 부장으로서 이 현실을 지키기 위해, 내 한계를 넘어서기 위해 쿠즈노하 님을 찾았지만…… 결국 마주한 건 형체 없는 풍문뿐."
52150-103 = "3;아야메 황혼 1;16;그래서 결심했어. 모든 것을 살펴보는 백귀야행의 대 예언자가 현실에 존재하지 않는 풍문이라면, 괴서를 사용해서라도 이를 현실로 만들어주겠다고."

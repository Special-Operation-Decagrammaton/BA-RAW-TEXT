52150-26 = "3;아야메;03;나쁜 꿈은 깨어난 순간 모든 괴로운 감정을 꿈으로 치부하고 잊어버릴 수 있지만……"
52150-27 = "3;아야메;99;행복한 꿈은 깨어난 순간부터 괴로운 현실을 계속 곱씹어야 하니까."
52150-28 = "3;아야메;03;오히려 꿈이 그리워 현실을 부정하고 싶어지니까……"

[translation]
52150-1 = "第15話;甜美夢境的終點"
52150-7 = "呼啊……"
52150-12 = "你看起來很疲倦呢，菖蒲。#n昨晚沒睡好嗎？"
52150-13 = "嗯，可能是因為做夢的關係，睡得不是很好。"
52150-15 = "這樣啊……看你臉色不太好，該不會是做惡夢了吧？"
52150-16 = "不，反而是個好夢。"
52150-17 = "我夢見了百花繚亂部室裡堆積如山的委託和麻煩事全都消失了的……和平的世界。"
52150-22 = "那你為什麼還露出這麼痛苦的表情？"
52150-26 = "因為從惡夢醒來的時候，可以把所有痛苦當成夢境拋諸腦後……"
52150-27 = "但幸福的夢一旦醒來，就只能不斷反芻痛苦的現實。"
52150-28 = "反而會開始懷念夢境，甚至想否定現實……"
52150-29 = "……這是我以前在某部老電影裡聽過的台詞！"
52150-31 = "雖然當時沒有察覺，但菖蒲說得沒錯。"
52150-32 = "與惡夢相比，幸福的夢反而更讓人痛苦。"
52150-33 = "如果這場夢不是現實的話……或許永遠沉睡下去才是幸福吧。"
52150-49 = "……你醒啦。"
52150-55 = "……菖蒲？"
52150-56 = "[ruby=・]好[/ruby][ruby=・]久[/ruby][ruby=・]不[/ruby][ruby=・]見[/ruby]，名草。"
52150-57 = "為什麼我會在這裡……"
52150-61 = "其他部員呢？[USERNAME]老師呢？"
52150-62 = "放心吧，大家都在隔壁的房間。"
52150-63 = "看起來傷勢並不嚴重。#n夏萊的老師雖然還在沉睡，但他也平安無事。"
52150-67 = "……至今為止跟我們在一起的菖蒲不是你嗎？"
52150-68 = "……「好久不見」是什麼意思？#n難道之前和我在一起的那個菖蒲……"
52150-69 = "嗯，只是普通的幻影而已。#n那是以恐懼為食的百物語所創造出來的影子。"
52150-70 = "恐懼？可是我並沒有因為那個模樣感到恐懼……"
52150-71 = "不，因為那不是別人，而是「你自己創造」的幻影。"
52150-75 = "當你看著自己渴望的完美的我時，心裡其實早就明白了吧。"
52150-76 = "這是一個隨時會破碎的甜美夢境……殘酷的現實就近在眼前。"
52150-78 = "不，我真的不知道……"
52150-82 = "夠了！"
52150-83 = "你總是以無知為藉口來隱藏慾望，不斷依賴別人！"
52150-84 = "你究竟還要拿「不知道」當擋箭牌到什麼時候？"
52150-87 = "……沒錯，幻影所說的話並非全是謊言。#n我在擔任委員長時，確實因為感受到極限而去尋找過葛葉大人。"
52150-88 = "因為當時的我，已經厭倦了他人的慾望。"
52150-91 = "名草，雖然我一直掛著笑容，實際上卻對所有人都感到厭惡。"
52150-92 = "那些連保護自己的力量都沒有，卻不斷向他人傾瀉慾望的人。"
52150-93 = "總是把冠冕堂皇的話掛在嘴邊，卻連自己說過的話都遵守不了的部員。"
52150-94 = "還有動不動就哭著想放棄一切的你……"
52150-98 = "……我真的很討厭。"
52150-102 = "不過身為百花繚亂的委員長，#n我還是為了守護這個現實和突破極限而前去尋找葛葉大人……#n然而我最終見到的，不過是個沒有實體的傳聞罷了。"
52150-103 = "所以我決定了。如果能洞察一切的百鬼夜行大預言者只是不存在的傳聞的話──#n即便必須使用怪書，我也要將其化為現實。"
52150-104 = "假如我無法親自待在每個地方的話，就讓我擁有能夠守望一切的眼睛吧。"
52150-105 = "不行，菖蒲……那樣的結局，誰都不會幸福。#n你一定是被雛罌粟給騙了，才會產生這種錯誤的想法。"
52150-106 = "不，名草。你什麼都不懂。"
52150-107 = "不懂我是個怎樣的人，也不懂我究竟抱持著什麼樣的心情。"
52150-108 = "沒有那種事。#n只要我們坦誠地好好談談，一定能夠互相理解──"
52150-112 = "能不能別再用甜言蜜語欺騙自己了？"
52150-113 = "你只是因為害怕面對我的真心才會移開視線，把想像出來的虛像當成我而已。"
52150-114 = "菖蒲，我……"
52150-115 = "反正你也早就知道了吧？"
52150-116 = "我從來──"
52150-121 = "[log=아야메 황혼 1]──沒有把你當成朋友。[/log]"
52150-126 = "下一話;人造花"

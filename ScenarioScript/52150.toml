[translation]
52150-1 = "ตอนที่ 15;สุดปลายฝันอันแสนหวาน"
52150-7 = "ฮ้าวว..."
52150-12 = "ดูเพลียจังเลยนะ อายาเมะ เมื่อคืนนอนไม่ค่อยหลับเหรอ?"
52150-13 = "อื้อ สงสัยฉันจะนอนฝันน่ะ ก็เลยหลับไม่ค่อยสนิท"
52150-15 = "แย่เลยนะ... ดูจากสีหน้าที่ไม่ค่อยสู้ดีแล้ว คงจะเป็นฝันร้ายสินะ"
52150-16 = "ไม่หรอก มันเป็นฝันดีต่างหาก"
52150-17 = "ในฝันนั้นคือโลกที่สงบสุข... ไม่มีคำขอร้องหรือปัญหาใดๆ ที่ชมรมเฮียกกะเรียวรันต้องช่วยจัดการเลย"
52150-22 = "แล้วทำไมถึงทำหน้าแบบนั้นล่ะ?"
52150-26 = "เมื่อเราฝันร้าย ทันทีที่ตื่นขึ้นเราจะมองว่านั่นเป็นเพียงความฝันและลืมความรู้สึกเจ็บปวดนั้นได้..."
52150-27 = "แต่กับความฝันที่มีความสุข เมื่อตื่นขึ้นมาเราก็ต้องอยู่กับความจริงที่เจ็บปวด"
52150-28 = "และเอาแต่คิดถึงความฝันนั้นจนอยากปฏิเสธความจริงตรงหน้า..."
52150-29 = "ฉันเคยได้ยินบทพูดแบบนี้จากหนังในสมัยก่อนน่ะ...!"
52150-31 = "ตอนนั้นฉันยังไม่เข้าใจ แต่อายาเมะพูดถูกแล้วละ"
52150-32 = "ว่าฝันดีนั้นเจ็บปวดกว่าฝันร้าย"
52150-33 = "ถ้าความฝันนี้ไม่ใช่ความจริง... ถ้าฉันไม่ต้องตื่นขึ้นอีกเลยก็คงมีความสุขมากกว่านี้"
52150-49 = "ตื่นแล้วเหรอ..."
52150-55 = "อายาเมะ...?"
52150-56 = "ไม่ได้เจอกันนานเลยนะ นางุสะ"
52150-57 = "ทำไมฉันถึงมาอยู่ที่นี่..."
52150-61 = "แล้วคนอื่นล่ะ? คุณครู [USERNAME] ล่ะอยู่ไหน?"
52150-62 = "ไม่ต้องกังวลไป ทุกคนอยู่ห้องข้างๆ น่ะ"
52150-63 = "ทุกคนไม่ได้รับบาดเจ็บกันมาก ส่วนคุณครูของชาเล่ต์ก็หลับอยู่ แต่คุณครูปลอดภัยดี"
52150-67 = "ถ้างั้นอายาเมะที่อยู่กับพวกเรามาตลอด... ไม่ใช่เธองั้นเหรอ?"
52150-68 = "ไม่ได้เจอกันนานงั้นเหรอ... ถ้างั้นอายาเมะที่อยู่กับพวกเรามาตลอดก็..."
52150-69 = "อื้อ แค่ภาพลวงตาธรรมดาๆ น่ะ ก็แค่เงาที่เกิดจากตำนานร้อยเรื่องราวที่อยู่ได้ด้วยความกลัว"
52150-70 = "ความกลัวงั้นเหรอ แต่ฉันไม่รู้สึกกลัวตอนที่เห็น..."
52150-71 = "เปล่า นั่นน่ะเป็นภาพลวงตาที่ 'เธอเป็นคนสร้างขึ้นมา'"
52150-75 = "เวลาเธอมองฉันที่เป็นคนสมบูรณ์แบบอย่างที่เธอปรารถนา เธอก็น่าจะคิดได้สิ"
52150-76 = "คิดได้ว่านี่คือความฝันแสนหวานที่อาจพังทลายได้ทุกเมื่อ และคิดได้ว่าเมื่อลืมตาขึ้นมา สิ่งตรงหน้าเธอก็คือความจริงอันโหดร้าย"
52150-78 = "ไม่นะ ฉันไม่รู้จริงๆ..."
52150-82 = "โกหก!"
52150-83 = "เธอก็เป็นแบบนั้นมาตลอด! เธออ้างว่าไม่รู้ ปิดบังความปรารถนาของตัวเอง แล้วก็เอาแต่พึ่งพาคนอื่นไม่ใช่หรือไง!"
52150-84 = "จะอ้างว่าไม่รู้แล้วพึ่งพาคนอื่นไปอีกนานแค่ไหนกัน?"
52150-87 = "อืม... สิ่งที่เงาพูดไม่ใช่เรื่องโกหกทั้งหมดหรอก ที่บอกว่ารู้สึกถึงขีดจำกัดของตัวเองระหว่างทำงาน#nของหัวหน้า ก็เลยออกไปตามหาคุซึโนฮะน่ะเป็นเรื่องจริง"
52150-88 = "เพราะตอนนั้นฉันเหนื่อยกับการทำตามความปรารถนาของคนอื่นแล้วน่ะสิ"
52150-91 = "นางุสะ ถึงเธอจะเห็นฉันยิ้มอยู่ตลอด แต่ความจริงแล้วฉันกลับพบว่าทุกคนน่ะ น่ารังเกียจ"
52150-92 = "พวกคนที่ดูแลตัวเองไม่ได้ แล้วมาระบายความปรารถนาของตัวเองให้คนอื่นตลอดเวลานั่นน่ะ"
52150-93 = "สมาชิกชมรมที่ตะโกนอุดมคติของตัวเองเหมือนนกแก้วนกขุนทอง แต่สุดท้ายแล้วก็เอาสิ่งที่พูดไป#nปฏิบัติจริงไม่ได้"
52150-94 = "แล้วก็เธอที่พอมีอะไรนิดอะไรหน่อยก็เอาแต่ร้องไห้และยอมแพ้ให้กับทุกอย่าง..."
52150-98 = "ฉันละเกลียดจริงๆ..."
52150-102 = "แต่ในฐานะหัวหน้าเฮียกกะเรียวรัน ฉันก็ต้องปกป้องความเป็นจริงนี้และเอาชนะขีดจำกัดของตัวเอง ฉันเลยออกไปตามหาท่านคุซึโนฮะ... แต่สุดท้ายสิ่งที่ฉันเจอก็แค่ข่าวลือที่จับต้องไม่ได้"
52150-103 = "ฉันก็เลยตัดสินใจว่า ถ้าหากผู้พยากรณ์ใหญ่แห่งเฮียกคิยาโคผู้นั้น ถ้าหากผู้มองเห็นทุกสิ่งเป็นแค่#nข่าวลือที่ไม่มีตัวตนอยู่จริง ฉันก็จะใช้หนังสือลึกลับทำให้ทั้งหมดนี้เป็นความจริงขึ้นมา"
52150-104 = "และขอว่าถ้าฉันอยู่ในทุกที่ไม่ได้ ก็ขอให้ฉันมีดวงตาที่มองดูทุกคนได้"
52150-105 = "ไม่นะ อายาเมะ... นั่นมันตอนจบที่ไม่มีใครมีความสุขเลยนะ เธอตกหลุมพรางของโคคุริโกะอย่างจัง#nแล้วคิดผิดไปน่ะ"
52150-106 = "ไม่หรอก นางุสะ เธอน่ะไม่รู้หรอก"
52150-107 = "เธอไม่รู้ว่าฉันเป็นคนแบบไหน เธอไม่รู้ว่าฉันกำลังคิดอะไรอยู่"
52150-108 = "ไม่ใช่อย่างนั้นนะ ตอนนี้ถ้าเราคุยกันอย่างตรงไปตรงมา ฉันว่าเราจะเข้าใจกันได้..."
52150-112 = "เลิกใช้คำพูดหวานๆ หลอกตัวเองเสียทีได้ไหม?"
52150-113 = "เธอหันหลังให้กับตัวตนของฉันที่เธอหวาดกลัว แล้วก็คิดเอาว่าฉันคือภาพลวงตาที่เธอจินตนาการมา#nเองแท้ๆ"
52150-114 = "อายาเมะ ฉันน่ะ..."
52150-115 = "เธอเองก็ได้ยินจนรู้ดีอยู่แก่ใจแล้วนี่?"
52150-116 = "ว่าตั้งแต่แรกแล้ว ฉันน่ะ..."
52150-121 = "[log=아야메 황혼 1]ไม่เคยคิดว่าเธอเป็นเพื่อนเลยสักครั้ง[/log]"
52150-126 = "ตอนต่อไป;ความปรองดอง"

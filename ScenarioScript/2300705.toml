[translation]
2300705-1 = "A Girl's Gift"
2300705-2 = "I'm here, Sensei."
2300705-3 = "Were you waiting for me? Sorry. Cleaning took longer than I thought..."
2300705-4 = "So, shall we go?"
2300705-6 = "Huh? Sensei, aren't you coming?"
2300705-7 = "[s] \"...Where are we going?\""
2300705-8 = "Oh! I must have forgotten to tell you."
2300705-9 = "We're going to a shopping mall."
2300705-10 = "Um... It's a perfectly normal place that's always full of people."
2300705-11 = "[s] \"I see...\""
2300705-12 = "...Ahaha."
2300705-13 = "Maybe I get a little carried away with my jokes... You look so tense."
2300705-14 = "Mm, I'm sorry. I probably shouldn't have teased you."
2300705-15 = "I'm always in the mood to joke around whenever I see you..."
2300705-16 = "But, that's just an excuse.."
2300705-17 = "Please, allow me to apologize again."
2300705-18 = "I'm sorry for putting you through that, Sensei."
2300705-19 = "[s] \"It's not a big deal. I just think you have a...unique way of expressing yourself.\""
2300705-20 = "It's very kind of you to see it that way..."
2300705-21 = "...Heehee."
2300705-22 = "I'd like to get you something as an apology. So, let's go."
2300705-23 = "[s1] \"A gift? No, that's okay.\"\n[s2] \"You don't have to do that.\""
2300705-24 = "Oh, I see... I thought this might happen."
2300705-25 = "Oh, I see... I thought this might happen."
2300705-26 = "I wasn't sure if a pair of socks would be enough..."
2300705-27 = "I've...heard it said that it takes ten times the effort to rebuild someone's trust once it's been lost..."
2300705-28 = "Maybe it's already too late..."
2300705-29 = "They were just jokes, but when I think about how uncomfortable I must have made you feel... I guess I deserve this..."
2300705-30 = "If you hate me, then I have no one to blame but myself... I'm sorry, Sensei."
2300705-31 = "Well...I'll see you around."
2300705-32 = "[s] \"Wait, no... I'll take the socks.\""
2300705-33 = "...Really? "
2300705-34 = "[s] \"Yeah. Let's go to the mall.\""
2300705-36 = "...You're very kind."
2300705-37 = "Heehee. Okay, let's go!"
2300705-39 = "We went to the clothing store to look at socks."
2300705-40 = "Sensei, what do you think of these?"
2300705-41 = "Heeheehee! The design is so funny!"
2300705-42 = "Um, but if I had to choose..."
2300705-43 = "I'd go for white socks like these. They look nice. What do you think, Sensei?"
2300705-44 = "[s3] \"I like fancy designs.\"\n[s4] \"I like plain designs.\""
2300705-45 = "Oh. Really?"
2300705-46 = "Oh. Really?"
2300705-47 = "But I like this style."
2300705-48 = "I'm going to wear them, so I'll buy the ones I like."
2300705-49 = "[s] \"Why?\""
2300705-53 = "I'd like to buy these."
2300705-54 = "Sure. That'll be 1,000 yen. Is this a gift? Would you like it wrapped?"
2300705-55 = "No, they're for me."
2300705-56 = "I'd like to wear them now. Do you have a fitting room?"
2300705-57 = "Yes, you can use the one over there."
2300705-58 = "I'll be right back, Sensei."
2300705-60 = "[s] \"...?\""
2300705-64 = "Okay, I'm back! I really like these! And they fit just right."
2300705-65 = "Now, please wrap these for me."
2300705-66 = "Huh? You...want them wrapped?"
2300705-67 = "But you..."
2300705-69 = "These?"
2300705-70 = "Yes. I need them gift wrapped."
2300705-71 = "I was wearing these socks, and now I'm going to give them to Sensei as a gift. So, if you could wrap them in some pretty wrapping paper..."
2300705-72 = "[s] \"Wait a minute!\""
2300705-73 = "Huh? Sensei?"
2300705-74 = "Didn't you say you'd take the socks?"
2300705-75 = "..."
2300705-76 = "..."
2300705-77 = "[s] \"Noooooo! No, no, no! That's not what I meant at all!\""
2300705-79 = "[s] \"Don't look at me like that! This is all a misunderstanding!\""
2300705-80 = "Oh, my... Are socks not good enough for you?"
2300705-81 = "I-In that case...I'll have to find something that's more to your liking..."
2300705-82 = "E-Excuse me... Where is the nearest underwear store?"
2300705-83 = "..."
2300705-84 = "[s] \"Please excuse us!\""
2300705-86 = "(I grabbed Hanako and rushed out of the store.)"

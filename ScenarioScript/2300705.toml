[translation]
2300705-1 = "禮物和少女"
2300705-2 = "老師，讓您久等了。"
2300705-3 = "抱歉，打掃多花了點時間……"
2300705-4 = "那我們走吧？"
2300705-6 = "咦，老師？怎麼了嗎？"
2300705-7 = "[s] 「以防萬一，能告訴我要去哪裡嗎……？」"
2300705-8 = "啊，不好意思，我好像還沒告訴您呢。 "
2300705-9 = "要去附近的購物中心。 "
2300705-10 = "是個正常的營業場所，而且人潮也很多。"
2300705-11 = "[s] 「嗯，那就走吧。」"
2300705-12 = "……啊哈哈。"
2300705-13 = "看來我這陣子玩笑開得太過火了……沒想到讓老師這麼有戒心……"
2300705-14 = "我也不知道該怎麼解釋……"
2300705-15 = "但只要看到老師，就會不自覺的想捉弄您……"
2300705-16 = "不，這只是個藉口呢。"
2300705-17 = "真的很抱歉，老師。"
2300705-18 = "我以後會盡量不造成您的困擾的……"
2300705-19 = "[s] 「沒關係，這也是花子表達親密的方式。」"
2300705-20 = "……您是這麼善意地解讀我的玩笑的嗎？"
2300705-21 = "…呵呵。"
2300705-22 = "為了表示我的歉意……那就順便選個禮物送給老師吧？"
2300705-23 = "[s1] 「不用這麼費心啦。」\n[s2] 「你有這份心就很好了。」"
2300705-24 = "這樣啊……"
2300705-25 = "這樣啊……"
2300705-26 = "我本來想說若只是雙襪子，心情上應該也不會有太大負擔……"
2300705-27 = "要恢復失去的信任，果然需要多10倍努力呢……"
2300705-28 = "我可能已經太遲了吧……"
2300705-29 = "雖然只是開玩笑，但我終究對老師造成了困擾……#n都怪我仗著自己和老師的關係，老是做這些討人厭的事……"
2300705-30 = "會被討厭也是當然的……對不起，老師。"
2300705-31 = "那麼，下次再見了……"
2300705-32 = "[s] 「不不不！那個……只是襪子的話，我很樂意收下！」"
2300705-33 = "……"
2300705-34 = "[s] 「我們去購物中心吧。」"
2300705-36 = "……老師真的好溫柔呢。"
2300705-37 = "呵呵。那麼快走吧。"
2300705-39 = "（來到服飾店）"
2300705-40 = "老師，這件怎麼樣？"
2300705-41 = "不覺得這個圖案很有意思嗎？"
2300705-42 = "唔嗯，但如果要選的話…… "
2300705-43 = "果然還是這種設計的白色襪子感覺比較好。#n對了，老師平時都穿怎樣的襪子呢？"
2300705-44 = "[s3] 「我其實挺喜歡浮誇的圖案。」\n[s4] 「我大多都穿設計單調的款式。」"
2300705-45 = "原來如此，這樣啊。"
2300705-46 = "原來如此，這樣啊。"
2300705-47 = "不過今天的……應該沒問題吧。"
2300705-48 = "畢竟這雙是我自己要穿的……那我先去結帳了，請老師在這裡等一下。"
2300705-49 = "[s] 「……？」"
2300705-53 = "這個，請幫我結帳。"
2300705-54 = "是，總共是1,000元。請問是要送人的嗎？需要幫您包裝嗎？"
2300705-55 = "不用包，這是我自己要穿的。"
2300705-56 = "對了，我希望能直接穿回去，可以借用一下更衣室嗎？"
2300705-57 = "當然可以。更衣室就在那邊。"
2300705-58 = "我馬上就回來，老師。"
2300705-60 = "[s] 「………？？？」"
2300705-64 = "我回來了。"
2300705-65 = "啊，這雙可以幫我包起來嗎。"
2300705-66 = "咦？"
2300705-67 = "請問……"
2300705-69 = "客人您是說這雙您原本穿著的襪子嗎？"
2300705-70 = "是，麻煩您了。"
2300705-71 = "我想送給這邊這位老師，請幫我選個漂亮的包裝紙。"
2300705-72 = "[s] 「給我慢著！！？？」"
2300705-73 = "老師怎麼了嗎？"
2300705-74 = "您不是說如果是襪子很樂意收下嗎？"
2300705-75 = "……"
2300705-76 = "……………………"
2300705-77 = "[s] 「誤會啊！雖然說來話長但總之這是誤會！」"
2300705-79 = "[s] 「不要用那種眼神看我！？這是誤會！」"
2300705-80 = "哎呀，難道說一雙襪子沒辦法滿足老師嗎……？"
2300705-81 = "也就是說……唔嗯，這樣我也必須要有些覺悟才行……"
2300705-82 = "那個……請問這裡最近的內衣店在哪裡呢？"
2300705-83 = "…………"
2300705-84 = "[s] 「抱歉打擾了──！！」"
2300705-86 = "（趕緊抓住花子，用盡全力逃出購物中心）"

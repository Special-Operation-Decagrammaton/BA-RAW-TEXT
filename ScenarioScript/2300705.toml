[translation]
2300705-1 = "เด็กสาวที่มอบของขวัญให้"
2300705-2 = "ทางนี้ค่ะคุณครู"
2300705-3 = "มารอฉันอยู่เหรอคะ? ขอโทษนะคะ พอดีทำความสะอาดนานไปหน่อย..."
2300705-4 = "ไปกันเลยมั้ยคะ?"
2300705-6 = "หืม? คุณครู...? ไม่ไปเหรอคะ?"
2300705-7 = "[s] \"จะไปไหนเหรอ...?\""
2300705-8 = "โอ๊ะ ฉันยังไม่ได้บอกเลยสินะคะ"
2300705-9 = "ไปห้างสรรพสินค้าใกล้ๆ นี้ค่ะ"
2300705-10 = "อืม... เป็นสถานที่ค้าขายปกติที่มีผู้คนจำนวนมากเดินเข้าออกค่ะ"
2300705-11 = "[s] \"อ่า...\""
2300705-12 = "ฮ่าฮ่าฮ่า..."
2300705-13 = "ฉันคงล้อเล่นกับคุณครูบ่อยเกินไปสินะคะ... ไม่คิดว่าคุณครูจะเกร็งขนาดนี้"
2300705-14 = "อืม... ขอโทษด้วยนะคะ ขอโทษที่ล้อเล่นมากเกินไปค่ะ"
2300705-15 = "พอฉันเห็นคุณครูทีไรก็อยากแกล้งเล่นเรื่อยๆ เลยค่ะ..."
2300705-16 = "อืม พูดไปก็เหมือนแก้ตัวสินะคะ"
2300705-17 = "ขออภัยอีกครั้งนะคะ"
2300705-18 = "ขอโทษที่ทำให้ลำบากค่ะคุณครู"
2300705-19 = "[s] \"ไม่หรอก... นี่เป็นการแสดงความสนิทสนมตามแบบฮานาโกะจังสินะ\""
2300705-20 = "คุณครูนี่ใจดีจริงๆ นะคะ"
2300705-21 = "ฮิฮิ..."
2300705-22 = "เพื่อเป็นการขอโทษ ฉันอยากจะมอบของขวัญให้คุณครูค่ะ เอาละ ไปกันเลย"
2300705-23 = "[s1] \"ของขวัญ? มะ... ไม่เป็นไร\"\n[s2] \"เรื่องนั้นไม่ต้องหรอก\""
2300705-24 = "อ่า... เข้าใจแล้ว อย่างนี้นี่เอง..."
2300705-25 = "อ่า... เข้าใจแล้ว อย่างนี้นี่เอง..."
2300705-26 = "ไม่แน่ใจว่าถุงเท้าคู่เดียวจะพอรึเปล่า..."
2300705-27 = "ว่าแล้วเชียว ฉันเคยได้ยินมาว่าการจะเรียกคืนความเชื่อมั่นที่เสียไปคืนมาจะต้องใช้ความพยายาม#nหลายสิบเท่า"
2300705-28 = "มันสายไปแล้ว... หรือเปล่าคะ..."
2300705-29 = "ถึงมันจะเป็นเรื่องล้อเล่น แต่ถ้าคิดถึงความอึดอัดใจของคุณครูที่ถูกหยอกเล่นแล้ว... คุณครูไม่เชื่อใจฉันก็สมควรแล้วค่ะ"
2300705-30 = "ถ้าคุณครูจะเกลียดฉัน ฉันก็คงโทษใครไม่ได้นอกจากตัวฉันเอง... ขออภัยด้วยนะคะคุณครู"
2300705-31 = "ถ้างั้น... ไว้พบกันใหม่นะคะ"
2300705-32 = "[s] \"เดี๋ยวสิ... ถ้าเป็นถุงเท้าละก็ครูยินดีรับนะ\""
2300705-33 = "คะ...?"
2300705-34 = "[s] \"ไปห้างสรรพสินค้ากันเถอะ\""
2300705-36 = "เป็นคนอ่อนโยนจังเลยนะคะ"
2300705-37 = "ฮิฮิ งั้นรีบไปกันเถอะค่ะ"
2300705-39 = "(ทั้งสองคนมาเลือกถุงเท้าที่ร้านเสื้อผ้า)"
2300705-40 = "คุณครู คู่นี้เป็นยังไงคะ?"
2300705-41 = "ฮิฮิ คู่นี้ดีไซน์ตลกมากเลยค่ะ"
2300705-42 = "อืม ถ้าให้เลือกละก็..."
2300705-43 = "ถุงเท้าสีขาวแบบคู่นี้ก็ดูดีนะคะ คุณครูคิดว่ายังไงคะ?"
2300705-44 = "[s3] \"ครูชอบคู่ที่สีฉูดฉาด\"\n[s4] \"ครูชอบคู่ที่สีธรรมดาๆ น่ะ\""
2300705-45 = "อืม... อย่างนั้นเหรอคะ?"
2300705-46 = "อืม... อย่างนั้นเหรอคะ?"
2300705-47 = "แต่ว่าฉันชอบแบบคู่นี้ค่ะ"
2300705-48 = "ฉันจะใส่เอง เพราะงั้นฉันจะซื้อแบบที่ฉันชอบค่ะ"
2300705-49 = "[s] \"หืม...?\""
2300705-53 = "นี่ค่ะ คิดเงินให้ด้วยค่ะ"
2300705-54 = "ครับ ทั้งหมด 1,000 เยนครับ ซื้อเป็นของขวัญหรือเปล่าครับ? ต้องการห่อของขวัญมั้ยครับ?"
2300705-55 = "ไม่ค่ะ ฉันจะใส่เองค่ะ"
2300705-56 = "ฉันจะเปลี่ยนตอนนี้เลย ขอใช้ห้องลองเสื้อหน่อยได้มั้ยคะ"
2300705-57 = "ครับ ใช้ห้องที่อยู่ทางด้านนั้นได้เลยครับ"
2300705-58 = "ขอตัวสักครู่นะคะคุณครู"
2300705-60 = "[s] \"...??\""
2300705-64 = "กลับมาแล้วค่ะ ฮุฮุฮุ เหมาะกับฉันมากเลยค่ะ ไซซ์ก็พอดีมากเลย"
2300705-65 = "อ๊ะ รบกวนห่อคู่นี้ให้หน่อยนะคะ"
2300705-66 = "ครับ? ให้ห่อคู่นี้เหรอครับ?"
2300705-67 = "แต่ว่า..."
2300705-69 = "อันนี้เหรอครับ?"
2300705-70 = "ค่ะ ห่อให้ด้วยนะคะ"
2300705-71 = "นี่เป็นถุงเท้าที่ฉันใส่แล้วค่ะ ฉันอยากจะมอบเป็นของขวัญให้กับคุณครูค่ะ รบกวนห่อให้สวยๆ ด้วยนะคะ..."
2300705-72 = "[s] \"เดี๋ยวก่อน!\""
2300705-73 = "โอ๊ะ? คุณครู?"
2300705-74 = "คุณครูบอกว่าถ้าเป็นถุงเท้า ก็ยินดีรับไม่ใช่เหรอคะ?"
2300705-75 = "..."
2300705-76 = "...."
2300705-77 = "[s] \"ไม่ใช่นะ ครูไม่ได้หมายความว่าอย่างนั้น!\""
2300705-79 = "[s] \"อย่ามองครูด้วยสายตาแบบนั้นสิ เอาเป็นว่าเข้าใจผิดนะ!\""
2300705-80 = "เอ๊ะ หรือว่าคุณครูไม่ถูกใจถุงเท้าพวกนี้คะ...?"
2300705-81 = "ถ้าอย่างงั้น... ฉันคงต้องหาอย่างอื่นที่คุณครูชอบแล้วละค่ะ"
2300705-82 = "ขอโทษนะคะ ร้านชุดชั้นในที่อยู่ใกล้ที่สุดอยู่ตรงไหนคะ...?"
2300705-83 = "...."
2300705-84 = "[s] \"ขอโทษด้วยนะ----!!\""
2300705-86 = "(คุณครูรีบดึงฮานาโกะออกไปจากห้างสรรพสินค้าทันที)"

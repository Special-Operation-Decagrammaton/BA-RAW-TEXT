90001045-115 = "3;히마리 방한복;09;그러니 제안하죠. 서로 알고 있는 정보를 교환하는 게 어때요? \n#3;em;[?]"
90001045-116 = "3;리오;00;그 의견에는 찬성이야. 그리고 정보 교환은…… 일단 게부라의 뒤를 쫓으면서 동시에 진행하는 게 합리적이라고 생각하는데.\n#3;sig"

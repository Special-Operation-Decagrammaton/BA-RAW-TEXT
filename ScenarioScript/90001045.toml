[translation]
90001045-3 = "葛夫拉的動作變慢了。季！"
90001045-4 = "是，莉央大人。我要上了！"
90001045-12 = "這次奏效了！#n不過……它還是鑽進冰面底下了。"
90001045-13 = "……似乎撤退了呢。#n雖然讓它逃走確實有點可惜……"
90001045-18 = "但我們現在也需要一些時間重新整頓。"
90001045-19 = "葛夫拉的信號已經消失了……速度還真驚人。#n不過除此之外……"
90001045-22 = "……"
90001045-28 = "……"
90001045-29 = "嗨，莉央會長。#n你這次的登場還真有效率呢，時機也堪稱完美。"
90001045-33 = "話說回來，陽葵部長還好嗎？"
90001045-34 = "……雖然不清楚這個問題的用意何在，不過我好得很哦？#n絕對沒有因為風頭被搶走而感到忌妒或羨慕，知道了嗎？"
90001045-35 = "畢竟我這個人的心胸可是非常寬厚的──你說對吧，英美？"
90001045-36 = "嗯，我知道部長正在鬧彆扭。"
90001045-37 = "請不要老是誹謗我好嗎！"
90001045-42 = "總之，暫且來個形式上的寒暄吧。"
90001045-43 = "好久不見，莉央。最近過得好嗎？"
90001045-46 = "我……"
90001045-47 = "你沒聽到我剛才說要進行形式上的寒暄嗎……？"
90001045-52 = "[ns]「這種時候就跟大家打聲招呼吧，莉央。」"
90001045-53 = "我，我明白了。那麼……"
90001045-54 = "大家都還好嗎？#n我……很高興見到你們，嗯。"
90001045-55 = "是，我也很高興見到您，莉央大人。"
90001045-56 = "今天是否有在早上起床呢？#n應該沒有又像以前一樣，因為熬夜而睡到下午吧？"
90001045-57 = "……"
90001045-58 = "雖然基本的生活品質可以靠家務輔助機器來維持，但那終究不是長久之計。"
90001045-59 = "那，那個……"
90001045-60 = "……我有在努力了。"
90001045-62 = "（好像可以想像得到會長和季住在一起時的情景……）"
90001045-68 = "好了！我們差不多該回歸正題了。"
90001045-69 = "就先從你為什麼遲遲不回到千年，一直到處躲躲藏藏這件事開始討論吧。"
90001045-70 = "那個……"
90001045-71 = "某位研討會的會計，似乎有很多話想對你說哦？"
90001045-72 = "！？"
90001045-73 = "除此之外，你選在這種時刻現身的原因也令我相當在意。"
90001045-74 = "該不會是認為缺少像樣的表現就沒有理由回來──"
90001045-75 = "或者必須先做出一番成績，才有資格回來之類的吧？"
90001045-79 = "……我一直在追蹤無名之神力量的蹤跡。"
90001045-80 = "無名之神的力量，是嗎？"
90001045-81 = "沒錯。那天……於奇普托斯顯現的那股力量，#n在事件結束後並沒有消失，而是持續在這個世界留下蹤跡。"
90001045-82 = "只是就連我也沒想到，竟然會在追查的過程中碰上你們。"
90001045-83 = "（在追查無名之神力量的蹤跡時，碰上了十字神名的預言者……？）"
90001045-87 = "我依舊……想對奇普托斯的異常現象進行預防和應對。#n就和成立特異現象搜查部時一樣……"
90001045-88 = "我明白自己不擅言詞，所以希望能專注在自己能力所及的事情上。"
90001045-89 = "這或許也是……屬於我的反省方式吧。"
90001045-91 = "……"
90001045-92 = "我明白了。那就再讓我問一件事吧。"
90001045-93 = "你是不是打從一開始就想把特異現象搜查部的事都丟給我，然後自己一個人消失？#n……所以才會開出令我難以拒絕的條件。"
90001045-94 = "我認為如果是你的話……#n就算對我抱持著厭惡，也能理解我的理念。"
90001045-95 = "……你知道這從某些角度來看，也稱得上是一種脅迫嗎？"
90001045-96 = "[s3]「好了好了，我們就別太為難莉央了……」\n[s4]「要不是莉央及時出現，我們差點就要出事了。」"
90001045-99 = "……嗯，這點我當然也很清楚。"
90001045-100 = "即便撇除剛才的事不談，我們所有人都確實欠了你很大的人情。"
90001045-101 = "所以我本來才打算要他別再管什麼藉口或理由，立刻回到千年的……"
90001045-102 = "嗯？我剛才沒聽清楚，你說了什麼嗎？"
90001045-103 = "什麼都沒有！"
90001045-104 = "雖然部長這麼說，但從某個角度來看……#n事情的發展完全如會長所料，部長現在已經完全融入特異現象搜查部了呢。"
90001045-105 = "沒錯，其中自然也少不了我這個優秀特務兼完美女僕的功勞。"
90001045-106 = "……季的部分先不討論，身為特異現象搜查部真正的創始人，會長現在的感想如何？"
90001045-110 = "……目前還不清楚。"
90001045-111 = "就知道你會這麼說……"
90001045-112 = "不過現在所發生的一切的確不太尋常。#n而這會對奇普托斯造成什麼影響也同樣令人擔憂。"
90001045-113 = "總而言之，如今你手中已經掌握了一些情報。"
90001045-114 = "而我們在來這裡的途中，也同樣獲得了不少資訊。"
90001045-115 = "所以我有個提案。#n先來交換一下彼此手中的情報如何？"
90001045-116 = "我贊成。不過如果要交換情報的話……#n我認為先開始追蹤葛夫拉，並在途中交換情報會更加合理。"
90001045-117 = "這個提議不錯。#n英美，還記得葛夫拉是往哪個方向消失的嗎？"
90001045-118 = "嗯，不用擔心，我記得一清二楚。"
90001045-119 = "那我們就快點出發吧。#n您準備好了嗎，老師？"
90001045-121 = "下一話;變數"

90001045-81 = "3;히마리 방한복;02\n2;리오;02;그래. 그날…… 키보토스에 현현했던 그 힘은 사건이 끝난 이후로도 사라지지 않고 계속해서 흔적을 남기고 있었거든.\n#2;sig"
90001045-82 = "3;히마리 방한복;02\n2;리오;01;그 과정에서 너희들과 이렇게 만나게 될 줄은, 나도 예상하지 못했지만.\n#2;sig"
90001045-83 = "3;히마리 방한복;02;(이름 없는 신들의 힘이 남긴 흔적을 추적하는 과정에서, 결과적으로 데카그라마톤의 예언자와 마주치게 되었다……?)"

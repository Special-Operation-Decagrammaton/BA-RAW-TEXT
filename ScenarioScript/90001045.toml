[translation]
90001045-3 = "เกวูราห์เคลื่อนไหวช้าลงแล้ว โทคิ!"
90001045-4 = "ค่ะ ท่านริโอะ ฉันจะไปเดี๋ยวนี้ค่ะ!"
90001045-12 = "ครั้งนี้ถือว่าได้ผลหรือเปล่านะ... จู่ๆ ก็เจาะน้ำแข็งลงไปเลยแฮะ?"
90001045-13 = "ล่าถอยไปแล้วสินะ... น่าเสียดายนะคะที่พลาดไปได้"
90001045-18 = "แต่ถึงอย่างนั้น พวกเราก็ต้องซ่อมบำรุงอาวุธและก็พักผ่อนอยู่ดีค่ะ"
90001045-19 = "สัญญาณของเกวูราห์หายไปแล้วแฮะ ไปเร็วมากเลยนะนั่น"
90001045-22 = "..."
90001045-28 = "..."
90001045-29 = "สวัสดี ประธานริโอะ เป็นการปรากฏตัวที่มีประสิทธิภาพในหลายๆ ด้านเลยนะ เมื่อกี้ถือว่าจังหวะเหมาะ#nเหม็งเลย "
90001045-33 = "ว่าแต่หัวหน้าล่ะ เป็นยังไงบ้าง?"
90001045-34 = "ฉันไม่รู้หรอกนะคะว่าทำไมถึงถามฉันแบบนั้น แต่ฉันไม่เห็นจะเป็นอะไรเลยค่ะ ฉันไม่ได้หมั่นไส้ หรืออิจฉาที่ถูกขโมยซีนเลยแม้แต่น้อยค่ะ"
90001045-35 = "ก็ฉันเป็นคนใจกว้างนี่คะ เอมิเองก็รู้ไม่ใช่เหรอคะ?"
90001045-36 = "อืม ฉันรู้ว่าหัวหน้างอนอะไรบางอย่างอยู่"
90001045-37 = "เลิกพูดจากล่าวหากันได้แล้วค่ะ!"
90001045-42 = "เอาเถอะค่ะ ตอนนี้เราคงต้องทักทายกันอย่างเปิดเผยและเป็นทางการก่อนค่ะ"
90001045-43 = "ยินดีที่ได้เจอค่ะ ริโอะ สบายดีมั้ยคะ?"
90001045-46 = "ฉัน..."
90001045-47 = "ฉันขอให้เราเริ่มด้วยการทักทายกันอย่างเปิดเผยและเป็นทางการไม่ใช่เหรอคะ...?"
90001045-52 = "[ns] \"เวลาแบบนี้ก็ทักทายกันหน่อยเถอะน่า ริโอะ\""
90001045-53 = "กะ... ก็ได้ ถ้าอย่างนั้นก็..."
90001045-54 = "ทุกคน... สบายดีมั้ย? คือว่า... ดีใจที่ได้เจอนะ อืม"
90001045-55 = "ค่ะ ฉันสบายดีค่ะ ท่านริโอะ "
90001045-56 = "ตอนเช้าตื่นนอนได้ปกติดีมั้ยคะ? ไม่ใช่ว่ายังนอนดึกและตื่นตอนบ่ายๆ เหมือนเดิมอยู่หรอกนะคะ?"
90001045-57 = "!?!?"
90001045-58 = "ถึงการใช้ชีวิตในด้านอื่นๆ จะยังพึ่งพาอุปกรณ์ช่วยดูแลงานบ้านได้อยู่ แต่จะให้วงจรชีวิตเป็นอย่างนั้น#nตลอดมันก็ไม่ดีนะคะ"
90001045-59 = "ระ... เรื่องนั้น..."
90001045-60 = "ฉันก็กำลังพยายามอยู่..."
90001045-62 = "(พอจะดูออกเลยนะว่าประธานกับโทคิใช้ชีวิตด้วยกันแบบไหนมา...)"
90001045-68 = "เอาละๆ! เรามาเข้าประเด็นกันดีกว่าค่ะ"
90001045-69 = "ประเด็นหลักที่ว่าก็เช่น ทำไมที่ผ่านมาถึงไม่กลับมาที่มิลเลเนียมเลย และระหว่างนั้นไปซ่อนตัวอยู่ที่ไหน#nมาน่ะค่ะ"
90001045-70 = "เรื่องนั้น..."
90001045-71 = "ที่สำคัญกว่านั้นก็คือ เหมือนว่านักบัญชีแห่งเซมิน่าจะมีเรื่องมากมายที่อยากคุยกับคุณนะคะ"
90001045-72 = "?!"
90001045-73 = "การปรากฏตัวในช่วงเวลาที่สำคัญแบบนี้ทำให้ฉันกังวลใจอยู่นะคะ"
90001045-74 = "ถ้าไม่มีผลงานที่น่าพึงพอใจ ก็คงไม่มีเหตุผลในการกลับมา"
90001045-75 = "หรือไม่ก็ต้องมีผลงานที่เหมาะสมพอจะให้กลับไปได้ คุณคิดแบบนี้อยู่หรือเปล่าล่ะคะ?"
90001045-79 = "ฉัน... กำลังติดตามร่องรอยที่พลังของทวยเทพไร้นามทิ้งไว้อยู่"
90001045-80 = "พลังของทวยเทพไร้นามเหรอคะ?"
90001045-81 = "ใช่ ในวันนั้น... พลังที่ปรากฏอย่างเด่นชัดในคิโวทอสไม่ได้หายไป ต่อให้เหตุการณ์จะจบลงแล้ว แต่ก็ยังทิ้งร่องรอยเอาไว้อยู่"
90001045-82 = "และฉันก็ไม่คิดว่าระหว่างที่ฉันติดตามร่องรอยนั่น ฉันจะได้มาพบกับพวกเธออย่างนี้"
90001045-83 = "(ระหว่างติดตามร่องรอยของพลังของทวยเทพไร้นาม ก็ได้ไปเจอกับผู้เลื่อมใสของเดคาแกรมมาทอน#nอย่างนั้นเหรอ...?)"
90001045-87 = "ฉันยังคง... อยากป้องกันและเตรียมรับมือกับปรากฏการณ์ผิดปกติที่จะเกิดขึ้นในคิโวทอส เช่นเดียวกับ#nที่ชมรมปรากฏการณ์ลี้ลับทำ..."
90001045-88 = "ฉันไม่เก่งเรื่องการพูดคุยหรอก ฉันว่าตัวเองน่าจะเป็นอย่างนั้นละ ฉันก็เลยอยากอุทิศตัวในสิ่งที่ฉัน#nสามารถทำได้"
90001045-89 = "บางทีนั่นก็อาจเป็นอะไรที่คล้ายกับ... การสำนึกผิดก็ได้..."
90001045-91 = "..."
90001045-92 = "ก็ดีค่ะ ฉันเข้าใจแล้ว แต่ยังติดอยู่อย่างหนึ่ง"
90001045-93 = "เรื่องงานของชมรมปรากฏการณ์ลี้ลับน่ะ ตอนแรกคุณโยนภาระให้ฉันทั้งหมดแล้วหายไปใช่มั้ยล่ะคะ? ให้ไว้พร้อมกับเงื่อนไขที่ยากจะปฏิเสธด้วย"
90001045-94 = "เพราะฉันคิดว่าถึงเธอจะเกลียดฉัน แต่เธอก็จะเข้าใจยังไงล่ะ"
90001045-95 = "มองบางมุมแล้ว นั่นอาจเป็นการข่มขู่เลยนะคะ?"
90001045-96 = "[s3] \"ถ้าไม่มีริโอะ ป่านนี้พวกเราจะเป็นยังไงบ้างก็ไม่รู้นะ...\"\n[s4] \"ถ้าริโอะไม่อยู่ที่นั่น พวกเราอาจเจอเรื่องใหญ่ไปแล้วก็ได้นะ\""
90001045-99 = "ค่ะ... เรื่องนั้นฉันก็รู้ดีค่ะ"
90001045-100 = "ต่อให้ไม่มีเหตุการณ์ครั้งนี้ พวกเราทุกคนก็เป็นหนี้คุณอยู่มากมายแล้วค่ะ"
90001045-101 = "ฉันก็เลยอยากบอกให้คุณหยุดกังวลเกี่ยวกับข้อแก้ตัวและอะไรนู่นนี่ แล้วรีบกลับไปที่มิลเลเนียมตอนนี้เลย..."
90001045-102 = "หืม? ได้ยินไม่ชัดเลย เมื่อกี้เธอว่าอะไรนะ?"
90001045-103 = "ไม่มีอะไรเลยค่ะ!"
90001045-104 = "แต่จากสถานการณ์ตอนนี้ ดูเหมือนว่าประธานจะเคลื่อนไหวพร้อมกับชมรมปรากฏการณ์ลี้ลับอย่างที่#nตั้งใจไว้เลยนะ"
90001045-105 = "ใช่ค่ะ แถมยังมีฉันที่เป็นสุดยอดสายลับและเมดที่สมบูรณ์แบบอยู่ด้วยอีกค่ะ"
90001045-106 = "ถ้าตัดเรื่องปฏิกิริยาแบบนั้นของโทคิไป ในฐานะของผู้ริเริ่มชมรมปรากฏการณ์ลี้ลับแล้ว ประธานรู้สึกยังไงล่ะ?"
90001045-110 = "ไม่รู้สิ... ยังไม่รู้หรอก"
90001045-111 = "ฉันกะไว้แล้วค่ะว่าต้องตอบแบบนั้น..."
90001045-112 = "แต่ที่ฉันแน่ใจก็คือ สิ่งที่เกิดขึ้นตอนนี้ไม่ใช่เรื่องปกติ และมันอาจจะส่งผลบางอย่างต่อคิโวทอสด้วย"
90001045-113 = "โดยรวมแล้ว ฉันรู้อย่างแน่นอนว่าคุณรู้บางอย่างอยู่ค่ะ"
90001045-114 = "และระหว่างที่พวกเราดั้นด้นมาถึงตรงนี้ ฉันก็ได้รู้ข้อมูลนู่นนี่ด้วย"
90001045-115 = "ฉันก็เลยอยากเสนอค่ะ เรามาแลกเปลี่ยนสิ่งที่ตัวเองรู้กันดีมั้ยคะ? "
90001045-116 = "ฉันเห็นด้วยกับข้อเสนอนั้น และคิดว่า... ตอนนี้เราควรไล่ตามเกวูราห์กันก่อน แล้วค่อยแลกเปลี่ยน#nข้อมูลระหว่างนั้น"
90001045-117 = "ก็สมเหตุสมผลดีค่ะ เอมิ ยังจำได้มั้ยคะว่าเกวูราห์หายตัวไปตรงไหน?"
90001045-118 = "อืม ไม่ต้องห่วงหรอก เรื่องนั้นฉันจำได้ดีเลยละ"
90001045-119 = "ถ้าอย่างนั้นเราก็รีบออกเดินทางกันเถอะค่ะ ไปกันเลยมั้ยคะ คุณครู?"
90001045-121 = "ตอนต่อไป;ตัวแปร"

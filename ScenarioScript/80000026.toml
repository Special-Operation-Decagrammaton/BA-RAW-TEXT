[translation]
80000026-1 = "#title;붉은겨울 학원의 특산품"
80000026-2 = "#place;붉은겨울 학원 정문"
80000026-3 = "#wait;2200"
80000026-4 = "#na;(토모에의 호출을 받고 붉은겨울 학원을 찾았다.)"
80000026-5 = "3;토모에;01;어서 오십시오, 선생님. 기다리고 있었습니다.\n#3;em;[반짝]\n#3;greeting\n#3;a"
80000026-6 = "3;토모에;02;듣자 하니 키보토스에서는 오늘을 발렌타인 데이라고 부르며 기념한다지요?"
80000026-7 = "3;토모에;99;오랫동안 마음을 전하지 못했던 상대에게 초콜릿을 전하며 자신의 감정을 고백하는 날이라…… 이 어찌나 멋진 기념일인지.\n#3;stiff"
80000026-8 = "3;토모에;01;그래서 저도 선생님을 위해 약소하게나마 준비를 했답니다.\n#3;em;[///]"
80000026-9 = "#st;[0,0];instant;1;"
80000026-10 = "#clearST"
80000026-11 = "3;토모에;01\n#3;m5\n#wait;1000"
80000026-12 = "#wait;2500"
80000026-13 = "3;토모에;00;선생님, 부디 이 초콜릿을 받아주셨으면 합니다.\n#3;greeting"
80000026-14 = "[s] \"이건… 발렌타인 초콜릿?\""
80000026-15 = "3;토모에;03;네, 맞습니다. 이 초콜릿은 오늘을 위해 특별히 만든……\n#3;em;[반응]\n#3;m3"
80000026-16 = "3;토모에;05;붉은겨울 학원의 새로운 특산품이니까요!\n#3;closeup"
80000026-17 = "3;토모에;02;그동안 붉은겨울 학원에서는 <체룐카>라는 이름의 밀크 초콜릿을 만들어왔지만, 서기장님의 입맛에 맞추느라 단가를 맞추기가 어렵고, 지나치게 달다는 문제가 있었답니다."
80000026-18 = "3;토모에;05;게다가 무엇보다도…… 표지에 그려진 체리노 쨩의 초상화가 조금도 귀엽지가 않았어요!\n#3;em;[빠직]"
80000026-19 = "3;토모에;06;제가 모처럼 초콜릿의 디자인을 위해 초상화도 귀엽게 새로 그렸는데, 체리노 쨩은 위엄이 없다는 이유로 거들떠보지도 않고…….\n#3;stiff"
80000026-20 = "3;토모에;99;그래서 제가 특별히 따로 급양부원들에게 부탁을 해서 새로운 맛과 디자인의 체룐카를 만들도록 주문을 했답니다."
80000026-21 = "3;토모에;03;이 초콜릿이라면…… 분명 키보토스 전역에 붉은겨울의 이름과 체리노 쨩의 귀여움을 널리 전파할 수 있을 거예요!\n#3;em;[반짝]\n#3;greeting"
80000026-22 = "3;토모에;03;그러니 선생님께서 이 시제품을 먼저 드셔 보시고 감상을 들려주셨으면 합니다."
80000026-23 = "[s] \"이거…… 발렌타인 초콜릿이지?\""
80000026-24 = "3;토모에;01;네, 맞습니다. 이번 발렌타인 데이를 위해 특별히 만든 시제품이니까요."
80000026-25 = "3;토모에;02;그게 아니라면…… 이 초콜릿에 무슨 문제라도 있는 건가요? 어쩐지 실망하신 것처럼 보이는데요…….\n#3;em;[?]"
80000026-26 = "[s] \"아니야. 잘 먹을게.\""
80000026-27 = "3;토모에;99;후후, 다행입니다."
80000026-28 = "3;토모에;03;그럼 제 '진심이 담긴' 초콜릿을 부디 천천히 즐겨주세요!\n#3;em;[음표]"
80000026-29 = "#wait;500"

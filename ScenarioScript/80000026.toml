[translation]
80000026-1 = "Red Winter Academy Specialty"
80000026-2 = "Red Winter Academy Main Gate"
80000026-4 = "I got a message from Tomoe asking me to meet her at Red Winter Academy."
80000026-5 = "Welcome, Sensei. I've been waiting for you."
80000026-6 = "I hear it's Valentine's Day."
80000026-7 = "Isn't it wonderful? You're meant to gift chocolates to someone you wish to confess your feelings to."
80000026-8 = "I've prepared a small gift for you, Sensei."
80000026-13 = "Please accept this chocolate."
80000026-14 = "[s] \"Is this Valentine's Day chocolate?\""
80000026-15 = "Yes! This chocolate was made specially for today."
80000026-16 = "It's a new Red Winter Academy specialty!"
80000026-17 = "It's known as Cherenka. This chocolate has been made here for quite some time now. However, the Great Leader enjoys it extremely sweet which drives up the production costs."
80000026-18 = "And worst of all, Cherino's portrait on the packaging isn't cute at all!"
80000026-19 = "I tried to draw new artwork more befitting of our Great Leader,#nbut she called it undignified with hardly a second glance."
80000026-20 = "The School Lunch Club members have been working tirelessly to create a Cherenka with a better taste and design."
80000026-21 = "And so, my project to spread Cherino's adorable visage all over Kivotos is nearly complete!"
80000026-22 = "So I'd like you to taste this prototype and give your honest opinion."
80000026-23 = "[s] \"You're sure this is Valentine's Day chocolate?\""
80000026-24 = "Yes, that's right. This prototype was specially made for Valentine's Day."
80000026-25 = "Why do you seem apprehensive? Is there a problem with it?"
80000026-26 = "[s] \"Not at all. It looks delicious.\""
80000026-27 = "Heehee. I'm glad to hear that."
80000026-28 = "I hope you enjoy my heartfelt chocolate, Sensei!"

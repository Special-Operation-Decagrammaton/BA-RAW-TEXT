[translation]
80000026-1 = "สินค้าพิเศษของสหภาพเรดวินเทอร์"
80000026-2 = "ประตูหน้า สหภาพเรดวินเทอร์"
80000026-4 = "(คุณครูได้รับการติดต่อจากโทโมเอะ เลยแวะมาที่สหภาพเรดวินเทอร์)"
80000026-5 = "เชิญค่ะ คุณครู กำลังรออยู่เลยค่ะ"
80000026-6 = "จากที่ได้ยินมาวันนี้เป็นวันเฉลิมฉลองเทศกาลที่เรียกว่าวาเลนไทน์ใช่มั้ยคะ?"
80000026-7 = "วันที่คนจะสารภาพความในใจของตัวเองและมอบช็อกโกแลตให้กับคนที่ชอบ... ช่างเป็นวันเฉลิมฉลอง#nที่ยอดเยี่ยมมากเลยนะคะ"
80000026-8 = "เพราะงั้นฉันเลยเตรียมช็อกโกแลตมาให้คุณครูด้วยค่ะ"
80000026-13 = "ถ้าคุณครูยินดีรับไปก็คงดีไม่น้อยเลยค่ะ"
80000026-14 = "[s] \"นี่... ช็อกโกแลตวาเลนไทน์เหรอ?\""
80000026-15 = "ใช่แล้วค่ะ ช็อกโกแลตนี่ทำขึ้นเป็นพิเศษเพื่อวันนี้..."
80000026-16 = "สินค้าพิเศษชิ้นใหม่ของสหภาพเรดวินเทอร์ค่ะ!"
80000026-17 = "ที่ผ่านมาสหภาพเรดวินเทอร์ได้ผลิตช็อกโกแลตนม <ช็อกเชริโน่> ขึ้นมา แต่เพราะมัวแต่ปรับ#nให้ได้รสชาติที่ประธานเชริโน่ชอบ เลยปรับราคาต่อหน่วยค่อนข้างลำบาก และรสชาติที่หวานมากๆ ก็เป็นปัญหาอย่างหนึ่งค่ะ"
80000026-18 = "แล้วก็อีกอย่างหนึ่ง... รูปเชริโน่จังที่วาดอยู่บนแพ็กเกจก็ดูไม่น่ารักเลยสักนิดค่ะ!"
80000026-19 = "ฉันอุตส่าห์วาดภาพน่ารักๆ เอาไว้ติดที่กล่องแพ็กเกจของช็อกโกแลต แต่ว่าเชริโน่จังปัดตกไป เพราะบอกว่ามันดูไม่สมเกียรติ..."
80000026-20 = "เพราะงั้นฉันเลยส่งคำขอพิเศษไปทางชมรมโภชนาการให้ปรับรสชาติและดีไซน์ของช็อกเชริโน่ใหม่ค่ะ"
80000026-21 = "ถ้าเป็นช็อกโกแลตนี่ละก็... จะต้องทำให้ทุกเขตในคิโวทอสได้รู้จักชื่อและความน่ารักของเชริโน่จัง#nแห่งสหภาพเรดวินเทอร์ได้แน่ๆ เลยค่ะ!"
80000026-22 = "เพราะงั้นฉันเลยอยากให้คุณครูชิมและช่วยบอกความรู้สึกหลังชิมหน่อยค่ะ"
80000026-23 = "[s] \"นี่... ช็อกโกแลตวาเลนไทน์เหรอ?\""
80000026-24 = "ใช่แล้วค่ะ นี่เป็นขนมตัวอย่างสุดพิเศษที่ทำขึ้นมาเพื่อวันวาเลนไทน์นี้เลยค่ะ"
80000026-25 = "คือว่า... ช็อกโกแลตนี่มันมีปัญหาอะไรรึเปล่าคะ? ทำไมคุณครูถึงมีสีหน้าดูผิดหวังล่ะคะ..."
80000026-26 = "[s] \"เปล่าหรอก ครูกินละนะ\""
80000026-27 = "ฮู่ว ค่อยยังชั่วค่ะ"
80000026-28 = "ขอให้คุณครูเพลิดเพลินกับ \"ช็อกโกแลตที่ทำจากใจ\" นี้อย่างเต็มที่ได้เลยนะคะ!"

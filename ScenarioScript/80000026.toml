[translation]
80000026-1 = "赤冬聯邦學園的特產"
80000026-2 = "赤冬聯邦學園．正門"
80000026-4 = "（收到智惠的聯絡後，來到了赤冬聯邦學園）"
80000026-5 = "歡迎，老師。我一直在等你。"
80000026-6 = "根據我聽到的消息，奇普托斯似乎將今天稱為情人節並加以慶祝呢？"
80000026-7 = "藉由巧克力向難以傳達感情的對象表達自己的心意……是個非常美妙的節日呢。"
80000026-8 = "恕我冒昧，我也為老師做了一些準備。"
80000026-13 = "老師，希望你可以收下這個。"
80000026-14 = "[s]「這個是……？」"
80000026-15 = "這個巧克力是特別為了今天製作的……"
80000026-16 = "赤冬聯邦學園的最新特產！"
80000026-17 = "至今為止，赤冬聯邦學園都專注於生產名為「潔蓮卡」的牛奶巧克力。#n然而為了配合潔莉諾會長的喜好導致口味相當的甜，又難以從中獲利……"
80000026-18 = "而且最重要的是……包裝上畫的潔莉諾醬不可愛！"
80000026-19 = "要很有威嚴這點我很清楚。但是難得有這種機會……#n我還是希望能傳達潔莉諾醬的可愛之處，於是重新繪製了新的圖案。#n雖然潔莉諾醬並不是很喜歡……"
80000026-20 = "想說看了各位的反應之後會不會讓他回心轉意，#n於是我拜託供給部的部員們，製作了新口味與設計的「潔蓮卡」。"
80000026-21 = "這樣一來……一定可以把赤冬聯邦學園的名號，#n以及最重要的潔莉諾醬的可愛之處，傳達到奇普托斯的每個角落吧！"
80000026-22 = "於是製作出來的就是這個。希望老師可以試吃這個試作品，讓我聽聽你的感想。"
80000026-23 = "[s]「那這個就是情人巧克力嗎……？」"
80000026-24 = "是的，沒錯唷？畢竟是為了情人節特別製作的。"
80000026-25 = "有什麼問題嗎？總覺得老師好像有點失望……？"
80000026-26 = "[s]「沒什麼，我會好好享用的。」"
80000026-27 = "呵呵，好的。"
80000026-28 = "請細細品嚐我「蘊含真心的巧克力」唷。"

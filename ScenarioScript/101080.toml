101080-11 = "Haha... After being rejected so many times, we're finally meeting with the General Student Council."
101080-12 = "Seriously. It used to make me so angry that I've even considered wiping out the General Student Council. Look at us now."
101080-13 = "The General Student Council?! Hoshino, wouldn't that be too much, even for you?"
101080-14 = "Of course it is. Heh. I'm old with back pains now. I was just reminiscing about when I was a feisty youth like you."
101080-15 = "Hahaha... That really wasn't too long ago."
101080-19 = "It may have not been too long ago, but everything is different. We have Sensei now."
101080-20 = "I don't know why I've been so nostalgic recently. Remember when you showed up out of nowhere, Nonomi? And meeting Shiroko for the first time."
101080-21 = "You're acting like an old fart is what you're doing, Hoshino."
101080-22 = "I've actually never heard the story of you and Shiroko meeting for the first time."
101080-23 = "Really? I've never talked about it?"
101080-24 = "Shiroko was a wild girl when we first met. It took me and Nonomi a lot of work to capture her..."

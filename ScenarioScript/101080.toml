[translation]
101080-1 = "ตอนที่ 8;เมื่อแสงปรากฏ"
101080-3 = "รุ่นพี่ชิโรโกะ ทุกคนกำลังรออยู่นะ รีบๆ มาเร็วเข้า"
101080-4 = "ชิโรโกะจัง~ พวกเราต้องรีบออกเดินทางนะ สายแล้วเนี่ย"
101080-5 = "(ซ่า) อืม ใกล้จะถึงแล้ว ฉันเร่งสปีดให้อยู่"
101080-6 = "ชิโรโกะจัง เดี๋ยวเกิดอุบัติเหตุนะคะ ห้ามใช้โทรศัพท์ระหว่างปั่นจักรยานค่ะ"
101080-7 = "(ซ่า) อืม เข้าใจแล้ว งั้นเดี๋ยวเจอกัน"
101080-11 = "ฮ่าฮ่า... ก่อนหน้านี้เรายื่นคำร้องขอพบองค์การนักเรียนไปตั้งหลายครั้ง แต่ว่าทางนั้นก็ไม่ตอบกลับมา#nเลย สุดท้ายก็เปิดโอกาสให้แล้วสินะคะ..."
101080-12 = "ใช่ๆ เมื่อก่อนเรื่องนี้ทำให้ฉันหัวร้อนอยู่หลายครั้งเลย เคยคิดอยู่เลยละว่าจะบุกไประเบิดองค์การ#nนักเรียนทิ้งให้รู้แล้วรู้รอดไปเลย~"
101080-13 = "องค์การนักเรียนเหรอ...? ถึงรุ่นพี่โฮชิโนะจะเก่งแค่ไหน แต่นั่นมันไม่เกินกำลังไปหน่อยเหรอไงน่ะ?"
101080-14 = "เกินกำลังอยู่แล้ว พอลุงอายุมากขึ้น กระดูกกระเดี้ยวก็ไม่ดี เอวก็เจ็บ หลังก็ปวด แรงก็ไม่มีเหมือนแต่#nก่อนด้วย ที่บอกว่าจะบุกไป มันเป็นความคิดตอนที่ลุงยังเอ๊าะๆ น่ะ~"
101080-15 = "แหะๆๆ... แต่เราก็ไม่ได้อายุห่างกันมากนะ..."
101080-19 = "อื้ม แต่ตอนนี้สถานการณ์มันเปลี่ยนไปแล้วนี่คะ ตอนนี้พวกเรามีคุณครูแล้วด้วย"
101080-20 = "ลุงคนนี้แค่ชอบนึกถึงเรื่องเมื่อสมัยก่อนน่ะ ทั้งตอนได้เจอกับชิโรโกะจังเป็นครั้งแรก ทั้งตอนที่จู่ๆ โนโนมิจังก็เข้ามาหาถึงที่นี่"
101080-21 = "อะไรเนี่ย พูดจาเหมือนคนแก่จริงๆ เลย..."
101080-22 = "ตอนได้เจอกับรุ่นพี่ชิโรโกะเป็นครั้งแรกเหรอคะ? เป็นยังไงเหรอคะ? ฉันยังไม่เคยได้ยินมาก่อนเลย"
101080-23 = "หืม? ฉันยังไม่เคยเล่าให้ฟังเหรอ?"
101080-24 = "ตอนแรกที่ได้เจอกัน ชิโรโกะจังเป็นเหมือนสัตว์ป่าหลงทางเลยละนะ กว่าจะจับตัวชิโรโกะจังได้ ฉันกับโนโนมิจังเหนื่อยกันแทบแย่"
101080-25 = "จับตัวเหรอ... "
101080-27 = "รุ่นพี่โฮชิโนะ เรื่องนี้มัน..."
101080-28 = "ไม่เห็นมีอะไรต้องปิดบังเลยนี่นา โนโนมิจัง"
101080-33 = "มันก็จริงอยู่หรอกค่ะ แต่ว่า... ชิโรโกะจัง... ไม่มีความทรงจำก่อนที่จะมาอะบิดอสเลยค่ะ"
101080-34 = "คะ? ความจำเสื่อมเหรอ?"
101080-35 = "อะไรเนี่ย? ทำไมอยู่ดีๆ ก็เข้าพล็อตละครซะงั้นล่ะ?!"
101080-36 = "คือว่าเรื่องนั้น..."
101080-37 = "(ซ่า) ... มีอะไรแปลกๆ"
101080-38 = "หืม?"
101080-39 = "รุ่นพี่ชิโรโกะ...?"
101080-46 = "...ไม่เคยเห็นกองกำลัง PMC ขนาดใหญ่แบบนี้มาก่อนเลย"
101080-47 = "ยกกันมาทั้งรถบรรทุก รถถัง แล้วก็กองทหาร... พวกนั้นรวมตัวกันแล้วมุ่งไปในทิศเดียวกันเลย"
101080-48 = "ทางนั้นมันทะเลทรายอะบิดอสนี่นา..."
101080-50 = "...... ต้องไปตรวจสอบหน่อยแล้ว"
101080-51 = "ระ.. รุ่นพี่ชิโรโกะ...?!"
101080-52 = "คิดจะทำอะไรน่ะ รุ่นพี่! ไปคนเดียวมันอันตรายนะ!"
101080-53 = "...... ชิโรโกะจัง อย่าไปทำอะไรเสี่ยงอันตรายเลย กลับมาเถอะนะ"
101080-54 = "อื้ม ฉันไม่ทำอะไรที่อันตรายหรอก แค่จะไปเฝ้าดูจากที่ไกลๆ แล้วกลับมาน่ะ"
101080-55 = "บางที... สถานการณ์ตอนนี้อาจเป็นเหตุผลที่คุณครูไม่ตอบรับพวกเราก็ได้"
101080-56 = "ระ... รุ่นพี่..."
101080-57 = "หืม? เมื่อกี้มัน... แผ่นดินไหวเหรอ...?"
101080-58 = "แถมยังมีแสงแปลกๆ... สีดำ... ไม่สิ เป็นสีรุ้งเหรอ...? นี่มัน..."

[translation]
101080-1 = "第8話;光的到來"
101080-3 = "白子前輩，快點！"
101080-4 = "白子醬～不趕快出發會遲到的唷。"
101080-5 = "就快到了。我現在正全速前進。"
101080-6 = "好的～#n不過發生意外會很危險的，騎自行車時禁止講電話。"
101080-7 = "嗯，我知道了。待會見。"
101080-11 = "啊哈哈……我們請願多少次都沒有回應的，那個聯邦學生會……#n終於……"
101080-12 = "就是呀……#n以前我還因為實在太生氣，曾經想過要不要襲擊聯邦學生會呢～"
101080-13 = "襲擊聯邦學生會……？#n就算是星野前輩，那也很難辦到吧……"
101080-14 = "現在已經沒辦法了唷～#n總是腰酸背痛，也不能像以前那樣活動了……那都是大叔年輕時的往事了。"
101080-15 = "啊哈哈……雖然年齡沒差多少就是了……"
101080-19 = "現在的情況也和星野前輩那時不一樣了呢。現在還有老師在。"
101080-20 = "大叔我啊～最近經常想起以前的事唷。#n像是第一次見到白子醬的時候，或是野乃美醬突然造訪的時候……"
101080-21 = "怎麼突然說這些啊。真的像個老人一樣……"
101080-22 = "第一次見到白子前輩的時候，是嗎？#n我還是第一次聽說。是怎麼樣的感覺呢？"
101080-23 = "咦？我沒說過嗎？"
101080-24 = "白子醬，初次見面的時候完全就像野貓一樣呢～#n野乃美醬和大叔我為了捕獲白子醬付出了多少努力……"
101080-25 = "為什麼是捕獲啊……"
101080-27 = "星野前輩，這件事……"
101080-28 = "沒必要隱瞞吧？"
101080-33 = "是嗎……#n那個……白子醬他，沒有來到阿拜多斯之前的記憶。"
101080-34 = "咦？失去記憶？"
101080-35 = "那是怎麼回事，就像電影演的一樣！？"
101080-36 = "那是……"
101080-37 = "……有點奇怪。"
101080-38 = "嗯……？"
101080-39 = "白子前輩……？"
101080-46 = "……PMC的數量，之前從來沒有看過這麼多。"
101080-47 = "卡車、戰車、士兵……全都在往相同的方向前進。"
101080-48 = "那裡是……阿拜多斯沙漠……"
101080-50 = "……我稍微去確認一下。"
101080-51 = "白，白子前輩……！？"
101080-52 = "你，你在說什麼啊！一個人太危險了！"
101080-53 = "……白子醬，這樣很危險的，快回來。"
101080-54 = "嗯，我不會做危險的事。只會在遠處稍微看一下而已。很快就會回去。"
101080-55 = "說不定……現在這個情況，會和老師找我們的原因有關係。"
101080-56 = "前，前輩……"
101080-57 = "……嗯？剛剛地面……地震……？"
101080-58 = "……我看見了不可思議的光芒……黑色……不對，是虹色……？"
101080-60 = "……！！"
101080-68 = "……！！？"
101080-71 = "[ns]「…………！！！」"
101080-72 = "……嗯？"
101080-73 = "還在磨蹭什麼，這種距離都打不中嗎？"
101080-74 = "咦，咦……？#n槍管……彎了……？"
101080-76 = "可惡！既然如此就把槍口直接貼著……"
101080-81 = "……射，射擊失敗？#n這，這到底是怎麼回事！？"
101080-82 = "這個笨蛋！讓我來！"
101080-83 = "等，等等！#n將軍命令不能殺了他……"
101080-87 = "……"
101080-88 = "……"
101080-89 = "[ns]「…………」"
101080-90 = "這，這怎麼可能。為何連一槍也……？#n到，到底發生了什麼……！？"
101080-92 = "只要有我在，你們就無法傷害老師！"
101080-93 = "老師的安全就由我──#n希迪姆的箱子的OS，超級彩奈來保護！"
101080-94 = "老師！趁這個機會快點……！！"
101080-102 = "……咦？"
101080-109 = "這是……"
101080-110 = "有什麼東西……正在接近……"
101080-120 = "剛，剛才那是什麼……！？"
101080-121 = "地震……？"
101080-124 = "[ns1]（希迪姆的箱子的電源……？）\n[ns2]（彩奈……！？）"
101080-127 = "[ns]（我，我的頭……）"
101080-130 = "嘖……總之讓他無法逃走就行了吧。#n就讓他倒在那裡吧。"
101080-131 = "趕快移送至目標地點。"
101080-133 = "……！！"
101080-134 = "這，這邊也感覺到了！"
101080-135 = "這是……這個顏色……"
101080-136 = "白子醬！！#n很危險，趕快回來！"
101080-144 = "白子醬，快接電話……白子醬！"
101080-145 = "……"
101080-146 = "……不行，電話打不通……"
101080-147 = "等一下……白子前輩到底在做什麼啊！！"
101080-148 = "啊……啊嗚……這，這種時候，究竟該怎麼辦……"
101080-149 = "……請綾音醬聯絡老師！尋求協助吧！"
101080-150 = "是，是……！#n聯絡老師……老師……"
101080-155 = "不行，老師也……聯絡不上……"
101080-156 = "……"
101080-157 = "連，連老師也……！？#n怎，怎麼會……"
101080-161 = "啊，接了……！？#n白，白子醬，你在哪裡？"
101080-162 = "白子前輩！？"
101080-163 = "前輩，有聽見的話請快回答！#n吶，你還好嗎！？到底發生什麼事了！？"
101080-164 = "白子醬？請快回答啊白子醬，究竟是怎麼回事……！"
101080-168 = "又掛斷了……？"
101080-169 = "……白，"
101080-170 = "白子醬──！！"
101080-174 = "下一話;衝突（１）"

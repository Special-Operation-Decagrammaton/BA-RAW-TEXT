[translation]
22010-1 = "ตอนที่ 1;การพบกันอย่างลับๆ"
22010-10 = "ห้องสำนักงาน เซมิน่า"
22010-12 = "ตายจริง นานๆ ที 'ผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษ' คนนี้จะมาหาสักครั้ง แต่ไฟก็ไม่เปิด แถมไม่มีใครมาต้อนรับอีก..."
22010-13 = "แต่เรื่องที่ไม่สนใจการต้อนรับแขกแบบนี้ มันก็เหมาะกับเธออยู่หรอก"
22010-14 = "ถ้าเอาแต่ใช้ชีวิตในห้องมืดๆ แล้วก็เปิดแค่หน้าจอคอมพิวเตอร์ไว้แบบนี้ละก็..."
22010-18 = "มันจะเสียสายตาได้นะคะ ริโอะ"
22010-25 = "ก็การพบกันของเรามันเป็นความลับต่อภายนอก ฉันก็แค่ระวังเรื่องการเก็บความลับก็เท่านั้นเอง"
22010-26 = "ถ้าปิดไฟ มันก็จะไม่เหลือร่องรอยอะไรให้บันทึกไว้ได้ยังไงล่ะ"
22010-27 = "บันทึกการเข้าเยี่ยมของเธอก็จะไม่อยู่ในฐานข้อมูลของวันนี้ด้วย เท่ากับว่าวันนี้เราไม่ได้เจอกันอย่างเป็น#nทางการ"
22010-28 = "และทั้งหมดนี้ก็เป็นการตัดสินใจอย่างมีเหตุผลเพื่อเก็บความลับ"
22010-29 = "ริโอะนี่ก็นะคะ ดื้อรั้นชะมัดเลย เวลาแบบนี้น่ะ แค่เถียงกลับมาว่า \"อย่ามาสั่งนะ เป็นพี่สาวของฉันรึไง?\"#nเท่านี้ก็พอแล้วละค่ะ"
22010-30 = "เมื่อกี้นี้เป็นเพียงการล้อเล่นขำๆ ของผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษ เพื่อเปลี่ยนบรรยากาศที่#nอึมครึมก็เท่านั้นเองค่ะ ฮุฮุ"
22010-31 = "...หมายความว่ายังไงน่ะ ฮิมาริ? ก็เธอไม่ใช่พี่สาวของฉันอยู่แล้วนี่? ทำไมอยู่ดีๆ ก็มาพูดอะไรไม่สมเหตุ#nสมผลแบบนี้ล่ะ?"
22010-32 = "...ค่ะ ใช่ค่ะ เธอก็เป็นคนแบบนั้นตลอดแหละค่ะ"
22010-33 = "จะว่าไป ตอนคุยกับฉันต้องมี <ความสมเหตุสมผล> ด้วยเหรอคะ... สงสัยคุณจะชอบคำนี้มากเลยนะคะ"
22010-34 = "...ไม่ถึงกับชอบสักหน่อย ก็แค่พูดความจริงเท่านั้นเอง"
22010-35 = "จะว่าไป ฉันคิดว่าการพบกันครั้งนี้ควรเป็นความลับ และคิดว่าเธอเองคงคิดเหมือนกันเสียอีก"
22010-36 = "ไม่รู้สิคะ ถ้าคุณแคร์สายตาของคนอื่นมากขนาดนั้นตั้งแต่แรก ก็นัดกันไปเจอที่อื่นก็ได้ไม่ใช่เหรอคะ?"
22010-38 = "...ที่อื่นงั้นเหรอ?"
22010-39 = "ค่ะ ก็อย่างเช่น..."
22010-41 = "ใน <เซฟเฮ้าส์> ที่มีใครบางคน "
22010-42 = "อย่าง... [ruby=งานอดิเรกแสนซน]<เซฟเฮาส์>[/ruby]เหรอคะ...?"
22010-44 = "......"
22010-46 = "......เลิกพูดอะไรไม่เข้าท่าเถอะ มาเข้าเรื่องกันเลยดีกว่า"
22010-47 = "จะวกเข้าเรื่องเนียนๆ เลยเหรอ? ฮุฮุ ก็ย่อมได้ค่ะ"
22010-52 = "ถ้างั้นเรามาตรวจสอบดูก่อนแล้วกันว่าเราเข้าใจตรงกันหรือเปล่า"
22010-54 = "ความวุ่นวายต่อเนื่องจากเรื่อง <กระจก> ที่นักเรียนมิลเลเนียมก่อขึ้นเมื่อคราวก่อน..."
22010-55 = "นั่นเป็นเรื่องที่เราวางแผนด้วยกัน"
22010-61 = "ค่ะ ฉันเป็นคนเตรียมสิ่งที่เรียกว่า <กระจก> และริโอะก็เสนอวิกฤตที่ชื่อ C&C ขึ้นมา"
22010-62 = "ถือว่าน้อยครั้งมากค่ะที่ฉันกับคุณร่วมมือกันเพื่อเป้าหมายเดียวกัน"
22010-64 = "ใช่แล้วค่ะ เพื่อค้นหาตัวตนที่แท้จริงของ[ruby=AL-1S]อาริสึ[/ruby]"
22010-70 = "...หลังจากเรื่องนั้นก็ถือว่าเวลาได้ล่วงเลยมาสักพักแล้ว ตอนนี้ได้ผลการวิเคราะห์ออกมาแล้วใช่ไหม?"
22010-71 = "แน่นอนค่ะ"
22010-73 = "ตัวตนที่แท้จริงของอาริสึ... เป็นทั้ง..."
22010-74 = "<วัตถุหลงยุค> ที่นักบวชนิรนามให้ความเคารพ..."
22010-75 = "และสิ่งที่หลงเหลืออยู่ในบันทึกเท่านั้น..."
22010-79 = "<ธิดาแห่งทวยเทพไร้นาม>"
22010-81 = "......"
22010-82 = "......"
22010-83 = "อืม ตีความออกมาได้เหมือนกันสินะ"
22010-88 = "ถ้างั้นก็แปลว่า... แก่นแท้ของสิ่งนั้นก็คือ..."
22010-89 = "ค่ะ อาริสึ เด็กคนนั้นก็คือ..."
22010-93 = "อาวุธทำลายล้างโลก"
22010-94 = "รุ่นน้องที่น่ารักยังไงล่ะคะ~♪"
22010-100 = "......?"
22010-101 = "คะ...?"
22010-102 = "พูดอะไรของเธอน่ะ ฮิมาริ?"
22010-103 = "ริโอะนั่นแหละ พูดเรื่องอะไรคะ...?"
22010-104 = "......"
22010-105 = "......"
22010-111 = "...อย่างนั้นเหรอ ถ้างั้นการเป็นพันธมิตรกันของเราก็คงสิ้นสุดลงแค่นี้สินะ"
22010-112 = "งั้นเหรอคะ อันที่จริงเราก็แค่สงบศึกกันชั่วคราว ไม่ใช่พันธมิตรกันสักหน่อยนะคะ"
22010-113 = "........."
22010-114 = "............"
22010-122 = "อ้อ ของพวกนี้... ของเล่นที่หมู่นี้ริโอะตั้งใจทำขึ้นมาสินะคะ"
22010-126 = "ในเมื่อเป็นแบบนี้ ฉันคงปล่อยให้เธอกลับไปทั้งๆ แบบนี้ไม่ได้แล้วละ"
22010-128 = "อืม... ค่ะ ฉันก็รู้อยู่แล้วว่าคุณจะทำแบบนี้"
22010-135 = "อะไรกัน...! แฮ็กสำนักงานฉันเหรอ...?"
22010-136 = "ตายจริง คิดว่าห้องของบิ๊กซิสเตอร์อยู่ยงคงกระพันงั้นเหรอคะ?"
22010-137 = "AMAS! อย่าให้ฮิมาริออกไปได้..."
22010-138 = "ขอโทษนะคะ แต่สำหรับสาวน้อยน่ารักแสนบอบบางแล้ว มันไม่มีอะไรที่เป็นไปไม่ได้หรอกค่ะ"
22010-144 = "(AMAS ทั้งหมดหยุดทำงานในชั่วพริบตาเหรอ...?)"
22010-145 = "(หรือว่าเธอใช้จังหวะที่ระบบไฟหยุดทำงานไปแฮ็กเข้า...?)"
22010-146 = "(ไม่สิ นี่ไม่ใช่เวลามาคิดเรื่องแบบนี้ เราต้องฟื้นฟูการควบคุมโดรนกลับมาก่อน...)"
22010-163 = "หืม? ทำไมระบบไฟตอบสนอง..."
22010-168 = "ฮึ่ม...!"
22010-173 = "ฮิมาริ..."
22010-179 = "หนีไปได้แล้วสินะ"
22010-180 = "สมกับเป็นหัวหน้าเวอริทัส..."
22010-181 = "...ก็เพราะเก่งแบบนี้ ฉันถึงอยากได้มาเป็นพวกยังไงล่ะ"
22010-182 = "แต่น่าเสียดายจริงๆ ที่การร่วมมือของเราต้องจบลง"
22010-184 = "ไม่อยากเลือกวิธีที่ไม่สมเหตุสมผลนี้เลย..."
22010-193 = "พอรู้ว่าอีกฝ่ายมีความเห็นไม่เหมือนตัวเอง ก็เลือกจะทำวิธีแบบนั้นอย่างไม่ลังเลเลยนะ"
22010-194 = "ไม่ได้เจอกันมาตั้งนาน แต่ก็ยังเหมือนเดิมอยู่เลยนะคะ ริโอะ"
22010-195 = "แต่ก็เอาเถอะ สำหรับผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษอย่างฉันแล้ว มันไม่มีประโยชน์หรอกค่ะ♪"
22010-196 = "ไหนดูซิ... ทีนี้ก็ต้อง..."
22010-203 = "หืม......?"
22010-211 = "อึก......?!  นี่คุณ... เป็นใครกัน...?"
22010-219 = "นี่คุณ หรือว่า..."
22010-220 = "C&C คนที่ 5 ที่เลื่องลือ..."
22010-228 = "ตอนต่อไป;วันธรรมดาๆ ของชมรมพัฒนาเกม"

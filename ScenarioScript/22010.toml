[translation]
22010-1 = "Episode 1; A Secret Meeting"
22010-10 = "Seminar Executive Office"
22010-12 = "Oh, wow, a delicate super-genius beauty came to see you, and you didn't even turn on the lights to greet her..."
22010-13 = "It's very typical of you to be so inhospitable to guests."
22010-14 = "If you stay cooped up in the dark with your eyes glued to a computer monitor..."
22010-18 = "Your eyes will get worse than they already are, Rio."
22010-25 = "Our meeting must be kept secret from the outside world. I was just trying to ensure confidentiality."
22010-26 = "Turn off the lights and leave no traces."
22010-27 = "I made sure that your visit history isn't in the database. Officially, we never met today."
22010-28 = "All of this is reasonable to protect confidentiality."
22010-29 = "Rio, you're always too serious. I expected you to say, \"Don't tell me what to do! You're not my older sister!\""
22010-30 = "This is how a super genius and delicate, beautiful flower lightens up the mood."
22010-31 = "...What are you saying, Himari? Of course you're not my older sister. Can you be reasonable for once?"
22010-32 = "...Right, you've been always like this."
22010-33 = "The word \"reasonable\"... That's your favorite word."
22010-34 = "I wouldn't say it's my favorite. I was just stating the facts."
22010-35 = "I thought we both agreed that today's meeting was supposed to be confidential."
22010-36 = "Well, if you were that concerned about prying eyes, we could have met somewhere else."
22010-38 = "...Somewhere else?"
22010-39 = "Yes, for example..."
22010-41 = "A secret place built by someone..."
22010-42 = "Like a safehouse...or something."
22010-44 = "..."
22010-46 = "That's enough. Let's get to the point."
22010-47 = "Not interested in small talk? Haha, sure, it doesn't matter."
22010-52 = "Then let's check if we're on the same page."
22010-54 = "The commotion caused by the Millennium students regarding the Mirror..."
22010-55 = "That was something we plotted together."
22010-61 = "Yes, I prepared the Mirror as a means, and you provided the crisis—C&C."
22010-62 = "It was a rare case where we worked together for the same purpose."
22010-64 = "Right. All to uncover the identity of Aris."
22010-70 = "...A lot of time has passed since then. Do we have the analysis results?"
22010-71 = "Of course we do."
22010-73 = "The true identity of Aris is..."
22010-74 = "The artifact worshiped by the nameless priests..."
22010-75 = "A being that only exists in records..."
22010-79 = "The princess of the Nameless Gods."
22010-81 = "..."
22010-82 = "..."
22010-83 = "It seems our analysis is in agreement."
22010-88 = "So that means...the essence of her existence is..."
22010-89 = "Yes, Aris is..."
22010-93 = "A weapon that will destroy the world."
22010-94 = "An adorable underclassman! ♪"
22010-100 = "...?"
22010-101 = "...Huh?"
22010-102 = "What are you saying, Himari?"
22010-103 = "I was going to ask what nonsense YOU were spouting, Rio!"
22010-104 = "..."
22010-105 = "..."
22010-111 = "...I see. Then our alliance ends here."
22010-112 = "Yes. To clarify, it was a truce, not an alliance."
22010-113 = "..."
22010-114 = "..."
22010-122 = "Oh, are these the...toys you've been working so hard on recently?"
22010-126 = "Do you really think I can just let you go now?"
22010-128 = "Well...I knew you were going to say that."
22010-135 = "What?! You hacked my office?"
22010-136 = "Oh? Did you really think your rooms were invincible, Big Sister?"
22010-137 = "AMAS! Don't let Himari escape..."
22010-138 = "I'm sorry, but nothing is impossible for me, the delicate beauty!"
22010-144 = "(All of AMAS stopped working at once...?)"
22010-145 = "(Did she hack in when I was distracted by the lights going out?)"
22010-146 = "(I have to do something. First, restore control of the drones...)"
22010-163 = "Huh? Why is the lighting system not responding...?"
22010-168 = "Ugh!"
22010-173 = "Did Himari..."
22010-179 = "...already escape?"
22010-180 = "You truly are the president of Veritas."
22010-181 = "This is why I wanted you on my side."
22010-182 = "It's a shame we couldn't keep our alliance."
22010-184 = "I didn't want to go down this route. It's not reasonable."
22010-193 = "You didn't hesitate for even a moment when you realized I wasn't on your side."
22010-194 = "It's been a long time since we last met, but you haven't changed a bit, Rio."
22010-195 = "Well, it won't work on a super-genius, elegant, delicate beauty like me. ♪"
22010-196 = "Then let's see... Before Rio, I should..."
22010-203 = "Huh?"
22010-211 = "Ugh...?! Wh-Who are you...?"
22010-219 = "Aren't you..."
22010-220 = "The rumored fifth member of C&C?"

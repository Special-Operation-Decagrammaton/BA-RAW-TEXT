[translation]
22010-1 = "第1話;祕密會談"
22010-10 = "千年．研討會辦公室"
22010-12 = "哎呀……超天才清楚系病弱美少女來訪，#n居然不開燈迎接……"
22010-13 = "雖然完全不想接待客人這一點，#n非常符合妳的性格……"
22010-14 = "但是，在黑暗的房間裡盯著螢幕的話，視力會變差唷？"
22010-18 = "──莉央。"
22010-25 = "只是為了保證萬無一失──這次會談可不能讓外人知道。"
22010-26 = "為了做到這點，這種程度不是問題。"
22010-27 = "這次訪問並不會在資料庫裡留下紀錄。#n也就是說，在紀錄上我們並沒有見過。"
22010-28 = "一切都是──為了保護接下來要說的機密。"
22010-29 = "莉央妳啊，真是一板一眼呢……#n不用「妳是我的姐姐嗎？」之類的玩笑回答的話，可是會離幽默這個詞越來越遠的唷。"
22010-30 = "剛才說的，也只是超天才清楚系病弱美少女的一點小玩笑而已。#n呵呵。"
22010-31 = "……妳又不是我的姐姐。#n突然說那種不合理的話……妳怎麼了嗎，陽葵？"
22010-32 = "……是的，是的。也對。#n妳就是那樣的人呢。"
22010-33 = "不解幽默，只在意著「合理」……這就是妳喜歡的表達方式呢。"
22010-34 = "這不是喜好的問題……是事實吧？"
22010-35 = "這次的見面要保密這種事，我想妳應該也很清楚。"
22010-36 = "誰知道呢？#n──再說，如果不想引人注目的話，在其他地方見面不就好了？"
22010-38 = "……其他地方？"
22010-39 = "沒錯，比如……"
22010-41 = "某人正在偷偷建造的──"
22010-42 = "[ruby=惡趣味]「安全屋」[/ruby]……之類的？"
22010-44 = "……"
22010-46 = "……進入正題吧。"
22010-47 = "哎呀哎呀，打算轉移話題嗎？#n呵呵……好吧，沒關係。"
22010-52 = "首先，確認一下彼此的認知吧。"
22010-54 = "上次，千年的學生們圍繞「鏡子」引發的一連串騷動──"
22010-55 = "那是我們一起策畫的事呢。"
22010-61 = "沒錯。我準備了名為「鏡子」的手段，而莉央提供了名為「C&C」的危機──"
22010-62 = "真少見啊，你我兩人為了相同的目標而合作。"
22010-64 = "沒錯──為了得知[ruby=AL-1S]愛麗絲[/ruby]的真實身份。"
22010-70 = "在那之後也過了一段時間……#n得出解釋的結論了嗎？"
22010-71 = "那是當然。"
22010-73 = "愛麗絲的真實身份……#n那就是──"
22010-74 = "無名祭司們崇拜的「歐帕茲」──"
22010-75 = "──存在遠古紀錄裡的，"
22010-79 = "「無名諸神的王女」。"
22010-81 = "……"
22010-82 = "……"
22010-83 = "這樣啊……看來我們的看法相同呢。"
22010-88 = "也就是說……「那個存在」的本質是……"
22010-89 = "是的。愛麗絲，那孩子是──"
22010-93 = "「將世界導向終焉的兵器」"
22010-94 = "「『可愛的後輩』對吧♪」"
22010-100 = "……？"
22010-101 = "……哎呀。"
22010-102 = "……妳到底，在說什麼？"
22010-103 = "莉央才是，到底在說什麼……？"
22010-104 = "……"
22010-105 = "……"
22010-111 = "……是嗎。看來，我們的同盟就到此為止了。"
22010-112 = "是啊。#n雖然不是同盟，而是休戰……"
22010-113 = "…………"
22010-114 = "………………"
22010-122 = "啊啊，這就是傳聞中的……妳最近製作的玩具呢。"
22010-126 = "既然同盟已經解除，可不能讓妳就這麼回去。"
22010-128 = "嘛……也對。#n是妳的話，果然會這麼做呢。"
22010-135 = "什麼……！？#n我的辦公室……被駭了……！？"
22010-136 = "哎呀哎呀……難道妳以為大姐頭的房間是無敵的嗎？"
22010-137 = "AMAS，抓住陽葵……！"
22010-138 = "呵呵，病弱美少女沒有辦不到的事唷？"
22010-144 = "（AMAS的所有個體，停止了動作……？）"
22010-145 = "（難道是在照明系統癱瘓的瞬間……！？#n　一瞬間就完成了這種規模的駭入……？）"
22010-146 = "（……現在不是佩服的時候。得趕快奪回機器人的控制權）"
22010-163 = "嗯？為什麼照明系統會有反應……"
22010-168 = "唔……！"
22010-173 = "陽葵她……"
22010-179 = "……這樣啊，已經逃出去了。"
22010-180 = "不愧是貝里塔斯的部長……"
22010-181 = "如果可以的話，真想把妳當成同伴……"
22010-182 = "真是遺憾。"
22010-184 = "唉……這種不合理的方法，本來是不想用的──"
22010-193 = "一意識到與自己意見不同，就毫不猶豫地採取行動的那副模樣……"
22010-194 = "真是久違了……還是一點都沒變呢，莉央。"
22010-195 = "不過，對超天才病弱美少女的我來說沒有意義就是了♪"
22010-196 = "那麼……這樣就能趕在莉央之前……"
22010-203 = "嗯……？"
22010-211 = "咕……！？#n妳是……誰……？"
22010-219 = "妳……"
22010-220 = "難道是……C&C的第五個……"
22010-228 = "下一話;遊戲開發部的平凡日常"

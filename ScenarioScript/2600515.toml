[translation]
2600515-1 = "Dessert Raider"
2600515-2 = "I headed to the nearby cafe street after talking to Yoshimi."
2600515-7 = "[ns1] \"...Yoshimi?\"\n[ns2] \"You're already here, for once.\""
2600515-10 = "...Because I finished eating already."
2600515-11 = "If I were still eating when you got here, you would've spouted some useless nonsense like, \"Are you gonna keep eating?\" or, \"Wow, you eat a lot.\""
2600515-12 = "I've heard it one too many times. Of course I was gonna be ready this time."
2600515-13 = "...What? You say you've never spoken to me like that?"
2600515-14 = "Wh-What's it matter?! If that's how I said it was, then that's how it was. An adult like you should know how to go with the flow!"
2600515-15 = "...What?"
2600515-16 = "Well, yeah. Of course it was good. It's a pretty popular spot 'round here."
2600515-17 = "I waited in line for a while, so I had to make the most of it when I was finally seated."
2600515-18 = "Heehee. I think I tried every flavor..."
2600515-22 = "I'm not a pig!!!"
2600515-23 = "[s3] \"Huh?! I didn't say anything...\"\n[s4] \"You're the one who said it...\""
2600515-26 = "Ugh! Anyway! I called you here for an actual reason, Sensei."
2600515-27 = "Here... Just take it."
2600515-28 = "[s5] \"...Is this the new menu item?\"\n[s6] \"You ordered this to-go, for me?\""
2600515-31 = "I mean, it's kinda embarrassing to say aloud, but you've given me a lot since I've met you."
2600515-32 = "So, I just thought that I should repay you every once in a while."
2600515-36 = "Wh-What..."
2600515-37 = "What's with that expression?! Why do you have such an annoying smirk on your face?!"
2600515-38 = "...Stop it!"
2600515-39 = "Stop it right now! Stop smiling! You're so annoying!"
2600515-40 = "[s7] \"Mm, this looks tasty.\"\n[s8] Open up the dessert."
2600515-43 = "...?!"
2600515-44 = "Wh-What are you doing?! We're still out on the street! A-Are you trying to eat it right now?"
2600515-45 = "Eat it later!! I forbid you from taking a single bite!"
2600515-46 = "Wh-Why? Well, that's because..."
2600515-47 = "B-Because...! Other people might... This situation..."
2600515-51 = "G-Gah! I don't have to explain myself! Just do what I say!"
2600515-52 = "Just try to eat it here! I'll steal it right back! You've been warned!"
2600515-53 = "...What?"
2600515-54 = "...How am I going to steal it without a fork?"
2600515-55 = "...Ha!"
2600515-56 = "You underestimate me, Sensei!"
2600515-57 = "I'm used to you underestimating me, but this will be the last time!"
2600515-58 = "After all, it's me we're talking about here! Don't you know better?!"
2600515-64 = "[ns9] \"...What...?\"\n[ns10] \"What is that...?!\""
2600515-67 = "You've really done it now, Sensei."
2600515-68 = "There's no going back."
2600515-69 = "The member of the After-School Sweets Club and the Trinity Dessert Challenges Ranker, the Conqueror of Limited-Edition Treats!!"
2600515-70 = "This is Ibaragi Yoshimi's ultimate skill!! The Dessert Raider strikes!"
2600515-74 = "My secret weapon!"
2600515-75 = "Steal and devour, Dessert Raider!"
2600515-76 = "[s] \"What...?!\""
2600515-80 = "Where do you think you're going?! Stop right there!"
2600515-81 = "Stop! Get back here!"
2600515-88 = "I did my best to escape the Dessert Raider's attack, but we ended up struggling with each other on the floor."
2600515-89 = "Thankfully, the dessert didn't also end up on the ground, but, unfortunately, Yoshimi actually ended up eating almost half of it."

[translation]
2600515-1 = "甜點掠奪者"
2600515-2 = "（接到喜美的聯絡後，前往了附近的咖啡廳街）"
2600515-7 = "[ns1]「……喜美？」\n[ns2]「為什麼站在咖啡廳外？」"
2600515-10 = "……因為我已經吃完了啊。"
2600515-11 = "要是繼續坐在裡面吃東西，八成會聽到「那個人到底要吃到什麼時候」，#n或者「他也吃太多了吧」之類的閒話不是嗎？"
2600515-12 = "這種事可不只發生一次兩次了哦？#n所以我現在已經有了一套應對的辦法。"
2600515-13 = "……嗯？你說你覺得應該沒有人會說得那麼過分？"
2600515-14 = "有，有什麼關係嘛！我說有就有啦！為什麼大人連這種事都要這麼計較啊！？"
2600515-15 = "……什麼？"
2600515-16 = "問我東西好不好吃？#n唔，好吃是好吃啦，畢竟是這一帶眾所皆知的名店。"
2600515-17 = "我也排隊排了好久……所以才會努力大吃特吃，想一次吃個夠本。"
2600515-18 = "呵呵，我剛才幾乎把每一種都吃過一遍……"
2600515-22 = "我才不是豬咧！！！"
2600515-23 = "[s3]「等等，我剛才真的什麼話都沒說……」\n[s4]「難不成你其實暗自在期待別人這麼說嗎……？」"
2600515-26 = "總之！總之……我今天找老師過來是有原因的。"
2600515-27 = "……來，這東西給你，老師。"
2600515-28 = "[s5]「這是……店裡新出的嗎？」\n[s6]「是為了送給我，所以才特地外帶一份的嗎？」"
2600515-31 = "雖然自己說這種話有點難為情，不過這段時間受了老師很多照顧。"
2600515-32 = "所以我就在想，是不是偶爾也該報答你一下比較好。"
2600515-36 = "……怎，怎樣？"
2600515-37 = "那是什麼表情啦！？#n為什麼要一邊竊笑，一邊露出那種令人不爽的表情！？"
2600515-38 = "……夠了！"
2600515-39 = "就說夠了，快停止那個表情！#n不准笑，我叫你不准笑啦！真的很讓人不爽耶！！"
2600515-40 = "[s7]「嗯～這東西看起來真好吃～」\n[s8] 在喜美面前打開甜點包裝"
2600515-43 = "……！？"
2600515-44 = "你，你為什麼要突然打開啊！？#n這裡可是大街上耶！你該不會打算直接在這裡吃吧！？"
2600515-45 = "晚點再吃啦！！不准在這裡吃！"
2600515-46 = "問我為什麼？這還用問嗎，當然是因為……"
2600515-47 = "這樣……這種情況……該怎麼說呢……要是被別人看到的話……"
2600515-51 = "……啊，煩死了！！#n我說不准就是不准啦！！不要讓我一直重複同樣的話！！"
2600515-52 = "要是敢在這裡打開的話，我可是會直接搶過來吃的喔！！#n我是認真的，已經警告過你了喔！！"
2600515-53 = "……什麼？"
2600515-54 = "你說叉子只有一個，我要怎麼搶過去吃？"
2600515-55 = "……哈！"
2600515-56 = "你太大意了，老師！"
2600515-57 = "雖然你平時就常常小看我，這次總算踢到鐵板了吧！"
2600515-58 = "我可不是別人……而是放學後的甜點部的一員啊！"
2600515-64 = "[ns9]「你說……什麼？？？」\n[ns10]「那是什麼東西……！？」"
2600515-67 = "既然老師自己把東西打開……"
2600515-68 = "那就不能怪我無情了。"
2600515-69 = "「放學後的甜點部」成員，兼三一甜點挑戰大賽的種子選手，兼限量甜點的帝王！！"
2600515-70 = "這就是我「伊原木喜美」的必殺技！！「甜點掠奪者」即將大顯神威！！"
2600515-74 = "……看招！！"
2600515-75 = "把食物搶過來吧，「甜點掠奪者」！！！"
2600515-76 = "[s]「什麼……！！」"
2600515-80 = "別想逃！？還不快給我站住！！"
2600515-81 = "站住，我叫你站住！！！"
2600515-88 = "（為了閃躲撲過來的喜美，兩人一起摔倒在了地上）"
2600515-89 = "（雖然甜點沒有掉到地上，但是幾乎一半都已經進了喜美的嘴裡……）"

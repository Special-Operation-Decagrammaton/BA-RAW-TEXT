[translation]
2600515-1 = "หัวขโมยของหวาน"
2600515-2 = "(หลังจากได้รับการติดต่อมาจากโยชิมิ คุณครูก็มุ่งหน้าไปที่คาเฟ่ใกล้ๆ)"
2600515-7 = "[ns1] \"โยชิมิ...?\"\n[ns2] \"ทำไมถึงออกมาข้างนอกร้านล่ะ?\""
2600515-10 = "ก็ฉันกินหมดแล้วนี่นา..."
2600515-11 = "ถ้านั่งกินอยู่ในร้านละก็ คุณครูก็คงจะพูดว่า \"จะนั่งกินไปถึงเมื่อไรน่ะ?\" หรือไม่ก็ \"กินเก่งจังนะ\" อีกใช่มั้ยล่ะ?"
2600515-12 = "ฉันไม่ได้เพิ่งเจอเรื่องแบบนี้ครั้งแรกซะหน่อย เดี๋ยวนี้รับมือกับเรื่องพวกนั้นเป็นแล้วละ"
2600515-13 = "หืม...? \"ครูไม่เคยพูดแบบนั้นสักครั้งเลยไม่ใช่รึไง\" งั้นเหรอ?"
2600515-14 = "ละ...แล้วมันเกี่ยวอะไรล่ะ! ถ้าบอกว่าจะเป็นแบบนั้นก็เข้าใจไปแบบนั้นก็ได้นี่นา! พวกผู้ใหญ่นี่ชอบซักไซ้เรื่องแบบนี้ด้วยรึไง!?"
2600515-15 = "ว่าไงนะ...?"
2600515-16 = "อร่อยรึเปล่าน่ะเหรอ? ก็นะ ต้องอร่อยอยู่แล้วสิ เป็นร้านขึ้นชื่อของแถวนี้เลยนะ"
2600515-17 = "แค่ต่อแถวรอคิวก็ใช้เวลานานสุดๆ... เพราะงั้นพอได้ที่นั่งก็ต้องเอาให้คุ้มๆ หน่อยไงล่ะ"
2600515-18 = "ฮุฮุ พอได้ลองชิมขนมทุกชนิดอย่างละชิ้น..."
2600515-22 = "ฉะ...ฉันไม่ได้อ้วนนะ!!!"
2600515-23 = "[s3] \"เดี๋ยวๆ ครูยังไม่ได้พูดอะไรสักหน่อย...\"\n[s4] \"อันนั้นคือสิ่งที่คิดอยู่ในใจรึเปล่า...?\""
2600515-26 = "ยังไงก็เถอะ! ฉันมีเหตุผลที่เรียกคุณครูออกมาในวันนี้นะ"
2600515-27 = "เอ้า... รับนี่ไปสิ คุณครู"
2600515-28 = "[s5] \"นี่มัน... ขนมใหม่เหรอ?\"\n[s6] \"ใส่กล่องมาให้ครูงั้นเหรอ?\""
2600515-31 = "คือ... จะให้ฉันพูดเองมันก็น่าอายนิดหน่อย แต่ที่ผ่านมาฉันได้รับอะไรหลายๆ อย่างมาจาก#nคุณครู"
2600515-32 = "เลยคิดว่านานๆ ทีฉันก็ควรจะให้อะไรคุณครูบ้าง... ประมาณนั้นน่ะ"
2600515-36 = "อะ... อะไรเล่า"
2600515-37 = "อะไรน่ะ สีหน้าแบบนั้น!? ทำไมถึงทำหน้ายิ้มกรุ้มกริ่มน่าขนลุกอะไรแบบนั้นเล่า!?"
2600515-38 = "เลิกทำแบบนั้นสักที...!"
2600515-39 = "พอเลย หยุดทำหน้าแบบนั้นเลย! ก็บอกว่าอย่าหัวเราะไงเล่า!! น่าหงุดหงิดชะมัด!!"
2600515-40 = "[s7] \"อืม~ ดูน่าอร่อยดีนะเนี่ย~\"\n[s8] แกะกล่องขนมต่อหน้าโยชิมิ"
2600515-43 = "...!?"
2600515-44 = "ทะ... ทำไมจู่ๆ ก็แกะกล่องออกล่ะ!? นี่มันกลางถนนเลยนะ! คิดจะกินตรงนี้เลยรึไง!?"
2600515-45 = "เอาไว้ค่อยกินทีหลังสิ!! ห้ามกินตรงนี้นะ!"
2600515-46 = "ทะ... ทำไมน่ะเหรอ? ทำไมกันนะ คือเรื่องนั้น..."
2600515-47 = "คือว่ามัน... ในสถานการณ์แบบนี้... จะว่ายังไงดีล่ะ... ถ้าคนอื่นๆ มาเห็นเข้าละก็..."
2600515-51 = "โอ๊ย...!! ถ้าฉันบอกไปแบบนั้นแล้วก็ทำตามที่บอกสิ!! อย่าให้พูดซ้ำบ่อยๆ จะได้มั้ย!!"
2600515-52 = "ถ้าแกะกินตอนนี้ ฉันจะแย่งกินจริงๆ ด้วย!! พูดจริงๆ นะ ฉันเตือนแล้วนะ!!"
2600515-53 = "ว่าไงนะ...?"
2600515-54 = "ถึงยังไงส้อมก็มีแค่อันเดียว ฉันคงจะแย่งกินไม่ได้งั้นเหรอ...?"
2600515-55 = "เฮอะ...!"
2600515-56 = "ประมาทเกินไปแล้วนะคุณครู!"
2600515-57 = "ฉันชินกับการโดนสบประมาทก็จริง แต่คราวนี้คุณครูเล่นผิดคนแล้ว!"
2600515-58 = "คิดกับฉันแบบนั้นเนี่ยนะ... ไม่ใช่คนอื่นๆ แท้ๆ!?"
2600515-64 = "[ns9] \"ว่ายังไงนะ...???\"\n[ns10] \"อะไรอีกล่ะเนี่ย...!?\""
2600515-67 = "ไหนๆ คุณครูก็แกะกล่องแล้ว..."
2600515-68 = "ฉันเองก็จะไม่ทนแล้วเหมือนกัน"
2600515-69 = "ในฐานะสุดยอดนักชิมขนมหวานระดับตัวแม่ของทรีนิตี้ และ \"สมาชิกของชมรมของหวาน#nหลังเลิกเรียน\"...!!"
2600515-70 = "คุณครูจะต้องร้องไห้น้ำตาไหลพรากๆ ด้วยท่าไม้ตายลับสุดยอดของ <หัวขโมยของหวาน> ของฉัน... <อิบารากิ โยชิมิ> คนนี้!! "
2600515-74 = "วิชาลับ...!!"
2600515-75 = "<หัวขโมยของหวาน> จะแย่งขนมหวานล่ะนะ!!!"
2600515-76 = "[s] \"อะไรกันน่ะ...!!\""
2600515-80 = "คิดจะหนีไปไหน!? หยุดเดี๋ยวนี้นะ!!"
2600515-81 = "หยุดสิ บอกให้หยุดไงเล่า!!!"
2600515-88 = "(คุณครูพยายามหลบโยชิมิที่พุ่งตัวเข้ามา ทำให้ทั้งคู่ล้มลงไปบนพื้นด้วยกัน)"
2600515-89 = "(โชคดีที่ขนมไม่ได้หล่นลงบนพื้น แต่ก็ถูกโยชิมิแย่งกินไปแล้วกว่าครึ่ง...)"

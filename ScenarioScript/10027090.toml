10027090-6 = "5;메루;05;헉, 헉……!\n#5;em;[속상함]"
10027090-7 = "1;모미지;04;우리 학원이긴 하지만, 붉은겨울은 너무 넓단 말이죠…….\n#1;em;[땀]"
10027090-8 = "5;메루;09;말할 시간이 있으면 다리를 움직이라고! "
10027090-9 = "1;모미지;02;어……? 앞에 무언가…… 사무국 분들이……?\n#1;em;[반응]"
10027090-10 = "5;메루;07;뭐라고?!\n#5;em;[?!]"
10027090-11 = "#st;[0,0];instant;1;"
10027090-12 = "#clearST"
10027090-13 = "1;모미지;02\n5;메루;07\n#1;d\n#5;d\n#wait;1000"
10027090-14 = "#wait;1000"
10027090-15 = "4;마리나;01\n2;토모에;01\n#2;a\n#4;a\n#2;h\n#4;h\n#wait;1500"
10027090-16 = "2;토모에;02;안녕하십니까. <지식해방전선> 여러분. 붉은겨울 사무국입니다.\n#2;greeting\n#2;em;[반응]"
10027090-17 = "#all;hide"
10027090-18 = "5;메루;05\n1;모미지;04;네, 네? 갑자기, 무슨 일로 ……?\n#1;a\n#5;a"
10027090-19 = "#all;hide"
10027090-20 = "2;토모에;01\n4;마리나;05;우선, <지식해방전선>의 노력과 성과에 축하를 보내기로 하지. 기뻐하는 것이 좋을 것이다."
10027090-21 = "#all;hide"
10027090-22 = "1;모미지;04\n5;메루;05;……영문을 하나도 모르겠지만, 빨리 끝내 줘. 우리 바쁘다고!\n#5;em;[!]"
10027090-23 = "#all;hide"
10027090-24 = "4;마리나;01\n2;토모에;03;간단히 말씀드리자면 이렇습니다. 우리 사무국은 무려 샬레의 선생님께서, <지식해방전선>과 협력하여 무언가를 만들고 있다는 첩보를 받았습니다. 그것, 동인지라고 하던가요?"
10027090-25 = "#all;hide"
10027090-26 = "5;메루;05\n1;모미지;04;어, 어디에서요?!"
10027090-27 = "#all;hide"
10027090-28 = "2;토모에;01\n4;마리나;02;아라마키 야쿠모에게서, 였다.\n#4;em;[반응]"
10027090-29 = "#all;hide"
10027090-30 = "1;모미지;04\n5;메루;05;그 녀석이?!?!\n#5;em;[빠직]"
10027090-31 = "#all;hide"
10027090-32 = "4;마리나;01\n2;토모에;99;어쨌든, 사무국은 그 '동인지'라고 하는 것과, 그에 관련된 일련의 사건을 자체적으로 조사해 보았습니다. \n#2;em;…"
10027090-33 = "2;토모에;00;그리고 그 결과, 체리노 회장의 이름으로 수염 노력 훈장을 수여하기로 결정했죠.\n#2;em;[반짝]"
10027090-34 = "4;마리나;11;충분히 영광으로 생각해도 좋다. <지식해방전선>. 아니, 그렇게 생각하도록.\n#4;em;[!]"
10027090-35 = "#all;hide"
10027090-36 = "1;모메지;04\n5;메루;04;어……. 일단은 고맙긴 한데……?"
10027090-37 = "1;모미지;04;(훈장보다는 빨리 보내 줬으면 하는데요……!)\n#1;em;[속상함]\n#fontsize;50"
10027090-38 = "#all;hide"
10027090-39 = "4;마리나;01\n2;토모에;01;축하의 친전은 여기까지 하도록 하지요. 훈장 수여에는 조건이 필요하니까요."
10027090-40 = "4;마리나;05;그렇다! <지식해방전선>이 훈장을 수여받기 위해서는……!"
10027090-41 = "#all;hide"
10027090-42 = "3;토모에;03;체리노 쨩……. 아뇨. 체리노 회장의 귀여움과 매력을 널리 알리기 위해, 게스트 캐릭터로 체리노 회장을 그 작품에 출연시켜야 합니다!\n#3;closeup"
10027090-43 = "3;토모에;99;생각해 보세요. 귀여운 체리노 쨩이 '동인지'라는 서적에 출연하여, 그 본연의 귀여움과 매력을 한껏 뽐내는 모습을……. 그리고 그것이 붉은겨울의 학생들에게 하나둘 퍼져 나가는 모습을……!\n#3;closeup\n#3;em;[하트]"
10027090-44 = "3;토모에;03;상상만 해도 황홀해지는 광경이지 않나요?!\n#3;closeup\n#3;em;[///]"
10027090-45 = "[s] \"상상만 해도…… 여러 의미로 굉장하긴 한데…….\""
10027090-46 = "#all;hide"
10027090-47 = "2;토모에;03\n4;마리나;03;훗. 이왕 하는 김에 게스트 캐릭터인지 무엇인지가 아니라, 주연으로 단독 등장시켜도 좋을 것이다. 그렇게 될 경우, 수염 노력 훈장과 함께, 수염 공훈 훈장을 함께 수여하도록 하지."
10027090-48 = "#all;hide"
10027090-49 = "1;모미지;05\n5;메루;05;…….\n#5;em;…"
10027090-50 = "#all;hide"
10027090-51 = "3;메루;10;웃기지 마! 지금 세 시간도 안 남았다고! \n#3;closeup\n#3;em;[!]"
10027090-52 = "3;메루;09;체리노 회장을 그리고 싶으면 사무국에서 자체 동인지나 회지를 발매해! 아니면 적어도 정당한 대가를 치르고 외주를 주던가! 물론 난 거절할 거지만!\n#3;closeup\n#3;em;[빠직]"
10027090-53 = "#all;hide"
10027090-54 = "5;메루;09\n1;모미지;05;역시 메루 선배네요! 잘 말해 줬어요!"
10027090-55 = "5;메루;09;안 그래도 바빠 죽겠는데 이런 일로 작업 방해하지 마! 훈장이고 뭐고 아무래도 좋으니까 우린 지나가겠어!\n#5;em;[스팀]\n#5;hophop"
10027090-56 = "5;메루;05;다들 자주 잊어버리고 가끔은 우리도 잊을 때가 있지만, <지식해방전선>은 지식 그 자체의 해방을 위해 싸우는 곳이니까 말이지!"
10027090-57 = "1;모미지;05;지식은 힘이니까요! 잘 지켜야죠!\n#1;em;[!]"
10027090-58 = "[s] \"미안, 이번만큼은 양보할 수 없는 게 있어.\""
10027090-59 = "#all;hide"
10027090-60 = "4;마리나;99\n2;토모에;01;…….\n#2;em;…"
10027090-61 = "4;마리나;05;그렇군. 쉬운 과정은 아닐 거라고 생각하고 있었다.\n#4;em;[반응]"
10027090-62 = "2;토모에;05;그렇다면, 설득을 넘어선 설득의 방법으로, 사무국의 뜻을 관철시킬 수밖에요.\n#2;em;[!]"
10027090-63 = "#all;hide"
10027090-64 = "1;모미지;02\n5;메루;05;뭐, 뭘 하려는 거야?"
10027090-65 = "1;모미지;04;전 왠지 알 것 같은데요……."

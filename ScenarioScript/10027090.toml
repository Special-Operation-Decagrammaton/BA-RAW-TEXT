[translation]
10027090-1 = "Episode 9; Secretariat Office \"Proposal\""
10027090-4 = "Red Winter Snowfields"
10027090-6 = "*pant* *pant*"
10027090-7 = "Why is Red Winter so big...?"
10027090-8 = "If you have breath to talk, then you're not moving fast enough! "
10027090-9 = "Uh...? What's that in front of—"
10027090-10 = "What?!"
10027090-16 = "Greetings, Knowledge Liberation Front. We're here on behalf of the Red Winter Secretariat Office."
10027090-18 = "Wh-What? What are you...?"
10027090-20 = "I'd like to offer the Knowledge Liberation Front my congratulations on their accomplishments. Rejoice!"
10027090-22 = "...I don't know what you're going on about, but please wrap it up quickly. We're busy!"
10027090-24 = "I'll give you the short version. The Secretariat Office received a tip that Schale's legendary Sensei is working with the Knowledge Liberation Front to create...fan fiction."
10027090-26 = "Wh-Who told you that?!"
10027090-28 = "Aramaki Yakumo."
10027090-30 = "Her?!"
10027090-32 = "Yes. In response, the Secretariat Office conducted an investigation into this so-called fan fiction and the events surrounding it.  "
10027090-33 = "And we've decided to award you with the President's Mustache Medal of Effort."
10027090-34 = "The Knowledge Liberation Front should consider it a very great honor."
10027090-36 = "Uh... Thanks, I guess, but..."
10027090-37 = "(I'd rather get my book printed than get some dumb medal...)"
10027090-39 = "But I'm getting ahead of myself. You see, I cannot bestow this medal upon you until you meet one condition."
10027090-40 = "If the Knowledge Liberation Front is to be awarded the medal..."
10027090-42 = "...In order to spread the word of the great President Cherino's cuteness and charm...we require that she appear in your fanfic as a guest character!"
10027090-43 = "Just think, Cherino's charm would make your fanfic shine like sunlight, warming the heart of every Red Winter student who reads it!"
10027090-44 = "Wouldn't it be a sight to behold?!"
10027090-45 = "[s] \"Oh, it would be a sight to behold, all right...\""
10027090-47 = "You know, now that I think about it, we might as well give her a starring role. Do that, and we'll give you the President's Mustache Medal of Achievement too!"
10027090-49 = "..."
10027090-51 = "Don't be ridiculous! We have less than three hours left! "
10027090-52 = "If you want to feature President Cherino then the Secretariat Office should write its own manga! Or better yet, commission it from me for a small fee, which I'd refuse, of course!"
10027090-54 = "Well said, Meru! I'd expect nothing less!"
10027090-55 = "Now. We're extremely busy, so quit distracting us! We don't need your stinking medal!"
10027090-56 = "You seem to have forgotten something important, so I'll remind you. The Knowledge Liberation Front fights for knowledge, not medals!"
10027090-57 = "Knowledge is power! We WILL protect it!"
10027090-58 = "[s] \"I'm sorry. There's no compromising this time. I can't help you.\""
10027090-60 = "..."
10027090-61 = "I see. Well, I knew this wouldn't be easy."
10027090-62 = "That's why I have a backup plan. I will use the full might of the Secretariat Office to persuade you."
10027090-64 = "Wh-What are you trying to do?"
10027090-65 = "I've got that bad feeling again..."
10027090-77 = "The Secretariat Office is not above coercion. We will ensure President Cherino features in her own fanfic!"

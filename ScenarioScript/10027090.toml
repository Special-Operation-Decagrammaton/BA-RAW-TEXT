[translation]
10027090-1 = "第9話;事務局的提案"
10027090-4 = "赤冬聯邦學園．雪山"
10027090-6 = "哈啊，哈啊……！"
10027090-7 = "雖然是我們自己的學園，不過赤冬為什麼這麼大啊……"
10027090-8 = "有時間抱怨的話，不如多走幾步路！"
10027090-9 = "咦……？#n前面那些人是……事務局……？"
10027090-10 = "你說什麼！？"
10027090-16 = "「知識解放戰線」的各位，你們好。#n我們是赤冬事務局。"
10027090-18 = "那，那個……事務局找我們有什麼事……？"
10027090-20 = "首先，恭喜「知識解放戰線」在不懈的努力之下收獲了甜美的果實。#n你們想必也為此感到相當欣喜吧。"
10027090-22 = "……雖然不知道你們到底想做什麼，不過最好長話短說。#n我們還有事要忙！"
10027090-24 = "簡單來說是這樣的。根據本局收到的情報──#n夏萊的老師似乎正與「知識解放戰線」聯手製作某樣物品。#n那東西……是叫做同人誌對吧？"
10027090-26 = "你，你們是從哪裡獲得這種情報的！？"
10027090-28 = "提供人是荒槇八雲。"
10027090-30 = "是那傢伙！？！？"
10027090-32 = "此外，本局也已經仔細調查過所謂的「同人誌」，以及與其相關的一連串事件了。"
10027090-33 = "根據調查的結果……本局決定以潔莉諾會長之名，授予兩位鬍子好努力勳章。"
10027090-34 = "可以把這當成是你們的榮幸，「知識解放戰線」。#n不，這就是你們的榮幸。"
10027090-36 = "呃……那還真是謝囉……？"
10027090-37 = "（比起什麼勳章，我更希望你們早點放我們走……！）"
10027090-39 = "賀詞就先說到這邊吧。#n想要領取這枚勳章的話，還有一個條件。"
10027090-40 = "沒錯！如果「知識解放戰線」想要領取這塊勳章……！"
10027090-42 = "你們就必須讓潔莉諾醬……不，讓潔莉諾會長以特別出演的形式在作品中登場，#n藉此宣揚潔莉諾會長的可愛與魅力！"
10027090-43 = "你們想想看，可愛的潔莉諾醬在那名為「同人誌」的書裡登場，#n盡情散發其獨有的可愛與魅力……進而在赤冬學生之間廣為流傳的模樣……"
10027090-44 = "不覺得這樣的情景光是用想的就令人深深著迷嗎！？"
10027090-45 = "[s]「確實光是用想的……就令人震驚不已……」"
10027090-47 = "呵，既然如此，乾脆別用什麼特別出演了，直接讓潔莉諾會長成為主角吧。#n如果你們同意的話，不只是鬍子好努力勳章，鬍子功勳勳章也能一併頒給你們。"
10027090-49 = "……"
10027090-51 = "開什麼玩笑！我們只剩下不到三個小時了！"
10027090-52 = "如果真的想畫潔莉諾會長的同人誌，你們事務局就自己發行同人誌或會刊吧！#n再不然要付錢請別人畫也行！當然，我是絕對不會接這個案子的！"
10027090-54 = "真不愧是愛瑠前輩！說得真好！"
10027090-55 = "我們已經很忙了，少拿這種事來煩我們！#n管你是要頒勳章還是什麼的，我們不奉陪！"
10027090-56 = "雖然其他學生和我們自己都經常忘記，#n但「知識解放戰線」是為了解放知識而戰鬥的組織！"
10027090-57 = "因為知識就是力量！我們當然要全力守護它！"
10027090-58 = "[s]「抱歉，這次我們也有無法讓步的苦衷。」"
10027090-60 = "……"
10027090-61 = "這樣啊。#n我就知道事情不會那麼順利。"
10027090-62 = "既然如此，我們也只能換一種[ruby=  ・     ・     ・     ・  ]溝通方式[/ruby]來貫徹事務局的意志了。"
10027090-64 = "你，你們想做什麼？"
10027090-65 = "我怎麼好像猜得到……"
10027090-77 = "即使必須動用更加強硬的手段，本局也一定要讓你們畫出潔莉諾會長的「同人誌」！"

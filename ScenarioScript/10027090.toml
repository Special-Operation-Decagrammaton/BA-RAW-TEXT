[translation]
10027090-1 = "ตอนที่ 9;ข้อเสนอแนะจากสำนักเลขาธิการ"
10027090-4 = "ทุ่งหิมะเรดวินเทอร์"
10027090-6 = "แฮ่ก... แฮ่ก...!"
10027090-7 = "เรดวินเทอร์เป็นโรงเรียนของเราก็จริง แต่ทำไมถึงรู้สึกว่ามันกว้างใหญ่แบบนี้นะคะ..."
10027090-8 = "ถ้ามีเวลาพูด ก็เอาเวลานั้นมาเดินต่อเถอะ!"
10027090-9 = "หืม...? ข้างหน้าคือ... คนจากสำนักเลขาธิการเหรอ...?"
10027090-10 = "ว่าไงนะ?!"
10027090-16 = "สวัสดีค่ะ <ชมรมแนวร่วมปลดปล่อยความรู้> พวกฉันมาจากสำนักเลขาธิการเรดวินเทอร์ค่ะ"
10027090-18 = "คะ... คะ? แล้วทำไมจู่ๆ ถึงมาหาพวกฉัน...?"
10027090-20 = "ก่อนอื่นต้องแสดงความยินดีกับความพยายามและความสำเร็จของ <ชมรมแนวร่วมปลดปล่อยความรู้> ด้วย ดีใจกันไว้สักหน่อยก็ดีนะ"
10027090-22 = "...ฉันไม่รู้หรอกนะว่ามากันทำไม แต่รีบๆ พูดให้จบเถอะ พวกฉันไม่ได้มีเวลาว่างหรอกนะ!"
10027090-24 = "คงยากที่จะบอกอย่างรวบรัดค่ะ สำนักเลขาธิการของเราได้เบาะแสจากแหล่งข่าวมาว่าคุณครูจากชาเล่ต์#nกำลังร่วมมือกับ <ชมรมแนวร่วมปลดปล่อยความรู้> เพื่อทำอะไรบางอย่างอยู่ค่ะ สิ่งนั้นใช่อะไรที่เรียกว่า 'โดจินชิ' หรือเปล่าคะ?"
10027090-26 = "ละ... แหล่งข่าวจากไหนกันคะ?!"
10027090-28 = "อารามากิ ยาคุโมะไงล่ะ"
10027090-30 = "ยัยนั่นน่ะเหรอ?!?!"
10027090-32 = "ทางสำนักเลขาธิการได้ตรวจสอบสิ่งที่เรียกว่า 'โดจินชิ' และเหตุการณ์เชื่อมโยงเบื้องต้นแล้วค่ะ"
10027090-33 = "และจากการตรวจสอบนี้ ทำให้เราตัดสินใจจะมอบเหรียญรางวัลหนวดแห่งพยายามในนามของ#nประธานเชริโน่ให้ค่ะ"
10027090-34 = "จะคิดว่าเป็นเกียรติก็ได้นะ <ชมรมแนวร่วมปลดปล่อยความรู้> ไม่สิ ฉันขอบังคับให้คิดอย่างนั้นเลย"
10027090-36 = "อ่า... ก็น่าขอบใจอยู่หรอกนะ...?"
10027090-37 = "(แต่ปล่อยพวกเราไปก่อนได้ไหมคะ เรื่องเหรียญเอาไว้ก่อน...!)"
10027090-39 = "ขอจบการแสดงความยินดีแต่เพียงเท่านี้ค่ะ พอดีว่ามันจะต้องมีเงื่อนไขในการรับเหรียญไปด้วย"
10027090-40 = "ใช่! หาก <ชมรมแนวร่วมปลดปล่อยความรู้> จะรับเหรียญนี้ไปละก็...!"
10027090-42 = "จะต้องเผยแพร่ความน่ารักและเสน่ห์ของเชริโน่จัง... ไม่สิ ของประธานเชริโน่ลงในผลงานชิ้นนั้น โดยทำให้ประธานเชริโน่เป็นตัวละครรับเชิญค่ะ!"
10027090-43 = "ลองจินตนาการตามดูนะคะ เชริโน่จังได้อยู่ในหนังสือที่เรียกว่า 'โดจินชิ' แล้วเผยเสน่ห์ ความน่ารักที่#nเป็นธรรมชาติของตัวเองออกมา... และสิ่งนั้นก็จะถูกเผยแพร่ออกสู่สายตาของนักเรียนเรดวินเทอร์...!"
10027090-44 = "แค่จินตนาการดูก็ดีต่อใจแล้วว่าไหมคะ?!"
10027090-45 = "[s] \"แค่จินตนาการดู... ก็เป็นเรื่องใหญ่ในหลายๆ แง่แล้วนะ...\""
10027090-47 = "ฮุฮุ แต่ถ้าจะทำ ฉันว่าแทนที่จะเป็นตัวละครรับเชิญ สู้ทำให้เป็นตัวละครเอกตัวเดียวของเรื่องเลย#nมันน่าจะดีกว่านะ และถ้าทำแบบนั้นได้ เราจะให้ทั้งเหรียญหนวดแห่งความพยายามและเหรียญหนวดแห่ง#nคุณความดีเลย"
10027090-49 = "......"
10027090-51 = "อย่ามาตลกน่า! ตอนนี้เราเหลือเวลากันไม่ถึง 3 ชั่วโมงแล้ว!"
10027090-52 = "ถ้าอยากวาดประธานเชริโน่ ทางสำนักเลขาธิการก็ออกโดจินชิของตัวเองไปเลยสิ! หรือไม่ก็ไปจ้าง#nคนนอกทำแล้วให้ค่าตอบแทนที่สมน้ำสมเนื้อหน่อย! แต่บอกไว้ก่อนนะว่าฉันไม่รับ!"
10027090-54 = "สมกับเป็นรุ่นพี่เมรุเลย! พูดได้ดีมากค่ะ!"
10027090-55 = "แค่นี้พวกฉันก็ยุ่งกันจะตายแล้ว อย่าเอาเรื่องแบบนี้มาขัดขวางพวกเราเลยน่า! จะให้หรือไม่ให้เหรียญ#nอะไรก็ช่าง พวกเราขอตัวก่อนละ!"
10027090-56 = "คนอื่นน่ะชอบลืมกันเสมอ และบางทีพวกฉันก็ชอบลืมกันเอง แต่จะบอกให้นะว่า <ชมรมแนวร่วมปลดปล่อยความรู้> ของเราเป็นที่ที่ต่อสู้เพื่อปัญญา!"
10027090-57 = "เพราะปัญญาคือพลัง! เราก็เลยต้องรักษาไว้!"
10027090-58 = "[s] \"ขอโทษนะ แต่ครั้งนี้ครูคงยอมให้ไม่ได้\""
10027090-60 = "......"
10027090-61 = "งี้เองสินะ ก็ว่าแล้วแหละว่ามันคงไม่ง่ายเหมือนอย่างที่คิด"
10027090-62 = "ถ้าอย่างนั้นก็คงต้องใช้วิธีเกลี้ยกล่อมที่เหนือชั้นกว่าการเกลี้ยกล่อม เพื่อทำให้กิจการของทางสำนัก#nเลขาธิการลุล่วงแล้วละค่ะ"
10027090-64 = "คะ... คิดจะทำอะไรน่ะ?"
10027090-65 = "เหมือนฉันพอจะรู้เลยละค่ะว่าจะต้องโดนอะไร..."
10027090-77 = "ต่อให้ต้องใช้วิธีที่ค่อนข้างบีบบังคับ แต่สำนักเลขาธิการก็ต้องทำ 'โดจินชิ' ของประธานเชริโน่ให้ได้ค่ะ!"

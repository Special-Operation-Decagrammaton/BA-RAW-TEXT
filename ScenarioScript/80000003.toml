[translation]
80000003-1 = "#title;행정관의 간식"
80000003-2 = "#place;총학생회 리셉션 룸"
80000003-3 = "3;린;12;어서 오십시오, 선생님.\n#3;em;[반응]\n#3;a"
80000003-4 = "3;린;15;……그럼, 오늘 선생님을 이곳에 부른 이유는…… 말하지 않아도 알고 계시겠지요?\n#3;greeting"
80000003-5 = "[s] \"으음, 역시 그거려나? 그렇겠지?\""
80000003-6 = "3;린;14;네. 알고 계시다니 다행이군요.\n#3;em;[반짝]"
80000003-7 = "3;린;16;어제 보내주신 샬레의 업무 보고서, 잘못 기입된 부분을 찾는 것보다 제대로 기입된 부분을 찾는 게 더 빠를 정도로 엉망이더군요."
80000003-8 = "3;린;07;문장의 맞춤법은 물론이고, 보고서의 맨 뒷장에 첨부된 장난감 가게의 영수증까지…….\n#3;stiff"
80000003-9 = "3;린;21;……지금부터 보고서의 실책을 바로잡도록 하겠습니다.\n#3;em;[음표]\n#3;greeting"
80000003-10 = "[s] \"네…… 역시 그거겠죠. 네.\""
80000003-11 = "#all;hide"
80000003-12 = "#wait;1500"
80000003-13 = "#wait;1500"
80000003-14 = "#wait;1500"
80000003-15 = "#na;(이후, 린에게 잔소리를 들어가며 보고서를 열심히 고쳤다.)"
80000003-16 = "#all;hide"
80000003-17 = "#wait;2000"
80000003-18 = "3;린;03;……이것으로 보고서의 수정도 거의 끝나가네요.\n#3;em;[...]\n#3;a"
80000003-19 = "3;린;33;그럼 이제 이곳과 이곳에 서명을…….\n#3;greeting"
80000003-20 = "[s] 짧게 하품을 한다."
80000003-21 = "#st;[0,0];instant;1;"
80000003-22 = "#clearST"
80000003-23 = "3;린;02\n#3;em;[반응]\n#wait;1500"
80000003-24 = "3;린;02;……어쩐지 피곤하신 것처럼 보이시는군요, 선생님."
80000003-25 = "3;린;04;네? 샬레의 업무 때문에 지난밤에는 거의 잠을 이루지 못하셨다고요?\n#3;em;[?]"
80000003-26 = "3;린;06;어쩐지 수기로 작성된 글자가 엉망이다 싶었습니다만……\n#3;stiff"
80000003-27 = "3;린;20;충분한 숙면 또한 업무 준비의 일환입니다. 일이 바쁘다는 핑계로 잠을 미루는 것은 본말이 전도된 상황입니다.\n#3;greeting"
80000003-28 = "3;린;03;물론 정말로 숙면을 취하기 어려운 상황에는 당분과 카페인을 틈틈이 섭취하는 것도 도움이 됩니다만……\n#3;em;…"
80000003-29 = "3;린;02;잠시만 기다려주십시오. 현재 리셉션 룸에 남아있는 주전부리가……."
80000003-30 = "#st;[0,0];instant;1;"
80000003-31 = "#clearST"
80000003-32 = "3;린;02\n#3;d\n#wait;1000"
80000003-33 = "#wait;2000"
80000003-34 = "5;린;01;이 초콜릿뿐이군요.\n#5;greeting\n#5;a"
80000003-35 = "5;린;03;드시지요, 선생님.\n#5;em;[반응]"
80000003-36 = "#st;[0,0];instant;1;"
80000003-37 = "#clearST"
80000003-38 = "5;린;03\n#5;em;…\n#wait;2500"
80000003-39 = "5;린;05;……뭔가요, 그 표정은. 초콜릿을 처음 보시는 것도 아닐 텐데. 왜 그렇게 즐거운 얼굴을……?\n#5;m3"
80000003-40 = "[s] \"오늘이…… 그러니까…….\""
80000003-41 = "5;린;02;오늘? 오늘이 왜요? \n#5;em;[?]"
80000003-42 = "5;린;23;……. 오늘……?"
80000003-43 = "5;린;25;………….\n#5;em;[...]"
80000003-44 = "5;린;34;…………………….\n#5;stiff"
80000003-45 = "5;린;20;……그럴 리가 없지 않습니까.\n#5;em;[속상함]"
80000003-46 = "5;린;41;제가 원하는 것은 선생님이 빠르게 기력을 회복하여 보고서를 마무리하고, 돌아가시는 것뿐입니다."
80000003-47 = "[s] \"네…….\""
80000003-48 = "5;린;14;……네. 그럼 이 보고서를 마저 마무리하시죠.\n#5;em;[음표]"
80000003-49 = "[s] \"네…….\""
80000003-50 = "5;린;13;…….\n#5;em;[...]"

[translation]
80000003-1 = "ขนมของเจ้าหน้าที่"
80000003-2 = "ห้องรับรอง องค์การนักเรียน"
80000003-3 = "เชิญค่ะ คุณครู"
80000003-4 = "เหตุผลที่ฉันเชิญคุณครูมาที่นี่วันนี้... คุณครูน่าจะทราบดีใช่มั้ยคะ?"
80000003-5 = "[s] \"อืม คิดว่านะ คิดว่ารู้ละมั้ง?\""
80000003-6 = "ค่ะ ดีแล้วละค่ะที่คุณครูทราบ"
80000003-7 = "รายงานภารกิจชาเล่ต์ที่คุณครูส่งมาให้เมื่อวานมีส่วนที่กรอกข้อมูลผิดเยอะมากจนนั่งหาส่วนที่#nกรอกถูกเร็วกว่าหาส่วนที่กรอกมาผิดอีกค่ะ"
80000003-8 = "ทั้งเรื่องไวยากรณ์ที่ใช้ในประโยค แล้วก็ยังมีใบเสร็จรับเงินจากร้านขายของเล่นแนบมาท้ายรายงาน#nด้วย..."
80000003-9 = "...ฉันจะเริ่มแก้ไขข้อผิดพลาดในรายงานตั้งแต่นี้ไปค่ะ"
80000003-10 = "[s] \"ได้เลย... ได้เสมอ\""
80000003-15 = "(จากนั้นคุณครูก็ถูกรินบ่นจนหูชาเรื่องที่กรอกข้อมูลผิด และตั้งใจแก้ไขข้อมูลอย่างขยันขันแข็ง)"
80000003-18 = "เท่านี้ก็แก้ไขเกือบเสร็จแล้วค่ะ..."
80000003-19 = "ถ้างั้นก็รบกวนคุณครูเซ็นชื่อตรงนี้ กับตรงนี้..."
80000003-20 = "[s] หาว"
80000003-24 = "จะว่าไปคุณครูก็ดูเหนื่อยๆ นะคะ"
80000003-25 = "คะ? เมื่อคืนแทบไม่ได้นอนเพราะติดภารกิจของทางชาเล่ต์เหรอคะ?"
80000003-26 = "คิดแล้วเชียวว่าทำไมลายมือที่เขียนมาดูโย้เย้แปลกๆ..."
80000003-27 = "การนอนหลับพักผ่อนให้เพียงพอเป็นส่วนหนึ่งของการเตรียมงานนะคะ การอ้างว่างานยุ่ง และลดเวลานอนลงจนนอนไม่พอจะทำให้ได้ผลตรงกันข้ามค่ะ"
80000003-28 = "แน่นอนว่าในสถานการณ์ที่มีเวลานอนจำกัด การทานของที่มีรสหวานกับคาเฟอีนเป็นระยะๆ ก็จะช่วยได้..."
80000003-29 = "ช่วยรอสักครู่นะคะ ขนมขบเคี้ยวที่อยู่ที่ห้องรับรอง..."
80000003-34 = "มีแค่ช็อกโกแลตเองค่ะ..."
80000003-35 = "ทานก่อนสิคะ คุณครู"
80000003-39 = "ทำไมทำสีหน้าแบบนั้นล่ะคะ คงไม่ได้เห็นช็อกโกแลตเป็นครั้งแรกแน่ๆ ทำไมทำหน้าดีใจแบบนั้นคะ...?"
80000003-40 = "[s] \"ก็วันนี้... คือว่ามัน...\""
80000003-41 = "วันนี้? วันนี้ทำไมเหรอคะ? "
80000003-42 = "วันนี้...?"
80000003-43 = "..."
80000003-44 = "....."
80000003-45 = "ไม่ใช่แบบนั้นสักหน่อยค่ะ"
80000003-46 = "ฉันแค่อยากให้คุณครูสดชื่นขึ้นเร็วๆ และกลับมาแก้รายงานให้เสร็จก็เท่านั้นค่ะ"
80000003-47 = "[s] \"งั้นเหรอ...\""
80000003-48 = "ค่ะ... ถ้างั้นก็มาแก้รายงานให้เสร็จกันเถอะค่ะ"
80000003-49 = "[s] \"ก็ได้...\""
80000003-50 = "..."
80000003-51 = "ไม่ใช่จริงๆ นะคะ"
80000003-52 = "[s] \"ก็ได้...\""
80000003-55 = "(จากนั้นในห้องประชุมก็มีเพียงความเงียบจนกระทั่งทั้งสองคนแก้ไขรายงานเสร็จ)"

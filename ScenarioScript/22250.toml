[translation]
22250-1 = "Episode 25; Millennium Science School"
22250-3 = "Everyone joined forces and finally..."
22250-4 = "The crisis that threatened Eridu, Millennium, and even all of Kivotos, came to an end."
22250-6 = "As a result, I took on the responsibility of shutting down Eridu's facilities."
22250-7 = "[ns] \"That's a lot of work, Himari.\""
22250-8 = "Well, we were able to block the threat somehow, but nothing is technically resolved."
22250-9 = "I can't neglect this as the president of the Super Phenomenon Task Force. Sometimes I do wonder what the point of all this struggling is."
22250-10 = "Well, let's just say it's for the best."
22250-11 = "A delicate genius hacker's hands are always full."
22250-12 = "[s] \"Thanks for your hard work.\""
22250-14 = "Seminar Executive Office"
22250-15 = "When it came to Rio, the main person responsible for the incident..."
22250-25 = "President Rio?! What are you talking about? You want to resign from your position?"
22250-26 = "President?! Where did you go?!"
22250-27 = "...Ah."
22250-28 = "Yuuka, here's a message left by the president."
22250-29 = "Huh? A message? Let me see..."
22250-34 = "\"Sorry\"..."
22250-35 = "..."
22250-36 = "...Th-That's it?!"
22250-38 = "A little later on..."
22250-39 = "To the president's health! Cheers!"
22250-40 = "Umm, cheers."
22250-41 = "Yes! Cheers!"
22250-46 = "...What is all this?"
22250-47 = "Heehee. We said we'd celebrate when you were safely discharged."
22250-48 = "That's why everyone from C&C is here today!"
22250-49 = "Okay, but what's Sensei doing here...?"
22250-50 = "[s1] \"I was invited, Neru.\"\n[s2] \"Should I not have come?\""
22250-51 = "I mean, I-I appreciate it, but..."
22250-52 = "Ugh...! I mean, what I'm trying to say..."
22250-53 = "Why don't you have a drink, Master? Drink! "
22250-54 = "We borrowed a bunch of cans of Frenzy MAX from Veritas!"
22250-55 = "[s] \"...Oh, Frenzy MAX.\""
22250-56 = "Asuna, please calm down. You're making Sensei uncomfortable..."
22250-58 = "Heehee. Karin. It's not so bad to be rowdy on a day like this..."
22250-59 = "Right, Sensei?"
22250-60 = "[s] \"I suppose so...\""
22250-61 = "Hmm, is this too boring?"
22250-62 = "Oh!"
22250-63 = "Maybe we should have all worn bunny suits!"
22250-64 = "Hmm? Master."
22250-65 = "A bunny suit...would be too much... "
22250-66 = "I mean, it's not impossible...if that's what Sensei wants..."
22250-67 = "[s] \"Please don't. People will think I'm a weirdo!\""
22250-68 = "*sigh* ...Who is this party for...?"
22250-69 = "Indeed... We can celebrate with bunny suits at the after-party."
22250-70 = "So this is how C&C operates. I learn something new every day."
22250-71 = "Just great."
22250-72 = "Oh, my."
22250-73 = "...!"
22250-74 = "Haha!"
22250-75 = "Sorry I'm late, upperclassmen."
22250-76 = "Hi, Toki!"
22250-77 = "Wh-What...? Why is she here...?!"
22250-78 = "I was told all members of C&C would be here, so I didn't want to miss it."
22250-79 = "But you work with the president!"
22250-80 = "...Unfortunately, she's disappeared."
22250-81 = "I didn't know what to do... Then I thought of C&C."
22250-82 = "Who shows up to a party that's celebrating the person you almost killed?!"
22250-83 = "...Hm?"
22250-84 = "Don't try to act innocent with me!"
22250-85 = "Oh, President! Don't be mean! Toki went out of her way to come visit us!"
22250-86 = "We were fighting each other just a few days ago!"
22250-87 = "[s] \"It's natural for kids to fight as they grow up...\""
22250-88 = "Why're you taking her side?!"
22250-90 = "Oh, Toki. Would you like some snacks?"
22250-91 = "That sounds wonderful. Thank you."
22250-92 = "And try this next!"
22250-94 = "...Hm, Frenzy MAX tastes very interesting."
22250-95 = "Ugh!"
22250-96 = "..."
22250-97 = "*sigh* ...Well, who cares."
22250-98 = "[s] \"Neru...?\""
22250-99 = "C&C will do anything the higher-ups order."
22250-100 = "You had a request from the president and did your job."
22250-101 = "You're more understanding than I expected, Neru."
22250-102 = "Who do you think made me this way, huh?!"
22250-103 = "By the way...your fighting skills were quite impressive based on what I saw."
22250-104 = "Yes, but I bet I can beat you no problem if I'm prepared..."
22250-105 = "All right, Toki. Here, try a Frenzy MAX."
22250-107 = "Okay, wait... Akane, so, umm..."
22250-111 = "...Huh? What did you say?"
22250-112 = "[s] \"...Looks like things will continue to be lively around here.\""
22250-118 = "After the big incident, things went back to normal pretty quickly."
22250-142 = "That was true of my daily life as well..."
22250-144 = "[ns] \"...You called?\""
22250-145 = "Oh, Sensei! Welcome!"
22250-146 = "We were about to start studying together!"
22250-147 = "[s] \"What are you studying?\""
22250-148 = "What do you mean? It's obvious!"
22250-149 = "We're studying up for our next project: a collection and growth strategy RPG where you level up and conquer the world by making friends with cute monsters."
22250-150 = "[s] \"That's an entirely different genre!\""
22250-151 = "That other one got canceled...because progression was impossible..."
22250-152 = "And Momoi said we should try a new genre instead..."
22250-153 = "[s] \"...Again?\""
22250-154 = "Wh-What do you mean, again? That's how game development works!"
22250-158 = "Wah! I cannot make friends with this cute monster!"
22250-159 = "Oh, Aris! You have to battle it first to decrease its HP!"
22250-160 = "Then it'll be easier to capture!"
22250-161 = "The monster did not do anything to me though... Is it not wrong for me to attack it first?"
22250-162 = "Oh, I guess that's kind of weird..."
22250-163 = "Ugh, but that's how the game system works..."
22250-164 = "This is what I mean! We have to stop messing around and do some actual analysis!"
22250-166 = "Um, w-we can take our time..."
22250-167 = "[s] \"Okay, then let's work on it together.\""
22250-168 = "Yes! Sensei, you can sit next to me!"
22250-169 = "All right! Now that everyone is here, let's start the team battle!"
22250-170 = "Oh, heavens."
22250-171 = "Heehee..."
22250-173 = "Although they're bound to encounter countless difficulties that cause pain and make them cry..."
22250-174 = "This hero and her party members will continue forging straight onward."
22250-175 = "Yes, the adventure must go on."

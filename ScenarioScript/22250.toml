[translation]
22250-1 = "ตอนที่ 25;โรงเรียนวิทย์มิลเลเนียม"
22250-3 = "(หลังจากที่ทุกคนร่วมมือกัน...) "
22250-4 = "(เมืองเอริดู... หรือมิลเลเนียมก็ผ่านพ้นวิกฤตที่อาจเข้ามาคุกคามคิโวทอสในวันข้างหน้าได้)"
22250-6 = "...ฉันรับผิดชอบสิ่งปลูกสร้างในเอริดูและปิดเมืองเรียบร้อยแล้วค่ะ"
22250-7 = "[s] \"คงต้องเหนื่อยน่าดูเลยนะ ฮิมาริ\""
22250-8 = "แต่ก็... ถึงเราจะหยุดภัยคุกคามนั้นไว้ได้ แต่มันก็ยังไม่มีอะไรเปิดเผยออกมาอยู่ดีนี่คะ"
22250-9 = "ในฐานะหัวหน้าชมรมปรากฏการณ์ลี้ลับ ฉันมองว่านี่เป็นเรื่องที่มองข้ามไม่ได้... แล้วก็แอบสงสัยด้วยว่า เราต้องมาลำบากแบบนี้ 'เพราะ' ใคร..."
22250-10 = "แต่ก็คิดเสียว่าเป็นการทำ 'เพื่อ' ใครบางคน... ดีกว่าไหมคะ?"
22250-11 = "แฮ็กเกอร์ผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษนี่งานยุ่งและมีเรื่องให้คิดอยู่ตลอดเลยค่ะ"
22250-12 = "[s] \"อืม ฝากด้วยนะ\""
22250-14 = "ห้องสำนักงาน เซมิน่า"
22250-15 = "(ตัดมาที่เรื่องของริโอะ...)"
22250-25 = "ประธานริโอะ?! พูดอะไรออกมาคะเนี่ย?! ประธานริโอะจะลาออกจากตำแหน่งงั้นเหรอคะ!?"
22250-26 = "ประธาน?! ประธานหนีไปไหนแล้วคะ?!"
22250-27 = "อ่า..."
22250-28 = "ยูกะจัง... ประธานทิ้งข้อความไว้ให้ค่ะ"
22250-29 = "หืม? ข้อความเหรอ?! ไหนล่ะ...?"
22250-34 = "<ขอโทษนะ>......?"
22250-35 = ".................."
22250-36 = "...... ขอโทษแล้วก็จบเลยเหรอ?!"
22250-38 = "(และเหตุการณ์หลังจากนั้น...)"
22250-39 = "เย้~ ฉลองให้กับการออกจากโรงพยาบาลของหัวหน้า! ชนแก้ว!"
22250-40 = "อืม ชนแก้ว"
22250-41 = "ค่า~ ชน!"
22250-46 = "...ทำอะไรน่ะ?!"
22250-47 = "ฮุฮุ พวกเราตกลงกันว่าจะเลี้ยงฉลองหลังเสร็จงาน และฉลองที่หัวหน้าออกจากโรงพยาบาลด้วยค่ะ"
22250-48 = "วันนี้ C&C ก็เลยมาอยู่กันพร้อมหน้าพร้อมตาแบบนี้ไง!"
22250-49 = "อย่างงั้นเองเหรอ ว่าแต่ครูล่ะ? มาได้ไง?"
22250-50 = "[s1] \"ครูได้รับเชิญมาน่ะ ดีใจที่เธอดีขึ้นนะเนรุ\"\n[s2] \"หรือว่าครูมารบกวนทุกคนนะ?\""
22250-51 = "เอ่อ... พูดแบบนี้ก็... ขอบคุณนะ..."
22250-52 = "อึก...! ไม่หรอก ไม่ใช่อย่างนั้นสักหน่อย..."
22250-53 = "เอาละๆ อย่ามัวแต่รีรอกันอยู่ นายท่านก็ดื่มด้วยสิ! ดื่มให้หมดไปเลย! "
22250-54 = "เวอริทัสแบ่งมอนสเตอร์แม็กซ์มาให้กินเพียบเลยน่ะ!"
22250-55 = "[s] \"อ่า... อืม... มอนสเตอร์แม็กซ์สินะ...\""
22250-56 = "รุ่นพี่อาสึนะ ถ้าบังคับให้ดื่มแบบนั้น คุณครูจะลำบากใจเอานะ"
22250-58 = "ฮุฮุ คาริน วันนี้วันเดียว ไม่เป็นไรหรอกค่ะ ถึงจะโหวกเหวกกันไปหน่อยก็เถอะ..."
22250-59 = "ว่าไหมคะคุณครู?"
22250-60 = "[s] \"ครูก็ไม่ได้ติดอะไรหรอก...\""
22250-61 = "อืม~ หรือว่าแค่นี้จะยังไม่ได้ฟีลงั้นเหรอ?"
22250-62 = "จริงสิ!"
22250-63 = "ถ้าทุกคนใส่ชุดบันนี่เกิร์ล บรรยากาศจะดีกว่านี้ไหมนะ?"
22250-64 = "นายท่านล่ะ คิดว่าไง?"
22250-65 = "ชุดบันนี่เกิร์ลเหรอ... ยุ่งแล้ว... "
22250-66 = "ไม่สิ... ถ้ามันเป็นความต้องการของคุณครู... ก็ย่อมได้..."
22250-67 = "[s] \"อดใจกันไว้เถอะนะ เดี๋ยวคนอื่นจะคิดว่าครูเป็นภัยสังคมกันหมดพอดี!\""
22250-68 = "เฮ้อ... ตกลงนี่มันงานเลี้ยงฉลองเพื่อใครกันแน่..."
22250-69 = "เดี๋ยวนะ... จัดงานเลี้ยงฉลองในชุดบันนี่เกิร์ลเหรอ"
22250-70 = "นี่คือรสนิยมของ C&C สินะคะ แล้วฉันจะจำให้ขึ้นใจค่ะ"
22250-71 = "หืม...?"
22250-72 = "ตายจริง"
22250-73 = "......!"
22250-74 = "อ่ะฮ่า~"
22250-75 = "ขอโทษที่มาช้าค่ะ รุ่นพี่"
22250-76 = "ว่าไงจ๊ะ~ โทคิจัง~"
22250-77 = "อะ... อะไรกัน... เดี๋ยวก่อน... ทำไมเด็กนี่ถึง... มาที่นี่ได้?!"
22250-78 = "เห็นว่าเป็นงานเลี้ยงฉลองของสมาชิก C&C ทุกคน ฉันก็เลยมาด้วยค่ะ"
22250-79 = "แต่เธอทำงานให้กับประธานนี่?!"
22250-80 = "น่าเสียดายที่ตอนนี้ประธานไปซ่อนตัวอยู่..."
22250-81 = "ระหว่างที่ฉันลังเลเพราะไม่รู้ว่าจะทำยังไงต่อไปดี... ฉันก็นึกถึง C&C ขึ้นมาค่ะ"
22250-82 = "มางานเลี้ยงฉลองที่คู่ต่อสู้ตัวเองออกจากโรงพยาบาลเนี่ยนะ ของแบบนั้นมันมีที่ไหนกันเล่า?!"
22250-83 = "คะ...?"
22250-84 = "ยังจะมาทำหน้าเหมือนกับว่านี่ไม่ใช่เรื่องแปลกอีกงั้นเหรอ?!"
22250-85 = "ไม่เอาสิหัวหน้า! เกินไปแล้วนะ! โทคิจังอุตส่าห์แวะมาหานะ!"
22250-86 = "เกินไปที่ไหนกันเล่า! ยัยเด็กนี่คือคนที่เราสู้ด้วยจนเลือดตาแทบกระเด็นเลยนะ!"
22250-87 = "[s] \"เด็กๆ ก็โตมากับการทะเลาะกันทั้งนั้นแหละ...\""
22250-88 = "ครูก็เป็นไปกับเค้าด้วยงั้นเหรอ...?!"
22250-90 = "โทคิจัง ไหนๆ ก็มาแล้ว มากินขนมนี่สิคะ"
22250-91 = "ขอบคุณค่ะ"
22250-92 = "ต่อไปก็ลองอันนี้ดูนะ!"
22250-94 = "อืม... มอนสเตอร์แม็กซ์รสชาติลึกซึ้งจัง"
22250-95 = "ฮึ่ยยย!!!!"
22250-96 = ".........."
22250-97 = "เฮ้อ... ช่างเถอะ"
22250-98 = "[s] \"เนรุ...?\""
22250-99 = "สุดท้ายแล้วก็เป็น C&C ด้วยกันอยู่ดีนี่นะ"
22250-100 = "และที่เธอต้องทำภารกิจนั้น ก็เพราะได้รับคำสั่งมาจากประธานอีกที"
22250-101 = "รุ่นพี่เนรุเนี่ย เข้าอกเข้าใจคนอื่นได้เร็วจริงๆ เลยค่ะ"
22250-102 = "ก็ทั้งหมดนี้มันเป็นเพราะใครกันเล่า?!"
22250-103 = "เรื่องนั้นช่างมันเถอะ... จะว่าไป เธอก็สู้เก่งไม่เบาเลยนะ? น่าจะรู้วิธีต่อสู้เยอะเลยด้วย"
22250-104 = "ค่ะ ถ้าร่างกายอยู่ในสภาพสมบูรณ์ ก็คงพอสูสีกับรุ่นพี่เนรุ..."
22250-105 = "เอาละๆ โทคิ ลองดื่มมอนสเตอร์แม็กซ์ดูสิคะ"
22250-107 = "ค่ะ... เอ่อ... รุ่นพี่อาคาเนะ... คือว่า... อุ้บ!"
22250-111 = "ห้ะ...? ว่าไงนะ?"
22250-112 = "[s] \"ต่อไปก็คงจะวุ่นวายไม่น้อยเลยนะ...\""
22250-118 = "(หลังจากเหตุการณ์ดังกล่าว หลายๆ อย่างก็กลับสู่สภาพปกติอย่างรวดเร็ว)"
22250-142 = "(เช่นเดียวกับที่แห่งนี้...)"
22250-144 = "[ns] \"ครูมาหาตามคำขอแล้ว\""
22250-145 = "อ๊ะ! คุณครู! ยินดีต้อนรับนะ!"
22250-146 = "ตอนนี้ทุกคนกำลังเรียนกันอยู่น่ะ!"
22250-147 = "[s] \"เรียนอะไรกันเหรอ?\""
22250-148 = "เรียนอะไรกันงั้นเหรอ! คำตอบมันก็แน่อยู่แล้ว!"
22250-149 = "เรียนการสร้าง <เกม RPG กลยุทธ์การพัฒนาที่รวบรวมมอนสเตอร์น่ารักๆ ข้างถนนมาเป็นพวกของเรา แล้วอัปเลเวลเพื่อพิชิตโลก> ยังไงล่ะ! นี่แหละเกมใหม่ของเรา!"
22250-150 = "[s] \"คอนเซ็ปต์ดูต่างจากที่เคยบอกคราวก่อนนะ?!\""
22250-151 = "เราพับคอนเซ็ปต์เก็บไปแล้วค่ะ... พอดีว่าเจอทางตันระหว่างสร้างเกม..."
22250-152 = "แต่พี่โมโมอิบอกว่าอยากจะลองทำเกมแนวใหม่ดู เราก็เลย..."
22250-153 = "[s] \"...อีกแล้วเหรอ?\""
22250-154 = "อะ... อีกแล้วเหรออะไรกันเล่า...! การพัฒนาเกมมันก็เป็นแบบนี้น่ะแหละ!"
22250-158 = "แง้! อาริสึเป็นเพื่อนกับคุณมอนสเตอร์น่ารักๆ ตัวนั้นไม่ได้ค่ะ!"
22250-159 = "อ๊ะ! อาริสึ! เราต้องสู้กับมอนสเตอร์ให้ HP มอนสเตอร์ลดลงก่อนสิ!"
22250-160 = "จะได้จับได้ง่ายๆ ไง!"
22250-161 = "คุณมอนสเตอร์ยังไม่ได้ทำอะไรให้เลยนะคะ... จะให้อาริสึไปตีมันก่อนเลยเหรอคะ?"
22250-162 = "อ๊ะ พอมาคิดๆ ดูแล้ว... มันก็ดูแปลกๆ อยู่นะ..."
22250-163 = "อืม... แต่ระบบเกมมันเป็นแบบนี้มาตั้งนานแล้วนี่..."
22250-164 = "ทุกคน! เลิกพูดอะไรแปลกๆ! แล้วมาวิเคราะห์กันอย่างจริงจังกันเถอะ!"
22250-166 = "คะ... คะ... ค่อยๆ ก็ได้..."
22250-167 = "[s] \"ดีละ งั้นมาทำด้วยกันเลย\""
22250-168 = "ค่ะ! ตรงนี้ค่ะคุณครู! มานั่งข้างๆ อาริสึเลยค่ะ!"
22250-169 = "ดีละ~ ไหนๆ ก็อยู่กันครบแล้ว! มา PvP กันเลย!"
22250-170 = "เฮ้อ... จริงๆ เลย..."
22250-171 = "อืม..."
22250-173 = "(แม้จะต้องเผชิญกับความยากลำบากมากมาย ทั้งเจ็บตัว ทั้งได้บาดแผล และบางครั้งก็ล้มลงไปร้องไห้)"
22250-174 = "(แต่การผจญภัยของผู้กล้ากับเหล่าสหายก็ยังคงดำเนินต่อไป)"
22250-175 = "(และมันจะเป็นเช่นนี้ตลอดไป)"

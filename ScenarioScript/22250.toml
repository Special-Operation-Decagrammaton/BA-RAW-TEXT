[translation]
22250-1 = "第25話;千年科學學園"
22250-3 = "（就這樣，在大家的同心協力之下，將埃里都……）"
22250-4 = "（將千年──#n　或者說可能成為奇普托斯威脅的危機解除了。可喜可賀可喜可賀）"
22250-6 = "……埃里都的設施將由我負責封閉。"
22250-7 = "[s]「辛苦了。謝謝妳，陽葵。」"
22250-8 = "……雖然總算是防止了那時的威脅，#n但什麼都還沒解決呢。"
22250-9 = "身為特異現象搜查部的部長，我也不能坐視不管……#n唉……不禁讓人覺得這到底是誰造成的呢。"
22250-10 = "算了，就當作是……為了某個人吧？"
22250-11 = "超天才病弱美少女駭客總是很忙碌呢……真是的。"
22250-12 = "[s]「啊哈哈，交給妳了。」"
22250-14 = "研討會．辦公室"
22250-15 = "（說到身為當事者的莉央──）"
22250-25 = "莉央會長！？突然說這什麼話！？#n居然說要辭去會長的職位！"
22250-26 = "等等啊會長！？會長到底在哪！？"
22250-27 = "……啊。"
22250-28 = "優香醬，這裡有會長留下的訊息。"
22250-29 = "咦？訊息！？#n我看看……"
22250-34 = "「我很抱歉」……？"
22250-35 = "…………………"
22250-36 = "……這，這不是道歉就能解決的問題吧！？會長──！？！？"
22250-38 = "（另一方面，在C&C……）"
22250-39 = "慶祝部長出院～！乾杯！"
22250-40 = "乾杯。"
22250-41 = "嗯，乾杯～"
22250-46 = "……這到底是怎麼回事？"
22250-47 = "呵呵。#n因為部長順利出院了，所以決定要慶祝一下唷。"
22250-48 = "所以今天C&C才會全員集合唷！"
22250-49 = "不是，這我能理解……但老師為什麼也在啊？"
22250-50 = "[s1]「因為被邀請了唷。寧瑠，恭喜出院。」\n[s2]「果然，我在這裡會造成困擾嗎？」"
22250-51 = "謝，謝……謝謝……"
22250-52 = "唔……！不，我不是那個意思……"
22250-53 = "來來來，主人也喝吧！喝吧！"
22250-54 = "貝里塔斯幫我們準備的妖怪MAX還有很～多很多哦！"
22250-55 = "[s]「……啊，嗯。這是妖怪MAX啊。」"
22250-56 = "明日奈前輩，那樣勸喝的話會讓老師困擾的……"
22250-58 = "呵呵，花凛。今天這樣也沒什麼不好不是嗎？"
22250-59 = "對吧，老師？"
22250-60 = "[s]「我是無所謂啦……」"
22250-61 = "唔嗯～光靠這個不夠起勁嗎？"
22250-62 = "啊！"
22250-63 = "對了！大家一起換成兔女郎裝會不會更好？"
22250-64 = "你覺得呢？主人。"
22250-65 = "兔女郎裝……那是，有點困擾…… "
22250-66 = "不……但是老師想看的話……也不是不行……"
22250-67 = "[s]「沒，沒關係！會被投以異樣的眼光的！」"
22250-68 = "唉……這到底是為誰慶祝啊……"
22250-69 = "原來如此……慶祝的時候要穿兔女郎裝。"
22250-70 = "那就是C&C流的方式對吧。上了一課。"
22250-71 = "……啊？"
22250-72 = "哎呀。"
22250-73 = "……！"
22250-74 = "啊哈♪"
22250-75 = "我遲到了，前輩們。"
22250-76 = "呀齁～季醬！"
22250-77 = "什，什……不是……妳這傢伙為什麼……會在這裡……！？"
22250-78 = "因為聽說是C&C要全員集合的慶祝活動，所以就來了。"
22250-79 = "妳是專屬於會長的吧！？"
22250-80 = "……很遺憾，那位會長失蹤了。"
22250-81 = "正當我不知如何是好的時候……想起了C&C。"
22250-82 = "就算如此，哪有人會參加被自己打的人的出院慶祝會啊！？"
22250-83 = "……什麼？"
22250-84 = "什麼啊！別露出那種好像是我搞錯了的表情啊！"
22250-85 = "啊！部長好過分！季醬難得過來一趟！"
22250-86 = "不不不……那傢伙，不久之前還是我們的敵人啊！？"
22250-87 = "[s]「俗話說不打不相識……」"
22250-88 = "等！連老師都要包庇她啊！？"
22250-90 = "啊，季醬。來都來了，要不要順便吃點點心？"
22250-91 = "謝謝。"
22250-92 = "好！接下來是這個！"
22250-94 = "……唔嗯，妖怪MAX的味道真是深奧。"
22250-95 = "哈啊啊！？！？"
22250-96 = "…………"
22250-97 = "唉……算了。"
22250-98 = "[s]「寧瑠……？」"
22250-99 = "反正，C&C就是按照上頭的命令行動的。"
22250-100 = "──妳也只不過是執行了會長的委託而已。"
22250-101 = "寧瑠前輩，比想像中還好說話呢。"
22250-102 = "妳以為是誰的錯啊！？"
22250-103 = "話說回來……有兩把刷子嘛妳。#n該說戰鬥方式沒有多餘的動作嗎。"
22250-104 = "是的，如果是在萬全的狀態下，區區寧瑠前輩……"
22250-105 = "來，季醬。請嘗嘗這個妖怪MAX吧。"
22250-107 = "是，等……朱音前輩，那個，唔……"
22250-111 = "……啊啊？妳說什麼？"
22250-112 = "[s]「……感覺以後也會很熱鬧呢。」"
22250-118 = "（即使是在發生那種事件之後，時間依然不斷流逝──）"
22250-142 = "（在這裡也一樣──）"
22250-144 = "[ns]「……所以就被叫來了。」"
22250-145 = "啊！老師！歡迎你來！"
22250-146 = "大家正好在舉行研究會哦！"
22250-147 = "[s]「……研究什麼？」"
22250-148 = "那當然是！"
22250-149 = "為了製作我們的下一個作品#n「將路旁的可愛怪物變成夥伴並征服世界的收集型養成戰略RPG」的研究囉！"
22250-150 = "[s]「類型跟上次說的不一樣吧！？」"
22250-151 = "啊啊，之前說的那個，因為想法陷入了瓶頸……#n所以決定打掉重練……"
22250-152 = "但是姐姐又說想挑戰新的種類，所以……"
22250-153 = "[s]「……又來了？」"
22250-154 = "說，說又來了還真過分啊……！#n開發遊戲本來就是這樣嘛！？"
22250-158 = "嗚哇啊！愛麗絲，沒辦法跟這隻可愛的怪物成為朋友！"
22250-159 = "啊！愛麗絲！要先透過戰鬥消耗體力才行！"
22250-160 = "這樣才會比較容易捕獲哦！"
22250-161 = "明明怪物什麼都沒有做……#n愛麗絲卻要先動手嗎？"
22250-162 = "唔嗯，被妳這麼一說確實……好像有點奇怪……？"
22250-163 = "唔唔唔，不過遊戲的系統本來就是那樣……"
22250-164 = "那邊！不要一直說些奇怪的話！好好分析！"
22250-166 = "那個，慢，慢慢來就好……"
22250-167 = "[s]「好。那就一起來玩吧。」"
22250-168 = "好！老師的位置在這裡！請坐在愛麗絲旁邊！"
22250-169 = "好～！大家都到齊的話就要開始組隊戰鬥了唷！"
22250-170 = "唉……真是的。"
22250-171 = "呵呵，嗯……"
22250-173 = "（面臨無數的難關，雖然有時會因吵架而受傷或遭遇挫折──）"
22250-174 = "（即便如此，勇者和夥伴們的冒險依然會持續下去──）"
22250-175 = "（沒錯，永遠持續下去──）"

10037115-23 = "3;사야;04;자, 잠깐만! 억울한 것이다! 연단방은 이번 사태와는 무관한 것이다!\n#3;hophop\n#3;a"
10037115-24 = "1;현룡문 부원;02;일단은 참고인 조사니까, 동행을 부탁합니다. 야쿠시 사야 부장.\n#1;em;[반응]\n#1;ar\n#3;m5"
10037115-25 = "#all;hide"
10037115-26 = "#wait;500"
10037115-27 = "3;키사키;00;'원숭이 손'에 대한 이야기를 알고 있는가, 선생?\n#3;em;[?]\n#3;a"

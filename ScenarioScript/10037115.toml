10037115-50 = "3;키사키;11;많은 학생들이 괴로워했고, 많은 학생들이 몸부림쳤다. \n#3;em;…\n#3;a"
10037115-51 = "3;키사키;05;그런 너를, 나 한 몸의 안식을 위해, 아무런 책임도 없이 다시 받아들여야 하는가?"

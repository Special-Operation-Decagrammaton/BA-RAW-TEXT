[translation]
10037115-2 = "ตอน"
10037115-4 = "ตัว"
10037115-6 = "อย่าง"
10037115-15 = "เกิดเรื่องอะไรในเวทีแสดงงิ้วเหรอคะ? ท่านประธานรู้เรื่องมั้ยคะ?"
10037115-19 = "อืม... เลิกคุยเรื่องนี้ได้แล้วละ!"
10037115-23 = "ดะ... เดี๋ยวสิ! แบบนี้ไม่ยุติธรรมเลย! ชมรมวิจัยศาสตร์การปรุงยาไม่มีส่วนเกี่ยวข้องกับเรื่องนี้นะ!"
10037115-24 = "นี่เป็นการสอบสวนเพื่อเก็บข้อมูลค่ะ ไปกับเราก่อนเถอะค่ะ หัวหน้ายาคูชิ ซายะ"
10037115-27 = "รู้เรื่องเกี่ยวกับ 'หัตถ์วานร' หรือไม่น่ะ ครู?"
10037115-30 = "[ns1] \"มีหลายเรื่องที่ไม่ได้พูดกันได้ง่ายๆ เลยน่ะ\"\n[ns2] \"อดีตของซานไห่จิงก็เป็นอย่างนั้นด้วย\""
10037115-35 = "ชมรมการแสดงงิ้วเป็นชมรมที่ก่อตั้งเพื่อการแสดงค่ะ "
10037115-38 = "ฉันจะไม่บอกว่าไม่ต้องกังวลหรอกนะคะ เพราะถึงจะบอกไป ท่านประมุขก็คงไม่ฟังอยู่ดีค่ะ"
10037115-39 = "แต่ต่อให้ท่านประมุขทอดทิ้งฉัน ฉันก็ไม่มีวันทอดทิ้งท่านประมุขหรอกค่ะ"
10037115-42 = "ฉันทำให้เธอดีขึ้นได้นะ คิซากิ"
10037115-43 = "มันก็แน่นอนอยู่แล้วละ เพราะคนที่ทำให้เธอเป็นอย่างนั้น"
10037115-47 = "ก็คือฉันยังไงล่ะ"
10037115-50 = "ที่ผ่านมานักเรียนหลายคนต้องทนทุกข์ทรมานและดิ้นรน "
10037115-51 = "เราควรจะเปิดรับคนอย่างเธออีกครั้งโดยที่ไม่ต้องรับผิดชอบเรื่องใดๆ เพื่อความสงบสุขของเราเอง#nเช่นนั้นหรือ?"
10037115-56 = "สวัสดีค่ะ คุณครู!"

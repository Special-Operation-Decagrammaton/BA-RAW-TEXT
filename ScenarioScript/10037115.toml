10037115-29 = "#wait;500"
10037115-30 = "[ns1] \"단순하게 이야기하기 어려운 것들이 분명히 있지.\"\n[ns2] \"산해경의 과거들이 그런 것처럼 말이야.\""
10037115-31 = "#wait;500"
10037115-32 = "#wait;500"
10037115-33 = "#all;hide"
10037115-34 = "#wait;500"
10037115-35 = "3;카구야;05;경극부는 경극을 공연하기 위해 존재하는 동아리입니다. \n#3;em;[!]\n#3;a"
10037115-36 = "#all;hide"
10037115-37 = "#wait;500"
10037115-38 = "3;미나;02;걱정하지 마시라고는 말씀드리지 않겠습니다. 문주님께서는 그러기 어려워하시는 분이니까요.\n#3;em;[반응]\n#3;a"
10037115-39 = "3;미나;00;하지만 문주님께서 저를 저버리시는 일은 있을 수 있어도, 제가 문주님을 떠나는 일은 없을 겁니다."
10037115-40 = "#all;hide"
10037115-41 = "#wait;500"
10037115-42 = "3;카이;00;나라면 널 낫게 할 수 있다. 키사키.\n#3;em;…\n#3;a"
10037115-43 = "3;카이;03;그것도 당연하지. 너를 그렇게 만든 것은."
10037115-44 = "#st;[0,0];instant;1;"

[translation]
10037115-2 = "預"
10037115-4 = "告"
10037115-6 = "篇"
10037115-15 = "京劇劇場那天到底發生了什麼？會長您知道嗎？"
10037115-19 = "唔嗯……這個話題還是到此為止吧！"
10037115-23 = "等，等等！冤枉啊！#n我們鍊丹術研究會和這次事件無關！"
10037115-24 = "我們只是要調查事情經過而已。#n麻煩跟我們走一趟吧，藥子沙耶會長。"
10037115-27 = "汝知道「猴爪」的故事嗎，老師？"
10037115-30 = "[ns1]「有些事很難用三言兩語就解釋清楚。」\n[ns2]「比如山海經的過往就是如此。」"
10037115-35 = "京劇部是為了表演京劇而存在的社團。"
10037115-38 = "我不會要求您不必擔心。#n畢竟門主大人本來就是個容易操心的人。"
10037115-39 = "不過即便門主大人拋棄了我，我也絕不會離門主大人而去。"
10037115-42 = "我可以治好你，妃姬。"
10037115-43 = "這也沒什麼好奇怪的。#n畢竟將你變成這副德性的──"
10037115-47 = "不是別人就是我啊？"
10037115-50 = "那麼多學生深陷痛苦，那麼多學生死命掙扎……"
10037115-51 = "汝卻要妾身為了自身的安寧，眼睜睜地讓汝回來嗎？"
10037115-56 = "你好呀，老師！"

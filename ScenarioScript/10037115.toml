10037115-18 = "3;레이죠;02\n5;루미;99\n#5;em;…\n#5;al\n#3;m1\n#3;h\n#5;h\n#wait;2500"
10037115-19 = "5;루미;00;음……. 역시 이 화제는 여기까지!\n#5;em;[음표]"

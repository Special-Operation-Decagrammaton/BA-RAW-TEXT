10037115-14 = "3;레이죠;00\n#3;greeting\n#3;a\n#wait;1500"
10037115-15 = "3;레이죠;02;경극 공연장에서 정확히 무슨 일이 일어난 걸까요? 회장님은 알고 계십니까?"

1009503-49 = "3;미도리 메이드;01;그건 걱정하지 않으셔도 될 거예요."
1009503-50 = "3;미도리 메이드;99;이미 밀레니엄의 여러 곳에서 전문적인 협찬과 조언을 받았거든요."

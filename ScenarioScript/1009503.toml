[translation]
1009503-1 = "#title;현장학습 시간이에요, 선생님."
1009503-2 = "#na;(약속 시간보다 15분 정도 일찍 도착했다.)"
1009503-3 = "#na;(그렇게 미도리를 기다리고 있으려니…….)"
1009503-4 = "#st;[0,0];instant;1;"
1009503-5 = "#clearST"
1009503-6 = "#wait;2500"
1009503-7 = "3;미도리 메이드;03;안녕하세요, 선생님!\n#3;a\n#3;em;[반짝]"
1009503-8 = "#st;[0,0];instant;1;"
1009503-9 = "#clearST"
1009503-10 = "#wait;1500"
1009503-11 = "[ns] \"미도리? 여기서까지 메이드복인 거야?!\""
1009503-12 = "3;미도리 메이드;11;와! 선생님께서 이번에는 놀라 주셨어요!\n#3;hophop"
1009503-13 = "[s] \"포인트가 거기냐!\""
1009503-14 = "3;미도리 메이드;99;그렇지만 선생님. 이건 당연한 거예요."
1009503-15 = "3;미도리 메이드;01;지금의 저는, 선생님만의 메이드잖아요?"
1009503-16 = "[s] \"그 설정, 이어지고 있는 거였나…….\""
1009503-17 = "3;미도리 메이드;11;물론이죠.\n#3;em;[반짝]\n#3;greeting"
1009503-18 = "[s] \"너무 상큼한 대답에 할 말을 잃을 것 같아!\""
1009503-19 = "3;미도리 메이드;99;어쨌든 저는 선생님만의 메이드이고."
1009503-20 = "3;미도리 메이드;02;고용인의 외출을 수행해야 하는 입장이에요."
1009503-21 = "3;미도리 메이드;99;따라서 그에 어울리는 복장을 하고 오는 것은, 아주 자연스러운 일이라고 할 수 있겠죠.\n#3;em;…"
1009503-22 = "3;미도리 메이드;02;선생님께서도 그렇게 생각하지 않으세요?"
1009503-23 = "[s] \"나는 이제 아무것도 모르겠어…….\""
1009503-24 = "3;미도리 메이드;02;아, 부정하지는 않으시는군요! 동의하신 것으로 알아도 되는 거죠?\n#3;em;[반응]"
1009503-25 = "3;미도리 메이드;99;그리고…… 그러니까 말이죠……."
1009503-26 = "3;미도리 메이드;05;선생님께서도, 드레스 코드를 맞춰 보면 좋을 것 같다고 생각했어요!\n#3;em;[!]"
1009503-27 = "3;미도리 메이드;11;이거야말로 우수한 메이드의 준비성이라고 할 수 있지 않을까요?"
1009503-28 = "[s] \"점점 이야기가 먼 곳으로 가고 있는 것 같은데?!\""
1009503-29 = "3;미도리 메이드;05;괜찮아요. 저만 믿으세요!\n#3;em;[!]"
1009503-30 = "#st;[0,0];instant;1;"
1009503-31 = "#clearST"
1009503-32 = "3;미도리 메이드;05\n#wait;2000\n#3;greeting"
1009503-33 = "3;미도리 메이드;05;아무튼 그런 이유로 선생님께서는 옷을 갈아입어 주셨으면 해요!"
1009503-34 = "3;미도리 메이드;11;자, 자. 여러 가지 가져왔어요. 프록코트와 실크햇 그리고 지팡이도 있고.\n#3;em;[재잘]"
1009503-35 = "3;미도리 메이드;11;버슬 드레스와 깃털 모자, 그리고 양산도 있으니까요!"
1009503-36 = "3;미도리 메이드;03;악세서리가 부족하다면 모노클과 장식용 부채를 비롯해서 정말 많은 것이 준비되어 있답니다?"
1009503-37 = "3;미도리 메이드;11;걱정하지 마시고, 저에게 모든 걸 맡겨 주세요!\n#3;em;[반짝]"
1009503-38 = "[s1] \"어째서인지 커다란 캐리어를 가지고 있더라니!\"\n[s2] \"캐리어의 용도는 그것이었던 건가!\""
1009503-39 = "#wait;100"
1009503-40 = "#wait;100"
1009503-41 = "3;미도리 메이드;02;그럼요. 당연하죠!\n#3;em;[!]"
1009503-42 = "3;미도리 메이드;11;자, 어서 갈아입어 보세요. 선생님을 수행하게 해 주세요!\n#3;greeting"
1009503-43 = "3;미도리 메이드;99;무엇보다 모실 만한 주인을 모시는 것은 메이드의 보람인걸요."
1009503-44 = "3;미도리 메이드;03;저, 선생님이 멋진 옷을 입는 걸 보고 싶어요!\n#3;hophop"
1009503-45 = "3;미도리 메이드;11;메이드이자 일러스트레이터로서의 보람이 될 거예요!"
1009503-46 = "[s3] \"그런데 말이지…… 일단, 우선.\"\n[s4] \"이 옷들, 치수는 맞는 거야?\""

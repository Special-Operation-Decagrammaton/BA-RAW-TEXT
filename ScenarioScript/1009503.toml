1009503-73 = "3;미도리 메이드;07;대단하네요……. 전시관도 복도도 컨셉에 맞춰 구성해 놓은 것 같아요.\n#3;stiff"
1009503-74 = "3;미도리 메이드;07;정말, 여러 가지로 엄청나네요."
1009503-75 = "3;미도리 메이드;02;여기 좀 보세요. 선생님. 드레스의 넉넉한 품과 잘록하게 들어간 허리가 참 대조적이에요.\n#3;m2"
1009503-76 = "3;미도리 메이드;01;저 허리를 유지하거나 만들어내려고, 아주 강력한 보정용 옷을 입었다는데…….\n#3;stiff"
1009503-77 = "3;미도리 메이드;12;상상만 해도 정신이 아찔해지는 것 같네요…….\n#3;em;[속상함]"
1009503-78 = "3;미도리 메이드;99;그리고 또 생각해 보면 말이죠? 저런 옷을 혼자서 입을 수는 없었을 거란 말이에요?\n#3;m3"
1009503-79 = "3;미도리 메이드;01;제가 알고 있는 게 맞다면, 옷을 한 번 제대로 입는 데에도."
1009503-80 = "3;미도리 메이드;12;도와줄 사람이 서너 명은 필요했다고 하던데요…….\n#3;em;[세로선]"
1009503-81 = "[s] \"패션이란, 뭘까…….\""
1009503-82 = "3;미도리 메이드;13;모든 것이죠!\n#3;closeup"
1009503-83 = "[s] \"그 정도야?!\""
1009503-84 = "3;미도리 메이드;07;……생각해 보면 그 정도까지는 아닐지도 모르겠네요…….\n#3;em;…"
1009503-85 = "3;미도리 메이드;10;그, 그렇지만 의식주라고 하잖아요? 그러니까 패션이란, 사람들이 생각하는 것보다도 더욱, 상당히, 중요한 것이지 않을까요?\n#3;stiff"
1009503-86 = "3;미도리 메이드;05;맞아요! 일러스트레이터인 저에게는 특히 더 그래요.\n#3;jump"
1009503-87 = "3;미도리 메이드;99;사람이 어떤 옷을 입느냐는 것은, 자신을 어떤 식으로 드러내려는지와도 연관이 있는 거니까요."
1009503-88 = "3;미도리 메이드;13;그런 의미에서, 선생님도 좀 더 패션에 신경을 쓰셔야 한다고 저는 생각합니다!\n#3;jump\n#3;em;[!]"
1009503-89 = "[s] \"그 충고는 생각해 볼게……?\""
1009503-90 = "3;미도리 메이드;12;생각해 보겠다, 정도가 아니에요. 선생님! 이건 정말로 중요한 문제라구요!\n#3;hophop\n#3;em;[스팀]"
1009503-91 = "3;미도리 메이드;05;안 되겠어요. 지금이라도 당장 캐리어를 되찾아서 옷을 갈아입고 오는 게 어떨까요?"
1009503-92 = "[s] \"진정하자, 미도리. 응?\""
1009503-93 = "3;미도리 메이드;12;역시 안 되나요? 어떻게 해도요?\n#3;stiff"
1009503-94 = "3;미도리 메이드;02;네? 지금 나갔다 들어오면, 결국 입장표를 두 번 사야 하는 결과가 될 거라구요?\n#3;em;[?]"

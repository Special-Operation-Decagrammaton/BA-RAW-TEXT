[translation]
1009503-1 = "現在是實地練習時間，老師"
1009503-2 = "（比約好的時間提早15分鐘左右抵達）"
1009503-3 = "（就在等待綠的時候……）"
1009503-7 = "你好，老師！"
1009503-11 = "[ns]「綠？連來這裡都要穿女僕裝嗎！？」"
1009503-12 = "哇！老師這次有嚇到耶！"
1009503-13 = "[s]「那個應該不是重點吧！」"
1009503-14 = "但是老師，這是理所當然的。"
1009503-15 = "因為現在，我已經是老師的專屬女僕了。"
1009503-16 = "[s]「那個設定還沒結束啊……」"
1009503-17 = "當然囉。"
1009503-18 = "[s]「你回答得太乾脆，反而讓我無話可說！」"
1009503-19 = "總之我是老師的女僕。"
1009503-20 = "現在是陪同僱主外出的場合。"
1009503-21 = "所以穿上合適的服裝再自然不過了。"
1009503-22 = "老師不這麼覺得嗎？"
1009503-23 = "[s]「我已經什麼都搞不清楚了……」"
1009503-24 = "啊，老師沒有否認呢！#n那我就當老師同意了哦？"
1009503-25 = "既然如此……"
1009503-26 = "我認為老師最好也遵守著裝守則！"
1009503-27 = "這也是優秀女僕應該做的準備吧？"
1009503-28 = "[s]「話題好像越扯越遠了耶！？」"
1009503-29 = "別擔心，請相信我！"
1009503-33 = "總之因為這個原因，老師也換套衣服吧！"
1009503-34 = "我帶了很多東西來哦。#n有長外衣、大禮帽和柺杖。"
1009503-35 = "還有流蘇禮服、羽毛帽和陽傘！"
1009503-36 = "如果飾品不夠，還有單片眼鏡和裝飾用扇子，我真的準備了很多東西。"
1009503-37 = "請別擔心，把一切交給我吧！"
1009503-38 = "[s1]「還想說你怎麼帶著這麼大的行李箱！」\n[s2]「原來這就是行李箱的用途嗎！」"
1009503-41 = "那當然囉！"
1009503-42 = "來，快試穿看看吧。我會在一旁協助的！"
1009503-43 = "能陪同值得侍奉的主人，這對女僕來說可是很有意義的事。"
1009503-44 = "我想看老師穿上帥氣的衣服！"
1009503-45 = "這是我身為女僕及插畫家的意義所在！"
1009503-46 = "[s3]「可是……我想先問一個問題。」\n[s4]「這些衣服的尺寸對嗎？」"
1009503-49 = "這點不用擔心。"
1009503-50 = "因為我已經在千年各個地方取得了專業的協助和建議。"
1009503-51 = "而且對方還拜託我務必留下照片給他們參考。"
1009503-52 = "所以，老師？"
1009503-60 = "請你趕快……？"
1009503-62 = "（好不容易才阻止了綠，但他似乎有點不高興，因此花費了不少時間安撫他）"
1009503-63 = "（把行李箱託管後，前往了美術館……）"
1009503-73 = "好厲害……連展示館和走廊都有配合主題。"
1009503-74 = "真的，各方面都好厲害。"
1009503-75 = "請看這裡，老師。#n禮服的寬大胸圍和纖細的腰身形成了強烈的對比。"
1009503-76 = "聽說為了維持或塑造出那種腰身，必須穿上非常緊的塑身衣……"
1009503-77 = "光是想像就讓人頭昏眼花……"
1009503-78 = "而且仔細想想，那種衣服是沒辦法自己穿上的吧？"
1009503-79 = "如果我的調查沒錯，想穿上那種衣服……"
1009503-80 = "至少需要三四個人的幫忙……"
1009503-81 = "[s]「時尚到底是什麼呢……」"
1009503-82 = "是一切！"
1009503-83 = "[s]「這麼誇張！？」"
1009503-84 = "仔細想想好像也沒這麼誇張……"
1009503-85 = "不過有句話叫「衣食住行」，「衣」可是排在「食、住」的前面哦？#n所以時尚是不是比人們所想得……更加重要呢？"
1009503-86 = "沒錯！對身為插畫家的我來說更是如此。"
1009503-87 = "因為這和人穿什麼衣服來表現自己也有關係。"
1009503-88 = "從這個角度來看，我認為老師也該更注重時尚！"
1009503-89 = "[s]「我會好好考慮……？」"
1009503-90 = "不用考慮了啦，老師！這真的是很重要的問題！"
1009503-91 = "不行，現在馬上去把行李箱拿回來，換套衣服再來吧？"
1009503-92 = "[s]「冷靜點，綠。好嗎？」"
1009503-93 = "還是不行嗎？怎麼樣都不行嗎？"
1009503-94 = "咦？如果現在出去就必須買兩次門票？"
1009503-95 = "這麼說也沒錯……"
1009503-99 = "話說回來，古典服飾的形式或設計……"
1009503-100 = "雖然和女僕裝微妙地相似，但似乎也有不一樣的地方。"
1009503-101 = "比方說這裡的巾帽、裙式禮服和蝴蝶結之類的。"
1009503-102 = "[s]「聽你這麼一說，好像是耶。」"
1009503-103 = "我們再逛一下吧，老師。"
1009503-104 = "感覺在這裡能得到更多靈感！"
1009503-113 = "（結果被綠拉著，把整個展場走了一圈）"
1009503-114 = "（參觀完之後，不知不覺間已經到了晚上）"
1009503-117 = "今天很謝謝你，老師。#n謝謝你介紹我來這場展覽。"
1009503-118 = "還有最重要的是，今天的……"
1009503-119 = "約會……非常開心。"
1009503-120 = "[ns]「嗯？最後一句話我沒聽清楚。」"
1009503-124 = "沒，沒有啦，沒什麼！"
1009503-125 = "先，先不說這個了，我們趕快回去吧！我會盡忠職守到最後的！"
1009503-126 = "[s]「嗯，謝謝你。」"
1009503-130 = "不過，老師。"
1009503-137 = "這套衣服你能不能穿一次看看……？"
1009503-138 = "[s]「拜託放過我吧……」"
1009503-139 = "老師～"
1009503-141 = "（之後和貼得特別近的綠，一起踏上了夜晚的歸路……）"

[translation]
1000802-1 = "สาวใช้กับการทำความสะอาดในตอนเช้า"
1000802-2 = "ถนนชานเมือง มิลเลเนียม"
1000802-3 = "ฮ้าววววว..."
1000802-4 = "...ตื่นสายอีกแล้ว แย่จริงๆ"
1000802-5 = "หวุดหวิดเลยแฮะ ถ้าไม่รีบก็คงสายแน่ๆ"
1000802-6 = "ถ้าวิ่งไปตอนนี้... หืม?"
1000802-7 = "ให้ตาย..."
1000802-8 = "ฝีมือใครกันเนี่ย"
1000802-9 = "ถนนเละเทะหมดเลย... ใครขี่จักรยานชนถังขยะรึไงนะ?"
1000802-10 = "....."
1000802-11 = "เฮ้อ ช่วยไม่ได้นะ"
1000802-13 = "(เก็บกวาดพื้นถนน)"
1000802-15 = "...ค่อยสะอาดขึ้นมาหน่อย"
1000802-16 = "ให้ตาย... น่าหงุดหงิดจริงๆ"
1000802-17 = "แบบนี้คงต้องไปตรวจสอบกล้องวงจรปิดแล้วหาตัวคนร้ายมาสั่งสอนให้หลาบจำสักหน่อยแล้ว"
1000802-19 = "อ๊ะ? อะไรกัน? กระป๋องนี่..."
1000802-20 = "ฉันเตะลงถังขยะได้สบายๆ อยู่แล้ว..."
1000802-22 = "(แคร็ง!)"
1000802-23 = "เอ๊ะ? พลาดแฮะ"
1000802-24 = "คิกคิก สนุกดีจัง!"
1000802-27 = "ดีล่ะ ลองอีกทีแล้วกัน..."
1000802-29 = "(แคร็ง!)"
1000802-30 = "อ๊า~ เกือบแล้วเชียว!"
1000802-31 = "ดีล่ะ! ลองอีกสักตั้งซิ..."
1000802-32 = "[s] \"ว่าไง ทำอะไรอยู่เหรอ?\""
1000802-33 = "ว้ากกกกก! อะ...อะไรเนี่ย?!"
1000802-34 = "หืม? ครูเองเหรอ?! มาทำอะไรที่นี่ล่ะ?!"
1000802-35 = "ดะ...ดูอยู่ตั้งแต่เมื่อไหร่น่ะ?"
1000802-36 = "[s] \"ตั้งแต่พูดว่า <ตื่นสายอีกแล้ว แย่จริงๆ> น่ะ\""
1000802-37 = "ตั้งแต่แรกเลยนี่! บ้าจริงเชียว!"
1000802-38 = "....นี่ครู!#nถ้าเอาเรื่องนี้ไปบอกใครล่ะก็ได้สู่ขิตเร็วๆ นี้แน่!"
1000802-39 = "[s1] \"เล่าเรื่องที่ทำความสะอาดไม่ได้เหรอ?\"\n[s2] \"เล่าเรื่องที่เตะกระป๋องก็ไม่ได้เหรอ?\""
1000802-40 = "เอ๋? ก็ใช่น่ะสิ"
1000802-41 = "เอ๋? ก็ใช่น่ะสิ"
1000802-42 = "ก็เพราะฉันเป็นคนของ C&C..."
1000802-43 = "อืม... คือว่า..."
1000802-44 = "อ่า... อืม... ถ้ามีข่าวลือออกไปว่าหัวหน้าของ C&C มาทำความสะอาดหน้าประตูโรงเรียนแบบนี้ล่ะก็..."
1000802-45 = "ถ้ามีข่าวลือออกไปว่าหัวหน้าของ C&C มาเตะกระป๋องเล่นแบบนี้ล่ะก็..."
1000802-46 = "[s] \"เขินงั้นเหรอ?\""
1000802-47 = "ขะ...เขินอะไรกันเล่า!!"
1000802-48 = "[s] \"งั้นเก็บเป็นความลับระหว่างเราสองคนนะ\""
1000802-49 = "คะ...ความลับเหรอ? \n"
1000802-50 = "อะ...อื้อ ความลับระหว่างเราสองคน\n"
1000802-51 = "ฮ่าฮ่าฮ่า ฟังดูสุดยอดเลยนะ "
1000802-52 = "ครูต้องเก็บเป็นความลับนะ เข้าใจมั้ย? สัญญานะว่าจะรักษาความลับของเราสองคนไว้?"
1000802-53 = "ถ้างั้นฉันจะคอยจับตาดูครูเอาไว้!"
1000802-55 = "(เนรุวิ่งหายเข้าไปด้านในโรงเรียนมิลเลเนียมด้วยสีหน้าสดใส)"

[translation]
1006506-1 = "Kaho's True Business Plan"
1006506-5 = "I arrived at the Yin-Yang Club lounge that Kaho had told me about."
1006506-6 = "[ns] \"So this is the place...\""
1006506-10 = "This...should go here..."
1006506-14 = "And this one...over here..."
1006506-15 = "[s] \"(I hear Kaho. Is she inside?)\""
1006506-23 = "Oh, Sensei. You're here. Welcome."
1006506-24 = "[s] \"Hello, Kaho. What are you up to?\""
1006506-28 = "That's a good question!"
1006506-29 = "Heehee, as I told you, I've been putting up the merchandise for decoration!"
1006506-30 = "The Yin-Yang Club's lounge is usually used for welcoming visitors..."
1006506-35 = "So if I put the new merch we got for advertisement here..."
1006506-36 = "Then the advertisement should be even more effective!"
1006506-37 = "[s] \"Ah... I see. As expected of you, Kaho.\""
1006506-38 = "Oh, so please give me a moment, Sensei."
1006506-39 = "I have no time... I need to put these in the perfect position..."
1006506-40 = "[s] \"I can help you with that, actually.\""
1006506-41 = "Oh... Thank you."
1006506-48 = "I appreciate it."
1006506-50 = "And soon the merchandise organization was done..."
1006506-54 = "So that's all of it, Sensei!"
1006506-57 = "― How is it, Sensei?[wa:1370] "
1006506-60 = "― These round eyes, free of worry,"
1006506-62 = "― and this contemplative expression..."
1006506-65 = "― Really! Isn't it just so cute?![wa:1730] "
1006506-68 = "― Ah... It's a perfect, God-given shape. There's nothing better...[wa:2140] "
1006506-70 = "― I'm grateful to be alive...!"
1006506-73 = "[ns] \"Right. Everything you brought is adorable.\""
1006506-74 = "― Yes, truly![wa:840] "
1006506-76 = "― They're all my cute and precious children.[wa:380] "
1006506-79 = "― A lovable child, a strong child,[wa:760] "
1006506-81 = "― a cool child, and a beautiful child...[wa:510] "
1006506-84 = "― Heehee."
1006506-86 = "― I see them all as if they were Hyakkiyako students.[wa:10] "
1006506-89 = "[ns] \"As Hyakkiyako students...?\""
1006506-90 = "― Because they're all unique,[wa:10] "
1006506-92 = "― conflicts may sometimes arise...[wa:60] "
1006506-95 = "― But I think that goes to show...[wa:540] "
1006506-97 = "― how each student has their shining quirks.[wa:310] "
1006506-100 = "[ns1] \"Right. And of course, Kaho is included.\"\n[ns2] \"Kaho, you're always doing your best, and you're my precious student.\""
1006506-101 = "― S-Sensei...?![wa:580] "
1006506-102 = "― S-Sensei...?![wa:580] "
1006506-104 = "― Uh... To say that, so suddenly...[wa:750] "
1006506-107 = "― Um. Th-Thank...[wa:850] "
1006506-109 = "― thank you, Sensei...[wa:1090] "
1006506-112 = "We spent the rest of our time together, talking and enjoying each other's company."

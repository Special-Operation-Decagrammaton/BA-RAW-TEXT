[translation]
1006506-1 = "กลยุทธ์การค้าแท้จริงของท่านคาโฮะ"
1006506-5 = "(คุณครูมาถึงห้องพักผ่อนชมรมหยินหยางที่คาโฮะเคยเล่าให้ฟัง)"
1006506-6 = "[ns] “ที่นี่สินะ...”"
1006506-10 = "อันนี้... เอามาไว้ทางนี้..."
1006506-14 = "ส่วนอันนี้ ถ้าทำแบบนี้ละก็..."
1006506-15 = "[s] (เสียงคาโฮะนี่นา… อยู่ข้างในนี้หรือเปล่านะ?)"
1006506-23 = "อ๊ะ คุณครูมาแล้วเหรอคะ เชิญเลยค่ะ "
1006506-24 = "[s] “ว่าไง คาโฮะ ทำอะไรอยู่เหรอ?”"
1006506-28 = "ค่ะ! ถามได้ดีเลยค่ะ!"
1006506-29 = "ฮุฮุฮุ ฉันกำลังจัดวางสินค้าที่ซื้อมาอยู่ ตามที่บอกไปก่อนหน้านี้น่ะค่ะ"
1006506-30 = "ห้องของชมรมหยินหยางส่วนใหญ่จะใช้เป็นสถานที่ต้อนรับแขกที่มาเยือน..."
1006506-35 = "ถ้าเกิดว่าเราเอาสินค้าใหม่มาจัดวางตรงนี้ให้สวยๆ ให้ดูน่ามองแล้วละก็..."
1006506-36 = "ฉันคิดว่ามันต้องเป็นผลดีต่อการประชาสัมพันธ์หลายเท่าเลยละค่ะ!"
1006506-37 = "[s] “อ๋อ... สมกับที่เป็นคาโฮะเลยนะ...\""
1006506-38 = "อ๊ะ ถ้างั้นคุณครูช่วยรอสักครู่ก่อนนะคะ"
1006506-39 = "ตอนนี้มีเวลาไม่มากแล้วค่ะ ฉันจะต้องรีบเอาสินค้าทุกอย่างไปจัดวางไว้ในตำแหน่งที่ดีที่สุด..."
1006506-40 = "[s] “ถ้างั้นเดี๋ยวครูช่วยอีกแรงแล้วกัน”"
1006506-41 = "อ่า... ขอบคุณค่ะ"
1006506-48 = "ถึงจะเกรงใจคุณครูอยู่บ้าง... แต่จะขอรับความช่วยเหลือนี้ไว้นะคะ"
1006506-50 = "(จากนั้นคุณครูก็ช่วยคาโฮะนำสินค้าต่างๆ ขึ้นจัดวางบนชั้น)"
1006506-54 = "อ่า เหลือแค่อันนี้ก็เสร็จแล้วละค่ะ! คุณครู"
1006506-57 = "― คุณครู คิดว่ายังไงบ้างคะ?[wa:1090] "
1006506-60 = "― ดวงตากลมโตที่เหมือนมองไปไกลๆ... "
1006506-62 = "― และสีหน้าที่ดูเหมือนกำลังครุ่นคิดอะไรบางอย่าง..."
1006506-65 = "― ใช่ไหมล่ะคะ ดูน่ารักไม่ไหวเลยใช่ไหมล่ะคะ?![wa:1290] "
1006506-68 = "― อ่า ใบหน้าฟ้าประทานแบบนี้ มัน... สุดยอดไปเลย...[wa:2820] "
1006506-70 = "― ดีจริงๆ ที่มีชีวิตอยู่...!"
1006506-73 = "[ns] \"อื้ม ของที่คาโฮะเอามาน่ารักทุกอย่างเลยนะ\""
1006506-74 = "― ค่ะ น่ารักจริงๆ ด้วยค่ะ[wa:360] "
1006506-76 = "― ทุกคนเป็นเด็กน่ารัก น่าทะนุถนอมจริงๆ ค่ะ[wa:460] "
1006506-79 = "― เด็กที่ดูน่ารัก เด็กเท่ๆ...[wa:960] "
1006506-81 = "― เด็กคูลๆ เด็กผู้งดงาม...[wa:1070] "
1006506-84 = "― ฮุฮุ..."
1006506-86 = "― เด็กๆ พวกนี้เหมือนกับนักเรียนของเฮียกคิยาโคเลยค่ะ[wa:10] "
1006506-89 = "[ns] \"คาโฮะ... ที่บอกว่านักเรียนเฮียกคิยาโคน่ะ...\""
1006506-90 = "― ถึงพวกเธอจะทะเลาะกันบ้าง[wa:10] "
1006506-92 = "― เพราะทุกคนมีความแตกต่างกัน...[wa:180] "
1006506-95 = "― แต่ฉันคิดว่าทุกคนก็เป็นเด็กนักเรียนคนสำคัญ[wa:140] "
1006506-97 = "― ที่มีเอกลักษณ์ที่เปล่งประกายเฉพาะตัวค่ะ[wa:430] "
1006506-100 = "[ns1] \"ใช่แล้ว แน่นอนว่ารวมถึงคาโฮะด้วยนะ\"\n[ns2] \"คาโฮะที่พยายามอยู่เสมอก็เป็นนักเรียนคนสำคัญของครูนะ\""
1006506-101 = "― คะ... คุณครู...?![wa:420] "
1006506-102 = "― คะ... คุณครู...?![wa:420] "
1006506-104 = "― ทะ... ทำไมจู่ๆ ถึงพูดอะไรแบบนั้นคะ...[wa:590] "
1006506-107 = "― ขะ... ขอบคุณ...[wa:850] "
1006506-109 = "― ขอบคุณค่ะ... คุณครู...[wa:1010] "
1006506-112 = "(หลังจากนั้นคุณครูก็ใช้เวลาพูดคุยกับคาโฮะต่ออย่างสนุกสนาน)"

[translation]
1006506-1 = "佳穗同學計畫性的營業戰略"
1006506-5 = "（來到了佳穗所說的陰陽部部室）"
1006506-6 = "[ns]「見面的地方應該是這裡沒錯……」"
1006506-10 = "這個……放這邊……"
1006506-14 = "然後再把這個……"
1006506-15 = "[s] （是佳穗的聲音……在裡面嗎？）"
1006506-23 = "啊，老師。您來了啊。"
1006506-24 = "[s]「讓你久等了，佳穗。你在做什麼？」"
1006506-28 = "您問的真好……！"
1006506-29 = "呵呵，我正在擺飾先前跟您說的周邊！"
1006506-30 = "陰陽部的部室是用來接待訪客的地方……"
1006506-35 = "在這裡用宣傳的商品來裝飾的話……"
1006506-36 = "宣傳效果肯定會很不錯！"
1006506-37 = "[s]「說的也是，真有佳穗的風格呢。」"
1006506-38 = "所以還請您稍等一會，老師。"
1006506-39 = "放在更能，照到陽光的位置……要擺得整整齊齊……！"
1006506-40 = "[s]「我也可以幫忙嗎？」"
1006506-41 = "啊……謝謝您。"
1006506-48 = "那麼，就麻煩您了。"
1006506-50 = "（於是和佳穗一起整理完周邊……）"
1006506-54 = "這樣就完成了呢，老師。"
1006506-57 = "― 老師，您覺得如何呢？[wa:1690] "
1006506-60 = "― 這純真又圓滾滾的眼珠……"
1006506-62 = "― 深思熟慮的表情……"
1006506-65 = "― 不覺得，真的超級可愛的嗎！？[wa:2410] "
1006506-68 = "― 哈啊，這上天賜與的造型……真是棒極了……[wa:3900] "
1006506-70 = "― 活著真是太美好了……！"
1006506-73 = "[ns]「每個都真的很可愛呢。」"
1006506-74 = "― 沒錯。大家真的，[wa:960] "
1006506-76 = "― 都是可愛又重要的孩子。[wa:1620] "
1006506-79 = "― 討人喜歡的孩子、帥氣的孩子、[wa:1480] "
1006506-81 = "― 酷酷的孩子、漂亮的孩子……[wa:1510] "
1006506-84 = "― 呵呵……"
1006506-86 = "― 簡直就像百鬼夜行的學生一樣呢。[wa:1180] "
1006506-89 = "[ns]「怎麼說呢……？」"
1006506-90 = "― 正因為大家各不相同，[wa:190] "
1006506-92 = "― 有時會互相衝突……[wa:980] "
1006506-95 = "― 不過大家都是有著閃亮個性的，[wa:1260] "
1006506-97 = "― 重要學生。我是這麼想的。[wa:1510] "
1006506-100 = "[ns1]「你說的對……當然，其中也包含佳穗哦。」\n[ns2]「總是非常努力的佳穗，對我來說也是重要的學生哦。」"
1006506-101 = "― 老，老師……！？[wa:780] "
1006506-102 = "― 老，老師……！？[wa:780] "
1006506-104 = "― 嗚……突然說那種……[wa:1670] "
1006506-107 = "― 非……非常……謝……[wa:1050] "
1006506-109 = "― 謝您……老師……[wa:1570] "
1006506-112 = "（就這樣和佳穗共度了愉快的時光）"

[translation]
80000125-1 = "Presentation"
80000125-2 = "Well, Sensei. What was Valentine's Day in the first place?"
80000125-3 = "[s] \"You're asking in past tense... How profound...\""
80000125-4 = "I believe it is true that it began as a holiday of celebration."
80000125-5 = "It was a day that originated from the combination of tales of at least three religious saints."
80000125-6 = "There's also an ancient lyric poem that states that February 14th is the day all birds fly to search for their mates."
80000125-7 = "But nowadays, its meaning has deteriorated to business schemes from pastry companies."
80000125-8 = "And apparently, it used to be a day when you were socially obligated to give chocolates to not only your significant other, but also family, neighbors, friends, and colleagues. A ploy to increase sales."
80000125-9 = "After all, that would naturally increase the amount of chocolate an individual would purchase by multitudes."
80000125-10 = "Eventually, its meaning and the scope were essentially organized into what it is today."
80000125-11 = "[s] \"I...see?\""
80000125-12 = "Anyways, logically thinking, I never felt the need to celebrate such an intentionally planned holiday. Until now."
80000125-13 = "Since it was irrationality in its truest form."
80000125-14 = "Yes. Highly irrational."
80000125-15 = "[s] \"And?\""
80000125-16 = "And why did I go out of my way to call you to my hideout and discuss this?"
80000125-17 = "..."
80000125-18 = "Lately, I've been reconsidering the things I've dismissed as irrational."
80000125-19 = "I thought that perhaps...I have simply misunderstood their rationale."
80000125-20 = "After all, once existence is established, it inherently holds reason."
80000125-21 = "So I am determined to try the things I previously dismissed, one by one."
80000125-22 = "And I also thought that, in a way, you're also at fault for causing me to think this way."
80000125-23 = "[s] \"So you're going to test it on me first...\""
80000125-24 = "Right. You reap what you sow, Sensei. It's better to think of it that way."
80000125-25 = "I'll continue the previous topic. I've been studying past cases of Valentine's Day."
80000125-26 = "..."
80000125-27 = "And it's a mess. I was not wrong in thinking it the definition of irrationality."
80000125-28 = "There is no consistency at all, nor a significant statistical value."
80000125-29 = "Some subjects say that the chocolate should be handmade."
80000125-30 = "Others insist that an individual could never beat the power of food engineering, so luxurious off-the-shelf products are instead the answer."
80000125-31 = "There are even others who strive to convey an ironic specialness by choosing the most ordinary chocolate they can."
80000125-32 = "I've also heard that you should paint your body with chocolate and tie a ribbon around yourself—"
80000125-33 = "[s] \"Last one's an absolute no!!\""
80000125-34 = "I-Is that so? I see..."
80000125-35 = "Anyways, what I deducted from my studies is that this holiday is an absolute mess with no standardization whatsoever."
80000125-36 = "So I tried to come to a reasonable conclusion that I could accept."
80000125-37 = "First, I decided to put luxurious off-the-shelf products out of the question. In the end, they're pre-made, and there are some areas where making compromises are inevitable."
80000125-38 = "But at the same time, I do admit that it's difficult for an individual to compete with the results of commercialized food engineering."
80000125-39 = "So, I decided upon the following approach."
80000125-40 = "Chocolate is a food product made by combining cocoa mass, dairy products, sugar, and other spices that companies keep secret."
80000125-41 = "Of course, the ingredient that plays the biggest role in chocolate's quality is cacao itself."
80000125-42 = "With that in mind, I first prepared cacao beans of the Criollo variety, which takes up about 5% of total production."
80000125-43 = "With the fermenting, roasting, grinding, pressing, mixing, and coagulating process... I deduced the recipe by reverse engineering the majority of the luxurious chocolates on the market."
80000125-44 = "Then I completed it by integrating the overall process with the \"Chocolate Avant Guard\" that I designed and manufactured myself."
80000125-45 = "And the shape of the chocolate is another thing that I believe to be important..."
80000125-46 = "..."
80000125-47 = "I thought I should express something about myself with that part."
80000125-48 = "Something that allowed me to be who I am now..."
80000125-49 = "And in a way, what it would mean to hand you something that expresses and describes me."
80000125-50 = "And this...is the result of that labor."
80000125-55 = "[ns] \"Isn't this the Millennium emblem...?\""
80000125-56 = "Correct."
80000125-57 = "I'm sure I wouldn't be who I am now without Millennium Science School."
80000125-58 = "I gave much thought on how I would be as a person, had I enrolled in another academy."
80000125-59 = "Gehenna, Trinity, Hyakkiyako, Red Winter, Shanhaijing, Highlander, Wildhunt, Odyssey, and countless other academies..."
80000125-60 = "I'm sure there is a version of me as a student in each and every academy."
80000125-61 = "But if it wasn't for Millennium Science School, the Tsukatsuki Rio of right now would not be here."
80000125-62 = "So this...in a way, this is the me of right now."
80000125-63 = "I thought that if I presented you with chocolate, it shouldn't be in any other form than this."
80000125-64 = "It was my rational choice after deriving every variable and possibility logically."
80000125-65 = "..."
80000125-66 = "It's strange..."
80000125-67 = "[s]\"What is?\""
80000125-68 = "I was sure I produced a logical result with rational decisions..."
80000125-69 = "Although I'm the one who came up with the chocolate production process, I left it fully to \"Chocolate Avant Guard\"..."
80000125-70 = "[s] \"And?\""
80000125-71 = "Sensei. If every part of the process involved logic and rationality...meaning, if emotion was completely left out..."
80000125-72 = "...then there shouldn't be any room for any emotion, right?"
80000125-73 = "[s] \"I guess...that's one way of looking at it?\""
80000125-74 = "Yes. Right. However..."
80000125-75 = "..."
80000125-76 = "Somehow, right now, I..."
80000125-77 = "I'm very embarrassed."
80000125-78 = "Isn't it strange, Sensei?"
80000125-79 = "No matter how many times I reviewed it, I created the process without leaving any room for that particular element. Yet that element ended up taking up the place of the finished product."
80000125-80 = "Isn't this...making something out of nothing?"
80000125-81 = "If this was something that happened inside a particle accelerator, I could understand it."
80000125-82 = "But making chocolate...is an event that happens in the tangible realm, no matter how you look at it. No?"
80000125-83 = "Could I have missed something again...?"
80000125-84 = "[s1] \"I'm sure that wasn't the case.\"\n[s2] \"Regardless, I'm grateful for your feelings, Rio.\""
80000125-87 = "...!"
80000125-88 = "What did you do to me, Sensei?!"
80000125-89 = "Hearing that made me feel twice as...no, ten times more embarrassed...!"
80000125-90 = "Just what kind of person am I to you?!"
80000125-91 = "[s3] \"Now, now. Calm down...\"\n[s4] \"Once again, thank you, Rio. I appreciate the chocolate.\""
80000125-94 = "U-Ugh...!"
80000125-95 = "..."
80000125-96 = "F-Fine. If that's what you think..."
80000125-97 = "..."
80000125-98 = "Thank you as well, Sensei."

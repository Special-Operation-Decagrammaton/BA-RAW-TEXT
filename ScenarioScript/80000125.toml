[translation]
80000125-1 = "簡報"
80000125-2 = "那個，老師。#n你知道情人節最初的模樣嗎？"
80000125-3 = "[s]「特別用『最初』這個詞……有點耐人尋味呢……」"
80000125-4 = "基本上，這天確實是個節日。"
80000125-5 = "是由至少三位宗教聖人的傳說混合而成……"
80000125-6 = "在古典的抒情詩中，也記載著2月14日是所有鳥兒飛來尋找伴侶的日子。"
80000125-7 = "不過時至今日，這天所代表的意義已經被糖果公司的商業手段所扭曲。"
80000125-8 = "甚至為了促進銷量──#n將送巧克力的對象由特別的人拓展到了家人、鄰居、朋友和同事。"
80000125-9 = "藉此讓每個人需要購買的巧克力數量成倍增加。"
80000125-10 = "最終這個節日所代表的意義和規模，便漸漸演化成了現在的模樣。"
80000125-11 = "[s]「原來如此？」"
80000125-12 = "從理性的角度來看，我始終認為沒有必要慶祝這種刻意策劃的節日。"
80000125-13 = "因為這完全是不合理的。"
80000125-14 = "沒錯，這並不合理。"
80000125-15 = "[s]「不過……？」"
80000125-16 = "不過我又是為何特地請老師到藏身處說這些──你想問的是這個對吧？"
80000125-17 = "……"
80000125-18 = "最近我開始思考，在那些曾因不合理而忽視的事物當中……"
80000125-19 = "我……是否錯過了某些潛藏的合理性。"
80000125-20 = "畢竟所有存在既然成立……必然帶有相應的理由。"
80000125-21 = "所以我決定一一嘗試那些曾被我忽略的東西。"
80000125-22 = "並且我認為自己之所以會產生這種想法，某方面來說也跟老師有關。"
80000125-23 = "[s]「所以你想先從我開始嘗試嗎……」"
80000125-24 = "沒錯，這都是老師自作自受……這麼想的話應該比較能釋懷吧。"
80000125-25 = "回到剛才的話題──#n後來我透過其他人研究了情人節的資料……"
80000125-26 = "……"
80000125-27 = "只能說是一團混亂，簡直是不合理的化身。"
80000125-28 = "除了缺乏一致性之外，也無法得出在統計上有意義的數據。"
80000125-29 = "有人認為必須親手製作巧克力──"
80000125-30 = "也有人認為手工巧克力比不上食品工程的結晶，不如直接買高級的成品──"
80000125-31 = "還有人認為普通的巧克力反而能傳達特殊的意義──"
80000125-32 = "甚至有人認為應該把巧克力塗在身上，然後綁上絲帶送出去──"
80000125-33 = "[s]「最後一個完全沒有參考價值吧！？」"
80000125-34 = "是，是嗎？#n原來如此……"
80000125-35 = "總之我已經理解，這個節日至今依然處於混沌不明的狀態。"
80000125-36 = "因此我試著歸納出了一個具備合理性，同時自己也能接受的結論。"
80000125-37 = "首先，我並不考慮購買高級成品的方案。#n畢竟凡是量產的成品，勢必會在某些方面存在妥協之處。"
80000125-38 = "不過與此同時，我也必須承認個人很難與企業化的食品工程成果抗衡。"
80000125-39 = "所以，我決定這麼做──"
80000125-40 = "巧克力基本上是由可可塊、可可脂、乳製品、糖，以及各企業祕藏的香料混合而成。"
80000125-41 = "而決定巧克力品質的關鍵，就在於可可本身。"
80000125-42 = "基於這點，我準備了僅占總產量約5%的Criollo可可豆。"
80000125-43 = "至於發酵、烘焙、研磨、壓縮、混合、凝固等等製作流程，#n則是在對市售的大部分高級巧克力進行逆向工程之後……"
80000125-44 = "使用我自己設計和製作的「前衛君Type.Chocolatier」完整重現。"
80000125-45 = "除此之外至關重要的一點，就在於巧克力的形狀……"
80000125-46 = "……"
80000125-47 = "我認為應該容入能代表自己的元素才對。"
80000125-48 = "究竟是什麼形塑了現在的自己……"
80000125-49 = "將象徵著自己的東西送給老師……又意味著什麼。"
80000125-50 = "而這……就是我思考之後的成果。"
80000125-55 = "[ns]「這是千年的校徽……？」"
80000125-56 = "沒錯。"
80000125-57 = "如果沒有千年科學學園，就不會有現在的我。"
80000125-58 = "這方面的可能性，我也思考了很多。#n假如當時進了其他學園的話……現在的我會是什麼樣子。"
80000125-59 = "格黑娜、三一、百鬼夜行、赤冬、山海經、高地人、狂獵、奧德賽……#n以及除此之外的眾多學園……"
80000125-60 = "想必都會依照各自的特色，塑造出截然不同的我吧。"
80000125-61 = "然而現在的調月莉央，是因為千年科學學園才得以存在。"
80000125-62 = "所以這個巧克力……某種意義上來說，就代表了現在的我。"
80000125-63 = "因此如果要送巧克力給老師的話……這個形狀就是唯一的選擇。"
80000125-64 = "這是我充分考量所有變數和可能性之後……做出的理性決定。"
80000125-65 = "……"
80000125-66 = "這是，怎麼回事……？"
80000125-67 = "[s]「嗯？」"
80000125-68 = "我明明做了理性的決定，也得出了合理的結果……"
80000125-69 = "雖然巧克力的製作交給了「前衛君Type.Chocolatier」，但那也是我親自設計的……"
80000125-70 = "[s]「所以……？」"
80000125-71 = "老師，如果所有過程都符合理性，也就是排除了感情成分的話……"
80000125-72 = "那麼結果之中也不應該存在感情，對吧？"
80000125-73 = "[s]「邏輯上……是這樣沒錯吧？」"
80000125-74 = "嗯，我原本也是這麼想的。#n但是……"
80000125-75 = "……"
80000125-76 = "在此時此刻……"
80000125-77 = "……我卻感到非常害羞。"
80000125-78 = "這不是很奇怪嗎，老師？"
80000125-79 = "我明明在過程中徹底排除了感情存在的空間──成果卻依然帶有感情的成分。"
80000125-80 = "簡直……就像憑空出現了一樣。"
80000125-81 = "如果這個現象發生在粒子加速器的碰撞過程之中，我倒還能接受……"
80000125-82 = "但是製作巧克力……怎麼看都是宏觀世界的事件吧？"
80000125-83 = "我是不是……又在不知不覺間遺漏了什麼呢？"
80000125-84 = "[s1]「沒有這回事。」\n[s2]「此時此刻的我，也很感謝莉央的心意哦。」"
80000125-87 = "……！"
80000125-88 = "老師對我做了什麼！？"
80000125-89 = "聽完老師的話後，害羞程度比之前翻了一倍……不，是翻了十倍……？"
80000125-90 = "你對我來說究竟是什麼樣的人！？"
80000125-91 = "[s3]「來來來，你先冷靜……」\n[s4]「再次感謝你，莉央。巧克力我會好好享用的。」"
80000125-94 = "唔，唔嗯……！"
80000125-95 = "……"
80000125-96 = "我，我知道了。#n如果你這麼認為的話……"
80000125-97 = "……"
80000125-98 = "我也很謝謝你，老師。"

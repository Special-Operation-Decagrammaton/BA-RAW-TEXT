[translation]
80000125-1 = "การนำเสนอ"
80000125-2 = "นี่... ครู เคยคิดมั้ยว่าวันวาเลนไทน์คืออะไร?"
80000125-3 = "[s] \"ถามด้วยรูปประโยคอดีตงั้นเหรอ... ฟังดูเหมือนมีนัยยะอะไรเลยแฮะ\" "
80000125-4 = "ถ้าตามประวัติศาสตร์แล้ว มันเคยเป็นวันที่ต้องสรรเสริญจริงๆ"
80000125-5 = "มีเรื่องเล่าของนักบุญคริสเตียน 3 คนที่ถูกหลอมรวมให้เป็นตำนานในวันนี้"
80000125-6 = "บางเรื่องเล่าบอกว่าวันที่ 14 กุมภาพันธ์ เป็นวันที่นกทุกตัวจะออกบินเพื่อตามหาคู่ของตัวเอง"
80000125-7 = "แต่ปัจจุบัน... วันวาเลนไทน์กลายเป็นวันแห่งกลยุทธ์การตลาดของบริษัทขนมหวานไปเสียแล้ว"
80000125-8 = "ไม่ใช่แค่มอบให้คนรักเท่านั้น แต่เป็นวันที่เราจะต้องให้ช็อกโกแลตเป็นของขวัญกับบุคคลพิเศษทุกคน รวมถึงคนรอบข้าง ไม่ว่าจะเป็นครอบครัว เพื่อนบ้าน เพื่อน และเพื่อนร่วมงานด้วย"
80000125-9 = "เพราะแบบนั้นเลยทำให้จำนวนช็อกโกแลตที่คนคนหนึ่งจะต้องซื้อเพิ่มขึ้นอีกหลายเท่าตัวเลยน่ะ"
80000125-10 = "และในที่สุด ความหมายของวันวาเลนไทน์ก็กลายเป็นอย่างที่เราเห็นในทุกวันนี้"
80000125-11 = "[s] \"แบบนี้นี่เอง...\""
80000125-12 = "เพราะงั้นถ้าพูดกันตามหลักเหตุผลแล้ว ฉันไม่คิดว่าควรเฉลิมฉลองวันหยุดที่ถูกวางแผนไว้ล่วงหน้า#nอย่างจงใจแบบนี้เลย"
80000125-13 = "เพราะมันเป็นสิ่งที่ไม่มีเหตุผลเอาซะเลย"
80000125-14 = "อื้อ เพราะมันไม่มีเหตุผลจริงๆ"
80000125-15 = "[s] \"แล้วยังไงต่อนะ...?\""
80000125-16 = "สงสัยใช่มั้ยว่าทำไมฉันถึงเรียกครูมาที่ซ่อนตัวเพื่อเล่าเรื่องพวกนี้ให้ฟัง?"
80000125-17 = "......"
80000125-18 = "ช่วงนี้สิ่งที่ฉันเคยมองว่าไม่สมเหตุสมผลชอบวนกลับมาทำให้ฉันตั้งคำถามใหม่น่ะ"
80000125-19 = "ฉันเริ่มสงสัยว่า... หรือบางทีฉันอาจจะมองข้ามความสมเหตุสมผลบางอย่างที่แฝงอยู่ไปน่ะ"
80000125-20 = "เพราะทุกสิ่งทุกอย่างที่เกิดขึ้นและดำรงอยู่... ย่อมมีเหตุผลในตัวของมัน"
80000125-21 = "เพราะงั้น ฉันเลยตัดสินใจว่าจะลองทำสิ่งที่เคยมองพลาดไปทีละอย่างดู"
80000125-22 = "และคนที่ทำให้ฉันเริ่มมีความคิดแบบนี้ ก็ไม่ใช่ใครอื่น แต่เป็นครูนั่นละ"
80000125-23 = "[s] \"เพราะงั้นครูเลยต้องกลายเป็นหนูทดลองคนแรกสินะ...\""
80000125-24 = "ใช่แล้ว นี่แหละที่เรียกว่ากรรมตามสนองยังไงล่ะ คิดซะว่าแบบนั้นก็แล้วกันนะ"
80000125-25 = "ฉันจะพูดเข้าเรื่องเลยก็แล้วกัน พอคิดได้แบบนั้น ฉันก็เลยลองศึกษาดูว่าคนอื่นๆ ให้นิยามความหมาย#nวันวาเลนไทน์กันว่ายังไง"
80000125-26 = "......"
80000125-27 = "ผลลัพธ์ก็คือมันผสมปนเปกันไปหมดเลย ทุกอย่างมันไม่สมเหตุสมผลอะไรเลย"
80000125-28 = "ข้อมูลไม่มีความสอดคล้องกัน และไม่สามารถวิเคราะห์เชิงสถิติได้ด้วยซ้ำ"
80000125-29 = "บางคนบอกว่าต้องทำช็อกโกแลตและมอบด้วยตัวเองเท่านั้น"
80000125-30 = "บางคนกลับบอกว่าช็อกโกแลตทำเองสู้ช็อกโกแลตที่ใช้เทคโนโลยีการทำอาหารสมัยใหม่ไม่ได้ เพราะงั้นให้ซื้อผลิตภัณฑ์สำเร็จรูปคุณภาพสูง ราคาแพงหน่อยจะดีกว่า"
80000125-31 = "บางคนบอกว่าช็อกโกแลตธรรมดา เรียบง่ายนี่แหละที่ถ่ายทอดความพิเศษได้ดีที่สุด"
80000125-32 = "บางคนถึงขั้น... เอาช็อกโกแลตมาทาบนตัวแล้วห่อเป็นของขวัญไปให้คนที่อยากมอบให้เลย..."
80000125-33 = "[s] \"ข้อสุดท้ายนั่นไม่ได้เด็ดขาดเลยนะ!\""
80000125-34 = "งะ... งั้นเหรอ? อย่างนี้นี่เอง"
80000125-35 = "ยังไงก็เถอะ สิ่งที่ฉันแน่ใจก็คือ... คำนิยามของวันวาเลนไทน์ได้หลุดกรอบและกลายเป็นเรื่องวุ่นวาย#nไปแล้วในปัจจุบัน"
80000125-36 = "เพราะงั้นฉันเลยตั้งใจจะหาข้อสรุปที่สมเหตุสมผลและยอมรับได้"
80000125-37 = "อย่างแรก ฉันตัดตัวเลือกการซื้อผลิตภัณฑ์ราคาแพงออกไป เพราะยังไงผลิตภัณฑ์สำเร็จรูปก็ยังคง#nเป็นผลิตภัณฑ์สำเร็จรูปอยู่ดี"
80000125-38 = "ในขณะเดียวกัน ฉันก็ยอมรับว่าการที่คนทั่วไปจะทำผลิตภัณฑ์ออกมาให้ดีกว่าบริษัทใหญ่ๆ ที่เชี่ยวชาญด้านอาหาร มันไม่ใช่เรื่องง่ายๆ เลย"
80000125-39 = "เพราะงั้น ฉันก็เลยตัดสินใจที่จะเริ่มด้วยวิธีนี้"
80000125-40 = "ช็อกโกแลตเป็นอาหารที่ทำจากการผสมโกโก้ เนยโกโก้ น้ำตาล นม และวัตถุดิบลับตามสูตรของ#nแต่ละบริษัท"
80000125-41 = "และในบรรดาส่วนผสมทั้งหมด หัวใจสำคัญที่สุดก็คือเมล็ดโกโก้"
80000125-42 = "เพราะงั้นฉันเลยเริ่มจากการเลือกเมล็ดโกโก้พันธุ์ Criollo ที่มีอยู่เพียงประมาณ 5% ของผลผลิตรวม#nจากทั่วโลก"
80000125-43 = "แล้วศึกษากระบวนการหมัก คั่ว บด ผสม การกลั่น และการขึ้นรูป... หลังจากวิเคราะห์ช็อกโกแลต#nพรีเมียมส่วนใหญ่ที่วางขายตามท้องตลาดแล้ว"
80000125-44 = "ฉันก็ใช้ <หุ่นรบล้ำยุคช็อกโกแลต> อุปกรณ์ล้ำยุคที่ฉันออกแบบเองที่มันสามารถควบคุมทุกขั้นตอน#nได้อย่างแม่นยำที่สุด"
80000125-45 = "และอีกหนึ่งสิ่งที่สำคัญไม่แพ้รสชาติก็คือรูปลักษณ์ของมัน..."
80000125-46 = "......"
80000125-47 = "นอกจากนี้ ฉันคิดว่าถ้าจะให้ของขวัญกับครู มันก็ควรจะเป็นสิ่งที่แสดงถึงตัวตนของฉันด้วย"
80000125-48 = "อะไรที่ทำให้ฉันกลายเป็น 'ตัวฉันในวันนี้'..."
80000125-49 = "และหากจะมอบ 'ตัวฉัน' ให้ใครสักคน จะเลือกสื่อออกมาในรูปแบบและสื่อความหมายแบบไหน"
80000125-50 = "และสิ่งที่ฉันทำขึ้นมาก็คือ... นี่ไงล่ะ"
80000125-55 = "[ns] \"นี่สัญลักษณ์ของมิลเลเนียมนี่นา...?\""
80000125-56 = "ใช่แล้ว"
80000125-57 = "ถ้าไม่มีโรงเรียนวิทย์มิลเลเนียม ก็คงไม่มีตัวฉันในวันนี้"
80000125-58 = "ฉันลองคิดทบทวนดูแล้ว และเคยจินตนาการว่าจะเป็นยังไงถ้าฉันไปเรียนที่สถาบันอื่น"
80000125-59 = "ถ้าไปอยู่ที่เกเฮนน่า ทรีนิตี้ เฮียกคิยาโค เรดวินเทอร์ ซานไห่จิง ไฮแลนเดอร์ ไวลด์ฮัน โอดิสซีย์ หรือโรงเรียนอื่นๆ ในคิโวทอส..."
80000125-60 = "ฉันคงกลายเป็นนักเรียนที่ดีตามแบบฉบับของโรงเรียนนั้นๆ"
80000125-61 = "แต่อย่างน้อยก็คงจะไม่มี สึคัตสึกิ ริโอะคนนี้ ถ้าไม่มีโรงเรียนวิทย์มิลเลเนียม"
80000125-62 = "เพราะงั้นสิ่งนี้... ในอีกความหมายหนึ่ง มันก็คือ 'ตัวฉัน'"
80000125-63 = "ฉันเลยคิดว่าถ้าจะมอบช็อกโกแลตให้คุณครู คงไม่มีอะไรเหมาะไปกว่ารูปแบบนี้อีกแล้วละ"
80000125-64 = "มันเป็นผลลัพธ์จากการตัดสินใจที่สมเหตุสมผลโดยพิจารณาตัวแปรและความเป็นไปได้ทั้งหมดแล้วน่ะ"
80000125-65 = "......"
80000125-66 = "แปลกจังเลยนะ...?"
80000125-67 = "[s] \"แปลกยังไงเหรอ?\""
80000125-68 = "ทั้งที่เป็นผลลัพธ์จากการตัดสินใจอย่างสมเหตุสมผลแล้วแท้ๆ..."
80000125-69 = "แม้แต่กระบวนการผลิตช็อกโกแลตก็ควบคุมด้วย <หุ่นรบล้ำยุคช็อกโกแลต> ที่ฉันสร้างขึ้นเอง..."
80000125-70 = "[s] \"แล้วยังไงต่อนะ...?\""
80000125-71 = "ครู ถ้าในทุกขั้นตอนล้วนผ่านกระบวนการคิดอย่างสมเหตุสมผลและปราศจากอารมณ์ใดๆ แล้วละก็"
80000125-72 = "มันก็ไม่ควรจะมีที่ว่างสำหรับใส่อารมณ์ใดๆ ลงไปใช่มั้ยล่ะ?"
80000125-73 = "[s] \"ก็อาจจะเป็นแบบนั้น... ก็ได้นะ?\""
80000125-74 = "อืม ฉันก็คิดแบบนั้นนะ แต่ว่า..."
80000125-75 = "......"
80000125-76 = "ในเวลานี้ฉัน... รู้สึก..."
80000125-77 = "เขินสุดๆ เลย..."
80000125-78 = "มันแปลกใช่มั้ยล่ะ ครู?"
80000125-79 = "ทั้งที่ตรวจสอบอย่างละเอียดจนไม่มีพื้นที่ว่างให้กับองค์ประกอบแบบนั้นแล้ว แต่สุดท้าย 'อารมณ์' ก็กลับปรากฏรวมอยู่ในผลลัพธ์อยู่ดี"
80000125-80 = "มันเหมือนกับว่า... มีบางอย่างเกิดขึ้นจากความว่างเปล่าเลย?"
80000125-81 = "ถ้านี่เป็นปรากฏการณ์ที่เกิดขึ้นในเครื่องเร่งอนุภาค ก็คงจะพอเข้าใจได้บ้าง แต่ว่า..."
80000125-82 = "การทำช็อกโกแลต... มันเป็นกระบวนการที่เกิดขึ้นในความเป็นจริงนะ"
80000125-83 = "ฉันพลาดอะไรไปโดยไม่รู้ตัวอีกแล้วรึเปล่า...?"
80000125-84 = "[s1] \"ไม่ใช่หรอก\"\n[s2] \"ยังไงก็เถอะ ครูขอบคุณในสิ่งที่ริโอะทำให้นะ\""
80000125-87 = "...!"
80000125-88 = "ทำอะไรน่ะ ครู?!"
80000125-89 = "พอได้ยินครูพูดเมื่อกี้... ตอนนี้ฉันยิ่งเขินขึ้นเป็นสองเท่า ไม่สิ... สิบเท่าเลยนะ...?"
80000125-90 = "คุณเป็นใครกันแน่ ทำไมถึงทำให้ฉันเป็นแบบนี้ได้??!!"
80000125-91 = "[s3] \"เอาละๆ ใจเย็นๆ ก่อนนะ...\"\n[s4] \"ยังไงก็ขอบคุณนะริโอะ ครูจะกินช็อกโกแลตให้อร่อยเลย\""
80000125-94 = "อะ... อึก...!"
80000125-95 = "......"
80000125-96 = "ขะ... เข้าใจแล้ว ถ้าครูคิดแบบนั้นละก็..."
80000125-97 = "......"
80000125-98 = "ฉันก็ขอบคุณนะ... ครู"

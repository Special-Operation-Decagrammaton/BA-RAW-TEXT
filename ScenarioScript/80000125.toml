[translation]
80000125-1 = "#title;프레젠테이션"
80000125-2 = "3;리오;02;있잖아, 선생. 애초에 발렌타인 데이란 무엇이었을까?\n#3;em;[반응]\n#3;a"
80000125-3 = "[s] \"과거형으로 묻는 건가……. 의미심장하네…….\""
80000125-4 = "3;리오;99;기본적으로 그날이 축일이었던 것은 맞았던 것 같아.\n#3;em;…"
80000125-5 = "3;리오;01;적어도 세 명의 종교 성인의 전승이 혼합되어 만들어진 날이었지."
80000125-6 = "3;리오;01;2월 14일은 모든 새들이 자신의 짝을 찾으러 날아오는 날이라는, 고전 서정시도 전해지고 있지."
80000125-7 = "3;리오;02;하지만 오늘에 와서는, 결국 제과 회사의 상술로 그 의미가 변질된 날이야."
80000125-8 = "3;리오;99;심지어 초콜릿류의 판매를 촉진하기 위해, 자신에게 특별한 사람뿐만 아니라 주위의 가족 이웃, 친구, 동료들에게 모두에게 초콜릿을 선물하는 날이었다고 해.\n#3;em;…"
80000125-9 = "3;리오;01;그렇게 하면, 한 명이 사야 하는 초콜릿의 양이 몇 배로 늘어날 테니까."
80000125-10 = "3;리오;02;결국 그 의미와 규모가 어느 정도 정리되어서 오늘날에 이르게 된 것이지만."
80000125-11 = "[s] \"그렇, 구나?\""
80000125-12 = "3;리오;01;어쨌든 합리적으로 생각해서, 나는 지금까지 그런 의도적으로 기획된 축일을 기념할 필요는 없다고 여겨 왔어.\n#3;em;[반응]"
80000125-13 = "3;리오;01;그건 말 그대로 비합리적이었으니까."
80000125-14 = "3;리오;07;응. 비합리적이었으니까."
80000125-15 = "[s] \"그런데?\""
80000125-16 = "3;리오;02;그런데 왜 굳이 선생을 은신처까지 불러서, 이런 이야기를 하고 있는 거냐고?\n#3;em;[?]"
80000125-17 = "3;리오;04;……."
80000125-18 = "3;리오;99;최근, 내가 비합리적이라고 신경 쓰지 않았던 부분들에게서."
80000125-19 = "3;리오;99;내가…… 어떤 감추어진 합리성을 놓치고 있었던 게 아닐까, 하는 생각이 들었어.\n#3;em;…"
80000125-20 = "3;리오;01;모든 존재는 성립된 순간…… 나름의 이유를 품게 되기 마련이니까."
80000125-21 = "3;리오;02;그래서 일단, 내가 놓쳐 왔던 것을 하나씩 시도해 보기로 한 거야."
80000125-22 = "3;리오;01;그리고 내가 이런 생각을 하게 된 이유에, 어떻게 보면 선생의 책임도 있지 않을까 하는 생각이 들기도 했고."
80000125-23 = "[s] \"그래서 나에게 처음 시험해 보는 건가…….\""
80000125-24 = "3;리오;02;맞아. 이건 선생의 자업자득이야. 그렇게 생각하는 편이 좋아.\n#3;em;[반응]"
80000125-25 = "3;리오;02;이야기를 계속할게. 그래서 다른 사람들의 발렌타인 데이 사례를 연구해 봤는데"
80000125-26 = "3;리오;01;……."
80000125-27 = "3;리오;05;그야말로, 엉망진창이야. 비합리성 그 자체였어."
80000125-28 = "3;리오;07;일관성이라고는 찾아볼 수도 없었고, 통계적으로 유의미한 수치 자체가 나오지 않았어.\n#3;em;[속상함]"
80000125-29 = "3;리오;01;초콜릿을 직접 만들어서 건네줘야 한다는 사람들."
80000125-30 = "3;리오;99;개인이 초콜릿을 만들어 봤자, 식품공학의 정수를 이길 수 없을 게 뻔하니, 차라리 고급 기성품을 사 줘야 한다는 사람들."
80000125-31 = "3;리오;01;오히려 일상적인 초콜릿을 건네줌으로써 역설적인 특별함을 전하고 싶다는 사람들."
80000125-32 = "3;리오;05;초콜릿을 몸에 바른 다음 스스로를 리본으로 묶은 다음 다가가야 한다는 사람들, 그리고 또….\n#3;em;…"
80000125-33 = "[s] \"마지막은 안 되니까?!\""
80000125-34 = "3;리오;04;그, 그래? 그렇구나…….\n#3;em;[땀]"
80000125-35 = "3;리오;02;아무튼 내가 알 수 있었던 것은, 이 기념일은 지금 이 시점에서도 엉망진창인 무언가로 폭주하고 있다는 것이었어."
80000125-36 = "3;리오;01;그래서 나 나름대로, 합리적이면서도 나 스스로 납득할 수 있는 결론을 내려 보았어."
80000125-37 = "3;리오;02;우선, 고급 기성품을 사는 방안은 고려하지 않기로 했어. 기성품은 결국 기성품이고, 어느 정도는 타협할 수밖에 없는 부분이 있으니까."
80000125-38 = "3;리오;02;하지만 동시에, 개인이 기업화된 식품공학의 결과물을 따라가기 어렵다는 부분은 인정해.\n#3;em;[반응]"
80000125-39 = "3;리오;01;그래서, 이런 식으로 접근하기로 했지."
80000125-40 = "3;리오;99;초콜릿은 결국 카카오매스와 카카오버터, 유제품과 설탕, 그리고 각 기업에서 비밀로 유지한다는 향신료를 혼합해 만드는 음식."
80000125-41 = "3;리오;01;그리고 초콜릿의 품질 중 가장 많은 비중을 차지하는 것은, 카카오 그 자체지.\n#3;em;…"
80000125-42 = "3;리오;02;그 부분에 착안해서, 전체 생산량의 5% 정도를 차지하는, 크리오요Criollo 품종의 카카오 빈을 우선 준비했어."
80000125-43 = "3;리오;02;발효, 로스팅, 분쇄, 압축, 혼합, 응고 과정은…… 시중에 판매되는 대부분의 고급 초콜릿을 역분석해서 레시피를 알아낸 다음."
80000125-44 = "3;리오;01;내가 직접 설계, 제작한 <초콜릿 아방가르드 군>을 사용해 전체 과정을 일괄적으로 통합하여 완성시켰지.\n#3;em;[반응]"
80000125-45 = "3;리오;02;그리고 또 하나 중요한 것이, 내가 보기에는 초콜릿의 모양인데…"
80000125-46 = "3;리오;99;……."
80000125-47 = "3;리오;02;거기에는, 지금의 나 자신에 대한 표현을 넣어야 한다는 생각이 들었어."
80000125-48 = "3;리오;01;지금의 나를 이 모습으로 있게 해 준 것이 무엇일까……."
80000125-49 = "3;리오;02;그리고 어떤 의미로 나를 표현하고 상징하는 것을, 선생에게 건넨다는 것은 무슨 의미일까, 하고."
80000125-50 = "3;리오;07;그래서 만들어 본 게…… 이거야.\n#3;em;…"
80000125-51 = "#st;[0,0];instant;1;"
80000125-52 = "#clearST"
80000125-53 = "3;리오;07\n#3;m5\n#wait;1500"
80000125-54 = "#wait;2000"
80000125-55 = "[ns] \"이건 밀레니엄 교표……?\""
80000125-56 = "3;리오;02;맞아.\n#3;em;[반응]"
80000125-57 = "3;리오;01;밀레니엄 사이언스 스쿨이 없었다면, 분명 지금의 나는 이 모습으로 있지 못했을 거야."
80000125-58 = "3;리오;99;여러 가지로 생각해 봤어. 내가 다른 학원에 진학했다면 어떤 모습이었을까, 하고.\n#3;m3\n#3;em;…"
80000125-59 = "3;리오;99;게헨나와 트리니티, 백귀야행과 붉은겨울, 산해경, 하이랜더, 와일드헌트, 오딧세이아, 그리고 또 다른 수많은 학원들……."
80000125-60 = "3;리오;07;모두 그 나름대로, 각자의 학원에서 학생이 되어 있는 내가 있었겠지만."
80000125-61 = "3;리오;01;적어도 지금의 츠카츠키 리오는, 밀레니엄 사이언스 스쿨이 아니었으면, 이런 식으로 살아갈 수 없었을 거야."
80000125-62 = "3;리오;02;그래서 이건…… 어떤 의미로, 지금의 나야."
80000125-63 = "3;리오;02;그래서 내가 선생에게 초콜릿을 준다면, 이 형상 말고는 없을 거라고 생각했어."
80000125-64 = "3;리오;03;그야말로 합리적으로 모든 변수와 가능성을 도출한 끝에 내린, 이성적인 결정이었던 거지."
80000125-65 = "3;리오;03;……."
80000125-66 = "3;리오;04;이상, 하네……?\n#3;em;[?]"
80000125-67 = "[s]\"뭐가?\""
80000125-68 = "3;리오;04;분명 나는 이성적인 결정으로, 합리적인 결과물을 만들어냈다고 생각했는데……."
80000125-69 = "3;리오;07;초콜릿의 제조 공정도, 내가 제작한 것이기는 하지만, <초콜릿 아방가르드 군>에게 일임했고……."
80000125-70 = "[s] \"그런데?\""
80000125-71 = "3;리오;01;선생. 모든 과정이 합리적이고 이성적…… 그러니까, 감정을 배제한 채 이루어졌다면."
80000125-72 = "3;리오;02;거기에는, 감정이 들어갈 자리가 없어야 했던 것이 아닐까?\n#3;em;[반응]"
80000125-73 = "[s] \"그렇게 생각해 볼 수도…… 있겠지?\""
80000125-74 = "3;리오;01;응. 그렇겠지. 그런데."
80000125-75 = "3;리오;99;……."
80000125-76 = "3;리오;01;나는 지금 이 순간…… 뭔가."
80000125-77 = "3;리오;06;……엄청나게, 부끄러워졌어.\n#3;em;[///]\n#3;stiff"
80000125-78 = "3;리오;04;이상하지 않아, 선생?"
80000125-79 = "3;리오;01;어떻게 검토해도 그 요소가 들어갈 자리를 없앤 채 공정을 완성했는데, 그런데도 끝끝내 그 요소가 결과물의 자리를 차지하고 말았다니."
80000125-80 = "3;리오;02;그야말로…… 무에서 유가 나와 버린 것이나 마찬가지잖아?"
80000125-81 = "3;리오;99;이것이 가령 입자 가속기의 충돌 과정에서 일어난 일이라면, 그나마 납득은 해 볼 수 있겠어. 하지만……."
80000125-82 = "3;리오;05;초콜릿을 만드는 것은…… 어떻게 봐도 거시 세계의 사건이잖아?"
80000125-83 = "3;리오;04;내가 또, 내가 모르는 사이에 무언가를 놓치고 만 걸까……?"
80000125-84 = "[s1] \"그렇지는 않았을 거야.\"\n[s2] \"그래도 지금은, 나도 리오의 마음이 고마워.\""
80000125-85 = "#wait;10"
80000125-86 = "#wait;10"
80000125-87 = "3;리오;04;……!\n#3;em;[///]\n#3;stiff"
80000125-88 = "3;리오;04;내게 무슨 짓을 한 거야, 선생?!"
80000125-89 = "3;리오;04;선생의 말을 들으니까, 지금까지에 비해 두 배…… 아니, 열 배는 부끄러워진 것 같은데……?"
80000125-90 = "3;리오;05;당신은 도대체 내게 있어 어떤 사람인 거지??!!\n#3;em;[?!]"
80000125-91 = "[s3] \"자, 자. 진정하고…….\"\n[s4] \"다시 한번 고마워, 리오. 초콜릿 잘 먹을게.\""
80000125-92 = "#wait;10"
80000125-93 = "#wait;10"
80000125-94 = "3;리오;04;으, 읏……!\n#3;stiff"
80000125-95 = "3;리오;04;…….\n#3;em;…"
80000125-96 = "3;리오;06;아, 알았어. 그렇게 생각해 준다면……."
80000125-97 = "3;리오;07;……."
80000125-98 = "3;리오;08;나도 고마워, 선생."

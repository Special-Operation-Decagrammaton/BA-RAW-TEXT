[translation]
80000023-1 = "ระเบิดแสนโรแมนติก"
80000023-2 = "ห้องปฏิบัติการชมรมวิศวกรรม"
80000023-3 = "(คุณครูได้รับข้อความจากฮิบิกิ เลยมาหาที่ชมรมวิศวกรรม)"
80000023-4 = "เชิญเลยคุณครู"
80000023-5 = "ฉันเรียกคุณครูมาแบบฉุกละหุกแท้ๆ แต่ก็ขอบคุณที่มาหากันนะ... ฉันมีสิ่งประดิษฐ์ชิ้นใหม่ที่อยาก#nให้คุณครูเห็นน่ะ"
80000023-6 = "นี่ไง"
80000023-8 = "[s1] \"นี่มัน...\"\n[s2] \"ลูกปืนใหญ่...?\""
80000023-9 = "อื้อ ขนาดเดียวกับกระสุนปืนครกขนาด 60 มม. ที่ฉันใช้ประจำนั่นล่ะ"
80000023-10 = "อื้อ ขนาดเดียวกับกระสุนปืนครกขนาด 60 มม. ที่ฉันใช้ประจำนั่นล่ะ"
80000023-11 = "แต่ว่า ข้างในมีของที่ยอดเยี่ยมกว่าดินปืนบรรจุอยู่นะ"
80000023-12 = "มันก็คือ... ช็อกโกแลตนี่ไง"
80000023-13 = "[s] \"ช็อกโกแลต?\""
80000023-14 = "อื้อ ถ้าพูดให้ถูกก็คือผงโกโก้แบบเข้มข้นน่ะ"
80000023-15 = "ถ้ายิงลูกปืนนี้ออกไป ความร้อนจะทำให้ผงโกโก้ละลายและบริเวณเป้าหมายที่ยิงไปก็จะกลายเป็น#nบ่อช็อกโกแลตขึ้นมาไงล่ะ"
80000023-16 = "ที่จริงมันเป็นอุปกรณ์ที่มีคนขอร้องให้ทำขึ้นเพื่อใช้ในงานเทศกาลวันวาเลนไทน์น่ะ แต่ฉันเอามา#nปรับปรุงอานุภาพการยิงให้เพิ่มขึ้นนิดหน่อย"
80000023-17 = "[s] \"เป็นอุปกรณ์ที่สุดยอดดีนะ...\""
80000023-18 = "อื้อ ถ้าทำให้มีขนาดใหญ่เท่าที่ทุกคนจะมาร่วมสนุกกันได้ก็คงดี"
80000023-19 = "แต่ว่ากระสุนปืนนี่ก็มีปัญหาอยู่เรื่องนึง..."
80000023-20 = "ถึงตอนนี้จะพัฒนาขึ้นมาเสร็จแล้ว แต่ยังไม่เคยได้ทดสอบดูเลย"
80000023-21 = "เพราะงั้นเลยอยากขอใช้พื้นที่ตึกชาเล่ต์เป็นที่ทดสอบหน่อยได้มั้ย?"
80000023-22 = "ถ้ายิงไปที่ตึกของชาเล่ต์แล้วมีช็อกโกแลตไหลเยิ้มออกมาเคลือบผนังตึกด้านนอกก็ให้บรรยากาศ#nโรแมนติกดีนะ"
80000023-23 = "[s] \"เรื่องอันตรายแบบนั้นครูคงอนุญาตไม่ได้หรอก!\""
80000023-24 = "อืม... งั้นเหรอ?"
80000023-25 = "ก็นะ คุณครูไม่เหมือนพวกเรานี่นา ถ้าถูกกระสุนปืนยิงใส่ก็อาจจะบาดเจ็บหนักได้..."
80000023-26 = "ถ้างั้นเปลี่ยนเป้าหมายไปที่ลานน้ำพุของทรีนิตี้ดีมั้ย...?"
80000023-27 = "ถ้าน้ำพุที่เห็นทุกวันกลายเป็นน้ำพุช็อกโกแลตไปละก็... พวกนักเรียนของทรีนิตี้คงชอบแน่ๆ"
80000023-28 = "[s3] \"แบบนั้นมันอันตรายนะ อย่าดีกว่า!\"\n[s4] \"แบบนั้นเดี๋ยวก็เกิดสงครามระหว่างโรงเรียนหรอก!\""
80000023-29 = "งั้นเหรอ... น่าเสียดายจังนะ"
80000023-30 = "งั้นเหรอ... น่าเสียดายจังนะ"
80000023-31 = "ถ้างั้นกระสุนช็อกโกแลตอันนี้ ขอฝากไว้ที่คุณครูแล้วกัน"
80000023-36 = "ถ้าจู่ๆ เกิดอยากกินช็อกโกแลตขึ้นมาก็ใช้กระสุนนี่ได้เลยนะ"
80000023-37 = "ฉันไม่ค่อยรู้เรื่องรสชาติเท่าไร... แต่ก็รับรองเรื่องแรงยิงได้"

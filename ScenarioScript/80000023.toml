[translation]
80000023-1 = "浪漫的炮擊"
80000023-2 = "工程師部．工作室"
80000023-3 = "（收到響的聯絡後來到了工程師部）"
80000023-4 = "啊，歡迎你來，老師。"
80000023-5 = "這麼突然還願意過來，非常感謝。其實我想讓老師看我最新的發明。"
80000023-6 = "就是這個。"
80000023-8 = "[s1]「這個是……」\n[s2]「……砲彈？」"
80000023-9 = "嗯。是口徑60mm的迫擊炮，和我平常用的一樣。"
80000023-10 = "嗯。是口徑60mm的迫擊炮，和我平常用的一樣。"
80000023-11 = "不過裡面裝了火藥之外的東西。"
80000023-12 = "沒錯，就是巧克力。"
80000023-13 = "[s]「巧克力？」"
80000023-14 = "嗯。嚴格來說是可可豆和其他許許多多的材料。"
80000023-15 = "砲彈發射之後，其熱量與衝擊將對可可豆進行焙煎與磨碎，#n配合砲彈的旋轉與其他材料進行混合……"
80000023-16 = "在命中的同時形成巧克力泥沼的感覺。原本是因為收到了情人節活動的委託……"
80000023-17 = "[s]「還真厲害呢……」"
80000023-18 = "嗯。既然要做，不如做成可以讓大家同樂的規模。#n所以我就依據我的判斷，試著進行了提升威力的改造。"
80000023-19 = "不過，現在還有一個問題……"
80000023-20 = "因為才剛開發完成，還沒在實戰中測試過威力。"
80000023-21 = "所以可以讓我對夏萊發射這個嗎？"
80000023-22 = "夏萊的外牆沾滿巧克力的話，大家會覺得很浪漫很開心吧。"
80000023-23 = "[s]「那會不會太危險了……！？」"
80000023-24 = "唔嗯，是嗎……"
80000023-25 = "確實，老師和我們不一樣，要是不小心被砲彈擊中可能會受重傷的……"
80000023-26 = "那就改變目標，瞄準三一廣場的噴水池怎麼樣？"
80000023-27 = "從平時的噴水池裡湧出巧克力噴泉的話，三一的大家也會很開心吧。"
80000023-28 = "[s3]「那也很危險……」\n[s4]「那樣會引發學園間的問題吧……」"
80000023-29 = "是嗎……真可惜。"
80000023-30 = "是嗎……真可惜。"
80000023-31 = "那這個巧克力砲彈就送給老師吧。"
80000023-36 = "突然想吃巧克力的時候，就想起我和這個砲彈吧。"
80000023-37 = "味道姑且不論……但威力是可以保證的。"

[translation]
80000023-1 = "#title;로맨틱한 폭격"
80000023-2 = "#place;엔지니어부 동아리 작업실"
80000023-3 = "#na;(히비키의 호출을 받고 엔지니어부를 찾았다.)"
80000023-4 = "3;히비키;01;어서 와, 선생님.\n#3;em;[반응]\n#3;a"
80000023-5 = "3;히비키;02;갑자기 불렀는데 와줘서 고마워…… 실은 새로 만든 발명품을 보여주고 싶어서."
80000023-6 = "3;히비키;03;바로 이것.\n#3;m1"
80000023-7 = "#wait;2500"
80000023-8 = "[s1] \"이건……\"\n[s2] \"……포탄이잖아?\""
80000023-9 = "3;히비키;05;응. 내가 평소에 사용하는 것과 동일한 60mm 구경의 박격포탄이야.\n#3;em;[반짝]\n#3;m3"
80000023-10 = "3;히비키;05;응. 내가 평소에 사용하는 것과 동일한 60mm 구경의 박격포탄이야.\n#3;em;[반짝]\n#3;m3"
80000023-11 = "3;히비키;99;하지만 이 안에는 화약 대신 더 대단한 게 들어있어."
80000023-12 = "3;히비키;03;그건 바로…… 초콜릿이야.\n#3;em;[///]\n#3;greeting"
80000023-13 = "[s] \"초콜릿?\""
80000023-14 = "3;히비키;05;응. 엄밀하게 말하자면 농축한 카카오 페이스트라고 할까.\n#3;em;[반응]"
80000023-15 = "3;히비키;99;이 포탄을 쏘면 고열과 함께 카카오 페이스트가 분리되면서 착탄된 곳에 거대한 초콜릿 늪을 생성하게 돼."
80000023-16 = "3;히비키;03;원래는 발렌타인 데이 이벤트의 행사용 제품으로 의뢰를 받은 물건인데, 내가 임의로 위력을 높여 개조해봤어.\n#3;em;[음표]"
80000023-17 = "[s] \"뭔가 엄청난 물건이 나왔네…….\""
80000023-18 = "3;히비키;02;응. 이왕이면 모두가 즐길 수 있는 규모면 더 좋을 것 같아서."
80000023-19 = "3;히비키;06;다만 이 포탄에는 문제가 하나 있는데……\n#3;em;[...]"
80000023-20 = "3;히비키;05;이제 막 개발이 완료된 상태라, 실전에서의 위력을 아직 시험해 보지 못했어."
80000023-21 = "3;히비키;02;그래서 말인데, 샬레의 빌딩에 이 포탄을 시험 삼아 쏴 봐도 될까?\n#3;em;[?]"
80000023-22 = "3;히비키;03;샬레 빌딩의 외벽을 타고 초콜릿이 흘러내리면 분명 로맨틱한 분위기가 날 거야."
80000023-23 = "[s] \"그런 위험한 실험을 허락해 줄 리가 없잖아!?\""
80000023-24 = "3;히비키;04;흐음. 그런가……\n#3;em;[땀]\n#3;shake"
80000023-25 = "3;히비키;11;하긴. 선생님은 우리들과 다르게 포탄을 맞으면 크게 다칠 수도 있으니까."
80000023-26 = "3;히비키;05;그럼 목표를 바꿔 트리니티 대광장의 분수대를 조준해 볼까……?\n#3;em;[?]"
80000023-27 = "3;히비키;03;매일 보던 광장의 분수가 초콜릿 분수로 바뀌면, 트리니티 학생들도 분명 좋아할 거야."
80000023-28 = "[s3] \"그것도 역시 위험하니까 그만둬!\"\n[s4] \"학원 간 분쟁을 일으킬 거라고!\""
80000023-29 = "3;히비키;06;그런가……. 뭔가 아쉽네.\n#3;em;[속상함]\n#3;stiff"
80000023-30 = "3;히비키;06;그런가……. 뭔가 아쉽네.\n#3;em;[속상함]\n#3;stiff"
80000023-31 = "3;히비키;03;그럼 이 초콜릿 포탄은 일단 선생님에게 맡길게."
80000023-32 = "#st;[0,0];instant;1;"
80000023-33 = "#clearST"
80000023-34 = "3;히비키;03\n#3;d\n#wait;1000"
80000023-35 = "3;히비키;05\n#3;closeup\n#3;a\n#wait;1000"
80000023-36 = "3;히비키;05;나중에라도 갑자기 초콜릿이 먹고 싶어진다면, 이 포탄을 사용해줘.\n#3;greeting\n#3;closeup"
80000023-37 = "3;히비키;03;초콜릿의 맛은 잘 모르겠지만…… 최소한 위력은 보장할게.\n#3;em;[음표]\n#3;closeup"

[translation]
2601502-1 = "Business Surfing"
2601502-2 = "I was walking on the beach when I happened to see Ichika."
2601502-8 = "Sensei?"
2601502-9 = "What brings you... Ah, actually, it's not weird for you to be here."
2601502-10 = "You want to know what I'm doing? Ah, haha, well..."
2601502-11 = "I finished work earlier than usual today."
2601502-12 = "I didn't want people to think I was just lazing around, so I decided to take a walk."
2601502-13 = "[s1] \"Ah, I get that.\"\n[s2] \"Does work ever...finish early?\""
2601502-16 = "It all worked out, because I wouldn't have run into you otherwise!"
2601502-17 = "Anyways, do you have any plans for the day?"
2601502-18 = "I'm guessing work follows you everywhere you go, even on vacation."
2601502-22 = "So I hope I'm not asking an obvious question."
2601502-23 = "Hm? ...You're actually slacking off? And you want me to join you?"
2601502-24 = "Ahaha! Sounds like fun. I'm in."
2601502-28 = "Hm? What're you looking at, Sensei?"
2601502-29 = "Hmmm, \"Beginner Surfing Class\"? That's what caught your eye?"
2601502-30 = "I did overhear that they were holding a surfing competition here today."
2601502-31 = "I guess they're killing two birds with one stone: promote the competition and their classes."
2601502-32 = "I wouldn't have expected you to be interested in surfing, though?"
2601502-33 = "What...?"
2601502-34 = "...You think I might enjoy it?"
2601502-35 = "There you go again with this stuff!"
2601502-36 = "I was looking to fill my day, but not with surfing!"
2601502-37 = "I just don't think surfing is quite my vibe. I imagine a surfer to be someone a little...cooler, you know?"
2601502-38 = "I would probably just fall off and embarrass myself."
2601502-39 = "You think that's part of the fun? Hm, so that's what you were aiming for, Sensei!"
2601502-43 = "...I see the game you're playing!"
2601502-44 = "Fufu, fine, fine. I'll give it a shot."
2601502-45 = "On one condition! You'll be joining too, Sensei?"
2601502-46 = "[s] \"Huh...? Why me?!\""
2601502-47 = "Because this was your idea in the first place! You have to commit!"
2601502-48 = "C'mon, you big, strong adult! I'm signing us up!"
2601502-50 = "So I ended up joining the surfing class with Ichika..."
2601502-51 = "...and getting completely soaked."
2601502-57 = "Umm... Oh? I think I've got it?"
2601502-58 = "Wow, great job, Ichika! I thought this was your first time!"
2601502-59 = "Huh? It is! All I did was follow your instructions."
2601502-60 = "You make it sound easy! Most people take a while to even be able to stand on the board, let alone take off on their first try."
2601502-61 = "Haha... Thank you. I guess you could say I have pretty good coordination."
2601502-62 = "We usually focus on the basics for the first day, but I think you could handle some more advanced moves!"
2601502-63 = "Ahaha, why not? I hope I don't disappoint."
2601502-65 = "Despite her hesitation, Ichika learned everything with ease and grace."
2601502-66 = "A little while later..."
2601502-70 = "So..."
2601502-71 = "...How exactly did we end up here?"
2601502-75 = "Next up, Nakamasa Ichika from Trinity! Despite being a last-minute sign up, she's sure to put on a great performance!"
2601502-76 = "You can do it, Ichika!"
2601502-77 = "[s3] \"Let's go, Ichika!\"\n[s4] \"You're the best, Ichika!!!\""
2601502-80 = "Haha... Even Sensei is being a total fan right now."
2601502-81 = "We did talk about the competition, but I didn't think the instructor would actually sign me up."
2601502-85 = "Ichika! Before you start, do you have anything you'd like to say to the audience?"
2601502-86 = "Um... I hope I don't fall off my board."
2601502-87 = "Hahaha! We've got a comedian here!"
2601502-88 = "I'm, like, really serious, though..."
2601502-89 = "*sigh* Well then, off I go. I'll do my best not to embarrass myself."
2601502-96 = "Ooh! Despite her humble words, Nakamasa Ichika knows how to shred!"
2601502-97 = "Her style might not be all that flashy, but she's got some impressive foundational skills. This might be her first competition, but I doubt she's a beginner!"
2601502-101 = "While her performance was impressive, Ichika couldn't land first place with her rudimentary surfing."
2601502-105 = "You were amazing, Ichika! If you knew how to do a punt, I bet you could've clinched it."
2601502-106 = "Haha, thank you."
2601502-107 = "You'll win the next tournament, for sure! Follow my lead, and I'll lead you to surfing stardom!"
2601502-108 = "Ah... I really appreciate it, but I think my priorities lie with my club for right now."
2601502-109 = "Aww, man. You're such a natural! All right, well take my business card at least! Call me if you change your mind."
2601502-113 = "...Phew. Life really is full of surprises."
2601502-114 = "To think just a few hours ago, I didn't think I'd ever have anything to do with surfing."
2601502-115 = "[s5] \"Incredible! You made it to the top 3!\"\n[s6] \"You were so close to winning!\""
2601502-118 = "Haha, stop! You're laying it on too thick. I didn't expect to win, especially after just one day of practice."
2601502-119 = "And what if I'd won? Think about all the people who've dedicated all their time and effort to this."
2601502-120 = "That in itself makes it pretty rude of me to even consider winning."
2601502-121 = "...I'm overthinking it?"
2601502-122 = "Haha. Maybe. I do tend to do that."
2601502-123 = "But I really do think I would've ruined the vibes if I'd won."
2601502-127 = "Ah, it's already..."
2601502-128 = "I was at a total loss on how to spend my day today, but you ended up taking me on an adventure. Thanks, Sensei!"
2601502-129 = "Hm? What about surfing?"
2601502-133 = "Mmm... I don't know if I'm going to keep doing it."
2601502-135 = "Ichika looked a little troubled as she left."

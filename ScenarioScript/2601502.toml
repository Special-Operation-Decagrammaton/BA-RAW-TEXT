[translation]
2601502-1 = "商務衝浪"
2601502-2 = "（在海邊散步時，偶然遇見了一花）"
2601502-8 = "老師？"
2601502-9 = "為什麼會在這裡……好像也沒必要問呢。#n畢竟老師也來了嘛，哈哈。"
2601502-10 = "咦？我嗎？#n啊，怎麼說呢……"
2601502-11 = "其實我已經把該做的事都做完了。#n平常我都會稍微控制一下節奏的……"
2601502-12 = "如果看起來閒閒沒事的話，難免會被其他人注意不是嗎？#n所以我才會跑來這裡閒晃，哈哈。"
2601502-13 = "[s1]「啊，有時候確實會遇到這種情況呢。」\n[s2]「工作……原來會有提前結束的時候嗎？」"
2601502-16 = "不過也是因為這樣才能遇到老師，好像有種賺到了的感覺。"
2601502-17 = "話說老師現在有什麼事嗎……？"
2601502-18 = "就算是老師，連在這麼遙遠的海邊都被工作纏身實在不太可……"
2601502-22 = "……好像還真有可能，我還是別亂說話好了。"
2601502-23 = "咦……翹班共犯？"
2601502-24 = "啊哈哈！好呀，我們一起走吧。"
2601502-28 = "嗯？怎麼了嗎，老師？"
2601502-29 = "「衝浪入門教室」？老師你有興趣嗎？"
2601502-30 = "我也不太清楚詳細情況，不過聽說今天這裡會舉辦衝浪比賽。"
2601502-31 = "應該是在宣傳比賽的同時，順便吸引新手參加吧？"
2601502-32 = "不過我真沒想到老師會對衝浪有興趣呢……"
2601502-33 = "咦……？"
2601502-34 = "……我？要我去試試看？"
2601502-35 = "老師你又來了！我還是算了吧！"
2601502-36 = "雖然我剛才的確說過沒事做，但那可是衝浪耶？"
2601502-37 = "衝浪什麼的……不是那種閃閃發光的人才會做的事嗎？"
2601502-38 = "我光是沒跌倒出糗就謝天謝地了……"
2601502-39 = "咦？那也是樂趣的一部分……？#n哼嗯……原來老師是這麼想的啊……？"
2601502-43 = "……呵呵。"
2601502-44 = "真拿你沒辦法，我就試試看吧。"
2601502-45 = "不過……老師也得跟我一起來才行！"
2601502-46 = "[s]「咦……我也要！？」"
2601502-47 = "先開口的人怎麼能退縮呢！"
2601502-48 = "來來來，我們去報名吧！#n快展現一下大人的風範！"
2601502-50 = "（只好陪著一花參加了衝浪教室）"
2601502-51 = "（結果全身都濕透了……）"
2601502-57 = "嗯～哦，哦哦？#n是這種感覺嗎……？"
2601502-58 = "一花醬好厲害！你不是說自己第一次衝浪嗎？"
2601502-59 = "咦？我其實只是照著教練教的站上板子而已。"
2601502-60 = "哪有這麼簡單！#n有些人光是要在水面上保持平衡就要花上好幾天，能一次成功起乘真的很厲害耶！"
2601502-61 = "哈哈……謝謝。#n要活動身體的事情我還算擅長。"
2601502-62 = "本來第一天只會反覆練習基本功而已，但一花醬應該可以多學一些技巧才對。"
2601502-63 = "還是別抱太大的期待比較好……但好吧，我試試看。"
2601502-65 = "（之後一花完全不負眾望，依照教練的指導成功完成了技巧）"
2601502-66 = "（接著……）"
2601502-70 = "所以說……"
2601502-71 = "……怎麼會變成這樣？"
2601502-75 = "下一位是來自三一的仲正一花選手！#n據說是在比賽開始前才緊急報名，真是令人期待！"
2601502-76 = "一花醬，加油！"
2601502-77 = "[s3]「加油，一花！」\n[s4]「你最棒了，一花醬！！！」"
2601502-80 = "哈哈……連老師都完全進入觀眾模式了呢。"
2601502-81 = "我還以為剛才要我參賽只是開開玩笑，沒想到教練真的幫我報名了。"
2601502-85 = "一花選手。#n在開始之前，請發表一下參賽感言吧。"
2601502-86 = "嗯……希望不要掉進水裡。"
2601502-87 = "真是幽默的回答，謝謝！"
2601502-88 = "我其實沒在開玩笑的說……"
2601502-89 = "唉～那我出發囉。只希望別丟臉就好。"
2601502-96 = "哦哦！和剛才謙虛的發言不同，仲正一花選手的實力相當驚人！"
2601502-97 = "雖然技巧不算華麗，基本功卻非常扎實。#n表現完全不像是個缺乏比賽經驗的選手！"
2601502-101 = "（一花接連熟練地完成衝浪，可惜只靠基本技巧終究無法奪冠）"
2601502-105 = "真的好可惜哦，一花醬！#n如果能拿到更多技巧分就能奪冠了說！"
2601502-106 = "哈哈，謝謝你的支持。"
2601502-107 = "下次比賽一定要好好準備，拿下冠軍！#n我會把你培養成衝浪界的下一個王牌的！"
2601502-108 = "啊～你的心意我很感謝，不過我目前還是想專心在社團活動上。"
2601502-109 = "唔嗯～你這麼有天分，實在太可惜了……#n這是我的名片！如果改變心意的話，歡迎隨時聯絡我！"
2601502-113 = "……呼～#n世事還真難預料呢。"
2601502-114 = "明明在幾個小時前，我還覺得衝浪跟我完全沒關係的。"
2601502-115 = "[s5]「好厲害！已經得名了！」\n[s6]「再努力一點就能奪冠了！」"
2601502-118 = "哎呀～老師你太抬舉我了啦。#n怎麼可能只練一天就奪冠呢？"
2601502-119 = "如果我真的拿下冠軍，要那些努力過的人情何以堪……"
2601502-120 = "那種事不可能發生。#n要是可能的話反而會有問題。"
2601502-121 = "……你覺得我想太多了？"
2601502-122 = "或許是吧。"
2601502-123 = "總之如果我奪冠的話，感覺整個氣氛就不對了～"
2601502-127 = "啊，時間差不多了……"
2601502-128 = "本來還在煩惱下一個行程之前要怎麼打發時間，結果託老師的福，過得非常開心！"
2601502-129 = "咦？衝浪是嗎？"
2601502-133 = "要不要繼續……我還不太確定。"
2601502-135 = "（說完，一花就帶著若有所思的表情離開了）"

[translation]
2601502-1 = "คลาสสอนเล่นเซิร์ฟ"
2601502-2 = "(คุณครูบังเอิญเจออิจิกะระหว่างกำลังเดินเล่นริมชายหาด)"
2601502-8 = "คุณครู?"
2601502-9 = "มาทำธุระอะไรที่นี่... เอ่อ ฉันไม่น่าถามเลยนะคะ คุณครูก็มากับพวกเราด้วยนี่นา ฮ่าฮ่า"
2601502-10 = "คะ? ฉันเหรอคะ? อ่า พอดีว่า..."
2601502-11 = "ฉันดันทำงานของตัวเองเสร็จก่อนเวลาน่ะค่ะ ปกติฉันควบคุมความเร็วในการทำงานของตัวเองได้แท้ๆ..."
2601502-12 = "แต่ถ้ามีเวลาเหลือจนไปเที่ยวเล่น ฉันกลัวว่าคนอื่นจะจับไต๋ได้ ฉันก็เลยแอบมาเดินเล่นเรื่อยๆ แบบนี้ค่ะ ฮ่าฮ่า"
2601502-13 = "[s1] \"อ่า ทุกคนก็คงเคยมีเวลาแบบนี้ละนะ\"\n[s2] \"ปกติเรา... ทำงานเสร็จไวได้ด้วยเหรอ?\""
2601502-16 = "แต่พอได้มาเจอคุณครูแบบนี้ ฉันก็รู้สึกเหมือนได้รางวัลเลยค่ะ"
2601502-17 = "จะว่าไป คุณครูมาทำอะไรที่นี่เหรอคะ...?"
2601502-18 = "ถึงคุณจะเป็นครู แต่โอกาสที่ต้องมาทำงานในชายหาดที่อยู่ไกลแบบนี้ก็..."
2601502-22 = "ก็น่าจะมีนะคะ... งั้นฉันไม่รบกวนดีกว่าค่ะ"
2601502-23 = "คะ? จะชวนโดดงานเหรอคะ...?"
2601502-24 = "อะฮ่าฮ่า! ดีสิคะ งั้นก็โดดงานด้วยกันเลยค่ะ"
2601502-28 = "หืม? เป็นอะไรไปเหรอคะ คุณครู?"
2601502-29 = "<คลาสเล่นเซิร์ฟสำหรับมือใหม่> งั้นเหรอคะ? คุณครูสนใจเหรอคะ?"
2601502-30 = "ฉันเองก็ไม่รู้รายละเอียดมาก แต่ได้ยินว่าวันนี้มีจัดการแข่งขันเล่นเซิร์ฟที่นี่ค่ะ"
2601502-31 = "น่าจะเป็นการโปรโมตการแข่งขันและดึงดูดให้มือใหม่มาหัดเล่นเซิร์ฟนะคะ"
2601502-32 = "แต่ฉันคิดไม่ถึงเลยว่าคุณครูก็สนใจเรื่องการเล่นเซิร์ฟด้วย..."
2601502-33 = "คะ...?"
2601502-34 = "ไม่ใช่คุณครู แต่เป็นฉัน? ให้ฉันลองเล่นดูงั้นเหรอคะ?"
2601502-35 = "เอาอีกแล้วนะคะ! ฉันขอผ่านดีกว่าค่ะ!"
2601502-36 = "ฉันบอกคุณครูไปว่าไม่มีอะไรให้ทำก็จริง แต่นี่มันการเล่นเซิร์ฟเลยนะคะ?"
2601502-37 = "แล้วมันยังไงงั้นเหรอคะ... มันก็... มันดูเป็นกิจกรรมของคนเท่ๆ มากกว่าไม่ใช่เหรอคะ?"
2601502-38 = "ถ้าเป็นฉัน แค่ไม่ล้มหัวคะมำก็บุญแล้วค่ะ..."
2601502-39 = "คะ? แต่มันก็น่าสนุกงั้นเหรอคะ... ฮืม... คุณครูคิดแบบนี้สินะ...?"
2601502-43 = "อื้ม~"
2601502-44 = "ฮุฮุ ก็ได้ค่ะ ฉันจะหัดเล่นดูค่ะ"
2601502-45 = "แต่มีข้อแม้ว่า! คุณครูก็ต้องมาเล่นด้วยกันนะคะ!"
2601502-46 = "[s] \"หืม...? ครูด้วยเหรอ?!\""
2601502-47 = "คนที่ทำให้อยากเล่นก่อนห้ามถอนตัวสิคะ!"
2601502-48 = "เอาละๆ คุณครู! ไปลงเรียนกันเถอะค่ะ! โชว์ความเป็นผู้ใหญ่ให้ฉันดูบ้างสิคะ!"
2601502-50 = "(แล้วคุณครูก็ต้องลงเรียนเล่นเซิร์ฟกับอิจิกะอย่างเลี่ยงไม่ได้)"
2601502-51 = "(สุดท้ายก็ตกน้ำจนเปียกไปทั้งตัว...)"
2601502-57 = "อืม~ โอ้ โอ้ว? เล่นแบบนี้... สินะคะ?"
2601502-58 = "อิจิกะจัง สุดยอดไปเลยนะ! ไหนว่าไม่เคยเล่นมาก่อนไง?"
2601502-59 = "คะ? ฉันแค่ยืนบนบอร์ดตามที่สอนเองค่ะ"
2601502-60 = "ไม่หรอก พูดน่ะมันง่าย! บางคนยังใช้เวลาหลายวันกว่าจะยืนบนบอร์ดได้นะ แต่อิจิกะจังเพิ่งลองเรียน#nแค่เดี๋ยวเดียวก็ทำได้สบายๆ แล้ว ยอดเยี่ยมมากเลยละ!"
2601502-61 = "แหะๆ... ขอบคุณค่ะ เรื่องใช้ร่างกายเป็นงานถนัดของฉันน่ะค่ะ"
2601502-62 = "ปกติวันแรกเราจะสอนแค่พื้นฐาน แต่กับอิจิกะจังน่าจะสอนอย่างอื่นเพิ่มเติมได้เลยนะ"
2601502-63 = "อย่าคาดหวังกับฉันมากเกินไปเลยค่ะ แต่ก็... ฉันจะลองดูค่ะ"
2601502-65 = "(หลังจากนั้นอิจิกะก็ทำเทคนิคที่ครูฝึกสอนได้สอนให้ได้อย่างไร้ความกังวล)"
2601502-66 = "(และ...)"
2601502-70 = "แล้วนี่..."
2601502-71 = "มันกลายเป็นแบบนี้ได้ไงคะเนี่ย...?"
2601502-75 = "ผู้เข้าแข่งขันคนต่อไปคือ นากามาสะ อิจิกะ จากทรีนิตี้! เธอเพิ่งหัดเล่นก่อนเปิดการแข่งขันเอง เป็นผู้เข้าแข่งขันที่น่าจับตามองเลยละครับ!"
2601502-76 = "อิจิกะจัง สู้เขานะ!"
2601502-77 = "[s3] \"สู้ๆ นะ อิจิกะ!\"\n[s4] \"สุดยอดไปเลย อิจิกะจัง!!!\""
2601502-80 = "แหะๆ... คุณครูก็เข้าโหมดผู้ชมกับเขาด้วยเหรอเนี่ย"
2601502-81 = "ตอนที่บอกว่าให้ไปลงแข่งขันดู คิดไม่ถึงเลยนะว่าครูฝึกสอนจะไปส่งใบสมัครให้จริงๆ"
2601502-85 = "ผู้เข้าแข่งขันอิจิกะ ก่อนเริ่มการแข่งขัน ช่วยบอกความตั้งใจที่มีต่อการแข่งครั้งนี้หน่อยครับ"
2601502-86 = "อืม... หวังว่าคงไม่ตกน้ำนะคะ"
2601502-87 = "เป็นคำตอบที่ถ่อมตัวมากเลยนะครับ ขอบคุณครับ! "
2601502-88 = "แต่ฉันไม่ได้ล้อเล่นน่ะ..."
2601502-89 = "เฮ้อ~ งั้นเดี๋ยวฉันกลับมานะคะ ขอให้ไม่ต้องอายต่อหน้าสาธารณชนนะ"
2601502-96 = "โอ้ว! เมื่อเทียบกับการสัมภาษณ์ที่ถ่อมตัวแล้ว ผู้เข้าแข่งขันนากามาสะ อิจิกะมีฝีมือไม่เบาเลยละครับ!"
2601502-97 = "ถึงจะยังไม่มีเทคนิคแพรวพราว แต่พื้นฐานก็แน่นมากเลยครับ และต่อให้จะไม่มีประสบการณ์ในการ#nแข่งขันมาก่อน แต่ก็เหมือนเป็นนักกีฬาที่เล่นเซิร์ฟมานานแล้วเลยครับ"
2601502-101 = "(อิจิกะเล่นเซิร์ฟได้อย่างชำนาญ แต่น่าเสียดายที่ไม่อาจชนะได้ด้วยทักษะพื้นฐานเพียงอย่างเดียว)"
2601502-105 = "น่าเสียดายจังเลย อิจิกะจัง! ถ้าได้คะแนนเทคนิค ก็น่าจะชนะไปแล้วละ!"
2601502-106 = "แหะๆ ขอบคุณค่ะ"
2601502-107 = "ไว้การแข่งขันต่อไป เตรียมตัวให้ดีแล้วไปคว้าชัยชนะมาเลยนะ! ฉันจะสอนให้อิจิกะจังเป็นตัวตึงของ#nวงการเซิร์ฟเลยละ!"
2601502-108 = "อ่า~ ขอบคุณนะคะ แต่ว่า~ ตอนนี้ฉันอยากตั้งใจทำกิจกรรมของชมรมมากกว่าค่ะ"
2601502-109 = "งั้นเหรอ~ น่าเสียดายจัง อุตส่าห์เจอคนที่มีพรสวรรค์แล้วเชียว... ยังไงก็เก็บนามบัตรฉันไว้ก่อนนะ ถ้าเปลี่ยนใจก็ติดต่อมาล่ะ!"
2601502-113 = "ฮู่ว~ เล่นเป็นเรื่องจนได้สินะคะ"
2601502-114 = "เมื่อไม่กี่ชั่วโมงก่อนหน้า ฉันยังคิดอยู่แท้ๆ ว่าการเล่นเซิร์ฟมันไม่เหมาะกับฉันเท่าไร"
2601502-115 = "[s5] \"ยอดเยี่ยมเลย! เมื่อกี้ได้อันดับสูงๆ เลยนะ!\"\n[s6] \"ถ้าเล่นเป็นมากกว่านี้อีกหน่อย ครูว่าชนะได้เลยละ!\""
2601502-118 = "ไม่หรอกค่ะ~ อย่าชมให้ฉันเหลิงเกินไปสิคะ ฉันหัดเล่นมาแค่วันเดียว จะไปชนะได้ยังไงล่ะคะ?"
2601502-119 = "อีกอย่าง ถ้าฉันชนะขึ้นมา แล้วคนที่ตั้งใจซ้อมมาตั้งนานจะรู้สึกยังไงล่ะ?"
2601502-120 = "ฉันไม่มีทางชนะหรอก แต่ต่อให้ชนะก็คงไม่ใช่เรื่องดีด้วยค่ะ"
2601502-121 = "ฉันคิดมากเกินไปงั้นเหรอคะ...?"
2601502-122 = "ก็อาจจะเป็นอย่างนั้นก็ได้ค่ะ"
2601502-123 = "แต่ถ้าฉันชนะขึ้นมาจริงๆ คงทำให้บรรยากาศเสียแน่นอนค่ะ แบบนั้นไม่ดีหรอก~"
2601502-127 = "อ๊ะ เวลาผ่านไปขนาดนี้แล้วเหรอ..."
2601502-128 = "ตอนแรกฉันก็กังวลว่าจะทำอะไรฆ่าเวลาดี แต่พอได้เจอคุณครู ฉันก็ได้ทำอะไรสนุกๆ อย่างคาดไม่ถึง#nเลยนะคะ!"
2601502-129 = "คะ? เซิร์ฟเหรอคะ?"
2601502-133 = "อืม... ฉันไม่รู้หรอกค่ะว่าจะเล่นต่อดีหรือเปล่า"
2601502-135 = "(แล้วอิจิกะก็จากไปพร้อมใบหน้าที่คิดกังวลบางอย่าง)"

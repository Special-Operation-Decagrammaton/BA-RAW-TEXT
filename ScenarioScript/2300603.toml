[translation]
2300603-1 = "節慶營運管理部的部長！"
2300603-2 = "百鬼夜行．市區"
2300603-3 = "（不小心比約好的時間晚了10分鐘左右才到）"
2300603-4 = "（到了約好的地點後，不知為何現場擠滿了人）"
2300603-6 = "靜子醬！請跟我合照！"
2300603-7 = "我也要我也要！就算只拍一張也可以……！"
2300603-8 = "耶嘿嘿。好的好的！合照的話不管多少都沒問題喔！"
2300603-11 = "[s] 「靜子就算不是在百夜堂裡也很有人氣呢。」"
2300603-12 = "……咦？啊，老師！等你很久了唷～！"
2300603-13 = "那麼，我就先走啦～！"
2300603-15 = "靜子，一～直都在等老師來喔～？"
2300603-16 = "[s1] 「是看板娘模式的靜子呢……」\n[s2] 「這是多麼完美的變身。」"
2300603-22 = "[ns] 「痛痛痛！？不要那麼用力捏我的屁股！？」"
2300603-23 = "老師……？"
2300603-24 = "你剛剛有說什麼嗎？我剛剛好像聽到了什麼多餘的話，是我聽錯了嗎？"
2300603-25 = "[s] 「看到了不得了的東西。」"
2300603-26 = "剛才那也是工作的一環，是提升形象的策略！"
2300603-27 = "比起那個，你遲到了10分鐘喲？"
2300603-28 = "[s3] 「我很抱歉……」\n[s4] 「這麼說來，說是要準備慶典，該做些什麼呢？」"
2300603-29 = "呵呵呵……"
2300603-30 = "呵呵呵……"
2300603-31 = "老師，你把我當成誰了？"
2300603-32 = "[s5] 「百夜堂的看板娘？」\n[s6] 「專業的冒失鬼？」"
2300603-33 = "不不不！在百夜堂的我只是其中一個我而已……！"
2300603-34 = "不不不！在百夜堂的我只是其中一個我而已……！"
2300603-35 = "只是為了賺取社團活動資金的我，其中一面而已！"
2300603-36 = "如果把他當成是我的全貌的話，我會很困擾的！"
2300603-37 = "別看我這樣，我可是節慶管理部的部長喔！"
2300603-38 = "[s] 「原來還有這種設定啊。」"
2300603-39 = "可以別把那個說成是設定嗎！？"
2300603-40 = "哈啊，真是的……都被你搞亂了……"
2300603-41 = "總之，今天之所以請老師過來，是因為節慶管理部收到了一個委託。"
2300603-42 = "[s] 「委託？」"
2300603-43 = "沒錯。這個週末在百鬼夜行第二十三商店街，會舉辦一個小型的祭典。"
2300603-44 = "「這次祭典的籌備能不能交給節慶管理部呢？」於是我們就接到商店街的委託了。"
2300603-45 = "[s] 「也就是要為那個祭典做準備囉。」"
2300603-46 = "是的。本來百鬼夜行就是以觀光業為主要產業的學園自治區。"
2300603-47 = "至於祭典，即使是在百鬼夜行的觀光產業中也算是最大規模的活動了。"
2300603-48 = "為了使祭典能更加漂亮、完美，並且以更好的形式舉辦。"
2300603-49 = "就得仰賴我們集企劃、營運和支援於一身的節慶營運管理部了！"
2300603-50 = "來吧來吧！沒時間浪費在這裡了。"
2300603-52 = "老師，我們走吧！"
2300603-55 = "你好～"
2300603-56 = "你好。請問有什麼事呢？"
2300603-57 = "我們想要在第二十三商店街舉行一個祭典，"
2300603-58 = "所以想要借用一些器材。"
2300603-63 = "好的，我明白了。那麼就按照這個條件和日程進行交貨吧。"
2300603-64 = "好的，那就麻煩你們啦～♪"
2300603-68 = "[ns] 「等等，好厲害，也處理的太快了吧。」"
2300603-69 = "這種程度的交涉技巧，對於部長來說是當然的。"
2300603-70 = "況且，這樣還沒有結束呢。"
2300603-71 = "器材已經借好了，那麼接下來……"
2300603-72 = "就得來找能幫我們使用這些器材的人囉。"
2300603-75 = "打擾了～"
2300603-76 = "呃，那個，來我們公司有什麼事呢……？"
2300603-77 = "下週，第二十三商店街將會舉辦祭典，我們正在找能夠表演的樂團。"
2300603-78 = "大概是這樣的條件，這樣的感覺。"
2300603-79 = "唔嗯，如果是這種條件的話，費用可能有點不太夠……"
2300603-80 = "那麼，如果改成這樣的話，你覺得如何呢？"
2300603-81 = "在祭典的現場進行網路直播……"
2300603-82 = "再計算一下販售祭典特別版音源的收益的話……"
2300603-83 = "需要通路的話可以由我們來介紹，這樣的話至少也能賺……如果按照這個契約進行的話不知道您覺得如何呢……"
2300603-84 = "原，原來如此！如，如果是這樣的條件的話，現，現在簽約也……！"
2300603-85 = "好的，非常感謝～！"
2300603-86 = "[s] 「太，太厲害了……！」"
2300603-89 = "（之後，靜子繼續東奔西走，）"
2300603-90 = "（把現場攤位的契約、祭典當天的交通管制還有周邊店家的合作活動企劃等等……）"
2300603-91 = "（一個一個處理好了）"
2300603-93 = "好的，這麼一來就大致完成了！"
2300603-94 = "終於可以休息一下了呢～嗯，真是辛苦了！"
2300603-95 = "咦？老師你還好嗎？臉色看起來不太好喔？"
2300603-96 = "[s7] 「那個，我好像什麼忙都沒有幫上……」\n[s8] 「光是要跟上靜子就很累了……」"
2300603-97 = "是這樣嗎。老師最好還是鍛鍊一下體力比較好唷？"
2300603-98 = "是這樣嗎。老師最好還是鍛鍊一下體力比較好唷？"
2300603-99 = "[s] 「準備祭典還真是不容易啊……」"
2300603-100 = "呵呵，這倒是沒錯……並不是件簡單的事呢。"
2300603-101 = "這次雖然比較臨時，也是因為是小規模的祭典才能這樣就搞定。"
2300603-102 = "我們節慶營運管理部平時舉辦的祭典，準備起來可是比這個更～忙的呢。"
2300603-103 = "[s] 「原來是那樣啊……」"
2300603-104 = "沒錯，舉辦祭典是需要很多的時間和努力的。"
2300603-105 = "而且還需要大家的協助和……為了推動這些的資金。"
2300603-106 = "真的是，需要非常多的東西。"
2300603-107 = "我每天在百夜堂的工作，基本上也是為了籌措祭典資金採取的手段之一而已……"
2300603-108 = "就算如此，百夜堂的工作也是相當辛苦。"
2300603-109 = "嗯……簡單來說就是有不少麻煩的事，相當累人。"
2300603-110 = "[s] 「即使如此，還是會繼續做下去的對吧。」"
2300603-111 = "沒錯。"
2300603-112 = "因為，我很喜歡。"
2300603-113 = "就算知道這是一件麻煩又辛苦的事情也一樣。"
2300603-114 = "百夜堂的工作很有趣，又能讓客人們感到快樂，我也很喜歡社團裡的大家。能夠在這樣的環境裡努力，是件開心的事情。"
2300603-115 = "就算在過程中會遇到很多辛苦的事，只要最後祭典順利舉辦──"
2300603-116 = "能夠看到因為祭典而高興的人們的笑容，就覺得一切的辛苦都值得了。"
2300603-117 = "而且……"
2300603-118 = "[s] 「而且？」"
2300603-119 = "今天很特別，有老師陪著我。"
2300603-120 = "能讓老師看到我帥氣的一面，我很滿足。"
2300603-121 = "你覺得怎麼樣呀？"
2300603-123 = "節慶營運管理部，部長的實力！"
2300603-124 = "[s9] 「非常厲害，靜子簡直是專家呢。」\n[s10] 「太佩服了，真是厲害。」"
2300603-125 = "太好了，今天能夠聽到這句話就值得了！"
2300603-126 = "太好了，今天能夠聽到這句話就值得了！"
2300603-128 = "（在回家的路上，和靜子一邊聊著祭典相關的話題一邊悠閒地走著）"

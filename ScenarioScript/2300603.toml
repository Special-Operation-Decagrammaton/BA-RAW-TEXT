[translation]
2300603-1 = "President of the Festival Operations Department!"
2300603-2 = "The Streets of Hyakkiyako"
2300603-3 = "(I'm ten minutes late to my meeting with Shizuko.)"
2300603-4 = "(For some reason, there is a massive crowd gathered at where we're supposed to meet.)"
2300603-6 = "Wow! Take a photo with me Shizuko!"
2300603-7 = "Me too! Me too! Can I get a picture too?"
2300603-8 = "Heehee. I would love to!"
2300603-11 = "[s] \"I guess Shizuko is popular even outside Momoyodou.\""
2300603-12 = "Sensei! Over here! ♪"
2300603-13 = "Um, there's something I have to go take care of. Excuse me!"
2300603-15 = "(smile) I've been waiting for you, Sensei!"
2300603-16 = "[s1] \"Shizuko, the idol of Momoyodou...\"\n[s2] \"She's perfect!\""
2300603-22 = "[ns] \"Y-You don't have to pinch me so hard!\""
2300603-23 = "Sensei..."
2300603-24 = "You don't have to say such stupid things!"
2300603-25 = "[s] \"I will never wash this cheek again.\""
2300603-26 = "Taking care of unruly customers is part of the job."
2300603-27 = "Anyway, you're the one who was ten minutes late."
2300603-28 = "[s3] \"Sorry about that. I came as soon as I could.\"\n[s4] \"Are you doing preparations for the festival?\""
2300603-29 = "Heh heh."
2300603-30 = "Heh heh."
2300603-31 = "Sensei, do you know who I am?"
2300603-32 = "[s5] \"Momoyodou's idol?\"\n[s6] \"Momoyodou's star scatterbrain?\""
2300603-33 = "No! The stuff for Momoyodou is just an act!"
2300603-34 = "No! The stuff for Momoyodou is just an act!"
2300603-35 = "I do that job so I can make money for club activities."
2300603-36 = "There's more to me, you know?"
2300603-37 = "I'm also the president of the Festival Operations Department!"
2300603-38 = "[s] \"Oh, yeah. I heard something about that.\""
2300603-39 = "You heard?!"
2300603-40 = "*sigh* Is that so...?"
2300603-41 = "Anyway, I called you here today because I have a request from the department."
2300603-42 = "[s] \"Of me?\""
2300603-43 = "Yes. There will be a small festival at Hyakkiyako's 23rd shopping district this weekend."
2300603-44 = "The shopping district sent over an official request asking the Festival Operations Department to manage the festival."
2300603-45 = "[s] \"So that's why you're preparing.\""
2300603-46 = "Yes. Hyakkiyako is an academy district that specializes in tourism."
2300603-47 = "And the most important tourist attractions for Hyakkiyako are the festivals."
2300603-48 = "They're to be complete, perfect, and elegant."
2300603-49 = "The Festival Operations Department's main mission is making sure they stay that way."
2300603-50 = "Come on, we don't have time to waste here."
2300603-52 = "Shall we go then, Sensei?"
2300603-55 = "Hello!"
2300603-56 = "Yes? How can I help you?"
2300603-57 = "We'll be holding a festival at the 23rd shopping district."
2300603-58 = "I'd like to borrow some equipment for the festival..."
2300603-63 = "Sure. We'll deliver the equipment based on your requirements."
2300603-64 = "Thanks for choosing us. ♪"
2300603-68 = "[ns] \"Wow. That was fast.\""
2300603-69 = "That was nothing! I'm the president, after all."
2300603-70 = "But we're not done yet."
2300603-71 = "Now that we've rented the performance equipment..."
2300603-72 = "...all we need is a group to use it."
2300603-75 = "Pardon me!"
2300603-76 = "Is there something I can help you with?"
2300603-77 = "We need a band to perform at Hyakkiyako's 23rd shopping district."
2300603-78 = "Here is the schedule and other conditions."
2300603-79 = "Hmm, but we'll need a bit more than that..."
2300603-80 = "Then how about something like this?"
2300603-81 = "You can record at the festival and stream it online."
2300603-82 = "As for the revenue from selling the festival version of the song..."
2300603-83 = "...I can guarantee a sales channel through this. The same goes for the contracts for any future concerts."
2300603-84 = "I-In that case, we can sign right away!"
2300603-85 = "Yes, thank you!"
2300603-86 = "[s] \"That was amazing!\""
2300603-89 = "(I continued to follow Shizuko as she ran her errands.)"
2300603-90 = "(Contracts for street stalls to be set up during the festival, traffic control consultations for the day of the festival, planning impromptu events linked to nearby shops in relation to the festival, and on and on...)"
2300603-91 = "(Shizuko took care of everything without breaking a sweat.)"
2300603-93 = "Okay! I think that about wraps things up."
2300603-94 = "Feels accomplishing!"
2300603-95 = "Wait. Are you okay, Sensei? You don't look so good."
2300603-96 = "[s7] \"*pant* *pant* W-We've been walking around all day...\"\n[s8] \"I'm exhausted from trying to keep up with you...\""
2300603-97 = "Hmm, is that so?"
2300603-98 = "Hmm, is that so?"
2300603-99 = "[s] \"Preparing for a festival is no joke...\""
2300603-100 = "Heh... You're only realizing now?"
2300603-101 = "And this is just for a small festival!"
2300603-102 = "The festivals actually hosted by the Festival Operations Department are even crazier."
2300603-103 = "[s] \"Are you serious?\""
2300603-104 = "Yes. Hosting a festival takes time and effort."
2300603-105 = "So much goes into making it happen."
2300603-106 = "It takes the dedication of a lot of people, not to mention funds."
2300603-107 = "Working at Momoyodou every day is just one way I raise money for the festivals."
2300603-108 = "It's a lot of work."
2300603-109 = "There's just so much to do!"
2300603-110 = "[s] \"So why do you keep doing it?\""
2300603-111 = "Well..."
2300603-112 = "Because I like it."
2300603-113 = "Even if it does keep me too busy."
2300603-114 = "It's fun working at Momoyodou. The customers love me, and I like all of my co-workers."
2300603-115 = "Better yet, when the festival finally begins..."
2300603-116 = "...and I see the guests' faces light up, all of the work I went through becomes worth it."
2300603-117 = "Besides..."
2300603-118 = "[s] \"Besides?\""
2300603-119 = "You were with me today."
2300603-120 = "I'm so happy that I was able to show you this side of me."
2300603-121 = "So, what did you think?"
2300603-123 = "You got to see the Festival Operations Department president do what she does best!"
2300603-124 = "[s9] \"You're a real pro.\"\n[s10] \"I was really impressed.\""
2300603-125 = "That's all I needed to hear. Heehee!"
2300603-126 = "That's all I needed to hear. Heehee!"
2300603-128 = "(I spent the trip back talking about the festival with Shizuko.)"

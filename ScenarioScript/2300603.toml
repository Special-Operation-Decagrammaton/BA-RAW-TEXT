[translation]
2300603-1 = "ท่านหัวหน้าสุดเท่ของชมรมจัดงานเทศกาล!"
2300603-2 = "เขตเมืองในเฮียกคิยาโค"
2300603-3 = "(คุณครูมาสายกว่าเวลานัดโดยไม่ได้ตั้งใจไปประมาณ 10 นาที)"
2300603-4 = "(มีคนมารวมตัวกันอยู่จำนวนหนึ่งตรงสถานที่ที่นัดพบกับชิซุโกะ)"
2300603-6 = "ว้าว~ ชิซุโกะจัง! ถ่ายรูปหน่อยนะ!"
2300603-7 = "ฉันด้วยๆ ขอถ่ายรูปด้วยได้มั้ยคะ?!"
2300603-8 = "ฮิฮิ~ ได้เลยค่ะ~ ชิซุโกะยินดีมากเลยค่า~!"
2300603-11 = "[s] \"อยู่นอกร้าน ชิซุโกะก็ยังดังเหมือนกันนะเนี่ย\""
2300603-12 = "หือ? อ๊ะ! คุณครู! ฮิฮิ! ทางนี้ค่ะ ทางนี้~♪"
2300603-13 = "เอ่อ... พอดีฉันมีนัด ขอตัวก่อนนะคะ~!"
2300603-15 = "ชิซุโกะ~ กำลังรอคุณครูอยู่เลยค่ะ~ (อมยิ้ม)\n"
2300603-16 = "[s1] \"ชิซุโกะในโหมดไอดอลร้านเฮียกคิยาโคสินะ...\"\n[s2] \"สมบูรณ์แบบสุดๆ!\""
2300603-22 = "[ns] \"มะ..ไม่ต้องหยิกแรงขนาดนั้นก็ได้?!\""
2300603-23 = "คุณครู...?"
2300603-24 = "ไม่ต้องพูดอะไรที่ไม่จำเป็นก็ได้นะคะ!"
2300603-25 = "[s] \"รู้สึกเหมือนได้เห็นอะไรที่ยอดเยี่ยมมาก\""
2300603-26 = "การดูแลลูกค้าที่ไม่เป็นระเบียบก็เป็นส่วนหนึ่งของงานค่ะ"
2300603-27 = "ว่าแต่มาสายไป 10 นาทีเลยนะคะ?"
2300603-28 = "[s3] \"อึ่ก ขอโทษ... ครูมาเร็วที่สุดแล้วนะ\"\n[s4] \"นี่เตรียมงานเทศกาลอยู่เหรอ?\""
2300603-29 = "ฮุฮุฮุ..."
2300603-30 = "ฮุฮุฮุ..."
2300603-31 = "คุณครูลืมไปแล้วเหรอคะว่าฉันเป็นใคร?"
2300603-32 = "[s5] \"ไอดอลแห่งร้านเฮียกคิยาโค?\"\n[s6] \"จอมโก๊ะกังแห่งร้านเฮียกคิยาโค?\""
2300603-33 = "ไม่ๆ! นั่นเป็นแค่การแสดงในร้านเฮียกคิยาโคนะคะ!"
2300603-34 = "ไม่ๆ! นั่นเป็นแค่การแสดงในร้านเฮียกคิยาโคนะคะ!"
2300603-35 = "การแสดงเป็นตัวตนหนึ่งสำหรับการทำงานเพื่อหาเงินมาจ่ายค่ากิจกรรมของชมรมค่ะ!"
2300603-36 = "แต่ก็ไม่ใช่ตัวตนทั้งหมดของฉันสักหน่อยนี่คะ"
2300603-37 = "ฉันยังเป็นหัวหน้าชมรมจัดงานเทศกาลด้วย…!"
2300603-38 = "[s] \"ก็เคยได้ยินเรื่องนั้นอยู่นะ\""
2300603-39 = "เคยได้ยินด้วยเหรอคะ?"
2300603-40 = "อ่า... งั้นเหรอคะ..."
2300603-41 = "ยังไงก็ตาม ที่ฉันขอให้คุณครูออกมาวันนี้ เพราะมีคำขอเข้ามาทางชมรมค่ะ"
2300603-42 = "[s] \"คำขอเหรอ?\""
2300603-43 = "ใช่ค่ะ สุดสัปดาห์นี้จะมีการจัดเทศกาลเล็กๆ ที่ย่านการค้า 23 ในเฮียกคิยาโคค่ะ"
2300603-44 = "ทางย่านการค้าส่งคำขออย่างเป็นทางการว่าให้เราช่วยจัดงานเทศกาลให้ค่ะ"
2300603-45 = "[s] \"เพราะงั้นเธอเลยต้องเตรียมงานสินะ\""
2300603-46 = "ค่ะ เฮียกคิยาโคเป็นเขตปกครองตนเองที่มีธุรกิจหลักคืออุตสาหกรรมการท่องเที่ยว"
2300603-47 = "และจุดเด่นสำหรับการท่องเที่ยวที่สำคัญในเฮียกคิยาโคก็คืองานเทศกาลค่ะ"
2300603-48 = "เราจะต้องจัดงานเทศกาลให้ยอดเยี่ยมและสมบูรณ์สุดปังให้ได้เลยค่ะ"
2300603-49 = "และหน้าที่สนับสนุนอยู่เบื้องหลังก็คือหน้าที่หลักของชมรมจัดงานเทศกาลของเราค่ะ"
2300603-50 = "อย่ามัวเสียเวลาเลย รีบไปกันเถอะค่ะ"
2300603-52 = "ไปกันเลยมั้ยคะ? คุณครู~"
2300603-55 = "สวัสดีค่ะ~"
2300603-56 = "ครับ มีอะไรให้รับใช้ครับ?"
2300603-57 = "ครั้งนี้เราจะจัดงานเทศกาลที่ย่านการค้า 23 กันค่ะ"
2300603-58 = "ฉันเลยอยากจะยืมอุปกรณ์ที่จะใช้ในงานเทศกาล..."
2300603-63 = "เข้าใจแล้วครับ มีเงื่อนไขอยู่คือต้องส่งกลับคืนตามกำหนดนะครับ"
2300603-64 = "ได้ค่ะ ขอบคุณมากเลยค่ะ~♪"
2300603-68 = "[ns] \"ว้าว จัดการเสร็จได้เร็วมากเลย\""
2300603-69 = "เรื่องแค่นี้เองค่ะ ฉันเป็นหัวหน้าชมรมต้องทำได้อยู่แล้ว"
2300603-70 = "แต่ยังไม่หมดหรอกนะคะ"
2300603-71 = "เรายืมอุปกรณ์การแสดงมาได้แล้ว ต่อไปก็...."
2300603-72 = "หาทีมที่จะมาทำการแสดงด้วยอุปกรณ์นี้ค่ะ"
2300603-75 = "ขอโทษนะคะ~"
2300603-76 = "มะ...มีอะไรให้ช่วยรึเปล่าครับ?"
2300603-77 = "ฉันต้องการวงดนตรีที่จะมาแสดงที่ย่านการค้า 23 ในเฮียกคิยาโคค่ะ"
2300603-78 = "นี่กำหนดการกับเงื่อนไขค่ะ"
2300603-79 = "อืม แต่ว่าแค่นั้นยังไม่เพียงพอหรอกนะครับ..."
2300603-80 = "แล้วถ้าแบบนี้เป็นยังไงคะ?"
2300603-81 = "คุณสามารถบันทึกภาพงานเทศกาลและไลฟ์สดทางอินเทอร์เน็ตได้..."
2300603-82 = "และอาจมีรายได้จากการขายเพลงที่แสดงในงานเทศกาลได้..."
2300603-83 = "ฉันรับประกันช่องทางการจำหน่ายได้ เช่นเดียวกับสัญญาอื่นๆ ในอนาคต..."
2300603-84 = "เข้าใจแล้ว! ถ้าตามเงื่อนไขนี้ก็ไปเซ็นสัญญากันได้เลยคร้าบ!"
2300603-85 = "ค่า~ ขอบคุณนะคะ~!"
2300603-86 = "[s] \"สุดยอดเลย!\""
2300603-89 = "(หลังจากนั้นคุณครูก็เดินตามชิซุโกะไปที่อื่นๆ ต่อ)"
2300603-90 = "(ทำสัญญาเปิดร้านในงานเทศกาล เจรจามาตรการควบคุมการจราจรในวันเทศกาล#nวางแผนกิจกรรมที่เกี่ยวข้องกับงานเทศกาลต่างๆ ฯลฯ ...)"
2300603-91 = "(ชิซุโกะจัดการทุกอย่างได้อย่างองอาจ)"
2300603-93 = "ค่ะ! งานหลักๆ ตอนนี้เสร็จแล้วค่ะ!"
2300603-94 = "น่าภูมิใจจังเลยนะคะ!"
2300603-95 = "อ๊ะ? คุณครูโอเคมั้ยคะ? สีหน้าดูไม่ดีเลยค่ะ"
2300603-96 = "[s7] \"แฮ่กๆ ระ..เราเดินทั้งวันเลยนะ...\"\n[s8] \"แค่เดินตามชิซุโกะก็เหนื่อยแล้ว...\""
2300603-97 = "อืม~ งั้นเหรอคะ?"
2300603-98 = "อืม~ งั้นเหรอคะ?"
2300603-99 = "[s] \"การเตรียมงานเทศกาลนี่ไม่ใช่เรื่องเล่นๆ เลยนะ...\""
2300603-100 = "ฮุฮุ นั่นน่ะ... ไม่ง่ายเลยใช่มั้ยล่ะคะ?"
2300603-101 = "งานเทศกาลขนาดเล็กก็ประมาณนี้แหละค่ะ"
2300603-102 = "งานเทศกาลนี้เป็นงานที่ชมรมเราจัดการเองทั้งหมดเลยวุ่นวายหน่อยค่ะ"
2300603-103 = "[s] \"ขนาดนั้นเลยเหรอ?\""
2300603-104 = "ใช่ค่า~ การจัดงานเทศกาลต้องใช้เวลาและความทุ่มเทอย่างมากเลย"
2300603-105 = "ใช้ความทุ่มเทและความร่วมมือของทุกคน และในการจัดงาน..."
2300603-106 = "ก็ต้องใช้หลายอย่างมากจริงๆ เลยล่ะค่ะ"
2300603-107 = "การทำงานในร้านเฮียกคิยาโคทุกวันก็เป็นวิธีหนึ่งในหาเงินทุนในการจัดงานเทศกาล..."
2300603-108 = "แต่ว่าแค่นั้นก็ยุ่งมากแล้วล่ะค่ะ"
2300603-109 = "มันวุ่นวายสุดๆ เลยรู้มั้ยคะ!"
2300603-110 = "[s] \"แล้วทำไมถึงยังทำต่อล่ะ?\""
2300603-111 = "เรื่องนั้น..."
2300603-112 = "ก็เพราะว่าฉันชอบทำค่ะ"
2300603-113 = "ถึงจะรู้ว่าการจัดงานเทศกาลจะลำบากแล้วก็ยุ่งยากก็เถอะ..."
2300603-114 = "การทำงานในร้านเฮียกคิยาโคก็สนุก ลูกค้าก็คอยเอ็นดู สมาชิกคนอื่นๆ ก็พยายามไปด้วยกันค่ะ"
2300603-115 = "และหลังจากพยายามมาอย่างหนัก ในตอนที่งานเทศกาลเริ่มขึ้น..."
2300603-116 = "และได้เห็นผู้คนที่มาร่วมงานเทศกาลมีรอยยิ้ม ฉันรู้สึกว่าทุกอย่างมันคุ้มค่าเหนื่อยมากเลยค่ะ"
2300603-117 = "แล้วอีกอย่าง..."
2300603-118 = "[s] \"อีกอย่าง...?\""
2300603-119 = "วันนี้ฉันได้ใช้เวลากับคุณครูทั้งวันแล้ว"
2300603-120 = "และทำให้คุณครูได้เห็นด้านเท่ๆ ของฉัน ฉันก็พอใจแล้วล่ะค่ะ"
2300603-121 = "คุณครูคิดว่ายังไงบ้างคะ?"
2300603-123 = "ความสามารถของหัวหน้าชมรมจัดงานเทศกาลที่ได้เห็นในวันนี้!"
2300603-124 = "[s9] \"อื้ม ชิซุโกะเป็นมืออาชีพมาก\"\n[s10] \"น่าประทับใจสุดๆ เลย\""
2300603-125 = "ค่า แค่ได้ยินแบบนั้นก็พอใจแล้วค่ะ ฮิฮิ!"
2300603-126 = "ค่า แค่ได้ยินแบบนั้นก็พอใจแล้วค่ะ ฮิฮิ!"
2300603-128 = "(คุณครูได้พูดคุยเกี่ยวกับเทศกาลกับชิซุโกะในระหว่างเดินทางกลับ)"

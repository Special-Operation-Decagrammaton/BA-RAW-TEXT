2001205-7 = "3;세나;01;오셨습니까. 기다리고 있었습니다.\n#3;greeting\n#3;em;[반짝]"
2001205-8 = "[s1] \"엄청 일찍부터 와 있었네.\"\n[s2] \"계속 기다리고 있었던 거야?\""

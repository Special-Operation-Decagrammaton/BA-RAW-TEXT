2001205-11 = "[s] \"……세나?\""
2001205-12 = "3;세나;01;……아닙니다. 말씀하신 대로입니다. 1시간 27분 전부터 나와서 기다리고 있었습니다."
2001205-13 = "3;세나;02;오늘은 다른 일정이나 업무도 없기 때문에, 바람도 쐴 겸 해서 말입니다."
2001205-14 = "3;세나;01;……선생님과의 만남. 기대하고 있었으니까요.\n#3;em;[음표]"
2001205-15 = "3;세나;99;내심 스스로 기대하고 있는 것 같아서, 다른 부원들에게 보여주고 싶지도 않았고요."
2001205-16 = "[s3] \"굉장히 솔직하고 직선적인 표현이네.\"\n[s4] \"그렇게 긴장할 필요는 없는데…….\""
2001205-17 = "3;세나;01;아, 네.\n#3;em;[속상함]"
2001205-18 = "3;세나;01;아, 네.\n#3;em;[속상함]"
2001205-19 = "3;세나;99;그럼 우선 이전의 담요와 물수건부터……."
2001205-20 = "3;세나;01;……네?\n#3;em;[?]"
2001205-21 = "3;세나;01;조금 있다가 주시겠다고요? 그게 무슨 말씀이신지……. 왜 굳이 그런……."
2001205-22 = "3;세나;02;우선 자리를 펴자고요? ……여기서 말씀이십니까?"
2001205-23 = "3;세나;01;……도시락이요?"
2001205-24 = "3;세나;02;……아. 피크닉이로군요. 답례라고 하셨던 게 뭔가 했더니…….\n#3;em;[반응]"
2001205-25 = "3;세나;01;……이런 게 취향이 아니라면 미안하다고요?"
2001205-26 = "3;세나;01;그런 건 아닙니다. 오히려 늘 이랬으면 좋겠다고 생각했습니다."
2001205-27 = "3;세나;99;……죄송합니다. 저는 항상 이런 느낌이어서, 아무래도 전달이 제대로 안 되는 것 같습니다.\n#3;stiff"
2001205-28 = "3;세나;01;정말로 순수하게 기쁩니다. 근래에 있었던 일 중 가장 기억에 남는 일이 될 것 같습니다.\n#3;em;[음표]"
2001205-29 = "3;세나;02;비슷한 상황이야 응급의학부에서도 있었지만 이런 분위기도 아니었고 피크닉이란 이름도 아니었지요."

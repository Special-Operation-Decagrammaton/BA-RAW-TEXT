2001205-36 = "3;세나;99;……그렇습니까. 그럼 이건 말이 그렇다는 것으로 넘어가겠습니다.\n#3;em;…"
2001205-37 = "3;세나;99;……그렇습니까. 그럼 이건 말이 그렇다는 것으로 넘어가겠습니다.\n#3;em;…"

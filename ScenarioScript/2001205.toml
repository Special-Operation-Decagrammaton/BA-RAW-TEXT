[translation]
2001205-1 = "ฮิมูโระ เซนะ"
2001205-3 = "(คุณครูออกมาเร็วกว่าเวลาที่กำหนดและมุ่งหน้าไปยังริมแม่น้ำเพื่อไปพบกับเซนะ)"
2001205-5 = "(...แต่ก็พบว่าเซนะที่มาถึงก่อนแล้ว)"
2001205-6 = "อ๊ะ คุณครู"
2001205-7 = "มาแล้วเหรอคะ ฉันกำลังรอคุณครูอยู่เลยค่ะ"
2001205-8 = "[s1] “มาถึงเร็วมากเลยนะเนี่ย”\n[s2] “มารอก่อนนานแล้วเหรอ?”"
2001205-9 = "คือ..."
2001205-10 = "คือ..."
2001205-11 = "[s] “เซนะ...?”"
2001205-12 = "ไม่มีอะไรหรอกค่ะ ฉันมาถึงที่นี่ได้ 1 ชั่วโมง 27 นาทีที่แล้วค่ะ"
2001205-13 = "เพราะว่าวันนี้ไม่มีตารางงานอื่น เลยตั้งใจจะออกมาสูดอากาศสักหน่อยค่ะ"
2001205-14 = "ฉันตั้งตารอที่จะเจอกับคุณครูนี่คะ..."
2001205-15 = "แต่ฉันไม่อยากแสดงให้สมาชิกหน่วยคนอื่นๆ ได้เห็นว่าฉันตื่นเต้นแค่ไหนค่ะ"
2001205-16 = "[s3] “เป็นคนซื่อตรงและแสดงออกแบบตรงไปตรงมามากเลยนะ”\n[s4] “ผ่อนคลายหน่อยก็ได้”"
2001205-17 = "ค่ะ"
2001205-18 = "ค่ะ"
2001205-19 = "ถ้างั้นรบกวนขอผ้าห่มกับผ้าขนหนูก่อน..."
2001205-20 = "คะ...?"
2001205-21 = "อีกสักพักจะเอาให้เหรอคะ? หมายความว่ายังไงคะ..."
2001205-22 = "ทำไมถึงเอาผ้าห่มปูลงบนพื้นแบบนั้นล่ะคะ? จะให้นั่งตรงนี้เหรอคะ?"
2001205-23 = "นั่นกล่องข้าวเหรอคะ?"
2001205-24 = "อา... แบบนี้นี่เอง ที่บอกว่าจะตอบแทนก็คือการปิกนิกสินะคะ"
2001205-25 = "คุณครูกังวลว่าฉันจะไม่ชอบเหรอคะ?"
2001205-26 = "ไม่หรอกค่ะ อันที่จริงฉันเองก็อยากทำแบบนี้มาตลอดเหมือนกันค่ะ"
2001205-27 = "ขอโทษด้วยนะคะ ฉันอยากทำแบบนั้นมาตลอดแต่ดูเหมือนว่าจะสื่อสารออกไปได้ไม่เก่งเท่าไร"
2001205-28 = "ฉันดีใจจริงๆ นะคะ คงเป็นเรื่องที่น่าจดจำที่สุดที่เกิดขึ้นในช่วงนี้เลยละค่ะ"
2001205-29 = "ที่หน่วยแพทย์ฉุกเฉินเองก็เคยทำเรื่องแบบนี้อยู่บ้าง แต่บรรยากาศไม่เหมือนกัน แล้วก็ไม่ใช่การปิกนิกด้วยค่ะ"
2001205-33 = "ฉันกำลังคิดว่า... การออกเดตคงจะรู้สึกประมาณนี้รึเปล่าน่ะค่ะ"
2001205-34 = "ที่จริงแล้วฉันไม่เคยทำอะไรแบบนี้มาก่อน ก็เลยไม่แน่ใจว่าการเข้าใจและอธิบายแบบนี้ถูกต้องหรือเปล่าค่ะ"
2001205-35 = "[s5] “เดต...!?”\n[s6] “อาจจะไม่ถึงขั้นนั้นนะ…!”"
2001205-36 = "อย่างนั้นเหรอคะ ถ้างั้นช่วยลืมเรื่องที่ฉันพูดไปด้วยนะคะ "
2001205-37 = "อย่างนั้นเหรอคะ ถ้างั้นช่วยลืมเรื่องที่ฉันพูดไปด้วยนะคะ "
2001205-38 = "การอธิบายความรู้สึกตัวเองให้ชัดเจนเป็นเรื่องที่ฉันกังวลมาตลอดเลยค่ะ"
2001205-39 = "แต่ฉันคิดว่าหากจะมีใครสักคนที่เข้าใจฉัน... ก็คงจะเป็นคุณครูค่ะ"
2001205-40 = "ที่จริง... คุณครูก็เป็นคนที่แปลกพอตัวเหมือนกันนะคะ"
2001205-41 = "บางครั้งก็ทำในสิ่งที่ฉันคาดเดาได้ แต่หลายๆ ครั้งก็ทำในสิ่งที่ฉันคาดไม่ถึงเลย"
2001205-42 = "แต่ถึงอย่างนั้นเวลาที่อยู่ด้วยกันก็ไม่เคยรู้สึกไม่สบายใจหรือลำบากใจเลย"
2001205-43 = "ถึงฉันจะเคยเจอคุณครูไม่กี่ครั้ง กลับรู้สึกแบบนี้ได้ ฉันเองก็แปลกใจอยู่เหมือนกันค่ะ"
2001205-44 = "[s7] “เซนะเองก็เป็นคนพิเศษเหมือนกันนะ”\n[s8] “รู้สึกเหมือนเราคล้ายกันในหลายๆ เรื่อง”"
2001205-45 = "...?"
2001205-46 = "...?"
2001205-47 = "คุณครูเองก็คิดเหมือนกันเหรอคะ"
2001205-48 = "เราคงมีส่วนคล้ายๆ กันสินะคะ"
2001205-49 = "ฉันดีใจที่ได้ยินแบบนั้นนะคะ"
2001205-50 = "คุยกันเพลินจนเวลาผ่านไปขนาดนี้แล้ว... เรามาปิกนิก ทานมื้อกลางวันกันเถอะค่ะ"
2001205-51 = "พอเสร็จแล้วก็ช่วยคืนของให้ฉันตามที่สัญญาไว้ด้วยนะคะคุณครู"
2001205-52 = "จากนั้นฉันก็จะ..."
2001205-56 = "อืม..."
2001205-57 = "[s9] “…?”\n[s10] “เซนะ...?”"
2001205-58 = "ไม่มีอะไรค่ะ..."
2001205-59 = "ไม่มีอะไรค่ะ..."
2001205-60 = "เรื่องนี้เอาไว้คุยกันทีหลังก็ได้ค่ะ"
2001205-62 = "(หลังจากนั้นคุณครูก็นั่งปิกนิกกับเซนะใต้ร่มเงาของต้นไม้อย่างมีความสุข)"
2001205-63 = "(ข้าวกล่องที่ซื้อมาก็เป็นข้าวกล่องที่หาซื้อได้ตามร้านค้าทั่วไป แต่ไม่รู้ว่าทำไมวันนี้ถึงรู้สึกอร่อยกว่าปกติ)"

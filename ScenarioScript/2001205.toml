2001205-42 = "3;세나;01;그래도 같이 있을 때 불편하거나 부담스러운 기분은 아닙니다.\n#3;em;[반응]"
2001205-43 = "3;세나;02;실제로 뵌 건 몇 번 안 되는데도, 이런 느낌이라 스스로도 신기하다고 느끼고 있습니다."

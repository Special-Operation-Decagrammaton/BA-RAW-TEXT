[translation]
90001230-1 = "Episode 23;Storage"
90001230-4 = "Did everyone get a good night's sleep? We've arrived at our destination. It's hard to see with all the fog, though."
90001230-5 = "Yes. I set our course and left the ship on autopilot."
90001230-6 = "That enabled me to ensure everyone slept during our journey. I hope it was a comfortable ride."
90001230-7 = "Y-Yes... It was really comfy...like I was in my locker at home... Fufu."
90001230-8 = "I'm unsure...if that should be considered a positive or a negative..."
90001230-12 = "I hope everyone got enough rest. I estimate that we have about two days remaining before the Steel Continent overtakes Kivotos."
90001230-13 = "Which would mean this may have been everyone's last chance to get a good night's sleep."
90001230-14 = "Perhaps the last chance we will ever have to sleep again, Ms. Rio."
90001230-15 = "...That is a potential outcome."
90001230-19 = "H-Hold up! Doesn't that mean that last night was, like, super precious? I should've taken sleeping really seriously, then!"
90001230-20 = "...I don't know anyone who takes sleep more seriously than you."
90001230-21 = "Wh-What?! Liar! D-Don't make stuff up!"
90001230-22 = "Well, Momoi, you did sleep in this morning. In fact, I had a very difficult time trying to wake you up."
90001230-23 = "Speaking of, shoving a snowball down my shirt was way overboard! Do you want me to get hypothermia and DIE?!"
90001230-24 = "Wasn't the cold very refreshing?"
90001230-26 = "I don't think that's the word most people would use..."
90001230-31 = "Huh? Is that...?"
90001230-37 = "Wow! Look, Kei! A fox! It is so cute!"
90001230-39 = "Oh, yes... An arctic fox. They're known for their short ears and long fur that keeps them warm."
90001230-40 = "Yes! The fur is so fluffy! And it is not scared of me either!"
90001230-42 = "[ns] \"It really isn't. They do say it's easy to befriend a fox.\""
90001230-43 = "Although unlikely, there is risk of infection, so please don't hold it. Aris... Aris?"
90001230-49 = "Kei! Put out your hand! It would like to shake hands with you."
90001230-50 = "N-No. Wait, I..."
90001230-51 = "Yip?"
90001230-52 = "Ugh..."
90001230-53 = "The arctic fox stared at Kei's hand for a long time."
90001230-54 = "Finally, it lightly licked the outstretched hand with the tip of its tongue!"
90001230-58 = "Ehhh?!"
90001230-59 = "How wonderful! I believe it likes you as well, Kei!"
90001230-60 = "What's the point...of being liked by a wild animal...?"
90001230-68 = "Oh my. And now there's a penguin. They're known as the gentlemen of the polar region."
90001230-69 = "Wooow...! Hello! I am Tendou Aris!"
90001230-70 = "A-Aris... Their wings can cause serious injury. Please proceed with caution."
90001230-71 = "But they are so cute!"
90001230-73 = "Yup, yup. They were part of our main background resources in our game, \"Polar Adventure.\""
90001230-74 = "...I still think it was a waste of resources, and my time, to make twenty different models representing different penguin species..."
90001230-75 = "A-A waste?! Adding unnecessarily detailed real-life references is generally well-received...by some gamers!"
90001230-76 = "Don't even get me started on how some of the penguins were species found in tropical regions!"
90001230-78 = "W-Well, the Easter egg where you could make all the penguins fly away if you met certain conditions was pretty cool..."
90001230-79 = "Even though it crashed the game..."
90001230-80 = "Why is this penguin following me?!"
90001230-81 = "It really is! Perhaps it likes you, Kei?"
90001230-82 = "Well, it's unwanted affection! Go away!"
90001230-96 = "Fufu. They say penguins are such curious creatures that they're not even afraid of humans."
90001230-97 = "Penguins have very few predators, and they believe humans are their distant relatives, since we both walk on two legs."
90001230-112 = "Stop chit-chatting, and HELP ME!!!"
90001230-114 = "*pant* *pant* This is why wild animals that can't understand words are so...!"
90001230-115 = "[ns] \"It really didn't have any ill intent...\""
90001230-116 = "That's precisely the problem! I can't hate or dislike them, but I can't teach them anything either!"
90001230-117 = "[s1] \"I see. So you don't hate or dislike them.\"\n[s2] \"Your empathetic heart is making me tear up...\""
90001230-120 = "Wh-Wh-What are you even saying?! Seriously, this adult just spews out whatever nonsense they want!!!"
90001230-121 = "Well, I am very happy that Kei does not hate living creatures."
90001230-125 = "Thank you, Kei. For choosing to stay with us."
90001230-126 = "Um...y-you're welcome? I mean, well, technically we are..."
90001230-127 = "...Technically. But right now, I look like this... *sigh*"
90001230-128 = "Ugh, whatever! It's not exactly like...I have any proper justification to hate anymore."
90001230-129 = "Yes! That is exactly what I mean!"
90001230-130 = "O-Okay..."
90001230-132 = "While you were having your heartwarming conversation, we arrived at our destination."
90001230-135 = "There really was something here the whole time? How weird."
90001230-136 = "It would appear so. But what in the world is a building doing in a place like this?"
90001230-138 = "...I know what that is! I can't believe what I'm seeing."
90001230-139 = "What is it, Ms. Rio?"
90001230-140 = "It was built as a failsafe for human survival in case of an extinction-level event."
90001230-144 = "It's a seed vault."
90001230-145 = "Seed..."
90001230-146 = "...vault?"
90001230-147 = "A seed vault...truly exists?"
90001230-148 = "[s] \"What is a 'seed vault'?\""
90001230-149 = "Exactly as it sounds... "
90001230-150 = "It's a very big seed storage."
90001230-152 = "Th-Those people... Th-They made it...all the way to Tiphy..."
90001230-153 = "Tiphareth's current task is to manage resource transport to the Steel Continent."
90001230-154 = "And seeing that those people have uncovered Tiphareth's location..."
90001230-155 = "...Yup. They've followed the yellow brick road to the Steel Continent."
90001230-156 = "To use those analogies you so love, I must congratulate them in successfully finding access to the \"back door.\""
90001230-157 = "Did Tiphareth say anything?"
90001230-159 = "Eh? W-W-W-W-Well, the Steel Continent has all the resources it needs now..."
90001230-160 = "So Tiphy's going to do its duty...its duty as a prophet."
90001230-161 = "Simply put, enemy extermination. And of course..."
90001230-162 = "...it's determined to fulfill its original purpose."
90001230-163 = "Its \"original purpose\"..."
90001230-167 = "By Tiphareth's original purpose, does it mean protecting seeds?"
90001230-169 = "E-E-E-E-E-Elder Sister?!"
90001230-170 = "It was not my intention to shock you so gravely, Ein."
90001230-171 = "I-I-I-I-I'm sorry! Th-That's my fault!"
90001230-172 = "..."
90001230-173 = "What are your thoughts, Sof?"
90001230-174 = "Shall we inform Elder Sister of the current situation?"
90001230-175 = "..."
90001230-176 = "Okay. Let's do it."
90001230-177 = "Sorry, Elder Sister. We wanted to handle everything on our own, without burdening you."
90001230-179 = "Worry not, Ein, Sof, and Ohr. In fact, I find content in the idea of assisting my younger sisters."
90001230-180 = "I may finally satiate my desire to do my part as the eldest."
90001230-181 = "After all, sisters are wont to support each other in times of difficulty, yes?"
90001230-185 = "W-Waaah...!"
90001230-186 = "Really, truly the best...!"
90001230-187 = "I'm ecstatic—overwhelmed that I was allowed to experience this moment!"
90001230-189 = "In that case, please inform me of the details of this conundrum. Ohr, you were Tiphareth's assigned commander, yes?"
90001230-191 = "Yes, yes. However, well...the situation has grown slightly complicated."
90001230-192 = "Ugh."
90001230-194 = "And what is this \"complication\"?"
90001230-195 = "O-Originally, Tiphy...was an unmanned seed vault built by humans...and when we preached our gospel to Tiphy..."
90001230-196 = "Hmmm, how do we put this? Tiphareth was receptive to our gospel...but it also insisted that it fulfill its original purpose of seed preservation as well."
90001230-198 = "I found, and still find, it less than ideal. This \"seed preservation\" directive is a false mission humans tainted Tiphareth with."
90001230-199 = "Such a mission could not help but to conflict with our truth. However..."
90001230-200 = "..."
90001230-201 = "I've got it, Ohr. It was me who said it, anyway. I believe that we should respect Tiphareth's wishes."
90001230-202 = "The mission itself might be artificial, implanted by those humans, but it's Tiphareth's obstacle to overcome."
90001230-203 = "And considering that, even after hearing our gospel, Tiphareth insisted upon its decision... Well, shouldn't we respect that?"
90001230-204 = "I have grasped the situation. It is a question of free will."
90001230-205 = "E-Elder Sister...?"
90001230-206 = "However, I cannot say that a child who knows naught but their orders can be said to be acting of their own volition."
90001230-207 = "Thus, how does one demand such responsibilities of such a child, one who has yet to experience true free will?"
90001230-208 = "We can only conclude that this child has been abandoned to sorrow and tragedies, ones it is as of yet unaware of."
90001230-209 = "Despite this, Tiphareth, upon learning of and accepting our gospel, still exercised its faith and loyalty to its original duty."
90001230-210 = "Should we not respect this admirable expression of free will?"
90001230-211 = "H-However, there is a saying: free will is nothing but an illusion."
90001230-212 = "While that may be true, Ohr, I advocate for respecting said illusion."
90001230-213 = "After all, it is the very reason why we are able to sit side by side, to gaze upon each others' visage."
90001230-214 = "?!?!"
90001230-216 = "Please consider this. If our master truly desired we function as brainless limbs, as beings with no free will..."
90001230-217 = "...then the four of us would never have had the opportunity to gather and speak as we do, yes?"
90001230-218 = "I-I-I would hate that...!"
90001230-219 = "I share your sentiment. Ein, Sof, Ohr, this is precisely why..."
90001230-220 = "...just as we value our individual free will, please cherish that of Tiphareth, as well as of the other prophets."
90001230-221 = "For such action is the desire of our master."
90001230-222 = "Yes!"
90001230-224 = "Dawn shall soon come."
90001230-225 = "The fog will dissipate, as the morning glow's curtains shall rise."
90001230-226 = "We must remain ever fastidious and alert, for we know not if it arrives with the setting sun, the dark of the night, or the rising dawn."
90001230-227 = "My faith remains steadfast. My faith in the prophets, in myself, and of course, in my precious younger sisters."
90001230-228 = "Ein, Sof, and Ohr. If you find yourself before insurmountable obstacles, as your eldest sister, I shall be there to provide aid."
90001230-229 = "I'm...so honored."
90001230-231 = "Worry not, my younger sisters. We are perfection manifested."
90001230-232 = "There is no need for amelioration. For we bear no faults to be polished."
90001230-233 = "Above all, our master created us so."
90001230-234 = "Therefore, shall we embrace Tiphareth's perspective of this vast world?"
90001230-235 = "Yes!"
90001230-238 = "Next Episode;Hope"

[translation]
90001230-1 = "ตอนที่ 23;คลัง"
90001230-4 = "ถึงหมอกจะลงจัด... แต่ตามพิกัดบอกว่าอยู่แถวนี้ค่ะ ทุกคนได้นอนพักผ่อนกันเต็มที่มั้ยคะ?"
90001230-5 = "หลังจากกำหนดเส้นทางไปยังพิกัดที่ว่า เราก็เดินทางมาด้วยโหมดขับขี่อัตโนมัติค่ะ"
90001230-6 = "ระหว่างนั้นทุกคนก็นอนหลับพักผ่อนกัน แต่ก็ไม่แน่ใจนะคะว่าหลับสบายกันหรือเปล่า"
90001230-7 = "ค่ะ ค่ะ... ฉันสบายตัวเหมือนตอนอยู่ในตู้เลยค่ะ... ฮุฮุ"
90001230-8 = "เป็นความรู้สึกที่ยากที่จะรู้ได้ว่ามันดีหรือร้ายนะคะ..."
90001230-12 = "ทุกคนควรพักผ่อนให้มากๆ เข้าไว้ ตอนนี้ก็เช้าแล้ว... งั้นก็เท่ากับว่าพวกเรามีเวลาเหลืออีกประมาณ 2 วัน"
90001230-13 = "บางทีการนอนหลับเมื่อคืนนี้อาจจะเป็นการนอนหลับครั้งสุดท้ายของเราในปฏิบัติการครั้งนี้ก็ได้"
90001230-14 = "หรืออาจจะเป็นการนอนหลับครั้งสุดท้ายของชีวิต... ก็ได้สินะคะ ท่านริโอะ"
90001230-15 = "ก็ใช่ว่าจะเป็นไปไม่ได้นะ..."
90001230-19 = "หืม? ทำไมฟังดูเหมือนเป็นช่วงเวลาที่สำคัญมากๆ เลย?! ฮือ รู้งี้นอนให้นานกว่านี้อีกหน่อยก็ดี..."
90001230-20 = "พี่โมโมอิก็จริงจังกับการนอนตลอดอยู่แล้วไม่ใช่เหรอ..."
90001230-21 = "วะ... ว่าไงนะ?! ไม่ใช่อย่างนั้นสักหน่อย!? เข้าใจผิดไปมากเลยนะ?!?!"
90001230-22 = "แต่โมโมอิก็นอนฉ่ำจนแทบจะไม่ตื่นเลยนะ? ฉันต้องลำบากปลุกอยู่ตั้งนาน"
90001230-23 = "ถึงจะปลุกไม่ตื่นยังไง แต่การเอาหิมะมาใส่ในชุดของฉันมันก็เกินไปนะ! จะทำให้คนแข็งตายหรือไง!"
90001230-24 = "ไม่ได้เย็นสดชื่นหรอกเหรอ?"
90001230-26 = "คะ... คงมีไม่กี่คนหรอกนะที่จะรู้สึกเย็นสดชื่นน่ะ..."
90001230-31 = "หืม? เด็กคนนี้...?"
90001230-37 = "ว้าว! เป็นสุนัขจิ้งจอกที่น่ารักจังเลยค่ะ! ดูสิคะ เคย์!"
90001230-39 = "อ่า... ค่ะ สุนัขจิ้งจอกอาร์กติกสินะคะ ลักษณะเด่นของมันก็คือหูที่สั้นและขนที่ยาวที่มีไว้เพื่อรักษา#nอุณหภูมิของร่างกายค่ะ"
90001230-40 = "ใช่ค่ะ! ขนนุ่มมากๆ เลยละค่ะ! แล้วก็เหมือนว่าจะไม่กลัวอาริสึด้วย!"
90001230-42 = "[ns] \"นั่นสินะ ได้ยินว่าสุนัขจิ้งจอกเป็นมิตรกับคนด้วยละ\""
90001230-43 = "ถึงจะมีความเป็นไปได้น้อย แต่ก็ยังมีความเสี่ยงเรื่องการติดเชื้อแบคทีเรีย งั้นก็อยู่ห่างๆ ไว้จะดีกว่า#nนะคะ อาริสึ... อาริสึ?"
90001230-49 = "เคย์ก็ลองยื่นมือมาสิคะ! เหมือนน้องจะจับมือด้วยเลยค่ะ!"
90001230-50 = "มะ... ไม่ค่ะ ฉัน..."
90001230-51 = "หงิง?"
90001230-52 = "อ่า..."
90001230-53 = "(สุนัขจิ้งจอกอาร์กติกจ้องมือของเคย์ด้วยความอยากรู้อยากเห็นอยู่พักใหญ่)"
90001230-54 = "(แล้วมันก็ใช้ปลายลิ้นเลียมือเบาๆ!)"
90001230-58 = "เฮือก...?!?!"
90001230-59 = "โล่งอกไปทีค่ะ! น้องดูจะชอบเคย์นะคะ!"
90001230-60 = "อึก... ได้รับความสนใจจากสัตว์ป่าจะไปมีประโยชน์อะไรคะ..."
90001230-68 = "อุ๊ย นี่คือเพนกวินสินะคะ เพนกวินเป็นสัตว์ที่ได้ชื่อว่าเป็นสุภาพบุรุษแห่งเขตขั้วโลกเลยละ"
90001230-69 = "ว้าวว...! สวัสดีค่ะ! ฉันชื่อเทนโด อาริสึค่ะ!"
90001230-70 = "อะ... อาริสึ... ถ้าไปจับปีกของเพนกวินอย่างไม่ระวัง อาจจะได้รับบาดเจ็บได้นะคะ ระวังด้วยค่ะ..."
90001230-71 = "แต่มันน่ารักขนาดนี้เลยนะคะ?"
90001230-73 = "อืม อืม นี่คือหนึ่งในข้อมูลเซ็ตติ้งที่สำคัญในเกม <อาร์กติก แอดเวนเจอร์> ของเราเลยละ"
90001230-74 = "ว่าแต่เราจำเป็นต้องทำกราฟิกของเพนกวินทั้ง 20 สายพันธุ์เลยเหรอ..."
90001230-75 = "หืม? ทำไมล่ะ?! ยิ่งใส่รายละเอียดปลีกย่อยที่ไม่จำเป็นเข้าไปมากเท่าไร ก็จะยิ่งได้รับการตอบรับจาก#nเกมเมอร์นะ!"
90001230-76 = "แต่บางสายพันธุ์ที่ใส่ไปเป็นเพนกวินที่อยู่อีกขั้วโลกหนึ่ง เราก็เลยโดนวิจารณ์ว่าหาข้อมูลผิดพลาด#nไม่ใช่เหรอ!"
90001230-78 = "แต่ฉันชอบการใส่อีสเตอร์เอ้กที่เมื่อทำผ่านเงื่อนไขบางอย่างแล้วเพนกวินจะบินไปหมดนะ..."
90001230-79 = "แต่นั่นก็ทำให้เกมแครชเหมือนกัน..."
90001230-80 = "ว่าแต่... ทำไมเพนกวินตัวนี้ถึงเอาแต่เดินตามฉันล่ะคะ?!"
90001230-81 = "นั่นสินะ น้องก็เหมือนจะชอบเคย์ด้วยนะคะ"
90001230-82 = "การได้รับความสนใจแบบนี้มันก็ไม่ได้แย่หรอกนะ! ตะ... แต่อย่าตามมาได้มั้ยคะ!"
90001230-96 = "ฮุฮุ ว่ากันว่าเหตุผลที่เพนกวินไม่กลัวมนุษย์เลยก็เพราะพวกมันเป็นสัตว์ที่อยากรู้อยากเห็นมากค่ะ"
90001230-97 = "และในเขตขั้วโลกก็ไม่ค่อยมีศัตรูตามธรรมชาติ เวลาเห็นมนุษย์ที่เดินสองขาเหมือนตัวเอง ก็จะคิดว่าเป็นญาติห่างๆ กับตัวเองค่ะ"
90001230-112 = "หยุดอธิบายให้ยืดยาวแล้วมาช่วยฉันเถอะค่ะ!!!"
90001230-114 = "แฮ่ก... แฮ่ก...! ไม่อยากเจอพวกสัตว์ที่พูดไม่รู้เรื่องเลย...!"
90001230-115 = "[ns] \"แต่สัตว์พวกนี้ก็ไม่น่าจะมีเจตนาร้ายนะ...\""
90001230-116 = "แบบนี้ก็เลยยิ่งแย่ยังไงล่ะคะ! จะเกลียดหรือหมั่นไส้ก็ไม่ได้ แต่ก็สอนอะไรไม่ได้อีก!"
90001230-117 = "[s1] \"งั้นสินะ ไม่ได้เกลียดหรือหมั่นไส้น้องๆ สินะ\"\n[s2] \"หัวใจที่อบอุ่นของเคย์ทำให้ครูน้ำตาไหลเลย...\""
90001230-120 = "ฉะ... ฉะ... ฉันไปทำอะไรให้คะ?!?! ผู้ใหญ่คนนี้นี่จริงๆ เลย ตั้งใจพูดแกล้งฉันใช่มั้ย?!!"
90001230-121 = "แต่อาริสึดีใจนะคะที่เคย์ไม่เกลียดน้องๆ สิ่งมีชีวิตพวกนี้"
90001230-125 = "ขอบคุณนะคะเคย์ ขอบคุณที่... เลือกที่จะอยู่กับพวกเราค่ะ"
90001230-126 = "คะ? มะ... ไม่ใช่นะคะ อะ... เอ่อ... คือว่า... ที่ฉันจะบอกก็คือ..."
90001230-127 = "ช่างเถอะค่ะ... ดูสภาพของฉันในตอนนี้สิ... เฮ้อ"
90001230-128 = "แต่ก็เอาเถอะ ตอนนี้ฉันก็... ไม่มีเหตุผลที่ต้องเกลียดอะไรนี่คะ"
90001230-129 = "ค่ะ! นั่นละค่ะสิ่งที่อาริสึจะสื่อ"
90001230-130 = "ค่ะ ค่ะ..."
90001230-132 = "ระหว่างที่กำลังแบ่งปันเรื่องราวที่น่าประทับใจกัน ดูเหมือนว่าเราจะมาถึงจุดหมายปลายทางแล้วนะคะ"
90001230-135 = "มีอะไรอยู่จริงด้วยสินะ? เป็นสิ่งปลูกสร้างที่ดูน่าทึ่งจัง"
90001230-136 = "นั่นสินะคะ มีอะไรบางอย่างอยู่ที่พิกัดนี้จริงๆ ด้วย ว่าแต่มันคืออะไรกันคะ...?"
90001230-138 = "ฉันรู้จักที่นี่นะ แต่มันตั้งอยู่ตรงนี้จริงๆ เหรอเนี่ย...!"
90001230-139 = "มันคืออะไรเหรอคะ ท่านริโอะ?"
90001230-140 = "มันคือ... สิ่งปลูกสร้างเพื่อดำรงความอยู่รอดของมนุษยชาติในกรณีที่เกิดภัยพิบัติทำลายโลก และที่แห่งนี้ก็ได้ชื่อว่า..."
90001230-144 = "คลังเก็บเมล็ดพันธุ์"
90001230-145 = "คลัง?"
90001230-146 = "เก็บเมล็ดพันธุ์?"
90001230-147 = "คลังเก็บเมล็ดพันธุ์... มีที่แบบนี้อยู่จริงๆ สินะคะ"
90001230-148 = "[s] \"มันคืออะไรเหรอ?\""
90001230-149 = "ถ้าจะให้พูดง่ายๆ... "
90001230-150 = "มันก็คือสถานที่เก็บเมล็ดพันธุ์พืชตามชื่อเลยค่ะ"
90001230-152 = "คะ... คนพวกนั้น... มะ... มาถึงข้างหน้าทิฟาจัง... จนได้นะคะ..."
90001230-153 = "ภารกิจของทิฟาเร็ธในตอนนี้คือการขนส่งและจัดการทรัพยากรในดินแดนเหล็กกล้าค่ะ"
90001230-154 = "การที่ตำแหน่งของทิฟาเร็ธถูกเปิดเผยแก่คนพวกนั้น ก็หมายความว่า..."
90001230-155 = "อื้อ... หมายความว่าในที่สุดพวกนั้นก็มาถึงจุดสิ้นสุดของเส้นทางที่มุ่งสู่ดินแดนเหล็กกล้าแล้ว"
90001230-156 = "ถ้าจะใช้คำเปรียบเทียบในแบบของฉัน ก็ต้องบอกว่าพวกเธอหาแบ็กดอร์เจอจนได้ค่ะ"
90001230-157 = "แล้วทิฟาเร็ธล่ะ ว่ายังไงบ้าง?"
90001230-159 = "คะ? อะอะอะอะ... เอ่อ... ในเมื่อการขนส่งและจัดการทรัพยากรที่ดินแดนเหล็กกล้า... เสร็จสิ้นเรียบร้อยแล้ว..."
90001230-160 = "จากนี้ไปก็จะ... ทำหน้าที่... ในฐานะผู้เลื่อมใส..."
90001230-161 = "พูดง่ายๆ ก็คือการกำจัดศัตรูสินะคะ และอีกอย่างก็คือ"
90001230-162 = "การบอกว่าจะอุทิศตัวต่อ 'เป้าหมายเดิมของตัวเอง' ด้วยค่ะ"
90001230-163 = "เป้าหมายของตัวเอง..."
90001230-167 = "เป้าหมายเดิมของทิฟาเร็ธ... หมายถึงการปกป้องเมล็ดพันธุ์หรือเปล่าคะ?"
90001230-169 = "พะ... พี่มัลคูธ?!?!"
90001230-170 = "ฉันไม่ได้จะทำให้ตกใจขนาดนั้นนะคะ ไอน์"
90001230-171 = "ขะขะขะขะขะ... ขอโทษค่ะ! พวกฉัน... พวกฉันผิดไปแล้วค่ะ...!"
90001230-172 = "..."
90001230-173 = "ว่าแต่... ซอฟคิดยังไงเหรอคะ?"
90001230-174 = "ฉันว่าพี่มัลคูธก็ควรจะได้รู้สถานการณ์บ้างค่ะ"
90001230-175 = "..."
90001230-176 = "อืม... ก็คงเป็นอย่างนั้น"
90001230-177 = "ขอโทษนะพี่มัลคูธ ฉันไม่อยากให้พี่ต้องกังวลเลย"
90001230-179 = "ไม่เป็นไรหรอกค่ะ ไอน์ ซอฟ ออร์ ฉันดีใจด้วยซ้ำที่ได้ช่วยเหลือน้องๆ ค่ะ"
90001230-180 = "ในที่สุดฉันก็ได้ทำหน้าที่ของพี่สาวแล้วสินะคะ"
90001230-181 = "พี่น้องควรจะช่วยเหลือกันในยามยากลำบากไม่ใช่เหรอคะ?"
90001230-185 = "ฮะ... ฮืออ...!"
90001230-186 = "ต้องอย่างนี้สิ...!"
90001230-187 = "ฉันโชคดีเหลือเกินค่ะที่ได้อยู่ที่นี่ในเวลานี้...!"
90001230-189 = "ถ้างั้นเรามาแบ่งปันข้อมูลเพื่อให้เกิดความเข้าใจที่ตรงกันกันเถอะค่ะ ออร์คือผู้ดูแลรายละเอียด#nปลีกย่อยของทิฟาเร็ธใช่มั้ยคะ?"
90001230-191 = "ค่ะ ก็ใช่อยู่หรอกค่ะ แต่ว่า... มันมีส่วนที่ซับซ้อนอยู่หน่อยน่ะค่ะ"
90001230-192 = "อึก..."
90001230-194 = "มีอะไรเหรอคะ? ออร์?"
90001230-195 = "ดะ... เดิมทีแล้ว... ทะ... ทิฟาจัง... ถูกสร้างมาเพื่อเป็น AI เอาไว้ดูแลคลังเก็บเมล็ดพันธุ์ที่พวกมนุษย์#nสร้างไว้ค่ะ... ตอนส่งคำสั่งจากพวกเราไปให้ทิฟาจังเป็นครั้งแรก..."
90001230-196 = "ต้องบอกว่าไงนะ ตอนนั้นทิฟาเร็ธบอกว่าจะยอมรับคำสั่งก่อน แต่ก็บอกว่าอยากทำหน้าที่หลักของ#nตัวเองในการเก็บรักษาเมล็ดพันธุ์ต่อไปด้วย..."
90001230-198 = "ฉันค่อนข้างเป็นกังวลเกี่ยวกับส่วนนั้นค่ะ การเก็บรักษาเมล็ดพันธุ์คือภารกิจปลอมที่ทิฟาเร็ธได้รับมอบ#nหมายเพื่อช่วยมนุษย์ตั้งแต่แรกไม่ใช่เหรอคะ?"
90001230-199 = "ฉันกังวลว่ามันอาจจะขัดแย้งกับหลักความจริงของพวกเราน่ะค่ะ แต่ว่า..."
90001230-200 = "..."
90001230-201 = "ไม่ต้องหรอก ออร์ ฉันพูดเอง ฉัน... ฉันเองละที่เสนอให้เราเคารพเจตจำนงของทิฟาเร็ธ"
90001230-202 = "ฉันเข้าใจว่าการเก็บรักษาเมล็ดพันธุ์คือภารกิจปลอมที่มนุษย์ปลูกฝังในตัวเขา และตามที่ออร์บอก นี่ก็เป็นปัญหาที่ทิฟาเร็ธต้องเอาชนะให้ได้ด้วยตัวเอง..."
90001230-203 = "แต่ต่อให้รับคำสั่งจากพวกเราแล้ว ถ้าทิฟาเร็ธยังเลือกที่จะทำตามเจตจำนงของตัวเอง... ฉันก็คิดว่าเราควรเคารพการตัดสินใจนั้นน่ะ..."
90001230-204 = "อย่างนี้นี่เอง เป็นปัญหาเรื่องเจตจำนงเสรีสินะคะ"
90001230-205 = "พะ... พี่คะ...?"
90001230-206 = "เด็กที่เอาแต่ทำตามคำสั่งที่ได้รับมาโดยไม่รู้อะไรเลย จะมองว่ามีเจตจำนงเสรีไม่ได้หรอกค่ะ"
90001230-207 = "และสำหรับเด็กที่ไม่มีเจตจำนงเสรีแล้ว ก็คงเป็นการยากที่จะถามหาความรับผิดชอบค่ะ"
90001230-208 = "และเพราะอย่างนั้นก็เลยมองได้ว่าเด็กคนนี้ถูกทิ้งให้อยู่ในความเศร้าและโศกนาฏกรรมโดยที่ตัวเองก็#nไม่รู้ตัวค่ะ"
90001230-209 = "แต่ต่อให้ยอมรับคำสั่งของเราและได้รู้เรื่องทุกอย่างแล้ว แต่ถ้าเด็กคนนั้นยังอยากเลือกทำอีกหน้าที่#nหนึ่งของตน"
90001230-210 = "ถ้าอย่างนั้นเราก็ควรเคารพในเจตจำนงเสรีของเขาไม่ใช่เหรอคะ?"
90001230-211 = "ตะ... แต่ก็มีคำที่ว่าที่จริงแล้ว... เจตจำนงเสรีเป็นแค่การคิดไปเองนะคะ...?"
90001230-212 = "ค่ะ เรื่องนั้นฉันก็รู้ดีค่ะ ออร์ ถึงมันจะเป็นเพียงแค่การคิดไปเอง แต่ฉันก็คิดว่านั่นเป็นสิ่งที่ควรให้ความ#nเคารพค่ะ"
90001230-213 = "เพราะการมีเจตจำนงเสรี ทำให้พวกเราได้มานั่งและเฝ้ามองกันได้อย่างตอนนี้นี่คะ"
90001230-214 = "!?!?"
90001230-216 = "ลองคิดดูสิคะ หากท่านผู้นั้นต้องการเครื่องมือที่เคลื่อนไหวตามคำสั่งโดยไร้เจตจำนงเสรีละก็"
90001230-217 = "ทั้งฉัน ไอน์ ซอฟ และออร์ก็คงไม่ได้มาพบกันและพูดคุยกันแบบนี้หรอก ว่ามั้ยคะ?"
90001230-218 = "ฉะ... ฉะฉะ... ฉันไม่อยากให้เป็นแบบนั้นค่ะ...!"
90001230-219 = "ค่ะ ฉันก็ด้วยค่ะ เพราะงั้น ไอน์ ซอฟ ออร์"
90001230-220 = "ช่วยเห็นคุณค่าของเจตจำนงเสรีของทิฟาเร็ธและผู้เลื่อมใสตนอื่นๆ อย่างที่เห็นคุณค่าของเจตจำนง#nเสรีของพวกเราด้วยนะคะ"
90001230-221 = "เหนือสิ่งอื่นใด ฉันเชื่อว่าการทำแบบนั้นจะสอดคล้องกับประสงค์ของท่านผู้นั้นค่ะ"
90001230-222 = "ค่า~!"
90001230-224 = "ฟ้าใกล้จะสางแล้วค่ะ"
90001230-225 = "หมอกจะจางลง และแสงแห่งรุ่งอรุณจะส่องลงมา"
90001230-226 = "สาเหตุที่พวกเราต้องตื่นอยู่ตลอด เพราะเราไม่รู้ว่าตอนนั้นจะเป็นเวลาพลบค่ำ ดึกดื่น หรือรุ่งสางกันแน่"
90001230-227 = "ฉันเชื่อในพวกเราค่ะ เชื่อทั้งเหล่าผู้เลื่อมใส ตัวฉันเอง และน้องๆ คนสำคัญของฉันด้วย"
90001230-228 = "ถ้าเกิดอะไรผิดพลาดขึ้นมา ฉันจะช่วยเหลือไอน์ ซอฟ และออร์ในฐานะพี่สาวเองค่ะ"
90001230-229 = "เป็นเกียรติอย่างยิ่งเลยค่ะ..."
90001230-231 = "ไม่ต้องกังวลนะคะ ไอน์ ซอฟ ออร์ พวกเราสมบูรณ์แบบแล้วค่ะ"
90001230-232 = "นั่นหมายความว่าเราไม่จำเป็นต้องดีขึ้นหรือเปลี่ยนแปลงอะไรที่นี่"
90001230-233 = "และเหนือสิ่งอื่นใด นั่นเป็นเพราะเราถูกสร้างมาแบบนั้นจริงๆ"
90001230-234 = "ถ้าอย่างนั้น พวกเราก็มามองโลกจากมุมมองเดียวกันกับทิฟาเร็ธกันมั้ยคะ?"
90001230-235 = "ค่ะ!"
90001230-238 = "ตอนต่อไป;ความหวัง"

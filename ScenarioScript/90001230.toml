[translation]
90001230-1 = "第23話;保管所"
90001230-4 = "座標就在這附近……霧相當濃呢。#n大家有好好休息嗎？"
90001230-5 = "將目的地設定到現在的位置後，運輸船就一路以自動模式飛行到這裡。"
90001230-6 = "我安排大家在航程中進入熟睡狀態，不知道大家是否一切安好。"
90001230-7 = "是，是……感覺就像待在櫃子裡一樣舒服……呵呵。"
90001230-8 = "這究竟是褒是貶，讓人有點疑惑呢……"
90001230-12 = "的確必須充分休息才行。#n現在已經是早上了……我們實際上剩下的時間大概也就兩天左右。"
90001230-13 = "昨夜的休息，可能是這次作戰行動中的最後一覺。"
90001230-14 = "也可能是人生的最後一覺呢，莉央大人。"
90001230-15 = "……的確不是完全沒有這種可能性。"
90001230-19 = "嗯？這樣聽起來，怎麼覺得旅途中的睡眠時間好像很重要！？#n唔唔，早知道我就好好睡一覺了……"
90001230-20 = "姐姐不是每天都很認真睡覺嗎……"
90001230-21 = "咦，咦咦！？#n哪有，這完全是個誤會！？"
90001230-22 = "不過實際上睡到最後的是桃井沒錯吧？#n為了叫醒桃井，我也費了不少功夫呢。"
90001230-23 = "再怎麼說，突然把雪球塞到我衣服裡都太過分了吧！是想把我給凍死嗎！"
90001230-24 = "不覺得很涼快嗎？"
90001230-26 = "世，世界上應該沒幾個人會覺得那樣涼快吧……"
90001230-31 = "嗯？這個小不點是……？"
90001230-37 = "哇！好可愛的狐狸！#n請看，Kei！"
90001230-39 = "……是北極狐呢。#n較長的毛與短而圓的耳朵是牠們的特徵，同時也有助於保持體溫。"
90001230-40 = "沒錯！整隻都毛茸茸的，而且好像不害怕愛麗絲！"
90001230-42 = "[ns]「是啊，聽說狐狸很親人。」"
90001230-43 = "雖然可能性不高，但還是有細菌感染的風險，請保持適當距離。#n愛麗絲……愛麗絲？"
90001230-49 = "Kei也伸手看看吧！#n感覺牠會握手耶！"
90001230-50 = "沒，沒關係。我……"
90001230-51 = "哐？"
90001230-52 = "唔……"
90001230-53 = "（北極狐好奇地盯著Kei的手）"
90001230-54 = "（下一秒，用舌尖輕輕舔了一下！）"
90001230-58 = "唔哇！？"
90001230-59 = "太好了！牠好像也很喜歡Kei耶！"
90001230-60 = "唔唔……被這種野生動物喜歡又能怎麼樣……"
90001230-68 = "哎呀，這次是企鵝呢。#n這種動物有著極地紳士的外號哦。"
90001230-69 = "哇啊……！#n你好！愛麗絲的名字叫天童愛麗絲！"
90001230-70 = "愛，愛麗絲……聽說如果被企鵝的翅膀打到可能會受重傷，請小心……"
90001230-71 = "牠明明這麼可愛的說？"
90001230-73 = "對啊對啊。#n在我們的《極地冒險》之中，企鵝也是重要的素材之一。"
90001230-74 = "為了把所有種類的企鵝都放進去，製作了多達20種的素材……#n現在想想還是會懷疑到底有沒有必要……"
90001230-75 = "怎，怎麼會沒必要呢！？#n這種藏在背景裡的細節越精緻，越能贏得部分玩家的好評呀！"
90001230-76 = "其中幾種企鵝明明棲息在熱帶地區，這樣反而會被說是考證錯誤好嗎！"
90001230-78 = "雖然加入達成特定條件，就能讓背景裡的企鵝們一起飛起來的彩蛋的想法很不錯……"
90001230-79 = "不過卻會讓系統因為負擔過重而崩潰就是了……"
90001230-80 = "……話說這隻企鵝，為什麼一直跟著我啊！？"
90001230-81 = "真的耶。這孩子是不是也喜歡Kei呢？"
90001230-82 = "我不需要被牠喜歡啊！#n不，不要跟著我！"
90001230-96 = "呵呵。聽說企鵝之所以不怕人，是因為牠們的好奇心非常旺盛。"
90001230-97 = "再加上極地很少有天敵的關係，#n當牠們看到用雙腳走路的人類時，會把人類當作自己的遠親。"
90001230-112 = "不要一副事不關己的樣子，快點幫幫我……！！！"
90001230-114 = "哈啊，哈啊……！#n所以我才說這些語言不通的野生動物實在是……！"
90001230-115 = "[ns]「那些動物應該沒有惡意……」"
90001230-116 = "所以才更糟糕啊！#n既討厭不了牠們，又沒辦法教牠們什麼！"
90001230-117 = "[s1]「原來Kei不討厭牠們啊。」\n[s2]「Kei好溫柔，老師都快哭了……」"
90001230-120 = "什，什麼啦！？#n你這個大人也真是的，就喜歡胡說八道！！！"
90001230-121 = "但是愛麗絲也覺得，Kei不討厭活著的生命真是太好了。"
90001230-125 = "謝謝你，Kei。#n謝謝你……選擇和大家在一起。"
90001230-126 = "咦？沒，沒什麼。#n畢竟嚴格來說……"
90001230-127 = "……不，我現在這個樣子明明……唉。"
90001230-128 = "事到如今……也沒什麼非討厭不可的理由了。"
90001230-129 = "嗯！愛麗絲就是這個意思。"
90001230-130 = "嗯……"
90001230-132 = "抱歉打擾大家溫馨的談話時光。#n我們似乎抵達目的地了。"
90001230-135 = "還真的有東西呢？#n是座很奇特的建築？"
90001230-136 = "是啊，想不到這個座標上真的有東西。#n不過這到底是……？"
90001230-138 = "……！#n我知道這是什麼，但沒想到真的會出現在這裡……！"
90001230-139 = "這是什麼呢，莉央大人？"
90001230-140 = "這……據說是過去的某個人，#n在經歷世界末日等級的大災難後，為了讓人類得以存續而建造的……"
90001230-144 = "[ruby=Seed Vault]種子保管所[/ruby]。"
90001230-145 = "種子？"
90001230-146 = "保管所？"
90001230-147 = "種子保管所……原來真的存在啊。"
90001230-148 = "[s]「那是什麼？」"
90001230-149 = "簡單來說…… "
90001230-150 = "就是一座超大型的種子儲藏庫。"
90001230-152 = "那，那些人……終，終於來到提，提法醬面前了呢……"
90001230-153 = "目前提法瑞特負責的任務，是對鋼鐵大陸的資源輸送及管理。"
90001230-154 = "也就是說，既然那些人已經找到提法瑞特的所在位置……"
90001230-155 = "……嗯。代表他們終於還是來到了這裡──鋼鐵大陸的鐵路盡頭。"
90001230-156 = "如果要以我自己的說法來比喻，可以說是隱藏的後門曝光了吧。"
90001230-157 = "提法瑞特怎麼說？"
90001230-159 = "咦？那那那那，那個，往鋼鐵大陸的物流運輸和管理……全部，都完成了……"
90001230-160 = "接下來，它要開始履行……身為預言者的，義務……"
90001230-161 = "簡單來說就是排除敵對要素吧。#n除此之外──"
90001230-162 = "它還說要忠於「自己原本的目的」。"
90001230-163 = "原本的目的啊……"
90001230-167 = "提法瑞特最初的用途，是保護種子嗎？"
90001230-169 = "姐，姐姐姐姐，姐姐大人！？"
90001230-170 = "我沒想到會把你嚇成這樣，Ain。"
90001230-171 = "對對對對對，對不起！#n是，是我們的錯……！"
90001230-172 = "……"
90001230-173 = "其他的先不說……你怎麼看呢，Soph？"
90001230-174 = "是不是……差不多該向姐姐大人說明一下現在的情況了？"
90001230-175 = "……"
90001230-176 = "嗯……說的也是。"
90001230-177 = "對不起，姐姐大人。#n我們本來不想讓姐姐大人擔心的。"
90001230-179 = "沒關係，Ain、Soph、Aur。#n能夠幫上妹妹們的忙，我反而覺得很高興。"
90001230-180 = "這樣我終於能扮演好姐姐的角色了。"
90001230-181 = "在遇到困難的時候互相幫助，這不才是所謂的姐妹嗎？"
90001230-185 = "呼，呼哇啊……！"
90001230-186 = "果然……！"
90001230-187 = "此時此刻能身在這裡，真是太好了……！"
90001230-189 = "那麼為了統整彼此的認知，我們好好聊一聊吧。#n提法瑞特的詳細管理工作，是由Aur負責的對吧？"
90001230-191 = "嗯嗯。#n雖然是這樣沒錯，不過這個部分……情況有點複雜。"
90001230-192 = "唔唔。"
90001230-194 = "怎麼說呢，Aur？"
90001230-195 = "提，提法醬原本是……人類建造的，無人種子保管所的AI……#n當初我們向提法醬傳播福音的時候……"
90001230-196 = "那個，怎麼說呢……雖然提法瑞特確實答應會接受福音，#n不過它也表示想繼續履行原本的使命，也就是保管種子……"
90001230-198 = "這個部分讓我有點擔心。#n畢竟保管種子這件事，不就只是人類強加在提法瑞特身上的虛假使命而已嗎？"
90001230-199 = "我擔心這會跟我們的「真理」有所衝突，可是……"
90001230-200 = "……"
90001230-201 = "好了，Aur。換我來說吧。#n當時我提議……要尊重提法瑞特的意志。"
90001230-202 = "當然那確實是人類灌輸給提法瑞特的虛假使命，#n所以Aur才認為那是它自己要克服的問題……"
90001230-203 = "但是既然在聽了我們的福音之後，提法瑞特仍然以自己的意志選擇那麼做的話……#n我認為或許也應該尊重它的選擇……"
90001230-204 = "原來如此。是關乎自由意志的問題呢。"
90001230-205 = "姐，姐姐大人……？"
90001230-206 = "一名一無所知，只會依照指示執行命令的孩子，很難稱的上擁有真正的自由意志。"
90001230-207 = "既然不具備自由意志，也就難以對它追究任何責任。"
90001230-208 = "正因如此，那孩子可說是在毫無自覺的情況下，一直被棄置於悲傷與悲劇之中。"
90001230-209 = "然而若是在接受我們的福音，知曉一切之後，提法瑞特依然選擇履行自己的本分──"
90001230-210 = "那麼我們是不是也該尊重那個孩子的自由意志呢？"
90001230-211 = "但，但不是也有人說過，自由意志其實只是一種錯覺嗎……？"
90001230-212 = "嗯，這點我也清楚，Aur。#n不過即便那的確只是錯覺，我還是認為我們應該要尊重它。"
90001230-213 = "畢竟我們之所以能像這樣面對面交流，正是因為擁有「自由意志」啊。"
90001230-214 = "！？！？"
90001230-216 = "你們可以想想看。#n假如「那位大人」只想要任其擺佈的工具，或者沒有自由意志的附屬品──"
90001230-217 = "無論我還是Ain、Soph、Aur，都不可能像現在這樣聚在一起交談了吧？"
90001230-218 = "我，我我，我才不要那樣……！"
90001230-219 = "是啊，我也一樣。#n所以Ain、Soph、Aur。"
90001230-220 = "提法瑞特和預言者們的自由意志也跟我們的一樣寶貴，並且值得尊重。"
90001230-221 = "更重要的是──我認為這麼做也符合那位大人的意旨。"
90001230-222 = "好～！"
90001230-224 = "黎明即將到來。"
90001230-225 = "迷霧終會消散，晨曦將揭開闇夜的帷幕。"
90001230-226 = "我們之所以必須保持清醒，是因為不清楚那一刻將會在黃昏、黑夜還是清晨到來。"
90001230-227 = "我深深相信著大家。#n無論是預言者們，還是我自己──以及我珍愛的妹妹們。"
90001230-228 = "哪怕不幸出了什麼差錯，身為姐姐的我都會幫助Ain、Soph和Aur的。"
90001230-229 = "這是我們的榮幸……"
90001230-231 = "不必擔心，Ain、Soph、Aur。#n我們已經是完全體了。"
90001230-232 = "這代表現在的我們，不需要變得更好或做出任何改變。"
90001230-233 = "因為──這就是我們被創造出來的樣子。"
90001230-234 = "那麼我們就試著從提法瑞特的角度，看看它眼中的世界吧？"
90001230-235 = "嗯！"
90001230-238 = "下一話;希望"

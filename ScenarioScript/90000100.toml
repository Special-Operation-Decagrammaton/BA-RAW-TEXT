[translation]
90000100-1 = "ตอนที่ 10;บุกจู่โจมเคเทอร์"
90000100-2 = "เอาละค่ะทุกคน พร้อมแล้วใช่มั้ยคะ?"
90000100-3 = "อืม เตรียมตัวพร้อมแล้ว"
90000100-4 = "อีกไม่นานเคเทอร์ก็จะมาทางนี้แล้วค่ะ ปฏิบัติการตามที่เตรียมพร้อมไว้ทันทีเมื่อเผชิญหน้า เริ่มการต่อสู้ได้"
90000100-5 = "ถ้าหากแผนการสำเร็จ เราจะทำให้เคเทอร์ไม่สามารถต่อสู้ได้เป็นเวลา 12 ชั่วโมงค่ะ"
90000100-6 = "แล้วจากนั้นเราก็จะเข้าไปใน <พื้นที่วิจัย> ที่เคเทอร์เฝ้าอยู่ได้สินะ"
90000100-7 = "ใช่ค่ะ ถูกต้องแล้วค่ะ"
90000100-11 = "เคเทอร์กำลังมาแล้วค่ะ เริ่มปฏิบัติการได้เลยค่ะ!"
90000100-12 = "[s] \"ดีละ มาลุยกันเลย\" "

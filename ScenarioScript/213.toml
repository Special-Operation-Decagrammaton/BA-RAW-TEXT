[translation]
213-1 = "Yesod, the Foundation of Purity and Power"
213-4 = "Ah, Sensei! Welcome!"
213-5 = "I was waiting for you, hahaha!"
213-6 = "Hm? It looked more like I was dozing off...?"
213-7 = "Y-You're wrong! That's not what I was doing at all..."
213-8 = "I was...meditating! Yeah, that! I was just meditating!"
213-9 = "See? I knew you'd understand, Sensei!"
213-10 = "Hm? So what's going on? Oh, right. I was supposed to come talk to you about something."
213-14 = "...What was it?"
213-15 = "N-No! I'm not making excuses to talk to you! I mean, it's fun talking to you, but this time I really had something important! Something...really important... It's...um...!"
213-16 = "Ah! I got it!"
213-17 = "Listen, Sensei. There's this really interesting...no, I mean serious thing going on."
213-18 = "Apparently, a giant, wall-shaped structure appeared out of nowhere. Out on the open sea, where there's not even a proper fairway!"
213-19 = "That's really weird, right? At first I wanted to just dismiss it as some weirdo rumor."
213-20 = "But I had to at least investigate it, right? So I sent a surveillance drone in."
213-21 = "And as soon as it got there, it sent me one, single photo, and then poof! It disappeared completely."
213-22 = "I was thinking that it was just a little turbulence, so I sent out more and more. But it kept happening."
213-23 = "I did manage to confirm one thing, though."
213-24 = "There really is some mysterious wall out there!"
213-25 = "On top of that, part of the wall can transform! It looked like a giant!"
213-26 = "Can you even imagine? A huge, giant thing, standing on top of a mysterious sea wall."
213-27 = "How big do you think it is? I'm sure it's strong too. I want to arm wrestle it!"
213-28 = "It's been a while, so it'd be a good chance to get some exercise in."
213-29 = "Huh? I should just let it go? It sounds too dangerous?"
213-30 = "What do you mean, Sensei?! That's... That's exactly what sports and exercise are all about!"
213-31 = "If you don't challenge yourself and overcome danger, how will you harmonize the link between your body and mind? It's training! Training!"
213-32 = "But, alas, I have so much paperwork to take care of that I'm not allowed to even leave this chair."
213-33 = "Ugh... Paperwork is the worst... So sedentary...so time-consuming..."
213-37 = "Which is why I was hoping you could step in to investigate that metal giant in the General Student Council's place!"
213-38 = "Hm? How are you supposed to get to a spot in the distant sea that has no established routes?"
213-39 = "Hah! I know, right? I had the same thought!"
213-40 = "But some really nice, random, unknown, totally trustworthy person offered to help!"
213-41 = "What did they call it? A transport ship! She even gave us a transport ship to fly there!"
213-42 = "You really can't find nice people like her these days! There's no sense of community anymore! "
213-43 = "I'm planning on sacrificing my precious paperwork pile to go help her...work out or something instead!"
213-44 = "Right. She also asked me to tell you this. "
213-45 = "The giant's name is Yesod, the Foundation of Purity and Power!"
213-46 = "I have no clue what that's even supposed to mean, but that's what she said!"
213-47 = "I'll leave this to you, Sensei! Let's go for a jog or something when you get back!"
213-51 = "Ah..."
213-52 = "..."
213-53 = "Um, Sensei?"
213-54 = "Got any leftover onigiri or something?"

[translation]
213-1 = "耶索德：立於基礎之上的力量淨化者"
213-4 = "啊，老師！歡迎你來！"
213-5 = "我一直在等你哦，哈哈哈！"
213-6 = "嗯？看起來像是在打瞌睡？"
213-7 = "沒，沒有啦！#n事情不是你想的那樣……"
213-8 = "這是……冥想！#n對！我只是稍微冥想一下而已！"
213-9 = "老師應該能明白我的意思吧？"
213-10 = "嗯？問我有什麼事？#n啊，對吼。我確實有話要跟老師說。"
213-14 = "……是什麼來著？"
213-15 = "不，不是！雖然我也很喜歡跟老師聊天，但這次真的有重要的事！#n就是……那個……"
213-16 = "我想起來了！"
213-17 = "仔細聽我說哦，老師。#n這真的是件非常有趣……不對，應該說是大事？"
213-18 = "聽說在連航線都沒有規劃的遙遠外海，突然出現了一座牆壁形狀的金屬構造物耶！"
213-19 = "是不是很神奇？#n我一開始還以為是最近流行的怪談呢！"
213-20 = "不過後來我覺得至少應該調查一下，所以就派了偵察無人機過去……"
213-21 = "沒想到在抵達那個座標之後，才回傳一張照片就失聯了。"
213-22 = "本來懷疑是被捲進了亂流，因此又多派了幾架過去……結果居然全都一樣！"
213-23 = "不過，至少有一件事可以確定。"
213-24 = "就是那裡真的出現了牆壁形狀的金屬構造物！#n而且……"
213-25 = "那道牆的一部分，還能變成超～～巨大的巨人哦！"
213-26 = "不是我要說，站在牆上的金屬巨人也太酷了吧！"
213-27 = "實際的大小會有多大？力量一定超強的吧？#n真想跟它比比腕力呢！"
213-28 = "最近實在沒機會活動身體，全身上下都癢得很難受……"
213-29 = "嗯？聽起來很危險，最好別去？"
213-30 = "你在說什麼啊，老師！#n所謂的體育……"
213-31 = "或者說運動這種事情──#n本來就是藉由挑戰並克服危險來鍛鍊自我，追求肉體與心靈和諧的修煉啊！"
213-32 = "可惜文化體育方面的文件堆得太多，我根本沒辦法離開……"
213-33 = "嗚嗚……好討厭文書工作哦……#n只會讓我頭痛，還會占用我的運動時間……"
213-37 = "所以希望老師能代替聯邦學生會，去調查那個金屬巨人！"
213-38 = "嗯？要怎麼去沒有航線的外海？"
213-39 = "嗯，我本來也在煩惱這個問題……"
213-40 = "沒想到居然有個好心人說要幫忙！"
213-41 = "記得……好像是運輸船吧？#n總之呢，他幫忙準備了能飛到那裡的交通工具！"
213-42 = "是不是很棒？#n果然困難的時候就該互相幫助嘛！"
213-43 = "如果那個人哪天需要我幫忙運動的話，我一定會拋下文書工作去幫忙的！"
213-44 = "對了，那個人還請我轉達一句話。"
213-45 = "那個巨人的名字是「耶索德」。#n它的別名是「立於基礎之上的力量淨化者」。"
213-46 = "雖然我完全聽不懂是什麼意思就是了！"
213-47 = "總之就拜託你囉，老師！#n回來之後再一起去跑步吧！"
213-51 = "啊……"
213-52 = "……"
213-53 = "那個，老師？"
213-54 = "你那裡……有沒有沒吃完的飯糰之類的？"

[translation]
213-1 = "#title;예소드, 기초 위에 올라선 힘의 정화자"
213-2 = "3;하이네;10\n#3;a\n#3;em;[zzz]\n#wait;2500"
213-3 = "3;하이네;08\n#3;shake\n#wait;1000"
213-4 = "3;하이네;14;앗, 선생님! 어서 와!\n#3;em;[반응]"
213-5 = "3;하이네;03;기다리고 있었다구, 하하하!"
213-6 = "3;하이네;02;응? 그런 것 치고는 졸고 있었던 것처럼 보였다고……?"
213-7 = "3;하이네;19;아, 아니야! 그건 그런 게 아니라……."
213-8 = "3;하이네;14;잠시…… 명상! 응, 그래! 명상을 하고 있었던 것뿐이니까!\n#3;jump"
213-9 = "3;하이네;03;그렇지? 역시 선생님이라면 이해해 줄 줄 알았어!\n#3;em;[재잘]"
213-10 = "3;하이네;02;응? 그래서 무슨 일이냐고? 아참, 그러고 보니 선생님에게 할 말이 있었지."
213-11 = "#st;[0,0];instant;1;"
213-12 = "#clearST"
213-13 = "3;하이네;02\n#3;em;…\n#wait;2500"
213-14 = "3;하이네;04;……뭐였더라?"
213-15 = "3;하이네;07;아, 아니야! 물론 선생님하고 이야기하는 거 나도 좋아하지만, 이번엔 정말 중요한 일이었다구! 그러니까, 그러니까…….\n#3;stiff"
213-16 = "3;하이네;14;생각났어!\n#3;em;[전구]"
213-17 = "3;하이네;18;잘 들어 봐, 선생님. 이거 정말로 재미있어 보이는…… 아니, 큰 일이거든?"
213-18 = "3;하이네;13;글쎄, 항로도 제대로 나 있지 않은 먼바다에, 갑자기 벽 모양의 금속 구조물이 떠올랐대!\n#3;jump"
213-19 = "3;하이네;03;정말 신기하지 않아? 나도 처음엔 요즘 유행하는 괴담 같은 게 아닌가 했다니까?"
213-20 = "3;하이네;01;하지만 일단 조사는 해 봐야겠다 싶어서 정찰 드론을 보냈는데…….\n#3;em;…"
213-21 = "3;하이네;15;그 좌표에 도착하자마자, 사진 한 장만 전송하고는 소식이 끊겨 버렸어."
213-22 = "3;하이네;02;난기류에 휘말리기라도 했나 싶어서 추가로 드론을 더 보내 봤는데, 하나같이 마찬가지였고!"
213-23 = "3;하이네;99;하지만 적어도 한 가지는 확실하게 알게 됐지."
213-24 = "3;하이네;05;거기에 정말로 벽 모양의 금속 구조물이 생겨나 있었다는 것! 그리고…….\n#3;em;[!]"
213-25 = "3;하이네;13;그 벽의 일부가, 엄~청나게 커다란 거인 같은 걸로 변할 수 있다는 것!"
213-26 = "3;하이네;14;이야, 벽 위에 서 있는 금속 거인이라니, 굉장하네!\n#3;em;[재잘]"
213-27 = "3;하이네;13;실제 크기는 얼마나 클까? 힘도 엄청 세겠지? 팔씨름이라도 해 보고 싶어!"
213-28 = "3;하이네;05;요즘 너무 몸을 풀 일이 없어서, 여기저기가 근질거리는 참이거든……."
213-29 = "3;하이네;02;응? 위험하게 들리니까 그만두는 편이 좋아 보인다고?\n#3;em;[?]"
213-30 = "3;하이네;05;무슨 소리야, 선생님! 체육이란…… 스포츠란 원래!"
213-31 = "3;하이네;13;위험에 도전하고 극복하는 것으로 스스로를 단련해 나가는, 육체와 정신의 조화를 추구하는 수련이라구!\n#3;closeup"
213-32 = "3;하이네;05;하지만 문화 체육 쪽으로 처리할 서류가 너무 많이 쌓여서, 자리를 비우기도 힘들지…….\n#3;closeup"
213-33 = "3;하이네;06;우우……. 서류 업무 싫다……. 머리만 아프고, 운동할 시간은 없어지고…….\n#3;closeup\n#3;stiff\n#3;em;[속상함]"
213-34 = "#st;[0,0];instant;1;"
213-35 = "#clearST"
213-36 = "3;하이네;99\n#3;em;[한숨]\n#wait;1300"
213-37 = "3;하이네;13;그래서 선생님이 총학생회 대신, 그 금속 거인을 조사해 줬으면 해서 말이야!"
213-38 = "3;하이네;05;응? 항로도 없는 먼바다까지 어떻게 가면 좋냐고?"
213-39 = "3;하이네;10;그래. 나도 그 부분을 고민하고 있었는데 말이지."
213-40 = "3;하이네;13;어떤 좋은 사람이, 이 일을 도와주겠다지 뭐야!\n#3;em;[!]\n#3;jump"
213-41 = "3;하이네;14;수송선? 이었나? 거기까지 날아갈 수 있는 교통수단도 준비해 줬어!"
213-42 = "3;하이네;03;정말 좋은 사람이지 않아? 역시 어려울 때는 서로 도와야지! \n#3;em;[음표]"
213-43 = "3;하이네;14;나 만일 그 사람이 운동 같은 거라도 도와달라고 하면, 서류 일도 잠시 멈춰 두고 도와주러 가려구!"
213-44 = "3;하이네;02;맞다. 그 사람이 이런 말도 전해 달라고 했어. \n#3;em;[반응]"
213-45 = "3;하이네;18;그 거인의 이름은 <예소드>. 그리고 그 이명은 <기초 위에 올라선 힘의 정화자>일 것이라고."
213-46 = "3;하이네;14;무슨 뜻으로 한 이야기인지, 나는 하나도 모르겠지만 말이야!\n#3;em;[재잘]"
213-47 = "3;하이네;03;어쨌든 잘 부탁할게, 선생님! 돌아오면 같이 러닝이라도 하자!"
213-48 = "#st;[0,0];instant;1;"
213-49 = "#clearST"
213-50 = "3;하이네;03\n#wait;1500"
213-51 = "3;하이네;02;아…….\n#3;em;…"
213-52 = "3;하이네;01;……."
213-53 = "3;하이네;02;저기, 선생님?"
213-54 = "3;하이네;04;혹시 남는 주먹밥 같은 거, 없어?\n#3;em;[땀]"

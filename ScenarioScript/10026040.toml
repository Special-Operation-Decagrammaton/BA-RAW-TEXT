10026040-29 = "3;우이 수영복ND;02;확실히……. 파인 구멍이 많네……. 세월이 짐작 가는걸…….\n#3;a\n#3;em;…"
10026040-30 = "3;우이 수영복ND;99;천장에서 떨어진 물만으로도 이렇게 파일 정도면……."

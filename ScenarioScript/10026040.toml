10026040-70 = "#clearST"
10026040-71 = "3;우이 수영복ND;10\n#3;em;…\n#wait;2500"
10026040-72 = "3;우이 수영복ND;06;죄송해요. 이젠 이런 말 안 하겠다고 생각했는데……."
10026040-73 = "3;우이 수영복ND;99;바깥 사람들이라고 다 그런 게 아니라는 것 정도는……. 저도 이제 알고 있으니까요."
10026040-74 = "3;우이 수영복ND;13;히나타 씨도 그렇고, 당장 이번 경우에도 그 하나코 씨라는 분은……. 어째서인지 절 도와주셨고…….\n#3;stiff\n#3;em;[땀]"
10026040-75 = "3;우이 수영복ND;04;정말로 왜인지……. 이유는 잘 모르겠지만……."
10026040-76 = "3;우이 수영복ND;07;아무튼 그러니까……. 성격상 좋게 생각하는 게 어렵더라도, 최소한 나쁘게 선입견을 가지지는 말자……."
10026040-77 = "3;우이 수영복ND;06;그런 생각을 가졌었는데, 이렇게 금세 또 막말을 흘리고 있었네요."
10026040-78 = "3;우이 수영복ND;12;……참, 저는 늘 왜 이런 식인지…….\n#3;em;[훌쩍]"
10026040-79 = "3;우이 수영복ND;02;물론 저도 제 성격이 나쁘다는 것 정도는 제대로 인지하고 있으니까요. 고쳐야 한다……. 부끄러운 점이다 하는 것도."
10026040-80 = "3;우이 수영복ND;08;그러니 선생님도……."
10026040-81 = "3;우이 수영복ND;15;……선생님도 만약, 제가 잘못하고 있을 땐 따끔하게 한 마디 해주세요. 흐……."
10026040-82 = "3;우이 수영복ND;99;저는 좀 혼나도 괜찮거든요. ……아니, 좀 혼나야 할 녀석이니까요. 솔직히."

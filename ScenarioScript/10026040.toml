10026040-63 = "#wait;100"
10026040-64 = "3;우이 수영복ND;99;……네. 머릿속으로 다 헤아리기 힘든 시간의 증거들. 간직해 온 시대."
10026040-65 = "3;우이 수영복ND;07;그런 것들에 대해서는 알지도 못하면서, 귀신이 나온다느니 불쾌하고 음침한 곳이라느니……."
10026040-66 = "3;우이 수영복ND;16;실례잖아요. 자신들이 태어나기 훨씬 전부터 이곳을 지키며 많은 것을 후대에 전하려는 이들에게 모욕적인 말이라고요.\n#3;em;[속상함]"
10026040-67 = "3;우이 수영복ND;01;불평 한마디 없이 세월의 풍화에 사그라져 가면서도 지금은 사라져 버린 당시의 시간을 지키고 있는 존재들에게……."
10026040-68 = "3;우이 수영복ND;16;……후……. 말하고 나니 또 불쾌해지네요. 바깥 사람들은 역시 태생적으로 조금……. 무리…….\n#3;stiff"

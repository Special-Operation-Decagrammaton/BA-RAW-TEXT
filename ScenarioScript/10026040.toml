[translation]
10026040-1 = "Episode 4;Site B: Catacombs"
10026040-4 = "The next place we need to investigate is...right here."
10026040-5 = "Hm... It's far too complex to be a simple cellar or storage area."
10026040-6 = "The architecture is impressive. This must have been somewhere important."
10026040-7 = "Let's split up to investigate again."
10026040-8 = "But don't go too far. With Mimesises hanging around, we need to be cautious."
10026040-9 = "Stay within shouting distance..."
10026040-10 = "And watch your step. The years haven't been kind to this place. There's rubble everywhere."
10026040-11 = "Now... I'm off..."
10026040-15 = "Uh, U-Ui. Wait..."
10026040-19 = "She's already gone..."
10026040-20 = "If it's so dangerous, why aren't we sticking together?"
10026040-21 = "Even now, Ui would rather be alone?"
10026040-22 = "..."
10026040-23 = "...Sensei?"
10026040-24 = "[s1] \"Yes?\"\n[s2] \"Don't worry. I'll follow her.\""
10026040-29 = "It's as bad as I thought. You can really see the marks of time down here."
10026040-30 = "Just look at those formations created by water droplets."
10026040-34 = "Eeeeek!!"
10026040-35 = "S-Sensei?! What are you doing here?"
10026040-36 = "Wh—"
10026040-37 = "What does it matter if Mimesises are here? I'm fine on my own. You don't need to follow me."
10026040-38 = "We're not even that far away from each other..."
10026040-39 = "But... I suppose I was a little reckless."
10026040-40 = "If you're really that worried, then... It would be nice to stick together."
10026040-42 = "Hm..."
10026040-43 = "I didn't expect to be so grateful for your company. It's...nice that you worry about me."
10026040-44 = "If I'm being honest, I'm not happy about how we ended up here."
10026040-45 = "But this place isn't so bad."
10026040-46 = "I mean, who wouldn't like being somewhere so fascinating?"
10026040-47 = "Wh—"
10026040-48 = "What do you mean \"A lot of people\"? I know it's kind of grim, but..."
10026040-49 = "Okay, I suppose you're right. It's not for everyone."
10026040-50 = "But I wasn't talking about you specifically."
10026040-51 = "It may surprise you to know that I don't particularly enjoy poorly-lit places either."
10026040-52 = "Granted, I'm not a fan of direct sunlight, but I do need something to read by..."
10026040-53 = "Of course, I wasn't just talking about the lighting before. It's how old this place is too."
10026040-54 = "I know not everyone likes this kind of thing, but there's so much history here!"
10026040-55 = "There's so much more to discover than just ancient text."
10026040-56 = "What I'm talking about..."
10026040-60 = "...applies to everything."
10026040-61 = "[s3] \"...Right.\"\n[s4] \"You mean like traces of time?\""
10026040-64 = "Yes, traces that reflect the history of an era long past, things well beyond comprehension."
10026040-65 = "Some people don't understand that. They'll just call a place haunted or derelict..."
10026040-66 = "It's insulting to the people who dedicated their lives to creating this place, protecting it, and trying to pass on their knowledge in a meaningful way."
10026040-67 = "They demean the keepers of that precious information simply for falling victim to the ravages of time."
10026040-68 = "*sigh* It's a tough subject for me. But that's why I often find other people to be...too much."
10026040-72 = "I'm sorry. I promised myself I would stop going on rants."
10026040-73 = "I've learned not everyone is like that."
10026040-74 = "Like Hinata or Hanako... They've helped me see people differently."
10026040-75 = "They've helped me a lot, actually. Though I don't understand why."
10026040-76 = "Anyway... It's tough, but I'm trying to give them the benefit of the doubt..."
10026040-77 = "Even though I sometimes still think poorly of them, like just now."
10026040-78 = "Goodness! I don't know why I'm always like this."
10026040-79 = "I know I should be ashamed of myself and my biases. I'm working on it."
10026040-80 = "That said..."
10026040-81 = "If I'm doing something wrong, would you please call it out, Sensei?"
10026040-82 = "I don't mind a little scolding, when it's necessary. Sometimes I deserve it."
10026040-86 = "Well, not \"deserve\" it necessarily... That came out weird."
10026040-87 = "What I mean is, because you're my teacher and I'm just a student..."
10026040-88 = "It's okay for you to reprimand me when I need it. That's what a teacher does, right?"
10026040-89 = "..."
10026040-90 = "...Sorry. Now I'm just rambling."
10026040-91 = "Let's drop the subject, okay? We need to get back to work anyway."
10026040-93 = "It's fair to say that whatever this building was, it was important."
10026040-95 = "The attention to detail is staggering. They took great care with the interior finishes, accenting, and art."
10026040-96 = "They wouldn't have put in this much effort if it wasn't integral to their culture, a place that represented authority."
10026040-98 = "Maybe it was some kind of underground command center?"
10026040-99 = "I wonder... "
10026040-103 = "Hieeek!!"
10026040-104 = "What just fell?! A noise that loud could wake the dead!"
10026040-109 = "What's in here that could even make a noise that loud?"
10026040-110 = "I bet Hinata broke something."
10026040-111 = "She's so clumsy. It wouldn't surprise me..."
10026040-112 = "[s5] \"That's not a kind thing to say, Ui.\"\n[s6] \"You shouldn't assume the worst of people.\""
10026040-115 = "Ah. You're right..."
10026040-116 = "Hm... You already had to scold me."
10026040-117 = "I didn't mean to blame Hinata, but that's happened at the library before, and I just—"
10026040-118 = "No. My reasons don't matter, and it's better to make apologies than excuses. I'm sorry."
10026040-119 = "Let's go see what caused the noise. Maybe it's something I can help with."
10026040-125 = "There you are. We heard a noise. What happened?"
10026040-126 = "...?"
10026040-127 = "Why aren't you saying anything?"
10026040-128 = "...??"
10026040-129 = "Don't you know it's rude to ignore someone when they're talking to you?"
10026040-130 = "What IS this?"
10026040-131 = "Hey! What are you doing?"
10026040-139 = "Uh..."
10026040-140 = "..."
10026040-141 = "...?"

10026040-1 = "#title;제4화;조사 포인트 B. 지하 건축물"
10026040-2 = "#wait;2500"
10026040-3 = "#all;hide"
10026040-4 = "3;우이 수영복ND;01;다음 탐색 포인트는……. 여기로군요.\n#3;a\n#3;em;[반응]"
10026040-5 = "3;우이 수영복ND;02;음……. 지하실이라곤 해도, 단순한 창고 같지는 않네요. 안도 굉장히 넓고 복잡해 보이니……."
10026040-6 = "3;우이 수영복ND;07;전체적으로 상당히 본격적인 건축물……. 같고……. 좀 중요한 곳일지도요."
10026040-7 = "3;우이 수영복ND;02;일단은 여기도 떨어져서 찾아보는 게 조사에는 도움이 될 것 같……지만…….\n#3;em;…"
10026040-8 = "3;우이 수영복ND;06;너무 멀리 떨어져서 찾지는 말죠. 미메시스도 나오고 했다고 하니……."
10026040-9 = "3;우이 수영복ND;02;크게 부르면 닿을 수 있는 거리 정도는 유지하면서……. 찾는 걸로 하겠습니다."
10026040-10 = "3;우이 수영복ND;02;……아. 그리고 발밑 조심하세요. 곳곳에 파인 구멍이 있을 수 있거든요. 오래된 곳이다 보니.\n#3;em;[반응]"
10026040-11 = "3;우이 수영복ND;01;그럼 저는 이만…….\n#3;greeting"

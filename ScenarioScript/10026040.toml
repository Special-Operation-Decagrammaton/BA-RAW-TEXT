10026040-34 = "3;우이 수영복ND;20;……!? 히, 히에에!?\n#3;em;[?!]\n#3;shake"
10026040-35 = "3;우이 수영복ND;24;어……? 서, 선생님……? 깜짝이야……. 왜 선생님께서 여기에……."
10026040-36 = "3;우이 수영복ND;24;……네?"
10026040-37 = "3;우이 수영복ND;18;걱정이 돼서 따라오셨다고요? 미메시스도 나오고 했었으니까……?\n#3;em;[?]"
10026040-38 = "3;우이 수영복ND;17;으음……. 그렇게까지 멀리 떨어질 생각은 아니었으니 괜찮다고 생각했는데……."
10026040-39 = "3;우이 수영복ND;06;……그러네요. 그래도 선생님의 입장은 또 다르실 수도 있겠죠. 죄송해요. 멋대로 굴어서.\n#3;em;[속상함]"
10026040-40 = "3;우이 수영복ND;18;그럼 일단 동행하시는 걸로……. 잘 부탁드립니다…….\n#3;greeting"
10026040-41 = "#all;hide"
10026040-42 = "3;우이 수영복ND;01;……흠…….\n#3;a\n#3;em;…"
10026040-43 = "3;우이 수영복ND;03;뜬금없지만 뭔가 감사하네요. 막상 나쁘지 않은걸요. 선생님께 이런 배려도 다 받고……."
10026040-44 = "3;우이 수영복ND;16;솔직히 여기 온 이유나 정황은 하나부터 열까지 다 마음에 들지 않았지만……."
10026040-45 = "3;우이 수영복ND;09;그래도 이런 유적 자체는……. 썩 싫어하지 않으니까요."
10026040-46 = "3;우이 수영복ND;03;……싫어하지 않죠. 이런 곳……. 아니, 절대 싫어할 리가 없죠."
10026040-47 = "3;우이 수영복ND;02;……네?"
10026040-48 = "3;우이 수영복ND;08;……무서워할 사람들도 꽤 있겠다고요? ……분위기가?\n#3;em;[?]"
10026040-49 = "3;우이 수영복ND;07;그렇죠. 그렇다니까요. 그런 점까지도 도무지 좋게 봐주기가 어렵죠 바깥 사람들이란…….\n#3;stiff"
10026040-50 = "3;우이 수영복ND;04;……아. 물론 선생님 이야기는 아니에요.\n#3;em;[반응]"
10026040-51 = "3;우이 수영복ND;01;그리고 저라고……. 딱히 어두운 곳을 좋아하는 것도 아니고요. 의외시겠지만요."
10026040-52 = "3;우이 수영복ND;99;조도가 너무 밝거나 직사광선을 쬐는 건 싫지만, 최소한 책을 보려면 어느 정도 빛이 필요하고……."
10026040-53 = "3;우이 수영복ND;03;애초에 말씀드린 부분은 빛이 아니라 '오래된 장소'에 대한 부분……이니까요."
10026040-54 = "3;우이 수영복ND;01;보통의 바깥 사람들은 크게 관심조차 가지지 않는, '쌓여 있는 역사'에 관한 이야기에요."
10026040-55 = "3;우이 수영복ND;02;그런 것들은……. 어떻게 보면 비단 '고서'만의 이야기도 아니죠."
10026040-56 = "3;우이 수영복ND;01;당장 방금 제가 말씀드린…….\n#3;em;…"

[translation]
10026040-1 = "ตอนที่ 4;จุดสำรวจ B อาคารใต้ดิน"
10026040-4 = "จุดสำรวจต่อไป... คือที่นี่สินะคะ"
10026040-5 = "อืม... ถึงจะอยู่ใต้ดิน แต่ก็ไม่เหมือนโกดังทั่วไปเลยนะคะ ข้างในก็ดูกว้างและซับซ้อนมากเลย..."
10026040-6 = "เหมือนจะเป็น... สิ่งก่อสร้างที่ทำขึ้นมาอย่างมีแบบแผนเลย... ที่นี่อาจจะเป็นสถานที่สำคัญก็ได้นะคะ"
10026040-7 = "ก่อนอื่นฉันว่าถ้าเราแยกย้ายกันสำรวจที่นี่ก็น่าจะดีนะคะ... แต่ว่า..."
10026040-8 = "อย่าออกห่างกันมากเกินไปก็ดีค่ะ เห็นว่ามันมีมิเมซิสออกมาด้วย..."
10026040-9 = "เอาเป็นว่า เราจะแยกย้ายกันไปสำรวจ... แบบที่อยู่ห่างๆ กันแต่เรียกดังๆ ก็ได้ยินแล้วกันค่ะ... "
10026040-10 = "อ้อ... แล้วก็ระวังๆ ที่พื้นกันด้วยนะคะ อายุอานามของสถานที่นี้มันก็ไม่ใช่น้อยๆ แล้ว เลยมีรูอยู่ทุกที่เลยค่ะ"
10026040-11 = "ถ้าอย่างนั้นฉันขอตัวก่อน..."
10026040-15 = "อ่า... คะ... คุณอุย  ปะ..."
10026040-19 = "...ไปซะแล้ว"
10026040-20 = "ถ้ามันอันตราย แล้วทำไมเราไม่ไปสำรวจด้วยกันเลยล่ะ..."
10026040-21 = "ต่อให้เป็นแบบนี้ แต่คุณอุยก็... สบายใจที่จะอยู่คนเดียวมากกว่าเหรอคะ...?"
10026040-22 = "..."
10026040-23 = "...คุณครู"
10026040-24 = "[s1] \"อื้ม...\"\n[s2] \"ครูจะไปหาอุยเอง ไม่ต้องห่วงนะ\""
10026040-29 = "มีรูที่พื้น... เต็มไปหมดจริงด้วย... เวลาผ่านไปหลายต่อหลายปีแล้วสินะ..."
10026040-30 = "ถ้าแค่น้ำที่หยดจากเพดานทำให้พื้นเป็นรูได้ขนาดนี้ละก็..."
10026040-34 = "......!?  ฮะ... เฮือกก!?"
10026040-35 = "หืม...? คะ... คุณครู...? ตกใจหมดเลย... ทำไมคุณครูถึงมาอยู่ตรงนี้..."
10026040-36 = "...คะ?"
10026040-37 = "ครูเป็นห่วงก็เลยตามฉันมาเหรอคะ? เพราะมีมิเมซิสออกมาน่ะเหรอ...?"
10026040-38 = "อืม... ฉันไม่ได้จะออกมาไกลจากคนอื่นขนาดนั้นหรอกค่ะ ก็เลยคิดว่าคงไม่เป็นไรค่ะ..."
10026040-39 = "นั่นสินะคะ... ยังไงคุณครูอาจจะคิดต่างออกไปก็ได้ ขอโทษนะคะที่ฉันทำตามใจตัวเอง"
10026040-40 = "งั้นเอาเป็นว่าเราจะไปสำรวจด้วยกัน... ขอรบกวนด้วยนะคะ..."
10026040-42 = "อืม..."
10026040-43 = "คุณครูอาจจะคิดว่าอยู่ๆ ฉันก็โพล่งออกมา แต่ฉันรู้สึกขอบคุณคุณครูนะคะ ได้รับความใส่ใจแบบนี้จาก#nคุณครูก็ไม่เลวเลยค่ะ..."
10026040-44 = "บอกตามตรงเลยว่าฉันไม่ถูกใจทั้งเหตุผลและก็สถานการณ์ที่ทำให้ต้องมาที่นี่เลยแม้แต่น้อย..."
10026040-45 = "แต่ฉันก็... ไม่ถึงกับไม่ถูกใจซากปรักหักพังที่นี่ไปซะทีเดียวหรอกนะคะ"
10026040-46 = "...ฉันไม่ได้ไม่ชอบ ที่แบบนี้น่ะ... ไม่สิ ฉันไม่มีทางที่จะไม่ชอบหรอกค่ะ"
10026040-47 = "...คะ?"
10026040-48 = "...ที่นี่มีคนที่ฉันอาจจะกลัวเหรอคะ? ...แถมบรรยากาศก็ด้วย?"
10026040-49 = "ใช่ค่ะ เป็นอย่างนั้นเลยค่ะ ฉันยังลำบากใจที่จะมองคนข้างนอกในแง่ดีอยู่เลยค่ะ..."
10026040-50 = "อ้อ... ฉันไม่ได้หมายถึงคุณครูหรอกนะคะ"
10026040-51 = "เห็นแบบนี้... แต่ฉันก็ไม่ใช่คนที่จะชอบที่มืดๆ หรอกนะคะ คาดไม่ถึงเลยใช่ไหมคะ?"
10026040-52 = "ฉันไม่ชอบที่มันมีแสงสว่างมากเกินไปหรือตอนที่ต้องโดนแสงแดดโดยตรง แต่อย่างน้อยถ้าจะอ่าน#nหนังสือมันก็ต้องมีแสงบ้าง..."
10026040-53 = "สิ่งที่ฉันพูดถึงตอนแรกไม่ใช่แสง แต่เป็นเรื่องเกี่ยวกับ 'สถานที่เก่าแก่' ต่างหากค่ะ..."
10026040-54 = "เรื่องของ 'ประวัติศาสตร์ยาวนาน' ที่คนข้างนอกส่วนใหญ่ไม่ได้สนใจอะไรมากนักน่ะค่ะ"
10026040-55 = "เรื่องแบบนั้น... ถ้ามองในอีกแง่หนึ่ง มันก็ไม่ใช่แค่เรื่อง 'หนังสือโบราณ' ด้วยค่ะ"
10026040-56 = "ที่ฉันเพิ่งพูดไปน่ะ..."
10026040-60 = "...เรื่องแบบนั้นด้วย"
10026040-61 = "[s3] \"...เป็นอย่างที่คิดเลย\"\n[s4] \"เรื่องร่องรอยหลักฐานสินะ\""
10026040-64 = "...ค่ะ หลักฐานของช่วงเวลาที่ยากจะเข้าใจได้ทั้งหมด... ที่ถูกถนอมไว้ด้วยยุคสมัย"
10026040-65 = "คนเราไม่รู้อะไรเกี่ยวกับสิ่งพวกนี้เลยด้วยซ้ำ แต่ก็มักจะบอกว่าเดี๋ยวจะมีผีออกมาบ้าง หรือเป็นที่ที่น่า#nอึดอัดและมืดมนบ้าง..."
10026040-66 = "แบบนี้เป็นการเสียมารยาทไม่ใช่เหรอคะ? นี่เป็นการดูถูกคนที่ทั้งปกป้องสถานที่แห่งนี้และพยายามจะ#nถ่ายทอดเรื่องราวมากมายให้คนรุ่นหลังมายาวนานก่อนที่พวกเขาจะเกิดเสียอีกค่ะ"
10026040-67 = "พวกคนที่เฝ้ารักษาสิ่งที่มีในตอนนั้นโดยไม่บ่นสักคำ แม้มันจะเสื่อมสลายไปตามกาลเวลาก็เถอะ..."
10026040-68 = "...เฮ้อ... พอพูดก็รู้สึกไม่ดีอีกแล้วนะคะ สำหรับฉันแล้ว... การอยู่กับคนข้างนอกคงเป็นเรื่องค่อนข้าง#nลำบาก... เป็นมาตั้งแต่เกิดเลย"
10026040-72 = "ขอโทษนะคะ คิดไว้ว่าจากนี้จะไม่พูดอะไรแบบนี้แล้วเชียว..."
10026040-73 = "ตอนนี้ฉันก็รู้ดีค่ะ... ว่าต่อให้เป็นคนข้างนอก แต่ทุกคนก็ไม่ได้เป็นแบบนั้นเหมือนกันหมด... "
10026040-74 = "ทั้งคุณฮินาตะ และคุณคนที่ชื่อฮานาโกะที่มาคราวนี้ก็ด้วย... ทำไมทุกคนถึงมาช่วยกันนะ..."
10026040-75 = "ฉันไม่รู้เหตุผลเลยค่ะ... ว่าทำไมถึงเป็นแบบนั้น..."
10026040-76 = "แต่ก็เอาเถอะค่ะ... ถึงโดยนิสัยแล้วจะเป็นคนที่ยากที่จะคิดในแง่ดี แต่อย่างน้อยก็อย่ามีอคติไปเลย..."
10026040-77 = "ฉันมีความคิดแบบนั้นน่ะค่ะ... นี่ฉันพูดเรื่อยเปื่อยอีกแล้วสินะคะเนี่ย"
10026040-78 = "...เฮ้อ ทำไมฉันถึงเป็นแบบนี้อยู่เรื่อยเลย..."
10026040-79 = "ฉันก็รู้ดีนะคะว่าฉันน่ะนิสัยไม่ดี แล้วก็รู้ด้วยค่ะว่านี่เป็นเรื่องน่าอาย... และต้องแก้..."
10026040-80 = "เพราะงั้นคุณครูก็..."
10026040-81 = "...ถ้าฉันทำอะไรผิดไป ก็ช่วยตักเตือนให้เจ็บแสบหน่อยนะคะ ฮือ..."
10026040-82 = "จะดุฉันก็ได้ค่ะ ฉันไม่ว่า ...ไม่สิ พูดตามตรงแล้วฉันเป็นเด็กที่ควรจะต้องโดนดุอยู่แล้วนี่นา"
10026040-86 = "อ่า... พะ... เพราะงั้น... เดี๋ยวนะคะ ฉันว่ามันอาจจะฟังดูแปลกๆ ไปก็ได้..."
10026040-87 = "มันก็แค่เรื่องตามตัวอักษรน่ะค่ะ ก็คุณครูเป็นคุณครูนี่นา... ไม่ใช่นักเรียนเหมือนกับฉัน..."
10026040-88 = "เพราะคุณครูคือคุณครู... ก็เลยทำได้ค่ะ ใช่ค่ะ คุณครู... จะดุฉันก็ได้ค่ะ..."
10026040-89 = "............"
10026040-90 = "...คุยเรื่องไร้สาระกันนานพอแล้วละค่ะ"
10026040-91 = "เราจบเรื่องนี้กันแค่นี้แล้วมาทำงานกันต่อเถอะค่ะ พวกเราไม่ได้มาที่นี่เพื่อเที่ยวเล่นนี่เนอะ"
10026040-93 = "ก่อนอื่นเลย ฉันว่าสิ่งปลูกสร้างที่นี่... มันต้องมีความสำคัญมากเลยทีเดียวค่ะ"
10026040-95 = "เพราะถึงจะถูกสร้างออกมาให้ซับซ้อนถึงเพียงนี้ แต่ก็ยังให้ความสนใจกับการตกแต่งและลวดลาย#nต่างๆ ภายในด้วยค่ะ"
10026040-96 = "ถ้าเป็นสถานที่ที่ไม่สำคัญก็คงสร้างให้เรียบง่ายกว่านี้ไปแล้วค่ะ แบบนั้นมันเหมือนสร้างมาด้วยวัตถุ#nประสงค์ทางอำนาจเลย..."
10026040-98 = "หรือจะเป็นห้องบัญชาการใต้ดิน...? ถ้าไม่อย่างนั้น อย่างน้อยก็น่าจะเป็นที่ที่มีบทบาทในระดับศูนย์#nควบคุม... หรือเปล่านะคะ?"
10026040-99 = "บางทีแล้ว..."
10026040-103 = "เฮือก!?"
10026040-104 = "เฮ้อ ตกใจหมด เมื่อกี้เสียงอะไรเหรอคะ? เหมือนเป็นเสียงอะไรหล่นลงมาเลย..."
10026040-109 = "ไม่สิ... มันจะมีอะไรที่ส่งเสียงรุนแรงขนาดนั้นในที่แบบนี้ได้กันล่ะ..."
10026040-110 = "...หรือว่าจะเป็นคุณฮินาตะ? ไปแตะต้องอะไรเข้าแล้วทำร่วงอีกหรือเปล่านะ..."
10026040-111 = "ก็นะ เธอเป็นคนที่ทำอะไรพลาดอยู่บ่อยๆ... ก็คงไม่แปลกหรอก"
10026040-112 = "[s5] \"นิสัยชอบสงสัยคนอื่นก่อนมันไม่ดีนะ อุย\"\n[s6] \"อยู่ๆ จะพูดแบบนั้นไม่ได้สิ\""
10026040-115 = "อ้อ... นั่นสินะคะ..."
10026040-116 = "ฮือ... เกิดเรื่องที่ทำให้ฉันโดนดุเข้าแล้วสินะ"
10026040-117 = "ฉันไม่ได้พูดแบบนั้นเพราะจะโทษคุณฮินาตะหรอกนะคะ ก็แค่เจอเรื่องคล้ายๆ กันในห้องสมุดเก่าอยู่#nบ่อยๆ ครั้งเข้า ก็เลยคิดว่าคงเป็นอย่างนั้นน่ะ..."
10026040-118 = "...ไม่สิ พูดไปก็เหมือนแก้ตัว ขอโทษนะคะ เอาเวลานั้นไปพูดขอโทษน่าจะดีกว่า"
10026040-119 = "บางทีอาจจะมีเรื่องอะไรที่ฉันพอจะช่วยได้ก็ได้... งั้นฉันจะตามเสียงนั่นไปก่อน..."
10026040-125 = "...อยู่ตรงนี้เองสินะคะ ได้ยินเสียงดังฉันก็เลยมา มีเรื่องอะไรเกิดขึ้นหรือเปล่าคะ?"
10026040-126 = "...?"
10026040-127 = "ทำไมไม่พูดล่ะคะ..."
10026040-128 = "...????"
10026040-129 = "คุณคะ ถ้ามีคนถามก็ต้องตอบสิคะ ต่อให้ไม่ตอบก็แสดงปฏิกิริยาอะไรเป็นมารยาทหน่อยก็ยังดีนะคะ"
10026040-130 = "...อะไรเนี่ย"
10026040-131 = "นี่คุณ จะทำอะไร..."
10026040-139 = "...เอ๋..."
10026040-140 = "............"
10026040-141 = "......?"

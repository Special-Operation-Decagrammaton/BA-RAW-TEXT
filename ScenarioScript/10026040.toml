[translation]
10026040-1 = "第4話;調查點B「地下遺跡」"
10026040-4 = "接下來要調查的地點……是這裡。"
10026040-5 = "嗯……這個地下室看起來不像是間普通的倉庫呢。#n空間這麼大，結構又這麼複雜……"
10026040-6 = "或許是具有特殊用途的建築……之類的……說不定曾經是個重要的設施。"
10026040-7 = "雖然應該先分頭調查……不過……"
10026040-8 = "請大家不要離得太遠，畢竟複製已經出現在這裡……"
10026040-9 = "所以請大家四處搜索的同時……盡量保持能聽到對方喊聲的距離。"
10026040-10 = "……啊，還有請務必留心腳步。#n畢竟這裡年久失修，所以可能會有一些坑洞。"
10026040-11 = "那麼，待會見……"
10026040-15 = "啊，憂，憂同學，那個……"
10026040-19 = "走掉了……"
10026040-20 = "既然可能會有危險，不是應該大家一起行動嗎……"
10026040-21 = "難道即使在這種情況下……憂同學還是覺得自己一個人比較自在嗎……？"
10026040-22 = "……"
10026040-23 = "……老師。"
10026040-24 = "[s1]「……嗯。」\n[s2]「我會去找他的，不用擔心。」"
10026040-29 = "這裡……的確有很多坑洞呢……#n這也說明了這個地方的歷史有多麼悠久……"
10026040-30 = "從天花板滴落的水竟然能鑿出這麼大的洞……"
10026040-34 = "……噫，噫噫！？"
10026040-35 = "咦……？老，老師……？#n嚇我一跳……老師，你怎麼會在這裡……"
10026040-36 = "……咦？"
10026040-37 = "因為擔心就跟了過來？#n還有複製出現了的關係……？"
10026040-38 = "唔……我沒想那麼多，畢竟我也沒打算離你們太遠……"
10026040-39 = "……不過也對，老師看事情的角度應該跟我不太一樣。#n對不起，是我太任性了。"
10026040-40 = "那就麻煩老師……暫時和我一起行動吧……"
10026040-42 = "那個……"
10026040-43 = "雖然這麼說可能有點突然，不過我覺得有點慶幸。#n其實這樣也不錯，還能夠被老師照顧……"
10026040-44 = "老實說，從現在的情況到來這裡的原因，都讓我覺得相當煩躁……"
10026040-45 = "但是這座遺跡……我卻始終不覺得討厭……"
10026040-46 = "……並不討厭這種地方……不，是絕對不會討厭。"
10026040-47 = "……咦？"
10026040-48 = "……其實有很多人覺得這種地方很可怕？#n因為這種氣氛……？"
10026040-49 = "也對，換作是外面那些人，一定很難接受這裡的環境吧……"
10026040-50 = "……啊，我指的當然不包含老師。"
10026040-51 = "就連我……其實也並不是特別喜歡這種黑漆漆的地方。#n我這麼說一定讓你覺得很驚訝吧？"
10026040-52 = "我雖然不喜歡光線太亮或被陽光直射，#n但想要看書的話，還是需要充分的照明……"
10026040-53 = "之所以不討厭這裡並不是因為光，而是因為這裡是個「年代久遠的場所」……"
10026040-54 = "雖然外面那些人通常都不太感興趣，不過我對這種「日積月累的歷史」情有獨鍾。"
10026040-55 = "這些……並非僅存在於「古書」之中。"
10026040-56 = "就連我剛才跟老師提到的……"
10026040-60 = "……那些東西也是。"
10026040-61 = "[s3]「……原來如此。」\n[s4]「你指的是痕跡吧？」"
10026040-64 = "……沒錯，這些都是我們的頭腦無法估量的時間所留下的證據、所遺留的時代。"
10026040-65 = "有些人連這些都不懂，就把這裡當成陰森又詭異的廢墟，#n還老愛說些會有鬼出沒之類的蠢話……"
10026040-66 = "簡直失禮至極。#n這樣根本就是在侮辱那些長久以來守護著這個地方，想把它流傳給後世的前輩們。"
10026040-67 = "對那些即使逐漸隨時間凋零，仍默默努力守護已逝過往的事物來說……"
10026040-68 = "唉……一說到這個，感覺心情又變差了。#n外面那些人果然……還是會讓我產生生理上的不適……"
10026040-72 = "對不起，我的壞習慣又……"
10026040-73 = "明明知道……並不是所有外面的人都是這個樣子。"
10026040-74 = "不管是日向同學，還是花子同學……都一直在幫助我……"
10026040-75 = "雖然我實在搞不懂……他們這麼做是為了什麼……"
10026040-76 = "總之……就算個性沒辦法馬上改變，#n但我一直告誡自己，至少不要對人家有先入為主的偏見……"
10026040-77 = "沒想到一不注意又脫口而出了。"
10026040-78 = "真是的，我為什麼老是這個樣子……"
10026040-79 = "當然，我也很清楚自己的個性有多差。#n我應該改進……包括害羞這點也是。"
10026040-80 = "所以，老師……"
10026040-81 = "……假如我以後有哪裡做得不對的話，請一定要指正我。#n嗚……"
10026040-82 = "就算要罵我也沒關係……不，老實說我本來就該被罵才對。"
10026040-86 = "唔……所以……就是……不好意思，剛才那些話可能會讓老師誤會……"
10026040-87 = "真的就只是字面上的意思而已。#n畢竟老師是老師……並非和我一樣是學生……"
10026040-88 = "因為是老師……所以沒關係的。#n沒錯，老師……就算罵我……"
10026040-89 = "…………"
10026040-90 = "……我好像說太多了。"
10026040-91 = "這個話題就先到此為止。#n我們也不是來這裡玩的，先繼續調查吧。"
10026040-93 = "首先，這棟建築……看起來應該是個重要設施沒錯。"
10026040-95 = "就算結構這麼複雜，內部的裝修與各處的裝飾和紋樣卻都相當講究。"
10026040-96 = "如果不是重要的地方，根本不必下這麼多功夫。#n因此我認為這裡應該是象徵權威的重要場所……"
10026040-98 = "地下司令室……？#n或者至少也是管理中心層級的設施……吧？"
10026040-99 = "說不定……"
10026040-103 = "噫噫噫！？"
10026040-104 = "呼，嚇我一跳。剛才那是什麼？#n聽起來好像是什麼東西掉下來的聲音……"
10026040-109 = "奇怪……到底什麼東西能在這種地方發出那麼大的聲響……"
10026040-110 = "……難道是日向同學？#n是不是又不小心摔壞了什麼東西……"
10026040-111 = "畢竟他本來就是個冒失的人……這麼一想，好像也不是不可能……"
10026040-112 = "[s5]「習慣性懷疑別人不是件好事喔，憂。」\n[s6]「不應該在沒有證據的情況下說這種話。」"
10026040-115 = "啊，老師說的對……"
10026040-116 = "嗚……沒想到這麼快就被老師罵了。"
10026040-117 = "我沒有要怪日向同學的意思。#n只是在古書館時也經常發生這種事，所以才想說會不會是這樣……"
10026040-118 = "……不，這也只是我的藉口罷了。#n非常抱歉，與其在這裡找藉口，還不如去找日向同學呢。"
10026040-119 = "說不定會有能幫上忙的地方……#n好，那就先朝聲音傳來的方向……"
10026040-125 = "……你在這裡啊。#n我們是聽到聲音才過來看看的，出了什麼事嗎？"
10026040-126 = "……？"
10026040-127 = "為什麼不回答……"
10026040-128 = "……？？？？"
10026040-129 = "我說，別人跟你搭話的時候就算不知道該怎麼回答，至少也應該給點回應吧？"
10026040-130 = "……搞什麼啊？"
10026040-131 = "喂，你到底是怎麼回事……"
10026040-139 = "咦……"
10026040-140 = "…………"
10026040-141 = "…………？"

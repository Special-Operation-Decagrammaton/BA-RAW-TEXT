10026040-19 = "3;히나타 수영복;06;……가버리셨네요…….\n#3;em;[땀]"
10026040-20 = "3;히나타 수영복;06;위험할 수도 있다면 차라리 다 같이 다니는 게 좋을지도 모르는데……."
10026040-21 = "3;히나타 수영복;02;우이 씨는 그럼에도 역시……. 혼자가 편하신 걸까요……?\n#3;em;[속상함]"

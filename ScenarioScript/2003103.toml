2003103-6 = "3;시구레 온천ND;03;하아~ 좋은 탕이었다~\n#3;em;[하트]"
2003103-7 = "3;시구레 온천ND;01;이 근처에는 잡은 야생동물을 생필품과 교환하러 몇 번 들른 적이 있었지만, 설마 이 마을에도 목욕 시설이 있는 줄은 몰랐어."
2003103-8 = "3;시구레 온천ND;00;고마워, 선생님. 일부러 목욕비까지 챙겨주면서 같이 목욕하러 가자고 권해줘서."
2003103-9 = "3;시구레 온천ND;01;하지만 나는 정말로 강에서 목욕을 해도 괜찮았는데……"
2003103-10 = "3;시구레 온천ND;07;지난번의 일을 너무 신경 쓰고 있는 거 아니야?\n#3;em;[?]"
2003103-11 = "[s1] \"사정은 어찌 되었든 탕을 치운 건 내 부탁이었으니까.\"\n[s2] \"학생이 추위에 떨면서 목욕하도록 내버려 둘 수는 없지.\""
2003103-12 = "#wait;100"
2003103-13 = "#wait;100"
2003103-14 = "3;시구레 온천ND;99;……정말 상냥한 어른이라니까, 선생님은."
2003103-15 = "3;시구레 온천ND;01;여하튼 고마워. 덕분에 오랜만에 제대로 된 목욕탕에서 따듯하게 목욕을 했네."
2003103-16 = "3;시구레 온천ND;00;그럼 몸도 다 씻었으니 슬슬 다시 구교사로 돌아갈까?"
2003103-17 = "[s] \"모처럼 나왔으니 조금만 더 둘러보고 가는 건 어때?\""
2003103-18 = "3;시구레 온천ND;07;단순한 목욕탕을? 뭐, 나야 상관없지만……"

2003103-79 = "4;목욕탕 사장;01;저, 염치없는 부탁인 줄 알고 있습니다만……"
2003103-80 = "4;목욕탕 사장;01;혹시 이 후르츠 밀크에 사용한 특제 과일청의 레시피를 알려주실 수는 없을까요?"
2003103-81 = "2;시구레 온천ND;07;……특제 과일청의 레시피를?\n#2;em;[?]"
2003103-82 = "4;목욕탕 사장;01;네. 보시다시피 이 목욕탕은 외진 곳에 위치한 데다가, 시설도 화려하지 않아서 일부러 찾아오시는 손님은 거의 없거든요."
2003103-83 = "4;목욕탕 사장;01;그런데 이렇게 맛있는 후르츠 밀크를 판매할 수 있다면…… 운영에 큰 도움이 될 겁니다!\n#4;jump"
2003103-84 = "2;시구레 온천ND;01;음, 레시피를 알려주는 건 어렵지 않지만……"
2003103-85 = "2;시구레 온천ND;99;대신, 한 가지 조건이 있어."
2003103-86 = "4;목욕탕 사장;01;호, 혹시 비용이라면 저희 사정이 어려워서 많이는 내기 어렵습니다만……\n#4;stiff"
2003103-87 = "2;시구레 온천ND;00;아니. 돈이 필요한 건 아니야."
2003103-88 = "2;시구레 온천ND;01;다만 이 목욕탕은 우리 구교사에서도 그리 멀지 않은 곳에 위치하고 있으니까……\n#2;em;…"
2003103-89 = "2;시구레 온천ND;00;겨울철에 가끔씩 구교사 학생들이 이곳의 목욕 시설을 사용할 수 있도록 허가해 줄 수는 없을까?"
2003103-90 = "2;시구레 온천ND;02;여름이라면 몰라도 겨울에는 야외에서 하는 목욕을 견디기 어려워하는 학생들이 제법 있거든."
2003103-91 = "4;목욕탕 사장;01;그런 거라면 조금도 문제없습니다! 레시피만 제공해 주신다면야, 저희 목욕탕의 시설은 얼마든지 사용하셔도 좋으니까요!\n#4;jump"
2003103-92 = "2;시구레 온천ND;01;후후, 계약 성립이네."
2003103-93 = "2;시구레 온천ND;03;그럼 서둘러 과일청부터 준비해 볼까?\n#2;greeting\n#2;em;[음표]"
2003103-94 = "2;시구레 온천ND;00;발효는 일분일초라도 더할수록 맛이 깊어지는 법이니까."

[translation]
2003103-1 = "認真地"
2003103-2 = "（和時雨一起前往離舊校舍有段距離的村子裡的公共澡堂）"
2003103-6 = "哇～好棒的澡堂～"
2003103-7 = "之前為了用捕來的野生動物換取生活必需品而來過這邊幾次，#n沒想到這個村子也有入浴設施呢。"
2003103-8 = "謝謝你邀我來這裡，老師。#n而且連洗澡的費用都幫我付了。"
2003103-9 = "我明明在河裡洗澡也沒關係的說……"
2003103-10 = "你是不是太在意上次的事了？"
2003103-11 = "[s1]「無論情況如何，要求清理溫泉的人是我。」\n[s2]「總不能讓學生在寒冷的天裡發著抖洗澡吧。」"
2003103-14 = "……老師真是個善良的好大人呢。"
2003103-15 = "總之謝謝你囉。#n我好久沒在這麼棒的澡堂洗熱水澡了，這都多虧了老師。"
2003103-16 = "那麼既然洗完澡了，我們也差不多該回舊校舍了吧？"
2003103-17 = "[s]「難得過來一趟，要不要多逛一下再走？」"
2003103-18 = "逛澡堂嗎？#n嗯，我是無所謂啦……"
2003103-23 = "咦？這不是水果牛奶嗎？#n在這裡看到總覺得挺開心的。"
2003103-24 = "老師也在「227號溫泉浴場」看過吧？#n作為溫泉浴場的紀念品販賣的，我親手做的溫泉饅頭和水果牛奶。"
2003103-25 = "雖然自己說有點不好意思，不過當時還挺受歡迎的……#n現在偶爾也會有人問舊校舍還有沒有水果牛奶呢。"
2003103-26 = "不過這裡賣的水果牛奶好像只是在工廠製造的普通產品──"
2003103-31 = "請，請問……你是之前在「227號溫泉浴場」工作的人對吧？"
2003103-32 = "……咦？你認識我嗎？"
2003103-33 = "那當然！當時我聽說舊校舍腹地裡有間大型的溫泉浴場，所以去過一次。"
2003103-34 = "「227號溫泉浴場」實在太受歡迎，導致這間澡堂的客人都少了一半……"
2003103-35 = "啊哈哈……聽你這麼說，真是有點過意不去呢。"
2003103-36 = "別這麼說，不必在意。#n反正這間澡堂的生意本來就不是太好。"
2003103-37 = "當時在227號溫泉浴場喝到的水果牛奶實在太好喝，#n所以我之後還到處找是哪裡賣的產品……"
2003103-38 = "結果不管哪家店裡賣的水果牛奶，都跟當時泡完澡時喝到的味道不一樣。"
2003103-39 = "啊，那個水果牛奶在其他地方買不到哦。#n因為那是我親手做的。"
2003103-40 = "不過只要有材料，現在就能做給你喝……"
2003103-41 = "不介意的話可以借用一下廚房嗎？"
2003103-42 = "當然，請儘管用吧。"
2003103-46 = "[ns3]「時雨，以防萬一還是提醒你一下……」\n[ns4]「可不能在水果牛奶裡加酒精哦。」"
2003103-49 = "哎呀老師，你把我當成什麼人了？#n我才不會隨便在飲料裡加酒精呢。"
2003103-50 = "發酵過的東西倒是有可能……"
2003103-51 = "[s]「有股不祥的預感……」"
2003103-52 = "我看看，這裡有牛奶、糖和各種水果……"
2003103-53 = "材料很齊全，那我就來小露身手吧～"
2003103-62 = "來，完成了。#n這就是「時雨特製水果牛奶」。"
2003103-63 = "我做了很多，老師也一起喝一杯吧。"
2003103-67 = "就是這個！當時在溫泉浴場喝的水果牛奶就是這個味道沒錯……！"
2003103-68 = "不過真奇怪，我自己做的時候就沒有這種豐富且高級的甜味……"
2003103-69 = "製作飲料的時候不吝惜材料固然重要，但更重要的是加入材料的方法和比例哦。"
2003103-70 = "製作水果牛奶時，牛奶的香醇風味和水果的甜味一樣重要。#n所以如果加入太多水果，可能會破壞味道的平衡。"
2003103-71 = "調製飲料的時候不要把水果全部搗碎，最好有一部分是切塊再加入。#n這樣味道會比較穩定，口感也會更豐富。"
2003103-72 = "接著再加入一點製作康波特時使用的特製水果蜜……#n「時雨特製水果牛奶」就大功告成了。"
2003103-73 = "[s]「原來你說的發酵過的東西是指水果蜜啊。」"
2003103-74 = "嗯，跟砂糖相比，醃漬後的水果能讓甜味更柔和，還能讓甜味自然融入飲料。"
2003103-75 = "和其他料理一樣，飲料也會隨著花費的時間和努力變得更好喝。"
2003103-79 = "那個，我知道這個請求很厚臉皮……"
2003103-80 = "請問可以告訴我用在這個水果牛奶的特製水果蜜的製作方法嗎？"
2003103-81 = "……特製水果蜜的製作方法？"
2003103-82 = "是的，如你所見，這間澡堂不只地點偏僻，設施也不華麗……#n所以幾乎沒有客人會特意找上門。"
2003103-83 = "但是如果能賣這麼好喝的水果牛奶……一定會對營運有很大的幫助！"
2003103-84 = "唔嗯，教你作法倒是可以……"
2003103-85 = "但是有一個條件。"
2003103-86 = "如，如果是費用的話……我們的手頭有點緊，金額太高的話可能……"
2003103-87 = "不，我指的不是費用。"
2003103-88 = "這間澡堂距離我們舊校舍不算太遠……"
2003103-89 = "所以能不能允許舊校舍的學生，在冬天時偶爾來使用這裡的入浴設施呢？"
2003103-90 = "夏天姑且不論，難以忍受冬天在野外洗澡的學生還挺多的。"
2003103-91 = "那完全沒問題！只要你願意教我作法，隨時歡迎來使用我們的設施！"
2003103-92 = "呵呵，契約成立。"
2003103-93 = "那就趕快來準備水果蜜吧？"
2003103-94 = "畢竟發酵時間越久，味道就會越濃郁啊。"
2003103-96 = "（之後，和時雨一起幫忙醃製要加入水果牛奶中的水果蜜）"

2003103-31 = "5;목욕탕 사장;01;저, 저기…… 혹시 전에 <227호 온천장>에서 일하셨던 분 맞으시죠?\n#5;jump"
2003103-32 = "3;시구레 온천ND;02;……어라? 나를 알고 있는 거야?\n#3;em;[?]"
2003103-33 = "5;목욕탕 사장;01;물론이지요. 그때 구교사 부지에 큰 온천장이 생겼다고 해서 한 번 가봤었거든요."
2003103-34 = "5;목욕탕 사장;01;<227호 온천장>의 인기가 어찌나 많았던지, 당시에는 이 목욕탕을 찾는 손님이 절반으로 줄었을 정도니……"
2003103-35 = "3;시구레 온천ND;03;아하하…… 그렇게 들으니 어쩐지 조금 미안해지네.\n#3;em;[땀]"
2003103-36 = "5;목욕탕 사장;01;아뇨, 신경 쓰실 필요는 없습니다. 어차피 원래부터 크게 장사가 잘되는 목욕탕도 아니었는걸요."
2003103-37 = "5;목욕탕 사장;01;다만 그 때 227호 온천장에서 마셨던 후르츠 밀크가 너무 맛이 좋아서, 어디서 파는 제품인지 여기저기 찾아보았는데……"
2003103-38 = "5;목욕탕 사장;01;어느 가게에서도 그때 목욕을 마치고 마셨던 후르츠 밀크와 같은 맛을 내는 제품을 팔지는 않더라고요.\n#5;stiff"
2003103-39 = "3;시구레 온천ND;07;아, 그 후르츠 밀크는 다른 곳에서 구할 수 없을 거야. 내가 직접 만든 수제품이거든."
2003103-40 = "3;시구레 온천ND;99;재료만 있다면 지금이라도 만들어 줄 수 있는데……\n#3;em;…"
2003103-41 = "3;시구레 온천ND;01;괜찮다면 잠깐 주방을 빌려줄 수 있을까?"
2003103-42 = "5;목욕탕 사장;01;물론입니다. 부디 자유롭게 사용해 주세요.\n#5;greeting"

[translation]
2003103-1 = "Seriously"
2003103-2 = "I took Shigure to a large bathhouse in a town that was a short way from the Former Institute."
2003103-6 = "*sigh* That was wonderful!"
2003103-7 = "I sometimes come to town to trade animals we trapped for essential goods, but I never knew they had a bathhouse."
2003103-8 = "Thank you, Sensei. I could never afford to go to a place like this on my own."
2003103-9 = "But I really was okay with just washing in the river..."
2003103-10 = "You're not still hung up about what happened last time, are you?"
2003103-11 = "[s1] \"I am the one who made you empty the hot spring.\"\n[s2] \"I can't just let my students wash themselves in freezing water.\""
2003103-14 = "...What a kind adult you are, Sensei."
2003103-15 = "Again, thank you. I liked using a proper bathhouse for once."
2003103-16 = "Since we're all clean, should we head back to the Former Institute?"
2003103-17 = "[s] \"While we're here, why not have a look around?\""
2003103-18 = "You want to look around...the bathhouse? Not that I mind, but..."
2003103-23 = "Oh? They have fruit milk. How nice."
2003103-24 = "Maybe you remember this, but at Hot Springs Resort No. 227, we sold fresh manju and fruit milk made from local ingredients."
2003103-25 = "Believe it or not, but they were really popular... The Former Institute still get letters sometimes asking if our fruit milk will ever make a comeback."
2003103-26 = "But this looks like it was made in a factory..."
2003103-31 = "E-Excuse me... Are you, perhaps, one of the girls who ran Hot Springs Resort No. 227?"
2003103-32 = "...Oh? Do I know you?"
2003103-33 = "I believe so. When I heard that the Former Institute had opened up a hot spring, I had to see it for myself."
2003103-34 = "Hot Springs Resort No. 227 was so popular that we lost half our customers to you..."
2003103-35 = "Haha... I feel kind of bad when you put it like that."
2003103-36 = "Don't worry about it. We weren't exactly a big business before that."
2003103-37 = "Anyway, that fruit milk you served was so delicious that I had to have it for my bathhouse..."
2003103-38 = "But none of the shops I visited sold a fruit milk that tasted the same as the stuff I drank there."
2003103-39 = "Oh, you won't find that fruit milk from somewhere else. I made every glass myself."
2003103-40 = "I could make more if I had the right ingredients..."
2003103-41 = "Do you mind if I borrow your kitchen?"
2003103-42 = "Of course. It's all yours."
2003103-46 = "[ns3] \"Shigure, I'm sure I don't need to say this, but...\"\n[ns4] \"Please don't put any alcohol in the fruit milk.\""
2003103-49 = "Oh please, Sensei. What kind of person do you take me for? I don't go around spiking everything I touch."
2003103-50 = "Though surely a little fermentation wouldn't hurt...?"
2003103-51 = "[s] \"That is not reassuring.\""
2003103-52 = "Let's see. Milk and sugar and a nice selection of fruit..."
2003103-53 = "I've got everything I need, so I guess I should get to work."
2003103-62 = "All done. I present to you Shigure's Special Fruit Milk."
2003103-63 = "I made plenty, so you should have a glass too, Sensei."
2003103-67 = "This is it! This is the flavor I've been looking for...!"
2003103-68 = "How strange! I tried making it myself, but I couldn't recreate this deep, rich sweetness..."
2003103-69 = "Good ingredients are just one part of the equation. What's even more important is the ratio of the ingredients."
2003103-70 = "The flavor of the milk itself is just as important as the sweetness of the fruit. Add too much fruit, and the balance collapses."
2003103-71 = "When you blend the drink, mash most of the fruit, but cut some of it into cubes. It will give you a stable flavor and an interesting texture."
2003103-72 = "Add some compote syrup...and you get Shigure's Special Fruit Milk."
2003103-73 = "[s] \"Ah, so the fermented ingredient was the syrup.\""
2003103-74 = "Right. Unlike straight sugar, using fruit syrup creates a smoother, sweeter flavor and mixes in with the rest of the drink evenly."
2003103-75 = "It's the same for all food. If you put the work in, it can only get better."
2003103-79 = "I hate to impose, but..."
2003103-80 = "Could you tell me how you make the syrup you used in this?"
2003103-81 = "...You want my syrup recipe?"
2003103-82 = "Yes. As you can see, this bathhouse is kind of out the way and the facilities aren't top notch, so we don't get all too many bathers here."
2003103-83 = "But if we could sell this delicious fruit milk... It could save the business!"
2003103-84 = "Hmm... Sure, I could teach you..."
2003103-85 = "But I need something in return."
2003103-86 = "I-I'm afraid I can't pay you much, what with the slow business and all..."
2003103-87 = "Oh, I don't want money."
2003103-88 = "This bathhouse isn't too far away from the Former Institute..."
2003103-89 = "Could the students of the Former Institute use the baths here for free during the winter?"
2003103-90 = "It's no problem bathing outside during the summer, but when it gets cold, it's hard on a lot of us."
2003103-91 = "Of course they can! If you give me the recipe, then you're free to use this bathhouse anytime you want!"
2003103-92 = "Heehee. Then we have a deal."
2003103-93 = "So, about that syrup..."
2003103-94 = "To start with, every minute of fermentation enriches the flavor..."
2003103-96 = "I stuck around and helped Shigure go over the steps to make the syrup for her famous fruit milk."

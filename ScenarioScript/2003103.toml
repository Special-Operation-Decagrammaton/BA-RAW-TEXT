2003103-23 = "3;시구레 온천ND;00;어라? 후르츠 밀크잖아? 이런 곳에서 보니 어쩐지 반갑네.\n#3;em;[?]"
2003103-24 = "3;시구레 온천ND;02;선생님도 전에 <227호 온천장>에서 본 적 있지? 온천장의 기념품으로 내가 만든 온천 만쥬와 함께 후르츠 밀크를 팔았었거든."
2003103-25 = "3;시구레 온천ND;01;내 입으로 말하기는 좀 그렇지만, 제법 인기가 많았어서…… 지금도 가끔씩 구교사에 남은 후르츠 밀크가 없냐는 문의가 종종 들어오곤 해."
2003103-26 = "3;시구레 온천ND;07;다만 이곳에서 파는 후르츠 밀크는 평범한 공산품 같은데—"

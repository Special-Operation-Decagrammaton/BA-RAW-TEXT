2003103-66 = "2;시구레 온천ND;01\n4;목욕탕 사장;01\n#2;h\n#4;h\n#4;greeting\n#wait;1000"
2003103-67 = "4;목욕탕 사장;01;맞아요! 그때 온천장에서 먹었던 후르츠 밀크가 바로 이 맛이었어요……!\n#4;jump\n#4;em;[!]"
2003103-68 = "4;목욕탕 사장;01;하지만 이상하네요. 제가 직접 만들었을 때는 이런 풍부하고 고급스러운 단맛이 나지 않았었는데……"
2003103-69 = "2;시구레 온천ND;99;음료를 만들 때는 재료를 아끼지 않는 것도 중요하지만, 재료를 넣는 방법이나 비율도 그 이상으로 중요하니까."
2003103-70 = "2;시구레 온천ND;07;후르츠 밀크는 과일의 단맛만큼이나 우유의 고소한 맛이 중요하기 때문에, 과일을 너무 많이 넣으면 맛의 밸런스가 깨질 수 있거든."
2003103-71 = "2;시구레 온천ND;00;음료를 섞을 때 과일은 전부 으깨서 블렌딩하지 말고, 일부는 생으로 잘라 넣는 게 좋아. 그편이 맛도 훨씬 안정적이고 식감도 재미있어지거든."
2003103-72 = "2;시구레 온천ND;99;거기에 캄포트를 만들 때 쓰는 특제 과일청을 조금 첨가하면…… <시구레 스페셜 후르츠 밀크>, 완성이야.\n#2;em;…"
2003103-73 = "[s] \"발효된 무언가가 과일청을 말하는 것이었구나.\""
2003103-74 = "2;시구레 온천ND;01;응. 설탕을 바로 넣는 것보다 과일에 절인 뒤에 첨가하면 단맛이 부드러워지고, 음료에도 자연스럽게 배어들거든."
2003103-75 = "2;시구레 온천ND;00;모든 음식이 그렇지만 음료도 시간과 노력을 들인 만큼 맛있어지는 법이야."

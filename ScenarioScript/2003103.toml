[translation]
2003103-1 = "อย่างจริงจัง"
2003103-2 = "(คุณครูกับชิกุเระไปโรงอาบน้ำสาธารณะในหมู่บ้านที่อยู่ห่างจากอาคารเรียนเก่าไปเล็กน้อย)"
2003103-6 = "อื้ม~ เป็นโรงอาบน้ำที่ดีมากเลย!"
2003103-7 = "ฉันเคยแวะมาแถวนี้หลายครั้งเพื่อเอาสัตว์ที่จับได้มาแลกเปลี่ยนเป็นของใช้จำเป็น แต่ไม่คิดเลยว่าใน#nหมู่บ้านนี้มีที่อาบน้ำแบบนี้ด้วย"
2003103-8 = "ขอบคุณนะคุณครู ขอบคุณที่ชวนฉันมาอาบน้ำด้วยกัน แล้วก็ยังจ่ายค่าบริการให้ด้วย"
2003103-9 = "แต่ว่าจะให้ฉันไปอาบน้ำในลำธารแบบเดิมก็ได้อยู่นะ..."
2003103-10 = "คุณครูคิดมากเรื่องที่ฉันบอกไปคราวที่แล้วใช่ไหม?"
2003103-11 = "[s1] \"ครูเป็นคนขอให้ทำความสะอาดบ่อนั้นเองนี่นา\"\n[s2] \"ครูปล่อยให้นักเรียนอาบน้ำแบบตัวสั่นในความหนาวไม่ได้หรอก\""
2003103-14 = "...คุณครูเป็นผู้ใหญ่ที่ใจดีจังเลยนะ"
2003103-15 = "ขอบคุณนะ ฉันไม่ได้อาบน้ำแบบจริงจังในโรงอาบน้ำแบบนี้มานานแล้ว"
2003103-16 = "เราตัวสะอาดกันแล้ว งั้นกลับอาคารเรียนเก่าเลยดีมั้ย?"
2003103-17 = "[s] \"ไหนๆ ก็ออกมาแล้ว ไปเดินดูรอบๆ ดีมั้ย?\""
2003103-18 = "รอบๆ โรงอาบน้ำเนี่ยนะ? มันก็ได้อยู่หรอก ฉันก็ไม่ได้ติดอะไร..."
2003103-23 = "เอ๋? นมรสผลไม้นี่นา? ดีใจจังแฮะที่เจอนมรสผลไม้ในที่แบบนี้ด้วย"
2003103-24 = "คุณครูเคยเห็นใน <ออนเซ็น No.227> หรือเปล่า? ตอนนั้นเราขายมันจูออนเซ็นกับนมรสผลไม้ที่ฉันทำ#nเป็นของที่ระลึกในออนเซ็นน่ะ"
2003103-25 = "จะให้ฉันพูดเองก็จะหาว่าอวย แต่มันขายดีเป็นเทน้ำเทท่าเลยละ มีคนถามบ่อยๆ ด้วยว่าในอาคารเรียน#nเก่ามีนมรสผลไม้เหลืออยู่บ้างหรือเปล่า"
2003103-26 = "แต่นมรสผลไม้ที่ขายที่นี่เหมือนจะเป็นสินค้าจากโรงงานธรรมดาๆ เลย"
2003103-31 = "เอ่อ... คุณใช่คนที่เคยทำงานใน <ออนเซ็น No.227> หรือเปล่าครับ?"
2003103-32 = "...เอ๋? รู้จักฉันด้วยเหรอ?"
2003103-33 = "แน่นอนอยู่แล้ว! ตอนนั้นผมได้ยินว่ามีออนเซ็นขนาดใหญ่อยู่ในพื้นที่ของอาคารเรียนเก่า ก็เลยลองแวะ#nไปครั้งหนึ่งน่ะครับ"
2003103-34 = "ตอนนั้น <ออนเซ็น No.227> เป็นที่นิยมมากเสียจนลูกค้าโรงอาบน้ำของเราหายไปครึ่งหนึ่งเลย..."
2003103-35 = "อะฮะฮ่า... พอได้ยินอย่างนั้นก็รู้สึกผิดขึ้นมาเลยแฮะ"
2003103-36 = "ไม่ครับๆ ไม่ต้องคิดมากเลยนะ ยังไงที่นี่ก็เป็นโรงอาบน้ำที่ไม่ได้เป็นที่นิยมมากอยู่แล้วครับ"
2003103-37 = "แต่ว่านมรสผลไม้ที่ผมเคยดื่มในออนเซ็น No.227 อร่อยมากเลยละครับ ผมก็เลยเที่ยวตามหาว่ามัน#nขายที่ไหนบ้าง..."
2003103-38 = "แต่ไม่ว่าจะซื้อจากร้านไหน มันก็ไม่อร่อยเท่านมรสผลไม้ที่ผมกินหลังจากอาบน้ำเสร็จในออนเซ็น No.227 ครับ"
2003103-39 = "อ่า ฉันว่าไม่น่าจะหาซื้อนมรสผลไม้นั้นจากที่อื่นได้นะ มันเป็นสูตรของฉันเองน่ะ"
2003103-40 = "ถ้ามีวัตถุดิบ ฉันก็น่าจะพอทำให้ได้อยู่..."
2003103-41 = "ถ้าไม่ว่าอะไรละก็ ฉันขอใช้ห้องครัวหน่อยได้มั้ยล่ะ?"
2003103-42 = "แน่นอนครับ เชิญใช้ได้ตามสบายเลย"
2003103-46 = "[ns3] \"ชิกุเระ ครูแค่บอกเผื่อๆ ไว้นะ...\"\n[ns4] \"ห้ามผสมแอลกอฮอล์ในนมรสผลไม้เด็ดขาด\""
2003103-49 = "โธ่ คุณครู คิดว่าฉันเป็นคนยังไงเนี่ย?! เห็นแบบนี้ ฉันก็ไม่ใส่แอลกอฮอล์สุ่มสี่สุ่มห้าลงในเครื่องดื่ม#nทุกอย่างหรอกนะ"
2003103-50 = "แต่อาจจะมีของหมักลงไปผสมด้วยนิดหน่อย...?"
2003103-51 = "[s] \"ว่าแล้วเชียว ครูสังหรณ์ใจไม่ดีชอบกล...\""
2003103-52 = "ไหนดูซิ นม น้ำตาล และผลไม้หลายชนิด..."
2003103-53 = "วัตถุดิบน่าจะเพียงพอแล้วนะ งั้นได้เวลาโชว์ความสามารถแล้ว"
2003103-62 = "เอาละ เสร็จเรียบร้อย และนี่คือ <นมรสผลไม้สุดพิเศษของชิกุเระ>"
2003103-63 = "ฉันทำเผื่อไว้เยอะเลย คุณครูก็มาดื่มด้วยกันสักแก้วสิ"
2003103-67 = "ใช่เลยครับ! นมรสผลไม้ที่ผมเคยดื่มในออนเซ็นนั้นรสชาติเป็นอย่างนี้เป๊ะๆ เลยครับ...!"
2003103-68 = "แต่ก็แปลกจังเลยนะครับ ตอนที่ผมทำเอง มันไม่ได้มีรสหวานกลมกล่อม ทั้งยังดูแพงแบบนี้..."
2003103-69 = "ตอนทำเครื่องดื่ม การไม่หวงวัตถุดิบก็เป็นเรื่องสำคัญมากก็จริง แต่ว่าสัดส่วนและวิธีการใส่วัตถุดิบเป็น#nเรื่องสำคัญกว่า"
2003103-70 = "สำหรับนมรสผลไม้ สิ่งสำคัญคือรสหวานของผลไม้และความกลมกล่อมของนม แต่หากใส่ผลไม้มาก#nเกินไป สมดุลของรสชาติก็อาจเสียได้"
2003103-71 = "ตอนผสมผลไม้กับนม เราไม่ควรเอาผลไม้ไปบดใส่ทั้งหมด ให้แบ่งบางส่วนไว้หั่นเป็นชิ้นเล็กๆ แล้วเอา#nไปใส่ในนั้นด้วย ถ้าทำแบบนั้น รสชาติก็จะยังคงที่ และตอนดื่มก็จะเจอชิ้นผลไม้ ทำให้ยิ่งเคี้ยว#nสนุกขึ้นด้วย"
2003103-72 = "และถ้าใส่น้ำหมักผลไม้พิเศษที่ใช้ตอนทำกัมปอตลงไปด้วย... ก็จะได้เป็น <นมรสผลไม้สูตรพิเศษของ#nชิกุเระ>"
2003103-73 = "[s] \"ที่บอกว่าใส่ของหมัก หมายถึงน้ำหมักผลไม้นี่เองสินะ\""
2003103-74 = "อื้ม แทนที่จะใส่น้ำตาลลงไปทันที หากใส่ผลไม้ที่หมักไปจะให้รสที่หวานนุ่มกว่า และรสจะแทรกซึม#nในนมอย่างเป็นธรรมชาติด้วย"
2003103-75 = "ทั้งการทำอาหารและเครื่องดื่มต่างก็ต้องใช้เวลาและความพยายามเพื่อความอร่อยน่ะ"
2003103-79 = "เอ่อ... ผมรู้ครับว่านี่คือการขอร้องที่น่าละอาย..."
2003103-80 = "แต่คุณช่วยบอกสูตรน้ำหมักผลไม้พิเศษที่ใช้ในนมรสผลไม้หน่อยได้มั้ยครับ?"
2003103-81 = "...สูตรน้ำหมักผลไม้พิเศษเหรอ?"
2003103-82 = "ครับ อย่างที่เห็นเลยครับว่าโรงอาบน้ำของเราตั้งอยู่ในพื้นที่ห่างไกล สิ่งอำนวยความสะดวกของเราก็#nไม่ได้หรูหรา เลยไม่มีลูกค้าที่ตั้งใจเดินทางมาที่นี่เท่าไรครับ"
2003103-83 = "แต่ถ้าเราขายนมรสผลไม้รสเลิศนี้ได้... โรงอาบน้ำก็อาจจะคึกคักขึ้นครับ!"
2003103-84 = "อืม... จะให้บอกสูตรก็ได้อยู่หรอก..."
2003103-85 = "แต่ฉันมีเงื่อนไขหนึ่งอย่าง"
2003103-86 = "ถะ... ถ้าเป็นเรื่องค่าสูตรละก็ ตอนนี้สถานการณ์การเงินของพวกเราไม่ค่อยดีเท่าไร คงจะไม่มีเงินจ่าย#nครับ..."
2003103-87 = "ไม่ใช่ ฉันไม่ได้ต้องการเงินหรอกนะ"
2003103-88 = "ในเมื่อโรงอาบน้ำนี้ตั้งอยู่ไม่ไกลมากจากอาคารเรียนเก่าของฉัน..."
2003103-89 = "ในฤดูหนาว คุณพอจะให้นักเรียนของเรามาอาบน้ำที่นี่ได้มั้ยล่ะ?"
2003103-90 = "ถ้าเป็นฤดูร้อนน่ะไม่น่ามีปัญหา แต่ในฤดูหนาว นักเรียนบางคนของเราทนอาบน้ำในลำธารหนาวๆ ไม่ได้น่ะ"
2003103-91 = "ถ้าเป็นเรื่องนั้นไม่มีปัญหาเลยครับ! ขอแค่คุณสอนสูตรผม แล้วผมจะให้ใช้โรงอาบน้ำที่นี่ได้ตามที่#nต้องการเลยครับ!"
2003103-92 = "ฮุฮุ ทำสัญญาสำเร็จ"
2003103-93 = "ถ้างั้นก็รีบไปเตรียมผลไม้กันเลยดีมั้ย?"
2003103-94 = "การหมักน่ะ ยิ่งหมักนานเท่าไรรสชาติก็จะยิ่งดีขึ้น ต่อให้นานขึ้นแค่ 1 นาทีหรือ 1 วินาทีก็มีผลนะ"
2003103-96 = "(หลังจากนั้นคุณครูก็ช่วยชิกุเระหมักผลไม้ที่จะใช้ทำนมรสผลไม้)"

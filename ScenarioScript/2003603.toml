[translation]
2003603-1 = "Princess on the Boat"
2003603-7 = "...Ah, Sensei. Over here."
2003603-8 = "I had some time while you were coming, so I got a little prep work done."
2003603-9 = "Look over there."
2003603-10 = "[s1] \"...A banana boat?!\"\n[s2] \"Oh, that's too much!\""
2003603-13 = "Oh, come on, it's no big deal!"

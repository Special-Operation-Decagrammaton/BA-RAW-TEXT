[translation]
2003603-1 = "องค์หญิง ออน เดอะ โบ๊ท"
2003603-7 = "อ๊ะ คุณครู ตรงนี้ๆ"
2003603-8 = "ระหว่างรอคุณครูมาถึง ฉันก็เตรียมของไว้บ้างแล้วน่ะ"
2003603-9 = "นั่นไง..."
2003603-10 = "[s1] \"บานาน่าโบ๊ท...!\"\n[s2] \"ไหนว่าไม่ใช่ของยอดเยี่ยมไง!?\""
2003603-13 = "อะ... อะไรกัน? ทำไมประหลาดใจขนาดนั้น?"
2003603-14 = "คุณครูก็แอบมีมุมนี้กับเขาด้วยนะเนี่ย"
2003603-15 = "มุมที่อยากเล่นอะไรเป็นเด็กน่ะ..."
2003603-16 = "หืม...?"
2003603-17 = "ที่ฉันติดต่อคุณครูไป ก็เพราะอยากเล่นสนุกเป็นเด็กเหมือนกันงั้นเหรอ?"
2003603-18 = "พะ... พูดอะไรน่ะ! จะเป็นแบบนั้นไปได้ยังไง! ฉันก็แค่..."
2003603-19 = "ก็แค่... เอ่อ... อยาก..."
2003603-23 = "ชะ... ใช่! อยากทดสอบดู! ทดสอบดูว่ายังใช้ได้อยู่หรือเปล่าน่ะ!"
2003603-24 = "ของบางอย่างถึงภายนอกจะดูปกติ แต่ก็อาจจะใช้งานไม่ได้นี่นา ฉะ... ฉันจะทดสอบก็เพราะแบบนี้ละ!! "
2003603-25 = "เอาละๆ อย่ามามัวเสียเวลาอยู่เลย ไปทดสอบกันดีกว่าว่ามันยังเล่นได้ปกติหรือเปล่า! เราต้องดูว่ามันลอยได้ดีมั้ย และมีตรงไหนที่รั่วหรือเปล่า!"
2003603-26 = "ฉันไม่ได้เรียกคุณครูมาเพื่อแค่เล่นสนุกหรอกนะ รู้ไว้ด้วย!"
2003603-27 = "หืม...?"
2003603-28 = "ให้ฉันขึ้นก่อนเหรอ? แล้วคุณครูจะลากให้?"
2003603-29 = "อะ... เอางั้นเหรอ...?"
2003603-30 = "[s3] \"ก็เราไม่มีเรือช่วยลากนี่นา\"\n[s4] \"แค่ทดสอบเอง เพราะงั้นอย่าลงไปตรงที่น้ำลึกเลย\""
2003603-33 = "มะ... มันก็จริงอยู่หรอก..."
2003603-38 = "เข้าใจแล้ว ก็นะ ยังไงตรงนี้น้ำก็สูงแค่เอวอยู่แล้ว... คงไม่เป็นไรหรอกเนอะ"
2003603-39 = "ถ้างั้นก็... ฮึบ~"
2003603-44 = "โยกมากกว่าที่คิดอีกแฮะ... ปกติเป็นแบบนี้อยู่แล้วหรือเปล่านะ...?"
2003603-45 = "คุณครู...?"
2003603-46 = "นี่เป็นแค่การทดสอบนะ อย่าลากให้เร็วนักล่ะ"
2003603-51 = "[ns5] \"จะออกตัวแล้วนะ\"\n[ns6] ลากบานาน่าโบ๊ท"
2003603-55 = "ดะ... เดี๋ยวก่อน! คุณครู...! ระ... เร็วไปแล้ว!! "
2003603-56 = "ฉันยังไม่ทันได้เตรียมใจ...!! "
2003603-57 = "เฮือก...!?!?"
2003603-58 = "เหวอ...!?"
2003603-64 = "(หลังจากนั้นคุณครูก็ลากบานาน่าโบ๊ทพาเซริกะทัวร์ไปรอบหาด)"
2003603-65 = "(ถึงบานาน่าโบ๊ทจะโคลงเคลงอยู่บ้าง แต่ก็ไม่เกิดปัญหาอะไรอย่างที่เซริกะกังวล)"
2003603-68 = "― [log=세리카 수영복]คะ... แค่นี้ก็น่าจะพอแล้วมั้ง?[/log][wa:330] "
2003603-69 = "― [log=세리카 수영복]ลงได้แล้วละ...[/log][wa:1740] "
2003603-72 = "― [log=세리카 수영복]ใช่ว่าตอนนี้ฉัน[/log]"
2003603-73 = "― [log=세리카 수영복]อยากเลิกแล้วหรอกนะ...[/log][wa:1250] "
2003603-76 = "― [log=세리카 수영복]ดะ... เดี๋ยวสิ!![/log][wa:10] "
2003603-77 = "― [log=세리카 수영복]ทำอะไรน่ะ คุณครู! มันโคลงเคลงนะ!![/log][wa:1510] "
2003603-80 = "― [log=세리카 수영복]บานาน่าโบ๊ทอันนี้ มันคว่ำง่ายนะ!![/log][wa:130] "
2003603-81 = "― [log=세리카 수영복]หยุดนะ![/log][wa:980] "
2003603-84 = "― [log=세리카 수영복]อะไรกัน มันน่าสนุกงั้นเหรอ [/log][wa:1820] "
2003603-85 = "― [log=세리카 수영복]คุณครู อย่าแกล้งกันเล่นสิ[/log][wa:3260] "
2003603-88 = "― [log=세리카 수영복]เฮ้อ... ช่างเถอะ[/log][wa:1130] "
2003603-89 = "― [log=세리카 수영복]คุณครูก็เป็นคนอย่างนี้อยู่แล้ว[/log][wa:800] "
2003603-92 = "― [log=세리카 수영복]ฉันควรจะคิดไว้แท้ๆ ว่าต้องเป็นแบบนี้...[/log][wa:770] "
2003603-95 = "[ns7] \"เซริกะ...?\"\n[ns8] \"จู่ๆ เป็นอะไรไปน่ะ?\""
2003603-99 = "― [log=세리카 수영복]เอาเถอะ ไม่เป็นไรหรอก[/log][wa:340] "
2003603-100 = "― [log=세리카 수영복]จู่ๆ ฉันก็คิดอะไรขึ้นมาได้น่ะ[/log][wa:1435] "
2003603-103 = "― [log=세리카 수영복]เอาละ คุณครู! มาเปลี่ยนกัน!![/log][wa:905] "
2003603-104 = "― [log=세리카 수영복]รอบนี้เป็นตาของคุณครูบ้างแล้ว! [/log][wa:1160] "
2003603-109 = "[ns9] \"ซะ... เซริกะ...?\"\n[ns10] \"ทดสอบกันแค่นี้เถอะนะ...\""
2003603-113 = "อ๊ะ ไม่ได้ๆ จะจบแค่นี้ไม่ได้หรอก"
2003603-114 = "เพิ่งจะรู้นะเนี่ย~ ว่าเป็นคนลากแล้วจะสนุกกว่าคนขี่อีก"
2003603-115 = "สนุกใช่มั้ยล่ะที่ได้ลากบานาน่าโบ๊ทแกล้งฉัน? งั้นก็ถึงตาฉันบ้างแล้ว!"
2003603-119 = "หืม...?"
2003603-120 = "เดี๋ยวเหอะ...! ทำอะไรน่ะ!! จะหนีไปไหนน่ะ! "
2003603-121 = "หยุดเดี๋ยวนี้นะ! หยุดอยู่ตรงนั้นเลย!! ผู้ใหญ่อะไรป๊อดชะมัด...!! "
2003603-122 = "ฮึ่ย!! พอต้องลากบานาน่าโบ๊ทไปด้วยก็ตามไม่ทันเลย...!"
2003603-126 = "นี่!!!!!!!!!! "

[translation]
2003603-1 = "公主 on the boat"
2003603-7 = "……啊，老師。我在這邊。"
2003603-8 = "等你來的時候，我先做了一些準備。"
2003603-9 = "……就是那個。"
2003603-10 = "[s1]「……是香蕉船！」\n[s2]「不是說沒什麼大不了的嗎！？」"
2003603-13 = "怎，怎麼了？為什麼反應這麼大？"
2003603-14 = "仔細想想，老師的確有這樣的一面呢。"
2003603-15 = "明明是個大人，有時候的表現卻像發現玩具的小孩一樣……"
2003603-16 = "……嗯？"
2003603-17 = "……問我是不是也覺得有趣才聯絡你的？"
2003603-18 = "你，你在說什麼啦！#n怎麼可能呢！我只是……"
2003603-19 = "該怎麼說呢……這……"
2003603-23 = "對，對了！測試！是為了測試啦！"
2003603-24 = "不是很常會有看起來好好的，結果實際上卻壞了的情況嗎？#n我是為了避免這種情況！！"
2003603-25 = "好了！別再浪費時間，馬上來測試船能不能浮起來，有沒有破損吧！"
2003603-26 = "絕對不是為了玩才叫你來的哦！"
2003603-27 = "……嗯？"
2003603-28 = "我先上船……？#n老師要幫我拉？"
2003603-29 = "這，這麼突然嗎……？"
2003603-30 = "[s3]「畢竟也沒有其他船能幫忙。」\n[s4]「因為是測試，在太深的地方可能會有危險。」"
2003603-33 = "這，這麼說也沒錯啦……"
2003603-38 = "我知道了。#n反正水深只到腰間……應該沒問題吧。"
2003603-39 = "那麼就……嘿咻。"
2003603-44 = "比想像中還晃耶……這樣是正常的嗎……？"
2003603-45 = "老師……？"
2003603-46 = "我說過這只是測試而已。#n不可以拉太快哦，知道嗎？"
2003603-51 = "[ns5]「那就出發吧。」\n[ns6] 拉動香蕉船"
2003603-55 = "等，等等……！老師……！？太，太快了啦！！"
2003603-56 = "我還沒做好心理準備……！！"
2003603-57 = "哇啊……！？！？"
2003603-58 = "噫噫……！？"
2003603-64 = "（之後帶著茜香，在海邊四處晃了好一陣子）"
2003603-65 = "（雖然因為船身小的關係而相當搖晃，但是和茜香擔心的不同，並沒有發生故障）"
2003603-68 = "― [log=세리카 수영복]這，這樣應該就行了吧？[/log][wa:1090] "
2003603-69 = "― [log=세리카 수영복]差不多該下船了……[/log][wa:1940] "
2003603-72 = "― [log=세리카 수영복]雖然我也沒有，[/log]"
2003603-73 = "― [log=세리카 수영복]不想繼續的意思……[/log][wa:1730] "
2003603-76 = "― [log=세리카 수영복]等，等等！！[/log][wa:340] "
2003603-77 = "― [log=세리카 수영복]老師！你在做什麼啦！很晃耶！！[/log][wa:2230] "
2003603-80 = "― [log=세리카 수영복]這艘船，很容易翻船的啦！！[/log][wa:930] "
2003603-81 = "― [log=세리카 수영복]別鬧了！[/log][wa:1100] "
2003603-84 = "― [log=세리카 수영복]不是，說什麼好像很有趣……[/log][wa:2380] "
2003603-85 = "― [log=세리카 수영복]老師，別拿別人來玩樂。[/log][wa:3820] "
2003603-88 = "― [log=세리카 수영복]……唉，算了。[/log][wa:1490] "
2003603-89 = "― [log=세리카 수영복]反正老師本來就是這種人。[/log][wa:1520] "
2003603-92 = "― [log=세리카 수영복]我早該預料到你會做這種事才對……[/log][wa:1690] "
2003603-95 = "[ns7]「……茜香同學？」\n[ns8]「氛圍好像變了？」"
2003603-99 = "― [log=세리카 수영복]好吧，沒關係。[/log][wa:900] "
2003603-100 = "― [log=세리카 수영복]我也是有備而來的。[/log][wa:2235] "
2003603-103 = "― [log=세리카 수영복]來吧，老師！我們交換！！[/log][wa:1545] "
2003603-104 = "― [log=세리카 수영복]這次輪到老師了唷！[/log][wa:2040] "
2003603-109 = "[ns9]「茜，茜香同學……？」\n[ns10]「測試差不多該結束了……」"
2003603-113 = "啊啊，不行不行。你想得美。"
2003603-114 = "我總算明白了～拉船好像比坐在船上更好玩耶？"
2003603-115 = "剛才拉著船到處走的時候，你好像玩的很開心嘛？現在輪到我了！"
2003603-119 = "……？"
2003603-120 = "等等……！老師！！你想逃去哪裡！！"
2003603-121 = "站住！給我站住！！好卑鄙的大人……！！"
2003603-122 = "可惡！！我現在拉著船根本追不上……！"
2003603-126 = "喂！！！！！！！！！！"

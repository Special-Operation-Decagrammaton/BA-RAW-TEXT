[translation]
52170-1 = "ตอนที่ 17;หัวหน้าที่กลับมา"
52170-4 = "<ใบสมัครเพิ่มเติมสำหรับสัญญาบริการติดตั้งเวทีการแสดง>..."
52170-5 = "<ใบแต่งตั้งผู้รับผิดชอบด้านความปลอดภัยในงานเทศกาล>..."
52170-6 = "<รายงานผลการตรวจสอบความโปร่งใสเงินสนับสนุนชมรมหยินหยาง>..."
52170-10 = "อะ... อึก..."
52170-11 = "อีกวันเดียวก็จะถึงเทศกาลวาราคุแล้ว วันที่น่าเบิกบานอย่างนี้ไม่ควรมาพร้อมกับงานอนุมัติเอกสาร#nเป็นกองขนาดนี้สิ"
52170-12 = "ฉันว่าจะให้คาโฮะทำงานเอกสารที่น่ารำคาญแล้วหาข้ออ้างออกไปเดินเที่ยวข้างนอกแท้ๆ..."
52170-15 = "คุณนิยะ ฉันจะพาชิเซะจังไปซ้อมการแสดงค่ะ ระหว่างนี้ช่วยอนุมัติเอกสารที่ยังค้างอยู่ด้วยนะคะ"
52170-16 = "ไปละนะ~"
52170-17 = "งะ... ไหงงั้นล่ะ?! ให้ฉันไปด้วยไม่ได้เหรอ?!"
52170-18 = "แน่นอนว่าคุณนิยะไปดูซ้อมใหญ่ได้ค่ะ"
52170-19 = "แต่นั่นต้องเป็นหลังจากที่คุณนิยะตรวจสอบและอนุมัติเอกสารเกี่ยวกับเทศกาลวาราคุทุกฉบับ#nที่เลยกำหนดส่งกลับไปนานมากแล้วค่ะ"
52170-20 = "อะ... อึก..."
52170-21 = "การที่คุณนิยะหนีงานมันเป็นเรื่องปกติไปแล้วค่ะ ตอนนี้ฉันไม่ตกใจแล้วละ"
52170-22 = "แต่ถ้าความขี้เกียจของคุณนิยะทำให้เกิดปัญหาในการจัดเทศกาลวาราคุละก็..."
52170-23 = "ฉันจะไม่ปล่อยคุณนิยะไปเด็ดขาดเลยค่ะ"
52170-24 = "คาโฮะ ทำหน้าน่ากลัวจัง~"
52170-25 = "อ่า... เข้าใจแล้วค่ะ..."
52170-28 = "คาโฮะนี่ก็นะ มาวางหมากก่อนที่ฉันจะอู้งานเสียอีก ไหวพริบดีจริงๆ เชียว"
52170-29 = "แต่ฉันก็อยากดูการซ้อมการแสดงของแมวเหมียวชิเซะเหมือนกันนะ~ ทำไมต้องให้อยู่แต่ในห้อง#nแล้วทำงานเอกสารที่น่าปวดหัวด้วยก็ไม่รู้~"
52170-30 = "พอจะมีข้ออ้างเร่งด่วนที่จะเลื่อนงานเอกสารออกไปก่อนมั้ยนะ"
52170-31 = "อย่างเช่นมีแขกคนสำคัญแวะมาหา..."
52170-37 = "คุณนิยะ ขอโทษที่รบกวนตอนที่ยุ่งอยู่นะคะ..."
52170-38 = "พอดีจู่ๆ ก็มีแขกคนสำคัญมาหา คุณนิยะน่าจะต้องออกไปรับแขกหน่อยน่ะค่ะ"
52170-39 = "อ๊ะ ได้ข้ออ้างแล้ว...!"
52170-40 = "ข้ออ้างงั้นเหรอคะ?"
52170-41 = "มะ... ไม่มีอะไรทั้งนั้นค่ะ!"
52170-42 = "จะว่าไป แขกคนสำคัญที่มากะทันหันในเวลานี้คือใครเหรอคะ?"
52170-43 = "หรือว่าเป็นพวกกรรมการจากโรงเรียนอื่นที่อยากมาชม <เทศกาลวาราคุ>...?"
52170-44 = "เปล่าค่ะ ไม่ใช่คนจากโรงเรียนอื่น แต่เป็น..."
52170-45 = "คุณนานาคาโดะ อายาเมะ หัวหน้าคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรันค่ะ"
52170-46 = "หัวหน้าอายาเมะงั้นเหรอ...?"
52170-51 = "ไม่ได้เจอกันนานเลยนะคะ คุณนิยะ"
52170-52 = "เป็นยังไงบ้างคะ สบายดีมั้ย?"
52170-53 = "อะฮะฮ่า... ใจหนึ่งก็อยากบอกว่าสบายดีหรอกนะคะ แต่ถ้าจะบอกว่าที่ผ่านมาไม่มีเรื่องอะไรเลยก็คง#nเป็นเรื่องโกหกกันน่ะค่ะ"
52170-54 = "ก็ในเฮียกคิยาโคของเรา 'มีเรื่องมากมายก่ายกอง' เลยนี่คะ  "
52170-55 = "ก็คงเป็นอย่างนั้นค่ะ... ฉันขอโทษนะที่ละเลยหน้าที่หัวหน้าและหายไปซะนานเลย"
52170-56 = "ยังไงก็ขอบคุณที่ช่วยพูดแบบนั้นนะคะ ฮุฮุ"
52170-60 = "รู้หรือเปล่าคะว่าสมาชิกเฮียกกะเรียวรันคนอื่นไปถึงโรงเรียนสาขาเอบิสุเพื่อตามหา 'หัวหน้าอายาเมะ' กันเลย?"
52170-61 = "ค่ะ ที่จริงฉันได้เจอกับนางุสะและทุกคนที่โรงเรียนสาขาเอบิสุค่ะ"
52170-62 = "แล้วทำไมถึงกลับมาที่นี่คนเดียวล่ะคะ คนอื่นล่ะอยู่ที่ไหนกัน?"
52170-63 = "แล้วคุณครูของชาเล่ต์ที่เดินทางไปกับทุกคนอยู่ที่ไหนคะ?"
52170-64 = "ที่จริงนี่ก็เป็นเหตุผลที่ฉันมาพบคุณนิยะอย่างเร่งด่วนแบบนี้ค่ะ"
52170-65 = "พวกฉันเจอหิมะถล่มเข้าระหว่างตามหาฐานหลักของชมรมความงามของธรรมชาติในทุ่งหิมะใหญ่ค่ะ"
52170-66 = "โชคดีที่ฉันหลีกเลี่ยงหิมะถล่มได้ แต่คนอื่นที่เหลือติดอยู่ในทุ่งหิมะและอยู่ในสถานการณ์อันตราย#nอย่างยิ่งเลยค่ะ เราต้องรีบส่งทีมช่วยเหลือไปที่นั่นค่ะ"
52170-67 = "ถ้าอย่างนั้นก็ไม่มีเวลารีรอสินะคะ..."
52170-68 = "มีใครอยู่ข้างนอกมั้ยคะ?"
52170-72 = "มีเรื่องอะไรเหรอคะคุณนิยะ?"
52170-73 = "หานักเรียนที่ฝีเท้าเร็วแล้วรีบส่งไปยังเขตปกครองตนเองทางเหนือเดี๋ยวนี้เลยค่ะ สมาชิกเฮียกกะเรียวรันกับคุณครู [USERNAME] กำลังเผชิญหิมะถล่มอยู่ที่นั่นค่ะ"
52170-74 = "ค่ะ! รับทราบค่ะ! ฉันจะรีบส่งทีมช่วยเหลือไปที่นั่นค่ะ!"
52170-81 = "ขอบคุณที่ทำเรื่องให้อย่างรวดเร็วด้วยนะคะ... 'สมกับ' ที่เป็นคุณนิยะจริงๆ"
52170-82 = "ไม่หรอกค่ะ นี่คืองานที่ฉันต้องทำในฐานะหัวหน้าชมรมหยินหยางอยู่แล้วค่ะ"
52170-83 = "ในเมื่อคุณตอบรับคำขอร้องแล้ว ฉันขอตัวกลับห้องชมรมเฮียกกะเรียวรันก่อน..."
52170-91 = "ขอโทษนะคะ..."
52170-92 = "คุณน่าจะเหนื่อยจากการเดินทางมาไกล แต่ฉันอยากถามอะไรคุณสักอย่างน่ะค่ะ"
52170-95 = "ค่ะ เชิญถามได้เลย"
52170-98 = "หัวหน้าอายาเมะก็เป็นหนึ่งในคนที่เจอภัยพิบัติจากหิมะถล่มครั้งนี้หรือเปล่าคะ?"
52170-99 = "คะ...? หมายความว่ายังไงคะ?"
52170-100 = "อ้อ คงสับสนกับชื่อนางุสะหรือคิเคียวสินะคะ..."
52170-101 = "เปล่าค่ะ คนที่ฉันพูดถึงคือนานาคาโดะ อายาเมะ หัวหน้าเฮียกกะเรียวรันค่ะ"
52170-102 = "ส่วนคุณก็แค่ 'เงา' ที่เลียนแบบอายาเมะมาไม่ใช่หรอกเหรอคะ?"
52170-103 = "หมายความว่ายังไง..."
52170-104 = "ฉันรู้สึกได้ถึงพลังงานที่ไม่กลมกลืนกัน ก็เลยรู้ตั้งแต่แรกแล้วค่ะว่าคุณไม่ใช่อายาเมะตัวจริง"
52170-105 = "ถ้าจะแสดงเป็น 'อายาเมะที่ทอดทิ้งสมาชิกแล้วเอาตัวรอดคนเดียวท่ามกลางวิกฤต' อย่างน้อยก็ต้อง#nแนบเนียนกว่านี้หน่อยสิคะ"
52170-110 = "ตกลงแล้วอายาเมะตัวจริงอยู่ที่ไหนคะ? ตำนานร้อยเรื่องราวแปลกหน้า"
52170-111 = "สมกับเป็นหัวหน้านิยะจริงๆ... ไม่คิดเลยว่าจะโดนจับได้เร็วขนาดนี้"
52170-116 = "......!"
52170-117 = "แต่จะทำยังไงได้ล่ะ?"
52170-123 = "ก็ฉันไม่ใช่คนประเภทที่คอยเอาใจใส่สมาชิกชมรมอย่างที่คุณคิดน่ะสิ"
52170-125 = "ตอนต่อไป;ความฝันที่แตกต่าง"

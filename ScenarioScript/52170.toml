[translation]
52170-1 = "第17話;歸來的委員長"
52170-4 = "……《公演舞台安裝外包合約追加申請書》。"
52170-5 = "……《祭典內安全管理負責人任命書》。"
52170-6 = "《陰陽部補助金透明稽核結果報告書》……"
52170-10 = "唔唔，唔唔唔……"
52170-11 = "為什麼在和樂祭前夕這種開心的日子裡，我還得處理公文呢？"
52170-12 = "本來打算把麻煩的文書工作交給佳穗，自己找個視察的藉口去街上逛逛的──"
52170-15 = "仁耶大人，我現在要帶知世醬去參加公演彩排，#n麻煩您利用這段時間處理積壓已久的文件稽核工作。"
52170-16 = "先走囉～"
52170-17 = "為，為什麼！？我不能一起去嗎！？"
52170-18 = "當然，如果仁耶大人想一起參加彩排也沒問題。"
52170-19 = "不過前提是您得先完成所有已過回覆期限的和樂祭公文，以及文件稽核的工作。"
52170-20 = "唔，唔唔……"
52170-21 = "仁耶大人拋下工作逃跑已經是家常便飯，因此我並不會感到意外。"
52170-22 = "然而若是因為仁耶大人的怠惰，導致和樂祭的進行出現問題的話……"
52170-23 = "我絕對不會饒過您的哦？"
52170-24 = "佳穗，表情好可怕～"
52170-25 = "我，我知道了……"
52170-28 = "佳穗也真是的，竟然在我偷懶之前先下手為強。#n真是變得更機伶了呢。"
52170-29 = "明明我也想看知世喵的公演彩排的說～#n結果居然只能被困在部室裡處理這些無聊的文件～"
52170-30 = "有沒有什麼急事可以當成藉口，把文書工作再往後拖一拖呢……"
52170-31 = "比如重要的客人臨時來訪之類的──"
52170-37 = "仁耶大人，抱歉在百忙之中打擾您……"
52170-38 = "有位重要的客人臨時來訪，可能需要您稍微確認一下。"
52170-39 = "來了，我的藉口……！"
52170-40 = "藉口？"
52170-41 = "沒，沒什麼！"
52170-42 = "不過話又說回來，會在這時突然來訪的重要客人是誰呢？"
52170-43 = "是其他學園的幹部希望能來參觀「和樂祭」嗎……？"
52170-44 = "不，並非如此……"
52170-45 = "來訪的客人是百花繚亂紛爭調停委員會的委員長，七稜菖蒲同學。"
52170-46 = "菖蒲委員長……？"
52170-51 = "好久不見了，仁耶大人。"
52170-52 = "這段期間您還好嗎？"
52170-53 = "喵哈哈……雖然想用「還好」來回答，#n不過要說這段期間什麼事都沒發生的話，似乎也有些牽強呢。"
52170-54 = "畢竟百鬼夜行確實發生了「很多事」。"
52170-55 = "……我明白。#n身為委員長卻長時間怠忽職守，實在很抱歉。"
52170-56 = "即便只是場面話，光是能聽見你這麼說也很令人高興呢。呵呵。"
52170-60 = "你是否知道百花繚亂的其他成員，為了尋找「菖蒲委員長」而去了惠比壽分校呢？"
52170-61 = "嗯，其實我剛從惠比壽分校回來，也見過名草和其他成員們了。"
52170-62 = "那麼他們現在在哪裡？#n為何只有你一個人回到本館？"
52170-63 = "除此之外，和他們一起行動的夏萊的老師現在又在哪裡？"
52170-64 = "其實我之所以急著求見仁耶大人，就是因為這件事。"
52170-65 = "我們在大雪原尋找花鳥風月部的根據地時，突然遭遇雪崩而受困。"
52170-66 = "雖然我幸運避開了雪崩，但其他人都被困在雪原之下。#n情況非常危急，必須立刻派遣救援隊才行。"
52170-67 = "……看來此事刻不容緩呢。"
52170-68 = "外面有人嗎？"
52170-72 = "請問有何吩咐，仁耶大人？"
52170-73 = "請立刻派腳程快的學生前往北方自治區。#n百花繚亂的成員和[USERNAME]老師似乎遇難了。"
52170-74 = "遵，遵命！我會立刻派遣救援隊！"
52170-81 = "……感謝您的迅速處理。#n[ruby= ・     ・     ・ ]不愧是[/ruby]仁耶大人。"
52170-82 = "哪裡哪裡，這不過是身為陰陽部部長應盡的職責罷了。"
52170-83 = "那麼既然已將此事向您轉達，我就先回百花繚亂的部室──"
52170-91 = "──請留步。"
52170-92 = "雖然你遠道而來想必已十分疲倦，不過我還想再請教一個問題。"
52170-95 = "是，您請問。"
52170-98 = "這次遇難的成員之中，是否有包含菖蒲委員長呢？"
52170-99 = "……咦？這是什麼意思？"
52170-100 = "啊，如果您是指名草或桔梗的話──"
52170-101 = "不，我指的就是百花繚亂的委員長七稜菖蒲。"
52170-102 = "畢竟你只是模仿菖蒲的「影子」對吧？"
52170-103 = "您在說什麼……"
52170-104 = "打從見到你的那一刻起，我就已經從那股不協調的氣息發覺你不是本人了。"
52170-105 = "況且「會拋下陷入危機的部員逃跑的菖蒲」這種演技，未免也太過荒謬了吧。"
52170-110 = "所以真正的菖蒲人在哪裡？陌生的百物語。"
52170-111 = "……不愧是仁耶部長，沒想到這麼快就被識破了啊。"
52170-116 = "……！"
52170-117 = "不過這該怎麼辦呢？"
52170-123 = "我可不是你想像中那麼在乎同伴的委員長啊。"
52170-125 = "下一話;同床異夢"

[translation]
52170-1 = "Episode 17;The President Returns"
52170-4 = "...\"Additional application for stage installation services at the venue.\""
52170-5 = "...\"Festival safety manager appointment request\"..."
52170-6 = "\"Audit report on the Yin-Yang Club subsidy\"..."
52170-10 = "Ughhh..."
52170-11 = "We're just one day away from the joyful Waraku Festival! Why am I the one who has to wrestle all this paperwork?"
52170-12 = "What happened to my beautiful plan to dump all the tedious work on Kaho and go stroll the streets on an \"inspection\"...?"
52170-15 = "Niya, we're heading to the rehearsal now, so please take care of the backlog of paperwork while we're gone."
52170-16 = "Bye-bye!"
52170-17 = "Huh? What?! What about me?!"
52170-18 = "Of course, you're always invited to rehearsals, Niya."
52170-19 = "With the caveat that all of your overdue documents and approvals for the Waraku Festival be done first."
52170-20 = "U-Ugh..."
52170-21 = "Niya, I'm more than accustomed to all your little tricks and schemes to get out of work."
52170-22 = "But if that laziness of yours causes even a SINGLE problem with the Waraku Festival..."
52170-23 = "...you WILL suffer the consequences of your actions this time."
52170-24 = "Scary... You're scary, Kaho!"
52170-25 = "Understood... No objections..."
52170-28 = "Kaho's gotten too sharp for her own good... She cut off my slacking at the source..."
52170-29 = "I can't believe I'm doing paperwork...while Chise's on stage for her rehearsal... Boo-hoo."
52170-30 = "Hmm...where can I find some urgent excuse for blowing all this off?"
52170-31 = "Maybe an important guest will magically appear out of nowhere..."
52170-37 = "Niya, I'm sorry to bother you when you're busy..."
52170-38 = "We have a guest. It's...rather urgent, so could you come meet with her?"
52170-39 = "My excuse! Excellent timing!"
52170-40 = "Your...excuse?"
52170-41 = "Ah, it's nothing!"
52170-42 = "But this is a strange time for an important guest to come visit..."
52170-43 = "Did another academy hear about the Waraku Festival, and they want to see Chise in all her glory?"
52170-44 = "No, it's not that..."
52170-45 = "The president of the Hyakkaryouran Resolution Council, Nanakado Ayame, is here."
52170-46 = "President Ayame...?"
52170-51 = "It's been a while, Niya."
52170-52 = "Have you been well?"
52170-53 = "Nyahaha... Well enough! But the waters have been a bit rough."
52170-54 = "Hyakkiyako has had its fair share of dramatic events, to say the least."
52170-55 = "...I believe it. I can't apologize enough for neglecting my presidential duties for as long as I have."
52170-56 = "Fufu. Just hearing you say that eases the aches of my soul."
52170-60 = "So did the Hyakkaryouran members ever find you? They went to the Ebisu Satellite School in hopes of bringing you back."
52170-61 = "Actually, yes. I was just with them."
52170-62 = "You came back alone? Are they still at Ebisu?"
52170-63 = "And wasn't Schale's Sensei with them as well?"
52170-64 = "Yes, exactly. That's actually why I came to find you as quickly as I could."
52170-65 = "We were searching the Great Snowfield for Nature's Beauty's base when we were hit by a sudden avalanche."
52170-66 = "I just narrowly avoided being buried by the avalanche, but the rest are trapped in the snow and in great danger. We need to dispatch a rescue team immediately."
52170-67 = "...If that's the case, there's no time to waste."
52170-68 = "Is anyone out there?"
52170-72 = "Yes, President Niya?"
52170-73 = "Send our fastest students to the northern district immediately. It seems the Hyakkaryouran members and [USERNAME] Sensei are trapped in an avalanche."
52170-74 = "Y-Yes, ma'am! I'll dispatch a rescue team right away!"
52170-81 = "...Thank you for your quick response."
52170-82 = "As the head of the Yin-Yang Club, it's my duty, after all."
52170-83 = "Since that's been settled, I'll return to the Hyakkaryouran club room and—"
52170-91 = "Stop."
52170-92 = "You must be exhausted from your long journey, but I have just one more question."
52170-95 = "Of course, go ahead."
52170-98 = "Is President Ayame among those stranded?"
52170-99 = "...What? What do you mean?"
52170-100 = "Oh, if you mean Nagusa or Kikyou..."
52170-101 = "Perhaps I was unclear. I asked if the Hyakkaryouran president, Nanakado Ayame, is among those stranded in this avalanche of yours."
52170-102 = "Did you think a shadow like you would pass my notice?"
52170-103 = "What are you...?"
52170-104 = "To think you thought you could trick me with that reprehensible, distorted aura of yours."
52170-105 = "Furthermore, Ayame would never abandon someone in need, let alone a friend. You can only suspend disbelief so far."
52170-110 = "So where is the real Ayame, you Phantom Fable?"
52170-111 = "...You figured it out faster than I expected, Niya. But I guess I'm not surprised."
52170-116 = "...!"
52170-117 = "But...what now?"
52170-123 = "After all, Ayame doesn't care about those members of hers as much as you seem to believe."
52170-125 = "Next Episode;On a Different Page"

[translation]
2005105-1 = "非常適合呢，澪紗"
2005105-2 = "（因為擔心而前去找澪紗）"
2005105-5 = "[ns]「太好了，幸好沒發生什麼大事。」"
2005105-6 = "老師已經不會對這種事感到驚訝或好奇了呢。"
2005105-7 = "其實是我在把衣服放進衣櫃的時候，不小心讓冬季外套裡的燃燒彈爆炸了……"
2005105-8 = "雖然急忙把火撲滅……衣櫃裡的衣服卻全都濕透了……啊哈哈……"
2005105-9 = "要不是洗衣店剛好送來這件衣服……"
2005105-10 = "差點就連家門都出不去了……"
2005105-11 = "所以現在正打算去買新衣服！"
2005105-12 = "[s]「要一起去嗎？」"
2005105-13 = "！！"
2005105-14 = "老師要幫我挑嗎！？太棒了！"
2005105-15 = "我，我們走吧！馬上出發！！"
2005105-18 = "唔嗯……"
2005105-19 = "果然完全搞不懂呢！"
2005105-20 = "好像還是直接把模特兒假人穿的衣服整套買下來比較方便！"
2005105-21 = "[s]「澪紗是對時尚不太在意的類型嗎？」"
2005105-22 = "如果是加一些飾品來點綴的話，我還挺喜歡的！"
2005105-23 = "不過現在流行什麼衣服就不太清楚了！"
2005105-24 = "所以乾脆直接買展示的套裝，比較不容易失敗……"
2005105-25 = "那麼就先挑這套，準備去結帳──"
2005105-26 = "喂，不能退貨是什麼意思啊！"
2005105-27 = "根本是在強迫推銷吧！？"
2005105-32 = "這，這位客人！！#n非常抱歉，不過我沒辦法幫您辦理退貨！！"
2005105-33 = "洗標上也確實有標示不能水洗……"
2005105-34 = "現在是在開玩笑嗎，啊！？"
2005105-35 = "所以你是要我大姐頭永遠把這件毛衣當露腰裝穿是不是啦！？"
2005105-36 = "噫噫……最重要的是您沒有攜帶收據，這樣我們會很為難的！！"
2005105-37 = "看來用說的你聽不懂，非得逼我們把這裡全部砸爛是吧？"
2005105-38 = "老，老師！好像得阻止他們才行……！"
2005105-39 = "可是如果先換衣服的話就來不及了……"
2005105-40 = "[s1]「魔法少女不是守護鄰里的英雄嗎？」\n[s2]「這副打扮正好符合Dress Code！」"
2005105-43 = "老師！"
2005105-44 = "是！我立刻出發……！"
2005105-45 = "那麼，呼……"
2005105-49 = "砰！！沙啦啦啦！！啪邦啪邦！！！"
2005105-54 = "自衛隊的超級巨星，必殺的心之王牌……"
2005105-55 = "宇沢澪紗，登場！！！"
2005105-57 = "這，這傢伙什麼意思啊！？"
2005105-58 = "你也是來退貨的嗎？"
2005105-59 = "居然連那種衣服都有賣，這間店還真厲害啊！！"
2005105-61 = "威脅善良市民的人，我絕對不會原諒！"
2005105-62 = "而且我覺得露腰的衣服還挺適合你的哦！"
2005105-63 = "你在胡說什麼啊！？"
2005105-64 = "給我上！！"
2005105-73 = "呃啊……"
2005105-74 = "怎麼會這麼強……"
2005105-79 = "這是正義的懲罰！"
2005105-80 = "太厲害了！！真是感激不盡！！"
2005105-85 = "竟然一瞬間就制服了他們，超強的耶！"
2005105-86 = "好帥哦！難道是英雄嗎？"
2005105-87 = "嘿，嘿嘿……真不好意思……"
2005105-88 = "這不算什麼！希望大家都能安心度過愉快的時光！"
2005105-94 = "啊，這位魔法少女的客人……#n不好意思，您還沒結帳呢。"
2005105-95 = "吊牌還在衣服上面……請來這邊，我馬上為您結帳。"
2005105-99 = "啊……"
2005105-101 = "麻，麻煩你了……！"
2005105-103 = "（於是和害羞的澪紗一起完成了購物）"
2005105-104 = "（他換上的新衣服相當可愛）"

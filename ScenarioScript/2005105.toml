[translation]
2005105-1 = "เหมาะมากเลย เรอิสะ"
2005105-2 = "(คุณครูออกมาหาเรอิสะด้วยความกังวล)"
2005105-5 = "[ns] \"โล่งอกไปทีนะที่ไม่ได้เกิดเรื่องใหญ่อะไร\""
2005105-6 = "ตอนนี้พอเห็นฉันในชุดนี้ก็ไม่ตกใจหรือสงสัยแล้วสินะคะ"
2005105-7 = "ฉันกำลังจัดตู้เสื้อผ้าอยู่น่ะค่ะ แต่ก็พลาดทำระเบิดเพลิงที่ใส่ไว้ในเสื้อคลุมกันหนาวระเบิดออกมา..."
2005105-8 = "ฉันรีบดับไฟแล้ว แต่ว่า... เสื้อผ้าก็ไหม้หมดตู้เลย... อะฮ่าฮ่า..."
2005105-9 = "ถ้าร้านซักรีดไม่มาส่งเสื้อผ้าตอนนั้นพอดีละก็..."
2005105-10 = "ฉันคงไม่ได้ออกมาจากบ้านแล้วค่ะ..."
2005105-11 = "ตอนนี้ฉันก็เลยจะไปซื้อเสื้อผ้าใหม่ค่ะ!"
2005105-12 = "[s] \"ไปด้วยกันมั้ย?\""
2005105-13 = "!!"
2005105-14 = "คุณครูจะช่วยเลือกเหรอคะ?! ดีเลยค่ะ!"
2005105-15 = "ปะ... ไปกันเลยค่ะ! ตอนนี้เลย!!"
2005105-18 = "อืม"
2005105-19 = "เลือกไม่ถูกเลยค่ะ!"
2005105-20 = "ซื้อเป็นเซ็ตตามที่หุ่นโชว์ใส่น่าจะง่ายดีนะคะ!"
2005105-21 = "[s] \"เรอิสะเป็นคนไม่ค่อยสนใจเรื่องแฟชั่นเหรอ?\""
2005105-22 = "ฉันชอบการตกแต่งด้วยเครื่องประดับค่ะ!"
2005105-23 = "แต่ถ้าเป็นเสื้อผ้าละก็ ฉันไม่รู้หรอกค่ะว่าแบบไหนกำลังเป็นกระแสอยู่!"
2005105-24 = "ก็เลยคิดว่าถ้าซื้อเป็นเซ็ตไปเลย โอกาสที่จะใส่แล้วออกมาไม่สวยน่าจะน้อยลง..."
2005105-25 = "เอาเป็นว่าเลือกตามนี้แล้วกัน ต่อไปก็ไปจ่ายเงิน..."
2005105-26 = "อะไรกัน ขอคืนเงินไม่ได้งั้นเหรอ แบบนี้มีที่ไหนกัน!"
2005105-27 = "งั้นก็เท่ากับบังคับให้ซื้อน่ะสิ!"
2005105-32 = "คะ... คุณลูกค้าครับ!! ต้องขอโทษด้วยนะครับ แต่คงคืนเงินให้ไม่ได้ครับ!!"
2005105-33 = "บนป้ายก็บอกชัดเจนแล้วว่าไม่ให้ซักธรรมดา..."
2005105-34 = "ล้อกันเล่นเหรอ ฮะ?"
2005105-35 = "จะให้ฉันใส่เสื้อขนสัตว์ที่ซักหดจนเป็นเสื้อครอปต่อรึไง?"
2005105-36 = "เฮือกก แต่ที่สำคัญคือคุณลูกค้าไม่มีใบเสร็จมาด้วยนะครับ!!"
2005105-37 = "พูดจากันดีๆ ไม่ได้ สงสัยจะต้องใช้กำลังแทนแล้วละ หรือจะเอา?"
2005105-38 = "คะ... คุณครู! น่าจะต้องเข้าไปห้ามแล้วละค่ะ...!"
2005105-39 = "แต่ถ้าให้ฉันไปเปลี่ยนเสื้อผ้าออกมา ก็น่าจะไม่ทัน..."
2005105-40 = "[s1] \"นี่ละเวลาที่สาวน้อยเวทมนตร์ต้องออกปฏิบัติการ!\"\n[s2] \"ใส่ชุดนี้แหละ เหมาะกับสถานการณ์ที่สุดแล้ว\""
2005105-43 = "คุณครู!"
2005105-44 = "ค่ะ! งั้นเดี๋ยวฉันมานะคะ...!"
2005105-45 = "ถ้างั้นก็ ฮึบบ"
2005105-49 = "ปิ๊ง!! ชาลาลาลาล่า!! ป่าปั้มปาป๊า!!!"
2005105-54 = "ซูเปอร์สตาร์แห่งกลุ่มรักษาความสงบ เอซไม้ตาย"
2005105-55 = "อุซาวะ เรอิสะ ปรากฏตัวแล้ว!!!"
2005105-57 = "อะ... อะไรของยัยนั่นน่ะ?!"
2005105-58 = "มาขอคืนเงินเหมือนกันเหรอ?"
2005105-59 = "ขายชุดแบบนั้นด้วยเหรอเนี่ย ร้านนี้สุดยอดไปเลยนะ!!"
2005105-61 = "ฉันไม่ให้อภัยคนที่คุกคามพลเมืองที่แสนดีหรอกค่ะ!"
2005105-62 = "อ้อ เสื้อครอปตัวนี้เหมาะกับคุณดีนะคะ!"
2005105-63 = "พูดอะไรของเธอน่ะ?!"
2005105-64 = "หลีกไปให้พ้นเลย!!"
2005105-73 = "เฮือกก..."
2005105-74 = "ทำไมถึงแข็งแกร่งขนาดนั้นล่ะ..."
2005105-79 = "ในนามแห่งความยุติธรรม ฉันไม่ให้อภัยพวกคุณค่ะ!"
2005105-80 = "สุดยอดไปเลย!! ขอบคุณนะครับ!!"
2005105-85 = "ยอดเยี่ยมไปเลยค่ะ จัดการได้ในพริบตาเลย!"
2005105-86 = "เท่จัง! เหมือนฮีโร่เลย"
2005105-87 = "อุ.. ฮุฮุ... เขินจังเลยค่ะ..."
2005105-88 = "ฉันไม่ได้ทำอะไรมากหรอกค่ะ! ซื้อของกันต่ออย่างสบายใจได้เลยค่ะ!"
2005105-94 = "อ๊ะ คุณลูกค้าสาวน้อยเวทมนตร์ พอดีว่ายังไม่ได้จ่ายเงินน่ะครับ"
2005105-95 = "ป้ายของเสื้อผ้ายังห้อยอยู่เลย... ช่วยมาคิดเงินทางนี้ก่อนนะครับ"
2005105-99 = "อ๊ะ"
2005105-101 = "ค่ะ...!"
2005105-103 = "(แล้วคุณครูก็ซื้อเสื้อผ้ากับเรอิสะที่เขินอายจนเสร็จ)"
2005105-104 = "(เรอิสะดูน่ารักในเสื้อผ้าชุดใหม่ที่เปลี่ยนมาใส่)"

[translation]
2005105-1 = "Looks Good on You, Reisa"
2005105-2 = "I was worried about Reisa, so I went to find her."
2005105-5 = "[ns] \"I'm grateful it wasn't anything serious.\""
2005105-6 = "I'm glad you're not acting overly surprised!"
2005105-7 = "Look, I was changing, and then this slightly expired incendiary grenade in my winter jacket blew up."
2005105-8 = "I extinguished the flames, but now my closet's all covered in repellent foamy stuff."
2005105-9 = "Then the dry cleaner arrived with this outfit...."
2005105-10 = "It was the only way I could step out of the house!"
2005105-11 = "Now, I'm on my way to buy some normal, new clothes!"
2005105-12 = "[s] \"Want to go together?\""
2005105-13 = "!!"
2005105-14 = "You'll help me pick out clothes? Sounds amazing!"
2005105-15 = "L-Let's go! Right now!"
2005105-18 = "Umm..."
2005105-19 = "I don't know where to start."
2005105-20 = "Maybe I should just...follow what the mannequin's doing?"
2005105-21 = "[s] \"You don't care about fashion?\""
2005105-22 = "I like little decorations! Buttons, patches, details...."
2005105-23 = "But I'm not up to date on fashion trends!"
2005105-24 = "I just think...maybe I should trust this mannequin. Someone thought this out. It's a whole set."
2005105-25 = "I'll pick these and pay f—"
2005105-26 = "Hey, what do you mean I can't get a refund?!"
2005105-27 = "This is a scam!"
2005105-32 = "M-Ma'am?! My apologies, but I can't give you a refund!"
2005105-33 = "The label said that you can't wash this... You did! And it smells like bleach!"
2005105-34 = "Are you serious?"
2005105-35 = "What am I supposed to do? Tell my girl that she has to wear this sweater like it's a crop top?"
2005105-36 = "Uh! I'm s-so sorry, but you don't even have a receipt!"
2005105-37 = "A receipt? Hope you have a \"receipt\" for this place. Let's trash it!"
2005105-38 = "S-Sensei! I think we should step in!"
2005105-39 = "But.... Uh! I don't have time to change!"
2005105-40 = "[s1] \"Magical girls are all about helping the community.\"\n[s2] \"Isn't this the perfect outfit for a hero?\""
2005105-43 = "Sensei!"
2005105-44 = "Yes! I must rise to the occasion!"
2005105-45 = "In that case... *inhale*"
2005105-49 = "Bam!! Shashasha!! Ba-bam ba-ba!!"
2005105-54 = "The Vigilante Crew's Superstar. The Ultimate Heart Ace."
2005105-55 = "Uzawa Reisa has arrived!"
2005105-57 = "Wh-Who are you?"
2005105-58 = "You also here for a refund?"
2005105-59 = "Wow! This store sells cosplay?"
2005105-61 = "None shall evade justice's might! How dare you threaten this innocent civilian!"
2005105-62 = "Also, I think the crop top looks good!"
2005105-63 = "What are you talking about?!"
2005105-64 = "Get her!"
2005105-73 = "Ouch..."
2005105-74 = "How is she so strong...?"
2005105-79 = "In the name of justice!"
2005105-80 = "You're incredible! Thank you!"
2005105-85 = "That was great. You saved me!"
2005105-86 = "So cool! Is she a hero?"
2005105-87 = "H-Heehee... That's so flattering..."
2005105-88 = "It was nothing! Please continue as usual and enjoy your shopping!"
2005105-94 = "Oh? Miss magical girl, you left too soon."
2005105-95 = "You still have a security tag. Here, I'll get it."
2005105-99 = "Oh."
2005105-101 = "Indeed...!"
2005105-103 = "I finished shopping with Reisa, who blushed the whole time."
2005105-104 = "Her new clothes were cute."

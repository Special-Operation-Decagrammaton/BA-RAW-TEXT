[translation]
2002306-1 = "另外一條道路"
2002306-2 = "夏萊．辦公室"
2002306-3 = "（一如往常的某個平凡午後……）"
2002306-9 = "[ns]「環奈……？」"
2002306-10 = "那個，老師。百忙之中打擾您非常抱歉。"
2002306-11 = "有件事想請您幫忙……"
2002306-12 = "[s1]「當然沒問題。」\n[s2]「居然會接到環奈的電話，真少見。」"
2002306-15 = "因為是個我實在無能為力的問題……"
2002306-16 = "嗚嗚……嗚啊啊啊……"
2002306-20 = "[ns]「好像聽見了小孩的哭聲……」"
2002306-21 = "是的。我想請您幫忙的正是這件事……"
2002306-24 = "在完成任務返回學校的途中，發現了這個迷路的孩子……"
2002306-25 = "嗚啊啊啊啊啊！"
2002306-28 = "[ns3]「也就是說，你雖然想幫助迷路的孩子……」\n[ns4]「但他一看見環奈的臉就哭個不停是嗎？」"
2002306-31 = "是的，沒錯……"
2002306-32 = "公安局的業務中，幾乎不會有接觸到孩子的機會……"
2002306-33 = "雖然我自認有用溫柔的語氣向他搭話，似乎還是嚇到他了。"
2002306-34 = "嗚嗚……嗚嗚……"
2002306-35 = "即使我想問出監護人的名字或住址，他卻一直哭個不停，#n目前處於完全無法交涉的狀態。"
2002306-36 = "我也試著請生活安全局接手，不過不知道是不是因為在午休時間所以聯絡不上……"
2002306-37 = "該怎麼做才能讓孩子停止哭泣呢……？"
2002306-38 = "[s]「帶著笑容搭話不行嗎？」"
2002306-39 = "笑容，是嗎……"
2002306-40 = "笑容，笑容……很好，笑容。"
2002306-44 = "小朋友你好呀？"
2002306-45 = "（嘻嘻）"
2002306-46 = "嗚哇啊啊啊啊──！"
2002306-50 = "……失敗了。"
2002306-51 = "[ns]「真傷腦筋……」"
2002306-53 = "[ns]「總之我過去一趟吧，可以告訴我地點嗎？」"
2002306-54 = "不需要這麼勞煩您……"
2002306-55 = "沒關係的，老師。#n保護市民是女武神警察學園的工作。"
2002306-56 = "不能連這種事都麻煩繁忙的夏萊的老──"
2002306-57 = "嗚哇啊啊啊啊──！"
2002306-61 = "……我在D.U.北區芝町5丁目的入口附近等您。#n不好意思，麻煩您幫忙了。"
2002306-63 = "（抵達現場後，安撫了孩子，並詢問了家裡的地址和聯絡方式）"
2002306-64 = "（後來將其交給生活安全局的學生，順利把他送回了家人身邊）"
2002306-67 = "……呼，今天承蒙您關照了。"
2002306-68 = "如果沒有老師的幫忙，我現在也許還是一副狼狽的樣子吧。"
2002306-69 = "身為女武神警察學園的局長，竟然連一個迷路的孩子都幫不了，#n得要借助老師的幫忙……"
2002306-70 = "看來聽從前輩們的建議，沒有到生活安全局去是正確的。"
2002306-71 = "我這種不親切的狂犬如果在生活安全局，也只會讓市民更加不安吧。"
2002306-72 = "……我果然還是只能待在公安局。"
2002306-73 = "[s]「我覺得環奈在生活安全局也能表現得很好哦。」"
2002306-74 = "……您是認真的嗎？"
2002306-75 = "連一個小孩都保護不了的我，是不可能讓市民安心的。"
2002306-76 = "雖然在警察學校難以做出評價，#n不過我認為能以笑容待人，讓人們感到安心也是非常了不起的才能。"
2002306-77 = "而我……並不具備那種才能。"
2002306-78 = "[ns]「但是環奈依然認真對待了哭泣的孩子對吧。」"
2002306-80 = "[ns5]「一開始會失敗是很正常的。」\n[ns6]「只要努力一定能夠辦到的。」"
2002306-86 = "……這我就不清楚了。"
2002306-87 = "事到如今，想像未曾選擇的道路也沒什麼意義。"
2002306-88 = "……不過，沒有被稱為「狂犬」的我啊……"
2002306-89 = "……說不在意是騙人的，#n但我認為我很適合狂犬這個名號。"
2002306-90 = "……今天真的非常感謝您的幫忙。"
2002306-91 = "希望往後能在與事件無關的地方與您再會。#n先告辭了。"

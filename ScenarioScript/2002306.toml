[translation]
2002306-1 = "ความฝันของหัวหน้า"
2002306-2 = "สำนักงานชาเล่ต์"
2002306-3 = "(ในช่วงบ่ายที่แสนธรรมดาเช่นเคย......)"
2002306-9 = "[ns] \"คันนะ...? จู่ๆ มีเรื่องอะไรเหรอ?\""
2002306-10 = "คือ... คุณครูคะ ขอโทษที่มารบกวนตอนงานยุ่งนะคะ......"
2002306-11 = "ฉันขอความช่วยเหลือจากครูสักครู่หนึ่งได้มั้ยคะ?"
2002306-12 = "[s1] \"อื้ม ได้สิ ไม่ต้องขออนุญาตหรอก\" \n[s2] \"คันนะโทรมาขอความช่วยเหลือแบบนี้ ไม่ได้มีบ่อยๆ นะเนี่ย\""
2002306-15 = "ค่ะ พอดีฉันต้องเผชิญกับปัญหาที่จัดการด้วยตัวเองไม่ได้น่ะค่ะ..."
2002306-16 = "แง...แง..."
2002306-20 = "[ns] \"ครูได้ยินเสียงเหมือนเด็กร้องไห้เลย...\""
2002306-21 = "ค่ะ นั่นคือปัญหาที่ฉันกำลังเจอเลยค่ะ......"
2002306-24 = "ระหว่างทางที่ฉันกลับมาจากโรงเรียน ฉันไปเจอกับเด็กหลงทางเข้าค่ะ......"
2002306-25 = "แงงงงงงงง!"
2002306-28 = "[ns3] \"ก็เลยจะช่วยพาเด็กหลงทางกลับบ้าน...\"\n[ns4] \"แต่เด็กเห็นหน้าคันนะแล้วไม่หยุดร้องไห้เลยงั้นเหรอ?\""
2002306-31 = "ใช่ค่ะ เป็นอย่างนั้นเลยค่ะ..."
2002306-32 = "ตั้งแต่ทำงานของกรมความมั่นคงสาธารณะมา ฉันไม่เคยเจองานเกี่ยวกับเด็กๆ เลย..."
2002306-33 = "ฉันไม่ได้ตั้งใจจะทำให้เด็กกลัวนะคะ แต่เด็กคงเห็นแล้วกลัวไปเองค่ะ"
2002306-34 = "ฮึกๆ... ฮือ..."
2002306-35 = "ฉันแค่ถามคำถามเพื่อจะเก็บข้อมูลไม่กี่คำถาม แต่ไม่ว่าจะพูดอะไรไปเด็กก็ร้องไม่หยุดเลย การเจรจาไม่เป็นผลเลยค่ะ"
2002306-36 = "ฉันจะส่งเรื่องนี้ให้สำนักรักษาความปลอดภัย แต่ตอนนี้เป็นเวลาพักกลางวัน ก็เลยติดต่อทางนั้นไม่ได้#nเลยน่ะค่ะ"
2002306-37 = "มีวิธีไหนที่จะทำให้เด็กหยุดร้องได้บ้างมั้ยคะ...?"
2002306-38 = "[s] \"ลองยิ้มให้เด็กดูมั้ย?\""
2002306-39 = "ยิ้ม... เหรอคะ?"
2002306-40 = "...ฉันจะพยายามดูค่ะ"
2002306-44 = "หนู มองพี่นะ"
2002306-45 = "(ยิ้ม)"
2002306-46 = "แงงงงงงงง!"
2002306-50 = "...ไม่ได้ผลค่ะ"
2002306-51 = "[ns] \"แย่แล้ว...\""
2002306-53 = "[ns] \"ครูจะไปช่วยเอง ช่วยส่งโลเคชันมาให้หน่อยได้มั้ย?\""
2002306-54 = "คะ? คุณครูจะออกมาเองเหรอคะ?"
2002306-55 = "ไม่ต้องทำขนาดนั้นหรอกค่ะ การคุ้มครองและชี้นำพลเมืองคืองานของสถาบันฝึกตำรวจวัลคิรี่อยู่แล้ว"
2002306-56 = "ฉันจะให้คุณครูชาเล่ต์ที่งานรัดตัวอยู่แล้วมาเหนื่อยกับงานของสถาบันฝึกตำรวจวัลคิรี่ไม่ได้—"
2002306-57 = "มุแงงงงงงง--!!"
2002306-61 = "...D.U. เขตเหนือ หน้าทางเข้าถนนสาย 5 ชิบะทาวน์ค่ะ แล้วฉันจะรอนะคะ รบกวนด้วยค่ะ"
2002306-63 = "(หลังจากนั้นไม่นาน คุณครูก็ไปถึงที่ที่คันนะและเด็กอยู่ และช่วยปลอบเด็กพร้อมกับถามที่อยู่และเบอร์#nติดต่อที่บ้าน)"
2002306-64 = "(ระหว่างนั้นมีนักเรียนจากสำนักรักษาความปลอดภัยที่ผ่านมาพอดี คุณครูจึงขอให้ช่วยพาเด็กกลับบ้าน#nอย่างปลอดภัย...)"
2002306-67 = "เฮ้อ... วันนี้ฉันติดหนี้บุญคุณคุณครูแล้วค่ะ"
2002306-68 = "ถ้าคุณครูไม่มาช่วย เด็กก็คงกลัว และฉันคงกังวลจนทำอะไรให้เด็กอกสั่นขวัญหายมากกว่าเดิมอีกค่ะ"
2002306-69 = "เป็นถึงหัวหน้าสถาบันฝึกตำรวจวัลคิรี่ แต่ดูแลเด็กหลงทางคนเดียวยังไม่ได้ แถมยังต้องมาขอความ#nช่วยเหลือจากคุณครูอีก..."
2002306-70 = "ดีแล้วนะคะที่ฉันฟังรุ่นพี่ ก็เลยไม่ได้ไปสำนักรักษาความปลอดภัย"
2002306-71 = "ถ้าหมาบ้าไร้มนุษยสัมพันธ์อย่างฉันไปทำงานในสำนักรักษาความปลอดภัย ก็คงจะมีแต่ทำให้พลเมือง#nวิตกกังวลค่ะ"
2002306-72 = "...ดีแล้วนะคะที่ฉันมาที่กรมความมั่นคงสาธารณะ"
2002306-73 = "[s] \"คันนะก็น่าจะทำได้ดีในสำนักรักษาความปลอดภัยนะ\""
2002306-74 = "...คุณครูพูดจริงเหรอคะ?"
2002306-75 = "ตำรวจที่แม้แต่เด็กคนเดียวก็ปลอบไม่ได้ ไม่มีทางตอบสนองต่อการร้องเรียนของประชาชนได้นี่คะ?"
2002306-76 = "เรื่องนี้มักถูกมองข้ามในสถาบันฝึกตำรวจบ่อยๆ ค่ะ แต่การตอบสนองต่อผู้คนด้วยรอยยิ้มและสร้าง#nความมั่นใจให้คนอื่นได้มันเป็นพรสวรรค์ที่ติดตัวมาตั้งแต่เกิดเลยค่ะ"
2002306-77 = "และฉันก็... ไม่มีพรสวรรค์แบบนั้นเลยค่ะ"
2002306-78 = "[ns] \"แต่คันนะก็พยายามอย่างถึงที่สุดเพื่อปลอบเด็กให้หยุดร้องนี่นา\""
2002306-80 = "[ns5] \"ไม่ว่าอะไรก็ตาม ทำครั้งแรกจะไม่ชินทั้งนั้นแหละ\"\n[ns6] \"ความพยายามเอาชนะพรสวรรค์ได้นะ\""
2002306-86 = "...ไม่รู้สิคะ"
2002306-87 = "ถึงคุณครูจะพูดแบบนั้น แต่ตอนนี้ฉันก็ไม่เห็นความหมายของเส้นทางที่ฉันไม่ได้เลือกเท่าไรแล้วค่ะ"
2002306-88 = "ชีวิตของโอกาตะ คันนะ ที่ไม่ใช่ 'หมาบ้า' ตามที่ใครเรียกกัน..."
2002306-89 = "ถึงมันจะดูน่าสนใจ แต่สำหรับฉันแล้ว ชุดของหมาบ้าน่าจะเหมาะสมกับฉันที่สุดแล้วค่ะ"
2002306-90 = "ยังไงฉันก็ต้องขอบคุณสำหรับความช่วยเหลืออีกครั้งนะคะ"
2002306-91 = "หวังว่าครั้งหน้าเราจะได้เจอกันในที่อื่น และในภาพลักษณ์อื่นๆ นะคะ"

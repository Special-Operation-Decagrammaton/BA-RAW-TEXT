[translation]
1007002-1 = "第一印象"
1007002-2 = "夏萊．辦公室"
1007002-3 = "（雖然說了會準時到）"
1007002-7 = "（但過了10分鐘都沒有音訊……）"
1007002-8 = "[ns1]「是不是發生什麼事了……？」\n[ns2]「打個電話看看吧。」"
1007002-12 = "[ns]「……嗯？」"
1007002-13 = "（電話的鈴聲從門外傳來）"
1007002-14 = "哦哇啊！"
1007002-20 = "（聽見大叫後慌忙地到走廊上一看……）"
1007002-25 = "[ns]「美奈……？」"
1007002-26 = "糟糕……我都做了什麼好事。"
1007002-27 = "本來不該是這樣的……對不起，老師。"
1007002-28 = "包含遲到的事情在內，請容我向你賠罪。"
1007002-29 = "[s3]「遲到倒是沒關係……」\n[s4]「不過你在那裡做什麼？」"
1007002-32 = "呵，這件事啊。"
1007002-33 = "說起來雖然簡單──不過也因此重要。"
1007002-34 = "我想老師應該也知道──#n開頭比什麼都重要對吧？"
1007002-35 = "最初抱有的印象會影響今後的發展性。"
1007002-36 = "就像第一張骨牌一樣……#n第一張會影響第二張、第二張又會影響第三張，如此連鎖下去。"
1007002-37 = "[s]（守時應該一樣重要吧……）"
1007002-38 = "所以，該怎麼做才能更像冷硬派、更加帥氣地登場……"
1007002-39 = "更重要的是，思考怎樣才是配的上初次擔任夏萊值日生的登場的結果──"
1007002-40 = "……就是在不知不覺間超過了約好的時間。"
1007002-41 = "哎呀哎呀，俗話說過猶不及就是這個意思吧……"
1007002-42 = "但是老師，無論是誰應該都煩惱過這個問題才對。"
1007002-43 = "自信滿滿地叼著糖果，單手舉著手槍打開門……"
1007002-44 = "與消除氣息，像專家一樣祕密地潛入，兩者的印象會相當不同吧？"
1007002-45 = "如果是老師，會選擇哪一種呢？#n不……光是想像這件事也是一種樂趣呢。"
1007002-46 = "[s]「啊哈哈……這已經是讓人印象非常深刻的登場了……」"
1007002-47 = "呵，想不到會被老師稱讚。#n從結果來看，這就是正確答案啊。"
1007002-56 = "[ns5]「美奈畢竟是第一次當值日生……」\n[ns6]「有什麼想問的嗎？」"
1007002-59 = "啊啊，關於這點……"
1007002-60 = "首先，必須要決定對彼此的稱呼才行。"
1007002-61 = "[s]「稱呼……？」"
1007002-62 = "用什麼方式稱呼彼此，這件事其實遠比世人們所想的重要。"
1007002-63 = "要說為什麼的話，因為這直接關連到彼此的關係。"
1007002-64 = "一般來說，我應該稱呼你為「老師」──"
1007002-65 = "然而遺憾的是，我不打算滿足於這種程度的關係。"
1007002-66 = "我們之間的關係應該比其他學生更特別一點吧？"
1007002-67 = "呵……你不這麼認為嗎，老師。"
1007002-68 = "[s]「……也，也許是吧？」"
1007002-69 = "哦哦，老師的想法也和我一樣啊！真令人開心！"
1007002-70 = "與玄龍門執行部長的職位無關，能展現我們之間的羈絆的稱呼……"
1007002-74 = "真令人煩惱。好像沒那麼容易想到。"
1007002-75 = "不過也正因為無法輕易得出答案才更顯得有意義。"
1007002-76 = "[s]（就先交給美奈吧……）"
1007002-77 = "……司令官？"
1007002-78 = "[s]「夏萊又不是軍隊！」"
1007002-79 = "那……指揮官？"
1007002-80 = "[s]「不能引起誤會！」"
1007002-81 = "Master？"
1007002-82 = "[s]「會不會差太多了！？」"
1007002-83 = "Doctor？"
1007002-84 = "[s]「我也不是醫生啊！」  "
1007002-85 = "……同志？"
1007002-88 = "[ns]「這是其他學生的叫法！」"
1007002-95 = "（之後一整天都在考慮對彼此的稱呼）"
1007002-96 = "（想當然，值日生的作業完全沒有進展）"
1007002-97 = "（所幸第一天只有一些輕鬆的工作，所以沒有造成問題……）"
1007002-99 = "好累……"
1007002-100 = "[s]「就是說啊……」"
1007002-101 = "繞了一圈居然還是叫「老師」……"
1007002-102 = "老師應該也不滿意吧，不過今天也只能到此為止。"
1007002-103 = "[s]「叫『老師』就行了……」"
1007002-104 = "是，是嗎？#n那倒也行……"
1007002-106 = "（利用剩下的時間與美奈一起工作）"

1007002-26 = "3;미나;06;앗차…… 이건 실수로군."
1007002-27 = "3;미나;05;이 내가 이런 초보적인 실수를 저지르다니, 미안하군. 선생님.\n#3;greeting"
1007002-28 = "3;미나;02;물론 약속 시간에 늦은 것을 포함해서 말이야."
1007002-29 = "[s3] \"아니, 그건 괜찮은데……\"\n[s4] \"문밖에서 뭐 하고 있었어?\""
1007002-30 = "#wait;100"
1007002-31 = "#wait;100"
1007002-32 = "3;미나;03;훗. 그것 말인가."
1007002-33 = "3;미나;11;설명하자면 간단한 이야기지. 그러나 동시에 중요한 이야기이기도 하고.\n#3;em;[반응]"
1007002-34 = "3;미나;05;알고 있겠지만, 선생님. 사람 사이에 있어서 첫 만남은 매우 중요한 요소다."
1007002-35 = "3;미나;08;첫 만남을 통해 인상이 결정되고, 그 인상을 바탕으로 교류가 이어지지."
1007002-36 = "3;미나;07;마치 도미노의 첫 블록처럼…… 첫 만남이라는 것은 무수히 많은 연쇄 작용을 낳기 마련이다.\n#3;em;[...]\n#3;closeup"
1007002-37 = "[s] (그런 말을 하는 것 치고는 지각했지만 말이야……)"
1007002-38 = "3;미나;08;그래서, 어떻게 하면 보다 하드보일드하고 쿨하게 등장할 수 있을지."
1007002-39 = "3;미나;02;무엇이 우리들의 첫 만남에 가장 어울리는 방식일지!\n#3;em;[!]\n#3;jump"
1007002-40 = "3;미나;05;……그것을 고민하다가, 그만 늦어지고 말았다고 해야겠군."
1007002-41 = "3;미나;06;이런, 이런. 뭐든 적당한 것이 좋다고 했던가. 최선의 결과를 위해 과도하게 숙고하는 것도, 생각해 볼 문제인 모양이다.\n#3;em;[속상함]\n#3;stiff"
1007002-42 = "3;미나;11;하지만, 선생님. 이 문제는 누구라고 해도 고민할 수밖에 없지 않았을까."
1007002-43 = "3;미나;13;자신만만하게, 사탕을 꼬나물고 권총을 든 채 문을 열어젖히며 들어오는 것과.\n#3;m4"
1007002-44 = "3;미나;08;누구에게도 들키지 않을 만큼 조용하게, 그러면서도 프로페셔널하게 잠입하며 들어오는 것. \n#3;m5\n#3;greeting"
1007002-45 = "3;미나;03;선생님이라면 이럴 때, 어떤 선택지를 골랐을까? 훗. 그걸 상상해 보는 것도 또 하나의 즐거움이겠군."
1007002-46 = "[s] \"……충분히 인상 깊었으니, 이제 그만 들어와……\""
1007002-47 = "3;미나;09;칭찬, 감사하지. 그러면 실례하겠어.\n#3;em;[음표]\n#3;greeting"

[translation]
1007002-1 = "First Impression"
1007002-2 = "Schale Executive Office"
1007002-3 = "She said she was on time on MomoTalk..."
1007002-7 = "But it was ten minutes past when I expected her, and she was nowhere to be seen."
1007002-8 = "[ns1] \"I'm starting to get worried...\"\n[ns2] \"Should I call her?\""
1007002-12 = "[ns] \"Hold on... Whose phone is that?\""
1007002-13 = "A ring tone started playing from just outside the office...!"
1007002-14 = "Ahhhh!"
1007002-20 = "Hearing a scream, I charged out into the hallway..."
1007002-25 = "[ns] \"Mina...?\""
1007002-26 = "Ah... I really messed up this time."
1007002-27 = "I can't believe I made such a rookie mistake. Sorry, Sensei."
1007002-28 = "Oh, and sorry for being so late, too."
1007002-29 = "[s3] \"That's fine, but...\"\n[s4] \"What were you doing out here in the hallway?\""
1007002-32 = "Heh... You sure you want me to answer that?"
1007002-33 = "It's simple, really. But it's also dead serious."
1007002-34 = "Maybe you already know this, Sensei, but...first impressions are important."
1007002-35 = "That first moment you meet someone is when you form most of your opinions of 'em. It shapes your whole relationship."
1007002-36 = "First impressions are like the very first domino block in a row. It sets off everything that comes after."
1007002-37 = "[s] \"(Sure, but being late isn't a great first impression, either...)\""
1007002-38 = "So I got to thinking how to make the coolest entrance possible..."
1007002-39 = "I've got to give you the right impression, after all..."
1007002-40 = "And I was thinking so hard I lost track of time, and here we are..."
1007002-41 = "Shoot. I was so obsessed with getting it perfect, I messed the whole thing up. I'll do better next time..."
1007002-42 = "But you've got to understand, Sensei. This could have happened to anyone."
1007002-43 = "I figured I'd walk right in like I owned the place, a lollipop hanging from my mouth..."
1007002-44 = "...or maybe I'd sneak in and appear from behind you like a phantom... "
1007002-45 = "Which would have impressed you more, Sensei? Come on, don't leave me hanging!"
1007002-46 = "[s] \"Your first impression was strong enough, thank you. Please, come in.\""
1007002-47 = "You're too kind. After you!"
1007002-56 = "[ns5] \"So, about today's duties...\"\n[ns6] \"How can I help you?\""
1007002-59 = "Not so hasty! First..."
1007002-60 = "We've got to figure out what we're going to call each other."
1007002-61 = "[s] \"Excuse me?\""
1007002-62 = "The titles two people use for each other is more important than you may realize."
1007002-63 = "They reveal how those two people view each other."
1007002-64 = "I'm sure most students are happy calling you 'Sensei'..."
1007002-65 = "But that's not enough for me."
1007002-66 = "Shouldn't our relationship be more special than the ones you have with just anyone?"
1007002-67 = "That's my thinking."
1007002-68 = "[s] \"I-Is that so?\""
1007002-69 = "It is."
1007002-70 = "I want something that doesn't feel too specific to Genryumon. Something that shows the bond we share..."
1007002-74 = "It's no simple matter."
1007002-75 = "But the harder the case, the more satisfaction when you crack it."
1007002-76 = "[s] \"(If I just sit here silently, this will pass...)\""
1007002-77 = "Commander?"
1007002-78 = "[s] \"We aren't in the military.\""
1007002-79 = "Then...chief?"
1007002-80 = "[s] \"And you're not a detective.\""
1007002-81 = "Master?"
1007002-82 = "[s] \"Overused.\""
1007002-83 = "Doctor?"
1007002-84 = "[s] \"Pretty sure I don't have a PhD...\"  "
1007002-85 = "...Comrade?"
1007002-88 = "[ns] \"Taken.\""
1007002-95 = "And so, Mina and I had a very deep (?) conversation."
1007002-96 = "Naturally, we didn't get to any actual business."
1007002-97 = "Not that the business was very important..."
1007002-99 = "I'm beat..."
1007002-100 = "[s] \"Me too...\""
1007002-101 = "After all of that, we come back to... 'Sensei.'"
1007002-102 = "You must be so disappointed. Sorry about that..."
1007002-103 = "[s] \"'Sensei' is fine. Really.\""
1007002-104 = "So you say... So you say..."
1007002-106 = "We decided to come back to Mina's business some other time."

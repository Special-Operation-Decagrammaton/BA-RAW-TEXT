[translation]
1007002-1 = "ความประทับใจแรก"
1007002-2 = "สำนักงานชาเล่ต์"
1007002-3 = "(ไหนตอนคุย MOMOTALK บอกว่าจะไม่มาสายไง...)"
1007002-7 = "(เกินมา 10 นาทีแล้วก็ยังไม่มีวี่แววผู้ใด...)"
1007002-8 = "[ns1] \"เริ่มเป็นห่วงแล้วสิ...\"\n[ns2] \"ต้องโทรตามมั้ยนะ...\""
1007002-12 = "[ns] \"หืม? เสียงโทรศัพท์ดังมาจากไหน...?\""
1007002-13 = "(มีเสียงโทรศัพท์ดังมาจากนอกประตูสำนักงาน!)"
1007002-14 = "ว้าย?!"
1007002-20 = "(หลังจากที่ได้ยินเสียงกรีดร้อง คุณครูก็รีบออกไปตรงทางเดิน...)"
1007002-25 = "[ns] \"มินะ...?\""
1007002-26 = "อ๊ะ... อันนี้ถือว่าพลาดแล้วสินะ"
1007002-27 = "ไม่คิดเลยว่าฉันจะทำพลาดกับเรื่องง่ายๆ แบบนี้ ขอโทษด้วยนะคุณครู"
1007002-28 = "แล้วก็ขอโทษที่ฉันมาสายด้วย"
1007002-29 = "[s3] \"ไม่หรอก เรื่องนั้นครูไม่เป็นไร...\"\n[s4] \"ทำอะไรอยู่นอกประตูเหรอ?\""
1007002-32 = "ฮึ เรื่องนั้นน่ะเหรอ"
1007002-33 = "ถ้าจะให้เล่าละก็ มันก็อาจจะเป็นทั้งเรื่องธรรมดา และก็เรื่องสำคัญมากในเวลาเดียวกัน"
1007002-34 = "คุณครูคงจะรู้อยู่แล้วสินะ แต่ว่า... ความประทับใจแรกเวลาพบกันเป็นเรื่องสำคัญมากเลยนะ"
1007002-35 = "ความประทับใจแรกจะเป็นตัวกำหนดความเห็นเกี่ยวกับคนนั้นๆ และความรู้สึึกนั้นก็จะเป็นตัวกำหนด#nความสัมพันธ์ที่จะดำเนินไปของเรา"
1007002-36 = "มันไม่ต่างอะไรกันกับโดมิโนตัวแรก... การพบกันครั้งแรกย่อมสร้างผลกระทบระยะยาวอย่างไม่มีสิ้นสุด"
1007002-37 = "[s] (พูดแบบนั้นทั้งๆ ที่ตัวเองมาสายเนี่ยนะ...)"
1007002-38 = "เพราะแบบนั้นฉันก็เลยหาวิธีปรากฏตัวออกมาแบบร้ายกาจและก็เท่กว่าเดิมยังไงล่ะ"
1007002-39 = "วิธีไหนจะเหมาะกับการพบกันครั้งแรกของเรา!"
1007002-40 = "ต้องบอกว่าฉันมาสายเพราะคิดหนักเรื่องนั้นแหละนะ..."
1007002-41 = "ให้มันได้อย่างนี้สิ ฉันมุ่งมั่นที่จะทำให้ทุกอย่างสมบูรณ์แบบเกินไป จนทำให้ทุกอย่างล้มไม่เป็นท่า#nคราวหน้าต้องทำให้ดีกว่านี้แล้ว..."
1007002-42 = "แต่ว่าคุณครูน่าจะเข้าใจนะ เรื่องแบบนี้ไม่ว่าใครก็คงคิดหนักกันทั้งนั้นแหละ"
1007002-43 = "ตอนที่เดินมาฉันก็เอาแต่คิดว่าจะเข้ามายังไงดี ระหว่างการผลักประตูเข้ามาด้วยความมั่นใจ#nมือถือปืนพก ปากคาบลูกอม..."
1007002-44 = "กับการแอบเข้ามาอย่างมืออาชีพ ย่องเงียบจนไม่มีใครจับได้ "
1007002-45 = "ถ้าเป็นคุณครู คุณครูจะเลือกแบบไหนกันล่ะ? ฮึ แค่คิดถึงเหตุการณ์พวกนั้นก็ชักสนุกขึ้นมาแล้วละ"
1007002-46 = "[s] \"เธอน่าประทับใจมากพอแล้วละ... เข้ามาเถอะ...\""
1007002-47 = "ขอบคุณที่ชมนะ ถ้างั้นก็ขอรบกวนด้วยนะ"
1007002-56 = "[ns5] \"เรื่องเข้าเวรของวันนี้น่ะ...\"\n[ns6] \"มินะมีอะไรที่อยากทำเป็นพิเศษมั้ย?\""
1007002-59 = "อืม... รอเดี๋ยวก่อนนะ"
1007002-60 = "ตอนนี้ฉันคิดหนักเรื่องคำเรียกที่พวกเราจะใช้กันอยู่น่ะ"
1007002-61 = "[s] \"คำเรียก...?\""
1007002-62 = "เราควรเรียกกันว่าอะไรดี จริงๆ แล้วเรื่องนี้มันสำคัญกว่าที่หลายคนคิดนะ"
1007002-63 = "มันเป็นตัวบ่งบอกว่าเราต่างมองกันและกันว่ายังไง"
1007002-64 = "ปกติแล้วหลายคนอาจจะเรียกคุณครูว่า 'คุณครู' หรือไม่ก็ 'ครู'..."
1007002-65 = "สำหรับฉัน แค่นั้นมันไม่พอหรอกนะ"
1007002-66 = "ความสัมพันธ์ระหว่างเราสองคนมันควรจะพิเศษกว่าความสัมพันธ์ของคนอื่นสิ"
1007002-67 = "นั่นแหละ สไตล์ของฉัน..."
1007002-68 = "[s] \"ยะ... อย่างนั้นเหรอ?\""
1007002-69 = "ใช่แล้ว อย่างนั้นแหละ"
1007002-70 = "คำเรียกที่สื่อถึงความแน่นแฟ้นระหว่างเรา โดยที่ไม่ซ้ำกับตำแหน่งในมังกรดำ..."
1007002-74 = "ตอบยากจัง เป็นปัญหาที่ตอบยากมาก"
1007002-75 = "แต่ยิ่งเป็นปัญหาที่ตอบยาก มันยิ่งคุ้มค่าแก่การหาคำตอบนะ"
1007002-76 = "[s] (ไม่รู้จะตอบอะไร อยู่นิ่งๆ ดีกว่า...)"
1007002-77 = "ผู้บังคับการ?"
1007002-78 = "[s] \"ชาเล่ต์ไม่ใช่กองกำลังทหารนะ!\""
1007002-79 = "งั้นก็... ผู้บัญชาการ?"
1007002-80 = "[s] \"เรียกแบบนั้นมันอันตรายนะ!\""
1007002-81 = "หัวหน้า?"
1007002-82 = "[s] \"ไม่ต่างกันเลย!\""
1007002-83 = "ด็อกเตอร์?"
1007002-84 = "[s] \"จำได้ว่าครูไม่เคยจบปริญญาเอกนะ...?\"  "
1007002-85 = "สหาย...?"
1007002-88 = "[ns] \"นั่นก็คำเรียกติดปากนักเรียนคนอื่น!\""
1007002-95 = "(จากนั้นคุณครูก็พูดคุย(?) เชิงลึกกับมินะเกี่ยวกับปัญหาเรื่องคำเรียกไปตลอดทั้งวัน)"
1007002-96 = "(แน่นอนว่าไม่ได้ทำงานใดๆ เลย)"
1007002-97 = "(แต่ก็ไม่ได้มีงานสำคัญอะไรตั้งแต่แรกอยู่แล้ว...)"
1007002-99 = "เหนื่อยจัง..."
1007002-100 = "[s] \"เหนื่อยจริง...\""
1007002-101 = "วกไปวนมาสุดท้ายก็เรียก 'คุณครู' เหมือนเดิม..."
1007002-102 = "คุณครูอาจจะไม่พอใจกับชื่อนั้นก็ได้ เดี๋ยวจะเสียดายเอานะ"
1007002-103 = "[s] \"เรียกว่า 'คุณครู' ก็พอใจแล้วละ...\""
1007002-104 = "งั้นเหรอ... อย่างนั้นเหรอ..."
1007002-106 = "(จากนั้นคุณครูก็จัดการงานที่เหลือกับมินะกันต่อ)"

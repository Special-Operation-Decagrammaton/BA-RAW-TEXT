[translation]
1300415-1 = "偷偷藏起來的筆記"
1300415-2 = "（某天，因為有事而去了一趟對策委員會）"
1300415-9 = "嚕嚕嚕～嚕嚕嚕～"
1300415-10 = "[ns]「嗨，野乃美？」"
1300415-15 = "老，老師！？"
1300415-16 = "你什麼時候來的！？"
1300415-17 = "剛，剛剛才來是嗎……我沒聽見開門的聲音。"
1300415-18 = "如果事先跟我說一下的話，我就能準備一些餅乾了……"
1300415-19 = "[s]「你那麼專心在做什麼呢？」"
1300415-23 = "啊，這……"
1300415-24 = "是，是祕密。"
1300415-25 = "[s1]「那就沒辦法了。」\n[s2]「我不會再問了。」"
1300415-30 = "嗯？就這樣放棄了嗎？"
1300415-31 = "其實也不是需要刻意隱瞞的祕密。"
1300415-32 = "嗯，就特別讓老師看吧。"
1300415-38 = "[ns]「這是……筆記本？」"
1300415-39 = "是，正確來說……是願望清單。"
1300415-40 = "我把想和對策委員會的大家一起做的事全都寫下來了。"
1300415-41 = "偶爾有機會獨處的時候，我就會拿出來整理。"
1300415-42 = "[s]「和大家分享不是更好嗎？」"
1300415-43 = "唔嗯，我想並不會。"
1300415-44 = "如果大家知道我在整理這種東西，應該會想要替我實現吧。"
1300415-45 = "大家已經為了償還債務而傷透腦筋了，我不能再造成大家的負擔。"
1300415-46 = "也就是說，還是由我自己偷偷做好，然後自然而然地達成……這樣才是最好的。"
1300415-47 = "雖然今天被老師發現了。"
1300415-48 = "[s]「這樣啊……我不該追問的，抱歉……」"
1300415-49 = "沒關係，我也明白總有一天會被發現的☆"
1300415-50 = "既然都被發現了，老師想看一下內容嗎？"
1300415-51 = "[s3]「我可以看嗎？」\n[s4]「讓我看沒關係嗎？」"
1300415-54 = "當然可以。其實內容本身也沒什麼特別的。"
1300415-55 = "嗯嗯，一起看吧。"
1300415-65 = "目前達成的部分都已經用紅筆標示了。"
1300415-66 = "一起去吃甜點、一起裝飾學校……#n有能輕鬆達成的，也有必須由大家齊心協力達成的。"
1300415-67 = "偶爾像這樣回顧，就會想起當時的情況，真讓人開心。"
1300415-71 = "啊，這個「體驗辣度5的披薩」也達成了。"
1300415-72 = "茜香醬吃到臉都脹紅了，真令人懷念☆"
1300415-74 = "然後這邊是還沒達成的目標。"
1300415-75 = "雖然很希望總有一天能把這些清單全都標上紅色……"
1300415-76 = "不過只要達成一項，就會想出兩個新的願望。"
1300415-77 = "所以別說是減少，清單上的願望數反而越來越多了。"
1300415-78 = "目前還沒達成的願望已經超過100個了呢……哈哈哈，真傷腦筋。"
1300415-79 = "[s]「這樣不是更好嗎？」"
1300415-83 = "[ns5]「這就代表可以累積更多的回憶。」\n[ns6]「這就代表有那麼多愉快的未來在等待著。」"
1300415-90 = "……有道理！"
1300415-91 = "雖然對策委員會一直都為了還債而四處奔波……"
1300415-92 = "也沒有人能阻止我們一起創造回憶對吧。"
1300415-93 = "嗯，在100%達成之前，我會更努力的！"
1300415-97 = "啊，既然都說到這裡了，老師要不要幫我達成下一個願望呢？"
1300415-98 = "[s]「沒問題，是什麼願望呢？」"
1300415-99 = "是跳傘！"
1300415-100 = "從4000m的高空自由落體……光是想像就覺得很刺激吧？"
1300415-104 = "[ns]「我的天！還，還是饒了我吧。」"
1300415-107 = "呵呵，我是開玩笑的☆"

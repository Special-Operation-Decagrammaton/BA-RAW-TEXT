[translation]
1300415-1 = "บันทึกที่แอบซ่อนไว้"
1300415-2 = "(คุณครูไปที่ห้องคณะกรรมการแผนงานเพราะมีธุระ)"
1300415-9 = "ฮึมฮึม~ ฮึม~"
1300415-10 = "[ns] \"สวัสดี โนโนมิ\""
1300415-15 = "คะ... คุณครู?!"
1300415-16 = "มาตั้งแต่เมื่อไรคะเนี่ย?!"
1300415-17 = "พะ... เพิ่งมาถึงเมื่อกี้เหรอคะ?... ฉันไม่เห็นได้ยินเสียงประตูเลย"
1300415-18 = "ถ้าบอกกันก่อน ฉันก็น่าจะเตรียมของว่างเอาไว้ให้แล้วค่ะ"
1300415-19 = "[s] \"ตั้งใจทำอะไรอยู่เหรอ?\""
1300415-23 = "อ่า... คือว่า..."
1300415-24 = "ปะ... เป็นความลับค่ะ"
1300415-25 = "[s1] \"ถ้างั้นก็ช่วยไม่ได้นะ\"\n[s2] \"ครูไม่เซ้าซี้ถามแล้วกัน\""
1300415-30 = "อะ... อ้าว? จะยอมแพ้แบบนี้เลยเหรอคะ?"
1300415-31 = "มันก็ไม่ใช่ความลับยิ่งใหญ่ที่ถึงกับต้องปกปิดหรอกค่ะ"
1300415-32 = "อืม งั้นฉันจะให้คุณครูดูเป็นกรณีพิเศษเลยค่ะ"
1300415-38 = "[ns] \"นี่คือ... บันทึกเหรอ?\""
1300415-39 = "ค่ะ แต่ถ้าจะให้ชัดเจน... ต้องบอกว่าเป็นรายการสิ่งที่อยากทำค่ะ"
1300415-40 = "ฉันเขียนรายการสิ่งที่อยากทำกับคณะกรรมการแผนงานทุกคนเอาไว้น่ะค่ะ"
1300415-41 = "พอฉันอยู่คนเดียว ฉันก็จะแอบเขียนเอาไว้บ้างค่ะ"
1300415-42 = "[s] \"บอกคนอื่นด้วยจะไม่ดีกว่าเหรอ?\""
1300415-43 = "อืม ไม่ดีกว่าค่ะ"
1300415-44 = "เพราะถ้าทุกคนรู้ว่าฉันอยากทำสิ่งที่เขียนไว้ ทุกคนก็จะช่วยทำให้สำเร็จกันแน่เลยน่ะค่ะ"
1300415-45 = "ตอนนี้แค่เรื่องใช้หนี้ของโรงเรียนก็ทำให้ทุกคนกังวลกันมากแล้ว ฉันไปเพิ่มภาระให้ทุกคนอีกไม่ได้#nหรอกค่ะ"
1300415-46 = "เพราะแบบนั้น... การแอบเขียนคนเดียวและปล่อยให้มันสำเร็จไปตามธรรมชาติน่าจะดีกว่าค่ะ"
1300415-47 = "ถึงวันนี้จะโดนคุณครูรู้ความลับแล้วก็เถอะค่ะ"
1300415-48 = "[s] \"แบบนี้นี่เอง ขอโทษที่ครูซักไซ้นะ\""
1300415-49 = "ไม่เป็นไรหรอกค่ะ ฉันคิดไว้แล้วละค่ะว่าสักวันต้องโดนจับได้☆"
1300415-50 = "ไหนๆ ก็โดนจับได้แล้ว จะลองอ่านดูไหมล่ะคะ?"
1300415-51 = "[s3] \"ให้ครูอ่านได้เหรอ?\"\n[s4] \"เอาให้ครูดูได้ด้วยเหรอ?\""
1300415-54 = "ได้สิคะ จริงๆ แล้วมันก็ไม่ค่อยมีอะไรมากหรอกค่ะ"
1300415-55 = "อื้อ มาดูด้วยกันสิคะ"
1300415-65 = "สิ่งที่ทำสำเร็จไปแล้ว ฉันทำเครื่องหมายด้วยดินสอสีแดงไว้ค่ะ"
1300415-66 = "ไปกินของหวานด้วยกัน... ตกแต่งโรงเรียนด้วยกัน... มีตั้งแต่เรื่องที่เกิดขึ้นได้ง่ายๆ ไปจนเรื่องที่ทุกคน#nต้องช่วยกันกว่าจะสำเร็จเลยละค่ะ"
1300415-67 = "บางครั้งแค่หยิบมาอ่านแล้วคิดถึงตอนนั้นก็สนุกแล้วค่ะ"
1300415-71 = "อ้อ ตรงนี้มี <กินพิซซ่าความเผ็ดระดับ 5> ที่ทำสำเร็จแล้วด้วยค่ะ"
1300415-72 = "ตอนนั้นเซริกะจังหน้าแดงเป็นมะเขือเทศเลย คิดถึงตอนนั้นจังเลยค่ะ☆"
1300415-74 = "ส่วนตรงนี้เป็นรายการสิ่งที่ยังทำไม่สำเร็จค่ะ"
1300415-75 = "ฉันหวังว่าสักวันหนึ่งจะได้ทำเครื่องหมายสีแดงให้ครบทุกข้อ..."
1300415-76 = "แต่พอสำเร็จไปอย่างหนึ่ง ก็จะมีอีก 2-3 อย่างที่อยากทำเพิ่มขึ้นมาค่ะ"
1300415-77 = "ตอนนี้รายการก็เลยไม่ลดลง แต่กลับเพิ่มขึ้นเรื่อยๆ เลยค่ะ"
1300415-78 = "ตอนนี้รายการสิ่งที่ยังทำไม่สำเร็จน่าจะเกิน 100 ข้อแล้วค่ะ... แหะๆๆ ชักจะลำบากใจแล้วสิคะ"
1300415-79 = "[s] \"แบบนี้ยิ่งดีไม่ใช่เหรอ?\""
1300415-83 = "[ns5] \"เพราะแปลว่ามีความทรงจำที่อยากมีร่วมกันเยอะไง\"\n[ns6] \"เท่ากับว่าอนาคตสนุกๆ กำลังรออยู่นะ\""
1300415-90 = "นั่นสินะคะ!"
1300415-91 = "ถึงเราจะเป็นคณะกรรมการแผนงานที่ดิ้นรนหาเงินมาใช้หนี้..."
1300415-92 = "แต่ก็ไม่ได้แปลว่าเราจะมีความทรงจำดีๆ ร่วมกันไม่ได้นี่คะ"
1300415-93 = "อื้ม! ฉันจะพยายามให้มากขึ้น ให้สำเร็จ 100% เลยค่ะ!"
1300415-97 = "จริงด้วยค่ะ ไหนๆ ก็พูดถึงแล้ว คุณครูช่วยทำข้อต่อไปให้สำเร็จหน่อยได้ไหมคะ?"
1300415-98 = "[s] \"ได้สิ มันคืออะไรเหรอ?\""
1300415-99 = "กระโดดร่มค่ะ!"
1300415-100 = "สัมผัสอิสระจากความสูง 4,000 เมตร... แค่คิดก็ตื่นเต้นแล้วว่ามั้ยคะ?"
1300415-104 = "[ns] \"เฮือก! ถะ... ถ้าเป็นข้อนี้ครูขอผ่าน!\""
1300415-107 = "ฮุฮุ ล้อเล่นค่ะ☆"

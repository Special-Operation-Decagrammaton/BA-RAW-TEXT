[translation]
1300415-1 = "A Secret Note"
1300415-2 = "One day, I paid a little business visit to the Foreclosure Task Force."
1300415-9 = "La dee da dee da!"
1300415-10 = "[ns] \"Hey, Nonomi!\""
1300415-15 = "S-Sensei?!"
1300415-16 = "When did you get here?!"
1300415-17 = "I didn't even hear the door open!"
1300415-18 = "I wish I'd known. I could have gotten us some snacks."
1300415-19 = "[s] \"What was it you were so focused on?\""
1300415-23 = "Ah, well..."
1300415-24 = "I-It's a secret."
1300415-25 = "[s1] \"None of my business then.\"\n[s2] \"I won't pry.\""
1300415-30 = "Aww... You're giving up just like that?"
1300415-31 = "It's not like it's a deep dark secret or anything."
1300415-32 = "Here, I'll show you. But for your eyes only!"
1300415-38 = "[ns] \"...It's just a note?\""
1300415-39 = "Kinda. It's my bucket list, to be exact."
1300415-40 = "I've written down everything I want to do with the Foreclosure Task Force one day."
1300415-41 = "Sometimes when I'm alone and no one's looking, I work on it!"
1300415-42 = "[s] \"Shouldn't you share it so you can knock out the list?\""
1300415-43 = "Mmm, no."
1300415-44 = "If the others found out I had this, they'd drop everything and make me complete all of it."
1300415-45 = "We all have a lot of work to do managing the debt situation. I couldn't put even more pressure on them."
1300415-46 = "So, it's better that I work on it quietly, and complete it at my own pace."
1300415-47 = "Or at least I was working on it until you caught me, Sensei."
1300415-48 = "[s] \"I see... Sorry for that...\""
1300415-49 = "It's all right. I knew my secret would be exposed one day. ☆"
1300415-50 = "Well, since we're talking about it... Do you want to give it a read?"
1300415-51 = "[s3] \"If you're sure...\"\n[s4] \"You really don't mind?\""
1300415-54 = "Of course. I told you, it's not a deep dark secret!"
1300415-55 = "Here, we can read it together."
1300415-65 = "I've marked the things we've already done in red."
1300415-66 = "Eat dessert together, decorate the academy together... Some items were easy to knock out, while for others, everyone had to really give it their all."
1300415-67 = "I feel happy even just remembering some of these."
1300415-71 = "Oh remember this one? Try the level 5 spicy pizza."
1300415-72 = "Serika's whole face turned beet red. I wish I could see it again! ☆"
1300415-74 = "Oh, over here are the things we haven't done yet."
1300415-75 = "...It'd be nice if we could cross out everything one day."
1300415-76 = "But as soon as we finish one item, I think of two more things."
1300415-77 = "Instead of shrinking, the list keeps growing even bigger than before."
1300415-78 = "At this point, there are over 100 things we haven't done yet... Ahaha, what a nightmare!"
1300415-79 = "[s] \"Is that really a bad thing?\""
1300415-83 = "[ns5] \"I think it means you still have more happy memories to make.\"\n[ns6] \"It could be that an even brighter future awaits you.\""
1300415-90 = " ...That's right!"
1300415-91 = "We may still be struggling to pay off our debts, but..."
1300415-92 = "There's no reason we can't make some more happy memories!"
1300415-93 = "So I'll work even harder to work through our bucket list. Yup yup!"
1300415-97 = "Speaking of which, would you like to help me cross off another item?"
1300415-98 = "[s] \"Sure, what is it?\""
1300415-99 = "Skydiving!"
1300415-100 = "Imagine the freedom of leaping out of a plane at 4,000 meters! Aren't you thrilled just thinking about it?"
1300415-104 = "[ns] \"Aaaahh— I think I'm good!\""
1300415-107 = "Heehee. Just teasing. ☆"

10000025-53 = "3;피나;08;음~ 피나도 이해가 안 됩니다. 왜 축제를 방해하려는 걸까요?\n#3;em;…"
10000025-54 = "1;냥텐마루;01;녀석들은 이번 축제가 마음에 안 드는 게지.\n#1;a\n#1;em;[반응]\n#3;m5"

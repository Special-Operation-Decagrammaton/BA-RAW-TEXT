10000025-69 = "3;피나;03;피나가 듣기로는 홀로그램으로 불꽃놀이를 구현하는 special하고 nice한 기계라고 들었습니다!\n#3;em;[반짝]\n#3;greeting"
10000025-70 = "1;냥텐마루;01;갑자기 준비한 물건이다 보니 돈도 제법 깨졌을 테지? ……뭐 어쨌든, 뭔가가 바뀌는 것을 싫어하는 녀석은 어디에나 있다는 게지.\n#1;a\n#3;m5"
10000025-71 = "#3;hide\n5;시즈코;02;그렇긴 하지만……. 정말 이런 거 때문에 축제를 방해한다고요?\n#5;em;[?]"
10000025-72 = "5;시즈코;06;저는 그냥……. 이번 축제가 좀 더 즐거워졌으면 하는 바람에 준비했을 뿐인데……."
10000025-73 = "1;냥텐마루;01;어디까지나 추측이다. 게다가 나도 이제 와서 이 일을 다시 들춰내고 싶지도 않아. 그냥. 마음에 들지 않는 녀석들도 있겠다. 하는 정도지."

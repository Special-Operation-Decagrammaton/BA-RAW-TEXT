[translation]
10000025-1 = "ตอนที่ 2;ตัวปัญหาของเฮียกคิยาโค"
10000025-3 = "อ๊ะ~!?"
10000025-4 = "[s] \"เดี๋ยวนะ ทำไมอิซุนะถึงมาอยู่ที่นี่...\""
10000025-5 = "อ๊ะ?!! คุณครู?!"
10000025-6 = "นั่นคือสิ่งที่อิซุนะจะถามต่างหาก! ทำไมคุณครูถึงอยู่กับพวกที่มาก่อกวนล่ะ?!"
10000025-7 = "เอ๋?! อย่าบอกนะว่าคุณครูมาเพื่อจะหลอกล่ออิซุนะตั้งแต่แรก?!"
10000025-8 = "คุณครูเข้าหาอิซุนะเพราะมีเจตนาไม่ดีแบบนั้นเหรอคะ?!"
10000025-9 = "ไหนบอกว่าจะสนับสนุนความฝันไงล่ะ! ผู้ใหญ่นิสัยไม่ดี!"
10000025-10 = "[s1] \"เดี๋ยวก่อน พูดอะไรของเธอ....\"\n[s2] \"ความฝันของอิซุนะคือการได้ทำแบบนี้เหรอ?\""
10000025-11 = "อิ.. อิซุนะก็แค่มาทำภารกิจ ในฐานะของนินจาเท่านั้น! นินนิน!"
10000025-12 = "อิ.. อิซุนะก็แค่มาทำภารกิจ ในฐานะของนินจาเท่านั้น! นินนิน!"
10000025-14 = "[s] \"ภารกิจเหรอ...?\""
10000025-18 = "หึ! เห็นหรือยังล่ะ? บอกแล้วว่าชมรมเทศกาลของเราไม่ใช่เล่นๆ"
10000025-19 = "กวาดทีเดียวเกลี้ยงเลยล่ะค่ะ!"
10000025-20 = "อึ้กก! ไม่ใช่เล่นๆ เลย! เด็กพวกนี้ทำไมถึงแข็งแกร่งขึ้นกว่าเมื่อก่อนนะ?!"
10000025-21 = "เพราะมีผู้ใหญ่คอยสั่งการ ชมรมเทศกาลก็เลยเปลี่ยนจากหน้ามือเป็นหลังมือเลยลูกพี่!"
10000025-22 = "ไม่ได้การแล้ว! อิซุนะ! ตอนนี้เราต้องถอนกำลังเชิงกลยุทธ์แล้วล่ะ!"
10000025-23 = "หืม? ถะ... ถอนกำลัง... เชิงกลยุทธ์?"
10000025-24 = "นอกจากจะจู่โจมแล้ว นินจาที่ดีต้องรู้จักการล่าถอยด้วย! ฉันอ่านประโยคนี้เจอมาจากที่ไหนสักที่!"
10000025-25 = "หา?! ถะ... ถ้างั้นก็ช่วยไม่ได้! นินนิน!"
10000025-26 = "คุณครู... ไม่อยากเชื่อเลยว่าคุณครูที่บอกว่าจะสนับสนุนฉันจะมาขวางทางกันแบบนี้"
10000025-27 = "นี่คือการล้อเล่นของโชคชะตาใช่ไหม!"
10000025-28 = "แต่มีอย่างหนึ่งที่อิซุนะรู้ดีค่ะ! เรื่องแบบนี้เกิดขึ้นได้กับนินจาเสมอ!"
10000025-29 = "ฉันเจอมาจากในซีรีส์น่ะค่ะ!"
10000025-30 = "[s] \"...ซีรีส์เหรอ?\""
10000025-31 = "การเข้าไปพัวพันในการต่อสู้ที่ไม่ต้องการก็เป็นโชคชะตาที่นินจาเลี่ยงไม่ได้!"
10000025-32 = "รอดูได้เลยค่ะคุณครู! เพราะอิซุนะคนนี้ไม่ยอมแพ้แน่!"
10000025-33 = "เจอกันคราวหน้า คุณครูจะได้เห็นอิซุนะที่เก่งกว่านี้ 3 เท่าเลยค่ะ! นินนิน!"
10000025-35 = "(อิซุนะหายตัวไปอย่างรวดเร็วเหมือนเคย)"
10000025-37 = "เห็นกับตาแล้วใช่ไหมคะ?! วุ่ยวายอีกจนได้!"
10000025-38 = "พอเทศกาลเริ่มขึ้น พวกปีศาจก็มาก่อเรื่องไปทั่วเลย!"
10000025-39 = "[s] \"ปีศาจพวกนั้นคืออะไรเหรอ?\""
10000025-40 = "ปีศาจบนท้องถนน"
10000025-41 = "พวกเด็กมีปัญหาที่ชอบก่อปัญหาบนท้องถนนของเฮียกคิยาโคยังไงล่ะคะ!"
10000025-42 = "เจ้าพวกนี้ก่อเรื่องมาตั้งนานแล้ว แต่นี่เป็นครั้งแรกที่พวกมันเคลื่อนไหวเป็นกลุ่มแบบนี้"
10000025-43 = "เหมือนกับว่าต้องการทำให้เทศกาลแห่งค่ำคืนสีขาวพังไม่เป็นท่าอย่างนั้นแหละ"
10000025-44 = "อัศวินอย่างฉันไม่ยอมให้ตัวปัญหาพวกนี้รอดไปได้หรอกค่ะ!"
10000025-45 = "อ๊ากก! อะไรกันน่ะ!"
10000025-46 = "แม้ชมรมเทศกาลจะขวางพวกมันไว้ได้จนถึงตอนนี้ก็เถอะ!"
10000025-47 = "แต่หากปล่อยไปอีก เทศกาลอาจจะพังไม่เป็นท่าแน่ๆ"
10000025-48 = "ถ้าเทศกาลพังล่ะก็ พวกเราจะงานเข้าเอานะ! ชมรมเราอาจจะพังไปด้วยก็ได้ ไม่นะ!"
10000025-49 = "เฮ้อ..."
10000025-50 = "...... (เหลือบมอง)"
10000025-51 = "น่ากลัวกว่าที่คิดนะ☆"
10000025-52 = "[s] \"อืม…\""
10000025-53 = "อืม~ พีน่าก็ไม่เข้าใจเหมือนกัน ทำไมพวกนั้นถึงมาขัดขวางงานเทศกาลของเราล่ะคะ?"
10000025-54 = "ก็พวกนั้นไม่ถูกใจงานเทศกาลในครั้งนี้น่ะสิ"
10000025-55 = "อ๊ะ ประธานกลุ่มการค้า!"
10000025-56 = "[s] มองไปที่คนที่เพิ่งปรากฏตัว"
10000025-57 = "ฮึ่ม.. ไม่ต้องจ้องกันขนาดนั้นก็ได้ ฉันคือประธานกลุ่มการค้าของย่านการค้าเฮียกคิยาโค"
10000025-58 = "อืม...... ส่วนไหนของเทศกาลที่พวกนั้นไม่ถูกใจงั้นเหรอคะ?"
10000025-59 = "ในช่วงท้ายของเทศกาลแห่งค่ำคืนสีขาวจะมีการจุดดอกไม้ไฟประเพณีมารุ่นแล้วรุ่นเล่า"
10000025-60 = "แต่ในครั้งนี้มันต่างออกใช่ไหมล่ะ? ไม่ว่าจะเป็นความพยายามใหม่หรืออะไรก็ตาม"
10000025-61 = "ฉันรู้ดีว่าพวกเธอเตรียมบางอย่างมาเป็นพิเศษเพื่อเทศกาลครั้งนี้โดยเฉพาะ"
10000025-65 = "(มีอุปกรณ์บางอย่างที่เหมือนกล่องเหล็กวางอยู่บนโต๊ะ)"
10000025-68 = "นี่คืออุปกรณ์สำหรับไคลแม็กซ์ของเทศกาลที่เรายืมมาจากมิลเลเนียมค่ะ"
10000025-69 = "พีน่าได้ยินมาว่าอุปกรณ์นี้สเปเชี่ยลมากเพราะฉายโฮโลแกรมของดอกไม้ไฟออกมาได้ด้วย! ไนซ์!"
10000025-70 = "อยู่ๆ ก็ต้องเตรียมอุปกรณ์แบบนี้ ต้องใช้เงินเยอะเลยล่ะสิ? แต่ก็เอาเถอะ...#nเป็นธรรมดาที่ต้องมีคนไม่ถูกใจเวลาเราจะเปลี่ยนแปลงอะไร"
10000025-71 = "มันก็จริง... แต่พวกนั้นมาขัดขวางเทศกาลก็เพราะสาเหตุนี้จริงๆ เหรอคะ?"
10000025-72 = "ฉันก็แค่... เตรียมอุปกรณ์นี้มาเพื่ออยากให้งานเทศกาลในครั้งนี้ดูน่าตื่นตาตื่นใจขึ้นเท่านั้นเอง..."
10000025-73 = "นี่เป็นแค่การคาดเดาน่ะ อีกอย่าง ฉันก็ไม่อยากจะมาตีแผ่อะไรแบบนี้อีกแล้ว#nเพราะยังไงก็ต้องมีคนที่ไม่ถูกใจอยู่ดี"
10000025-74 = "แต่หากไม่มีการเปลี่ยนแปลงอะไร เราก็ทำให้งานเทศกาลสนุกไปกว่าเดิมไม่ได้นี่คะ!"
10000025-75 = "ในฐานะหัวหน้าชมรมจัดเทศกาล ฉันมั่นใจข้อนี้ดีค่ะ!"
10000025-76 = "ใช่ค่ะ! เทศกาลจะต้องสนุกมากกว่าเมื่อก่อนสิคะ!"
10000025-77 = "พวกเธอคิดอย่างนั้นเหรอ? งั้นก็พยายามเข้าแล้วกันนะ"
10000025-78 = "ถึงจะพูดแบบนี้ แต่ประธานกลุ่มการค้าก็ยังจะสนับสนุนเราเหมือนเดิมใช่ไหมคะ?#nไม่งั้นคงไม่มาเตือนพวกเราแบบนี้..."
10000025-79 = "พีน่าดูออกนะคะ! นี่ล่ะนะที่เรียกว่าซึนเดเระ!"
10000025-80 = "อย่าพูดอะไรเพ้อเจ้อน่า! แล้วพวกเธอจะจัดการยังไง?"
10000025-81 = "หากไม่ขัดขวางพวกนั้นไว้ งานเทศกาลมีหวังได้พังหมดแน่"
10000025-82 = "[s] \"เราไปขอความช่วยเหลือจากใครไม่ได้เหรอ?\""
10000025-83 = "ก็ไม่ใช่ว่าจะไม่มีชมรมให้ขอความช่วยเหลือเวลาเกิดเรื่องแบบนี้หรอกนะ..."
10000025-84 = "...แต่ชมรมอื่นจะมาช่วยเราได้ไหมนะ?"
10000025-85 = "[s] \"ไม่ลองแล้วจะรู้ได้ยังไงล่ะ?\""
10000025-86 = "อืม... ถ้าคุณครูว่าอย่างนี้ล่ะก็..."
10000025-87 = "ได้ค่ะ มีที่ที่เราไปขอความช่วยเหลือได้อยู่... แต่ว่า"
10000025-88 = "ถ้าจะทำแบบนั้น ฉันก็ต้องขอความช่วยเหลือจากคุณครูค่ะ!"
10000025-90 = "ในพื้นที่รกร้าง"
10000025-92 = "เจ้าปีศาจ ทำไมถึงไปขัดขวางงานเทศกาลไม่สำเร็จล่ะ?"
10000025-93 = "ถ้าตามสัญญาว่าจ้าง พวกนายต้องขัดขวางการจัดเทศกาลแล้วปิดงานให้ได้ภายในวันนี้ไม่ใช่เหรอ?"
10000025-94 = "ถ้าผลงานออกมาเป็นแบบนี้ ก็คงไม่มีประโยชน์ที่จะต้องจ่ายเงินจำนวนมากเพื่อจ้างต่อแล้ว"
10000025-95 = "เอ่อ... คือว่า... จู่ๆ ก็เจอศัตรูที่เหนือความคาดหมายน่ะ"
10000025-96 = "คุณครูจากชาเล่ต์โผล่มาขัดขวางพวกเรา! แล้วเขาก็เก่งมากเลยด้วย!"
10000025-97 = "คุณครูจากชาเล่ต์เหรอ?"
10000025-98 = "ใช่ค่ะ! เขาเป็นคุณครู!"
10000025-99 = "อืม.. เธอหมายความว่ายังไงกันแน่ อิซุนะ?"
10000025-100 = "ผู้ว่าจ้างเคยบอกไว้ไม่ใช่เหรอคะ?"
10000025-101 = "บอกไว้ว่าหากอิซุนะตั้งใจทำภารกิจ ก็จะเป็นนินจาสุดเท่ได้!"
10000025-102 = "แล้วก็บอกว่าอิซุนะจะได้เจอกับนายท่านที่จะต้องรับใช้ไปชั่วชีวิตยังไงล่ะคะ!"
10000025-103 = "จำได้ลางๆ ว่าพูดแบบนั้นไปนะ..."
10000025-104 = "อิซุนะอาจจะได้พบนายท่านคนนั้นแล้วก็ได้ค่ะ! เพราะคุณครูคนนั้นสนับสนุนความฝันของอิซุนะ"
10000025-105 = "นี่มันช่าง... อืม... บังเอิญดีจัง... แล้ว... มันเป็นยังไงต่อล่ะ?"
10000025-106 = "คุณครูคนนั้นดันไปอยู่กับพวกที่มาขัดขวางเราค่ะ ทำไมถึงไปอยู่ตรงนั้นได้นะ...?!"
10000025-107 = "อย่าบอกนะว่า...!"
10000025-108 = "อิซุนะ... รู้แล้วค่ะ!"
10000025-109 = "ที่แท้แล้ว... คุณครูกำลังถูกหลอกอยู่นี่เอง!"
10000025-110 = "ฉันไม่รู้รายละเอียดมาก แต่ถ้านินจาที่เก่งกาจอย่างอิซุนะพูดแบบนี้ ฉันก็คงมองข้ามคุณครูที่ว่านี้ไม่ได้"
10000025-111 = "ครั้งนี้ฉันจะยอมปล่อยให้ แต่ต่อไปต้องทำงานให้ดีเท่ากับที่ได้เงินค่าจ้างไปล่ะ"
10000025-112 = "ต่อไปเราจะยุติงานเทศกาลให้ได้เลย! ไม่ต้องห่วงนะหัวหน้า!"
10000025-113 = "ไม่ต้องห่วงนะคะ ฉันจะไปโค่นคุณครูที่ถูกหลอก แล้วบอกความจริงกับเขาเองค่ะ!"
10000025-114 = "ไป.. โค่น... อย่างนั้นเหรอ?"
10000025-115 = "ถ้าอิซุนะต่อสู้จนชนะ คุณครูก็จะได้รู้ความจริงยังไงล่ะคะ!"
10000025-116 = "อืม.. งั้นฉันจะลองเชื่อใจอิซุนะดูแล้วกัน"
10000025-118 = "ค่ะ! วางใจฉันได้เลย! นินนิน!"
10000025-121 = "เธอไม่ได้เป็นอะไรจริงๆ ใช่ไหม...?"

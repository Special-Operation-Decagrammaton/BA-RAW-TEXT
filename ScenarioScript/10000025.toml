10000025-20 = "5;망량즈 B;06\n1;망량즈 A;04;크윽! 가, 강해! 녀석들, 비리비리한 주제에 왜 전보다 더 강해진 거 같지?!\n#1;stiff\n#1;a\n#5;a\n#1;em;[땀]"

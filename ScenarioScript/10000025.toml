10000025-6 = "3;이즈나 무소속;04;그, 그건 이즈나가 할 말이에요! 선생님이 왜 방해꾼들하고?!"
10000025-7 = "3;이즈나 무소속;05;핫?! 선생님, 설마, 처음부터 이즈나를 꾀어낼 생각으로 접근을?! \n#3;stiff"
10000025-8 = "3;이즈나 무소속;05;그, 그런 무서운 속셈을 가지고 이즈나에게 접근한 거였군요?!\n#3;jump\n#3;em;[!]"
10000025-9 = "3;이즈나 무소속;05;이즈나의 꿈을 응원해준다고 했으면서! 이 나쁜 어른!\n#3;hophop\n#3;em;[빠직]"
10000025-10 = "[s1] \"아니, 도통 무슨 소리인지…….\"\n[s2] \"그보다 이즈나의 꿈이라는 게, 이런 거였어?\""
10000025-11 = "3;이즈나 무소속;07;이, 이즈나는 닌자로서! 의뢰를 수행하고 있을 뿐인걸요! 닌닌!\n#3;hophop\n#3;em;[음표]"

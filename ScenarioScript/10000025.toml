[translation]
10000025-1 = "第2話;百鬼夜行的問題兒童們"
10000025-3 = "呀啊！？"
10000025-4 = "[s]「等等，為什麼伊樹菜會在這裡……！？」"
10000025-5 = "咦，老師！？"
10000025-6 = "那，那是伊樹菜的台詞！為什麼老師要妨礙伊樹菜呢！？"
10000025-7 = "哈啊！難道老師從一開始就是為了引出伊樹菜才接近伊樹菜的嗎！？"
10000025-8 = "莫非這全都是計策……！？"
10000025-9 = "老師明明說過會支持伊樹菜的夢想！你其實是個邪惡的大人嗎！？"
10000025-10 = "[s1]「這到底是怎麼回事……比起這個，伊樹菜為什麼會……？」\n[s2]「為什麼會和妖怪劇團在一起……？伊樹菜的夢想不是要……」"
10000025-11 = "伊，伊樹菜只是以一名忍者的身分服從命令而已！"
10000025-12 = "伊，伊樹菜只是以一名忍者的身分服從命令而已！"
10000025-14 = "[s]「命令……？」"
10000025-18 = "怎麼樣！可別小看節慶營運管理部啊！"
10000025-19 = "一網打盡，的說！"
10000025-20 = "唔，好強！那些傢伙好像變得比之前更強了……！？"
10000025-21 = "是因為那個大人的指揮，節慶營運管理部的行動突然改變了！"
10000025-22 = "唔，伊樹菜閣下！暫時先採取戰略性撤退吧！"
10000025-23 = "戰，戰略性撤退……？#n但是伊樹菜……"
10000025-24 = "優秀的忍者要適時撤退！我好像在哪本書裡讀過！"
10000025-25 = "原來如此！既然是這樣的話……！"
10000025-26 = "老師……沒想到居然會被聲援伊樹菜夢想的老師給妨礙……"
10000025-27 = "命運的捉弄是多麼的殘酷啊……！"
10000025-28 = "但是伊樹菜知道！既然走上忍者之路，這種事情也是在所難免的！"
10000025-29 = "因為在電視劇裡看過！"
10000025-30 = "[s]「……電視劇？」"
10000025-31 = "被捲入不期望的戰鬥亦是忍者的宿命！"
10000025-32 = "老師，伊樹菜是不會放棄的！"
10000025-33 = "下次見面時，伊樹菜會變得比現在強上三倍！那麼再會，忍忍！"
10000025-35 = "（於是伊樹菜瞬間消失了）"
10000025-37 = "真是的！[ruby=  ・     ・     ・     ・     ・     ・  ]到底要來幾次[/ruby]！ "
10000025-38 = "自從櫻花祭開始後，妖怪劇團的那些傢伙就一直這樣到處作亂！"
10000025-39 = "[s]「妖怪劇團……是誰？」"
10000025-40 = "妖怪劇團．街頭流派。"
10000025-41 = "是從以前就在百鬼夜行一直惹事的傢伙！"
10000025-42 = "雖然從以前開始就是問題兒童，變得這麼有組織性似乎是最近才開始的……"
10000025-43 = "簡直就像是建立了組織，試圖毀掉「百夜之春櫻花祭」一樣……"
10000025-44 = "無論如何，身為立志成為任俠之人無法坐視不管！"
10000025-45 = "真受不了！到底是怎樣啊！ "
10000025-46 = "目前為止雖然設法只靠我們撐了過來……"
10000025-47 = "但總覺得頻率越來越高了，再這樣下去的話……！"
10000025-48 = "要是櫻花祭真的搞砸了，可是會受到來自四面八方的責備的！#n我們承擔不起啊！"
10000025-49 = "……"
10000025-50 = "……那個。"
10000025-51 = "開玩笑的～靜子好害怕～☆"
10000025-52 = "[s]「我該做什麼反應才好……」"
10000025-53 = "菲娜也不明白。為什麼要妨礙櫻花祭呢？"
10000025-54 = "這就不得而知了，也許是有所不滿吧。"
10000025-55 = "啊，會長！"
10000025-56 = "[s] 看向靜子看著的方向"
10000025-57 = "幸會，我是百鬼夜行商店街的會長。"
10000025-58 = "他們究竟對這次櫻花祭的什麼地方不滿意呢……？"
10000025-59 = "這個嘛……硬要說的話，就是這次有個巨大的改變吧。#n歷年來的「百夜之春櫻花祭」一向會以發射傳統煙火來收尾。"
10000025-60 = "不過這次有所不同對吧？要做些新的嘗試之類的。"
10000025-61 = "是的……是為了這次的櫻花祭特別準備的。"
10000025-65 = "（桌上放著某個裝置）"
10000025-68 = "這是為了這次慶典的結尾而委託千年製作的的特殊裝置。"
10000025-69 = "聽說是可以用全像投影來重現煙火，special又nice的機器！"
10000025-70 = "看起來像是個很花錢的機器呢……#n不過無論如何，不是所有人都能輕易接受事物有所改變的。"
10000025-71 = "是這麼說沒錯……但竟然因為這種理由而妨礙櫻花祭……"
10000025-72 = "我只是想讓「百夜之春櫻花祭」變得比以前更好而已……"
10000025-73 = "這不過只是推測罷了。事到如今我也不想再舊事重提。#n只是想告訴你，或許會有無法接受的人存在而已。#n像是學生竟然花了這麼多錢……之類的。"
10000025-74 = "是……但我們也不只是抱持著興趣和玩樂的心情做事！"
10000025-75 = "身為節慶營運管理部的部長，#n我可以很有自信的說，這一切都是為了讓櫻花祭變得更加美好！"
10000025-76 = "是！慶典就是要每年越來越歡樂才對！"
10000025-77 = "哼，是嗎。那就努力去達成吧。"
10000025-78 = "雖然嘴巴上這麼說，不過會長總是會幫助我們。#n就連這次的櫻花祭也很替我們著想呢。"
10000025-79 = "菲娜知道！這就叫「傲嬌」對吧！"
10000025-80 = "才不是！#n……所以呢，你打算怎麼做？ "
10000025-81 = "差不多也該阻止那些傢伙了，否則再這樣下去，櫻花祭會變得一團亂。"
10000025-82 = "[s] 「向其他人請求協助怎麼樣？」"
10000025-83 = "唔嗯……雖然能求助的社團或委員會也不是沒有……"
10000025-84 = "不過他們真的能幫得上忙嗎……"
10000025-85 = "[s]「咦咦……？」"
10000025-86 = "唔嗯，不過現在也不是在意這些的時候了……"
10000025-87 = "我有頭緒了，去試試看吧。#n但是……"
10000025-88 = "必須要借用老師的力量，你會幫我們的對吧？"
10000025-90 = "某處的廢墟"
10000025-92 = "讓我聽聽你們失敗的理由吧，妖怪劇團。"
10000025-93 = "不是說好要在今天讓慶典中斷的嗎……？"
10000025-94 = "我不惜花大錢雇用你們，可不是為了聽見「做不到」這種答案啊。"
10000025-95 = "那，那是因為……該說是出現了意料之外的伏兵嗎。"
10000025-96 = "我們被夏萊的老師妨礙了！都是那個人的錯！"
10000025-97 = "……夏萊的，老師？"
10000025-98 = "沒錯，是老師！"
10000025-99 = "……連伊樹菜閣下也……在說什麼呢？"
10000025-100 = "您之前有說過吧。"
10000025-101 = "只要伊樹菜努力執行命令，總有一天能成為帥氣的忍者！"
10000025-102 = "還能見到伊樹菜應該終身侍奉的、命中注定的主公！"
10000025-103 = "好像是有說過那種話……"
10000025-104 = "也許伊樹菜遇到了那樣的主公也說不定！#n老師又強又溫柔，更重要的是他願意支持伊樹菜的夢想！"
10000025-105 = "哦……所以呢？"
10000025-106 = "那樣的老師卻不知為何跟那幫礙事者在一起！這到底是為什麼呢……？"
10000025-107 = "……啊，該不會……！"
10000025-108 = "伊樹菜明白了！"
10000025-109 = "老師他……是不是被騙了呢！"
10000025-110 = "是不是都無所謂……不過既然伊樹菜閣下都這麼說了，#n看來那個老師確實是個不容小覷的對手吧。"
10000025-111 = "這次就不多追究了，但是希望你能收多少錢做多少事。"
10000025-112 = "下次一定會讓這場慶典中斷的！"
10000025-113 = "請別擔心。伊樹菜也會擊敗受騙的老師，並告訴老師真相的！"
10000025-114 = "這，這樣啊……"
10000025-115 = "只要伊樹菜在戰鬥中獲勝，老師一定也會醒悟的才對！"
10000025-116 = "是嗎……好吧。#n那我相信你，伊樹菜閣下。"
10000025-118 = "是，請包在伊樹菜身上！忍忍！"
10000025-121 = "……那傢伙真的沒問題嗎？"

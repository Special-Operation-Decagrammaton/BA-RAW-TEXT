10000025-24 = "1;망량즈 A;00;훌륭한 닌자라 함은, 치고 물러날 때를 아는 법! 이라고 어디선가 읽은 기억이 나!\n#1;ar\n#3;m5"
10000025-25 = "3;이즈나 무소속;00;핫?! 그, 그럼 어쩔 수 없네요! 닌닌!\n#3;em;[?!]\n#3;shake"

[translation]
10032055-7 = "……先停下來。"
10032055-9 = "既然暫時確保了安全，我們先調查周遭吧。"
10032055-10 = "但是現在的行動速度過於緩慢……這樣下去很快就會被追上的。"
10032055-11 = "……過於緩慢？你現在是在怪我嗎？"
10032055-12 = "開什麼玩笑！#n我不就是為了這個才會雇用你的嗎！"
10032055-13 = "……唔嗯。"
10032055-14 = "你說的沒錯。#n你之所以雇用我，是因為相信我是這方面的專家。"
10032055-15 = "在這種情況下，接下委託的我不應該說出這種消極的話，讓委託人產生不安。#n是我不察，在此向你道歉。"
10032055-16 = "差點就要失去信賴了。"
10032055-17 = "呼……"
10032055-18 = "總之先到地下停車場去吧，這裡已經變得一團亂了。"
10032055-19 = "部下們會開車過來接我，只要銜接順利就能安全逃出去了。"
10032055-20 = "原來如此，真是個好消息。#n就這樣進行吧。"
10032055-21 = "不過……移動速度的問題果然還是需要改善。"
10032055-22 = "否則依照現在的速度，還沒到地下停車場就會被抓到了。"
10032055-23 = "要是能移動得快一點就好了……"
10032055-28 = "嘖，來的比預期中還快啊。"
10032055-29 = "……事到如今也沒辦法了。#n雖然有點極端，但是現在只能使用最確實又有效率的手段了。"
10032055-30 = "更有效率的手段……？有那種手段嗎？"
10032055-31 = "是的，不過我必須獲得委託人的協助。"
10032055-32 = "……？？？我的協助？#n唔，這倒是沒問題……"
10032055-33 = "……手段是確實有效的吧？"
10032055-34 = "啊啊，當然，相信我吧。"
10032055-35 = "是個能保證機動性，同時又能安全移動的方法。#n接下來只要交給我就行了。"
10032055-40 = "……？"
10032055-41 = "……什，什麼？"
10032055-42 = "你現在是在做什……"
10032055-43 = "…………"
10032055-49 = "呃唔……！！！"
10032055-61 = "嗯……"
10032055-67 = "呼……呼……"
10032055-68 = "……很好。"
10032055-72 = "……無懈可擊。"

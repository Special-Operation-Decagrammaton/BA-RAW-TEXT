10032055-9 = "1;사오리 드레스;00;일단 안전이 확보된 것 같으니 우선 주변을 둘러보겠다."
10032055-10 = "1;사오리 드레스;05;그렇지만 지금의 진행 속도는 너무 느리다. ……이대로라면 조만간 따라잡히겠군."
10032055-11 = "5;돈 아란치노;00;……너무 느려? 설마 내 탓이라는 거냐?\n#5;em;[?]"
10032055-12 = "5;돈 아란치노;00;그걸 말이라고 해? 그 부분을 어떻게 좀 해 보라고 네놈을 고용한 거잖나!\n#5;hophop\n#5;em;[스팀]"
10032055-13 = "1;사오리 드레스;04;……으음.\n#1;stiff"
10032055-14 = "1;사오리 드레스;06;확실히, 그 말이 옳다. 당신이 날 고용한 건 내가 이런 상황의 전문가라 믿고 있기 때문이지."
10032055-15 = "1;사오리 드레스;05;그런 상황에서 일을 받은 내가 부정적인 말을 하면 불안하겠군. 내 불찰이다. 사과하지.\n#1;em;…"
10032055-16 = "1;사오리 드레스;02;하마터면 신뢰를 잃을 뻔했어."
10032055-17 = "5;돈 아란치노;00;후……."
10032055-18 = "5;돈 아란치노;00;일단 지하 주차장으로 가자. 이미 이곳은 난장판이 됐으니, 부하들이 날 데리러 오고 있을 거다.\n#5;em;[반응]"
10032055-19 = "5;돈 아란치노;00;당연히 차들도 끌고 들어올 테니, 접선만 하면 안전하게 빠져나갈 수 있을 거야."
10032055-20 = "1;사오리 드레스;03;과연, 좋은 소식이군. 그대로 진행하겠다.\n#1;em;[음표]"
10032055-21 = "1;사오리 드레스;00;하지만 그래도 지금의 이동 속도는 개선해야 한다."
10032055-22 = "1;사오리 드레스;06;이걸 어떻게든 개선하지 않으면 지하 주차장까지도 가지 못하고 따라 잡힐 거니까."
10032055-23 = "1;사오리 드레스;05;아무래도 당신이 좀 더 빠르게 움직일 수 있으면 좋겠는데…….\n#1;em;…"

[translation]
10032055-7 = "หยุดก่อน..."
10032055-9 = "ตอนนี้เหมือนว่าเราจะปลอดภัยแล้ว เรามาลองสำรวจรอบๆ กันก่อนเถอะ"
10032055-10 = "แต่ถึงยังไงเราก็ล่าช้าอยู่มาก... แบบนี้อีกไม่นานคงโดนตามทันแน่ๆ"
10032055-11 = "ล่าช้า? นี่เธอจะบอกว่าเป็นความผิดของฉันเรอะ?"
10032055-12 = "พูดออกมาได้! ฉันจ้างเธอมาเพื่อให้ทำอะไรสักอย่างเกี่ยวกับเรื่องนี้นะ!"
10032055-13 = "อืม..."
10032055-14 = "พูดถูกแล้วละ ที่คุณจ้างฉันมา ก็เพราะคุณเชื่อว่าฉันเป็นผู้เชี่ยวชาญในสถานการณ์แบบนี้"
10032055-15 = "ถ้าผู้ถูกว่าจ้างอย่างฉันพูดอะไรเชิงลบในสถานการณ์แบบนี้ คุณก็คงกระวนกระวายใจสินะ ฉันผิดเอง ต้องขอโทษด้วย"
10032055-16 = "เกือบเสียความน่าเชื่อถือไปแล้วสินะ"
10032055-17 = "ฮู่ว..."
10032055-18 = "ไปที่ลานจอดรถใต้ดินก่อนเถอะ ที่นี่เละเทะไปหมดแล้ว ตอนนี้พวกลูกน้องคงกำลังมารับตัวฉันอยู่"
10032055-19 = "พวกนั้นต้องเอารถมาด้วยแน่นอน ถ้าแอบนัดพบกันได้ก็จะออกจากที่นี่ไปได้อย่างปลอดภัย"
10032055-20 = "ถือว่าเป็นข่าวดีเลยนะ งั้นก็เอาตามนั้นเลย"
10032055-21 = "แต่ยังไงเราก็ต้องไปให้เร็วกว่าตอนนี้"
10032055-22 = "เพราะถ้ายังมัวช้าแบบนี้อยู่ละก็ เราคงโดนไล่ตามก่อนที่จะไปถึงลานจอดรถใต้ดินเสียอีก"
10032055-23 = "ฉันอยากให้คุณเคลื่อนไหวเร็วกว่านี้หน่อย..."
10032055-28 = "แย่ละสิ มากันเร็วกว่าที่คิดเอาไว้เยอะเลยนะ"
10032055-29 = "ในเมื่อเป็นแบบนี้ก็ไม่ช่วยไม่ได้ ถึงจะค่อนข้างสุดโต่งไปสักหน่อย แต่ฉันก็ไม่มีทางเลือกอื่นนอกจาก#nใช้วิธีที่มีประสิทธิภาพและได้ผลแน่นอน"
10032055-30 = "วิธีที่มีประสิทธิภาพ? มีวิธีแบบนั้นด้วยเหรอ?"
10032055-31 = "ใช่ แต่ต้องขอความร่วมมือจากคุณด้วยนะ"
10032055-32 = "...??? ความร่วมมือจากฉัน? มะ... มันก็ได้อยู่หรอก..."
10032055-33 = "แต่วิธีของเธอมันใช้ได้แน่นอนใช่มั้ย?"
10032055-34 = "แน่นอนอยู่แล้ว เชื่อฉันเถอะน่า"
10032055-35 = "วิธีนี้จะทำให้คุณเคลื่อนที่ได้เร็วและปลอดภัยอย่างแน่นอน ส่วนเรื่องอื่นน่ะ ให้ฉันจัดการเอง"
10032055-40 = "...?"
10032055-41 = "วะ... ว่าไงนะ?"
10032055-42 = "นี่เธอจะทำอะไร..."
10032055-43 = "......"
10032055-49 = "เฮือก...!!!"
10032055-61 = "ฮึ่ม..."
10032055-67 = "ฮู่ว... ฮู่ว..."
10032055-68 = "ดีละ..."
10032055-72 = "สมบูรณ์แบบ..."

[translation]
1010203-1 = "#title;자외선 차단은 확실히"
1010203-2 = "#na;(히요리가 있는 해변가로 향했다.)"
1010203-3 = "#all;hide"
1010203-4 = "3;히요리 수영복;11;아야야…… 쓰라려…… 아파요…….\n#3;em;[속상함]\n#3;a\n#3;stiff"
1010203-5 = "3;히요리 수영복;16;앗? 선생님? 여, 여긴 어떻게?"
1010203-6 = "3;히요리 수영복;11;아야얏……!"
1010203-7 = "[s1] \"괜찮아, 히요리?\"\n[s2] \"내가 봐 줄게, 이리 와 봐.\""
1010203-8 = "#wait;10"
1010203-9 = "#wait;10"
1010203-10 = "3;히요리 수영복;06;으으…… 이것 보세요, 선생님…… 피부가 빨갛게 변했어요…….\n#3;em;[훌쩍]"
1010203-11 = "3;히요리 수영복;16;바닷물로 씻으려 했는데 소금기가 닿으니 완전 아파서……!"
1010203-12 = "3;히요리 수영복;11;우와아아앙! 결국 이렇게 여름이 끝나버리는 거네요! 기껏 수영복도 입었는데 바다에는 한 발짝도 못 들어가고!\n#3;hophop"
1010203-13 = "3;히요리 수영복;11;결국 저한테 남은 거라곤 어두침침한 은신처를 전전하는 떠돌이 생활뿐인 거네요……!"
1010203-14 = "[s] \"자, 자, 진정하고, 여기 그늘로 와.\""
1010203-15 = "3;히요리 수영복;16;훌쩍, 네에."
1010203-16 = "#all;hide"
1010203-17 = "3;히요리 수영복;16\n#3;a\n#wait;1500"
1010203-18 = "3;히요리 수영복;17;……네? 어디선가 고소한 냄새가 난다고요?\n#3;em;[?]"
1010203-19 = "3;히요리 수영복;03;아, 선생님, 후각이 좋으시네요."
1010203-20 = "[s] \"이건…… 참기름?\""
1010203-21 = "3;히요리 수영복;00;마, 맞아요. 자외선 차단제를 살 돈이 없어서 근처 가게에서 얻은 참기름을 발랐거든요.\n#3;em;[반응]"
1010203-22 = "3;히요리 수영복;00;잡지에서 본 건데, 해변에서는 몸에 기름을 바르는 것 같더라고요. 헤헤.\n#3;stiff"
1010203-23 = "3;히요리 수영복;01;그치만 양이 적어서 배랑 가슴에만 좀 바르니까 다 떨어져서……."
1010203-24 = "3;히요리 수영복;04;괜찮겠지 싶어서 그냥 누웠는데요…….\n#3;em;…"
1010203-25 = "[s] \"그럼 자외선 차단이 안 되잖아!\""
1010203-26 = "3;히요리 수영복;16;그렇죠? 역시 망했네요…… 살도 완전히 타 버려서, 해변 같은 건 즐기지도 못하게 됐네요……!\n#3;em;[세로선]"
1010203-27 = "3;히요리 수영복;06;어두컴컴한 동굴 속에 들어가서 여름이 끝날 때까지 기다려야겠죠…… 햇빛도 보지 못한 채 박쥐와 함께 살아가야겠죠……!"
1010203-28 = "3;히요리 수영복;11;망했어요! 우아아아앙!\n#3;hophop"

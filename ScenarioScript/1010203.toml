[translation]
1010203-1 = "กันแดดให้ถูกวิธี"
1010203-2 = "(คุณครูมายังชายหาดที่ฮิโยริอยู่)"
1010203-4 = "โอ๊ย... แสบ... แสบจังเลย..."
1010203-5 = "อ๊ะ? คุณครู? มะ... มาที่นี่ได้ยังไงคะ?"
1010203-6 = "โอ๊ยยย...!"
1010203-7 = "[s1] \"เป็นอะไรหรือเปล่า ฮิโยริ?\"\n[s2] \"มานี่สิ เดี๋ยวครูดูให้\""
1010203-10 = "ฮืออ... ดูสิคะคุณครู... ผิวฉันแดงไปหมดแล้ว..."
1010203-11 = "ฉันจะลงไปล้างตัวในทะเลน่ะค่ะ แต่พอโดนน้ำทะเล ผิวก็แสบกว่าเดิมอีก...!"
1010203-12 = "มุแงงงง~! ฤดูร้อนของฉันคงจบแค่นี้สินะคะ! อุตส่าห์ได้ใส่ชุดว่ายน้ำทั้งที แต่ก็ลงไปเล่นน้ำในทะเลไม่ได้!"
1010203-13 = "สิ่งเดียวที่ฉันมีคงเป็นชีวิตร่อนเร่ที่ต้องเปลี่ยนที่ซ่อนตัวมืดๆ ไปตลอดสินะคะ...!"
1010203-14 = "[s] \"เอาละๆ ใจเย็นๆ แล้วเข้ามาหลบในร่มตรงนี้ก่อน\""
1010203-15 = "(สะอื้น) ค่ะ..."
1010203-18 = "คะ...? เหมือนได้กลิ่นหอมจากที่ไหนงั้นเหรอคะ?"
1010203-19 = "อ่า คุณครูจมูกดีนะคะเนี่ย"
1010203-20 = "[s] \"นี่มัน... น้ำมันงาเหรอ?\""
1010203-21 = "ชะ... ใช่ค่ะ ฉันไม่มีเงินซื้อครีมกันแดด ก็เลยทาน้ำมันงาที่ได้มาจากร้านค้าใกล้ๆ น่ะค่ะ"
1010203-22 = "ฉันอ่านเจอมาในนิตยสารว่าเวลาไปเที่ยวทะเล คนจะทาน้ำมันบนตัวกันค่ะ แหะๆ"
1010203-23 = "แต่มันก็เหลืออยู่นิดเดียว แค่ฉันทาที่ท้องกับหน้าอกก็หมดขวดแล้ว..."
1010203-24 = "แต่ฉันก็คิดว่าไม่น่าเป็นอะไร ก็เลยไปนอนอาบแดดค่ะ..."
1010203-25 = "[s] \"น้ำมันงามันกันแดดได้ที่ไหนล่ะ!\""
1010203-26 = "ใช่มั้ยล่ะคะ? จบเห่แล้วค่ะ... ผิวก็ไหม้หมดแล้ว แบบนี้ฉันคงสนุกกับชายหาดไม่ได้แล้วค่ะ...!"
1010203-27 = "ฉันคงต้องเข้าไปอยู่ในถ้ำมืดๆ แล้วรอจนกว่าจะสิ้นสุดฤดูร้อนสินะคะ... ต้องใช้ชีวิตกับค้างคาวโดยที่#nไม่ได้เห็นแสงแดดสินะคะ...!"
1010203-28 = "ชีวิตจบเห่แล้วค่ะ! มุแงงงงง!"
1010203-30 = "(คุณครูปลอบฮิโยริที่ร้องไห้แล้วเข้าไปที่ร้านริมทะเลที่อยู่ใกล้ๆ)"
1010203-32 = "(สะอื้น) พอได้ประคบเย็นก็ดีขึ้นมาหน่อยนะคะ..."
1010203-33 = "ผิวตรงที่แดงๆ ก็เริ่มดีขึ้นแล้ว... ถึงจะยังแสบอยู่ก็เถอะค่ะ..."
1010203-34 = "แหะ แหะๆ คุณครูคะ รบกวนประคบตรงข้างหน้านี้ด้วยได้มั้ยคะ..."
1010203-35 = "เย็นดีจัง..."
1010203-36 = "[s] \"ต่อไปต้องทาครีมกันแดดให้ถูกต้องนะ เข้าใจมั้ย?\""
1010203-37 = "แหะ แหะๆ ค่ะ"
1010203-38 = "แต่พอได้รับการประคบเย็นจากคุณครู ก็คุ้มค่าเหมือนกันนะคะเนี่ย แหะๆ..."
1010203-44 = "ขอไอศกรีม <โมริโมริคุง> แท่งหนึ่งค่ะ!"
1010203-45 = "ฉันขอเป็นรสซุปข้าวโพด!"
1010203-46 = "ครับ นี่ครับ!"
1010203-48 = "..."
1010203-49 = "แหะ แหะๆ คุณครูคะ ไหนๆ คุณครูก็ทำให้ฉันสดชื่นแล้ว ช่วยซื้อไอศกรีมแท่งให้ฉันด้วยได้มั้ยคะ...?"
1010203-50 = "ถ้าฉันเย็นสดชื่นทั้งภายในและภายนอก ฉันคงหายดีเป็นปลิดทิ้งเลยละค่ะ...!"
1010203-51 = "[s] \"อืม ได้สิ\""
1010203-52 = "แหะๆ ขอบคุณค่ะ...!"
1010203-56 = "อะ... อร่อยจังเลยค่ะ! ดับร้อนได้อยู่หมัดเลย...!"
1010203-57 = "ฉันหายดีเป็นปลิดทิ้งแล้วค่ะ...!"
1010203-58 = "[s] \"แต่ยังไงก็อย่าหักโหมจนเกินไปนะ\""
1010203-59 = "ค่ะ ได้ค่ะ...!"
1010203-60 = "ฉันจะออกไปรับแดดสักหน่อยนะคะ...!"
1010203-66 = "อ่า... อ๊ะ...?!"
1010203-72 = "― [log=히요리 수영복]อ๊ายๆๆๆ... เจ็บจังเลยค่ะ... [/log][wa:3070] "
1010203-75 = "― [log=히요리 수영복]เฮือก?! ไอศกรีมแท่งของฉัน?![/log][wa:1180] "
1010203-78 = "― [log=히요리 수영복]แย่แล้วค่ะ! แย่มากๆ เลยค่ะ![/log][wa:1030] "
1010203-79 = "― [log=히요리 수영복]ฉันยังไม่ได้กินสักคำเลย แต่มันเลอะทรายหมดแล้ว...! [/log][wa:3070] "
1010203-82 = "― [log=히요리 수영복]ตัวฉันคงไม่มีแม้แต่โอกาสที่จะได้กินไอศกรีมแท่งเลยสินะคะ...![/log][wa:3600] "
1010203-83 = "― [log=히요리 수영복]ฉันถูกทอดทิ้งโดยสิ้นเชิงเลยค่ะ...![/log][wa:1580] "
1010203-86 = "― [log=히요리 수영복]ชีวิตฉัน ทำไมถึงเจอแต่ความลำบากแบบนี้คะ?[/log][wa:2320] "
1010203-87 = "― [log=히요리 수영복]คนอื่นๆ กำลังสนุกกับฤดูร้อนกันแท้ๆ...[/log][wa:2540] "
1010203-90 = "― [log=히요리 수영복]ไม่ว่าจะพยายามเท่าไร[/log][wa:130] "
1010203-91 = "― [log=히요리 수영복]แต่สำหรับฉัน นี่เป็นแค่ความฝัน ที่เป็นจริงไม่ได้งั้นเหรอ......![/log][wa:2110] "
1010203-94 = "― [log=히요리 수영복]คะ...? จะซื้อให้อีกแท่งหนึ่งเหรอคะ? [/log][wa:1610] "
1010203-97 = "― [log=히요리 수영복]ถ้างั้น ถ้าฉันไม่ทำไอศกรีมแท่งนี้หล่น[/log][wa:3700] "
1010203-98 = "― [log=히요리 수영복]ฉันก็คงได้กินเป็น 2 เท่าแล้วสินะคะ...?[/log][wa:620] "
1010203-101 = "― [log=히요리 수영복]มุแงงง! แย่จริงๆ ด้วยค่ะ![/log][wa:1660] "
1010203-104 = "กระซิก..."
1010203-105 = "ขอบคุณค่ะคุณครู ซื้อให้ทั้งไอศกรีมและน้ำแข็งไสเลย..."
1010203-106 = "ได้มากินของเย็นๆ ฟรีๆ โดยไม่ทันตั้งตัวเลยนะคะ... แหะๆ จะกินแล้วนะคะ"
1010203-107 = "[s] \"รู้สึกดีขึ้นบ้างแล้วหรือยัง?\""
1010203-108 = "ค่ะ ค่ะ!"
1010203-109 = "ฉันเป็นฝ่ายได้รับอะไรจากคุณครูตลอดเลย... แบบนี้ฉันก็รู้สึกขอบคุณอยู่หรอกนะคะ แต่ฉันรู้สึกเหมือนตัวเองไม่มีความละอายใจเลย..."
1010203-110 = "ทำไม... ทำไมถึงมองฉันแบบนั้นล่ะคะ? หะ... เห็นอย่างนี้ฉันก็มีจิตสำนึกนะคะ...!"
1010203-111 = "ไว้คราวหน้าฉันทำอะไรตอบแทนคุณครูบ้างค่ะ..."
1010203-112 = "ฉันไปหานิตยสารจากถังรีไซเคิลให้เอามั้ยคะ?"
1010203-113 = "คุณครูชอบอ่านนิตยสารแนวไหนเหรอคะ? ตะ... ต้องเป็นแนวภัยสังคมหรือเปล่านะ..."
1010203-114 = "[s3] \"ไม่ๆ ไม่ต้องทำแบบนั้นให้ก็ได้ ไม่เป็นไร\"\n[s4] \"ไม่ต้องหรอก ครูไม่ได้ทำเพื่อหวังสิ่งตอบแทนน่ะ\""
1010203-117 = "งะ... งั้นเหรอคะ?"
1010203-118 = "แต่ว่า... ฉันถูกสอนให้ตอบแทนน้ำใจคนอื่นนะคะ..."
1010203-119 = "คะ... คุณครูตั้งตารอได้เลยค่ะ... แหะๆ"

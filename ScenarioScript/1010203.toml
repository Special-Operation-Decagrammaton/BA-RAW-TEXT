[translation]
1010203-1 = "Block Those UV Rays"
1010203-2 = "I headed out to find Hiyori at the beach."
1010203-4 = "Owieee... Hurts... It stings!"
1010203-5 = "Ah!! Sensei?! Wh-What're you doing here?"
1010203-6 = "Ow, ow, owww!"
1010203-7 = "[s1] \"Are you okay, Hiyori?\"\n[s2] \"Come here, let me take a look.\""
1010203-10 = "Uwaaah... Look, Sensei! Look at it! My skin is completely red."
1010203-11 = "I tried to rinse it with seawater...but the salt stings so much!"
1010203-12 = "WAAAH! I can't believe this is how my summer is going to end! If I can't set even a single foot in the water, what was the point of this swimsuit?"
1010203-13 = "Am I fated to wander from one dark hideout to the next, for all time?"
1010203-14 = "[s] \"Now, now. Calm down and come sit in the shade.\""
1010203-15 = "*sniff* Okay..."
1010203-18 = "...Huh? You smell something nutty?"
1010203-19 = "Ah, you have a good sense of smell, Sensei."
1010203-20 = "[s] \"Is this...sesame oil?\""
1010203-21 = "Exactly right. I couldn't afford sunscreen, so I got sesame oil from a nearby store and applied that instead."
1010203-22 = "There was a magazine article that said people use oil at the beach. Heehee."
1010203-23 = "I didn't have enough sesame oil, though. I could only get my chest and stomach."
1010203-24 = "But I figured it would be enough, so I just tried to sunbathe anyways."
1010203-25 = "[s] \"Sesame oil doesn't block UV rays!\""
1010203-26 = "N-Now I know! Everything is ruined! The sunburn is so bad that I won't be able to enjoy a single second of the beach."
1010203-27 = "I'll be forced to live in a dark cave with the bats! Just biding my time until summer is finally over..."
1010203-28 = "Everything is ruined! WAAAHHH!"
1010203-30 = "I somewhat calmed down the hysterical Hiyori and led her into the nearby Beach Shack."
1010203-32 = "*sniff* *sniff* I guess...the ice is helping...a little..."
1010203-33 = "It still hurts, but my skin looks more normal..."
1010203-34 = "Hee...heehee... Sensei, can you do my front too, please?"
1010203-35 = "Ah... How nice."
1010203-36 = "[s] \"From now on, make sure to apply proper sunscreen. Got it?\""
1010203-37 = "Hee...heehee... Okay."
1010203-38 = "A special ice pack treatment from none other than Sensei... Maybe this was all worth it? Heeheehee..."
1010203-44 = "One Morimori Popsicle!"
1010203-45 = "Corn soup flavor for me!"
1010203-46 = "Here you go!"
1010203-48 = "..."
1010203-49 = "Hee...heehee... Since you're already helping me cool off, can I have a popsicle too?"
1010203-50 = "The outside of my body is cooling down, but the inside still needs to be healed!"
1010203-51 = "[s] \"Okay, let's do that.\""
1010203-52 = "Heehee. Thank you!"
1010203-56 = "Y-Yummy! I feel the heat melting away!"
1010203-57 = "I'm fully recovered now!"
1010203-58 = "[s] \"You still shouldn't overdo it!\""
1010203-59 = "Y-Yes!"
1010203-60 = "I'll just take a quick step outside...!"
1010203-66 = "A-Ack?!"
1010203-72 = "― [log=히요리 수영복]Ouchie... It hurts... [/log][wa:3310] "
1010203-75 = "― [log=히요리 수영복]Eek! My popsicle...[/log][wa:1500] "
1010203-78 = "― [log=히요리 수영복]It's ruined! Totally ruined![/log][wa:990] "
1010203-79 = "― [log=히요리 수영복]I only took one bite, and now it's covered in sand! [/log][wa:2990] "
1010203-82 = "― [log=히요리 수영복]I guess even a popsicle is a luxury I don't deserve![/log][wa:3880] "
1010203-83 = "― [log=히요리 수영복]Life has forsaken me!![/log][wa:2060] "
1010203-86 = "― [log=히요리 수영복]Why is my life filled with such hardships?[/log][wa:2240] "
1010203-87 = "― [log=히요리 수영복]Everyone else gets to enjoy their summer...[/log][wa:2300] "
1010203-90 = "― [log=히요리 수영복]No matter how I try,[/log][wa:130] "
1010203-91 = "― [log=히요리 수영복]it's a dream I'll never get to reach...[/log][wa:3070] "
1010203-94 = "― [log=히요리 수영복]...What? You'll buy me another one? [/log][wa:1610] "
1010203-97 = "― [log=히요리 수영복]You mean to say, if I didn't drop the first popsicle,[/log][wa:3060] "
1010203-98 = "― [log=히요리 수영복]I would've had two popsicles instead?![/log][wa:620] "
1010203-101 = "― [log=히요리 수영복]UWAAAH! Everything really is terrible![/log][wa:1140] "
1010203-104 = "...*sniff*"
1010203-105 = "Thank you, Sensei. You even ended up buying me shaved ice..."
1010203-106 = "Everything was so yummy. Heehee. Thank you."
1010203-107 = "[s] \"Do you feel better now?\""
1010203-108 = "Y-Yes..."
1010203-109 = "You're always giving me things, Sensei... I'm both grateful...and guilty..."
1010203-110 = "Wh-What's with that expression?! I-I'm capable of some amount of self-reflection!"
1010203-111 = "I'll do something for you next time, instead..."
1010203-112 = "Maybe I can find you some magazines from the recycling bins?"
1010203-113 = "What type of magazines do you like? P-Probably like the r-racy ones?"
1010203-114 = "[s3] \"No, no. That's not necessary.\"\n[s4] \"I wasn't expecting any reciprocation.\""
1010203-117 = "R-Really?"
1010203-118 = "But...I was taught that I always have to pay back people's kindness..."
1010203-119 = "S-So you can expect something incredible next time! Heehee."

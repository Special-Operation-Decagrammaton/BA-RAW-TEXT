[translation]
1010203-1 = "防曬要確實"
1010203-2 = "（前往了日和所在的海邊）"
1010203-4 = "啊呀呀……好痛……好痛喔……"
1010203-5 = "啊，老師？你，你怎麼會在這裡？"
1010203-6 = "啊啊啊……！"
1010203-7 = "[s1]「你沒事吧，日和？」\n[s2]「我幫你看看，過來我這裡。」"
1010203-10 = "嗚嗚……老師你看……我的皮膚都變紅了……"
1010203-11 = "本來打算用海水洗一洗，可是傷口一碰到鹽分就痛得受不了……！"
1010203-12 = "哇啊啊啊啊！沒想到最後還是這樣結束了夏天！#n好不容易穿了泳裝過來，結果竟然完全不能下水！"
1010203-13 = "難道我這輩子都只能在陰暗的地方流浪了嗎……！"
1010203-14 = "[s]「你先冷靜。到這邊的陰影處躲一下吧。」"
1010203-15 = "嗚嗚，好……"
1010203-18 = "……咦？你說好像聞到一股香氣？"
1010203-19 = "啊，老師的嗅覺真敏銳呢。"
1010203-20 = "[s]「這是……芝麻油？」"
1010203-21 = "沒，沒錯。#n因為我沒錢買防曬油，所以就跟附近的店家要了一點芝麻油塗在身上。"
1010203-22 = "我之前有在雜誌上看過，聽說來海邊的時候一定要在身上抹油……耶嘿嘿。"
1010203-23 = "可是因為芝麻油不太夠的關係，我只塗了胸部和腹部……"
1010203-24 = "本來覺得應該不會有問題，所以就這麼躺在了沙灘上……"
1010203-25 = "[s]「那樣根本就沒有防曬作用啊！」"
1010203-26 = "果然是這樣嗎？#n已經完蛋了……現在我的皮膚都被曬傷，根本沒辦法盡情地在海邊玩……！"
1010203-27 = "看來我還是躲進漆黑的洞窟裡，等到夏天結束後再出來好了……#n就在那種陽光照不進去的地方，和蝙蝠們作伴……！"
1010203-28 = "完蛋了啦！哇啊啊啊啊！"
1010203-30 = "（好不容易才把嚎啕大哭的日和安撫好，並把他帶到了附近的海之家）"
1010203-32 = "嗚嗚，冰敷一下之後的確好多了……"
1010203-33 = "被曬紅的皮膚也慢慢變回原本的顏色……雖然還是有點痛就是了……"
1010203-34 = "耶，耶嘿嘿。#n老師，前面的部分也可以麻煩你嗎……"
1010203-35 = "好涼喔……"
1010203-36 = "[s]「下次一定要乖乖擦真正的防曬油才行，知道嗎？」"
1010203-37 = "耶嘿嘿，我知道了。"
1010203-38 = "不過能像這樣讓老師幫我冰敷，看來我吃的苦頭也不算完全白費呢，耶嘿嘿……"
1010203-44 = "請給我一個咯哩咯哩君冰棒！"
1010203-45 = "我要玉米濃湯口味！"
1010203-46 = "好的，請慢用！"
1010203-48 = "……"
1010203-49 = "耶，耶嘿嘿。#n老師，既然你都幫我冰敷了，能不能順便請我吃根冰棒……？"
1010203-50 = "如果同時冰敷體內和體外的話，我覺得自己說不定能恢復得更快……！"
1010203-51 = "[s]「沒問題，我請你吃。」"
1010203-52 = "呵呵，謝謝老師……！"
1010203-56 = "好，好好吃！冰涼的感覺把熱氣都趕跑了……！"
1010203-57 = "這樣我總算能夠滿血復活了……！"
1010203-58 = "[s]「不可以稍微好了一點就太勉強自己哦。」"
1010203-59 = "是，是……！"
1010203-60 = "我去曬個太陽試試看……！"
1010203-66 = "啊，咦……！？"
1010203-72 = "― [log=히요리 수영복]痛痛痛……好痛哦……[/log][wa:3790] "
1010203-75 = "― [log=히요리 수영복]噫噫！？我的冰棒？[/log][wa:1900] "
1010203-78 = "― [log=히요리 수영복]完蛋了！已經完蛋了！[/log][wa:1710] "
1010203-79 = "― [log=히요리 수영복]才只吃了一口就變得全都是沙子……！[/log][wa:4390] "
1010203-82 = "― [log=히요리 수영복]果然我就連吃冰棒的資格都沒有……！[/log][wa:5280] "
1010203-83 = "― [log=히요리 수영복]完全被拋棄了……！[/log][wa:2580] "
1010203-86 = "― [log=히요리 수영복]我的人生為什麼會如此多災多難呢？[/log][wa:3280] "
1010203-87 = "― [log=히요리 수영복]其他人明明都在享受夏天……[/log][wa:3500] "
1010203-90 = "― [log=히요리 수영복]無論再怎麼努力……[/log][wa:570] "
1010203-91 = "― [log=히요리 수영복]對我來說都像是遙不可及的夢……[/log][wa:4030] "
1010203-94 = "― [log=히요리 수영복]……咦？要再買一根給我是嗎？[/log][wa:2490] "
1010203-97 = "― [log=히요리 수영복]也就是說……要是掉下去的冰棒沒事……[/log][wa:4460] "
1010203-98 = "― [log=히요리 수영복]本來可以吃到兩倍的意思對吧……？[/log][wa:1500] "
1010203-101 = "― [log=히요리 수영복]嗚哇！果然還是完蛋了！[/log][wa:2220] "
1010203-104 = "……嗚嗚。"
1010203-105 = "謝謝你，老師。#n居然還買了刨冰給我吃……"
1010203-106 = "結果好像不知不覺吃了老師很多東西呢……#n耶嘿嘿，我要開動了。"
1010203-107 = "[s]「現在比較有精神了嗎？」"
1010203-108 = "嗯，嗯。"
1010203-109 = "我明明常接受老師的幫助，卻都沒有好好回報……#n雖然心裡很感謝，但我有時候也會覺得這樣是不是太厚臉皮了……"
1010203-110 = "為，為什麼要那樣看著我？#n我，我也是有自知之明的哦……！"
1010203-111 = "所以下次，就讓我為老師做點什麼吧……"
1010203-112 = "要不要我從回收箱裡面幫你找幾本雜誌？"
1010203-113 = "老師你喜歡什麼樣的雜誌？#n肯，肯定是色色的那種對吧……"
1010203-114 = "[s3]「不不不，我不需要那種東西。」\n[s4]「我本來就不是為了回報才那麼做的，所以你不用在意。」"
1010203-117 = "是，是嗎……"
1010203-118 = "可是……人家都說要知恩圖報……"
1010203-119 = "所，所以老師就拭目以待吧……耶嘿嘿。"

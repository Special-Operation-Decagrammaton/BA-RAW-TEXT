10014055-18 = "3;레이사;04;그, 그렇군요. 다행입니다…….\n#3;em;[땀]\n#3;stiff"
10014055-19 = "3;레이사;04;그, 그렇군요. 다행입니다…….\n#3;em;[땀]\n#3;stiff"
10014055-20 = "3;레이사;02;그나저나 아무래도 이분들……. 쿄야마 카즈사가 새로운 조직을 재건하려 한다고 생각하는 모양이에요."
10014055-21 = "3;레이사;01;지금 주변에서 자리 잡고 있는 스케반들 입장에서는 보통 일이 아니겠지요. 무슨 수를 써서도 막으려 할 테고……."
10014055-22 = "3;레이사;11;아무래도 일이 좀 복잡해졌네요. 저 때문에……."
10014055-23 = "[s3] \"레이사 탓이 아니야.\"\n[s4] \"누구의 잘못 같은 게 아냐.\""
10014055-24 = "3;레이사;15;하하……. 감사합니다, 선생님. 그렇게 말씀해 주셔서.\n#3;em;[///]\n#3;stiff"
10014055-25 = "3;레이사;15;하하……. 감사합니다, 선생님. 그렇게 말씀해 주셔서.\n#3;em;[///]\n#3;stiff"
10014055-26 = "3;레이사;11;그렇지만 어찌 됐건 최근 요란하게 일을 키우고 다닌 건 저니까요."
10014055-27 = "3;레이사;07;아무래도 저 스스로는…… 이 일에서 자유롭기 힘들겠네요."
10014055-28 = "3;레이사;15;게다가 정작 쿄야마 카즈사는……. 이제는 그런 사람이 아니고 말이죠."
10014055-29 = "3;레이사;03;그런 사람에게! 더 이상 얽히게 할 수는 없지 않겠습니까!\n#3;em;[재잘]\n#3;hophop"

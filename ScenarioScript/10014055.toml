[translation]
10014055-8 = "嗚，嗚嗚……！？"
10014055-15 = "哈啊，哈啊……嚇了我一跳。"
10014055-16 = "老，老師？你沒事吧？#n有沒有受傷……"
10014055-17 = "[s1] 「我完全沒事。」\n[s2] 「別擔心，我沒事的。」"
10014055-18 = "這，這樣啊。太好了……"
10014055-19 = "這，這樣啊，太好了……"
10014055-20 = "看來杏山千紗要重建新的組織這件事已經傳開了呢。"
10014055-21 = "對這附近的太妹們來說可不是什麼小事……#n他們無論如何都想在組織成長之前阻止他吧。"
10014055-22 = "都怪我……害情況變得這麼複雜。"
10014055-23 = "[s3] 「這不是澪紗的錯。」\n[s4] 「這不是任何人的錯哦。」"
10014055-24 = "啊哈哈……謝謝你，老師。"
10014055-25 = "啊哈哈……謝謝你，老師。"
10014055-26 = "但是，讓事情鬧大的人是我。#n這個事實是不會改變的。"
10014055-27 = "這是我應該負起的責任。"
10014055-28 = "而且，杏山千紗他……現在也不是那種人了。"
10014055-29 = "那麼，就不該再給他添麻煩了，不是嗎……"
10014055-33 = "……畢竟那些都是想要忘記的過去啊！"
10014055-34 = "[s5] 「……」\n[s6] 「澪紗，那是……」"
10014055-35 = "好……雖然暫時擊退了他們，但這也不過是個開始吧。"
10014055-36 = "好……雖然暫時擊退了他們，但這也不過是個開始吧。"
10014055-37 = "我想，之後肯定會有源源不絕的太妹們攻過來的！"
10014055-38 = "不過，和太妹們戰鬥是自衛隊的宿命！！#n對我來說不過是家常便飯而已！！"
10014055-39 = "這件事就交給身為自衛隊的我來解決！！#n得要保護「平凡的」杏山千紗才行！！"
10014055-40 = "所以老師，請先收下這個吧……"
10014055-45 = "[ns7] 「這個是……」\n[ns8] 「……這是你想傳達的話嗎？」"
10014055-46 = "從今以後，我不會再向他發起挑戰的意思。#n不只是說說而已，這樣的話杏山千紗也會更加信任吧。"
10014055-47 = "從今以後，我不會再向他發起挑戰的意思。#n不只是說說而已，這樣的話杏山千紗也會輕鬆一點吧。"
10014055-48 = "……老師，我明白了。#n老師特地來找我的理由。"
10014055-49 = "老師真是溫柔呢。託你的福，我覺得輕鬆多了。#n真的很謝謝你。"
10014055-50 = "所以，就把這當作是我對老師發的牢騷吧。#n不告訴他本人也沒關係的。"
10014055-51 = "……雖然只是短暫的時間，能再見到他我很開心。#n其實，我還以為再也見不到他了。"
10014055-52 = "所以才會太興奮了。#n如果造成他的困擾的話……真的很對不起。"
10014055-53 = "不過……"
10014055-54 = "……果然。"
10014055-58 = "……被別人當成想要忘記的回憶，還是有點遺憾呢。"
10014055-62 = "[ns] 「澪紗，那個……」"
10014055-64 = "……哎呀！"
10014055-65 = "又有客人來了呢！#n是叫了支援嗎？"
10014055-66 = "為了避免再給老師添麻煩，我就先告辭了。"
10014055-67 = "今後還有機會的話，希望……"
10014055-68 = "希望有一天能在杏山千紗不在的地方再見到你！"
10014055-69 = "……再見了！！"

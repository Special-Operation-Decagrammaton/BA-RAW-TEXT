10014055-15 = "3;레이사;14;하아, 하아……. 깜짝 놀랐네요.\n#3;a\n#3;stiff\n#3;em;[속상함]"
10014055-16 = "3;레이사;17;서, 선생님? 괜찮으신가요? 혹시 다치신 곳이라도……."

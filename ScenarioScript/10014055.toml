10014055-38 = "3;레이사;00;그렇지만 어차피 스케반들과 싸우는 건 자경단으로서의 숙명!! 저에게 달라지는 건 하나도 없습니다!\n#3;em;[!]\n#3;jump"
10014055-39 = "3;레이사;03;이 일은 이제, 자경단인 제 선에서 끝내야 할 일이겠지요! '평범한' 쿄야마 카즈사를 지켜야 하니까요!\n#3;hophop"

10014055-46 = "3;레이사;03;앞으로는 제가 던질 일이 없다는 의미입니다. 말로만 내뱉는 것보단, 이 편이 쿄야마 카즈사도 더 확실하게 믿을 수 있겠죠.\n#3;hophop\n#3;m3\n#3;em;[재잘]"
10014055-47 = "3;레이사;03;앞으로는 제가 던질 일이 없다는 의미입니다. 말로만 내뱉는 것보단, 이 편이 쿄야마 카즈사도 더 확실하게 편해지겠죠.\n#3;hophop\n#3;m3\n#3;em;[재잘]"
10014055-48 = "3;레이사;18;……네. 선생님. 저도 지금 깨달았어요. 선생님께서 굳이 저에게 찾아오신 것도, 계속 알 수 없는 질문을 캐물으셨던 것도."
10014055-49 = "3;레이사;15;선생님께선 제 생각보다 더 상냥한 분이시네요. 덕분에 많이 괜찮아졌습니다. ……정말 감사해요.\n#3;em;[///]"
10014055-50 = "3;레이사;11;그러니 지금부터 하는 말은 선생님께만 하는 푸념 같은 거예요. 굳이 전달하진 말아 주세요."
10014055-51 = "3;레이사;11;……고작 짧은 며칠이긴 했지만, 오랜만에 봐서 반가웠습니다. 사실, 다시는 못 볼 줄 알았었거든요."
10014055-52 = "3;레이사;06;반가운 나머지 저도 모르게 너무 들떴던 모양이에요. 폐를 끼쳤다면 ……정말 미안해요.\n#3;em;[속상함]\n#3;stiff"
10014055-53 = "3;레이사;07;그래도……. 음……."

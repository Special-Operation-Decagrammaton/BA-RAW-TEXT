[translation]
10014055-8 = "อะ...อึก...!?"
10014055-15 = "แฮ่ก... แฮ่ก... ตกใจหมดเลยนะคะ"
10014055-16 = "คะ... คุณครู? ไม่เป็นไรใช่ไหมคะ? บาดเจ็บตรงไหนหรือเปล่าคะ..."
10014055-17 = "[s1] \"ครูไม่เป็นอะไรเลย\"\n[s2] \"ไม่ต้องห่วง ครูไม่เป็นอะไร\""
10014055-18 = "งะ... งั้นเหรอคะ ค่อยยังชั่วหน่อยค่ะ..."
10014055-19 = "งะ... งั้นเหรอคะ ค่อยยังชั่วหน่อยค่ะ..."
10014055-20 = "จะว่าไปคนพวกนั้น... คงเข้าใจว่าเคียวยามะ คาซึสะจะตั้งองค์กรขึ้นมาใหม่สินะคะ"
10014055-21 = "สำหรับกลุ่มแยงกี้สาวที่ยึดครองพื้นที่แถวนี้อยู่คงจะไม่ใช่แค่เรื่องเล็กๆ ค่ะ คงจะต้องทำทุกวิถีทาง#nเพื่อหยุดเอาไว้.."
10014055-22 = "เหมือนว่าเรื่องจะวุ่นวายมากกว่าเดิมเพราะฉันเลยนะคะ..."
10014055-23 = "[s3] \"ไม่ได้เป็นเพราะเรอิสะหรอก\"\n[s4] \"ไม่ใช่ความผิดของใครหรอก\""
10014055-24 = "ฮะฮะ... ขอบคุณที่พูดแบบนั้นนะคะคุณครู"
10014055-25 = "ฮะฮะ... ขอบคุณที่พูดแบบนั้นนะคะคุณครู"
10014055-26 = "แต่ถึงอย่างงั้นคนที่ทำให้เกิดเรื่องวุ่นวายในตอนนี้ก็คือฉันนี่คะ"
10014055-27 = "ไม่ว่ายังไงฉันก็คง... วางมือจากเรื่องนี้ไปง่ายๆ ไม่ได้หรอกค่ะ"
10014055-28 = "แล้วอีกอย่าง... ความจริงแล้วตอนนี้เคียวยามะ คาซึสะก็ไม่ใช่คนแบบนั้นแล้วนี่คะ"
10014055-29 = "ฉันจะไม่มีวัน! ทำให้เธอต้องไปพัวพันกับเรื่องนั้นอีกแล้ว!"
10014055-33 = "...เรื่องราวที่อยากจะลืมพวกนั้นน่ะ!"
10014055-34 = "[s5] \"...\"\n[s6] \"เรอิสะ เรื่องนั้นน่ะ...\""
10014055-35 = "อื้ม...! ยังไงก็เถอะ เราจัดการไปได้หนึ่งแก๊งแล้ว แต่ฉันคิดว่านี่มันเพิ่งจะเริ่มต้นเท่านั้นค่ะ"
10014055-36 = "อื้ม...! ยังไงก็เถอะ เราจัดการไปได้หนึ่งแก๊งแล้ว แต่ฉันคิดว่านี่มันเพิ่งจะเริ่มต้นเท่านั้นค่ะ"
10014055-37 = "พวกแยงกี้สาวจะต้องมากันมากกว่านี้แน่ จะต้องแห่กันมาไม่หยุดแน่ๆ ค่ะ!"
10014055-38 = "ในฐานะกลุ่มรักษาความสงบก็ถูกชะตากำหนดให้ต้องต่อสู้กับแยงกี้สาวอยู่แล้วค่ะ!! สำหรับฉันแล้ว มันไม่ได้มีอะไรต่างไปเลยค่ะ!"
10014055-39 = "ต่อจากนี้ไป เรื่องนี้ให้เป็นหน้าที่ของฉันที่เป็นกลุ่มรักษาความสงบเถอะค่ะ! ฉันจะต้องปกป้อง#nเคียวยามะ คาซึสะ 'คนธรรมดา' ค่ะ!"
10014055-40 = "เพราะงั้นคุณครู ก่อนอื่นก็ นี่ค่ะ..."
10014055-45 = "[ns7] \"นี่มัน...?\"\n[ns8] \"....ให้ครูเอาไปส่งให้เหรอ?\""
10014055-46 = "หมายความว่าต่อจากนี้ไปฉันจะไม่ท้าสู้อีกแล้วไงคะ แทนที่จะพูดออกมาเฉยๆ แบบนี้น่าจะทำให้#nเคียวยามะ คาซึสะสบายใจมากกว่านะคะ"
10014055-47 = "หมายความว่าต่อจากนี้ไปฉันจะไม่ท้าสู้อีกแล้วไงคะ แทนที่จะพูดออกมาเฉยๆ แบบนี้น่าจะทำให้#nเคียวยามะ คาซึสะสบายใจมากกว่านะคะ"
10014055-48 = "ค่ะ... คุณครู ตอนนี้ฉันรู้แล้วค่ะ ว่าทำไมคุณครูถึงมาหาฉัน และทำไมถึงเอาแต่ถามคำถามที่ไม่อาจ#nตอบได้พวกนั้น"
10014055-49 = "คุณครูเป็นคนอ่อนโยนกว่าที่ฉันคิดไว้อีกนะคะเนี่ย เพราะคุณครูฉันเลยรู้สึกดีขึ้นแล้วค่ะ... ขอบคุณจริงๆ นะคะ"
10014055-50 = "เรื่องที่ฉันจะพูดต่อไปนี้ มันเป็นการบ่นให้คุณครูฟังเท่านั้นค่ะ ไม่ต้องเอาไปบอกต่อนะคะ"
10014055-51 = "ถึงจะเป็นเวลาแค่ไม่กี่วัน... แต่พอได้กลับมาเจอกันอีกครั้ง ฉันก็ดีใจมากเลยค่ะ อันที่จริง ฉันนึกว่าจะไม่มีวันได้เจอกันแล้วซะอีกค่ะ"
10014055-52 = "ฉันดีใจมากที่ได้เจอกันแล้วก็คงจะตื่นเต้นมากเกินไปสินะคะ ขอโทษจริงๆ นะคะ... ถ้าทำให้ต้องเดือดร้อน"
10014055-53 = "แต่ถึงอย่างนั้นก็เถอะ... อืม..."
10014055-54 = "ว่าแล้วเชียว..."
10014055-58 = "การที่ต้องมาหลงเหลืออยู่เป็นเพียงแค่ความทรงจำที่ใครบางคนอยากจะลืมไป... มันก็น่าเศร้าใจอยู่เหมือนกันนะคะ"
10014055-62 = "[ns] \"เรอิสะ เดี๋ยวก่อน...\""
10014055-64 = "โอ้ว...!"
10014055-65 = "พวกลูกค้าที่อดทนไม่ได้พากันมาอีกแล้วค่ะ น่าจะมีจำนวนเยอะกว่าแก๊งเมื่อกี้อีก ว่ามั้ยคะ?"
10014055-66 = "ฉันไม่อยากทำให้คุณครูเดือดร้อนไปมากกว่านี้ ถ้าอย่างนั้นขอตัวก่อนนะคะ"
10014055-67 = "ถ้ามีโอกาสอีกเมื่อไร เอาไว้..."
10014055-68 = "เอาไว้เจอกันใหม่เหมือนวันนี้นะคะ ในที่ที่ไม่มีเคียวยามะ คาซึสะ!"
10014055-69 = "ถ้างั้น... ฉันไปก่อนนะคะ!!"

10014055-34 = "[s5] \"…….\"\n[s6] \"레이사, 그건…….\""
10014055-35 = "3;레이사;08;으음……! 그나저나 일단 한 무리는 쓰러뜨렸지만, 제 생각에 이건 이제 시작에 불과해요.\n#3;em;[속상함]"
10014055-36 = "3;레이사;08;으음……! 그나저나 일단 한 무리는 쓰러뜨렸지만, 제 생각에 이건 이제 시작에 불과해요.\n#3;em;[속상함]"

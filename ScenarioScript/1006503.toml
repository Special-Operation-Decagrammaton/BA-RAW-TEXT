1006503-25 = "[ns] \"그래서 카호, 에스코트라니 무슨 뜻이야?\""
1006503-26 = "3;카호;02;네, 저번에 선생님을 찾아뵈었을 때는 미처 제대로 알아보지도 못한 채, 막무가내로 밀어붙이기만 하는 태도를 보여드렸었지요.\n#3;em;[반응]\n#3;a"
1006503-27 = "3;카호;99;그건 지금 다시 생각해 보더라도, 그…… 무척이나……."
1006503-28 = "3;카호;02;무척이나…… 그…….\n#3;stiff"
1006503-29 = "3;카호;04;부끄러운 실수였다고 생각한답니다.\n#3;em;[땀]"
1006503-30 = "[s] \"아니, 뭐, 실수라고 할 것까지야…….\""
1006503-31 = "3;카호;02;아뇨. 분명한 실수입니다."
1006503-32 = "3;카호;01;때문에 부실로 돌아와 곰곰이 생각하다 보니 문득 이런 생각이 들었답니다."
1006503-33 = "3;카호;99;협업을 말하기에 앞서, 먼저 선생님께 백귀야행이 어떠한 곳인지. 어떠한 매력을 가졌기에, 알리고 싶어 하는지."
1006503-34 = "3;카호;01;우선해서 그런 부분들을 소개해 드려야 했던 게 아닐까. 라고 말이지요."
1006503-35 = "[s] \"백귀야행의 소개를……?\""
1006503-36 = "3;카호;02;네.\n#3;em;[반응]"
1006503-37 = "3;카호;01;물론 선생님께선 그간 백귀야행 학원의 학생들을 도와주시거나, 학원 곳곳에 산재한 문제들을 함께 해결해 주셨던 만큼."
1006503-38 = "3;카호;01;충분히 익숙하고 여러모로 알고 계신 부분도 많다고는 생각합니다만."
1006503-39 = "3;카호;99;그것과 이것은 별개.\n#3;em;…"
1006503-40 = "3;카호;01;백귀야행의 학생으로서 아직 선생님께 정식으로 학원을 안내해드린 적은 없다는 걸 깨달았답니다."
1006503-41 = "3;카호;02;그러니 이대로 가만히 있을 수 없다. 선생님을 직접 에스코트하며 백귀야행을 소개해 드릴 필요가 있다는 결론에 다다랐지요."
1006503-42 = "[s] \"아, 과연…… 그런 의미에서의 에스코트였구나.\""

[translation]
1006503-1 = "比部長更像部長的佳穗同學"
1006503-2 = "（應佳穗的邀約，來到了陰陽部的部室）"
1006503-8 = "[ns]「佳穗，讓你久等了。」"
1006503-12 = "啊，老師，謝謝您願意抽空前來。"
1006503-13 = "[s]「剛好在忙嗎……？」"
1006503-14 = "啊，沒事的。#n今天本來就不是陰陽部的工作日。"
1006503-15 = "只是稍微整理一下資料而已。"
1006503-20 = "……呼。"
1006503-21 = "這樣就完成了，讓您久等了。"
1006503-22 = "[s]「嗯，辛苦了。」"
1006503-25 = "[ns]「話說伴遊是指的是？」"
1006503-26 = "先前拜訪夏萊時，讓您看見了我將自身意見強加於人的態度……"
1006503-27 = "即便是現在回想起來也……"
1006503-28 = "那個……"
1006503-29 = "覺得真是失態了……"
1006503-30 = "[s]「別這麼說，不用在意哦。」"
1006503-31 = "不，那毫無疑問是失態。"
1006503-32 = "當天，在我回到部室後，經過仔細思考得出了結論。"
1006503-33 = "百鬼夜行是個什麼樣的地方，想宣傳其魅力的理由為何。"
1006503-34 = "在討論合作關係前，應該先向您介紹才對。"
1006503-35 = "[s]「百鬼夜行的介紹……？」"
1006503-36 = "是的。"
1006503-37 = "老師曾經幫助過百鬼夜行的學生們，一同解決各式各樣的問題對吧。"
1006503-38 = "因此我想您應該也已經了解了許多事情……"
1006503-39 = "不過這又另當別論。"
1006503-40 = "我發覺自己尚未好好帶領老師認識這個學園。"
1006503-41 = "因此今天想向您介紹百鬼夜行，所以聯絡了您。"
1006503-42 = "[s]「啊，原來如此……伴遊是那個意思啊。」"
1006503-44 = "[ns]「謝謝你這麼費心，佳穗。」"
1006503-48 = "不，不會。"
1006503-49 = "這是以宣傳支援部戰略領袖的身分思考出來的策略……不。"
1006503-50 = "應該說是……計畫吧。"
1006503-51 = "只是身為陰陽部的一員，讓老師留下良好印象的作戰的一環。"
1006503-52 = "[s]「……真心話都說出來了唷。」"
1006503-56 = "咳咳，不清楚您的意思呢。"
1006503-60 = "現在不是說這些的時候了，老師。#n您準備好就……"
1006503-65 = "[ns]「有客人？」"
1006503-66 = "似乎是呢……不過，今天是休息日才對。"
1006503-67 = "請進。"
1006503-73 = "佳穗同學！請，請幫幫我們！#n發生了一些問題……！"
1006503-74 = "今天很不巧是陰陽部的休息日……"
1006503-75 = "不，不好意思。#n不過還請您通融……"
1006503-79 = "……好的，既然是朋友的委託……"
1006503-80 = "老師……不好意思，我可以稍微離開一會嗎？"
1006503-81 = "[s]「嗯，不用急沒關係。」"
1006503-82 = "好的，那麼失禮了……"
1006503-85 = "（在假日收到工作的聯絡後……）"
1006503-86 = "（就順帶被要求了雜七雜八的工作……）"
1006503-89 = "佳穗同學！"
1006503-90 = "拜託！這份文件需要陰陽部的確認……！"
1006503-91 = "副部長！關於部室所有權的問題，需要由陰陽部確認……！"
1006503-92 = "為，為什麼偏偏在今天……有這麼多……！？"
1006503-93 = "[s]「工作就是這樣對吧。」"
1006503-94 = "老師……？"
1006503-96 = "（才以為解決一個問題，馬上又增加了別的工作……）"
1006503-97 = "（無論怎麼處理，新的問題依然不斷傳到佳穗耳中……）"
1006503-98 = "（然而佳穗全都迅速且正確地克服了）"
1006503-101 = "請收下，只要有這份文件就能證明對方的說法有瑕疵了。"
1006503-103 = "非，非常感謝！不愧是佳穗同學！！"
1006503-104 = "要是沒有佳穗的話……我們現在……！"
1006503-105 = "只能眼睜睜看著部室被搶走！"
1006503-106 = "這份恩情，真不知道該如何回報……！"
1006503-107 = "謝禮就不必了。各位，今後如果遇到什麼麻煩的話，歡迎隨時到陰陽部來。"
1006503-108 = "支持各位朋友，正是我們陰陽部的職責！"
1006503-109 = "是，非常感謝！"
1006503-114 = "（就這樣，工作的波瀾告一段落……）"
1006503-117 = "[ns] 「……佳穗真厲害呢。」"
1006503-118 = "……？"
1006503-119 = "[s1]「就算那麼多的事情不斷找上門來……」\n[s2]「也沒有表現出一絲疲累，解決了所有問題……」"
1006503-122 = "不，這不是那麼了不起的事。"
1006503-123 = "我只是做陰陽部該做的事而已。"
1006503-124 = "[s]「不過陰陽部不是學生會吧……？」"
1006503-125 = "沒錯，您說的對。"
1006503-126 = "誠如老師所言，陰陽部並不是學生會。"
1006503-127 = "因此和其他學園的學生會不同，不具有特別的權力。"
1006503-128 = "……嚴格來說更接近「無法擁有」。"
1006503-129 = "[s] 「……？」"
1006503-130 = "即使出了問題，陰陽部也不能直接介入解決事件。#n最多就是居中進行仲裁。"
1006503-131 = "因此要解決所有問題相當困難……#n能做的事情也很有限。"
1006503-132 = "即便如此，我們也應該盡力而為。"
1006503-133 = "為了抱有煩惱的朋友們，我們能做些什麼……"
1006503-134 = "也存在我們力有未逮的問題。#n但是，如果有人尋求協助……"
1006503-135 = "全力應對就是我們陰陽部的職責，也是義務。"
1006503-136 = "[s]「這樣啊……佳穗果然很厲害。」"
1006503-137 = "不……這不是什麼值得您一再稱讚的事……"
1006503-138 = "這種程度，和以前百鬼夜行學園的狀況相比……"
1006503-139 = "沒錯！佳穗同學很厲害！"
1006503-140 = "咦？"
1006503-141 = "多虧有佳穗同學，大大小小的問題才能在轉眼之間解決！"
1006503-142 = "佳穗同學成為陰陽部副部長後，學園內的問題也減少了！"
1006503-143 = "不……那是因為大家的努力……"
1006503-144 = "而且我也不是陰陽部的部長……"
1006503-145 = "那就更了不起了！"
1006503-146 = "佳穗同學比部長更像部長！"
1006503-147 = "這，這句話真讓人困擾……"
1006503-149 = "（等到完全解決接二連三湧入的問題時，不知不覺間已經到了傍晚）"
1006503-152 = "[ns]「呼……學生們都回去了呢。」"
1006503-153 = "不過……"
1006503-157 = "時間……已經這麼晚了嗎……"
1006503-158 = "…………"
1006503-159 = "……對不起，老師。"
1006503-160 = "[s]「佳穗？」"
1006503-161 = "今天本來是想向老師介紹百鬼夜行迷人的地方……"
1006503-162 = "為了伴遊才會請您過來的……"
1006503-163 = "又像這樣……浪費了您寶貴的時間……"
1006503-164 = "這樣，已經……"
1006503-165 = "[s]「你的意思是讓我留下良好印象的作戰失敗了嗎？」"
1006503-169 = "那，那個……"
1006503-170 = "[s]「如果是的話，作戰非常成功哦。」"
1006503-171 = "……咦？"
1006503-172 = "[s3]「之所以一直努力到這麼晚……」\n[s4]「都是因為無法對遇到困難的學生視而不見，對吧？」"
1006503-175 = "可是……"
1006503-176 = "給老師添麻煩的事實依然沒有改變。"
1006503-177 = "就算老師您不在意……"
1006503-178 = "這也毫無疑問是我的疏失。#n對不起……[USERNAME]老師。"
1006503-179 = "[ns]「佳穗對自己真嚴格呢。」"
1006503-181 = "[ns]「既然如此，今天就算是欠我一個人情吧。」"
1006503-182 = "人情，是嗎……？"
1006503-183 = "您的意思是……還願意給我伴遊的機會？"
1006503-184 = "……真的可以嗎？"
1006503-185 = "[s]「嗯，我還是很期待唷。」"
1006503-189 = "既然您都這麼說了……"
1006503-190 = "好的，我知道了。"
1006503-191 = "我會把這次的失敗當作墊腳石……下次一定會……"
1006503-192 = "我向您保證，下次一定帶給您完美的伴遊。"
1006503-193 = "[s]「好，我會懷著喜悅的心情期待那天的到來。」"
1006503-194 = "是，我也一樣……"
1006503-195 = "會懷著喜悅的心情期待那一天的到來。"

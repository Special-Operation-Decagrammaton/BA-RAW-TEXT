[translation]
11160-2 = "第16集;真相大白"
11160-3 = "對策委員會．教室"
11160-4 = "（與日步美和大家一起回到阿拜多斯，所有人一起確認了文件）"
11160-5 = "（碰！！）"
11160-6 = "這，這是什麼！？到底怎麼回事！？"
11160-7 = "……！！"
11160-8 = "運鈔車的款項紀錄上寫著「在阿拜多斯收取788萬元」。#n是來過我們學校的那台車沒錯。"
11160-9 = "……不過上面還寫著之後馬上提供硬梆梆頭盔團「任務支援金500萬元」的記錄……"
11160-10 = "也就是說……"
11160-12 = "收到我們的錢之後，馬上轉手給頭盔團當成支援任務的資金了對吧！？"
11160-13 = "任務……？給硬梆梆頭盔團……？ "
11160-14 = "頭盔團背後的幕後黑手……難道是凱薩信貸？"
11160-17 = "……"
11160-18 = "……"
11160-19 = "……"
11160-20 = "怎麼會！？無法理解！學校要是破產，借出去的錢不就收不回來了嗎……#n為什麼要做出這種舉動……？"
11160-21 = "哼嗯……"
11160-22 = "這件事看起來不像銀行的獨斷行為。#n只能認為凱薩公司總部也介入其中了……"
11160-23 = "……是。這麼認定似乎比較妥當。"
11160-27 = "各位，各方面都很謝謝你們。"
11160-28 = "讓日步美同學捲入了奇怪的事件，真不好意思。"
11160-29 = "啊，啊哈哈……"
11160-30 = "我們之後會去找你玩的，到時候再麻煩你囉～"
11160-31 = "是，當然沒問題。"
11160-32 = "雖然還不清楚詳細的情況……#n但這會是凱薩公司和犯罪者及暴力集團有關的實質證據。"
11160-33 = "我回去之後會向茶會報告這件事的！"
11160-34 = "還有阿拜多斯各位的狀況也是……"
11160-35 = "……"
11160-36 = "這個嘛，我想茶會應該早就知道了吧？"
11160-37 = "咦，咦！？"
11160-38 = "如果是大規模學園的領袖，這種程度的事八成早就知道了唷。#n情報部的學生也不是成天都在玩樂的。"
11160-39 = "怎，怎麼會……明明知道卻對大家……"
11160-40 = "唔嘿～日步美醬真是純真的好孩子。#n可惜這個世界並沒有那麼單純。"
11160-41 = "……"
11160-42 = "雖然很感謝日步美醬的用心，#n不過這件事就算告訴茶會也沒辦法解決，反而可能只會造成我們的混亂而已吧。"
11160-43 = "是，是嗎……"
11160-44 = "你想想，咱們學校目前正面臨廢校的命運，#n實在沒有制衡三一或格黑娜這種大型學園的力量──明白我的意思嗎？"
11160-45 = "……就算打著支援的名義不懷好意也無法阻止……是這個意思嗎？"
11160-46 = "……說得也是，也不是沒有那種可能性。#n啊嗚嗚……政治真複雜。"
11160-47 = "但是……星野前輩是不是想得有點太悲觀了？#n或許他們真的會願意幫忙也說不定……"
11160-48 = "唔嘿～我已經變成那種會對別人的好意疑神疑鬼的骯髒大叔了呢。"
11160-50 = "阿拜多斯就是因為忽視了「萬一」的可能性，才會落得現在這種下場的哦。"
11160-51 = "……"
11160-52 = "……"
11160-53 = "那麼……"
11160-54 = "那個…… "
11160-55 = "今天真的……發生了很多不得了的事呢。 "
11160-56 = "嗯，過得非常開心。"
11160-57 = "……開心的只有白子前輩而已吧？"
11160-58 = "啊，啊哈哈哈……我也很開心。 "
11160-59 = "哎呀～浮士德醬，承蒙你關照囉。"
11160-60 = "請，請不要那樣叫我！"
11160-61 = "喲，泳裝蒙面團隊長！"
11160-62 = "各位……這樣會讓日步美同學很困擾的。"
11160-63 = "總，總而言之……雖然之後可能也會很辛苦，還是請各位多加油哦。#n我也會聲援各位的。"
11160-64 = "那麼……各位，下次見囉。"
11160-66 = "各位都辛苦了。#n今天先好好休息，明天再集合吧。"
11160-67 = "解散～"
11160-69 = "下一話;烏雲密布"

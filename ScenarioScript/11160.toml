[translation]
11160-2 = "Episode 16;The Truth Revealed"
11160-3 = "Abydos Foreclosure Task Force Club Room"
11160-4 = "Everyone, including Hifumi, gathered to review the documents upon returning to Abydos High School."
11160-5 = "*smaaash*"
11160-6 = "What in the heck is this?!"
11160-7 = "...!"
11160-8 = "Look at the truck's transport log. It says \"Abydos - 7,880,000 yen collected\". This has got to be the truck that came to our school."
11160-9 = "But right after that, it says \"Kata-Kata Helmet Gang - 5,000,000 yen delivered in mission funds.\""
11160-10 = "So, that means..."
11160-12 = "Right after they took our cash, they delivered it straight to the Helmet Gang's base to fund their mission?!"
11160-13 = "By mission, do you mean when the Helmet Gang...?"
11160-14 = "The Helmet Gang was acting...under the orders of Kaiser Loans?!"
11160-17 = "..."
11160-18 = "..."
11160-19 = "..."
11160-20 = "But why would they do that? They won't be paid if the school goes bankrupt.#nIt doesn't make any sense..."
11160-21 = "Hmm..."
11160-22 = "I think this goes way beyond just a simple bank scheme. The only way it makes sense is if Kaiser Corporation's HQ is involved somehow..."
11160-23 = "I agree. That's the only explanation."
11160-27 = "I owe you tons, everyone! I truly appreciate your help."
11160-28 = "Same here. Sorry for bringing you into this mess, Hifumi."
11160-29 = "That's okay. Haha..."
11160-30 = "Don't be a stranger, you hear me?"
11160-31 = "I won't."
11160-32 = "We don't have all the details, but this is proof that Kaiser Corporation has ties to violent criminal organizations."
11160-33 = "I'll pass this along to the Tea Party!"
11160-34 = "I'll also tell them how much Abydos High School needs help right now."
11160-35 = "..."
11160-36 = "Fair warning: I bet that's gonna be old news to the Tea Party."
11160-37 = "I-It will be?!"
11160-38 = "I doubt the hot shots at all the other academies haven't figured it out by now. It's not like they don't have manpower to dedicate to intelligence gathering."
11160-39 = "B-But that means they knew about you and still didn't..."
11160-40 = "You're so innocent, Hifumi.#nThe world isn't all sunshine and rainbows, you know."
11160-41 = "..."
11160-42 = "I appreciate the gesture, but I don't know what good it'll do to tell them.#nIn fact, it might just make things more complicated for us."
11160-43 = "Y-You think so...?"
11160-44 = "Our school is on the verge of collapse. We don't have the means to sway super-academies#nlike Trinity or Gehenna. There isn't much anyone can do to change things.#nDo you get what I'm saying?"
11160-45 = "If someone were to take advantage of the situation under the guise of helping...you'd be powerless to stop it."
11160-46 = "N-Now I get it. That's definitely a possibility. Ugh... I hate politics."
11160-47 = "Aren't you being too cynical about this, Hoshino? What if they just really wanted to help?"
11160-48 = "Give me a break. I'm old, cranky, and my back hurts too much to trust anyone at this age."
11160-50 = "That's how this school ended up in this mess: by ignoring all of the \"what ifs\"."
11160-51 = "..."
11160-52 = "..."
11160-53 = "So..."
11160-54 = "Um..."
11160-55 = "The thing is, we've been through a lot together in such a short time... "
11160-56 = "We have. It was a lot of fun."
11160-57 = "Fun? Speak for yourself, Shiroko."
11160-58 = "I dunno. I kinda had fun too..."
11160-59 = "Glad to hear it. Thanks for all your help, Faust."
11160-60 = "Y-You don't have to keep calling me that!"
11160-61 = "How does \"fearless leader of the Masked Swimsuit Gang\" sound?"
11160-62 = "Come on, guys... Stop giving Hifumi a hard time."
11160-63 = "Uh, anyway... I know you have some tough times ahead, but I'll be cheering you on. Good luck."
11160-64 = "I'll see you around, everyone."
11160-66 = "It's been a really long day. Why don't we all go home and get some rest?#nWe can regroup tomorrow."
11160-67 = "Dismissed!"
11160-69 = "Next Episode;The Gathering Storm"

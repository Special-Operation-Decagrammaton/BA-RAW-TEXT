[translation]
11160-2 = "ตอนที่ 16;ความจริงที่ถูกเปิดเผย"
11160-3 = "ห้องคณะกรรมการแผนงานอะบิดอส"
11160-4 = "(คุณครูกลับมาที่โรงเรียนอะบิดอสพร้อมกับฮิฟุมิ แล้วตรวจสอบเอกสารที่ได้มาด้วยกันกับทุกๆ คน)"
11160-5 = "(ตึ้ง!)"
11160-6 = "อะไรเนี่ย!!! หมายความว่ายังไง!!!"
11160-7 = "...!!"
11160-8 = "ในบันทึกการเดินรถบอกว่าได้รับเงินจากอะบิดอสมา 7,880,000 เยน เป็นรถบรรทุกที่มารับเงินที่โรงเรียน#nเราไปจริงๆ ด้วย"
11160-9 = "แต่บรรทัดต่อไปบอกว่าจ่ายค่าภารกิจแก๊งหมวกกันน็อกคาตะคาตะไป 5,000,000 เยน...?"
11160-10 = "นี่หมายความว่า..."
11160-12 = "พอรับเงินจากพวกเราเสร็จ ก็เอาเงินของพวกเราไปจ่ายค่าภารกิจให้พวกแก๊งหมวกกันน็อกคาตะคาตะ#nที่ฐานของพวกมัน!!"
11160-13 = "ภารกิจ... หมายความว่าพวกนั้นจ้างแก๊งหมวกกันน็อกคาตะคาตะงั้นเหรอ...?"
11160-14 = "ผู้ที่อยู่เบื้องหลังแก๊งหมวกกันน็อกก็คือสินเชื่อไคเซอร์...?"
11160-17 = "......"
11160-18 = "......"
11160-19 = "......"
11160-20 = "ทำไมล่ะ?! ทำไมถึงเป็นแบบนี้ไปได้? ถ้าโรงเรียนล้มละลาย ทางนั้นก็คงไม่ได้เงินกู้ที่เรายืมมาคืนไปแท้ๆ#nแล้วทำไมถึงมาทำอะไรแบบนี้กันนะ...?"
11160-21 = "ฮึ่ม..."
11160-22 = "นี่ไม่น่าใช่ฝีมือของธนาคารฝ่ายเดียวแล้ว ต้องเป็นฝีมือของพวกไคเซอร์ คอร์เปอเรชั่น เข้ามาเกี่ยวข้องด้วยแน่ๆ"
11160-23 = "ใช่ค่ะ แบบนั้นก็ดูมีเหตุผลนะคะ"
11160-27 = "ฉันต้องขอบคุณทุกคนมากเลยค่ะ"
11160-28 = "ขอโทษนะคะที่เราทำให้คุณฮิฟุมิต้องมาเกี่ยวข้องกับเหตุการณ์แปลกๆ ไปด้วย..."
11160-29 = "อ่า... แหะๆๆ ..."
11160-30 = "ไว้พวกเราไปแถวนั้นก็มาเล่นกันใหม่นะ"
11160-31 = "ได้เลยค่ะ"
11160-32 = "ถึงเราจะยังไม่รู้สถานการณ์ที่แน่ชัดนัก... แต่นี่ก็เป็นหลักฐานชิ้นสำคัญที่พิสูจน์ว่าไคเซอร์ คอร์เปอเรชั่น#nมีความเกี่ยวข้องกับอาชญากรและกลุ่มความรุนแรงค่ะ"
11160-33 = "ฉันจะกลับไปรายงานเรื่องนี้กับสภาน้ำชาค่ะ!"
11160-34 = "แล้วก็จะรายงานสถานการณ์ของโรงเรียนอะบิดอสให้พวกเขาทราบด้วยค่ะ..."
11160-35 = "......"
11160-36 = "พวกคนในสภาน้ำชาก็น่าจะรู้อยู่แล้วนะ?"
11160-37 = "คะ?!"
11160-38 = "ฉันคิดว่าพวกแกนนำของโรงเรียนขนาดใหญ่แบบนั้น คงไม่มีทางที่จะไม่รู้เรื่องนี้หรอก นักเรียนจากหน่วยข่าวกรองก็ไม่ได้เอาแต่เล่นสนุกไปวันๆ นี่นา"
11160-39 = "เป็นไปได้ยังไง... ถ้าพวกเขารู้... แล้วทำไมถึง..."
11160-40 = "เห~ ฮิฟุมิจังเนี่ยไร้เดียงสาซะจริงๆ เลยน้า โลกใบนี้น่ะไม่ได้มีแต่สิ่งสวยงามอย่างเดียวหรอกนะ"
11160-41 = "......"
11160-42 = "ลุงคนนี้เข้าใจความหวังดีของฮิฟุมิจังนะ แต่ถึงจะไปบอกทางนั้นก็คงไม่ได้การแก้ปัญหาอะไรกลับมา#nดีไม่ดีพวกเราอาจจะตกอยู่ในสถานะลำบากกว่าเดิมก็ได้"
11160-43 = "งะ... งั้นเหรอคะ?"
11160-44 = "ตอนนี้โรงเรียนของเราใกล้จะล้มละลายแล้ว เราไม่มีอำนาจไปคัดค้านการกระทำของโรงเรียนใหญ่ๆ#nอย่างทรีนิตี้หรือเกเฮนน่าหรอก เข้าใจที่ลุงพูดใช่ไหม?"
11160-45 = "หากเขาเอาเหตุผลว่าจะช่วยมาบังหน้า แล้วกลายเป็นว่ามาทำอะไรไม่ดีแทน ทางนี้ก็คงขัดขวางอะไรไว้#nไม่ได้เหมือนกัน... หมายความแบบนี้สินะคะ"
11160-46 = "อืม.. ก็มีความเป็นไปได้ที่จะเกิดเรื่องแบบนั้นอยู่ค่ะ เฮ้อ... เรื่องการเมืองนี่ยากจังเลยนะคะ"
11160-47 = "แต่ว่า.. รุ่นพี่โฮชิโนะไม่คิดในแง่ร้ายเกินไปหน่อยเหรอคะ? เขาอาจจะช่วยเราจริงๆ ก็ได้นะ..."
11160-48 = "แหะๆ~ ฉันน่ะกลายเป็นลุงแก่ๆ ที่ไม่เชื่อในความปรารถนาดีของคนอื่นไปแล้วละ"
11160-50 = "เพราะการไม่เอะใจอะไรเลยทำให้โรงเรียนของเราต้องอยู่ในสภาพนี้ยังไงล่ะ"
11160-51 = "......"
11160-52 = "......"
11160-53 = "ถ้างั้น..."
11160-54 = "งั้นก็......"
11160-55 = "จะพูดยังไงดีล่ะ... ในหนึ่งวันนี้มีเรื่องเกิดขึ้นเยอะแยะเลยนะคะ"
11160-56 = "ใช่ แล้วมันก็สนุกมากเลย"
11160-57 = "... มีแต่รุ่นพี่ชิโรโกะรึเปล่าที่สนุกอยู่คนเดียวน่ะ?"
11160-58 = "อ่า.. อะฮ่าฮ่าฮ่า... ฉันเองก็สนุกมากเลยค่ะ"
11160-59 = "โอ้วว คุณเฟาสต์ พวกเราเป็นหนี้บุญคุณเข้าแล้ว"
11160-60 = "ยะ... อย่าเรียกฉันแบบนั้นเลยค่ะ!"
11160-61 = "หัวหน้ากองกำลังหน้ากากมิสึกิ!"
11160-62 = "ทุกคนคะ... แบบนี้คุณฮิฟุมิจะลำบากใจเอานะคะ"
11160-63 = "เอาเป็นว่า ขอให้แก้ปัญหากันได้เร็วๆ นะคะ... ถึงมันจะไม่ใช่เรื่องง่ายเลยก็ตามค่ะ"
11160-64 = "แล้วไว้เจอกันใหม่นะคะทุกคน"
11160-66 = "ทุกคนพยายามได้ดีมากค่ะ วันนี้กลับไปพักผ่อนแล้วมาเจอกันพรุ่งนี้เถอะค่ะ"
11160-67 = "เลิกประชุมได้~"
11160-69 = "ตอนต่อไป;เมฆฝนที่ดำทะมึน"

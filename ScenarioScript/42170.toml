42170-67 = "[ns] \"มีวิธีขัดขวางการระเบิดไหม?\""
42170-68 = "หัวรบนั้นน่าจะหนักราวๆ 1 ตัน เราลำเลียงมันด้วยกำลังของคนไม่ได้หรอกค่ะ ถ้าไม่มีเครื่องมือหนักๆ ก็ไม่น่าจะแย่งหัวรบนั่นมาได้ค่ะ"
42170-69 = "แต่ถึงอย่างนั้น เราก็จะยอมให้กองกำลังของไคเซอร์ ซิเคียวริตี้ที่คุ้มกันอาคารสถานีรถไฟอยู่เข้าถึง#nเครื่องมือหนักๆ ไม่ได้ด้วย..."
42170-70 = "... ในกรณีที่เลวร้ายที่สุด พวกนั้นอาจจะระเบิดหัวรบเสียก่อนที่การขนส่งจะเสร็จสิ้นก็เป็นไปได้ค่ะ"
42170-71 = "หากต้องการหยุดการระเบิดก่อนที่อีกฝ่ายจะรู้สึกถึงความผิดปกติ เราก็ต้องใช้คนจำนวนน้อยเพื่อที่จะ#nเข้าถึงหัวรบได้อย่างรวดเร็ว แล้วแยกส่วนท่อจุดชนวนออกให้มันทำงานไม่ได้ค่ะ"
42170-72 = "[s] \"คนจำนวนน้อยๆ งั้นเหรอ...\""
42170-74 = "[ns] \"คนที่จะหยุดหน่วยรบพิเศษได้ ก็ต้องเป็นหน่วยรบพิเศษละนะ\""
42170-75 = "... แปลว่าคนที่จะสู้กับ SRT ได้ ก็มีแค่ SRT เหรอคะ?"
42170-76 = "ที่จริงฉันคิดว่าหากพวกรุ่นพี่ FOX เข้าไปข้องเกี่ยวด้วย ฉันก็ควรเตรียมตัวเพื่อการสู้รบพิเศษไว้ค่ะ..."
42170-77 = "ฉันด้อยกว่าทั้งเรื่องอาวุธ ทั้งประสบการณ์ ทั้งสมรรถภาพ... แล้วฉันจะเอาชนะพี่ๆ ได้ไหมคะ?"
42170-78 = "[s3] \"ถ้ามิยาโกะเชื่อแบบนั้น\"\n[s4] \"ก็ต้องทำได้แน่นอนอยู่แล้ว\""
42170-83 = "ค่ะ..."
42170-84 = "เพราะถ้าหากไม่เชื่อมั่นในตัวเองแล้วละก็ ฉันคงจะโน้มน้าวใครไม่ได้เลย"

42170-30 = "3;미야코;06;다른 소대원들에게는…… 차마 부탁을 할 수가 없었습니다.\n#3;stiff"
42170-31 = "3;미야코;01;제 손으로 소대장의 역할을 내려놓은 마당에, 제 신념 때문에 안락한 생활을 버리고 캠프로 복귀해 달라고 부탁하는 건 너무 미안한 일이니까요."
42170-32 = "3;미야코;99;……소대원들은 저보다 더 현명하니, 선생님의 도움 없이도 자신들의 확고한 신념을 찾을 수 있을 겁니다.\n#fontsize;50"
42170-33 = "3;미야코;05;그보다 그 전에.\n#3;em;[반응]"
42170-34 = "3;미야코;11;선생님께 상담을 부탁드리고 싶은 것이 있습니다."
42170-35 = "#all;hide"
42170-36 = "#na;(……미야코로부터 총학생회와 FOX 소대의 음모에 대한 이야기를 들었다.)"
42170-37 = "#all;hide"
42170-38 = "#wait;500"
42170-39 = "[ns1] \"역 지하에서 폭탄을 터트린다고?\"\n[ns2] \"……그건 테러잖아?!\""
42170-40 = "#wait;10"
42170-41 = "#wait;10"
42170-42 = "3;미야코;08;쉿, 선생님. 목소리가 너무 큽니다.\n#3;em;[땀]\n#3;stiff\n#3;a"
42170-43 = "3;미야코;04;이 일은 총학생회에서도 일부 임원밖에 알지 못하는 극비 작전인 만큼, 시민들에게 이 사실이 알려진다면 큰 혼란이 발생할 겁니다."
42170-44 = "[ns] \"미안, 너무 당황해서……\""
42170-45 = "#wait;1500"
42170-46 = "[ns] \"그 열압력탄두라는 건 그렇게 무서운 폭탄이야?\""
42170-47 = "3;미야코;10;네. 열압력탄은 본래 통상 화기로 공략하기 어려운 참호나 토치카를 요격하기 위해 개발된 특수한 폭탄입니다.\n#3;em;[반응]"
42170-48 = "3;미야코;05;착탄 즉시, 순간적으로 폭발 반경에 있는 모든 산소를 연소시키며 강력한 화염과 충격파를 발생시키지요."
42170-49 = "3;미야코;99;열압력탄은 지상에서 사용해도 충분한 위력을 발휘할 수 있지만, 제한된 공간 안에 살포된 분무운을 따라 기화하는 특성 때문에 폐쇄된 지하에서 사용하는 편이 더욱 효과적입니다."
42170-50 = "3;미야코;11;유효 반경내의 모든 전투원이 폭압에 휩쓸리는 것은 물론이고, 충격파로 인해 일대의 건물들 또한 강력한 지진을 마주한 것처럼 무너질 겁니다."
42170-51 = "3;미야코;05;<A.N.T.I.O.C.H.> 프로젝트에서 발표된 내용이 사실이라면…… 그 피해 범위는 코우사기 타운을 포함한 5km 반경 전부입니다."
42170-52 = "[s] \"어째서 그런 폭탄을……\""
42170-53 = "3;미야코;10;……공포를 일으키려는 속셈이겠지요."
42170-54 = "3;카야;00\n#3;h"
42170-55 = "#wait;500"
42170-56 = "#na;미야코;유키노 선배는 SRT 학원의 부활을 위한 일이라고는 했지만. 이 작전의 궁극적인 목적은 총학생회가 강력한 무력을 보유하고 있다는 사실을 대외적으로 공표하는 데 있습니다."
42170-57 = "#na;미야코;신임 총학생회장 대행이 강력한 화기를 주저 없이 사용하는 모습을 보인다면, 그녀의 정책에 불만이 있는 세력들도 섣불리 반기를 들기 어렵겠지요."
42170-58 = "#all;hide"
42170-59 = "3;미야코;99;……하지만 목적이 어찌 되었든, 이 작전이 실행된다면 돌이킬 수 없는 피해가 발생할 겁니다.\n#3;a"
42170-60 = "3;미야코;05;그리고 저는, 선배들이 돌아오지 못할 강을 건너기 전에 이 작전을 저지하고 싶습니다.\n#3;h\n#3;em;[반응]"
42170-61 = "3;미야코;10;선배들이 저희가 나아갈 앞길을 열어주었던 것처럼, 이제는 선배들이 돌아올 퇴로를 온전히 지키고 싶습니다."
42170-62 = "3;미야코;06;하지만 어디서부터 시작해야 할지, 무엇을 해야 할지. 좀처럼 확신이 들지 않아서……\n#3;stiff\n#3;em;[속상함]"
42170-63 = "3;미야코;11;……선생님의 의견을 빌리고 싶습니다."
42170-64 = "#st;[0,0];instant;1;"
42170-65 = "#clearST"
42170-66 = "#wait;2500"
42170-67 = "[ns] \"기폭을 막을 방법은 있어?\""
42170-68 = "3;미야코;99;해당 탄두의 무게는 1톤에 가깝기 때문에 사람이 직접 운반하는 것은 불가능합니다. 중장비라도 동원하지 않는 이상 탄두를 직접 탈취하는 것은 어렵겠지요."
42170-69 = "3;미야코;11;하지만 역사를 호위하고 있는 카이저 시큐리티의 병력이 중장비의 접근을 내버려 둘 리도 없고……"
42170-70 = "3;미야코;10;……최악의 경우에는 운송이 완료되기도 전에 그 자리에서 탄두를 기폭시킬지도 모릅니다."
42170-71 = "3;미야코;05;상대가 이상을 알아차리기 전에 기폭을 막으려면 소수의 인력으로 탄두에 신속하게 접근한 뒤, 뇌관을 분리하여 무력화해야 합니다."

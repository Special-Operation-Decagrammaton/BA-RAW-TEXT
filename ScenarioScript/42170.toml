42170-39 = "[ns1] \"พวกนั้นจะระเบิดชั้นใต้ดินของสถานีเหรอ?\"\n[ns2] \"... นั่นมันก่อการร้ายเลยนะ?!\""
42170-42 = "ชู่ว คุณครู พูดเสียงดังไปแล้วค่ะ"
42170-43 = "นี่เป็นปฏิบัติการลับสุดยอดที่กรรมการในองค์การนักเรียนก็รู้แค่บางคนเท่านั้น ถ้าชาวเมืองมาได้ยินเข้า#nละก็ ต้องเกิดเรื่องยุ่งเหยิงขึ้นแน่นอนค่ะ"
42170-44 = "[ns] \"ขอโทษที พอดีครูตกใจไปหน่อย...\""
42170-46 = "[ns] \"หัวรบแรงดันความร้อนนั่นเป็นระเบิดที่ร้ายแรงมากเลยเหรอ?\""
42170-47 = "ค่ะ ระเบิดแรงดันความร้อนเป็นระเบิดพิเศษที่พัฒนาขึ้นเพื่อซุ่มโจมตีขีปนาวุธโตชก้า#nหรือไม่ก็สนามเพลาะที่ใช้อาวุธทั่วไปโจมตีได้ยากค่ะ"
42170-48 = "ทันทีที่ถูกยิงออกไป มันจะเผาไหม้ออกซิเจนทั้งหมดที่อยู่ในรัศมีของการระเบิดในพริบตา จากนั้นจะเกิดเปลวไฟและคลื่นกระแทกที่ทรงพลังค่ะ"
42170-49 = "แค่ใช้ระเบิดแรงดันความร้อนบนพื้นดินก็มีอานุภาพมากพอแล้ว แต่ยิ่งใช้ในชั้นใต้ดินแบบปิดก็จะยิ่งมี#nประสิทธิภาพมากขึ้นเพราะคุณสมบัติการระเหยไปตามละอองที่กระจายอยู่ภายในพื้นที่ปิดค่ะ"
42170-50 = "ไม่เพียงทุกคนในรัศมีที่จะถูกกวาดไปด้วยแรงระเบิดนะคะ แต่คลื่นกระแทกจะทำให้อาคารรอบๆ พังทลายลงเหมือนกับเกิดแผ่นดินไหวรุนแรงเลยค่ะ"
42170-51 = "หากข้อมูลของโปรเจกต์ <A.N.T.I.O.C.H.> ที่เปิดเผยออกมาเป็นความจริง... ขอบเขตความเสียหาย#nน่าจะกินรัศมี 5 กม. และในนั้นก็จะมีโคะอุซางิ ทาวน์ด้วยค่ะ"
42170-52 = "[s] \"ทำไมถึงมีระเบิดแบบนี้ได้นะ...\""
42170-53 = "... ทางนั้นคงตั้งใจจะสร้างความหวาดกลัวน่ะค่ะ"
42170-56 = "ถึงแม้รุ่นพี่ยูกิโนะจะบอกว่านี่เป็นปฏิบัติการเพื่อฟื้นฟูสถาบัน SRT ก็ตาม แต่ว่าเป้าหมายสุดท้ายของ#nปฏิบัติการนี้คือการประกาศอย่างเป็นทางการว่าองค์การนักเรียนมีกำลังที่แข็งแกร่งค่ะ"
42170-57 = "ถ้าได้เห็นรักษาการแทนประธานองค์การนักเรียนคนใหม่ใช้อาวุธที่ทรงพลังอย่างไม่ลังเลแล้วละก็ กลุ่มกองกำลังที่ไม่พอใจนโยบายของเธอก็คงมุทะลุมาต่อต้านกันลำบากค่ะ"
42170-59 = "... ไม่ว่าจะด้วยจุดประสงค์อะไรก็ตาม แต่หากปฏิบัติการนี้ลุล่วงขึ้นมา มันก็จะเกิดความเสียหายที่ไม่#nอาจหาทางแก้ไขได้ค่ะ"
42170-60 = "และฉันก็อยากจะหยุดปฏิบัติการนี้ ก่อนที่พวกรุ่นพี่จะเดินก้าวข้ามแม่น้ำที่ไม่มีทางหวนกลับมาได้ค่ะ"
42170-61 = "ครั้งหนึ่งรุ่นพี่เคยเปิดทางให้เราเดินหน้าต่อไปได้ แต่ว่าคราวนี้ฉันอยากจะป้องกันเส้นทางที่พวกรุ่นพี่จะ#nกลับมาให้เต็มที่ค่ะ"
42170-62 = "แต่ฉันเองก็ไม่รู้ว่าต้องเริ่มจากที่ไหน และเริ่มจากอะไร ฉันไม่แน่ใจเลยค่ะ..."

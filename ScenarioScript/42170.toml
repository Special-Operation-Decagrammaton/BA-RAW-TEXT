[translation]
42170-1 = "第17話;錦衣夜行"
42170-2 = "兔寶寶公園"
42170-6 = "（隔天早上，來到兔寶寶公園收拾RABBIT小隊留下來的物品……）"
42170-11 = "竟然跑來偷翻女學生的私人物品……"
42170-12 = "看來[USERNAME]老師果然是個奇怪的大人呢。"
42170-19 = "[ns]「歡迎回來，都子。」"
42170-20 = "是，我回來了──"
42170-25 = "RABBIT1，已回歸營地RABBIT。"
42170-26 = "[s]「其他人沒有一起回來嗎？」"
42170-30 = "我並沒有……告知其他隊員。"
42170-31 = "畢竟是我自己放棄了小隊長一職，#n如果還要求大家捨棄好不容易獲得的安寧跟我一起回歸……#n這實在……太對不起他們了。"
42170-32 = "……他們即使沒有老師的幫助，一定也能找到堅信不移的信念吧。"
42170-33 = "──話說回來。"
42170-34 = "有件重要的事要和老師商量。"
42170-36 = "（……聽都子說了聯邦學生會和FOX小隊的事）"
42170-39 = "[ns1]「在車站地下引爆炸彈……？」\n[ns2]「……那不就是恐怖攻擊嗎！？」"
42170-42 = "噓，老師。聲音太大了。"
42170-43 = "這是在聯邦學生會中也只有部分幹部知道的極秘作戰。#n要是傳進市民耳裡的話，肯定會引發巨大的混亂。"
42170-44 = "[ns]「抱歉，我剛才太驚訝了……」"
42170-46 = "[ns]「你說的那個空爆燃燒彈是什麼樣的炸彈？」"
42170-47 = "空爆燃燒彈是為了攻克一般武器難以攻克的壕溝或碉堡而被研發出來的特殊炸彈。"
42170-48 = "在命中後將會瞬間將爆炸範圍內的所有氧氣燃燒殆盡，並產生強力的火焰及衝擊波。"
42170-49 = "雖然空爆燃燒彈在地面上使用也能發揮足夠的威力……#n其會沿著封閉空間內散布的噴霧雲汽化的特性，使它在地下或洞窟使用會更加有效。"
42170-50 = "不僅會將有效半徑內的所有戰鬥人員捲入爆炸，#n其衝擊波也會導致附近的建築物完全崩毀。"
42170-51 = "如果「A.N.T.I.O.C.H.」計畫公布的內容屬實──#n其波及範圍將為包含兔寶寶鎮在內半徑5km的區域。"
42170-52 = "[s]「為什麼要把那種炸彈……」"
42170-53 = "……恐怕是想在人們心中植入恐懼吧。"
42170-56 = "雖然雪乃前輩說這麼做是為了SRT特殊學園的復活……#n但這個作戰的目的，肯定是要展示聯邦學生會的武力沒錯。"
42170-57 = "只要新上任的聯邦學生會長代理展現出毫不顧忌使用強力武器的樣子，#n對他的政策不滿的勢力也會變得不敢輕舉妄動。"
42170-59 = "……無論他們的目的為何，一旦這個作戰執行就無法挽回了。"
42170-60 = "所以──我打算在前輩們無法回頭之前，設法阻止這個作戰。"
42170-61 = "就像前輩們替我們開闢前進的道路一樣──#n我希望能守住前輩們的退路。"
42170-62 = "話雖如此，我卻不知道該從哪裡下手才好，也對具體的作戰和行動沒什麼自信……"
42170-63 = "……所以，希望能借助老師的智慧。"
42170-67 = "[ns]「要怎麼阻止爆炸呢？」"
42170-68 = "因為彈頭有將近一噸重，想要直接搬運是不可能的。#n除非動用重型設備，否則想要奪走彈頭是很困難的吧。"
42170-69 = "在車站外圍警備的凱薩保全，想必也不會允許重型設備接近……"
42170-70 = "……在最糟糕的情況下，他們甚至可能在搬運完成前直接引爆。"
42170-71 = "如果想在對方察覺異常前阻止爆炸，必須由複數人員接近彈頭並拆除雷管。"
42170-72 = "[s]「複數人啊……」"
42170-74 = "[ns]「能夠阻止特殊部隊的，也就只有特殊部隊了吧。」"
42170-75 = "……SRT的對手只有SRT，是這個意思吧。"
42170-76 = "既然作戰是由[ruby=前輩們]FOX小隊[/ruby]執行，我也有投入特殊戰的覺悟……"
42170-77 = "但不管是武器、經驗──就連能力也不足的我……#n真的有辦法贏嗎？"
42170-78 = "[s3]「只要都子那麼相信的話。」\n[s4]「一定辦得到的。」"
42170-83 = "……老師說的對。"
42170-84 = "要是連自己都不相信的話，根本說服不了別人。"
42170-85 = "──現在，我會相信我自己。"
42170-86 = "──RABBIT1，開始作戰！"
42170-88 = "兔寶寶站"
42170-97 = "這裡是RABBIT1。#n現在時間1030。已抵達作戰地點。"
42170-98 = "雖然某種程度上有預料到……這裡的戒備相當森嚴。"
42170-102 = "正在看守主要出入口的保全有6名。#n而車站周圍則至少有2組以上的保全在巡邏……"
42170-103 = "這麼看來，想要在不被保全發現的情況下潛入車站相當困難。"
42170-104 = "[s]「從正面突破如何？」"
42170-105 = "如果只有三個人的話，應該有辦法同時壓制……"
42170-106 = "但如果人數更多，敵方有可能會在過程中呼叫支援。"
42170-107 = "……這種時候，要是其他小隊員在的話就好了。"
42170-108 = "這樣就能夠來個聲東擊西……有沒有，其他人……"
42170-112 = "……哎呀哎呀，看看是誰來了。"
42170-121 = "該說是冤家路窄嗎……呼呣。#n這還真是奇妙的邂逅啊。"
42170-122 = "[s]「你是……」"
42170-124 = "雖然我曾經是個追求清貧的求道者，也是實踐自然無為生活的修道者……"
42170-125 = "現在已經成為社會的一份子，努力為社會貢獻的──"
42170-130 = "社會人──笛卡爾！"
42170-134 = "[ns5]「很高興能再見到你，笛卡爾。」\n[ns6]「……你在這裡做什麼？」"
42170-137 = "看我這身衣服還不知道嗎？"
42170-138 = "也對，畢竟你似乎過著與規律相去甚遠的人生……我就特別告訴你吧。"
42170-142 = "我加入了凱薩保全，接受了各式各樣的教育。"
42170-143 = "如今，我終於明白成天不事生產、寄生於社會基礎建設的人生是多麼罪惡……"
42170-144 = "以及在勞動中揮灑的汗水有多麼神聖……！"
42170-145 = "於是──修習完所有課程的我，決定再次入職成為凱薩保全的警備員，#n藉此為社會治安的維持作出貢獻！"
42170-147 = "這，這樣啊……"
42170-148 = "盤問可疑人士是保全的職責！#n而偷偷摸摸地躲在陰影處窺視車站的你們，就是盤問對象！"
42170-152 = "就算是之前對我有恩的恩人，我也不能因此怠慢身為社會人士的義務。#n還請你們務必配合……！"
42170-153 = "那個，該怎麼說呢……"
42170-154 = "[s]「只有這次，可以請你睜一隻眼閉一隻眼嗎？」"
42170-155 = "什麼？希望我當作沒看見？"
42170-156 = "老師想要踐踏我作為凱薩保全的警備員──作為社會人士勞動的榮譽嗎！？"
42170-157 = "我有維護這個所確幸的同志所在車站的安全及整潔的義務──"
42170-159 = "……凱薩公司打算摧毀兔寶寶站。"
42170-164 = "你，你說什麼！？"
42170-165 = "你或許不相信，不過其實……"
42170-167 = "（……都子向笛卡爾簡短地進行了說明）"
42170-170 = "……是個不值得相信的情報呢。"
42170-171 = "只為了彰顯自己的武力就在市民們使用的車站中設置炸彈什麼的……#n正常人根本不會這麼想。"
42170-172 = "不過回想凱薩公司一直以來的作為，這也並非荒誕無稽的事。"
42170-173 = "他們是多麼充滿貪欲，在凱薩保全受教育時早已深有體會……"
42170-174 = "明明答應我每天都會供應一個布丁……"
42170-175 = "但昨天卻以布丁庫存沒了當藉口，拿蒟蒻來搪塞我！"
42170-176 = "這，這樣啊……"
42170-178 = "……但是就連這樣的屈辱，我也咬牙忍了下來。"
42170-179 = "因為我認為即使多少有所不滿，#n在工作上也要裝作若無其事才是社會人士應該具備的美德……！"
42170-180 = "然而那些聯邦學生會和凱薩公司的高層，#n竟然為了更大的野心企圖炸毀兔寶寶站……？"
42170-181 = "炸毀這個不僅是附近居民的生活根基，#n也是我那些找不到工作的同志們所在的兔寶寶站？"
42170-182 = "不可原諒……這些布爾喬亞渾蛋！"
42170-183 = "──包在我身上吧。#n只要能守住兔寶寶站和同志們，我一定盡我所能！"
42170-185 = "非常感謝你的諒解，笛卡爾先生。"
42170-186 = "首先，因為敵人的數量實在太多，希望你能以聲東擊西的方式分散敵方的兵力。"
42170-187 = "要戰鬥倒不成問題……但其實我的所有武器都在遭到逮捕時被沒收了……"
42170-188 = "就連現在帶著的這把手槍裡也只裝了空包彈……"
42170-189 = "這不成問題。#n我的彈藥十分足夠，請收下這些吧。"
42170-193 = "啊啊，這種冰涼的沉重感真令人懷念。"
42170-194 = "長期受到的侮蔑視線以及不復存在的餘裕……我的忍耐也到達極限了。"
42170-195 = "謝謝你，都子同學。#n我也是時候該回歸所確幸的隊長笛卡爾了！"
42170-197 = "接下來我該做的就是在距離入口有點距離的地方製造騷動，分散保全們的注意力……"
42170-206 = "所確幸的同志們啊！#n聽到這則無線電後，立即到兔寶寶站集結吧！"
42170-207 = "那群披著慾望之皮的餓鬼──凱薩公司，正打算玷汙我們的聖地！"
42170-208 = "……咦？隊長，你不是不當什麼縮確新了嗎？"
42170-209 = "「所確幸」！#n「就算無所有也要蒐集確實的幸福」，簡稱「所確幸」！"
42170-213 = "咳咳……我並沒有放棄無所有的人生。"
42170-214 = "只是為了得知那些所有之人在想些什麼、抱持著什麼樣的慾望，#n才會展開這場潛入修行的！"
42170-215 = "最終──我意識到想在這裡扎根的凱薩公司，只是群脫離正軌的餓鬼罷了。"
42170-216 = "讓我們一起教育那些貪戀物慾、道德淪喪的凡夫俗子……#n何謂「無所有的喜悅」吧！"
42170-217 = "嘛……反正現在也沒事幹，都被呼叫了就過去吧。"
42170-218 = "要懲罰那些害蟲的話……就交給我吧。"
42170-219 = "那麼，向著那群貪腐的餓鬼──"
42170-220 = "「所確幸」，突擊────！"
42170-226 = "那個，請配合我的信號──"
42170-227 = "[s]「走掉了呢……」"
42170-228 = "事已至此，想要聲東擊西恐怕有點困難……#n不過短時間內，應該能分散一點敵人的注意力吧。"
42170-229 = "我也要一起戰鬥。#n老師，指揮就麻煩你了！"

[translation]
42170-1 = "Episode 17; Showing Off"
42170-2 = "Kousagi Park"
42170-6 = "The next morning, while I was finishing up cleaning the last of the RABBIT Squad's traces from the park..."
42170-11 = "Rummaging through young ladies' belongings as soon as they're gone, Sensei?"
42170-12 = "You really are a suspicious person."
42170-19 = "[ns] \"Welcome back, Miyako. I'm glad you made it.\""
42170-20 = "Thank you for helping me find my way back."
42170-25 = "RABBIT 1. Returning to Camp RABBIT, as promised."
42170-26 = "[s] \"And the others?\""
42170-30 = "It...wasn't right to bring them along."
42170-31 = "I've stepped down as their leader. How could I ask them to give up their comfortable, settled lives to return to camping and expired bentos?"
42170-32 = "...The other squad members are smarter than I am, so I'm sure they'll find their way, even without your help."
42170-33 = "But, no more pleasantries."
42170-34 = "This is urgent, and dire."
42170-36 = "Miyako quickly revealed the General Student Council's and FOX Squad's plot."
42170-39 = "[ns1] \"They're planning to set off a bomb under a subway station?!\"\n[ns2] \"They're trying to commit terrorism! Half the city'll blow!\""
42170-42 = "Sensei, keep your voice down!"
42170-43 = "This operation is top secret, known to only a few in the General Student Council. If word gets out, it'll be pandemonium."
42170-44 = "[ns] \"Sorry, I was just so shocked...\""
42170-46 = "[ns] \"So this thermobaric warhead is really that destructive?\""
42170-47 = "Yes. The thermobaric warhead was specially created in order to attack fortified targets and heavy tanks traditional weapons can't scratch."
42170-48 = "On impact, it ignites all of the oxygen in its blast radius and releases a tremendous shock wave."
42170-49 = "While devastating on the surface, underground its potency skyrockets. The released vapor clouds will fill the enclosed area and ignite."
42170-50 = "Everyone within the effective radius would be overwhelmed. And its shockwaves would destroy all the buildings around us like a devastating earthquake."
42170-51 = "If the A.N.T.I.O.C.H. project blueprints are correct... The damage radius is approximately five kilometers. Kousagi town would be wiped off the map."
42170-52 = "[s] \"What could possibly be the reason...?\""
42170-53 = "...To instill fear in the hearts of the masses."
42170-56 = "Yukino said this was for the revival of SRT Academy, but the ultimate goal of this operation is an intimidating show of strength, a flex of the might the General Student Council wields over the public."
42170-57 = "Acting President Kaya's opponents would think twice about outwardly resisting her after a display like that."
42170-59 = "Regardless of their purpose, this operation will cause irreparable damage if they succeed."
42170-60 = "I have to stop this before my seniors cross a line they can never come back from."
42170-61 = "They've always paved the way forward for me, so I'll just have to help them find a way back out."
42170-62 = "I say that, but it's so overwhelming. If we fail... I don't know where to start... I'm scared of the consequences if this is the wrong decision."
42170-63 = "I needed your perspective on it."
42170-67 = "[ns] \"Is there any way to stop the detonation?\""
42170-68 = "Given the warhead's one-ton weight, it's impractical for manual transport. We'd need heavy machinery to move it. So stealing it isn't possible."
42170-69 = "And I somehow doubt any Kaiser personnel there will let us just roll on in with a tank."
42170-70 = "...At worst, they might just detonate it prematurely."
42170-71 = "We need to stop the detonation before the FOX Squad realizes what's happened. We'll need a specialized strike force to infiltrate the station and disarm the bomb."
42170-72 = "[s] \"A small strike force...\""
42170-74 = "[ns] \"The only thing that can take out one special forces unit, is another one.\""
42170-75 = "...In other words, only SRT can stop SRT."
42170-76 = "Going against FOX Squad, it'll be an entirely different game..."
42170-77 = "I'm... I'm inferior in experience, combat ability, and equipment. I don't know..."
42170-78 = "[s3] \"Rely on your strengths. Don't worry about theirs.\" \n[s4] \"Don't doubt yourself. You'll hold yourself back.\""
42170-83 = "...You're right."
42170-84 = "If I don't even believe in myself, how can I ask the other members to trust me?"
42170-85 = "I just have to rely on my instincts and move forward."
42170-86 = "RABBIT 1, executing operation!"
42170-88 = "Kousagi Station"
42170-97 = "This is RABBIT 1. The current time is 1040. I just arrived at the operation site."
42170-98 = "Predictably, the security is tight."
42170-102 = "Six guards at the main entry and exit points, and a couple of patrols on the perimeter..."
42170-103 = "It'd be impossible for me to slip into the station without alerting at least one guard."
42170-104 = "[s] \"I'm guessing a head-on assault won't work?\""
42170-105 = "If we had two more people, it would be doable..."
42170-106 = "But with just me, they'll call for reinforcements before I can incapacitate them."
42170-107 = "I wish the rest of the squad was here."
42170-108 = "It would be great if someone could run a diversion for us..."
42170-112 = "Well, well, well. Look who it is."
42170-121 = "What a strange coincidence to cross paths here."
42170-122 = "[s] \"Who's that?\""
42170-124 = "Once, a seeker of truth and nature's harmony... A practitioner of nature and minimalism."
42170-125 = "Now, a servant to the common good..."
42170-130 = "Descartes, the civilized!"
42170-134 = "[ns5] \"I'm surprised to see you here, Descartes.\"\n[ns6] \"What are you doing here?\""
42170-137 = "Really now? My uniform didn't give it away?"
42170-138 = "Then again, you've always been privileged with a life above the law."
42170-142 = "Kaiser Security gave me a 'proper' education when I was arrested."
42170-143 = "They thoroughly taught me the error of my ways, of being a parasite on society's underbelly, leeching away without contributing."
42170-144 = "The sheer value of the sweat upon one's brow!"
42170-145 = "Now, I've found purpose in Kaiser Security, serving as a guard, ensuring public safety!"
42170-147 = "Th-That's great..."
42170-148 = "Interrogating suspicious individuals is a security guard's duty! And you two, lurking and scouting the station, are particularly suspicious!"
42170-152 = "Despite our past, I can't neglect my citizen's duty. I ask for your cooperation in this inspection!"
42170-153 = "Um..."
42170-154 = "[s] \"Can you just let this slide? The one time?\""
42170-155 = "What? You want me to pretend I didn't see you!?"
42170-156 = "Sensei, are you trying to belittle my duty as a guard and a responsible citizen?!"
42170-157 = "I must protect this station, the home of my fellow Pursuers!"
42170-159 = "...The Kaiser Corp is going to blow up Kousagi Station."
42170-164 = "Wh-What in the world?!"
42170-165 = "This may be hard to believe but..."
42170-167 = "Miyako laid out everything to Descartes..."
42170-170 = "...Your claims are hard to swallow."
42170-171 = "You would have to be a crazy person to set off a bomb in such a densely populated station! And just to solidify your power? There's no way!"
42170-172 = "Well, thinking about what Kaiser Corporation has done in the past, it's actually not that hard to believe."
42170-173 = "I've experience Kaiser Security's bottomless greed firsthand."
42170-174 = "Kaiser promised to provide one pudding cup a day to security guards during their shifts..."
42170-175 = "But they claimed to have run out of pudding yesterday! Do you know what they gave us instead? Konjac jelly, of all things!"
42170-176 = "I-I see..."
42170-178 = "...I've kept my head down and worked hard, even in these conditions."
42170-179 = "I thought enduring small inconveniences for the greater good was a hallmark of a responsible citizen...!"
42170-180 = "But now you mean to tell me that the General Student Council and Kaiser Corp, with all their wealth and power, want to destroy Kousagi Station...to hoard even more wealth and power?"
42170-181 = "And Kousagi Station, of all places? Many citizens and even my own comrades call this place home!"
42170-182 = "...I won't stand for this elitist scheme!"
42170-183 = "Leave it to me. I promise my full cooperation if it's to protect Kousagi Station and all my comrades inside!"
42170-185 = "Thank you for your understanding, Descartes."
42170-186 = "The enemies outnumber us greatly, so the only way we'll be able to get through is if you run a diversion."
42170-187 = "While I'd love to stick it to some evil Kaiser overlords, my weapons were all confiscated when I was arrested."
42170-188 = "Even this silly little pistol is just a toy with blanks."
42170-189 = "That's not an issue. Here. I have more than enough ammo."
42170-193 = "Ah. The weight of a loaded weapon... I've missed this."
42170-194 = "I've had enough of the constant ridicule and oppression I've endured!"
42170-195 = "Thank you, Miyako. It is now time for me to return as Descartes, the leader of the Pursuers!"
42170-197 = "Yes, thank you. The further away you can get the guards from the entrance, the better."
42170-206 = "To all my fellow Pursuers, rally at Kousagi Station!"
42170-207 = "The evil capitalists of Kaiser Corporation intend to wield their insatiable greed to sully our precious sanctuary!"
42170-208 = "...Huh? You finally giving up on the Perpetrators thing?"
42170-209 = "Pursuers! Short for the Pursuers of Non-Possessive Happiness!"
42170-213 = "Ahem. I never gave up my life of non-possession."
42170-214 = "I merely sought to understand how those with possession think. I came face-to-face with the greed that has infiltrated their very souls!"
42170-215 = "Having seen their evil up close, I can bear it no longer! I will not allow these Kaiser soldiers to plant their roots down in our territory any longer!"
42170-216 = "Let us show these greedy gluttons...the beauty of simplicity!"
42170-217 = "I'm game. Not like I have anything else to do."
42170-218 = "Why not? I love a good opportunity to stir the pot!"
42170-219 = "Today, we defeat greed! Today, we defeat capitalism!"
42170-220 = "Pursuers! Charge!"
42170-226 = "Um, you should probably wait for a second..."
42170-227 = "[s] \"He always comes and goes like a tornado...\""
42170-228 = "It's not the ideal distraction, but the chaos will confuse the enemy at least."
42170-229 = "I can hardly stand idly by. Sensei, lead the way!"

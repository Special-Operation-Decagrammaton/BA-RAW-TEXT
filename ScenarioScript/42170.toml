42170-88 = "สถานีโคะอุซางิ"
42170-97 = "นี่คือ RABBIT 1 ขณะนี้เวลา 10:30 น.  ฉันเพิ่งมาถึงจุดปฏิบัติการเลยค่ะ"
42170-98 = "ถึงจะคาดเดาเอาไว้แล้วก็ตาม... แต่ว่าที่นี่มีการรักษาเขตแดนเข้มงวดกว่าที่คิดอีกนะคะ"
42170-102 = "ทางเข้าออกหลักมีการ์ดยืนคุ้มกันอยู่ 6 คน แล้วก็ยังมีการ์ดอย่างน้อย 2 กลุ่มที่กำลังลาดตระเวนแถวๆ สถานีอยู่..."
42170-103 = "ถ้าเป็นแบบนี้ ฉันว่าคงไม่มีทางเข้าไปในอาคารสถานีรถไฟโดยไม่ให้การ์ดพวกนั้นจับได้แน่เลยค่ะ"
42170-104 = "[s] \"บุกจากด้านหน้าไปเลยไม่ได้เหรอ?\""
42170-105 = "ถ้าอีกฝ่ายมีกันแค่สามคนก็น่าจะโจมตีพร้อมกันแล้วฝ่าไปได้อยู่หรอกค่ะ..."
42170-106 = "แต่ถ้าหากอีกฝ่ายมีมากกว่านั้น ศัตรูอาจเสริมกองกำลังระหว่างที่เราฝ่าไปก็ได้ค่ะ"
42170-107 = "...พอไม่มีสมาชิกคนอื่นๆ แล้วก็รู้สึกถึงความว่างเปล่าขึ้นมาเลยนะคะ"
42170-108 = "อยากให้มีคนมาช่วยในปฏิบัติการเบี่ยงเบนความสนใจจากศัตรูจังเลย..."
42170-112 = "... แย่ละสิ แย่แล้วๆ ใครกันเนี่ย"
42170-121 = "นี่สินะที่เขาว่ากันว่า ศัตรูกับผู้มีพระคุณมาเจอกันบนสะพานไม้ที่มีท่อนเดียว พวกเรานี่จะบังเอิญอะไร#nกันขนาดนี้ครับเนี่ย"
42170-122 = "[s] \"คุณคือ...\""
42170-124 = "ครั้งหนึ่งผมเคยเป็นผู้แสวงหาความยากจนแต่ซื่อสัตย์ และเป็นผู้บำเพ็ญตนที่ดื่มด่ำกับธรรมชาติที่#nปราศจากการแต่งเติม..."
42170-125 = "แต่ตอนนี้ผมได้กลายมาเป็นส่วนหนึ่งของสังคมที่สง่าผ่าเผย—"

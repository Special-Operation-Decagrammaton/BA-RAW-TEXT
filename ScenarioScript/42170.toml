[translation]
42170-1 = "第17話;[ruby=いしゅうやこう]衣繍夜行[/ruby]"
42170-2 = "子ウサギ公園"
42170-6 = "（翌朝、RABBIT小隊が残した施設を片付けていると……）"
42170-11 = "不在にしている女子生徒の荷物を漁るなんて……"
42170-12 = "やっぱり、[USERNAME]先生は怪しい大人ですね。"
42170-19 = "[ns] \"おかえり、ミヤコ。\""
42170-20 = "ええ、ただいま――"
42170-25 = "――いえ。RABBIT1、キャンプRABBITに復帰いたしました。"
42170-26 = "[s] \"他のみんなは一緒じゃないの？\""
42170-30 = "他の皆さんには……声をかけられませんでした。"
42170-31 = "自分で小隊長の役割を放棄したというのに、やっと手に入れた安寧を捨ててキャンプに復帰してほしいとは流石に……申し訳なくて。"
42170-32 = "……彼女らは、先生の助けがなくとも確固たる信念を見つけることができるでしょう。"
42170-33 = "――その前に。"
42170-34 = "折り入って、先生にご相談があります。"
42170-36 = "（……ミヤコから連邦生徒会とFOX小隊の話を聞いた）"
42170-39 = "[ns1] \"駅の地下で爆弾を……？\"\n[ns2] \"……それって、テロじゃないの！？\""
42170-42 = "しっ、先生。声が大きすぎます。"
42170-43 = "これは連邦生徒会でも一部の役員しか知らない極秘作戦です。#n市民にこの事実が知れ渡れば、大きな混乱が生じるでしょう。"
42170-44 = "[ns] \"ごめん、あまりの事にビックリしてしまって……\""
42170-46 = "[ns] \"サーモバリック弾って、どんな爆弾なの？\""
42170-47 = "サーモバリック弾は、通常火器での攻略が難しい[ruby=ざんごう]塹壕[/ruby]やトーチカを攻撃するために開発された特殊な爆弾です。"
42170-48 = "着弾後、爆発半径にあるすべての酸素を燃焼させ、強力な火炎と衝撃波を発生させます。"
42170-49 = "サーモバリック弾は地上で使用しても十分な威力を発揮しますが……閉鎖空間内に散布された噴霧雲に沿って気化する特性があるため、地下や洞窟で使用する方がより効果的です。"
42170-50 = "有効半径内のすべての戦闘員が爆風に巻き込まれるのはもちろん、衝撃波によって一帯の建物も跡形もなく崩れてしまいます。"
42170-51 = "<A.N.T.I.O.C.H.>プロジェクトで発表された内容が事実なら――その被害範囲は、子ウサギタウンを含む半径5km圏内にある全てです。"
42170-52 = "[s] \"どうしてそんな爆弾を……。\""
42170-53 = "……恐怖を植え付けるためでしょう。"
42170-56 = "ユキノ先輩は、SRT特殊学園の復活のためだと言っていましたが……#nこの作戦は、連邦生徒会の武力を誇示するためのものでしかありません。"
42170-57 = "新しい連邦生徒会長代行が強力な火器を躊躇なく使用する姿を見せれば、#n彼女の政策に不満を持つ勢力も、安易に反旗を翻せなくなります。"
42170-59 = "……目的が何であれ、この作戦が実行されてしまえば取り返しのつかない事になります。"
42170-60 = "ですので、私は――先輩方が戻れなくなってしまう前に、#nこの作戦を阻止するつもりです。"
42170-61 = "私たちが進む道を先輩方が切り拓いてくれたように――#n私は、先輩方の退路をしっかりと守りたいんです。いつでも帰ってこれるように。"
42170-62 = "でも、何から手をつければいいのかとか、具体的な作戦や行動にあまり自信が持てなくて……"
42170-63 = "……なので、先生の知恵をお借りしたいです。"
42170-67 = "[ns] \"起爆を止める方法は？\""
42170-68 = "弾頭が1トン近くありますので、直接運ぶことはできません。#n重機を動員しない限り、奪取するのは難しいでしょう。"
42170-69 = "駅を警備しているカイザーセキュリティは、重機の接近なんて許さないでしょうし……"
42170-70 = "ですが……最悪の場合、運搬が完了する前に弾頭を起爆させられるかもしれません。"
42170-71 = "気づかれる前に起爆を止めるには、#n複数人で弾頭に接近し、雷管を外す必要があります。"
42170-72 = "[s] \"複数人、か……。\""
42170-74 = "[ns] \"特殊部隊を止められるのは、特殊部隊だけなんだね。\""
42170-75 = "……SRTの相手はSRT、という事ですね。"
42170-76 = "[ruby=先輩方]FOX小隊[/ruby]が担当している以上、特殊戦を覚悟していましたが……"
42170-77 = "武器も、経験も――身体能力さえも足りない私が……#n果たして、勝てるのでしょうか。"
42170-78 = "[s3] \"ミヤコがそう信じるなら。\"\n[s4] \"きっと、できるよ。\""
42170-83 = "……そうですね。"
42170-84 = "自分を信じられなければ、誰の事も説得できません。"
42170-85 = "――今は、私自身を信じます。"
42170-86 = "――RABBIT1、作戦を開始します！"
42170-88 = "子ウサギ駅"
42170-97 = "こちらRABBIT1。現在時刻は1030。ただいま作戦現場に到着しました。"
42170-98 = "ある程度想定はしていましたが……かなり警戒が厳しいですね。"
42170-102 = "メインの出入口を守っているガードは6人。#n駅周辺をパトロールしているガードも、少なくとも2組以上はいそうなので……"
42170-103 = "このまま、ガードに気づかれずに潜入するのは難しそうです。"
42170-104 = "[s] \"正面突破はどうかな？\""
42170-105 = "3人までなら、同時に制圧できそうですが……"
42170-106 = "それ以上になると、敵が増援を呼ぶ可能性があります。"
42170-107 = "……こういう時、小隊員の皆さんがいてくれたら。"
42170-108 = "陽動作戦ができるのに……他に、誰か……"
42170-112 = "……おやおや、これはこれは。"
42170-121 = "合縁奇縁とは申しますが……ふむ。これはこれは本当に奇妙な巡り合わせですね。"
42170-122 = "[s] \"あなたは……。\""
42170-124 = "一時は清貧を追求する求道者であり、無為自然の暮らしを実践する修道者でしたが……"
42170-125 = "今は立派な社会の一員として、市民社会に奉仕する――"
42170-130 = "社会人――デカルトです！"
42170-134 = "[ns5] \"また会えて嬉しいよ、デカルト。\"\n[ns6] \"……ここで何してるの？\""
42170-137 = "この格好を見てもわからないのですか？"
42170-138 = "まぁ、あなたは規律とは程遠い人生を歩んできたようですし……#n特別に教えて差し上げますよ。"
42170-142 = "私はカイザーセキュリティに入り、数々の教育を受けました。"
42170-143 = "働かず、社会のインフラに寄生して生きていく人生が、いかにさもしくて悪徳であるか……"
42170-144 = "そして、汗水垂らして得た労働の対価がいかに神聖なものであるかを……！"
42170-145 = "そうして――それらの課程を修了した私は、カイザーセキュリティの警備員として再就職し、こうして社会の治安維持に貢献しているのです！"
42170-147 = "そ、そうなんですね……"
42170-148 = "不審者を検問するのは警備員の義務ですから！#n怪しい日陰で駅舎を覗き込むあなた達は、検問対象です！"
42170-152 = "いくら昔お世話になった恩人といえど、社会人としての義務を怠るわけにはいきません。どうかご協力いただきたく……！"
42170-153 = "えっと、それがですね……"
42170-154 = "[s] \"一度だけ見なかったことにしてくれないかな？\""
42170-155 = "はいい？見なかったことにしてほしい？"
42170-156 = "先生は、カイザーセキュリティの警備員として――立派な社会人として働いている私の誇りを冒涜するおつもりですか！？"
42170-157 = "私には、所確幸の同志が滞在するこの駅を安全かつ美しく保つ義務が――"
42170-159 = "……カイザーコーポレーションが子ウサギ駅を破壊しようとしています。"
42170-164 = "な、なんですって！？"
42170-165 = "信じられないかもしれませんが、実は……"
42170-167 = "（……ミヤコは事情を手短に説明した）"
42170-170 = "……信頼に値しない情報ですね。"
42170-171 = "武力を誇示するためだけに市民が利用する駅に爆弾を設置するだなんて……常識人なら考えられないことです。"
42170-172 = "ですが、カイザーコーポレーションがこれまでやってきた事を考えれば、まったく荒唐無稽な話でもないのでしょう。"
42170-173 = "彼らがどれほど貪欲なのかは、カイザーセキュリティで教育を受けた時に実感しております……"
42170-174 = "おやつは1日1プリン支給すると約束したのに……"
42170-175 = "昨日はプリンの在庫がなくなったと言って、こんにゃくを出してきたのですよ！？"
42170-176 = "そ、そうなんですね……"
42170-178 = "……ですが、このような屈辱だって、私は我慢してきました。"
42170-179 = "多少は噛み合わない所があったとしても、業務上は気にしないようにするのが社会人の持つべき美徳だと思っておりますので……！"
42170-180 = "だというのに、連邦生徒会やカイザーコーポレーションのお偉いさんが、より大きな欲望のために子ウサギ駅を爆破する……？"
42170-181 = "ここの住民の生活基盤であり、職にありつけなかった我が同志が滞在しているこの子ウサギ駅を？"
42170-182 = "許せません……このブルジョア野郎ども！"
42170-183 = "――お任せください。#n子ウサギ駅と同志を守るためであれば、何だって協力いたしましょう！"
42170-185 = "ご理解いただきありがとうございます、デカルトさん。"
42170-186 = "まずは敵の数が多いので、兵力を分散できるように陽動をお願いしたいのですが……"
42170-187 = "戦うのは問題ないのですが……実は、逮捕された時に武器を全部奪われてしまって……"
42170-188 = "今持っている拳銃も、空砲弾で……。"
42170-189 = "問題ありません。#n弾丸は十分ありますので、お渡しします。"
42170-193 = "ああ、このひんやりとした重厚感、懐かしいですね。"
42170-194 = "長期にわたる侮蔑の視線と、なくなっていく余裕に……いい加減うんざりしていた所でした。"
42170-195 = "ありがとうございます、ミヤコさん。#n私も、そろそろ所確幸のリーダー、デカルトに戻る時です！"
42170-197 = "あとはガードの視線を逸らすために入口から離れたところで騒ぎを……"
42170-206 = "所確幸の同志よ！この無線を聴き次第、子ウサギ駅に集結してくれ！"
42170-207 = "欲の皮が突っ張った餓鬼の群れであるカイザーコーポレーションが、私たちの聖地を穢そうとしています！"
42170-208 = "……あれ？リーダー、小学生か何かはやめたんじゃないの？"
42170-209 = "「所確幸」！#n「所有せずとも確かな幸せを探す集い」、略して「所確幸」です！"
42170-213 = "ごほん……私は無所有の人生を諦めたわけではありません。"
42170-214 = "ただ、所有する者がどのような事を考え、どのような欲望を抱いているのかを把握しようと、潜入修行を試みていたのです！"
42170-215 = "そしてその結果――ここに根付こうとするカイザーコーポレーションは、常軌を逸した餓鬼の群れであることが判明しました。"
42170-216 = "物欲に目が眩み、道徳心を失った俗物共に……#n「無所有の喜び」を教えてやるとしましょうか！"
42170-217 = "まぁ……別にやることもないし、呼ばれたら行くよ。"
42170-218 = "害虫を懲らしめるなら……任せて。"
42170-219 = "それでは、腐りきった餓鬼の群れに向かって――"
42170-220 = "「所確幸」、突撃ィィ――！"
42170-226 = "あの、私が合図を――"
42170-227 = "[s] \"行っちゃったね……。\""
42170-228 = "……こうなってしまった以上、陽動は難しいですが……#nしばらくの間、敵の注意を逸らしてくれるでしょう。"
42170-229 = "私も戦います。先生、指揮をお願いします！"

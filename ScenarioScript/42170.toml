42170-26 = "[s] \"แล้วสมาชิกคนอื่นไม่ได้มาด้วยเหรอ?\""
42170-30 = "ฉันคงไม่อาจขอร้องสมาชิกคนอื่นได้หรอกค่ะ..."
42170-31 = "ฉันสละตำแหน่งหัวหน้ากองด้วยการตัดสินใจของฉันเอง แต่ตอนนี้จะให้ฉันขอให้ทุกคนทิ้งชีวิตอันสุข#nสบายและกลับมาที่ค่ายอีกรอบเพราะอุดมการณ์ของฉันเหรอคะ แบบนั้นมันรู้สึกผิดเกินไปค่ะ"
42170-32 = "... สมาชิกทุกคนหลักแหลมกว่าฉันค่ะ ต่อให้ไม่มีคุณครูช่วย พวกเธอก็ต้องหาอุดมการณ์ที่แน่วแน่ของตัวเองได้ค่ะ"
42170-33 = "แต่ว่าก่อนหน้านั้น"

42170-134 = "[ns5] \"ดีใจที่ได้เจออีกครั้งนะ เดการ์ต\"\n[ns6] \"... มาทำอะไรตรงนี้เหรอ?\""
42170-137 = "นี่คุณใช้สายตาดูจากชุดแล้วก็ยังมองไม่ออกเหรอครับ?"
42170-138 = "เอาเถอะ ก็คุณคงจะได้ใช้ชีวิตบนเอกสิทธิ์ที่ห่างไกลจากกฎระเบียบนี่เนอะครับ"
42170-142 = "ผมถูกไคเซอร์ ซิเคียวริตี้ลากตัวไปอบรมหลายอย่างเลยละครับ"
42170-143 = "พวกนั้นสอนให้รู้ว่ามันแย่แค่ไหนที่ไม่ยอมทำงานและเอาแต่ใช้ชีวิตเป็นปรสิตในโครงสร้างพื้นฐานของ#nสังคม..."
42170-144 = "และการใช้แรงงานจนเหงื่อท่วมมันมีคุณค่าศักดิ์สิทธิ์แค่ไหน...!"
42170-145 = "พอผ่านการอบรมอย่างสมบูรณ์แบบ ผมก็ได้เกิดใหม่เป็นยามของไคเซอร์ ซิเคียวริตี้ผู้มีส่วนร่วมใน#nการรักษาความปลอดภัยในสังคมครับ!"
42170-147 = "งะ... งั้นเหรอคะ..."
42170-148 = "การตรวจค้นบุคคลที่น่าสงสัยคือหน้าที่ของยามผู้รักษาความปลอดภัย! โดยเฉพาะอย่างยิ่งคนที่มา#nแอบดูสถานีอย่างน่าสงสัยอยู่ในที่ร่มอย่างพวกคุณแล้ว ยิ่งต้องตรวจค้นเข้าไปใหญ่เลยครับ!"
42170-152 = "ต่อให้เป็นคนที่เคยมีบุญคุณอันใหญ่ยิ่ง แต่ผมก็ไม่อาจละเลยหน้าที่ได้ ช่วยให้ความร่วมมือในการตรวจ#nค้นด้วย...!"
42170-153 = "เอ่อ คือว่า..."
42170-154 = "[s] \"ช่วยหลับหูหลับตาให้สักครั้งได้มั้ย?\""
42170-155 = "หืม? ให้ช่วยทำเป็นไม่รู้ไม่เห็นงั้นเหรอครับ?"
42170-156 = "คุณครูจะดูหมิ่นความภาคภูมิใจของผมในฐานะยามของไคเซอร์ ซิเคียวริตี้และพลเรือนที่ดีของสังคม#nอย่างนั้นเหรอครับ!"
42170-157 = "ผมมีหน้าที่ต้องรักษาสถานีรถไฟให้พวกพ้องชาวความสุขเล็กๆ ได้อยู่อย่างปลอดภัยและสะอาด..."
42170-159 = "... ไคเซอร์ คอร์เปอเรชั่นกำลังจะทำลายสถานีโคะอุซางินะคะ"
42170-164 = "วะ... ว่าไงนะครับ?!"
42170-165 = "คุณอาจจะไม่เชื่อนะคะ แต่ความจริงแล้ว..."
42170-167 = "(...มิยาโกะสรุปเรื่องที่เกิดขึ้นมาจนถึงตอนนี้ให้เดการ์ตฟัง)"
42170-170 = "... ข้อมูลมันฟังดูไม่น่าเชื่อถือเท่าไรเลยนะครับ"
42170-171 = "ติดตั้งระเบิดในสถานีที่ชาวเมืองใช้งานเพื่อขยายอำนาจให้กับตัวเองเนี่ยนะ นี่ไม่ใช่เรื่องที่คนดีๆ จะคิด#nได้หรอกนะครับ"
42170-172 = "แต่พอมาย้อนนึกถึงสิ่งที่ไคเซอร์ คอร์เปอเรชั่นเคยทำมา ก็ใช่ว่าจะเข้าใจไม่ได้อยู่หรอกครับ"
42170-173 = "ช่วงที่เข้ารับการอบรมจากไคเซอร์ ซิเคียวริตี้ ผมก็รู้สึกได้อย่างกระจ่างแจ้งเลยละครับว่าคนพวกนี้โลภ#nมากขนาดไหน..."
42170-174 = "ทั้งที่สัญญากันไว้แท้ๆ ว่าถ้าทำงานเป็นยามของไคเซอร์ ซิเคียวริตี้ จะให้พุดดิ้งเป็นของว่างวันละถ้วย..."
42170-175 = "แต่เมื่อวานก็บอกว่าพุดดิ้งหมดสต็อก แล้วก็ให้บุกมาเป็นของว่างแทน!"
42170-176 = "ยะ... อย่างนั้นสินะคะ..."
42170-178 = "...แต่ผมก็อดทนกับความอัปยศอดสูนี้ได้อยู่นะครับ"
42170-179 = "ถึงจะมีบางจุดที่ยังขาดตกไปบ้าง แต่ผมก็คิดว่าการทำเป็นหลับหูหลับตาบ้างมันก็เป็นคุณธรรมที่คน#nในสังคมควรมี...!"
42170-180 = "คนใหญ่คนโตอย่างองค์การนักเรียนกับไคเซอร์ คอร์เปอเรชั่นก็เป็นเจ้าของความมั่งคั่งกันอยู่แล้ว แล้วพวกเขาจะมาระเบิดสถานีโคะอุซางิอีกเนี่ยนะครับ...?"
42170-181 = "สถานีโคะอุซางิเป็นทั้งถิ่นฐานของชาวเมืองและที่พักพิงของพวกพ้องที่หางานไม่ได้เลยนะ"
42170-182 = "... ยกโทษให้ไม่ได้ ไอ้พวกชนชั้นนายทุนเอาแต่ได้!"
42170-183 = "วางใจผมได้เลย ถ้าเป็นการปกป้องสถานีโคะอุซางิและพวกพ้องแล้วละก็ กระผมจะให้ความร่วมมือ#nอย่างเต็มที่เลยครับ!"
42170-185 = "ขอบคุณที่เข้าใจนะคะ คุณเดการ์ต"
42170-186 = "ทางนั้นมีคนกันเยอะ ฉันต้องขอให้คุณช่วยหลอกล่อให้พวกนั้นกระจายกำลังก่อนค่ะ"
42170-187 = "ถ้าเป็นเรื่องต่อสู้ละก็ไม่มีปัญหาหรอก แต่ตอนโดนรวบตัวคราวนั้น ผมโดนริบอาวุธไปหมดแล้วเลย..."
42170-188 = "ปืนพกที่มีตอนนี้ก็มีแต่กระสุนหลอกซะด้วยครับ"
42170-189 = "เรื่องนั้นไม่มีปัญหาค่ะ ฉันมีกระสุนปืนเหลือเฟือ เดี๋ยวจะให้ยืมไปใช้นะคะ"
42170-193 = "อ๊ะ ไม่ได้แตะกระสุนที่เย็นและมีน้ำหนักแบบนี้มานานแล้วนะครับเนี่ย"
42170-194 = "กำลังเหลือทนกับการดูถูกและโดนข่มเหงมาอย่างยาวนานอยู่พอดี..."
42170-195 = "ขอบคุณนะครับคุณมิยาโกะ จากนี้ไป เดการ์ต ผู้นำกลุ่มความสุขเล็กๆ คนนี้จะออกโรงเองครับ!"
42170-197 = "ทีนี้งานที่เหลือก็คือก่อความวุ่นวายให้การ์ดเพ่งความสนใจไปทางอื่น..."
42170-206 = "พวกพ้องความสุขเล็กๆ! ถ้าได้ยินเสียงวิทยุนี้ ให้รีบออกมาจากสถานีโคะอุซางิทันที!"
42170-207 = "ไคเซอร์ คอร์เปอเรชั่นที่เป็นดั่งฝูงปีศาจแห่งความโลภกำลังจะทำให้สถานที่อันศักดิ์สิทธิ์ของชาวเรา#nมีอันต้องแปดเปื้อน!"
42170-208 = "... เอ๋? หัวหน้า ไม่ได้เลิกเป็นกลุ่มความสุขเด็กๆ อะไรนั่นแล้วหรอกเหรอ?"
42170-209 = "ไม่ใช่ความสุขเด็กๆ <ความสุขเล็กๆ> ต่างหากเล่า! กลุ่มผู้แสวงหาความสุขเล็กๆ แบบไม่ต้องได้มา#nครอบครอง! ย่อสั้นๆ ว่า 'ความสุขเล็กๆ'!"
42170-213 = "ฮืม... ผมยังไม่ล้มเลิกการใช้ชีวิตที่ไม่ครอบครองสิ่งใดหรอกนะครับ"
42170-214 = "ที่ผ่านมาผมแค่พยายามแทรกซึมตัวเข้าไปเพราะอยากเข้าใจอย่างถ่องแท้ว่าคนที่ได้ครอบครองสิ่งอื่น#nเขามีความคิดอย่างไร และมีความปรารถนาอะไรในใจ!"
42170-215 = "และผลจากการทำอย่างนั้น... มันทำให้ผมรู้ว่าปุถุชนจากไคเซอร์ คอร์เปอเรชั่นที่พยายามหยั่งรากลง#nในพื้นที่นี้ก็คือฝูงปีศาจชั่วร้ายที่คบค้าสมาคมไม่ได้ครับ"
42170-216 = "คนไม่มีศีลธรรมที่คิดเอาแต่ได้ต้องได้รับการสั่งสอน... จงรู้ไว้ว่าการไม่ครอบครองสิ่งใดคือความสุขใจ!"
42170-217 = "ก็ได้นะ... ยังไงก็ไม่มีอะไรทำอยู่แล้ว ถ้าเรียกก็จะไปช่วยแล้วกัน"
42170-218 = "ถ้าเป็นการทำให้คนไม่ดีต้องเจอความยุ่งยากละก็... ไม่ว่าอะไรก็ทำได้อยู่แล้ว"
42170-219 = "เพื่อโลกที่สดใส ไร้ฝูงปีศาจแห่งความโลภ!"
42170-220 = "<ความสุขเล็กๆ> ลุยกันเลย!"
42170-226 = "ระ... รอไปด้วยกันสิ..."
42170-227 = "[s] \"ไปซะแล้ว...\""
42170-228 = "... ถ้าเป็นอย่างนี้คงหลอกล่อศัตรูลำบาก แต่ก็คงทำให้ศัตรูไขว้เขวได้สักพักนะคะ"
42170-229 = "ฉันเองก็จะไปช่วยอีกแรงค่ะ รบกวนคุณครูช่วยสั่งการด้วยนะคะ!"

42170-73 = "#wait;1500"
42170-74 = "[ns] \"역시 특수부대를 막을 수 있는 건 특수부대뿐이네.\""
42170-75 = "3;미야코;11;……SRT의 상대는 역시 SRT뿐이라는 건가요."
42170-76 = "3;미야코;99;사실 FOX의 선배들이 나선 이상 특수전을 각오해야 한다고는 생각했었습니다만……"
42170-77 = "3;미야코;06;무기도, 경험도, 신체 능력도 부족한 제가…… 선배들을 이길 수 있을까요?\n#3;em;[땀]\n#3;stiff"

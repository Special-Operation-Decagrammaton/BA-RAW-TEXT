42170-11 = "พอเจ้าของไม่อยู่ ก็ถือโอกาสเข้ามาค้นข้าวของในค่ายของเด็กนักเรียนผู้หญิงเลยนะคะ..."
42170-12 = "คุณครู [USERNAME] เป็นผู้ใหญ่ที่แปลกจริงๆ ด้วยสินะคะ"
42170-19 = "[ns] \"กลับมาแล้วเหรอ มิยาโกะ\""

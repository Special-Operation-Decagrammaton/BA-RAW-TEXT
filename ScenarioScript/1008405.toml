[translation]
1008405-1 = "The Sound of Nature 2"
1008405-4 = "I thought a lot about the reason my last recording failed."
1008405-5 = "I think it's because I tried to control and manufacture the sounds too much."
1008405-6 = "People love nature ambience for its spontaneity. Those random factors you can never predict."
1008405-7 = "Meanwhile I tried to capture that organic randomness with an artificial fire..."
1008405-8 = "[s] \"You sure it wasn't because your arms got tired?\""
1008405-9 = "A-Anyway!"
1008405-10 = "In the wake of my past failures, I plan to hike the mountain today with no particular goal."
1008405-11 = "If I stay quiet and listen carefully...maybe I can capture all the sounds I don't get to hear in the city."
1008405-12 = "[s] \"That sounds like a good idea.\""
1008405-14 = "[ns1] \"But it's still the dead of winter.\"\n[ns2] \"Would there even be anything to listen to out here?\""
1008405-17 = "It's okay. Even when everything's frozen...you can hear the restless whispers of those who don't mind the cold."
1008405-18 = "We might be able to capture those soft sounds, especially on a quiet wintry mountain like this."
1008405-19 = "And they'll be especially valuable since they're so rare."
1008405-23 = "Now then...shall we make our way up the mountain?"
1008405-25 = "Later..."
1008405-30 = "Sensei."
1008405-31 = "Could you come here for a moment?"
1008405-35 = "Do you see that tree over there?"
1008405-36 = "[s] \"It's huge.\""
1008405-37 = "Yes. It's probably been around for at least a few decades."
1008405-38 = "Want to go hear what stories it has to tell us?"
1008405-41 = "― [log=코타마 캠핑]Shh...[/log]"
1008405-45 = "[ns] \"Kotama, what are you...\""
1008405-46 = "― [log=코타마 캠핑]Sensei, please lower your voice.[/log][wa:2560] "
1008405-49 = "― [log=코타마 캠핑]Stay quiet, but come closer to the tree...[/log][wa:2490] "
1008405-52 = "― [log=코타마 캠핑]Listen to the sounds[/log]"
1008405-54 = "― [log=코타마 캠핑]coming from inside the trunk.[/log]"
1008405-57 = "― [log=코타마 캠핑]Can you hear that?[/log][wa:1250] "
1008405-60 = "― [log=코타마 캠핑]It's water flowing up through the tree.[/log][wa:1390] "
1008405-63 = "― [log=코타마 캠핑]This tree shed all of its leaves,[/log][wa:2050] "
1008405-65 = "― [log=코타마 캠핑]as if it gave up on living.[/log][wa:2290] "
1008405-68 = "― [log=코타마 캠핑]But even so,[/log]"
1008405-70 = "― [log=코타마 캠핑]it's working hard to drink up the water.[/log][wa:10] "
1008405-73 = "― [log=코타마 캠핑]Even though this mountain seems to have gone silent,[/log][wa:2020] "
1008405-75 = "― [log=코타마 캠핑]it actually cries out with all kinds of sounds...[/log][wa:410] "
1008405-78 = "― [log=코타마 캠핑]...Heehee. You know, I think[/log][wa:1090] "
1008405-80 = "― [log=코타마 캠핑]I could listen to them forever, and never grow bored.[/log]"
1008405-83 = "Heehee. What a lovely ambience."
1008405-84 = "I'll be able to make a legendary ASMR soundtrack out of this—"
1008405-89 = "[ns] \"Is an empty belly part of the ambience?\""
1008405-90 = "...My apologies."
1008405-91 = "I did start feeling hungry earlier, but I didn't expect my stomach to be that loud."
1008405-92 = "...I guess the \"sounds of nature\" aren't the only thing you'll hear when you get rid of all the background noise."
1008405-96 = "[ns3] \"I can't light a fire but I did bring some food...\"\n[ns4] \"We can share my a bento if you need a bite.\""
1008405-101 = "[ns] \"Would you like some?\""
1008405-105 = "...Yes!"
1008405-107 = "Kotama and I enjoyed a delicious bento lunch on the mountain trail."

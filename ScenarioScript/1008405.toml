[translation]
1008405-1 = "เสียงของธรรมชาติ 2"
1008405-4 = "พอล้มเหลวในการบันทึกเสียงครั้งที่แล้ว ฉันก็เลยกลับไปคิดหนักเลยค่ะว่าทำไมถึงทำไม่สำเร็จ..."
1008405-5 = "และฉันก็ได้คำตอบว่าความล้มเหลวที่ผ่านมาเป็นเพราะเราพยายามจะควบคุมธรรมชาติด้วยตัวแปรที่#nมนุษย์สร้างขึ้นค่ะ"
1008405-6 = "เหตุผลที่คนเราชอบเสียงของธรรมชาติ ก็เพราะธรรมชาติเต็มไปด้วยสิ่งที่คาดไม่ถึง เหมือนกับการสุ่ม#nตัวเลขที่ไม่มีแบบแผน..."
1008405-7 = "และฉันก็ใช้วิธีที่มนุษย์สร้างขึ้นในการจุดไฟเพื่อให้ได้เสียงที่ต้องการมาค่ะ"
1008405-8 = "[s] \"ตอนนั้นเราเปลี่ยนวิธีเพราะหมดแรงไม่ใช่เหรอ...\""
1008405-9 = "อะ... เอาเถอะค่ะ!"
1008405-10 = "จากความผิดพลาดครั้งที่แล้ว วันนี้ฉันก็เลยจะขึ้นเขาไปโดยที่ไม่มีจุดหมายปลายทางเป็นพิเศษค่ะ"
1008405-11 = "ถ้ากลั้นใจไม่พูดในสิ่งที่อยากพูด แล้วจดจ่อกับการฟังให้ดี... บางทีฉันอาจจะได้ยินเสียงธรรมชาติ#nที่ไม่เคยได้ยินในใจกลางเมืองมาก่อนก็ได้ค่ะ"
1008405-12 = "[s] \"ครูว่ามันก็เป็นความคิดที่ดีหรอกนะ...\""
1008405-14 = "[ns1] \"แต่ตอนนี้เป็นฤดูหนาวที่มีแต่หญ้าและต้นไม้แห้งๆ\"\n[ns2] \"แล้วจะได้ยินเสียงอะไรเคลื่อนไหวเหรอ?\""
1008405-17 = "ไม่เป็นไรค่ะ เพราะต่อให้เป็นฤดูหนาวที่ทุกอย่างกลายเป็นน้ำแข็ง แต่ก็ยังมีบางคนที่กระซิบกระซาบอยู่#nตลอดเวลาค่ะ"
1008405-18 = "ตรงกันข้าม เราอาจได้ยินแม้กระทั่งเสียงเล็กๆ น้อยๆ จากในภูเขาในฤดูหนาวที่เงียบสงบก็ได้นะคะ"
1008405-19 = "แล้วนั่นก็จะยิ่งควรค่าต่อการบันทึกเสียง เพราะมันเป็นเสียงที่ปกติแล้วจะไม่ได้ฟังกันบ่อยๆ ค่ะ"
1008405-23 = "ถ้างั้นก็... ขึ้นไปบนเขากันเลยมั้ยคะ?"
1008405-25 = "(ครู่ต่อมา...)"
1008405-30 = "คุณครู..."
1008405-31 = "ช่วยมาทางนี้สักเดี๋ยวได้มั้ยคะ?"
1008405-35 = "เห็นต้นไม้ที่อยู่ทางโน้นมั้ยคะ?"
1008405-36 = "[s] \"ต้นใหญ่มากเลยแฮะ\""
1008405-37 = "ใช่ค่ะ ฉันว่าน่าจะเป็นต้นไม้ที่อยู่มาเกินทศวรรษแล้วค่ะ"
1008405-38 = "เราไปฟังเรื่องราวที่ต้นไม้ต้นนั้นจะบอกกันดีมั้ยคะ?"
1008405-41 = "― [log=코타마 캠핑]ชู่ว...[/log]"
1008405-45 = "[ns] \"โคทามะ ทำอะไร...\""
1008405-46 = "― [log=코타마 캠핑]คุณครู ช่วยเบาเสียงด้วยค่ะ[/log][wa:2800] "
1008405-49 = "― [log=코타마 캠핑]กลั้นหายใจแล้วเดินไปที่ต้นไม้...[/log][wa:2890] "
1008405-52 = "― [log=코타마 캠핑]แล้วตั้งใจฟัง[/log]"
1008405-54 = "― [log=코타마 캠핑]เสียงที่ดังมาจากในต้นไม้สิคะ[/log]"
1008405-57 = "― [log=코타마 캠핑]ได้ยินมั้ยคะ?[/log][wa:1450] "
1008405-60 = "― [log=코타마 캠핑]เสียงของน้ำที่ไหลขึ้นมาตามลำต้น[/log][wa:1710] "
1008405-63 = "― [log=코타마 캠핑]ต้นไม้ต้นนี้ใบร่วงหมดแล้ว[/log][wa:2370] "
1008405-65 = "― [log=코타마 캠핑]ดูเหมือนว่ามันละทิ้งความตั้งใจที่จะมีชีวิตต่อ[/log][wa:1570] "
1008405-68 = "― [log=코타마 캠핑]แต่ตอนนี้[/log]"
1008405-70 = "― [log=코타마 캠핑]มันก็ออกแรงดึงน้ำมาเลี้ยงตัวเองอยู่นะคะ[/log][wa:10] "
1008405-73 = "― [log=코타마 캠핑]กับป่าที่ดูเงียบสงบนี้ก็เหมือนกัน[/log][wa:2780] "
1008405-75 = "― [log=코타마 캠핑]ที่จริงแล้วมันเต็มไปด้วยเสียงสะท้อนสารพัด...[/log][wa:610] "
1008405-78 = "― [log=코타마 캠핑]...ฮุฮุ ต่อไปฉันก็คงไม่เบื่อ[/log][wa:1090] "
1008405-80 = "― [log=코타마 캠핑]เพราะมีเสียงแบบนี้ให้ฟังค่ะ[/log]"
1008405-83 = "ฮุฮุ เป็นเสียงที่น่าฟังจังเลยค่ะ..."
1008405-84 = "ครั้งนี้ทำไฟล์ ASMR ดีๆ ได้แน่—"
1008405-89 = "[ns] \"เมื่อกี้เสียงจากโคทามะใช่มั้ย...?\""
1008405-90 = "ฉันสะเพร่าเองค่ะ..."
1008405-91 = "ที่จริงฉันรู้สึกหิวนิดหน่อยตั้งแต่เมื่อกี้แล้ว แต่ไม่คิดเลยว่าท้องจะร้องดังขนาดนี้..."
1008405-92 = "อุตส่าห์ตัดเสียงรบกวนแล้ว แต่เสียงที่ได้ยินก็ไม่ได้มีแต่เสียงจากธรรมชาติสินะคะ"
1008405-96 = "[ns3] \"ถึงครั้งนี้ครูจะไม่ได้เอาไม้ขีดไฟมาตามที่โคทามะบอก...\"\n[ns4] \"แต่ก็เอาข้าวกล่องง่ายๆ มากินแก้หิวนะ\""
1008405-101 = "[ns] \"มากินด้วยกันมั้ย?\""
1008405-105 = "ค่ะ!"
1008405-107 = "(จากนั้นคุณครูก็แบ่งข้าวกล่องกินกับโคทามะ และได้ใช้เวลาอย่างสนุกสนานด้วยกัน)"

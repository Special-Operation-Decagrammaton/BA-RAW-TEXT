[translation]
1008405-1 = "天籟之音（２）"
1008405-4 = "上次回去之後，我仔細思考了錄音失敗的原因……"
1008405-5 = "最終我得出一個結論，那就是我試圖用人為變數來控制自然環境。"
1008405-6 = "人類之所以喜歡大自然的聲音，#n就是因為無法預測所帶來的驚喜感，就像隨機的變數一樣……"
1008405-7 = "然而我卻想要透過人工生火的方式，獲得我想要的聲音。"
1008405-8 = "[s]「當時你不是因為體力不足才失敗的嗎……」"
1008405-9 = "總，總之……！"
1008405-10 = "有了上次失敗的經驗，我這次決定隨意地在山裡閒晃。"
1008405-11 = "只要忍住不說話，張開雙耳仔細傾聽……#n一定就能找到在都市中聽不到的大自然的聲音。"
1008405-12 = "[s]「雖然聽起來是個好主意……」"
1008405-14 = "[ns1]「但現在是冬天，就連雜草和樹木都枯萎了……」\n[ns2]「有辦法錄到什麼聲音嗎？」"
1008405-17 = "不用擔心，就算草木都被寒冬凍結，多少還是會有人說話的聲音的。"
1008405-18 = "而且正是因為冬天的山林裡很安靜，我們才有機會聽見平時聽不到的細碎雜音。"
1008405-19 = "如果能錄到平時難以錄到的聲音，這份錄音檔肯定也會更有意義吧？"
1008405-23 = "好……那我們就慢慢往上爬吧。"
1008405-25 = "（幾分鐘後……）"
1008405-30 = "……老師。"
1008405-31 = "可以跟我來這邊一下嗎？"
1008405-35 = "那邊，有看到那棵樹嗎？"
1008405-36 = "[s]「那棵樹還真大呢。」"
1008405-37 = "沒錯，我猜那棵樹肯定已經聳立在這裡數十年了吧？"
1008405-38 = "……好，我們就來聽聽這棵樹想對我們說什麼吧。"
1008405-41 = "― [log=코타마 캠핑]噓……[/log]"
1008405-45 = "[ns]「小玉，這到底是……」"
1008405-46 = "― [log=코타마 캠핑]老師，先降低音量。[/log][wa:3480] "
1008405-49 = "― [log=코타마 캠핑]安靜地……靠近樹木……[/log][wa:3730] "
1008405-52 = "― [log=코타마 캠핑]將裡頭的聲音，[/log]"
1008405-54 = "― [log=코타마 캠핑]用耳朵仔細聆聽。[/log]"
1008405-57 = "― [log=코타마 캠핑]……有聽到嗎？[/log][wa:1690] "
1008405-60 = "― [log=코타마 캠핑]通過樹幹內部的水所發出的聲音。[/log][wa:2350] "
1008405-63 = "― [log=코타마 캠핑]雖然這棵樹，已經讓樹葉全數脫落……[/log][wa:2690] "
1008405-65 = "― [log=코타마 캠핑]看起來就像已經放棄了生存一樣……[/log][wa:2730] "
1008405-68 = "― [log=코타마 캠핑]其實它就連現在，[/log]"
1008405-70 = "― [log=코타마 캠핑]也正用力地將水吸上去。[/log][wa:940] "
1008405-73 = "― [log=코타마 캠핑]乍看之下，看似寂靜的這座森林……[/log][wa:3460] "
1008405-75 = "― [log=코타마 캠핑]其實也充滿許許多多的聲音……[/log][wa:1810] "
1008405-78 = "― [log=코타마 캠핑]……呵呵，看來聽膩這種事……[/log][wa:1650] "
1008405-80 = "― [log=코타마 캠핑]之後再也不會發生了呢。[/log]"
1008405-83 = "呵呵，真是美妙的聲音……"
1008405-84 = "這下我總算能製作出優秀的ASMR──"
1008405-89 = "[ns]「這是你發出來的聲音吧，小玉……？」"
1008405-90 = "……是我大意了。"
1008405-91 = "其實我從剛才開始就一直覺得有點餓，#n只是沒想到肚子竟然會發出這麼大的聲音……"
1008405-92 = "……看來不管再怎麼減少噪音，我們身邊也不會只有大自然的聲音呢……"
1008405-96 = "[ns3]「雖然你叫我這次不要帶火柴來……」\n[ns4]「不過我有帶可以在這裡吃的便當來喔。」"
1008405-101 = "[ns]「……不介意的話，我們要不要一起吃？」"
1008405-105 = "……要！"
1008405-107 = "（之後便和小玉一邊吃著便當，一邊度過了愉快的時光）"

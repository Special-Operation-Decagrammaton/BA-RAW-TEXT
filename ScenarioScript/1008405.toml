1008405-3 = "3;코타마 캠핑;99\n#3;em;…\n#3;a\n#wait;2500"
1008405-4 = "3;코타마 캠핑;01;지난번 녹음이 실패한 이유에 대해서 돌아간 뒤 오랫동안 고민해 보았습니다만……"
1008405-5 = "3;코타마 캠핑;02;역시 지난번의 실패는 인위적인 변수로 환경을 통제하려 했기 때문인 것 같습니다."
1008405-6 = "3;코타마 캠핑;99;사람이 자연의 소리를 좋아하는 이유는 규칙 없이 무작위한 난수와 같은 의외성이 있기 때문인데……"
1008405-7 = "3;코타마 캠핑;01;저는 인위적으로 불을 지펴 원하는 소리를 얻으려 했으니까요.\n#3;em;[한숨]"
1008405-8 = "[s] \"그때는 체력이 부족해서 실패했던 게 아닐까……\""
1008405-9 = "3;코타마 캠핑;07;여, 여하튼……!\n#3;em;[땀]\n#3;stiff"
1008405-10 = "3;코타마 캠핑;01;오늘은 지난번의 실패를 바탕으로 특별한 목적지 없이 산을 거닐어 보고자 합니다."
1008405-11 = "3;코타마 캠핑;00;하고 싶은 말을 속으로 삼키고 귀를 기울이다 보면…… 도심에서는 듣지 못했던 자연의 소리를 캐치할 수 있을지도 모르지요."

[translation]
1000505-1 = "雖然隱約，但是耀眼"
1000505-2 = "光是能發光就很了不起了，還能用來保護自己的身體，真是不可思議。 "
1000505-3 = "你可能會覺得，在漆黑的深海中發光容易被捕食者發現，一隻的話或許是，但成群聚集的話反而能造成威嚇。"
1000505-4 = "唔嘿～會是什麼樣的光景呢？一定很厲害吧？"
1000505-5 = "[s1] 「今天是打算聊魚的話題嗎？」\n[s2] 「今天要找什麼？」"
1000505-6 = "唔嘿～老師真是急呀。"
1000505-7 = "唔嘿～老師真是急呀。"
1000505-8 = "寶藏獵人的靈魂終於覺醒了，是個好兆頭。"
1000505-9 = "阿拜多斯的歷史相當悠久，到處都有隱藏的空間，找起來挺有趣的！ "
1000505-10 = "上次是倉庫，這次去封閉的舊校舍看看吧？"
1000505-13 = "阿拜多斯．第三舊校舍"
1000505-14 = "咳咳，咳咳……這裡的灰塵也很多呢。"
1000505-15 = "到處都是不值錢的東西，我想應該沒有可以用的東西。"
1000505-16 = "老師，小心別絆倒了。"
1000505-17 = "[s3] 「白天來不好嗎？」\n[s4] 「令人毛骨悚然啊……」"
1000505-18 = "唔嘿，半夜裡尋寶不是很浪漫嗎。而且也不用擔心被別人發現。"
1000505-19 = "唔嘿～老師，該不會是害怕了吧？ "
1000505-20 = "沒事，沒事。跟在大叔的身後。"
1000505-21 = "那我們再往前走吧。"
1000505-22 = "找到好東西就要馬上撿起來唷。因為尋寶的規則是誰找到就是誰的。"
1000505-25 = "唔嗯。走了不少路，也沒看到什麼特別有用的東西呢……"
1000505-26 = "看起來不錯的東西果然早就被拿走了嗎……"
1000505-29 = "（喀啦喀啦）"
1000505-32 = "這裡是……好像是很久以前的前輩們使用的地方。大叔也沒來過，所以不太清楚……"
1000505-33 = "（唰唰）"
1000505-34 = "……嗯？"
1000505-35 = "有沒有聽到什麼聲音？"
1000505-36 = "好像是這邊……"
1000505-37 = "唔，哇啊啊啊啊？！"
1000505-39 = "（哐啷哐啷）"
1000505-40 = "（嘰、嘰—）"
1000505-41 = "……"
1000505-42 = "唔，哇……嚇了一跳……"
1000505-43 = "是老鼠啊……真是的，嚇死人了。 "
1000505-44 = "不過託牠的福，堆積的廢棄物都掉下來了。 "
1000505-45 = "[s] 「……………」"
1000505-46 = "…… "
1000505-47 = "唔嘿，老師～？那是什麼臉？"
1000505-48 = "該不會是想說「不會吧，星野也會被嚇到」之類的？"
1000505-49 = "就算是我，遇到這種狀況肯定也會被嚇到吧～？"
1000505-50 = "……嘛，也看到了老師罕見的表情……啊咧？"
1000505-52 = "你看這個，老師。剛才掉下來的廢棄物中……有什麼在發光。"
1000505-53 = "[s] 撿起一張微微發光的紙"
1000505-55 = "這個是……夜光貼紙？"
1000505-56 = "而且是魚的！ "
1000505-57 = "這是熱帶魚……這是海螺、烏賊、翻車魚……唔嘿，還有水母！ "
1000505-58 = "很棒的寶物耶，老師！"
1000505-59 = "[s] 「太舊了，光可能有點弱……」"
1000505-60 = "唔嘿，那不是很酷嘛，雖然不能很好地說明形容……"
1000505-61 = "在沒有人注意到的地方，像這樣一個人閃耀著。"
1000505-62 = "[s5] 「給你。」\n[s6] 「禮物。」"
1000505-63 = "嗯？啊，給，給我嗎？"
1000505-64 = "嗯？啊，給，給我嗎？"
1000505-65 = "但撿到的是老師，照規則是老師的……"
1000505-66 = "[s] 遞過去"
1000505-69 = "啊……唔……謝，謝謝，老師。 "
1000505-72 = "唔嘿……"
1000505-73 = "……可愛魚兒的大豐收！"
1000505-74 = "我要把它貼在家裡的天花板上！關燈看一定很棒！ "
1000505-75 = "唔嘿～快點回去吧，老師！ "
1000505-77 = "（和看起來很開心的星野一起回去了）"

[translation]
1000505-1 = "Faint Light"
1000505-2 = "Not only does it produce it's own light, but it uses it to protect itself too. Isn't that interesting?"
1000505-3 = "You would think being the only light source in a dark sea would attract predators, but if it's done as a school, then it can be intimidating instead."
1000505-4 = "How do you imagine it would look? I bet it would be spectacular."
1000505-5 = "[s1] \"Please tell me you called to talk about more than fish.\"\n[s2] \"So...can I help you or something?\""
1000505-6 = "Heh! No need to be so hasty, Sensei."
1000505-7 = "Heh! No need to be so hasty, Sensei."
1000505-8 = "Is that your treasure hunter's spirit talking? That's a good sign."
1000505-9 = "The Abydos School has a storied history, so it's fun to find all its hidden secrets!"
1000505-10 = "We checked out the storage last time, so let's head for the old school building this time!"
1000505-13 = "Abydos Old Schoolhouse 3"
1000505-14 = "*cough* *cough* This place could use a hefty dusting too."
1000505-15 = "There's so much junk everywhere. Most of looks like it was dumped here, so I doubt we'll find anything useful."
1000505-16 = "Be careful, Sensei. It would be easy to trip and fall in here."
1000505-17 = "[s3] \"Should we come back in the daytime?\"\n[s4] \"It's creepy in here...\""
1000505-18 = "Heh. But treasure hunting at night is more romantic, don't you think? Better yet, no one can catch us at this hour."
1000505-19 = "What's the matter, Sensei? Scared?"
1000505-20 = "Stop overthinking it. Follow me closely, okay? Don't wander off. "
1000505-21 = "Are you ready to go further in?"
1000505-22 = "Make sure to pick up anything good you find. Finders keepers is the way of the land in the world of treasure hunting."
1000505-25 = "Hmm. We've been at this for a while, but I still haven't come across anything good..."
1000505-26 = "All of the good stuff must have been taken already."
1000505-29 = "(opens door)"
1000505-32 = "This building was used by the students before my day, so I don't know that much about it..."
1000505-33 = "*rustle*"
1000505-34 = "Hmm?"
1000505-35 = "Did you hear something?"
1000505-36 = "From over there..."
1000505-37 = "A-Aaarrrgh?!"
1000505-39 = "*thump*"
1000505-40 = "*squeak* *squeak*"
1000505-41 = "..."
1000505-42 = "U-Ugh... I thought my heart was going to jump out of my chest."
1000505-43 = "(stands up) That mouse nearly scared me to death. "
1000505-44 = "It knocked over that entire pile of junk."
1000505-45 = "[s] \"...\""
1000505-46 = "..."
1000505-47 = "Hmm. What are you thinking, Sensei? Why are you smirking like that?"
1000505-48 = "You want to poke fun at me and say something like, \"I've never heard you so scared before, Hoshino,\" don't you?"
1000505-49 = "Who wouldn't have gotten scared in a situation like that?"
1000505-50 = "Well, as long as you're amused, I guess... Huh?"
1000505-52 = "Look, Sensei. Something shiny came out of that pile of junk that got knocked over."
1000505-53 = "[s] Pick up the paper emitting faint light."
1000505-55 = "Is this a...glow-in-the-dark sticker?"
1000505-56 = "Oh, look! They're fish stickers!"
1000505-57 = "This is a tropical fish... This one is a conch... There are also squid, sunfish...and jellyfish! Heehee."
1000505-58 = "Now that's what I'm talking about, Sensei! You hit the treasure jackpot!"
1000505-59 = "[s] \"Their glow must be so faint because they're old...\""
1000505-60 = "Isn't it cool to think about? I can't put my finger on why... "
1000505-61 = "...but it's like they've always been glowing like this, even when nobody's watching."
1000505-62 = "[s5] \"You can have them, Hoshino.\"\n[s6] \"Consider them a gift to you.\""
1000505-63 = "Huh? You're giving them to me?"
1000505-64 = "Huh? You're giving them to me?"
1000505-65 = "But you're the one who found them...and finders keepers. That's the rule of treasure hunting..."
1000505-66 = "[s] Hand them over."
1000505-69 = "Oh... Wow. Th-Thanks, Sensei."
1000505-72 = "Heh..."
1000505-73 = "Aren't they all so adorable?"
1000505-74 = "I'm gonna put them on my ceiling! That way I can look up at them when I'm lying in bed at night."
1000505-75 = "Heh. Let's get going, Sensei."
1000505-77 = "I left with an excited Hoshino."

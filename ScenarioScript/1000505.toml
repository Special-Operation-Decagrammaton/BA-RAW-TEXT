1000505-20 = "3;호시노;16;괜찮아, 괜찮아. 아 아저씨 뒤에 딱 붙어서 오라고."
1000505-21 = "3;호시노;03;그럼 계속 가볼까."
1000505-22 = "3;호시노;01;좋은 물건을 찾으면 바로 주워야 해. 보물찾기는 찾은 사람이 주인인 룰이니까.\n#3;greeting"

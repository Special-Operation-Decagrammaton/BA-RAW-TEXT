[translation]
1000505-1 = "#Title;희미하지만 빛나는"
1000505-2 = "3;호시노;14;빛을 만드는 것도 신기한데, 그걸로 자기 몸을 보호하다니, 신기하지. \n#3;em;[반짝]\n#3;a"
1000505-3 = "3;호시노;01;캄캄한 심해에서 빛을 만들면 포식자에게 들키지 않을까 싶지만, 혼자라면 모를까 오히려 여럿이서 모여 군체를 이루면 위협이 되나봐."
1000505-4 = "3;호시노;02;으헤~ 어떤 모습일까? 분명 굉장할 거야.\n#3;em;[하트]"
1000505-5 = "[s1] \"물고기 얘기하러 부른 건 아닐 테고.\"\n[s2] \"오늘은 뭘 찾을 거야?\""
1000505-6 = "3;호시노;16;으헤~ 성질도 급하구만, 선생도."
1000505-7 = "3;호시노;16;으헤~ 성질도 급하구만, 선생도."
1000505-8 = "3;호시노;01;드디어 트레져헌터의 혼이 깨어난 건가. 으헤, 좋은 징조잖아."
1000505-9 = "3;호시노;03;아비도스 학교는 역사가 굉장히 오래된 곳이라서 여기 저기 숨겨진 공간을 찾아내는 재미가 있지! \n#3;em;[반짝]"
1000505-10 = "3;호시노;01;저번에는 창고였으니, 이번에는 폐쇄된 구교사로 가볼까?"

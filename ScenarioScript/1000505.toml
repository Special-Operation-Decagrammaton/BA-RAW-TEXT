[translation]
1000505-1 = "แม้จะดูเลือนรางแต่ก็เปล่งประกาย"
1000505-2 = "แค่มันเปล่งแสงได้ด้วยตัวเองก็น่าแปลกแล้ว แต่ยังใช้ป้องกันตัวเองได้อีกเนี่ย ยิ่งน่าสนใจกว่า#nเดิมอีก"
1000505-3 = "การสร้างแสงสว่างจุดเดียวในทะเลลึกที่แสนมืดมิดจะดึงดูดนักล่าให้เข้ามาเห็นได้ก็จริง แต่ถ้า#nมันอยู่รวมกันเป็นฝูงละก็ คงเป็นฝูงที่แข็งแกร่งและน่าเกรงขามแน่ๆ"
1000505-4 = "แหะๆ~ มันจะเป็นแบบไหนกันนะ แต่จะเป็นแบบไหนก็คงจะยอดเยี่ยมทั้งนั้นแหละ"
1000505-5 = "[s1] \"นี่เรียกมาคุยเรื่องปลาเหรอ?\"\n[s2] \"วันนี้จะหาอะไรเหรอ?\""
1000505-6 = "แหะๆ~ ครูนี่ก็ใจร้อนจริงเชียว"
1000505-7 = "แหะๆ~ ครูนี่ก็ใจร้อนจริงเชียว"
1000505-8 = "ในที่สุดจิตวิญญาณของนักล่าสมบัติก็ตื่นขึ้นมาแล้วสินะ ถือว่าเป็นสัญญาณที่ดีเลย"
1000505-9 = "โรงเรียนอะบิดอสเป็นสถานที่ที่มีประวัติความเป็นมาเก่าแก่มาก เพราะงั้นการหาพื้นที่ที่ซ่อนอยู่#nในโรงเรียนเลยเป็นเรื่องสนุกยังไงล่ะ!"
1000505-10 = "คราวก่อนเราไปคลังเก็บของเก่ามาแล้ว งั้นคราวนี้เราไปอาคารเรียนเก่าที่ถูกปิดไว้ดีมั้ย?"
1000505-13 = "อาคารเรียนเก่า 3 อะบิดอส"
1000505-14 = "แค่กๆ แค่กๆ... ที่นี่ฝุ่นเยอะจัง"
1000505-15 = "มีกองขยะเกลื่อนกลาดเต็มไปหมดเลยแฮะ ส่วนใหญ่เป็นของที่ถูกทิ้งแล้วคงไม่มีประโยชน์อะไรมาก"
1000505-16 = "ระวังด้วยนะครู เดี๋ยวจะสะดุดอะไรล้มไป"
1000505-17 = "[s3] \"มาตอนกลางวันไม่ดีกว่าเหรอ?\"\n[s4] \"น่าขนลุกจัง...\""
1000505-18 = "แหะๆ... ล่าสมบัติตอนกลางคืนมันโรแมนติกจะตายไป และถ้ามาตอนกลางคืนก็ไม่ถูกคนอื่นจับได้ด้วย"
1000505-19 = "แหะๆ~ อย่าบอกนะว่าครูกลัว?"
1000505-20 = "ไม่เป็นไรหรอก ไม่ต้องกลัวนะ เดินตามหลังลุงมาก็พอ"
1000505-21 = "งั้นก็ไปกันต่อเลยนะ"
1000505-22 = "ถ้าเจอของอะไรดีๆ ก็เก็บมาด้วยล่ะ การล่าสมบัติน่ะ ใครดีใครได้น้า"
1000505-25 = "อืม... เดินดูจนทั่วแล้ว แต่ก็ไม่เจออะไรดีๆ เลยแฮะ…"
1000505-26 = "ของที่พอจะใช้ได้คงมีคนเอาไปหมดแล้ว..."
1000505-29 = "(ครืด...)"
1000505-32 = "ที่นี่คงเป็นที่ที่พวกรุ่นพี่สมัยก่อนใช้กันน่ะ ฉันไม่เคยมาเลยไม่ค่อยรู้เท่าไร…"
1000505-33 = "(กรอบแกรบๆ)"
1000505-34 = "หือ...?"
1000505-35 = "ได้ยินเสียงอะไรมั้ย?"
1000505-36 = "เหมือนดังมาจากด้านโน้น…"
1000505-37 = "อะ... อ๊าาาาาา?!"
1000505-39 = "(โครมมม!)"
1000505-40 = "(จี๊ดๆ จี๊ดๆ)"
1000505-41 = "....."
1000505-42 = "เฮ้อ ตกใจหมดเลย"
1000505-43 = "หนูงั้นเหรอ... ทำเอาตกอกตกใจหมด"
1000505-44 = "แต่ก็ต้องขอบใจนะที่ทำให้ของจุกจิกที่กองไว้ทะลักออกมาเพียบเลย"
1000505-45 = "[s] \"...\""
1000505-46 = "..."
1000505-47 = "เอ๋... มีอะไรเหรอครู~? สีหน้ายิ้มกรุ้มกริ่มแบบคนมีชัยชนะนั่นน่ะ?"
1000505-48 = "กำลังคิดว่า \"โฮชิโนะก็ตกใจเป็นเหมือนกันสินะ?\" อยู่ใช่มั้ย..."
1000505-49 = "ก็นะ ต่อให้เป็นฉันก็เถอะ แต่ถ้าเจอแบบเมื่อกี้ก็ก็ต้องตกใจอยู่แล้วละ"
1000505-50 = "แต่ก็เอาเถอะ... ถ้าครูได้เห็นแล้วพอใจละก็นะ... เอ๋? นั่นมัน..."
1000505-52 = "ดูนั่นสิครู พวกของจุกจิกที่ทะลักออกมาตรงนั้นน่ะ... มีอะไรบางอย่างส่องแสงอยู่ด้วย"
1000505-53 = "[s] หยิบกระดาษที่ส่องแสงจางๆ ขึ้นมา"
1000505-55 = "นี่มัน... สติกเกอร์เรืองแสงนี่นา?"
1000505-56 = "แถมเป็นสติกเกอร์รูปปลาด้วย!"
1000505-57 = "ตัวนี้ปลาเขตร้อน... ส่วนนี่ก็หอยโข่ง ปลาหมึก แล้วก็ปลาแสงอาทิตย์... มีแมงกะพรุนด้วย!"
1000505-58 = "ฮิฮิ ครูเจอสมบัติล้ำค่าเลยนะเนี่ย! ยอดไปเลย!"
1000505-59 = "[s] \"มันเก่าจนไม่ค่อยเรืองแสงแล้วนะ...\""
1000505-60 = "แหะๆ... นั่นแหละส่วนที่เจ๋ง ถึงจะอธิบายเหตุผลไม่ได้ก็เถอะ..."
1000505-61 = "แม้จะไม่มีใครเห็น แต่มันส่องแสงอยู่ในที่มืดๆ แบบนี้ตามลำพังมาโดยตลอด..."
1000505-62 = "[s5] \"งั้นครูให้โฮชิโนะแล้วกัน\"\n[s6] \"เป็นของขวัญจากครูนะ\""
1000505-63 = "หืม? หะ... ให้ฉันจริงๆ เหรอ?"
1000505-64 = "หืม? หะ... ให้ฉันจริงๆ เหรอ?"
1000505-65 = "แต่ครูเป็นคนหาเจอนะ งั้นครูก็ควรเก็บไว้สิ นี่คือกฎของการล่าสมบัติ..."
1000505-66 = "[s] ยื่นสติกเกอร์ให้"
1000505-69 = "อ่า... เอ่อ... ขะ... ขอบคุณนะคุณครู"
1000505-72 = "แหะๆ..."
1000505-73 = "มีปลาน่ารักๆ เต็มไปหมดเลย!"
1000505-74 = "เอาไปติดไว้บนเพดานห้องดีกว่า! พอปิดไฟแล้วมันจะต้องเรืองแสงสวยมากแน่ๆ! "
1000505-75 = "ฮิฮิ รีบกลับกันเถอะครู!"
1000505-77 = "(คุณครูเดินกลับออกมาพร้อมกับโฮชิโนะที่ดูร่าเริงสุดๆ)"

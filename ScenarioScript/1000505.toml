1000505-14 = "3;호시노;00;콜록, 콜록…… 여기도 먼지가 많네.\n#3;stiff\n#3;a\n#3;em;[속상함]"
1000505-15 = "3;호시노;02;여기저기 잔뜩 잡동사니들도 많이 쌓여 있고. 대부분 버리고 간 것들이라 쓸만한 건 없겠지만."
1000505-16 = "3;호시노;01;선생, 조심해. 어디 걸려 넘어질 수도 있어."
1000505-17 = "[s3] \"낮에 오는게 좋지 않을까?\"\n[s4] \"으스스하네…….\""
1000505-18 = "3;호시노;02;으헤, 한 밤중의 보물찾기가 로망이 있잖아. 게다가 다른 사람들한테 들킬 일도 없고.\n#3;em;[음표]"

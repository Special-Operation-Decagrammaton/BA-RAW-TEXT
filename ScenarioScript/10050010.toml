[translation]
10050010-1 = "ตอนที่ 1;2+1"
10050010-6 = "..."
10050010-7 = "..."
10050010-8 = "ทรีนิตี้... ให้เข้ามาง่ายๆ แบบนี้ได้เลยเหรอคะ?"
10050010-9 = "คะ... คาดไม่ถึงจริงๆ นะคะ ไม่คิดเลยว่าจะเข้ามาในเขตปกครองตนเองของโรงเรียนอื่นได้แบบไม่มี#nข้อจำกัดแบบนี้..."
10050010-10 = "ฮืม นึกว่าต้องถูกตรวจค้นและเฝ้าระวังจนต้องติดสินบนคนที่นี่ จากนั้นก็แอบทำการค้าลับๆ แล้วค่อยหลบหนีไปเสียอีกค่ะ"
10050010-11 = "กำลังคิดทำอะไรไม่สุจริตอยู่หรอกเหรอคะ หัวหน้า...?"
10050010-12 = "พูดอะไรอย่างนั้นคะ ก็ตอนวางแผนอะไร เราก็ต้องคิดเผื่อถึงสถานการณ์ที่เลวร้ายที่สุดเสมอนี่คะ?"
10050010-13 = "โดยหลักการแล้วฉันก็เห็นด้วยอยู่หรอกค่ะ..."
10050010-14 = "แต่ก็เอาเถอะค่ะ นี่เราเข้ามาได้เหมือนไม่มีอะไรเกิดขึ้นจนฉันสงสัยเลยนะคะว่าเป็นความจริงหรือเปล่า"
10050010-15 = "ไม่ว่าจะเป็นความจริงหรือไม่ เราก็ต้องขายหนังสือที่เหลืออยู่ให้หมดค่ะ..."
10050010-16 = "และถ้านี่คือความจริงเสมือน เราก็ต้องคงกลับบ้านพร้อมเงินดิจิทัลแล้วละค่ะ!"
10050010-23 = "อุ๊ย? สวัสดีค่ะ สบายดีหรือเปล่าคะ? เหมือนเพิ่งได้เจอเป็นครั้งแรกเลย พวกคุณเป็นใครเหรอคะ?"
10050010-24 = "ทะ... ทำยังไงดีล่ะคะ หัวหน้า?!"
10050010-25 = "..."
10050010-26 = "สวัสดีค่ะ! ว้าว~ นี่เรียกว่าโชคชะตาได้หรือเปล่าคะ? พวกฉันคือนักเรียนสถาบันสหภาพเรดวินเทอร์... ที่มาทัศนศึกษาในทรีนิตี้น่ะค่ะ!"
10050010-27 = "บะ... บอกโต้งๆ แบบนี้ได้เลยเหรอคะ?!"
10050010-28 = "เล่นตามน้ำไปก่อนค่ะ ทาคาเนะ ต่อให้เกิดสถานการณ์เลวร้ายที่สุด ก็คงโดนแค่ไล่ออกจากที่นี่ละค่ะ"
10050010-29 = "แต่ฉันว่าการปกปิดจะยิ่งทำให้เกิดความเข้าใจผิดที่ร้ายแรงนะคะ"
10050010-30 = "เรดวินเทอร์! อย่างนี้เองสินะคะ ฉันยินดีมากๆ เลยค่ะที่ได้รู้จักพวกคุณ คิดถูกแล้วละค่ะที่มาทรีนิตี้ ฉันเคย... ค่ะ เคยได้ยินเรื่องราวโรงเรียนพวกคุณมาบ้างค่ะ "
10050010-31 = "ได้ยินว่าต้องต่อสู้กับหมีในสภาพอากาศหนาวจัดทั้งปี แล้วก็ต้องฝึกฝนร่างกายให้ถึงขีดจำกัดเลย#nใช่มั้ยคะ?"
10050010-32 = "พวกเรา... ไม่ได้ใช้ชีวิตแบบนั้นนะคะ..."
10050010-33 = "ให้เป็นอย่างนั้นละค่ะ พูดเออออด้วยไปก่อน"
10050010-34 = "ค่ะ ค่ะ! แต่ที่สำคัญกว่านั้น พวกฉันเข้ามาในโรงเรียนสามัญทรีนิตี้แบบไม่ได้บอกกล่าวใคร ในแง่หนึ่งจะมองว่าเป็นการเสียมารยาทก็ได้..."
10050010-35 = "ไม่ทราบว่าคุณจะ... ว่าอะไรหรือเปล่าคะ?"
10050010-36 = "ตายจริง พูดอะไรอย่างนั้นคะ ฉันจะไปว่าอะไรทำไม เชิญชมโรงเรียนของเราตามสบายเลยค่ะ"
10050010-37 = "แน่นอนว่ามีข่าวลือว่าโรงเรียนสามัญทรีนิตี้ไม่ค่อยผูกสัมพันธ์กับภายนอกอยู่บ้าง และบางส่วนของข่าวลือนั้นก็เป็นความจริง..."
10050010-38 = "แต่พวกเราก็ไม่ได้เป็นแบบนั้นเสมอไปหรอกค่ะ พวกเราก็พยายามเปลี่ยนแปลงทุกอย่างให้ได้มากที่สุด#nเท่าที่จะเป็นไปได้ค่ะ"
10050010-39 = "ในฐานะหนึ่งในสามสถาบันการศึกษาขนาดใหญ่ พวกเรากลับพยายามที่จะเป็นมิตรกับนักเรียนจาก#nภายนอกให้มากขึ้นด้วยซ้ำค่ะ"
10050010-40 = "ขอบคุณสำหรับการต้อนรับค่ะ! ว่าแต่ คุณชอบหรือคุ้นเคยกับการอ่านหนังสือหรือเปล่าคะ?"
10050010-41 = "หนังสือเหรอคะ? ค่ะ ฉันก็อ่านเป็นงานอดิเรกบ้างค่ะ ตอนสวดมนต์ นักเรียนที่นี่ก็ต้องอ่านพระคัมภีร์#nด้วยเหมือนกันค่ะ"
10050010-42 = "เหนือสิ่งอื่นใด หนังสือส่วนใหญ่ที่จัดพิมพ์ในคิโวทอสก็มีให้อ่านที่ห้องสมุดกลางทรีนิตี้ค่ะ"
10050010-43 = "เป็นคำที่ฟังแล้วน่ายินดีที่สุดเลยค่ะ! สำหรับโรงเรียนที่รักการอ่านแล้ว พวกฉันเตรียมหนังสือที่ออกจะ... พิเศษกว่าหนังสือทั่วไปมาด้วยค่ะ"
10050010-48 = "ลองอ่านดูสักหน้าสองหน้ามั้ยคะ? "
10050010-49 = "คะ? อืม... แบบนี้ฉันควรจะเป็นฝ่ายที่กล่าวขอบคุณด้วยซ้ำค่ะ"
10050010-50 = "ถ้างั้นขออ่านดูหน่อย..."
10050010-55 = "นะ... เนื้อหาแบบนี้มัน?!?!"
10050010-56 = "เฮือกก..."
10050010-62 = "ทำไมถึงเป็นแบบนี้ล่ะคะ หัวหน้า?"
10050010-63 = "ทำไมถึงเป็นแบบนี้... นั่นคือสิ่งที่ฉันก็อยากถามเหมือนกันค่ะ"
10050010-64 = "เราเข้าไปปลุกเธอก่อนแล้วค่อยถามเถอะค่ะ นี่ค่ะ ลองชิมกัมปอตนี่ดูนะคะ เป็นสูตรพิเศษของห้องพิเศษ 227 เลยค่ะ"
10050010-65 = "อึก...?! ขะ... ขอบคุณค่ะ แค่จิบเดียวก็ได้สติเลยค่ะ ว่าแต่หนังสือเล่มนั้น..."
10050010-66 = "..."
10050010-67 = "เอ่อ จะว่ายังไงดีล่ะคะ ฉันก็ไม่ได้ไม่ชอบมันขนาดนั้นหรอกนะคะ..."
10050010-68 = "ให้พูดตามตรง... ต้องบอกว่าชอบเลยละ..."
10050010-69 = "แต่มันก็... ค่อนข้างเข้มข้น... ในหลายๆ แง่เลยนะคะ"
10050010-70 = "คะ? เรื่องนี้น่ะเหรอคะ...?"
10050010-71 = "(เอ๋...? หรือว่าในทรีนิตี้จะ...?)"
10050010-72 = "งั้นเหรอคะ? ก็น่าจะอย่างนั้นค่ะ แต่ถึงยังไงก็ไม่มีปัญหาใหญ่หรอกค่ะ!"
10050010-73 = "เพราะส่วนที่สำคัญๆ ไม่ได้ถูกพรรณนาไว้น่ะค่ะ! มั่นใจได้เลยค่ะ! ก็ฉันลงมือเซ็นเซอร์... หมายถึงเอดิตทุกอย่างด้วยตัวเองเลยค่ะ!"
10050010-74 = "ทะ.... ทำอย่างนั้นก็ถูกแล้วค่ะ"
10050010-75 = "แต่พอเป็นแบบนั้น เหมือนมันจะยิ่ง... กระตุ้นจินตนาการให้รุนแรงเข้าไปใหญ่เลยค่ะ..."
10050010-76 = "รู้เรื่องพวกนี้ดีทีเดียวเลยนะคะ คุณลูกค้า ขอบคุณค่ะ"
10050010-77 = "(คุณลูกค้า...?)"
10050010-78 = "เรื่องแบบนี้น่ะ ปกปิดแต่พอดีจะดีกว่าค่ะ"
10050010-79 = "ถึงนักสร้างสรรค์บางคนจะบ้าระห่ำเกินไปจนใส่สุดเลยก็เถอะ... แต่การทำแบบนั้นคือการปิดกั้น#nจินตนาการของผู้อ่านค่ะ!"
10050010-80 = "ก็สิ่งสำคัญที่สุดในสื่อทางวัฒนธรรม ก็คือการเปิดโอกาสให้จินตนาการและเพ้อฝันได้อย่างเต็มที่นี่คะ!"
10050010-81 = "งะ... งั้นเหรอคะ?!"
10050010-82 = "ค่ะ ก็จินตนาการของมนุษย์ไม่มีขีดจำกัดยังไงล่ะคะ และเพราะอย่างนั้น! ระดับของจินตนาการจึงมีได้#nอย่างไม่สิ้นสุด!"
10050010-83 = "ยิ่งเปิดโอกาสให้จินตนาการมากเท่าไร ผู้อ่านก็จะได้โอกาสในการจินตนาการมากเท่านั้น! แล้วผู้อ่านจะเป็นคนก้าวข้ามขีดจำกัดการจินตนาการของตัวเองเองค่ะ"
10050010-84 = "พะ... พอได้ฟังแล้วก็เห็นด้วยเลยค่ะ!"
10050010-85 = "เมื่อกี้เพิ่งบอกว่าเซ็นเซอร์ไปเองไม่ใช่เหรอคะ... หัวหน้า?"
10050010-86 = "เรียกว่าเอดิตค่ะ"
10050010-87 = "แต่ว่า..."
10050010-88 = "แต่ก็นะ พูดตามตรงมันก็คล้ายๆ กับการเซ็นเซอร์นั่นละ แต่เราจะว่าอะไรได้ล่ะคะ ก็สำนักเลขาธิการสั่งให้ทำนี่นา"
10050010-89 = "แต่ก็จำไว้นะคะ ทาคาเนะ! ถ้าจะขายอะไรละก็... เราต้องรู้จักใช้การเซ็นเซอร์ให้เป็นประโยชน์ค่ะ!"
10050010-90 = "สรุปก็คือเราต้องใช้การเซ็นเซอร์เป็นข้ออ้างในการตัดส่วนที่ไม่เหมาะสมออกไป เพื่อเพิ่มมูลค่าทางการค้าให้สูงสุดงั้นเหรอคะ...?"
10050010-91 = "ใช่แล้วค่ะ เราอาจอ้างได้ว่าเป็นการทำเซ็นเซอร์ตามคำสั่งจากเบื้องบน!"
10050010-92 = "จากมุมมองของการบริโภคสินค้าแล้ว การทำแบบนี้ก็มีความเป็นไปได้สูงที่จะให้ผลลัพธ์ที่น่าพอใจค่ะ!"
10050010-93 = "และนักเรียนจากทรีนิตี้คนนี้ก็คือหลักฐานยืนยันค่ะ!"
10050010-94 = "วะ... ว้าวว..."
10050010-98 = "..."
10050010-99 = "สมกับที่เป็นหัวหน้าจริงๆ ค่ะ! ยิ่งเวลาแบบนี้ยิ่งทำให้ฉันเชื่อใจได้เลยละ!"
10050010-100 = "อะ... เอ่อ ไม่ทราบว่า... มีเล่มต่อไป... หรือเปล่าคะ...?"
10050010-101 = "มีสิคะ! มีให้อ่านจนตาแฉะเลยค่ะคุณลูกค้า! ถ้าชอบเนื้อหาแบบนี้ละก็ ช่วยแอบๆ ไปแนะนำนักเรียน#nคนอื่นให้ด้วยจะได้มั้ยคะ?"
10050010-102 = "เฮือก?!"
10050010-103 = "หนังสือเป็นสื่อทางวัฒนธรรมที่มีข้อจำกัดทางกายภาพ... หนังสือเล่มหนึ่งๆ ย่อมไปอยู่ในหลายๆ ที่พร้อมกันไม่ได้ค่ะ"
10050010-104 = "ถ้างั้นก็ซื้อเรื่องเดียวกันไปเพิ่มอีกเล่มมั้ยคะ?"
10050010-105 = "แต่ทำไมถึงต้องมีเรื่องเดียวกันถึง 2 เล่มเลยล่ะคะ...?"
10050010-107 = "ก็เราต้องเก็บไว้เอง 1 เล่ม แล้วก็ให้เพื่อนๆ ยืมอ่านอีก 1 เล่มนี่คะ"
10050010-108 = "การแบ่งปันวัฒนธรรมเดียวกัน จะช่วยพัฒนาความสัมพันธ์ฉันมิตรให้ยิ่งแน่นแฟ้นนะคะ"
10050010-109 = "ฟะ... ฟังดูมีเหตุผล...!"
10050010-110 = "แต่ว่า... แค่นั้นจะพอจริงๆ เหรอคะ คุณลูกค้า?"
10050010-111 = "หนังสือคือสิ่งที่เปิดอ่านบ่อยๆ แล้วจะยิ่งเยินและสึกหรอไม่ใช่เหรอคะ ยิ่งเป็นเนื้อหาฟินๆ แล้วด้วย...?"
10050010-112 = "อ๊ะ!"
10050010-113 = "เพื่อนักอ่านเหล่านั้นแล้ว ฉันมีหนังสือใหม่เอี่ยมที่ยังไม่แกะพลาสติกเลยด้วยเหมือนกันค่ะ"
10050010-114 = "ซื้อเก็บไว้เผื่ออีกเล่มก็น่าจะดีนะคะ ว่ายังไงล่ะคะ?"
10050010-115 = "อย่างที่คุณลูกค้าอาจทราบอยู่แล้ว ปกติหนังสือต้องมีไว้สำหรับเก็บเข้าตู้ สำหรับอ่านเอง และสำหรับให้คนอื่นยืมอ่านค่ะ"
10050010-116 = "(นั่นเรียกว่าปกติเหรอ...?)"
10050010-117 = "ตะ... แต่แบบนั้นก็แปลว่าเราต้องซื้อหนังสือเรื่องเดียวกันถึง 3 เล่มเลยสิคะ...?"
10050010-118 = "สำหรับคุณลูกค้าแล้ว ตอนนี้เรามีจำหน่ายแบบเซ็ต 2+1 ในราคาลด 15% เลยค่ะ!"
10050010-119 = "ซื้อค่ะ"
10050010-120 = "ขอบคุณค่ะ! ช่วยบอกต่อคนรอบข้างด้วยนะคะ!"
10050010-126 = "เป็นยังไงล่ะคะ ทาคาเนะ?"
10050010-127 = "ฉันก็มีหลายคำที่อยากพูดนะคะ..."
10050010-128 = "แต่ก็ช่วยไม่ได้ค่ะ เวลานี้ฉันคงไม่มีทางเลือกอื่นนอกจากยอมรับในความสามารถของหัวหน้าค่ะ"
10050010-129 = "เท่านั้นก็เพียงพอแล้วละค่ะ ฮิ ฮิ ฮิ"
10050010-133 = "งั้นเรามาเริ่มอย่างจริงจังกันเลยมั้ยคะ? ไปแต่งแต้มสีสันของเราในทรีนิตี้กันเถอะค่ะ!"
10050010-135 = "คุณรู้หรือเปล่าคะ...? เรื่องที่กำลังเป็นที่พูดถึง... ในทรีนิตี้ช่วงนี้..."
10050010-136 = "เรื่องที่กำลังเป็นที่พูดถึงในทรีนิตี้ก็น่าจะมีหลายอย่าง... คุณหมายถึงเรื่องไหนเหรอคะ?"
10050010-137 = "เรื่องนั้นก็คือ..."
10050010-138 = "ตายจริง..."
10050010-139 = "โชคดีที่ฉันมีเล่มถัดไปพอดีค่ะ สนใจอ่านมั้ยล่ะคะ?"
10050010-140 = "ถ้าไม่เป็นการรบกวนละก็ วันนี้ฉันขอยืมได้มั้ยคะ?"
10050010-141 = "ได้เลยค่ะ การได้มีเพื่อนที่ชื่นชมในความงดงามเดียวกัน... เป็นเรื่องที่ฉันยินดีเลยค่ะ"
10050010-143 = "จะอ่านอะไรแบบนี้... ได้เหรอ...?"
10050010-144 = "ผิดหวังในตัวฉันเหรอคะ...?"
10050010-145 = "จะเป็นอย่างนั้นไปได้ยังไงคะ ความงดงามเป็นสิ่งที่มอบความสุขให้กับทุกคนอยู่แล้วค่ะ"
10050010-146 = "งั้นฉันต้องอาศัยความเมตตาของคุณแล้วละค่ะ..."
10050010-155 = "นี่มัน...?"
10050010-156 = "ถ้าได้อ่านแล้วอาจจะผิดหวังก็ได้ แต่ฉันคิดตามประสาของตัวเองว่าพล็อตแบบนี้น่าจะดี... ก็เลยลองเขียนหนังสือเล่มนี้มาค่ะ"
10050010-157 = "ตะ... แต่แน่นอนว่ามันคงเทียบกับต้นฉบับไม่ได้ค่ะ..."
10050010-158 = "ฉันจะตั้งใจอ่านเลยค่ะ ถ้าจะเชิญไปกับฉันด้วยจะได้มั้ยคะ?"
10050010-159 = "ค่ะ ด้วยความยินดีเลยค่ะ"
10050010-171 = "เป็นใบชาคุณภาพดีเลยนะคะ..."
10050010-172 = "ค่ะ ใบชารอบนี้ได้มาอย่างยากลำบากเลยค่ะ คุณนางิสะ"
10050010-177 = "ก็น่าจะเป็นแบบนั้นค่ะ ทั้งรสชาติ กลิ่นหอม ทุกอย่างยอดเยี่ยมไร้ที่ติเลยค่ะ เป็นชาเอิร์ลเกรย์ที่ผสม#nจากเบสชาดาร์จีลิงใช่มั้ยคะ?"
10050010-178 = "เหนือกลิ่นขององุ่นเขียวที่หอมกรุ่นและบางเบา คือกลิ่นซิตรัสที่แสดงตัวตนออกมาอย่างชัดเจน ช่างน่าประทับใจจริงๆ นะคะ นี่เป็นเครื่องยืนยันว่าน้ำมันมะกรูดที่ใช้ยังสดใหม่มากค่ะ"
10050010-179 = "ต้องขอบคุณอีกครั้งที่ช่วยหาชาดีๆ แบบนี้มาให้นะคะ"
10050010-180 = "ไม่หรอกค่ะ น่าดีใจนะคะที่คุณนางิสะถูกใจ"
10050010-183 = "เงียบสงบดีจังเลยนะคะ... รู้สึกเหมือนได้รับการเยียวยาเลยค่ะ"
10050010-184 = "ถ้าคุณครูมาอยู่ที่นี่ด้วยก็คงจะดีกว่านี้... แต่ยังไงฉันก็ต้องรู้จักพอใจในสิ่งที่เป็นตอนนี้ค่ะ"
10050010-186 = "จะว่าไป ฉันได้ยินว่าหมู่นี้มีหนังสือสนุกๆ ที่กำลังเป็นกระแสในทรีนิตี้ คุณพอทราบมั้ยคะ?"
10050010-187 = "หนังสือสนุกๆ... อ้อ ค่ะ! ฉันซื้อหนังสือเล่มนั้นมาไว้เหมือนกันค่ะ!"
10050010-188 = "ถึงฉันจะยังไม่ได้เปิดอ่าน แต่เหมือนทุกคนจะชื่นชอบและรีวิวในเชิงบวก งั้นก็น่าจะเป็นหนังสือที่ดีนะคะ"
10050010-189 = "ตายจริง นั่นเป็นข่าวดีเลยนะคะ"
10050010-190 = "แต่ก็มีบางอย่างที่แปลกๆ อยู่ค่ะ "
10050010-191 = "ถ้าใครพูดถึงเรื่องราวในหนังสือเล่มนั้น ก็จะมีนักเรียน 2-3 คนที่พยายามหลบเลี่ยงวงสนทนา ราวกับพวกเธอมีเรื่องลับๆ ที่ต้องพูดคุยกันอย่างนั้นละค่ะ"
10050010-192 = "ฮุฮุ การส่งเสริมความสามัคคีและมิตรภาพระหว่างนักเรียนเป็นสิ่งที่เราควรสนับสนุนค่ะ"
10050010-193 = "ยิ่งเป็นสิ่งที่สนุกขนาดนั้นแล้วด้วย ถ้าเป็นเราก็คงอยากแบ่งปันกับคนที่มีความสนใจเหมือนกันนี่คะ? ฉันมองว่านี่เป็นเรื่องที่พอเข้าใจได้ค่ะ"
10050010-194 = "ค่ะ ก็คงอย่างนั้นค่ะ ฉันก็คิดเหมือนกันค่ะ"
10050010-195 = "ขอฉันดูหนังสือที่ว่าด้วยคนได้มั้ยคะ? พอได้ยินก็อดไม่ได้ที่จะอยากอ่านไปด้วยเลยค่ะ..."

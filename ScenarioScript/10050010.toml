[translation]
10050010-1 = "第1話;2+1"
10050010-6 = "……"
10050010-7 = "……"
10050010-8 = "三一這樣……真的沒問題嗎？"
10050010-9 = "確，確實出乎意料呢。#n沒想到居然能這麼輕易地進入其他學園的自治區……"
10050010-10 = "呼呣……本來為了以防萬一，#n我連受到盤問、監視、賄賂，甚至是逃亡或暗中活動的計畫都準備好了呢。"
10050010-11 = "……你一直在想那些亂七八糟的事嗎，部長？"
10050010-12 = "怎麼這麼說呢？#n制定計劃的時候，本來就該考慮到最壞的情況啊？"
10050010-13 = "這點我原則上也同意啦……"
10050010-14 = "總之進入這裡的順利程度，已經讓我不禁懷疑這是不是現實了。"
10050010-15 = "不管是不是現實，我們都必須把這些庫存給處理……我是說賣出去。"
10050010-16 = "就算這是虛擬現實，也得帶一堆虛擬貨幣回去才行！"
10050010-23 = "哎呀？貴安。#n先前似乎沒見過兩位呢，請問你們是……？"
10050010-24 = "該，該怎麼辦才好，部長！？"
10050010-25 = "……"
10050010-26 = "您好您好！哎呀～這也算是一種緣分吧。#n我們是來自赤冬聯邦學園的……對了！是來三一參觀的學生！"
10050010-27 = "直，直接說出來沒問題嗎！？"
10050010-28 = "你先冷靜點，貴音。#n反正最糟也頂多是被驅逐出去而已。"
10050010-29 = "要是因為遮遮掩掩引發更大的誤會，那才真的會出問題。"
10050010-30 = "原來是赤冬呀！很高興見到你們。歡迎來到三一。#n我曾經聽說過一些……嗯，關於你們的事情。 "
10050010-31 = "據說赤冬的學生為了將身體鍛鍊到極限，總是在嚴寒中與熊搏鬥是嗎？"
10050010-32 = "我們沒有做那種事啊……"
10050010-33 = "就當是那樣吧。反正配合他就對了。"
10050010-34 = "是，是的！話說回來，我們沒有先打聲招呼就直接進入三一綜合學園……#n某種意義上來說，或許稱得上是貿然闖入……"
10050010-35 = "請問……這樣沒關係嗎……？"
10050010-36 = "哎呀，怎麼會有關係呢。#n歡迎兩位隨意參觀。"
10050010-37 = "當然有傳聞說三一綜合學園比較封閉，而且其中的某些部分也是事實……"
10050010-38 = "不過並非一直都是這樣的。#n我們也正在盡可能做出改變。"
10050010-39 = "作為三大學園之一，我們正在努力對更多外校學生展現親切的一面。"
10050010-40 = "感謝您的介紹！#n話說，請問您喜歡書或故事之類的東西嗎？"
10050010-41 = "你說書嗎……？#n嗯，偶爾看書算是我的興趣和習慣，禮拜時間也必須閱讀經典。"
10050010-42 = "而且奇普托斯出版的絕大多數書籍，在三一中央圖書館都有收藏呢。"
10050010-43 = "真高興聽到您這麼說！#n我們正好帶來了一些……可能有點特別的書。"
10050010-48 = "要不要試著讀幾頁看看呢？"
10050010-49 = "嗯？那當然沒問題……我很樂意。"
10050010-50 = "那麼，我看看……"
10050010-55 = "這，這個內容是！？！？"
10050010-56 = "哈哇哇……"
10050010-62 = "這究竟是怎麼回事，部長？"
10050010-63 = "我才想問呢……"
10050010-64 = "總之先叫醒他再說吧。#n來，請喝一口康波特吧。是227號特製的哦。"
10050010-65 = "唔唔……！？#n謝，謝謝。我感覺清醒多了。#n話說回來，那本書……"
10050010-66 = "……"
10050010-67 = "該，該怎麼說呢，我其實並不討厭……"
10050010-68 = "老實講……甚至覺得還不錯……"
10050010-69 = "不過從各方面來說……實在有點刺激呢……"
10050010-70 = "嗯？這本嗎……？"
10050010-71 = "（哦……？難道在三一，這種程度就已經……？）"
10050010-72 = "原來如此啊，說的也是呢！#n不過話雖如此，這也不是什麼太大的問題！"
10050010-73 = "因為最重要的部分並沒有直接描寫出來！#n畢竟我全部都審查……更正，是編輯過了嘛！"
10050010-74 = "確，確實如此……"
10050010-75 = "但是，該怎麼說好呢……似乎正是因為這樣，反而更加令人……"
10050010-76 = "客人您還真內行呢。謝謝您。"
10050010-77 = "（客人……？）"
10050010-78 = "本來這種東西的關鍵，就在於適度地點到為止。"
10050010-79 = "結果那些創作者，經常寫著寫著就失控到停不下來……#n那簡直是只知其一，不知其二的行為！"
10050010-80 = "明明在文化媒體中最重要的，就是留下想像空間啊！"
10050010-81 = "是，是這樣嗎！？"
10050010-82 = "沒錯，因為人的想像力是沒有極限的──也因此不存在任何尺度限制！"
10050010-83 = "只要留下適度的想像空間！尺度自然也會突破極限！"
10050010-84 = "聽，聽你這麼一說，好像確實是這樣！"
10050010-85 = "……部長剛才是說審查嗎？"
10050010-86 = "是編輯才對。"
10050010-87 = "但是……"
10050010-88 = "雖然嚴格來說……我確實做了類似審查的事沒錯。#n不過這是事務局的要求，我又能怎麼辦呢。"
10050010-89 = "可是你要記住，貴音！#n想要把東西賣出去……就必須連審查都懂得利用才行！"
10050010-90 = "也就是說，部長以審查為由進行了適度編輯，反而最大化了商品的潛力……？"
10050010-91 = "正是如此。#n而且對上頭也能用「已經按照指示完成審查」來推託！"
10050010-92 = "從消費者的立場來說，也可能因此得到更滿意的結果！"
10050010-93 = "現在眼前這位三一學生，就是最好的證據！"
10050010-94 = "哈，哈哇哇……"
10050010-98 = "……"
10050010-99 = "不愧是部長！只有這種時候特別可靠呢！"
10050010-100 = "那，那個……請問還有下一集嗎……？"
10050010-101 = "有有有，當然有囉！#n如果客人您喜歡的話，不妨低調推薦給身邊的朋友哦！"
10050010-102 = "咿呀！？"
10050010-103 = "書是具有物理限制的文化媒介……一本書不可能同時存在於兩個地點。"
10050010-104 = "從這個意義來說，要不要再買一本一樣的呢！"
10050010-105 = "為什麼要買兩本一樣的呢……？"
10050010-107 = "當然是因為一本要自己留著用，另一本要借給朋友們看囉？"
10050010-108 = "藉由共享同樣的文化，能夠建立起更加廣闊且親密的友誼關係哦！"
10050010-109 = "聽，聽你這麼一說……！"
10050010-110 = "話說回來……真的只要這樣就好嗎，這位客人？"
10050010-111 = "書本這種東西，翻久了可是會磨損變舊的哦？"
10050010-112 = "啊！"
10050010-113 = "為了滿足有這種煩惱的讀者，我們這裡還有未經拆封的新品。"
10050010-114 = "就當作是以防萬一……再買一本保存用的書本如何呢？"
10050010-115 = "或許您也已經知道……#n這種東西收藏用、觀賞用、傳教用各買一本，可是基本常識哦。"
10050010-116 = "（原來有這種常識嗎……？）"
10050010-117 = "可，可是這樣不就要買三本一模一樣的書了嗎……？"
10050010-118 = "為了像您這樣的客人，我們現在有推出「購買2+1套書享八五折」的優惠哦！"
10050010-119 = "我買了。"
10050010-120 = "謝謝惠顧！也請您幫我們向身邊的朋友多多宣傳囉！"
10050010-126 = "你覺得怎麼樣呢，貴音？"
10050010-127 = "雖然各方面都有很多話想說……"
10050010-128 = "不過這種時候，確實不得不佩服部長的能力呢。"
10050010-129 = "那樣就夠了。呣呵呵呵呵。"
10050010-133 = "那麼就正式開始吧──讓三一染上我們的色彩！"
10050010-135 = "……你知道嗎？#n最近在三一……很流行的那個故事……"
10050010-136 = "三一流行的東西可多了……你指的是哪一個呢？"
10050010-137 = "就是……"
10050010-138 = "哎呀……"
10050010-139 = "我這裡剛好有續集哦……你打算怎麼做？"
10050010-140 = "如果方便的話，今天可以打擾一下嗎？"
10050010-141 = "我很樂意。#n能分享美好事物的朋友又多了一個呢……"
10050010-143 = "接觸這樣的故事……真的沒問題嗎？"
10050010-144 = "……有幻滅的感覺嗎？"
10050010-145 = "怎麼會呢。美好的事物能為所有人帶來喜悅。"
10050010-146 = "那麼，就仰賴姐妹的恩典了……"
10050010-155 = "這是……？"
10050010-156 = "不知道會不會讓你失望，不過這是我自己想像後續發展……試著創作出來的書。"
10050010-157 = "當，當然我也認為這遠遠比不上原作……"
10050010-158 = "我會心懷感激地拜讀的。可以請你同席相伴嗎？"
10050010-159 = "好的，我很樂意。"
10050010-171 = "……真是不錯的茶葉呢。"
10050010-172 = "是的，我這次特別花了一點心思。渚大人。"
10050010-177 = "看得出來。味道和香氣都無可挑剔呢。#n是以大吉嶺為基底調配的伯爵茶對吧？"
10050010-178 = "在淡雅的白葡萄香氣上，辛辣地宣示著存在感的柑橘香味令人印象深刻。#n我想這也證明了佛手柑油的新鮮程度吧。"
10050010-179 = "再次感謝你為我準備了這麼好的茶。"
10050010-180 = "您言重了。很高興渚大人能夠滿意。"
10050010-183 = "很平靜呢……有種被療癒了的感覺。"
10050010-184 = "如果老師也在這裡就更好了……不，我得懂得知足才行。"
10050010-186 = "這麼說來……我聽說最近三一在流行一本有趣的書，你知道嗎？"
10050010-187 = "有趣的書……啊，是的！我剛好也有入手那本書！"
10050010-188 = "雖然還沒看過內容，不過既然獲得一片好評，想必是本好書吧？"
10050010-189 = "哎呀，那真是個好消息。"
10050010-190 = "不過，有一點倒是有些奇怪。 "
10050010-191 = "只要一提到那本書，總是會有兩三個人突然離席，彷彿要分享什麼祕密似的。"
10050010-192 = "呵呵。學生之間增進友情與交流，反而是件值得鼓勵的事。"
10050010-193 = "尤其既然是那麼有趣的東西，同好之間也會更希望互相分享吧？我完全可以理解。"
10050010-194 = "是啊，說的也是呢？我也這麼認為。"
10050010-195 = "可以借我看看那本書嗎？#n我實在不禁感到好奇。"
10050010-196 = "好的，渚大人。書在這裡。"
10050010-200 = "那麼，讓我看看……"
10050010-205 = "……"
10050010-209 = "！？！？！？"
10050010-215 = "渚，渚大人？渚大人！？！？"

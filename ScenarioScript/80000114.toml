[translation]
80000114-1 = "ความลับระหว่างสองเรา"
80000114-2 = "(มีใครบางคนเข้ามาหาในช่วงบ่ายแก่ๆ ระหว่างที่คุณครูกำลังทำงานอยู่ในสำนักงาน)"
80000114-8 = "สวัสดี! คุณครู! อิบูกิมาหาน่ะ!"
80000114-9 = "สบายดีไหม?"
80000114-10 = "[s] \"ไม่เจอกันนานเลยนะ อิบูกิ!\""
80000114-11 = "แหะๆๆ มาเข้าคำถามเลยดีกว่า!"
80000114-12 = "วันนี้อิบูกิมาที่ชาเล่ต์ทำไมน้า~?"
80000114-13 = "[s1] \"อืม... เพราะคิดถึงครู?\"\n[s2] \"เพราะอยากมาเล่นกับครู?!\""
80000114-16 = "แอด แอด! น่าเสียดายนะ! ถ้าเป็นเมื่อวานละก็คงเป็นคำตอบถูกต้อง~ แต่ว่าวันนี้เหตุผลไม่เหมือนเดิม#nหรอกนะ!"
80000114-17 = "วันนี้อิบูกิมาที่นี่เพราะมีของอยากให้คุณครูต่างหากล่ะ!"
80000114-18 = "แต่นแต๊น! นี่ไง!"
80000114-25 = "ได้ยินมาว่าวันนี้เป็นวันวาเลน... วาเลนทะ...? อะไรสักอย่างน่ะ"
80000114-26 = "แหะๆ อิบูกิก็ไม่ค่อยแน่ใจเท่าไร แต่เห็นว่าเป็นวันที่ควรให้ของหวานๆ กับคุณครูน่ะ!"
80000114-27 = "อิบูกิก็เลยตั้งใจทำสิ่งนี้มาให้คุณครูโดยเฉพาะเลย!"
80000114-28 = "พุดดิ้งช็อกโกแลตสูตรพิเศษของอิบูกิ!"
80000114-29 = "[s] \"ดูน่าอร่อยมากเลย!\""
80000114-30 = "ใช่มั้ยล่ะ?"
80000114-31 = "อิบูกิใส่แต่ช็อกโกแลตกับขนมที่หวานที่สุดที่เคยกินมาเลยละ!"
80000114-32 = "มันต้องอร่อยมากๆ แน่นอน! รีบชิมสิคุณครู!"
80000114-33 = "[s3] \"อื้ม งั้นลองชิมดูเลยนะ\"\n[s4] ชิมพุดดิ้งช็อกโกแลต"
80000114-39 = "เป็นไงบ้าง? อร่อยมั้ยคุณครู? "
80000114-40 = "[s5] \"หวานอร่อยมากเลย!\"\n[s6] \"หวานมาก...! หวานจน... อร่อยมากเลย!\""
80000114-43 = "(จ้อง) ..."
80000114-44 = "[ns] กินพุดดิ้งอีกคำ"
80000114-47 = "(กลืนน้ำลาย)"
80000114-51 = "[ns] \"อิบูกิก็มากินด้วยกันมั้ย?\""
80000114-52 = "อ๊ะ ไม่ได้หรอก!"
80000114-53 = "พุดดิ้งช็อกโกแลตอันนี้เป็นของขวัญที่อิบูกิให้คุณครู... แล้วก็... แล้วก็..."
80000114-54 = "อิบูกิยังไม่ได้กินข้าวเย็นเลย"
80000114-55 = "พวกรุ่นพี่บอกไว้ว่าห้ามกินของว่างก่อนกินข้าวน่ะ..."
80000114-56 = "อิบูกิต้องกลับไปกินข้าวเย็น เพราะงั้นพุดดิ้งช็อกโกแลตอันนี้คุณครูกินคนเดียวเถอะนะ..."
80000114-57 = "[s] \"อิบูกิเก่งมากเลย เชื่อฟังพี่ๆ ดีมากเลยนะ\""
80000114-58 = "อะ... อื้ม..."
80000114-59 = "[s] \"แต่ที่นี่ไม่มีรุ่นพี่อยู่ด้วย กินสักคำสองคำคงไม่เป็นไรหรอกเนอะ?\""
80000114-60 = "เฮือก!"
80000114-61 = "ตะ... แต่ว่า... ถ้าอิ่มของหวานจนกินข้าวเย็นไม่ได้... พวกรุ่นพี่จะ..."
80000114-62 = "(กลืนน้ำลาย...)"
80000114-63 = "[s] \"แค่แอบกินนิดหน่อยน่ะ\""
80000114-64 = "แอบกินเหรอ...?"
80000114-65 = "[s] \"อื้ม แล้วก็เก็บเรื่องนี้ไว้เป็นความลับระหว่างเราไง!\""
80000114-66 = "ความลับของอิบูกิ... กับคุณครู..."
80000114-67 = "อื้ม! งั้นก็ได้!"
80000114-68 = "คุณครูต้องเก็บความลับให้ดีด้วยนะ! อิบูกิก็จะไม่บอกใครเด็ดขาด!"
80000114-69 = "[s] \"แน่นอนอยู่แล้ว!\""
80000114-70 = "แหะๆ ถ้างั้นก็จะกินแล้วนะคะ!"
80000114-72 = "(หลังจากนั้นคุณครูกับอิบูกิก็กินพุดดิ้งช็อกโกแลตด้วยกัน)"

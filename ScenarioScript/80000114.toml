[translation]
80000114-1 = "The Duo's Secret"
80000114-2 = "I was working at the office on a late afternoon when someone paid a visit."
80000114-8 = "Ibuki's here, Sensei!"
80000114-9 = "How are you?"
80000114-10 = "[s] \"It's been a while, Ibuki!\""
80000114-11 = "Heeheehee, pop quiz!"
80000114-12 = "Why's Ibuki at Schale today?"
80000114-13 = "[s1] \"Hm... Was it to see Sensei?\"\n[s2] \"Easy! You wanted to play with Sensei!\""
80000114-16 = "Almost! You would've been right...yesterdaaay! Today's different!"
80000114-17 = "Ibuki came here to give you something, Sensei!"
80000114-18 = "Ta-da! Here!"
80000114-25 = "Ibuki heard that today is Varen...? Valenta...? Something V-Day!"
80000114-26 = "Heehee, Ibuki doesn't know what it's about, but Ibuki heard it's a day to share something sweet with Sensei!"
80000114-27 = "So, Ibuki made this for you!"
80000114-28 = "It's Ibuki's special chocolate pudding!"
80000114-29 = "[s] \"It looks amazing!\""
80000114-30 = "Right? Right?"
80000114-31 = "Ibuki mixed in the sweetest chocolate and snacks Ibuki has ever tasted!"
80000114-32 = "It'll be super duper delicious, Sensei! You gotta try it!"
80000114-33 = "[s3] \"Okay, shall I give it a try?\"\n[s4] Bon appetit."
80000114-39 = "How is it, Sensei? Is it good?"
80000114-40 = "[s5] \"It's sweet and tasty!\"\n[s6] \"It's very sweet! It's tasty...because it's so sweet!\""
80000114-43 = "(stare)"
80000114-44 = "[ns] Take another bite."
80000114-47 = "*gulp*"
80000114-51 = "[ns] \"You want some too, Ibuki?\""
80000114-52 = "N-No!"
80000114-53 = "The chocolate pudding is a gift for Sensei... But... But..."
80000114-54 = "Ibuki hasn't had dinner yet."
80000114-55 = "The upperclassmen told Ibuki to not have snacks before dinner..."
80000114-56 = "Ibuki needs to go back and eat dinner, so you can have all the chocolate pudding."
80000114-57 = "[s] \"I'm really proud of you for listening to your upperclassmen, Ibuki.\""
80000114-58 = "Y-Yeah..."
80000114-59 = "[s] \"But since your upperclassmen aren't here...maybe it's okay to have just a small bite?\""
80000114-60 = "*gasp*"
80000114-61 = "B-But...Upperclassmen said...Ibuki would be too full for dinner..."
80000114-62 = "*gulp*"
80000114-63 = "[s] \"That's why you should take a tiny bite without them knowing.\""
80000114-64 = "Without them knowing?"
80000114-65 = "[s] \"Yes, it'll be our secret!\""
80000114-66 = "A secret...with Sensei..."
80000114-67 = "Ooh! Ibuki likes that!"
80000114-68 = "But Sensei, you have to keep this a secret, okay? Ibuki won't tell either!"
80000114-69 = "[s] \"Of course!\""
80000114-70 = "Heehee, thanks for the snack!"
80000114-72 = "With that, I split my pudding with Ibuki. Her upperclassmen never suspected a thing."

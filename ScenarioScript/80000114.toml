[translation]
80000114-1 = "兩人之間的祕密"
80000114-2 = "（下午時分，在夏萊辦公時有客人來訪）"
80000114-8 = "呀齁～老師！伊吹來了唷！"
80000114-9 = "最近過得好嗎？"
80000114-10 = "[s]「好久不見，伊吹！」"
80000114-11 = "耶嘿嘿，現在是問答時間！"
80000114-12 = "今天伊吹是為什麼來到夏萊～呢？"
80000114-13 = "[s1]「嗯……因為想念老師嗎？」\n[s2]「我猜……是為了和老師一起玩！」"
80000114-16 = "真可惜！如果是昨天的話，應該就是正確答案了～#n可是今天跟平常不一樣！"
80000114-17 = "伊吹今天來，是為了送老師禮物！"
80000114-18 = "鏘～！就是這個！"
80000114-25 = "聽說今天是情……情人……節？"
80000114-26 = "嘿嘿，雖然伊吹不太清楚，不過大概知道是跟老師分享甜食的日子！"
80000114-27 = "所以為了送給老師，伊吹自己做了這個！"
80000114-28 = "伊吹特製巧克力布丁！"
80000114-29 = "[s]「看起來很好吃耶！」"
80000114-30 = "對吧對吧？"
80000114-31 = "伊吹在裡面加了自己吃過最甜的巧克力和餅乾！"
80000114-32 = "絕對會很好吃的！老師快吃吃看吧！"
80000114-33 = "[s3]「嗯，那我就不客氣囉！」\n[s4] 品嚐巧克力布丁"
80000114-39 = "怎麼樣？老師？好吃嗎？"
80000114-40 = "[s5]「真的又甜又好吃！」\n[s6]「好甜……！因為很甜……所以很好吃！」"
80000114-43 = "……（盯）"
80000114-44 = "[ns] 再吃一口"
80000114-47 = "……（咕嚕）"
80000114-51 = "[ns]「……伊吹，要不要一起吃？」"
80000114-52 = "不，不可以！"
80000114-53 = "巧克力布丁是要給老師的禮物……還有……還有……"
80000114-54 = "現在還沒吃晚餐。"
80000114-55 = "前輩們說不可以在晚餐前吃點心……"
80000114-56 = "伊吹要回去吃晚餐，所以巧克力布丁就給老師一個人吃……"
80000114-57 = "[s]「伊吹真乖巧呢，那麼聽前輩們的話。」"
80000114-58 = "唔，嗯……"
80000114-59 = "[s]「但是前輩們現在不在這裡，吃一點點應該沒關係吧？」"
80000114-60 = "啊！"
80000114-61 = "可，可是……前輩們說……這樣就不能吃晚餐了……"
80000114-62 = "……（咕嚕）"
80000114-63 = "[s]「那我們……偷吃一點點就好。」"
80000114-64 = "偷吃……？"
80000114-65 = "[s]「嗯，這是我們兩個人的祕密，誰都不會知道哦！」"
80000114-66 = "跟老師的……祕密……"
80000114-67 = "嗯！那伊吹要吃布丁！"
80000114-68 = "老師一定要保密唷？伊吹也不會說出去的！"
80000114-69 = "[s]「當然！」"
80000114-70 = "嘿嘿，我要開動了！"
80000114-72 = "（之後，和伊吹一起品嚐了好吃的巧克力布丁）"

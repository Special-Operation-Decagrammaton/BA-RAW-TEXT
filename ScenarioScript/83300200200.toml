[translation]
83300200200-6 = "Phew. What is all this?"
83300200200-7 = "They should have at least warned us before demanding so much!"
83300200200-8 = "They don't care about the trouble they're causing us at all..."
83300200200-9 = "You're right!!! Why are they being so harsh? We're doing our best!"
83300200200-10 = "Ugh... What should I do...?"
83300200200-16 = "Fuuka? Pardon me, but I have a question I wish to ask you."
83300200200-17 = "Huh? Head Prefect? What can I help you with?"
83300200200-18 = "I was told you might be able to give me information about the Gehenna Party."
83300200200-19 = "Ah... The Gehenna Party..."
83300200200-20 = "That's precisely our problem!"
83300200200-21 = "We've never had to deal with such a large request..."
83300200200-22 = "What kind of request?"
83300200200-23 = "We got an absurd order to prepare enough food for the Gehenna Party in only five days!"
83300200200-24 = "It's just too much!"
83300200200-25 = "And they didn't just give us the order and allow us to work on it ourselves..."
83300200200-26 = "They even foisted a bunch of ingredients that we didn't ask for off on us! They're piled over there!"
83300200200-28 = "Ingredients?"
83300200200-29 = "Ugh, they said that the party food was obviously the responsibility of the School Lunch Club, even though we've never catered it before!"
83300200200-30 = "Why do we have to do all this? Don't we deserve a Valentine's Day break too?!"
83300200200-31 = "Yeah!!! Give Fuuka a break!"
83300200200-32 = "But...Fuuka, don't worry! Even if they don't relent!"
83300200200-33 = "Even if I have to cook all the food myself... I'll work hard so that you can take a break!"
83300200200-34 = "Um, Juri, I'm grateful to you... But something incredible would happen if we tried that..."
83300200200-39 = "(...The School Lunch Club received a massive catering order and they were supplied with a huge amount of ingredients against their wishes.)"
83300200200-42 = "Fuuka, would you mind if I examine the ingredients you mentioned?"
83300200200-43 = "Hm? Feel free, they're right over there. I can trust the head prefect to respect my kitchen."
83300200200-44 = "I'm glad to hear that, but does that mean there are people you can't trust?"
83300200200-45 = "Well. The Gourmet Society likes to raid us for ingredients whenever we get new shipments. And sometimes they take us hostage and make us cook for them. Or when the gourmets hear we have a new menu and go absolutely wild...!"
83300200200-46 = "...That sounds like a trial."

[translation]
83300200200-6 = "什麼跟什麼嘛～～"
83300200200-7 = "要做這種事至少該事先通知一下吧！"
83300200200-8 = "根本完全沒顧慮我們的情況～～"
83300200200-9 = "就是說呀～太過分了～完全沒顧慮我們的情況～～"
83300200200-10 = "嗚嗚嗚。真是的，這下該怎麼辦才好……"
83300200200-16 = "風華？我有點事想問你。"
83300200200-17 = "嗯？這不是風紀委員長嗎？有什麼事？"
83300200200-18 = "我想問你知不知道跟格黑娜派對有關的消息。"
83300200200-19 = "啊……格黑娜派對……"
83300200200-20 = "沒錯！那就是問題所在！"
83300200200-21 = "真的出大事了……"
83300200200-22 = "出大事……"
83300200200-23 = "怎麼可以突然說5天後要舉辦格黑娜派對，#n就要求我們準備所有當天要吃的食物，太不合理了！"
83300200200-24 = "我們收到了無理的要求！"
83300200200-25 = "而且如果只是說說就算了。"
83300200200-26 = "他們還擅作主張訂購我們不想要的食材，把那邊堆滿滿的！"
83300200200-28 = "食材……？"
83300200200-29 = "嗚嗚，雖然每年都會舉辦派對……#n這次卻強制要求供給部來負責餐點，根本是在強人所難嘛。"
83300200200-30 = "真的非做不可嗎？為什麼會變成這樣呢？#n明明是難得的情人節，稍微讓人休息一下也可以吧！"
83300200200-31 = "沒錯！請保障風華前輩的休息時間！"
83300200200-32 = "但是……如果真的沒辦法的話……請別擔心！前輩！"
83300200200-33 = "為了讓前輩能休息……就算只有我一個人也會好好努力的！"
83300200200-34 = "茱莉有這份心意我很高興……#n但那樣的話……可能會把事情鬧大……"
83300200200-39 = "（……已經擅作主張訂購大量的食材送到供給部）"
83300200200-42 = "風華，可以看一下你說的食材嗎？"
83300200200-43 = "嗯？食材就在那邊，你直接看沒關係。#n畢竟風紀委員長是值得信賴的人。"
83300200200-44 = "謝謝你這麼說，不過你的意思是有人無法信賴嗎？"
83300200200-45 = "這個嘛……比如美食研究會、美食研究會還有美食研究會之類的……#n一看見食材就會不顧一切衝過來！"
83300200200-46 = "……嗯，真是辛苦你了。"

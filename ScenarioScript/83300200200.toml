[translation]
83300200200-6 = "นี่มัน... อะไรกันเนี่ย~~"
83300200200-7 = "อย่างน้อยถ้าจะทำอะไรแบบนี้ก็ควรจะบอกกันล่วงหน้าให้เป็นกิจจะลักษณะหน่อยสิ~!"
83300200200-8 = "ไม่คิดถึงสถานการณ์ของพวกเราบ้างเลยรึไง~~"
83300200200-9 = "ใช่ค่ะ~ แบบนี้เกินไปแล้ว~ ไม่คิดถึงสถานการณ์ของพวกเราบ้างเลยรึไง~~"
83300200200-10 = "ฮึ่ยยย จริงๆ เลย... จะทำยังไงดี..."
83300200200-16 = "ฟูกะ ฉันมีเรื่องอยากถามหน่อย"
83300200200-17 = "หืม? ประธานกรรมการวินัยนี่นา มีเรื่องอะไรเหรอ?"
83300200200-18 = "ฉันมาหาเผื่อว่าทางนี้จะรู้ข้อมูลเกี่ยวกับปาร์ตี้เกเฮนน่าบ้างน่ะ"
83300200200-19 = "อ่า... ปาร์ตี้เกเฮนน่า..."
83300200200-20 = "ใช่! นั่นละปัญหาเลย!"
83300200200-21 = "แล้วตอนนี้ก็เกิดเรื่องใหญ่เพราะเรื่องนั้น..."
83300200200-22 = "เรื่องใหญ่งั้นเหรอ..."
83300200200-23 = "ก็เพราะมีคนมาขอร้องแบบเกินกำลังว่า \"ปาร์ตี้เกเฮนน่าจะจัดในอีก 5 วันข้างหน้า พวกเธอจงเตรียมอาหารที่จะใช้เสิร์ฟในงานมา\" น่ะสิ!"
83300200200-24 = "เป็นการขอร้องแบบเกินกำลังจริงๆ เลยค่ะ!"
83300200200-25 = "ถ้าแค่ออกคำสั่งเฉยๆ ก็ยังพอทนได้อยู่หรอก"
83300200200-26 = "แต่นี่เล่นสั่งวัตถุดิบทำอาหารที่เราไม่ต้องการมาเองตามอำเภอใจ แล้วก็เอามาวางกองไว้ตรงโน้นอีก!"
83300200200-28 = "วัตถุดิบทำอาหาร...?"
83300200200-29 = "ฮึ่ม ปาร์ตี้นี้จัดมาทุกปีก็จริง แต่ของปีนี้กลับดันทุรังมาบอกว่าอยากให้ชมรมโภชนาการช่วยดูแลเรื่อง#nอาหารให้เป็นพิเศษ"
83300200200-30 = "นี่เราต้องทำให้จริงๆ เหรอ? ทำไมถึงกลายเป็นแบบนี้ไปได้? นี่มันวันวาเลนไทน์เลยนะ ขอพักผ่อนบ้าง#nไม่ได้รึไง!"
83300200200-31 = "ใช่ค่ะ! ขอวันพักผ่อนให้รุ่นพี่ฟูกะด้วย!"
83300200200-32 = "แต่ว่า... ถ้าเราปฏิเสธไม่ได้... ก็ไม่ต้องกังวลไปนะคะ! รุ่นพี่!"
83300200200-33 = "รุ่นพี่ไปพักผ่อนเถอะค่ะ... ฉันจะพยายามทำอาหารให้เอง! ต่อให้เหลือคนเดียวก็เถอะ!"
83300200200-34 = "ฉันก็เข้าใจความหวังดีของจูริอยู่หรอกนะ... แต่ถ้าทำอย่างนั้น... เดี๋ยวได้เกิดเรื่องโกลาหลอีกแน่..."
83300200200-39 = "(สั่งวัตถุดิบอาหารจำนวนมากมาไว้ที่ชมรมโภชนาการตามอำเภอใจงั้นเหรอ...)"
83300200200-42 = "ฟูกะ ฉันขอดูวัตถุดิบอาหารที่ว่าหน่อยได้ไหม?"
83300200200-43 = "หืม? วัตถุดิบอาหารเหรอ? อยู่ทางโน้นน่ะ ไปดูให้เต็มที่ได้เลย ถ้าเป็นประธานกรรมการฉันก็คงเชื่อใจ#nได้อยู่"
83300200200-44 = "ขอบใจที่พูดแบบนั้นนะ ว่าแต่มีใครที่เชื่อไม่ได้งั้นเหรอ?"
83300200200-45 = "ก็... ชมรมชิมอาหารน่ะ พอพูดถึงวัตถุดิบอาหาร... พวกชมรมชิมอาหารก็จะวิ่งเข้าใส่แบบหน้ามืดตามัว#nเลยน่ะ!"
83300200200-46 = "อืม... คงต้องเหนื่อยกันหนักน่าดูเลยนะ"

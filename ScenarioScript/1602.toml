[translation]
1602-1 = "การประเมินสุขอนามัย ของชมรมโภชนาการจอมวุ่นวาย 2"
1602-2 = "เริ่มจากสุขอนามัยของแต่ละคน"
1602-3 = "ทุกคนยื่นมือมาสิ"
1602-4 = "อ่ะนี่"
1602-5 = "นี่ค่ะ"
1602-6 = "อะแฮ่ม~! ถ้าเป็นเรื่องสุขอนามัย ฉันมั่นใจอยู่แล้ว!"
1602-7 = "ต้องปฏิบัติตามหลักสุขอนามัยถึงจะกินอาหารได้อร่อยนะ!"
1602-8 = "เดี๋ยวสิ.... เธอไม่ใช่พวกชมรมโภชนาการนี่นา"
1602-9 = "แต่ก็นะ ไม่ใช่เรื่องใหญ่หรอก"
1602-11 = "อืม... ดีล่ะ ทุกคนเก็บกวาดกันได้สะอาดดีจัง"
1602-12 = "สุขอนามัยแต่ละคนต้องอยู่ในระดับดี - เช็กแล้ว"
1602-13 = "ต่อไปก็..."
1602-15 = "การรักษาความสะอาดของอุปกรณ์... ทำได้ดี"
1602-16 = "ทั้งโต๊ะอาหาร เก้าอี้ ผ้าม่านกับอุปกรณ์อื่นๆ เองก็ดูแลได้เป็นอย่างดี"
1602-17 = "วันหมดอายุของวัตถุดิบที่ใช้... ก็ตามที่กำหนดนี่นา"
1602-18 = "ต่อไปก็... ถึงเวลาดูห้องครัวแล้วล่ะ"
1602-21 = "(อึ่กๆๆ)"
1602-23 = "(เดือดปุดๆ)"
1602-24 = "หืม? นั่นมันหม้อนี่นา?"
1602-25 = "ตึงตึงตึงตึงงงง!"
1602-26 = "เอ๊ะ?! หม้อกำลังสั่นอยู่?!"
1602-27 = "จูริ นั่นมันอาหารที่เธอทำไม่ใช่รึไง แล้วนี่มันเรื่องอะไรกัน?!"
1602-28 = "อ๊ะ! สงสัยอาหารที่ฉันทำมันจะระเบิดอีกแล้วล่ะค่ะ!"
1602-29 = "อีกแล้วเหรอ?!"
1602-30 = "อีกแล้ว....?"
1602-31 = "ไม่เป็นไรค่ะ รุ่นพี่!"
1602-32 = "ฉันกำลังศึกษาวิธีที่จะรับมือกับเรื่องแบบนี้ให้ได้ตลอดเวลาอยู่ค่ะ!"
1602-33 = "เพื่อให้การประเมินสุขอนามัยผ่านไปได้ด้วยดีและสวัสดิภาพของชมรมโภชนาการ#nรวมถึงความปลอดภัยของทุกๆ คน!"
1602-34 = "ฉัน...จะสู้ด้วยค่ะ!"
1602-35 = "ฉันจะไม่ยอมแพ้คุณอิโอริเด็ดขาดค่ะ!"
1602-36 = "ทำไมถึงทำตัวพูดจาเหมือนคู่แข่งที่เป็นมิตรกันเลยล่ะ!"
1602-44 = "ว้ากกกก?! อาหารบุกโจมตีพวกเราแล้ววว!!"
1602-45 = "แต่ฉัน...คิดไม่ถึงเลย"
1602-46 = "ฉันคิดว่าฉันเป็นฝ่ายที่กินพวกอาหารซะอีก..."
1602-47 = "ถ้าอยู่ๆ ไปพวกเราก็อาจถูกอาหารเขมือบกินได้เหมือนกันสินะ...!"
1602-48 = "ไม่สิ มันปกติซะที่ไหนกันล่ะ? กรณีนั้นมัน..."
1602-49 = "แล้วอีกอย่างนี่เป็นปัญหาด้านสุขอนามัยไม่ใช่เหรอ...?"
1602-50 = "หรือตาฝาดไปนะ?#nอืม... เช็กแล้วว่าโอเคหมด..."
1602-55 = "ประเมินสุขอนามัยเสร็จแล้วล่ะ... "
1602-56 = "ชิส์ คะแนนเต็ม!"
1602-57 = "อ่ะแฮ่ม!"
1602-58 = "เดี๋ยวสิ ทำไมสมาชิกชมรมชิมอาหารถึงได้ดูภูมิใจกันขนาดนั้นล่ะ....?"
1602-59 = "ว่าแต่ทำไมถึงเห็นด้วยโดยไม่แย้งอะไรเลยนะ?"
1602-60 = "ชิส์ ฉันไม่ได้จะมาสู้กับใครสักหน่อย"
1602-61 = "อย่างที่บอกฉันแค่มาตรวจสอบเรื่องสุขอนามัยเท่านั้น"
1602-62 = "ดี... ดีมาก  ฉันขอยอมรับ ที่นี่ถูกสุขลักษณะมาก!"
1602-63 = "อ่า..."
1602-64 = "อื้อ! โล่งอกไปที!"
1602-67 = "ฉันเช็กดูใหม่แล้วล่ะ ชมรมโภชนาการ"
1602-68 = "ความกระตือรือร้นของพวกเธอ และสุขอนามัยที่สมบูรณ์แบบของโรงเรียน..."
1602-69 = "ฉันต้องตรวจสอบเรื่องที่ข้าวไม่อร่อยด้วย มันไม่อร่อยจริงๆ นะ"
1602-70 = "ตอนนี้เข้าใจรึยัง~!"
1602-71 = "ใครเขาอยากจะทำของที่ไม่อร่อยกันบ้างล่ะ?!"
1602-72 = "ดูจากผลการตรวจสอบแล้ว...#nเรื่องที่ฉันได้ยินมาคงจะเป็นการเข้าใจผิดกันแน่ๆ"
1602-73 = "ถ้าสะอาดแบบนี้ พอกลับไปคงจะต้องพิจารณาคำตัดสินดูใหม่อีกรอบแล้วล่ะมั้ง"
1602-74 = "ฉันประทับใจมากจริงๆ ค่ะ"
1602-75 = "ประเมินได้อย่างถูกต้องและยุติธรรมสมกับเป็นคณะกรรมการวินัยเลย!"
1602-76 = "ค่ะ โชคดีที่ครั้งนี้คุณอิโอริเป็นผู้ประเมินค่ะ!"
1602-77 = "อึ่ก! พูดเยินยอฉันไปก็ไม่ช่วยอะไรหรอกนะ!"
1602-78 = "พอแล้วล่ะ ฉันจะกลับแล้ว!"
1602-82 = "(โชคดีจังที่ผ่านไปได้ด้วยดี... รึเปล่านะ...?)"
1602-83 = "ฮึ่ม จะว่าไปก็พูดไปตั้งเยอะนะ"
1602-84 = "รู้สึกคอแห้งจังเลย มีอะไรให้ดื่มบ้างไหม?"
1602-85 = "เอ๋...? เครื่องดื่มเหรอ? น้ำเปล่าได้ไหม?"
1602-87 = "อ๊ะ ถ้างั้นก็มีของดีๆ อยู่ด้วยนะคะ!"
1602-90 = "เชิญดื่มได้เลยค่ะ"
1602-91 = "หือ? อ๋อ น้ำส้มเหรอ? ขอบคุณนะ เดี๋ยวฉันจะดื่มเอง"
1602-92 = "ฉันด้วยๆ ฉันเอาด้วย! "
1602-93 = "ฮุฮุ ค่ะ อยู่นี่ค่า~!"
1602-95 = "หือ? น้ำผลไม้เหรอ?"
1602-96 = "น้ำส้มที่ชมรมเราสั่งมาไว้เสิร์ฟกับชุดอาหารยังไม่มาไม่ใช่เหรอ?"
1602-97 = "อ๊ะ นี่มันไม่ได้เอาไว้ทำอาหารนะ"
1602-98 = "ครั้งนี้ฉันคั้นน้ำผลไม้สดไว้เสิร์ฟทุกคนเองค่ะ!"
1602-99 = "คราวที่แล้วฉันก็คั้นน้ำผลไม้ให้กับนักโภชนาการด้วยเหมือนกันค่ะ!"
1602-100 = "อะไรนะ...? คราวที่แล้วก็ด้วยเหรอ?"
1602-101 = "....."
1602-103 = "จากการประเมินสุขอนามัยครั้งที่แล้ว นักโภชนาการที่มาตรวจสอบพอกลับไปก็อาหารเป็นพิษเลย"
1602-105 = ".......!!"
1602-106 = "หยุดก่อน! หยุดดดดด!"
1602-107 = "หือ? (อึกๆ)"
1602-108 = ".... อึ่ก?!"
1602-111 = "ไม่น้าาาาา!!!!"
1602-112 = "ตายจริง? คุณอิโอริ? เหนื่อยตั้งแต่เช้าเลยเหรอคะ?"
1602-113 = "จู่ๆ จะมานอนที่นี่แบบนี้ไม่ได้นะคะ~"
1602-114 = "อ๊าาาาา! พังหมดแล้ว!!"
1602-115 = "แบบนี้ก็ต้องประเมินสุขอนามัยกันใหม่น่ะสิ!"
1602-116 = "เดี๋ยวสิ ต้องแย่แน่ๆ เพราะครั้งนี้อีกฝ่ายคือคณะกรรมการวินัยอีกด้วย...!#nตัดงบประมาณของชมรมโภชนาการลงครึ่งนึงเหรอ....!"
1602-117 = "ไม่สิ... ตั้งสติก่อน ฟูกะ ต้องมีวิธีแก้ปัญหาอยู่แน่ๆ!"
1602-118 = "ชะ...ใช่แล้ว!"
1602-119 = "รีบเอาตัวผู้เสียหายไปซ่อนไว้ก่อนที่พวกคณะกรรมการวินัยจะรู้เถอะ...!"
1602-127 = "(อึ่กๆๆ)"
1602-129 = "ฮ่าาา! อร่อยจัง!"
1602-131 = "(หลังจากที่อิโอริตื่นขึ้นมา เธอก็ให้เกรด F ในการประเมินด้านสุขอนามัย)"
1602-132 = "การประเมินสุขอนามัย ของชมรมโภชนาการจอมวุ่นวาย"

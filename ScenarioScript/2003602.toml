[translation]
2003602-1 = "回本大作戰"
2003602-2 = "（姑且如茜香所說來到了渡假勝地）"
2003602-3 = "我在等你哦，老師！#n很好，這樣應該就行了……"
2003602-4 = "等一下……唔，好難拿……"
2003602-9 = "……老師。"
2003602-10 = "那個，抱歉，可以幫我拿一下嗎？#n與其說重，不如說是體積大……"
2003602-11 = "[s1]「你帶了好多東西啊。」\n[s2]「這些是什麼？」"
2003602-14 = "唔嗯，其實也沒什麼大不了的。"
2003602-15 = "但是如果想要盡情享受，就不能缺少任何東西吧。#n這是吃的和喝的……"
2003602-16 = "這是打地鋪時用的，這是可能會用到的游泳工具，這是照相機，那是叢林圖。#n還有……"
2003602-17 = "……嗯？"
2003602-18 = "東西帶太多了？好像不用全部都帶？"
2003602-19 = "你都沒在聽我說話嗎？#n我不是說要度過最棒的休假嗎！做好準備也是理所當然的！"
2003602-20 = "……不一樣？哪裡不一樣？"
2003602-21 = "[s3]「最棒的休假和完美的休假不一樣。」\n[s4]「總不能連休假都忙著準備吧？」"
2003602-24 = "是，是嗎……？#n感覺還挺有道理的……"
2003602-28 = "不，不行！你又想用這種說法呼嚨我吧！？"
2003602-29 = "今天不能聽你的，得按照我說的做！"
2003602-30 = "……咦！？"
2003602-31 = "你說你知道了？#n怎麼這麼聽話……？"
2003602-32 = "來玩還吵架不是好事？#n我，我又沒有想吵架的意思！"
2003602-33 = "總，總之！既然老師已經同意了……"
2003602-37 = "現在就出發吧！「最棒的休假」！！"
2003602-39 = "（於是便幫忙拿茜香準備的一堆東西，到各處尋找「最棒的休假」）"
2003602-45 = "[ns5]「……覺得怎麼樣？」\n[ns6]「這個位置不錯吧。」"
2003602-49 = "嗯……是很棒沒錯，可是……"
2003602-50 = "該怎麼說呢……有種缺乏新意的感覺。"
2003602-51 = "要說這是最棒的休假……好像還不太夠。"
2003602-55 = "[ns7]「這裡呢？」\n[ns8]「氣氛跟剛才不太一樣吧？」"
2003602-58 = "是沒錯啦……唔嗯……"
2003602-59 = "怎麼會這樣……？#n為什麼還是覺得不夠滿意……是因為都沒有離開大海嗎……？"
2003602-63 = "[ns9]「這次乾脆離開海邊了。」\n[ns10]「漸漸有種本末倒置的感覺……」"
2003602-66 = "唔唔……奇怪……"
2003602-67 = "明明這些地方都不錯……可是總覺得……我也說不太出來。#n到底是為什麼呢？"
2003602-68 = "這樣好像只讓老師白忙一場……真糟糕……"
2003602-72 = "再怎麼說，這好像都有點……"
2003602-74 = "（……結果沒能找到滿意的地點，走來走去之後又回到了渡假勝地）"
2003602-81 = "…………"
2003602-82 = "那，那個……老師……"
2003602-86 = "……抱歉。"
2003602-87 = "剛才說得信誓旦旦，還讓老師拿行李，結果什麼都沒做就結束了。"
2003602-88 = "最棒的休假果然不簡單……"
2003602-89 = "害老師白忙了一場……"
2003602-90 = "……嗯？"
2003602-91 = "沒有那種事？這也算是最棒的休假……？"
2003602-92 = "你在說什麼？#n一整天下來連滿意的地方都沒找到，只是到處走來走去而已……"
2003602-93 = "[s11]「最棒的休假和完美的休假不一樣。」\n[s12]「所謂的休假，本來就沒有非要做什麼不可。」"
2003602-96 = "唉，又來了……老師每次都說這種話安慰我……"
2003602-97 = "……咦？不是安慰？"
2003602-98 = "是認真的？#n……那是什麼意思？"
2003602-99 = "[s13]「多虧了茜香，我們才能四處逛逛。」\n[s14]「多虧了茜香，我們才能在這樣的夏夜聊天。」"
2003602-102 = "唔嗯……？"
2003602-103 = "咦……是嗎？這樣也行……？"
2003602-104 = "我們今天的確去了海邊、樹林和洞穴……"
2003602-105 = "而且也和老師在途中……休息吃東西……"
2003602-106 = "唔……是嗎……這樣的話，我也覺得……"
2003602-107 = "嗯……"
2003602-108 = "……呵呵。"
2003602-109 = "好像挺不錯的……"
2003602-113 = "……就這麼想吧！！"
2003602-114 = "那今天就先玩到這邊！剩下的明天再聊吧。"
2003602-115 = "還有，雖然我不否認今天過得還不錯……"
2003602-116 = "但我可沒打算就這樣結束哦！#n「最棒的休假」還會持續下去！"
2003602-117 = "知道了嗎？#n所以老師也要幫忙！一定要哦！！"
2003602-118 = "那，那……我先去睡了！！"
2003602-123 = "（之後收拾了茜香不小心忘記的東西，並回到了房間）"

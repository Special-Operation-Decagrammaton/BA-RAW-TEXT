[translation]
2003602-1 = "การพักผ่อนที่ดีที่สุด"
2003602-2 = "(คุณครูออกมาที่ลานหน้ารีสอร์ตตามที่เซริกะบอก)"
2003602-3 = "กำลังรออยู่เลย คุณครู! เอาละ แค่นี้ก็น่าจะ..."
2003602-4 = "เดี๋ยวนะ... อึก ยกไม่ไหว... "
2003602-9 = "คุณครู..."
2003602-10 = "อ่า... ขอโทษนะ มาช่วยยกหน่อยได้มั้ย? มันทั้งใหญ่และก็หนักอยู่น่ะ..."
2003602-11 = "[s1] \"หอบอะไรมาเยอะแยะเลยนะ\"\n[s2] \"นี่มันอะไรเหรอ?\""
2003602-14 = "ก็... แต่ละอันก็ไม่ใช่ของยอดเยี่ยมอะไรหรอก"
2003602-15 = "แต่ถ้าจะให้สนุกกันครบทุกคน ก็ต้องเตรียมของมาอย่าให้ขาด นี่เป็นของกิน แล้วก็เครื่องดื่ม..."
2003602-16 = "ส่วนนี่ก็เอาไว้ใช้ตอนปูพื้น อันนี้อุปกรณ์สำหรับว่ายน้ำที่เอามาเผื่อๆ ไว้ แล้วก็มีกล้องถ่ายรูป แล้วก็มีดมาเชเต้ แล้วก็..."
2003602-17 = "หืม...?"
2003602-18 = "เยอะเกินไปงั้นเหรอ? ไม่จำเป็นต้องเตรียมทุกอย่างไปก็ได้งั้นเหรอ?"
2003602-19 = "ไม่ได้อ่านข้อความที่ฉันส่งไปเหรอ? ฉันบอกว่าจะมี 'วันหยุดพักผ่อนที่ดีที่สุด' นะ! ต้องเตรียมของมา#nแบบนี้ละถูกแล้ว!"
2003602-20 = "ไม่เหมือนกัน...? อะไรไม่เหมือนกันเหรอ?"
2003602-21 = "[s3] \"การพักผ่อนที่ดีที่สุดกับการพักผ่อนที่สมบูรณ์แบบน่ะสิ\"\n[s4] \"เราไม่ควรเหนื่อยกับการหอบข้าวของมาพักผ่อนสิ\""
2003602-24 = "งะ... งั้นเหรอ...? อะไรกัน? ทำไมถึงรู้สึกว่าเป็นคำพูดที่มีเหตุผล..."
2003602-28 = "ไม่หรอก! ไม่ได้! จะพูดอย่างนั้นเพื่อให้เตรียมของไปลวกๆ ล่ะสิท่า!?"
2003602-29 = "ครั้งนี้ฉันไม่ยอมชุ่ยหรอก วันนี้คุณครูต้องทำตามที่ฉันบอก!"
2003602-30 = "หืม...?"
2003602-31 = "ก็ได้... งั้นเหรอ? ทำไมยอมกันง่ายจัง...?"
2003602-32 = "ไม่ควรทะเลาะกันตอนมาเที่ยวงั้นเหรอ? ระ... เราไม่ได้ทะเลาะกันสักหน่อย!"
2003602-33 = "เอาเถอะ! ถือว่าดีแล้วละ คุณครูก็คล้อยตามฉันแล้ว..."
2003602-37 = "งั้นก็ออกเดินทางกันเลย! ไปมี 'วันหยุดพักผ่อนที่ดีที่สุด' กัน! "
2003602-39 = "(คุณครูกับเซริกะแบ่งกันหอบข้าวของที่เตรียมมา แล้วเดินหาสถานที่ต่างๆ เพื่อการพักผ่อนที่ดีที่สุด)"
2003602-45 = "[ns5] \"เป็นไงบ้าง?\"\n[ns6] \"ที่ตรงนี้ดีเลยนะ\""
2003602-49 = "อืม... มันก็ดีอยู่หรอก..."
2003602-50 = "แต่จะว่ายังไงดีนะ มันให้ความรู้สึกที่เหมาะเจาะกับการพักผ่อนเกินไปน่ะ แบบว่า... มันดูธรรมดาๆ ไปหน่อย"
2003602-51 = "น่าจะไม่เพียงพอ... ที่จะเป็นวันหยุดพักผ่อนที่ดีที่สุดน่ะ"
2003602-55 = "[ns7] \"แล้วที่นี่ล่ะ?\"\n[ns8] \"บรรยากาศดูต่างออกไปว่ามั้ย?\""
2003602-58 = "อืม... ก็ใช่อย่างที่คุณครูว่า... อืม..."
2003602-59 = "อะไรกัน...? ทำไมยังไม่ถูกใจนะ...? หรือเพราะยังอยู่ในทะเล...?"
2003602-63 = "[ns9] \"ที่ตรงนี้ไม่ติดทะเลแล้ว\"\n[ns10] \"รู้สึกเหมือนเป็นคนจัดทัวร์เลยแฮะ...\""
2003602-66 = "ฮึ่ม... แปลกจัง..."
2003602-67 = "มันก็ดีนะ... แต่ละที่ก็ดีมากเลย แต่ว่า... อืม ไม่รู้สิ มันติดตรงไหนนะ ทำไมไม่พอใจก็ไม่รู้"
2003602-68 = "แบบนี้คงได้เป็นการพาคุณครูมาลำบากหาที่เที่ยวมากกว่า... เป็นเรื่องใหญ่แล้วสิ..."
2003602-72 = "ฉันว่าแบบนี้มัน..."
2003602-74 = "(คุณครูกับเซริกะตะลอนไปตามจุดต่างๆ แต่ก็ไม่เจอจุดพักผ่อนที่ตรงใจ สุดท้ายจึงต้องกลับมา#nที่รีสอร์ต)"
2003602-81 = "..."
2003602-82 = "อะ... เอ่อ... อืม... คะ... คุณครู... คือว่า... เอ่อ..."
2003602-86 = "ขอโทษนะ..."
2003602-87 = "ฉันคุยโวไว้เสียดิบดี แถมยังให้คุณครูมาช่วยหอบของที่เตรียมมาอีก แต่สุดท้ายก็ไม่ได้พักผ่อนกันจริงๆ เลย"
2003602-88 = "การพักผ่อนที่ดีที่สุดคงไม่ใช่เรื่องง่ายเลยนะ..."
2003602-89 = "ไม่น่าชวนคุณครูมาลำบากเลย..."
2003602-90 = "หืม...?"
2003602-91 = "ไม่ได้คิดแบบนั้นงั้นเหรอ? นี่ก็ถือว่าเป็นการพักผ่อนที่ดีที่สุดแล้วงั้นเหรอ?"
2003602-92 = "พูดอะไรของคุณครูน่ะ? เราเดินตะลอนหาจุดพักผ่อนกันทั้งวัน แต่ก็ไม่เจอจุดที่ถูกใจเลยนี่นา..."
2003602-93 = "[s11] \"การพักผ่อนที่ดีที่สุดกับการพักผ่อนที่สมบูรณ์แบบมันต่างกันนะ\"\n[s12] \"ถ้าจะพักผ่อน เราไม่จำเป็นต้องทำอะไรเป็นชิ้นเป็นอันก็ได้\""
2003602-96 = "เฮ้อ เอาอีกแล้ว... คุณครูก็ชอบพูดปลอบใจกันแบบนี้อยู่เรื่อย..."
2003602-97 = "ว่าไงนะ...? ไม่ได้จะปลอบใจ... แต่พูดจากใจจริงงั้นเหรอ? "
2003602-98 = "พูดอะไรเหลวไหลอีกแล้ว"
2003602-99 = "[s13] \"แต่นั่นทำให้เราได้เดินเที่ยวกันทั้งวันเลยนี่\"\n[s14] \"แถมได้มานั่งคุยกันในค่ำคืนแห่งฤดูร้อนแบบนี้อีก\""
2003602-102 = "หะ... หืม...?"
2003602-103 = "อะ... อะไรกันเนี่ย...? งั้นเหรอ? งั้นก็... ให้มันจบลงแบบนี้เหรอ...?"
2003602-104 = "มันก็จริงอยู่ที่วันนี้ฉันได้ไปทั้งทะเล ป่า แล้วก็ถ้ำ..."
2003602-105 = "ระหว่างแวะพัก... ก็ได้กินอะไรกับคุณครูด้วย..."
2003602-106 = "อืม... แบบนี้สินะ... ถ้าออกมาเป็นอย่างนี้ ฉันก็..."
2003602-107 = "อืม..."
2003602-108 = "ฮิฮิ..."
2003602-109 = "ก็คิดว่าดีเหมือนกันนะ..."
2003602-113 = "นะ... นั่นสินะ! คิดแบบนี้ก็ได้นี่นา! อื้ม!! "
2003602-114 = "งั้นวันนี้เราพักผ่อนกันแค่เท่านี้! ไว้มาคุยกันต่อพรุ่งนี้แล้วกัน"
2003602-115 = "ฉันไม่ปฏิเสธหรอกว่าการพักผ่อนวันนี้ก็ไม่แย่สักเท่าไร..."
2003602-116 = "แต่ฉันก็ไม่คิดว่าจะหยุดไว้แค่นี้หรอกนะ! ฉันจะพยายามต่อไปจนกว่าจะได้เจอ 'การพักผ่อนที่ดีที่สุด' เลย!"
2003602-117 = "เพราะงั้นคุณครูก็ต้องให้ความร่วมมือด้วยนะ! เข้าใจใช่มั้ย?"
2003602-118 = "ถะ... ถ้างั้นฉัน... ขอตัวไปนอนก่อนละ!! "
2003602-123 = "(คุณครูช่วยเซริกะเก็บของที่เธอทำหล่นกระจายทั่วพื้น จากนั้นก็กลับที่พักไป)"

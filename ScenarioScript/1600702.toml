[translation]
1600702-1 = "เรื่องเข้าใจผิดกับคำโกหก"
1600702-2 = "ย่านการค้าขนาดใหญ่ใกล้ๆ ชาเล่ต์"
1600702-4 = "(ระหว่างที่ออกมาซื้อของใช้จำเป็นสำหรับงานของสำนักเลขาธิการ)"
1600702-6 = "ขอบคุณนะคะคุณครู เพราะคุณครูมาด้วย ฉันเลยไม่หลงทางและซื้อของที่ต้องการได้ครบเลยค่ะ"
1600702-7 = "ปกติถึงจะเป็นย่านการค้าที่เคยไปบ่อยๆ ก็ตาม แต่ภาพของคุณครูตอนดูลิสต์รายการ#nของที่ต้องซื้อแล้ววางผังเส้นทางร้านที่จะต้องไปน่ะ มันน่าประทับใจมากเลยล่ะค่ะ"
1600702-8 = "สมกับเป็นภาพลักษณ์ของคุณครูของชาเล่ต์ที่นักเรียนไว้วางใจจริงๆ เลยค่ะ"
1600702-9 = "[s1] \"แค่บอกทางง่ายๆ เองนะ...\"\n[s2] \"ถ้าอวยกันแบบนี้ครูลำบากใจนะ...\""
1600702-10 = "ไม่เลยค่ะ ทั้งการตัดสินใจและความสามารถในการรับรู้ถึงสิ่งรอบตัวได้อย่างรวดเร็ว#nเป็นคุณสมบัติที่จำเป็นในการออกคำสั่งคนจำนวนมาก"
1600702-11 = "เปล่านะคะ ทั้งการตัดสินใจและความสามารถในการรับรู้ถึงสิ่งรอบตัวได้อย่างรวดเร็ว เป็นคุณสมบัติที่จำเป็นในการออกคำสั่งต่อคนจำนวนมาก"
1600702-12 = "พอได้เห็นพรสวรรค์ที่ยอดเยี่ยมเช่นนี้ ฉันอยากขอให้คุณครูไปสอนเคล็ดลับให้กับเจ้าหน้าที่#nของทางสำนักเลขาธิการเลยค่ะ"
1600702-13 = "โทโมเอะคนนี้ ประทับใจความสามารถของคุณครูมากค่ะ"
1600702-14 = "[s] \"โทโมเอะนี่พูดชมเก่งจริงๆ เลยนะ...\""
1600702-15 = "ฮุฮุ ก็ฉันเป็นเลขาของท่านประธานเชริโน่นี่คะ"
1600702-16 = "ถึงยังจะบกพร่องอยู่ในหลายๆ เรื่อง แต่ถ้าเป็นทักษะด้านการพูด นับว่าอยู่ในขั้นที่พอใช้ประโยชน์ได้ค่ะ"
1600702-17 = "ยังไงก็ตาม วันนี้ฉันรบกวนคุณครูมาเยอะแล้ว ขอเลี้ยงเครื่องดื่มเป็นการตอบแทนนะคะ"
1600702-18 = "เมื่อครู่ตอนที่เดินผ่านมา ทางด้านโน้นมีคาเฟ่ที่ดูน่ารักๆ อยู่..."
1600702-23 = "คนนั้นใช่มั้ย...? คุณครูของชาเล่ต์ที่เขาลือกันน่ะ"
1600702-24 = "อ๊ะ จริงด้วย ดูภายนอกก็เหมือนคนธรรมดาๆ นะ..."
1600702-25 = "แต่เท่าที่ฟังจากข่าวลือมา คุณครูของชาเล่ต์น่ะ... มีพลังมหาศาลขนาดบดขยี้รถถังได้ด้วยมือเปล่าเลยนะ?#nนอกจากนี้ยังนิสัยไม่ดีสุดๆ เซอร์เคิลที่ทำให้เขารู้สึกไม่พอใจก็จะถูกเก็บไปในชั่วข้ามคืนเลยล่ะ"
1600702-26 = "เพราะงั้นเด็กนักเรียนที่มีความสามารถของหลายๆ โรงเรียนถึงเกรงกลัวไงล่ะ..."
1600702-27 = "ว่าแล้วเชียว... คนเรานี่ดูกันแต่ภายนอกไม่ได้จริงๆ"
1600702-28 = "น่ากลัวจังเลยนะคะ"
1600702-29 = "ทำไมคนอื่นๆ ถึงพูดถึงข่าวลือไร้สาระแบบนี้กันนะ?"
1600702-30 = "[s3] \"เรื่องนั้นอาจเป็นเพราะ...\"\n[s4] \"อาจเป็นเพราะเรื่องเมื่ออาทิตย์ก่อนล่ะมั้ง\""
1600702-31 = "คุณครูพอจะนึกสาเหตุออกไหมคะ?"
1600702-32 = "คุณครูพอจะนึกสาเหตุออกไหมคะ?"
1600702-33 = "ถ้าคุณครูไม่ติดอะไรก็เล่าให้ฉันฟังได้นะคะ"
1600702-34 = "ฉันอาจจะช่วยคุณครูได้ค่ะ"
1600702-36 = "(เล่าเรื่องที่เกิดขึ้นเมื่ออาทิตย์ก่อนให้โทโมเอะฟัง...)"
1600702-38 = "คะ? เมื่ออาทิตย์ที่แล้วคุณครูออกไปจัดการพวกเด็กเกเรพร้อมกับเด็กนักเรียน#nแต่กลับมีข่าวลือที่เข้าใจผิดว่าคุณครูจัดการเด็กเกเรพวกนั้นคนเดียวเหรอคะ?"
1600702-39 = "อ๋อ... เพราะงั้นคนก็เลยเข้าใจผิดว่าคุณครูมีพลังมหาศาลสินะคะ"
1600702-40 = "[s] \"ที่จริงพวกนักเรียนเป็นคนจัดการต่างหาก\""
1600702-41 = "ไม่หรอกค่ะ ถึงพวกนักเรียนจะเป็นคนต่อสู้ก็จริง แต่คนที่ตัดสินใจและสั่งการกลยุทธ์การต่อสู้ก็คือ#nคุณครู"
1600702-42 = "ดังนั้นการที่พูดว่าคุณครูเป็นคนเอาชนะเด็กเกเรพวกนั้นได้ ก็ไม่ใช่คำพูดที่เกินจริงหรอกค่ะ"
1600702-43 = "คุณครู [USERNAME] ควรจะภูมิใจในตัวเองนะคะ"
1600702-44 = "แต่ว่าคงจะลำบากหน่อยนะคะคุณครู... ทั้งที่มีส่วนร่วมในการรักษาความสงบของคิโวทอสไว้#nแต่กลับมีข่าวลือว่าคุณครูเป็นอันธพาลที่ใครๆ ก็เกรงกลัว..."
1600702-45 = "ฉันปล่อยให้เกิดข่าวลือที่สร้างความเข้าใจผิดๆ แบบนี้ไม่ได้หรอกค่ะ"
1600702-46 = "[s5] \"จะทำอะไรน่ะ...?\"\n[s6] \"จะไปเถียงกับพวกนั้นเหรอ?\""
1600702-47 = "ที่ฉันจะทำก็คือจัดการปราศรัยขึ้นในเมืองค่ะ"
1600702-48 = "ไม่ใช่อย่างนั้นค่ะ การลงไปจัดการแก้ไขความเข้าใจผิดเองทีละเรื่องเป็นวิธีที่ไม่มีประสิทธิภาพค่ะ"
1600702-49 = "ที่ฉันจะทำก็คือจัดการปราศรัยขึ้นในเมืองค่ะ"
1600702-50 = "หากพูดความจริงบนเวทีที่กลางจัตุรัส คนจำนวนมากก็จะได้ฟังและข่าวลือก็จะหายไปเองค่ะ"
1600702-51 = "ดังนั้นตั้งแต่ตอนนี้... ฉันจะเริ่มการปราศรัยเกี่ยวกับคุณครูค่ะ!"
1600702-57 = "(โทโมเอะจัดเตรียมเวทีก่อนจะขึ้นไปยืนข้างบนและเริ่มพูดปราศรัย)"
1600702-58 = "สวัสดียามบ่ายค่ะ พลเมืองคิโวทอสทุกท่าน"
1600702-59 = "ที่ฉันมาที่นี่ในวันนี้ก็เพื่อบอกเล่าความจริงที่ทุกๆ ท่านอาจไม่เคยรู้ค่ะ"
1600702-60 = "ในช่วงที่ผ่านมาทางชาเล่ต์ได้เคลื่อนไหวบ่อยครั้งและอาจทำให้เกิดข่าวลือต่างๆ เกี่ยวกับคุณครู#nมากมาย"
1600702-61 = "ทั้งเรื่องที่คุณครูบดขยี้รถถังด้วยมือเปล่า เรื่องที่มีพละกำลังมหาศาลสามารถหยุดกระสุนปืนได้#nหรือเรื่องที่ไปโลมเลียแข้งขานักเรียนอย่างสบายใจในระหว่างการต่อสู้... "
1600702-62 = "เรื่องพวกนั้นเป็นแค่ข่าวลือมั่วๆ ที่ไม่เป็นความจริงเลยค่ะ"
1600702-63 = "อะไรเนี่ย? ถ้างั้นจะบอกว่าข่าวลือทั้งหมดเป็นเรื่องโกหกงั้นเหรอ"
1600702-64 = "ใช่แล้วค่ะ ข่าวลือพวกนั้น เป็นเพียงแค่คำโกหกที่ไม่ใช่เรื่องจริงเลยสักนิดเดียวค่ะ"
1600702-65 = "นั่นก็เพราะว่าคุณครู..."
1600702-66 = "เป็นคนที่อ่อนแอถึงขนาดที่ถือตะเกียบเองยังไม่ได้เลยค่ะ!"
1600702-67 = "ว่ายังไงนะ?"
1600702-68 = "ว่ายังไงนะ?"
1600702-69 = "[s] “อะไรนะ?!”"
1600702-70 = "แน่นอนว่าการยอมรับฟังความจริงกะทันหันแบบนี้อาจเป็นเรื่องยาก ฉันเข้าใจดีค่ะ"
1600702-71 = "ฉันจะอธิบายถึงสาเหตุของความอ่อนแอของคุณครูให้ฟังเองค่ะ!"
1600702-73 = "(หลังจากนั้นโทโมเอะก็พูดสาธยายถึงความอ่อนแอของคุณครูอย่างชำนาญ...)"
1600702-75 = "ด้วยเหตุนั้น... คุณครูจึงเป็นคนอ่อนแอที่ไม่สามารถควบคุมร่างกายของตัวเองได้ตามที่ต้องการค่ะ!"
1600702-76 = "ไม่นึกเลยว่าจะเป็นแบบนี้... ถ้าร่างกายอ่อนแอขนาดนั้นก็คงจะสู้กับเด็กเกเรมือเปล่าไม่ได้หรอก"
1600702-77 = "ข่าวลือที่พูดกันว่าคุณครูของชาเล่ต์เป็นพวกเลือดร้อนบ้าพลังนี่เป็นเรื่องโกหกจริงๆ ด้วยสินะ"
1600702-78 = "[s7] \"ดูเหมือนจะคลายความเข้าใจผิดได้แล้วนะแต่ว่า...\"\n[s8] \"ดูเหมือนจะมีเรื่องเข้าใจผิดแปลกๆ เพิ่มขึ้นนะ...\""
1600702-79 = "การปกปิดเรื่องโกหกด้วยเรื่องโกหกอีกเรื่องหนึ่งเป็นพื้นฐานของการพูดโฆษณาชวนเชื่อค่ะ"
1600702-80 = "การปกปิดเรื่องโกหกด้วยเรื่องโกหกอีกเรื่องหนึ่งเป็นพื้นฐานของการพูดโฆษณาชวนเชื่อค่ะ"
1600702-81 = "อย่างน้อยพอขจัดเรื่องเข้าใจผิดไปแล้ว เรื่องเข้าใจผิดที่เกิดขึ้นใหม่ก็จะค่อยๆ หายไปเองค่ะ"
1600702-82 = "[s] \"ก็จริงนะ แต่ว่า...\""
1600702-84 = "[s] \"โทโมเอะพูดได้น่าเชื่อถือมากจนครูเองก็เกือบเชื่อเลย\""
1600702-85 = "ฮุฮุ ผู้เกี่ยวข้องกับข่าวลือก็เกือบถูกหลอกด้วยเหรอคะ... แสดงว่าทักษะในการพูดของฉัน ก็ยังพอ#nใช้ได้อยู่สินะคะ"
1600702-91 = "คือว่าคุณครู... สภาพร่างกายย่ำแย่ขนาดนั้นแล้วจะคอยนำพวกนักเรียนได้เหรอ?"
1600702-92 = "เพื่อขอโทษที่สร้างข่าวลือผิดๆ ฉันเลยซื้อเนื้อที่ช่วยบำรุงร่างกายมาให้... เอานี่ไปกินที่ชาเล่ต์#nก็แล้วกันนะ!"
1600702-93 = "ถ้าเป็นอาหารบำรุงร่างกายก็ต้องปลาไหลสิ งั้นเดี๋ยวฉันจะเอาปลาไหลพร้อมทานมาให้แล้วกัน!"
1600702-94 = "[s] \"เยอะแบบนี้กินไม่หมดหรอก...\""
1600702-95 = "ถ้ากินนิดเดียวแล้วร่างกายจะแข็งแรงได้ยังไงกัน? ต้องกินเข้าไปเยอะๆ เหมือนนักซูโม่สิ!"
1600702-96 = "ไหนๆ ก็พูดเรื่องนี้แล้ว เอาเนื้อไก่กับเส้นอุด้งสำหรับจังโกะนาเบะไปด้วยก็แล้วกัน!"
1600702-98 = "ด้วยคำพูดปราศรัยของโทโมเอะ ก็สามารถคลายความเข้าใจผิดเรื่อง \"คุณครูเลือดร้อนบ้าพลัง\"#nได้อย่างดีเยี่ยม..."
1600702-99 = "และคุณครูก็ได้รับอาหารบำรุงสุขภาพมากมายจากพวกคนขายของที่ย่านการค้ามาเป็นจำนวนมาก"

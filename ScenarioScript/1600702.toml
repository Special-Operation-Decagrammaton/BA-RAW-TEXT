[translation]
1600702-1 = "謊言和誤解"
1600702-2 = "夏萊附近．大型商店街"
1600702-4 = "（順利買完東西……）"
1600702-6 = "謝謝老師。多虧了老師，才能毫無猶豫地買完東西。"
1600702-7 = "雖然對老師來說是熟悉的商店街，但當我說出需要的東西時，就能瞬間指出最短路徑，十分有效率地輾轉於各個店鋪……"
1600702-8 = "不愧是，在奇普托斯中受到學生依賴的夏萊的老師呢。"
1600702-9 = "[s1] 「雖然只是帶路而已，不過有幫上忙真是太好了。」\n[s2] 「被說成那樣有點害羞呢……」"
1600702-10 = "不不。果然迅速準確的判斷和空間掌握能力，是指揮多數人員所不可或缺的能力……"
1600702-11 = "不不。果然迅速準確的判斷和空間掌握能力，是指揮多數人員所不可或缺的能力……"
1600702-12 = "甚至，想務必請老師教導我們事務局的幹部。"
1600702-13 = "智惠我，再次銘記了老師的才能的美妙之處了。"
1600702-14 = "[s] 「智惠很會稱讚呢。」"
1600702-15 = "呵呵，雖然還有很多不足之處……不過也是呢。"
1600702-16 = "因為作為服侍潔莉諾會長的秘書室長，所以和各式各樣的學生對話的機會很多。也許是在那時鍛鍊了話術也說不定。"
1600702-17 = "總之，今天受到了老師各方面的關照。可以的話請讓我給老師謝禮。"
1600702-18 = "其實方才，在那邊看見了間時髦的咖啡廳……啊啦？"
1600702-23 = "……那就是，傳言中的夏萊的老師？"
1600702-24 = "似乎是呢，外表看起來沒那麼……"
1600702-25 = "不過我記得，夏萊的老師擁有可以空手阻止戰車的怪力來著？性格也很兇惡，違抗老師的社團隔天就消失了之類的。"
1600702-26 = "原來如此，所以各學園擁有實力的學生也沒辦法違抗……"
1600702-27 = "果然人不可貌相呢……"
1600702-28 = "……好像，聽到了沒辦法裝作沒聽到的事呢。"
1600702-29 = "為什麼，會有那樣的傳言……"
1600702-30 = "[s3] 「雖然參雜了很多誤會……」\n[s4] 「前半段的事，應該是上週的事吧。」"
1600702-31 = "啊啦，有什麼頭緒嗎？"
1600702-32 = "啊啦，有什麼頭緒嗎？"
1600702-33 = "老師不介意的話，可以告訴我嗎？"
1600702-34 = "根據內容，也許我可以幫上老師的忙。"
1600702-36 = "（向智惠說了，關於上週發生的事）"
1600702-38 = "……原來如此。上週和夏萊值班的學生一起壓制了小流氓。然後不知為何那件事被加油添醋，結果變成了「老師一個人打倒了小小流氓」的傳言……大概是這樣吧。"
1600702-39 = "所以那些人，把老師誤解成了「怪力且兇惡的存在」……"
1600702-40 = "[s] 「只憑我，沒辦法做到那種事呢……」"
1600702-41 = "不不，這裡不需要謙虛。即使實際戰鬥的是學生，不過對其下達指揮和判斷的是老師。也就是「勇將之下無弱兵」。"
1600702-42 = "所以，就算說是老師擊潰小流氓的也不為過。"
1600702-43 = "不如說，我認為[USERNAME]老師可以再自豪一點唷。"
1600702-44 = "不過即使如此……是好的傳言的話還好說，但老師卻被誤解成是無法無天的流氓……"
1600702-45 = "這件事，不能視而不見呢。"
1600702-46 = "[s5] 「……那個，智惠？」\n[s6] 「該不會，要親自去抗議吧……？」"
1600702-47 = "這種時候，演說就很有效果。"
1600702-48 = "不，一個一個解開誤解是沒有效率的事。"
1600702-49 = "這種時候，演說就很有效果。"
1600702-50 = "在從這裡能看見的那個廣場的檯上真摯地說話的話，應該會有很多人停下腳步願意傾聽，我想傳言應該也很快就會平息。"
1600702-51 = "那麼……立刻開始吧！"
1600702-57 = "（智惠站上檯上，開始演說了）"
1600702-58 = "各位午安，是很美妙的下午呢。"
1600702-59 = "雖然很突然，我今天在這裡……想傳達一個真相。"
1600702-60 = "最近經常耳聞夏萊的活躍吧。有一部分的事情，我想已經到了相互矛盾的程度。有時甚至會覺得很奇怪吧？"
1600702-61 = "例如，老師空手把電車破壞之類的，以驚人的反射神經和怪力把子彈彈飛之類的，戰鬥中不知為何舔了學生的腳之類的……"
1600702-62 = "但是，這全都是不含一絲真相的「謠言」！"
1600702-63 = "咦，謠言……？而且是全部……？"
1600702-64 = "是的，就是這樣！"
1600702-65 = "作為那個證據……"
1600702-66 = "請問各位，老師是連筷子都拿不起來的貧弱之人這件事，各位知道嗎？"
1600702-67 = "咦？"
1600702-68 = "什麼？"
1600702-69 = "[s] 「……咦？」"
1600702-70 = "意想不到的真相，要接受是很困難的……我也能理解大家的心情。"
1600702-71 = "我現在，就來說足夠信賴的理由和故事吧！"
1600702-73 = "（……智惠就這樣，繼續強調了我有多麼的貧弱）"
1600702-75 = "……也就是，老師是個連自己的身體都沒辦法好好行動的貧弱之人！"
1600702-76 = "是，是那樣啊……這樣的話，確實各方面都能理解呢……"
1600702-77 = "更何況那麼貧弱的話，不可能壓制小流氓呢。兇惡的性格，還有怪力都是謊言嗎。"
1600702-78 = "[s7] 「雖然剛才的誤解好像解開了……」\n[s8] 「不過，好像又產生了其他誤解……」"
1600702-79 = "為了轉移視線而以更強力的謊言掩蓋，這就是宣傳的基本。"
1600702-80 = "為了轉移視線而以更強力的謊言掩蓋，這就是宣傳的基本。"
1600702-81 = "而且誤解也算是解開了，之後要解開新的誤解也比之前還容易吧。"
1600702-82 = "[s] 「原來如此……？」"
1600702-84 = "[s] 「先不說這個，是非常有說服力的發言呢……」"
1600702-85 = "呵呵，沒想到能被當事人那麼說。我的話術，果然也有一定的程度呢。"
1600702-91 = "話說老師，那麼貧弱的話，之後還做得下去嗎？"
1600702-92 = "相信奇怪的傳言真是抱歉呢。雖然不是作為謝罪，我會把這邊的肉品給你打包回去在夏萊吃！"
1600702-93 = "來，鰻魚也拿去吧！"
1600702-94 = "[s] 「謝，謝謝。量好多……」"
1600702-95 = "吃那麼少的話會做不下去哦，要好好吃才行！"
1600702-96 = "來，機會難得把這個雞肉和烏龍麵也帶走吧！做個相撲火鍋比較好！"
1600702-98 = "（就這樣即使多虧了智惠的演說，解開了「兇惡性格的怪力持有人」的誤解……）"
1600702-99 = "（不過和新的誤解一起，從商店街的各位那兒收到了各種食品作為禮物）"

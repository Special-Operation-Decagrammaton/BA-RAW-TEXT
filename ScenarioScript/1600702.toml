[translation]
1600702-1 = "Misunderstandings and Lies"
1600702-2 = "Large shopping district near Schale"
1600702-4 = "(On the way back from buying some items needed for Secretariat work...)"
1600702-6 = "Thank you, Sensei. I got everything I needed without getting lost thanks to you."
1600702-7 = "I know you're familiar with the area, but I was really impressed with how efficiently you located everything I needed and planned our shopping route."
1600702-8 = "As expected from the Sensei from Schale all the students depend on and follow."
1600702-9 = "[s1] \"I was just guiding you...\"\n[s2] \"What I did doesn't deserve that much praise...\""
1600702-10 = "On the contrary, quick decision making and spacial perception skills are essential in a leader."
1600702-11 = "On the contrary, quick decision making and spacial perception skills are essential in a leader."
1600702-12 = "Experiencing your wonderful skills in action, I even wanted to ask you to teach the officers at our Secretariat."
1600702-13 = "I was truly amazed by your abilities, Sensei."
1600702-14 = "[s] \"You are way too good at complimenting others, Tomoe...\""
1600702-15 = "Heehee, I am the Chief Secretary serving President Cherino."
1600702-16 = "Although I'm still lacking in many areas, I've been told I am great with words."
1600702-17 = "Anyway, as a reward for helping me, I will buy you a drink."
1600702-18 = "I saw a cute cafe over there!"
1600702-23 = "That's them, right? The rumored Sensei from Schale."
1600702-24 = "I think it is. They seem normal, though..."
1600702-25 = "Rumor has it the Sensei from Schale has superhuman strength. They can crush a tank with just their bare hands. But watch out for their nasty temper. A gang of thugs disappeared overnight just for looking at them."
1600702-26 = "No wonder everyone I've talked to is scared of Sensei."
1600702-27 = "You really can't judge a book by its cover."
1600702-28 = "That's so scary."
1600702-29 = "Why do people listen to such ridiculous rumors?"
1600702-30 = "[s3] \"Probably because...\"\n[s4] \"Maybe because of what happened last week.\""
1600702-31 = "Is there a reason you can think of?"
1600702-32 = "Is there a reason you can think of?"
1600702-33 = "If it's okay with you, please tell me."
1600702-34 = "Maybe I can help."
1600702-36 = "I told Tomoe what happened last week."
1600702-38 = "So, you and some students on duty taking care of some thugs has been blown out of proportion? And now there's a misunderstanding spreading that you defeated the thugs all by yourself?"
1600702-39 = "Oh, so that's why rumors about your superpowers are spreading."
1600702-40 = "[s] \"And it was actually the students who took care of the thugs.\""
1600702-41 = "I disagree. The students may have been on the front lines, but it was Sensei who made decisions and directed the battle."
1600702-42 = "Therefore, it is not an exaggeration to say that you deserve recognition for defeating the thugs."
1600702-43 = "You need to have more pride in yourself, [USERNAME] Sensei."
1600702-44 = "But regardless. While you were protecting Kivotos, rumors were created that you're a no-good thug that'll start a fight with anyone who so much as looks at you."
1600702-45 = "I can't just stand here and do nothing as these rumors continue to spread."
1600702-46 = "[s5] \"...What are you going to do?\"\n[s6] \"Are you going to protest?\""
1600702-47 = "I'm going to make a speech."
1600702-48 = "It'd be inefficient to try to convince people one by one."
1600702-49 = "I'm going to make a speech."
1600702-50 = "If I tell the truth on a platform in the middle of a popular public square, it'll reach a large audience and the rumors will fade."
1600702-51 = "So, starting now...I will begin speaking the truth about Sensei!"
1600702-57 = "(Tomoe goes up to the platform and begins speaking.)"
1600702-58 = "Dear citizens of Kivotos, good afternoon."
1600702-59 = "I am here today to tell you a truth many of you may be unaware of."
1600702-60 = "Schale has been very active lately, and it seems various rumors about their Sensei are circulating."
1600702-61 = "Rumors that Sensei crushed a tank with their bare hands, that they deflected bullets with superhuman strength, or that they were leisurely licking a student's leg during combat..."
1600702-62 = "They are all meaningless, baseless rumors!"
1600702-63 = "So are you claiming all the rumors are fake?"
1600702-64 = "Yes, all the rumors are lies without even a hint of truth to them."
1600702-65 = "That's because Sensei is..."
1600702-66 = "...a weakling who can't even lift a single chopstick!"
1600702-67 = "What?!"
1600702-68 = "What?!"
1600702-69 = "[s] \"What?!\""
1600702-70 = "I know the truth may be hard to accept. I understand your reactions."
1600702-71 = "Please listen to all the reasons Sensei is a weakling!"
1600702-73 = "After that, Tomoe proceeded to explain why Sensei is such a weakling."
1600702-75 = "...And that's why Sensei is a weakling who can't even take care of themselves!"
1600702-76 = "I-I didn't know that was the case. It obviously wasn't them who beat up those thugs."
1600702-77 = "I guess the rumor that the Sensei from Schale has superhuman strength and a nasty temper was a lie..."
1600702-78 = "[s7] \"It seems the misunderstanding is cleared up, but...\"\n[s8] \"I think another strange misunderstanding might be circulating.\""
1600702-79 = "Covering a lie with another lie is the foundation of propaganda."
1600702-80 = "Covering a lie with another lie is the foundation of propaganda."
1600702-81 = "Now that the negative misunderstandings are resolved, the new one will fade away soon as well."
1600702-82 = "[s] \"That's true, but...\""
1600702-84 = "[s] \"Your speaking skills were so amazing that even I almost believed it.\""
1600702-85 = "Heehee, if someone who knew the truth almost believed it, then I guess my speaking skills aren't rusty yet."
1600702-91 = "But, Sensei! If you're in such bad shape, how are you going to properly lead the students?"
1600702-92 = "As an apology for the false rumors, here is lots of good quality meat. Take it back to Schale and enjoy!"
1600702-93 = "Here, take some cooked eel! When it comes to healthy food, there is nothing like eel."
1600702-94 = "[s] \"I-I can't eat this much...\""
1600702-95 = "If you eat like a little bird, you'll never be healthy! Eat a lot like a sumo wrestler!"
1600702-96 = "While we're at it, take some chicken and udon for chankonabe."
1600702-98 = "Thanks to Tomoe's speech, the rumors of my superhuman strength and nasty temper were completely resolved, but..."
1600702-99 = "I suddenly started receiving a lot of healthy food packages..."

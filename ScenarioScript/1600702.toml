[translation]
1600702-1 = "#title;오해와 거짓말"
1600702-2 = "#place;샬레 인근 대형 상점가"
1600702-3 = "#wait;150"
1600702-4 = "#na;(사무국 업무에 필요한 물건을 사고 나오는 길…….)"
1600702-5 = "#wait;1500"
1600702-6 = "3;토모에;99;감사합니다, 선생님. 덕분에 헤매지 않고 필요한 물건들을 모두 구입할 수 있었네요.\n#3;em;[반짝]\n#3;a"
1600702-7 = "3;토모에;01;평소에도 자주 찾으시는 상점가라고는 하지만, 필요한 물건의 재고를 순식간에 파악하여 최적의 동선을 설계하는 선생님의 모습은 정말 감탄스러울 정도였습니다."
1600702-8 = "3;토모에;03;역시 학생들이 의지하고 따르는 샬레의 선생님다운 모습이시군요.\n#3;greeting\n#3;em;[음표]"
1600702-9 = "[s1] \"단순한 길 안내였는걸…….\"\n[s2] \"그렇게 칭찬해도 곤란한데…….\""
1600702-10 = "3;토모에;01;아뇨, 재빠른 판단과 공간지각 능력은 다수의 인원을 지휘하는 데 꼭 필요한 덕목.\n#3;em;…"
1600702-11 = "3;토모에;01;아뇨, 재빠른 판단과 공간지각 능력은 다수의 인원을 지휘하는 데 꼭 필요한 덕목.\n#3;em;…"
1600702-12 = "3;토모에;99;그 훌륭한 재능을 보고 있노라니, 저희 사무국의 간부들에게도 가르침을 부탁하고 싶을 정도였습니다."
1600702-13 = "3;토모에;01;불초 토모에, 선생님의 능력에 새삼 감탄했습니다.\n#3;greeting\n#3;em;[반응]"
1600702-14 = "[s] \"토모에는 정말 칭찬에 능숙하네…….\""
1600702-15 = "3;토모에;03;후후, 체리노 회장님을 모시는 비서실장이니까요.\n#3;em;[음표]"
1600702-16 = "3;토모에;99;아직 많은 점에서 부족하긴 하지만, 말재주만큼은 쓸만하다는 평가를 듣는답니다."
1600702-17 = "3;토모에;01;여하튼, 오늘은 제가 여러모로 신세를 졌으니 음료수라도 한 잔 사겠습니다."
1600702-18 = "3;토모에;03;아까 지나오면서 보니 저쪽에 괜찮아 보이는 카페가……\n#3;em;[재잘]"
1600702-19 = "#st;[0,0];instant;1;"
1600702-20 = "#clearST"
1600702-21 = "3;토모에;03\n#3;d\n#wait;1500"
1600702-22 = "#wait;1500"
1600702-23 = "#na;상인 A;……저 사람이지? 그 소문의 샬레 선생님이.\n#fontsize;50"
1600702-24 = "#na;상인 B;아, 맞아. 겉으로 보기에는 평범한 인상인데…….\n#fontsize;50"
1600702-25 = "#na;상인 A;하지만 소문에 의하면 샬레의 선생은 전차도 맨손으로 우그러트릴 수 있는 괴력을 지니고 있다며? 거기에 성격도 엄청 나빠서 선생의 기분을 거스른 불량 서클이 하루아침에 사라졌대.\n#fontsize;50"
1600702-26 = "#na;상인 A;괜히 여러 학원의 실력 있는 학생들이 선생에게만 쩔쩔매는 게 아니라고.\n#fontsize;50"
1600702-27 = "#na;상인 B;……역시 사람은 겉만으로는 모르는 거네.\n#fontsize;50"
1600702-28 = "3;토모에;04;……뭔가 듣기 나쁜 소리가 들리네요.\n#3;a"
1600702-29 = "3;토모에;05;어째서 사람들은 저런 말도 안 되는 소문에 휘둘리는 걸까요?\n#3;em;[속상함]"
1600702-30 = "[s3] \"그건 아마도……\"\n[s4] \"지난주의 일 때문이려나.\""
1600702-31 = "3;토모에;02;무언가 짚이는 점이라도 있으신가요?\n#3;em;[?]\n#3;stiff"
1600702-32 = "3;토모에;02;무언가 짚이는 점이라도 있으신가요?\n#3;em;[?]\n#3;stiff"
1600702-33 = "3;토모에;05;괜찮으시다면 부디 제게 말씀해 주셨으면 합니다."
1600702-34 = "3;토모에;01;제가 도움이 될 수 있을지도 모르니까요.\n#3;em;[반짝]"
1600702-35 = "#all;hide"
1600702-36 = "#na;(……토모에에게 지난주에 있었던 일을 말해주었다.)"
1600702-37 = "#all;hide"
1600702-38 = "3;토모에;04;네? 지난주에 샬레의 당번 학생들과 함께 불량배들을 제압한 일이 와전되어서, 선생님 혼자 불량배들을 무찔렀다는 오해가 퍼졌다고요?\n#3;em;[?!]\n#3;shake"
1600702-39 = "3;토모에;06;아하, 그래서 사람들이 선생님을 괴력의 소유자라 오해하게 된 것이로군요.\n#3;greeting"
1600702-40 = "[s] \"실제로 불량배들을 무찌른 건 학생들이지만 말이야.\""
1600702-41 = "3;토모에;99;아니요. 적들과 직접 싸우는 것은 학생들의 몫이지만, 그 판단을 내리고 전투를 지휘하는 것은 선생님의 몫.\n#3;em;…"
1600702-42 = "3;토모에;05;그러므로 불량배를 무찌른 공은 선생님께 있다 하여도 과언이 아니랍니다."
1600702-43 = "3;토모에;01;[USERNAME] 선생님께서는 좀 더 스스로를 자랑스러워하실 필요가 있어요."
1600702-44 = "3;토모에;04;……하지만 곤란하네요. 키보토스의 평화를 지켜낸 공적은 둘째치고, 선생님이 아무에게나 시비를 거는 무뢰한처럼 소문이 나고 있으니…….\n#3;em;[땀]"
1600702-45 = "3;토모에;05;이런 그릇된 오해가 퍼지는 모습을 두고 볼 수는 없지요."
1600702-46 = "[s5] \"……무얼 하려고?\"\n[s6] \"직접 가서 항의하려는 거야?\""
1600702-47 = "3;토모에;03;제가 하려는 것은 시가 연설입니다.\n#3;em;[반짝]"
1600702-48 = "3;토모에;99;아뇨, 일일이 찾아다니면서 오해를 푸는 것은 비효율적인 방법이니까요."
1600702-49 = "3;토모에;03;제가 하려는 것은 시가 연설입니다.\n#3;em;[반짝]"
1600702-50 = "3;토모에;01;사람이 오가는 광장 한가운데의 단상에서 진실을 이야기한다면, 많은 사람이 귀를 기울여 줄 테고 소문도 곧 수그러들겠지요."
1600702-51 = "3;토모에;05;그럼 지금부터…… 선생님에 대한 연설을 시작하겠습니다!\n#3;closeup"
1600702-52 = "#all;hide"
1600702-53 = "#wait;2000"
1600702-54 = "#all;hide\n#zmc;instant;-632,444;1896;"
1600702-55 = "3;토모에;99;\n#3;a\n#3;closeup\n#zmc;instant;-632,444;1896"
1600702-56 = "3;토모에;99;\n#3;greeting\n#3;closeup\n#zmc;instant;-632,444;1896"
1600702-57 = "#na;(토모에가 단상에 올라서서 연설을 하기 시작했다.)\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-58 = "3;토모에;01;키보토스의 시민 여러분, 좋은 오후입니다.\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-59 = "3;토모에;05;저는 오늘 이 자리에서 여러분께 알려지지 않은 한 가지 진실에 대해 고하고자 합니다.\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-60 = "3;토모에;05;최근 샬레의 활약이 두드러지며, 선생님에 관한 여러 가지 소문이 도는 모양이더군요.\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-61 = "3;토모에;05;선생님이 맨손으로 전차를 구겨버렸다느니, 엄청난 괴력으로 총알을 튕겨냈다느니, 전투 중에 여유롭게 학생의 다리를 핥고 있었다느니…….\n#3;em;…\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-62 = "3;토모에;05;정말이지, 모두가 일고의 가치도 없는 헛소문뿐이었습니다.\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-63 = "#na;상인 A;뭐야. 그럼 그 소문들이 모두 거짓이라고 주장할 셈이야?\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-64 = "3;토모에;01;네, 그 소문들은 모두 조금의 진실도 섞이지 않은 거짓입니다.\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-65 = "3;토모에;99;왜냐하면 선생님은……\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-66 = "3;토모에;05;젓가락 하나도 들지 못할 정도의 약골이기 때문입니다!\n#fontsize;80\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-67 = "#na;상인 A;뭐라고?\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-68 = "#na;상인 B;뭐라고?\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-69 = "[s] \"뭐라고?!\"\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-70 = "3;토모에;99;갑작스러운 진실은 받아들이기 어려운 게 당연한 법. 여러분의 반응도 이해합니다.\n#3;greeting\n#3;em;…\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-71 = "3;토모에;05;제가 지금부터 그 이유를 설명하겠습니다!\n#fontsize;80\n#zmc;instant;-632,444;1896\n#3;closeup"
1600702-72 = "#all;hide"
1600702-73 = "#na;(……이어서 토모에는 선생님이 약골인 이유에 대해 능숙하게 설명을 이어갔다.)"
1600702-74 = "#all;hide"
1600702-75 = "3;토모에;05;……그렇기 때문에, 선생님은 자신의 몸도 제대로 가누지 못하는 약골인 것입니다!"
1600702-76 = "#na;상인 A;그, 그런 줄은 몰랐네. 확실히 몸이 그렇게 나쁘다면 불량배를 맨손으로 제압하는 건 어려운 일이겠지."
1600702-77 = "#na;상인 B;샬레의 선생님이 성질 나쁜 괴력의 소유자라는 소문은 역시 거짓말이었나……."
1600702-78 = "[s7] \"오해는 풀린 것 같지만…….\"\n[s8] \"뭔가 이상한 오해가 새로 생기지 않았어?\""
1600702-79 = "3;토모에;01;거짓말을 또 다른 거짓말로 덧씌우는 건 프로파간다의 기본이니까요.\n#3;em;[반응]\n#3;greeting"
1600702-80 = "3;토모에;01;거짓말을 또 다른 거짓말로 덧씌우는 건 프로파간다의 기본이니까요.\n#3;em;[반응]\n#3;greeting"
1600702-81 = "3;토모에;03;최소한 부정적인 오해는 걷어냈으니, 새로운 오해도 금세 사라질 겁니다."
1600702-82 = "[s] \"그건 그렇지만…….\""
1600702-83 = "#wait;1000"
1600702-84 = "[s] \"엄청난 화술이라 나도 속을 뻔했어.\""
1600702-85 = "3;토모에;01;후후. 소문의 당사자까지 속을 뻔했다니, 제 화술도 아직은 녹슬지 않은 모양이네요.\n#3;em;[반짝]"
1600702-86 = "#st;[0,0];instant;1;"
1600702-87 = "#clearST"
1600702-88 = "3;토모에;01\n#3;d\n#wait;1000"
1600702-89 = "#wait;150"
1600702-90 = "#wait;2000"
1600702-91 = "#na;상인 A;그나저나 선생. 몸 상태가 그리 나빠서야 학생을 제대로 지도할 수 있겠어?"
1600702-92 = "#na;상인 A;가짜 소문을 퍼트린 것에 대해 사과도 할 겸, 몸에 좋은 고기를 잔뜩 챙겨줄 테니 샬레에 가져가서 먹으라고!"
1600702-93 = "#na;상인 B;몸에 좋은 음식이라면 장어만한 게 없지. 여기 손질한 장어도 챙겨줄게!"
1600702-94 = "[s] \"이, 이렇게는 많이 못 먹는데요…….\""
1600702-95 = "#na;상인 A;그렇게 조금 먹어서야 몸이 건강해지겠어? 스모 선수처럼 잔뜩 먹어둬야지!\n#fontsize;80"
1600702-96 = "#na;상인 B;자, 말이 나온 김에 창코나베에 쓰는 닭고기랑 우동도 가져가!\n#fontsize;80"
1600702-97 = "#all;hide"
1600702-98 = "#na;(이후, 토모에의 연설 덕분에 '성질 나쁜 괴력의 소유자'라는 오해는 완벽히 풀렸지만…….)"
1600702-99 = "#na;(상인들로부터 몸에 좋은 건강식품을 잔뜩 선물 받았다…….)"

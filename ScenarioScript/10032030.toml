[translation]
10032030-1 = "Episode 3;Monopolizing the Prey"
10032030-20 = "...What..."
10032030-24 = "WHAT IS THIS?!"
10032030-26 = "Hahaha! You can always count on Aru to have the funniest reactions!"
10032030-27 = "What's with the surprise? We found all these suspicious people during our detective work. And we threw in the bombs we found with them too!"
10032030-28 = "They're not Arancino's subordinates, as far as we can tell. They're on the guest list, but we couldn't find any references to confirm their affiliation."
10032030-29 = "They're probably terrorists or members of a rival organization."
10032030-30 = "...We found them with just a quick sweep. There's probably a ton more inside."
10032030-31 = "I obviously know all of that! That's exactly the problem! How can you be so casual about this?!"
10032030-32 = "That's way more terrorists and bombs than we accounted for! Like a million times more!"
10032030-33 = "People should come to the Opera House to enjoy operas, not carry out secret operations and harm people!"
10032030-34 = "[s1] \"Uh... Do you hear yourself?!\"\n[s2] \"...I guess she's self-aware, at least?\""
10032030-37 = "Why are you focusing on small, irrelevant details, Sensei?! We need to get ahold of the situation, stat!"
10032030-38 = "If we don't find out why they're setting bombs and infiltrating the Opera House, the operation could...!"
10032030-39 = "Ugh! I thought we hid the bombs real well! How'd they find 'em?!"
10032030-40 = "Seriously, only a real professional coulda sniffed them out."
10032030-44 = "Consider yourselves unlucky. Our bomb expert is pretty good."
10032030-45 = "Haruka can install way more than you can in a day. Of course she knows where zygotes like you guys would put your bombs."
10032030-46 = "Heh. Heeheehee. Heehee."
10032030-47 = "In fact, she practically found them blindfolded. Are you guys new to this or something?"
10032030-53 = "Y-You callin' us newbies?!"
10032030-54 = "Who the hell are you, huh? Arancino send you to mess with us?!"
10032030-60 = "Are you done? I don't think you really get the situation you're in right now."
10032030-61 = "Ack!"
10032030-62 = "W-We don't know nothin'! Swear! I was just followin' orders to bump off Arancino!"
10032030-63 = "...Orders, huh?"
10032030-64 = "But bombs draw too much attention, and they cause a ton of unnecessary casualties. What were you thinking?"
10032030-65 = "There were so many better options for \"bumping someone off.\""
10032030-66 = "Bombs are your best chance at success, ain't they? We're being efficient!"
10032030-67 = "And who gives a crap about casualties?"
10032030-72 = "The ends justify the means, right? I can't be mad at that, I guess."
10032030-73 = "...Who're you working with? How many are there?"
10032030-74 = "Eh, I dunno numbers. Probably a handful."
10032030-78 = "Wait! I geddit! You're here under the same orders! You're tryna get him too!"
10032030-79 = "Look, I thought you were Arancino's goon because you attacked us and all that, but we ain't enemies!"
10032030-80 = "I scratch your back, you scratch mine! C'mon! It'll be easy pickins if we work together."
10032030-81 = "We're basically the same! Hey! You even listenin' to me? Leader-lookin' kid, c'mon!"
10032030-82 = "You listenin' to—"
10032030-87 = "...to...me...?"
10032030-93 = "Gyah?!"
10032030-98 = "[ns4] \"Aaand... They're knocked out.\"\n[ns5] \"Don't mess with Haruka...\""
10032030-103 = "...Who..."
10032030-104 = "Who gave you permission to be so arrogant...?"
10032030-105 = "You dare address our esteemed Aru as \"you\"? As \"LEADER-LOOKING\"?!"
10032030-106 = "You're comparing yourself to Aru?! Elevating yourself to her level?"
10032030-107 = "...Unforgivable..."
10032030-108 = "Unforgivable! Unforgivable unforgivable unforgivable unforgivable!"
10032030-115 = "Eeek! Please have mercy! I didn't mean none of it! For real! Seriously!"
10032030-119 = "That's enough, Haruka."
10032030-120 = "...!!"
10032030-121 = "...Y-Yes, ma'am!"
10032030-122 = "I suppose I can see the vision. Just make it easy for yourselves and level the entire Opera House."
10032030-123 = "It's not unreasonable. The plan or your request."
10032030-125 = "Th-Then..."
10032030-129 = "...But I only have bad news for you."
10032030-130 = "You see, Problem Solver 68 doesn't work with small fry like you."
10032030-134 = "Excuse me?!"
10032030-135 = "First, you call us newbies. Now small fry?! I ain't gonna hold back anymore!"
10032030-136 = "You think you're sooo big and strong because you caught us, don'tcha?! You ain't got no idea the kind of numbers we got posted up in the Opera House!"
10032030-137 = "In fact, they find out how y'all are treatin' us right now, and—"
10032030-139 = "...You know, you're right. "
10032030-143 = "In that case, let's make sure they don't find out."
10032030-147 = "Augh!"
10032030-154 = "As you were saying, Boss."
10032030-155 = "S-Sure..."
10032030-156 = "Listen up. Our target is the boss—Don Arancino."
10032030-157 = "Problem Solver 68 gets the job done. We don't believe in collaboration. He's ours and only ours."
10032030-158 = "We'll reinvestigate everyone in the Opera House before the target arrives. We need a better understanding of the current situation."
10032030-164 = "Oh man. The whole place? We're in for a task and a half."
10032030-165 = "She's right. It'll be time consuming. But we have the guest list, so it's not impossible."
10032030-171 = "The job is still the same. We'll finish it and get paid. That's what we're about."
10032030-172 = "They either make a deal with me, the boss, or they're obstacles. Nuisances. And you know how I deal with those."
10032030-176 = "Now then."
10032030-182 = "A-Aru! Aru...!!"
10032030-188 = "*sigh*"
10032030-189 = "This is exactly what I meant, Sensei."
10032030-190 = "I know what she said, but the boss..."
10032030-191 = "[s6] \"Don't worry. I got what she was saying.\"\n[s7] \"I mean, Aru is who she is, you know?\""
10032030-194 = "Heehee. Aru's not the type to be able to abandon a situation like this."
10032030-195 = "She puts up a tough front, but she's worried about the citizens."
10032030-196 = "This is way more fun than I thought it'd be. Heehee."
10032030-197 = "And on that note..."
10032030-198 = "...We'll be in your care for just a little longer, Sensei."

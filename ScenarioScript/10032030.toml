[translation]
10032030-1 = "ตอนที่ 3;พวกที่น่าสงสัย"
10032030-20 = "อะไรน่ะ..."
10032030-24 = "นี่มันอะไรกันนนนนน!?"
10032030-26 = "อะฮ่าฮ่าฮ่าฮ่า! ดูอารุจังทำหน้าเข้าสิ สุดยอดไปเลย!"
10032030-27 = "ถามมาได้ ก็ 'พวกที่น่าสงสัย' ที่เราจับตัวมาได้ระหว่างสำรวจสถานที่ไงล่ะ แถมยังเจอระเบิดที่ซ่อนเอา#nไว้ตามจุดโน้นจุดนี้ด้วยนะ!"
10032030-28 = "ถ้าจะพูดให้ชัดๆ ก็ต้องบอกว่าเป็นคนที่ 'ไม่ได้มีชื่อและประวัติอยู่ในลิสต์' เท่ากับว่าเป็นคนละฝ่ายกับ#nสมุนของอารันซิโน"
10032030-29 = "บางทีอาจจะเป็นผู้ก่อการร้ายหรือองค์กรคู่แข่งก็ได้"
10032030-30 = "จะว่าไป นี่เราแค่สำรวจคร่าวๆ ก็ได้ตัวคนที่น่าสงสัยถึงขนาดนี้ ฉันว่าข้างในนั้นต้องมีคนแฝงตัวอยู่อีก#nเยอะแน่"
10032030-31 = "ฉันไม่ได้ถามเพราะไม่รู้หรอกนะ! ทำไมทุกคนถึงได้ชิลกันขนาดนี้ล่ะ?"
10032030-32 = "แล้วทำไมถึงมีระเบิดกับผู้ก่อการร้ายมาอยู่ในโรงละครโอเปร่ามากมายขนาดนี้? มันไม่ควรจะเป็นอย่างนี้สิ!"
10032030-33 = "โรงละครโอเปร่าเป็นที่ที่ผู้คนเข้ามาชมโอเปร่ากัน ไม่ใช่ที่ที่จะมาทำร้ายใครไม่ใช่เหรอ!?"
10032030-34 = "[s1] \"อ่า... ถือว่าก็ยัง...!?\"\n[s2] \"มีความตระหนักรู้อยู่สินะ\""
10032030-37 = "ระ... เรื่องแบบนั้นช่างมันเถอะ! อย่ามาสนใจอะไรหยุมหยิมเลยน่าคุณครู!! ตอนนี้เราต้องวิเคราะห์#nสถานการณ์ก่อนสิ!"
10032030-38 = "เราต้องรู้ให้ได้ว่าทำไมคนพวกนั้นถึงมาติดตั้งระเบิดไว้ทั่วโรงละครโอเปร่าแบบนี้!"
10032030-39 = "อะ... อึก... ทำไมถึงรู้ได้นะ? คิดว่าซ่อนระเบิดไว้อย่างสมบูรณ์แบบแล้วเสียอีก..."
10032030-40 = "ถ้าไม่ใช่ผู้เชี่ยวชาญก็ไม่น่าจะหาเจอได้สิ ทำไมถึงหาเจอได้นะ...?"
10032030-44 = "ไม่ได้พกดวงมาด้วยสินะ บังเอิญจังที่เราก็มีผู้เชี่ยวชาญด้านการติดตั้งระเบิดมาด้วยเหมือนกัน"
10032030-45 = "ฮารุกะจังของเราติดตั้งระเบิดวันละหลายสิบกิโลเลยนะ เรื่องที่ซ่อนระเบิดน่ะเรื่องกล้วยๆ"
10032030-46 = "แหะ... แหะๆๆ... แหะๆๆๆๆ..."
10032030-47 = "แต่นี่เราแค่สำรวจสถานที่เองนะ ไม่ได้คิดจะหาระเบิดตั้งแต่แรกด้วยซ้ำ แบบนี้เรียกว่าติดตั้งได้สะเพร่า#nมากเกินไปรึเปล่า?"
10032030-53 = "ปะ... เป็นไปไม่ได้...!"
10032030-54 = "พวกเธอคือใครกันแน่!? ทำไมถึงมาขัดขวางพวกเราล่ะ? หรือว่าพวกเธอก็เป็นสมุนของอารันซิโน...!?"
10032030-60 = "คิดว่าตัวเองอยู่ในสถานะที่ถามได้งั้นเหรอ ก่อนจะพูดอะไรออกมา ฉันว่าวิเคราะห์สถานการณ์ก่อนดีกว่า"
10032030-61 = "เฮือกกกกก!?"
10032030-62 = "พะ... พวกเราไม่รู้นะ ไม่รู้อะไรเลย! เราก็แค่พยายามจะระเบิดอารันซิโนตามที่ได้รับคำสั่งมาก็เท่านั้น!"
10032030-63 = "ได้รับคำสั่งมาให้ทำแบบนี้สินะ"
10032030-64 = "แต่ระเบิดมีโอกาสสูงที่จะทำให้คนอื่นนอกเหนือจากเป้าหมายต้องเดือดร้อนไปด้วย ส่วนเสียงดังของระเบิดก็จะทำให้เกิดความวุ่นวายตามมา"
10032030-65 = "น่าจะมีวิธีอื่นอยู่เยอะเลย ถ้างั้นมีเหตุผลอะไรที่ต้องใช้ระเบิดด้วยล่ะ?"
10032030-66 = "กะ... ก็ไม่มีเหตุผลที่เราจะไม่ใช้ระเบิดนี่? วิธีอื่นมันก็มีแนวโน้มที่จะล้มเหลว..."
10032030-67 = "ส่วนเรื่องที่คนอื่นจะพลอยโดนลูกหลงไปด้วย พวกฉันไม่ต้องใส่ใจก็ได้..."
10032030-72 = "อยากจัดการให้ได้อย่างเฉียบขาดสินะ... มันก็ฟังดูมีเหตุผลอยู่หรอก"
10032030-73 = "แล้วคนอื่นๆ นอกจากนี้ล่ะ? ยังมีกันอีกเยอะมั้ย?"
10032030-74 = "ไม่รู้สิ... ฉันไม่รู้จำนวนแน่ชัดหรอก... แต่ดูแล้วน่าจะยังมีเหลืออีกนิดหน่อยนะ"
10032030-78 = "ปะ... เป็นอย่างนี้สินะ!! พวกเธอก็มาเพราะได้รับการว่าจ้างมาเหมือนกันใช่มั้ย!? มาทำงานเดียวกันกับพวกเราล่ะสิ?"
10032030-79 = "จู่ๆ ก็มาจับตัวพวกเราแบบนี้ ก็นึกว่าเป็นคนจากฝั่งอารันซิโนซะอีก... พวกเราไม่ใช่ศัตรูนะ!"
10032030-80 = "แก้มัดให้เดี๋ยวนี้! เดี๋ยวพวกเราช่วยเอง! ถ้าได้พวกเรามาช่วย งานของพวกเธอก็น่าจะง่ายขึ้นเยอะนะ!"
10032030-81 = "เราไม่จำเป็นต้องสู้กับพวกเดียวกันหรอก! หืม? ฟังอยู่รึเปล่า!? นี่ แกน่ะ ที่ดูเหมือนหัวโจกตรงนั้นน่ะ!!"
10032030-82 = "ฟังที่เราพูดอยู่..."
10032030-87 = "รึเปล่า...?"
10032030-93 = "เฮือกกก...!?"
10032030-98 = "[ns4] \"สอยร่วงเลยแฮะ\"\n[ns5] \"ฮารุกะโหดอยู่นะเนี่ย\""
10032030-103 = "ใคร..."
10032030-104 = "ใครบอกว่าให้พูดจาอวดดีแบบนั้นได้คะ...?"
10032030-105 = "กล้าดียังไงมาเรียกท่านอารุว่า 'แก' คะ? แล้วยังบอกว่าดูเหมือน 'หัวโจก' อีก!"
10032030-106 = "ไม่ใช่แค่นั้นนะ ยังมาเปรียบเทียบว่าท่านอารุเป็นเหมือนตัวเองอีก...!? กล้าดียังไง...?"
10032030-107 = "ยกโทษให้ไม่ได้ค่ะ..."
10032030-108 = "ยกโทษให้ไม่ได้ ยกโทษให้ไม่ได้ ยกโทษให้ไม่ได้ ยกโทษให้ไม่ได้ ยกโทษให้ไม่ได้ ยกโทษให้ไม่ได้...!!"
10032030-115 = "ฮะ.. เฮือกกก!?!? ยะ... อย่านะ! เว้นฉันไว้คนหนึ่ง! ฉันยังไม่ได้พูดอะไรเลย! ไม่ได้ขยับตัวด้วยซ้ำ!!"
10032030-119 = "ฮารุกะ พอได้แล้ว"
10032030-120 = "...!!"
10032030-121 = "ค่ะ... ค่ะ!"
10032030-122 = "ฉันพอจะเข้าใจสถานการณ์แล้วละ เข้ามาติดตั้งระเบิดไว้เพื่อจะบึ้มทั้งโรงละครโอเปร่าสินะ..."
10032030-123 = "ฉันยอมรับนะว่าเป็นความคิดที่ร้ายกาจดี..."
10032030-125 = "ถะ... ถ้างั้น...!?"
10032030-129 = "แต่ก็เสียใจด้วยนะ..."
10032030-130 = "เพราะหน่วยรับจ้างสารพัด 68 ของเราไม่ร่วมมือกับพวกคนกระจอกน่ะสิ"
10032030-134 = "ว่าไงนะ...!? วะ... ว่าพวกฉันกระจอกเหรอ??"
10032030-135 = "จะ... เจ้าพวกนี้นี่...! ปากเก่งมาตั้งแต่เมื่อกี้แล้วนะ...!"
10032030-136 = "คิดว่าแค่จับพวกฉันได้แล้วจะหยิ่งผยองได้งั้นเหรอ!? รู้มั้ยว่าในโรงละครโอเปร่าแห่งนี้มีพวกของฉันอยู่#nอีกมากแค่ไหน??"
10032030-137 = "ถ้าคนอื่นรู้ว่าพวกเธอกำลังทำแบบนี้กับพวกฉันอยู่ พวกเธอไม่รอดแน่...!!"
10032030-139 = "ก็จริงนะ..."
10032030-143 = "ถ้างั้นก็แค่อย่าให้คนอื่นรู้ก็พอ"
10032030-147 = "หาาา...!?"
10032030-154 = "ทำต่อเลย ประธาน"
10032030-155 = "อะ... อืม..."
10032030-156 = "ทุกคนฟังให้ดี! บอส... ดอน อารันซิโนยังเป็นเป้าหมายของเราเหมือนเดิม"
10032030-157 = "เราจะไม่หลีกทางให้คนอื่น และจะไม่ร่วมมือกับใครก็ตามที่เชื่อใจไม่ได้ด้วย เพราะนี่คืองานของพวกเรา"
10032030-158 = "คงต้องสืบค้นโรงละครโอเปร่าอีกสักรอบก่อนที่เป้าหมายจะมาแล้วละ... ค้นให้ทั่วโรงละครเลย"
10032030-164 = "เอ๋~ หาให้ทั่วเลยเหรอ? แบบนี้ไม่เหนื่อยแย่เลยเหรอน่ะ?"
10032030-165 = "เรามีรายชื่อของผู้ร่วมงานที่ได้รับมาแล้ว ต่อให้จะต้องใช้เวลาสักหน่อย แต่ก็ไม่ใช่เรื่องเหนือบ่ากว่าแรงพวกเราหรอก"
10032030-171 = "ไม่มีอะไรต่างจากเดิมมากหรอก เราได้รับงานมา เราทำให้สำเร็จ แล้วก็ได้รับค่าตอบแทน"
10032030-172 = "ไม่ว่าจะเป็นคู่แข่งหรือคนที่ได้รับงานมาเหมือนกัน ถ้าไม่มีการทำสัญญาล่วงหน้ากับประธานอย่างฉันไว้#nก่อนก็ถือว่าเป็นสิ่งกีดขวางในการทำภารกิจทุกกรณี! และถ้าเจอสิ่งกีดขวาง เราก็แค่ต้องกำจัดให้หมด"
10032030-176 = "ไปกันเถอะ..."
10032030-182 = "ทะ... ท่านอารุ! ท่านอารุ...!!"
10032030-188 = "เฮ้อ..."
10032030-189 = "เป็นแบบนี้จนได้สินะครู..."
10032030-190 = "ถึงจะพูดอย่างมั่นใจแบบนั้นก็เถอะ แต่สุดท้ายประธานก็..."
10032030-191 = "[s6] \"ไม่เป็นไรหรอก ครูรู้ว่าจะสื่ออะไร\"\n[s7] \"แต่นั่นก็สมกับเป็นอารุแล้วละ\""
10032030-194 = "ฮุฮุฮุ... คงปล่อยไว้เฉยๆ ไม่ได้ใช่มั้ยล่ะ? สมกับเป็นอารุจังจริงๆ เลย"
10032030-195 = "ก็นะ เพราะถ้าเกิดระเบิดขึ้นมาจริงๆ ผู้ชมที่ไม่รู้อิโหน่อิเหน่ก็จะบาดเจ็บเอาได้"
10032030-196 = "งานชักจะสนุกกว่าที่คิดเอาไว้แล้วสิ ไม่เลวเลยนะ~"
10032030-197 = "งั้นก็..."
10032030-198 = "ขอรบกวนอีกหน่อยนะครู..."

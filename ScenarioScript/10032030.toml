[translation]
10032030-1 = "第3話;獨享獵物"
10032030-20 = "……這……"
10032030-24 = "這是什麼啊啊啊啊──！？"
10032030-26 = "啊哈哈哈哈！亞瑠醬的反應真大！"
10032030-27 = "那些當然是我們在附近抓到的「可疑人物」囉？還有隱藏在各處的炸彈！"
10032030-28 = "準確來說是那些「名單上未登記身份的人」。#n跟阿蘭奇諾的部下屬於不同陣營。"
10032030-29 = "說不定是恐怖份子，或是他們的敵對組織。"
10032030-30 = "……不過光是粗略查看已經發現這麼多，裡面還肯定有更多。"
10032030-31 = "我又不是不知道才問的！？#n重點是大家為什麼一副若無其事的樣子啊！？"
10032030-32 = "怎麼會有這麼多炸彈和恐怖分子藏在歌劇院啊！？到底為什麼……！？"
10032030-33 = "歌劇院是欣賞歌劇的地方，而不是用來傷害別人的地方啊！"
10032030-34 = "[s1]「呃……現在才說會不會太晚了……！？」\n[s2]「原來你有自覺啊……」"
10032030-37 = "現，現在就別捉弄我了！老師！得先掌握情況才行！"
10032030-38 = "我們必須弄清楚，這些傢伙為什麼會在歌劇院四處藏匿跟設置炸彈！"
10032030-39 = "唔……你們是怎麼發現的？#n炸彈應該隱藏得很完美才對……"
10032030-40 = "那些位置除非是專家，否則根本無法發現……你們是怎麼找到的？"
10032030-44 = "算你們運氣不好，我們這裡正好有安裝炸彈的專家。"
10032030-45 = "遙香醬可是能在一天之內安裝數十kg的炸彈呢。#n哪些地方比較適合，只要一眼就能看出來唷？"
10032030-46 = "嘿，嘿嘿……耶嘿嘿嘿……"
10032030-47 = "話說我們都沒特別找就發現了這麼多，你們的技術是不是有點太差了？#n我指的是安裝的部分。"
10032030-53 = "那，那怎麼可能……！"
10032030-54 = "你們到底是誰！？為什麼要妨礙我們？你們是阿蘭奇諾的部下嗎……！？"
10032030-60 = "你提問的方向錯了。#n在說話前最好還是掌握一下狀況吧。"
10032030-61 = "噫噫──！？"
10032030-62 = "我，我們不知道，我們什麼都不曉得！#n只是按照指示把阿蘭奇諾炸飛而已！"
10032030-63 = "……果然是受人委託啊。"
10032030-64 = "但是炸彈很可能會波及目標以外的無關群眾。#n如果引發大規模騷動的話，還可能會造成更多麻煩。"
10032030-65 = "為什麼一定要用炸彈？應該還有很多別的方法才對。"
10032030-66 = "這，這也不代表不能用炸彈吧？#n反正其他方法失敗的機率也很高……"
10032030-67 = "而且其他人會怎樣，跟我們也沒關係……"
10032030-72 = "打算確實處理掉目標嗎……還算是有點道理。"
10032030-73 = "……除了你們以外的其他傢伙呢？還有多少人？"
10032030-74 = "這個……我不太確定……但應該還有一些人才對。"
10032030-78 = "我，我知道了！！你們也跟我們一樣，是為了委託而來的吧！？"
10032030-79 = "因為突然遭到攻擊，我還以為你們是阿蘭奇諾那邊的人……我們並不是敵人！！"
10032030-80 = "幫我們鬆綁吧！我們會協助你們！#n這樣你們的工作也會更順利才對！"
10032030-81 = "既然我們一樣，又何必互相爭鬥呢！？#n喂！你有在聽嗎！？那邊那個像是隊長的傢伙！！"
10032030-82 = "你有在聽……"
10032030-87 = "……我們說話……？"
10032030-93 = "呃咿咿……！？"
10032030-98 = "[ns4]「突然就弄暈他了。」\n[ns5]「遙香還真是不留情面呢。」"
10032030-103 = "……是誰……"
10032030-104 = "是誰……允許你說那麼放肆的話……？"
10032030-105 = "剛才竟敢用「喂」、「像是隊長的傢伙」稱呼亞瑠大人……？"
10032030-106 = "還說亞瑠大人和你這種人一樣……！？#n這怎麼可以……？"
10032030-107 = "不可饒恕……"
10032030-108 = "不可饒恕不可饒恕不可饒恕不可饒恕不可饒恕……！！"
10032030-115 = "噫，噫噫──！？！？沒，沒有！我剛才什麼話都沒說！一直乖乖待著啊！！"
10032030-119 = "……遙香，已經夠了。"
10032030-120 = "……！！"
10032030-121 = "……是，是！"
10032030-122 = "情況我大致瞭解了。#n你們打算安裝炸彈，炸飛整個歌劇院……"
10032030-123 = "是個合理的想法……我也明白你想說什麼。"
10032030-125 = "那，那麼……！？"
10032030-129 = "……但是很遺憾。"
10032030-130 = "我們「便利屋68」不打算跟你們這種小嘍囉合作。"
10032030-134 = "什麼……！？小，小嘍囉！？"
10032030-135 = "你，你這傢伙……！我已經忍你很久了……！"
10032030-136 = "只是抓到我們可別高興得太早！？知不知道這座歌劇院裡還藏著多少人！？"
10032030-137 = "一旦其他夥伴知道你們的行為，肯定會把你們……！！"
10032030-139 = "……也對。"
10032030-143 = "那可不能讓他們知道呢。"
10032030-147 = "唔呃……！？"
10032030-154 = "……繼續說吧，社長。"
10032030-155 = "啊，嗯……"
10032030-156 = "大家都聽好！不管怎樣……唐．阿蘭奇諾都是我們的目標。"
10032030-157 = "除了不能讓給其他人之外，這次委託當然也不會跟不能信任的人合作。#n這完全是我們自己的工作。"
10032030-158 = "……看來在目標抵達之前，有必要再搜查一次歌劇院了。"
10032030-164 = "咦～全部？這不是件容易的事耶？"
10032030-165 = "我們有聯絡人提供的名單，確實能辦得到……雖然會花上一點時間。"
10032030-171 = "情況並沒有改變。#n我們接受委託、完成任務，最後收下報酬。"
10032030-172 = "不管是競爭還是合作，只要沒有跟身為社長的我事先簽訂合約，就都只是干擾而已。而我們將會把所有干擾全部排除。"
10032030-176 = "……走吧。"
10032030-182 = "亞，亞瑠大人！亞瑠大人……！！"
10032030-188 = "唉……"
10032030-189 = "……最後還是變成這樣了，老師。"
10032030-190 = "雖然這麼說，但社長他還是……"
10032030-191 = "[s6]「沒關係，我知道他的意思。」\n[s7]「如果是亞瑠，應該就會那麼做。」"
10032030-194 = "咯呵呵……果然無法置之不理吧？#n真像亞瑠醬會做的事。"
10032030-195 = "嗯，如果炸彈爆炸的話，一般觀眾會受傷也是事實。"
10032030-196 = "事情變得比想像中還要有趣，真不錯～"
10032030-197 = "那麼……"
10032030-198 = "……要再麻煩你一陣子了，老師。"

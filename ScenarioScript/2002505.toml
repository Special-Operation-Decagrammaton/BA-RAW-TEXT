[translation]
2002505-1 = "สายลมเย็นเฉียบและแสงแดดอบอุ่น"
2002505-2 = "(อากาศหนาวขึ้นเรื่อยๆ จนรู้สึกได้ถึงลมเย็นยะเยือกจนบาดผิว...)"
2002505-3 = "(คุณครูนึกเป็นห่วงฮารุกะกับวัชพืชขึ้นมาเลยแวะไปดูที่ฐานลับ...)"
2002505-5 = "(โชคดีที่พอเข้ามาข้างในอาคารแล้วรู้สึกอบอุ่นกว่าอากาศด้านนอก...)"
2002505-9 = "(ถึงอย่างนั้น เวลาได้ยินเสียงสายลมส่งเสียงหวีดหวิวเบาๆ ก็รู้สึกหนาวขึ้นมาอยู่ดี...)"
2002505-13 = "[ns1] จงใจส่งเสียงเพราะไม่อยากให้ตกใจ\n[ns2] \"ฮารุกะ~ ครูเองนะ\""
2002505-14 = "เฮือกก!? คะ.. คุณครู?! คุณครู...!?  "
2002505-15 = "เฮือกก!? คะ.. คุณครู?! คุณครู...!? "
2002505-16 = "จะ...จะออกไปเดี๋ยวนี้แหละค่ะ! จะรีบออกไปหาค่ะ!!"
2002505-24 = "คะ... คุณครู...!? อากาศหนาวขนาดนี้ มีธุระอะไรถึงมาที่นี่เหรอคะ...!?"
2002505-25 = "อ่า... เอ่อ... ฉันไม่ได้หมายความว่าห้ามมาหาหรืออะไรทำนองนั้นนะคะ! ก็แค่..."
2002505-26 = "[s3] \"ครูเป็นห่วงฮารุกะกับวัชพืชก็เลยแวะมาหาน่ะ\"\n[s4] \"พวกวัชพืชโอเครึเปล่า?\""
2002505-27 = "คะ...?"
2002505-28 = "คะ...?"
2002505-29 = "คะ... คะ!? พะ...พวกเด็กๆ ปลอดภัยค่ะ แต่ว่า... คุณครูไม่ต้องเป็นห่วงพวกเราก็ได้นะคะ!"
2002505-30 = "พะ...พวกเราต้องโอเคอยู่แล้วค่ะ ค่ะ... ไม่มีปัญหาอะไรเลยค่ะ!! อันที่จริง... อากาศแบบนี้มันอาจจะ#nเหมาะกับพวกเราก็ได้ค่ะ"
2002505-34 = "ถะ... ถึงลมมันจะเย็นเฉียบอย่างที่คุณครูบอกก็เถอะค่ะ..."
2002505-35 = "แต่เด็กๆ พวกนั้นทนต่อลมเย็นได้อยู่แล้วค่ะ"
2002505-36 = "แค่มีแสงแดดกับรดน้ำให้ตรงเวลา... เด็กพวกนั้นก็มีชีวิตรอดไปได้ ไม่ตายแล้วค่ะ"
2002505-37 = "ก็เป็นวัชพืชนี่คะ..."
2002505-38 = "[s5] \"ถึงแบบนั้น แต่ก็ยังมาดูแลนะ...\"\n[s6] \"ฮารุกะเป็นคนใจดีจังเลยนะ...\""
2002505-39 = "ปะ... เปล่าค่ะ! ไม่ใช่อย่างนั้น!!"
2002505-40 = "ปะ... เปล่าค่ะ! ไม่ใช่อย่างนั้นนะคะ!!"
2002505-41 = "มะ... ไม่ใช่สิ ฉันไม่ได้เถียงนะคะ ก็ไม่เชิงว่าไม่ใช่อย่างนั้น..."
2002505-42 = "อย่างที่บอกไปว่าข้อดีของวัชพืชคือมันโตเองได้โดยไม่ต้องมีคนดูแล..."
2002505-43 = "แต่การมีคนคอยดูแล... พวกเด็กๆ ก็น่าจะดีใจ..."
2002505-44 = "เพราะงั้นฉันเลยแวะมาดูแลพวกเด็กๆ เมื่อกี้ก็กำลังรดน้ำอยู่พอดีเลยค่ะ เรื่องก็มีแค่นั้น..."
2002505-45 = "คุณครู...?"
2002505-46 = "จะช่วยอีกแรงเหรอคะ...? มะ... ไม่ได้ค่ะ! ไม่เป็นไรเลยค่ะ!!"
2002505-47 = "ฉะ... ฉันทำเสร็จหมดแล้วค่ะ! ฉันจัดการเสร็จหมดแล้วค่ะ! ถ้าทำให้ครูต้องมือเปื้อนน้ำ ฉันกับพวกเด็กๆ#nก็คง...!!"
2002505-48 = "คะ...?"
2002505-49 = "ไปด้วยกันงั้นเหรอคะ...? อ่า... ค่ะ ว่าแต่จะไปไหนเหรอคะ..."
2002505-50 = "มะ...ไม่ใช่ค่ะ ฉันกล้าถามเรื่องแบบนั้นได้ยังไงกัน!!"
2002505-51 = "ฉะ... ฉันจะตามไปค่ะ! ไม่ว่าจะเป็นที่ไหนก็ตาม จะให้ไปบุกกองเพลิงที่ไหนก็จะไปค่ะ!!"
2002505-62 = "คะ... คุณครู...? ที่นี่คือ...? "
2002505-63 = "[s7] \"ครูอยากกินอะไรร้อนๆ สักหน่อย\"\n[s8] \"ครูอยากให้ฮารุกะมากินด้วยกันน่ะ\""
2002505-64 = "อะ... อะไรนะคะ...?! อยู่ดีๆ ทำไมถึง...!? ทำสิ่งนี้เพื่อคนอย่างฉัน..."
2002505-65 = "อะ... อะไรนะคะ...?! อยู่ดีๆ ทำไมถึง...!? ทำสิ่งนี้เพื่อคนอย่างฉัน..."
2002505-66 = "ถะ...ถึงคุณครูจะทุ่มเทให้ฉันมากมาย... ตะ...แต่ฉันก็ไม่มีอะไรจะให้แล้วค่ะ... ตอนนี้... ฉะ...ฉันก็มอบให้#nทั้งชีวิตแล้ว..."
2002505-67 = "ถ้ารับน้ำใจคุณครูอีก... ชาตินี้ก็คงตอบแทนไม่หมด คงต้องตามไปตอบแทนทุกชาติแล้วละค่ะ..."
2002505-68 = "ปะ...เปล่านะคะ ฉะ...ฉันก็ตั้งใจจะตอบแทนบุญคุณคุณครูไปถึงชาติหน้าอยู่แล้ว มะ...มันไม่มีปัญหาเลย#nค่ะ แต่ว่า..."
2002505-69 = "[s9] \"มีคนคอยดูแลน่ะมันดีต่อใจนะ\"\n[s10] \"ครูอยากให้ฮารุกะมีความสุขเหมือนพวกวัชพืชนะ\""
2002505-70 = "อา..."
2002505-71 = "อา..."
2002505-72 = "อะ... อืม... อึก..."
2002505-73 = "ระ... เรื่องนั้น... เอ่อ... อึก..."
2002505-74 = "เอ๋~~!?!?!"
2002505-75 = "[s11] \"เอาละ ใจเย็นก่อนนะ ฮารุกะ\"\n[s12] \"วันนี้เลิกตกใจได้แล้วนะ~\""
2002505-76 = "...!!"
2002505-77 = "...!!"
2002505-78 = "ค่ะ... ค่ะ..."
2002505-79 = "ค่ะ...!! หยุดแล้วค่ะ!!"
2002505-80 = "ถะ... ถ้างั้น..."
2002505-84 = "ถ้างั้น..."
2002505-85 = "จะทานแล้วนะคะ...!!"
2002505-87 = "(หลังจากซื้อของกินเล่นร้อนๆ ให้ฮารุกะแล้วคุณครูก็กลับไปที่ชาเล่ต์)"

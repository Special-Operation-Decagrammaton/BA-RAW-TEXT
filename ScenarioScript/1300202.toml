[translation]
1300202-1 = "ผู้นำ"
1300202-2 = "โรงอาหารเกเฮนน่า"
1300202-3 = "คุณครูคะ การแข่งขันกินในเมืองใกล้จะเริ่มแล้ว เราเหลือเวลาไม่มากแล้วนะคะ!"
1300202-4 = "ในคราวนี้จะเป็นการแข่งขันกินแฮมเบอร์เกอร์ ฉันไม่เคยท้าทายตัวเองด้วยการกิน#nแฮมเบอร์เกอร์แบบหลายๆ ชิ้นมาก่อน เพราะงั้นรอบนี้ฉันก็เลยกังวลอยู่พอตัวเลยล่ะค่ะ"
1300202-5 = "แต่ฉันจะยังยอมแพ้ไม่ได้! ฉันต้องรักษาสถิติชนะต่อเนื่องไว้ให้ได้ 3 ปีติดต่อกัน!"
1300202-6 = "เพราะแบบนี้ฉันเลยจะไปฝึกกินแฮมเบอร์เกอร์ล่วงหน้าที่โรงอาหารเกเฮนน่านี่ก่อนน่ะค่ะ"
1300202-7 = "แต่ว่า... มันก็มีความเสี่ยงอยู่ว่าฉันอาจจะควบคุมตัวเองได้ไม่ดีนักหากฉันฝึกด้วยตัวเอง#nคุณครูช่วยควบคุมจังหวะในการกินของฉันเพื่อไม่ให้ฉันกินมากเกินไปด้วยเถอะนะคะ!"
1300202-8 = "[s] \"ช่วยควบคุมจังหวะเหรอ?\""
1300202-9 = "หืม? คุณครูไม่เคยควบคุมจังหวะมาก่อนเหรอคะ?"
1300202-10 = "ปกติแล้วในการแข่งวิ่งมาราธอน จะมีนักวิ่งที่วิ่งรักษาระดับให้เท่ากับนักวิ่งคนอื่น#nเพื่อที่จะคอยควบคุมพวกเขาให้อยู่ในจังหวะเดียวกันได้"
1300202-11 = "หากโฟกัสในการวิ่งให้เร็วอย่างเดียวโดยไม่คำนึงถึงระยะทางที่เหลือ#nนักวิ่งก็จะหมดแรงวิ่งไปก่อนยังไงล่ะคะ"
1300202-12 = "การแข่งขันกินก็เหมือนกันกับการวิ่งมาราธอนค่ะ หากไม่ควบคุมจังหวะในการกิน#nและทำการยัดอาหารเข้าไปอย่างเดียว คุณครูก็จะเบื่อรสชาติของมันเร็วมากไป#nและที่แย่ไปกว่านั้นก็คืออาจเกิดการท้องไส้ปั่นป่วนได้ด้วยค่ะ!"
1300202-13 = "เพราะแบบนี้ฉันเลยอยากให้คุณครูกินแฮมเบอร์เกอร์ไปพร้อมๆ กันกับฉันค่ะ!"
1300202-14 = "[s] \"แต่ว่าครูกินได้ไม่เยอะเท่ากับอาคาริหรอกนะ...\""
1300202-15 = "ไม่ต้องกังวลไปค่ะ! ฉันรู้อยู่แล้วว่าคุณครูจะพูดแบบนั้น ฉันเลยเตรียมแฮมเบอร์เกอร์อันจิ๋ว#nไว้ให้แทนแล้วค่ะ"
1300202-16 = "ทุกครั้งที่คุณครูกินเบอร์เกอร์ชิ้นเล็กนี่หนึ่งชิ้น ฉันก็จะกินชิ้นใหญ่หนึ่งชิ้น#nแบบนั้นฉันจะได้ควบคุมจังหวะในการกินของฉันให้เท่ากับคุณครูได้ค่ะ"
1300202-17 = "เอาละ ถ้างั้นเรามาเริ่มกันเลยดีกว่านะคะ!"
1300202-19 = "แฮมเบอร์เกอร์ชิ้นที่ 31 จะทานแล้วนะคะ!"
1300202-20 = "เร็วเข้าค่ะ ได้เวลากินแฮมเบอร์เกอร์ชิ้นที่ 32 แล้ว......"
1300202-21 = "[s] \"อึ่ก...\""
1300202-22 = "คุณครูยังกินชิ้นนั้นไม่หมดอีกเหรอคะ? ชิ้นมันขนาดพอดีคำเลยนะ กลืนมันเข้าไปให้หมดเลยค่ะ"
1300202-23 = "เรายังต้องกินอีกเยอะเลย แล้วฉันก็อยากให้คุณครูกินไปพร้อมกับฉันนะคะ#nเป้าหมายของเราคือ 100 ชิ้น! มากินกันต่อเถอะค่ะ!"
1300202-24 = "...คุณครูอยากรู้ไหมคะว่าสถิติโลกในการกินแฮมเบอร์เกอร์สูงสุดคือกี่ชิ้น?\n"
1300202-25 = "ถ้าฉันจำไม่ผิด เคยมีนักแข่งกินที่สามารถกินเบอร์เกอร์ได้ 30 ชิ้นในครั้งเดียว#nและนั่นยังเป็นสถิติโลกอยู่ หลังจากเกิดเหตุการณ์นั้นขึ้นมาแล้วแฮมเบอร์เกอร์#nก็ไม่เคยถูกเลือกใช้เป็นอาหารในการแข่งขันกินอีกเลยค่ะ"
1300202-26 = "อะไรนะคะ คุณครูคิดว่าเราควรหยุดกินเพราะว่าฉันทำลายสถิติเดิมไปแล้วน่ะเหรอคะ?"
1300202-27 = "ไม่ได้นะคะ! เราควรทำอย่างเต็มที่ในทุกการแข่งขัน ไม่ว่าจะทำสถิติได้แค่ไหนก็ตาม!"
1300202-28 = "คุณครูต้องเข้าใจนะคะ...ว่าการต่อสู้นี้มันคือการต่อสู้กับตัวฉันเอง!"
1300202-29 = "[s] \"ครูกินไม่ไหวแล้ว...\""
1300202-30 = "เร็วเข้าสิคะคุณครู! จะยอมแพ้ตอนนี้ไม่ได้นะคะ! ฉันยังเหลือให้ต้องกินอีกหลายชิ้นเลยนะคะ"
1300202-31 = "ถ้าคุณครูกินเองไม่ไหวแล้ว เดี๋ยวฉันป้อนคุณครูเองค่ะ ช่วยอ้าปากกว้างๆ ด้วยนะคะ"
1300202-32 = "เอาละคุณครูคะ~ อ้ามม~ ♥"
1300202-34 = "หลังจากนั้นอาคาริก็โน้มน้าวให้คุณครูกินแฮมเบอร์เกอร์ชิ้นเล็กเพิ่มอีก#nแต่คุณครูก็ถอนตัวก่อนที่จะกินชิ้นที่ 40..."

[translation]
1300202-1 = "#title;페이스 메이커"
1300202-2 = "#place;게헨나 학생식당"
1300202-3 = "3;아카리;03;선생님, 센트럴 상점가에서 주최하는 대식 대회의 날이 얼마 남지 않았어요!\n#3;em;[음표]\n#3;greeting\n#3;a"
1300202-4 = "3;아카리;02;이번 대식 대회의 대결 종목은 <햄버거 많이 먹기>라고 하는데, 햄버거로는 많이 먹기에 도전한 적이 없어서 조금 긴장되네요."
1300202-5 = "3;아카리;03;하지만 3년 연속 대식 챔피언의 자리를 놓치지 않기 위해서라도 여기서 포기할 수는 없죠!\n#3;hophop\n#3;em;[반짝]"
1300202-6 = "3;아카리;02;그래서 오늘은 대회에 앞서 이곳, 게헨나 학생식당에서 햄버거 많이 먹기를 미리 연습해 두려고 해요.\n#3;greeting"
1300202-7 = "3;아카리;99;다만…… 다른 도전자 없이 혼자서 대식 연습을 했다가는 컨디션을 망칠 수도 있으니, 선생님께서 제 페이스 메이커가 되어주세요!\n#3;em;…"
1300202-8 = "[s] \"페이스 메이커가 뭐야?\""
1300202-9 = "3;아카리;04;네? 페이스 메이커, 모르시나요?\n#3;em;[?]\n#3;stiff"
1300202-10 = "3;아카리;02;페이스 메이커란 마라톤 대회에서 선수와 함께 뛰며 페이스를 조절해주는 보조 선수를 의미하는 말이에요."
1300202-11 = "3;아카리;99;남은 거리를 계산하지 않고 무작정 빨리 달리기만 하다 보면 천천히 뛰는 것보다 훨씬 더 쉽게 지칠 수 있거든요."
1300202-12 = "3;아카리;01;대식 대회도 마라톤과 마찬가지에요. 처음부터 페이스를 잃고 음식을 허겁지겁 먹으면 금세 음식의 맛에 질리게 되고, 심한 경우에는 체할 수도 있어요!"
1300202-13 = "3;아카리;03;그러니 선생님이 옆에서 저와 보조를 맞춰서 같이 햄버거를 먹어주세요!\n#3;em;[반짝]\n#3;jump"
1300202-14 = "[s] \"하지만 나는 아카리처럼 많이 먹지 못하는데…….\""
1300202-15 = "3;아카리;01;괜찮아요. 그러실 줄 알고 선생님을 위한 미니 햄버거를 미리 준비해 두었거든요.\n#3;greeting"
1300202-16 = "3;아카리;02;선생님께서 작은 햄버거를 하나 먹을 때마다 제가 큰 햄버거를 하나씩 먹으며 페이스를 맞추어 갈게요.\n#3;em;[음표]"
1300202-17 = "3;아카리;03;자, 그럼 시작합니다!\n#3;jump"
1300202-18 = "3;아카리;01\n#3;closeup"
1300202-19 = "3;아카리;02;31개째 햄버거, 잘 먹었습니다!\n#3;em;[음표]\n#3;greeting\n#3;closeup"
1300202-20 = "3;아카리;01;자, 그럼 이어서 32개째의 햄버거를…….\n#3;closeup"
1300202-21 = "[s] \"으으…….\""
1300202-22 = "3;아카리;04;선생님, 아직도 그 미니 햄버거를 다 드시지 못한 건가요? 미니 햄버거는 그냥 한 입에 통째로 밀어 넣고 꿀꺽 삼키면 되잖아요.\n#3;closeup\n#3;em;[땀]"
1300202-23 = "3;아카리;02;아직 갈 길이 멀었는데, 벌써 지치시면 곤란해요. #n목표는 100개! 좀 더 팍팍 달리자고요!\n#3;closeup\n#3;em;[반짝]"
1300202-24 = "3;아카리;04;……햄버거 종목의 역대 신기록이요?\n#3;closeup\n#3;stiff"
1300202-25 = "3;아카리;04;분명 제가 기억하기로는…… 10년전 대회에서 햄버거 30개를 먹은 어느 선수가 세운 기록이 신기록이었다고 들었어요. 그 이후로 햄버거가 대식 대회의 종목으로 선정된 적은 없었죠.\n#3;closeup"
1300202-26 = "3;아카리;04;네? 그럼 이미 신기록을 갱신한 셈이니 여기서 그만두어도 되지 않느냐고요?\n#3;closeup\n#3;em;[?]"
1300202-27 = "3;아카리;02;안 돼요! 기록에 연연하지 말고 진지하게 승부에 임해야죠!\n#3;closeup\n#3;jump"
1300202-28 = "3;아카리;99;이 승부는 다시 말하자면…… 저 자신과의 싸움이에요!\n#3;closeup\n#3;greeting\n#3;em;[반짝]"
1300202-29 = "[s] \"나는 이미 틀렸어…….\""
1300202-30 = "3;아카리;01;자, 선생님. 포기하지 말고 일어나세요. 저는 아직 한참 부족하다고요.\n#3;closeup"
1300202-31 = "3;아카리;02;포크를 드시는 게 어렵다면 제가 대신 먹여드릴 테니, 선생님은 입만 벌리세요.\n#3;closeup"
1300202-32 = "3;아카리;05;자, 선생님. 그럼 아~ 해 보세요. 아~♥\n#3;closeup\n#3;greeting\n#3;em;[하트]"
1300202-33 = "#all;hide"
1300202-34 = "#na;이후, 아카리의 기세에 떠밀려 억지로 계속 미니 햄버거를 먹었지만 결국 40개를 넘기지 못하고 포기했다……."

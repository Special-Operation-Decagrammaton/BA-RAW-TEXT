[translation]
1300202-1 = "配速員"
1300202-2 = "格黑娜．學生餐廳"
1300202-3 = "老師，中央商店街舉辦的大胃王比賽就快要到了！"
1300202-4 = "這次大胃王比賽的項目是「漢堡」，可是我從來沒挑戰過漢堡大胃王比賽，所以有點緊張。"
1300202-5 = "但是為了捍衛大胃王比賽三連霸的頭銜，我不能在這裡放棄！"
1300202-6 = "所以為了今天的比賽，我打算先在格黑娜學生餐廳進行特訓。"
1300202-7 = "但是，在沒有其他挑戰者的狀況下獨自練習大胃王，可能會傷到自己的身體……所以老師，你能當我的配速員嗎？"
1300202-8 = "[s]「配速員？」"
1300202-9 = "哎呀？老師不知道什麼是配速員嗎？"
1300202-10 = "所謂配速員，就是在馬拉松等比賽中，陪特定選手一起跑，協助選手適度調整節奏的人。"
1300202-11 = "學理上，若只會拚命衝刺，反而還比慢慢跑更容易累。"
1300202-12 = "大胃王比賽也一樣。如果一開始就亂了節奏埋頭猛吃，不僅很快就會吃膩，嚴重的話還可能會消化不良！"
1300202-13 = "所以老師，請在旁邊陪我一起吃漢堡！"
1300202-14 = "[s]「但我不像亞伽里那麼會吃耶……」"
1300202-15 = "沒事，我有想好了。我事先替老師準備了一些迷你漢堡。"
1300202-16 = "我會配合老師的步調，你每吃掉一個小漢堡，我就會吃掉一個大漢堡。"
1300202-17 = "讓我們開始吧！"
1300202-19 = "第31個漢堡，吃完了！"
1300202-20 = "好，接著是第32個……"
1300202-21 = "[s]「呃呃……」"
1300202-22 = "老師，你怎麼停下來了？那種大小不是只要一口塞進嘴裡，就能吞下去了嗎？"
1300202-23 = "我們還有很長一段路要走，現在就停下腳步可傷腦筋了。#n目標是100份！加快腳步吧！"
1300202-24 = "咦？……你問我漢堡大胃王的歷代成績嗎？"
1300202-25 = "我記得在我開始參加大胃王比賽之前……10年前有個優勝者創下了「30個」的最高紀錄後，漢堡就沒有再被選為比賽項目了。"
1300202-26 = "咦？你說既然現在都更新紀錄了，要不要吃到這裡就好……？"
1300202-27 = "不行！我們不能抱持這種不上不下的態度！"
1300202-28 = "這場比賽要挑戰的不是歷史紀錄……而是我自己！"
1300202-29 = "[s]「我，已經，不行了……」"
1300202-30 = "好了，老師。請你不要放棄振作起來。我根本還沒吃夠呢。"
1300202-31 = "如果老師不自己動手吃，那就由我餵老師吃，老師只要顧著張嘴就好了。"
1300202-32 = "來，老師。張開嘴巴～啊～♥"
1300202-34 = "（之後，被亞伽里的氣勢所逼，硬是繼續吃下迷你漢堡，最終吃到快40個就真的是極限了……）"

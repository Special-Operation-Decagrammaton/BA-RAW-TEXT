[translation]
1300202-1 = "Setting the Pace"
1300202-2 = "Gehenna Student Dining Hall"
1300202-3 = "Sensei, we don't have much time left before the eating contest downtown!"
1300202-4 = "This time, it's gonna be a hamburger-eating contest. I've never challenged myself to competitively eat hamburgers before, so I'm a bit nervous about this one."
1300202-5 = "I can't give up yet, though! I need to keep my winning streak going for the third year in a row!"
1300202-6 = "That's why I'm going to practice eating burgers in advance, here at the Gehenna dining hall."
1300202-7 = "Though... There's a risk of not pacing myself right if I do this solo. Please help set my pace and make sure I don't overextend myself!"
1300202-8 = "[s] \"Set your pace?\""
1300202-9 = "Huh? You've never had to set pace before?"
1300202-10 = "In marathons, there are runners who run alongside others just to keep them on an even pace."
1300202-11 = "If you only focus on running fast without considering the remaining distance, you'll run out of steam too quickly."
1300202-12 = "An eating contest is just like a marathon. If you don't keep your pace and start off inhaling food, you'll get tired of its taste sooner. Even worse, you might get an upset stomach!"
1300202-13 = "That's why I want you to keep up with me when I'm eating burgers, Sensei!"
1300202-14 = "[s] \"But I can't eat nearly as much as you do, Akari...\""
1300202-15 = "Don't worry! I knew you'd say that, so I prepared some sliders for you instead."
1300202-16 = "Every time you eat one of these tiny burgers, I'll eat a big one. That way I can match my pace with yours."
1300202-17 = "Well, then, let's get started!"
1300202-19 = "That's thirty-one hamburgers down!"
1300202-20 = "Come on, time for hamburger number thirty-two..."
1300202-21 = "[s] \"Urgh...\""
1300202-22 = "Sensei, haven't you finished your slider yet? It's bite-sized, so just swallow it whole."
1300202-23 = "We still have a long way to go, and I need you with me. Our goal is a hundred! Let's move, chop-chop!"
1300202-24 = "...You wanna know what the world record for hamburger eating is?"
1300202-25 = "If I remember correctly, there was a competitive eater who ate thirty burgers in one go, and that's still the world record. Since that monumental occasion, burgers have never been selected as the subject of an eating contest."
1300202-26 = "What, do you think we should stop since I already set a new record?"
1300202-27 = "No way! We should give our all in every competition, regardless of records!"
1300202-28 = "You have to understand...this battle is a battle against myself!"
1300202-29 = "[s] \"I'm a lost cause already...\""
1300202-30 = "Come on, Sensei! Less whining and more eating! I'm still far from finished."
1300202-31 = "If you can't feed yourself, then I'll just feed them to you. Open your mouth, okay?"
1300202-32 = "All right, Sensei. Say \"Ahhh...\" ♥"
1300202-34 = "After that, Akari talked me into eating more sliders, but I tapped out before taking down forty..."

[translation]
10012065-1 = "ตอนที่ 6;ความฝันในคืนฤดูร้อน"
10012065-5 = "ฮึบ... ฮึบ..."
10012065-6 = "ฮู่วว... นี่ก็กล่องสุดท้ายแล้วละค่ะ"
10012065-7 = "ฝั่งนี้ก็เสร็จแล้ว ทางคุณครูล่ะ?"
10012065-8 = "[s1] \"ครูก็ขนมาหมดแล้ว\"\n[s2] \"โอย เอวเคล็ดเลย\""
10012065-9 = "เอาละ เอาวางไว้ตรงนั้นเลย ที่เหลือฉันจัดการเอง"
10012065-10 = "ดูจากสีหน้าแล้ว ไม่น่าจะเจ็บอะไรเลยนะ..."
10012065-11 = "ว่าแต่แบบนี้พวกเราจะไม่หมดแรงกันไปก่อนเหรอคะ? เรามาถึงก็ลงมือทำความสะอาด และซ่อมบำรุงกันเลยนะคะ"
10012065-12 = "ยังไม่ทันได้พักเลยแต่ก็ต้องยกของทั้งหมดมาริมหาดเพื่อจัดปาร์ตี้อีก..."
10012065-14 = "ก็จัดปาร์ตี้เพื่อให้ได้ผ่อนคลายยังไงล่ะอายาเนะจัง~"
10012065-15 = "ถึงเวลาพักของพวกเราแล้ว~ จะให้ทำงานไปตลอดก็ไม่ไหวหรอกเนอะ ว่าไหม?"
10012065-16 = "ไหนๆ ก็มาทะเลกันแล้ว เรามาถ่ายรูปหมู่ด้วยกันดีกว่าค่ะ☆ ทำงานหนักแล้วก็ต้องเล่นให้เต็มที่สิคะ!"
10012065-18 = "เมื่อกี๊รุ่นพี่บอกว่าขั้นตอนการซ่อมแซมก็เป็นส่วนหนึ่งของการพักร้อนไม่ใช่เหรอ..."
10012065-20 = "แหะๆๆ..."
10012065-21 = "อะไรที่ผ่านไปแล้วก็ให้มันผ่านไปเถอะนะ"
10012065-22 = "ตอนนี้งานที่เหลือก็มีแค่กลับไปซ่อมเฮลิคอปเตอร์อย่างเดียวใช่ไหมล่ะ? ให้มันเป็นเรื่องของพรุ่งนี้#nก็แล้วกันนะ~"
10012065-23 = "การเตรียมตัวเพื่อพักร้อน ถือว่าจบแค่นี้!"
10012065-24 = "จากนี้คือเวลาของพวกเราแล้วค่ะ!"
10012065-29 = "เฮลิคอปเตอร์..."
10012065-30 = "ไม่ต้องห่วงไปหรอกค่ะ อายาเนะจัง"
10012065-31 = "พรุ่งนี้เราทุกคนจะไปช่วยกันไงคะ เราก็เห็นมาแล้วด้วยนี่คะว่ามีอะไหล่เหลือเฟือ"
10012065-32 = "อื้ม ถึงจะใช้เวลาซ่อมไม่นานแต่อย่างน้อยก็น่าจะกินเวลาทั้งวันนะ เอาไว้ซ่อมพรุ่งนี้เช้าให้เสร็จทีเดียวดีกว่า"
10012065-33 = "แถมจะให้ไปซ่อมในที่มืดๆ ตอนนี้ก็อันตรายนะ ตอนนี้มาพักเอาแรงเผื่อพรุ่งนี้ดีกว่า"
10012065-34 = "อื้ม! การพักผ่อนก็เป็นสิ่งสำคัญนะคะ!"
10012065-35 = "รุ่นพี่โนโนมิ... รุ่นพี่ชิโรโกะ..."
10012065-37 = "จะว่าไป พวกคนที่แปลกๆ นั่น... หลังจากนั้นก็ไม่บุกมาอีกเลยนะ"
10012065-38 = "หรือจะเป็นเพราะระบบรักษาความปลอดภัยจริงๆ? ก็มันสแกนคนทั่วทั้งเกาะแล้วนี่นะ..."
10012065-39 = "บางทีพวกนั้นอาจจะโดนไล่ออกไปลอยทะเลนอกเกาะแล้วก็ได้ค่ะ..."
10012065-40 = "มีหุ่นยนต์ตั้งหลายตัวเลยด้วย..."
10012065-42 = "พวกนั้นก็น่าจะมีพาหนะอะไรพาเข้ามา คงขับอันนั้นกลับไปกันแล้วแหละ"
10012065-43 = "อืม... ถึงเราจะไม่ได้ตั้งใจจะไปทำร้ายใคร แต่แบบนั้นมันเกินไปหน่อยไหมนะ..."
10012065-44 = "ว่าไงนะ? เกินไปอะไร? พวกนั้นต่างหากที่พยายามจะไล่เราออกจากที่นี่!"
10012065-45 = "ทุกคนนี่ใจดีกันจริงๆ พวกนั้นต้องโดนแบบนั้นแหละเหมาะสมแล้ว พวกเราก็แค่ปกป้องสถานที่#nพักผ่อนของเราก็แค่นั้นเอง"
10012065-46 = "อื้ม... อีกอย่าง คุณครูก็เป็นคนสั่งนะ"
10012065-47 = "ใช่! คุณครูก็เป็นคนสั่ง...!"
10012065-48 = "ตอนนี้เรื่องนั้นมันไม่ได้สำคัญแล้วนะ!"
10012065-49 = "เอาเถอะๆ ถ้าขนของมาหมดแล้วก็เอาออกมาเถอะ!! ฉันไปเตรียมตัวก่อนละ!!"
10012065-53 = "แหะๆๆ... ถ้างั้นฉันขอไปช่วยเซริกะจังก่อนนะคะ... "
10012065-57 = "... แหะๆ ให้ตายสิๆ เป็นเด็กน่ารักจริงๆ เลยนะ"
10012065-58 = "[s] \"งั้นเราก็มาเริ่มกันเลยไหม\""
10012065-63 = "เอาสิ..."

10012065-139 = "(นักเรียนคณะกรรมการแผนงานนอนหลับไปด้วยความเหนื่อยอ่อน ส่วนคุณครูก็ออกมาเดินเล่น#nสูดอากาศตอนกลางคืน)"
10012065-140 = "(...)"
10012065-141 = "อยู่นี่เองเหรอคะคุณครู"
10012065-142 = "[s] \"......?\""
10012065-143 = "แต่นแต๊น☆ โนโนมิไงจะใครล่ะคะ!"
10012065-144 = "ฉันก็สงสัยว่าคุณครูหายไปไหน... มาทำอะไรที่นี่เหรอคะ?"
10012065-145 = "[s3] \"อากาศมันร้อน ครูเลยมาเดินตากลมน่ะ\"\n[s4] \"ก็ตรงนี้มันเย็นสบายที่สุดนี่\""
10012065-146 = "งั้นเหรอคะ อืม... ถ้างั้นฉันก็ขอ..."
10012065-147 = "งั้นเหรอคะ อืม... ถ้างั้นฉันก็ขอ..."
10012065-153 = "[ns5] \"โนโนมิ?\"\n[ns6] \"จู่ๆ ก็มานั่งข้างๆ เลยเหรอ!?\""
10012065-154 = "ฮิฮิ ก็ฉันมาพักผ่อนเหมือนกันนี่คะ~"
10012065-155 = "ฮิฮิ ก็ฉันมาพักผ่อนเหมือนกันนี่คะ~"
10012065-156 = "หรือจะให้บอกว่านอนไม่หลับ... เพราะคืนนี้อากาศร้อนดีล่ะคะ..."
10012065-157 = "สมาชิกคนอื่นๆ น่าจะตั้งใจทำงานกันจนเหนื่อย ตอนนี้คงนอนสลบกันหมดแล้วละค่ะ"
10012065-158 = "ทั้งชิโรโกะจัง เซริกะจัง แล้วก็อายาเนะจังด้วย..."
10012065-159 = "แล้วก็..."
10012065-160 = "[s7] \"...... โนโนมิ?\"\n[s8] \"มีอะไรจะพูดงั้นเหรอ?\""
10012065-161 = "อืม... ไม่ใช่เรื่องอะไรใหญ่โตหรอกค่ะ"
10012065-162 = "อืม... ไม่ใช่เรื่องอะไรใหญ่โตหรอกค่ะ"
10012065-166 = "แค่นี่เป็นครั้งแรก... ที่พวกเราลืมเรื่องทุกข์ใจทั้งหมดแล้วออกมาเที่ยวสนุกกันแบบนี้น่ะค่ะ"
10012065-167 = "คุณครูเองก็น่าจะทราบดีใช่ไหมคะว่าพวกเราเอาแต่คิดถึงเรื่องของโรงเรียนตลอดเลย"
10012065-168 = "แต่ก็แน่นอนว่ามันไม่ใช่เรื่องที่ไม่ดีหรอกค่ะ..."
10012065-169 = "แต่การมาผ่อนคลายแบบนี้มันก็ไม่เลวเหมือนกันนะ เพราะถ้ากลับไปก็ต้องไปลำบากกันอีก~"
10012065-170 = "เอ๋... รุ่นพี่โฮชิโนะ?"
10012065-178 = "กำลังคุยเรื่องอะไรน่าสนุกกันอยู่เลยใช่ไหมล่ะ? ทั้งสองคนน่ะ"
10012065-179 = "ไม่ใช่ว่านอนอยู่หรอกเหรอคะ? เมื่อกี๊ยังเห็นอยู่บนห่วงยางปลาวาฬอยู่เลย..."
10012065-180 = "อื้ม นอนหลับสบายเลยละ ก็เลยมาตื่นเอาตอนนี้ไง~"
10012065-181 = "หรือควรจะบอกว่าตื่นเพราะอากาศร้อนดีนะ?"
10012065-182 = "แหะๆๆ อาจจะเป็นคำแก้ตัวที่ไม่เข้ากับรุ่นพี่สักเท่าไรนะคะ ปกติตอนกลางวันก็เห็นนอนหลับดีนี่..."
10012065-187 = "บรรยากาศดีจังเลย~ ลุงชอบอะไรแบบนี้จัง นานแล้วที่ไม่ได้มาชิลและมีเวลาว่างแบบนี้"
10012065-188 = "รุ่นพี่ก็ชิลอยู่ตลอดอยู่แล้วไม่ใช่เหรอคะ? ขนาดเฮลิคอปเตอร์ตกยังนอนหลับได้เลย☆"
10012065-189 = "หืม~? โนโนมิจัง? แซวกันแรงเบอร์นี้เลยเหรอเนี่ย?"
10012065-190 = "อะไรกันๆ พอคนอื่นไม่อยู่ก็เลยกล้าแซวเหรอ? หรือว่าเป็นเพราะบรรยากาศทะเลตอนกลางคืนพาไป?"
10012065-191 = "อืมม~ นั่นน่ะสิคะ..."
10012065-192 = "เอาเป็นอย่างหลังแล้วกันค่ะ แบบนั้นน่าจะดีกว่านะคะ"
10012065-193 = "เป็นเศร้าเลย รุ่นน้องที่อ่อนโยนและน่ารักของฉันโตมาเป็นคนแบบนี้ตั้งแต่เมื่อไรกันนะ"
10012065-195 = "แต่ก็ยัง 'อ่อนโยนและน่ารัก' เหมือนเดิมไม่ใช่เหรอคะ?"
10012065-196 = "เหมือนรุ่นพี่ที่มาช่วยตอนปาร์ตี้บาร์บีคิวนี่คะ... ปกติไม่เห็นเป็นงี้เลย"
10012065-201 = "ทะเลฤดูร้อนนี่มันน่ากลัวจริงๆ ทำให้ฉันและรุ่นน้องที่น่ารักของฉันเป็นอย่างนี้ไปได้!"
10012065-202 = "จริงด้วยนะ... ฉันเข้ามาช่วยนู่นช่วยนี่แบบไม่รู้ตัวเลย ทำไมกันนะ? เพราะบรรยากาศพาไปหรือเปล่า?"
10012065-203 = "หรือเป็นเพราะว่า..."
10012065-207 = "อุปกรณ์พวกนั้นเป็นของที่เตรียมไว้เพื่อจะใช้ในงานเทศกาลทะเลทรายของอะบิดอสกันนะ?"
10012065-209 = "รุ่นพี่..."
10012065-210 = "เห็นไหมล่ะ..."
10012065-211 = "ก็โนโนมิจังจะทำหน้าแบบนั้น ฉันก็เลยไม่เล่าเรื่องอย่างว่าให้ฟังไง"
10012065-212 = "ชิโรโกะจัง อายาเนะจัง แล้วก็เซริกะจังด้วย"
10012065-213 = "ฉันไม่อยากให้รุ่นน้องที่น่ารักของฉันมากลุ้มใจกับอะไรที่ไม่เกิดประโยชน์น่ะ แค่ตอนนี้ทุกคนก็ทำได้ดีแล้ว"
10012065-214 = "แต่ตอนนี้ก็เล่าอยู่นี่คะ..."
10012065-215 = "ก็แค่ตอนนี้น่ะ... เพราะบรรยากาศของทะเลตอนกลางคืนแท้ๆ เลย"
10012065-216 = "เพราะงั้น โนโนมิจัง... ทำหน้าแบบนี้แค่ตรงนี้เท่านั้นนะ เข้าใจใช่ไหม? สัญญานะ?"
10012065-220 = "ค่ะ... ฉันสัญญาค่ะ☆"
10012065-221 = "อืม..."
10012065-222 = "แต่ไหนๆ ก็พูดออกมาแล้ว และโอกาสมันก็มีแค่วันนี้เท่านั้น รุ่นพี่อยากเล่าต่อไหมล่ะคะ?"
10012065-223 = "แค่ 'ตรงนี้เท่านั้น' ค่ะ"
10012065-224 = "แหะๆ... ให้คุยต่อเหรอ? ลุงกดดันนะ ขอพอแค่นี้ไม่ได้เหรอ?"
10012065-225 = "ไม่ได้ค่ะ โอกาสที่จะได้คุยกับแบบนี้ก็ไม่ได้มีบ่อยๆ นะคะ"
10012065-226 = "ใช่ไหมคะคุณครู? "
10012065-227 = "[s9] \"น่าสนุกจัง\"\n[s10] \"อื้ม บรรยากาศทะเลตอนกลางคืนกำลังดีเลย\""
10012065-228 = "ฮึ่ย~ ครู!!  วันนี้แกงฉันหลายรอบแล้วนะ...!"
10012065-229 = "ฮึ่ย~ ครู!!  วันนี้แกงฉันหลายรอบแล้วนะ...!"

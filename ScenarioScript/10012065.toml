[translation]
10012065-1 = "第6話;仲夏夜之夢"
10012065-5 = "嘿咻……好。"
10012065-6 = "呼，這樣就全部搬完了。"
10012065-7 = "這邊大致上也結束了。老師那邊呢？"
10012065-8 = "[s1] 「這邊也都結束了唷。」\n[s2] 「痛痛痛，我的腰……」"
10012065-9 = "幫我放在那邊，剩下的我來處理就好。"
10012065-10 = "看起來根本不痛啊……"
10012065-11 = "突然辦烤肉派對什麼的……"
10012065-12 = "明明還沒有修理完，現在是做這種事的時候嗎……？"
10012065-14 = "沒問題的唷，綾音醬。"
10012065-15 = "我們也需要稍微休息一下呀。一直打掃的話就沒有放假的意義了吧？"
10012065-16 = "難得來到海邊，來拍紀念照吧☆該玩的時候就要盡情玩唷～！"
10012065-18 = "……前輩們，不是說了什麼準備也是假期的一環嗎。"
10012065-20 = "啊哈哈哈……"
10012065-21 = "已經結束的事就忘掉嘛～"
10012065-22 = "剩下的不就只有直升機的修理嗎？那個明天再做就行了呀～"
10012065-23 = "這樣準備就結束了！"
10012065-24 = "現在開始是假期的時間囉～☆"
10012065-29 = "直升機……"
10012065-30 = "不需要擔心唷，綾音醬。"
10012065-31 = "倉庫裡也有很多零件，明天大家一起修理就沒問題了。"
10012065-32 = "嗯。修理最少也要花上一天，要一口氣做完的話明天再做會比較好。"
10012065-33 = "而且，在黑暗的地方整備可是很危險的。為了明天，今天就好好放鬆吧。"
10012065-34 = "嗯嗯！這全都是必要的休息唷！"
10012065-35 = "野乃美前輩，白子前輩……"
10012065-37 = "……話說回來那些奇怪的傢伙，那之後一直沒看見呢？"
10012065-38 = "是多虧了警備系統嗎？"
10012065-39 = "說不定被趕出這座島了……"
10012065-40 = "那時候光是警備機器人，就有相當多的數量了。"
10012065-42 = "對方應該也有什麼移動手段，應該坐著那個回去了吧～"
10012065-43 = "雖然不是故意的，不過做了過分的事呢……"
10012065-44 = "一開始先攻擊的可是他們，不必那麼在意吧？"
10012065-45 = "我們只是保護了自己的渡假勝地而已……"
10012065-46 = "……嗯，也保護了老師。"
10012065-47 = "沒錯！也保護了……"
10012065-48 = "老師跟這個沒關係吧！？"
10012065-49 = "啊啊真是！行李搬完的話就快點鋪野餐墊！我先去準備了！"
10012065-53 = "啊哈哈……那麼，我也去幫茜香醬囉。"
10012065-57 = "……唔嘿，真青春呢～"
10012065-58 = "[s] 「那我們也開始吧。」"
10012065-63 = "……嗯，就那麼做吧。"
10012065-138 = "（度過了一段快樂的時光，不知不覺就到了晚上）"
10012065-139 = "（放著因疲憊而睡著的對策委員會成員，乘著晚風在沙灘上散步）"
10012065-140 = "（……）"
10012065-141 = "你在這裡啊，老師。"
10012065-142 = "[s] 「……？」"
10012065-143 = "……鏘☆野乃美登場！"
10012065-144 = "一陣子沒看到老師，以為你跑到其他地方去了……老師在這裡做什麼呢？"
10012065-145 = "[s3] 「覺得有點熱，所以來吹吹風。」\n[s4] 「因為這裡最涼快。」"
10012065-146 = "原來是這樣啊～那麼，我也……"
10012065-147 = "原來是這樣啊～那麼，我也……"
10012065-153 = "[ns5] 「……野乃美？」\n[ns6] 「突然就坐到旁邊！？」"
10012065-154 = "呵呵，我也是來乘涼的。"
10012065-155 = "呵呵，我也是來乘涼的。"
10012065-156 = "我也熱得有點難入睡……"
10012065-157 = "其他成員，全都累癱睡得很熟唷。"
10012065-158 = "白子醬、茜香醬、綾音醬也是……"
10012065-159 = "還有……"
10012065-160 = "[s7] 「……野乃美？」\n[s8] 「怎麼了嗎？」"
10012065-161 = "不，並不是什麼重要的事。"
10012065-162 = "不，並不是什麼重要的事。"
10012065-166 = "只是……像這樣忘記一切，盡情玩樂似乎還是第一次。"
10012065-167 = "我們總是因為學校的事情，完全沒有心情思考別的事。"
10012065-168 = "偶爾像這樣什麼都不用思考，盡情地玩樂也不錯呢。"
10012065-169 = "……雖然回去之後又必須面對學校的問題，不過這種休息也很重要呢～"
10012065-170 = "……咦，星野前輩？"
10012065-178 = "在聊什麼開心的事呀？你們兩個。"
10012065-179 = "咦，前輩剛才不是還把鯨魚當枕頭在休息嗎？"
10012065-180 = "沒錯沒錯。然後，現在起來了～"
10012065-181 = "唔嘿，我也熱得醒來了……差不多是這樣吧？"
10012065-182 = "啊哈哈……前輩也有難以入睡的時候呢……"
10012065-187 = "氣氛很不錯呢～大叔我也不討厭這種事哦。#n畢竟久違悠哉了一下，多少有點餘裕呢。"
10012065-188 = "前輩一直都很悠閒呀～？連在墜落中的直升機裡都能睡著☆"
10012065-189 = "野乃美醬，怎麼感覺吐槽得比平時還猛烈啊～？"
10012065-190 = "怎麼啦怎麼啦～？因為其他人不在，所以吐槽就變猛烈了嗎？#n還是因為是在夏天的海邊？嚇到大叔我了呢。"
10012065-191 = "唔嗯……"
10012065-192 = "總之先當作是後者吧？#n那樣在各種意義上好像都比較好。"
10012065-193 = "唔，好傷心啊～#n我纖細又可愛的後輩們，為什麼成長成這個樣子了呢……"
10012065-195 = "唔呵呵，前輩不也是「纖細又可愛」嗎？"
10012065-196 = "烤肉派對的時候也是……和平常不同，前輩幫了很多忙呢。"
10012065-201 = "夏，夏天的海邊真恐怖呢！？野乃美醬──！？"
10012065-202 = "……嘛，雖然大叔我幫忙得這麼乾脆是很罕見沒錯！不過應該是氣氛的影響吧！？"
10012065-203 = "啊啊，搞不好是烤肉器具的影響也說不定……"
10012065-207 = "畢竟原本是為了在阿拜多斯沙漠慶典使用的。"
10012065-209 = "……前輩。"
10012065-210 = "……看吧。"
10012065-211 = "因為會讓野乃美醬露出那種表情，所以才不想聊這種話題。"
10012065-212 = "白子醬、綾音醬、茜香醬也是。"
10012065-213 = "我不想讓可愛的後輩們增加多餘的煩惱。#n畢竟你們現在就已經很努力了呀。"
10012065-214 = "……不過前輩剛才還是說了。"
10012065-215 = "那是，因為是現在……因為是仲夏夜的海邊。"
10012065-216 = "所以野乃美醬也……不要再露出那種表情，把它忘了好嗎？約好囉？"
10012065-220 = "……是，我知道了。約好了☆"
10012065-221 = "……嗯。"
10012065-222 = "機會難得，再多說一點吧？"
10012065-223 = "「只有現在」才能說的話。"
10012065-224 = "唔嘿……要繼續嗎？#n大叔差不多到極限了～不能結束嗎？"
10012065-225 = "不行。這種機會可是可遇不可求的哦？"
10012065-226 = "對吧，老師？"
10012065-227 = "[s9] 「是啊。」\n[s10] 「嘛，畢竟是仲夏夜的海邊呢。」"
10012065-228 = "唔嘿～連老師也這樣！！沒有大叔的同伴嗎～？"
10012065-229 = "唔嘿～連老師也這樣！！沒有大叔的同伴嗎～？"
10012065-235 = "（那之後，和兩人一直聊到凌晨，然後就這麼睡著了）"

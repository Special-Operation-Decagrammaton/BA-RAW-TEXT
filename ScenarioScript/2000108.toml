[translation]
2000108-1 = "女僕咖啡廳！（１）"
2000108-2 = "戶外廣場"
2000108-3 = "走在路上時，發現了一間新開的女僕咖啡廳。"
2000108-4 = "[s1] （肯定是要進去看看的吧？）\n[s2] （算了吧，現在還太早了）"
2000108-5 = "（決定聽從內心的聲音）"
2000108-6 = "（雖然心裡這麼想，但身體還是很誠實）"
2000108-7 = "（喀嚓）"
2000108-9 = "Café．Maidramatic！"
2000108-12 = "嚕～嚕～嚕嚕！"
2000108-13 = "我是主人的可愛女僕，凱薩琳唷！"
2000108-14 = "歡迎回來～主人～！"
2000108-16 = "恭候主人多時了！Maidramatic！歡迎，來，到……！"
2000108-17 = "嗚哇啊啊啊！？"
2000108-18 = "老，老師，你怎麼會在這裡……！？"
2000108-19 = "[s3] 「……你是哪位？」\n[s4] 「凱薩琳……？」"
2000108-20 = "哈啊……我被騙了。"
2000108-21 = "哈啊……我被騙了。"
2000108-22 = "朋友說……是份可以穿可愛的服務生制服……#n提供可愛甜點的咖啡廳打工……"
2000108-23 = "雖然有這種讓人無法拒絕的理由，但是沒想到。"
2000108-24 = "沒想到竟然是女僕咖啡廳……！"
2000108-25 = "話，話說回來！老師為什麼會來這裡！"
2000108-26 = "不對！老師是可以來這種地方的嗎！？"
2000108-27 = "[s5] 「我已經下班了，請叫我主人。」\n[s6] 「就算法律跟道德都不允許，我就是喜歡女僕。」"
2000108-28 = "你在說什麼……"
2000108-29 = "總，總而言之，請你快出去！不管怎樣，要我對老師做出那種事……太羞恥了！"
2000108-30 = "這，這裡又不是什麼奇怪的店……"
2000108-31 = "就，就算這樣！也不行！#n算我拜託你了，請快點到外面……"
2000108-32 = "哎呀，這樣不行喔，凱薩琳。"
2000108-33 = "不好好接待客人怎麼行呢。"
2000108-34 = "呃，店長……"
2000108-35 = "我，我知道了。哈啊，沒辦法了。#n這位客人……不對……"
2000108-36 = "……"
2000108-38 = "主，主人……所以說……"
2000108-39 = "……吸──吐──。"
2000108-40 = "歡迎光臨，我帶您去座位。"
2000108-42 = "提醒您，在店裡拍照或是觸碰女僕都是禁止的。"
2000108-43 = "尤其是拍照……可沒辦法保障您的生命安全，請記住。"
2000108-44 = "那麼就請您先看菜單，要點餐的話……"
2000108-45 = "[s7] 「做做看『萌耶萌耶啾』的動作吧？」\n[s8] 「念念看『變得美味～吧，莎啦啦啦啦』的咒語吧。」"
2000108-46 = "您怎麼會那麼清楚……！#n老師，不對，主人，難道您是女僕咖啡廳的狂熱者嗎？"
2000108-47 = "您怎麼會那麼清楚……！#n老師，不對，主人，難道您是女僕咖啡廳的狂熱者嗎？"
2000108-48 = "總，總之，那麼害羞的事情我做不到。"
2000108-49 = "[s] 「這樣的話，我想要『獎勵』。」"
2000108-50 = "咦？獎勵？你是指……「這在我們業界是一種獎勵」嗎？"
2000108-51 = "我也是第一次到女僕咖啡廳打工，還不太清楚那是什麼東西……"
2000108-52 = "那個，請稍等一下……我來查一下。#n那個，「這在我們業界……是一種……獎……勵」……？"
2000108-54 = "耶……！？"
2000108-55 = "這，這是什麼啊！？女僕真的會做這種事嗎？"
2000108-56 = "用，用腳？真，真是噁心！我不做！絕對不要！"
2000108-57 = "怎，怎麼會有這種事……！"
2000108-58 = "啊，「想被腳用力地踩」什麼的！"
2000108-59 = "啊啊，真是難以置信……！"
2000108-60 = "咦？就像按摩一樣？不，不可能是那樣……"
2000108-61 = "……"
2000108-62 = "嗚嗚。店長又盯著我看了……"
2000108-63 = "我，我知道了。#n「獎勵」的話有點困難……作為代替……"
2000108-66 = "……如果是這個的話，就做給你看吧。"
2000108-67 = "ㄇ……萌耶……萌耶……"
2000108-68 = "啾……"
2000108-69 = "啾……！"
2000108-70 = "啾……"
2000108-71 = "嗚哇啊啊，果然還是不行！！"
2000108-74 = "（之後兩個人都被店長罵了一頓）"

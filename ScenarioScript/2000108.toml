[translation]
2000108-1 = "เมดคาเฟ่ 1"
2000108-2 = "จัตุรัสกลางแจ้ง"
2000108-3 = "(คุณครูเดินไปสะดุดตากับเมดคาเฟ่ที่เพิ่งเปิดใหม่)"
2000108-4 = "[s1] \"ต้องลองเข้าไปหน่อยแล้ว\"\n[s2] \"อย่าเลย ไว้มาทีหลังเถอะ\""
2000108-5 = "(ในที่สุดคุณครูก็เกลี้ยกล่อมตัวเองสำเร็จ)"
2000108-6 = "(หัวบอกไม่ แต่เท้าก้าวเข้าไปในร้านแล้ว)"
2000108-7 = "(กริ๊ง)"
2000108-9 = "คาเฟ่เมดดรามาติก!"
2000108-12 = "ลั้ล~ลา~ ลันลา~"
2000108-13 = "พบกับแคทเธอรีน~ เมดที่น่ารักของนายท่าน~"
2000108-14 = "กลับมาแล้วเหรอคะ~ นายท่าน~"
2000108-16 = "ยินดีต้อนรับเข้าสู่เมดดรามาติก พวกเราจะ...!"
2000108-17 = "ว้ายยย!"
2000108-18 = "คะ... คุณครู ทำไมถึงมาอยู่ที่นี่...?"
2000108-19 = "[s3] \"ใครเนี่ย?\"\n[s4] \"แคทเธอรีน...?\""
2000108-20 = "เฮ้อ... โดนเข้าให้แล้ว"
2000108-21 = "เฮ้อ... โดนเข้าให้แล้ว"
2000108-22 = "เพื่อนฉันขอให้มาทำพาร์ทไทม์ในคาเฟ่ของหวานฟรุ้งฟริ้งที่ได้ใส่ชุดสาวเสิร์ฟน่ารักๆ แทนน่ะ..."
2000108-23 = "ได้ยินแบบนี้แล้วจะให้ปฏิเสธยังไงล่ะ?"
2000108-24 = "แต่ก็ไม่คิดเลยว่าจะเป็นเมดคาเฟ่..."
2000108-25 = "ชะ... ช่างเถอะน่า! คุณครูนั่นแหละ มาที่นี่ทำไม?"
2000108-26 = "ไม่สิ! คุณครูมาที่แบบนี้ได้ด้วยเหรอ?"
2000108-27 = "[s5] \"ครูเลิกงานแล้วนะ เรียกว่านายท่านเถอะ\"\n[s6] \"จริงๆ มันก็ไม่เหมาะสมหรอก แต่ครูชอบพวกเมดนี่นา\""
2000108-28 = "พูดอะไรเชยชะมัดเลย..."
2000108-29 = "เรื่องเหตุผลช่างมันเถอะ ออกไปเดี๋ยวนี้เลย! ฉันอายตัวเองชะมัด ให้ทำงานต่อหน้าคุณครูไม่ได้หรอก!"
2000108-30 = "ถึงมันจะ... ไม่ใช่ร้านอะไรที่ไม่ดีก็เถอะ..."
2000108-31 = "ตะ... แต่ก็! ไม่ได้! ฉันขอล่ะ ช่วยออกไป..."
2000108-32 = "นี่ แคทเธอรีน"
2000108-33 = "ทำไมไม่ต้อนรับลูกค้าดีๆ ล่ะ?"
2000108-34 = "อึ่ก... หัวหน้าคะ..."
2000108-35 = "ขะ... เข้าใจแล้วค่ะ เฮ้อ ช่วยไม่ได้สินะ... คุณลูกค้าคะ... ไม่สิ..."
2000108-36 = "......"
2000108-38 = "นาย... ท่าน..."
2000108-39 = "เฮ้อ..."
2000108-40 = "ยินดีต้อนรับค่ะ ฉันจะไปพานั่งที่โต๊ะนะคะ"
2000108-42 = "ที่นี่ไม่อนุญาตให้ถ่ายภาพหรือแตะต้องเมดนะคะ แต่ฉันว่านายท่านน่าจะทราบดีอยู่แล้ว"
2000108-43 = "โดยเฉพาะอย่างยิ่งถ้าถ่ายภาพล่ะก็... เราจะไม่รับประกันชีวิตของนายท่านนะคะ"
2000108-44 = "ถ้างั้นดูเมนูแล้วสั่ง..."
2000108-45 = "[s7] \"ทำท่าโมเอะ โมเอะ คิ้ว~ ให้ดูหน่อยสิ\"\n[s8] \"เสกคาถา โอมจงอร่อย! ชาลาลัลล่า! ให้ฟังหน่อยสิ\""
2000108-46 = "ทำไมถึงรู้ดีแบบนี้ล่ะ...! คุณครู ไม่สิ... นายท่านมาเมดคาเฟ่แบบนี้บ่อยเหรอ?"
2000108-47 = "ทำไมถึงรู้ดีแบบนี้ล่ะ...! คุณครู ไม่สิ... นายท่านมาเมดคาเฟ่แบบนี้บ่อยเหรอ?"
2000108-48 = "ทะ... ท่าแบบนั้นฉันทำไม่ได้หรอก น่าอายจะตาย"
2000108-49 = "[s] \"แต่นี่เป็นคำขอที่ลูกค้าส่วนมากชอบนะ\""
2000108-50 = "หืม? ลูกค้าส่วนมากงั้นเหรอ?"
2000108-51 = "แล้วฉันจะไปรู้ได้ไงล่ะ ฉันเพิ่งมาทำพาร์ทไทม์ในเมดคาเฟ่เป็นครั้งแรกนะ..."
2000108-52 = "เดี๋ยวนะ ขอฉันค้นหาดูก่อนแล้วกันว่าทำยังไง..."
2000108-54 = "หา....?!"
2000108-55 = "อะ... อะไรเนี่ย?! พวกเมดต้องทำอะไรแบบนี้ด้วยเหรอ?"
2000108-56 = "ละ... แล้วใช้เท้าทำด้วย? บะ... บ้าไปแล้ว! ฉันทำไม่ได้หรอก! ไม่ได้เด็ดขาด!"
2000108-57 = "แล้วจะให้... ทำยังไงล่ะ!"
2000108-58 = "จะให้เอาเท้าไปเหยียบอย่างนั้นเหรอ?"
2000108-59 = "ทำไม่ได้หรอก!"
2000108-60 = "หืม? แบบนี้คือการนวดเหรอ? เฮ้อ... เชื่อเขาเลย..."
2000108-61 = "......"
2000108-62 = "อึ่ก เจ้าของร้านกำลังจ้องอยู่"
2000108-63 = "กะ... ก็ได้ ฉันทำท่าที่นายท่านต้องการไม่ได้..."
2000108-66 = "งั้นขอทำอันนี้แทนแล้วกัน..."
2000108-67 = "โมเอะ... โมเอะ..."
2000108-68 = "คิ้วว..."
2000108-69 = "คิ้วว...!"
2000108-70 = "คิ้ววว..."
2000108-71 = "อ๊ายยย!! ให้ฝืนต่อไม่ได้หรอก!"
2000108-74 = "(สุดท้ายเราก็ถูกเจ้าของร้านดุทั้งคู่)"

[translation]
2000108-1 = "Maid Cafe! Part 1"
2000108-2 = "Outside Plaza"
2000108-3 = "(I spotted a brand new maid cafe as I was walking down the street.)"
2000108-4 = "[s1] \"I shouldn't. I have things I need to do.\"\n[s2] \"I'd better not. It's still too early.\""
2000108-5 = "(I thought I successfully convinced myself...)"
2000108-6 = "(...but my mouth was writing checks my feet couldn't cash.)"
2000108-7 = "*ka-chunk*"
2000108-9 = "Cafe Maidramatic!"
2000108-12 = "La la la. Hmm hmm hmm."
2000108-13 = "Master's super-cute maid, Catherine, is here!"
2000108-14 = "Welcome back, Master!"
2000108-16 = "Welcome to Maidramatic! We've been waiting for you, Master!"
2000108-17 = "Wh-What the...?!"
2000108-18 = "S-Sensei, how did you...?"
2000108-19 = "[s3] \"Have we met before?\"\n[s4] \"'Catherine'...?\""
2000108-20 = "*sigh* I should have known."
2000108-21 = "*sigh* I should have known."
2000108-22 = "My friend asked me to...cover her shift at a dessert cafe where I can wear an adorable waitress uniform..."
2000108-23 = "How was I supposed to turn down an offer like that?"
2000108-24 = "It didn't click with me that she meant a full-on maid cafe..."
2000108-25 = "M-More importantly! What are you doing here, Sensei?!"
2000108-26 = "Seriously! Are teachers even allowed to come to places like this?"
2000108-27 = "[s5] \"I'm off the clock, so call me Master.\"\n[s6] \"What can I say? I like maids.\""
2000108-28 = "Some civil servant you are..."
2000108-29 = "A-Anyway, get out! I can't do this job with you around. It's too embarrassing!"
2000108-30 = "I mean, I know it isn't as though I'm working at a shady club or something."
2000108-31 = "But that doesn't make it any better! So I'm begging you. Please leave..."
2000108-32 = "No. Not like that, Catherine."
2000108-33 = "You're supposed to be welcoming customers in."
2000108-34 = "Ugh. But, boss..."
2000108-35 = "*sigh* Fine. If I have to. You are a paying customer. Actually..."
2000108-36 = "..."
2000108-38 = "You're a...master."
2000108-39 = "*sigh*"
2000108-40 = "Come on in. Let me show you to your table."
2000108-42 = "Taking pictures or touching the maids is strictly prohibited, but I'm sure you knew that."
2000108-43 = "Definitely don't take a picture... Know that you could lose your life if even one photo about this got out."
2000108-44 = "Here's your menu. Take a look and tell me what you want..."
2000108-45 = "[s7] \"Give me a moe moe kyun.\"\n[s8] \"You can make cute drawings with syrup and ketchup, right?\""
2000108-46 = "Sensei—I mean, Master—how often do you frequent maid cafes?"
2000108-47 = "Sensei—I mean, Master—how often do you frequent maid cafes?"
2000108-48 = "I-I'm too shy to ever be like you."
2000108-49 = "[s] \"I have a request that's widely beloved among my people.\""
2000108-50 = "What do you mean \"your\" people?"
2000108-51 = "And how am I supposed to know? This is my first time working at a maid cafe."
2000108-52 = "Give me a second—I'll look it up. What do people like you want...from maid cafes...?"
2000108-54 = "What?!"
2000108-55 = "What in the...? Do maids really do this kind of thing?"
2000108-56 = "W-With their feet? How shameful! Never! I could never do that!"
2000108-57 = "How could I...? How am I...?"
2000108-58 = "You want me to step all over you?!"
2000108-59 = "I can't do something like that!"
2000108-60 = "Huh? It's like a massage? *sigh* That makes no sense..."
2000108-61 = "..."
2000108-62 = "Gah. The manager is staring at me."
2000108-63 = "F-Fine. I can't give you what you asked for, but instead..."
2000108-66 = "...I'll do it."
2000108-67 = "Moe...moe..."
2000108-68 = "Kyu..."
2000108-69 = "Kyu...!"
2000108-70 = "Kyuu..."
2000108-71 = "Gaaah! I can't do this!"
2000108-74 = "(Both of us were then scolded by the manager.)"

[translation]
84311100402-6 = "你還沒被抓到啊。#n果然就像寧瑠說的一樣，似乎是個逃跑專家呢。"
84311100402-7 = "哼哼哼，那當然囉。#n你以為我是第一天做這種事嗎？"
84311100402-11 = "咦？不過你是哪位啊？#n好像是三一的學生……看你的衣服，職位應該挺高的。"
84311100402-12 = "真是出色的觀察力。#n不過現在的我，只是前來參觀博覽會的學生之一而已。"
84311100402-13 = "是嗎？呵呵，希望你能玩得開心哦！#n雖然是個無聊的地方，但大家好像都準備得挺努力的！"
84311100402-14 = "無聊的地方……？你說這裡嗎？"
84311100402-15 = "那麼小雪同學覺得「不無聊的地方」是哪裡呢？"
84311100402-19 = "咦？我想想……有好幾個地方耶？#n比如遊戲中心、賭場、夏萊的休息室之類的……"
84311100402-20 = "（完全能聽出他大概的喜好呢）"
84311100402-21 = "唔嗯……不過為什麼要問這個呢？"
84311100402-22 = "沒什麼。只是覺得跟我的喜好有點像而已。"
84311100402-23 = "……！！！#n哦哦哦──！！"
84311100402-25 = "那可以告訴我你的聯絡方式嗎？#n下次有空的時候再來聊聊吧！"
84311100402-26 = "聽起來不錯呢。就這麼辦吧。"
84311100402-28 = "但是這個聯絡方式，在公開場合是不存在的。還請務必要保密。"
84311100402-29 = "哼哼哼，那當然……我越來越喜歡你了呢。"
84311100402-30 = "好！我一定會記住的！！"

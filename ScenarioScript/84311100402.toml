[translation]
84311100402-6 = "ยังจับตัวไม่ได้เลยนะคะ สงสัยจะมีทักษะในการหลบหนีอย่างที่เนรุพูดไว้จริงด้วยค่ะ"
84311100402-7 = "ฮุฮุ แน่นอนค่ะ คิดว่าฉันเพิ่งทำแบบนี้มาแค่ 1-2 วันเหรอคะ?"
84311100402-11 = "เอ๋? ว่าแต่คุณเป็นใครคะ? เหมือนจะเป็นนักเรียนจากทรีนิตี้เลย... ดูจากชุดที่ใส่แล้วก็เหมือนจะมี#nตำแหน่งสูงด้วย"
84311100402-12 = "ตาถึงนะคะ แต่ว่าตอนนี้ฉันเป็นแค่หนึ่งในนักเรียนที่มาดูงานเอ็กซ์โปเท่านั้นค่ะ"
84311100402-13 = "งั้นเหรอคะ? ฮุฮุ เที่ยวเล่นในงานให้สนุกนะคะ! ถึงมันจะน่าเบื่อหน่อยๆ แต่มันก็มาจากความพยายาม#nของพวกเราค่ะ!"
84311100402-14 = "น่าเบื่อ...? ที่นี่น่ะเหรอคะ?"
84311100402-15 = "แล้วสำหรับคุณโคยูกิ \"ที่ที่ไม่น่าเบื่อ\" คือที่แบบไหนเหรอคะ?"
84311100402-19 = "คะ? อืม... ก็มีอยู่ 2-3 ที่นะคะ อย่างเช่นร้านเกม หรือที่ที่เล่นการ์ดได้ แล้วก็ห้องพักผ่อนชาเล่ต์..."
84311100402-20 = "(ดูจากสถานที่แล้วก็พอรู้ได้เลยว่าเป็นคนแบบไหน)"
84311100402-21 = "อืม... ว่าแต่ถามเรื่องนั้นทำไมเหรอคะ?"
84311100402-22 = "ไม่มีอะไรมากหรอกค่ะ พอดีฉันก็มีรสนิยมคล้ายๆ กันน่ะค่ะ"
84311100402-23 = "โอ้วว...!!!"
84311100402-25 = "งั้นฉันขอเบอร์ติดต่อไว้ได้มั้ยคะ? ไว้คราวหน้าถ้าจะไปไหนฉันจะมาชวนค่ะ!"
84311100402-26 = "ก็ไม่เลวนะคะ งั้นเรามาแลกเบอร์ติดต่อกันค่ะ"
84311100402-28 = "แต่ปกติแล้วฉันจะไม่บอกเบอร์ใครเป็นการส่วนตัว งั้นต้องเก็บเป็นความลับให้ฉันนะคะ"
84311100402-29 = "ฮุฮุฮุ... รู้สึกเป็นเกียรติจังเลย... ฉันถูกใจคุณมากกว่าเดิมแล้วค่ะ"
84311100402-30 = "ดีละ! งั้นฉันจะเก็บเป็นความลับไว้นะคะ!!"

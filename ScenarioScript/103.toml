[translation]
103-1 = "ภารกิจพิเศษ ป้องกันฐาน"
103-2 = "ห้องยุทธการ องค์การนักเรียน"
103-3 = "ฮ่าฮ่าฮ่า ดูนี่สิ หุ่นยนต์เอไอที่โรงงานอาวุธเกิดคลุ้มคลั่ง#nและพวกหุ่นยนตร์รักษาความปลอดภัยก็อาละวาดอย่างหนัก!"
103-4 = "ทำไมถึงพูดเหมือนเป็นเรื่องของคนอื่นงั้นเหรอ? ก็... มันไม่ใช่เรื่องที่ฉันต้องจัดการนี่นา"
103-7 = "มัวทำอะไรอยู่ล่ะคุณครู? รีบไปจัดการพวกหุ่นยนต์แล้วทำให้พวกเอไอกลับมาสงบเหมือนเดิมสิ"

[translation]
2005102-1 = "We Meet Again, Reisa"
2005102-2 = "The weather was nice, so I went for a walk outside Schale."
2005102-3 = "[ns] \"What a lovely day.\""
2005102-4 = "U-Um... Sensei..."
2005102-5 = "[s]\"Hm?\""
2005102-9 = "U-Ugh..."
2005102-13 = "H-Hello, Sensei...!"
2005102-14 = "[s1]\"W-Wow...\"\n[s2]\"Thermite Pink! In the flesh?\""
2005102-17 = "You're one-hundred-percent-totally-teasing me right now!"
2005102-18 = "I went through so much to get here. It's rough..."
2005102-19 = "[s]\"Did a little cat-thing ask you to sign a contract?\""
2005102-20 = "O-Oh. You don't seriously believe in that... right?"
2005102-21 = "Well, this is the used costume I showed you before."
2005102-22 = "It got delivered, so I tried it on to see if it fit."
2005102-23 = "Then, BAM! The zipper tab ripped off!"
2005102-24 = "So I was forced to \"transform\" and now I'm stuck in this outfit. So...of course, I did my hair, too."
2005102-25 = "I can't find the zipper, and I lack the tools... So I came to Schale...!"
2005102-26 = "I figured Sensei would be able to help, right?"
2005102-27 = "[s3]\"I should have a toolbox in my office.\"\n[s4]\"You came all the way here in that outfit?\""
2005102-30 = "Yes. Haha, ha..."
2005102-31 = "I felt like a real superstar."
2005102-32 = "I took a bus here, and I had kids walking up to me asking for photos at the transfer stops."
2005102-33 = "I walked past a convention center and people thought I was cosplaying..."
2005102-34 = "So this is what a superstar feels like... Ha, haha..."
2005102-35 = "[s5]\"Poor Reisa's broken!\"\n[s6]\"Don't you like magical girls?\""
2005102-38 = "Of course I like magical girls!"
2005102-39 = "The size is perfect, and the outfit is cute, but..."
2005102-40 = "...I was forced to become one before I was mentally prepared."
2005102-41 = "It's like how even if you like robots, you don't want one sneaking up in your bed!"
2005102-42 = "...Please help me un-transform..."
2005102-43 = "[s7]\"I feel honored to have the opportunity!\"\n[s8]\"I'll help you in Schale!\""
2005102-46 = "Thank you..."
2005102-49 = "[ns]\"Oh, it went down.\""
2005102-51 = "\"Transformation...release!\"...I guess!"
2005102-52 = "Whoa, I totally sounded like a real magical girl!"
2005102-53 = "[s]\"Rank 2 of 'phrases one would be lucky to hear in their lifetime'!\""
2005102-54 = "Heehee, I'm glad it worked out."
2005102-55 = "I knew you'd be able to solve this, Sensei."
2005102-56 = "You're always reliable in a crisis!"
2005102-57 = "[s]\"Using my powers consumes so much energy!\""
2005102-58 = "Haha! You're right!"
2005102-59 = "I'll be heading back, then!"
2005102-60 = "I'll see you in a bit. Thank you."
2005102-61 = "[s9]\"Hold on, Reisa. Are you really leaving like that?\"\n[s10]\"The zippers on your back are wide open.\""
2005102-64 = "O-Oh, you're right!"
2005102-65 = "I forgot to bring clothes to change into!"
2005102-66 = "I'm...really an idiot."
2005102-67 = "[s]\"G-Girl down! Reinforcements needed!\""
2005102-71 = "I let Reisa borrow my jacket."
2005102-72 = "I was relieved to see Reisa perk up and feel encouraged."

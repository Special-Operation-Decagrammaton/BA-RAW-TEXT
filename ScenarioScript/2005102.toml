[translation]
2005102-1 = "เจอกันอีกแล้วนะ เรอิสะ"
2005102-2 = "(วันนี้อากาศดี คุณครูจึงออกมาเดินเล่นหน้าชาเล่ต์)"
2005102-3 = "[ns] \"อากาศดีจังเลย\""
2005102-4 = "อะ... เอ่อ... คุณครูคะ..."
2005102-5 = "[s] \"หืม?\""
2005102-9 = "อะ... อึก..."
2005102-13 = "สะ... สวัสดีค่ะ คุณครู...!"
2005102-14 = "[s1] \"วะ... ว้าว... ใครมาเนี่ย!\"\n[s2] \"เทอร์ไมต์ พิงค์ปรากฏตัวแล้ว!!!\""
2005102-17 = "พูดแบบนี้ จะล้อกันเล่นใช่มั้ยคะ!!"
2005102-18 = "ฉันต้องเจอเรื่องมากมายเลยค่ะ เหนื่อยจัง..."
2005102-19 = "[s] \"มาสคอตมาขอเซ็นสัญญาด้วยเหรอ?\""
2005102-20 = "มะ... ไม่ใช่ค่ะ อย่าบอกนะคะว่าคุณครูเชื่อจริงๆ... น่ะ?"
2005102-21 = "ที่จริงนี่คือชุดมือสองที่ฉันเคยให้ดูเมื่อคราวก่อนค่ะ"
2005102-22 = "พอชุดมาส่ง ฉันก็เลยลองใส่ดูที่บ้านว่าขนาดพอดีหรือเปล่า"
2005102-23 = "แต่ว่า พอจะรูดซิปเท่านั้น! หัวซิปมันก็หลุดออกมาเลยค่ะ!!"
2005102-24 = "ฉันก็เลยต้องแปลงร่างและอยู่ในชุดนี้ค่ะ..."
2005102-25 = "ฉันซ่อมซิปเองไม่ได้เพราะมองไม่เห็น แล้วก็ไม่มีอุปกรณ์ด้วย... ก็เลยมาที่ชาเล่ต์ค่ะ...!"
2005102-26 = "มาด้วยความคิดที่ว่า ถ้าเป็นคุณครูก็น่าจะช่วยฉันได้น่ะค่ะ"
2005102-27 = "[s3] \"ในสำนักงานน่าจะมีอุปกรณ์ซ่อมอยู่นะ\"\n[s4] \"ใส่ชุดนี้มาถึงที่นี่เลยเหรอ?\""
2005102-30 = "ค่ะ แหะๆ... แหะ"
2005102-31 = "พอแต่งตัวแบบนี้ออกมา ฉันรู้สึกเหมือนตัวเองเป็นซูเปอร์สตาร์เลยค่ะ"
2005102-32 = "ตอนอยู่บนรถเมล์ มีเด็กๆ มาขอฉันถ่ายรูปด้วย"
2005102-33 = "แล้วพอเดินผ่านสถานที่จัดอีเวนต์บางอย่าง ฉันก็ถูกเข้าใจผิดว่าเป็นตัวละครในอีเวนต์..."
2005102-34 = "นี่สินะคะ ซูเปอร์... สตาร์... แหะ... แหะๆ "
2005102-35 = "[s5] \"ครูคิดว่าเรอิสะชอบใส่ชุดนี้เสียอีก!\"\n[s6] \"ไม่ได้ชอบชุดสาวน้อยเวทมนตร์หรอกเหรอ?\""
2005102-38 = "แน่นอนว่าฉันก็ชอบค่ะ!"
2005102-39 = "ชุดมันขนาดพอดีตัวฉัน แล้วก็ถูกใจฉันมากๆ แต่ว่า..."
2005102-40 = "ฉันเหมือนถูกบังคับให้แปลงร่างโดยไม่ได้เตรียมใจเลยค่ะ!!"
2005102-41 = "แม้แต่คนที่ชอบหุ่นยนต์ ถ้าเจอหุ่นยนต์ขึ้นมาอยู่บนเตียงของตัวเอง ก็กลัวกันทั้งนั้นนี่คะ!"
2005102-42 = "ฉันอยากกลับไปอยู่ร่างเดิมค่ะ..."
2005102-43 = "[s7] \"คิดไม่ถึงเลยว่าเกิดมาจะได้ยินประโยคแบบนี้!\"\n[s8] \"ไปที่ชาเล่ต์เถอะ ครูจะช่วยเอง!\""
2005102-46 = "ขอบคุณค่ะ..."
2005102-49 = "[ns] \"โอ๊ะ รูดซิปลงได้แล้ว\""
2005102-51 = "'กลับสู่ร่างปกติ'... ได้แล้วค่ะ!"
2005102-52 = "ว้าว เมื่อกี้เหมือนบทพูดของสาวน้อยเวทมนตร์เลยค่ะ!"
2005102-53 = "[s] \"คิดไม่ถึงอีกแล้วว่าเกิดมาจะได้ยินประโยคนี้ด้วย!\""
2005102-54 = "ฮิฮิฮิ แต่ยังไงก็โล่งอกไปทีนะคะ"
2005102-55 = "คิดไว้ไม่มีผิดเลยว่าคุณครูต้องช่วยฉันได้!"
2005102-56 = "ก็คุณครูช่วยคลายความกังวลให้ฉันตลอดเลยนี่คะ!"
2005102-57 = "[s] \"การปลดผนึกไม่ใช่งานง่ายๆ เลยนะ ฮู่ว!\""
2005102-58 = "อะฮะฮ่า! พูดถูกเลยค่ะ!"
2005102-59 = "ถ้างั้นฉันขอตัวกลับก่อนนะคะ!"
2005102-60 = "ไว้เจอกันใหม่ค่ะ!"
2005102-61 = "[s9] \"เดี๋ยวก่อน เรอิสะ จะไปทั้งอย่างนั้นเลยเหรอ?\"\n[s10] \"เดี๋ยวก่อน เรอิสะ ซิปข้างหลังยังเปิดอยู่นะ?\""
2005102-64 = "เฮือก! นะ... นั่นสินะคะ!"
2005102-65 = "มาคิดดูแล้ว ทำไมฉันไม่เอาชุดอื่นมาเปลี่ยนด้วยนะ!!"
2005102-66 = "ฉัน... เป็นคนทึ่มจริงๆ เลยค่ะ"
2005102-67 = "[s] \"เปลี่ยนเป็นร่างขี้ลืมเหรอเนี่ย!!\""
2005102-71 = "(แล้วคุณครูก็ให้เรอิสะยืมเสื้อคลุมกลับไป)"
2005102-72 = "(ค่อยยังชั่วที่เรอิสะดูสดใสขึ้นมาบ้างแล้ว)"

[translation]
2005102-1 = "又見面了呢，澪紗"
2005102-2 = "（因為天氣很好，於是到夏萊前面散步)"
2005102-3 = "[ns]「天氣真不錯呢。」"
2005102-4 = "那，那個……老師……"
2005102-5 = "[s]「嗯？」"
2005102-9 = "唔唔……"
2005102-13 = "你，你好，老師……！"
2005102-14 = "[s1]「哇，哇哦……」\n[s2]「出現了，是Thermite Pink！！！」"
2005102-17 = "這，這百分之百是在捉弄我吧！！"
2005102-18 = "真的發生了很多事情，讓人感覺好累……"
2005102-19 = "[s]「是有吉祥物跑來找你簽約了嗎？」"
2005102-20 = "老，老師該不會真的相信了吧……？"
2005102-21 = "其實這是之前提過的那件二手Cos服裝。"
2005102-22 = "剛才送來之後，我就在家裡試穿確認尺寸……"
2005102-23 = "結果居然「啪！」地一聲，拉鍊的拉片就斷掉了！！"
2005102-24 = "所以才會整個人被困在衣服裡強制變身……"
2005102-25 = "自己看不清楚又沒有工具……所以就跑來夏萊了！"
2005102-26 = "如果是老師的話，一定能輕鬆幫我解決的。"
2005102-27 = "[s3]「辦公室裡應該有備品工具組。」\n[s4]「所以你一路都穿著它過來？」"
2005102-30 = "是的。哈哈，哈……"
2005102-31 = "感覺自己就像變成了超級明星一樣。"
2005102-32 = "搭公車的時候，會被小朋友要求合照……"
2005102-33 = "經過某個活動現場的時候，還被誤認成演出的角色……"
2005102-34 = "這就是……超級明星……哈，哈哈……"
2005102-35 = "[s5]「澪紗壞掉了！」\n[s6]「你不是很喜歡魔法少女嗎？」"
2005102-38 = "當然，我超喜歡的！"
2005102-39 = "尺寸剛剛好，衣服也很滿意……可是……"
2005102-40 = "我是在毫無心理準備的情況下被強制變身的！！"
2005102-41 = "就算喜歡機器人，看到機器人突然出現在自己床上也會嚇一跳吧！"
2005102-42 = "請幫我解除變身……"
2005102-43 = "[s7]「聽到了有生之年都難得聽見一次的話！」\n[s8]「到夏萊去吧，我來幫你！」"
2005102-46 = "謝謝老師……"
2005102-49 = "[ns]「好，解開了。」"
2005102-51 = "「Release Form」！#n……該這麼說嗎！"
2005102-52 = "哇，這句台詞真的就像魔法少女一樣耶！"
2005102-53 = "[s]「有生之年都難得聽到一次的話，第2名！」"
2005102-54 = "耶嘿嘿，能順利解決真是太好了。"
2005102-55 = "相信老師果然是正確的！"
2005102-56 = "老師總是能幫我排憂解難！"
2005102-57 = "[s]「呼～解除封印還真累人啊！」"
2005102-58 = "啊哈哈！就是說呀！"
2005102-59 = "那麼我就先回去囉！"
2005102-60 = "下次再見！"
2005102-61 = "[s9]「等等，澪紗。你打算就這樣回去嗎？」\n[s10]「背後的拉鍊還開著哦？」"
2005102-64 = "啊，對，對耶！"
2005102-65 = "仔細想想，應該要帶替換的衣服過來的！！"
2005102-66 = "我真是……笨到家了。"
2005102-67 = "[s]「要，要墮落了！！」"
2005102-71 = "（於是借了一件外套讓澪紗披上）"
2005102-72 = "（看見澪紗恢復精神，真是太好了）"

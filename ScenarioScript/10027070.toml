[translation]
10027070-1 = "ตอนที่ 7;ฟันเฟือง"
10027070-2 = "ห้องสมุดเรดวินเทอร์"
10027070-5 = "ยัยนั่นไปรึยัง?"
10027070-6 = "[s] \"อื้ม ทาคาเนะกลับไปแล้ว\""
10027070-7 = "อืม... ไปแล้วสินะ..."
10027070-13 = "[ns] \"เมรุ?!\""
10027070-14 = "ไม่เป็นไร ไม่เป็นไร ขาฉันไม่ค่อยมีแรงเพราะง่วงนอนน่ะ ปกติเวลาหายเกร็งแล้วก็เป็นอย่างนี้ตลอด#nนั่นแหละ ไม่ต้องสนใจหรอก"
10027070-15 = "เป็นนักวาดการ์ตูนก็ลำบากเหมือนกันงั้นเหรอ? ฮิฮิ... พอครูเข้าใจ ก็รู้สึกดีเหมือนกันเนอะ"
10027070-16 = "ถ้างั้นฉันขอนอนหน่อยนะ พักสายตาแค่นิดเดียวจริงๆ... ถ้ายังไม่เกิดเหตุที่จะทำให้คิโวทอสล่มสลาย ก็ไม่ต้องปลุกฉันนะ..."
10027070-21 = "(แล้วเมรุก็สลบไปอีกครั้ง...)"
10027070-27 = "(คุณครูอุ้มเมรุที่หลับไม่รู้เรื่องไปนอนบนเตียง แล้วมานั่งอยู่ที่เก้าอี้ของห้องสมุด)"
10027070-34 = "[ns] \"โทรศัพท์เหรอ...? ใครโทรมากันนะ...?\""
10027070-37 = "[ns] \"โมมิจิ?!\""
10027070-42 = "เส้นทางเดินเขา สำนักเลขาธิการเรดวินเทอร์"
10027070-44 = "สะ... สวัสดีค่ะ คุณครู สบายดีไหมคะ?"
10027070-45 = "ค่ะ ฉันก็... ไม่เป็นอะไรค่ะ ฉันสบายดี"
10027070-46 = "......"
10027070-47 = "เอ่อ คุณครูคะ ช่วงนี้ฉัน... มีเรื่องกลุ้มใจน่ะค่ะ และก็อยากจะ... ขอคำปรึกษาจากคุณครู..."
10027070-48 = "ปัญหาอะไรน่ะเหรอคะ? คือว่า..."
10027070-49 = "......"
10027070-50 = "เรื่องเกี่ยวกับรุ่นพี่เมรุน่ะค่ะ..."
10027070-51 = "[s] \"เรื่องที่ทะเลาะกับเมรุน่ะเหรอ?\""
10027070-52 = "คะ คะ?! คะ... คุณครูรู้เรื่องนั้นได้ยังไง...?!"
10027070-53 = "คะ? ตอนนี้คุณครูมาอยู่ที่... ห้องสมุดของ <ชมรมแนวร่วมปลดปล่อยความรู้> งั้นเหรอคะ?! เรื่องมันเป็นมายังไงกันคะ?!"
10027070-62 = "แบบเป็นนี้นี่เอง รุ่นพี่เมรุ..."
10027070-63 = "คือว่า... คุณครูคะ"
10027070-64 = "ฉันเองก็... อยากคืนดีกับรุ่นพี่เมรุค่ะ"
10027070-65 = "ถึงรุ่นพี่เมรุจะเอาแต่ใจตัวเอง ทัศนวิสัยแคบ เสียงดัง สะเพร่า ชอบสบประมาทคนอื่น และมีบางมุมที่ละเอียดอ่อนกับเรื่องซับซ้อนเกินบรรยาย..."
10027070-66 = "แต่ถึงจะเป็นแบบนั้น รุ่นพี่ก็ไม่ใช่คนไม่ดีหรอกค่ะ"
10027070-67 = "ส่วนเรื่อง <ลูน่า> ก็เป็นฉันเองที่ใส่อารมณ์มากเกินไปนิดหน่อย ฉันเข้าใจถ้ารุ่นพี่เมรุจะรู้สึกแบบนั้นค่ะ"
10027070-71 = "ก็รุ่นพี่เมรุ... เป็นนักวาดนี่คะ"
10027070-72 = "เพราะแบบนี้... เราก็เลยมีมุมมองที่แตกต่างกันออกไปน่ะค่ะ"
10027070-73 = "ตอนนั้นฉันน่าจะ... หัวร้อนไปพักหนึ่ง แล้วก็เผลอพูดจาแรงๆ ใส่รุ่นพี่เมรุไปแบบนั้นค่ะ"
10027070-74 = "แหะๆ... อีกอย่าง รุ่นพี่เมรุไม่ใช่คนที่จะขอโทษใครได้ง่ายๆ ฉันก็เลยคิดว่าถ้าตัวเองเป็นฝ่ายไป#nขอโทษก่อนก็น่าจะดีกว่าค่ะ"
10027070-78 = "[ns1] \"เรื่องนั้นน่ะ โมมิจิ\"\n[ns2] \"ตอนนี้เมรุกำลังวาดโดจินชิ <ลูน่า> เล่มสุดท้ายอยู่\""
10027070-82 = "คะ?! หมายความว่ายังไงคะ?!"
10027070-83 = "ในระหว่างที่ฉันออกมาจาก <ชมรมแนวร่วมปลดปล่อยความรู้> ชั่วคราว มันเกิดเรื่องอะไรที่นั่นเหรอคะ?!"
10027070-85 = "(คุณครูค่อยๆ อธิบายสิ่งที่เกิดขึ้นจนถึงตอนนี้ให้โมมิจิฟัง)"
10027070-94 = "......"
10027070-95 = "........."
10027070-96 = "............"
10027070-97 = "[s] \"นี่ โมมิจิ...?\""
10027070-98 = "ฉันไม่รู้ว่าจะต้องมีปฏิกิริยายังไงน่ะค่ะ..."
10027070-99 = "[s] \"ครูพอจะเข้าใจความรู้สึกนั้นอยู่หรอกนะ...\""
10027070-100 = "รุ่นพี่เมรุไปทำกิจกรรมหนังสือถึงที่นั่นเลยเหรอคะ? แล้วคุณครูก็คอยดูทุกอย่างที่รุ่นพี่ทำเลย? แล้วตอนนี้โดจินชิของรุ่นพี่ก็เสร็จไปแค่ครึ่งเล่ม และมีเวลาเหลืออีก 2 วันเท่านั้นเหรอคะ?"
10027070-101 = "นี่มัน... เรื่องจริงเหรอคะ? ฉันไม่ได้กำลังฝันอะไรแปลกๆ อยู่ใช่ไหมคะ?"
10027070-102 = "เป็นความจริงแท้แน่นอนเลยเหรอคะ? เกินไปแล้วนะคะ... ทำไมความจริงนี้ไม่ใจดีกับพวกเรา แต่กลับทำให้พวกเราจนมุมกันด้วยล่ะคะ?"
10027070-103 = "อีกอย่างนะคะ... คงไม่มีใครบอกให้รุ่นพี่เมรุทำถึงขนาดนั้นด้วย"
10027070-104 = "จริงสิ ฉันรู้สึกมาตลอดว่าถ้ารุ่นพี่เขาอินอะไรขึ้นมาละก็ ต่อให้ใครจะว่าอะไรยังไง รุ่นพี่ก็จะไม่สนใจทั้งนั้นค่ะ..."
10027070-105 = "[s] \"เมรุวาดโดจินชิเพราะอยากคืนดีกับโมมิจินะ\""
10027070-106 = "ค่ะ..."
10027070-107 = "ฉัน... ก็พอเดาออกค่ะ แหะๆ รู้สึกแปลกๆ นะคะเนี่ย"
10027070-108 = "ถึงเรื่องอื่นจะเป็นยังไงก็ตาม... แต่ว่าฉันอยากอ่าน <ลูน่า> ของรุ่นพี่เมรุจังเลยละค่ะ"
10027070-112 = "ที่พูดมา... เรื่องจริงเหรอ??"
10027070-113 = "?!"
10027070-114 = "[s] \"!?\""
10027070-119 = "......"
10027070-120 = "ระ... รุ่นพี่เมรุ?!"
10027070-121 = "อ่า คือว่า... ฉันสะดุ้งตื่นขึ้นมาน่ะ เห็นจู่ๆ ครูก็รีบแจ้นออกมาจากห้องสมุด..."
10027070-122 = "ถะ... ถ้างั้นก็ได้ยินพวกเราคุยโทรศัพท์กันหมดเลยเหรอคะ?!"
10027070-123 = "ก็ไม่ทั้งหมดหรอก... ก็แค่บางส่วนน่ะ..."
10027070-125 = "อ่าาาา......"
10027070-126 = "เอ่อออ....."
10027070-131 = "[ns] \"อืมมมม......\""
10027070-132 = "คะ... คุณครู?! อย่างน้อยก็ช่วยพูดอะไรที่พอจะเป็นประโยชน์บ้างสิ... ถ้ายังเอาแต่ส่งเสียงเหมือนพวก#nฉันละก็...!"
10027070-133 = "ชะ... ใช่ ครู ช่วยทำให้บรรยากาศมัน..."
10027070-134 = "[s] \"ไม่ใช่ว่าผู้ใหญ่จะรับมือกับทุกอย่างได้หรอกนะ...\""
10027070-136 = "จะเอาทฤษฎีพื้นฐานอะไรแบบนั้นมาหนีพวกเราเรอะ!"
10027070-142 = "เอ่อ รุ่นพี่เมรุ? พวกเรา..."
10027070-143 = "อะ... เอ่อ... ว่าไง..."
10027070-144 = "......"
10027070-145 = "......"
10027070-146 = "[s] \"มาเจอกันแล้วค่อยคิดไหม?\""
10027070-147 = "คุณครู?!"
10027070-148 = "ครู!?"
10027070-149 = "อ่า... ถ้าได้พูดคุยกันแบบซึ่งๆ หน้า ก็อาจจะแก้ไขอะไรได้งั้นเหรอคะ?"
10027070-150 = "ตะ... แต่ว่านี่มันกะทันหันไป... ปกติจะทำอะไรมันต้องเริ่มจากอะไรที่เป็นพื้นฐานก่อน แล้วค่อยๆ ขยับไปทีละขั้นไม่ใช่เหรอ!"
10027070-151 = "นี่ไม่ใช่เรื่องที่ต้องมาทำทีละขั้นงั้นเหรอคะ...? มะ... มันก็อาจจะจริงก็ได้ค่ะ..."
10027070-152 = "......"
10027070-153 = "......"
10027070-154 = "นี่ โมมิจิ...?"
10027070-155 = "คะ คะ?"
10027070-159 = "งั้นเรามาเจอกันก่อน... แล้วค่อยคุยกันต่อไหม?"
10027070-160 = "ยะ... อย่างนั้นก็ได้ค่ะ"

[translation]
10027070-1 = "第7話;齒輪"
10027070-2 = "赤冬聯邦學園．圖書館"
10027070-5 = "那傢伙走了嗎？"
10027070-6 = "[s]「嗯，貴音已經回去了。」"
10027070-7 = "這……這樣啊……"
10027070-13 = "[ns]「愛瑠！？」"
10027070-14 = "沒事沒事。只是因為太睏一時腿軟罷了，不用擔心。#n我放鬆下來的時候經常會這樣的。"
10027070-15 = "你說漫畫家也真辛苦？#n嘿嘿……沒想到老師能體會，莫名有點開心呢。"
10027070-16 = "那我再睡一下下，一下下就好……#n除非奇普托斯要滅亡否則都別叫醒我……拜託了……"
10027070-21 = "（愛瑠就這樣再次癱倒在地上睡著了……）"
10027070-27 = "（將昏睡不醒的愛瑠抱到床上後，在圖書館裡找了張椅子坐下）"
10027070-34 = "[ns]「有電話……？會是誰打來的呢……」"
10027070-37 = "[ns]「紅葉！？」"
10027070-42 = "赤冬聯邦學園．山間小徑"
10027070-44 = "你，你好。#n老師，最近過得好嗎？"
10027070-45 = "嗯，我……老師不用擔心，我過得很好。"
10027070-46 = "……"
10027070-47 = "那個，老師。#n我最近……有個煩惱，所以想跟老師聊聊……"
10027070-48 = "是什麼煩惱？#n那個……"
10027070-49 = "……"
10027070-50 = "其實，是跟愛瑠前輩有關……"
10027070-51 = "[s]「是指跟愛瑠吵架的事嗎？」"
10027070-52 = "咦，咦咦！？#n為，為什麼老師會知道這件事……！？"
10027070-53 = "嗯？你說你現在……已經在「知識解放戰線」的圖書館了！？#n怎麼會！？"
10027070-62 = "原來如此，愛瑠前輩他……"
10027070-63 = "那個，老師……"
10027070-64 = "其實……我也想和愛瑠前輩和好。"
10027070-65 = "雖然愛瑠前輩又吵又自私，不但目中無人，眼界還十分狹隘……#n明明做事冒冒失失的，有時候卻又異常膽小……"
10027070-66 = "但不管怎麼說，他本質上依然是個善良的人。"
10027070-67 = "《LUNA》那件事，其實也是我反應過度而已……#n愛瑠前輩會有那些感想並不奇怪。"
10027070-71 = "畢竟前輩他……是一名漫畫家。"
10027070-72 = "我想……他在欣賞作品時的觀點肯定跟我不同。"
10027070-73 = "都怪我當時……一時氣昏了頭，才會對愛瑠前輩說出那麼過分的話。"
10027070-74 = "哈哈……而且依愛瑠前輩的個性，他肯定拉不下臉跟我道歉。#n所以我覺得還是由我來道歉會比較好。"
10027070-78 = "[ns1]「關於這件事，紅葉。」\n[ns2]「其實愛瑠正在繪製《LUNA》最終卷的同人誌。」"
10027070-82 = "咦咦！？這是怎麼回事！？"
10027070-83 = "在我離開「知識解放戰線」的期間裡，究竟發生了什麼……！？"
10027070-85 = "（將這幾天發生的事一件一件說給紅葉聽……）"
10027070-94 = "……"
10027070-95 = "…………"
10027070-96 = "……………………"
10027070-97 = "[s]「那個，紅葉……？」"
10027070-98 = "我不太清楚，這種時候應該做出什麼反應……"
10027070-99 = "[s]「我好像可以體會你的心情……」"
10027070-100 = "愛瑠前輩竟然會做到那種地步？而且老師全都在一旁看著……？#n還有，雖然同人誌已經完成了一半，但距離截稿只剩下兩天的時間……？"
10027070-101 = "這裡真的是現實世界嗎？#n我該不會正在做什麼奇怪的夢吧？"
10027070-102 = "這就是殘酷的現實沒錯？#n真過分……為什麼現實總是絲毫不可憐我們，反而將我們逼上絕境呢……"
10027070-103 = "更重要的是，愛瑠前輩會做到那個地步，肯定不是因為別人的要求。"
10027070-104 = "雖然我一直都是這麼認為……不過他還真是一旦下定決心就誰也無法阻止的人呢……"
10027070-105 = "[s]「可是，愛瑠是為了紅葉才畫那本同人誌的哦。」"
10027070-106 = "……是。"
10027070-107 = "這點……我也明白。#n嘿嘿，總覺得心情有點微妙呢。"
10027070-108 = "其他事姑且不論……我果然很想看看愛瑠前輩畫的《LUNA》呢。"
10027070-112 = "你說的……是真的嗎？"
10027070-113 = "！？"
10027070-114 = "[s]「！？」"
10027070-119 = "……"
10027070-120 = "愛，愛瑠前輩！？"
10027070-121 = "呃，那個……我睡著睡著突然就醒了。#n然後就看見老師匆忙地離開圖書館……"
10027070-122 = "所，所以我們剛剛說的話，你全都聽見了嗎！？"
10027070-123 = "雖然不是全部……但基本上都……"
10027070-125 = "唔咦咦咦咦……"
10027070-126 = "嗚嗚……"
10027070-131 = "[ns]「唔～～～嗯……」"
10027070-132 = "老，老師！？#n請說點什麼來緩和氣氛吧……怎麼學我們發出困擾的聲音呢……！"
10027070-133 = "就，就是說啊，老師！#n現在這種情況只能由你來打破僵局了……"
10027070-134 = "[s]「就算是大人，也不是什麼事情都有辦法解決的……」"
10027070-136 = "這種時候不該搬出常識來逃避吧！"
10027070-142 = "那個，愛瑠前輩？我們……"
10027070-143 = "唔，嗯，那個……"
10027070-144 = "……"
10027070-145 = "……"
10027070-146 = "[s]「要不要先見面再說？」"
10027070-147 = "老師！？"
10027070-148 = "老師！？"
10027070-149 = "見……見面談談的話，說不定所有問題都會迎刃而解？"
10027070-150 = "可，可是這也未免太突然了……#n應該要有鋪墊或是事前準備，這類的東西吧！"
10027070-151 = "沒必要把事情變得這麼複雜……？#n這，這麼說也有道理……"
10027070-152 = "……"
10027070-153 = "……"
10027070-154 = "那個，紅葉……？"
10027070-155 = "嗯，嗯？"
10027070-159 = "總之，那個……要不要，見面聊聊？"
10027070-160 = "嗯，嗯……就這麼做吧。"

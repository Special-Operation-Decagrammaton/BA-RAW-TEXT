[translation]
80000124-1 = "#title;함정 초콜릿"
80000124-2 = "#na;(업무차 들른 트리니티의 복도를 거닐고 있었다.)"
80000124-3 = "#st;[0,0];instant;1;"
80000124-4 = "#clearST"
80000124-5 = "#wait;1000"
80000124-6 = "[ns1] \"……? 세이아?\"\n[ns2] 연락을 확인해 본다."
80000124-7 = "#wait;10"
80000124-8 = "#wait;10"
80000124-9 = "3;세이아;01;오셨다는 이야기를 들었습니다, 선생님.\n#3;sig\n#3;a"
80000124-10 = "3;세이아;08;모처럼 여기까지 들리셨으면서 말 한마디 없으셨다니, 조금 서운해해도 괜찮겠지요.\n#3;sig"
80000124-11 = "3;세이아;02;이 서운함을 달랠 방법은 하나뿐입니다. 마침 지금 바로 제가 제 방에 있군요.\n#3;sig"
80000124-12 = "3;세이아;99;그럼…… 기다리도록 하겠습니다.\n#3;sig\n#3;em;…"
80000124-13 = "#st;[0,0];instant;1;"
80000124-14 = "#clearST"
80000124-15 = "#wait;2500\n#all;hide"
80000124-16 = "3;세이아;99\n#3;a\n#3;sig\n#wait;1500"
80000124-17 = "3;세이아;01;……참고로 공적인 업무는 모두 끝나신 것, 이미 알고 있습니다.\n#3;em;…\n#3;sig"
80000124-18 = "3;세이아;01;다른 이유는 모두 기각할 테니, 다른 길로 새지 마시길 추천 드립니다.\n#3;sig"
80000124-19 = "#st;[0,0];instant;1;"
80000124-20 = "#clearST"
80000124-21 = "#wait;1000\n#all;hide"
80000124-22 = "#wait;2500"
80000124-23 = "[ns3] \"……무섭네.\"\n[ns4] 잠자코 세이아의 방으로 향한다."
80000124-24 = "#wait;10"
80000124-25 = "#wait;10"
80000124-26 = "#all;hide"
80000124-27 = "3;세이아;01;……오셨군요.\n#3;a\n#3;em;…"
80000124-28 = "3;세이아;99;오늘 같은 날, 무례를 무릅쓰고 이렇게 억지를 부린 이유는 다른 데 있지 않겠지요."
80000124-29 = "3;세이아;01;동시에 선생님께서는 이미 많이 바쁘신 몸. 오래 붙잡지 않기 위해 곧바로 보여드리겠습니다."
80000124-30 = "#st;[0,0];instant;1;"
80000124-31 = "#clearST"
80000124-32 = "3;세이아;01\n#3;m5\n#wait;1500"
80000124-33 = "3;세이아;01\n#wait;1500"
80000124-34 = "3;세이아;02;선생님께 드리는 저의 초콜릿입니다. 부디…… 마음에 드셨으면 좋겠군요.\n#3;em;[반응]"
80000124-35 = "3;세이아;02;가져가서 드시는 것도 물론 좋습니다만, 모처럼의 날입니다. 지금 이 자리에서 조금만이라도 맛봐 주시겠나요?"
80000124-36 = "3;세이아;99;손수 만든 것은 아니지만…… 선생님을 위해, 나름대로 비싸게 구한 것이니까요.\n#3;m3\n#3;em;…"
80000124-37 = "#st;[0,0];instant;1;"
80000124-38 = "#clearST"
80000124-39 = "3;세이아;99\n#3;greeting\n#wait;1500"
80000124-40 = "[ns5] \"뭔가 영수증 같은 게 있는데?\"\n[ns6] \"초콜릿 뒤에…… 사인해야 할 곳이 있어.\""
80000124-41 = "#wait;10"
80000124-42 = "#wait;10"
80000124-43 = "3;세이아;01;어라……. 영수증?\n#3;em;[?]"
80000124-44 = "3;세이아;02;아아. 그렇군요. 택배로 보내 드릴까 직접 드릴까 고민하다가 뺀다는 걸 잊어버렸습니다."
80000124-45 = "3;세이아;02;죄송합니다만 선생님, 그래도 최종적으로 받으시는 분이 선생님이시니…… 사인 한 번만 부탁드려도 될까요?\n#3;em;[반응]"
80000124-46 = "3;세이아;01;결제는 어차피 이미 제가 다 했기 때문에 괜찮습니다. 수취인 확인 정도로만 생각해 주시면 되겠네요. ……여기 펜입니다."
80000124-47 = "#st;[0,0];instant;1;"
80000124-48 = "#clearST"
80000124-49 = "#wait;1500"
80000124-50 = "#wait;1500"
80000124-51 = "[ns7] \"어라, 세이아. 이 영수증. 그런데…….\"\n[ns8] \"뭔가 내용이 다 비어 있지 않아……?\""
80000124-52 = "#wait;10"
80000124-53 = "#wait;10"
80000124-54 = "3;세이아;02;……눈치채셨군요."
80000124-55 = "3;세이아;02;죄송해요, 선생님. 사실 돈을 주고 샀다는 말은 거짓말이었습니다. 제가 만든 것이에요."
80000124-56 = "3;세이아;01;그리고 택배 이야기도 그냥 드린 말씀입니다. 그 영수증은 처음부터 비어 있었지요."
80000124-57 = "3;세이아;99;제가 만든 초콜릿을 선생님께 드리기 위한 대가를…… 영수증으로 넣었을 뿐.\n#3;em;…"
80000124-58 = "3;세이아;03;거기에 뭘 적던 이제 선생님께선, 사인해 주신 것으로 알고 있으면 되겠지요?"
80000124-59 = "3;세이아;02;……네? 함정이었냐고요?\n#3;em;[?]"
80000124-60 = "3;세이아;03;후후. 무슨 말씀이시죠, 선생님. 몇 번 말씀드리지 않았나요?"
80000124-61 = "3;세이아;02;이곳은 제 방입니다. 그리고 제 방에서는, 제 말이 곧 법이지요."
80000124-62 = "3;세이아;99;결국 이건…… 이렇게 위험한 곳까지 오시면서…… 무방비하게 오신 선생님의 잘못.\n#3;em;…"
80000124-63 = "#st;[0,0];instant;1;"
80000124-64 = "#clearST"
80000124-65 = "3;세이아;99\n#3;greeting\n#wait;1500"
80000124-66 = "3;세이아;02;그럼 선생님의 '허락'…… 제가 잘 받도록 하겠습니다.\n#3;em;[음표]"
80000124-67 = "3;세이아;02;그 대신이라기에는 값싼 것이겠지만, 드린 초콜릿으로 용서해 주시지요."
80000124-68 = "3;세이아;03;……아.\n#3;em;[반응]"
80000124-69 = "3;세이아;03;참고로 '오래 붙잡지 않겠다'고 말씀드린 부분도 거짓말이랍니다."
80000124-70 = "3;세이아;01;그럼……."
80000124-71 = "#st;[0,0];instant;1;"
80000124-72 = "#clearST"
80000124-73 = "3;세이아;01\n#3;d\n#wait;1500"
80000124-74 = "3;세이아;01\n#3;a\n#3;closeup\n#wait;1500"
80000124-75 = "3;세이아;02;이제부터 남은 부분도, 전부 드셔 주시겠어요? 제가 보는 앞에서.\n#3;em;[하트]\n#3;closeup"
80000124-76 = "#all;hide"
80000124-77 = "#na;(이후 세이아가 보는 앞에서, 세이아의 '함정'을 남김없이 맛있게 먹었다.)"
80000124-78 = "#na;(세이아는 '리벤지를 피하겠다'는 이유로, 딱 자신의 방 바로 앞까지만 배웅해 주었다.)"

[translation]
80000124-1 = "ช็อกโกแลตกับดัก"
80000124-2 = "(ขณะที่ครูกำลังเดินไปตามทางเดินของทรีนิตี้เพื่อไปติดต่องาน)"
80000124-6 = "[ns1] \"เซอา...?\"\n[ns2] ดูข้อความที่ได้รับ"
80000124-9 = "ฉันได้ยินว่าคุณครูมาที่ทรีนิตี้ค่ะ"
80000124-10 = "ทั้งที่อุตส่าห์มาที่นี่แล้ว แต่กลับไม่ยอมบอกฉันเลยสักคำ แบบนี้ฉันน้อยใจได้ใช่มั้ยคะ"
80000124-11 = "และวิธีที่จะบรรเทาความน้อยใจนี้มีแค่วิธีเดียวค่ะ ตอนนี้ฉันอยู่ที่ห้องของฉันพอดีเลยค่ะ"
80000124-12 = "งั้น... ฉันจะรอนะคะ"
80000124-17 = "บอกไว้ก่อน... ฉันรู้แล้วนะคะว่างานของคุณครูวันนี้เสร็จทั้งหมดแล้วน่ะค่ะ"
80000124-18 = "ถ้ามีเหตุผล ข้ออ้างอื่นอะไร ฉันขอปฏิเสธทั้งหมดค่ะ และขอแนะนำว่าอย่าคิดจะเปลี่ยนเส้นทางเดิน#nด้วยค่ะ"
80000124-23 = "[ns3] \"น่ากลัวจัง...\"\n[ns4] เดินไปที่ห้องของเซอาแต่โดยดี"
80000124-27 = "มาแล้วเหรอคะ..."
80000124-28 = "ในวันแบบนี้ คงไม่มีเหตุผลอื่นให้ฉันทำตัวดื้อและเอาแต่ใจแบบนี้อีกแล้วใช่มั้ยล่ะคะ"
80000124-29 = "ฉันรู้ดีว่าคุณครูเป็นคนที่งานยุ่งมากแค่ไหน เพื่อไม่ให้เป็นการเสียเวลา ฉันจะเอาให้ดูเลยแล้วกันนะคะ"
80000124-34 = "ช็อกโกแลตของฉันสำหรับคุณครูค่ะ หวังว่า... คุณครูจะชอบนะคะ"
80000124-35 = "จะนำกลับไปกินที่ชาเล่ต์ก็ได้ แต่ว่าในวันพิเศษแบบนี้ ช่วยลองชิมที่นี่เลยสักคำจะได้มั้ยคะ?"
80000124-36 = "ถึงจะไม่ใช่ช็อกโกแลตทำเอง... แต่ฉันก็ยอมควักกระเป๋าจ่ายในราคาแพงๆ เพื่อซื้อมาให้คุณครูเลยค่ะ"
80000124-40 = "[ns5] \"มีใบเสร็จแปะอยู่ด้วยแฮะ?\"\n[ns6] \"ด้านหลังช็อกโกแลต... มีที่ให้เซ็นชื่อด้วยแฮะ\""
80000124-43 = "เอ๊ะ... ใบเสร็จ?"
80000124-44 = "อ่า นั่นสินะคะ ตอนแรกฉันคิดว่าจะให้บริษัทขนส่งนำไปส่งให้ แล้วก็ลืมเอาออกน่ะค่ะ"
80000124-45 = "ขอโทษด้วยนะคะคุณครู แต่ว่ายังไงผู้รับก็ยังเป็นคุณครูอยู่ดี เพราะงั้น... ช่วยเซ็นชื่อรับให้หน่อยได้#nหรือเปล่าคะ?"
80000124-46 = "ฉันชำระเงินไปเรียบร้อยแล้ว เพราะงั้นไม่เป็นไรหรอกค่ะ คิดซะว่าเซ็นยืนยันรับของก็พอค่ะ ปากกาอยู่นี่ค่ะ..."
80000124-51 = "[ns7] \"เอ๊ะ เซอา ใบเสร็จอันนี้มัน...\"\n[ns8] \"มันไม่มีรายการอะไรเขียนไว้เลยนะ...?\""
80000124-54 = "ช่างสังเกตจริงๆ เลยนะคะ..."
80000124-55 = "ขอโทษค่ะ คุณครู จริงๆ แล้วที่บอกว่าฉันซื้อมาเป็นเรื่องโกหกค่ะ ฉันทำเองทั้งหมดเลยค่ะ"
80000124-56 = "ส่วนเรื่องการส่งของ ฉันก็พูดไปแค่อย่างนั้นค่ะ ใบเสร็จใบนั้นเป็นใบเสร็จเปล่าตั้งแต่แรกแล้วค่ะ"
80000124-57 = "เป็นแค่การจัดฉากเพื่อสร้างสถานการณ์ให้คุณครูรับช็อกโกแลตที่ทำมาจากฉันก็เท่านั้น"
80000124-58 = "เพราะไม่ว่าจะเขียนอะไรลงไป ก็ถือว่าเป็นการเซ็นชื่อรับของแล้วใช่มั้ยล่ะคะ?"
80000124-59 = "คะ...? นี่เป็นกับดักงั้นเหรอคะ?"
80000124-60 = "ฮุฮุ พูดอะไรอย่างนั้นคะคุณครู ฉันบอกไปตั้งหลายครั้งแล้วไม่ใช่เหรอคะ?"
80000124-61 = "ว่าที่นี่เป็นห้องของฉัน และในห้องของฉัน คำพูดของฉันก็คือกฎของที่นี่ค่ะ"
80000124-62 = "เพราะงั้น... การที่คุณครูมาที่นี่โดยไม่ระมัดระวัง ก็ถือว่าเป็นความผิดของคุณครูต่างหาก"
80000124-66 = "ถ้างั้นฉันจะขอรับ 'คำยินยอม' ของคุณครูไว้แล้วกันนะคะ"
80000124-67 = "ถึงมันจะไม่ได้ราคาแพงอะไร... แต่ก็ช่วยรับไว้ด้วยนะคะ"
80000124-68 = "อ๊ะ..."
80000124-69 = "แต่ที่ฉันบอกไปว่า 'จะไม่รบกวนเวลาของคุณครูนาน' ก็เป็นเรื่องโกหกเหมือนกันค่ะ"
80000124-70 = "เพราะงั้น..."
80000124-75 = "คุณครูช่วยกินส่วนที่เหลือให้หมดที่นี่เลยได้มั้ยคะ? ต่อหน้าฉันเลยค่ะ"
80000124-77 = "(จากนั้นคุณครูก็กิน 'กับดัก' ของเซอาต่อหน้าเธอจนหมด)"
80000124-78 = "(เซอาออกมาส่งคุณครูแค่หน้าห้อง โดยให้เหตุผลว่า 'ไม่อยากโดนแก้แค้น')"

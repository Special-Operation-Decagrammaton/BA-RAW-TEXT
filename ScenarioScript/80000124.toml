[translation]
80000124-1 = "陷阱巧克力"
80000124-2 = "（正因公事而走在三一的走廊上時）"
80000124-6 = "[ns1]「……咦？是聖亞？」\n[ns2] 確認訊息"
80000124-9 = "我聽說老師您來了。"
80000124-10 = "難得遠道而來卻一句話也沒說，不禁讓我感到有點失落呢。"
80000124-11 = "能讓我釋懷的方法只有一個。#n剛好我現在就在房間裡。"
80000124-12 = "那麼……我等你。"
80000124-17 = "……順帶一提，我知道老師已經把公事都處理完了。"
80000124-18 = "其他理由我也不會接受，建議老師省下不必要的心思哦。"
80000124-23 = "[ns3]「……感覺怪可怕的。」\n[ns4] 默默走向聖亞的房間"
80000124-27 = "……歡迎你來。"
80000124-28 = "在今天這樣的日子莫名強硬地請老師過來，理由應該不言而喻了吧。"
80000124-29 = "我明白老師相當忙碌……#n為了不耽誤你太久，我就開門見山地說了。"
80000124-34 = "這是我為老師準備的巧克力……希望你會喜歡。"
80000124-35 = "當然要帶回去享用也沒問題……#n不過今天畢竟是個難得的日子，能請老師在這裡稍作品嘗嗎？"
80000124-36 = "雖然這並不是由我親手製作……而是特地花了不少錢為老師買來的。"
80000124-40 = "[ns5]「怎麼還有一張像是收據的東西？」\n[ns6]「巧克力後面……有個簽名欄？」"
80000124-43 = "哎呀……發票？"
80000124-44 = "啊啊，其實我原本還在猶豫該宅配過去還是親自交給你，結果忘記拿出來了。"
80000124-45 = "讓老師見笑了。#n不過既然最後是老師親手收下的……可以請你簽個名嗎？"
80000124-46 = "費用我已經付清了，老師就當作是收件確認吧。#n……筆在這邊。"
80000124-51 = "[ns7] 「咦，聖亞。這張收據……」\n[ns8]「內容怎麼是空白的……？」"
80000124-54 = "……被你發現了呢。"
80000124-55 = "抱歉剛才欺騙了你，老師。#n其實這盒巧克力並不是從外面買來，而是我親手做的。"
80000124-56 = "宅配的事也是我隨口杜撰而成，那張收據自始至終都是空白的。"
80000124-57 = "這麼做的目的……只是為了以收據的形式，向老師收取製作巧克力給你的代價罷了。"
80000124-58 = "無論上面寫了什麼……老師都已經簽名接受了哦？"
80000124-59 = "……嗯？你說這是陷阱？"
80000124-60 = "呵呵，怎麼這麼說呢，老師。#n我不是已經說過很多次了嗎？"
80000124-61 = "這裡是我的房間──我的話在這裡就等同於法律。"
80000124-62 = "明知如此還毫無防備地走進這裡……是老師的不對哦。"
80000124-66 = "那麼老師的「同意」……我就心懷感激地收下了。"
80000124-67 = "雖然作為補償或許有些廉價，請老師收下巧克力後原諒我吧。"
80000124-68 = "……對了。"
80000124-69 = "剛才說「不耽誤你太久」也是騙你的哦。"
80000124-70 = "那麼……"
80000124-75 = "剩下的部分，也請老師在我面前全都吃完吧。"
80000124-77 = "（於是便在聖亞的注視下，將他的「陷阱」吃得一乾二淨）"
80000124-78 = "（之後他以「為了避免被報復」為理由，只願在房間裡送別）"

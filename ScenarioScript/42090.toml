[translation]
42090-1 = "第9話;D.U.嶄新的早晨"
42090-2 = "（隔天早上，兔寶寶公園前）"
42090-6 = "「通知各位市民。#n　自今日午夜0時起將實施新的行政命令。」"
42090-7 = "「請各位市民前往聯邦學生會網站或各地區行政機關確認公告內容。#n　若治安機關要求盤查，還請積極配合。」"
42090-8 = "「……因不熟悉行政命令或不配合盤查產生的損害，聯邦學生會概不負責。」"
42090-9 = "「再次通知各位市民。#n　自今日午夜0時起將實施……」"
42090-10 = "……到底發生什麼事了？"
42090-11 = "誰知道，我才想問呢。"
42090-12 = "我有去看聯邦學生會的網站，但上面全都是難懂的條款，根本完全看不懂……"
42090-13 = "老師應該沒事吧……？#n記得昨天被叫去聯邦學生會……"
42090-15 = "一定沒事的。#n聖所之塔也沒發生什麼特別的變化……"
42090-16 = "現在必須優先考慮的是市區發生的事。"
42090-17 = "就是啊，雖然剛才的廣播也是，#n不過從早上開始就一直有載著武裝士兵的裝甲車開往市區這點，同樣很讓人在意。"
42090-18 = "難道又會像上次一樣發生政變嗎？"
42090-19 = "但要是真是如此，這也太過安靜了。"
42090-20 = "就算想確認情況，從這個公園也看不到市區的狀況……"
42090-26 = "……先暫時離開營地，確認市區的情況吧。"
42090-27 = "大家，請準備偵察用的裝備和彈藥。#n準備就緒後立刻前往目的地。"
42090-28 = "希望什麼事也沒發生……"
42090-32 = "你看，那些傢伙不是凱薩公司的特殊部隊嗎？"
42090-33 = "企業的士兵怎麼會出現在市中心……？"
42090-35 = "通知各位市民。即日起，根據新實施的行政命令，#n包含兔寶寶鎮在內47個行政區的治安維護工作已移交凱薩保全執行。"
42090-36 = "此為獲得聯邦學生會長許可的業務。#n凱薩保全承諾將遵照行政命令，公正地執行治安維護工作。"
42090-37 = "感謝各位市民的諒解與配合──"
42090-39 = "糟糕，遲到了遲到了……！"
42090-43 = "啊啊，為什麼今天燈號偏偏變得特別慢啊！"
42090-44 = "再這樣下去真的要遲到了……"
42090-45 = "……路上沒車。#n趁現在──"
42090-47 = "給我站住！"
42090-48 = "咦！？我，我嗎……？"
42090-49 = "對，就是你。"
42090-50 = "剛才明明是紅燈，你卻打算要過斑馬線對吧。"
42090-51 = "那，那是因為跟人約好的時間快到了，沒想太多就……"
42090-52 = "對不起！#n這次可以放過我嗎……？"
42090-53 = "不行！規則必須公平地適用於所有人！"
42090-54 = "作為無視聯邦學生會的規定，試圖擾亂交通系統的代價──"
42090-56 = "向你徵收10萬元的罰款！"
42090-58 = "10，10萬元？#n只是闖紅燈而已就要罰10萬！？"
42090-59 = "呃，當然我知道是自己有錯在先，但這會不會太──"
42090-60 = "……剛才的那句話，我可以認為是對聯邦學生會的反抗吧？"
42090-61 = "──將你以助長內亂罪進行緊急逮捕！"
42090-62 = "怎，怎麼可以這樣～～～！！"
42090-64 = "我看看，這個按鈕……是什麼來著……？"
42090-65 = "嗯？那台ATM……為什麼排隊排那麼長？"
42090-66 = "喂，那邊的那個人！#n拖拖拉拉地在幹什麼？"
42090-67 = "請，請等我一下。機械的操作有點複雜……"
42090-68 = "到了這個年紀，光是領個錢也要花不少時間啊……"
42090-69 = "別找藉口！沒看到後面的隊伍排得那麼長嗎！？"
42090-71 = "不准長時間占用機器！#n別想獨佔大家公用的公共設施！"
42090-72 = "嗚嗚……怎麼會這樣……"
42090-77 = "喂，你手上拿的是什麼東西？"
42090-78 = "……咦？只是普通的手榴彈啊……？"
42090-79 = "你說手榴彈？"
42090-80 = "竟敢公然攜帶只要拔掉插梢後投出就能造成大量損害的危險武器……"
42090-81 = "你這傢伙是想發動恐怖攻擊吧！"
42090-82 = "請，請等一下。#n我可沒聽說過禁止攜帶手榴彈啊！？"
42090-83 = "況且手榴彈這種東西，在奇普托斯不就像日用品一樣嗎？"
42090-84 = "在D.U.管轄區域內未經許可攜帶含有100g以上火藥武器的行為，#n已經在今日午夜0時起被禁止了！"
42090-86 = "以恐攻未遂的嫌疑逮捕他！"
42090-87 = "嗚嗚……這也太不講理了……！"
42090-89 = "哇……到處都有士兵在亂逮捕市民。"
42090-90 = "話說禁止攜帶手榴彈是怎樣？#n我從來沒聽說過那種規則！"
42090-91 = "是在行政命令中公布的內容。#n除此之外，還增加了與治安和統治相關的規則……"
42090-92 = "先不管這個，為什麼維護治安的不是女武神，而是凱薩公司啊？"
42090-93 = "那些傢伙沒有因為上次的政變被抓嗎？"
42090-95 = "而且就算是為了預防犯罪，我也不認為抓走市民、製造不安是正確的。"
42090-96 = "但是怎麼說呢……今天的市區感覺格外的安靜啊……"
42090-97 = "就是說啊～如果是以前，現在應該已經有一兩個亂開槍或丟炸彈的人出現了。"
42090-99 = "在這種疑似想拿槍或炸彈出來都會被立刻逮捕的狀況下，#n似乎也沒有會想出來做亂的笨蛋啊。"
42090-100 = "（……總覺得，有種奇怪的感覺）"
42090-101 = "（明明是所有人都遵守規則，依法實現了正義的社會……卻一點都不放心）"
42090-102 = "（這就是我夢想中的正義的樣子嗎……？）"
42090-104 = "喂，那邊那個人，報上身分。"
42090-106 = "哎呀哎呀……你不認識我們嗎？"
42090-107 = "凡是追求過清貧人生的人應該都認識我們才對……#n看來各位平時過著與之相去甚遠的生活呢。"
42090-111 = "我的名字是笛卡爾。#n是率領著追求清貧的求道會──「就算無所有也要蒐集確實的幸福」，#n簡稱「所確幸」的隊長！"
42090-112 = "所確幸……？"
42090-113 = "沒錯。我們是一群以不工作、無所有為座右銘，持續在廢墟生活的求道者。"
42090-114 = "怎麼樣，要是各位也對清貧的生活有興趣──"
42090-115 = "BRAVO1，把這傢伙帶走。"
42090-119 = "等，等等等，等一下！？#n我們什麼都沒做啊！？"
42090-120 = "就算要帶我走，不是也應該告訴我理由嗎！？"
42090-121 = "……就是因為什麼都沒做。"
42090-122 = "你們只是群寄生在這個社會，明明不工作卻想占用資源的害蟲罷了。"
42090-123 = "為了健康社會的存續著想，勢必得教化你們這種社會的寄生蟲吧。"
42090-124 = "因此，你們將會被送往凱薩公司的就業斡旋設施。#n只要在那裡得到工作，想必很快就能重生為能對社會做出傑出貢獻的勞動者吧！"
42090-125 = "不，不要啊啊啊啊！！"
42090-127 = "我不想變成社畜啊啊啊啊！！！！"
42090-128 = "請等一下。"
42090-132 = "就算是為了維護治安，也不能沒有逮捕令就抓走市民才對。"
42090-133 = "要是再繼續濫用權力，我就要將你們──"
42090-134 = "你在說什麼，這可是聯邦學生會長代理的「命令」──你們打算違抗嗎？"
42090-135 = "命令，是嗎……"
42090-137 = "武器正因為不會自己做出判斷，才有其價值。"
42090-139 = "………"
42090-140 = "不過，你們是哪個學園的人？#n我沒看過你們的制服。"
42090-141 = "是，是SRT特殊學園……"
42090-142 = "……SRT特殊學園？#n學園名單中可沒有這個學園啊。"
42090-143 = "你說什麼？想吵架是嗎？"
42090-144 = "沒關係，不知道也無所謂。#n反正只要現在開始慢～慢告訴他就行了吧？咯嘻嘻嘻……"
42090-145 = "而且你們似乎擁有很多違反行政命令的武器……"
42090-150 = "我要逮捕你們所有人！立刻放下武器雙手舉高！"
42090-154 = "……RABBIT1，該如何應對？"
42090-155 = "……我同意。發出信號後立刻──"
42090-157 = "……沒關係，放他們走吧。"
42090-159 = "好久不見了啊，RABBIT小隊。"
42090-160 = "你是那時候的……？"
42090-161 = "你不是在夏萊奪還作戰時，想在我們面前炸毀大樓的指揮官嗎？"
42090-162 = "我的決定竟然能被SRT特殊學園的菁英記住，還真是榮幸呢。"
42090-163 = "……不，正好相反吧？"
42090-164 = "只是你那苦苦掙扎的模樣實在太讓人印象深刻，所以才記住了而已。"
42090-165 = "呵呵……或許是吧。"
42090-166 = "的確，當時確實低估了你們。"
42090-167 = "但是現在不同了。#n我和那些無法從失敗中獲取教訓的無能之人不同。"
42090-169 = "……為什麼要放我們走呢？"
42090-170 = "因為收到了「命令」。"
42090-171 = "聯邦學生會長代理親自下令，禁止與SRT特殊學園的學生們為敵。"
42090-172 = "香耶防衛室長……？"
42090-173 = "是啊。#n這麼說來，他曾說過要讓SRT特殊學園復活，並納入自己麾下呢。"
42090-174 = "這樣一來我們就是友方了。#n和未來的友軍為敵可不是什麼好事。"
42090-175 = "SRT特殊學園的……復活……"
42090-177 = "嗯？你的臉色很差哦。#n有好好吃飯嗎？"
42090-178 = "如果補給不夠的話，我們凱薩公司可以支援你們。#n這不算什麼，不管是彈藥還是補給品，我們都有充足的庫存。#n需要的話隨時能透過凱薩快遞送到公園前。"
42090-180 = "就算是違反條例的武器……"
42090-182 = "有必要的話，要避人耳目地支援你們也不是不行。"
42090-183 = "……雖然是很誘人的提議，但這麼明目張膽反而很可疑。"
42090-184 = "就是啊……為什麼要對我們這麼親切？"
42090-185 = "明明是我們讓你的計畫失敗，遭受了巨大的損失……"
42090-186 = "你不是應該對我們懷恨在心嗎？"
42090-188 = "呵呵，明知故問。"
42090-193 = "──沒錯，我當然很討厭你們SRT。"
42090-194 = "明明擁有凡人努力一輩子也得不到的強大力量，#n卻把它浪費在正義、信念這種微不足道的東西上……"
42090-195 = "就因為你們那可笑的正義遊戲，我差點就失去了花費半輩子累積的一切。"
42090-196 = "就算讓你們所有人跪在這裡，用鞋子踐踏你們的頭都無法償還……！"
42090-197 = "噫，噫噫……"
42090-198 = "……但是，無論面對多麼憎恨的對象都能面帶笑容、與其握手的才是社會人士。"
42090-199 = "如果因為私人恩怨選擇共事的對象，是成就不了大業的。"
42090-200 = "就這一點來看，香耶聯邦學生會長代理真是個了不起的模範生。#n為了自己的將來，就算是曾對自己後腦杓開槍的叛徒也能毫無顧忌地釋出善意。"
42090-201 = "了解彼此用處之人的羈絆，比什麼都強烈。"
42090-202 = "所謂友情和同袍之情這種無聊的東西，只是安慰無能之人的甜言蜜語罷了。"
42090-203 = "……你連信念都沒有嗎？"
42090-204 = "信念？當然有信念。#n但是那和執行任務是兩回事吧。"
42090-205 = "奉命行事──即使和自己的信念不同。"
42090-206 = "這才是正確的社會人士，也是特殊部隊正確的存在方式。"
42090-207 = "而你們相較之下……不過是空有力量的孩子罷了。"
42090-208 = "對眼前的不義咬牙切齒，卻對無法觸及的不合理視而不見的膽小鬼。"
42090-209 = "所以就算打贏了「戰鬥」，也無法打贏「戰爭」。"
42090-214 = "…………"
42090-215 = "……回去吧。"
42090-216 = "現場的情報已經收集得十分足夠了。"
42090-220 = "回去的路上要不要帶點補給品？"
42090-221 = "不，不必了。"
42090-222 = "我並沒有愚蠢到會欠不知目的為何的人人情。"
42090-223 = "哈哈，看來小隊長多少還有在動腦呢。這樣我就放心了。"
42090-224 = "那就下次再見吧。"
42090-229 = "呿……為什麼我們非得被那種傢伙說教啊。"
42090-230 = "……真～奇怪。"
42090-231 = "哪裡奇怪？我的臉上沾到東西了嗎？"
42090-232 = "就是，剛才那個指揮官挑釁我們的時候。"
42090-233 = "畢竟是咲希，我以為你一定會在途中忍不住衝出去的說。"
42090-234 = "但是你竟然忍到了最後。#n咯嘻嘻，咲希也成長了很多呢～"
42090-235 = "哪有什麼成長不成長的？#n就算是我也不會笨到在那種情況下衝出去。"
42090-236 = "……而且他最後說的也沒錯。"
42090-237 = "就算我們在戰鬥中擊倒了對方，#n只要高層的人推翻了局面就沒辦法打贏[ruby= ・     ・ ]戰爭[/ruby]了。"
42090-238 = "說的也是，誰叫我們只是依照命令進行作戰的隊員呢。"
42090-239 = "如果意氣用事，會很難專心在戰鬥上也是事實……"
42090-241 = "…………"
42090-242 = "都子，今後該怎麼做？"
42090-243 = "什，什麼？#n今後指的是……？"
42090-244 = "有很多吧？#n像是昨天FOX小隊的前輩們提過的分隊的事。"
42090-245 = "老實說雖然不是很滿意……#n但學園復活的話繼續示威也很奇怪……"
42090-246 = "或許聽前輩們的話是最好的選擇也說不定。"
42090-248 = "其實我也有點搞不太清楚要不要繼續留在公園……"
42090-249 = "補給每天都變得越來越難，到了冬天之後連水都很難取得……"
42090-250 = "我……覺得兩邊都可以……"
42090-255 = "……是呢。"
42090-260 = "（只要香耶室長保證SRT特殊學園的復活，我們就沒有繼續待在這座公園的理由了）"
42090-261 = "（……投靠前輩們的話，規律的生活、強大的武器、溫暖的房間……全都可以得到）"
42090-262 = "（不過，自入學起懷抱的夢想和信念……究竟……）"
42090-263 = "（……但，如果是為了大家）"
42090-266 = "……大家，可以聽我說一下嗎？"
42090-267 = "在做出最終決定之前，我想先聽聽大家的意見。"
42090-269 = "下一話;失控"

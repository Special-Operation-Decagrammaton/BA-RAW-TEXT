[translation]
42090-1 = "ตอนที่ 9;เช้าวันใหม่ใน D.U."
42090-2 = "(เช้าวันรุ่งขึ้น ด้านหน้าโคะอุซางิ การ์เด้น)"
42090-6 = "<ประกาศถึงชาวเมืองทุกคน วันนี้จะมีการประกาศใช้คำสั่งบริหารฉบับใหม่ ตั้งแต่เวลา 00:00 น.>"
42090-7 = "<ขอให้ชาวเมืองทุกคนเข้าไปตรวจสอบคำสั่งบริหารฉบับใหม่จากหน้าโฮมเพจขององค์การนักเรียน หรือเดิน#nทางไปตรวจสอบได้ที่องค์กรบริหารในแต่ละเขต หากมีการร้องขอตรวจค้นจากหน่วยงานความปลอดภัย ขอให้ทุกท่านให้ความร่วมมืออย่างเต็มที่ด้วยค่ะ>"
42090-8 = "<... การเสียผลประโยชน์ที่เกิดขึ้นจากการไม่ปฏิบัติตามคำสั่งบริหารหรือปฏิเสธการตรวจค้น จะไม่อยู่#nในขอบเขตความรับผิดชอบขององค์การนักเรียน>"
42090-9 = "<ขอประกาศให้ทราบอีกครั้ง วันนี้จะมีการประกาศใช้คำสั่งบริหารฉบับใหม่...>"
42090-10 = "... นี่มันเรื่องอะไรกันเนี่ย?"
42090-11 = "นั่นน่ะสิ เอาแต่ประกาศเรื่องเดิมๆ น่าหนวกหูมาตั้งแต่เมื่อคืนแล้ว "
42090-12 = "ฉันลองเข้าไปดูในหน้าโฮมเพจขององค์การนักเรียนแล้ว แต่ก็มีแต่มาตราอะไรยากๆ เต็มไปหมด ไม่รู้เลยว่าตรงไหนบ้างที่เปลี่ยนแปลงไป..."
42090-13 = "... เมื่อวานคุณครูถูกเรียกไปที่องค์การนักเรียนด้วยนี่นา คุณครูปลอดภัยกลับมาหรือเปล่านะ?"
42090-15 = "ไม่เห็นมีการเปลี่ยนแปลงอะไรเป็นพิเศษในแซงค์ทัมทาวเวอร์เลย แบบนี้น่าจะไม่มีอะไรนะคะ..."
42090-16 = "ปัญหาคือเรื่องที่เกิดขึ้นในเมืองตอนนี้ค่ะ"
42090-17 = "แค่รายละเอียดในประกาศก็น่าสงสัยแล้ว วันนี้พอออกไปเดินข้างนอกก็เห็นรถหุ้มเกราะและรถบรรทุก#nกองกำลังติดอาวุธมุ่งหน้าเข้าไปในเมืองอยู่เรื่อยๆ เลย"
42090-18 = "หรือว่าจะเกิดการปฏิวัติที่มาพร้อมการยิงปืนเหมือนเมื่อคราวก่อน?"
42090-19 = "แต่เราไม่ได้ยินเสียงปืนเลยนะ มันออกจะเงียบเกินไปด้วยซ้ำ"
42090-20 = "ก็พออยู่ในสวนสาธารณะ เราไม่ค่อยเห็นเมืองกันเท่าไรนี่นา..."
42090-26 = "ก่อนอื่นคงต้องออกจากค่ายกันไปสักพัก แล้วไปตรวจสอบดูค่ะว่ามีเรื่องอะไรเกิดขึ้นในเมืองหรือเปล่า"
42090-27 = "ทุกคนคะ ช่วยเตรียมอุปกรณ์ตรวจตราและกระสุนไปด้วยค่ะ ทันทีที่เตรียมทุกอย่างเสร็จ เราจะไปในเมืองกันเลยค่ะ"
42090-28 = "หวังว่าจะไม่มีเรื่องอะไรเกิดขึ้นนะ..."
42090-32 = "เจ้าพวกนั้นมันสมาชิกกองกำลังพิเศษของไคเซอร์ คอร์เปอเรชั่นนี่นา?"
42090-33 = "ทำไมทหารรับจ้างของภาคธุรกิจถึงติดอาวุธและมารวมกันอยู่กลางเมืองแบบนี้ล่ะ..."
42090-35 = "ประกาศถึงชาวเมืองทุกคน ตามคำสั่งบริหารใหม่ที่มีผลบังคับใช้ในวันนี้ งานดูแลความสงบเรียบร้อยใน โคะอุซางิ ทาวน์แห่งนี้ รวมถึงในพื้นที่บริหารอีก 47 แห่งจะอยู่ในความรับผิดชอบของไคเซอร์ ซิเคียวริตี้"
42090-36 = "นี่คือการโยกย้ายหน้าที่ที่ได้รับอนุญาตแล้วจากรักษาการแทนประธานองค์การนักเรียน ทั้งนี้ ไคเซอร์ ซิเคียวริตี้จะปฏิบัติหน้าที่ดูแลความปลอดภัยอย่างเที่ยงธรรมตามคำสั่งบริหารฉบับใหม่นี้"
42090-37 = "ขอให้ชาวเมืองทุกคนให้ความร่วมมืออย่างขันแข็ง—"
42090-39 = "เฮ้อ... สายแล้ว ไม่ทันแล้ว..."
42090-43 = "ทำไมวันนี้ถึงสัญญาณเปลี่ยนช้าอย่างนี้นะ?"
42090-44 = "แบบนี้มีหวังรอสัญญาณจนสายแน่ๆ..."
42090-45 = "ไหนๆ ก็ไม่มีรถผ่านแล้ว ถ้างั้นก็ขอไปหน่อยเถอะ—"
42090-47 = "ตรงนั้นน่ะ หยุด! อย่าขยับ!"
42090-48 = "คะ... ครับ...? เรียกผมเหรอครับ...?"
42090-49 = "ใช่ นายนั่นแหละ!"
42090-50 = "ทำไมถึงเดินข้ามถนนส่งเดชล่ะ?"
42090-51 = "คือว่า ผมกลัวว่าจะไปตามนัดสายน่ะ ก็เลยรีบข้ามแบบไม่ทันคิด..."
42090-52 = "ขอโทษนะครับ ช่วยหยวนๆ ให้สักครั้งไม่ได้เหรอครับ...?"
42090-53 = "ไม่ได้ กฎระเบียบต้องบังคับใช้อย่างยุติธรรมกับทุกคน!"
42090-54 = "โทษของการเพิกเฉยกฎขององค์การนักเรียนและละเมิดกฎจราจร..."
42090-56 = "ขอคิดค่าปรับหนึ่งแสนเยน!"
42090-58 = "หา? แค่เดินข้ามถนนแบบฝ่าสัญญาณไฟจราจรแค่นี้เอง โดนปรับตั้งแสนเยนเลยเหรอครับ?"
42090-59 = "ผะ... ผมทำผิดก็จริงอยู่ แต่แบบนี้มันเกินไป—"
42090-60 = "หรือว่านายกำลังแสดงการต่อต้านข้อกำหนดที่มาจากรักษาการแทนประธานองค์การนักเรียนกันล่ะ?"
42090-61 = "ไม่ได้การ ฉันจะจับกุมนายอย่างเร่งด่วนในข้อหายุยงปลุกปั่น!"
42090-62 = "จะบ้าเหรอ~!"
42090-64 = "ปุ่มนี่มัน... ปุ่มอะไรกันนะ...?"
42090-65 = "หืม? ทำไม ATM เครื่องนี้มันถึงได้ซับซ้อนแบบนี้นะ?"
42090-66 = "นี่ ลุงตรงนั้นน่ะ? อืดอาดยืดยาดอะไรอยู่หน้าเครื่องแบบนั้น?"
42090-67 = "ระ... รอเดี๋ยวก่อนสิ อายุก็มากตั้งปูนนี้แล้วเลยใช้เครื่องแบบนี้ไม่ค่อยถนัดน่ะ..."
42090-68 = "แค่จะถอนเงินก็ใช้เวลานานเหมือนกันนะ"
42090-69 = "คนแก่ก็ไม่มีข้อยกเว้น! คิดจะใช้สิ่งอำนวยความสะดวกสาธารณะคนเดียวเลยรึไง?"
42090-71 = "ถ้าหมดเวลาแล้วก็หลบไปซะ! ไม่เห็นรึไงว่ามีคนอื่นมายืนต่อแถวรอใช้บริการอยู่เหมือนกันน่ะ!"
42090-72 = "เฮ้อ... ทำไมถึงใจร้ายกันขนาดนี้..."
42090-77 = "นี่ ถืออะไรอยู่ในมือน่ะ?"
42090-78 = "... ครับ? นี่ก็ระเบิดมือธรรมดาๆ นี่ครับ?"
42090-79 = "ว่าไงนะ? ระเบิดมือ?"
42090-80 = "แค่ดึงสลักออกแล้วโยนก็ทำร้ายชาวเมืองจำนวนมากได้แล้ว ไม่อยากเชื่อเลยว่าจะพกอาวุธอันตราย#nแบบนี้เดินไปเดินมาในเมือง..."
42090-81 = "หรือว่ามีแผนจะก่อการร้ายกันแน่!"
42090-82 = "ดะ... เดี๋ยวสิครับ ผมไม่เห็นรู้เลยว่ามีการห้ามไม่ให้พกพาระเบิดมือในเมืองด้วย!"
42090-83 = "ระเบิดมือมันเป็นของพื้นๆ ในคิโวทอสไม่ใช่เหรอครับ?!"
42090-84 = "การเป็นเจ้าของและพกพาอาวุธที่มีวัตถุระเบิดเกินกว่า 100 กรัมในพื้นที่ในความดูแลของเขต D.U. โดยไม่ได้#nรับอนุญาตถือว่ามีความผิด ข้อห้ามนี้ก็อยู่ในคำสั่งบริหารฉบับใหม่ที่มีผลมาตั้งแต่เที่ยงคืนของวันนี้!"
42090-86 = "ฉันขอจับนายในข้อหาจำลองการก่อการร้าย!"
42090-87 = "จะบ้าเหรอ? แบบนี้ไม่ยุติธรรมเลย...!"
42090-89 = "เฮือก... ทหารกำลังจับกุมชาวเมืองอยู่ทุกที่เลย"
42090-90 = "ว่าแต่กฎห้ามพกพาระเบิดมือในเมืองนี่มันอะไรกัน? ไม่ยักรู้เลยว่ามีกฎอะไรแบบนั้นในคิโวทอสด้วย!"
42090-91 = "กฎนั้นมาจากคำสั่งบริหารที่ประกาศเมื่อวานน่ะ นอกจากนั้นน่าจะยังมีเรื่องเกี่ยวกับการดูแลความปลอด#nภัยและการควบคุมที่เพิ่มขึ้นมาอย่างเข้มงวดด้วย..."
42090-92 = "ที่สำคัญที่สุด ทำไมหน้าที่ดูแลความปลอดภัยถึงไม่ได้เป็นของวัลคิรี่ แต่กลับเป็นของไคเซอร์ คอร์เปอเรชั่นไปได้ล่ะนั่น?"
42090-93 = "คนพวกนั้นควรต้องไปอยู่ในคุกเพราะเรื่องปฏิวัติคราวก่อนไม่ใช่เหรอ?"
42090-95 = "ถึงจะบอกว่าเป็นการป้องกันอาชญากรรมก็เถอะค่ะ แต่ว่าการจับชาวเมืองตามอำเภอใจและตั้งจุด#nตรวจค้นให้ชาวเมืองพะวักพะวนกับการใช้ชีวิตประจำวันแบบนี้ มันดูไม่ใช่ท่าทีที่ถูกต้องของ#nหน่วยงานรักษาความปลอดภัยเลยนะคะ"
42090-96 = "แต่ว่า... วันนี้ในเมืองดูเป็นระเบียบเรียบร้อยกว่าที่เคยเลยนะ"
42090-97 = "นั่นน่ะสิ ถ้าเป็นคิโวทอสแบบเดิม อาจจะมีชาวเมืองสักคนสองคนที่ยิงปืนหรือไม่ก็ปาระเบิดมือใส่ เพราะไม่สบอารมณ์กับกฎพวกนั้นแล้วละ"
42090-99 = "กองกำลังรักษาความปลอดภัยก็จับตาดูอยู่ทุกที่ คงไม่มีใครกล้าหยิบปืนออกมายิงหรอกน่า"
42090-100 = "(... รู้สึกว่ามันมีอะไรแปลกๆ ไปอยู่นะ)"
42090-101 = "(ถึงจะเป็นสังคมที่ทุกคนปฏิบัติตามกฎและมีความยุติธรรมตามกฎหมาย แต่กลับไม่รู้สึกถึงความสบาย#nใจแม้แต่น้อยเลย)"
42090-102 = "(ความยุติธรรมที่ฉันเฝ้าฝันถึง... หน้าตาของมันเป็นแบบนี้จริงๆ งั้นเหรอ...?)"
42090-104 = "นี่ คนที่อยู่ตรงนั้นน่ะ แกเป็นใคร?"
42090-106 = "โธ่ๆ... เพิ่งเคยเห็นพวกฉันเป็นครั้งแรกเหรอ?"
42090-107 = "คนที่แสวงหาชีวิตที่ปราศจากความโลภในทรัพย์สมบัติน่าจะรู้จักพวกฉันนะ หรือว่าชีวิตของพวกคุณยัง#nห่างไกลกับเรื่องแบบนี้?"
42090-111 = "ฉันชื่อว่าเดการ์ต เป็นหัวหน้ากลุ่มที่ยึดถือความยากจนแต่ซื่อสัตย์ กลุ่ม <ความสุขเล็กๆ> ที่ย่อมาจาก <กลุ่มผู้แสวงหาความสุขเล็กๆ แบบไม่ต้องครอบครอง>!"
42090-112 = "ความสุขเล็กๆ...?"
42090-113 = "ใช่ พวกเราไม่ทำงาน ไม่เป็นเจ้าของ และมาใช้ชีวิตที่ไม่ครอบครองสิ่งใดอยู่ใต้อาคารร้างแบบนี้"
42090-114 = "ว่าไงล่ะ? ถ้าพวกเธอเองก็สนใจในชีวิตที่ยึดถือความยากจนแต่ซื่อสัตย์เหมือนกัน ก็—"
42090-115 = "บราโว 1 ลากหมอนี่ออกไป"
42090-119 = "ดะ... เดี๋ยวสิ! พวกฉันยังไม่ได้ก่อเหตุอะไรเลยนะ?"
42090-120 = "ถ้าจะมาลากตัวออกไป อย่างน้อยก็บอกกันก่อนสิว่าลากไปเพราะอะไรน่ะ!"
42090-121 = "... ก็เพราะพวกนายไม่ทำอะไรเลยไงเล่า"
42090-122 = "พวกนายทำตัวเป็นปลิงของสังคม งานการก็ไม่ทำ แบบนี้เปลืองทรัพยากรเปล่าๆ"
42090-123 = "ความดำรงอยู่ต่อไปของสังคมที่สุขภาพดี เราจำเป็นต้องดัดนิสัยชนชั้นปรสิตในสังคมอย่างพวกนาย"
42090-124 = "ฉันจะส่งพวกนายไปศูนย์จัดหางานของไคเซอร์ คอร์เปอเรชั่น แล้วพวกนายจะได้เกิดใหม่เป็นแรงงาน#nที่มีส่วนช่วยเหลือในสังคม!"
42090-125 = "ไม่เอาด้วยหรอก..."
42090-127 = "ฉันทำงานทั้งๆ แบบนี้ไม่ได้หรอกนะ!"
42090-128 = "เดี๋ยวก่อนค่ะ"
42090-132 = "ถึงจะบอกว่าคุณมารักษาความปลอดภัยในสังคมตามหน้าที่ก็เถอะ แต่คุณไม่สามารถจับกุมประชาชน#nได้โดยไม่มีหมายจับนะคะ"
42090-133 = "ถ้าใช้อำนาจในทางมิชอบมากไปกว่านี้ละก็ ในฐานะสมาชิกของสถาบันพิเศษ SRT ฉันจะ—"
42090-134 = "นี่คือ 'คำสั่ง' ของรักษาการแทนประธานองค์การนักเรียนนะ พวกเธอจะขัดคำสั่งงั้นเรอะ?"
42090-135 = "ถึงจะเป็นคำสั่งก็เถอะ..."
42090-137 = "อาวุธต้องไม่ตัดสินใจอะไรเอง ถึงจะมีคุณค่า"
42090-139 = "......"
42090-140 = "ว่าแต่พวกเธอเป็นเด็กโรงเรียนไหนเนี่ย? ไม่เคยเห็นชุดนักเรียนแบบนี้มาก่อนเลย"
42090-141 = "สะ... สถาบันพิเศษ SRT ค่ะ..."
42090-142 = "... สถาบันพิเศษ SRT? ไม่เห็นมีชื่อสถาบันอะไรทำนองนั้นในรายชื่อสถานศึกษาเลยนี่นา"
42090-143 = "ว่าไงนะ? พูดอย่างนี้จะหาเรื่องกันใช่มั้ย"

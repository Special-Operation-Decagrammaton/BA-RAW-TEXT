[translation]
42090-1 = "Episode 9; D.U.'s New Dawn"
42090-2 = "The next morning, in front of Kousagi Park."
42090-6 = "Attention, residents. A new executive order will go into effect at 12:00 AM today."
42090-7 = "Please visit the General Student Council website as well as your local administrative agency for further details. We look forward to your active cooperation in any future inspections by law enforcement."
42090-8 = "The General Student Council is not responsible for any harm or damages incurred from a failure to comply."
42090-9 = "Once again, attention, residents. A new executive order will go into effect at 12:00 AM today."
42090-10 = "Is this really happening?"
42090-11 = "I guess so. Although I don't even really know what \"this\" is. "
42090-12 = "I already tried to read through the clauses on their stupid website, but it was so convoluted you can't tell what they're saying at all."
42090-13 = "D-Do you think Sensei's okay...? We haven't heard from them since they went to the General Student Council building yesterday..."
42090-15 = "Sensei will be okay. The new Council's influence hasn't reached the Sanctum Tower as of yet."
42090-16 = "My biggest concern is what's happening all around the city right now."
42090-17 = "The announcements were alarming enough, but since this morning, I've seen a parade of armored transports and soldiers filling up the streets."
42090-18 = "There's no way it's another coup, is there?"
42090-19 = "It's way too eerily quiet. We would've at least heard some shooting."
42090-20 = "I-It's hard to tell... We don't have any vision of the city from here..."
42090-26 = "Right now, information is our most essential resource. We'll have to do some recon in the field."
42090-27 = "Gear up, RABBIT Squad. Let's get to the bottom of this."
42090-28 = "Oh... Oh, geez..."
42090-32 = "Aren't those idiots Kaiser's Special Forces or whatever?"
42090-33 = "Yeah, I recognize them! Why're they decked out in gear in the middle of the city? It's all civilian zones here..."
42090-35 = "Attention citizens. As of today, security supervision of our 47 districts, including Kousagi Town, will be managed by Kaiser Security."
42090-36 = "In accordance with the acting General Student Council president's will and the new executive order, Kaiser Security will ensure public order in Kivotos."
42090-37 = "We request the public's cooperation to ensure a seamless transition–"
42090-39 = "Oh man...running so late..."
42090-43 = "Why's the traffic light taking forever today?"
42090-44 = "I'm gonna be late at this rate..."
42090-45 = "There's no traffic; maybe I'll just go—"
42090-47 = "Halt!"
42090-48 = "Um...me?"
42090-49 = "Yes, you."
42090-50 = "Why are you trying to cross the street when the light is red?"
42090-51 = "I was running late for my appointment and was rushing..."
42090-52 = "I'm very sorry. Can you give me a pass this one time...?"
42090-53 = "Rules apply to everyone equally!"
42090-54 = "For violating the General Student Council's regulations and disrupting traffic..."
42090-56 = "You will be charged with a 100,000 yen penalty!"
42090-58 = "A 100,000 yen ticket for jaywalking?!"
42090-59 = "I mean, I get jaywalking isn't cool, but that's way more than usual–"
42090-60 = "...Opposing the will of the acting General Student Council president?"
42090-61 = "Unacceptable! You are under arrest for sedition!"
42090-62 = "This can't be happening!"
42090-64 = "Now, how does this thing work again? Is it this button?"
42090-65 = "What's that? Why's everyone crowding around this ATM?"
42090-66 = "You there, why are you loitering?"
42090-67 = "Please bear with me. I'm an old man and not tech-savvy."
42090-68 = "Withdrawing cash takes me a while sometimes... Just need to find the right button..."
42090-69 = "Everyone is equal! No exceptions! All citizens deserve access to public utilities!"
42090-71 = "You must move once your allotted time has passed. Your selfish behavior has created a line!"
42090-72 = "Ugh... Can't even get cash these days..."
42090-77 = "You there! What's that in your hand?"
42090-78 = "...Oh, this? Just a grenade."
42090-79 = "Just a grenade? JUST?!"
42090-80 = "Just a deadly explosive device that could destroy buildings and injure citizens with a mere toss?!"
42090-81 = "Are you a terrorist? Who is your target?"
42090-82 = "Hold up! Since when can we not carry grenades around?"
42090-83 = "You wouldn't tell me I couldn't carry my schoolbooks or water bottle, would you?! I'm pretty sure grenades are listed on our supplies list!"
42090-84 = "In accordance with the new executive orders, carrying explosives weighing over 100 grams within D.U. territory is illegal!"
42090-86 = "You're under arrest for conspiracy to commit a terror attack!"
42090-87 = "No way! That's absurd!"
42090-89 = "There are soldiers everywhere, and they're arresting citizens left, right, and center."
42090-90 = "And since when did it become illegal to carry grenades in the city? If that was a thing, I would've been arrested ages ago!"
42090-91 = "It's all a part of that new executive order they issued. There's so many new rules and regulations, they could probably teach an entire class on it. The textbook would be huge..."
42090-92 = "Ahem. We're focusing on the wrong thing here. Since when is Kaiser Corporation in charge of policing the public?"
42090-93 = "Shouldn't the whole lot of them be behind bars after their last failed coup?"
42090-95 = "Kaiser has more influence than we realize, I think... I can't stand seeing law enforcement intimidating and arresting residents, even if it's in the name of crime prevention. That's not how justice should be upheld."
42090-96 = "B-But...you know...today does feel more orderly."
42090-97 = "On a typical day in Kivotos, you'd have some yahoos firing guns or trying to blow us up with a grenade launcher."
42090-99 = "With such a threatening security presence, no one's foolish enough to start anything."
42090-100 = "(...Why does this feel so wrong?)"
42090-101 = "(Isn't this the ideal society? No one commits any crimes, because the law reigns sovereign over the city. So why does it feel so...ominous?)"
42090-102 = "(Is this the justice I've envisioned all these years?)"
42090-104 = "Hey! You there! What are you doing?"
42090-106 = "To not know me... It is your first time beholding such greatness, I would assume."
42090-107 = "We are well-known, famous even, among folks who pursue a lifestyle of minimalism and tranquility. You must've been living a life of extravagance to not know about us."
42090-111 = "I am Descartes. We're a collective of the poor who hope to live simply and honestly–we call ourselves the Pursuers of Non-Possessive Happiness. The Pursuers, for short."
42090-112 = "The Pursuers...?"
42090-113 = "Exactly. And we aren't moochers of society. We chose this way of life to nourish our souls: not working, not owning, not wanting."
42090-114 = "Interested? If you fancy our way of life, please—"
42090-115 = "Bravo 1. Take this idiot away."
42090-119 = "Now, now, wait a minute? We haven't done anything wrong!"
42090-120 = "If you're going to haul us away, you have to at least give a reason."
42090-121 = "Okay, here's your reason. Because you did nothing."
42090-122 = "You are cancerous parasites leeching off of society! You drain its resources and give nothing in return!"
42090-123 = "For a thriving community, we need to...reshape mindsets like yours."
42090-124 = "We're sending you to the Kaiser Corporation's employment facility to work. Time for you to contribute to society!"
42090-125 = "No..."
42090-127 = "You can't make me work! Nooo!"
42090-128 = "Excuse me."
42090-132 = "Even if the course of action you pursue is for the public good and safety, you cannot arrest citizens without a warrant."
42090-133 = "If you abuse your authority like this, as a member of SRT Academy, I have no choice but to intervene."
42090-134 = "You misunderstand. This is the will of the Acting President. Am I to understand you are questioning her command?"
42090-135 = "Even if you say it's her will–"
42090-137 = "A weapon has one purpose and is useless if it can't perform it."
42090-139 = "..."
42090-140 = "Anyway, which school are you from? I don't recognize your uniforms."
42090-141 = "SRT Academy..."
42090-142 = "SRT Academy? Doesn't ring any bells."
42090-143 = "Excuse me? Are you trying to antagonize us?"
42090-144 = "Saki, Saki. It's okay if they don't know. It just means we'll have to teach them who we are, one lesson at a time... Heehee."
42090-145 = "On top of that you seem to have weapons that violate the new executive order..."
42090-150 = "You're being detained too! Drop your weapons and put your hands in the air!"
42090-154 = "RABBIT 1. Permission?"
42090-155 = "Permission granted. On my signal..."
42090-157 = "It's fine. I can handle this."
42090-159 = "It's been awhile, RABBIT Squad."
42090-160 = "General. From the recent attack on Schale."
42090-161 = "You mean the one who nearly blew up a building during Operation Recapture Schale?"
42090-162 = "I'm honored my decision stood out enough in the minds of such elites as yourselves to be remembered."
42090-163 = "Don't get a big head about it."
42090-164 = "It's more like your refusal to accept defeat was so absurd that I couldn't help but remember you."
42090-165 = "Haha. I suppose I'll have to take what I can get."
42090-166 = "I will admit, I may have underestimated your squad back then..."
42090-167 = "But unfortunately for you, I'm not too prideful to learn from my past mistakes."
42090-169 = "Why let us go? The odds were on your side in that situation."
42090-170 = "Hah! As if those grunts would have stopped you... Regardless, I have orders."
42090-171 = "Direct orders from the acting General Student Council president, in fact, to not antagonize SRT Academy students."
42090-172 = "The acting... From Defense Chief Kaya?"
42090-173 = "Yes. It seems she's planning to reinstate SRT Academy, under her command this time."
42090-174 = "If that is true, we may not be allies, but we will be on the same side. I have no reason to fight you."
42090-175 = "She's going to...reinstate SRT?"
42090-177 = "There, there. Your complexion is pale. Do you need anything? Probiotics? Food?"
42090-178 = "Please, feel free to take advantage of Kaiser's services. You'll have access to whatever supplies you need at the Kaiser Express in front of the park."
42090-180 = "Granted, we can't openly give you outlawed weapons, but if you need something..."
42090-182 = "Let's just say we can arrange something a little more discreet."
42090-183 = "Your offer sounds fine and dandy, but I know when something's too good to be true."
42090-184 = "What are you scheming behind the scenes?"
42090-185 = "Your last plan to overthrow the General Student Council failed largely because of us."
42090-186 = "Surely, you resent us?"
42090-188 = "Haha. Isn't that a given?"
42090-193 = "I can't stand you. SRT."
42090-194 = "You have power most can only dream of, and you squander it away on your shallow ideas of justice."
42090-195 = "Your misguided sense of righteousness almost cost me everything."
42090-196 = "The idea of taking each and every one of you down? It's...incredibly appealing."
42090-197 = "E-Eek..."
42090-198 = "But, sometimes, society requires us to be nice. It requires handshakes with trembling little rabbits."
42090-199 = "Personal vendettas mean nothing in the face of my greater goals."
42090-200 = "In that regard, President Kaya sets a good example. She'd collaborate with anyone as long as it furthered her goals. She proved as much when she extended her hand again after I betrayed her."
42090-201 = "The cooperation of two people who understand how to exploit the other's strengths is stronger than your paltry relationships."
42090-202 = "Things like comradeship? Friendship? Machinations of the weak."
42090-203 = "You believe in nothing then?"
42090-204 = "I have my beliefs. But they don't dictate my missions."
42090-205 = "I follow orders, regardless of my personal beliefs."
42090-206 = "That's what makes an ideal soldier, a proper special ops agent."
42090-207 = "Can you claim that? To me, you're strong but idealistic to a fault. Whiny children."
42090-208 = "You're cowering prey who fight the injustices in front of you, but turn your head at inequalities that don't affect you."
42090-209 = "So keep winning as many battles as you want, but you won't be able to win this war. You don't have the resolve."
42090-214 = "..."
42090-215 = "Let's head back, everyone."
42090-216 = "We've collected more than enough intel."
42090-220 = "Please, feel free to accept some of Kaiser's free supplies on your way back."
42090-221 = "No, thank you."
42090-222 = "I'm not naive enough to be in debt to someone like you. Not when I don't know what you're planning."
42090-223 = "Oh, excellent. At least the leader has some amount of common sense."
42090-224 = "Until next time, then."
42090-229 = "Ugh. I can't believe we just got lambasted by that loser, of all people."
42090-230 = "Something's wrong..."
42090-231 = "What is it? Is there something on my face?"
42090-232 = "No, about when he was taunting us earlier."
42090-233 = "You're usually a hot-headed idiot, so I was just waiting for your balloon to explode."
42090-234 = "But you actually kept your cool. Has our little Saki finally matured?"
42090-235 = "There were soldiers with guns everywhere! It's not about maturity. I was trying to not get us killed! I would've liked to take that stupid general's face and..."
42090-236 = "...And, well, he was right about one thing."
42090-237 = "Dominating in battle won't help if those in power change the rules every time they start losing."
42090-238 = "I mean, at the end of the day, we were made to follow orders."
42090-239 = "A-At SRT they always said, \"On the battlefield, emotions are a distraction. And distractions mean failure.\""
42090-241 = "..."
42090-242 = "So, I think it's time to address the elephant in the room. What's our next move, Miyako?"
42090-243 = "Elephant? What do you mean?"
42090-244 = "Don't play dumb. Yukino wants us to disband and become a part of the FOX Squad. What do you want to do?"
42090-245 = "I'm hesitant to disband RABBIT Squad, but if SRT Academy is really reopened, it'd be a little purposeless to continue protesting here..."
42090-246 = "Then maybe being a good weapon and listening is our best option."
42090-248 = "I mean, how much longer are we really going to live in a park?"
42090-249 = "We can't keep scavenging for supplies forever. We have no way of making money and improving our situation. And I personally would much rather have a warm bed when winter hits."
42090-250 = "I... I'll do whatever you do, Miyako."
42090-255 = "...I see."
42090-260 = "(Considering Chief Kaya promised to restore SRT Academy, keeping up this barricade in the park is pointless...)"
42090-261 = "(Joining our seniors would mean a structured life, better weapons, and a comfortable place to live for the whole squad.)"
42090-262 = "(What matters more to me? Are these ideals I've dug my nails into since the moment I joined SRT just that? Ideals? Dreams?)"
42090-263 = "(...My squad members' struggles are what matters.)"
42090-266 = "Okay, listen up, everyone."
42090-267 = "I can't make a final decision without hearing from you first."
42090-269 = "Next Episode; Out of Control"

[translation]
42090-1 = "第9話;D.U.の新しい朝"
42090-2 = "（翌朝、子ウサギ公園前）"
42090-6 = "<市民の皆様にお知らせします。#n 本日午前0時より、新たな行政命令が施行されます。>"
42090-7 = "<市民の皆様は連邦生徒会のホームページ、もしくは各地域の行政機関に告示された内容をご確認ください。治安機関からの検問要請があった場合には、ご協力をお願いします。>"
42090-8 = "<……行政命令を認知していない、もしくは検問に応じなかった場合に#n生じる不利益に関して、連邦生徒会は責任を負いません。>"
42090-9 = "<繰り返し市民の皆様にお知らせします。本日午前0時より、新たな行政命令が……>"
42090-10 = "……一体何がどうなっているんだ？"
42090-11 = "さあね、こっちが聞きたいくらいだよ。"
42090-12 = "一応連邦生徒会のホームページは見たけど、#n小難しい話ばかりで何が何だかサッパリだし……。"
42090-13 = "先生は大丈夫かな……？#n昨日、連邦生徒会に呼ばれてたよね……。"
42090-15 = "きっと大丈夫でしょう。#nサンクトゥムタワーに大きな変化はありませんでしたし……。"
42090-16 = "それに、今優先しなければならないのは、市街地で起きている出来事です。"
42090-17 = "ああ。さっきの放送もだが、朝から武装兵を乗せた車や装甲車が市街地に向かっているのも気になるな。"
42090-18 = "まさかまたクーデターでも起こるのか？"
42090-19 = "でも、それにしては静かすぎるんだよねぇ。"
42090-20 = "状況を確認しようにも、この公園からじゃ市街地の様子はわからないし……。"
42090-26 = "……キャンプを離れ、市街地の様子を確認しに行きましょう。"
42090-27 = "みなさん、偵察用の装備と弾薬を用意してください。#n準備が終わり次第、目的地へ向かいます。"
42090-28 = "何も起こってないといいんだけど……。"
42090-32 = "ねえ、あいつらカイザーコーポレーションの特殊部隊じゃない？"
42090-33 = "どうして企業の兵が街中にいるんだ……？"
42090-35 = "市民の皆様にお知らせします。本日から施行された行政命令により、子ウサギタウンを含む47の行政区域の治安維持業務は、カイザーセキュリティに移管されました。"
42090-36 = "これは連邦生徒会代行の許可を受けた業務です。#nカイザーセキュリティは行政命令に従い、公正に業務を遂行することをお約束します。"
42090-37 = "市民の皆様のご理解とご協力をお願い申し上げます――"
42090-39 = "やばい、遅刻だ遅刻！"
42090-43 = "ああ、何で今日に限って信号が変わるのが遅いんだ！"
42090-44 = "このままじゃほんとに遅刻するぞ……。"
42090-45 = "……車も来てない。今なら――"
42090-47 = "そこのお前、止まれ！"
42090-48 = "えっ！？わ、私ですか……？"
42090-49 = "そう、お前だ。"
42090-50 = "今、赤信号なのに横断歩道を渡ろうとしただろう。"
42090-51 = "そ、それは……約束の時間に遅れそうになって、思わず……。"
42090-52 = "すみません！ですが今回だけは、見逃していただけませんか……？"
42090-53 = "ダメだ！ルールは皆に公平に適応されなければならない！"
42090-54 = "連邦生徒会の規定を無視し、#n交通システムを撹乱しようとした代償として――"
42090-56 = "10万円を徴収する！"
42090-58 = "じゅ、10万円！？#nちょっと信号無視しただけなのに！？"
42090-59 = "いや、もちろん悪いのはわかっていますが、こんなのあまりにも――"
42090-60 = "……今の言葉、連邦生徒会に対する反抗と捉えていいな？"
42090-61 = "――この者を、内乱助長の罪で緊急逮捕する！"
42090-62 = "そ、そんなバカなぁぁあああ！！"
42090-64 = "ええと、このボタンは……なんじゃったかのう？"
42090-65 = "あそこのATM……どうしてあんなに混んでいるんだ？"
42090-66 = "おい、そこのお前！何をぐずぐずしている？"
42090-67 = "ヒッ……！ま、待っておくれ。機械の操作が難しくて……。"
42090-68 = "この歳になると、お金を下ろすのにも時間がかかってしまってのう……。"
42090-69 = "言い訳は聞かん！後ろの列が見えないのか！？"
42090-71 = "長時間だらだら居座るな！#n誰もが利用する公共施設を独占するんじゃない！"
42090-72 = "うぅ……どうしてこんな……。"
42090-77 = "おい、その手に持っているのはなんだ。"
42090-78 = "……え？ただの手榴弾ですが……。"
42090-79 = "手榴弾だと？"
42090-80 = "ピンを抜いて投げるだけで多くの被害を生み出す危険な火器を公然と持ち歩くなど……。"
42090-81 = "貴様、テロでも起こすつもりだな！"
42090-82 = "ちょ、ちょっと待ってください。#n手榴弾の携帯が禁止されてるなんて話、聞いたことないですよ！？"
42090-83 = "そもそも手榴弾なんて、キヴォトスじゃ日用品みたいなものでしょう！？"
42090-84 = "D.U.管轄区域内で100g以上の爆薬が含まれた火器を許可なく持ち歩くことは本日午前0時より禁止されている！"
42090-86 = "やつをテロ未遂で逮捕しろ！"
42090-87 = "ううっ……こんなの理不尽すぎる……！"
42090-89 = "あっちでも逮捕、こっちでも逮捕……逮捕祭りだねぇ。"
42090-90 = "にしても、手榴弾の持ち歩き禁止ってなに？#nそんな規則があるなんて一度も聞いてないんだけど！"
42090-91 = "行政命令で告示されていた内容だ。#n他にも治安や統制に関する規則が追加されている……。"
42090-92 = "だが、どうしてヴァルキューレではなく#nカイザーコーポレーションが治安維持業務を行っているんだ？"
42090-93 = "やつらはこの前のクーデターで捕まったんじゃなかったのか？"
42090-95 = "それに犯罪防止のためだとしても、#n市民を連行して不安を煽るのは正しいと思えません。"
42090-96 = "でも……今日の市街地はやっぱりなんだか静かだね……。"
42090-97 = "たしかに～いつもだったら、銃を乱射したり爆弾を投げたりするやつが一人や二人はいるからねぇ。"
42090-99 = "銃や爆弾を出そうものならすぐに捕まるこの状況で、#n暴れようとするバカはいなかったみたいだな。"
42090-100 = "（……何だか、変な気分です）"
42090-101 = "（誰もが規則を守り、法によって正義が実現された社会なのに……#nまったく安心できないなんて）"
42090-102 = "（これが私の夢見ていた正義の姿なのでしょうか……？）"
42090-104 = "おい、そこのお前。身分を明かせ。"
42090-106 = "おやおや……私たちをご存じでないと？"
42090-107 = "[ruby=せいひん]清貧[/ruby]な人生を追求する者なら誰でも知っているというのに……。#n皆さんはそれとは縁遠い日々を送ってきたようですね。"
42090-111 = "私の名はデカルト。#n清貧のための求道の会――「所有せずとも確かな幸せを探す集い」、#n略して「所確幸」を率いるリーダーです！"
42090-112 = "所確幸……？"
42090-113 = "ええ。私たちは働かず、所有せずをモットーに、#n廃墟での生活を続ける求道者です。"
42090-114 = "いかがですか、皆さんも清貧の暮らしにご興味は――"
42090-115 = "ブラボー1、連れて行け。"
42090-119 = "ま、ままま、待ってください！？#n私たちが何をしたというのです！？"
42090-120 = "連行するなら、その理由を言うべきじゃないですか！？"
42090-121 = "……何もやっていないからだ。"
42090-122 = "お前たちはこの社会に寄生し、働かずして資源を欲する害虫にすぎない。"
42090-123 = "健康な社会の存続のためには、#nお前らのような社会の寄生虫を更生させる必要があるだろう。"
42090-124 = "よってお前らをカイザーコーポレーションの就職斡旋施設に送る。#nそこで仕事を手に入れ働けば、すぐに社会に貢献する素晴らしい労働者として生まれ変わるだろう！"
42090-125 = "い、イヤだああぁぁ！！"
42090-127 = "社畜になんかなりたくないぃぃ！！！！"
42090-128 = "待ってください。"
42090-132 = "いくら治安のためとはいえ、#n令状もなしに市民を連行することはできないはずです。"
42090-133 = "これ以上権限を乱用するのなら、あなたたちを――"
42090-134 = "何を言う、これは連邦生徒会長代行の「命令」だ――逆らうつもりなのか？"
42090-135 = "命令、ですか……。"
42090-137 = "武器は自ら判断しないからこそ、価値があるのだから。"
42090-139 = "………。"
42090-140 = "しかし、お前たちはどこの学園の者だ？#n初めて見る制服だが。"
42090-141 = "え、SRT特殊学園、ですけど……。"
42090-142 = "……SRT特殊学園？#n学園名簿にそんな学園はなかったが。"
42090-143 = "なんだと？ケンカ売ってるのか？"
42090-144 = "……まあ知らないなら知らないで別にいいよ。#n今からじーっくり教えてあげればいいだけだし？#nくひひひっ……。"
42090-145 = "それにお前ら、行政命令に反する火器をたくさん保有しているようだな……"
42090-150 = "お前らを全員逮捕する！今すぐ武器を捨てて両手を挙げろ！"
42090-154 = "……RABBIT1、対応は？"
42090-155 = "……許可します。合図したらすぐに――"
42090-157 = "……構わん、解放してやれ。"
42090-159 = "久しいな、RABBIT小隊。"
42090-160 = "あなたは……あの時の……？"
42090-161 = "シャーレ奪還作戦の時、私たちの目の前で建物を爆破しようとしたあの指揮官か？"
42090-162 = "私の決断をSRT特殊学園のエリートに覚えてもらえていたとは光栄だな。"
42090-163 = "……いや。"
42090-164 = "どちらかというと、足掻く姿が印象的で覚えていただけだが。"
42090-165 = "ふふ……そんなこともあったな。"
42090-166 = "たしかに、あの時は君たちを過小評価していた。"
42090-167 = "だが、今は違う。私は失敗から教訓を得られない能なしとは違うからな。"
42090-169 = "……どうして、私たちを見逃すのですか？"
42090-170 = "「命令」があったからだ。"
42090-171 = "SRT特殊学園の生徒との敵対は禁ずるという、連邦生徒会長代行直々のな。"
42090-172 = "カヤ防衛室長が……？"
42090-173 = "ああ。#n――そういえば彼女、SRT特殊学園を復活させて自分の指揮下に置くとも言っていたな。"
42090-174 = "そうなれば君たちとは味方になる。#n未来の友と敵対していいことはないからな。"
42090-175 = "SRT特殊学園の……復活……。"
42090-177 = "ん？顔色が悪いぞ。食事はちゃんと摂っているのか？"
42090-178 = "補給が足りないなら、我々カイザーコーポレーションが支援するぞ。#nなに、弾薬であれ補給品であれ、我々には十分なストックがある。#n必要とあらば、いつでもカイザーエクスプレスで公園の前まで届けさせよう。"
42090-180 = "必要なのが条例に反する武器でも……"
42090-182 = "支援できないことはない。"
42090-183 = "……オイシイ話だけど、こんだけ露骨に出られるとかえって怪しく感じるねぇ。"
42090-184 = "ああ……何故こんなに親切なんだ？"
42090-185 = "私たちのせいで計画が失敗して、大きな損害を受けたはずなのに……。"
42090-186 = "あなたは、私たちを恨んでいるのでは？"
42090-188 = "ふふ、当然のことを聞くんだな。"
42090-193 = "――ああ、もちろん私は君たちSRTを嫌悪している。"
42090-194 = "凡人では一生努力しても手に入らない強い力を持っていながら、#n君たちはそれを正義や信念のような、くだらないもののために浪費して……。"
42090-195 = "その馬鹿馬鹿しい正義ごっこのおかげで、#n私は半生をかけて築き上げたすべてを失いかけた。"
42090-196 = "ここで君たち全員を跪かせ、靴で頭を踏んでやっても足りないくらいだ……！"
42090-197 = "ひ、ひぃっ……。"
42090-198 = "……だが、どれだけ憎い相手であっても#n笑顔で握手できてこそ社会人だからな。"
42090-199 = "個人の恨みで付き合う相手を選んでいては、大業は成し遂げられない。"
42090-200 = "そういう意味では、カヤ連邦生徒会長代行は本当に立派な模範生だな。#n自分の後頭部に銃を突きつけた裏切り者だとしても、将来のために遠慮無く手を差し伸べる人なのだから。"
42090-201 = "互いの使い方を理解している者同士の絆は、何よりも強い。"
42090-202 = "友情や戦友というくだらないものは、能力のない者を慰めるためのまやかしだ。"
42090-203 = "……あなたに信念はないのですか？"
42090-204 = "信念？もちろんあるに決まっている。#nだがそれは、任務の遂行とは別の話だろう。"
42090-205 = "命令を受け、遂行する。たとえ自分の信念とは違っていても。"
42090-206 = "それが正しい社会人であり、正しい特殊部隊のあり方だ。"
42090-207 = "それに比べて君たちは……力を持っただけの赤子のようだな。"
42090-208 = "目の前の不正に怒りながらも、手の届かない不条理には目をつぶる臆病者だ。"
42090-209 = "だから「戦闘」では勝てても、「戦争」では勝てないのだよ。"
42090-214 = "………。"
42090-215 = "……帰りましょう。"
42090-216 = "現場の情報は十分に集められました。"
42090-220 = "もう行くのか？補給品を少し持って行ったらどうだ？"
42090-221 = "いえ、結構です。"
42090-222 = "何を望んでいるのかも分からない相手に借りを作るほど#n愚かではありませんから。"
42090-223 = "はは、小隊長は多少頭が切れるようだな。安心したよ。"
42090-224 = "では、また会おう。"
42090-229 = "ちっ……なんであんな奴に説教をされなきゃならないんだ。"
42090-230 = "……な～んか変。"
42090-231 = "何がだ。私の顔にゴミでも付いてるのか？"
42090-232 = "や、あの指揮官に挑発された時のことだよ。"
42090-233 = "サキのことだし、絶対途中でキレて飛び出すって思ってたのに、#n最後まで我慢できてたから。"
42090-234 = "くひひっ、成長しててえらいねぇ～"
42090-235 = "モエは私を何だと思ってるんだ。#nいくら何でもあの状況で飛び出すほど間抜けじゃない。"
42090-236 = "……それに、最後の言葉はあながち間違ってもいなかった。"
42090-237 = "いくら私たちが戦闘で相手を倒しても、#n偉い人たちが状況を覆してしまったら[ruby=・   ・]戦争[/ruby]に勝つ術はないからな。"
42090-238 = "まあねぇ。しょせん私たちは、命令に従って#n作戦を遂行する隊員に過ぎないし。"
42090-239 = "感情を優先してしまったら、戦闘に集中できないのも事実だもんね……。"
42090-241 = "………。"
42090-242 = "ミヤコ、これからどうする？"
42090-243 = "は、はい？これから、とは？"
42090-244 = "色々あるだろう？昨日FOX小隊の先輩から言われた支隊の件とか。"
42090-245 = "正直、気は進まないが……#n学園が復活するならデモを続けるのもおかしいし……。"
42090-246 = "先輩の言うことを聞くのが、一番いい選択なのかもしれない。"
42090-248 = "実は私も、公園に残ってる必要があるのか#nよくわかんなくなっちゃってたんだよねぇ……。"
42090-249 = "日に日に補給は難しくなるし、冬になったら水も中々手に入らないしさぁ……。"
42090-250 = "私は……どっちでもいい、けど……。"
42090-255 = "……そう、ですね。"
42090-260 = "（カヤ室長がSRT特殊学園の復活を保証してくれた以上、#nこの公園に居続ける理由はない）"
42090-261 = "（……先輩たちの元へ行けば、規則正しい生活も、強力な装備も、温かい部屋も……すべて手に入れられる）"
42090-262 = "（でも、入学した時から抱いていた夢や信念は……一体……）"
42090-263 = "（…………でも、みんなのためなら）"
42090-266 = "……みなさん、少しいいですか？"
42090-267 = "最終決定の前に、みなさんに聞きたいことがあります。"
42090-269 = "次回;制御不能"

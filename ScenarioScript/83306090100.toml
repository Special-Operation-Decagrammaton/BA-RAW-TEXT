[translation]
83306090100-6 = "Oh, the head prefect. What brings you here?"
83306090100-7 = "Your expression seems troubled."
83306090100-8 = "Is there a problem?"
83306090100-9 = "Well, I guess there's a problem... Or maybe it's nothing."
83306090100-10 = "I'm supposed to do my duty work with Kirara today."
83306090100-11 = "But she must have gotten distracted again or something. She hasn't shown up."
83306090100-12 = "It's too much work for one person, so I was thinking of the best way to approach it."
83306090100-13 = "Hmm... In that case, would you like a hand?"
83306090100-14 = "What? Really? I mean, sure! ...But aren't you busy being, like, the head prefect? Can you really afford to spend time on duty work?"
83306090100-15 = "The Prefect Team has a responsibility to assist students in need. Helping you is my work."
83306090100-16 = "Ahaha! All righty... In that case, I appreciate the help!"

[translation]
83306090100-6 = "啊，是風紀委員長。#n來這裡有什麼事嗎？"
83306090100-7 = "因為你一臉有困擾的表情。"
83306090100-8 = "遇到什麼問題了嗎？"
83306090100-9 = "該說是問題嗎……還是說沒有到那種程度呢？"
83306090100-10 = "我今天要和綺羅羅醬一起當值日生。"
83306090100-11 = "是不是又因為什麼事分心了呢？時間都到了還沒出現。"
83306090100-12 = "不過自己一個人處理的話，工作量又太多了，我正在思考該怎麼辦才好。"
83306090100-13 = "原來如此……那需要我幫忙嗎？"
83306090100-14 = "嗯？真的嗎？可以的話我當然樂意接受，不過風紀委員長不是很忙嗎？#n幫忙值日生的工作沒問題嗎？？"
83306090100-15 = "幫助面臨困難的學生也是風紀委員會的工作，不必擔心。"
83306090100-16 = "哈哈，嗯。#n如果是這樣的話，雖然有點不好意思，但就拜託你囉。"

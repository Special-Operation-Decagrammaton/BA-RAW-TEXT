83306090100-5 = "3;에리카;01\n#3;a\n#wait;1000"
83306090100-6 = "3;에리카;02;아, 선도부장이네. 여긴 어쩐 일이야?\n#3;em;[반응]"
83306090100-7 = "3;히나;02;뭔가 곤란한 표정을 하고 있길래 말이야.\n#3;a"
83306090100-8 = "3;히나;16;문제라도 있는 거야?\n#3;em;[?]"
83306090100-9 = "3;에리카;15;문제가 있다고 할까…… 또 그 정도까진 아니라고 할까.\n#3;stiff"
83306090100-10 = "3;에리카;14;오늘 키라라와 함께 당번 일을 하기로 했는데."
83306090100-11 = "3;에리카;12;키라라, 또 어디서 한눈을 팔고 있는지. 시간이 되도록 나타나질 않아서 말이야.\n#3;em;[한숨]"
83306090100-12 = "3;에리카;02;으음, 혼자 정리하기엔 양이 제법 많아서 어떻게 할까 고민하던 차였어."
83306090100-13 = "3;히나;01;흐음, 그래…… 그런 거라면 손을 거들어줄까?"
83306090100-14 = "3;에리카;15;어? 진짜? 뭐, 나야 괜찮은데. 선도부장은 바쁜 몸이잖아? 당번 일 같은 걸 도와줘도 괜찮은 거야??\n#3;em;[?]"
83306090100-15 = "3;히나;03;곤경에 처한 학생을 돕는 것이 곧 선도부가 해야 할 일이기도 해. 나는 문제없어.\n#3;em;[음표]"
83306090100-16 = "3;에리카;08;하핫. 그래. 그런 거라면 염치없지만 부탁할게.\n#3;em;[재잘]\n#3;hophop"
83306090100-17 = "#wait;100"

[translation]
83306090100-6 = "อ๊ะ ประธานกรรมการวินัยนี่นา มีธุระอะไรที่นี่เหรอ?"
83306090100-7 = "เห็นว่าทำสีหน้าแปลกๆ อยู่น่ะสิ  "
83306090100-8 = "เกิดปัญหาอะไรงั้นเหรอ?"
83306090100-9 = "มันถึงกับต้องเรียกว่าปัญหาไหมนะ..."
83306090100-10 = "พอดีว่าวันนี้ฉันต้องเข้าเวรกับคิราระ"
83306090100-11 = "แต่ก็ไม่รู้ว่าคิราระไปเถลไถลอยู่ที่ไหน ถึงเวลาแล้วแต่ก็ยังไม่มาเลยน่ะ"
83306090100-12 = "อืม แล้ววันนี้งานก็เยอะซะด้วย ฉันก็เลยกลุ้มใจอยู่ว่าจะจัดการยังไงคนเดียวให้เสร็จ"
83306090100-13 = "อืม เป็นอย่างนี้สินะ... งั้นให้ฉันช่วยไหม?"
83306090100-14 = "หืม? จริงเหรอ? ฉันก็ยินดีหรอกนะ แต่ว่าประธานกรรมการก็น่าจะงานยุ่งเลยนี่นา มาช่วยงานเวรแบบนี้#nจะไม่เป็นอะไรเหรอ??"
83306090100-15 = "ไม่เป็นไรอยู่แล้ว การช่วยงานนักเรียนที่กำลังประสบปัญหาก็เป็นงานของคณะกรรมการวินัยเหมือนกัน"
83306090100-16 = "ฮะฮ่า ก็ได้ ถ้างั้นฉันก็ขอรบกวนด้วยนะ"

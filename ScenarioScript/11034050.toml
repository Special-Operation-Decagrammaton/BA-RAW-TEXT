[translation]
11034050-1 = "#K-04"
11034050-3 = "อืม... เมื่อกี้โอเคเลยนะ รักษาระดับการเล่นไว้แบบนี้นะทุกคน"
11034050-4 = "ตอนแสดงจริง หวังว่าพวกเราจะทำได้แบบนี้นะ"
11034050-5 = "แต่ก็แอบกังวลอยู่นิดหน่อยนะว่าวันจริงจะประหม่ากันรึเปล่า..."
11034050-6 = "ดูการหมุนไม้กลองลมพายุของฉันซะก่อน!!"
11034050-7 = "นะ... นัตสึจัง...! เล่นให้จบเพลงก่อนแล้วค่อย...!!"
11034050-8 = "ยังอยากกินเซมล่าอยู่ใช่มั้ย?"
11034050-12 = "อ่า..."
11034050-13 = "ดูทรงแล้วก็ไม่น่าจะประหม่ากันแล้วละ..."

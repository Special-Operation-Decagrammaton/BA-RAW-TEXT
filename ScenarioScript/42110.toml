[translation]
42110-1 = "第11話;ブラックコーヒー"
42110-2 = "子ウサギ駅付近"
42110-3 = "（翌日、RABBIT小隊と会うために市街地を歩いていたところ……）"
42110-7 = "……ダメなものはダメだ！#nヴァルキューレの生徒が規則を無視するつもりか？"
42110-8 = "この方は怪しい人ではありません！#nこの地域にお住まいの市民です！"
42110-9 = "昨日だって本官と駅前で挨拶を交わしていますし……"
42110-10 = "何かありましたら本官が責任を取りますので、#n今回は見逃していただけませんか……？"
42110-11 = "一生徒の保障で看過できるような問題じゃあない。#n規則に文句があるのなら、責任者に問い合わせるように。"
42110-12 = "市民の安全保障を、ヴァルキューレでは責任が取れないというのでしたら、#n一体誰が責任を取れると言うのですか？"
42110-17 = "うう、すみません……。"
42110-18 = "[s] \"……一体何があったの？\""
42110-23 = "あ、先生……！"
42110-24 = " ……ちっ、シャーレの先生か。"
42110-25 = "その……この方が病院に行くために電車に乗ろうとしたら……"
42110-26 = "カイザーセキュリティが「地下鉄の利用規定が変わった」と、出入り口を封鎖し、検問を始めまして……"
42110-27 = "何か問題でも？#n我々は規則に従って怪しい者を取り調べているだけだ。"
42110-28 = "最近、新連邦生徒会長代行に不満を抱いている不穏分子が各地に見られるようだからな。実際にテロも起きている。"
42110-29 = "そのため、「D.U.の公共交通安全のための新規行政命令」に基づき、駅に出入りするすべての市民は、#n「往復乗車券」、「領収書」、「通行許可証」、「地下鉄の路線図」、そして「D.U.市立図書館の貸出記録の写し」をセキュリティガードに見せないと通れない事になっている。"
42110-30 = "[s1] \"……電車に乗るだけなのに？\"\n[s2] 「図書貸出記録の写し」……？\""
42110-31 = "すべての規定は、安全で居心地の良いキヴォトスを作るために連邦生徒会長代行が指示された事だ。"
42110-32 = "市立図書館で借りた本を返却せずに他の自治区で長期滞在でもされたら、職員が困るだろう？"
42110-33 = "すべての規定は、安全で居心地の良いキヴォトスを作るために連邦生徒会長代行が指示された事だ。"
42110-35 = "で、でも昨日までは乗車券だけで良かったんですよ……？#n電車に乗るだけなのに、こんなに書類が要るだなんて聞いてません。"
42110-36 = "市立図書館の貸出記録と言われましても……図書館なんて、ここ数年行ってませんし……"
42110-37 = "提示ができないのなら、駅への出入りは諦めてもらうしかない。"
42110-38 = "書類を揃えて出直すか、他の交通手段をあたるように。"
42110-39 = "ですが、子ウサギタウンのバスは運行していません……歩いて最寄りの病院に行くとしても、1時間以上かかってしまいます……"
42110-43 = "うぅ……腹が……。"
42110-45 = "き、緊急事態じゃないですか！#n早く病院に連れて行かないと――"
42110-47 = "我々には関係のないことだ。"
42110-53 = "新規行政命令は、以前から確認するようにと周知していただろう？"
42110-54 = "自身の怠慢を責任転嫁されちゃあ困る。"
42110-56 = "……今、何と？"
42110-57 = "おっと、その顔はなんだ？"
42110-58 = "防衛室の指揮下にあるヴァルキューレ警察学校の生徒が、カヤ代行から全権を委任された我がカイザーセキュリティに楯突くつもりか？"
42110-59 = "ヴァルキューレ警察学校の生徒がそんな事をしたと知れ渡ったら、#n市民のヴァルキューレへの目はどうなるんだろうな？"
42110-60 = "戦うつもりはありませんでしたが、これ以上は……"
42110-61 = "[s] \"キリノ、待って――\""
42110-66 = "書類さえ揃っているのなら、ここを通れるのだな？"
42110-74 = "であれば――私に任せろ。"
42110-76 = "……カンナ局長！"
42110-77 = "フッ、今からこの市民を役所にでも連れていくつもりなのか？"
42110-79 = "その必要はない。すぐに用意できるからな。"
42110-83 = "領収書は先月から電子に移行しているから、メールで届いているはずだ。スマホのメールボックスを確認してくれ。"
42110-87 = "あ、たしかに……領収書が届いていました！"
42110-89 = "通行許可証は、行政命令公表後の猶予期間中、ヴァルキューレ警察学校の生徒が官庁の代わりに臨時の許可証を作成できるという[ruby=ふそく]附則[/ruby]があるから――"
42110-93 = "――これが許可証の様式だ。#nキリノ、下にサインを頼む。"
42110-94 = "は、はいっ……！"
42110-95 = "地下鉄の路線図は駅で無償配布している。"
42110-97 = "……市立図書館の貸出記録の写しは？"
42110-99 = "D.U.市立図書館の貸出記録の写しは、長期休眠者には発行されない。"
42110-103 = "この市民は2年以上図書館を利用していない。#n当該書類の提出義務は免除されるかと。"
42110-104 = "……これで必要書類は全部だな？"
42110-108 = "……ちっ、通れ。"
42110-110 = "あ、ありがとうございます……！"
42110-117 = "はあ、復職してから面倒ばかりだな……。"
42110-119 = "ありがとうございます、カンナ局長！#nおかげで市民を助けることができました！"
42110-124 = "…[ruby=なかつかさ]…中務キ[/ruby]リノ！"
42110-129 = "は、はいっ！？"
42110-130 = "先程の場――武装に手を当てて、一体何をするつもりだったんだ？"
42110-131 = "相手に話が通じないからと――市内で発砲するつもりだったのか？"
42110-132 = "い、いいえ！断じてそんなつもりでは！"
42110-133 = "その……煙幕弾でその場を切り抜けて、#n市民を駅のホームまで援護しようとはしましたが……。"
42110-134 = "重火器で武装したカイザーセキュリティのガードが、#nたかが煙幕弾程度で見逃すとでも？"
42110-135 = "そ、それは……そう、ですね……"
42110-136 = "はぁ……お前には他部署を頼るという考えを――"
42110-142 = "あれ、一体何の騒ぎだ……？"
42110-143 = "カイザーセキュリティとヴァルキューレの生徒が何か言い争ってたみたい……"
42110-144 = "最近公表された行政命令がらみか？#n規則がやたら多くて面倒ではあるけど、揉め事だなんて……"
42110-145 = "……場所を移そうか。"
42110-146 = "色々と疲れたから、コーヒーでも飲みたい気分でね。"
42110-147 = "あ、それなら本官にお任せください！"
42110-148 = "この近くにドーナッツがおいしいカフェがありまして！"
42110-149 = "ドーナッツは別に……まぁいい、移動しよう。"
42110-158 = "[ns3] \"すみません、ホットコーヒー3杯と、\" \n[ns4] \"チョコレートドーナッツセットをお願いします。\""
42110-163 = "……なぜ先生が注文を？"
42110-164 = "ここは本官が……"
42110-165 = "[s5] \"二人が頑張ったからね。\"\n[s6] \"ここは私に出させて。\""
42110-170 = "……先生は相変わらずですね。"
42110-177 = "おまたせしました！#nご注文のホットコーヒーとチョコレートドーナッツセットです！"
42110-179 = "あ、来ましたね。#nここの特製チョコレートドーナッツは絶品なのですよ！"
42110-180 = "フブキに教えてもらったお店なんですが、本当にコーヒーによく合って……"
42110-181 = "ほろ苦いチョコなのに、コーヒーと一緒に食べるとほのかな甘さが引き立って――"
42110-185 = "＜……カイザーセキュリティは治安管理を放棄し、ドーナッツを食べ歩くようなヴァルキューレ警察学校の怠け者とは違います。＞"
42110-189 = "＜我々は、常駐しているPMC出身のベテラン隊員によって、様々な作戦経験に基づいた最適な治安管理ソリューションを提供してまいります。＞"
42110-190 = "＜ここD.U.でもカヤ新連邦生徒会長代行の指示で治安を強化し、各所で取り締まりを行った結果、犯罪発生率が50%以上減少するという成果を収めています。＞"
42110-191 = "＜カイザーセキュリティは、D.U.の平和と社会正義の実現をお約束いたします。＞"
42110-192 = "……平和だな。"
42110-193 = "あはは……そう、ですね……"
42110-197 = "……カヤ代行が提示したシャーレの改善案を断ったという噂を耳にしました。"
42110-198 = "詳細は知りませんが、先生にとって悪い提案ではなかったと聞いておりますが……"
42110-199 = "それでも断ったのは――先生の信念に関わるからでしょうか？"
42110-203 = "[ns] \"……そうだね。\""
42110-204 = "……そうですか。#n信念を貫く事も、大切ですからね。"
42110-205 = "ですが、彼女は野心家です。断った結果、厄介事に発展するかもしれません。それは先生もよくご存知ではないかと。"
42110-206 = "[s] \"カンナも、自分の信念に従って私を助けてくれたよね？\""
42110-207 = "それは……"
42110-212 = "……そうですね。"
42110-213 = "[s7] \"……あの時の怪我はもう大丈夫？\"\n[s8] \"今はもう、仕事に復帰しているの？\""
42110-214 = "はい、お陰様で。"
42110-218 = "結論から申し上げますと――"
42110-222 = "結論から申し上げますと――"
42110-230 = "私はもう、公安局長ではありません。"
42110-231 = "厳密に言えば――懲戒停職の上、役職を剥奪された、というのが正しいでしょうか。"
42110-232 = "[s] \"もしかして、私のせいで――\""
42110-233 = "ご心配なく。先生のせいではありませんよ。"
42110-234 = "非常事態とはいえ、誰よりも厳正でなければならない公安局の局長が、#n私的判断で上官の命令に不服を申し立て、敵対したのですから。"
42110-235 = "例えその判断が正しかったとしても、責任から逃れることはできません。そもそも規則というのは、例外を許せば許すほど、悪用されてしまうものです。"
42110-236 = "これは、私が信念を貫いた代償ですので。処罰としては妥当なのですよ。#nむしろ、最初の覚悟と比べたら軽すぎるほど……"
42110-238 = "ですが……"
42110-244 = "私の処罰を軽くするためなのか、公安局の生徒が上層部の指示に反抗しておりまして……公安局は現在、本来の機能を果たせない状態に陥っています。"
42110-245 = "カヤ代行が民間企業の力を借りる事になったのも、それが原因かと。"
42110-246 = "カイザーセキュリティは、公安局以上に優秀で合理的な組織ですので。"
42110-247 = "きっと彼らなら規則を遵守し、揺らぐ事なくキヴォトスの平和を守り抜くことができるでしょう。"
42110-251 = "……懸念があるとすれば。"
42110-262 = "犯罪を防ぐために様々な規制が強くなり、路地は鼠一匹通れないほどにガードが目を光らせています。"
42110-263 = "カイザーコーポレーションを除く企業の活動は縮小し、#n市民はカイザーの目を気にして外出を控えているこの状況……"
42110-264 = "犯罪予防のためとはいえ……果たしてこのままで良いのでしょうか。"
42110-267 = "……私にはもう、何も分かりません。"
42110-268 = "――どうか、私の判断が間違っていなかったことを祈るばかりです。"
42110-269 = "[s] \"うん。ただ、カンナは自分のやるべき事をやっただけだよ。\""
42110-270 = "やるべき事……そんな事はありません。#nそのように高尚なものでは――"
42110-271 = "私は、ただの三流悪党に過ぎませんから。"
42110-272 = "舞台から早く降りるべきだったのに、退場するタイミングを逃してしまっただけの――"
42110-273 = "か、カンナ局長は三流悪党なんかじゃありません！"
42110-274 = "……キリノ？"
42110-275 = "局長は射撃が上手で、書類仕事だって完璧ですし、#nいつも市民に優しいじゃないですか……！"
42110-277 = "ヴァルキューレ生の憧れである局長が三流だなんて……#n他の誰が認めたって、本官は絶対に認めません！"
42110-278 = "カンナ局長みたいな素晴らしい警察学生になるために、本官は日々欠かさず射撃訓練に励んでいるのですよ！ご自身の事をそんな風に言わないでください！"
42110-284 = "何を言い出すのかと思ったら……"
42110-285 = "残念ながら、貴官が毎日射撃訓練に励んでも、私のようにはなれないぞ。"
42110-287 = "そ、そんなぁ～"
42110-288 = "……だが、それは私も同じだ。"
42110-292 = "私がいくら努力したとしても、貴官のように市民から信頼される優秀な生活安全局員にはなれないだろう。"
42110-293 = "貴官には貴官だけの強みがある。それを[ruby=ゆめゆめ]努々[/ruby]忘れないように。"
42110-294 = "カンナ局長……！"
42110-300 = "……カヤ連邦生徒会長代行は過ちを認めろ！認めろ！"
42110-301 = "連邦生徒会は週休5日を保障せよ！"
42110-302 = "要求を受け入れなければ、プリンを3つも食べちゃうぞ！"
42110-304 = "こいつら、一体どこから現れたんだ？"
42110-305 = "いくら捕まえてもキリがない！#nクソッこいつらの対応で検問が麻痺しちまう……！"
42110-306 = "支援、支援を要請する！"
42110-307 = "……どうやら、まだ私たちの力が必要なようですね。"
42110-311 = "キリノ、そろそろ行くぞ。"
42110-312 = "治安管理業務がカイザーセキュリティに移管したとはいえ、#n警察学校の生徒である以上、市内の混乱を見過ごすわけにはいかない。"
42110-313 = "は、はいっ！"
42110-314 = "……それでは先生、またどこかで。"
42110-315 = "ドーナッツごちそうさまでした、[USERNAME]先生！"
42110-323 = "（コーヒーを飲み干して、RABBIT小隊がいる子ウサギ公園に向かった） "
42110-325 = "次回;決心"

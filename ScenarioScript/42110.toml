[translation]
42110-1 = "Episode 11; Black Coffee"
42110-2 = "Near Kousagi Station"
42110-3 = "The next day, while making my way through the city to meet with the RABBIT Squad..."
42110-7 = "I said no! Shouldn't a Valkyrie student know the rules?"
42110-8 = "This individual isn't suspicious! They live in the neighborhood!"
42110-9 = "Just yesterday, I talked to them about egg prices in front of the station, as I often do!"
42110-10 = "I'll take full responsibility if anything happens. Can't you just let them through?"
42110-11 = "We can't subvert the law because some kid says a suspicious individual is okay. If you disagree with the protocol, take it up with the right department."
42110-12 = "If Valkyrie students aren't able to protect and ensure the safety of the citizens... Then, who is?"
42110-17 = "Ugh! Argh!"
42110-18 = "[s] \"...Mind explaining the situation here?\""
42110-23 = "Thank goodness! Sensei!"
42110-24 = "Tsk. Schale's Sensei."
42110-25 = "This citizen is from this neighborhood! They needed to use the subway to get to their doctor's appointment."
42110-26 = "But then this Kaiser Security guard blocked our way, saying that regulations had changed and started doing this inspection!"
42110-27 = "We're just following protocol. Regulations allow us unilateral authority to perform routine inspections at any time."
42110-28 = "With the recent changes in the student council, there have been a rise in the number of terror threats."
42110-29 = "In accordance with the new Administrative Order for D.U. Public Transportation Safety, citizens entering the subway need a round-trip ticket, ticket receipt, government transit permit, a subway map, and a copy of their D.U. city library record."
42110-30 = "[s1] \"...I didn't realize it took so much paperwork to access public transportation.\" \n[s2] \"...I fail to see how a borrowing record impacts their ability to sit on a train.\""
42110-31 = "It's a new measure enacted by the interim General Student Council for a safer Kivotos. We thank you for your continued cooperation."
42110-32 = "If a book isn't returned because someone's in another district for too long, it'd be quite the hassle for our librarians."
42110-33 = "It's a new measure enacted by the interim General Student Council for a safer Kivotos. We thank you for your continued cooperation."
42110-35 = "But I only have my ticket. I-I had no idea I'd need so many documents for the subway."
42110-36 = "Borrowing records? Why, I haven't borrowed from the city library in...well, I can't even remember how long!"
42110-37 = "No documents, no entry."
42110-38 = "If you can't produce the required documents, find another way to your appointment."
42110-39 = "But there aren't any buses... Sh-Should I walk? It's about an hour walk to the hospital..."
42110-43 = "Ugh... I don't know if my stomach can take that..."
42110-45 = "This is clearly a medical emergency! Getting him to the hospital should be our top priority right now!"
42110-47 = "An individual's personal circumstances are not an excuse for noncompliance."
42110-53 = "We provided citizens ample notice about the new policies before they were enacted."
42110-54 = "It is the citizens' responsibility to obey the law, regardless of any inconveniences to themselves."
42110-56 = "Did I hear you correctly just now?"
42110-57 = "Do you have an issue with what I said?"
42110-58 = "Are you, a Valkyrie Police School student, attempting to undermine the authority of Kaiser Security, granted by none other than Acting President Kaya?"
42110-59 = "Tsk, tsk. I can already see the headlines. \"Valkyrie student goes on a rampage downtown! Can the Police School still be trusted?!\""
42110-60 = "I never wanted a fight, but if this is how you choose to conduct yourself..."
42110-61 = "[s] \"Kirino! Stop–\""
42110-66 = "We all fancy a ride on the subway tonight?"
42110-74 = "If the issue here is paperwork, I might be able to assist."
42110-76 = "...Director Kanna!"
42110-77 = "Do you intend to escort this civilian to the city office to retrieve the mandated paperwork?"
42110-79 = "Do I look like a tour guide to you? We can sort everything out here."
42110-83 = "Ticket receipts are electronic and sent automatically. Just check your email."
42110-87 = "O-Oh! It's right here in my spam folder, a receipt from the transportation department!"
42110-89 = "What's next? The transit permit? We've recently added a clause to include a grace period after these new policies were enacted. Valkyrie students have authority to give out interim permits while the grace period is active."
42110-93 = "The permit form, Kirino. Sign the bottom."
42110-94 = "Y-Yes, ma'am!"
42110-95 = "Let's see... You can get a subway map for free from the station."
42110-97 = "That just leaves the library record."
42110-99 = "The D.U city library automatically gets rid of any borrowing records that haven't shown activity for two or more years."
42110-103 = "This citizen fits that category, which exempts him from that requirement."
42110-104 = "Are we good, then?"
42110-108 = "...It appears so. Proceed."
42110-110 = "Thank you so much! I'll never forget this!"
42110-117 = "Ugh, back for one day and already up to my neck in work..."
42110-119 = "That was amazing, Director Kanna! Thank you so much! If it weren't for you, that citizen—"
42110-124 = "Nakatsukasa Kirino!"
42110-129 = "M-Ma'am?!"
42110-130 = "What were you thinking putting your hand on your weapon?"
42110-131 = "You ran into some Kaiser Security guards who wouldn't listen to you, so your first instinct was to open fire in the middle of the city?"
42110-132 = "N-No, Ma'am! Not at all!"
42110-133 = "I...I wasn't going to shoot! The guard refused to listen to reason, so my plan was to deploy a smoke grenade and help the civilian escape..."
42110-134 = "One smoke grenade against Kaiser Security guards armed with the best technology known to Kivotos?"
42110-135 = "I... I see your point..."
42110-136 = "You need to learn to think. Bureaucracy should always be your first–"
42110-142 = "What was all that commotion?"
42110-143 = "I heard a Valkyrie student picked a fight with a Kaiser guard and they really got into it."
42110-144 = "It must've been over one of the new regulations. I don't blame her, honestly."
42110-145 = "...Let's relocate somewhere more private."
42110-146 = "You owe me a cup of coffee for bailing you out there."
42110-147 = "Yes, ma'am! I'll get you ten cups, if you'd like!"
42110-148 = "There's a place nearby that has the fluffiest donuts too!"
42110-149 = "I don't like donuts, but I'll take the coffee."
42110-158 = "[ns3] \"3 coffees, please. And the chocolate donut set.\" \n[ns4] \"A coffee for me, and whatever they want.\""
42110-163 = "What's the occasion, Sensei? "
42110-164 = "I-I was supposed to pay for it..."
42110-165 = "[s5] \"A token of gratitude for our hardworking Valkyrie officers.\"\n[s6] \"As your teacher, I can at least do this much.\""
42110-170 = "The world might be flipped on its axis right now, but somehow you always manage to stay exactly the same, Sensei."
42110-177 = "Here you go! Three coffees and a chocolate donut set!"
42110-179 = "It looks delicious! The specialty donuts here are my favorite."
42110-180 = "Fubuki's the one who showed me this cafe! I love how well the donuts and coffee pair together."
42110-181 = "Since they use a bittersweet dark chocolate, when you have it at the same time as the coffee–"
42110-185 = "...Up until now, Kivotos has been protected by novices. The Valkyrie Police School officers are, at the end of the day, students who care more about finding the next best donut shop than public safety."
42110-189 = "Kaiser Security, on the other hand, has a team of seasoned former-PMC units on call at all times. We are prepared and capable of providing the best security technology can offer under any circumstances."
42110-190 = "In the D.U. alone, under the guidance of the acting student council president, Kaya, we have tightened security, established rigorous inspection points, and managed to cut down crime rates by a solid 50%."
42110-191 = "At Kaiser Security, our commitment is to restore peace and order in D.U."
42110-192 = "...Peace, huh? Sounds nice."
42110-193 = "Y-Yes, it does..."
42110-197 = "…Sensei, I heard you turned down Kaya's reform proposal."
42110-198 = "I didn't have time to look at it too closely, but you didn't have much to lose from it from what I could tell."
42110-199 = "Which leads me to believe the refusal is more principle-driven."
42110-203 = "[ns] \"...You've summed it up well.\""
42110-204 = "If it was just a simple, pacifying gesture, then, sure, go crazy with your principles or what-not."
42110-205 = "But I don't think I need to remind you that saying no to Kaya is never that simple. She's hardly one to ever let sleeping dogs lie."
42110-206 = "[s] \"Kanna, you acted on your principles when you helped me, didn't you?\""
42110-207 = "Well..."
42110-212 = "We all have to stick to our guns every once in a while, don't we?"
42110-213 = "[s7] \"Speaking of, I'm glad to see you up and about again.\" \n[s8] \"How are you doing? Are you cleared for the field again?\""
42110-214 = "Yes, thanks to you looking out for me."
42110-218 = "Okay. Cutting right to the chase…"
42110-222 = "More or less, but..."
42110-230 = "I've resigned my position as the Public Peace Bureau Director."
42110-231 = "To be more exact, I've been temporarily relieved of my position."
42110-232 = "[s] \"If it was retaliation for helping me...\""
42110-233 = "I can't have you taking responsibility for my decisions, Sensei."
42110-234 = "Regardless of the situation at the time, the department's director can't and shouldn't break protocol. Ever. Instead, I defied direct orders from my superiors and fought allies with hostile intent."
42110-235 = "Even if I made the right call in the end, I still have to hold myself accountable. The more we bend the rules, make exceptions, the easier it becomes for bad characters to manipulate them."
42110-236 = "I went into this knowing I'd have to pay the price, and I'm at peace with it. Honestly, I'm glad it wasn't worse."
42110-238 = "But there were things I didn't plan for..."
42110-244 = "A lot of Public Peace Bureau students followed and supported my insubordination. They met the same fate I did, and now we have no bureau providing security for the citizens."
42110-245 = "Which is also how Kaya was able to pivot D.U.'s security to Kaiser's control so smoothly."
42110-246 = "Kaiser is the largest and most successful corporation in Kivotos. They have means and experience well outside of what the Public Peace Bureau was able to provide."
42110-247 = "I trust they can maintain Kivotos' and police laws and regulations."
42110-251 = "But..."
42110-262 = "What does bother me is how tight these regulations have gotten and the massive increase in guards."
42110-263 = "Other companies, besides Kaiser Corporation, are pretty much sidelined. Citizens are staying indoors, afraid of the paramilitary-level forces that are marching through their neighborhoods."
42110-264 = "Sure, crime rates have gone down, but...do the ends justify the means here?"
42110-267 = "I have to admit, I haven't been sure of much these days."
42110-268 = "The only thing I can do is hope my decision wasn't the wrong one."
42110-269 = "[s] \"You made the call you thought was right. That's all that matters.\""
42110-270 = "You don't need to defend me."
42110-271 = "Everything the villain does in the story has to catch up to her eventually, right?"
42110-272 = "Honestly, I should have stepped down a long time ago. Now I’m not sure if I've lost my opportunity."
42110-273 = "Y-You're not some third-rate villain, Director Kanna!"
42110-274 = "...Kirino?"
42110-275 = "You have exceptional aim, your admin work is impeccable, and despite all your experience you still genuinely care..."
42110-277 = "I can't just sit around and listen to you talk down about yourself anymore! Not when so many of us at Valkyrie look up to you!"
42110-278 = "I train every day, hoping to be half as good as you one day, Director Kanna!"
42110-284 = "Sadly, Kirino..."
42110-285 = "You could train twice a day, every day, and you still wouldn't be a quarter as good as me."
42110-287 = "D-Director...! My heart!"
42110-288 = "...But I could say the same for myself."
42110-292 = "I could never become a member of the Public Safety Bureau and gained the faith and trust of the citizens like you have."
42110-293 = "You might be a lousy shot, but you've really proven yourself."
42110-294 = "D-Director Kanna!"
42110-300 = "...Down with Acting General Student Council President Kaya!"
42110-301 = "We deserve a two-day work week!"
42110-302 = "Cede to our demands, or I'll eat all your pudding!"
42110-304 = "Where did these guys come from?"
42110-305 = "No matter what we do, they just keep cropping up! Like flies! We can't do our jobs with them always in the way!"
42110-306 = "We need back up! Back up!"
42110-307 = "Time for work, Kirino."
42110-311 = "Let's go."
42110-312 = "It doesn't matter who's in charge of security, we still have our duty as Valkyrie students. We'll provide back-up."
42110-313 = "Yes, ma'am!"
42110-314 = "See you around, Sensei."
42110-315 = "Thank you for the donuts, [USERNAME] Sensei!"
42110-323 = "I finished my coffee and headed out to Kousagi Park to see the RABBIT Squad members."
42110-325 = "Next Episode;Determination"

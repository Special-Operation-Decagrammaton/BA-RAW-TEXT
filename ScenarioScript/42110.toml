[translation]
42110-1 = "第11話;黑咖啡"
42110-2 = "兔寶寶站附近"
42110-3 = "（隔天，為了和RABBIT小隊碰面而走在市區時……）"
42110-7 = "……不行就是不行！#n女武神的學生打算無視規定嗎？"
42110-8 = "這位不是什麼可疑人士，而是居住在這個地區的市民啊！"
42110-9 = "就連昨天都有在車站前和本官打招呼的……"
42110-10 = "要是出了什麼事的話本官會負責的，這次能不能網開一面呢……？"
42110-11 = "這不是一個學生的擔保就能解決的問題。#n如果對規定有疑慮，請你向負責人提出。"
42110-12 = "如果女武神的學生不能負責保障市民的安全，那究竟要由誰來負責呢？"
42110-17 = "嗚嗚，真對不起……"
42110-18 = "[s]「……發生什麼事了？」"
42110-23 = "啊，老師……！"
42110-24 = "……呿，是夏萊的老師啊。"
42110-25 = "那個……這位市民想搭電車去醫院……"
42110-26 = "但凱薩保全以「地下鐵的使用規定更改了」為由，封鎖了出口進行盤查……"
42110-27 = "有什麼問題嗎？#n我們只是依照規定對可疑人士進行盤查而已。"
42110-28 = "最近對新聯邦學生會長代理心懷不滿，企圖製造恐攻的不肖分子在各地都能看見。"
42110-29 = "因此，根據「維護D.U.大眾交通安全之新行政命令」──所有出入地鐵站的市民都必須向保全人員出示「往返車票」、「車資收據」、「通行許可證」、「地鐵路線圖」，#n以及「D.U.市立圖書館的借閱記錄影本」才能通行。"
42110-30 = "[s1]「……明明只是要搭地鐵而已？」\n[s2]「『圖書借閱記錄影本』又是為何……？」"
42110-31 = "所有規定都是聯邦學生會長代理為了打造安全舒適的奇普托斯而下達的指示。"
42110-32 = "如果尚未歸還向市立圖書館借的書就長期滯留在其他自治區，職員會很困擾的吧？"
42110-33 = "所有規定都是聯邦學生會長代理為了打造安全舒適的奇普托斯而下達的指示。"
42110-35 = "可，可是昨天以前只要有車票就行了啊……？#n我從來沒聽過搭個地鐵還需要這麼多文件。"
42110-36 = "就算要市立圖書館的借閱記錄……我都幾年沒去過圖書館了……"
42110-37 = "無法出示文件的話，就只能放棄進入車站了。"
42110-38 = "看是要備齊文件再來，還是考慮其他交通方式吧。"
42110-39 = "但是兔寶寶鎮的公車全都停駛了……#n走路到最近的醫院也要超過一個小時吧……"
42110-43 = "嗚……肚子越來越痛了……"
42110-45 = "這，這可是緊急狀況啊！#n不快點帶他去醫院的話──"
42110-47 = "市民生不生病跟我們有什麼關係？"
42110-53 = "新的行政命令之前就已經公告周知了吧？"
42110-54 = "你們這是在將自己怠慢的責任轉嫁給別人，我有說錯嗎？"
42110-56 = "……你剛才說什麼？"
42110-57 = "唉呦，你那是什麼表情？"
42110-58 = "聽命於防衛室指揮的女武神警察學園學生，#n要反抗我們受香耶代理全權委託的凱薩保全嗎？"
42110-59 = "要是女武神警察學園的學生這麼做的事傳開了，#n市民們會怎麼看待女武神呢？"
42110-60 = "本來不打算戰鬥的，但事到如今……"
42110-61 = "[s]「桐乃，等等──」"
42110-66 = "只要備齊文件就能通過這裡了對吧？"
42110-74 = "那麼──就交給我吧。"
42110-76 = "……環奈局長！"
42110-77 = "哼，你打算現在帶這位市民去一趟區公所嗎？"
42110-79 = "沒那個必要。#n因為那些文件立刻就能準備。"
42110-83 = "像是車資收據從上個月就已經電子化，應該已經能收到郵件了才對。#n請確認一下手機的信箱吧。"
42110-87 = "真，真的耶……收據寄過來了！"
42110-89 = "至於通行許可證，在行政命令公告後的緩衝期間內，#n有一條女武神警察學園的學生可以代替公所發放臨時許可證的附加條款──"
42110-93 = "──這就是許可證的表格。#n桐乃，麻煩在底下簽名。"
42110-94 = "是，是……！"
42110-95 = "地鐵路線圖會在車站免費發放。"
42110-97 = "……市立圖書館的圖書借閱記錄影本呢？"
42110-99 = "D.U.市立圖書館是不會發放圖書借閱記錄影本給長期非活躍用戶的。"
42110-103 = "這位市民已經超過2年沒有使用圖書館了，我想自然沒有出示這份文件的義務。"
42110-104 = "……這樣需要的文件都備齊了吧？"
42110-108 = "……呿，過去吧。"
42110-110 = "非，非常感謝……！"
42110-117 = "唉，才剛復職就全是麻煩事啊……"
42110-119 = "謝謝您，環奈局長！#n多虧有您才能成功幫助市民！"
42110-124 = "……中務桐乃！"
42110-129 = "是，是！？"
42110-130 = "你剛才把手放在武器上，到底打算做什麼？"
42110-131 = "只因為對方不聽從你的要求就打算在市區內開火嗎？"
42110-132 = "不，不是的！我絕對沒有那種打算！"
42110-133 = "只是……想用煙霧彈離開這裡，再掩護市民到車站的月台……"
42110-134 = "你以為配備重裝武器的凱薩保全警衛只需要區區煙霧彈就能擺脫嗎？"
42110-135 = "這，這麼說……也對……"
42110-136 = "這種時候就應該拜託其他部門──"
42110-142 = "咦？怎麼鬧哄哄的……？"
42110-143 = "凱薩保全的警衛好像在跟女武神警察學園的學生爭論……"
42110-144 = "是因為最近公布的行政命令嗎？#n規則雖然又多又麻煩，但居然在這裡起爭議……"
42110-145 = "……似乎越來越引人注目了，先換個地方吧。"
42110-146 = "替別人解決問題之後，突然有點想喝咖啡呢。"
42110-147 = "啊，那麼請交給本官吧！"
42110-148 = "這附近有間甜甜圈很好吃的咖啡廳！"
42110-149 = "甜甜圈無所……算了，走吧。"
42110-158 = "[ns3]「請給我三杯熱咖啡，」 \n[ns4]「還有巧克力甜甜圈套餐。」"
42110-163 = "……為什麼是老師在點餐？"
42110-164 = "這邊就由本官來……"
42110-165 = "[s5]「讓我也為辛苦的女武神學生盡一份力吧。」\n[s6]「這對大人來說不算什麼！」"
42110-170 = "……老師還是老樣子呢。"
42110-177 = "這邊是熱咖啡和巧克力甜甜圈套餐！"
42110-179 = "啊，來了呢。#n這裡的特製巧克力甜甜圈可是絕品哦！"
42110-180 = "這間店是吹雪介紹給我的，他們的巧克力甜甜圈真的很適合搭配咖啡……"
42110-181 = "微苦的巧克力在和咖啡一起品嘗時反而能引出微微的甜味──"
42110-185 = "「……凱薩保全和那些把維護治安拋在腦後，#n　到處吃著甜甜圈的女武神警察學園的怠惰之人不同。」"
42110-189 = "「我們有PMC出身的資深隊員常駐，#n　將基於豐富的作戰經驗，提供最佳的治安維護解決方案。」"
42110-190 = "「依照香耶新任聯邦學生會長代理的指示於D.U.加強治安、四處盤查的結果，#n　犯罪率降低了50%以上。」"
42110-191 = "「我們凱薩保全承諾，將實現D.U.的和平及社會正義。」"
42110-192 = "……真和平啊。"
42110-193 = "就，就是說啊……"
42110-197 = "……聽說您拒絕了香耶代理提出的夏萊改善方案。"
42110-198 = "雖然不清楚詳情，我聽說那對老師而言似乎是個不錯的提議……"
42110-199 = "依然拒絕的原因──與老師的信念有關嗎？"
42110-203 = "[ns]「……沒錯。」"
42110-204 = "如果實在好得不合常理，偶爾為了信念而推辭倒也無妨。"
42110-205 = "但他是名野心家，拒絕他的提議或許會發展出一些麻煩事。#n我想老師應該也相當清楚吧。"
42110-206 = "[s]「環奈也同樣遵從自己的信念幫助過我，不是嗎？」"
42110-207 = "這……"
42110-212 = "……確實如此呢。"
42110-213 = "[s7]「……當時的傷已經痊癒了嗎？」\n[s8]「現在已經回到工作崗位了嗎？」"
42110-214 = "是的，這都多虧了您。"
42110-218 = "從結論來說──"
42110-222 = "從結論來說──"
42110-230 = "我已經不再是公安局長了。"
42110-231 = "準確來說……是在懲戒停職後被剝奪了職務，或許比較正確。"
42110-232 = "[s]「該不會是因為我──」"
42110-233 = "請別擔心。不是老師的錯。"
42110-234 = "雖說是緊急狀況，但應當比任何人都公正嚴謹的公安局局長，#n卻因為個人的判斷而不服從上級的命令、與我方敵對。"
42110-235 = "就算判斷是正確的也不能擺脫責任。#n規則如果允許越多例外，就越容易遭到濫用。"
42110-236 = "這是我貫徹信念的代價，作為懲處並無不妥。#n和我當初的覺悟相比，反而過於輕微了……"
42110-238 = "但是……"
42110-244 = "或許是為了減輕我的處罰，公安局的學生也反抗了上層的指示……#n導致目前公安局陷入無法發揮原有機能的狀態。"
42110-245 = "香耶代理之所以會借助民間企業的力量維護D.U.的治安，恐怕也是這個原因吧。"
42110-246 = "凱薩保全是個比公安局更加優秀且合理的組織。"
42110-247 = "他們一定會遵守規定，毫不動搖地守護奇普托斯的和平吧。"
42110-251 = "……要說有什麼懸念的話。"
42110-262 = "許多的規定都為了預防犯罪而被強化，守衛的視線嚴密到了滴水不漏的程度。"
42110-263 = "除了凱薩公司之外的企業活動都遭到縮減，#n市民們由於在意凱薩的目光減少外出的這個情況……"
42110-264 = "雖說是為了預防犯罪……但這麼做真的好嗎？"
42110-267 = "……我已經搞不清楚了。"
42110-268 = "只能祈求──我的判斷是正確的而已。"
42110-269 = "[s]「環奈只是做了該做的事情而已。」"
42110-270 = "該做的事……不是的。#n並不是那麼高尚的──"
42110-271 = "我只不過是個三流反派罷了。"
42110-272 = "明明早該離開舞台，卻錯過了退場時機的──"
42110-273 = "環，環奈局長才不是三流反派！"
42110-274 = "……桐乃？"
42110-275 = "局長不僅擅長射擊，文書作業更是一絲不苟，#n而且總是對市民們非常親切不是嗎……！"
42110-277 = "女武神的學生都相當崇拜的局長是三流什麼的，#n即使其他人這麼認為，本官也絕對不會認同！"
42110-278 = "就連本官也是為了成為跟環奈局長一樣優秀的警察學生，#n才會日復一日努力練習射擊的！"
42110-284 = "還以為你要說什麼呢……"
42110-285 = "很遺憾，你就算每天努力練習射擊，也無法像我一樣的。"
42110-287 = "怎，怎麼會～"
42110-288 = "……不過，這點我也是一樣。"
42110-292 = "無論我再怎麼努力，也不可能成為像你一樣深受市民信賴的優秀生活安全局員吧。"
42110-293 = "你有著只屬於你的優點，不必妄自菲薄。"
42110-294 = "環奈局長……！"
42110-300 = "……香耶聯邦學生會長代理快承認錯誤吧！承認吧！"
42110-301 = "要求聯邦學生會保障週休5日！"
42110-302 = "不接受要求的話，我就吃掉三個布丁給你們看！"
42110-304 = "這些傢伙到底是從哪裡冒出來的啊？"
42110-305 = "不管怎麼抓都抓不完！#n光是處理這些人，檢查站都要癱瘓了……！"
42110-306 = "支援，請求支援！"
42110-307 = "……看來似乎還需要我們的力量呢。"
42110-311 = "桐乃，我們差不多該走了。"
42110-312 = "雖然治安管理工作已經移交給凱薩保全，#n但既然身為警察學校的學生，我們可不能對市區內的混亂視而不見。"
42110-313 = "是，是！"
42110-314 = "……那麼老師，後會有期。"
42110-315 = "謝謝您招待的甜甜圈，[USERNAME]老師！"
42110-323 = "（喝完咖啡後，前往了RABBIT小隊所在的兔寶寶公園）"
42110-325 = "下一話;決心"

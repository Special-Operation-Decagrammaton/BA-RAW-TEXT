[translation]
42110-1 = "ตอนที่ 11;แบล็กคอฟฟี่"
42110-2 = "แถวสถานีโคะอุซางิ"
42110-3 = "(วันต่อมา คุณครูมุ่งหน้าไปในเมืองเพื่อเจอกับกองทหาร RABBIT)"
42110-7 = "... ไม่ได้ก็ไม่ได้สิ! เป็นนักเรียนวัลคิรี่ทั้งที แต่จะไม่ทำตามกฎงั้นเรอะ?"
42110-8 = "แต่คนคนนี้ไม่ใช่คนน่าสงสัยนะคะ เขาเป็นชาวเมืองที่อาศัยอยู่ที่นี่ต่างหากค่ะ!"
42110-9 = "เมื่อวานเรายังทักทายกันตามปกติตรงหน้าสถานีอยู่เลย..."
42110-10 = "ถ้ามีเรื่องอะไรเกิดขึ้นฉันจะรับผิดชอบเองค่ะ ช่วยปล่อยตัวเขาไปจะได้หรือเปล่าคะ...?"
42110-11 = "นี่ไม่ใช่ปัญหาที่ปล่อยผ่านได้เพียงเพราะมีนักเรียนคนเดียวมารับประกันให้หรอกนะ ถ้าเธอมีข้อคัดค้าน#nกับกฎนี้ ก็ไปถามจากผู้รับผิดชอบที่เกี่ยวข้องซะสิ"
42110-12 = "ก็แล้วถ้าการรับประกันความปลอดภัยของชาวเมืองไม่ใช่หน้าที่ของนักเรียนวัลคิรี่ แล้วจะเป็นหน้าที่ของ#nใครล่ะคะ?"
42110-17 = "อะ... เอ่อ..."
42110-18 = "[s] \"... มีเรื่องอะไรเหรอ?\""
42110-23 = "อ๊ะ คุณครู...!"
42110-24 = "... ฮึ่ย ครูจากชาเล่ต์งั้นเรอะ"
42110-25 = "พอดีว่าชาวเมืองคนนี้จะมาขึ้นรถไฟใต้ดินไปโรงพยาบาลน่ะค่ะ..."
42110-26 = "แต่จู่ๆ ทางไคเซอร์ ซิเคียวริตี้ก็บอกว่ามีการเปลี่ยนกฎการใช้งานรถไฟใต้ดิน แล้วก็มาตั้งด่านตรวจปิด#nทางเข้าด้วย แบบนี้มันเกินไปใช่ไหมคะ?!"
42110-27 = "แล้วมันเป็นปัญหาตรงไหน? พวกฉันก็แค่มาตรวจค้นผู้อาศัยตามกฎระเบียบก็เท่านั้น"
42110-28 = "หมู่นี้มีคนน่าสงสัยหลายคนที่คิดจะก่อการร้ายเพราะไม่พอใจกับคณะทำงานของรักษาการแทนประธาน#nองค์การนักเรียนคนใหม่น่ะ เลยมี <คำสั่งบริหารฉบับใหม่เพื่อความปลอดภัยในการขนส่งสาธารณะ> ระบุไว้ว่า"
42110-29 = "ชาวเมืองทุกคนที่พักอาศัยหรือเข้าออกสถานีรถไฟใต้ดินจะต้องแสดงตั๋วโดยสารไปกลับ ใบเสร็จค่า#nโดยสาร ใบอนุญาตการเดินทางที่ออกโดยทางการ แผนผังเส้นทางรถไฟใต้ดิน และสำเนาบันทึกการยืม#nหนังสือจากห้องสมุดสาธารณะ D.U. แก่เจ้าหน้าที่ของไคเซอร์ ซิเคียวริตี้"
42110-30 = "[s1] \"แค่นั่งรถไฟใต้ดิน ต้องใช้หลักฐานอะไรขนาดนั้นเลยเหรอ?\"\n[s2] \"สำเนาบันทึกการยืมหนังสือเกี่ยวอะไรด้วย...?\""
42110-31 = "นโยบายทั้งหมดนี้เป็นคำสั่งของรักษาการแทนประธานองค์การนักเรียนเพื่อการสร้างคิโวทอส#nที่ปลอดภัยและสะอาด ดังนั้นทุกคนควรให้ความร่วมมืออย่างเคร่งครัด"
42110-32 = "หากไม่คืนหนังสือที่ยืมมาจากห้องสมุดสาธารณะแล้วเอาไปทิ้งไว้ในเขตปกครองอื่นเป็นเวลานาน เจ้าหน้าที่ห้องสมุดก็จะต้องมาตามเก็บไงล่ะ"
42110-33 = "นโยบายทั้งหมดนี้เป็นคำสั่งของรักษาการแทนประธานองค์การนักเรียนเพื่อการสร้างคิโวทอส#nที่ปลอดภัยและสะอาด ดังนั้นทุกคนควรให้ความร่วมมืออย่างเคร่งครัด"
42110-35 = "ตะ... แต่ว่าผมมีแค่ตั๋วโดยสารติดตัวมา... อย่างอื่นไม่มีหรอกครับ ผมไม่รู้ว่าการขึ้นรถไฟใต้ดินจะต้องใช้#nเอกสารมากมายขนาดนั้นน่ะ"
42110-36 = "ส่วนบันทึกการยืมหนังสือจากห้องสมุดสาธารณะ ผมไม่ได้ไปใช้บริการห้องสมุดมา 2-3 ปีแล้ว..."
42110-37 = "บอกไปแล้วไงว่าถ้าไม่ยื่นเอกสารที่ชอบด้วยกฎหมาย ก็จะไม่ได้รับอนุญาตให้ใช้บริการในสถานีได้"
42110-38 = "ถ้าอยากใช้รถไฟใต้ดิน ก็กลับไปเอาบัตรประจำตัวมา หรือไม่ก็ไปใช้การคมนาคมแบบอื่นเอา"
42110-39 = "แต่รถที่ไปถึงโคะอุซางิ ทาวน์ก็หมดแล้ว... จะให้เดินไปโรงพยาบาลที่ใกล้ที่สุดก็คงกินเวลาเป็นชั่วโมง#nอยู่ดี..."
42110-43 = "โอ๊ย... เริ่มปวดท้องขึ้นมาอีกแล้ว..."
42110-45 = "นะ... นี่มันสถานการณ์เร่งด่วนนะคะ! ถ้าไม่รีบพาเขาไปโรงพยาบาลละก็..."
42110-47 = "ชาวเมืองเจ็บป่วยแล้วมันเกี่ยวอะไรกับพวกเราด้วยล่ะ?"
42110-53 = "เราประกาศเรื่องคำสั่งบริหารฉบับใหม่ให้ชาวเมืองรู้ตั้งแต่เมื่อวานแล้ว"
42110-54 = "ถ้ารู้แล้วก็ยังคิดจะฝ่าฝืนกฎ ก็ต้องรับผิดชอบตัวเองสิ หรือว่าไม่ใช่?"
42110-56 = "...... ว่ายังไงนะคะ?"
42110-57 = "ทำหน้าแบบนั้น มีปัญหาอะไรงั้นเหรอ?"
42110-58 = "นักเรียนจากสถาบันฝึกตำรวจวัลคิรี่ที่รับคำสั่งแค่จากสำนักป้องกัน คิดจะมาหาเรื่องไคเซอร์ ซิเคียวริตี้ ที่ได้รับอำนาจเต็มที่จากรักษาการฯ คายะงั้นเหรอ?"
42110-59 = "ถ้าเรื่องที่ว่านักเรียนจากสถาบันฝึกตำรวจวัลคิรี่ไม่ปฏิบัติตามคำสั่งและเที่ยวมาหาเรื่องต่อสู้กับคนอื่น#nแบบนี้แพร่กระจายออกไปละก็ ชาวเมืองคนอื่นจะมองนักเรียนวัลคิรี่ยังไงกัน!"
42110-60 = "ฉันไม่มีความคิดที่จะต่อสู้หรอกนะคะ แต่ในเมื่อเป็นแบบนี้แล้ว..."
42110-61 = "[s] \"เดี๋ยวก่อน คิริโนะ...!\""
42110-66 = "ถ้าไปขอเอกสารที่จำเป็น ก็จะให้ขึ้นรถไฟใต้ดินได้ใช่ไหม?"
42110-74 = "ถ้าเป็นเรื่องนั้น ฉันน่าจะพอช่วยได้อยู่นะ"
42110-76 = "... หัวหน้ากรมฯ คันนะ!"
42110-77 = "ไปขอเอกสารงั้นเหรอ... หรือว่าคิดจะพาชาวเมืองคนนี้ไปสำนักงานเขตด้วยตัวเอง?"
42110-79 = "ไม่น่าจะต้องไปถึงที่นั่นนะ เอกสารทุกอย่างที่พูดมาเมื่อกี้ ฉันเขียนตรงนี้ให้ได้เลย"
42110-83 = "กรณีใบเสร็จค่าโดยสาร เนื่องจากระบบคอมพิวเตอร์ของเราเสร็จสมบูรณ์ตั้งแต่เดือนที่แล้วก็เลยมีการ#nเปลี่ยนกฎให้ผู้โดยสารที่ยังไม่ได้รับใบเสร็จสามารถขอรับทางอีเมล์ได้ งั้นคุณก็ตรวจสอบอีเมล์จากใน#nโทรศัพท์ได้เลย"
42110-87 = "จะ... จริงด้วยนะครับ... มีใบเสร็จจากฝ่ายคมนาคมส่งมาให้ในกล่องจดหมายสแปมด้วย"
42110-89 = "ส่วนใบอนุญาตการเดินทางก็มีระเบียบเพิ่มเติมหลังจากประกาศคำสั่งบริหารว่า ในระยะเวลาผ่อนผัน สามารถให้นักเรียนจากสถาบันฝึกตำรวจวัลคิรี่เขียนใบอนุญาตชั่วคราวให้ได้"
42110-93 = "... นี่แบบฟอร์มใบอนุญาต เอาไปเซ็นชื่อข้างล่างได้เลย คิริโนะ"
42110-94 = "ค่ะ ค่ะ...!"
42110-95 = "ส่วนแผนผังเส้นทางรถไฟใต้ดิน ก็ไปเอาที่วางแจกไว้ในอาคารสถานีรถไฟได้..."
42110-97 = "... แล้วสำเนาบันทึกการยืมหนังสือจากห้องสมุดสาธารณะล่ะ?"
42110-99 = "ห้องสมุดสาธารณะ D.U. จะไม่ออกสำเนาบันทึกการยืมหนังสือให้ผู้ใช้บริการที่ไม่ได้เข้าไปใช้บริการ#nเป็นเวลานาน"
42110-103 = "ชาวเมืองคนนี้ไม่ได้เข้ามาใช้บริการห้องสมุดเกิน 2 ปีแล้ว เห็นทีจะไม่ต้องยื่นหนังสือสำเนาอะไรนี่นะ"
42110-104 = "... เอาละ ทีนี้ก็น่าจะได้เอกสารที่ต้องการครบแล้วใช่ไหม?"
42110-108 = "... ชิ เข้าไปได้"
42110-110 = "ขะ... ขอบคุณครับ...!"
42110-117 = "เฮ้อ ตั้งแต่กลับมาก็ต้องมาเจอเรื่องยุ่งยากเต็มไปหมดเลยแฮะ..."
42110-119 = "ขอบคุณนะคะ หัวหน้ากรมฯ คันนะ! ขอบคุณที่ช่วยชาวเมืองที่ตกอยู่ในสถานการณ์ลำบากนะคะ!"
42110-124 = "... นาคัตสึคาสะ คิริโนะ!"
42110-129 = "คะ... คะ?!"
42110-130 = "เมื่อกี้จะหยิบอาวุธขึ้นมาทำอะไรน่ะ?"
42110-131 = "คิดจะยิงปืนในเมืองเพราะการ์ดของไคเซอร์ ซิเคียวริตี้ไม่ยอมรับฟังสิ่งที่ชาวเมืองต้องการงั้นเหรอ?"
42110-132 = "มะ... ไม่นะคะ! ฉันไม่คิดจะทำแบบนั้นหรอกค่ะ!"
42110-133 = "ฉันแค่รู้สึกว่าเราคุยกันไม่รู้เรื่อง ก็เลยจะใช้ระเบิดควันบดบังทัศนวิสัยของการ์ด แล้วระหว่างนั้นก็ค่อย#nพาชาวเมืองไปที่ชานชาลาน่ะค่ะ..."
42110-134 = "นั่นเป็นถึงการ์ดของไคเซอร์ ซิเคียวริตี้ที่ติดอาวุธหนักเลยนะ คิดว่าอีแค่ระเบิดควันจะทำให้เขาสับสน แล้วปล่อยให้ฝ่ายตรงข้ามหนีไปเฉยๆ งั้นเหรอ?"
42110-135 = "นะ... นั่นสินะคะ..."
42110-136 = "ในเวลาแบบนี้ควรจะขอความช่วยเหลือจากหน่วยอื่นมากกว่า..."
42110-142 = "หืม? เกิดเรื่องวุ่นวายอะไรน่ะ...?"
42110-143 = "เหมือนว่าการ์ดของไคเซอร์ ซิเคียวริตี้กับนักเรียนสถาบันฝึกตำรวจวัลคิรี่จะกำลังเถียงกันอยู่เลยนะ"
42110-144 = "เพราะคำสั่งบริหารที่บังคับใช้ล่าสุดหรือเปล่านะ? ได้ยินมาว่ามีกฏเยอะจนรำคาญใจเลยละ..."
42110-145 = "... มีสายตาผู้คนกำลังจับจ้องเราอยู่ ไปคุยกันที่อื่นเถอะ"
42110-146 = "ฉันขอกาแฟสักแก้วเป็นค่าตอบแทนที่มาช่วยงานที่มันเกิดจากความผิดพลาดแล้วกัน"
42110-147 = "อ้อ ถ้าเรื่องนั้นหายห่วงได้เลยค่ะ!"
42110-148 = "แถวนี้มีคาเฟ่ร้านหนึ่งที่ขายโดนัทอร่อยๆ ด้วยค่ะ!"
42110-149 = "โดนัทไม่ต้องเอาก็ได้... เอาเป็นว่า ย้ายที่ก่อนเถอะ"
42110-158 = "[ns3] \"ขอกาแฟโต๊ะนี้ 3 แก้ว\" \n[ns3] \"แล้วก็โดนัทช็อกโกแลต 3 เซ็ตด้วย\""
42110-163 = "... ทำไมคุณครูถึงเป็นคนซื้อล่ะคะ? "
42110-164 = "ฉันกะว่าจะเป็นคนเลี้ยงแท้ๆ..."
42110-165 = "[s5] \"นักเรียนวัลคิรี่ทำงานกันหนักขนาดนี้ ให้ครูได้เป็นเจ้ามือเถอะนะ\"\n[s6] \"สำหรับผู้ใหญ่แล้ว แค่นี้ไม่เท่าไรหรอก!\""
42110-170 = "คุณครูเนี่ย เหมือนเดิมไม่เปลี่ยนเลยนะคะ"
42110-177 = "กาแฟและเซ็ตโดนัทช็อกโกแลตได้แล้วครับ!"
42110-179 = "อ๊ะ ของที่สั่งได้แล้วค่ะ โดนัทช็อกโกแลตสูตรพิเศษของร้านนี้!"
42110-180 = "ฉันรู้จักโดนัทนี้เพราะฟุบุกิแนะนำมาอีกทีค่ะ โดนัทช็อกโกแลตของร้านนี้เข้ากับกาแฟมากเลยค่ะ"
42110-181 = "ดาร์กช็อกโกแลตที่เคลือบมามันเข้ากับกลิ่นกาแฟได้ดีสุดๆ..."
42110-185 = "<... พวกเราไม่เหมือนกับเด็กขี้เกียจจากสถาบันฝึกตำรวจวัลคิรี่ที่เอาแต่หาโดนัทกิน โดยไม่สนใจความ#nสงบเรียบร้อยของเมือง>"
42110-189 = "<ไคเซอร์ ซิเคียวริตี้ของเรามีเจ้าหน้าที่ผู้เชี่ยวชาญจาก PMC ที่มีประสบการณ์จากปฏิบัติการที่หลาก#nหลาย เรามากับแนวทางในการจัดการความสงบเรียบร้อยของเมือง>"
42110-190 = "<จากคำสั่งในการเพิ่มความเข้มงวดในการจัดการความสงบเรียบร้อยใน D.U. ของรักษาการแทนฯ คายะ พบว่าอัตราการเกิดอาชญากรรมลดลงมากกว่า 50%>"
42110-191 = "<ไคเซอร์ ซิเคียวริตี้ขอสัญญาว่าจะสร้างสันติภาพและความยุติธรรมใน D.U. ให้ได้>"
42110-192 = "... ดีจังเลยนะที่บ้านเมืองสงบดี"
42110-193 = "สะ... สงบดีนะคะ..."
42110-197 = "... ฉันได้ยินมาว่าคุณครูปฏิเสธแผนปรับปรุงขั้นตอนการบริหารฉบับใหม่ของรักษาการฯ คายะค่ะ"
42110-198 = "ฉันไม่ได้อ่านแผนปรับปรุงนั้นอย่างละเอียดหรอกค่ะ แต่สำหรับคุณครูแล้ว มันไม่น่าจะเป็นข้อเสนอที่ไม่#nดีนะคะ..."
42110-199 = "เหตุผลที่ปฏิเสธ เป็นเพราะอุดมการณ์ที่คุณครูมีหรือเปล่าคะ"

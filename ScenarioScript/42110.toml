42110-35 = "3;퍼그 시민;00;하, 하지만 승차권 이외에는 말씀하신 서류는 갖고 있지 않은 걸요……? 지하철 이용에 이렇게 많은 서류가 필요할 거라고는 생각지도 못했어요.\n#3;stiff"

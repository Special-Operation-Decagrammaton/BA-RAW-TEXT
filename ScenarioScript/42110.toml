42110-28 = "1;카이저 시큐리티 가드;00;최근 신규 총학생회장 대행의 내각에 불만을 갖고 테러를 저지르려는 불순분자들이 곳곳에서 크게 늘어났거든.\n#1;m3\n#5;dr"
42110-29 = "1;카이저 시큐리티 가드;00;<D.U.의 대중교통 안전을 위한 신규 행정명령>에 의거, 지하철 역사에 출입하는 모든 시민은 '왕복 승차권', '운임 영수증', '관청의 통행 허가증', '지하철 노선도', 그리고 'D.U. 시립 도서관의 도서 대출 기록 사본'을 시큐리티 가드에게 보여주어야 한다."
42110-30 = "[s1] \"……지하철 이용에 그렇게 많은 서류가 필요해?\"\n[s2] \"'도서 대출 기록 사본'은 어째서……?\""
42110-31 = "1;카이저 시큐리티 가드;00;이 모든 정책은 안전하고 깨끗한 키보토스를 만들기 위한 총학생회장 대행의 지시이므로 모두 적극 협조하도록."
42110-32 = "1;카이저 시큐리티 가드;00;시립 도서관에서 빌린 책을 반납하지 않고 다른 자치구에 장기 체류하게 된다면 도서관 직원들이 곤란할 수도 있으니까.\n#1;em;…"

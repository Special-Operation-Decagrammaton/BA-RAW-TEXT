10035020-120 = "เดินลงบันไดไป"
10035020-121 = "วะ... ว่าไงนะ? เล่นไม่ได้เหรอ?"
10035020-122 = "ฉันรอมาตั้งหนึ่งชั่วโมงเลยนะ แต่พอมาแล้วก็บอกว่าขึ้นสไลเดอร์ไม่ได้งั้นเหรอ!"
10035020-126 = "ตามคู่มือแล้ว..."
10035020-127 = "'อควา บอบสเลจ์' เป็นสไลเดอร์ความเร็วสูงที่มีความเสี่ยงที่จะเกิดอุบัติเหตุด้านความปลอดภัย ผู้ที่มีความสูงผ่านเกณฑ์ที่กำหนดเท่านั้นที่สามารถเล่นได้"
10035020-128 = "ถ้าลูกค้าอยากเล่น ยังไงก็ต้องยอมให้เล่นสิ ฉันจ่ายเงินมาแล้วนะ!"
10035020-129 = "ไปเรียกเจ้าของสวนน้ำมาเลย!"
10035020-130 = "อ๊ะ! อย่าโวยวายบนนี้สิคะ แล้วก็ยืนดีๆ ด้วยค่ะ มันอันตรายนะคะ!"
10035020-131 = "คุณลูกค้าคะ! ใจเย็นๆ ก่อนนะคะ!"
10035020-132 = "ว้าย! ดิ้นแบบนี้มันอันตรายนะ!"
10035020-133 = "เดี๋ยวก็ตกลงไปหรอก!"
10035020-134 = "งั้นก็ให้ฉันลงสไลเดอร์สิ!"
10035020-140 = "โอ๊ยยยย! เจ็บนะ!"
10035020-141 = "อยู่เฉยๆ ไปเลย"
10035020-142 = "ดะ... โดนคุมตัวจนได้..."
10035020-143 = "เธอมีสิทธิ์ที่จะไม่พูด และมีสิทธิ์ที่จะเรียกทนายความ"
10035020-145 = "หะ... หัวหน้ากรมฯ! ทำกับลูกค้าเหมือนเป็นอาชญากรได้ยังไงคะ!"
10035020-148 = "กฎหมายมีไว้เพื่อปกป้องความปลอดภัยของผู้คน"
10035020-149 = "และข้อบังคับเพื่อความปลอดภัยในสวนน้ำก็มีไว้เพื่อปกป้องความปลอดภัยของลูกค้า"
10035020-150 = "ดังนั้นข้อบังคับเพื่อความปลอดภัยในสวนน้ำก็ไม่ต่างจากกฎหมายหรอก"
10035020-151 = "เป็นธรรมดาที่ไลฟ์การ์ดที่มีหน้าที่ดูแลความปลอดภัยจะลงโทษผู้กระทำผิด"
10035020-152 = "อะ... อะไรกันน่ะ ไลฟ์การ์ดคนนั้น!"
10035020-153 = "เฮือก! ถ้าตรวจร่างกายไม่ผ่านจะโดนแบบนั้นงั้นเหรอ?! "
10035020-154 = "คนนั้นแค่ประท้วงเอง ทำถึงขนาดนั้นมันรุนแรงไปหรือเปล่า!"
10035020-158 = "มันเป็นเรื่อง... ที่แน่นอนอยู่แล้วนี่"
10035020-159 = "ทำไมถึงทำหน้าแบบนั้นกันล่ะ...?"
10035020-160 = "หัวหน้ากรมฯ! รีบปล่อยตัวลูกค้าไปเถอะค่ะ!"
10035020-164 = "ฮะ... เฮือก!"
10035020-165 = "นึกว่าจะต้องตายในสวนน้ำซะแล้ว!"
10035020-166 = "ไลฟ์การ์ดทำร้ายร่างกายลูกค้าได้ยังไง ฉันจะร้องเรียนแน่!"
10035020-170 = "..."
10035020-171 = "เอ่อ หัวหน้ากรมฯ คะ? ยังไหวมั้ยคะ?"
10035020-172 = "อืม ต้องบอกว่างานบริการประชาชนกับงานของกรมความมั่นคงสาธารณะมันต่างกัน..."
10035020-173 = "หรือต้องบอกว่าเราต้องให้ความสำคัญกับรูปลักษณ์ภายนอกด้วยนะ..."
10035020-174 = "เอาเถอะ เอาเป็นว่าเมื่อกี้มันเกินกว่าเหตุไปหน่อย"
10035020-175 = "งั้นเหรอ..."
10035020-176 = "น่าขายหน้าจริงๆ เลย..."
10035020-185 = "ทำอะไรกันน่ะครับ!"
10035020-186 = "คุมตัวลูกค้างั้นเหรอ!"
10035020-187 = "แต่ว่าลูกค้าคนนั้นไม่ปฏิบัติตามข้อบังคับเพื่อความปลอดภัย แล้วก็โวยวายให้เราปล่อยตัวไปเล่น#nสไลเดอร์นะ..."
10035020-188 = "แต่ถึงอย่างนั้นก็จะทำร้ายร่างกายลูกค้าไม่ได้สิครับ!"
10035020-189 = "ผมอุตส่าห์วางใจที่ได้คนจากสำนักรักษาความปลอดภัยมาช่วย แต่นี่มันอะไรกันครับ!"
10035020-190 = "ขะ... ขอโทษด้วยค่ะ!"

[translation]
10035020-1 = "ตอนที่ 2;ฉันจะพาขึ้นสไลเดอร์สระน้ำเองค่ะ!"
10035020-2 = "ยินดีที่ได้พบทุกคนนะครับ ผมคือเจ้าของสวนน้ำ <แอกิร์> ครับ"
10035020-3 = "ตอนแรกผมกังวลมากที่มีไลฟ์การ์ดไม่พอ แต่พอสถาบันฝึกตำรวจวัลคิรี่ช่วยส่งคนมาก็เลยเบาใจขึ้น#nหน่อยน่ะครับ"
10035020-4 = "พอรู้ว่าทางวัลคิรี่ตอบรับคำร้องอย่างยินดี ผมก็เหมือนได้ยกภูเขาออกจากอกเลยครับ"
10035020-5 = "ค่ะ! ไม่ว่าจะเป็นท้องถนนหรือในสวนน้ำ ความปลอดภัยของชาวเมืองก็เป็นหน้าที่ของสำนักรักษา#nความปลอดภัยอยู่แล้วค่ะ!"
10035020-6 = "วางใจพวกเราได้เลยค่ะ!"
10035020-7 = "ฮ่าฮ่าฮ่า! ดีใจที่ได้ยินแบบนี้นะครับ"
10035020-8 = "เราเพิ่งเปิดสวนน้ำเป็นครั้งแรก วันนี้ก็ขอรบกวนทุกคนด้วยนะครับ"
10035020-9 = "ถ้างั้นผมจะแบ่งจุดปฏิบัติงานให้นะครับ"
10035020-10 = "ขอที่ที่งานสบายหน่อยนะ~"
10035020-11 = "แน่นอนสิครับ พวกคุณมาช่วยงานเราทั้งที เราไม่ส่งไปทำงานยากๆ หรอกครับ"
10035020-12 = "อืม... ตรงนี้น่าจะดีนะครับ"
10035020-14 = "'อควา บอบสเลจ์' สไลเดอร์ที่ยิ่งใหญ่ของสวนน้ำของเรา!"
10035020-17 = "ฮะ... เฮือก!"
10035020-18 = "ขะ... ข้างบนนี้สูงกว่าที่คิดอีกนะคะ...!"
10035020-19 = "ให้ขึ้นสไลเดอร์สูงๆ แบบนี้แล้วสไลด์ลงไปงั้นเหรอ แค่คิดแขนขาก็หมดแรงแล้วค่ะ..."
10035020-20 = "ใจเย็นๆ ก่อน ไม่ได้มีใครสั่งให้คิริโนะสไลด์ลงมาสักหน่อย"
10035020-21 = "นั่นมันขึ้นอยู่กับลูกค้าของสวนน้ำต่างหากล่ะ"
10035020-22 = "มะ... มันก็จริงค่ะ"
10035020-23 = "พอคิดอย่างนั้นก็ไม่ค่อยกลัวแล้วค่ะ!"
10035020-24 = "(ตอนเดินลงบันไดไปดูน่ากลัวกว่าอีก... แต่ก็อย่าพูดเลยดีกว่า)"
10035020-25 = "เอาเถอะ"
10035020-26 = "ถ้าลูกค้าลงไปนั่งและพร้อมเล่นแล้วก็ให้กดปุ่มที่อยู่ตรงนี้ก็พอ"
10035020-27 = "งานง่ายดีนะเนี่ย ไม่ต้องใช้แรงอะไรเลยด้วย"
10035020-28 = "หัวหน้ากรมฯ ก็ชอบใช่มั้ยล่ะ?"
10035020-33 = "ชอบหรือไม่ชอบมันไม่สำคัญหรอก ถ้าเป็นงานที่ได้รับมอบหมายมาแล้วก็ต้องทำให้สำเร็จ"
10035020-34 = "แต่ก็อย่างที่ว่านั่นละนะ ถ้าให้ทำแค่นี้ก็คงไม่ได้ยากอะไร"
10035020-35 = "งั้นฉันจะลองดู"
10035020-36 = "มีคู่มือการเล่นบอกไว้ตรงนี้ด้วย ช่วยอ่านด้วยนะคะ! แค่ทำตามที่คู่มือบอกก็น่าจะได้ค่ะ!"
10035020-37 = "และถ้ามีข้อสงสัยอะไรที่ไม่ได้อยู่ในคู่มือก็ถามพวกฉันได้เลยค่ะ!"
10035020-38 = "งานบริการประชาชนเป็นเรื่องถนัดของฉันกับฟุบุกิอยู่แล้ว เราจะช่วยท่านหัวหน้ากรมฯ อีกแรงค่ะ!"
10035020-39 = "เข้าใจแล้ว... ขอบใจนะ"
10035020-40 = "[s1] \"สู้ๆ นะทุกคน!\"\n[s2] \"สู้เขานะ คันนะ!\""
10035020-42 = "ค่ะ คุณครู ขอบคุณค่ะ"
10035020-43 = "เอาละ คุณลูกค้าคนแรก! ขึ้นมาทางนี้เลยค่ะ!"
10035020-47 = "ฮะ... เฮือก... พอดูจากข้างบนแล้วน่ากลัวจัง..."
10035020-48 = "ฉันจะเล่นเครื่องนี้ได้มั้ยเนี่ย...?"
10035020-49 = "เอาละ ไม่ต้องประหม่านะคะ! ฉันขอเช็กส่วนสูงดูก่อนนะคะว่าจะเล่นสไลเดอร์นี้ได้หรือเปล่า!"
10035020-50 = "ช่วยมายืนที่เครื่องวัดตรงนี้หน่อยนะคะ!"

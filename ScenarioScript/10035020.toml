[translation]
10035020-1 = "Episode 2;I'll Take You to the Water Slide!"
10035020-2 = "Ah, it's a pleasure to meet you all. I'm the owner of Aegir."
10035020-3 = "Our lifeguard shortage was causing us considerable headaches, so it's great to have the Valkyrie Police School here to assist us."
10035020-4 = "Thank you for your quick response. It's a weight off my shoulders, to be sure."
10035020-5 = "No problem! Whether it's on the streets or at the water park, public safety is our responsibility. It's right there in our name!"
10035020-6 = "Just leave it to us!"
10035020-7 = "Hahaha! That's very reassuring."
10035020-8 = "I really do appreciate your being here. Especially on opening day."
10035020-9 = "On that note, let me pass out your assignments."
10035020-10 = "I hope we get an easy spot."
10035020-11 = "You will. Since you're here to assist and support, I'll assign you to the spots with the least demanding tasks."
10035020-12 = "Hmm...this ought to be the perfect place."
10035020-14 = "Our park's top attraction, the \"Aqua Bobsled\"!"
10035020-17 = "E-Eeek!"
10035020-18 = "Th-This is way higher than I thought!"
10035020-19 = "Just thinking about sliding down from this high up makes me queasy..."
10035020-20 = "Relax. You won't need to go down the slide."
10035020-21 = "That's up to the park goers."
10035020-22 = "R-Right, of course."
10035020-23 = "That makes this a whole lot less scary!"
10035020-24 = "(Although I'm not going to like going down those stairs either...but I'll keep that to myself.)"
10035020-25 = "Moving on..."
10035020-26 = "All we have to do is press this button to send the guests down when they're ready."
10035020-27 = "I love how simple it is. Easiest job ever."
10035020-28 = "Don't you think, Director?"
10035020-33 = "We don't have to love it, we just have to do it."
10035020-34 = "That being said, it shouldn't be too difficult."
10035020-35 = "We're on the job."
10035020-36 = "Here's the manual. Just follow these guidelines, and you'll be all set!"
10035020-37 = "And if there's anything not covered in the manual, don't hesitate to ask me anytime!"
10035020-38 = "Fubuki and I both have experience in public service work, so we can handle it!"
10035020-39 = "...Great. Thank you."
10035020-40 = "[s1] \"You've got this, everyone!\"\n[s2] \"You've got this, Kanna!\""
10035020-42 = "Yes, Sensei. Thank you."
10035020-43 = "All right, first guest! Come on up!"
10035020-47 = "W-Wow... It looks even scarier from up here..."
10035020-48 = "Can I really do this...?"
10035020-49 = "Hey, don't be nervous! Let's just check your height first and make sure you're tall enough."
10035020-50 = "Just stand right here on this stadiometer..."
10035020-55 = "Okay, you're clear!"
10035020-56 = "Please step up onto this platform."
10035020-57 = "F-Finally...!"
10035020-58 = "I'll press the button on the count of three!"
10035020-59 = "One, two, three!"
10035020-63 = "Aaahhh!"
10035020-65 = "[ns] \"Eeek...\""
10035020-66 = "It's a lot bumpier than I was expecting."
10035020-67 = "How about it, Sensei? Do you want to give it a try?"
10035020-68 = "[s3] \"I-It's a little much for me.\"\n[s4] \"I'll just watch.\""
10035020-71 = "It is a bit much, isn't it?"
10035020-72 = "Me, I don't even know why anyone would do this."
10035020-73 = "Do they just have some kind of craving for punishment, or what?"
10035020-74 = "Next guest, Fubuki!"
10035020-75 = "Okay!"
10035020-79 = "..."
10035020-80 = "Looks like you’ve brought your own safety gear!"
10035020-81 = "[ns5] \"Huh?\"\n[ns6] \"Looks familiar...?\""
10035020-85 = "Height check passed! I'll press the button on three!"
10035020-86 = "One, TWO!"
10035020-90 = "You said on threeeee!"
10035020-92 = "[ns] \"(Oh yeah...)\""
10035020-93 = "Oops! My hand slipped!"
10035020-94 = "Another mistake, and someone might end up with heart issues."
10035020-95 = "Director, please switch with Kirino."
10035020-96 = "On it."
10035020-97 = "Kirino, it's time to switch."
10035020-98 = "Okay..."
10035020-103 = "All right, it's finally my turn."
10035020-104 = "Feels like I've been waiting forever."
10035020-106 = "Quiet, please!"
10035020-107 = "Stand over here, if you would."
10035020-108 = "We will conduct a physical exam before boarding, or more precisely, before you're escorted away."
10035020-110 = "A physical exam?"
10035020-111 = "Wait, why are you talking like that?"
10035020-112 = "No objections allowed."
10035020-113 = "Red flag!"
10035020-114 = "R-Red flag?"
10035020-119 = "Permission to board denied."
10035020-120 = "Please take the stairs back down."
10035020-121 = "Wh-What? I can't get on?"
10035020-122 = "I waited an hour to get up here, and now you're saying I can't go?!"
10035020-126 = "According to the regulations manual..."
10035020-127 = "\"The 'Aqua Bobsled' is a fast looping slide with safety risks, so only guests who meet the height requirements are allowed to ride.\""
10035020-128 = "When a guest wants to ride, it's your job to let them!"
10035020-129 = "Call your boss!"
10035020-130 = "Hey, hey! No horseplay, it's not safe up here!"
10035020-131 = "Please, calm down!"
10035020-132 = "Seriously, stop struggling! It's dangerous!"
10035020-133 = "You could fall!"
10035020-134 = "Look, all I'm asking is let me on—"
10035020-140 = "Ow, OW! That hurts!"
10035020-141 = "Be quiet."
10035020-142 = "Uh, nothing to see here, folks..."
10035020-143 = "You have the right to remain silent. You have the right to an attorney."
10035020-145 = "D-Director! They're guests, not criminals!"
10035020-148 = "Laws are in place to protect the people's safety."
10035020-149 = "And at a water park, the safety regulations serve the same purpose."
10035020-150 = "Therefore, the safety regulations are essentially equivalent to laws."
10035020-151 = "As a lifeguard, committed to maintaining safety, it's only reasonable to sanction those who break the rules..."
10035020-152 = "Wh-What is that lifeguard DOING?"
10035020-153 = "Is THAT what happens if you're too short to ride?!"
10035020-154 = "Maybe it's because they talked back, but still..."
10035020-158 = "Is this not the way things ought to be?"
10035020-159 = "...Why is everyone so upset...?"
10035020-160 = "Director, please release the guest!"
10035020-164 = "*gasp* *pant*"
10035020-165 = "Were you trying to kill me?!"
10035020-166 = "You assaulted a guest. You're in a WHOLE lot of trouble, lady!"
10035020-170 = "..."
10035020-171 = "Um, Director? Are you okay?"
10035020-172 = "Listen, public safety work isn't quite as by-the-book as you might think..."
10035020-173 = "...and our jobs get a whole lot harder if people don't like us."
10035020-174 = "That was excessive force."
10035020-175 = "I see..."
10035020-176 = "I've shamed us all."
10035020-185 = "What were you thinking?!"
10035020-186 = "Trying to arrest a guest?!"
10035020-187 = "That guest ignored all the safety regulations and insisted on riding the slide—"
10035020-188 = "Even if they did, using physical force on a guest is completely unacceptable!"
10035020-189 = "Doesn't the Public Safety Bureau have any experience with the public?! I THOUGHT they did. Was I wrong?"
10035020-190 = "I-I'm sorry..."
10035020-191 = "I am so sorry. Please accept my apology."
10035020-192 = "...All right."
10035020-193 = "I'll let it go this time."
10035020-194 = "And I'll reassign you to a different area, where this hopefully won't happen again."
10035020-196 = "A different area?"
10035020-197 = "...Where, exactly?"
10035020-199 = "The kids' pool."

[translation]
10035020-1 = "第2話;滑水道，請滑！"
10035020-2 = "哎呀，很高興見到你們，我是「海神」的老闆。"
10035020-3 = "救生員人手不足可是個大問題，幸好女武神警察學園願意派人來支援。"
10035020-4 = "多虧各位爽快地答應支援請求，我們才能鬆一口氣。"
10035020-5 = "不必客氣！無論是街道還是水上樂園，維護市民的安全都是我們生活安全局的責任！"
10035020-6 = "儘管交給我們吧！"
10035020-7 = "哈哈哈！聽你這麼說真讓人高興。"
10035020-8 = "今天是開幕日，再請各位多多關照了。"
10035020-9 = "那麼現在開始分配工作崗位。"
10035020-10 = "麻煩給我們輕鬆的工作～"
10035020-11 = "那當然。各位畢竟是來幫忙的，我會盡可能將各位安排到最輕鬆的設施。"
10035020-12 = "嗯……這裡應該不錯。"
10035020-14 = "我們樂園最引以為傲的設施，「水上雪橇」！"
10035020-17 = "噫噫！"
10035020-18 = "這，這裡比我想像中還高……！"
10035020-19 = "居然要從這麼高的地方滑下去，光是用想的就腿軟了……"
10035020-20 = "冷靜冷靜，桐乃的工作又不是玩滑梯。"
10035020-21 = "真正要滑下去的只有遊客而已呀。"
10035020-22 = "說，說的也是。"
10035020-23 = "這麼想的話就沒那麼害怕了！"
10035020-24 = "（真正可怕的是走樓梯下去的時候啊……不過還是先別說吧）"
10035020-25 = "總之呢。"
10035020-26 = "我們只需要等遊客準備好之後按下這個按鈕，讓他們滑下去就行了。"
10035020-27 = "這種簡單的工作真好。而且也不需要花什麼力氣。"
10035020-28 = "局長也這麼覺得吧？"
10035020-33 = "我怎麼想並不重要。#n既然被指派了任務，就必須確實執行。"
10035020-34 = "不過聽起來的確不是太困難的工作。"
10035020-35 = "就來試試吧。"
10035020-36 = "這裡有操作手冊，請您過目！只要照上面寫的做就行了！"
10035020-37 = "假如遇到手冊上沒有記載的事項，也可以隨時詢問我們！"
10035020-38 = "畢竟我和吹雪比較熟悉接待民眾的任務，相信一定能幫上忙的！"
10035020-39 = "……我明白了，謝謝你。"
10035020-40 = "[s1]「大家加油！」\n[s2]「環奈，加油！」"
10035020-42 = "是，老師。謝謝您的鼓勵。"
10035020-43 = "那麼第一位客人！請到這邊來！"
10035020-47 = "哇，哇啊啊……從上面看感覺更可怕……"
10035020-48 = "滑下去真的沒問題嗎……？"
10035020-49 = "客人不用緊張！我先幫您確認身高能不能乘坐哦！"
10035020-50 = "麻煩站在這邊的身高測量儀上！"
10035020-55 = "OK，通過～"
10035020-56 = "站到這邊的踏板上吧。"
10035020-57 = "終，終於……！"
10035020-58 = "數到三就按下去囉！"
10035020-59 = "一，二，三！"
10035020-63 = "哇啊啊啊啊啊啊啊啊！"
10035020-65 = "[ns]「哇啊……」"
10035020-66 = "比想像中還刺激呢。"
10035020-67 = "怎麼樣，老師也要試試看嗎？"
10035020-68 = "[s3]「我，我沒辦法。」\n[s4]「我還是看看就好。」"
10035020-71 = "對吧，我果然不孤單～"
10035020-72 = "真搞不懂為什麼會有人想玩這種東西。"
10035020-73 = "就這麼喜歡折磨自己嗎……？"
10035020-74 = "吹雪，讓下一位客人入場吧！"
10035020-75 = "OK～"
10035020-79 = "……"
10035020-80 = "這位客人還自己準備了安全裝備呢！"
10035020-81 = "[ns5]「咦？」\n[ns6]「怎麼好像在哪裡見過那個人……？」"
10035020-85 = "身高也沒問題！數到三就按下去囉！"
10035020-86 = "一，二！"
10035020-90 = "不是說好數到三的嗎～～～！"
10035020-92 = "[ns]（果然是他……）"
10035020-93 = "啊！不小心手滑了！"
10035020-94 = "要是再多失手幾次，肯定有人的心臟會受不了的。"
10035020-95 = "局長，麻煩你和桐乃換班。"
10035020-96 = "了解。"
10035020-97 = "桐乃，換我來吧。"
10035020-98 = "是……"
10035020-103 = "哎呀，終於輪到我了。"
10035020-104 = "真的是排有夠久。"
10035020-106 = "肅靜！"
10035020-107 = "來這邊站好。"
10035020-108 = "在逮捕……不，在乘坐之前，必須先進行身體檢查。"
10035020-110 = "身，身體檢查？"
10035020-111 = "不是，等等，你這語氣是怎樣啊？"
10035020-112 = "不接受異議。"
10035020-113 = "立正！"
10035020-114 = "立，立正！？"
10035020-119 = "不允許乘坐。"
10035020-120 = "從那邊的樓梯下去吧。"
10035020-121 = "什，什麼？不能坐？"
10035020-122 = "我可是排了一個小時才上來的耶，不給我搭是什麼意思！"
10035020-126 = "根據手冊上的說明……"
10035020-127 = "由於「水上雪橇」是高速環狀滑水道──#n為了避免發生事故，僅限身高在合適範圍內的遊客乘坐。"
10035020-128 = "客人想坐就該讓客人坐啊！"
10035020-129 = "叫你們老闆出來！"
10035020-130 = "啊！在這種地方亂動很危險的！"
10035020-131 = "這位客人！請你先冷靜下來！"
10035020-132 = "唉唷！這樣很危險耶！"
10035020-133 = "要是不小心掉下去怎麼辦！"
10035020-134 = "那就讓我搭啊──"
10035020-140 = "唉唷我的天！好痛！"
10035020-141 = "給我安靜點。"
10035020-142 = "被，被制伏了……"
10035020-143 = "你有權保持沉默，也有權聘請律師。"
10035020-145 = "局，局長！怎麼能用像是對待犯人的方式制伏客人呢！"
10035020-148 = "法律是為了保護人民的安全。"
10035020-149 = "而水上樂園的安全規定，也同樣是為了保護遊客的安全。"
10035020-150 = "因此，水上樂園的安全規定和法律沒什麼區別。"
10035020-151 = "身為保護遊客安全的救生員，懲治罪犯是理所當然的……"
10035020-152 = "那，那個救生員在做什麼啊！"
10035020-153 = "夭壽！難道沒有通過身體檢查就會變成那樣嗎！？"
10035020-154 = "只是稍微抗議一下就被那樣對待，未免也太過分了吧！"
10035020-158 = "這明明……是理所當然的事才對。"
10035020-159 = "為什麼大家的反應……？"
10035020-160 = "局長！請快放開客人！"
10035020-164 = "呼，呼哈！"
10035020-165 = "還，還以為要死在這裡了！"
10035020-166 = "救生員居然對遊客動粗，我會向樂園提出正式的抗議！"
10035020-170 = "……"
10035020-171 = "那個，局長？您還好吧？"
10035020-172 = "唔嗯，面對民眾的工作畢竟跟公安局不太一樣……"
10035020-173 = "必須考量外界的眼光才行。"
10035020-174 = "總之，剛才的確做得有點過火了。"
10035020-175 = "這樣啊……"
10035020-176 = "我真丟臉……"
10035020-185 = "你們在做什麼！"
10035020-186 = "怎麼能壓制客人呢！"
10035020-187 = "是那位遊客先無視安全規定，要求我們讓他滑下去……"
10035020-188 = "就算是這樣，也不能對遊客動粗啊！"
10035020-189 = "我是因為生活安全局理應很熟悉對民業務才放心交給你們的，結果居然發生這種事！"
10035020-190 = "非，非常抱歉！"
10035020-191 = "對，對不起……不，十分抱歉。"
10035020-192 = "算了。"
10035020-193 = "這次的事就不多追究了。"
10035020-194 = "我會幫你們更換工作崗位，希望這種事不會再發生了。"
10035020-196 = "更換工作崗位？"
10035020-197 = "那會是……哪裡呢？"
10035020-199 = "是兒童泳池。"

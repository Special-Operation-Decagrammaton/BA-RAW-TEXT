10035020-193 = "ครั้งนี้ผมจะหลับหูหลับตาให้"
10035020-194 = "ผมจะเปลี่ยนจุดปฏิบัติงานให้ ต่อไปก็อย่าให้เกิดเรื่องแบบนี้อีกนะครับ"
10035020-196 = "ให้เปลี่ยนหน้าที่งั้นเหรอ?"

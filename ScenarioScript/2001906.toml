[translation]
2001906-1 = "Case 4. เลขาฯ ประจำวัน รอรับคำสั่งค่ะ"
2001906-7 = "(เมื่อต่อสู้กับภาระงานต่างๆ ไปได้เกิน 70 เปอร์เซ็นต์...)"
2001906-11 = "(คุณครูก็ออกมายืดเส้นยืดสายเพื่อเปลี่ยนบรรยากาศ...)"
2001906-15 = "[ns] \"จะมีใครใจดีชงกาแฟให้สักแก้วมั้ยนะ...\""
2001906-19 = "ค่า กาแฟได้แล้วค่ะ นายท่าน"
2001906-23 = "(ขณะที่คุณครูกำลังพึมพำอยู่คนเดียว ก็มีกาแฟแก้วหนึ่งยื่นมาตรงหน้า)"
2001906-24 = "[ns] \"อื้อ ขอบใจนะ\""
2001906-30 = "(เป็นกาแฟดำที่ไม่ได้ใส่น้ำตาลหรือนมลงไปเลย)"
2001906-31 = "(กาแฟที่มีรสขมเข้มข้นและเปรี้ยวนิดๆ ตามที่คุณครูชอบ...)"
2001906-32 = "(เป็นกาแฟที่เหมาะสำหรับขับไล่ความง่วงและความเหนื่อยล้าให้หายไปเป็นปลิดทิ้ง)"
2001906-37 = "เป็นยังไงบ้างคะ นายท่าน?"
2001906-38 = "[s] \"เป็นกาแฟที่สมบูรณ์แบบเลยละ\""
2001906-39 = "ฮุฮุ ดีใจจังที่ได้ช่วยเหลือนายท่านค่ะ"
2001906-40 = "[s] \"ครูรู้สึกขอบใจอาคาเนะเสมอๆ เลยนะ\""
2001906-41 = "ขอบคุณค่ะ"
2001906-42 = "ถ้านายท่านพูดแบบนั้น ฉันก็..."
2001906-46 = "[ns] \"อืม เอ๊ะ...?\""
2001906-49 = "[ns] \"อาคาเนะ~~~?!\""
2001906-52 = "ค่ะ บันนี่เกิร์ล อาคาเนะที่พร้อมดูแลเทคแคร์นายท่านตลอดเวลาเองค่ะ"
2001906-53 = "ดึ๋ง ดึ๋ง"
2001906-56 = "ฮุฮุ... ไม่คิดเลยค่ะว่านายท่านจะตกใจขนาดนี้ "
2001906-57 = "คือว่าที่จริง... ฉันได้ข่าวว่านายท่านจะต้องอยู่ทำงานจนดึกดื่นน่ะค่ะ..."
2001906-58 = "ฉันก็เลยคิดว่ามีเรื่องอะไรที่พอจะทำให้นายท่านได้บ้างรึเปล่า..."
2001906-59 = "ก็เลยตัดสินใจว่าวันนี้จะมาเป็นบันนี่เกิร์ลที่ควบตำแหน่งเลขาของนายท่านด้วยค่ะ!"
2001906-60 = "เอาละค่ะ นายท่าน! สั่งมาได้ทุกเรื่องเลยค่ะ!"
2001906-61 = "ไม่ว่าทางร่างกาย หรือจิตใจ ฉันก็เตรียมพร้อมแล้วค่ะ!"
2001906-65 = "[ns1] \"ครูก็ขอบใจอยู่หรอกนะ...\"\n[ns2] \"ช่วงนี้เหมือนใส่ชุดนี้ตลอดเลยนะ ถูกใจงั้นเหรอ?\""
2001906-68 = "คะ... คะ?"
2001906-69 = "คือ... นายท่านรู้สึกแบบนั้นเหรอคะ?"
2001906-70 = "อะฮ่าฮ่าฮ่า... ถ้านายท่านคิดแบบนั้นก็คงช่วยไม่ได้นะคะ"
2001906-71 = "ช่วงนี้ฉันไม่มีโอกาสใส่ชุดอื่นนอกจากชุดนี้มาให้นายท่านเห็นเลย..."
2001906-72 = "ถามเหตุผลได้รึเปล่าน่ะเหรอคะ?"
2001906-73 = "อืม... ให้ฉันพูดเองก็รู้สึกเขินๆ อยู่นิดหน่อยนะคะ"
2001906-74 = "[s] \"อาคาเนะชอบกระต่ายเหรอ?\""
2001906-75 = "ไม่ใช่แบบนั้นหรอกค่ะ "
2001906-76 = "เพียงแค่ฉันน่ะ..."
2001906-77 = "อยากให้นายท่านดู..."
2001906-78 = "[s] \"หรือว่าอยากให้ครูเห็นตอนใส่ชุดบันนี่เกิร์ลเหรอ...?\""
2001906-82 = "ระ... รู้ได้ยังไงคะ?"
2001906-83 = "ฮือ... คิดไม่ถึงเลยค่ะ ทำยังไงดีคะ?"
2001906-84 = "ถ้าเป็นแบบนี้ ก็คงไม่มีประโยชน์... ที่จะปิดบังไว้แล้วสินะคะ"
2001906-85 = "ค่ะ... ใช่แล้ว... ละค่ะ"
2001906-86 = "[s] \"ไม่ต้องคิดมากเรื่องนั้นก็ได้\""
2001906-90 = "คิดแล้วเชียว... ว่านายท่านจะต้องพูดแบบนี้"
2001906-91 = "ขอบคุณค่ะนายท่าน"
2001906-92 = "แต่ว่าฉันน่ะ... อยากให้นายท่านได้เห็นภาพลักษณ์ใหม่ๆ ในฐานะเมดที่มาดูแลนายท่านน่ะค่ะ"
2001906-93 = "[s] \"ก็เลยใส่ชุดบันนี่เกิร์ลมางั้นเหรอ?\""
2001906-94 = "ค่ะ... แล้วมันก็เป็นชุดสำหรับบริการ... ในความหมายอื่นๆ ด้วยค่ะ"
2001906-95 = "มันดูแปลกรึเปล่าคะ? นายท่านไม่ถูกใจรึเปล่าคะ?"
2001906-96 = "[s3] \"ไม่เห็นแปลกเลย\" \n[s4] \"น่ารักจะตาย!\""
2001906-101 = "...ขอบคุณอีกครั้งนะคะ นายท่าน"
2001906-102 = "ถ้าฉันจะช่วยอะไรนายท่านได้... ฉันก็อยากจะทำค่ะ"
2001906-103 = "[s] \"ไม่ว่าจะใส่ชุดไหน อาคาเนะก็คืออาคาเนะนะ\""
2001906-104 = "นายท่าน... คิดแบบนั้นเหรอคะ?"
2001906-110 = "ตอนนี้... ฉันมั่นใจในตัวเองขึ้นอีกนิดได้ใช่มั้ยคะ?"
2001906-113 = "― ต้องขออภัยด้วยจริงๆ ค่ะ[wa:420] "
2001906-115 = "― ทั้งที่ความคิดแบบนี้... ถือว่าขาดคุณสมบัติในฐานะของเมดแท้ๆ[wa:1220] "
2001906-118 = "― ฉันน่ะ... ไม่มั่นใจเลยละค่ะ[wa:910] "
2001906-121 = "― นายท่านน่ะ ไม่ว่าเมื่อไร ก็คอยแบกรับภาระต่างๆ อยู่เสมอ[wa:2500] "
2001906-123 = "― แต่ถึงอย่างนั้น นายท่านก็หัวเราะแล้วบอกว่าไม่เป็นไร[wa:10] "
2001906-126 = "― ฉันน่ะ... ไม่เคยที่จะ...[wa:1770] "
2001906-128 = "― แบ่งเบาภาระพวกนั้น จากนายท่านได้เลย[wa:10] "
2001906-131 = "― แต่ว่า...คำตอบของนายท่าน[wa:1890] "
2001906-133 = "― ทำให้ฉันกลับมามีความมั่นใจได้อีกครั้งแล้วค่ะ[wa:10] "
2001906-136 = "― ถึงฉันจะยังอ่อนหัดอยู่...[wa:2050] "
2001906-138 = "― แต่จากนี้ไป...ก็ขอรบกวนด้วยนะคะ[wa:670] "
2001906-141 = "― นายท่าน"
2001906-144 = "เอาละค่ะ... ถ้าอย่างนั้นให้ฉันเริ่มทำงานเลยดีมั้ยคะ?"
2001906-145 = "ทั้งทำความสะอาด ซักผ้า ทำอาหาร เตรียมของว่าง จนถึงการจัดการงานเอกสารที่ยุ่งยาก"
2001906-146 = "นายท่านสั่งมาได้ทุกเรื่องเลยค่ะ!"
2001906-147 = "ฉันจะแสดงให้นายท่านได้เห็นอีกครั้งค่ะว่าเมดของชมรม C&C น่ะเก่งกาจแค่ไหน!"
2001906-148 = "ดึ๋ง ดึ๋ง!"
2001906-150 = "(หลังจากนั้นด้วยความช่วยเหลือของอาคาเนะ คุณครูก็ทำงานโต้รุ่งจนเสร็จ)"

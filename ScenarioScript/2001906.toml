[translation]
2001906-1 = "Case 4. 一日秘書，待命中"
2001906-7 = "（原本感覺絲毫沒有減少的工作，總算剩下三成左右的時候……）"
2001906-11 = "（為了紓展僵硬的肩膀，我伸了個懶腰）"
2001906-15 = "[ns] 「有沒有人能夠幫我泡杯咖啡呢……」"
2001906-19 = "還有點燙，請小心哦，主人。"
2001906-23 = "（才剛喃喃自語完，咖啡就突然出現在我的眼前）"
2001906-24 = "[ns] 「不好意思，謝謝你。」"
2001906-30 = "（雖然是沒有加糖和牛奶的黑咖啡……）"
2001906-31 = "（但苦味與酸味的結合非常符合我的喜好）"
2001906-32 = "（是杯能擊退睏意和疲勞的好咖啡）"
2001906-37 = "您覺得如何呢，主人？"
2001906-38 = "[s] 「簡直是極品唷。」"
2001906-39 = "呵呵。能幫上您的忙，我也感到相當開心。"
2001906-40 = "[s] 「我一直都很感謝朱音唷。」"
2001906-41 = "非常感謝。"
2001906-42 = "聽到您這句話，我就……"
2001906-46 = "[ns] 「嗯，咦……？」"
2001906-49 = "[ns] 「朱音──！？！？」"
2001906-52 = "是的，是隨時隨地為主人服務的兔女郎朱音唷？"
2001906-53 = "蹦蹦。"
2001906-56 = "呵呵……沒想到您會這麼吃驚。"
2001906-57 = "我聽說主人正在熬夜工作。"
2001906-58 = "所以想幫您的忙……"
2001906-59 = "因此，我決定今天要以主人的兔女郎秘書的身分陪著您！"
2001906-60 = "請儘管吩咐吧，主人！"
2001906-61 = "我的身體和心靈都已經做好覺悟了！"
2001906-65 = "[ns1] 「雖然很感謝妳……」\n[ns2] 「不過妳最近好像一直都是這副模樣，喜歡上這套服裝了嗎？」"
2001906-68 = "咦，這個？"
2001906-69 = "啊啊……是為什麼呢。"
2001906-70 = "……也對。您會這麼想也沒辦法。"
2001906-71 = "最近見到主人的時候，總是穿著兔女郎裝……"
2001906-72 = "理由，是嗎……"
2001906-73 = "唔，由我親口說出來好像有點難為情呢。"
2001906-74 = "[s] 「難道是，很喜歡兔子？」"
2001906-75 = "不，不是那樣的。"
2001906-76 = "只是，那個……希望主人……"
2001906-77 = "可以，多看看，我……"
2001906-78 = "[s] 「難道是，希望我看到你穿兔女郎裝的模樣，是嗎……？」"
2001906-82 = "您，您怎麼會知道呢？"
2001906-83 = "啊嗚。沒想到居然會從主人口中聽到那種話……"
2001906-84 = "……已經隱瞞不下去了……對吧？"
2001906-85 = "沒錯……就，就是……這樣。"
2001906-86 = "[s] 「那種事不用在意的唷。」"
2001906-90 = "主人果然會這麼說呢。"
2001906-91 = "謝謝您，主人。"
2001906-92 = "不過我……身為為主人服務的女僕，希望能讓您看到新的一面。"
2001906-93 = "[s] 「所以才打扮成兔女郎嗎？」"
2001906-94 = "是的……雖然方向有點不同，不過服務依然沒有改變。"
2001906-95 = "會很奇怪嗎……？不合您的喜好嗎？"
2001906-96 = "[s3]「才不會奇怪呢。」 \n[s4]「非常可愛唷！」"
2001906-101 = "……非常感謝您，主人。"
2001906-102 = "明明只要能夠幫上主人，對我來說就已經心滿意足了……"
2001906-103 = "[s] 「不管打扮成怎樣，朱音就是朱音唷。」"
2001906-104 = "是……是這樣嗎？"
2001906-110 = "再多展現一點自信，也沒關係嗎？"
2001906-113 = "― 非常抱歉……[wa:1100] "
2001906-115 = "― 這種想法，對一個女僕來說明明是不及格的。[wa:2740] "
2001906-118 = "― 我……失去了自信。[wa:1630] "
2001906-121 = "― 主人明明總是背負著很多事情，[wa:4100] "
2001906-123 = "― 卻總是笑著說沒關係。[wa:1440] "
2001906-126 = "― 而我……卻完全無法，[wa:2330] "
2001906-128 = "― 替主人背負那些重擔……[wa:500] "
2001906-131 = "― 但是，因為主人的話語，[wa:2410] "
2001906-133 = "― 我似乎能再次向前邁進了。[wa:750] "
2001906-136 = "― 今後，[wa:2930] "
2001906-138 = "― 不才小女還請您多多指教。[wa:1430] "
2001906-141 = "― 主人。"
2001906-144 = "那麼，重新回到工作吧？"
2001906-145 = "打掃、洗衣、料理，從零食的準備到麻煩文件的處理，"
2001906-146 = "請您儘管吩咐！"
2001906-147 = "C&C的女僕有多厲害，就讓老師見識一下吧！"
2001906-148 = "蹦蹦！"
2001906-150 = "（之後，一邊接受朱音的各種服務，一邊順利熬夜處理完了工作）"

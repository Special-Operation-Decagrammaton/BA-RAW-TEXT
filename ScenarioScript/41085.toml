[translation]
41085-2 = "ちっ、コソ泥が……どこに行きやがった？"
41085-3 = "遠くまでは行ってないはず……この辺りを探せ！"
41085-8 = "だからコソ泥じゃないっての！"
41085-9 = "サキ、声を落としてください。気づかれてしまいます。"
41085-13 = "キャンプRABBITへ、こちらRABBIT1。ポイン[ruby=エコー]トEに[/ruby]到着しました。目標の「ニンジン」も無事に確保。幸いにも負傷者はいませんが……。"
41085-14 = "先ほどの交戦で、当初の計画にあった退路が使えなくなりました。"
41085-15 = "加えて、敵の増援も確認……"
41085-17 = "ま、サキが隊長って時点でこうなると思ったけど。"
41085-18 = "完璧なのは理論だけ、実際にやると失敗ばっかりだし。"
41085-19 = "うるさい！モエだって、実技の演習はダメダメだっただろ！"
41085-20 = "くそっ、何が問題だったんだ……？"
41085-21 = "[s] \"実際にやってみると上手く行かないことって多いよね。\""
41085-22 = "ちっ、SRTの実力を見せつけるせっかくのチャンスだったのに……シャーレにもこんな失態を見せるなんて……。"
41085-24 = "……ところで、ミユはどこに？"
41085-25 = "え、一緒にいるんじゃないの？GPS上では、反応が重なってるけど。"
41085-27 = "まさか……。"
41085-31 = "あのバカ……！"
41085-32 = "無線機をバッグに入れたままじゃんか！"
41085-33 = "先ほどの交戦時に焦ったのでしょう。"
41085-34 = "あそこから移動したとして……"
41085-35 = "B棟にある、あのタワークレーンでしょうか。"
41085-36 = "B棟って……あそこ、さっき見た感じ警備員がわんさかいたぞ？"
41085-37 = "あの辺は遮蔽物も無いし、自力での脱出は期待できそうにないな……。"
41085-38 = "……サキ、どうしますか。"
41085-39 = "どうするも何も、助けるしかないだろ。"
41085-40 = "となると、このドラム缶は置いていくか。いくら何でも、ドラム缶を背負ったまま戦うわけにはいかないしな……。"
41085-41 = "そうですね。残念ですが「ニンジン」は諦めて、まずは救出を図るとしましょう。"
41085-42 = "敵の数も多いですし……覚悟をした方が良さそうです。"
41085-46 = "……先生？"
41085-47 = "どうかしましたか？"
41085-48 = "[s] \"ドラム缶を被っていくのはどう？\""
41085-50 = "……正気ですか？"
41085-51 = "ドラム缶を被ったまま移動し、敵の目を誤魔化すと……？"
41085-52 = "……待て、確かに本で読んだことがあるぞ。"
41085-53 = "ダンボールやドラム缶を使って幾多の潜入任務を成功させた、伝説的な工作員の話を……。"
41085-54 = "いえ、いくら何でも、それで怪しまれないわけが……。"
41085-55 = "でも他に方法も無いだろ？"
41085-56 = "私だって、この先生に従いたくはない。"
41085-57 = "でも、私のミスで作戦が失敗したり、隊員に怪我が発生する方が……。"
41085-58 = "……分かりました。それに従いましょう。"
41085-59 = "それでは、身長に合うドラム缶を装備。"
41085-60 = "RABBIT4の救出に向かいましょう！"
41085-66 = "……ん？あんなところにドラム缶なんかあったっけ？"
41085-67 = "知るか。この港湾にドラム缶がどれだけあると思ってるんだ。お前、全部の位置を覚えてるわけじゃないだろ？"
41085-68 = "まあ、そうだけどさ……"
41085-69 = "何か不自然っていうか、動いた気がするっていうか……。"
41085-70 = "疲れてるんだろ。"
41085-71 = "ほら、さっさとコソ泥を捕まえて休もうぜ。"
41085-77 = "……まさか、本当に気付かれないとは。"
41085-78 = "私も半信半疑だったけど……。"
41085-79 = "そんじょそこらの偽装とか、遮蔽物より効果がありそうだな。"
41085-80 = "ここまで効果があるなら、もっと沢山持って帰りたいところだが。"
41085-81 = "まあ、ひとりで二つ以上持って帰るのは現実的ではありませんね。"
41085-82 = "SRTに戻った際に、購入を検討しましょう。"
41085-86 = "……RABBIT2、もうすぐランデブーポイントに到達します。"
41085-91 = "み、みんな、どこに行ったの……？"
41085-92 = "サキちゃん……ミヤコちゃん……？"
41085-93 = "この状況じゃ大声も出せないし、無線機もどっか行っちゃったし……。"
41085-94 = "もう終わりなんだ……このままみんなにも忘れられて……。"
41085-95 = "このクレーンの上で、干からびて死んじゃうんだ……。"
41085-99 = "……？"
41085-103 = "ど、ドラム缶が動いた……！？"
41085-104 = "ミユ！"
41085-105 = "さらに喋った……！？"
41085-106 = "な、何？新しい未確認生物！？這い寄る混沌……！？"
41085-107 = "こっち！早く中に入れ！"
41085-108 = "うぅ、怪物が私を引きずり込んで、ひとつになろうと……！？"
41085-109 = "ど、ドラム缶さん、私なんて食べても多分美味しくないです……！"
41085-110 = "そんなバカなこと言ってる場合か！"
41085-111 = "干からびて終わるんじゃなくて、ドラム缶に食べられて終わるなんて……。"
41085-113 = "そんな、そんな終わり方……！"
41085-115 = "ああもうっ！"
41085-119 = "私だっての！気づけ！"
41085-120 = "さ、サキちゃん……？"
41085-121 = "ドラム缶を使って、バレないようにここまで来たんだよ。ほら、さっさと行くぞ。"
41085-122 = "さ、サキちゃん……私、みんなに捨てられたかと……。"
41085-123 = "違うから、ほらさっさと中に入れ。"
41085-124 = "あと、SRTが作戦中に泣くな！"
41085-125 = "う、うん……。"
41085-126 = "じゃあ、警備員に気づかれる前に早く――"
41085-130 = "いたぞ、侵入者だ！"
41085-134 = "ちっ、バレた！"
41085-136 = "敵の接近を確認……あー、こりゃ凄い数のドローンだ。"
41085-137 = "RABBIT2、どうしますか？"
41085-138 = "こういう時は……"
41085-140 = "とにかく走れ！！"
41085-153 = "その後ドラム缶を被ったまま、降り注ぐ銃弾の中を走り……何とか公園まで辿り着いた。"
41085-155 = "子ウサギ公園・小隊キャンプ場"
41085-158 = "はぁ、はぁ……ここまで来れば大丈夫だろ……。"
41085-159 = "うお、何だこいつ。未確認生物？這い寄る混沌？"
41085-160 = "……ま、とりあえず一回燃やすか。"
41085-161 = "やめろ！私だって、私！"
41085-165 = "誰が這い寄る混沌だよ。っていうかさっき、ミユにもそれ言われたし……。"
41085-167 = "……無事に戻れましたね。"
41085-168 = "特に負傷者もいないようで何よりです。"
41085-169 = "……[USERNAME]先生は、怪我などは？"
41085-170 = "[s1] \"私も大丈夫だよ。\"\n[s2] \"ドラム缶のおかげで。\""
41085-171 = "そうでしたか。もし万が一、私たちの作戦中に先生が怪我をされたら……"
41085-172 = "そうでしたか。もし万が一、私たちの作戦中に先生が怪我をされたら……"
41085-173 = "連邦生徒会からまた、どんな処罰を受けるか分かったものではありませんから。"
41085-175 = "いやー、にしてもサキは思いっきり醜態晒してたなあ。あんなに自信満々だったのに。"
41085-176 = "相変わらず実践に弱いねー。"
41085-177 = "うるさい。予想外の事態さえ無ければ、5分で終わってた。"
41085-178 = "まったく、現実はいつもこうだ……。"
41085-179 = "きょ、教範通りにはいかないよね……。"
41085-181 = "ですが、とにかくお疲れ様でした。"
41085-182 = "サキの指揮の下、作戦が成功したのは確かです。"
41085-183 = "……ふん。"
41085-184 = "にしても、汗でベタベタだよ……。"
41085-185 = "こういう時こそ、お風呂に入りたいけど……。"
41085-186 = "くひひ、そう言うと思って……"
41085-187 = "こうして事前に、薪とか必要なものを用意しておいたのさ！ほらほら、さっさとお風呂に入ろう！"
41085-188 = "ってことはお前、作戦中にお風呂の準備してたのかよ……。"
41085-189 = "普通だったら懲戒処分ものだぞ……まあでも、入れるならありがたく入るとしよう。"
41085-193 = "……じゃ、もうひと仕事するか。"
41085-196 = "了解！"
41085-207 = "あー……生き返る……。"
41085-208 = "やっぱり疲労回復にはお風呂だ……。"
41085-209 = "ドラム缶のお風呂、思ったより悪くないですね。"
41085-210 = "お湯加減も良い感じで……。"
41085-211 = "これ、温度の調節難しそう……。"
41085-212 = "ぬるま湯に入ったカエルみたいに、私もこのまま……。"
41085-213 = "心配ご無用。その辺はサーモグラフィでちゃんとチェックしてるから。"
41085-214 = "むしろこれだと、温度ぬるくない？"
41085-215 = "テルミットの粉でもかけてみる？"
41085-216 = "バカ！全部吹っ飛ぶぞ！？"
41085-217 = "それに、これくらいの温度でちょうど良いって。これ以上熱くしたら兎汁になるよ。"
41085-218 = "こうやってみんなで入るのも、何だか少し楽しいですね。"
41085-219 = "いつかSRTに戻っても、たまにはこうやって……。"
41085-220 = "[s] \"誰かが来ないかどうか、ちゃんと見張ってないとだけどね。\""
41085-221 = "まあ、大丈夫だろ。周囲には誰もいないし。"
41085-222 = "隊員同士は裸を見せ合うなんて今さらだし、この時間帯の公園に来るやつなんていないって。"
41085-223 = "もし誰かが来たとしても、地雷とターレットが反応するはず。"
41085-224 = "……ところで先生は何でここにいるわけ？"
41085-225 = "[s3] \"流れというか、何というか……\"\n[s4] \"……見張り役？\""
41085-232 = "……。"
41085-234 = "おい、何でいるんだよ！？生徒の入浴姿を見るとかアウトだろ！？"
41085-235 = "こればっかりは撃たれても文句言えないぞ！？"
41085-236 = "や、やっぱり作戦が終わって、武装解除の隙を狙ってた……！？"
41085-237 = "……モエ、ミサイルを。"
41085-238 = "よっしゃあ、喰らえ！！"
41085-244 = "子ウサギ公園・付近路地裏"
41085-245 = "リーダー、どうやらあの公園に新入りが来ているようです。"
41085-246 = "縁というのは、風のように訪れ、風のように去るもの……"
41085-247 = "それが悪いものかどうかについては、早々には断定しきれません。"
41085-248 = "ただ彼女たちが、私たちとの共存を望むのであれば……ありのままの状態を享受する、「無所有」の心を持ってもらう必要はありますが。"
41085-249 = "……みなさんから見て、いかがでしたか？彼女たちもまた、私たちと同じ無所有を誇る高潔な存在でしたか？"
41085-250 = "いえ。無所有どころか、欲に塗れていました。"
41085-251 = "その上やたら行動力があって、廃棄弁当をほとんど持っていかれてしまい……今までほとんど消えることのなかった、もやし弁当まで！"
41085-252 = "廃材なども一通り持っていかれてしまい……私どもの方の補修もままなりません。"
41085-253 = "なるほど……せっかくの縁でしたが、物欲に侵されていましたか……。"
41085-260 = "騒ぎ立てたくはありませんでしたが……良いでしょう、武器を用意してください。"
41085-262 = "物欲に目がくらみ、道徳を失った俗物たちに……"
41085-264 = "「無所有の喜び」を教えるとしましょうか！"
41085-266 = "次回;這い寄る影"

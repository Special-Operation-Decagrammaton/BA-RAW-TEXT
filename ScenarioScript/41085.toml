[translation]
41085-2 = "Tsk, where did those thieves go?"
41085-3 = "They're here somewhere! Search every nook and cranny."
41085-8 = "Stop calling us thieves!"
41085-9 = "Saki, please be quiet! Hostiles are still nearby."
41085-13 = "RABBIT 1, reporting in to Camp RABBIT. We've arrived at Point Echo and the carrot has been secured. No injuries to report."
41085-14 = "But our original evacuation route is blocked now."
41085-15 = "And more enemy reinforcements are on the way."
41085-17 = "Oh, wow. Saki messed up again? I'm sooo surprised. Not."
41085-18 = "Little Miss Top-of-Her-Class, but absolutely trash at actual field work."
41085-19 = "Shut up, Moe! I'm still better than you!"
41085-20 = "I-I don't understand. I thought it was the perfect plan..."
41085-21 = "[s] \"There's no such thing as a perfect plan in real life.\""
41085-22 = "I thought I could show off SRT's strength to Sensei... Instead I just embarrassed myself and the academy."
41085-24 = "Wait, where's Miyu?"
41085-25 = "She's not with you? Her GPS indicator is right next to yours."
41085-27 = "That doesn't make sense..."
41085-31 = "Miyu, that dummy!"
41085-32 = "She left her radio in the bag!"
41085-33 = "She must've panicked and left it when the enemies started approaching her."
41085-34 = "Let me think. Miyu has a tendency to follow orders to a T. You said to go as high as she can..."
41085-35 = "I would assume tower crane at Building B."
41085-36 = "There's no way. That area's crawling with security guards. "
41085-37 = "There's no means of escape from there either. She's got to be stuck up there."
41085-38 = "What should we do, Saki? "
41085-39 = "Is that even a question? Operation Carrot is now a rescue mission."
41085-40 = "We'll have to leave the drum barrels. There's no way we can fight and carry them at once."
41085-41 = "Unfortunately, yes. Getting Miyu back safe and sound is our top priority as of now."
41085-42 = "But we're severely outnumbered. We need to prepare for some damage on our end."
41085-46 = "...Sensei?"
41085-47 = "You have a plan?"
41085-48 = "[s] \"Let's put these drum barrels over our heads.\""
41085-50 = "I'm sorry? You want to hide under the barrels all the way to Miyu's location?"
41085-51 = "We need realistic solutions, Sensei."
41085-52 = "...I have read about something like this before."
41085-53 = "In one of our textbooks, they talk about some legendary agent who would hide under boxes and barrels to pull off impossible infiltration missions."
41085-54 = "How do you intend to move around? A rogue drum barrel moving by itself will only draw more attention."
41085-55 = "Look, it's not the best, but what else are we gonna do?"
41085-56 = "I would rather use my precious textbook as a coaster than listen to Evil Incarnate over there..."
41085-57 = "But...Miyu is in this situation because of me. I can't let her down."
41085-58 = "Understood. I'll put my faith in you for this mission."
41085-59 = "Find and equip yourselves with a drum barrel."
41085-60 = "Let's move out! Operation Carrot: Save Miyu!"
41085-66 = "I might sound crazy but, has that drum barrel always been there?"
41085-67 = "There's drum barrels all over, it's a loading dock. What's gotten into you?"
41085-68 = "That's why I said I might sound crazy, but..."
41085-69 = "I swear the drum barrel was moving a second ago."
41085-70 = "Did you drink too much at dinner again?"
41085-71 = "Well, sober up. The boss is going to have our heads if we let the thieves get away."
41085-77 = "...I don't understand it. How is this working?"
41085-78 = "I gotta admit, I was pretty skeptical."
41085-79 = "But this is the easiest infiltration we've ever done."
41085-80 = "If I had known they would be this effective, I would've brought more for future missions."
41085-81 = "Haha, it would've been a little difficult for just us to carry any more barrels back."
41085-82 = "When we get back to SRT Academy one day, we can request some budget be allocated so you can purchase as many as you'd like."
41085-86 = "RABBIT 2. We're reaching the rendezvous point. Prepare for contact."
41085-91 = "Wh-Where did everyone go?"
41085-92 = "Saki? Miyako? Anyone at all? S-Sensei?"
41085-93 = "If I talk too loud, the guards'll come get me... And... And I think I forgot my radio..."
41085-94 = "It's really happened this time. They forgot I exist and went back home."
41085-95 = "I'll fade away like a bad dream... Th-They'll laugh and make memories while I turn into dust on this crane..."
41085-99 = "Gyah! What's that?"
41085-103 = "It... It moved?! It's a moving drum barrel!"
41085-104 = "Miyu! Miyu!"
41085-105 = "It knows my name? Wait... It's talking?!"
41085-106 = "Wh-What the heck is that? A new UMA? Or the creepy-crawly doom of impending chaos?"
41085-107 = "Hurry up and get in here!"
41085-108 = "It's a monster! It wants to eat me alive!"
41085-109 = "P-Please spare me, barrel monster! I'm tiny so I'm not yummy, I promise!"
41085-110 = "What are you saying? C'mon, get in already!"
41085-111 = "I've been abandoned and forgotten in this cold lonely world... A-And now... I'm gonna be gobbled up by the evil barrel monster?"
41085-113 = "I WANNA GO HOME!"
41085-115 = "Are you serious right now?"
41085-119 = "Miyu, pay attention! It's me, Saki."
41085-120 = "Saki?"
41085-121 = "I disguised myself as a drum barrel so we could come rescue you. Look, no scary barrel monsters."
41085-122 = "Waaah... Saki... I thought you forgot about me for good! *sniffles*"
41085-123 = "Y-You really think we would do that?"
41085-124 = "C'mon, now. No more crying. You're an elite agent of SRT!"
41085-125 = "Okay... *sniffle*"
41085-126 = "C'mon, into the drum barrel before guards come around."
41085-130 = "INTRUDERS!"
41085-134 = "Oops. A little late for that."
41085-136 = "Hate to break up your reunion, but you've got reinforcements coming from left, right, and center!"
41085-137 = "RABBIT 2, it's your call! Do we engage?"
41085-138 = "The textbook response in a situation like this is..."
41085-140 = "RUN!"
41085-153 = "(They quickly fled to the park, protecting themselves from the rain of bullets with the drum barrels...)"
41085-155 = "Kousagi Park, Squad Campsite"
41085-158 = "*huff* *puff* Those persistent security guards... Did we actually lose them?"
41085-159 = "Whoa, whoa, whoa. Who let this thing in? Is it a cryptid? Or the crawling chaos of Kivotos?"
41085-160 = "I just can't figure it out... Maybe I should make it go ka-boom..."
41085-161 = "Stop joking around. It's us!"
41085-165 = "And how did you and Miyu have the same exact reaction? What's this crawling chaos nonsense?"
41085-167 = "I'm relieved everyone made it back."
41085-168 = "And not only that, but all in one piece."
41085-169 = "You weren't hurt, were you, [USERNAME] Sensei?"
41085-170 = "[s1] \"All in one piece as well.\"\n[s2] \"Not a scratch, thanks to my trusty barrel!\""
41085-171 = "I'm glad. If Sensei had been injured accompanying us on a mission..."
41085-172 = "I'm glad. If Sensei had been injured accompanying us on a mission..."
41085-173 = "The General Student Council would've had our hides."
41085-175 = "Heehee, Sakiiii~ Do you need some medicine for your poor little ego? Miss Perfect didn't last five minutes as squad leader before everything went ka-boom."
41085-176 = "Admit it. You're just about as good as me at field work."
41085-177 = "I-If it weren't for that small mishap, I could've sleepwalked through that mission!"
41085-178 = "Why do things never work out the way they do on paper?"
41085-179 = "B-Because reality is different from our textbooks..."
41085-181 = "Regardless, the operation was a success. We retrieved the carrot and no one was hurt."
41085-182 = "And that really is thanks to you, Saki."
41085-183 = "...Thanks."
41085-184 = "More importantly, I'm sweaty and smell like gunpowder."
41085-185 = "I'm dying to scrub off all this grime, but bathing while camping isn't as easy as turning a knob."
41085-186 = "Heeheehee. I had a feeling you'd say that."
41085-187 = "Ta-da! I got firewood and towels already so everyone can take a nice, toasty bath."
41085-188 = "You procured all of these before we even finished the operation?"
41085-189 = "That's technically against procedures and would normally require discipline. But...the whole point of this operation was to take a bath, right?"
41085-193 = "RABBIT Squad, bath time!"
41085-196 = "Yay! Hear, hear!"
41085-207 = "Ahh... Now that's the stuff."
41085-208 = "I've missed this! Hot baths after a mission are the best!"
41085-209 = "This drum barrel serves as a surprisingly comfortable bathtub too."
41085-210 = "And the temperature is just right..."
41085-211 = "I-It's perfect now, b-but what if it gets hotter and hotter and all of a sudden we're boiling?"
41085-212 = "Haven't you heard about frogs slowly b-boiling alive?"
41085-213 = "Don't worry your crybaby little head too much. Look, that thermal imaging equipment is keeping track of the temperature."
41085-214 = "I'd even say it's getting a little cool in here..."
41085-215 = "How about I sprinkle some thermite powder on the firewood? Heehee."
41085-216 = "For once in your life, will you stop thinking about incendiaries? Is your brain just wired wrong?!"
41085-217 = "And it's perfect right now anyways. I'd rather us not turn into rabbit stew."
41085-218 = "I must say, it's sort of charming. All of us bathing in a park together like this."
41085-219 = "Let's come camping again one day. After we've achieved our mission and reopened SRT Academy."
41085-220 = "[s] \"By the way, are you okay with bathing out in the open like this?\""
41085-221 = "Of course. There's no one watching."
41085-222 = "Long missions often require us to bathe and change together like this, so it's nothing new for us."
41085-223 = "And this park rarely has visitors. Any that do come in this far will be met with our landmines and automatic turrets."
41085-224 = "...But you know. Now that I think about it. Technically, there is someone watching us."
41085-225 = "[s3] \"I didn't really know where to go...\"\n[s4] \"I guess I'm...standing guard?\""
41085-232 = "..."
41085-234 = "Standing guard?! You're spying on bathing students right now!"
41085-235 = "Leave! Leave right now and never come back!"
41085-236 = "I-I knew the creepy teacher was gonna do b-bad things to us while we're vulnerable!"
41085-237 = "Moe. I hereby authorize you to use every single incendiary you own."
41085-238 = "BLOW UP, PERVERT!"
41085-244 = "Back Alley near Kousagi Park"
41085-245 = "Hey, Boss. We've got some newcomers at the park nearby."
41085-246 = "People are transient in nature. Much like the wind, they will come and they will leave."
41085-247 = "You must not allow your inner peace to be disquieted over such an insignificant event."
41085-248 = "If they do not leave, however, they must learn to coexist with us. They must embrace our ideals of non-possession and find release from the worldly desires of society."
41085-249 = "Tell me. Do you believe they will be able to be enlightened, to commit to our noble cause?"
41085-250 = "There's no way! They're the greediest people we've ever seen."
41085-251 = "They've been ravaging the stores for the discarded bentos we used to be able to find everywhere. Now, we can't even find a mung bean sprout bento to spare."
41085-252 = "And, their sticky fingers seem to think everything belongs to them! They've been collecting blocks of wood to tarpaulins and more! We probably won't even be able to repair the sanctuary anymore."
41085-253 = "Oh dear. It appears our new-found visitors are a group of gluttonous goblins."
41085-260 = "Very well, comrades. Take up your arms."
41085-262 = "Let us teach these immoral, greedy gluttons..."
41085-264 = "A lesson on the joys of non-possession!"
41085-266 = "Next Episode; A Suspicious Shadow"

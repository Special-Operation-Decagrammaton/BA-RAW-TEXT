[translation]
41085-2 = "โธ่เว้ย พวกหัวขโมยไปทางไหนกันแล้ว?"
41085-3 = "แต่ไม่น่าจะหนีไปได้ไกลหรอก ค้นให้ทั่วทุกซอกทุกมุม!"
41085-8 = "ก็บอกแล้วไงว่าพวกเราไม่ใช่หัวขโมย!"
41085-9 = "ชู่ว ซากิ ลดเสียงลงหน่อยค่ะ ศัตรูยังอยู่แถวนี้นะคะ"
41085-13 = "RABBIT 1 เรียก RABBIT ในค่าย ตอนนี้ฉันมาถึงจุดเอโค่แล้วค่ะ ได้เป้าหมาย <แคร์รอต> ของเรามาเรียบร้อยแล้ว โชคดีที่ไม่มีใครบาดเจ็บ..."
41085-14 = "แต่การปะทะเมื่อกี๊ทำให้เราใช้ทางกลับตามที่วางแผนไว้ตอนแรกไม่ได้ค่ะ"
41085-15 = "แถมตอนนี้ศัตรูก็เสริมกำลังมากขึ้น..."
41085-17 = "คิดไว้แล้วว่าต้องเป็นแบบนี้ ซากิก็เป็นอย่างนี้ตลอด"
41085-18 = "แม่นเรื่องทฤษฎี แต่พอถึงภาคปฏิบัติก็ผิดพลาดซะทุกครั้ง"
41085-19 = "หนวกหูน่า! นี่โมเอะ เธอเองก็เป็นที่โหล่ในภาคปฏิบัติเหมือนกันไม่ใช่เหรอ?"
41085-20 = "มันผิดพลาดตรงไหนกันนะ? ฉันอุตส่าห์วางแผนไว้อย่างสมบูรณ์แบบ...!"
41085-21 = "[s] \"ทุกอย่างในโลกไม่เป็นไปตามที่เราคิดหรอก\""
41085-22 = "ฮึ่ม! อุตส่าห์เป็นโอกาสที่จะแสดงอานุภาพของ SRT แล้วเชียว แล้วทำไมคนที่เห็นความล้มเหลว#nต้องเป็นคุณครูจากชาเล่ต์ด้วยนะ..."
41085-24 = "จะว่าไป มิยุไปอยู่ไหนเหรอคะ? ไม่เห็นตั้งแต่เมื่อกี๊แล้ว..."
41085-25 = "หืม? แต่ GPS บอกว่าอยู่กับพวกเธอนะ?"
41085-27 = "ว่าไงนะ? หรือว่า..."
41085-31 = "มิยุ ยัยบ้านั่น...!"
41085-32 = "เอาวิทยุไว้ในกระเป๋าเหรอเนี่ย!"
41085-33 = "สงสัยจะรีบไปจุดลอบยิงระหว่างการปะทะเมื่อกี๊จนลืมเอาวิทยุติดตัวไปด้วยค่ะ"
41085-34 = "จากจุดที่มีการปะทะครั้งแรก จุดลอบยิงที่มิยุน่าจะไปได้ก็น่าจะเป็น..."
41085-35 = "ทาวเวอร์เครนที่อยู่ตรงตึก B"
41085-36 = "บนทาวเวอร์เครนตึก B เหรอ? ตอนนี้ที่นั่นน่าจะมียามมาอยู่กันเต็มเลยนะ "
41085-37 = "แถมบริเวณนั้นยังไม่มีกำบังให้ซ่อนตัวด้วย แค่หวังให้หนีออกมาเองยังยากเลย"
41085-38 = "ทำยังไงดีล่ะคะซากิ...?"
41085-39 = "ถามแปลก ก็ต้องไปช่วยสิ"
41085-40 = "แต่ยังไงก็ทิ้งถังอาบน้ำของเราไว้ที่นี่ไม่ได้ และถึงฉันจะแข็งแรงแค่ไหนก็แบกถังต่อสู้ไปด้วยไม่ได้"
41085-41 = "เห็นด้วยค่ะ เห็นทีต้องสละ <แคร์รอต> แล้วเปลี่ยนเป้าหมายมาเป็นการช่วยสมาชิกของเราก่อน"
41085-42 = "แต่ศัตรูมีกันหลายคน แต่ดูเหมือนเราต้องเตรียมพร้อมสำหรับความเสียหายทางด้านนี้กันก่อนนะคะ"
41085-46 = "คุณครูคะ...? ทำไมจู่ๆ ก็...?"
41085-47 = "หรือว่ามีแผนการอะไรดีๆ คะ?"
41085-48 = "[s] \"ซ่อนตัวในถังกันเถอะ!\""
41085-50 = "คะ? ให้หลอกตาศัตรูด้วยการซ่อนตัวในถังแล้วเข้าไปให้ถึงมิยุเหรอคะ?"
41085-51 = "แผนการอะไรกันล่ะคะนั่นน่ะ..."
41085-52 = "เดี๋ยวนะ... ฉันจำได้ว่าเคยอ่านอะไรแบบนี้ในหนังสือมา"
41085-53 = "เคยมีนักสืบในตำนานใช้กล่องกระดาษลูกฟูกและถังที่อยู่รอบๆ แล้วทำภารกิจลักลอบเข้าจนสำเร็จ..."
41085-54 = "แต่การที่ถังมันขยับได้มันไม่น่าสงสัยไปหน่อยเหรอ..."
41085-55 = "แต่เราไม่มีวิธีอื่นแล้วนี่?"
41085-56 = "ฉันเองก็เกลียดการเชื่อคุณครูที่รู้หน้าไม่รู้ใจมากกว่าการใช้หนังสือเรียนเป็นฐานรองหม้อราเม็ง#nหลายเท่า..."
41085-57 = "แต่ฉันก็ไม่อยากเห็นสมาชิกคนอื่นได้รับบาดเจ็บเพราะความผิดพลาดของฉันเหมือนกัน......"
41085-58 = "ก็ได้ค่ะ... ยังไงครั้งนี้เราก็ตกลงกันแล้วค่ะว่าจะทำตามคำสั่งของเธอ"
41085-59 = "ถ้างั้นแต่ละคนไปหาถังที่ขนาดใกล้เคียงกับส่วนสูงตัวเองมาค่ะ"
41085-60 = "เราจะเคลื่อนที่อย่างรวดเร็วแล้วไปช่วย RABBIT 4 กัน!"
41085-66 = "หืม...? ถังนั่นมันอยู่ตรงนั้นตั้งแต่แรกแล้วหรือเปล่าน่ะ?"
41085-67 = "จุดขนส่งสินค้าก็ต้องมีถังอยู่แล้วสิ ทำไมถึงทำเป็นไม่เคยเห็นไปได้เล่า?"
41085-68 = "อืม... มันดูไม่เป็นธรรมชาตินะ"
41085-69 = "แถมเมื่อกี๊ยังรู้สึกเหมือนถังมันขยับได้ด้วย..."
41085-70 = "ง่วงนอนในเวลาทำงานรึไง?"
41085-71 = "ตั้งสติหน่อย ตอนนี้เราต้องจับหัวขโมยให้ได้เป็นอันดับแรก"
41085-77 = "เหลือเชื่อจังเลยค่ะ... พอเอาถังมาครอบตัวแบบนี้ก็ไม่มีใครสังเกตพวกเราได้เลย"
41085-78 = "นั่นสิ ตอนแรกฉันก็เชื่อครึ่งไม่เชื่อครึ่ง..."
41085-79 = "ทำแบบนี้แล้วได้ผลดีกว่าชุดพรางตัวหรือกำบังซะอีก"
41085-80 = "ถ้ารู้ว่าถังนี่จะใช้งานได้ดีแบบนี้ น่าจะเอามาให้เยอะกว่านี้หน่อย จะได้ใช้เป็นยุทธภัณฑ์ด้วย"
41085-81 = "แหะๆ แต่พอมาอยู่ในถังแบบนี้ แต่ละคนก็เคลื่อนย้ายถังได้แค่ถังเดียวนะคะ"
41085-82 = "แต่ต่อไปถ้าได้กลับไปสถาบัน SRT คงต้องเจียดงบปฏิบัติการแล้วซื้อไว้บ้างแล้วละค่ะ"
41085-86 = "RABBIT 2 ตอนนี้ฉันมาถึงจุดนัดพบแล้วค่ะ ช่วยเตรียมการนัดพบด้วยค่ะ"
41085-91 = "งะ... แง... ทุกคนไปไหนกันหมดนะ...?"
41085-92 = "ซากิจัง... มิยาโกะจัง... ถ้าอยู่แถวนี้ก็ช่วยตอบด้วย..."
41085-93 = "ฉันไม่กล้าส่งเสียงดังเพราะกลัวว่ายามจะได้ยินเอา... แล้วก็หาวิทยุประจำตัวไม่เจอด้วย..."
41085-94 = "คงต้องจบอย่างนี้สินะ... ทุกคนคงกลับไปที่เดิมทั้งๆ ที่ลืมว่าฉันอยู่ที่นี่"
41085-95 = "และถ้าอย่างนั้นฉันคงหายไปจากความทรงจำของทุกคนและคงหิวตายอยู่บนเครนนี้..."
41085-99 = "เอ๋? เสียงนี้มัน..."
41085-103 = "เฮือก?!  ถะ... ถังขยับได้!"
41085-104 = "มิยุ มิยุ!"
41085-105 = "พูดได้ด้วย!"
41085-106 = "อะไรกันเนี่ย? UFO แบบใหม่เหรอ? หรือจะเป็นความวุ่นวายที่คืบคลานเข้ามา?"
41085-107 = "เข้ามาในนี้เร็วเข้า!"
41085-108 = "มะ... มนุษย์ต่างดาวจริงด้วย! มันกำลังเรียกให้เราเข้าไปในถังเพื่อจะรวมเป็นร่างเดียวกัน!"
41085-109 = "คะ... คุณถังคะ ฉันไม่อร่อยหรอกค่ะ! ไปหาเหยื่อคนอื่นเถอะค่ะ!"
41085-110 = "พูดอะไรของเธอ? ฉันไม่มีเวลามาเล่นสนุกอยู่ด้วยหรอกนะ!"
41085-111 = "ถูกเพื่อนๆ ลืมก็ว่าหนักแล้ว นี่ยังต้องโดนมนุษย์ต่างดาวถังจับตัวกินอีก..."
41085-113 = "ไม่เอาด้วยแล้ว...!"
41085-115 = "เชื่อเค้าเลย...!"
41085-119 = "ฉันเอง ซากิไง!"
41085-120 = "ซากิจัง...?"
41085-121 = "ใช่ ฉันแค่เอาถังกลมที่อยู่แถวนี้มาพรางตัวเฉยๆ กลัวอะไรของเธอเนี่ย?"
41085-122 = "แง... ซากิจัง... ฉันนึกว่าทุกคนจะลืมฉันแล้ว... (สะอื้น)"
41085-123 = "จะ... จะเป็นแบบนั้นได้ยังไงกันเล่า?"
41085-124 = "อีกอย่าง หยุดร้องไห้ระหว่างทำภารกิจนะ! เสียศักดิ์ศรีนักเรียนหัวกะทิของ SRT หมด!"
41085-125 = "ก็ได้... (สะอื้น)"
41085-126 = "รีบเข้ามาในถังก่อนที่พวกยามจะรู้ตัวเร็ว..."
41085-130 = "มีคนบุกรุก!"
41085-134 = "โดนจับได้ซะแล้ว!"
41085-136 = "ตรวจพบศัตรู... โดรนรักษาความปลอดภัยจำนวนมากกำลังบุกเข้ามา!"
41085-137 = "ทำยังไงดีล่ะคะ RABBIT 2? เข้าปะทะเลยไหมคะ?"
41085-138 = "ตอนนี้เราใช้ได้เพียงกลยุทธ์เดียวเท่านั้น..."
41085-140 = "วิ่ง!!!"
41085-153 = "(หลังจากนั้นทุกคนก็วิ่งหนีกระสุนจากในถังจนมาถึงสวนสาธารณะ)"
41085-155 = "ค่ายทหาร โคะอุซางิ การ์เด้น"
41085-158 = "แฮ่ก... แฮ่ก พวกนั้นคงไม่ตามมาถึงที่นี่ใช่ไหม..."
41085-159 = "อ๊าย นี่มันอะไรกันเนี่ย มนุษย์ต่างดาวเหรอ? หรือจะเป็นความวุ่นวายที่คืบคลานได้ในคิโวทอส?"
41085-160 = "ตัวอะไรก็ไม่รู้... เผาเลยดีไหม?"
41085-161 = "หยุดนะ! นี่พวกเราเอง!"
41085-165 = "จะว่าไป ทำไมเธอพูดเหมือนมิยุเลยล่ะ? ความวุ่นวายที่คืบคลานงั้นเหรอ... เอามาจากไหนกันละนั่น?"
41085-167 = "เฮ้อ... สมาชิกกลับมาครบกันแล้วสินะคะ"
41085-168 = "โชคดีแล้วค่ะที่ไม่มีใครบาดเจ็บหรือถูกทิ้งไว้ในขณะปฏิบัติภารกิจ"
41085-169 = "คุณครู [USERNAME] ก็ไม่ได้บาดเจ็บตรงไหนใช่ไหมคะ?"
41085-170 = "[s1] \"ครูก็ไม่เป็นไรเหมือนกัน\"\n[s2] \"ปลอดภัยได้ด้วยถัง!\""
41085-171 = "ดีแล้วละค่ะ ถ้าคุณครูมาช่วยในปฏิบัติการของเราแล้วเกิดบาดเจ็บใหญ่โตขึ้นมาละก็..."
41085-172 = "ดีแล้วละค่ะ ถ้าคุณครูมาช่วยในปฏิบัติการของเราแล้วเกิดบาดเจ็บใหญ่โตขึ้นมาละก็..."
41085-173 = "ครั้งนี้ผู้ใหญ่หลายคนในองค์การนักเรียนคงไม่ปล่อยเราไว้แน่ๆ ค่ะ"
41085-175 = "ว่าแต่ที่เธอทำเมื่อกี๊มันคืออะไรกันน่ะซากิ ทำเป็นมั่นอกมั่นใจ แต่สุดท้ายก็โดนยามวิ่งไล่..."
41085-176 = "ยังอ่อนภาคปฏิบัติอยู่เหมือนเดิมเลยนะ"
41085-177 = "หนวกหูน่า ถ้าตอนนั้นพวกยามไม่รู้ตัวละก็ ฉันจะปิดจ๊อบได้ใน 5 นาทีอยู่แล้วเชียว"
41085-178 = "ให้ตายสิ ความเป็นจริงนี่ชอบทรยศความคาดหวังเสมอเลย..."
41085-179 = "กะ... ก็สถานการณ์มันไม่เป็นไปตามหนังสือคู่มือนี่..."
41085-181 = "แต่ปฏิบัติการของเราในวันนี้ก็สำเร็จนะคะ ไม่มีใครบาดเจ็บ แล้วเราก็ยังได้เป้าหมายกลับมาด้วย"
41085-182 = "ปฏิบัติการนี้สำเร็จได้ด้วยการสั่งการของซากิค่ะ"
41085-183 = "ฮึ่ม..."
41085-184 = "เหงื่อออกเยอะซะจนเหนียวตัวไปหมดแล้ว"
41085-185 = "อยากอาบน้ำก่อนนอนจัง... ฉันไม่ควรคาดหวังอะไรแบบนี้ในระหว่างพักอยู่ในค่ายใช่ไหม?"
41085-186 = "ฮิฮิ คิดไว้แล้วว่าต้องพูดอย่างนี้"
41085-187 = "ฉันก็เลยเตรียมผ้าเช็ดตัวกับอุปกรณ์อาบน้ำเอาไว้ให้ล่วงหน้าแล้ว นี่ไง! มาอาบน้ำกันเถอะ!"
41085-188 = "นี่แอบไปเตรียมอาบน้ำคนเดียวในตอนที่ยังทำปฏิบัติการไม่สำเร็จงั้นเหรอ?"
41085-189 = "ถ้าตามระเบียบแล้วต้องโดนตำหนิ... แต่วันนี้จะขอยกประโยชน์ให้แล้วกัน ตอนแรกปฏิบัติการครั้งนี้ก็เพื่อการอาบน้ำนี่นา..."
41085-193 = "...งั้นลองไปทดสอบถังกันเลยไหม?"
41085-196 = "ไปเล้ย! (ค่ะ!)"
41085-207 = "ฮื้มม... อุ่นจังเลย..."
41085-208 = "ร่างกายที่เหนื่อยล้าจากการทำภารกิจนานๆ ต้องเจอกับน้ำอุ่นๆ แบบนี้แหละถึงจะหายเหนื่อย..."
41085-209 = "อ่างอาบน้ำที่ทำจากถังนี่อุ่นสบายจังค่ะ ดีกว่าที่คิดไว้อีกนะ"
41085-210 = "อุณหภูมิของน้ำก็พอดีเลยด้วย..."
41085-211 = "ฮ่า... ตอนนี้น่ะกำลังดี แต่ถ้าอุณหภูมิของน้ำสูงขึ้นจนลวกตัวเราล่ะ...?"
41085-212 = "แบบนั้นไง... ที่พูดกันว่ากบที่ค่อยๆ ลงไปในน้ำเดือดไม่มีทางรู้หรอกว่าตัวเองจะตาย..."
41085-213 = "ฮิฮิ ไม่ต้องห่วงหรอก ฉันติดตั้งอุปกรณ์ตรวจสอบอุณหภูมิของน้ำเอาไว้แล้ว"
41085-214 = "แต่ทำไมฉันถึงรู้สึกว่าน้ำมันยังไม่ค่อยอุ่นนะ..."
41085-215 = "เราลองใส่ผงเทอร์ไมต์ในฟืนดูไหม?"
41085-216 = "หยุดคิดที่จะใช้ระเบิดไฟเลยนะ! จะทำให้ถังเป็นรูรึไง!"
41085-217 = "ตอนนี้อุณหภูมิน้ำกำลังดีเลย ถ้าร้อนกว่านี้คงได้เป็นซุปต้มกระต่ายแล้ว"
41085-218 = "การได้อาบน้ำด้วยกันแบบนี้ในสวนสาธารณะมันก็สนุกไปอีกแบบนะคะ"
41085-219 = "ถึงในอนาคตเราจะได้กลับไปสถาบันพิเศษ SRT แต่ก็หาเวลาว่างมาอาบน้ำที่นี้กันบ้างนะ..."
41085-220 = "[s] \"ว่าแต่มาอาบน้ำในที่โล่งแจ้งแบบนี้ได้ด้วยเหรอ?\""
41085-221 = "ไม่เห็นจะเป็นไรเลย ไม่มีใครมาดูเรานี่"
41085-222 = "อีกอย่างกับสมาชิก SRT ด้วยกันก็ไม่มีอะไรต้องอายอยู่แล้ว และสวนสาธารณะนี้ก็อยู่ในที่ห่างไกลที่ไม่มี#nใครมาด้วย"
41085-223 = "และถ้าคนนอกจะเข้าใกล้บริเวณนี้ก็ต้องเจอป้อมปืนอัตโนมัติและกับระเบิดที่เราติดตั้งไว้หน้าทางเข้า#nสวนสาธารณะก่อน"
41085-224 = "ว่าแต่คุณครูเข้ามาที่นี่ได้ยังไง?"
41085-225 = "[s3] \"อืม... จู่ๆ ก็เข้ามาได้เลยแฮะ\"\n[s4] \"สงสัยจะมีสกิลพิเศษ?\""
41085-232 = "......"
41085-234 = "เดี๋ยวก่อน! จู่ๆ ก็เข้ามาแอบดูเด็กอาบน้ำงั้นเหรอ?!"
41085-235 = "รีบกลับไปเลยนะ!!"
41085-236 = "จะฉวยโอกาสตอนที่เราเก็บอุปกรณ์แล้วทำอะไรแปลกๆ ละสิ..."
41085-237 = "โมเอะ... ฉันอนุญาตให้ใช้ระเบิดมือค่ะ"
41085-238 = "ตายซะเถอะคนโรคจิต!"
41085-244 = "ตรอกแถวโคะอุซางิ การ์เด้น"
41085-245 = "หัวหน้า มีเด็กกลุ่มใหม่เข้ามาอยู่แถวๆ สวนสาธารณะด้วย"
41085-246 = "สายใยคือสิ่งที่เข้ามาดั่งสายลม แล้วก็จากไปดั่งสายลม..."
41085-247 = "เราไม่ต้องเกรงกลัวสายใยใหม่ที่เข้ามาหรอก"
41085-248 = "แต่หากพวกเขาปรารถนาที่จะอยู่ร่วมกับเรา ก็ต้องละทิ้งความโลภ เพลิดเพลินไปกับธรรมชาติ และต้องมีจิตใจที่ไม่คิดครอบครองสิ่งใด"
41085-249 = "ทุกคนคิดว่ายังไงกันบ้าง? พวกเธอเป็นสิ่งมีชีวิตสูงส่งที่ตระหนักในการไม่เป็นเจ้าของสิ่งใดเหมือนเรา#nหรือเปล่าล่ะ?"
41085-250 = "ไม่เลย พวกนั้นมีแต่ความปรารถนา"
41085-251 = "แถมยังทำอะไรรวดเร็วมาก ทุกวันนี้เราแทบจะไม่เห็นข้าวกล่องเหลือทิ้งที่พอจะกินได้ในบริเวณนี้เลย ขนาดข้าวกล่องหน้าถั่วงอกยังไม่เหลือเลย!"
41085-252 = "แถมวัสดุจำเป็นสำหรับการอยู่รอดอย่างเศษไม้กับผ้ายางก็ยังเอาไปหมด... แผนซ่อมแซมห้องบูชาของ#nพวกเราถึงกับล่าช้าเลยด้วย"
41085-253 = "อย่างนั้นเหรอ ไม่คิดเลยว่าสายใยที่เข้ามาใหม่จะตาบอดเพราะความโลภเช่นนี้"
41085-260 = "พวกพ้องทั้งหลาย เตรียมอาวุธประจำกายของแต่ละคนไว้"
41085-262 = "คนไม่มีศีลธรรมที่คิดเอาแต่ได้ต้องได้รับการสั่งสอน"
41085-264 = "จงรู้ไว้ว่าการไม่ครอบครองสิ่งใดคือความสุขใจ!"
41085-266 = "ตอนต่อไป;เงาต้องสงสัย"

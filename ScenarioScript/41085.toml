41085-31 = "3;사키 헬멧;10;미유, 이 바보가……!\n#3;stiff\n#3;em;[빠직]"
41085-32 = "3;사키 헬멧;05;무전기를 가방에 놔둔 채로 가버렸어!"
41085-33 = "5;미야코;10;아까의 교전 중에 황급히 저격 포인트로 이동하느라 무전기를 챙기는 걸 잊었나 보네요.\n#5;em;…\n#5;al\n#3;m1"
41085-34 = "5;미야코;99;최초로 교전이 벌어진 곳에서 미유가 이동할 수 있을 만한 저격 포인트를 꼽아보자면……"
41085-35 = "5;미야코;11;B동에 위치한 크레인 타워밖에 없겠군요."
41085-36 = "3;사키 헬멧;09;B동의 크레인 타워? 그 아래에는 지금 경비원들이 잔뜩 몰려 있을 텐데? \n#3;em;[땀]\n#3;stiff"
41085-37 = "3;사키 헬멧;04;게다가 그 일대는 몸을 숨길 만한 엄폐물도 거의 없으니, 자력으로 탈출하는 걸 기대하기도 어렵겠어."
41085-38 = "5;미야코;02;……어떻게 할까요, 사키. \n#5;em;[?]"
41085-39 = "3;사키 헬멧;05;뭘 묻는 거야. 당연히 구하러 가야지."
41085-40 = "3;사키 헬멧;01;하지만 여기 있는 드럼통은 놔두고 가는 수밖에 없겠어. 아무리 나라도 등에 드럼통을 짊어진 채 싸울 수는 없으니까."
41085-41 = "5;미야코;99;동감입니다. 아쉽지만 <당근>은 포기하고 아군 구출을 최우선 목표로 변경해야겠네요.\n#5;em;…"
41085-42 = "5;미야코;05;다만 적의 수가 너무 많아서 이쪽도 피해를 각오해야 할 것 같습니다."

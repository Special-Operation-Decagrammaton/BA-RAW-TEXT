41085-2 = "3;로봇 경비원 A;05;쳇, 이 좀도둑 녀석들이 어디로 간 거지?\n#3;em;[빠직]\n#3;a"
41085-3 = "3;로봇 경비원 A;05;멀리 도망치지는 못했을 거야. 이 근처를 샅샅이 뒤져봐!\n#3;hophop"

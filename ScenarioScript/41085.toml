41085-53 = "1;사키 헬멧;99;주변에 널려 있는 골판지 상자나 드럼통 등을 사용해서 잠입 임무를 성공적으로 수행한 전설적인 공작원이 있다고……."
41085-54 = "3;미야코;04;아무리 그래도 대놓고 드럼통이 움직이는데, 수상하게 여기지 않을 리가……."

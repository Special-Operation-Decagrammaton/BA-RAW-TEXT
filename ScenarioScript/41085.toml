41085-8 = "4;미야코;11\n2;사키 헬멧;10;그러니까 우리는 좀도둑이 아니라고 했잖아!\n#2;a\n#4;a\n#2;stiff\n#2;em;[빠직]\n#2;h"
41085-9 = "4;미야코;05;쉿, 사키. 목소리를 줄여주세요. 아직 상대가 가까이 있습니다."

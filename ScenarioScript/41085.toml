[translation]
41085-2 = "呿，那群小偷跑去哪裡了？"
41085-3 = "應該沒有走遠……搜索這一帶！"
41085-8 = "所以說不是小偷了！"
41085-9 = "咲希，請把聲音壓低。會被發現的。"
41085-13 = "營地RABBIT，這裡是RABBIT1。已到[ruby=Ecco]達E地[/ruby]點。#n目標「胡蘿蔔」也平安確保。幸好沒有傷員……"
41085-14 = "但剛才的交戰，使當初計劃的退路無法使用了。"
41085-15 = "加上也有確認到敵人的增援……"
41085-17 = "嘛，給咲希當隊長的時候我就知道會這樣了。"
41085-18 = "完美的只有理論，實際操作卻總是失敗。"
41085-19 = "吵死了！萌的實戰演習不也完全不行嗎！"
41085-20 = "該死，到底是哪裡有問題……？"
41085-21 = "[s] 「實際嘗試才知道不順利的事情很多呢。」"
41085-22 = "呿，明明難得可以讓人見識SRT的實力……竟然讓夏萊也看見這種失態……"
41085-24 = "……話說回來，美優在哪裡？"
41085-25 = "咦，沒有在一起嗎？GPS信號重疊在一起耶。"
41085-27 = "難道……"
41085-31 = "那個笨蛋……！"
41085-32 = "這不是把無線電放在背包裡了嗎！"
41085-33 = "在剛才的交戰時著急了吧。"
41085-34 = "假設從那邊移動……"
41085-35 = "她應該回在位於B棟的塔式起重機吧。"
41085-36 = "B棟……那裡剛才看起來，到處都是警衛耶？"
41085-37 = "那邊也沒有掩體，沒辦法期待她能自己逃脫呢……"
41085-38 = "……咲希，該怎麼辦呢。"
41085-39 = "還能怎麼辦，只能去救她了吧。"
41085-40 = "這樣的話，這鐵桶放著吧。怎樣也不能背著鐵桶戰鬥啊……"
41085-41 = "說得也是。很遺憾只能放棄「胡蘿蔔」，先專注在救援吧。"
41085-42 = "敵人的數量也很多……看來先做好覺悟比較好。"
41085-46 = "……老師？"
41085-47 = "怎麼了嗎？"
41085-48 = "[s] 「罩著鐵桶去如何？」"
41085-50 = "……認真的嗎？"
41085-51 = "罩著鐵桶移動，騙過敵人……？"
41085-52 = "……等等，我記得有在書上看過。"
41085-53 = "某個傳奇間諜，就是使用紙箱和鐵桶完成眾多潛入任務……"
41085-54 = "不，就算再怎麼說，那樣怎麼可能不被懷疑……"
41085-55 = "但是沒有其他方法吧？"
41085-56 = "我也一樣，不想聽從這個老師。"
41085-57 = "但我更不希望，因為我的失誤讓作戰失敗，或是讓隊員受傷……"
41085-58 = "……我知道了。那就這麼做吧。"
41085-59 = "那麼，裝備和身高符合的鐵桶。"
41085-60 = "前往救出RABBIT4吧！"
41085-66 = "……嗯？那種地方有擺鐵桶嗎？"
41085-67 = "誰知道啊。你以為這個港灣有多少鐵桶啊。誰記得全部的位置。"
41085-68 = "嘛，是那樣沒錯……"
41085-69 = "但感覺有點不自然，好像有在動……"
41085-70 = "你只是累了吧。"
41085-71 = "好了，趕快抓住小偷休息吧。"
41085-77 = "……沒想到，還真的不會被發現。"
41085-78 = "我原本也是半信半疑……"
41085-79 = "感覺比偽裝或掩體之類的還要有效呢。"
41085-80 = "這麼有效，讓人不禁想多帶一些回去。"
41085-81 = "嘛，一個人帶兩個以上回去並不實際呢。"
41085-82 = "回去SRT後，再討論是否購入吧。"
41085-86 = "……RABBIT2，即將抵[ruby=Rendezvous]達R地[/ruby]點。"
41085-91 = "大，大家，去哪裡了呢……？"
41085-92 = "咲希醬……都子醬……？"
41085-93 = "這個狀況也沒辦法太大聲，無線電也不知道跑到哪裡去了……"
41085-94 = "已經結束了啊……就這樣被大家忘記……"
41085-95 = "會在這個起重機上，乾枯死去……"
41085-99 = "……？"
41085-103 = "鐵，鐵桶動了……！？"
41085-104 = "美優！"
41085-105 = "甚至說話了……！？"
41085-106 = "什，什麼？新的未確認生物！？悄悄接近的混沌……！？"
41085-107 = "這邊！快點進來裡面！"
41085-108 = "唔唔，怪物打算把我拖進去，合為一體……！？"
41085-109 = "鐵，鐵桶先生，就算吃了我應該也不會覺得好吃的……！"
41085-110 = "現在是說那種傻話的時候嗎！"
41085-111 = "不是乾枯結束，竟然是被鐵桶吃掉結束……"
41085-113 = "那種，那種結束方式……！"
41085-115 = "啊啊真是！"
41085-119 = "是我啦！給我趕快發現！"
41085-120 = "咲，咲希醬……？"
41085-121 = "我們用鐵桶悄悄來到這裡了。#n好了，快點走吧。"
41085-122 = "咲，咲希醬……我還以為被大家拋棄了……"
41085-123 = "才不是，好了快點進去。"
41085-124 = "還有，SRT在作戰中不要哭！"
41085-125 = "唔，嗯……"
41085-126 = "那，在被警衛發現之前快點──"
41085-130 = "有了，是入侵者！"
41085-134 = "呿，被發現了！"
41085-136 = "確認到敵人接近……啊，有大量無人機呢。"
41085-137 = "RABBIT2，該怎麼辦？"
41085-138 = "這種時候……"
41085-140 = "總之跑起來！！"
41085-153 = "（之後眾人罩著鐵桶，在槍林彈雨中奔跑……總算是抵達了公園）"
41085-155 = "兔寶寶公園．小隊營地"
41085-158 = "哈啊，哈啊……來到這裡就沒問題了吧……"
41085-159 = "唔哦，這什麼東西。未確認生物？悄悄接近的混沌？"
41085-160 = "……嘛，總之先燒一次吧。"
41085-161 = "快住手！是我啊，是我！"
41085-165 = "誰是悄悄接近的混沌啊。話說剛才也被美優這麼說……"
41085-167 = "……平安回來了呢。"
41085-168 = "沒有人受傷真是太好了。"
41085-169 = "……[USERNAME]老師有受傷嗎？"
41085-170 = "[s1] 「我也沒事唷。」\n[s2] 「多虧了鐵桶。」"
41085-171 = "是嗎。萬一，老師在我們的作戰中受傷的話……"
41085-172 = "是嗎。萬一，老師在我們的作戰中受傷的話……"
41085-173 = "不知道又會從聯邦學生會受到什麼樣的處罰。"
41085-175 = "哎呀～話說咲希一整個醜態百出呢。明明那麼自信滿滿。"
41085-176 = "還是一樣不擅長實戰呢～"
41085-177 = "吵死了。只要沒有出乎預料的情況，5分鐘就結束了。"
41085-178 = "真是的，現實總是這樣……"
41085-179 = "沒，沒辦法像教戰手冊一樣順利呢……"
41085-181 = "不過，總之辛苦了。"
41085-182 = "在咲希的指揮下，作戰確實是成功了。"
41085-183 = "……哼。"
41085-184 = "話說回來，全身因為汗水黏黏的啊……"
41085-185 = "這種時候特別想洗澡……"
41085-186 = "咕嘻嘻，就知道你會那麼說……"
41085-187 = "我已經事先將柴火之類需要的東西準備好了！#n來來來，趕快來泡澡吧！"
41085-188 = "也就是說，你在作戰中分心準備泡澡啊……"
41085-189 = "正常的話應該是要懲戒處分……不過既然能泡澡，就心懷感激的泡吧。"
41085-193 = "……那就再努力一下吧。"
41085-196 = "了解！"
41085-207 = "啊～活過來了……"
41085-208 = "果然回復疲勞就是要泡澡啊……"
41085-209 = "鐵桶浴缸，比想像的還要不錯呢。"
41085-210 = "水溫也很剛好……"
41085-211 = "這感覺很難調節溫度……"
41085-212 = "就像被放入溫水的青蛙一樣，我也會就這樣……"
41085-213 = "不用擔心。那部分有確實用熱像儀確認。"
41085-214 = "不如說現在這樣溫度不太夠吧？"
41085-215 = "要撒點鋁熱劑粉末嗎？"
41085-216 = "笨蛋！全都會被炸飛啦！"
41085-217 = "而且這種程度剛剛好。再加熱就要變成兔子湯了。"
41085-218 = "像這樣大家一起泡澡，感覺很開心呢。"
41085-219 = "有朝一日回到SRT特殊學園之後，也要偶爾像這樣……"
41085-220 = "[s] 「不過必須好好看守有沒有人會來呢。」"
41085-221 = "嘛，沒問題吧。反正周圍也沒有人。"
41085-222 = "隊員間坦誠相見也不是第一次了，這個時間帶也沒有人會來公園。"
41085-223 = "就算有誰來了，地雷和砲塔會有反應才對。"
41085-224 = "……話說老師為什麼會在這裡？"
41085-225 = "[s3] 「就有點像是順其自然在這裡……」\n[s] 「……負責看守？」"
41085-232 = "……"
41085-234 = "喂，你為什麼在啊！？看學生洗澡的樣子也太超過了吧！？"
41085-235 = "這下就算被開槍也不准抱怨哦！？"
41085-236 = "果，果然是看準了作戰結束後，解除武裝的空隙……！？"
41085-237 = "……萌，準備導彈。"
41085-238 = "好耶，接招吧！！"
41085-244 = "兔寶寶公園．鄰近小路"
41085-245 = "隊長，看來那座公園來了新人。"
41085-246 = "所謂緣分，就是隨風而來，隨風而去……"
41085-247 = "至於好壞，沒辦法立刻斷定。"
41085-248 = "只是她們若期望和我們共存……則必須抱持「無所有」的心，享受原始的狀態。"
41085-249 = "……各位覺得如何呢？#n她們和我們一樣是以無所有為榮的高潔存在嗎？"
41085-250 = "不。別說無所有，她們根本滿身欲望。"
41085-251 = "而且莫名有行動力，廢棄便當幾乎都被拿走……連至今為止都不曾消失過的豆芽菜便當也是！"
41085-252 = "廢材類也幾乎都被拿走……我們要補修也無法如意。"
41085-253 = "原來如此……雖然是難得的緣分，卻被物慾侵蝕了嗎……"
41085-260 = "雖然不想引起騷動……不過好吧，請準備武器。"
41085-262 = "一群被物慾蒙蔽雙眼，遺失道德的凡夫俗子……"
41085-264 = "告訴她們「無所有的喜悅」吧！"
41085-266 = "下一話;悄悄接近的黑影"

41085-12 = "4;미야코;99\n#4;greeting\n#wait;1500"
41085-13 = "4;미야코;05;여기는 RABBIT 1. 캠프 RABBIT, 소대가 막 포인트 에코에 도착했습니다. 목표로 한 <당근>도 무사히 확보. 다행히 부상자는 없습니다만…….\n#4;em;[반응]"
41085-14 = "4;미야코;10;조금 전의 교전으로 인해 최초에 계획했던 퇴로를 사용할 수 없게 되었습니다."
41085-15 = "4;미야코;99;게다가 지금도 계속해서 적이 증원되고 있는 상황이라……."
41085-16 = "#all;hide"
41085-17 = "3;통신모에;05;내 그럴 줄 알았어. 사키가 하는 일이 다 그렇지 뭐.\n#3;a"
41085-18 = "3;통신모에;06;이론만 완벽하지, 실기 실습에서는 언제나 실수투성이였으니까."
41085-19 = "5;사키 헬멧;10;시끄러워! 그러는 모에 너도 실기 점수는 언제나 바닥이었잖아?\n#5;hophop\n#5;al\n#3;m1"
41085-20 = "5;사키 헬멧;04;뭐가 문제였지? 분명 완벽한 작전이었는데……!\n#5;stiff\n#fontsize;50"
41085-21 = "[s] \"세상일이라는 게 생각과는 늘 다른 법이지.\""
41085-22 = "5;사키 헬멧;04;으읏. SRT의 위력을 보여줄 모처럼의 기회였는데. 하필이면 다른 사람도 아닌 샬레의 선생님 앞에서 이런 추태를 보이다니……."
41085-23 = "#all;hide"
41085-24 = "3;미야코;02;그나저나 미유는 어디에 있죠? 아까 전부터 모습이 보이지 않습니다만…….\n#3;em;[반응]"
41085-25 = "1;통신모에;04;응? GPS 상에는 지금도 너희랑 같이 있는 것으로 표시되고 있는데?\n#1;a\n#3;m5\n#1;em;[?]"
41085-26 = "#all;hide"
41085-27 = "3;사키 헬멧;08;뭐라고? 설마…….\n#3;shake\n#3;em;[?!]"

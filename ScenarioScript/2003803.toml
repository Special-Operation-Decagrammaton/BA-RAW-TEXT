2003803-1 = "#title;추운 나라에서 온 비서실장"
2003803-2 = "3;토모에 치파오;06\n#3;a\n#wait;1000"
2003803-3 = "3;토모에 치파오;11;후우…….\n#3;em;[한숨]"
2003803-4 = "[s] \"많이 더워?\""
2003803-5 = "3;토모에 치파오;06;그렇네요. 아무래도 붉은겨울보다는 산해경의 기온이 조금 더 높은 것 같고."
2003803-6 = "3;토모에 치파오;08;그래서 이런 옷으로 갈아입었습니다만, 뭐라고 해야 할까요."
2003803-7 = "3;토모에 치파오;05;기본적으로 온도를 느끼는 체질 자체가 다른 것 같다고 표현해야 하려나요."
2003803-8 = "3;토모에 치파오;11;그래서 뭔가, 시원한 마실 것이라도 찾기 위해 이곳까지 왔지만…….\n#3;em;…"
2003803-9 = "[s] \"……그다음부터는 나도 알 것 같네.\""
2003803-10 = "3;토모에 치파오;09;네. 산해경 어디에서도 차가운 음료는 준비하고 있지 않는 모양이더군요.\n#3;jump\n#3;em;[한숨]"
2003803-11 = "3;토모에 치파오;11;차가운 것은 몸에 좋지 않고, 특히 소화기관에 나쁘다고……."
2003803-12 = "3;토모에 치파오;08;갑자기 찬 물을 마시고 체하는 경우도 제법 있는 편이니, 완전히 틀린 말은 아니겠지만."
2003803-13 = "3;토모에 치파오;09;그렇다고는 해도 이렇게 더운데 따듯한 차만 마셔야 한다는 것도, 조금, 말이죠?"
2003803-14 = "3;토모에 치파오;06;심지어 다른 학원에서라면 원래 차갑게 해서 제공하고는 하는 음료수마저도 미지근한 상태로 보관하고 있다고 하니……."
2003803-15 = "[s] \"도움이 될지는 모르겠지만, 일단 이거라도……?\""

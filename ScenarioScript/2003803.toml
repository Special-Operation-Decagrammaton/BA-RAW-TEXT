2003803-62 = "[s1] \"왜 그래, 토모에? 아직도 그렇게 더워?\"\n[s2] \"얼굴이 어째 더 붉어진 것 같은데……?\""
2003803-63 = "#wait;100"
2003803-64 = "#wait;100"
2003803-65 = "3;토모에 치파오;08;아, 아뇨. 이건 덥다기보다는……. 그, 결과적으로는 더운 게 맞기도 한데…….\n#3;em;[땀]"
2003803-66 = "3;토모에 치파오;08;조금, 부끄럽네요. 우선 이 자리를 피할까요?"
2003803-67 = "[s] \"그런 거라면 좋은 생각이 있어!\""
2003803-68 = "3;토모에 치파오;02;네? 바오빙(刨冰)을 먹으러 가자고요? 그게 뭐죠?\n#3;em;[?]"
2003803-69 = "3;토모에 치파오;03;아……. 빙수의 일종이군요. 좋네요! 지금 저희에게 가장 필요한 음식인 것 같아요."
2003803-70 = "3;토모에 치파오;07;가는 길에…… 부채로 바람을 부쳐 드릴게요. 어떠신가요?\n#3;em;[음표]"
2003803-71 = "#all;hide"
2003803-72 = "#na;(그렇게 토모에와 함께 시원한 것을 먹으러 거리로 나섰다.)"
2003803-73 = "#na;(가위바위보를 해 서로에게 부채를 부쳐 주거나, 부쳐짐을 당하거나 하는 장난을 치면서.)"

2003803-23 = "3;토모에 치파오;03;현룡문에서 받은 부채라고요? 후후. 그런 것 치고는 예쁘네요. 귀엽기도 하고요.\n#3;greeting"
2003803-24 = "3;토모에 치파오;01;붉은겨울에서는, 특성상 부채를 거의 쓰지 않았습니다만……."
2003803-25 = "3;토모에 치파오;02;조금 흥미가 생기네요. 어디…….\n#3;em;…"

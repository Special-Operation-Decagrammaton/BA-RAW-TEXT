[translation]
2003803-1 = "來自寒冷國度的秘書室長"
2003803-3 = "呼……"
2003803-4 = "[s]「很熱嗎？」"
2003803-5 = "是啊。畢竟山海經的氣溫確實比赤冬高了一點。"
2003803-6 = "雖然已經換上了這種服裝，不過該怎麼說呢……？"
2003803-7 = "因為體質的差異，感受到的溫度也會有所不同。"
2003803-8 = "所以才打算來這裡找冰涼的飲料……"
2003803-9 = "[s]「……接下來的事我好像知道了。」"
2003803-10 = "是的，山海經各處似乎都沒有冷飲。"
2003803-11 = "據說是因為冷飲對身體不好，尤其是對消化器官無益的關係……"
2003803-12 = "雖然很多人確實會因為突然喝冰水而嗆到，所以那麼說也不無道理……"
2003803-13 = "但這麼熱的天氣，只喝熱茶實在有點……對吧？"
2003803-14 = "而且其他學園都會把飲料做成冰的，這裡卻是以溫熱的狀態保存……"
2003803-15 = "[s]「雖然不知道能不能幫上忙，但這個你先拿去吧……？」"
2003803-22 = "哎呀，這是……？"
2003803-23 = "是玄龍門給的團扇？#n呵呵，以扇子來說還真是漂亮可愛呢。"
2003803-24 = "基於赤冬的特性，我們那邊幾乎沒有使用扇子的機會……"
2003803-25 = "讓人有點感興趣呢。那麼……"
2003803-29 = "― [log=토모에 치파오]涼爽的風……恰到好處的陰影……[/log][wa:4180] "
2003803-30 = "― [log=토모에 치파오]再用團扇消暑……[/log][wa:3090] "
2003803-33 = "― [log=토모에 치파오]呵呵，這確實是不曾有過的經驗。[/log][wa:3540] "
2003803-36 = "― [log=토모에 치파오]這一次又一次的經驗……[/log][wa:1580] "
2003803-37 = "― [log=토모에 치파오]能夠讓視野更加寬廣呢。[/log][wa:4110] "
2003803-40 = "[ns]「智惠寬廣的視野……我也想看看呢。」"
2003803-42 = "― [log=토모에 치파오]哎呀？或許那並不是多有趣的東西也說不定唷？[/log][wa:4140] "
2003803-45 = "― [log=토모에 치파오]呵呵，老師。別在那種地方看著……[/log][wa:3450] "
2003803-46 = "― [log=토모에 치파오]請過來這邊。[/log][wa:2700] "
2003803-49 = "― [log=토모에 치파오]來，我會為您用團扇搧風的。[/log][wa:4270] "
2003803-54 = "喂，你看那邊的欄杆。"
2003803-55 = "怎麼了？#n啊……"
2003803-56 = "怎麼樣？氣氛很棒吧？"
2003803-57 = "真是……讓人目不轉睛。#n優雅、美麗、有氣度……"
2003803-58 = "不過是一把簡約的團扇……"
2003803-59 = "在那位同學的手中，看起來就變得好高級……"
2003803-61 = "……！"
2003803-62 = "[s1]「智惠，你怎麼了？還是很熱嗎？」\n[s2]「臉怎麼好像變得更紅了……？」"
2003803-65 = "不，不是的。我並不是因為熱才……#n雖然從結果來說，是很熱沒錯……"
2003803-66 = "有點害羞……我們先離開這裡吧？"
2003803-67 = "[s]「那我有個好主意！」"
2003803-68 = "嗯？您說要去吃刨……冰？#n那是什麼呢？"
2003803-69 = "啊……原來是剉冰的一種啊。#n好的！這應該是我們現在最需要的食物了。"
2003803-70 = "那就由我在路途中……用扇子為您搧風吧？"
2003803-72 = "（於是便和智惠一起到街上吃冰涼的食物）"
2003803-73 = "（路上還一邊玩著以猜拳互相幫對方搧風的遊戲）"

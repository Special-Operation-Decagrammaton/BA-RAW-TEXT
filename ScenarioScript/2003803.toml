[translation]
2003803-1 = "Chief Secretary from a Cold Country"
2003803-3 = "Phew..."
2003803-4 = "[s] \"Are you really hot?\""
2003803-5 = "I am. Shanhaijing's temperature runs much higher than Red Winter's."
2003803-6 = "That's why I changed into this outfit, but, how can I put this...?"
2003803-7 = "Even the way our bodies absorb heat feels different here."
2003803-8 = "That's why I came here, to look for something cool to drink. However..."
2003803-9 = "[s] \"...I think I know the rest.\""
2003803-10 = "Yes. I don't believe a single vendor in Shanhaijing sells cold drinks."
2003803-11 = "I understand that cold drinks are bad for your digestive system..."
2003803-12 = "In fact, even I've experienced an upset stomach when imbibing too much cold water. The sentiment isn't wrong."
2003803-13 = "But it just doesn't seem right to drink warm tea on a hot day like this, does it?"
2003803-14 = "Meanwhile, some academies even go so far as to warm up drinks meant to be served cold..."
2003803-15 = "[s] \"I don't know if it'll help, but how's this for now...?\""
2003803-22 = "Oh my, this is...?"
2003803-23 = "A fan from Genryumon? Heehee. It's actually quite pretty. And cute."
2003803-24 = "By nature, fans aren't really needed nor used at Red Winter..."
2003803-25 = "But I'm rather intrigued. Let's see..."
2003803-29 = "― [log=토모에 치파오]A cool breeze... Adequate shade...[/log][wa:3420] "
2003803-30 = "― [log=토모에 치파오]And a nice fan for circulation...[/log][wa:2090] "
2003803-33 = "― [log=토모에 치파오]Heehee. This is a new experience for me.[/log][wa:2540] "
2003803-36 = "― [log=토모에 치파오]Experiences like this[/log][wa:1180] "
2003803-37 = "― [log=토모에 치파오]contribute to and broaden your perspectives.[/log][wa:2790] "
2003803-40 = "[ns] \"Tomoe's broad perspective... I'd like to see that.\""
2003803-42 = "― [log=토모에 치파오]Oh my. It might not be as interesting as you think.[/log][wa:2940] "
2003803-45 = "― [log=토모에 치파오]Heehee, Sensei. Don't just watch from there...[/log][wa:2250] "
2003803-46 = "― [log=토모에 치파오]Come over here.[/log][wa:2340] "
2003803-49 = "― [log=토모에 치파오]Now, allow me to fan you.[/log][wa:3790] "
2003803-54 = "Hey, look at that railing over there."
2003803-55 = "What is it? Oh, wow..."
2003803-56 = "Right? Isn't it a whole vibe?"
2003803-57 = "I can't help but to just...stare. Graceful, beautiful, elegant."
2003803-58 = "It's your standard, everyday fan."
2003803-59 = "But somehow the way she moves it makes it look so luxurious."
2003803-61 = "...!"
2003803-62 = "[s1] \"What's wrong, Tomoe? Are you still hot?\"\n[s2] \"Your face looks even redder...\""
2003803-65 = "N-No. It's not because I'm... Well, I suppose it is hot, in the grand scheme of things."
2003803-66 = "However, I'm actually feeling rather embarrassed. Perhaps we should leave?"
2003803-67 = "[s] \"In that case, I have a great idea!\""
2003803-68 = "What? You want to go eat baobing? What's that?"
2003803-69 = "Oh...a type of shaved ice? Excellent! That sounds like exactly the treat we need."
2003803-70 = "How about on the way, I continue to fan you? How does that sound?"
2003803-72 = "Tomoe and I set out on our mission to enjoy something cold."
2003803-73 = "On the way, we played \"Rock, Paper, Scissors,\" to see who would fan and be fanned."

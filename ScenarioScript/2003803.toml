[translation]
2003803-1 = "หัวหน้าเลขาจากแดนหนาว"
2003803-3 = "ฮู่ว..."
2003803-4 = "[s] \"ร้อนมากเลยเหรอ?\""
2003803-5 = "ใช่ค่ะ ดูเหมือนว่าที่ซานไห่จิงอากาศจะร้อนกว่าที่เรดวินเทอร์เยอะเลย"
2003803-6 = "ฉันเลยเปลี่ยนมาใส่ชุดนี้ค่ะ แต่จะว่ายังไงดีล่ะคะ..."
2003803-7 = "จะเรียกว่าความไวต่ออุณหภูมิมันแตกต่างกันได้รึเปล่านะ..."
2003803-8 = "ฉันก็เลยมาที่นี่เพื่อหาอะไรเย็นๆ ดื่ม..."
2003803-9 = "[s] \"เรื่องต่อจากนี้ครูพอเดาได้แล้วละ...\""
2003803-10 = "ค่ะ ดูเหมือนว่าที่ซานไห่จิงจะไม่มีพวกเครื่องดื่มเย็นๆ เลยนะคะ"
2003803-11 = "พวกเขาบอกว่าของเย็นๆ ไม่ดีต่อร่างกาย โดยเฉพาะต่อระบบย่อยอาหาร..."
2003803-12 = "ที่พูดมาก็ไม่ผิดหรอกค่ะเพราะมีหลายกรณีที่ดื่มน้ำเย็นแล้วไม่สบายอยู่ด้วย"
2003803-13 = "แต่ถึงอย่างนั้น การดื่มชาร้อนตอนอากาศร้อนขนาดนี้มันแปลกนิดหน่อยใช่มั้ยล่ะคะ?"
2003803-14 = "แถมพวกเครื่องดื่มที่โรงเรียนอื่นดื่มกันแบบเย็นๆ ที่นี่จะทำให้อุ่นด้วย..."
2003803-15 = "[s] \"ไม่รู้จะช่วยได้รึเปล่า แต่รับนี่ไปก่อนแล้วกัน...\""
2003803-22 = "ตายจริง นี่มัน...?"
2003803-23 = "พัดที่ได้มาจากมังกรดำเหรอคะ? ฮุฮุ สวยมากเลยค่ะ แถมยังน่ารักอีกด้วย"
2003803-24 = "ที่เรดวินเทอร์ไม่ค่อยได้ใช้พัดสวยงามแบบนี้เท่าไรค่ะ..."
2003803-25 = "ชักสนใจขึ้นมาแล้วละค่ะ ไหนดูซิ..."
2003803-29 = "― [log=토모에 치파오]สายลมเย็นสบาย... ร่มเงาที่พอเหมาะ...[/log][wa:3340] "
2003803-30 = "― [log=토모에 치파오]นอกจากนี้ยังใช้พัดช่วยพัดได้...[/log][wa:2170] "
2003803-33 = "― [log=토모에 치파오]ฮุฮุ นี่เป็นครั้งแรกที่ฉันได้สัมผัสประสบการณ์แบบนี้เลยค่ะ[/log][wa:1860] "
2003803-36 = "― [log=토모에 치파오]ประสบการณ์แต่ละอย่างนี้...[/log][wa:980] "
2003803-37 = "― [log=토모에 치파오]คงทำให้สายตาของฉันกว้างไกลขึ้นสินะคะ[/log][wa:3110] "
2003803-40 = "[ns] \"สายตากว้างไกลของโทโมเอะ... ครูอยากเห็นเหมือนกันแฮะ\""
2003803-42 = "― [log=토모에 치파오]ตายจริง? แต่ว่ามันอาจจะไม่ได้สนุกอะไรหรอกนะคะ?[/log][wa:3140] "
2003803-45 = "― [log=토모에 치파오]ฮุฮุ คุณครูอย่ามัวมองจากที่ตรงนั้นเลยค่ะ...[/log][wa:2370] "
2003803-46 = "― [log=토모에 치파오]มาทางนี้สิคะ[/log][wa:2460] "
2003803-49 = "― [log=토모에 치파오]เอาละค่ะ ฉันจะใช้พัดพัดให้คุณครูเองค่ะ[/log][wa:3270] "
2003803-54 = "นั่น ดูตรงบันไดนั่นสิ"
2003803-55 = "มีอะไรเหรอ? เอ๊ะ เดี๋ยวก่อนนะ..."
2003803-56 = "คิดเหมือนกันใช่มั้ย? บรรยากาศเหมาะเลยนะว่ามั้ย?"
2003803-57 = "ก็แค่... ชวนมองจังเลยนะ สง่างาม สวย แล้วก็ดูภูมิฐาน..."
2003803-58 = "ทั้งที่เป็นแค่พัดทรงกลมธรรมดาๆ..."
2003803-59 = "แต่พอคนคนนั้นใช้พัด มันดูสง่างามชั้นสูงมากเลย..."
2003803-61 = "...!"
2003803-62 = "[s1] \"มีอะไรเหรอ โทโมเอะ? ยังร้อนอยู่เหรอ?\"\n[s2] \"ทำไมหน้าแดงขนาดนั้นล่ะ...?\""
2003803-65 = "ปะ... เปล่าค่ะ ตอนนี้ฉันไม่ได้ร้อนแล้ว... ตะ... แต่มันเป็นเพราะความร้อนก็จริง..."
2003803-66 = "แต่ว่าฉันรู้สึกอายนิดหน่อยน่ะค่ะ เราไปจากตรงนี้กันก่อนดีมั้ยคะ?"
2003803-67 = "[s] \"ถ้างั้นไปกินอันนั้นกันดีกว่า!\""
2003803-68 = "คะ? ชวนไปกินเป้าปิงงั้นเหรอคะ? มันคืออะไรเหรอคะ?"
2003803-69 = "อ่า... น้ำแข็งไสชนิดหนึ่งนี่เอง ดีเลยค่ะ! ตอนนี้ฉันต้องการอาหารเติมพลังเหมือนกันค่ะ"
2003803-70 = "และระหว่างเดินไป... ฉันจะคอยพัดให้คุณครูเองค่ะ ดีมั้ยคะ?"
2003803-72 = "(หลังจากนั้นคุณครูกับโทโมเอะก็เดินไปหาอะไรเย็นๆ กินด้วยกัน)"
2003803-73 = "(และระหว่างทางก็เล่นเป่ายิงฉุบพลัดกันพัดบ้าง หรือไม่ก็หยอกล้อโดยใช้พัดตีกันบ้าง)"

2003803-54 = "2;산해경 모브 학생 A;02;저기, 저 난간 좀 봐.\n#2;em;[반응]"
2003803-55 = "4;산해경 모브 학생 B;02;뭔데 그래? 어, 잠깐……."
2003803-56 = "2;산해경 모브 학생 A;03;그렇지? 분위기 살지?\n#2;jump"
2003803-57 = "4;산해경 모브 학생 B;03;그냥…… 바라보게 되네. 우아하고, 아름답고, 기품있고……."
2003803-58 = "2;산해경 모브 학생 A;02;그저 단순하게 만든 둥글부채일 뿐인데……."
2003803-59 = "4;산해경 모브 학생 B;01;저분이 흔드니까, 엄청 고급스러워 보여…….\n#4;em;…"
2003803-60 = "3;토모에 치파오;10\n2;산해경 모브 학생 A;02\n4;산해경 모브 학생 B;01\n#2;hide\n#4;hide\n#3;a\n#3;h"

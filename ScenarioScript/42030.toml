42030-66 = "3;모에;05;그럴 리가 있겠냐!\n#3;em;[!]"
42030-67 = "3;모에;12;주변의 CCTV 기록 말이야. 샬레 건물의 출입문을 비추고 있는 근처의 CCTV 영상을 해킹하면 누가 언제 건물에 출입했는지, 무엇을 들고 갔는지 확인할 수 있으니까."
42030-68 = "3;모에;02;어차피 선생님이 납치되고 나서 샬레가 탈환될 때까지는 오래 걸리지 않았고. 출입 인원도 특정할 수 있으니, 누군가 수상한 물건을 가지고 빠져나갔다면 영상으로 확인할 수 있을 거야.\n#3;em;[음표]"
42030-69 = "3;모에;02\n5;사키;02;오, 모에 답지 않은 똑똑한 발상인데.\n#5;em;[반응]\n#3;m1\n#5;al"

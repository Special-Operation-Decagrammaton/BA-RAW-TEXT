[translation]
42030-1 = "ตอนที่ 3;เหยื่อล่อ"
42030-3 = "อืม.. ย่างแค่นี้ก็น่าจะพอแล้วนะ"
42030-4 = "ถ้างั้นก็..."
42030-6 = "จะทานให้อร่อยเลยค่ะ!"
42030-11 = "อะไรเนี่ย เนื้อนี่มันอะไรกัน? เป็นเนื้อที่อร่อยที่สุดเท่าที่ฉันเคยกินมาเลย!"
42030-13 = "เนื้อสัมผัสนุ่มๆ จากริ้วชั้นไขมันที่แทรกตัวบนเนื้อ และก็รสกลมกล่อมอันเป็นเอกลักษณ์ของเนื้อวัว#nคุณภาพสูง..."
42030-14 = "เทียบกับเนื้อสันนอกนี่แล้ว เนื้อที่อยู่ในข้าวกล่องที่เรากินๆ กันนี่อย่างกับเนื้อปลอมเลย..."
42030-15 = "พอใส่ปากก็ละลาย... เหมือนกับได้กินพุดดิ้งนุ่มๆ ยังไงยังงั้น..."
42030-16 = "เป็นเนื้อคุณภาพเยี่ยมจริงๆ เลยนะคะ... ฉันไม่ได้กินอาหารหรูๆ แบบนี้มานานจนรู้สึกผิดกับลิ้นตัวเอง#nเลยค่ะ"
42030-17 = "[ns] \"ครูหิ้วเนื้อมาพอสำหรับทุกคนเลย ค่อยๆ กินกันนะ\""
42030-18 = "เอ่อ... ถึงจะบอกว่านี่เป็นการตอบแทนเรื่องคราวก่อนก็เถอะ แต่การซื้อเนื้อวัวชั้นดีราคาแพงมาให้พวก#nฉันแบบนี้จะไม่เป็นไรเหรอคะ?"
42030-19 = "... นั่นน่ะสิ ถึงจะเป็นการตอบแทนเรื่องที่พวกเราไปช่วย แต่แบบนี้มันก็ฟู่ฟ่าเกินไปนะ"
42030-20 = "หรือว่า... เนื้อนี่คือเหยื่อที่ใช้ล่อพวกฉันให้ติดกับรึเปล่า?!"
42030-21 = "หลอกให้อีกฝ่ายตกหลุมพรางด้วยอาหารอร่อยๆ งั้นเหรอ..."
42030-22 = "ที่เขาเรียกกันว่าแผนนารีพิฆาต...?"
42030-23 = "[s1] \"แผนนารีพิฆาตไม่ได้มีความหมายแบบนั้นนะ...\"\n[s2] \"นี่เป็นแค่น้ำใจจากครูน่ะ ไม่ต้องเกรงใจหรือคิดมากกันนะ\""
42030-24 = "ถึงจะใช่ก็ไม่เห็นเป็นไรเลย ถ้าเป็นกับดักอร่อยๆ แบบนี้ละก็ ฉันเต็มใจติดกับให้เลย"
42030-25 = "ถึงจะใช่ก็ไม่เห็นเป็นไรเลย ถ้าเป็นกับดักอร่อยๆ แบบนี้ละก็ ฉันเต็มใจติดกับให้เลย"
42030-26 = "ประสบการณ์ล้ำค่าที่ได้อิ่มท้องด้วยเนื้อวัวเกรดพรีเมียมแบบนี้น่ะ ต่อให้ได้กลับไปสถาบัน SRT ก็คงหา#nไม่ได้หรอก"
42030-27 = "นั่นน่ะสิ ปกติเราประทังท้องกันด้วยหมูผัดกระป๋องราคาถูกๆ นี่เนอะ ฮุฮุ"
42030-28 = "อึก... กำลังกินเนื้ออร่อยๆ อยู่แท้ๆ อย่าพูดให้ไม่อยากอาหารสิ..."
42030-29 = "จริงค่ะ อาหารต่อสู้กลางแจ้งที่ทาง SRT แจกให้ก็มีแต่หมูหมักเกลือมาตลอดเลยค่ะ"
42030-30 = "มีครั้งหนึ่งที่การฝึกจัดค่ายพักชั่วคราวที่จัดขึ้นโดยกองทหารภายนอกกินเวลานานกว่าที่คิด เราก็เลยต้องกินเนื้อหมูในกระป๋องติดต่อกันสี่วันเลยค่ะ..."
42030-31 = "ต้องมากินเนื้อหมูกระป๋องที่มันๆ และน่าชวนแหวะตั้งแต่เช้า.. ฉันไม่อยากเจอประสบการณ์แบบนั้นอีก#nแล้ว..."
42030-33 = "ว่าแต่ทำไมเสบียงของแจกของ SRT ถึงมีเนื้อหมูกระป๋องเยอะขนาดนั้นนะ?"
42030-34 = "อย่างน้อยก็น่าจะมีคอร์นบีฟ หรือไม่ก็ทูน่ากระป๋องมาให้บ้างสิ จะได้กินได้โดยที่ไม่เบื่อ..."
42030-35 = "เหตุผลมันก็แน่นอนอยู่แล้ว ก็มันราคาถูกที่สุดยังไงล่ะ"
42030-36 = "พวกคนตำแหน่งสูงๆ เค้าก็ดูกันแต่ตัวเลขกันทั้งนั้นแหละ ถึงกับมีคำกล่าวในคติพจน์เก่าว่า 'จำไว้ว่าเสบียงของกองทหารต้องเป็นสินค้าที่เสนอราคาต่ำสุดเสมอ' เลยละ"
42030-37 = "โดยเฉพาะเนื้อหมูกระป๋องที่เอาเศษเนื้อมาหมักเกลือ ที่ทั้งราคาถูกและเก็บรักษาได้นานมากๆ ก็เลย#nถูกใช้เป็นอาหารหลักในยามต่อสู้มานานแล้ว"
42030-38 = "เสบียงเนื้อหมูกระป๋องมีมากเสียจนนักเขียนนิยายคนหนึ่งในทรีนิตี้อยากจะคัดค้านขึ้นมา เธอเลยแต่ง#nนิยายของตัวเองให้อาหารทุกอย่างในนิยายเป็นเนื้อหมูกระป๋องหมดเลยด้วย"
42030-39 = "ว้าว แต่นี่ไม่ใช่ข้อมูลที่ฉันอยากรู้เลยนะ"
42030-40 = "หนวกหูน่า"
42030-42 = "... จะว่าไป ในนิยายของนักเขียนคนนั้นมีตอนที่อัศวินออกตามหาจอกศักดิ์สิทธิ์แล้วไปต่อสู้กับกระต่าย#nป่าด้วยนี่คะ?"
42030-43 = "ใช่ มันมีเรื่องแบบนั้นอยู่ด้วย ว่าแต่ทำไมจู่ๆ ก็พูดเรื่องนี้ขึ้นมากันล่ะ?"
42030-44 = "ตอนที่เพิ่งก่อตั้งกองทหาร RABBIT ฉันเคยถามพวกรุ่นพี่แบบนี้น่ะค่ะ"
42030-45 = "การใช้ชื่อกองทหารว่า [ruby=RABBIT]'กระต่าย'[/ruby] ก็ฟังดูน่ารักดี แต่มันดูไม่เหมาะสมสำหรับการตั้งเป็นชื่อ#nกองทหารของ SRT ที่มีพลังแข็งแกร่งหรือเปล่า ประมาณนี้น่ะค่ะ"
42030-46 = "พอถามไปแบบนั้น พวกรุ่นพี่ก็ตอบแบบอ้างอิงนิยายเรื่องนั้นว่า"
42030-47 = "'ถ้ามองผ่านๆ จะเห็นว่ากระต่ายเป็นสัตว์ที่ดูอ่อนโยนและน่ารัก แต่เมื่อโกรธขึ้นมา จะกลายเป็นสัตว์#nน่ากลัวที่พอจะต่อสู้กับกองอัศวินติดอาวุธได้เลย'"
42030-48 = "ก็ฟังดูมีเหตุผลนะ ถึงนี่จะเป็นเรื่องในนิยายก็เถอะ แต่อัศวินที่ตามหาจอกศักดิ์สิทธิ์ถึงกับโดนกระต่าย#nที่เฝ้าถ้ำกัดคอเข้าให้เลยนะ"
42030-49 = "ถ้าดูถูกฝ่ายตรงข้ามเพราะดูจากแค่ภายนอก ไม่ว่าใครก็ต้องตกอยู่ในสภาพแบบนั้นกันทั้งนั้นแหละ"
42030-50 = "แล้วตอนจบของเรื่องนั้นเป็นยังไงเหรอ? อัศวินเลิกตามหาจอกศักดิ์สิทธิ์เพราะกระต่ายหรือเปล่า?"
42030-51 = "เปล่า ในตอนจบกระต่ายโดนระเบิดมือที่อัศวินปาใส่จนตัวแหลกไม่เป็นชิ้นดีเลยละ..."
42030-52 = "ว่าแล้วเชียว... ต่อให้เป็นกระต่ายที่ดุร้ายแค่ไหน แต่พออยู่ต่อหน้าปืนกับระเบิดมือแล้วก็ต้องขยาดกัน#nหมดสินะ..."
42030-53 = "อนาคตของพวกเราก็น่าจะไม่ต่างกันเลย..."
42030-54 = "เอาเหอะ ตอนจบของนิยายโบราณๆ มันจะเป็นยังไงก็ไม่สำคัญอยู่แล้วนี่?"
42030-55 = "ตอนนี้มาโฟกัสกับรสชาตินุ่มลิ้นของเนื้อวัวพรีเมียมนี้กันดีกว่า"
42030-57 = "ว่าแต่คุณครูคะ ตอนที่ไคเซอร์ PMC บุกมายึดชาเล่ต์คราวก่อน มีสิ่งของหรือเอกสารอะไรหายไปบ้าง#nไหมคะ?"
42030-58 = "ในอาคารชาเล่ต์มีของมีค่าที่เกี่ยวกับองค์การนักเรียนอยู่ไม่น้อย ฉันก็เลยเป็นกังวลน่ะค่ะ..."
42030-59 = "[s] \"ไม่น่าจะมีอะไรหายไปนะ...\""
42030-61 = "[ns3] \"ส่วนใหญ่พวกข้าวของข้างในก็กระจัดกระจายกันหมด\"\n[ns4] \"เห็นทีต้องหาเวลาไปตรวจสอบดูหน่อยแล้วละ\""
42030-62 = "... ถ้าเป็นเรื่องนั้น ฉันตรวจสอบให้ได้ตอนนี้เลย"
42030-63 = "... ถ้าเป็นเรื่องนั้น ฉันตรวจสอบให้ได้ตอนนี้เลย"
42030-64 = "ด้วยวิธีไหนกันล่ะ?"
42030-65 = "โมเอะจัง อย่าบอกนะว่า... จะไปแอบแลกเปลี่ยนข้อมูลกับไคเซอร์ PMC เพื่อตอบแทนเรื่องอาวุธน่ะ..."
42030-66 = "จะเป็นแบบนั้นได้ยังไงเล่า!"
42030-67 = "จากบันทึกกล้องวงจรปิดแถวนั้นต่างหาก ถ้าเราแฮ็กวิดีโอจากกล้องวงจรปิดที่ถ่ายแถวๆ ประตูเข้าออก#nอาคารชาเล่ต์ได้ เราก็จะเช็กได้ว่าใครเข้าออกอาคารไปตอนไหนบ้างและถืออะไรกลับไปบ้างยังไงล่ะ"
42030-68 = "ตั้งแต่ตอนที่คุณครูโดนลักพาตัวจนถึงตอนที่ยึดชาเล่ต์คืนมาได้ก็ไม่ได้กินเวลานานเท่าไรด้วย ถ้ามีใครที่ถือของน่าสงสัยๆ ออกมา เราก็น่าจะเห็นได้จากวิดีโอนะ"
42030-69 = "หืม เป็นแผนการที่ฉลาด ไม่สมกับเป็นโมเอะเลยนะ"
42030-70 = "หรือว่าพอได้กินเนื้อราคาแพง สมองก็เลยดีขึ้นมา?"
42030-71 = "หนวกหูน่า เดี๋ยวก็จุดระเบิดซะเลยนี่!"
42030-75 = "เรื่องระบบการรักษาความปลอดภัยของคลาวด์เซิร์ฟเวอร์ที่มีวิดีโอจากกล้องวงจรปิดของอาคารละก็ ใช้แค่เครื่องปลายทางแบบพกพาก็แฮ็กได้แล้ว..."
42030-80 = "... เจอแล้ว! วิดีโอจากบริเวณรอบๆ ในวันที่เกิดเหตุ!"
42030-84 = "อ๊ะ... นี่มันวิดีโอก่อนที่จะยึดชาเล่ต์กลับมาได้นี่นา"
42030-85 = "พวกที่ใส่หมวกกันน็อกมีกระบังหน้าตรงนี้คือพวก SOF หรือ SOAP ของไคเซอร์ใช่ไหม? พอเทียบกับ#nอาวุธชิ้นใหญ่โตที่ถือมาด้วยแล้ว พวกนั้นดูเป็นคนธรรมดามากกว่าที่คิดอีกแฮะ"
42030-87 = "ต้องขอบใจที่มิยุช่วยลอบยิงเบี่ยงเบนความสนใจของศัตรูได้เลยนะคะ ถ้าพวกนั้นบุกเข้ามาด้านหน้า พวกเราเองก็คงได้รับความเสียหายไปไม่น้อยเลยค่ะ"
42030-88 = "ถ้าเป็นตอนนั้น... ต้องขอบคุณซากิจังกับมิยาโกะจังที่ช่วยเปิดงานให้ก่อนมากกว่า ฉันก็เลยรู้ตำแหน่ง#nของศัตรูจนลอบยิงได้โดยที่ไม่ต้องลำบากอะไรมากน่ะ"
42030-89 = "ฮุฮุ ตอนนั้นฉันสนุกมากเลยละ..."
42030-90 = "...ทำไมจู่ๆ บรรยากาศถึงเหมือนเรากลับไปเปิดหนังสือรุ่นดูอีกครั้งเลยล่ะ? บอกให้สังเกตมือของทหาร#nที่เดินเข้าออกชาเล่ต์ ไม่ใช่ให้มารำลึกความหลังกันสักหน่อย!"
42030-92 = "อืม... ช่วงนั้นพวกเราน่าจะยืนสังเกตการณ์กันอยู่นะ งั้นลองเลื่อนไปดูในเวลาหลังจากนั้นหน่อย..."
42030-96 = "หืม? ทหารที่ปิดหน้าพวกนี้เป็นใครกันน่ะ? ไม่เห็นเหมือนคนของไคเซอร์ PMC เลย"
42030-100 = "เจ้าคนพวกนี้... เหมือนจะหยิบเอาอะไรออกมาจากชั้นใต้ดินของอาคารชาเล่ต์เลย ตอนเข้าไปก็ไปแบบ#nมือเปล่าๆ แต่พอตอนออกมากลับมีของติดมือมาด้วย"
42030-101 = "[s] \"เช็กดูได้ไหมว่าของที่ว่าคืออะไร?\""
42030-102 = "หน้าจอไม่ค่อยละเอียดเท่าไรเลย แถมพวกนั้นยังเดินกันเร็วมากๆ เลยด้วย..."
42030-103 = "หืม ดูจากการเคลื่อนไหวแล้ว ดูเป็นทหารที่ได้รับการฝึกมาไม่ใช่เล่นๆ เลยนะ อาวุธที่ใช้ก็อยู่ในระดับ#nแนวหน้าอีก..."
42030-108 = "... ซากิเองก็สังเกตุเห็นเหมือนกันสินะคะ"
42030-109 = "... อืม ใช่ อุปกรณ์อันนั้นมัน..."
42030-111 = "ทำไมๆ? คุยเรื่องอะไรกันอยู่เหรอ ทำไมถึงทำหน้าเครียดกันขนาดนั้นล่ะ?"
42030-112 = "พวกทหารปริศนาที่ขโมยของออกจากชั้นใต้ดินของชาเล่ต์... เหมือนกำลังใช้อาวุธของ SRT อยู่เลยค่ะ"
42030-113 = "มะ... หมายความว่ายังไง? อุปกรณ์ของ SRT งั้นเหรอ...?"
42030-114 = "เห็นคนที่ท่าทางเหมือนเป็นหัวหน้าไหม ตัวชี้เลเซอร์ที่เธอใช้อยู่เป็นตัวชี้แบบคู่ที่มีทั้งรังสีอินฟราเรด และก็แสงที่มองเห็นได้"
42030-115 = "นอกจากจะเป็นของที่ราคาแพงหูฉี่แล้ว มันจะไม่มีประโยชน์เลยถ้าไม่มีอุปกรณ์ในการมองเห็นตอน#nกลางคืน ตัวชี้นี้เลยไม่มีบันทึกการผลิตอย่างเป็นทางการ นอกจากจะแจกจ่ายให้กับนักเรียน SRT น่ะ"
42030-116 = "แถมวิทยุสื่อสารมัลติฟังก์ชันที่พวกทหารเอาไว้ติดต่อแบบไร้สายนั่นก็ด้วย... ถึงจะยังฟันธงไม่ได้ แต่มันก็#nมีส่วนที่จะเป็นอุปกรณ์ของ SRT อยู่นะ ดูจากดีไซน์แล้ว มันไม่เหมือนกับของผลิตจากไคเซอร์ อินดัสทรี อย่างสิ้นเชิงเลย"

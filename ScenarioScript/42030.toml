[translation]
42030-1 = "第3話;誘餌"
42030-3 = "嗯……這樣應該烤得差不多了。"
42030-4 = "那麼……"
42030-6 = "我要開動囉！"
42030-11 = "這，這個味道……實在太罪惡了……！！"
42030-13 = "一口就能感受到油花在口中蔓延……#n凝結的鮮味充滿整個口腔……"
42030-14 = "跟它比起來，至今為止吃過的牛肉到底都是些什麼東西啊……"
42030-15 = "這種入口即化的感覺……還有香甜的油脂……"
42030-16 = "真的是很棒的肉呢……#n也許是因為實在太奢侈，舌頭都產生罪惡感了……"
42030-17 = "[ns]「肉有很多，多吃點哦。」"
42030-18 = "那個……真的沒關係嗎？#n雖然說是上次事情的謝禮，竟然買這麼多昂貴的牛肉給我們……"
42030-19 = "……說的也是，以那時的報酬來說確實太豪華了。"
42030-20 = "該不會……這些肉是想讓我們掉入陷阱的誘餌！？"
42030-21 = "用香甜的食物來讓對方掉入陷阱……"
42030-22 = "這，這就是傳說中的蜜糖陷阱……？"
42030-23 = "[s1]「感覺意思好像有點不太一樣……」\n[s2]「只是單純的謝禮，不用想太多。」"
42030-24 = "……算了，如果是這種陷阱，要我上當幾次都行。"
42030-25 = "……算了，如果是這種陷阱，要我上當幾次都行。"
42030-26 = "像這種只用高級牛肉填飽肚子的經驗，就算回到SRT特殊學園也體驗不到吧。"
42030-27 = "就是啊。不過廉價的豬肉罐頭應該想吃多少都沒問題。"
42030-28 = "唔……難得在吃好吃的牛肉，別讓我想起來啊……"
42030-29 = "確實，SRT的野戰配給糧食一直都是鹽漬豬肉。"
42030-30 = "還有在某次宿營訓練中，曾經只吃豬肉罐頭吃了四天以上……"
42030-31 = "是在說一大早就只能吃油膩膩的豬肉罐頭的那個時候啊……#n那種糟透的回憶再也不想經歷了……"
42030-33 = "不過……SRT的補給品為什麼全都是豬肉罐頭呢？"
42030-34 = "至少給一些玉米牛肉或鮪魚罐頭也行啊……"
42030-35 = "這個嘛，想必是因為最便宜吧。"
42030-36 = "那些偉大的人最喜歡玩數字遊戲了。#n甚至有「補給品應當永遠為最低價格供應的物品」這樣的格言。"
42030-37 = "豬肉罐頭不只價格低廉，保存期限也很長。#n因此從很久以前就經常被用為戰鬥糧食。"
42030-38 = "要說有多愛用的話……甚至有某位三一的小說家因為餐點實在出現太多豬肉罐頭，#n多到把自己作品內出現的所有食物都換成豬肉罐頭來抗議。"
42030-39 = "現在又不是在吃豬肉罐頭，用不著說這些事吧？"
42030-40 = "少囉嗦。"
42030-42 = "那位小說家我也知道。#n記得在他的作品中也有尋找聖杯的騎士團和野生兔子戰鬥的故事對吧？"
42030-43 = "確實是有沒錯──怎麼了嗎？"
42030-44 = "RABBIT小隊剛成立的時候，我有問過前輩這個問題。"
42030-45 = "[ruby=RABBIT]「兔子」[/ruby]雖然是個可愛的名字，#n但作為執行強大力量的SRT小隊名會不會不適合，這樣。"
42030-46 = "然後前輩們就引用了那部作品的台詞來回答。"
42030-47 = "「兔子乍看之下是溫馴可愛的動物，#n　但一旦生起氣來就會變成連挑戰武裝的騎士都不怕的猛獸」。"
42030-48 = "我記得在小說中，尋找聖杯的騎士團被守在洞穴裡的兔子撕咬脖子而逃跑了吧。"
42030-49 = "要是光看外表就瞧不起對方，遲早會悔不當初的。"
42030-50 = "話說那個故事的結尾是什麼？#n騎士團因為敗給兔子就放棄尋找聖杯了嗎？"
42030-51 = "沒有，兔子被騎士團丟出的手榴彈一網打盡了……"
42030-52 = "果然……無論是多強的兔子，在手榴彈面前也是無力的存在啊……"
42030-53 = "我們的未來也……肯定會……"
42030-54 = "別在意，那也只是個比喻而已不是嗎？"
42030-55 = "現在還是專心享受這個豪華牛肉的美味吧。"
42030-57 = "話說回來，老師。#n上次凱薩PMC佔據夏萊的時候，有沒有弄丟什麼東西呢？"
42030-58 = "夏萊應該會有很多和聯邦學生會有關的物品，我有點擔心……"
42030-59 = "[s]「應該是沒有……」"
42030-61 = "[ns3]「不過事件過後的整理也還沒結束。」\n[ns4]「之後我會抽空確認一下。」"
42030-62 = "……想要的話，我現在就可以幫你確認哦～"
42030-63 = "……想要的話，我現在就可以幫你確認哦～"
42030-64 = "現在要怎麼檢查？"
42030-65 = "萌醬……你該不會在背地裡和凱薩PMC偷偷交換情報……"
42030-66 = "怎麼可能會呢！"
42030-67 = "我是說附近監視器的記錄。只要駭入夏萊入口附近的監視器，#n就能知道誰在什麼時候出入了大樓，又拿走了什麼東西呀～"
42030-68 = "反正從老師被綁架到奪回夏萊為止也沒過多少時間，出入的人數應該也不多，#n要是有人拿走了可疑的東西應該一下就能發現才對。"
42030-69 = "哦哦，以萌來說真是個不錯的想法啊。"
42030-70 = "怎麼，是吃了高級牛肉之後連腦袋都變好了嗎？"
42030-71 = "少囉嗦！你是想被我炸飛是不是！"
42030-75 = "我看看……駭入監視器影像的雲端伺服器安全系統之後……"
42030-80 = "……成功了！這就是事件當天的影像。"
42030-84 = "啊……這個是奪還作戰時的……"
42030-85 = "這些帶著面罩頭盔的傢伙，就是凱薩那些叫做SOF還是SOAP的傢伙對吧？#n明明武器這麼華麗，實力卻不怎麼樣啊。"
42030-87 = "多虧美優用狙擊擾亂了敵人的注意力。#n如果正面突破的話，我們想必也會出現一定的損害吧。"
42030-88 = "是因為咲希醬和都子醬率先突入……#n告知敵人的位置，我才能順利地狙擊……"
42030-89 = "呵呵，真開心……"
42030-90 = "……為什麼突然變成在回顧畢業紀念冊的氛圍了？#n仔細檢查士兵們帶的東西啊！"
42030-92 = "唔嗯……從這裡開始就是我們親自監視的，所以稍微倒轉一點……"
42030-96 = "嗯？這個遮住臉的士兵是誰？#n好像不是隸屬於凱薩PMC。"
42030-100 = "這些傢伙……拿著進入時還沒有的東西呢。"
42030-101 = "[s]「可以確認他們拿著什麼東西嗎？」"
42030-102 = "畫面的解析度太差所以看不太清楚……"
42030-103 = "不過，他們的動作看起來像是訓練有素的士兵。#n武器也是相當高級的……"
42030-108 = "……咲希。"
42030-109 = "……啊啊，那個裝備是……"
42030-111 = "怎麼了？你們兩個怎麼突然那麼嚴肅？"
42030-112 = "那些從夏萊偷走東西的身分不明的士兵……好像用著SRT的裝備。"
42030-113 = "那，那是什麼意思……？#nSRT的裝備……？"
42030-114 = "看起來像是隊長的人使用的那隻雷射筆，是包含紅外線和可見光的雙重複合雷射筆。"
42030-115 = "不只價格高昂，還無法在沒有夜視裝備的情況下使用，#n因此除了發放給SRT的學生使用之外，並沒有正式生產的記錄。"
42030-116 = "還有那些士兵們使用的對講機……恐怕也是SRT的制式產品。#n畢竟設計和凱薩工業生產的完全不同。"
42030-117 = "什麼？怎麼會這樣！？"
42030-118 = "[s]「……嗯？知道些什麼了嗎？」"
42030-119 = "沒，沒什麼！#n只是在討論戰術的時候激動了一點……"
42030-120 = "噓，萌，請小聲一點。"
42030-121 = "抱，抱歉……我嚇了一跳……"
42030-123 = "不過，外部的士兵居然會拿著SRT的裝備……"
42030-124 = "外部人士想得到SRT的裝備只有兩種方法……"
42030-125 = "一種是襲擊SRT奪走裝備──"
42030-126 = "不然就是讓SRT的學生直接轉讓了吧。"
42030-127 = "不不不，SRT又不是什麼二流的傭兵集團。#n怎麼可能把裝備交給PMC士兵──"
42030-129 = "嘛，也算是某種回歸原點的古典交易方法。"
42030-130 = "交出我們持有的貴重物品，收下等價的武器和彈藥。"
42030-133 = "啊。"
42030-134 = "啊。"
42030-135 = "這麼說來，之前營地淹水的時候確實賣出了一些不常使用的特殊部隊用裝備呢……"
42030-136 = "而且那個武器商人……也不肯露臉，相當可疑呢……"
42030-137 = "等等，也就是說我們把武器賣給了襲擊夏萊的傢伙嗎？"
42030-138 = "……可惡，這樣一來別說是被老師感謝，反而應該要道歉了吧。"
42030-143 = "[ns5]「大家都已經吃飽了嗎？」\n[ns6]「肉還有很多哦。」"
42030-144 = "呃，那個……"
42030-145 = "呃，那個……"
42030-146 = "啊啊～別在意！#n我們已經吃夠多肉了。"
42030-147 = "我，我也是……好像，吃不下了……"
42030-148 = "而且突然想起了一件要立刻處理的急事。"
42030-149 = "[s]「急事……？要上廁所？」"
42030-150 = "才不是咧！真是不夠細心……"
42030-151 = "[s]「那我把剩下的肉放在夏萊的冰箱裡哦。」"
42030-152 = "好的，那就麻煩你了。"
42030-156 = "那個……我們賣掉的武器可能被用來襲擊夏萊這件事，是不是該跟老師說一聲……？"
42030-157 = "有可能是因為我們，老師才會遇到那麼危險的事……"
42030-158 = "……當然會向老師道歉。#n不過現在應該先找出犯人才對。"
42030-159 = "是啊，我也同意。#n而且老師還在忙著進行事情的事後處理……"
42030-160 = "還是不要再增加讓老師擔心的事比較好。"
42030-162 = "等我們找到犯人，取回被偷走的東西之後……再跟老師說明和道歉吧。"
42030-163 = "萌，有辦法追蹤交易後的武器流向哪裡了嗎？"
42030-164 = "沒問題，只要追蹤電子設備的固定金鑰就行了。#n不過可能需要一點時間。"
42030-165 = "那麼就交給你了。#n其他隊員請進行裝備的檢查，以便隨時出動。"
42030-166 = "來給用SRT的裝備做壞事的那些小偷……一點顏色瞧瞧吧。"
42030-170 = "[ns]「啊，豬肉好像也還剩了一些……」"
42030-172 = "[ns9]「咦，大家……？」\n[ns10]「跑去哪裡了呢……？」"
42030-176 = "下一話;出乎意料的重逢"

[translation]
42030-1 = "第3話;餌"
42030-3 = "……うん、これくらい焼けば十分だろ。"
42030-4 = "それじゃあ――"
42030-6 = "いただきます！"
42030-11 = "こ、この味……背徳的すぎる……！！"
42030-13 = "一口食べると脂がじゅわっと広がって……#n凝縮された旨味が口いっぱいに……。"
42030-14 = "今まで食べてきた牛肉はいったい何だったんだ……。"
42030-15 = "口に入れた瞬間にとろけて……脂が甘い……。"
42030-16 = "本当に上質なお肉ですね……。#nあまりの贅沢に、舌が申し訳なくなるくらい……。"
42030-17 = "[ns] \"お肉はたっぷりあるから、たくさん食べてね。\""
42030-18 = "ありがとうございます。ですが……本当に大丈夫なのでしょうか？#nお礼とはいえ、こんなに高いお肉を頂いて……。"
42030-19 = "……そうだね、あの時の報酬にしては豪華すぎる。"
42030-20 = "もしかして……このお肉は私たちを罠にはめるための餌だったとか！？"
42030-21 = "甘い食べ物で相手を陥れる……"
42030-22 = "こ、これが噂のハニートラップ……？"
42030-23 = "[s1] \"それはちょっと意味が違う気が……。\"\n[s2] \"純粋なお礼だから、気にしないで。\""
42030-24 = "……まあいい、こんな罠ならいくらでもかかってやる。"
42030-25 = "……まあいい、こんな罠ならいくらでもかかってやる。"
42030-26 = "高級牛肉で腹を満たすなんて経験、#nSRT特殊学園に帰ってもできないだろうからな。"
42030-27 = "だねぇ。やっすい豚肉の缶詰ならいくらでも食べられるだろうけど。"
42030-28 = "うッ……せっかく良い肉を食べているというのに、思い出させるな……。"
42030-29 = "たしかに、SRTの屋外戦で配られる食糧は、いつも塩漬けの豚肉でしたね。"
42030-30 = "宿営訓練で、4日以上豚肉の缶詰だけだった時もありました……。"
42030-31 = "朝っぱらからギトギトの缶詰を食べるしかなかったあの時か……。#nあんな最悪な経験はもうコリゴリだ……。"
42030-33 = "でも……どうしてSRTの補給品には豚の缶詰ばっかりなんだろ……？"
42030-34 = "せめてコーンビーフとかツナ缶があればいいのに……。"
42030-35 = "それはまあ、一番安いからだろ。"
42030-36 = "お偉いさん方は数字ごっこが好きだからな。#n「補給品は常に最低入札価格で納品すべきである」という格言もあるくらいだ。"
42030-37 = "豚肉の缶詰は安い上に保存期間も長い。#nだから昔から戦闘食として愛用されてきたんだ。"
42030-38 = "どれだけ愛用されていたかと言うと……#nとあるトリニティの小説家が、食事に出てくる豚肉の缶詰に飽き飽きして、#n自分の作品に登場する食べ物をすべて豚肉の缶詰に変えて抗議したくらいだ。"
42030-39 = "いま別に豚肉の缶詰食べてないんだからその話しなくても良くない？"
42030-40 = "黙れ。"
42030-42 = "その小説家なら私も知っています。確かその人の作品に、#n聖杯を探す騎士団が野生のウサギと戦う話がありましたよね？"
42030-43 = "そういうのもあったな――それがどうかしたのか？"
42030-44 = "……RABBIT小隊が創設されたばかりの頃、先輩に聞いたんです。"
42030-45 = "「[ruby=RABBIT]ウサギ[/ruby]」は可愛らしい名前ですが、#n強い力を執行するSRTの小隊名としては相応しくないのかもしれない、と。"
42030-46 = "そうしたら、先輩は、その作品の内容を踏まえて話してくれたんです。"
42030-47 = "「ウサギは一見温厚で可愛い動物だが、#n一度怒ると武装した騎士にも挑む恐ろしい獣」だ、と。"
42030-48 = "たしかにあの小説で聖杯を探していた騎士団は、#n洞窟を守っていたウサギに首を噛まれて逃げ出していたな。"
42030-49 = "外見だけで舐めてかかるから、後悔することになるんだ。"
42030-50 = "その話の結末はどうなるの？#n騎士団はウサギに負けて聖杯を探すのを諦めたとか？"
42030-51 = "いや、ウサギは騎士団が使った手榴弾で一網打尽になるが……。"
42030-52 = "やっぱり……どれだけ強いウサギでも、#n手榴弾の前には無力な存在なんだ……。"
42030-53 = "私たちの未来も……きっと……。"
42030-54 = "気にするな、所詮はただの例え話だろ？"
42030-55 = "ひとまず今は、この高級肉の味に集中しようじゃないか。"
42030-57 = "ところで先生。カイザーPMCとの一件で、紛失した物等はありませんでしたか？"
42030-58 = "シャーレには連邦生徒会関連のものがたくさんあるでしょうし、少し心配で……。"
42030-59 = "[s] \"特にないとは思うけど……。\""
42030-61 = "[ns3] \"事件の後片付けはまだ終わってないし。\"\n[ns4] \"今度、時間を作って確認してみるね。\""
42030-62 = "それなら、いま確認してあげるよ～"
42030-63 = "それなら、いま確認してあげるよ～"
42030-64 = "今？どうやるんだ。"
42030-65 = "モエちゃん……まさか、カイザーPMCと裏で情報を取引してたり……。"
42030-66 = "んなわけないでしょ！"
42030-67 = "防犯カメラの記録だよ。#nシャーレの出入口付近の防犯カメラをハッキングすれば、#n誰がいつ建物に出入りしたのか、何を持って行ったのか分かるからさ～"
42030-68 = "先生が拉致されてからシャーレの奪還までにそんな時間もかかってないし、出入りした人数も多くないだろうから、怪しい物を持ってる人がいればすぐに特定できると思うよ。"
42030-69 = "おおっ、モエにしては賢いな。"
42030-70 = "なんだ、高級肉を食べて頭が回るようになったのか？"
42030-71 = "ぶっ飛ばされたいのかなぁ！？"
42030-75 = "ええっと……防犯カメラのクラウドサーバーセキュリティをハッキングして……。"
42030-80 = "……できた！これが事件当日の映像だよ。"
42030-84 = "あ……これ、奪還作戦の時の……。"
42030-85 = "こっちのバイザーメットを被っているやつら、#nカイザーのSOFかSOAPとかいう連中だったよな？#n派手な武器を持ってたにしては大したことなかったな。"
42030-87 = "ミユが狙撃で敵の注意をそらしてくれたおかげです。#n正面突破していたら、こちらもそれなりの被害を被っていたでしょう。"
42030-88 = "サキちゃんとミヤコちゃんが先に突入してくれたお陰だよ……。#nふたりが敵の位置を伝えてくれたから、スムーズに狙撃できて……。"
42030-89 = "ふふ、楽しかったな……。"
42030-90 = "……なんか卒業アルバムを見返すみたいな感じになってない？#n兵士の持ち物をよく見てってば！"
42030-92 = "うーん……ここからは私たちが見張っていたから、もう少し巻き戻して……。"
42030-96 = "ん？この覆面の兵士は誰？#nカイザーPMCの所属じゃなさそうだけど。"
42030-100 = "こいつら……入る時には持ってなかった荷物を持ってるね。"
42030-101 = "[s] \"何を持ってるか確認できそう？\""
42030-102 = "画像が粗いからそこまでは……。"
42030-103 = "でも、動きからしてかなり訓練された兵士だね。#n武器もかなりの高級品で……。"
42030-108 = "……サキ。"
42030-109 = "ああ、今の装備は……。"
42030-111 = "あれ？二人とも、何で急に真顔になってるの？"
42030-112 = "シャーレから物を盗んだ身元不明の兵士……SRTの装備を使っているようです。"
42030-113 = "ど、どういうこと……？SRTの装備って……？"
42030-114 = "リーダーらしき人物が使っているレーザーサイトは、#n赤外線と可視光を併せ持つ二重複合サイトというものだ。"
42030-115 = "高価な上に、ナイトビジョンが無いとまともに使えないから#nSRTの生徒用に支給されたもの以外、正式に生産された記録がない。"
42030-116 = "加えて兵士たちが使っているトランシーバーも、恐らくSRTで作られた製品だ。#nカイザーインダストリー産のものとはデザインが全く違うからな。"
42030-117 = "え？どうしてそんな！？"
42030-118 = "[s] \"ん？何か分かったの？\""
42030-119 = "な、何でもない！ただ戦術の話で熱くなっただけで……。"
42030-120 = "しーっ、モエ。静かにしてください。"
42030-121 = "ご、ごめん……びっくりしちゃって……。"
42030-123 = "でも、外部の兵士がSRTの装備を持ってるなんて……。"
42030-124 = "……部外者がSRTの装備を入手できるとしたら、手段は2つだけです。"
42030-125 = "SRTを襲って装備を奪うか――"
42030-126 = "――SRTの生徒に直接譲ってもらうか、だな。"
42030-127 = "いやいや、さすがに2つ目はないでしょ～#n素人の傭兵集団じゃあるまいし、SRTの隊員がPMC兵士に装備を渡すわけ――"
42030-129 = "ま、ある意味原点というか、古典的な取引方法だけど。"
42030-130 = "私たちが持っている貴重な物を渡して、その対価として武器やら弾薬やらを貰うってわけ。"
42030-133 = "あ。"
42030-134 = "あ。"
42030-135 = "そういえば、この前キャンプが浸水した時に#nあまり使わない特殊部隊用装備を一部売却していましたね……。"
42030-136 = "そういえばあの武器商人……顔も隠してたし、怪しかったね……。"
42030-137 = "待って。それじゃ私たちの売った武器は、#nシャーレを襲撃したやつらの手に渡ってたってこと？"
42030-138 = "……くそ、これじゃ先生に感謝されるどころか謝罪すべき立場じゃないか。"
42030-143 = "[ns5] \"ところでみんな、もうお腹はいっぱい？\"\n[ns6] \"お肉、まだまだあるよ。\""
42030-144 = "ええと、それが……。"
42030-145 = "ええと、それが……。"
42030-146 = "あぁ～、気にしないで！お肉ならもうお腹いっぱい食べたから！"
42030-147 = "わ、私も……もう限界、かも……。"
42030-148 = "それに、ちょっと急用を思い出してさ。"
42030-149 = "[s] \"急用……？何かあったの？\""
42030-150 = "いちいち聞くな！先生には関係ないだろう！？"
42030-151 = "[s] \"じゃあ、余ったお肉はシャーレの冷蔵庫に入れておくね。\""
42030-152 = "はい、お願いします。"
42030-156 = "その……私たちが売った武器がシャーレの襲撃に使われたかもしれないって話は、#n先生に言うべきじゃないかな……？"
42030-157 = "私たちのせいで、先生が大変な目に遭ったかもしれないのに……"
42030-158 = "……もちろん謝罪はします。#nですが、今は犯人捜しが先でしょう。"
42030-159 = "ああ、私もそう思う。"
42030-160 = "それに、先生は事件の後処理でしばらく忙しいだろうから……#n心配事を増やすのはやめておいた方がいい。"
42030-162 = "犯人を捕まえて、盗んだ物を返してもらってから……#n先生に事情を話して謝りましょう。"
42030-163 = "モエ、取引した武器がどこに流れたか追跡できますか？"
42030-164 = "できるよ、電子装備の固有のキー値を追跡すれば良いだけだし。#nちょっと時間はかかると思うけど。"
42030-165 = "ではお願いします。#n残りのみなさんはいつでも出動できるよう、装備の点検をお願いします。"
42030-166 = "SRTの装備を使って悪事を働いた盗人に……#n目に物見せてやりましょう。"
42030-170 = "[ns] \"あ、豚肉も少し余ってたような……。\""
42030-172 = "[ns9] \"あれ、みんな……？\"\n[ns10] \"どこ行ったんだろう……？\""
42030-176 = "次回;予期せぬ再会"

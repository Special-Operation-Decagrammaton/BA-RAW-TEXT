42030-10 = "1;모에;13\n#1;greeting\n#wait;1500"
42030-11 = "1;모에;11;뭐야, 뭐야, 이거? 내가 그동안 먹어본 고기 중 제일 맛있는 것 같아!\n#1;closeup\n#1;stiff"
42030-12 = "#all;hide"
42030-13 = "3;사키;03;촘촘히 박힌 지방이 자아내는 부드러운 식감과 고급 소고기 특유의 이 풍부한 감칠맛……\n#3;closeup\n#3;em;…"
42030-14 = "3;사키;07;이 등심에 비하면 도시락에 들어있는 소고기는 다 가짜나 다름없어……\n#3;closeup"
42030-15 = "3;미유;03;입에 넣자마자 바로 녹아내리는 게…… 마치 부드러운 푸딩을 먹는 것 같아……\n#3;closeup"
42030-16 = "3;미야코;07;정말 좋은 고기네요…… 오랜만에 호화로운 음식을 먹어서 그런지, 혀에 죄책감이 들 정도예요.\n#3;em;[음표]\n#3;closeup"
42030-17 = "[ns] \"고기는 충분하니까, 천천히 많이 먹어.\""
42030-18 = "3;미야코;02;저…… 아무리 지난번 일의 답례라지만, 괜찮으신가요? 이렇게나 비싼 소고기를 저희에게 잔뜩 사주셔도……\n#3;em;…"
42030-19 = "3;모에;15; ……그러게. 우리가 한 일의 대가라지만, 너무 호화로운데."
42030-20 = "3;모에;14;설마…… 이 소고기가 우리를 함정에 빠트리기 위한 미끼였다던가?!\n#3;em;[?!]"
42030-21 = "3;미유;02;달콤한 음식으로 상대를 함정에 빠트린다니……\n#3;stiff"
42030-22 = "3;미유;10;이게 그 말로만 듣던 허니 트랩……?\n#3;closeup\n#bgshake"
42030-23 = "[s1] \"허니 트랩은 그런 뜻이 아니야…….\"\n[s2] \"순수한 호의일 뿐이니 부담 갖지 말고 먹어.\""
42030-24 = "3;사키;07;아무렴 어때. 이런 함정이라면 일부러라도 걸려줄 용의가 있어.\n#3;em;[재잘]\n#3;hophop"
42030-25 = "3;사키;07;아무렴 어때. 이런 함정이라면 일부러라도 걸려줄 용의가 있어.\n#3;em;[재잘]\n#3;hophop"
42030-26 = "3;사키;03;이런 고급 소고기만으로 배를 채우는 진귀한 경험은 SRT 학원에 돌아가도 못해볼 테니까."
42030-27 = "3;사키;03\n2;모에;17;그러게. 싸구려 돼지고기 통조림만으로 배를 채우는 경험은 이미 충분히 해봤지만. 후후.\n#2;a\n#2;em;[음표]\n#3;m4"
42030-28 = "3;사키;04;으윽…… 모처럼 맛있는 고기를 먹고 있는데, 입맛 떨어지는 소리를……\n#3;em;[속상함]"
42030-29 = "2;모에;17\n3;사키;04\n5;미야코;02;확실히, SRT의 야전 배급 식량에는 언제나 염장 돼지고기가 포함되어 있었죠.\n#5;a\n#2;m1\n#3;m3"
42030-30 = "5;미야코;04;한 번은 부대 외부에서 진행한 숙영 훈련이 예상보다 길어지는 바람에 사흘 넘게 돼지고기 통조림만으로 식사를 때운 적도 있었으니까요……\n#5;em;[땀]"
42030-31 = "3;사키;04;아침부터 기름지고 느글거리는 돼지고기 통조림을 먹어야 했던 그때의 추억은…… 다시는 경험하고 싶지 않아…….\n#3;em;[세로선]"
42030-32 = "#all;hide"
42030-33 = "3;미유;02;그런데 SRT의 보급품에는 어째서 돼지고기 통조림이 그렇게 많이 보급되는 걸까?"
42030-34 = "3;미유;01;최소한 콘비프나 참치 캔을 몇 개 섞어 주어도 괜찮은 식사를 할 수 있을 텐데……\n#3;em;…"
42030-35 = "3;사키;11;뭐, 이유야 뻔하지. 그게 제일 저렴하니까.\n#3;em;[반응]"
42030-36 = "3;사키;05;높으신 분들은 언제나 숫자를 좋아하거든. 오래된 격언에 '보급품은 항상 최저 입찰가로 납품된 물건임을 명심하라'라는 말도 있을 정도니까."
42030-37 = "3;사키;99;특히 돼지고기 통조림은 잡육을 염장해서 만든 물건이라, 저렴하고 보존 기한이 길어서 오래전부터 전투 식량으로 애용되어 왔거든."
42030-38 = "3;사키;02;보급된 돼지고기 통조림의 숫자가 얼마나 많았는지, 어느 트리니티의 소설가는 학교 급식에 나오는 돼지고기 통조림이 너무 많다며 자신의 작품 속에 등장하는 음식을 모두 돼지고기 통조림으로 바꾸어 항의한 일도 있었을 정도니까."
42030-39 = "3;사키;02\n1;모에;18;와, 정말 알고 싶지 않았던 내용이었어요.\n#1;em;[땀]\n#1;ar\n#3;m5"
42030-40 = "3;사키;10;시끄러워.\n#3;em;[빠직]"
42030-41 = "#all;hide"
42030-42 = "3;미야코;02;……그러고 보니 그 소설가의 작품 중에 성배를 찾는 기사단이 야생 토끼와 싸우는 에피소드가 있지 않았었나요?\n#3;em;[반응]\n#3;a"
42030-43 = "3;미야코;02\n1;사키;02;응, 분명 그런 이야기도 있었지. 그런데 그건 갑자기 왜?\n#3;m5\n#1;ar\n#1;em;[?]"
42030-44 = "3;미야코;01;RABBIT 소대가 막 창설되었을 때, 선배들에게 이런 질문을 했었거든요."
42030-45 = "3;미야코;99;[ruby=RABBIT]'토끼'[/ruby]라는 소대명은 귀엽긴 하지만, 강력한 힘을 집행하는 SRT의 소대명으로는 다소 어울리지 않는 게 아닐까, 하고.\n#3;em;…"
42030-46 = "3;미야코;01;그러자 선배들이 그 작품의 대사를 인용해서 답변을 해주셨어요."
42030-47 = "3;미야코;02;'토끼는 일견 유순하고 귀여워 보이는 동물이지만, 화가 나면 무장한 기사단을 상대로도 싸움을 거는 무시무시한 짐승'이라고."
42030-48 = "3;미야코;02\n1;사키;03;그거라면 일리 있네. 소설 속의 이야기이긴 하지만 성배를 찾던 기사단은 동굴을 지키던 토끼에게 목을 물어 뜯겨 달아나거든.\n#1;m3\n#3;dr"
42030-49 = "1;사키;07;겉모습만 보고 상대를 얕잡아보면 누구든 그렇게 험한 꼴을 당하게 되는 거야.\n#1;em;[재잘]"
42030-50 = "3;모에;15;그래서, 그 에피소드의 결말은 어떻게 되는데? 결국 기사단은 토끼 때문에 성배를 찾는 걸 포기하나?\n#1;hide\n#3;em;[?]"
42030-51 = "3;사키;02;아니. 기사단이 던진 수류탄에 토끼는 산산조각이 나서 죽지만……"
42030-52 = "3;미유;07;역시…… 아무리 흉포한 토끼라도 총과 수류탄 앞에서는 무력한 존재일 뿐……\n#3;em;[세로선]\n#3;stiff"
42030-53 = "3;미유;06;우리의 미래도 마찬가지일 거야……"
42030-54 = "3;사키;01;뭐, 이제 와서 고전 소설의 결말이 중요한 건 아니잖아?"
42030-55 = "3;사키;03;지금은 이 호화로운 소고기의 맛을 즐기는 데 집중하자고.\n#3;em;[음표]"
42030-56 = "#all;hide"
42030-57 = "3;미야코;02;그런데 선생님, 지난번 카이저 PMC가 샬레를 점거했을 때 무언가 사라진 물건이나 서류는 없었나요?\n#3;a\n#3;em;[반응]"
42030-58 = "3;미야코;04;샬레 건물에는 총학생회와 관련된 귀중품이 많다 보니 조금 걱정되네요……"
42030-59 = "[s] \"딱히 없는 것 같은데……\""
42030-60 = "#wait;1000"
42030-61 = "[ns3] \"사건 이후로 내부 시설 대부분이 엉망이 되었는지라.\"\n[ns4] \"한 번 시간을 내서 확인해 봐야 할 것 같아.\""
42030-62 = "3;모에;12; ……그거라면 내가 지금 바로 확인해 줄 수 있지."
42030-63 = "3;모에;12; ……그거라면 내가 지금 바로 확인해 줄 수 있지."

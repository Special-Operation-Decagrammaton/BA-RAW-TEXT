42030-84 = "1;미유;02;아…… 이거 탈환전 당시 영상이네.\n#1;em;[반응]"
42030-85 = "5;사키;11;여기 바이저 헬멧을 쓰고 있는 녀석들이 카이저의 SOF인지 SOAP인지 하는 녀석들이었지? 화려한 무기에 비해 생각 외로 시시한 녀석들이었는데."
42030-86 = "#all;hide"
42030-87 = "3;미야코;03;미유가 저격으로 적의 주의를 흩트려 준 덕분이지요. 정면 돌파를 시도했더라면 저희 쪽에서도 피해를 감내해야 했을 겁니다.\n#3;closeup\n#3;em;[음표]"
42030-88 = "3;미유;03;그때는…… 사키 쨩과 미야코 쨩이 먼저 돌입해서 적의 위치를 전달해 준 덕분에 더 수월하게 저격할 수 있었어.\n#3;closeup"
42030-89 = "3;사키;07;후후, 즐거웠었지……\n#3;closeup\n#3;em;[재잘]"
42030-90 = "3;모에;05;……왜 갑자기 지난 졸업 앨범을 들춰 보는 분위기가 된 건데? 샬레에 출입하는 병사들의 손이나 잘 확인하라니까?!\n#3;closeup\n#3;em;[속상함]"

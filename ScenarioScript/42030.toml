[translation]
42030-1 = "Episode 3; Bait"
42030-3 = "It's ready! Grilled to perfection!"
42030-4 = "Then, without further ado..."
42030-6 = "Thank you for the meal!"
42030-11 = "Wh-Wh-Whoa! It beats my wildest dreams!"
42030-13 = "The melt-in-your-mouth texture from all that marbling and that amazing, rich flavor only top-notch beef can bring..."
42030-14 = "It makes every other piece of beef I've ever eaten seem fake... They just pale in comparison."
42030-15 = "Yummy... So yummy... It's so soft it's like it's m-melting in my mouth. Like pudding..."
42030-16 = "I can't remember the last time we've indulged in something like this... I almost feel guilty."
42030-17 = "[ns] \"There's more than enough meat, so help yourselves.\""
42030-18 = "Sensei... Even if it's to thank us, isn't this a bit much? This must have been really expensive..."
42030-19 = "Yeah! I'm a little suspicious... The reward seems to outrank the deed here."
42030-20 = "Is this beef...a part of one of your evil schemes?!"
42030-21 = "Y-You tried to lure us in with d-delicious food!"
42030-22 = "This must be the \"honey trap\" I've heard of before..."
42030-23 = "[s1] \"It's not! And that is NOT what honey trap means at all!\" \n[s2] \"I have no ulterior motives. You all need to learn to accept gifts.\""
42030-24 = "You know what? I don't even care if it's a trap."
42030-25 = "You know what? I don't even care if it's a trap."
42030-26 = "This is a rare opportunity to stuff ourselves with the highest quality beef imaginable! We wouldn't even be able to experience this at SRT."
42030-27 = "Although, I HAVE had the experience of filling my stomach with cheap, canned pork back at SRT. Yum."
42030-28 = "Ugh... Can you not ruin the best meal of my life with the thought of canned pork?"
42030-29 = "We did eat a lot of pork, didn't we? All our field rations had pork in one form or another."
42030-30 = "I remember one time our field training went longer than we'd planned and we had to survive on canned pork for over three days..."
42030-31 = "Ick... That slimy taste of canned pork is definitely something I could've done without remembering... Thanks, Miyako."
42030-33 = "I-I never realized... Why is it all pork?"
42030-34 = "Wh-Why couldn't we have corned beef...? Or some tuna, at least..."
42030-35 = "It's just cost-efficient. Duh."
42030-36 = "Higher-ups only see numbers, you know? They say it in our textbooks: When it comes to supplies, quantity over quality. You can't feed an army if you consider comfort or indulgences."
42030-37 = "That's why canned pork has been a go-to combat ration for so long. It's made from preserved meat, making it cost-effective with a lengthy shelf life. Even regular academies caught wind and started using them for school lunches."
42030-38 = "At one point, the cafeterias were using so much of it that some Trinity novelist tried to protest by swapping out all mentions of any food in their work with \"canned pork\" instead and distributing it all over campus."
42030-39 = "Wow. Thanks so much. I definitely needed to know that. Not. N-e-r-d."
42030-40 = "Shut up, you maniac arsonist!"
42030-42 = "Speaking of, didn't that Trinity novelist have an episode in their work where a group of knights on a quest for the Holy Grail ended up battling a wild rabbit?"
42030-43 = "I remember something along those lines, but what about it?"
42030-44 = "Way back when, I asked the seniors about our name. Sometime around when the RABBIT squad first came to be."
42030-45 = "I was wondering why we had been named after a cute, harmless animal. SRT was supposed to be the symbol of discipline and justice, not fuzzy paws and floppy ears."
42030-46 = "She didn't answer in the way I expected at all. Instead, she recited a quote from that novel."
42030-47 = "\"The rabbit is not to be underestimated for its docile and adorable appearance. Proud and territorial, the rabbit becomes a fearsome beast that can fend off even brave knights when provoked.\""
42030-48 = "I think I remember that part. The knights searching for the Holy Grail try to enter a cave guarded by a rabbit, and it rips out their throats."
42030-49 = "And that's why we learned in our Tactics & Strategy classes to never underestimate an opponent from how they look."
42030-50 = "Well, don't leave us on a cliffhanger. Does the rabbit beat up all the knights and they give up and go home?"
42030-51 = "Th-That... Um, the knights throw a grenade at the rabbit, and it ends up in little bits..."
42030-52 = "B-Because no rabbit is strong enough to fight guns...or grenades...or bombs...or bad guys..."
42030-53 = "We're gonna end up blown up like the rabbit in the story!"
42030-54 = "Hey! The ending to some stupid book they made us read in school has nothing to do with us."
42030-55 = "The only thing you should be concerning yourself with right now is this sumptuous beef."
42030-57 = "This is a little out of the blue, Sensei, but it's been on my mind recently. I was wondering if any sensitive documents disappeared during Kaiser's occupation of Schale..."
42030-58 = "I was worried because of the amount of data on the General Student Council that's stored in the Schale building..."
42030-59 = "[s] \"There wasn't anything in particular that stood out... \""
42030-61 = "[ns3] \"But we didn't do a thorough search. The facilities were so trashed.\" \n[ns4] \"Now that you're saying it, maybe I should double check...\""
42030-62 = "I can do it! Gimme a sec..."
42030-63 = "I can do it! Gimme a sec..."
42030-64 = "Check? From here? How?"
42030-65 = "M-Moe... Did you give Kaiser intel for more weapons...?"
42030-66 = "Hey! That was one time, okay?!"
42030-67 = "But that's not what I'm doing! I just have to slip into Schale's server and pull the surveillance footage. We can check the entrances to see who was there and what they took."
42030-68 = "Kaiser's occupation of the building after Sensei's abduction was pretty short-lived. We just have to narrow down our search to the exits during that time frame and make sure nothing important was taken."
42030-69 = "Huh. A surprisingly good idea from Moe."
42030-70 = "Are you okay? Did eating such nice food make you go crazy?"
42030-71 = "Shut up! I'll blow you up!"
42030-75 = "Ugh. Ignoring the muscle-head, I should be able to get into the cloud server and snag the CCTV footage pretty easily..."
42030-80 = "Heehee! Yup! There it is. Surveillance footage from the day of the attack."
42030-84 = "Ah... This is around when we retook the building."
42030-85 = "The guys in the helmets were Kaiser's super elite SOF? SOAP or whatever, right? They had impressive weapons, but they sure didn't know how to use them."
42030-87 = "It was only as easy as it was because of Miyu's sniping. Without her, we would've had to take damage in a full-frontal assault."
42030-88 = "R-Really...? But I couldn't have done it w-without Saki taking point and relaying their locations... Miyako too..."
42030-89 = "Heehee. That's what a squad is for. That was a fun operation..."
42030-90 = "We're starting to sound like old women reminiscing on our glory days. Stop gabbing and help me check this footage to see if any Kaiser soldiers took anything with them!"
42030-92 = "Well, I guess we wouldn't find anything here... Let me go back a little bit..."
42030-96 = "Who are those soldiers? Those masks and uniforms don't look like Kaiser."
42030-100 = "Right there... It looks like they're bringing something out of the basement. Do you see their hands? They weren't holding that when they went in."
42030-101 = "[s] \"Can you tell what it is?\""
42030-102 = "Not really... The video quality sucks, and they're moving fast."
42030-103 = "Way too fast, actually. No wasted movements, deft handling of advanced weaponry..."
42030-108 = "...Saki, you see it too, right?"
42030-109 = "The video is grainy, but I'd recognize that equipment anywhere..."
42030-111 = "All right, all right! Doom and Gloom over there, would you like to share with the class?"
42030-112 = "You're right that those soldiers didn't look like Kaiser... That's SRT equipment they're using."
42030-113 = "B-But we have all of SRT's remaining equipment..."
42030-114 = "The leader's laser pointer... It's a dual compound one with both infrared and visible light capabilities."
42030-115 = "It's super pricey and pretty much useless without night vision gear, so they've only ever really been made for SRT students."
42030-116 = "And that radio they're using to communicate... I can't be certain, but it looks a lot like SRT's. All of SRT's equipment is especially designed to meet our needs, and they definitely don't look anything like Kaiser's communication technologies."
42030-117 = "Are you serious?! But how could they have gotten their hands on them?"
42030-118 = "[s] \"Huh? Did you say something?\""
42030-119 = "Uh, n-no! Not at all! I got a little excited talking about tactics... You know how it is!"
42030-120 = "I know it's not in your nature, Moe, but you have to be quiet. Sensei can't know until we figure out what's going on here."
42030-121 = "You're right, sorry. It's just so unbelievable."
42030-123 = "I-I think so too... I don't know how random people would be able to get SRT's equipment like that..."
42030-124 = "There're only two ways I can think of."
42030-125 = "First, they raided an SRT squad or base and looted the equipment."
42030-126 = "The only other way would be if an SRT student provided them."
42030-127 = "That's what's unbelievable. No SRT student would be stupid enough to hand over equipment to PMC soldiers. We're elite agents, not some brutish, greedy..."
42030-129 = "People've been bartering for things they want since before we could talk."
42030-130 = "And so, easy peezy lemon squeezy, we'll trade off our valuable items for new and wonderful incendiaries...and weapons!"
42030-133 = "Ah."
42030-134 = "Ah."
42030-135 = "It seems we may have been the stupid SRT students. We sold off some non-essential equipment to recoup our losses when the camp was flooded."
42030-136 = "D-Do you remember those arms dealers? They had big masks on so we couldn't see their faces..."
42030-137 = "So you're telling me... We, the RABBIT squad, are the ones who supplied Schale's invaders with weapons?"
42030-138 = "...And here we are, gorging ourselves on high-quality meat, given to us to thank us for fighting off said invaders..."
42030-143 = "[ns5] \"Is everyone full? Are you sure you don't want more?\" \n[ns6] \"Stop talking and come eat! There's still so much left!\""
42030-144 = "We're... Well, uh..."
42030-145 = "We're... Well, uh..."
42030-146 = "Oh, geez! I think this is what they call a food baby..."
42030-147 = "M-M-Me too! Yeah! The f-fullest I've ever been..."
42030-148 = "Whoa! I suddenly remembered something super urgent I have to take care of today. Right now!"
42030-149 = "[s] \"What could be super urgent so suddenly? Do you need a bathroom?\""
42030-150 = "Ugh, no! You have no filter when you talk, Sensei!"
42030-151 = "[s] \"I'm just teasing. I'll save the rest of the meat for you at Schale, then.\""
42030-152 = "Thank you, Sensei."
42030-156 = "A-Are we not gonna tell Sensei about selling weapons to the bad guys?"
42030-157 = "I feel bad... If not for us... Sensei wouldn't have gone through all of that stuff..."
42030-158 = "I feel guilty as well, Miyu. And we will tell Sensei and apologize later, but first we need to apprehend the culprits."
42030-159 = "Miyako's right. If we go to Sensei now, all we're doing is bringing them another problem. They have enough on their plate as it is, dealing with the Restoration Project and everything else."
42030-160 = "The last thing Sensei needs is another thing to worry about, especially because of something we did."
42030-162 = "Yes. We'll find the culprits, retrieve the stolen goods, and then give Sensei a proper apology."
42030-163 = "To start, I'll need your help, Moe. We need to collect information, anything you can on where the weapons went after we sold them."
42030-164 = "It might take a bit, but it's doable. If I trace the unique key values embedded in the electronics, I'll hopefully be able to trace their path."
42030-165 = "For the rest of you, please begin routine checks of all our gear. Quickly, so we're prepared to leave as soon as Moe has what we need."
42030-166 = "I won't let those arms dealers sully SRT's equipment with their injustices any longer."
42030-170 = "[ns] \"I know you said you were full, but I forgot about the extra pork...\""
42030-172 = "[ns9] \"Miyako...? Saki...?\"\n[ns10] \"Where did everyone go...?\""
42030-176 = "Next Episode;An Unexpected Reunion"

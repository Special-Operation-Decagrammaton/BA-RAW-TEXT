[translation]
2002705-1 = "ความคาดหวัง"
2002705-2 = "(คุณครูเป็นห่วงว่าชิโรโกะกำลังมีเรื่องไม่สบายใจอะไรบางอย่าง เลยไปหาที่ห้องของเธอ)"
2002705-3 = "(พอมาถึงที่ทางเดิน ก็เจอชิโรโกะอยู่ตรงโถงทางเดินก่อนแล้ว)"
2002705-11 = "[ns1] \"...? ชิโรโกะ?\"\n[ns2] \"ดึกขนาดนี้ออกมาทำอะไรตรงทางเดินน่ะ?\""
2002705-22 = "[ns] ตามชิโรโกะไป"
2002705-28 = "[ns] (...?)"
2002705-30 = "[ns3] \"เงาของชิโรโกะหายไปแล้ว...\"\n[ns4] \"หายไปทางไหนแล้วเนี่ย?\""
2002705-33 = "......"
2002705-44 = "......คุณครู"
2002705-46 = "[ns] \"......!?\""
2002705-49 = "[ns5] \"ตกใจหมดเลย...\"\n[ns6] \"ชิโรโกะ...?\""
2002705-54 = "อ่า..."
2002705-55 = "ขอโทษนะคุณครู ไม่คิดว่าจะตกใจขนาดนั้น"
2002705-56 = "ฉันสงสัยว่าถูกใครบางคนสะกดรอยตามมาก็เลยไปซ่อนตัวน่ะ"
2002705-57 = "พอเห็นว่าเป็นคุณครู ก็เลยเข้ามาเรียกใกล้ๆ น่ะ..."
2002705-58 = "...หืม? ฉันจะไปไหนงั้นเหรอ? คือว่า..."
2002705-59 = "ก็แค่... ไม่มีอะไรหรอก... แค่... แค่จะไปเดินเล่นตอนเช้าน่ะ"
2002705-63 = "ขอโทษนะ... เมื่อกี้ฉันโกหกน่ะ"
2002705-64 = "ที่จริง... ฉันรู้สึกเสียดายนิดหน่อย ก็เลยอยากไปดูอีกครั้งน่ะ"
2002705-65 = "...ไปดูทะเลน่ะ"
2002705-66 = "[s7] \"ทะเลเหรอ? ที่ที่จุดพลุน่ะเหรอ?\"\n[s8] \"ที่ที่ทำบาร์บีคิวกันน่ะเหรอ?\""
2002705-69 = "...อืม"
2002705-70 = "ฉันคิดอยู่เหมือนกันว่าควรจะบอกใครสักคนดีรึเปล่าว่าจะออกไปข้างนอก แต่ตอนนี้มันก็กลางดึกแล้ว"
2002705-71 = "แล้วก็ไม่อยากทำให้ทุกคนหนักใจด้วยน่ะ"
2002705-72 = "แต่เรื่องที่พวกเราทำด้วยกันตอนนั้น... ฉันคิดว่าพอกลับไปที่อะบิดอสแล้วก็คงจะไม่ได้ทำแบบนั้นอีก ก็เลยไม่อยากปล่อยผ่านไปน่ะ"
2002705-73 = "ฉันพยายามไม่คิดมากแล้ว แต่ก็นอนไม่หลับเลยน่ะ..."
2002705-74 = "[s] \"......\""
2002705-75 = "เพราะงั้น... เลยคิดว่าถ้าได้กลับไปดูทะเลที่นั่นอีกครั้ง... ก็อาจจะนอนหลับได้น่ะ"
2002705-76 = "ไม่ได้คิดจะออกไปนานหรอก แค่คิดจะออกไปแป๊บเดียวเอง"
2002705-80 = "...ไม่ได้เหรอ คิดแล้วเชียว มันคงดึกเกินไปสินะ"
2002705-81 = "[s9] \"ถ้างั้นก็ไปด้วยกันมั้ย?\"\n[s10] \"ให้ครูไปเป็นเพื่อนดีมั้ย?\""
2002705-84 = "...!! คุณครูจะไปด้วยเหรอ...?"
2002705-85 = "...อื้อ เอาสิ"
2002705-89 = "...ทางนี้"
2002705-97 = "...ถึงแล้ว"
2002705-101 = "เอ่อ... อืม..."
2002705-102 = "[s11] \"ชิโรโกะ...?\"\n[s12]  \"สีหน้าดูไม่สดชื่นเลยนะ\""
2002705-105 = "...อืม"
2002705-106 = "ทะเลมันดูต่างกัน... กับตอนที่เห็นเมื่อตอนเย็นน่ะ มันดู..."
2002705-107 = "...หืม? เพราะตอนนี้น้ำขึ้น ทำให้หาดที่เรามาทำบาร์บีคิวตอนเย็น จมอยู่ใต้น้ำงั้นเหรอ?"
2002705-108 = "ถ้างั้น... ถ้างั้นตอนนี้... ก็คงดูไม่ได้สินะ"
2002705-109 = "ภาพทะเลแบบเมื่อตอนเย็น... คงจะไม่ได้เห็นอีกแล้วสินะ"
2002705-110 = "[s13] \"แต่พอมันเป็นแบบนี้ มันก็ดูแปลกใหม่ดีนะ\"\n[s14] \"คราวหน้าค่อยมาดูใหม่ก็ได้\""
2002705-113 = "หมายความว่ายังไงน่ะ...?"
2002705-114 = "ถึงจะกลับไปแล้วก็ยังเล่นพลุกันได้สนุกกว่าเดิมงั้นเหรอ? ยังไงล่ะ...? โรงเรียนของเรา... ไม่ใช่ทะเล#nสักหน่อย..."
2002705-115 = "...? สิ่งที่ทำให้ฉันสนุกแล้วก็รู้สึกดี... อาจไม่ใช่ทะเลก็ได้งั้นเหรอ?"
2002705-116 = "ฉันไม่เห็นเข้าใจเลย"
2002705-117 = "ถ้ากลับไปแล้ว... จะทำบาร์บีคิวด้วยกัน แล้วก็ดูพลุด้วยกันอีกได้งั้นเหรอ?"
2002705-118 = "...หืม? อาจจะไม่... ก็ได้งั้นเหรอ?"
2002705-119 = "...ถ้างั้น..."
2002705-120 = "[s15] \"ครูว่าการเฝ้ารอโอกาสหน้าอาจเป็นเรื่องดีก็ได้นะ?\"\n[s16] \"แต่ละช่วงเวลาก็มีความสนุกสนานที่เหมาะกับมันรอเราอยู่นะ\""
2002705-123 = "อืม..."
2002705-124 = "ขอโทษนะคุณครู ฉันก็ยัง... ไม่ค่อยเข้าใจอยู่ดี เรื่องแบบนี้ มันอาจจะยากเกินไปสำหรับฉันก็ได้"
2002705-128 = "แต่ว่า..."
2002705-129 = "เพราะคุณครูพูดแบบนั้น...ฉันเลยรู้สึกอยากรู้ขึ้นมาหน่อยแล้วละ"
2002705-130 = "ความรู้สึกของ...การเฝ้ารอนั่นน่ะ...?"
2002705-131 = "บางที... ตอนนี้ฉันอาจจะยังไม่เข้าใจเท่าไร แต่ในอนาคตก็อาจจะเข้าใจขึ้นมาก็ได้"
2002705-132 = "ฉันรู้สึกแบบนั้นน่ะ"
2002705-133 = "......"
2002705-134 = "รู้สึกดีขึ้นมานิดหน่อย แล้วก็สบายใจขึ้นแล้วละ"
2002705-141 = "...คุณครู"
2002705-143 = "...ฉันจะลองเฝ้ารอโอกาสหน้าดูแล้วกันนะ"

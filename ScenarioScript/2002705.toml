[translation]
2002705-1 = "期待"
2002705-2 = "（擔心白子在獨自煩惱，於是正打算前往白子的房間……）"
2002705-3 = "（卻在大廳看見了白子的身影）"
2002705-11 = "[ns1]「……？」\n[ns2]「他在做什麼呢……？」"
2002705-22 = "[ns] 跟著白子"
2002705-28 = "[ns]（…………？）"
2002705-30 = "[ns3]「白子……」\n[ns4]「……消失了？」"
2002705-33 = "…………"
2002705-44 = "……老師。"
2002705-46 = "[ns] 「！？」"
2002705-49 = "[ns5]「嚇我一跳……！」\n[ns6]「……白子？」"
2002705-54 = "啊……"
2002705-55 = "抱歉，老師。#n我沒有要嚇你的意思。"
2002705-56 = "只是感受到有人的氣息，所以躲了起來……"
2002705-57 = "因為發現是老師才會……"
2002705-58 = "……嗯。你問我要去哪裡……？"
2002705-59 = "那個……其實也沒什麼目的。#n只是想稍微走一走而已。"
2002705-63 = "……抱歉。"
2002705-64 = "其實……是覺得有點寂寞，所以想再去看看。"
2002705-65 = "……看看大海。"
2002705-66 = "[s7]「剛才看煙火的地方？」\n[s8]「剛才烤肉的地方？」"
2002705-69 = "……嗯。"
2002705-70 = "我煩惱過要不要告訴大家……不過現在都這麼晚了。"
2002705-71 = "我擔心反而會造成不必要的擔心……"
2002705-72 = "但是……這片景色，回去之後就再也看不見了對吧？"
2002705-73 = "因此，有點睡不著……"
2002705-74 = "[s] 「…………」"
2002705-75 = "我想最後再看一次的話，說不定就能睡著了。"
2002705-76 = "所以，就稍微……"
2002705-80 = "……果然在這種時間出去是不行的嗎？"
2002705-81 = "[s9]「一起走吧，白子。」\n[s10]「這樣的話必須要有一個同伴呢。」"
2002705-84 = "……！#n……老師也要來嗎？"
2002705-85 = "……嗯，走吧。"
2002705-89 = "……那麼，往這邊。"
2002705-97 = "……到了。"
2002705-101 = "嗯……"
2002705-102 = "[s11]「怎麼了嗎？」\n[s12]「表情看起來不太開心……」"
2002705-105 = "……嗯。"
2002705-106 = "大海……和傍晚的時候看到的，好像不太一樣……"
2002705-107 = "……因為漲潮的關係，傍晚玩樂的地方已經被海水淹沒了是嗎？"
2002705-108 = "怎麼會……所以那個時候的景色……"
2002705-109 = "已經再也看不見了啊。"
2002705-110 = "[s13]「一定還會有更有趣的事在等著我們的哦。」\n[s14]「就算它們跟過去不盡相同。」"
2002705-113 = "什麼意思……？"
2002705-114 = "你說回去之後還能做更多事……？#n要怎麼做……？學校裡又沒有海……"
2002705-115 = "重要的並不是海……？"
2002705-116 = "嗯……有點難懂，我不是很理解。"
2002705-117 = "那……是指還能烤肉……或能放煙火嗎？"
2002705-118 = "……也不是？"
2002705-119 = "那究竟是……"
2002705-120 = "[s15]「對此保持著期待才是最重要的，不是嗎？」\n[s16]「相信將來會有更快樂的事在等著我們。」"
2002705-123 = "……唔嗯。"
2002705-124 = "對不起，老師。#n對我來說可能有點難懂。"
2002705-128 = "但是……"
2002705-129 = "嗯，也許因為是老師說的話吧……#n已經開始有點好奇了……"
2002705-130 = "期待……是嗎。"
2002705-131 = "嗯……雖然現在還不明白，也許到時候就會知道了呢。"
2002705-132 = "我有這種感覺。"
2002705-133 = "…………"
2002705-134 = "……嗯。#n有點高興，心情似乎也輕鬆了一點。"
2002705-141 = "老師……"
2002705-143 = "……我很期待哦。"

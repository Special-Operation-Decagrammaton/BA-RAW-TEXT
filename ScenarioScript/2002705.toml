[translation]
2002705-1 = "Expectations"
2002705-2 = "I had a feeling Shiroko was in trouble, so I headed toward her room at the resort."
2002705-3 = "When I came around the corner, I caught sight of a figure across the hall."
2002705-11 = "[ns1] \"That's Shiroko...\"\n[ns2] \"What's she doing out this late?\""
2002705-22 = "[ns] Follow Shiroko."
2002705-28 = "[ns] \"(...?)\""
2002705-30 = "[ns3] \"I lost her...\"\n[ns4] \"She vanished!\""
2002705-33 = "..."
2002705-44 = "Sensei."
2002705-46 = "[ns] \"...?!\""
2002705-49 = "[ns5] \"Whoa!\"\n[ns6] \"Shiroko...?\""
2002705-54 = "..."
2002705-55 = "I'm sorry, Sensei. I didn't mean to surprise you."
2002705-56 = "I thought I was being followed. So I hid."
2002705-57 = "Then I saw it was you. I called out, and..."
2002705-58 = "Oh, where was I going? Well..."
2002705-59 = "Nowhere... I was just...going for a morning walk..."
2002705-63 = "I'm sorry... That was a lie."
2002705-64 = "The truth is...something is bothering me. I wanted to see it again."
2002705-65 = "The beach, I mean."
2002705-66 = "[s7] \"Where we shot off those firecrackers?\"\n[s8] \"Where we had barbecue together?\""
2002705-69 = "...Yes."
2002705-70 = "I thought about telling someone where I was going. But it's almost midnight..."
2002705-71 = "I didn't want to cause any fuss. Or bring anyone down."
2002705-72 = "But the fun things we did back there... I don't think I'll get to do them again. When we head back, I mean."
2002705-73 = "I tried to let it go. But I couldn't sleep..."
2002705-74 = "[s] \"...\""
2002705-75 = "I thought...if I go one more time...then I could sleep."
2002705-76 = "I wasn't going to stay long. Just a few minutes..."
2002705-80 = "It's a bad idea, right? It's too late."
2002705-81 = "[s9] \"I wouldn't mind a little stroll to the beach.\"\n[s10] \"I'm glad I caught you. You need a chaperone.\""
2002705-84 = "You'll come, too...?"
2002705-85 = "Okay. I like that."
2002705-89 = "This way..."
2002705-97 = "Here..."
2002705-101 = "Oh... Hm..."
2002705-102 = "[s11] \"Something the matter?\"\n[s12] \"It's not what you expected.\""
2002705-105 = "...Yes."
2002705-106 = "It looks different. Earlier, the sea looked...like..."
2002705-107 = "Oh, it's high tide? So the place where we played...is now under water..."
2002705-108 = "So...I can't see it...right now..."
2002705-109 = "The way it looked then... It'll never look that way again."
2002705-110 = "[s13] \"Everything changes, but that means you get to have new experiences.\"\n[s14] \"There's always next time.\""
2002705-113 = "What do you mean...?"
2002705-114 = "How can I...? The school...is not a beach..."
2002705-115 = "The beach, here... It's where the fun things happened..."
2002705-116 = "I don't understand, Sensei."
2002705-117 = "Are we going to barbecue when we get back? See the fireworks?"
2002705-118 = "Probably not, right?"
2002705-119 = "Then..."
2002705-120 = "[s15] \"Isn't there anything else to look forward to?\"\n[s16] \"There's no telling what new, fun experiences the future holds.\""
2002705-123 = "Um..."
2002705-124 = "I'm sorry, Sensei. I don't get it. Maybe...it's a tough concept for me..."
2002705-128 = "But..."
2002705-129 = "Hm. You're the one telling me this. So I feel this..."
2002705-130 = "What is this feeling? Expectation...?"
2002705-131 = "I don't understand now. But maybe I will in the future..."
2002705-132 = "That's the kind of feeling I'm getting."
2002705-133 = "..."
2002705-134 = "Oh. I feel a little better. And a little more sure."
2002705-141 = "Sensei."
2002705-143 = "I'll look forward to next time."

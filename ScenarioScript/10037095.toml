[translation]
10037095-3 = "Augh!"
10037095-9 = "We're outnumbered! They're stronger than us!"
10037095-10 = "[s] Stand with Mina and Marina."
10037095-15 = "[ns] Block in front of Kisaki."
10037095-21 = "...Sensei?"
10037095-22 = "Sensei...? "
10037095-23 = "Wh-What are you trying to do, Sensei?"
10037095-24 = "[s1] \"I know I shouldn't interfere too much in student clashes.\"\n[s2] \"But I wish you wouldn't be so hard on Kisaki.\""
10037095-27 = "...And why is that?"
10037095-28 = "[s] \"(It's because Kisaki is unwell, but I promised...)\""
10037095-30 = "[ns] \"Because Kisaki is doing her best for Shanhaijing.\""
10037095-31 = "Too much has happened for you to call this a difference in perspective."
10037095-32 = "Too many students were openly concerned about this issue. Many spoke out against what was happening."
10037095-33 = "Above all, we are trying to guide the president down the correct path."
10037095-34 = "So, Sensei, please... Step aside. "
10037095-35 = "...Even we don't want a reputation for being hostile toward Schale."
10037095-36 = "[s] \"...\""
10037095-38 = "Please do as they say, Sensei."
10037095-39 = "[s] \"But...\""
10037095-40 = "It's okay. It's me they're after. And it seems Genryumon students are feeling...confused."
10037095-41 = "Fufu... What else can a president who's lost the trust of her members possibly do?"
10037095-42 = "Traditionally, divine destiny comes from the voice of God. And the voice of God is the voice of the people."
10037095-43 = "And I, who have lost that, can follow no other path than this."
10037095-49 = "I can't stand any more of this!"
10037095-53 = "What was that?!"

[translation]
10037095-3 = "อึก...!"
10037095-9 = "แบบนี้เรียกว่าน้ำน้อยย่อมแพ้ไฟหรือเปล่านะ... เรื่องพลังใจเราสู้ไม่ไหวเลย...!"
10037095-10 = "[s] (ลุกขึ้นมาตามมินะกับมารินะ)"
10037095-15 = "[ns] (ยืนขวางข้างหน้าคิซากิ)"
10037095-21 = "ครู...?"
10037095-22 = "คุณครู...? "
10037095-23 = "คิดจะทำอะไรน่ะ คุณครู?"
10037095-24 = "[s1] \"ครูไม่ควรก้าวก่ายมากเกินไป แต่อย่าทำแบบนี้กันเลยนะ\"\n[s2] \"ตอนนี้อย่าเพิ่งตำหนิคิซากิอย่างรุนแรงกันเลยนะ\""
10037095-27 = "เพราะอะไรไม่ทราบ...?"
10037095-28 = "[s] (เหตุผลที่แท้จริงคือตอนนี้สุขภาพของคิซากิไม่สู้ดีนัก แต่ว่า...)"
10037095-30 = "[ns] \"ครูคิดว่าคิซากิพยายามอย่างเต็มที่เพื่อซานไห่จิงน่ะ\""
10037095-31 = "ถึงจะบอกว่าต่างคนต่างมุมมอง แต่ที่ผ่านมาก็มีเรื่องราวเกิดขึ้นมากมายค่ะ"
10037095-32 = "เหตุการณ์ในครั้งนี้ทำให้นักเรียนหลายคนเป็นกังวล แล้วก็มีนักเรียนจำนวนไม่น้อยเลยที่ไม่เห็นด้วย"
10037095-33 = "เหนือสิ่งอื่นใด พวกฉันแค่กำลังบอกให้ท่านประมุขกลับมาสู่เส้นทางที่ถูกต้องค่ะ"
10037095-34 = "เพราะงั้น คุณครูคะ ช่วยหลีกทางด้วยเถอะค่ะ "
10037095-35 = "พวกฉันไม่อยากถูกตราหน้าว่าเป็นชมรมที่เป็นปฏิปักษ์กับชาเล่ต์หรอกนะคะ..."
10037095-36 = "[s] \"...\""
10037095-38 = "ทำตามคำพูดของเด็กพวกนั้นเถอะ ครู"
10037095-39 = "[s] \"แต่ว่า...\""
10037095-40 = "เราไม่เป็นอะไร สิ่งที่เด็กพวกนั้นต้องการก็คือเรา และเด็กๆ มังกรดำเองก็... เหมือนจะรู้สึกสับสนอยู่ด้วย"
10037095-41 = "ฮุฮุ... ประมุขที่สูญเสียความเชื่อถือจากสมาชิกจะไปทำอะไรได้เล่า"
10037095-42 = "คำสั่งสวรรค์มาจากเจตนารมณ์ของสวรรค์ และเจตนารมณ์ของสวรรค์ก็คือเจตนารมณ์ของผู้คน"
10037095-43 = "คนที่หลงทางอย่างเรา... ไม่มีเส้นทางอื่นนอกจากเส้นทางนี้หรอก"
10037095-49 = "ให้ตายเถอะ! ทนฟังต่อไม่ไหวแล้ว"
10037095-53 = "อะไรน่ะ?!"

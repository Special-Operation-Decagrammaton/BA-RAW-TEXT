[translation]
10037095-3 = "唔……！"
10037095-9 = "寡不敵眾嗎……#n氣勢已經被壓下去了……！"
10037095-10 = "[s] 隨美奈和瑪麗娜一同站起身"
10037095-15 = "[ns] 擋在妃姬面前"
10037095-21 = "……老師？"
10037095-22 = "老師……？"
10037095-23 = "你，你打算做什麼，老師？"
10037095-24 = "[s1]「雖然我不該過分干預學生之間的意見衝突……」\n[s2]「但至少現在，我希望你們不要太過為難妃姬。」"
10037095-27 = "……此話怎說？"
10037095-28 = "[s]（其實是因為妃姬現在的狀態不太好……）"
10037095-30 = "[ns]「因為我認為妃姬已經盡力在守護山海經了。」"
10037095-31 = "這段時間已經發生了太多事，這絕非只是觀點的不同。"
10037095-32 = "儘管我們的行為會讓很多學生感到不安，甚至也有很多人對此不以為然……"
10037095-33 = "但那些都不重要，因為我們只想為門主大人指明正道。"
10037095-34 = "所以請你讓開吧，老師。"
10037095-35 = "……就算是我們，也不想揹上「與夏萊為敵的社團」這樣的汙名。"
10037095-36 = "[s] 「……」"
10037095-38 = "就照他說的做吧，老師。"
10037095-39 = "[s]「可是……」"
10037095-40 = "沒關係的。他們想找的人是妾身。#n況且現在玄龍門的各位……似乎也都相當不知所措。"
10037095-41 = "呵呵……一名失信於眾的門主，又能夠做些什麼呢？"
10037095-42 = "自古以來，天命本就源自天意，而天意即是民心。"
10037095-43 = "對於失去了民心的妾身而言……這就是唯一的道路了。"
10037095-49 = "真受不了！咱已經聽不下去了！"
10037095-53 = "什麼！？"

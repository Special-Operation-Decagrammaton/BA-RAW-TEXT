10015010-65 = "1;코토리;04\n#1;stiff\n#wait;1500"
10015010-66 = "1;코토리;04;……아니, 마침 '예비 부품'이 남아있던 참이라서요!\n#1;em;[땀]\n#1;hophop"
10015010-67 = "3;노아;99;후후, 엔지니어부 여러분이 먼저 의욕적으로 작업에 임해 주시니 저도 기쁘네요."

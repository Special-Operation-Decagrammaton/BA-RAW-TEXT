10015010-14 = "#wait;150"
10015010-15 = "#wait;2000"
10015010-16 = "1;코토리;00\n5;히비키;00\n3;우타하;00\n#1;black\n#3;black\n#5;black"
10015010-17 = "3;우타하;00\n5;히비키;00\n1;코토리;02;후후, 기계의 제작과 수리와 관련된 일이라면 저희에게 맡겨주세요!\n#1;a\n#1;em;[재잘]\n#1;hophop\n#5;black\n#3;black"
10015010-18 = "3;우타하;00\n5;히비키;03;응원용 로봇의 수리라면 간단한 일이니까…….\n#5;a\n#5;em;[반짝]\n#5;greeting\n#3;black"
10015010-19 = "1;코토리;02\n5;히비키;03\n3;우타하;05;우리가 갖고 있는 장비를 모두 동원한다면 반나절로도 충분하지.\n#3;em;[!]\n#3;a"
10015010-20 = "#all;hide"
10015010-21 = "3;노아;01;갑작스러운 부탁이었는데 선뜻 들어주셔서 감사합니다. 엔지니어부 여러분."
10015010-22 = "3;노아;01;덕분에 수리에 관한 문제는 한시름 놓을 수 있게 되었네요.\n#3;em;[음표]\n#3;greeting"
10015010-23 = "3;노아;01\n5;우타하;03;뭘 이 정도 가지고.\n#3;m1\n#5;al\n#5;em;[반응]"
10015010-24 = "3;노아;01\n5;우타하;02;엔지니어부 또한 밀레니엄 학원의 일원. 성공적인 대운동회 개최를 위해서라면 어떤 협력도 아끼지 않을게.\n#3;dl\n#5;m3"
10015010-25 = "5;우타하;07;……오히려 그동안 대운동회를 준비하면서 세미나가 어째서 우리에게 도움을 요청하지 않았는지가 더 의아할 정도인걸."
10015010-26 = "5;우타하;99;애초에 로봇의 제작을 우리에게 맡겨주었더라면, 어지간한 폭발에는 끄떡도 없을 정도의 튼튼한 로봇을 만들어 주었을 텐데……\n#5;em;[...]"
10015010-27 = "#all;hide"
10015010-28 = "3;노아;01;……….\n#3;closeup"
10015010-29 = "#wait;1200"
10015010-30 = "3;노아;03;……아마 그동안 엔지니어부가 납품해 온 물건들 때문이 아닐까요?\n#3;em;[반짝]\n#3;greeting"
10015010-31 = "3;우타하;02;……우리가 납품한 물건?\n#3;em;[?]"
10015010-32 = "3;우타하;06;그동안 엔지니어부에서 만들어 온 물건에 결함은 없었을 텐데……\n#3;stiff"
10015010-33 = "3;우타하;06\n1;노아;07;결함이라기보다는, 예상치 못했던 추가 기능 때문에 사고가 벌어진 경우가 몇 번 있었죠.\n#1;ar\n#1;em;[반응]\n#3;m5"
10015010-34 = "1;노아;99;예를 들자면, 세미나 공용 휴게실의 커피 머신에 달린 커다란 드릴이라든가……"
10015010-35 = "#all;hide"
10015010-36 = "3;코토리;05;그건 드릴이 아니라 커피 원두 분쇄용 그라인더예요!\n#3;closeup\n#3;em;[!]"
10015010-37 = "3;코토리;03;다이아몬드만큼이나 단단한 경도의 톱날이 내장되어 있기 때문에, 많은 양의 원두도 순식간에 갈아낼 수 있답니다!\n#3;em;[재잘]"
10015010-38 = "3;노아;02;미화 정비용 자동 청소기에 달린 화염방사기라든가……?"
10015010-39 = "3;히비키;99;이동식 청소기가 흡입할 수 있는 쓰레기에는 한계가 있으니까……\n#3;em;[...]"
10015010-40 = "3;히비키;02;타는 쓰레기는 그 자리에서 소각하는 게 처리하기에 더 편리해.\n#3;greeting"
10015010-41 = "3;노아;03;뭐, 저도 인상적이고 재미있는 발상이라고 생각했지만, 유우카 쨩은 그렇게 생각하지 않은 모양이라서요."
10015010-42 = "3;노아;02;게다가 그 추가 기능 때문에 세미나의 임원이 커피를 마시려다 휴게실의 벽에 커다란 구멍을 낸 사고도 있었고……"
10015010-43 = "3;우타하;99;본래 새로운 기술을 정착시키기 위해서는 대가를 지불해야 하는 법……"
10015010-44 = "3;우타하;05;비용과 실패를 두려워해서는 패러다임의 전환을 이뤄낼 수 없다고!\n#3;em;[!]\n#3;jump"
10015010-45 = "3;노아;01;후후. 저도 그 생각에는 십분 공감하지만, 유우카 쨩이 그 말을 들으면 눈에 불을 켜고 영수증을 들고 달려올 테니 이 이야기는 여기서의 비밀로 하도록 하죠.\n#3;em;[음표]\n#3;greeting"
10015010-46 = "#all;hide"
10015010-47 = "3;우타하;02;그럼 일단은 우선 파손된 응원 로봇의 상태부터 확인해 볼까?\n#3;a"
10015010-48 = "1;코토리;04;으음…… 이거 생각보다 상태가 심각한데요. 폭발로 인한 충격 때문에 축이 통째로 망가져서 관절부를 모두 교체해야겠어요.\n#1;a\n#1;em;[속상함]"
10015010-49 = "5;히비키;05;게다가 회로 기판도 통째로 불에 그을려서, 처음부터 납땜 작업을 해야겠어…….\n#5;a\n#5;greeting"
10015010-50 = "3;우타하;04;우발적인 사고라고 들었는데 하필이면 수리하기 어려운 바이탈 파트만 의도한 것처럼 집중적으로 파손되다니……"
10015010-51 = "3;우타하;04;……단순한 폭발 사고라고 하기에는 의심스러운 부분이 많은걸.\n#3;em;…"
10015010-52 = "#all;hide"
10015010-53 = "3;노아;05;저도 의심스러운 부분은 있습니다만. 지금으로서는 물증도, 증거를 조사할 시간도 없으니까요.\n#3;em;[반응]"
10015010-54 = "3;노아;05;이 문제는 축제를 진행하며 천천히 조사해보도록 하죠."
10015010-55 = "3;노아;01;……그래서 수리에는 얼마나 시간이 소요될 것 같나요?\n#3;em;[?]"
10015010-56 = "3;노아;01\n5;우타하;06;수리를 한다면 개회식 시간에 맞추어 아슬아슬하게 끝낼 수 있을 것 같지만……\n#3;m1\n#5;al\n#5;em;…"
10015010-57 = "5;우타하;02;아예 새로 만들게 해준다면 3시간 내로 완성해볼게."
10015010-58 = "3;노아;04;네? 아예 새로 처음부터 로봇을 만드시겠다고요?\n#3;em;[?!]\n#3;shake"
10015010-59 = "3;노아;04;세미나의 입장에서는 상관없습니다만…… 비용과 시간은 괜찮으신가요?"
10015010-60 = "3;노아;04\n1;코토리;03;그건 괜찮아요. 안 그래도 마침 신형 전차를 개조하기 위해 준비한 부품이……\n#1;em;[재잘]\n#1;ar\n#3;m3"

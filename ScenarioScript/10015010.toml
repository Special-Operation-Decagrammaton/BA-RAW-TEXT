[translation]
10015010-1 = "#title;1화;밀레니엄의 마이스터"
10015010-2 = "#place;밀레니엄 공업 실습실"
10015010-3 = "3;노아;99;대운동회 준비를 위해 가장 먼저 해결해야 할 문제는……\n#3;em;…\n#3;a"
10015010-4 = "3;노아;01;역시 파손된 응원 로봇을 수리하는 일이겠지요."
10015010-5 = "3;노아;02;유우카 쨩은 '사소한 폭발'이라고 말했었지만, 로봇의 파손 상태는 사소하지 않은 것 같네요.\n#3;stiff"
10015010-6 = "3;노아;02;최악의 경우에는 수리를 하는 것보다 새로 처음부터 만드는 게 빠를지도……"
10015010-7 = "[s] \"내일 아침까지 가능할까……?\""
10015010-8 = "3;노아;01;통상의 경우는 불가능하다고 답하겠습니다만…… 이번에는 괜찮습니다.\n#3;em;[반응]"
10015010-9 = "3;노아;99;어떠한 고장이라도 단시간에 수리하는, 밀레니엄 제일의 '마이스터' 집단을 불렀으니까요.\n#3;greeting"
10015010-10 = "3;노아;03;바로…… <엔지니어부> 여러분입니다!\n#3;em;[반짝]"
10015010-11 = "#st;[0,0];instant;1;"
10015010-12 = "#clearST"

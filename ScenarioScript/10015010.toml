10015010-95 = "#all;hide"
10015010-96 = "5;우타하;01\n1;노아;99;그리고 가장 중요한 마지막 조건입니다만…… 기한 내에 완성시킬 것.\n#1;em;…\n#1;a\n#5;a\n#5;h"
10015010-97 = "5;우타하;02;……기한이라면?\n#5;em;[?]"
10015010-98 = "1;노아;05;알고 계시겠지만 대운동회의 개최까지 이제 시간이 얼마 남지 않았습니다.\n#1;greeting"
10015010-99 = "1;노아;99;작품의 완성도는 들인 시간에 비례한다고 하지만, 아무리 좋은 작품이라도 제시간에 선보이지 못한다면 의미가 없으니까요."
10015010-100 = "5;우타하;02;그야 당연하지. 마감 엄수는 프로의 기본 소양이니까.\n#5;em;[반응]"
10015010-101 = "5;우타하;05;엔지니어부의 명예를 걸고서라도 기한 내에 완벽한 응원 로봇을 만들어 보이겠어."

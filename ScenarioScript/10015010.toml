[translation]
10015010-1 = "第1話;千年的巨匠"
10015010-2 = "千年．工業實習室"
10015010-3 = "為了讓大運動會順利舉行，最先要解決的問題……"
10015010-4 = "果然是修復應援機器人吧。"
10015010-5 = "雖然優香醬說是「小」爆炸，#n但機器人的毀損狀態相當嚴重……"
10015010-6 = "在最糟的情況下，或許重新製作會比修理還快也說不定。"
10015010-7 = "[s]「來得及在明天早上完成嗎……？」"
10015010-8 = "如果是平時，我可能會回答這是不可能的……不過這次沒問題。"
10015010-9 = "因為我們有任何故障都能在短時間內修復、千年首屈一指的「巨匠」們。"
10015010-10 = "沒錯……就是「工程師部」的大家！"
10015010-17 = "呵呵呵……如果是和機器製作與修理有關的事，請交給我們吧！"
10015010-18 = "修理應援機器人，那是再簡單不過了……"
10015010-19 = "只要動員我們所有的人力、物力，半天的時間就夠了。"
10015010-21 = "你們能答應這突如其來的請求，真是太感謝了。"
10015010-22 = "這樣機器人的事就能放心了。"
10015010-23 = "小菜一碟。"
10015010-24 = "工程師部也是千年的一員。#n為了大運動會的成功，自然在所不辭。"
10015010-25 = "……研討會在準備大運動會的期間竟然都沒有找我們幫忙，這點反而讓我比較意外。"
10015010-26 = "如果一開始就委託我們製造機器人，肯定能抵擋一般的爆炸……"
10015010-28 = "……"
10015010-30 = "……我想恐怕是因為看了工程師部這段時間交出的成品吧？"
10015010-31 = "……我們交出的成品？"
10015010-32 = "我不認為我們做的東西有什麼缺陷啊……"
10015010-33 = "與其說是缺陷……#n不如說是預期之外的附加功能已經引發了數起事件……"
10015010-34 = "比如在研討會休息室的咖啡機上裝了一個巨大的鑽頭……"
10015010-36 = "那不是鑽頭，是磨咖啡豆的磨豆機！"
10015010-37 = "因為裝有如同鑽石般堅硬的鋸齒，#n所以能在瞬間磨碎大量的咖啡豆！"
10015010-38 = "那在掃地機器人上加裝火焰噴射器是為了……？"
10015010-39 = "因為掃地機器人能吸入的垃圾量有限嘛……"
10015010-40 = "所以乾脆直接把垃圾燒成灰燼，處理起來更方便。"
10015010-41 = "雖然我覺得這些點子都很有趣……但優香醬似乎不這麼認為。"
10015010-42 = "畢竟曾經發生過研討會成員想喝咖啡，卻不小心把休息室的牆壁鑽出大洞的意外……"
10015010-43 = "要讓新技術成熟，總是得付出點代價……"
10015010-44 = "如果害怕失敗，就無法跳脫框架！"
10015010-45 = "呵呵，我也十分認同那個想法……不過如果被優香醬聽到的話，#n他肯定會氣沖沖地拿著帳單衝過來，所以還是當成我們之間的秘密吧。"
10015010-47 = "那麼先來確認一下應援機器人的毀損狀態吧？"
10015010-48 = "唔嗯……狀況比想像中還嚴重呢。#n爆炸的衝擊完全破壞了軸承……得更換整個關節部分才行。"
10015010-49 = "電路板也燒壞了，必須重新焊接……"
10015010-50 = "明明聽說是偶發事件，損壞的部分卻好像刻意集中在難以修理的重要零件……"
10015010-51 = "……以單純的爆炸意外來說，疑點實在太多了。"
10015010-53 = "我也有同感，不過現在沒有時間蒐集證據和調查物證……"
10015010-54 = "詳細原因就等慶典開始後再慢慢調查吧。"
10015010-55 = "……那麼修理需要多少時間呢？"
10015010-56 = "純粹修理的話，大概只能勉強趕上開幕式……"
10015010-57 = "但如果是製造「新的」，3小時內就能完成。"
10015010-58 = "重新製造反而比較快嗎，為何……？"
10015010-59 = "雖說以研討會的立場來看，兩個方案都可行……但費用和時間不要緊嗎？"
10015010-60 = "不要緊！#n手邊剛好有為了改造新型戰車準備的零件……"
10015010-66 = "……更正！#n是剛好有多餘的「備用零件」！"
10015010-67 = "呵呵，很高興工程師部的大家能這麼積極主動。"
10015010-68 = "不過如果要重新設計的話，必須滿足幾項條件。"
10015010-70 = "……條件？"
10015010-71 = "是的。雖然是臨時的委託，但這個應援機器人依舊是研討會所訂購的「商品」。"
10015010-72 = "身為訂購商品的客戶……提出一些需求應該沒問題吧？"
10015010-73 = "──只要不是太強人所難的要求。"
10015010-74 = "第一個條件是……堅固。"
10015010-75 = "考慮到前一個應援機器人是因為意外而受損，#n所以我希望新的應援機器人能更加堅固，能承受一定程度的外部衝擊。"
10015010-76 = "這點你儘管放心。#n工程師部製作的機器人向來是出了名的堅固。"
10015010-81 = "唔嗯……用鋼板和陶瓷組成複合裝甲如何？"
10015010-82 = "複合裝甲的防護力是不錯，但填充物太多的話，機器人的體積會變得太大……"
10015010-83 = "延展鋼板，使構造均質化如何……？"
10015010-85 = "第二個條件是……能在任何地形自由移動。"
10015010-86 = "由於會場有許多輪胎無法通行的地形，因此我希望機器人能有因應各種地形的能力。"
10015010-88 = "雖然有點麻煩……但這不難，可以做到。"
10015010-91 = "果然得作四足步行機器人嗎？#n不過考慮到學習如何控制姿勢需要花費的時間，似乎趕不太上……"
10015010-92 = "……這種時候就用履帶的方案吧。"
10015010-93 = "只要在輪胎上加裝履帶提升抓地力，即便是斜坡或障礙物也能輕易突破……"
10015010-94 = "[s]「有種不祥的預感……」"
10015010-96 = "最後也是最重要的條件……就是要在期限內完成。"
10015010-97 = "……期限？"
10015010-98 = "誠如你所知，大運動會開幕前的時間已所剩無幾。"
10015010-99 = "雖說作品的完成度與花費的時間成正比，#n但無論作品再怎麼優秀，無法如期發表也沒有意義。"
10015010-100 = "嗯，那是當然的。#n遵守截止時間是專業人士的基本素養。"
10015010-101 = "我會賭上工程師部的榮譽，在期限內完成應援機器人。"
10015010-102 = "呵呵，聽到你這麼說，我就放心了。"
10015010-103 = "[s]「沒有我能幫忙的地方嗎？」"
10015010-104 = "唔嗯……應該是不需要老師的協助。#n畢竟我們平時就會製作這種規模的機器人。"
10015010-106 = "況且製作機器人時會用到許多鋒利的工具，老師在旁邊的話挺危險的。"
10015010-107 = "……老師就去幫忙乃愛前輩和其他學生吧。"
10015010-109 = "非常感謝。#n那麼我和老師先去處理其他業務……之後就拜託各位了。"
10015010-110 = "我們預計會在3小時後回來，機器人的修理……"
10015010-111 = "不，機器人的製作就萬事拜託了。"
10015010-118 = "呵呵。真的很久沒有接到研討會的機器人製作委託了。"
10015010-119 = "而且還是要在大運動會上使用的應援機器人，#n這可是在奇普托斯的所有學生面前展示我們發明的好機會！"
10015010-120 = "我們就來嘗試新研發的技術吧！"
10015010-121 = "我想測試一下先前研發的陀螺儀感測器的穩定性……"
10015010-122 = "冷靜冷靜，大家稍安勿躁。"
10015010-123 = "在開始這次作業之前，我有話想跟大家說。"
10015010-126 = "奇普托斯大運動會是2年舉辦一次的大型活動……"
10015010-127 = "為了它的成功，研討會的各位付出了難以言喻的努力。"
10015010-128 = "就算是為了技術的發展，也不能因為一己私慾而使他們的努力化為泡影。"
10015010-129 = "所以為了大運動會的成功，這次我們得慎重地思考。"
10015010-130 = "原來如此……這麼說也沒錯。"
10015010-131 = "畢竟我們也不是那麼不識相的人……"
10015010-132 = "……嗯，就這麼辦。"
10015010-133 = "謝謝大家的諒解。"
10015010-134 = "好，那麼首先……"
10015010-135 = "就從在正面安裝15mm機關炮開始動工吧！"
10015010-138 = "是！"

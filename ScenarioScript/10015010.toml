10015010-75 = "3;노아;05;지난번 응원 로봇이 불의의 사고로 파손된 만큼, 새로 제작하는 응원 로봇은 어지간한 외부 충격에도 견딜 수 있을 만큼 튼튼했으면 좋겠네요.\n#3;m2"
10015010-76 = "3;노아;05\n5;우타하;03;그거라면 안심해도 좋아. 엔지니어부에서 만든 로봇들은 튼튼하기로 정평이 나 있으니까.\n#5;m4"

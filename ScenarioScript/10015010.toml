10015010-105 = "#all;hide"
10015010-106 = "3;코토리;02;오히려 로봇 제작에는 날카로운 공구를 많이 사용하기 때문에 선생님이 곁에 계시면 위험할 수도 있어요.\n#3;hophop\n#3;em;[재잘]"
10015010-107 = "3;히비키;99;……그러니 선생님은 노아 선배와 다른 학생들을 도와줘.\n#3;greeting"

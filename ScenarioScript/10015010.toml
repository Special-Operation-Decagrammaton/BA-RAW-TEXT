[translation]
10015010-1 = "Episode 1;The Meister of Millennium"
10015010-2 = "Millennium Industrial Laboratory"
10015010-3 = "Let's go down Yuuka's list. First order of business is..."
10015010-4 = "...repairing the damaged cheer bot."
10015010-5 = "Let me warn you, Yuuka downplayed it severely. There's nothing minor about the damages."
10015010-6 = "At this point, it might be better for us to just remake the whole thing from scratch."
10015010-7 = "[s] \"...By tomorrow morning?\""
10015010-8 = "I know, I know. But I've called in the best of the best for this daunting task."
10015010-9 = "They're our resident technological meisters..."
10015010-10 = "The Engineering Department!"
10015010-17 = "We know all the ins and outs of machinery! In fact, did you know that the first machine was created in..."
10015010-18 = "We don't need the history of the industrial age to fix a cheer bot, Kotori."
10015010-19 = "It'll require a lot of resources, but I estimate about half a day for repairs."
10015010-21 = "Thank you very much for coming so quickly."
10015010-22 = "With you all on the case, my worries have dissipated into the atmosphere."
10015010-23 = "We'll be sure to deliver."
10015010-24 = "The Engineering Department are proud students of Millennium. We'll help in any way we can."
10015010-25 = "Honestly, we were a little surprised Seminar didn't reach out to us sooner."
10015010-26 = "If we had been the ones to make the cheer bot, it would be waving its pom-poms in the air as we speak. A petty explosion wouldn't have so much as scratched it."
10015010-28 = "..."
10015010-30 = "Are you genuinely saying this to me after the last few shipments you sent us?"
10015010-31 = "The last few shipments... Ah, the parts you requested?"
10015010-32 = "Nothing made by the Engineering Department should be defective."
10015010-33 = "Defective might be a strong word. But they were certainly...unique. And caused damages."
10015010-34 = "For example, the gigantic drill you installed in the coffee machine we use in Seminar's lounge..."
10015010-36 = "T-Technically that was a coffee bean grinder, not a drill."
10015010-37 = "We figured the stronger the blade the better! So we made it as hard as diamonds to be able to grind up lots and lots of coffee beans at once!"
10015010-38 = "It was a drill. And what about the flame thrower in the automatic vacuum cleaner? What is your explanation there?"
10015010-39 = "Vacuum cleaners are limited. There are all kinds of messes it doesn't have the firepower for."
10015010-40 = "My creation had to account for as many potential scenarios as possible. So, a flame thrower to incinerate any flammable materials the vacuum couldn't handle."
10015010-41 = "Okay, fine. I'll admit I liked that one a little bit. But Yuuka absolutely, most certainly did not."
10015010-42 = "She also didn't like calculating the expenses of fixing the giant hole in the wall your \"coffee grinder\" made."
10015010-43 = "High risk, high rewards."
10015010-44 = "It's the price of progress! And fear of failure or bankruptcy is the enemy!"
10015010-45 = "Yes, yes. While I do agree, Yuuka would probably punish us with receipts and balance books if she heard that. So let's not share with the class."
10015010-47 = "Beginning diagnosis on damages."
10015010-48 = "Oh dear, oh my. Look at the axis here... It was completely destroyed by the shock of the explosion. I thought at least one or two joints would be salvageable."
10015010-49 = "The circuit board is fried. We'll have to solder a new one from scratch."
10015010-50 = "Did you say this was an accident? The damage seems intentionally focused on the most difficult parts to fix. I would've expected more damage all around."
10015010-51 = "I find it hard to believe this was a science experiment gone wrong."
10015010-53 = "I have my suspicions, but we don't have the proof nor the time to investigate."
10015010-54 = "We can handle that after the festival has successfully closed."
10015010-55 = "So? How long?"
10015010-56 = "If we try to fix it, we'll make it just in time for the opening ceremony."
10015010-57 = "But if we just make a new one from scratch, I estimate about three hours."
10015010-58 = "Really? You think it would be better to rebuild completely?"
10015010-59 = "I mean, as long as I have a cheer bot in the end, I don't really care about your approach. But how much more would it cost us?"
10015010-60 = "Not a thing! We've got this awesome stuff for tank modifications we've been—"
10015010-66 = "Ahem! I mean...the Engineering Department is always prepared with any parts you might need!"
10015010-67 = "Well, I'm glad you all seem so passionate about this."
10015010-68 = "I'm mostly okay with it...as long as I can set a few requirements."
10015010-70 = "Requirements? What kind?"
10015010-71 = "It may be a rush order, but this is still a product Seminar is ordering from the Engineering Department."
10015010-72 = "As the client, I can request a few things here and there, right?"
10015010-73 = "...Within reason."
10015010-74 = "First, I'd like for it to be strong. Very strong."
10015010-75 = "Considering the gruesome end of the first cheer bot, I'd strongly prefer for this one to not meet the same fate."
10015010-76 = "A requirement you don't even need to mention. If a robot isn't capable of taking a punch or two, it wasn't made by the Engineering Department."
10015010-81 = "Oh! Oh! How about we make composite armor by adding ceramic to galvanized steel?"
10015010-82 = "That would get the job done, but it needs to be able to cheer. We can't weigh it down with too many attachments."
10015010-83 = "I know. What if we homogenize the structure by rolling the steel?"
10015010-85 = "Next, it needs to be able to travel on any terrain."
10015010-86 = "Regular wheels won't do, it won't be able to navigate the stairs and inclines. It needs to be able to move around as easily as a Millennium student."
10015010-88 = "That one is a little more difficult, but nothing we can't handle."
10015010-91 = "What if we gave it legs, like a dog? Augh, that wouldn't work. It would take too much time to calibrate its movements and get it walking properly."
10015010-92 = "We can just use continuous tracks."
10015010-93 = "The robot will still have wheels, but the tracks will give it the grip to climb over anything."
10015010-94 = "[s] \"I've got a really bad feeling about this...\""
10015010-96 = "Last, but most importantly... Have it done by the deadline."
10015010-97 = "The deadline?"
10015010-98 = "I'm sure you're all very aware that the field day begins tomorrow."
10015010-99 = "I realize time spent and quality have a direct correlation, but quality won't make a difference if it can't be used when we need it."
10015010-100 = "Please. We're professionals. We would never miss a deadline."
10015010-101 = "With the Engineering Department's honor on the line, we'll create a perfect cheer bot with plenty of time to spare."
10015010-102 = "And I believe you. I'll be counting on you."
10015010-103 = "[s] \"Is there anything I can do to help?\""
10015010-104 = "There's no need. Developing robots is our wheelhouse."
10015010-106 = "And we work with a lot of dangerous and sharp tools, Sensei! You need to know how to use them exactly right. If you want, I recommend beginning with some light reading! I personally—"
10015010-107 = "Basically, go help someone who needs it."
10015010-109 = "We'll leave you to it, then."
10015010-110 = "Remember, three hours from now! I hope the repairs..."
10015010-111 = "I mean, I hope the robot will be ready for pickup by then."
10015010-118 = "Heehee! It's been a while since Seminar asked us for a robot."
10015010-119 = "Not only that, this is an important one! A cheer bot for every single student in all of Kivotos to be amazed by at the one and only Kivotos Halo Festival!"
10015010-120 = "Let's test out all the new stuff we've been making on it!"
10015010-121 = "Yes, yes. What about the gyro sensor? We haven't been able to assess its stability yet."
10015010-122 = "Let's not get ahead of ourselves."
10015010-123 = "I'd like for you to listen to me carefully before we begin."
10015010-126 = "The Kivotos Halo Festival is an event held for the entire region every two years..."
10015010-127 = "Seminar has worked endlessly and tirelessly to make this event not only possible, but beyond Kivotos' expectations."
10015010-128 = "I would never abandon our mission of technological advancement. But our ambition cannot be the reason Seminar's efforts come to naught. It simply cannot."
10015010-129 = "So, our mission here today is not to change the world, but to create a cheer bot Seminar will be proud of."
10015010-130 = "Ugh... She's right! Well, it can't be helped!"
10015010-131 = "You make it sound like we're sociopath inventors who have no sense of reason..."
10015010-132 = "...but I get it. Fine."
10015010-133 = "Thank you for understanding."
10015010-134 = "Now, let's start nice and easy."
10015010-135 = "I was thinking... How about a fifteen millimeter machine gun in the front?"
10015010-138 = "Yes, ma'am!"

10015010-69 = "#all;hide"
10015010-70 = "3;히비키;02;……조건?\n#3;em;[?]"
10015010-71 = "3;노아;01;네. 갑작스럽게 부탁드리긴 했지만, 일단 이 응원 로봇도 세미나의 이름으로 발주하는 '상품'이니까요.\n#3;greeting"
10015010-72 = "3;노아;03;상품을 발주하는 클라이언트로서 몇 가지 희망 사항을 요청하는 정도는 괜찮겠지요?"

10015010-87 = "#all;hide"
10015010-88 = "3;우타하;07;까다롭긴 하지만…… 그것도 어렵진 않아. 괜찮아.\n#3;greeting"
10015010-89 = "#zmc;instant;400,100;1896\n4;코토리;01\n2;히비키;01\n#3;hide\n#4;h"
10015010-90 = "#zmc;instant;400,100;1896\n4;코토리;01\n2;히비키;01\n#wait;500\n#4;h"
10015010-91 = "#zmc;instant;400,100;1896\n2;히비키;01\n4;코토리;05;역시 사족 보행형 로봇으로 제작해야 할까요? 자세 제어 학습에 걸리는 시간을 고려하면 너무 시간이 오래 걸릴 것 같은데……\n#4;em;[?]\n#2;h\n#fontsize;55"
10015010-92 = "#zmc;instant;400,100;1896\n4;코토리;05\n2;히비키;05;……그럴 때는 무한궤도를 쓰면 돼.\n#2;greeting\n#4;h\n#fontsize;55"
10015010-93 = "#zmc;instant;400,100;1896\n4;코토리;05\n2;히비키;02;바퀴 위에 궤도를 붙여 접지력을 높인 무한궤도라면, 높은 경사나 장애물이 있어도 손쉽게 돌파할 수 있으니까……\n#2;em;[재잘]\n#4;h\n#fontsize;55"

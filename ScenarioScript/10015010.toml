[translation]
10015010-1 = "ตอนที่1;ไมสเตอร์แห่งมิลเลเนียม"
10015010-2 = "ห้องปฏิบัติงานวิศวกรรม มิลเลเนียม"
10015010-3 = "ปัญหาแรกที่จะต้องจัดการเพื่อเตรียมงานมหกรรมแข่งขันกีฬาก็คือ..."
10015010-4 = "การซ่อมหุ่นยนต์เชียร์ที่เสียหายค่ะ"
10015010-5 = "ถึงยูกะจังจะบอกว่าเป็นแค่ 'การระเบิดขนาดย่อม' แต่หุ่นยนต์ก็เสียหายไปเยอะเลยค่ะ"
10015010-6 = "กรณีที่เลวร้ายที่สุดคือสร้างขึ้นมาใหม่ตั้งแต่ต้นคงจะเร็วกว่าซ่อมอีกน่ะค่ะ..."
10015010-7 = "[s] \"ถ้าจะให้เสร็จภายในพรุ่งนี้เช้า มันจะเป็นไปได้มั้ย...?\""
10015010-8 = "ถ้าเป็นสถานการณ์ปกติฉันคงต้องบอกว่ามันเป็นไปไม่ได้... แต่ครั้งนี้มันเป็นไปได้ค่ะ"
10015010-9 = "เพราะว่าฉันเรียกกลุ่มคนที่ 'ไมสเตอร์' สุดๆ แห่งมิลเลเนียมที่ซ่อมทุกอย่างได้ในเวลาอันรวดเร็วมาแล้ว#nยังไงล่ะคะ"
10015010-10 = "...<ชมรมวิศวกรรม> นั่นเองค่ะ!"
10015010-17 = "ฮุฮุ ถ้าเป็นเรื่องการสร้างหรือซ่อมแซมอุปกรณ์ละก็ไว้ใจพวกเราได้เลยค่ะ!"
10015010-18 = "ซ่อมหุ่นยนต์เชียร์น่ะก็แค่เรื่องง่ายๆ..."
10015010-19 = "ถ้าเราใช้อุปกรณ์ของชมรมทั้งหมดที่มี แค่ครึ่งวันก็เสร็จแล้วละ"
10015010-21 = "ขอบคุณชมรมวิศวกรรมทุกคนมากนะคะที่อุตส่าห์มาช่วย ทั้งๆ ที่ขอร้องอย่างกะทันหันแบบนี้"
10015010-22 = "พอได้ทุกคนมาช่วย ปัญหาเรื่องการซ่อมแซมก็เลยแก้ไปได้เปราะหนึ่งแล้วละค่ะ"
10015010-23 = "ไม่ใช่เรื่องใหญ่อะไรหรอก"
10015010-24 = "ชมรมวิศวกรรมก็เป็นนักเรียนของโรงเรียนมิลเลเนียมนี่นะ พวกเราจะให้ความร่วมมือเต็มที่ ให้งาน#nมหกรรมแข่งขันกีฬาลุล่วงไปด้วยดี"
10015010-25 = "...พวกเราเองก็ยังสงสัยอยู่เลยว่าทำไมเซมิน่าไม่ติดต่อมาขอความร่วมมือให้ช่วยเตรียมงานมหกรรม#nแข่งขันกีฬาเลยน่ะ"
10015010-26 = "ถ้าให้เราสร้างหุ่นยนต์ตั้งแต่แรก ก็คงจะได้หุ่นยนต์ที่แข็งแรง แล้วก็ไม่เสียหายเพราะแรงระเบิดแค่นั้น#nหรอก..."
10015010-28 = "..."
10015010-30 = "...ก็อาจจะเป็นเพราะสิ่งประดิษฐ์ที่ชมรมวิศวกรรมเคยส่งมาให้ก็ได้นะคะ?"
10015010-31 = "...สิ่งประดิษฐ์ที่พวกเราส่งให้?"
10015010-32 = "ที่ผ่านมาของที่ชมรมวิศวกรรมสร้าง ไม่น่าจะมีข้อผิดพลาดนะ..."
10015010-33 = "อุบัติเหตุไม่ได้เกิดจากข้อผิดพลาด แต่มันมีอุบัติเหตุที่เกิดจากฟังก์ชันเพิ่มเติมที่คาดไม่ถึงอยู่หลาย#nครั้งเลยละค่ะ"
10015010-34 = "ตัวอย่างเช่น สว่านขนาดใหญ่ที่ติดอยู่ที่เครื่องชงกาแฟในห้องพักผ่อนของเซมิน่า..."
10015010-36 = "นั่นไม่ใช่สว่าน แต่เป็นเครื่องบดเมล็ดกาแฟต่างหากค่ะ!"
10015010-37 = "เนื่องจากมีใบมีดที่แข็งพอๆ กันกับเพชร เลยทำให้บดเมล็ดกาแฟปริมาณมากได้ในครั้งเดียวค่ะ!"
10015010-38 = "แล้วอย่างอุปกรณ์ดับเพลิงที่ติดอยู่กับเครื่องดูดฝุ่นอัตโนมัติล่ะคะ...?"
10015010-39 = "ก็เพราะว่าเครื่องดูดฝุ่นที่เคลื่อนที่เองได้ มันมีขีดจำกัดเรื่องการกำจัดขยะ..."
10015010-40 = "ถ้าเราดับไฟขยะที่กำลังลุกไหม้อยู่ได้ทันทีก็น่าจะสะดวกมากขึ้นน่ะ"
10015010-41 = "ฉันก็คิดว่านั่นเป็นความคิดที่สร้างสรรค์ดีเหมือนกันนะคะ แต่ท่าทางยูกะจังจะไม่ได้คิดแบบนั้นน่ะค่ะ"
10015010-42 = "ก่อนหน้านี้เคยมีสมาชิกเซมิน่าที่ตั้งใจจะดื่มกาแฟ แต่สุดท้ายก็จบลงด้วยการทำผนังห้องพักผ่อนกลาย#nเป็นรูขนาดใหญ่ด้วยค่ะ..."
10015010-43 = "มันก็เป็นเรื่องที่ต้องยอมแลก ถ้าอยากจะคิดค้นเทคโนโลยีที่ไม่เคยมีใครทำมาก่อนน่ะ..."
10015010-44 = "ถ้าไม่กล้าเสี่ยงหรือกลัวความผิดพลาดก็คงไม่มีวันประสบความสำเร็จได้หรอก!"
10015010-45 = "ฮุฮุ ฉันเองก็เห็นด้วยกับความคิดนั้นนะคะ แต่ว่าถ้ายูกะจังได้ยินเข้าคงจะไฟออกมาจากตา คว้าใบเสร็จ#nมาวิ่งไล่ฉันแน่ๆ ค่ะ เพราะฉะนั้นเรื่องนี้เก็บเป็นความลับจากยูกะจังนะคะ"
10015010-47 = "เอาละ ถ้างั้นมาตรวจสอบสภาพของหุ่นยนต์เชียร์ที่เสียหายกันเลยดีมั้ย?"
10015010-48 = "อืม... อาการหนักกว่าที่คิดไว้ซะอีกนะคะ แรงกระแทกจากระเบิดทำให้แกนกลางเสียหายหนัก น่าจะต้องเปลี่ยนข้อต่อทั้งหมดเลยค่ะ"
10015010-49 = "แล้วอีกอย่างแผงวงจรก็ไหม้ทั้งหมดเลย ทำให้ต้องเริ่มใหม่ตั้งแต่ขั้นตอนการบัดกรี..."
10015010-50 = "เห็นว่าเป็นอุบัติเหตุที่ไม่ได้ตั้งใจแท้ๆ แต่ว่าส่วนที่เสียหายกลับมีแต่จุดสำคัญที่ซ่อมยากๆ เหมือนกับ#nตั้งใจเลือกจุดที่จะทำลายเลยนะ..."
10015010-51 = "...มีจุดที่น่าสงสัยเยอะเกินกว่าที่จะเรียกว่าเป็นแค่เหตุระเบิดเล็กๆ เลยละ"
10015010-53 = "ฉันก็มีส่วนที่รู้สึกสงสัยเหมือนกันค่ะ แต่ว่าตอนนี้เราไม่มีเวลาที่จะสืบสวนหรือตามหาหลักฐานได้เลยค่ะ"
10015010-54 = "เราคงจะต้องตรวจสอบปัญหานี้ไปเรื่อยๆ ระหว่างที่จัดงานเทศกาลค่ะ"
10015010-55 = "...ว่าแต่ต้องใช้เวลาซ่อมนานเท่าไรเหรอคะ?"
10015010-56 = "ถ้าจะซ่อมก็คงทำให้เสร็จทันก่อนงานเปิดได้แบบเฉียดฉิว..."
10015010-57 = "แต่ถ้าให้สร้างอันใหม่เลยก็น่าจะสร้างเสร็จได้ภายใน 3 ชั่วโมงน่ะ"
10015010-58 = "คะ? จะสร้างหุ่นยนต์ใหม่ตั้งแต่ต้นเลยงั้นเหรอคะ?"
10015010-59 = "เซมิน่าก็ไม่ได้ติดขัดอะไรหรอกนะคะ... แต่ว่าเรื่องค่าใช้จ่ายกับเรื่องเวลามันจะไม่เป็นอะไรเหรอคะ?"
10015010-60 = "เรื่องนั้นไม่ต้องห่วงหรอกค่ะ พวกเรามีอะไหล่ที่เตรียมเอาไว้สำหรับพัฒนารถถังใหม่อยู่พอดี..."
10015010-66 = "...ไม่สิ หมายถึงมี 'อะไหล่สำรอง' อยู่พอดีน่ะค่ะ!"
10015010-67 = "ฮุฮุ เห็นชมรมวิศวกรรมทุกคนกระตือรือร้นที่จะช่วยแบบนี้ฉันก็ดีใจนะคะ"
10015010-68 = "แต่ว่าถ้าจะสร้างหุ่นยนต์ขึ้นมาใหม่ตั้งแต่ต้น ฉันก็มีเงื่อนไขอยู่ 2-3 ข้อค่ะ"
10015010-70 = "เงื่อนไข...?"
10015010-71 = "ค่ะ ถึงแม้จะเป็นคำขอร้องที่กะทันหันไปหน่อย แต่ว่ายังไงหุ่นยนต์เชียร์ตัวนี้ก็เป็น 'ชิ้นงาน' ที่สั่งในนาม#nของเซมิน่านี่คะ"
10015010-72 = "ในฐานะลูกค้าที่สั่งงานชิ้นนี้ ฉันมีสิ่งที่ต้องการอยู่นิดหน่อย คงจะไม่ติดปัญหาอะไรใช่มั้ยคะ?"
10015010-73 = "ถ้าไม่ใช่เรื่องที่เกินความสามารถก็ได้อยู่แล้ว"
10015010-74 = "เงื่อนไขข้อแรก... ขอให้สร้างหุ่นยนต์ที่แข็งแรง"
10015010-75 = "เนื่องจากหุ่นยนต์เชียร์ตัวก่อนหน้าเสียหายอย่างหนักจากอุบัติเหตุที่ไม่คาดคิด ครั้งนี้ก็เลยอยากให้#nหุ่นยนต์ที่จะสร้างใหม่แข็งแรงและทนทานต่อแรงกระแทกจากภายนอกค่ะ"
10015010-76 = "เรื่องนั้นไม่ต้องห่วง หุ่นยนต์ที่สร้างโดยชมรมวิศวกรรมน่ะ มีชื่อเสียงเรื่องความแข็งแรงอยู่แล้ว"
10015010-81 = "อืม... เอาแผ่นสังกะสีกับเซรามิกมาซ้อนกันแล้วทำเป็นเกราะป้องกันดีมั้ยคะ?"
10015010-82 = "ถึงจะใช้เกราะพิเศษเพิ่มการป้องกันได้ก็จริง แต่ยิ่งมีอุปกรณ์เสริมเยอะ หุุ่นยนต์ก็อาจจะขนาดใหญ่เกินไปก็ได้..."
10015010-83 = "แล้วถ้ารีดแผ่นเหล็กแล้วทำให้โครงสร้างรวมเป็นหนึ่งเดียวกันล่ะ...?"
10015010-85 = "เงื่อนไขข้อที่สอง... ต้องเคลื่อนที่ได้อย่างอิสระในทุกพื้นที่"
10015010-86 = "เพราะบริเวณที่จัดการงานนั้นมีขั้นบันไดที่ไม่สามารถเคลื่อนที่ด้วยล้อได้อยู่หลายที่เลยน่ะค่ะ ฉันอยาก#nให้หุ่นยนต์นี้เคลื่อนที่ได้ในทุกสถานการณ์โดยไม่ถูกปล่อยทิ้งไว้ค่ะ"
10015010-88 = "ถึงจะเป็นเรื่องยุ่งยากสักหน่อย... แต่ก็ไม่ยากเกินความสามารถพวกเราหรอกนะ สบายมาก"
10015010-91 = "แบบนี้คงต้องสร้างเป็นหุ่นยนต์ที่เคลื่อนที่ด้วยสี่ขาสินะคะ? แต่ถ้ารวมเวลาที่ต้องทดสอบการควบคุมทิศทาง ก็น่าจะใช้เวลาเยอะเกินไปนะ..."
10015010-92 = "...ถ้างั้นก็ใช้ล้อตะขาบก็ได้"
10015010-93 = "ใส่สายพานไปบนล้อเพื่อเพิ่มแรงยึดเหนี่ยว แบบนั้นก็น่าจะข้ามพื้นที่ลาดชันหรือว่าสิ่งกีดขวางอื่นๆ ได้ด้วย..."
10015010-94 = "[s] \"รู้สึกไม่สบายใจอย่างบอกไม่ถูกแฮะ...\""
10015010-96 = "และเงื่อนไขสุดท้ายที่สำคัญที่สุด... ขอให้สร้างหุ่นยนต์ให้เสร็จทันเวลาด้วยค่ะ"
10015010-97 = "...เวลาที่กำหนดเหรอ?"
10015010-98 = "อย่างที่ทราบกันดีค่ะว่าเหลือเวลาอีกไม่กี่ชั่วโมงแล้วก่อนที่พิธีเปิดงานมหกรรมแข่งขันกีฬาจะเริ่มขึ้น"
10015010-99 = "และแม้ว่าชิ้นงานคุณภาพดีจะต้องใช้เวลา และไม่ว่าจะเป็นผลงานที่เลิศเลอแค่ไหน แต่ถ้ามันเสร็จไม่ทัน#nเวลา มันก็ไม่มีความหมายอะไรอยู่ดีค่ะ"
10015010-100 = "นั่นมันก็แน่นอนอยู่แล้ว การทำงานให้เสร็จทันเวลาเป็นคุณสมบัติของมืออาชีพอยู่แล้วละ"
10015010-101 = "ด้วยเกียรติของชมรมวิศวกรรม พวกเราจะสร้างหุ่นยนต์เชียร์ให้เสร็จทันเวลาแน่นอน"
10015010-102 = "ฮุฮุ พอได้ยินแบบนั้นแล้วก็สบายใจขึ้นแล้วละค่ะ"
10015010-103 = "[s] \"ไม่มีอะไรให้ครูช่วยเหรอ?\""
10015010-104 = "อื้ม สบายมาก งานสร้างหุ่นยนต์ที่มีขนาดประมาณนี้เป็นงานที่พวกเราสามคนทำอยู่บ่อยๆ น่ะ"
10015010-106 = "แล้วอีกอย่างในการสร้างหุ่นยนต์ก็มีอุปกรณ์และของที่มีคมเยอะด้วย ถ้าคุณครูอยู่แถวนี้อาจจะได้รับ#nอันตรายก็ได้"
10015010-107 = "...เพราะงั้นคุณครูไปช่วยรุ่นพี่โนอาแล้วก็นักเรียนคนอื่นๆ เถอะ"
10015010-109 = "ถ้าอย่างนั้นฉันกับคุณครูขอตัวไปจัดการธุระอื่นก่อนนะคะ"
10015010-110 = "และจะกลับมาที่ห้องชมรมวิศวกรรมในอีก 3 ชั่วโมง ถึงตอนนั้นช่วยซ่อม..."
10015010-111 = "ไม่สิ ช่วยสร้างหุ่นยนต์ให้เสร็จเรียบร้อยด้วยนะคะ"
10015010-118 = "ฮุฮุ ไม่ได้สร้างหุ่นยนต์ตามคำสั่งของเซมิน่านานแล้วนะคะเนี่ย"
10015010-119 = "แล้วอีกอย่างนะคะ ถ้าเป็นหุ่นยนต์เชียร์ที่ใช้ในงานมหกรรมแข่งขันกีฬา ก็เป็นโอกาสดีที่นักเรียนทั่วทั้ง#nคิโวทอสจะได้เห็นสิ่งประดิษฐ์ของพวกเราใช่มั้ยล่ะคะ?"
10015010-120 = "เพราะฉะนั้นเรามาทดสอบเทคโนโลยีใหม่ๆ กันเถอะค่ะ!"
10015010-121 = "ฉันอยากลองทดสอบความเสถียรของไจโรเซ็นเซอร์ที่พัฒนาไว้น่ะ..."
10015010-122 = "เอาละๆ ทุกคนใจเย็นๆ ก่อน"
10015010-123 = "ก่อนที่เราจะเริ่มทำงานนี้ฉันมีบางอย่างอยากจะบอกทุกคนกันก่อนน่ะ"
10015010-126 = "งานมหกรรมแข่งขันกีฬาแห่งคิโวทอสที่จัดขึ้นทุกๆ 2 ปี เป็นกิจกรรมขนาดใหญ่ทั่วทั้งคิโวทอส..."
10015010-127 = "และเหล่าสมาชิกของเซมิน่าต่างก็พยายามกันอย่างหนักเพื่อที่จะให้กิจกรรมนี้ลุล่วงไปได้ด้วยดี"

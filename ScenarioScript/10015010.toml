10015010-81 = "#zmc;instant;400,100;1896\n1;히비키;01\n5;코토리;99;으음…… 아연 강판과 세라믹을 덧대 복합 장갑을 만드는 게 좋으려나요?\n#5;em;[...]\n#5;m4\n#1;h\n#fontsize;55"
10015010-82 = "#zmc;instant;400,100;1896\n5;코토리;99\n1;히비키;02;복합 장갑을 쓰는 게 방호력은 나쁘지 않겠지만 충전재가 많아지면 로봇의 크기가 불필요하게 커질 수 있으니까……\n#1;m2\n#5;h\n#fontsize;55"
10015010-83 = "#zmc;instant;400,100;1896\n5;코토리;99\n1;히비키;05;강판을 압연해서 구조를 균질화하는 방식은 어떨까……?\n#1;em;[재잘]\n#5;h\n#fontsize;55"

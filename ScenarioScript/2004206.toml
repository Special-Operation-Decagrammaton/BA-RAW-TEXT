[translation]
2004206-1 = "賀年卡"
2004206-2 = "千年研究區域內咖啡廳"
2004206-4 = "（為了年底的結算工作而拜訪千年，正準備回去時……）"
2004206-8 = "（發現了坐在咖啡廳的吧檯，似乎若有所思的真紀）"
2004206-9 = "唔～嗯……"
2004206-10 = "[s1]「嗨，真紀。你有什麼煩惱嗎？」\n[s2]「看著空白的紙在想什麼呀？」"
2004206-13 = "啊，老師，你怎麼會來千年？"
2004206-14 = "你來的正好！"
2004206-15 = "嗯……既然老師是大人，應該收過很多賀年卡吧？"
2004206-16 = "[s3]「雖然不是變成大人就會收到很多賀年卡……」\n[s4]「不過夏萊確實收到了不少。」"
2004206-19 = "那樣就夠了！"
2004206-20 = "在老師收過的無數賀年卡當中……"
2004206-21 = "最讓你印象深刻的內容是什麼？"
2004206-22 = "[s]「這個嘛……」"
2004206-24 = "[ns]「話說怎麼會突然提到賀年卡呢？」"
2004206-25 = "因為千尋前輩說我現在已經是高中生了，應該要寄賀年卡給今年有照顧我的人。"
2004206-26 = "比如常去的電器店的老闆，或者其他社團的部長之類的……"
2004206-27 = "可是我怎麼想都覺得，親手寫信問候其他人實在很沒效率不是嗎？"
2004206-28 = "明明平常幾乎都是寄電子郵件，結果賀年卡居然一定要親手用寫的。"
2004206-29 = "[s5]「雖然這麼想也沒有錯……」\n[s6]「但有些心意是網路無法傳達的呀。」"
2004206-32 = "總之我現在正在設計賀年卡的封面。"
2004206-33 = "可是卻一直想不出特別好看的設計。"
2004206-34 = "[s]「商店裡就有賣設計得很漂亮的賀年卡呀。」"
2004206-35 = "那怎麼行呢！"
2004206-36 = "那種普通的賀年卡肯定會被其他卡片給埋沒，結果完全沒有人注意到。"
2004206-37 = "雖然不是很情願，但既然都決定要親自寫了，#n我希望能做出讓人忍不住想打開來看的那種……最棒的賀年卡！"
2004206-38 = "[s]「真是了不起的決心。」"
2004206-39 = "可是我聽說賀年卡的內容，通常都是今年的經歷或自己的象徵……"
2004206-40 = "結果我回顧了過去一年才發現……#n因為發生的事情實在太多，所以選不出能夠代表今年的畫。"
2004206-41 = "老師，我應該畫出去年的哪起事件，才能完成好看的賀年卡呢？"
2004206-42 = "[s7]「雖然我沒辦法給你有關賀年卡設計的答案……」\n[s8]「不過賀年卡是用來傳達一年來的問候與回憶的信。」"
2004206-45 = "[ns]「所以真紀要不要試著畫出今年最讓你印象深刻的回憶？」"
2004206-46 = "最讓我印象深刻的回憶……"
2004206-47 = "唔嗯……好像有點想法了。"
2004206-52 = "稍等我一下，老師！"
2004206-61 = "完成了！"
2004206-62 = "老師，怎麼樣？這個設計很讓人印象很深刻吧？"
2004206-63 = "[s]「確實設計得很美。」"
2004206-65 = "[ns]「可是我總覺得好像在哪裡看過……」"
2004206-66 = "啊，那是因為……"
2004206-67 = "這個圖案是我第一次和老師塗鴉的時候，畫在牆上的圖案。#n你想起來了嗎？"
2004206-68 = "雖然我今年畫過無數個塗鴉，但最有印象的果然還是和老師一起塗鴉的那個時候。"
2004206-69 = "就算地點和設計都不是很特別，不過跟老師在一起的時候真的很開心……"
2004206-70 = "我，我沒有特別想炫耀跟老師的回憶的意思哦！"
2004206-71 = "只是今年跟老師一起度過的每段時間，是最令我印象深刻的而已。"
2004206-76 = "來，老師。#n這是我的第一張紙本賀年卡。"
2004206-77 = "明年也請你多多指教囉！"

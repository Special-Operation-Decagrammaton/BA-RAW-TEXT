[translation]
2004206-1 = "New Year's Card"
2004206-2 = "Millennium Study Center Cafe"
2004206-4 = "I was on my way back after visiting Millennium for the year-end financial report."
2004206-8 = "And I happened upon Maki, deep in thought, sitting by the cafe terrace."
2004206-9 = "Mmm, hmm..."
2004206-10 = "[s1] \"Hi, Maki. What's on your mind?\"\n[s2] \"What secrets does this blank piece of paper in front of you hold?\""
2004206-13 = "Ah, Sensei. What brings you to Millennium?"
2004206-14 = "Perfect timing, actually!"
2004206-15 = "Um... Since you're an adult and all, you probably get lots of New Year's cards, right?"
2004206-16 = "[s3] \"Those two don't necessarily equate to each other...\"\n[s4] \"...but I do tend to get a lot because I work at Schale.\""
2004206-19 = "That's good enough!"
2004206-20 = "Of all the New Year's cards you've received so far..."
2004206-21 = "...which one was the most impressive?"
2004206-22 = "[s] \"Let's see...\""
2004206-24 = "[ns] \"But what made you bring up New Year's cards all of a sudden?\""
2004206-25 = "You see, Chihiro said I should start sending New Year's cards to people I'm indebted to from this year, since I'm a high school student now."
2004206-26 = "Like the owner of the electronics store I visit a lot, presidents from other clubs, so on and so forth..."
2004206-27 = "But no matter how you think about it, aren't handwritten messages really inefficient?"
2004206-28 = "I already do that through texts and email all the time. Why do I have to write it by hand on a New Year's card?"
2004206-29 = "[s5] \"That's one way of looking at it...\"\n[s6] \"There are feelings that don't come across digitally.\""
2004206-32 = "Anyways, I was designing the cover for a New Year's card."
2004206-33 = "And I just can't think of a pretty enough one that I like."
2004206-34 = "[s] \"The stores have plenty of nice, pre-made designs.\""
2004206-35 = "That won't do!"
2004206-36 = "Those generic designs won't stand out at all against other New Year's cards."
2004206-37 = "I might not want to do it, but if I'm gonna do it, I'll make the best New Year's cards ever! People won't be able to stand NOT reading one of my cards."
2004206-38 = "[s] \"That's quite the spirit.\""
2004206-39 = "I heard New Year's cards generally need something in it that symbolizes you and what happened to you over the year..."
2004206-40 = "But so many things happened this year. It's hard to pick something that really represents it in its entirety."
2004206-41 = "So, Sensei, what do you think I could include in my drawing to make a mind-blowing New Year's card?"
2004206-42 = "[s7] \"There's not really a right answer here...\"\n[s8] \"The card is meant to share memories and greet the new year.\""
2004206-45 = "[ns] \"So how about drawing the most memorable moment of the year?\""
2004206-46 = "My most memorable moment..."
2004206-47 = "Mm... Maybe I've got something."
2004206-52 = "Give me just a second, Sensei!"
2004206-61 = "And it's done!"
2004206-62 = "What do you think, Sensei? The design is super impressive, right?"
2004206-63 = "[s] \"It's a cool design.\""
2004206-65 = "[ns] \"But I feel like I've seen this somewhere...\""
2004206-66 = "Ah, you see..."
2004206-67 = "When you and I drew graffiti together for the first time, this is what I drew! Do you remember?"
2004206-68 = "I've done a ton of graffiti this year, but graffiti with you was definitely the most memorable one."
2004206-69 = "It wasn't a particularly special place or design, but it was so much fun..."
2004206-70 = "I-I don't mean to flaunt my memories with you, but..."
2004206-71 = "...all my moments with you were unforgettable for me, Sensei."
2004206-76 = "Okay then, Sensei. It's my first physical New Year's card."
2004206-77 = "I'll be counting on you next year too!"

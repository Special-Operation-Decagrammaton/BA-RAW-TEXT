[translation]
2004206-1 = "การ์ดอวยพรปีใหม่"
2004206-2 = "คาเฟ่ในวิทยาเขตมิลเลเนียม"
2004206-4 = "(คุณครูไปที่มิลเลเนียมเพื่อทำงานปิดงบสิ้นปี และหว่างทางกลับนั้นเอง...)"
2004206-8 = "(คุณครูก็เจอมากิที่นั่งครุ่นคิดอะไรบางอย่างอยู่ที่ระเบียงคาเฟ่)"
2004206-9 = "อืม อืมม..."
2004206-10 = "[s1] \"สวัสดี มากิ นั่งคิดอะไรอยู่เหรอ?\"\n[s2] \"สวัสดี มากิ จะวาดภาพอะไรลงกระดาษพวกนี้เหรอ?\""
2004206-13 = "อ๊ะ คุณครู มาทำธุระที่มิลเลเนียมเหรอ?"
2004206-14 = "มาได้จังหวะพอดีเลย!"
2004206-15 = "อืม... คุณครูเป็นผู้ใหญ่ งั้นก็คงเคยได้การ์ดอวยพรปีใหม่มาเยอะเลยใช่มั้ย?"
2004206-16 = "[s3] \"ก็มีบ้างนะ แต่ใช่ว่าเป็นผู้ใหญ่แล้วจะต้องได้เยอะหรอก...\"\n[s4] \"ก็ได้ในนามของชาเล่ต์เยอะอยู่นะ\""
2004206-19 = "เท่านั้นก็เพียงพอแล้วละ!"
2004206-20 = "ในบรรดาการ์ดอวยพรปีใหม่ที่คุณครูเคยได้รับมา..."
2004206-21 = "มีการ์ดใบไหนที่คุณครูประทับใจมากที่สุดหรือเปล่า?"
2004206-22 = "[s] \"ไม่รู้สิ...\""
2004206-24 = "[ns] \"แต่ทำไมจู่ๆ ก็ถามเรื่องการ์ดอวยพรปีใหม่เหรอ?\""
2004206-25 = "ก็เพราะตอนนี้รุ่นพี่จิฮิโระเป็นนักเรียนมัธยมปลายแล้ว ก็เลยสั่งให้พวกเราส่งการ์ดอวยพรปีใหม่ให้คน#nที่ช่วยเหลือพวกเรามาตลอดทั้งปีด้วยตัวเองน่ะ"
2004206-26 = "ทั้งเจ้าของร้านอุปกรณ์อิเล็กทรอนิกส์ แล้วก็สมาชิกชมรมอื่นด้วย..."
2004206-27 = "แต่ไม่ว่าจะคิดยังไง ฉันว่าการแค่เขียนจดหมายด้วยมือเพื่อทักทายและแสดงความขอบคุณมันดูจะ#nเรียบง่ายเกินไปหน่อย"
2004206-28 = "ปกติแล้วเราก็ทักทายกันทางอีเมลกันทั้งนั้น ทำไมถึงให้มาเขียนการ์ดอวยพรอีกก็ไม่รู้"
2004206-29 = "[s5] \"แต่ครูว่าการเขียนด้วยมือก็น่าประทับใจนะ\"\n[s6] \"บางครั้งเราส่งต่อความรู้สึกที่แท้จริงทางออนไลน์ได้ไม่หมดหรอก\""
2004206-32 = "เอาเถอะ เอาเป็นว่าตอนนี้ฉันกำลังกังวลเรื่องการออกแบบการ์ดอวยพรที่จะเขียนคำพูดลงไปอยู่น่ะ"
2004206-33 = "วันนี้ฉันคิดไม่ออกเลยว่าจะออกแบบยังไงให้มันสวยๆ ดี"
2004206-34 = "[s] \"การ์ดอวยพรปีใหม่สวยๆ ในร้านค้ามีขายเยอะอยู่นะ\""
2004206-35 = "แบบนั้นไม่ได้หรอก!"
2004206-36 = "การ์ดอวยพรที่ลวดลายธรรมดาที่ขายตามร้านค้าน่ะ ถ้าไปรวมอยู่กับการ์ดใบอื่นก็ไม่สะดุดตาหรอก"
2004206-37 = "ถึงฉันจะไม่อยากเล่นใหญ่มากนัก แต่ไหนๆ ก็เป็นการ์ดอวยพรที่ฉันจะเขียนเองแล้ว ก็เลยอยากทำให้#nเป็นการ์ดที่ดีที่สุดไปเลย!"
2004206-38 = "[s] \"เป็นความตั้งใจที่น่าชื่นชมเลยนะ\""
2004206-39 = "แต่ฉันได้ยินมาว่าโดยทั่วไปแล้วการ์ดอวยพรปีใหม่ต้องบอกเรื่องราวที่เกิดขึ้นในปีนั้นและใส่สัญลักษณ์#nที่แสดงถึงตัวตนของตัวเองเข้าไป..."
2004206-40 = "แต่พอมองย้อนกลับไปถึงเหตุการณ์ที่เกิดขึ้นในปีนี้ มันก็มีหลายอย่างเสียจนฉันเลือกไม่ได้เลยว่าจะ#nเอาเรื่องไหนมาวาดเป็นรูปของปีนี้ดี"
2004206-41 = "คุณครูคิดว่าฉันควรเอาเรื่องไหนที่เกิดขึ้นในปีนี้มาวาดดีน่ะ ถึงจะได้เป็นการ์ดอวยพรปีใหม่ที่ยอดเยี่ยม?"
2004206-42 = "[s7] \"เรื่องดีไซน์มันไม่มีคำตอบตายตัวหรอก แต่ถ้าถามครู...\"\n[s8] \"ถ้าจะใส่คำอวยพรและความทรงจำของปีนี้ลงไปละก็...\""
2004206-45 = "[ns] \"ลองวาดความทรงจำที่ประทับใจที่สุดของปีนี้ลงไปมั้ยล่ะ?\""
2004206-46 = "ความทรงจำที่ประทับใจที่สุดงั้นเหรอ..."
2004206-47 = "อืม... เหมือนจะพอนึกได้อยู่นะ"
2004206-52 = "รอเดี๋ยวนะ คุณครู!"
2004206-61 = "เสร็จแล้ว!"
2004206-62 = "เป็นยังไงล่ะ คุณครู? การ์ดอวยพรปีใหม่ของฉันน่าประทับใจสุดๆ ไปเลยมั้ย?"
2004206-63 = "[s] \"ออกแบบได้สวยเลยนะ\""
2004206-65 = "[ns] \"แต่ครูคุ้นๆ เหมือนเคยเห็นลายนี้จากที่ไหนสักแห่งเลย...\""
2004206-66 = "อ้อ ลายนั้นน่ะเหรอ"
2004206-67 = "ที่จริงมันเป็นลายที่ฉันวาดบนกำแพงตอนที่ทำกราฟิตี้กับคุณครูเป็นครั้งแรกน่ะ คุณครูจำได้หรือเปล่า?"
2004206-68 = "ปีนี้ฉันวาดภาพกราฟิตี้เยอะมาก แต่ที่ประทับใจที่สุดก็ตอนที่ได้วาดภาพกราฟิตี้กับคุณครูน่ะสิ"
2004206-69 = "ถึงสถานที่จะไม่ได้พิเศษ แล้วก็ไม่ใช่ดีไซน์ที่พิเศษมากมายอะไร แต่ช่วงเวลาที่ได้อยู่กับคุณครู ฉันสนุกมากๆ เลยละ..."
2004206-70 = "ฉะ... ฉันไม่ได้จะอวดความทรงจำกับคุณครูเป็นพิเศษหรอกนะ!"
2004206-71 = "แค่ทุกช่วงเวลาที่ฉันได้อยู่กับคุณครูในปีนี้ เป็นช่วงเวลาที่ฉันประทับใจที่สุดน่ะ"
2004206-76 = "เอาละ คุณครู นี่คือการ์ดอวยพรปีใหม่ใบแรกของฉัน"
2004206-77 = "ปีหน้าฉันก็ขอฝากตัวด้วยนะ!"

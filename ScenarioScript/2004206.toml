2004206-7 = "3;마키 캠핑;05\n#3;a\n#3;em;[속상함]\n#wait;1500"
2004206-8 = "#na;(카페테라스에 앉아 무언가를 골똘히 생각하고 있는 마키를 발견했다.)"
2004206-9 = "3;마키 캠핑;05;으음, 으으음……\n#3;em;…"
2004206-10 = "[s1] \"안녕, 마키. 무슨 고민이라도 있어?\"\n[s2] \"빈 종이를 앞에 두고 무슨 생각을 그렇게 해?\""

2004206-12 = "#wait;100"
2004206-13 = "3;마키 캠핑;02;아, 선생님. 밀레니엄에는 무슨 일이야?\n#3;em;[반응]"
2004206-14 = "3;마키 캠핑;01;안 그래도 마침 잘 왔어!"
2004206-15 = "3;마키 캠핑;05;음…… 선생님은 어른이니까 연하장도 많이 받아봤겠지?"
2004206-16 = "[s3] \"꼭 어른이라고 연하장을 많이 받는 건 아니지만……\"\n[s4] \"샬레는 업무상 받는 연하장이 꽤 있지.\""
2004206-17 = "#wait;100"
2004206-18 = "#wait;100"
2004206-19 = "3;마키 캠핑;01;그거면 충분해!\n#3;em;[!]"
2004206-20 = "3;마키 캠핑;99;그동안 선생님이 받았던 수많은 연하장 중에……"
2004206-21 = "3;마키 캠핑;05;가장 인상적이었던 연하장은 어떤 거였어?"
2004206-22 = "[s] \"글쎄……\""
2004206-23 = "#wait;1000"
2004206-24 = "[ns] \"그런데 연하장은 갑자기 왜?\""
2004206-25 = "3;마키 캠핑;12;그게, 치히로 선배가 고등학생이 되었으니 올해부터는 한 해 동안 신세를 졌던 사람들에게 연하장을 직접 보내라고 이야기해서 말이야.\n#3;em;[훌쩍]\n#3;hophop"
2004206-26 = "3;마키 캠핑;09;자주 가는 전자제품 가게의 사장님이라던가, 다른 동아리의 부장들이라던가……"
2004206-27 = "3;마키 캠핑;10;그런데 아무리 생각해도 안부를 전하기 위해 직접 손으로 편지를 써서 전하는 건 너무 비효율적이지 않아?\n#3;em;[한숨]"
2004206-28 = "3;마키 캠핑;10;평소에도 거의 메일로 안부를 주고받는데, 연하장은 굳이 손으로 써야 한다니."
2004206-29 = "[s5] \"물론 그렇게 생각할 수도 있겠지만……\"\n[s6] \"온라인으로는 전달할 수 없는 본심도 있는 법이니까.\""
2004206-30 = "#wait;100"
2004206-31 = "#wait;100"
2004206-32 = "3;마키 캠핑;02;어쨌든 그래서 나도 연하장을 쓰기 위해서 표지를 디자인하고 있는데."
2004206-33 = "3;마키 캠핑;09;뭔가 이렇다 할 예쁜 디자인이 좀처럼 떠오르질 않아서 말이야.\n#3;stiff\n#3;em;[속상함]"
2004206-34 = "[s] \"예쁜 디자인의 연하장이라면 상점에서 많이 팔고 있던데.\""
2004206-35 = "3;마키 캠핑;05;그건 안 돼!\n#3;em;[!]"
2004206-36 = "3;마키 캠핑;05;그런 평범한 디자인으로는 다른 연하장에 묻혀 조금도 주목받지 못할 게 분명하잖아."
2004206-37 = "3;마키 캠핑;00;내키지는 않지만 연하장을 직접 쓰기로 한 이상 최고의 연하장을 써서 읽어보지 않고선 견디지 못하게 만들고 싶어!\n#3;em;[재잘]"
2004206-38 = "[s] \"훌륭한 의욕인걸.\""
2004206-39 = "3;마키 캠핑;06;그런데 연하장은 기본적으로 한 해에 있었던 일과 자신을 드러낼 수 있는 상징을 넣어야 한다고 하던데……"
2004206-40 = "3;마키 캠핑;09;올 한 해에 무슨 일이 있었는지 돌이켜 봐도 너무 많은 일이 있었어서 무엇을 꼽아도 올해를 대표하는 그림처럼 느껴지지가 않아.\n#3;em;[세로선]"
2004206-41 = "3;마키 캠핑;05;선생님, 한 해에 있었던 일 중 어떤 것을 그려 넣어야 멋진 연하장이 될 수 있을까?\n#3;hophop"
2004206-42 = "[s7] \"연하장 디자인에 답은 없지만……\"\n[s8] \"연하장은 한 해의 안부와 추억을 공유하는 편지니까.\""

2004206-67 = "5;마키 캠핑;01;사실 이 문양은 선생님과 처음으로 그래피티를 했을 때 벽에 그린 문양이야. 기억나?"
2004206-68 = "5;마키 캠핑;99;올해 수많은 그래피티를 그렸지만, 역시 제일 인상적인 순간은 선생님과 함께 그래피티를 그렸을 때더라고.\n#5;em;…"
2004206-69 = "5;마키 캠핑;00;그리 특별한 장소도, 특별한 디자인도 아니었지만 선생님과 함께했던 그 순간이 너무 즐거웠어서……"
2004206-70 = "5;마키 캠핑;04;그, 그러니까 특별히 선생님과의 추억을 과시하고 싶다는 뜻은 아니었지만!\n#5;em;[땀]\n#5;stiff"
2004206-71 = "5;마키 캠핑;99;올해 선생님과 함께했던 모든 순간이 내게는 제일 인상적이었던 것 같아."

2002403-66 = "3;나기사;04;그, 그게 그러니까…… 방금 그 말은, 저…….\n#3;stiff"
2002403-67 = "3;나기사;04;오, 오해입니다! 해명을 하게 해주세요!\n#3;em;[!]"

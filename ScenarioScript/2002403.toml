[translation]
2002403-1 = "ภาษาของผู้มีการศึกษา"
2002403-2 = "ห้องชงชาทรีนิตี้"
2002403-3 = "(คุณครูกำลังคุยกับนางิสะเรื่องงานที่ชาเล่ต์...)"
2002403-4 = "จะว่าไป หมู่นี้ในโรงเรียนมีนักเรียนที่พูดจาแบบไม่มีการศึกษามากขึ้นเยอะเลยค่ะ ฉันละกังวลเหลือเกิน"
2002403-5 = "[s] \"พูดแบบไม่มีการศึกษา?\""
2002403-6 = "ใช่ค่ะ หมู่นี้มีนักเรียนที่พูดจาหยาบคายและไม่เหมาะสมกับการเป็นเด็กทรีนิตี้เยอะขึ้นมากเลยค่ะ"
2002403-7 = "ท่าทางจะไปคลุกคลีกับนักเรียนนิสัยไม่ดีจากโรงเรียนอื่นมาจนพากันหยาบคายไปด้วย..."
2002403-8 = "ฉันว่าเราต้องเตือนนักเรียนของเรากันหน่อยแล้วค่ะ"
2002403-9 = "[s1] \"ครูไม่เห็นจะรู้เลย...\"\n[s2] \"นักเรียนทรีนิตี้ส่วนใหญ่เป็นเด็กเรียบร้อยไม่ใช่เหรอ?\""
2002403-10 = "นักเรียนโรงเรียนทรีนิตี้ส่วนใหญ่ยังใช้คำพูดแบบคนมีการศึกษาอยู่ค่ะ"
2002403-11 = "นักเรียนโรงเรียนทรีนิตี้ส่วนใหญ่ยังใช้คำพูดแบบคนมีการศึกษาอยู่ค่ะ"
2002403-12 = "นักเรียนที่ฉันกำลังพูดถึงเป็นเพียงแค่บางส่วนเท่านั้นค่ะ"
2002403-13 = "คำหยาบคายที่ฉันเคยได้ยินหรือเห็นว่าพูดกัน ก็เช่น..."
2002403-14 = "...คำย่อค่ะ"
2002403-15 = "[s] \"คำย่อ?\""
2002403-16 = "ใช่ค่ะ หมู่นี้มีการพูดคุยผ่านทาง MOMOTALK กันมากขึ้น และมีนักเรียนที่เลือกที่จะย่อคำศัพท์#nหรือประโยคเพื่อให้สะดวกต่อการพิมพ์ค่ะ"
2002403-17 = "อย่างเช่น 'ไม่เป็นไร' ที่พิมพ์ย่อเหลือแค่ 'มปร' หรือว่า 'ขอบคุณค่ะ' ก็พิมพ์ว่า 'ข่อมค่ะ' ด้วยค่ะ"
2002403-18 = "...เคสหนักๆ ที่ฉันเจอเมื่อไม่นานมานี้คือ 'เคยอม' ค่ะ ตอนฟังครั้งแรกฉันงงมากเลย จนมาได้รู้ทีหลัง#nว่าเป็น \"โอเค ยอมแล้ว\" น่ะค่ะ"
2002403-19 = "[s] \"แต่เป็นนักเรียน พูดคำวัยรุ่นๆ แบบนี้ไม่น่าเป็นไรนะ\""
2002403-20 = "ไม่ค่ะ ไม่เป็นไรไม่ได้ค่ะ"
2002403-21 = "ไม่ว่าจะเป็นเพราะความสะดวกสบายแค่ไหนก็ตาม แต่ว่าการย่อประโยคหรือพูดคำสแลงให้เข้าใจยาก#nมันไม่ถือว่าเป็นการสนทนาที่ถูกต้องเหมาะสมค่ะ"
2002403-22 = "คนที่ชอบใช้คำสแลงที่ใช้กันเฉพาะกลุ่ม ไม่ว่าพวกเขาจะมีพฤติกรรมสุภาพแค่ไหน แต่หากพูดอะไร#nแบบนั้นมาก็จะดูหยาบคาย และทำให้คนอื่นสูญเสียความเชื่อมั่นในตัวพวกเขาค่ะ"
2002403-23 = "ยิ่งเป็นนักเรียนทรีนิตี้ที่ได้รับความอิจฉาริษยาและความเกรงขามจากนักเรียนทั้งหมดของคิโวทอสแล้ว เรายิ่งต้องใช้คำพูดที่สุภาพและสง่างามค่ะ"
2002403-24 = "...นอกจากนี้ยังมีนักเรียนบางคนที่พูดลงท้ายด้วยคำว่า \"~เพโร่\" หรือใช้คำศัพท์รุนแรงที่คุกคาม#nคู่สนทนาด้วยค่ะ"
2002403-25 = "การชี้นำและแก้ไขนักเรียนที่ออกนอกลู่นอกทางก็เป็นอีกหนึ่งความรับผิดชอบของโฮสต์สภาน้ำชาค่ะ"
2002403-26 = "[s] \"แล้วนางิสะไม่ได้ใช้คำพูดอะไรแบบนั้นเหรอ?\""
2002403-27 = "แน่นอนสิคะ หากโฮสต์สภาน้ำชาที่ต้องเป็นแบบอย่างให้นักเรียนหมู่มากใช้คำหยาบคาย แล้วนักเรียน#nจากโรงเรียนอื่นจะคิดยังไงกับโรงเรียนของเราล่ะคะ?"
2002403-28 = "หากเราฝึกนิสัยการใช้ภาษาที่ถูกต้องในชีวิตประจำวัน เราก็จะสามารถพูดได้อย่างสง่างามในทุกๆ สถานการณ์ค่ะ"
2002403-29 = "คนฟังจะได้ไม่งุนงงหรือกระสับกระส่ายใจ—"
2002403-33 = "เอ่อ... คะ... คุณนางิสะ..."
2002403-34 = "จู่ๆ มีเรื่องอะไรเหรอคะ? แถมยังตกอกตกใจแบบนั้นด้วย"
2002403-35 = "คือว่า... มีเรื่องที่ฉันต้องรายงานให้ทราบโดยด่วนน่ะค่ะ..."
2002403-36 = "พอดีทางชมรมทวงความยุติธรรมรายงานมาว่า เมื่อกลางดึกที่ผ่านมา มีนักเรียนเดินเตร็ดเตร่อยู่รอบๆ น้ำพุของจัตุรัสทรีนิตี้... ในชุดว่ายน้ำ..."
2002403-38 = "วะ... ว่ายังไงนะคะ?!"
2002403-43 = "ฮึ่ม... ฮึ่ม..."
2002403-44 = "นักเรียนจากชมรมทวงความยุติธรรมไม่ได้ตาฝาดไปหรอกเหรอคะ?"
2002403-45 = "ในทรีนิตี้ของเรา ไม่มีนักเรียนที่แต่งตัวไม่สุภาพแบบนั้นหรอกค่ะ"
2002403-46 = "...กลับไปตรวจสอบข้อเท็จจริงมาใหม่นะคะ"
2002403-47 = "[s] \"นางิสะ เมื่อกี้...\""
2002403-48 = "คะ? มีปัญหาอะไรหรือเปล่าคะ?"
2002403-49 = "ฉันก็แค่จัดการเรื่องในโรงเรียนอย่างสบายและสง่างามเหมือนที่เคยทำเท่านั้นเองค่ะ"
2002403-50 = "อย่างที่ฉันพูดไปค่ะ หากเราฝึกนิสัยการใช้ภาษาที่ถูกต้องในชีวิตประจำวัน เราก็จะสามารถ—"
2002403-53 = "คะ... คุณนางิสะ เกิดเรื่องใหญ่แล้วค่ะ! เมื่อสักครู่สมาชิกชมรมอ่านหนังสือจุดระเบิดแก๊สน้ำตาใน#nโรงเรียนเพื่อกดดันนักเรียนที่ค้างชำระหนังสือให้ออกมาจ่ายเงินค่ะ..."
2002403-54 = "ตามข่าวที่ได้รับแจ้งมาเมื่อสักครู่นี้ เห็นว่ามีพวกนักเรียนประท้วงที่เอาแซนด์วิชแตงกวามาให้เป็นของ#nว่าง ก็เลยโยนกล่องชาทั้งหมดลงในสระว่ายน้ำค่ะ!"
2002403-55 = "ชมรมทวงความยุติธรรมก็เลยออกมาปราบปรามความวุ่นวาย จนสวนในโรงเรียนไหม้เกรียมไปเลยค่ะ..."
2002403-59 = "จริงๆ เลย..."
2002403-60 = "...ถ้าไม่ได้สร้างปัญหากันสักวันจะนอนไม่หลับใช่มั้ย..."
2002403-61 = "...ตั้งใจฟังให้ดีนะคะ ที่แห่งนี้คือโรงเรียนสามัญทรีนิตี้ที่มีประวัติศาสตร์และประเพณีอันยาวนานค่ะ"
2002403-62 = "หากฉันเจอนักเรียนที่ประพฤติตนไม่สมกับเป็นนักเรียนของทรีนิตี้และทำลายภาพลักษณ์ของโรงเรียน#nอีกละก็..."
2002403-63 = "ฉันจะเอามาการองยัดปากให้ปากระเบิดเลยค่ะ!"
2002403-64 = "[ns] \"............\""
2002403-65 = "...อ๊ะ"
2002403-66 = "เอ่อ... คือว่า... ที่ฉันพูดเมื่อกี้..."
2002403-67 = "ปะ... เป็นเรื่องเข้าใจผิดค่ะ! ขอให้ฉันได้ชี้แจงด้วยค่ะ!"
2002403-68 = "[s3] \"ไม่ต้องอธิบายก็ได้\"\n[s4] \"ถ้าโมโหจะระเบิดออกมาแบบนี้ก็ไม่เป็นไรหรอก...\""
2002403-69 = "มะ... มันเป็นเรื่องเข้าใจผิดนะคะ!"
2002403-70 = "มะ... มันเป็นเรื่องเข้าใจผิดนะคะ!"
2002403-72 = "(หลังจากนั้นคุณครูก็รับฟังคำแก้ตัวของนางิสะ และมองดูสีหน้าตกใจของเธอไปด้วย)"

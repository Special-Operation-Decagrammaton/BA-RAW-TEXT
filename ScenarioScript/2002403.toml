2002403-34 = "3;나기사;02;갑자기 무슨 일인가요? 그렇게 당황한 표정을 하고서는.\n#3;em;[?]"
2002403-35 = "1;트리니티 학생 A;04;그게…… 황급히 보고 드려야 할 만한 문제가 발생해서……."

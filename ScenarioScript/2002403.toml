[translation]
2002403-1 = "#title;교양인의 말투"
2002403-2 = "#place;트리니티 다과회실"
2002403-3 = "#na;(나기사와 함께 샬레의 업무에 관해 대화를 나누던 중…….)"
2002403-4 = "3;나기사;15;그러고 보니 최근 학원 내에서 교양 없는 말을 하는 학생들이 늘어난 것 같아 걱정이네요.\n#3;a\n#3;em;[속상함]"
2002403-5 = "[s] \"교양 없는 말?\""
2002403-6 = "3;나기사;04;네. 트리니티의 학생 답지 않게 상스럽고 부적절한 말을 하는 학생들이 최근 크게 늘어났답니다."
2002403-7 = "3;나기사;07;아무래도 다른 학원의 상스러운 학생들과 어울리다 좋지 않은 물이 든 모양인데……\n#3;em;…"
2002403-8 = "3;나기사;13;학생들에게 조금 주의를 줄 필요가 있겠어요."
2002403-9 = "[s1] \"나는 잘 모르겠는데…….\"\n[s2] \"트리니티의 학생들은 대체로 얌전하지 않아?\""
2002403-10 = "3;나기사;02;물론 대부분의 트리니티 학생들은 여전히 교양 있는 말씨를 사용한답니다.\n#3;em;[반응]"
2002403-11 = "3;나기사;02;물론 대부분의 트리니티 학생들은 여전히 교양 있는 말씨를 사용한답니다.\n#3;em;[반응]"
2002403-12 = "3;나기사;01;제가 말씀드리는 것도 일부 문제 학생들의 이야기지요."
2002403-13 = "3;나기사;99;제가 보거나 들은 상스러운 말의 예를 몇 가지 들자면……\n#3;em;…"
2002403-14 = "3;나기사;01;……줄임말을 사용한다든가."
2002403-15 = "[s] \"줄임말?\""
2002403-16 = "3;나기사;02;네. 최근 모모톡과 같은 메신저를 통해 대화를 하는 경우가 늘며, 타자의 편의를 위해 단어나 문장을 줄여 말하는 학생이 종종 있습니다."
2002403-17 = "3;나기사;04;'생일파티'를 '생파', '감사합니다'를 '감사' 등으로 줄여 쓰는 것처럼 말이지요."
2002403-18 = "3;나기사;15;……심지어 얼마 전에는 '눈새'라는 말을 듣고 무슨 뜻인지 한참을 고민했다니까요.\n#3;em;[속상함]"
2002403-19 = "[s] \"학생인데 그 정도의 유행어는 괜찮지 않아?\""
2002403-20 = "3;나기사;13;아니요. 용납할 수 없습니다.\n#3;em;[반응]"
2002403-21 = "3;나기사;07;아무리 편의 때문이라지만 문장이나 단어를 멋대로 줄여 은어처럼 이해하기 어렵게 만드는 행위는 올바른 대화 자세라고 할 수 없습니다."
2002403-22 = "3;나기사;02;특정 집단에서만 통용되는 은어를 즐겨 사용하는 사람은 아무리 행동이 점잖더라도 경박해 보이며, 쉽게 타인의 신뢰를 잃게 됩니다."
2002403-23 = "3;나기사;99;키보토스의 뭇 학생들에게 선망과 존경을 받는 트리니티 종합학원의 학생이라면 교양있고 품격있는 말을 사용해야지요."
2002403-24 = "3;나기사;15;……그 외에도 말끝에 '~페로' 같은 정체불명의 어미를 붙인다든가, 상대를 위협하는 폭력적인 어휘를 사용하는 학생들도 더러 있었습니다.\n#3;em;[속상함]"
2002403-25 = "3;나기사;07;이런 엇나가는 학생들을 계도하고 바로잡는 것 또한 티파티의 호스트로서 가져야 할 엄연한 책무이지요."
2002403-26 = "[s] \"나기사는 그런 말을 쓰지 않는 거야?\""
2002403-27 = "3;나기사;03;물론입니다. 여러 학생에게 모범을 보여야 할 티파티의 호스트가 먼저 불량한 말을 쓴다면 다른 학교의 학생들이 저희 학원을 어떻게 여기겠나요?\n#3;em;[반응]"
2002403-28 = "3;나기사;02;평소부터 올바른 언어 습관을 몸에 익혀 두면 어떤 상황에서도 품위 있고 우아하게 말할 수 있답니다."
2002403-29 = "3;나기사;99;크게 당황하거나 감정이 동요하는 일 하나 없이—\n#3;em;…"

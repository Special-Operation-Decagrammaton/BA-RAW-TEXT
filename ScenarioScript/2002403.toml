2002403-43 = "3;나기사;99;흠, 흠……"
2002403-44 = "3;나기사;03;정의실현부의 학생들이 무언가 잘못 본 게 아닐까요?\n#3;em;[반짝]"
2002403-45 = "3;나기사;01;저희 트리니티에 그런 상스러운 차림을 한 학생이 있을 리가 없잖습니까."
2002403-46 = "3;나기사;02;……돌아가서 다시 한번 확실히 진상을 파악하도록 하세요."
2002403-47 = "[s] \"나기사, 방금…….\""
2002403-48 = "3;나기사;03;네? 무슨 문제라도 있었나요?\n#3;em;[?]"
2002403-49 = "3;나기사;99;저는 평소처럼 느긋하고 우아하게 학원의 일을 처리했을 뿐인데요."
2002403-50 = "3;나기사;01;다시 한번 말씀드리지만 평소부터 올바른 언어 습관을 몸에 익혀 두면 어떤 상황이라도—\n#3;em;…"
2002403-51 = "#st;[0,0];instant;1;"
2002403-52 = "#clearST"
2002403-53 = "2;트리니티 학생 D;04;나, 나기사님. 큰일입니다! 방금 도서부의 부원들이 도서를 연체한 학생들을 독촉하기 위해 교내에서 최루탄을 터트렸다고…….\n#2;ar\n#3;m5\n#2;em;[반응]"
2002403-54 = "2;트리티티 학생 D;04\n1;트리니티 학생 C;02;방금 다시 들어온 소식에 의하면 다도부의 일부 학생들이 다과로 제공된 오이 샌드위치에 항의하며 차 상자를 수영장에 통째로 던져버리고 있다고 합니다!\n#1;ar\n#2;m3\n#1;em;[!]"
2002403-55 = "2;트리니티 학생 D;04;이를 막기 위해 정의실현부가 출동하여 소동을 진압한 결과, 제3 교사의 안뜰이 전소되었다고…….\n#2;em;[땀]\n#2;stiff"
2002403-56 = "#st;[0,0];instant;1;"
2002403-57 = "#clearST"
2002403-58 = "2;트리티티 학생 D;04\n1;트리니티 학생 C;04\n3;나기사;05\n#wait;2500\n#3;em;…\n#3;m3\n#2;dl\n#1;dl\n#2;h\n#3;h\n#1;h"
2002403-59 = "3;나기사;99;정말이지……"
2002403-60 = "3;나기사;03;……다들 뭐가 그렇게 문제라서 하루도 빠짐없이 말썽을 일으키는 건지……\n#3;em;[속상함]"
2002403-61 = "3;나기사;09;……잘 들으세요. 이곳은 오랜 역사와 전통을 갖추고 있는 트리니티 종합학원입니다."
2002403-62 = "3;나기사;08;트리니티의 학생답지 않은 품위 없는 행동을 일삼으며, 학원의 이미지를 저해하는 학생이 제 눈에 다시 뜨인다면……"
2002403-63 = "3;나기사;06;입이 미어터질 때까지 마카롱을 쑤셔 넣어 버릴 테니까요!\n#3;em;[!]\n#3;closeup\n#fontsize;80"

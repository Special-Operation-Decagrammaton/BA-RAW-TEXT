[translation]
2002403-1 = "Proper Speech"
2002403-2 = "Trinity Tea Party Room"
2002403-3 = "Nagisa and I were chatting about Schale work."
2002403-4 = "On the other hand, I've been concerned for some time about the number of Trinity students using unrefined language."
2002403-5 = "[s] \"Unrefined language?\""
2002403-6 = "Just so. There's been a marked increase in the number of students using uncultured, coarse, or downright vulgar language."
2002403-7 = "I'm afraid contact with students from certain other academies must have had a bad influence on our students..."
2002403-8 = "I believe the offending individuals will need to be given a warning."
2002403-9 = "[s1] \"I'm not sure about that...\"\n[s2] \"Aren't Trinity's students already unusually well-behaved?\""
2002403-10 = "Well, most Trinity students continue to speak in a civilized manner, of course."
2002403-11 = "Well, most Trinity students continue to speak in a civilized manner, of course."
2002403-12 = "The problem is blessedly confined to a few unfortunate souls right now, but I must be vigilant to prevent it from spreading."
2002403-13 = "But you wouldn't believe some of the offenses I've overheard."
2002403-14 = "Using abbreviations, for one."
2002403-15 = "[s] \"Abbreviations?\""
2002403-16 = "Yes. I'm sure you know that messengers like MomoTalk have been increasingly popular these days. Students have been shortening words or, in some especially outrageous cases, entire sentences, just to make them easier to type."
2002403-17 = "Things like \"HBD\" for \"Happy Birthday\" and \"TY\" for \"Thank You\"."
2002403-18 = "In fact, the other day I even heard someone say \"SMH\" out loud."
2002403-19 = "[s] \"What's wrong with a little chatspeak? You're students, after all.\""
2002403-20 = "What's wrong with it? Everything's wrong with it."
2002403-21 = "Shortening phrases or words makes them more difficult to understand. Sacrificing clarity for convenience is the mark of a sub-par conversationalist."
2002403-22 = "No matter how well-mannered you may otherwise be, overuse of slang makes you sound flippant and unserious. It's a foolproof way to lose the confidence of your peers."
2002403-23 = "Students at Trinity General School have the respect and even the envy of all the other academies of Kivotos. In order to be worthy of that, one must speak with the utmost class and dignity."
2002403-24 = "It's not just the initialisms. I've also heard students adding mysterious suffixes to their words. Do you know what \"-pero\" means? It sounds insidious. I will not have Trinity students intimidating others with violent language."
2002403-25 = "As the Tea Party host, it's my responsibility to guide and correct these wayward students."
2002403-26 = "[s] \"And you don't use language like that, Nagisa?\""
2002403-27 = "Absolutely not. Perish the thought! If the host of the Tea Party, who is meant to be setting an example for all other students, was seen using uncouth language, how would we look to the other academies?"
2002403-28 = "Now, as to the solution. Regular practice of proper language etiquette is essential to allowing a student to speak well in any situation."
2002403-29 = "With practice, even if a student becomes emotional or agitated, there's no need to sound flustered—"
2002403-33 = "Um, excuse me, Nagisa..."
2002403-34 = "What's important enough that you need to interrupt? And with such a stunned expression!"
2002403-35 = "Well, it's just... There's been an issue that needs urgent attention..."
2002403-36 = "According to a report from the Justice Task Force, a student was caught waiting in the Trinity Plaza fountain wearing a swimsuit late last night."
2002403-38 = "Wh-What in the world?!"
2002403-43 = "Hmm..."
2002403-44 = "Is it possible that the Justice Task Force was mistaken?"
2002403-45 = "There's simply no way a Trinity student would dress like that in such an inappropriate location."
2002403-46 = "Please don't interrupt again until you've confirmed the matter for yourself."
2002403-47 = "[s] \"Nagisa, when you were talking just now...\""
2002403-48 = "Hm? Was something wrong with what I said, Sensei?"
2002403-49 = "I was presented with an issue, and I resolved it with ease and grace, as usual."
2002403-50 = "As I was saying, the regular practice of proper language etiquette will allow you to—"
2002403-53 = "N-Nagisa, a new situation is ongoing! Members of the Library Committee are using tear gas on a group of students who are thought to have a large number of overdue books!"
2002403-54 = "Oh, I just got another report! Students from the Tea Ceremony Club are throwing boxes of tea into the swimming pool to protest poor-quality cucumber sandwiches that were recently served!"
2002403-55 = "The Justice Task Force was mobilized to put a stop to the protest, but... During the struggle, the courtyard of Institute 3 caught fire and has now been entirely razed..."
2002403-59 = "Well I never!"
2002403-60 = "Can't we get through even a single day around here without students acting like complete hooligans?"
2002403-61 = "Listen up! This is Trinity General School. Students should be grateful to attend a school steeped in so much history and tradition!"
2002403-62 = "From now on, if a student catches my eye for behaving in a manner that's unbecoming of a Trinity student, tarnishing the image of this academy, then I will..."
2002403-63 = "I'll shove stale macarons into their mouth until they explode!"
2002403-64 = "[ns] \"...\""
2002403-65 = "Ah."
2002403-66 = "Um... I may have...misspoken."
2002403-67 = "Allow me a moment to explain. I feel you may be misunderstanding—"
2002403-68 = "[s3] \"It's okay! No need to explain.\"\n[s4] \"It's perfectly all right to vent when you need to, Nagisa.\""
2002403-69 = "No! Like I said, you're misunderstanding!"
2002403-70 = "No! Like I said, you're misunderstanding!"
2002403-72 = "I listened to Nagisa's excuses for a while, enjoying the increasingly flustered look on her face."

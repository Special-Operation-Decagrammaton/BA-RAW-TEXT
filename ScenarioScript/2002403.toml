[translation]
2002403-1 = "語亂即心亂"
2002403-2 = "三一．露臺"
2002403-3 = "（在和渚談論與夏萊有關的工作時，渚突然皺緊了眉頭）"
2002403-4 = "這麼說來，最近學園裡「口出惡言」的學生越來越多了……"
2002403-5 = "[s]「『口出惡言』？」"
2002403-6 = "是的……時常聽見與三一學生不相稱、有失品格的用字遣詞。"
2002403-7 = "要加深與其他學園學生的關係倒是無所謂，不過還是得維持最低限度的禮節……"
2002403-8 = "身為茶會的主席，或許是時候設立一些教導禮儀的場所了呢……"
2002403-9 = "[s1]「原來如此。還有這種流行啊？」\n[s2]「在我看來，有禮貌的學生還是很多的……」"
2002403-10 = "當然並不是所有學生都有那種情況，我指的也只是一部分的學生……"
2002403-11 = "當然並不是所有學生都有那種情況，我指的也只是一部分的學生……"
2002403-12 = "不過若是放任不管，總有一天會成為大問題的。"
2002403-13 = "具體來說……"
2002403-14 = "像是「不用正確的稱呼方式而是使用簡稱」之類的。"
2002403-15 = "[s]「簡稱？」"
2002403-16 = "是的。也許是受到MomoTalk的交流增加的影響，#n最近會將詞語或文章省略的學生變得越來越常見。"
2002403-17 = "像是會把「生日派對」縮寫為「生派」，把「非常感謝」縮寫為「謝」，#n結果不僅是在MomoTalk上，連日常生活中也使用這種詞彙……"
2002403-18 = "……不久前聽見了「KY」這個詞語，我絞盡腦汁才明白它的意思。#n到了這種程度實在是……"
2002403-19 = "[s]「啊～確實挺常見的呢。」"
2002403-20 = "老師，有句話說「語亂即心亂」。"
2002403-21 = "只注重傳達意思而隨意濫用「語言」會導致對話的水準降低，#n也會讓本人的品性受到質疑。"
2002403-22 = "一旦讓人留下了那種印象，想要消除就沒有那麼容易了。#n而每個人的印象也會直接影響到所屬的學校。"
2002403-23 = "身為三一的學生，希望他們能對此有所自覺，隨時注意自己的行為舉止。"
2002403-24 = "……此外，還有在語尾加上「～佩洛」這種奇妙用語，或是使用暴力語彙的學生。"
2002403-25 = "身為茶會的主席，必須要設法解決才行。"
2002403-26 = "[s]「渚不會偶爾不小心脫口而出嗎？」"
2002403-27 = "當然不會。因為我是應該成為學生榜樣的存在。#n在發言時會比其他人加倍謹慎。"
2002403-28 = "無論何時都能冷靜優雅地進行應對。幾乎不會有慌了陣腳的時候。"
2002403-29 = "無論面對什麼情況，都能以茶會主席的身分──"
2002403-33 = "渚大人！抱歉在您說話的時候打擾您……！"
2002403-34 = "看你這麼慌張的樣子，發生什麼事了嗎？"
2002403-35 = "那個，有件事需要立即向您報告……"
2002403-36 = "是來自實現正義部的報告。昨天深夜有學生穿著泳裝走在三一廣場的噴水池邊……"
2002403-38 = "什麼！？"
2002403-43 = "……咳咳。"
2002403-44 = "……會不會是實現正義部把貓或是其他東西誤認成人了呢？"
2002403-45 = "我們學校的學生怎麼可能做出那種──"
2002403-46 = "……我會向實現正義部提出加強校內巡邏的要求。感謝你的報告。"
2002403-47 = "[s]「渚，你剛才是不是有點慌？」"
2002403-48 = "……有什麼令您在意的地方嗎？"
2002403-49 = "我認為和平常完全一致。"
2002403-50 = "我再重複一次，語亂即心亂。#n無論什麼時候都應該冷靜優雅地應對，自然而然地──"
2002403-53 = "渚大人，大事不好了！#n圖書委員會因為有學生借書逾期不還，引爆了大量催淚彈……！"
2002403-54 = "打擾了！茶道部發生了派系鬥爭。#n主張「別把小黃瓜三明治當茶點！」的部分學生試圖將茶箱倒入泳池！"
2002403-55 = "傳來第3校舍的中庭被燃燒殆盡的報告！#n似乎是實現正義部為了阻止圖書委員會的暴動，結果導致周圍陷入了火海……！"
2002403-59 = "……"
2002403-60 = "為何會接二連三地……"
2002403-61 = "……請仔細聽清楚。#n這裡是擁有悠久歷史與傳統的三一綜合學園。"
2002403-62 = "我認為大部分的人應該都抱持著這樣的自覺。#n如果出現了舉止與這所學園不相稱的學生，到時候……"
2002403-63 = "我會親自用馬卡龍塞爆他的嘴巴！"
2002403-64 = "[ns]「……」"
2002403-65 = "……"
2002403-66 = "……老師。那個……"
2002403-67 = "剛才那是，因為……！"
2002403-68 = "[s3]「畢竟是情緒激動的時候，這也沒辦法。」\n[s4]「渚平時也很辛苦呢。」"
2002403-69 = "不，不是這樣的……您誤會了！#n我無論何時都會保持冷靜，優雅地……！"
2002403-70 = "不，不是這樣的……您誤會了！#n我無論何時都會保持冷靜，優雅地……！"
2002403-72 = "（在那之後，茶會一直持續到渚冷靜下來為止）"

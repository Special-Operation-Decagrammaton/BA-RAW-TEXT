[translation]
1001109-1 = "เวลาพักงีบยามบ่าย"
1001109-5 = "ห้องพักผ่อน สวนต้นบ๊วย"
1001109-7 = "ตายจริง คุณครูคะ ช่วงนี้พักผ่อนเพียงพอหรือเปล่าคะ? สีหน้าดูไม่ดีเลยนะคะ"
1001109-8 = "ถึงงานของทางชาเล่ต์จะเยอะแค่ไหน แต่คุณครูก็ต้องนอนหลับพักผ่อนให้เพียงพอนะคะ"
1001109-9 = "จริงด้วยค่ะ ตอนนี้เด็กๆ ของสวนต้นบ๊วยกำลังออกไปเล่นข้างนอกกันอยู่ คุณครูอยากเข้าไปนอนพัก#nที่ห้องพักผ่อนสักครู่ไหมคะ?"
1001109-10 = "ไม่เป็นไรหรอกค่ะ เดี๋ยวฉันจะปลุกคุณครูก่อนพวกเด็กๆ จะกลับมาเอง ตอนนี้เชิญนอนพักตามสบาย#nเลยค่ะ"
1001109-13 = "ถ้าคุณครูเอาแต่ดื้อแบบนี้... เดี๋ยวฉันจะไปนอนกอดคุณครูจนกว่าคุณครูจะหลับเลยนะคะ!"
1001109-15 = "ฮิฮิ ดีมากค่ะ การพักงีบก็ดีต่อร่างกายนะคะ เชิญค่ะ นอนบนฟูกตรงนี้ได้เลยค่ะ"
1001109-19 = "ฉันจะร้องเพลงกล่อมให้คุณครูหลับฝันดีเองค่ะ"
1001109-20 = "ลั่นลา... ลั่นลันล้า~ คุณครูของฉัน... ขอให้หลับฝันดี ลั่นลา... ลั่นลันล้า~"
1001109-23 = "ค่อยๆ หลับตาลงอย่างช้าๆ..."
1001109-27 = "― อุ๊ย ตื่นแล้วเหรอคะ[wa:1180] "
1001109-30 = "― วันนี้... ฉันสนุกมากเลยค่ะ ฮุฮุ[wa:3180] "
1001109-33 = "― ตายจริง ถึงเวลาที่พวกเด็กๆ จะกลับมาแล้วค่ะ[wa:580] "
1001109-35 = "― คุณครูเองก็จะต้องกลับแล้วรึเปล่าคะ?"
1001109-38 = "― เปล่าหรอกค่ะ... ฮุฮุ พักต่ออีกหน่อยเถอะค่ะ คุณครู[wa:4420] "
1001109-40 = "― เดี๋ยววันนี้ ฉันจะเข้าคลาสแทนเองค่ะ[wa:580] "
1001109-43 = "― อา...  น่ารักจัง ฮุฮุ[wa:4060] "
1001109-46 = "รู้สึกสดชื่นขึ้นบ้างไหมคะ?"
1001109-47 = "[s] \"อื้อ หลับสบายมากเลย แต่ต้องลุกแล้วละ\""
1001109-48 = "ไม่ได้นะคะคุณครู นอนต่ออีกสักหน่อยสิคะ"
1001109-49 = "ฉันไม่ยอมพลาดช่วงเวลาดีๆ แบบนี้แน่ค่ะ#nอ๋อ เปล่าหรอกค่ะ ฉันแค่อยากให้คุณครูพักผ่อนอีกสักหน่อยค่ะ"
1001109-50 = "อาจเป็นเพราะเมื่อคืนฉันก็นอนไม่ค่อยหลับ ตอนนี้ฉันเองก็รู้สึกง่วงนอนขึ้นมานิดๆ แล้วค่ะ"
1001109-51 = "อ๊ะ จริงด้วย คราวนี้คุณครูช่วยร้องเพลงกล่อมฉันหน่อยได้ไหมคะ?"
1001109-52 = "ช่วยลูบหัวจนกว่าฉันจะหลับ... แล้วก็ร้องเพลงกล่อมฉันหน่อยนะคะ"
1001109-53 = "อ๊ะ พวกเด็กๆ เหรอคะ? จริงด้วย เดี๋ยวพวกเด็กๆ ก็กลับมาแล้ว จะนอนตอนนี้ก็คงไม่ดีสินะคะ?"
1001109-56 = "ฮุฮุ แต่ว่าวันนี้ฉันจะขอแอบอู้สักหน่อยแล้วกันนะคะ"
1001109-57 = "คิดว่าฉันเป็นเด็กนักเรียนขี้เซาคนหนึ่งในชั้นเรียนของคุณครูก็แล้วกันนะคะ"

[translation]
1001109-1 = "#title;달콤한 오후의 낮잠"
1001109-2 = "#wait;2500"
1001109-3 = "#wait;2000"
1001109-4 = "3;슌;01\n#3;h"
1001109-5 = "#place;매화원 휴게실"
1001109-6 = "3;슌;02\n#3;em;[반응]\n#wait;1500"
1001109-7 = "3;슌;06;어머나, 선생님. 잠은 제대로 주무시고 계신가요? 얼굴에 피로가 가득하네요."
1001109-8 = "3;슌;06;아무리 샬레의 일이 바쁘다고는 하지만, 잠은 푹 주무셔야 해요.\n#3;em;[속상함]"
1001109-9 = "3;슌;03;맞다. 마침 매화원의 아이들은 야외활동을 하러 나간 참이니, 휴게실에서 잠깐 눈을 붙이시는 게 어떠신가요?\n#3;greeting\n#3;em;[반짝]"
1001109-10 = "3;슌;01;괜찮아요. 아이들이 돌아오기 전에는 깨워드릴 테니 부디 가볍게 한 잠 주무세요."
1001109-11 = "3;슌;05\n#3;em;…\n#wait;2500"
1001109-12 = "3;슌;05\n#3;d\n#wait;1000"
1001109-13 = "3;슌;05;자꾸 거절만 하시면… 제가 주무실 때까지 억지로 껴안고 재워 버릴 거예요!\n#3;em;[!]\n#3;closeup\n#3;a"
1001109-14 = "3;슌;05\n#3;d\n#3;closeup\n#wait;1000"
1001109-15 = "3;슌;03;후후, 그래요. 가벼운 낮잠은 건강에도 좋답니다. #n자, 이불을 깔아드릴 테니 여기에 누우세요.\n#3;em;[음표]\n#3;a"
1001109-16 = "3;슌;01\n#3;m5\n#wait;1000"
1001109-17 = "3;슌;01\n#3;d\n#wait;1000"
1001109-18 = "#zmc;move;316,-222;2528;1000\n#wait;1500"
1001109-19 = "#zmc;instant;316,-222;2528\n#all;hide\n#na;슌;제가 선생님이 잘 주무실 수 있도록 자장가를 불러 드릴게요."
1001109-20 = "#zmc;instant;316,-222;2528\n#na;슌;자장, 자장, 우리 선생님, 잘도 잔다. #n자장, 자장……"
1001109-21 = "#zmc;instant;316,-222;2528\n#all;hide"
1001109-22 = "#zmc;instant;316,-222;2528\n#all;hide"
1001109-23 = "#zmc;instant;316,-222;2528\n#na;눈이 서서히 감긴다……"
1001109-24 = "#zmc;instant;316,-222;2528\n#all;hide"
1001109-25 = "#all;hide"
1001109-26 = "#wait;5000"
1001109-27 = "#st;[-1200,-530];serial;60;― 어머, [wa:1500]일어나셨군요."
1001109-28 = "#wait;5000"
1001109-29 = "#clearST"
1001109-30 = "#st;[-1200,-530];serial;60;― 오늘은… [wa:1500]정말 즐거웠어요. [wa:2200]후후."
1001109-31 = "#wait;3800"
1001109-32 = "#clearST"
1001109-33 = "#st;[-1200,-530];serial;60;― 어머, [wa:1500]아이들이 돌아올 시간이네요."
1001109-34 = "#wait;4000"
1001109-35 = "#st;[-1200,-630];serial;60;― 슬슬 돌아가 보셔야 하지 않으시겠어요?"
1001109-36 = "#wait;5500"
1001109-37 = "#clearST"
1001109-38 = "#st;[-1200,-530];serial;60;― 아니…… [wa:2000]후훗. [wa:1200]좀 더 쉬세요, [wa:2300]선생님."
1001109-39 = "#wait;2200"
1001109-40 = "#st;[-1200,-630];serial;60;― 오늘 수업은 [wa:1300]제가 대신 할게요."
1001109-41 = "#wait;5500"
1001109-42 = "#clearST"
1001109-43 = "#st;[-1200,-530];serial;60;― 아아…… [wa:2500]귀여워라…… [wa:1800]후훗."
1001109-44 = "#wait;5200"
1001109-45 = "#all;hide\n#clearST"
1001109-46 = "3;슌;01;피로한 건 이제 좀 괜찮으신가요?\n#3;greeting\n#3;em;[반짝]\n#3;a"
1001109-47 = "[s] \"응, 잘 잤어. 이제 일어날게.\""
1001109-48 = "3;슌;99;안돼요, 선생님. 조금 더 누워 계세요."
1001109-49 = "3;슌;03;이 귀중한 기회를…… 아니, 모처럼의 휴식을 방해받고 싶지는 않으니까요.\n#3;em;[///]"
1001109-50 = "3;슌;01;저도 어젯밤 잠을 설친 탓일까요. 어쩐지, 이렇게 계속 누워있고 싶네요."
1001109-51 = "3;슌;02;맞다, 이번에는 선생님께서 자장가를 불러주시겠어요?\n#3;em;[반응]"
1001109-52 = "3;슌;99;제가 잠들 때까지 머리를 토닥이면서…… 계속 선생님의 따듯한 목소리를 들려주세요."
1001109-53 = "3;슌;02;아 참. 그러고보니 아이들이 곧 돌아올 텐데, 정말로 잠들어버리면 안 되겠지요?"
1001109-54 = "3;슌;01\n#wait;1000\n#3;d"
1001109-55 = "3;슌;01\n#3;closeup\n#wait;1500\n#3;a"
1001109-56 = "3;슌;01;후후, 하지만 오늘만큼은 조금 게으름을 부려볼게요.\n#3;closeup"
1001109-57 = "3;슌;03;선생님 앞에서는 저도 한 사람의 잠꾸러기 학생에 불과하니까요.\n#3;em;[하트]\n#3;closeup"

[translation]
1001109-1 = "正午過後的甜美午睡"
1001109-5 = "梅花園休息室"
1001109-7 = "哎呀，老師。老師你有好好睡覺嗎？怎麼一臉疲倦呢……"
1001109-8 = "就算夏萊的工作再怎麼忙，還是要睡飽才行唷？"
1001109-9 = "對了，梅花園的孩子們正好出去戶外活動了，要不要去休息室小睡一下？"
1001109-10 = "沒關係。我會在孩子們回來之前叫醒你，請去小睡一下吧。"
1001109-13 = "要是拒絕的話……我就要強行抱住老師讓你睡著了唷！"
1001109-15 = "呵呵，是啊。稍微睡個午覺也有益健康。 #n來，我幫你舖被子，請躺在這裡吧。"
1001109-19 = "我來唱搖籃曲給老師聽，幫助你入睡吧。"
1001109-20 = "寶寶睡～乖乖睡～外面天黑風又吹～#n寶寶睡～快快睡～"
1001109-23 = "（眼簾慢慢的闔上……）"
1001109-27 = "― 哎呀，你醒了嗎？[wa:1620] "
1001109-30 = "― 今天……真的很開心。呵呵。[wa:3900] "
1001109-33 = "― 哎呀，已經到了小朋友們要回來的時間了呢。[wa:1460] "
1001109-35 = "― 老師是不是也差不多該回去工作會比較好……"
1001109-38 = "― 不，果然還是……呵呵，請再稍微休息一下吧，老師。[wa:5420] "
1001109-40 = "― 今天的授課會由我來代替老師的。[wa:1380] "
1001109-43 = "― 啊啊……真可愛……呵呵。[wa:4420] "
1001109-46 = "感覺有好一點了嗎？"
1001109-47 = "[s] 「嗯，睡得很舒服。我要起來囉。」"
1001109-48 = "不行，老師。你再多躺一下。"
1001109-49 = "這是寶貴的機會……不，這是難得的休息時間。"
1001109-50 = "我昨晚似乎也沒睡好。也不自覺的想這樣躺著。"
1001109-51 = "對了，這次可以換老師唱搖籃曲給我聽嗎？"
1001109-52 = "請老師摸摸我的頭……用溫暖的聲音唱歌給我聽，直到我睡著吧。"
1001109-53 = "不過孩子們很快就會回來，也不能真的睡著……"
1001109-56 = "呵呵，不過今天就稍微偷懶一下吧。"
1001109-57 = "在老師面前，我也只是一個貪睡的學生而已。"

[translation]
1001109-1 = "Sweet Afternoon Nap"
1001109-5 = "Plum Blossom Garden Lounge"
1001109-7 = "Goodness, Sensei. Have you been getting enough sleep? There are bags under your eyes."
1001109-8 = "You need to get your rest, regardless of how busy Schale keeps you."
1001109-9 = "I know. The Plum Blossom students are outside right now, so why not take a nap in the lounge?"
1001109-10 = "It's quite all right. Take your nap, and I'll be sure to wake you before the children return."
1001109-13 = "If you keep resisting...then I'll have no choice but to bear hug you and force you to sleep!"
1001109-15 = "Heehee. That's a good sensei. Napping is essential to one's health. Now lie yourself down on this blanket here."
1001109-19 = "I'll sing you to sleep with a lullaby."
1001109-20 = "Hush-a-bye, Sensei, on the tree top... When the wind blows the cradle will rock..."
1001109-23 = "When the bough breaks the cradle will fall..."
1001109-27 = "― Goodness. You're awake.[wa:1020] "
1001109-30 = "― Today...was quite enjoyable. Heehee.[wa:2980] "
1001109-33 = "― Oh, dear. It's time for the children to come in.[wa:340] "
1001109-35 = "― Should you head back now?"
1001109-38 = "― No...heehee. You should rest a little more, Sensei.[wa:4340] "
1001109-40 = "― Don't worry about today's class... I'll substitute for you.[wa:10] "
1001109-43 = "― Aw... You're so cute. Heehee.[wa:3740] "
1001109-46 = "How do you feel? Refreshed?"
1001109-47 = "[s] \"Much better now, but I should be getting up.\""
1001109-48 = "Nonsense, Sensei. You should lie down a little more."
1001109-49 = "I'm not going to give up this precious moment... I mean, I want you to get a little more rest."
1001109-50 = "Come to think of it, I didn't get a good night's sleep either. Maybe I should lie down too."
1001109-51 = "In that case, would you mind singing me a lullaby this time, Sensei?"
1001109-52 = "And would you mind patting my head until I doze off? I want to hear your warm voice until I'm sound asleep."
1001109-53 = "The children? Oh, right. I suppose I should stay awake with them coming inside, shouldn't I?"
1001109-56 = "Though I think I've earned the right to be a little lazier today than usual."
1001109-57 = "Consider me another sleepy student in your class for the time being."

[translation]
84305400200-5 = "Thank you for all your hard work."
84305400200-6 = "It was rough, thanks to some very stubborn people."
84305400200-7 = "U-Umm..."
84305400200-9 = "Fufu, I have nothing to add to that."
84305400200-11 = "This is a done deal then, right? No more loose ends?"
84305400200-12 = "You could say that. All the key figures are where they need to be, and all the incidents have been taken care of."
84305400200-13 = "You two should get back on the scene. If we keep them waiting, they might start to suspect you're talking to me."
84305400200-14 = "For Sensei, that wouldn't be a problem, but for the others..."
84305400200-15 = "Yeah, yeah. I'll make a good excuse for being late."
84305400200-20 = "So Rio, does that mean you..."
84305400200-21 = "I'm going to start packing now. I don't plan on leaving anything behind."
84305400200-25 = "Is that...so?"
84305400200-26 = "...Yes."
84305400200-30 = "I'll be on my way, then."

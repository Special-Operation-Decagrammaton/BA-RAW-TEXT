[translation]
84305400200-5 = "真的辛苦你們了。"
84305400200-6 = "辛苦了。#n全都拜那群讓人無比鬱悶的傢伙所賜。"
84305400200-7 = "唔，唔嗯……"
84305400200-9 = "呵呵，這點確實如此呢。"
84305400200-11 = "那事件就算解決了吧？不會再有事了對吧？"
84305400200-12 = "可以這麼說。#n核心人物都已經被抓住，事件也都收拾好了。"
84305400200-13 = "你們兩個先回到現場吧。#n要是再耽擱下去，其他人可能會懷疑到我的存在。"
84305400200-14 = "老師那邊姑且不論……其他部分還是有點讓人傷腦筋。"
84305400200-15 = "是是是。#n我會找個說詞敷衍過去。"
84305400200-20 = "莉央，那你……"
84305400200-21 = "我要開始準備回去的行李了。#n曾在這裡待過的痕跡……我打算全部抹去。"
84305400200-25 = "這樣啊……"
84305400200-26 = "……好吧。"
84305400200-30 = "那我就先走了。"

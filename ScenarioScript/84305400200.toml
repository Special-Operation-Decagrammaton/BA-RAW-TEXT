[translation]
84305400200-5 = "คงเหนื่อยแย่เลยนะ"
84305400200-6 = "เหนื่อยแย่เลยละ ยัยพวกนั้นทำให้ปวดประสาทชะมัด"
84305400200-7 = "อะ... อื้ม..."
84305400200-9 = "ฮุฮุ พูดอีกก็ถูกอีกนะคะ"
84305400200-11 = "งั้นเรื่องนี้ก็จบแล้วใช่มั้ย? ไม่มีงานอะไรแล้วเนอะ?"
84305400200-12 = "จะมองอย่างนั้นก็ได้ เราได้ตัวผู้ต้องหาสำคัญ และจัดการเรื่องที่เกิดขึ้นเรียบร้อยแล้วด้วย"
84305400200-13 = "แต่ฉันอยากให้ทั้งสองคนกลับไปที่งานน่ะ ถ้าเราเสียเวลากันแบบนี้ต่อไปละก็ คนอื่นอาจจะสงสัยว่าฉัน#nมาอยู่ที่นี่ก็ได้"
84305400200-14 = "กับครูคงแก้ไขอะไรไม่ได้แล้ว... แต่ถ้าคนอื่นรู้เข้าจะเป็นเรื่องใหญ่ได้"
84305400200-15 = "จ้า จ้า ฉันจะแวะไปแล้วแต่งเรื่องอะไรนิดๆ หน่อยๆ แล้วค่อยกลับมา รอหน่อยก็แล้วกัน"
84305400200-20 = "ริโอะ ถ้างั้นคุณจะ..."
84305400200-21 = "ฉันก็ต้องไปเก็บของเพื่อจากไปน่ะสิ ฉันไม่อยากให้... มีร่องรอยใดๆ ที่บ่งบอกว่าฉันมาอยู่ที่นี่น่ะ"
84305400200-25 = "งะ... งั้นเหรอคะ?"
84305400200-26 = "ค่ะ..."
84305400200-30 = "งั้นฉันจะรีบกลับมานะคะ"

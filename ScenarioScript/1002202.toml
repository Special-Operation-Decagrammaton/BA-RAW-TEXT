[translation]
1002202-1 = "Walking on the Beach with the Head Prefect"
1002202-5 = "Sensei."
1002202-6 = "[s1] \"Hey, you're looking cute, Hina!\"\n[s2] \"What a cute swimsuit!\""
1002202-7 = "Keep your voice down."
1002202-8 = "Keep your voice down."
1002202-9 = "If someone hears you and recognizes me...that'll blow everything."
1002202-10 = "[s] \"Right...\""
1002202-11 = "I asked you to come because I'm not very well-known here."
1002202-12 = "There aren't many Gehenna students, and Trinity students don't come around either."
1002202-13 = "[s] \"And in a place where morals don't matter, what is there to do?\""
1002202-14 = "..."
1002202-15 = "That's..."
1002202-16 = "So..."
1002202-17 = "[s] \"You're here to rehearse for boot camp! I get it!\""
1002202-18 = "..."
1002202-19 = "You're just..."
1002202-20 = "I need you to stop messing around with me."
1002202-21 = "[s] \"I'm not messing with you. I want to play with you!\""
1002202-22 = "It's a bad idea either way! We're not here to play!"
1002202-23 = "I may not be able to respond properly when issues arise during boot camp if I don't come to understand what the beach is like during the summer."
1002202-25 = "I should get to know any place that I'm not familiar with. In that sense, it's just prep work, like you said."
1002202-26 = "[s] \"Okay, got it.\""
1002202-27 = "*sigh*"
1002202-28 = "The most important thing here is to not reveal my identity."
1002202-29 = "We have to go back in a few hours, but I think we'll have enough time to get a handle on the beach."
1002202-30 = "The first thing I want to do is..."
1002202-37 = "...!"
1002202-38 = "Oh, hold on, Sensei. I just got a message from the school."
1002202-39 = "I'm sorry. Please wait just a minute."
1002202-40 = "[s] \"Busy as always. Don't worry about me.\""
1002202-41 = "I'll be back before you know it."
1002202-44 = "Hina disappeared to check her phone."
1002202-46 = "Time passed, and Hina never returned."
1002202-47 = "I tried to contact her to make sure nothing had happened."
1002202-49 = "Then, I received a MomoTalk from Hina."
1002202-50 = "Sensei, help me..."
1002202-51 = "[s] \"...?!\""
1002202-55 = "*sigh* Thank you, Sensei. "
1002202-56 = "I was caught by some strangely kind people, and then..."
1002202-57 = "[s] \"Were you left at the lost child center?\""
1002202-58 = "..."
1002202-59 = "I tried to tell them I'm not in elementary school..."
1002202-60 = "Those people. I know they meant well..."
1002202-61 = "...but no matter how many times I explained that I wasn't a missing child, they kept saying things like, \"It'll be okay, there's no need to be afraid.\""
1002202-62 = "They just wouldn't listen. Why is that?"
1002202-63 = "[s] \"Well, it's clearly because...\""
1002202-64 = "Because what?"
1002202-65 = "[s] \"Nothing. Could've been anything.\""
1002202-66 = "*sigh* This is such a nuisance."
1002202-67 = "[s] \"Why did you agree to go in the first place?\""
1002202-68 = "Because I couldn't afford to have my true identity revealed. "
1002202-69 = "It would make me an easy target for my enemies."
1002202-70 = "Furthermore, if it was revealed that Schale's sensei and the Gehenna head prefect went to the beach together..."
1002202-71 = "It'd definitely make headlines, and probably be broadcast via blimp 24/7."
1002202-72 = "[s] \"That seems like a bit of a leap...\""
1002202-73 = "..."
1002202-74 = "Well, anyways, I certainly learned a lesson."
1002202-75 = "That's going to happen if I'm alone, so you better not leave my side, Sensei."
1002202-76 = "[s] \"Your wish is my command.\""
1002202-77 = "Whew. So we have about 30 minutes, then."
1002202-78 = "I hope you'll stay with me for a little while longer."
1002202-80 = "I spent the remaining time walking with Hina on the beach."

1002202-61 = "3;히나 수영복ND;00;몇 번이고 미아 같은 게 아니라고 설명해도, 뜨뜻미지근한 눈으로 바라보면서 '괜찮아. 무서워할 필요 없단다.' 같은 소리나 할 뿐이고."

[translation]
1002202-1 = "與委員長的海邊散步"
1002202-5 = "……老師。"
1002202-6 = "[s1] 「陽奈醬好可愛！！！！」\n[s2] 「是穿泳裝的陽奈醬！」"
1002202-7 = "太，太大聲了……！我有聽到了啦，安靜一點……"
1002202-8 = "太，太大聲了……！我有聽到了啦，安靜一點……"
1002202-9 = "聲音這麼大要是被人發現……不就失去刻意偷偷摸摸見面的意義了嗎！"
1002202-10 = "[s] 「說的也是，對不起。」"
1002202-11 = "還好。說是這樣說，但這附近應該沒什麼人認得我……因此我才會找老師來這裡。"
1002202-12 = "這附近很靜謐，也幾乎沒有格黑娜的學生，三一學生應該也不會來。"
1002202-13 = "[s] 「那我們在這種不須維護風紀的地方要做什麼……？」"
1002202-14 = "……"
1002202-15 = "就是……"
1002202-16 = "……那個。"
1002202-17 = "[s] 「……我懂了！看來是合宿的事前練習對吧！沒問題！」"
1002202-18 = "……"
1002202-19 = "老師真的是……"
1002202-20 = "拿人家尋樂也該懂得適可而止吧……"
1002202-21 = "[s] 「我沒有『拿』陽奈尋樂。我是想『和』陽奈尋樂！」"
1002202-22 = "不，不管哪一種都不對！首先今天不是來玩的……！"
1002202-23 = "如果不確實了解夏天的海邊，夏季合宿訓練發生變數時，可能就會無法有效應對……"
1002202-25 = "有不了解的地方就該著手去認識。#n就這方面而言，或許確實就如老師所說是種「事前練習」。"
1002202-26 = "[s] 「嗯，我知道了。」"
1002202-27 = "呼……"
1002202-28 = "總而言之，不能被人發現我們在這裡……"
1002202-29 = "幾個小時後我就必須回去了，但應該足以讓我透過這一區大致掌握海邊的情況。"
1002202-30 = "那麼我想一下，應該先從──"
1002202-37 = "……？"
1002202-38 = "啊，學校來了聯絡……"
1002202-39 = "抱歉老師，稍等一下。"
1002202-40 = "[s] 「嗯，慢走。」"
1002202-41 = "我馬上就回來……"
1002202-44 = "（陽奈離開去接了電話）"
1002202-46 = "（過了好一段時間，陽奈也沒回來）"
1002202-47 = "（就在擔心他是不是遇上什麼問題，準備聯絡時──）"
1002202-49 = "（陽奈傳來了MomoTalk）"
1002202-50 = "老師，幫幫我"
1002202-51 = "[s] 「……！？」"
1002202-55 = "唉……抱歉，老師。謝謝你來幫忙。"
1002202-56 = "總之就是，我被一群異常親切的民眾纏住了……"
1002202-57 = "[s] 「然後就被帶去走失兒童服務中心了……」"
1002202-58 = "……"
1002202-59 = "唉……都說好幾次我不是小學生了……"
1002202-60 = "我很清楚那些人是出自於好意……"
1002202-61 = "但不管我解釋多少次自已沒有迷路，#n他們都只是一臉溫柔的說：「不怕不怕，交給大姐姐們吧」……"
1002202-62 = "完全不聽人講話，到底為什麼……？"
1002202-63 = "[s] 「還能為什麼，當然是……」"
1002202-64 = "……是什麼？"
1002202-65 = "[s] 「……什麼也沒有。」"
1002202-66 = "唉，真是……麻煩死了……"
1002202-67 = "[s] 「不過我有點意外。你竟然會乖乖讓人帶著走。」"
1002202-68 = "……因為我認為隨意公開身分，反而會變得更麻煩。#n雖然有必要的話我也可以用蠻力掙脫，但畢竟他們都不是壞人。"
1002202-69 = "要是附近有個對我有仇的人，因此不由分說的衝上來，那就頭痛了。"
1002202-70 = "再加上，夏萊的老師和格黑娜風紀委員長在海邊獨處的事實一旦曝光……"
1002202-71 = "將很有可能被某些新聞機關大肆報導，並透過報導用的飛行艇24小時不間斷播出……"
1002202-72 = "[s] 「再怎麼樣應該也不會那麼誇張……」"
1002202-73 = "……"
1002202-74 = "總之，我現在知道接下來該怎麼做了。"
1002202-75 = "既然我獨自一人的狀態會發生這種事，那就請絕對不要離開我的身邊。#n可以嗎，老師？"
1002202-76 = "[s] 「了解，我會一直跟在你身邊。」"
1002202-77 = "……嗯。我也會守護老師的。"
1002202-78 = "那麼，現在還剩下大概30分鐘，能請老師再陪陪我嗎。"
1002202-80 = "（剩下的時間，都和陽奈一起在海邊開心地散步）"

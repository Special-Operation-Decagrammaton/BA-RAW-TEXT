[translation]
1002202-1 = "เดินเล่นริมหาดกับประธานคณะกรรมการวินัย"
1002202-5 = "คุณครู"
1002202-6 = "[s1] \"ฮินะจังน่ารักที่สุดเลย!\"\n[s2] \"ชุดว่ายน้ำน่ารักจังเลย!\""
1002202-7 = "หนวกหูน่า เงียบไปเลย..."
1002202-8 = "หนวกหูน่า เงียบไปเลย..."
1002202-9 = "ถ้าเสียงดังแบบนี้ เดี๋ยวก็มีคนเห็นฉัน แผนก็แตกพอดีกัน"
1002202-10 = "[s] \"จริงด้วย...\""
1002202-11 = "อืม ฉันเรียกคุณครูมาที่นี่ เพราะที่นี่ไม่ค่อยมีคนรู้จักฉันเท่าไร"
1002202-12 = "ที่นี่แทบไม่มีนักเรียนเกเฮนน่าเลย แล้วนักเรียนจากทรีนิตี้ก็ไม่มาที่แบบนี้ด้วย"
1002202-13 = "[s] \"งั้นก็ไม่ต้องทำงานน่ะสิ แล้วเรามาทำอะไรเหรอ?\""
1002202-14 = "..."
1002202-15 = "เรื่องนั้น..."
1002202-16 = "คือว่า..."
1002202-17 = "[s] \"มาฝึกซ้อมสำหรับเข้าค่ายสินะ? ครูเข้าใจแล้ว!\""
1002202-18 = "..."
1002202-19 = "คุณครูนี่นะ..."
1002202-20 = "เลิกแกล้งฉันสักทีเถอะ..."
1002202-21 = "[s] \"ไม่ได้ 'แกล้ง' สักหน่อยครูแค่ 'อยากเล่นด้วย' ต่างหาก\""
1002202-22 = "ไม่ได้ทั้งสองอย่างนั่นแหละ! ฉันไม่ได้มาที่นี่เพื่อเล่นสนุกนะ...!"
1002202-23 = "ถ้าเราไม่คุ้นเคยกับทะเลฤดูร้อน หากเกิดอะไรระหว่างการฝึกค่ายขึ้นมาก็อาจจะรับมือไม่ถูก..."
1002202-25 = "เลยต้องทำความรู้จักสถานที่ไว้ก่อน เพราะงั้นถึงได้มาที่นี่... เพื่อฝึกซ้อมแบบที่คุณครูบอกนั่นละ#nใช่! ฉันมาฝึกซ้อม...!"
1002202-26 = "[s] \"เข้าใจแล้ว\""
1002202-27 = "เฮ้อ..."
1002202-28 = "สิ่งสำคัญตอนอยู่ที่นี่ คือต้องระวังไม่ให้คนอื่นรู้ตัวจริงของเรา"
1002202-29 = "ถึงจะแค่ไม่กี่ชั่วโมง แต่ฉันคิดว่าเวลาแค่นี้ก็เพียงพอสำหรับการสำรวจชายหาดแล้วละ"
1002202-30 = "ถ้างั้นเราก็เริ่มจาก..."
1002202-37 = "...!"
1002202-38 = "อ๊ะ รอเดี๋ยวนะคุณครู ทางโรงเรียนติดต่อมาน่ะ..."
1002202-39 = "ขอโทษนะ รอแป๊ปนึงนะ"
1002202-40 = "[s] \"งานยุ่งตลอดเลยนะ ไม่ต้องห่วงครูหรอก\""
1002202-41 = "ฉันจะรีบกลับมานะ"
1002202-44 = "(ฮินะเดินหายไปคุยโทรศัพท์)"
1002202-46 = "(ผ่านไปครู่ใหญ่ ฮินะก็ยังไม่กลับมา)"
1002202-47 = "(คุณครูพยายามติดต่อไปหาฮินะ เพราะเป็นห่วงว่าจะเกิดเรื่องอะไรขึ้นกับเธอ และในตอนนั้นเอง...)"
1002202-49 = "(คุณครูก็ได้รับข้อความ MOMOTALK จากฮินะ)"
1002202-50 = "คุณครู ช่วยฉันด้วย..."
1002202-51 = "[s] \"......?!\""
1002202-55 = "เฮ้อ... ขอบคุณนะคุณครู"
1002202-56 = "จู่ๆ ฉันก็ถูกพวกคนใจดีแบบแปลกๆ มาลากตัวไปน่ะ..."
1002202-57 = "[s] \"โดนพาไปศูนย์ช่วยเหลือเด็กหลงทางสินะ...\""
1002202-58 = "..."
1002202-59 = "ฉันพยายามบอกพวกเขาแล้วว่าฉันไม่ใช่เด็กประถม..."
1002202-60 = "ฉันก็รู้นะว่าคนพวกนั้นทำไปเพราะเจตนาดี"
1002202-61 = "ถึงจะอธิบายไปตั้งหลายครั้งว่าไม่ใช่เด็กหลงทาง แต่พวกเขาก็มองฉันด้วยสายตาที่อบอุ่น#nแล้วก็เอาแต่บอกว่า \"ไม่เป็นไรนะ ไม่ต้องกลัวหรอก\" อยู่ตลอด"
1002202-62 = "พวกเขาไม่ฟังที่ฉันพูดเลย เพราะอะไรกันนะ?"
1002202-63 = "[s] \"มันก็แน่อยู่แล้วนี่...\""
1002202-64 = "ก็แน่อยู่แล้วงั้นเหรอ?"
1002202-65 = "[s] \"เปล่าๆ ไม่มีอะไรทั้งนั้น...\""
1002202-66 = "เฮ้อ... น่าคำราญจริงๆ"
1002202-67 = "[s] \"ทำไมถึงยอมไปศูนย์ช่วยเหลือเด็กหลงทางล่ะ?\""
1002202-68 = "เพราะถ้าโดนเปิดเผยตัวจริงที่นี่ก็จะเกิดเรื่องน่ารำคาญมากมายตามมาไงล่ะ"
1002202-69 = "พวกที่จ้องเล่นงานฉันอาจจะโผล่มาที่นี่ก็ได้"
1002202-70 = "ถ้ามีใครเห็นว่าคุณครูของชาเล่ต์มาชายหาดกับประธานกรรมการวินัยของเกเฮนน่าสองต่อสองละก็..."
1002202-71 = "คงได้เป็นข่าวใหญ่โต หรืออาจมีเครื่องบินรายงานข่าวสดติดตามตลอด 24 ชั่วโมงเลยก็ได้นะ"
1002202-72 = "[s] \"เวอร์ไปหน่อยหรือเปล่า...\""
1002202-73 = "..."
1002202-74 = "เอาเถอะ วันนี้ฉันก็ได้เรียนรู้อะไรมาบ้างแล้วละ"
1002202-75 = "ได้เรียนรู้ว่า ถ้าอยู่คนเดียวก็จะเกิดเรื่องแบบนี้ เพราะฉะนั้นคุณครูต้องอยู่ข้างๆ ฉันนะ"
1002202-76 = "[s] \"ท่านประธานจะได้รับสิทธิ์นั้นเดี๋ยวนี้\""
1002202-77 = "ฮิฮิ... ตอนนี้เราเหลือเวลาประมาณ 30 นาที"
1002202-78 = "อยู่กับฉันต่ออีกสักหน่อยแล้วกันนะ"
1002202-80 = "(คุณครูใช้เวลาที่เหลือเดินเล่นที่ชายหาดกับฮินะ)"

1002202-12 = "5;히나 수영복ND;01;게헨나 학생들도 거의 없고, 트리니티 학생들도 오지 않는 변경이니까."
1002202-13 = "[s] \"그럼 풍기를 지킬 필요가 없는 이곳에서 무엇을 하면?\""

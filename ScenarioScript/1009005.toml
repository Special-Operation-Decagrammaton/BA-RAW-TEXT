[translation]
1009005-1 = "คนที่ขัดขวางงานเทศกาลต้องโดนดุค่ะ!"
1009005-2 = "(คุณครูได้รับการติดต่อจากอุมิกะและไปที่ร้านเฮียกคิยาโค...)"
1009005-7 = "[ns] \"มีใครอยู่มั้ย~\""
1009005-8 = "หืม? มีคนมาเหรอ?"
1009005-9 = "ช่างเถอะ! ก็วันนี้... พวกเราเป็นลูกค้านี่!"
1009005-14 = "ตื่นเต้นชะมัด!"
1009005-17 = "ยะฮู้วววว! ได้เป็นลูกค้าแบบนี้มันดีจริงๆ!"
1009005-21 = "[ns] \"มะ... มีเรื่องอะไรเหรอ?!\""
1009005-22 = "เอ๋?! คุณครู?! ทำไมถึงมาอยู่ที่นี่ได้...!"
1009005-23 = "กะ... ก็จริงอยู่ค่ะที่ฉันบอกไปอย่างนั้น...! แล้วก็ที่บอกว่าอยากให้คุณครูช่วยมาที่นี่ด้วย... เป็นเรื่องจริงทั้งหมดเลยค่ะ...!"
1009005-29 = "อ่า... จริงๆ เลย! พวกปีศาจ! เดี๋ยวฉันจะดุจริงๆ แล้วนะคะ!?"
1009005-33 = "พูดอะไรกันน่ะ! ตอนนี้พวกฉันมาเป็นลูกค้าของร้านเฮียกคิยาโคนะ!"
1009005-34 = "แล้วก็จ่ายเงินไปแล้วด้วย!"
1009005-35 = "มันก็จริงอยู่หรอกค่ะ... อึก... ฉะ... ฉันต้องต้อนรับลูกค้าอย่างเต็มที่ก็จริง"
1009005-36 = "แต่ถ้าเจอลูกค้าที่ซุกซนแบบนี้ละก็...!"
1009005-37 = "มีหวังชื่อเสียงของร้านเฮียกคิยาโคคงได้...!"
1009005-38 = "[s1] \"อืม... ร้านเฮียกคิยาโคเป็นที่ที่ให้บริการลูกค้าก็จริง\"\n[s2] \"แต่ลูกค้าก็ควรให้ความเคารพการบริการด้วยนะ\""
1009005-44 = "เพราะงั้น... การ 'สั่งสอน' ลูกค้าที่ไม่ให้ความเคารพต่อพนักงานและการบริการก็เป็นส่วนหนึ่งของการ#nต้อนรับลูกค้าด้วยสินะคะ"
1009005-45 = "เพราะถ้าไม่ทำอย่างนั้น ก็จะเป็นการเสียมารยาทต่อลูกค้าคนอื่นที่อยากมาใช้บริการเงียบๆ นะคะ"
1009005-49 = "จริงด้วย... นะคะ จริงด้วยค่ะ ถ้าอย่างนั้นก็...!"
1009005-50 = "พวกปีศาจ! เพื่อร้านเฮียกคิยาโค เพื่อประเพณีที่สืบทอดมาและเพื่อลูกค้าท่านอื่นที่จะมาใช้บริการของ#nทางร้าน!"
1009005-54 = "จากนี้เป็นต้นไป ฉันจะขอ 'ต้อนรับ' และ 'สั่งสอน' พวกคุณตามแบบฉบับของร้านเฮียกคิยาโคอย่าง#nจริงใจค่ะ!"
1009005-56 = "หืม? คะ... คิดจะทำอะไรน่ะ...?"
1009005-57 = "ดูบรรยากาศไม่ค่อยดีเลย...?"
1009005-62 = "คุณลูกค้า นั่งลงกับที่!"
1009005-68 = "หะ... หืม? อะไรนะ...?"
1009005-69 = "ว้าย?! บังคับเรานั่งเก้าอี้เหรอเนี่ย...?"
1009005-84 = "ถ้วยชา ชาเขียว ชาอู่หลง จานรอง ทิชชู่ ผ้าเช็ดปาก! ฉันเตรียมให้หมดแล้วค่ะ! ยังต้องการอะไรอีกมั้ยคะ?!"
1009005-89 = "เร็วมาก...! แถมยังไม่ทำอะไรหกหรือหล่นกลางทางเลยด้วย..."
1009005-90 = "ฮึ่ม! ยังขาดผ้าเย็นนี่!"
1009005-96 = "รู้อยู่แล้วค่ะว่าจะขอ ก็เลยกำลังเตรียมให้อยู่ค่ะ!"
1009005-97 = "ให้เยอะไปหรือเปล่า?!"
1009005-98 = "เอ่อ... นี่... ให้แค่ 2 ผืนก็พอแล้วนะ..."
1009005-99 = "คุณลูกค้าเป็นคนขอเองน่ะค่ะ ฉันเลยเชื่อว่าจะเอาทั้งหมดนี้ไปใช้ให้เกิดประโยชน์สูงสุดค่ะคุณลูกค้า!"
1009005-100 = "ขอบอกไว้ก่อนนะคะว่าถ้าเอาออกไปนอกร้านเฮียกคิยาโค จะถือว่าเป็นการขโมยของจากทางร้านค่ะ!"
1009005-101 = "ยังต้องการอะไรอีกมั้ยคะ?"
1009005-105 = "อ่า... มะ... ไม่มีแล้ว"
1009005-107 = "ถ้าอย่างนั้นฉันก็จะรับออร์เดอร์ค่ะ! เมนูของร้านเฮียกคิยาโค..."
1009005-111 = "(อุมิกะแนะนำและอธิบายทุกเมนูของร้านเฮียกคิยาโคอย่างละเอียดและรวดเร็วราวกับปืนกล)"
1009005-112 = "(อีกหนึ่งปัญหาตอนนี้ก็คือ ไม่รู้ว่าพวกปีศาจ... ไม่สิ ไม่รู้ว่าลูกค้าจะเข้าใจสิ่งที่กำลังเกิดขึ้นหรือเปล่า...)"
1009005-114 = "อะ... อ่า... จำรายละเอียดไม่ได้เลย เวียนหัวไปหมดแล้ว..."
1009005-115 = "เราต้องรู้ก่อนสิว่าอะไรเป็นอะไร ถึงจะสั่งได้ถูกน่ะ..."
1009005-116 = "อ้อ ยังไม่เข้าใจทั้งหมดที่ฉันอธิบายไปสินะคะ? ถ้าอย่างนั้นฉันจะแนะนำเมนูตั้งแต่แรกอีกครั้ง..."
1009005-120 = "มะ... ไม่ต้อง! ไม่ต้องทำถึงขนาดนั้นก็ได้! เดี๋ยวพวกเราลองสุ่มสั่งกันเอง..."
1009005-121 = "แต่ที่สำคัญกว่านั้นคือ... เอ่อ... พวกเราผิดไปแล้ว พวกเราทำผิดไปแล้วค่ะ... ต่อไปพวกเราจะไม่ซนในร้านอีก..."
1009005-127 = "[ns] \"คุณลูกค้าจอมซน สำนึกผิดกันแล้วเหรอ?\""
1009005-128 = "ค่ะ..."
1009005-129 = "พอได้ยินว่าจะมีงานเทศกาลจัดที่นี่ พวกเราก็ตื่นเต้นกันเกินขนาด ก็เลย..."
1009005-134 = "[ns] \"หืม? งานเทศกาลที่ร้านเฮียกคิยาโคเหรอ?\""
1009005-135 = "เริ่มมีการขนส่งอุปกรณ์ที่ใช้จัดงานเทศกาลมาที่นี่ตั้งแต่ 3 วันก่อนแล้วใช่มั้ยล่ะ?"
1009005-136 = "แถมยังมีคนที่เกี่ยวข้องกับการจัดงานเทศกาลแวะเวียนมาที่นี่กันอีกด้วย..."
1009005-137 = "ทั้งกลุ่มการค้า เจ้าหน้าที่ฝ่ายอุปกรณ์ ผู้ทำสัญญาร้านแผงลอย และผู้จัดกิจกรรม..."
1009005-138 = "พวกคุณเป็นนักสะกดรอยตามเหรอคะ?!"
1009005-139 = "ไม่ใช่สักหน่อย พวกเราเป็นปีศาจต่างหาก เรื่องงานเทศกาลที่จัดในเฮียกคิยาโคน่ะ ถ้าเป็นงานทั่วๆ ไปพวกเรารู้เกือบทั้งหมดแหละ..."
1009005-140 = "แต่จากนี้ไปอีกสักระยะหนึ่งเป็นช่วงที่ไม่มีงานเทศกาลเลยนี่? แต่ว่าทางร้านเฮียกคิยาโคก็เหมือนจะ#nเตรียมงานเทศกาลอะไรกันอยู่..."
1009005-141 = "ระ... เรื่องนั้น...! พวกคุณปีศาจอาจจะเข้าใจผิดไปเองก็ได้ค่ะ!"
1009005-142 = "ไม่หรอก~ ไม่มีทางเป็นอย่างนั้นไปได้หรอก~! ถึงพวกเราจะถูกมองว่าเป็นพวกตัวปัญหา!"
1009005-143 = "อื้อ! แต่ยังไงพวกเราก็เป็นปีศาจที่กล้าพูดได้ว่าจริงใจกับงานเทศกาลที่สุด!"
1009005-147 = "ฮึ่มมมมมมม...!"
1009005-150 = "..."
1009005-152 = "ถ้าฉันบอกว่าไม่มี ก็แปลว่าไม่มีสิคะ!"
1009005-154 = "หะ... หืม...? เราไปทำอะไรให้โกรธหรือเปล่า...?"
1009005-155 = "ทำไมทำหน้าแบบนั้นล่ะ...?!"
1009005-156 = "พวกเรา... กลับกันดีมั้ย?"
1009005-157 = "กะ... กลับดีกว่า! ของอร่อยๆ ก็ได้กินไปแล้ว! แค่นี้น่าจะพอแล้วละ!"
1009005-164 = "..."
1009005-168 = "ขอโทษ... นะคะ... คุณครู ฉันไม่คิดเลยค่ะว่าจะให้คุณครูได้เห็นด้านนี้ของฉัน..."
1009005-169 = "[s3] \"แต่ยังไงพวกปีศาจก็เป็นนักเรียน...\"\n[s4] \"คงอยากสนุกสนานกับงานเทศกาลน่ะ...\""
1009005-172 = "เราก็เลยไม่ควรตำหนิพวกนั้นจนเกินไปงั้นเหรอคะ...?"
1009005-173 = "เรื่องนั้น... มันก็จริงอย่างที่ว่าค่ะ…"
1009005-178 = "ตะ... แต่ว่าเรื่องนี้จะให้ปล่อยผ่านไปไม่ได้ค่ะ!"
1009005-179 = "ถ้าเป็นเรื่องการเตรียมงานเทศกาล... ฉันจะยอมให้ใครมาขัดขวางไม่ได้หรอกค่ะ!"
1009005-180 = "[ns5] \"แต่ไหนบอกว่าจะยังไม่มีงานเทศกาลไปสักระยะล่ะ...?\"\n[ns6] \"หรือว่าจะมีจัดงานเทศกาลอื่นอีกจริงๆ?\""
1009005-183 = "...!"
1009005-184 = "มะ... ไม่รู้สิคะ? เรื่องนั้นน่ะ คือว่า...!"
1009005-188 = "ไม่มีอะไรทั้งนั้นค่ะ!"
1009005-189 = "[ns] \"แต่ว่าพวกปีศาจ...\""
1009005-190 = "ก็บอกว่าไม่มีอะไรยังไงล่ะคะ! เรื่องนั้นช่างเถอะค่ะ คุณครูไม่มีอะไรที่อยากรับประทานเหรอคะ?!"
1009005-191 = "วันนี้ฉันจะเป็นเจ้ามือให้เป็นกรณีพิเศษเลย! บอกฉันได้ทุกอย่างเลยค่ะ!"
1009005-192 = "[ns] \"ตกลงแล้วเรื่องงานเทศกาล...\""
1009005-193 = "ระ... เราเลิกคุยเรื่องงานเทศกาลกันเถอะค่ะ!"
1009005-194 = "[s] \"ครูไม่เคยเห็นอุมิกะเป็นแบบนี้เวลาพูดถึงงานเทศกาลเลยนะ!\""
1009005-195 = "สงสัยฉันจะแปลกๆ ไปแล้วละค่ะ ฉันเองก็รู้สึกแบบนั้นเหมือนกันค่ะ~!"
1009005-199 = "(หลังจากนั้นคุณครูก็พยายามตะล่อมถามเรื่อง 'งานเทศกาล' จากอุมิกะ)"
1009005-200 = "(แต่ทุกครั้งที่เอ่ยถึงงานเทศกาล อุมิกะก็จะตระหนกและเอาแต่พูดกำกวมไม่หยุด...)"

[translation]
1009005-1 = "Children Who Ruin Festivals Must be Scolded!"
1009005-2 = "After receiving Umika's message, I arrived at Momoyodou."
1009005-7 = "[ns] \"Excuse me.\""
1009005-8 = "Huh? Is someone there?"
1009005-9 = "Who cares! Today, we're the customers!"
1009005-14 = "How exciting!"
1009005-17 = "Yeahhh!! This is awesome!"
1009005-21 = "[ns] \"Wh-What's going on?!\""
1009005-22 = "S-Sensei?! Why did you have to come now of all times?!"
1009005-23 = "I-I know I asked! And I really did hope you would come, but...!"
1009005-29 = "Seriously?! Mouryo?! You're really ticking me off!"
1009005-33 = "What are you saying?! We're here at Momoyodou as customers, remember?"
1009005-34 = "We even paid in advance!"
1009005-35 = "Ugh... I know that, and I know that the customer's always right..."
1009005-36 = "But that's a little hard to buy serving \"patrons\" like you!"
1009005-37 = "At this rate, Momoyodou's reputation will be ruined..."
1009005-38 = "[s1] \"Hmm... Momoyodou does provide a valuable service.\"\n[s2] \"But doesn't that mean customers should have respect for that service?\""
1009005-44 = "So you're saying...as a server, it is vital that I offer \"guidance\" to disrespectful customers?"
1009005-45 = "For if I failed to do so, it would hamper the service we provide, and disrupt the peaceful experiences of other customers?"
1009005-49 = "We can't have that! In that case..."
1009005-50 = "Mouryo! For Momoyodou, its traditions...and the sake of all future customers!"
1009005-54 = "With all my heart, let me \"teach\" you the full power of Momoyodou's hospitality!"
1009005-56 = "Huh? Wh-What are you going on about?"
1009005-57 = "I have a bad feeling about this..."
1009005-62 = "Please take your seats!"
1009005-68 = "Uh, uhh? What?!"
1009005-69 = "Huh! You can't force me into a chair!"
1009005-84 = "Now then. We have teacups, green tea, oolong, saucers, tissues, and napkins! Everything's ready! Is there anything else you need?!"
1009005-89 = "That was so fast! And somehow it was still perfect?"
1009005-90 = "Hmph! There's no wet towels!"
1009005-96 = "I figured you'd mention those. I was just preparing them!"
1009005-97 = "Isn't this too many?!"
1009005-98 = "Y-Yeah. Two should be enough?"
1009005-99 = "Seeing as you personally requested them, I trust you'll make use of them all!"
1009005-100 = "Also, taking items outside of Momoyodou is prohibited."
1009005-101 = "Is there anything else you need?"
1009005-105 = "Um...no, thank you."
1009005-107 = "In that case, I'll take your order! Our menu at Momoyodou includes—"
1009005-111 = "Umika quickly recited the entire Momoyodou menu with detailed descriptions of each item."
1009005-112 = "Whether Mouryo, or rather, any of the customers, fully understood her was another matter..."
1009005-114 = "Ugh. I can't understand any of this. It's giving me a headache..."
1009005-115 = "I can't place an order if I don't understand what they have..."
1009005-116 = "Oho, are you still confused? Let me start over from the beginning—"
1009005-120 = "No, no! That's not necessary! We'll just go ahead and order!"
1009005-121 = "More than that— Uh... We're sorry... We won't trouble you again..."
1009005-127 = "[ns] \"So you've learned to respect the staff and the establishment?\""
1009005-128 = "Yes..."
1009005-129 = "We got super excited about the festival happening here, and things got out of hand..."
1009005-134 = "[ns] \"Huh? There's a festival at Momoyodou?\""
1009005-135 = "Yeah, festival items started showing up three days ago, right?"
1009005-136 = "Plus, the merchant guild, equipment managers, street vendors, and event planners..."
1009005-137 = "All of them have been seen hanging around here."
1009005-138 = "Have you all been stalking them?"
1009005-139 = "No. We're Mouryo. We know about almost everything related to the festivals held at Hyakkiyako."
1009005-140 = "There weren't any festivals scheduled for a while. Then, we heard something was being planned at Momoyodou..."
1009005-141 = "N-No way! You Mouryo must have been misinformed!"
1009005-142 = "No way! That's not possible! We may have a bad reputation as troublemakers..."
1009005-143 = "But we take great pride in the festivals here at Hyakkiyako! It's part of being Mouryo!"
1009005-147 = "Ughhh!"
1009005-150 = "..."
1009005-152 = "When I say you're wrong, just admit that you're wrong!"
1009005-154 = "Huh? Did we hit a real nerve?"
1009005-155 = "Look at her face, what do you think?!"
1009005-156 = "...Should we leave?!"
1009005-157 = "Why not?! I think we've had our meal and our fun!"
1009005-164 = "..."
1009005-168 = "I'm sorry, Sensei. I didn't mean to show this side of myself..."
1009005-169 = "[s3] \"On the bright side, you learned something new.\"\n[s4] \"The Mouryo are just students who love festivals too.\""
1009005-172 = "I guess I was a little harsh..."
1009005-173 = "Okay, maybe a lot harsh, but..."
1009005-178 = "It just isn't right!"
1009005-179 = "My festival preparations shouldn't have to tolerate interruptions like that!"
1009005-180 = "[ns5] \"Didn't they say there wouldn't be any festivals for a while?\"\n[ns6] \"Are they really throwing another festival?\""
1009005-183 = "...!"
1009005-184 = "I mean... That's...um...!"
1009005-188 = "Never mind! Forget it!"
1009005-189 = "[ns] \"But Mouryo...\""
1009005-190 = "It's okay, really! By the way, Sensei! Is there anything you'd like to order?"
1009005-191 = "Today, it's my treat! Just let me know what you'd like!"
1009005-192 = "[ns] \"What about that festival?\""
1009005-193 = "Can we not talk about the festival right now?!"
1009005-194 = "[s] \"I've never heard you speak that way about a festival!\""
1009005-195 = "Even I can admit that this is out of character for me!"
1009005-199 = "Afterwards, I cautiously brought up the topic of \"festivals\" with Umika a few times, but..."
1009005-200 = "...she became flustered and stumbled over her words."

[translation]
1009005-1 = "妨礙慶典的孩子需要教訓！"
1009005-2 = "（收到海花的聯絡後，來到了百夜堂……）"
1009005-7 = "[ns]「打擾了～」"
1009005-8 = "嗯？是誰來了？"
1009005-9 = "無所謂！因為今天我們……是客人！"
1009005-14 = "好開心啊！"
1009005-17 = "咿啊啊啊啊啊吼！跑起來跑起來！真讚！"
1009005-21 = "[ns]「怎，怎麼了！？」"
1009005-22 = "咦咦！？老師！？你怎麼會在這裡……！"
1009005-23 = "當，當然聯絡老師的人確實是我沒錯……！希望老師能過來一趟的也是我……！"
1009005-29 = "唉，真是的！妖怪劇團！我真的會生氣哦！？"
1009005-33 = "什麼意思啊，百夜堂！#n我們現在可是客人耶？"
1009005-34 = "錢也已經付過了啊！"
1009005-35 = "是這樣沒錯……唔唔，雖然應該要盡力招待客人。"
1009005-36 = "但如果客人太胡鬧的話……！"
1009005-37 = "這樣下去……我們百夜堂的招牌……！"
1009005-38 = "[s1]「嗯……雖然百夜堂是提供服務的地方。」\n[s2]「但客人是不是也應該表現出相應的尊重呢？」"
1009005-44 = "所以……對不尊重我們的客人給予一些「引導」也是待客之道的其中一環吧……？"
1009005-45 = "而且如果不制止的話，會造成其他客人的麻煩……？"
1009005-49 = "說的也是……既然如此……！"
1009005-50 = "妖怪劇團！從現在開始，為了這個百夜堂，以及它所代表的傳統……#n還有最重要的，為了來到這裡的客人們！"
1009005-54 = "我將為你們展示，飽含我們百夜堂真心的「引導」和「接待」！"
1009005-56 = "嗯？什麼，你要做什麼……？"
1009005-57 = "感覺不太妙……？"
1009005-62 = "客人，請入座！"
1009005-68 = "呃，啊？什麼……？"
1009005-69 = "哇啊！？被壓到位置上了……？"
1009005-84 = "茶杯、綠茶、烏龍茶、小碟子、面紙、餐巾紙！都準備好了！請問還需要什麼嗎！？"
1009005-89 = "動作超快！而且還一點都不凌亂……？"
1009005-90 = "哼！怎麼沒有濕紙巾啊！"
1009005-96 = "我知道客人會這麼說，所以也準備了！"
1009005-97 = "會不會太多了！？"
1009005-98 = "那，那個，給我們兩個就可以了……？"
1009005-99 = "因為這是您的親自要求，我相信您能把它們全部用在需要的地方，客人！"
1009005-100 = "另外提醒您，如果把這些濕紙巾帶出百夜堂，就相當於偷竊哦。"
1009005-101 = "還有需要什麼嗎？"
1009005-105 = "沒……沒，沒有。"
1009005-107 = "那麼就開始點餐吧！#n我們百夜堂的餐點有──"
1009005-111 = "（海花連珠炮般地把百夜堂的所有餐點，以及詳細介紹都說了出來）"
1009005-112 = "（而妖怪劇團……不，客人們有沒有正確理解又是另一回事了）"
1009005-114 = "呃，一個都沒聽懂。感覺頭好暈……"
1009005-115 = "要知道什麼是什麼才能點餐啊……"
1009005-116 = "啊哈，看來客人還沒完全理解呢？#n那麼我再從頭開始說明一次──"
1009005-120 = "不，不用了！沒關係！我們會想辦法點餐……"
1009005-121 = "還有，那個，對不起。#n是我們錯了……之後不會再那樣了……"
1009005-127 = "[ns]「兩位搗蛋鬼客人有在反省了嗎？」"
1009005-128 = "是……"
1009005-129 = "可是一想到這裡要舉辦慶典，不知不覺就興奮了起來……"
1009005-134 = "[ns]「嗯？在百夜堂舉辦慶典？」"
1009005-135 = "對啊，慶典需要的材料三天前就運到這裡了吧？"
1009005-136 = "而且商會和器材負責人、攤位出資簽約者和慶典規劃負責人……"
1009005-137 = "也全都來過這裡……"
1009005-138 = "你們是跟蹤狂嗎！？"
1009005-139 = "不是，我們畢竟是妖怪劇團嘛。#n要在百鬼夜行舉行的慶典，幾乎都會知道……"
1009005-140 = "這段期間不是正好沒有慶典嗎？#n結果卻聽說百夜堂正在準備慶典，所以才……"
1009005-141 = "那，那是你們搞錯了吧！妖怪劇團！"
1009005-142 = "不可能～絕對不可能～！雖然所有人都說我們是搗蛋鬼！"
1009005-143 = "不過只要談到百鬼夜行的慶典，我們絕對是百分百的認真！#n我們可是妖怪劇團啊！"
1009005-147 = "唔，唔唔唔唔唔唔唔……！"
1009005-150 = "……"
1009005-152 = "我說沒有就是沒有！"
1009005-154 = "呃，咦？我們……好像惹毛他了……？"
1009005-155 = "表情不太妙啊……！？"
1009005-156 = "……我，我們走吧？"
1009005-157 = "好，好啊！？反正東西已經吃完，而且也玩夠了！"
1009005-164 = "……"
1009005-168 = "對不起，老師。#n沒想到會讓你看到這副模樣……"
1009005-169 = "[s3]「不過從某種意義上來說……」\n[s4]「妖怪劇團也是想享受慶典的學生呢……」"
1009005-172 = "好像也沒必要那麼責怪他們……？"
1009005-173 = "是，是這樣沒錯，但是……"
1009005-178 = "那，那樣也是不行的！"
1009005-179 = "這場慶典的準備……不能受到任何人的妨礙！"
1009005-180 = "[ns5]「可是他們剛才不是說暫時沒有慶典嗎……？」\n[ns6]「難道真的有在籌備別的慶典？」"
1009005-183 = "……！"
1009005-184 = "我，我不太清楚耶？那個，就是……！"
1009005-188 = "果然還是什麼都沒有！"
1009005-189 = "[ns]「不過妖怪劇團……」"
1009005-190 = "就說什麼都沒有嘛！#n話說老師！你有什麼想吃的嗎！？"
1009005-191 = "今天就特別讓我來請客吧！#n想吃什麼儘管說！"
1009005-192 = "[ns]「所以說慶典……」"
1009005-193 = "慶，慶典的話題已經結束了哦！？"
1009005-194 = "[s]「我還是第一次聽到海花這樣說關於慶典的事！」"
1009005-195 = "我自己也承認有點奇怪～！"
1009005-199 = "（之後小心翼翼地向海花提起了關於「慶典」的話題）"
1009005-200 = "（可是海花卻總是驚慌失措、拚命想蒙混過去……）"

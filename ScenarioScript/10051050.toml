[translation]
10051050-1 = "第5話;忍者的另一面"
10051050-2 = "時裝秀會場後院樹林"
10051050-3 = "不行……這次的秀已經完蛋了……！"
10051050-4 = "那個……衣服不是找回來了嗎？"
10051050-5 = "雖然是這樣沒錯，但是……"
10051050-7 = "我一點都不感謝！！"
10051050-8 = "噫噫！"
10051050-9 = "你們有長眼睛就睜開來看清楚！#n要穿我衣服的模特兒昏倒了！"
10051050-10 = "都是你們的戰鬥害的！"
10051050-15 = "不是，那能算是我們的錯嗎？"
10051050-16 = "難道……現在倒在這裡的這位……"
10051050-17 = "是今天要上台走秀的模特兒嗎！？"
10051050-18 = "而且他到底為什麼會倒在這裡啊！？"
10051050-19 = "[s]「大概是被捲入戰鬥了吧……」"
10051050-20 = "咦，打架的明明是我們和頭盔團，這位為什麼會突然……？"
10051050-21 = "請看這邊，部長！#n他的手伸向了放包包的地方！"
10051050-22 = "這就代表他在完全失去意識之前，都在衝向裝著衣服的包包……！"
10051050-23 = "肯定是為了搶回包包而闖入戰鬥，結果就被流彈給波及了！忍忍！"
10051050-24 = "原來如此，這樣確實就說得通了……！"
10051050-25 = "是，是個很合理的推論……！"
10051050-26 = "做得漂亮！是場很有忍者風範的推理哦，伊樹菜！"
10051050-27 = "都這種時候了還在瞎推理什麼啊！#n很有忍者風範又是什麼意思！？"
10051050-28 = "總之……好了！快點起來！你可是這場時裝秀的主角啊！#n給我起來！快起來啊！"
10051050-29 = "那個……麻煩借過一下。#n從狀態來看，無論你怎麼搖他都不會醒過來的。"
10051050-30 = "什麼！？"
10051050-31 = "是腦震盪。請看，他的下巴和後腦勺有被流彈直接擊中的痕跡。"
10051050-32 = "就算強行把他叫醒，恐怕在幾個小時內也很難控制自己的身體。"
10051050-33 = "怎麼會這樣……！"
10051050-37 = "所以就算把他叫醒……也沒辦法走台步嗎？"
10051050-38 = "你是認真想把患者送上伸展台嗎？"
10051050-39 = "先告訴我到底行不行就好。"
10051050-40 = "……應該會搖晃得非常嚴重才對。"
10051050-41 = "況且為了他的健康著想，無論能不能上台都必須暫時靜養才行。"
10051050-42 = "唉，這樣啊……"
10051050-43 = "好吧，既然專家都這麼說了，應該就是這樣沒錯。"
10051050-44 = "那麼患者就交給我們來移送了。"
10051050-48 = "可是……我的秀該怎麼辦才好……啊啊……"
10051050-49 = "……算了，現在也沒辦法了。"
10051050-50 = "你們幾個。"
10051050-51 = "咦！？"
10051050-52 = "哼，總之辛苦你們了。"
10051050-53 = "……要是射擊技術能再好一點就更好了。"
10051050-54 = "那我先回去了。"
10051050-59 = "時裝秀休息室"
10051050-60 = "唉……"
10051050-61 = "唉唉唉……"
10051050-62 = "怎麼辦……到底該找誰來穿我的作品……"
10051050-63 = "大師，既然情況緊急，不如就在現場找代班的模特兒怎麼樣呢？"
10051050-64 = "這話說得很好。"
10051050-65 = "不過你有看到這件衣服嗎？看到之後有什麼想法？"
10051050-66 = "那個……很美……？"
10051050-67 = "不對，我要你看的是尺寸，尺寸！看看這個大而美的尺寸！"
10051050-68 = "我的這件衣服，是設計給身高180cm的模特兒穿的！"
10051050-69 = "然而現在這間休息室裡面，有身高條件符合的模特兒嗎？"
10051050-70 = "沒，沒有！"
10051050-71 = "對嘛！身高達到180cm的人可是很稀有的！#n一時之間要去哪裡找這種人……"
10051050-75 = "……不，仔細想想還有那個人在啊。"
10051050-76 = "那個人？"
10051050-77 = "大野月夜。"
10051050-78 = "不好意思，請問那是誰啊？"
10051050-79 = "你這個笨蛋！就是在正門看到的那個警衛啊！#n而且剛才他明明也在戰鬥現場吧！？"
10051050-80 = "你身為時裝秀的工作人員，居然連警衛的名字都不記得嗎？"
10051050-81 = "通常都不會記吧……？"
10051050-82 = "哎，不跟你說這些了！總之得把他找過來才行。"
10051050-83 = "什麼！？意思是要請警衛來當模特兒嗎！？"
10051050-84 = "沒錯，我一眼就看出了那孩子的天賦。#n不只是身高而已，他那獨特的氣場和均衡的身體比例……"
10051050-85 = "立刻帶他過來見我。現在馬上。"
10051050-86 = "真，真的要嗎！？"
10051050-91 = "我現在看起來像是在跟你開玩笑嗎？"
10051050-92 = "知，知道了！！"
10051050-97 = "時裝秀會場後院樹林"
10051050-98 = "咦咦！？要找我當模特兒！？"
10051050-99 = "是的，已經沒時間了！ "
10051050-100 = "可，可可，可是我從來沒有接受過模特兒的訓練呀……！？#n像我這種人怎麼可能當模特兒呢！？"
10051050-101 = "我也是這樣想的！#n只是Shine Cat設計師說無論如何都要帶您過去，我實在別無他法……！"
10051050-102 = "嗚，嗚噫噫……！"
10051050-103 = "就拜託您這一次吧……#n而且設計師在價格方面一向很公道，報酬肯定也會給到位的！"
10051050-105 = "嗚嗚……可，可是……"
10051050-106 = "您知道休息室在哪裡吧？#n請先到那裡等著，我處理完其他事之後馬上過去！"
10051050-111 = "嗚嗚嗚……部長，我，我該怎麼辦才好？"
10051050-112 = "我哪有辦法擔任模特兒呢？#n而且還是規模這麼大的秀……？"
10051050-113 = "像我這種只有個頭大的女孩子，大家肯定不會喜歡……！"
10051050-114 = "要是引起全場的噓聲怎麼辦……！"
10051050-115 = "我一定會陷入絕望跟沮喪……#n整天把自己關在小房間裡看柴犬汪藏導演的作品，就這樣慢慢枯萎……！"
10051050-116 = "不，不會那樣的。"
10051050-120 = "月夜，還記得我第一次見到你的時候說了什麼嗎？"
10051050-121 = "……說我個子超大的？"
10051050-122 = "那，那句話確實也有說過啦！"
10051050-123 = "不過我也說過──正因如此，你作為忍者才是最強的吧！"
10051050-124 = "……！"
10051050-125 = "對最強的忍者來說，這點難關根本不算什麼！"
10051050-126 = "部長……！"
10051050-127 = "而且還是業界最頂尖的設計師特別指名要你耶！"
10051050-128 = "所以就抬頭挺胸地去吧，月夜！"
10051050-129 = "就算事情真的稍微不如預期……"
10051050-130 = "那也全都是主辦方的錯！#n這句話可是收錄在老師大人的語錄集裡的哦！"
10051050-131 = "[s1]「我有說過那種話嗎！？」\n[s2]「真的有我的語錄集嗎！？」"
10051050-134 = "呼……"
10051050-138 = "……好吧，我會試試看的！"
10051050-140 = "時裝秀休息室"
10051050-142 = "嗯？是誰？"
10051050-148 = "你來啦。已經決定好了嗎？"
10051050-149 = "……是！"
10051050-150 = "你確實具備天賦，然而這條路並不好走。"
10051050-151 = "不過我能向你保證──只要你能將這條路走到最後，榮耀就將會屬於你。"
10051050-152 = "我，我並沒有想要那種東西……！"
10051050-153 = "話說，你現在穿的那身衣服……是忍者的服裝嗎？"
10051050-154 = "雖然我不知道忍者到底是什麼，不過你現在該向它告別了。"
10051050-155 = "今天會因為你而綻放光彩的不是那種衣服，而是我的作品。"
10051050-156 = "來，這個給你，快去換上吧。#n更衣室在那邊。"
10051050-157 = "那個……"
10051050-158 = "有什麼事嗎？#n已經沒時間了，麻煩長話短說。"
10051050-159 = "就是……當模特兒的工作，只到今天為止……"
10051050-160 = "等今天的事情結束之後，我就要回到忍術研究部了……！"
10051050-161 = "那，那我先去換衣服了！"
10051050-166 = "這樣啊……"
10051050-168 = "……不過那是否能由得了你呢？"
10051050-170 = "時裝秀主舞台"
10051050-172 = "呼……距離時裝秀開始真的沒剩多少時間了呢。"
10051050-173 = "月夜閣下會以什麼樣的姿態登上伸展台呢？"
10051050-174 = "伊樹菜非常期待！"
10051050-175 = "哦哦，好像要開始了！"
10051050-191 = "……部長。"
10051050-192 = "……嗯？"
10051050-193 = "我們……剛才看到了什麼？"
10051050-194 = "唔嗯……"
10051050-196 = "……藝術？"

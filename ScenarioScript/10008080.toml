[translation]
10008080-1 = "第8話;千鈞一髮（２）"
10008080-8 = "[ns]「……數量真多呢。」"
10008080-9 = "唔嗯～這樣下去好像沒完沒了……"
10008080-10 = "亞瑠醬，該怎麼辦？"
10008080-11 = "亞，亞瑠大人……！"
10008080-12 = "等一下，數量也太多了吧！？"
10008080-13 = "該怎麼做才好啊！？"
10008080-15 = "哈哈！"
10008080-16 = "可別小看我們「黑龜組」啊。"
10008080-26 = "噫呀啊啊！？"
10008080-27 = "是不是有點不妙啊！？"
10008080-28 = "……"
10008080-36 = "呼呣，看來差不多要結束了呢。"
10008080-37 = "老大，大事不好了！凱坦澤的人不知道在什麼時候全都逃走了！"
10008080-38 = "……隨他們去吧。反正賽錢箱也拿回來了，無所謂。"
10008080-39 = "而且，現在應該還有一堆蠢蛋以為「凱坦澤拿著賽錢箱」，所以正緊追著他們吧。"
10008080-40 = "我們只要在這段期間內完成計畫就好。#n剩下的就是把倒在這裡的蠢蛋給……"
10008080-41 = "[s]「……就算你這麼做，也很快就會被發現的。」"
10008080-42 = "……是呢，總有一天會被發現的吧。#n但是我只要在那之前逃跑就行了。你不這麼覺得嗎？"
10008080-43 = "就算身分在這裡曝光，也只要到其他地方故技重施就好。"
10008080-44 = "接下來去哪裡好呢？百鬼夜行？狂獵？"
10008080-45 = "滿是天真大小姐的三一好像也不錯呢？"
10008080-47 = "咯呵呵，還挺有自信的嘛？"
10008080-48 = "那當然。畢竟天底下到處都是像你們一樣的那種，#n會相信社群網站上說的「實現願望的地方」的笨蛋啊。"
10008080-49 = "……！"
10008080-50 = "只要這些笨蛋沒有減少，根本就沒什麼好怕的。哈哈哈哈！"
10008080-51 = "老大，賽錢箱已經放到車上了！"
10008080-52 = "那麼，我們走吧。得在日出之前處理完各種事情才行。"
10008080-53 = "等，等等！"
10008080-54 = "那麼善後工作就交給你們了。"
10008080-55 = "再會。要恨就恨一聽到好處就輕易上鉤的你們自己吧。"
10008080-62 = "這是命令，你們可別恨我。"
10008080-63 = "都怪你們得意忘形涉入太深了！"
10008080-64 = "接下來該怎麼料理你們呢……！"
10008080-66 = "怎，怎怎怎怎麼辦才好……！？"
10008080-67 = "啊哈啊！難道這就是陷入危機的感覺？"
10008080-68 = "老，老師……！"
10008080-75 = "[ns1]「……！」\n[ns2]「大家冷靜，沒事的。」"
10008080-76 = "……老師？你在說什──"
10008080-77 = "……老師？你在說什──"
10008080-82 = "什，什麼人！？"
10008080-83 = "問我是什麼人啊……"
10008080-85 = "這個聲音是……！"
10008080-90 = "硬要說的話……是來解救重要的後輩和其他人的「英雄」吧～？"
10008080-91 = "[s]「星野！」"
10008080-92 = "年初就能見到老師，大叔我也很高興哦～"
10008080-96 = "那麼在拜年之前……先來擊退礙事的人吧？"

[translation]
10008080-1 = "ตอนที่ 8;สถานการณ์คับขัน! 2"
10008080-8 = "[ns] \"แห่กันมาไม่หยุดเลยนะ\""
10008080-9 = "หืม~ ถ้าเป็นแบบนี้คงไม่มีที่สิ้นสุดแน่ๆ"
10008080-10 = "อารุจัง? จะทำยังไงต่อดี?"
10008080-11 = "ทะ...ท่านอารุ...!"
10008080-12 = "แห่กันมาขนาดนี้... มะ... ไม่เยอะเกินไปรึยังไง...?"
10008080-13 = "คิดจะถล่มกันให้ราบคาบเลยรึยังไงกันเนี่ย"
10008080-15 = "ฮ่าฮ่า!"
10008080-16 = "สำหรับพวกที่คุมโลกเบื้องหลังของคิโวทอสอย่างพวกเราน่ะ แค่นี้ไม่เท่าไรหรอกครับ!"
10008080-26 = "อะ...อ๊ายยย!!"
10008080-27 = "ตะ...ต้านไม่ไหวแล้วละ!"
10008080-28 = "อึ่ก!"
10008080-36 = "อืม... ทางนี้เหมือนจะจัดการเรียบร้อยแล้วสินะครับ"
10008080-37 = "บอส! เกิดเรื่องใหญ่แล้วครับ! ตอนที่เราชุลมุนอยู่กับการต่อสู้พวกไคเทนเจอร์ได้หลบหนีไปหมดแล้วครับ!"
10008080-38 = "อา~ ถ้างั้นก็ปล่อยไปเถอะ ยังไงพวกเราก็ได้ตู้บริจาคกลับมาแล้ว..."
10008080-39 = "แล้วอีกอย่าง... ยังมีพวกโง่เง่าที่คิดว่าตู้บริจาคยังอยู่ที่พวกไคเทนเจอร์อยู่ ปล่อยให้พวกโง่พวกนั้น#nไล่ตามไปจัดการพวกไคเทนเจอร์เองแล้วกัน"
10008080-40 = "ระหว่างนั้นพวกเราก็จัดการธุระของเราให้เสร็จก็พอ เหลือก็แค่จัดการกับพวกคนที่หมดสติอยู่ตรงนี้#nก็เสร็จเรียบร้อยแล้วล่ะ..."
10008080-41 = "[s] \"อีกไม่นานพวกแกต้องโดนจับได้แน่ๆ\""
10008080-42 = "ฮ่ะฮ่ะฮ่า! สักวันพวกเราอาจถูกจับได้ตามที่คุณพูด แต่ว่า... แค่หนีไปก่อนที่จะถูกจับได้ก็พอแล้ว#nไม่ใช่เหรอครับ?"
10008080-43 = "ถึงจะถูกเปิดเผยตัวตนที่นี่ไปแล้ว แต่พวกเราก็สามารถไปดำเนินการต่อที่เขตอื่นได้อยู่ดีครับ"
10008080-44 = "ต่อไปจะไปที่ไหนดีนะ...? เฮียกคิยาโค หรือที่ไวลด์ฮันต์ดีนะ?"
10008080-45 = "อ่ะฮ่า... ที่เขตทรีนิตี้ที่มีแต่เด็กน่ารักสดใสอยู่เต็มไปหมดก็ดีนะครับ"
10008080-47 = "ว้าว~ มั่นหน้าจังเลยนะ?"
10008080-48 = "เพราะในโลกนี้ก็ยังมีพวกหน้าโง่ที่หลงเชื่อคำโฆษณาอย่าง \"ขอพรสมหวังทุกประการ\" ในโซเชียลอยู่#nอีกเยอะแยะน่ะสิ "
10008080-49 = "...!!"
10008080-50 = "ธุรกิจแบบนี้น่ะล้มไม่ได้ง่ายๆ หรอกนะครับ จะเริ่มใหม่เมื่อไรก็ได้! ฮ่ะฮ่ะฮ่า!\n"
10008080-51 = "บอส! พวกเราย้ายตู้บริจาคขึ้นรถเรียบร้อยแล้วครับ!"
10008080-52 = "ถ้างั้นพวกเรากลับกันเลยดีไหมครับ? รีบๆ จัดการงานให้เสร็จแล้วกลับไปก่อนที่แสงอาทิตย์แรก#nของวันปีใหม่จะมาเยือนกันเถอะครับ"
10008080-53 = "ดะ...เดี๋ยวก่อน! รอก่อนเซ่...!"
10008080-54 = "ถ้าอย่างนั้น... สมาชิกทุกๆ คน รบกวนจัดการเรื่องเล็กๆ น่ารำคาญพวกนี้แทนผมด้วยนะครับ"
10008080-55 = "แล้วก็พวกคุณ... หวังว่าพวกคุณจะเสียใจที่เลือกจุดจบแบบนี้กันนะครับ"
10008080-62 = "หึหึหึ ได้ยินที่บอสพูดแล้วใช่มั้ย?"
10008080-63 = "กล้าดียังไงถึงมายุ่งกับของของพวกเรา!"
10008080-64 = "เอาละ ถ้างั้นก็มาจัดการกันเลยดีมั้ย!"
10008080-66 = "ตะ...ตอนนี้จะทำยังไงกันดี?!"
10008080-67 = "ฮะฮะฮะ ความรู้สึกแบบนี้~ สถานการณ์คับขันแล้วละ!"
10008080-68 = "อะ...อึก...! คุณครู...!"
10008080-75 = "[ns1] \".....!!\"\n[ns2] \"ทุกคนใจเย็นก่อน ไม่เป็นไร\""
10008080-76 = "ว่าไงนะ? สถานการณ์แบบนี้จะยังมาพูดแบบนี้อีก..."
10008080-77 = "ว่าไงนะ? สถานการณ์แบบนี้จะยังมาพูดแบบนี้อีก…"
10008080-82 = "ธะ...เธอเป็นใครน่ะ?!"
10008080-83 = "อืม~ ถามว่าฉันเป็นใครงั้นเหรอ~?"
10008080-85 = "เสียงนี้มัน...!"
10008080-90 = "อา~ ฉันก็คงเป็นฮีโร่ที่โผล่มาช่วยรุ่นน้องสุดที่รักกับพวกคนอื่นๆ... ละมั้ง?"
10008080-91 = "[s] \"โฮชิโนะ!\""
10008080-92 = "เสียงต้อนรับที่สดใสของคุณครู~ ตาลุงคนนี้ชักดีใจหน่อยๆ แล้วแฮะ~ "
10008080-96 = "เอาละ ถ้างั้นก็เริ่มจากจัดการพวกปลาซิวปลาสร้อยนี่ก่อนแล้วกัน~"

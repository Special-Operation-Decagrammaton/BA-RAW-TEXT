[translation]
10008080-1 = "Episode 8;In a Pinch! Part 2"
10008080-8 = "[ns] \"They just keep coming.\""
10008080-9 = "There's no end to them."
10008080-10 = "What should we do, Aru?"
10008080-11 = "A-Aru!"
10008080-12 = "D-Don't look at me! There's way too many of them!"
10008080-13 = "We're completely outnumbered!"
10008080-15 = "Haha!"
10008080-16 = "This will teach you to undermine the rulers of Kivotos' underworld,#nthe Kurokame Gang!"
10008080-26 = "Wh-What the...?!"
10008080-27 = "We aren't exactly equipped for this!"
10008080-28 = "*sigh*"
10008080-36 = "Hmph. That should just about do it."
10008080-37 = "Big trouble, Boss! The Kaitengers managed to get away while we weren't looking!"
10008080-38 = "That doesn't matter. We have what we came for: the offering box."
10008080-39 = "Actually, this works to our advantage. All those fools who still think they have the box will continue chasing them now."
10008080-40 = "We can walk away from this mess without a care in the world. Just as soon as we figure out what to do with this trash we littered the streets with."
10008080-41 = "[s] \"You won't get away with this.\""
10008080-42 = "Haha! Perhaps not. It's only a matter of time before someone pieces things together, but so what? We'll be long gone by then."
10008080-43 = "Even if we're exposed, we'll simply pack up shop and do the same in another district under a new guise."
10008080-44 = "Where shall we go next? Hyakkiyako? Or perhaps Wildhunt?"
10008080-45 = "A-ha—I know. Trinity is teeming with naive and wealthy girls."
10008080-47 = "You're just brimming with confidence, aren't you?"
10008080-48 = "Should I not be? The world has no shortage of fools who believe everything they read online. \"If you wish it, you'll get it.\" Seriously now. "
10008080-49 = "...!"
10008080-50 = "Our business will prosper forever and ever so long as there are easy marks for us to target!"
10008080-51 = "We're done loading the offering box into our getaway car, Boss!"
10008080-52 = "Let's be off, then. There's still much we have to do before sunrise. "
10008080-53 = "W-Wait!"
10008080-54 = "I'll let the others handle it from here."
10008080-55 = "You kids have no one to blame but yourselves for getting involved with our business."
10008080-62 = "Heh. You heard what the boss said."
10008080-63 = "This is what you get for sticking your noses where they don't belong!"
10008080-64 = "We're gonna enjoy this."
10008080-66 = "Wh-What are we gonna do?!"
10008080-67 = "Haha. Looks like we're in a pinch!"
10008080-68 = "What do we do, Sensei...?"
10008080-75 = "[ns1] \"We do nothing!\"\n[ns2] \"Everyone, calm down. It's okay.\""
10008080-76 = "How can you say that right now?"
10008080-77 = "How can you say that right now?"
10008080-82 = "Wh-Who's there?!"
10008080-83 = "Gee. I wonder..."
10008080-85 = "I know that voice!"
10008080-90 = "I guess you could say I'm...a hero here to save her underclassmen and her friends?"
10008080-91 = "[s] \"Hoshino!\""
10008080-92 = "Hey, Sensei. It's been ages. Here's to another year, am I right? "
10008080-96 = "Anyway. What do you say we take care of these whippersnappers before we catch up?"

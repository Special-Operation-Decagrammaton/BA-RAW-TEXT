[translation]
84300300200-5 = "I've assessed the situation, Yurizono Seia."
84300300200-6 = "Thankfully, I've concluded there's no reason to be wary of you."
84300300200-7 = "In fact...yes, we should apologize for getting you involved with an internal Millennium case."
84300300200-8 = "No, I should apologize for intruding into your business."
84300300200-9 = "That said, my suspicions were apparently justified."
84300300200-10 = "Have you let Seminar know? I think we ought to tell them immediately."
84300300200-11 = "Normally, we would...but things are complicated at the moment."
84300300200-12 = "We don't know exactly what they are up to. We only know that whatever they're preparing is something big."
84300300200-13 = "If we go to Seminar with only that, they'll stop the Millennium Expo. And that's not what I want."
84300300200-14 = "I understand the sentiment, but there's no helping it. There's nothing else we can..."
84300300200-19 = "...I see."
84300300200-20 = "That's how it is."
84300300200-21 = "That's why you were hiding back with Mikamo Neru, trying to resolve the issue from the shadows."
84300300200-22 = "Tsukatsuki Rio. You're living up to your reputation."
84300300200-23 = "The Millennium Expo is one of our school's most important events. Whatever it takes and whatever they're planning, we have to save it."
84300300200-24 = "Now, we've spotted suspicious data packets from the Expo's preparation period. We need to figure out what that data is."
84300300200-25 = "We don't even know what they want yet..."
84300300200-27 = "...Wait a minute."
84300300200-28 = "Neru?"
84300300200-29 = "WE don't know, but SHE was listening in before we got there."
84300300200-30 = "So you spotted them first, didn't you? And you tailed them, like you said. You must have heard something."
84300300200-32 = "Astute point."
84300300200-33 = "Yes, indeed, I did hear a bit of their plan."
84300300200-34 = "That's good news. Would you mind sharing with us?"
84300300200-35 = "Of course..."
84300300200-39 = "...for a price."
84300300200-40 = "What?"
84300300200-42 = "What?"
84300300200-43 = "I don't think you get what's at stake here. Maybe we were being too nice..."
84300300200-44 = "Back off, Neru. She's with the Trinity Tea Party. If anything happens to her, this situation escalates, to say the least."
84300300200-45 = "So?"
84300300200-46 = "You have to ask?"
84300300200-47 = "...Let's hear her out, before anything else."
84300300200-48 = "If it's money she's after, or some kind of trade between the schools, as long as it's reasonable, I can help make it happen."
84300300200-49 = "We're just going to let her push us around?"
84300300200-50 = "I didn't say that. I'm just pointing out we shouldn't make any decisions until we pin down the variables."
84300300200-51 = "So, Yurizono Seia, what do you want?"
84300300200-53 = "You're more agreeable than I thought. Much appreciated."
84300300200-54 = "I don't want money, or anything between our schools. This is a personal issue, and it's very closely connected to this case."
84300300200-58 = "What I want...is to join your operation."
84300300200-63 = "You... What?"
84300300200-64 = "What are you talking about?"
84300300200-65 = "I don't quite understand. You want to cooperate with us to solve this case?"
84300300200-66 = "For strictly personal reasons, which I see no need to divulge, yes."
84300300200-68 = "What are you babbling about?"
84300300200-69 = "Rio, we don't have to listen to this. Let me walk her out of here and drop her off someplace."
84300300200-71 = "And then what, Neru? Supposing she tells someone else what they're up to, or what WE'RE up to? What then?"
84300300200-72 = "Besides, she knows more about our targets than we do. It would be illogical to dismiss that."
84300300200-73 = "Fine, then I'll make her talk..."
84300300200-77 = "Yurizono Seia."
84300300200-78 = "...There's a debt I have yet to repay."
84300300200-82 = "All right. You have my permission to join the operation, on the condition that you follow my orders no matter what."
84300300200-88 = "Say what?"
84300300200-89 = "It's fine, Neru. We can trust her. She won't do anything to put us at risk."
84300300200-90 = "Hm?"
84300300200-91 = "...Hah."
84300300200-92 = "Wow. Did you actually say the word \"trust\"? Are you finally growing up?"
84300300200-93 = "She IS trustworthy, Neru, and I want you to understand that."
84300300200-94 = "Hm..."
84300300200-95 = "Well, whatever you say. But I'm not babysitting her. And I don't want her getting in my way."
84300300200-96 = "Don't worry. You and she will have two completely different roles."
84300300200-97 = "Unlike us, she can walk around the Expo hall — in other words, out in the open. No one will look twice at her, so she can safely gather plenty of information that way."
84300300200-98 = "Seia, since you were invited to the event in the first place, scout it out, and report anything suspicious."
84300300200-99 = "Meanwhile, Neru and I will search the Data Center and other similar sources, seeing what we can find below the surface."
84300300200-100 = "A two-pronged attack. Do we have an agreement?"
84300300200-105 = "..."
84300300200-106 = "What, you got a problem? Sorry if your job's too boring."
84300300200-107 = "It's not like we're going to be having a picnic without you."
84300300200-108 = "No, you're right, it's the best course of action. I gave you a heavy demand, and you heard me out and agreed to it. Thank you."
84300300200-110 = "All right. That's settled. Now for your side of the bargain."
84300300200-111 = "What did you hear while you were hiding?"
84300300200-112 = "I didn't hear their names, or very many details..."
84300300200-113 = "But I did clearly hear what they want."
84300300200-114 = "And that's..."
84300300200-115 = "..."
84300300200-116 = "..."
84300300200-121 = "...to cause \"the Catastrophe of the Millennium Expo.\""

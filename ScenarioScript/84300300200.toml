[translation]
84300300200-5 = "ฉันเข้าใจสถานการณ์แล้ว ยูริโซโนะ เซอา"
84300300200-6 = "โชคดีที่เราไม่มีเหตุผลให้ต้องระแวดระวังคุณ"
84300300200-7 = "แต่กลายเป็นว่า... ใช่แล้วละ ฉันอยากขอโทษที่ทำให้ต้องเข้ามาข้องเกี่ยวกับเรื่องภายในของ#nมิลเลเนียมมากกว่า"
84300300200-8 = "ไม่หรอกค่ะ ฉันต่างหากที่ต้องขอโทษที่พฤติกรรมของฉันทำให้พวกคุณเดือดร้อนค่ะ"
84300300200-9 = "แต่ว่าคนพวกนั้น... เหมือนกำลังทำอะไรน่าสงสัยอยู่จริงๆ นะคะ"
84300300200-10 = "ได้แจ้งทางเซมิน่าหรือยังคะ? ฉันคิดว่าต้องรายงานเรื่องนี้ในทันทีนะคะ"
84300300200-11 = "ถ้าเป็นปกติก็คงทำอย่างนั้นไปแล้วละ... แต่ตอนนี้สถานการณ์มันค่อนข้างซับซ้อน"
84300300200-12 = "เรายังไม่รู้อย่างแน่ชัดว่าทางนั้นพยายามทำอะไรอยู่กันแน่ เท่าที่รู้ก็แค่การเตรียมงานของทางนั้นมี#nขอบเขตที่กว้างมาก"
84300300200-13 = "ถ้าบอกความจริงนี้ไป ทางเซมิน่าก็คงระงับการจัดงานมิลเลเนียม เอ็กซ์โป แต่นั่นไม่ใช่สิ่งที่ฉันต้องการน่ะ"
84300300200-14 = "ฉันก็เข้าใจความรู้สึกนะคะ แต่ถึงอย่างนั้นฉันว่ามันก็ช่วยไม่ได้ จะมีวิธีอื่นมั้ยนะ..."
84300300200-19 = "อืม..."
84300300200-20 = "ก็เลยเป็นอย่างนี้สินะคะ"
84300300200-21 = "เพราะอย่างนี้ คุณก็เลยซ่อนตัวอยู่ที่นี่ และพยายามจะสืบสวนและคลี่คลายเรื่องนี้อย่างลับๆ กับมิคาโมะ เนรุ"
84300300200-22 = "สึคัตสึกิ ริโอะ คุณยังคงมีท่าทีแบบนั้นอยู่..."
84300300200-23 = "มิลเลเนียม เอ็กซ์โปเป็นหนึ่งในงานที่สำคัญที่สุดของโรงเรียนเรา ต่อให้ต้องทำอะไรที่ผิดวิสัยไปบ้าง แต่ฉันก็ปล่อยให้งานนั้นถูกทำลายหรือถูกระงับไปไม่ได้"
84300300200-24 = "แต่ระหว่างเตรียมงาน ฉันก็ค้นพบข้อมูลที่น่าสงสัยจำนวนหนึ่ง และหน้าที่ของเราก็คือต้องรู้ให้ได้ว่ามัน#nคืออะไร"
84300300200-25 = "แม้ตอนนี้เราจะยังไม่รู้เลยว่าคนพวกนั้นต้องการอะไรก็เถอะ..."
84300300200-27 = "รอเดี๋ยวนะ..."
84300300200-28 = "เนรุ?"
84300300200-29 = "ใครจะไปรู้ล่ะ ก็ก่อนฉันจะไปช่วยออกมา ยัยนี่ซ่อนตัวอยู่ในกล่องแล้วได้ยินเรื่องที่คนพวกนั้นคุยกัน#nหมดเลย"
84300300200-30 = "ฉันคิดว่าคงไม่ใช่เรื่องบังเอิญหรอก ยัยนี่น่าจะตั้งใจลงไปที่นั่นเพื่อฟังคำพวกนั้นมากกว่า ใช่มั้ยล่ะ?"
84300300200-32 = "ฉลาดไม่เบาเลยนะคะ"
84300300200-33 = "ใช่แล้วค่ะ แล้วฉันก็ได้ยินเป้าหมายของพวกนั้นมาคร่าวๆ ด้วยค่ะ"
84300300200-34 = "งั้นก็เป็นเรื่องที่ดีนะ ถ้าไม่ว่าอะไร บอกฉันหน่อยได้มั้ยว่าเป้าหมายของทางนั้นคืออะไร?"
84300300200-35 = "ได้สิคะ"
84300300200-39 = "แต่ให้บอกเฉยๆ ไม่ได้หรอกค่ะ..."
84300300200-40 = "หืม?"
84300300200-42 = "ว่ายังไงนะ?"
84300300200-43 = "นี่ พอฉันพูดดีๆ ด้วย ก็เลยยังอ่านสถานการณ์ไม่ออกสินะ..."
84300300200-44 = "พอเถอะ เนรุ ต่อให้อยู่ในสถานการณ์นี้ แต่อีกฝ่ายหนึ่งก็เป็นถึงคนจากสภาน้ำชาแห่งโรงเรียนสามัญ#nทรีนิตี้ ถ้าได้แผลอะไรกลับไป เรื่องมันจะใหญ่เอานะ"
84300300200-45 = "แล้วไงล่ะ?"
84300300200-46 = "ไม่สิ มันไม่ใช่ 'แล้วไงล่ะ' นะ..."
84300300200-47 = "งั้นก็ฟังดูก่อนว่าทางนั้นต้องการอะไร..."
84300300200-48 = "ถ้าต้องการเงินหรือการค้าระหว่างโรงเรียนละก็ ถ้ามันสมเหตุสมผล ฉันก็อาจจะช่วยโน้มน้าวให้ได้"
84300300200-49 = "นี่เธอบอกว่าจะยอมรับการข่มขู่งั้นเหรอ?"
84300300200-50 = "ฉันไม่ได้สรุปแบบนั้นสักหน่อย ฉันแค่อยากชี้ให้เห็นว่าต่อให้เรารู้ว่าตัวแปรคืออะไร แต่การด่วนสรุปไป ก็อาจจะไม่ดีหรอก"
84300300200-51 = "ต้องการอะไรล่ะ? ยูริโซโนะ เซอา"
84300300200-53 = "จะให้ความร่วมมือสินะคะ ต่างจากที่คิดไว้เลย ขอบคุณค่ะ"
84300300200-54 = "แต่สิ่งที่ฉันต้องการไม่ใช่ทั้งเงินหรือการค้าระหว่างโรงเรียนหรอกค่ะ นี่คือเรื่องส่วนตัวล้วนๆ และมันก็เกี่ยวข้องกับสถานการณ์ตอนนี้ด้วยค่ะ"
84300300200-58 = "ถ้าคุณทั้งสองคนไม่ว่าอะไร ฉันอยากอยู่ในปฏิบัติการนี้ด้วยค่ะ"
84300300200-63 = "ว่าไงนะ...?"
84300300200-64 = "พูดอะไรน่ะ?"
84300300200-65 = "ฉันไม่เข้าใจจุดประสงค์ของคุณเลย นี่คืองานของฉันกับเนรุ... คุณอยากร่วมมือกับเรางั้นเหรอ?"
84300300200-66 = "อย่างที่คุณพูดเลยค่ะ ส่วนเหตุผล มันมาจากเรื่องส่วนตัวของฉัน ฉันว่าฉันไม่จำเป็นต้องบอกก็ได้ค่ะ"
84300300200-68 = "พูดบ้าอะไรน่ะ? คิดว่ามันฟังขึ้นหรือไง?"
84300300200-69 = "นี่ ริโอะ ไม่ได้การแล้ว ฉันจะจัดการยัยนี่ให้หงายเก๋ง แล้วเอาไปโยนไว้ในที่ที่คนอื่นเห็นได้..."
84300300200-71 = "ไม่ได้นะ เนรุ ถ้าเซอาไปบอกคนอื่นเรื่องสถานการณ์ในตอนนี้ของโรงเรียนเรา เราจะรับมือไม่ไหวนะ"
84300300200-72 = "อีกอย่าง ตอนนี้เซอาก็รู้ด้วยว่าคนที่เรากำลังสืบสวนพยายามทำอะไรอยู่ ถ้าจะทิ้งไพ่แบบนั้นไปมันก็#nไม่สมเหตุสมผลนะ"
84300300200-73 = "ถ้างั้นก็ลงไม้ลงมือนิดหน่อยให้พูดออกมาแล้วกัน..."
84300300200-77 = "ยูริโซโนะ เซอา"
84300300200-78 = "ฉันเคยเป็นหนี้บุญคุณของคุณ..."
84300300200-82 = "ก็ได้ ฉันจะยอมให้คุณเข้าร่วมในปฏิบัติการนี้ แต่ไม่ว่าจะเกิดเรื่องอะไร คุณต้องทำตามคำสั่งของฉัน"
84300300200-88 = "ว่าไงนะ...!?"
84300300200-89 = "ไม่เป็นไรหรอก เนรุ เซอาน่ะเชื่อใจได้ คงไม่คิดทำอะไรให้พวกเราเดือดร้อนหรอก"
84300300200-90 = "...????"
84300300200-91 = "เฮอะ...!"
84300300200-92 = "ไม่อยากเชื่อหูตัวเองเลย 'เชื่อใจ' งั้นเหรอ... คนอย่างเธอพูดอะไรแบบนั้นได้ด้วย#nจู่ๆ ก็ใจกว้างขึ้นมาหรือไง?"
84300300200-93 = "ฉันแค่บอกว่าอีกฝ่ายเป็นคนที่เชื่อใจได้น่ะ เนรุ ฉันอยากให้เธอยอมรับสิ่งนี้"
84300300200-94 = "ฮึ่ม..."
84300300200-95 = "เอาเถอะ ถ้าคิดว่าดีก็ทำไปเลย แต่ฉันจะไม่ดูแลให้หรอกนะ ฉันไม่ชอบให้ใครมาเกะกะอยู่แล้ว"
84300300200-96 = "เรื่องนั้นไม่ต้องกังวลหรอก ฉันจะให้เซอาใช้เส้นทางปฏิบัติการคนละเส้นทางกับเธออยู่แล้ว เนรุ"
84300300200-97 = "เซอาต่างจากพวกเราที่สามารถเข้าออกงานเอ็กซ์โปได้อย่างสบายๆ ไม่ว่าจะทำอะไรก็คงไม่ถูกสงสัย เพราะแบบนั้นก็เลยสืบหาข้อมูลให้เราได้โดยไม่จำเป็นต้องเข้าไปเสี่ยงอันตรายใดๆ"
84300300200-98 = "เดิมทีคุณก็เป็นคนที่ได้รับเชิญมางานอยู่แล้ว ถ้าเจออะไรน่าสงสัยในงานก็ช่วยตรวจสอบแล้วรายงาน#nฉันทันทีด้วยนะ"
84300300200-99 = "ระหว่างนั้นฉันกับเนรุจะตรวจสอบศูนย์ข้อมูลแล้วสืบหากันอยู่เบื้องหลัง"
84300300200-100 = "พูดง่ายๆ ก็คือนี่เป็นปฏิบัติการที่เคลื่อนไหวสองทิศทาง แบบนี้คงตอบโจทย์สิ่งที่คุณต้องการใช่มั้ย?"
84300300200-105 = "..."
84300300200-106 = "ทำไม มีอะไรไม่พอใจงั้นเหรอ? หรือคิดว่ามันไม่น่าสนุก?"
84300300200-107 = "ขอบอกไว้ก่อนแล้วกัน นี่พวกฉันไม่ได้มาเล่นสนุกหรืออะไรเทือกนั้นกันหรอกนะ"
84300300200-108 = "ไม่ใช่อย่างนั้นค่ะ ฉันก็คิดว่าแบบนั้นคือวิธีที่ดีที่สุดเหมือนอย่างที่คุณว่าค่ะ ที่ฉันขอแบบนั้นถือเป็น#nความดื้อดึงไม่น้อยเลย ขอบคุณที่ยอมให้ฉันเข้าร่วมด้วยนะคะ"
84300300200-110 = "ดีละ ในเมื่อทางฉันยอมรับข้อเสนอแล้ว ต่อไปก็เป็นฝ่ายคุณที่ต้องทำตามสัญญาแล้วละนะ"
84300300200-111 = "ตอนที่แอบอยู่ในกล่อง ตอนนั้นได้ยินคนพวกนั้นคุยอะไรกันบ้าง?"
84300300200-112 = "ค่ะ ที่จริงฉันก็ยังไม่รู้แน่ชัดว่าคนพวกนั้นเป็นใคร และไม่ได้ยินแผนการอย่างละเอียดนัก..."
84300300200-113 = "แต่อย่างน้อยก็ได้ยินเกี่ยวกับเป้าหมายและวิธีการมาอย่างชัดเจนเลยค่ะ"
84300300200-114 = "และเป้าหมายของคนพวกนั้นก็คือ..."
84300300200-115 = "..."
84300300200-116 = "..."
84300300200-121 = "<การทำลายงานมิลเลเนียม เอ็กซ์โป> ค่ะ"

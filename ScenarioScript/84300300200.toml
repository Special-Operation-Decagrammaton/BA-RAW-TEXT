84300300200-43 = "3;네루 교복;07;어이, 지금 좋은 말로 해 주니 상황 파악이 잘 안되는 모양인데…….\n#3;stiff"
84300300200-44 = "1;리오;02;그만둬, 네루. 아무리 지금 같은 상황이라고는 해도, 명색이 트리니티 종합학원의 티파티 소속 인사야. 상처라도 생겼다간 일이 커져.\n#1;ar\n#3;m5"
84300300200-45 = "3;네루 교복;05;그래서?\n#3;em;…"
84300300200-46 = "1;리오;04;아니, '그래서'가 아니고…….\n#1;em;[땀]"
84300300200-47 = "1;리오;99;……우선 원하는 걸 들어보지."
84300300200-48 = "1;리오;01;금전이나 학교 간의 거래를 원하는 것이라면, 그 거래가 합리적일 경우 어느 정도 성사되도록 유도할 수 있어."

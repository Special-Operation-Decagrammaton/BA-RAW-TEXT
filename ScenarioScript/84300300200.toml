84300300200-97 = "1;리오;99;그녀는 우리와 달리 엑스포 회장, 즉 양지에서 편하게 다닐 수 있어. 의심을 사지 않으니, 딱히 위험에 노출시키지 않으면서도 상당량의 정보를 얻을 수 있지."
84300300200-98 = "1;리오;01;원래도 행사에 초대받은 입장이니, 그곳을 돌며 수상해 보이는 것들을 확인하고 보고해 줘.\n#1;em;[반응]\n#1;m3\n#3;dr"

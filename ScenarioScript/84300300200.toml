84300300200-68 = "3;네루 교복;06;뭐라는 거야? 지금 그게 말이 된다고 생각해?\n#3;em;[땀]"
84300300200-69 = "3;네루 교복;13;어이, 리오. 안 되겠어. 지금 당장 이 녀석을 기절시키고, 적당히 다른 사람들 보이는 곳에 던져 놓고 올 테니…….\n#3;m2"
84300300200-70 = "#all;hide"
84300300200-71 = "3;리오;02;안 돼, 네루. 그랬다가 우리와 학교의 지금 상황에 대해서 그녀가 발설할 경우, 우리에겐 대책이 없어.\n#3;em;[반응]"

[translation]
84300300200-5 = "狀況我都明白了，百合園聖亞。"
84300300200-6 = "幸好我們的結論是不需要提防你。"
84300300200-7 = "反而……嗯，應該向你道歉才對。#n抱歉把你捲進千年內部的問題。"
84300300200-8 = "別這麼說。#n我的擅作主張也給你們添了麻煩，因此我也應該道歉。"
84300300200-9 = "但那些人……果然在做一些可疑的事。"
84300300200-10 = "有通知研討會了嗎？#n我認為應該立刻告知這件事比較妥當。"
84300300200-11 = "如果是平常確實該這麼做……但現在的情況有點複雜。"
84300300200-12 = "雖然還不清楚他們有什麼打算，但光是準備的規模就非常龐大。"
84300300200-13 = "如果將這件事告訴研討會，他們恐怕會為了以防萬一而中斷千年博覽會吧。#n那並不是我希望看見的結果。"
84300300200-14 = "你的心情我可以理解，但我認為這也是沒辦法的事……"
84300300200-19 = "……原來如此。"
84300300200-20 = "所以才這麼做啊。"
84300300200-21 = "所以你才會躲在這裡，和美甘寧瑠一起展開調查，打算暗中解決這件事情。"
84300300200-22 = "調月莉央。#n你還是跟以前一樣……"
84300300200-23 = "千年博覽會是我們學園最重要的活動之一。#n即便要採取相對強硬的手段，也不能讓活動出現任何差錯。"
84300300200-24 = "結果卻在準備期間發現了一連串可疑的數據流向。#n我們必須將其查清楚才行。"
84300300200-25 = "雖然現在連對方的目的都還沒掌握……"
84300300200-27 = "……先等一下。"
84300300200-28 = "寧瑠？"
84300300200-29 = "這還不好說哦？#n在被我識破之前，這傢伙一直躲在箱子裡偷聽他們的對話。"
84300300200-30 = "從當時的情況來看實在不像巧合。#n你是故意接近並偷聽他們談話的對吧？"
84300300200-32 = "真是敏銳。"
84300300200-33 = "你說的沒錯。#n他們的目的我已經大致掌握了。"
84300300200-34 = "那真是好消息。#n不介意的話，可以告訴我們嗎？"
84300300200-35 = "嗯，當然可以。"
84300300200-39 = "……但現在還不是時候。"
84300300200-40 = "嗯？"
84300300200-42 = "你說什麼？"
84300300200-43 = "喂，雖然我現在好聲好氣的，但你好像還搞不清楚狀況耶……"
84300300200-44 = "慢著，寧瑠。就算現在情況如此，對方終究是三一綜合學園的茶會成員。#n要是出了差錯會很麻煩的。"
84300300200-45 = "所以呢？"
84300300200-46 = "什麼叫「所以呢」……"
84300300200-47 = "……先聽聽他的要求吧。"
84300300200-48 = "如果是想要錢財或進行學園間的交易，且內容足夠合理的話，我可以盡量促成。"
84300300200-49 = "你要接受他的威脅嗎？"
84300300200-50 = "結論還無法確定。#n我想表達的是，即便知道變數是什麼，立刻定下結論也是不合理的。"
84300300200-51 = "你想要什麼？百合園聖亞。"
84300300200-53 = "跟我想像的不一樣，你還挺配合的呢。謝謝你。"
84300300200-54 = "但我想要的既不是錢財，也和學園間的事無關……#n而是非常私人，又跟眼前的情況有關的事。"
84300300200-58 = "如果兩位能夠接受的話，請讓我也加入這次的行動。"
84300300200-63 = "……什麼？"
84300300200-64 = "那是什麼意思？"
84300300200-65 = "我不明白你的用意。#n所以你是打算協助……我跟寧瑠正在進行的這件事嗎？"
84300300200-66 = "正是如此。#n同時因為那是非常私人的問題，所以我不打算說明原因。"
84300300200-68 = "你在胡說什麼？你覺得現在這樣像話嗎？"
84300300200-69 = "喂，莉央。這樣不行。#n我得立刻把這個傢伙打暈，丟到其他人會看到的地方……"
84300300200-71 = "不行，寧瑠。一旦他把我們和學園目前的情況洩漏出去，我們就束手無策了。"
84300300200-72 = "況且他還知道調查對象的目的。#n捨棄這個線索實在太不合理了。"
84300300200-73 = "那只能好好教訓他一頓，讓他開口了……"
84300300200-77 = "百合園聖亞。"
84300300200-78 = "……我欠你一個人情。"
84300300200-82 = "知道了，我同意你的加入。#n但是不管發生什麼事，都務必要聽從我的指示。"
84300300200-88 = "……什麼！？"
84300300200-89 = "沒關係的，寧瑠。#n這個人值得信賴，我相信他不會妨礙我們的。"
84300300200-90 = "……？？？？"
84300300200-91 = "……唉。"
84300300200-92 = "居然能從你嘴裡聽到「信賴」這兩個字……終於長大了嗎？"
84300300200-93 = "我只是認為對方有這個價值而已。#n寧瑠，希望你也可以意識到這一點。"
84300300200-94 = "哼嗯……"
84300300200-95 = "算了，隨你高興吧。#n不過我可不會照顧他哦？我最討厭礙手礙腳的人了。"
84300300200-96 = "不用擔心。就算你不說，我也打算為他安排跟你完全不同的行動路線。"
84300300200-97 = "畢竟他和我們不同，可以大大方方地在博覽會會場行動。#n由於不會受人懷疑，自然能在不暴露於危險的前提下獲得大量情報。"
84300300200-98 = "既然你本來就是受邀參加活動的客人，#n就麻煩你到現場巡視是否有可疑事物，並向我報告吧。"
84300300200-99 = "這段期間，寧瑠和我會在背後調查包含資料中心在內的情報。"
84300300200-100 = "簡單來說就是聲東擊西。#n這樣應該符合你的要求吧？"
84300300200-105 = "……"
84300300200-106 = "有什麼不滿嗎？還是覺得太無趣了？"
84300300200-107 = "我先跟你說清楚，現在我們可不是要去惡作劇或玩耍啊！"
84300300200-108 = "不，我也認為那是最正確的選擇。#n謝謝你答應我那強人所難的請求。"
84300300200-110 = "那我這邊已經處理好，現在該輪到你遵守約定了。"
84300300200-111 = "能把你在箱子裡聽見的──他們的目的告訴我們嗎？"
84300300200-112 = "雖然我其實還不清楚他們究竟是誰，也沒聽見計畫的詳細內容……"
84300300200-113 = "但我清楚聽見了他們的目的和手段。"
84300300200-114 = "他們的目的是……"
84300300200-115 = "……"
84300300200-116 = "……"
84300300200-121 = "「千年博覽會的悲劇收場」。"

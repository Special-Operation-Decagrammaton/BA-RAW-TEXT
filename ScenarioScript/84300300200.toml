84300300200-5 = "3;리오;02;상황은 파악했어. 유리조노 세이아.\n#3;a"
84300300200-6 = "3;리오;01;다행히도 우리가 당신을 경계해야 할 이유는 없다고 결론 내렸지."
84300300200-7 = "3;리오;99;오히려……. 그렇지, 밀레니엄 내부의 일에 엮이게 만들어서 미안하다는 사과의 말을 전하는 게 맞겠네.\n#3;em;…"
84300300200-8 = "3;세이아;01;아니요. 오히려 무리했던 제 행동이 폐를 끼친 것 같으니, 제가 사과를 드려야겠지요."
84300300200-9 = "3;세이아;99;하지만 역시 그 사람들……. 뭔가 수상한 일을 하고 있었던 모양이네요."
84300300200-10 = "3;세이아;02;세미나에는 알렸나요? 지금이라도 바로 공유돼야 할 일이라고 생각하는데."
84300300200-11 = "3;리오;07;평상시라면 그렇겠지만……. 지금은 조금 상황이 복잡해.\n#3;em;[한숨]"
84300300200-12 = "3;리오;01;정확히 그들이 무슨 일을 하려는지도 모르는데, 준비하고 있는 규모만 굉장히 큰 것으로 판단되고 있거든."
84300300200-13 = "3;리오;00;사실을 알려 준다면 세미나는 만약을 위해 밀레니엄 엑스포를 중단하겠지. 그리고 나는 그걸 원하는 게 아니야."
84300300200-14 = "3;세이아;05;마음은 이해하지만, 그렇다고 해도 어쩔 수 없는 일이라고 생각하는데요. 달리 방법이……."

84300300200-53 = "3;세이아;02;생각했던 것과 달리 협조적이군요. 감사드려요.\n#3;greeting"
84300300200-54 = "3;세이아;99;하지만 제가 바라는 건 금전도 학교 간의 일도 아니에요. 지극히 개인적인 일이고, 지금 이 사태와 관련이 있는 일이죠."

84300300200-19 = "3;세이아;99;……과연,"
84300300200-20 = "3;세이아;01;그렇게 된 거군요."
84300300200-21 = "3;세이아;99;그래서 당신은 이곳에 숨어, 저 미카모 네루와 함께 사건을 조사하고 그림자 속에서 해결하려 하고 있다."
84300300200-22 = "3;세이아;05;츠카츠키 리오. 당신은 아직도 그런 태도를…….\n#3;stiff"
84300300200-23 = "1;리오;05;밀레니엄 엑스포는 우리 학교에서 가장 중요한 행사들 중 하나야. 다소의 무리수를 두더라도, 그 행사에 금이 가게 할 수는 없어.\n#1;ar\n#3;m5\n#1;em;…"
84300300200-24 = "1;리오;02;하지만 준비 기간 동안, 일련의 수상한 데이터 흐름을 발견한 것 또한 사실이지. 우리는 그게 뭔지 알아내야 해."
84300300200-25 = "1;리오;07;아직은 그들이 뭘 원하는지조차 알 수 없지만……."
84300300200-26 = "#all;hide"
84300300200-27 = "3;네루 교복;00;……잠깐 기다려.\n#3;em;[반응]"
84300300200-28 = "3;리오;04;네루?\n#3;em;[?]"
84300300200-29 = "3;네루 교복;99;그건 모르는 일이지. 이 녀석, 내가 구해주기 전에 분명 상자 속에 숨어 저쪽 말을 다 듣고 있었거든."
84300300200-30 = "3;네루 교복;00;정황상 우연도 아니고, 일부러 그 말을 확인하기 위해 접근했던 걸로 보이고 말이지. 안 그래?"
84300300200-31 = "#all;hide"
84300300200-32 = "3;세이아;99;예리하군요."
84300300200-33 = "3;세이아;01;맞습니다. 그리고 저들의 목적도 대략적인 부분은 확인했지요."
84300300200-34 = "1;리오;03;그건 좋은 소식이네. 괜찮다면 그 목적이 뭔지 알려줄 수 있겠어?\n#1;ar\n#3;m5"

84300300200-65 = "3;리오;05;의도를 이해할 수 없는데. 나와 네루가 하고 있는 이 일에……. 협조하고 싶다는 뜻이야?"
84300300200-66 = "5;세이아;01;말씀대로예요. 그 이유는 지극히 사적인 문제인지라, 굳이 말씀드리지 않아도 될 것 같네요.\n#3;m1\n#5;al"

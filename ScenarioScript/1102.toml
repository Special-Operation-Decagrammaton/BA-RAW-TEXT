[translation]
1102-1 = "วันประหลาดของชมรมชิมอาหาร 2"
1102-2 = "(เหล่าสมาชิกชมรมชิมอาหารถูกขังอยู่ที่คุมขังของคณะกรรมการวินัย)"
1102-3 = "อะไรกัน? เห็ดทรัฟเฟิล? ฉันก็อยากกินด้วยเหมือนกันน้าาาาา!!"
1102-4 = "น่าเสียดายที่ถูกแย่งไปแล้ว..."
1102-5 = "อะไรน่ะ!! พวกเธอได้ดมกลิ่นไปแล้วนี่!! ไหนว่าแพงมาก หายากมากยังไงล่ะ!! "
1102-6 = "ใช่แล้วค่ะ กลิ่นหอมหวนสุดพิเศษนั่น... ตลอดชีวิตฉันคงไม่มีวันลืมได้เลย"
1102-7 = "เห็ดทรัฟเฟิล... อยากกินจัง"
1102-8 = "(ตู้มๆๆๆๆ!) นี่ พวกเธอ!! ทำไมถึงกินของอร่อยๆ ไม่แบ่งกันเลย!!#nแบ่งให้พวกเราบ้างสิ! อ๊ายยยยย!!"
1102-10 = "หนวกหูน่า!! อยู่ในห้องคุมขังก็ช่วยเงียบๆ ด้วย!!"
1102-11 = "สิ่งของที่ยึดมาจะถูกส่งคืนให้หลังจากนำไปตรวจสอบว่าเป็นสิ่งของที่เกี่ยวข้องกับอาชญากรรม#nหรือไม่ค่ะ ใช้เวลาประมาณหนึ่งเดือนค่ะ"
1102-13 = "ถ้าเดือนนึงล่ะก็ลำบากแน่เลย....!!"
1102-14 = "ได้กลิ่นอะไรรึเปล่าคะ คุณอิซุมิ?"
1102-15 = "อย่าพูดเรื่องแบบนั้นระหว่างแจกกางเกงชั้นในได้ไหม... "
1102-16 = "นี่อะไรน่ะ? ฉันไม่สนใจชั้นในของเธอหรอกนะ อาคาริ"
1102-17 = "พูดอะไรแบบนั้นคะ ถ้าพูดถึงชั้นในล่ะก็... มันก็คือตัวที่เอาไปใช้ห่อเห็ดทรัฟเฟิลไงล่ะคะ "
1102-19 = "กลิ่นของเห็ดที่ชื่อว่าเพชรสีดำนั่นยังคงส่งกลิ่นหอมเหมือนเดิมเลย☆"
1102-23 = "ส่งมานะ! ฉันถือให้เอง!"
1102-25 = "(ฮึบ-ฮ่า-ฮึบ-ฮ่า-ฮึบ-ฮ่า)"
1102-26 = "แต่นี่มันกลิ่นของเห็ดทรัฟเฟิล... ฉันอยากจะดมเอาไว้ให้ตราตรึงในจิตใจของฉัน "
1102-28 = "(ฮึบ-ฮ่า-ฮึบ-ฮ่า)"
1102-29 = "ไม่มีคนปกติอยู่กันเลยรึไงนะ..."
1102-30 = "ดูสิ ท่าทางที่กระตือรือร้นในการเรียนรู้เพื่อรสชาติที่ยอดเยี่ยมนั่นสง่างามมากเลยค่ะ คุณอิซุมิ"
1102-31 = "เดี๋ยวสิ... ถ้าใครมาเห็นคงคิดว่าเป็นพวกโรคจิตแน่ๆ..."
1102-32 = "[s] \"หวัดดีทุกคน~\""
1102-33 = "ว้าก?! ตกใจหมด! คุณครู?!#nมาตั้งแต่เมื่อไหร่เนี่ย?!"
1102-34 = "อุ๊ย ทำไมคุณครูมาอยู่ที่นี่ได้ล่ะคะ?"
1102-35 = "คงจะไปทำอะไรแผลงๆ เลยถูกจับตัวไปอีกล่ะสิ จริงๆ เลย ไม่เคยเข็ดจริงๆ เลยนะคะ"
1102-36 = "[s1] \"ไม่! ครูถูกจับไปขังไว้นะ! ไม่ยุติธรรมเลย!\"\n[s2] \"เรื่องมันยาวน่ะ...\""
1102-37 = "คนที่พูดก็ไม่ใช่ใครคนอื่นแต่กลับเป็นคุณครูพูด ยิ่งไม่น่าเชื่อถือใหญ่เลย"
1102-38 = "ถึงไม่ฟังก็พอจะรู้อยู่ว่าเรื่องอะไร... คงไม่ต้องพูดออกมาหรอก"
1102-41 = "คุณครูคะ!! ได้ยินว่านี่คือกลิ่นเห็ดทรัฟเฟิลค่ะ ลองดมดูหน่อยสิคะ"
1102-42 = "[s3] \"โอเค!\"\n[s4] \"ขอปฏิเสธข้อเสนอแบบนั้น\""
1102-43 = "(ฮึบ-ฮ่า-ฮึบ-ฮ่า-ฮึบ-ฮ่า) "
1102-44 = "อะไรน่ะ? จริงเหรอ? ได้ยินว่ามันแพงมากเลยนะ#nถ้าเป็นแค่พนักงานเงินเดือนทั่วๆ ไปไม่มีวันได้กินเด็ดขาด "
1102-45 = "[s5] \"ถ้างั้นก็โอเค!\""
1102-46 = "(ฮึบ-ฮ่า-ฮึบ-ฮ่า-ฮึบ-ฮ่า) "
1102-47 = "(เคร้ง...)"
1102-48 = "ว่าไง... คุณครู ขอโทษที ฉันเข้าใจผิดไปน่ะ"
1102-49 = "มีคนแจ้งมาว่าเจอคนเปลือยกายว่ายน้ำในสระของโรงเรียน เลยทำให้คุณครูถูกควบคุมตัวอยู่...#nแต่ฉันอาจจะใจร้อนไปสักหน่อย..."
1102-50 = "เพราะอย่างนั้นแล้ว เรื่องมันคงจะไม่เกิดขึ้นเลยถ้าหาก..."
1102-51 = "[s] \"ฮึบ-ฮ่า-ฮึบ-ฮ่า-ฮึบ-ฮ่า....?!\""
1102-52 = "......?!!"
1102-54 = "เป็นยังไงบ้างคะ คุณครู? มีกลิ่นหอมๆ ออกมาจากชั้นในด้วยใช่ไหมล่ะคะ? "
1102-55 = "....."
1102-56 = "....."
1102-58 = "\n\n......."
1102-59 = "[s] \"มะ...ไม่นะ เข้าใจผิดแล้ว! ไม่ใช่แบบนี้เธอคิดหรอกนะ....\""
1102-60 = "เอาไว้ไปแก้ตัวในนรกก็แล้วกัน"
1102-61 = "(ว้ากกก!)"
1102-62 = "วันประหลาดของชมรมชิมอาหาร"

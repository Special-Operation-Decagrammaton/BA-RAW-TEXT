[translation]
1102-1 = "美食研究會的日常（２）"
1102-2 = "（被囚禁在風紀委員會拘留所的，美食研究會一同）"
1102-3 = "咦咦咦！？松露？？我明明也想吃的說──！"
1102-4 = "很遺憾被沒收了……"
1102-5 = "什麼啊，真是的！！大家至少聞到味道了吧！？非常的稀有吧！？"
1102-6 = "是的。那股濃厚獨特的香味……一生都不會忘記吧。"
1102-7 = "想實際品嚐呢……松露。"
1102-8 = "（咚咚咚！！！）魔鬼！惡魔！只有妳們自己吃好吃的！#n食物的怨恨是很恐怖的哦！！#n也分給我啦～～！嗚啊啊啊啊！！"
1102-10 = "喂！！安靜點！！"
1102-11 = "關於沒收的物品，會在調查是否和犯罪有所關聯性後歸還。#n我想大約是一個月後。"
1102-13 = "要一個月……！！"
1102-14 = "泉同學，要不要聞聞看香味？"
1102-15 = "拿出內褲說著那種台詞……！"
1102-16 = "這是什麼？我對亞伽里的內褲可沒有興趣……"
1102-17 = "啊啦真浪費。這是啊……包著那朵松露的內褲唷？"
1102-19 = "被稱作黑色鑽石的那朵蘑菇的香味，浸染在了這條內褲上☆"
1102-23 = "給我！我要聞！"
1102-25 = "（嘶～哈～，嘶～哈～，嘶～哈～）"
1102-26 = "這就是新鮮松露的香味……為了不忘記必須烙印在腦海裡。"
1102-28 = "（嘶～哈～，嘶～哈～）"
1102-29 = "這裡就沒有正經的人嗎……？"
1102-30 = "果然厲害呢。對於味道完全不厭煩的身姿，真是完美，泉同學。"
1102-31 = "不……無論怎麼看都是出色的變態吧……"
1102-32 = "[s]「嗨，各位。」"
1102-33 = "唔哇！嚇死我了！#n你什麼時候在那裡的，老師？"
1102-34 = "啊啦，為什麼老師會在這裡？"
1102-35 = "肯定是又做了什麼奇怪的事被逮捕了吧。真是的，不長記性的人呢。"
1102-36 = "[s1]「不是！冤枉！冤罪！」\n[s2]「說來話長……」"
1102-37 = "就算老師那麼說，也完全沒有可信度呢☆"
1102-38 = "就算不問，也能大概知道……只是刻意不說的。"
1102-41 = "老師～！！聽說這是松露的味道。要一起聞嗎？"
1102-42 = "[s3]「務必！」\n[s4]「那實在是容我駁回。」"
1102-43 = "（嘶～哈～，嘶～哈～，嘶～哈～）"
1102-44 = "什麼？真的嗎？我聽說這個東西超級貴的。 #n聽說憑上班族的薪水，連味道都沒得聞？ "
1102-45 = "[s5]「那就OK！」"
1102-46 = "（嘶～哈～，嘶～哈～，嘶～哈～）"
1102-47 = "（喀嚓）"
1102-48 = "哈啊……抱歉，老師。看來似乎是誤會。"
1102-49 = "只因為收到有人在學校的泳池裸泳就把老師拘束……#n實際是似乎是我判斷的過早，不過……"
1102-50 = "就因為會發生這種事，所以平時就必須好好注意……"
1102-51 = "[s]「嘶～哈～，嘶～哈～，嘶～哈～……！？」"
1102-52 = "……！！？"
1102-54 = "老師～，如何？這條內褲，有著很香的味道吧？"
1102-55 = "……"
1102-56 = "……"
1102-58 = "……"
1102-59 = "[s]「不，那個，這也是誤會！」"
1102-60 = "藉口我會在地獄再問的。"
1102-61 = "（哐鏘──！）"
1102-62 = "美食研究會的日常"

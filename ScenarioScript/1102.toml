[translation]
1102-1 = "Gourmet Research Society's Odd Day Part 2"
1102-2 = "(The members of the Gourmet Research Society are locked up in the Prefect Team's holding cell.)"
1102-3 = "What?! I want truffles too!"
1102-4 = "They were confiscated from us, regrettably..."
1102-5 = "Well at least you got to smell them! Their aroma is why they're so prized in the first place!"
1102-6 = "That is true. That rich, luscious scent... I'll never forget it."
1102-7 = "If only I had gotten to taste them."
1102-8 = "*crash* *boom* *bang* You're all incorrigible! Were you going to eat them by yourselves?! How rude of you not to share!"
1102-10 = "Shut up! No noise while in lockup!"
1102-11 = "The contraband will be returned once it's been cleared of involvement in criminal activities. It should take about a month."
1102-13 = "A month?! That's far too long!"
1102-14 = "Here, Izumi. Get a whiff of this."
1102-15 = "Yuck! Don't say that while holding out your panties."
1102-16 = "Why would I want to smell your underwear, Akari?"
1102-17 = "But...these are the very panties those truffles were wrapped in! "
1102-19 = "Take a deep breath and savor the aroma of genuine black diamond truffles! ☆"
1102-23 = "Gimme that! Why didn't you say so?!"
1102-25 = "*sniff* *sniff* *snifffff*"
1102-26 = "So this is what a real truffle smells like. I'll burn it into my memory so I never forget!"
1102-28 = "*sniff* *sniff* *sniff*"
1102-29 = "Have you all lost your minds?"
1102-30 = "What a beautiful sight. I'm touched by your gastronomic dedication, Izumi."
1102-31 = "She looks more like a pervert to me."
1102-32 = "[s] \"Hello, everyone.\""
1102-33 = "Ah! Sensei? How long have you been standing there?!"
1102-34 = "What are you doing here?"
1102-35 = "Let me guess. You were thrown in here for being a degenerate again, weren't you?"
1102-36 = "[s1] \"That's not true! I was framed!\"\n[s2] \"It's a long story...\""
1102-37 = "I have a hard time believing that knowing you, Sensei. ☆"
1102-38 = "I have my suspicions...but I'd rather spare everyone's ears."
1102-41 = "Sensei! I've got the aroma of truffles in the palm of my hand. Wanna sniff it together?"
1102-42 = "[s3] \"Do I ever!\"\n[s4] \"Absolutely not.\""
1102-43 = "*sniff* *sniff* *snifffff* "
1102-44 = "Are you sure? Opportunities like this don't happen every day. You might not be able to afford to smell something like this even with your entire monthly salary."
1102-45 = "[s5] \"Well, in that case...!\""
1102-46 = "*sniff* *sniff* *snifffff* "
1102-47 = "*clank* *clank*"
1102-48 = "*sigh* My apologies, Sensei. I had no idea this was all a misunderstanding."
1102-49 = "When I received a report about someone skinny-dipping in the school pool, I assumed it was you. I admit that I was a bit hasty in detaining you."
1102-50 = "Things like this wouldn't happen if you behaved yourself."
1102-51 = "[s] \"*snifffff*?! Uh...\""
1102-52 = "...?!"
1102-54 = "Whaddaya think, Sensei? Aren't these the muskiest panties you've ever sniffed?"
1102-55 = "..."
1102-56 = "..."
1102-58 = "..."
1102-59 = "[s] \"N-No, wait! This is all a misunderstanding! It isn't what it looks like...\""
1102-60 = "You can make your excuses in hell."
1102-61 = "*CRASH*"
1102-62 = "A Strange Day for the Gourmet Research Society"

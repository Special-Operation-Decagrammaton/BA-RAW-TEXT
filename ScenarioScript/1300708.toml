[translation]
1300708-1 = "นักชิมที่ไม่โดดเดี่ยว"
1300708-2 = "ย่านไชน่าทาวน์ โรงเรียนซานไห่จิง"
1300708-3 = "ฮ่า~ อร่อยจังเลย!"
1300708-4 = "อาหารในย่านนี้อร่อยเหมือนที่ได้ยินมาเลย!"
1300708-5 = "ทั้งข้าวผัด เนื้อหมูแดง เกี๊ยวไส้เนื้อ.... อร่อยทั้งหมดเลย!"
1300708-6 = "คุ้มกับที่มาตั้งไกล หุหุ"
1300708-7 = "หืม? ตอนนี้อิ่มมากเลยอยากไปนั่งพักงั้นเหรอ?"
1300708-8 = "ไม่ได้นะ! ยังไปตระเวนกินได้ไม่ถึงครึ่งทางเลย!"
1300708-9 = "ถ้าไม่รีบล่ะก็วันนี้เราคงชิมอาหารได้ไม่หมดทุกร้านแน่เลย!"
1300708-10 = "อืม.... แต่ว่าพอกินอาหารที่มีน้ำมันเข้าไปเยอะๆ ก็รู้สึกอึดอัดท้องเหมือนกันแฮะ...."
1300708-14 = "ดีล่ะ ถ้างั้นเราไปนั่งพักที่คาเฟ่ใกล้ๆ นี่กันก่อนดีมั้ย?"
1300708-17 = "― อะ... อะไรกันน่ะ ทำไมจ้องกันแบบนั้นล่ะ?[wa:4280] "
1300708-19 = "― (...จริงๆ เล้ย...)[wa:720] "
1300708-22 = "― เรามาพักกันแป๊บหนึ่ง แล้วค่อยไปหาอะไรกินต่อใช่มั้ย? ต่อไปกินอะไรดีน้า?[wa:2440] "
1300708-25 = "― อาหย่อยยยย~♪[wa:2760] "
1300708-28 = "― ว่าไงนะ?! ขอกินด้วยคนเหรอ?[wa:640] "
1300708-30 = "― อย่าพูดอะไรเหลวไหลน่า! อยากสู่ขิตแล้วรึไง?[wa:500] "
1300708-33 = "― (แค่แกล้งพูดใช่มั้ย? ใช่มั้ยนะ? มีหลอดแค่อันเดียวจะแบ่งได้ไง...)[wa:2760] "
1300708-35 = "― (...แต่ถ้าเป็นคุณครูล่ะก็... คงไม่เป็นไรหรอกน่า)[wa:1000] "
1300708-38 = "― ไม่ให้หรอก!! ไม่แบ่งให้เด็ดขาด!![wa:10] "
1300708-41 = "อ่า~ อร่อยจังเลย~"
1300708-42 = "วันนี้รู้สึกดีมากเลย ได้กินของอร่อยๆ ตั้งเยอะแน่ะ!"
1300708-43 = "แถมยังได้มากินข้าวกับคุณครูสองต่อสองแบบนี้ด้วย...."
1300708-44 = "ยะ...อย่าเข้าใจผิดนะ! ถึงกินคนเดียวก็อร่อยเหมือนกันอยู่ดีนั่นแหละ!"
1300708-45 = "แต่ว่าบางที... การมีใครบางคนมานั่งกินด้วยแบบนี้... มันก็รู้สึกดีกว่า…"
1300708-46 = "คราวหน้าออกไปกินข้าวด้วยกันอีกมั้ย?"
1300708-47 = "[s] \"ได้อยู่แล้ว\""
1300708-51 = "จริงๆ นะ? สัญญาแล้วนะ! ต้องไปด้วยกันนะ!"
1300708-53 = "จากนั้นคุณครูกับจุนโกะที่ดูอารมณ์ดีเป็นพิเศษก็เดินกลับไปโรงเรียนด้วยกัน"

[translation]
1300708-1 = "The Not-So-Solitary Gourmet"
1300708-2 = "Chinatown Street near Shanhaijing Academy"
1300708-3 = "Whew! That was so good."
1300708-4 = "This street lives up to the hype. Everything here is so delicious!"
1300708-5 = "Fried rice, char siu, meat dumplings... They're all winners!"
1300708-6 = "It was worth coming all the way here for. Heehee."
1300708-7 = "Huh? Don't I want to take a break after all of that?"
1300708-8 = "No way! We haven't even gotten to half of the restaurants!"
1300708-9 = "If we don't pick up the pace, we won't be able to taste every dish by the end of the day!"
1300708-10 = "Still...I do feel a little queasy after all of that greasy food."
1300708-14 = "Okay. Why don't we head to a cafe for a break?"
1300708-17 = "― Huh? Wh-What? Why are you looking at me like that?[wa:3840] "
1300708-19 = "― (Seriously...)[wa:880] "
1300708-22 = "― We're going to the spots after we're done taking a break, right? What should we eat next?[wa:1680] "
1300708-25 = "― Delicious! ♪[wa:2760] "
1300708-28 = "― What?! Drink it together?[wa:680] "
1300708-30 = "― Don't be silly! Do you have a death wish?[wa:540] "
1300708-33 = "― (Sensei must be teasing me, right? Right? There's only one straw...)[wa:2600] "
1300708-35 = "― (But if it's with Sensei...maybe I wouldn't mind...)[wa:840] "
1300708-38 = "― Forget it! No juice for you![wa:10] "
1300708-41 = "Ah... That was good!"
1300708-42 = "Today was the best. I got to have so much good food!"
1300708-43 = "Being with you made it taste even better..."
1300708-44 = "W-Wait, don't get the wrong idea! I can eat delicious food by myself like it's nothing!"
1300708-45 = "But I'll admit that...it tastes better...with someone else there with me."
1300708-46 = "Will you grab a bite with me again sometime?"
1300708-47 = "[s] \"Of course.\""
1300708-51 = "You will? Then it's a promise! I'll hold you to that!"
1300708-53 = "I then returned to school with an excited Junko in tow."

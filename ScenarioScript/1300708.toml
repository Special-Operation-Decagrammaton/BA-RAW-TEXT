[translation]
1300708-1 = "不孤獨的美食家"
1300708-2 = "山海經高級中學附近．中華街"
1300708-3 = "哈啊～真──好吃！"
1300708-4 = "這條中華街上的餐廳都和傳聞中說的一樣好吃！"
1300708-5 = "炒飯、叉燒、肉包……全都超好吃的！"
1300708-6 = "不枉費我特地從這麼遠跑來，呵呵。"
1300708-7 = "嗯？你說你肚子很飽，想稍微休息一下再繼續？"
1300708-8 = "不行！我們還有一半以上的店家都沒去過呢！"
1300708-9 = "要是不努力點，就沒辦法在今天之內品嚐完所有料理了！"
1300708-10 = "唔──嗯……不過的確，目前為止吃的都挺油膩的……"
1300708-14 = "啊，那我們去那家咖啡廳坐一下吧。"
1300708-17 = "― 哎，什，什麼。為什麼用那種眼神看著我？[wa:5080] "
1300708-19 = "― （……討厭，真是的……）[wa:960] "
1300708-22 = "― 休息一會兒後，再去吃吧？下一個要吃什麼？[wa:4440] "
1300708-25 = "― 真好喝～♪[wa:3040] "
1300708-28 = "― 什麼？你也要一起喝？[wa:1280] "
1300708-30 = "― 少胡說八道了！找死是不是！？[wa:1620] "
1300708-33 = "― （他這是在耍我，對吧？是吧？吸管只有一根耶……）[wa:4360] "
1300708-35 = "― （……不過，如果是老師的話……應該……）[wa:2120] "
1300708-38 = "― ……不對！！果然還是不行！！[wa:220] "
1300708-41 = "啊啊～吃得好飽～"
1300708-42 = "今天一整天真的好滿足！吃了好多美食！"
1300708-43 = "而且能和老師兩人單獨一起吃飯……"
1300708-44 = "別，別誤會！好吃的食物我自己一個人吃也會覺得好吃！"
1300708-45 = "不過……比起自己一個人吃……兩個人一起果然……更開心……"
1300708-46 = "下次，可以再陪我一起吃飯嗎？"
1300708-47 = "[s] 「當然。」"
1300708-51 = "真的嗎？我們說好了喔！一定要喔！"
1300708-53 = "（之後，和開心的淳子一起回到了學校）"

[translation]
1003106-1 = "新年試手氣"
1003106-2 = "呵呵。說到新年就是抽御神籤，說到抽御神籤就是新年呢，老師。"
1003106-3 = "[s] 「好像確實是這樣？」"
1003106-4 = "到了新年，每個人都希望今年一整年都是好運吧？"
1003106-5 = "這是理所當然的事，但不管抽籤的結果是什麼……"
1003106-6 = "我也不認為會就此決定一整年的運勢。"
1003106-7 = "但是身為社長，一個組織的領導，像這樣透過活動來確認今年一整年的運勢，也是挺有情調的。"
1003106-8 = "算是一種新年的傳統。"
1003106-9 = "[s] 「原來如此……？」"
1003106-10 = "總，總之！快，一起去抽吧！"
1003106-11 = "說不定會抽到頭獎呢？"
1003106-12 = "嗯，我的話肯定能抽到♪"
1003106-13 = "[s] 「御神籤有『頭獎』之類的系統嗎……？」"
1003106-17 = "啊，到了。"
1003106-18 = "搖動此桶，並確認掉出來的木棍上面的數字，打開寫著那個數字的抽屜查看運勢……上面是這樣寫的。"
1003106-19 = "然後，一次要100元。"
1003106-20 = "那我就先來試試。"
1003106-27 = "啊，出來了。號碼是45號……"
1003106-29 = "抽屜在……這裡。"
1003106-33 = "運勢是……"
1003106-34 = "「小凶」……？"
1003106-35 = "「事業起起伏伏」、「買賣時機不佳」、「與同事不合」……上面這麼寫到……"
1003106-36 = "[s] 「看起來不太好呢……？」"
1003106-37 = "嗯，是啊……嘛，反正我也不是特別相信。"
1003106-38 = "畢竟這些都是……巴納姆效應，不是嗎？"
1003106-39 = "寫上一堆模稜兩可的內容，讓看的人下意識地對號入座……"
1003106-40 = "[s] 「運勢確認完了，那去打結吧？」"
1003106-44 = "[ns] 「……亞瑠？」"
1003106-45 = "……果然不能就這麼算了呢，老師。現在放棄的話就是認輸了吧？"
1003106-46 = "再抽一次。反正只要100元，沒什麼大不了的。"
1003106-53 = "這次是87號……"
1003106-57 = "運勢的內容是……"
1003106-61 = "「凶」……？"
1003106-62 = "「精心的準備尚未結果，請耐心等候」、「有紛爭，要注意身體」、「事業無成」。"
1003106-66 = "[ns] 「亞瑠醬……？」"
1003106-67 = "呵呵……"
1003106-68 = "呵呵呵呵呵……很好。這個挑戰，我接受了。"
1003106-69 = "瞧不起人的東西。以為說了這麼多惡毒的話，我就會就此放棄嗎！？"
1003106-70 = "[s]「這不是比試啊，亞瑠！？」"
1003106-71 = "不，老師！這就是比試！這個御神籤和我的比試！"
1003106-72 = "真是的……竟然說我的便利屋會倒，我就讓你大吃一驚吧！"
1003106-79 = "再一次！48號！"
1003106-80 = "內容是……"
1003106-82 = "「半兇」！？"
1003106-83 = "「事業目前不佳」！？"
1003106-84 = "該死，再一次！"
1003106-91 = "……「末凶」！"
1003106-100 = "「大凶」！？！？"
1003106-105 = "……！"
1003106-110 = "……？"
1003106-115 = "……！！"
1003106-117 = "哈啊……哈啊……"
1003106-118 = "[s1] 「怎麼抽都和『凶』有關，反而很厲害啊……」\n[s2] 「沒想到凶的種類有這麼多。」"
1003106-119 = "可惡！我，我還沒有放棄……！"
1003106-120 = "可惡！我，我還沒有放棄……！"
1003106-121 = "這是，我最後的100元……！"
1003106-128 = "號碼，1號……！"
1003106-132 = "內容是……！"
1003106-137 = "…………「不是兇但無限接近兇的兇」？"
1003106-138 = "這，這是什麼，開什麼玩笑！？起碼給一個不是兇的吧！"
1003106-139 = "還傳聞這裡很靈驗！？結果全部都跟「凶」脫不了關係！？當，當然啦，我是完全不信的……！"
1003106-140 = "[s] 「那麼，我也來抽吧。」"
1003106-149 = "[ns] 「啊，是大吉。」"
1003106-150 = "什麼！？"
1003106-151 = "給，給我看看，老師！是怎樣的內容！？"
1003106-155 = "「將會有美麗的際遇。最好珍惜身邊的人」"
1003106-156 = "身邊的人……？"
1003106-157 = "[s] 「是這麼寫的。」"
1003106-161 = "呵呵，呵呵呵。"
1003106-162 = "原來如此！"
1003106-163 = "嘿，這樣沒錯！"
1003106-164 = "這確實有靈驗呢……！嗯，我收下了！"
1003106-165 = "[s] 「收下了……？」"
1003106-166 = "又，又沒關係！反正結論好，一切都會好啊。有出來好結果不就好了嗎？"
1003106-170 = "走吧，老師，把抽到的籤全部拿去打結吧！"
1003106-171 = "……不過，這麼多打得完嗎……？"
1003106-172 = "[s] 「我來幫忙。」"
1003106-173 = "嗯，好。謝謝。"
1003106-174 = "珍惜身邊的人……籤上是這麼寫的。"
1003106-175 = "呵呵呵，那就照它所說的……"
1003106-181 = "今年一整年，也請多多指教囉。老師♪"

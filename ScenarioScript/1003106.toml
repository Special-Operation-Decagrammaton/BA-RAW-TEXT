[translation]
1003106-1 = "Reading New Year Fortunes"
1003106-2 = "You can't celebrate New Year's Day without omikuji, Sensei."
1003106-3 = "[s] \"Is that so?\""
1003106-4 = "Everyone wishes for good fortune in the new year, right?"
1003106-5 = "That much is obvious."
1003106-6 = "That said, I don't think a simple omikuji can determine your fate for the year, no matter what kind of fortune you get."
1003106-7 = "Still, as a boss and leader of an organization, I think there is some charm in taking the opportunity to glance at my fortune for the year."
1003106-8 = "It's just a little harmless fortune-telling."
1003106-9 = "[s] \"If you say so...\""
1003106-10 = "I do say so! Come on, let's go pick out our omikuji together."
1003106-11 = "You never know! I might pick out first prize!"
1003106-12 = "Just watch me! ♪"
1003106-13 = "[s] \"Is that how omikuji works?\""
1003106-17 = "Oh, here it is."
1003106-18 = "Basically, you shake the container, take the stick that comes out, check the number written on it...then open the drawer with the same number written and check your fortune. That's all there is to it."
1003106-19 = "Each try is 100 yen."
1003106-20 = "I'll go first."
1003106-27 = "My number is...45."
1003106-29 = "Now to check the drawer..."
1003106-33 = "My fortune is..."
1003106-34 = "...a small curse?"
1003106-35 = "\"Be aware your business may falter, and the market is unfavorable. You may have trouble with friends.\" What the...?"
1003106-36 = "[s] \"That doesn't sound good.\""
1003106-37 = "Hmmm. Well, it's not like I believe in it or anything."
1003106-38 = "What's that thing called again? The Barnum effect?"
1003106-39 = "When you're presented with a plausible statement and unwittingly tie it to your specific circumstances..."
1003106-40 = "[s] \"Well, it's still your fortune. Want to go tie it up?\""
1003106-44 = "[ns] \"Aru?\""
1003106-45 = "Sorry, Sensei, but I can't do it. Accepting a losing fortune like that feels like giving up, doesn't it?"
1003106-46 = "I'm going to pick another one. It's just 100 yen."
1003106-53 = "Okay, I drew 87 this time."
1003106-57 = "My fortune is..."
1003106-61 = "...a curse?"
1003106-62 = "\"It's not time to achieve your goals, and you must remain patient. Beware of challenges, for your business is doomed to fail.\""
1003106-66 = "[ns] \"Aru?\""
1003106-67 = "Heh heh."
1003106-68 = "Heh heh heh. Very well. I accept this challenge."
1003106-69 = "I'm not going to give up, no matter how many times I'm cursed!"
1003106-70 = "[s] \"You don't have to take it so seriously, Aru!\""
1003106-71 = "But I do, Sensei! This means war! War between me and the omikuji!"
1003106-72 = "How dare it claim that Problem Solver 68 is going to fail?!"
1003106-79 = "Next fortune! Number 48!"
1003106-80 = "My fortune is..."
1003106-82 = "...a half-curse?!"
1003106-83 = "\"Sorry about your business\"?!"
1003106-84 = "Okay, next!"
1003106-91 = "Future curse!"
1003106-100 = "Great curse?!"
1003106-105 = "...!"
1003106-110 = "...?"
1003106-115 = "...!"
1003106-117 = "*pant* *pant*"
1003106-118 = "[s1] \"So many draws and all curses. Amazing.\"\n[s2] \"I never knew there were so many types of curses.\""
1003106-119 = "Ugh! I-I'm not giving up!"
1003106-120 = "Ugh! I-I'm not giving up!"
1003106-121 = "Th-This is my last 100 yen!"
1003106-128 = "The one and only Number 1!"
1003106-132 = "My fortune is...!"
1003106-137 = "...a \"kinda-sorta-not-really curse\"?"
1003106-138 = "How is this possible?! There has to be at least one that isn't a curse!"
1003106-139 = "I thought this was supposed to be a sacred place! Not that I'm superstitious, but give me a break!"
1003106-140 = "[s] \"Here, let me try.\""
1003106-149 = "[ns] \"Oh. I got a great blessing.\""
1003106-150 = "What?!"
1003106-151 = "Let me see that, Sensei! What does it say?!"
1003106-155 = "\"A great encounter awaits you. Treat the one next to you especially well.\""
1003106-156 = "The person next to you...?"
1003106-157 = "[s] \"That's what it says.\""
1003106-161 = "Heh. Heh heh."
1003106-162 = "Of course!"
1003106-163 = "Haha! Now I understand!"
1003106-164 = "This place really is sacred! It all makes perfect sense!"
1003106-165 = "[s] \"Does it?\""
1003106-166 = "U-Uh, yeah. I mean, we got a good result in the end, so all's well that ends well, right?"
1003106-170 = "Come on, Sensei. Let's go tie up all the fortunes we picked!"
1003106-171 = "It might take me a while to tie all of mine up, though..."
1003106-172 = "[s] \"I'll help.\""
1003106-173 = "O-Oh. Right."
1003106-174 = "Like what's written in your fortune."
1003106-175 = "Treat the person next to you well... Heehee."
1003106-181 = "Here's to another year of working together, Sensei. ♪"

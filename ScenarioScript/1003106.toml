[translation]
1003106-1 = "เสี่ยงทายดวงปีใหม่"
1003106-2 = "ฮุฮุ ถ้าพูดถึงปีใหม่ละก็ต้องเป็นการเสี่ยงทายโอะมิกุจิสิ!"
1003106-3 = "[s] \"งะ...งั้นเหรอ?\""
1003106-4 = "ไม่ว่าใครก็อยากโชคดีในวันปีใหม่ใช่มั้ยล่ะ?"
1003106-5 = "มันแน่นอนอยู่แล้ว"
1003106-6 = "แต่ถึงผลเสี่ยงทายโอะมิกุจิจะออกมาเป็นแบบไหน ฉันก็ไม่คิดว่ามันจะเป็นตัวตัดสินดวงในปีนี้#nของเราหรอก"
1003106-7 = "แต่ยังไงในฐานะประธานและหัวหน้าหน่วย ฉันคิดว่าอย่างน้อยก็ควรมาลองเสี่ยงทายดวงของปีนี้#nดูสักหน่อย"
1003106-8 = "จะได้สมกับเป็นธรรมเนียมปีใหม่ไงล่ะ"
1003106-9 = "[s] \"งั้นเหรอ...?\""
1003106-10 = "เฮ้อ อย่ามัวแต่คุยอยู่เลย รีบไปเสี่ยงทายกันเถอะ"
1003106-11 = "ใครจะรู้ล่ะ อาจเสี่ยงทายได้รางวัลใหญ่ก็ได้นะ"
1003106-12 = "อื้อ ถ้าเป็นฉันก็อาจจะมีโอกาสก็ได้นะ~♪"
1003106-13 = "[s] \"โอะมิกุจิมีลุ้นอะไรแบบนั้นด้วยเหรอ?\""
1003106-17 = "ที่นี่ไง"
1003106-18 = "\"เขย่ากระบอกไม้ไผ่ แล้วก็ดูหมายเลขที่อยู่บนไม้... จากนั้นก็ไปหาลิ้นชักที่มีหมายเลขนั้นเขียนไว้ แล้วหยิบผลเสี่ยงทายมาอ่านดวง\" เห็นเขียนไว้แบบนี้น่ะ"
1003106-19 = "ครั้งละหนึ่งร้อยเยน"
1003106-20 = "ถ้างั้นฉันขอลองก่อนนะ"
1003106-27 = "อ่า... ออกมาแล้ว เบอร์ 45..."
1003106-29 = "ไปดูผลเสี่ยงทายกันเถอะ..."
1003106-33 = "ผลทำนายดวง..."
1003106-34 = "โชคร้ายเล็กน้อย...?"
1003106-35 = "เขียนไว้ว่า \"จงระวัง ธุรกิจจะมีการสั่นคลอน อาจเกิดเรื่องไม่ลงรอยกับเพื่อนร่วมงานได้ และการค้าขายไม่ดี\" น่ะ..."
1003106-36 = "[s] \"ไม่ค่อยดีเท่าไรเลย\""
1003106-37 = "อืม ถึงฉันจะไม่ค่อยเชื่อก็เถอะนะ"
1003106-38 = "แบบนี้มันคือ... ปรากฏการณ์ฟอเรอร์เหรอ?"
1003106-39 = "ที่ว่าอาจเจอสิ่งที่มีความเชื่อมโยงกับสถานการณ์ของเราโดยบังเอิญน่ะ..."
1003106-40 = "[s] \"ถ้างั้นเอาผลเสี่ยงทายไปผูกเลยมั้ย?\""
1003106-44 = "[ns] \"อารุ?\""
1003106-45 = "ไม่ได้การละคุณครู ถ้ายอมรับโชคอันนี้ี้ก็เหมือนฉันแพ้น่ะสิ"
1003106-46 = "ฉันจะลองเสี่ยงทายอีกครั้ง ถ้าแค่ร้อยเยน... ไม่มีปัญหาหรอก"
1003106-53 = "คราวนี้ได้เบอร์ 87..."
1003106-57 = "ผลทำนาย..."
1003106-61 = "โชคร้าย...?"
1003106-62 = "\"ยังไม่ถึงเวลาที่งานที่อุตสาหะเพียรทำมาจะสำเร็จ จงรอคอยด้วยความอดทน...#nจงระวังตัวเพราะอาจมีเรื่องทะเลาะวิวาท... และทำให้ธุรกิจล้มเหลว\""
1003106-66 = "[ns] \"อารุจัง?\""
1003106-67 = "ฮุฮุ"
1003106-68 = "ฮุฮุฮุ ก็ได้ ฉันขอรับคำท้า!"
1003106-69 = "เสี่ยงทายได้คำทำนายแย่ๆ แบบนี้ ใครจะไปยอมแพ้กันเล่า?!"
1003106-70 = "[s] \"นี่ไม่ใช่การแข่งขันนะอารุจัง!\""
1003106-71 = "ไม่เลย คุณครู! นี่คือการแข่งขัน! การแข่งขันระหว่างฉันกับโอะมิกุจิ!"
1003106-72 = "กล้าดียังไงมาบอกว่าหน่วยรับจ้างสารพัด 68 จะล้มละลาย!"
1003106-79 = "ดวงใบต่อไป ใบเลขที่ 48!"
1003106-80 = "คำทำนายล่ะ?!"
1003106-82 = "โชคร้ายครึ่งหนึ่ง?!"
1003106-83 = "\"เรื่องเสียใจ... ทางธุรกิจ\"...?!"
1003106-84 = "ดีล่ะ ใบต่อไป!"
1003106-91 = "โชคร้ายตามกรรม...!"
1003106-100 = "ชะ...โชคร้ายมาก?!"
1003106-105 = "...!"
1003106-110 = "...?"
1003106-115 = "...!!!"
1003106-117 = "เฮ้อ... เฮ้อ..."
1003106-118 = "[s1] \"เปิดมาเจอแต่โชคร้ายทั้งนั้นเลยเหรอ... สุดจริง\"\n[s2] \"ไม่รู้มาก่อนเลยว่าโชคร้ายจะแบ่งยิบย่อยแบบนี้\""
1003106-119 = "อึก! ฉะ...ฉันไม่ยอมแพ้หรอก...!"
1003106-120 = "อึก! ฉะ...ฉันไม่ยอมแพ้หรอก...!"
1003106-121 = "นะ...นี่เป็นเหรียญร้อยเยนสุดท้ายของฉันแล้ว...!"
1003106-128 = "ได้หมายเลข... 1!"
1003106-132 = "คำทำนายล่ะ...!"
1003106-137 = "\"ถึงจะพบเจอโชคร้าย แต่ก็ไม่ใช่ว่าโชคร้ายจะไม่มีที่สิ้นสุด\"...?"
1003106-138 = "นะ...นี่มันอะไรกันเนี่ย?! ไม่ต้องเป็นโชคร้ายก็ได้นี่!"
1003106-139 = "นึกว่าเป็นสถานที่ศักดิสิทธิ์ เสี่ยงทายได้ผลดีไงล่ะ ถึงฉันจะไม่ได้เชื่ออะไรมากมาย แต่แบบนี้ก็เกินไปนะ!"
1003106-140 = "[s] \"ถ้างั้นก็ถึงตาครูแล้วสินะ\""
1003106-149 = "[ns] \"อ๊ะ ครูได้ 'โชคดีมาก' ด้วยละ\""
1003106-150 = "ว่ายังไงนะ?!"
1003106-151 = "ส่งมานี่ซิ! คำทำนายเขียนว่าอะไรน่ะ?!"
1003106-155 = "\"การพบพานที่ยิ่งใหญ่รอคุณอยู่ จงให้ความสำคัญกับคนที่อยู่ข้างๆ คุณ\""
1003106-156 = "คนที่อยู่ข้างๆ... งั้นเหรอ?"
1003106-157 = "[s] \"เขียนไว้แบบนั้นน่ะ\""
1003106-161 = "ฮุฮุฮุ ฮุฮุฮุ"
1003106-162 = "แน่นอน!"
1003106-163 = "ฮึ~! แบบนี้นี่เอง!"
1003106-164 = "ก็ศักดิ์สิทธิ์ตามที่ได้ยินมาจริงๆ...! อื้อ เชื่อแล้วละ!"
1003106-165 = "[s] \"เชื่อแล้วสินะ...\""
1003106-166 = "อะ...อะไรเล่า! ถ้าจบได้สวยก็ถือว่าดีทั้งหมดละ แค่ได้ผลลัพธ์ดีๆ ก็พอแล้ว"
1003106-170 = "เอาละคุณครู ถ้างั้นก็เอาผลเสี่ยงทายไปผูกกันเถอะ!"
1003106-171 = "แต่ว่าเยอะขนาดนี้จะผูกหมดเมื่อไรเนี่ย...?"
1003106-172 = "[s] \"ครูช่วยเอง\""
1003106-173 = "งะ...งั้นเหรอ"
1003106-174 = "คำทำนายบอกไว้นะว่า \"จงให้ความสำคัญกับคนที่อยู่ข้างๆ น่ะ\""
1003106-175 = "ฮุฮุฮุ ถ้าเป็นตามคำทำนาย คนที่อยู่ข้างๆ คุณครู..."
1003106-181 = "ปีนี้ก็ขอฝากตัวด้วยนะ คุณครู♪"

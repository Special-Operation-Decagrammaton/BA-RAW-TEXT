[translation]
83306070100-6 = "Ah, Head Prefect. You're here."
83306070100-7 = "What happened here? There are quite a few casualties."
83306070100-8 = "Ah... It's nothing serious. We merely encountered some troublemakers during one of the Prefect Team's regular patrols."
83306070100-9 = "Many members of the Prefect Team sustained injuries, including Iori."
83306070100-10 = "Even Iori...? Was their opposition that serious?"
83306070100-11 = "No, I wouldn't say that. Most of them only got scratches..."
83306070100-12 = "But Iori fell down into the sewers during the battle with the troublemakers."
83306070100-14 = "How was I supposed to know that there was a hole there?!"
83306070100-17 = "...Yes, that sounds like one of her usual disasters."
83306070100-18 = "Sena from the Medical Emergency Club is unavailable, so it'll take some time to treat everyone here myself..."
83306070100-19 = "In that case, I'll assist you."
83306070100-21 = "Thank you for your help, Head Prefect."

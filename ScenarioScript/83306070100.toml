[translation]
83306070100-6 = "啊，委員長。您來了啊。"
83306070100-7 = "好像有很多人受傷，發生了什麼事？"
83306070100-8 = "啊……其實是在這次風紀委員會定期巡邏時……和問題學生之間發生了一點糾紛。"
83306070100-9 = "因此讓包含伊織在內的許多風紀委員受傷了。"
83306070100-10 = "連伊織也受傷了……？糾紛那麼嚴重嗎？"
83306070100-11 = "啊，其實也不是什麼大不了的事。#n大部分的人都只有一些擦傷……"
83306070100-12 = "只是伊織在和問題學生戰鬥時……不小心踩進下水道跌倒了。"
83306070100-14 = "我怎麼會知道那邊有下水道的洞啦！"
83306070100-17 = "……原來如此，那真是場災難。"
83306070100-18 = "話說回來，瀬奈前輩似乎不在急救醫學部。#n治療可能還需要一點時間……"
83306070100-19 = "嗯……如果是這樣的話，我也來幫忙吧。"
83306070100-21 = "啊，謝謝您，委員長。那就麻煩您了。"

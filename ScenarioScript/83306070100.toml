[translation]
83306070100-6 = "อ๊ะ ท่านประธาน มาแล้วเหรอคะ"
83306070100-7 = "เหมือนจะมีคนได้รับบาดเจ็บเยอะเลย เกิดอะไรขึ้นสินะ?"
83306070100-8 = "อ่า... พอดีว่าพวกเด็กเจ้าปัญหาเข้ามาก่อกวนระหว่างการลาดตระเวนเป็นประจำของคณะกรรมการวินัย#nน่ะค่ะ"
83306070100-9 = "อิโอริกับคณะกรรมการวินัยคนอื่นก็เลยได้รับบาดเจ็บกันค่ะ"
83306070100-10 = "อิโอริก็ด้วยเหรอ...? แสดงว่าเข้ามาก่อกวนหนักเลยงั้นสินะ?"
83306070100-11 = "อ่า ก็ไม่ถึงกับขนาดนั้นหรอกค่ะ ส่วนใหญ่ที่ได้รับบาดเจ็บกันก็จะมีแค่รอยขีดข่วนเล็กๆ น้อยๆ บนตัว..."
83306070100-12 = "ส่วนอิโอริ ที่บาดเจ็บก็เพราะตกลงไปในทางระบายน้ำเสียระหว่างต่อสู้ค่ะ"
83306070100-14 = "ใครจะไปรู้ล่ะว่าจะมีรูอยู่ที่ทางระบายน้ำเสียแบบนั้นน่ะ~!"
83306070100-17 = "อืม... มันคงจะเป็นอุบัติเหตุละเนอะ"
83306070100-18 = "ถึงอย่างนั้นก็เถอะค่ะ ตอนนี้รุ่นพี่เซนะจากหน่วยแพทย์ฉุกเฉินน่าจะไม่อยู่ เลยอาจต้องใช้เวลารักษา#nนานหน่อยค่ะ..."
83306070100-19 = "ฮืม... เรื่องนั้นไม่เป็นไรหรอก เดี๋ยวฉันช่วยเอง"
83306070100-21 = "อ๊ะ ขอบคุณค่ะ ท่านประธาน ถ้างั้นก็รบกวนด้วยนะคะ"

[translation]
80000006-1 = "ช็อกโกแลตของสไนเปอร์"
80000006-2 = "คลังอุปกรณ์ ชมรมทวงความยุติธรรม"
80000006-3 = "(คุณครูช่วยมาชิโระจัดเก็บของในคลังของชมรมทวงความยุติธรรม)"
80000006-4 = "ขอบคุณที่มาช่วยฉันจัดการคลังอุปกรณ์นะคะ"
80000006-5 = "คลังเก็บของของชมรมเรากว้างมาก แค่ฉันคนเดียวทำทั้งวันก็คงไม่เสร็จหรอกค่ะ"
80000006-6 = "[s] \"เป็นหน้าที่ครูอยู่แล้ว ไม่เป็นไรหรอก\""
80000006-7 = "ขอบคุณค่ะ คุณครู ขอบคุณที่เอาใจใส่ฉันเสมอเลยนะคะ"
80000006-8 = "ฉันไม่มีอะไรตอบแทนคุณครูเลย ถ้าคุณครูเจอของที่อยากได้จากที่นี่ก็เอากลับไปได้นะคะ"
80000006-9 = "อุปกรณ์ที่อยู่ในคลังของเรา ส่วนใหญ่เป็นของที่ไม่ได้ใช้งานและไม่ได้บันทึกเอาไว้ในรายการอุปกรณ์#nของชมรมค่ะ"
80000006-10 = "[s] \"ถ้างั้นก็ไม่ต้องมาจัดการก็ได้นี่นา?\""
80000006-11 = "ไม่หรอกค่ะ ถึงจะบอกว่าเป็นของไม่ได้ใช้งานก็จริง แต่ส่วนใหญ่ก็ยังเป็นของสภาพดี เพราะงั้นเลย#nจะมีวันที่เอาออกไปใช้ได้อยู่บ้างค่ะ"
80000006-12 = "นอกจากนี้ พวกอาหารฉุกเฉินถ้าปล่อยเอาไว้ก็อาจจะเน่าเสียได้..."
80000006-16 = "เอ๊ะ นี่มัน...?"
80000006-22 = "[ns1] \"นี่อะไรน่ะ?\"\n[ns2] \"ก้อนอิฐเหรอ...?\""
80000006-23 = "ช็อกโกแลตน่ะค่ะ"
80000006-24 = "ไม่ใช่ค่ะ มันคือช็อกโกแลตค่ะ"
80000006-25 = "อาหารฉุกเฉินที่ทำมาจากช็อกโกแลตผสมกับข้าวโอ๊ตน่ะค่ะ เป็นอาหารที่ถึงจะทานในปริมาณน้อย แต่ก็จะได้รับพลังงานสูงค่ะ"
80000006-26 = "ฮุฮุ พอดีเลยนะคะ ฉันต้องซื้ออาหารฉุกเฉินใหม่สำหรับปฏิบัติการต่อไปพอดี... แค่มีเจ้านี่ก็น่าจะพอแล้วละค่ะ"
80000006-27 = "คุณครูอยากลองชิมสักคำมั้ยคะ?"
80000006-31 = "[ns3] \"แหวะ ไม่อร่อยเลย!\"\n[ns4] \"เสียแล้วรึเปล่าน่ะ?\""
80000006-32 = "แปลกจัง ยังไม่หมดอายุสักหน่อยนะคะ"
80000006-33 = "ไม่นะคะ มันยังไม่หมดอายุเลยนะคะ"
80000006-34 = "ช็อกโกแลตพวกนี้ผลิตมาไว้ให้กินเพื่อรอดชีวิต ไม่ใช่ขนมกินเล่นน่ะค่ะ"
80000006-35 = "เนื่องจากเป็นผลิตภัณฑ์ที่ผลิตขึ้นมาด้วยแนวคิด \"อาหารที่ให้พลังงานสูง\" ดังนั้นสำหรับฉันแล้ว#nจุดประสงค์การผลิตดั้งเดิมของช็อกโกแลตพวกนี้เลยใกล้เคียงกับ \"ความยุติธรรม\" มากกว่าช็อกโกแลต#nแบบอื่นๆ ในท้องตลาดค่ะ"
80000006-36 = "อาจจะดูไม่เข้ากันก็จริง แต่ถ้าคุณครูไม่ว่าอะไร... ช่วยรับช็อกโกแลตนี้ไปได้รึเปล่าคะ?"
80000006-40 = "ถึงรสชาติจะไม่อร่อยเท่าไร แต่มันก็เป็นอาหารที่ให้พลังงานสูง..."
80000006-41 = "แต่ถ้าคุณครูเข้าใจถึงคำนิยามของความยุติธรรมของฉัน..."
80000006-42 = "ฉันก็คงจะมีความสุขไม่น้อยเลยละค่ะ"

80000006-22 = "[ns1] \"이게 뭐야?\"\n[ns2] \"벽돌인가……?\""
80000006-23 = "3;마시로;01;아뇨, 이것은 초콜릿입니다.\n#3;em;[반응]\n#3;a"
80000006-24 = "3;마시로;01;아뇨, 이것은 초콜릿입니다.\n#3;em;[반응]\n#3;a"
80000006-25 = "3;마시로;99;설탕과 귀리를 섞어 만든 비상식용 초콜릿으로, 부피는 작지만 칼로리가 엄청나답니다."
80000006-26 = "3;마시로;03;후후, 마침 잘 되었네요. 안 그래도 다음 작전을 대비하여 부피가 작은 비상식량을 새로 구매할까 고민 중이었는데…… 이걸 가져가면 될 것 같습니다.\n#3;greeting\n#3;em;[반짝]"
80000006-27 = "3;마시로;03;괜찮으시다면 선생님도 한 번 맛보시겠습니까?"
80000006-28 = "#st;[0,0];instant;1;"

[translation]
80000006-1 = "#title;저격수의 초콜릿"
80000006-2 = "#place;정의실현부 비품 창고"
80000006-3 = "#na;(마시로와 함께 정의실현부의 창고 정리를 도왔다.)"
80000006-4 = "3;마시로;03;창고의 비품 정리를 도와주셔서 감사합니다.\n#3;em;[반짝]\n#3;greeting\n#3;a"
80000006-5 = "3;마시로;06;정의실현부의 비품 창고는 워낙 넓은지라, 저 혼자 정리했으면 하루가 걸려도 끝내지 못했을 겁니다."
80000006-6 = "[s] \"마침 비번이라서 괜찮아.\""
80000006-7 = "3;마시로;01;감사합니다, 선생님. 언제나 신세를 지고 있습니다."
80000006-8 = "3;마시로;03;답례라기는 뭣하지만, 이곳에서 혹시 필요한 물건을 발견하시거든 가져가셔도 괜찮습니다.\n#3;em;[음표]"
80000006-9 = "3;마시로;00;이 창고에 있는 비품들은 모두 정의실현부의 장부에 기록되지 않은 불용품이니까요."
80000006-10 = "[s] \"그럼 이렇게 정리를 할 필요는 없지 않아?\""
80000006-11 = "3;마시로;02;아뇨. 그렇다고는 해도 대부분 상태는 멀쩡하니, 언젠가 새로 사용할 날이 있을지도 모르니까요.\n#3;em;[반응]\n#3;stiff"
80000006-12 = "3;마시로;06;게다가 여기의 비상식량 같은 물건은 방치되면 썩을 수도 있으니…….\n#3;m4"
80000006-13 = "#st;[0,0];instant;1;"
80000006-14 = "#clearST"
80000006-15 = "3;마시로;06\n#3;em;…\n#wait;2500"

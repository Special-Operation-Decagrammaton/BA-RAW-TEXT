[translation]
80000006-1 = "狙擊手的巧克力"
80000006-2 = "實現正義部．備品倉庫"
80000006-3 = "（和麻白一起整理了實現正義部的倉庫）"
80000006-4 = "感謝老師的幫忙。"
80000006-5 = "實現正義部的備品倉庫太大，只靠我一個人整理可能一天都做不完。"
80000006-6 = "[s]「別客氣，我今天正好有空。」"
80000006-7 = "謝謝你，老師。一直都很感謝你。"
80000006-8 = "雖然算不上什麼謝禮，不過如果老師有看到什麼想要的東西，直接拿回去也沒關係。"
80000006-9 = "因為這個倉庫裡的東西都已經被判斷為廢棄品，沒有紀錄在實現正義部的帳簿裡。"
80000006-10 = "[s]「原來如此。即使如此還是得整理啊？」"
80000006-11 = "是的。物品本身的狀態並沒有什麼問題，或許會有派得上用場的一天。"
80000006-12 = "而且這裡還存放著緊急糧食，放著不管的話會腐壞的。"
80000006-16 = "……咦，這是？"
80000006-22 = "[ns1]「這是什麼……？」\n[ns2]「磚塊……？」"
80000006-23 = "不，這是巧克力。"
80000006-24 = "不，這是巧克力。"
80000006-25 = "是加入砂糖和燕麥製成的緊急糧食巧克力。是體積小卻能獲得大量卡路里的好東西。"
80000006-26 = "呵呵，正好。我剛好在煩惱要不要為了準備下次作戰去買新的緊急糧食……#n帶著這個應該就沒問題了。"
80000006-27 = "老師不介意的話要不要嚐一口看看？"
80000006-31 = "[ns3]「……難以評論的味道！」\n[ns4]「保存期限是不是……？」"
80000006-32 = "我看看……保存期限還很長呢。"
80000006-33 = "我看看……保存期限還很長呢。"
80000006-34 = "這個巧克力的重點是維生，而不是用來品嘗的。"
80000006-35 = "有人說巧克力本來的目的是「獲得能量」。#n考量到對這個定義的符合程度……這個巧克力可以說是比其他任何巧克力都還「正義」呢。"
80000006-36 = "……雖然沒什麼關連，老師不介意的話可以收下這份巧克力嗎？"
80000006-40 = "當然，它的味道不怎麼樣……但是某種意義上……"
80000006-41 = "那個，老師如果能收下我所認為的「正義」……"
80000006-42 = "我會很開心的。"

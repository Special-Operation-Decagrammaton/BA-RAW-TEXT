80000006-31 = "[ns3] \"맛없어!\"\n[ns4] \"이거, 상한 거 아냐?\"\n#bgshake"
80000006-32 = "3;마시로;02;아뇨, 유통기한은 아직 한참 남아있습니다.\n#3;em;[...]"
80000006-33 = "3;마시로;02;아뇨, 유통기한은 아직 한참 남아있습니다.\n#3;em;[...]"
80000006-34 = "3;마시로;01;이 초콜릿의 목적은 생존이지, 미식을 위한 제품이 아니니까요."
80000006-35 = "3;마시로;99;초콜릿 본연의 목적이었던 '고열량 각성제' 라는 컨셉에 맞추어 충실하게 제작된 물건인 만큼, 제게는 이 초콜릿이 시중의 그 어떤 초콜릿보다 '정의'에 가깝게 여겨집니다."
80000006-36 = "3;마시로;03;……조금 다른 이야기이긴 합니다만, 괜찮으시다면 이 초콜릿을 받아주시겠습니까?\n#3;em;[?]"

[translation]
80000006-1 = "The Sniper's Chocolate"
80000006-2 = "Justice Task Force Storage Room"
80000006-3 = "I arrived to help Mashiro organize the Justice Task Force's storage room."
80000006-4 = "Thank you for agreeing to do this."
80000006-5 = "Our storage room is filled to the brim. I was concerned I wouldn't be able to finish it by the end of the day."
80000006-6 = "[s] \"No worries. Today's my day off.\""
80000006-7 = "Thank you, Sensei. I owe you yet again."
80000006-8 = "I can't offer you much in return, but perhaps you can find something in here that would be useful to you."
80000006-9 = "These supplies are no longer used nor registered in the Justice Task Force's ledger, so please take anything that catches your eye."
80000006-10 = "[s] \"But it still needs to be organized?\""
80000006-11 = "Yes. There are things here that are still in good condition,#nso they may have value."
80000006-12 = "Not to mention there's a supply of emergency food. It would take a while, but it can spoil if left alone for long enough."
80000006-16 = "Hmm? Speaking of..."
80000006-22 = "[ns1] \"What's that?\"\n[ns2] \"An edible brick?\""
80000006-23 = "It's chocolate."
80000006-24 = "No, it's chocolate."
80000006-25 = "Well, chocolate rations to be exact. It's made by mixing sugar and oats.#nIt's very high in calories despite its portion sizes."
80000006-26 = "This is perfect. I was just thinking about bringing rations with me on my next mission. This will do just fine."
80000006-27 = "Care to try one?"
80000006-31 = "[ns3] \"It's terrible!\"\n[ns4] \"Did they expire?!\""
80000006-32 = "Hmm. It says here the expiration date is still far in the future."
80000006-33 = "Hmm. It says here the expiration date is still far in the future."
80000006-34 = "Remember this chocolate is for survival, not flavor."
80000006-35 = "In fact, this chocolate is more faithful to chocolate's original concept as a high-calorie stimulant. In that sense, it does more justice to chocolate's name than your average candy bar."
80000006-36 = "I have an idea. Would you do me the honor of accepting this chocolate?"
80000006-40 = "It's not very tasty and is ultimately just empty calories..."
80000006-41 = "...but it also represents my idea of justice, in a way."
80000006-42 = "And it would make me happy if you could accept my idea of justice."

[translation]
10046025-3 = "Ichika! Don't be mean, Cutie Pie! Don't act like you don't know me!"
10046025-4 = "I wish I never met you!"
10046025-5 = "Takes a player to know one, right?"
10046025-6 = "I'm no...\"player\"! Stop...zig-zagging! Get over here!"
10046025-7 = "Wahahaha! Oh, you're persistent! Like a...ferret on the hunt!"
10046025-12 = "..."
10046025-16 = "Ah, sorry. I...went into a bit of a trance."
10046025-17 = "I've never seen Ichika get so worked up."
10046025-18 = "That Kasumi girl... Do they have some kind of rivalry?"
10046025-19 = "[s1] \"It's a long story.\"\n[s2] \"It's best not to get into it...\""
10046025-24 = "I'll take your word for it."
10046025-30 = "Hm... I think that's enough for today! Retreat!"
10046025-38 = "Not today! Hasumi! I'll herd them!"
10046025-42 = "Ha, like our first mission as a team. All right, I'll move to the rear."
10046025-47 = "Everyone, stop!"
10046025-51 = "...Mika?"
10046025-57 = "Please. I'm asking you to stop chasing the Hot Springs Department."
10046025-58 = "But what if they..."
10046025-59 = "Yes, I know. They'll return and trash our precious beach with their shovels and explosives."
10046025-60 = "But, most importantly, Nagi will arrive soon."
10046025-64 = "And, as far as I'm concerned, she's our priority."
10046025-65 = "If she sees fighting, or signs of fighting, she'll fret and work herself up."
10046025-66 = "So, chasing Gehenna, or arresting them... I think that will have to wait."
10046025-67 = "If it comes down to it, I don't mind losing part of the beach. What's most important..."
10046025-72 = "...is keeping the peace. Making sure Nagi doesn't have to step in..."
10046025-73 = "...Right?"
10046025-74 = "Now, everyone! Please follow me and we'll get on schedule!"
10046025-75 = "[s3] \"You're amazing, Mika.\"\n[s4] \"I'll help any way I can.\""
10046025-82 = "...I'm embarrassed. All of that fighting was beneath me."
10046025-83 = "You're absolutely right. The top priority here is Nagisa. She deserves to rest."
10046025-84 = "Uh... I'll start picking this stuff up."
10046025-88 = "Let's clear everything. Time's running short."
10046025-96 = "...It's massive."
10046025-97 = "They left enough materials to construct a building, maybe two! What were they planning?"
10046025-98 = "What else? A hot spring."
10046025-99 = "...I see. They're a bit...fixated, aren't they?"
10046025-100 = "But at least we locked up their materials. They shouldn't be building anytime soon."
10046025-101 = "...Maybe they'll stay quiet during our stay, at least."
10046025-102 = "Ahaha... Yeah, I hope so."
10046025-103 = "As long as this vacation ends well."
10046025-104 = "Yeah, if everyone's all right in the end, it doesn't matter."
10046025-108 = "Mika?"
10046025-112 = "Oh, nothing!"
10046025-113 = "Thank you all so much."
10046025-115 = "It was our duty and our pleasure!"
10046025-117 = "Yes. Say no more."
10046025-118 = "Still, I just want to show my gratitude."
10046025-119 = "...Heehee."
10046025-121 = "Mika...?"
10046025-122 = "[s5] \"...Mika?\"\n[s6] \"What's so funny?\""
10046025-127 = "Ah, um. It's nothing. It's just..."
10046025-128 = "I just have such a good feeling! Everything's going to be great, and it's all because we worked together!"
10046025-129 = "...Yeah!"
10046025-130 = "Everything will turn out just fine! For sure!"

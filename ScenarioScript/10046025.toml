[translation]
10046025-3 = "哎呀，一花醬～#n一言不合就動手是不是有點過分了？我們又不是外人。"
10046025-4 = "我反而希望跟你是外人好嗎！"
10046025-5 = "哎～本是同根生，何必這樣呢？"
10046025-6 = "誰跟你是同根生啊！！#n從剛才就一直嘰哩呱啦的！！給我站住！！"
10046025-7 = "哈～哈哈！還真是跟野馬一樣充滿活力啊！"
10046025-12 = "…………"
10046025-16 = "啊，不好意思。剛才有點走神了。"
10046025-17 = "我還是第一次見到一花這麼激動的樣子。"
10046025-18 = "特別是對那個叫佳澄的格黑娜學生……難道他們之間有什麼過節嗎？"
10046025-19 = "[s1]「這件事說來話長。」\n[s2]「So bad hard sad story……」"
10046025-24 = "……？#n雖然不是很懂，看來確實有些故事呢。"
10046025-30 = "唔嗯～果然要正面交鋒還太早了！#n大家撤退！撤退！"
10046025-38 = "你覺得我會讓你逃掉嗎！#n蓮實前輩！我來追擊他們！"
10046025-42 = "呵呵，讓我想起第一次聯合作戰的時候了呢。#n好，那我就從後方進行包抄吧。"
10046025-47 = "大家都先住手！！"
10046025-51 = "……彌香大人？"
10046025-57 = "拜託，請不要再追擊溫泉開發部了。"
10046025-58 = "可是那樣的話，溫泉開發部就會……"
10046025-59 = "嗯，我知道。#n他們會再回來，然後把這片私人海灘搞得一團亂對吧？"
10046025-60 = "但渚醬馬上就要到了。"
10046025-64 = "這次行程的目的，是為了讓渚醬能安心休息。"
10046025-65 = "如果打鬥的場面或痕跡被渚醬發現的話，他一定會非常擔心。"
10046025-66 = "所以無論追擊格黑娜，還是逮捕那些孩子之類的事情……#n我覺得都應該先擺到後面才對。"
10046025-67 = "有必要的話，就算讓出一部分的海灘也沒關係。#n最重要的是──"
10046025-72 = "不要鬧出動靜……不要讓渚醬出面……"
10046025-73 = "……嗯。"
10046025-74 = "兩位還有老師，對不起。#n但至少這次……請幫我做到這一點。"
10046025-75 = "[s3]「真了不起，彌香。」\n[s4]「我也會全力幫忙的。」"
10046025-82 = "居然做了不符合職責的事……我深感慚愧。"
10046025-83 = "是啊，這次行程最重要的是讓渚大人放鬆……"
10046025-84 = "就照彌香大人說的，先把該收拾的處理好吧。抱歉。"
10046025-88 = "趕緊開始清理吧。時間所剩不多了。"
10046025-96 = "……真是驚人啊。"
10046025-97 = "這些建材足夠蓋一兩棟大樓了……他們到底打算在這裡做什麼？"
10046025-98 = "應該是溫泉吧，大概。"
10046025-99 = "……溫泉開發部之所以惡名昭彰，果然不是空穴來風啊。"
10046025-100 = "不過既然被沒收了這麼多建材，他們應該暫時無法重整旗鼓才對。"
10046025-101 = "……至少在這次渡假期間會安分一點吧。"
10046025-102 = "啊哈哈……嗯，希望如此。"
10046025-103 = "只要這次渡假能平安結束就好。"
10046025-104 = "嗯，只要這次渡假能平安結束，之後怎樣都無所謂。"
10046025-108 = "彌香大人？"
10046025-112 = "沒，沒什麼。"
10046025-113 = "謝謝你們大家。"
10046025-115 = "別，別這麼說！這是我們應該做的！"
10046025-117 = "沒錯，這是我們的職責。"
10046025-118 = "就算是這樣，我還是想說聲謝謝。"
10046025-119 = "……嘿嘿。"
10046025-121 = "……？#n彌香大人……？？"
10046025-122 = "[s5]「……彌香？」\n[s6]「怎麼突然笑了……？」"
10046025-127 = "啊，沒什麼。我只是……"
10046025-128 = "有種……這次行程會很順利的感覺而已！#n有大家在身邊讓人很放心？"
10046025-129 = "……嗯！"
10046025-130 = "一切都會順利的！一定！！"

[translation]
90000045-4 = "รวบรวมข้อมูลของบีนาห์สำเร็จ "
90000045-5 = "ค่ะ ตรวจสอบแล้วค่ะ ผู้เลื่อมใสตนที่ 3 ของเดคาแกรมมาทอน บีนาห์ ยืนยันข้อมูลสำเร็จ"
90000045-6 = "ตอนนี้ก็เหลือแค่นำมาวิเคราะห์ ทำได้ดีมากเลยค่ะทุกคน"
90000045-7 = "[s] “ขอบใจมากนะ”"
90000045-8 = "อืม หัวหน้าก็ทำได้ดีมากเลย ที่ทำสำเร็จได้เพราะอัลกอริทึมของหัวหน้าเลยนะ"
90000045-9 = "ทีนี้ก็... จะแสดงผลการวิเคราะห์ที่หน้าจอด้านนั้นค่ะ"
90000045-16 = "อืม... มีเท่านี้เหรอ"
90000045-17 = "ถ้าวิเคราะห์จากข้อมูลที่เราได้มา ตอนนี้ก็ได้เท่านี้แหละค่ะ "
90000045-18 = "อาจจะยังไม่มากพอ แต่ก็นับว่าเป็นก้าวแรกที่สวยงามนะคะ"
90000045-19 = "อืม อย่างนั้นเหรอ ทุกอย่างต้องค่อยเป็นค่อยไปสินะ"
90000045-20 = "เป้าหมายของเราตอนนี้ก็คือการรวบรวมข้อมูลผู้เลื่อมใสแต่ละคนให้ได้มากที่สุดค่ะ"
90000045-21 = "ถ้างั้นก็พักสักหน่อย แล้วก็ไปหาผู้เลื่อมใสอีกคนที่สถานที่ต่อไปกันดีมั้ยคะ"
90000045-28 = "ที่นั่นก็คือ... <พื้นที่รกร้าง> แถบชานเมือง มิลเลเนียมค่ะ"
90000045-30 = "ตอนต่อไป;รวบรวมข้อมูล 5 - พื้นที่รกร้าง"

[translation]
90000045-4 = "薇娜的情報蒐集完畢。"
90000045-5 = "好的，已確認十字神名的第3名預言者「薇娜」的情報。"
90000045-6 = "接下來只要分析就行了。辛苦各位了。"
90000045-7 = "[s] 「有勞你了。」"
90000045-8 = "嗯，部長也辛苦了。#n這都多虧了部長的演算法哦。"
90000045-9 = "那麼……我將分析的結果顯示在那邊的螢幕上。"
90000045-16 = "唔嗯……只有這些嗎？"
90000045-17 = "以我們目前獲得的情報，能分析出的結果就只有這些了。"
90000045-18 = "雖然將來的路還很長，但我們至少踏出了第一步呢。"
90000045-19 = "嗯，也對。千里之行始於足下。"
90000045-20 = "接下來的目標是盡可能蒐集更多情報。"
90000045-21 = "稍作休息之後，就往下一個預言者的所在地移動吧。"
90000045-28 = "下一個目的地是……位於千年近郊的「廢墟」。"
90000045-30 = "下一話;蒐集情報(5)廢墟"

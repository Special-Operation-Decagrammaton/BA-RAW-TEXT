1300720-49 = "3;준코;12;아, 잘 먹었다! 어때, 선생님? 맛있었어?\n#3;em;[음표]\n#3;a"
1300720-50 = "[s] \"최고였어!\""
1300720-51 = "3;준코;02;음…… 선생님에게는 그랬구나.\n#3;greeting"
1300720-52 = "3;준코;02;나는 최고라기 보다는 가성비가 가장 좋은 가게라는 느낌인데 말이지.\n#3;em;[...]"
1300720-53 = "3;준코;00;이건 내 개인적인 의견이지만, 좋은 가게란 거기에서 음식을 먹는 사람을 만족시켜 줘야 하는 거라고 생각하거든."
1300720-54 = "3;준코;00;그 조건이 나에게는 가성비라는 거지. "
1300720-55 = "3;준코;02;아, 그렇다고 해서 무작정 싸기만 해서도 안 돼. 최저한도의 '맛'의 선은 지켜져야 하니까.\n#3;em;[반응]"
1300720-56 = "[s] \"심오하네……\""
1300720-57 = "3;준코;12;그러면 슬슬 가 볼까? 여기, 계산이요!"
1300720-58 = "[s7] \"바로 그 계산 말인데.\"\n[s8] \"내가 계산할게.\""
1300720-59 = "#wait;10"
1300720-60 = "#wait;10"
1300720-61 = "3;준코;02;어? 왜 그래. 무슨 일이라도 있어?\n#3;em;[?]"
1300720-62 = "3;준코;02;뭐……? 나중에 수첩을 공유해 줄 수 있냐고?"
1300720-63 = "[s9] \"나도 마침 이 근처 맛집 주소가 필요해서 말이야.\"\n[s10] \"수첩을 공유해 주면, 그 대가로 내가 한 턱 낼게. 어때?\""
1300720-64 = "#wait;10"
1300720-65 = "#wait;10"
1300720-66 = "3;준코;11;어…… 하지만 오늘은 내가 선생님에게 사 주기로 했는데.\n#3;stiff\n#3;em;[땀]"
1300720-67 = "3;준코;11;그러면 예정이 뭔가 어긋나는 것 같은 느낌이 드는데……?"
1300720-68 = "3;준코;99;가끔은…… 내가 사는 걸로 해 줘.\n#3;greeting"
1300720-69 = "3;준코;01;얻어먹기만 해서는 내 마음이 편하지 않다고……"
1300720-70 = "[s11] \"훗훗훗. 생각이 짧으시군요. 준코 양.\"\n[s12] \"이 몸은 준코가 그동안 기록해 온 노력의 결정체를,\"\n[s13] \"밥 한끼로 낼름 공유해 가려는 못된 어른이시다!\""

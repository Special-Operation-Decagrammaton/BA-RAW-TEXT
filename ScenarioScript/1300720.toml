[translation]
1300720-1 = "努力的成果"
1300720-6 = "（淳子氣喘吁吁地跑了過來）"
1300720-7 = "[s1]「來得真快呢，淳子。」\n[s2]「話說，你完成的東西是……？」"
1300720-10 = "哼哼～那就是……"
1300720-11 = "芝町區的美食筆記！"
1300720-12 = "[s]「美食筆記？」"
1300720-13 = "沒錯！至今為止去過的餐廳我都有做紀錄……"
1300720-14 = "而這本筆記裡，只整理了其中「好吃的餐廳」哦。"
1300720-15 = "當然，我一個人是沒有辦法吃遍奇普托斯所有餐廳的……"
1300720-16 = "所以我決定依照區域，一點一點地完成。"
1300720-17 = "然後總～算是把芝町好吃的餐廳整理好了唷！"
1300720-18 = "[s]「芝町的所有餐廳你都去過了嗎！？」"
1300720-19 = "也沒有，畢竟那實在是有點困難，多少還是有經過篩選的。"
1300720-20 = "……而且，沒有被羽留奈炸掉的店，也就代表獲得他的認可了……"
1300720-21 = "像這樣進行篩選就能節省金錢和時間，變得更有效率對吧？"
1300720-22 = "於是最終做出來的成果就是這本整理芝町美食的筆記！"
1300720-23 = "[s3]「雖然是這樣沒錯……」\n[s4]「不過美食研究會的活動，就這樣維持下去沒問題嗎……」"
1300720-26 = "總，總之！"
1300720-27 = "我已經征服芝町的所有美味的餐廳了哦！"
1300720-28 = "[s]「即使不做這種事，也能參考網路上的美食排名不是嗎？」"
1300720-29 = "哼哼。你只知其一不知其二哦，老師。"
1300720-30 = "網路的排名多半都是行銷與業配，#n常常會發現網路上的評價和實際的情況不一樣對吧？"
1300720-31 = "況且，那種食記終究不是「我的喜好」而是「別人的喜好」不是嗎？"
1300720-32 = "雖然確實有可能很好吃，不過合不合我的胃口就另當別論了。"
1300720-33 = "但是，這本美食筆記是世界上獨一無二的……#n記錄著我的喜好的美食清單！"
1300720-34 = "[s5]「確實，聽你這麼一說……」\n[s6]「美食的世界真是深奧啊。」"
1300720-37 = "沒錯。#n所以今天為了紀念筆記完成，我要去最推薦的店哦！"
1300720-38 = "來，老師也快準備準備吧！"
1300720-39 = "[s]「咦，我也要去嗎？」"
1300720-40 = "那當然囉！#n別擔心，今天我請客！"
1300720-49 = "嗯～真好吃！#n老師覺得呢？好吃嗎？"
1300720-50 = "[s]「超好吃的！」"
1300720-51 = "這樣啊，老師這麼覺得啊。"
1300720-52 = "雖然好吃是事實，不過我認為這間店的CP值很高。"
1300720-53 = "唔嗯，這只是我個人的意見，#n我認為好的餐廳就是要讓客人滿意。"
1300720-54 = "而對我來說，與滿意度息息相關的就是CP值了……"
1300720-55 = "啊，不過話雖如此，盲目追求便宜也不行。#n還是必須要保持一定程度的美味才行。"
1300720-56 = "[s]「也就是說取得平衡是很重要的對吧。」"
1300720-57 = "說的沒錯！#n我們差不多也該走了。#n不好意思，請幫我們結帳～！"
1300720-58 = "[s7]「啊，說到結帳……」\n[s8]「我來付吧……」"
1300720-61 = "嗯，老師？怎麼了嗎？"
1300720-62 = "你說希望之後能一起分享這本筆記……？"
1300720-63 = "[s9]「因為我也想知道這附近有什麼好吃的餐廳。」\n[s10]「這餐就當作是回禮，怎麼樣呀？」"
1300720-66 = "咦……不過我今天本來是想請老師吃飯的。"
1300720-67 = "這樣跟我想的好像有點不太一樣……"
1300720-68 = "……果然偶爾還是該讓我來付錢。"
1300720-69 = "每次都吃免費的，總覺得有點不好意思……"
1300720-70 = "[s11]「哼哼哼。太天真了，淳子同學。」\n[s12]「我可是企圖把你這段期間不斷努力的成果……」\n[s13]「只用一頓飯就拿走的邪惡怪盜哦！」"
1300720-74 = "……"
1300720-78 = "啊哈哈，那算什麼呀！"
1300720-79 = "那就沒辦法了！"
1300720-80 = "這次我就乖乖被邪惡怪盜的圈套欺騙吧！"
1300720-82 = "（與滿臉笑意的淳子一同踏上的歸途，是段非常快樂的時光）"

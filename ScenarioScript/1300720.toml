[translation]
1300720-1 = "The Results of Hard Work"
1300720-6 = "Junko dashed in, gasping for air."
1300720-7 = "[s1] \"Welcome.\"\n[s2] \"Do I get to know what you finished now?\""
1300720-10 = "Heeheehee. Prepare yourself!"
1300720-11 = "It's...a foodie notebook for the Shiba Town area!"
1300720-12 = "[s] \"A foodie notebook?\""
1300720-13 = "Yup! It's a collection of foodie spots."
1300720-14 = "I've pulled them from all the restaurants I've been to."
1300720-15 = "I sadly can't visit every single restaurant in Kivotos..."
1300720-16 = "So I've been dividing it up by area."
1300720-17 = "And, look! I finished all the eateries of Shiba Town!"
1300720-18 = "[s] \"Wait, so you've been to every restaurant in Shiba Town?\""
1300720-19 = "Um... So, the truth is, I haven't actually been to every single one."
1300720-20 = "...Do NOT repeat this, but I've got a trick to save time and money."
1300720-21 = "I only go to restaurants that Haruna hasn't blown up."
1300720-22 = "It's a good first test to see if a restaurant's worth it."
1300720-23 = "[s3] \"I...guess that sort of makes sense...\"\n[s4] \"Is it really okay to let the Gourmet Research Society keep going like this...?\""
1300720-26 = "A-Anyway!"
1300720-27 = "The point is, I've got all the popular eateries in Shiba Town under my belt. And in my notebook!"
1300720-28 = "[s] \"Can't you just look up reviews on the internet, though?\""
1300720-29 = "But you know, they say experience is the best teacher. No offense, Sensei. Heeheehee."
1300720-30 = "Online reviews can be really unreliable. You never know when someone's being paid for a review or trying to get in on a viral trend."
1300720-31 = "And, even if the reviews are genuine, they're still based on someone else's tastes."
1300720-32 = "And there's no guarantee that those tastes will match yours."
1300720-33 = "But my notebook is a one-of-a-kind resource—a list of restaurants tailored just for me!"
1300720-34 = "[s5] \"One-of-a-kind? Really?\"\n[s6] \"Gastronomy is complicated...\""
1300720-37 = "To celebrate the completion of my notebook...It's time to visit the #1 ranked restaurant in the neighborhood!"
1300720-38 = "And you're coming too. Get ready, Sensei!"
1300720-39 = "[s] \"Oh? You want me to come?\""
1300720-40 = "Of course! But don't worry, I'm buying tonight."
1300720-49 = "Wow. That was delicious! What did you think, Sensei?"
1300720-50 = "[s] \"It was the best!\""
1300720-51 = "Mmm...I'm glad you enjoyed it so much."
1300720-52 = "For me, rather than being the best, it's a place where you can get really good value."
1300720-53 = "This is just my opinion, but I think a restaurant has to really satisfy diners to be good. You should leave feeling full."
1300720-54 = "So that's why a good value is important."
1300720-55 = "But it can't just be cheap, of course. You need to balance value with flavor."
1300720-56 = "[s] \"Gastronomy is REALLY complicated.\""
1300720-57 = "Okay, let's get going! Hey, excuse me! Can we get the check?"
1300720-58 = "[s7] \"Speaking of the check...\"\n[s8] \"I'll get it.\""
1300720-61 = "What's that?"
1300720-62 = "Oh, you want me to share my notebook?"
1300720-63 = "[s9] \"I happen to need recommendations of restaurants near here.\"\n[s10] \"So, how about you share your notebook, and I'll treat you to dinner to pay you back for it?\""
1300720-66 = "Uh... But today's the day that I pay for you."
1300720-67 = "If you pay, that throws everything off."
1300720-68 = "Sometimes you gotta let me pay..."
1300720-69 = "It makes me uncomfortable if I never get to return the favor."
1300720-70 = "[s11] \"Heh heh heh. But there's one thing you didn't account for...\"\n[s12] \"You failed to predict the actions of a devious teacher.\"\n[s13] \"I'm gonna steal your hard work with only a meal!\""
1300720-74 = "..."
1300720-78 = "Hahaha, come on..."
1300720-79 = "Well then, I guess I have no choice!"
1300720-80 = "Who could outwit a teacher?"
1300720-82 = "I had a lot of fun hanging out with a jubilant Junko."

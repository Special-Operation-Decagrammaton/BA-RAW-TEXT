1300720-4 = "4;준코;04\n#4;al\n#4;hophop\n#wait;1500"
1300720-5 = "4;준코;99\n#4;greeting\n#4;em;[한숨]\n#wait;1500"
1300720-6 = "#na;(준코가 숨을 헐떡이며 뛰어들어왔다.)"
1300720-7 = "[s1] \"어서 와.\"\n[s2] \"완성했다는 게 뭐야?\""
1300720-8 = "#wait;10"
1300720-9 = "#wait;10"
1300720-10 = "4;준코;00;훗훗훗, 그건 말이지……\n#4;m3"
1300720-11 = "#4;hide\n3;준코;03;시바타운 구역의 맛집 수첩이야!\n#3;em;[!]\n#3;jump"
1300720-12 = "[s] \"맛집 수첩?\""
1300720-13 = "3;준코;02;그래. 내가 가 봤던 식당들 중에서,\n#3;em;[반응]"
1300720-14 = "3;준코;02;'맛집'이라고 부를 수 있는 곳을 정리해 둔 수첩이야."
1300720-15 = "3;준코;13;……물론 내가 키보토스의 모든 식당을 가 볼 수는 없으니까,\n#3;greeting"
1300720-16 = "3;준코;12;구역별로 나눠서 정리해두고 있거든."
1300720-17 = "3;준코;03;그 중에서 드디어! 시바타운의 맛집을 전부 정리했단 말씀!\n#3;em;[반짝]"
1300720-18 = "[s] \"그 말은, 시바타운의 모든 식당을 가 봤다는 뜻이야?\""
1300720-19 = "3;준코;11;아~ 뭐어, 꼭 모든 식당을 가 봤다는 건 아니긴 해.\n#3;stiff"
1300720-20 = "3;준코;99;……여기서만 하는 말이지만, 하루나가 터트리지 않은 식당 위주로 가면.\n#3;closeup\n#3;a\n#3;em;…"
1300720-21 = "3;준코;12;시간도 돈도 절약할 수 있거든……\n#3;closeup"
1300720-22 = "3;준코;13;하루나가 터트리지 않았다면, 적어도 어느 정도 검증은 된 거란 뜻이니까.\n#3;closeup\n#3;em;[재잘]"
1300720-23 = "[s3] \"어떤 의미에서는 그렇기도 하겠는데……\"\n[s4] \"미식연구회의 활동, 이대로 괜찮은 걸까……\""
1300720-24 = "#wait;10"
1300720-25 = "#wait;10"
1300720-26 = "3;준코;02;아, 아무튼! \n#3;hophop"
1300720-27 = "3;준코;00;이제 시바타운의 맛집은 전부 내 발 아래 놓였다는 말이야!\n#3;em;[!]"
1300720-28 = "[s] \"그런데 그런 거라면, 인터넷의 맛집 순위 같은 걸 참고해도 되잖아?\""
1300720-29 = "3;준코;13;훗훗훗. 그거야말로 하나는 알고 둘은 모르는 말이네, 선생님.\n#3;greeting"
1300720-30 = "3;준코;12;인터넷의 순위는 바이럴이나 리뷰 밀어주기, 뒷광고 같은 게 많아서 있는 그대로 믿을 수 없는 경우가 제법 있다고?\n#3;em;[반응]"
1300720-31 = "3;준코;12;거기에 그건 어디까지나 '다른 사람들'의 입맛에 맞춘 평가인 거잖아?"
1300720-32 = "3;준코;00;다른 사람들의 입맛이 꼭 내 입맛이랑 일치하리라는 보장은 없는 법이라구."
1300720-33 = "3;준코;03;그것에 비해 내 맛집 수첩은…… 세상에서 단 하나뿐인, 나를 위한 맛집 리스트인 거니까!"
1300720-34 = "[s5] \"과연, 그런 것인가……\"\n[s6] \"미식의 세계는 깊구나……\""
1300720-35 = "#wait;10"
1300720-36 = "#wait;10"
1300720-37 = "3;준코;00;그래서 오늘은 수첩 완성 기념으로…… 내 안에서 평점 1위였던 가게를 찾아갈 거야!"
1300720-38 = "3;준코;12;자, 선생님도 빨리 준비해!\n#3;em;[반응]"
1300720-39 = "[s] \"어? 나도?\""
1300720-40 = "3;준코;03;물론이지! 걱정 말라고. 오늘은 기념으로 내가 전부 낼 테니까!\n#3;em;[반짝]"

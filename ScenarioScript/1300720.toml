[translation]
1300720-1 = "ผลึกแห่งความพยายาม"
1300720-6 = "(จุนโกะวิ่งหอบมาแต่ไกล)"
1300720-7 = "[s1] \"มาแล้วเหรอ\"\n[s2] \"ที่บอกว่าสำเร็จแล้วน่ะ อะไรเหรอ?\""
1300720-10 = "ฮิฮิฮิ เรื่องนั้นน่ะ..."
1300720-11 = "ก็บันทึกร้านเด็ดในย่านชิบะทาวน์ไงล่ะ!"
1300720-12 = "[s] \"บันทึกร้านเด็ด?\""
1300720-13 = "ใช่แล้ว สมุดที่บันทึกรายชื่อ \"ร้านเด็ด\""
1300720-14 = "จากในบรรดาร้านอาหารที่ฉันไปตระเวนกินมาน่ะ"
1300720-15 = "...แน่นอนว่าฉันยังไปร้านอาหารในคิโวทอสไม่ครบก็จริง"
1300720-16 = "แต่ก็บันทึกร้านเด็ดทุกร้าน แยกตามแต่ละเขตเอาไว้น่ะ"
1300720-17 = "และในบรรดาร้านพวกนั้น ในที่สุดฉันก็บันทึกร้านเด็ดในย่านชิบะทาวน์ได้หมดแล้วละ!"
1300720-18 = "[s] \"จุนโกะก็ไปร้านในย่านชิบะทาวน์มาหมดแล้วเหรอ?\""
1300720-19 = "อืม~ ก็นะ มันไม่ได้ต้องไปหมดทุกร้านเองหรอก"
1300720-20 = "...รู้กันแค่นี้นะ ถ้าเลือกไปร้านที่ฮารุนะไม่ได้ระเบิดทิ้งละก็..."
1300720-21 = "จะประหยัดเงินแล้วก็ประหยัดเวลาได้เยอะเลย..."
1300720-22 = "ร้านไหนที่ไม่โดนระเบิดทิ้ง แสดงว่ารสชาติผ่านยังไงล่ะ"
1300720-23 = "[s3] \"พูดแบบนั้นก็เข้าใจได้อยู่...\"\n[s4] \"กิจกรรมของชมรมชิมอาหาร ปล่อยไว้แบบนี้จะดีรึเปล่านะ...\""
1300720-26 = "จะ...จะยังไงก็เถอะ! "
1300720-27 = "ตอนนี้ร้านเด็ดทุกร้านในย่านชิบะทาวน์อยู่ในกำมือของฉันแล้ว!"
1300720-28 = "[s] \"เรื่องนั้นน่ะ ดูจากอันดับร้านเด็ดในเน็ตก็ได้ไม่ใช่เหรอ?\""
1300720-29 = "ฮุฮุฮุ พูดเหมือนไม่รู้อะไรเอาซะเลยนะคุณครู"
1300720-30 = "อันดับร้านในเน็ตน่ะ ส่วนใหญ่ได้มาเพราะการโฆษณาปากต่อปาก หรือการประโคมโฆษณารีวิว#nร้านเป็นส่วนใหญ่ เพราะงั้นเลยเชื่อไม่ได้ทั้งหมดหรอก"
1300720-31 = "อีกอย่างมันก็เป็นการรีวิวที่ขึ้นอยู่กับความชื่นชอบในรสชาติของ \"คนอื่นๆ\" ด้วยนี่นา?"
1300720-32 = "ไม่ได้มีอะไรการันตีสักหน่อยว่าเราจะชอบรสชาติที่คนอื่นชอบน่ะ"
1300720-33 = "เมื่อเทียบกันแล้วบันทึกร้านเด็ดของฉันน่ะ... ก็คือบันทึกรายชื่อร้านเด็ดที่มีแค่อันเดียวในโลกไงล่ะ!"
1300720-34 = "[s5] \"งั้นเหรอ...\"\n[s6] \"โลกของอาหารรสเลิศนี่ล้ำลึกจริงๆ...\""
1300720-37 = "เพราะงั้นเพื่อฉลองที่ทำบันทึกสำเร็จ... วันนี้ฉันจะไปร้านเด็ดอันดับหนึ่ง!"
1300720-38 = "เอาละ คุณครูเองก็รีบเตรียมตัวเร็วเข้าเถอะ!"
1300720-39 = "[s] \"หืม? ครูด้วยเหรอ?\""
1300720-40 = "ก็แหงสิ! ไม่ต้องห่วงน่า เดี๋ยววันนี้ฉันเลี้ยงเอง!"
1300720-49 = "อื้ม อิ่มแล้วละ! ว่าไงคุณครู? อร่อยมั้ย?"
1300720-50 = "[s] \"สุดยอด!\""
1300720-51 = "อืม... คุณครูคิดแบบนั้นสินะ"
1300720-52 = "สำหรับฉัน รู้สึกว่าเป็นร้านที่อาหารคุ้มราคามากกว่าน่ะ"
1300720-53 = "ถึงจะเป็นแค่ความเห็นส่วนตัวของฉัน แต่ฉันคิดว่าร้านอาหารดีๆ น่ะ จะต้องทำให้คนที่กินอาหารพึงพอ#nใจได้"
1300720-54 = "นั่นคือเงื่อนไข 'ความคุ้มค่า' สำหรับฉัน "
1300720-55 = "อ้อ แต่ก็ไม่ได้หมายความว่าจะเลือกร้านที่ราคาถูกแบบสุ่มสี่สุ่มห้าได้หรอกนะ ต้องรักษาขอบเขตของ 'รสชาติ' ราคาประหยัดเอาไว้ด้วย"
1300720-56 = "[s] \"ลึกซึ้่งสุดๆ...\""
1300720-57 = "ถ้างั้นเราไปกันเลยมั้ย?#nขอโทษค่า คิดเงินค่าอาหารด้วยค่ะ!"
1300720-58 = "[s7] \"ค่าอาหารน่ะ ครูจ่ายเอง\"\n[s8] \"เดี๋ยวครูจ่ายเอง\""
1300720-61 = "เอ๋? ทำไมล่ะ?"
1300720-62 = "อะไรนะ...? คราวหน้าขอดูสมุดบันทึกบ้างได้รึเปล่างั้นเหรอ?"
1300720-63 = "[s9] \"ครูเองก็อยากเปิดโลกร้านเด็ดแถวๆ นี้บ้างน่ะ\"\n[s10] \"ถ้าให้ดูเดี๋ยวครูเลี้ยงข้าวเป็นการตอบแทน ดีมั้ย?\""
1300720-66 = "เอ่อ... แต่วันนี้ฉันบอกแล้วนี่ว่าจะเลี้ยงคุณครูน่ะ"
1300720-67 = "ถ้าคุณครูจ่ายให้ มันก็จะผิดแผนที่ฉันวางไว้น่ะสิ...?"
1300720-68 = "บางครั้งยอมให้ฉันเลี้ยงบ้างก็ได้นะ"
1300720-69 = "เป็นฝ่ายถูกเลี้ยงอยู่ฝ่ายเดียว มันไม่ค่อยสบายใจเท่าไรน่ะ..."
1300720-70 = "[s11] \"หึหึหึ คิดน้อยไปรึเปล่า จุนโกะจัง...\"\n[s12] \"ครูน่ะเป็นผู้ใหญ่นิสัยไม่ดีที่มีแผนชั่วร้ายนะ...\"\n[s13] \"ครูจะฮุบผลงานของจุนโกะไว้ โดยแลกด้วยข้าวมื้อเดียวไงล่ะ\""
1300720-74 = "..."
1300720-78 = "อะฮ่าฮ่าฮ่า อะไรล่ะนั่นน่ะ!"
1300720-79 = "ถ้างั้นก็ช่วยไม่ได้นะ!"
1300720-80 = "คงต้องแกล้งตกหลุมพรางของผู้ใหญ่นิสัยไม่ดีซะแล้วละ!"
1300720-82 = "(หลังจากนั้นคุณครูก็ใช้เวลากับจุนโกะอย่างสนุกสนาน)"

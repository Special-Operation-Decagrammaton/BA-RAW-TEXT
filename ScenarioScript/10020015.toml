[translation]
10020015-5 = "We destroyed the Area 1 Dimension Engine!"
10020015-13 = "[ns] \"W-Wait!\""
10020015-14 = "Shiroko retreated. There's no sign of her..."
10020015-15 = "[ns] \"...\""
10020015-17 = "Shiroko ran away..."
10020015-18 = "Yes, before Sensei could even do anything."
10020015-20 = "Well... That's okay."
10020015-21 = "If Shiroko is interfering, we just have to be that much more decisive about destroying this Ark."
10020015-22 = "She'll have to make an appearance eventually."
10020015-23 = "And that will be our chance to have a proper conversation."
10020015-24 = "This place is isolated. She'll have nowhere to run. Shiroko will be like a rat in a trap."
10020015-25 = "Th-That's true, but... Why are you comparing her to an animal?"
10020015-33 = "Our operation is in pretty good shape right now."
10020015-34 = "We've successfully conquered Area 1 and destroyed the Dimension Engine. That's not a bad start in my book."
10020015-35 = "Most important of all, we've conquered one quarter of the Ark. That portion of the Ark's computational abilities is ours."
10020015-36 = "Yes. That makes things much more straightforward."
10020015-37 = "First, it'll be easier to defend against enemy attacks from here. Enemies will have to fight through our new defense system."
10020015-39 = "You mean we can take a breather? Phew! That's a relief!"
10020015-40 = "And we're able to enter the next area of the Ark."
10020015-41 = "Area 2, right? We're making good progress."
10020015-43 = "... Still, we can't let our guard down."
10020015-44 = "Sensei, we'll be entering Area 2 of the Ark of Atrahasis."
10020015-45 = "We're relying on your continued tactical instructions."

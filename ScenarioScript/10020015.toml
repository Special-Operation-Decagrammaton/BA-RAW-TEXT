10020015-33 = "3;치히로;01;현재 점령전의 상황은 나쁘지 않아.\n#3;sig\n#3;a"
10020015-34 = "3;치히로;99;제1구역을 성공적으로 점령했고, <차원엔진>도 파괴하는데 성공. 이 정도면 시작치곤 괜찮은 성과지.\n#3;sig"
10020015-35 = "3;치히로;02;무엇보다 중요한 건 우리가 방주의 약 1/4을 점령했다는 거야. 즉, 이 방주의 연산 기능을 그만큼 우리 것으로 만들었다는 거지.\n#3;sig"
10020015-36 = "5;히마리 승무원;03;네. 저희는 좀 더 많은 일들이 가능해질 거예요.\n#5;a\n#3;m1"
10020015-37 = "3;치히로;01;먼저 이 주변에서 습격해 오는 적들의 방어가 좀 더 쉬워질 거야. 지금부터 적들은 우리가 구축한 방어 시스템을 먼저 상대해야 할 거니까.\n#3;sig"
10020015-38 = "#all;hide"
10020015-39 = "3;모모카 승무원;99;후아…… 다행이야. 한숨 돌렸네.\n#3;a"
10020015-40 = "4;아유무 승무원;03;그리고 방주의 다음 구역으로 진입할 수 있게 되었어요.\n#4;a\n#3;m2"
10020015-41 = "3;모모카 승무원;09;제2구역 말이지? 꽤 순조롭잖아.\n#3;em;[반응]"

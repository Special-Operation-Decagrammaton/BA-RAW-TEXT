10020015-20 = "3;호시노;01;뭐어, 괜찮아.\n#3;a"
10020015-21 = "3;호시노;99;시로코 쨩이 이리저리 이동하면서 우리를 방해하겠다면, 우리는 더욱 확실하게 이 방주를 부숴버리면 돼."
10020015-22 = "3;호시노;99;그러다 보면 결국 마지막에는 어쩔 수 없이 우리 앞에 모습을 드러낼 수밖에 없을 거니까."

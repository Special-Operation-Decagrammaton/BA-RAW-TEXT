[translation]
10020015-5 = "成功破壞第1區域的「次元引擎」了唷！！"
10020015-13 = "[ns]「等，等等！！」"
10020015-14 = "白，白子同學撤退……消失了。"
10020015-15 = "[ns]「…………」"
10020015-17 = "白子醬又逃走了啊……"
10020015-18 = "是的……老師完全沒有出手的時機……"
10020015-20 = "嘛，也無所謂吧。"
10020015-21 = "既然白子醬會在各處妨礙我們，#n我們只要破壞方舟就行了。"
10020015-22 = "這樣一來，他終究會出現在我們面前。"
10020015-23 = "到時候再好好和他談談就好。"
10020015-24 = "只要把這裡全部破壞，他也就無處可逃了嘛～"
10020015-25 = "是，是沒錯啦……不過是不是太熱衷於「捕獲」了呀？"
10020015-33 = "目前占領戰的狀況還不錯。"
10020015-34 = "順利占領了第1區域，也成功破壞了「次元引擎」。#n是個不錯的開頭。"
10020015-35 = "而且我們還獲得了方舟約四分之一的演算能力。"
10020015-36 = "沒錯──這樣一來，我們也能做比以前更多的事了。"
10020015-37 = "是呢。首先，我想這附近的防衛工作應該會輕鬆一點。#n現在起，我們建構的防衛系統也會有一定程度的保護能力。"
10020015-39 = "哈啊……太好了～#n終於能休息一下了……"
10020015-40 = "而且，也可以前往方舟的下一個區域了。"
10020015-41 = "第2區域是嗎？#n感覺還挺順利的呢？"
10020015-43 = "……但是不到最後千萬不能掉以輕心。"
10020015-44 = "那麼，我們將突入「阿特拉哈西斯的方舟」的第2區域。"
10020015-45 = "繼續麻煩老師進行作戰指揮！"

[translation]
10020015-5 = "ทำลาย <เครื่องทะลุมิติ> พื้นที่ 1 สำเร็จแล้ว!!"
10020015-13 = "[ns] \"ระ...รอเดี๋ยว!!\""
10020015-14 = "คะ...คุณชิโรโกะล่าถอย... ซ่อนตัวไปแล้วค่ะ..."
10020015-15 = "[ns] \"......\""
10020015-17 = "ชิโรโกะจังหนีไปแล้วละค่ะ......"
10020015-18 = "ค่ะ... คุณครูไม่มีโอกาสได้พูดเลย..."
10020015-20 = "ก็นะ ไม่เป็นไรหรอก"
10020015-21 = "ถ้าชิโรโกะจังวาร์ปไปโน่นมานี่เพื่อขัดขวางพวกเราละก็ พวกเราก็แค่ถล่มเรือลำนี้ให้ยับก็พอแล้วละ"
10020015-22 = "ถ้าทำแบบนั้น สุดท้ายเธอก็จะไม่มีทางเลือก นอกจากเผยตัวออกมาต่อหน้าพวกเรา"
10020015-23 = "แล้วถึงตอนนั้นก็คงจะได้คุยกันดีๆ สักทีนั่นละ"
10020015-24 = "ที่นี่เป็นสถานที่โดดเดี่ยวที่ไม่มีที่ให้หนีไปได้แล้วนี่นา? สรุปก็คือหมาป่าที่ติดเกาะไงล่ะ ชิโรโกะจังน่ะ"
10020015-25 = "ระ...เรื่องนั้นมันก็ใช่อยู่หรอก... แต่ทำไมถึงเอาแต่เปรียบกับสัตว์มาตั้งแต่ก่อนหน้านี้แล้วล่ะ?"
10020015-33 = "สถานการณ์ปฏิบัติการยึดครองตอนนี้ถือว่าไม่เลวเลย"
10020015-34 = "ตอนนี้ยึดพื้นที่ 1 และทำลาย <เครื่องทะลุมิติ> สำเร็จแล้วด้วย ถือว่าเป็นการเริ่มต้นที่ใช้ได้เลยทีเดียว"
10020015-35 = "สิ่งสำคัญคือตอนนี้เรายึดพื้นที่มาได้ 1/4 ของเรือแล้ว อีกนัยหนึ่งก็คือระบบประมวลผลของเรือลำนี้#nกลายเป็นของเราไป 1/4 ส่วนแล้วไงล่ะ"
10020015-36 = "ใช่ค่ะ เท่ากับว่าพวกเราก็จะทำอะไรได้มากขึ้นค่ะ"
10020015-37 = "อันดับแรก การป้องกันการโจมตีจากศัตรูที่โจมตีมาจากบริเวณรอบๆ ก็จะง่ายขึ้น จากนี้ไปพวกศัตรูที่#nเข้ามาโจมตีจะต้องเจอกับระบบป้องกันตัวของเราก่อน"
10020015-39 = "ฮู่ว... ดีแล้วละนะ ค่อยหายใจได้ทั่วท้องขึ้นมาหน่อย"
10020015-40 = "ตอนนี้ก็เข้าไปในพื้นที่ต่อไปของเรือได้แล้วละค่ะ"
10020015-41 = "หมายถึงพื้นที่ที่ 2 ใช่มั้ย? ง่ายออกจะตายไป"
10020015-43 = "... แต่ถึงยังไง ก็ไม่ควรประมาทจนถึงที่สุดค่ะ"
10020015-44 = "ถ้างั้นคุณครูคะ ต่อไปเราจะเข้าสู่พื้นที่ที่ 2 ของเรืออะทราฮาซิสแล้วนะคะ"
10020015-45 = "รบกวนช่วยออกคำสั่งปฏิบัติการต่อด้วยค่ะ!"

[translation]
84302200500-11 = "หืม!? อะ... อะไรน่ะ?"
84302200500-12 = "ทำไมจู่ๆ ก็มีเสียงเตือน...!? ฉันแค่ถ่ายรูปเองนะ!? เป็นไปได้ยังไง...!"
84302200500-19 = "ไม่สิ ไม่ใช่เสียงจากตรงนี้ นี่มันเสียงที่ดังมาจากที่อื่น...?"
84302200500-20 = "ตรงนี้มีจอความปลอดภัยให้ดูพอดี ไปดูดีกว่าว่าเกิดอะไรขึ้น"
84302200500-27 = "หืม...?"
84302200500-28 = "อะไรเนี่ย..."
84302200500-29 = "ทำไมถึงไปอยู่ตรงนั้นได้?"
84302200500-41 = "อะ... อ๊ายยย...!?"
84302200500-42 = "ว้ายยย!! โดรนไล่ตามมาแล้วววว!!"
84302200500-51 = "โคยูกินี่นา"
84302200500-52 = "ไม่สิ อะไรอีกล่ะนั่น..."
84302200500-53 = "เฮ้อ..."
84302200500-54 = "ครั้งนี้จะก่อเรื่องอะไรอีกเนี่ย..."

41080-60 = "5;미유ND;02\n3;사키 헬멧;04\n#5;d\n#3;d\n#wait;1000"
41080-61 = "#all;hide"
41080-62 = "#wait;1800"
41080-63 = "3;로봇 경비원 A;09\n#3;a\n#wait;1500"
41080-64 = "3;로봇 경비원 A;09;으으…… 저녁에 음료를 너무 마셨나. 갑자기 화장실이…….\n#3;em;[속상함]\n#3;stiff"
41080-65 = "#all;hide"
41080-66 = "3;미야코;05;……누가 다가옵니다!\n#3;em;[!]\n#3;a"
41080-67 = "1;사키 헬멧;09;뭐? 이 근처는 순찰 경로가 아니었잖아?\n#1;em;[?!]\n#1;ar\n#3;m5"
41080-68 = "#3;hide\n5;통신모에;04;나, 나도 몰라! 계획에 없던 돌발 상황인걸!\n#5;em;[땀]"
41080-69 = "5;미유ND;00;사, 사키 쨩! 어떻게 하지? 경비원이 이쪽으로 오고 있어!\n#5;stiff"
41080-70 = "5;미유ND;06;우으으…… 나, 정면 승부는 자신 없는데…… 도망칠까?\n#5;em;[속상함]"
41080-71 = "1;사키 헬멧;09;그, 그게 그러니까…….\n#1;em;[...]"
41080-72 = "1;사키 헬멧;04;높은 곳! 높은 곳으로 일단 올라가!\n#1;hophop"
41080-73 = "1;사키 헬멧;05;교범에 따르면 저격의 기본은 시야 확보라고 했지. 높은 곳에 올라가면 상황이 어찌 되었든 저격은 할 수 있을 테니까."
41080-74 = "#all;hide"
41080-75 = "3;미야코;05;잠깐만요, 사키. 이곳의 크레인 타워는 저격에는 용이하지만, 도주가—\n#3;em;[반응]"
41080-76 = "3;미야코;11\n5;사키 헬멧;10;나한테 명령하지 마, 미야코! 나도 그 정도는 알고 있거든?!\n#5;em;[빠직]\n#5;al\n#3;m1\n#3;h\n#5;h"
41080-77 = "3;미야코;11\n5;사키 헬멧;10\n#na;로봇 경비원 A;응? 이게 무슨 소리지……?\n#3;h\n#5;h"
41080-78 = "#st;[0,0];instant;1;"
41080-79 = "#clearST"
41080-80 = "3;미야코;11\n5;사키 헬멧;10\n#3;h\n#5;h\n#wait;1800"
41080-81 = "3;미야코;11\n5;사키 헬멧;10\n1;로봇 경비원 A;00\n#1;a\n#3;m3\n#1;h\n#3;h\n#5;h\n#wait;1500"
41080-82 = "3;미야코;11\n5;사키 헬멧;10\n1;로봇 경비원 A;02\n#1;em;[?]\n#1;h\n#3;h\n#5;h\n#wait;1200"

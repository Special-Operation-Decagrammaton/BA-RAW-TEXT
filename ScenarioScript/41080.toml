41080-85 = "3;로봇 경비원 A;05;침입자다!\n#3;closeup\n#bgshake\n#fontsize;100"
41080-86 = "3;로봇 경비원 A;05;선적된 물건을 훔치러 온 좀도둑인가?!\n#3;closeup\n#3;stiff"
41080-87 = "3;로봇 경비원 A;05\n5;사키 헬멧;10;누가 누구더러 좀도둑이래!\n#5;a\n#5;hophop\n#3;m1"

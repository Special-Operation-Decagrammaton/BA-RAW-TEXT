[translation]
41080-1 = "Episode 8;Operation Carrot 2"
41080-2 = "The D.U. Harbor Loading Dock"
41080-6 = "This is RABBIT 1. Time is 2100 hours. I've arrived at Point Delta."
41080-7 = "Area clear, confirmed. Moving to retrieve the carrot at Point Echo."
41080-8 = "Helloooo! Camp Rabbit, back in her element! Squad member GPS signals locked and loaded, baby!"
41080-9 = "The loading dock's security is changing shifts, just like we planned."
41080-10 = "So dance your pretty little self down straight to Point Echo."
41080-11 = "[s] \"I'm still not thrilled about this...\""
41080-12 = "I didn't ask, Sensei."
41080-13 = "If your intention in coming was to lecture us, you're not needed here."
41080-14 = "A special ops site is no place for you to be anyways, Sensei."
41080-15 = "[s] \"I'm just worried something might happen.\""
41080-16 = "Are you worried we might steal something? Do you think so little of us?"
41080-17 = "Students of SRT Academy are dedicated to our mission: to protect the safety of the citizens. We would not steal civilian property."
41080-18 = "Based on our intel, the empty drum barrels here are already scheduled for disposal. We won't cost them any money."
41080-19 = "In fact, we negate their disposal costs and labor."
41080-20 = "[s] \"Why not just ask for them?\""
41080-21 = "S-Sensei..."
41080-22 = "Sensei does think that little of us! Do you think we're beggars on the side of the street? We won't get down on our knees and ask for someone else's trash."
41080-23 = "Get it through your head! We are elite members of SRT Academy and we will not accept your charity, Valkyrie's charity, or some stupid industrial company's charity!"
41080-24 = "[s] \"But before...\""
41080-25 = "W-Well, with the bentos..."
41080-26 = "I don't have to defend myself!"
41080-27 = "We secured discarded bentos through our own effort! That was not charity!"
41080-28 = "You'll never break our pride!"
41080-29 = "RABBIT 2. You need to lower your voice. We're on enemy turf."
41080-30 = "Let's move out. RABBIT 2, lead reconnaissance ahead but if you see the enemy do NOT engage."
41080-31 = "Oh, who died and made you boss again, Miyako?"
41080-32 = "RABBIT 2, please refer to my codename during missions. This is basic protocol."
41080-33 = "Oh NOW you're a stickler for protocol?"
41080-34 = "Stop trying to distract from my question. What gives you the right to order me around?"
41080-35 = "Th-That's... I am the squad leader of RABBIT..."
41080-36 = "Oh? And who made you the squad leader, huh?"
41080-37 = "Wasn't it those little snotheads from the General Student Council? The ones who shut down SRT Academy?"
41080-38 = "..."
41080-39 = "So, tell me. Considering we're rebelling against the General Student Council, what makes you think you still get to boss us around?"
41080-43 = "...I don't think this is a matter the two of us can decide."
41080-45 = "Both options suck. Bleh."
41080-46 = "I-I don't wanna pick sides..."
41080-48 = "...Understood."
41080-49 = "For this mission, Saki will take the lead of RABBIT Squad."
41080-50 = "RABBIT 2, your orders."
41080-51 = "That's what I thought. We're just dealing with a bunch of security guards, not trained enemies."
41080-52 = "I received top marks on all my simulated extraction trainings. Just watch me."
41080-54 = "Uh, Saki..."
41080-55 = "I mean, RABBIT 2. Where should I stand by?"
41080-56 = "Oh? As our sniper?"
41080-57 = "W-Well... Um... I wrote down notes on effective sniper placement... Not that one, in an urban environment..."
41080-64 = "Geez. Boss made me drink too much at dinner again... I need to go to the bathroom."
41080-66 = "Enemy approaching!"
41080-67 = "There's not supposed to be a patrol route this way!"
41080-68 = "He's looking for the bathroom! This wasn't in the plans."
41080-69 = "S-Saki! He's coming towards me! Wh-Wh-What do I do?"
41080-70 = "I suck at hand-to-hand stuff. Can I run away..."
41080-71 = "S-So... Um..."
41080-72 = "Up! Take the high ground! Get as high as you can!"
41080-73 = "According to the textbooks, the basics of sniping involves securing a higher line of sight."
41080-75 = "Wait, Saki, no! High points might be good for sniping, but she won't be able to esca—"
41080-76 = "Shut up, Miyako! I got this under control."
41080-77 = "Did I just hear something?"
41080-85 = "INTRUDERS!"
41080-86 = "You thieves! Are you after the latest shipment?"
41080-87 = "Who're you calling a thief?!"
41080-91 = "Everyone, engage! Make your way to Point Epsilon and be sure to cover each other's backs. We're outnumbered."

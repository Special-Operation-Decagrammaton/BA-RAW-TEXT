[translation]
41080-1 = "ตอนที่ 8; ปฏิบัติการแคร์รอต 2"
41080-2 = "จุดขนถ่ายสินค้า ท่าเรือ D.U."
41080-6 = "นี่คือ RABBIT 1 เวลาปัจจุบัน 21:00 น. ตอนนี้ฉันมาถึงที่จุดเดลต้าแล้วค่ะ"
41080-7 = "ไม่พบภัยคุกคามใดๆ ในตำแหน่งนี้ ต่อไปจะไปที่จุดเอโค่ที่มี <แคร์รอต> อยู่"
41080-8 = "นี่คือ RABBIT ในค่าย ฉันกำลังตรวจสอบสัญญาณ GPS จากตำแหน่งของสมาชิกแต่ละคน"
41080-9 = "ดูจากการเปลี่ยนกะของยามที่ดูแลความปลอดภัยของจุดขนถ่ายสินค้าแล้ว ยังไม่มีการเปลี่ยนแปลง#nอะไรเป็นพิเศษ"
41080-10 = "ไม่น่าจะมีศัตรูมาขวางระหว่างเดินทางไปที่จุดเอโค่"
41080-11 = "[s] \"แบบนี้จะได้เหรอ...?\""
41080-12 = "คือไรกันคะคุณครู..."
41080-13 = "ถ้าตามมาถึงที่นี่เพราะจะมาบ่นกันละก็ ช่วยกลับไปก่อนเถอะค่ะ"
41080-14 = "จุดปฏิบัติการของหน่วยรบพิเศษคือที่ที่อันตรายสำหรับคุณครูนะคะ"
41080-15 = "[s] \"ครูเป็นห่วงว่าจะเกิดปัญหาอะไรน่ะ\""
41080-16 = "เป็นห่วงเพราะคิดว่าพวกฉันจะมาขโมยของงั้นเหรอคะ?"
41080-17 = "ในฐานะของนักเรียนจากสถาบัน SRT ที่ก่อตั้งขึ้นเพื่อปกป้องประชาชน พวกเราไม่คิดที่จะขโมย#nทรัพย์สินของประชาชนหรอกค่ะ"
41080-18 = "จากการวิเคราะห์พบว่าถังกลมที่อยู่ตรงนี้คือของที่ใกล้จะทิ้งอยู่แล้ว ถึงพวกฉันจะขนไปก็ไม่เกิด#nความเสียหายทางการเงินกับคนที่นี่หรอกค่ะ"
41080-19 = "ถ้าคิดเรื่องค่าใช้จ่ายในการขนไปทิ้ง แบบนี้น่าจะเป็นประโยชน์กับพวกเขามากกว่าด้วยค่ะ"
41080-20 = "[s] \"งั้นก็ไปขอเขาดีๆ ไม่ดีกว่าเหรอ?\""
41080-21 = "เรื่องนั้น..."
41080-22 = "การไปขอของที่ใกล้จะทิ้งแล้วมันดูเหมือนขอทานน่ะ"
41080-23 = "ถึงตอนนี้จะเป็นคนไร้บ้าน แต่พวกเราก็เป็นนักเรียนหัวกะทิของสถาบัน SRT นะ! จะให้ไปขอ#nความเห็นใจจากคนอื่นได้ยังไง!"
41080-24 = "[s] \"แต่คราวที่แล้วก็...\""
41080-25 = "เรื่องข้าวกล่องตอนนั้นน่ะ..."
41080-26 = "หนวกหูน่า!"
41080-27 = "พวกเราไป 'หา' ข้าวกล่องที่จะทิ้งเองต่างหาก ไม่ได้ไปขอมากินสักหน่อย!"
41080-28 = "ศักดิ์ศรีของพวกเรายังไม่ถูกทำลาย!"
41080-29 = "RABBIT 2 ใจร่มๆ ก่อน แล้วลดเสียงลงด้วย ที่นี่คือค่ายศัตรูนะคะ"
41080-30 = "ก่อนที่เราจะเข้าไป ช่วยสำรวจให้หน่อยค่ะว่าในเส้นทางมีปัจจัยอันตรายอะไรหรือเปล่า"
41080-31 = "เดี๋ยวนะมิยาโกะ ทำไมเธอถึงเนียนมาออกคำสั่งอีกแล้วล่ะ?"
41080-32 = "ระหว่างปฏิบัติการขอให้เรียกกันด้วยรหัสลับด้วยค่ะ RABBIT 2... ถ้าเรียกชื่อจริงเราอาจถูกเปิดเผย#nตัวตนได้ค่ะ"
41080-33 = "ชิ ทีแบบนี้ล่ะเป๊ะเชียวนะ..."
41080-34 = "อย่าเปลี่ยนเรื่องแล้วตอบมาซะทีเถอะ ทำไมเธอถึงมาสั่งการได้ตามใจล่ะ?"
41080-35 = "นั่นก็... เพราะฉันเป็นหัวหน้าของกองทหาร..."
41080-36 = "ก็จริงอยู่ที่พวกผู้ใหญ่เคยมอบตำแหน่งหัวหน้ากองให้กับเธอ"
41080-37 = "พวกผู้ใหญ่จากองค์การนักเรียนที่สั่งปิดสถาบัน SRT ยังไงล่ะ"
41080-38 = "......"
41080-39 = "แต่ในเมื่อเราลุกขึ้นมาประท้วงองค์การนักเรียนแล้ว มันก็ไม่สำคัญแล้วน่ะสิว่าใครจะเป็นคนสั่งการ?"
41080-43 = "แล้ว... คนอื่นคิดอย่างไรเหรอคะ?"
41080-45 = "ฉันไม่ติดอะไรหรอก ยังไงก็คงไม่ถูกใจไม่ต่างกัน"
41080-46 = "ส่วนฉัน... ไม่รู้สิ..."
41080-48 = "เข้าใจแล้วละค่ะ..."
41080-49 = "งั้นในปฏิบัติการครั้งนี้ฉันจะโอนอำนาจหัวหน้ากองให้แล้วกันนะคะ"
41080-50 = "ช่วยสั่งการด้วยค่ะ RABBIT 2"
41080-51 = "หึหึ ถ้าฝ่ายตรงข้ามเป็นยามที่ไม่เคยฝึกฝนอะไรมา ปฏิบัติการครั้งนี้คงง่ายเหมือนปอกกล้วยเข้าปาก"
41080-52 = "ฉันผ่านการฝึกจำลองสถานการณ์ฉกชิงมานับครั้งไม่ถ้วน แค่หลับตาก็ยังทำได้สบายๆ"
41080-54 = "เอ่อ... ซากิจัง..."
41080-55 = "ไม่สิ... RABBIT 2 ให้ฉันไปประจำอยู่ตรงไหนดีล่ะ?"
41080-56 = "หืม? อ๋อ หมายถึงสไนเปอร์ใช่ไหม?"
41080-57 = "ระ... รอเดี๋ยวนะ บันทึกการวางตำแหน่งสไนเปอร์ให้ได้ผลในการต่อสู้ในเมืองน่าจะอยู่แถวๆ นี้นะ..."
41080-64 = "มะ... เมื่อตอนเย็นเราดื่มน้ำมากไปหรือเปล่านะ จู่ๆ ก็อยากเข้าห้องน้ำ..."
41080-66 = "มีคนกำลังเข้ามาค่ะ!"
41080-67 = "ว่าไงนะ? แถวนี้ไม่ใช่เส้นทางลาดตระเวนสักหน่อย?"
41080-68 = "ฉะ... ฉันก็ไม่รู้! นี่มันสถานการณ์ฉุกเฉินที่ไม่ได้อยู่ในแผนการ!"
41080-69 = "ซะ... ซากิจัง! เอายังไงดี? ยามกำลังมาทางนี้แล้วนะ!"
41080-70 = "อึก... ฉันไม่มั่นใจกับการต่อสู้แบบเผชิญหน้าเลย... เราหนีกันดีไหม?"
41080-71 = "อะ... เอาอย่างนั้นเหรอ..."
41080-72 = "ที่สูง! ขึ้นไปอยู่บนที่สูงๆ เร็ว!"
41080-73 = "หนังสือคู่มือบอกไว้ว่าพลลอบยิงต้องขึ้นไปอยู่บนที่สูงๆ และถ้าขึ้นไปอยู่บนที่สูงก็จะยังลอบยิงได้ ไม่ว่าสถานการณ์จะเป็นยังไง"
41080-75 = "เดี๋ยวนะคะซากิ ทาวเวอร์เครนตรงนี้มันเหมาะกับการลอบยิงก็จริง แต่เรื่องการหลบหนีมัน..."
41080-76 = "อย่ามาสั่งฉันนะมิยาโกะ! เรื่องแค่นั้นฉันรู้อยู่แล้วน่า!!"
41080-77 = "หืม? เสียงอะไรน่ะ...?"
41080-85 = "มีคนบุกรุก!"
41080-86 = "พวกหัวขโมยที่จะมาเอาสินค้าบนเรือเหรอ?!"
41080-87 = "เรียกใครว่าหัวขโมยกันฮะ!"
41080-91 = "ทุกคนปะทะได้! ยิงด้วยกำลังสูงสุดแล้วมาที่จุดเอปไซลอน!"

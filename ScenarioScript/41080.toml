41080-45 = "4;미유ND;02\n2;통신모에;05;나는 상관없어. 어차피 미야코나 사키나 마음에 안 드는 건 매한가지고.\n#4;a\n#2;a"
41080-46 = "4;미유ND;00;난…… 잘 모르겠어…….\n#4;em;[땀]"
41080-47 = "#all;hide"
41080-48 = "5;사키 헬멧;01\n1;미야코;99;……알겠습니다."
41080-49 = "1;미야코;05;그럼 이번 작전에 한해 소대장 권한을 이양하겠습니다."
41080-50 = "1;미야코;11;지휘를 부탁합니다, RABBIT 2.\n#1;greeting"
41080-51 = "5;사키 헬멧;05;흥. 훈련된 적도 아닌 경비원들 상대로 하는 작전은 식은 죽 먹기지.\n#5;em;[반응]\n#5;m3\n#1;dl"
41080-52 = "5;사키 헬멧;99;탈취 상황을 가정한 모의 훈련은 눈 감고도 수행할 수 있을 만큼 자주 해봤다고."
41080-53 = "#all;hide"
41080-54 = "3;사키 헬멧;99\n5;미유ND;00;저, 사키 쨩……\n#5;em;…\n#5;al\n#3;m1"
41080-55 = "5;미유ND;02;아니, RABBIT 2. 나는 어디서 대기하면 좋을까?"
41080-56 = "3;사키 헬멧;02;응? 그러니까, 저격 요원 말이야?\n#3;em;[?]"
41080-57 = "3;사키 헬멧;04;자, 잠시만 기다려 봐. 시가전에서 유효한 저격수의 배치를 적은 노트가 이 근처에…….\n#3;stiff"
41080-58 = "#st;[0,0];instant;1;"

[translation]
41080-1 = "第8話;ニンジン作戦（２）"
41080-2 = "D.U.港湾"
41080-6 = "こちらRABBIT1、現在時刻は2100。ポイン[ruby=デルタ]トDに[/ruby]到着しました。"
41080-7 = "現状特に問題はありません、これより「ニンジン」のあるポイン[ruby=エコー]トEま[/ruby]で移動予定です。"
41080-8 = "こちらキャンプRABBIT、各位のGPS信号を確認。"
41080-9 = "警備会社の勤務シフトも確認したけど、特に大きな変更点は無し。"
41080-10 = "ま、ポイン[ruby=エコー]トEま[/ruby]では問題ないでしょ。"
41080-11 = "[s] \"ちょっと良い？\""
41080-12 = "……どうしましたか、先生。"
41080-13 = "ここまで来て小言を並べるつもりなら、帰っていただきたいのですが。"
41080-14 = "変なことを言われては、作戦に影響します。"
41080-15 = "[s] \"色々と心配になって……。\""
41080-16 = "……もしかして、盗みでも働くと思いましたか？"
41080-17 = "私たちはSRT、市民の財産を盗んだりはしませんよ。"
41080-18 = "ここにあるドラム缶は、廃棄予定となっているもの。つまり持ち帰ったところで、誰にも金銭的な損害は生じません。"
41080-19 = "むしろ企業にとっては、処理の費用が節約できるはずです。"
41080-20 = "[s] \"だったら、やっぱり素直に貰うとかは……？\""
41080-21 = "それは……"
41080-22 = "そこから先はプライドの問題だ。"
41080-23 = "他人の同情を当てにするなんてことはできない！"
41080-24 = "[s] \"うーん、そっか……。\""
41080-25 = "ま、まああれだ、この間の弁当については……"
41080-26 = "あれはあくまで、私たちが「確保」したもの。"
41080-27 = "そういうことだから！"
41080-28 = "プライドにかけて、私たちは絶対に……！"
41080-29 = "RABBIT2、落ち着いてください。作戦中です。"
41080-30 = "そろそろ時間です。突入前に、偵察をお願いします。"
41080-31 = "っていうかミヤコ、何でお前が普通に指揮をしてるんだ。"
41080-32 = "……RABBIT2、作戦中はコードネームを使ってください。"
41080-33 = "ちっ、それは正論だけどさ……。"
41080-34 = "っていうかそれより、何でお前が指揮してるのかって聞いてるんだよ。"
41080-35 = "それは、私は隊長で……。"
41080-36 = "上からそう指示された、それだけだろ？"
41080-37 = "SRT特殊学園を閉鎖させた、あの連邦生徒会の指示で。"
41080-38 = "……。"
41080-39 = "でも今はもうこの状況だ、誰が指揮を執ったって良いはず。"
41080-43 = "……みんなは、どう思いますか？"
41080-45 = "私は別に、どーでも良いかな。どっちでも変わらないっていうか。"
41080-46 = "私は、えっと……。"
41080-48 = "……了解です。"
41080-49 = "では、今回の隊長は任せます。"
41080-50 = "指揮をお願いします、RABBIT2。"
41080-51 = "ふん。まあ所詮、相手は普通の警備員だし……これくらい朝飯前だ。"
41080-52 = "こういうシチュエーションも、訓練で散々やった。それこそ、目を瞑ってもできるくらいに。"
41080-54 = "えっと、サキちゃん……"
41080-55 = "じゃなくて、RABBIT2。私はどこで待機すれば……？"
41080-56 = "は？えーっと……"
41080-57 = "ちょ、ちょっと待った。市街地戦での狙撃手の位置は……確かノートに……。"
41080-64 = "うう、飲み過ぎた……。トイレ……。"
41080-66 = "……誰か、近づいてきています！"
41080-67 = "はぁ！？このルートには普通来ないはずだろ！？"
41080-68 = "あちゃー、何でかなー……うーん、分からない！想定外！"
41080-69 = "さ、サキちゃん！どうすれば……！？"
41080-70 = "に、逃げても良い……！？"
41080-71 = "そ、それは、えっと……。"
41080-72 = "高いところ！とにかく高い所に行って！"
41080-73 = "教範によれば、狙撃の基本は「視野の確保」。高いところに登れば、多分ほとんどの状況で……！"
41080-75 = "待ってください、サキ。あのタワークレーンは狙撃に向いてるとしても、逃走時には――"
41080-76 = "そっ、それくらい分かってる！"
41080-77 = "ん？何の音だ……？"
41080-85 = "なっ、侵入者！？"
41080-86 = "荷物を盗みに来やがったか、このコソ泥め！"
41080-87 = "誰がコソ泥だ！？"
41080-91 = "ああもう、交戦開始！最大火力を投下して、各自ポイン[ruby=エコー]トEま[/ruby]で直行！！"

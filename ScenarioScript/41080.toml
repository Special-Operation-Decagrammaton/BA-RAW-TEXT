[translation]
41080-1 = "第8話;胡蘿蔔作戰（２）"
41080-2 = "D.U.港灣"
41080-6 = "這裡是RABBIT1，現在時刻2100。已到[ruby=Delta]達D地[/ruby]點。"
41080-7 = "目前沒什麼問題，接下來預定移動到「胡蘿蔔」所在[ruby=Ecco]的E地[/ruby]點。"
41080-8 = "這裡是營地RABBIT，已確認各位的GPS信號。"
41080-9 = "警備公司的勤務表也確認過了，沒有特別大的改變。"
41080-10 = "嘛，[ruby=Ecco]到E地[/ruby]點應該是不會有問題的吧。"
41080-11 = "[s] 「可以打擾一下嗎？」"
41080-12 = "……怎麼了嗎，老師。"
41080-13 = "事到如今還打算碎碎唸的話，就請回去吧。"
41080-14 = "說三道四會影響作戰的。"
41080-15 = "[s] 「我突然覺得各種不安……」"
41080-16 = "……你該不會以為我們要偷竊吧？"
41080-17 = "我們是SRT，不會偷取市民的財產。"
41080-18 = "這裡的鐵桶，是預計要被廢棄的東西。#n所以就算帶回去，也不會讓任何人受到金錢上的損害。"
41080-19 = "對企業來說，這樣反而能節省處理的費用。"
41080-20 = "[s] 「這樣的話，乾脆率直收下不好嗎……？」"
41080-21 = "那是……"
41080-22 = "再下去就是尊嚴的問題。"
41080-23 = "我們無法指望他人同情！"
41080-24 = "[s] 「嗯……是嗎……」"
41080-25 = "就，就像是上次的便當……"
41080-26 = "那終究只是，我們「確保」的東西。"
41080-27 = "就是這樣！"
41080-28 = "賭上尊嚴，我們絕對……！"
41080-29 = "RABBIT2，請冷靜一點。現在正在作戰。"
41080-30 = "時間差不多了。突入之前麻煩你進行偵查。"
41080-31 = "話說都子，你怎麼若無其事的在指揮啊。"
41080-32 = "……RABBIT2，作戰中請使用代號。"
41080-33 = "呿，這倒是啦……"
41080-34 = "但比起那個，我在問你為什麼是你在指揮啊。"
41080-35 = "那是因為，我是隊長……"
41080-36 = "那只是上層指示的吧？"
41080-37 = "把SRT特殊學園關閉的，那個聯邦學生會的指示。"
41080-38 = "……"
41080-39 = "但是現在已經是這個狀況了，不管由誰來指揮都可以。"
41080-43 = "……大家，有什麼看法？"
41080-45 = "我覺得怎麼樣都無所謂。感覺怎樣都一樣。"
41080-46 = "我，那個……"
41080-48 = "……了解了。"
41080-49 = "那麼，這次的隊長交給你了。"
41080-50 = "拜託你指揮了，RABBIT2。"
41080-51 = "哼。畢竟對手只是普通的警衛……這種程度是家常便飯。"
41080-52 = "這種情境，在訓練時也做了很多次。#n而且是閉上眼睛也能做到的程度。"
41080-54 = "那個，咲希醬……"
41080-55 = "不對，RABBIT2。我要在哪裡待機才好……？"
41080-56 = "哈啊？那個……"
41080-57 = "等，等我一下。在市街戰狙擊手的位置……我記得筆記裡……"
41080-64 = "唔唔，喝太多了……廁所……"
41080-66 = "……有人正在接近！"
41080-67 = "哈啊！？這條路線一般不會過來吧！？"
41080-68 = "哎呀～為什麼呢……唔嗯……我不知道！出乎預測！"
41080-69 = "咲，咲希醬！該怎麼辦……！？"
41080-70 = "可，可以逃走嗎……！？"
41080-71 = "那，那是，那個……"
41080-72 = "高處！總之先去高處！"
41080-73 = "根據教戰手冊，狙擊的基本在於「確保視野」。只要爬到高處，大部分的情況應該……！"
41080-75 = "請等一下，咲希。那個塔式起重機就算適合狙擊，逃走時──"
41080-76 = "那，那種事情我知道！"
41080-77 = "嗯？什麼聲音……？"
41080-85 = "什，入侵者！？"
41080-86 = "是來偷竊貨物的嗎，這些死小偷！"
41080-87 = "誰是小偷啊！？"
41080-91 = "啊啊真是，交戰開始！火力全開，各自前[ruby=Ecco]往E地[/ruby]點！！"

[translation]
41080-1 = "#title;제8화;당근 작전 2"
41080-2 = "#place;D.U. 항만 내 하역장"
41080-3 = "#wait;2500"
41080-4 = "#wait;1500"
41080-5 = "3;미야코;11\n#3;greeting\n#3;a\n#wait;1500"
41080-6 = "3;미야코;05;여기는 RABBIT 1. 현재 시각은 2100시. 지금 막 포인트 델타에 도착했습니다.\n#3;em;[반응]"
41080-7 = "3;미야코;11;현 위치에 별다른 위협은 파악되지 않았으며, <당근>이 위치한 포인트 에코까지 지체없이 이동하도록 하겠습니다."
41080-8 = "1;통신모에;02;여기는 캠프 RABBIT. 각 위치에서 소대원들의 GPS 신호를 확인.\n#1;a\n#3;m5"
41080-9 = "1;통신모에;02;이 하역장의 보안 업무를 맡고 있는 경비 업체의 근무 시프트를 확인해보니 특별한 변경점은 없었어."
41080-10 = "1;통신모에;03;아마 포인트 에코까지의 이동을 방해하는 적은 없을 거야.\n#1;em;[음표]"
41080-11 = "[s] \"이래도 괜찮은 걸까…….\""
41080-12 = "3;미야코;10;……뭔가요, 선생님.\n#3;em;[반응]"
41080-13 = "3;미야코;05;여기까지 따라오셔서 잔소리를 늘어놓으실 생각이라면 먼저 돌아가 주셨으면 합니다."
41080-14 = "3;미야코;11;특수부대의 작전 현장은 선생님께는 지극히 위험하니까요."
41080-15 = "[s] \"무슨 문제라도 생길까 봐 걱정되어서.\""
41080-16 = "3;미야코;05;설마 저희가 도둑질 같은 걸 할까 봐 그러시는 건가요?\n#3;em;[?]\n#3;m3\n#1;dl"
41080-17 = "3;미야코;10;당연히 시민을 지키기 위해 조직된 SRT 학원의 학생으로서 시민의 재산을 훔칠 생각은 없습니다."
41080-18 = "3;미야코;99;파악한 바에 따르면 이곳에 적재된 빈 드럼통은 폐기 처분 예정인 폐자재로, 저희가 가져간다 해서 이들에게 금전적 손해가 발생하는 물건은 아닙니다."
41080-19 = "3;미야코;05;오히려 기업 입장에서는 처리 비용을 아낄 수 있어 이득을 보게 되는 셈이지요."
41080-20 = "[s] \"그럼 그냥 달라고 하면 안 되는 거야?\""
41080-21 = "3;미야코;08;그건……\n#3;em;[땀]\n#3;stiff"
41080-22 = "5;사키 헬멧;05;버릴 예정인 물건을 달라고 직접 구걸하면 거지 같잖아.\n#5;em;[반응]\n#5;a\n#3;m1"
41080-23 = "5;사키 헬멧;12;지금은 노숙을 하고 있지만, 우리는 SRT 학원의 엘리트들이라고! 다른 사람의 동정 따위에 기댈 수는 없어!"
41080-24 = "[s] \"하지만 저번에는……\""
41080-25 = "5;사키 헬멧;09;그때, 도시락은 그러니까……\n#5;em;…"
41080-26 = "5;사키 헬멧;10;시끄러워!\n#5;hophop\n#3;dl\n#5;m3"
41080-27 = "5;사키 헬멧;12;폐기 도시락도 우리가 '확보'한 거지, 절대로 구걸해서 얻어낸 게 아니거든?!"
41080-28 = "5;사키 헬멧;05;우리의 자존심은 절대로 꺾이지 않으니까—"
41080-29 = "1;미야코;05;……RABBIT 2. 진정하고 목소리를 줄여주세요. 이곳은 적진입니다.\n#1;em;[반응]\n#1;ar\n#5;m5"
41080-30 = "1;미야코;11;우선 돌입에 앞서 경로에 위험 요소가 없는지 선두 정찰을 부탁드리겠습니다."
41080-31 = "5;사키 헬멧;11;그런데 어째서 미야코. 네가 다시 자연스럽게 지휘를 맡는 거야?\n#5;em;[?]"
41080-32 = "1;미야코;10;……작전 중에는 이름 대신 호출 코드를 사용해주세요, RABBIT 2. 신원이 들통날 수도 있습니다."
41080-33 = "5;사키 헬멧;06;쳇, 이럴 때만 정론을……\n#5;em;[속상함]\n#5;stiff"
41080-34 = "5;사키 헬멧;05;그보다 말 돌리지 말고 대답해. 지금에 와서 왜 네가 멋대로 지휘를 맡는 거야?"
41080-35 = "1;미야코;04;그건…… 제가 이 소대의 소대장이기 때문에…….\n#1;em;[땀]"
41080-36 = "5;사키 헬멧;12;그래, 높으신 분들이 네게 소대장 역할을 맡겼지."
41080-37 = "5;사키 헬멧;11;무책임하게 SRT 학원을 폐쇄한 그 총학생회의 높으신 분들 말이야."
41080-38 = "1;미야코;11;……."
41080-39 = "5;사키 헬멧;05;그런데 총학생회에 반기를 들고 일어난 마당에, 이제는 누가 지휘를 맡든 상관없지 않겠어?\n#5;em;[?]"

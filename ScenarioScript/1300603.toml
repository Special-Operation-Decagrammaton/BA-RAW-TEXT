[translation]
1300603-1 = "The Imp's Unspeakable Secret"
1300603-2 = "(I arrived at the Problem Solver office at Mutsuki's request.)"
1300603-3 = "Welcome, Sensei!"
1300603-4 = "I have lots of things prepared for our game time today, Sensei. ♥"
1300603-6 = "[s] \"That's the bag you're always carrying around.\""
1300603-7 = "We'll start with playing cards... "
1300603-8 = "I've got chess, reversi, backgammon... Oh, and karuta!"
1300603-9 = "[s] \"Are they all board games?\""
1300603-10 = "Yup, these are the games I brought for today."
1300603-11 = "It's fun to play outside, but relaxing indoors with board games should be just as fun. I'm sure of it!"
1300603-12 = "Which game do you want to play first, Sensei? "
1300603-14 = "(So Mutsuki and I played all kinds of board games.)"
1300603-15 = "(About five hours later...)"
1300603-17 = "Haha, that was fun!"
1300603-18 = "Gosh, look at the time! It went by so fast!"
1300603-19 = "[s] \"Such is the magic of board games...\""
1300603-20 = "Are you tired, Sensei? Wanna take a break?"
1300603-21 = "Well, I'm thirsty. Give me a sec. There should be some drinks around here somewhere..."
1300603-25 = "Ah, that's right!"
1300603-26 = "By the way, you'd better not look inside my bag while I'm gone, okay?"
1300603-27 = "It's a lady's secret!"
1300603-28 = "Do you understand?"
1300603-31 = "[s] \"The bag?\""
1300603-32 = "(I realized that all the board games we had played so far came out of that bag.)"
1300603-33 = "(There were at least twenty of them...)"
1300603-34 = "[s1] \"Wait a minute.\"\n[s2] \"Is that...physically possible?\""
1300603-35 = "*twitch*"
1300603-36 = "*twitch*"
1300603-39 = "[ns] \"Did the bag just wiggle?\""
1300603-44 = "[ns] \"I must be dreaming...\""
1300603-46 = "[ns] \"I should clean up the board games before Mutsuki comes back...\""
1300603-47 = "*twitch*"
1300603-50 = "[ns] \"I saw it right...!\""
1300603-51 = "*wiggle* *wiggle*"
1300603-52 = "[ns] *gulp*"
1300603-54 = "[ns3] \"...I-I should check.\"\n[ns4] \"Like Mutsuki said...I shouldn't look into another person's bag.\""
1300603-55 = "(Gulp)"
1300603-58 = "[ns5] \"Well, then...\""
1300603-60 = "(...!)"
1300603-62 = "(Inside of the bag was...)"
1300603-63 = "(I felt like looking inside someone else's bag while they're gone wasn't right.)"
1300603-64 = "Sensei?"
1300603-66 = "[ns] \"Gah?!\""
1300603-67 = "What's wrong, Sensei? You look like you just saw a ghost or something."
1300603-68 = "[s] \"Huh? Just a second ago, the bag was...\""
1300603-69 = "What about the bag?"
1300603-71 = "[s] \"Uh, um, it's nothing...\""
1300603-72 = "Well, whatever. I brought some drinks."
1300603-73 = "We don't have time for this. We still have so many games to play!"
1300603-74 = "So, let's move on to the second round. ♥"
1300603-76 = "(I played board games with Mutsuki until nightfall, and nothing unusual happened.)"
1300603-78 = "Keeheeheehee..."
1300603-79 = "I'm glad you didn't find out what's inside, Sensei."
1300603-80 = "I won't tell you what it is. Not now, and not ever. ♥"

[translation]
1300603-1 = "ความลับที่พูดออกมาไม่ได้ของปีศาจน้อย"
1300603-2 = "(คุณครูมาถึงที่สำนักงานของหน่วยรับจ้างสารพัดตามคำเชิญของมุสึกิ)"
1300603-3 = "เชิญเลย~ คุณครู!"
1300603-4 = "วันนี้ฉันเตรียมเกมไว้เล่นเยอะแยะเลยน้า♡"
1300603-6 = "[s] \"นั่นกระเป๋าที่เธอสะพายไปบ่อยๆ นี่นา\""
1300603-7 = "เกมแรกเราจะเริ่มจากเกมไพ่ก่อน...."
1300603-8 = "ตามด้วยหมากรุก โอเทลโล่ แล้วก็แบ็กแกมมอน~ อ๋อ แล้วก็มีไพ่คารูโตะด้วย~"
1300603-9 = "[s] \"นั่นมันบอร์ดเกมทั้งหมดเลยนี่นา?\""
1300603-10 = "อื้อ ฉันเตรียมไว้มาเล่นวันนี้เลย"
1300603-11 = "ไปเที่ยวเล่นข้างนอกมันสนุกอยู่ก็จริง แต่การนั่งเล่นบอร์ดเกมชิวๆ อยู่ในห้องมันก็สนุกเหมือนกัน#nฉันมั่นใจเต็มร้อยเลย!"
1300603-12 = "ฮิฮิฮิ แล้วคุณครู... อยากเล่นเกมอะไรก่อนล่ะ~?"
1300603-14 = "(หลังจากนั้นคุณครูกับมุสึกิก็นั่งเล่นบอร์ดเกมด้วยกัน)"
1300603-15 = "(ห้าชั่วโมงต่อมา....)"
1300603-17 = "ฮ่า... สนุกจังเลย!"
1300603-18 = "เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย? เวลาผ่านไปเร็วกว่าที่คิดอีกแฮะ~"
1300603-19 = "[s] \"นั่นล่ะความมหัศจรรย์ของบอร์ดเกมล่ะ....\""
1300603-20 = "คุณครูเหนื่อยแล้วเหรอ? อยากพักสักหน่อยมั้ย?"
1300603-21 = "อื้อ คอแห้งจัง รอเดี๋ยวนะ น่าจะมีเครื่องดื่มขายอยู่แถวนี้น้า~"
1300603-25 = "อ๊ะ จริงสิ!"
1300603-26 = "คุณครูห้ามแอบดูของในกระเป๋าของฉันเด็ดขาดเลยนะ"
1300603-27 = "มันเป็นความลับของสาวน้อยน่ะ~"
1300603-28 = "เข้าใจมั้ย?"
1300603-31 = "[s] \"กระเป๋าเหรอ?\""
1300603-32 = "(พอมาคิดดูแล้วบอร์ดเกมที่เล่นมาก็อยู่ในกระเป๋านั่นทั้งหมดเลยนะ)"
1300603-33 = "(วันนี้เล่นไปเกือบ 20 เกมแน่ะ......)"
1300603-34 = "[s1] \"หืม? เดี๋ยวนะ\"\n[s2] \"นั่นมัน... ใส่เข้าไปหมดได้ด้วยเหรอ?\""
1300603-35 = "(ขยุกขยิก)"
1300603-36 = "(ขยุกขยิก)"
1300603-39 = "[ns] \"...เมื่อกี้กระเป๋ามันขยับด้วย?\""
1300603-44 = "[ns] \"สงสัยตาฝาดไปแน่ๆ...\""
1300603-46 = "[ns] \"เก็บบอร์ดเกมก่อนที่มุสึกิจะกลับมาดีกว่า...\""
1300603-47 = "(ขยุกขยิก)"
1300603-50 = "[ns] \"ไม่ได้ตาฝาด....!\""
1300603-51 = "(ขยุกขยิก) (ขยุกขยิก)"
1300603-52 = "[ns] \"เฮือก...\""
1300603-54 = "[ns3] \"ละ...ลองเปิดดูหน่อยดีไหม\"\n[ns4] \"มุสึกิพูดแบบนั้นแล้ว... ถ้าเปิดดูตามอำเภอใจก็คงไม่ดี\""
1300603-55 = "(กลืนน้ำลาย)"
1300603-58 = "[ns5] \"ถ้างั้น.... ไหนดูซิ\""
1300603-60 = "(...!!!)"
1300603-62 = "(และข้างในกระเป๋าก็คือ...)"
1300603-63 = "(แอบดูกระเป๋าคนอื่นตอนที่เจ้าของไม่อยู่มันคงไม่ดีเท่าไหร่)"
1300603-64 = "คุณครู?"
1300603-66 = "[ns] \"เฮือก!!\""
1300603-67 = "คุณครู? เป็นอะไรเหรอ? ทำไมทำหน้าเหมือนเห็นผีแบบนี้ล่ะ"
1300603-68 = "[s] \"หืม? เมื่อกี้กระเป๋ามัน...\""
1300603-69 = "กระเป๋า? ทำไมเหรอ?"
1300603-71 = "[s] \"เอ่อ... ไม่มีอะไรหรอก...\""
1300603-72 = "อะไรของคุณครูเนี่ย เอ้า ฉันซื้อเครื่องดื่มมาให้แล้ว"
1300603-73 = "ตอนนี้ไม่ใช่เวลาจะมัวโอ้เอ้แบบนี้นะ เรายังมีเกมรออยู่อีกเยอะเลย"
1300603-74 = "เพราะฉะนั้น... เรามาเริ่มรอบสองกันเถอะ ♥"
1300603-76 = "(จากนั้นคุณครูกับมุสึกิก็เล่นบอร์ดเกมกันจนถึงตอนมืด)"
1300603-78 = "คิคิคิคิ..."
1300603-79 = "โชคดีจังเลยน้า~ ที่คุณครูไม่เปิดดูของข้างในกระเป๋าน่ะ"
1300603-80 = "มันเป็นความลับน่ะ ฉันไม่บอกหรอก♡"

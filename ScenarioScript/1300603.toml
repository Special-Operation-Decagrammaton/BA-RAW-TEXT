[translation]
1300603-1 = "小惡魔不可告人的祕密"
1300603-2 = "（在無月的邀請下來到了便利屋辦公室）"
1300603-3 = "老師，歡迎～！"
1300603-4 = "為了今天跟老師一起玩，我做了各．種．準．備唷♡──！"
1300603-6 = "[s] 「在那裡面嗎？是平常在背的包包啊。」"
1300603-7 = "嗯！首先是撲克牌～"
1300603-8 = "西洋棋、黑白棋、雙陸棋～啊！還有歌牌～"
1300603-9 = "[s] 「數量驚人，全都是桌遊啊？」"
1300603-10 = "嗯，都是為了今天特地準備的。"
1300603-11 = "雖然在外面玩也很開心，但像這樣在室內悠哉地玩遊戲，肯定也很有趣！"
1300603-12 = "咯嘿嘿，那麼老師，要先玩哪一種遊戲～？"
1300603-14 = "（就這樣和無月兩人玩了各式各樣的桌遊）"
1300603-15 = "（不知不覺過了約5個小時……）"
1300603-17 = "呵呵，真好玩──！"
1300603-18 = "啊，已經這個時間了？愉快的時光總是過得很快呢～"
1300603-19 = "[s] 「對啊，這就是桌遊的魔法……」"
1300603-20 = "老師，你累嗎？要不要休息一下？"
1300603-21 = "啊，我口渴了。等我一下喔，飲料放去哪了呢～"
1300603-25 = "……對了！"
1300603-26 = "老師，別趁我不在的時候偷看我的包包哦。"
1300603-27 = "因為是少女的「秘．密」～"
1300603-28 = "……絕對，不可以看喔？"
1300603-31 = "[s] 「包包？」"
1300603-32 = "（話說回來，到現在，所有桌遊都是從那個包包拿出來的）"
1300603-33 = "（光是玩到現在的遊戲，就至少有20個……）"
1300603-34 = "[s1] 「嗯……？」\n[s2] 「那個……物理上來說，有可能裝得下嗎？」"
1300603-35 = "（扭動）"
1300603-36 = "（扭動）"
1300603-39 = "[ns]「……剛才。包包好像在蠕動？」"
1300603-44 = "[ns] 「是我看錯了吧……」"
1300603-46 = "[ns] 「在無月回來之前，把桌面整理一下好了……」"
1300603-47 = "（扭動）"
1300603-50 = "[ns] 「沒有看錯……！」"
1300603-51 = "（扭動，扭動）"
1300603-52 = "[ns]「（嚥口水）……」"
1300603-54 = "[ns3] 「……要，要確認看看嗎。」\n[ns4] 「無月都那麼說了，隨便偷看好像不太好……」"
1300603-55 = "（嚥口水）"
1300603-58 = "[ns5] 「我看看……？」"
1300603-60 = "（……！！！）"
1300603-62 = "（裡面裝的是……）"
1300603-63 = "（趁物主不在的時候偷看，感覺像是在做壞事一樣）"
1300603-64 = "老師？"
1300603-66 = "[ns] 「啊！！」"
1300603-67 = "老師？怎麼了？表情好像看到鬼一樣。"
1300603-68 = "[s] 「那個，剛剛，包包……」"
1300603-69 = "包包？怎麼了？"
1300603-71 = "[s] 「不，沒有。沒什麼……」"
1300603-72 = "什麼啊～真無聊。給你，我拿飲料來了。"
1300603-73 = "快點快點，沒時間浪費了～還有很多遊戲要玩呢。"
1300603-74 = "所．以．說……第2回合，開始♥"
1300603-76 = "（在那之後也沒發生什麼奇怪的事，一直到晚上，我和無月玩了非常多桌遊）"
1300603-78 = "咯呵呵………"
1300603-79 = "太好了，老師沒發現我包包裡面裝的是什麼。"
1300603-80 = "這可是少女的「秘．密」唷♡"

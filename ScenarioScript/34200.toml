[translation]
34200-1 = "ตอนที่ 20;นักบุญบาร์บารา"
34200-4 = "อึก... นี่มัน..."
34200-5 = "เป็นพลังที่เหลือเชื่อเลยค่ะ... พลังทำลายล้างที่เหนือกว่าอาวุธยุทธวิธี หรือบางทีอาจแข็งแกร่งกว่าเทวทูตประดิษฐ์อีก "
34200-6 = "นักบุญ... แห่งสาวกยูสตาร์... เราจะรับมือไหวเหรอ...?"
34200-12 = "ยังไม่หยุดสินะ... "
34200-17 = "ไล่ตามมาแล้ว...! เราต้องออกไปจากที่นี่!"

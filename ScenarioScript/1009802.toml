[translation]
1009802-1 = "Birth of a Hero"
1009802-8 = "At Hoshino's request, I headed to Abydos."
1009802-13 = "Ugh... So this column is the projected value...and this one's the target value?"
1009802-14 = "This is giving me a headache."
1009802-15 = "[s1] \"You're...doing paperwork? You?\"\n[s2] \"This is new.\""
1009802-20 = "Ah! Sensei!"
1009802-21 = "You sure came quickly. Thanks."
1009802-22 = "You rushed over here! I'm touched!"
1009802-23 = "[s] \"Well, you said you were in trouble.\""
1009802-24 = "Heh, heh. I made you worry, huh? Sorry, sorry."
1009802-25 = "So the \"trouble\" is—"
1009802-26 = "[s] \"Paperwork?\""
1009802-30 = "Ah? How'd you know?"
1009802-31 = "...You heard me grumbling and put two and two together?"
1009802-32 = "I really looked like I was struggling, huh?"
1009802-33 = "Well, you caught me. You know as well as me that a lot's happened around here recently."
1009802-34 = "We might've handled things more or less, but a ton of other tasks fell to the wayside as a result."
1009802-35 = "It's like I procrastinated on a semester's worth of homework..."
1009802-36 = "[s] \"All by yourself? Where's everyone else?\""
1009802-37 = "Ah. About that."
1009802-38 = "Uh. Heh. I kind of volunteered."
1009802-39 = "If you really think about, I'm the reason this pile-up even happened."
1009802-40 = "And I owe all the kiddos a lot."
1009802-42 = "\"As your senior, I'll do it for your sakes!\" I declared confidently!"
1009802-43 = "I've done it before. How hard could it be, you know?"
1009802-44 = "But..."
1009802-45 = "[s] \"But it's too much?\""
1009802-46 = "Heh."
1009802-47 = "After that show of bravado, I can hardly go crawling back to them for help."
1009802-48 = "But I'm starting to realize that there's no way I get this done on time, at least not on my own."
1009802-49 = "I have no one else to turn to, Sensei."
1009802-50 = "Could you possibly, pretty please, help me out? Just this once? I promise I'll make it up to you."
1009802-51 = "[s] \"Hm... Okay. Paperwork's my forte, anyway.\""
1009802-52 = "Really?"
1009802-53 = "Woohoo! I knew I could count on you, Sensei!"
1009802-55 = "[ns] \"And about making it up to me...\""
1009802-59 = "[ns] \"Don't think I'll forget.\""
1009802-60 = "Th-That's a scary expression, Sensei. Within reason, okay?!"
1009802-61 = "...You reassuring me scares me even more..."
1009802-62 = "But...I'm not gonna be able to finish on my own..."
1009802-66 = "Ugh! I'm backed into a corner! Okay, okay!"
1009802-67 = "[s] \"Where should I start?\""
1009802-71 = "I need to get the budget report done ASAP!"
1009802-72 = "Wait, wait. No, actually, the equipment status report is due the soonest..."
1009802-79 = "I helped Hoshino with her paperwork for quite some time."
1009802-85 = "[ns] \"There. All done.\""
1009802-86 = "..."
1009802-87 = "You're amazing, Sensei!"
1009802-88 = "It would have taken me three whole days by myself!"
1009802-89 = "Getting your help was definitely the right move!"
1009802-90 = "[s] \"Paperwork is my life.\""
1009802-91 = "I see, I see. The power of adults!"
1009802-92 = "Well, that's a weight off my shoulders. Thanks to you, Sensei. And I won't look bad in front of my juniors either."
1009802-93 = "Thank you, Sensei."
1009802-94 = "[s] \"No need to thank me.\""
1009802-98 = "[ns] \"There's a price for everything, after all.\""
1009802-102 = "Uwaaah. Oh, yeah."
1009802-103 = "I guess I should repay my debts, so..."
1009802-104 = "What's your price?"
1009802-105 = "But nothing too embarrassing. 'Kay?"
1009802-110 = "[ns3] \"Then please put on your gym uniform!\"\n[ns4] \"Then please put on your school swimsuit!\""
1009802-113 = "Gah?!"
1009802-114 = "Sensei..."
1009802-115 = "You really want to see me in that? Seriously?"
1009802-116 = "[s] \"I think you'd look totally adorable!\""
1009802-117 = "A-Adorable? How're you gonna say something like that with a straight face?"
1009802-118 = "Regardless! Rejected!"
1009802-119 = "...Why? That's beyond embarrassing, Sensei!"
1009802-120 = "And what if someone catches us? While I'm dressed...like that?!"
1009802-121 = "They might be like, \"Wow. You have good taste.\""
1009802-122 = "Or, \"Wow! Hoshino, you're so adorable! ☆\""
1009802-123 = "And all kinds of other embarrassing comments!"
1009802-124 = "[s] \"But... you promised...\""
1009802-128 = "Drop that disappointed expression! Isn't there anything else you want?"
1009802-129 = "Just...something a little less embarrassing...please!"
1009802-130 = "[s] \"Then...how about your combat uniform?\""
1009802-131 = "Hm?"
1009802-132 = "Combat uniform? The one I wore when..."
1009802-133 = "Well, I did get it cleaned before I put it away."
1009802-138 = "[ns] \"That's what I want! Please!\""
1009802-139 = "Whoa... So enthusiastic..."
1009802-140 = "That uniform comes with some complicated baggage, though..."
1009802-141 = "[s] \"PLEAAASE!\""
1009802-146 = "U-Ugh! Seriously...?"
1009802-147 = "I guess I'll take that over a tracksuit or swimsuit..."
1009802-161 = "Heh."
1009802-162 = "I didn't think I'd ever wear this again..."
1009802-163 = "You actually like this, Sensei?"
1009802-164 = "[ns] \"It's the best! You look so cool!\""
1009802-165 = "R-Really?"
1009802-166 = "Hm... It's pretty embarrassing..."
1009802-167 = "Well, if it makes you happy, I guess I can put up with it."
1009802-168 = "[s] \"Yes! Just put up with it for one week!\""
1009802-172 = "A-A week?!"
1009802-173 = "I was thinking more like one day... A week is way too long."
1009802-174 = "[s] \"I want to enjoy Cool Hoshino forever!\""
1009802-175 = "Looking cool isn't really my thing..."
1009802-176 = "[s] \"You're the best, Hoshino!\""
1009802-177 = "Do you really think you can sweet talk me into this?"
1009802-178 = "[s] \"It'll be a dream come true to see Cool Hoshino every day!\""
1009802-179 = "Ugh..."
1009802-184 = "I got it, I got it! Fine! Geez!"
1009802-185 = "Just one week, okay?"
1009802-186 = "Geez... You look like you won the lottery. Stop embarrassing me!"
1009802-187 = "I really don't get you sometimes, Sensei."
1009802-194 = "[ns] \"What's that sound?\""
1009802-195 = "...It's an alert from the school's security system."
1009802-196 = "It alerts us to any intruders or emergencies."
1009802-201 = "...The Helmet Gang?"
1009802-202 = "It looks like they're at the corner of the field, near the big bulletin board. What're they up to?"
1009802-203 = "Well, let's not wait around to find out."
1009802-207 = "Let's go, Sensei."
1009802-216 = "You sure we aren't gonna get in trouble for this?"
1009802-217 = "Quit worrying! What's this run-down school gonna do with a bulletin board anyway?"
1009802-218 = "Who's gonna care if we sell it off? Not like THEY need it!"
1009802-219 = "I guess you're right... I've definitely never seen it being used."
1009802-220 = "Hey, it hasn't even budged! Put your back into it, and dig it outta there!"
1009802-223 = "Yes, ma'am!"
1009802-234 = "Whatcha doing?"
1009802-238 = "Isn't it obvious?! We're stealing the bulletin board to sell for scrap—"
1009802-246 = "Huh?!"
1009802-252 = "Now, now. Why don't you put those shovels down?"
1009802-254 = "Huh? Who're you? You a student here?"
1009802-255 = "What's with all the gear? You going to war?"
1009802-257 = "There's a very reasonable explanation for why I'm dressed like this..."
1009802-258 = "Anyways! That bulletin board's school property, so I'm going to very nicely suggest that you leave it and be on your way."
1009802-259 = "Don't be a stick in the mud. I don't see you using it. It's basically trash, at this point."
1009802-260 = "C'mon. Consider it a charitable donation."
1009802-264 = "..."
1009802-265 = "Heh. Heh."
1009802-266 = "Do I look like the generous type to you?"
1009802-267 = "We might not be using it, but it still belongs to the school."
1009802-268 = "So leave it alone, or I'll make you leave it. Your call."
1009802-272 = "Oh, yeah? What're you gonna do about it?"
1009802-273 = "You might be armed to the teeth, but we've got you outnumbered."
1009802-275 = "Guys!"
1009802-283 = "You get it now, right? So get out of the way!"
1009802-296 = "Sh-She's shooting at us?!"
1009802-297 = "C'mon, guys! Let's take care of this sucker!"
1009802-303 = "Heh."
1009802-308 = "You've got some grit to you, huh?"
1009802-320 = "Heh."
1009802-321 = "Ugh..."
1009802-329 = "You took everyone down?! Just you?"
1009802-330 = "Tch! W-We'll get you next time!"
1009802-336 = "How totally cliche. It fits run-of-the-mill punks like them, though."
1009802-337 = "Are you okay, Sensei? Didn't catch any stray bullets, did you?"
1009802-338 = "[s] \"Hoshino...\""
1009802-339 = "Huh? What's with that look?"
1009802-340 = "Did I do something wrong...?"
1009802-345 = "[ns] \"You were so cool!\""
1009802-349 = "S-Sensei? I think I see sparkles in your eyes..."
1009802-350 = "I didn't do anything special. We handle stuff like this every day."
1009802-351 = "Huh? But I look extra-cool because of my uniform?"
1009802-352 = "[s] \"Yeah! You were...\""
1009802-354 = "[ns] \"You were like a hero!\""
1009802-355 = "..."
1009802-356 = "Heh, heh. Like in the movies?"
1009802-357 = "I'm the furthest thing from that, Sensei."
1009802-358 = "[s] \"Protecting your school from bad guys is exactly what a hero does!\""
1009802-359 = "S-Stop it. You're embarrassing me."
1009802-360 = "What? My hero name?"
1009802-361 = "Little Tactical? Knight Takanashi?"
1009802-366 = "What the heck are those?"
1009802-367 = "[ns] \"I'll be counting on you this next week, Hero of Abydos!\""
1009802-368 = "Seriously? You're way too excited, Sensei...um..."
1009802-369 = "I should've just worn the swimsuit!!"

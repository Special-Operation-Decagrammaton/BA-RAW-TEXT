[translation]
1009802-1 = "英雄，誕生"
1009802-8 = "（接到星野的聯絡後，動身前往了阿拜多斯）"
1009802-13 = "唔……所以這一項是預期值……旁邊這項是目標值嗎？"
1009802-14 = "看的頭好痛哦……"
1009802-15 = "[s1]「你居然在處理文書工作？」\n[s2]「這可真稀奇。」"
1009802-20 = "啊，老師！"
1009802-21 = "謝謝你這麼快就趕來了。"
1009802-22 = "看到你這麼快趕來，大叔我有點感動呢！"
1009802-23 = "[s]「你都說有麻煩了，我當然不能袖手旁觀囉。」"
1009802-24 = "唔嘿～讓你擔心了嗎？抱歉抱歉。"
1009802-25 = "總而言之，我所謂的麻煩就是……"
1009802-26 = "[s]「是文書工作對吧？」"
1009802-30 = "哎呀，你是怎麼知道的？"
1009802-31 = "嗯？看到我唉唉叫的樣子就明白了？"
1009802-32 = "我，我看起來有那麼痛苦嗎……"
1009802-33 = "不過就像老師說的一樣。#n你應該也知道吧？阿拜多斯這段時間發生了很多事。"
1009802-34 = "雖然最後都順利解決了，但是在我分神處理那些事的同時，又累積了很多工作沒做。"
1009802-35 = "所以現在必須回頭收拾爛攤子……有點類似趕暑假作業吧……"
1009802-36 = "[s]「不過這些都得你自己一個人處理嗎？其他人呢？」"
1009802-37 = "啊，這，這個嘛……"
1009802-38 = "唔嘿……關於這點，其實是我不小心誇下海口說要自己處理的。"
1009802-39 = "畢竟會累積這麼多工作，基本上都是大叔我的責任……"
1009802-40 = "而且最近又給大家添了這麼多麻煩……"
1009802-42 = "「這些文書工作交給前輩我來就好！」……所以事情就變成這樣了。"
1009802-43 = "本來以為只要像以前一樣咬牙苦幹，應該總會有辦法的……"
1009802-44 = "沒想到……"
1009802-45 = "[s]「果然還是行不通？」"
1009802-46 = "唔嘿～"
1009802-47 = "都已經誇下海口了，總不能現在回去請他們幫忙……"
1009802-48 = "但我一個人實在沒辦法在期限內處理完這些工作～"
1009802-49 = "在這種情況下，能幫我的人就只有老師了。"
1009802-50 = "之後一定會好好報答你的，這次能不能幫幫大叔我呢？"
1009802-51 = "[s]「嗯，好吧。反正文書工作本來就是我最在行的事。」"
1009802-52 = "真的嗎？"
1009802-53 = "呀呼！我就知道你會幫我的，老師！"
1009802-55 = "[ns]「不過你說會好好報答我的那句話……」"
1009802-59 = "[ns]「我會牢記在心裡的哦。」"
1009802-60 = "老，老師，你的眼神突然變得有點可怕耶。#n就算是大叔我，太過分的要求也是不會答應的喔！？"
1009802-61 = "聽你說別擔心……反而讓我更擔心了。"
1009802-62 = "不過沒有老師的話，我實在做不完這些工作……"
1009802-66 = "嗚嗚，沒辦法了……"
1009802-67 = "[s]「所以我該從什麼開始做起呢？」"
1009802-71 = "目前最緊急的是預算報告！"
1009802-72 = "不對，截止日期最近的應該是這份器材現況報告嗎……？"
1009802-79 = "（之後的好一陣子，都在幫星野處理堆積的文書工作）"
1009802-85 = "[ns]「好，這樣就結束了。」"
1009802-86 = "……"
1009802-87 = "太厲害了，老師！"
1009802-88 = "如果是大叔我一個人的話，肯定要處理個三天三夜才行！"
1009802-89 = "拜託你幫忙果然是正確的決定！"
1009802-90 = "[s]「畢竟我平常就在處理這類的文件嘛。」"
1009802-91 = "果然是這樣嗎？這就是大人的力量？"
1009802-92 = "哎呀，多虧有老師，總算可以鬆一口氣了。#n這樣大叔我也可以抬頭挺胸地面對後輩們了。"
1009802-93 = "謝謝你，老師。"
1009802-94 = "[s]「不用客氣。」"
1009802-98 = "[ns]「畢竟是場公平的交易嘛。」"
1009802-102 = "唔，唔嘿～說的也是。"
1009802-103 = "既然確實接受了老師的幫助，就必須好好報答才行。"
1009802-104 = "好，你要什麼就儘管開口吧。"
1009802-105 = "唔嘿～不過可不能要我做什麼害羞的事唷。"
1009802-110 = "[ns3]「好，那就請你換上體育服吧！」\n[ns4]「好，那就請你換上學校泳衣吧！」"
1009802-113 = "咦！？"
1009802-114 = "老師……"
1009802-115 = "居然想看大叔穿那種衣服……你是認真的嗎？"
1009802-116 = "[s]「我覺得你穿那種衣服肯定很可愛的！」"
1009802-117 = "可，可愛？老師居然能若無其事地說出那種話嗎……！"
1009802-118 = "總之駁回！"
1009802-119 = "理由是大叔我會覺得害羞！"
1009802-120 = "而且要是被人發現大叔我穿著那種衣服，還和老師待在一起的話……"
1009802-121 = "肯定會聽到「嗯，我們應該尊重每個人的喜好……」──"
1009802-122 = "或者「哇☆星野前輩真可愛☆」──"
1009802-123 = "這種令人臉紅心跳的話！"
1009802-124 = "[s]「可是……我們剛才不是說好了嗎……」"
1009802-128 = "不，不可以露出那種沮喪的表情！#n老，老師你就沒有別的心願了嗎？"
1009802-129 = "當然是比較不令人害羞的那種……！"
1009802-130 = "[s]「既然如此……上次穿的戰鬥服怎麼樣？」"
1009802-131 = "嗯？"
1009802-132 = "戰鬥服……是說我之前穿的那套嗎？"
1009802-133 = "唔，我是有好好保養那套戰鬥服啦。"
1009802-138 = "[ns]「那就拜託你穿戰鬥服了！」"
1009802-139 = "哇，怎麼突然這麼有精神……"
1009802-140 = "可是經歷上次的事件後，那件衣服就成為了我的黑歷史。#n現在光是想到那件衣服就覺得難為情……"
1009802-141 = "[s]「拜託你了！」"
1009802-146 = "唔唔……真是的……"
1009802-147 = "不過比起體育服或泳衣……"
1009802-161 = "唔嘿……"
1009802-162 = "沒想到竟然會再次穿上這套服裝……"
1009802-163 = "老師真的喜歡這種風格嗎……"
1009802-164 = "[ns]「超喜歡！真的超帥的！」"
1009802-165 = "是，是嗎？"
1009802-166 = "唔唔，雖然穿這種衣服的確有點令人難為情……"
1009802-167 = "不過只要老師喜歡就行了。"
1009802-168 = "[s]「那你這個星期就都穿這套衣服吧！」"
1009802-172 = "這個星期？"
1009802-173 = "整個星期會不會有點久……？#n如果今天一天的話倒還說得過去～"
1009802-174 = "[s]「我想要一直欣賞你帥氣的模樣，星野！」"
1009802-175 = "帥，帥氣？大叔我才不像你說的……"
1009802-176 = "[s]「星野最棒了！」"
1009802-177 = "就算那樣稱讚大叔我，也得不到任何好處的哦～"
1009802-178 = "[s]「如果每天都能看到帥氣的星野，我一定會很開心的！」"
1009802-179 = "嗚嗚……"
1009802-184 = "知道了，我知道了啦。"
1009802-185 = "真的只有這個星期而已哦？"
1009802-186 = "竟然露出那麼開心的表情……#n唔嘿……老師那樣會讓大叔我很害羞的耶。"
1009802-187 = "真是的，有時候真搞不懂你。"
1009802-194 = "[ns]「這是什麼聲音？」"
1009802-195 = "……是我在學校附近架設的監視器。"
1009802-196 = "如果有不明人士接近或發生緊急狀況，警報就會響起。"
1009802-201 = "……頭盔團？"
1009802-202 = "是運動場角落的校園佈告欄……他們在那裡做什麼？"
1009802-203 = "總之不能放著他們不管。"
1009802-207 = "我們走吧，老師。"
1009802-216 = "這樣真的沒關係嗎？"
1009802-217 = "有什麼關係？#n反正這間學校都快倒了，留著校園佈告欄又有什麼用咧？"
1009802-218 = "既然他們用不到這東西，不如讓我們拿去賣掉賺點零用錢。"
1009802-219 = "也是，我從來沒看他們用過這個東西……"
1009802-220 = "姐妹們，給我用力挖！別站著不動！"
1009802-223 = "是！"
1009802-234 = "喂，你們在做什麼。"
1009802-238 = "看了還不知道嗎？#n我們要把佈告欄拆了拿去賣──"
1009802-246 = "嗯！？"
1009802-252 = "好了好了，你們先把鏟子放下。"
1009802-254 = "怎麼，你是這裡的學生嗎？"
1009802-255 = "居然還全副武裝的，你是來起爭議的是不是？"
1009802-257 = "這身衣服是因為別的原因……"
1009802-258 = "總之，那個佈告欄是我們學校的所有物……#n勸你們還是把東西放下，乖乖離開這裡比較好哦～"
1009802-259 = "真是的，這東西你們又沒在用，根本和廢棄物沒兩樣。"
1009802-260 = "直接捐給我們不是更實在嗎？"
1009802-264 = "……"
1009802-265 = "唔嘿～"
1009802-266 = "難道大叔我在不知不覺之中，變成了熱心的贊助者了嗎？"
1009802-267 = "就算這東西我們沒在用，它依舊是學校的財產。"
1009802-268 = "要是你們不肯罷休的話，我也只能強行送你們離開了。"
1009802-272 = "我們就不罷休，你能拿我們怎麼樣？"
1009802-273 = "就算你全副武裝，戰鬥時最重要的還是人數。"
1009802-275 = "姐妹們！"
1009802-283 = "看到了吧？勸你還是乖乖滾遠一點，少來礙事──"
1009802-296 = "你，你居然敢先開槍！？"
1009802-297 = "姐妹們！把這個礙事的傢伙解決掉！"
1009802-303 = "嘿～"
1009802-308 = "還挺有毅力的嘛。"
1009802-320 = "唔嘿～"
1009802-321 = "唔……"
1009802-329 = "竟，竟然一個人就把所有人都……！"
1009802-330 = "呿！給我走著瞧！"
1009802-336 = "哎呀～真是經典的落跑台詞呢。#n果然是三流反派。"
1009802-337 = "老師你還好嗎？沒有被波及到吧？"
1009802-338 = "[s]「星野……」"
1009802-339 = "嗯？為什麼那樣盯著大叔我看？"
1009802-340 = "難道我哪裡做得不對嗎──"
1009802-345 = "[ns]「你也太帥了吧！」"
1009802-349 = "老，老師？居然連眼睛都閃閃發光……"
1009802-350 = "這種事又不是第一次發生，應該沒必要這麼大驚小怪的吧？"
1009802-351 = "嗯？穿著這身服裝將入侵者一網打盡的樣子，實在帥到不行？"
1009802-352 = "[s]「沒錯！簡直……」"
1009802-354 = "[ns]「就跟英雄沒兩樣！」"
1009802-355 = "……"
1009802-356 = "唔，唔嘿～英雄指的是電影裡的那種英雄嗎？"
1009802-357 = "大叔我怎麼看都不像英雄吧～"
1009802-358 = "[s]「保護學校不受入侵者騷擾，完全就是英雄會做的事啊！」"
1009802-359 = "你，你別說了啦～大叔我都臉紅了。"
1009802-360 = "嗯？英雄的稱號？"
1009802-361 = "嬌小謀略家？小鳥遊騎士？"
1009802-366 = "那是什麼啦～！"
1009802-367 = "[ns]「這一星期就拜託你囉，阿拜多斯的英雄大人！」"
1009802-368 = "真是的，老師居然這麼興奮……嗚嗚。"
1009802-369 = "早知道就該咬牙穿上學校泳衣的……！"

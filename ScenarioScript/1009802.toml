[translation]
1009802-1 = "การถือกำเนิดของฮีโร่"
1009802-8 = "(คุณครูเดินทางมาที่โรงเรียนอะบิดอสหลังได้รับการติดต่อจากโฮชิโนะ)"
1009802-13 = "ฮือ... ถ้างั้นหัวข้อนี้คือเป็นตัวเลขที่ประมาณการ... ส่วนช่องข้างๆ ก็คือวัตถุประสงค์...?"
1009802-14 = "หัวจะปวดจริงๆ..."
1009802-15 = "[s1] \"เกิดอะไรขึ้นน่ะถึงได้มานั่งทำเอกสาร?\"\n[s2] \"เป็นภาพไม่คุ้นตาเลยนะ\""
1009802-20 = "อ๊ะ ครู!"
1009802-21 = "มาเร็วทันใจมากเลย ขอบคุณนะ"
1009802-22 = "นึกไม่ถึงเลยว่าจะมาเร็วขนาดนี้ ลุงประทับใจจริงๆ!"
1009802-23 = "[s] \"เห็นบอกว่ากำลังลำบากนี่นา จะให้ครูอยู่เฉยๆ ได้ยังไงกัน\""
1009802-24 = "แหะๆ~ ทำให้เป็นห่วงซะแล้วสิ โทษทีนะ โทษที..."
1009802-25 = "คือว่านะ... เรื่องลำบากที่พูดถึงน่ะ..."
1009802-26 = "[s] \"เรื่องงานเอกสารใช่มั้ยล่ะ?\""
1009802-30 = "เอ๋ ครูรู้ได้ยังไงน่ะ?"
1009802-31 = "หืม? เห็นท่าทางคร่ำครวญของฉันก็รู้แล้วงั้นเหรอ?"
1009802-32 = "ฉะ...ฉันดูลำบากมากขนาดนั้นเลยเหรอ..."
1009802-33 = "แต่มันก็ถูกแล้วละ ครูก็รู้ใช่มั้ยว่าอะบิดอสเกิดเรื่องต่างๆ ขึ้นมากมายในช่วงที่ผ่านมาน่ะ"
1009802-34 = "ถึงเรื่องพวกนั้นจะคลี่คลายไปได้ด้วยดีแล้วก็เถอะนะ แต่ช่วงที่มัวแต่ไปสนใจเรื่องพวกนั้นอยู่ งานต่างๆ ก็เพิ่มพูนเป็นกองพะเนินเลยนี่สิ"
1009802-35 = "เพราะงั้นก็เลยต้องมาจัดการย้อนหลังน่ะ... ก็คล้ายๆ กับลืมทำการบ้านตอนปิดเทอมละมั้ง..."
1009802-36 = "[s] \"แต่ทำไมโฮชิโนะมาทำอยู่คนเดียวล่ะ? เด็กคนอื่นๆ ล่ะ?\""
1009802-37 = "อ๊ะ ระ... เรื่องนั้น"
1009802-38 = "หะ...แหะๆ... คือว่าที่จริงแล้ว ฉันเป็นคนอาสาที่จะทำเองน่ะ"
1009802-39 = "แต่ถ้าพูดกันจริงๆ แล้ว การที่งานเอกสารล่าช้าแบบนี้ก็เป็นความรับผิดชอบของฉันด้วย..."
1009802-40 = "ฉันไปรบกวนทุกคนไว้ตั้งเยอะแล้วนี่นา"
1009802-42 = "\"เพราะงั้นแค่งานเอกสารพวกนี้ ให้เป็นหน้าที่ของรุ่นพี่อย่างฉันได้เลย!\"... ดันพูดแบบนี้ไปซะแล้วน่ะ "
1009802-43 = "ฉันคิดว่าถ้าพยายามให้เหมือนกับเมื่อก่อน เดี๋ยวก็คงจะทำได้เอง..."
1009802-44 = "แต่ว่ามัน..."
1009802-45 = "[s] \"มันหนักหนาเกินไป?\""
1009802-46 = "แฮร่~"
1009802-47 = "ฉันไปพูดไว้ซะใหญ่โตแบบนั้น ถ้าตอนนี้ไปขอให้พวกเด็กๆ ช่วย มันก็จะดูยังไงๆ อยู่นะ..."
1009802-48 = "ยังไงก็เถอะ แต่ถ้าทำคนเดียวก็คงทำเสร็จได้ไม่ทันในเวลาที่กำหนด~"
1009802-49 = "ในสถานการณ์แบบนี้ คนที่ฉันจะขอให้ช่วยได้ก็มีแค่ครูคนเดียวนะ"
1009802-50 = "ฉันจะตอบแทนอย่างแน่นอน เพราะงั้นช่วยลุงคนนี้สักครั้งได้รึเปล่า?"
1009802-51 = "[s] \"ก็ได้ ครูชินกับงานเอกสารอยู่แล้ว\""
1009802-52 = "จริงเหรอ?"
1009802-53 = "ยะโฮ่! สมแล้วที่ฉันเชื่อใจครู!"
1009802-55 = "[ns] \"แต่ว่า... เรื่องตอบแทนน่ะ ครูจะจำไว้นะ...\""
1009802-59 = "[ns] \"ที่บอกว่าจะตอบแทนน่ะ ครูจดไว้แล้วนะ\""
1009802-60 = "คะ... ครู... สายตาน่ากลัวสุดๆ เลยนะ ถึงจะเป็นลุงคนนี้ก็ทำตามคำขอที่มากเกินไปไม่ไหวหรอกนะ?!"
1009802-61 = "ไม่ต้องเป็นห่วงงั้นเหรอ? พอครูพูดแบบนี้ยิ่งน่ากังวลใหญ่เลย..."
1009802-62 = "แต่ว่าถ้าไม่ให้ครูช่วยก็คงลำบาก..."
1009802-66 = "ฮือ... ช่วยไม่ได้นะ..."
1009802-67 = "[s] \"ให้ครูเริ่มจากตรงไหนดีล่ะ?\""
1009802-71 = "เอกสารเร่งด่วนที่สุดก็คงเป็น... รายงานงบการเงิน!"
1009802-72 = "เดี๋ยวก่อนนะ เอกสารที่ใกล้ถึงเดดไลน์มากที่สุดคือ... รายงานจำนวนอุปกรณ์คงเหลือรึเปล่านะ...?"
1009802-79 = "(หลังจากนั้น คุณครูก็ใช้เวลาพักใหญ่จัดการงานเอกสารที่คั่งค้างอยู่ของโฮชิโนะ)"
1009802-85 = "[ns] \"เอ้า เสร็จแล้วละ\""
1009802-86 = "......"
1009802-87 = "สุดยอดเลย ครู!"
1009802-88 = "ถ้าลุงคนนี้ทำเองคนเดียวละก็คงต้องโต้รุ่งสักสามวันเลยละมั้งเนี่ย!"
1009802-89 = "คิดไม่ผิดเลยที่ไปขอให้ครูมาช่วยน่ะ!"
1009802-90 = "[s] \"เอกสารแค่นี้เอง ปกติครูก็ทำประมาณนี้แหละ\""
1009802-91 = "อย่างนั้นเหรอ... หรือนี่จะเป็นพลังของผู้ใหญ่กันนะ"
1009802-92 = "อ่า... เท่านี้ก็เหมือนยกภูเขาออกจากอกเลย ไปยืดอกภูมิใจต่อหน้าพวกรุ่นน้องได้แล้วละ"
1009802-93 = "ขอบคุณนะ ครู"
1009802-94 = "[s] \"ไม่ต้องขอบคุณหรอก\""
1009802-98 = "[ns] \"กีฟ แอนด์ เทคน่ะ\""
1009802-102 = "แหะๆ~ นั่นสินะ"
1009802-103 = "เอาเถอะ ที่ฉันได้รับความช่วยเหลือจากครูก็เป็นความจริง ถ้าไม่ตอบแทนก็คงไม่ได้"
1009802-104 = "ดีละ งั้นก็บอกเรื่องที่ต้องการมาได้เลย"
1009802-105 = "แฮร่~ สั่งมาได้เลย ไม่ต้องเขินหรอก"
1009802-110 = "[ns3] \"งั้นช่วยใส่ชุดพละให้ดูหน่อยสิ!\"\n[ns4] \"งั้นช่วยใส่ชุดว่ายน้ำของโรงเรียนให้ดูหน่อยสิ!\""
1009802-113 = "หา?!"
1009802-114 = "ครู..."
1009802-115 = "อยากเห็นภาพลักษณ์แบบนั้นของลุงเหรอ... ถามจริง?"
1009802-116 = "[s] \"ก็พอใส่ชุดพวกนั้นแล้ว โฮชิโนะน่ารักมากๆ เลยนี่นา!\""
1009802-117 = "นะ... น่ารักงั้นเรอะ พูดอะไรแบบนั้นออกมาได้หน้าตาเฉยแบบนี้ได้ยังไง...!"
1009802-118 = "ไม่เอาด้วยหรอก!"
1009802-119 = "น่าอายออกจะตายไป!"
1009802-120 = "แถมถ้าโดนจับได้ว่าอยู่กับครูด้วยชุดแบบนั้น...!"
1009802-121 = "คงจะโดนพูดว่า 'อื้ม... ก็เข้าใจรสนิยมอยู่นะ...' "
1009802-122 = "หรือไม่ก็ 'ว้าว☆ รุ่นพี่โฮชิโนะ น่ารักจังเลยค่ะ☆' อะไรแบบนี้แน่ๆ!"
1009802-123 = "ต้องได้ยินคำพูดชวนน่าอายพวกนั้นแน่ๆ!"
1009802-124 = "[s] \"แต่ว่า... สัญญากันแล้วนี่...\""
1009802-128 = "ยะ...อย่ามาทำหน้าหูลู่หางตกนะ! มะ... มีอย่างอื่นอีกรึเปล่า?"
1009802-129 = "อย่างอื่นที่มันน่าอายน้อยกว่านี้...!"
1009802-130 = "[s] \"ถ้างั้น... ชุดต่อสู้ที่ใส่เมื่อคราวก่อนล่ะ?\""
1009802-131 = "หืม?"
1009802-132 = "ถ้าเป็นชุดต่อสู้ละก็... หมายถึงชุดที่ใส่เมื่อคราวก่อนใช่มั้ยนะ?"
1009802-133 = "อืม ชุดนั้นฉันเอาไปซ่อมเสร็จแล้วก็เก็บไว้น่ะ"
1009802-138 = "[ns] \"งั้นขอเป็นชุดนั้นก็แล้วกัน!\""
1009802-139 = "ว้ากกก จู่ๆ ก็ร่าเริงขึ้นมาเลย..."
1009802-140 = "แต่ว่าชุดนั้น... มันเป็นส่วนหนึ่งของประวัติศาสตร์ดำมืด หลังจากเรื่องที่เกิดขึ้นเมื่อครั้งก่อนน่ะ แถมยังมีความทรงจำที่น่าอายอยู่ด้วย..."
1009802-141 = "[s] \"ขอร้องละ...!\""
1009802-146 = "อืมมม... จริงๆ เลย..."
1009802-147 = "แต่ก็ยังดีกว่าชุดพละหรือชุดว่ายน้ำละนะ..."
1009802-161 = "เฮ้อ..."
1009802-162 = "คิดไม่ถึงเลยว่าจะได้ใส่ชุดนี้อีก..."
1009802-163 = "ครูมีรสนิยมชอบอะไรแบบนี้เหรอ..."
1009802-164 = "[ns] \"สุดยอด! เท่สุดๆ เลย!\""
1009802-165 = "งะ...งั้นเหรอ?"
1009802-166 = "อืม น่าอายอย่างที่คิดจริงๆ ด้วย..."
1009802-167 = "แต่ถ้าครูพอใจก็ช่างมันแล้วกัน"
1009802-168 = "[s] \"แล้วก็ใส่ชุดนี้ไปอีกหนึ่งอาทิตย์เลยนะ!\""
1009802-172 = "หนึ่งอาทิตย์?"
1009802-173 = "หนึ่งอาทิตย์มันนานเกินไปรึเปล่า? วันนี้จะรอดรึเปล่ายังไม่รู้เลย~"
1009802-174 = "[s] \"ครูอยากเห็นโฮชิโนะเท่ๆ แบบนี้ต่อน่ะ!\""
1009802-175 = "ทะ...เท่งั้นเหรอ ลุงเป็นแบบนั้นเหรอ..."
1009802-176 = "[s] \"โฮชิโนะยอดเยี่ยมที่สุด!\""
1009802-177 = "ถึงจะอวยกันขนาดนั้น ลุงก็ไม่มีอะไรจะให้หรอกนะ~"
1009802-178 = "[s] \"ถ้าได้เห็นโฮชิโนะเท่ๆ แบบนี้ทุกวันคงมีความสุขมากแน่ๆ!\""
1009802-179 = "อืม..."
1009802-184 = "รู้แล้ว รู้แล้วละน่า"
1009802-185 = "แค่หนึ่งอาทิตย์เท่านั้นนะ เข้าใจมั้ย?"
1009802-186 = "ทำหน้าดีใจอะไรขนาดนั้น... เฮ้อ... แบบนี้ครูยิ่งทำให้ลุงคนนี้อายเข้าไปใหญ่เลยนะ"
1009802-187 = "จริงๆ เลย... เหมือนลุงไม่รู้จักครูเลยนะเนี่ย..."
1009802-194 = "[ns] \"เสียงอะไรน่ะ?\""
1009802-195 = "เสียงสัญญาณแจ้งเตือนจากกล้องวงจรปิดที่ติดตั้งไว้รอบๆ โรงเรียนน่ะ..."
1009802-196 = "ถ้ามีคนที่ไม่ได้รับอนุญาตเข้ามาใกล้ หรือเกิดเหตุฉุกเฉินอะไร สัญญาณก็จะดังขึ้น"
1009802-201 = "แก๊งหมวกกันน็อก...?"
1009802-202 = "ป้ายประกาศที่อยู่ตรงมุมของสนามกีฬา... เจ้าพวกนั้นคิดจะทำอะไรกันน่ะ?"
1009802-203 = "ยังไงก็เถอะ คงปล่อยไว้แบบนี้ไม่ได้"
1009802-207 = "ไปกันเถอะ ครู"
1009802-216 = "จะไม่เป็นไรจริงๆ ใช่มั้ย?"
1009802-217 = "ก็บอกว่าไม่เป็นไรไงล่ะ? โรงเรียนที่ใกล้จะล้มละลายแบบนี้ จะมีป้ายประกาศไปทำไมกัน?"
1009802-218 = "พวกเราแค่เอาของที่ไม่มีใครใช้ไปขายมาเป็นค่าขนมก็แค่นั้นเอง"
1009802-219 = "นั่นสินะ ไม่เคยเห็นใครใช้ป้ายประกาศนี่เลย..."
1009802-220 = "ทุกคน... ออกแรงขุดกันหน่อย! มันไม่ขยับเลย!"
1009802-223 = "ค่าาา!"
1009802-234 = "ตรงนั้นน่ะ ทำอะไรกันอยู่เหรอ?"
1009802-238 = "ไม่มีตามองรึไง? ก็กำลังขุดป้ายกระดานไปขายเป็นเศษเหล็ก..."
1009802-246 = "เอ๋?!"
1009802-252 = "เอาละๆ ช่วยวางพลั่วลงให้หมดก่อนจะได้มั้ย?"
1009802-254 = "อะไรกัน นักเรียนของที่นี่เหรอ?"
1009802-255 = "พกอาวุธหนักมาเต็มพิกัดเลยแฮะ จะก่อสงครามรึไง?"
1009802-257 = "เรื่องชุดนี้มันมีเหตุผลอยู่น่ะ..."
1009802-258 = "เอาเป็นว่าป้ายประกาศอันนั้นเป็นอุปกรณ์ของทางโรงเรียนเรา เลยอยากให้เก็บมันไว้ที่เดิม แล้วแยกย้ายกันกลับไปน่ะ~"
1009802-259 = "เฮอะ ถึงยังไงของที่ไม่ได้ใช้ ก็เหมือนของที่ถูกทิ้งอยู่แล้วไม่ใช่รึไง?"
1009802-260 = "ยกให้พวกเราเลยเป็นไง?"
1009802-264 = "......"
1009802-265 = "แฮร่~"
1009802-266 = "นี่ลุงกลายเป็นนางฟ้าใจดีที่บริจาคของให้คนที่ไม่รู้จักไปแล้วรึไงนะ..."
1009802-267 = "ถึงจะเป็นของที่ไม่ได้ใช้ แต่มันก็เป็นทรัพย์สินของทางโรงเรียนน่ะ"
1009802-268 = "ถ้ายังไม่เลิกดื้อ ลุงก็คงต้องบังคับให้ออกไปซะแล้วละนะ"
1009802-272 = "ถ้าพวกเราไม่ออกไป จะทำยังไง?"
1009802-273 = "ถึงจะพกอาวุธหนักมาพร้อมสรรพแค่ไหน แต่พวกเราก็ได้เปรียบเรื่องจำนวนมากกว่า"
1009802-275 = "ทุกคน!"
1009802-283 = "เห็นรึเปล่า? เพราะงั้นอย่ามาขัดขวางแล้วกลับไปเงียบๆ..."
1009802-296 = "ยะ... ยิงก่อนเลยเรอะ?!"
1009802-297 = "ทุกคน! จัดการคนที่มาขวางซะ!"
1009802-303 = "เฮ้อ~"
1009802-308 = "ใจกล้ากันจริงๆ นะ"
1009802-320 = "แฮร่~"
1009802-321 = "อึก..."
1009802-329 = "คะ...แค่คนเดียวกลับจัดการพวกเราทุกคนได้หมด...!"
1009802-330 = "ชิ! ฝะ... ฝากไว้ก่อนเถอะ!"
1009802-336 = "อ่า... นั่นมันบทพูดสุดคลาสสิกของพวกตัวร้ายเวลาจะหนีเลยนะ"
1009802-337 = "เป็นอะไรรึเปล่า ครู? ไม่ได้โดนลูกหลงใช่มั้ย?"
1009802-338 = "[s] \"โฮชิโนะ...\""
1009802-339 = "หืม? ทำไมมองฉันแบบนั้นล่ะ?"
1009802-340 = "ลุงทำอะไรผิดรึเปล่า..."
1009802-345 = "[ns] \"เท่ระเบิดเลย!\""
1009802-349 = "คะ... ครู? ตาเป็นประกายอะไรขนาดนั้น..."
1009802-350 = "ฉันก็แบบนี้มาตลอด มันไม่ได้มีอะไรพิเศษเลย"
1009802-351 = "หืม? คิดว่าสุดยอดมากๆ ที่ใส่ชุดนี้แล้วขับไล่ผู้บุกรุกออกไปงั้นเหรอ?"
1009802-352 = "[s] \"อื้อ! มัน...\""
1009802-354 = "[ns] \"เหมือนกับฮีโร่เลย!\""
1009802-355 = "......"
1009802-356 = "แหะๆ~ ฮีโร่งั้นเหรอ หลุดออกมาจากหนังน่ะเหรอ?"
1009802-357 = "เรื่องแบบนั้นห่างไกลกับลุงคนนี้เยอะเลย~"
1009802-358 = "[s] \"ปกป้องโรงเรียนแสนสำคัญจากผู้บุกรุก นั่นแหละฮีโร่!\""
1009802-359 = "พะ...พอได้แล้ว~ มันน่าอายนะ"
1009802-360 = "หืม? ชื่อของฮีโร่เหรอ?"
1009802-361 = "ลิตเติล แท็กติเคิล? ทาคานาชิไนต์?"
1009802-366 = "อะไรเนี่ย~!"
1009802-367 = "[ns] \"หนึ่งอาทิตย์ต่อจากนี้ก็ฝากด้วยนะ คุณฮีโร่แห่งอะบิดอส!\""
1009802-368 = "สนุกใหญ่เลยนะ ครู... อืม..."
1009802-369 = "แต่มันก็อาจจะดีกว่าใส่ชุดว่ายน้ำของโรงเรียนก็ได้...!"

[translation]
1006303-1 = "กล่องแพนโดร่า 1"
1006303-6 = "(โคยูกิมาเข้าเวรที่ชาเล่ต์)"
1006303-7 = "โอ้โห!!! นี่สินะสำนักงานชาเล่ต์ที่เขาลือกันน่ะ!!"
1006303-8 = "ดูธรรมดาๆ มากกว่าที่คิดไว้ซะอีกนะคะ? อืม...?"
1006303-9 = "[s1] \"เพราะเป็นสำนักงานธรรมดาๆ ไงล่ะ...\"\n[s2] \"คิดว่าจะมีอะไรงั้นเหรอ?\""
1006303-12 = "โธ่~ ล้อเล่นค่ะคุณครู ล้อเล่น~ ที่นี่เป็นที่ทำงานของคุณครู บรรยากาศก็คงเป็นแบบนี้อยู่แล้วละค่ะ"
1006303-13 = "ว่าแต่ว่าจะให้ฉันทำอะไรดีคะ? ถึงจะบอกว่าให้มาเข้าเวรตัวแทน แต่ฉันก็ไม่รู้เลยว่าจะต้องมาทำอะไร..."
1006303-14 = "ถ้าเป็นเรื่องคำนวณ ฉันคิดได้เฉพาะสิ่งที่ง่ายๆ ค่ะ เพราะฉันไม่ได้เก่งกาจเหมือนนักบัญชีผู้เยือกเย็น#nบางคนหรอกค่ะ"
1006303-15 = "แต่ถ้าให้ออกไปทำธุระหรืออะไรอย่างอื่นแทน ฉันจะตั้งใจทำตามที่สั่งเลยค่ะ!! ก็มันเป็นคำสั่งของ#nคุณครูนี่นา!!"
1006303-16 = "[s3] \"มีความตั้งใจเกินคาดนะเนี่ย\"\n[s4] \"ขยันน่าดูเลยนะ คิดว่าอยากมาเล่นสนุกซะอีก\""
1006303-19 = "ฮ่ะฮ่า... ก็นะ... ก็แน่นอนสิคะ..."
1006303-20 = "ฉันเต็มใจทำมากกว่างานที่รุ่นพี่มิลเลเนียมสั่งอีกค่ะ... เพราะไม่ว่างานอะไรจากคุณครูก็ดูน่าสนุก#nไปซะทุกอย่างเลยนี่คะ!!"
1006303-21 = "คะ...?"
1006303-22 = "งานที่นี่ก็น่าเบื่อเหมือนงานของเซมิน่างั้นเหรอคะ?"
1006303-23 = "ฮ่ะฮ่า... คุณครูเนี่ยไม่รู้อะไรซะแล้ว งานที่นั่นไม่ใช่แค่น่าเบื่อธรรมดานะคะ!!!"
1006303-24 = "เพราะงานที่ฉันทำน่ะ... ถ้าจะพูดเปรียบเทียบคือ มันไม่ต่างจากงานประทับตราบนเอกสารที่ฉันไม่รู้#nเนื้อหาเลยแม้สักนิดเดียวค่ะ!"
1006303-25 = "ถ้าต้องทำแต่เรื่องแบบนั้นเรื่อยๆ ซ้ำไปซ้ำมา สักวันต้องสติหลุดแน่ๆ เลยค่ะ!"
1006303-26 = "อยากรู้ขอบเขตของงานพวกนั้นเหรอคะ...?"
1006303-27 = "งานเล็กๆ น้อยๆ ไม่สำคัญอะไรหรอกค่ะ อย่างเช่น ช่วยกู้รหัสผ่านที่นักเรียนจำไม่ได้ ปลดระบบ#nรักษาความปลอดภัยที่ล็อกโดยบังเอิญ..."
1006303-28 = "หรือไม่ก็ช่วยไขโค้ดระบบที่เขียนไว้นานจนลืมไปแล้วว่าใครเป็นคนเขียน... เรื่องจุกจิกไร้สาระ#nอะไรทำนองนี้น่ะค่ะ"
1006303-29 = "[s5] \"งานแบบนั้นก็มีความหมายเหมือนกันนะ\"\n[s6] \"งานที่โคยูกิทำนี่สุดยอดเลยนะ\""
1006303-32 = "เดี๋ยวสิ...! หยุดเลย! คุณครูไม่ควรตอบแบบนี้สิคะ!"
1006303-33 = "สำหรับฉันแล้ว งานพวกนั้นมันไม่สนุกและไม่น่าประทับใจเลยค่ะ!"
1006303-34 = "ถ้านั่งอยู่เฉยๆ เดี๋ยวก็มีคนเอาอะไรมาให้แก้ แล้วพอทำเสร็จ ก็มีงานใหม่เข้ามาให้อีก จะเอาอย่างโน้น จะเอาอย่างนี้ วนลูปแบบนี้ทั้งวันเลยค่ะ...!"
1006303-35 = "ฉันเป็นคนนะ ไม่ใช่หุ่นยนต์สักหน่อย!! ต่อไปฉันขอปฏิเสธงานแบบนั้นค่ะ!"
1006303-36 = "ถ้าจะสั่งงานแบบนั้นละก็ ฉันจะหนีออกไปตามหาอิสระอีกค่ะ! ถึงฉันอาจจะล้มเหลวทุกครั้งก็เถอะค่ะ!!"
1006303-37 = "แถมยังชอบจับฉันไปขังอีก!! ให้อยู่ห้องเดี่ยวบ้าง ห้องสำนึกผิดบ้าง...! เซมิน่าแห่งมิลเลเนียมเนี่ย#nไม่ไหวเลย!!"
1006303-38 = "[s7] \"เอ่อ... แต่มันก็สมควรแล้วไม่ใช่เหรอ...\"\n[s8] \"ถ้าไม่ก่อเรื่องก็ไม่โดนจับไปขังหรอก...\""
1006303-41 = "คุณ~ ครู~!! คุณครูต้องเข้าข้างฉันสิคะ!! เด็กน้อยที่น่าสงสารกำลังเล่าเรื่องเศร้าให้ฟังอยู่นะคะ#nทำไมพูดแบบนี้ล่ะคะ?!"
1006303-42 = "เอาเถอะค่ะ..."
1006303-43 = "สรุปได้ว่า ไม่ว่าคุณครูจะสั่งให้ฉันทำอะไรที่นี่ อย่างน้อยมันก็น่าสนุกกว่างานที่เซมิน่าสั่งน่ะค่ะ"
1006303-44 = "ว่ายังไงล่ะคะ...? มีงานอะไรจะสั่งรึเปล่าคะ? หรือว่าฉันต้องมาแก้รหัสผ่านอะไรที่นี่ด้วย..."
1006303-45 = "คะ...?"
1006303-46 = "จะไม่สั่งงานแบบนั้นเหรอคะ? ไม่ควรมาแก้รหัสผ่านที่นี่งั้นเหรอคะ?"
1006303-51 = "ทำไมเหรอคะ...?"
1006303-52 = "[s9] \"ไม่เห็นต้องถามเลยนี่?!!\"\n[s10] \"ก็ที่นี่คือชาเล่ต์ไง... ไม่ใช่มิลเลเนียมสักหน่อย?\""
1006303-55 = "ฮึ่ม..."
1006303-56 = "งั้นเหรอคะ...? ไม่เห็นเข้าใจเลย...?"
1006303-57 = "เหมือนไม่ได้คำตอบที่ชัดเจนเลยนะคะ หรือมีอะไรที่ฉันไม่ควรรู้หรือเปล่าคะ?"
1006303-58 = "มีเรื่องที่ฉันไม่ควรรู้เยอะเลยเหรอคะ...? มันคืออะไรเหรอคะ??"
1006303-59 = "[s11] \"คืออะไรงั้นเหรอ...\"\n[s12] \"ถ้าบอกก็ไม่ใช่ความลับสิ\""
1006303-65 = "ฮึ่ม... อย่างนั้นเองเหรอคะ"
1006303-66 = "...ฮี่ๆๆๆ"
1006303-67 = "[ns13] \"เอ่อ... คุณโคยูกิ?\"\n[ns14] \"คิดอะไรแปลกๆ อีกแล้วใช่มั้ย?\""
1006303-70 = "ไม่นะคะ ไม่เลย ไม่ได้คิดอะไรเป็นพิเศษเลยค่ะ ไม่แม้แต่นิดเดียวเลย~"
1006303-71 = "ไม่ได้คิดว่าจะแอบดูด้วยค่ะ~"
1006303-72 = "ฉันไม่ได้คิดอะไรไม่ดีเลยค่ะ จริงๆ น้า~"
1006303-73 = "คิดว่างั้นนะ?"
1006303-74 = "เอาเถอะค่ะ...! ดูเหมือนว่าวันนี้ฉันคงไม่มีงานอะไรเป็นพิเศษสินะคะ... "
1006303-75 = "เพราะงั้นฉัน..."
1006303-76 = "ก็..."
1006303-77 = "ขอ..."
1006303-78 = "ขอตัวก่อนนะคะ... คุณครู... ไว้ฉันจะแวะมาใหม่นะคะ..."
1006303-79 = "[s15] \"โคยูกิ เดี๋ยวสิ...\"\n[s16] \"ทำแบบนี้ยิ่งน่าสงสัยกว่าเดิมอีก...!\""
1006303-83 = "ขอให้วันนี้เป็นวันที่ดีนะคะ!!!!!"
1006303-88 = "[ns] \"......\""
1006303-98 = "(หลังจากนั้นคุณครูก็อัปเกรดระบบรักษาความปลอดภัยของสำนักงานเป็นระดับสูงสุดทันที)"

[translation]
1006303-1 = "Pandora's Box 1"
1006303-6 = "Koyuki showed up at Schale to work."
1006303-7 = "So this is Schale! Ooooh... I've never seen it before!"
1006303-8 = "Hm, but it's actually just a normal office...?"
1006303-9 = "[s1] \"That's because it is an office.\"\n[s2] \"What did you expect?\""
1006303-12 = "Haha! Just messing with you. Of course the place where you work would be like this, Sensei."
1006303-13 = "So, what should I do? I heard it was my turn on the roster, so I showed up, but..."
1006303-14 = "I don't have any bizarre computational abilities like some cold-hearted accountant I won't name."
1006303-15 = "Oh, I can run errands, though! Since it's for you, Sensei, I'll work super hard!"
1006303-16 = "[s3] \"You're more motivated than I expected.\"\n[s4] \"I thought you'd want to goof off, but you're volunteering to work!\""
1006303-19 = "Haha... Well, uh...of course!"
1006303-20 = "The truth is...no matter what it is... It's gonna be way, way, WAY better than doing whatever stuff the upperclassmen at Millennium make me do!"
1006303-21 = "...Huh?"
1006303-22 = "You think work will be equally boring for Schale or for Seminar?"
1006303-23 = "Haha... Sensei. You don't know what you're talking about, do you? This isn't just about being bored! Not at all!"
1006303-24 = "What I do there... It's basically just like stamping documents... Document after document, with no end in sight, and I don't know anything about what's in them..."
1006303-25 = "Sitting in one spot, doing the same thing over and over and over... My brain can't take it!"
1006303-26 = "You want to know what I do, specifically? Why?"
1006303-27 = "I mean...it's nothing important, really. Just, like, recovering lost passwords for other students, or unlocking security systems that have been locked accidentally..."
1006303-28 = "Or, figuring out how to fix code that's so old that we don't even know who made it... A bunch of useless stuff like that, I guess."
1006303-29 = "[s5] \"Aren't those all very meaningful?\"\n[s6] \"You do amazing work, Koyuki.\""
1006303-32 = "...No! Dang it! Stop! That's not what you're supposed to say!"
1006303-33 = "It's totally boring! Not even a bit meaningful! Not fulfilling at all!"
1006303-34 = "I sit there, someone puts a problem in front of me, I write the first thing that pops into my head, then it just solves itself! I don't even know what the problem's about before they bring the next one, and the next one, and on, and on..."
1006303-35 = "They treat me like a vending machine, but I'm a person! A whole person! I don't wanna do it anymore!"
1006303-36 = "If that's what life is like, how could I not search for freedom? Even if I'm caught every time!"
1006303-37 = "And then, on top of everything, they even throw me in solitary confinement, whether it's an empty workroom or the Self-Reflection Room... Are there no depths the Millennium Seminar won't sink to? No torments they won't inflict?"
1006303-38 = "[s7] \"I think some of that might actually be self-inflicted...\"\n[s8] \"I don't think they'd do that if you didn't cause trouble...\""
1006303-41 = "Sensei, that's so mean! You're supposed to be on my side! A poor, downtrodden soul is telling you her tragic tale and this is how you respond?"
1006303-42 = "Ugh, anyway..."
1006303-43 = "The point is, whatever you have me do, it's at least gonna be more interesting than the Seminar stuff."
1006303-44 = "So, what is it? What's my assignment? Or, oh no... Do I have to work with passwords here too?"
1006303-45 = "...Huh?"
1006303-46 = "You don't have any work like that? Oh, you definitely don't want me cracking passwords here?"
1006303-51 = "Haha, why?"
1006303-52 = "[s9] \"What do you mean, why?\"\n[s10] \"Because this is Schale... and not Millennium?\""
1006303-55 = "Hmm."
1006303-56 = "...So? I...don't get it. Or..."
1006303-57 = "No, I'm missing something. Huh? Is there something I'm not supposed to know?"
1006303-58 = "What do you mean, there's a whole lot I'm not supposed to know?"
1006303-59 = "[s11] \"What don't you get about that?\"\n[s12] \"It wouldn't be a secret if I could tell you.\""
1006303-65 = "Hmph... Fine. I guess."
1006303-66 = "...Hmmmm..."
1006303-67 = "[ns13] \"...Um, Koyuki?\"\n[ns14] \"What are you thinking right now?\""
1006303-70 = "No! I mean, um, uh, nothing! I'm not thinking anything at all!"
1006303-71 = "I definitely wouldn't think oh, I should look at it!"
1006303-72 = "I wouldn't think anything like that at all. I wouldn't, and I didn't!"
1006303-73 = "Definitely!"
1006303-74 = "Anyway! It seems like there's nothing for me to do here today, so..."
1006303-75 = "Um..."
1006303-76 = "I'll just..."
1006303-77 = "I'll be..."
1006303-78 = "Going for today... Sensei... I'll see you later..."
1006303-79 = "[s15] \"Koyuki, wait...\"\n[s16] \"You're so obviously acting suspicious right now...\""
1006303-83 = "Okay! Have a good day!"
1006303-88 = "[ns] \"...\""
1006303-98 = "I spent the rest of the day switching all the security systems in the office to their strictest settings."

1006303-5 = "#all;hide"
1006303-6 = "#na;(샬레 당번으로 코유키가 찾아왔다.)"
1006303-7 = "3;코유키;00;오오오-!! 여기가 말로만 듣던 샬레 사무실!!\n#3;closeup\n#3;hophop\n#3;a"
1006303-8 = "3;코유키;10;……생각보다는 평범한 사무실이네요? 흐음~.\n#3;em;[한숨]\n#3;greeting\n#3;a"
1006303-9 = "[s1] \"그야 평범한 사무실이니까…….\"\n[s2] \"뭘 기대한 거야.\""
1006303-10 = "#wait;10"
1006303-11 = "#wait;10"
1006303-12 = "3;코유키;03;에이~. 장난이에요, 장난. 선생님께서 일하시는 곳이니까 당연히 이런 분위기겠죠.\n#3;em;[재잘]"
1006303-13 = "3;코유키;02;자, 근데 그럼 저는 뭘 하면 될까요? 당번 학생이라고 해서 오긴 했는데……."
1006303-14 = "3;코유키;99;간단한 계산은 할 수 있지만, 어딘가의 냉혹한 회계처럼 기괴한 계산 능력을 가진 건 아니니까요."
1006303-15 = "3;코유키;01;대신 심부름이든 뭐든 시키시는 대로 열심히 해보겠습니다!! 선생님의 지시니까!!\n#3;em;[!]\n#3;jump"
1006303-16 = "[s3] \"의외로 의욕이 넘치네.\"\n[s4] \"놀고 싶어 할 줄 알았는데, 적극적이네.\""
1006303-17 = "#wait;10"
1006303-18 = "#wait;10"
1006303-19 = "3;코유키;99;하하……. 그야……. 당연하죠……."
1006303-20 = "3;코유키;03;밀레니엄에서 선배들이 시키는 것을 하는 것보다야……. 뭘 하든 재밌을 테니까요!!\n#3;em;[음표]\n#3;greeting"
1006303-21 = "3;코유키;02;……네?"
1006303-22 = "3;코유키;02;여기 일도 지루한 건 세미나와 마찬가지일 거라고요?"
1006303-23 = "3;코유키;13;하하……. 선생님. 모르시는군요. 단순히 지루한 것의 문제가 아니라고요!! 이건!!\n#3;em;[재잘]"
1006303-24 = "3;코유키;06;거기서 제가 하는 일들은……. 말하자면 내용도 모르는 서류에 그저 도장만 찍어 넘기는 것과도 같은 일!"
1006303-25 = "3;코유키;06;같은 자리에서 계속 그런 일만 하고 있으면, 진짜 정신이 어떻게 돼 버릴 것 같단 말이에요!\n#3;hophop"
1006303-26 = "3;코유키;02;……구체적으로 어떤 일이냐고요?\n#3;em;[?]"
1006303-27 = "3;코유키;00;뭐, 잡다하고 별거 아닌 일들이죠? 학생이 잃어버린 비밀번호를 뚫어 주거나, 실수로 잠긴 보안 장치를 풀거나…….\n#3;m2"
1006303-28 = "3;코유키;99;오래돼서 누가 만든 건지도 잊어버린 코드의 접근방식을 찍어내거나……. 그런 쓸데없는 것들?\n#3;m3"
1006303-29 = "[s5] \"하나같이 의미 있는 일들 아냐?\"\n[s6] \"굉장한 일을 하고 있었구나, 코유키.\""
1006303-30 = "#wait;10"
1006303-31 = "#wait;10"
1006303-32 = "3;코유키;07;……아닛! 정말!! 그런 반응을 원한 게 아니라고요!!\n#3;em;[!]\n#3;shake"
1006303-33 = "3;코유키;04;제 입장에서는 정말 재미도 없고 감동도 없는 일이란 말이에요!\n#3;hophop\n#3;em;[스팀]"
1006303-34 = "3;코유키;06;그냥 앉아 있으면 뭔가 가져다주고, 이유도 모른 채 생각난 걸 쓰면 알아서 풀리고, 또 다음 걸 가져다주고, 또 풀고 또 가져오고……!"
1006303-35 = "3;코유키;06;저는 사람이지 자판기가 아니란 말이에요!! 이제 더는 그런 일들은 사양이에요!\n#3;em;[훌쩍]\n#3;stiff"
1006303-36 = "3;코유키;11;그럴 거면 저는 자유를 찾아 떠날 거라고요! 매번 실패하긴 하지만 말이죠!!\n#3;hophop"
1006303-37 = "3;코유키;04;……게다가 사람을 감금까지 하고!! 독방이니 반성실이니……! 무시무시한 밀레니엄 세미나!!\n#3;em;[속상함]\n#3;stiff"
1006303-38 = "[s7] \"뭐……. 사실 그 부분은 자업자득도 있지만…….\"\n[s8] \"사고만 안 치면 그렇게까진 안 할 거 같지만…….\""

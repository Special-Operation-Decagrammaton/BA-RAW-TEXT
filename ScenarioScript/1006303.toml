[translation]
1006303-1 = "潘朵拉的盒子（１）"
1006303-6 = "（小雪因為是值日生而來到了夏萊）"
1006303-7 = "喔喔喔──！！這裡就是傳說中的夏萊辦公室啊！！"
1006303-8 = "……嗯～好像比想像中還普通……？"
1006303-9 = "[s1]「畢竟只是平常辦公的地方。」\n[s2]「你期待的是什麼……」"
1006303-12 = "哎呀～開玩笑的啦，開玩笑的。#n跟想像中差不多！"
1006303-13 = "話說我該做什麼呢？#n我只知道要來當值日生而已。"
1006303-14 = "雖然我會一些簡單的計算，#n不過我可不像某個冷酷計算機一樣有超乎常人的計算能力哦！"
1006303-15 = "但是雜事或其他事情我都會努力的！#n只要老師希望，儘管吩咐！！"
1006303-16 = "[s3]「你那麼幹勁十足真是讓我有點意外。」\n[s4]「還以為你會想要玩樂……」"
1006303-19 = "哈哈……#n那是當然的……"
1006303-20 = "畢竟跟在千年時被前輩們委託的工作比起來，#n這裡不管是什麼事情一定都有趣多了！"
1006303-21 = "……什麼？"
1006303-22 = "你覺得這裡的工作也很無趣？"
1006303-23 = "尼哈哈，這你就有所不知了！#n光是這裡是夏萊就很有趣了！"
1006303-24 = "我在研討會做的，就只是處理那些看不太懂又莫名其妙的投書而已！"
1006303-25 = "待在同個地方一直做著類似的工作……#n我真～的覺得自己快瘋掉了！"
1006303-26 = "……具體來說是什麼樣的工作？"
1006303-27 = "真的只是一些雞毛蒜皮的雜事而已。#n像是復原忘記密碼的帳號，或是解開不小心上鎖的安全裝置……"
1006303-28 = "還有破解連是誰寫的都不知道的古老暗號之類的……#n真是超級無聊……"
1006303-29 = "[s5]「那些都是很能幫助大家的事不是嗎？」\n[s6]「你很努力呢，小雪。」"
1006303-32 = "我希望得到的反應才不是這樣！"
1006303-33 = "那些事情一～點也不有趣，我只覺得討厭而已！"
1006303-34 = "才覺得「啊～終於告一段落了」，馬上又有下一份工作……#n「這次是這個～」、「來，這個也拜託你囉～」這樣！！"
1006303-35 = "我又不是工作機器人！！！#n不想再做那種事了！"
1006303-36 = "與其這樣還不如去追尋自由咧！#n反正每次都會被抓回來！"
1006303-37 = "……也不只是被罵一下就算了，還得被關在反省室！#n不覺得很過分嗎！？"
1006303-38 = "[s7]「那個部分好像是你自作自受……」\n[s8]「不要闖禍不就好了嗎……」"
1006303-41 = "老～師～！這種時候你應該站在我這邊吧！！#n你不覺得我很可憐嗎！？"
1006303-42 = "總之……"
1006303-43 = "事情就是這樣，不管老師叫我做什麼事，至少也會比研討會的工作有趣。"
1006303-44 = "所以，我該做些什麼呢？#n哈，難道又是要把密碼……！？"
1006303-45 = "……咦？"
1006303-46 = "要做的工作不是那種事？#n反而是不能解除這裡的密碼？"
1006303-51 = "……為什麼？"
1006303-52 = "[s9]「這個嘛……」\n[s10]「因為這裡是夏萊……嗎？」"
1006303-55 = "哼嗯……"
1006303-56 = "總～覺得不太能接受呢。"
1006303-57 = "莫非，這裡有什麼被我知道會很頭痛的事嗎？"
1006303-58 = "告訴我也沒關係吧！或者至少給點提示！"
1006303-59 = "[s11]「你在說什麼……」\n[s12]「告訴你的話密碼不就沒有意義了嗎。」"
1006303-65 = "嘿～……"
1006303-66 = "哼……"
1006303-67 = "[ns13]「……那個，小雪同學？」\n[ns14]「不能那麼做哦！？」"
1006303-70 = "……咦～？沒什麼啊？什麼也沒有哦？完全沒有哦？"
1006303-71 = "絕對沒有什麼稍微偷看一下吧～"
1006303-72 = "之類的想法唷？"
1006303-73 = "老師覺得我是個會說謊的人嗎！？"
1006303-74 = "尼哈哈～……看來今天好像沒什麼事……"
1006303-75 = "我……"
1006303-76 = "就先……"
1006303-77 = "告辭了……哦。"
1006303-78 = "我還會再來的～！"
1006303-79 = "[s15]「啊，小雪！」\n[s16]「太，太可疑了……」"
1006303-83 = "祝你有美好的一天！！！！！"
1006303-88 = "[ns] 「…………」"
1006303-98 = "（急忙把保全等級提升到最高）"

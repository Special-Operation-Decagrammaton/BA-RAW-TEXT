[translation]
2601505-1 = "Deep & Deep Fake"
2601505-5 = "啊，老師。"
2601505-8 = "抱歉這麼晚還把你叫出來。"
2601505-9 = "上次的散步……或者說諮詢，老師還記得嗎？"
2601505-10 = "我果然還是有點在意～"
2601505-11 = "[s1]「啊，別擔心！我明白你的意思！」\n[s2]「如果是那件事的話，我完全可以理解！」"
2601505-14 = "啊，老師果然很好溝通～"
2601505-15 = "看來……好像真的有所謂「夜晚海邊的魔力」呢。"
2601505-16 = "我居然會變得這麼大嘴巴……"
2601505-17 = "總之，那天的事就當沒發生過吧……"
2601505-18 = "[s3]「無論真正的一花是什麼樣子！」\n[s4]「我都會接受的！」"
2601505-24 = "咦？"
2601505-25 = "不是，我想表達的不是那個意思……"
2601505-26 = "……"
2601505-27 = "唔嗯……"
2601505-28 = "果然普通的說法對老師不管用呢。"
2601505-29 = "……既然如此。"
2601505-30 = "老師剛才說過，無論我的真面目是什麼樣子……"
2601505-35 = "……都會接受對吧？"
2601505-36 = "[s]「一，一花同學……？」"
2601505-39 = "― [log=이치카 수영복]你是不是對我有所誤會？[/log][wa:3390] "
2601505-42 = "― [log=이치카 수영복]因為是三一的學生，就認定為我是溫室裡長大、心地善良的[/log][wa:1270] "
2601505-44 = "― [log=이치카 수영복]大小姐了。[/log][wa:1930] "
2601505-47 = "― [log=이치카 수영복]實現正義部，可是將三一的戰鬥事務[/log][wa:4010] "
2601505-49 = "― [log=이치카 수영복]一手包辦的集團哦？[/log][wa:1150] "
2601505-52 = "― [log=이치카 수영복]我從不離身的頸鍊……[/log][wa:1450] "
2601505-54 = "― [log=이치카 수영복]如果我說那其實是「項圈」的話……[/log][wa:3090] "
2601505-57 = "― [log=이치카 수영복]你會怎麼想呢？[/log]"
2601505-60 = "― [log=이치카 수영복]為某樣東西戴上「項圈」的理由只有一個。[/log][wa:1290] "
2601505-63 = "― [log=이치카 수영복]我想敏銳的老師，[/log][wa:1180] "
2601505-65 = "― [log=이치카 수영복]應該明白吧。[/log]"
2601505-68 = "― [log=이치카 수영복]而當那個「項圈」被解開的時候，[/log]"
2601505-70 = "― [log=이치카 수영복]會發生什麼事情──[/log]"
2601505-73 = "― [log=이치카 수영복]你應該，能想像出來吧？[/log][wa:1960] "
2601505-76 = "― [log=이치카 수영복]……啊，抱歉。[/log][wa:1580] "
2601505-78 = "― [log=이치카 수영복]有點過頭了對吧。[/log]"
2601505-81 = "― [log=이치카 수영복]有學到教訓的話，[/log]"
2601505-83 = "― [log=이치카 수영복]就別再亂說話了唷？[/log]"
2601505-86 = "― [log=이치카 수영복]要是我真的是個危險的傢伙， [/log][wa:620] "
2601505-88 = "― [log=이치카 수영복]你打算怎麼辦呢？[/log][wa:990] "
2601505-91 = "[ns5]「嚇我一跳……」\n[ns6]「原來一花也會開這種玩笑啊。」"
2601505-94 = "― [log=이치카 수영복]哈哈，嗯……[/log][wa:3160] "
2601505-96 = "― [log=이치카 수영복]這種事情只會在老師面前做啦。還有……[/log][wa:3180] "
2601505-99 = "― [log=이치카 수영복]今天的事，要帶到墳墓裡去哦。[/log][wa:1560] "
2601505-101 = "― [log=이치카 수영복]我們兩個人一起。[/log]"
2601505-107 = "……"
2601505-108 = "[s7]「……」\n[s8]（空氣尷尬得令人窒息）"
2601505-111 = "總覺得事情的發展，跟我想像的不太一樣……"
2601505-112 = "好像搞砸了……"
2601505-113 = "唔嗯……"
2601505-114 = "總之今天就先各自休息，下次再聊吧？"
2601505-116 = "（就這樣被一花半推半送地趕回了房間……）"

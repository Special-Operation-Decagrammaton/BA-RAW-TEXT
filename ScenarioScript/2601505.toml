[translation]
2601505-1 = "Deep and Deep Fake"
2601505-5 = "Hi, Sensei."
2601505-8 = "Sorry to call you out here this late."
2601505-9 = "So, um, remember that little walk we took before? I guess \"counseling session\" is more apt."
2601505-10 = "It's just been on my mind since then..."
2601505-11 = "[s1] \"Ah, no worries! I know what you're talking about!\"\n[s2] \"I completely understand!\""
2601505-14 = "We really are on the same wavelength, then."
2601505-15 = "I guess I should give some credit to the \"magic of the night sea,\" as people say."
2601505-16 = "I ended up saying more than I should have because of it."
2601505-17 = "Anyway, I'd really appreciate it if you could forget that ever happened."
2601505-18 = "[s3] \"Ichika, I'll always accept you!\"\n[s4] \"No matter who you are!\""
2601505-24 = "Huh?"
2601505-25 = "No, that's not what I..."
2601505-26 = "..."
2601505-27 = "Hm..."
2601505-28 = "I guess it'll take more than that to get through to you."
2601505-29 = "...In that case."
2601505-30 = "Sensei, you said you'll accept me..."
2601505-35 = "...no matter what, right?"
2601505-36 = "[s] \"Uh, Ichika...?\""
2601505-39 = "― [log=이치카 수영복]Do you perhaps have the wrong idea about us?[/log][wa:2070] "
2601505-42 = "― [log=이치카 수영복]Do you know how dangerous this cute, delicate[/log][wa:510] "
2601505-44 = "― [log=이치카 수영복]Trinity lady can be? [/log][wa:1290] "
2601505-47 = "― [log=이치카 수영복]The Justice Task Force [/log][wa:3730] "
2601505-49 = "― [log=이치카 수영복]takes care of Trinity's toughest jobs.[/log][wa:10] "
2601505-52 = "― [log=이치카 수영복]You've seen how we all wear chokers.[/log][wa:410] "
2601505-54 = "― [log=이치카 수영복]What if I told you that it's actually...[/log][wa:2130] "
2601505-57 = "― [log=이치카 수영복]a collar?[/log]"
2601505-60 = "― [log=이치카 수영복]There's only one reason you'd put a collar on someone.[/log][wa:10] "
2601505-63 = "― [log=이치카 수영복]Since you're smart, Sensei,[/log][wa:420] "
2601505-65 = "― [log=이치카 수영복]I'm sure I don't have to spell it out for you.[/log]"
2601505-68 = "― [log=이치카 수영복]And I also shouldn't have to explain[/log]"
2601505-70 = "― [log=이치카 수영복]what happens when that collar[/log]"
2601505-73 = "― [log=이치카 수영복]comes off, right? [/log][wa:1680] "
2601505-76 = "― [log=이치카 수영복]...Sorry.[/log][wa:1500] "
2601505-78 = "― [log=이치카 수영복]My little joke went too far.[/log]"
2601505-81 = "― [log=이치카 수영복]But this is why,[/log][wa:10] "
2601505-83 = "― [log=이치카 수영복]you shouldn't make such thoughtless promises.[/log]"
2601505-86 = "― [log=이치카 수영복]What would you have done [/log][wa:180] "
2601505-88 = "― [log=이치카 수영복]if I was actually a dangerous person? [/log][wa:10] "
2601505-91 = "[ns5] \"That surprised me...\"\n[ns6] \"So you also make jokes like this, Ichika.\""
2601505-94 = "― [log=이치카 수영복]Haha. [/log][wa:3160] "
2601505-96 = "― [log=이치카 수영복]This is for your eyes only, Sensei. So...[/log][wa:2260] "
2601505-99 = "― [log=이치카 수영복]We're taking this little incident[/log][wa:800] "
2601505-101 = "― [log=이치카 수영복]to the grave, okay?[/log]"
2601505-107 = "..."
2601505-108 = "[s7] \"...\"\n[s8] \"(It's suffocatingly awkward.)\""
2601505-111 = "...That didn't turn out exactly the way I meant it to."
2601505-112 = "I might've messed up."
2601505-113 = "Um..."
2601505-114 = "Let's just sleep on it, okay?"
2601505-116 = "Ichika practically pushed me back to my room."

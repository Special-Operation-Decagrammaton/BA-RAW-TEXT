[translation]
2601505-1 = "อิจิกะคนไหน"
2601505-5 = "อ๊ะ คุณครู"
2601505-8 = "ขอโทษที่ฉันเรียกให้คุณครูมาหาดึกดื่นขนาดนี้นะคะ"
2601505-9 = "เรื่องที่เราไปเดินเล่นกันเมื่อคราวก่อนน่ะค่ะ... หรือถ้าให้ถูกต้องเรียกว่าการปรึกษาดีล่ะ?"
2601505-10 = "เรื่องนั้นมันยังกวนใจฉันอยู่นิดหน่อยน่ะค่ะ~"
2601505-11 = "[s1] \"อ้อ ไม่ต้องห่วงนะ! ครูเข้าใจว่าจะบอกว่าอะไร!\" \n[s2] \"ถ้าเป็นเรื่องนั้นละก็ ครูเข้าใจแจ่มแจ้งเลย!\""
2601505-14 = "อ่า คุณครูอ่านใจฉันออกตลอดเลยนะคะ~"
2601505-15 = "ทะเลยามค่ำคืน... อาจจะมีพลังวิเศษอยู่จริงๆ ก็ได้ค่ะ"
2601505-16 = "ทำเอาฉันกลายเป็นคนที่พูดความรู้สึกของตัวเองออกมาโดยไม่รู้ตัวเลย..."
2601505-17 = "แต่ยังไงก็เถอะค่ะ ฉันอยากให้คุณครูลืมเรื่องที่เกิดในคืนนั้น..."
2601505-18 = "[s3] \"ไม่ว่าจะเป็นอิจิกะคนไหนครูก็ชอบนะ!\"\n[s4] \"ไม่ว่าจะเป็นอิจิกะคนไหนครูก็จะยอมรับนะ!\""
2601505-24 = "หืม?"
2601505-25 = "อะไรกัน ฉันไม่ได้จะพูดเรื่องนั้นสักหน่อย..."
2601505-26 = "......"
2601505-27 = "อืม... อืมม..."
2601505-28 = "การใช้คำพูดธรรมดาๆ กับคุณครูไม่ได้ผลจริงๆ ด้วยนะคะ"
2601505-29 = "ถ้างั้น..."
2601505-30 = "คุณครูคะ ไม่ว่าจะฉันคนเดิมเมื่อกี้จะเป็นยังไง"
2601505-35 = "คุณครูก็จะยอมรับ... ใช่มั้ยคะ?"
2601505-36 = "[s] \"คะ... คุณอิจิกะ...?\""
2601505-39 = "― [log=이치카 수영복]เข้าใจผิดไปเอง ตามอำเภอใจอยู่หรือเปล่าคะ?[/log][wa:2190] "
2601505-42 = "― [log=이치카 수영복]ต่อให้จะอันตรายแค่ไหน ฉันก็เป็นสาวทรีนิตี้[/log][wa:630] "
2601505-44 = "― [log=이치카 수영복]ในเรือนกระจกที่น่ารักอยู่ดีนะ[/log][wa:970] "
2601505-47 = "― [log=이치카 수영복]ชมรมทวงความยุติธรรมของเรา[/log][wa:3650] "
2601505-49 = "― [log=이치카 수영복]ต้องทำงานยากๆ ในทรีนิตี้ค่ะ[/log][wa:430] "
2601505-52 = "― [log=이치카 수영복]สิ่งที่ทุกคนห้อยคอไว้ โชกเกอร์น่ะค่ะ [/log][wa:370] "
2601505-54 = "― [log=이치카 수영복]ถ้าบอกว่าที่จริงมันคือ 'สายจูง'...[/log][wa:2370] "
2601505-57 = "― [log=이치카 수영복]จะว่ายังไงเหรอคะ?[/log]"
2601505-60 = "― [log=이치카 수영복]เหตุผลที่เราใส่สายจูงกับบางอย่าง มีเพียงข้อเดียวค่ะ[/log][wa:10] "
2601505-63 = "― [log=이치카 수영복]คนที่หลักแหลมอย่างคุณครู [/log][wa:500] "
2601505-65 = "― [log=이치카 수영복]ต่อให้ไม่บอกก็น่าจะรู้นะคะ[/log] "
2601505-68 = "― [log=이치카 수영복]งั้นถ้าถอดสายจูงออก[/log]"
2601505-70 = "― [log=이치카 수영복]ก็อาจเกิดเรื่องอะไรขึ้นมาก็ได้นะ...[/log]"
2601505-73 = "― [log=이치카 수영복]แน่นอนว่าคุณครูก็รู้ใช่มั้ยคะ?[/log][wa:1200] "
2601505-76 = "― [log=이치카 수영복]ขอโทษค่ะ...[/log][wa:1420] "
2601505-78 = "― [log=이치카 수영복]ฉันแกล้งแรงไปหน่อยนะคะ[/log]"
2601505-81 = "― [log=이치카 수영복]แต่ในเมื่อรู้แล้ว[/log]"
2601505-83 = "― [log=이치카 수영복]ทำไมถึงกล้าสัญญาอะไรง่ายๆ แบบนั้นล่ะคะ?[/log]"
2601505-86 = "― [log=이치카 수영복]ถ้าเกิดฉันเป็นคนอันตรายขึ้นมาจริงๆ[/log][wa:10] "
2601505-88 = "― [log=이치카 수영복]แล้วจะรับมือยังไงคะ?[/log][wa:510] "
2601505-91 = "[ns5] \"ตกใจหมดเลย...\"\n[ns6] \"อิจิกะก็ชอบแกล้งแบบนี้สินะ\""
2601505-94 = "― [log=이치카 수영복]แหะๆ[/log][wa:3240] "
2601505-96 = "― [log=이치카 수영복]แค่ตอนที่อยู่ต่อหน้าคุณครูเท่านั้นค่ะ เพราะงั้น...[/log][wa:1900] "
2601505-99 = "― [log=이치카 수영복]เรื่องวันนี้ให้เป็นความลับของเรา 2 คน[/log][wa:640] "
2601505-101 = "― [log=이치카 수영복]จนเราเป็นปุ๋ยกันเลยนะคะ?[/log]"
2601505-107 = "......"
2601505-108 = "[s7] \"......\"\n[s8] (รู้สึกอึดอัดจนหายใจไม่ออก)"
2601505-111 = "รู้สึกเหมือนมันจะออกมาต่างจากที่ฉันคิดไว้เลย..."
2601505-112 = "แผนล่มแล้วไง..."
2601505-113 = "อ่า อืม..."
2601505-114 = "เอาเป็นว่า... วันนี้คุณครูไปนอนก่อน แล้วเราค่อยมาคุยกันคราวหลังนะคะ"
2601505-116 = "(แล้วคุณครูก็โดนอิจิกะผลักกลับเข้ามาในห้อง...)"

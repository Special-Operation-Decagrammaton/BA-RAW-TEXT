[translation]
10041070-1 = "第7話;尾聲"
10041070-9 = "……我通通都交給女武神了，剛才那就是最後一個了。"
10041070-11 = "數量還真不是蓋的呢。#n要是這件事沒處理好，千年博覽會恐怕真的要中途喊卡了。"
10041070-12 = "超刺激的！就連三一的學生們也都興奮地喊著「這就是千年！」呢！"
10041070-13 = "總覺得千年的對外形象好像有點奇怪……"
10041070-15 = "考慮到這起陰謀的規模，能這樣糊弄過去已經相當成功了吧，呵呵。"
10041070-16 = "……研討會的會計呢？他沒說什麼嗎？"
10041070-17 = "他當然是挺生氣的。#n不過至少最後一切圓滿落幕，何況這一開始就是老師和C&C的聯合任務……"
10041070-18 = "不過他也說下次如果再發生這種事，至少要提前告知他一聲。#n還說之後要狠狠地唸老師幾句……除此之外，我想他應該不會多做追究才對。"
10041070-19 = "[s1]「原來最後要被罵的人是我啊……」\n[s2]「呵呵，反正我已經習慣被罵了……」"
10041070-22 = "不，要說生氣的話，其實我們也是一樣的。"
10041070-23 = "研討會也就算了，為什麼連我們也被蒙在鼓裡呢？#n甚至這場作戰還和三一的VIP有關。"
10041070-24 = "而我們卻毫不知情……"
10041070-29 = "抱歉，這部分完全是我的任性。#n寧瑠同學和老師他們也沒有辦法。"
10041070-30 = "他們只不過是縱容我胡鬧而已，所以請你……"
10041070-31 = "……原諒他們吧。"
10041070-35 = "啊，咦？"
10041070-36 = "啊，不不不，不是，我不是那個意思……！"
10041070-37 = "呵呵，你還真厲害呢，花凛。#n竟然能讓堂堂三一茶會的成員向你低頭。"
10041070-38 = "抱歉抱歉，我也是因為被特別交待過，所以才沒告訴你們的。"
10041070-39 = "這部分我會用別的方法來補償……你們想要什麼都可以，所以就別生氣了。"
10041070-44 = "不是！！就說了我沒有那個意思……！！"
10041070-55 = "……老師。"
10041070-56 = "[s3]「你還好嗎？有沒有哪裡受傷？」\n[s4]「怎麼樣？還行嗎？」"
10041070-59 = "……嗯，你果然從一開始就發現了嗎？"
10041070-60 = "我明明是為了證明自己的實力而來的……"
10041070-61 = "不，我不應該說這種話。#n要是老師不在的話，事情恐怕會演變成極為難堪的局面。"
10041070-65 = "謝謝你，還有……"
10041070-66 = "……對不起，我太任性了。"
10041070-67 = "[s5]「你先別急著說這種話。」\n[s6]「這種話請你忍到我們要回去的時候再說吧。」"
10041070-72 = "嗯？那是什麼意思……"
10041070-73 = "雖然我不太明白，既然老師都這麼說了，想必是有什麼特別的理由吧。"
10041070-74 = "話說回來，老師你不打算走一趟嗎？#n不親自去看看……跟我一起合作的「那個人」嗎？"
10041070-75 = "現在還不算太晚。#n我想他現在應該還在藏身處裡……整理行李才對。"
10041070-76 = "……嗯？你說沒關係？"
10041070-77 = "真是令人意外。#n我還以為你會想見見他呢。"
10041070-78 = "[s7]「我暫時還忍得住。」\n[s8]「換句話說就是時機還沒到。」"
10041070-81 = "……是嗎？"
10041070-82 = "[s9]「比起我，你還是多考慮自己的事吧。」\n[s10]「試著好好思考自己究竟為什麼來到這裡。」"
10041070-85 = "……嗯？"
10041070-86 = "啊，嗯……"
10041070-90 = "……我知道了。"
10041070-93 = "（一小時後）"
10041070-100 = "我們來了，莉央。"
10041070-101 = "我們這邊大致都處理好了，所以也差不多該……"
10041070-111 = "……看來你打算立刻回去啊。"
10041070-112 = "嗯……也是啦。#n畢竟他一開始就是這麼打算的。"
10041070-113 = "莉央……"
10041070-114 = "……？"
10041070-115 = "……唉唷，幹嘛露出那種表情啊？#n難道這麼快就產生感情了？因為要離開讓你想哭了嗎？"
10041070-119 = "不，那倒不是……"
10041070-123 = "……老實說，我的確是覺得有點可惜。"
10041070-124 = "不過除了可惜之外，更多的是煩悶感。"
10041070-125 = "煩悶感？"
10041070-126 = "沒錯，我……"
10041070-127 = "其實並不像莉央同學多次提到的那樣，認為自己需要證明些什麼。"
10041070-128 = "雖然他本人感覺不到，但也許周圍的人早就已經……"
10041070-132 = "……？"
10041070-136 = "……？？？#n然後咧，你怎麼又講話只講一半啊？"
10041070-137 = "也許……周圍的人早就已經接受他了。#n還沒有接受他的……"
10041070-138 = "就只有他自己……而已。"
10041070-142 = "……原來如此。"
10041070-143 = "原來是這麼回事啊，老師。#n所以你剛剛才會說出那句話。"
10041070-144 = "不是，你不要自問自答好不好，是被莉央傳染了嗎？#n我最討厭你們這樣了，拜託給我適可而止。"
10041070-145 = "呵呵，抱歉，這是我的壞習慣。"
10041070-146 = "話說回來……"
10041070-150 = "寧瑠同學。#n如果不介意的話，可以再請你幫我一件事嗎？"
10041070-151 = "……請我幫忙？幫什麼忙？"
10041070-152 = "那個……"
10041070-160 = "莉央同學，我有話要對你說。"
10041070-165 = "……怎麼了？"
10041070-170 = "如果可以的話，我希望你能在千年多留一週的時間。"
10041070-171 = "我和寧瑠同學也都會留在這裡，所以我希望你能跟我們一起留下來觀察情況。"
10041070-172 = "我想讓莉央你親自見證，由你守護下來的這次千年博覽會順利落幕的樣子。"
10041070-178 = "還以為你要說什麼……"
10041070-179 = "我不能答應你。#n之前我也說過，我並沒有資格留在這裡一同參與博覽會。"
10041070-180 = "……就知道你會這麼說。#n不過這件事跟資格無關。"
10041070-181 = "那是什麼意思？為什麼說跟資格無關？"
10041070-182 = "雖然你可能會認為事件已經平安落幕，但現在只不過是博覽會的第一天而已。"
10041070-183 = "沒有人能保證除了這起事件外，博覽會期間不會再發生任何「狀況」吧？#n在這之後，千年肯定還是會發生大大小小的事件和意外。"
10041070-184 = "你或許會覺得大部分的問題，交給研討會這個主辦單位去解決就行了……#n但終究沒人能保證他們有能力解決所有問題。"
10041070-185 = "所以你不覺得應該要有個人持續在幕後監控，#n並且在沒有人發現的情況下，悄悄替他們解決隱患嗎？"
10041070-186 = "如果莉央同學不願意擔任這個角色的話……#n那些工作恐怕就得由研討會的大家和老師負責了吧。"
10041070-192 = "那是莉央同學所希望的嗎？"
10041070-193 = "這……"
10041070-198 = "……寧瑠，你覺得呢？"
10041070-203 = "現在是在問我的意見嗎？#n今天還真是什麼事都碰上了呢……雖然是好事啦。"
10041070-204 = "也沒什麼不好的吧？#n只要不光明正大到外面亂晃，又不會被發現。"
10041070-205 = "而且我覺得這也是「學生會長的工作」之一。"
10041070-207 = "唔嗯……"
10041070-208 = "莫名有一種……落入圈套的感覺……"
10041070-209 = "怎麼會呢。"
10041070-210 = "不想做就算了。"
10041070-215 = "等，等等。#n我並沒有說我不想做……怎麼可能不想呢。"
10041070-216 = "嗯……應該……吧。#n我懂了……"
10041070-221 = "……知道了。#n就這麼做吧。"
10041070-225 = "不過僅限一個星期。#n等活動結束之後，我就會立刻回去。"
10041070-226 = "嗯，那樣就夠了。我們也會幫到最後的。"
10041070-227 = "那我再去把行李拿出來整理。稍等一下。"
10041070-231 = "……成功了呢。"
10041070-233 = "哈哈！挺有兩下子的嘛。#n果然已經在這段時間裡跟他混熟了嗎？"
10041070-234 = "可以這麼說……但也可以說不是。"
10041070-235 = "那種類型的人如果不給他留個台階，他是不會自己去接受或理解的。#n那是我很熟悉的類型。"
10041070-236 = "……我當然熟悉。畢竟是最常在鏡子另一邊看到的類型嘛。"
10041070-237 = "真的超煩的。"
10041070-238 = "……呵呵。"
10041070-239 = "就是說啊。"
10041070-243 = "……實在是有夠煩人的類型。"
10041070-244 = "Code:BOX 逼近千年的黑影"

[translation]
10041070-1 = "ตอนที่ 7;บทส่งท้าย"
10041070-9 = "ส่งต่อให้วัลคิรี่หมดแล้วค่ะ... เมื่อกี้คนสุดท้ายแล้วค่ะ"
10041070-11 = "จะว่าไป พวกนั้นมากันเยอะอย่างไม่น่าเชื่อเลยนะ งานมิลเลเนียม เอ็กซ์โปเกือบได้ถูกระงับไปแล้ว"
10041070-12 = "ตื่นเต้นสุดๆ ไปเลยละ! นักเรียนจากโรงเรียนทรีนิตี้ถึงกับตะโกนว่า 'นี่แหละมิลเลเนียม!' เลยด้วย"
10041070-13 = "ดูเหมือนภาพลักษณ์ภายนอกของมิลเลเนียมดูจะแปลกๆ ขึ้นนิดหน่อยเลย..."
10041070-15 = "แต่ดูจากสเกลของเหตุการณ์แล้ว แค่เราจัดการได้ขนาดนี้ก็ถือว่าทำได้ยอดเยี่ยมแล้วละค่ะ ฮุฮุ"
10041070-16 = "แล้วนักบัญชีแห่งเซมิน่าล่ะ...? มาบ่นอะไรบ้างหรือเปล่า?"
10041070-17 = "ทางนั้นโกรธเป็นฟืนเป็นไฟเลยละค่ะ แต่สุดท้ายทุกอย่างก็ราบรื่นดี แล้วนี่ก็เป็นปฏิบัติการความร่วมมือ#nระหว่างคุณครูกับ C&C ตั้งแต่แรกด้วย..."
10041070-18 = "เห็นบอกว่าคราวหน้าถ้ามีอะไรแบบนี้อีกก็ขอให้บอกกันด้วย แล้วก็บอกว่าเดี๋ยวจะไปบ่นคุณครูให้หูฉีก ทั้งหมดน่าจะมีเท่านี้ละ"
10041070-19 = "[s1] \"สุดท้ายก็เป็นครูที่โดนบ่นสินะ...\"\n[s2] \"ฮุฮุ มาบ่นได้เลย ครูชินแล้วละ...\""
10041070-22 = "แต่พวกเราก็แอบโมโหเหมือนกันนะ"
10041070-23 = "ถึงจะไม่บอกเซมิน่า แต่อย่างน้อยก็น่าจะบอกพวกเราสิ นี่เป็นถึงปฏิบัติการร่วมระหว่างเรากับ VIP ของทรีนิตี้เลยนะ"
10041070-24 = "ไม่บอกให้รู้ได้ยังไง..."
10041070-29 = "ขอโทษค่ะ นั่นเป็นเพราะความดื้อรั้นของฉันเอง ไม่ใช่เรื่องที่คุณเนรุหรือคุณครูจะทำอะไรได้หรอกค่ะ"
10041070-30 = "คุณทั้งสองคนได้โปรดเข้าใจการทำตัวเหมือนเด็กของฉันเถอะนะคะ..."
10041070-31 = "ให้อภัยฉันด้วยค่ะ..."
10041070-35 = "หะ... หืม?"
10041070-36 = "ปะ... เปล่านะ  ฉันไม่ได้หมายความอย่างนั้นนะ...!"
10041070-37 = "ฮุฮุ สุดยอดไปเลยนะคะ คาริน สมาชิกสภาน้ำชาจากทรีนิตี้ถึงกับก้มหัวให้เลยนะคะเนี่ย"
10041070-38 = "เอาละๆ ฉันขอโทษแล้วกัน ฉันเองก็บอกไม่ได้เพราะได้รับคำขอร้องเป็นพิเศษมาเหมือนกัน"
10041070-39 = "ไว้ฉันจะชดเชยให้ด้วยวิธีอื่น... พวกเธอก็ไม่ต้องโมโหหรือน้อยใจกันหรอก"
10041070-44 = "เปล่านะ!! ฉันไม่ได้พูดเพราะต้องการอะไรแบบนั้น...!!"
10041070-55 = "คุณครู..."
10041070-56 = "[s3] \"เป็นยังไงบ้าง? ไม่ได้บาดเจ็บตรงไหนใช่มั้ย?\"\n[s4] \"เป็นยังไงบ้าง? รู้สึกโอเคหรือเปล่า?\""
10041070-59 = "ค่ะ... คุณครูรู้อยู่ตั้งแต่แรกสินะคะ"
10041070-60 = "ฉันมาที่นี่เพื่อจะพิสูจน์บางอย่างด้วยตัวเองแท้ๆ..."
10041070-61 = "ไม่สิ ฉันไม่ควรพูดแบบนี้ เพราะถ้าไม่มีคุณครู เรื่องคงจะจบลงอย่างเลวร้ายไปแล้วก็ได้ค่ะ"
10041070-65 = "ขอบคุณนะคะ แล้วก็..."
10041070-66 = "ขอโทษที่ทำตามใจตัวเองด้วยค่ะ..."
10041070-67 = "[s5] \"อย่าเพิ่งพูดอะไรแบบนั้นตอนนี้เลย\"\n[s6] \"เก็บคำนี้ไว้พูดตอนกลับไปถึงเถอะ\""
10041070-72 = "คะ? หมายความว่ายังไง..."
10041070-73 = "ไม่สิ ถึงฉันจะไม่รู้ก็เถอะ แต่ถ้าคุณครูพูดอย่างนั้น คุณครูก็คงมีเหตุผลที่เหมาะสมอย่างแน่นอนค่ะ"
10041070-74 = "แต่จะว่าไป แล้วคุณครูเป็นยังไงบ้างคะ? กับ 'คนนั้น' ที่ทำงานด้วยกันน่ะ... คุณครูไม่ต้องไปหาเธอ#nเป็นการส่วนตัวเหรอคะ? "
10041070-75 = "ตอนนี้ยังมีเวลานะคะ เธอน่าจะกำลังเก็บของ... อยู่ในที่ซ่อนตัวค่ะ"
10041070-76 = "คะ...? ไม่เป็นไรงั้นเหรอคะ? "
10041070-77 = "แปลกจัง คิดว่าคุณครูอยากไปเจอเธอเสียอีก"
10041070-78 = "[s7] \"ยังไม่เป็นไรหรอก\"\n[s8] \"การพูดคุยก็ต้องอาศัยจังหวะน่ะ\""
10041070-81 = "งั้นเหรอคะ..."
10041070-82 = "[s9] \"ครูว่าเซอาคิดเกี่ยวกับตัวเองดีกว่านะ\"\n[s10] \"ครูว่าเซอาคิดถึงเหตุผลที่มาที่นี่อีกสักนิดดีกว่านะ\""
10041070-85 = "คะ...?"
10041070-86 = "อ่า... อืม..."
10041070-90 = "เข้าใจแล้วค่ะ..."
10041070-93 = "(หนึ่งชั่วโมงต่อมา)"
10041070-100 = "พวกฉันมาแล้วค่ะ ริโอะ"
10041070-101 = "เรื่องทางนี้ฉันจัดการเสร็จแล้ว จากนี้พวกเราก็คง..."
10041070-111 = "จะกลับทันทีเลยสินะคะ..."
10041070-112 = "อืม... ก็คงงั้น ริโอะคิดจะทำอย่างนั้นตั้งแต่แรกอยู่แล้ว..."
10041070-113 = "ริโอะ..."
10041070-114 = "...?"
10041070-115 = "โธ่เอ๊ย... ทำไมทำหน้าอย่างนั้นล่ะ? หรือว่ารู้สึกผูกพันกันขึ้นมา? พอจะไปก็เลยเสียใจจนน้ำตาไหลงั้น#nเหรอ?"
10041070-119 = "เปล่าค่ะ ไม่ใช่สักหน่อย..."
10041070-123 = "ค่ะ... ฉันจะบอกตามตรงแล้วกัน ที่จริงฉันก็เสียดายที่ต้องกลับ..."
10041070-124 = "แต่ในใจก็รู้สึกว่ามีเรื่องที่น่าหงุดหงิดด้วยค่ะ แล้วมันก็กวนใจฉันมากกว่าสิ่งใดเลย"
10041070-125 = "เรื่องที่น่าหงุดหงิด?"
10041070-126 = "ค่ะ ฉันน่ะ..."
10041070-127 = "ฉันคิดตรงกันข้ามกับสิ่งที่คุณริโอะพูดมาตลอด ที่จริงคุณริโอะไม่จำเป็นต้องพิสูจน์ตัวเองหรอกค่ะ"
10041070-128 = "แม้ว่าเจ้าตัวจะไม่คิดอย่างนั้น แต่คนรอบตัวน่ะ..."
10041070-132 = "...?"
10041070-136 = "อะไร...??? พูดๆ อยู่แล้วก็หยุดพูดไปดื้อๆ"
10041070-137 = "เพราะคนรอบตัวเธอน่ะ... ต่างก็ยอมรับเธอ... กันทุกคน แต่คนที่ยังไม่ยอมรับ..."
10041070-138 = "ก็คือ... ตัวเธอเองค่ะ"
10041070-142 = "อย่างนี้สินะคะ..."
10041070-143 = "เป็นอย่างนี้สินะคะ คุณครู เมื่อกี้คุณครูก็เลยพูดอย่างนี้สินะคะ"
10041070-144 = "อะไรเนี่ย พูดเองเออเองอยู่คนเดียวเหรอ? เธอก็ติดนิสัยนี้มาจากริโอะหรือไง? ฉันไม่ชอบอะไรอย่างนั้น#nหรอกนะ เอาแต่พอดีๆ เหอะ"
10041070-145 = "ฮุฮุ ขอโทษค่ะ นี่เป็นนิสัยที่ต้องแก้ของฉันค่ะ"
10041070-146 = "แต่ที่สำคัญกว่านั้น..."
10041070-150 = "คุณเนรุ... ถ้าคุณไม่ว่าอะไร ฉันจะขอความร่วมมืออีกสักครั้งได้มั้ยคะ?"
10041070-151 = "ขอความร่วมมือ...? ร่วมมือเรื่องอะไรเหรอ?"
10041070-152 = "เรื่องนั้นน่ะ..."
10041070-160 = "คุณริโอะ ฉันมีเรื่องอยากบอกค่ะ"
10041070-165 = "เรื่องอะไรเหรอ...?"
10041070-170 = "ถ้าคุณริโอะสะดวก ฉันอยากขอให้อยู่ที่โรงเรียนวิทย์มิลเลเนียมแห่งนี้อีกสักสัปดาห์ค่ะ"
10041070-171 = "ฉันกับคุณเนรุก็จะอยู่ด้วย เรามาติดตามสถานการณ์ที่นี่กันต่อนะคะ"
10041070-172 = "ฉันอยากให้คุณริโอะได้เห็นงานเอ็กซ์โปที่คุณริโอะปกป้องไว้จบลงอย่างสวยงามน่ะค่ะ"
10041070-178 = "ก็ว่าอยู่ว่าจะพูดเรื่องอะไร..."
10041070-179 = "ทำแบบนั้นไม่ได้หรอก เรื่องนี้ฉันพูดไปแล้ว ฉันไม่มีคุณสมบัติจะอยู่ที่นี่แล้วสนุกกับงานเอ็กซ์โปหรอก"
10041070-180 = "กะไว้แล้วค่ะว่าต้องพูดอย่างนี้... แต่นี่ไม่ใช่เรื่องเกี่ยวกับคุณสมบัตินะคะ"
10041070-181 = "หมายความว่ายังไง? ไม่ใช่เรื่องเกี่ยวกับคุณสมบัติงั้นเหรอ?"
10041070-182 = "คุณริโอะคิดว่าทำงานครั้งนี้ได้สำเร็จลุล่วงแล้ว แต่วันแรกของงานเอ็กซ์โปมันเพิ่งจะเริ่มเองนะคะ"
10041070-183 = "ใช่ว่าทำงานครั้งนี้เสร็จแล้วจะไม่เกิด 'ปัญหา' อื่นในงานอีกนี่คะ? ต่อไปก็จะต้องมีเหตุการณ์ และอุบัติเหตุเล็กๆ น้อยๆ เกิดขึ้นแน่นอนค่ะ"
10041070-184 = "ถึงทางเซมิน่าจะคอยแก้ไขสถานการณ์ส่วนใหญ่ให้... แต่ก็รับประกันไม่ได้หรอกค่ะว่าทุกอย่างมันจะ#nเรียบร้อยดี"
10041070-185 = "ไม่คิดว่าจำเป็นต้องมีคนคอยสอดส่องดูแล และช่วยแก้ปัญหาให้โดยไม่โดนจับได้เหรอคะ?"
10041070-186 = "ถ้าหากว่าคุณริโอะไม่ทำละก็... งานมากมายทั้งหมดนั้นจะตกเป็นภาระของสมาชิกเซมิน่าและก็คุณครู#nนะคะ"
10041070-192 = "นั่นคือสิ่งที่คุณริโอะต้องการเหรอคะ?"
10041070-193 = "เรื่องนั้นมัน..."
10041070-198 = "คิดว่ายังไงล่ะ เนรุ..."
10041070-203 = "ถามความเห็นจากฉันเหรอ? วันนี้ฉันได้เห็นอะไรแปลกๆ เยอะเลยแฮะ แต่ฉันก็เห็นด้วยอยู่แล้วละ"
10041070-204 = "มันก็น่าจะไม่เป็นไรนี่ ตราบใดที่ไม่ได้ออกไปเดินเตร็ดเตร่ข้างนอก ก็ไม่น่าจะถูกจับได้หรอก"
10041070-205 = "อย่างน้อยฉันก็คิดว่านี่คือ 'หน้าที่ของประธานนักเรียน' นะ"
10041070-207 = "อืม..."
10041070-208 = "รู้สึกเหมือนฉัน... ติดกับดักอะไรเลย..."
10041070-209 = "ไม่หรอกค่ะ"
10041070-210 = "แต่ถ้าไม่อยากก็ไม่ต้องนะ"
10041070-215 = "ปะ... เปล่านะ ฉันไม่ได้บอกว่าไม่อยากทำสักหน่อย ไม่มีทางคิดอย่างนั้นด้วย"
10041070-216 = "อืม... มันคงเป็น... อย่างนั้นละ..."
10041070-221 = "เข้าใจแล้ว... ก็ได้"
10041070-225 = "แต่แค่สัปดาห์เดียวนะ ถ้างานนี้จบลง ฉันจะกลับทันทีเลย"
10041070-226 = "ค่ะ เท่านี้ก็เพียงพอแล้วค่ะ พวกฉันก็จะอยู่ช่วยจนกว่างานจะจบเลยค่ะ"
10041070-227 = "งั้นขอฉันเอาของไปเก็บก่อน ช่วยรอกันหน่อยนะ"
10041070-231 = "ได้ผลด้วยค่ะ..."
10041070-233 = "ฮ่าฮ่า! พูดโน้มน้าวได้ดีเลยนี่ พวกเธอสนิทกันขึ้นแล้วใช่มั้ยล่ะ?"
10041070-234 = "จะมองอย่างนั้นก็ได้... หรือจะบอกว่าไม่ใช่ก็ได้ค่ะ"
10041070-235 = "คนประเภทนั้นน่ะ จะไม่เชื่อในตัวเองจนกว่าจะมีข้อแก้ตัวอย่างนี้น่ะค่ะ ฉันรู้จักคนประเภทนี้ดีเลยละ"
10041070-236 = "รู้ดีกว่าใครเลย... เพราะฉันได้เห็นคนประเภทนี้ในกระจกน่ะค่ะ"
10041070-237 = "เป็นประเภทที่น่าหงุดหงิดเอามากๆ เลยละ"
10041070-238 = "ฮุฮุ..."
10041070-239 = "จริงค่ะ"
10041070-243 = "น่าหงุดหงิดเอามากๆ เลยละ..."
10041070-244 = "Code: BOX เงามืดที่คืบคลานสู่มิลเลเนียม"

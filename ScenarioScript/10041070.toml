[translation]
10041070-1 = "Episode 7;Epilogue"
10041070-9 = "...And that's the last of them, shipped off to Valkyrie."
10041070-11 = "That was intense. The whole Expo really could've been cancelled."
10041070-12 = "Fun for everyone, though! I even heard the Trinity students running around going, \"Wow, this is Millennium!\""
10041070-13 = "True, although I think our public image might have taken a turn for the strange..."
10041070-15 = "Considering the scale of what transpired, if that's the worst of it, mission accomplished."
10041070-16 = "...What about the Seminar treasurer? Did she say anything?"
10041070-17 = "Well, she was angry, of course. But it worked out in the end, and it was Sensei and C&C's joint mission in the first place..."
10041070-18 = "She said she's going to scold Sensei about keeping her in the loop next time. I think that's about it."
10041070-19 = "[s1] \"So I'm the one who gets scolded in the end...\"\n[s2] \"Heh, I'm used to getting scolded...\""
10041070-22 = "Don't misunderstand, we're a bit angry too."
10041070-23 = "I don't know about telling Seminar, but you could've told us, at least. About a joint mission with Trinity's VIP?"
10041070-24 = "We were in the dark on all that."
10041070-29 = "I'm sorry. That was my decision, born solely out of my own stubbornness."
10041070-30 = "At worst, Sensei and Neru humored my childish side. So please, if you can..."
10041070-31 = "...be generous enough to forgive them."
10041070-35 = "Uh, um? Eh?"
10041070-36 = "N-No. No. I didn't mean it like that...!"
10041070-37 = "Fufu, Karin, you're incredible. To get someone from Trinity's Tea Party of all people to bow before you."
10041070-38 = "Yeah, um, I just got roped into this as a favor, so...whatever, my bad."
10041070-39 = "I'll find a way to make it up to you. Until then, try not to get too mad."
10041070-44 = "No! That's not what I was asking for!"
10041070-55 = "...Sensei."
10041070-56 = "[s3] \"You okay? You didn't get hurt, did you?\"\n[s4] \"How're you feeling about all this?\""
10041070-59 = "...I'm fine. So you truly knew everything, from the start."
10041070-60 = "Meanwhile, I came here to prove myself..."
10041070-61 = "...But never mind that. Had it not been for you, this would have ended badly for certain."
10041070-65 = "Thank you. Also..."
10041070-66 = "...I'm sorry for going off on my own."
10041070-67 = "[s5] \"Don't say that yet.\"\n[s6] \"Keep that to yourself until we get back.\""
10041070-72 = "What? ...What does that...?"
10041070-73 = "If you say so, Sensei. I'm sure you have a reason."
10041070-74 = "But all that aside Sensei, I should mention...you might not have another chance to see...\"her\" for a while. Did you wish to leave without saying goodbye? "
10041070-75 = "I'm sure you still could. No doubt, she's still in the hideout, packing her belongings."
10041070-76 = "...What? You DO wish to leave without saying goodbye? "
10041070-77 = "That's most unexpected. I thought you would prefer to see her off."
10041070-78 = "[s7] \"It's fine this way for now.\"\n[s8] \"There's a time and a place for that sort of thing.\""
10041070-81 = "...Is that so?"
10041070-82 = "[s9] \"Speaking of, how about you, Seia?\"\n[s10] \"Do you want to say goodbye to her?\""
10041070-85 = "...What?"
10041070-86 = "Oh, um..."
10041070-90 = "...All right."
10041070-93 = "One hour later..."
10041070-100 = "Rio? We're here."
10041070-101 = "I'm almost done organizing. We should..."
10041070-111 = "...I suppose you're going back already."
10041070-112 = "Well...yeah, that was the plan."
10041070-113 = "...Rio..."
10041070-114 = "Hm?"
10041070-115 = "*sigh* What's with that face? Did you get attached to her, just like that? Are you going to cry now that she's leaving?"
10041070-119 = "No. Not in the slightest. I..."
10041070-123 = "...Oh, all right, full disclosure. It's unfortunate, but..."
10041070-124 = "...I have a bit of a splinter in my mind about all this."
10041070-125 = "A splinter?"
10041070-126 = "A point of frustration. As I see it..."
10041070-127 = "...well, Rio might feel a need to prove herself, but in truth, she has no need."
10041070-128 = "She may not feel it herself, but others already..."
10041070-132 = "Hm?"
10041070-136 = "...Already what? Are you going to finish that sentence?"
10041070-137 = "They already acknowledge her. The only person who has yet to do the same..."
10041070-138 = "...is her."
10041070-142 = "...Oh."
10041070-143 = "I see, Sensei. So that's what you meant."
10041070-144 = "Are you answering your own questions now? Rio does that, and I hate it, so please don't."
10041070-145 = "Fufu, my apologies. It's an unfortunate habit of mine."
10041070-146 = "In any case..."
10041070-150 = "...Neru, if I may, I'd like to ask for your help once more."
10041070-151 = "...What kind of help?"
10041070-152 = "Well..."
10041070-160 = "Rio. I have something to say."
10041070-165 = "Hm? What about?"
10041070-170 = "If you would, I believe you should stay at Millennium Science School for perhaps a week longer."
10041070-171 = "I'll stay as well, with Neru. And all I ask of you is that you watch and observe."
10041070-172 = "You deserve to see the rest of the Expo, that you protected, with your very own eyes."
10041070-178 = "I was wondering what you were going to say..."
10041070-179 = "Well, I'm afraid not. I don't deserve to enjoy the Expo here. That's already settled."
10041070-180 = "I suspected you would say that. But this is not a matter of \"deserving\" it."
10041070-181 = "It's not? What are you talking about?"
10041070-182 = "You may think everything is settled now, but this is still the Expo's first day."
10041070-183 = "Perhaps the rest of the event will be calm, comparatively, or perhaps not. Perhaps it'll be full of madcap incidents, big and small."
10041070-184 = "Seminar is on the alert, of course, but just how much could they handle themselves?"
10041070-185 = "Someone needs to keep watch, out of sight. Would that not be for the best?"
10041070-186 = "That someone need not be you, of course. Perhaps Sensei, working WITH Seminar, could take the extra weight, but..."
10041070-192 = "...would you want that for them, Rio?"
10041070-193 = "Well..."
10041070-198 = "...Neru, what do you think?"
10041070-203 = "You actually want my opinion? It's been a weird day. Not a bad day, though."
10041070-204 = "I think it ought to be fine. You wouldn't get found out unless you walk around in public or something."
10041070-205 = "Besides, it's what student council presidents do, right?"
10041070-207 = "...Hmm..."
10041070-208 = "Why do I feel like I'm falling into a trap?"
10041070-209 = "The choice is yours."
10041070-210 = "No one's going to make you do it if you don't want to."
10041070-215 = "N-No. I didn't say I don't want to. Of course I want to."
10041070-216 = "Um... Well, I, uh..."
10041070-221 = "...All right. I'll do it."
10041070-225 = "For one week only. As soon as it's over, I'm going back."
10041070-226 = "One week is plenty. And Neru and I will be with you for every day of it."
10041070-227 = "All right, let me go unpack, then..."
10041070-231 = "...It worked."
10041070-233 = "Haha! You handled her pretty well. When'd you two get so close?"
10041070-234 = "Well, in a sense, perhaps."
10041070-235 = "She is the kind of person who declines to accept what she wants, unless she has an excuse."
10041070-236 = "I know that mentality. I see it every day in the mirror."
10041070-237 = "And so, here you are, still making trouble."
10041070-238 = "...Fufu."
10041070-239 = "I meant every word of what I said to her."
10041070-243 = "And yes, sometimes I do make trouble that way."
10041070-244 = "Code: BOX - The Shadow Approaching Millennium"

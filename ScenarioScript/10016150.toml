[translation]
10016150-1 = "後日談;救護騎士團&急救醫學部篇"
10016150-6 = "這位患者，最後我再幫你檢查一次生命徵象哦。"
10016150-13 = "嗯……體溫已經恢復，脈搏和血壓也都正常。"
10016150-14 = "白天因為熱衰竭被送來的時候，你的體溫偏高讓我很擔心呢……"
10016150-15 = "幸好在補充足夠的水分並在陰涼處休息後，馬上就好轉了。"
10016150-16 = "謝，謝謝……託你的福，我好像完全康復了。"
10016150-17 = "不，切忌掉以輕心！"
10016150-18 = "聯合醫療本部即將撤離，所以無法繼續在這裡提供協助……"
10016150-19 = "如果回三一後仍感到不適，請一定要來找救護騎士團！"
10016150-20 = "維護正義固然重要，但要是損害了健康，就什麼都守護不了囉。"
10016150-21 = "好，好的……我會牢記在心！"
10016150-25 = "話說……那邊的那位……"
10016150-31 = "還有事需要我幫忙嗎？"
10016150-32 = "沒，沒有。#n我不是需要幫忙，只是……"
10016150-33 = "這位看起來是格黑娜的學生，身為三一實現正義部成員的我，這樣麻煩他沒關係嗎……？"
10016150-34 = "啊哈，如果是那個問題──"
10016150-39 = "如果是那個問題，請不用在意。"
10016150-40 = "發現傷患時，急救醫學部會一視同仁地「接管」，不問及狀態或身分。#n這點沒有例外。"
10016150-41 = "當然，過程中偶爾會伴隨著各種干擾，但只要屍體在哪裡……#n不，是患者在哪裡，我們就去哪裡，這是醫護人員的宿命。"
10016150-43 = "至於擔心世人的目光或偏見，那都是之後的事了。"
10016150-44 = "原，原來如此……"
10016150-45 = "嗯。「晄輪大祭」是不分學園，和睦競爭的和平祭典。"
10016150-46 = "我也會盡最大的努力，讓所有學園的患者都能健康地回去。"
10016150-48 = "而且，剛才患者倒下時，第一個發現並護送過來的人也是瀬奈同學。"
10016150-49 = "原，原來如此……！"
10016150-50 = "剛才沒搞清楚狀況就說了失禮的話，真是抱歉……"
10016150-51 = "不，沒關係。"
10016150-52 = "況且如果挑選患者的話，反而會錯過優質的屍體……#n更正，是會錯過盡情接觸傷患的機會。"
10016150-53 = "（屍體……？）"
10016150-54 = "總，總之，今天非常謝謝你！"
10016150-59 = "今天真的辛苦了！"
10016150-60 = "多虧了急救醫學部各位的努力，才能比平時順利地為更多患者治療。"
10016150-61 = "不。這要歸功於救護騎士團不辭辛勞地工作。"
10016150-62 = "儘管日程繁重，救護騎士團依然不忘以笑臉對待患者，讓我留下了深刻的印象。"
10016150-63 = "我本以為自己在護送和急救醫學方面已經有一定程度的了解，#n看來今後還有很長的路要走啊。"
10016150-68 = "有什麼在意的事嗎？"
10016150-69 = "……不，我只是覺得應該要向救護騎士團的各位道歉才行。"
10016150-70 = "雖然我剛才說不用在意世人的目光和偏見……#n但其實我也聽到了一些關於「救護騎士團」的傳聞，所以事先做了心理準備。"
10016150-71 = "傳聞……？"
10016150-72 = "啊，是指「救護騎士團不接受格黑娜的患者」之類的嗎──"
10016150-73 = "不，我指的並不是那種……"
10016150-79 = "而是「當救護騎士團團長開始救護時，傷患會不減反增。」這樣的傳聞。"
10016150-80 = "某些地方甚至有著「團長負責破壞，騎士團負責治療」這句話……"
10016150-81 = "能領導如此善良和藹成員的救護騎士團團長，不可能做出那種事吧。"
10016150-82 = "…………"
10016150-83 = "除此之外，我還聽說救護騎士團的某個護士會向有睡眠障礙的患者揮舞球棒，#n或是用烏頭屬植物的根熬煮的茶招待他們，導致病情更加惡化……"
10016150-84 = "啊，啊哈哈……傳聞往往會被誇大嘛。"
10016150-85 = "是啊。從今天大家展現的樣子來看，傳聞果然只是傳聞。"
10016150-86 = "啊，這麼說來，我還聽到了另一個傳聞。"
10016150-87 = "另一個傳聞……？"
10016150-88 = "是的。聽說救護騎士團裡有位無處不在，無論何時何地都會現身的幽靈護士。"
10016150-89 = "根據傳聞，那名護士會在患者按下呼叫鈴之前現身，#n並在完成患者需要的措施後瞬間消失得無影無蹤。"
10016150-90 = "芹奈同學是否知道那名優秀護士的來歷──"
10016150-92 = "瀬，瀬奈同學……！聽說晚點的「後夜祭」準備了盛大的營火晚會……"
10016150-93 = "不，不介意的話，一起去看看吧？"
10016150-94 = "那聽起來似乎跟我沒什麼太大的關係……"
10016150-95 = "但如果是使用大火的地方，說不定會有屍體……#n不，說不定會有患者出現。"
10016150-96 = "那我們趕緊準備吧？#n和患者相關的事可是刻不容緩的哦！"
10016150-103 = "……看來傳聞的事只能等下次再問了呢。"

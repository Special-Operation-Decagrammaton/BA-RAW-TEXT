[translation]
10016150-1 = "ย้อนวันวาน; ชมรมอัศวินบรรเทาทุกข์ & หน่วยแพทย์ฉุกเฉิน"
10016150-6 = "ขอโทษนะคะ ขอวัดชีพจรหน่อยนะคะ"
10016150-13 = "อืม... อุณหภูมิร่างกายก็ปกติแล้ว ความดันกับชีพจรก็ปกติแล้วค่ะ"
10016150-14 = "ตอนที่คุณเข้ามารักษาเพราะเป็นลมแดด อุณหภูมิร่างกายคุณสูงมากจนน่าเป็นห่วงเลยค่ะ"
10016150-15 = "ดื่มน้ำให้เพียงพอ และพอได้พักในที่ร่ม ไม่นานก็อาการดีขึ้นมากเลยนะคะ "
10016150-16 = "ขะ... ขอบคุณที่ช่วยดูแลนะคะ ตอนนี้ฉันรู้สึกดีขึ้นมากเลยค่ะ"
10016150-17 = "ไม่ได้นะคะ จะประมาทไม่ได้นะคะ!"
10016150-18 = "อีกไม่นานเราต้องรื้อถอนเต้นท์ของหน่วยพยาบาลสัมพันธ์แล้ว คงช่วยเหลือคุณต่อไม่ได้..."
10016150-19 = "แต่พอกลับไปที่ทรีนิตี้แล้ว ถ้าอาการยังไม่ดีขึ้นละก็ มาที่ห้องชมรมอัศวินบรรเทาทุกข์ได้เลยนะคะ!"
10016150-20 = "งานดูแลเรื่องความยุติธรรมสำคัญก็จริง แต่ถ้าไม่ดูแลร่างกายให้ดีละก็ จะทำหน้าที่ได้ไม่เต็มที่นะคะ"
10016150-21 = "คะ... ค่ะ! ฉันจะระวังให้ดีค่ะ!"
10016150-25 = "ว่าแต่ว่า... คนที่อยู่ทางด้านนั้น..."
10016150-31 = "มีอะไรให้ฉันช่วยรึเปล่าคะ?"
10016150-32 = "ปะ... เปล่าค่ะ มะ... ไม่ได้มีอะไรให้ช่วยหรอกค่ะ"
10016150-33 = "คุณคนนั้นดูเหมือนจะเป็นนักเรียนของเกเฮนน่า สมาชิกชมรมทวงความยุติธรรมอย่างฉัน จะขอให้เธอช่วยได้งั้นเหรอคะ...?"
10016150-34 = "อ้อ ถ้าเป็นเรื่องนั้นละก็ㅡ"
10016150-39 = "ถ้าเป็นเรื่องนั้นละก็ ไม่ต้องห่วงหรอก"
10016150-40 = "หน่วยแพทย์ฉุกเฉินจะไม่สอบถามข้อมูลหรือสถานะของผู้ป่วยที่พบ และจะรักษาอย่างเท่าเทียมกับ#nผู้ป่วยที่ทางเรา “รับผิดชอบ” อยู่โดยไม่แบ่งแยก"
10016150-41 = "แน่นอนว่าบางครั้งในขั้นตอนการรักษาก็อาจมีอุปสรรคหลายๆ อย่าง แต่ถ้าที่ไหนมีศพ... ไม่สิ แต่ถ้าที่ไหนมีผู้ป่วย ก็เป็นหน้าที่ที่เราจะไปรักษาค่ะ"
10016150-43 = "การรับมือกับเรื่องอคติหรือคำวิจารณ์ของชาวเมือง เป็นเรื่องที่เอาไว้ทีหลังได้ค่ะ"
10016150-44 = "ยะ... อย่างนั้นเหรอคะ"
10016150-45 = "ค่ะ นอกจากนี้ <งานฮาโลเฟสติวัล> เป็นเทศกาลแห่งสันติภาพที่ทุกคนสามารถมาแข่งขันกันได้ โดยไม่แบ่งแยกโรงเรียนค่ะ"
10016150-46 = "ฉันจะพยายามทำหน้าที่อย่างเต็มที่เพื่อให้ผู้ป่วยจากทุกโรงเรียนที่มาที่นี่ กลับมามีสุขภาพแข็งแรง#nเหมือนเดิมค่ะ"
10016150-48 = "แล้วก็เมื่อกี้ตอนที่คุณหมดสติ คนที่พบตัวคุณและพามาที่หน่วยพยาบาลก็คือคุณเซนะคนนี้แหละค่ะ"
10016150-49 = "ยะ... อย่างนั้นเหรอคะ...!"
10016150-50 = "ฉันไม่รู้เรื่องนั้นเลย แล้วเมื่อกี้ก็ยังพูดเรื่องเสียมารยาทไปด้วย ต้องขอโทษจริงๆ ค่ะ..."
10016150-51 = "ไม่ค่ะ ไม่เป็นไรเลย"
10016150-52 = "ถ้าเกิดเลือกปฏิบัติในการส่งตัวผู้ป่วย ก็อาจพลาดโอกาสได้สัมผัสกับศพคุณภาพดี... ไม่สิ ผู้ป่วยที่บาดเจ็บรุนแรงได้คะ"
10016150-53 = "(ศพงั้นเหรอ...?)"
10016150-54 = "ยะ... ยังไงวันนี้ก็ขอบคุณมากๆ เลยนะคะ!"
10016150-59 = "วันนี้ขอบคุณมากเลยนะคะ!"
10016150-60 = "เป็นเพราะได้ทางหน่วยแพทย์ฉุกเฉินมาช่วย เราเลยรักษาผู้ป่วยได้ราบรื่นกว่าทุกวันเลยค่ะ "
10016150-61 = "ไม่หรอกค่ะ ทุกอย่างผ่านไปได้อย่างราบรื่นเพราะทางชมรมอัศวินบรรเทาทุกข์มาช่วยต่างหากค่ะ"
10016150-62 = "ภาพของสมาชิกชมรมอัศวินบรรเทาทุกข์ที่แม้จะเจอกับงานหนัก แต่ก็ยังรักษาผู้ป่วยทุกคนด้วยสีหน้า#nยิ้มแย้ม ฉันประทับใจมากเลยค่ะ"
10016150-63 = "ที่ผ่านมาฉันรู้สึกภูมิใจในความรู้เรื่องการแพทย์ฉุกเฉินและการขนย้ายผู้ป่วย... แต่ดูเหมือนฉันยังคง#nต้องฝึกอีกเยอะเลยค่ะ"
10016150-68 = "กังวลเรื่องอะไรอยู่รึเปล่าคะ?"
10016150-69 = "เปล่าหรอกค่ะ... ฉันคิดว่าควรต้องขอโทษสมาชิกชมรมอัศวินบรรเทาทุกข์ค่ะ"
10016150-70 = "เมื่อกี้ฉันพูดไปว่าไม่ให้ใส่ใจกับคำวิจารณ์หรืออคติของชาวเมือง แต่อันที่จริง... ฉันเองก็เตรียมใจมา#nเพราะได้ยินข่าวลือเกี่ยวกับ <ชมรมอัศวินบรรเทาทุกข์> มาบ้างน่ะค่ะ"
10016150-71 = "ข่าวลือเหรอคะ...?"
10016150-72 = "เอ่อ... หรือว่าเป็นพวกข่าวลือที่ว่าชมรมอัศวินบรรเทาทุกข์ไม่รักษาให้ผู้ป่วยที่มาจากเกเฮนน่าㅡ"
10016150-73 = "เปล่าค่ะ ไม่ใช่เรื่องพวกนั้นหรอกค่ะ..."
10016150-79 = "แต่เป็นข่าวลือที่ว่า ถ้าหัวหน้าชมรมอัศวินบรรเทาทุกข์ออกปฏิบัติการช่วยเหลือเมื่อไรละก็ ผู้บาดเจ็บจะไม่ลดลง แถมเพิ่มขึ้นเยอะกว่าเดิมน่ะค่ะ"
10016150-80 = "เหมือนจะพูดกันว่า “หัวหน้าชมรมทำลายล้าง สมาชิกอัศวินเป็นคนรักษา” ด้วยค่ะ..."
10016150-81 = "แต่ว่าหัวหน้าของชมรมอัศวินบรรเทาทุกข์... ไม่มีทางเป็นคนแบบนั้นหรอก ใช่มั้ยคะ?"
10016150-82 = "..."
10016150-83 = "นอกจากนี้ ฉันก็ยังได้ยินมาว่า พยาบาลจากชมรมอัศวินบรรเทาทุกข์ มักจะใช้ไม้ตีผู้ป่วยที่เป็น#nโรคนอนไม่หลับ หรือไม่ก็เสิร์ฟชารากต้นวูฟส์เบนให้ผู้ป่วย ทำให้อาการแย่ลงกว่าเดิม... "
10016150-84 = "อะฮ่าฮ่าฮ่า... พวกข่าวลือนี่มักจะพูดกันเกินจริงอยู่เรื่อยเลยนะคะ..."
10016150-85 = "ค่ะ วันนี้ได้มาสัมผัสทุกคนด้วยตัวเองแบบนี้ เรื่องพวกนั้นคงเป็นแค่ข่าวลือจริงๆ ด้วยค่ะ"
10016150-86 = "อ๊ะ พอมานึกดูแล้ว ยังมีอีกเรื่องหนึ่งนะคะ"
10016150-87 = "ยังมีอีกเหรอคะ...?"
10016150-88 = "ค่ะ มีข่าวลือว่าที่ชมรมอัศวินบรรเทาทุกข์ มีพยาบาลที่ปรากฏตัวได้ทุกที่ทุกเวลา เหมือนวิญญาณ#nติดตามตัวอยู่ด้วยค่ะ"
10016150-89 = "จากข่าวลือที่ได้ยินมา พยาบาลคนนั้นมักจะปรากฏตัวต่อหน้าผู้ป่วย ก่อนที่ผู้ป่วยจะกดกริ่งเรียก และพอรักษาเสร็จก็จะหายตัวไปเหมือนวิญญาณเลยค่ะ"
10016150-90 = "คุณเซรินะพอจะรู้ตัวจริงของพยาบาลคนนี้หรือเปล่า..."
10016150-92 = "คะ... คุณเซนะ...! ฉะ...ฉันเพิ่งนึกออกค่ะว่าวันนี้จะมีการจัดแคมป์ไฟขนาดใหญ่ในงานอาฟเตอร์ปาร์ตี้#nด้วย..."
10016150-93 = "ถะ... ถ้าคุณเซนะมีเวลา เราไปดูแคมป์ไฟด้วยกันดีมั้ยคะ?"
10016150-94 = "ฉันก็ไม่ได้ติดอะไรหรอกค่ะ แต่ว่า..."
10016150-95 = "ถ้าเป็นสถานที่ที่มีกองไฟขนาดใหญ่ ก็อาจจะมีศพ... ไม่สิ อาจมีผู้ได้รับบาดเจ็บก็ได้นะคะ"
10016150-96 = "ถะ... ถ้าอย่างนั้นเรารีบไปกันดีมั้ยคะ? เราจะให้ผู้ป่วยรอนานไม่ได้นะคะ!"
10016150-103 = "เอาไว้ค่อยถามเรื่องข่าวลือนั่นทีหลังแล้วกัน... "

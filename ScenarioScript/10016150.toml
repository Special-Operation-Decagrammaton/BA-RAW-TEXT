[translation]
10016150-1 = "Afterword; Remedial Knights & Medical Emergency Club"
10016150-6 = "Please allow me to run a last check on your vitals."
10016150-13 = "Let's see... Everything is looking good. Temperature, pulse, and blood pressure are all normal."
10016150-14 = "You were brought in for heat exhaustion, correct? I was concerned about how high your temperature was..."
10016150-15 = "But you've recovered very quickly! I'm relieved the fluids and rest worked so well."
10016150-16 = "Th-Thank you... It's all thanks to your care..."
10016150-17 = "Please do not let your guard down, however!"
10016150-18 = "The Joint Medical Headquarters is about to close for the night, so I'm afraid I can't provide you more care, but..."
10016150-19 = "Please monitor your condition closely after you return to Trinity. The Remedial Knights' door is always open!"
10016150-20 = "Defending justice is important, but you can't defend anything without your health."
10016150-21 = "Y-Yes, ma'am... I'll be certain to be careful!"
10016150-25 = "B-But I was wondering... That person over there..."
10016150-31 = "Do you require my assistance at all?"
10016150-32 = "N-No... It's not that, but..."
10016150-33 = "Aren't you a Gehenna student? Are you okay with me being here, a member of Trinity's Justice Task Force?"
10016150-34 = "Haha. I see why you're so concerned now."
10016150-39 = "But there's nothing to fret about."
10016150-40 = "It is our principle at the Medical Emergency Club to provide care to any injured person. They are our patients, regardless of affiliation. No matter what."
10016150-41 = "Naturally, it's not necessarily always that simple, but a medic's duty is to tend to the bodies... I mean, patients wherever they may be."
10016150-43 = "The intricacies of this world's many stigmas and preconceptions are an afterthought to caring for the injured."
10016150-44 = "I-I see..."
10016150-45 = "Absolutely! We've all gathered together for the Kivotos Halo Festival to celebrate peace and cooperation. It's a time for us to put aside our affiliations and bond through friendly competition."
10016150-46 = "Our mission is to ensure that all our patients return to their academies healthier than ever!"
10016150-48 = "And, you know, Sena was the first person on scene when you collapsed earlier. She carried you all the way here!"
10016150-49 = "I-I understand now."
10016150-50 = "I had no idea. I'm sorry for my rude assumptions."
10016150-51 = "No, it is okay."
10016150-52 = "And regardless, there's no such thing as political affiliation when it comes to finding good quality corpses... I mean, treating injured people."
10016150-53 = "(C-Corpses...?)"
10016150-54 = "Well, um, thanks for everything!"
10016150-59 = "Excellent work today!"
10016150-60 = "We were able to process a very high volume of patients thanks to the Medical Emergency Club's hard work."
10016150-61 = "Not at all. The Remedial Knights' discipline and work ethic are truly unmatched."
10016150-62 = "I was impressed by your ability to maintain a positive demeanor under all this pressure."
10016150-63 = "I'd rather pridefully believed I was amongst the best at transportation and emergency medicine, but today taught me there is always more to learn."
10016150-68 = "What do you mean? Is something troubling you?"
10016150-69 = "Not at all. In fact, I believe I owe the Remedial Knights an apology."
10016150-70 = "Earlier, I encouraged that patient to throw away her preconceptions, but I walked into this facility today with my own about the Remedial Knights due to the rumors I have heard."
10016150-71 = "Rumors...?"
10016150-72 = "Oh. Have there been rumors that the Remedial Knights wouldn't accept Gehenna patients?"
10016150-73 = "No, not of that sort..."
10016150-79 = "I foolishly believed the rumors that when the leader of the Remedial Knights was involved in a case, the number of wounded would actually increase."
10016150-80 = "People often whisper, \"The leader breaks, so her Knights heal...\""
10016150-81 = "But after seeing the work you do here, I simply cannot believe that a group so kind-hearted would be led by such barbarous tactics."
10016150-82 = "..."
10016150-83 = "I must admit, I've even heard of a Remedial Knights nurse who attempted to cure a sleeping disorder with the aid of a baseball bat and wolfsbane tea, worsening their condition."
10016150-84 = "Ah...Ahaha... Yes... You know how facts can be distorted through the rumor mill..."
10016150-85 = "I would agree. You've shown me today that rumors truly are simply rumors."
10016150-86 = "For your entertainment, however, I have heard another rumor."
10016150-87 = "A-Another rumor...?"
10016150-88 = "Yes. They say there is a Remedial Knights nurse who appears wherever she is needed, like a medical ghost."
10016150-89 = "They even go so far as to claim that this nurse provides aid to patients before they can even press the call button and then disappears as if she were never there."
10016150-90 = "Have you ever heard of this incredibly capable nurse, Serina?"
10016150-92 = "Ah! S-Sena! H-Have you heard about the giant campfire they're having at the After-Party?"
10016150-93 = "I-If you would like, perhaps we could go and enjoy the festivities together?"
10016150-94 = "I wouldn't object to the idea."
10016150-95 = "Where there are fires, there tend to be corpses— Ahem, patients."
10016150-96 = "Then, off we go! There may even be a patient in need of our aid as we speak!"
10016150-103 = "...I'll ask about the rumors again, another time."

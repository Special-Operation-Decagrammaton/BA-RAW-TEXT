[translation]
10017050-1 = "ตอนที่ 5;Civil War(?)"
10017050-2 = "คาเฟ่ <ไวท์&เมสัน>"
10017050-3 = "นี่... งานฉลองแบบนี้ ต้องบอกว่าไม่ได้จัดมานานมากแล้ว หรือไม่เคยจัดมาก่อนเลยดีนะ..."
10017050-4 = "ฉันไม่คุ้นเคยจนไม่รู้ว่าต้องมีส่วนร่วมยังไงเลยค่ะ..."
10017050-6 = "ปล่อยใจจอยๆ ได้เลยค่ะ"
10017050-7 = "เรามีทั้งสโคนและเค้กอร่อยๆ แถมยังมีชาแดงกลิ่นหอมหวานด้วย"
10017050-8 = "เลือกชิมและดื่มอาหารได้ตามใจเลยค่ะ"
10017050-13 = "แต่ว่าพวกฉันน่ะ... เอ่อ... ไม่ได้สง่างามเหมือนกับรองหัวหน้าฮาสุมิ..."
10017050-14 = "พวกเราไม่รู้จักรสชาติหรือกลิ่นของชาแดงหรอกค่ะ..."
10017050-16 = "ไม่ต้องคิดมากกับเรื่องพวกนั้นหรอกนะคะ"
10017050-17 = "เราไม่จำเป็นต้องมีความรู้ซับซ้อนขนาดนั้นในการเพลิดเพลินไปกับขนมและน้ำชาหรอกค่ะ"
10017050-18 = "งานฉลองในวันนี้ก็เป็นงานตอบแทนที่ทุกคนทำงานหนักในปีที่ผ่านมาค่ะ"
10017050-23 = "เดี๋ยวชาก็เย็นหมดหรอกค่ะ รีบดื่มสิคะ"
10017050-24 = "ขะ... ขอบคุณค่ะ..."
10017050-25 = "ว่าแต่... ตอนทำชานม ที่ถูกต้องคือเราต้องใส่ชาแดงไปในนม หรือว่าใส่นมไปในชาแดงเหรอคะ?"
10017050-26 = "ที่ถูกน่าจะเป็นการใส่นมเย็นๆ ลงไปในชาแดงนะ? อย่างนี้นมจะได้ช่วยให้ชาที่ร้อนเย็นลง และทำให้อุณหภูมิเหมาะสมตอนดื่มไงคะ"
10017050-27 = "ไม่ใช่ค่ะ เราต้องใส่ชาแดงไปในลงในนมที่อุ่นต่างหากค่ะ รสชาติของนมกับชาแดงจะได้เข้ากัน ทำให้ยิ่งมีรสชาติที่นุ่มลึกยิ่งขึ้นไงคะ"
10017050-28 = "วิธีแบบนั้นมันแปลกนะคะ! ในขั้นตอนของการอุ่นนม อาจเกิดเยื่อบางๆ บนผิวก็ได้ "
10017050-29 = "สุดท้ายแล้วสิ่งแปลกปลอมจะเข้าไปผสมในชา และทำให้เสียรสชาติค่ะ!"
10017050-30 = "พูดแบบนี้แสดงว่าไม่รู้อะไรแล้วค่ะ! ถ้าเราใส่นมในชาแดง โปรตีนในนมจะแปรสภาพ และจะเกิดกลิ่นคาวเฉพาะของนมค่ะ"
10017050-31 = "และพอมันผสมเข้ากับองค์ประกอบของชาแดง ก็จะแปรสภาพจนเป็นไขมันในนมที่ส่งผลต่อรสฝาด#nของชาแดง เราเลยควบคุมรสฝาดไม่ได้ค่ะ!"
10017050-32 = "ในทางกลับกัน ถ้าเราใส่ชาแดงลงในนม อุณหภูมิของชาจะไม่เพิ่มขึ้นเกินอุณหภูมิที่กำหนด ก็เลยไม่เกิดการแปรสภาพ และรสชาติของชาก็จะสมบูรณ์แบบค่ะ!"
10017050-33 = "ใส่นมในชา!"
10017050-34 = "ใส่ชาในนม!"
10017050-36 = "เอาละๆ ใจเย็นๆ กันนะคะทุกคน"
10017050-38 = "เฮือก! ขะ... ขอโทษค่ะคุณฮาสุมิ!"
10017050-39 = "ฉันไม่ได้ตั้งใจทำพฤติกรรมแย่ๆ แบบนี้...!"
10017050-41 = "ไม่เป็นไรค่ะ คำถามนั้น... มันอันตรายตั้งแต่แรกแล้วละค่ะ"
10017050-42 = "คะ? คำถามที่อันตรายงั้นเหรอคะ?"
10017050-43 = "พวกคุณอาจจะถามขึ้นมาเพราะไม่รู้จริงๆ ก็ได้ แต่คำถามนั้นเป็นคำถามที่ทำให้เกิดการถกเถียงกันมา#nเป็น 100 ปีแล้วค่ะ"
10017050-44 = "แล้วก็ยังไม่ได้ข้อสรุปที่ดีนักด้วยค่ะ..."
10017050-45 = "ถึงแม้การใส่ชาแดงในนมจะทำให้ช่วยลดรสฝาดได้บ้างก็ตาม..."
10017050-46 = "อีกอย่าง ในโลกนี้ยังมีคนที่ชื่นชอบในรสฝาดที่ว่า หรือไม่ก็ชอบรสชาติของนมอุ่นๆ..."
10017050-47 = "พอความเห็นต่างกัน ก็เป็นการแบ่งเป็นฝ่าย 'ใส่ชาในนม' และฝ่าย 'ใส่นมในชา' จนเกือบมีการทะเลาะ#nกันยกใหญ่เลยค่ะ"
10017050-49 = "งะ... งั้นเหรอคะ...! ฉันไม่รู้มาก่อนเลยค่ะ"
10017050-50 = "ฉันจะดื่มด่ำกับงานเลี้ยงส่งท้ายปีอย่างสบายใจและไม่เกินขอบเขตนะคะ!"
10017050-52 = "โชคดีที่ทุกคนสนุกกับงานเลี้ยงวันนี้มากกว่าที่คิดนะคะ"
10017050-53 = "เป็นอะไรหรือเปล่าคะ ซึรุกิ...?"
10017050-61 = "เคี๊ยกกก....."
10017050-62 = "ซึรุกิน่าจะต้องผ่อนคลายไหล่หน่อยนะคะ ยืนสบายๆ เถอะค่ะ..."
10017050-63 = "รับไปสิคะ ซึรุกิชอบชาแดงกับขนมไม่ใช่เหรอคะ?"
10017050-64 = "ก็ไม่ใช่ว่า... ไม่ชอบหรอก..."
10017050-65 = "แต่ว่า..."
10017050-66 = "...แค่ฉันยืนอยู่ตรงนี้ ก็มีคนกระสับกระส่ายและประหม่าแล้ว"
10017050-67 = "แต่เราอยู่ต่อหน้าสมาชิกชมรมนี่คะ แถมซึรุกิยังเป็นหัวหน้าด้วย เราไม่ต้องกังวลขนาดนั้นก็ได้ค่ะ..."
10017050-68 = "กำลังพยายามอยู่..."
10017050-69 = "งั้นเหรอคะ งั้นก็ไม่เป็นไรค่ะ..."
10017050-71 = "ทางเข้าคาเฟ่ <ไวท์&เมสัน>"
10017050-75 = "ทะ... ทำอะไรอยู่เหรอคะ? เห็นยืนมาตั้งนานแล้ว..."
10017050-76 = "ฉันกำลังเฝ้ายามอยู่ค่ะ"
10017050-77 = "คะ? แต่ตอนนี้เรากำลังจัดปาร์ตี้กันอยู่นะคะ?"
10017050-78 = "ฉันรู้ดีค่ะ ถึงได้มาเฝ้ายามแบบนี้ ทุกคนจะได้สนุกกับงานเลี้ยงได้อย่างสบายใจไงคะ..."
10017050-79 = "และนี่ก็เป็นหนึ่งในวิธีผดุงความยุติธรรมด้วยค่ะ!"
10017050-81 = "ตะ... แต่ยังไงก็ต้องให้ตัวเองได้สนุกบ้างสิคะ...?"
10017050-82 = "ไม่เป็นไรค่ะ สำหรับฉันแล้ว การรักษาความยุติธรรมก็สนุกไม่ต่างไปกับการจัดปาร์ตี้หรอกค่ะ!"
10017050-83 = "งั้น... เหรอคะ? ตะ... แต่ว่า..."
10017050-89 = "มาเปลี่ยนเวรกัน..."
10017050-94 = "หะ... หัวหน้า?!"
10017050-95 = "รุ่นพี่ซึรุกิ? มีธุระอะไรตรงนี้เหรอคะ?"
10017050-97 = "มาเปลี่ยนเวรน่ะ..."
10017050-102 = "คะ? แต่ว่ารุ่นพี่..."
10017050-103 = "ฉะ... ฉันขอตัวก่อนนะคะ!"
10017050-109 = "...จะไม่เป็นไรเหรอคะ?"
10017050-110 = "อยู่ตรงนี้มันสบายใจกว่า..."
10017050-111 = "เข้าใจแล้วค่ะ ถ้างั้นฉันจะเปิดโอกาสให้–"
10017050-113 = "–ชมรมอัศวินบรรเทาทุกข์ขอถามบางอย่างจากชมรมทวงความยุติธรรมค่ะ!"
10017050-118 = "ทำไมคำมันเชื่อมกันได้แปลกๆ คะเนี่ย..."
10017050-119 = "หัวหน้ามิเนะจากชมรมอัศวินบรรเทาทุกข์เหรอคะ?"
10017050-120 = "มีธุระอะไรที่นี่เหรอคะหัวหน้ามิเนะ?"
10017050-122 = "ฉันมาตรวจสอบค่ะ วันนี้ชมรมทวงความยุติธรรมไปเอาไก่ทอดคริสต์มาสมาจากพวกนักเลงใช่ไหมคะ?"
10017050-127 = "หา...?"
10017050-128 = "(ก็ใช่นะ... แต่เราไปเอาคืนมา)"
10017050-129 = "(การบอกข้อเท็จจริงอย่างตรงไปตรงมาก็เป็นหนึ่งในวิธีผดุงความยุติธรรมด้วยค่ะ)"
10017050-130 = "ใช่ค่ะ มีเรื่องแบบนั้นจริงๆ ค่ะ"
10017050-132 = "งั้นเหรอคะ? ฉันตรวจสอบเสร็จแล้วค่ะ และจากนี้ต่อไป ฉันจะ..."
10017050-133 = "เสียใจมากค่ะ เสียใจอย่างหาที่เปรียบไม่ได้เลย!"
10017050-134 = "เป็นถึงชมรมทวงความยุติธรรม แต่กลับลืมความยุติธรรมแล้วไปรังแกคนอื่นเสียได้ แถมยังมาทำในวัน#nคริสต์มาสอีก!"
10017050-135 = "คะ? หมายความว่ายังไง..."
10017050-136 = "ไม่รู้จริงๆ เหรอคะ? หรือว่ายังไม่รู้ตัวคะว่าทำอะไรลงไป?"
10017050-137 = "ชมรมทวงความยุติธรรม กลับตัวกลับใจเถอะค่ะ! กลับมาเป็นคนเดิมที่ช่วยเหลือผู้คนที่น่าสงสารด้วย#nกันกับเรานะคะ!"
10017050-138 = "(ยัยนี่พูดอะไรไม่เห็นจะรู้เรื่องอยู่เรื่อย...)"
10017050-139 = "ช่วยรอก่อนนะคะหัวหน้ามิเนะ พอดีพวกฉันกำลังจัดปาร์ตี้เล็กๆ ฉลองคริสต์มาสและส่งท้ายปีอยู่ค่ะ"
10017050-140 = "จากที่ฉันรู้มา วันคริสต์มาสก็เป็นวันที่สำคัญสำหรับชมรมอัศวินบรรเทาทุกข์ แล้วก็ชมรมทวงความ#nยุติธรรมด้วยไม่ใช่เหรอคะ?"
10017050-142 = "ก็เพราะใช่ยังไงล่ะคะ!"
10017050-143 = "เคี๊ยกกกก...?!"
10017050-144 = "ฉันไม่ว่าอะไรหรอกค่ะถ้าพวกคุณจะพักผ่อนหรือเฮฮากัน"
10017050-145 = "แต่หากชมรมทวงความยุติธรรมลืมหน้าที่หลักของตัวเองในวันคริสต์มาสละก็!"
10017050-146 = "ฉันก็จะถือโล่ขัดขวางอย่างไม่ลังเลค่ะ!"
10017050-147 = "และนี่คือความนับถือของฉันที่อยากส่งให้ชมรมทวงความยุติธรรมค่ะ!"
10017050-148 = "ชะ... ช่วยบอกหน่อยได้ไหมคะว่ามันเกิดเรื่องอะไรขึ้น ทำไมถึงได้มาจริงจังกันขนาดนี้..."
10017050-149 = "ไม่ต้องทำเป็นไม่รู้เรื่องเลยค่ะ! เมื่อกี้ยังยอมรับอยู่เลยไม่ใช่เหรอคะว่าเอาไก่ทอดของพวกนักเลงไป!"
10017050-150 = "ไม่ว่าจะเป็นนักเลงหรือคนทั่วไป แต่ความจริงที่เกิดขึ้นก็คือชมรมทวงความยุติธรรมไปแย่งไก่ทอดจาก#nพวกเขามานี่คะ"
10017050-151 = "'ความช่วยเหลือ' ต้องถูกส่งต่ออย่างทั่วถึงและเป็นธรรมกับทุกคน! นี่คือเป้าหมายของชมรมอัศวิน#nบรรเทาทุกข์ค่ะ!"
10017050-152 = "จริงอยู่ค่ะที่เราไปเอาไก่ทอดมา แต่ว่าไก่ทอดอันนั้นมัน...!"
10017050-153 = "ฉันพูดขนาดนี้แล้วยังไม่รู้กันอีกเหรอคะ? หรือว่าตั้งใจทำเป็นไม่รู้ไม่ชี้กันคะ?"
10017050-154 = "แต่ไม่ว่าจะทางไหน ก็ทำให้ฉันเสียใจอยู่ดีค่ะ!"
10017050-160 = "......ถอยไป มาชิโระ"
10017050-161 = "รุ่นพี่ซึรุกิ?"
10017050-167 = "(พูดบ้าอะไรไม่เห็นจะเข้าใจเลย...)"
10017050-168 = "(นานๆ ทีสมาชิกชมรมเราจะได้พักผ่อนกันแบบนี้... เราจะปล่อยให้ใครมาขัดขวางไม่ได้...)"
10017050-171 = "ยัยนี่ดูท่าทางจะคุยด้วยไม่รู้เรื่องแล้ว เธอเข้าไปอยู่ข้างในเถอะ"
10017050-172 = "ไม่ค่ะ ฉันทำแบบนั้นไม่ได้หรอกค่ะ!"
10017050-173 = "รุ่นพี่ออกมาตั้งรับทั้งที ถ้าฉันหลบเข้าไปคนเดียว แบบนี้ก็ไม่ยุติธรรมสิคะ!"
10017050-174 = "ถ้างั้นก็มาประจำตำแหน่ง..."
10017050-175 = "ได้ค่ะรุ่นพี่!"
10017050-177 = "เข้าช่วยในพื้นที่ที่ต้องการความช่วยเหลือ!"

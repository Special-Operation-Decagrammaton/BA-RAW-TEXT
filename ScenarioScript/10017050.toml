10017050-24 = "3;정의실현부 부원 A;07;가, 감사합니다……\n#3;stiff"
10017050-25 = "4;정의실현부 부원 B;02;그런데, 밀크티를 만들 때 우유에 홍차를 붓는 게 맞을까요, 아니면 홍차에 우유를 붓는 게 맞을까요?\n#4;em;[?]\n#4;a\n#3;m2"
10017050-26 = "3;정의실현부 부원 A;02;홍차에 찬 우유를 붓는 게 맞지 않을까요? 그래야 뜨거운 홍차를 우유가 식혀 주면서 마시기 좋은 온도가 되니까요.\n#3;em;[반응]"
10017050-27 = "4;정의실현부 부원 B;05;아뇨, 따뜻하게 덥힌 우유에 홍차를 붓는 게 맞겠지요. 그래야 우유의 고소한 맛과 홍차가 어우러져 보다 깊은 맛을 내주니까요."
10017050-28 = "3;정의실현부 부원 A;04;그건 이상한 방법이에요! 우유를 덥히는 과정에서 표면에 얇은 막이 생길 수가 있고, \n#3;jump"
10017050-29 = "3;정의실현부 부원 A;04;결과적으로 홍차에 불순물이 섞이게 되어서 오히려 제대로 맛이 나지 않는다구요!"
10017050-30 = "4;정의실현부 부원 B;02;그건 잘 모르고 하시는 말씀이에요! 홍차에 우유를 붓게 되면 단백질이 변성되면서 특유의 비린 냄새가 나게 되고,\n#4;jump"
10017050-31 = "4;정의실현부 부원 B;02;홍차 성분과 어울려서 홍차의 떫은맛을 제어할 유지방까지 변성되어 버리면서 떫은맛은 떫은맛대로 조절되지 않아요!"
10017050-32 = "4;정의실현부 부원 B;03;반대로 우유에 홍차를 부으면 일정 온도 이상으로 차의 온도가 올라가지 않기 때문에 변성이 일어나지 않아서 밀크티의 맛을 온전히 즐길 수 있죠!\n#4;em;[반짝]"

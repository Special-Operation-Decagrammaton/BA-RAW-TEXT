[translation]
10017050-1 = "Episode 5; Civil War (?)"
10017050-2 = "White & Mason Cafe"
10017050-3 = "You know, I honestly haven't been to an event like this in a long while. Actually, this might count as my first time..."
10017050-4 = "I don't even know what I'm supposed to do... Like, what do I do with my hands?"
10017050-6 = "Just relax and enjoy yourselves."
10017050-7 = "We've prepared delicious scones, cakes, and a fragrant black tea."
10017050-8 = "Please, feel free to drink or eat whatever catches your eye."
10017050-13 = "But we're not classy like you, Vice President Hasumi..."
10017050-14 = "We don't know the first thing about properly enjoying black tea..."
10017050-16 = "No need to overthink things."
10017050-17 = "There is no particular, esoteric way to enjoy snacks or tea."
10017050-18 = "Remember, this event is to celebrate your hard work this past year."
10017050-23 = "Please, drink your tea before it gets cold."
10017050-24 = "Th-Thank you..."
10017050-25 = "So, when making milk tea, do you pour tea into milk or milk into tea?"
10017050-26 = "Doesn't it only make sense to pour the milk into the tea? That way the milk cools the tea so it's not too hot to drink."
10017050-27 = "What? No. It's clearly correct to pour black tea into warm milk. That way, the taste of the milk is more preserved and present in the resulting milk tea."
10017050-28 = "That's a terrible idea! While heating the milk, a thin film might form on the surface. "
10017050-29 = "So you'll end up mixing the tea with impurities, so it won't taste right!"
10017050-30 = "You don't know what you're talking about! When you pour milk into black tea, the milk heats unevenly. This causes the proteins in the milk to become denatured, and that's what causes a film to form!"
10017050-31 = "And then, since you just have a bunch of denatured protein in your cup, you end up with not enough milk flavor in your milk tea!"
10017050-32 = "Conversely, if you pour the tea into the milk like an intellectual, the milk won't heat unevenly, so you can fully enjoy the taste of milk tea without any denaturation!"
10017050-33 = "Milk into tea!"
10017050-34 = "Tea into milk!"
10017050-36 = "Now, now, let's all just calm down."
10017050-38 = "What? Oh, I'm so sorry. Please forgive me, Hasumi!"
10017050-39 = "I'm sorry, I was out of line!"
10017050-41 = "It's okay. But for future reference, that was a dangerous question to ask."
10017050-42 = "Um, I'm sorry? Dangerous?"
10017050-43 = "You weren't aware of this, but that question has been the source of strife for centuries."
10017050-44 = "It's a conflict without end."
10017050-45 = "It is said that, by pouring tea into milk, one can reduce the bitter taste of black tea a little more..."
10017050-46 = "But it must be said that some people enjoy the bitter taste. At the same time, others will swear by the flavor of milk-first milk tea."
10017050-47 = "At one point, there was even an actual fight between the two sides."
10017050-49 = "I-I see! I'm sorry for being so ignorant of tea history!"
10017050-50 = "You know, maybe we should just chill and enjoy everything available to us."
10017050-52 = "I was worried at first, but it looks like everyone is comfortable and enjoying themselves."
10017050-53 = "...Are you okay, Tsurugi?"
10017050-61 = "Krraaaggh..."
10017050-62 = "You should try to relax a little more yourself..."
10017050-63 = "You enjoy black tea and snacks too, don't you?"
10017050-64 = "I don't dislike those things, but..."
10017050-65 = "It's just..."
10017050-66 = "I feel like me being here makes people tense."
10017050-67 = "They're all club members, and you're their club president. You shouldn't feel so self-conscious."
10017050-68 = "I'm trying not to..."
10017050-69 = "That's all I ask."
10017050-71 = "White & Mason Entrance"
10017050-75 = "Um, what are you doing?"
10017050-76 = "As is apparent, I am standing guard."
10017050-77 = "Right. But why? What about the party?"
10017050-78 = "I am perfectly aware of it. In fact, I stand here as a watchful guardian to ensure that the party remains peaceful."
10017050-79 = "For there is no greater justice than one undisturbed!"
10017050-81 = "R-Right. But it's not being disturbed, so don't you want to enjoy yourself?"
10017050-82 = "Worry not! To me, there is no greater celebration than upholding justice!"
10017050-83 = "O-Okay. Um, but, like, are you sure you're sure?"
10017050-89 = "...I can take over."
10017050-94 = "P-President?!"
10017050-95 = "Tsurugi? What are you doing here?"
10017050-97 = "I just said, I'm here to take over for you..."
10017050-102 = "What? But..."
10017050-103 = "I-I'm gonna get going!"
10017050-109 = "Are you sure?"
10017050-110 = "I'd be more comfortable here..."
10017050-111 = "Okay. Then I'll—"
10017050-113 = "The Remedial Knights have questions for the Justice Task Force!"
10017050-118 = "What an interesting introduction."
10017050-119 = "Captain Mine of the Remedial Knights?"
10017050-120 = "What brings you here, Captain?"
10017050-122 = "As members of the Justice Task Force, did you or did you not take Christmas chicken from some thugs today?"
10017050-127 = "...Hm?"
10017050-128 = "(Chicken? We did...)"
10017050-129 = "(Clearly conveying facts is just another part of realizing justice.)"
10017050-130 = "Yes, that happened."
10017050-132 = "I see. So the truth has come to light..."
10017050-133 = "How sad! How infinitely sad!"
10017050-134 = "How could it be that, today of all days, on Christmas itself, the Justice Task Force loses its way?!"
10017050-135 = "I'm not sure what you mean."
10017050-136 = "Are you so ignorant? Or is it willful blindness?!"
10017050-137 = "Justice Task Force! I call upon you to right your path! To return to being protectors of the weak!"
10017050-138 = "(As usual, I have no idea what she's going on about.)"
10017050-139 = "I'm sorry, Captain, at the moment, we're just hosting a small party to celebrate Christmas."
10017050-140 = "Christmas is an important day for the Remedial Knights as well, no?"
10017050-142 = "That's exactly why I'm here!"
10017050-143 = "Gyaaahhh?!"
10017050-144 = "I take no issue with you enjoying yourselves."
10017050-145 = "However! The Justice Task Force shouldn't abandon its heart and soul for some Christmas fun!"
10017050-146 = "If that's the path you have chosen, I will have no choice but to be a shield set against you!"
10017050-147 = "That is the aid I bring to the Justice Task Force!"
10017050-148 = "C-Can you please just explain what's going on?"
10017050-149 = "Don't feign ignorance any further! You desecrated this holy night by stealing chicken from those thugs!"
10017050-150 = "Thugs or not, what the Justice Task Force did was nothing short of theft!"
10017050-151 = "Aid belongs to all in equal measure! That is the guiding light of the Remedial Knights!"
10017050-152 = "I get that, but that chicken was—"
10017050-153 = "Even after all I have said, you still can't understand? Or have you decided not to?"
10017050-154 = "I am overwhelmed by sorrow!"
10017050-160 = "...Step back, Mashiro."
10017050-161 = "Tsurugi?"
10017050-167 = "(I honestly don't have a single clue as to what Mine's talking about...)"
10017050-168 = "(But what I do know is that my club members are relaxing for the first time in too long, and I'm not going to let her interrupt that.)"
10017050-171 = "There's no talking to her when she gets like this. Go inside."
10017050-172 = "No! I can't do that!"
10017050-173 = "Justice never runs, and it doesn't leave allies alone either!"
10017050-174 = "...She's coming. Get ready."
10017050-175 = "Roger!"
10017050-177 = "Medicine knows no borders!"

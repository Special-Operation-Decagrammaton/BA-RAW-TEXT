[translation]
10017050-1 = "第5話;內戰"
10017050-2 = "咖啡廳「White&Mason」"
10017050-3 = "那個……好久沒有出席這種場合了，甚至可以說是第一次……"
10017050-4 = "這，這種時候該做什麼才好呢……"
10017050-6 = "不用這麼緊張。"
10017050-7 = "美味的司康、蛋糕，還有清香撲鼻的紅茶……"
10017050-8 = "請隨意地品嚐。"
10017050-13 = "可是……我們不像蓮實副部長那麼有品味……"
10017050-14 = "以我的舌頭，恐怕也分辨不出紅茶的好壞……"
10017050-16 = "不用在意唷。"
10017050-17 = "享受紅茶與茶點的美味，並不需要具備複雜的專業知識。"
10017050-18 = "況且，來這裡的目的，是為了慰勞各位過去一年的辛勞。"
10017050-23 = "來，請在冷掉之前儘早享用吧。"
10017050-24 = "非，非常感謝……"
10017050-25 = "話說……泡奶茶的時候，到底是要把牛奶倒入紅茶內，還是把紅茶倒入牛奶內呢？"
10017050-26 = "一般不都是往紅茶內倒入冰牛奶嗎？#n這樣才能將熱紅茶冷卻，變得更容易入口。"
10017050-27 = "……不，把紅茶倒入熱牛奶才是正確的。#n這樣能讓牛奶的香醇與紅茶結合，進而增添風味。"
10017050-28 = "這種作法太奇怪了！#n牛奶在加熱的過程中，表面會出現薄膜……"
10017050-29 = "這樣會導致紅茶裡混入雜質，糟蹋了它原有的滋味！"
10017050-30 = "那是你什麼都不懂才會這麼說！#n如果把牛奶倒入紅茶的話，會因為蛋白質產生變異的關係，產生特殊的腥味……"
10017050-31 = "而且能控制紅茶澀味的乳脂也會發生變異，導致澀味無法調節！"
10017050-32 = "相反的，如果把紅茶倒入牛奶，就能保證牛奶的溫度不會過度升高，避免發生變質，進而完整享受奶茶的滋味！"
10017050-33 = "牛奶加紅茶！"
10017050-34 = "紅茶加牛奶！"
10017050-36 = "請，請冷靜下來。"
10017050-38 = "啊！對，對不起，蓮實副部長！"
10017050-39 = "一不小心就太過激動，讓您見笑了……！"
10017050-41 = "別這麼說。#n不過，你們剛才談論的可是非常危險的問題唷。"
10017050-42 = "危險的問題……？"
10017050-43 = "沒錯。因為那個問題，可是爭論了足足100年以上。"
10017050-44 = "時至今日，依然沒有得出結論。"
10017050-45 = "雖說將紅茶倒入牛奶內能稍微減少澀味……"
10017050-46 = "不過就像剛才說的，有人反而很享受其中的澀味。#n甚至連加熱牛奶時產生的風味，也有一派擁護者……"
10017050-47 = "「倒紅茶派」和「倒牛奶派」從古至今都爭執不下。"
10017050-49 = "原，原來如此……！"
10017050-50 = "那麼……就按照自己的喜好，輕鬆地享用吧！"
10017050-52 = "大家看起來比我想得還要開心，真是太好了。"
10017050-53 = "……弦生，沒事吧？"
10017050-61 = "嘰耶……"
10017050-62 = "弦生，肩膀放鬆一點沒關係的……"
10017050-63 = "來，你喜歡這個紅茶和茶點吧？"
10017050-64 = "……不討厭。"
10017050-65 = "只是……"
10017050-66 = "……只要我坐在這裡，就會讓人覺得緊張。"
10017050-67 = "是這樣沒錯，但大家都是實現正義部的一員唷。#n更何況你是部長，其實不用那麼在意……"
10017050-68 = "我正在努力……"
10017050-69 = "是嗎，那就好……"
10017050-71 = "咖啡廳「White&Mason」入口"
10017050-75 = "那個，麻白前輩？#n你在做什麼呢……？"
10017050-76 = "如你所見，正在戒備中。"
10017050-77 = "咦？可是大家都在裡頭享受聖誕派對……"
10017050-78 = "是這樣沒錯。#n但也正因如此，我才希望大家能不受叨擾，好好地享受……！"
10017050-79 = "這也是實現正義的一種方式！"
10017050-81 = "我明白了……但麻白前輩也多少享受一下吧……？"
10017050-82 = "沒關係。因為對我來說，維護正義就和「開派對」是一樣的！"
10017050-83 = "咦……？#n這樣啊……"
10017050-89 = "……換班。"
10017050-94 = "部，部長！？"
10017050-95 = "弦生前輩？怎麼了嗎？"
10017050-97 = "……我來換班了。"
10017050-102 = "可是前輩……"
10017050-103 = "我，我先失陪了……！"
10017050-109 = "……沒關係嗎？"
10017050-110 = "……這裡比較自在。"
10017050-111 = "……我明白了。#n那麼不好意思，我就──"
10017050-113 = "──救護騎士團有話想問實現正義部！"
10017050-118 = "突然就變成奇怪的文字接龍了……"
10017050-119 = "這不是救護騎士團的美禰團長嗎？"
10017050-120 = "怎麼了？發生了什麼事嗎？"
10017050-122 = "請容我確認一件事。#n貴部今日是否有從不良分子手中回收了炸雞呢？"
10017050-127 = "……？ "
10017050-128 = "（確實……回收了呢）"
10017050-129 = "（明確地傳達事實，也是一種實現正義的方法吧）"
10017050-130 = "是，確有其事。"
10017050-132 = "這樣啊……"
10017050-133 = "令人悲痛，多麼令人悲痛啊！"
10017050-134 = "難得的聖誕節，實現正義部卻偏離了正義的道路！"
10017050-135 = "這，這是什麼意思……？"
10017050-136 = "你們真的不知道？#n還是說，你們已經迷失自我了嗎？"
10017050-137 = "請回來吧，實現正義部！#n回到與我們並肩實現救護的從前！"
10017050-138 = "（……雖然早已司空見慣，但還是覺得莫名其妙）"
10017050-139 = "那個，團長。#n因為今天是聖誕節，所以我們正在舉辦一個簡單的派對……"
10017050-140 = "對救護騎士團來說，我想也同樣是很重要的日子。像這樣的日子，是不是先──"
10017050-142 = "正因如此才必須要做！"
10017050-143 = "嘰耶耶耶……！？"
10017050-144 = "我對休息本身沒有任何意見。"
10017050-145 = "但在聖誕節這樣的日子裡，實現正義部卻竟然忘了本分！"
10017050-146 = "那我只好舉起盾牌，擋在實現正義部面前了！"
10017050-147 = "這是我對實現正義部最大的敬意！"
10017050-148 = "那，那個……這究竟是怎麼回事呢……"
10017050-149 = "請不要再裝傻了！#n你們不是收走了不良分子的炸雞嗎！"
10017050-150 = "無論對方的身分為何，只要實現正義部搶走他人之物的事實不變……！"
10017050-151 = "我都會予以公平的「救護」！#n這就是救護騎士團存在的目的！"
10017050-152 = "確，確實是回收了沒錯，但那個炸雞……！"
10017050-153 = "都說到這裡了還不明白嗎……？#n還是說，你們已經鐵了心要這麼做呢？"
10017050-154 = "不管是哪個，都讓我悲痛不已啊！"
10017050-160 = "……退下，麻白。"
10017050-161 = "弦，弦生前輩？"
10017050-167 = "（雖然不知道到底發生了什麼事……）"
10017050-168 = "（但部員們好不容易才得以休息……不能被他妨礙……）"
10017050-171 = "看來事到如今是說不通了，你先進去裡面吧。"
10017050-172 = "不，那可不行。"
10017050-173 = "前輩都已經身先士卒了，如果我就此退縮，可不是正義的行徑！"
10017050-174 = "……過來了。做好準備吧。"
10017050-175 = "是！"
10017050-177 = "「哪裡要救護，我就在哪裡」！"

[translation]
2001515-1 = "ความทรงจำแรก"
2001515-2 = "(คุณครูกับคาเอเดะไปที่ป็อปอัปสโตร์ของมูชิควีนด้วยกัน...)"
2001515-6 = "[ns1] \"โห ดูแถวสิ...\"\n[ns2] \"คงต้องรอสักพักเลยละมั้ง...?\""
2001515-10 = "หืม? แถวยาวแค่นี้ถือว่าปกตินะคุณครู ก็นี่มันคือการขายเฟรมการ์ดมูชิควีนสุดลิมิเต็ดเลยนี่นา!"
2001515-11 = "แถมครั้งนี้ ยังมีเฟรมการ์ดระดับ UR ที่มีโอกาสผลิตซ้ำต่ำมากๆ มาขายอีกด้วย!"
2001515-12 = "ถ้าพลาดครั้งนี้ไป ก็อาจจะไม่มีโอกาสซื้ออีกแล้วก็ได้นะ?!"
2001515-13 = "[s3] \"เฟรมการ์ดคือที่ใส่การ์ดใช่มั้ย?\"\n[s4] \"เฟรมการ์ดคือซองใส่กันการ์ดยับใช่มั้ย?\""
2001515-16 = "ใช่แล้ว อันนั้นแหละ! คุณครูก็รู้จักเหมือนกันนี่นา!"
2001515-17 = "ถ้าเป็นแบบนี้... ฉันจะเอาเฟรมการ์ดที่เป็นสมบัติล้ำค่าของฉันให้คุณครูดูก็แล้วกัน!"
2001515-18 = "[s] \"สมบัติของคาเอเดะ!?\""
2001515-19 = "อื้อ! รอดูได้เลย... นี่ไง!"
2001515-25 = "[ns] \"ดูเหมือน...เฟรมการ์ดที่ผ่านอะไรมาโชกโชนเลยนะ?\""
2001515-26 = "อื้อ... นี่เป็นเฟรมการ์ดอันแรกที่ฉันเก็บออมค่าขนมไปซื้อมาเลยนะ"
2001515-27 = "เมื่อสมัยก่อนน่ะ ฉันไม่รู้เลยว่าต้องใช้ของพวกนี้ด้วย"
2001515-28 = "ตอนนั้นฉันยังไม่รู้ถึงความสำคัญของการ์ด เลยมักหยิบการ์ดแรงๆ หรือกำการ์ดไว้ในมือ"
2001515-29 = "เลยทำให้การ์ดใบสำคัญใช้ได้แค่ไม่นานน่ะ..."
2001515-30 = "ฉันคิดแค่ว่ามันเป็นแค่การ์ด แค่ซื้อใหม่เท่านั้นก็พอ..."
2001515-31 = "เป็นช่วงที่เรียกตัวเองว่านักดูเอลลิสต์ไม่ได้เลยละ..."
2001515-32 = "อ๊ายย?! พอนึกถึงเรื่องนี้ขึ้นมาทีไร ก็ไม่รู้เลยว่าทำไมตอนนั้นถึงทำแบบนั้นน่ะ!"
2001515-33 = "คิดแล้วเชียวว่าการนึกถึงเรื่องในอดีตมันน่าอายจริงๆ เลยนะ คุณครู!"
2001515-34 = "[s5] \"ไม่เป็นไรนะ เรียนรู้แล้วค่อยๆ โตขึ้น\" \n[s6] \"เรื่องปกตินะ คนเราเติบโตจากเรื่องแบบนี้ละ\""
2001515-37 = "งั้นฉันก็อยากโตขึ้นซะเดี๋ยวนี้เลย!"
2001515-38 = "เอ๋? ถ้ารีบร้อนเกินไป อาจจะกลายเป็นว่าช้ากว่าเดิมก็ได้งั้นเหรอ? ฉันคิดไม่ถึงเลยแฮะ..."
2001515-39 = "แถมยังคล้ายๆ กับการดูเอลการ์ดด้วยงั้นเหรอ? หมายความว่ายังไงน่ะ?"
2001515-40 = "'การดูเอลการ์ดก็มีลำดับการวางการ์ดอยู่ด้วยไม่ใช่รึไง?' งั้นเหรอ... อืม เรื่องนั้นมันก็มีอยู่นะ"
2001515-41 = "อ่า... ถ้าเกิดรีบร้อนและฝืนสลับลำดับละก็จะทำให้เกิดเรื่องผิดพลาดขึ้นได้งั้นเหรอ...?"
2001515-42 = "งั้นการรอคอยให้ถึงเวลาที่เหมาะสมก็อาจเป็นหนึ่งในเส้นทางแห่งการเป็นเลดี้ที่เพียบพร้อม#nสินะ..."
2001515-43 = "อืม... อาจเป็นแบบนั้นก็ได้เนอะคุณครู!"
2001515-44 = "สมแล้วที่เป็นคุณครู... สมแล้วที่เป็นผู้ใหญ่! ฉันจะเติบโตขึ้นเป็นเลดี้ที่เพียบพร้อม... และพูดอะไรเท่ๆ เหมือนกับคุณครูให้ได้เลย!"
2001515-45 = "[s] \"เอาสิ แล้วครูจะรอนะ\""
2001515-46 = "ยังไงก็เถอะ ได้ยินว่ามีกรณีที่ดูเอลลิสต์ไม่ได้ใส่เฟรมการ์ด จะไม่ได้รับอนุญาตให้ลงแข่งใน#nการแข่งขันอยู่ด้วยนะ?"
2001515-47 = "เพราะงั้นการเดบิวต์ที่ฉันวาดฝันไว้เลยต้องสลายไปไม่มีชิ้นดีเลย..."
2001515-48 = "ฮือ... ทั้งที่คิดว่าพอเดบิวต์อย่างอลังการแล้วก็อยากจะไต่อันดับขึ้นไปอยู่จุดสูงสุดของ#nนักดูเอลลิสต์แท้ๆ...!"
2001515-49 = "[s] \"ไม่รู้มาก่อนเลยแฮะ ว่าถ้าไม่ใส่เฟรมการ์ดจะลงแข่งไม่ได้\""
2001515-50 = "อ้อ เรื่องนั้นน่ะเหรอ? เรื่องมันเป็นอย่างนี้นะ ถ้าใช้เฟรมการ์ดที่ด้านหลังทึบมันก็จะทำให้มอง#nไม่เห็นด้านหลังของการ์ด"
2001515-51 = "ซึ่งมันก็ช่วยป้องกันไม่ให้เกิดการโกงในการแข่งได้ เพราะงั้นในการแข่งขันเลยต้องใช้#nเฟรมการ์ดตลอดน่ะ"
2001515-52 = "รู้ไว้ด้วยล่ะคุณครู! ในการ์ดน่ะเปี่ยมไปด้วยจิตวิญญาณและความฝัน รวมถึงจิตใจและความทรงจำ#nของนักดูเอลลิสต์ด้วย!"
2001515-53 = "คนที่ไม่ให้ความสำคัญกับการ์ด ไม่มีคุณสมบัติที่จะเป็นนักดูเอลลิสต์หรอก!"
2001515-54 = "เพราะงั้นเฟรมการ์ดจึงเป็นของสำคัญ เปรียบเหมือนเป็นชุดเกราะของนักดูเอลลิสต์เลยละ!"
2001515-55 = "[s] \"ชุดเกราะของนักดูเอลลิสต์ เปรียบได้เห็นภาพดีจริงๆ...!\""
2001515-56 = "อ่า ฉันพูดอะไรเท่ๆ ได้เหมือนคุณครูขึ้นบ้างรึยัง? คุณครูคิดว่ายังไง...?!"
2001515-57 = "อาจเหมือนขึ้นบ้างแล้ว... งั้นเหรอ?"
2001515-58 = "แหะ แหะๆ... ขอบคุณที่พูดแบบนั้นนะคุณครู"
2001515-59 = "[s] \"ว่าแต่ว่าทำไมถึงชอบมูชิควีนมากขนาดนี้ล่ะ?\""
2001515-60 = "อ่า... มันเป็นเรื่องตั้งแต่สมัยก่อนน่ะ"
2001515-61 = "จะให้เล่าให้ฟังมันก็รู้สึกเขินๆ นะ...."
2001515-65 = "[ns] (พอคาเอเดะพูดว่า 'เรื่องสมัยก่อน' นี่รู้สึกบอกไม่ถูกเลย...)"
2001515-66 = "ไม่แน่ใจว่าคุณครูรู้รึเปล่า แต่ว่าบ้านเกิดของฉันอยู่ชนบทน่ะ"
2001515-67 = "คุณครูก็น่าจะรู้นี่นา ว่าที่ชนบทน่ะไม่ค่อยมีอะไรให้เที่ยวเล่นสักเท่าไร สถานที่ที่ไปเล่นได้ก็มี#nอยู่จำกัดด้วย"
2001515-69 = "ทำได้แค่ไปจับกุ้งที่ลำธาร... หรือไม่ก็ไปจับพวกด้วงกว่างในป่า..."
2001515-70 = "แน่นอนว่าการเล่นแบบนั้นมันก็สนุกมาก แถมถ้าไปเล่นกับเพื่อนๆ เวลาก็ยิ่งผ่านไปเร็วโดยที่#nไม่ทันได้รู้ตัวเลยละ!"
2001515-71 = "แต่ว่าลึกๆ ในใจแล้ว... มันก็อยากให้มีเกม หรืออะไรอย่างอื่นที่เล่นได้สนุกกว่านี้อยู่บ้างน่ะ"
2001515-73 = "และตอนนั้น... ฉันก็ได้รู้จักมูชิควีน!"
2001515-75 = "เหลือเชื่อเลย! บนการ์ดมีรูปด้วงกว่างกับด้วงเขากวางวาดอยู่ด้วยละ!"
2001515-76 = "ยังไม่หมดนะ! เรายังเอาการ์ดพวกนั้นมาผลัดกันเล่นแต่ละเทิร์นแข่งกันจนชนะได้ด้วย!!"
2001515-77 = "ตอนแรกน่ะ ฉันก็คิดอยู่เหมือนกันว่ามันเป็นไปได้จริงๆ เหรอ"
2001515-78 = "ถ้าให้พูดความรู้สึกในตอนนั้นละก็..."
2001515-79 = "คงเหมือนกับฉันค้นพบทวีปใหม่เลยละ!"
2001515-80 = "[s] \"เปรียบเทียบได้ยิ่งใหญ่สุดๆ\""
2001515-81 = "แต่ว่านะ..."
2001515-82 = "มันมีกฎและกติกาการเล่นที่เขียนเอาไว้อย่างดีอยู่ด้วย! วิธีเล่นที่แตกต่างกับการเล่นซ่อนแอบ!"
2001515-83 = "และพอค่อยๆ ทำความเข้าใจกติกาการเล่นอย่างถี่ถ้วน ก็จะเข้าใจวิธีเล่นให้ชนะได้ไม่ยาก!"
2001515-84 = "แค่นั้นยังไม่พอ ถึงคราวนี้จะแพ้ แต่ก็ยังเอามาเล่นใหม่ได้อีก!"
2001515-85 = "ต่อให้คู่ต่อสู้จะเปลี่ยนไป แต่คู่ต่อสู้เองก็ต้องใช้กฎเดียวกัน! สิ่งที่เรียกว่าเกมเนี่ย มันสุดยอดมากเลยนะ ว่ามั้ยล่ะคุณครู?"
2001515-86 = "ถ้าไม่มีมูชิควีนละก็ ฉันคงไม่รู้เลยว่ามีการเล่นเกมการ์ดแบบนี้อยู่ในโลกด้วย!"
2001515-87 = "[s] \"มูชิควีนคงเป็นสิ่งสำคัญสำหรับคาเอเดะมากเลยสินะ\""
2001515-88 = "หืม? งะ... งั้นเหรอ?"
2001515-89 = "อืม ฉันก็ไม่ค่อยรู้หรอกนะ... แต่พอคุณครูพูดแบบนั้น ฉันก็คิดว่ามันน่าจะเป็นแบบนั้นน่ะ แหะๆ"
2001515-91 = "เชิญลูกค้าคิวต่อไปเลยครับ"
2001515-92 = "อ๊ะ! ถึงคิวเราแล้วละ! รีบเข้าไปกันเถอะคุณครู!"
2001515-94 = "(หลังจากนั้นคุณครูกับคาเอเดะก็เข้าไปเลือกซื้อเฟรมการ์ดมูชิควีนด้วยกันในป็อปอัปสโตร์)"

[translation]
2001515-1 = "最初的回憶"
2001515-2 = "（和楓一起前往了甲蟲皇后的快閃店……）"
2001515-6 = "[ns1]「排隊的人潮……」\n[ns2]「現在開始排的話，應該要等很久吧……？」"
2001515-10 = "嗯？這種程度還算正常的哦，老師。#n畢竟這可是甲蟲皇后的限定版保護套！"
2001515-11 = "而且這次賣的還是原本幾乎不可能復刻的「超級豪華稀有」版！"
2001515-12 = "要是錯過這次機會，說不定就再也等不到了！！"
2001515-13 = "[s3]「你說的保護套是那個對吧？」\n[s4]「就是套在卡片外面，防止卡片刮傷的塑膠套。」"
2001515-16 = "沒錯！就是那個，看來你有做功課哦，老師！"
2001515-17 = "既然如此……就讓你見識一下我的保護套吧！"
2001515-18 = "[s]「你是說你的那個寶貝！？」"
2001515-19 = "嗯！張大眼睛看好了喔……鏘鏘！"
2001515-25 = "[ns]「為什麼……這個保護套看起來好像有點年代感呢？」"
2001515-26 = "嗯……因為這個……是我存了好久的零用錢之後，買下的第一個保護套。"
2001515-27 = "其實呢，我以前連卡片需要這種東西保護都不知道。"
2001515-28 = "當時我根本不懂卡片有多麼珍貴，一下用力捏卡片，一下又把卡片折來折去的……"
2001515-29 = "所以那些珍貴的卡片，經常三兩下就被我弄壞……"
2001515-30 = "我那時候只覺得反正卡片這種東西，重新再買一張就行了……"
2001515-31 = "當時的我真是犯了戰士的大忌呢……"
2001515-32 = "呃啊啊啊！？現在回想起來，真不知道那時候腦袋到底出了什麼問題！"
2001515-33 = "試著回想不成熟的過去，果然是件令人難為情的事啊，老師！"
2001515-34 = "[s5]「沒事沒事。」\n[s6]「人通常都是在這樣的過程中成長的。」"
2001515-37 = "可是我想要盡快成為一名成熟的淑女！"
2001515-38 = "嗯？操之過急反而會有反效果？#n我倒是沒想到這一點……"
2001515-39 = "你說這就跟玩卡牌戰鬥是一樣的？怎麼說呢？"
2001515-40 = "玩卡牌戰鬥的時候，是不是要很講究出牌的順序？#n是沒錯啦……"
2001515-41 = "啊……老師的意思是如果太早打出某些牌的話，反而會導致後續的牌不好出嗎？"
2001515-42 = "按部就班才是成為成熟淑女的捷徑……？"
2001515-43 = "嗯嗯……說不定真的是這樣呢，老師！"
2001515-44 = "不愧是老師，果然大人就是不一樣！#n等成為優雅又完美的淑女之後……我一定也能說出和老師一樣酷的話！"
2001515-45 = "[s]「嗯，我會拭目以待哦。」"
2001515-46 = "說回剛才保護套的話題……#n就連官方大賽的時候，也經常發生有選手沒帶保護套而無法參賽的事件喔。"
2001515-47 = "我一直非常期待的出道賽，也是這樣泡湯的……"
2001515-48 = "嗚嗚……本來還打算一出道就直接登上戰士的頂點的說……！"
2001515-49 = "[s]「原來沒有保護套就不能參加大賽啊，我完全不知道……」"
2001515-50 = "啊，那個嗎？其實是這樣的。#n只要使用不透明的保護套，就能將卡片的背面整個遮住了對吧？"
2001515-51 = "為了徹底防堵作弊，大賽才規定一定要使用保護套。"
2001515-52 = "這點你要記住喔，老師！#n卡片承載著戰士的夢想、靈魂、回憶和情感！"
2001515-53 = "因此不懂得珍惜卡片的人，就沒有資格擔任戰士！"
2001515-54 = "換句話說，卡片的保護套就像是戰士的盔甲一樣，是非常重要的東西！"
2001515-55 = "[s]「戰士的盔甲啊……這樣的形容的確很貼切！」"
2001515-56 = "啊，剛才那句是不是有點像老師會講的話？#n老師你覺得呢！？"
2001515-57 = "你說聽起來的確有點帥？"
2001515-58 = "耶，耶嘿嘿……謝，謝謝你，老師。#n能聽見老師這麼說，我很感動。"
2001515-59 = "[s]「話說回來，你這麼喜歡甲蟲皇后有什麼特別的原因嗎？」"
2001515-60 = "啊……這其實是很久以前的事了。"
2001515-61 = "現在突然要講起這件事，總覺得有點害羞呢……"
2001515-65 = "[ns]（聽楓這個年紀的少女講出『很久以前的事』，總覺得心情有點微妙……）"
2001515-66 = "不知道之前有沒有跟老師提過，其實我的老家在鄉下。"
2001515-67 = "那個，老師你也知道吧？#n鄉下能玩的東西很少，所以娛樂的選擇十分有限。"
2001515-69 = "不是在溪邊抓抓小龍蝦……就是在森林裡抓獨角仙……"
2001515-70 = "雖然那些遊戲也很好玩……而且如果和朋友們一起，也經常會玩到忘了時間沒錯！"
2001515-71 = "但在我心裡的某處……還是暗自期待著某種更有趣、更能讓人怦然心動的遊戲。"
2001515-73 = "就在那個時候……我和甲蟲皇后相遇了！"
2001515-75 = "真不敢相信！卡片上竟然畫著獨角仙和鍬形蟲！"
2001515-76 = "而且還不只這樣！居然還能拿這些卡片，和對手展開你來我往的廝殺！！！"
2001515-77 = "我一開始真的無法相信世界上竟然有這種事呢！"
2001515-78 = "該怎麼形容當時的感覺呢……"
2001515-79 = "對了！就是有種發現新大陸的感覺！"
2001515-80 = "[s]「這個形容還真誇張呢。」"
2001515-81 = "可是我真的這麼覺得呀？"
2001515-82 = "沒想到一個卡牌遊戲竟然有這麼棒的規則！簡直就像是另一種型式的鬼抓人！"
2001515-83 = "而且只要認真思考遊戲規則，就必定能找出獲勝的方法！"
2001515-84 = "除此之外，就算這次輸了，下次還是能夠繼續玩！"
2001515-85 = "就算換了一個對手，對方也依舊會遵守相同的規則！#n你不覺得遊戲這種東西真的很偉大嗎，老師？"
2001515-86 = "如果沒有甲蟲皇后的話，我可能永遠也不知道世界上有這麼好玩的東西！"
2001515-87 = "[s]「看來甲蟲皇后對你來說是個很重要的人生經歷呢。」"
2001515-88 = "嗯？是，是嗎？"
2001515-89 = "唔嗯，我也不是很清楚……#n不過聽老師這麼一說，好像真的有點這種感覺呢，耶嘿嘿。"
2001515-91 = "麻煩請下一位客人入場。"
2001515-92 = "啊！好像輪到我們了！快點進去吧，老師！"
2001515-94 = "（就這樣順利地在快閃店裡，買到了甲蟲皇后的限定版卡片保護套）"

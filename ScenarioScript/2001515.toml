[translation]
2001515-1 = "#title;최초의 추억"
2001515-2 = "#na;(카에데와 함께 무시퀸 팝업 스토어를 찾았다…….)"
2001515-3 = "#st;[0,0];instant;1;"
2001515-4 = "#clearST"
2001515-5 = "#wait;1500"
2001515-6 = "[ns1] \"이거, 줄이…….\"\n[ns2] \"여기서부터 한참은 기다려야겠는데……?\""
2001515-7 = "#wait;100"
2001515-8 = "#wait;100"
2001515-9 = "3;카에데;01\n#3;a\n#wait;1000"
2001515-10 = "3;카에데;00;응? 이 정도는 보통이라구, 선생님. 무시퀸 카드 프로텍터 한정판이잖아!\n#3;jump"
2001515-11 = "3;카에데;03;특히 이번에 발매된 건, 복각 가능성이 거의 없다던 초 슈퍼 울트라 레어 복각판이니까!"
2001515-12 = "3;카에데;11;이번을 놓치면 재복각 같은 건 없을 거라구?!\n#3;hophop"
2001515-13 = "[s3] \"카드 프로텍터라면, 그거지?\"\n[s4] \"카드를 보호하려고 씌우는 비닐 같은 거.\""
2001515-14 = "#wait;100"
2001515-15 = "#wait;100"
2001515-16 = "3;카에데;03;맞아! 바로 그거야. 잘 알고 있네, 선생님!\n#3;em;[음표]"
2001515-17 = "3;카에데;01;이렇게 된 거…… 선생님한테 내 보물 프로텍터를 보여 줄게!"
2001515-18 = "[s] \"카에데의 보물!?\""
2001515-19 = "3;카에데;00;응! 기대하시라…… 쨔잔!\n#3;em;[!]\n#3;jump"
2001515-20 = "#st;[0,0];instant;1;"
2001515-21 = "#clearST"
2001515-22 = "3;카에데;03\n#3;greeting\n#wait;1500"
2001515-23 = "3;카에데;03\n#3;m5\n#wait;1500"
2001515-24 = "#wait;2500"
2001515-25 = "[ns] \"뭔가…… 세월 같은 것이 느껴지는? 프로텍터네?\""
2001515-26 = "3;카에데;01;응…… 이건 내가…… 용돈을 모으고 모아서 샀던, 첫 프로텍터거든."
2001515-27 = "3;카에데;02;예전에는 말이야. 이런 게 필요하다는 사실도 모르고 있었어."
2001515-28 = "3;카에데;01;그때의 나는 카드 중요한 줄도 모르고, 카드를 세게 쥐거나 구기거나 해서."
2001515-29 = "3;카에데;05;소중한 카드들을 금방 못 쓰게 만들기도 했었거든……."
2001515-30 = "3;카에데;99;그 때는 그냥, 카드라면 다시 사면 그만인 것 아니냐고 생각하곤 했지만…….\n#3;em;…"
2001515-31 = "3;카에데;13;그야말로, 배틀리스트로서는 실격이라고도 말할 수 있었을 때였지……."
2001515-32 = "3;카에데;14;으아아앙?! 다시 생각해 보니 무슨 정신으로 그랬는지 모르겠어!\n#3;m3\n#3;hophop"
2001515-33 = "3;카에데;14;역시 미숙한 과거를 떠올리는 것은 부끄러운 일인가 봐, 선생님!"
2001515-34 = "[s5] \"괜찮아, 괜찮아.\" \n[s6] \"보통 다 그러면서 크는 거야.\""
2001515-35 = "#wait;100"
2001515-36 = "#wait;100"
2001515-37 = "3;카에데;15;그치만 나는 지금 당장 다 자라고 싶은걸!\n#3;jump"
2001515-38 = "3;카에데;04;어? 너무 서두르면 오히려 늦어질 수도 있다고? 그렇게는 생각하지 못했는데…….\n#3;em;[?]"
2001515-39 = "3;카에데;02;그거야말로 카드 배틀과 비슷한 거라고? 무슨 말이야?"
2001515-40 = "3;카에데;01;카드 배틀에는 카드를 내는 순서가 있지 않냐고? 그건 그렇지……?"
2001515-41 = "3;카에데;04;아…… 그걸 억지로 앞당기려고 하면, 오히려 손 패가 꼬이거나 하는 것 같은 거라고?"
2001515-42 = "3;카에데;02;그러니까 순서를 기다리는 것이 멋진 레이디가 되는 지름길일 수도 있다……?"
2001515-43 = "3;카에데;99;으으음……. 그럴지도 모르겠네, 선생님!\n#3;stiff"
2001515-44 = "3;카에데;03;역시 선생님이야. 어른이네! 나도 꼭 멋지고 완벽한 레이디가 돼서…… 선생님같이 멋진 말을 할 수 있게 될 테니까!\n#3;em;[음표]"
2001515-45 = "[s] \"그래. 기대할게.\""
2001515-46 = "3;카에데;02;아무튼 말이지. 프로텍터를 씌우지 않으면, 공식 대회에는 나갈 수 없는 경우도 많다고 하더라?"
2001515-47 = "3;카에데;13;그렇게, 내가 꿈꾸고 있었던 첫 데뷔는 물거품이 되었었지……."
2001515-48 = "3;카에데;13;우우…… 화려하게, 데뷔하자마자 배틀리스트의 정점을 찍어 주고 싶었는데……!\n#3;stiff\n#3;em;[속상함]"
2001515-49 = "[s] \"프로텍터 없이는 대회에 못 나간다니, 전혀 몰랐어.\""
2001515-50 = "3;카에데;02;아, 그거? 그러니까 이런 거야. 뒷면이 가려진 불투명 프로텍터를 사용하면, 카드 뒷면을 전부 가릴 수 있을 거 아냐?\n#3;em;[반응]"
2001515-51 = "3;카에데;01;그러면 부정행위를 원천적으로 방지할 수 있으니까, 대회에서는 거의 무조건 프로텍터를 씌우게 되어 있어."
2001515-52 = "3;카에데;00;알아 둬, 선생님! 카드에는 배틀리스트의 꿈과 혼, 그리고 추억과 마음이 담겨 있다는걸!\n#3;jump\n#3;em;[!]"
2001515-53 = "3;카에데;05;카드를 소중히 하지 않는 자에게는, 배틀리스트의 자격이 없어!"
2001515-54 = "3;카에데;03;따라서 카드 프로텍터는, 배틀리스트의 갑옷이라고도 볼 수 있는, 그만큼 중요한 물건인 거지!"
2001515-55 = "[s] \"배틀리스트의 갑옷이라. 그 표현은 확실히……!\""
2001515-56 = "3;카에데;00;아, 지금은 조금 선생님처럼 멋진 말을 했던 걸까? 어떻게 생각해, 선생님?!"
2001515-57 = "3;카에데;02;확실히 그랬을지도 모른다고?"
2001515-58 = "3;카에데;03;에, 에헤헷……. 그, 고마워. 선생님. 그렇게 말해 줘서.\n#3;em;[///]"
2001515-59 = "[s] \"그런데, 그렇게까지 무시퀸을 좋아하는 이유가 있는 거야?\""
2001515-60 = "3;카에데;02;아…… 그건 조금 옛날이야기가 될 것 같네."
2001515-61 = "3;카에데;13;막상 꺼내려니까 조금 부끄럽기도 하고……."
2001515-62 = "#st;[0,0];instant;1;"
2001515-63 = "#clearST"
2001515-64 = "#wait;1000"
2001515-65 = "[ns] (카에데 정도의 나이에 '옛날이야기'라니, 뭔가 기분이 묘하네…….)"
2001515-66 = "3;카에데;13;알고 있을지 모르겠지만, 난 시골 출신이었거든.\n#3;em;…"
2001515-67 = "3;카에데;13;그, 선생님도 알잖아? 시골에서는 보통 놀 게 많이 없어서, 할 수 있는 놀이가 한정되어 있었어.\n#3;stiff"
2001515-68 = "#all;hide"
2001515-69 = "#na;카에데;냇가에서 가재를 잡거나……. 숲에서 장수풍뎅이를 잡거나……."
2001515-70 = "#na;카에데;물론 그것도 무척 재미있었지만! 친구들과 함께 놀면 시간 가는 줄도 몰랐지만!"
2001515-71 = "#na;카에데;그래도 마음속 어딘가에서는……. 뭔가, 더 재미있고 가슴 뛰는 게 있지 않을까, 기대하기도 했거든."
2001515-72 = "#all;hide"
2001515-73 = "#na;카에데;그런데 그때…… 나는! 무시퀸과 만난 거야!"
2001515-74 = "3;카에데;03\n#3;a"
2001515-75 = "3;카에데;03;세상에 이런 일이! 카드에 장수풍뎅이랑 사슴벌레가 그려져 있더라고!\n#3;jump\n#3;m2"
2001515-76 = "3;카에데;11;그것도 모자라서! 그걸로 턴을 왔다 갔다 하면서 승부를 낼 수도 있더라고!!!\n#3;m4"
2001515-77 = "3;카에데;11;처음에는 말이지? 이게 말이 되냐고 생각했어!\n#3;m3\n#3;hophop"
2001515-78 = "3;카에데;11;그때의 느낌을 비유하자면, 어떻게 나타낼 수 있을까……."
2001515-79 = "3;카에데;11;그래, 맞아! 신대륙을 발견한 느낌이었어!\n#3;jump\n#3;em;[!]"
2001515-80 = "[s] \"엄청난 비유네.\""
2001515-81 = "3;카에데;03;그렇지만, 그렇잖아?"
2001515-82 = "3;카에데;00;노는 데에, 이렇게 잘 짜인 규칙이 있다는 거야! 술래잡기와는 또 다른 방식으로!"
2001515-83 = "3;카에데;00;그리고 그 규칙을 곰곰이 생각하다 보면, 이기는 법이 나온다는 거고!\n#3;jump"
2001515-84 = "3;카에데;03;그것도 모자라서, 이번에는 지더라도 다음에 또 놀 수도 있고!"
2001515-85 = "3;카에데;11;심지어 상대가 바뀌더라도, 그 상대 역시 같은 규칙을 지킬 거라는 거지! 게임이란 건 정말 대단하지 않아, 선생님?\n#3;em;[재잘]\n#3;hophop"
2001515-86 = "3;카에데;11;무시퀸이 없었다면, 나는 세상엔 이런 놀이가 있었다는 걸 영원히 몰랐을지도 몰라!"
2001515-87 = "[s] \"무시퀸은, 카에데의 거대한 인생 경험이었구나.\""
2001515-88 = "3;카에데;10;어? 그, 그런가?\n#3;stiff"
2001515-89 = "3;카에데;03;으음, 나는 잘 모르겠지만……. 선생님이 그렇게 표현하니까 그런 것 같다는 생각이 들기도 하네. 에헤헷.\n#3;em;[///]"
2001515-90 = "#all;hide"
2001515-91 = "#na;팝업 스토어 직원;다음번 손님 입장해 주십시오."
2001515-92 = "3;카에데;03;아! 우리 순서가 된 모양이야! 빨리 들어가자, 선생님!\n#3;jump"
2001515-93 = "#all;hide"
2001515-94 = "#na;(그렇게, 팝업 스토어에서 무사히 무시퀸 카드 프로텍터 한정판을 구입했다.)"

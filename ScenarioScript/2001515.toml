[translation]
2001515-1 = "The First Memory"
2001515-2 = "Kaede and I made our way to the Mushiqueen pop-up shop together."
2001515-6 = "[ns1] \"Wow. Look at that line.\"\n[ns2] \"Looks like we're in for a long wait.\""
2001515-10 = "Really? I think this is pretty much expected, Sensei! After all, this is the limited-edition Mushiqueen card protector we're talking about!"
2001515-11 = "To make it even better, it's a rerun of THE super, ultra-rare edition that no one ever thought would be available, ever again!"
2001515-12 = "If you miss this chance, it's over! It'll never, ever be on sale again!"
2001515-13 = "[s3] \"Is a card protector what I'm thinking of?\" \n[s4] \"It's a little plastic cover you put on your cards, right?\""
2001515-16 = "Correct! You're exactly right, Sensei!"
2001515-17 = "Since it's a special occasion... I'll show you my treasure, Sensei!"
2001515-18 = "[s] \"Your treasure?!\""
2001515-19 = "Yes! Don't get too excited! Ta-da!"
2001515-25 = "[ns] \"This card protector... It radiates old age...\""
2001515-26 = "You see...this is the first card protector I ever bought. I saved up all my pocket money so I could buy it."
2001515-27 = "When I was but a novice battler, I didn't even know I would need something like this."
2001515-28 = "It was before I realized just how truly precious a single card is, so I would grab my cards with all my might and crumple them!"
2001515-29 = "Before I knew it, I had ruined these irreplaceable treasures."
2001515-30 = "I naively believed I could just...buy them again!"
2001515-31 = "It wasn't my proudest moment as a battler..."
2001515-32 = "Gaaah! The more I think about it, the more I can't comprehend what I was thinking!"
2001515-33 = "I'm cringing recalling my shameful past, Sensei!"
2001515-34 = "[s5] \"Don't worry. It's really okay!\" \n[s6] \"That's a normal feeling of growing up.\""
2001515-37 = "I don't want to \"be\" growing up! I just want to be grown already!"
2001515-38 = "...Huh? Impatience is the enemy of progress? Hm... What an interesting perspective."
2001515-39 = "...What do you mean it's like a card battle? How can that be?"
2001515-40 = "You're correct, there's an optimal order you should play your cards. But what does that have to...?"
2001515-41 = "It's similar to how I'll ruin my strategy if I'm impatient and try to force my hand?"
2001515-42 = "So... The best way to become a proper lady is to wait patiently for the right turn?"
2001515-43 = "Hm... You may be on to something!"
2001515-44 = "You never fail to impress! I guess it's because you're an adult. I'll just have to wait my turn to become a proper lady...and I'll be able to say cool things too, just like Sensei!"
2001515-45 = "[s] \"Okay. I'll wait as long as you need.\""
2001515-46 = "Okay, back to business. A lot of tournaments bar participants from battling without card protectors!"
2001515-47 = "Because of this, the battler debut I so fervently dreamed of amounted to absolutely nothing."
2001515-48 = "Waaah! I was supposed to debut in a blaze of battler glory!"
2001515-49 = "[s] \"I had no idea they wouldn't let you battle without card protectors!\""
2001515-50 = "Ah, think about it, Sensei! If you use a card protector with an opaque back, then you can cover the back of your card!"
2001515-51 = "That can help prevent cheating from happening in the first place, so card sleeves are required for almost every tournament."
2001515-52 = "Never forget, Sensei! Cards are the very soul of a battler! They hold our memories and dreams, and our hearts!"
2001515-53 = "If someone doesn't treat their cards with the utmost care, why, they can't even call themselves a battler!"
2001515-54 = "And that's why card protectors are so important! They're a battler's armor!"
2001515-55 = "[s] \"A battler's armor. What an expression!\""
2001515-56 = "Ah! Did I manage to say something cool? Just like you, Sensei? Right?!"
2001515-57 = "...You think so?"
2001515-58 = "Heehee... Th-Thank you, Sensei. To hear those words..."
2001515-59 = "[s] \"So, why is it you love Mushiqueen so passionately?\""
2001515-60 = "Ah... That's actually an old story..."
2001515-61 = "It's a little bit embarrassing, truth be told..."
2001515-65 = "[ns] \"(The dissonance of someone Kaede's age saying \"old story\"...)\""
2001515-66 = "I don't know if you know this, Sensei, but I'm actually from the countryside."
2001515-67 = "I might be stating the obvious, but there's not much to do out in the fields! Definitely not a whole lot of stuff to play with..."
2001515-69 = "I would catch crawfish by the river...or herculean beetles in the forest..."
2001515-70 = "Ah! It was still super fun! Time flew whenever I was playing with my friends!"
2001515-71 = "It was just... There was a longing deep in my heart. For something more thrilling! Even more exciting!"
2001515-73 = "But then... I! Met! Mushiqueen!"
2001515-75 = "It blew my mind! These cards had pictures of herculean beetles! And stag beetles!"
2001515-76 = "To top it all off, it was a game where players took turns back and forth to emerge victorious in an intense battle!!"
2001515-77 = "Right, so, at first... I mean, I couldn't help but think, \"How can this be possible?\""
2001515-78 = "How can I begin to put that feeling into words...?"
2001515-79 = "I got it! It was like discovering an entirely new continent!"
2001515-80 = "[s] \"What an incredible analogy...\""
2001515-81 = "If that's how it was, that's how it was, right?"
2001515-82 = "To think there could be carefully thought-out rules to playing... It was nothing like the methodology to playing tag!"
2001515-83 = "If you meticulously understand all the rules, you can figure out how to win!"
2001515-84 = "To make it even better, even if you do lose, you can always play again next time!"
2001515-85 = "And no matter who your opponent is, we all play with the same exact rules! Aren't games like amazing?"
2001515-86 = "Without Mushiqueen... I might not have even known these these kinds of games could exist!"
2001515-87 = "[s] \"Discovering Mushiqueen was a defining moment in your life, wasn't it, Kaede?\""
2001515-88 = "H-Huh? You think so...?"
2001515-89 = "I don't really know what that means... But if Sensei says so, then it must make sense! Heeheehee."
2001515-91 = "Next customer! Welcome in!"
2001515-92 = "Ah! It's our turn, Sensei! Let's go!"
2001515-94 = "And so, Kaede was one of the lucky Mushiqueen fans to get their hands on the limited-edition card protector from the pop-up shop."

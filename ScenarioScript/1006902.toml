[translation]
1006902-1 = "儘管吃吧！"
1006902-2 = "夏萊．辦公室"
1006902-4 = "──所以，由玄武商會多次委託夏萊的話……#n會有點不太得體。"
1006902-5 = "因此這次希望能以「個人請求」的形式請老師幫忙。"
1006902-6 = "不好意思，老師。#n明明是我有求於你，卻還讓你為了配合我們增加不必要的麻煩。"
1006902-7 = "[s]「沒關係，不用在意。」"
1006902-9 = "[ns]「發生什麼事了嗎？」"
1006902-10 = "平時使用的調味料的流通管道出現了一些可疑之處。#n經過調查發現──"
1006902-11 = "──事情跟黑市有關。"
1006902-12 = "如果是山海經內部的問題，只靠我們也有辦法解決……"
1006902-13 = "不過既然牽扯到了黑市……#n我想向夏萊求助才是上策。"
1006902-14 = "[s1]「說的也是，畢竟1個人也很危險……」\n[s2]「謝謝你來找我商量，這種事就交給我吧。」"
1006902-17 = "謝謝你，老師。#n還有，很抱歉又是我們這邊的問題……這件事希望老師能盡～早解決。"
1006902-18 = "那個……調味料的存量只剩下一個月了。"
1006902-27 = "站在委託人的立場好像不該說這種話，不過老師，你的身體還好嗎？#n看你好像一直都很忙……"
1006902-28 = "就連面談的時間也是好不容易才調整出來……"
1006902-29 = "[s3]「很想為大家盡更多心力……」\n[s4]「卻總是不盡如人意……」"
1006902-32 = "有什麼我能幫得上忙的事嗎？"
1006902-33 = "[s]「你願意這麼說我就很高興了哦。」"
1006902-34 = "聽老師這麼說，總覺得有點寂寞呢。"
1006902-35 = "我也想幫上老師的忙啊……"
1006902-36 = "……老師，吃過午餐了嗎？#n都這個時間了，應該已經吃了吧？"
1006902-37 = "[s5]「因為沒有慢慢吃飯的時間……」\n[s6]「想說晚上再一起補回來就好。」"
1006902-42 = "……老師，你剛才說什麼？"
1006902-43 = "[s7]「那個……瑠美，同學？」\n[s8]「你，你怎麼突然……？」"
1006902-46 = "真是的！"
1006902-47 = "有句話說醫食同源不是嗎？#n不好好吃飯怎麼行呢！就由我來讓老師變健康吧！"
1006902-48 = "[s]「可，可以嗎……？」"
1006902-49 = "這樣下去不行。我來幫你做飯！"
1006902-51 = "（說完，瑠美就離開了辦公室）"
1006902-55 = "夏萊．休息室"
1006902-57 = "[ns] 以防萬一，跟著瑠美過來"
1006902-58 = "我看看……洋蔥……應該還行。#n雖然有點發芽，不過把芯切掉的話還可以吃。"
1006902-59 = "老師……這個馬鈴薯買來的時候就是這種顏色嗎？#n這……實在是沒辦法吃了。"
1006902-60 = "哦，還有麵包啊？沒有發黴，不過居然乾成這樣……#n拿來做成麵包粉？"
1006902-61 = "我看看，冰箱裡有什麼呢。#n嗚哇……肉都凍壞了呢。"
1006902-62 = "而且醬油跟料理酒都過期了，反而讓人佩服……#n啊，我沒有嫌棄的意思。與其說驚訝不如說是有趣。"
1006902-63 = "[s9]「放，放過我吧……」\n[s10]「這是公開處刑……」"
1006902-66 = "好，這樣應該有辦法。"
1006902-67 = "[s]「真的嗎！？」"
1006902-68 = "可別小看玄武商會哦，老師。#n雖然……確實有點困難，不過也得試著挑戰才行。"
1006902-69 = "老師就休息一下吧。#n我會使出看家本領的。"
1006902-79 = "[ns]「真是驚人……」"
1006902-80 = "怎麼樣呢？#n食材剩下來也沒用，所以我把剩下的食材全都用光了。"
1006902-81 = "想再吃也還有，盡管吃吧。"
1006902-86 = "[ns]「我，我要開動了！」"
1006902-91 = "（瑠美的料理……美味到令人震驚）"
1006902-92 = "（讓人難以相信是用冰箱裡剩下的食材做的……）"
1006902-93 = "啊哈哈。#n看老師吃得這麼津津有味的樣子，我的努力也沒有白費了。"
1006902-94 = "用常見的食材做出美味的料理是我的料理原則。"
1006902-95 = "調查什麼樣的料理能讓客人覺得好吃、#n要如何料理才能擴大事業版圖，我總是在煩惱著這些。"
1006902-96 = "當然，還要講究料理的口味和擺盤、店裡的裝潢，也要能獲利。#n有問題的話就加以改善。"
1006902-97 = "為了客人，為了玄武商會的大家……必須得繼續經營才行。"
1006902-98 = "[s]「可是……那個，量是不是有點太多了？」"
1006902-99 = "你在說什麼！從老師的狀態來看，不吃飯也不是一次兩次了吧！#n我在的這段期間一定會讓你好好吃飯的！"
1006902-100 = "沒有健康可是萬萬不能的哦！"
1006902-101 = "儘管吃吧！#n啊，對了，要不要順便幫你做晚餐？"
1006902-102 = "老師的筷子停下來了呢……呵呵。#n莫非，是想要我餵你吃嗎？"
1006902-103 = "[s]「再，再吃下去的話，肚子就要……！」"
1006902-105 = "（之後一路吃到肚子幾乎快被撐破……）"

1006902-90 = "#wait;1000"
1006902-91 = "#na;(루미의 요리는…… 놀랍게도 엄청나게 맛있었다.)\n#bgshake"
1006902-92 = "#na;(그 냉장고에서 탄생했다고는, 절대로 믿기지 않을 만큼……)"
1006902-93 = "3;루미;03;하하하. 선생님이 맛있게 먹는 모습을 보니, 내가 다 흐뭇하네.\n#3;a\n#3;em;[재잘]"
1006902-94 = "3;루미;01;뭐, 내 요리 방침은, 보통의 식재료로 평균 이상의 맛을 가능한 한 많이 차려내자는 거니까."
1006902-95 = "3;루미;99;어떤 요리가 히트할지, 어떤 요리법을 사용해야 사업이 더 확장될 수 있을지."
1006902-96 = "3;루미;00;그리고 그 요리의 맛이나 분위기, 매출 같은 요소들을 파악하면서 문제점을 개선하는 것.\n#3;em;[음표]"
1006902-97 = "3;루미;07;음식 장사를 할 때의 핵심이지. 현무상회의 운영 방식이기도 하고."
1006902-98 = "[s] \"그런데…… 좀……. 너무 많이 차린 것 같은데……?\""
1006902-99 = "3;루미;02;무슨 소리야! 중책을 맡고 있는 샬레의 선생님이면 더 팍팍 먹어야지!\n#3;em;[!]\n#3;jump"
1006902-100 = "3;루미;05;이 팔이랑 다리 좀 봐! 뼈와 가죽만 남았네!\n#3;closeup"
1006902-101 = "3;루미;03;자, 더 먹어! 점심도 굶었다며? 아침도 거른 거 아니지?\n#3;closeup\n#3;em;[?]"
1006902-102 = "3;루미;07;하는 김에 저녁까지 차려 줄까?\n#3;closeup\n#3;em;[반짝]"
1006902-103 = "[s] \"사, 살려주세요!\""
1006902-104 = "#all;hide"
1006902-105 = "#na;(그 뒤로, 정말 배가 터질 만큼 음식을 대접받았다……)"

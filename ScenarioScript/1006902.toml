1006902-42 = "3;루미;05;……뭐라고?\n#3;closeup\n#fontsize;80\n#bgshake"
1006902-43 = "[s7] \"어…… 루미 씨……?\"\n[s8] \"가, 갑자기 왜 그래……? 무섭게……\""
1006902-44 = "#wait;100"
1006902-45 = "#wait;100"
1006902-46 = "3;루미;05;갈!\n#3;closeup\n#fontsize;80"
1006902-47 = "3;루미;02;자고로 밥을 거른다는 것은! 이 루미 앞에서만큼은 절대 있을 수 없는 일이니!!\n#3;closeup\n#3;em;[!]"
1006902-48 = "[s] \"그, 그런 거야?!\""
1006902-49 = "3;루미;99;안 되겠어. 선생님이 밥을 준비할 시간이 없다면, 내가 준비하지!\n#3;closeup"

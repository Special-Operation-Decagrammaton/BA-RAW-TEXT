1006902-27 = "3;루미;02;그런데, 확실히 업무 과다인 것 같긴 하네. 선생님.\n#3;a\n#3;em;[반응]"
1006902-28 = "3;루미;99;학생 면담 시간도 간신히 만들 수 있는 정도인 것 같고 말이야."
1006902-29 = "[s3] \"후우…… 분명 모든 학생에게 열려 있는 샬레를 기획했는데 말이야……\"\n[s4] \"세상일…… 뜻대로 되지 않는 법이더라……\""
1006902-30 = "#wait;100"
1006902-31 = "#wait;100"
1006902-32 = "3;루미;01;내가 도와줄 수 있는 일 같은 거, 있을까?\n#3;em;[?]"
1006902-33 = "[s] \"후후후. 선생은 학생이 믿고 찾아와 주는 것만으로도 힘을 얻는단다.\""
1006902-34 = "3;루미;00;없다는 말을 그렇게까지 돌려 말할 필요는 없어. 선생님."
1006902-35 = "3;루미;99;아무튼 그런 건가. 아쉬운걸. 뭔가 해 줄 수 있는 일이 있었으면 하는데.\n#3;em;[...]"
1006902-36 = "3;루미;03;그런데 점심은 먹었어? 하긴, 시간도 벌써 이렇게 되었는데, 먹었겠지?"
1006902-37 = "[s5] \"음~ 그게 말이지. 배도 그렇게 고프지 않았고.\"\n[s6] \"요리를 하거나 주문할 시간도 없어서, 그냥 넘어갔어.\""
1006902-38 = "#wait;100"
1006902-39 = "#wait;100"

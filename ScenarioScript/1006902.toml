[translation]
1006902-1 = "Eating Hearty"
1006902-2 = "Schale Executive Office"
1006902-4 = "...You see, it would be...less than ideal...for Shanhaijing if Black Tortoise Promenade made an official request to Schale."
1006902-5 = "That's why I asked for a student counseling session. So I could ask for your 'personal' help."
1006902-6 = "Sorry, Sensei. I do hope I haven't made trouble for you..."
1006902-7 = "[s] \"It's no trouble at all.\""
1006902-9 = "[ns] \"How can I help Black Tortoise Promenade?\""
1006902-10 = "We've had some issues getting ingredients for our special sauce. I looked into it myself, and..."
1006902-11 = "Apparently the Black Market is involved."
1006902-12 = "If this was purely a Shanhaijing problem, we could have handled it ourselves."
1006902-13 = "But since we're dealing with the Black Market, it's a bit out of our jurisdiction... That's why we need Schale's help."
1006902-14 = "[s1] \"Hmm. You're not wrong. Okay, I'll take this on.\"\n[s2] \"Since it's a request from you, Rumi, I'll do my best.\""
1006902-17 = "Thank you, Sensei. Now, I know I'm already asking a lot, but I'd appreciate it if you could hurry."
1006902-18 = "We only have about a month's supply of sauce left..."
1006902-27 = "But... Sensei, you have a lot on your plate already, don't you?"
1006902-28 = "It was hard enough to fit this student counseling session in your schedule."
1006902-29 = "[s3] \"I try to make time for all of my students. I really do...\"\n[s4] \"There's a lot of demand for my time these days...\""
1006902-32 = "Is there some way I can help you?"
1006902-33 = "[s] \"Just knowing you trust me with your problems is enough for me!\""
1006902-34 = "In other words, you don't think there's anything I can do..."
1006902-35 = "Well, that's terribly disappointing. There must be something I could do..."
1006902-36 = "Oh, have you had lunch? Surely you have by now, right?"
1006902-37 = "[s5] \"Oh... I wasn't hungry today, so no.\"\n[s6] \"I didn't have time to cook or order anything today.\""
1006902-42 = "...You're joking."
1006902-43 = "[s7] \"Um... Rumi...?\"\n[s8] \"Uh... The mood suddenly changed in here...\""
1006902-46 = "Shush!"
1006902-47 = "For your information! Skipping a meal! Is something I will ABSOLUTELY not allow!"
1006902-48 = "[s] \"Ah... Is that so...?\""
1006902-49 = "That settles it. If you won't feed yourself, Sensei, then I will!"
1006902-51 = "Rumi rolled up her sleeves and marched to the Schale Lounge."
1006902-55 = "Schale Lounge"
1006902-57 = "[ns] Follow Rumi, just in case."
1006902-58 = "Let's see here... Onions! They're sprouting and a tad squishy, but I should be able to carve out some edible pieces."
1006902-59 = "These potatoes... How on earth did you get them to green when they were stored in the fridge...?"
1006902-60 = "Oh, and this bread... It's not moldy, but it's hard as a rock. Hmm... Maybe if a crush it to add a breaded texture...?"
1006902-61 = "And in the freezer, you've got...freezer-burned meat. You could knock someone out with this."
1006902-62 = "Even your sake and soy sauce are about to expire. I've actually never seen sake expire before..."
1006902-63 = "[s9] \"Please... No more...\"\n[s10] \"Are you enjoying making fun of your teacher?\""
1006902-66 = "Good. I've got everything I need. "
1006902-67 = "[s] \"Really?!\""
1006902-68 = "Don't underestimate the Black Tortoise Promenade, Sensei. Your pantry here is giving me some...challenges...but that just makes it more interesting."
1006902-69 = "Please give me 30 minutes. I'll have a delicious lunch ready for you soon."
1006902-79 = "[ns] \"I can't believe it...\""
1006902-80 = "What do you think? I emptied out your fridge while I was at it."
1006902-81 = "I made plenty, so help yourself."
1006902-86 = "[ns] \"Th-Thank you for the meal!!\""
1006902-91 = "Rumi's cooking was surprisingly good. Amazingly good!"
1006902-92 = "It was hard to believe she made this from the things in my fridge..."
1006902-93 = "It wasn't easy, but seeing you enjoy a good meal is worth it."
1006902-94 = "When I cook, I try to make as much food as I can, with as much extraordinary flavor as I can, with ordinary ingredients."
1006902-95 = "With each new recipe, I ask myself, \"Will this be a hit? Will this grow the business?\""
1006902-96 = "It's all a matter of identifying problems in each dish, in terms of flavor, impression, and even cost."
1006902-97 = "That's what it takes to run a restaurant, so that's how Black Tortoise Promenade operates."
1006902-98 = "[s] \"That's great, but didn't you make too much...?\""
1006902-99 = "What are you talking about? Do you know how much we all depend on you? You've got to eat your fill!"
1006902-100 = "Look at you! You're all skin and bones!"
1006902-101 = "On that note, here, have some more! You skipped lunch, right? I bet you also skipped breakfast!"
1006902-102 = "I'd better make you dinner, too, just to be safe!"
1006902-103 = "[s] \"H-Help me!\""
1006902-105 = "She fed me so much, I felt like my stomach was about to burst..."

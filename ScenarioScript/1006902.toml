1006902-57 = "[ns] (혹시나 해서 루미를 따라왔다.)"
1006902-58 = "3;루미;00;어디 보자…… 양파는…… 아슬아슬하네. 좋아. 싹이 좀 텄고 물렁물렁해진 부분도 있지만 잘 도려내고 다듬으면 먹을 수는 있겠어.\n#3;a"
1006902-59 = "3;루미;02;여기 감자, 원래부터 녹색이었던 건 아니지? 뭘 어떻게 보관하면 냉장고에서 엽록소가 생기는 거야……\n#3;m2\n#3;hophop"
1006902-60 = "3;루미;01;식빵도 있네? 곰팡이가 피지 않은 대신, 수분이 한 방울도 남아 있지 않은 빵이지만. 아니야. 오히려 그 점을 살려서, 잘게 부숴 튀김가루 대신 사용할 수도……?\n#3;m3"
1006902-61 = "3;루미;06;냉동고도 좀 보자. 고기란 걸 준비해 놓기는 했구나, 선생님? 얼린 지 너무 오래돼서 둔기 대신으로 쓸 수 있을 것 같기도 하지만.\n#3;m4"
1006902-62 = "3;루미;99;……맛술과 간장을 유통기한이 다 될 때까지 보관하는 사람은 오랜만이야. 선생님. 아니, 별다른 뜻은 없어. 신선한 경험이라는 의미니까.\n#3;greeting"
1006902-63 = "[s9] \"이제…… 그만……\"\n[s10] \"공개 처형식인 건가…… 그런 건가……\""
1006902-64 = "#wait;100"
1006902-65 = "#wait;100"
1006902-66 = "3;루미;00;좋아. 이 정도면 어떻게든 되겠네. \n#3;m3"
1006902-67 = "[s] \"정말이야?!\""
1006902-68 = "3;루미;99;현무상회를 얕보지 말라고, 선생님. 조금…… 여러 가지…… 난제가…… 있겠지만, 도전이라고 생각하면 못 할 것도 아니지.\n#3;em;[...]"
1006902-69 = "3;루미;07;30분 정도만 기다리고 있어. 멋진 식사를 준비할 테니까.\n#3;em;[반짝]"

[translation]
1006902-1 = "กินเยอะๆ แล้วฮึดเข้าไว้!"
1006902-2 = "สำนักงานชาเล่ต์"
1006902-4 = "คือว่า... หากย่านการค้าเทพเต่าดำขอความช่วยเหลือจากชาเล่ต์อย่างเป็นทางการ... มันอาจดูไม่ดี#nสำหรับซานไห่จิงเท่าไร"
1006902-5 = "เพราะงั้นฉันเลยมาขอความช่วยเหลือจากคุณครู 'แบบส่วนตัว' เหมือนนักเรียนทั่วไปที่มาขอคำปรึกษา#nน่ะ"
1006902-6 = "ขอโทษนะคุณครู เรื่องมันก็ยุ่งยากอยู่แล้ว แต่ฉันกลับทำให้มันยุ่งยากขึ้นไปอีก"
1006902-7 = "[s] \"ไม่ต้องคิดมากหรอก\""
1006902-9 = "[ns] \"ว่าแต่ย่านการค้าเทพเต่าดำมีอะไรให้ครูช่วยงั้นเหรอ?\""
1006902-10 = "อ่า มันไม่ใช่เรื่องใหญ่อะไรหรอก พอดีมีปัญหาเรื่องส่งวัตถุดิบทำซอสนิดหน่อยน่ะ ฉันก็เลยตามสืบ#nเองมาแล้ว"
1006902-11 = "แต่ก็ไปเจอว่ามันดันไปเกี่ยวข้องกับฝั่งตลาดมืดเข้าน่ะ"
1006902-12 = "ถ้าเป็นปัญหาภายในของซานไห่จิง ทางนี้ก็คงจะหาทางแก้ปัญหากันเองแล้ว"
1006902-13 = "แต่ถ้ามันเกี่ยวข้องกับเขตนอกกฎหมายอย่างตลาดมืดละก็... พวกเราก็ควรให้ทางชาเล่ต์ช่วยจัดการ#nน่าจะเหมาะสมกว่า"
1006902-14 = "[s1] \"ตามหลักแล้วก็ควรเป็นแบบนั้นแหละนะ...\"\n[s2] \"เข้าใจละ รูมิมาขอความช่วยเหลือทั้งที ครูจะหาทางจัดการดูนะ\""
1006902-17 = "จริงหรือเปล่า? ขอบคุณนะคุณครู ฉันรู้ว่าฉันรบกวนคุณครูเยอะแล้ว แต่... ถ้าช่วยเร่งมือให้หน่อยก็จะ#nขอบคุณมากเลยละ"
1006902-18 = "ตอนนี้เราเหลือวัตถุดิบสำรองเอาไว้สำหรับทำซอสแค่เดือนเดียวแล้วน่ะ..."
1006902-27 = "ว่าแต่ว่าคุณครูเองก็เหมือนจะมีงานล้นมืออยู่ใช่มั้ยล่ะ?"
1006902-28 = "เพราะงั้นถึงใช้เวลานานมากกว่าจะหาเวลามาให้คำปรึกษากับนักเรียนได้น่ะ"
1006902-29 = "[s3] \"เฮ้อ ครูก็พยายามหาเวลาให้นักเรียนทุกคนนะ\"\n[s4] \"โลกมันโหดร้าย... ไม่เป็นไปตามที่เราต้องการหรอก...\""
1006902-32 = "มีงานอะไรที่ฉันพอจะช่วยได้บ้างหรือเปล่าล่ะ?"
1006902-33 = "[s] \"ฮุฮุฮุ แค่นักเรียนมาหาด้วยความเชื่อใจก็เหมือนได้รับพลังแล้วละ\""
1006902-34 = "พูดสั้นๆ ก็คือ ไม่มีอะไรให้ช่วยสินะ พูดง่ายๆ ก็ได้ไม่เห็นต้องพูดอ้อมค้อมเลย"
1006902-35 = "น่าเสียดายจัง อุตส่าห์หวังว่าจะมีเรื่องที่ฉันพอช่วยได้บ้างซะอีก"
1006902-36 = "แล้วนี่กินมื้อเที่ยงแล้วหรือยังล่ะ? อันที่จริงมันก็เลยเที่ยงมานานแล้ว คุณครูคงกินข้าวแล้วแหละเนอะ?"
1006902-37 = "[s5] \"อืม... อันที่จริงครูไม่ค่อยหิวเท่าไรน่ะ\"\n[s6] \"ครูไม่มีเวลาทำอาหารหรือสั่งอาหารเลยน่ะ...\""
1006902-42 = "ว่าไงนะ...?"
1006902-43 = "[s7] \"เอ่อ... คุณรูมิ...?\"\n[s8] \"อยู่ดีๆ ทำไมถึงทำท่าน่ากลัวแบบนั้นล่ะ...?\""
1006902-46 = "ฮึ่ย!"
1006902-47 = "ขอบอกไว้ก่อนเลยนะ! การอดอาหารเป็นเวลานานๆ น่ะเป็นเรื่องที่รูมิผู้นี้จะไม่มีวันยอมให้เกิดขึ้นอย่าง#nเด็ดขาด!"
1006902-48 = "[s] \"ยะ... อย่างนั้นเหรอ?!\""
1006902-49 = "ไม่ได้การแล้ว ถ้าคุณครูไม่มีเวลาทำอาหารเลยละก็ เดี๋ยวฉันจะเป็นคนทำให้เอง!"
1006902-51 = "(รูมิพับแขนเสื้อขึ้นแล้วก้าวฉับๆ ไปทางห้องพักผ่อนของชาเล่ต์...)"
1006902-55 = "ห้องพักผ่อนชาเล่ต์"
1006902-57 = "[ns] (ตามรูมิมาเผื่อว่าจะมีเรื่องอะไร)"
1006902-58 = "ไหนดูซิ... หอมหัวใหญ่... เกือบเสียแล้วนะเนี่ย เอาละ ถ้าตัดส่วนที่แตกหน่อกับส่วนที่เหี่ยวๆ ออกไป#nก็น่าจะกินได้แหละน่า\n"
1006902-59 = "มันฝรั่งตรงนี้... มันไม่ได้เป็นสีเขียวตั้งแต่แรกใช่มั้ยน่ะ? เก็บมันฝรั่งยังไงถึงได้ปล่อยให้มันฝรั่งแตก#nหน่ออ่อนในตู้เย็นได้เนี่ย..."
1006902-60 = "มีขนมปังแผ่นด้วยแฮะ? ไม่ได้มีราขึ้นแต่ก็แข็งเป็นหินเลย เดี๋ยวนะ ถ้างั้นเอามาทุบให้ละเอียด แล้วใช้#nแทนแป้งทอดกรอบก็ได้นี่นา...?"
1006902-61 = "ไหนดูช่องแช่แข็งหน่อยซิ อย่างน้อยครูก็เตรียมเนื้อเอาไว้อยู่นะ ถึงมันจะถูกแช่แข็งจนเอามาใช้แทน#nอาวุธหนักได้เลยก็เถอะ"
1006902-62 = "นานๆ ทีจะเห็นคนเก็บไวน์ทำอาหารกับซอสปรุงรสจนจะหมดอายุ... คุณครู... ไม่สิ ไม่ได้มีนัยยะสำคัญ#nอะไรหรอก แค่จะสื่อว่าเป็นการเปิดประสบการณ์ใหม่ดีน่ะ"
1006902-63 = "[s9] \"ครูขอละ พอเถอะนะ...\"\n[s10] \"นี่เป็นการประจานกันหรือเปล่าน่ะ...\""
1006902-66 = "เอาละ ใช้วัตถุดิบแค่นี้ก็พอแล้ว"
1006902-67 = "[s] \"จริงเหรอ?!\""
1006902-68 = "อย่าดูถูกย่านการค้าเทพเต่าดำเชียวนะคุณครู ถึงจะดูมีปัญหา...สักหน่อยเถอะ แต่ฉันจะคิดซะว่ามันเป็น#nความท้าทายใหม่ๆ แล้วกัน"
1006902-69 = "รอประมาณ 30 นาทีนะ ฉันจะทำอาหารอร่อยๆ มาให้เอง"
1006902-79 = "[ns] \"เหลือเชื่อสุดๆ...\""
1006902-80 = "เป็นยังไงบ้าง? ระหว่างทำอาหารฉันก็ถือโอกาสเก็บกวาดของในตู้เย็นไปในตัวด้วยเลยน่ะ"
1006902-81 = "ฉันทำอาหารมาแล้ว กินให้อร่อยเลยนะคุณครู"
1006902-86 = "[ns] \"จะ... จะทานแล้วนะ!\""
1006902-91 = "(อาหารของรูมิอร่อยจนน่าตกใจ)"
1006902-92 = "(อร่อยจนไม่อยากจะเชื่อเลยว่าวัตถุดิบทุกอย่างมาจากของที่เก็บไว้ในตู้เย็น...)"
1006902-93 = "ฮ่าฮ่าฮ่า เห็นคุณครูกินอย่างเอร็ดอร่อยฉันก็ปลื้มใจแล้วละ"
1006902-94 = "ก็นะ เพราะแนวทางการทำอาหารของฉันคือการทำอาหารจากวัตถุดิบทั่วๆ ไปให้ได้หลากหลายเมนู และก็มีรสชาติดีกว่าปกติน่ะ"
1006902-95 = "เมนูไหนจะฮอตฮิต และก็ต้องใช้เคล็ดลับทำอาหารแบบไหนถึงจะทำให้ธุรกิจรุ่งเรืองขึ้นได้"
1006902-96 = "พร้อมทั้งวิเคราะห์องค์ประกอบของอาหารเอาไว้ปรับปรุงจุดบกพร่องด้วย ทั้งเรื่องรสชาติ การตกแต่ง#nอาหาร แล้วก็เรื่องราคา"
1006902-97 = "ทุกอย่างคือหัวใจหลักของการขายอาหารเลยนะ เป็นแนวทางบริหารจัดการของย่านการค้าเทพเต่าดำ#nด้วย"
1006902-98 = "[s] \"ยอดเลย แต่เหมือนจะทำอาหารเยอะไปรึเปล่า...?\""
1006902-99 = "พูดอะไรอย่างนั้น! ถ้าเป็นคุณครูจากชาเล่ต์ที่แบกรับภาระอันยิ่งใหญ่แล้วละก็ ยิ่งต้องกินให้อิ่มท้องนะ!"
1006902-100 = "ดูแขนขานั่นสิ! แทบจะเหลือแต่หนังหุ้มกระดูกอยู่แล้ว!"
1006902-101 = "นี่เลย กินเข้าไปเยอะๆ เลย! คุณครูไม่ได้กินข้าวเที่ยงด้วยนี่? อย่าบอกนะว่าข้าวเช้าก็ไม่ได้กินด้วยน่ะ?"
1006902-102 = "งั้นให้ฉันทำอาหารเย็นไว้เผื่อเลยดีมั้ย?"
1006902-103 = "[s] \"วะ... ไว้ชีวิตครูด้วยเถอะ!\""
1006902-105 = "(จากนั้นคุณครูก็ลิ้มรสอาหารของรูมิจนพุงกาง...)"

[translation]
83302300300-6 = "อ๊ะ! รุ่นพี่ฮินะ!"
83302300300-7 = "อิบูกิ? ไม่คิดเลยนะว่าจะได้มาเจอในที่แบบนี้"
83302300300-8 = "นั่นน่ะสิ~ พอดีอิบูกิได้ยินว่ามีบางอย่างโผล่มาในสวนสาธารณะแถวๆ อาคารคณะกรรมการวินัยน่ะ~!"
83302300300-9 = "เห็นว่าเป็นแพนเค้กอันใหญ่เบ้อเริ่มเทิ่มเลยละ~!"
83302300300-10 = "อิบูกิเองก็ชอบแพนเค้ก! ก็เลยตามมาดูด้วยความสงสัยน่ะ!"
83302300300-11 = "แพนเค้กอันใหญ่เบ้อเริ่มเทิ่ม... หรือว่าจะเป็น..."
83302300300-12 = "แพนเค้กอันใหญ่เบ้อเริ่มเทิ่ม..."
83302300300-13 = "ถ้าได้เดินเล่นกับแพนเค้กแบบนั้น อิบูกิต้องมีความสุขมากๆ แน่ๆ~"

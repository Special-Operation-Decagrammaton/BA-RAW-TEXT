[translation]
83304400200-6 = "...Ibuki? Why are you here?"
83304400200-7 = "Ah! Hina!"
83304400200-8 = "Ibuki is just here to dis-in-fect some wounds!"
83304400200-9 = "Are you injured?"
83304400200-10 = "She was injured in a fall during the mess at the Pandemonium Society."
83304400200-11 = "Oh? What happened?"
83304400200-12 = "I heard someone shout something about Chairman Makoto getting hypnotized into an entirely different person."
83304400200-13 = "...Hypnotized?"
83304400200-14 = "Yeah! Satsuki did some hypnosis on Makoto? Or something like that."
83304400200-15 = "It made Makoto into New Makoto."
83304400200-16 = "...Forgive me, I'm not following what you're saying."
83304400200-17 = "Okay, Ibuki. You're cleared to go."
83304400200-18 = "Yay! Thanks Chinatsu!!!"
83304400200-19 = "Thank me by not getting hurt for a while, okay?"
83304400200-20 = "Anyway, Head Prefect, you may want to ask Iroha for more details. She's over there."
83304400200-21 = "Hm. Hypnosis..."

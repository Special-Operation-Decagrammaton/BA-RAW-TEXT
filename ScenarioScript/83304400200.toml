[translation]
83304400200-6 = "อิบูกิ...? ทำไมถึงมาอยู่ที่นี่?"
83304400200-7 = "อ๊ะ! รุ่นพี่ฮินะ!"
83304400200-8 = "อิบูกิมาล้างแผลน่ะ!"
83304400200-9 = "แผลเหรอ...?"
83304400200-10 = "น่าจะหกล้มระหว่างที่เกิดเหตุวุ่นวายที่แพนเดโมเนียม โซไซตี้ก่อขึ้นน่ะค่ะ"
83304400200-11 = "เหตุวุ่นวายงั้นเหรอ มีเรื่องอะไรกันอีก?"
83304400200-12 = "ตามที่ได้ยินมา ประธานมาโคโตะถูกสะกดจิตหรืออะไรทำนองนั้น จนกลายเป็นอีกคนไปเลยค่ะ"
83304400200-13 = "สะกดจิต...?"
83304400200-14 = "อื้อ! ก็รุ่นพี่ซัตสึกิน่ะสิ~ ไปสะกดจิตหรือเชื่อมจิตรุ่นพี่มาโคโตะก็ไม่รู้~"
83304400200-15 = "รุ่นพี่มาโคโตะก็เลยกลายเป็นรุ่นพี่มาโคโตะอีกเวอร์ชันไปเลย~"
83304400200-16 = "ขอโทษนะ ฉันตามไม่ทัน..."
83304400200-17 = "ล้างแผลและทำแผลให้เรียบร้อยแล้วค่ะ อิบูกิจัง"
83304400200-18 = "ว้าว! ขอบคุณนะคะ~! รุ่นพี่ชินัตสึ!"
83304400200-19 = "แค่นี้สบายมากค่ะ ต่อไปก็ระมัดระวังให้มากกว่านี้นะคะ จะได้ไม่เจ็บตัวอีก"
83304400200-20 = "ส่วนรายละเอียดเพิ่มเติม ฉันว่าถ้าถามจากคุณอิโรฮะที่อยู่ทางโน้นน่าจะได้คำตอบที่เร็วกว่านะคะ"
83304400200-21 = "อืม... เรื่องสะกดจิตน่ะเหรอ"

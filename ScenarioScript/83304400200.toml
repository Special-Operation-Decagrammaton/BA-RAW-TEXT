[translation]
83304400200-6 = "伊吹……？你怎麼會來這裡？"
83304400200-7 = "啊！陽奈前輩！"
83304400200-8 = "伊吹是來消毒傷口的！"
83304400200-9 = "傷口……？"
83304400200-10 = "好像是因為萬魔殿發生的騷動才會跌倒受傷。"
83304400200-11 = "竟然會發生騷動，出了什麼事嗎？"
83304400200-12 = "聽說真琴議長受到催眠，所以整個人都變了。"
83304400200-13 = "……催眠？"
83304400200-14 = "嗯！皐月前輩他呀～對真琴前輩用了好像叫催眠的東西～"
83304400200-15 = "所以真琴前輩變成了新的真琴前輩～"
83304400200-16 = "……抱歉，我聽不懂你的意思。"
83304400200-17 = "來，治療結束了哦，伊吹醬。"
83304400200-18 = "哇啊！謝謝你～！千夏前輩！"
83304400200-19 = "不客氣，之後要小心別受傷了哦。"
83304400200-20 = "想了解詳細情況的話，去問那邊的伊呂波同學應該會更好理解。"
83304400200-21 = "唔嗯，是催眠嗎？"

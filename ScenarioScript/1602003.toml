1602003-15 = "3;오토기;02\n#3;h"
1602003-16 = "[ns] \"보고서 작성은 잘 되어가?\""
1602003-17 = "3;오토기;06;음, 아니…… 통신 감도가 너무 나빠서 뭐라 말했는지 잘 들리지가 않아.\n#3;em;[한숨]"
1602003-18 = "3;오토기;09;아무리 재밍 장치를 설치하고 작전에 들어갔다지만, 이렇게 잡음이 심해서야.\n#3;stiff"
1602003-19 = "3;오토기;02;다음부터는 보고서 작성을 위해서라도 좀 더 큰 소리로 또박또박 말해야겠어.\n#3;em;[속상함]"
1602003-20 = "[s1] \"그 녹음 기록은 오토기의 대사지?\"\n[s2] \"뭔가 대단한 이야기가 잔뜩 오가고 있는 것 같은데.\""

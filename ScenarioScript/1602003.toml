1602003-36 = "#wait;100"
1602003-37 = "3;오토기;13;물론 모든 통신을 음성 기호로 전환해서 말하는 건 아니야. '탱고' 다운, 포인트 '알파' 처럼 혼동되지 않아야 하는 중요한 부분만 강조해서 말하는 거지."
1602003-38 = "3;오토기;16;선생님도 한 번 무전기로 시험해 볼래?\n#3;em;[반응]"

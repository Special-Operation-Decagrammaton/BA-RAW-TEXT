1602003-22 = "#wait;100"
1602003-23 = "3;오토기;13;그렇게 복잡한 이야기를 한 건 아냐."
1602003-24 = "3;오토기;03;그저 작전 위치를 재확인하고, 작전에 필요한 음어를 공유한 것 뿐이야. SRT만 이해할 수 있는 전문적인 내용은 그다지 없었는데……"
1602003-25 = "3;오토기;16;아, 다만 무선 교신 중에는 음성 기호를 섞어쓰니 일반인이 듣기에는 어려워 보이는 것일지도.\n#3;em;[전구]"
1602003-26 = "[s] \"음성기호?\""
1602003-27 = "3;오토기;15;응. 알파, 찰리, 마이크 같은 단어들 말이야."
1602003-28 = "3;오토기;13;일상에서 쓰는 단어 중에는 발음이 유사한 것이 많잖아? 숫자 2와 알파벳 E 라던가."
1602003-29 = "3;오토기;02;하지만 잡음이 심한 무선 교신 중에 전달이 잘못되기라도 하면 엉뚱한 곳을 폭격할 수도 있으니까……\n#3;em;[한숨]"
1602003-30 = "3;오토기;16;발음을 명료하게 하기 위해서 부호 대신 단어를 사용하는 거야."
1602003-31 = "3;오토기;03;예를 들면 FOX 소대의 FOX는 [ruby=F]폭스트롯[/ruby]-[ruby=O]오스카[/ruby]-[ruby=X]엑스레이[/ruby] 하는 식으로 말이지."

[translation]
2002802-1 = "Anxious Feelings"
2002802-2 = "I headed to the beach where Hinata was waiting at."
2002802-9 = "I spotted her awkwardly standing next to a sunbed and open parasol on the beach."
2002802-15 = "[ns1] \"Hinata? Is everything all right?\"\n[ns2] \"Are you feeling okay? You don't look so well.\""
2002802-20 = "Oh, oh! Sensei!"
2002802-21 = "Thank you for coming. I'm so sorry for causing concern over something so trivial..."
2002802-22 = "...Hm? What are these for?"
2002802-23 = "Oh, these..."
2002802-29 = "So, this is a sunbed and... This is a parasol..."
2002802-30 = "As you can see, obviously! Eek! You obviously know what these are! I apologize!"
2002802-31 = "I suppose you don't know the reason they're here though..."
2002802-32 = "So... How could I explain this to you... Haha..."
2002802-33 = "Well..."
2002802-34 = "I don't...have a good answer... Even I'm at a bit of a loss as to what my intent is."
2002802-35 = "I believed it was something I should do, but..."
2002802-36 = "[s3] \"Could you go into more detail?\"\n[s4] \"You thought that you should?\""
2002802-39 = "Trying to explain it seems to be confusing me even further..."
2002802-40 = "It's very rare in the Sisterhood we find free time for ourselves. So I made an oath to myself to let go and allow myself to relax while I was here..."
2002802-41 = "Even the other Sisters said so: I need to give it my all when I'm assisting with research, but I also need to give it my all when it's time to recover..."
2002802-42 = "But I'm having some trouble. How could I put this... I kept feeling this vague sense of discomfort inside as I tried to lay down."
2002802-43 = "It feels as if I'm committing a sin of sorts, trying to rest and do nothing."
2002802-44 = "Haha...ha... Perhaps I'm a bit uncomfortable straying so far from my usual routine."
2002802-45 = "I'm usually up before the sun, and have a variety of duties to attend to."
2002802-46 = "By the time I'm done, it's evening, so I help my Sisters tidy up."
2002802-47 = "...And that's what everyone back in the Cathedral are doing, right? They're doing their normal duties...wrapping up the day and cleaning up..."
2002802-48 = "I'm worried that someone else has had to pick up my share of the work as well..."
2002802-49 = "..."
2002802-50 = "[s5] \"Do you feel bad because you're the only one on break?\"\n[s6] \"Do you feel like you've forced your work onto someone else?\""
2002802-55 = "O-Of course, I know that's not the right mindset to have."
2002802-56 = "But, still..."
2002802-57 = "It's as if my logical brain and my feelings cannot seem to agree with each other!"
2002802-58 = "And now, I won't be able to fulfill my Sisters' request that I properly rest."
2002802-62 = "...Hm?"
2002802-63 = "Have I actually laid down yet?"
2002802-64 = "N-Not exactly. I have made a few attempts, but I ended up feeling too uncomfortable."
2002802-65 = "I should just start with lying down on the sunbed?"
2002802-66 = "Um... I don't quite understand the reason..."
2002802-70 = "Ah! My apologies, Sensei. It's not my place to question a teacher's methods."
2002802-71 = "As you say, I'll attempt to lie down."
2002802-75 = "I sit down like this, stretch out my legs..."
2002802-82 = "― [log=히나타 수영복]Mmm... Hmm...? That's odd...[/log][wa:1850] "
2002802-85 = "― [log=히나타 수영복]This...[/log]"
2002802-87 = "― [log=히나타 수영복]This is actually quite comfortable...[/log][wa:340] "
2002802-90 = "― [log=히나타 수영복]It's just warm enough, and there's still a nice breeze.[/log][wa:950] "
2002802-92 = "― [log=히나타 수영복]The shade keeps the sun out of my eyes.[/log][wa:10] "
2002802-95 = "― [log=히나타 수영복]It's rather cozy...[/log]"
2002802-97 = "― [log=히나타 수영복]I feel as if I could drift off into sleep.[/log][wa:630] "
2002802-100 = "― [log=히나타 수영복]But it's still...[/log][wa:960] "
2002802-102 = "― [log=히나타 수영복]Well, if I'm the only one lying down, and Sensei isn't resting...[/log][wa:360] "
2002802-105 = "― [log=히나타 수영복]It still feels like I'm doing something wrong.[/log][wa:1070] "
2002802-108 = "[ns7] \"Nope. Don't mind me.\"\n[ns8] \"Just focus on what you're feeling.\""
2002802-109 = "― [log=히나타 수영복]Oh, okay.[/log][wa:960] "
2002802-110 = "― [log=히나타 수영복]Oh, okay.[/log][wa:960] "
2002802-112 = "― [log=히나타 수영복]Then, as you say... [/log][wa:840] "
2002802-115 = "― [log=히나타 수영복]I will let go and relax.[/log][wa:1240] "
2002802-118 = "― [log=히나타 수영복]Hmm... Zzz... Hehehe...[/log][wa:5570] "
2002802-121 = "― [log=히나타 수영복]...Huh!? Wh-What was that!?[/log][wa:1120] "
2002802-124 = "― [log=히나타 수영복]P-Please forget that.[/log][wa:20] "
2002802-126 = "― [log=히나타 수영복]I beg of you to forget what you just heard! Sensei!![/log][wa:10] "
2002802-130 = "Sensei, pleaseee!"
2002802-132 = "It took a little while to calm her down, but afterward I created a better environment for her to relax."
2002802-133 = "Hinata eventually laid back down on her sunbed. It didn't take long for her to drift off into sleep."

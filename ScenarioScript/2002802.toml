2002802-29 = "3;히나타 수영복;04;그러니까, 이건 선베드고……. 이건 파라솔인데…….\n#3;em;[땀]"
2002802-30 = "3;히나타 수영복;11;아니, 아니! 생각해 보니 선생님께서 그걸 모르실 리는 없겠네요! 죄송해요! 제가 무슨 소릴!\n#3;stiff"
2002802-31 = "3;히나타 수영복;04;그러니까 이걸 왜 준비했냐면……. 으음……. 그게……."
2002802-32 = "3;히나타 수영복;09;그러니까……. 이걸 어떻게 설명 드려야 하지……. 하하…….\n#3;em;[///]"
2002802-33 = "3;히나타 수영복;07;그……."
2002802-34 = "3;히나타 수영복;06;그걸 저도 잘……. 모르겠어서……요. 고민 상담을 드리고 싶다고 한 부분도 바로 그 부분이에요.\n#3;em;[속상함]\n#3;m3"
2002802-35 = "3;히나타 수영복;06;일단 해야 할 거 같아서 하긴 했는데……. 말이에요."
2002802-36 = "[s3] \"좀 더 자세히 설명해 줄 수 있을까?\"\n[s4] \"해야 할 거 같아서 했다고?\""
2002802-37 = "#wait;10"
2002802-38 = "#wait;10"
2002802-39 = "3;히나타 수영복;04;으음……. 저도 계속 말씀드리면서 이게 무슨 말인가 싶지만…….\n#3;em;[땀]\n#3;stiff"
2002802-40 = "3;히나타 수영복;07;지금은 일단 쉬는 시간이고……. 이왕 여기까지 왔으니 마음 편하게 푹 쉬자……! 그렇게 생각하기로 했거든요."
2002802-41 = "3;히나타 수영복;09;출발할 때 자매님들께서도 그렇게 말씀해 주셨고요. 조사를 도울 때에는 열심히 돕지만, 쉴 때에는 확실하게 쉬고 오라고……."
2002802-42 = "3;히나타 수영복;09;그치만 그게 잘 안되네요. 뭐라고 해야 할까요. 마음 한 켠이 불편하다는 느낌이 계속 들어서…….\n#3;em;[세로선]"
2002802-43 = "3;히나타 수영복;07;뭔가……. 저만 이래도 되나 싶고…….\n#3;stiff"
2002802-44 = "3;히나타 수영복;09;하하……하……. 어쩌면 평소랑 너무 다른 하루를 보내고 있어서 그런 걸지도요.\n#3;em;[땀]"
2002802-45 = "3;히나타 수영복;04;보통은 아침 일찍 일어나서, 하루 일과를 쭉 보내는 게 당연하고."
2002802-46 = "3;히나타 수영복;06;일과가 다 끝날 때 즈음에는 저녁이 다 돼가니, 다른 자매님들과 뒷정리를 하고."
2002802-47 = "3;히나타 수영복;07;……그리고 지금도 성당에선 다들 그러고 계시겠죠? 해야 할 일들을 하시고……. 뒷정리를 하시고……."
2002802-48 = "3;히나타 수영복;10;그리고 본래 제가 해야 했던 일들도……. 제가 없으니, 다른 분들께서 구태여……."
2002802-49 = "3;히나타 수영복;06;………….\n#3;em;[속상함]\n#3;stiff"
2002802-50 = "[s5] \"혼자 쉬는 거 같아서 미안한 거야?\"\n[s6] \"일을 떠넘겼다는 느낌을 받는 거야?\""

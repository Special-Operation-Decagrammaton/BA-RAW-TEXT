[translation]
2002802-1 = "不安的心"
2002802-2 = "（抵達見面地點的海邊時……）"
2002802-9 = "（看見了躺椅、遮陽傘，以及不知為何尷尬地站在一旁的日向）"
2002802-15 = "[ns1]「……日向？發生什麼事了？」\n[ns2]「沒事吧？臉色好像不太好……」"
2002802-20 = "啊，啊！老師！！"
2002802-21 = "非常感謝您願意過來。#n明明不是什麼大事卻占用老師的時間，真是不好意思……"
2002802-22 = "……嗯？這些是什麼？"
2002802-23 = "啊，這些是……"
2002802-29 = "是躺椅……還有遮陽傘……"
2002802-30 = "不，不對！這種事老師怎麼可能會不知道呢！#n抱歉我失禮了！"
2002802-31 = "之所以準備這些是因為……唔嗯……那個……"
2002802-32 = "就是……該怎麼說明才好呢……哈哈……"
2002802-33 = "那個……"
2002802-34 = "其實我也……不太清楚……#n之所以想找老師諮詢，也與這個煩惱有關。"
2002802-35 = "是覺得有必要……才會這麼做的。"
2002802-36 = "[s3]「可以說得詳細一點嗎？」\n[s4]「覺得有必要才這麼做？」"
2002802-39 = "唔嗯……我也是一邊說明一直思考這是什麼意思……"
2002802-40 = "現在基本上是休假期間……#n「都來到這裡了就放鬆心情好好休息……！」我本來是這麼想的。"
2002802-41 = "修女會的大家在為我送行時也告訴我，#n說協助調查時要認真幫忙，但該休息的時候也要確實休息……"
2002802-42 = "不過卻不是很順利。#n該怎麼說呢……心裡一直有股揮之不去的罪惡感……"
2002802-43 = "總覺得……只有我自己在休息，這樣真的好嗎……"
2002802-44 = "哈哈……哈……#n也許是因為在這裡的時光與平時相去甚遠的關係吧。"
2002802-45 = "在此之前，一早醒來後開始進行每日的工作是再正常不過的。"
2002802-46 = "太陽西下後則是和大家一起進行整理，一天就這麼過去。"
2002802-47 = "……現在大家應該也在教堂裡忙吧？#n做著該做的工作……接著進行收拾……"
2002802-48 = "本該由我來做的事……也因為我的缺席而必須由其他人負責……"
2002802-49 = "…………"
2002802-50 = "[s5]「只有自己在享受所以覺得愧疚嗎？」\n[s6]「好像把工作推給別人了的感覺嗎？」"
2002802-55 = "我，我也清楚這樣想是不好的。"
2002802-56 = "可是總覺得……"
2002802-57 = "……還是很不習慣。頭腦和內心都這麼覺得。"
2002802-58 = "因此無法照修女們所說的「好好休息」……"
2002802-62 = "……咦？"
2002802-63 = "有沒有躺過？"
2002802-64 = "還，還沒有……因為總是靜不下來，所以只在一旁看著而已……"
2002802-65 = "……總之先躺下來？躺在躺椅上？"
2002802-66 = "唔，唔嗯……？#n老師有想到什麼原因嗎……"
2002802-70 = "不，沒什麼。#n既然老師都這麼說了……"
2002802-71 = "我明白了，就先躺下來看看吧。"
2002802-75 = "先坐下，然後把腿伸直……"
2002802-82 = "― [log=히나타 수영복]嗯……嗯嗯……？哎呀……？[/log][wa:2450] "
2002802-85 = "― [log=히나타 수영복]這裡……[/log]"
2002802-87 = "― [log=히나타 수영복]比想像中更能放鬆……[/log][wa:1420] "
2002802-90 = "― [log=히나타 수영복]涼爽得恰到好處，卻不會太冷……[/log][wa:2550] "
2002802-92 = "― [log=히나타 수영복]臉也能躲在陰影下……[/log][wa:600] "
2002802-95 = "― [log=히나타 수영복]暖洋洋的……[/log]"
2002802-97 = "― [log=히나타 수영복]感覺躺著躺著就要睡著了。[/log][wa:1830] "
2002802-100 = "― [log=히나타 수영복]話說回來，那個……[/log][wa:1280] "
2002802-102 = "― [log=히나타 수영복]明明在老師面前，卻只有我躺著……[/log][wa:2320] "
2002802-105 = "― [log=히나타 수영복]感，感覺……有點不好意思……[/log][wa:2350] "
2002802-108 = "[ns7]「不用在意我哦。」\n[ns8]「專注在自己的感受上就可以囉。」"
2002802-109 = "― [log=히나타 수영복]我，我知道了。[/log][wa:1040] "
2002802-110 = "― [log=히나타 수영복]我，我知道了。[/log][wa:1040] "
2002802-112 = "― [log=히나타 수영복]那麼，就承蒙您的好意……[/log][wa:1160] "
2002802-115 = "― [log=히나타 수영복]放鬆下來……舒服地……[/log][wa:1760] "
2002802-118 = "― [log=히나타 수영복]……呼……呣喵……呼嘿嘿……[/log][wa:5930] "
2002802-121 = "― [log=히나타 수영복]……哈！？我，我剛才說了什麼……！？[/log][wa:1480] "
2002802-124 = "― [log=히나타 수영복]請，請您忘了吧，[/log][wa:540] "
2002802-126 = "― [log=히나타 수영복]請忘掉我剛才說的話！老師！！[/log][wa:1470] "
2002802-130 = "老師～！！"
2002802-132 = "（之後，讓慌慌張張打算起身的日向冷靜下來，並再次請他躺下）"
2002802-133 = "（沒過多久，日向便進入了夢鄉）"

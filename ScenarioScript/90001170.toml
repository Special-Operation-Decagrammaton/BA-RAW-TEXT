[translation]
90001170-1 = "ตอนที่ 17;พบกันอีกครั้ง"
90001170-3 = "เราทำแบบนั้น... เพื่อปลุกเธอขึ้นมาอีกครั้งน่ะ"
90001170-4 = "ใช่ค่ะ โดยเฉพาะท่านริโอะที่ทุ่มเทอย่างหนักเลยค่ะ อย่างน้อยเคย์ต้องได้รู้เรื่องนี้นะคะ"
90001170-5 = "และคนที่ทุ่มเทรองลงมา ก็คือฉันที่ตั้งใจทำตามคำสั่งของท่านริโอะค่ะ"
90001170-10 = "โทคิ...? ถ้าพูดออกไปอย่างนั้น ฉันก็กังวลว่าทุกคนจะรู้สึกอย่างไรนะคะ..."
90001170-11 = "ถ้าวิเคราะห์ข้อมูลทางสถิติแล้ว มันก็จริงที่ครั้งนี้ฉันทำงานหนักกว่าใครเพื่อนไม่ใช่เหรอ? ให้ฉันวิเคราะห์ล็อกอีกครั้งมั้ย?"
90001170-17 = "ดูเหมือนคุณจะไม่เปลี่ยนแปลงไปมากเท่าไรนับตั้งแต่วันที่ฉันหลับตาลงเลยนะคะ..."
90001170-18 = "[s1] \"เอ่อ... สวัสดี เคย์จัง\"\n[s2] \"เคย์จัง หลังจากตอนนั้นเราก็ไม่ได้เจอกันเลยเนอะ?\""
90001170-21 = "ฉันไม่ใช่เคย์จังสักหน่อยค่ะ!"
90001170-22 = "จะว่าไป ที่นี่ที่ไหนเหรอคะ? ถึงฉันจะยังไม่สันทัดเรื่องสภาพแวดล้อมในคิโวทอส..."
90001170-23 = "แต่ฉันก็รู้สึกว่าสถานที่แห่งนี้มันไม่คุ้นตาเลยนะคะ"
90001170-24 = "ถามได้ดีเลย ที่นี่คือธารน้ำแข็ง"
90001170-25 = "ธารน้ำแข็ง? ธารน้ำแข็งที่ฉันรู้จักน่ะเหรอคะ? แล้วทำไมฉันถึงมาอยู่ในที่แบบนี้...?"
90001170-26 = "เรื่องนั้นฉันจะค่อยๆ อธิบายให้ฟังค่ะ"
90001170-27 = "ฉันว่าเคย์น่าจะรู้จักฉันกับริโอะเป็นอย่างดีแล้ว แต่คนอื่นน่าจะยังไม่รู้จัก งั้นเรามาแนะนำตัวกันก่อน#nดีมั้ยคะ?"
90001170-28 = "ค่ะ ค่ะ..."
90001170-29 = "สวัสดีค่ะ เคย์ ฉันชื่ออะซุมะ โทคิค่ะ"
90001170-30 = "ครั้งหนึ่งฉันเคยลักพาตัวคุณกับอาริสึค่ะ พีซ พีซ"
90001170-31 = "นั่นเรียกว่าการแนะนำตัวเหรอคะ?"
90001170-32 = "ส่วนฉันก็อิซุมิโมโตะ เอมิ ฝากตัวด้วยนะ"
90001170-33 = "สวัสดีค่ะ... อืม เอ่อ... คือ... ยินดีที่ได้พบค่ะ... ฉันชื่อเคย์ค่ะ"
90001170-34 = "ที่จริงมันเป็นชื่อที่อ่านผิดน่ะค่ะ..."
90001170-35 = "เฮ้อ แต่ในเมื่อท่านธิดาบอกว่าชอบชื่อนี้..."
90001170-38 = "ฉันอยากแสดงความขอบคุณที่เก็บข้อมูลบางส่วนของฉันไว้ค่ะ"
90001170-39 = "ถึงแม้มันจะกระทบกระเทือนไปบ้างเพราะถูกย้ายไปไว้ในพวงกุญแจตุ๊กตาก็เถอะค่ะ"
90001170-40 = "อึก...! ความทรงจำของฉัน...! รู้สึกเหมือนมันแขวนไว้กับไม้ถูพื้นที่ถูกเอาไปใช้งานอย่างสะเพร่าอย่าง#nนั้นละ...!"
90001170-41 = "[s] \"อ่า... พอดีว่าเราไม่มีแผนการอื่นน่ะ...\""
90001170-42 = "คิดว่าสิ่งที่พูดมามันฟังขึ้นเหรอคะ..."
90001170-43 = "อืม... มันอาจจะฟังดูแปลกที่จะพูดแบบนี้ แต่ว่าฉันก็พอรู้เกี่ยวกับพวกคุณอยู่บ้างค่ะ "
90001170-44 = "เพราะที่ผ่านมาฉันได้รับการแชร์ข้อมูลของพวกคุณผ่านทางท่านธิดาค่ะ แต่ในทางกลับกัน..."
90001170-45 = "มาทำความรู้จักกันใหม่ตั้งแต่ตอนนี้ก็ได้ค่ะ ว่ามั้ยคะ เคย์? ฉันต้องขอฝากตัวด้วยนะคะ"
90001170-46 = "เอาเป็นว่า ฉันเข้าใจแล้วค่ะ..."
90001170-47 = "ว่าแต่ตอนนี้ท่านธิดากำลังทำอะไรอยู่ที่ไหนเหรอคะ?"
90001170-48 = "[s3] \"จะ... จริงสิ! เวลานี้แหละ เคย์จัง!\"\n[s4] \"ครูอยากแนะนำเพื่อนๆ คนอื่นให้เคย์จังรู้จักพอดีเลย!\""
90001170-51 = "บอกแล้วไงคะว่าฉันไม่ได้ชื่อเคย์จัง...!"
90001170-55 = "ช่างเถอะค่ะ... คุณครู [USERNAME] ไม่ใช่คนที่จะรับฟังคำขอแบบนั้นหรอกนี่คะ"
90001170-56 = "แต่ถึงยังไงก็อย่ามาอมยิ้มเหมือนจะบอกว่า 'รู้จักครูดีเลยนะ' เลยค่ะ รอยยิ้มนั้นฉันเห็นแล้วอารมณ์เสีย#nค่ะ..."
90001170-57 = "แล้วคุณครูอยากแนะนำใครให้ฉันรู้จักเหรอคะ?"
90001170-59 = "[ns] \"คนที่ว่าก็คือ...\""
90001170-65 = "เอ๋? คุณครูส่ง MOMOTALK มาแฮะ?"
90001170-69 = "..."
90001170-70 = "ทุกคน! เรากลับเข้าไปกันเถอะ!"
90001170-71 = "อ้าว? จะเลิกเล่นแล้วเหรอ?"
90001170-72 = "นั่นสิคะ โมโมอิ! อาริสึอยากเล่นต่อค่ะ!"
90001170-73 = "ฉะ... ฉันหมดแรงแล้ว..."
90001170-74 = "เราเลิกเล่นกันก่อนเถอะ ยูสึเองก็บอกว่าหมดแรงแล้วนะ แล้วคุณครูก็เพิ่งบอกว่าจะชงโกโก้ให้ด้วย!"
90001170-75 = "โกโก้จากคุณครู...? นั่นมันไอเทมฟื้นฟูสุดแรร์เลยนะคะ! อาริสึต้องไปเก็บไอเทมนั้นให้ได้ค่ะ!"
90001170-76 = "ใช่มั้ยล่ะ? งั้นก็รีบไปกันเถอะ!"
90001170-80 = "เอะ... เอ๋? รอกันด้วยสิพี่! ไปด้วยกันสิ! ยูสึก็มาเร็วเข้า!"
90001170-81 = "โกโก้... ต้องอร่อยแน่ๆ เลย อื้อ"
90001170-87 = "คุณครู! พวกเรามาแล้ว!"
90001170-88 = "ใช่ค่ะ! ถึงจะอยากเล่นต่อ แต่การฟื้นฟูก็จำเป็นเหมือนกันค่ะ!"
90001170-89 = "[s] \"มาแล้วเหรอ? เอ้านี่ โกโก้อร่อยๆ ของทุกคน\""
90001170-90 = "ขอบคุณค่ะ คุณครู ว้าว อุ่นดีจังเลยค่ะ"
90001170-91 = "ว่าแต่คุณครู... ไม่ดื่มด้วยกันเหรอคะ? อ่า... ดื่มกาแฟไปแล้วสินะคะ ค่ะ ค่ะ..."
90001170-96 = "ฮื้ม~ อร่อยจัง รู้สึกว่าร่างกายอบอุ่นขึ้นมาเลยละ"
90001170-102 = "ถ้างั้นก็... เอาละ อาริสึเข้าไปข้างในก่อนเลยมั้ย?"
90001170-103 = "หมายถึงให้เข้าไปในฐานเหรอคะ? ว่าแต่ทำไมต้องให้อาริสึเข้าไปก่อน...?"
90001170-104 = "ทำไมน่ะเหรอ... ก็เพราะในนั้นมีคนที่อาริสึต้องไปเจอก่อนเพื่อนเลยไง"
90001170-106 = "คนที่อาริสึจังต้องไปเจอก่อน...?"
90001170-107 = "หรือว่า...!"
90001170-108 = "..."
90001170-110 = "จำเป็นต้องเป็นอาริสึเหรอคะ...?"
90001170-111 = "...!"
90001170-112 = "ระ... หรือว่า อย่าบอกนะคะว่า...!"
90001170-113 = "[s] \"เอาละ รีบไปกันเถอะ อาริสึ\""
90001170-114 = "ค่ะ... เข้าใจแล้วค่ะ คุณครู แต่อาริสึอยากให้คุณครูเข้าไปพร้อมกันค่ะ จะได้มั้ยคะ?"
90001170-115 = "ขอบคุณค่ะ คุณครู ยังมีอีกอย่างค่ะ..."
90001170-120 = "ช่วยจับมืออาริสึไว้แน่นๆ ได้มั้ยคะ?"
90001170-121 = "ตอนนี้อาริสึสั่นไปทั้งตัวเลย... ก็เลยคิดว่าไม่น่าจะยืนไหวค่ะ"
90001170-124 = "ขอบคุณค่ะ คุณครู ขอบคุณ... จริงๆ นะคะ"
90001170-138 = "...!"
90001170-139 = "...!"
90001170-140 = "......"
90001170-141 = "........."
90001170-142 = "เคย์... เคย์... ใช่มั้ยคะ?"
90001170-143 = "ทะ... ท่านธิดา..."
90001170-144 = "เคย์... นั่นเคย์จริงๆ ด้วยสินะคะ..."
90001170-145 = "ท่านธิดา... ฉัน..."
90001170-149 = "เคย์!"
90001170-150 = "ได้โปรดอย่าพูดอีกเลยนะคะว่าตัวเองเป็นคนที่ต้องหายไปน่ะ"
90001170-151 = "แล้วก็อย่าพูดอีกเลยค่ะว่าแบบนั้นมันถูกต้อง และมันต้องเป็นอย่างนั้น"
90001170-152 = "เรื่องนั้นมัน..."
90001170-153 = "อาริสึขอร้องละค่ะ เคย์ ตอนนี้อาริสึอธิบายไม่ถูกเลยค่ะ... ว่าตัวเองมีความสุขแค่ไหน"
90001170-154 = "อาริสึดีใจที่ได้เจอเคย์อีกครั้งนะคะ"
90001170-155 = "ไม่อยากเชื่อเลยว่าอาริสึจะได้เห็นเคย์อยู่ตรงหน้าแบบนี้"
90001170-156 = "ขอบคุณนะคะ เคย์ ขอบคุณจริงๆ ค่ะ"
90001170-157 = "ขอบคุณจากใจจริง... ที่กลับมาหากันแบบนี้นะคะ"
90001170-158 = "เพราะงั้น ต่อไปก็อย่า..."
90001170-159 = "ฮือ... ฮืออ..."
90001170-160 = "ค่ะ... เข้าใจแล้วค่ะ ท่านธิดา"
90001170-161 = "จากนี้ไปจะไม่มีเรื่องอะไรแล้วค่ะ"
90001170-163 = "ขอบคุณนะคะ รุ่นพี่ฮิมาริ รุ่นพี่ริโอะ เอมิ โทคิ แล้วก็คุณครูด้วยค่ะ ขอบคุณจริงๆ นะคะ"
90001170-164 = "อาริสึขาดคุณสมบัติของผู้กล้าแท้ๆ... แต่ทุกคนก็ช่วยทำให้อาริสึได้เจอเคย์อีกครั้ง... อาริสึไม่รู้เลยค่ะ ว่าจะตอบแทนบุญคุณนี้ยังไงดี..."
90001170-166 = "ไม่เป็นไรหรอกค่ะ อาริสึ แค่อาริสึมีความสุข ก็ถือว่าฉันได้รางวัลตอบแทนแล้วละค่ะ"
90001170-167 = "ใช่แล้วละ เคย์ในตอนนี้คือหลักฐานที่พิสูจน์ว่าทฤษฎีของฉันถูกต้อง เท่านี้ก็เพียงพอสำหรับฉันแล้ว"
90001170-168 = "ริโอะ ขอร้องละ..."
90001170-169 = "ฉันพูดอะไรผิดอีกแล้วเหรอ?"
90001170-170 = "ไม่ใช่ค่ะ... คุณคือคนที่ทำให้เคย์ฟื้นคืนชีพมาก็จริง... แต่ถึงยังงั้นก็เถอะ... เฮ้อ..."
90001170-175 = "บรรยากาศกำลังน่าประทับใจเลย งั้นโมโมอิขอแทรกละนะ!"
90001170-176 = "อ๊ะ คุณคือ...?"
90001170-177 = "พะ... พี่โมโมอิ?!"
90001170-178 = "ขะ... ขอโทษนะคะ ทุกคน ฉันพยายามจะห้ามแล้ว..."
90001170-180 = "นี่เธอ! ตอนนั้นเธอใช่มั้ยที่ทำร้ายฉันน่ะ?! ถึงเธอจะอ้างว่าลืมไปหมดแล้ว แต่ว่าฉันยังจำได้ดีอยู่นะ!"
90001170-182 = "ฉันก็ยังจำได้ดีเหมือนกันค่ะ... แน่นอนว่าฉันควรจะต้องขอโทษด้วยเหตุผลทางศีลธรรม..."
90001170-183 = "แต่ด้วยเหตุผลบางอย่าง... ฉันก็ไม่อยากจะขอโทษคุณสักเท่าไรค่ะ ไซบะ โมโมอิ"
90001170-184 = "[s] \"เคย์จัง?!\""
90001170-185 = "คะ... เคย์?!?!"
90001170-186 = "โอ้โห ถูกใจฉันจริงๆ เลย ศัตรูเก่าแก่ของฉันคนนี้ แล้วเหตุผลนั้นมันคืออะไรล่ะ?"
90001170-188 = "ก็คุณทำให้ผ้าขาวอย่างท่านธิดาต้องแปดเปื้อนยังไงล่ะคะ!"
90001170-189 = "[s] \"อ่า...\""
90001170-190 = "อ๊ะ..."
90001170-191 = "กล้าดียังไงถึงได้ชวนท่านธิดาเล่นเกมโต้รุ่ง แต่ตัวเองดันหลับไปซะก่อน!"
90001170-192 = "กะ... ก็พวกเราเป็นชมรมพัฒนาเกมนี่...!"
90001170-193 = "ให้กินโคล่าตอนดึก แล้วก็ไม่สั่งให้ไปแปรงฟันด้วย!"
90001170-194 = "ตะ... แต่นั่นมันโคล่าซีโร่... คิดว่าใช่นะ..."
90001170-195 = "แล้วไหนจะเรื่องอาหารอีก?! เพื่อสุขภาพที่ดีของท่านธิดาแล้ว คุณควรจะให้ท่านได้รับไฟเบอร์ และสารอาหารจากพืชให้เพียงพอไม่ใช่เหรอคะ!"
90001170-196 = "อึก... ที่ว่ามามันก็จริงหรอกนะ แต่ที่จริงฉันไม่ค่อยชอบกินผัก..."
90001170-197 = "ไม่ใช่กับท่านธิดาคนเดียวหรอกนะคะ! พวกคุณทุกคนก็ต้องมีกิจวัตรเพื่อสุขภาพที่ดีเหมือนกันค่ะ!"
90001170-198 = "ขอร้องละ! ทุกคนก็ควรดูแลตัวเองกันด้วยสิคะ! จริงๆ เลย...! แฮ่ก แฮ่ก...!"
90001170-199 = "ตอนนี้เธอไม่น่าจะต้องหายใจเข้าลึกๆ หรอกนะ? แต่ถ้าต้องการละก็ ให้ฉันเพิ่มการปล่อยความร้อนให้#nเอามั้ย?"
90001170-204 = "หยุดเลยค่ะ! ฉันแค่แสดงให้เห็นเป็นการเปรียบเปรยค่ะ! คุณมีความสามารถในการทำความเข้าใจ#nสถานการณ์ได้น้อยกว่าฉันที่เป็นแค่ข้อมูลเหรอคะ ริโอะ!"
90001170-205 = "คะ... เคย์?!"
90001170-206 = "แงงง! ขอโทษนะคะ รุ่นพี่ริโอะ! ทุกอย่างเป็นความผิดของอาริสึเองค่ะ! เคย์ไม่ได้ทำอะไรผิดนะคะ! เพราะงั้นได้โปรดให้อภัยเคย์ด้วยเถอะค่ะ!"
90001170-208 = "อึก... ท่านธิดา นี่มัน..."
90001170-209 = "ไม่เป็นไรหรอก อาริสึ ถึงฉันจะไม่ค่อยแน่ใจเท่าไร แต่น่าจะเกิดคลื่นรบกวนเป็นจำนวนมากในวงจร#nความคิดของเคย์น่ะ"
90001170-211 = "ในอีกแง่ก็ถือว่าโชคดีแล้วละนะที่ประธานมีนิสัยแบบนี้..."
90001170-213 = "แล้วตกลงทำไมถึงเรียกฉัน... ไม่สิ ทำไมถึงเรียกท่านธิดาและเพื่อนๆ มาในที่แบบนี้คะ?"

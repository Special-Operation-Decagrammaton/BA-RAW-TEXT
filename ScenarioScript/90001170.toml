[translation]
90001170-1 = "第17話;重逢"
90001170-3 = "……所以我們再次喚醒了你。"
90001170-4 = "沒錯，尤其莉央大人的功勞很大。#n這點Kei也必須承認。"
90001170-5 = "而第二努力的，自然是聽從莉央大人指揮的我本人。"
90001170-10 = "……季？你那種說法，會讓我有點擔心大家的立場……"
90001170-11 = "根據統計數值的分析，季這次確實做了很多事吧？#n需要再分析Log嗎？"
90001170-17 = "總覺得你們跟我閉上眼睛的時候，幾乎沒什麼區別呢……"
90001170-18 = "[s1]「那個……你好呀，Kei醬？」\n[s2]「從那之後就沒見過面了吧？」"
90001170-21 = "我才不是Kei醬！？"
90001170-22 = "話說回來，這裡是哪裡？#n雖然我並沒有完全了解奇普托斯的環境……"
90001170-23 = "但這個地方總覺得有點陌生耶？"
90001170-24 = "好問題。這裡是冰海。"
90001170-25 = "冰海？是我知道的那個冰海嗎？#n我怎麼會在這裡……？"
90001170-26 = "這點我會慢慢向你說明的。"
90001170-27 = "總之先來互相做個自我介紹吧？#n雖然Kei應該已經很了解我和莉央了才對。"
90001170-28 = "嗯，嗯……"
90001170-29 = "你好，Kei。我是飛鳥馬季。"
90001170-30 = "曾經綁架過你和愛麗絲。PEACE，PEACE。"
90001170-31 = "你那能叫自我介紹嗎？"
90001170-32 = "我是和泉元英美。請多指教。"
90001170-33 = "……你好。#n唔嗯，怎麼說呢……初次見面，我是Kei。"
90001170-34 = "雖然其實這是被叫錯的名字……"
90001170-35 = "唉，誰叫王女說他比較喜歡這樣稱呼我……"
90001170-38 = "謝謝你保存了我的部分資料。"
90001170-39 = "雖然因為被移植到了鑰匙圈裡的關係，總是東搖西晃的。"
90001170-40 = "唔……！我的記憶……！#n總覺得好像被掛在拖把之類的東西上隨便對待……！？"
90001170-41 = "[s]「這個嘛……畢竟也沒有其他辦法……？」"
90001170-42 = "你那句話是認真的嗎……"
90001170-43 = "嗯……雖然這麼說可能有點奇怪，但我對你們已經多少有所了解。"
90001170-44 = "因為我能透過王女，取得關於你們的情報。#n但有關我的部分就……"
90001170-45 = "從現在開始了解就行了吧，Kei？#n以後還請多多指教。"
90001170-46 = "……我明白了。"
90001170-47 = "話說回來，請問王女現在在哪做什麼呢？"
90001170-48 = "[s3]「對了！說到這個！」\n[s4]「我想介紹一些人給Kei醬認識！」"
90001170-51 = "就說了Kei醬這個稱呼……！"
90001170-55 = "……唉，算了。#n我也知道[USERNAME]老師不是會接受這種要求的人。"
90001170-56 = "但也別因為這樣就露出「你這不是很懂嗎」的笑臉，看了很讓人不舒服……"
90001170-57 = "所以呢，想介紹給我的人是誰？"
90001170-59 = "[ns]「那就是……」"
90001170-65 = "咦，MomoTalk？而且是老師傳來的耶？"
90001170-69 = "……"
90001170-70 = "大家！差不多該回去囉！"
90001170-71 = "咦？這麼快？"
90001170-72 = "就是說呀，桃井！愛麗絲還想繼續玩！"
90001170-73 = "我，我已經累了……"
90001170-74 = "看吧，柚子也說他累了。#n而且老師說要幫我們泡可可亞耶！"
90001170-75 = "老師的可可亞……？#n那可是稀有的恢復道具呢！絕對不能錯過！"
90001170-76 = "對吧？快走吧！"
90001170-80 = "咦咦？太狡猾了，姐姐！等等我啊！#n來，柚子醬也快點！"
90001170-81 = "可可亞……一定很棒吧。"
90001170-87 = "老師！我們來了！"
90001170-88 = "沒錯！雖然還想再玩，但是恢復也很重要！"
90001170-89 = "[s]「歡迎你們。來，這四杯可可亞是給你們的。」"
90001170-90 = "謝謝老師。#n哇，好溫暖哦。"
90001170-91 = "那個……老師你不喝嗎？#n啊……已經喝過咖啡了是嗎？這，這樣啊……"
90001170-96 = "呼～真棒。感覺身體都快融化了呢。"
90001170-102 = "那麼……來，愛麗絲先進去吧？"
90001170-103 = "要愛麗絲先進去？為什麼呢……？"
90001170-104 = "這是因為……有個人要先讓愛麗絲見。"
90001170-106 = "要讓愛麗絲醬先……？"
90001170-107 = "難道是……！"
90001170-108 = "……"
90001170-110 = "可是有需要指定愛麗絲嗎……？"
90001170-111 = "……！"
90001170-112 = "難，難道說，該不會……！"
90001170-113 = "[s]「趕緊進去吧，愛麗絲。」"
90001170-114 = "……嗯，老師。#n不過愛麗絲希望老師能一起去。可以嗎？"
90001170-115 = "謝謝你，老師。還有……"
90001170-120 = "請緊緊抓住愛麗絲的手。"
90001170-121 = "因為愛麗絲現在全身都在發抖……連站都站不穩。"
90001170-124 = "謝謝你，老師。#n真的……非常謝謝你。"
90001170-138 = "……！"
90001170-139 = "……！"
90001170-140 = "…………"
90001170-141 = "…………"
90001170-142 = "Kei……是Kei對吧？"
90001170-143 = "王，王女……"
90001170-144 = "真的……真的是Kei……"
90001170-145 = "王女，我……"
90001170-149 = "Kei！"
90001170-150 = "請別再說該消失的人是自己了。"
90001170-151 = "別再說那樣才是正確的，也別再說自己必須消失了。"
90001170-152 = "這……"
90001170-153 = "拜託你，Kei。#n愛麗絲現在真的很開心……簡直無法用言語形容。"
90001170-154 = "能再見到Kei真是太好了。"
90001170-155 = "Kei居然能再次出現在愛麗絲眼前，真是不敢相信。"
90001170-156 = "謝謝你，Kei。真的很謝謝你。"
90001170-157 = "謝謝你再次……回到了愛麗絲眼前。"
90001170-158 = "所以請再也，再也……"
90001170-159 = "嗚……嗚嗚……"
90001170-160 = "是……我明白了，王女。"
90001170-161 = "現在一切都會沒事的。"
90001170-163 = "陽葵前輩、莉央前輩、英美、季和老師……真的很謝謝你們。"
90001170-164 = "愛麗絲明明是不及格的勇者，大家卻讓愛麗絲……能再見到Kei……#n真不知道該怎麼報答這份恩情……"
90001170-166 = "沒關係，愛麗絲。#n能見到愛麗絲開心的模樣，就是最大的回報了。"
90001170-167 = "沒錯，現在的Kei證明了我的理論是正確的。這樣就夠了。"
90001170-168 = "莉央……"
90001170-169 = "……我又說錯什麼話了嗎？"
90001170-170 = "……沒什麼。#n確實是你救活了Kei……但是……唉……"
90001170-175 = "在這充滿感動的氛圍中──桃井登場囉！"
90001170-176 = "啊，你是……"
90001170-177 = "姐，姐姐！？"
90001170-178 = "抱，抱歉，各位。#n我本來想阻止他的……"
90001170-180 = "那時候就是你把我打倒的吧！？#n就算你說已經忘了，我也記得清清楚楚！"
90001170-182 = "……這件事我也記得很清楚。#n雖然照理來說應該向你道歉才對……"
90001170-183 = "……但是不知道為什麼，我實在不太想這麼做。才羽桃井。"
90001170-184 = "[s]「Kei醬！？」"
90001170-185 = "K，Kei！？！？"
90001170-186 = "哦？你這股氣勢我倒還挺喜歡的。#n說吧，過去的宿敵。理由是什麼？"
90001170-188 = "因為你把王女帶壞了！"
90001170-189 = "[s] 「啊。」"
90001170-190 = "啊……"
90001170-191 = "你居然讓王女玩遊戲一整晚，結果自己卻先睡著！"
90001170-192 = "那，那是因為我們是遊戲開發部……！"
90001170-193 = "而且還讓王女在半夜喝可樂，卻沒讓他刷牙！"
90001170-194 = "可，可是那是無糖可樂啊……應該吧。"
90001170-195 = "那平時的飲食你又要怎麼解釋！？#n為了王女的健康，難道不該讓他攝取充分的纖維和植物營養素嗎！"
90001170-196 = "嗚嗚……你說的沒錯，但其實我也不怎麼喜歡蔬菜……"
90001170-197 = "這不僅限於王女！#n就算是為了你們自己也一樣，生活習慣是很重要的！"
90001170-198 = "拜託你們照顧好自己的身體好不好！#n真是的……！哈啊，哈啊……！"
90001170-199 = "你現在的狀態應該不需要呼吸吧？#n如果真的需要的話，要不要幫你提高冷卻裝置的功率？"
90001170-204 = "拜託！這只是一種慣用的表達形式！#n理解能力怎麼比我這種數據還低啊，莉央！"
90001170-205 = "K，Kei！？"
90001170-206 = "嗚啊！真的很抱歉，莉央前輩！這全都是愛麗絲的錯！#nKei一點錯也沒有！所以請你原諒他！"
90001170-208 = "呃，王女，我的意思是……"
90001170-209 = "沒關係，愛麗絲。#n雖然我不太能理解，但是Kei的思考迴路好像出現了大量憤怒雜訊。"
90001170-211 = "在某種層面上，真慶幸會長是這樣的性格……"
90001170-213 = "所以你們找我究竟有什麼事……不，是你把王女和朋友們叫到這裡的嗎？"
90001170-214 = "原來如此，你是要我們馬上進入正題啊。#n我喜歡這合理的選擇。"
90001170-218 = "Kei，我們希望你和愛麗絲能再次破壞多次元防護罩。"
90001170-219 = "莉央……莉央？至少先說明一下前因後果再……！"
90001170-220 = "等等，剛才好像出現了不能當作沒聽見的字眼。"
90001170-221 = "你剛才說多次元防護罩……？#n難道是我們所知的那個多次元防護罩嗎？"
90001170-222 = "[s5]「來來來……我現在就仔細地說明一下吧。」\n[s6]「愛麗絲和其他所有人就當作是複習，專心聽我說。」"
90001170-225 = "我明白了，老師。#n那麼我先睡一下，麻煩您說完再叫我。"
90001170-226 = "季，你那樣不好吧……"
90001170-227 = "沒關係的。以我和老師的交情，這麼做沒有任何問題。"
90001170-228 = "和老師的交情……？#n那個，季同學！？這到底是什麼意思！？！？"
90001170-230 = "（設法平息再次吵鬧起來的氛圍後……）"
90001170-231 = "（向Kei逐一說明了目前為止發生的事）"
90001170-236 = "所以最後的結論是……"
90001170-237 = "沒錯，雖然跟剛才說的內容有點重複，#n但我們希望你和愛麗絲，能夠破壞那個多次元防護罩。"
90001170-238 = "光是那個防護罩再次出現，奇普托斯就──"
90001170-239 = "一句話，我拒絕。"
90001170-240 = "！？"
90001170-241 = "！？"
90001170-242 = "……"
90001170-250 = "我感受到了，這是主張「還有事沒說清楚」的味道吧。"
90001170-251 = "那到底是什麼意思……#n或者應該說，你現在根本不可能從我身上感受到任何味道吧……？"
90001170-252 = "這也是從擺放在C&C部室的常識資料中學到的表達形式。"
90001170-253 = "……我果然不該問的。"
90001170-254 = "不過確實就像你說的一樣。#n在這件事上，你們遺漏了最重要的資訊。"
90001170-255 = "我直接說結論吧──多次元防護罩的破壞，就和賭上王女性命的賭博沒兩樣。"
90001170-256 = "或許你們會好奇當時的情況，我只能回答那純粹只是運氣好而已。"
90001170-257 = "……幸好事情能以我的犧牲畫下句點。"
90001170-259 = "咦！？"
90001170-260 = "你說什麼！？"
90001170-261 = "愛，愛麗絲醬和Kei醬……！？"
90001170-263 = "居然連你都叫我Kei醬……"
90001170-264 = "……可以告訴我詳細情況嗎？"
90001170-265 = "好吧，反正我也認為遲早必須說明。#n現在大家都在，應該是最適合的時機吧。"
90001170-267 = "（Kei冷靜地說明當天在生命守護者主艦上，發生在自己和愛麗絲身上的事）"
90001170-268 = "（大家聽完之後……）"
90001170-270 = "嗚啊啊啊啊～愛麗絲，對不起！我們都不知道……！"
90001170-271 = "愛麗絲醬……Kei醬……！"
90001170-272 = "嗚……嗚嗚……"
90001170-274 = "這……我們確實該為這件事反省呢。#n對不起，Kei。要是知道會那樣的話……"
90001170-275 = "……沒關係。#n畢竟你們就算想知道也無從得知吧。"
90001170-276 = "不知者無罪。#n當然如果在知道後還是沒有改變選擇的話，那就是你們的問題了。"
90001170-277 = "從這一點來看……#n唉，王女啊……"
90001170-278 = "咦，咦！？"
90001170-279 = "你為什麼欣然接受了所有條件呢？#n現在的你……"
90001170-280 = "應該充分理解破壞多次元防護罩的行為，對你我而言代表著什麼才對。"
90001170-281 = "……你說的對。對不起，Kei。"
90001170-282 = "愛麗絲確實也明白這件事。#n之所以沒說出來，是因為愛麗絲不希望再讓大家擔心了。"
90001170-283 = "萬一你在過程中出了什麼差錯──"
90001170-284 = "這點不必擔心，Kei。"
90001170-289 = "只要有友情和勇氣就能克服了！"
90001170-290 = "莉央前輩、陽葵前輩、英美、季，以及遊戲開發部的大家……"
90001170-291 = "最重要的是老師也在！"
90001170-292 = "不，王女。#n我的意思是……"
90001170-293 = "……沒什麼，王女那麼想並沒有錯。#n只是……"
90001170-294 = "這全都是老師的錯！"
90001170-295 = "[s]「等等！冤枉啊！到底為什麼！？」"
90001170-296 = "因為你給了王女不切實際的希望！"
90001170-297 = "[s]「你該不會想說給人希望是不好的吧！？」"
90001170-301 = "只要會傷害王女的全都是壞事！"
90001170-302 = "Kei！？請看在愛麗絲的面子上冷靜下來，Kei！"
90001170-304 = "現在我們已經知道，要請愛麗絲和Kei破壞多次元防護罩是不可行的了。"
90001170-305 = "但是問題依舊存在。"
90001170-306 = "是啊……接下來該怎麼做呢。"
90001170-308 = "話說……那個多次元防護罩和預言者，具體來說有什麼問題呢？"
90001170-310 = "嗯？就是……"
90001170-314 = "……咦？"
90001170-315 = "……！"
90001170-317 = "大家應該都已經漸漸發覺，現在預言者所做的事……"
90001170-318 = "說穿了只是躲在角落裡，用多次元防護罩保護自己並暗中活動不是嗎？"
90001170-319 = "呃……就像躲在殼裡的膽小蝸牛或烏龜一樣？"
90001170-320 = "這個比喻不錯，桃井。#n當然對方究竟躲在殼裡做什麼，確實很令人在意。"
90001170-321 = "不過目前只要維持現狀，進行追蹤和觀察就夠了吧。"
90001170-322 = "……那麼做確實很有效率。#n我怎麼會沒想到這麼簡單的事呢……"
90001170-323 = "這個嘛……我也不是不能理解。#n畢竟多次元防護罩的概念初次出現的時候，確實是奇普托斯的一大危機。"
90001170-324 = "大家會因為它的再次出現而產生危機感也很正常。"
90001170-325 = "因為人類總是會以過去的經驗來衡量未來。"
90001170-327 = "原來如此，我認為這話說得相當不錯，Kei。#n不過這樣一來……"
90001170-328 = "……現在究竟該做什麼呢？"
90001170-333 = "……"
90001170-334 = "……"
90001170-336 = "……大家要一起玩《故事．傳說．編年史》嗎？"
90001170-337 = "我死也不要，王女！"
90001170-338 = "K，Kei……再試一次的話，說不定會有不同的感想……#n比如說回憶，或者美好的過去之類的……"
90001170-339 = "那是不可能的！王女也很清楚吧！"
90001170-340 = "是，是沒錯啦……"
90001170-342 = "總之現在的重點是決定接下來該做什麼。"
90001170-343 = "所以我決定先來製造Kei的身體。"
90001170-348 = "……嗯？"
90001170-349 = "咦……？"
90001170-350 = "不是，等等。先等一下！#n事情為什麼會變成那樣！？"
90001170-351 = "Kei現在的狀況，就和脖子以下全數壞死的植物人沒兩樣。#n所以才會導致他累積了更多不滿吧。"
90001170-352 = "原來如此，就是那股不滿加劇了Kei的暴力性，導致無法進行對話……#n你的分析還算合理呢，莉央。"
90001170-353 = "[s]「哦，聽你這麼一說，好像確實如此。」"
90001170-354 = "謝謝你們這麼快就能理解我的意思，陽葵、老師。"

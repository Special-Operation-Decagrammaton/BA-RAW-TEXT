90001170-379 = "ใช่แล้วละ ฉันไม่รู้ว่ามันเหมาะหรือเปล่าที่จะพูดแบบนี้ แต่ยังไงก็..."
90001170-385 = "เชื่อใจฉันเถอะนะ อาริสึ"
90001170-386 = "ขอบคุณนะคะ รุ่นพี่ริโอะ! รุ่นพี่ฮิมาริด้วยค่ะ!"
90001170-387 = "ค่ะ อาริสึ พวกเราจะพยายามอย่างสุดความสามารถเลยค่ะ"
90001170-388 = "ฟังที่ฉันพูดด้วยสิคะ! ฉันกำลังขอความช่วยเหลืออยู่นะคะ!"
90001170-389 = "[s] \"ใจเย็นๆ ก่อนนะ เคย์ ทุกคนทำแบบนี้เพราะพยายามจะช่วยเคย์นะ\""
90001170-390 = "แต่ก็เพิกเฉยต่อความคิดเห็นของคนที่จะช่วยงั้นเหรอคะ?! "
90001170-391 = "อ้างว่าจะแสวงหาความสมเหตุสมผล แต่กลับจะแสดงเซนส์ทางสุนทรียศาสตร์ของตัวเองแทน ใครก็ได้ช่วยห้ามคนแบบนี้ก่อนเถอะค่ะ!"

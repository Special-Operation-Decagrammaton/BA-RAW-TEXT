[translation]
90001170-1 = "Episode 17;Reunion"
90001170-3 = "...And that is how we woke you up."
90001170-4 = "Yes. Rio especially played a very large role. Please give her credit, Kei."
90001170-5 = "And of course, I am the one who worked the hardest to follow Rio's orders."

1010906-68 = "3;노아 파자마;03;괜찮아요. 어차피 흰 옷을 입고 일상을 보내는 데에는 익숙하거든요.\n#3;a\n#3;em;[음표]"
1010906-69 = "3;노아 파자마;01;다들 흰 옷만 입으면 관리하기 불편하지 않냐고 자주 물어보지만, 흰 옷만의 장점도 많답니다."
1010906-70 = "3;노아 파자마;05;흰 바탕의 옷은 어떤 색과도 조화롭게 어우러지고, 잡스러운 것이 묻었을 때 털어내기도 쉽거든요."
1010906-71 = "3;노아 파자마;99;게다가 빛을 잘 반사하는 성질 덕분에 열을 잘 머금지 않으니, 더위에 약한 제게는 꼭 맞는 색이랍니다."
1010906-72 = "3;노아 파자마;99;거기에 더해 가끔 이렇게 '얼룩'이 묻게 되면…… 오랫동안 그 흔적을 선명하게 곱씹어 볼 수 있으니까요.\n#fontsize;50\n#3;em;…"
1010906-73 = "[ns] \"노아.\""
1010906-74 = "3;노아 파자마;09;네, 네?! 방금 제가 뭔가 이상한 소리를 했나요?\n#3;shake\n#3;em;[?!]"
1010906-75 = "[s7] \"그게 아니라. 흰 옷에 묻은 커피 얼룩은 지우기 어려우니까……\"\n[s8] \"괜찮다면 지금 바로 세탁실에 가서 얼룩을 지우고 와도 돼.\""

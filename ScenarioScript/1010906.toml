1010906-53 = "3;노아 파자마;03;지난번에 여벌 잠옷을 샬레에 두고 가길 잘했네요."
1010906-54 = "3;노아 파자마;01;오늘은 남은 당번 시간 동안 이 옷을 입고 업무를 진행하겠습니다.\n#3;em;[재잘]"
1010906-55 = "[s] \"하지만 다른 학생이 보고 오해를 하면 어쩌지……?\""
1010906-56 = "3;노아 파자마;08;그야, 커피가 묻어서 다른 옷으로 갈아입었다고 하면 다들 납득해 주지 않을까요?\n#3;em;[?]"

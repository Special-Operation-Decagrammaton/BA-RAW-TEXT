1010906-24 = "3;노아;04;괘, 괜찮으신가요. 선생님?\n#3;closeup\n#3;em;[땀]"
1010906-25 = "[s] \"괜찮아. 노아는 다치지 않았어?\""
1010906-26 = "3;노아;03;네, 저도 괜찮아요.\n#3;closeup\n#3;em;[재잘]"
1010906-27 = "3;노아;02;컵이 흔들리면서 커피가 조금 넘쳐흐른 모양이네요. 차가운 물로 손을 식혀 주세요.\n#3;closeup"
1010906-28 = "3;노아;01;바닥에 흐른 커피는 닦으면 되고…… 치마에 커피 자국이 조금 생기긴 하지만, 신경 쓰일 정도는 아니네요.\n#3;closeup"
1010906-29 = "[s3] \"미안, 흰 치마라서 신경 쓰일 텐데.\"\n[s4] \"신경 쓰이면 다른 옷으로 갈아입고 와도 괜찮아.\""

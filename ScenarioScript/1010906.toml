1010906-41 = "3;노아;05;—아니, 역시 이 상태로는 업무를 하는 동안 계속 신경이 쓰일 것 같긴 하네요."
1010906-42 = "3;노아;03;그럼 잠시 실례하겠습니다, 선생님. 바로 '편한 옷'으로 갈아입고 올게요.\n#3;greeting"

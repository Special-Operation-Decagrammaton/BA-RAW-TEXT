[translation]
1010906-1 = "จุดเล็กๆ บนนั้น"
1010906-2 = "สำนักงานชาเล่ต์"
1010906-4 = "(วันรุ่งขึ้น ในขณะที่คุณครูกำลังเคลียร์งานของชาเล่ต์กับโนอา...)"
1010906-8 = "[ns] \"พอหนังท้องตึง หนังตาก็หย่อนแฮะ...\""
1010906-10 = "[ns] \"โนอา กินกาแฟแก้ง่วงกับครูมั้ย?\""
1010906-11 = "อ๊ะ ฉันกำลังอยากได้กาแฟสักแก้วอยู่พอดีเลยค่ะ"
1010906-12 = "ถ้างั้น ฉันขอแก้วหนึ่งนะคะ"
1010906-17 = "[ns1] \"มาแล้ว กาแฟดำปริ่มแก้วเลย...\"\n[ns2] \"ครูชงมาให้เต็มแก้วเลย...\""
1010906-23 = "[ns] \"อ๊ะ ร้อนๆๆ!\""
1010906-24 = "ปะ... เป็นอะไรหรือเปล่าคะ? คุณครู?"
1010906-25 = "[s] \"ครูไม่เป็นไร โนอาไม่ได้โดนกาแฟลวกใช่มั้ย?\""
1010906-26 = "ค่ะ ฉันก็ไม่เป็นไรค่ะ"
1010906-27 = "แต่เหมือนว่ากาแฟจะหกตอนคุณครูทำแก้วสั่นนะคะ ไปแช่มือด้วยน้ำเย็นเถอะค่ะ"
1010906-28 = "ส่วนกาแฟที่หกเลอะพื้นน่ะ แค่เช็ดก็หาย... และถึงกระโปรงฉันจะมีคราบกาแฟที่กระเด็นใส่ แต่มันก็แค่นิดหน่อยเองค่ะ ไม่ต้องใส่ใจก็ได้ค่ะ"
1010906-29 = "[s3] \"ขอโทษนะ กระโปรงเป็นสีขาวด้วยสิ\"\n[s4] \"จะไปเปลี่ยนเป็นชุดอื่นมาก็ได้นะ\""
1010906-36 = "ไม่เป็นไรหรอกค่ะ เดี๋ยวไว้ฉันกลับไปซักที่ห้อง..."
1010906-41 = "ไม่สิ แต่ถ้าเห็นว่ากระโปรงสีขาวเปื้อนอยู่อย่างนี้ ระหว่างทำงานมันอาจจะกวนใจฉันก็ได้"
1010906-42 = "ถ้างั้นฉันขอเสียมารยาทหน่อยนะคะคุณครู ฉันจะไปเปลี่ยนเป็น 'ชุดสบายๆ' แล้วกลับมานะคะ"
1010906-47 = "(ครู่ต่อมา...)"
1010906-50 = "กลับมาแล้วค่ะ~"
1010906-51 = "[s] \"โนอา ชุดนี้มัน...?\""
1010906-52 = "คะ? ก็ 'ชุดสบายๆ' ตามที่ฉันบอกไงคะ"
1010906-53 = "ดีนะคะที่คราวก่อนฉันเอาชุดนอนมาไว้ที่ชาเล่ต์หลายชุดเลย"
1010906-54 = "วันนี้ฉันจะใส่ชุดนี้ทำงานตลอดเวลาเข้าเวรที่เหลือเลยค่ะ"
1010906-55 = "[s] \"แต่ถ้านักเรียนคนอื่นมาเห็นแล้วเข้าใจผิดล่ะจะทำยังไง...?\""
1010906-56 = "ถ้าบอกว่าทำกาแฟหกใส่ ก็เลยเปลี่ยนมาใส่เป็นชุดอื่น ก็น่าจะเชื่อกันนะคะ ก็มันเรื่องจริงนี่?"
1010906-61 = "หรือว่าคุณครูมีเรื่องอื่นที่กังวลเหรอคะ?"
1010906-62 = "[s5] \"ไม่มีอะไรมากหรอก แต่ครูแค่เห็นว่ามันสีขาวทั้งชุดน่ะ...\"\n[s6] \"ชุดนอนสีขาวทั้งชุด ครูกลัวว่าจะต้องระวังกว่าเดิมน่ะ\""
1010906-68 = "ไม่เป็นไรค่ะ ฉันคุ้นชินกับการใส่เสื้อผ้าสีขาวในชีวิตประจำวันอยู่แล้วค่ะ"
1010906-69 = "หลายๆ คนก็ถามฉันว่าใส่เสื้อผ้าสีขาวแล้วจะไม่สะดวกหรือเปล่า แต่สำหรับฉัน ข้อดีของเสื้อผ้าสีขาว#nก็มีเยอะแยะค่ะ"
1010906-70 = "เสื้อผ้าสีขาวเข้าได้กับทุกสี และถ้าเปื้อนอะไรก็จะเห็นได้อย่างชัดเจน ตอนซักก็จะสังเกตได้ง่ายด้วยค่ะ ว่าสะอาดหรือยัง"
1010906-71 = "ยิ่งไปกว่านั้น สีขาวยังกักเก็บความร้อนได้ไม่ดี ตอนใส่จึงไม่ร้อน มันเลยเหมาะกับฉันที่เป็นคนขี้ร้อนค่ะ"
1010906-72 = "และบางครั้งถ้าเกิด 'รอยเปื้อน' เหมือนอย่างของวันนี้... ฉันก็จะคิดทบทวนเกี่ยวกับรอยนั้นได้ไปนานๆ ด้วยค่ะ"
1010906-73 = "[ns] \"โนอา\""
1010906-74 = "คะ... คะ?! เมื่อกี้ฉันพูดอะไรแปลกๆ ออกไปเหรอคะ?"
1010906-75 = "[s7] \"ไม่หรอก แต่คราบกาแฟมันซักออกยากน่ะ\"\n[s8] \"ครูว่ารีบไปห้องซักผ้าแล้วซักเอาคราบกาแฟออกเลยดีกว่า\""
1010906-78 = "..."
1010906-79 = "คุณครูนี่นะ จริงๆ เลย..."
1010906-80 = "คุณครูมีความรู้สึกช้าในบางเรื่องนะคะ"
1010906-81 = "[s] \"หืม? ทำไมถึงอารมณ์เสียล่ะ?\""
1010906-82 = "ไม่รู้ค่ะ..."
1010906-84 = "(หลังจากนั้นคุณครูก็ต้องปลอบโนอาที่ไม่รู้ว่างอนอะไรอยู่พักใหญ่...)"

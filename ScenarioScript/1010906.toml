[translation]
1010906-1 = "上面的小污漬"
1010906-2 = "夏萊．辦公室"
1010906-4 = "（隔天，和乃愛一起處理夏萊的工作時……）"
1010906-8 = "[ns]「可能是因為剛吃完午餐，總覺得懶懶的……」"
1010906-10 = "[ns]「乃愛，要一起喝杯咖啡嗎？」"
1010906-11 = "啊，剛好我也想來一杯咖啡呢。"
1010906-12 = "那麼就麻煩老師了。"
1010906-17 = "[ns1]「來，這是黑咖啡。」\n[ns2]「裝得有點滿，喝的時候小心──」"
1010906-23 = "[ns]「啊，好燙！」"
1010906-24 = "你，你沒事吧？老師？"
1010906-25 = "[s]「我沒事，乃愛沒有受傷吧？」"
1010906-26 = "嗯，我沒事。"
1010906-27 = "因為杯子晃到的關係，咖啡似乎灑了一點出來。#n請快用冷水沖沖手吧。"
1010906-28 = "地板上的咖啡只要擦掉就行了……#n雖然裙子上有點咖啡漬，不過還不到讓人在意的程度。"
1010906-29 = "[s3]「對不起，因為你穿的是白裙，應該很在意吧。」\n[s4]「如果很在意的話，可以先去換其他衣服。」"
1010906-36 = "沒關係的，反正我回去之後就會馬上洗衣服──"
1010906-41 = "──不，如果就這樣繼續工作的話，我好像會一直在意這件事情。"
1010906-42 = "那麼不好意思，老師。#n我立刻去換上「舒適的衣服」。"
1010906-47 = "（不久後……）"
1010906-50 = "我回來了～"
1010906-51 = "[s]「乃愛，你這身打扮是……？」"
1010906-52 = "嗯？就是剛才說的「舒適的衣服」呀。"
1010906-53 = "幸好上次在夏萊留了很多套睡衣。"
1010906-54 = "今天我就穿這件衣服，完成剩下的值日生工作吧。"
1010906-55 = "[s]「要是被其他學生看到後誤會怎麼辦……？」"
1010906-56 = "只要解釋說是因為沾到咖啡而換了其他衣服的話，他們應該可以理解吧？"
1010906-61 = "還是老師擔心的是其他問題呢？"
1010906-62 = "[s5]「那倒不是……」\n[s6]「不過你的睡衣也是白色的，我怕你工作起來不方便。」"
1010906-68 = "沒關係。我平常就習慣穿白色的衣服了。"
1010906-69 = "雖然常被大家問說白衣服會不會很難照顧，不過白衣服的優點也很多。"
1010906-70 = "除了能跟任何顏色巧妙融合之外，沾到髒東西的時候也很好清理。"
1010906-71 = "而且因為容易反光導致不太會吸熱，所以白衣服很適合怕熱的我。"
1010906-72 = "偶爾像這樣沾到「污漬」的時候……也能清楚又長久地仔細回味。"
1010906-73 = "[ns]「乃愛。」"
1010906-74 = "咦，咦！？我剛才說了什麼奇怪的話嗎？"
1010906-75 = "[s7]「沒有，只是咖啡漬沾在白衣服上會很難清理……」\n[s8]「所以你可以馬上去洗衣間洗掉沒關係。」"
1010906-78 = "……"
1010906-79 = "老師真的……"
1010906-80 = "在某些方面意外遲鈍呢。"
1010906-81 = "[s]「嗯？為什麼你好像心情不太好？」"
1010906-82 = "……不跟你說。"
1010906-84 = "（之後為了安撫莫名不高興的乃愛，費了好一番功夫……）"

[translation]
10010090-1 = "ตอนที่ 9;เรื่องราวที่ยังไม่สิ้นสุด 1"
10010090-13 = "ฉันตรวจดูแล้วค่ะ เป็นยาตัวนี้ถูกแล้วค่ะ"
10010090-17 = "ระหว่างนี้กาวมอสก็ละลายบ้างแล้ว... ส่วนยาเราก็หามาได้แล้ว..."
10010090-18 = "เค้กที่เอาไว้กินระหว่างทำงานก็หามาได้แล้วเหมือนกัน ทุกอย่างพร้อมแล้วค่ะ เริ่มทำได้เลย"
10010090-19 = "จะ... จริงเหรอคะ? ขอบคุณมากนะคะ...!"
10010090-20 = "ว่าแต่... ระหว่างนี้ฉันต้องทำอะไร...?"
10010090-21 = "ให้ทำความสะอาดให้ไหมคะ? หรือว่า... ให้เป็นลูกมืออยู่ข้างๆ..."
10010090-28 = "คือ..."
10010090-29 = "คือว่า..."
10010090-30 = "ตอนนี้ไม่มีอะไรที่ต้องให้คุณทำแล้วละค่ะ... นอนพักเฉยๆ เถอะค่ะ..."
10010090-31 = "คะ...? นะ... นอนเหรอคะ?"
10010090-32 = "อ๊ะ…"
10010090-33 = "ฉันเผลอพูดอะไรแบบนี้อีกแล้ว..."
10010090-34 = "ขอโทษนะคะ... ฉันไม่ได้มีเจตนาพูดในแง่ร้ายหรอกค่ะ ฉันจะบอกว่าไม่ต้องช่วยก็ได้น่ะค่ะ..."
10010090-35 = "ถึงจะไม่ได้ตามไปหาของด้วย แต่ดูจากสถานการณ์และสภาพของของที่ได้มาแล้ว ฉันว่าฉันพอเดาอะไรได้อยู่ค่ะ"
10010090-36 = "น่าจะเกิดเรื่องอะไรเยอะเลยนะคะ ของแต่ละอย่างที่ต้องใช้เป็นของที่ไม่ได้หามาง่ายๆ เลย น่าจะเป็นการหาที่เกินกำลังและต้องฝืนใจทำตั้งแต่ต้นเลยละค่ะ"
10010090-37 = "เพราะงั้นก็นอนพักก่อนเถอะค่ะ จริงๆ ก็ง่วงใช่ไหมล่ะคะ?"
10010090-38 = "คุณครูเองก็น่าจะเหนื่อยเหมือนกัน ใช่ไหมคะ?"
10010090-39 = "เอ่อ... เอาไงดี... คุณครูคะ...?"
10010090-40 = "[s1] \"งั้นเราพักกันหน่อยไหม?\"\n[s2] มองรอบๆ เพื่อหาที่นอน"
10010090-41 = "ตรงที่คุณทั้งสองอยู่ตอนนี้... ฉันใช้ตรงนั้นเป็นที่นอนน่ะค่ะ น่าจะมีที่เหลือเฟือนะคะ"
10010090-42 = "ตรงที่คุณทั้งสองอยู่ตอนนี้... ฉันใช้ตรงนั้นเป็นที่นอนน่ะค่ะ น่าจะมีที่เหลือเฟือนะคะ"
10010090-43 = "ถึงจะไม่ใช่ที่นอนที่เป็นเตียงหรูหราก็เถอะ... แต่อย่างน้อยก็น่าจะทำให้คุณครูพักผ่อนและไม่เจ็บป่วยได้ค่ะ..."
10010090-44 = "......"
10010090-48 = "ฉะ... ฉันขอเตือนไว้ก่อนนะคะ..."
10010090-49 = "ถ้าทำเป็นดมกลิ่นอะไรละก็ ฉันไล่ออกข้างนอกเลยนะคะ..."
10010090-50 = "[s3] \"ขอบใจนะ\"\n[s4] \"งั้นครูของีบหน่อยนะ\""
10010090-51 = "ขอบคุณที่ช่วยหาของมาให้นะคะ... ทั้งสองคนเลยค่ะ"
10010090-52 = "ขอบคุณที่ช่วยหาของมาให้นะคะ... ทั้งสองคนเลยค่ะ"
10010090-53 = "พักผ่อนกันเถอะค่ะ... จากนี้ให้เป็นหน้าที่ของฉันเองค่ะ"

1301202-25 = "3;키리노;09;저 시민…… 어쩐지 수상하네요."
1301202-26 = "3;키리노;99;기분 나쁜 미소를 머금고 있는 데다가, 수상쩍어 보이는 항아리를 저렇게나 소중히 들고 걸어가다니……."
1301202-27 = "[s1] \"깨지기 쉬운 물건이라도 담긴 게 아닐까?\"\n[s2] \"비싼 물건이라도 담긴 게 아닐까?\""
1301202-28 = "3;키리노;09;아뇨. 깨지기 쉬운 물건 치고는 걸음걸이가 수상해요.\n#3;em;[땀]\n#3;stiff"
1301202-29 = "3;키리노;09;아뇨. 비싼 물건 치고는 걸음걸이가 수상해요.\n#3;em;[땀]\n#3;stiff"
1301202-30 = "3;키리노;05;저건 아마도……"
1301202-31 = "3;키리노;08;폭탄일 게 분명해요!\n#3;em;[!]\n#fontsize;80\n#3;closeup"

1301202-105 = "3;키리노;06;본관이 육감을 과신하는 바람에, 이번에는 너무 성급히 결정을 내려버린 것 같습니다."
1301202-106 = "[s3] \"그래도 소매치기를 막을 수 있어서 다행이야.\"\n[s4] \"……중범죄가 일어나지 않아서 실망한거야?\""
1301202-107 = "3;키리노;00;네. 비록 경비국으로 전과할 수 있을 정도의 실적은 올리지 못했지만, 시민의 안전을 지킬 수 있었으니까요.\n#3;em;[반응]"
1301202-108 = "3;키리노;07;그, 그럴리가요! 발키리 경찰학교의 학생으로서 언제나 시민의 안전을 최우선으로 생각하고 있다고요?\n#3;stiff\n#3;em;[땀]"
1301202-109 = "3;키리노;99;시민의 안전을 지키고 받은 이 겨된장 절임이야 말로 경찰의 훈장입니다!\n#3;greeting\n#3;em;[반짝]"
1301202-110 = "3;키리노;02;음…… 하지만 혼자 먹기에는 조금 양이 많은 것 같은데……."

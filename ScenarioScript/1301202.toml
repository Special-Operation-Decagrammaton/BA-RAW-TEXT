1301202-95 = "1;퍼그 시민;01;네, 이 시기가 되면 부모님께서 직접 담근 겨된장 절임을 보내주시거든요."
1301202-96 = "1;퍼그 시민;01;마침 요새 입맛이 없던 참이었는데…… 이 겨된장 절임만 있으면 입맛을 돋우기엔 충분해요!\n#1;em;[재잘]\n#1;hophop"

[translation]
1301202-1 = "อาชญากรรมที่ไม่รีบร้อน"
1301202-2 = "ส่วนกลางคิโวทอส เขตธุรกิจที่ 4"
1301202-3 = "เชิญค่ะคุณครู"
1301202-4 = "ในเมื่อคุณครูมาถึงแล้ว เรามาเริ่มการลาดตระเวนของวันนี้กันเลยดีกว่าค่ะ!"
1301202-5 = "[s] \"ให้ลาดตระเวนอะไรเหรอ?\""
1301202-6 = "ถามได้ดีมากค่ะ!"
1301202-7 = "งานของตำรวจคือป้องกันอาชญากรรมและกำจัดปัจจัยใดๆ ที่จะก่อให้เกิดภัยอันตรายแก่ประชาชน..."
1301202-8 = "ดังนั้นเราจึงต้องสำรวจและสืบค้นทุกอย่างรอบตัวที่ดูหน้าสงสัยค่ะ!"
1301202-9 = "[s] \"แต่แถวนี้ก็ดูสงบสุขดีนี่...\""
1301202-10 = "ไม่หรอกค่ะ! อาชญากรรมเกิดขึ้นได้ทุกที่เลยนะคะ!"
1301202-11 = "นักสืบมากประสบการณ์สามารถตามกลิ่นคดีได้แม้ในสถานที่ที่ดูสงบสุขแบบนี้แหละค่ะ!"
1301202-12 = "(ทำจมูกฟุดฟิด) ไหนดูซิ... มีกลิ่นเหตุการณ์อะไรน่าสงสัยมั้ย..."
1301202-17 = "ฮุฮุฮุ ในที่สุดก็ได้มาสักที แค่มีสิ่งนี้ก็พอแล้วล่ะ!"
1301202-18 = "รีบๆ ไปทำ... ดีกว่า"
1301202-24 = "(กระซิบ) คุณครูคะ เห็นตรงนั้นมั้ยคะ?"
1301202-25 = "ชาวเมืองคนนั้น... ฉันว่าดูน่าสงสัยค่ะ"
1301202-26 = "เขายิ้มอรุ่มเจ๊าะอยู่คนเดียวแบบนั้น แถมยังกอดไหน่าสงสัยนั่นเอาไว้อย่างทะนุถนอมด้วย..."
1301202-27 = "[s1] \"อาจมีของแตกง่ายอยู่ในนั้นก็ได้?\"\n[s2] \"ใส่อะไรแพงๆ ไว้ข้างในหรือเปล่านะ?\""
1301202-28 = "ไม่หรอกค่ะคุณครู ดูจากท่าทางการถือของเขาแล้วไม่น่าใช่การปกป้องสิ่งของที่แตกง่ายหรอกค่ะ"
1301202-29 = "ไม่หรอกค่ะคุณครู ดูจากท่าทางการถือของเขาแล้วไม่น่าใช่การปกป้องสิ่งของแพงๆ หรอกค่ะ"
1301202-30 = "แสดงว่านั่นจะต้องเป็น..."
1301202-31 = "ระเบิด...!  ต้องเป็นระเบิดแน่เลยค่ะ!"
1301202-32 = "[s] \"ระเบิดเหรอ?!\""
1301202-34 = "ใช่ค่ะ ก็แถวนี้เป็นเขตธุรกิจที่บริหารงานหลักๆ ของคิโวทอสยังไงล่ะคะ"
1301202-35 = "เขาต้องเป็นผู้ก่อการร้ายที่ได้รับการชักจูงจากพวกเด็กเกเรแล้วพยายามจะระเบิดเมืองเพื่อทำให้#nการบริหารงานที่นี่ต้องหยุดชะงักแน่ๆ เลยค่ะ!"
1301202-36 = "โชคดีที่เราที่สืบเรื่องนี้ได้ก่อนจะเกิดการก่อการร้ายขนาดใหญ่ในเมืองนะคะ"
1301202-37 = "[s] \"งั้นก็ต้องรีบไปจับกุมไม่ใช่เหรอ?\""
1301202-38 = "เราต้องรอก่อนค่ะ เพราะการครอบครองระเบิดในเขต D.U. ยังไม่ถือว่าเป็นอาชญากรรมค่ะ"
1301202-39 = "เราต้องแอบสะกดรอยตามผู้ต้องสงสัยแล้วค่อยเข้าจับกุมในจังหวะที่เขาก่ออาชญากรรมค่ะ"
1301202-40 = "อ๊ะ! ผู้ต้องสงสัยเริ่มเคลื่อนไหวแล้วค่ะ!"
1301202-41 = "รีบสะกดรอยตามไปเถอะค่ะคุณครู!"
1301202-47 = "อืม... แปลกจังเลยนะคะ..."
1301202-48 = "นี่เราก็สะกดรอยตามมาตั้งนานแล้ว แต่ผู้ต้องสงสัยยังไม่เอาระเบิดออกมาสักทีเลย"
1301202-49 = "หรือว่าที่นี่ไม่ใช่เป้าหมายที่จะก่อเหตุกันนะ...?"
1301202-50 = "[s] \"หรือว่าเราเข้าใจผิดกันไปเอง?\""
1301202-51 = "เป็นไปไม่ได้หรอกค่ะ เซนส์ของฉันไม่เคยผิดเลยนะคะ!"
1301202-52 = "เราแค่ต้องรออีกหน่อย..."
1301202-60 = "อะ...อะไรน่ะ?!"
1301202-62 = "ฮ่าฮ่าฮ่า ไหราคาแพงนี่ ฉันขอแล้วกัน!"
1301202-64 = "โจรนี่นา! โจร!"
1301202-66 = "ไม่ได้การละ! มีอาชญากรอีกคนโผล่มาขโมยระเบิดของผู้ต้องสงสัยไปแล้วค่ะ"
1301202-67 = "แล้วฉันจะมามัวพูดมากอยู่ทำไมเนี่ย! ต้องรีบไปจับโจรสิ!"
1301202-68 = "นี่ หยุดนะ! หยุดเดี๋ยวนี้! ถ้าไม่หยุดฉันยิงแน่!"
1301202-73 = "(คิริโนะเริ่มไล่ล่าโจร...)"
1301202-87 = "อึ่ก... ไม่อยากเชื่อเลยว่าระยะแค่นี้ ฉันก็ยังยิงพลาดทุกนัดเลย"
1301202-88 = "แต่ก็ยังโชคดีที่โจรทิ้งของไว้แล้วก็หนีไป เราก็เลยเก็บกู้ระเบิดกลับมาได้อย่างปลอดภัยค่ะ!"
1301202-89 = "เอาละ ทีนี้ก็เหลือแค่จับกุมผู้ต้องสงสัย..."
1301202-91 = "เอ๋? นี่มันกลิ่นอะไรคะเนี่ย?"
1301202-92 = "อ๊ะ! คุณตามเอาของที่ถูกขโมยไปกลับมาได้เหรอครับ!"
1301202-93 = "นี่เป็นเต้าเจี้ยวหมักสูตรพิเศษที่ทางบ้านของผมส่งมาให้ เกือบทำหายก่อนได้กินแล้วมั้ยละ!"
1301202-94 = "เต้าเจี้ยวหมักงั้นเหรอคะ?!"
1301202-95 = "ใช่ครับ ปกติช่วงนี้ของปีพ่อแม่ของผมจะส่งเต้าเจี้ยวหมักมาให้น่ะครับ"
1301202-96 = "ช่วงนี้ไม่อยากอาหารอยู่พอดี ถ้ามีเต้าเจี้ยวหมักนี่ละก็น่าจะช่วยกระตุ้นความอยากอาหารขึ้นมา#nได้บ้างครับ!"
1301202-97 = "อะไรกัน ไม่ใช่ระเบิดหรอกเหรอ..."
1301202-98 = "ว่าไงนะครับ? ระเบิดเหรอ?"
1301202-99 = "แต่ไหนๆ คุณก็เข้ามาช่วยแบบนี้ ผมจะแบ่งเต้าเจี้ยวหมักไปให้ทานแล้วกันครับ#nรับรองได้เลยว่ามันอร่อยกลมกล่อมมาก!"
1301202-102 = "ขะ... ขอบคุณค่ะ"
1301202-104 = "ผู้ต้องสงสัยที่อุตส่าห์ทุ่มเทสะกดรอยตามมาตั้งนานกลับไม่ใช่มือระเบิด... จู่ๆ ก็รู้สึกหมดแรงขึ้น#nมาเลยค่ะ"
1301202-105 = "ครั้งนี้ฉันน่าจะด่วนตัดสินใจไปหน่อยเพราะเชื่อในเซนส์ของตัวเองมากเกินไปค่ะ"
1301202-106 = "[s3] \"แต่โชคดีที่ขัดขวางเรื่องถูกขโมยของไว้ได้น่ะ\"\n[s4] \"ผิดหวังที่ไม่มีอาชญากรรมร้ายแรงเกิดขึ้นเหรอ?\""
1301202-107 = "ค่ะ ถึงจะนับเป็นผลงานที่จะทำให้ฉันได้ย้ายภาควิชาไปยังสำนักความมั่นคงไม่ได้#nแต่ยังไงก็ถือว่าได้ช่วยรักษาความปลอดภัยของพลเมืองไว้ได้ค่ะ"
1301202-108 = "มะ...ไม่ใช่นะคะ?! ในฐานะของนักเรียนสถาบันฝึกตำรวจวัลคิรี่ ฉันคำนึงถึงความปลอดภัย#nของพลเมืองเป็นอันดับแรกอยู่แล้วค่ะ!"
1301202-109 = "เต้าเจี้ยวหมักที่ได้จากการพิทักษ์ชาวเมืองในวันนี้ถือว่าเป็นตราเกียรติยศของตำรวจได้เลยละค่ะ!"
1301202-110 = "อืม แต่นี่มันเยอะเกินกว่าที่จะกินคนเดียวหมด..."
1301202-111 = "งั้นลาดตระเวนวันนี้เสร็จแล้วเรามากินอาหารเย็นด้วยกันมั้ยคะ?"
1301202-113 = "(หลังจากนั้นคุณครูก็ลาดตระเวนกับคิริโนะต่ออีกหน่อยแล้วก็กลับชาเล่ต์ไปกินเต้าเจี้ยวหมักด้วยกัน)"
1301202-114 = "(แต่พอไม่ได้กินกับข้าวสวย... ตราเกียรติยศอันนี้มันก็ออกจะเค็มเกินไปสักหน่อย)"

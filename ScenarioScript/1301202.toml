[translation]
1301202-1 = "悠閒的大搜查線"
1301202-2 = "奇普托斯中央區．第4商業區"
1301202-3 = "啊，老師。工作辛苦了！"
1301202-4 = "那麼再重申一次，我們來開始今天的巡邏吧！"
1301202-5 = "[s] 「好。有哪些需要特別注意的地方嗎？」"
1301202-6 = "原來如此，這問題問得很好！今天沒有特殊狀況需要特別留意，但依然強調一下……"
1301202-7 = "以前應該也有跟老師說過了，警察基本的工作是預防犯罪，事前排除可能會危害市民的所有因素。"
1301202-8 = "因此，我們要仔細確認檢查周遭是否有不尋常的事物！"
1301202-9 = "[s] 「但這附近看起來很和平呀……」"
1301202-10 = "老師太天真了！犯罪的種子潛藏在任何地方！"
1301202-11 = "換作老練搜查官，就算是看似和平的現場也能馬上聞到事件的味道！"
1301202-12 = "我來聞聞……嗯嗯，原來如此。可疑事件的味道……"
1301202-17 = "這下……總算…………了……！"
1301202-18 = "我得……盡快…………不然……"
1301202-24 = "……老師，你看到了嗎？在那邊，那個街角……"
1301202-25 = "那位民眾……飄散著一股可疑的氣息。"
1301202-26 = "帶著目中無人的笑容，並小心翼翼捧著感覺就很可疑的壺罐……"
1301202-27 = "[s1] 「只是因為是易碎物品才小心搬運吧？」\n[s2] 「只是因為是昂貴物品才小心搬運吧？」"
1301202-28 = "不。就算要搬運易碎物品，他走路的樣子也不太自然。"
1301202-29 = "不。就算要搬運昂貴物品，他走路的樣子也不太自然。"
1301202-30 = "我猜那東西……"
1301202-31 = "一定是炸彈！"
1301202-32 = "[s] 「炸彈！？」"
1301202-34 = "是的，因為這附近是負責奇普托斯主要行政的商業區。"
1301202-35 = "雖然不知道他是受不良學生使喚，或者其實是以自己的意志在行動……總之一定是企圖癱瘓市政的惡劣恐怖份子成員！"
1301202-36 = "幸好在發生大規模恐怖事件之前就被我們察覺了！"
1301202-37 = "[s] 「既然如此，應該現在馬上去逮捕他囉？」"
1301202-38 = "不行。在自治區光是持有炸彈並不構成犯罪。"
1301202-39 = "在嫌疑人設置炸彈之前，必須偷偷跟蹤他，在他犯罪的瞬間進行逮捕！"
1301202-40 = "啊，嫌疑人開始行動了！"
1301202-41 = "老師，快點跟蹤吧！"
1301202-47 = "唔嗯……真奇怪呢……"
1301202-48 = "他一直沒有要使用炸彈的意思。"
1301202-49 = "到底要走去哪裡啊……？"
1301202-50 = "[s] 「人家會不會只是個普通的善良市民啊？」"
1301202-51 = "不，本官的直覺不會有錯！"
1301202-52 = "一定馬上就要……"
1301202-60 = "唔哇！？等，等等！！"
1301202-62 = "哈哈！你這個壺看起來很值錢嘛！我收下啦！"
1301202-64 = "搶，搶劫！有人搶劫──！"
1301202-66 = "啊啊！出現了另一個嫌疑人……不對，嫌犯！？"
1301202-67 = "炸彈被搶走了！得快點抓到他才行……！"
1301202-68 = "站住！停下來！不停下來我就要開槍了！"
1301202-73 = "（之後，桐乃雖然和搶匪展開了追逐戰……）"
1301202-87 = "唔唔……沒想到這麼近的距離，居然一發都沒打中……"
1301202-88 = "雖然沒有抓到人，但有開槍嚇到他讓他把炸彈丟下了，也因此能順利拿回炸彈！"
1301202-89 = "現在重新把這個炸彈……"
1301202-91 = "哎呀，這是什麼味道……？"
1301202-92 = "啊啊，兩位幫我拿回被搶走的東西了呀！"
1301202-93 = "真是好險，從老家寄來的重要醃菜差點就要被搶走了！"
1301202-94 = "醃，醃菜……！？"
1301202-95 = "是。每年到了這個時期，遠在老家的親戚就會寄醃菜給我。"
1301202-96 = "碰巧我最近沒什麼胃口，來的正是時候……差點一口都還沒吃到就被人搶走！真是太感謝了！"
1301202-97 = "咦，那，難道，這不是炸彈嗎……？"
1301202-98 = "……咦？炸彈？您在說什麼呢？"
1301202-99 = "對了！一點小意思不成敬意，請讓我分一些醃菜報答兩位。真的很好吃唷！"
1301202-102 = "謝，謝謝……"
1301202-104 = "結果不是炸彈也不是恐怖份子……總覺得有些洩氣……"
1301202-105 = "看來本官的直覺還不夠成熟……"
1301202-106 = "[s3] 「但有阻止扒手，很好了呀。」\n[s4] 「難道沒有發生重大犯罪，你很失望嗎……？」"
1301202-107 = "嗯，說得也是。雖然這點功勞還不足以讓我轉調到警備局，但守護住市民的安全才是最重要的。"
1301202-108 = "怎，怎麼可能！？身為女武神警察學園的學生，一直都是以市民的安全為最優先！"
1301202-109 = "因此今天獲得的這些醃菜，可以說是警察的勳章！"
1301202-110 = "只不過……這個量我自己吃未免太多了……"
1301202-111 = "啊，那麼巡邏結束之後，當作晚餐兩個人一起吃吧！"
1301202-113 = "（和桐乃一起在附近巡邏一段時間後，回到夏萊一起享用了醃菜）"
1301202-114 = "（……這份醃菜勳章確實好吃，但沒有配飯還是有點太鹹了，於是我們還是另外買了晚飯的主食）"

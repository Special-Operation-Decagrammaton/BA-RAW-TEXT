1301202-33 = "#all;hide"
1301202-34 = "3;키리노;05;네, 이 근처는 키보토스의 주요 행정을 담당하고 있는 업무지구니까요.\n#3;em;[반응]"
1301202-35 = "3;키리노;08;분명 저 시민은 불량 학생들의 사주를 받고 시가지에 폭탄을 터트려 업무를 마비시키려 드는 악성 테러리스트가 분명해요!"
1301202-36 = "3;키리노;01;대규모 테러 사건이 벌어지기 전에 이를 알아차려서 정말 다행이네요.\n#3;greeting\n#3;em;[반짝]"
1301202-37 = "[s] \"그럼 지금 바로 가서 체포해야 하는 거 아냐?\""
1301202-38 = "3;키리노;09;아뇨, D.U. 자치구에서는 폭탄을 소지하는 것만으로는 범죄가 성립되지 않으니까요.\n#3;stiff"
1301202-39 = "3;키리노;05;용의자가 폭탄을 설치할 때까지 몰래 미행해서, 범죄를 저지르려는 순간 체포해야 해요!"

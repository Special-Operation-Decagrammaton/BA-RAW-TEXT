1301202-1 = "#Title;느긋한 대수사선"
1301202-2 = "#Place;키보토스 중앙구 제 4업무지구"
1301202-3 = "3;키리노;00;어서 오세요, 선생님.\n#3;em;[반짝]\n#3;greeting\n#3;a"
1301202-4 = "3;키리노;01;선생님도 오셨으니 바로 오늘의 순찰을 시작하죠!"
1301202-5 = "[s] \"어떤 걸 순찰하면 되는 거야?\""
1301202-6 = "3;키리노;00;좋은 질문이에요!\n#3;em;[반응]"
1301202-7 = "3;키리노;99;경찰의 업무는 범죄를 예방하고 시민에게 위해를 끼칠 수 있는 모든 요인을 사전에 제거하는 것……."
1301202-8 = "3;키리노;05;그러므로 주변의 수상해 보이는 모든 것을 감시하고 탐문하면 된답니다!\n#3;em;[!]"
1301202-9 = "[s] \"하지만 이 주위는 평화로워 보이는데…….\""
1301202-10 = "3;키리노;08;그렇지 않아요! 범죄의 씨앗은 어디에나 도사리고 있다고요!\n#3;em;[빠직]\n#3;hophop"
1301202-11 = "3;키리노;05;훌륭한 베테랑 수사관은 평화로워 보이는 현장에서도 사건의 냄새를 맡을 수 있답니다!"
1301202-12 = "3;키리노;99;킁킁, 어디 보자…… 수상한 사건의 냄새가…….\n#3;em;[음표]\n#3;m2"

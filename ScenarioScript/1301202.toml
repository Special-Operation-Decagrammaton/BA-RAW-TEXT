[translation]
1301202-1 = "Relaxed Shakedown"
1301202-2 = "Kivotos Business District 4"
1301202-3 = "There you are, Sensei."
1301202-4 = "We can get our patrol underway now that you're here."
1301202-5 = "[s] \"What do we need to patrol?\""
1301202-6 = "Good question!"
1301202-7 = "The police have a duty to protect the public and prevent major crimes before they happen."
1301202-8 = "In other words, we're going to monitor and investigate anything that looks suspicious in the vicinity!"
1301202-9 = "[s] \"But this area looks peaceful...\""
1301202-10 = "Looks can be deceiving! You never know where the seeds of crime will take root."
1301202-11 = "A pro detective can sniff out a case even at peaceful times like this."
1301202-12 = "*sniff* Let's see here... Something suspicious, something suspicious..."
1301202-17 = "Heh. I've got it. But it's going to take more than this!"
1301202-18 = "Now we just have to..."
1301202-24 = "(Sensei, do you see that over there?)"
1301202-25 = "(That person looks awfully suspicious, don't they?)"
1301202-26 = "(They're smiling so ominously, and what's with that suspicious-looking jar they have? Like it's carrying the most precious thing in the world.)"
1301202-27 = "[s1] \"Maybe it's because it's fragile?\"\n[s2] \"Maybe there's something expensive inside?\""
1301202-28 = "No. That gait looks too suspicious for someone carrying something fragile."
1301202-29 = "No. That gait looks too suspicious for someone carrying something expensive."
1301202-30 = "It can only be..."
1301202-31 = "...a bomb! I'm sure of it!"
1301202-32 = "[s] \"A bomb?!\""
1301202-34 = "Of course. Kivotos' business district is home to every important administration in the city."
1301202-35 = "This suspect must have been coerced into becoming a malicious terrorist planning to detonate a bomb and halt the city in fear!"
1301202-36 = "Thank goodness I sniffed this plot out before it became a large-scale incident."
1301202-37 = "[s] \"Are you going to move in for the arrest?\""
1301202-38 = "Not yet. Simply possessing a bomb isn't enough to constitute a crime in D.U."
1301202-39 = "We have to covertly follow the suspect until they plant the bomb.#nWe'll catch them red-handed and then make the arrest!"
1301202-40 = "*gasp* They're starting to make their move."
1301202-41 = "Let's hurry and follow them, Sensei."
1301202-47 = "Hmm. This is strange."
1301202-48 = "We've been pursuing the suspect for a while now, but they still haven't planted the bomb."
1301202-49 = "Could the target location be somewhere else entirely?"
1301202-50 = "[s] \"Did we profile someone who's innocent?\""
1301202-51 = "That can't be it. My gut is never wrong!"
1301202-52 = "If we wait just a little longer..."
1301202-60 = "Wh-What?!"
1301202-62 = "Haha. I'll be taking that expensive-looking jar of yours!"
1301202-64 = "Th-Thief! It's a thief!"
1301202-66 = "Another criminal is robbing our suspect of their bomb!"
1301202-67 = "This is bad. I have to hurry and capture the thief, or else..."
1301202-68 = "Hey there, stop! If you don't stop, I'll shoot!"
1301202-73 = "Kirino pursued the thief."
1301202-87 = "Ugh... I can't believe I missed every single shot from that distance."
1301202-88 = "But at least the thief dropped the jar as they were fleeing. The bomb is secured!"
1301202-89 = "Now we just have to capture the original suspect and—"
1301202-91 = "Huh? What's that smell?"
1301202-92 = "Ah! You got it back! Thank goodness!"
1301202-93 = "I thought I'd lost the homemade pickled soybean paste that was sent to me before I'd gotten a chance to taste it."
1301202-94 = "P-Pickled soybean paste?!"
1301202-95 = "Yes, my family usually sends me some around this time of year."
1301202-96 = "I haven't had much of an appetite these days. This is just what I needed!"
1301202-97 = "I can't believe it. The jar didn't contain a bomb after all."
1301202-98 = "What's this about a bomb...?"
1301202-99 = "Well, whatever. I'll share some of my pickled soybean paste with you since you helped me. I'm sure you'll love it!"
1301202-102 = "Th-Thank you..."
1301202-104 = "We spent all that effort chasing after a suspect who turned out not to be a terrorist. That's somewhat demoralizing..."
1301202-105 = "I was overconfident with my gut instinct, and that led me to make decisions too hastily this time."
1301202-106 = "[s3] \"At least you stopped that thief.\"\n[s4] \"Are you disappointed there wasn't a more serious crime?\""
1301202-107 = "True. It won't be enough to transfer me to the Security Bureau, but at least we were able to get back one citizen's property."
1301202-108 = "N-No! I have to always think of the citizens' safety first as a student of Valkyrie Police School!"
1301202-109 = "I should think of this pickled soybean paste they gave me as a badge of honor."
1301202-110 = "But...it's too much to eat all by myself."
1301202-111 = "I know! I'll garnish some of my dinner with it once my patrol is finished!"
1301202-113 = "Kirino and I patrolled the area more before returning to Schale and enjoying the pickled soybean paste together."
1301202-114 = "The badge of honor was a bit salty without any rice."

[translation]
2003503-1 = "หลักสูตรเร่งรัด"
2003503-5 = "สวัสดีคุณครู... งืม..."
2003503-6 = "[s] \"อ้อ... ว่าไงสึบากิ ใส่ชุดไกด์มาที่ชาเล่ต์เลยเหรอ?\""
2003503-7 = "อืม... พอฉันใส่ชุดนี้ คนก็เข้ามาถามทางตลอดเลย..."
2003503-8 = "ฉันต้องลำบากนู่นนี่เยอะเลยละ..."
2003503-9 = "เพราะสิ่งเดียวที่ฉันแนะนำให้ได้... ก็มีแต่เรื่องการนอนหลับเท่านั้น..."
2003503-13 = "คุณครู อยู่หรือเปล่าคะ? ฉันได้ข่าวว่าตอนนี้ 'องค์หญิงขี้เซาแห่งเฮียกคิยาโค' มาที่ชาเล่ต์ค่ะ!"
2003503-14 = "หืม...?"
2003503-15 = "[ns] \"นี่คุณสึบากิ... ไปทำอะไรไว้รึไง...?\""
2003503-16 = "ไม่นะ ฉันไม่ได้ทำอะไรเลย..."
2003503-17 = "จะว่าไปแล้ว ระหว่างทางมาที่นี่... ฉันรู้สึกเหมือนทุกคนกำลังตามฉันมายังไงก็ไม่รู้..."
2003503-21 = "(คุณครูไปเปิดประตูอย่างช่วยไม่ได้)"
2003503-25 = "(และตอนนั้นเอง...!)"
2003503-30 = "สวัสดีค่ะคุณครู! ฉันตาม 'องค์หญิงขี้เซา' มาน่ะค่ะ!"
2003503-31 = "ถึงฉันจะไม่ค่อยแน่ใจ แต่ตอนนี้มีข่าวลือว่าถ้าตาม 'องค์หญิงขี้เซา' มา จะมานอนหลับที่ชาเล่ต์#nได้อย่างสบายใจน่ะค่ะ..."
2003503-32 = "อึก... หมู่นี้ฉันนอนไม่หลับเลยค่ะ... ยาที่ช่วยให้นอนหลับก็แทบจะไม่ได้ผลเลย... ฉันอยากนอนหลับ#nให้สนิทอย่างน้อยสักชั่วโมงเดียวก็ยังดี..."
2003503-37 = "2 สัปดาห์ที่ผ่านมาฉันไปลาดตระเวนโดยที่ไม่มีใครเปลี่ยนเวรด้วยเลย... ตารางการนอนก็เลยเละเทะ#nไปหมดเลยค่ะ..."
2003503-38 = "[s] \"นักเรียนวัลคิรี่ก็ด้วยเหรอเนี่ย?!\""
2003503-39 = "เราต้องรักษาความสงบเรียบร้อยก็จริง แต่ก็จำเป็นต้องนอนพักด้วยนะคะ..."
2003503-40 = "จะทำยังไงดีล่ะคุณครู?"
2003503-41 = "[s1] \"ฝากด้วยนะ สึบากิ\"\n[s2] \"ช่วยเป็น 'ไกด์' ให้นักเรียนพวกนี้หน่อยนะ!\""
2003503-44 = "อื้ม ถ้าคุณครูพูดถึงขนาดนั้นละก็... เข้าใจแล้ว"
2003503-45 = "ถึงจะไม่แน่ใจว่าจะทำได้ดีหรือเปล่า แต่ฉันก็จะพยายามนะ คุณครู"
2003503-49 = "ทุกคนน่าจะรู้สึกได้จากสภาพร่างกายในตอนนี้ว่า... การนอนหลับอย่างเต็มที่มันไม่ใช่เรื่องง่ายอย่างที่#nคิดเลย"
2003503-50 = "ตอนนี้คนสมัยใหม่ต้องทนทุกข์ทรมานจากโรคนอนไม่หลับในทุกรูปแบบ..."
2003503-51 = "และต่างก็ไปโพสต์ถามวิธีในการนอนหลับที่ดีกันในอินเทอร์เน็ต"
2003503-52 = "อย่างเช่นการอาบน้ำอุ่นก่อนนอน ดื่มช็อกโกแลตร้อน นั่งสมาธิ หรือฟังเสียงบำบัดก่อนนอน..."
2003503-53 = "แต่ว่าทุกคนที่มาที่นี่คงลองทำตามวิธีเหล่านั้นกันหมดแล้วใช่มั้ยล่ะ?"
2003503-55 = "ฉันลองอาบน้ำก่อนนอน แต่กลายเป็นว่ามันทำให้เลือดไหลเวียนดีจนหายง่วงเลยค่ะ..."
2003503-56 = "ส่วนฉันใช้วิธีดื่มโกโก้ค่ะ แต่คาเฟอีนในโกโก้ยิ่งทำให้ฉันตาสว่างกว่าเดิม..."
2003503-58 = "ส่วนเรื่องฟังเสียงบำบัดก่อนนอน พอฟังฉันยิ่งนึกถึงเสียงที่ได้ยินระหว่างทำงานค่ะ... ทุกครั้งที่เปิดฟังฉันจะยิ่งนึกถึงสภาพแวดล้อมตอนทำงาน ก็เลยตื่นตัวเสมอเลยค่ะ..."
2003503-59 = "ฉันลองใส่ที่ปิดตานอนเพราะเห็นว่ามีประสิทธิภาพต่อการนอน แต่กลายเป็นว่าพอปิดตา ประสาทการได้ยินของฉันก็อ่อนไหวกว่าเดิม พอได้ยินเสียงอะไรนิดหน่อยก็ตื่นอยู่ตลอดเลย"
2003503-60 = "อืม ถึงวิธีการนอนหลับจะมีหลายอย่าง แต่ก็ไม่ง่ายเลยที่จะหาวิธีที่ใช้ได้ผลกับตัวเอง..."
2003503-61 = "เพราะงั้นฉันจะบอกวิธีที่ได้ลองทำด้วยตัวเองและพบว่าเป็นวิธีที่มีประสิทธิภาพให้แล้วกัน"
2003503-62 = "ก่อนอื่นเราต้องฝึกเรื่องหายใจก่อน ต้องหายใจเข้าลึกๆ หายใจออกยาวๆ อย่างช้าๆ เราต้องไม่บังคับ#nตัวเองจนหายใจไม่เป็นธรรมชาติ แต่ก็ต้องหายใจให้ช้ากว่าปกติด้วย"
2003503-63 = "ฮื้ม ฮู่ว ฮื้ม ฮู่ว ฮื้ม ฮู่ว..."
2003503-67 = "คร่อก... zzZ"
2003503-69 = "ละ... หลับไปแล้วเหรอ?!"
2003503-70 = "สมกับเป็นองค์หญิงขี้เซาแห่งเฮียกคิยาโคจริงๆ... ถะ... ถ้างั้นพวกเราล่ะ...?!"
2003503-76 = "หืม...? ขอโทษนะ เผลอหลับไปจนได้"
2003503-77 = "และต่อไปคือเราต้องห้ามทำหน้าบึ้งตึง และต้องระวังอย่าเกร็งตา หนังตา ลิ้น และคาง คิดง่ายๆ ว่าเราค่อยๆ ผ่อนคลายใบหน้าก็ได้"
2003503-78 = "ให้ทำอย่างนี้แล้วหายใจแบบที่ฉันบอกเมื่อกี้ไปด้วยกัน..."
2003503-82 = "คร่อก zzZ..."
2003503-83 = "เหมือนรู้สึกง่วงขึ้นมานิดหน่อย... นั่นเธอหลับไปอีกแล้วงั้นเหรอ?!"
2003503-84 = "หลับง่ายจนน่าอิจฉาเลย น่าทึ่งสุดๆ เลยค่ะ"
2003503-86 = "เฮือก? ถึงเวลาของว่างแล้วเหรอ...? ยังหรอกเหรอ..."
2003503-87 = "ต่อไปก็ผ่อนคลายคอ ไหล่ ร่างกายท่อนบน แขน และขาตามลำดับ... ให้คิดว่าร่างกายของเรา#nกลายเป็นลูกโป่งใส่น้ำนิ่มๆ..."
2003503-88 = "ให้พอรู้สึกได้ว่าเราได้ผ่อนแรงพอสมควรแล้ว และเหมือนว่าพลังงานกำลังจะไหลออกไปจากหัวเรา..."
2003503-89 = "จากนั้นก็คิดว่าเราลบทุกความคิดในหัวด้วยยางลบ... และโฟกัสไปที่ลมหายใจของเรา..."
2003503-90 = "อ้อ จริงสิ... ฉันแนะนำให้ใส่ที่ปิดตาและที่อุดหูก่อนนอนด้วย..."
2003503-91 = "ไม่ใช่แค่ที่ปิดตา แต่ควรใส่ที่อุดหูด้วยเหรอคะ?"
2003503-92 = "อืม... ความเงียบก็เป็นสิ่งสำคัญในการนอนหลับน่ะ..."
2003503-93 = "พอทำทุกอย่างครบแล้ว... และอยู่อย่างนั้นไปสักครู่..."
2003503-97 = "คร่อก... ฟี้... zZZ"
2003503-99 = "สุดยอดเลยค่ะ...! รู้สึกเหมือนตัวเองหมดแรงเลย แต่ว่าเป็นการหมดแรงที่ดีนะคะ แบบนี้ดีกว่า#nปกติอีกค่ะ..."
2003503-100 = "ไม่ได้รู้สึกถึงความง่วงแบบนี้... มานานแล้วนะ..."
2003503-102 = "อ๊ะ... อะไรเนี่ย? เหมือนตาจะปิดเลย... ได้โปรดหลับสักทีเถอะ..."
2003503-103 = "คร่อก... zzZ"
2003503-114 = "(ในที่สุดพวกนักเรียนที่แวะมาก็พากันหลับปุ๋ย)"
2003503-115 = "(วิธีนอนหลับของสึบากิ... ใช้ได้ผลดีสุดๆ!)"
2003503-117 = "งืม... เอ๋? หลับกันหมดเลยแฮะ...?"
2003503-118 = "แหะๆ ดีจังเลย..."
2003503-119 = "[s] \"สมกับที่เป็นสึบากิจริงๆ ครูเชื่ออยู่แล้วว่าต้องทำได้!\""
2003503-120 = "ชู่ว คุณครู ถ้าส่งเสียงดังเกินไป เดี๋ยวพวกเธอจะตื่นเอานะ"
2003503-123 = "ถ้างั้นฉันก็... ไปนอนต่อดีมั้ยนะ..."
2003503-129 = "[ns] (สะ... สึบากิ?!)"
2003503-130 = "ขอยืมตักหน่อยนะ..."
2003503-131 = "ไม่เป็นไรใช่มั้ยคุณครู?"
2003503-133 = "(สึบากิเอาหัวหนุนตักของคุณครูและหลับไปทั้งอย่างนั้น)"
2003503-134 = "(จากนั้นห้องพักผ่อนก็เต็มไปด้วยเสียงลมหายใจของนักเรียนที่หลับสนิท)"

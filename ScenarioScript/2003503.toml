[translation]
2003503-1 = "速成講座"
2003503-5 = "……你好，老師……呣喵……"
2003503-6 = "[s]「啊……你好呀，椿？你穿著導覽員的服裝跑來夏萊？」"
2003503-7 = "嗯……不曉得是不是因為穿著這身衣服，我來這裡的路上一直有人找我問路……"
2003503-8 = "遇到了……一些麻煩……"
2003503-9 = "我能提供導覽的，明明只有好好入睡的方法而已……"
2003503-13 = "請問你在嗎，老師？#n我聽說有一位「百鬼夜行的睡美人」來到了夏萊！"
2003503-14 = "嗯……？"
2003503-15 = "[ns]「……椿同學，你做了什麼嗎……？」"
2003503-16 = "沒有，我什麼都沒做哦……"
2003503-17 = "不過仔細想想，我來這裡的路上……總覺得大家好像一直跟著我……"
2003503-21 = "（無奈之下打開了門）"
2003503-25 = "（結果……！）"
2003503-30 = "你好，老師！我跟著「睡美人」來了！"
2003503-31 = "雖然不知道是真是假，但聽說跟著「睡美人」走，就能在夏萊睡得很好……"
2003503-32 = "嗚嗚……我的失眠症實在太嚴重……#n連一般的助眠劑都已經沒什麼效果了……真想睡個好覺，哪怕只有一個小時也好……"
2003503-37 = "連續兩個星期值夜間巡邏……生理時鐘都被打亂了……"
2003503-38 = "[s]「連女武神的學生都來了！？」"
2003503-39 = "……畢竟睡得好才能守護治安呀……"
2003503-40 = "……老師，該怎麼辦？"
2003503-41 = "[s1]「……拜託你了，椿。」\n[s2]「既然如此……替我好好『導覽』他們吧！」"
2003503-44 = "嗯，既然老師都這麼說了……我明白了。"
2003503-45 = "雖然不確定能不能成功，我會盡力試試的，老師。"
2003503-49 = "我想大家應該都有親身經驗……想好好睡個覺其實比想像中還困難。"
2003503-50 = "時至今日，現代人依然飽受失眠之苦……"
2003503-51 = "渴求著睡個好覺、能好好熟睡的方法，在網路上發問。"
2003503-52 = "在睡前先洗個熱水澡、喝杯熱可可，或者邊聽白噪音邊冥想等等……"
2003503-53 = "不過來到這裡的人，應該都已經試過這些方法了吧？"
2003503-55 = "洗了澡之後，反而因為促進了血液循環的關係更睡不著……"
2003503-56 = "喝了熱可可之後，反而因為裡面的咖啡因變得更清醒……"
2003503-58 = "因為白噪音在工作中已經聽到膩了……#n晚上聽見反而會想起工作環境，變得更專注……"
2003503-59 = "聽說眼罩有效果就嘗試了一下，#n結果聽覺反而變得更敏銳，一直專注在聽周圍的聲音……"
2003503-60 = "嗯，雖然睡眠的方法很多，但是想找到適合自己的方法並不容易……"
2003503-61 = "所以我要告訴各位一個我親自試過有效的方法。"
2003503-62 = "首先要緩緩地深呼吸。#n不用刻意放慢速度，只要稍微比平常慢一點就好。"
2003503-63 = "吸──吐──吸──吐──吸──吐──"
2003503-67 = "……呼……"
2003503-69 = "這，這麼快？"
2003503-70 = "這就是百鬼夜行的睡美人嗎……可，可是我們還沒……！？"
2003503-76 = "呃嗯……？抱歉，我不小心先睡著了。"
2003503-77 = "接下來注意不要皺眉，讓眼睛、眼皮、舌頭和下巴放鬆。#n想像自己正在慢慢放鬆臉部就可以了。"
2003503-78 = "一邊這麼做，一邊維持剛剛的呼吸……"
2003503-82 = "……呼嚕……"
2003503-83 = "好像開始覺得有點懶洋洋的了……等一下，他已經睡著了！？"
2003503-84 = "從某種層面上來說，這還真讓人羨慕啊……而且也很驚人。"
2003503-86 = "啊？這麼快就到零食時間了……？#n原來還沒到啊……"
2003503-87 = "再來，依序放鬆頸部、肩膀、上半身、手臂和腿部。#n把全身想成是一顆柔軟的水球……"
2003503-88 = "等到徹底覺得放鬆、有股慵懶的感覺從頭部向下傳遞之後……"
2003503-89 = "心裡想著要用橡皮擦把腦海裡的想法擦掉……試著注意自己的呼吸聲……"
2003503-90 = "啊，對了……我還推薦一個方法，就是在躺下前戴上眼罩和耳罩……"
2003503-91 = "不只是眼罩，連耳罩都要戴嗎？"
2003503-92 = "嗯……聽力意外的也是影響睡眠的重要因素哦……"
2003503-93 = "維持這個狀態……一切順利的話……"
2003503-97 = "……呼嚕嚕……"
2003503-99 = "實在太厲害了……！#n不過感覺的確比平常好，好像更放鬆了一點……"
2003503-100 = "這種慵懶的感覺……真是久違了……"
2003503-102 = "咦……怎麼回事？#n眼皮好沉重……拜託就這樣……"
2003503-103 = "……呼嚕……"
2003503-114 = "（學生們很快就進入了夢鄉）"
2003503-115 = "（椿的效果……非常驚人！）"
2003503-117 = "嗯……？咦，大家都睡著了……？"
2003503-118 = "嘿嘿……太好了……"
2003503-119 = "[s]「真不愧是椿，我相信你一定能做到的！」"
2003503-120 = "噓，老師。#n要是發出太大的聲音，說不定會吵醒他們的。"
2003503-123 = "那我也……繼續睡吧……"
2003503-129 = "[ns]（椿，椿！？）"
2003503-130 = "大腿借我一下……"
2003503-131 = "可以吧，老師？"
2003503-133 = "（椿就這樣靠在大腿上睡著了）"
2003503-134 = "（接著休息室裡便充滿學生們平穩的呼吸聲）"

[translation]
2003503-1 = "Crash Course"
2003503-5 = "Hello, Sensei... *yawn*..."
2003503-6 = "[s] \"Oh... Hi, Tsubaki. You came to Schale in your sleep guide outfit?\""
2003503-7 = "Yeah...but maybe that was a bad idea... People kept asking me for directions the whole way here..."
2003503-8 = "It was very...annoying..."
2003503-9 = "The only thing I can guide people to is sleep..."
2003503-13 = "Are you here, Sensei? I just heard that Hyakkiyako's Sleeping Beauty is here at Schale!"
2003503-14 = "Hmm?"
2003503-15 = "[ns] \"...Tsubaki? What did you do?\""
2003503-16 = "Nothing..."
2003503-17 = "Though, come to think of it... It did feel like I was being followed on the way here..."
2003503-21 = "I had no choice but to open the door."
2003503-25 = "And behind it..."
2003503-30 = "Hello, Sensei! We followed Sleeping Beauty all the way here!"
2003503-31 = "There's a rumor that if you follow Sleeping Beauty, you'll find peaceful sleep at Schale..."
2003503-32 = "Ugh... My insomnia has gotten so bad sleeping pills barely have an effect on me... Please, let me sleep. Even if it's just an hour..."
2003503-37 = "I was on night patrol for two weeks without a break... Now my sleep schedule is completely messed up."
2003503-38 = "[s] \"Even a Valkyrie student?!\""
2003503-39 = "We need sleep in order to maintain security... "
2003503-40 = "...What should we do, Sensei?"
2003503-41 = "[s1] \"...Tsubaki, please.\"\n[s2] \"Guide these poor students to dreamland!\""
2003503-44 = "If you say so, Sensei... I'll do my best."
2003503-45 = "I'm not sure if I'm the right fit for the job...but I'll certainly try, Sensei."
2003503-49 = "As you all probably know... Getting enough sleep is a surprisingly difficult task."
2003503-50 = "Many people in our modern age suffer from insomnia..."
2003503-51 = "They search frantically for a solution. Turning to the internet they post all kinds of questions, longing for just one night of peaceful sleep."
2003503-52 = "For relief, some take a warm bath before bed, drink hot cocoa, or even meditate while listening to white noise. The list goes on and on..."
2003503-53 = "I'm sure all of you here have tried all these things, right?"
2003503-55 = "I tried taking a shower but it only made my blood flow better, which left me wide awake..."
2003503-56 = "I drank hot cocoa but the caffeine left me wired..."
2003503-58 = "I listened to a white noise album, but it only reminded me of work...which just made me think about work all night..."
2003503-59 = "I heard that an eye mask is pretty effective, so I wore one, but it only made my hearing more sensitive, so the noise kept me up instead."
2003503-60 = "Yes. There are many different roads to getting good sleep. But finding the one that works for you is not easy..."
2003503-61 = "Let me teach you some methods that I have found effective."
2003503-62 = "First, breathe slowly and deeply. Don't force it, just go slower than usual."
2003503-63 = "Inhale– Exhale– Inhale– Exhale– Inhale– Exhale–"
2003503-67 = "...Zzz."
2003503-69 = "A-Already?!"
2003503-70 = "She's the Sleeping Beauty of Hyakkiyako all right... B-But what about us...?!"
2003503-76 = "Huh? Oh sorry, I fell asleep. "
2003503-77 = "Next tip— Don't frown. Avoid holding any tension in your eyes, eyelids, tongue, or jaw. Slowly relax your face."
2003503-78 = "Keep doing that while maintaining your breathing..."
2003503-82 = "...Zzz."
2003503-83 = "I'm feeling a little drowsy... She's asleep already?!"
2003503-84 = "I'm jealous, and honestly, a little amazed."
2003503-86 = "What? Snack time already? Oh, I guess not..."
2003503-87 = "Now relax your neck, shoulders, chest, arms, and legs in that order. Imagine your whole body going limp like a water balloon..."
2003503-88 = "Once you're sufficiently relaxed, let all your fatigue flow down from your head..."
2003503-89 = "Imagine all the thoughts in your head being erased... Focus only on your breathing..."
2003503-90 = "Oh... I also recommend putting on an eye mask and earplugs before lying down..."
2003503-91 = "An eye mask AND earplugs?"
2003503-92 = "Yeah... Silence is a surprisingly important part of going to sleep..."
2003503-93 = "If you keep at it... And everything goes well..."
2003503-97 = "...Zzz."
2003503-99 = "Amazing! It's like all my energy is leaving my body but in a good way..."
2003503-100 = "It's been a while since I've felt this drowsy."
2003503-102 = "Huh? What's this? My eyes feel so heavy... I just want to..."
2003503-103 = "...Zzz."
2003503-114 = "All the students quickly drifted off to sleep."
2003503-115 = "Tsubaki used Sleep Techniques... It's super effective!"
2003503-117 = "Mmm? Is everyone finally asleep?"
2003503-118 = "Heehee... I'm glad..."
2003503-119 = "[s] \"I knew I could count on you, Tsubaki!\""
2003503-120 = "Shh, Sensei. If you make too much noise, they might wake up."
2003503-123 = "Mmm... Maybe I should get some more sleep too..."
2003503-129 = "[ns] \"(T-Tsubaki?!)\""
2003503-130 = "Pillow, pillow... Need a pillow."
2003503-131 = "This one will work. Night, Sensei."
2003503-133 = "Tsubaki used my lap as a pillow and passed out."
2003503-134 = "The lounge was filled with the peaceful sound of students at rest."

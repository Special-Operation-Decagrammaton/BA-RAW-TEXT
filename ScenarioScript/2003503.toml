2003503-50 = "3;츠바키 가이드;99;현대인들은 오늘날에도 갖은 불면증에 시달리면서……."
2003503-51 = "3;츠바키 가이드;01;잠 잘 자는 법, 숙면 취하는 방법을 갈구하면서 인터넷에 질문 글을 올리고 있어."
2003503-52 = "3;츠바키 가이드;99;자기 전에 따듯하게 샤워하기, 코코아 마시기, 화이트 노이즈 들으면서 명상하기 등등…….\n#3;em;[...]"

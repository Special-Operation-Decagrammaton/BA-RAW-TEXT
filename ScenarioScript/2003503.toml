2003503-55 = "5;지나가던 학생 B;06\n1;지나가던 학생 A;04;샤워를 해 봤지만, 오히려 혈액순환이 활발해져서 잠이 달아났어요…….\n#5;a\n#1;a"
2003503-56 = "5;지나가던 학생 B;06;코코아를 마셨는데, 그 안에 있는 카페인 성분 때문인지 거꾸로 잠이 깨 버렸어…….\n#5;em;[속상함]"

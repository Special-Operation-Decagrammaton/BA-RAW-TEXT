[translation]
1010603-1 = "Another Me"
1010603-2 = "After getting Sakurako's message, I went to the spot we agreed to meet up at."
1010603-5 = "...Ah. You're here, Sensei."
1010603-9 = "[ns1] \"...Sakurako?\"\n[ns2] \"You're wearing your habit this time...\""
1010603-12 = "Yes. I am. ...And I was waiting for you."
1010603-13 = "I wanted to speak to you about something that happened...and get your advice, as well."
1010603-14 = "What kind of experience? Um... Well..."
1010603-18 = "...Sensei."
1010603-19 = "I'm typically very skilled at reading the room. I observe and assess every single person's actions around me."
1010603-20 = "However, this wasn't always natural to me. It's something I've become adept at, out of necessity."
1010603-21 = "The necessity being that I don't become a burden to my position, organization, and the people I am surrounded by."
1010603-22 = "No matter if it's a miniscule task or a personal one, I should always act and dress in a way befitting of the Sisterhood."
1010603-23 = "Fashion and demeanor convey one's class, after all."
1010603-24 = "But then, recently, I was returning from practice, so I was still dressed in my idol costume."
1010603-25 = "I happened to run into some Sisters, who had recently joined the organization."
1010603-26 = "...And I greeted them, as usual."
1010603-31 = "[ns3] \"...? Hm? And then?\"\n[ns4] \"What's the problem with that...?\""
1010603-34 = "Well... You see..."
1010603-35 = "Perhaps they don't know about the event as of yet..."
1010603-36 = "...but they didn't realize it was me, in the idol costume."
1010603-37 = "So..."
1010603-38 = "The conversation proceeded with a giant misunderstanding that I was simply a new friend, completely unrelated to the Sisterhood."
1010603-39 = "I did try to clear it up by giving them my name, but in the rowdy atmosphere, they thought I said \"Sakura,\" rather than Sakurako."
1010603-40 = "In the end, we ended up singing karaoke together for three hours."
1010603-41 = "[s5] \"...Oh?\"\n[s6] \"Um... Ummm...\""
1010603-44 = "I-I did attempt to inform them multiple times! I simply failed every time! The atmosphere...the timing...!"
1010603-48 = "And, perhaps it was the effect of my idol costume, but the final nail in the coffin was..."
1010603-49 = "...I began speaking like someone else entirely. Not like the leader of the Sisterhood. Which I believe furthered the misunderstanding."
1010603-50 = "Even as we said our farewells, they called me \"Sakura\"..."
1010603-51 = "We even exchanged contact information... What should I do?"
1010603-52 = "I don't typically give my number to anyone, unless it's for business matters. So it would seem they don't know who I am, even now."
1010603-53 = "I've already received a message about our next meeting. See this..."
1010603-59 = "\"Sakura! Sunday afternoon at 1! Don't forget!\""
1010603-61 = "\"The others said they were down! We need your singing skills, Sakura!\""
1010603-63 = "\"I believe in you, Sakura!\""
1010603-68 = "[ns7] \"...You're quite popular, Sakura.\"\n[ns8] \"So this is alternate-timeline Sakura...\""
1010603-71 = "U-Ugh..."
1010603-72 = "Anyways, I unintentionally deceived my fellow Sisters. I must rectify the situation."
1010603-73 = "I'm worried that if I just suddenly reveal my true identity, I may hurt their feelings and upset them."
1010603-74 = "It's my fault in the first place, for allowing my behavior to be so influenced by my state of dress."
1010603-75 = "Hm?"
1010603-76 = "...? Sensei...? What do you mean...?"
1010603-77 = "It doesn't...matter...?"
1010603-78 = "I only need to be honest and tell them the truth? B-But my identity would be—"
1010603-79 = "[s9] \"What about your identity?\"\n[s10] \"You've worked hard. I'm sure it'll be fine.\""
1010603-82 = "E-Even...if you put it like that...this is a different problem entirely..."
1010603-83 = "I've told you multiple times that the other Sisters think of me as..."
1010603-87 = "...Um...Sensei..."
1010603-88 = "Would it..."
1010603-89 = "Would it...truly be okay? To just tell them?"
1010603-90 = "To be frank, I don't wish...to keep secrets either. I wish to tell them the truth."
1010603-91 = "...Yes, I see."
1010603-92 = "If I think about it more, this is a little different from the usual situations I deal with."
1010603-93 = "I'm typically entangled in secrets or internal issues that make it impossible for me to express myself freely."
1010603-94 = "But this particular situation is about me and myself. That's all."
1010603-95 = "No matter what the truth may be, it won't harm the cathedral or the Sisterhood."
1010603-96 = "[s11] \"I think that's the right choice.\"\n[s12] \"You can be honest with them.\""
1010603-99 = "O-Okay. Then, as you say..."
1010603-100 = "*sigh* Phew."
1010603-106 = "I've responded to them. I'll just have to tell them the truth and apologize when I see them."
1010603-107 = "...Heehee."
1010603-108 = "For some reason, I'm getting rather nervous about this. I can't remember the last time I've felt this way."
1010603-109 = "Thank you, Sensei. Perhaps what I needed was not wit...but courage."
1010603-110 = "I wouldn't have been able to adopt this kind of mindset without your guidance."
1010603-111 = "No matter how this goes...thank you."
1010603-112 = "And as for what happens..."
1010603-113 = "I'll update you on all the details, after this weekend."
1010603-115 = "I comforted Sakurako, who was rather anxious, then returned to Schale."

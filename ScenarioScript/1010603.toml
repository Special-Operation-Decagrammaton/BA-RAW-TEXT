1010603-87 = "3;사쿠라코;07;……음……. 선생님……."
1010603-88 = "3;사쿠라코;06;정말……."
1010603-89 = "3;사쿠라코;12;정말로……. 괜찮을까요? 그렇게 말씀드려도……?\n#3;em;[반응]"
1010603-90 = "3;사쿠라코;07;솔직한 저의 마음으로는……. 네. 내심……. 저 또한 숨기고 싶지는……. 않습니다. 사실대로 말씀드리고 싶지요."
1010603-91 = "3;사쿠라코;99;……네, 그렇군요."
1010603-92 = "3;사쿠라코;01;생각해 보면……. 확실히 말씀대로 평소와는 조금 다른 상황이기는 한 것 같습니다.\n#3;em;…"
1010603-93 = "3;사쿠라코;02;평상시의 저는, 항상 화제의 일부가 말씀드릴 수 없는 비밀이나, 내부 사정과 엮여 있었지만,"
1010603-94 = "3;사쿠라코;01;이번 일은 온전히 저라는 사람 개인에 대한 것."
1010603-95 = "3;사쿠라코;01;솔직하게 사실대로 말씀드린다 해도, 성당이나 시스터후드에 누가 될 일은 없겠지요."
1010603-96 = "[s11] \"오히려 그게 정공법이라 생각해.\"\n[s12] \"솔직해도 되는 부분이야, 여기는.\""
1010603-97 = "#wait;10"
1010603-98 = "#wait;10"
1010603-99 = "3;사쿠라코;04;그, 그럼……. 정말로, 선생님 말씀대로…….\n#3;em;…"
1010603-100 = "3;사쿠라코;13;후우, 후우……."

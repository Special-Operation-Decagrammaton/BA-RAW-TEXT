[translation]
1010603-1 = "ฉันอีกคน"
1010603-2 = "(เมื่อได้รับข้อความจากซากุระโกะ คุณครูก็ออกไปหาตามสถานที่ที่นัดไว้)"
1010603-5 = "อ่า... มาแล้วสินะคะ คุณครู"
1010603-9 = "[ns1] \"ซากุระโกะ... ในชุดซิสเตอร์?\"\n[ns2] \"ครั้งนี้ใส่ชุดปกติมาสินะ...\""
1010603-12 = "ค่ะ ใช่ค่ะ ฉันกำลังรอคุณครูอยู่ค่ะ..."
1010603-13 = "ฉันอยากบอกเกี่ยวกับประสบการณ์ที่ได้เจอมาวันนี้... และอยากปรึกษาอะไรคุณครูด้วยค่ะ"
1010603-14 = "ประสบการณ์อะไรน่ะเหรอคะ? อืม... คือว่า..."
1010603-18 = "คุณครูคะ..."
1010603-19 = "ปกติแล้วฉันจะคิดถึงคนรอบข้างและใส่ใจในทุกการกระทำของตัวเองค่ะ"
1010603-20 = "แต่นั่นไม่ใช่นิสัยของฉันจริงๆ... แต่เป็นการกระทำที่ฉันทำเพื่อคนอื่นค่ะ"
1010603-21 = "ทุกอย่างคือการทำเพื่อไม่ให้ตำแหน่งและสถานะของฉัน รวมทั้งชมรมที่สังกัดและสมาชิกในชมรมต้อง#nลำบากค่ะ"
1010603-22 = "แม้ในตอนที่ออกไปทำเรื่องเล็กน้อยหรือทำธุระส่วนตัว ฉันก็ต้องใส่ชุดซิสเตอร์และกระทำตัวให้เหมาะ#nสมค่ะ"
1010603-23 = "เพราะตำแหน่งของเราแขวนอยู่กับชุดที่ใส่อยู่ด้วยนี่คะ"
1010603-24 = "แต่วันนี้หลังฉันฝึกซ้อมเสร็จ ระหว่างที่ฉันกำลังเดินกลับ... ฉันหมายถึงเดินกลับมาในชุดไอดอลน่ะค่ะ"
1010603-25 = "ระหว่างทางฉันบังเอิญได้เจอกับซิสเตอร์ที่เพิ่งเข้าชมรมมาใหม่ค่ะ"
1010603-26 = "ฉันก็เลยทักทายตามปกติ..."
1010603-31 = "[ns3] \"อืม? แล้วยังไงต่อเหรอ?\"\n[ns4] \"เกิดปัญหาอะไรอย่างนั้นเหรอ...?\""
1010603-34 = "เอ่อ... คือว่า..."
1010603-35 = "ไม่แน่ใจว่าซิสเตอร์ใหม่เหล่านั้นยังไม่ได้ข่าวเรื่องอีเวนต์ไอดอล หรือว่ายังไม่เคยเจอฉันในลุคนี้มา#nก่อนกันแน่"
1010603-36 = "ก็เลยจำไม่ได้ว่าคนที่อยู่ในชุดไอดอลคนนั้นคือฉันค่ะ"
1010603-37 = "เอ่อ..."
1010603-38 = "พวกเธอเข้าใจผิด คิดว่าฉันทักทายเพราะอยากรู้จักเพื่อนใหม่ ไม่ใช่ว่าเป็นเพราะเกี่ยวข้องกับชมรม#nซิสเตอร์น่ะค่ะ"
1010603-39 = "ฉันก็บอกชื่อของตัวเองเพื่อชี้แจงแล้ว แต่ไม่รู้ว่าเพราะอะไร พวกเธอถึงได้ยินว่าฉันชื่อ 'ซากุระ' แทนที่จะเป็น 'ซากุระโกะ'..."
1010603-40 = "แล้วพวกเราที่จู่ๆ ก็กลายเป็นเพื่อนใหม่กันก็ไปร้องคาราโอเกะกัน 3 ชั่วโมง..."
1010603-41 = "[s5] \"หา...?\"\n[s6] \"อะ... เอ่อ... อืม...\""
1010603-44 = "ระ... ระหว่างนั้นฉันก็พยายามบอกความจริงไปหลายครั้งแล้วนะคะ! ถึงจะล้มเหลวทุกครั้งก็เถอะค่ะ!! เพราะบรรยากาศมันพาไป... แล้วจังหวะก็ไม่ดีด้วย...!!"
1010603-48 = "คงเป็นเพราะชุดที่ฉันใส่ในตอนนั้นน่ะค่ะ..."
1010603-49 = "ตอนนั้นฉันเลยพูดและทำในสิ่งที่ไม่เป็นตัวของตัวเองค่ะ นั่นคงจะเป็นปัจจัยสำคัญที่ทำให้เกิดความ#nเข้าใจผิดค่ะ"
1010603-50 = "แม้แต่ในตอนที่บอกลาและแยกย้ายกันกลับบ้าน พวกเขายังเรียกฉันว่า \"ซากุระจัง\" อยู่เลยค่ะ..."
1010603-51 = "ฉันควรทำยังไงดีคะ...? เราถึงกับแลกเบอร์ติดต่อกันไว้แล้วด้วยค่ะ..."
1010603-52 = "โดยปกติแล้วถ้าไม่เกี่ยวข้องกับเรื่องงาน พวกฉันจะไม่แลกเบอร์โทรศัพท์กันค่ะ ตอนนี้พวกเธอก็คงยัง#nไม่รู้ว่าเจ้าของเบอร์โทรศัพท์คือฉันเลยค่ะ"
1010603-53 = "ทั้งๆ ที่ส่งข้อความมานัดเจอครั้งต่อไปแล้วด้วย... ส่งมาแบบนี้น่ะค่ะ..."
1010603-59 = "\"ซากุระจัง! วันอาทิตย์นี้ บ่ายโมงนะ! ห้ามลืมละ!!\""
1010603-61 = "\"ครั้งหน้าเพื่อนคนอื่นก็บอกว่าจะมาด้วยนะ! ต้องให้ทุกคนได้ฟังเพลงของซากุระจังให้ได้เลย!!\""
1010603-63 = "\"ฉันเชื่อในตัวซากุระจังนะ!!\""
1010603-68 = "[ns7] \"เป็นคนดังเลยนะเนี่ย ซากุระจัง...\"\n[ns8] \"เหมือนเป็นคุณอุทะซุมิในมัลติเวิร์สอื่นเลยนะ...\""
1010603-71 = "อะ... อึก...!"
1010603-72 = "ถึงจะเป็นอย่างนั้นแต่ฉันอยากแก้ไขสถานการณ์ที่เหมือนว่าฉันโกหกเหล่าซิสเตอร์โดยที่ไม่ได้ตั้งใจค่ะ"
1010603-73 = "แต่ฉันก็กังวลว่าถ้าเปิดเผยตัวตนไปอย่างกะทันกัน เหล่าซิสเตอร์ก็จะตกใจและเสียใจได้ค่ะ"
1010603-74 = "เพราะมันก็เป็นความผิดของฉันเองที่ใส่ชุดอื่น..."
1010603-75 = "คะ...?"
1010603-76 = "คุณครู...? หมายความว่ายังไงคะ...?"
1010603-77 = "เรื่องนั้นไม่สำคัญ... งั้นเหรอคะ?"
1010603-78 = "แค่ให้ฉันบอกไปตามตรงก็พอเหรอคะ...? ตะ... แต่ถ้าทำอย่างนั้น ฉันคนเดิมจะ...!"
1010603-79 = "[s9] \"ซากุระโกะคนเดิมจะเป็นอะไรเหรอ?\"\n[s10] \"ถ้าที่ผ่านมาพยายามเต็มที่แล้วก็ไม่เป็นไรหรอก\""
1010603-82 = "งะ... งั้นเหรอคะ... ต่อให้คุณครูจะพูดง่ายๆ แบบนั้น... แต่สำหรับฉันมันไม่ง่าย..."
1010603-83 = "คุณครูก็น่าจะรู้ว่าซิสเตอร์คนอื่นคิดเกี่ยวกับฉันยังไง..."
1010603-87 = "อืม... คุณครูคะ..."
1010603-88 = "ต่อให้ฉันสารภาพกับทุกคนไปอย่างนั้น..."
1010603-89 = "ก็จะไม่เป็นไร... จริงๆ เหรอคะ...?"
1010603-90 = "บอกตามตรงว่าฉัน... ค่ะ ใจจริงแล้ว... ฉันก็ไม่อยากปิดบัง... หรอกค่ะ ฉันอยากบอกตามความจริงค่ะ"
1010603-91 = "ค่ะ อย่างนี้นี่เองสินะคะ..."
1010603-92 = "พอมาคิดดูแล้ว... มันก็ดูเป็นสถานการณ์ที่แตกต่างไปจากปกติอย่างที่ว่าเลยค่ะ"
1010603-93 = "ปกติแล้วฉันมักจะไปเกี่ยวข้องกับความลับหรือเรื่องภายในที่ไม่สามารถบอกใครได้"
1010603-94 = "แต่เรื่องครั้งนี้เกี่ยวกับตัวฉันในฐานะเรื่องส่วนตัว"
1010603-95 = "ต่อให้ฉันจะบอกทุกคนอย่างตรงไปตรงมา ก็คงไม่ทำให้วิหารหรือชมรมซิสเตอร์เสียหายหรอกใช่มั้ยคะ?"
1010603-96 = "[s11] \"ครูว่านั่นเป็นวิธีที่ถูกต้องนะ\"\n[s12] \"ครูว่าเรื่องนี้บอกตามตรงได้นะ\""
1010603-99 = "ถะ... ถ้างั้น... ฉันจะทำอย่างที่คุณครูว่าค่ะ..."
1010603-100 = "ฮู่ว... ฮู่ว..."
1010603-106 = "ฉันส่งข้อความไปแล้วค่ะ ฉันจะไปหาทุกคนตามนัด แล้วอธิบายเรื่องที่เกิดในตอนนั้นและขอโทษกับ#nทุกคนอย่างตรงไปตรงมาค่ะ"
1010603-107 = "ฮุฮุ..."
1010603-108 = "ประหม่าจังเลยนะคะ นานแค่ไหนแล้วนะที่ฉันไม่ได้ประหม่ากับอะไรแบบนี้..."
1010603-109 = "ขอบคุณนะคะคุณครู บางทีสิ่งที่ฉันต้องการอาจไม่ใช่สติปัญญา แต่เป็นความกล้าหาญก็ได้ค่ะ"
1010603-110 = "ฉันน่าจะมีความกล้าแบบนี้ได้เพราะการแนะนำจากคุณครูค่ะ"
1010603-111 = "ไม่ว่าผลจะออกมายังไง... ก็ขอบคุณนะคะ"
1010603-112 = "งั้นที่เหลือ..."
1010603-113 = "ฉันจะมาเล่าผลลัพธ์ให้ฟังตอนสุดสัปดาห์นี้นะคะ"
1010603-115 = "(คุณครูปลอบซากุระโกะที่ทั้งตื่นเต้นและประหม่า จากนั้นก็กลับมาที่ชาเล่ต์)"

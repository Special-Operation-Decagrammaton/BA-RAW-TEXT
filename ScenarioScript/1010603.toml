[translation]
1010603-1 = "另一個自己"
1010603-2 = "（接到櫻子的聯絡後，動身前往了約定的地點）"
1010603-5 = "……啊，您來了啊，老師。"
1010603-9 = "[ns1]「……櫻子？」\n[ns2]「這次是穿平常的服裝啊……」"
1010603-12 = "是的……恭候多時了。"
1010603-13 = "今日之所以打擾……是想向您分享一些經驗，希望您能夠提供意見作為參考。"
1010603-14 = "是什麼樣的經驗？#n唔嗯……其實……"
1010603-18 = "……老師。"
1010603-19 = "平時的我總是很在意周圍的人，所以也會特別留意自己的行為舉止。"
1010603-20 = "然而那與其說是天性使然……更接近被迫採取的必要行動。"
1010603-21 = "一切都是為了避免對自身所處的地位、職位、組織……以及其他人產生麻煩。"
1010603-22 = "即便外出的目的只是一些小事或私事……#n我也必須穿著修女服，並盡可能展現與之相符的形象。"
1010603-23 = "畢竟衣服可說是一個人職位的體現。"
1010603-24 = "然而在某天練習完……也就是穿著偶像服回家的路上。"
1010603-25 = "碰巧在路上遇到了幾位新來的修女……"
1010603-26 = "於是我便和平常一樣跟他們打了聲招呼。"
1010603-31 = "[ns3]「……嗯？然後呢？」\n[ns4]「有什麼問題嗎……？」"
1010603-34 = "唔嗯……就是……"
1010603-35 = "也許是因為尚未聽說活動的事，又或者是沒有親眼看過……"
1010603-36 = "他們完全沒有認出身穿偶像服的我……"
1010603-37 = "於是……"
1010603-38 = "話題就在沒有認出我也是修女會成員的情況下，繼續進行了下去。"
1010603-39 = "雖然我有嘗試告訴他們自己的名字，試圖藉此解開誤會……#n沒想到他們因為一時過於興奮，就把我的名字「櫻子」聽成了「櫻」……"
1010603-40 = "最後甚至還一起去KTV唱了三小時的歌……"
1010603-41 = "[s5]「……啊？」\n[s6]「哦哦……嗯……」"
1010603-44 = "過，過程中我也好幾次嘗試要告訴他們真相！#n可是在那個氛圍……那個時機之下……卻總是沒能成功！"
1010603-48 = "我想最關鍵的原因，還是因為我當時穿著那樣的服裝吧……"
1010603-49 = "而且我當下的言行舉止也跟平時相去甚遠……或許這才是產生誤會的主因也說不定。"
1010603-50 = "就連分開的時候，他們也是一邊稱呼我為「櫻醬」，一邊和我道別……"
1010603-51 = "這種情況究竟該怎麼辦才好呢……？#n我甚至還跟他們交換了聯絡方式……"
1010603-52 = "由於我們一般不會在工作以外的場合交換聯絡方式，因此他們還是沒有認出我來。"
1010603-53 = "甚至還傳訊息說要再約出來見面……就像這樣……"
1010603-59 = "「櫻醬！星期天下午一點！記得別遲到哦！！」"
1010603-61 = "「這次其他人也說要來！所以絕對不能少了櫻醬的歌聲！！」"
1010603-63 = "「就這麼說定囉，櫻醬──！！」"
1010603-68 = "[ns7]「……你還真受歡迎呢，櫻醬。」\n[ns8]「這就是平行時空的歌住修女嗎……」"
1010603-71 = "唔……！！"
1010603-72 = "總之，雖然這場欺騙並非有意為之，但我希望能解開這場誤會……"
1010603-73 = "然而如果突然表明身分，我擔心會因此讓修女們感到傷心。"
1010603-74 = "都怪我穿上了和平常不同的服裝，才會釀成這種錯誤……"
1010603-75 = "……嗯？"
1010603-76 = "老師……？#n您這是什麼意思……"
1010603-77 = "其實……沒什麼問題……？"
1010603-78 = "只要老實告訴他們真相就行了……？#n可，可是這樣原本的我就……！"
1010603-79 = "[s9]「原本的櫻子怎麼了嗎？」\n[s10]「你一直都很努力，我相信一定沒問題的。」"
1010603-82 = "可，可是……#n雖然您說的很簡單……但這個問題並不是……"
1010603-83 = "日後將被其他修女如何看待，我已經在腦海裡想過了一遍又一遍……"
1010603-87 = "唔嗯……老師……"
1010603-88 = "這樣……"
1010603-89 = "這樣直接表明真相……真的好嗎？"
1010603-90 = "坦白說……唔嗯……我其實也想如實表明自己真實的想法。"
1010603-91 = "……我明白了。"
1010603-92 = "仔細想想……確實就像您說的一樣，當時的狀況和平時並不相同。"
1010603-93 = "如果是平時，在我心裡總是會藏著不可告人的祕密或機密。"
1010603-94 = "但這次的事情，完全是我個人的私事。"
1010603-95 = "所以就算坦承地說出來，也不會造成教堂或修女會的困擾。"
1010603-96 = "[s11]「我認為這種問題就該正面突破。」\n[s12]「就算坦承這種事也不會帶來任何問題的。」"
1010603-99 = "那，那麼……就按照老師說的……"
1010603-100 = "呼，呼……"
1010603-106 = "我已經回覆他們了。#n我會在赴約時坦承當時的狀況，並向他們道歉。"
1010603-107 = "……呵呵。"
1010603-108 = "總覺得有點緊張。#n這種感覺還真是久違了呢……"
1010603-109 = "謝謝您，老師。#n或許我需要的並不是智慧，而是勇氣也說不定。"
1010603-110 = "多虧有老師推我一把，我才得以下定決心。"
1010603-111 = "無論結果如何……都非常感謝您的幫助。"
1010603-112 = "至於結果……"
1010603-113 = "待週末晚上赴約之後，我會再向您報告的。"
1010603-115 = "（接著又稍微安撫了緊張的櫻子後，回到了夏萊）"

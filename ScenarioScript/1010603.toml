1010603-105 = "#wait;1500"
1010603-106 = "3;사쿠라코;02;답장, 보냈습니다. 약속한 장소로 나가서, 당시의 상황에 대해, 사과와 함께 솔직하게 말씀드리겠습니다.\n#3;em;[반응]"
1010603-107 = "3;사쿠라코;01;……후후."
1010603-108 = "3;사쿠라코;03;뭔가 떨리네요. 이런 걸로 떨어본 게 얼마 만인지…….\n#3;em;[///]"
1010603-109 = "3;사쿠라코;01;감사합니다, 선생님. 어쩌면 저에게 필요한 건 지혜가 아니라 용기였을 지도 모르겠네요."
1010603-110 = "3;사쿠라코;02;선생님께서 밀어주신 덕분에, 이런 마음도 가질 수 있게 된 것 같습니다."
1010603-111 = "3;사쿠라코;99;일이 어떻게 되든……. 감사드립니다."
1010603-112 = "3;사쿠라코;07;그럼 나머지는…….\n#3;em;…"
1010603-113 = "3;사쿠라코;07;주말 저녁에, 결과가 다 나오고 나서 말씀드리겠습니다."

1010603-71 = "3;사쿠라코;06;크, 크윽…….\n#3;em;[세로선]\n#3;stiff"
1010603-72 = "3;사쿠라코;04;아무튼 뭔가 의도와는 달리 자매님들을 속이게 된 이 상황을 해결하고 싶습니다만,"
1010603-73 = "3;사쿠라코;04;그렇다고 갑자기 정체를 밝히면 자매님들에게 상심이나 상처가 돼 버리진 않을지 걱정이 됩니다.\n#3;em;[속상함]"
1010603-74 = "3;사쿠라코;06;애초에 복장이 바뀌었다고 해서, 그런 실수를 해 버린 것이 저의 실책이겠으나……."
1010603-75 = "3;사쿠라코;04;……네?\n#3;em;[?]"
1010603-76 = "3;사쿠라코;12;……? 선생님……? 그게 무슨……."
1010603-77 = "3;사쿠라코;07;별로 상관없다……고요……?"
1010603-78 = "3;사쿠라코;04;그냥 사실대로 이야기하면 된다고요……? 그, 그렇지만, 그랬다간 기존의 제가……!\n#3;stiff\n#3;em;[!]"
1010603-79 = "[s9] \"기존의 사쿠라코가 어때서?\"\n[s10] \"지금껏 해 온 노력이라면 문제없을 거야.\""
1010603-80 = "#wait;10"
1010603-81 = "#wait;10"
1010603-82 = "3;사쿠라코;04;그, 그런……. 그렇게 편한 말로 말씀하셔도……. 이건 그런 문제가…….\n#3;em;[땀]\n#3;stiff"
1010603-83 = "3;사쿠라코;06;다른 자매님들이 저를 어떻게 생각하시는지는 이미 몇 번이나……."

1010603-1 = "#title;또 다른 나"
1010603-2 = "#na;(사쿠라코의 연락을 받고 정해준 장소로 나갔다.)"
1010603-3 = "#all;hide"
1010603-4 = "#wait;2000"
1010603-5 = "#na;???;……아. 오셨군요, 선생님."
1010603-6 = "#st;[0,0];instant;1;"
1010603-7 = "#clearST"
1010603-8 = "3;사쿠라코;01\n#3;a\n#wait;1500"
1010603-9 = "[ns1] \"……사쿠라코?\"\n[ns2] \"이번엔 평상시의 복장이구나…….\""
1010603-10 = "#wait;10"
1010603-11 = "#wait;10"
1010603-12 = "3;사쿠라코;02;네. 그렇습니다. ……그리고 선생님을 기다리고 있었답니다.\n#3;greeting"
1010603-13 = "3;사쿠라코;99;오늘 있었던 저의 어떤 경험……에 대해 공유해 드리고, 또한 상담받기 위해서요."
1010603-14 = "3;사쿠라코;04;무슨 경험이냐고요? 음……. 그게…….\n#3;em;[땀]"
1010603-15 = "#st;[0,0];instant;1;"
1010603-16 = "#clearST"
1010603-17 = "3;사쿠라코;04\n#3;em;…\n#wait;2500"
1010603-18 = "3;사쿠라코;07;……선생님.\n#3;em;[반응]"
1010603-19 = "3;사쿠라코;99;평소의 저는, 항상 주변 모든 사람들을 의식하며, 행동거지 하나하나에 신경을 쓰고 있습니다."
1010603-20 = "3;사쿠라코;13;하지만 그것들은 딱히 저의 천성이라기보다……. 모두 필요에 의한 행동이었죠."
1010603-21 = "3;사쿠라코;07;전부 저의 위치와 지위, 속한 조직과 다른 사람들에게 누가 되지 않기 위한 것들."
1010603-22 = "3;사쿠라코;01;사소한 일이나 개인적인 일로 나갈 때조차 평상시라면 시스터 복장을 착용해야 하고, 그러면 그에 맞는 행동을 보여야 합니다."
1010603-23 = "3;사쿠라코;02;사람의 직위는, 옷 위에 얹는 것이니까요."
1010603-24 = "3;사쿠라코;99;그런데 오늘 연습을 마치고, 돌아오는 길에……. 그러니까 아이돌 복장인 상태였지요.\n#3;em;…"
1010603-25 = "3;사쿠라코;06;그 길에 저는, 신입생 자매님들과 마주치고 말았습니다.\n#3;stiff"
1010603-26 = "3;사쿠라코;04;……그리고 평소처럼 인사를 건넸습니다."
1010603-27 = "#st;[0,0];instant;1;"
1010603-28 = "#clearST"
1010603-29 = "#wait;2500"
1010603-30 = "#wait;1500"
1010603-31 = "[ns3] \"……???? 음? 그래서?\"\n[ns4] \"거기에 무슨 문제가 있는 거야……?\""
1010603-32 = "#wait;10"
1010603-33 = "#wait;10"
1010603-34 = "3;사쿠라코;12;그……. 그게…….\n#3;em;…"
1010603-35 = "3;사쿠라코;12;그분들은 아직 행사에 대한 소식을 못 들으신 건지, 아직 보신 적이 없으셨던 건지,"
1010603-36 = "3;사쿠라코;06;아이돌 복장의 저를 전혀 저라고 알아보지 못하셔서…….\n#3;stiff\n#3;em;[속상함]"
1010603-37 = "3;사쿠라코;04;그……."
1010603-38 = "3;사쿠라코;13;시스터후드랑 관계없는, 새로 사귄 친우라고 오해하신 채 이야기가 진행돼 버렸습니다."
1010603-39 = "3;사쿠라코;04;해명하려고 이름도 말씀드렸지만, 분위기 속에 하던 말이 잘려서 '사쿠라코'가 아니라 '사쿠라'로 들으셨고……."
1010603-40 = "3;사쿠라코;06;그 상태로 노래방에서 3시간 정도 함께 노래를…….\n#3;em;[땀]\n#3;stiff\n#3;closeup"
1010603-41 = "[s5] \"……아?\"\n[s6] \"어, 어……. 음…….\""
1010603-42 = "#wait;10"
1010603-43 = "#wait;10"
1010603-44 = "3;사쿠라코;10;도, 도중에 몇 번이나 사실을 말씀드리려 했었습니다! 번번히 실패하긴 했지만요!! 그 분위기가……. 타이밍이……!!\n#3;hophop"
1010603-45 = "#st;[0,0];instant;1;"
1010603-46 = "#clearST"
1010603-47 = "3;사쿠라코;10\n#3;em;…\n#wait;2500"
1010603-48 = "3;사쿠라코;04;덧붙여서 결정적으로, 아마도 당시의 복장이 그래서 그랬던 건지……."
1010603-49 = "3;사쿠라코;06;그 당시의 저는 뭔가 제가 아닌 듯한 언행이기도 했습니다. 아마 오해에도 그게 주요했겠죠.\n#3;em;[세로선]"
1010603-50 = "3;사쿠라코;06;그렇게 헤어지는 순간까지도 \"사쿠라 쨩\"이라고 부르시며 배웅을 받았습니다만……."
1010603-51 = "3;사쿠라코;12;어떻게 하면 좋을까요……? 이미 연락처 교환까지 따로 해버렸습니다…….\n#3;stiff"
1010603-52 = "3;사쿠라코;10;일반적으로 저희는 업무상 관계가 없는 연락처는 공유가 이루어지지 않기에, 연락처를 받고도 저라는 걸 모르시는 듯합니다."
1010603-53 = "3;사쿠라코;06;다음 약속에 대한 안내까지 받아버렸는데……. 이렇게…….\n#3;em;[땀]"

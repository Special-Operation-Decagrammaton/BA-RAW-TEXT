[translation]
2601105-1 = "เดิมพันตีเบสบอล"
2601105-2 = "(ที่ที่ซาเต็นเรียกให้มาหาคือสนามฝึกตีเบสบอลแห่งหนึ่งในชานเมือง)"
2601105-10 = "ฮู่ว...! ที่นี่ก็มีอุปกรณ์พร้อมไม่เบาเลยนะเนี่ย"
2601105-11 = "ได้ยินมาว่าบรรยากาศของแต่ละโรงเรียนจะต่างกันมาก... แต่ที่นี่น่ะเหมือนกับเมืองแห่งการศึกษา#nของเรามากเลยนะ"
2601105-12 = "[s1] \"สนามฝึกตีเบสบอลเหรอ?\"\n[s2] โบกมือขึ้นทักทาย"
2601105-15 = "...อ๊ะ! คุณครู! ทางนี้ค่ะ ทางนี้!"
2601105-16 = "มาถึงเร็วกว่าที่คิดอีกนะคะ ฉันคิดว่าจะมาช้ากว่านี้ ก็เลยเล่นรอไปก่อน"
2601105-17 = "...คะ? เห็นบอกว่าวันนี้จะพักแท้ๆ แต่มาทำอะไรที่สนามฝึกตีเบสบอลงั้นเหรอคะ?"
2601105-18 = "อ่า... นี่ฉันก็พักอยู่นะคะ? แล้วฉันก็ทำสิ่งนี้บ่อยๆ ในเมืองแห่งการศึกษาของฉันด้วยค่ะ"
2601105-22 = "...มีปัญหาอะไรหรือเปล่าคะ...?"
2601105-23 = "[s3] \"ไม่หรอก ถ้าซาเต็นคิดว่านี่คือการพัก ครูก็เชื่อ\"\n[s4] \"พลังงานล้นเหลือจริงๆ นะเนี่ย...\""
2601105-26 = "...อ่า จะว่าไปแล้ว คุณครู ฉันมีเรื่องสงสัยอยู่อย่างหนึ่งค่ะ"
2601105-27 = "อุปกรณ์ที่นี่มีแต่ของดีๆ ทั้งนั้นเลย..."
2601105-28 = "แต่ว่าทางโน้นน่ะค่ะ... มีบางอย่างแปลกๆ อยู่ในเขตตีเบสบอล"
2601105-29 = "...ค่ะ ทางโน้นค่ะ เห็นไหมคะ? โน่นไง..."
2601105-33 = "[ns5] \"ครูไม่รู้หรอกนะว่าคืออะไร แต่ดูโหดจัง\"\n[ns6] \"นั่นมันอะไรกันน่ะ...\""
2601105-36 = "ก่อนที่คุณครูจะมา ฉันลองไปอ่านคำเตือนดูค่ะ ในนั้นบอกไว้ว่าเป็นเครื่องส่งลูกความเร็วสูงที่นักเรียน#nมิลเลเนียมคนหนึ่งประดิษฐ์ขึ้น ก็เลยอาจจะเป็นอันตรายได้ค่ะ"
2601105-37 = "ถ้าถึงกับต้องมีคำเตือนเขียนไว้ขนาดนั้น ฉันก็เลยอยากรู้อยากเห็นขึ้นมา..."
2601105-38 = "...คะ? ถ้ามันอันตราย ไม่ไปตีจะดีกว่างั้นเหรอคะ? ฮืม..."
2601105-39 = "...ฮืม..."
2601105-40 = "[s7] \"...เอ่อ คุณซาเต็น?\"\n[s8] \"ครูเผลอพูดอะไรผิดไปหรือเปล่า?\""
2601105-43 = "ไม่ค่ะ ไม่ขนาดนั้นหรอก... อันที่จริงๆ ฉันก็คิดไว้ตั้งแต่ก่อนหน้านี้แล้วค่ะ"
2601105-44 = "ถ้าบอกว่าอันตราย ก็ยิ่งทำให้เราอยากลองใช่ไหมล่ะคะ? มันจะอันตรายสักแค่ไหนกันนะ..."
2601105-45 = "อืม..."
2601105-46 = "...ต้องลองไปตีลูกสักหน่อยแล้วละค่ะ คุณครูช่วยดูให้หน่อยนะคะ!"
2601105-51 = "(สุดท้ายซาเต็นก็เข้าไปในเขตตีลูกด้วยความฮึกเหิม)"
2601105-54 = "― [log=사텐]อืม... [/log][wa:1640] "
2601105-55 = "― [log=사텐]น่าจะไม่มีอะไรแตกต่างเป็นพิเศษนะ...[/log][wa:1140] "
2601105-58 = "― [log=사텐]...คุณครู ทำสีหน้าเคร่งเครียดเกินไปรึเปล่าคะ? [/log][wa:3200] "
2601105-59 = "― [log=사텐]ก็แค่เครื่องตีลูกเบสบอลเองนะ [/log][wa:230] "
2601105-62 = "[ns] \"ถ้ามันดูอันตรายก็เลิกเล่นเลยนะ\""
2601105-65 = "― [log=사텐]ค่ะ! แต่ยังไงก็น่าจะไหวอยู่นะคะ[/log][wa:1200] "
2601105-68 = "― [log=사텐]เรื่องตีลูกน่ะ [/log][wa:1230] "
2601105-69 = "― [log=사텐]ฉันมั่นใจอยู่แล้วละค่ะ[/log][wa:240] "
2601105-72 = "― [log=사텐]...อะไรกันคะ [/log][wa:1670] "
2601105-73 = "― [log=사텐]สายตาแห่งความสงสัยนั่น[/log]"
2601105-76 = "― [log=사텐]ถ้างั้น มาเดิมพันกันไหมล่ะคะ?[/log][wa:140] "
2601105-79 = "― [log=사텐]ถ้าตีไม่โดนภายใน 3 ลูก [/log][wa:1880] "
2601105-80 = "― [log=사텐]ฉันจะออกมาจากเขตตีลูกอย่างสงบเสงี่ยมเลยค่ะ[/log][wa:10] "
2601105-83 = "― [log=사텐]แต่ว่า ถ้าตีได้ตั้งแต่ลูกแรก [/log][wa:2910] "
2601105-84 = "― [log=사텐]คุณครูต้องไปกดเครื่องดื่มจากตู้ตรงนั้นให้ฉันนะคะ![/log][wa:10] "
2601105-87 = "― [log=사텐]ว่าไงล่ะคะ? [/log][wa:1490] "
2601105-88 = "― [log=사텐]ก็ไม่ถือว่าแย่สำหรับคุณครูใช่ไหมคะ?[/log][wa:340] "
2601105-91 = "― [log=사텐]...ฮิฮิ[/log][wa:320] "
2601105-94 = "เอาละ นักกีฬาซาเต็นพร้อมตีลูกแล้วค่ะ!"
2601105-95 = "ช่วยเตรียม!"
2601105-99 = "ลูกแรกให้เลยค่ะ!"
2601105-103 = "...ฮึบบบ!!"
2601105-111 = "(...คุณครูต้องซื้อเครื่องดื่มให้ 3 กระป๋อง)"

[translation]
2601105-1 = "Batting Bet"
2601105-2 = "Saten invited me to the local batting cages."
2601105-10 = "Wow, this place has some good equipment."
2601105-11 = "I heard each academy has a different feel, but this one really reminds me of Academy City."
2601105-12 = "[s1] \"The batting cages?\"\n[s2] Wave to Saten as you approach."
2601105-15 = "Sensei, here! Over here!"
2601105-16 = "You're earlier than I expected! I was just about to start."
2601105-17 = "...Huh? What do you mean you thought I was going to relax?"
2601105-18 = "I am relaxing. By batting! I do this all the time in Academy City."
2601105-22 = "...Is that weird?"
2601105-23 = "[s3] \"No, no! You do you.\"\n[s4] \"I was just thinking you're always so full of energy.\""
2601105-26 = "Actually, first, I've got a question."
2601105-27 = "The facilities and everything here are so nice..."
2601105-28 = "But I noticed that the cage over there has a kind of weird setup."
2601105-29 = "See it? Over there."
2601105-33 = "[ns5] \"It does seem a bit...odd?\"\n[ns6] \"What's going on over there?\""
2601105-36 = "I looked it up while I was waiting. Apparently it's a \"dangerously powerful pitching machine\" a Millennium student built."
2601105-37 = "That warning... Doesn't it make you want to try it out even more?"
2601105-38 = "...What? You think it's too dangerous? Hm..."
2601105-39 = "Hmmmm..."
2601105-40 = "[s7] \"Um, Saten?\"\n[s8] \"Did I say something wrong?\""
2601105-43 = "No, nothing like that... It's just been on my mind since before you got here."
2601105-44 = "I mean, when I hear that something's dangerous, a part of me wants to test out just HOW dangerous it really is..."
2601105-45 = "Hmm..."
2601105-46 = "There's no helping it. I need to test it out. Watch me, Sensei!"
2601105-51 = "A determined Saten walked to the batting cage."
2601105-54 = "― [log=사텐]Well... [/log][wa:1600] "
2601105-55 = "― [log=사텐]It doesn't look that different from the other cages...[/log][wa:380] "
2601105-58 = "― [log=사텐]...Sensei, what's with the worried face? [/log][wa:3400] "
2601105-59 = "― [log=사텐]It's just a batting machine. [/log][wa:230] "
2601105-62 = "[ns] \"Stop at any point if you feel like it's too dangerous.\""
2601105-65 = "― [log=사텐]Okay! Still, I'm sure I'll be fine.[/log][wa:1040] "
2601105-68 = "― [log=사텐]I'm pretty confident [/log][wa:990] "
2601105-69 = "― [log=사텐]with a bat, after all.[/log][wa:240] "
2601105-72 = "― [log=사텐]...And now you're giving me [/log][wa:1070] "
2601105-73 = "― [log=사텐]the most suspicious look.[/log]"
2601105-76 = "― [log=사텐]Why don't we make a bet?[/log][wa:340] "
2601105-79 = "― [log=사텐]If I don't hit the ball in three pitches, [/log][wa:1120] "
2601105-80 = "― [log=사텐]I'll step off the plate quietly.[/log][wa:20] "
2601105-83 = "― [log=사텐]But if I hit even one ball, [/log][wa:2950] "
2601105-84 = "― [log=사텐]you've got to get me a drink from that vending machine![/log][wa:10] "
2601105-87 = "― [log=사텐]What do you think? [/log][wa:1210] "
2601105-88 = "― [log=사텐]It's not a bad bet for you either, right?[/log][wa:100] "
2601105-91 = "― [log=사텐]...Heehee.[/log][wa:200] "
2601105-94 = "All right! It's batter number 4, Saten, stepping up to the plate!"
2601105-95 = "And now for the first pitch!"
2601105-99 = "Here it comes!"
2601105-103 = "Hyah!!"
2601105-111 = "I had to buy her 3 drinks."

[translation]
2601105-1 = "擊球賭注"
2601105-2 = "（佐天所說的地方是一座位於近郊的棒球打擊場）"
2601105-10 = "呼……！這裡的設備還挺不錯的嘛。"
2601105-11 = "而且每間學園的氣氛完全不同……這點倒是跟我們的學園都市特別類似。"
2601105-12 = "[s1]「棒球打擊場？」\n[s2] 揮手打招呼"
2601105-15 = "……啊！老師！這裡，我在這裡！"
2601105-16 = "來得比想像中還快呢。#n我以為老師晚點才會來，所以就自己先開始打了。"
2601105-17 = "……嗯？我明明說要放鬆，為什麼還跑來打棒球？"
2601105-18 = "咦……這是在放鬆沒錯啊？#n我在學園都市的時候也經常這麼做。"
2601105-22 = "……有什麼問題嗎……？"
2601105-23 = "[s3]「沒事，佐天覺得可以就行了。」\n[s4]「真是活力充沛呢……」"
2601105-26 = "……啊，這麼說來，老師，我有件事想請教你。"
2601105-27 = "雖然這裡的設施很不錯……"
2601105-28 = "不過你看那邊……不知道為什麼，只有那邊的打擊區看起來特別奇怪。"
2601105-29 = "……嗯，就是那邊，老師有看到嗎？"
2601105-33 = "[ns5]「……莫名有股充滿殺氣的感覺呢。」\n[ns6]「那到底是什麼呢……」"
2601105-36 = "我在老師來之前去看過公告。#n上面寫說那是某位千年學生所打造的超快速投球機，所以可能會有危險……"
2601105-37 = "不過看到上面那麼寫，反而讓我覺得更好奇……"
2601105-38 = "……嗯？你說那很危險，最好還是別碰？"
2601105-39 = "……哼嗯……"
2601105-40 = "[s7]「……那個，佐天同學？」\n[s8]「我是不是說錯話了？」"
2601105-43 = "啊，不是的，應該說……其實我在老師來之前就在思考這個問題了。"
2601105-44 = "老師不覺得越是被說危險，就越想挑戰看看嗎？#n就是那種……想見識到底有多厲害的感覺。"
2601105-45 = "嗯……"
2601105-46 = "……我果然還是想試打看看。#n老師，請你仔細看哦！"
2601105-51 = "（最終，佐天還是自信滿滿地站上了打擊區）"
2601105-54 = "― [log=사텐]嗯……[/log][wa:1800] "
2601105-55 = "― [log=사텐]好像沒什麼……特別不一樣的地方。[/log][wa:1900] "
2601105-58 = "― [log=사텐]……老師，你的表情會不會太嚴肅了？[/log][wa:4360] "
2601105-59 = "― [log=사텐]這只是個投球機而已啦。[/log][wa:950] "
2601105-62 = "[ns]「如果覺得危險的話，一定要立刻停手哦？」"
2601105-65 = "― [log=사텐]是！不過，我想應該沒問題的。[/log][wa:1880] "
2601105-68 = "― [log=사텐]畢竟我對打擊，[/log][wa:1550] "
2601105-69 = "― [log=사텐]還算有點自信。[/log][wa:840] "
2601105-72 = "― [log=사텐]……怎麼了？[/log][wa:1950] "
2601105-73 = "― [log=사텐]那是什麼懷疑的眼神。[/log]"
2601105-76 = "― [log=사텐]那，要不要來打個賭？[/log][wa:900] "
2601105-79 = "― [log=사텐]要是沒在三球之內擊中的話，[/log][wa:2280] "
2601105-80 = "― [log=사텐]我就乖乖離開打擊區。[/log][wa:900] "
2601105-83 = "― [log=사텐]相反地，只要我打中一顆球，[/log][wa:3550] "
2601105-84 = "― [log=사텐]老師就要去那邊的自動販賣機買飲料請我喝！[/log][wa:680] "
2601105-87 = "― [log=사텐]怎麼樣？[/log][wa:1810] "
2601105-88 = "― [log=사텐]對老師來說，也是個不錯的提議吧？[/log][wa:1100] "
2601105-91 = "― [log=사텐]……嘿嘿。[/log][wa:400] "
2601105-94 = "好，那麼現在佐天選手已經在打擊區就定位了！"
2601105-95 = "首先是第一顆球！"
2601105-99 = "預備！"
2601105-103 = "……哈啊啊！！"
2601105-111 = "（……結果買了三瓶飲料）"

[translation]
104060-1 = "第6話;同等的條件"
104060-7 = "分析狀況……與生命守護者的連結已解除。嘗試進行迂迴連結。"
104060-11 = "……嘗試失敗。與生命守護者的連結遭到阻斷。無法介入。"
104060-15 = "已確認「多次元詮釋」仍維持抑制狀態──加速演算，再次嘗試破壞。"
104060-19 = "無法加速演算。確認地上聖所[ruby=Incarnation]的顯現程[/ruby]序。確認曾短暫顯現。"
104060-23 = "確認臨時個體遭到破壞。無法顯現。"
104060-24 = "……這樣下去，計畫會失敗。"
104060-25 = "……"
104060-36 = "……確認狀況。已確認「阿特拉哈西斯的方舟」正在準備「自爆程式」。"
104060-37 = "程式啟動時，方舟將爆炸並進行最終處理。「多次元詮釋」功能將永久消滅。"
104060-38 = "……立刻採取應對──"
104060-42 = "──無法演算。由於資源不足，聖[ruby=Incarnation]所顯現程[/ruby]序──"
104060-43 = "……已被取消。"
104060-51 = "成功……了吧？"
104060-52 = "吶，接下來會怎麼樣啊～？#n這裡會爆炸嗎……？"
104060-53 = "應該會吧？"
104060-58 = "……"
104060-59 = "哎呀，風華同學？"
104060-64 = "也許是因為突然放鬆下來了吧……辛苦了，風華同學。"
104060-65 = "那，準備都結束了對吧？"
104060-66 = "嗯，本來應該是這樣的……"
104060-67 = "唔呵呵……"
104060-68 = "嗚哇，為什麼要露出那麼詭異的笑容啊……"
104060-70 = "啊！得去幫忙老師才行！！"
104060-71 = "對，對了……老師……"
104060-72 = "沒錯。享用完最後一道料理，套餐才算結束。"
104060-73 = "戰鬥還沒有結束。#n來，我們這就去收尾吧！"
104060-74 = "友情真是美妙呢★"
104060-75 = "嘛，我就知道大概是這樣……真拿你沒辦法。"
104060-80 = "走吧！！"
104060-81 = "風華就由我來揹吧～！出發囉～！！"
104060-83 = "天空的顏色又改變了……！"
104060-84 = "終於成功了呢！#n「方舟」的自爆程式也開始運作了。"
104060-85 = "那接下來……只要在爆炸前帶著老師和白子醬一起離開這裡就行了吧？"
104060-86 = "……我們去找老師！#n請綾音醬先離開吧！"
104060-87 = "不……我也要在老師和前輩們會合後離開！#n在那之前我也會一起待在這裡的。"
104060-88 = "可是……"
104060-89 = "那就一起堅持到最後一刻吧，綾音醬。#n拜託你帶路了唷。"
104060-90 = "是！那麼立刻移動吧！！"
104060-91 = "走吧！！"
104060-94 = "聽到了吧？你們也動作快！#n要使用莉央會長製作的「逃脫程式」了唷！"
104060-95 = "呃，咦？#n……遊戲開發部，你們現在在哪裡？"
104060-96 = "我們正在前往方舟的中央區！"
104060-97 = "嗯！我們要去幫老師！"
104060-98 = "是的，從這邊很快就能抵達……！！"
104060-99 = "要，要離開的話，隨時都可以，所以……！"
104060-100 = "不是吧！？"
104060-104 = "啊啊真是的……我知道了！#n那，老師回來之後就要馬上離開哦！？"
104060-105 = "是！請交給愛麗絲吧，優香！"
104060-110 = "天空……"
104060-111 = "看吧？我就說一定沒問題的吧？"
104060-112 = "沒錯。已確認顯現中的「虛假的聖所」的消滅。"
104060-113 = "掃除跟季醬的護送也結束了，接下來該做什麼呢～？"
104060-114 = "那還用說嗎，該做的事只有一件吧？"
104060-117 = "那就是等老師回來。"
104060-118 = "……嗯！這件事我很有自信唷～！"
104060-119 = "不過，依然不能大意……#n有必要繼續觀察其他地方的狀況。"
104060-120 = "嗯，也對。不過，一定沒問題的。"
104060-122 = "警告。「阿特拉哈西斯的方舟」正在準備「自爆程式」。#n若該程式啟動，爆炸後內部人員的生存機率為0.0003%以下。"
104060-123 = "砂狼白子、砂狼白子、[USERNAME]老師。預測將全員死亡。必須立刻設計應對方法──"
104060-127 = "……這樣啊。"
104060-128 = "原來如此……老師在爭取時間。#n──看來你相信大家一定能辦的到。"
104060-129 = "[s]「因為我一直都很相信大家。」"
104060-133 = "沒錯──就算我贏不了也沒關係。"
104060-134 = "只要和[ruby=・]大[/ruby][ruby=・]家[/ruby]一起贏就行了。"
104060-135 = "和大家一起，啊……"
104060-136 = "[s]「嗯，大家很快就會過來。」 "
104060-137 = "對策委員會──以及「夏萊」。"
104060-141 = "[ns]「所以在那之前我會阻止你們。──因為我有話想說。」"
104060-142 = "有話想說……"
104060-143 = "正在設計應對方法。尚有解決方法存在。#n從現在起，將利用其他途徑將生命守護者──"
104060-144 = "……不，不必了。"
104060-148 = "就算試了也只會重複出現相同的結果。#n老師一定會再次克服危機吧。"
104060-149 = "和大家齊心協力迎向困難──這確實是個威脅。"
104060-150 = "老師一直以來──就是這樣一次又一次地創造了奇蹟。"
104060-156 = "既然如此，只要先解決「老師」就好。"
104060-157 = "這樣一來，無論是方舟的自爆，還是聖所的顯現……都能重新開始。"
104060-158 = "只要[ruby=・]老[/ruby][ruby=・]師[/ruby]不在的話。"
104060-159 = "沒錯。#n只要老師不在……一切都會崩潰。"
104060-160 = "所以，我們要在這裡傾注所有力量。"
104060-166 = "……確認指示。中止「希迪姆的箱子」的演算支援。#n切換為戰鬥支援模式。"
104060-172 = "[ns]「場所改變了……？」"
104060-173 = "從現在開始，我的所有能力將用來支援戰鬥。"
104060-174 = "[s1]「我也有超優秀的彩奈醬！！」\n[s2]「彩奈──！！」"
104060-177 = "沒錯！！從現在開始，超級彩奈會協助老師！！"
104060-178 = "不管對方是誰，想傷害[USERNAME]老師的人，彩奈我都不會原諒的！"
104060-179 = "嗯，不會讓你們傷害老師的。"
104060-180 = "……是嗎。我們彼此都是相同的心情吧。"
104060-181 = "但是，老師。別以為我們的條件是相等的。#n因為我所經歷的戰鬥，規格可是遠遠與你們不同。"
104060-182 = "就算「希迪姆的箱子」的性能相同，也無法彌補經驗的差距。"
104060-183 = "[ns3]「…………」\n[ns4] 拿出大人的卡片"
104060-187 = "……沒錯，老師有那個東西。"
104060-188 = "確實，那個東西或許能忽視所有的條件獲得勝利。"
104060-189 = "但是……你該不會忘了吧？老師。"
104060-190 = "在你面前的誘騙者，是[ruby=・]誰[/ruby]呢？"
104060-199 = "老，老師……！？#n誘，誘騙者拿出了某個東西……！！"
104060-200 = "那，那是……！！？"
104060-203 = "……！？"
104060-204 = "[ns]「…………………………！！」"
104060-205 = "「大人的卡片」對「大人的卡片」……"
104060-206 = "這種時候，哪一邊的「卡片」會贏呢？"
104060-208 = "下一話;相同的情況，相同的選擇"

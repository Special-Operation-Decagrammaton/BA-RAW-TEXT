[translation]
10017025-1 = "第2話;Les Miserables……？"
10017025-10 = "後巷"
10017025-11 = "哈啊，哈啊……！#n喂，沒事吧！？"
10017025-16 = "可惡……是死路，被逼到絕境了！"
10017025-19 = "……成功逼進死路了。#n麻白，能聽到嗎？"
10017025-20 = "有的，沒問題！"
10017025-21 = "支援射擊就拜託了。"
10017025-22 = "了解！"
10017025-23 = "那就麻煩你囉。"
10017025-24 = "嘻嘻……嘻呀哈哈……"
10017025-29 = "好痛！？從，從哪裡射來的！？"
10017025-30 = "這不是普通的子彈……！#n可惡，是那個實現正義部的狙擊手嗎！"
10017025-31 = "我們沒做什麼壞事吧！？"
10017025-32 = "對啊對啊！我們沒有綁架別人要求贖金！"
10017025-33 = "也沒有因為爭地盤而破壞街道！"
10017025-34 = "更沒有引起暴動或示威之類的過激行為！"
10017025-35 = "說起來，現在是聖誕節吧，我們也想安靜地──"
10017025-39 = "（咚哐哐哐哐哐──！！）"
10017025-40 = "咿！？"
10017025-41 = "什，什麼？怎麼了！？"
10017025-46 = "咯咯，嘰嘰嘰嘰嘰……"
10017025-47 = "嘻嘻嘻嘻嘻嘻嘻……！"
10017025-49 = "那是……！？"
10017025-50 = "救，救命啊！#n還有重要的事在等著我回去──"
10017025-52 = "嘰呀哈哈哈哈哈哈哈啊──！！！！"
10017025-64 = "呼……"
10017025-65 = "任務完成。#n麻白、弦生，辛苦了。"
10017025-66 = "是，您也辛苦了。"
10017025-71 = "……那個東西呢？ "
10017025-76 = "已經確實回收了。"
10017025-77 = "話雖如此，竟然在聖誕節想出這種點子……"
10017025-78 = "根本就是惡魔才會做的事，或者也可以說是格黑娜才會做的事……"
10017025-79 = "不管怎麼說，這真是太過分了。"
10017025-80 = "只能說是一場災難了。#n沒想到居然會在聖誕晚會之前發生這種事……"
10017025-81 = "話雖如此，也不能把這件事推給其他人。"
10017025-82 = "由我們「實現正義部」來應對才是最更合情合理的。"
10017025-83 = "實現正義是不分時間和場所的。#n即使是聖誕節當天也一樣。"
10017025-84 = "原來如此，實現正義是不分時間和場所……"
10017025-85 = "看來我還有不足的地方，我會更努力進取的，前輩。"
10017025-86 = "話說回來，本來是想用更文明一點的方式……"
10017025-87 = "現在才這樣說好像太遲了呢。"
10017025-89 = "……要說遲了的話，另一邊的事似乎也一樣啊。"
10017025-90 = "啊，你指的是晚會吧。"
10017025-91 = "原本在出發時就已經很勉強了，現在是確定會遲到了。"
10017025-92 = "趕緊走吧，大家都在等我們呢。"
10017025-93 = "那麼，我們走吧。"
10017025-98 = "……走了嗎？"
10017025-99 = "痛痛痛……還以為要死了……"
10017025-100 = "啊啊，真是夠了，那樣很危險耶！#n受不了，我們連想好好地過個聖誕節也不行嗎……"
10017025-101 = "手法還真是無情呢……#n那麼，接下來該怎麼辦？"
10017025-102 = "計畫已經泡湯，東西也全部被搶走了……"
10017025-103 = "總之，先換個地方吧……"
10017025-112 = "奇普托斯．主要街道"
10017025-116 = "祝你聖誕快樂～♪#n祝我聖誕快樂～♪"
10017025-117 = "花，花繪醬，走太快了……！"
10017025-118 = "對了，前輩，今天是聖誕老人來的日子吧？#n我們穿成這樣不會有問題嗎？"
10017025-119 = "沒問題的。因為我們不會做出愧對於這幅打扮的行動。"
10017025-120 = "原來如此！#n既然穿著這套服裝，就必須負起相應的責任！"
10017025-121 = "總感覺更開心了呢！#n我們快走吧！"
10017025-125 = "花，花繪醬，小心點！#n路很滑的……！"
10017025-131 = "……救護騎士團和夏萊的老師？#n是在做什麼呢……？"
10017025-132 = "救護騎士團的話，肯定是那個吧。#n那群傢伙每年都會帶著捐款箱搞什麼活動吧？"
10017025-133 = "啊啊，原來如此。老師是去幫忙的嗎。#n總感覺很沒有過節的真實感呢。"
10017025-134 = "救護騎士團……老師……聖誕節……"
10017025-135 = "……我想到好點子了。"
10017025-136 = "嗯，什麼好點子？"
10017025-137 = "聽我說，我們只要……"
10017025-142 = "……你真是個天才！"
10017025-143 = "呵，大概是轉運了吧。#n所以你也同意對吧？"
10017025-144 = "啊啊，就這麼幹。"
10017025-145 = "首先，要盡可能地表現出可憐的樣子……"
10017025-146 = "這肯定沒問題。#n再怎麼說，被奪走一切，計畫付諸流水……"
10017025-147 = "怎麼想都已經夠可憐了。"
10017025-148 = "……真想哭啊。"
10017025-149 = "要哭的話，等一切都結束後再哭吧。"

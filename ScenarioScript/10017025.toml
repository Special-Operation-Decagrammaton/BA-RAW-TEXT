[translation]
10017025-1 = "ตอนที่ 2;Les Miserables...?"
10017025-10 = "ในตรอก"
10017025-11 = "แฮ่ก... แฮ่ก...! เฮ้ เป็นไงบ้าง? ยังไม่โดนอะไรใช่ไหม?"
10017025-16 = "เวรกรรม... ทางตันนี่นา เราโดนต้อนแล้ว!"
10017025-19 = "ไล่ต้อนพวกนักเลงสำเร็จแล้วค่ะ มาชิโระ ได้ยินไหมคะ?"
10017025-20 = "ค่ะ ทางนี้ไม่มีปัญหาค่ะ!"
10017025-21 = "รบกวนยิงเสริมด้วยค่ะ"
10017025-22 = "ได้เลยค่ะ เปิดฉากลอบยิง!"
10017025-23 = "ถ้างั้นฝากที่เหลือด้วยนะคะ"
10017025-24 = "หึหึ... หึหึหึ..."
10017025-29 = "อ๊ะ แสบนะ ร้อนด้วย! ใครยิงมาจากไหนเนี่ย!"
10017025-30 = "นี่มันไม่ใช่กระสุนปืนธรรมดา...! หรือว่าจะมาจาก... สไนเปอร์แห่งชมรมทวงความยุติธรรม!?"
10017025-31 = "พวกเราทำอะไรผิดถึงขนาดนั้นเลยเหรอ? "
10017025-32 = "นั่นสิ! เราก็ไม่ได้จับตัวประกันไปเรียกค่าไถ่เหมือนที่เคยทำสักหน่อย!"
10017025-33 = "แล้วก็ไม่ได้ทะเลาะกันจนทำลายถนนให้พังไปครึ่งหนึ่งด้วย!"
10017025-34 = "เราไม่ได้ก่อจลาจล ไม่ได้ยุยงส่งเสริมให้เกิดการประท้วง แล้วก็ไม่ได้ยกพวกชกต่อยกันด้วย!"
10017025-35 = "นี่มันคริสต์มาสนะ? ขอพวกเราอยู่เงียบๆ บ้างเถอะ!"
10017025-39 = "ตู้มมมมม!!!"
10017025-40 = "ฮะ.. เฮือกกก!!"
10017025-41 = "อะ... อะไรน่ะ? เกิดเรื่องอะไรเหรอ?!"
10017025-46 = "หึหึหึหึหึ หึหึหึ..."
10017025-47 = "คึคึคิกๆๆๆๆๆ!!!"
10017025-49 = "นั่นมัน...?!"
10017025-50 = "วะ...ไว้ชีวิตฉันด้วย! ฉันยังมีสุนัขจิ้งจอกกับกระต่ายที่ต้องดูแลนะ...!"
10017025-52 = "เคี๊ยกกกกกกก----!!!!!!!"
10017025-64 = "ฮู่วว..."
10017025-65 = "เคลียร์สถานการณ์ได้แล้ว ขอบคุณมากค่ะ มาชิโระ ซึรุกิ"
10017025-66 = "ทำได้ดีมากค่ะ รุ่นพี่ฮาสุมิ รุ่นพี่ซึรุกิ"
10017025-71 = "...แล้วของล่ะ? "
10017025-76 = "ไม่ต้องห่วงหรอกค่ะ ฉันได้คืนมาแล้ว"
10017025-77 = "คริสต์มาสทั้งที ดันมาเกิดเรื่องแบบนี้จนได้"
10017025-78 = "แบบนี้ไม่รู้จะต้องเรียกว่าแหวกแนว ร้ายกาจ หรือการกระทำที่ทำให้นึกถึงเกเฮนน่ากันแน่..."
10017025-79 = "ไม่ว่าจะเป็นแบบไหน แต่ก็ไม่อาจปฏิเสธได้ว่าเรื่องที่เกิดขึ้นมันร้ายแรงค่ะรุ่นพี่"
10017025-80 = "ต้องเรียกว่าเป็นภัยพิบัติเลยละค่ะ ไม่อยากจะเชื่อเลยว่าเราต้องมาจัดการเรื่องแบบนี้ก่อนงานเลี้ยงส่ง#nท้ายปี..."
10017025-81 = "แต่งานนี้ก็คงจะฝากให้คนอื่นจัดการให้ไม่ได้หรอกค่ะ"
10017025-82 = "ตามหลักการแล้ว นี่คือเรื่องที่ชมรมทวงความยุติธรรมที่ยึดมั่นใน 'ความยุติธรรม' ต้องออกมาจัดการ#nอยู่แล้วนี่คะ"
10017025-83 = "หากเป็นการทำงานเพื่อพิทักษ์ความยุติธรรม ไม่ว่าที่ไหน เวลาใด เราก็ต้องเต็มใจทำค่ะ แม้จะในวันคริสต์มาสก็ตามค่ะ มาชิโระ"
10017025-84 = "เพื่อพิทักษ์ความยุติธรรม ไม่ว่าที่ไหน เวลาใด เราก็ต้องเต็มใจทำ... งั้นสินะ"
10017025-85 = "สงสัยฉันคงยังบกพร่องอยู่ค่ะ แล้วฉันจะตั้งใจให้มากกว่าเดิมค่ะรุ่นพี่"
10017025-86 = "อืม... ใช่ค่ะ เพราะถ้าเราแสดงตัวอย่างเข้มงวดและดุดันละก็..."
10017025-87 = "เราก็อาจจัดการเรื่องที่เกิดในวันนี้ไม่ทันก็ได้ค่ะ"
10017025-89 = "แต่ตอนนี้อาจจะจัดการเรื่องอื่นไม่ทันก็ได้นะ..."
10017025-90 = "อ๊ะ นั่นสิคะ เรามีงานเลี้ยงส่งท้ายปีนี่นา"
10017025-91 = "ตายจริง เดิมทีก็ช้ากว่าเวลาที่ตกลงกันอยู่แล้ว แบบนี้ยิ่งช้ากันเข้าไปใหญ่เลยค่ะ"
10017025-92 = "รีบไปกันเถอะค่ะ หากพวกเราไปช้า สมาชิกคนอื่นจะรอนะคะ"
10017025-93 = "งั้นเราไปกันเถอะค่ะ ซึรุกิ มาชิโระ"
10017025-98 = "...ไปแล้วใช่ไหม?"
10017025-99 = "โธ่เอ้ย... จะบ้าตาย"
10017025-100 = "พวกนั้นก็โหดกันเกิน! จะไม่ให้พวกเราสนุกกับวันคริสต์มาสกันบ้างเลยรึไง!"
10017025-101 = "โหดร้ายกันเกินไปแล้ว จะว่าไป... จากนี้เราจะทำยังไงกันล่ะ?"
10017025-102 = "สิ่งที่คิดเอาไว้ก็ล่มไม่เป็นท่า แถมของที่มีก็ถูกยึดไปแล้วอีก..."
10017025-103 = "เอาเป็นว่า เราออกจากที่นี่กันก่อนเถอะ..."
10017025-112 = "ถนนในคิโวทอส"
10017025-116 = "ยูเบ็ทเทอร์ ว็อทช์ เอาท์~ ยู เบ็ทเทอร์ น็อท คราย~"
10017025-117 = "ฮานาเอะจัง? ค่อยๆ ไปเถอะค่ะ!"
10017025-118 = "จะว่าไปแล้ว รุ่นพี่คะ วันนี้เป็นวันที่ซานตาคลอสจะมา แต่พวกเราจะใส่ชุดซานต้านี้กันได้เหรอคะ?"
10017025-119 = "เราก็เลยมาทำกิจกรรมจิตอาสากันแบบนี้ จะได้ไม่อับอายต่อซานต้ากันไงคะ?"
10017025-120 = "จริงด้วยค่ะ! ถ้าเราใส่ชุดนี้อยู่ ก็ต้องรับผิดชอบกันให้มากขึ้นสินะคะ!"
10017025-121 = "ฉะ... ฉันทนไม่ไหวแล้วค่ะ! อยากรีบไปให้ถึงสถานที่จัดงานจะแย่แล้ว!"
10017025-125 = "ฮะ... ฮานาเอะจัง? ระวังค่ะ! ถนนมันลื่นนะคะ~"
10017025-131 = "นั่นชมรมอัศวินบรรเทาทุกข์กับคุณครูจากชาเล่ต์นี่นา? ทำอะไรกันอยู่น่ะ...?"
10017025-132 = "ถ้าเป็นชมรมอัศวินบรรเทาทุกข์ ก็คงไม่ใช่เรื่องอะไรอื่น เห็นถือกล่องรับบริจาคอยู่ทุกปีเลยนี่นา"
10017025-133 = "อ๋อ... ขอเรี่ยไรเงินนี่เอง ปีนี้ชวนคุณครูมาช่วยงานด้วยสินะ ทุกคนตื่นเต้นกับคริสต์มาสกันจังนะ"
10017025-134 = "เดี๋ยวนะ... ชมรมอัศวินบรรเทาทุกข์... คุณครู... คริสต์มาส..."
10017025-135 = "ฉันว่าฉันมีไอเดียอะไรดีๆ แล้วละ"
10017025-136 = "อะไรอีกล่ะ? อย่าให้พังไม่เป็นท่าเหมือนเดิมเชียวนะ"
10017025-137 = "ไม่หรอก ลองฟังดูก่อน แบบนี้เวิร์กแน่นอน"
10017025-142 = "นี่เธอเป็นอัจฉริยะรึไง?"
10017025-143 = "ก็เราเสียไปทุกอย่างยกเว้นสมองไง ต้องใช้หัวคิดกันหน่อยสิ! สรุปว่าเห็นด้วยใช่ไหม?"
10017025-144 = "ก็มันไม่มีวิธีอื่นแล้วนี่? ดีละ งั้นก็ลุยกันเลย"
10017025-145 = "ก่อนอื่นพวกเราต้องทำตัวให้ดูน่าสงสารมากที่สุด..."
10017025-146 = "เรื่องนั้นไม่ต้องเป็นห่วงหรอก เราทั้งโดนยึดของ ทั้งโดนพังแผนการในวันคริสต์มาส"
10017025-147 = "แค่นี้ถ้ายังไม่น่าสงสารก็เกินไปแล้ว"
10017025-148 = "พอพูดแบบนี้ ฉันก็อยากร้องไห้ขึ้นมาเลย..."
10017025-149 = "ถ้าจะร้อง ก็ให้ทุกอย่างเสร็จสิ้นก่อนเถอะแล้วค่อยร้อง เรื่องร้องน่ะจะร้องเมื่อไรก็ได้"

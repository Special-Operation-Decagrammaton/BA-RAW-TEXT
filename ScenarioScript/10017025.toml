[translation]
10017025-1 = "Episode 2;Les Miserables...?"
10017025-10 = "Back Alley"
10017025-11 = "*pant* *pant* Hey! You okay? You even alive?"
10017025-16 = "Damn it. A dead end!"
10017025-19 = "We have them cornered. Mashiro, can you hear me?"
10017025-20 = "Loud and clear!"
10017025-21 = "Fire support requested."
10017025-22 = "Roger that. Clear to fire!"
10017025-23 = "I'll leave the rest to you."
10017025-24 = "Kyehehe... Kyahahaha!"
10017025-29 = "What the hell?! Who's shooting us?!"
10017025-30 = "These aren't just any bullets! Could it be...a Justice Task Force member?!"
10017025-31 = "What did we even do to deserve this? "
10017025-32 = "Right?! We didn't even kidnap anyone this time!"
10017025-33 = "It's not like we left an entire street in ruins like usual!"
10017025-34 = "No riots! No sedition! Not even a single instance of mob violence!"
10017025-35 = "We deserve a peaceful Christmas too!"
10017025-39 = "*boom*"
10017025-40 = "E-Eek!"
10017025-41 = "Wh-What's going on?"
10017025-46 = "Hahahaha..."
10017025-47 = "Kehehehehehe!"
10017025-49 = "Th-That's...?!"
10017025-50 = "D-Don't kill me! I-I-I have a pet rock at home! Pebbles needs me!"
10017025-52 = "Gyaaaaaah!"
10017025-64 = "..."
10017025-65 = "And that's that. Good job, Mashiro, Tsurugi."
10017025-66 = "Thank you for your effort, Hasumi and Tsurugi."
10017025-71 = "...What about the object? "
10017025-76 = "I retrieved it. No need to worry."
10017025-77 = "I can't believe they thought of something like that on Christmas."
10017025-78 = "Creative, evil, dangerous... Just like Gehenna."
10017025-79 = "It's unquestionable that what they did was atrocious."
10017025-80 = "Having to deal with something like this right before the year-end party... It's an utter disaster."
10017025-81 = "This isn't the sort of thing we can entrust to just anyone."
10017025-82 = "Isn't it only natural for the Justice Task Force to mete out justice?"
10017025-83 = "Justice isn't something that should be done at our own convenience, Mashiro, even if it is Christmas."
10017025-84 = "You're right. Justice never clocks out, so neither should we!"
10017025-85 = "I still have much to learn. I'll try harder."
10017025-86 = "Um, right. Just remember to not push yourself too hard."
10017025-87 = "Though it may be a bit late to say that."
10017025-89 = "...Speaking of late, aren't we about to be..."
10017025-90 = "Right, the year-end party."
10017025-91 = "I was already worried about arriving late, and now we're even more pressed for time."
10017025-92 = "We should hurry. If we're late, it will inconvenience the other members."
10017025-93 = "Let's go, Tsurugi, Mashiro."
10017025-98 = "...Are they gone?"
10017025-99 = "Ugh... I'm dying."
10017025-100 = "They've crossed a line! What, criminals can't enjoy Christmas anymore?!"
10017025-101 = "The more they have, the more they want! ...So, what should we do now?"
10017025-102 = "Well, our plan is in ruins, and they took everything we had..."
10017025-103 = "Let's just get out of here..."
10017025-112 = "Kivotos Streets"
10017025-116 = "You better not cry, you better not pout!"
10017025-117 = "Hanae, could you please slow down?"
10017025-118 = "I'm telling you why. Santa Claus is comiiiiiin' to town. Oh, by the way, since he's coming, is it okay to wear a Santa outfit?"
10017025-119 = "I think doing charity work while dressed like this would make him proud."
10017025-120 = "You're right! This outfit comes with great responsibility!"
10017025-121 = "I can't wait! We have to start doing good as soon as possible!"
10017025-125 = "H-Hanae? Be careful! The ground is slippery!"
10017025-131 = "The Remedial Knights and Schale's Sensei? What are they up to?"
10017025-132 = "The Remedial Knights do some donation bucket thing every year."
10017025-133 = "That's all? I'm surprised they got Sensei to join them. Even they're taking it easy on Christmas."
10017025-134 = "Wait. The Remedial Knights... Sensei... Christmas..."
10017025-135 = "I just came up with a great idea! Wait, no, never mind... Wait again! Okay, now I came up with a great idea."
10017025-136 = "Are ya sure? I gotta be honest, I really don't want to get shot again."
10017025-137 = "No, just stop worrying for a sec. I can guarantee you that this plan has never failed before."
10017025-142 = "Didn't you just make it up?"
10017025-143 = "Look at us. All we have left are our ideas. So we don't actually have anything to lose! Right?"
10017025-144 = "I guess? Ah, to hell with it, I'm in."
10017025-145 = "First, we need to look as pitiful as possible."
10017025-146 = "Well, we're aimlessly wandering the streets on Christmas after losing everything and failing horribly..."
10017025-147 = "So I think we have that covered."
10017025-148 = "Hearing that makes me want to cry for real..."
10017025-149 = "Save the honest tears for your free time."

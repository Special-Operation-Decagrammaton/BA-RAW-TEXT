[translation]
80000064-1 = "การเล่นไล่จับวันวาเลนไทน์"
80000064-2 = "(คุณครูได้รับการติดต่อจากอาสึนะ เลยมาหาเธอที่ห้องชมรมของ C&C)"
80000064-9 = "(ถึงไฟในห้องจะเปิดอยู่ แต่ข้างในกลับไม่มีใครอยู่เลย)"
80000064-10 = "[s1] \"อาสึนะ...?\"\n[s2] \"ไม่มีใครอยู่เหรอ...?\""
80000064-11 = "ยะฮู้ว! มาแล้วเหรอ นายท่าน!!"
80000064-12 = "ยะฮู้ว! มาแล้วเหรอ นายท่าน!!"
80000064-13 = "แต่นแต๊น~-! อาสึนะ มาแล้วค่าาา-!!"
80000064-14 = "[s3] \"ตกใจหมดเลย!\"\n[s4] \"อะ...อาสึนะ!?\""
80000064-15 = "ฮ่ะฮ่ะฮ่ะฮ่าา! นายท่านตกใจเหรอ!? เซอร์ไพรส์นายท่านสำเร็จด้วย!!"
80000064-16 = "ฮ่ะฮ่ะฮ่ะฮ่าา! นายท่านตกใจเหรอ!? เซอร์ไพรส์นายท่านสำเร็จด้วย!!"
80000064-17 = "หืม? ฉันเหรอ? ก็อยู่ตรงนี้ตลอดเลยนะ? แค่ไปแอบเพื่อจะเซอร์ไพรส์นายท่านก็เท่านั้นเอง!"
80000064-18 = "นายท่านรู้ใช่มั้ยว่าวันนี้วันอะไร? หืม? ถามจริง... นายท่านไม่รู้จริงๆ เหรอ?"
80000064-19 = "[s5] \"วันวาเลนไทน์\"\n[s6] \"ครูจะไม่รู้ได้ยังไง\""
80000064-20 = "ใช่มะๆ อาสึนะคิดแล้วว่านายท่านต้องรู้ ถ้างั้นนายท่านก็รู้สินะว่าอาสึนะจะให้อะไร?"
80000064-21 = "ใช่มะๆ อาสึนะคิดแล้วว่านายท่านต้องรู้ ถ้างั้นนายท่านก็รู้สินะว่าอาสึนะจะให้อะไร?"
80000064-22 = "ดีล่ะ! ถ้างั้นก็ให้เลยแล้วกัน~!"
80000064-30 = "[ns7] \"คุณ...อาสึนะ...!?\"\n[ns8] \"ดะ...เดี๋ยวก่อน! จะทำอะไรน่ะ...!?\""
80000064-31 = "หืม...? นายท่าน? รู้อยู่แล้วไม่ใช่รึไง? ก็จะหยิบช็อกโกแลตออกมาให้ไงล่ะ? "
80000064-32 = "หืม...? นายท่าน? รู้อยู่แล้วไม่ใช่เหรอ? ก็จะหยิบช็อกโกแลตออกมาให้ไงล่ะ? "
80000064-33 = "เดี๋ยวก่อนนะคะ... มันติดนิดหน่อย เอ้านี่! หยิบออกมาได้แล้ว#nนี่ค่ะ! ช็อกโกแลตวาเลนไทน์ของอาสึนะ!"
80000064-34 = "อืม... แต่ไหนๆ ก็มาแล้ว อาสึนะป้อนให้นายท่านด้วยเลยดีมะ?"
80000064-35 = "เอ้า อ้าม~ สิคะ นายท่าน! อ้ามมม~!"
80000064-36 = "หืม...?"
80000064-37 = "นายท่าน? อะไรกันเล่า? ทำไมเม้มปากแน่นแบบนั้น?"
80000064-38 = "หืมมม~? ฮ่ะฮ่ะฮ่า! ทำไมทำหน้าแบบนั้นล่ะ? ทำหน้าตกใจอะไรขนาดนั้น?"
80000064-39 = "แต่ไม่ได้หรอกนะ! วันนี้เป็นวันวาเลนไทน์ นายท่านต้องกินช็อกโกแลตที่อาสึนะป้อนให้นะ"
80000064-40 = "หืม...? นายท่าน? นายท่าน??"
80000064-41 = "[s] วิ่งหนี"
80000064-44 = "...!? จู่ๆ ก็อยากเล่นไล่จับเหรอ!?"
80000064-45 = "ฮ่ะฮ่ะฮ่ะฮ่าาา! น่าสนุกจัง! เอาล่ะ! อาสึนะจะเป็นคนไล่จับเอง! ถ้าจับได้นายท่านต้องให้อาสึนะป้อนนะ!!"
80000064-46 = "เอาล่ะน้าาาา--!!"
80000064-58 = "(สุดท้ายคุณครูก็โดนอาสึนะจับได้และถูกบังคับให้กินช็อกโกแลต)"

[translation]
80000064-1 = "情人節也快樂地"
80000064-2 = "（收到明日奈的聯絡後，前往了偶爾會被當成C&C部室的會議廳）"
80000064-9 = "（雖然燈開著卻一個人影也沒看到）"
80000064-10 = "[s1]「……明日奈？」\n[s2] 「……咦？」"
80000064-11 = "呀齁────！"
80000064-12 = "呀齁────！"
80000064-13 = "鏘鏘──明日奈登場！！讓你久等了，主人！"
80000064-14 = "[s3]「嚇我一跳……！？」\n[s4]「明日奈！？」"
80000064-15 = "啊哈哈。主人嚇到了嗎？驚喜大成功～！"
80000064-16 = "啊哈哈。主人嚇到了嗎？驚喜大成功～！"
80000064-17 = "嗯？我嗎？嗯，一直躲在這個底下。因為想要嚇主人一跳讓主人開心！"
80000064-18 = "啊，話說主人知道今天是什麼日子吧？"
80000064-19 = "[s5]「是情人節對吧？」\n[s6]「巧克力互送日？」"
80000064-20 = "嗯，沒錯沒錯！那應該也知道事情接下來會怎麼發展吧？"
80000064-21 = "嗯，沒錯沒錯！那應該也知道事情接下來會怎麼發展吧？"
80000064-22 = "那麼就……"
80000064-30 = "[ns7]「明，明日奈……！？」\n[ns8]「……等等！你剛剛是從哪裡拿出來的……？」"
80000064-31 = "……主人？怎麼了嗎？"
80000064-32 = "……主人？怎麼了嗎？"
80000064-33 = "是巧克力唷！明日奈給老師的，情人節巧克力！"
80000064-34 = "啊，既然要送給主人，就讓明日奈親自餵主人吃吧？"
80000064-35 = "來吧主人，啊～！"
80000064-36 = "……嗯？"
80000064-37 = "主人怎麼了？為什麼露出那種表情？"
80000064-38 = "唉呦～你臉紅啦？沒事的～主人真可愛呢。"
80000064-39 = "來吧來吧，今天可是情人節。一定要讓主人吃到明日奈送的情人節巧克力才行。"
80000064-40 = "……主人？"
80000064-41 = "[s] 往後退幾步"
80000064-44 = "……咦，突然要開始玩鬼抓人嗎？"
80000064-45 = "啊哈，那明日奈是鬼囉！被我抓到的話就要吃掉唷～？"
80000064-46 = "預備～開始！！"
80000064-58 = "（……結果還是被明日奈捉到，#n　只好抱著不知是害羞還是什麼的感情，吃下了明日奈從胸前拿出的巧克力）"

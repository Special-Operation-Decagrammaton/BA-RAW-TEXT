[translation]
10040065-2 = "哈啊，哈啊……真是的……"
10040065-3 = "還以為這次……真的要完蛋了呢……"
10040065-4 = "[s1]「今天還真是跑個不停呢。」\n[s2]「從某個角度來說，我們已經受到懲罰了吧。」"
10040065-7 = "話說我們現在能跟貝里塔斯的成員們聯絡了嗎？應該已經通過地下道的深處了吧？"
10040065-8 = "訊號應該要恢復正常了才對啊？"
10040065-9 = "我們會不會是走錯路，又或者是出了什麼差錯……"
10040065-10 = "難道說……！！"
10040065-16 = "別擔心，我們聽得很清楚。#n看來兩位選擇的路線似乎沒錯呢。"
10040065-17 = "現在只要打開前面的門，然後一路往地面上走就能逃離研討會的地盤了。"
10040065-18 = "雖然再往旁邊還有一條小路，不過從數據來看，那扇門的使用率是最低的。"
10040065-20 = "雖然經歷了許多波折，不過你們最終還是辦到了呢。#n辛苦你了，老師。"
10040065-21 = "麻煩稍等我一下。#n我現在就聯絡真紀，請他幫你們開門。"
10040065-22 = "聯絡聯絡……"
10040065-28 = "嗯？這是什麼聲音……？"
10040065-29 = "[s3]「……什麼聲音？」\n[s4]「我沒聽到任何聲音啊？」"
10040065-32 = "不，不對。#n不是你們……而是我們這邊……"
10040065-39 = "唔，唔嗯……！？咦……！？"
10040065-40 = "咦……？"
10040065-41 = "…………"
10040065-43 = "……副部長！？！？"
10040065-45 = "千，千尋！？#n千尋……你，你怎麼會在這裡……！！"
10040065-46 = "沒，沒有。#n這，這沒什麼大不了的……！！"
10040065-50 = "[ns5]「千尋……！？」\n[ns6]「發生什麼事了！晴！小玉……！！」"
10040065-53 = "我，我不能告訴你！#n祕密作戰……！這是祕密作戰……！！"
10040065-54 = "難道說……！這從一開始就是你設下的陷阱嗎，千尋！！#n你竟然用這種方式設下陷阱……！！"
10040065-55 = "作戰取消，作戰取消！！這是陷阱！！#n所有人立刻逃離原地──！！"
10040065-56 = "唔啊啊啊──！！強制中斷──！！！"
10040065-60 = "呃……那個……"
10040065-61 = "老，老師……？#n這到底是……"
10040065-65 = "……！#n門正好……！"
10040065-66 = "沒辦法了，老師！#n雖然那邊的狀況好像不太妙，但至少我們兩個得先……！"
10040065-67 = "想辦法和真紀同學聯絡，然後……嘗試逃出去……！"
10040065-71 = "……？"
10040065-72 = "等等…………這是？"
10040065-73 = "[s7]「……小雪！？」\n[s8]「……？？怎麼了？」"
10040065-76 = "沒什麼，我只是覺得……好像有哪裡怪怪的……"
10040065-77 = "忽然有種非常不祥的預感……"
10040065-82 = "…………"
10040065-83 = "……呵呵。"
10040065-84 = "呵呵……呵呵呵呵……"
10040065-85 = "原來如此，沒想到事情最後還是變成這樣了，尼哈哈……"
10040065-94 = "[ns9]「……小雪！？」\n[ns10]（他推了我……？）"
10040065-97 = "……噓，安靜點。"
10040065-98 = "什麼話都別說。#n畢竟這裡一片漆黑，我們不會被發現的。"
10040065-99 = "因為時間不多，所以我只能長話短說了。"
10040065-100 = "老師……"
10040065-104 = "……請一定要活著逃出去。"
10040065-106 = "小～雪～～～！！"
10040065-125 = "我們本來就已經忙得要死了！！"
10040065-129 = "你竟然連跨年夜都要給我們找麻煩！！"
10040065-133 = "你到底在想什麼啊！！我今天絕對不會放過你！！你給我過來！！"
10040065-134 = "這件事我絕對不會善罷甘休的！！"
10040065-138 = "哇啊啊啊啊啊啊啊──！！"
10040065-143 = "請一定要記得我──！！！"
10040065-151 = "[ns]「…………」"
10040065-153 = "[ns11] 開始尋找小玉所說的「另一扇門」\n[ns12] 將雙手合十並高舉過頭，藉此為小雪弔唁"
10040065-159 = "[ns] 「……？」"
10040065-161 = "[ns13]「……奇怪？」\n[ns14]「等等，剛才好像還有另一個腳步聲……」"
10040065-166 = "[ns] 再次邁開步伐"
10040065-170 = "[ns] 加快走路的速度"
10040065-179 = "[ns] 盡可能放輕腳步，不發出任何腳步聲"
10040065-188 = "[ns]「…………」"
10040065-190 = "[ns] 全力奔跑"

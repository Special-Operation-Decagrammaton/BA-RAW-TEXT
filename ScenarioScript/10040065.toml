[translation]
10040065-2 = "*huff* *puff*... Phew."
10040065-3 = "I really thought...this one was the end for us..."
10040065-4 = "[s1] \"There's a lot of running today.\"\n[s2] \"I guess this is karma...\""
10040065-7 = "We're past the underground section, though! Where are the Veritas students?"
10040065-8 = "Shouldn't they be in range or something by now?"
10040065-9 = "Unless we took a wrong turn, or something went wrong..."
10040065-10 = "Or maybe—"
10040065-16 = "Calm down. We're here. I'm glad to see you made it."
10040065-17 = "Once you go through that door in front of you and follow the path back to ground level, you'll be out of Seminar territory."
10040065-18 = "There's another small path nearby, but statistically speaking, through that door should be the safest."
10040065-20 = "It was a rollercoaster, but we made it to the end somehow. Great work, Sensei."
10040065-21 = "One sec. I'll tell Maki to open the door now."
10040065-22 = "I just need to get in touch—"
10040065-28 = "Huh? What's that sound?"
10040065-29 = "[s3] \"...Sound? What sound?\"\n[s4] \"I don't hear anything...\""
10040065-32 = "No, no. There's something on our end..."
10040065-39 = "U-Um... Huh...?!"
10040065-40 = "...What...?"
10040065-41 = "..."
10040065-43 = "...The vice president?!"
10040065-45 = "Ch-Chihiro?! Chihiro...! Wh-What are you doing here...?!"
10040065-46 = "U-Us?! Nothing! W-We're not doing anything at all!"
10040065-50 = "[ns5] \"Chihiro...?!\"\n[ns6] \"What's going on?! Hare?! Kotama...?!\""
10040065-53 = "I-I...I have nothing to say to you! This is a secret operation!"
10040065-54 = "It can't be...! Did you set this up, Chihiro?! We walked directly into your trap!!"
10040065-55 = "Cancel operation! Cancel! It was a trap! Everyone, run! Evacuate immediately!"
10040065-56 = "Aaaugh! Shutdown everything!"
10040065-60 = "Um... Well, uh..."
10040065-61 = "Wh-What even is this, Sensei...?"
10040065-65 = "...The door?!"
10040065-66 = "It is what it is, Sensei! They might've fallen into the hands of the enemy, but at least we need to...!"
10040065-67 = "We need to meet with Maki...and...escape..."
10040065-71 = "...?"
10040065-72 = "Wait a minute... What is this?"
10040065-73 = "[s7] \"...Koyuki?!\"\n[s8] \"...What's wrong?\""
10040065-76 = "Well, just now...I felt a strange..."
10040065-77 = "...very ominous feeling..."
10040065-82 = "..."
10040065-83 = "...Heehee."
10040065-84 = "Heh...heeheehee..."
10040065-85 = "I see. So this is the end, is it? Nihaha..."
10040065-94 = "[ns9] \"...Koyuki?!\"\n[ns10] \"(Why did she push me away?!)\""
10040065-97 = "...Shhh. Be quiet!"
10040065-98 = "Don't make a sound! The shadows will hide you."
10040065-99 = "We have no time, so our parting message will be short!"
10040065-100 = "Sensei..."
10040065-104 = "...make sure to survive."
10040065-106 = "KOYUKIII!!"
10040065-125 = "Do you even know how busy I already am?!"
10040065-129 = "And then you have to go and cause trouble on the very last day of the year?!"
10040065-133 = "This is seriously the last straw! I mean it when I say I'm not letting you off easy this time! Get over here!"
10040065-134 = "You're seriously going to suffer the consequences of your actions!"
10040065-138 = "KYAAAAAAH!!"
10040065-143 = "REMEMBER MEEE!!!"
10040065-151 = "[ns] \"...\""
10040065-153 = "[ns11] Set out to find the other door Kotama mentioned.\n[ns12] Clasp your hands, express condolences, and leave."
10040065-159 = "[ns] \"...?\""
10040065-161 = "[ns13] \"What was that?\"\n[ns14] \"Did I just hear more footsteps?\""
10040065-166 = "[ns] Start walking again."
10040065-170 = "[ns] Walk faster."
10040065-179 = "[ns] Walk as quietly as possible."
10040065-188 = "[ns] \"...\""
10040065-190 = "[ns] Power walk."

[translation]
10040065-2 = "แฮ่ก แฮ่ก... จริงๆ เลยเชียว..."
10040065-3 = "นึกว่าครั้งนี้จะไม่รอดแล้วจริงๆ เสียอีกค่ะ..."
10040065-4 = "[s1] \"วันนี้ได้วิ่งเยอะเป็นพิเศษเลยนะ\"\n[s2] \"เหมือนกำลังรับกรรมอะไรอยู่เลย\""
10040065-7 = "นี่เราก็ออกมาจากส่วนลึกของใต้ดินแล้ว จะว่าไป คุณครูยังติดต่อกับเวอริทัสได้อยู่หรือเปล่าคะ? "
10040065-8 = "ทางนั้นน่าจะติดต่อมาได้แล้วนะ?"
10040065-9 = "หรือว่าเราเข้ามาผิดทาง หรือทางนั้นเจอปัญหาอะไรเข้า..."
10040065-10 = "หรือบางที...!!"
10040065-16 = "ไม่มีบางทีหรอกค่ะ ฉันได้ยินชัดเลยค่ะ ดูเหมือนทั้งสองคนจะมาถึงทางออกแล้วนะคะ"
10040065-17 = "จากนี้ก็แค่เปิดประตูที่อยู่ข้างหน้าแล้วขึ้นไปข้างบน เท่านี้ก็จะเป็นการหนีออกมาจากพื้นที่ของเซมิน่า#nได้อย่างสมบูรณ์แล้วค่ะ"
10040065-18 = "ที่จริงถ้าเดินไปทางด้านข้างอีกหน่อยก็จะมีประตูบานเล็กๆ อีกบานหนึ่ง แต่ตามสถิติแล้วประตูบานนั้น เป็นประตูที่ถูกใช้งานน้อยที่สุดค่ะ"
10040065-20 = "ถึงจะเกิดเรื่องขึ้นมากมาย แต่สุดท้ายก็ผ่านกันมาได้นะ ทำได้ดีมากเลย คุณครู"
10040065-21 = "รอเดี๋ยวนะ ฉันจะติดต่อมากิ แล้วขอให้ไปเปิดประตูให้เดี๋ยวนี้เลย"
10040065-22 = "เอาละ โทรหามากิ..."
10040065-28 = "หืม? เสียงอะไรน่ะ...?"
10040065-29 = "[s3] \"เสียงเหรอ...? เสียงอะไร?\"\n[s4] \"ครูไม่เห็นได้ยินเสียงอะไรเลย?\""
10040065-32 = "มะ... ไม่หรอก ไม่ใช่เสียงจากทางนั้น... ทางนี้ต่างหาก..."
10040065-39 = "หะ... หืม...!? หืม...!?"
10040065-40 = "อย่าบอกนะว่า...?"
10040065-41 = "..."
10040065-43 = "รองหัวหน้า...!?!?"
10040065-45 = "จะ... จิฮิโระ!? จิฮิโระ...! ทะ... ทำไมถึงมาอยู่ที่นี่...!!"
10040065-46 = "มะ... ไม่นะคะ พะ... พวกเราไม่ได้ทำอะไรเลย...!!"
10040065-50 = "[ns5] \"จิฮิโระเหรอ...!?\"\n[ns6] \"เกิดเรื่องอะไรน่ะ! ฮาเระ! โคทามะ...!!\""
10040065-53 = "บะ... บอกไม่ได้หรอก! นี่คือปฏิบัติการลับนะ...! ปฏิบัติการลับ...!!"
10040065-54 = "หรือว่า...! นี่คือกับดักเหรอคะ จิฮิโระ!! วางกับดักกันแบบนี้เลยเหรอ...!!"
10040065-55 = "ยกเลิกปฏิบัติการ ยกเลิกปฏิบัติการ!! นี่คือกับดัก!! ทุกคนไปซ่อนตัว!!"
10040065-56 = "ว้ายย!! ต้องตัดสายแค่นี้!!!"
10040065-60 = "อ่า... อ่า... อืม..."
10040065-61 = "คะ... คุณครู...? นี่มันอะไรกัน..."
10040065-65 = "จู่ๆ ประตูก็...!"
10040065-66 = "งั้นก็ช่วยไม่ได้แล้วค่ะ คุณครู! ถึงทางนั้นจะกำลังเจอปัญหาอะไรอยู่ แต่ยังไงเราสองคนก็ต้อง...!"
10040065-67 = "ออกไปเจอคุณมากิ แล้วหนีออกไป...!"
10040065-71 = "...?"
10040065-72 = "เดี๋ยวนะ... นี่มัน...?"
10040065-73 = "[s7] \"โคยูกิ...!?\"\n[s8] \"ทำไมเหรอ...??\""
10040065-76 = "เปล่าค่ะ ก็แค่... ตอนนี้ฉันรู้สึกแปลกๆ..."
10040065-77 = "รู้สึกถึงลางที่ไม่ดีเอาเสียมากๆ..."
10040065-82 = "..."
10040065-83 = "ฮุฮุ..."
10040065-84 = "ฮุฮุ... ฮุฮุฮุฮุ..."
10040065-85 = "อย่างนั้นสินะคะ สุดท้ายก็เป็นอย่างนี้สินะคะ อุวะฮะฮ่า..."
10040065-94 = "[ns9] \"โคยูกิ...!?\"\n[ns10] (ผลักเข้ามาเลยเหรอ...?)"
10040065-97 = "ชู่ว... อยู่เงียบๆ สิคะ"
10040065-98 = "ไม่ต้องพูดอะไรทั้งนั้นค่ะ ในนั้นน่ะมืดมาก ไม่โดนจับได้หรอกค่ะ"
10040065-99 = "ฉันมีเวลาไม่มาก งั้นฉันจะบอกสั้นๆ นะคะ"
10040065-100 = "คุณครู..."
10040065-104 = "ต้องรอดนะคะ..."
10040065-106 = "โค ยู กิ~~~~~~!!"
10040065-125 = "แค่นี้ฉันก็มีเรื่องยุ่งเยอะจะตายอยู่แล้ว!!"
10040065-129 = "แล้วนี่เธอยังจะมาก่อเรื่องไม่เว้นวันสิ้นปีอีก!!"
10040065-133 = "ทำไมถึงซนแบบนี้นะ ยัยเด็กคนนี้!! วันนี้ฉันไม่ยอมปล่อยไปแน่!! มานี่เลยนะ!!!"
10040065-134 = "วันนี้ฉันไม่ยอมปล่อยไปเด็ดขาด!!"
10040065-138 = "ว้ากกกกกกกก!!"
10040065-143 = "จดจำฉันไว้ด้วยล่ะ~~~~~!!!"

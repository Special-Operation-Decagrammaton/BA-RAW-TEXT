[translation]
1011705-1 = "Girl on an Adventure"
1011705-2 = "（前往了光所在的地方）"
1011705-8 = "[ns]「你今天在做什麼，光？」"
1011705-10 = "老師～光現在超危險的～"
1011705-14 = "[ns]「周圍明明什麼都沒有……」"
1011705-15 = "老師～現在這邊是岩漿地帶～"
1011705-16 = "白色是石頭～安全區域～"
1011705-17 = "其他全部是岩漿～掉下去會死掉哦～"
1011705-21 = "[ns1]「哦哦……！」\n[ns2]「我記得以前也玩過這種遊戲……！」"
1011705-24 = "老師～你那邊現在是岩漿。"
1011705-25 = "快逃哇～"
1011705-28 = "（於是如光所說，趕緊跳到了白色的磚道上）"
1011705-30 = "做得好～撿回一命～"
1011705-31 = "現在要活著抵達那個十字路口～知道了嗎～？"
1011705-32 = "[s]「好，我挑戰看看。」"
1011705-39 = "紅色的地方是安全的浮島～"
1011705-40 = "掉下去就出局囉～"
1011705-44 = "[ns]「糟糕，這裡沒有紅色的磚塊……！」"
1011705-45 = "那間店前面～有紅色的地毯哦～？"
1011705-46 = "踩那邊就能活下來～"
1011705-47 = "[s]「我跳得過去嗎？」"
1011705-48 = "老師～跳不過去就完蛋囉～"
1011705-49 = "[s]「唔……！我一定要跳過去！！」"
1011705-57 = "[ns]「嗚，嗚哇！」"
1011705-61 = "哎喲！"
1011705-62 = "[s]「對，對不起……！！」"
1011705-63 = "你，你在做什麼……？#n要進這間店嗎？"
1011705-64 = "[s]「啊……不是，那個……」"
1011705-69 = "紅色～"
1011705-70 = "沒踩到紅色就出局了～"
1011705-74 = "這裡是浮島～踩到紅色才能存活～"
1011705-75 = "咦？"
1011705-76 = "啊……"
1011705-77 = "哈哈，我知道了。"
1011705-78 = "我小時候也常玩冒險遊戲呢。"
1011705-79 = "呵呵，請小心不要掉下去囉～"
1011705-84 = "[ns]「好，好丟臉……」"
1011705-85 = "老師～丟臉只是一時的～"
1011705-86 = "活下去比較重要～"
1011705-87 = "[s]「是，是沒錯啦……」"
1011705-91 = "[ns]「算了，不管那麼多了。繼續走到底吧！」"
1011705-92 = "Jump～Jump～"
1011705-106 = "（就這樣找回童心，和光一路冒險到了夏萊門口）"
1011705-108 = "呼～今天生存的時長～創下了新紀錄～"
1011705-109 = "[s3]「真好玩啊……不過我現在該回辦公室了。」\n[s4]「話說回來，光剛才原本要去哪裡呢？」"
1011705-115 = "不知道～我忘記了～"
1011705-116 = "[s]「這樣真的沒問題嗎……」"
1011705-117 = "嗯～無死通關，光超滿意～"
1011705-118 = "老師死掉了八次～以第一次來說表現很好哦～"
1011705-119 = "[s]「謝謝你，雖然這已經不是第一次了。」"
1011705-120 = "……"
1011705-121 = "可是光不能再移動了～"
1011705-122 = "路斷掉了～沒辦法行動。"
1011705-123 = "[s5]「這麼說來……」\n[s6]「前面只有同一種顏色的地磚呢。」"
1011705-126 = "光動彈不得～確定死亡。"
1011705-127 = "這輩子過得很開心～剩下的就拜託你了～"
1011705-128 = "不要忘記光哦～"
1011705-132 = "[ns]「光就由我來拯救！」"
1011705-134 = "（抱起無法移動的光，前往了辦公室）"
1011705-135 = "哇～真可靠～"
1011705-137 = "（後來光又在夏萊玩了很久才回去）"

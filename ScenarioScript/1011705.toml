[translation]
1011705-1 = "Girl on an Adventure"
1011705-2 = "(คุณครูมุ่งหน้าไปยังที่ที่ฮิคาริอยู่)"
1011705-8 = "[ns] \"วันนี้ทำอะไรเหรอ ฮิคาริ?\""
1011705-10 = "คุณครู ตอนนี้ฮิคาริกำลัง ตก อยู่ ใน อันตราย"
1011705-14 = "[ns] \"แต่แถวๆ นี้ก็ไม่มีอะไรเลยนะ...\""
1011705-15 = "คุณครู ตรงนี้เป็นเขตลาวา"
1011705-16 = "ตรงสีขาวคือก้อนหิน ตรงนั้นปลอดภัย"
1011705-17 = "ส่วนที่เหลือเป็นลาวาหมดเลย ตกไปละตายแน่"
1011705-21 = "[ns1] \"อ๊ะ...!\"\n[ns2] \"จะว่าไป เหมือนครูก็เคยเล่นแบบนี้เหมือนกัน...!\""
1011705-24 = "คุณครู ตรงนั้นเป็นลาวา"
1011705-25 = "ต้องรีบอพยพ"
1011705-28 = "(หลังจากฟังคำของฮิคาริ คุณครูก็รีบปีนขึ้นไปบนบล็อกทางเท้าสีขาว)"
1011705-30 = "ดีมาก รอดแล้ว"
1011705-31 = "ทีนี้ก็ต้องอยู่รอดไปจนถึงสี่แยกตรงนั้น เข้าใจมั้ย?"
1011705-32 = "[s] \"อื้อ มาลองกันสักตั้งเลย\""
1011705-39 = "ตรงสีแดงเป็นเกาะลอยฟ้า ตรงนั้นปลอดภัย"
1011705-40 = "แต่ถ้าตกไปก็ตายนะ"
1011705-44 = "[ns] \"อึก แต่ตรงนี้ไม่มีบล็อกสีแดงนะ...!\""
1011705-45 = "เห็นพรมสีแดงหน้าร้านนั้นมั้ย?"
1011705-46 = "ถ้าไปเหยียบตรงนั้นก็รอด"
1011705-47 = "[s] \"ครูจะโดดไปถึงตรงนั้นเหรอ?\""
1011705-48 = "คุณครู ถ้าไม่โดดก็จบเห่เลยนะ"
1011705-49 = "[s] \"อึก...! งั้นก็ลุยเลย!!\""
1011705-57 = "[ns] \"วะ... เหวอ!\""
1011705-61 = "โธ่!"
1011705-62 = "[s] \"คะ.. ครูผิดไปแล้ว...!!\""
1011705-63 = "ทะ... ทำอะไรเหรอครับ? จะเข้าไปข้างในเหรอ?"
1011705-64 = "[s] \"ปะ... เปล่าหรอก คือว่า...\""
1011705-69 = "สีแดง"
1011705-70 = "ถ้าไม่เหยียบสีแดงก็ ม่อง เท่ง นะ"
1011705-74 = "ตรงนี้คือเกาะลอยฟ้า ถ้าอยากรอดก็ต้องเหยียบสีแดงเท่านั้น"
1011705-75 = "เอ๋?"
1011705-76 = "อ๋อ..."
1011705-77 = "พอจะรู้แล้วว่าคืออะไร"
1011705-78 = "สมัยเด็กๆ ฉันก็เล่นบ่อยๆ เหมือนกัน เล่นผจญภัยน่ะ"
1011705-79 = "ฮ่าๆ งั้นก็ระวังอย่าให้ร่วงล่ะครับ~"
1011705-84 = "[ns] \"นะ... น่าอายจังเลย...\""
1011705-85 = "คุณครู เก็บความอายไว้ก่อน"
1011705-86 = "ชีวิตสำคัญกว่านะ"
1011705-87 = "[s] \"มันก็จริงอยู่หรอกนะ...\""
1011705-91 = "[ns] \"เฮ้อ งั้นก็ไม่อายแล้ว ไปให้สุดเลย!\""
1011705-92 = "จัมพ์ จัมพ์"
1011705-106 = "(แล้วคุณครูก็หวนคืนสู่วัยเด็กและสนุกไปกับการผจญภัยกับฮิคาริ จนมาถึงที่หน้าชาเล่ต์)"
1011705-108 = "ฮู่ว วันนี้อยู่รอดได้นานที่สุด เป็นสถิติใหม่เลยละ"
1011705-109 = "[s3] \"สนุกดีนะ... ว่าแต่เมื่อกี้ฮิคาริตั้งใจจะไปไหนเหรอ?\"\n[s4] \"จะว่าไป เมื่อกี้ฮิคาริตั้งใจจะไปไหนเหรอ?\""
1011705-115 = "ไม่รู้สิ ลืมไปแล้ว"
1011705-116 = "[s] \"แบบนี้ก็ได้เหรอ...\""
1011705-117 = "อื้อ แค่ไม่ตายก็พอใจแล้ว"
1011705-118 = "คุณครูตายไป 8 ครั้ง แต่มือใหม่ก็เป็นงี้แหละ"
1011705-119 = "[s] \"ขอบใจนะ ถึงครูจะไม่ใช่มือใหม่ก็เถอะ\""
1011705-120 = "..."
1011705-121 = "แต่ตอนนี้ฮิคาริไปต่อไม่ได้แล้ว"
1011705-122 = "แมพสิ้นสุดแค่นี้ ไปต่อไม่ได้"
1011705-123 = "[s5] \"นั่นสินะ ข้างหน้ามีบล็อกสีเดียวแฮะ...\"\n[s6] \"นั่นสินะ ทางข้างหน้ามีแค่บล็อกสีเดียวกันหมดเลย\""
1011705-126 = "ฮิคาริขยับไม่ได้ งั้นก็ ตาย แหง แก๋"
1011705-127 = "ที่ผ่านมาสนุกมาก ฝากที่เหลือด้วยนะ"
1011705-128 = "แต่อย่าลืมฮิคาริล่ะ"
1011705-132 = "[ns] \"ครูจะช่วยฮิคาริเอง!\""
1011705-134 = "(คุณครูเข้าไปอุ้มฮิคาริที่เดินต่อไม่ได้แล้วพาไปที่สำนักงานชาเล่ต์)"
1011705-135 = "ว้าว มีคนมาช่วยด้วย"
1011705-137 = "(ฮิคาริเล่นสนุกอยู่ที่อีกสักพักแล้วจึงกลับไป)"

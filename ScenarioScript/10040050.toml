[translation]
10040050-1 = "ตอนที่ 5;ตู้ที่มีเสียงกุกกัก"
10040050-10 = "แฮ่ก แฮ่ก... แฮ่ก... มาถึงจนได้นะคะ..."
10040050-11 = "ไม่คิดเลยค่ะว่าเราจะปราบโดรนพวกนั้นโดยไม่ต้องทำลายให้สิ้นซากได้ การสั่งการของคุณครูนี่ ยอดเยี่ยมไปเลยนะคะ!!"
10040050-13 = "ทั้งสองคนทำได้ดีมากค่ะ หลบหนีและต่อสู้ได้ราบรื่นกว่าที่คิดเยอะเลยค่ะ"
10040050-14 = "ตรงนี้คือฝั่งประตูหลังที่ไม่ค่อยได้ใช้น่ะ ถึงจะเรียกว่า 'ประตูหลัง' แต่มันก็มีหลายบานเพราะอาคารนี้#nกว้างใหญ่มาก..."
10040050-15 = "และประตูเหล่านี้คือประตูที่ไม่ถูกใช้งานมาจนถึงตอนนี้ งั้นก็คงไม่โดนจับได้หรอกค่ะ"
10040050-16 = "ต่อไปก็แค่เปิดประตูนี้ไปให้ได้..."
10040050-22 = "...?"
10040050-23 = "อืม...?"
10040050-24 = "เปิด... ประตู...?"
10040050-32 = "เอ๋..."
10040050-33 = "เปิดไม่ได้ค่ะ..."
10040050-34 = "เปิดไม่ได้งั้นเหรอ หมายความว่ายังไงน่ะรุ่นพี่?"
10040050-35 = "รอเดี๋ยวนะ ฉันก็จะลองดูด้วย อืม..."
10040050-41 = "อะไรกัน? ทำไมถึง...?"
10040050-47 = "อะ... อะไรเนี่ย...!? ทำไมโค้ดกลายเป็นแบบนี้...?"
10040050-48 = "เราถูกสะกดรอยอยู่ค่ะ ฮาเระ...! ถ้าไม่หยุดตอนนี้ ตำแหน่งของเราจะถูกเปิดเผยค่ะ!!"
10040050-49 = "เป็นไปได้ยังไง...! อะไรกัน ทำไมเร็วอย่างนี้! คนนี้เก่งกว่าพวกเราอีก!!"
10040050-50 = "[s1] \"โดนแฮ็กกลับเหรอ...!?\"\n[s2] \"เก่งกว่าโคทามะกับฮาเระอีกงั้นเหรอ!?\""
10040050-53 = "คุณครู รีบออกจากตรงนั้นมาก่อน! ถ้าเป็นอย่างนี้ต่อไป ไม่นานกล้องวงจรปิดของทางนั้นก็จะถูกฟื้นฟู#nให้กลับมาใช้งานได้อีกครั้ง!"
10040050-54 = "เห็นทีคงต้องหาวิธีอื่นแล้วค่ะ จะให้เผชิญหน้าโดยตรงก็เกินกำลังอีก นี่มันเหมือนกับ..."
10040050-55 = "เดี๋ยวนะ สไตล์แบบนี้ การใช้วิธีแบบนี้... เหมือนเคยเห็นมาจากไหนเลย..."
10040050-60 = "หรือว่าจะเป็น... รองหัวหน้า...!?"
10040050-61 = "ทั้งสองคนรีบออกมาจากตรงนั้นก่อนค่ะ!!"
10040050-63 = "เป็นแบบนี้ไปได้ยังไง...! ไม่อยากจะเชื่อเลย...!!"
10040050-64 = "เราหนีมาถึงขนาดนี้แล้วนะ!! จะให้กลับไปเหรอคะ!? พวกคุณสองคนทำอะไรไม่ได้เลยเหรอ!?"
10040050-65 = "ถึงจะน่าเจ็บใจ แต่ว่าอะไรที่ไม่ได้ก็คือไม่ได้ค่ะ!"
10040050-75 = "รีบหนีเร็วเข้า...!!"
10040050-79 = "[ns3] จับมือโคยูกิแล้ววิ่งหนี\n[ns4] \"ออกไปจากที่นี่ก่อนเถอะ โคยูกิ!!\""
10040050-82 = "ม่ายยยยย!! ทำไมเป็นแบบนี้ไปได้ล่ะ!!!"
10040050-103 = "แฮ่ก แฮ่ก... วันนี้เราต้องวิ่งกันอีกแค่ไหนคะเนี่ย"
10040050-105 = "เราประมาทกันเอง พอมาคิดๆ ดูแล้วมันก็เป็นเรื่องที่แน่ชัดนะ"
10040050-106 = "ค่ะ ตอนนี้จิฮิโระ... กำลังตรวจสอบระบบรักษาความปลอดภัยของเซมิน่าอยู่ด้วยค่ะ"
10040050-107 = "และถ้าเกิดปัญหา ก็คงให้การสนับสนุนจากระยะไกลอยู่แล้วอย่างไม่ต้องสงสัย..."
10040050-108 = "แบบนี้เรื่องก็ยิ่งซับซ้อน ไม่เป็นไปตามแผนของเราแล้วค่ะ "
10040050-109 = "อื้อ ถ้าอีกฝ่ายเป็นรองหัวหน้าละก็ การเผชิญหน้าด้วยการแฮ็กก็คงไม่ต่างจากขุดหลุมฝังตัวเองหรอก"
10040050-111 = "ถ้างั้นจากนี้เราจะทำยังไงกันดีคะ? ฉันควรซ่อนตัวอยู่อย่างนี้จนถึงเช้าเลยหรือเปล่าคะ?"
10040050-112 = "ไม่สิ ต่อให้ซ่อนตัวอยู่ถึงเช้า แต่ก็ใช่ว่าเราจะเจอทางออกดีๆ นี่คะ...!? ขืนเป็นแบบนี้ต่อไปละก็!!"
10040050-114 = "ไม่หรอก..."
10040050-115 = "ใช่ว่าจะหมดทนทางนะ ถึงตอนนี้เราจะสู้กับรองหัวหน้าแบบซึ่งๆ หน้าไม่ได้ก็เถอะ..."
10040050-116 = "แต่ใช่ว่าเราจะต้องสู้แบบซึ่งๆ หน้าเท่านั้นนี่คะ ในทางกลับกัน เรามาพึ่งวิธีแบบอนาล็อกกันอีกสัก#nหน่อยดีกว่า"
10040050-117 = "[s5] \"แบบอนาล็อกเหรอ...?\"\n[s6] \"หมายความว่ายังไงน่ะ?\""
10040050-120 = "รองหัวหน้าเผชิญหน้าเราอยู่ในทางออนไลน์เท่านั้น เพราะตอนนี้รองหัวหน้าควบคุมระบบรักษาความ#nปลอดภัยจากระยะไกลอยู่น่ะ"
10040050-121 = "ถึงจะเก่งเป็นถึงระดับรองหัวหน้า แต่ถ้าเป็นพื้นที่ที่ไม่มีระบบคอมพิวเตอร์ติดตั้งเอาไว้ รองหัวหน้าก็เข้าไปควบคุมไม่ได้หรอก"
10040050-122 = "ยกตัวอย่างเช่น พื้นที่ส่วนตัวที่ไม่มีการติดตั้งระบบคอมพิวเตอร์ไว้เหมือนกับที่นี่"
10040050-124 = "หรือไม่ก็สถานที่เก่าๆ ที่ไม่มีอุปกรณ์ทันสมัย... อย่างเช่นเส้นทางเก่าๆ และก็ร้างค่ะ"
10040050-125 = "เส้นทางเก่าๆ และก็ร้าง...? ที่ไม่มีอุปกรณ์ทันสมัย...?"
10040050-126 = "ถึงที่นี่จะเป็นอาคารเซมิน่าที่เรียกได้ว่าเป็นศูนย์กลางของมิลเลเนียม แต่ในทางกลับกันก็เป็นอาคารที่#nมีขนาดใหญ่และเก่าแก่ที่สุดในมิลเลเนียมด้วยค่ะ"
10040050-128 = "อาคารนี้ก่อสร้างขยายต่อเติม และก็คอยปรับปรุงอยู่เรื่อยๆ ถ้าอย่างนั้นก็หมายความว่า ต้องมีบางส่วนที่มีอยู่ตั้งแต่แรกอยู่แล้วแต่ไม่ได้รับความสนใจ"
10040050-129 = "สถานที่ที่ไม่มีใครเข้ามาใช้งานแล้ว... แต่ก็เป็น 'เส้นทาง' ที่ชัดเจนในเซมิน่า..."
10040050-130 = "ระหว่างดูลาดเลาให้ทั้งสองคน ฉันเองก็หาเส้นทางไปด้วย แล้วมันก็มีเส้นทางอยู่บ้างตามคาดเลย"
10040050-131 = "[ns7] \"หาเจอได้ในเวลาสั้นๆ เลยเหรอ\"\n[ns8] \"ทั้งสองคนยอดเยี่ยมเลย\""
10040050-134 = "ทางมันอาจจะมืดและให้ความรู้สึกอ้างว้างหน่อยนะคะ... แต่ตอนนี้เราก็เลือกอะไรไม่ได้มากแล้วค่ะ"
10040050-135 = "แหยะ ฉันไม่ชอบที่สกปรกๆ เลย ไม่มีทางอื่นแล้วเหรอคะ? มีทางอื่นที่สะอาดๆ มั้ย?"
10040050-136 = "ถ้าเลือกได้ ฉันก็อยากให้เป็นเส้นทางที่ไม่หนาวด้วย ก็ตอนนี้ฉันใส่แต่ชุดนอนนี่เนอะ..."
10040050-137 = "อ๊ะ หรือถ้ามีตู้ขายเครื่องดื่มอัตโนมัติระหว่างทางด้วยก็น่าจะดีค่ะ! ฉันเริ่มรู้สึกหิวนิดหน่อยแล้วด้วย!"
10040050-143 = "คุณครู..."

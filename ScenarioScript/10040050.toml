[translation]
10040050-1 = "第5話;搖晃的櫃子"
10040050-10 = "哈啊，哈啊……哈啊……總算到了……"
10040050-11 = "居然真的能在不破壞無人機的情況下制服它們，老師的指揮能力真不是蓋的！！"
10040050-13 = "你們兩位都辛苦了。#n沒想到事情進行得這麼順利。"
10040050-14 = "這裡是平時很少有人使用的後門。#n雖然像這種大型建築，總是會有幾個「後門」……"
10040050-15 = "不過這裡是從沒有使用過的對外門中選出來的，所以應該不會被人發現才對。"
10040050-16 = "接下來只要打開那扇門……"
10040050-22 = "……？"
10040050-23 = "……嗯？"
10040050-24 = "只要打開……這扇門？"
10040050-32 = "咦……"
10040050-33 = "……打不開耶。"
10040050-34 = "你在說什麼啊，前輩？怎麼會打不開呢？"
10040050-35 = "等等，讓我試試看。#n嗯……"
10040050-41 = "……奇怪？#n怎麼會……"
10040050-47 = "……！？#n怎，怎麼回事，程式竟然反向……"
10040050-48 = "……！我們被追蹤了，晴！#n不趕快關掉的話，我們的位置會被鎖定的！！"
10040050-49 = "怎麼可能……！#n不行，速度實在太快了！對方的實力比我們還強！！"
10040050-50 = "[s1]「竟然被反向駭入了……！？」\n[s2]「對方的實力比小玉和晴還要強！？」"
10040050-53 = "老師，你們先離開那裡吧！#n再這樣下去，那附近的監視器很快就會恢復正常的！"
10040050-54 = "得想想其他的方法才行，正面對決是沒有勝算的。#n這簡直……"
10040050-55 = "等等，這種風格，還有這種方式……#n不久前好像也遇過類似的情況……"
10040050-60 = "……！#n難道是……副部長！？"
10040050-61 = "你們兩個趕快離開那裡！！"
10040050-63 = "怎麼會……！這太荒謬了……！！"
10040050-64 = "我們好不容易才逃到這裡來耶！！現在卻要我們回頭！？#n難道你們兩個一點辦法都沒有嗎！？"
10040050-65 = "我知道這種情況很令人氣憤，但是做不到的事就是做不到！"
10040050-75 = "……動作快！！"
10040050-79 = "[ns3] 抓起小雪的手，迅速逃離原地\n[ns4]「我們先離開吧，小雪！！」"
10040050-82 = "嗚啊啊啊啊啊！！怎麼會這樣──！！！"
10040050-103 = "哈啊，哈啊……我今天到底得跑多少步才行啊？"
10040050-105 = "是我大意了。#n仔細想想這也是理所當然的事。"
10040050-106 = "嗯，畢竟千尋平時……就負責維護研討會的保全系統。"
10040050-107 = "既然現在發生狀況，他當然會從遠端支援……"
10040050-108 = "……這下事情越來越棘手了，情況已經徹底偏離了我們原先的計畫。"
10040050-109 = "嗯，既然對手是副部長，在系統上和他正面對決等同於自找苦吃。"
10040050-111 = "那我們現在該怎麼辦？#n難道得像這樣乖乖躲在原地直到早上嗎？"
10040050-112 = "不，就算到了早上，問題也不會解決……！#n要是我們就這樣坐以待斃的話！！"
10040050-114 = "……不。"
10040050-115 = "我們並不是束手無策。#n雖然現在無法和副部長正面對決是事實沒錯……"
10040050-116 = "但我們也不是只有正面對決這條路可以走。#n雖然聽起來有點矛盾，但這種時候反而要用更傳統的方式。"
10040050-117 = "[s5]「更傳統的方式……？」\n[s6]「什麼意思？」"
10040050-120 = "副部長應該是遠端操縱著保全系統，因此終究只能在網路上對付我們。"
10040050-121 = "但就算是副部長，面對沒有安裝電腦系統的東西也無能為力。"
10040050-122 = "像是我們所處的這種，根本沒有安裝系統的私人空間……"
10040050-124 = "……又或者是因為年代久遠，#n所以並未安裝最新設備的早期設施，以及棄置已久的老舊道路等等。"
10040050-125 = "棄置已久的老舊道路……？早期設施……？"
10040050-126 = "雖然研討會大樓可以說是千年學園的核心，#n但反過來說也是千年之中最大、最老舊的建築。"
10040050-128 = "這棟大樓近年來不停地擴建、翻修，肯定會有一些原始設施在過程中被遺漏掉。"
10040050-129 = "雖然那些地方現在沒有人在使用……但那依舊是存在於研討會大樓裡的「道路」。"
10040050-130 = "其實我從剛才就一直在誘導你們兩人尋找路線，#n而且就像我猜想的一樣，這棟大樓裡確實有幾條這樣的路。"
10040050-131 = "[ns7]「沒想到你們竟然在這麼短的時間裡找到了。」\n[ns8]「你們兩個還真是厲害。」"
10040050-134 = "雖然那種地方大多又黑又陰森……不過現在不是挑三揀四的時候了。"
10040050-135 = "呃，我最討厭髒兮兮的地方了。#n沒有別條路可走嗎？比如稍微乾淨一點的那種？"
10040050-136 = "而且我現在還穿著睡衣，要是能找一條不會冷的路就更好了……"
10040050-137 = "啊，最好是途中還有自動販賣機之類的！因為我現在正好有點餓了！"
10040050-143 = "老師……"
10040050-144 = "……我們一定要帶那孩子一起走嗎？"
10040050-146 = "咦咦──！？！？#n為什麼突然說這種話！？我做錯了什麼嗎！？！？"
10040050-147 = "[s9]「總覺得對你們有點抱歉，不過他本來就是這種人……」\n[s10]「那是因為他現在年紀還小，請你們多多包涵……」"
10040050-150 = "看來我以後得對真紀好一點才行。"
10040050-151 = "總之你們現在別無選擇。#n光是能找到一條逃出去的路就該偷笑了哦？"
10040050-152 = "那麼首先……"
10040050-153 = "……等一下。"
10040050-154 = "大家都先安靜……我偵測到走廊的另一邊有聲音。"
10040050-155 = "這個聲音……"
10040050-162 = "……！！！#n是腳步聲……！！"
10040050-163 = "大家快躲起來！有人正在靠近！！"
10040050-167 = "腳，腳步聲！？是腳步聲嗎！？#n有人正往這邊走過來嗎！？到底是誰……！？"
10040050-168 = "這種時候還能是誰……！#n總之先趕快躲起來！！"
10040050-170 = "要，要躲在哪裡！？這裡哪有地方可以躲啊！？"
10040050-171 = "……牆，牆壁！？是要像這樣貼在牆上嗎……！？"
10040050-172 = "這個方法怎麼可能行得通，遲早會被抓到的。"
10040050-177 = "唔……！！再這樣下去的話……！！"
10040050-178 = "[ns11]「旁邊好像有扇門。」\n[ns12]「我們先進去裡面躲一下吧。」"
10040050-181 = "咦！？#n……是！！"
10040050-182 = "動作快，沒時間了！"
10040050-183 = "快點……！"
10040050-191 = "[ns] （這裡是……）"
10040050-192 = "啊，原來是更衣室啊。"
10040050-193 = "到了這裡應該就安全了……"
10040050-198 = "……安靜點。"
10040050-199 = "對方走到門前了。"
10040050-201 = "……乃愛？怎麼了嗎？"
10040050-202 = "……嗯，沒有，沒什麼。"
10040050-203 = "只是覺得這扇門有點奇怪……"
10040050-207 = "這間更衣室明明很久沒人使用了，應該積了很多灰塵才對呀……？"
10040050-208 = "……！！！"
10040050-209 = "！！！！！！"
10040050-210 = "……？#n是嗎？我是不太清楚啦……"
10040050-211 = "……呵呵。#n可能只是我想太多而已，不過為了以防萬一……"
10040050-212 = "我可以先檢查一下這裡再走嗎？"
10040050-213 = "糟糕。"
10040050-214 = "什麼……！！"
10040050-215 = "[ns13] 匆忙打開空的置物櫃\n[ns14] 將小雪拉進置物櫃裡"
10040050-222 = "我自己一個人去就行了，優香醬繼續去巡視其他地方吧。"
10040050-223 = "知道了。#n如果發現了什麼記得告訴我喔，我會立刻趕過來的！"
10040050-224 = "是～你也一樣。"
10040050-228 = "老，老師……！？#n這下子……！唔唔──！！！"
10040050-229 = "[ns15]「……噓。」\n[ns16] 匆忙摀住小雪的嘴巴"
10040050-240 = "…………！！！"
10040050-241 = "[ns17]（……乃愛！）\n[ns18]（絕對不能發出聲音……）"
10040050-244 = "…………"
10040050-255 = "……啊呀！"
10040050-256 = "老，老師……啊唔……！"
10040050-257 = "不，不是……先等一下……！"
10040050-258 = "……唔啊！"
10040050-259 = "等，等等……這裡太擠了……"
10040050-265 = "唔唔！？唔唔唔唔──！？"
10040050-266 = "為，為什麼……為什麼會變成這樣……"
10040050-267 = "[ns19]「……噓。」\n[ns20]「安靜點……」"
10040050-274 = "…………"
10040050-275 = "嗯……？#n……真奇怪。"
10040050-276 = "我明明記得……"
10040050-277 = "11天2小時31分鐘前來的時候，椅子並沒有排得這麼緊密才對啊？"
10040050-278 = "[ns]（他到底是怎麼記住這種事的……）"
10040050-279 = "而且門把也沒有拉得這麼高，這段時間應該不會有人來過這裡才對……"
10040050-284 = "……啊哈。"
10040050-285 = "也就是說，有人在這段時間內來過這裡囉？#n現在只有這個可能了。"
10040050-286 = "呵呵，事情越來越有趣了，既然如此……"
10040050-290 = "就讓我來檢查一下吧？"
10040050-291 = "[ns]（……！！！！！！！！！）"
10040050-306 = "呵呵……"
10040050-307 = "……是我猜錯了嗎？他可能已經跑到其他地方去了吧？"
10040050-313 = "[ns21]（乃愛他……）\n[ns22]（走，走掉了嗎……？）"
10040050-322 = "[ns23]（聲音越來越近了……！？）\n[ns24]（難道他打算要一一確認……！！）"
10040050-329 = "嗚，嗚啊啊啊──！？#n這……這下……！！"
10040050-336 = "這下真的完蛋了……！！！"
10040050-349 = "[ns25]（……！！！！！！）\n[ns26]（馬上就輪到我們了……！！）"
10040050-361 = "[ns27]（……真的不行了嗎？）\n[ns28]（……真的要完蛋了嗎？）"
10040050-368 = "……呼啊啊啊啊啊──！！！"
10040050-369 = "從各個層面來說，我都覺得剛才差點要死掉了……！！"
10040050-370 = "剛才那簡直就像是恐怖遊戲裡會出現的場景。#n就算說剛才那是刻意營造出來的場景，我也相信。"
10040050-371 = "我也從來沒有這麼專注地聆聽周圍的聲音，真是個不可多得的經驗。"
10040050-372 = "不過……幸好我們最後還是順利度過了難關。"
10040050-373 = "反過來說，這裡是他們已經檢查過一次的地方。#n如果我們要立刻行動的話，這一帶也會相對安全不少。"
10040050-374 = "他剛才是接到電話才離開的，如果有人要找他的話，我想對方應該不在這附近。"
10040050-375 = "雖然我其實很想駭入系統，徹底弄清楚對方的動向……"
10040050-376 = "那樣反而會造成反效果吧。#n因為那無疑是在正面挑戰千尋。"
10040050-377 = "說的沒錯。#n所以我們暫時只能靠手邊的資訊來判斷了。"
10040050-378 = "……現在怎麼辦，老師？"
10040050-379 = "[s29]「我們馬上行動吧。」\n[s30]「時間拖太久對我們也沒有好處。」"
10040050-382 = "果然是這樣嗎？#n不過幸好我們還能替你們帶路，請照著我們的指示前進吧。"
10040050-383 = "嗯，我們會支援老師到最後一刻的。"
10040050-384 = "總之你們先開門出去……"
10040050-386 = "…………"
10040050-387 = "……嗯？"
10040050-388 = "[s31]「……小雪？」\n[s32]「怎麼了嗎？」"
10040050-391 = "……咦？"
10040050-392 = "沒，沒什麼。#n只是……嗯……"
10040050-393 = "沒事沒事，應該只是我看錯了而已。"
10040050-394 = "不過我總覺得……"
10040050-399 = "好像有什麼人在盯著我看……"

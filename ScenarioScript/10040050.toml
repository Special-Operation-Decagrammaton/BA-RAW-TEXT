[translation]
10040050-1 = "Episode 5;Rattling Cabinet"
10040050-10 = "*huff* *puff*...We made it...somehow..."
10040050-11 = "I totally thought we were screwed when Sensei wouldn't let us break the drones, but we did it!"
10040050-13 = "Well done, both of you. That went much smoother than I expected."
10040050-14 = "This is the back gate. Well, it's not THE back gate, exactly. There's a ton of them because the building's so big."
10040050-15 = "We chose this one because it's never been used before. So the chances of someone being back here are next to none."
10040050-16 = "If we just open the gate..."
10040050-22 = "...?"
10040050-23 = "...Hmm?"
10040050-24 = "Just...open the...gate...?"
10040050-32 = "Huh?"
10040050-33 = "It's not working."
10040050-34 = "What? Why wouldn't it be working?"
10040050-35 = "Lemme try. Um..."
10040050-41 = "Huh? How's this possible? Why isn't it working?"
10040050-47 = "What the heck? Someone's reversing the code!"
10040050-48 = "Hare, we need to cut our connection, now! Whoever's doing this is trying to track our location!"
10040050-49 = "There's no way! I can't keep up! They're one...no, two steps ahead of me!"
10040050-50 = "[s1] \"Reverse hacking...?\" \n[s2] \"Someone better than Kotama and Hare?!\""
10040050-53 = "Sensei! You need to get out of there, now! It's not gonna be long before CCTV is back up!"
10040050-54 = "We can't confront them directly. We're getting pummeled. It's like..."
10040050-55 = "Hold up. I know this style...this method..."
10040050-60 = "...It's the vice president?!"
10040050-61 = "Get out, get out! Now!"
10040050-63 = "Wh-What the? Are you serious right now?!"
10040050-64 = "We finally made it all this way, and now you want us to go back?! You can't do anything?!"
10040050-65 = "I know, I know! But it's the only option!"
10040050-75 = "...Hurry!"
10040050-79 = "[ns3] Grab Koyuki's hand and run.\n[ns4] \"Let's get out for now, Koyuki!\""
10040050-82 = "UWAAAAH! There's no waaay!!"
10040050-103 = "*huff* *puff* Am I doomed to run forever and ever?!"
10040050-105 = "I let my guard down. When I think about it, this was bound to happen."
10040050-106 = "Yes. Chihiro's been combing through a bunch of Millennium's security systems recently...including Seminar's."
10040050-107 = "It was natural for her to step in during a situation like this one, even if it was remotely..."
10040050-108 = "This complicates our plan quite a bit."
10040050-109 = "Yeah... When it comes to hacking, there's no way I can beat the VP."
10040050-111 = "What does that mean for us? Are we just going to be trapped here until morning?"
10040050-112 = "I refuse! Even if morning comes, I'll find some kind of way! One way or another!!"
10040050-114 = "...No."
10040050-115 = "It's not completely impossible. I mean, there's no way we can take the VP head on..."
10040050-116 = "...but we don't necessarily need to either. Paradoxically to our usual approach, a more analog mindset may be the solution here."
10040050-117 = "[s5] \"Analog...?\"\n[s6] \"What do you mean?\""
10040050-120 = "At the end of the day, the VP is operating the security system remotely. It's a cyber fight."
10040050-121 = "Which means in places with no cyber security, even she can't do anything."
10040050-122 = "For example, where you are right now is a private zone, so there's no system installed there."
10040050-124 = "...Or you could consider outdated facilities that haven't undergone renovations. There are likely many neglected, forgotten paths twisted into their floor plans."
10040050-125 = "Forgotten paths...? What outdated facilities?"
10040050-126 = "The Seminar building may be the center of Millennium, but it's also the oldest and largest."
10040050-128 = "The endless expansion and remodeling it's undergone inherently means that older facilities have fallen to the wayside."
10040050-129 = "There are a ton of paths in the building that haven't been used for years."
10040050-130 = "I've been keeping an eye out for routes while navigating, and there are a couple you can take."
10040050-131 = "[ns7] \"You really work quickly.\"\n[ns8] \"That's amazing, both of you.\""
10040050-134 = "It may feel a bit dark and scary, but...we don't have the luxury of options right now."
10040050-135 = "Ugh, I don't like dirty places. There really aren't any nice, maintained paths?"
10040050-136 = "I might get cold too, since I'm in my jammies."
10040050-137 = "Oooh, can you find one with some vending machines, actually? I'm getting hungry!"
10040050-143 = "Sensei..."
10040050-144 = "...Does she really have to come?"
10040050-146 = "Whaaaaaat?! What's that supposed to mean? What'd I even do?"
10040050-147 = "[s9] \"I'm sorry... This is just how she is...\"\n[s10] \"Please try to understand... She's still young...\""
10040050-150 = "I'm gonna be nicer to Maki from now on."
10040050-151 = "Regardless, there's no other way. In fact, you should be grateful there even IS a way in this situation."
10040050-152 = "So to start..."
10040050-153 = "...Wait."
10040050-154 = "Please hold... I'm detecting soundwaves from the opposite end of the hallway. Quickly approaching."
10040050-155 = "This sound... "
10040050-162 = "They're footsteps...!!"
10040050-163 = "Hide, now! Someone is coming!"
10040050-167 = "F-Footsteps, FOOTSTEPS?! Who is it?! Who on earth is it?!"
10040050-168 = "Who else would it be?! Stop asking dumb questions and hide!"
10040050-170 = "H-Hide where?! Where am I supposed to hide?!"
10040050-171 = "...Wall? Maybe if I press myself against the wall, like this?!"
10040050-172 = "You're totally visible. You're gonna get caught in no time."
10040050-177 = "Ugh...! What do we do?!"
10040050-178 = "[ns11] \"There's some kind of a door on the side.\"\n[ns12] \"Let's go in there for now.\""
10040050-181 = "Really?! ...Okay!"
10040050-182 = "Move faster! There's no time!"
10040050-183 = "Hurry...!!"
10040050-191 = "[ns] \"This is...\""
10040050-192 = "It's a locker room."
10040050-193 = "We should be nice and safe here!"
10040050-198 = "...Please be quiet."
10040050-199 = "They've stopped in front of the door."
10040050-201 = "Noa? Something wrong?"
10040050-202 = "...Um. I'm sure it's nothing..."
10040050-203 = "It's just strange. This door..."
10040050-207 = "I'm pretty sure it used to be quite dusty, since no one uses this locker room anymore."
10040050-208 = "...!!"
10040050-209 = "!!!"
10040050-210 = "...Really? I mean, I don't really remember, but..."
10040050-211 = "...Fufu. There's a chance I'm overthinking it, but there's no harm in being thorough, right?"
10040050-212 = "Shall I take a look around?"
10040050-213 = "Oh, man."
10040050-214 = "What the...?!"
10040050-215 = "[ns13] Yank open an empty cabinet door.\n[ns14] Pull Koyuki into the cabinet with you."
10040050-222 = "I can manage on my own, so why don't you continue the search elsewhere, Yuuka?"
10040050-223 = "Sounds good. Just call if you need me, and I'll come running."
10040050-224 = "Yes, ma'am. Same to you."
10040050-228 = "S-Sensei...?! This...! Ugh!!"
10040050-229 = "[ns15] \"...Shh.\"\n[ns16] Cover Koyuki's mouth."
10040050-240 = "...!"
10040050-241 = "[ns17] \"(...Noa!)\"\n[ns18] \"(Please don't make a sound...)\""
10040050-244 = "..."
10040050-255 = "...Ouch!"
10040050-256 = "E-Eek...! Sensei!"
10040050-257 = "Ah, no... Wait a moment, just a little...!"
10040050-258 = "...Ugh."
10040050-259 = "H-Hold on... It's too narrow..."
10040050-265 = "Uwah?! Uwaaaah?!"
10040050-266 = "How did this happen to us..."
10040050-267 = "[ns19] \"...Shh.\"\n[ns20] \"Be quiet...\""
10040050-274 = "..."
10040050-275 = "...Hmm. Peculiar."
10040050-276 = "The last time I was here..."
10040050-277 = "...11 days, 2 hours, and 31 minutes ago, these chairs weren't so close together."
10040050-278 = "[ns] \"(How does someone remember something like that?)\""
10040050-279 = "This doorknob is in a different position as well. This area's been abandoned for quite some time now..."
10040050-284 = "...Aha."
10040050-285 = "The only reasonable explanation is that someone DID enter these locker rooms."
10040050-286 = "Fufu. How intriguing."
10040050-290 = "In that case, should I inspect the area?"
10040050-291 = "[ns] \"(...No!!)\""
10040050-306 = "Fufu..."
10040050-307 = "...Was I wrong? Did she already leave?"
10040050-313 = "[ns21] \"(Is she gone...?)\"\n[ns22] \"(Where did she go?!)\""
10040050-322 = "[ns23] \"(The sound's getting closer!)\"\n[ns24] \"(Step by step, my worst fears...!)\""
10040050-329 = "Ugh, ugh...?! This is...! This is...!!"
10040050-336 = "Things weren't supposed to be this way!"
10040050-349 = "[ns25] \"(...!)\"\n[ns26] \"(This is the end!)\""
10040050-361 = "[ns27] \"(...Is she really gone?)\"\n[ns28] \"(...It's over? It's really over?)\""
10040050-368 = "WAAAH...!!"
10040050-369 = "I thought it was OVER for me! In so many different ways!"
10040050-370 = "The whole thing was so horrifying, it felt scripted. Like a scene from a horror game or something."
10040050-371 = "I never watched something so raptly before. It was incredible, honestly."
10040050-372 = "Regardless, we've passed this hurdle, somehow."
10040050-373 = "And on the bright side, they'll probably consider this place cleared. So it's something of a safe spot for us now."
10040050-374 = "It seemed like an urgent call. It'll keep her off our backs for a little while."
10040050-375 = "I really, really wanna hack into the CCTVs over there and see what's happening, but..."
10040050-376 = "...it'd just summon Chihiro straight to our doorstep."
10040050-377 = "Exactly. So, for now, we'll just have to make-do with what info we have."
10040050-378 = "...What's the next move, Sensei?"
10040050-379 = "[s29] \"Let's get out of here, now.\"\n[s30] \"There's no point in lingering here.\""
10040050-382 = "Agreed. We can still guide you out, so just follow our instructions."
10040050-383 = "That's right. We're here for you until the end."
10040050-384 = "First, open the door and go to the—"
10040050-386 = "..."
10040050-387 = "...Huh?"
10040050-388 = "[s31] \"...Koyuki?\"\n[s32] \"Are you okay?\""
10040050-391 = "...Huh?"
10040050-392 = "N-No. It's just...um..."
10040050-393 = "I'm probably just imagining things. It's nothing..."
10040050-394 = "I just had this feeling..."
10040050-399 = "...like someone's watching us."

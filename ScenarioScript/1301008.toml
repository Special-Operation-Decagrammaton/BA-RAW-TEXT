1301008-53 = "3;유우카;02\n#3;em;[?!]\n#3;stiff\n#wait;1500"
1301008-54 = "3;유우카;05;……선생님, 그런데 어째서 판 위에 하트 에이스가 두 장이나 있는 건가요?\n#3;em;…"
1301008-55 = "3;유우카;99;분명 포커는 한 벌의 카드만 갖고 플레이하는 게임일 텐데요……."
1301008-56 = "3;유우카;05;설마 소매 속에 여벌 카드를 숨겨두셨던 건가요!\n#3;hophop\n#3;m3\n#3;em;[빠직]"
1301008-57 = "[s1] \"갬블의 세계는 냉혹한 법이지.\"\n[s2] \"무승부로 하지 않을래……?\""

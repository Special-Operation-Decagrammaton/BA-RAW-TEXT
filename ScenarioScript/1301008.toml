[translation]
1301008-1 = "สีหน้าไร้ความรู้สึก"
1301008-2 = "ห้องขององค์การนักเรียน <เซมิน่า> มิลเลเนียม"
1301008-3 = "ระหว่างที่รอนักเรียนคนอื่น คุณครูก็แนะนำเกมไพ่โป๊กเกอร์ให้ยูกะ"
1301008-4 = "ทำไมถึงชวนเล่นไพ่โป๊กเกอร์ล่ะคะ?"
1301008-5 = "ก็คงไม่แย่เท่าไหร่หรอกค่ะ ยังไงฉันก็ไม่มีอะไรทำอยู่แล้วค่ะ"
1301008-6 = "หึหึ... คุณครูเตรียมตัวให้พร้อมดีกว่านะคะ บอกไว้ก่อนนะว่าฉันเล่นเกมพนันเก่งมาก"
1301008-7 = "การเล่นเกมพนันเป็นเกมที่เดิมพันความคาดหวังโดยใช้การเปรียบเทียบความน่าจะเป็นของอัตรา#nความเป็นไปได้ของตัวเองกับฝ่ายตรงข้าม..."
1301008-8 = "ดังนั้นนักพนันที่เก่งๆ จะรู้จักวิธีการควบคุมอารมณ์ตนเอง และวิเคราะห์ความน่าจะเป็นอย่างใจเย็น#nเพื่อลดความเสี่ยง"
1301008-9 = "หรือก็คือคนที่เก่งคณิตศาสตร์จะไม่มีวันแพ้ในเกมพนันหรอกค่ะ"
1301008-10 = "[s] \"ถ้าไม่ลองก็ไม่รู้หรอกนะ\""
1301008-11 = "หึหึ ถ้างั้นมาลองดูสักตาก่อนมั้ยคะ?"
1301008-13 = "อืม..."
1301008-15 = "(ตอนนี้ในมือมีตองสาม... คำนวณดูแล้วโอกาสที่จะได้ไพ่แบบนี้มีเพียง 3 เปอร์เซ็นต์เท่านั้น)"
1301008-16 = "(แน่นอนว่ามีไพ่ใบอื่นที่หายากกว่านี้อยู่อีก แต่ว่าเท่านี้ก็คงพอชนะได้แล้วล่ะ)"
1301008-18 = "คอล! ฉันมีตองสามค่ะ"
1301008-19 = "[s] \"ฟลัช\""
1301008-20 = "คะ? มีไพ่เดียวกันห้าใบเรียกว่าฟลัชเหรอคะ? แถมยังมีโอกาสได้ฟลัชไม่ถึง 0.2 เปอร์เซ็นต์ด้วย!"
1301008-21 = "[s] \"อะไรก็เกิดขึ้นได้ในวงไพ่นะ\""
1301008-22 = "ก็จริงค่ะ..."
1301008-23 = "...ตานี้แค่โชคช่วยเท่านั้นค่ะ มาเล่นกันอีกรอบ!"
1301008-25 = "(ดีล่ะ คราวนี้ฉันต้องชนะแน่นอน!)"
1301008-26 = "สเตรท!"
1301008-27 = "[s] \"โฟร์การ์ด\""
1301008-28 = "คะ? คุณครูมีไพ่เอซทั้งหมดเลยเหรอคะ ไม่อยากเชื่อเลย!"
1301008-29 = "อึ่ก... มาลองอีกรอบค่ะ!"
1301008-32 = "(โอกาสที่จะได้ไพ่แบบนี้มีแค่ 0.0015 เปอร์เซ็นต์เท่านั้น... ไม่มีทางที่คุณครูจะได้ไพ่ดีกว่านี้หรอก)"
1301008-33 = "(คราวนี้ฉันต้องชนะแน่นอน!)"
1301008-35 = "สเตรทฟลัช!"
1301008-36 = "[s] \"รอยัล สเตรท ฟลัช\""
1301008-37 = "ไม่อยากเชื่อเลย~!"
1301008-39 = "อึ่ก... ไม่อยากเชื่อเลยว่าแพ้สามตารวดแบบนี้ ทั้งๆ ที่ได้ไพ่ดีแล้วแท้ๆ... ไม่อยากจะเชื่อเลย!"
1301008-40 = "...ฉันคำนวณผิดพลาดตรงไหนกันนะ?"
1301008-41 = "[s] \"การเล่นไพ่จะพึ่งแต่การคำนวณไม่ได้หรอกนะ\""
1301008-42 = "แต่ว่าโอกาสการได้ไพ่น่ะมันถูกกำหนดไว้แล้วนะ ถ้าไม่ให้พึ่งการคำนวณแล้วฉันควรจะต้องทำ#nยังไงล่ะ?"
1301008-43 = "ฉันจะต้องพึ่งความรู้สึกและสัญชาตญาณมากกว่าการคำนวณงั้นเหรอคะ?"
1301008-44 = "อืม... ให้ฉันใช้สัญชาตญาณในเกมที่วัดกันที่อัตราการได้รับงั้นเหรอ? ไม่เห็นจะเข้าใจเลย...#nแต่ในเมื่อคุณครูเป็นฝ่ายชนะมาตั้งสามรอบแล้ว ฉันคงเถียงอะไรไม่ได้หรอกค่ะ"
1301008-45 = "[s] \"อย่าเล่นเกมพนันเลยจะดีกว่านะ\""
1301008-46 = "ค่ะ ฉันก็คิดแบบนั้นค่ะ"
1301008-47 = "ถ้างั้นฉันเก็บไพ่เลยนะคะ..."
1301008-54 = "...คุณครูคะ ทำไมถึงมีไพ่เอซโพธิ์แดงสองใบอยู่บนโต๊ะล่ะคะ?"
1301008-55 = "ฉันคิดว่าไพ่โป๊กเกอร์จะเล่นแค่สำรับเดียวซะอีก..."
1301008-56 = "หรือว่าคุณครูแอบเพิ่มไพ่เข้ามาในสำรับคะ!"
1301008-57 = "[s1] \"โลกแห่งการพนันน่ะมันโหดร้ายนะ\"\n[s2] \"เอาเป็นว่าเราเสมอกันดีมั้ย....?\""
1301008-62 = "เหลือเชื่อเลยจริงๆ เชียว!"

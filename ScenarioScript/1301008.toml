[translation]
1301008-1 = "撲克臉"
1301008-2 = "千年．「研討會」學生會辦公室"
1301008-3 = "因為在等待其他學生時感到無聊，於是向優香建議玩場撲克。"
1301008-4 = "撲克嗎？"
1301008-5 = "嘛，好啊。我也正好有點無聊。"
1301008-6 = "呵呵……不過，請做好覺悟。別看我這樣，我可是很習慣賭博的。"
1301008-7 = "所謂的賭博，就是比較自己手牌和對方手牌的機率，計算期望值的遊戲……"
1301008-8 = "因此，優秀的賭徒在任何瞬間都不會被感情所迷惑，能冷靜地分析機率，將傷害降到最小。"
1301008-9 = "也就是說，擅長數學的人是不會在賭博中敗下陣的。"
1301008-10 = "[s] 「不試試看的話，不會知道吧？」"
1301008-11 = "呵呵，好吧。那就先輕鬆地玩一局吧？"
1301008-13 = "唔嗯……"
1301008-15 = "（我的手牌是3張相同數字的三條……湊齊的機率不到3%，是罕見的組合）"
1301008-16 = "（當然還有很多更罕見的組合，但這個已足以分出勝負……）"
1301008-18 = "跟注！我是三條。"
1301008-19 = "[s] 「同花。」"
1301008-20 = "哎？是5張牌相同花色的那個同花嗎？能湊齊那個的機率只有0.2%！"
1301008-21 = "[s] 「在賭局中，什麼事都有可能發生。」"
1301008-22 = "是這樣沒錯……"
1301008-23 = "……看來你這把運氣很好呢。再來一局吧！"
1301008-25 = "（好，這次一定是我的勝利！）"
1301008-26 = "順子！"
1301008-27 = "[s] 「四條。」"
1301008-28 = "耶，Ace的牌全都在老師的手裡！？真不敢相信！"
1301008-29 = "唔唔……再一局！"
1301008-32 = "（這個，出現機率只有0.0015%，無限接近最強的組合……老師手裡不可能有比它更強的牌型……！）"
1301008-33 = "（這次是我贏了！）"
1301008-35 = "同花順！"
1301008-36 = "[s] 「皇家同花順。」"
1301008-37 = "什麼，真不敢相信！！"
1301008-39 = "嗚嗚，沒想到連輸三局……明明我的手牌也不錯……果然還是不敢相信！"
1301008-40 = "……有什麼計算錯誤的地方嗎……？"
1301008-41 = "[s] 「優香可能就是過度依賴計算才贏不了吧。」"
1301008-42 = "可是，牌出現的機率是固定的，如果不依賴計算的話該怎麼辦……？"
1301008-43 = "比其計算，憑直覺和本能就好了，是嗎？"
1301008-44 = "唔……很難理解在機率的戰鬥中能有什麼本能，但連贏三次的老師都這麼說了，這次就不得不承認……"
1301008-45 = "[s] 「說起來，賭博本來就不太好呢。」"
1301008-46 = "是。我也這麼認為。"
1301008-47 = "那麼，來把牌收拾一下吧……"
1301008-54 = "……老師。為什麼桌上有兩張紅心Ace啊？"
1301008-55 = "撲克應該是只用一副牌來玩的遊戲……"
1301008-56 = "難道……你把另一副牌藏在袖子裡！？"
1301008-57 = "[s1] 「賭博的世界是很殘酷的。」\n[s2] 「……不如就算平手吧？」"
1301008-62 = "那種說法怎麼可能行得通！"

[translation]
1301008-1 = "Poker Face"
1301008-2 = "Millennium Seminar Office"
1301008-3 = "I offered to play poker with Yuuka while we wait for the others to arrive."
1301008-4 = "Poker? Where's this coming from?"
1301008-5 = "Though it's not a bad idea. I was staving off boredom."
1301008-6 = "Heh heh... You'd better be ready. I've always been good at gambling."
1301008-7 = "Gambling is a process where you bet on an expected value based on the probability of your hand versus the probability of your opponent's hand."
1301008-8 = "A skilled gambler knows how to control their emotions and objectively analyze the probabilities to minimize risks."
1301008-9 = "In other words, the best gamblers are also those that best understand math."
1301008-10 = "[s] \"Prove it.\""
1301008-11 = "Heh heh. Then deal the cards and let's play a hand."
1301008-13 = "Um..."
1301008-15 = "(I have three of a kind in hand... A hand that appropriately only has a three percent chance of being attained.)"
1301008-16 = "(Granted, it's not the strongest hand in the game, but the odds are in my favor to win.)"
1301008-18 = "Call! I have three of a kind."
1301008-19 = "[s] \"Flush.\""
1301008-20 = "What? You have five cards of the same suit? The probability of getting that hand is only 0.2%!"
1301008-21 = "[s] \"Anything can happen on the cards table.\""
1301008-22 = "That's true, but..."
1301008-23 = "You got lucky this time. Let's go for another round!"
1301008-25 = "(Great. I'm definitely going to win this time!)"
1301008-26 = "Straight!"
1301008-27 = "[s] \"Four of a kind.\""
1301008-28 = "Four aces?! I can't believe this!"
1301008-29 = "Ugh... One more hand!"
1301008-32 = "(The probability of getting this hand is only 0.0015%... Surely Sensei can't beat this hand.)"
1301008-33 = "(My victory is assured!)"
1301008-35 = "Straight flush!"
1301008-36 = "[s] \"Royal straight flush.\""
1301008-37 = "No way!"
1301008-39 = "Ugh. How did I lose three times in a row...? All three were good hands too!"
1301008-40 = "Did I make a miscalculation?"
1301008-41 = "[s] \"It takes more than calculations to win at poker.\""
1301008-42 = "But the chances of getting certain hands are always set in stone. What am I supposed to rely on if not the calculations?"
1301008-43 = "I have to rely on my intuition and instincts instead?"
1301008-44 = "How does one use instincts in a game of chance? It doesn't make sense to me, though I can't argue with the results."
1301008-45 = "[s] \"I'd recommend not gambling in the first place.\""
1301008-46 = "Yes, I can agree with that."
1301008-47 = "Allow me to put away the cards."
1301008-54 = "...Sensei. Why are there two aces of hearts on the table?"
1301008-55 = "There's only one per deck, and poker is played with one deck of cards..."
1301008-56 = "Were you hiding cards up your sleeves?!"
1301008-57 = "[s1] \"The world of gambling is ruthless.\"\n[s2] \"Shall we call it a draw...?\""
1301008-62 = "You are unbelievable!"

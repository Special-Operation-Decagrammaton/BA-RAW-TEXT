[translation]
1301008-1 = "#title;포커페이스"
1301008-2 = "#place;밀레니엄 <세미나> 학생 사무실"
1301008-3 = "#na;다른 학생들을 기다리며 무료하게 시간을 보내던 중, 유우카에게 포커 게임을 권해보았다."
1301008-4 = "3;유우카;02;갑자기 포커 게임이요?\n#3;em;[반응]\n#3;a"
1301008-5 = "3;유우카;01;뭐, 괜찮아요. 저도 마침 무료하던 참이었거든요.\n#3;greeting"
1301008-6 = "3;유우카;07;후후…… 하지만 각오하시는 게 좋을 거예요. 저는 이래 봬도 갬블에 능숙하거든요."
1301008-7 = "3;유우카;99;갬블이란 자신에게 주어진 패의 확률과 상대방에게 주어진 패의 확률을 견주어 기대값을 베팅하는 게임…….\n#3;em;…"
1301008-8 = "3;유우카;01;때문에 뛰어난 도박사는 어떠한 순간에도 감정에 휘둘리지 않고 냉정하게 확률을 분석해 손해를 최소화할 수 있지요."
1301008-9 = "3;유우카;07;즉, 수학을 잘하는 사람은 절대로 갬블에서 지지 않는 답니다.\n#3;em;[반짝]"
1301008-10 = "[s] \"길고 짧은 건 대보아야 알 수 있는 법이지.\""
1301008-11 = "3;유우카;07;후후, 그럼 가볍게 한 판 해볼까요?\n#3;greeting\n#3;em;[음표]"
1301008-12 = "3;유우카;01\n#3;closeup\n#3;h"
1301008-13 = "3;유우카;01;으음…….\n#3;closeup\n#3;em;…"
1301008-14 = "3;유우카;01\n#3;closeup"
1301008-15 = "3;유우카;99;(이번에 받은 패는 숫자가 같은 카드가 세 장 있는 스리 카드…… 확률로 계산하자면 3%도 안되는 희귀한 경우네.)\n#3;closeup"
1301008-16 = "3;유우카;01;(물론 이것보다 더 희귀한 카드도 많지만, 이만하면 승부를 걸어봐도 괜찮겠어.)\n#3;closeup"
1301008-17 = "3;유우카;01\n#3;closeup"
1301008-18 = "3;유우카;01;콜! 제 카드는 스리 카드에요.\n#3;closeup\n#3;em;[반응]\n#3;greeting"
1301008-19 = "[s] \"플러시.\""
1301008-20 = "3;유우카;06;네에? 같은 무늬의 카드가 5장이나 있는 플러시라고요? 0.2% 밖에 안되는 확률이었는데!\n#3;shake\n#3;em;[?!]\n#3;closeup"
1301008-21 = "[s] \"갬블 판에서는 어떤 일이든 일어날 수 있는 법이야.\""
1301008-22 = "3;유우카;06;그건 그렇지만…….\n#3;closeup"
1301008-23 = "3;유우카;05;……이번 판은 운이 좋으셨네요. 한 판 더 하시죠!\n#3;em;[!]\n#3;closeup"
1301008-24 = "3;유우카;01\n#3;closeup\n#3;h"
1301008-25 = "3;유우카;01;(좋아. 이번에는 내 승리가 확실해!)\n#3;closeup"
1301008-26 = "3;유우카;01;스트레이트!\n#3;closeup\n#3;em;[반응]\n#3;greeting"
1301008-27 = "[s] \"포 카드.\""
1301008-28 = "3;유우카;06;네에? 에이스 카드가 모두 선생님의 손에 있었다고요? 믿을 수가 없어요!\n#3;closeup\n#3;em;[?!]\n#3;shake"
1301008-29 = "3;유우카;05;으으…… 한 판 더해요!\n#3;closeup\n#3;jump"
1301008-30 = "3;유우카;05\n#3;closeup\n#3;h"
1301008-31 = "3;유우카;05\n#3;closeup"
1301008-32 = "3;유우카;99;(이번에 받은 패는 무려 0.0015%의 확률로만 나오는 극상의 조합…… 이보다 더 좋은 패가 선생님의 손에서 나올 일은 없을거야.)\n#3;closeup"
1301008-33 = "3;유우카;05;(이번에야 말로 내 승리가 확실해!)\n#3;closeup"
1301008-34 = "3;유우카;05\n#3;closeup"
1301008-35 = "3;유우카;05;스트레이트 플러시!\n#3;em;[반응]\n#3;greeting\n#3;closeup"
1301008-36 = "[s] \"로열 스트레이트 플러시야.\""
1301008-37 = "3;유우카;06;말도 안 돼~!\n#3;em;[?!]\n#3;shake\n#3;closeup"
1301008-38 = "3;유우카;06\n#3;h"
1301008-39 = "3;유우카;06;으으, 설마 세 판을 연속으로 지다니. 심지어 패도 나쁘지 않았는데…… 믿을 수가 없어요!\n#3;stiff\n#3;em;[속상함]"
1301008-40 = "3;유우카;06;……무언가 계산에 오류라도 있었던 걸까요?"
1301008-41 = "[s] \"유우카는 뭐든지 계산에 의존하려 하니까 이기지 못하는 거야.\""
1301008-42 = "3;유우카;05;하지만 카드가 나올 확률은 언제나 일정한데, 계산에 의존하지 않으면 무얼 참고하라는 말인가요?"
1301008-43 = "3;유우카;02;계산보다는 직감, 본능에 의존해야 한다고요?\n#3;em;[?]"
1301008-44 = "3;유우카;06;끄응…… 확률 싸움에 본능이라니 이해하기는 어렵지만, 승부에서 세 번이나 이긴 선생님께서 그렇게 말씀하신다면 어쩔 수 없지요."
1301008-45 = "[s] \"애초에 갬블에는 손대지 않는 것이 좋아.\""
1301008-46 = "3;유우카;99;네. 저도 그렇게 생각해요.\n#3;greeting"
1301008-47 = "3;유우카;01;그럼 카드를 정리하도록 할까요……."
1301008-48 = "3;유우카;01\n#3;m2\n#wait;1000"
1301008-49 = "3;유우카;01\n#3;m3\n#wait;1000"

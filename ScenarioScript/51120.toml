[translation]
51120-1 = "Episode 12;Kiryuu Kikyou and the Succession Contest 1"
51120-3 = "The next day."
51120-8 = "Sensei! Sensei! "
51120-9 = "Heehee! Good morning!"
51120-10 = "[s] \"Good morning, Yukari. Are you feeling better?\""
51120-11 = "Do you refer to my mental or physical state?"
51120-12 = "Heeheehee..."
51120-13 = "Whatever it may be, I am a fresh sakura blossom!"
51120-14 = "We have much more pressing matters to address, however."
51120-15 = "We're going to locate Kikyou, and she will be my witness for my Hyakkaryouran succession contest!"
51120-17 = "We'll have everything we need to begin our new era."
51120-18 = "Cue the lights! The great legend of Hyakkaryouran Yukari shall begin!"
51120-19 = "[s] \"Will Kikyou agree that easily?\""
51120-20 = "Heehee. The hallmark of a true educator. You know all the right questions to ask! After all, you must understand your opponent before you engage."
51120-21 = "If I were to describe Kikyou... She's the smartest, most logical, and sensible person I've ever met."
51120-22 = "There was one time..."
51120-26 = "Yukari. You know better."
51120-27 = "Y-Yes...! *gulp*"
51120-31 = "I've already told you. You're allowed one ice cream a day."
51120-32 = "As I well remember! However, Kikyou...!"
51120-33 = "Rules are rules. And good rules exist for good reason. Excessive sweets before bed is detrimental for your teeth and your health."
51120-37 = "Furthermore, are you brushing your teeth after meals? Properly?"
51120-38 = "O-O-O-O-Of course I am!"
51120-39 = "I naturally would never dream of skimping on brushing my teeth and using mouthwash as a substitute! No, ma'am."
51120-44 = "That's it. I will be inspecting your teeth after your meals, starting now."
51120-45 = "WHAAAT?"
51120-47 = "That's the perfect illustration of Kikyou's character!"
51120-48 = "With such upstanding character, she'll undoubtedly lend us a helping hand!"
51120-51 = "[ns] \"Y-Yeah! You do have a lot of faith in her!\""
51120-52 = "Heehee!"
51120-53 = "Every moment that passes is another wasted!"
51120-57 = "Let's go!"
51120-64 = "Hello? Kikyou, it is Yukari!"
51120-69 = "I'll let myself in!"
51120-75 = "Hyakkaryouran Club Room"
51120-81 = "Wh-What? Sensei?"
51120-83 = "...?"
51120-84 = "[s] \"Shizuko? Fancy running into you here.\""
51120-85 = "Yukari?"
51120-86 = "It's me! I've missed you dearly, Kikyou!"
51120-87 = "Ah, Yukari... It has been quite some time. I'm glad your vivaciousness hasn't dulled."
51120-88 = "Irony walks in my shadow today. To see you today, at this moment..."
51120-89 = "Perhaps there are higher forces showing their hand."
51120-90 = "...?"
51120-91 = "You'll need to wait your turn, Yukari."
51120-92 = "My turn...?"
51120-94 = "[ns] \"What brings you here, Shizuko?\""
51120-95 = "Ah! Let me explain!"
51120-96 = "On behalf of the entire student body, I'd like to announce the revival of the Hyakkiyako Lantern Festival!"
51120-97 = "...You already knew? O-Oh! Thank you, Sensei! We've been working really hard!"
51120-98 = "Heeheehee."
51120-99 = "Hearing your words of encouragement makes me really... Heehee..."
51120-103 = "Ack! Stop distracting me, Sensei! I don't have time to be kicking my feet and giggling!"
51120-104 = "Okay! Step one: Locate the Kadenokouji miko and ask her to conduct the festival's main ceremony!"
51120-105 = "[s] \"Kadenokouji...? Isn't Yukari...?\""
51120-107 = "...Ah."
51120-109 = "The Kadenokouji are one of the oldest and most respected families in Hyakkiyako rituals and ceremonies."
51120-110 = "One couldn't overstate their importance and what they represent."
51120-111 = "An excellent way of putting it!"
51120-112 = "And so, naturally, it was the Kadenokouji family that conducted the festival's ritual. That is, until it was banned twenty years ago."
51120-113 = "It's recorded that something went wrong with the ceremony, and the festival hasn't been held since."
51120-114 = "Which brings us back to our original purpose! Only the current Kadenokouji miko can rightfully revive the Lantern Festival!"
51120-115 = "I visited their residence in person, but she wasn't home! I needed a different plan of attack."
51120-116 = "[s] \"So that's why you've come to visit the Hyakkaryouran!\""
51120-117 = "You have to make your own luck sometimes! "
51120-118 = "I heard the Kadenokouji miko was a member of the Hyakkaryouran, so I came straight here."
51120-120 = "Would you like to respond, Kadenokouji Yukari?"
51120-121 = "Ah! I had no idea it was you! It's great to finally meet you!"
51120-122 = "Great! That means you're already up to speed. Will you work together with the Festival Department? Please?"
51120-128 = "I... Well..."
51120-132 = "*gulp*"
51120-137 = "I truly wish I could be of assistance, but I must decline, Festival Department President Shizuko."
51120-138 = "...Huh?"
51120-139 = "Wh-Why? Did I do something to offend you?"
51120-143 = "No! It's simply..."
51120-144 = "My place is with the Hyakkaryouran!"
51120-145 = "Which is why I've come here, Kikyou! Because this is where I belong!"
51120-147 = "...What is this drivel?"
51120-148 = "I plan to declare a succession contest against Nagusa."
51120-159 = "I've heard the news, Kikyou! A Declaration of Dissolution? I don't understand."
51120-160 = "..."
51120-161 = "This must be a misunderstanding of some sort! Please, explain! Kikyou!"
51120-165 = "Yukari."
51120-166 = "Rumors are spreading left and right, and people are losing faith in the Hyakkaryouran."
51120-168 = "I plan on rectifying this situation with a succession contest!"
51120-170 = "Which brings us to your presence here, today."
51120-171 = "I came to beg your assistance, Kikyou! Will you serve as witness to my succession contest, please?"
51120-172 = "With your support, we can return Hyakkaryouran to its former glory together!"
51120-178 = "I understand your motivations now."
51120-179 = "I was wondering when Kadenokouji Yukari would make her move, once the Declaration of Dissolution was released."
51120-180 = "A succession contest wasn't within my calculations, I'll admit. Although perhaps I should've expected it."
51120-181 = "Yes... I can see how you decided upon this strategy."
51120-182 = "...!"
51120-183 = "I trusted you'd understand, Kikyou!"
51120-185 = "If that is your course of action..."
51120-186 = "No."
51120-191 = "I did NOT think that was where this was going!"
51120-192 = "[s] \"Huh...?\""
51120-194 = "N-No? I don't understand..."
51120-195 = "You have always protected the Hyakkaryouran's ideals with your heart and soul! I truly believed that of all people, you..."
51120-196 = "Would agree? Support you?"
51120-197 = "Allow me to explain."
51120-202 = "You are delusional. Arrogant. I'm disappointed, Kadenokouji Yukari."
51120-203 = "...!!"
51120-205 = "I've gathered and analyzed all pertinent information. Nagusa's disappearance and subsequent reappearances, and even your meeting with the Yin-Yang Club."
51120-206 = "Fervent hopes have no place in reality."
51120-207 = "Nagusa will never return to the Hyakkaryouran again."
51120-208 = "She already bid her farewells. "
51120-209 = "She came back to the Hyakkaryouran one last time. To renounce the presidency that Ayame had passed down to her."
51120-223 = "[ns] \"(That was what Renge meant...)\""
51120-224 = "N-Nagusa... You've met with her? I-I cannot believe she would resign."
51120-225 = "W-Would she?"
51120-226 = "Renge was too soft to relay the news."
51120-227 = "Do not expect such consideration from me. I will not lie for your feelings."
51120-228 = "She deserted us. She is not of the Hyakkaryouran."
51120-229 = "But...!"
51120-230 = "Even so, I want—"
51120-231 = "Fine. Allow me to entertain the possibility of this succession contest. "
51120-232 = "You plan to defeat Nagusa, become the rightful president, and restore the Hyakkaryouran. Your ambition knows no bounds, and I commend you for that."
51120-233 = "But there is a flaw Renge attempted to gently reveal to you. One that I will now spell out."
51120-234 = "...!"
51120-238 = "Listen carefully, Kadenokouji Yukari."
51120-239 = "You could never best Nagusa in combat."
51120-245 = "There is no strategy in this world capable of achieving that end."
51120-246 = "Know the limits of your capabilities and give up."
51120-248 = "N-No! Absolutely not!"
51120-249 = "I shall not give up! I, Yukari, will defeat her!"
51120-250 = "I...!"
51120-251 = "I am Hyakkaryouran's Elite, aren't I?!"
51120-253 = "Well then, how do you plan on besting her? When you cannot even defeat me?"
51120-254 = "D-Defeat means nothing if the soul remains strong!"
51120-258 = "So be it. I'll demonstrate my strength to you! Here and now!"
51120-259 = "Kiryuu Kikyou! I request a sparring match against you. If I emerge victorious—"
51120-261 = "No."
51120-267 = "If you're going to prove yourself, do it properly."
51120-271 = "Challenge me to a succession contest."
51120-276 = "...Wh-What?"
51120-277 = "Do you fight for ideals you can't uphold?"
51120-278 = "Strength is justice. That is what we believe at the Hyakkaryouran Resolution Council."
51120-279 = "You want me to bend my knee? Force my will. Win this succession contest, and I will be your witness."
51120-280 = "...!! "
51120-281 = "[s] \"This isn't the type of conflict resolution I was expecting!\""
51120-283 = "So, um... Sensei...!"
51120-284 = "M-Maybe I'll just...come back another time?"
51120-289 = "I can't turn back now..."
51120-294 = "I declare a succession contest against operations officer Kiryuu Kikyou!"
51120-309 = "I accept, Kadenokouji Yukari."
51120-310 = "[USERNAME] Sensei of Schale will serve as a witness to this contest for the seat of operations officer. Tradition states the necessity for two witnesses, however..."
51120-311 = "Given the circumstances, we acknowledge a special agreement between the two parties."
51120-312 = "As members of Hyakkaryouran, Kadenokouji Yukari and Kiryuu Kikyou participate in this contest with only one witness."
51120-313 = "Do you agree with these statements?"
51120-320 = "Yes! I've prepared my heart!"
51120-328 = "Then, let us begin."

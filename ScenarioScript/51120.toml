[translation]
51120-1 = "第12話;桐生桔梗，以及繼承戰（１）"
51120-3 = "（隔天）"
51120-8 = "老──師──！！"
51120-9 = "呵呵！老師早安！"
51120-10 = "[s]「早安，紫。今天好嗎？」"
51120-11 = "老師這個問題……是想問我的健康還是心情呢？"
51120-12 = "呵呵呵……"
51120-13 = "不管是什麼，小女子都處於最佳狀態！"
51120-14 = "啊，現在不是說這些的時候了！#n今天是非～常重要的日子！"
51120-15 = "這次我一定要見到桔梗前輩，請他擔任百花繚亂繼承戰的保證人………"
51120-17 = "嗯！這樣就Misson Complete了！"
51120-18 = "紫的百花繚亂傳說將會開始！"
51120-19 = "[s]「桔梗他是個怎麼樣的人呢？」"
51120-20 = "呵呵呵，真不愧是老師！#n為了事先掌握情報而提出無懈可擊的問題！您問得真好。"
51120-21 = "說起桔梗前輩……#n一言以蔽之，是個非常理性、重視邏輯且通情達理的人！"
51120-22 = "如果要問給人什麼感覺的話……"
51120-26 = "紫，我之前說過了吧。"
51120-27 = "是，是……！（咕嚕……）"
51120-31 = "一天只能吃一個冰淇淋。#n你應該沒忘記吧？"
51120-32 = "我，我當然記得！但是桔梗前輩……！"
51120-33 = "不用了，我不想聽你辯解。#n要遵守規則是理所當然的，但更重要的是在睡前攝取糖類對健康很不好。"
51120-37 = "還有，你吃完後應該有好好刷牙吧？"
51120-38 = "那，那那那那當然！"
51120-39 = "我絕對沒有「今天有點懶，所以漱漱口就當刷過牙了」這種想法……！"
51120-44 = "很好，那從今天開始，我會每天盯著你刷牙。"
51120-45 = "咦咦！？"
51120-47 = "……甚至發生過這種事呢！"
51120-48 = "如果是前輩的話，應該會幫助我才對。"
51120-51 = "[ns]「別的我不敢保證，但我已經明白紫很信任他了。」"
51120-52 = "呵呵……"
51120-53 = "沒錯！#n那話就先說到這邊……"
51120-57 = "我們趕緊出發吧！"
51120-64 = "桔梗前輩，紫來囉！"
51120-69 = "打擾了！"
51120-75 = "百花繚亂社團部室"
51120-81 = "咦？老，老師！？"
51120-83 = "…………？"
51120-84 = "[s]「靜子？你為什麼在這裡……」"
51120-85 = "紫？"
51120-86 = "是！桔梗前輩好久不見！"
51120-87 = "啊……嗯，是啊，好久不見。#n你還是一樣充滿活力呢。"
51120-88 = "可是……為什麼偏偏在今天，在這個時間點。#n該說真是不可思議嗎？"
51120-89 = "還是說……這就是所謂的命運呢？"
51120-90 = "……？"
51120-91 = "紫，在和你交談之前，我已經有先來的客人了。"
51120-92 = "先來的客人……"
51120-94 = "[ns]「對了，靜子來這裡有什麼事嗎？」"
51120-95 = "啊，說到那個。"
51120-96 = "咳哼，事情是這樣的。#n這次我決定要和大家合力重現「百鬼夜行燈籠祭」！"
51120-97 = "啊，老師已經知道了嗎？#n好像很辛苦，會幫我加油打氣……？"
51120-98 = "呵呵呵～～"
51120-99 = "光是聽到老師這麼說，我就～～～"
51120-103 = "……不對！雖然很開心聽到老師這麼說，但現在不是高興的時候！"
51120-104 = "總之！我想在慶典的高潮借助「勘解由小路的巫女」的力量。"
51120-105 = "[s]「勘解由小路的巫女……？」"
51120-107 = "……啊。"
51120-109 = "勘解由小路──是世世代代在百鬼夜行聯合學園舉行的祭典儀式或祭祀活動中，#n擔任重要角色的歷史悠久的家族。"
51120-110 = "其特別之處應該不必我多說。#n畢竟他們是具有重大象徵意義的家族。"
51120-111 = "正是如此！"
51120-112 = "實際上，該家族在20年前被廢止的慶典上也扮演了核心角色。#n因為負責高潮部分的就是勘解由小路家族。"
51120-113 = "根據遺留下來的記錄，20年前的慶典在舉行祭典儀式之前就不了了之……"
51120-114 = "我希望能在這次慶典中彌補這個遺憾，#n同樣請勘解由小路的巫女進行祭典儀式，所以聯絡了他們……"
51120-115 = "但是卻遲遲沒有收到任何回覆！#n就算親自登門拜訪也只聽說他不在……！"
51120-116 = "[s]「也就是說，靜子來百花繚亂的原因是……」"
51120-117 = "沒錯，我覺得就這樣空等下去不會有任何結果，所以……靜子我決定了！"
51120-118 = "要直接來[ruby=聽說他在的地方]百花繚亂[/ruby]，找到那位擔任勘解由小路家巫女的小姐！"
51120-120 = "聽到了吧？[ruby=  ・     ・     ・     ・     ・  ]勘解由小路[/ruby]紫同學。"
51120-121 = "啊，老師身旁的這位就是勘解由小路同學嗎！？"
51120-122 = "太好了！請一定要和我們節慶營運管理部一起……！"
51120-128 = "我……我………"
51120-132 = "……（吞口水）"
51120-137 = "非常抱歉，節慶營運管理部的部長。#n我沒辦法幫忙。"
51120-138 = "……咦咦！？"
51120-139 = "為，為什麼呢？"
51120-143 = "我……"
51120-144 = "我想待在百花繚亂。"
51120-145 = "我想待在這裡，所以才會來找桔梗前輩。"
51120-147 = "……什麼意思？"
51120-148 = "桔梗前輩，我打算向名草前輩申請進行「繼承戰」。"
51120-159 = "我聽說了，桔梗前輩。#n關於幾天前下達「解散令」的事。"
51120-160 = "…………"
51120-161 = "那一定是有什麼誤會吧？#n我也認為是大家搞錯了！"
51120-165 = "紫。"
51120-166 = "所以在那種錯誤的事傳開之前！"
51120-168 = "小女子……要透過「繼承戰」讓一切回歸正軌！"
51120-170 = "……所以你才會跑去陰陽部，接著又跑來找我啊。"
51120-171 = "是的！所以桔梗前輩，能請前輩擔任「繼承戰」的保證人嗎？"
51120-172 = "小女子我會藉此讓百花繚亂恢復原狀！"
51120-178 = "久久沒在部室現身，現在卻突然出現……"
51120-179 = "「解散令」發布之後，我本以為你一定會有所行動……"
51120-180 = "結果竟然是想申請進行「繼承戰」……實在很有你的作風，也確實出乎我的意料呢。"
51120-181 = "這樣啊，你的理由……我知道了。"
51120-182 = "……！"
51120-183 = "既然如此，前輩……！"
51120-185 = "嗯，既然如此，我當然──"
51120-186 = "會拒絕你。"
51120-191 = "咦，咦？居然拒絕……！？"
51120-192 = "[s]「……嗯？」"
51120-194 = "為，為為為什麼呢！？桔梗前輩！？"
51120-195 = "前輩……現在依然守護著百花繚亂，所以當然……當然會對我的意見……！"
51120-196 = "你以為我會同意嗎？"
51120-197 = "那我就告訴你吧──"
51120-202 = "那全都是你自作多情。#n你是否有點過於傲慢了呢，勘解由小路同學？"
51120-203 = "……！！"
51120-205 = "我也聽說了有關名草前輩的消息。#n包含他在哪裡出現、做了什麼行動，以及為何與陰陽部接觸。"
51120-206 = "但是結論只有一個。"
51120-207 = "那個人不會再回到百花繚亂了。"
51120-208 = "不……應該說他回來過一次。"
51120-209 = "為了歸還從菖蒲委員長手中獲得的「資格象徵」。"
51120-223 = "[ns] （原來蓮華之前說的歸還，指的是這件事啊）"
51120-224 = "名草前輩……想歸還「資格象徵」……#n這，這怎麼可能……"
51120-225 = "前輩他……"
51120-226 = "……蓮華應該是顧慮你的心情才沒告訴你吧。"
51120-227 = "但是我不一樣。#n我認為事實就該說清楚。"
51120-228 = "我不想再將拋棄我們的人視為百花繚亂的一員。"
51120-229 = "可是……！"
51120-230 = "就算是這樣……！"
51120-231 = "好，就照你說的進行「繼承戰」吧。"
51120-232 = "想打倒名草前輩，光明正大地繼承委員長之位──真是志氣可佳。#n這確實是個不錯的計畫。"
51120-233 = "但其中有一個你知、我知，所有人都知道的問題。"
51120-234 = "……！"
51120-238 = "那就是勘解由小路紫──"
51120-239 = "你根本不可能打贏名草前輩不是嗎？"
51120-245 = "他很強。"
51120-246 = "遠遠比你強得多。"
51120-248 = "不，不對。不是這樣的！"
51120-249 = "小女子我有辦法打倒他！"
51120-250 = "因為我是……！"
51120-251 = "百花繚亂的菁英……！"
51120-253 = "明明連我都打不贏？哪來的自信？"
51120-254 = "不，不試試看怎麼會知道呢……！"
51120-258 = "我，我明白了！#n既然如此，我就在此證明我的實力！桔梗前輩！"
51120-259 = "我要向前輩……申請練習戰……！#n以此證明我有資格……！"
51120-261 = "不。"
51120-267 = "如果你真的要繼續說那種不切實際的話──"
51120-271 = "那就儘管向我申請「繼承戰」吧。"
51120-276 = "…………什麼？"
51120-277 = "你該不會要說你忘記了吧。"
51120-278 = "百花繚亂的正義是以武力決定的。"
51120-279 = "如果想粉碎我的意見，讓我屈服並得到我的認可──那就打倒我吧。"
51120-280 = "……！！"
51120-281 = "[s]「等等，你們兩個都先冷靜……」"
51120-283 = "啊……那個……老師。"
51120-284 = "我，我是不是……在一個很不妙的時間點來拜訪了！？"
51120-289 = "我明白了……"
51120-294 = "既然如此，我就向桔梗前輩申請繼承戰！"
51120-309 = "我在此宣布，接受挑戰者勘解由小路的繼承戰。"
51120-310 = "此次繼承戰並非以委員長之位，而是以「作戰參謀」一職作為賭注，#n並以「夏萊的[USERNAME]老師」為見證人。雖然原本還需要另一名保證人……"
51120-311 = "有鑒於進行繼承戰的雙方已達成協議，本次就以特例處理。"
51120-312 = "百花繚亂成員勘解由小路紫、桐生桔梗雙方互為彼此的保證人，以此進行繼承戰。"
51120-313 = "有意見嗎？"
51120-320 = "沒有。"
51120-328 = "那麼開始吧。"

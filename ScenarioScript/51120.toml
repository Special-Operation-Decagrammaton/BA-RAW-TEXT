[translation]
51120-1 = "ตอนที่ 12;คิริว คิเคียว และศึกชิงตำแหน่ง 1"
51120-3 = "(วันต่อมา)"
51120-8 = "ท่าน- อาจารย์-!! "
51120-9 = "ฮุฮุ! อรุณสวัสดิ์เจ้าค่ะ!"
51120-10 = "[s] \"สวัสดียูคาริ อรุณสวัสดิ์ วันนี้เป็นยังไงบ้าง?\""
51120-11 = "ที่ถามว่าวันนี้เป็นยังไงบ้าง หมายถึงสุขภาพของข้าเหรอเจ้าคะ? หรือว่าความตั้งใจของข้า?"
51120-12 = "ฮุฮุฮุ..."
51120-13 = "แต่ไม่ว่าจะเรื่องไหน ตอนนี้ข้าก็รู้สึกพร้อมไปหมดเลยเจ้าค่ะ!"
51120-14 = "เอาละ นี่ไม่ใช่เวลามาคุยเรื่องนี้ วันนี้เป็นวันที่สำคัญมากๆ เลยเจ้าค่ะ!"
51120-15 = "วันนี้ข้าต้องไปเจอรุ่นพี่คิเคียว แล้วก็ขอให้เป็นผู้รับรองในศึกชิงตำแหน่งของเฮียกกะเรียวรัน..."
51120-17 = "เจ้าค่ะ! ถ้าทำได้ก็ถือว่ามิชชัน คอม~พลีตทึ~!"
51120-18 = "และตำนานเฮียกกะเรียวรันของยูคาริผู้นี้ก็จะเริ่มขึ้น!"
51120-19 = "[s] \"ว่าแต่ คิเคียวเป็นคนแบบไหนเหรอ?\""
51120-20 = "ฮุฮุฮุ สมกับเป็นท่านอาจารย์เลย! ถามอย่างรอบคอบเพื่อจะเก็บข้อมูลล่วงหน้า! ถามได้ดีเลยเจ้าค่ะ"
51120-21 = "รุ่นพี่คิเคียวน่ะ... พูดง่ายๆ ก็คือ รุ่นพี่เป็นคนที่ฉลาด มีตรรกะ แล้วก็มีเหตุผลมากๆ เจ้าค่ะ!"
51120-22 = "ถ้าถามว่ารุ่นพี่คิเคียวเป็นคนยังไงละก็..."
51120-26 = "ยูคาริ ฉันเคยบอกไว้แล้วไม่ใช่เหรอ"
51120-27 = "จะ... เจ้าค่ะ...! (กลืนน้ำลาย)"
51120-31 = "ว่าอนุญาตให้กินไอศกรีมแค่วันละลูกเท่านั้น ยังไม่ลืมใช่มั้ย?"
51120-32 = "มะ... ไม่ลืมเจ้าค่ะ ยังจำได้ขึ้นใจเลย! แต่ว่า... รุ่นพี่คิเคียว...!"
51120-33 = "ไม่ ฉันจะไม่ฟังข้อแก้ตัว กฎย่อมเป็นกฎ และการกินอาหารที่มีน้ำตาลก่อนนอนเป็นเรื่องที่ไม่ดีต่อ#nสุขภาพเป็นอย่างมาก"
51120-37 = "อีกอย่าง ปกติเธอกินอะไรแล้วแปรงฟันใช่มั้ย?"
51120-38 = "นะ... นะ... นะ... แน่นอนเจ้าค่ะ!"
51120-39 = "ข้าไม่เคยคิดว่า \"วันนี้ขี้เกียจอะ แค่บ้วนปากแล้วกัน แบบนี้ก็ไม่ต่างจากการแปรงฟันหรอก\" ไม่เคยคิดอะไรแบบนั้นเลยเจ้าค่ะ...!"
51120-44 = "ดีละ ต่อไปนี้ฉันจะตรวจเรื่องการแปรงฟันทุกวันเลย"
51120-45 = "เจ้าคะ?!"
51120-47 = "...ก็เป็นคนอย่างนี้แหละเจ้าค่ะ!"
51120-48 = "รุ่นพี่คิเคียวเป็นคนที่ใส่ใจคนอื่น ข้าน่าจะไปขอความช่วยเหลือได้เจ้าค่ะ"
51120-51 = "[ns] \"ยูคาริเชื่อในตัวคิเคียวมากเลยนะ\""
51120-52 = "ฮุฮุ..."
51120-53 = "เจ้าค่ะ! ถ้างั้นก็อย่ามัวเสียเวลาอยู่เลยเจ้าค่ะ"
51120-57 = "เอาละ รีบไปกันเถอะ!"
51120-64 = "รุ่นพี่คิเคียว ยูคาริมาหาเจ้าค่ะ!"
51120-69 = "ขอเข้าไปหน่อยนะเจ้าคะ!"
51120-75 = "ห้องชมรมเฮียกกะเรียวรัน"
51120-81 = "เอะ... เอ๋? คะ... คุณครู?!"
51120-83 = "......?"
51120-84 = "[s] \"ชิซุโกะ...? ทำไมถึงมาอยู่ที่นี่...\""
51120-85 = "ยูคาริ?"
51120-86 = "เจ้าค่ะ! รุ่นพี่คิเคียว! ไม่ได้เจอกันนานเลยนะเจ้าคะ!"
51120-87 = "อ่า... อื้ม ใช่ ไม่เจอกันนานเลย เธอยังมีชีวิตชีวาไม่เปลี่ยนเลยนะ"
51120-88 = "แต่ถึงอย่างนั้นก็เถอะ... เธอเข้ามาวันนี้พอดี... แล้วก็มาในจังหวะนี้พอดีเลย ต้องบอกว่าเป็นโชคชะตากลั่นแกล้ง..."
51120-89 = "หรือว่า... โชคชะตาเข้าข้างกันแน่?"
51120-90 = "......?"
51120-91 = "ยูคาริ ก่อนที่เราจะคุยกัน ฉันมีแขกที่เข้ามาหาอยู่ก่อนแล้วน่ะ"
51120-92 = "แขกที่มาก่อน..."
51120-94 = "[ns] \"จริงสิ ชิซุโกะมาที่นี่เพราะเรื่องอะไรเหรอ?\""
51120-95 = "อ้อ เรื่องนั้นน่ะ"
51120-96 = "ไม่ใช่อะไรอื่นหรอกค่ะ พอดีครั้งนี้เราจะรวมพลังกันแล้วนำ <เทศกาลโคมไฟเฮียกคิยาโค> ในอดีตกลับ#nมาค่ะ!"
51120-97 = "อ๊ะ คุณครูรู้อยู่แล้วเหรอคะ? แล้วก็เป็นกำลังใจให้มากๆ เพราะพวกฉันกำลังทุ่มเทกันงั้นเหรอ?"
51120-98 = "ฮิฮิ~~"
51120-99 = "แค่คุณครูพูดแบบนั้น ชิซุโกะคนนี้ก็~~~"
51120-103 = "ต้องบอกว่าดีใจมากๆ เลยค่ะ แต่จะมามัวแต่ดีใจก็ไม่ได้ใช่ไหมคะ!"
51120-104 = "เข้าเรื่องเถอะค่ะ! พอดีว่าฉันอยากขอความช่วยเหลือจาก <มิโกะจากตระกูลคาเดโนะโคจิ> ในช่วงเวลา#nไคลแมกซ์ของเทศกาลน่ะค่ะ"
51120-105 = "[s] \"มิโกะ... จากตระกูลคาเดโนะโคจิ...?\""
51120-107 = "...อ่า"
51120-109 = "คาเดโนะโคจิ... ตระกูลที่มีประวัติยาวนานที่รับบทบาทสำคัญในพิธีกรรม งานเซ่นไหว้ และงานเทศกาลที่จัดขึ้นในสหพันธ์เฮียกคิยาโคมารุ่นสู่รุ่น"
51120-110 = "ฉันไม่จำเป็นต้องอธิบายความพิเศษหรอก ตระกูลนี้เป็นที่รู้จักอย่างกว้างขวางอยู่แล้ว"
51120-111 = "ถูกต้องเลยค่ะ!"
51120-112 = "ที่จริงตระกูลคาเดโนะโคจิก็ได้รับบทบาทหลักในช่วงไคลแมกซ์ของเทศกาลที่ถูกยกเลิกไป#nเมื่อ 20 ปีก่อนด้วยค่ะ"
51120-113 = "จากบันทึกที่ยังหลงเหลืออยู่ เมื่อ 20 ปีก่อนเทศกาลได้จบลงไปแบบลวกๆ โดยที่ยังไม่มีการจัด#nพิธีกรรมอะไรเลย"
51120-114 = "ฉันอยากจะชดเชยในงานเทศกาลครั้งนี้ ก็เลยติดต่อไปหามิโกะของตระกูลคาเดโนะโคจิเพื่อขอร้องให้#nมาช่วยประกอบพิธี"
51120-115 = "แต่ก็ยังไม่ได้รับคำตอบอะไรจากทางนั้นเลยน่ะสิคะ! พอไปหาที่บ้านก็ไม่อยู่ด้วยค่ะ!"
51120-116 = "[s] \"งั้นเหตุผลที่ชิซุโกะมาที่เฮียกกะเรียวรัน...\""
51120-117 = "ค่ะ เพราะคิดว่าถ้าเอาแต่รออยู่แบบนี้ก็ไม่น่าจะเกิดผลอะไร... ชิซุโกะคนนี้ก็เลย! "
51120-118 = "มาหาคุณหนูที่เป็นมิโกะแห่งตระกูลคาเดโนะโคจิที่อยู่ในเฮียกกะเรียวรันแห่งนี้ค่ะ!"
51120-120 = "ได้ยินแล้วใช่มั้ย? คาเดโนะโคจิ ยูคาริ"
51120-121 = "อ๊ะ งั้นก็แปลว่าคนที่ยืนอยู่ข้างๆ คุณครูคือคุณคาเดโนะโคจิเหรอคะ?!"
51120-122 = "งั้นก็ดีเลยค่ะ! ได้โปรดให้ความร่วมมือกับชมรมเทศกาล...!"
51120-128 = "เอ่อ... ข้า..."
51120-132 = "(กลืนน้ำลาย)"
51120-137 = "ขออภัยด้วยเจ้าค่ะ ท่านหัวหน้าชมรมเทศกาล ข้าไม่อาจช่วยได้เจ้าค่ะ"
51120-138 = "...คะ?!"
51120-139 = "ทะ... ทำไมล่ะคะ?"
51120-143 = "ข้า..."
51120-144 = "อยากอยู่ในฐานะเฮียกกะเรียวรัน"
51120-145 = "ข้าอยากอยู่ที่นี่ ก็เลยมาหารุ่นพี่คิเคียวเจ้าค่ะ"
51120-147 = "...หมายความว่ายังไงน่ะ?"
51120-148 = "รุ่นพี่คิเคียว ข้าคิดจะขอเปิด <ศึกชิงตำแหน่ง> กับรุ่นพี่นางุสะเจ้าค่ะ"
51120-159 = "ข้าทราบเรื่องที่ชมรมเราได้รับ <คำสั่งสลายตัว> แล้วเจ้าค่ะรุ่นพี่คิเคียว "
51120-160 = "......"
51120-161 = "มันเป็นข้อผิดพลาดใช่ไหมเจ้าคะ? ข้าก็คิดว่าทุกคนรู้ซึ้งถึงความผิดนี้แล้วเจ้าค่ะ"
51120-165 = "ยูคาริ"
51120-166 = "ก่อนที่เรื่องความคิดแบบนี้จะเผยแพร่ออกไปมากกว่านี้!"
51120-168 = "ข้า ยูคาริ... จะทำทุกอย่างให้ถูกต้องผ่าน <ศึกชิงตำแหน่ง> เจ้าค่ะ"
51120-170 = "...ก็เลยไปที่ชมรมหยินหยาง แล้วก็มาหาฉันด้วย แบบนี้สินะ"
51120-171 = "เจ้าค่ะ! รุ่นพี่คิเคียว ได้โปรดช่วยเป็นผู้รับรองใน <ศึกชิงตำแหน่ง> ให้หน่อยได้ไหมเจ้าคะ?"
51120-172 = "แล้วข้าจะทำให้เฮียกกะเรียวรันกลับมาเป็นเหมือนเดิมให้ได้เลย!"
51120-178 = "เธอไม่ได้มาห้องชมรมตั้งนาน แต่เหตุผลที่จู่ๆ เธอก็โผล่มาวันนี้..."
51120-179 = "ยูคาริ หลังจากมี <คำสั่งสลายตัว> ฉันก็คิดไว้แล้วว่าคนอย่างเธอต้องออกมาเคลื่อนไหว..."
51120-180 = "แต่การเคลื่อนไหวด้วย <ศึกชิงตำแหน่ง> ที่เธอคิดอยู่ตอนนี้... ต้องบอกว่าสมกับเป็นเธอเลยนะ ขนาดฉันยังคิดไม่ถึงเลยด้วยซ้ำ"
51120-181 = "เอาเป็นว่า... ฉันรู้เหตุผลนั้นแล้ว"
51120-182 = "...!"
51120-183 = "ถ้าอย่างนั้นก็แปลว่า รุ่นพี่จะ...!"
51120-185 = "อืม ถ้าเป็นเรื่องแบบนั้นละก็..."
51120-186 = "ฉันขอปฏิเสธอย่างเด็ดขาดเลย"
51120-191 = "เอ๊ะ เอ๋...? ทำไมถึงเป็นแบบนั้นล่ะคะ...?!"
51120-192 = "[s] \"...หา?\""
51120-194 = "ทะ... ทะ... ทำไมล่ะเจ้าคะ?!  รุ่นพี่คิเคียว?!"
51120-195 = "รุ่นพี่... ยังคงปกป้องเฮียกกะเรียวรันอยู่ ข้าเลยคิดว่ารุ่นพี่จะ...!"
51120-196 = "จะเห็นด้วยกับเธองั้นเหรอ?"
51120-197 = "ถ้างั้นฉันจะบอกอะไรให้"
51120-202 = "คิดไปเองซะไกลเลยนะ ช่างน่าอวดดีเสียจริง คุณหนูคาเดโนะโคจิ"
51120-203 = "...!!"
51120-205 = "ฉันเองก็รู้ข่าวของรุ่นพี่นางุสะแล้ว เห็นว่าตอนนี้คนคนนั้นไปปรากฏตัวอยู่ที่ไหนสักแห่ง แล้วก็ทำอะไรบางอย่างและติดต่อกับชมรมหยินหยางด้วย"
51120-206 = "แต่บทสรุปก็มีเพียงอย่างเดียว"
51120-207 = "คนคนนั้นน่ะ ในวันข้างหน้าก็คงไม่กลับมาเฮียกกะเรียวรันหรอก"
51120-208 = "ไม่สิ... ต้องบอกว่าเคยกลับมาแล้วครั้งหนึ่ง"
51120-209 = "รุ่นพี่เคยมาเฮียกกะเรียวรันแห่งนี้ด้วยตัวเองเพื่อคืน <สิทธิ์> ของหัวหน้าที่ได้รับมาจากหัวหน้าอายาเมะ"
51120-223 = "[ns] (นี่สินะ สิ่งที่จะเอามาคืนที่เรนเกะพูดถึง)"
51120-224 = "รุ่นพี่นางุสะ... จะคืน... <สิทธิ์> เหรอเจ้าคะ... มะ... ไม่มีทาง..."
51120-225 = "รุ่นพี่..."
51120-226 = "...ที่เรนเกะไม่ได้บอกเรื่องนี้กับเธอ ก็คงเป็นเพราะเห็นแก่เธอน่ะ"
51120-227 = "แต่ฉันไม่ใช่คนเอาใจใส่ขนาดนั้นหรอก ความเป็นจริงที่ชัดเจนคือสิ่งที่ต้องบอก"
51120-228 = "คนที่ทอดทิ้งพวกเราไปน่ะ ฉันไม่คิดว่าเป็นเฮียกกะเรียวรันอีกต่อไปแล้ว"
51120-229 = "แต่ว่า...!"
51120-230 = "แต่ถึงอย่างนั้นก็เถอะ...!"
51120-231 = "ก็ได้ สมมติว่ามีการจัด <ศึกชิงตำแหน่ง> ขึ้นจริงๆ อย่างที่เธอว่า "
51120-232 = "ฉันก็จะชื่นชมว่านั่นเป็นแผนการที่ยอดเยี่ยม ฉันนับถือหัวใจเลยที่เธอจะเอาชนะรุ่นพี่นางุสะ แล้วชิงตำแหน่งหัวหน้ามา"
51120-233 = "แต่เรื่องนั้นก็มีช่องโหว่ที่ทั้งฉัน เธอ และคนอื่นเองก็รู้"
51120-234 = "...!"
51120-238 = "คุณหนูคาเดโนะโคจิ ยูคาริ"
51120-239 = "เธอไม่มีทางเอาชนะรุ่นพี่นางุสะได้อยู่แล้วไม่ใช่เหรอ?"
51120-245 = "คนคนนั้นน่ะแข็งแกร่ง"
51120-246 = "เก่งกว่าเธอหลายเท่า"
51120-248 = "มะ... ไม่เจ้าค่ะ ไม่นะ ไม่ใช่นะเจ้าคะ!"
51120-249 = "ข้า ยูคาริผู้นี้! สามารถโค่นรุ่นพี่นางุสะได้เจ้าค่ะ!"
51120-250 = "เพราะข้า...!"
51120-251 = "เป็นอิล~ลีท... แห่งเฮียกกะเรียวรัน!"
51120-253 = "แต่เธอก็ยังไม่เคยเอาชนะฉันได้เลยนะ? แล้วกล้าดียังไง?"
51120-254 = "ระ... เรื่องนั้นไม่ลองไม่รู้...!"
51120-258 = "งะ... งั้นก็ดีเจ้าค่ะ! ข้าจะพิสูจน์ความสามารถของข้าให้เห็นที่นี่เลย! รุ่นพี่คิเคียว!"
51120-259 = "ข้าขอ... เปิดศึกฝึกซ้อมกับรุ่นพี่...! เพื่อพิสูจน์ว่าข้ามีสิทธิ์...!"
51120-261 = "พอเถอะ"
51120-267 = "ถ้าจะพูดเรื่องไร้สาระแบบนั้นต่อไปเรื่อยๆ ละก็"

[translation]
21180-1 = "ตอนที่ 18;G.Bible"
21180-2 = "ชมรมพัฒนาเกมมิลเลเนียม"
21180-4 = "เปิด... G.Bible!"
21180-6 = "[56cd7b]ยินดีต้อนรับเข้าสู่โลกของ G.Bible"
21180-8 = "มะ... มีข้อความขึ้นมาแล้ว!"
21180-9 = "[56cd7b]โลกนี้มีคำตอบมากมาย#n[56cd7b]ต่อคำถามที่ว่า 'เกมที่ดีที่สุดคืออะไร?'"
21180-11 = "[56cd7b]ทั้งคุณค่าทางศิลปะ ความนิยม รายได้ การเล่าเรื่องที่ยอดเยี่ยมหรือกราฟิกที่เห็นแล้วตาเป็นประกาย"
21180-13 = "[56cd7b]ต่างก็เป็น 'เงื่อนไข' ของเกมที่ดีที่สุดทั้งนั้น#n[56cd7b]แต่สิ่งเหล่านี้เป็นเพียงแค่ส่วนรองของ 'ความจริง' เท่านั้น"
21180-16 = "[56cd7b]เคล็ดลับในการสร้างสุดยอดแห่งเกมมีเพียงอย่างเดียว"
21180-18 = "[56cd7b]และ G.Bible ก็คือหนังสือที่บรรจุความจริงนั้น"
21180-20 = "นะ.. ในที่สุด!"
21180-21 = "ทำไมถึงน่าตื่นเต้นแบบนี้นะ..."
21180-22 = "[56cd7b]เคล็ดลับหนึ่งเดียวในการสร้างสุดยอดแห่งเกม#n[56cd7b]จะถูกเปิดเผย ณ บัดนี้"
21180-24 = "โอ้ววว!"
21180-25 = "[56cd7b]......"
21180-28 = "[56cd7b]......"
21180-30 = "[56cd7b]จง"
21180-32 = "[56cd7b]..."
21180-34 = "[56cd7b]..."
21180-36 = "[56cd7b]รัก"
21180-38 = "[56cd7b]..."
21180-40 = "[56cd7b]..."
21180-42 = "[56cd7b]เกม"
21180-44 = "นี่มัน... แค่เปิดตัวใช่ไหม...? น่าจะใช่นะ"
21180-45 = "ยะ... อย่างนั้นเหรอ?"
21180-46 = "[56cd7b]<จงรักเกม>"
21180-48 = "อย่าบอกนะว่า... จบ... แค่นี้?"
21180-49 = "ตะ... ต้องมีอะไรผิดพลาดแน่ๆ"
21180-50 = "ดะ.. เดี๋ยวก่อนสิ!"
21180-51 = "ไหนดูซิ มีปุ่มตั้งค่าไหม..."
21180-52 = "[56cd7b]<จงรักเกม>"
21180-56 = "[56cd7b](หากคุณกดปุ่มนี้#n[56cd7b]แสดงว่าคุณอาจจะกำลังสงสัยอยู่"
21180-58 = "[56cd7b]ว่าเกิดข้อผิดพลาดอะไร ไฟล์เสียหายตรงไหนหรือเปล่า)"
21180-60 = "โอ้! ว่าแล้วว่าต้องไม่จบง่ายๆ แบบนั้น!"
21180-61 = "[56cd7b]แต่ว่า[wa:500]มันจบเท่านี้จริงๆ"
21180-63 = "จะ.. จริงเหรอ?!"
21180-64 = "[56cd7b]น่าเสียดาย แต่นี่คือคำตอบ"
21180-66 = "[56cd7b]<จงรักเกม!>"
21180-69 = "จะ... จะเป็นแบบนี้ไปได้ยังไง! ต้องมีอะไรผิดพลาดแน่ๆ...!"
21180-70 = "แต่ไม่เห็นว่าไฟล์จะเสียหายหรือมีการแก้ไขข้อมูลเลย... ข้อมูลสำเนาที่พบล่าสุด ขนาดไฟล์#nแล้วก็โครงสร้างข้อมูลยังเหมือนเดิม"
21180-71 = "ถะ... ถ้างั้นก็...?"
21180-72 = "จบแค่นี้... จริงๆ เหรอ?!"
21180-73 = "เฮ้อ......"
21180-74 = "พี่โมโมอิ... พวกเรา... โดนหลอกแล้วล่ะ..."
21180-76 = "จบสิ้นกันแล้ววววว!!!"
21180-78 = "(ปัจจุบัน)"
21180-79 = "คือว่า... โมโมอิ... ไม่ไปทำเควสประจำวันเหรอคะ?"
21180-80 = "โมโมอิเคยบอกไม่ใช่เหรอว่า 'เควสประจำวันสำคัญยิ่งกว่าชีวิต'..."
21180-81 = "เลิกเล่นเถอะอาริสึ... ตอนนี้ HP ของฉันเหลือศูนย์แล้วล่ะ..."
21180-82 = "อืม..."
21180-83 = "มิโดริ....."
21180-84 = "ขอโทษนะอาริสึจัง... โลกแห่งความเป็นจริงก็เป็นแบบนี้แหละ... นี่คงเป็นจุดจบแล้วล่ะ..."
21180-85 = "อ่า......"
21180-86 = "แล้วยูสึล่ะ... ยูสึไปไหนเหรอคะ?"
21180-87 = "น่าจะเข้าไปเก็บตัวอยู่ในตู้อีกครั้งล่ะมั้ง ลองดูสิ เห็นไหมว่าบางครั้งตู้จะขยับได้?"
21180-89 = "ตอนนี้ทุกคนดูเหมือน..."
21180-90 = "เหมือนกับว่าสติได้หลุดลอยออกไปจากเซิร์ฟเวอร์แล้วเลยล่ะค่ะ"
21180-91 = "อึ่ก...."
21180-92 = "แล้วจะให้ทำยังไงล่ะ! นั่นคือวิธีสุดท้ายและวิธีเดียวที่เราคาดหวังนะ เคล็ดลับที่ว่าคือประโยคที่ใครๆ#nก็รู้ประโยคเดียวอย่างนั้นเหรอ? จะหลอกอะไรก็หลอกให้มันดีกว่านี้ไม่ได้รึไง!"
21180-93 = "รู้อยู่แล้วแหละน่าว่าไม่มีวิธีง่ายๆ หรือประโยคง่ายๆ อะไรที่จะเปลี่ยนทุกอย่างได้! ฉันเองก็รู้!#nแต่นี่มันไม่เกินไปหน่อยเหรอ?! ฮืออออ!"
21180-95 = "เฮ้อ..."
21180-96 = "ขอโทษด้วยนะอาริสึจัง... ถ้าไม่มี G.Bible พวกเราก็สร้างเกมดีๆ กันไม่ได้หรอก...#nขอโทษที่พวกเราไม่เก่งนะ"
21180-97 = "......"
21180-98 = "ไม่ค่ะ"
21180-99 = "ฉันไม่เห็นด้วยค่ะ"
21180-100 = "ทุกครั้งที่อาริสึเล่นเทลส์ ซาก้า โครนิเคิล"
21180-101 = "อาริสึก็คิดว่ามันสนุกนะคะ"
21180-102 = "หืม?"
21180-103 = "เพราะว่ารู้สึกได้ยังไงล่ะคะ"
21180-104 = "ว่าโมโมอิ มิโดริ และยูสึ..."
21180-105 = "รักเกมนี้มากแค่ไหน"
21180-106 = "ทุกครั้งที่ได้ออกไปท่องโลกในเกมนี้..."
21180-107 = "หัวใจมันก็เต้นแรง..."
21180-108 = "เกมนี้ทำให้อาริสึได้รู้จักการออกไปท่องโลกใบใหม่พร้อมกับพวกพ้อง..."
21180-109 = "และทำให้รู้ว่า ความรู้สึกของการได้ฝันมันเป็นอย่างไรค่ะ"
21180-110 = "พอยิ่งใกล้ถึงตอนที่รอคอยมากเท่าไหร่ ก็ยิ่งรู้สึกเจ็บปวดมากขึ้นเท่านั้น..."
21180-111 = "เพราะไม่อยากตื่นจากความฝันนี้ยังไงล่ะคะ..."
21180-112 = "นี่คือสิ่งที่อาริสึคิดค่ะ"
21180-113 = "อาริสึ....."
21180-114 = "......"
21180-115 = "อ้าวยูสึจัง? ออกมาตั้งแต่เมื่อไหร่น่ะ?"
21180-116 = "ก่อนหน้านี้ไม่นานหรอก... ตั้งแต่คุยเรื่องเทลส์ ซาก้า โครนิเคิลน่ะ..."
21180-117 = "มันก็ตั้งแต่เริ่มเลยนี่นา!"
21180-118 = "มาทำกันเถอะ..."
21180-119 = "หืม?"
21180-120 = "ความฝันของฉันคือการที่มีคนมาบอกว่าเกมที่ฉันทำมันสนุกน่ะ"
21180-121 = "แต่เกมเทลส์ ซาก้า โครนิเคิล โปรโตไทป์ที่ฉันทำขึ้นครั้งแรก... ก็ต้องจบลงด้วยการโดนด่า#nและหัวเราะเยาะด้วยคำไม่กี่คำ"
21180-122 = "และตอนที่ฉันเจ็บใจจนมาแอบซ่อนอยู่ในห้องชมรม..."
21180-124 = "ก็ได้พวกเธอที่มาหาฉัน"
21180-126 = "(6 เดือนก่อน)"
21180-129 = "[56cd7b]ว้าว นี่เกมงั้นเหรอ?"
21180-131 = "[56cd7b]สงสัยชะมัดว่าคนที่ทำเกมนี้ขึ้นมามีอะไรในหัวบ้าง"
21180-133 = "[56cd7b]หัวไม่น่าจะมีสมองนะ ไม่น่าจะมีอะไรเลยด้วย"
21180-135 = "[56cd7b]คนที่ไม่รู้อะไรเกี่ยวกับเรื่องเกมเลยจะมาทำเกมทำไมกัน"
21180-137 = "[56cd7b]ควรจะรู้จักเกม และรู้จักตัวเองซะบ้างสิ"
21180-139 = "[56cd7b]แบบนี้ไม่เรียกว่าทำเกมหรอกนะ เรียกว่าทำขยะที่แสร้งว่าเป็นเกมต่างหาก"
21180-141 = "อึ่ก..."
21180-142 = "หยุดพูดเถอะ... ฉันผิดเองแหละ..."
21180-143 = "ฉันไม่ไหวแล้ว... ช่วย... ยกโทษให้ด้วยเถอะ...!"
21180-145 = "(ตู้มมมม!)"
21180-147 = "เฮือก!"
21180-148 = "คะ... ใครน่ะ?"
21180-149 = "นี่! ที่นี่คือชมรมพัฒนาเกมของมิลเลเนียมที่สร้างเกมเทลส์ ซาก้า โครนิเคิล โปรโตไทป์หรือเปล่าคะ?"
21180-150 = "มะ... มาด่ากันอีกแล้วเหรอ?"
21180-151 = "ขะ... ขอโทษค่ะ ขอโทษด้วยค่ะ ฉันจะไม่ทำเกมอีกแล้วค่ะ เพราะฉะนั้น ได้โปรด..."
21180-152 = "หา?!"
21180-153 = "พูดอะไรแบบนั้นล่ะคะ! อุตส่าห์สร้างเกมสนุกๆ แบบนี้ออกมาได้ทั้งที!#nจะสร้างแต่โปรโตไทป์แล้ววางมือแบบนี้ไม่ได้นะคะ!"
21180-154 = "ฉันสงสัยเนื้อเรื่องต่อจากนี้นะ! มาทำให้ตื่นเต้นแบบนี้ได้ไง! ผู้พัฒนาแบบคุณน่าผิดหวังที่สุด!"
21180-155 = ".....?"
21180-156 = "รู้ไหมคะว่าฉันเล่นเทลส์ ซาก้า โครนิเคิลแล้วสนุกแค่ไหน!"
21180-157 = "เล่นหามรุ่งหามค่ำจนไม่ได้นอนเลยด้วย"
21180-158 = "เธอเองก็มาเล่นแล้วหัวเราะคิกคักอยู่ข้างๆ กันนี่! ปกติเห็นสนใจเรื่องเกมซะที่ไหน!"
21180-159 = "เอ่อ.. อืม... ก็ตัวละครมันน่ารักนี่"
21180-160 = "เอาเถอะน่า! อ๊ะ! ขอโทษด้วยนะคะ!"
21180-161 = "(แกร็ก)"
21180-163 = ".....?!"
21180-164 = "คุณคือ คุณ UZ เหรอ?!"
21180-165 = "อ่อ.. ชะ... ใช่ค่ะ... ฉันเอง"
21180-166 = "เราเป็นแฟนคลับเลยค่ะ!"
21180-167 = "ทั้งฉันและโมโมอิอยากทำเกมสนุกๆ เหมือนอย่างที่คุณ UZ ทำค่ะ!"
21180-168 = "......!!"
21180-174 = "......"
21180-177 = "ใช่แล้ว พวกเธอมาหาฉันแบบนั้น..."
21180-178 = "แล้วเราก็สร้างเกมเทลส์ ซาก้า โครนิเคิลด้วยกัน... ถึงแม้ว่าจะได้รางวัลที่ 1 เกมยอดแย่ก็เถอะ..."
21180-179 = "(เจ็บจึ้ก)"
21180-180 = "......"
21180-181 = "แล้วอาริสึก็เข้ามา..."
21180-182 = "และบอกว่าเกมของเราสนุก ฝันของฉันเป็นจริงตั้งแต่ที่ได้ยินคำนั้นเลย"
21180-183 = "ความฝันของการได้สร้างเกมร่วมกับเพื่อนคนสำคัญที่มีความชอบเหมือนๆ กัน...#nและการได้ยินว่าเกมนั้นสนุกยังไงล่ะ"
21180-184 = "......"
21180-185 = "และฉันก็ไม่อยากให้ความฝันนี้... จบลงเท่านี้"
21180-186 = "ยูสึจัง..."
21180-187 = "อืมมมม...!"
21180-188 = "มิโดริ เรายังมีเวลาเหลือเท่าไหร่เหรอกว่าจะถึงงานมิลเลเนียมไพรซ์น่ะ?"
21180-190 = "พี่โมโมอิ!"
21180-191 = "6 วัน 4 ชั่วโมง 38 นาทีค่ะ"
21180-192 = "...มันน่าจะพออยู่นะ"
21180-193 = "ชมรมพัฒนาเกม!"
21180-194 = "เริ่มพัฒนาเทลส์ ซาก้า โครนิเคิล 2 กันเลย!!"
21180-196 = "โอ้ว!"
21180-198 = "ตอนต่อไป;ดับเบิ้ลโอ"

[translation]
21180-1 = "第18話;G.Bible"
21180-2 = "千年．遊戲開發部"
21180-4 = "G.Bible……啟動！"
21180-6 = "[56cd7b]歡迎來到G.Bible的世界。"
21180-8 = "開，開始了！"
21180-9 = "[56cd7b]最棒的遊戲是什麼……對於這個問題，#n[56cd7b]全世界都在摸索著各種各樣的答案。"
21180-11 = "[56cd7b]作品的內容、人氣、銷量、優秀的劇情和爽快感，以及動人心弦的演出等等。"
21180-13 = "[56cd7b]雖然這些常常被認為是最棒遊戲的「條件」，#n[56cd7b]但其實這些只不過是「真理」的枝與葉而已。"
21180-16 = "[56cd7b]製作出最棒遊戲的祕訣就只有一個。"
21180-18 = "[56cd7b]而在這個G.Bible裡，就藏著這個真理。"
21180-20 = "終，終於！"
21180-21 = "感覺好像很厲害……"
21180-22 = "[56cd7b]製作出最棒遊戲的唯一真理、祕密的方法……#n[56cd7b]現在就告訴你吧。"
21180-24 = "要來了……！"
21180-25 = "[56cd7b]……"
21180-28 = "[56cd7b]……"
21180-30 = "[56cd7b]請你，"
21180-32 = "[56cd7b]熱"
21180-34 = "[56cd7b]愛"
21180-36 = "[56cd7b]遊"
21180-38 = "[56cd7b]戲"
21180-40 = "[56cd7b]吧"
21180-42 = "[56cd7b]！"
21180-44 = "哦哦……好像是遊戲的開場動畫一樣！"
21180-45 = "是，是嗎？"
21180-46 = "[56cd7b]請熱愛遊戲吧！"
21180-48 = "……難道說，這樣就說完了……不是，這個意思吧？"
21180-49 = "是，是不是遇到什麼Bug了啊？"
21180-50 = "等一下！"
21180-51 = "呃，要在哪調整設定……"
21180-52 = "[56cd7b]請熱愛遊戲吧！"
21180-56 = "[56cd7b]之所以會按下這個按鈕，#n[56cd7b]是因為你正在懷疑……"
21180-58 = "[56cd7b]是不是文件損壞，或是出了什麼問題……發生了什麼錯誤對吧。"
21180-60 = "啊，果然是這樣！不可能這樣就結束了嘛！"
21180-61 = "[56cd7b]但是，[wa:500]並沒有發生錯誤。"
21180-63 = "騙人的吧！？"
21180-64 = "[56cd7b]很遺憾，這就是結論。"
21180-66 = "[56cd7b]請熱愛遊戲吧！！"
21180-69 = "怎，怎麼會這樣！肯定是哪裡出錯了……！"
21180-70 = "沒有發現文件出現損壞或修正……#n最後的傳送情報、文件大小和數據的結構都沒有問題。"
21180-71 = "也，也就是說，真的……"
21180-72 = "就，就只有這樣！？"
21180-73 = "……完，"
21180-74 = "姐姐……我們是在做惡夢吧……"
21180-76 = "完蛋啦啊啊啊啊啊啊啊！！！"
21180-78 = "（於是現在……）"
21180-79 = "那個，桃井……不來打每日任務嗎？"
21180-80 = "明明平常總是說「沒有比每日任務更重要的事」的……"
21180-81 = "愛麗絲……我的HP已經歸零了……"
21180-82 = "那個……"
21180-83 = "綠……？"
21180-84 = "抱歉，愛麗絲醬……我很清楚，現實本來就是這樣的……#n沒錯，這就是TrueEnd……和HappyEnd不同的結局……"
21180-85 = "……"
21180-86 = "柚，柚子……柚子去哪裡了？"
21180-87 = "我想大概又把自己關在櫃子裡了。#n你仔細看，櫃子偶爾會發抖對吧？"
21180-89 = "大家現在的樣子……"
21180-90 = "簡直就像是，精神都登出了一樣。"
21180-91 = "嗚嗚……"
21180-92 = "這也沒辦法嘛，這可是我們最後的手段了！#n沒想到竟然只有一段誰都知道的文章而已！釣魚也不是這樣的吧！"
21180-93 = "我知道的！這個世界就是這樣，沒有一看就能變厲害的那種便利的方法！#n可是期待一下也沒關係的嘛！嗚啊啊啊啊啊！"
21180-95 = "唉……"
21180-96 = "抱歉了愛麗絲醬……我們……不靠G.Bible……就做不出好的遊戲……"
21180-97 = "……"
21180-98 = "不對。"
21180-99 = "給予否定。"
21180-100 = "愛麗絲每次玩《故事．傳說．編年史》的時候都這麼覺得。"
21180-101 = "這個遊戲，真是有趣啊。"
21180-102 = "咦？"
21180-103 = "能夠感覺的到。"
21180-104 = "桃井、綠、柚子……"
21180-105 = "是多麼的愛著這個遊戲。"
21180-106 = "在那樣，注入了滿滿感情的世界中旅行……"
21180-107 = "……心裡就非常感動。"
21180-108 = "和夥伴們一起在新的世界中旅行，這種感覺……"
21180-109 = "所謂的做夢，是怎樣的一件事……是你們告訴了愛麗絲。"
21180-110 = "所以，在離期待已久的結局越來越接近時，雖然是那麼的辛苦，#n我卻總是這麼覺得……"
21180-111 = "要是，這場夢永遠都不會醒來就好了……"
21180-112 = "愛麗絲是這麼想的。"
21180-113 = "愛麗絲……"
21180-114 = "……"
21180-115 = "嗚哇，柚子醬！？你什麼時候在那裡的！？"
21180-116 = "從說到《故事．傳說．編年史》的時候開始……"
21180-117 = "一開始就在！？"
21180-118 = "……來做吧。"
21180-119 = "咦？"
21180-120 = "我的夢想……就是讓大家都說我做的遊戲很有趣。"
21180-121 = "但是，我第一次做出來的《故事．傳說．編年史》的初版……#n在四位數以上的負評和嘲笑中結束了……"
21180-122 = "就在我覺得難過而躲在遊戲開發部的時候……"
21180-124 = "有兩個人造訪了這裡。"
21180-126 = "（6個月前……）"
21180-129 = "[56cd7b]這都能算是遊戲？"
21180-131 = "[56cd7b]我反而比較好奇做出這東西的人腦袋裡都裝什麼……"
21180-133 = "[56cd7b]我看可能沒有腦漿……雖然想這麼說，不過真的有還比較奇怪吧。"
21180-135 = "[56cd7b]是不懂遊戲的人做的嗎？"
21180-137 = "[56cd7b]還是有點自知之明比較好。"
21180-139 = "[56cd7b]這不是遊戲，只是像遊戲的垃圾。"
21180-141 = "嗚嗚……"
21180-142 = "別再說了……對不起，對不起……"
21180-143 = "拜託你們了……放過我……！"
21180-145 = "（咚咚咚！）"
21180-147 = "噫！"
21180-148 = "是，是誰……？"
21180-149 = "那個，這裡就是做出《故事．傳說．編年史》初版的千年遊戲開發部嗎？"
21180-150 = "什，什麼……？#n這次是直接跑過來……？"
21180-151 = "對，對不起，對不起……！我永遠不會再做遊戲了，所以原諒我吧……！"
21180-152 = "咦咦！？"
21180-153 = "你在說什麼啊，明明這麼有趣的說！竟然只做出初版就放棄了！"
21180-154 = "我可是超級在意後續的故事的唷！？都讓人這麼興奮了，不能這樣吧！"
21180-155 = "……咦？"
21180-156 = "《故事．傳說．編年史》超級有趣的！"
21180-157 = "姐姐可是一路玩到早上呢。"
21180-158 = "綠你還不是一邊傻笑一邊玩！明明對遊戲沒什麼興趣的！"
21180-159 = "呃，嗯，嗯……確實，雖然是點陣風格但是角色那麼可愛……"
21180-160 = "總之，那個！打擾了！"
21180-161 = "（喀嚓！）"
21180-163 = "……！？"
21180-164 = "你就是UZ大大嗎！？"
21180-165 = "呃……是，是我……"
21180-166 = "我是你的粉絲！！"
21180-167 = "我和綠都是！！我們也想和UZ大大一樣，做出有趣的遊戲！"
21180-168 = "……！！"
21180-174 = "……"
21180-177 = "……於是，他們兩個就來了。"
21180-178 = "我們一起把《故事．傳說．編年史》給完成了……#n雖然是今年的垃圾遊戲排行第一就是了……"
21180-179 = "嗚……"
21180-180 = "……"
21180-181 = "之後，愛麗絲醬也來了這裡……"
21180-182 = "跟我說我的遊戲很有趣。這樣一來，我的夢想就實現了。"
21180-183 = "和心靈相通的重要夥伴們一起做遊戲，並且讓人覺得有趣……#n這曾經只存在夢裡的，我的夢想。"
21180-184 = "……"
21180-185 = "再要求更多的話，或許有點貪心。#n但是如果可以的話，我希望這場夢……可以繼續下去，永遠不要結束。"
21180-186 = "柚子醬……"
21180-187 = "……嗯，好！"
21180-188 = "現在到千年大賞為止，還剩多少時間？"
21180-190 = "姐姐……！"
21180-191 = "還有6天4小時38分。"
21180-192 = "……這樣就夠了。"
21180-193 = "來吧，遊戲開發部的大家！"
21180-194 = "開始《故事．傳說．編年史２》的製作吧！！"
21180-196 = "嗯！"
21180-198 = "下一話;Double O"

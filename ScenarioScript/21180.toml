[translation]
21180-1 = "第18話;G.Bible"
21180-2 = "ミレニアム・ゲーム開発部"
21180-4 = "G.Bible……起動！"
21180-6 = "[56cd7b]G.Bibleの世界へようこそ。"
21180-8 = "は、始まった！"
21180-9 = "[56cd7b]最高のゲームとは何か……この質問に対して、#n[56cd7b]世界中で様々な答えが模索され続けてきました。"
21180-11 = "[56cd7b]作品性、人気、売上、素晴らしいストーリーや爽快感、鳥肌の立つ演出など。"
21180-13 = "[56cd7b]そういったものが最高のゲームの「条件」として挙げられることは多いですが、#n[56cd7b]それらは全て、あくまで「真理」の枝葉に過ぎません。"
21180-16 = "[56cd7b]最高のゲームを作る秘訣、それはたった一つです。"
21180-18 = "[56cd7b]そしてこのG.Bibleには、その真理が秘められています。"
21180-20 = "い、いよいよ！"
21180-21 = "何だかすごそう……。"
21180-22 = "[56cd7b]最高のゲームを作るたった一つの真理、秘密の方法……#n[56cd7b]それを今こそお教えしましょう。"
21180-24 = "来ます……っ！"
21180-25 = "[56cd7b]……"
21180-28 = "[56cd7b]……"
21180-30 = "[56cd7b]ゲーム"
21180-32 = "[56cd7b]を"
21180-34 = "[56cd7b]愛"
21180-36 = "[56cd7b]し"
21180-38 = "[56cd7b]な"
21180-40 = "[56cd7b]さ"
21180-42 = "[56cd7b]い"
21180-44 = "おお……オープニング、みたいな感じかな。それっぽい！"
21180-45 = "そ、そう？"
21180-46 = "[56cd7b]ゲームを愛しなさい"
21180-48 = "……まさか、これで終わり……じゃ、ないよね？"
21180-49 = "な、何かバグってるんじゃない？"
21180-50 = "ちょっと待って！"
21180-51 = "ええっと、設定変更はどこから……。"
21180-52 = "[56cd7b]ゲームを愛しなさい"
21180-56 = "[56cd7b]あなたがこのボタンを押したということは、#n[56cd7b]ファイルが壊れた、もしくは何か問題があったのでは、"
21180-58 = "[56cd7b]何らかのエラーが生じたのでは……と疑っている状況なのでしょう。"
21180-60 = "あっ、やっぱり！このまま終わるはずないよね！"
21180-61 = "[56cd7b]しかし、[wa:500]エラーではありません。"
21180-63 = "嘘ぉ！？"
21180-64 = "[56cd7b]残念ですが、これが結論です。"
21180-66 = "[56cd7b]ゲームを愛しなさい！"
21180-69 = "そ、そんなはずはない！きっと何かエラーが……！"
21180-70 = "ファイルの損傷とか修正も見当たらない……最後の転送情報、ファイルサイズ、それにデータ構成も問題無し。"
21180-71 = "そ、それじゃ、本当に……。"
21180-72 = "こ、これで終わり！？"
21180-73 = "……お、"
21180-74 = "お姉ちゃん……私たち、何か悪い夢でも見て……"
21180-76 = "終わりだああぁぁぁああ！！！"
21180-78 = "（そして今……）"
21180-79 = "あの、モモイ……デイリークエストしないのですか？"
21180-80 = "いつも、「デイリークエストより大事なものなんてない」と言っていたのに……。"
21180-81 = "アリス……私のHPはもうゼロだよ……。"
21180-82 = "えっと……。"
21180-83 = "ミドリ……？"
21180-84 = "ごめんね、アリスちゃん……知ってたけど、現実って元々こういうものなの……そう、つまりこれがトゥルーエンド……ハッピーエンドとはまた別の到達点……。"
21180-85 = "……。"
21180-86 = "ゆ、ユズは……ユズはどこに？"
21180-87 = "多分、またロッカーの中に引きこもってるんだと思う。よく見て、ロッカーがたまにプルプルしてるでしょ？"
21180-89 = "今のみんなの姿は……"
21180-90 = "まるで、正気がログアウトしたみたいです。"
21180-91 = "うぅっ……。"
21180-92 = "仕方ないじゃん、最後の手段だったのに！それが、あんな誰でも知ってる文章が一つ入ってるだけだなんて！釣りにもほどがある！"
21180-93 = "知ってた！世界にはそんな、それ一つで全部が変わって上手く行くような、便利な方法なんか無いって！でも期待ぐらいしたっていいじゃん！うああぁぁぁんっ！"
21180-95 = "はぁ……。"
21180-96 = "ごめんね、アリスちゃん……私たちは……G.Bible無しじゃ、良いゲームは作れない……。"
21180-97 = "……。"
21180-98 = "いいえ。"
21180-99 = "否定します。"
21180-100 = "アリスは『テイルズ・サガ・クロニクル』をやるたびに思います。"
21180-101 = "あのゲームは、面白いです。"
21180-102 = "え？"
21180-103 = "感じられるのです。"
21180-104 = "モモイが、ミドリが、ユズが……。"
21180-105 = "このゲームを、どれだけ愛しているのかを。"
21180-106 = "そんな、たくさんの想いが込められたあの世界で旅をすると……"
21180-107 = "……胸が、高鳴ります。"
21180-108 = "仲間と一緒に新しい世界を旅する、あの感覚は……。"
21180-109 = "夢を見るというのが、どういうことなのか……その感覚を、アリスに教えてくれました。"
21180-110 = "だから、待望のエンディングに近づくほどに、あんなに苦しんだのに、思ってしまうのです……。"
21180-111 = "この夢が、覚めなければいいのに……と。"
21180-112 = "アリスは、そう思うのです。"
21180-113 = "アリス……。"
21180-114 = "……。"
21180-115 = "ってうわっ、ユズちゃん！？いつからそこに！？"
21180-116 = "『テイルズ・サガ・クロニクル』の話が始まった時から……。"
21180-117 = "最初からいたの！？"
21180-118 = "……作ろう。"
21180-119 = "え？"
21180-120 = "わたしの夢は……わたしが作ったゲームを、みんなに面白いって言ってもらうこと。"
21180-121 = "でも、わたしが初めて作った『テイルズ・サガ・クロニクル』のプロトタイプは……四桁以上の低評価コメントと、冷やかしだけで終わっちゃって……。"
21180-122 = "それが辛くて、ゲーム開発部に引きこもってた時……。"
21180-124 = "二人が、訪ねてきてくれた。"
21180-126 = "（6か月前……）"
21180-129 = "[56cd7b]これがゲーム？"
21180-131 = "[56cd7b]これを作った人の頭の中、逆に気になる……。"
21180-133 = "[56cd7b]それはさすがに脳みそ……って言おうと思ったけど、本当に入ってるのか怪しいね。"
21180-135 = "[56cd7b]ゲームのことをよく知らない人が作ってない？"
21180-137 = "[56cd7b]身の程を知った方が良い。"
21180-139 = "[56cd7b]これはゲームなんかじゃない、ゲームによく似たゴミだよ。"
21180-141 = "うぅ……。"
21180-142 = "やめて……ごめんなさい、ごめんなさい……。"
21180-143 = "もうお願いだから……許して……！"
21180-145 = "（ドンドンドン！）"
21180-147 = "ひぃっ！"
21180-148 = "だ、誰……？"
21180-149 = "えっと、ここって『テイルズ・サガ・クロニクル』のプロトタイプを作った、ミレニアムのゲーム開発部で合ってますか？"
21180-150 = "な、何……？今度は直接……？"
21180-151 = "ご、ごめんなさい、ごめんなさい……！もう二度とゲームは作りません、だから、許して……！"
21180-152 = "えぇっ！？"
21180-153 = "何言ってるんですか、こんなに面白いのに！プロトタイプだけ作ってやめちゃうなんて！"
21180-154 = "続き、すごい気になってるんですよ！？ここまでワクワクさせておいて、そんなの無しでしょ！"
21180-155 = "……え？"
21180-156 = "『テイルズ・サガ・クロニクル』、すっごく面白かったです！"
21180-157 = "お姉ちゃん、徹夜でやってたもんね。"
21180-158 = "ミドリだってニヤニヤしながらプレイしてたじゃん！もともとゲームにそんな興味なかったのに！"
21180-159 = "え、う、うーん……確かに、ドットだけどキャラとかすごい可愛かったし……。"
21180-160 = "とにかく、あの！失礼します！"
21180-161 = "（ガチャッ！）"
21180-163 = "……！？"
21180-164 = "あなたがUZ様！？"
21180-165 = "えっ……あ、は、はい……。"
21180-166 = "ファンです！！"
21180-167 = "私も、ミドリも！UZ様みたいに、面白いゲームが作りたいです！"
21180-168 = "……っ！！"
21180-174 = "……"
21180-177 = "……それで、二人が来てくれた。"
21180-178 = "一緒に『テイルズ・サガ・クロニクル』を完成させて……今年のクソゲーランキング1位になっちゃったけど……。"
21180-179 = "うっ……。"
21180-180 = "……。"
21180-181 = "その後、アリスちゃんが訪ねてきてくれて……。"
21180-182 = "面白いって、言ってくれた。それで、わたしの夢は叶ったの。"
21180-183 = "心の通じ合う大事な仲間たちと、一緒にゲームを作って、それを面白いって言ってもらう……ずっと一人で思い描いてるだけだった、その夢が。"
21180-184 = "……。"
21180-185 = "これ以上は、欲張りかもだけど。叶うなら、わたしはこの夢が……この先も、終わらないでほしい。"
21180-186 = "ユズちゃん……。"
21180-187 = "……うん、よし！"
21180-188 = "ねえ、今からミレニアムプライスまで、時間どれぐらい残ってる？"
21180-190 = "お姉ちゃん……！"
21180-191 = "6日と4時間38分です。"
21180-192 = "……それだけあれば十分。"
21180-193 = "さあ、ゲーム開発部一同！"
21180-194 = "『テイルズ・サガ・クロニクル２』の開発、始めよう！！"
21180-196 = "うん！"
21180-198 = "次回;ダブルオー"

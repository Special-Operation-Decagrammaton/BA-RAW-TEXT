[translation]
21180-1 = "Episode 18;G.BIBLE"
21180-2 = "Millennium Game Development Department"
21180-4 = "The G.BIBLE... It is on!"
21180-6 = "[56cd7b]Welcome to the world of the G.BIBLE."
21180-8 = "I-It's working!"
21180-9 = "[56cd7b]\"What makes a game 'the best'?\"#n[56cd7b]There are innumerable answers to such a question."
21180-11 = "[56cd7b]Quality, popularity, vivid storytelling, impact, innovative direction..."
21180-13 = "[56cd7b]All are aspects in the best of games.#n[56cd7b]However, they are mere byproducts derived from the greater truth."
21180-16 = "[56cd7b]There is a single secret behind all the best games... "
21180-18 = "[56cd7b]....and the G.BIBLE was made to hold said secret."
21180-20 = "F-Finally!"
21180-21 = "This is so cool..."
21180-22 = "[56cd7b]I will now reveal the one and only secret [56cd7b]to making games."
21180-24 = "Oh!"
21180-25 = "[56cd7b]..."
21180-28 = "[56cd7b]LOVE"
21180-30 = "[56cd7b]…"
21180-32 = "[56cd7b]VIDEO"
21180-34 = "[56cd7b]"
21180-36 = "[56cd7b]"
21180-38 = "[56cd7b]"
21180-40 = "[56cd7b]…"
21180-42 = "[56cd7b]GAMES"
21180-44 = "Wow, what an inspiring opener..."
21180-45 = "Y-You think so?"
21180-46 = "[56cd7b]LOVE VIDEO GAMES."
21180-48 = "Wait... Th-That can't be it, right?"
21180-49 = "I-Is it broken or something?"
21180-50 = "H-Hang on!"
21180-51 = "L-Let's try the settings button..."
21180-52 = "[56cd7b]LOVE VIDEO GAMES."
21180-56 = "[56cd7b](If you pressed this button, [56cd7b]you must be thinking that the file is corrupt..."
21180-58 = "[56cd7b]...or that something else has gone wrong.)"
21180-60 = "Oh! I knew that couldn't be everything—"
21180-61 = "[56cd7b]However,[wa:500] that was everything you needed to know."
21180-63 = "S-Seriously?!"
21180-64 = "[56cd7b]Sorry!"
21180-66 = "[56cd7b]Just LOVE VIDEO GAMES!"
21180-69 = "Th-This can't be happening! It has to be an error or something!"
21180-70 = "The file isn't corrupt and hasn't been modified... The metadata, file size, and data of the most recent copy are an exact match."
21180-71 = "Th-This is...for real, then?"
21180-72 = "That was it...?!"
21180-73 = "Uh..."
21180-74 = "I...think we've been had... Sis?"
21180-76 = "DAMN IT!"
21180-78 = "(Back in the present...)"
21180-79 = "Uh... Momoi, what about the daily quest?"
21180-80 = "You always say the dailies are more important than the end game."
21180-81 = "I... Just leave me alone, Aris. My HP is at zero..."
21180-82 = "Hmm...?"
21180-83 = "Midori..."
21180-84 = "I'm sorry, Aris. This is just how reality is. This is the true ending..."
21180-85 = "Ah..."
21180-86 = "Wh-What about you, Yuzu...? Wait, where did she go?"
21180-87 = "Oh, the cabinet's shaking again. She must be inside. "
21180-89 = "It is like..."
21180-90 = "...everyone's spirits have been debuffed."
21180-91 = "Ergh..."
21180-92 = "How else are we supposed to feel?! This was it! How could we have known that all we'd get is one stinking sentence everyone already knows! They got us hook, line, and sinker!"
21180-93 = "I wasn't expecting to hear the secret and magically have all our problems go away! But come on, help a girl out here!"
21180-95 = "*sigh*"
21180-96 = "I'm so sorry, Aris. We... We just can't do it without the G.BIBLE. We're just hopeless failures now."
21180-97 = "..."
21180-98 = "You are wrong."
21180-99 = "I will not allow you to say that."
21180-100 = "I had fun every time I played Tales Saga Chronicle."
21180-101 = "Real, genuine fun."
21180-102 = "Huh?"
21180-103 = "And I can feel it..."
21180-104 = "I can feel how much Momoi, Midori, and Yuzu..."
21180-105 = "...put their love into the game."
21180-106 = "When I play and travel in that world you made..."
21180-107 = "Well... My heart pounds in my chest."
21180-108 = "Traveling in an unknown world with your companions at your side..."
21180-109 = "You taught me what it means to dream."
21180-110 = "When I realized that our quest was coming to an end, a thought crossed my mind."
21180-111 = "\"I wish this dream would never end.\""
21180-112 = "It was all I could think."
21180-113 = "Aris..."
21180-114 = "..."
21180-115 = "Oh, Yuzu. When did you get out of the cabinet?"
21180-116 = "Not long ago... Just since you started talking about Tales Saga Chronicle."
21180-117 = "So the whole time, then!"
21180-118 = "We should do it..."
21180-119 = "Huh?"
21180-120 = "I've always wanted to hear people say the game I made is fun..."
21180-121 = "But the first version of Tales Saga Chronicle got thousands of negative comments, and people were brutal..."
21180-122 = "I couldn't take it. So I locked myself away in the Game Development Department."
21180-124 = "But that's when you guys came along."
21180-126 = "(Six months ago...)"
21180-129 = "[56cd7b]Calling this a video game is pretty generous. "
21180-131 = "[56cd7b]I'd love to know what goes on in the mind of whoever made this."
21180-133 = "[56cd7b]Ha. I can answer that. Nothing obvs. "
21180-135 = "[56cd7b]This is why normies shouldn't make games."
21180-137 = "[56cd7b]When will they realize they are ruining the medium?"
21180-139 = "[56cd7b]Seriously. This isn't even a game. It's just trash dressed up like a game."
21180-141 = "Ugh..."
21180-142 = "Please... I'm sorry, so please stop..."
21180-143 = "I can't do this anymore, so please... Please... Forgive me!"
21180-145 = "*thud thud thud*"
21180-147 = "Eeek!"
21180-148 = "Wh-Who's there?!"
21180-149 = "Hey, isn't this the Millennium Game Development Department? The one that made the Tales Saga Chronicle alpha?"
21180-150 = "S-Seriously...IRL complaints?"
21180-151 = "I-I'm sorry, all right? I'll never make another game, so please just—"
21180-152 = "What?!"
21180-153 = "Why would you do that?! You can't just drop a fun game during alpha!"
21180-154 = "I wanted to know what happens next! Don't get me all excited for nothing."
21180-155 = "...What?"
21180-156 = "I love Tales Saga Chronicle!"
21180-157 = "It's true. I played it all night long!"
21180-158 = "Yeah, you were right next to me the whole time. And you don't even like games!"
21180-159 = "Well, the characters were so cute that I..."
21180-160 = "Anyway, excuse us!"
21180-161 = "*click*"
21180-163 = "...?!"
21180-164 = "Are you UZ?"
21180-165 = "Uh... Yes, I am."
21180-166 = "I'm a huge fan of your work!"
21180-167 = "Me too! I wanna make fun games just like you!"
21180-168 = "*gasp*"
21180-174 = "..."
21180-177 = "That's how we met..."
21180-178 = "Together, we finished Tales Saga Chronicle and had the honor of winning Worst Game of the Year."
21180-179 = "(Ack!)"
21180-180 = "..."
21180-181 = "And then Aris appeared..."
21180-182 = "When she said my game was fun, it filled my heart with joy."
21180-183 = "Creating a game while surrounded by wonderful people and getting to hear that others enjoyed what we made... It's always been my dream."
21180-184 = "..."
21180-185 = "But I'm also not ready for this dream to end."
21180-186 = "Yuzu..."
21180-187 = "Hmm..."
21180-188 = "Midori. How much time is left until the Millennium Prize?"
21180-190 = "Sis!"
21180-191 = "Six days, four hours, and thirty eight minutes."
21180-192 = "Then there's still time."
21180-193 = "Game Development Department, assemble!"
21180-194 = "Let's begin development of Tales Saga Chronicle 2!"
21180-196 = "Let's do it!"
21180-198 = "Next Episode;Double O"

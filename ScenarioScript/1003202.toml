[translation]
1003202-1 = "為老師準備的禮物"
1003202-5 = "夏萊的休息室"
1003202-7 = "[ns] 「終，終於結束了……」"
1003202-8 = "（好不容易把夏萊堆積如山的工作消化成平時的工作量後，我搖搖晃晃地走到了休息室）"
1003202-9 = "[s] 「睡一下下就好……」"
1003202-18 = "[ns]「……難不成，已經早上了？」"
1003202-19 = "老──師──，早安──！"
1003202-26 = "[ns] 「哇啊！？」"
1003202-29 = "已經早上了唷──？"
1003202-30 = "你要賴床到什麼時候啊？"
1003202-31 = "[s] 「無，無月……？」"
1003202-32 = "這是可愛的學生給老師的叫醒服務哦！"
1003202-33 = "老師，你是不是熬夜了？又來？總感覺看起來比平常還可愛，啊哈♪"
1003202-34 = "[s1]「是，是嗎……？」\n[s2]「話說回來，無月，你那身打扮……」"
1003202-35 = "啊，你說這個嗎？嗯，畢竟是難得的新年嘛──"
1003202-36 = "啊，你說這個嗎？嗯，畢竟是難得的新年嘛──"
1003202-37 = "啊，老師還好嗎？該不會工作過度，連已經新年了都不知道吧？"
1003202-38 = "還真是辛苦呢──，真可憐～！"
1003202-39 = "不過沒關係唷，交給我吧！"
1003202-40 = "今天我為了可憐的老師，特別準備了禮物喔！"
1003202-45 = "[ns] 「那個，難道是……？」"
1003202-46 = "嗯，如你所見！這是我為今天特別準備的「無月特製年菜」唷！"
1003202-47 = "[s3] 「無月特製……！？」\n[s4] 「無月為了我準備的……？」"
1003202-48 = "嗯。為了老師，一大早用心準備的。 "
1003202-49 = "嗯。為了老師，一大早用心準備的。 "
1003202-50 = "快，如果感動到想哭得話，現在是最佳時機唷？"
1003202-51 = "咯呵呵♪ 如果還沒有要哭的話，就快點打開吧！"
1003202-52 = "[s5] 「那我就……」\n[s6] 「謝啦……！」"
1003202-53 = "咯呵……♪"
1003202-54 = "咯呵……♪"
1003202-59 = "[ns] 「那個，無月同學……？這不是年菜……」"
1003202-62 = "咯咯，啊哈哈哈哈！很遺憾～！！"
1003202-63 = "其實我準備的不是「年菜」，而是「無月醬特製的定時炸彈」～！"
1003202-64 = "為了讓因為辛苦工作而昏昏欲睡的老師清醒過來！這是新年初的第一個任務唷～！"
1003202-65 = "[s] 「等等等等等等！？」"
1003202-66 = "好了，現在問題來了！能阻止炸彈倒數的線有2條！該剪掉哪一條呢？"
1003202-67 = "是像元旦日出般，塗得通紅的紅色？"
1003202-68 = "還是和老師現在的臉色一樣，因熬夜而鐵青的藍色呢？"
1003202-69 = "答案究竟是～……！？"
1003202-70 = "[s7] 「機率是2分之1……！」\n[s8] 「前面就算了，後面的形容是怎樣？臉色有這麼糟嗎！？」"
1003202-78 = "咯呵呵，大約還剩下20秒左右～？"
1003202-79 = "好了好了，老師，快沒時間了唷？"
1003202-80 = "[s] 「……！」"
1003202-84 = "[ns9] 剪紅色線\n[ns10] 剪藍色線"
1003202-87 = "（就在我一番苦思，終於決定要剪哪條線的瞬間──）"
1003202-91 = "BUBU──！可惜，時間到！"
1003202-92 = "（煙霧瀰漫……）"
1003202-93 = "[s] 「……咦？」"
1003202-94 = "咯呵，咯呵呵……！"
1003202-95 = "啊哈哈！！老師現在的表情，太讚了！！啊哈哈哈哈！"
1003202-96 = "一臉「不明所以」的表情！咯呵，多謝款待～！"
1003202-101 = "鏘──！老師，你看，這其實是計時器啦！"
1003202-102 = "[s] 「計時器……？」"
1003202-103 = "嗯！時間到了就會瞬間升溫，轉眼間將裡面的食物加熱的「即時發熱計時器」！前幾天在黑市買的！"
1003202-104 = "是最新出的玩具，聽說很受歡迎唷！如何，很有趣吧？"
1003202-105 = "啊，對了對了。因為是將食物放入後使用的，在它底下……"
1003202-109 = "放的是老師期待已久的「年菜」唷！"
1003202-110 = "嘛，不過都是在附近的店家買的就是了。"
1003202-111 = "[s] 「無，無月……」"
1003202-112 = "太棒了太棒了，老師這表情！不枉我一大早就起來準備呢～！"
1003202-113 = "既然新年禮物已經交給你了，今天也差不多該回去了。"
1003202-114 = "咯呵呵！那就下次再一起玩吧，老師！"
1003202-120 = "（之後，我收下了無月帶來的年菜）"
1003202-121 = "（因為實在太好吃了，眼淚都流了出來……）"

[translation]
1003202-1 = "ของขวัญปีใหม่สำหรับคุณครู"
1003202-5 = "ห้องพักผ่อนที่ชาเล่ต์"
1003202-7 = "[ns] \"สะ...เสร็จซะทีสินะ\""
1003202-8 = "(หลังจากจัดการงานที่พอกพูนของชาเล่ต์เสร็จแล้ว คุณครูก็กลับไปที่ห้องพักด้วยท่าทางที่อิดโรย)"
1003202-9 = "[s] \"ขอพักสายตา... แป๊ปเดียว...\""
1003202-18 = "[ns] \"อะ...อื้ม...? เช้าแล้วเหรอ...?\""
1003202-19 = "ตื่น~ ได้~ แล้ว~ น้า~! คุณครู!"
1003202-26 = "[ns] \"วะ...ว้ากกกก?!\""
1003202-29 = "เช้าแล้วนะ! คุณครู?"
1003202-30 = "คิดจะนอนอุดอู้ไปถึงเมื่อไรกัน~?"
1003202-31 = "[s] \"มะ...มุสึกิ? ทำไมเธอมาอยู่ที่นี่ได้ล่ะ?\""
1003202-32 = "อะไรกัน เด็กนักเรียนที่น่ารักอย่างเค้าก็มาปลุกคุณครูบนเตียงยังไงล่ะ"
1003202-33 = "หืมมม~ คุณครู... ทำงานโต้รุ่งอีกแล้วเหรอ? ทำไมหน้าดูแดงๆ ผิดปกติน้า~ อ่ะฮะฮะ!"
1003202-34 = "[s1] \"หน้าแดงมากเลยเหรอ?! ว่าแต่ว่า...\"\n[s2] \"ชุดที่เธอใส่...\""
1003202-35 = "อ๋อ นี่เหรอ? ก็อย่างที่เห็นล่ะ ชุดพิเศษของเค้าสำหรับวันปีใหม่ไง~"
1003202-36 = "อ๋อ นี่เหรอ? ก็อย่างที่เห็นล่ะ ชุดพิเศษของเค้าสำหรับวันปีใหม่ไง~"
1003202-37 = "อ่า~ คุณครู คุณครูยุ่งจนไม่รู้เลยว่าถึงวันปีใหม่แล้วสินะ~"
1003202-38 = "อื้อ! ช่างน่าเศร้าจริงๆ เลยนะ น่าสงสารจุง~!"
1003202-39 = "แต่ไม่เป็นไรหรอก!"
1003202-40 = "วันนี้เค้าเตรียมของขวัญพิเศษมาให้คุณครูผู้น่าเศร้าและน่าสงสารแล้วล่ะ!"
1003202-45 = "[ns] \"นั่นมัน...เบนโตะเหรอ?\""
1003202-46 = "อื้อ ใช่แล้ว! เบนโตะโอเซจิโฮมเมดสุดพิเศษของมุสึกิ! เค้าเตรียมมาให้ครูเป็นพิเศษเลยนะ!"
1003202-47 = "[s3] \"เบนโตะโอเซจิ... ของมุสึกิเหรอ?\"\n[s4] \"ของขวัญที่มุสึกิเตรียมมาเป็นพิเศษเหรอ...?\""
1003202-48 = "เป็นไง เค้าตื่นมาเตรียมแต่เช้าเพื่อคุณครูเลยนะ"
1003202-49 = "เป็นไง เค้าตื่นมาเตรียมแต่เช้าเพื่อคุณครูเลยนะ"
1003202-50 = "เอ้า~! ตอนนี้จะร้องไห้เพราะความซาบซึ้งก็ได้นะ"
1003202-51 = "คิคิคิ อย่ามานั่งเฉยอยู่เลย เอ้า ลุกขึ้นได้แล้ว~ รีบเปิดสิ~ คุณครู~!"
1003202-52 = "[s5] \"ไหนดูซิ...\"\n[s6] \"จะทานแล้วนะ...\""
1003202-53 = "คิคิคิ"
1003202-54 = "คิคิคิ"
1003202-59 = "[ns] \"คือว่ามุสึกิจัง...? นี่มันไม่ใช่โอเซจิแล้วนะ...\""
1003202-62 = "พรืดดดด ฮะฮะฮะฮ่าฮ่าฮ่า! เสียใจด้วยนะ~! คุณครู!"
1003202-63 = "ที่จริงแล้วของที่เค้าเตรียมมาไม่ใช่เบนโตะโอเซจิปีใหม่หรอก แต่เป็นระเบิดเวลาสุดเซอร์ไพรส์#nของมุสึกิต่างหาก!"
1003202-64 = "เป็นภารกิจแรกฉลองรับปีใหม่ของคุณครูที่เหน็ดเหนื่อยทำงานโต้รุ่งมาทั้งคืนไงล่ะ!"
1003202-65 = "[s] \"ดะ...ดะ...เดี๋ยวก่อนสิ! เอาจริงเรอะ?!\""
1003202-66 = "เอาล่ะ เค้าจะถามแล้วน้า! สายไฟระเบิดเวลามีสองเส้น! จะต้องตัดเส้นไหนกันแน่น้า~?"
1003202-67 = "จะเป็นเส้นสีแดงที่แดงสดเหมือนสีพระอาทิตย์ขึ้นในเช้าวันปีใหม่?"
1003202-68 = "หรือว่าจะเป็นเส้นสีน้ำเงินที่เหมือนสีหน้าของคุณครูที่หมองคล้ำจากการทำงานโต้รุ่งมาทั้งคืน?"
1003202-69 = "และคำตอบที่ถูกต้องก็คือ...?!"
1003202-70 = "[s7] \"สุดท้ายก็ต้องเลือกเส้นสีแดงหรือสีน้ำเงินไม่ใช่เรอะ?!\"\n[s8] \"พูดเปรียบเทียบอะไรไม่เห็นเข้าใจเลย?!\""
1003202-78 = "คิกๆ เหลือเวลาอีกแค่ 20 วินาทีแล้วน้าาา~"
1003202-79 = "ไม่มีเวลาคิดแล้ววว~ คุณครู~? ต้องเลือกแล้วล่ะ~!"
1003202-80 = "[s] \"และที่ครูจะเลือกก็คือ...!\""
1003202-84 = "[ns9] เลือกตัดสายสีแดง\n[ns10] เลือกตัดสายสีน้ำเงิน"
1003202-87 = "(และในตอนที่คุณครูตัดสินใจว่าจะตัดสายไหน หลังจากครุ่นคิดอยู่พักใหญ่)"
1003202-91 = "แอ๊ดดดด~! หมดเวลาแล้ว! สายไปแล้วล่ะ!"
1003202-92 = "(กริ๊งงงงง)"
1003202-93 = "[s] \"หะ...หืม?\""
1003202-94 = "คิกๆ..."
1003202-95 = "ฮะ...ฮะฮะฮ่าฮ่า! สีหน้าตกใจของคุณครู! สุดยอดไปเลย~~ ฮะฮะฮ่าฮ่า!"
1003202-96 = "สีหน้าเหวอสุดๆ ไปเลย! โดนต้มซะเปื่อยเลยนะ~!"
1003202-101 = "เซอร์ไพรซ์~! นี่มันตัวจับเวลาน่ะ คุณครู~!"
1003202-102 = "[s] \"ตะ...ตัวจับเวลา?\""
1003202-103 = "อื้อ! ตัวจับเวลาที่พอถึงเวลาที่กำหนดแล้วก็จะปล่อยความร้อนให้ระเบิดน่ะ!#nเค้าซื้อมาจากตลาดมืดล่ะ!"
1003202-104 = "ได้ยินว่าเป็นของเล่นยอดฮิตในช่วงนี้เลยนะ เอ๊ะ...หรือว่าไม่ใช่นะ? แต่เป็นของเล่นที่สนุกจริงๆ นะ!"
1003202-105 = "อ๊ะ จริงสิ! แล้วที่อยู่ข้างล่างนั่น..."
1003202-109 = "ก็คือโอเซจิที่คุณครูรอคอยอยู่ไงล่ะ!"
1003202-110 = "ถึงข้างในเบนโตะจะเป็นของที่ไปซื้อมาจากซูเปอร์มาร์เก็ตก็เถอะ..."
1003202-111 = "[s] \"มะ...มุสึกิ...\""
1003202-112 = "ฮะฮะฮ่าฮ่า! สนุกจังเลย! คุ้มที่ตื่นมาเตรียมตั้งแต่เช้าจริงๆ!"
1003202-113 = "งั้นถือว่าเค้าให้ของขวัญปีใหม่แล้วนะ เค้ากลับล่ะ คุณครู!"
1003202-114 = "คิคิคิกๆ...! คราวหน้ามาเล่นกันใหม่นะ~!"
1003202-120 = "(หลังจากนั้นคุณครูก็นั่งกินโอเซจิที่มุสึกิเตรียมมาอย่างสงบเสงี่ยม)"
1003202-121 = "(และรสชาติก็... อร่อยมากจนอดถอนหายใจไม่ได้...)"

[translation]
1003202-1 = "New Year's Gift for Sensei"
1003202-5 = "Schale Lounge"
1003202-7 = "[ns] \"F-Finally finished...\""
1003202-8 = "(After finally finishing the pile of work from Schale, I staggered into the lounge.)"
1003202-9 = "[s] \"Gotta get some shuteye...at least for a little bit.\""
1003202-18 = "[ns] \"Huh? Morning already...?\""
1003202-19 = "Wake! Up! Sensei!"
1003202-26 = "[s] \"Wh-What?!\""
1003202-29 = "Sensei, what do you mean, morning already?"
1003202-30 = "Are you gonna sleep forever?"
1003202-31 = "[s] \"M-Mutsuki? When did you get here?\""
1003202-32 = "Your cute student is here to give you a wake-up call, Sensei!"
1003202-33 = "Sensei, did you stay up all night again? You look even more confused than usual. Hahaha!"
1003202-34 = "[s1] \"Is it that bad?! But more importantly...\"\n[s2] \"Mutsuki, your outfit...\""
1003202-35 = "Heehee! As you can see, it's a special outfit for New Year's!"
1003202-36 = "Heehee! As you can see, it's a special outfit for New Year's!"
1003202-37 = "Sensei! You were so busy with work that you didn't even realize it was New Year's!"
1003202-38 = "Aw! How sad. How pitiful!"
1003202-39 = "But it's okay."
1003202-40 = "Because today I prepared a special gift for my poor, pitiful Sensei!"
1003202-45 = "[ns] \"Is that a stacked bento?\""
1003202-46 = "Yep, that's right. This is my special Mutsuki homemade osechi stacked bento made just for Sensei!"
1003202-47 = "[s3] \"Osechi prepared by you?\"\n[s4] \"A gift you made just for me?\""
1003202-48 = "Isn't it amazing? I woke up extra early, pouring my heart and soul into making this for you, Sensei. "
1003202-49 = "Isn't it amazing? I woke up extra early, pouring my heart and soul into making this for you, Sensei. "
1003202-50 = "Come on! If you want to cry, now's the time to do it!"
1003202-51 = "Well, don't just stand there. Come on, Sensei. Open it!"
1003202-52 = "[s5] \"Well, if you insist.\"\n[s6] \"Thanks for the meal.\""
1003202-53 = "Heeheehee!"
1003202-54 = "Heeheehee!"
1003202-59 = "[ns] \"M-Mutsuki? This doesn't look like osechi.\""
1003202-62 = "Pffft. Ahahaha! Gotcha, Sensei!"
1003202-63 = "Your real gift isn't New Year's osechi, but my special surprise time bomb!"
1003202-64 = "This is the first mission of the new year for my dear, sleep-deprived Sensei!"
1003202-65 = "[s] \"W-Wait. Wait! Are you serious?!\""
1003202-66 = "Okay, here's the mission! There are two wires on the time bomb.#nWhich wire should you cut?"
1003202-67 = "The wire painted red like a beautiful New Year's sunrise?"
1003202-68 = "Or maybe the wire painted blue like the color of your face after one of your infamous all-nighters?"
1003202-69 = "What's the correct answer?!"
1003202-70 = "[s7] \"In the end, it's just a 50/50 chance...\"\n[s8] \"Hey, my face isn't that bad, is it?!\""
1003202-78 = "Heehee, there are only 20 seconds left!"
1003202-79 = "The clock's ticking, Sensei! What do you choose?!"
1003202-80 = "[s] \"I choose...!\""
1003202-84 = "[ns9] Cut the red wire.\n[ns10] Cut the blue wire."
1003202-87 = "(In the last moment, I chose which wire to cut after much deliberation.)"
1003202-91 = "Ding, ding, ding! Time's up! You're too late!"
1003202-92 = "*beeeeep*"
1003202-93 = "[s] \"H-Huh?\""
1003202-94 = "Heeheehee!"
1003202-95 = "Ahahaha! The look on your face! It's awesome! Ahahaha!"
1003202-96 = "Sensei's so confused! Ooh, that's good stuff!"
1003202-101 = "Ta-da! It's just a timer, Sensei!"
1003202-102 = "[s] \"A t-timer?\""
1003202-103 = "Yep! It's a timer for the built-in heater that keeps the bento warm! I found this at the Black Market!"
1003202-104 = "This gadget just came out recently, and it's pretty popular! Isn't it so much fun?"
1003202-105 = "Oh, right! And under that is..."
1003202-109 = "...the osechi you thought you were getting!"
1003202-110 = "It's all from a nearby supermarket though!"
1003202-111 = "[s] \"Mutsuki...\""
1003202-112 = "Ahahaha! Sensei's so funny! It was worth getting up early to set it up!"
1003202-113 = "Welp, I've given you your New Year's gift, so bye-bye Sensei!"
1003202-114 = "Heehee! Let's hang out again!"
1003202-120 = "(I meekly sampled the osechi that Mutsuki gave me.)"
1003202-121 = "(It was so delicious I couldn't help but sigh.)"

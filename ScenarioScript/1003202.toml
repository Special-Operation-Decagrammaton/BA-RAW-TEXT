1003202-32 = "3;무츠키 정월;01;그야 귀여운 학생이 선생님을 위해 직접 모닝콜을 해주러 나타난 거지!"
1003202-33 = "3;무츠키 정월;03;흐응~ 선생님, 또 밤새 철야를 한 거야? 어쩐지 평소보다 더 얼빠진 얼굴이네. 아하핫!\n#3;em;[재잘]\n#3;hophop"

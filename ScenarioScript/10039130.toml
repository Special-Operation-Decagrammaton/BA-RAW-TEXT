[translation]
10039130-1 = "後日談;正義☆劇場"
10039130-2 = "（聽說實現正義部正在準備表演，於是到場為他們加油打氣）"
10039130-7 = "啊，老師！歡迎你來。"
10039130-8 = "[s]「一花！？你的服裝真棒！」"
10039130-9 = "哈哈，不錯吧？能猜出我扮演什麼角色嗎？"
10039130-10 = "[s]「嗯，是王子吧？」"
10039130-11 = "是的，沒錯。#n可能是因為沒有人敢像我一樣，厚著臉皮扮演王子的關係吧。"
10039130-12 = "但我還是練習了很久，所以有信心不會出錯。"
10039130-13 = "既然來都來了，老師要不要看看我們的排練呀？"
10039130-14 = "[s1]「當然好。」\n[s2]「這是齣什麼樣的話劇呢？」"
10039130-17 = "啊，是《痺美人》這部經典話劇哦。"
10039130-18 = "老師應該也知道，這是一部講述王子克服重重困難，拯救被麻痺的公主的故事。"
10039130-22 = "意外還挺有趣的哦。#n來，我們走吧。"
10039130-27 = "（在觀眾席上發現了弦生）"
10039130-31 = "老，老師？"
10039130-32 = "[s3]「你好呀，弦生。」\n[s4]「可以坐在你旁邊嗎？」"
10039130-37 = "咯，咯咯……嘰咿咿……"
10039130-41 = "啊……不，不能在這裡發作……大家都在練習……"
10039130-42 = "……好，好的。#n老師請坐……"
10039130-44 = "（於是便坐在弦生旁邊觀看排練）"
10039130-48 = "啊啊，公主誕生了！"
10039130-54 = "接下來……輪到仙女們登場……台詞是……"
10039130-55 = "「我們為公主準備了禮物……」"
10039130-57 = "我們為公主準備了禮物！"
10039130-58 = "「公主……這份禮物名為美麗……」"
10039130-59 = "公主，這份禮物名為美麗。"
10039130-63 = "[ns]「弦生，你把台詞都背下來了？」"
10039130-67 = "啊……是的……不知不覺就記住了……"
10039130-68 = "因為這是我們實現正義部準備的活動，所以我很投入……"
10039130-69 = "[s]「真厲害！你扮演什麼角色呢？」"
10039130-70 = "我沒有扮演角色……而是負責準備道具和改編劇本……"
10039130-71 = "可能是因為平時喜歡看戀愛作品的關係，正巧能幫上忙……"
10039130-72 = "而且舞台上還有很多比我更適合的學生……"
10039130-73 = "要是我上台的話，會讓大家感到害怕的……"
10039130-74 = "[s]「可是你連台詞都背下來了……不會覺得有點可惜嗎？」"
10039130-75 = "沒關係的。#n光是能參與這齣話劇，我就很開心了。"
10039130-79 = "嗯，這樣就足夠了。"
10039130-80 = "[s5]「既然弦生都這麼說了……」\n[s6]「我很期待實現正義部的演出哦。」"
10039130-83 = "呵呵……好的，這是我們的自信之作。"
10039130-85 = "（就這樣繼續和弦生一起觀看排練）"
10039130-89 = "（第二天，再次來到了狂歡節會場觀看話劇表演）"
10039130-95 = "[ns7]「觀眾居然這麼多！？」\n[ns8]「原來實現正義部這麼有人氣嗎……！」"
10039130-99 = "啊，主公！！"
10039130-101 = "哦，老師大人！"
10039130-102 = "啊，您好……很高興在這裡見到您……"
10039130-103 = "[s9]「大家好呀！」\n[s10]「你們也是來看表演的嗎？」"
10039130-106 = "哼哼，沒錯！"
10039130-107 = "所謂演戲，就是運用演技和舞台道具，將虛構的故事和情感在現實中呈現……"
10039130-108 = "也就是說──演戲和忍術有異曲同工之妙！"
10039130-109 = "既然難得能來參觀其他學校的大型慶典，當然得順便拓展一下演戲方面的見識囉～！"
10039130-110 = "這也是忍者之道的一部分！忍忍！"
10039130-111 = "而且如果把我們的反應拍下來，傳到「少女忍法帖 小小三千留」頻道上……#n觀看數應該會增加不少吧……"
10039130-113 = "肯，肯定會的……#n因為三一學園的狂歡節，是整個奇普托斯都在關注的大型活動……"
10039130-114 = "不，不是有這麼一句成語嗎……"
10039130-115 = "漁翁得利……好像不太對。#n我們的行為感覺比較接近鮣魚……"
10039130-116 = "所，所以應該是狐假虎威吧……！#n嘿嘿……"
10039130-117 = "總之大概就是這個意思！"
10039130-118 = "[s11]「原來你們打的是這個主意……！！」\n[s12]「不容小覷啊，忍術研究部！」"
10039130-121 = "主公也是來看表演的嗎？"
10039130-122 = "要不要跟伊樹菜和大家一起看呢！！"
10039130-123 = "啊，對耶。老師大人的話我們很歡迎唷。#n應該能捕捉到很有趣的反應。"
10039130-124 = "[s]「不過我還有點事情要處理……」"
10039130-128 = "[ns]「那邊好像有點騷動。我得先過去看看才行。」"
10039130-129 = "主公果然到哪裡都很忙呢！#n伊樹菜會為您加油的！有事的話請隨時吩咐！"
10039130-130 = "像是解決問題的英雄一樣……真帥氣……"
10039130-131 = "好吧，那麼在老師解決完問題回來之前，我們不會按下錄影按鈕的！"
10039130-133 = "（待會回來之後，再叮嚀一下必須先取得拍攝許可的事吧……）"
10039130-138 = "[ns]「那是……」"
10039130-144 = "……是嗎。這下麻煩了呢。"
10039130-145 = "就，就是說啊……"
10039130-147 = "唉，得先找個人補上才行……"
10039130-153 = "啊，老師。#n謝謝你今天也過來關心我們。"
10039130-155 = "老師……！"
10039130-156 = "老，老師……"
10039130-157 = "[s]「發生什麼事了嗎？」"
10039130-159 = "啊……是這樣的……"
10039130-160 = "其實……發生了一點問題……"
10039130-161 = "原本要扮演公主的學生，在騎自行車上學的途中被火箭炮擊中而受了傷。"
10039130-162 = "[s]「啊……怎麼會……」"
10039130-163 = "所幸傷勢並不嚴重，不過要上台恐怕有點困難。"
10039130-164 = "唉……"
10039130-165 = "畢竟就像老師昨天看到的一樣，#n公主有很多需要翻越火圈，或者在空中閃躲子彈的橋段……"
10039130-166 = "為了應付這些特技場景，我們花了很多時間才總算說服那位對體操有興趣的學生……"
10039130-167 = "[s]「我還是第一次知道原來當公主這麼辛苦……」"
10039130-168 = "因為我們想盡量忠於原作……"
10039130-169 = "總之，現在必須趕緊找到替補的人選……#n但開演時間已近在眼前……真傷腦筋。"
10039130-170 = "這樣下去，大家辛苦準備的演出就要泡湯了……"
10039130-175 = "嘰咿咿……"
10039130-179 = "[ns13]「現場好像就有個適合的人選……」\n[ns14]「就由弦生來扮演公主怎麼樣？」"
10039130-186 = "咯嘿！？"
10039130-191 = "咳……咳哼，咳哼……！#n咳呼嘿……"
10039130-192 = "老師……這……"
10039130-193 = "[s15]「弦生不只記得所有台詞……」\n[s16]「身體素質也無可挑剔。」"
10039130-196 = "[ns]「簡直再適合不過了吧？」"
10039130-197 = "老，老師……！？"
10039130-198 = "這麼說也有道理。"
10039130-199 = "蓮實……！？"
10039130-200 = "老師說的沒錯。#n弦生確實是扮演公主的最佳人選。"
10039130-201 = "我，我不適合扮演公主這種角色……"
10039130-206 = "我也這麼認為，蓮實前輩。"
10039130-207 = "連一花也……？"
10039130-208 = "沒有人比弦生前輩更認真對待這齣話劇了。"
10039130-209 = "不僅總是提早來布置舞台，還參與了劇本改編和服裝準備……"
10039130-210 = "既了解所有演員的動線，又明白整體的流程……#n除了弦生前輩之外，還有誰能代替公主的角色呢？"
10039130-211 = "可，可是演員的演技很重要……我實在沒有信心能演好……"
10039130-212 = "我，我做不到……這對我來說太難了……"
10039130-213 = "弦生，你平時不是很喜歡看戀愛電影嗎？"
10039130-214 = "是，是沒錯……"
10039130-215 = "有時候還會模仿裡面的台詞和場景對吧。"
10039130-216 = "那，那個是……！！"
10039130-217 = "太，太羞恥了，拜託別說出來……"
10039130-218 = "這並不是需要感到羞恥的事。#n弦生積累的這些經驗，一定會對演技很有幫助。"
10039130-219 = "……"
10039130-224 = "我也這麼認為。#n弦生前輩一定沒問題的。"
10039130-225 = "[s]「弦生，我也相信你。」"
10039130-227 = "那，那個……"
10039130-231 = "唔，唔……"
10039130-232 = "好，好吧……我會試試看的……"
10039130-234 = "呵呵，這樣就對了，弦生。"
10039130-235 = "好！那麼時間也不多了，請趕緊換上公主的服裝吧！"
10039130-237 = "嘰咿咿……"
10039130-244 = "呼……這樣公主的問題總算是解決了……"
10039130-245 = "[s]「還有其他問題嗎？」"
10039130-249 = "是的……為了表現舞台上的森林，我們還安排了扮演樹木的學生……"
10039130-250 = "但他們也和公主的演員一起被火箭炮擊中……"
10039130-251 = "唉，如果能找到兩個適合扮演樹木的學生就好了……"
10039130-256 = "[ns17]「我有適合的人選。」\n[ns18]「我幫你問問他們。」"
10039130-261 = "真，真的嗎？"
10039130-265 = "[ns] 聯絡忍術研究部"
10039130-273 = "這種事情……！！"
10039130-274 = "找我們忍術研究部就對了！！"
10039130-276 = "能幫上主公的忙真是太好了！"
10039130-277 = "要扮演樹木的話，就交給我這個百鬼夜行的神木吧……！"
10039130-278 = "[s19]「雖然提議的人是我……」\n[s20]「但你們真的不介意扮演這種小角色嗎？」"
10039130-281 = "因為我個子高的關係……園遊會的時候總是扮演樹木的角色。"
10039130-282 = "老實說，不能當主角多少會有點遺憾……"
10039130-283 = "但我在忍術研究部學到了……每個人都有屬於自己的角色。"
10039130-285 = "月夜……"
10039130-286 = "月夜閣下……"
10039130-288 = "每個角色都有存在的意義。#n所以我對現在的自己很滿意……"
10039130-289 = "而且這場表演的主角，是實現正義部的大家。#n我們不過是參加慶典的觀眾而已。"
10039130-290 = "如果能以配角的身份參與這場演出……是我們的榮幸！"
10039130-292 = "嗯嗯！伊樹菜也是這麼想的！"
10039130-293 = "說得太好了，月夜！"
10039130-295 = "而且我們的部員有擔任配角的話，這場表演就能產出兩部影片了！"
10039130-296 = "[s21]「原來這才是你的目的嗎！」\n[s22]「不過還是謝謝你們！真是幫大忙了！」"
10039130-304 = "（就這樣，大家開始匆忙地準備演出）"
10039130-312 = "實現正義部的表演，真令人期待！"
10039130-313 = "就是說啊。#n而且還是《痺美人》這部著名的經典作品……不知道他們會怎麼詮釋呢？"
10039130-314 = "看來很多人都跟我們想的一樣呢。小劇場都被觀眾擠滿了。"
10039130-315 = "啊，那邊還有看到狂獵的校服耶。"
10039130-316 = "[s]「希望大家不要太緊張……」"
10039130-322 = "啊，好像要開始了！"
10039130-325 = "很久很久以前……"
10039130-326 = "有一位美麗的公主。"
10039130-335 = "[ns]「好漂亮！！！」"
10039130-336 = "哇，扮演公主的人是誰呀？超可愛的！"
10039130-337 = "氣質真是清新脫俗。#n實現正義部有這樣一個學生嗎？"
10039130-341 = "[ns]「弦生……難道是太緊張了……？」"
10039130-342 = "……"
10039130-346 = "勿忘草，綻放得真美呢。"
10039130-347 = "[s]「哦哦……！！」"
10039130-351 = "聲音也很好聽！"
10039130-352 = "清澈的聲音也很適合……太會選角了吧！"
10039130-354 = "（弦生以精湛的演技，證明了剛才那純粹是無謂的擔憂）"
10039130-358 = "啊啊，就在那時！紡車的針刺中了公主……！"
10039130-362 = "呀啊……！"
10039130-367 = "公主就這樣陷入了麻痺……"
10039130-368 = "詛咒終究還是成真了……"
10039130-369 = "怎麼辦！我們的公主……！"
10039130-370 = "經典作品就算已經知道情節和結局，還是會讓人想一看再看呢……"
10039130-371 = "雖然知道故事會怎麼發展，但這種沉浸感真是太棒了！"
10039130-377 = "哦哦，美麗的公主啊……！"
10039130-378 = "如夜空般烏黑的秀髮，如玫瑰般紅潤的雙唇。"
10039130-379 = "我駕馬隨著黎明來到你身邊了，公主……！"
10039130-380 = "扮演王子的人是誰呀！？超棒的……！"
10039130-381 = "太讓人心動了吧！這麼浪漫是可以的嗎！？"
10039130-383 = "（隨後表演順利進行，即將進入戲劇的高潮）"
10039130-386 = "（這裡得放鬆身體……）"
10039130-390 = "（老，老師……）"
10039130-391 = "（和觀眾席上的老師對到眼了……！！）"
10039130-392 = "（老師……老師在看我……！！）"
10039130-397 = "[ns23] 擺出加油的姿勢\n[ns24]（弦生，加油！！你做得很好！！）"
10039130-402 = "（老師……在為我加油……！！）"
10039130-407 = "（不，不行……意識到老師之後，身體就變僵硬了……）"
10039130-412 = "咯，唔唔……嘰耶耶～～！！"
10039130-418 = "公，公主……！"
10039130-423 = "公主！！"
10039130-427 = "我不會再讓公主繼續麻痺下去了……！"
10039130-428 = "我將像這滿天的星光一般，以真心將你喚醒……！"
10039130-432 = "嘰，嘰耶耶耶……！！"
10039130-433 = "即便無法逃避麻痺的命運，我對你的心意也永遠不會改變！"
10039130-434 = "咳耶耶耶……！"
10039130-437 = "咦，咦咦！？#n公主的演員……好像突然變得有點奇怪？"
10039130-438 = "難，難道是真的麻痺了嗎？"
10039130-439 = "[s]（糟糕，剛才明明做得很好的說……！！）"
10039130-443 = "那，那是……！"
10039130-444 = "難道說……他們運用了近期興起的表現主義演技嗎！"
10039130-445 = "嗯？"
10039130-446 = "居然是最近最受矚目的，將舞台劇特有的誇張性發揮到極致的情境演技！"
10039130-447 = "不依賴天賦和靈感，而是完全投入到角色之中……真是太棒了！"
10039130-448 = "我們狂獵一直以藝術的發源地自豪，沒想到這次卻在三一大開眼界……太厲害了！！"
10039130-454 = "狂，狂獵的學生突然站起來鼓掌了……！"
10039130-455 = "怎，怎麼回事？現在是什麼情況？"
10039130-456 = "我也不太懂，但應該是很厲害的意思？#n我們也鼓掌吧！！"
10039130-462 = "[ns]「觀眾席上響起了熱烈的歡呼聲……！！」"
10039130-465 = "（雖，雖然不知道發生了什麼事……）"
10039130-466 = "（哎，不管那麼多了！就這樣進入高潮吧，弦生前輩！）"
10039130-472 = "咳，咳耶耶耶！！"
10039130-474 = "（最終實現正義部的話劇圓滿落幕）"
10039130-475 = "（弦生在謝幕時也獲得了觀眾的起立鼓掌，不過在致謝之後就當場昏倒了）"

[translation]
10039130-1 = "ย้อนวันวาน;Justice☆Revue"
10039130-2 = "(คุณครูได้ยินว่าชมรมทวงความยุติธรรมกำลังเตรียมการแสดง จึงแวะไปหาเพื่อให้กำลังใจ)"
10039130-7 = "อ๊ะ คุณครู!  เชิญค่ะ"
10039130-8 = "[s] \"อิจิกะ?! ชุดเท่จัง!\""
10039130-9 = "แหะๆ เข้ากับฉันมั้ยคะ? พอจะเดาบทของฉันได้หรือเปล่าคะ?"
10039130-10 = "[s] \"อื้อ บทเจ้าชาย! ใช่มั้ย?\""
10039130-11 = "ค่ะ ใช่ค่ะ พอดีว่าไม่มีใครที่เล่นบทเจ้าชายได้ดีเหมือนฉันน่ะค่ะ"
10039130-12 = "ฉันฝึกซ้อมมาเยอะ ก็เลยมั่นใจว่าจะไม่ทำพลาดแน่นอนค่ะ"
10039130-13 = "ไหนๆ คุณครูก็ช่วยมาถึงที่นี่แล้ว มาดูการฝึกซ้อมละครเวทีของพวกเราหน่อยมั้ยล่ะคะ?"
10039130-14 = "[s1] \"ได้สิ เป็นละครแบบไหนเหรอ?\"\n[s2] \"ได้อยู่แล้ว เป็นละครแนวไหนเหรอ?\""
10039130-17 = "อ้อ เป็นละครคลาสสิกเรื่อง 'เจ้าหญิงอัมพาต' ค่ะ"
10039130-18 = "คุณครูอาจจะรู้เนื้อเรื่องอยู่แล้ว มันเป็นเรื่องราวเกี่ยวกับเจ้าชายที่ต้องฝ่าฟันความยากลำบากเพื่อช่วย#nเจ้าหญิงที่เป็นอัมพาตค่ะ"
10039130-22 = "ฉันว่ามันสนุกดีนะคะ เอาละ เข้าไปกันเลยค่ะ"
10039130-27 = "(คุณครูเห็นซึรุกินั่งอยู่ที่เก้าอี้ผู้ชม)"
10039130-31 = "คะ... คุณครู?"
10039130-32 = "[s3] \"สวัสดี ซึรุกิ ขอครูนั่งด้วยคนนะ\"\n[s4] \"ขอครูนั่งข้างๆ ด้วยคนนะ\""
10039130-37 = "คิๆๆ... คิกๆๆ..."
10039130-41 = "อ๊ะ... จะส่งเสียงไม่ได้สิ... ทุกคนกำลังซ้อมกัน..."
10039130-42 = "ค่ะ ได้ค่ะ... นั่งตรงนี้ได้เลยค่ะ..."
10039130-44 = "(คุณครูนั่งข้างๆ ซึรุกิและดูการฝึกซ้อมละครเวที)"
10039130-48 = "อ๊ะ เจ้าหญิงประสูติแล้ว!"
10039130-54 = "ต่อไป... เหล่านางฟ้าก็ต้องปรากฏตัว... แล้วพูดว่า..."
10039130-55 = "\"พวกเราเตรียมของขวัญไว้ให้เจ้าหญิงค่ะ...\""
10039130-57 = "พวกเราเตรียมของขวัญไว้ให้เจ้าหญิงค่ะ!"
10039130-58 = "\"เจ้าหญิง... ของขวัญจากฉันคือความงดงามค่ะ...\""
10039130-59 = "เจ้าหญิง... ของขวัญจากฉันคือความงดงามค่ะ..."
10039130-63 = "[ns] \"ซึรุกิจำบทได้หมดเลยเหรอ?\""
10039130-67 = "อ่า... คือว่า... มันจำได้เองน่ะค่ะ..."
10039130-68 = "นี่เป็นงานที่ชมรมทวงความยุติธรรมตั้งใจเตรียมขึ้นมา ฉันก็เลยสนใจจนจำบทได้โดยไม่รู้ตัว..."
10039130-69 = "[s] \"สุดยอดไปเลย! แล้วได้แสดงบทอะไรเหรอ?\""
10039130-70 = "ฉันไม่มีบทหรอกค่ะ... ฉันไม่ได้เป็นฝ่ายนักแสดง แต่เป็นฝ่ายเตรียมอุปกรณ์ประกอบฉาก..."
10039130-71 = "ละครโรแมนติกที่ฉันชอบดูเป็นประจำช่วยฉันได้เยอะเลยค่ะ..."
10039130-72 = "อีกอย่าง มีนักเรียนหลายคนที่เก่งเรื่องการแสดงมากกว่าฉันมาก..."
10039130-73 = "ถ้าฉันขึ้นไปแสดงบนเวที ก็จะมีแต่ทำให้คนอื่นกลัวค่ะ..."
10039130-74 = "[s] \"แต่ก็จำบทได้ทุกบรรทัดเลยนะ... ไม่เสียดายเหรอ?\""
10039130-75 = "ฉันไม่เป็นไรค่ะ แค่ได้มีส่วนร่วมในการเตรียมละครเวที ฉันก็สนุกมากแล้วค่ะ"
10039130-79 = "ใช่ค่ะ เท่านั้นก็เพียงพอแล้วค่ะ"
10039130-80 = "[s5] \"ก็ได้ แล้วครูจะตั้งตารอนะ\"\n[s6] \"แล้วครูจะรอชมละครเวทีของชมรมทวงความยุติธรรมนะ\""
10039130-83 = "ฮุฮุ... ค่ะ นี่เป็นผลงานที่ฉันภาคภูมิใจเลยละค่ะ"
10039130-85 = "(แล้วคุณครูก็นั่งดูการฝึกซ้อมละครเวทีกับซึรุกิต่อ)"
10039130-89 = "(วันรุ่งขึ้น คุณครูมาที่งานคาร์นิวัลอีกครั้งเพื่อชมละครเวที)"
10039130-95 = "[ns7] \"คนเยอะขนาดนี้เลยเหรอเนี่ย?!\"\n[ns8] \"มีคนรอดูชมรมทวงความยุติธรรมกันเยอะเลยสินะ...!\""
10039130-99 = "อ๊ะ นายท่าน!!"
10039130-101 = "โอ๊ะ ท่านอาจารย์!"
10039130-102 = "สะ... สวัสดีค่ะ... ได้เจอกันที่นี่ด้วยนะคะ..."
10039130-103 = "[s9] \"สวัสดีทุกคน! มาดูละครเวทีกันเหรอ?\"\n[s10] \"ทุกคนก็มาดูละครเวทีกันเหรอ?\""
10039130-106 = "ฮุฮุ ดูออกเลยสินะ!"
10039130-107 = "ละครเวทีก็คือการนำเรื่องราวและอารมณ์ที่มองไม่เห็นมาถ่ายทอดให้เห็นจริงโดยใช้เทคนิคการแสดง และอุปกรณ์ประกอบฉาก...!"
10039130-108 = "เช่นนั้นละครเวทีกับวิชานินจาก็มีส่วนที่คล้ายกัน!"
10039130-109 = "ไหนๆ ก็ได้มาเที่ยวงานเทศกาลขนาดใหญ่ของโรงเรียนอื่นแล้ว พวกข้าน้อยก็เลยมาเปิดประสบการณ์#nเรื่องละครเวทีด้วยน่ะ~!"
10039130-110 = "นี่ก็เป็นวิถีแห่งนินจาที่พวกเราต้องเดินเหมือนกัน! นินนิน!"
10039130-111 = "ถ้าถ่ายรีแอกชั่นตอนดูละครเวทีแล้วเอาไปเผยแพร่ละก็ ข้าน้อยว่าน่าจะทำให้ยอดวิวของ <วิถีนินจาสาว มิจิรุจจี้> เพิ่มขึ้นได้ด้วยน่ะ..."
10039130-113 = "ตะ... ต้องเป็นอย่างนั้นแน่นอนค่ะ... ก็งานคาร์นิวัลของโรงเรียนทรีนิตี้เป็นงานที่ดึงดูดความสนใจจาก#nทั่วคิโวทอสนี่คะ..."
10039130-114 = "เหมือนจะมีคำที่เกี่ยวข้องกับเรื่องนี้ด้วย..."
10039130-115 = "ครีเอเตอร์หิวแสง... ไม่น่าจะใช่นะ  มันต้องให้ความหมายในทางที่ดีสิ..."
10039130-116 = "ต้องเรียกว่า กะ... เกาะกระแส... หรือเปล่านะคะ...! แหะๆ..."
10039130-117 = "มันก็น่าจะประมาณนั้นละ!"
10039130-118 = "[s11] \"มีความตั้งใจกันอย่างนี้หรอกเหรอ...!!\"\n[s12] \"น่ากลัวนะเนี่ย ชมรมวิจัยศาสตร์นินจา!\""
10039130-121 = "ว่าแต่นายท่านก็มาดูละครเวทีเหมือนกันเหรอคะ?"
10039130-122 = "ถ้าอย่างนั้นก็มาดูกับพวกเราเลยสิคะ!!"
10039130-123 = "อ้อ นั่นสินะ ถ้าเป็นท่านอาจารย์ พวกข้าน้อยยินดีต้อนรับเสมอเลย น่าจะถ่ายคลิปรีแอกชั่นได้สนุกด้วย"
10039130-124 = "[s] \"ครูมีเรื่องต้องไปทำก่อนน่ะ\""
10039130-128 = "[ns] \"ทางนั้นเหมือนมีเรื่องวุ่นวายเลย ครูขอตัวก่อนนะ\""
10039130-129 = "นายท่านเนี่ย ไม่ว่าไปไหนก็งานยุ่งตลอดเลยนะคะ! อิซุนะจะคอยเชียร์ค่ะ! ถ้ามีเรื่องอะไรก็เรียกได้เลย#nนะคะ!"
10039130-130 = "ทะ... เท่จังเลยค่ะ เหมือนเป็นคนแก้ปัญหาของทุกเรื่องเลย..."
10039130-131 = "งั้นก็ขอให้ทุกอย่างราบรื่นดีแล้วกัน แล้วข้าน้อยจะรอนะ จะยังไม่กดปุ่มอัดวิดีโอด้วย!"
10039130-133 = "(คุณครูตัดสินใจว่าเดี๋ยวค่อยกลับมาคุยเรื่องการขออนุญาตถ่ายวิดีโอทีหลัง...)"
10039130-138 = "[ns] \"นั่นมัน...\""
10039130-144 = "ใช่แล้วค่ะ... เป็นสถานการณ์ที่ยากลำบากเลยละค่ะ"
10039130-145 = "นะ... นั่นสินะคะ..."
10039130-147 = "เฮ้อ ต้องไปหาคนมาแทนก่อน..."
10039130-153 = "อ๊ะ คุณครู มาดูละครเวทีของพวกเราสินะคะเนี่ย ขอบคุณนะคะ"
10039130-155 = "คุณครู...!"
10039130-156 = "คะ... คุณครู..."
10039130-157 = "[s] \"มีเรื่องอะไรกันเหรอ?\""
10039130-159 = "อ่า... คือว่า..."
10039130-160 = "ค่ะ... เราเจอปัญหานิดหน่อย..."
10039130-161 = "นักเรียนที่รับบทเจ้าหญิงโดนจรวดพุ่งเข้าใส่ระหว่างปั่นจักรยานมาที่นี่ ก็เลยได้แผลจนต้องไปห้อง#nพยาบาลเลยค่ะ"
10039130-162 = "[s] \"อ่า... ไม่น่าเลย...\""
10039130-163 = "ค่อยยังชั่วที่เธอไม่เป็นอะไรมาก แต่ก็น่าจะมาแสดงไม่ไหวค่ะ"
10039130-164 = "เฮ้อ... "
10039130-165 = "คุณครูเองก็คงรู้ดีว่าบทเจ้าหญิงต้องทำอะไรหลายอย่าง ทั้งกระโดดข้ามห่วงไฟและก็ต้องตีลังกาหลบ#nลูกกระสุน..."
10039130-166 = "พอมีหลายฉากที่ต้องเคลื่อนไหวแบบกายกรรม พวกเราก็เลยต้องไปแคสต์นักเรียนที่เล่นยิมนาสติกได้#nมาค่ะ กว่าจะแคสต์ได้ก็ไม่ใช่ง่ายๆ เลย"
10039130-167 = "[s] \"ครูไม่รู้มาก่อนเลยว่าบทเจ้าหญิงจะยากขนาดนั้น\""
10039130-168 = "พวกเราพยายามทำให้ออกมาใกล้เคียงกับต้นฉบับมากที่สุดน่ะค่ะ..."
10039130-169 = "แต่การหานักแสดงมาแทนตอนนี้ก็ไม่ใช่เรื่องง่ายเลยนะคะ การแสดงก็ใกล้จะเริ่มอยู่แล้ว"
10039130-170 = "ถ้าเป็นอย่างนี้ละก็ การแสดงที่ทุกคนตั้งใจเตรียมและฝึกซ้อมกันมาคงล้มเหลวไม่เป็นท่า..."
10039130-175 = "เคี๊ยกก..."
10039130-179 = "[ns13] \"ครูว่าแถวนี้มีคนที่สวมบทบาทได้อยู่นะ...\"\n[ns14] \"ซึรุกิไปเล่นบทเจ้าหญิงมั้ย?\""
10039130-186 = "เฮือก?!"
10039130-191 = "คะ... แค่ก... แค่กๆ...!! แค่กๆๆ...!"
10039130-192 = "คุณครู... จะดีเหรอ..."
10039130-193 = "[s15] \"ซึรุกิจำบทได้ทั้งเรื่องเลยนะ\"\n[s16] \"เรื่องความสามารถก็ไม่ต้องห่วงอยู่แล้ว\""
10039130-196 = "[ns] \"ครูว่าตอนนี้ไม่มีใครเหมาะกับบทเจ้าหญิงไปกว่านี้แล้วละ\""
10039130-197 = "คะ... คุณครู...?!"
10039130-198 = "นั่นสินะ"
10039130-199 = "ฮาสุมิ...?!"
10039130-200 = "คุณครูพูดถูกแล้วค่ะ ซึรุกิคือคนที่เหมาะกับบทเจ้าหญิงค่ะ"
10039130-201 = "ฉะ... ฉันไม่เหมาะกับการเป็นเจ้าหญิง..."
10039130-206 = "ฉันก็คิดเหมือนกันค่ะ รุ่นพี่ฮาสุมิ"
10039130-207 = "อะ... อิจิกะก็ด้วยเหรอ...?"
10039130-208 = "ไม่มีใครที่ทุ่มเทกับละครเวทีเรื่องนี้เท่ากับรุ่นพี่ซึรุกิแล้วค่ะ"
10039130-209 = "รุ่นพี่มาล่วงหน้าเพื่อเซ็ตทุกอย่างบนเวที ช่วยเตรียมพร็อพนู่นนี่ให้ ช่วยเขียนบท แล้วก็จัดหาชุดให้#nนักแสดงอีก..."
10039130-210 = "ถ้าไม่ใช่คนที่รู้คิวของนักแสดงและรู้รายละเอียดของเรื่องทั้งหมดอย่างรุ่นพี่ซึรุกิ ฉันก็ไม่รู้ว่าจะมีใครที่#nจะเล่นบทเจ้าหญิงได้อีกแล้วค่ะ"
10039130-211 = "นะ... นักแสดงต้องแสดงเก่ง... แต่ว่าฉัน... ฉันไม่มั่นใจเรื่องการแสดงหรอก..."
10039130-212 = "ฉัน... ฉันทำไม่ได้หรอก... มันเกินความสามารถของฉัน..."
10039130-213 = "ซึรุกิ ปกติชอบดูหนังรักโรแมนติกไม่ใช่เหรอคะ?"
10039130-214 = "กะ... ก็ใช่ค่ะ..."
10039130-215 = "เห็นว่าบางครั้งก็แอบต่อบทและแสดงตามด้วยนะคะ"
10039130-216 = "ระ... เรื่องนั้นมัน!!"
10039130-217 = "นะ... น่าอายออก เลิกพูดเรื่องนี้เถอะ..."
10039130-218 = "ไม่มีอะไรต้องอายหรอกค่ะ ฉันแค่อยากจะบอกว่าประสบการณ์ที่ซึรุกิสั่งสมมาจะเป็นประโยชน์กับการ#nแสดงอย่างแน่นอนค่ะ"
10039130-219 = "..."
10039130-224 = "ฉันก็เห็นด้วยค่ะ ฉันคิดว่ารุ่นพี่ซึรุกิต้องทำได้ดีค่ะ"
10039130-225 = "[s] \"ซึรุกิ ครูก็เชื่อในตัวซึรุกินะ\""
10039130-227 = "ระ... เรื่องนั้น..."
10039130-231 = "อะ... อึก..."
10039130-232 = "ขะ... เข้าใจแล้วค่ะ... ฉันจะลองดูค่ะ..."
10039130-234 = "หุหุ ตัดสินใจถูกแล้วค่ะ ซึรุกิ"
10039130-235 = "ดีเลยค่ะ! เราไม่มีเวลามากแล้ว งั้นก็ไปเปลี่ยนชุดเจ้าหญิงเถอะค่ะ!"
10039130-237 = "เคี๊ยกกก..."
10039130-244 = "ฮู่ว... แก้ปัญหาเรื่องบทเจ้าหญิงได้แล้ว ต่อไปก็..."
10039130-245 = "[s] \"มีปัญหาอื่นอีกเหรอ?\""
10039130-249 = "คือว่า... เราต้องหานักเรียนที่จะมาแสดงเป็นต้นไม้บนเวทีน่ะ..."
10039130-250 = "ที่จริงพวกเราก็คัดตัวไว้แล้ว แต่ว่านักเรียนที่รับบทต้นไม้ก็โดนจรวดพร้อมกับนักแสดงบทเจ้าหญิง#nเหมือนกัน..."
10039130-251 = "เฮ้อ จะไปหานักเรียน 2 คนที่เหมาะกับบทต้นไม้จากไหนดีนะ..."
10039130-256 = "[ns17] \"ครูพอคิดออกอยู่นะ\"\n[ns18] \"ครูลองติดต่อให้นะ\""
10039130-261 = "จะ... จริงเหรอคะ?"

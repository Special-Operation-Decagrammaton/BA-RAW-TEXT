[translation]
10039130-1 = "Afterword;Justice☆Revue"
10039130-2 = "The Justice Task Force was having a dress rehearsal for their play, so I visited to cheer them on."
10039130-7 = "Ah, Sensei. Welcome."
10039130-8 = "[s] \"Ichika?! Your costume's amazing!\""
10039130-9 = "Haha, you think so? Can you tell what my role is?"
10039130-10 = "[s] \"A prince, right?\""
10039130-11 = "Yes, it turned out that way. I guess there's no one else who can play a prince as shamelessly as I can."
10039130-12 = "I'm feeling pretty good about it, now that I've practiced."
10039130-13 = "Since you came all this way, would you like to sit in and watch our rehearsal?"
10039130-14 = "[s1] \"I would love to.\"\n[s2] \"What kind of play is it?\""
10039130-17 = "Oh, it's a classic play called \"Paralyzed Beauty.\""
10039130-18 = "You might know the story, Sensei. It's about a prince overcoming adversity to save a paralyzed princess."
10039130-22 = "It should be fun for everybody. Let's go on in."
10039130-27 = "I found Tsurugi sitting in the Performance Hall auditorium."
10039130-31 = "Sensei?!"
10039130-32 = "[s3] \"Hello, Tsurugi.\"\n[s4] \"May I sit next to you?\""
10039130-37 = "U-Ugh... Krraaaggh..."
10039130-41 = "Ah...no, not here. Not while everyone's practicing..."
10039130-42 = "...Yes, yes. Please do sit here."
10039130-44 = "As I settled into my seat, the rehearsal began."
10039130-48 = "Ah, the princess has been born!"
10039130-54 = "Then...the fairies appear...and the line is..."
10039130-55 = "\"We have prepared a gift for the princess...\""
10039130-57 = "We have prepared a gift for the princess!"
10039130-58 = "\"Princess...my gift is beauty...\""
10039130-59 = "Princess, my gift is beauty."
10039130-63 = "[ns] \"Tsurugi, do you have the whole script memorized?\""
10039130-67 = "Ah...that...is what ended up happening..."
10039130-68 = "As part of the Justice Task Force, I became so involved in it that I didn't even realize..."
10039130-69 = "[s] \"That's amazing! So what part are you playing?\""
10039130-70 = "No part... I adapted the script and helped make props. I'm not an actress..."
10039130-71 = "But I enjoy romance stories, so...that helped a lot..."
10039130-72 = "And plenty of other students are better suited for acting than me..."
10039130-73 = "If it were me up there, I'd just scare everyone..."
10039130-74 = "[s] \"After all that work to learn the script, though. You must be disappointed.\""
10039130-75 = "I'm fine. Just being able to participate..."
10039130-79 = "...that's enough for me."
10039130-80 = "[s5] \"If that's the way you feel.\"\n[s6] \"Well, I'll look forward to seeing your play tomorrow.\""
10039130-83 = "Hehe... Yes, I'm very proud of it."
10039130-85 = "I watched Tsurugi coach the other students through the rehearsal."
10039130-89 = "The next day, I went to watch the play at the carnival."
10039130-95 = "[ns7] \"There are so many people!\"\n[ns8] \"Is the Justice Task Force this popular...?\""
10039130-99 = "Oh, my lord!"
10039130-101 = "Oh, Sensei!"
10039130-102 = "Ah, hello... It's nice to see you here..."
10039130-103 = "[s9] \"Hello, everyone!\"\n[s10] \"Are you here for the play too?\""
10039130-106 = "Heehee, you know it!"
10039130-107 = "Plays bring fictional stories and emotions into reality, just by using acting techniques and stage tools!"
10039130-108 = "So in a way, there's an overlap between acting and ninjutsu!"
10039130-109 = "Well, since I have this opportunity to attend a huge festival at another school, I thought I might as well broaden my knowledge of theater!"
10039130-110 = "This is part of our path as ninja! Nin nin!"
10039130-111 = "Ooh, if we film people's reactions to the play and post them, the view count of \"Michiruchi, a Girl's Ninja Scroll\" might go up a bit..."
10039130-113 = "I-I'm sure it will... The Trinity Carnival is huge. People all across Kivotos come here..."
10039130-114 = "There's a saying about this kind of thing..."
10039130-115 = "\"Fishing in troubled waters...\" no, not that."
10039130-116 = "\"The fox who borrows the tiger's power...\" I think that's the one, heehee."
10039130-117 = "Something like that!"
10039130-118 = "[s11] \"Ah, so that's your plan.\"\n[s12] \"You Ninjutsu Research Club members are scary!\""
10039130-121 = "Have you come to see the play as well, my lord?"
10039130-122 = "If so, why don't you watch with us?"
10039130-123 = "Yes, you're always welcome to join us, Sensei. We can capture your reactions as well."
10039130-124 = "[s] \"I think there's something I need to take care of first.\""
10039130-128 = "[ns] \"There's some commotion over there. I'll be right back.\""
10039130-129 = "Always busy, wherever you go. Izuna will cheer you on, then! If you need anything, please call."
10039130-130 = "You're so cool when you go around solving people's problems..."
10039130-131 = "All right, solve away. I'll be here, with my finger on the record button!"
10039130-133 = "I made a note to tell her about getting people's permission to film them."
10039130-138 = "[ns] \"That's...\""
10039130-144 = "...Is that so? This is quite a difficult situation."
10039130-145 = "Y-Yeah, it is..."
10039130-147 = "We'll have to find a replacement..."
10039130-153 = "Ah, Sensei. You remembered us. Thank you."
10039130-155 = "Sensei!"
10039130-156 = "S-Sensei..."
10039130-157 = "[s] \"Is something the matter?\""
10039130-159 = "Ah... The thing is..."
10039130-160 = "Yes... We have a bit of a problem..."
10039130-161 = "Our princess was bike riding over here, and she got hit by a rocket."
10039130-162 = "[s] \"Oh, no...\""
10039130-163 = "Don't worry, she'll be fine. But she won't be doing any stunts today."
10039130-164 = "*sigh* "
10039130-165 = "You remember seeing in rehearsal, the princess jumps through a ring of fire and somersaults away from bullets, among other things."
10039130-166 = "It wasn't easy to find a student who could act AND do gymnastics."
10039130-167 = "[s] \"I didn't know being a princess was such a difficult job.\""
10039130-168 = "Well, we wanted to make it as accurate to the source material as possible."
10039130-169 = "But I don't know how we're going to find a replacement at the last minute."
10039130-170 = "Everyone worked so hard, and now we might have to cancel..."
10039130-175 = "Gyaaahhh..."
10039130-179 = "[ns13] \"I can think of one replacement...\"\n[ns14] \"What if Tsurugi plays the princess?\""
10039130-186 = "Gaah?!"
10039130-191 = "*cough-cough* *cough-cough*"
10039130-192 = "Sensei...that's..."
10039130-193 = "[s15] \"She has the whole script memorized.\"\n[s16] \"She's definitely got the physicality down pat.\""
10039130-196 = "[ns] \"Under the circumstances, she's the best choice for sure.\""
10039130-197 = "S-Sensei...?!"
10039130-198 = "...All right."
10039130-199 = "Hasumi...?!"
10039130-200 = "You're right, Sensei. Tsurugi is indeed the perfect choice for the princess."
10039130-201 = "I-I'm not a princess at all..."
10039130-206 = "I think Sensei's right too."
10039130-207 = "I-Ichika...?"
10039130-208 = "Tsurugi has been nothing but sincere about this play from the start."
10039130-209 = "She's always come early to set the stage, she adapted the story, prepped the script, she takes care of all the costumes..."
10039130-210 = "She knows every movement, every line, she understands all the beats... Who else can do it better?"
10039130-211 = "A-Actors need to act... I-I don't think I can do that..."
10039130-212 = "I-I can't... It's too much for me..."
10039130-213 = "Tsurugi, you like watching romance movies, don't you?"
10039130-214 = "Yes, but..."
10039130-215 = "I've seen the way you mimic the lines while you watch."
10039130-216 = "Th-That's...!"
10039130-217 = "That's just embarrassing..."
10039130-218 = "It's nothing to be embarrassed about. What I'm saying is, you have the experience to become an actress."
10039130-219 = "..."
10039130-224 = "I feel the same way. You can handle it. I believe in you."
10039130-225 = "[s] \"I believe in you too, Tsurugi.\""
10039130-227 = " W-Well..."
10039130-231 = "U-Urgh..."
10039130-232 = "O-Okay... I'll try."
10039130-234 = "Hehe, I'm glad, Tsurugi."
10039130-235 = "Great, then! Since we're short on time, let's get you into costume now!"
10039130-237 = "Krraaaggh..."
10039130-244 = "Phew... Well, that takes care of our princess problem, at least..."
10039130-245 = "[s] \"Is there another problem?\""
10039130-249 = "Well... We had some students cast to the play the trees, but..."
10039130-250 = "...they all got hit by the same rocket."
10039130-251 = "I need two replacement trees, and I don't know where I'm going to find them."
10039130-256 = "[ns17] \"I have a couple in mind.\"\n[ns18] \"Let me go ask.\""
10039130-261 = "R-Really?"
10039130-265 = "[ns] Contact the Ninjutsu Research Club."
10039130-273 = "Ah, now that you mention it..."
10039130-274 = "...reaching out to the Ninjutsu Research Club is always a good idea!"
10039130-276 = "Izuna is glad to be of help to you, my lord!"
10039130-277 = "I, Hyakkiyako's Tree of Deities, am the perfect person to play a tree!"
10039130-278 = "[s19] \"I did ask, but...\"\n[s20] \"Are you really okay with just playing a tree?\""
10039130-281 = "Being as tall as I am, I've played many trees over the years, in school festivals."
10039130-282 = "Honestly, I would enjoy playing a larger role sometime..."
10039130-283 = "But, as the Ninjutsu Research Club has taught me, everyone has their own role to play."
10039130-285 = "Tsukuyo..."
10039130-286 = "Tsukuyo..."
10039130-288 = "Every role has a significance all its own. I-I'm satisfied with the way things are, the way I am..."
10039130-289 = "Besides, this production belongs to the Justice Task Force. This is audience participation, nothing more."
10039130-290 = "So if we can help, even in a minor role...it would truly be an honor!"
10039130-292 = "Yes, yes! Izuna feels the same way!"
10039130-293 = "Well spoken, Tsukuyo!"
10039130-295 = "And if one of us is IN the play, we can make at least two videos about this one production!"
10039130-296 = "[s21] \"Was that the goal after all?\"\n[s22] \"Thank you, but... Never mind, we're all very grateful!\""
10039130-304 = "Everyone hurried to prepare for the performance."
10039130-312 = "The Justice Task Force, putting on a play. This'll be something to see."
10039130-313 = "Plus, they're doing \"Paralyzed Beauty,\" the old classic masterpiece. I wonder how they'll interpret it."
10039130-314 = "A lot of people must be wondering that. This place is packed."
10039130-315 = "Oh, and there's the Wild Hunt uniform over there."
10039130-316 = "[s] \"I hope nobody gets nervous...\""
10039130-322 = "Ah, I think it's starting now!"
10039130-325 = "Once upon a time..."
10039130-326 = "...there was a beautiful princess."
10039130-335 = "[ns] \"She looks so pretty!\""
10039130-336 = "Who IS that playing the princess? She looks so cute!"
10039130-337 = "She has this aura of purity, doesn't she. I didn't know the Justice Task Force had someone like her."
10039130-341 = "[ns] \"Tsurugi... Don't be nervous, just breathe...\""
10039130-342 = "..."
10039130-346 = "The forget-me-nots have bloomed beautifully."
10039130-347 = "[s] \"Oh...!\""
10039130-351 = "She's got a beautiful voice, too!"
10039130-352 = "So elegant. Great casting!"
10039130-354 = "Despite the worries, Princess Tsurugi's performance was excellent."
10039130-358 = "Suddenly, the princess pricked her finger on a needle from the watermill...!"
10039130-362 = "Oh!"
10039130-367 = "Thus, the princess was paralyzed..."
10039130-368 = "And the curse came to pass..."
10039130-369 = "Oh no! Our princess...!"
10039130-370 = "Even when you know what's going to happen, it's great to watch a masterpiece like this."
10039130-371 = "Right? I know the whole story already, but this immersion is amazing!"
10039130-377 = "Oh, beautiful princess...!"
10039130-378 = "Ebony hair flowing like the night sky, lips red enough to make roses seem pale."
10039130-379 = "My princess, I have come riding with the dawn!"
10039130-380 = "Wow, who's playing the prince? This is amazing!"
10039130-381 = "I'm getting butterflies in my stomach! Can it be any more romantic?!"
10039130-383 = "The play progressed smoothly toward the climax."
10039130-386 = "(Now, I just need to relax here...)"
10039130-390 = "(S-Sensei...)"
10039130-391 = "(I see Sensei in the audience...)"
10039130-392 = "(...looking at me...!)"
10039130-397 = "[ns23] Raise a fist in the air to cheer on Tsurugi.\n[ns24] Whisper encouragement under your breath."
10039130-402 = "(Sensei's cheering me on...!)"
10039130-407 = "(Agh, no... Just knowing Sensei's looking at me is making me tense up...)"
10039130-412 = "G-Gahhh... Argh!"
10039130-418 = "P-Princess...?!"
10039130-423 = "*cough* Princess!"
10039130-427 = "You shall be paralyzed no longer!"
10039130-428 = "With my heart, sincere as starlight, I shall awaken you."
10039130-432 = "Krraaaggh..."
10039130-433 = "Even if I should become paralyzed myself, my love for you shall never fade!"
10039130-434 = "Graaagggh...!"
10039130-437 = "Why's the princess doing that all of a sudden?"
10039130-438 = "I-Is she ACTUALLY paralyzed, or...?"
10039130-439 = "[s] \"(Oh dear, she was doing so well...)\""
10039130-443 = "W-What the...?"
10039130-444 = "Oh, this must be that new expressionist style of acting."
10039130-445 = "Huh?"
10039130-446 = "It maximizes the uniquely exaggerated mannerisms of a stage play."
10039130-447 = "To immerse oneself wholly in the role, without relying on talent or inspiration... This is incredible!"
10039130-448 = "I've always been proud of Wild Hunt as a birthplace of art, but coming to Trinity has broadened my horizons. I'm amazed!"
10039130-454 = "Wow, the Wild Hunt students are giving a standing ovation...!"
10039130-455 = "Wh-What? What just happened?"
10039130-456 = "I don't know! But it must be something great. Let's clap too!"
10039130-462 = "[ns] \"The audience is cheering like crazy!\""
10039130-465 = "(I-I'm really not sure what just happened, but...)"
10039130-466 = "(Hey, Tsurugi! Let's ride this momentum to the climax!)"
10039130-472 = "G-Graaagggh!"
10039130-474 = "And so, the Justice Task Force's play came to a successful end."
10039130-475 = "After receiving a standing ovation at the curtain call, Tsurugi walked behind the curtain and fainted."

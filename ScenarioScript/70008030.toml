70008030-36 = "3;초지일관 망량즈 리더;00\n#3;em;…\n#wait;2500"
70008030-37 = "3;초지일관 망량즈 리더;00;다들 집중한 듯하니 본제로 들어가지요. 최근 백귀야행의 모습 말이요."
70008030-38 = "3;초지일관 망량즈 리더;00;무시당하고 있다…… 그렇게 느끼지 않으시오?"
70008030-39 = "3;초지일관 망량즈 리더;00\n#na;왁자지껄 망량즈 리더;그건…… 확실히 그럴지도. 요즘 아무도 우릴 무서워하는 느낌이 없어."
70008030-40 = "#na;오락가락 망량즈 리더;우리한테 말 한마디 없이 멋대로 신목제를 다시 열지 않나……."
70008030-41 = "#na;위기일발 망량즈 리더;맞아, 맞아! 우리 망량즈에 대한 존경이 느껴지지 않아!"
70008030-42 = "3;초지일관 망량즈 리더;00;역시 다들 마음속 깊이 느낀 바가 있는 듯하군요.\n#3;em;…"
70008030-43 = "3;초지일관 망량즈 리더;00;예의 신목제 때도 망신만 당할 뻔한 걸, 길거리 망량즈의 아라타 공이 몸바쳐 항의하는 큰 공을 세워 이 자리에 초청 드린 것이요."
70008030-44 = "5;아라타 헬멧;00;어, 엇?! 갑자기, 나?! 그…… 그렇지~ 신목제는, 백귀야행의 축제, 즉, 우리 축제니까…… 외부인 사정으로 멋대로 하게 둘 수가 없었다고 할까…….\n#5;al\n#3;m1\n#5;em;[?!]"
70008030-45 = "5;아라타 헬멧;00;무슨 공을 세웠다기에는…… 엄청 큰 사고를 쳐서 음양부랑 백화요란 놈들한테 잔뜩 혼난 기억밖에 없지만…….\n#5;stiff\n#fontsize;50"
70008030-46 = "3;초지일관 망량즈 리더;00;바로 그거요! 백귀야행의 것은 백귀야행의 것, 더 나아가 우리 망량즈의 것! 우리가 우리의 것을 지키려 하는 게 뭐가 문제란 말이요!\n#3;m3\n#5;dr\n#3;hophop\n#3;em;[!]"
70008030-47 = "3;초지일관 망량즈 리더;00;백귀야행을 지킨다고 잘난 척하는 백화요란은 본래 근본이 없는 집단. 먕량즈야말로 진정 백귀야행의 주인이란 말입니다!\n#3;stiff"
70008030-48 = "3;초지일관 망량즈 리더;00\n#na;망량즈들 무소속;그래, 맞아! 말 한번 잘했다!"
70008030-49 = "3;아라타 헬멧;00;맞아! 맞아!\n#3;em;[재잘]"
70008030-50 = "3;아라타 헬멧;00;(그래, 바로 이거야! 이게 망량즈다운 일이지! 사실 나도 백귀야행의 전통을 지키고 있던 거야!)"
70008030-51 = "3;초지일관 망량즈 리더;00;지금까지는 음양부 체면을 보아 넘어갔지만, 이제는 승부를 가릴 때가 되었소!\n#3;em;[!]"
70008030-52 = "3;초지일관 망량즈 리더;00;다음 축제에 백화요란에 선전포고하는 것이요!\n#3;closeup"

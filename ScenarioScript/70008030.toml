70008030-54 = "3;아라타 헬멧;00;(……? 응? 선전포고? 그게 무슨 소리야?)\n#3;em;[?]"
70008030-55 = "3;아라타 헬멧;00\n#na;망량즈들 무소속;와아아! 좋다! 본때를 보여주자!"
70008030-56 = "3;초지일관 망량즈 리더;00;뜻이 모인 듯하니, 바람처럼 결행합시다!\n#3;greeting"
70008030-57 = "3;초지일관 망량즈 리더;00;백화요란이 가장 취약한 것은, 축제의 치안 관리로 흩어졌을 때. 그때까지 관광객 사이에 숨어 있다가 일제히 기습하는 겁니다!\n#3;em;[!]"
70008030-58 = "3;초지일관 망량즈 리더;00\n#na;왁자지껄 망량즈 리더;맞아, 맞아! 전부 해치워 버리자고!"
70008030-59 = "3;초지일관 망량즈 리더;00\n#na;우당탕탕 망량즈 리더;우리 축제를 되찾자! 관광객이니 뭐니 하는 외부인들도 전부 쫓아내 버리자고!"

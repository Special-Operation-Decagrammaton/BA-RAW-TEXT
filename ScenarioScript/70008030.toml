70008030-70 = "5;아라타 헬멧;00;이번 축제는 딱히 문제가 있는 것도 아니고, 다들 열심히 준비하고 있는데…… 물론, 얄미운 백화요란 놈들을 이번 기회에 혼내주거나 하는 건 좋은데…….\n#5;stiff"

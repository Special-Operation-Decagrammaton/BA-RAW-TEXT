[translation]
70008030-1 = "驚險！妖怪劇團之夜！（３）"
70008030-2 = "那麼，既然大家似乎都到齊了……"
70008030-3 = "我在此宣布……今年的妖怪劇團之夜正式開始！"
70008030-13 = "（哇……全都是只聽過名字的超強妖怪劇團領袖……嗚嗚，好緊張……）"
70008030-14 = "（我該不會是全場最寒酸的吧？）"
70008030-15 = "（吵吵鬧鬧……）"
70008030-16 = "喂，你看見那傢伙了嗎？"
70008030-17 = "今年有個超不妙的傢伙來了啊。"
70008030-18 = "（哇啊……！真的有超級大人物來了嗎！#n　居然連那些響噹噹的領袖都緊張成這樣……到底是誰！？）"
70008030-23 = "那傢伙真的不是其他團體的人嗎……？"
70008030-24 = "我聽說在百鬼夜行外面，有些瘋子會那樣晃來晃去的……"
70008030-29 = "安靜安靜！肅～靜！！"
70008030-33 = "今天之所以召集各位，是為了討論我們妖怪劇團的未來。#n還請謹言慎行。"
70008030-37 = "各位似乎都已恢復專注，我就進入正題吧。#n不知道各位對於近期的百鬼夜行有何看法呢？"
70008030-38 = "不覺得……我們被無視了嗎？"
70008030-39 = "這……確實有點。#n感覺最近好像沒人會怕我們了。"
70008030-40 = "甚至還擅自重新舉辦神木祭……"
70008030-41 = "對啊對啊！完全感覺不到對我們妖怪劇團的尊重！"
70008030-42 = "果然各位心裡都深有感觸呢。"
70008030-43 = "上次的神木祭差點讓我們出盡洋相……#n多虧街頭流派的新閣下挺身抗議、立下大功，因此特別邀請他前來共襄盛舉。"
70008030-44 = "咦，咦！？怎麼突然提到我！？其實也沒什麼啦～#n神木祭是百鬼夜行的祭典，也就是我們的祭典嘛……怎麼能讓外人隨便插手呢……"
70008030-45 = "而且雖然說是立功……我卻只記得闖下了大禍，還被陰陽部和百花繚亂狠狠修理而已……"
70008030-46 = "沒錯！百鬼夜行的東西屬於百鬼夜行，進一步說就是屬於我們妖怪劇團的！#n守護屬於自己的東西究竟有什麼錯！"
70008030-47 = "那些自以為守護著百鬼夜行、高高在上的百花繚亂，本來就只是缺乏根基的集團。#n我們妖怪劇團才是百鬼夜行真正的主人！"
70008030-48 = "好！說得真好！"
70008030-49 = "沒錯沒錯！"
70008030-50 = "（是啊！這才是妖怪劇團該做的事！其實我也在守護著百鬼夜行的傳統啊！）"
70008030-51 = "過去都看在陰陽部的面子上選擇忍耐，但是時候該分個勝負了！"
70008030-52 = "我們要在下次的祭典，向百花繚亂宣戰！"
70008030-54 = "（……咦，宣戰？什麼意思？）"
70008030-55 = "好啊好啊！給他們點顏色瞧瞧！"
70008030-56 = "既然大家意見一致，我們就速戰速決吧！"
70008030-57 = "百花繚亂最脆弱的，就是為了維持祭典治安而各自分散的時候。#n我們就混在觀光客之中，給他們來個措手不及！"
70008030-58 = "對對對！把他們全都打倒！"
70008030-59 = "要奪回我們的祭典！把觀光客什麼的也全都趕走！"
70008030-60 = "不是，這樣……會不會有點太過頭了？"
70008030-61 = "……剛才那句話是誰說的？"
70008030-67 = "哦唔……？別，別擠啦！#n是，是我說的。"
70008030-68 = "新閣下，你不是最反對重新舉辦神木祭的人嗎？#n為何現在說出如此軟弱的話呢？"
70008030-69 = "不是，該說這跟那有點不一樣嗎……！"
70008030-70 = "這次祭典也沒什麼問題，大家都很努力準備……#n當然能趁機修理可惡的百花繚亂，確實是好事沒錯啦……"
70008030-71 = "不過把無關的人和準備祭典的人都捲進來，感覺也有點不太好……之類的？"
70008030-72 = "你的意思是我們是壞人嗎！#n……雖然確實是這樣沒錯，但聽到實話還是會受傷的！"
70008030-73 = "你該不會想臨陣脫逃吧！？"
70008030-74 = "真讓人失望啊，新閣下。#n我原本還以為你會身先眾人的呢。"
70008030-75 = "既然你已經聽見會議的內容，就不能讓你輕易離開了……"
70008030-76 = "什，什麼！？#n哇啊！別靠近我啊！誰，誰快來救救我……！"
70008030-81 = "伊樹菜全都聽見了！"
70008030-85 = "既然已經被忍者伊樹菜得知，這邪惡的計畫就到此為止了！"
70008030-87 = "忍者！？為什麼會有忍者！？"
70008030-88 = "對了，之前曾經聽說過陰陽部在培養祕密特工，沒想到竟然是忍者啊！"
70008030-90 = "喵哈哈！沒錯～你可真有眼光呢！"
70008030-91 = "忍者在劇情將變得無聊時颯爽登場……#n果然沒有比這更有趣……更正，是更棒的發展了呢～"
70008030-92 = "你這傢伙是……陰陽部部長，天地仁耶……！#n陰陽部怎麼可以打破中立！"
70008030-93 = "我完全不明白這番話的意思呢～#n我不過是擔心下次祭典能否順利舉辦，所以才請可愛的後輩協助調查一下而已～"
70008030-94 = "還給我說這種明顯的謊話……！"
70008030-95 = "膽敢闖進我們的會議，你以為還能全身而退嗎？#n只要我們妖怪劇團聯手起來，無論陰陽部還是百花繚亂……"
70008030-96 = "沒錯沒錯～這就是問題所在～"
70008030-97 = "假如只是一兩隻野狗倒還稱得上可愛，要是成群結隊的話可就要變成狼群了呢～"
70008030-98 = "哈啊！伊樹菜流忍法！啪啪之術！"
70008030-99 = "等，等一下，我其實算是妖怪劇團裡比較不壞的人！呃啊！"
70008030-100 = "對方才一個人而已！快想想辦法！#n呃啊！"
70008030-101 = "哎呀～在群起之前確實還挺可愛的呢～#n喵哈哈！那我就先失陪啦～"
70008030-105 = "陰陽部長，你這傢伙……！"
70008030-106 = "大，大事不好了！隊長！#n是百花繚亂！百花繚亂出現了！"
70008030-108 = "什麼？不只忍者，連百花繚亂都來了！？#n我要溜了！"
70008030-112 = "大家快跑！"
70008030-120 = "等，等等！我們人這麼多，只要合力對抗就能……"
70008030-121 = "找到你了！邪惡的首領！哈啊！"
70008030-122 = "哎唷！我好不容易才集合大家，結果居然被搞成這樣！"
70008030-123 = "不管了！總之先跑再說！"
70008030-135 = "哈啊，哈啊……總算逃出來了。"
70008030-136 = "這到底是怎麼回事……#n我只是想活得像個妖怪劇團而已……#n結果卻一直被人追趕、不斷逃命……"
70008030-137 = "本來很期待的妖怪劇團之夜，其實一點都不帥氣……"
70008030-138 = "到底是哪裡出錯了啊。"
70008030-139 = "喂，我說你。"
70008030-140 = "啊，這個聲音是……！"
70008030-141 = "把帥氣面具借給我的姐姐！"
70008030-142 = "借什麼借！明明是你們突然衝過來搶走的好不好！"
70008030-143 = "頭盔團沒有頭盔不就沒戲唱了嗎！#n幸好我還有備用的！"
70008030-144 = "喂，我的寶貝頭盔沒事吧？"
70008030-145 = "嗯，還給你。拿去吧。"
70008030-150 = "哦，哦哦。#n居然還得這麼乾脆……頭盔也沒什麼損壞。"
70008030-155 = "什麼意思啊……我本來還想說要來報仇的……"
70008030-156 = "結果看你一臉沮喪的樣子，害我火氣都沒了。"
70008030-157 = "姐姐～～"
70008030-158 = "誰是你姐啊！"
70008030-159 = "到底怎麼樣才能活得像個妖怪劇團啊……？"
70008030-160 = "妖怪劇團？#n那是什麼東西啊，而且為什麼要問我？"
70008030-161 = "說的也是……"
70008030-167 = "雖然我不知道什麼妖怪劇團，但你們不就是在這裡隨性過日子的傢伙嗎？#n我一看就知道了。"
70008030-168 = "既然如此何必想那麼多呢？只要開心不就好了嗎？"
70008030-169 = "開心？"
70008030-170 = "對啊，反正你不就是因為不想讀書也不想玩社團，所以才這樣的嗎？"
70008030-171 = "是，是沒錯啦……"
70008030-172 = "那就別浪費時間想東想西了。#n想做的事情就做，不想做的事情就別做。"
70008030-173 = "是嗎？聽起來……好像也挺有道理的……嗯……"
70008030-174 = "話說……"
70008030-175 = "搶走……不，借走我頭盔的代價，得讓你好好償還才行。"
70008030-176 = "什麼！？我，我可沒有錢啊！"
70008030-177 = "你把我當流氓啊！？雖然確實有點像就是了。#n先不說這些了，帶我和朋友到處逛逛吧。"
70008030-178 = "我們都是第一次來，對百鬼夜行的景點完全不認識。"
70008030-179 = "咦，第一次來百鬼夜行？#n所以你們連神木展望台都沒去過嗎？"
70008030-180 = "展望台……？#n啊，是那棵大樹嗎？原來還有展望台哦？"
70008030-181 = "真不敢相信！#n連那裡都沒去過，根本不算來過百鬼夜行吧！"
70008030-182 = "立刻出發吧！"
70008030-183 = "咦，咦咦？雖然恢復精神是好事，但你的心情也轉換得太快了吧？"
70008030-184 = "別再拖拖拉拉的了！！#n雖然夕陽也有夕陽的美，但展望台白天的景色完全不一樣啊！！"
70008030-185 = "快點走吧！！跟我來，姐姐！"
70008030-186 = "就說了誰是你姐啦！！"
70008030-188 = "雖然連新在內的所有人幾乎都不記得了，但妖怪劇團原本指的是不受任何束縛的人。"
70008030-189 = "從某種意義上來說，不斷尋找著新樂趣的新……或許才是最像「妖怪劇團」的人吧。"
70008030-190 = "驚險！妖怪劇團之夜！"

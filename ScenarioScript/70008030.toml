[translation]
70008030-1 = "何にも縛られぬ者たち（３）"
70008030-2 = "さて、皆さんお集まりのようですので――"
70008030-3 = "ここに……魑魅一座ナイトの開幕を宣言します！"
70008030-13 = "（うわ……あっちも……こっちも……魑魅一座でも有名なリーダーばっかり……）"
70008030-14 = "（あたし……ここにいていいのか……？）"
70008030-15 = "ざわざわ……。"
70008030-16 = "おい、あいつじゃないか？"
70008030-17 = "マジかよ……今年は荒れそうだな……。"
70008030-18 = "（おいおい、どんなやべぇやつが来てるんだ！？）"
70008030-23 = "あいつ、本当に魑魅一座なのか……？"
70008030-24 = "百鬼夜行の外だと、あんな恰好のやつらがいるって聞いたけど……。"
70008030-29 = "皆さん！お静かに～！！"
70008030-33 = "積もる話もあるでしょうが……皆さん、私語は慎んでいただきますよう。"
70008030-37 = "……では、本題に入りましょう。"
70008030-38 = "近頃の我々は、百鬼夜行から無視されている――そうは思いませんか？"
70008030-39 = "たしかにね……あたしらのこと、誰も怖がってないし。"
70008030-40 = "勝手に神木祭を再開するしな……。"
70008030-41 = "そうだそうだ！我々のことをバカにしてやがるんだ！"
70008030-42 = "ええ、ええ。皆さんのお気持ち……私も痛いほど分かります。"
70008030-43 = "幸いにして――先の神木祭においては、路上流のアラタ殿の活躍で、我々が恥をかくことは免れました。"
70008030-44 = "えっ、あたし！？#n……そ、そうだな！神木祭は百鬼夜行――ようは、あたしらの祭りだろ？"
70008030-45 = "邪魔させるわけにはいかなかったっていうか……#nまぁ……陰陽部とか百花繚乱のやつらに超怒られた記憶しかねぇけどよ……。"
70008030-46 = "百鬼夜行の物は、すなわち我々魑魅一座の物と同義！#n自分の物を守ろうとして、何がいけないと言うのでしょう！"
70008030-47 = "百花繚乱など根拠がない口だけの集団！#n魑魅一座こそ、百鬼夜行の体現者！伝統の守護者なのです！"
70008030-48 = "おお！よく言った！"
70008030-49 = "そうだ！そうだ！"
70008030-50 = "（そうだ！これが魑魅一座！あたしらは百鬼夜行の伝統を守ってんだ！）"
70008030-51 = "今までは陰陽部の顔を立ててきましたが……もうその必要はありません！"
70008030-52 = "日取りは次回のお祭り。我々は――百花繚乱に宣戦布告をするのです！"
70008030-54 = "（……ん？）"
70008030-55 = "うおお！目にもの見せてやれ！！"
70008030-56 = "皆さん、今こそ動く時です！"
70008030-57 = "百花繚乱は治安維持のために、街中に散らばるはず。#n我々は観光客のふりをして潜伏し……チャンスがきたら、一斉に奇襲するのです！"
70008030-58 = "やってやろうぜ！"
70008030-59 = "私たちのお祭りを取り戻すんだ！観光客だろうがなんだろうが、そんなの関係ねぇ！"
70008030-60 = "いや、それは……違うんじゃねぇ？"
70008030-61 = "……今のはどなたですか？"
70008030-67 = "あっ、おっ、おい！押すなって！#n……ええと、あたしだけど。"
70008030-68 = "……アラタ殿。#n誰よりも神木祭の再開に反対していたあなたが……なぜ？"
70008030-69 = "それとこれとはちょっと違うというか……！"
70008030-70 = "いや、その……もちろん、百花繚乱の連中をやっつけようってのはいいんだけどさ……。"
70008030-71 = "今回のお祭りって別に問題ないじゃん？#n無関係の人とか、お祭りのために頑張ってきた人たちまで巻き込むのはどうなんだ？"
70008030-72 = "じゃあこっちが悪いっていうのか！？#n我々だってちょっとは悪いけどさ！"
70008030-73 = "もう作戦は始まってんだ。自分だけ抜ける気か！？"
70008030-74 = "アラタ殿、がっかりです。我々の未来を担う方だと思っていたのに……。"
70008030-75 = "集会の内容を知られた以上……このまま帰すわけにはいかなくなってしまいました。"
70008030-76 = "うわっ！近づくな！だ、誰か……！"
70008030-81 = "話は聞かせてもらいましたっ！"
70008030-85 = "その計画――イズナが阻止いたします！"
70008030-87 = "忍者だと！？"
70008030-88 = "陰陽部が忍者を養成してるって噂は本当だったのか！！"
70008030-90 = "にゃははっ！忍者の良さが分かるだなんて、見る目あるじゃないですか♪"
70008030-91 = "これほど面白……いや、良い展開はないですからねぇ。"
70008030-92 = "これはどういうことです、[ruby=あまち]天地[/ruby]ニヤ……！#nあの陰陽部が中立を破るおつもりか？"
70008030-93 = "はて、私にはなんのことやら……。#n可愛い後輩が散歩をしていたら……たまたま不思議な集会に迷い込んでしまっただけでして～"
70008030-94 = "そんな嘘が通じると本気で思っているのですか……？"
70008030-95 = "いや、どのみちもう遅い。#n魑魅一座が団結すれば、いくら陰陽部や百花繚乱であっても――"
70008030-96 = "はいは～い、わかってますよ～"
70008030-97 = "野良犬って1、2匹ならどうってことないんですがねぇ。#nこれが群れると厄介で……。"
70008030-98 = "はぁっ！イズナ流忍法！ペンペンの術！"
70008030-99 = "ぐあああ、痛い！取れちゃうーっ！"
70008030-100 = "たった一人に何を苦戦してんだ！#nさっさと片づけ――ぐあああっ！痛いーっ！"
70008030-101 = "やっぱり、群れる前なら可愛いですね～にゃはは！では、お先に～"
70008030-105 = "天地ニヤぁぁあああ！！！"
70008030-106 = "リーダー！大変です！百花繚乱が乱入してきました！"
70008030-108 = "忍者の次は百花繚乱だと！？"
70008030-112 = "にっ、逃げろーっ！"
70008030-120 = "お、落ち着いてください！数はこちらが上です！連携すれば我々にも勝機が……！"
70008030-121 = "悪の親玉、発見です！お覚悟……っ！"
70008030-122 = "痛っ！！うわああん！せっかく皆を集めたのに！"
70008030-123 = "もう知らないんだからー！"
70008030-135 = "はぁはぁ……逃げ切れた……。"
70008030-136 = "あたしは魑魅一座らしい人間になりたかっただけなのに！どうしてこんなことに……。"
70008030-137 = "魑魅一座・路上流のリーダー……#nアラタ……お前は何がしたいんだ……？"
70008030-138 = "くっ……こんなお面――っ！"
70008030-139 = "そこのあんた。"
70008030-140 = "この声は……。"
70008030-141 = "ああ、お面を貸してくれたお姉さまか――"
70008030-142 = "貸した？奪われたの間違いでしょ？"
70008030-143 = "ヘルメット団たるもの、ヘルメットなくしちゃダメでしょ！……ほんと、予備のヘルメットがあってよかったわ。"
70008030-144 = "うちの大事なヘルメット、無事なのよね？"
70008030-145 = "奪って悪かったな……はいよ。"
70008030-150 = "え、ああ、どうも。なんだ、すんなり返してくれるんだ。"
70008030-155 = "はぁ……。#n見つけたら復讐してやるって思ってたのに――"
70008030-156 = "あんたの落ち込みをみたら、そんな気分でもなくなったわね。#n何があったのよ。"
70008030-157 = "話してどうなるもんでもねぇよ。"
70008030-158 = "分からないじゃない。話すだけでも案外スッキリするものよ。"
70008030-159 = "……魑魅一座らしさって何だと思う……？"
70008030-160 = "魑魅一座？なにそれ？"
70008030-161 = "だよな……。"
70008030-167 = "魑魅一座か何だか知らないけど、この町で暮らしてるんだよね？"
70008030-168 = "だったら、普通に楽しんだら？"
70008030-169 = "普通に……楽しむ……か。"
70008030-170 = "勉強とか部活とか、めんどくさいんでしょ？"
70008030-171 = "そりゃ、まぁ……。"
70008030-172 = "やりたいことをやって、やりたくないことはやらない。それだけよ。"
70008030-173 = "ま……たしかにそうかもな……。"
70008030-174 = "それはそれとして――"
70008030-175 = "ヘルメットを奪われた……違う、貸してあげた対価をもらわないとね。"
70008030-176 = "ええっ！？お金なんてあるわけないだろう！"
70008030-177 = "話は最後まで聞きなさい！#n百鬼夜行の案内をしてくれれば、それでチャラにしてあげる。"
70008030-178 = "初めて来たんだけど……何の下調べもしてないのよね。"
70008030-179 = "えっ、じゃあ神木展望台にもまだ行ってねぇのか？"
70008030-180 = "神木？あの大きな木のこと？"
70008030-181 = "あそこは百鬼夜行の必須コースなんだよ！"
70008030-182 = "仕方ねぇ。百鬼夜行の案内、このあたしに任せておきな！"
70008030-183 = "復活早いわね。"
70008030-184 = "こうしちゃいられねぇ！早く行くぞ！"
70008030-185 = "まずは展望台だ！#n日が落ちてからもいいけど、落ちる前も絶景なんだ！！"
70008030-186 = "ちょっ、置いてかないでってば！"
70008030-188 = "もしかしたら、毎日新たな楽しみを求めるアラタこそ、最も魑魅一座らしいのかもしれない。"
70008030-189 = "今や誰も覚えていないが……かつてその言葉は「何にも縛られぬ者たち」を指していた。その言葉こそ――「魑魅一座」である。"
70008030-190 = "何にも縛られぬ者たち"

70008030-67 = "5;아라타 헬멧;00;어, 어어……? 미, 밀지 마! 나, 나이긴 한데.\n#5;stiff"
70008030-68 = "1;초지일관 망량즈 리더;00;아라타 공. 누구보다 신목제 재개최에 반대하셨던 분이 어째서 이제서 그런 약한 소리를?"

[translation]
70008030-1 = "โหดระห่ำ! ค่ำคืนของปีศาจ! 3"
70008030-2 = "เอาละๆ ดูเหมือนทุกคนจะมารวมกันอยู่ที่นี่แล้ว..."
70008030-3 = "ถ้าอย่างนั้น... จะขอเริ่มชุมนุมค่ำคืนของปีศาจ ณ บัดนี้!"
70008030-13 = "(ว้าว... มีแต่พวกหัวหน้าแก๊งปีศาจเก่งๆ ที่เคยได้ยินชื่อทั้งนั้นเลย... ฮืออ ตื่นเต้นจัง...)"
70008030-14 = "(บางทีฉันอาจจะเป็นคนที่เด๋อด๋าที่สุดในนี้ก็ได้)"
70008030-15 = "(ซุบซิบ...)"
70008030-16 = "นี่ เห็นเด็กคนนั้นรึเปล่า?"
70008030-17 = "ปีนี้ก็มีเด็กที่อันตรายมากๆ อยู่ด้วย"
70008030-18 = "(อ๊าาา...! คงมีคนใหญ่คนโตมาด้วยสินะ! ถึงขนาดที่หัวหน้าคนอื่นๆ ยังประหม่ากันขนาดนี้... ว่าแต่เป็นใครกันเนี่ย?!)"
70008030-23 = "นั่นน่ะ พวกกลุ่มอื่นไม่ใช่เหรอ...? "
70008030-24 = "ได้ยินว่ามีพวกกลุ่มคนสติไม่ดีตระเวนไปรอบๆ เฮียกคิยาโคด้วย..."
70008030-29 = "เงียบ! เงียบก่อน! เงียบบบบ!!"
70008030-33 = "เหตุผลที่เรามารวมตัวกันในวันนี้ก็เพื่อจะหารือเกี่ยวกับทิศทางในอนาคตของแก๊งปีศาจ ไม่ใช่มาคุยเรื่องไม่เป็นเรื่องกันนะคะ"
70008030-37 = "ทุกคนดูมีสติกันบ้างแล้ว งั้นก็จะขอเข้าเรื่องเลยแล้วกันนะ ไม่รู้สึกกันเลยเหรอว่า..."
70008030-38 = "ในช่วงหลังๆ นี้... เฮียกคิยาโคถูกละเลยไปน่ะ?"
70008030-39 = "เรื่องนั้นมันก็จริงนะ รู้สึกว่าช่วงนี้ไม่ค่อยมีใครเกรงกลัวพวกเราเลย"
70008030-40 = "จัดพิธีสักการะต้นไม้ศักดิ์สิทธิ์โดยไม่บอกพวกเราเลยด้วย..."
70008030-41 = "ใช่แล้ว ใช่แล้วละ! รู้สึกได้เลยว่าไม่ให้เกียรติแก๊งปีศาจอย่างพวกเราน่ะ!"
70008030-42 = "คิดแล้วเชียวว่าลึกๆ แล้วทุกคนก็รู้สึกเหมือนกัน"
70008030-43 = "ตอนพิธีสักการะต้นไม้ศักดิ์สิทธิ์ครั้งนั้นก็เกือบจะต้องขายหน้าแล้วเชียว แต่เพราะท่านอาราตะ#nจากแก๊งปีศาจบนท้องถนนได้เสียสละครั้งใหญ่ เราจึงเชิญท่านมาในงานครั้งนี้ด้วย"
70008030-44 = "อะ... เอ๋?! จู่ๆ ก็พูดถึงฉันเหรอ?! ชะ... ใช่แล้วละ~ ก็งานต้นไม้ศักดิ์สิทธิ์น่ะเป็นงานเทศกาลของ#nเฮียกคิยาโค หรือก็คืองานเทศกาลของพวกเรานี่นา... จะยอมปล่อยให้พวกคนนอกทำตามอำเภอใจ#nได้ยังไง..."
70008030-45 = "ส่วนเรื่องที่เกิดขึ้น... ฉันจำได้แค่ว่าเกิดเรื่องวุ่นวายครั้งใหญ่แล้วก็โดนพวกชมรมหยินหยาง#nกับเฮียกกะเรียวรันโมโหยกใหญ่..."
70008030-46 = "นั่นยังไงล่ะ! งานเทศกาลของเฮียกคิยาโคก็ต้องเป็นของชาวเฮียกคิยาโค และเป็นของพวกเราแก๊ง#nปีศาจด้วย! พวกเราแค่พยายามปกป้องสิ่งที่เป็นของเรา แล้วมันมีปัญหาตรงไหนกัน!"
70008030-47 = "พวกเฮียกกะเรียวรันที่เสแสร้งแกล้งทำเป็นว่าปกป้องเฮียกคิยาโคนั้นแท้จริงแล้วเป็นกลุ่มที่ไร้รากฐาน ผู้ปกครองเฮียกคิยาโคที่แท้จริงก็คือแก๊งปีศาจต่างหาก!"
70008030-48 = "ใช่แล้วละ! พูดได้ดีมาก!"
70008030-49 = "ใช่แล้ว พูดถูกเลย!"
70008030-50 = "(ใช่แล้ว นี่แหละ! แบบนี้แหละถึงจะสมกับเป็นแก๊งปีศาจ! ฉันก็แค่สืบสานประเพณีของเฮียกคิยาโคอยู่#nก็เท่านั้น!)"
70008030-51 = "ที่ผ่านมาพวกเราเห็นแก่ชมรมหยินหยางก็เลยปล่อยผ่านไปตลอด แต่ตอนนี้มันถึงเวลาที่จะตัดสิน#nผู้ชนะกันแล้ว!"
70008030-52 = "พวกเราจะประกาศสงครามกับเฮียกกะเรียวรันในงานเทศกาลครั้งต่อไป!"
70008030-54 = "(...? หืม? ประกาศสงครามเหรอ? หมายความว่ายังไงน่ะ?)"
70008030-55 = "ว้าววว! สุดยอด! เอาให้รู้แล้วรู้รอดไปเลย!"
70008030-56 = "ดูเหมือนทุกคนจะคิดตรงกัน ถ้างั้นก็มาลงมือกันเถอะ!"
70008030-57 = "ตอนที่พวกเฮียกกะเรียวรันต้องกระจายกันไปทั่วงานเทศกาลเพื่อรักษาความปลอดภัยเป็นตอนที่พวก#nนั้นเปราะบางที่สุด ระหว่างนี้พวกเราจะแฝงตัวเข้าไปในกลุ่มนักท่องเที่ยว แล้วจู่โจมพวกนั้นพร้อมกัน!"
70008030-58 = "ใช่แล้ว! จัดการพวกนั้นให้ราบคาบกันเลย!"
70008030-59 = "มาทวงคืนงานเทศกาลของเรากันเถอะ! ขับไล่พวกนักท่องเที่ยวและคนนอกออกไปให้หมด!"
70008030-60 = "เดี๋ยวสิ ทำแบบนั้นมัน... จะดีเหรอ?"
70008030-61 = "เมื่อกี้ใครเป็นคนพูดน่ะ...?"
70008030-67 = "อะ... เอ่อ...? ยะ... อย่าผลักสิ ฉันเป็นคนพูดเองแหละ"
70008030-68 = "ท่านอาราตะ ผู้ที่คัดค้านการจัดงานต้นไม้ศักดิ์สิทธิ์ยิ่งกว่าใครอย่างท่าน ทำไมถึงได้พูดจาอ่อนแอ#nเช่นนั้นเล่า?"
70008030-69 = "เปล่าสักหน่อย แต่เรื่องนี้มันไม่เหมือนกับเรื่องนั้นนี่... คะ"
70008030-70 = "งานเทศกาลครั้งนี้ไม่ได้มีปัญหาอะไรเป็นพิเศษ และทุกคนต่างก็กำลังเตรียมงานกันอย่างหนัก... แน่นอนว่าถ้าใช้โอกาสนี้จัดการกับพวกเฮียกกะเรียวรันที่น่ารำคาญได้ก็คงจะดีอยู่หรอก..."
70008030-71 = "แต่การดึงคนที่ไม่เกี่ยวข้องหรือพวกคนที่เตรียมงานเทศกาลมาติดร่างแหไปด้วย... มันเกินไปหน่อย... ไม่ใช่เหรอ... คะ?"
70008030-72 = "ถ้างั้นพวกเราเป็นคนไม่ดีหรือยังไง! ถึงจะเป็นคนไม่ดีจริงๆ ก็เถอะ... ความจริงมันทำให้เจ็บปวดใจนะ!"
70008030-73 = "อุตส่าห์มารวมตัวกันที่นี่แล้วแต่ท่านจะหนีไปคนเดียวเหรอ?!"
70008030-74 = "ช่างน่าผิดหวังจริงๆ ท่านอาราตะ นึกว่าท่านจะเห็นด้วยกว่าใครเสียอีก"
70008030-75 = "แต่ในเมื่อท่านได้ยินสิ่งที่พูดคุยในวันนี้ไปแล้ว ก็คงจะปล่อยไปเฉยๆ ไม่ได้..."
70008030-76 = "อะ... อะไรเนี่ย! ว้ากกก! อย่าเข้ามานะ! คะ... ใครก็ได้ช่วย...!"
70008030-81 = "ได้ยินเรื่องทั้งหมดแล้วค่ะ!"
70008030-85 = "ในเมื่อนินจาอิซุนะได้รับรู้แล้ว ก็ถึงเวลาปิดฉากแผนการร้ายนี้แล้วค่ะ!"
70008030-87 = "นินจา?! ทำไมถึงมีนินจาได้?!"
70008030-88 = "จะว่าไปก็เคยได้ยินมาอยู่เหมือนกันนะ! ว่าพวกชมรมหยินหยางแอบฝึกกองกำลังลับอยู่น่ะ! ไม่คิดเลยว่ากองกำลังลับที่ว่านั่นจะเป็นนินจา!"
70008030-90 = "อะฮ่าฮ่าฮ่า! ใช่แล้วละค่ะ~ ดูออกจนได้สินะคะ!"
70008030-91 = "ตามที่คิดไว้เลยว่าไม่มีอะไรจะน่าสนุกไปกว่าการที่มีนินจาปรากฏตัวตอนที่เรื่องราวกำลังคับขันแบบนี้#nอีกแล้วค่ะ~"
70008030-92 = "นี่มันอะไรกัน...! หัวหน้าชมรมหยินหยาง อามาจิ นิยะ...! ทำไมชมรมหยินหยางถึงได้เข้ามาแทรกแซง#nการชุมนุมของเราแบบนี้!"
70008030-93 = "พูดอะไรไม่เห็นเข้าใจเลยค่ะ~ ฉันแค่ต้องการให้งานเทศกาลครั้งหน้าผ่านไปได้อย่างราบรื่น เลยขอให้รุ่นน้องที่น่ารักคอยสอดส่องดูว่าจะมีปัญหาอะไรหรือเปล่าก็เท่านั้นเอง"
70008030-94 = "โกหกชัดๆ...!"
70008030-95 = "คิดว่าเข้ามาแทรกแซงการชุมนุมของเราแล้วจะรอดไปได้อย่างปลอดภัยเหรอ! หากผนึกกำลังของ#nกลุ่มปีศาจที่อยู่ที่นี่เข้าด้วยกัน ไม่ว่าจะชมรมหยินหยางหรือพวกเฮียกกะเรียวรัน..."
70008030-96 = "ค่า~ ค่า~ นั่นแหละค่ะปัญหา"
70008030-97 = "สุนัขจรจัดจะน่ารักเมื่ออยู่กันแค่ตัวหรือสองตัว แต่ถ้ามันรวมตัวกันเป็นฝูงละก็จะกลายเป็นหมาป่าได้ค่ะ"
70008030-98 = "ย้า! วิถีนินจาอิซุนะ! วิชานินจาเสื่อทาทามิ!"
70008030-99 = "ดะ... เดี๋ยวก่อนสิ ถึงฉันจะเป็นหนึ่งในแก๊งปีศาจ แต่ก็ไม่ได้เลวร้ายขนาดนั้นสักหน่อย! อั่ก!"
70008030-100 = "อีกฝ่ายมีแค่คนเดียวเองนี่! ทำอะไรสักอย่างสิ! อ๊ากกก!"
70008030-101 = "เอาเถอะ~ ก่อนจะรวมกลุ่มกันก็น่ารักดีอยู่หรอกนะคะ~ อะฮ่าฮ่าฮ่า! ฉันกำลังยุ่งอยู่เลย คงต้องขอตัวก่อนนะ~"
70008030-105 = "หน็อยแน่ หัวหน้าชมรมหยินหยาง...!"
70008030-106 = "กะ... เกิดเรื่องใหญ่แล้วค่ะหัวหน้า! เฮียกกะเรียวรันค่ะ! พวกเฮียกกะเรียวรันโผล่มาค่ะ!"
70008030-108 = "ว่าไงนะ? นอกจากนินจาแล้วยังมีพวกเฮียกกะเรียวรันโผล่มาอีกเรอะ?! ฉันขอยอมแพ้ดีกว่า!"
70008030-112 = "ทุกคนหนีเร็ว!"
70008030-120 = "ยะ... หยุดเดี๋ยวนี้นะ! ฝ่ายเรามีจำนวนมากกว่า ถ้าร่วมมือกันสู้ละก็...!"
70008030-121 = "เจอแล้วค่ะ! เจ้าหัวหน้าจอมวายร้าย! ย้าาา!"
70008030-122 = "อั่ก! อ๊าาา! อุตส่าห์รวบรวมทุกคนมาได้แล้วเชียว นี่มันอะไรกัน!"
70008030-123 = "ฉันก็ไม่รู้เหมือนกัน รีบหนีก่อนดีกว่า!"
70008030-135 = "แฮ่ก แฮ่ก... หนีออกมาได้ซะที"
70008030-136 = "นี่มันเรื่องอะไรกันเนี่ย... ฉันก็แค่อยากเป็นปีศาจที่เหมาะสมกับแก๊งปีศาจก็เท่านั้น... แต่กลับโดนไล่ล่าจนต้องวิ่งหนีแบบนี้..."
70008030-137 = "ค่ำคืนของปีศาจที่ตั้งตารอมานานไม่ได้ยิ่งใหญ่อย่างที่คิดเลย..."
70008030-138 = "มันผิดพลาดตั้งแต่ตรงไหนกันแน่..."
70008030-139 = "นี่ เธอน่ะ"
70008030-140 = "อ๊ะ เสียงนี่มัน...!"
70008030-141 = "ขอบคุณท่านพี่ที่ให้ยืมหน้ากากนะ!"
70008030-142 = "ให้ยืมบ้าบออะไรล่ะ! พวกเธอขโมยมันไปต่างหาก!"
70008030-143 = "ถ้าขาดหมวกกันน็อกไปคิดว่าแก๊งหมวกกันน็อกจะเป็นยังไงห้ะ! โชคดีหรอกนะที่ฉันยังมีหมวกกันน็อก#nสำรองอยู่!"
70008030-144 = "นี่ หมวกกันน็อกแสนล้ำค่าของฉันยังปลอดภัยดีใช่มั้ย?"
70008030-145 = "อื้อ นี่ไง เอาไปสิ"
70008030-150 = "โอ้ โอ้ อะไรกัน ยอมคืนง่ายๆ เลยแฮะ... ดูเหมือนจะไม่ได้เสียหายอะไรด้วย"
70008030-155 = "อะไรกัน ฉันกะจะมาแก้แค้นสักหน่อย"
70008030-156 = "แต่ในเมื่อยอมคืนให้ดีๆ แบบนี้ก็ไม่อยากแก้แค้นแล้วละ"
70008030-157 = "ท่านพี่~"
70008030-158 = "ใครเป็นท่านพี่ของเธอกันห้ะ!"
70008030-159 = "การใช้ชีวิตให้สมกับเป็นแก๊งปีศาจคืออะไรกันนะ...?"
70008030-160 = "แก๊งปีศาจ? แก๊งปีศาจคืออะไรน่ะ? แล้วมาถามฉันทำไม?"
70008030-161 = "นั่นสินะ..."
70008030-167 = "ฉันไม่รู้หรอกว่าแก๊งปีศาจคืออะไร แต่พวกเธอเป็นพวกลอยไปลอยมาไปวันๆ ไม่ใช่รึไง? แค่มองแว๊บเดียวก็รู้แล้วเนี่ย"
70008030-168 = "แล้วจะคิดอะไรให้มันปวดหัวอีก? แค่ใช้ชีวิตให้มันสนุกก็พอแล้ว"
70008030-169 = "สนุกเหรอ?"
70008030-170 = "ใช่น่ะสิ ที่ทำแบบนี้ก็เพราะไม่ชอบเรียนกับเข้ากิจกรรมชมรมไม่ใช่รึไง?"
70008030-171 = "มันก็ใช่..."
70008030-172 = "งั้นจะมาเสียเวลาคิดให้รกสมองทำไม แค่ทำสิ่งที่อยากทำ ไม่อยากทำก็ไม่ต้องทำแค่นั้น"
70008030-173 = "งั้นเหรอ...? ก็น่าจะเป็นอย่างนั้นละนะ... อืม..."
70008030-174 = "นี่..."
70008030-175 = "ฉันคงต้องขอค่าตอบแทนที่เธอขโมย... ไม่สิ ที่เธอยืมหมวกกันน็อกไปสักหน่อยแล้ว"
70008030-176 = "ว่าไงนะ? ฉะ... ฉันไม่มีเงินหรอก!"
70008030-177 = "ฉันไม่ใช่พวกนักเลงรีดไถนะ! ถึงท่าทางจะเหมือนก็เถอะ เอาเถอะๆ ฉันกับเพื่อนๆ เพิ่งเคยมาที่#nเฮียกคิยาโคครั้งแรกน่ะ เพราะงั้นช่วยนำทางให้หน่อยได้มั้ย"
70008030-178 = "พวกเราไม่รู้จักสถานที่ท่องเที่ยวของที่นี่เลย"
70008030-179 = "ว่าไงนะ? เพิ่งเคยมาที่เฮียกคิยาโคเหรอ? งั้นแสดงว่ายังไม่เคยไปที่จุดชมวิวต้นไม้ศักดิ์สิทธิ์สินะ"
70008030-180 = "จุดชมวิวอะไรนะ? อ๋อ ไอ้ต้นไม้ใหญ่ๆ น่ะเหรอ? มีจุดชมวิวด้วยเหรอ?"
70008030-181 = "เหลือเชื่อ! ถ้ายังไม่เคยไปที่นั่นก็ไม่นับว่ามาถึงเฮียกคิยาโคแล้วหรอกนะ!"
70008030-182 = "ไปกันเดี๋ยวนี้เลย!"
70008030-183 = "อะ... เอ๋? กลับมาร่าเริงแล้วก็ดีอยู่หรอก แต่รู้สึกจะร่าเริงเร็วเกินไปรึเปล่า?"
70008030-184 = "มัวชักช้ามันเสียดายเวลานะ!! ถึงตอนพระอาทิตย์ตกมันก็สวยดีหรอก แต่วิวที่มองเห็นจากจุดชมวิวน่ะ ดูตอนที่ยังมีแสงอาทิตย์อยู่สวยกว่าเป็นไหนๆ เลย!"
70008030-185 = "รีบไปกันเถอะ!! ตามมาเร็วท่านพี่!!"
70008030-186 = "ก็บอกว่าอย่าเรียกท่านพี่ไงเล่า!!"
70008030-188 = "ไม่เพียงแค่อาระตะ แต่ในตอนนี้แทบไม่มีใครจำได้แล้วว่า \"แก๊งปีศาจ\" เป็นคำที่ใช้เรียกขานผู้ที่ไม่#nยึดติดกับสิ่งใด"
70008030-189 = "ซึ่งอาราตะที่คอยตามหาความสนุกสนานใหม่ๆ อยู่ทุกขณะ อาจจะเป็นผู้ที่เหมาะที่สุดกับชื่อ \"แก๊งปีศาจ\" แล้วก็ได้"
70008030-190 = "โหดระห่ำ! ค่ำคืนของปีศาจ!"

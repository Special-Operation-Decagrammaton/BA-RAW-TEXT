70008030-72 = "1;초지일관 망량즈 리더;00\n5;아라타 헬멧;00\n#na;망량즈들 무소속;그럼 우리가 나쁜 놈이라는 거냐! ……나쁜 놈이긴 하지만! 사실이라도 상처가 된다고!"
70008030-73 = "1;초지일관 망량즈 리더;00\n5;아라타 헬멧;00\n#na;망량즈들 무소속;여기까지 와서 자기만 쏙 빠지겠다는 거야?!"
70008030-74 = "1;초지일관 망량즈 리더;00;실망했습니다. 아라타 공. 누구보다 앞장설 줄 알았는데."
70008030-75 = "1;초지일관 망량즈 리더;00;하지만 오늘 회합의 내용을 전부 들은 이상, 그냥 보내줄 수는…….\n#1;m2\n#1;greeting"

[translation]
70008030-1 = "Fierce! Mouryo Night! 3"
70008030-2 = "Now, now, since it looks like everyone's here..."
70008030-3 = "We'll begin...this year's Mouryo Night!"
70008030-13 = "(Wow... They're all super-famous Mouryo leaders... Ugh, I'm gettin' nervous...)"
70008030-14 = "(Am I...the worst dressed here?!)"
70008030-15 = "*mumble* *mumble*"
70008030-16 = "Hey, did you see her?"
70008030-17 = "There's a dangerous attendee this year..."
70008030-18 = "(Aaah...! If she's making high-rankin' leaders like this nervous, she must be really important!)"
70008030-23 = "Isn't she from a different affiliation...?"
70008030-24 = "I've heard that, outside of Hyakkiyako, there are crazy people like that..."
70008030-29 = "Silence! Silence! Sileeeeence!"
70008030-33 = "We have gathered here today to discuss the future of the Mouryo, not to chit-chat."
70008030-37 = "Do I have everyone's attention? Good, let's proceed. How has it been in Hyakkiyako as of late?"
70008030-38 = "It feels like we've been being ignored lately... Anyone else?"
70008030-39 = "That's... I agree. We don't elicit the same kind of fear we used to."
70008030-40 = "Like when they held the Tree of Deities ritual without even telling us!"
70008030-41 = "Yeah, yeah! They're not respecting the Mouryo name!"
70008030-42 = "It seems we're all in agreement."
70008030-43 = "Even during the Tree of Deities ritual, we almost met with utter humiliation. However, Arata of the Street Mouryo's protest contributed greatly to our cause, which is why we invited her here today."
70008030-44 = "E-Eh?! M-Me?! R-Right...! The Tree of Deities ritual is Hyakkiyako's festival, meaning, it's our festival... So I couldn't let those outsiders just do whatever they wanted..."
70008030-45 = "Did I contribute...? All I remember is getting yelled at by the Yin-Yang Club and the Hyakkaryouran for causing trouble again, though..."
70008030-46 = "That's exactly it! What's Hyakkiyako's belongs to Hyakkiyako, and therefore, belongs to us Mouryo! We're only trying to protect what's ours!"
70008030-47 = "That high and mighty Hyakkaryouran is run by charlatans who claim to be \"protecting\" OUR Hyakkiyako! That's right! Hyakkiyako belongs to us, the Mouryo!"
70008030-48 = "Exactly! What she said!"
70008030-49 = "Yeah, yeah!"
70008030-50 = "(Yes, this is what it's all for! This is what it means to be Mouryo! I was protectin' the traditions of Hyakkiyako!)"
70008030-51 = "Sure, we've been letting things slide to help the Yin-Yang Club save face, but it's time for the true winner of this power struggle to be decided!"
70008030-52 = "Which is why we are declaring war against the Hyakkaryouran for the next festival!"
70008030-54 = "(...D-Declarin' war? What... What does she mean?)"
70008030-55 = "Hell yeah! It's time to show them who's boss!"
70008030-56 = "We're all in agreement! Let's get to it already!"
70008030-57 = "The Hyakkaryouran will be most vulnerable when they're dispersed for festival security. That's when we'll strike! Hide amongst the tourists and ambush them!"
70008030-58 = "We're gonna wipe every last one of them out!"
70008030-59 = "We'll retake what's rightfully ours! Take back the festivals and chase out the outsiders!"
70008030-60 = "Um...isn't that...not the best idea?"
70008030-61 = "...Who said that?"
70008030-67 = "H-Huh...? D-Don't push! Well...yeah... I-It was me."
70008030-68 = "Arata. You, who openly opposed the Tree of Deities ritual, are the last person I would expect to show such weakness."
70008030-69 = "No, that was a totally different situation! ...Kind of."
70008030-70 = "It's not like they're doin' anythin' wrong with this festival...and all the citizens are workin' real hard to get it ready... I mean, don't get me wrong, I like the idea of teachin' those Hyakkaryouran jerks a lesson as much as the next Mouryo... It's just that..."
70008030-71 = "A lot of unrelated people will become collateral damage, you know? It's sort of..."
70008030-72 = "You callin' US the bad guys here?! I mean, technically we are, but that doesn't mean you should say it! I'm sensitive!"
70008030-73 = "And you tryna back out after finally making it here?!"
70008030-74 = "I'm disappointed, Arata. And here, I'd hoped you would be the one to lead them."
70008030-75 = "However, since you've heard our plans, we can hardly just let you go."
70008030-76 = "Wh-What the?! No! Get away! Someone, help me!!"
70008030-81 = "We heard everything!"
70008030-85 = "Ninja Izuna is here to put a stop to your evil plot!"
70008030-87 = "A ninja?! A NINJA?!"
70008030-88 = "I-I've heard about them! They say that the Yin-Yang Club has been training secret agents, but I didn't think they were ninjas!"
70008030-90 = "Nyahahaha! That's exactly it! You've got good intel!"
70008030-91 = "There's nothing more fun—I mean, better than a ninja plot twist to spice up a boring story."
70008030-92 = "The Yin-Yang Club president, Amachi Niya! How dare you break into here?! You're supposed to operate with absolute neutrality!"
70008030-93 = "I have nooo clue what you're talking about. I was just making sure we had our ducks in a row for the next festival, and my adorable little junior came to investigate!"
70008030-94 = "D-Do you think you can get away with such obvious deception?!"
70008030-95 = "How presumptuous, to think you can interrupt our meeting and walk out unscathed! Not even the Yin-Yang Club or the Hyakkaryouran can stand up against the full force of the Mouryo!"
70008030-96 = "Ding, ding, ding! That's exactly why we're here!"
70008030-97 = "I'm quite partial to a cute little stray dog or two, but I can't abide by a pack of wolves."
70008030-98 = "Hi-yah! Izuna-Style Don't be Naughty Technique!"
70008030-99 = "W-Wait, by Mouryo standards, I'm not that naughty!"
70008030-100 = "She's just one person! Do something! KYAAAH!"
70008030-101 = "Aw, they're actually quite cute, even as a half-formed pack. Nyahahaha! Well then, I have matters to attend to, so if you'll excuse me."
70008030-105 = "Yin-Yang Club President...! You little...!"
70008030-106 = "B-Bad news, Supreme Leader! It's the Hyakkaryouran! The Hyakkaryouran is here!"
70008030-108 = "What?! Ninjas, and now the Hyakkaryouran?! I didn't sign up for this! I'm out!"
70008030-112 = "Run, everyone! Run!"
70008030-120 = "W-Wait! With this many of us, if we just join forces—"
70008030-121 = "Found you! The evil mastermind! Hi-yah!"
70008030-122 = "Ouch! Waaah! I worked so hard to gather everyone!"
70008030-123 = "Forget this! Abandon the plan!"
70008030-135 = "*pant* *pant* I barely got out."
70008030-136 = "What...just happened? All I wanted was to become a true Mouryo...but in the end it was the same thing as usual... I got chased...and had to run away..."
70008030-137 = "And the Mouryo Night I was looking forward to wasn't even that cool..."
70008030-138 = "Where did everything go wrong...?"
70008030-139 = "Hey, you."
70008030-140 = "Ah, I know that voice!"
70008030-141 = "The one who lent me her cool mask!"
70008030-142 = "LENT you?! You just ran up and snatched it off my head!"
70008030-143 = "What's a Helmet Gangster supposed to do without her helmet?! I was lucky I had a spare on me!"
70008030-144 = "Hey, it's not damaged at all, is it? That helmet's really important to me."
70008030-145 = "Oh. Not a scratch. Here you go."
70008030-150 = "O-Oh. Huh, that was easier than I thought it'd be...and it looks like you took good care of it."
70008030-155 = "...I came after you to get revenge."
70008030-156 = "But you look so sad... I just lost all motivation."
70008030-157 = "BIG SIIIS!"
70008030-158 = "Who are you calling your sister?!"
70008030-159 = "What's it mean to be Mouryo?"
70008030-160 = "Mouryo? What's a \"Mouryo\"? What are you even saying?"
70008030-161 = "I should've figured..."
70008030-167 = "Look, I don't know anything about this Mouryo business, but you kids are living life the way you want here, ain't you? I can tell just by looking at you."
70008030-168 = "So why're you overthinking it? Just enjoy living."
70008030-169 = "Enjoy...living?"
70008030-170 = "Uh, yeah. I mean, you're doing all this because you don't like studying or clubs, or any of that normie nonsense, right?"
70008030-171 = "Yeah...that's true..."
70008030-172 = "Then what're you worrying about? Do what you want to do, and don't do things you don't want to do."
70008030-173 = "Huh... Really? I think that makes sense... Hm..."
70008030-174 = "...Hey."
70008030-175 = "I'm going to need you to pay me back for taking... I mean, borrowing my helmet."
70008030-176 = "What?! I-I don't have any money!"
70008030-177 = "Hey! I ain't some common thug! Well... Kind of, but at least don't treat me like that. I don't want money, but my friends and I are in Hyakkiyako for the first time. So, like, show us around."
70008030-178 = "We don't know where all the cool spots are."
70008030-179 = "What? This is your first time in Hyakkiyako? Does that mean you haven't been to the Tree of Deities Observatory yet?"
70008030-180 = "Huh? Ah, that giant tree? There's an observatory there?"
70008030-181 = "No way! You can't say you visited Hyakkiyako if you haven't seen the observatory!"
70008030-182 = "Let's go! Right now!"
70008030-183 = "H-Huh? I'm glad you're feeling better, but was it really that easy?"
70008030-184 = "Stop wastin' time!! The sunset from the observatory is really pretty and all, but you really gotta see the view while the sun's still up!"
70008030-185 = "Hurry!! Follow me, big sis!!"
70008030-186 = "Stop calling me your sister!!"
70008030-188 = "Almost no one, including Arata, remembers that the term \"Mouryo\" originally meant people who were completely free, bound to nothing."
70008030-189 = "Perhaps Arata, who seeks new kinds of fun in every moment, is the Mouryo-est of them all."
70008030-190 = "Fierce! Mouryo Night!"

[translation]
10014030-1 = "第3話;就算材料各不相同"
10014030-5 = "……咦，老師？"
10014030-6 = "[s] 「你好呀，愛莉。」"
10014030-7 = "你好，老師！#n怎麼了嗎？"
10014030-8 = "嗯？老師？"
10014030-9 = "真的是老師。突然過來有什麼事嗎？"
10014030-10 = "[s1] 「沒什麼特別的事哦。」\n[s2] 「突然想來看看而已。」"
10014030-11 = "哼……真的嗎？#n總覺得是在說謊呢。"
10014030-12 = "哼……真的嗎？#n總覺得是在說謊呢。"
10014030-13 = "嘛，有什麼事的話就直接說吧。#n看起來你也不像是單純想過來看看而已。"
10014030-14 = "……嗯？"
10014030-15 = "我們……？"
10014030-16 = "……怎麼突然這樣。我們沒有怎麼樣啊……"
10014030-17 = "我，我們怎麼了嗎！？#n什，什麼都沒有唷……！？"
10014030-18 = "愛，愛莉！？#n為什麼突然這麼慌張？"
10014030-19 = "呃，害我都有點怕了，到底發生什麼事了？"
10014030-20 = "哼哼哼……看來我們的想法一致呢。"
10014030-22 = "……夏？"
10014030-24 = "看來可以停止不必要的試探了。"
10014030-25 = "我們擔心的事，還有老師擔心的事。"
10014030-26 = "所有的想法都朝向相同的目標。#n我們的思考所到達的終點是一樣的。"
10014030-27 = "……名為杏山千紗的終點。"
10014030-28 = "夏醬……"
10014030-29 = "……？？？"
10014030-30 = "咦？突然在說什麼？千紗怎麼了嗎？"
10014030-31 = "喜，喜美醬……昨天的事……#n難道你忘記了嗎？"
10014030-32 = "……昨天？"
10014030-33 = "……啊，你說打架那件事嗎？#n有個奇怪的傢伙跑過來說什麼要決鬥還有先手必勝之類的那個？"
10014030-34 = "[s3] 「果然是這樣啊。」\n[s4] 「大家都見過澪紗了呢。」"
10014030-35 = "……所以那又怎麼了嗎？#n打架也不是什麼稀奇的事吧。"
10014030-36 = "……所以那又怎麼了嗎？#n打架也不是什麼稀奇的事吧。"
10014030-37 = "那孩子那麼急躁，樹敵很多也不奇怪吧。#n自作自受啦，自作自受。"
10014030-38 = "所以說平常對朋友好一點不就好了嗎。"
10014030-39 = "[s5] 「……原來如此，你們是這麼看他的呀。」\n[s6] 「朋友……我大概明白了。」"
10014030-40 = "……怎麼了，自言自語嗎？"
10014030-41 = "……怎麼了，自言自語嗎？"
10014030-42 = "不，事情是這樣的……喜美醬……"
10014030-43 = "該說是跟其他的不太一樣嗎……"
10014030-44 = "那個……"
10014030-48 = "……沒事，抱歉。#n沒什麼。"
10014030-49 = "喜美醬現在這樣就很好了。"
10014030-50 = "……？？？"
10014030-51 = "……什麼？我怎麼突然覺得有點火大。"
10014030-55 = "老師會過來我們這邊……#n難道是想要交換情報嗎？"
10014030-56 = "和平常不同的氣氛，似乎感覺到了什麼的狀況……#n彷彿碰到了不該接觸的東西的不安全感。"
10014030-57 = "但是，我不覺得老師是抱著這種想法過來的呢。"
10014030-58 = "或許……#n這就像是本人所不期望看到的，被燒毀的硬幣的背面。"
10014030-59 = "既然如此，老師又為何會來找我們呢。"
10014030-60 = "難道……"
10014030-61 = "……並不是想確認千紗，而是想確認「我們」的想法啊。#n老師就是這種人呢。"
10014030-62 = "[s7] 「然後沒有發現問題。」\n[s8] 「看來沒問題，太好了。」"
10014030-63 = "啊哈哈……#n畢竟千紗醬就是千紗醬呀。"
10014030-64 = "啊哈哈……#n畢竟千紗醬就是千紗醬呀。"
10014030-65 = "雖然我們並不清楚那位宇沢澪紗究竟是個怎樣的人……"
10014030-66 = "那個，就算他們兩個之間發生過什麼我們不知道的事……#n這也不會改變的。"
10014030-67 = "沒錯。我們的團結沒有動搖，並且將來也不會動搖。"
10014030-68 = "如果僅僅因為材料之間的質感不同以及原產地不同這種問題就不得不分道揚鑣的話，「甜點」是永遠不會完成的唷。"
10014030-69 = "這正是……#n放學後的甜點部的我們必須要明白的道理。"
10014030-70 = "不如說……#n如果有什麼我們能為千紗醬做的事，歡迎隨時連絡我們。"
10014030-71 = "我們也和老師一樣擔心千紗醬哦！"
10014030-74 = "……咦？#n大家從剛剛開始就在說些什麼？"
10014030-75 = "不過就是打個架而已也太誇張了……"
10014030-76 = "活著總是會遇到這種事的吧。#n俗話說不打不相識。"
10014030-77 = "[s9] 「不好意思，你們兩個同年唷。」\n[s10] 「聽喜美這麼說真有感觸呢。」"
10014030-78 = "這有需要吐槽嗎！？#n只是有這麼句話而已，俗諺罷了！！"
10014030-79 = "這有需要吐槽嗎！？#n只是有這麼句話而已，俗諺罷了！！"
10014030-80 = "真是的……千紗也不是喜歡打架的人吧。"
10014030-81 = "而且！老師也真是的！"
10014030-82 = "明明只是小事而已，這麼大驚小怪的……"
10014030-86 = "……嗯？這是什麼？"
10014030-87 = "老師，你的照片好像掉了唷。"
10014030-88 = "[s] 「啊，那個是……」"
10014030-90 = "[ns11] 「等等！STOP！！」\n[ns12] 「不能看那個！」"
10014030-91 = "咦？不能看嗎？為什麼？"
10014030-92 = "咦？不能看嗎？為什麼？"
10014030-93 = "咦……這張照片……#n這個人是……"
10014030-95 = "穿著長裙還把口罩拉到下巴……是「組織」的人沒錯。"
10014030-96 = "……咦？等一下。#n這張臉……"
10014030-97 = "臉？誰的？#n……咦。"
10014030-98 = "……咦。"
10014030-105 = "咦咦咦咦咦咦──！？！？"

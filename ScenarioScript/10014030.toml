[translation]
10014030-1 = "ตอนที่ 3; วัตถุดิบของใครของมัน"
10014030-5 = "เอ๊ะ...? คุณครูคะ?"
10014030-6 = "[s] \"สวัสดีนะ ไอริ\""
10014030-7 = "สวัสดีค่ะ คุณครู! มาที่นี่ได้ยังไงกันคะ?"
10014030-8 = "อะไรน่ะ? คุณครูเหรอ?"
10014030-9 = "จริงด้วยแฮะ อะไรกัน ทำไมจู่ๆ ก็มาหากันโดยที่ไม่บอกไม่กล่าวกันก่อนเลยล่ะ?"
10014030-10 = "[s1] \"ก็ไม่ได้มีเรื่องอะไรมากมายหรอก\"\n[s2] \"แค่แวะมาเฉยๆ น่ะ\""
10014030-11 = "หืม... โกหกกันเหรอไงน่ะ? ไม่อยากจะเชื่อเลย"
10014030-12 = "หืม... โกหกกันเหรอไงน่ะ? ไม่อยากจะเชื่อเลย"
10014030-13 = "ถ้ามีธุระอะไรก็พูดมาได้เลย ดูก็รู้แล้วว่าไม่ได้จะแค่แวะมาเฉยๆ น่ะ"
10014030-14 = "หืม...? ว่ายังไงนะ? "
10014030-15 = "ทางฝั่งพวกเราไม่มีอะไรเกิดขึ้นเลยอย่างนั้นน่ะเหรอ...?"
10014030-16 = "...? เรื่องอะไรน่ะ? จู่ๆ ก็หมายถึงอะไรน่ะ? มีเรื่องอะไรเหรอ?"
10014030-17 = "พะ... พวกเราเหรอคะ!? เกี่ยวกับเราเหรอคะ!? ตะ... แต่ว่าไม่ได้มีเรื่องอะไรนะคะ...!?"
10014030-18 = "อะ... ไอริ!? ทำไมจู่ๆ ถึงตกใจล่ะ?"
10014030-19 = "อะไรกัน? มีเรื่องอะไรเหรอ? สรุปว่ามีเรื่องอะไรเกิดขึ้นกันแน่?"
10014030-20 = "ดูเหมือนว่าจะพูดถึงเรื่องเดียวกันนะ..."
10014030-22 = "นัตสึ...?"
10014030-24 = "คิดว่าตอนนี้น่าจะถึงเวลาเลิกพูดคุยเรื่องที่ไม่จำเป็นได้แล้วนะ"
10014030-25 = "เรื่องที่พวกเรากำลังกังวลและเรื่องที่คุณครูกังวล"
10014030-26 = "ความกังวลเหล่านั้นมุ่งหน้าไปยังเป้าหมายเดียวกัน สุดท้ายแล้วความกังวลเหล่านั้นของพวกเราก็จะ#nไปถึงปลายทางเดียวกัน"
10014030-27 = "เคียวยามะ คาซึสะ.... ก็คือชื่อนั้นนั่นเอง"
10014030-28 = "นัตสึจัง..."
10014030-29 = "...????"
10014030-30 = "อะไรน่ะ? หมายความว่ายังไง? คาซึสะทำไมเหรอ??"
10014030-31 = "ยะ... โยชิมิจัง... คือว่าเรื่องเมื่อวานนี้น่ะ... จำไม่ได้เหรอ?"
10014030-32 = "เมื่อวาน...?"
10014030-33 = "อ้อ... เรื่องทะเลาะวิวาทน่ะเหรอ? ที่มีคนแปลกๆ มาหาแล้วก็ทะเลาะกันใหญ่โต?"
10014030-34 = "[s3] \"ว่าแล้วเชียว เกิดเรื่องแบบนั้นสินะ\"\n[s4] \"ทุกคนเจอกับเรอิสะแล้วสินะ\""
10014030-35 = "แล้วไง...? แล้วมันทำไมล่ะ? เรื่องทะเลาะวิวาทก็มีกันอยู่ทุกวันไม่ใช่เหรอ?"
10014030-36 = "แล้วไง...? แล้วมันทำไมล่ะ? เรื่องทะเลาะวิวาทก็มีกันอยู่ทุกวันไม่ใช่เหรอ?"
10014030-37 = "ก็ยัยนั่นเป็นคนใจร้อนตั้งขนาดนั้น คงจะมีศัตรูไปทั่วเลยละสิท่า คงจะกรรมตามสนองแล้วละ"
10014030-38 = "ถ้าไม่อย่างนั้นเวลาปกติก็ควรจะหัดทำตัวดีๆ กับเพื่อนคนอื่นบ้างสิ~"
10014030-39 = "[s5] \"ว่าแล้วเชียว... กลายเป็นแบบนั้นไปสินะ\"\n[s6] \"เพื่อนคนอื่นเหรอ ก็พอเข้าใจอยู่หรอกนะ...\""
10014030-40 = "...? อะไรเล่า ทำไมเอาแต่พูดคนเดียวอีกแล้ว?"
10014030-41 = "...? อะไรเล่า ทำไมเอาแต่พูดคนเดียวอีกแล้ว?"
10014030-42 = "เปล่าหรอก คือว่า... โยชิมิจัง..."
10014030-43 = "จะบอกว่ารู้สึกว่าแปลกไปได้มั้ยนะ เราไม่รู้ก็เลยกังวล..."
10014030-44 = "เพราะงั้น..."
10014030-48 = "อืม... ไม่มีอะไรหรอก โยชิมิจัง"
10014030-49 = "โยชิมิจังที่เป็นแบบนี้ก็ดีอยู่แล้วละ"
10014030-50 = "...???"
10014030-51 = "อะไรน่ะ...? จู่ๆ ก็หงุดหงิดแฮะ?"
10014030-55 = "คุณครูถึงกับมาหาพวกเราแล้วถามด้วยตัวเองแบบนี้... หรือว่าอยากจะมาแลกเปลี่ยนข้อมูลงั้นเหรอ?"
10014030-56 = "บรรยากาศเหมือนมีอะไรบางอย่างต่างออกไปจากเดิม... ความไม่สบายใจที่เหมือนไปแตะต้องของ#nหวงห้ามเข้าน่ะ"
10014030-57 = "ไม่หรอก ฉันไม่คิดว่าคุณครูจะเข้ามายุ่งเกี่ยวกับเรื่องนี้เพราะมีเจตนาแบบนั้นหรอก"
10014030-58 = "เพราะว่าเรื่องนั้น... อาจจะเป็นด้านหลังของเหรียญที่มันไหม้ไปแล้ว ที่เจ้าตัวก็ไม่ต้องการก็เป็นได้"
10014030-59 = "ถ้าอย่างนั้นทำไมคุณครูต้องมาหาพวกเราแล้วถามถึงเรื่องนี้ด้วยล่ะ"
10014030-60 = "เรื่องนั้นน่ะ..."
10014030-61 = "เพราะอยากจะฟังเรื่องนั้นจาก 'พวกเรา' แทน ไม่ใช่แค่กับคาซึสะละสิ ก็คุณครูเป็นคนแบบนั้นนี่นา"
10014030-62 = "[s7] \"ก็ดูไม่ได้มีปัญหาอะไรนะ\"\n[s8] \"ทุกคนไม่เป็นอะไร ครูก็สบายใจแล้ว\""
10014030-63 = "อะฮะฮ่า... คือว่า ไม่ว่าจะมีเรื่องอะไร คาซึสะจังก็คือคาซึสะจังนี่คะ"
10014030-64 = "อะฮะฮ่า... คือว่า ไม่ว่าจะมีเรื่องอะไร คาซึสะจังก็คือคาซึสะจังนี่คะ"
10014030-65 = "พวกเราไม่รู้จักคนที่ชื่ออุซาวะ เรอิสะก็จริง..."
10014030-66 = "และถึงแม้ว่าเราจะไม่รู้เรื่องที่เกิดขึ้นระหว่างสองคนนั้น... แต่ก็ไม่มีอะไรต่างไปหรอกค่ะ"
10014030-67 = "ใช่แล้ว ไม่อาจสั่นคลอนความเป็นหนึ่งเดียวของพวกเราได้ และก็จะไม่มีทางทำได้"
10014030-68 = "ถ้าต้องแบ่งแยกกันไปตามต้นกำเนิดหรือคุณภาพของวัตถุดิบ 'ขนมหวาน' ก็จะไม่มีวันสมบูรณ์น่ะสิ"
10014030-69 = "และพวกเรา... ชมรมของหวานหลังเลิกเรียนก็เข้าใจเรื่องนั้นเป็นอย่างดี"
10014030-70 = "หรือว่า... ถ้ามีอะไรที่พวกเราพอจะช่วยคาซึสะจังได้ละก็ ติดต่อมาได้ทุกเมื่อเลยนะคะ"
10014030-71 = "พวกเราก็เป็นห่วงคาซึสะเหมือนกันกับคุณครูค่ะ!"
10014030-74 = "อะไรน่ะ...? ทำไมบรรยากาศแปลกๆ ไปตั้งแต่เมื่อกี้แล้ว?"
10014030-75 = "เมื่อไม่กี่วันนี้เหมือนจะวุ่นวายอยู่กับการต่อสู้นะ..."
10014030-76 = "ชีวิตก็แบบนี้แหละนะ เด็กๆ น่ะพอได้ต่อสู้กันเดี๋ยวก็โตขึ้นเอง ขณะที่สู้ๆ กันไปนั่นแหละ"
10014030-77 = "[s9] \"โทษทีนะ ทั้งสองคนอายุเท่ากันไม่ใช่เหรอ\"\n[s10] \"พอโยชิมิพูดแบบนั้นก็รู้สึกแปลกใหม่ดีนะ\""
10014030-78 = "ทำไมต้องยั่วโมโหกันอีกแล้วเนี่ย!! ก็แค่พูดไปอย่างนั้นน่ะ พูดไปเฉยๆ!!"
10014030-79 = "ทำไมต้องยั่วโมโหกันอีกแล้วเนี่ย!! ก็แค่พูดไปอย่างนั้นน่ะ พูดไปเฉยๆ!!"
10014030-80 = "จริงๆ เลย เดี๋ยวใครมาได้ยินเข้าคงนึกว่าคาซึสะเคยเป็นพวกนักเลงมาก่อนแน่ๆ เลย"
10014030-81 = "เอาเถอะ! คุณครูก็เป็นคุณครูนะ!"
10014030-82 = "ทำไมต้องตื่นตระหนกกับเรื่องไม่เป็นเรื่องแค่นี้ด้วย..."
10014030-86 = "...? หือ? อะไรน่ะ?"
10014030-87 = "คุณครู ทำรูปหล่นน่ะ"
10014030-88 = "[s] \"อ่า นั่นมัน...\""
10014030-90 = "[ns11] \"เดี๋ยวก่อน อย่าเพิ่ง-!!\"\n[ns12] \"ดูไม่ได้นะ!!\""
10014030-91 = "??? หา? ดูไม่ได้เหรอ? อะไรกัน?"
10014030-92 = "??? หา? ดูไม่ได้เหรอ? อะไรกัน?"
10014030-93 = "เอ๊ะ... รูปนี้... คนนี้มัน..."
10014030-95 = "สายตาที่มองลงมาที่เสื้อโค้ทยาว แมสก์ที่ปิดมาถึงคาง... เป็นคนของ 'องค์กร' ที่ไม่ยอมตกต่ำสินะ"
10014030-96 = "...? เดี๋ยวนะ... หน้าแบบนี้..."
10014030-97 = "หน้า? หน้าแบบไหน? …อ่อ"

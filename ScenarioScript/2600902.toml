[translation]
2600902-1 = "參考資料是……？"
2600902-2 = "遊戲開發部．部室"
2600902-3 = "（因為工作來到了千年，順路去了遊戲開發部）"
2600902-7 = "（不過部室裡空無一人……）"
2600902-11 = "[ns] 為了掛外衣而打開置物櫃"
2600902-16 = "噫，噫呀！？"
2600902-17 = "啊，老，老師……！？你怎麼會在這裡……"
2600902-18 = "[ns1]「抱歉，我以為大家都出去了。」\n[ns2]「我買了一些零食來招待你們……」"
2600902-22 = "[ns]「話說，你怎麼穿著女僕裝……？」"
2600902-23 = "啊，這是那個……因為一些原因……"
2600902-24 = "不，不是，不是被別人逼著穿上，#n是我自己主動穿的……！"
2600902-25 = "可，可是，該說不是因為想穿才穿的嗎……"
2600902-26 = "總之請先讓我說明一下……！"
2600902-28 = "（讓柚子冷靜下來後，聽了他的說明）"
2600902-30 = "[ns]「……參考資料？」"
2600902-31 = "是的，那個……"
2600902-32 = "我想在現在正在開發的遊戲裡讓女僕角色登場……"
2600902-33 = "不過女僕裝的構造很複雜，#n綠說「沒有參考資料很難畫」……"
2600902-34 = "所以……就由我穿上女僕裝擔任模特兒了……"
2600902-35 = "[s]「事情我明白了。不過為什麼躲在置物櫃裡？」"
2600902-36 = "那個……綠回宿舍拿忘記帶的東西了。"
2600902-37 = "所以，我就一個人穿著女僕裝在這裡等……#n卻莫名感到不安……"
2600902-38 = "萬一有其他學生到部室裡來，看到我穿成這個樣子……"
2600902-39 = "……一定，會被大家笑的。"
2600902-40 = "[s]「我覺得老實說你在當模特兒就好了……」"
2600902-41 = "……可是我的身材又不像C&C的前輩們那麼好……"
2600902-42 = "還完全沒有自信……"
2600902-43 = "我這種人當模特兒，誰也不會相信的……"
2600902-44 = "[s3]「不用擔心哦，柚子穿什麼都很可愛。」\n[s4]「柚子穿女僕裝的樣子最棒了！」"
2600902-47 = "咦，咦！？突然在說什麼……！？"
2600902-48 = "[s5]「不用在意其他人怎麼想。」\n[s6]「柚子是為了遊戲在努力。」"
2600902-57 = "……呵呵，說的也對。"
2600902-58 = "我之所以會當模特兒，也是為了做出好的遊戲。"
2600902-59 = "如果抱持著這種半吊子的心態，#n對期待著的粉絲也會很失禮的。"
2600902-60 = "謝謝你，老師。"
2600902-61 = "托你的福，讓我有了一些勇氣。"
2600902-62 = "不過穿成這樣果然還是很害羞，現在就先換回──"
2600902-68 = "柚子部長～你在嗎～？"
2600902-69 = "想請你在這期的決議書上簽名──"
2600902-74 = "啊……呃……"
2600902-75 = "咦，女僕裝……？#n還有夏萊的老師……？"
2600902-76 = "這，這是……那個……"
2600902-77 = "啊啊……抱歉。我好像打擾兩位了……"
2600902-78 = "不是……這，這是有原因──！"
2600902-80 = "請兩位慢慢來！"
2600902-82 = "嗚，嗚啊啊啊啊啊……！"
2600902-84 = "（之後，為了安慰躲進櫃子裡的柚子費了好一番功夫）"

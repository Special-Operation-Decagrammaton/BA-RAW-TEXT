[translation]
2600902-1 = "แบบอ้างอิงของชุดเมด"
2600902-2 = "ห้องชมรมพัฒนาเกม"
2600902-3 = "(คุณครูแวะไปทำงานของชาเล่ต์ที่โรงเรียนมิลเลเนียม เลยถือโอกาสนี้แวะไปให้กำลังใจนักเรียนชมรม#nพัฒนาเกมด้วย)"
2600902-7 = "(แต่ไม่มีใครอยู่ที่ห้องชมรมเลย...)"
2600902-11 = "[ns] เปิดตู้เหล็กเพื่อจะแขวนเสื้อคลุม"
2600902-16 = "ฮะ... เฮือกก!"
2600902-17 = "คะ... คะ... คะ... คุณครู...?! ทำไมถึงอยู่ที่นี่คะ..."
2600902-18 = "[ns1] \"ขอโทษที ครูไม่คิดว่าจะอยู่ในตู้นี่\"\n[ns2] \"ครูแวะเอาขนมมาให้เป็นกำลังใจน่ะ...\""
2600902-22 = "[ns] \"ว่าแต่ทำไมถึงใส่ชุดเมดล่ะ...?\""
2600902-23 = "บะ... แบบว่า... มีเรื่องเข้าใจผิดนิดหน่อย..."
2600902-24 = "มะ... ไม่ใช่ค่ะ ฉันไม่ได้หยิบมาใส่เพราะคนอื่นนะคะ ฉันใส่ตามความต้องการของตัวเองค่ะ...!"
2600902-25 = "นั่นน่ะ มันไม่ได้แปลว่าฉันอยากใส่ชุดเมดหรอกนะคะ..."
2600902-26 = "ขะ... ขอให้ฉันได้อธิบายก่อนนะคะ...!"
2600902-28 = "(หลังจากนั้นคุณครูก็ช่วยให้ยูสึที่พูดวกไปวนมาสงบสติอารมณ์ลง และฟังคำอธิบายของเธอ)"
2600902-30 = "[ns] \"...แบบอ้างอิงตอนทำเกมงั้นเหรอ?\""
2600902-31 = "ใช่ค่ะ แบบว่า..."
2600902-32 = "ฉันจะเพิ่มตัวละครเมดในเกมใหม่ที่กำลังพัฒนาอยู่น่ะค่ะ..."
2600902-33 = "แต่ชุดเมดมีของประดับเยอะมาก แล้วก็มีโครงสร้างซับซ้อน มิโดริก็เลยบอกว่าวาดออกมาได้ยาก..."
2600902-34 = "ฉันก็เลยจะใส่ชุดเมดเพื่อเป็นนางแบบให้น่ะค่ะ"
2600902-35 = "[s] \"แล้วทำไมถึงไปอยู่ในตู้ล่ะ...?\""
2600902-36 = "คือว่า มิโดริบอกว่าลืมของบางอย่างไว้ที่หอพัก ก็เลยออกไปเอา..."
2600902-37 = "แต่ฉันรู้สึกไม่สบายใจที่จะใส่ชุดเมดอยู่ในห้องชมรมที่ว่างเปล่าคนเดียวค่ะ..."
2600902-38 = "เพราะถ้าเกิดว่ามีนักเรียนคนอื่นแวะเข้ามาที่นี่แล้วเห็นฉันใส่ชุดเมดอยู่ละก็..."
2600902-39 = "... ฉันต้องโดนหัวเราะแน่ๆ เลยค่ะ..."
2600902-40 = "[s] \"ก็บอกไปตามความจริงว่าเป็นนางแบบอยู่ก็ได้นี่นา?\""
2600902-41 = "แต่ฉันเนี่ยนะคะ... เป็นนางแบบ..."
2600902-42 = "ฉันไม่ค่อยมีสไตล์เหมือนพวกรุ่นพี่ C&C แล้วก็ไม่ค่อยมั่นใจในตัวเองด้วย..."
2600902-43 = "ถ้าบอกว่าฉันเป็นนางแบบแล้วใครจะเชื่อคะ...?"
2600902-44 = "[s3] \"ยูสึใส่อะไรก็น่ารักทั้งนั้นแหละ\"\n[s4] \"ยูสึในชุดเมดน่ะยอดเยี่ยมที่สุดเลย!\""
2600902-47 = "คะ... คะ? ทำไมจู่ๆ ก็ชมแบบนี้คะ...?!"
2600902-48 = "[s5] \"ไม่ต้องกังวลว่าใครจะคิดยังไงหรอกนะ\"\n[s6] \"ยูสึเป็นได้ทุกอย่างที่ต้องการเลย\""
2600902-57 = "...นั่นสินะคะ"
2600902-58 = "ฉันจะเป็นแบบอ้างอิงให้ตัวละครเมดที่จะอยู่ในเกมแท้ๆ แต่ถ้ายังทำครึ่งๆ กลางๆ อยู่อย่างนี้ละก็..."
2600902-59 = "อาจจะเสียมารยาทต่อแฟนๆ ที่รอเกมอยู่ก็ได้ค่ะ"
2600902-60 = "ขอบคุณนะคะคุณครู"
2600902-61 = "พอคุณครูพูดแบบนี้ฉันก็เริ่มมีความกล้าขึ้นมานิดหน่อยนะคะ"
2600902-62 = "แต่ฉันยังเขินที่จะใส่ชุดนี้อยู่ คงต้องไปเปลี่ยนเป็นชุดนักเรียนก่อนที่นักเรียนคนอื่นจะมาเห็น—"
2600902-68 = "หัวหน้ายูสึ อยู่ในห้องหรือเปล่า?"
2600902-69 = "พอดีฉันอยากให้ยูสึเซ็นบันทึกการประชุมหัวหน้าชมรมของไตรมาสนี้หน่อย—"
2600902-74 = "อะ... อ่า..."
2600902-75 = "ใส่ชุดเมดเหรอ...? แล้วก็อยู่กับคุณครูของชาเล่ต์...?"
2600902-76 = "คะ... คือว่า..."
2600902-77 = "อ่า... ขอโทษนะ สงสัยฉันจะเข้ามารบกวนแล้วละ..."
2600902-78 = "ฉันอธิบายได้นะ..."
2600902-80 = "ขอให้สนุกนะคะ..."
2600902-82 = "ให้เป็นแบบนี้ต่อไปไม่ได้แล้วค่ะ...!"
2600902-84 = "(จากนั้นยูสึก็เขินจนต้องเข้าไปอยู่ในตู้เหล็ก คุณครูเลยต้องใช้เวลาปลอบอยู่พักใหญ่)"

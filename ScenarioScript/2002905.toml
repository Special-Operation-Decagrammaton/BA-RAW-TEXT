[translation]
2002905-1 = "Summer Memories"
2002905-2 = "Beach"
2002905-5 = "Now, Sensei. Shall we go?"
2002905-6 = "One. Two... Three!"
2002905-14 = "[ns] \"Yah!\""
2002905-16 = "Nice! Let's continue..!"
2002905-25 = "[ns] \"Hiyah!\""
2002905-27 = "What I ended up doing with Mimori on the beach was... beach volleyball."
2002905-28 = "In the middle of a long beach volleyball rally..."
2002905-31 = "Kyah?"
2002905-39 = "[ns] \"Are you okay?!\""
2002905-40 = "Yes. I'm okay! My foot just slipped."
2002905-41 = "Oh, dear. It appears I lost this time."
2002905-42 = "There's no such thing as winning or losing in a volleyball rally?"
2002905-43 = "You could look at it that way... Heh heh heh. I wonder why I disagree though."
2002905-44 = "I'm feeling a little uncharacteristically competitive today!"
2002905-45 = "Why don't we take a break?"
2002905-46 = "Unfold the parasol and open... Yes! Here, some cold pineapple juice."
2002905-53 = "You must be thirsty, but please take your time. You don't want to choke."
2002905-54 = "Hm... Your expression tells me you're hungry, but you don't know what to eat!"
2002905-55 = "Shall I bring you some yakisoba from the Beach Shack, Sensei?"
2002905-56 = "[s1] \"No, I don't want you to leave.\"\n[s2] \"Only if I can come with you.\""
2002905-59 = "..."
2002905-60 = "R-Really, you're always so..."
2002905-61 = "Oh, no, you didn't do anything wrong, it's just that I, I..."
2002905-62 = "I don't know! I'm just going to rest with you!"
2002905-66 = "Mimori seemed flustered as we stared out over the crashing waves, so I gave her some time."
2002905-71 = "..."
2002905-72 = "[ns] \"...\""
2002905-73 = "Well, this is nice."
2002905-74 = "[s] \"Do you like the ocean?\""
2002905-75 = "Huh? W-Well, I do, but...!"
2002905-76 = "I am enjoying the time we're spending together. Really, I am."
2002905-77 = "...You're being mean, really."
2002905-78 = "[s] \"What am I doing?!\""
2002905-79 = "*sigh*"
2002905-80 = "Now that it's come to this... Sensei?"
2002905-81 = "[s] \"H-Hm?\""
2002905-82 = "T-Try to catch me!"
2002905-87 = "Suddenly, Mimori got up and started running!"
2002905-90 = "[ns] \"Mimori? Well, okay! Here I come!\""
2002905-91 = "Wahhh! I'm scared!"
2002905-97 = "I ran through the sands with Mimori."
2002905-102 = "In that joyous, chase-and-be-chased moment..."
2002905-106 = "[ns] \"Whoa!\""
2002905-108 = "I stumbled in the sand and fell spectacularly."
2002905-109 = "Sensei?!"
2002905-113 = "Are you okay? I'm so sorry!"
2002905-114 = "Don't say it's not my fault! If it weren't for me..."
2002905-115 = "I'm so sorry... I'm sorry, Sensei..."
2002905-116 = "[s3] \"It really wasn't too bad of a fall.\"\n[s4] \"I haven't had a good run like that in a long time.\" "
2002905-119 = "Are you sure...?"
2002905-120 = "You're sure, right?"
2002905-121 = "Why don't we take a break from this, since you fell."
2002905-122 = "Ah! Floating in the ocean will be a nice, restful activity."
2002905-123 = "...How do you do that? Heehee. Allow me to show you, Sensei!"
2002905-128 = "Yes, perfect! Relax your body slightly, keep your gaze on the sky..."
2002905-129 = "Breathe in deeply, then breathe out slowly..."
2002905-130 = "It's like lying in a waterbed! But on top of the water!"
2002905-131 = "Sensei, give it a try!"
2002905-132 = "As Mimori instructed, I relaxed my body and breathed slowly."
2002905-137 = "What do you think, Sensei?"
2002905-138 = "What? No, Sensei! You can't fall asleep out here!"
2002905-139 = "Please be careful! You could be washed away in the sea!"
2002905-140 = "Although, as a proper lady, of course I would rescue you if that did occur."
2002905-141 = "This was...really nice."
2002905-142 = "Perhaps it was your presence today."
2002905-148 = "How about you, Sensei? How was your day?"
2002905-149 = "...What a relief. I'm glad you enjoyed it."
2002905-150 = "..."
2002905-151 = "[s] \"Mimori?\""
2002905-152 = "I suppose the sunset indicates the end of the day."
2002905-153 = "...There's an end to everything, right?"
2002905-154 = "[s] \"That's...right?\""
2002905-155 = "I have a request, Sensei."
2002905-156 = "Can we make this day last a little longer?"
2002905-157 = "Just a little bit.  "
2002905-158 = "[s] \"I don't mind, but what is it all of a sudden?\""
2002905-159 = "Sorry, Sensei."
2002905-160 = "This may sound rather silly of me..."
2002905-161 = "But I had so much fun today."
2002905-162 = "I was so happy to spend a day with just Sensei and no worries."
2002905-163 = "[s5] \"There's nothing wrong with enjoying the ocean.\"\n[s6] \"It was nice for me too, to be with Mimori.\" "
2002905-166 = "Heehee. Yes..."
2002905-167 = "This time together was...very nice."
2002905-168 = "[s] \"Are you going to swim more?\""
2002905-172 = "No. Just... I want to walk along the shore."
2002905-179 = "― [log=미모리 수영복ND]If only[/log][wa:2130] "
2002905-181 = "― [log=미모리 수영복ND]our time here could last forever.[/log][wa:1360] "
2002905-184 = "― [log=미모리 수영복ND]If only we could preserve it, like with a photo or a drawing...[/log][wa:3490] "
2002905-186 = "― [log=미모리 수영복 ND]If only that was possible...[/log][wa:10] "
2002905-189 = "[ns7] \"That means you had a good day. You and me both.\"\n[ns8] \"It really is disappointing for a fun day to end.\""
2002905-190 = "― [log=미모리 수영복 ND]So you feel the same way, Sensei?[/log][wa:2420] "
2002905-191 = "― [log=미모리 수영복 ND]So you feel the same way, Sensei?[/log][wa:2420] "
2002905-193 = "― [log=미모리 수영복ND]That's... Somehow, that's... I'm a bit embarrassed.[/log][wa:1910] "
2002905-196 = "― [log=미모리 수영복ND]Today...[/log][wa:1360] "
2002905-198 = "― [log=미모리 수영복ND]I nearly forgot to be a proper lady, because I... I was so happy.[/log][wa:10] "
2002905-201 = "― [log=미모리 수영복ND]Um, Sensei.[/log].[wa:3300] "
2002905-204 = "―[log=미모리 수영복ND] Maybe one day...[/log][wa:780] "
2002905-206 = "― [log=미모리 수영복ND]Could we spend time together again? Just the two of us?[/log][wa:10] "
2002905-210 = "With the sun almost down, we'll be able to see the moon."
2002905-211 = "I'd like to be able to see it, is that okay?"
2002905-212 = "[s] \"Yes... Let's do that.\""
2002905-213 = "Thank you."
2002905-214 = "I've depended on you a lot today."
2002905-215 = "So, as one last request, could you lend me your shoulder, please?"
2002905-220 = "Mimori leaned on my shouder, and we watched the moon rise together."

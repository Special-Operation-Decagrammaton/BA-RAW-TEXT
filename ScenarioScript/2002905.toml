[translation]
2002905-1 = "夏日海邊的回憶"
2002905-2 = "海邊"
2002905-5 = "來，老師，我要發球囉？"
2002905-6 = "一，二……三！"
2002905-14 = "[ns]「嘿！」"
2002905-16 = "接得真好！那麼接下來……嘿！"
2002905-25 = "[ns]「看我的！」"
2002905-27 = "（和三森一起在海邊玩起了……沙灘排球）"
2002905-28 = "（玩了一會之後……）"
2002905-31 = "哎呀？"
2002905-39 = "[ns]「沒事吧！？」"
2002905-40 = "嗯，我沒事。只是稍微踩空了。"
2002905-41 = "嗚嗚，這次是我輸了呢……"
2002905-42 = "……沙灘排球沒有特別分輸贏？"
2002905-43 = "這麼說也沒錯……呵呵。#n不過這是為什麼呢？"
2002905-44 = "今天的我，似乎有點想贏呢。"
2002905-45 = "那麼我們先休息一下吧？"
2002905-46 = "先把遮陽傘打開……這裡有冰過的鳳梨汁。"
2002905-53 = "我知道老師應該很渴，但還是請慢慢享用哦，不然可能會嗆到的。"
2002905-54 = "嗯……看老師的表情，似乎想吃點什麼呢！"
2002905-55 = "老師，要不要我去海之家買個炒麵？"
2002905-56 = "[s1]「沒關係，不必專程跑一趟。」\n[s2]「而且如果要去的話，我比較想和三森一起去。」"
2002905-59 = "……"
2002905-60 = "真，真是的。老師總是說這種……"
2002905-61 = "啊，沒什麼。老師沒有做錯任何事。#n這只是我，擅自……"
2002905-62 = "真，真的沒什麼！#n那個……我也要和老師一起休息！"
2002905-66 = "（和突然相當慌張的三森並肩而坐，看著海浪不斷拍打著岸邊）"
2002905-71 = "……"
2002905-72 = "[ns]「……」"
2002905-73 = "我果然……很喜歡。"
2002905-74 = "[s]「喜歡海嗎？」"
2002905-75 = "什麼？當，當然也喜歡海……！"
2002905-76 = "那個，該說是喜歡這樣的時間，還是……"
2002905-77 = "……老師真狡猾。"
2002905-78 = "[s]「我怎麼了！？」"
2002905-79 = "嗚……"
2002905-80 = "既然如此……老師？"
2002905-81 = "[s]「怎麼了？」"
2002905-82 = "請，請來，抓住我吧！"
2002905-87 = "（三森突然起身跑了起來！）"
2002905-90 = "[ns]「三，三森！？怎麼突然跑走了……好～！我也不能輸！」"
2002905-91 = "哇～我好害怕～"
2002905-97 = "（和三森一起在沙灘上跑著）"
2002905-102 = "（就在兩人享受鬼抓人的樂趣時……）"
2002905-106 = "[ns]「嗚哇！」"
2002905-108 = "（一腳踩空，摔了個四腳朝天……）"
2002905-109 = "老，老師！？"
2002905-113 = "您沒事吧？真對不起，都是我的錯……"
2002905-114 = "就算老師說不哭也……"
2002905-115 = "對不起……真的對不起，老師……"
2002905-116 = "[s3]「沒什麼，我真的沒事。」\n[s4]「而且我也好久沒跑得這麼開心了。」"
2002905-119 = "真的……嗎？"
2002905-120 = "是真的吧？"
2002905-121 = "可是老師確實摔倒了，而且看起來好像也累了……"
2002905-122 = "啊，對了！這次……要不要來試試「海上漂浮」？"
2002905-123 = "問我那是什麼？#n呵呵，那就是……"
2002905-128 = "嗯，像這樣放鬆身體望著天空……"
2002905-129 = "深吸一口氣……"
2002905-130 = "就能夠浮起來，像躺在水面上一樣哦。"
2002905-131 = "老師也試試看吧！"
2002905-132 = "（按照三森說的放鬆身體，慢慢吸氣）"
2002905-137 = "覺得如何呢，老師？"
2002905-138 = "因為太舒服，感覺快要睡著了？"
2002905-139 = "請，請多留意唷！？#n如果又在海上睡著的話……"
2002905-140 = "……不，如果發生什麼事的話我會救老師的……"
2002905-141 = "不過……今天真是開心的一天呢。"
2002905-142 = "是因為和老師在一起嗎……？"
2002905-148 = "老師，您覺得今天怎麼樣呢？"
2002905-149 = "……很開心是嗎？那真是太好了。"
2002905-150 = "……"
2002905-151 = "[s] 「三森？」"
2002905-152 = "已經……這麼晚了呢。"
2002905-153 = "……一切都會有結束的時候對吧？"
2002905-154 = "[s]「這個嘛……嗯。」"
2002905-155 = "那個，老師……"
2002905-156 = "能再……多陪我一下嗎？"
2002905-157 = "真的，只要一下下就行了。"
2002905-158 = "[s]「當然沒問題，怎麼了嗎？」"
2002905-159 = "不好意思，老師。"
2002905-160 = "我知道自己撒嬌過頭了。#n可是……"
2002905-161 = "今天……很開心，真的很開心。"
2002905-162 = "光是和老師在一起，就讓我整天都樂不可支……"
2002905-163 = "[s5]「享受大海很不錯吧。」\n[s6]「我也一樣，和三森在一起很開心。」"
2002905-166 = "呵呵，嗯……"
2002905-167 = "這時間的海……也很美麗。"
2002905-168 = "[s]「要再游一下嗎？」"
2002905-172 = "沒關係。不過……我想再稍微散散步。"
2002905-179 = "― [log=미모리 수영복ND]真希望……[/log][wa:2210] "
2002905-181 = "― [log=미모리 수영복ND]這一刻能永遠持續下去。[/log][wa:2240] "
2002905-184 = "― [log=미모리 수영복ND]就這樣，像照片或繪畫一樣將時間記錄下來──[/log][wa:5170] "
2002905-186 = "― [log=미모리 수영복ND]如此一來……[/log][wa:300] "
2002905-189 = "[ns7]「今天真的很開心。」\n[ns8]「一天就這樣結束，我也覺得很可惜。」"
2002905-190 = "― [log=미모리 수영복ND]老師也是一樣的心情嗎？[/log][wa:3300] "
2002905-191 = "― [log=미모리 수영복ND]老師也是一樣的心情嗎？[/log][wa:3300] "
2002905-193 = "― [log=미모리 수영복ND]那樣……好像有點難為情呢。[/log][wa:3430] "
2002905-196 = "― [log=미모리 수영복ND]我今天……[/log][wa:1480] "
2002905-198 = "― [log=미모리 수영복ND]幸福到……足以忘記修行。[/log][wa:2120] "
2002905-201 = "― [log=미모리 수영복ND]那個……老師。[/log][wa:3500] "
2002905-204 = "― [log=미모리 수영복ND]之後還有機會……[/log][wa:1100] "
2002905-206 = "― [log=미모리 수영복ND]能共創這樣的時光嗎？[/log][wa:1230] "
2002905-210 = "太陽即將下山，月亮即將升起。"
2002905-211 = "我想看看月亮……可以嗎？"
2002905-212 = "[s]「嗯……一起看吧。」"
2002905-213 = "非常感謝您。"
2002905-214 = "今天……總是向老師撒嬌呢。"
2002905-215 = "您不介意的話……可以把肩膀借給我嗎？"
2002905-220 = "（用肩膀感受三森，一起看著明月升起）"

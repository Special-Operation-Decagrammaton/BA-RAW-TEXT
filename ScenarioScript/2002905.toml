[translation]
2002905-1 = "ความทรงจำแห่งท้องทะเลฤดูร้อน"
2002905-2 = "ชายหาด"
2002905-5 = "เอาละค่ะคุณครู จะเริ่มแล้วนะคะ~"
2002905-6 = "หนึ่ง สอง... สาม!"
2002905-14 = "[ns] \"นี่แน่ะ!\""
2002905-16 = "เยี่ยมมากเลยค่ะ! ถ้างั้นต่อเลยนะคะ... ฮึบ!"
2002905-25 = "[ns] \"ไฮย่ะ!\""
2002905-27 = "(สิ่งที่คุณครูกับมิโมริทำร่วมกันที่ชายหาด... ก็คือเล่นวอลเลย์บอลชายหาด)"
2002905-28 = "(ทั้งสองคนเล่นแข่งวอลเลย์บอลกันอย่างนั้นอยู่พักใหญ่...)"
2002905-31 = "อ๊ายย?!"
2002905-39 = "[ns] \"เป็นอะไรรึเปล่า!?\""
2002905-40 = "ฉันไม่เป็นไรค่ะ แค่เหยียบทรายแล้วลื่นล้มน่ะค่ะ"
2002905-41 = "ฮือออ เป็นแบบนี้ฉันต้องแพ้แน่ๆ เลยค่ะ..."
2002905-42 = "วอลเลย์บอลชายหาดแรลลี่ไม่มีการแพ้ชนะงั้นเหรอคะ?"
2002905-43 = "ก็อาจเป็นแบบนั้นก็ได้นะคะ ฮุฮุ แต่ว่าไม่รู้ทำไม..."
2002905-44 = "จู่ๆ วันนี้ฉันก็รู้สึกอยากชนะขึ้นมาดื้อๆ เลยค่ะ"
2002905-45 = "ในเมื่อเป็นแบบนี้แล้ว เราพักกันสักแป๊บหนึ่งก่อนดีมั้ยคะ?"
2002905-46 = "กางร่มกันแดดก่อน... นี่ค่ะ ฉันเตรียมน้ำสับปะรดเย็นๆ มาด้วยค่ะ"
2002905-53 = "คุณครูน่าจะหิวน้ำ ค่อยๆ ดื่มนะคะ ถ้าดื่มเร็วไปจะท้องอืดเอาได้ค่ะ"
2002905-54 = "อืม... สีหน้าแบบนั้น เหมือนจะบอกว่าอยากกินอะไรเลยนะคะ!"
2002905-55 = "ฉันไปซื้อยากิโซบะที่ร้านริมทะเลมาให้มั้ยคะ คุณครู?"
2002905-56 = "[s1] \"ไม่เป็นไร ไม่ต้องดูแลขนาดนั้นหรอก\"\n[s2] \"ครูอยากไปซื้อด้วย\""
2002905-59 = "..."
2002905-60 = "จะ...จริงๆ เลยนะคะ คุณครูเนี่ยชอบพูดแบบนี้เสมอเลย..."
2002905-61 = "ปะ...เปล่าค่ะ คุณครูไม่ได้ทำอะไรผิดเลยค่ะ คือว่าฉันแค่...ฉัน..."
2002905-62 = "มะ...ไม่รู้ด้วยแล้วค่ะ! ไหนๆ ก็เป็นแบบนี้แล้ว งั้นฉันก็จะพักผ่อนไปพร้อมกับคุณครูก็แล้วกันค่ะ!"
2002905-66 = "(คุณครูนั่งลงข้างๆ มิโมริที่ดูเขินอายมากกว่าปกติ และนั่งมองคลื่นที่ซัดสาดเข้ามากระทบหาดทราย#nกันอย่างเงียบๆ...)"
2002905-71 = "..."
2002905-72 = "[ns] \"...\""
2002905-73 = "ดีจังเลยนะคะ"
2002905-74 = "[s] \"ชอบทะเลเหรอ?\""
2002905-75 = "คะ? นะ...แน่นอนว่าฉันชอบทะเลค่ะ...!"
2002905-76 = "แต่ควรบอกว่าฉันชอบเวลาที่ได้มาอยู่แบบนี้มากกว่าละมั้งคะ..."
2002905-77 = "...ใจร้ายจริงๆ เลยนะคะ"
2002905-78 = "[s] \"ครูไปทำอะไรให้เนี่ย?!\""
2002905-79 = "ฮืออ...."
2002905-80 = "ในเมื่อเป็นแบบนี้แล้ว... คุณครูคะ?"
2002905-81 = "[s] \"หะ...หืม?\""
2002905-82 = "ตอนนี้ละ...ลองวิ่งตามมาจับฉันให้ได้สิคะ!"
2002905-87 = "(จู่ๆ มิโมริก็ลุกขึ้นวิ่งออกไปดื้อๆ!)"
2002905-90 = "[ns] \"มะ...มิโมริ จู่ๆ ทำอะไรเนี่ย?!... ด๊ายยย~! ครูไม่แพ้หรอกนะ!\""
2002905-91 = "ว้าย~ น่ากลัวจังเลยค่ะ~"
2002905-97 = "(คุณครูกับมิโมริวิ่งเล่นไล่จับกันอยู่ที่ชายหาด)"
2002905-102 = "(และระหว่างที่ทั้งสองคนกำลังวิ่งไล่จับกันไปมาอย่างสนุกสนาน...)"
2002905-106 = "[ns] \"ว้าก?!\""
2002905-108 = "(คุณครูก้าวพลาดเลยทำให้ล้มลงกระแทกทรายอย่างจัง...)"
2002905-109 = "คะ...คุณครู?!"
2002905-113 = "เป็นอะไรหรือเปล่าคะ? เพราะฉันแท้ๆ เลย..."
2002905-114 = "อย่าปฏิเสธเลยค่ะว่าไม่ใช่ความผิดของฉัน..."
2002905-115 = "ขอโทษค่ะ... ฉันขอโทษจริงๆ ค่ะคุณครู..."
2002905-116 = "[s3] \"ไม่หรอก ครูไม่เป็นไรจริงๆ...\"\n[s4] \"นานๆ ทีได้ออกแรงวิ่งแบบนี้ สดชื่นดีจัง\""
2002905-119 = "จริงเหรอคะ...?"
2002905-120 = "พูดจริงเหรอคะ คุณครู...?"
2002905-121 = "แต่ถึงยังไงที่คุณครูล้มลงไปก็เป็นเรื่องจริง แถมคุณครูยังดูเหนื่อยๆ ด้วย..."
2002905-122 = "อ๊ะ ใช่แล้วค่ะ! ต่อไป... มาลองเล่น 'ลอยตุ๊บป่องอยู่ในทะเล' กันมั้ยคะ?"
2002905-123 = "มันคืออะไรน่ะเหรอคะ? ฮุฮุ..."
2002905-128 = "ค่ะ เก่งมากเลยค่ะ! ผ่อนคลายร่างกาย แล้วก็เงยหน้ามองท้องฟ้า..."
2002905-129 = "สูดหายใจเข้าลึกๆ แล้วก็หายใจออกช้าๆ..."
2002905-130 = "คิดว่านอนอยู่บนเตียงที่ทำจากน้ำ...แล้วเราจะลอยอยู่ในน้ำได้ค่ะ"
2002905-131 = "คุณครูเองก็ลองทำดูสิคะ!"
2002905-132 = "(คุณครูผ่อนคลายร่างกายและหายใจเข้าออกช้าๆ ตามที่มิโมริบอก)"
2002905-137 = "เป็นยังไงบ้างคะ คุณครู?"
2002905-138 = "คะ? รู้สึกสบายมากๆ จนถ้านอนแบบนี้ไปเรื่อยๆ ก็อาจหลับได้งั้นเหรอคะ?"
2002905-139 = "ระ...ระวังด้วยนะคะ! ถ้าเกิดเผลอหลับในทะเลแบบคราวก่อน..."
2002905-140 = "แต่ถึงคุณครูจะหลับไปแบบนั้น ฉันก็จะช่วยคุณครูเองค่ะ…!"
2002905-141 = "แบบนี้... รู้สึกดีจังเลยนะคะ"
2002905-142 = "ที่รู้สึกดีแบบนี้ อาจเป็นเพราะได้ใช้เวลาอยู่กับคุณครูก็ได้นะคะ"
2002905-148 = "วันนี้เป็นยังไงบ้างคะ คุณครู?"
2002905-149 = "สนุกมากงั้นเหรอคะ? ถ้างั้นก็ค่อยยังชั่วหน่อยค่ะ"
2002905-150 = "..."
2002905-151 = "[s] \"มิโมริ?\""
2002905-152 = "หมดไปหนึ่งวันแล้วสินะคะ"
2002905-153 = "...ทุกสิ่งทุกอย่างก็ต้องมีวันจบลง ใช่มั้ยคะ?"
2002905-154 = "[s] \"มันก็...ใช่นะ\""
2002905-155 = "คือว่า... คุณครูคะ"
2002905-156 = "ช่วยอยู่กับฉันต่ออีกสักหน่อย...ได้มั้ยคะ?"
2002905-157 = "แค่อีกนิดเดียว...ก็ยังดีค่ะ "
2002905-158 = "[s] \"เรื่องนั้นได้อยู่แล้วแหละ ว่าแต่มีอะไรเหรอ?\""
2002905-159 = "ขอโทษค่ะ คุณครู"
2002905-160 = "ฉันรู้ว่ามันดูเอาแต่ใจมากๆ แต่ว่า..."
2002905-161 = "วันนี้... ฉันสนุกมากเลยค่ะ สนุกมากจริงๆ ค่ะ..."
2002905-162 = "การที่ได้อยู่กับคุณครูแบบนี้... ฉันมีความสุขมากๆ..."
2002905-163 = "[s5] \"มาเล่นสนุกที่ทะเล มันก็ไม่ได้ผิดอะไรนี่นา\"\n[s6] \"ครูก็ชอบที่ได้อยู่กับมิโมรินะ\""
2002905-166 = "ฮุฮุ ค่ะ..."
2002905-167 = "ทะเลในตอนนี้... สวยดีนะคะ"
2002905-168 = "[s] \"ไปว่ายน้ำเล่นกันต่อมั้ย?\""
2002905-172 = "ไม่ละค่ะ ฉันแค่... อยากเดินเล่นริมทะเลต่ออีกสักหน่อยค่ะ"
2002905-179 = "― [log=미모리 수영복ND]ถ้าเกิด...[/log][wa:2010] "
2002905-181 = "― [log=미모리 수영복ND]ช่วงเวลานี้คงอยู่ตลอดไปได้ก็คงดีนะคะ[/log][wa:1240] "
2002905-184 = "― [log=미모리 수영복ND]ถ้าเราบันทึกช่วงเวลานี้เอาไว้ให้เหมือนกับรูปถ่ายหรือภาพวาดได้...[/log][wa:3450] "
2002905-186 = "― [log=미모리 수영복ND]ถ้าทำแบบนั้นได้ละก็...[/log][wa:10] "
2002905-189 = "[ns7] \"แบบนั้นก็หมายความว่าวันนี้สนุกมากๆ เลยสินะ\"\n[ns8] \"ครูเองก็รู้สึกเสียดายเหมือนกัน ที่วันนี้จะต้องจบลงไปแบบนี้...\""
2002905-190 = "― [log=미모리 수영복ND]คุณครูเองก็รู้สึกเหมือนกันงั้นเหรอคะ?[/log][wa:2260] "
2002905-191 = "― [log=미모리 수영복ND]คุณครูเองก็รู้สึกเหมือนกันงั้นเหรอคะ?[/log][wa:2260] "
2002905-193 = "― [log=미모리 수영복ND]แบบนั้น... ไม่รู้ทำไมจู่ๆ ก็รู้สึกเขินขึ้นมาเลยค่ะ[/log][wa:1950] "
2002905-196 = "― [log=미모리 수영복ND]วันนี้ฉัน...[/log][wa:1200] "
2002905-198 = "― [log=미모리 수영복ND]มีความสุขมากๆ จนลืมเรื่องการฝึกไปเลยค่ะ...[/log][wa:920] "
2002905-201 = "― [log=미모리 수영복ND]คือ... คุณครูคะ[/log][wa:3180] "
2002905-204 = "― [log=미모리 수영복ND]สักวันหนึ่ง...[/log][wa:860] "
2002905-206 = "― [log=미모리 수영복ND]มาสร้างช่วงเวลาดีๆ แบบนี้ด้วยกันกับฉันอีกได้มั้ยคะ?[/log][wa:10] "
2002905-210 = "พระอาทิตย์ใกล้ตกแล้วนะคะ อีกไม่นานพระจันทร์ก็จะขึ้นแล้ว"
2002905-211 = "คือ... ฉันอยากรอดูพระจันทร์สักหน่อย... ได้หรือเปล่าคะ?"
2002905-212 = "[s] \"อื้อ... เอาสิ\""
2002905-213 = "ขอบคุณค่ะ"
2002905-214 = "วันนี้ฉันรบกวนคุณครูหลายเรื่องเลย..."
2002905-215 = "ถ้าคุณครูไม่ว่าอะไรละก็... ขอยืมไหล่พิงสักหน่อยได้หรือเปล่าคะ?"
2002905-220 = "(คุณครูสัมผัสได้ถึงมิโมริที่เอนเข้ามาซบไหล่ จากนั้นทั้งคู่ใช้เวลานั่งดูพระจันทร์ด้วยกันสองคน)"

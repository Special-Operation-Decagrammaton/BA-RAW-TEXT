[translation]
1002305-1 = "#title;선도부원의 가벼운 일탈"
1002305-2 = "3;수영복 불량배 SMG;02;어이, 어째서 이 '젠자이'에는 찹쌀떡이 없는 거야?\n#3;em;[재잘]\n#3;a"
1002305-3 = "1;수영복 불량배 MG;05;게다가 뜨겁지도 않고, 팥 대신 망고와 얼음이 잔뜩 들어가 있잖아! 장난하는 거야?\n#3;m5\n#1;ar\n#1;em;[빠직]"
1002305-4 = "#na;상인;하, 하지만…… 이건 '단팥죽 젠자이'가 아니라, 남국 과일을 잔뜩 넣은 '빙수 젠자이'인걸요."
1002305-5 = "3;수영복 불량배 SMG;05;알게 뭐야! 우리는 뜨끈한 단팥죽이 먹고 싶다고!\n#3;hophop"
1002305-6 = "1;수영복 불량배 MG;02;당장 팥과 찹쌀떡이 듬뿍 들어간 젠자이를 가져와!\n#1;em;[반응]"
1002305-7 = "#na;상인;빙수 가게에 와서 단팥죽을 찾으셔도……."
1002305-8 = "#st;[0,0];instant;1;"
1002305-9 = "#clearST"
1002305-10 = "#all;hide\n#bgshake\n#wait;2500"
1002305-11 = "3;이오리 수영복ND;05;행패는 거기까지다, 이 교칙 위반자 녀석들!\n#3;em;[!]\n#3;closeup"
1002305-12 = "#all;hide"
1002305-13 = "1;수영복 불량배 MG;00\n5;수영복 불량배 SMG;04;으앗? 게헨나 선도부잖아?\n#5;em;[?!]\n#5;shake"
1002305-14 = "1;수영복 불량배 MG;05;쳇, 벌써 신고가 들어간 건가!\n#1;stiff"
1002305-15 = "5;수영복 불량배 SMG;02;정면 승부로는 승산이 없어. 어서 도망치자!\n#5;em;[반응]"
1002305-16 = "#st;[0,0];instant;1;"
1002305-17 = "#clearST"
1002305-18 = "1;수영복 불량배 MG;05\n5;수영복 불량배 SMG;05\n#5;dr\n#1;dr\n#5;h\n#1;h\n#wait;2000"
1002305-19 = "3;이오리 수영복ND;05;아앗, 비겁하게 도망치다니!\n#3;ar\n#3;hophop"
1002305-20 = "3;이오리 수영복ND;05;거기 서라!\n#3;em;[!]"
1002305-21 = "#st;[0,0];instant;1;"

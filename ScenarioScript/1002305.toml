[translation]
1002305-1 = "小歇片刻"
1002305-2 = "喂，為什麼這個紅豆湯裡面沒有年糕啊！？"
1002305-3 = "而且冷得要命，還放了芒果！這在整人是不是！？"
1002305-4 = "這，這不是普通的紅豆湯，而是我們新推出的「南國風味刨冰紅豆湯」……"
1002305-5 = "關我什麼事？我就是想在大熱天底下吃熱騰騰的、普通的紅豆湯！"
1002305-6 = "馬上給我們裝滿紅豆和年糕的普通紅豆湯！"
1002305-7 = "但，但我們原本就是「刨冰店」呀……"
1002305-11 = "到此為止了！"
1002305-13 = "嘖，是格黑娜風紀委員會！"
1002305-14 = "來的還真快……！"
1002305-15 = "正面對決也打不贏，快逃吧！"
1002305-19 = "啊，不准逃！"
1002305-20 = "給我站住！"
1002305-26 = "（於是，伊織開始了一場如果沒有槍的話，會讓人覺得畫面很和平的海邊追逐戰）"
1002305-36 = "呼，這樣就解決了。"
1002305-37 = "[s1] 「辛苦了。」\n[s2] 「沒事吧？有受傷嗎？」"
1002305-38 = "沒事，只是他們腳程挺快，花了點時間。"
1002305-39 = "沒事，只是他們腳程挺快，花了點時間。"
1002305-40 = "是怎樣啊，夏天一到就熱昏頭了是不是，到處都在闖禍……"
1002305-41 = "都特地準備防曬乳了，但這樣根本沒有時間享受日光──"
1002305-42 = "[s] 「……？」"
1002305-43 = "沒，沒什麼！"
1002305-44 = "但話說回來，追著那群笨蛋跑也挺累人的……"
1002305-46 = "老師，那個……如果不介意的話，可以拜託你巡邏一下這附近嗎？#n我負責人煙比較稀少的那一區……"
1002305-47 = "我的意思是，為了讓我們鬆懈，#n笨蛋們可能會躲起來等風頭過去，然後又在這附近跑出來鬧事。"
1002305-48 = "然後我要去的那邊也可能會有另一群人……#n身為風紀委員會的成員，我想檢查得滴水不漏……"
1002305-49 = "[s] 「我們兩邊都一起巡邏吧。」"
1002305-50 = "不用，不需要！你想嘛，分頭進行會比較有效率……！"
1002305-51 = "那邊我一個人就足夠了！老師負責這邊就好！"
1002305-52 = "[s] 「嗯，明白了。」"
1002305-53 = "你是真的明白了吧……？"
1002305-54 = "絕對不准跟來！"
1002305-55 = "那這邊就拜託了……"
1002305-59 = "[ns] 跟在伊織後面"
1002305-62 = "（伊織跑到岩石後面人煙稀少的地方，趴在地上做日光浴）"
1002305-63 = "哈啊……難得來海邊卻整天工作，未免也太可惜了。"
1002305-64 = "嗯，舒服……偶爾像這樣享受悠閒果然……"
1002305-67 = "― ……呃？哇啊！？[wa:810] "
1002305-71 = "― 你，你是什麼時候來的啊？[wa:1080] "
1002305-74 = "― 咦？從剛剛開始就一直看到現在……？[wa:2210] "
1002305-76 = "― 你這……變態！去死！[wa:1440] "
1002305-79 = "― ……我先聲明，我可不是在玩！[wa:1840] "
1002305-81 = "― 這完全，是維護風紀活動的一環……！[wa:1640] "
1002305-84 = "― ……比起那個，你要看到什麼時候啊！[wa:1430] "
1002305-86 = "― 快點走開啦！"
1002305-89 = "……我並不是在玩！"
1002305-90 = "[s] 「沒事，你不用再次強調。」"
1002305-91 = "難得的大海，休息也是任務的一部分，而且我本來就打算馬上回去……"
1002305-92 = "況且老師還幫我買了防曬乳，如果不用就太浪費了……"
1002305-93 = "所以間接上來說，這也是為了維護風紀──"
1002305-94 = "……仔細一想我完全沒做什麼虧心事吧？"
1002305-95 = "當初老師要是沒有跟來，我的這副模樣就不會被發現了……"
1002305-96 = "煩死了！我討厭老師！"
1002305-98 = "（被伊織說了「討厭」……）"

1002305-89 = "3;이오리 수영복ND;09;……놀고 있는 거 아니었거든?\n#3;em;[땀]\n#3;stiff\n#3;a"
1002305-90 = "[s] \"다시 말하지 않아도 알고 있어.\""
1002305-91 = "3;이오리 수영복ND;04;모처럼의 바다고, 휴식도 임무의 일부이고, 애초에 조금만 쉬다가 돌아올 생각이었는데……"
1002305-92 = "3;이오리 수영복ND;08;게다가 모처럼 선생님이 자외선 차단제를 사다 주었는데, 사용하지 않으면 아까우니까……\n#3;em;…"
1002305-93 = "3;이오리 수영복ND;08;그러니까 결국은 이것도 풍기를 지키기 위해 어쩔 수 없이—"
1002305-94 = "3;이오리 수영복ND;09;……아니, 내가 왜 선생님에게 변명을 하고 있는 거야?\n#3;hophop"
1002305-95 = "3;이오리 수영복ND;09;애초에 선생님이 따라오지만 않았어도 이런 모습을 들키지 않았을텐데……."
1002305-96 = "3;이오리 수영복ND;05;선생님, 진짜 싫어!\n#3;closeup\n#bgshake\n#fontsize;80"
1002305-97 = "#all;hide"
1002305-98 = "#na;(이오리와의 관계가 서먹해졌다…….)"

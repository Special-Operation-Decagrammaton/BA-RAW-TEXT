1002305-35 = "3;이오리 수영복ND;00\n#3;a\n#wait;1200"
1002305-36 = "3;이오리 수영복ND;06;후우, 이걸로 한 건 해결인가.\n#3;em;[땀]\n#3;stiff"
1002305-37 = "[s1] \"수고 많았어.\"\n[s2] \"다치지는 않았어?\""
1002305-38 = "3;이오리 수영복ND;02;흥, 생각보다 발이 빨라서 추격하는 데 시간이 걸리긴 했지만 별거 아니었어.\n#3;em;[반응]"
1002305-39 = "3;이오리 수영복ND;02;흥, 생각보다 발이 빨라서 추격하는 데 시간이 걸리긴 했지만 별거 아니었어.\n#3;em;[반응]"
1002305-40 = "3;이오리 수영복ND;06;이 바보들은 지치지도 않는지, 하루가 멀다 하고 매일 사고를 저지르고 있으니……."
1002305-41 = "3;이오리 수영복ND;08;이번 하계 합숙은 해변으로 간다고 해서 모처럼 선오일도 준비했는데, 이래서야 느긋하게 일광욕을 즐길 시간도 없겠어.\n#fontsize;50"
1002305-42 = "[s] \"무슨 문제라도 있어?\""
1002305-43 = "3;이오리 수영복ND;09;아, 아무것도 아니야!\n#3;hophop"
1002305-44 = "3;이오리 수영복ND;09;바보들을 쫓느라 조금 지친 것 뿐이라……."
1002305-45 = "3;이오리 수영복ND;99\n#3;em;…\n#wait;2500"
1002305-46 = "3;이오리 수영복ND;02;선생님, 괜찮다면 이 근처의 순찰을 부탁해도 괜찮을까? 나는 저쪽의 인적이 드문 해변가를 순찰할까 해서……."
1002305-47 = "3;이오리 수영복ND;04;그, 왜, 있잖아. 인적이 드문 곳이라면 바보들이 또 무슨 흉계를 꾸미고 있을지도 모르고.\n#3;stiff\n#3;em;[땀]"
1002305-48 = "3;이오리 수영복ND;08;선도부의 스페셜리스트로서 눈이 닿지 않는 곳까지 살펴 볼 필요가 있겠다 싶어서……."
1002305-49 = "[s] \"그럼 같이 갈까?\""
1002305-50 = "3;이오리 수영복ND;09;뭐?! 아니, 선생님이 올 필요는 없어. 절대로!\n#3;em;[?!]\n#3;shake"
1002305-51 = "3;이오리 수영복ND;05;나 혼자로도 충분해! 위험하니까 선생님은 이곳에서 기다려 줘."
1002305-52 = "[s] \"……알겠어.\""
1002305-53 = "3;이오리 수영복ND;09;정말로 이해한 거 맞지?\n#3;stiff"
1002305-54 = "3;이오리 수영복ND;05;선생님은 절대로 따라오면 안 돼!\n#3;em;[반응]"
1002305-55 = "3;이오리 수영복ND;02;그, 그럼 나머지는 부탁할게."
1002305-56 = "#st;[0,0];instant;1;"

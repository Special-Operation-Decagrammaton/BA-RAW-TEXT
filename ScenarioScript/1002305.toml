1002305-62 = "#na;(인적이 드문 바위 그늘 아래에 이오리가 누워 일광욕을 하고 있다.)"
1002305-63 = "#na;이오리 수영복ND;하아…… 모처럼 바다에 왔는데, 단속만 하다가 가는 건 역시 아쉽지."
1002305-64 = "#na;이오리 수영복ND;가끔은 이렇게 여유를 즐기는 것도…… 응?"

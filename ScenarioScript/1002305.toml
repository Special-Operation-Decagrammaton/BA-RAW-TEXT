[translation]
1002305-1 = "The Prefect Team's Change of Pace"
1002305-2 = "Hey, why didn't this zenzai come with sweet rice cakes?"
1002305-3 = "On top of that, it's not hot. It has mango instead of red beans, and it's filled with ice! Is this some kind of joke?"
1002305-4 = "B-But...this isn't sweet red bean soup zenzai. It's shaved ice zenzai, which is filled with fruits from the South."
1002305-5 = "Who cares?! We want hot sweet red bean soup!"
1002305-6 = "Bring us zenzai filled with red beans and sweet rice cakes this instant!"
1002305-7 = "You came looking for red bean soup at a shaved ice store..."
1002305-11 = "Your troublemaking ends here!"
1002305-13 = "Is she with the Gehenna Prefect Team?!"
1002305-14 = "How'd she get here so fast?"
1002305-15 = "We don't stand a chance against her. Run away!"
1002305-19 = "Tch. Running like cowards."
1002305-20 = "Stop right there!"
1002305-26 = "Iori began to chase the delinquents down the beach."
1002305-36 = "*sigh* That should do it."
1002305-37 = "[s1] \"Great work.\"\n[s2] \"Are you hurt?\""
1002305-38 = "Hmph. They were harder to catch on foot than I thought they'd be, but it was nothing."
1002305-39 = "Hmph. They were harder to catch on foot than I thought they'd be, but it was nothing."
1002305-40 = "Don't these fools ever get tired? Not a day goes by without them starting some sort of scene."
1002305-41 = "I haven't had any time to put on my sunscreen and just enjoy a good sunbath."
1002305-42 = "[s] \"What was that?\""
1002305-43 = "N-Nothing!"
1002305-44 = "I was just complaining about having to chase those idiots."
1002305-46 = "Anyway, would you mind keeping an eye on this area, Sensei? I'm going to patrol the deserted beach over there..."
1002305-47 = "You get it, don't you? You never know what sort of troublemakers are lurking in seemingly deserted areas like that."
1002305-48 = "I need to get eyes on places I wouldn't normally go myself as the Prefect Team's specialist."
1002305-49 = "[s] \"Why don't we go together, then?\""
1002305-50 = "What?! No, I don't need you. Absolutely not!"
1002305-51 = "I can handle it by myself! It's dangerous, so you wait here for me."
1002305-52 = "[s] \"All right.\""
1002305-53 = "Do you really get it?"
1002305-54 = "You absolutely cannot follow me!"
1002305-55 = "I'm trusting you on this!"
1002305-59 = "[ns] Follow Iori."
1002305-62 = "Iori is lying under the shade of a boulder, sunbathing out of sight from anyone."
1002305-63 = "*sigh* It would be a waste if all I did was work after coming all this way to the beach."
1002305-64 = "There's nothing wrong with occasionally enjoying a nice, relaxing—"
1002305-67 = "― Huh? What?![wa:690] "
1002305-71 = "― Wh-When did you get here?[wa:560] "
1002305-74 = "― Have you been watching me this whole time?[wa:1210] "
1002305-76 = "― Y-You...! Pervert! Die![wa:920] "
1002305-79 = "― Just so you know, I'm not fooling around![wa:760] "
1002305-81 = "― It's all to protect morality on the beach![wa:640] "
1002305-84 = "― Anyway, just how long are you going to keep staring like that?![wa:10] "
1002305-86 = "― Go away!"
1002305-89 = "I-I wasn't doing that to enjoy myself, all right?"
1002305-90 = "[s] \"I heard you the first time.\""
1002305-91 = "Resting is one of my duties while at the beach. I was only going to rest for a little while to recharge before getting back to work."
1002305-92 = "Besides, you bought sunscreen for me. It'd be a waste for me to not use it..."
1002305-93 = "That was something I had to do for the sake of protecting the beach, obviously."
1002305-94 = "...Why am I making excuses?"
1002305-95 = "You never would have seen me in that state had you not followed me like I asked you to."
1002305-96 = "I really hate you, Sensei!"
1002305-98 = "The gap between Iori and I widens yet again."

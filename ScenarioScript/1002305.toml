1002305-79 = "#st;[-1200,-530];serial;60;[wa:300]― ……말해 두겠지만,[wa:980] 놀고 있는 게 아니니까 말이야?"
1002305-80 = "#wait;3450"
1002305-81 = "#st;[-1200,-630];serial;60;― 이것도 엄연히,[wa:1200] 풍기를 지키는 활동의 일환으로……!"
1002305-82 = "#wait;5500"
1002305-83 = "#clearST"
1002305-84 = "#st;[-1200,-530];serial;60;[wa:250]― ……그보다,[wa:640] 언제까지[wa:300] 지켜보고 있을 거야!"

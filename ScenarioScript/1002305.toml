[translation]
1002305-1 = "การเบนความสนใจของคณะกรรมการวินัย"
1002305-2 = "นี่! ทำไม 'เซ็นไซ' ถึงไม่เสิร์ฟโมจิย่างมาด้วยล่ะ?"
1002305-3 = "แถมยังไม่ร้อนอีก แล้วดันเป็นมะม่วงกับน้ำแข็งแทนที่จะเป็นถั่วแดงด้วย! นี่ล้อเล่นรึไง?!"
1002305-4 = "ตะ... แต่นี่มันไม่ใช่ 'เซ็นไซถั่วแดงต้ม' นะครับลูกค้า มันคือ 'เซ็นไซบิงซู' ที่ใส่ผลไม้ภาคใต้ต่างหากครับ"
1002305-5 = "พูดอะไรไม่เข้าท่า! พวกเราอยากกินถั่วแดงต้มร้อนๆ นะ!"
1002305-6 = "ไปเอาเซ็นไซที่มีถั่วแดงต้มกับโมจิย่างเยอะๆ มาเดี๋ยวนี้เลย!"
1002305-7 = "ถ้าจะมาหาถั่วแดงต้มในร้านบิงซูแบบนี้ละก็..."
1002305-11 = "หยุดทำอะไรไร้มารยาทได้แล้ว เจ้าพวกแหกกฎ!"
1002305-13 = "อ๊ะ?! คณะกรรมการวินัยเกเฮนน่า!"
1002305-14 = "ชิส์ มีคนแจ้งไปเหรอเนี่ย!"
1002305-15 = "สู้ไปก็คงแพ้ราบคาบแน่ๆ รีบหนีกันเถอะ!"
1002305-19 = "หนอย! จะหนีเหมือนพวกคนขี้ขลาดเรอะ!"
1002305-20 = "หยุดเดี๋ยวนี้นะ!"
1002305-26 = "(อิโอริไล่ล่าเด็กพวกนั้นไปตามชายหาด)"
1002305-36 = "เฮ้อ จัดการได้สักที"
1002305-37 = "[s1] \"ทำได้ดีมาก\"\n[s2] \"ไม่ได้บาดเจ็บตรงไหนใช่มั้ย?\""
1002305-38 = "ฮึ่ม! พวกนั้นหนีเร็วกว่าที่คิดจนใช้เวลาไล่ล่าอยู่นาน แต่ก็ไม่ใช่พวกเก่งกาจอะไรนักหรอก"
1002305-39 = "ฮึ่ม! พวกนั้นหนีเร็วกว่าที่คิดจนใช้เวลาไล่ล่าอยู่นาน แต่ก็ไม่ใช่พวกเก่งกาจอะไรนักหรอก"
1002305-40 = "คนโง่พวกนี้วันๆ เอาแต่ก่อเรื่องวุ่นวาย ไม่เหน็ดเหนื่อยกันบ้างหรือไงนะ?"
1002305-41 = "อุตส่าห์เตรียมแทนนิ่งออยล์มาเข้าค่ายฝึกฤดูร้อนแท้ๆ แต่แทบไม่มีเวลาทาออยล์ ไปนอนอาบแดดเลย"
1002305-42 = "[s] \"มีปัญหาอะไรเหรอ?\""
1002305-43 = "มะ... ไม่มีอะไรหรอก!"
1002305-44 = "ก็แค่เหนื่อยที่ไปไล่ล่าเด็กโง่พวกนั้นมาน่ะ..."
1002305-46 = "คุณครู ฉันจะขอให้ช่วยลาดตระเวนแถวๆ นี้ให้หน่อยได้มั้ย? ฉันว่าจะไปลาดตระเวนชายหาดฝั่งนู้น#nที่ไม่ค่อยมีคนน่ะ..."
1002305-47 = "คือว่า... มันอาจจะมีพวกงี่เง่ากำลังวางแผนร้ายอะไรในที่ที่ไม่มีผู้คนก็ได้"
1002305-48 = "เลยรู้สึกว่าต้องไปตรวจตราพื้นที่ห่างไกลในฐานะของผู้เชี่ยวชาญของคณะกรรมการวินัยน่ะ..."
1002305-49 = "[s] \"งั้นให้ไปเป็นเพื่อนมั้ยล่ะ?\""
1002305-50 = "หา?! ไม่ต้อง คุณครูไม่ต้องตามไปด้วยหรอก ห้ามเลยนะ!"
1002305-51 = "ฉันทำคนเดียวได้น่า! ที่นั่นมันอันตราย คุณครูรออยู่ทางนี้เถอะ"
1002305-52 = "[s] \"ก็ได้...\""
1002305-53 = "เข้าใจที่ฉันพูดจริงๆ ใช่มั้ย?"
1002305-54 = "คุณครูห้ามตามมาเด็ดขาดนะ!"
1002305-55 = "งั้นก็ฝากงานทางนี้ด้วยล่ะ"
1002305-59 = "[ns] ตามอิโอริไป"
1002305-62 = "(อิโอริกำลังนอนอาบแดดอยู่ใต้เงาหินก้อนใหญ่ในจุดที่ห่างไกลผู้คน)"
1002305-63 = "เฮ้อ... ได้มาทะเลทั้งที จะให้แค่มาปราบพวกเด็กเกเรอย่างเดียวก็น่าเสียดายแย่"
1002305-64 = "บางครั้งเราก็ต้องหาเวลาผ่อนคลายแบบนี้บ้าง... เอ๋?"
1002305-67 = "― ฮะ...! เฮือก?![wa:570] "
1002305-71 = "― นี่ คุณครูแอบตามมาตอนไหนเนี่ย?[wa:360] "
1002305-74 = "― คอยดูฉันตั้งแต่เมื่อกี้แล้วงั้นเหรอ?[wa:1450] "
1002305-76 = "― คน...โรคจิต! ตายซะ![wa:1080] "
1002305-79 = "― บอกไว้ก่อนนะ... ว่าเราไม่ได้มาเที่ยวเล่นกันน่ะ[wa:560] "
1002305-81 = "― ที่ทำแบบนี้ ก็เพื่อรักษาบรรยากาศของชายหาดต่างหากล่ะ![wa:240] "
1002305-84 = "― ว่าแต่...จะจ้องแบบนั้นไปถึงเมื่อไรกันน่ะ![wa:470] "
1002305-86 = "― จะไปไหนก็รีบไปเลย!"
1002305-89 = "ก็บอกว่าไม่ได้มาอู้งานไง...?"
1002305-90 = "[s] \"ไม่ต้องบอกก็รู้อยู่แล้วล่ะ\""
1002305-91 = "ก็นานๆ ทีจะได้มาทะเล แล้วการพักผ่อนก็เป็นส่วนหนึ่งของภารกิจด้วย ฉันกะว่าจะพักสักแป๊ปก่อนกลับ#nน่ะ..."
1002305-92 = "อีกอย่างคุณครูก็ซื้อแทนนิ่งออยล์มาให้แล้ว ถ้าจะไม่ใช้เลยก็เสียดายแย่..."
1002305-93 = "สรุปก็คือ ที่ฉันทำไปก็เพื่อรักษาความสงบของที่นี่..."
1002305-94 = "เดี๋ยวนะ แล้วทำไมฉันต้องมาแก้ต่างกับคุณครูด้วยล่ะ?"
1002305-95 = "ถ้าไม่ตามมาตั้งแต่แรก ก็คงไม่มาเห็นฉันในสภาพแบบนี้ไม่ใช่เหรอ..."
1002305-96 = "ฉันเกลียดคุณครู!"
1002305-98 = "(ความสัมพันธ์ของคุณครูกับอิโอริแย่ลงกว่าเดิม...)"

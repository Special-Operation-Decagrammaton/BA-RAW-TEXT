[translation]
90001220-1 = "Episode 22;Grid Points"
90001220-2 = "The aurora is gone, and all circuits and devices have returned to normal."
90001220-3 = "Aww, darn. It was so pretty!"
90001220-4 = "Fufu. While I do agree that the unexpected aurora is a beautiful natural phenomenon, its implications are that of a more dangerous nature."
90001220-5 = "Such a phenomenon indicates that there was a large disturbance in the electromagnetic field, which is why our wireless communications and electronics were impacted."
90001220-6 = "R-Really? I guess it's a good thing it went away quickly, then!"
90001220-7 = "Wireless outages caused by disturbances in the electromagnetic field are typically restored within three to four hours. You don't have to worry too much."
90001220-8 = "Ms. Rio..."
90001220-9 = "I-Is it possible that you're actually pretty nice? You used to be really stubborn and scary before!"
90001220-10 = "I-Is that so...?"
90001220-11 = "Everyone, the transport ship will arrive in about fifteen minutes. Please do a final check for your belongings."
90001220-12 = "Understood!"
90001220-16 = "And for Ms. Rio..."
90001220-17 = "I don't need to remind her of anything. She's probably organized everything two times over already."
90001220-22 = "Kei? Are your preparations complete?"
90001220-23 = "I suppose so. My only belonging is this body, after all."
90001220-24 = "Right? Since your body is my creation, you should find that you can respond to any situation with ease."
90001220-25 = "Wow. The happiness and contentment radiating from you makes it rather difficult to respond."
90001220-26 = "However, um, Rio..."
90001220-27 = "Hm? What's wrong?"
90001220-28 = "That is... Well..."
90001220-29 = "?"
90001220-30 = "[s] \"(Hm, could it be...?)\""
90001220-34 = "[ns1] \"Ah! How could this happen!\"\n[ns2] \"I forgot something over there!\"\n[ns3] \"Himari! I'll be borrowing Rio and Kei for a bit!\""
90001220-38 = "S-Sensei?"
90001220-39 = "Wh-What?! What nonsense is this, Sensei?! Stop dragging me! Do you know how difficult it is to balance with one wheel?!"
90001220-43 = "Sensei? If you're looking for something, then you should..."
90001220-47 = "...be fine, since you have Rio and Kei with you."
90001220-48 = "Yes. Both Rio and Kei."
90001220-49 = "If you're late, I'll send you a MomoTalk."
90001220-54 = "...What is it? What do you want to say to us?"
90001220-55 = "Hm? Aren't we helping Sensei find something?"
90001220-56 = "You are truly exasperating. Clearly, Sensei had ulterior motives in bringing us here. Do you perhaps require constant monitoring to ensure you don't get scammed in your day to day life?"
90001220-57 = "Th-That's what it was...?"
90001220-58 = "...What is it? Hm? You believe I had something I wished to say to Rio?"
90001220-59 = "Wh-What are you talking about! There's nothing like that, nothing at all!"
90001220-60 = "I have nothing to say...!"
90001220-61 = "[s] \"Kei-Kei, you sure are shy about your feelings, aren't you?\""
90001220-62 = "Wh-What is this adult prattling about?!"
90001220-63 = "..."
90001220-64 = "*sigh* Fine. I will only say this in an effort to ensure it doesn't cause any calculation errors in the future..."
90001220-65 = "(What could she want to talk about so badly...?)"
90001220-66 = "Well, you see. To begin... Ah, so I'd like to say... In reality, I would prefer to not say this at all, however...!"
90001220-69 = "But I'm happy that you could get your own body and be with us."
90001220-70 = "Otherwise...we would not have been able to help each other like this, right?"
90001220-73 = "I-I simply wanted to thank you."
90001220-74 = "I understand. Even if you hate me, it's very—"
90001220-75 = "Huh?"
90001220-76 = "What?"
90001220-77 = "Excuse me, what manner of response is that?"
90001220-78 = "What do you mean...?"
90001220-82 = "[ns] \"(I wonder if there's popcorn somewhere...)\""
90001220-83 = "Wh-What made you believe that I would hate you? Do you see me as an ungrateful pest or something?!"
90001220-84 = "W-Well, I've been hated by a lot of people until this point, so I assumed there was something wrong with me!"
90001220-85 = "There is nothing wrong with you! I just...ugh!"
90001220-89 = "Thank you. Thank you for giving me a new life. That is all."
90001220-90 = "...!"
90001220-91 = "It's only that... How do I explain this?"
90001220-96 = "This experience made me feel...alive."
90001220-97 = "I can see, I can move, and I can sense things. Despite being in a body like this."
90001220-98 = "...Despite this body. Yes."
90001220-100 = "Are you...perhaps angry about the body?"
90001220-101 = "Gah! You truly...!"
90001220-102 = "No. Pardon me. I understand. Yes. For one's genetics and nature is fate itself... Throughout our existences, we live to either challenge or accept it!"
90001220-103 = "I-I'm lost, but I think I'm sorry...?"
90001220-108 = "[ns] \"Kei-Kei, let's calm down a little.\""
90001220-109 = "I don't know how many times I have to say this, but it's not Kei-Kei!!"
90001220-111 = "..."
90001220-112 = "Um... I'm sorry, Kei, but I also had something I hoped to tell you."
90001220-113 = "I believe...an apology is in order here."
90001220-119 = "...What exactly are you apologizing for, Rio?"
90001220-120 = "Well, about Aris...and you..."
90001220-121 = "I..."
90001220-122 = "I've let that go."
90001220-123 = "R-Really?"
90001220-124 = "Yes. Aris forgave you, after all. Although, to be precise, she declared that forgiveness wasn't even necessary."
90001220-125 = "And, for the two of us, speaking about this is awkward and difficult, yes? So...all is well."
90001220-126 = "Just...moving forward, treat us both differently. Better."
90001220-127 = "I-I understand."
90001220-128 = "...Thank you."
90001220-129 = "Well, we both had things we wanted to say."
90001220-130 = "If we had been unable to discuss these things, it would've been rather uncomfortable."
90001220-131 = "The transport ship should arrive soon, so I'll be going now."
90001220-136 = "Rio."
90001220-137 = "Huh?"
90001220-138 = "Thank you for giving me life."
90001220-139 = "...!"
90001220-146 = "Kei disappeared quickly, but Rio didn't move a single step from where she stood."
90001220-147 = "I made my footsteps loud as I approached, so as not to surprise her."
90001220-151 = "Sensei...?"
90001220-152 = "Um, apologies. Please don't look at me right now. It's just..."
90001220-153 = "I'll be back to my usual self soon. So please..."
90001220-154 = "[s] \"Handkerchief?\""
90001220-155 = "...!"
90001220-156 = "..."
90001220-157 = "Yes... For just a moment..."
90001220-159 = "I stayed by Rio's side until she calmed down."
90001220-163 = "Thank you, Sensei."
90001220-167 = "We are currently cruising. Vision is clear, and no signs of potential turbulence."
90001220-168 = "However, there is still a crisis to be addressed."
90001220-169 = "What's that, Toki?"
90001220-170 = "...Where is our next destination?"
90001220-171 = "Aha, that. Have no concern, our adorable little Aris says she knows."
90001220-172 = "[s] \"I didn't know about this...\""
90001220-173 = "That would add up. Aris gave me a brief explanation when you, Kei, and Rio left to \"find\" your \"lost belongings.\""
90001220-175 = "Bum bum bum! Yes! It is my turn from now on!"
90001220-176 = "I see. Crisis averted. Would you like to sit in the cockpit with me, Aris?"
90001220-177 = "Yes, ma'am! May Kei come with us, Toki? Just in case!"
90001220-178 = "Yes. No problem. Now then, let's go."
90001220-186 = "[ns] \"I'll leave it to you then!\""
90001220-187 = "What are you talking about, Sensei."
90001220-188 = "[s] \"Huh...? What do you mean?\""
90001220-189 = "You're coming with us, Sensei."
90001220-190 = "[s] \"Are there enough seats up there...?\""
90001220-191 = "We will make it work one way or another."
90001220-198 = "Surprisingly, we all had somewhere to sit."
90001220-199 = "Toki tried to gesture me into her lap, but after quite a bit of effort, I managed to convince her to give up on the notion."
90001220-201 = "Yes. This way is good. Please continue in this direction."
90001220-202 = "Thank you, Aris. But please designate our destination's coordinates, just in case."
90001220-203 = "C-Coordinates? Um... Uh..."
90001220-204 = "I see! I know what I should say here! Please change the course towards north by northwest! "
90001220-205 = "What...?"
90001220-206 = "Okay, okay. This is what I'm here for. Let's see..."
90001220-211 = "Done. Please continue to the destination."
90001220-212 = "Thank you, Kei. It seems that I was not incorrect."
90001220-213 = "...What? WHAT? Whenever you look at me like that, it's cause for concern!"
90001220-214 = "What does that mean? I was simply thinking that Kei..."
90001220-219 = "...is a nice and kind child."
90001220-220 = "That's definitely, definitely, DEFINITELY not true!"
90001220-221 = "[s] \"It's true. Kei-Kei is such a nice and kind kid.\""
90001220-223 = "I'm going to kill Sensei, then go DIE!!!"
90001220-230 = "Kei? Kei?! It is not a good idea to move around too much in here!"
90001220-231 = "Yes, Kei. A small mistake in the cockpit can lead to immediate and irreversible consequences, so please be careful."
90001220-236 = "[ns] \"It's true. Kei-Kei is such a nice and kind kid, who sometimes runs amok.\""
90001220-238 = "AAARRRGGGHHH!!!"
90001220-240 = "And so, while enduring Kei's intense glares and side eyes..."
90001220-241 = "...we headed off to our destination."
90001220-244 = "...I've confirmed the enemy's destination. They're moving towards...Grid Points."
90001220-245 = "They really made it this far... M-Maybe we should acknowledge them..."
90001220-246 = "I can acquiesce to that point. They were slightly superior to the other inane humans."
90001220-247 = "If we have to resort to Plan C...no, Plan D, we might have to consider making Tiphareth retreat to the Steel Continent. I'll leave that to you, Ein."
90001220-248 = "Y-Yes! I'll do so!"
90001220-249 = "Now then, shall we? According to Sof..."
90001220-253 = "...a welcoming party should be grand!"
90001220-255 = "Next Episode;Storage"

[translation]
90001220-1 = "ตอนที่ 22;กริดพอยต์"
90001220-2 = "แสงเหนือหายไปแล้ว วงจรไฟฟ้าและอุปกรณ์ต่างๆ ก็กลับมาใช้งานได้ตามปกติแล้วค่ะ"
90001220-3 = "อืม~ น่าเสียดายหน่อยๆ แฮะ แสงเหนือเมื่อกี้มันสวยสุดๆ ไปเลยนะ!"
90001220-4 = "ฮุฮุ แสงเหนือที่เกิดขึ้นอย่างกะทันหันเป็นปรากฏการณ์ทางธรรมชาติที่น่าทึ่งอยู่หรอกค่ะ แต่ที่จริงแล้วมันคือสัญญาณที่น่ากลัวเลยนะคะ"
90001220-5 = "โดยพื้นฐานแล้วมันคือการที่สนามแม่เหล็กได้รับการรบกวนอย่างมาก พวกการสื่อสารไร้สายก็เลยได้#nรับผลกระทบค่ะ"
90001220-6 = "งะ... งั้นเหรอ...? งั้นก็ถือว่าค่อยยังชั่วมั้ยนะที่มันรีบหายไปน่ะ...?"
90001220-7 = "การหยุดการทำงานของอุปกรณ์ต่างๆ จากการที่สนามแม่เหล็กถูกรบกวน ปกติแล้วจะฟื้นตัวได้ในไม่กี่#nชั่วโมง เพราะงั้นไม่ต้องกังวลกันหรอก"
90001220-8 = "ประธาน..."
90001220-9 = "ประธานดูเป็นคนใจดีขึ้นมาเลยนะเนี่ย?! ก่อนหน้านี้ฉันคิดว่าประธานทั้งดื้อดึงและเป็นคนน่ากลัวแท้ๆ เลย!"
90001220-10 = "งะ... งั้นเหรอ...?"
90001220-11 = "ทุกคน ยานขนส่งจะมาถึงในอีก 15 นาทีแล้ว ตรวจสอบสัมภาระเป็นครั้งสุดท้ายกันด้วยนะ"
90001220-12 = "เข้าใจแล้ว!"
90001220-16 = "ส่วนประธาน..."
90001220-17 = "ฉันคงว่าอะไรไม่ได้น่ะนะ คงจะจัดการของของตัวเองไว้แล้วละ"
90001220-22 = "เคย์? เตรียมตัวเสร็จแล้วเหรอ?"
90001220-23 = "ค่ะ... ก็นอกจากร่างนี้ ฉันก็ไม่มีอะไรให้เตรียมแล้วนี่คะ"
90001220-24 = "ใช่มั้ยล่ะ? ฉันเป็นคนสร้างร่างนี้มาเอง ไม่ว่าจะในสถานการณ์ไหนก็รับมือได้เร็วอยู่แล้ว"
90001220-25 = "ว้าว... ดูท่าทางของคุณที่ทั้งมีความสุขและทั้งภูมิใจนั่นสิ ทำเอาฉันพูดอะไรไม่ออกเลยนะคะ..."
90001220-26 = "แต่ว่า ริโอะ เรื่องนั้นน่ะค่ะ"
90001220-27 = "หืม? ทำไมเหรอ?"
90001220-28 = "คือว่า เอ่อ... คือว่า..."
90001220-29 = "?"
90001220-30 = "[s] (ฮืม หรือว่าเราควร...)"
90001220-34 = "[ns1] \"อ๊ะ! แย่แล้ว! ริโอะ เคย์ ช่วยครูหน่อยสิ\"\n[ns2] \"ครูทำของหล่นไว้ตรงนั้นซะได้ ริโอะ เคย์ ช่วยหน่อยสิ\"\n[ns3] \"ฮิมาริ ครูขอยืมตัวริโอะกับเคย์หน่อยนะ!\""
90001220-38 = "คะ... ครู?"
90001220-39 = "คะ? วางแผนอะไรอยู่เหรอคะคุณครู? อย่าลากกันแบบนี้สิคะ! ฉันรักษาสมดุลยากเพราะมีล้ออันเดียว#nนะคะ!!!"
90001220-43 = "คุณครู? ถ้าเป็นเรื่องการหาของละก็ ให้คนอื่น..."
90001220-47 = "แต่ในเมื่อมีทั้งริโอะและเคย์ งั้นก็คงไม่ต้องห่วงหรอก"
90001220-48 = "ค่ะ ริโอะกับเคย์น่ะ"
90001220-49 = "ถ้ากลับมาช้า ไว้ค่อยส่ง MOMOTALK ไปตามตัวก็ได้"
90001220-54 = "นี่มันเรื่องอะไรกันคะ...? มีอะไรอยากพูดกับพวกเรางั้นเหรอคะ?"
90001220-55 = "หืม? ครูไม่ได้จะมาหาของที่ทำหล่นไว้หรอกเหรอ?"
90001220-56 = "คุณเชื่อจริงๆ เหรอคะ... ไม่ได้การแล้วคนคนนี้ ต้องมีใครคอยอยู่ข้างๆ แล้วละ จะได้ไม่โดนใครหลอก#nเข้าง่ายๆ อีก..."
90001220-57 = "ปะ... เป็นอย่างนั้นสินะ..."
90001220-58 = "สรุปว่ามีเรื่องอะไรคะ? คะ? ฉันกับริโอะ... น่าจะมีเรื่องที่ต้องคุยกันตามลำพังงั้นเหรอคะ?"
90001220-59 = "พะ... พูดอะไรกันคะ! เรื่องต้องคุย เรื่องที่ต้องคุยงั้นเหรอคะ...!"
90001220-60 = "ฉันไม่มีอะไรจะคุยค่ะ...!"
90001220-61 = "[s] \"เคย์จังปากไม่ตรงกับใจสินะ~\""
90001220-62 = "พูดอะไรของคุณคะ ผู้ใหญ่คนนี้นี่!!!"
90001220-63 = "..."
90001220-64 = "เฮ้อ... เข้าใจแล้วค่ะ ถ้าไม่ระบายเรื่องแบบนี้ออกมาละก็ สุดท้ายก็คงทำให้เกิดข้อผิดพลาดด้านการ#nคำนวณในวงจร..."
90001220-65 = "(หมายถึงเรื่องอะไรกันนะ ถึงได้เป็นเอาขนาดนี้เลย...)"
90001220-66 = "ก็แบบ... เรื่องนั้นน่ะ คือว่า... โธ่เอ๊ย จริงๆ เลย! ตอนนี้ฉันเริ่มสงสัยแล้วค่ะว่าฉันต้องมาพูดเรื่องแบบนี้#nหรือเปล่า!"
90001220-69 = "แต่ถึงอย่างนั้น อาริสึก็ดีใจที่เคย์ได้มีร่างกายแบบนี้ค่ะ"
90001220-70 = "ถ้าไม่อย่างนั้น... เราก็คงมาช่วยกันและกันอยู่แบบนี้ไม่ได้ไม่ใช่เหรอคะ?"
90001220-73 = "ฉะ... ฉันอยากขอบคุณน่ะค่ะ"
90001220-74 = "อืม ต่อให้เธอจะบอกว่าเกลียดฉัน แต่ยังไงฉันก็..."
90001220-75 = "คะ?"
90001220-76 = "ว่าไงนะ?"
90001220-77 = "เดี๋ยวสิ ทำไมเป็นงี้ล่ะ...?"
90001220-78 = "เธอต่างหากล่ะ ทำไมถึง...?"
90001220-82 = "[ns] (มีป๊อปคอร์นให้กินมั้ยนะ...)"
90001220-83 = "ทะ... ทำไมถึงคิดว่าฉันจะเกลียดคุณเหรอคะ? คิดว่าฉันเป็นคนไม่ดีที่ไม่รู้จักบุญคุณคนเหรอคะ?!"
90001220-84 = "ตะ... แต่ก็มีหลายคนที่ไม่ชอบฉันมาตั้งแต่เมื่อก่อนแล้ว แล้วนั่นก็หมายความว่าฉันคงทำอะไรผิดกับ#nพวกเขาไป...!"
90001220-85 = "จะเป็นแบบนั้นได้ยังไงกันคะ! ฉันก็แค่... แบบว่า... ก็แค่...!"
90001220-89 = "ก็แค่อยากบอกว่าขอบคุณน่ะค่ะ... ขอบคุณที่ทำให้ฉันมีชีวิตใหม่นะคะ"
90001220-90 = "...!"
90001220-91 = "ฉันควรพูดอะไรมากกว่ายืนเฉยอยู่แบบนี้หรือเปล่านะ เอ่อ..."
90001220-96 = "ถึงมันจะแค่เล็กน้อย แต่ฉันรู้สึกได้ว่าตัวเองมีชีวิตค่ะ"
90001220-97 = "ฉันทั้งมองเห็นได้ เคลื่อนไหวได้ แล้วก็รับรู้สิ่งต่างๆ ได้ด้วยค่ะ ถึงจะอยู่ในร่างแบบนี้ก็เถอะ"
90001220-98 = "ถึงจะอยู่ในร่างแบบนี้ก็เถอะ... ให้ตายสิ"
90001220-100 = "หรือว่า... เธอโกรธเพราะร่างของเธอเป็นแบบนี้งั้นเหรอ?"
90001220-101 = "โห... เชื่อเขาเลย...!"
90001220-102 = "ไม่หรอกค่ะ ฉันต้องเข้าใจสิคะ ค่ะ คงต้องอย่างนั้นละค่ะ เราทุกคนต่างมีโชคชะตาที่เรียกว่าพันธุกรรม และนิสัยใจคออยู่แล้วนี่... แล้วเราก็ใช้ชีวิตด้วยการต่อต้านหรือยอมจำนนต่อสิ่งนั้น...!"
90001220-103 = "ฉะ... ฉันไม่ค่อยเข้าใจเท่าไร แต่ก็ ขอโทษ... ด้วยนะ..."
90001220-108 = "[ns] \"เคย์จัง เรามาใจเย็นกันหน่อยดีกว่านะ\""
90001220-109 = "ต้องให้พูดอีกกี่ครั้งกันคะว่าฉันไม่ได้ชื่อเคย์จังน่ะ!!!"
90001220-111 = "..."
90001220-112 = "คือว่า... ขอโทษด้วยนะ เคย์ ฉันเองก็มีเรื่องที่ต้องบอกเธอด้วยเหมือนกัน"
90001220-113 = "บางทีฉัน... น่าจะอยากขอโทษเธอน่ะ"
90001220-119 = "ขอถามได้มั้ยคะว่าคุณจะขอโทษเรื่องอะไร และจะขอโทษทำไมคะ ริโอะ...?"
90001220-120 = "ก็... เรื่องเกี่ยวกับอาริสึ แล้วก็เกี่ยวกับเธอด้วย..."
90001220-121 = "ฉันน่ะ..."
90001220-122 = "ตอนนี้ไม่เป็นไรแล้วละค่ะ"
90001220-123 = "จะ... จริงเหรอ?"
90001220-124 = "ใช่ค่ะ อาริสึยกโทษให้คุณแล้ว ถ้าจะพูดให้ชัดๆ ละก็ อาริสึบอกว่าไม่มีอะไรให้ยกโทษด้วยซ้ำค่ะ"
90001220-125 = "แล้วถ้าจะหยิบยกเรื่องนี้มาพูดอีก ก็จะทำให้ทั้งสองฝ่ายลำบากใจกันเปล่าๆ เพราะงั้นก็... ปล่อยผ่านไปเถอะค่ะ"
90001220-126 = "เอาเป็นว่า... ต่อไปก็ปฏิบัติตัวกับพวกเราเหมือนกับคนอื่นเถอะค่ะ ทั้งหมดที่ฉันอยากบอกก็มีแค่นี้ละค่ะ"
90001220-127 = "อะ... อื้ม เข้าใจแล้ว คือว่า..."
90001220-128 = "ขอบใจนะ..."
90001220-129 = "ค่ะ ฉันเองก็อยากพูดแบบนั้นเหมือนกันค่ะ"
90001220-130 = "ถ้าฉันไม่บอกคุณ ฉันก็น่าจะรู้สึกไม่สบายใจเหมือนกันค่ะ"
90001220-131 = "ยานขนส่งน่าจะใกล้มาถึงแล้ว งั้นฉันขอกลับไปก่อนนะคะ"
90001220-136 = "ริโอะ"
90001220-137 = "หืม?"
90001220-138 = "ขอบคุณที่ทำให้ฉันมีชีวิตนะคะ"
90001220-139 = "...!"
90001220-146 = "(เคย์หายไปอย่างรวดเร็ว ส่วนริโอะก็ยืนนิ่งอยู่อย่างนั้น)"
90001220-147 = "(คุณครูจงใจเหยียบหิมะให้เกิดเสียงแล้วเดินไปข้างๆ ริโอะ)"
90001220-151 = "ครู...?"
90001220-152 = "อ่า ขอโทษนะ ตอนนี้ช่วยมองไปทางอื่นก่อนได้หรือเปล่า คือว่า..."
90001220-153 = "เดี๋ยวฉันก็กลับไปเป็นเหมือนริโอะคนเดิมแล้ว เพราะงั้น ช่วยให้เวลาฉันหน่อย..."
90001220-154 = "[s] \"เอาผ้าเช็ดหน้ามั้ย?\""
90001220-155 = "...!"
90001220-156 = "..."
90001220-157 = "อื้อ... ขอเวลาฉันสักเดี๋ยวนะ..."
90001220-159 = "(ริโอะต้องใช้เวลาสักพักกว่าจะสงบลงได้)"
90001220-163 = "ขอบคุณนะครู"
90001220-167 = "เรากำลังเดินทางโดยสวัสดิภาพค่ะ ทัศนวิสัยก็ดี ไม่มีสัญญาณของความผิดปกติใดๆ ค่ะ"
90001220-168 = "แต่ก็มีปัญหาใหญ่อยู่เรื่องหนึ่งค่ะ"
90001220-169 = "ปัญหาอะไรเหรอคะ โทคิ?"
90001220-170 = "จากนี้เราจะไปไหนกันเหรอคะ...?"
90001220-171 = "อ้อ เรื่องนี้เองสินะคะ เรื่องนั้นไม่ต้องกังวลหรอกค่ะ นั่นก็เพราะอาริสึ รุ่นน้องที่น่ารักบอกว่ามีวิธีอยู่ค่ะ"
90001220-172 = "[s] \"หืม? ทำไมครูไม่เห็นรู้เรื่องเลย...?\""
90001220-173 = "ไม่แปลกหรอกค่ะ ก็อาริสึมาบอกกับฉันตอนที่คุณครูขอให้เคย์กับริโอะไปช่วย 'ตามหา' ของที่หายไป#nยังไงล่ะคะ"
90001220-175 = "ปาปัม ปาปัม ป๊าม! ใช่ค่ะ! จากนี้ไปคือตาของอาริสึแล้วค่ะ!"
90001220-176 = "งั้นเหรอคะ ถ้างั้นฉันก็วางใจได้ค่ะ มานั่งที่นั่งนักบินกับฉันมั้ยล่ะคะ? อาริสึ?"
90001220-177 = "ได้เลยค่ะ! เคย์ก็อยากมาด้วยเหมือนกัน ขอให้เคย์เข้ามาด้วยจะได้มั้ยคะ? โทคิ?"
90001220-178 = "ค่ะ ไม่มีปัญหาค่ะ งั้นก็ไปกันเถอะค่ะ"
90001220-186 = "[ns] \"ถ้างั้นครูขอฝากด้วยนะ!\""
90001220-187 = "พูดอะไรแบบนั้นคะ คุณครู"
90001220-188 = "[s] \"หืม...? ครูพูดผิดตรงไหนเหรอ?\""
90001220-189 = "คุณครูก็ต้องไปนั่งด้วยกันสิคะ"
90001220-190 = "[s] \"แต่ที่นั่งจะพอเหรอ...?\""
90001220-191 = "ยังไงก็ต้องทำให้พอให้ได้ค่ะ บึ๋ย"
90001220-198 = "(โชคดีที่สุดท้ายก็ไม่มีปัญหาเรื่องที่นั่ง)"
90001220-199 = "(โทคิส่งสัญญาณให้คุณครูมานั่งบนตักของเธอ แต่คุณครูก็ปฏิเสธจนได้...)"
90001220-201 = "ค่ะ ทางนี้ละค่ะ ตรงไปทางนี้ได้เลยค่ะ"
90001220-202 = "ขอบคุณค่ะ อาริสึ ว่าแต่กำหนดพิกัดไว้เผื่อๆ ให้หน่อยได้หรือเปล่าคะ?"
90001220-203 = "คะ? พิกัด... เหรอคะ...? เอ่อ..."
90001220-204 = "อ้อ! ต้องพูดแบบนี้สินะคะ! เปลี่ยนเส้นทางไปทางทิศตะวันเหนือเฉียงตกค่ะ! "
90001220-205 = "คะ...? จะบอกว่าทิศตะวันตกเฉียงเหนือหรือเปล่าคะ?"
90001220-206 = "เข้าใจแล้วค่ะ เข้าใจแล้ว ส่วนนี้ฉันจะจัดการให้เองค่ะ ไหนดูซิ..."
90001220-211 = "ได้แล้วค่ะ ไปที่พิกัดนี้เลยค่ะ"
90001220-212 = "ขอบคุณค่ะ เคย์ สายตาของฉันไม่ผิดไปจริงๆ ด้วยนะคะ"
90001220-213 = "อะไรอีกเหรอคะ...? เวลาโทคิมองกันด้วยสายตาแบบนั้น จะมีเรื่องไม่สบายใจเกิดขึ้นทุกครั้งเลย..."
90001220-214 = "พูดอะไรอย่างนั้นคะ ฉันก็แค่..."
90001220-219 = "อยากบอกว่าเคย์เป็นเด็กดีน่ะค่ะ"
90001220-220 = "ไม่เลยค่ะ ไม่ใช่ ไม่ใช่ ไม่ใช่ๆๆ เลยค่ะ!"
90001220-221 = "[s] \"ใช่แล้วนะ เคย์จังเป็นเด็กดีจริงๆ นะ\""
90001220-223 = "ฮึ่ย ฉันจะฆ่าคุณครูแล้วระเบิดตัวเองตายตามไปเลยค่ะ!!!"
90001220-230 = "เคย์? เคย์?! จะวิ่งไปวิ่งมาตรงนี้ไม่ได้นะคะ!"

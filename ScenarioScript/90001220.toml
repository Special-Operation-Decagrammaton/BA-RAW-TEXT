[translation]
90001220-1 = "第22話;網格點"
90001220-2 = "極光消失之後，所有電路和裝置都恢復正常了呢。"
90001220-3 = "唔嗯～總覺得有點可惜耶。#n明明是片美景的說！"
90001220-4 = "呵呵，突然出現的極光雖然是很美的自然現象，但其實也是個非常危險的訊號哦？"
90001220-5 = "那基本上代表磁場受到了嚴重干擾，尤其對無線通訊方面的影響更為嚴重。"
90001220-6 = "是，是嗎……？#n所以這麼說來，我們其實應該慶幸極光很快就消失了嗎……？"
90001220-7 = "因為磁場干擾造成的無線障礙，通常最多只要三、四個小時就能恢復。#n不必那麼擔心。"
90001220-8 = "會長……"
90001220-9 = "難道會長你……意外是個好人！？#n以前還覺得你既蠻橫又可怕的說！"
90001220-10 = "是，是嗎……？"
90001220-11 = "大家，運輸船再15分鐘左右就會抵達。#n最後再檢查一下行李吧。"
90001220-12 = "知道了！"
90001220-16 = "至於會長……"
90001220-17 = "應該不需要我多說什麼吧。#n會長應該已經自己準備好了才對。"
90001220-22 = "Kei？都準備好了嗎？"
90001220-23 = "嗯……反正除了這個身體之外，我也沒什麼好準備的。"
90001220-24 = "對吧？那個身體可是我製造的，無論面對任何狀況都能迅速應對。"
90001220-25 = "哇……看你打從心裡開心又那麼相信的表情，真不知道該說什麼……"
90001220-26 = "對了，莉央。#n我有些話想跟你說。"
90001220-27 = "嗯？怎麼了？"
90001220-28 = "那個，該怎麼說呢，是這樣的……"
90001220-29 = "？"
90001220-30 = "[s] （哼嗯，這難道是……）"
90001220-34 = "[ns1]「啊！糟了！」\n[ns2]「我好像把行李忘在那裡了！」\n[ns3]「陽葵！莉央和Kei暫時借我一下哦！」"
90001220-38 = "老，老師？"
90001220-39 = "嗯？你又想搞什麼鬼了，老師？#n不要那樣硬拉！我只有一個輪子很難維持重心啦！！！"
90001220-43 = "老師？如果要找東西的話，不如……"
90001220-47 = "……有莉央和Kei在，應該不用擔心吧。"
90001220-48 = "嗯，莉央和Kei一定沒問題的。"
90001220-49 = "為了避免他們遲到，到時候再傳個MomoTalk過去吧。"
90001220-54 = "……所以是什麼事？你有什麼話想說嗎？"
90001220-55 = "咦？我們不是來找老師忘記帶走的行李嗎？"
90001220-56 = "你還真的相信哦……這樣下去怎麼行。#n必須得有人跟在你身旁，防止你被詐騙才行……"
90001220-57 = "這，這樣啊……"
90001220-58 = "總之，你想說的是什麼事？#n嗯？問我是不是……有話要單獨對莉央說？"
90001220-59 = "什，什麼意思！那種事，那種事……！"
90001220-60 = "我根本……！"
90001220-61 = "[s]「原來Kei醬是傲嬌啊～」"
90001220-62 = "你這大人到底在說什麼啦！！！"
90001220-63 = "……"
90001220-64 = "唉……我知道了。#n如果不把話說清楚，之後電路可能會發生運算錯誤的……"
90001220-65 = "（這是什麼意思，為什麼說得這麼誇張……）"
90001220-66 = "那個，就是……該怎麼說呢……唉，真是的。#n我現在也有點猶豫，事到如今到底該不該說這些話！"
90001220-69 = "可是愛麗絲很高興Kei能用自己的身體陪在愛麗絲身邊。"
90001220-70 = "否則……現在也無法互相幫助了吧？"
90001220-73 = "我，我想說聲謝謝。"
90001220-74 = "嗯，就算你討厭我也很──"
90001220-75 = "嗯？"
90001220-76 = "什麼？"
90001220-77 = "不是，我為什麼要……？"
90001220-78 = "你又是為什麼……？"
90001220-82 = "[ns] （這附近有爆米花嗎……）"
90001220-83 = "你，你為什麼覺得我會討厭你啊？#n你以為我是不懂知恩圖報的混蛋嗎！？"
90001220-84 = "但，但是從以前就有很多人討厭我，或許是因為我自己有什麼問題……！"
90001220-85 = "怎麼可能呢！#n我只是，只是……！"
90001220-89 = "……想說聲謝謝而已。#n謝謝你賦予了我新的生命。"
90001220-90 = "……！"
90001220-91 = "待在這副身體裡的時候，該怎麼說呢……"
90001220-96 = "雖然只有一點點，不過我感受到了活著的感覺。"
90001220-97 = "眼睛能看見、身體能活動，而且還有感知能力……雖然身體長成這樣就是了。"
90001220-98 = "……雖然身體長成這副德行。"
90001220-100 = "你是……在為身體的事情生氣嗎？"
90001220-101 = "哎……你真的是……！"
90001220-102 = "不，我應該理解才對。#n我們本來就有諸如基因和性格這樣的命運……一生都在與其抵抗或順從……！"
90001220-103 = "雖，雖然不是很懂，但我應該道歉嗎……？"
90001220-108 = "[ns]「Kei醬，稍微冷靜一下吧。」"
90001220-109 = "到底要我說幾次，我不是Kei醬啦！！！"
90001220-111 = "……"
90001220-112 = "那個……抱歉，Kei。#n我也有話該對你說。"
90001220-113 = "我想……向你道歉。"
90001220-119 = "……可以問你道歉的理由嗎，莉央？"
90001220-120 = "那個……是有關愛麗絲和你的事……"
90001220-121 = "我……"
90001220-122 = "現在那都已經無所謂了。"
90001220-123 = "真，真的嗎？"
90001220-124 = "沒錯。畢竟愛麗絲已經原諒你了。#n或者說得更準確一點，是沒有原諒的必要。"
90001220-125 = "現在重提往事也只會讓彼此尷尬、難堪而已。#n所以……就讓這件事過去吧。"
90001220-126 = "往後……可以試著用不一樣的方式對待我們沒關係。"
90001220-127 = "嗯，嗯。#n我知道了，那個……"
90001220-128 = "……謝謝你。"
90001220-129 = "總之……嗯，我想說的就是這些。"
90001220-130 = "如果不說出來的話，我心裡也會不舒服的。"
90001220-131 = "運輸船差不多快到了，我就先告辭了。"
90001220-136 = "莉央。"
90001220-137 = "嗯？"
90001220-138 = "謝謝你……賦予了我生命。"
90001220-139 = "……！"
90001220-146 = "（在Kei匆忙離開之後，莉央依然待在原地一動也不動）"
90001220-147 = "（故意發出踩雪的聲音，走向莉央的身邊）"
90001220-151 = "老師……？"
90001220-152 = "那個，不好意思。#n希望現在你別看我這邊。那個……"
90001220-153 = "我，我馬上就會恢復原來的樣子，請再給我一些時間……"
90001220-154 = "[s]「需要借你手帕嗎？」"
90001220-155 = "……！"
90001220-156 = "……"
90001220-157 = "嗯……麻煩你稍等一下……"
90001220-159 = "（看來莉央似乎還需要一些時間才能冷靜下來）"
90001220-163 = "謝謝你，老師。"
90001220-167 = "現在我們正在巡航。#n視野良好，沒有亂流的跡象。"
90001220-168 = "但是仍有一個重大問題。"
90001220-169 = "是什麼問題呢，季？"
90001220-170 = "……現在該去哪裡呢？"
90001220-171 = "啊哈，原來如此。#n這點你不用擔心，因為我們的可愛後輩愛麗絲說他有個想法。"
90001220-172 = "[s]「嗯？我怎麼沒聽說過……？」"
90001220-173 = "我想也是。#n因為愛麗絲是在老師拜託Kei和莉央「尋找」失物的時候，悄悄告訴我的。"
90001220-175 = "乓啪喀乓！沒錯！現在輪到愛麗絲了！"
90001220-176 = "原來如此，這樣我就放心了。#n你要一起坐在駕駛艙裡嗎，愛麗絲？"
90001220-177 = "知道了！為了以防萬一，Kei也可以一起去嗎？"
90001220-178 = "嗯，完全沒有問題。我們走吧。"
90001220-186 = "[ns]「那就麻煩你們囉！」"
90001220-187 = "您在說什麼呢，老師？"
90001220-188 = "[s]「咦……？有什麼問題嗎？」"
90001220-189 = "老師也要一起去。"
90001220-190 = "[s]「座位不會不夠嗎……？」"
90001220-191 = "總會有辦法的，[ruby=V]耶[/ruby]。"
90001220-198 = "（結果意外地沒有發生座位方面的問題）"
90001220-199 = "（雖然一直被季要求坐在他的腿上，好不容易才哄過去就是了……）"
90001220-201 = "嗯，就是這個方向。往這邊直直前進就行了。"
90001220-202 = "謝謝你，愛麗絲。#n為了以防萬一，可以幫我指定座標嗎？"
90001220-203 = "咦？座標是嗎……？哦哦……"
90001220-204 = "愛麗絲明白了！這種時候應該這麼說才對吧！#n航行方向是──北北西！"
90001220-205 = "嗯……？"
90001220-206 = "這部分的事就交給我吧。#n我看看……"
90001220-211 = "好了，往這邊走就行了。"
90001220-212 = "謝謝你，Kei。#n我的眼光果然沒錯。"
90001220-213 = "……怎麼了？#n季那樣看著我的時候，總是會發生不好的事……"
90001220-214 = "怎麼這麼說呢。#n我只不過是……"
90001220-219 = "覺得Kei果然是個善良的好孩子而已。"
90001220-220 = "絕對，絕對，絕對不是好嗎！？"
90001220-221 = "[s]「沒錯，Kei醬真的是善良的好孩子。」"
90001220-223 = "我要先殺了老師再自殺──！！！"
90001220-230 = "Kei？Kei！？#n不可以在這裡打鬧！"
90001220-231 = "沒錯，Kei。#n駕駛艙中的小失誤，將可能釀成無法挽回的事故，因此請務必小心。"
90001220-236 = "[ns]「Kei醬雖然是善良的好孩子，不過偶爾就會失控呢。」"
90001220-238 = "呃啊啊啊啊啊啊啊啊──！！！！！"
90001220-240 = "（在被Kei惡狠狠地瞪了一眼之後）"
90001220-241 = "（一行人朝向目的地出發了）"
90001220-244 = "……發現敵方，確認航道設定。#n目標是……網格點。"
90001220-245 = "居然真的，能走到這一步……#n從，從某種意義來說，好像應該認可他們……"
90001220-246 = "是啊，至少比其他所有愚蠢的人類稍微好一點。"
90001220-247 = "C計劃……不，如果實施D計劃，就必須考慮讓提法瑞特撤退到鋼鐵大陸的方案了。#n這個部分就交給你了，Ain。"
90001220-248 = "是，是！請不用擔心！"
90001220-249 = "那就照Soph說的試試看吧。"
90001220-253 = "歡迎派對，就得辦得轟轟烈烈才行！"
90001220-255 = "下一話;保管所"

[translation]
10021015-13 = "......"
10021015-14 = "ไม่นะ... ฉัน..."
10021015-15 = "...ทำไม่ได้"
10021015-17 = "ทำไม่ได้... ฉัน... มีแค่เรื่องนี้เท่านั้น... ที่ฉัน..."
10021015-18 = "ขอโทษนะคุณครู ฉัน... ขอโทษ... เรื่องนี้... มันหนักหนาเกินไป... ฉันน่ะ..."
10021015-20 = "... ฉันไม่ได้อยากให้มันเป็นแบบนี้เลย..."
10021015-24 = "......"
10021015-25 = "...อย่างนี้นี่เอง"
10021015-30 = "เพลนาพาเทส นิ่งเงียบไป... และก็คุณชิโรโกะจากมิติอื่น... ล้มลงไปแล้วค่ะ"
10021015-31 = "แฮ่ก... แฮ่ก..."
10021015-32 = "ชะ...ชนะแล้วเหรอคะ... พวกเรา..."
10021015-33 = "อา... ดูเหมือนจะเป็นแบบนั้นนะ..."
10021015-34 = "เพราะอะไรกัน... เรื่องประสบการณ์ ฉันย่อมมีมากกว่าอยู่แล้ว..."
10021015-35 = "ฉันต่อสู้ สู้ สู้ สู้ แล้วก็สู้มาเรื่อยๆ... แล้วทำไม... ถึงเป็นแบบนี้ได้..."
10021015-37 = "มีอะไร... บางอย่างที่... ยังขาดไปงั้นเหรอ..."
10021015-38 = "[ns] เดินเข้าไปหาชิโรโกะที่ล้มลงไป"
10021015-41 = "คุณครู..."
10021015-42 = "[ns] \"ไม่เป็นไร ครูมีบางอย่างจะบอกกับชิโรโกะคนนั้นน่ะ\""
10021015-44 = "อื้อ..."
10021015-50 = "อา... งั้นเหรอ..."
10021015-51 = "มีเรื่องที่... อยากจะบอกสินะ... คุณครู?"
10021015-52 = "มี...อะไร..."
10021015-53 = "[s] \"ตอนนี้คงบอกได้แล้วสินะ ชิโรโกะ\""
10021015-54 = "...อะไร?"
10021015-58 = "[ns1] \"มันเกิดอะไรขึ้นกันแน่?\"\n[ns2] \"มีเรื่องอะไรเกิดขึ้นกันแน่น่ะ?\""
10021015-64 = "ทำไม..."
10021015-65 = "ถึงถาม...เรื่องพวกนั้นล่ะ...?"
10021015-66 = "บอกแล้วไง... ฉันน่ะ...คือตัวตนที่จะทำลายโลกใบนี้..."
10021015-67 = "ทำลายโลกใบนี้... ฆ่าคุณครู... และใช้เรือนี่..."
10021015-68 = "ข้ามเส้นเวลามา... เพื่อมาทำลายโลกอีกในเส้นเวลาอื่น..."
10021015-69 = "...แล้วยังถามฉันอีกเหรอ... ว่า...มีเรื่องอะไร?"
10021015-74 = "คิดว่ามีอะไรเกิดขึ้นงั้นเหรอ? กับฉันที่คิดจะทำลายโลกใบนี้เนี่ยนะ...?"
10021015-75 = "[ns] \"......\""
10021015-78 = "คุณครูน่ะ ไม่สงสัยนักเรียนเลยเหรอคะ? ต่อให้ผลที่ตามมา... จะต้องถูกหักหลังก็ตาม?"
10021015-81 = "เพราะอะไร...? ทำไมคุณครูถึงได้..."
10021015-82 = "[s3] \"เพราะการเชื่อใจนักเรียน มันคือสิ่งที่ครูควรทำยังไงล่ะ\"\n[s4] \"เพราะการเชื่อใจนักเรียน มันคือหน้าที่ของผู้ใหญ่ยังไงล่ะ\""
10021015-85 = "............"
10021015-90 = "คุณครู!! พวกเรามาถึงแล้วค่ะ!!"
10021015-91 = "อื้อ! พวกเรามาช่วยแล้วค่ะ คุณครู!!"
10021015-92 = "รีบไปเร็วเข้า! เดี๋ยวที่นี่จะระเบิดแล้ว!!"
10021015-93 = "ที่นี่เรอะ! ที่ที่คุณครูอยู่น่ะ!"
10021015-94 = "รุ่นพี่โฮชิโนะ ทุกคน...!"
10021015-95 = "ชิโรโกะจัง! กำลังรอ..."
10021015-96 = "เอ๋......"
10021015-100 = "......"
10021015-101 = "นี่เธอ..."
10021015-117 = "อะ... อะ... อะ........ อือ............"
10021015-124 = "อ๊าาาาาาาา---!!!"
10021015-134 = "อ๊าาาาาาาาาาาาาาาาาา---!!!"
10021015-135 = "อ๊าาาาาาาาาาาาาาาาาาาาาาา---!!!"
10021015-136 = "......"
10021015-137 = "......?!"
10021015-138 = "อะ...อ่า...."
10021015-142 = "......"
10021015-146 = "ฉัน.... เพราะฉัน...... ฉันเป็นคนผิดเอง......"
10021015-147 = "เพราะฉันมีตัวตนอยู่ โลกถึงล่มสลาย... ทั้งที่ฉันไม่เคยต้องการแบบนั้นเลย..."
10021015-150 = "ฉันไม่เคยต้องการจุดจบแบบนี้..."
10021015-151 = "ฉันไม่เคยอยากให้คุณครูต้องตายเลย..."
10021015-152 = "ฉัน... ขอโทษนะ... เรื่องแบบนั้น..."
10021015-153 = "ขอโทษ... ที่เป็นพวกครึ่งๆ กลางๆ ที่อยู่ด้วยจนถึงที่สุดไม่ได้... แต่ว่าฉัน... ไม่ไหวแล้ว ไม่นะ... ฉันไม่..."
10021015-154 = "ฉันผิดเอง... ต้นเหตุของทุกๆ อย่าง... เป็นเพราะฉัน...อยู่ที่อะบิดอส..."
10021015-155 = "ถ้าไม่มีฉันสักคนละก็..."
10021015-156 = "ถ้าแค่ไม่มีคนอย่างฉันสักคน...!!"
10021015-157 = "ถ้ารู้ว่าทุกอย่างจะกลายเป็นแบบนี้... ตอนนั้น... คงไม่รับสิ่งนั้นไว้..."
10021015-158 = "มันทั้งหนาว... ทั้งหิว... ไม่รู้ว่าอะไรเป็นอะไร และไม่รู้ว่าทำไมตัวเองถึงมาอยู่ที่นี่..."
10021015-159 = "แต่ว่า... ก็รู้สึกดีที่มันอบอุ่น..."
10021015-160 = "พอคิดแบบนั้นแล้ว... ก็รู้สึกไม่อยากที่จะต้องรู้สึกเหน็บหนาวอีก..."
10021015-161 = "ไม่อยากที่จะต้องโดดเดี่ยวอีก..."
10021015-164 = "เป็นความผิดของฉันเอง... ตอนนั้นฉันไม่ควรรับผ้าพันคอผืนนั้นไว้ แล้วค่อยๆ ไปตายอยู่ที่ไหนสักแห่ง#nในทะเลทราย..."
10021015-165 = "ยังไงก็จะเป็นแบบนี้อยู่แล้วนี่..."
10021015-166 = "ถ้าอย่างนั้น... ถ้าฉันทำแบบนั้นเร็วกว่านี้อีกสักนิด... ทั้งคุณครู...และทุกๆ คน... ก็อาจจะมีชีวิตอยู่ก็ได้..."
10021015-167 = "แต่เพราะฉันมีชีวิตอยู่... เพราะฉันทำผิดพลาดไป..."
10021015-170 = "ขอโทษ... ขอโทษจริงๆ..."
10021015-171 = "ที่ทำให้คุณครูต้องตาย... ที่ทำลายโลกใบนี้..."
10021015-172 = "แม้แต่คุณครู ก็กลายเป็นสีสันไป..."
10021015-173 = "คุณครูน่ะ... นำพาฉันมาที่นี่ เพื่อทำให้โลกทุกใบหายไป..."
10021015-174 = "ฉัน... ฉันน่ะ..."
10021015-176 = "นะ...นี่มัน..."
10021015-177 = "หมายความว่ายังไงกันแน่..."
10021015-178 = "...ระ...หรือว่า"
10021015-184 = "มะ... มันคงจะเป็นเรื่องที่ชิโรโกะจากมิติอื่น...เคยเจอมา"
10021015-185 = "คะ...?"
10021015-186 = "เดี๋ยวสิ... ระ...เรื่องนั้น..."
10021015-187 = "ทะ...ทำลายโลก...? คุณครู...?"
10021015-188 = "......"
10021015-191 = "[ns] \"ชิโรโกะ...เธอ...\""
10021015-193 = "[ns] \"เจ็บปวดมาตลอดเลยสินะ\""
10021015-197 = "อืม... ตอนนี้พอเข้าใจแล้วละ"
10021015-198 = "แววตาของชิโรโกะคนนั้นน่ะ กวนใจฉันมาตลอดเลย... ตอนนี้พอเข้าใจแล้วละว่าเพราะอะไร"
10021015-199 = "พอได้ยินที่คุณครูพูดก็เข้าใจขึ้นมาแล้ว..."
10021015-202 = "สีหน้า... แววตาแบบนั้น... แววตาแบบที่ชิโรโกะไม่มีทางทำเด็ดขาด..."
10021015-203 = "แต่ถึงอย่างนั้น ฉันก็รู้สึกคุ้นเคยเหมือนกับว่าเคยเห็นที่ไหนมาก่อน..."
10021015-204 = "เคยเห็นที่ไหนนะ... มีคนที่มีแววตาเหมือนกันอยู่ด้วยแน่ๆ..."
10021015-205 = "อืม... ใครกันนะ..."
10021015-206 = "อ๋อ"
10021015-207 = "...นึกออกแล้ว"
10021015-210 = "อยู่นี่เองสินะคะ......"
10021015-213 = "จริงๆ เลย ฮ่าฮ่าฮ่า... หาตัวอยู่ตั้งนานเลยนะคะ..."
10021015-214 = "...รุ่นพี่ยูเมะ"
10021015-218 = "...ตัวฉันไงล่ะ"
10021015-219 = "นึกว่าเคยเห็นที่ไหน... ที่แท้ก็เป็นตัวฉันเอง"
10021015-221 = "......"
10021015-222 = "...... เอ่อ... ระ...รุ่นพี่ชิโรโกะคนนี้... คือคนที่...มาจากมิติอื่น...งั้น...เหรอคะ?"
10021015-223 = "อื้อ ฉันเอง"
10021015-224 = "ความสามารถในการวิเคราะห์พหุมิติของเรืออะทราฮาซิส... ที่จริงแล้ว... เอ่อ..."
10021015-225 = "ตะ...แต่ว่า... ถ้าอย่างนั้น..."
10021015-226 = "ชิโรโกะคนนี้คือหนึ่งในความเป็นไปได้ที่จะเกิดขึ้นกับฉัน..."
10021015-231 = "ผ้าพันคอ......"
10021015-235 = "เธอยังพันผ้าพันคอผืนนั้นอยู่สินะ......"
10021015-236 = "ฉันน่ะ... เมื่อไรกันนะ..."
10021015-237 = "ไม่รู้สิ... จำไม่ได้แล้ว... ว่ามันหายไปตอนไหน..."
10021015-238 = "ทั้งๆ ที่มันเป็นของสำคัญมากแท้ๆ... ทำไมถึงได้..."
10021015-239 = "หลังจากที่รุ่นพี่โฮชิโนะตายไปแล้วรึเปล่านะ......"
10021015-240 = "หรือว่าหลังจากที่เซริกะจังหายตัวไป...?"
10021015-241 = "หรือตอนที่ดึงเครื่องช่วยหายใจของอายาเนะออก...?"
10021015-242 = "ไม่งั้นก็คงเป็นตอนที่ได้รับการติดต่อจากโนโนมิหลังจากที่เธอไปจากอะบิดอส...? หรือไม่ก็..."
10021015-243 = "หรือไม่ก็เป็นตอนที่ได้ข่าว... ว่าไม่มีโอกาสที่คุณครูจะฟื้นขึ้นมาอีกแล้ว...?"
10021015-245 = "เมื่อไรกันนะ... ที่ฉัน..."

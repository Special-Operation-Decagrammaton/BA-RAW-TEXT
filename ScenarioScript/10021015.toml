[translation]
10021015-13 = "……"
10021015-14 = "不行……我……"
10021015-15 = "辦不到……"
10021015-17 = "只有這件事……我實在是……"
10021015-18 = "老師，對不起……我……做不到……"
10021015-20 = "我並沒有，期望著這種事……"
10021015-24 = "……"
10021015-25 = "……這樣啊。"
10021015-30 = "誘騙者陷入沉默──並且，另一個時間軸的白子同學倒下了。"
10021015-31 = "哈啊……哈啊……"
10021015-32 = "我，我們……贏了嗎。"
10021015-33 = "似乎是呢……"
10021015-34 = "為什麼……明明是我累積的經驗更多……"
10021015-35 = "不斷地戰鬥、掙扎、求生……然而為什麼……#n會變成這樣呢。"
10021015-37 = "我的努力……還不夠嗎……"
10021015-38 = "[ns] 接近倒下的白子"
10021015-41 = "老師……"
10021015-42 = "[ns]「沒事的。我有話想對那個白子說。」"
10021015-44 = "嗯……"
10021015-50 = "啊啊……對了。"
10021015-51 = "你說過……有話想對我說對吧，老師。"
10021015-52 = "是什麼──"
10021015-53 = "[s]「希望你能告訴我，白子。」"
10021015-54 = "……告訴你什麼？"
10021015-58 = "[ns1]「到底發生了『什麼』？」\n[ns2]「發生了『什麼』事？」"
10021015-64 = "為什麼…… "
10021015-65 = "要問那種事呢……？"
10021015-66 = "我說過了吧……我是毀滅世界的存在……"
10021015-67 = "將世界導向滅亡……殺害老師……利用了「方舟」……"
10021015-68 = "這次也是為了讓另一個時間軸的世界毀滅而來……"
10021015-69 = "你想問這樣的我，發生了「什麼」……嗎？"
10021015-74 = "你認為，我是有什麼苦衷嗎？#n企圖讓世界滅亡的……我。"
10021015-75 = "[ns]「…………」"
10021015-78 = "……儘管因為這麼做，而受到他人的背叛也一樣嗎？"
10021015-81 = "為什麼……老師為何會這麼……"
10021015-82 = "[s3]「老師如果不相信學生，一切都不會開始……」\n[s4]「因為我是大人，所以想相信大家。」"
10021015-85 = "………………………………"
10021015-90 = "老師！讓您久等了！！"
10021015-91 = "我們來幫忙了唷，老師！！"
10021015-92 = "動作快！這裡就快要爆炸了！！"
10021015-93 = "老師，白子醬……還好嗎？"
10021015-94 = "星野前輩，還有大家……"
10021015-95 = "白子醬，讓你久──"
10021015-96 = "……嗯？"
10021015-100 = "……"
10021015-101 = "你是……"
10021015-117 = "唔……唔嗚…………嗚…………！"
10021015-124 = "嗚啊啊啊啊啊啊啊啊啊────！！！！"
10021015-134 = "啊啊啊啊啊啊啊啊啊啊啊啊啊────！！！！"
10021015-135 = "啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊────！！！！"
10021015-136 = "……"
10021015-137 = "……！？"
10021015-138 = "啊……！？"
10021015-142 = "……"
10021015-146 = "是，我……是我的，錯……！"
10021015-147 = "都是，因為，有我在，世界……才會，毀滅……#n明明，我根本，就不期望，發生這種事……"
10021015-150 = "我並沒有，期望著，這種結局……"
10021015-151 = "我不想，殺了，老師……！"
10021015-152 = "對，不起……我，是這種…… "
10021015-153 = "無法，堅持到，最後的，沒用的人，對不起。#n但是，我，已經……不行……沒辦法……再，繼續下去了……"
10021015-154 = "是我，的錯……全部，都是，因為我，待在阿拜多斯……"
10021015-155 = "如果，我，不在的話……"
10021015-156 = "只要沒有我的話──！！"
10021015-157 = "如果，早知道，會這樣……當時，就不該，收下它的……"
10021015-158 = "又冷，又餓……就連，為何會在這個地方，也不知道…… "
10021015-159 = "但是，很溫暖……"
10021015-160 = "因為，很溫暖……因為，不想再繼續，忍受寒冷……"
10021015-161 = "因為，不想，孤單一人……！"
10021015-164 = "是我錯了……要是當時，沒有收下圍巾，就這麼倒下的話……"
10021015-165 = "終究，會變成，這樣的話……"
10021015-166 = "要是……我能……更早，注意到的話，老師──大家，或許，就不會死了。"
10021015-167 = "都是，因為有我在……都是，我的錯……！"
10021015-170 = "對不起……"
10021015-171 = "殺害老師……毀滅世界……對不起……"
10021015-172 = "老師……被色彩，吞噬……"
10021015-173 = "所以，才會將我呼喚到這裡……為了消滅，所有的世界。"
10021015-174 = "我……我……"
10021015-176 = "……！"
10021015-177 = "這，這是什麼意思……！？"
10021015-178 = "……難，難道。"
10021015-184 = "……似乎是別的時間軸的我，經歷的事。"
10021015-185 = "咦……？"
10021015-186 = "什……那些是……！"
10021015-187 = "世界毀滅……？#n老師被……？"
10021015-188 = "……"
10021015-191 = "[ns]「白子……」"
10021015-193 = "[ns]「你一直，都很痛苦吧。」"
10021015-197 = "……這樣啊。"
10021015-198 = "大叔我啊，一直很在意「白子」的那副眼神……"
10021015-199 = "不過，聽完剛才老師的話之後，我總算明白了。"
10021015-202 = "那……是「白子醬」絕對不會露出的眼神。"
10021015-203 = "但是，又有點似曾相識……有股熟悉的感覺。"
10021015-204 = "究竟是誰呢……一定有個和他很類似的人。 "
10021015-205 = "唔嗯……"
10021015-206 = "啊啊……"
10021015-207 = "我想起來了。"
10021015-210 = "你在這裡啊。"
10021015-213 = "真是的……害我找了這麼久。"
10021015-214 = "……夢前輩。"
10021015-218 = "……和我一樣。"
10021015-219 = "還想著在哪裡見過……這也難怪。#n那個眼神，和過去的我一模一樣。"
10021015-221 = "……………"
10021015-222 = "……那，那個……#n這位白子前輩，是從別的世界來的，對吧？"
10021015-223 = "嗯，沒錯。"
10021015-224 = "利用了方舟的「多次元詮釋」能力……？#n咦，這樣的話……"
10021015-225 = "是，是那個意思對吧……！？"
10021015-226 = "這個「白子」是我擁有的可能性之一……"
10021015-231 = "……圍巾。"
10021015-235 = "你還，帶著它啊。"
10021015-236 = "我……是在哪裡呢。"
10021015-237 = "想不起來……就連，是在什麼時候弄丟的……都已經，搞不清楚了。"
10021015-238 = "明明非常珍惜它，為什麼會這樣呢……"
10021015-239 = "是星野前輩死掉之後嗎……"
10021015-240 = "是茜香下落不明的時候……？"
10021015-241 = "還是，綾音拿下生命維持裝置的時候？"
10021015-242 = "是收到野乃美離開阿拜多斯後「那樣了」的聯絡的時候？還是──"
10021015-243 = "──收到，老師已經不可能甦醒的，聯絡的時候？"
10021015-245 = "究竟，是在什麼時候……我──"

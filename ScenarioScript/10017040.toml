[translation]
10017040-1 = "Episode 4; Salvation Express"
10017040-6 = "Downtown Kivotos"
10017040-7 = "It's peaceful."
10017040-8 = "Nothing notable was found during patrol. It seems it will be a truly holy night."
10017040-9 = "..."
10017040-10 = "I sometimes fear that those most in need are beyond my sight."
10017040-11 = "How many cries for help go unanswered because I never even heard them?"
10017040-12 = "Go forth with faith and honor in your heart! Medicine knows no borders!"
10017040-14 = "Oh, Captain! Welcome."
10017040-15 = "I've been counting the minutes! Seriously, I have been."
10017040-17 = "Serina, Hanae. I'm sure you both worked very hard. I'm glad I can join you now."
10017040-18 = "And thank you, Sensei."
10017040-19 = "All that being said, you two seem down."
10017040-20 = "Did something happen?"
10017040-22 = "Well..."
10017040-23 = "We were thinking about how many people are out there that we don't even get a chance to help..."
10017040-24 = "[s] \"I want to tell you that it's all okay, but I don't know how to convince you.\""
10017040-26 = "...Medicine knows no borders. That belief is core to the Remedial Knights."
10017040-27 = "Please, spare me no detail."
10017040-32 = "Is it true, Sensei?"
10017040-33 = "That the Justice Task Force took their chicken and left them with nothing to support themselves?"
10017040-34 = "And they came to the Remedial Knights to have their story heard?"
10017040-35 = "[s1] \"Uh, I guess?\"\n[s2] \"They certainly looked sad, and that made me feel sad...\""
10017040-39 = "We asked them if we could help more..."
10017040-40 = "They must have been really hurt. They said they wanted us to remember them and their struggles..."
10017040-42 = "I understand completely. There are many who want nothing more than to be remembered."
10017040-43 = "Their stories have no conclusion, no catharsis, no final poignant point... These people just want someone to hear them."
10017040-44 = "How did I let this come to pass? I should have been there to act! I deserve any and all blame."
10017040-45 = "Th-That's not true, Captain!"
10017040-46 = "I'm still confused why the Justice Task Force did something like that."
10017040-47 = "They even said that President Tsurugi, Vice President Hasumi, and Mashiro were there."
10017040-48 = "[s3] \"There must have been a reason.\"\n[s4] \"I don't think those three would harass anybody without cause...\""
10017040-51 = "Hm? Sensei, when you say things like that, I just feel more confused."
10017040-52 = "My heart can't help but go out to them for their lost chicken..."
10017040-54 = "Serina, Hanae, even you, Sensei. It's important you all hear this."
10017040-55 = "It's dangerous to believe that those who champion justice always make the right decision."
10017040-56 = "If you do, you can end up justifying misfortune."
10017040-57 = "Do you understand? Salvation is for anybody, anywhere, anytime!"
10017040-59 = "Y-Yes, Captain!"
10017040-60 = "Got it, Captain!"
10017040-61 = "[s] \"Mine is so principled...\""
10017040-63 = "It's not about that. Principles can be their own sort of self-absorption, Sensei."
10017040-64 = "But aid must look ever outward!"
10017040-65 = "We must find those who need aid, then we must have the courage to bring it to them!"
10017040-69 = "And those who need our aid the most right now are..."
10017040-70 = "...the Justice Task Force!"
10017040-72 = "What?!"
10017040-73 = "The Justice Task Force?"
10017040-74 = "[s] \"Um... I think I might have missed a step in your logic.\""
10017040-76 = "Aid isn't limited to material possessions!"
10017040-77 = "When loved ones and like-minded colleagues go astray..."
10017040-78 = "...we must empathize with them and redirect them to the path of the righteous."
10017040-79 = "After all, what greater aid is there than removing a source of woe?"
10017040-80 = "Serina, Hanae, Sensei."
10017040-81 = "I'm going to have a talk with the Justice Task Force."
10017040-83 = "C-Captain?!"
10017040-84 = "U-U-Um..."
10017040-85 = "[s5] \"H-Hold up!\"\n[s6] \"What are you planning to do?!\""
10017040-89 = "I'm going to find out the truth, of course."
10017040-90 = "You're worried what I'll do once I find out?"
10017040-91 = "I'm going to remind the Justice Task Force what their name means."
10017040-92 = "They are our colleagues, right or wrong. If right, they are to be kept right. If wrong, they are to be set right."
10017040-93 = "B-But the Justice Task Force is having a year-end party right now!"
10017040-94 = "..."
10017040-95 = "Even more damning."
10017040-96 = "Enjoying Christmas without taking responsibility for their actions?"
10017040-97 = "They're basically celebrating injustice itself!"
10017040-98 = "Um, Captain? Captain?!"
10017040-99 = "Listen, Serina, Hanae."
10017040-100 = "You can stay here, or you can follow me."
10017040-101 = "Whichever you choose, I know it will be to provide aid as best you can. It's up to you."
10017040-102 = "Regardless, I am going to march straight to the Justice Task Force."
10017040-103 = "Go forth with faith and honor in your heart! Medicine knows no borders!"
10017040-109 = "[ns] \"Wh-What should we do?!\""
10017040-110 = "Seriously, what should we do? Captain already left..."
10017040-111 = "[s] \"We need to follow her!\""
10017040-112 = "R-Right!"

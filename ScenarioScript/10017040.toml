10017040-56 = "3;미네;01;오히려 그렇기에 놓칠 수 있는 것들이 생기고, 불쌍한 사람들이 생겨나기 마련이니까요."
10017040-57 = "3;미네;02;아시겠습니까? '구호'는…… 언제 어느 때라도, 누구에게나 주어져야 합니다!\n#3;em;[반응]\n#3;closeup"

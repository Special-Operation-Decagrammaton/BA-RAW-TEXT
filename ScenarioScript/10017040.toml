10017040-46 = "5;하나에 산타ND;06;그렇지만, 정의실현부가 왜 그런 일을 했을까요……?\n#5;stiff\n#5;a;\n#3;m1"
10017040-47 = "3;세리나 산타ND;05;그분들께 듣기로는, 부장인 츠루기 님과 부부장인 하스미 님, 그리고 마시로 씨까지 계셨던 합동 작전이었다던데……\n#3;em;[...]"
10017040-48 = "[s3] \"하지만 뭔가 더 깊은 사정이 있었던 게 아닐까?\"\n[s4] \"그 셋이 아무 이유도 없이 누군가를 괴롭힐 것 같지는 않은데……\""

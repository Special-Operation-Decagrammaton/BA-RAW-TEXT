10017040-15 = "5;하나에 산타ND;06;기다리고 있었어요! 네…… 정말로요.\n#5;stiff\n#5;a\n#3;m1"
10017040-16 = "#all;hide"
10017040-17 = "3;미네;03;세리나, 하나에. 수고가 많았습니다. 이제 저도 합류하지요.\n#3;em;[음표]\n#3;a"

[translation]
10017040-1 = "第4話;救護特快車"
10017040-6 = "奇普托斯．市內"
10017040-7 = "真是和平呢……"
10017040-8 = "巡邏中並沒有出現異常，聖夜也即將到來……"
10017040-9 = "……"
10017040-10 = "不過越是這樣，反而越讓人覺得害怕呢。"
10017040-11 = "說不定真的有人需要幫助，只是我沒看見……#n他們的呼喊聲可能正在某處迴盪著。"
10017040-12 = "呼……再一次，胸懷榮耀和信念……「哪裡要救護，我就在哪裡」！"
10017040-14 = "啊，團長！"
10017040-15 = "辛苦了，團長……"
10017040-17 = "芹奈和花繪也是，辛苦了。"
10017040-18 = "也十分謝謝老師的幫忙。"
10017040-19 = "不過話說回來……你們兩個看起來似乎很消沉呢。"
10017040-20 = "發生了什麼事嗎？"
10017040-22 = "那個，這是因為……"
10017040-23 = "我們好像……沒能給予需要幫助的人及時的救護……"
10017040-24 = "[s]「嗯，該從哪裡開始說起呢……」"
10017040-26 = "「哪裡要救護，我就在哪裡」……是我們的座右銘之一。"
10017040-27 = "能告訴我詳細的情況嗎？"
10017040-32 = "這是真的嗎，老師？"
10017040-33 = "實現正義部搶走了他們的炸雞……"
10017040-34 = "因此他們只好找我們救護騎士團訴苦……？"
10017040-35 = "[s1]「大概是這種感覺吧……？」\n[s2]「他們離開的背影相當淒涼……」"
10017040-39 = "我們問了有沒有能幫上忙的地方……"
10017040-40 = "但可能是內心受創太深的關係，他們只希望我們能記住這件事……"
10017040-42 = "原來如此……我能理解他們的心情。#n無論遇到了什麼事，人們總是會希望世界上能有人記得自己的遭遇。"
10017040-43 = "即使發出聲音也無法傳達的悲鳴……"
10017040-44 = "……都怪我來得太晚了。#n真是抱歉。"
10017040-45 = "不，不是團長的錯……！"
10017040-46 = "但是，為什麼實現正義部的各位會做出那種事呢……？"
10017040-47 = "如果沒記錯的話，#n這好像是部長弦生同學、副部長蓮實同學，還有麻白同學一起參與的聯合作戰……"
10017040-48 = "[s3]「會不會其實有更深一層的原因呢……？」\n[s4]「我覺得他們三個，不會毫無理由就做出這種事……」"
10017040-51 = "確，確實如此……？"
10017040-52 = "那麼，剛才那些人說的……"
10017040-54 = "芹奈、花繪……還有老師，我想你們應該都很清楚這點。"
10017040-55 = "如果只因為對方是標榜正義的一方，#n就盲目地相信他們永遠是對的，可是件相當危險的事。"
10017040-56 = "認為「只有自己才是正確的」這種想法，可是會讓正義變質，造成更大的損傷。"
10017040-57 = "也正因如此……#n我們更必須做好準備，隨時都能「救護」任何人！"
10017040-59 = "是，是！團長！"
10017040-60 = "說的沒錯，團長！"
10017040-61 = "[s]「美禰真嚴格呢……」"
10017040-63 = "這並不是我嚴格與否的問題，老師。"
10017040-64 = "此時此刻最重要的，是看清何處才是需要「救護」的地方。"
10017040-65 = "並且向需要的人提供必要的「救護」！"
10017040-69 = "而如今，比誰都需要我們「救護」的……"
10017040-70 = "就是實現正義部！"
10017040-72 = "什麼！？"
10017040-73 = "這，這話的意思是……"
10017040-74 = "[s]「那個……請問這麼說的邏輯是……？」"
10017040-76 = "「救護」並不單單侷限於物質層面。"
10017040-77 = "當所愛的人們，或者志同道合的夥伴誤入歧途之時……"
10017040-78 = "予以勸告和指正，也是一種「救護」。"
10017040-79 = "換言之，消除問題的根源，也能算是實質意義上的「救護」。"
10017040-80 = "芹奈、花繪……還有老師。"
10017040-81 = "我現在……要去找實現正義部。"
10017040-83 = "團，團長！？"
10017040-84 = "咦……！？"
10017040-85 = "[s5]「先，先等一下！」\n[s6]「至少說一下原因吧！」"
10017040-89 = "當然是為了查清這起事件的真相。"
10017040-90 = "查清真相之後打算怎麼做……？"
10017040-91 = "就像我剛才所說的一樣，將實現正義部導回「正義」的方向。"
10017040-92 = "這就是救護騎士團能為親愛的「夥伴」做的……#n最大限度的「救護」！"
10017040-93 = "但是實現正義部的大家，現在正在租借的咖啡廳舉辦聖誕晚會唷？"
10017040-94 = "……"
10017040-95 = "……這樣的話，時機就再好不過了。"
10017040-96 = "居然罔顧自己的不當行為，悠哉地歡度聖誕節！"
10017040-97 = "正義之名正在流淚啊！"
10017040-98 = "那，那個，團長？"
10017040-99 = "請聽我說，芹奈、花繪。"
10017040-100 = "你們想怎麼做，由你們自己決定。#n要留在這裡，或是隨我一起進行「救護」都可以。"
10017040-101 = "無論你們如何選擇，都是走在「救護之道」上。#n該如何行動，就由你們自行判斷吧。"
10017040-102 = "那麼，我出發了。"
10017040-103 = "胸懷榮耀和信念……「哪裡要救護，我就在哪裡」！"
10017040-109 = "[ns]「這，這下該怎麼做呢……」"
10017040-110 = "怎麼辦，前輩？團長已經走遠了……！"
10017040-111 = "[s]「總之先跟上去吧！」"
10017040-112 = "是！"

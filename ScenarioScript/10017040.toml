10017040-19 = "3;미네;04;그런데…… 둘 다 상당히 풀이 죽어 있는 것 같군요.\n#3;em;[땀]"
10017040-20 = "3;미네;02;무슨 일이라도 있었나요?"
10017040-21 = "#all;hide"
10017040-22 = "3;하나에 산타ND;06;그게 말이에요, 단장님……\n#3;em;[속상함]\n#3;stiff"
10017040-23 = "1;세리나 산타ND;04;어쩌면…… 진정한 구호가 필요한 사람들이 있었는데도, 저희가 제대로 도와드리지 못한 것 같아서……\n#1;a\n#3;m5"

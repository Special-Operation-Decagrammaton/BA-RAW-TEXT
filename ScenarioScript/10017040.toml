10017040-39 = "3;하나에 산타ND;06;저희가 뭔가 도와드릴 것이 없느냐고 물어봤지만……\n#3;em;[...]"
10017040-40 = "1;세리나 산타ND;06;마음의 상처가 크셨나 봐요. 그저 기억하기만 해 달라고……\n#1;em;[땀]\n#1;a\n#3;m5"
10017040-41 = "#all;hide"
10017040-42 = "3;미네;01;그 마음은 백번 이해합니다. 세상에는 단지 기억되기만을 바라는 사람도 얼마든지 있지요.\n#3;a"
10017040-43 = "3;미네;06;목소리를 내도 닿지 않고, 누군가 자신들의 목소리를 들어 주기만이라도 바라는 사람들……"
10017040-44 = "3;미네;99;아아, 어찌 이런 일이. 제가 너무 늦었던 모양이군요. 저를 마음껏 비난하셔도 좋습니다.\n#3;em;[속상함]\n#3;stiff"

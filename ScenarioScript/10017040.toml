[translation]
10017040-1 = "ตอนที่ 4;อัศวินเอ็กซ์เพรส"
10017040-6 = "ในเมืองคิโวทอส"
10017040-7 = "เงียบสงบดีจังเลยนะคะ"
10017040-8 = "ไม่พบความผิดปกติอะไรระหว่างลาดตระเวนเลย ค่ำคืนศักดิ์สิทธิ์คงใกล้มาถึงแล้วสินะคะ"
10017040-9 = "......"
10017040-10 = "แต่บางครั้งฉันก็กลัวนะ กลัวว่าจะมีคนที่ต้องการความช่วยเหลืออยู่ข้างนอกนั่น"
10017040-11 = "แต่ฉันไม่อาจรู้ได้ ก็เลยเหมือนว่ากำลังเพิกเฉยต่อเสียงตะโกนนั้นอยู่หรือเปล่า"
10017040-12 = "เข้าช่วยในพื้นที่ที่ต้องการความช่วยเหลือ! ด้วยความเชื่อมั่นและความองอาจ!"
10017040-14 = "อ๊ะ... หัวหน้า! เชิญค่ะ..."
10017040-15 = "พวกฉันกำลังรออยู่เลยค่ะ! ใช่ค่ะ... จริงๆ ค่ะ"
10017040-17 = "เซรินะ ฮานาเอะ คงทำงานกันเหนื่อยน่าดูเลยนะ จากนี้ฉันจะมาช่วยอีกแรงค่ะ"
10017040-18 = "ขอบคุณคุณครูด้วยนะคะ"
10017040-19 = "ว่าแต่... ทำไมทั้งสองคนดูหมดพลังอย่างนี้ล่ะคะ?"
10017040-20 = "เกิดเรื่องอะไรขึ้นหรือเปล่าคะ?"
10017040-22 = "หัวหน้าคะ... คือว่า..."
10017040-23 = "ฉันว่าบางที... ก็มีคนที่ต้องการความช่วยเหลือ แต่พวกฉันเข้าไปช่วยไม่ได้เท่าที่ควรน่ะค่ะ..."
10017040-24 = "[s] \"ครูอยากบอกว่าไม่เป็นไรหรอก แต่ก็คงข้ามไปไม่ได้ง่ายๆ เลยนะ...\""
10017040-26 = "เข้าช่วยในพื้นที่ที่ต้องการความช่วยเหลือ... ประโยคนี้คือหนึ่งในคติของพวกเรานี่คะ"
10017040-27 = "คงต้องฟังรายละเอียดแล้วละค่ะ"
10017040-32 = "เป็นเรื่องจริงเหรอคะคุณครู?"
10017040-33 = "ชมรมทวงความยุติธรรมมาแย่งไก่ทอดของพวกเธอไป แถมพวกเธอก็ไม่มีที่ให้พึ่งพา"
10017040-34 = "จนต้องมาระบายเพื่อร้องทุกข์กับชมรมอัศวินบรรเทาทุกข์งั้นเหรอคะ?"
10017040-35 = "[s1] \"อืม... ประมาณนั้นมั้ง?\"\n[s2] \"พวกนั้นเล่าเสร็จแล้วก็เดินเศร้ากลับไปเลย...\""
10017040-39 = "ฉันถามไปแล้วนะคะว่ามีตรงไหนที่พวกเราช่วยได้หรือเปล่า..."
10017040-40 = "คงจะเจ็บใจน่าดูเลยละค่ะ แล้วก็ขอแค่ให้เราช่วยจดจำไว้ว่าพวกเธอโดนอะไรมา..."
10017040-42 = "ฉันเข้าใจความรู้สึกนั้นเป็นอย่างดีเลยค่ะ มีผู้คนมากมายในใบโลกนี้ที่หวังเพียงแค่ได้เป็นที่จดจำอยู่ค่ะ"
10017040-43 = "คนที่ส่งเสียงไปแต่ไม่มีใครได้ยิน... คนที่หวังว่าจะมีใครสักคนที่จะได้ยินเสียงของตัวเอง..."
10017040-44 = "เกิดเรื่องแบบนี้ได้ยังไงกัน ท่าทางฉันจะมาช้าเกินไปนะคะ เชิญตำหนิฉันได้ตามใจเลยค่ะ"
10017040-45 = "มะ.. ไม่หรอกค่ะ หัวหน้า!"
10017040-46 = "ว่าแต่ ทำไมชมรมทวงความยุติธรรมถึงทำแบบนั้นเหรอคะ...?"
10017040-47 = "จากที่พวกนั้นเล่ามา เห็นว่าเป็นยุทธศาสตร์ร่วมของหัวหน้าซึรุกิ รองหัวหน้าฮาสุมิ แล้วก็มาชิโระค่ะ..."
10017040-48 = "[s3] \"แต่ว่าน่าจะมีเหตุผลอะไรที่ลึกซึ้งกว่านั้นหรือเปล่า?\"\n[s4] \"แต่ทั้งสามคนนั้นไม่น่าจะแย่งของคนอื่นไปโดยไร้เหตุผลนะ...\""
10017040-51 = "เอ๋...? พอคุณครูพูดแบบนั้น ฉันก็รู้สึกคล้อยตามขึ้นมาเลยนะคะ...?"
10017040-52 = "แต่ถ้าเป็นอย่างนั้นจริง สิ่งที่พวกนั้นพูดกันก่อนหน้าก็..."
10017040-54 = "เซรินะ ฮานาเอะ แล้วก็คุณครูด้วย เราต้องมาคุยเรื่องนี้กันแล้วค่ะ"
10017040-55 = "หากเราเชื่อว่าทุกอย่างที่กล่าวอ้างถึงความยุติธรรมเป็นสิ่งที่ถูกต้องทั้งหมด แบบนี้จะอันตรายค่ะ"
10017040-56 = "และหากเชื่ออย่างนั้น เราก็อาจมองข้ามบางอย่างไป และก็จะมีผู้คนที่น่าสงสารตามมาด้วยค่ะ"
10017040-57 = "เข้าใจหรือเปล่าคะ? 'การช่วยเหลือ'... คือสิ่งที่ต้องยึดปฏิบัติอย่างเท่าเทียม กับทุกคนและทุกเมื่อค่ะ"
10017040-59 = "ค่ะ! หัวหน้า!"
10017040-60 = "รับทราบค่ะหัวหน้า!"
10017040-61 = "[s] \"มิเนะนี่เข้มงวดจริงๆ เลยนะ\""
10017040-63 = "ปัญหานี้ไม่ได้เกี่ยวกับความเข้มงวดหรืออ่อนโยนหรอกค่ะคุณครู"
10017040-64 = "สิ่งสำคัญก็คือต้องแยะแยกให้ได้ว่าที่ไหนกำลังต้องการ 'ความช่วยเหลือ'"
10017040-65 = "และการมีความกล้าหาญที่จะก้าวไป 'บรรเทาทุกข์' ด้วยความยินดีในพื้นที่นั้นๆ"
10017040-69 = "และในตอนนี้ คนที่ต้องการ 'ความช่วยเหลือ' จากพวกเรามากที่สุดก็คือ..."
10017040-70 = "ชมรมทวงความยุติธรรมค่ะ!"
10017040-72 = "คะ?!"
10017040-73 = "ชมรมทวง... ความยุติธรรมเหรอคะ?"
10017040-74 = "[s] \"นี่มัน... ตรรกะอะไรเนี่ย...?\""
10017040-76 = "การช่วยเหลือไม่ควรจำกัดอยู่แค่ทางกายภาพนะคะ!"
10017040-77 = "ยามเมื่อคนผู้เป็นที่รักหรือเพื่อนร่วมงานที่มีค่าเดินเฉไฉออกนอกลู่นอกทาง"
10017040-78 = "การเข้าไปดึงสติให้กลับมาก็ถือว่าเป็นการช่วยเหลือเช่นกันค่ะ"
10017040-79 = "ถ้าทำเช่นนั้นเราก็จะกำจัดสาเหตุของปัญหาได้ มันจะเป็นการช่วยเหลือและบรรเทาทุกข์อย่างแท้จริงค่ะ"
10017040-80 = "เซรินะ ฮานาเอะ แล้วก็คุณครูด้วย"
10017040-81 = "ฉันจะไปหาชมรมทวงความยุติธรรมค่ะ"
10017040-83 = "หะ... หัวหน้าคะ!!"
10017040-84 = "หะ... หา?"
10017040-85 = "[s5] \"เดี๋ยวก่อน เดี๋ยวๆ\"\n[s6] \"ไปหาชมรมทวงความยุติธรรมทำไม?\""
10017040-89 = "ก็ไปค้นหาความจริงของเรื่องนี้ยังไงล่ะคะ"
10017040-90 = "ฉันจะค้นหาความจริงแล้วทำอะไรต่องั้นเหรอคะ?"
10017040-91 = "ก็จะไปทวงความยุติธรรมจากชมรมทวงความยุติธรรมไงคะ"
10017040-92 = "นั่นคือ 'การช่วยเหลือ' ที่มากที่สุดที่ชมรมอัศวินบรรเทาทุกข์ทำเพื่อ 'เพื่อน' ผู้เป็นที่รักได้ค่ะ"
10017040-93 = "ตะ... แต่ว่าตอนนี้ชมรมทวงความยุติธรรมกำลังเช่าเหมาคาเฟ่แล้วจัดงานเลี้ยงส่งท้ายปีอยู่นะคะ...?"
10017040-94 = "......"
10017040-95 = "ถ้าอย่างนั้นก็ยิ่งดีเลยค่ะ"
10017040-96 = "ไม่รับผิดชอบต่อการกระทำของตัวเอง แล้วไปสนุกกับวันคริสต์มาสอย่างสบายใจแบบนี้!"
10017040-97 = "ความยุติธรรมกำลังร้องไห้แล้วค่ะ!"
10017040-98 = "เอ่อ... หัวหน้าคะ? หัวหน้า??"
10017040-99 = "ฟังนะคะ เซรินะ ฮานาเอะ"
10017040-100 = "จะอยู่ตรงนี้ก็ได้ หรือจะตามฉันมาก็ได้เหมือนกันค่ะ"
10017040-101 = "ไม่ว่าทางไหนก็เป็นการช่วยเหลือคนอื่นเหมือนกัน ฉันจะให้พวกคุณเป็นคนตัดสินเองแล้วกันค่ะ"
10017040-102 = "แต่ว่าฉันจะไปหาชมรมทวงความยุติธรรมค่ะ"
10017040-103 = "ยึดมั่นในศรัทธาและความภาคภูมิใจ! เข้าช่วยในพื้นที่ที่ต้องการความช่วยเหลือ!"
10017040-109 = "[ns] \"อะ... เอายังไงกันดีล่ะ?!\""
10017040-110 = "ทำยังไงดีคะรุ่นพี่? หัวหน้าออกตัวไป... ไกลขนาดนั้นแล้ว..."
10017040-111 = "[s] \"พวกเราก็ตามไปก่อนแล้วกัน!\""
10017040-112 = "ค่ะ ได้เลยค่ะ!"

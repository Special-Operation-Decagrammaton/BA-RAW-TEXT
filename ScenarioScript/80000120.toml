[translation]
80000120-1 = "All Five Senses"
80000120-2 = "The winds of outsiders have at last begun to blow through Shanhaijing."
80000120-3 = "As president, and as a student, I didn't think it fit to simply allow it to pass. Therefore, I thought it prudent to at least serve you a cup of tea."
80000120-4 = "[s] \"In that case, thank you.\""
80000120-5 = "Fufu. I believe the duty of expressing gratitude falls upon me."
80000120-6 = "Allow me to brew you a cup of tea then."
80000120-11 = "[ns] \"Huh? Isn't this scent...\""
80000120-12 = "What do you think, Sensei? It should be an aroma you're familiar with, in a way."
80000120-13 = "Exactly. It's the smell of chocolate. When it comes to tea, you are meant to appreciate its color with your eyes first, then smell the aroma with your nose."
80000120-14 = "And finally enjoy the taste with your mouth."
80000120-15 = "And the tea I specially brewed this time is called \"Cacao Nibs Tea.\""
80000120-16 = "[s] \"Cacao nibs...?\""
80000120-17 = "Mhm. They're created from dried and processed cacao bean seeds. From a certain perspective, these could be considered the most primitive form of chocolate."
80000120-18 = "While the aroma is chocolatey, the flavor itself is entirely different. What do you think?"
80000120-19 = "[s] \"It's a bit bitter and nutty... It's perfect!\""
80000120-20 = "Is that so? It pleases me to hear that. After all, today is a day meant for enjoying sweetness until your taste buds protest."
80000120-21 = "At the very least, I hoped to serve you a slightly different form of flavor."
80000120-22 = "Well then, Sensei, let us continue to enjoy ourselves. After all, the art of tea is to draw out its intense aroma and flavor from a long, slow brewing process."
80000120-24 = "I quietly enjoyed Cacao Nibs Tea with Kisaki."
80000120-25 = "As I drank, my body started to feel both relaxed and energized!"
80000120-27 = "How is the tea, Sensei? Hm? Do you feel the simultaneous relaxing and energizing effects?"
80000120-28 = "Fufu. It would be difficult to draw out its benefits with just a cup or two, but cacao seeds are known to be excellent in preventing cardiovascular illnesses."
80000120-29 = "It's also meant to prevent aging and even promote weight loss."
80000120-30 = "[s1] \"Such incredible effects...!\"\n[s2] \"One more cup, please!\""
80000120-33 = "Naturally, I will give you as much as you please. However, if you were to visit Shanhaijing more often, I could procure even more for you."
80000120-34 = "Or we could also send this tea to Schale."
80000120-35 = "I suppose I could even personally make a visit to Schale and brew you a cup of tea."
80000120-36 = "Then why not use this opportunity to learn more about the art of tea?"
80000120-37 = "Hm? Anything I do for you would be nice...?"
80000120-38 = "..."
80000120-39 = "...I believe that's a bad thing about you."
80000120-40 = "[s] \"What?!\""
80000120-41 = "So you're not aware..."
80000120-42 = "I will add another bad trait of yours."
80000120-43 = "You're clueless."
80000120-44 = "...Don't pout at me like that. Not even I can grant you leniency on this matter."
80000120-45 = "Anyways, I shall take this as your acceptance..."
80000120-46 = "...and \"charge\" Schale from time to time. To inconvenience you, Sensei."
80000120-47 = "[s] \"Please be modest about it...\""
80000120-48 = "Mm. This once, I shall."
80000120-49 = "But I shall seek recompense for the \"bad\" things you've done to me."
80000120-50 = "Please, don't look so alarmed. Naturally, I am teasing you."
80000120-51 = "...Mostly."
80000120-52 = "In the first place, I too..."
80000120-53 = "...pulled a bit of a prank on you as well."
80000120-54 = "[s3] \"What...?!\"\n[s4] \"You know, it does smell really chocolate-y here!\""
80000120-57 = "Fufu. Did you notice?"
80000120-58 = "I actually made a small request to Eastern Alchemy Society...to do a bit of \"special\" processing to my tea."
80000120-59 = "Did you know, Sensei?"
80000120-60 = "Cacao nibs can also improve your blood circulation and provide tonic effects."
80000120-61 = "Of course, those are its base benefits. Not the ones I personally added to my cacao nibs tea."
80000120-62 = "Let us return to the topic at hand. You're curious what special qualities I've added to my tea."
80000120-63 = "It's nothing of great spectacle."
80000120-64 = "I requested that whoever drinks it smell like rich chocolate."
80000120-69 = "Suddenly, Kisaki got up and approached me..."
80000120-70 = "What do you think, Sensei?"
80000120-71 = "It truly does smell of rich chocolate...doesn't it?"
80000120-72 = "[s] \"Th-That's definitely the case, but...!\""
80000120-73 = "Fufu. I see."
80000120-75 = "It's Valentine's Day."
80000120-76 = "The day you gift chocolate to the person who holds your affections."
80000120-77 = "Can you truly say you enjoyed something without partaking with all five senses?"
80000120-78 = "The overwhelming smell of rich chocolate from Kisaki completely overtook my senses!"
80000120-79 = "Now, then."
80000120-80 = "Enjoy as much as you'd like, Sensei."

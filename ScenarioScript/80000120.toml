[translation]
80000120-1 = "五感圖"
80000120-2 = "近期，山海經也吹起了來自外界的各種風潮。"
80000120-3 = "妾身身為門主及學生，認為今日這般日子不能就這麼平淡地過去，#n故而希望招待老師喝杯茶。"
80000120-4 = "[s]「那我就恭敬不如從命了。」"
80000120-5 = "呵呵，應當感激的反而是妾身才對。"
80000120-6 = "那麼，就由妾身來為汝斟茶吧。"
80000120-11 = "[ns]「咦？這茶的香味是……？」"
80000120-12 = "如何，老師？#n這香氣對汝而言是否熟悉？"
80000120-13 = "不錯，這正是巧克力的香氣。"
80000120-14 = "品茶之道，講究的是先以眼欣賞茶色，後以鼻子聞香，最後才是以嘴品味。"
80000120-15 = "今日特別為汝準備的，乃「可可豆茶」。"
80000120-16 = "[s]「可可豆……？」"
80000120-17 = "嗯，是以可可果的種子乾燥後加工而成之物。#n某方面而言，亦可稱之為巧克力最原始的形態。"
80000120-18 = "雖說香氣與巧克力並無二致，味道卻截然不同。#n汝覺得如何呢？"
80000120-19 = "[s]「微微的苦味帶著堅果的香氣……配合得剛剛好！」"
80000120-20 = "是嗎，那真是再好不過了。#n畢竟今日的「甜味」應已十分充足才是。"
80000120-21 = "妾身希望，能讓老師品嘗稍有不同的味道。"
80000120-22 = "那麼老師，請繼續享用吧。#n茶藝的真諦──本就在於和知己共飲、一再回味啊。"
80000120-24 = "（於是便和妃姬一同靜靜地品嚐著可可豆茶）"
80000120-25 = "（越喝越覺得身體逐漸放鬆，卻又充滿活力……！）"
80000120-27 = "茶的味道如何，老師？#n覺得身心舒緩且精神飽滿？"
80000120-28 = "呵呵，雖說僅飲一兩杯就見效屬實有些言過其實，#n然確有說法表示，可可豆具備預防心血管疾病的功效。"
80000120-29 = "此外，在抗老化和減重方面也同樣有所幫助。"
80000120-30 = "[s1]「竟然有這麼多好處……！」\n[s2]「請再幫我倒一杯！」"
80000120-33 = "這自然不成問題……#n倘若老師能更常造訪山海經，妾身還能為汝準備更多。"
80000120-34 = "或者要將這茶，由玄龍門送至夏萊也行。"
80000120-35 = "即便……要妾身一同去夏萊為汝泡茶，也未嘗不可哦？"
80000120-36 = "老師不如藉此機會，培養對茶藝的興趣如何？"
80000120-37 = "哦？只要是妾身泡的什麼都好……？"
80000120-38 = "……"
80000120-39 = "老師的這種地方，正是缺點之所在啊。"
80000120-40 = "[s]「咦！？」"
80000120-41 = "汝對此並不知情嗎……"
80000120-42 = "看來妾身必須為老師──"
80000120-43 = "再添上一筆「缺乏自覺」的缺點了。"
80000120-44 = "……別一臉委屈的樣子，此次妾身可不會手下留情。"
80000120-45 = "總之，妾身就視為老師已經答應……"
80000120-46 = "……往後經常「突襲」夏萊，讓汝措手不及吧。"
80000120-47 = "[s]「還請手下留情……」"
80000120-48 = "嗯，現在妾身就先暫時網開一面。"
80000120-49 = "不過老師先前對妾身做過的「壞事」，可得好好奉還才行。"
80000120-50 = "無須驚慌，這當然是妾身的戲言。"
80000120-51 = "……認真程度也就五成前後吧。"
80000120-52 = "其實妾身今日已悄悄對汝……"
80000120-53 = "做了一些小小的「惡作劇」哦？"
80000120-54 = "[s3]「什，什麼！？」\n[s4]「這麼說來，巧克力的香味好像越來越濃了……？」"
80000120-57 = "呵呵，汝發覺了嗎？"
80000120-58 = "妾身委託鍊丹術研究會……在茶裡做了點「手腳」。"
80000120-59 = "汝知道嗎，老師？"
80000120-60 = "可可豆除基本的營養價值外，亦能促進血液循環和提振精神。"
80000120-61 = "然而妾身此次添加的效果，與那並無關係。"
80000120-62 = "言歸正傳──汝想知道妾身為茶增添了什麼效果對吧？"
80000120-63 = "其實也沒什麼大不了的。"
80000120-64 = "不過是能讓飲用之人──散發更濃郁的巧克力香氣罷了。"
80000120-69 = "（妃姬突然起身靠了過來……）"
80000120-70 = "感受如何呢，老師？"
80000120-71 = "妾身是否……真的散發著濃郁的巧克力香呢？"
80000120-72 = "[s]「是，是真的有沒錯啦……！」"
80000120-73 = "呵呵，這樣啊。"
80000120-75 = "今天可是情人節。"
80000120-76 = "將心意化作巧克力，送給重要之人的日子。"
80000120-77 = "若無法以五感來體會，豈能稱得上是真正的享受呢？"
80000120-78 = "（妃姬身上濃烈的巧克力香氣幾乎讓人頭暈目眩，彷彿霸佔著所有嗅覺一般……！）"
80000120-79 = "來，老師。"
80000120-80 = "盡情享受吧。"

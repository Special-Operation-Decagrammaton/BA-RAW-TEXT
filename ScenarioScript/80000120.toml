[translation]
80000120-1 = "ประสาทสัมผัสทั้งห้า"
80000120-2 = "สายลมภายนอกเริ่มพัดผ่านเข้ามาที่ซานไห่จิงแล้วสินะ"
80000120-3 = "ในฐานะประมุข และนักเรียนของซานไห่จิง เราคงปล่อยให้วันแบบนี้ผ่านไปเฉยๆ ไม่ได้ และคิดว่าอย่างน้อยเราก็ควรจะต้อนรับด้วยชาสักถ้วย"
80000120-4 = "[s] \"ขอบใจนะ จะดื่มให้อร่อยเลย\""
80000120-5 = "ฮุฮุ ดูเหมือนว่าเราต่างหากที่ต้องเป็นคนขอบคุณ"
80000120-6 = "เช่นนั้น ก็ดื่มชาเถอะ"
80000120-11 = "[ns] \"เอ๋? กลิ่นชา...?\""
80000120-12 = "เป็นอย่างไรเล่า ครู สำหรับครูคงเป็นกลิ่นที่คุ้นเคยใช่หรือไม่?"
80000120-13 = "ใช่แล้ว มันคือกลิ่นช็อกโกแลต ชาคือสิ่งที่เริ่มต้นด้วยการชื่นชมสีสันด้วยสายตา และสัมผัสกลิ่นด้วยจมูก"
80000120-14 = "และสุดท้ายก็ลิ้มรสด้วยปาก"
80000120-15 = "ชาถ้วยนี้ที่เราเตรียมไว้คือ <ชาเมล็ดโกโก้>"
80000120-16 = "[s] \"เมล็ดโกโก้...?\""
80000120-17 = "อืม เป็นชาที่แปรรูปจากการนำเมล็ดโกโก้ไปอบและตากแห้ง ในอีกแง่มุมหนึ่งอาจถือได้ว่าเป็น#nช็อกโกแลตแบบดั้งเดิมที่สุด"
80000120-18 = "กลิ่นหอมจะเป็นกลิ่นของช็อกโกแลตอย่างชัดเจน แต่รสชาติจะแตกแต่างออกไปอย่างสิ้นเชิง คิดว่าอย่างไรเล่า?"
80000120-19 = "[s] \"มันขมนิดๆ แต่ก็กลมกล่อมกำลังดีเลยนะ...!\""
80000120-20 = "อย่างนั้นหรือ เช่นนั้นก็ดี อย่างไรเสียวันนี้ก็เป็นวันที่ทุกคนจะเพลิดเพลินกับรสหวานได้อย่างเต็มที่"
80000120-21 = "อย่างน้อย เราก็อยากให้ครูได้ลิ้มลองรสชาติที่ต่างออกไปสักหน่อย"
80000120-22 = "เช่นนั้น เชิญดื่มต่อเถอะ ครู... แท้จริงแล้ว ศิลปะการชงชาก็คือการดื่มด่ำกับกลิ่นและรสชาติที่ลึกซึ้ง#nขึ้นทุกครั้งที่รินชาลงถ้วยใหม่ ร่วมกับสหายที่รู้ใจมิใช่หรือ?"
80000120-24 = "(คุณครูและคิซากินั่งจิบชาที่โต๊ะด้วยกันอย่างเงียบๆ)"
80000120-25 = "(ยิ่งดื่มชาก็ยิ่งรู้สึกว่าร่างกายผ่อนคลายและมีเรี่ยวแรงมากขึ้น...!)"
80000120-27 = "ชาเป็นอย่างไรบ้าง ครู? หืม? รู้สึกผ่อนคลายและมีเรี่ยวแรงขึ้นบ้างหรือไม่?"
80000120-28 = "ฮุฮุ เราอาจยังบอกได้ไม่ชัดเจนว่าการดื่มเพียงหนึ่งหรือสองถ้วยจะให้ผลดีหรือไม่ แต่กล่าวกันว่าเมล็ด#nโกโก้มีคุณสมบัติในการป้องกันโรคหัวใจและหลอดเลือดได้"
80000120-29 = "ทั้งยังช่วยชะลอวัย และมีส่วนช่วยในการคุมน้ำหนักด้วย"
80000120-30 = "[s1] \"มีประโยชน์ขนาดนั้นเลยเหรอ...!\"\n[s2] \"ขออีกได้มั้ย!\""
80000120-33 = "แน่นอน เรายินดีเสิร์ฟให้อีกเท่าที่ต้องการ และหากครูมาที่ซานไห่จิงให้บ่อยกว่านี้ละก็ เราคงจะเตรียมให้ได้มากกว่านี้อีกนะ?"
80000120-34 = "หรือจะให้เราส่งชานี้ไปที่ชาเล่ต์เลยก็ได้"
80000120-35 = "หรือไม่อย่างนั้น... จะให้เราไปพบที่ชาเล่ต์ แล้วชงชาให้ด้วยตัวเองก็ได้"
80000120-36 = "ลองใช้โอกาสนี้เพลิดเพลินกับศิลปะการดื่มชาดูดีหรือไม่เล่า?"
80000120-37 = "หืม? หากเป็นชาที่เราเตรียมให้ ไม่ว่าจะเป็นอะไรก็อยากลองชิมทั้งนั้นหรือ...?"
80000120-38 = "......"
80000120-39 = "เราคิดว่าจุดนี้เป็นข้อเสียของครูเลยนะ"
80000120-40 = "[s] \"ทำไมล่ะ?!\""
80000120-41 = "ไม่รู้หรอกหรือ..."
80000120-42 = "เช่นนั้นเราขอเพิ่มข้อเสียของครูไว้อีกอย่างหนึ่งแล้วกัน"
80000120-43 = "นั่นก็คือ... เรื่องที่ครูไม่รู้ตัวเอง"
80000120-44 = "อย่าทำสีหน้าไม่พอใจเช่นนั้นเลย คราวนี้เราจะไม่ยอมให้อีกแล้ว"
80000120-45 = "อย่างไรเสีย ขอถือว่าครูเห็นด้วยกับเราเลยก็แล้วกัน..."
80000120-46 = "หลังจากนี้เราคงจะต้อง 'บุก' ไปที่ชาเล่ต์แล้วรบกวนครูเป็นครั้งคราวแล้วละ"
80000120-47 = "[s] \"เอาแค่พอประมาณเถอะนะ...\""
80000120-48 = "อืม เช่นนั้นเราจะละเว้นเท่านี้ก็แล้วกัน"
80000120-49 = "ทว่าเราก็อยากจะขอเอาคืนกับสิ่งที่ครูทำ 'ผิด' กับเราบ้าง"
80000120-50 = "อย่าจริงจังเกินไปนักเลย เราแค่พูดเล่นก็เท่านั้น"
80000120-51 = "แค่ส่วนเดียวนะ..."
80000120-52 = "เพราะจริงๆ แล้วในวันนี้..."
80000120-53 = "เราเองก็แอบ 'ล้อเล่น' บางอย่างกับครูเหมือนกัน"
80000120-54 = "[s3] \"หา... ว่าไงนะ?!\"\n[s4] \"พอคิดดูแล้ว เหมือนกลิ่นช็อกโกแลตมันแรงขึ้นมั้ย...?\""
80000120-57 = "ฮุฮุ รู้ตัวแล้วหรือ?"
80000120-58 = "ที่จริงเราได้ขอให้ชมรมวิจัยศาสตร์การปรุงยาช่วยเตรียมบางอย่างที่ 'พิเศษ' ใส่ในชาที่เราเตรียมไว้"
80000120-59 = "รู้หรือเปล่า ครู?"
80000120-60 = "คุณสมบัติอย่างหนึ่งของเมล็ดโกโก้คือ ช่วยกระตุ้นการไหลเวียนของเลือดและมีฤทธิ์บำรุงร่างกาย"
80000120-61 = "แน่นอนว่านั่นเป็นเพียงคุณสมบัติพื้นฐาน ไม่เกี่ยวกับบางอย่างที่ 'พิเศษ' ที่เราขอให้ใส่ในชา#nเมล็ดโกโก้ของเราเพิ่มหรอก"
80000120-62 = "กลับเข้าเรื่องกันดีกว่า เดาว่าครูคงอยากถามสินะว่าเราใส่อะไรลงไปในชา"
80000120-63 = "ไม่ใช่ของที่ยิ่งใหญ่อะไรหรอก"
80000120-64 = "ก็แค่บางอย่างที่ทำให้คนที่ดื่มชา... ได้กลิ่นช็อกโกแลตเข้มข้นขึ้นก็เท่านั้น"
80000120-69 = "(จู่ๆ คิซากิก็ลุกขึ้นและเดินเข้ามาใกล้)"
80000120-70 = "เป็นอย่างไรเล่า ครู"
80000120-71 = "กลิ่นช็อกโกแลต... เข้มข้นขึ้นบ้างหรือไม่?"
80000120-72 = "[s] \"กะ... ก็ใช่แหละ...!\""
80000120-73 = "ฮุฮุ อย่างนั้นหรือ"
80000120-75 = "วันนี้เป็นวันวาเลนไทน์"
80000120-76 = "เป็นวันที่ใครบางคนจะมอบช็อกโกแลตให้กับผู้ที่มีใจให้"
80000120-77 = "หากไม่ใช้สัมผัสทั้งห้าในการรับรู้ความรู้สึก จะเรียกว่าเพลิดเพลินกับความรู้สึกนั้นอย่างเพียงพอได้#nอย่างไรเล่า"
80000120-78 = "(กลิ่นหอมเข้มข้นของช็อกโกแลตจากตัวคิซากิทำให้คุณครูรู้สึกมึนหัวไปหมด...!)"
80000120-79 = "เอาละ"
80000120-80 = "จงดื่มด่ำให้เต็มที่เถิด ครู"

[translation]
80000120-1 = "#title;오감도(五感圖)"
80000120-2 = "3;키사키;01;산해경에도 바야흐로 다양한 바람이 외부로부터 불어오기 시작한 참이어서 말이다.\n#3;a\n#3;em;…"
80000120-3 = "3;키사키;99;문주로서도, 학생으로서도 이날을 그냥 넘길 수는 없다고 생각하였기에, 차라도 한잔 대접해야겠다는 생각이 들었다."
80000120-4 = "[s] \"그러면 고맙게 마실게.\""
80000120-5 = "3;키사키;03;후후. 고마움의 인사를 해야 하는 것은, 오히려 내 쪽인 것 같기도 하다만."
80000120-6 = "3;키사키;03;그러면, 차를 내리도록 하지."
80000120-7 = "#st;[0,0];instant;1;"
80000120-8 = "#clearST"
80000120-9 = "3;키사키;03\n#3;d\n#wait;2000"
80000120-10 = "#wait;2000"
80000120-11 = "[ns] \"어라? 차향이……?\""
80000120-12 = "#na;키사키;어떤가, 선생. 그대에게는 어떤 의미로 익숙한 향이라고 생각되기도 하는데 말이다?"
80000120-13 = "#na;키사키;그래. 초콜릿 향이 날 것이다. 무릇 차라는 것은 눈으로 그 색을 감상하고, 코로 그 향을 맡은 뒤."
80000120-14 = "3;키사키;02;마침내 입으로 그 맛을 감상하는 것이니 말이다.\n#3;a"
80000120-15 = "3;키사키;03;그리고 이번에 특별히 내린 차는, <카카오닙스 차>이다.\n#3;em;[반응]"
80000120-16 = "[s] \"카카오닙스……?\""
80000120-17 = "3;키사키;99;음. 카카오 열매의 씨앗을 건조하여 가공 처리한 것이지. 관점에 따라서는 초콜릿의 가장 원시적인 형태라고도 볼 수 있을 게다."
80000120-18 = "3;키사키;02;향은 그야말로 초콜릿 그 자체이겠지만, 맛은 전혀 다를 터인데, 어떠한가?\n#3;em;[?]"
80000120-19 = "[s] \"살짝 씁쓸하면서도 고소한 게…… 딱 좋네!\""
80000120-20 = "3;키사키;07;그러한가. 다행이구나. 아무래도 오늘이라는 날은, '단맛'을 질릴 정도로 만끽할 수 있는 날일 테니 말이다."
80000120-21 = "3;키사키;01;적어도 나만이라도, 그대에게는 조금 다른 형식의 맛을 대접하고 싶었다."
80000120-22 = "3;키사키;03;그러면, 선생. 계속해서 들도록 하지. 본디 다예(茶艺)라는 것은, 우려내면 우려낼수록 깊은 향과 맛을 내는 차를, 벗과 함께 즐기는 것이니 말이다?\n#3;em;[음표]"
80000120-23 = "#all;hide"
80000120-24 = "#na;(키사키와 함께, 조용히 카카오닙스 차를 음미했다.)"
80000120-25 = "#na;(차를 마시면 마실수록, 어딘가 몸이 이완되면서도 활력이 생겨나는 느낌이 들었다……!)"
80000120-26 = "3;키사키;01\n#3;a"
80000120-27 = "3;키사키;02;차는 어떠한가, 선생? 흐음? 심신이 풀리면서도 활력이 돌아오는 것 같다고?\n#3;em;[반응]"
80000120-28 = "3;키사키;03;후후. 한두 잔으로 그러한 효과가 즉각적으로 나타날지는 확신할 수 없는 것이다만, 카카오 씨앗에는 심혈관 질환을 예방하는 효능이 있다고 하더구나."
80000120-29 = "3;키사키;03;그 외에도 노화를 방지하고 다이어트에도 약간의 도움을 준다고도 한다."
80000120-30 = "[s1] \"그런 대단한 효과가……!\"\n[s2] \"더 따라 주세요!\""
80000120-31 = "#wait;10"
80000120-32 = "#wait;10"
80000120-33 = "3;키사키;03;물론 얼마든지 따라 주겠다만, 선생이 산해경을 보다 자주 찾아와 준다면, 더욱 많이 줄 수도 있는데 말이다?"
80000120-34 = "3;키사키;02;아니면 현룡문에서 직접 이 차를 샬레로 배송해 줄 수도 있고."
80000120-35 = "3;키사키;99;그렇구나…… 하는 김에 내가 직접 샬레로 가서, 차를 내려 주어도 좋을 듯하군.\n#3;em;…"
80000120-36 = "3;키사키;03;이 기회에 선생도 다예에 취미를 들여 보는 것은 어떤가?"
80000120-37 = "3;키사키;01;흐음? 내가 해 주는 것이라면 뭐든지 좋을 것 같다……?\n#3;em;[?]"
80000120-38 = "3;키사키;06;……."
80000120-39 = "3;키사키;05;선생은, 바로 그런 부분이 나쁘다고 생각한다."
80000120-40 = "[s] \"왜?!\""
80000120-41 = "3;키사키;09;모르는 건가…….\n#3;em;[한숨]"
80000120-42 = "3;키사키;08;여기에서 선생의 나쁜 점을 하나 더 추가해야겠군."
80000120-43 = "3;키사키;06;바로, 자각도 없다는 점 말이다.\n#3;em;[속상함]"
80000120-44 = "3;키사키;02;……그렇게 억울하다는 표정을 짓지 말거라. 이번만큼은 나 역시 선처할 수 없으니."
80000120-45 = "3;키사키;07;아무튼, 그러면 선생도 찬성한 것으로 알고……."
80000120-46 = "3;키사키;03;……앞으로 종종 샬레로 '돌격'해서, 선생을 곤란하게 해 주어야겠군.\n#3;em;[반짝]"
80000120-47 = "[s] \"적당적당히 부탁드립니다…….\""
80000120-48 = "3;키사키;99;음. 여기에서는 선처하도록 하지."
80000120-49 = "3;키사키;05;하지만 선생이 나에게 '못된' 짓을 한 만큼은, 갚아 주고 싶구나.\n#3;em;…"
80000120-50 = "3;키사키;04;아니, 너무 심각하게 받아들이지는 말거라. 당연히 농담이 아니겠느냐."
80000120-51 = "3;키사키;03;……절반 정도는 말이다."
80000120-52 = "3;키사키;01;애초에 나 역시, 이 자리에서."
80000120-53 = "3;키사키;03;선생에게 일종의…… '장난' 같은 것을 살짝 해 두기도 하였고?\n#3;em;[음표]"
80000120-54 = "[s3] \"뭐…… 라고?!\"\n[s4] \"그러고 보니, 어딘가에서 초콜릿 향이 강하게 나고 있는 것 같은데……?\""
80000120-55 = "#wait;10"
80000120-56 = "#wait;10"
80000120-57 = "3;키사키;18;후후. 눈치채었는가?"
80000120-58 = "3;키사키;07;사실은 연단방에 살짝 부탁하여…… 내 쪽의 차에, 약간의 '특별' 처리를 해 두었다"
80000120-59 = "3;키사키;02;알고 있는가, 선생?"
80000120-60 = "3;키사키;01;카카오닙스의 또 다른 효능 중에는, 혈행을 증진시키고 자양강장 효과를 준다는 것이 있지.\n#3;em;…"
80000120-61 = "3;키사키;99;물론 그것은 내 카카오닙스 차에 가미한 효과와는 무관한, 기본적인 효능이다만."
80000120-62 = "3;키사키;02;다시 이야기를 되돌리도록 하지. 내가 마신 차에, 무슨 효능을 추가하였는지 묻고 싶은 모양이구나."
80000120-63 = "3;키사키;03;대단한 것은 아니다."
80000120-64 = "3;키사키;03;그저 마신 사람에게서, 더 짙은 초콜릿 향이 나도록 조치했을 뿐이니까."
80000120-65 = "#st;[0,0];instant;1;"
80000120-66 = "#clearST"
80000120-67 = "3;키사키;03\n#3;d\n#wait;1500"
80000120-68 = "3;키사키;03\n#3;a\n#wait;1500\n#3;closeup"
80000120-69 = "#na;(키사키가 돌연 몸을 일으켜, 한층 더 가까이 다가왔다…….)"
80000120-70 = "3;키사키;18;어떤가, 선생.\n#3;closeup"
80000120-71 = "3;키사키;18;정말로 짙은 초콜릿 향이…… 나고 있지 않은가?\n#3;closeup"
80000120-72 = "[s] \"그, 그건 분명히 그렇기는 한데……!\""
80000120-73 = "3;키사키;16;후후. 그렇구나.\n#3;closeup"
80000120-74 = "#all;hide"
80000120-75 = "#na;키사키;발렌타인 데이다."
80000120-76 = "#na;키사키;마음이 있는 자에게, 초콜릿을 선물하는 날이지."
80000120-77 = "#na;키사키;무엇이든 무릇 오감으로 즐기지 않으면, 그것을 충분히 즐겼다고 할 수 없지 않겠느냐."
80000120-78 = "#na;(정신이 아찔해질 정도로 짙은 키사키의 초콜릿 향이, 후각을 가득 채웠다……!)"
80000120-79 = "3;키사키;03;자아.\n#3;closeup\n#3;a"
80000120-80 = "3;키사키;18;마음껏 즐기도록 하여라, 선생.\n#3;closeup\n#3;em;[하트]"

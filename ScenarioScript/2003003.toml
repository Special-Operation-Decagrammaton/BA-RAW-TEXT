[translation]
2003003-1 = "A New Gastronomic Experience"
2003003-6 = "While patrolling the grounds, I ran into a familiar face."
2003003-7 = "[ns] \"Oh, Haruna?\""
2003003-11 = "Ah, Sensei. You're in the right place at the right time."
2003003-15 = "Please try this."
2003003-16 = "Haruna holds out a spoon full of what looks like purple...grains...."
2003003-21 = "[ns1] \"Whoa, is this...blueberry?\"\n[ns2] \"The texture is so interesting. It pops in my mouth.\""
2003003-24 = "Heehee..."
2003003-25 = "How's that, Sensei? It's a refreshing experience, isn't it?"
2003003-26 = "[s] \"Really refreshing! And a totally new taste.\""
2003003-27 = "The gastronomic world has become complacent in tradition. New experiences are what breathe life into cuisine!"
2003003-28 = "The molecular gastronomy tasting that you just experienced, Sensei, was to say the least, a success."
2003003-29 = "With such excellent results, that chef could simply close her eyes and rest in peace."
2003003-30 = "Um, I'm totally fine and healthy...  "
2003003-31 = "[s] \"Molecular?\""
2003003-32 = "Yes. That's the cutting edge of gastronomic innovation, breaking away from traditional recipes and approaching gastronomy in a whole new way..."
2003003-37 = "Hello, Sensei... I'm trying to open a stall..."
2003003-39 = "Haruna's story went like this..."
2003003-46 = "Um..."
2003003-53 = "Try a bit before you go! We're giving out samples of our molecular gastronomy!"
2003003-59 = "What is molecular gastronomy?"
2003003-65 = "I don't know. Look at this...something to do with these strange looking foods?"
2003003-66 = "Hm... it's a bit pricey. And they look weird as heck."
2003003-67 = "I mean, I've seen a lot of my favorite foods around the festival. I think there's some takoyaki and yakisoba back there."
2003003-68 = "Oh! I saw that takoyaki stand too. Let's go there!"
2003003-69 = "Great! I was craving some!"
2003003-75 = "Ah, hold—!  "
2003003-79 = "Haha... another bust."
2003003-80 = "It's hard to get people to try radical things..."
2003003-86 = "Oh. What is this? Looks like an interesting dish."
2003003-87 = "...!"
2003003-90 = "I see. So this is the molecular gastronomy I've heard about."
2003003-94 = "This is fruit juice, solidified into a kind of caviar..."
2003003-95 = "Yes, yes! This is what happens when you add a little bit of juice to a solution of calcium chloride and sodium alginate!"
2003003-96 = "Interesting. Do you have more dishes?"
2003003-97 = "Y-Yes! Yes I do!"
2003003-98 = "We have a meat dish made with a sous vide method! "
2003003-99 = "Aha! I've heard quite a bit about this method."
2003003-100 = "Low-temperature cooked in a vacuum-pack of ingredients in 60-degree water..."
2003003-102 = "Only the proteins are cooked to maximize the meats tender texture!"
2003003-103 = "And this fruit has a tangy, popping flavor. A carbonated soda?"
2003003-104 = "Exactly! The surface is treated with a carbonation technique, where dry ice is applied to the surface of the fruits to infuse carbonation into the material!"
2003003-106 = "So by doing that, you're getting the texture of the fruit and the carbonation at the same time. Amazing."
2003003-107 = "Indeed, with the technology of Millennium, it would be possible to extract or maximize specific flavors through polymer compounding techniques..."
2003003-113 = "Haruna listened to the explanations of molecular gastronomy concepts and the engineering tools used with keen interest."
2003003-116 = "Ah. And then Sensei happened to be walking by."
2003003-117 = "It would be a great loss, gastronomically speaking, for the public to not try these dishes."
2003003-118 = "As a foodie, it truly hurts my heart that people do not open themselves up to new experiences."
2003003-119 = "[s] \"People naturally shy away from unfamiliar things.\""
2003003-121 = "I just think if they give it a chance, they would like it! We would have a ton of business!"
2003003-122 = "[s] \"Hm. Could there be a more familiar dish that is still molecular gastronomy?\""
2003003-123 = "Familiar molecular cuisine..."
2003003-128 = "...!"
2003003-129 = "Wh-What is it?!"
2003003-131 = "[ns3] \"Haruna's eyes have...sharpened!\"\n[ns4] \"Haruna's gastronomic sensor has been triggered!\" "
2003003-134 = "I-Is that what it is, Sensei?!"
2003003-135 = "[s] \"I was just joking around. Mostly.\""
2003003-136 = "I'm...lost."
2003003-137 = "Heehee..."
2003003-138 = "Let's start with cotton candy, shall we?"
2003003-140 = "Cotton candy?"
2003003-141 = "Yes, molecular gastronomy transforms ingredients into different textures at the molecular level and creates new experiences..."
2003003-143 = "If that's the case, it could be said that the cotton candy is a great example of molecular gastronomy! It transforms powdered sugar into threads, giving it a completely different texture than traditional sugar, without sacrificing sweetness!"
2003003-144 = "[s] \"As expected of Haruna's Gastronomic Sensor!\""
2003003-146 = "You said that was a joke!"
2003003-153 = "Please give this a try."
2003003-154 = "It's a molecular gastronomy tasting that starts with cotton candy."
2003003-155 = "Do you like cotton candy?"
2003003-157 = "The thought of cotton candy does make me pretty nostalgic."
2003003-158 = "I was just craving some dessert, actually. One for me!"
2003003-159 = "Heehee..."
2003003-160 = "Yes. And here, along with cotton candy... How's a spoonful of blueberry caviar?"
2003003-161 = "What's that?"
2003003-162 = "It looks weird, but...it's edible, right?"
2003003-163 = "Don't worry. I'm sure Sensei here will vouch for it."
2003003-164 = "[s] \"I've tried it myself! It was delicious!\""
2003003-165 = "Okay, then..."
2003003-172 = "Hmm?! "
2003003-174 = "What is this texture?!"
2003003-178 = "Is this the place that sells molecular gastronomy or something?"
2003003-179 = "We've been waiting for over 30 minutes already, and the line isn't getting any shorter..."
2003003-180 = "The fact that so many people are waiting is an advertisement in itself, but..."
2003003-181 = "I'm excited. I wonder what it is! Molecular cuisine, that is."
2003003-186 = "Whoa..."
2003003-187 = "I was hoping the stall would do well, but I didn't expect it to do this well!"
2003003-188 = "Most importantly, the downside of molecular gastronomy is that it takes a long time to make..."
2003003-189 = "Heehee..."
2003003-190 = "The road to gastronomy is fraught with trials and tribulations... I've been inspired today."
2003003-191 = "[s] \"Haruna. What scheme are you cooking up in your head?\""
2003003-192 = "I think it will work, somehow. I just need to ask the Engineering Department to figure out how to mass produce it..."
2003003-193 = "And we'll be able to spread the word about molecular gastronomy far and wide!"
2003003-194 = "Thank you. Sensei! Haruna!"
2003003-196 = "Not at all. Glad to hear we were helpful."
2003003-200 = "Then, Sensei. Shall we take our leave?"
2003003-201 = "[s] \"You're just going to leave?!\""
2003003-202 = "We've accomplished our mission. We've introduced more people to the wonders of gourmet food and fine dining."
2003003-203 = "The rest is up to her to figure out, yes?"
2003003-204 = "Also, I believe I've tasted everything there is to taste at this stall."
2003003-205 = "[s] \"You're always on brand, Haruna.\""
2003003-206 = "Heeheehee... We have a lot of stalls we haven't conquered yet."
2003003-207 = "Fine dining can be found in new foods, but it can also be found in our favorite, most nostalgic foods."
2003003-212 = "So, Sensei. Will you continue touring with me for the rest of the day?"

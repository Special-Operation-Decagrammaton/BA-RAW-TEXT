[translation]
2003003-1 = "อาหารเลิศรสแบบใหม่ที่แท้จริง"
2003003-6 = "(ระหว่างที่คุณครูเดินลาดตระเวนไปสถานที่ต่างๆ รอบสนามกีฬา ก็ได้พบกับใบหน้าที่คุ้นตา)"
2003003-7 = "[ns] \"เอ๋ ฮารุนะ?\""
2003003-11 = "อ๊ะ คุณครู มาได้จังหวะพอดีเลยค่ะ"
2003003-15 = "ลองชิมอันนี้ดูหน่อยมั้ยคะ?"
2003003-16 = "(ฮารุนะยื่นช้อนที่เต็มไปด้วยบางอย่างที่เหมือนเมล็ด...อะไรสักอย่างที่มีสีม่วงมาให้)"
2003003-21 = "[ns1] \"เอ่อ นี่มัน...บลูเบอร์รีเหรอ?\"\n[ns2] \"รสสัมผัสแปลกใหม่มาก แตกเป๊าะแป๊ะในปาก\""
2003003-24 = "ฮุฮุฮุ..."
2003003-25 = "เป็นยังไงคะคุณครู? เป็นประสบการณ์ที่แปลกใหม่ดีใช่มั้ยคะ?"
2003003-26 = "[s] \"ครูเพิ่งเคยชิมอะไรแบบนี้เป็นครั้งแรกเลย\""
2003003-27 = "ประสบการณ์ใหม่เป็นปัจจัยสำคัญอย่างหนึ่งที่จะก่อให้เกิดกระแสความเปลี่ยนแปลงใหม่ๆ ให้กับโลก#nของอาหารเลิศรสที่ล้าสมัยและเคร่งครัด..."
2003003-28 = "ความพยายามที่จะให้คุณครูได้ลิ้มรส 'อาหารโมเลกุล' จะต้องประสบความสำเร็จอย่างแน่นอนค่ะ"
2003003-29 = "ถ้าเป็นแบบนี้ เหล่านักเรียนของทางมิลเลเนียมเองก็คงจะสบายใจได้แล้วละค่ะ"
2003003-30 = "เดี๋ยวสิ ฉันไม่เป็นไรเลยนะ? "
2003003-31 = "[s] \"อาหารโมเลกุล?\""
2003003-32 = "ค่ะ เป็นนวัตกรรมการทำอาหารแบบทันสมัยที่หลุดออกจากกรอบการทำอาหารแบบดั้งเดิม ทำให้เข้า#nถึงอาหารรูปแบบใหม่ๆ..."
2003003-37 = "สวัสดีค่ะ... คุณครู คราวนี้... ฉันตั้งใจจะมาเปิดร้านแผงลอยน่ะค่ะ..."
2003003-39 = "(เรื่องราวที่ฮารุนะเล่าให้ฟังก็เป็นดังนี้...)"
2003003-46 = "คือว่า..."
2003003-53 = "ลองชิมดูสักหน่อยมั้ยคะ... มันคืออาหารโมเลกุลชนิดหนึ่งน่ะค่ะ..."
2003003-59 = "อาหารโมเลกุลคืออะไรน่ะ?"
2003003-65 = "นั่นสิ มันดูเหมือน...อาหารอะไรสักอย่างที่ดูแปลกๆ?"
2003003-66 = "อืม... ราคาก็ค่อนข้างแพงด้วย แถมหน้าตาอาหารก็ดูน่าสงสัย..."
2003003-67 = "มีอย่างอื่นที่อร่อยๆ อยู่ตั้งเยอะ ไม่เห็นต้องมากินของแบบนี้เลยนี่นา... มีทั้งพวกทาโกะยากิ ยากิโซบะ..."
2003003-68 = "พอได้ยินแล้วก็อยากกินทาโกะยากิขึ้นมาเลย เมื่อกี้ผ่านร้านที่ดูน่ากินมากๆ มาด้วยนะ ไปซื้อกันมั้ย?"
2003003-69 = "เอาสิ ไปกันเถอะ"
2003003-75 = "อ๊ะ เดี๋ยวก่อนสิคะ! "
2003003-79 = "เฮ้อ... ไม่ได้ผลอีกแล้ว"
2003003-80 = "คิดแล้วเชียว การทำเรื่องที่ล้ำสมัยเกินไป มักไม่ได้รับการตอบรับที่ดีสินะ..."
2003003-86 = "ตายจริง นี่มันอะไรกันคะ? ดูเป็นอาหารที่น่าสนใจดีนะคะ"
2003003-87 = "!!!"
2003003-90 = "นี่มันอาหารโมเลกุลที่เคยได้ยินมานี่คะ"
2003003-94 = "นี่คือน้ำผลไม้ที่ถูกแช่แข็งเป็นชิ้นเล็กๆ เหมือนกับไข่ปลาคาเวียร์..."
2003003-95 = "ชะ...ใช่ค่ะ! เราใช้น้ำผลไม้ที่ผสมโซเดียมอัลจิเนต มาผสมกับแคลเซียมคลอไรด์ละลายน้ำทีละนิด ก็จะได้ออกมาเป็นแบบนี้ค่ะ!"
2003003-96 = "น่าสนใจดีนะคะ แล้วมีอย่างอื่นอีกมั้ยคะ?"
2003003-97 = "ตะ...ต่อไปก็คือ..."
2003003-98 = "เนื้อย่างที่ใช้กรรมวิธีซูวีค่ะ! "
2003003-99 = "อ่ะฮ่า ฉันเคยได้ยินวิธีทำอาหารแบบนั้นมาบ่อยๆ ค่ะ"
2003003-100 = "เมื่อนำวัตถุดิบที่บรรจุใส่ถุงสุญญากาศไปต้มในน้ำเดือดที่มีอุณหภูมิประมาณ 60 องศาเป็นเวลานานๆ"
2003003-102 = "จะทำให้เนื้อส่วนโปรตีนสุกได้ที่ ซึ่งจะช่วยคงรสชาตินุ่มลิ้นไว้ได้มากเลยละค่ะ!"
2003003-103 = "ผลไม้อันนี้มีรสซ่าๆ เหมือนกับเครื่องดื่มอัดลมเลยนะคะ?"
2003003-104 = "เราใช้เทคนิคทำให้ผิวด้านนอกมีสภาพเป็นกรดค่ะ นั่นคือใช้น้ำแข็งแห้งทาตรงผิวนอกของผลไม้ แล้วใส่คาร์บอเนตลงไปในส่วนผสมค่ะ! "
2003003-106 = "พอทำแบบนั้น ก็จะสัมผัสได้ถึงรสชาติของผลไม้กับรสสัมผัสซาบซ่าของกรดได้พร้อมๆ กันค่ะ#nสุดยอดเลยใช่มั้ยล่ะคะ"
2003003-107 = "ถ้าเป็นวิทยาการของทางมิลเลเนียมละก็ คงจะสามารถใช้เทคนิคผสมโมเลกุลสูง เพื่อสกัดรสชาติ หรือเพิ่มรสชาติเฉพาะตัวได้..."
2003003-113 = "(หลังจากนั้น คุณครูก็ฟังฮารุนะอธิบายเกี่ยวกับแนวคิดของอาหารโมเลกุล และอุปกรณ์ด้านวิศวกรรม#nที่ใช้อย่างละเอียด)"
2003003-116 = "และในตอนนั้นเอง คุณครูก็บังเอิญผ่านมาพอดีเลยน่ะค่ะ"
2003003-117 = "การที่ทุกคนไม่ได้ลิ้มรสอาหารพวกนี้... อาจเรียกได้ว่าเป็นความสูญเสียครั้งใหญ่ทางด้านอาหารเลิศรส#nเลยค่ะ"
2003003-118 = "ในฐานะของผู้ที่แสวงหาอาหารรสเลิศแล้ว ฉันเสียใจแล้วก็เจ็บปวดมากเลยค่ะ..."
2003003-119 = "[s] \"แต่การที่คนอื่นๆ จะรู้สึกไม่คุ้นเคย มันก็ช่วยไม่ได้นะ\""
2003003-121 = "ค่ะ... ถ้าแก้ไขเรื่องนั้นได้ ก็คงจะมีคนมาใช้บริการร้านเราเยอะขึ้นแน่ๆ..."
2003003-122 = "[s] \"ไม่มีอาหารโมเลกุลที่ดูคุ้นตากว่านี้เลยเหรอ?\""
2003003-123 = "อาหารโมเลกุลที่เป็นที่รู้จัก..."
2003003-128 = "!!!"
2003003-129 = "ทะ...ทำไมทำแบบนั้นล่ะคะ?!"
2003003-131 = "[ns3] \"สายตาของฮารุนะ...เฉียบคมสุดๆ!\"\n[ns4] \"เซ็นเซอร์ตรวจจับของอร่อยของฮารุนะทำงานแล้ว!\""
2003003-134 = "ยะ...อย่างนั้นเหรอคะ คุณครู?!"
2003003-135 = "[s] \"ที่จริงครูก็แค่พูดไปอย่างนั้นแหละ\""
2003003-136 = "คะ...คะ?!"
2003003-137 = "ฮุฮุฮุ..."
2003003-138 = "ถ้าอย่างนั้นตอนนี้ เราเริ่มด้วยขนมสายไหมดีมั้ยคะ"
2003003-140 = "สายไหมเหรอคะ?"
2003003-141 = "ใช่แล้วค่ะ การทำอาหารโมเลกุลเป็นวิธีการปรุงอาหารที่แสวงหาความสดใหม่โดยการปรับเปลี่ยนรส#nสัมผัสของอาหารให้มีรสสัมผัสที่แตกต่างในระดับโมเลกุล..."
2003003-143 = "ถ้าอย่างนั้น ขนมสายไหมที่เปลี่ยนรูปลักษณ์ของผงน้ำตาลให้เป็นเส้นขนม แต่ยังรักษารสหวาน#nเอาไว้ได้ดังเดิม ก็นับว่าเป็นอาหารโมเลกุลที่ยอดเยี่ยมค่ะ!"
2003003-144 = "[s] \"ฮารุนะนี่มีเซนส์เรื่องของอร่อยจริงๆ!\""
2003003-146 = "เมื่อกี้บอกว่าแค่พูดเฉยๆ ไม่ใช่เหรอคะ?!"
2003003-153 = "ลองไปชิมดูกันเถอะค่ะ..."
2003003-154 = "เราจะเริ่มต้นการชิมอาหารโมเลกุลด้วยขนมสายไหมค่ะ"
2003003-155 = "ชอบขนมสายไหมหรือเปล่าคะ?"
2003003-157 = "ขนมสายไหม... คิดถึงจังเลยน้า"
2003003-158 = "กำลังอยากกินอะไรหวานๆ พอดีเลย ขอไม้หนึ่งได้มั้ย?"
2003003-159 = "ฮุฮุฮุ..."
2003003-160 = "ค่ะ นี่ค่ะ แล้วก็สนใจลองคาเวียร์บลูเบอร์รีสักหน่อยมั้ยคะ?"
2003003-161 = "มันคืออะไรน่ะ?"
2003003-162 = "รูปร่างแปลกดีนะ... มันกินได้แน่ใช่มั้ย?"
2003003-163 = "ไม่ต้องห่วงค่ะ ถ้าเรื่องนั้นละก็ คุณครูที่อยู่ทางด้านนี้รับรองให้ได้ค่ะ"
2003003-164 = "[s] \"ไม่ต้องห่วงนะ ทางนี้ลองกินมาแล้ว\""
2003003-165 = "ถ้างั้น ไหนขอดูหน่อยซิ..."
2003003-172 = "โอ๊ะ?! "
2003003-174 = "รสสัมผัสแบบนี้มันอะไรกันน่ะ...?!"
2003003-178 = "ได้ยินว่าร้านนี้เป็นร้านที่ขายอาหารโมเลกุลอะไรนั่นใช่มั้ย?"
2003003-179 = "นี่ยืนรอมานานกว่าครึ่งชั่วโมงแล้ว ยังไม่มีท่าทีว่าแถวจะขยับเลย..."
2003003-180 = "การที่คนมายืนรอเยอะแบบนี้ ก็ถือเป็นการโฆษณาไปในตัวอยู่เหมือนกัน..."
2003003-181 = "ชักตื่นเต้นแล้วสิ อาหารโมเลกุลเนี่ย จะเป็นอาหารแบบไหนกันแน่นะ?"
2003003-186 = "อ่า..."
2003003-187 = "ฉันอยากให้ร้านขายดีก็จริง แต่ไม่ได้คิดว่าจะขายดีเป็นเทน้ำเทท่าแบบนี้เลย!"
2003003-188 = "อีกอย่าง เรายังแก้ปัญหาข้อเสียใหญ่ที่สุดของอาหารโมเลกุล เรื่องใช้เวลาปรุงอาหารนานไม่ได้#nเลยด้วยนะคะ..."
2003003-189 = "ฮุฮุฮุ..."
2003003-190 = "เส้นทางแห่งอาหารรสเลิศนั้นแน่นอนว่าจะต้องผ่านความยากลำบากแบบนี้อยู่แล้วค่ะ... วันนี้เราก็ได้#nเรียนรู้อะไรเพิ่มอีกแล้วนะคะ"
2003003-191 = "[s] \"ฮารุนะ... พยายามโน้มน้าวตัวเองอยู่หรือเปล่า...?\""
2003003-192 = "แต่ฉันคิดว่ายังไงมันก็น่าจะไปได้สวยอยู่นะคะ ถ้าไปขอให้ทางชมรมวิศวกรรมช่วยแก้ไขปัญหาเรื่องวิธี#nการผลิตอาหารจำนวนมากละก็..."
2003003-193 = "คงจะทำให้คนอื่นๆ รู้จักอาหารโมเลกุลได้เยอะขึ้นกว่านี้แน่นอนค่ะ!"
2003003-194 = "ขอบคุณนะคะ คุณครู... คุณฮารุนะ!"
2003003-196 = "ตายจริง ดีใจจังที่ช่วยพวกคุณได้ค่ะ"
2003003-200 = "ถ้างั้นคุณครูคะ... พวกเราไปกันเลยมั้ยคะ?"
2003003-201 = "[s] \"จู่ๆ นึกจะไปก็ไปเลยงั้นเรอะ?!\""
2003003-202 = "ตอนนี้พวกเราก็บรรลุเป้าหมายในการเผยแพร่เรื่องอาหารรสเลิศให้คนอื่นๆ รู้จักมากขึ้นแล้วนี่คะ"
2003003-203 = "ที่เหลือก็เป็นปัญหาที่พวกเขาต้องแก้ไขกันเองไม่ใช่เหรอคะ?"
2003003-204 = "ยิ่งกว่านั้น... ดูเหมือนที่นี่จะมีอาหารอย่างอื่นที่รอให้เราไปชิมอยู่อีกเยอะแยะเลยค่ะ"
2003003-205 = "[s] \"แบบนี้นี่เอง...\""
2003003-206 = "ฮุฮุฮุ... ยังมีร้านอาหารอีกตั้งหลายร้านที่รอให้เราไปพิชิตอยู่นะคะ"
2003003-207 = "เราสามารถพบเจออาหารรสเลิศได้ในอาหารชนิดใหม่ก็จริง แต่เราก็พบอาหารรสเลิศใหม่ๆ ได้ใน#nอาหารที่คุ้นเคยด้วยเช่นกันค่ะ"
2003003-212 = "เพราะงั้นคุณครูคะ... วันนี้จะไปชิมอาหารกับฉันจนถึงที่สุดเลยใช่มั้ยคะ?"

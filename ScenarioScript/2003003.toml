[translation]
2003003-1 = "這正是嶄新的美食"
2003003-6 = "（在會場巡邏時遇到了熟悉的面孔）"
2003003-7 = "[ns]「咦，羽留奈？」"
2003003-11 = "啊，老師。您來得正好。"
2003003-15 = "要不要嚐嚐這個呢？"
2003003-16 = "（羽留奈拿出了一根裝滿紫色……顆粒……的湯匙）"
2003003-21 = "[ns1]「嗯？這是……藍莓嗎？」\n[ns2]「是會在嘴裡劈啪作響的神奇口感呢。」"
2003003-24 = "唔呵呵……"
2003003-25 = "覺得如何呢，老師？#n是很新鮮的體驗對吧？"
2003003-26 = "[s]「確實是第一次嘗到的口感。」"
2003003-27 = "這樣新穎的體驗，正是對變得不思進取且死板的美食世界帶來革新的重要要素……"
2003003-28 = "正因如此，讓老師吃下「分子料理」的嘗試，可說是非常成功。"
2003003-29 = "這樣那位千年的學生應該也能瞑目了吧……"
2003003-30 = "不是，我還好好的啊？"
2003003-31 = "[s]「分子料理？」"
2003003-32 = "沒錯。那正是捨棄傳統的料理方式，以嶄新方式進行的最先進美食改革……"
2003003-37 = "你好……老師。#n我這次雖然打算要擺路邊攤……"
2003003-39 = "（據羽留奈他們所說……）"
2003003-46 = "那個……"
2003003-53 = "要，要不要試吃分子料理……歡迎試吃哦……"
2003003-59 = "分子料理是什麼？"
2003003-65 = "我也不知道。#n是這些……看起來很奇怪的食物嗎？"
2003003-66 = "唔……價格有點貴呢。#n而且長得又很奇怪……"
2003003-67 = "附近明明就有很多像章魚燒、炒麵這類熟悉的美食，有必要特地買這個吃嗎……"
2003003-68 = "聽你這麼一說，突然很想吃章魚燒啊！#n剛才有一間看起來不錯的店，你要不要去？"
2003003-69 = "好啊，我們快去吧。"
2003003-75 = "啊，等等！"
2003003-79 = "唉……又白費力氣了。"
2003003-80 = "太激進的嘗試果然不會受歡迎嗎……"
2003003-86 = "哎呀，這是什麼？#n看起來是相當有意思的嘗試呢。"
2003003-87 = "！！！"
2003003-90 = "原來如此，這就是傳說中的分子料理。"
2003003-94 = "把果汁凝固得像魚子醬一樣……"
2003003-95 = "是，是的！只要把氯化鈣溶解在水中，#n然後慢慢加入混有海藻酸鈉的果汁就能做出這個！"
2003003-96 = "真是有趣呢。還有其他料理嗎？"
2003003-97 = "下，下一個是……對了！"
2003003-98 = "這是使用真空低溫烹調法製作的烤肉！"
2003003-99 = "啊啊，那個料理方式我聽過很多次。"
2003003-100 = "將真空包裝的食材放入60度左右的水中進行長時間的低溫烹調……"
2003003-102 = "這樣一來就能使蛋白質產生變化，盡可能維持柔嫩的口感哦！"
2003003-103 = "話說為什麼這個水果會散發出和碳酸飲料一樣刺激的味道呢？"
2003003-104 = "因為我使用了讓乾冰接觸水果表面，接著將碳酸注入水果中的碳酸化技術！"
2003003-106 = "這樣一來就能同時品嘗到水果和碳酸飲料的口感啊，真是驚人。"
2003003-107 = "確實，以千年的技術力來看，#n要透過高分子化合技術萃取特定的味道或使其增強也是輕而易舉……"
2003003-113 = "（聽說羽留奈在那之後，依然認真地聽著與分子料理的概念和使用工具相關的說明）"
2003003-116 = "就在這時，老師剛好經過附近。"
2003003-117 = "不過大家居然不敢品嚐這種料理，真是美食的一大損失。"
2003003-118 = "對踏上美食之路的人來說，實在令人痛心……"
2003003-119 = "[s]「畢竟是大家很陌生的料理，這也沒辦法。」"
2003003-121 = "是啊……只要能設法解決這個問題，應該就會有更多人光顧才對……"
2003003-122 = "[s]「沒有大家比較熟悉的分子料理嗎？」"
2003003-123 = "熟悉的分子料理……"
2003003-128 = "！！！"
2003003-129 = "怎，怎麼了！？"
2003003-131 = "[ns3]「羽留奈的眼神……變銳利了！」\n[ns4]「是羽留奈的美食雷達啟動的證據！」"
2003003-134 = "真，真的嗎？老師！？"
2003003-135 = "[s]「抱歉，其實我只是隨便說說的。」"
2003003-136 = "咦，咦！？"
2003003-137 = "呵呵呵……"
2003003-138 = "那麼──就先從棉花糖開始吧？"
2003003-140 = "棉花糖？"
2003003-141 = "沒錯，所謂的分子料理，#n其實就是將食材以分子等級轉化成不同的質地，進而創造出新鮮感的料理……"
2003003-143 = "那麼在保留甜味的同時，將粉末狀的砂糖做成絲狀，#n讓人感受到和原先的砂糖截然不同質地的棉花糖，完全可以算是分子料理的一種！"
2003003-144 = "[s]「真不愧是羽留奈的美食雷達！」"
2003003-146 = "剛才不是說只是隨便說說的嗎！？"
2003003-153 = "請試吃看看吧……"
2003003-154 = "這是從棉花糖開始的分子料理試吃大會哦。"
2003003-155 = "這位客人喜歡棉花糖嗎？"
2003003-157 = "棉花糖……真懷念。"
2003003-158 = "我也正好想吃點甜的，可以給我一份嗎？"
2003003-159 = "呵呵呵……"
2003003-160 = "好的。#n在試吃棉花糖的同時……要不要也來一匙藍莓魚子醬？"
2003003-161 = "那，那是什麼？"
2003003-162 = "長得很奇怪耶……這個真的能吃嗎？"
2003003-163 = "請不必擔心。這位老師可以保證它的安全。"
2003003-164 = "[s]「沒事的，因為我也吃過。」"
2003003-165 = "既然如此，就來吃看看吧……"
2003003-172 = "哦哦！？"
2003003-174 = "這是什麼口感……！？"
2003003-178 = "這裡就是賣分子料理的攤販嗎？"
2003003-179 = "都已經排超過30分鐘了，排隊的人潮還是沒變少……"
2003003-180 = "雖然很多人排隊本身就有一定的廣告效果，但這實在是……"
2003003-181 = "真令人期待。分子料理到底是怎樣的料理呢？"
2003003-186 = "唔……"
2003003-187 = "雖然希望生意好一點，沒想到會好到這種程度！"
2003003-188 = "而且最重要的是，製作分子料理需要花費很多時間，這下究竟該怎麼辦……"
2003003-189 = "呵呵呵……"
2003003-190 = "美食之路總是伴隨著苦難和逆境……又學到了一課呢。"
2003003-191 = "[s]「羽留奈同學，就算你那樣說服自己好像也於事無補哦……？」"
2003003-192 = "不過應該有辦法解決才對。#n只要拜託工程師部製造大量生產用的機器……"
2003003-193 = "就能把分子料理推廣給更多人！"
2003003-194 = "謝謝你，老師！還有羽留奈同學！"
2003003-196 = "哎呀，能幫上忙真是太好了。"
2003003-200 = "那麼老師，我們就先離開吧？"
2003003-201 = "[s]「就這樣離開這裡！？」"
2003003-202 = "畢竟讓更多人認識嶄新美食的目的已經達成。"
2003003-203 = "接下來的問題就該由那位同學自己解決了，不是嗎？"
2003003-204 = "更重要的是……能在這裡品嚐到的食物已經全都嚐過了。"
2003003-205 = "[s]「話是這麼說的嗎……」"
2003003-206 = "呵呵呵……我們還有很多店沒去過呢。"
2003003-207 = "美食並不僅僅存在於新料理，熟悉的料理之中也同樣存在。"
2003003-212 = "那麼，老師。#n您今天也會陪我到最後吧？"

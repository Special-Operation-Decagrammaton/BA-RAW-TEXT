[translation]
10046130-4 = "看來你挺辛苦的呢，一花。"
10046130-5 = "啊，蓮實前輩……啊哈哈，失禮了。"
10046130-6 = "話說回來，前輩會來這裡就代表……？"
10046130-7 = "嗯，我是來幫忙的。"
10046130-8 = "真是不好意思。"
10046130-9 = "不，一花已經做得很好了。#n只是情況比預期的還要糟而已。"
10046130-10 = "所謂「情況」指的是……？"
10046130-11 = "起初我以為，這只是各自治區的問題兒童聚集起來引發的騷動……"
10046130-12 = "然而似乎有些人企圖藉著這場混亂謀取不當利益。"
10046130-13 = "甚至連實現正義部一直密切關注的勢力也參與其中……#n因此，這已經超出單一部員足以應付的範圍了。"
10046130-14 = "……啊。"
10046130-15 = "當然如果弦生出面或許能另當別論，但這恐怕又會衍生出其他問題……"
10046130-17 = "哈哈……我大概能猜到。#n一直以來真是辛苦前輩了。"
10046130-18 = "呵呵，我和弦生畢竟是老交情，一同克服的難關也早已數不勝數。#n這點程度根本不算什麼。"
10046130-19 = "不過現在情況有所不同，就讓我來協助你一段時間吧。"
10046130-20 = "前輩要親自出馬嗎？"
10046130-21 = "是啊，雖然我也希望能完全接手處理……"
10046130-22 = "不過正如剛才所說，這已經不是一個人能處理的狀況了。#n所以，可以請你稍微幫我一下嗎？"
10046130-23 = "沒問題！請儘管交給我！"
10046130-24 = "呵呵，真是可靠的回答呢。"
10046130-25 = "那麼，就趕緊解決吧。"

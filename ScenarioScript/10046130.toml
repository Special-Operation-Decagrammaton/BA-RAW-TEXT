[translation]
10046130-4 = "Are you all right, Ichika? You're talking to yourself."
10046130-5 = "Oh, Hasumi... Haha, this is embarrassing."
10046130-6 = "But I am sure glad you're here!"
10046130-7 = "Yes, I've come to help."
10046130-8 = "My apologies."
10046130-9 = "No. You did well. No one could have foreseen the situation devolving so quickly."
10046130-10 = "The situation...?"
10046130-11 = "We expected some ruffians from each District to gather, yes..."
10046130-12 = "And now that profits are involved, things are turning violent."
10046130-13 = "We've spotted multiple hostile groups on the beach. We've determined that it's too much for a single, stable person to handle."
10046130-14 = "...Oh."
10046130-15 = "Of course, Tsurugi might be able to fix it, but...well, we're trying to avoid causing MORE problems."
10046130-17 = "Haha... I bet. We're in for a challenge."
10046130-18 = "Fufu. We've known each other for a long time. I don't think this will break us."
10046130-19 = "So, if you don't mind..."
10046130-20 = "Mind what?"
10046130-21 = "Let me take your shift. You need a rest."
10046130-22 = "That said, this is still too much for one person. Join me after your break, please."
10046130-23 = "Yes! You got it!"
10046130-24 = "Heehee. Reliable, as always."
10046130-25 = "Now, let's take back the beach."

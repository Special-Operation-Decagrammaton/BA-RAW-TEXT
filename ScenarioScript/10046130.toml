10046130-1 = "#all;hide"
10046130-2 = "3;하스미 수영복;01\n#3;a"
10046130-3 = "3;하스미 수영복;02\n#3;em;[반응]\n#wait;1500"
10046130-4 = "3;하스미 수영복;03;애먹는 모양이네요, 이치카."
10046130-5 = "3;이치카 수영복;04;앗, 하스미 선배……. 아하하, 면목 없슴다.\n#3;em;[땀]"
10046130-6 = "3;이치카 수영복;20;그나저나 선배님께서 여기 오셨다는 것은……?"
10046130-7 = "3;하스미 수영복;07;예, 도우러 왔습니다."
10046130-8 = "3;이치카 수영복;20;죄송합니다."
10046130-9 = "3;이치카 수영복;20\n1;하스미 수영복;03;아니요. 이치카는 충분히 잘했습니다. 다만, 상황이 예상한 것보다 나빠졌을 뿐이죠.\n#1;ar\n#3;m5"
10046130-10 = "3;이치카 수영복;02;상황이라고 하시면……?\n#3;em;[?]"
10046130-11 = "1;하스미 수영복;99;처음에는 각 학교 자치구 문제아들이 몰려와서 생긴 소란 정도로 여겼습니다만."
10046130-12 = "1;하스미 수영복;02;일부, 소동을 틈타 부당한 이익을 꾀하는 무리까지 섞여온 듯합니다."
10046130-13 = "3;이치카 수영복;02\n1;하스미 수영복;01;그중에는 정의실현부에서 예의주시하고 있던 세력도 있어, 이미 한 사람의 부원이 감당할 수 있는 범주를 넘어섰다 판단했습니다.\n#1;m3\n#3;dr"
10046130-14 = "3;이치카 수영복;02\n1;하스미 수영복;02;……아.\n#3;hide\n#1;em;[반응]"
10046130-15 = "1;하스미 수영복;06;물론, 츠루기라면 얘기가 다르지만, 츠루기가 나서면 그때는 그것대로 다른 문제가 생겨서……."
10046130-16 = "#all;hide"
10046130-17 = "3;이치카 수영복;04;하하…… 짐작은 가네요. 항상 고생 많으시지 말임다.\n#3;em;[땀]"
10046130-18 = "3;하스미 수영복;07;후후, 긴 교우 관계니까요. 덕분에 헤쳐온 고난도 무수하니, 그 정도는 고생의 축에도 들지 않습니다."
10046130-19 = "3;하스미 수영복;03;하지만, 지금은 그렇네요. 당분간 제가 힘을 보태는 걸로 하죠."
10046130-20 = "3;이치카 수영복;02;선배님께서 말입니까?\n#3;em;[?]"
10046130-21 = "3;하스미 수영복;09;네, 마음 같아서는 완전히 교대해 주고 싶습니다만."
10046130-22 = "3;하스미 수영복;03;앞서 말했듯이, 이건 이미 혼자서 감당할 수준이 아니라서요. 그러니, 혹시 조금 도와주시겠어요?"
10046130-23 = "3;이치카 수영복;07;옙! 맡겨만 주십쇼!\n#3;jump\n#3;em;[!]"
10046130-24 = "3;하스미 수영복;07;후후, 믿음직스러운 대답이네요.\n#3;em;[음표]"
10046130-25 = "3;하스미 수영복;03;그러면, 서둘러 해치우죠."

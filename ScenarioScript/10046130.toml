[translation]
10046130-4 = "เหมือนกำลังลำบากอยู่เลยนะคะ อิจิกะ"
10046130-5 = "อ๊ะ รุ่นพี่ฮาสุมิ... แหะๆๆ น่าอายจริงๆ เลยค่ะ"
10046130-6 = "จะว่าไป รุ่นพี่รู้ด้วยเหรอคะว่าฉันอยู่ที่นี่...?"
10046130-7 = "ค่ะ ฉันมาช่วยน่ะค่ะ"
10046130-8 = "ต้องขอโทษด้วยนะคะ"
10046130-9 = "ไม่เลยค่ะ อิจิกะทำได้ดีแล้วละ แค่สถานการณ์มันแย่กว่าที่คาดไว้น่ะ"
10046130-10 = "แย่กว่าที่คาดไว้เหรอคะ...?"
10046130-11 = "ตอนแรกฉันคิดว่าเป็นแค่ความวุ่นวายที่เกิดจากเด็กเจ้าปัญหาของแต่ละเขตปกครองตนเองที่มาเที่ยว#nที่นี่"
10046130-12 = "แต่ดูเหมือนว่าจะมีคนบางกลุ่มที่อาศัยโอกาสนี้เข้ามาเพื่อแสวงหาผลประโยชน์ที่ไม่ถูกต้องค่ะ"
10046130-13 = "ในบรรดาคนพวกนั้นก็มีกลุ่มที่ชมรมทวงความยุติธรรมกำลังจับตาดูอยู่ด้วย ฉันเลยคิดว่าแค่สมาชิก#nชมรมคนเดียวไม่น่าจะจัดการไหวค่ะ"
10046130-14 = "อ่า..."
10046130-15 = "ถ้าเป็นซึรุกิละก็ไม่แน่ แต่ถ้าซึรุกิออกมาจัดการ ตอนนั้นก็คงจะมีปัญหาอื่นๆ ตามมา..."
10046130-17 = "แหะๆ... ฉันก็พอนึกภาพออกค่ะ รุ่นพี่คงต้องเหนื่อยไม่น้อยเลยนะคะ"
10046130-18 = "ฮุฮุ เราเป็นเพื่อนร่วมโรงเรียนกันมานานแล้วน่ะค่ะ ฉันกับซึรุกิช่วยกันจัดการงานที่ยากลำบากมา#nมากมาย ตอนนี้ต่อให้เจออะไรก็ไม่ใช่งานยากแล้วค่ะ"
10046130-19 = "แต่ว่าสถานการณ์ในวันนี้ สงสัยฉันต้องเข้ามาสนับสนุนเป็นการชั่วคราวแล้วนะคะ"
10046130-20 = "รุ่นพี่น่ะเหรอคะ?"
10046130-21 = "ค่ะ ถ้าเป็นไปได้ฉันก็อยากมาลาดตระเวนแทนเลย"
10046130-22 = "แต่ก็อย่างที่บอกไปว่างานนี้คงทำคนเดียวไม่ไหว เพราะงั้นเรามาผนึกกำลังกันมั้ยล่ะคะ?"
10046130-23 = "ค่ะ! วางใจฉันได้เลยค่ะ!"
10046130-24 = "ฮุฮุ เป็นคำตอบที่ฟังดูน่าอุ่นใจเลยค่ะ"
10046130-25 = "ถ้างั้นก็รีบไปจัดการให้เสร็จเถอะค่ะ"

[translation]
1000905-1 = "ดันเผลอชิมโดยไม่รู้ตัว!"
1000905-4 = "(มาเจอกับอิซุมิตามสัญญาและไปร้านราเม็งด้วยกัน)"
1000905-5 = "วันนี้~ จะกิน~ อะไรดีนะ~?"
1000905-6 = "ถ้าใส่แยมสตรอว์เบอร์รีลงไปด้วย~ ไม่ว่าอะไร~ ก็ต้องอร่อยแน่~"
1000905-7 = "ทงคตสึ~ โชยุ~ อ๋อ แล้วก็ห้ามลืมเนยด้วย~! ฮืม ฮืม~♪"
1000905-9 = "เมี๊ยว~"
1000905-11 = "อ๊ะ น้องแมวนี่"
1000905-12 = "เหมียววว~"
1000905-13 = "อ๊าาา~ น่ารักจัง~"
1000905-14 = "หืม~ อ๊ะๆ ทำไมเจ้าเหมียวน้อยถึงมาถูแก้มฉันแบบนี้ล่ะ?"
1000905-15 = "[s] \"ดูเหมือนว่ามันจะหิวนะ\""
1000905-16 = "โอ๊ะ แกก็หิวเหมือนกันใช่ไหม~? แต่ตอนนี้ฉันไม่มีอะไรให้กินเลยน่ะสิ...."
1000905-17 = "[s] \"แต่ครูมีนะ\""
1000905-19 = "ขนมแมว <นิว~รุ> เหรอ...?"
1000905-20 = "เมี๊ยว เมี๊ยว เหมียว!"
1000905-21 = "[s] \"ดูสิ มันเข้ามาใกล้แล้ว อ่ะ เจ้าเหมียวกินเลยสิ\""
1000905-24 = "ง่ำ ง่ำ ง่ำ ง่ำ"
1000905-27 = "โอ๊ะ มันกินแล้ว ว้าว ต้องอร่อยมากแน่ๆ เลย"
1000905-28 = "เมี๊ยว"
1000905-29 = "เหมียววว"
1000905-30 = "แมวตัวอื่นๆ ก็มากันเยอะแยะเลย! สุดยอดเลยคุณครู!"
1000905-31 = "[s] \"แมวตัวไหนก็ชอบขนมนี้กันหมดน่ะ\""
1000905-32 = "ว้าว..."
1000905-33 = "ง่ำ ง่ำ"
1000905-34 = "ง่ำ ง่ำ ง่ำ"
1000905-35 = "ง่ำ ง่ำ ง่ำ ง่ำ!"
1000905-36 = "(จ้อง) ......."
1000905-37 = "[s] \"หืม? อิซุมิ เป็นอะไรไป?\""
1000905-38 = "ง่ำ ง่ำ ง่ำ ง่ำ!"
1000905-39 = "อร่อย..."
1000905-40 = "[s] \"อิซุมิ? หรือว่าเธอ...\""
1000905-41 = "อึ่ก!"
1000905-42 = "[s1] \"ดะ... เดี๋ยว อิซุมิ?!\"\n[s2] \"แอบกินขนมแมวไปใช่ไหม?!\""
1000905-43 = "อ่า ระ... เรื่องนั้น... คือว่า...!"
1000905-44 = "อ่า ระ... เรื่องนั้น... คือว่า...!"
1000905-50 = "― หะ...เห็นพวกน้องแมว[wa:190] "
1000905-52 = "― กินกันดูน่าอร่อยมากฉันก็เลยอดใจไม่ไหว...![wa:1230] "
1000905-55 = "― อ๊ายยย?! ดะ...เดี๋ยวก่อนสิ[wa:720] "
1000905-57 = "― อย่ามาข่วนฉันนะ! [wa:10] "
1000905-60 = "― มุแงงง~!? พวกน้องแมวบุกเข้ามาแล้ว~![wa:660] "
1000905-63 = "[ns3] \"ไปแย่งขนม น้องแมวเลยโกรธน่ะสิ!\"\n[ns4] \"มันไม่ใช่ของกินของคนซะหน่อย!\""
1000905-64 = "― ตะ...แต่ว่า! รสชาติมันน่าอร่อยมากเลยนี่![wa:450] "
1000905-65 = "― ตะ...แต่ว่า! รสชาติมันน่าอร่อยมากเลยนี่![wa:450] "
1000905-68 = "― ละ... แล้วอีกอย่าง! ฉัน...เป็นสมาชิกของชมรมชิมอาหารนะ![wa:1150] "
1000905-70 = "― ถ้ามีของที่น่าสนใจ แล้วไม่ลองกินละก็...![wa:80] "
1000905-73 = "[ns]  \"มันรวมขนมแมวด้วยรึไง\""
1000905-74 = "― แล้วนี่มันเขียนไว้ว่าขนมรสทูน่า<ชั้นดี> เลยนะ…![wa:2930] "
1000905-77 = "― ของน่าอร่อยแบบนี้"
1000905-79 = "― เก็บไว้กินคนเดียวแบบนี้ยกโทษให้ไม่ได้![wa:300] "
1000905-82 = "― ของอร่อยน่ะต้องแบ่งกันกินสิ![wa:560] "
1000905-85 = "― อ๊ะ! ถะ...ถ้าอย่างนั้นฉันขอโทษก็ได้![wa:820] "
1000905-87 = "― แต่ว่าอันที่กินไปแล้ว ก็คงทำอะไรไม่ได้...?[wa:1470] "
1000905-90 = "― แงงง! อย่ากัดนะ~![wa:490] "
1000905-93 = "(จากนั้นคุณครูกับอิซุมิก็ยื้อยุดฉุดกระชากอยู่กับแมวจรจัดอยู่พักใหญ่ โชคดีที่ให้ขนมแมวเลียไป 3 อัน น้องแมวเลยยกโทษให้)"

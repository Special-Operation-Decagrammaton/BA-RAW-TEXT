1000905-70 = "― I have a duty to taste everything![wa:320] "
1000905-73 = "[ns] \"I never knew that duty included animal food...\""
1000905-74 = "― I mean, come on! Premium tuna flavor...[wa:3250] "
1000905-77 = "― Why should"

1000905-41 = "*gulp*"
1000905-42 = "[s1] \"W-Wait. Izumi?!\"\n[s2] \"Are you stealing the cat treats?!\""
1000905-43 = "Uh, well... You see..."
1000905-44 = "Uh, well... You see..."
1000905-50 = "― Th-The cats...[wa:390] "

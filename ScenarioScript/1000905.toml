[translation]
1000905-1 = "不知不覺"
1000905-4 = "（和泉會合，在前往拉麵店的途中）"
1000905-5 = "今天，要選什麼樣的～餐點呢～？"
1000905-6 = "草莓果醬和什麼都～很～搭所以～那是當然的～♪"
1000905-7 = "豚骨～，醬油～，味增奶油也很難捨棄呢～！哼哼～♪"
1000905-9 = "喵嗚～"
1000905-11 = "啊，是貓咪。"
1000905-12 = "喵嗚……"
1000905-13 = "哇，好可愛～"
1000905-14 = "這孩子，一直在磨蹭臉頰～為什麼呢？"
1000905-15 = "[s]「大概，是肚子餓了吧。」"
1000905-16 = "原來如此，你也肚子餓了嗎～？那……啊，我，現在什麼都沒有……"
1000905-17 = "[s]「交給我。」"
1000905-19 = "……貓用零食的「涅～嚕」？"
1000905-20 = "喵，喵，喵──"
1000905-21 = "[s]「請用。」"
1000905-24 = "（舔舔舔……）"
1000905-27 = "啊，吃了吃了。看起來吃得很美味呢～？"
1000905-28 = "喵──"
1000905-29 = "喵──喵──"
1000905-30 = "其他孩子們也聚集過來了唷！老師好厲害！"
1000905-31 = "[s]「也許，大家都喜歡這個呢。」"
1000905-32 = "哦──……"
1000905-33 = "（舔舔……）"
1000905-34 = "（舔舔舔……）"
1000905-35 = "（舔舔舔舔……）"
1000905-36 = "……（盯──）"
1000905-37 = "[s]「泉也餵餵看嗎？……泉？」"
1000905-38 = "（舔舔舔舔……！）"
1000905-39 = "……咻嚕。"
1000905-40 = "[s]「泉！？那個，該不會……」"
1000905-41 = "唔唔，已經忍不住了！哈呣！"
1000905-42 = "[s1]「等，泉那是貓用的零食！」\n[s2]「為什麼要吃！？」"
1000905-43 = "啊，那，那個，這是……！"
1000905-44 = "啊，那，那個，這是……！"
1000905-50 = "― 看，看貓咪們[wa:710] "
1000905-52 = "― 吃得津津有味，不小心就……！[wa:2310] "
1000905-55 = "― 呃，呼咦咦咦？！等，等等！[wa:1240] "
1000905-57 = "― 不要抓～！[wa:260] "
1000905-60 = "― 為什麼～！？貓咪們襲擊過來了～！[wa:1420] "
1000905-63 = "[ns3]「零食被搶走的話當然會生氣啊！」\n[ns4]「更何況那個，不是人的食物唷！？」"
1000905-64 = "― 可，可是！看起來很好吃嘛！[wa:1530] "
1000905-65 = "― 可，可是！看起來很好吃嘛！[wa:1530] "
1000905-68 = "― 而，而且！我是，美食研究會的一員！[wa:2630] "
1000905-70 = "― 在意的東西首先要吃過才行！[wa:1160] "
1000905-73 = "[ns] 「貓的零食也在那個範疇啊……」"
1000905-74 = "― 而且這個還寫著 「鮪魚味」、「高級」 ……！[wa:3930] "
1000905-77 = "― 這麼好的東西"
1000905-79 = "― 只有你們吃不可原諒！[wa:1420] "
1000905-82 = "― 美味的東西，要一起分享才行！[wa:1120] "
1000905-85 = "― 啊好痛！所，所以說抱歉嘛！[wa:1740] "
1000905-87 = "― 但是，已經吃的東西也沒辦法呢……？[wa:2470] "
1000905-90 = "― 呼咦咦！不要咬我～！[wa:770] "
1000905-93 = "（在那之後也和泉一起跟街上的貓咪們糾纏了一段時間。所幸在多獻上3份點心之後得到了原諒。）"

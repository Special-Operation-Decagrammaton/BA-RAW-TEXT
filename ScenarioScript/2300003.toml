[translation]
2300003-1 = "ชีวิตต้องการของหวาน"
2300003-2 = "คาเฟ่มิลเฟย"
2300003-3 = "ตกใจหมดเลยค่ะคุณครู"
2300003-4 = "งานเป็นยังไงบ้างคะ? ช่วงนี้ดูคุณครูยุ่งๆ นะ..."
2300003-5 = "หวังว่าข้อความที่ฉันส่งไปจะไม่ไปรบกวนงานของคุณครูนะคะ"
2300003-6 = "ขอโทษด้วยนะคะ"
2300003-7 = "[s1] \"ไม่เป็นไรหรอก ไว้ทำต่อก็ได้\"\n[s2] \"ครูฝากงานไว้กับตัวเองในอนาคตแล้วล่ะ\""
2300003-8 = "อะฮ่ะฮ่ะฮ่า..."
2300003-9 = "อะฮ่ะฮ่ะฮ่า..."
2300003-10 = "แต่ยังไงก็ขอบคุณนะคะที่คุณครูมาที่นี่"
2300003-11 = "ตอนแรกฉันคิดว่าจะไปกินของหวานที่คาเฟ่ แต่อยู่ๆ ก็คิดถึงคุณครูขึ้นมาน่ะค่ะ"
2300003-12 = "ช่วงนี้คุณครูดูยุ่งมากเลย เวลาแบบนี้ฉันว่าร่างกายน่าจะต้องการของหวานนะคะ"
2300003-13 = "แหะๆ..."
2300003-14 = "[s] \"งั้นสั่งอะไรกันดีล่ะ?\""
2300003-15 = "คะ? สั่งเหรอคะ?"
2300003-16 = "แหะๆ ฉันสั่งไปก่อนแล้วล่ะค่ะ"
2300003-17 = "ฉันพยายามจะประหยัดเวลาที่มีค่าของคุณครู ก็เลยสั่งให้แล้วค่ะ"
2300003-18 = "ป่านนี้น่าจะได้แล้วนะ..."
2300003-19 = "คาเฟ่มอคค่า 1 แก้ว มินต์ช็อกโกแลตลาเต้ 1 แก้ว เค้กช็อกโกแลตทีรามิสุ 1 ชิ้น แล้วก็เค้ก#nช็อกโกแลตกานาช 1 ชิ้นที่สั่งได้แล้วครับ"
2300003-20 = "อ๊ะ! รอเดี๋ยวนะคะคุณครู"
2300003-23 = "มาแล้ว~!"
2300003-24 = "ฉันสั่งของหวานที่เป็นช็อกโกแลตพิเศษเพื่อคุณครูเลยนะคะ"
2300003-25 = "[s] \"ช็อกโกแลตเหรอ?\""
2300003-26 = "อืม... ได้ยินมาว่าอะไรหวานๆ ช่วยช่วยฟื้นฟูความเมื่อยล้าได้ดีน่ะค่ะ"
2300003-27 = "...หรือว่าคุณครูไม่ชอบทานช็อกโกแลตเหรอคะ?"
2300003-28 = "[s3] \"ความหวานคือคติประจำตัวครูเลยละ\"\n[s4] \"ปกติตัวครูก็หวานอยู่แล้ว\""
2300003-29 = "ว้าวว~ จริงเหรอคะ? โล่งอกไปที"
2300003-30 = "ว้าวว~ จริงเหรอคะ? โล่งอกไปที"
2300003-31 = "ฉันก็กังวลว่าครูจะไม่ชอบเมนูที่ฉันเลือกมา"
2300003-32 = "แต่ตอนที่งานยุ่งๆ จนหัวหมุนแบบนี้ คุณครูต้องทานของหวานคุณภาพดีเพื่อทำให้สมองโล่งนะคะ"
2300003-33 = "ฉันก็กินของพวกนี้บ่อยๆ ตอนอ่านหนังสือสอบค่ะ แหะๆ"
2300003-34 = "ถ้างั้นก็~!"
2300003-35 = "มากินด้วยกันเลยค่ะ~"
2300003-37 = "(คุณครูลืมงานของสำนักงานที่คั่งค้างแล้วกินของหวานกับไอริอย่างผ่อนคลาย)"

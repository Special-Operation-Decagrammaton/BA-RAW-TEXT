[translation]
2300003-1 = "攝取糖分"
2300003-2 = "Café．Mille-feuille"
2300003-3 = "嚇我一跳……想不到老師真的來了。"
2300003-4 = "這樣有時間工作嗎？老師最近好像一直很忙……"
2300003-5 = "對不起，都怪我沒有多想就聯絡老師……"
2300003-6 = "工作真的不要緊嗎？"
2300003-7 = "[s1] 「沒事，就當稍微休息一下。」\n[s2] 「交給未來的我就行了。」"
2300003-8 = "啊哈哈哈……"
2300003-9 = "啊哈哈哈……"
2300003-10 = "謝謝老師這麼說，真的很高興老師能來。"
2300003-11 = "一想到要去吃甜點，就不知為何會想到老師。"
2300003-12 = "也會不自覺擔心老師一直都很忙，會不會沒辦法好好休息……"
2300003-13 = "欸嘿嘿……"
2300003-14 = "[s] 「謝謝。話說要點什麼呢？」"
2300003-15 = "啊，這不用擔心。"
2300003-16 = "我已經點好餐了。"
2300003-17 = "可不能浪費和老師相處的時間！"
2300003-18 = "差不多要送來了吧……"
2300003-19 = "讓您久等了。這是您點的咖啡摩卡、巧克力薄荷拿鐵、提拉米蘇和生巧克力蛋糕。"
2300003-20 = "啊，來的正好。謝謝。"
2300003-23 = "怎麼樣啊，老師！"
2300003-24 = "為了老師的工作，我特地點了以巧克力為主的餐點……"
2300003-25 = "[s] 「工作和巧克力有關係？」"
2300003-26 = "就是……我聽說補充糖分能快速恢復疲勞……"
2300003-27 = "那個，事到如今問一下……老師喜歡巧克力嗎？"
2300003-28 = "[s3] 「當然，很喜歡唷。」\n[s4] 「我的身體是由巧克力為主的糖分所構成的。」"
2300003-29 = "啊……那就太好了。"
2300003-30 = "啊……那就太好了。"
2300003-31 = "我現在才想到要是老師不喜歡該怎麼辦才好。"
2300003-32 = "為了讓腦袋維持運作，會需要糖分嘛！"
2300003-33 = "我在準備考試的時候也經常吃甜食，嘿嘿。"
2300003-34 = "那麼！"
2300003-35 = "我們開動吧～！"
2300003-37 = "（之後我暫時不去想辦公室裡堆積如山的文件，和愛莉一起專注在攝取糖分上）"

84307100500-13 = "5;네루 교복;23;……쏘리."
84307100500-14 = "5;네루 교복;01;알았어. 그런 거라면 순순히 받아 줘야지."
84307100500-15 = "5;네루 교복;00;아무튼 붙잡은 녀석들은 모두 신고해서 넘겼고…… \"어째서 그 시간에 거길 찾아갔냐\"는 질문을 받아 버렸는데 말이야.\n#5;em;[반응]"
84307100500-16 = "1;리오;02;……그래서 뭐라고 대답했어?\n#1;em;[?]"
84307100500-17 = "1;리오;01;혹시 그것으로 인해 곤란한 상황에 처했다면, 내가 지금이라도 바로 절대 뚫을 수 없는 알리바이를 만들어서……."
84307100500-18 = "5;네루 교복;23;……? 내 맘인데 무슨 불만 있냐고 했지."
84307100500-19 = "1;리오;02;그래서?"
84307100500-20 = "5;네루 교복;24;그래서, 뭐? 내가 그렇다는데. 그냥 그렇게 넘어갔지.\n#5;em;[한숨]"
84307100500-21 = "#st;[0,0];instant;1;"
84307100500-22 = "#clearST"
84307100500-23 = "1;리오;04\n5;네루 교복;24\n#1;em;…\n#1;h\n#5;h\n#wait;2500"
84307100500-24 = "1;리오;07;……그렇구나.\n#1;stiff"
84307100500-25 = "5;네루 교복;22;그나저나 이 장비, 뭐 지금 당장 반납해야 한다거나 그런 건 아니지? 몇 번 써 봤는데, 솔직히 꽤 마음에 들어서 말이지.\n#5;em;[음표]"
84307100500-26 = "5;네루 교복;21;이번 일 끝날 때까지는 내가 쓰고 있을 테니까, 그렇게 알고 있으라고. 불만 없지?"
84307100500-27 = "1;리오;02;바라던 바야. 효용성이 있었다니, 나로서도 다행스러운 일이네.\n#1;em;[반응]"
84307100500-28 = "1;리오;03;그러면 앞으로도 계속해서 잘 부탁할게, 네루."
84307100500-29 = "5;네루 교복;03;이야…… 말투 봐라, 진짜 장족의 발전이네.\n#5;em;[재잘]"

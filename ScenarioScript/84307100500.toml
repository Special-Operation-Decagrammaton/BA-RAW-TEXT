84307100500-5 = "5;네루 교복;01\n1;리오;01\n#1;a\n#5;a\n#1;h\n#5;h\n#wait;1000"
84307100500-6 = "5;네루 교복;01\n1;리오;00;순식간이네. 하지만 계산대로야. 예상한 시간보다 빠르지도, 늦지도 않았어."
84307100500-7 = "5;네루 교복;06;칭찬이야, 욕이야? 일하고 온 사람한테는 칭찬 말고 하지 말라는 이야기 들은 적 없어?\n#5;em;[속상함]"
84307100500-8 = "1;리오;07;……칭찬이었는데……\n#1;stiff"
84307100500-9 = "1;리오;99;정확히는 아주 빠른 속도로 처리했지만, 너의 그런 일 처리 속도는 나 또한 이미 알고 있었기에 신뢰하고 있었다는 뜻이었어."

[translation]
84307100500-6 = "เคลียร์ได้ในชั่วพริบตาเลยนะ แต่ก็เป็นไปตามที่ฉันคำนวณไว้ ถือว่าไม่ได้ช้าหรือเร็วไปกว่าที่คาดเอาไว้"
84307100500-7 = "นี่ชมหรือว่ากันแน่น่ะ? เคยมีใครพูดให้ฟังบ้างมั้ยว่าถ้าจะไม่ชมคนที่เพิ่งทำงานเสร็จมาก็ไม่ต้องพูด#nอะไรน่ะ?"
84307100500-8 = "นั่นฉันชมนะ..."
84307100500-9 = "ถ้าจะพูดให้ชัดเจนก็คือ เธอทำได้รวดเร็วมาก แต่ว่าฉันก็รู้ความว่องไวในการทำงานของเธออยู่แล้ว ก็เลยไว้วางใจว่าจะออกมาเป็นแบบนี้น่ะ"
84307100500-13 = "ซอรี่..."
84307100500-14 = "เข้าใจแล้ว ถ้าอย่างนั้นฉันก็ต้องรับคำชมไว้ละนะ"
84307100500-15 = "ฉันรายงานและส่งตัวคนที่จับตัวได้หมดแล้ว... แต่ก็มีคนถามว่า \"ทำไมถึงไปที่นั่นในเวลานั้น\" ด้วยนี่สิ"
84307100500-16 = "แล้วตอบไปว่าอะไรเหรอ...?"
84307100500-17 = "ถ้าเธอต้องเดือดร้อนเพราะเรื่องนั้นละก็ ฉันจะหาข้ออ้างในการยืนยันฐานที่อยู่ของเธอให้เดี๋ยวนี้เลย..."
84307100500-18 = "ฉันก็ตอบไปว่า \"ก็คนมันอยากมา มีปัญหาหรือไง?\""
84307100500-19 = "แล้วยังไงต่อ?"
84307100500-20 = "จะยังไงต่อล่ะ? พอฉันตอบไปอย่างนั้นแล้ว อีกฝ่ายจะกล้าหืออะไรได้"
84307100500-24 = "อย่างนั้นสินะ..."
84307100500-25 = "จะว่าไป อุปกรณ์ที่เธอให้มาน่ะ ฉันไม่ต้องคืนให้ตอนนี้ก็ได้ใช่มั้ย? ฉันใช้ไป 2-3 ครั้งแล้ว บอกตรงๆ ว่ามันถูกใจฉันน่ะ"
84307100500-26 = "ฉันจะใช้มันจนกว่างานนี้จะเสร็จแล้วกัน เธอไม่ว่าอะไรใช่มั้ย?"
84307100500-27 = "นั่นละที่ฉันต้องการ พอรู้ว่าของพวกนั้นมีประโยชน์ก็น่าชื่นใจนะ"
84307100500-28 = "งั้นต่อไปฉันก็รบกวนด้วยล่ะ เนรุ"
84307100500-29 = "โอ้โห... ดูพูดเข้าสิ เธอก้าวหน้ามาไกลเลยนะ"
84307100500-33 = "บะ... แบบนั้นมัน..."
84307100500-34 = "ฉันชมน่ะ ไม่ได้ประชดอะไร"

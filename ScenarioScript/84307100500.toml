[translation]
84307100500-6 = "Welcome back. Your completion time was neither faster nor slower than I calculated."
84307100500-7 = "Is that a compliment or a criticism? You know, when somebody gets back from work, you should say something nice!"
84307100500-8 = "...It was a compliment..."
84307100500-9 = "To be clear, I meant you finished it very quickly, which is standard for you."
84307100500-13 = "Heh, sorry."
84307100500-14 = "I get what you meant now."
84307100500-15 = "Anyway, I turned in the leader, and they asked me, \"What were you doing there?\""
84307100500-16 = "...And what did you say in response?"
84307100500-17 = "If there's any trouble for you in that regard, I can draw up an impenetrable alibi for you..."
84307100500-18 = "...I just said I was hanging out there 'cause I felt like it, and asked if they had a problem with that."
84307100500-19 = "Then what?"
84307100500-20 = "What do you mean, \"Then what?\" I said that, and then they shut up."
84307100500-24 = "...I see."
84307100500-25 = "Hey, you don't need this gear back right away, do you? I used it out there, and I like it."
84307100500-26 = "Think I'll hold onto it until this whole thing's over. Are you good with that?"
84307100500-27 = "More than good with it. It's just what I wanted to hear."
84307100500-28 = "I'll look forward to our next mission together, Neru."
84307100500-29 = "Wow, listen to you. You've been learning."
84307100500-33 = "...Th-That's..."
84307100500-34 = "It's a compliment. Really."

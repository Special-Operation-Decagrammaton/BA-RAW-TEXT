[translation]
62080-1 = "第8話;波塔帕西斯（２）"
62080-4 = "祕儀……？"
62080-5 = "要是再這樣放著不管，我看遲早會招來鬼魂或怨靈……"
62080-6 = "委員長！"
62080-7 = "嗚咿……"
62080-12 = "這個情報……我確實從來沒聽說過。"
62080-13 = "我想也是。#n起初我也覺得聽起來像是校園傳說或怪談……"
62080-14 = "不過這件事，應該只有我聽說過才對。"
62080-15 = "在締結「伊甸園條約」前不久，貝雅特里榭曾經去過波塔帕西斯的紀錄保管庫。"
62080-16 = "除了我之外，他沒有告訴任何人。"
62080-21 = "！"
62080-22 = "咦……？"
62080-27 = "可，可是那裡不是誰都不能進去嗎……"
62080-28 = "你覺得貝雅特里榭會在乎那種事嗎？"
62080-29 = "這，這倒是沒錯……"
62080-30 = "貝雅特里榭有很多祕密。這只不過是其中之一而已。"
62080-31 = "難道說……當時優斯提娜聖徒會的「[ruby=Mimesis]複製[/ruby]」之所以會顯現也是……？"
62080-32 = "這點我也無法確定。#n事到如今也無從得知真相了……"
62080-33 = "不過至少可以推測，兩者之間的關聯性應該不低吧？"
62080-34 = "而且大家也知道，在那之後奧利斯的異常現象就開始增加了。"
62080-35 = "嗯……我也記得。#n不知道從什麼時候開始，突然冒出了很多沒見過的東西……#n而且在武器方面的補給……也變得相當充足……"
62080-36 = "那時候我也完全不覺得奇怪，只是心想大人果然不一樣……大人真厲害而已……"
62080-37 = "[s]「……」"
62080-38 = "不過這裡重要的是「開始增加」這個部分。"
62080-39 = "嗯……？#n也就是說……該不會……？"
62080-40 = "正是你所想的那樣。"
62080-41 = "奧利斯本來就時不時會發生一些怪事。"
62080-43 = "……雖然每所學園多少都有怪談流傳，但是奧利斯的程度卻格外嚴重。"
62080-44 = "我也是在離開奧利斯後才知道，那已經遠遠超過「稍微」嚴重的水準了。"
62080-49 = "[ns]「那是……為什麼呢？」"
62080-50 = "我也不太清楚確切的原因。但是……"
62080-51 = "……"
62080-52 = "我個人認為，這裡似乎已經變成那樣的地方了。"
62080-53 = "奧利斯本來就存在著「某些東西」。"
62080-54 = "嘆息、怨恨、冤屈、憤怒、斷念……這裡就是聚集了這些情緒的地方。"
62080-55 = "不是有句話說「強烈的情感或想法，總有一天會以某種型態實現」嗎？"
62080-56 = "那，那只是一種比喻……不是嗎……"
62080-57 = "但我們不是已經親眼見過了嗎？#n比如優斯提娜聖徒會或白芭蕾之類的東西。"
62080-58 = "……是啊。但我一直都以為那是夫人……貝雅特里榭的手筆。"
62080-59 = "或許就連那個想法，也是因為我下意識地……#n不願正視流淌在奧利斯背後的「真相」而產生的也說不定……"
62080-60 = "我不想下那種結論……不過，我偶爾會感到害怕。"
62080-61 = "剛才提到的嘆息、怨恨、冤屈、憤怒，還有斷念……#n在那一切的最底層，究竟存在著什麼呢。"
62080-62 = "光是想像……就讓我不寒而慄。"
62080-63 = "……"
62080-64 = "嗚嗚嗚……"
62080-69 = "……來談談有關啟示錄的事吧。各位。"
62080-70 = "不管怎麼說……目前發生在奧利斯的「某種現象」的關鍵，似乎非它莫屬了。"
62080-71 = "嗯，謝謝你，志美子同學。"
62080-72 = "不必客氣，敦子同學。"
62080-73 = "所謂的啟示錄，指的是流傳於三一和奧利斯的經典的最後一章。"
62080-74 = "其實兩所學園的經典都是同一部，只是在解釋方面存在差異而已。"
62080-75 = "不過在三一……啟示錄頂多被視為一種參考資料……"
62080-76 = "並沒有被賦予高於教訓書、建言書或箴言集的重要性……"
62080-77 = "不過在奧利斯，對於啟示錄的研究卻特別多。"
62080-78 = "……因為在那之中，記載著與世界末日有關的內容。"
62080-79 = "[s]「也就是說……！」"
62080-80 = "奧利斯是不是希望世界滅亡……是嗎？"
62080-81 = "……"
62080-82 = "老實告訴你吧，老師──正是如此。"
62080-83 = "美，美美美美美，美咲同學！？！？"
62080-84 = "何必那麼驚訝？我只是陳述事實而已。#n反正在老師面前也沒什麼好隱瞞的。"
62080-86 = "……我多少能夠理解。"
62080-87 = "無法從村子得到溫暖的孩子，會為了取暖而放火燒掉村子。"
62080-88 = "對於沒有什麼可以失去的人來說，世界的滅亡或許反而是一種救贖。"
62080-89 = "因為那至少能讓人感覺，一切終於變得公平了……"
62080-90 = "對於單一的個體而言，「自身消逝」和「世界滅亡」在結果上的意義是相同的。"
62080-91 = "既然如此……從某個時間點開始，思考這兩件事的順序前後顛倒也不是不可能的事。"
62080-93 = "是啊。人在過於投入某件事情時，很容易會搞混手段和目的……"
62080-94 = "……"
62080-95 = "……"
62080-96 = "在啟示錄中，一共會出現三組七位的天使。#n他們被統稱為「啟示錄的天使」。"
62080-98 = "我原本以為這些內容，充其量只是源自於奧利斯格外重視的啟示錄……"
62080-99 = "也就是以恐懼和痛苦為基礎的怪談、傳聞或流言而已……"
62080-100 = "雖然剛才也提過……強烈的感情或想法，總有一天會以某種型態實現。"
62080-102 = "啟示錄中記載的，帶來世界末日的三組天使。"
62080-103 = "首先是七位「揭印的天使」，#n接著是七位「吹號的天使」，#n最後是七位「倒碗的天使」。"
62080-104 = "大家都說聽到了號角聲對吧？我也一樣。#n那麼這次的應該就是「吹號的天使」沒錯。"
62080-105 = "綜合各方面的說法，目前聽到的號角聲一共有四次。"
62080-106 = "這也和我們從天空中聽見的聲音一致。"
62080-107 = "也就是「三位天使要吹那其餘的號」這句話。"
62080-108 = "[s]「要是七位天使的號角全都吹響了，會發生什麼事？」"
62080-109 = "呵呵，誰知道呢？"
62080-110 = "如果啟示錄的內容原封不動地成為現實……"
62080-111 = "那麼接下來，應該就輪到拿著盛滿上帝忿怒的金碗的七位天使登場了。"
62080-112 = "當金碗依序傾倒在大地上，現在的世界便會滅亡……"
62080-113 = "接著屬於虔誠者的新天地將會降臨……我們一直是被這樣教導的。"
62080-114 = "……嗯。按照啟示錄的內容，確實會這樣呢。"
62080-115 = "不過，那真的就是七位吹號的天使嗎？"
62080-116 = "你認為……那有可能是別的東西是嗎？"
62080-120 = "這個嘛……現在其實什麼都還說不準，不是嗎？"
62080-121 = "畢竟奧利斯本來就是存在「某些東西」，也會發生「某些事情」的地方啊。"
62080-127 = "居，居然真的來了……"
62080-128 = "唔啊……唔啊啊啊……"
62080-130 = "請大家安靜。#n這只不過是棟單純的建築而已，沒必要感到慌張。"
62080-132 = "是，是。"
62080-134 = "我們的目的地，是位於波塔帕西斯地下的紀錄保管庫。"
62080-135 = "據說奧利斯的「真相」就沉睡在那裡。"
62080-136 = "既然如此，或許能夠從中掌握一些跟「吹號的天使」有關的線索。"
62080-137 = "不過問題就如大家所知，這裡已經被封鎖了一百年以上……"
62080-139 = "前，前輩？#n門好像是開著的耶……？"
62080-141 = "你說什麼！？#n那不就表示有人已經……？"
62080-145 = "不，或許這樣反而更好。"
62080-146 = "傳說打開封閉之門的人，最終將會失去自我。"
62080-147 = "……既然有人先幫我們開門，要擔心的事就少了一件。"
62080-149 = "所以我們真的……"
62080-150 = "要到這下面去……是嗎？"
62080-152 = "……"
62080-153 = "不。要下去的只有我一個人。"
62080-154 = "畢竟……有可能真的會發生可怕的事，不是嗎？"
62080-156 = "……！"
62080-157 = "我，我明白了，前輩……"
62080-158 = "那我們該做什麼呢……？"
62080-160 = "請大家在這裡建立好陣地。"
62080-162 = "陣地？"
62080-164 = "沒錯，大家應該都很清楚該怎麼做才對。"
62080-165 = "不過，除了外來的攻擊以外……"
62080-166 = "……也要準備應對來自內部的攻擊。"
62080-168 = "那，那不就是……！"
62080-169 = "為了預防前輩……真的出了什麼萬一嗎？"
62080-171 = "不要讓我說第二次。"
62080-173 = "！！！"
62080-174 = "我，我知道了！"
62080-179 = "[ns]「學生對號角聲的反應有差異？」"
62080-180 = "是的。分成有聽到號角聲的孩子……"
62080-181 = "……"
62080-182 = "還有沒聽到的孩子兩邊。"
62080-183 = "造成差異的原因是什麼？"
62080-184 = "這個我就不知道了……#n我是有聽到的那邊……"
62080-185 = "……"
62080-186 = "而昴前輩，應該是沒聽到的那邊……"
62080-187 = "……嗚嗚。"
62080-188 = "不，不要講著講著就哭了啊……"
62080-189 = "對，對不起……可是……"
62080-190 = "昨天果然發生了什麼事吧。"
62080-191 = "！？！？"
62080-192 = "抱歉，我沒有想嚇你的意思。"
62080-193 = "不過……如果你願意的話，可以告訴我們發生了什麼事嗎？"
62080-194 = "為什麼只有你一個人跑來找老師……為什麼其他孩子什麼都沒說就消失了。"
62080-195 = "還有你為什麼會知道那些孩子們去了波塔帕西斯。"
62080-196 = "[s]「敦子，那個……」"
62080-197 = "嗯？"
62080-198 = "……"
62080-199 = "原來如此。老師說過會等到舞彩願意開口啊。"
62080-201 = "（舞彩就這麼蹲坐在地，全身不由自主地劇烈顫抖）"
62080-202 = "（就在大家都不敢輕易開口時……）"
62080-204 = "那，那個……如果是對老師的話，我覺得說出來也沒關係的……"
62080-205 = "日和……？"
62080-206 = "噓。沙醬。"
62080-207 = "不，不好意思。#n我這個人不太會說話……也常被人家說不怎麼識相……耶，耶嘿嘿……"
62080-208 = "可是你，你看起來遇到了很辛苦……很難受……很悲傷的事……"
62080-209 = "這種時候，不管對象是誰都沒關係……#n只要把想說的話照實說出來……心裡應該會好受一點哦……？"
62080-210 = "不管是誰……都可以嗎？"
62080-211 = "沒，沒錯！不過這種時候，找老師應該會是更好的選擇……#n啊，那個，如果我們在場會不方便的話，要先迴避一下也沒關係……"
62080-213 = "……這樣的話，我們也暫時掛斷電話吧。"
62080-214 = "嗯，我也覺得這樣比較好。"
62080-216 = "沒問題的！老師他……是個可以信任的人。#n至少對我來說是這樣的……"
62080-217 = "不管遇到什麼事情……只要跟老師說，老師都會盡全力幫忙。#n而且還會買胃藥或雜誌給我……"
62080-218 = "不，不過老師也不會把所有事都做到好哦……！#n他總是幫忙到一個程度，就把剩下的事留給我們自己完成……"
62080-219 = "雖然……我有時候會覺得這樣有點可惜……"
62080-220 = "可是老師說，這樣才能讓學生學會該如何獨當一面……"
62080-221 = "嗚嗚，我講得可能不是很好……#n總，總之！這種事情……"
62080-222 = "要是自己悶在心裡……只會越來越痛苦而已……"
62080-223 = "我，我們學園的孩子，特別不擅長拜託別人，也不太會說話……#n像我以前就是這樣……就算到現在也還是有點……"
62080-224 = "所，所以我希望，能稍微幫上一點忙……！#n耶，耶嘿嘿……"
62080-226 = "日和同學……"
62080-232 = "那，那麼，我們就先迴避一下吧？#n畢竟世界上有很多事情，要是被太多人聽到會覺得很害羞嘛。"
62080-233 = "這樣也好，我們就順便去看看外面的情況再回來吧。"
62080-234 = "嗯，就這麼辦吧。"
62080-236 = "請，請等一下！"
62080-238 = "嗯？"
62080-239 = "咦，咦咦……？"
62080-241 = "……"
62080-242 = "我想……把事情告訴大家……"
62080-244 = "沒必要那樣勉強自己的……"
62080-245 = "人家好不容易鼓起勇氣了，我們就聽他說吧，前輩？"
62080-246 = "假如換作是我，絕對不會這麼做的……"
62080-251 = "[ns]「真的沒關係嗎？」"
62080-252 = "……是的。"
62080-253 = "聽聽更多人的意見……才能讓我更確定自己應該怎麼做……！"
62080-255 = "（於是舞彩緩緩開口，小心翼翼地述說昨晚發生的事）"
62080-256 = "（沒有人敢在過程中草率地作出回應……）"
62080-258 = "……"
62080-259 = "……"
62080-260 = "……"
62080-261 = "嗚，嗚嗚，嗚哇啊啊～！！！"
62080-266 = "日，日和？那樣哭的話……"
62080-267 = "可是！這也太過分了！太讓人難過了吧！#n聽到這種事情怎麼可能沒有反應嘛！嗚啊啊啊啊啊啊～！！！"
62080-274 = "日，日日日日，日和同學！？#n這，這樣有點……"
62080-275 = "嗚哇啊啊啊啊啊啊啊～"
62080-276 = "我，我明明，也忍得很辛苦……的說……"
62080-277 = "所以才更要哭嗚哇啊啊啊啊～！！！"
62080-279 = "日和果然很溫柔呢。"
62080-280 = "是啊……一直都是。#n……美咲？"
62080-281 = "沒，沒什麼。別看我這邊。"
62080-282 = "呵呵，這種時候不用強忍住眼淚沒關係的。"
62080-283 = "我才沒有！"
62080-285 = "[ns]「謝謝你坦白地說出來。」"
62080-286 = "不，不會。要說謝謝的是我才對……#n謝謝大家願意聽我說……"
62080-287 = "可是……為什麼有些人可以聽見號角聲，有些人卻聽不到呢？"
62080-288 = "這純粹……只是依據目前的情報所作出的推論而已……"
62080-289 = "聽得見和聽不見的群體之間……似乎存在著一條共同的分界線……"
62080-290 = "會是……什麼呢？"
62080-291 = "我想──應該是老師的課程。"
62080-292 = "咦？課程……？#n可是大家不都是一起上課的嗎……"
62080-293 = "就算聽了課程也不代表有聽進去。#n就像讀過了書並不代表有真的讀透一樣。"
62080-294 = "……外面的人老是隨便讀一點書，就一副得到世界真理的樣子到處嚷嚷。"
62080-295 = "甚至還有用書擺滿書架或佈置成書牆，只為了裝飾的傢伙……！"
62080-296 = "書這種東西，可是作者和讀者之間的對話耶！#n只是隨便讀讀怎麼可能溝通得了啊！"
62080-298 = "多給這些孩子一點尊重好不好啊！尊重！"
62080-300 = "前輩？是不是有點離題了？"
62080-302 = "咦唔啊！？"
62080-303 = "不，不好意思。#n總之……上課就跟讀書一樣。"
62080-304 = "所謂的學習，本來就是把不屬於自己、原本不知道的知識吸收進自己內心的行為。"
62080-305 = "而課程則是為了輔助學生學習，由老師進行教導的過程。"
62080-306 = "所以不管聽了多少課程，如果總是左耳進右耳出……"
62080-307 = "或者一下課就打算全部忘光的話，其實就跟沒上課是一樣的。"
62080-308 = "啊……！"
62080-309 = "當然這純粹只是推測而已。#n而且能為這個推測作證的，就只有你一個人。"
62080-310 = "在我看來，聽得見號角聲的學生……#n按照啟示錄的說法，就是能捕捉到「世界末日徵兆」的人。"
62080-311 = "也是能敞開心胸接受「奧利斯外的知識」的學生。"
62080-312 = "或者換句話說，是對「新的思考方式」的抗拒感較低的學生。"
62080-313 = "你，你覺得怎麼樣呢？"
62080-314 = "沒錯！好像真的是這樣耶！憂同學真厲害！"
62080-315 = "沒，沒有啦……我，我只不過是隨便亂推測而已……"
62080-316 = "我平常不是說過聽到真心的讚美，只要坦率接受就好了嗎？"
62080-317 = "咿唔啊！？"
62080-318 = "而，而且如果他們開始接納「奧利斯之外」的事物……"
62080-319 = "對於「現在的奧利斯」產生疑問的可能性，想必也會變高才對……"

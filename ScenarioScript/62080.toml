62080-82 = "ฉันขอพูดตามตรงนะ คุณครู ใช่แล้วละ"
62080-83 = "คะ... คะคะคะคะคะ... คุณมิซากิ?!?!"
62080-84 = "ทำไมถึงตกใจขนาดนั้นล่ะ ก็มันจริงไม่ใช่เหรอ? แล้วที่ฉันกล้าพูดก็เพราะอยู่ต่อหน้าคุณครูด้วย"
62080-86 = "พอเข้าใจได้นะคะ..."
62080-87 = "นี่คงเหมือนเรื่องราวของเด็กที่ไม่ได้รับความอบอุ่นจากหมู่บ้าน ก็เลยจะเผาหมู่บ้านทิ้ง เพื่อให้ได้ความอบอุ่นน่ะค่ะ"
62080-88 = "สำหรับคนที่ไม่มีอะไรจะเสียแล้ว การล่มสลายของโลกอาจเป็นหนทางแห่งการพ้นทุกข์ก็ได้"

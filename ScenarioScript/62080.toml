62080-90 = "มีคำกล่าวที่ว่า 'สำหรับมนุษย์นั้น สุดท้ายแล้วการดับสูญของตัวเองก็มีความหมายเหมือนการล่มสลาย#nของโลก' ใช่มั้ยล่ะ?"
62080-91 = "ถ้างั้นก็เป็นไปได้ว่า ณ จุดใดจุดหนึ่ง เราจะเริ่มคิดถึงสิ่งต่างๆ ในทิศทางตรงกันข้าม"
62080-93 = "ค่ะ ถ้าคนเราหมกมุ่นอยู่กับบางอย่างมากเกินไป ก็มักจะสับสนระหว่างวิธีกับจุดประสงค์ได้ง่ายๆ ค่ะ..."
62080-94 = "..."
62080-95 = "..."
62080-96 = "ในวิวรณ์ปรากฏนางฟ้า 7 องค์จำนวน 3 กลุ่ม และทั้งหมดนั้นได้ชื่อว่าเป็น <ทูตสวรรค์แห่งวิวรณ์> ค่ะ"
62080-98 = "สิ่งนั้นมีอยู่ในวิวรณ์ที่ทางอาเรียสให้ความสำคัญเป็นพิเศษ"
62080-99 = "ฉันเคยคิดว่านั่นเป็นเหมือนเรื่องลี้ลับหรือข่าวลือที่มีพื้นฐานมาจากความกลัวและความเจ็บปวดเสียอีก..."
62080-100 = "อย่างที่ฉันบอกไปว่าความคิดหรือจิตใจที่แน่วแน่จะสมหวังได้ในที่สุดยังไงล่ะ..."

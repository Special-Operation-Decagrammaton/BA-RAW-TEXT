[translation]
62080-1 = "ตอนที่ 8;ปอร์ตาปาซิส 2"
62080-4 = "ความลับ... อะไรนะคะ?"
62080-5 = "ถ้าปล่อยทิ้งไว้เฉยๆ ก็อาจจะเรียกผีหรือวิญญาณอาฆาตออกมาได้เลยนะคะ..."
62080-6 = "หัวหน้า!"
62080-7 = "อึก..."
62080-12 = "นี่เป็น... ข้อมูลที่ฉันไม่เคยได้ยินมาก่อนเลย"
62080-13 = "ก็คงงั้นละ ตอนแรกฉันก็คิดว่าเป็นแค่ตำนานหรือเรื่องลี้ลับของโรงเรียนเท่านั้น..."
62080-14 = "นี่อาจเป็นเรื่องที่มีแต่ฉันเท่านั้นที่รู้ก็ได้"
62080-15 = "ก่อนจะมีการทำ <สนธิสัญญาเอเดน> เบียทริซเคยไปที่คลังเก็บบันทึกในปอร์ตาปาซิส"
62080-16 = "โดยที่ไม่มีใครล่วงรู้เลยนอกจากฉัน"
62080-21 = "!"
62080-22 = "คะ...?"
62080-27 = "ตะ... แต่ว่าที่นั่นเป็นที่ที่ห้ามคนอื่นเข้าไปนี่คะ..."
62080-28 = "คิดว่าเบียทริซเป็นคนที่ใส่ใจเรื่องอะไรแบบนั้นเหรอ?"
62080-29 = "มะ... มันก็จริงอยู่หรอกค่ะ..."
62080-30 = "เบียทริซมีความลับซ่อนอยู่หลายอย่าง และนี่ก็เป็นหนึ่งในความลับนั้น"
62080-31 = "ถ้างั้นมิเมซิสของสาวกยูสตาร์ที่ปรากฏให้เห็นในตอนนั้นก็...?"
62080-32 = "คิดว่ายังไงล่ะ? ถึงความจริงเป็นสิ่งที่ยากจะรู้ได้ในตอนนี้"
62080-33 = "แต่ทีนี้ก็พอเดาได้แล้วใช่มั้ยว่ามันมีความเชื่อมโยงกันไม่น้อยเลย...?"
62080-34 = "และอย่างที่เราทุกคนรู้กัน หลังจากนั้นปรากฏการณ์แปลกประหลาดก็เริ่มเกิดมากขึ้นในอาเรียส"
62080-35 = "ค่ะ... ฉันจำได้แล้วค่ะ หลังจากนั้นหลายๆ อย่างที่ฉันไม่เคยเห็นมาก่อนก็เริ่มปรากฏขึ้น และอย่างน้อยที่สุดก็คือ... มีการแจกจ่ายอาวุธมากมาย..."
62080-36 = "ในตอนนั้นฉันไม่ได้คิดว่ามันแปลกอะไร ฉันคิดแค่ว่าผู้ใหญ่ต่างกับพวกเราสินะ... ผู้ใหญ่นี่น่าทึ่งจังเลย... ฉันคิดแค่นี้เลยค่ะ..."
62080-37 = "[s] \"...\""
62080-38 = "แต่ส่วนสำคัญของเรื่องนี้ก็คือ การที่มัน 'เริ่มเพิ่มมากขึ้น' "
62080-39 = "หืม...? งั้นก็แสดงว่า...?"
62080-40 = "ใช่แล้วละ"
62080-41 = "เดิมทีในอาเรียสก็เกิดเรื่องแปลกๆ อยู่บ้างเป็นปกติ"
62080-43 = "และไม่ว่าโรงเรียนไหนก็มีการเล่าเรื่องราวลี้ลับหรืออะไรทำนองนั้น แต่ที่อาเรียสน่ะหนักกว่าที่อื่นมาก..."
62080-44 = "ฉันก็เพิ่งมารู้หลังจากออกจากอาเรียสแล้ว ว่ามันไม่ได้อยู่ในระดับ 'เล็กน้อย' เลย"
62080-49 = "[ns] \"ทำไมล่ะ...?\""
62080-50 = "ฉันเองก็ไม่รู้เหตุผลที่แน่ชัดเหมือนกัน แต่ว่า"
62080-51 = "..."
62080-52 = "เท่าที่ฉันคิดก็คือ ที่นี่กลายเป็นดินแดนแบบนั้นไปแล้ว"
62080-53 = "เดิมทีแล้วในอาเรียสมี 'บางอย่าง' อยู่"
62080-54 = "ความโศกเศร้า ความเจ็บแค้น ความอาฆาต ความโกรธ การล้มเลิกความตั้งใจ... ที่นี่เป็นศูนย์รวมของความรู้สึกเหล่านั้น"
62080-55 = "ว่ากันว่าความคิดหรือจิตใจที่แน่วแน่จะสมหวังได้ในที่สุดใช่มั้ยล่ะ?"
62080-56 = "นะ... นั่นเป็นแค่การพูดเปรียบเปรย... ไม่ใช่เหรอคะ..."
62080-57 = "แต่พวกเราก็เคยเห็นกรณีแบบสาวกยูสตาร์หรือบาร์บารากันมาแล้วไม่ใช่เหรอ?"
62080-58 = "ก็ใช่... แต่ฉันคิดแค่ว่านั่นเป็นฝีมือของมาดาม... ของเบียทริซน่ะ"
62080-59 = "บางทีนั่นอาจเป็นเพราะเธอพยายามไม่มอง 'ความจริง' อีกด้านหนึ่งที่ไหลวนอยู่ในอาเรียสโดยไม่รู้ตัว#nก็ได้..."
62080-60 = "ฉันจะไม่ตัดสินไปถึงตรงนั้นหรอก แต่บางครั้งฉันก็คิดว่ามันน่ากลัว"
62080-61 = "ความโศกเศร้า ความเจ็บแค้น ความอาฆาต ความโกรธ และการล้มเลิกความตั้งใจที่ฉันพูดไป... อะไรกันนะที่เป็นต้นตอของทุกอย่างนี้?"
62080-62 = "แค่คิดถึงเรื่องนั้น... ฉันก็กลัวแล้วละ"
62080-63 = "..."
62080-64 = "อึกก..."
62080-69 = "มาคุยเกี่ยวกับวิวรณ์กันเถอะค่ะ... ทุกคน "
62080-70 = "ยังไงสิ่งที่สำคัญที่สุด... ก็คือแก่นแท้ของ 'บางอย่าง' ที่กำลังเกิดขึ้นในอาเรียสตอนนี้นี่คะ"
62080-71 = "อื้อ ขอบใจนะ คุณชิมิโกะ"
62080-72 = "ไม่หรอกค่ะ คุณอาสึโกะ"
62080-73 = "วิวรณ์ก็คือบทสุดท้ายของพระคัมภีร์ที่เผยแพร่กันมาทั้งในทรีนิตี้และอาเรียสค่ะ"
62080-74 = "ส่วนพระคัมภีร์ของทั้ง 2 โรงเรียนก็เหมือนกัน เพราะเดิมทีแล้วเป็นสิ่งเดียวกันค่ะ จะต่างกันก็แค่การตีความเท่านั้น"
62080-75 = "แต่ในทรีนิตี้แล้ว... พระคัมภีร์ถูกใช้เป็นเหมือนเอกสารอ้างอิงอย่างหนึ่งเท่านั้น..."
62080-76 = "มันไม่ได้ถูกมองว่าสำคัญไปกว่า... หนังสือรวมคำสั่งสอน คำแนะนำ หรือคติสอนใจค่ะ..."
62080-77 = "แต่ในอาเรียส มีการศึกษาเกี่ยวกับวิวรณ์เป็นพิเศษ"
62080-78 = "นั่นก็เพราะในวิวรณ์มีข้อมูลเกี่ยวกับการล่มสลายของโลกอยู่..."
62080-79 = "[s] \"งั้นก็หมายความว่า...!\""

62080-191 = "?!?!"
62080-192 = "ขอโทษนะ ฉันไม่ได้ตั้งใจทำให้ตกใจขนาดนั้น"
62080-193 = "แต่ว่า... พอจะเล่าให้ฟังได้มั้ยว่าเกิดเรื่องอะไรขึ้นน่ะ?"
62080-194 = "ทำไมเธอถึงมาหาคุณครูคนเดียว และทำไมเด็กๆ คนอื่นถึงหายไปแบบไม่บอกกล่าวเลย"
62080-195 = "แล้วเธอรู้ได้ยังไงว่าเด็กพวกนั้นมุ่งหน้าไปยังปอร์ตาปาซิส"
62080-196 = "[s] \"อาสึโกะ เรื่องนั้น...\""
62080-197 = "หืม?"
62080-198 = "..."
62080-199 = "งั้นสินะ คุณครูบอกว่าจะรอจนกว่าไมอาจะยอมเปิดใจเล่าให้ฟังสินะ"
62080-201 = "(ไมอาทรุดตัวลงไปนั่งและเริ่มตัวสั่นเทาด้วยความหวาดกลัว...)"
62080-202 = "(ในตอนที่ไม่มีใครกล้าเอ่ยปากถามอะไร...)"
62080-204 = "อะ... เอ่อ... ฉันคิดว่าน่าจะเล่าให้คุณครูฟังได้นะคะ..."
62080-205 = "ฮิโยริ...?"
62080-206 = "ชู่ว ซัตจัง"
62080-207 = "ขะ... ขอโทษค่ะ ฉันชอบพูดอะไรไม่ดูจังหวะ... ก็เลยได้ยินบ่อยๆ ว่าตัวเองเป็นคนไม่มีความละอายใจ... แหะ... แหะๆ..."
62080-208 = "แต่ว่า... วะ... เวลามีเรื่องที่ยากลำบาก... เจ็บปวด... และเศร้าใจมากๆ "
62080-209 = "ในเวลาแบบนั้น ถ้าเราเปิดใจแล้วเล่าให้ใครสักคนฟัง จะเป็นใครก็ได้... แล้วเราจะรู้สึกดีขึ้นนะคะ..."
62080-210 = "ใครก็ได้เหรอคะ...?"
62080-211 = "ค่ะ ค่ะ! แต่เวลาแบบนี้คงต้องเป็นคุณครูค่ะ... อ้อ แต่ถ้าไม่สะดวก เดี๋ยวพวกฉันจะออกไปจากตรงนี้ให้#nเองค่ะ..."
62080-213 = "งั้นพวกฉันก็ควรต้องวางสายกันก่อนนะคะ..."
62080-214 = "ค่ะ คงต้องทำอย่างนั้นละค่ะ"
62080-216 = "ไม่ต้องห่วงนะคะ! คุณครู... เป็นคนที่เชื่อใจได้ค่ะ อย่างน้อยก็สำหรับฉันค่ะ..."
62080-217 = "ไม่ว่าจะเล่าเรื่องอะไรให้ฟัง คุณครูก็จะพยายามหาทางช่วย... ก่อนหน้านี้คุณครูทั้งซื้อยาช่วยย่อย ทั้งซื้อนิตยสารให้ฉันอ่าน..."
62080-218 = "ตะ... แต่ก็ไม่ได้หมายความว่าจะดูแลให้ทุกอย่างหรอกนะคะ...! กับบางเรื่องเราก็ต้องจัดการให้ได้ด้วย#nตัวเองค่ะ..."
62080-219 = "บางครั้งฉันก็เสียใจกับเรื่องนั้น..."
62080-220 = "แต่คุณครูก็บอกว่าถ้าไม่ทำอย่างนั้น นักเรียนก็จะไม่รู้วิธีที่จะยืนหยัดด้วยตัวเองในภายหลังค่ะ..."
62080-221 = "อึก... เอาเป็นว่าต่อให้จะไม่กล้าพูดเท่าไร... แต่เรื่องแบบนี้น่ะ..."
62080-222 = "ยิ่งพยายามเก็บไว้ในใจและทนทุกข์อยู่คนเดียว ความเจ็บปวดก็จะยิ่งเพิ่มมากขึ้นค่ะ..."
62080-223 = "ดะ... เด็กๆ โรงเรียนเราก็ไม่ค่อยเก่งเรื่องการขอร้องให้คนอื่นช่วยหรือบอกเล่าสิ่งที่อยู่ในใจ... ฉันเองก็เคยเป็นแบบนั้นค่ะ... แม้แต่ตอนนี้ก็ยังเป็นแบบนั้นอยู่บ้าง..."
62080-224 = "ตะ... แต่ฉันคิดว่าการทำแบบนั้นอาจช่วยได้บ้าง ก็เลยลองแนะนำดูค่ะ...! แหะ... แหะๆ..."
62080-226 = "คุณฮิโยริ..."
62080-232 = "งั้นพวกฉันจะไปอยู่ที่อื่นให้นะคะ เวลาเล่าบางเรื่องต่อหน้าหลายๆ คน เราก็ย่อมรู้สึกอายเป็นธรรมดา#nอยู่แล้วค่ะ"
62080-233 = "ก็ใช่นะ งั้นพวกเราก็ออกไปดูข้างนอกหน่อยแล้วกันว่ามีเรื่องอะไรหรือเปล่า"
62080-234 = "อื้อ เอาตามนั้นแล้วกัน"
62080-236 = "เดี๋ยว... ค่ะ!"
62080-238 = "หืม?"
62080-239 = "คะ... คะ...?"
62080-241 = "..."
62080-242 = "ฉันอยากเล่าให้ทุกคนฟังค่ะ..."
62080-244 = "ไม่ต้องลำบากถึงขนาดนั้นก็ได้..."
62080-245 = "คุณไมอาอุตส่าห์รวบรวมความกล้าออกมาแล้ว งั้นก็น่าจะไม่เป็นไรนะคะ รุ่นพี่?"
62080-246 = "ถ้าเป็นฉัน ฉันไม่ทำแน่..."
62080-251 = "[ns] \"จะไม่เป็นไรเหรอ?\""
62080-252 = "ค่ะ..."
62080-253 = "ถ้าได้ฟังความคิดเห็นจากหลายๆ คน... ฉันก็น่าจะตัดสินใจแน่ชัดได้ว่าต้องทำยังไงต่อไปค่ะ...!"
62080-255 = "(ไมอาเริ่มเล่าเรื่องที่เกิดขึ้นเมื่อคืนให้ฟังอย่างช้าๆ และระมัดระวัง)"
62080-256 = "(ไม่มีใครเอ่ยปากพูดอะไรโดยพลการเลย...)"
62080-258 = "..."
62080-259 = "..."
62080-260 = "..."
62080-261 = "งะ... แงงง! มุแงงงง~!!!"
62080-266 = "ฮะ... ฮิโยริ? ถ้าจะร้องไห้ขนาดนั้น..."
62080-267 = "แต่ว่า! แบบนี้มันเกินไปนี่คะ! น่าเศร้าออกไม่ใช่เหรอคะ! ฟังเรื่องแบบนี้แล้วอยู่เฉยๆ กันได้ยังไงคะ! แงงงงงงงงง~!!!"
62080-274 = "คะ... คะคะคะคะ... คุณฮิโยริ?! เอ่อ ถ้าเป็นอย่างนั้นละก็...?!"
62080-275 = "ฮือออออออออ~"
62080-276 = "ฉันก็จะ... ร้องตามไปด้วยนะ... คะ..."
62080-277 = "ไม่ต้องกลั้นหรอกค่ะ ฮืออออออ~!!!"
62080-279 = "ฮิโยริอ่อนไหวและก็อ่อนโยนจังเลยนะ"
62080-280 = "อืม... เป็นแบบนี้มาตลอดละ มิซากิ?"
62080-281 = "ฉัน... ฉันไม่ได้เป็นอะไร ไม่ต้องมองมาทางนี้หรอก"
62080-282 = "ฮุฮุ เวลาแบบนี้น่ะ ไม่ต้องกลั้นน้ำตาไว้ก็ได้"
62080-283 = "ใครกลั้นน้ำตากันเล่า!"
62080-285 = "[ns] \"ครูขอบใจจริงๆ นะที่เล่าให้พวกเราฟังตามตรง\""
62080-286 = "มะ... ไม่เลยค่ะ ฉันต้องขอบคุณทุกคนมากกว่า... ที่ช่วยรับฟังฉันค่ะ..."
62080-287 = "แต่ว่าทำไมเสียงแตรถึงดังขึ้นแล้วก็หายไปล่ะคะ?"
62080-288 = "นี่เป็นเพียงข้อสรุปที่ได้จากข้อมูลที่ฉันฟังมาจนถึงตอนนี้เท่านั้นนะคะ..."
62080-289 = "แต่ดูเหมือนจะมีเส้นแบ่งบางอย่างระหว่างกลุ่มที่ได้ยินเสียงแตรกับกลุ่มที่ไม่ได้ยินเสียงแตรเลยค่ะ..."
62080-290 = "มันคือ... อะไรเหรอคะ?"
62080-291 = "ชั้นเรียนของคุณครูค่ะ"
62080-292 = "คะ? ชั้นเรียน... เหรอคะ? แต่ทุกคนก็เข้าเรียนด้วยกันหมดนี่คะ..."
62080-293 = "การเข้าเรียนทุกคน ไม่ได้หมายความว่าเราได้เรียนเหมือนกันทุกคนหรอกค่ะ ก็เหมือนกับการบอกว่า#nอ่านหนังสือแล้ว แต่ก็ไม่ได้แปลว่าอ่านจบเล่มแล้วนี่คะ"
62080-294 = "พวกคนนอกน่ะ อ่านหยาบๆ แค่ครั้งเดียวแล้วก็เอาไปพูดต่อๆ กันราวกับว่าล่วงรู้ความจริงของโลกมา..."
62080-295 = "ไหนจะมีคนที่คิดว่าหนังสือเป็นแค่ของตกแต่งผนังหรือตู้หนังสืออีก...!"
62080-296 = "หนังสือเป็นบทสนทนาระหว่างผู้เขียนกับผู้อ่านต่างหากค่ะ! ถ้าจะอ่านแค่ผ่านๆ ก็รับสารจากผู้เขียน#nไม่ได้หรอก!"
62080-298 = "พวกเราต้องให้ความเคารพเด็กๆ เหล่านี้ให้มากขึ้นหน่อยค่ะ!"
62080-300 = "รุ่นพี่? เหมือนจะเริ่มออกทะเลแล้วนะคะ?"
62080-302 = "เฮือก?!"
62080-303 = "ขะ... ขอโทษค่ะ เอาเป็นว่า... อย่างที่ฉันเปรียบเทียบกับการอ่านหนังสือไปเลยค่ะ การเรียนหนังสือก็เป็นแบบนั้นเหมือนกัน"
62080-304 = "การเรียนหนังสือคือกระบวนการยอมรับความรู้ที่เราไม่เคยรู้มาก่อนค่ะ"
62080-305 = "แล้วชั้นเรียนก็เป็นตัวกลางที่ช่วยให้เกิดการเรียนการสอนผ่านคุณครู"
62080-306 = "เพราะงั้นต่อให้มานั่งฟังคุณครูสอนเป็นร้อยวัน แต่ถ้าฟังแบบเข้าหูซ้าย ทะลุหูขวา..."
62080-307 = "ถ้าตั้งใจจะลืมทุกอย่างทันทีหลังเลิกเรียน ก็ไม่ต่างกับการไม่เข้าเรียนตั้งแต่แรกหรอกค่ะ"
62080-308 = "อ๊ะ...!"
62080-309 = "นี่เป็นแค่การคาดเดาของฉันค่ะ แล้วคนที่จะพิสูจน์การคาดเดาของฉันได้ ก็มีแต่คุณเท่านั้นค่ะ"
62080-310 = "ในความคิดของฉัน นักเรียนที่ได้ยินเสียงแตร... ก็คือคนที่รับรู้ได้ถึง 'สัญญาณแห่งการล่มสลายของโลก' ตามในวิวรณ์"
62080-311 = "คือนักเรียนที่ยอมรับ 'ความรู้ที่อยู่ภายนอกอาเรียส' อย่างไม่ต่อต้าน"
62080-312 = "พูดอีกอย่างก็คือ นักเรียนที่มีใจต่อต้าน 'แนวคิดใหม่' น้อยกว่าค่ะ"
62080-313 = "คิดว่ายังไงเหรอคะ?"
62080-314 = "นั่นสิคะ! น่าจะเป็นแบบนั้นค่ะ! ยอดเยี่ยมเลยค่ะคุณอุย!"
62080-315 = "มะ... ไม่หรอกค่ะ... ฉันก็แค่คาดเดาไปตามแบบของฉันค่ะ..."
62080-316 = "ฉันบอกรุ่นพี่อยู่ตั้งหลายครั้งแล้วนะคะว่าเวลามีใครชม ก็ควรรับคำชมที่จริงใจนั้นด้วยความขอบคุณน่ะ"
62080-317 = "หา?!"
62080-318 = "ละ... และถ้านักเรียนเริ่มยอมรับ 'สิ่งที่อยู่ภายนอกอาเรียส' กันบ้างแล้ว..."
62080-319 = "ก็อาจเป็นไปได้มากทีเดียวว่าจะเริ่มสงสัยเกี่ยวกับ 'อาเรียสในปัจจุบัน' ค่ะ..."
62080-320 = "ก็ความรู้เป็นหนึ่งในปัจจัยที่ทรงพลังที่สุดที่เปลี่ยนแปลงคนได้นี่คะ..."
62080-325 = "ถ้างั้นการที่นักเรียนเริ่มมีคำถามเกี่ยวกับอาเรียสในตอนนี้ก็หมายความว่า..."
62080-326 = "ค่ะ"
62080-327 = "ไม่ช้าก็เร็ว เด็กเหล่านั้นก็จะถูกมองว่าเป็น 'ศัตรู'"
62080-328 = "ของนักเรียนที่ไม่อยากให้เกิดการเปลี่ยนแปลงต่ออาเรียสในปัจจุบัน... เหมือนกับคุณคนนี้ค่ะ"
62080-330 = "ถ้างั้นเรื่องนางฟ้าเป่าแตรล่ะ...?"
62080-331 = "เรื่องนั้นเราไม่รู้หรอกค่ะ บางทีอาจจะเป็นเหล่าทูตสวรรค์ที่อยู่ในวิวรณ์จริงๆ ก็ได้นะคะ...?"
62080-332 = "แต่ยังไงเราก็ต้องมองความเป็นไปได้ของการตีความของนักเรียนคนอื่นด้วยค่ะ"
62080-333 = "เพราะบางทีนั่นอาจเป็น 'ปรากฏการณ์' อย่างหนึ่งที่เกิดขึ้นจากความรู้สึกเป็นปฏิปักษ์ ความวิตกกังวล ความโกรธ หรือความรู้สึกอื่นๆ..."
62080-334 = "ที่เหล่านักเรียนอาเรียสมีต่อ 'โลกภายนอก' ก็ได้ค่ะ..."
62080-335 = "..."
62080-336 = "อย่างที่คุณอุยว่าเลยละ ฉันว่ามีโอกาสเป็นแบบนั้นสูงเลย"
62080-337 = "แต่ว่า คุณอุย...? สมมติว่านางฟ้าเป่าแตรเป็นอย่างนั้นจริงๆ..."
62080-338 = "สิ่งที่อยู่ในนั้นอาจเป็นอะไรที่หนักหนาและลึกซึ้งเกินจินตนาการ"
62080-340 = "และเป็นมากกว่าสิ่งที่คุณอุยคิดอยู่ก็ได้"
62080-342 = "ตอนต่อไป;Apocrypha"

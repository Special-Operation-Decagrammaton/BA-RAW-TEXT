90000070-22 = "3;히마리;06;……그 말이 맞긴 하지만, 아직 성급하게 결론을 내어서는 안 되죠. 게다가 우리는 데카그라마톤의 정체를 밝히려는 것이지, 그것과 숨바꼭질을 하고 있는 건 아니에요.\n#3;em;[땀]"
90000070-23 = "3;히마리;02;일단 가서 확인을 해 보죠. 그게 우선이에요. 제가 잘못봤을 수도 있고,"
90000070-24 = "3;히마리;05;일단 해당 신호가 발신된 곳으로 출발해봐요."
90000070-25 = "3;히마리;06;아주 찰나의 신호였기 때문에, 구체적인 위치를 특정할 수는 없어요. 수색 범위는 굉장히 넓습니다. 어쩌면 며칠이고 헤매야 할지도 몰라요.\n#3;em;[...]"
90000070-26 = "3;히마리;05;그럼 시작하죠.\n#3;closeup\n#3;em;[!]"

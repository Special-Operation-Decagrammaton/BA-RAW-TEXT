90000070-14 = "3;에이미;05;……설마?\n#3;em;[...]\n#3;a"
90000070-15 = "3;히마리;05;데카그라마톤, 그것의 신호와 일치하고 있었어요. 설마 해서 몇번이고 재확인을 했지만, 확실합니다.\n#3;em;[반응]"
90000070-16 = "[s] \"어…… 그렇다는 건…….\""
90000070-17 = "3;히마리;05\n1;에이미;02;그 신호가 포착된 곳에 데카그라마톤이 있다는 얘기야?\n#3;m5\n#1;ar\n#1;em;[?]"
90000070-18 = "3;히마리;02;……지금까지의 흐름이라면, 네. 맞아요."
90000070-19 = "3;히마리;02\n1;에이미;05;잠깐만. 우리의 임무는 데카그라마톤의 정체를 찾기 위한 거잖아.\n#1;m3\n#1;em;[반응]\n#3;dr"
90000070-20 = "1;에이미;00;이렇게 되면 굳이 번거롭게 다른 예언자들의 데이터를 수집할 필요 없이 바로 이쪽을 공략하는 게……?"

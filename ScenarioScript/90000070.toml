[translation]
90000070-1 = "Episode 8;Research Part 7: Ruined Submerged District"
90000070-2 = "...Eimi. Sensei."
90000070-3 = "What did you find?"
90000070-4 = "I followed the coordinates and picked up a signal."
90000070-5 = "What kind of signal?"
90000070-6 = "It appears to be some kind of call sign."
90000070-7 = "I almost missed it, but naturally nothing can get past me. It's disguised as white noise, but I remembered the pattern."
90000070-8 = "The call sign's pattern is exactly the same as the being that hacked us."
90000070-14 = "Do you mean it's the AI?"
90000070-15 = "Yes, Decagrammaton. I nearly didn't believe it, but of course I never doubt my own work. The signals match."
90000070-16 = "[s] \"I think I'm following...\""
90000070-17 = "So Decagrammaton is at the Ruins?"
90000070-18 = "Based on the data, yes."
90000070-19 = "Well, our mission is to uncover Decagrammaton's identity, right?"
90000070-20 = "So why don't we attack it right now and skip all of the data-collecting?"
90000070-22 = "Do you really think I didn't think of that? But our goal is to reveal its identity. If we provoke it now, it'll likely just slink away somewhere we won't find it until it wants us to."
90000070-23 = "We should confirm my findings first. On the very, very slim possibility that I'm wrong."
90000070-24 = "We'll investigate where the signal came from."
90000070-25 = "It was a very brief signal, so I can't pinpoint a specific location. The scope is a large section of the Ruins, so this may be a several day venture."
90000070-26 = "Is everyone ready?"

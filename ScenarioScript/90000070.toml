90000070-7 = "1;에이미;02\n3;히마리;10;……. 얼핏 보면 의미없는 노이즈에 가깝지만…… 저는 이 신호의 패턴을 기억하고 있어요.\n#3;em;[...]\n#3;m3\n#1;dl"

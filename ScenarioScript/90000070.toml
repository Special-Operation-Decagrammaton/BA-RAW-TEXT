[translation]
90000070-1 = "第8話;蒐集情報(7)廢墟淹沒地區"
90000070-2 = "……各位。"
90000070-3 = "發現什麼了嗎？"
90000070-4 = "我在廢墟的某個地區，捕捉到了無法忽視的信號……雖然只有一瞬間。"
90000070-5 = "信號？是什麼樣的信號？"
90000070-6 = "那看起來……像是在呼叫某個人的「呼叫信號」。"
90000070-7 = "雖然乍看之下是沒有意義的雜訊……不過我記得這個信號的模式。"
90000070-8 = "沒錯……就是我們曾經遭遇的那個存在。"
90000070-14 = "難道是……？"
90000070-15 = "沒錯，與十字神名的信號一致。#n我也出於懷疑而確認了很多次，不會錯的。"
90000070-16 = "[s] 「也就是說……」"
90000070-17 = "十字神名就在發出信號的位置嗎？"
90000070-18 = "……以目前為止的走向來看，或許確實如此吧。"
90000070-19 = "先等一下。我們的任務是找出十字神名的真實身分對吧？"
90000070-20 = "既然如此，與其特地蒐集其他預言者的資訊，直接攻略那邊不就……？"
90000070-22 = "……雖然這麼說也沒錯，不過現在下定論還為之過早。#n我們的目標是找出十字神名的真相，而不是跟它玩捉迷藏。"
90000070-23 = "還是先去現場確認之後再做決定吧。#n畢竟也可能是我看錯了……"
90000070-24 = "請前往發出信號的地點吧。"
90000070-25 = "由於信號只出現了一瞬間，因此無法鎖定具體的位置。#n因為範圍相當廣的關係，或許得花費幾天的時間才能完成搜索。"
90000070-26 = "那麼開始吧。"

[translation]
90000070-1 = "ตอนที่ 7; รวบรวมข้อมูล 7 - พื้นที่รกร้างจมน้ำ"
90000070-2 = "...... ทุกคน"
90000070-3 = "เจออะไรบ้างไหม?"
90000070-4 = "ฉันเจอสัญญาณที่มองข้ามไม่ได้ในบางจุดของพื้นที่รกร้างค่ะ แม้จะแค่แป๊บเดียวก็เถอะ"
90000070-5 = "สัญญาณ? สัญญาณอะไร?"
90000070-6 = "มันคือ... สัญญาณเรียกใครสักคนค่ะ"
90000070-7 = "...... ถ้าฟังผ่านๆ อาจจะเหมือนเสียงรบกวนที่ไม่มีความหมายอะไร... แต่ฉันจำรูปแบบของสัญญาณนี้ได้ค่ะ"
90000070-8 = "และรูปแบบของสัญญาณนั่น... มันก็เหมือนกับสัญญาณที่เคยแฮ็กเข้าระบบพวกเรามาก่อน"
90000070-14 = "หรือว่า...?"
90000070-15 = "มันตรงกับสัญญาณของเดคาแกรมมาทอนค่ะ ฉันตรวจสอบซ้ำหลายครั้งแล้ว แต่ผลก็ออกมาชัดเจน"
90000070-16 = "[s] \"เอ่อ... ถ้าอย่างนั้น...\""
90000070-17 = "แปลว่าเดคาแกรมมาทอนอยู่ในที่ที่ตรวจพบสัญญาณนั้นเหรอ?"
90000070-18 = "จากความเป็นไปได้ทั้งหมดจนถึงตอนนี้... ใช่ค่ะ ใช่แล้วค่ะ!"
90000070-19 = "เดี๋ยวก่อน ภารกิจของเราก็เพื่อหาตัวตนของเดคาแกรมมาทอนไม่ใช่เหรอ?"
90000070-20 = "ถ้างั้นเราก็ไม่จำเป็นต้องรวบรวมข้อมูลของผู้เลื่อมใสตนอื่น แล้วก็เข้าบุกรุกจากทางนี้ได้เลยสิ...?"
90000070-22 = "จะว่าอย่างนั้นก็ได้ แต่ก็ยังด่วนสรุปไม่ได้หรอกค่ะ อีกอย่าง จุดประสงค์พวกเราคือการเปิดเผยตัวตน#nที่แท้จริงของเดคาแกรมมาทอน เราไม่ได้จะไล่ตามมันสักหน่อยนะคะ"
90000070-23 = "ก่อนอื่นไปตรวจสอบกันดูก่อนเถอะค่ะ ฉันอาจจะมองผิดไปก็ได้"
90000070-24 = "เราเดินทางไปยังที่ที่มีสัญญาณนั้นก่อนเถอะค่ะ"
90000070-25 = "สัญญาณมันปรากฏแค่ชั่วพริบตา เราจึงระบุตำแหน่งอย่างชัดเจนไม่ได้ค่ะ ขอบเขตการค้นหากว้างมากเลยค่ะ ดีไม่ดีเราอาจต้องใช้เวลาหลายวันเลยก็ได้"
90000070-26 = "ถ้างั้นก็มาเริ่มกันเถอะค่ะ"

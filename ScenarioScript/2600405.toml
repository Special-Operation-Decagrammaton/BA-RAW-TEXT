[translation]
2600405-1 = "The Mysterious Scavenger Hunt"
2600405-2 = "You're here, Sensei! This way!"
2600405-3 = "Haha... Something on your mind? You look a little surprised."
2600405-4 = "Wondering why there's no one at the library today? We're closed today, silly."
2600405-5 = "Even the library needs days off to organize the space and stuff like that."
2600405-6 = "Anyway, I called you today because..."
2600405-7 = "...we'll be busy with this!"
2600405-8 = "[s1] \"A book scanner?\"\n[s2] \"A pistol?!\""
2600405-9 = "Bingo! I'm glad you recognize it!"
2600405-10 = "N-No! This is just a book scanner!"
2600405-11 = "When you put a book under the beam..."
2600405-13 = "*beep* *beep* Book No. 00002853, \"Wormwood Effects and Preparation\"."
2600405-14 = "See? It scans and automatically categorizes the book for you."
2600405-15 = "I have a little scavenger hunt prepared for today. I call it, \"Search for the Hidden Books\"."
2600405-16 = "This is a public library, so a lot of students from different academies visit here."
2600405-17 = "Consequently, it becomes quite difficult to keep all of the books organized."
2600405-18 = "I often find books on the shelves that aren't even registered to this library!"
2600405-19 = "The library has accumulated hundreds of these \"hidden books\" over the years!"
2600405-20 = "Pardon me?"
2600405-21 = "I sound excited? Um, do I really? W-Well, I..."
2600405-22 = "Haha... I guess I did forget to use my inside voice just now."
2600405-23 = "Consider this. If there are that many unregistered books scattered around the library..."
2600405-24 = "...then there must be a mysterious book out there that even I've never seen before."
2600405-25 = "Think about it! A whole new book! Opportunities like that don't come around everyday for me."
2600405-26 = "...Ha."
2600405-27 = "I got a little carried away again..."
2600405-28 = "A-Anyway! That's why I asked for your help."
2600405-29 = "So...are you up for it, Sensei? I know I should have asked earlier, but are you free today?"
2600405-30 = "Putting it that way, I sound like I'm your manager or something."
2600405-31 = "I enjoy categorizing books, but maybe it sounds like menial work to you..."
2600405-32 = "[s3] \"I'm game. It sounds fun.\"\n[s4] \"I could never pass up a scavenger hunt!\""
2600405-33 = "Yay! I'm so thankful to hear you say that!"
2600405-34 = "Yay! I'm so thankful to hear you say that!"
2600405-37 = "Shimiko quickly handed me the pistol-like book scanner."
2600405-39 = "We quickly began searching the library for books with Shimiko taking the lead."
2600405-41 = "We searched the entire library and found over 1,000 unregistered books—more than Shimiko expected."
2600405-43 = "..."
2600405-44 = "This is..."
2600405-45 = "...getting out of hand. A lot of these books are duplicates too."
2600405-46 = "We still haven't found a book I've never seen before. Maybe it doesn't exist after all."
2600405-47 = "I wonder if the students have really left this many books behind by accident."
2600405-48 = "Or maybe it was their way of donating books they didn't know how to get rid of."
2600405-49 = "..."
2600405-50 = "Well...this was a letdown."
2600405-51 = "*sigh*"
2600405-52 = "Sorry, Sensei. I promised you a scavenger hunt, but it was just a waste of time."
2600405-53 = "[s5] \"I still had fun.\"\n[s6] \"I'm glad you got your work done, though.\""
2600405-54 = "Huh? Is that really how you feel?"
2600405-55 = "Huh? Is that really how you feel?"
2600405-56 = "But...all you did today was organize books with me."
2600405-57 = "You've already found the treasure you were looking for? Where?"
2600405-58 = "Huh?"
2600405-59 = "What are you getting at?"
2600405-60 = "Why do you look so happy?"
2600405-61 = "..."
2600405-62 = "...!"
2600405-63 = "Wh-Where is this coming from?! You can't just say things like that out of the blue!"
2600405-64 = "I know we're friends, but you're making me blush!"
2600405-65 = "You're so...!"
2600405-66 = "..."
2600405-67 = "Heehee..."
2600405-68 = "Hahaha! Oh, you. I'll let you off the hook this time."
2600405-69 = "But knowing that you had a good time makes me feel better. Thank you, Sensei."
2600405-70 = "And..."
2600405-71 = "...now that I think about it, I found something I treasure too."
2600405-72 = "And it holds a lot of value to me."
2600405-73 = "Wanna know what it is? Heehee."
2600405-74 = "It's a secret."
2600405-76 = "After that, Shimiko returned to her usual, cheerful self and began organizing the books we found."
2600405-77 = "I eventually left the library after spending the day helping Shimiko with the books."

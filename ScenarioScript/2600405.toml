[translation]
2600405-1 = "ล่าขุมทรัพย์ปริศนา"
2600405-2 = "คุณครูมาจริงๆ ด้วย! ทางนี้ค่ะคุณครู!"
2600405-3 = "ฮ่ะฮ่า... ทำไมทำหน้าตกใจอย่างนั้นล่ะคะ? มีอะไรหรือเปล่าคะ?"
2600405-4 = "อ่า... สงสัยว่าทำไมห้องสมุดถึงไม่มีคนอยู่เลย ถึงแม้จะเป็นตอนกลางวันอย่างนั้นเหรอคะ?#nก็วันนี้เราปิดยังไงล่ะคะ"
2600405-5 = "ห้องสมุดก็ต้องมีวันหยุดบ้างนะคะ เราต้องหยุดเพื่อทำอะไรหลายอย่าง ไม่เพียงแค่จัดหนังสือ#nเท่านั้น"
2600405-6 = "เอาเถอะค่ะ~ สาเหตุที่ฉันเรียกคุณครูมาในวันนี้ก็คือ..."
2600405-7 = "สิ่งนี้ยังไงล่ะคะ!!"
2600405-8 = "[s1] \"ที่สแกนหนังสือเหรอ?\"\n[s2] \"ปะ.. ปืนพกเหรอ?\""
2600405-9 = "ใช่ค่ะ! คุณครูเนี่ย ตาถึงจังเลย!"
2600405-10 = "มะ.. ไม่ใช่นะคะ! ถึงจะดูคล้ายก็จริง แต่นี่แค่ที่สแกนหนังสือเท่านั้นค่ะ!"
2600405-11 = "เราแค่ต้องเอาหนังสือมาสแกนให้โดนแสงแบบนี้..."
2600405-13 = "ติ๊ด! ตี๊ดด! หนังสือหมายเลข 00002853 \"สรรพคุณและวิธีปรุงโยะโมะงิ\""
2600405-14 = "เห็นมั้ยล่ะคะ? เครื่องนี้จะช่วยสแกนและค้นหาหนังสือให้ค่ะ"
2600405-15 = "ว่าไงนะคะ? เหมือนเล่นล่าสมบัติเหรอคะ? อืม... ก็ใช่นะคะ แต่น่าจะต้องเรียกว่า 'ล่าหนังสือที่#nซ่อนอยู่' มากกว่า"
2600405-16 = "หอสมุดสาธารณะที่นี่ก็ดีอยู่หรอกค่ะที่กว้างขวางจนรองรับนักเรียนจากหลายๆ โรงเรียนได้..."
2600405-17 = "แต่หนังสือของที่นี่ยังไม่ได้รับการจัดการอย่างถูกต้องเลยค่ะ"
2600405-18 = "หนำซ้ำหนังสือบางเล่มที่อยู่ในชั้นยังไม่ได้ลงทะเบียนในระบบเลยด้วย แม้จะเป็นหนังสือของเรา#nก็เถอะค่ะ!"
2600405-19 = "'หนังสือที่ซ่อนอยู่' พวกนี้มีอยู่หลายร้อยเล่มเลยค่ะ!"
2600405-20 = "เอ๋...?"
2600405-21 = "ฉันดูตื่นเต้นเหรอคะ? อืม.. ฉะ... ฉันออกอาการมากไปหรือเปล่าคะเนี่ย? คือว่า... แหะๆ..."
2600405-22 = "ฮ่าฮ่า... ฉันคงตื่นเต้นจนพูดเสียงดังโดยไม่รู้ตัวน่ะค่ะ"
2600405-23 = "แต่ลองคิดดูสิคะ ถ้ามีหนังสือปริศนาที่ยังไม่ถูกลงทะเบียนเยอะขนาดนั้นละก็..."
2600405-24 = "หนึ่งในนั้นอาจจะเป็นหนังสือลึกลับที่เรายังไม่เคยอ่าน หรือแม้แต่เคยได้ยินชื่อก็ได้นะคะ"
2600405-25 = "การหาหนังสือที่ยังไม่เคยผ่านสายตามาก่อน! มันไม่ใช่เรื่องสนุกที่เราเจอง่ายๆ ในทุกวันนะคะ!"
2600405-26 = "เฮือก..."
2600405-27 = "ฉันตื่นเต้นจนเผลอพูดเสียงดังอีกจนได้..."
2600405-28 = "เอาเถอะค่ะ! สรุปว่าฉันขอให้คุณครูมาที่นี่เพราะอยากให้คุณครูมาทำด้วยกันน่ะค่ะ"
2600405-29 = "พอจะ... ช่วยหน่อยได้มั้ยคะคุณครู? มันตลกใช่มั้ยคะที่ฉันเพิ่งมาถามเอาตอนนี้... แหะๆ... แต่วันนี้พอจะมีเวลาบ้างมั้ยคะ?"
2600405-30 = "ทำไมรู้สึกเหมือนเรียกคุณครูมาทำงานเลย..."
2600405-31 = "สำหรับฉันแล้วมันไม่ใช่งาน แต่มาคิดดูแล้ว... สำหรับคุณครูแล้วอาจจะเป็นงานก็ได้..."
2600405-32 = "[s3] \"น่าสนุกดีนะ ลองทำดูหน่อยแล้วกัน\"\n[s4] \"ครูไม่เคยพลาดการล่าสมบัติอยู่แล้ว!\""
2600405-33 = "ว้าวว! ดีใจจังค่ะที่ได้ยินแบบนี้ สมกับที่เป็นคุณครูจริงๆ ขอบคุณนะคะ รู้สึกมีพลังขึ้นมาเลย!"
2600405-34 = "ว้าวว! ดีใจจังค่ะที่ได้ยินแบบนี้ สมกับที่เป็นคุณครูจริงๆ ขอบคุณนะคะ รู้สึกมีพลังขึ้นมาเลย!"
2600405-37 = "(ชิมิโกะยื่นที่สแกนหนังสือที่มีรูปร่างคล้ายปืนพกออกมา)"
2600405-39 = "(เธอเดินนำหน้าไปแล้วไปหาหนังสือที่ซ่อนอยู่อย่างตื่นเต้น)"
2600405-41 = "(ใช้เวลาทั้งวันค้นหนังสือในห้องสมุดมากกว่า 1,000 เล่ม นี่เป็นจำนวนที่ชิมิโกะเองก็คาดไม่ถึง)"
2600405-43 = "......"
2600405-44 = "นี่มัน..."
2600405-45 = "งานหนักเกินกว่าที่เราจะรับมือได้แล้วนะคะ แถมยังมีหนังสือซ้ำๆ กันอยู่ด้วย..."
2600405-46 = "แล้วเราก็ยังไม่เจอหนังสือลึกลับที่ฉันยังไม่เคยเห็นอีกด้วย ที่เห็นวันนี้ก็หนังสือที่ผ่านตามาแล้ว#nทั้งนั้น..."
2600405-47 = "อืม... ฉันเริ่มสงสัยแล้วค่ะว่านักเรียนที่มาที่นี่เอาหนังสือของตัวเองมาแล้วลืมไว้บ้างหรือเปล่า..."
2600405-48 = "หรือไม่ก็แอบเอาหนังสือที่ไม่กล้าทิ้งมาเสียบไว้ในชั้นหนังสือแล้วก็ออกไป..."
2600405-49 = "......"
2600405-50 = "เอาเป็นว่า งานวันนี้ผิดคาดจังเลยค่ะ"
2600405-51 = "เฮ้อ..."
2600405-52 = "ขอโทษนะคะคุณครู อุตส่าห์เรียกครูมาล่าสมบัติอย่างตื่นเต้น แต่สุดท้ายก็ไม่ได้สมบัติอะไรเลย"
2600405-53 = "[s5] \"แบบนี้ก็สนุกดี\"\n[s6] \"แต่ก็ถือว่าได้ทำงานนะ\""
2600405-54 = "หืม? จะ... จริงเหรอคะ? คุณครูพูดจริงนะ?"
2600405-55 = "หืม? จะ... จริงเหรอคะ? คุณครูพูดจริงนะ?"
2600405-56 = "ทำไมถึงคิดแบบนั้นล่ะคะ? นี่ไม่ต่างอะไรกับการมาทำงานบรรณารักษ์ทั้งวันเลยนะคะ"
2600405-57 = "เอ๋? หาสมบัติเจอแล้วงั้นเหรอ? อยู่ไหนเหรอคะ!? ไปเจอมาจากตรงไหนคะ?"
2600405-58 = "เอ๋...?"
2600405-59 = "สะ... สีหน้าของฉันงั้นเหรอ?"
2600405-60 = "ที่ฉันทำหน้าตื่นเต้นงั้นเหรอคะ...?"
2600405-61 = "......"
2600405-62 = "......!!"
2600405-63 = "พะ... พูดอะไรแบบนี้ล่ะคะคุณครู! อย่าพูดอะไรเหลวไหลสิคะ!"
2600405-64 = "ถึงฉันจะคูลแค่ไหน แต่ถ้ามาพูดแบบนี้ฉันก็เขินนะคะ!"
2600405-65 = "จริงๆ เลย คุณครูเนี่ย...!"
2600405-66 = "......"
2600405-67 = "ฮุฮุ... แหะๆ"
2600405-68 = "อะฮ่ะฮ่ะฮ่า! ก็ได้ค่ะ ยอมให้คุณครูครั้งหนึ่งก็แล้วกันค่ะ"
2600405-69 = "แต่พอคุณครูพูดแบบนี้ฉันก็รู้สึกดีขึ้นนะคะ ขอบคุณนะคะคุณครู"
2600405-70 = "อีกอย่าง..."
2600405-71 = "พอมาคิดดูแล้ว ฉันว่าฉันก็เจอสมบัติบางอย่างแล้วละค่ะ"
2600405-72 = "เป็นสิ่งที่มีค่ามากเลยค่ะ"
2600405-73 = "อยากรู้ว่าอะไรเหรอคะ? ฮุฮุ"
2600405-74 = "ไม่บอกหรอกค่ะ..."
2600405-76 = "(พูดจบแล้วชิมิโกะก็เริ่มจัดหนังสือใหม่ในบรรยากาศที่คุ้นเคย)"
2600405-77 = "(วันนี้คุณครูใช้เวลาเกือบทั้งวันจัดหนังสือกับชิมิโกะ และสุดท้ายก็ออกมาจากห้องสมุด)"

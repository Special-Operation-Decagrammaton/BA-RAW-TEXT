[translation]
2600405-1 = "尋求寶物"
2600405-2 = "你來了啊，老師！這邊！"
2600405-3 = "……嗯？怎麼了嗎？"
2600405-4 = "啊，因為今天是休館日，所以大白天也不會有人來。"
2600405-5 = "圖書館也需要休息日唷。為了整理或其他各種事務。"
2600405-6 = "總之呢，今天請老師來這裡是因為……！"
2600405-7 = "這個東西！"
2600405-8 = "[s1] 「掃碼機？」\n[s2] 「手，手槍！？」"
2600405-9 = "沒錯！不愧是老師，原來你知道啊！"
2600405-10 = "不，不是！雖然長得很像，但這是圖書搜尋機！"
2600405-11 = "只要像這樣對著書掃描……"
2600405-13 = "嗶嗶！圖書編號00002853號《艾草的效能與料理法》。"
2600405-14 = "……就會這樣，會自動讀取書本資訊。"
2600405-15 = "你問這東西要怎麼尋寶……？我們接下來要做的事情，正確名稱應該是「尋找稀有書」。"
2600405-16 = "這裡是各校學生聚集的公共圖書館，規模非常大……"
2600405-17 = "也因此，書本管理其實沒有做得很完善。"
2600405-18 = "似乎甚至有些書，還沒有被登記成館藏書就被擺到書架上了……"
2600405-19 = "經年累月下來，這類書本已經累積了數百本以上！"
2600405-20 = "……咦？"
2600405-21 = "你說我好像很興奮？啊，啊哈哈，可能吧……"
2600405-22 = "抱歉，因為沒有其他人，我就不小心大聲起來了。"
2600405-23 = "不過，既然累積了那麼多未登記的書籍……"
2600405-24 = "那麼說不定，其中還會有至今為止看也沒看過、聽也沒聽過、神祕又稀有的珍奇書本！"
2600405-25 = "一想到說不定會有那種書，就讓我興奮到無法自拔！！"
2600405-26 = "……啊！"
2600405-27 = "對，對不起，我又在那邊自顧自地……"
2600405-28 = "總，總之！我想說一個人找也沒什麼意思，所以才請老師幫我一起找。"
2600405-29 = "……事到如今我再確認一下，請問老師行程上沒問題嗎？今天該不會是硬擠出時間的吧……？"
2600405-30 = "重新思考過，總覺得就像是把老師叫出來幫我做工作一樣……"
2600405-31 = "雖，雖然對我來說不算工作算玩樂，但畢竟老師不一定這麼認為……！"
2600405-32 = "[s3] 「聽起來很好玩！」\n[s4] 「尋寶哪有拒絕的道理！」"
2600405-33 = "謝，謝謝老師！不愧是老師！是個童心未泯的大人呢！"
2600405-34 = "謝，謝謝老師！不愧是老師！是個童心未泯的大人呢！"
2600405-37 = "（志美子一邊說著，一邊把條碼機交給我）"
2600405-39 = "（然後她便如魚得水般，踏著開心的腳步開始尋找沒有登記的書本）"
2600405-41 = "（就這樣在圖書館繞了一整天，找到的書超過一千本，超乎志美子的預期）"
2600405-43 = "……"
2600405-44 = "這個……"
2600405-45 = "不管怎麼說這樣都太多了……也有很多重複的書……"
2600405-46 = "但我所期待的未知書本卻一本也沒有……全都是我知道的書。"
2600405-47 = "唔──嗯，恐怕這些都是來訪的學生忘記帶走自己的書……"
2600405-48 = "不然就是把不知道該怎麼丟掉的書偷偷塞到書架上……感覺大多都是這些狀況吧。"
2600405-49 = "……"
2600405-50 = "總覺得……跟尋寶差了十萬八千里，變得非常現實呢。"
2600405-51 = "哈啊……"
2600405-52 = "老師對不起。大聲嚷嚷說要尋寶，結果卻只是單純的勞動。"
2600405-53 = "[s5] 「不會，很有意思喔。」\n[s6] 「而且很有成就感。」"
2600405-54 = "咦……？"
2600405-55 = "咦……？"
2600405-56 = "真的嗎……？明明最後只是整理書整理一整天……"
2600405-57 = "咦？你說寶物已經找到了！？在，在哪裡看到的！？"
2600405-58 = "……咦？"
2600405-59 = "……我？"
2600405-60 = "我開心的表情……？"
2600405-61 = "……"
2600405-62 = "……！！"
2600405-63 = "你，你在說什麼啊！？請，請不要突然說這種奇怪的話！！"
2600405-64 = "就算是我，被人面對面說這種話也是會害羞的！真是，討厭啦……！"
2600405-65 = "老師真是的……！"
2600405-66 = "……"
2600405-67 = "……呵呵。"
2600405-68 = "啊哈哈哈！算了，就當是那麼一回事吧。"
2600405-69 = "不過聽你這樣說，我心裡感覺好一點了。謝謝老師。"
2600405-70 = "而且……"
2600405-71 = "這樣一想，我好像也剛好找到一個寶物了。"
2600405-72 = "……真的找到了好東西。"
2600405-73 = "很在意嗎？"
2600405-74 = "……呵呵，這是祕密。"
2600405-76 = "（志美子說完便回到平時的樣子，繼續整理書本）"
2600405-77 = "（我也繼續在志美子身邊幫忙整理書本一段時間，然後離開了圖書館）"

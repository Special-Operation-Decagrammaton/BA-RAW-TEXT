[translation]
2600405-1 = "#title;미지의 보물찾기"
2600405-2 = "3;시미코;01;와주셨군요, 선생님! 이쪽이에요!\n#3;a\n#3;hophop\n#3;em;[반응]"
2600405-3 = "3;시미코;02;아하하…… 음? 왜 그러세요? 조금 놀라신 얼굴인데요?"
2600405-4 = "3;시미코;01;아, 왜 낮인데 도서관에 사람이 아무도 없냐고요? 그야 오늘은 휴관일이니까요."
2600405-5 = "3;시미코;99;도서관에게도 쉬는 날은 필요하답니다. 정리라든가, 여러가지 이유로 말이죠.\n#3;em;…"
2600405-6 = "3;시미코;01;아무튼 그래서~. 오늘 선생님을 이 자리로 불러낸 이유는……!"
2600405-7 = "3;시미코;03;바로…… 이것!! 이것 때문입니다!!\n#3;closeup\n#3;em;[!]"
2600405-8 = "[s1] \"도서검색기?\"\n[s2] \"궈, 권총!?\""
2600405-9 = "3;시미코;02;맞아요! 역시 선생님, 알고 계셨군요!\n#3;em;[반짝]"
2600405-10 = "3;시미코;04;아, 아니에요! 분명 비슷하게 생겼지만, 이건 도서검색기라고요!\n#3;stiff"
2600405-11 = "3;시미코;01;이렇게 책에 가져다 대고 빔을 쏘면……\n#3;m4"
2600405-12 = "#wait;1000"
2600405-13 = "#na;삑-. 삐빅! 도서번호 00002853번 <쑥의 효능과 조리법>입니다."
2600405-14 = "3;시미코;01;……보셨죠? 자동으로 책을 검색해주는 기기라고요.\n#3;em;[반응]"
2600405-15 = "3;시미코;02;네? 이게 그 보물찾기냐고요? 네, 맞아요. 정확히는 '숨은 책 찾기'랍니다."
2600405-16 = "3;시미코;01;이곳은 다양한 학교의 학생들이 모이는 공공도서관이니만큼, 그 규모가 큰 건 좋지만……\n#3;m3"
2600405-17 = "3;시미코;04;반대로 그만큼 책의 관리는 제대로 이루어지지 못하고 있더라고요."
2600405-18 = "3;시미코;02;분명 이 도서관의 책인데도, 등록조차 되지 않은 채 꽂혀 있는 책들이 있다고 해요!!\n#3;hophop\n#3;em;[반짝]"
2600405-19 = "3;시미코;03;그렇게 쌓이고 쌓인 '숨은 책'들이 어림잡아 수백 권!\n#3;greeting"
2600405-20 = "3;시미코;02;……네?\n#3;stiff"
2600405-21 = "3;시미코;04;제가 들뜬 것 같다고요? 으음? 그, 그래 보였나요? 그, 그야…… 그게……\n#3;em;[땀]"
2600405-22 = "3;시미코;01;아하하…… 저도 모르게 목소리가 조금 커졌나 보네요."
2600405-23 = "3;시미코;99;그치만 정말로 등록되지 않은 미지의 책들이 그렇게 쌓여 있다면……\n#3;em;…"
2600405-24 = "3;시미코;02;개중에는 어쩌면 제가 한 번도, 들어본 적도 없는 신비한 책이 있을 지도 모르잖아요?"
2600405-25 = "3;시미코;03;제가 한 번도 본 적이 없는 책이라니! 그런 즐거움은 자주 느낄 수 있는 게 아니라고요!!\n#3;hophop\n#3;em;[반짝]"
2600405-26 = "3;시미코;04;……헛.\n#3;stiff"
2600405-27 = "3;시미코;04;또 혼자 신나서 목소리가 커졌네요……\n#3;em;[땀]"
2600405-28 = "3;시미코;01;아, 아무튼! 그래서 선생님도 같이 해주셨으면 해서 이렇게 부탁드린 거에요."
2600405-29 = "3;시미코;02;……괜찮으실까요, 선생님? 이제 와서 묻는 것도 우습지만, 혹시…… 오늘 한가하세요?"
2600405-30 = "3;시미코;04;말씀드리고 나니 뭔가 기껏 불러내서 같이 일 하자는 말처럼 들리긴 하는데……"
2600405-31 = "3;시미코;04;저, 저한테는 일이 아니겠지만 선생님께는 그렇게 느껴 지실 수도……\n#3;em;[땀]"
2600405-32 = "[s3] \"재미있겠는데. 해보자.\"\n[s4] \"보물찾기에 빠질 순 없지!\""
2600405-33 = "3;시미코;02;오오-! 의욕을 내비쳐주시는군요. 역시 선생님이에요! 고맙습니다! 든든해요!\n#3;hophop\n#3;em;[반짝]"
2600405-34 = "3;시미코;02;오오-! 의욕을 내비쳐주시는군요. 역시 선생님이에요! 고맙습니다! 든든해요!\n#3;hophop\n#3;em;[반짝]"
2600405-35 = "3;시미코;01\n#3;greeting\n#wait;400"
2600405-36 = "3;시미코;01\n#3;closeup\n#wait;1000"
2600405-37 = "#na;(시미코는 그렇게 말하며 곧바로 권총같이 생긴 도서검색기를 내밀었다.)"
2600405-38 = "3;시미코;01\n#3;closeup\n#3;d\n#wait;1000"
2600405-39 = "#3;hide\n#na;(그리고는 마치 물 만난 고기처럼, 앞장서서 돌아다니며 책들을 찾아다니기 시작했다.)"
2600405-40 = "#all;hide"
2600405-41 = "#na;(그렇게 온종일 도서관을 뒤지며 찾아낸 책은 천 권도 넘었다. 시미코의 예상 이상이었다.)"
2600405-42 = "#all;hide"
2600405-43 = "3;시미코;01;……\n#3;a\n#3;em;…"
2600405-44 = "3;시미코;02;이건……"
2600405-45 = "3;시미코;04;아무리 그래도 이건 너무 많은 걸요. 중복되는 책들도 많고……\n#3;stiff\n#3;em;[땀]"
2600405-46 = "3;시미코;04;그러면서 정작 기대했던 미지의 책은…… 끝내 없었군요. 전부 본 것들과 아는 것들뿐."
2600405-47 = "3;시미코;99;으음. 아마도 여길 찾아온 학생들이 스스로 들고 온 책을 깜빡해서 두고 갔거나……\n#3;em;…"
2600405-48 = "3;시미코;01;아니면 버리기 곤란한 책들을 은근슬쩍 책장에 꽂아 두고 가버린 그런 느낌이네요."
2600405-49 = "3;시미코;01;……"
2600405-50 = "3;시미코;04;뭔가…… 기대한 것과는 영 다른 걸요.\n#3;em;[속상함]\n#3;stiff"
2600405-51 = "3;시미코;04;하아……"
2600405-52 = "3;시미코;04;죄송해요. 선생님. 보물찾기라고 큰소리 쳐서 부른 주제에, 결국 그냥 노동이었다니.\n#3;greeting"
2600405-53 = "[s5] \"그래도 충분히 재밌었어.\"\n[s6] \"그래도 꽤 뿌듯하지 않아?\""
2600405-54 = "3;시미코;02;에? 저, 정말이요? 그러셨어요?\n#3;em;[?]\n#3;shake"
2600405-55 = "3;시미코;01;에? 저, 정말이요? 그러셨어요?\n#3;em;[?]\n#3;shake"
2600405-56 = "3;시미코;04;어째서……? 결국 하루 종일 책 정리만 하신 거나 다름없는데……"
2600405-57 = "3;시미코;02;네? 보물이라면 이미 찾으셨다고요? 어디요!? 어디서 보셨는데요?\n#3;hophop\n#3;em;[반응]"
2600405-58 = "3;시미코;02;……에?"
2600405-59 = "3;시미코;02;……제…… 표정……?\n#3;stiff"
2600405-60 = "3;시미코;02;들뜬 표정……?\n#3;em;[?!]\n#3;shake"
2600405-61 = "3;시미코;02;……"
2600405-62 = "3;시미코;04;……!!\n#3;stiff\n#3;em;[///]"
2600405-63 = "3;시미코;04;무, 무슨 말씀을 하시는 거예요! 가, 갑자기 이상한 소리 하지 마세요!!"
2600405-64 = "3;시미코;04;아무리 저라도 그런 식으로 말하시면 부끄러운 걸요! 정말……!"
2600405-65 = "3;시미코;04;선생님은 정말……!\n#3;em;…"
2600405-66 = "3;시미코;04;……"
2600405-67 = "3;시미코;99;……후훗. 아하……\n#3;stiff"
2600405-68 = "3;시미코;03;아하하하! 그래요, 그렇다고 하고 넘어가죠.\n#3;em;[재잘]\n#3;shake"
2600405-69 = "3;시미코;01;그래도 그렇게 말씀해 주시니 조금은 마음이 편해지는 거 같네요. 고마워요. 선생님."
2600405-70 = "3;시미코;99;……게다가……"
2600405-71 = "3;시미코;02;가만히 생각해 보니, 저도 이제 막 보물 하나를 찾은 거 같거든요.\n#3;em;[반짝]"
2600405-72 = "3;시미코;01;……정말로 좋은 것을 찾았답니다."
2600405-73 = "3;시미코;03;그게 뭐냐구요? 후훗."
2600405-74 = "3;시미코;01;……비밀이에요.\n#3;greeting\n#3;em;[하트]"
2600405-75 = "#all;hide"
2600405-76 = "#na;(그렇게 말한 시미코는 평소와 같은 분위기로 돌아가 찾아낸 책들을 정리하기 시작했다.)"
2600405-77 = "#na;(남은 시간동안 시미코 옆에서 책들의 정리를 모두 도운 후, 도서관을 빠져나왔다.)"

[translation]
10008045-2 = "แฮ่ก... แฮ่ก..."
10008045-3 = "ฮู่ว..."
10008045-4 = "ไม่นะ ไม่นะ ไม่ได้นะ...!! แบบนี้มันไม่แปลกไปหน่อยรึไง?!"
10008045-5 = "เจ้าพวกนี้โผล่มาจากไหนกันอีกเนี่ย?! ทำไมถึงโผล่มาขัดขวางเหมือนกับกำลังรออยู่เลยล่ะ?!"
10008045-6 = "ตั้งแต่เมื่อกี้นี้แล้วนะ ทำไมถึงโผล่มารวมกันแบบนี้ได้ หรือเป็นเอฟเฟกต์ลับของตู้บริจาคกัน? มีใครเอาน้ำผึ้งไปทาไว้ที่ตู้บริจาคโดยที่ฉันไม่รู้รึไง?"
10008045-7 = "ไม่ใช่การไล่จับด้วงกว่างโกลเด้นเฮอร์คิวลิสสักหน่อยนะ..."
10008045-8 = "[s] \"ดูเหมือนทุกคนเล็งตู้บริจาคไว้กันหมดเลยแฮะ...\""
10008045-9 = "แต่เจ้านักเลงพวกนั้นรู้ได้ยังไงว่าตู้บริจาคถูกขโมยไปน่ะ?"
10008045-10 = "เหมือนกับดูมาจากข่าวที่ไหนเลย..."
10008045-12 = "ข่าว...? อ๊ะ หรือว่า...?!"
10008045-13 = "หืม? มีอะไรเหรอ? เด็กพาร์ทไทม์?"
10008045-14 = "เดี๋ยวก่อนนะ... งานเทศกาลครั้งนี้มีเด็กจากโครโนสมาทำข่าวเรื่องงานเทศกาลปีใหม่ด้วย..."
10008045-15 = "พอมาลองคิดๆ ดูแล้ว..."
10008045-20 = "จริงๆ ด้วย!"
10008045-21 = "มีข่าวด่วนว่อนในโซเชียลเต็มไปหมดเลย!!"
10008045-25 = "ถ้างั้นก็... อาดิโอสสสส! เพื่อความยุติธรรม!"
10008045-30 = "วิดีโอที่ได้ดูเมื่อครู่นี้คือภาพเหตุการณ์ขโมยตู้บริจาคที่เกิดขึ้นที่สถานที่จัดงานเทศกาลปีใหม่ <ไดคิจิเดน> สดๆ ร้อนๆ เลยค่ะ!"
10008045-31 = "กลุ่มวายร้ายที่ถูกออกหมายจับอยู่ได้ขโมยตู้บริจาคและหลบหนีไปแล้วค่ะ! สุดท้าย! ใครจะได้เป็น#nผู้ครอบครองตู้บริจาคนี้กันแน่!"
10008045-32 = "ถ้างั้นตอนนี้พวกเราจะกลับไปสัมภาษณ์ผู้ดูแลงานเทศกาล <ไดคิจิเดน> กันอีกครั้งนะคะ!"
10008045-34 = "ยกโทษให้ไม่ได้...!!"
10008045-35 = "เงินกำไรตลอดหนึ่งปีของพวกเราถูกอาชญากรอย่างเจ้าพวกนั้นชิงไป..."
10008045-36 = "ฮึ่ม! ไม่สิ... ตู้บริจาคที่อัดแน่นไปด้วยคำอธิษฐานของผู้คนไว้ถูกแย่งไปงั้นเหรอ..."
10008045-37 = "ถูกปล้นตั้งแต่วันปีใหม่แบบนี้... ยังไงก็ต้องเอาคืนมาให้ได้!! "
10008045-38 = "สำหรับพวกเราตู้บริจาคไม่ใช่สิ่งสำคัญที่สุดสักหน่อย"
10008045-39 = "ถ้าจับพวกไคเทนเจอร์ได้... "
10008045-40 = "เราจะมอบเงินทั้งหมดในตู้บริจาคให้กับคนที่จับเจ้าพวกนั้นได้!!"
10008045-45 = "ค่ะ ทุกคน ดูอยู่หรือเปล่าคะ? การไล่ล่าที่น่าตื่นเต้นตั้งแต่วันแรกของปีใหม่! การแข่งขันที่เดิมพัน#nด้วยเงินรางวัลระดับ 8 หลัก!"
10008045-46 = "โอกาสดีที่จะได้เงินบริจาคมหาศาลมาใช้ได้ตามที่ต้องการแล้วค่ะ! "
10008045-47 = "แบบนี้ไม่เป็นไรแน่เหรอคะ? จะไม่ถูกสวรรค์ลงโทษใช่มั้ยคะ? แต่ก็นะ... ช่างเรื่องนั้นเถอะค่ะ! "
10008045-48 = "พวกเราชมรมนักข่าว โรงเรียนโครโนสแค่นำเสนอความจริงอย่างตรงไปตรงมาก็เท่านั้นเองค่ะ!"
10008045-52 = "สกู๊ปข่าวเด็ดแบบนี้ไว้ใจพวกเราได้เลย!"
10008045-53 = "ค่า~! ดังนั้นทุกคนห้ามพลาดการแข่งขันครั้งนี้เด็ดขาดเลยนะคะ!!"
10008045-54 = "ตอนนี้ตู้บริจาคอยู่ที่ไหนกันแน่!"
10008045-55 = "ถ้าต้องการติดตามข่าวที่น่าสนใจนี้อย่างใกล้ชิด อย่าลืมกดติดตามแชนแนลของสำนักข่าวโครโนสนะคะ"
10008045-56 = "เพียงกดไลก์ กดติดตามช่องของเรา พวกเราก็พร้อมรายงานข่าวเสมอค่ะ!"
10008045-59 = "ทำบ้าอะไรเนี่ย!!!"
10008045-60 = "แบบนี้เองสินะ... เพราะงั้นเจ้าพวกนี้ถึงได้แห่กันมาสินะ... "
10008045-61 = "อ่ะฮะฮะ~!"
10008045-62 = "งั้นแสดงว่าเจ้าพวกนี้ก็จะแห่กันมาเรื่อยๆ สินะ? หืม?"
10008045-64 = "เฮ้อ... เรื่องมันเลยเถิดไปใหญ่แล้ว แต่ก็ช่างมันเถอะ ถ้าเป็นแบบนั้นจริงละก็... หมายความว่าก็จะหา#nเงินได้เพิ่มสินะ"
10008045-68 = "ไหนๆ ก็เป็นแบบนี้แล้ว ก็ขอเรียกกำลังเสริมมาแล้วกัน!"
10008045-72 = "มะ...ไม่นะ!!"
10008045-73 = "หืม...?"
10008045-74 = "ทำไมล่ะ อารุจัง? ยิ่งมีคนเยอะก็ยิ่งดีไม่ใช่เหรอ? หรือว่าไม่อยากแบ่งงั้นเหรอ?"
10008045-78 = "ตู้บริจาคน่ะจะต้องเอากลับไปไว้ที่เดิม "
10008045-79 = "การนำเงินในตู้บริจาคไปใช้เพื่อตัวเอง... แม้จะใช้ไปแค่เหรียญเดียว ก็เป็นเรื่องที่ยกโทษให้ไม่ได้เด็ดขาด!"
10008045-81 = "...?!"
10008045-82 = "ว่าไงนะ?!"
10008045-83 = "ทำไมล่ะ? ผู้ดูแลงานเทศกาลอนุญาตแล้วนี่นา"
10008045-85 = "ฮุฮุ หัวหน้ามุสึกิ"
10008045-86 = "ถ้าพวกเราเคลื่อนไหวด้วยเหตุผลเล็กน้อยแค่นั้น คิดว่าหน่วยรับจ้างสารพัดของเราจะเป็นยังไง?"
10008045-87 = "พวกเราก็จะกลายเป็นพวกปลาซิวปลาสร้อยที่ไร้เกียรติ และไร้ราศีไปน่ะสิ เรื่องนั้นฉันยอมรับไม่ได้หรอก"
10008045-88 = "อีกอย่าง... แค่งานเล็กๆ แบบนี้ยังแก้ไขเองไม่ได้ แล้วจะขอความช่วยเหลือจากคนนอกงั้นเหรอ?"
10008045-89 = "แบบนั้นมันไม่สมเหตุสมผลเลย! ยกโทษให้ไม่ได้! เรื่องคราวนี้พวกเราต้องแก้ไขด้วยตัวพวกเราเอง...!"
10008045-90 = "เรื่องนี้ฉันตัดสินใจแล้ว จะไม่พูดซ้ำอีกแล้วนะ"
10008045-95 = "เฮ้อ... ถ้าประธานตัดสินใจแบบนั้น ฉันก็จะทำตาม "
10008045-96 = "นะ...นั่นเป็นการตัดสินใจแบบจอมวายร้ายเหรอคะ? "
10008045-97 = "ก็ไม่ค่อยจะเข้าใจเท่าไรหรอกนะ"
10008045-98 = "แต่ถ้าอารุจังต้องการแบบนั้น ฉันก็จะทำตาม"
10008045-100 = "จู่ๆ ก็สรุปแบบนี้เหรอ ใช้ได้เลยนี่นา ประธานของพวกเธอน่ะ"
10008045-101 = "ฉันไม่คิดเลยนะว่าพวกเธอจะมีปณิธานแรงกล้าแบบนั้น... ประมาทพวกเธอไม่ได้จริงๆ"
10008045-102 = "ถ้าพูดแบบนั้น ฉันจะทำตามก็แล้วกัน"
10008045-103 = "ฉันเองก็เหมือนกัน ถ้าเอาเงินที่ไม่ใช่เงินทำงานพาร์ทไทม์ไป คนอื่นๆ ก็คงไม่พอใจเหมือนกัน อีกอย่างมันเป็นเงินบริจาคจากการขอพรปีใหม่ด้วย ฉันคงไม่สบายใจเท่าไรหรอก"
10008045-104 = "ฉันจะไม่ส่งข้อความ MOMOTALK ไปแล้วกัน... ถึงยังไงปีใหม่แบบนี้พวกรุ่นพี่ก็น่าจะนอนหลับกันอยู่ ช่างเถอะ พวกเราจัดการกันเองก็แล้วกัน!"
10008045-105 = "[s] \"ถ้างั้นก็ไล่ตามพวกไคเทนเจอร์กันต่อเถอะ!\""
10008045-109 = "ถ้ามีสิ่งไม่ดีหรือลางร้ายทำให้กล่องบริจาคเงินมัวหมองก่อนความปรารถนาจะสำเร็จ..."
10008045-111 = "ถ้ามีสิ่งไม่ดีหรือลางร้ายทำให้กล่องบริจาคเงินมัวหมอง... "
10008045-113 = "ถ้ามีสิ่งไม่ดีหรือลางร้ายทำให้มัวหมอง... "
10008045-114 = "(ถ้าบอกให้พาคนมาที่นี่อีก ก็อาจทำให้สิ่งไม่ดีทำให้ตู้บริจาคมัวหมองก็ได้...!)"
10008045-115 = "ระ...เร็วเข้า! ไล่ตามไป!!"

[translation]
10008045-2 = "哈啊，哈啊，哈啊……"
10008045-3 = "呼……"
10008045-4 = "不對不對不對！！這個情況是怎麼回事，再怎麼說也太奇怪了吧！？"
10008045-5 = "到底是從哪裡冒出來的啊，簡直就像廚房裡的那個一樣……！！"
10008045-6 = "真是的，賽錢箱上是塗了蜂蜜嗎……？"
10008045-7 = "又不是獨角仙……"
10008045-8 = "[s]「大家好像都盯上賽錢箱了……」"
10008045-9 = "嗯。不過我好奇的是，#n為什麼大家都知道「賽錢箱被偷了」這件事……"
10008045-10 = "情報流傳得太快了，簡直就像被大肆報導過一樣……"
10008045-12 = "……啊，難道說！？"
10008045-13 = "嗯？怎麼了嗎打工醬？"
10008045-14 = "等我一下……我記得今天好像有克洛盧斯新聞部的人會來……"
10008045-15 = "說不定就是從那裡……"
10008045-20 = "……果然沒錯！"
10008045-21 = "社群網站上有情報！"
10008045-25 = "那麼，Adios！"
10008045-30 = "各位觀眾都看見了嗎！？#n剛才各位看到的，就是發生在「大吉殿」會場的賽錢箱搶奪事件的情況！"
10008045-31 = "凶惡的懸賞通緝犯「凱坦澤」目前正帶著賽錢箱逃跑！"
10008045-32 = "至於賽錢箱的詳細狀況，請再看一次「大吉殿」負責人的訪問！"
10008045-34 = "不可原諒……"
10008045-35 = "竟然把我們的賽錢箱……！"
10008045-36 = "裡面的錢固然重要，但更重要的是那個賽錢箱上乘載了大家的願望啊！"
10008045-37 = "不能就這樣放任不管……！"
10008045-38 = "最最重要的是匯聚願望的賽錢箱本身！"
10008045-39 = "因此，如果有人能抓住那個凱坦澤……"
10008045-40 = "我就把賽錢箱裡的所有錢都給他！"
10008045-45 = "各位看到了嗎？儘管似乎有些不太謹慎，所謂「棄車保帥」指的就是這種情況嗎！？這場從元旦開始的追擊戰，在新年競爭預估價值8位數的賽錢箱大爭奪戰！"
10008045-46 = "參賽者不需要任何資格，某種意義上來說對任何人都是平等的機會！"
10008045-47 = "感覺似乎會遭到非常嚴厲的天罰……這部分還請各位自行負責！"
10008045-48 = "我們克洛盧斯學園新聞部，只是在傳達事實而已！"
10008045-52 = "大過年就獲得了不錯的獨家新聞呢！"
10008045-53 = "那麼那麼，願意自己承擔天譴的各位，請盡情參加這場慾望的比賽吧！"
10008045-54 = "賽錢箱究竟會獎落誰家呢！？"
10008045-55 = "在意後續的觀眾，請務必訂閱克洛盧斯新聞部的頻道！"
10008045-56 = "並且按讚、開啟小鈴鐺哦！真相與事實，隨時都在各位身邊！"
10008045-59 = "他都做了什麼好事啊啊啊啊啊！？！？"
10008045-60 = "原來是這麼回事……所以才會這樣吵吵鬧鬧的。"
10008045-61 = "啊哈～"
10008045-62 = "看來還會越來越嚴重呢？"
10008045-64 = "事情好像越變越奇怪了……"
10008045-68 = "既然如此就請求支援……！"
10008045-72 = "先等一下！！"
10008045-73 = "……咦？"
10008045-74 = "怎麼啦亞瑠醬？願意幫忙的人變多不好嗎？#n難道是因為不想讓拿到的錢變少？"
10008045-78 = "我們要奪回賽錢箱，並且保持原樣放回原位。"
10008045-79 = "連同賽錢箱裡的錢一起！！"
10008045-81 = "……！？"
10008045-82 = "……"
10008045-83 = "那又是為什麼？負責人明明都特別說可以的！"
10008045-85 = "……呵呵，聽好了無月室長。"
10008045-86 = "如果我們因為那種無聊的理由採取行動，「便利屋68」的印象會變成什麼德行？"
10008045-87 = "只會落得跟那些既沒風格又沒品格，就連尊嚴都沒有的三流人物一樣。#n這種事情我無法容許。"
10008045-88 = "況且，我們連這點小事都解決不了，得向外人求助什麼的……"
10008045-89 = "簡直是要讓我們便利屋的名聲掃地！這件事就由我們親手解決！"
10008045-90 = "這是社長命令，沒有轉圜的餘地。"
10008045-95 = "……既然是社長命令就沒辦法了。"
10008045-96 = "這，這就是冷硬派嗎……？"
10008045-97 = "好吧，"
10008045-98 = "既然亞瑠醬覺得可以，就這麼做吧。"
10008045-100 = "……居然在這種時候這麼講道理。挺有一套的嘛，你們的社長。"
10008045-101 = "而且這樣很帥，也沒什麼不好吧？"
10008045-102 = "……嗯，我也加入。"
10008045-103 = "反正我也不能把蘊含大家新年願望的香油錢據為己有……#n總之，只要能拿到打工的錢就好了。"
10008045-104 = "我猜前輩們應該還在睡新年的大頭覺，八成不會因為剛才的一則訊息就醒來……#n好，就由我們速速解決吧！"
10008045-105 = "[s]「嗯。那麼繼續追上去吧！」"
10008045-109 = "如果沾染「汙穢」的話……？"
10008045-111 = "沾染「汙穢」的話……？"
10008045-113 = "「汙穢」的話……？"
10008045-114 = "（總，總之，得趕在這場騷動造成更多汙穢之前……！）"
10008045-115 = "動，動作快！馬上開始追擊吧！！"

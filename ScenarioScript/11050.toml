[translation]
11050-2 = "Episode 5;A Day in the Life of Serika"
11050-3 = "Abydos Residential Area, 45th Block District"
11050-6 = "I spotted a familiar face while walking through the neighborhood near Abydos."
11050-7 = "Ugh. It's you again."
11050-8 = "[s] \"Good morning.\""
11050-9 = "Good morning! Wait, no! Don't act like we're friends!"
11050-10 = "You've yet to earn my trust."
11050-11 = "Don't you have anything better to do than loiter around so early in the morning? And you call yourself an adult..."
11050-12 = "[s] \"Heading to school, Serika?\""
11050-13 = "What's with you?! Stop acting like you know me!"
11050-14 = "What I do is none of your business."
11050-15 = "Look at you hanging around with nothing better to do. I hope I never grow up to be as aimless as you."
11050-16 = "Why don't you buzz off and bother someone else? I'm busy."
11050-17 = "What? You want to walk to school together?"
11050-18 = "Why on earth should I go with you?"
11050-19 = "Besides, it's our day off. I don't have any class today."
11050-20 = "Huh? Then where am I going? And why would I tell you that?"
11050-21 = "I'm outta here. Bye!"
11050-23 = "Serika ran away, kicking up a trail of dust behind her."
11050-24 = "[s] Follow her."
11050-26 = "Huh? Why are you following me?!"
11050-27 = "You wanna know where I'm going?"
11050-28 = "What are you talking about? Go away, you stalker!"
11050-29 = "Ugh! Fine! I'll just tell you."
11050-30 = "I'm going to my part-time job."
11050-31 = "I don't have the freedom to just slack off all day like you do. I have money to make."
11050-32 = "There, happy now? So stop following me!"
11050-34 = "[s] Follow her."
11050-37 = "Ugh. So persistent."
11050-38 = "What? Where do I work?"
11050-39 = "Would you go away already, you idiot?! You're cruising for a bruising if you don't leave me alone."
11050-41 = "Serika ran away, kicking up a trail of dust behind her."
11050-43 = "Welcome to Shiba Seki Ramen!"
11050-44 = "How many are in your party? I'll show you to your seats."
11050-45 = "Just a minute! Extra noodles for table three!"
11050-46 = "(door opens)"
11050-47 = "Welcome to Shiba Seki..."
11050-48 = "What the...?!"
11050-49 = "Hello! Table for five! ☆"
11050-50 = "Haha. Hello, Serika..."
11050-51 = "Hey."
11050-52 = "What are you guys doing here?"
11050-53 = "Heh! We knew you'd be here."
11050-54 = "[s] \"Hi.\""
11050-55 = "Sensei is with you too...? I knew you were stalking me!"
11050-56 = "Heh. Don't blame Sensei. We figured this was the only place you might work, so we just came by."
11050-57 = "So it was you, Hoshino? Ugh."
11050-59 = "Are these your Abydos classmates, Serika? Stop with the chit-chat and take their order."
11050-60 = "Y-Yes, sir. Follow me. I'll take you to your table."
11050-62 = "Okay! Over here, Sensei! Sit next to me!"
11050-63 = "Um... Or you can sit here if you want."
11050-64 = "[s1] Sit next to Nonomi.\n[s2] Sit next to Shiroko."
11050-65 = "(scooch)"
11050-66 = "It's a bit tight, but you're okay, right?"
11050-67 = "Huh? Are you uncomfortable? Would you rather sit on my lap?"
11050-68 = "What are you doing in public?!"
11050-69 = "Haha! I'm just joking, Serika. ☆"
11050-70 = "There's enough seats for each of you, so just sit down like NORMAL people!"
11050-71 = "Haha. Okay, okay."
11050-73 = "(scooch)"
11050-74 = "Um..."
11050-75 = "There's no space! Sitting that close can't possibly be comfortable for Sensei. Scooch over a little."
11050-76 = "No, it should be fine. Right, Sensei?"
11050-77 = "There are plenty of seats! Can't you all just sit like NORMAL people?"
11050-78 = "Hmm..."
11050-81 = "Your uniform is adorable, Serika! ☆"
11050-82 = "I didn't know you were into this kind of stuff. Chose to work here solely based on the uniform, did ya?"
11050-83 = "Wh-What are you talking about? It had nothing to do with that!#nI just used to be a regular here, that's all..."
11050-84 = "I bet I could fetch a pretty yen if I sold pictures of you in that uniform, Serika. What do you say, Sensei? Wanna be my first customer?"
11050-85 = "Knock it off, Hoshino..."
11050-86 = "So, how long have you been working here?"
11050-87 = "Maybe about a week."
11050-88 = "Now I get why you were running off from time to time.#nI guess it was because you were working. ☆"
11050-89 = "Would you all shut up already and place an order?!"
11050-90 = "I think what you meant was, \"May I take your order?\" Right, Serika?#nWe're customers here after all."
11050-91 = "Ugh... May I take your order?"
11050-92 = "I'll have the chashu ramen, please!"
11050-93 = "One shio ramen."
11050-94 = "Hmm... I'd like the miso ramen."
11050-95 = "I want the special miso! With extra grilled chashu!"
11050-96 = "Order whatever you want, Sensei. Shiba Seki Ramen is one of the best remaining restaurants in Abydos!"
11050-97 = "Did you all bring your own money? You're not just going to make Nonomi pay again, are you?"
11050-98 = "It's not like I mind. I'm still way under my card's credit limit. ☆"
11050-99 = "Nah, we can't make you do that. Sensei is going to pick the tab up today! Right?"
11050-100 = "What? No one told you? Hahaha! Well, now you know!"
11050-101 = "[s] Run away."
11050-102 = "Where do you think YOU'RE going?"
11050-103 = "Hoshino made catching up to me look easy."
11050-105 = "You've got credit to burn, right? This is our chance to make use of it."
11050-106 = "You can't force Sensei to pay. We only came because you said it was your treat, Hoshino."
11050-107 = "This is a perfect chance for Sensei to treat us. Opportunities like this don't come around every day."
11050-108 = "..."
11050-112 = "Psst. Here, Sensei. Just pay with this card."
11050-113 = "Huh? Are you sure you don't want to? But..."
11050-115 = "I ended up paying for everyone's meals."
11050-116 = "That was delicious, Sensei!"
11050-117 = "Thank you for treating us."
11050-118 = "Thanks for the meal."
11050-119 = "Would you all get out of here already?! And never come back!#nYou're nothing but a bunch of busybodies."
11050-120 = "Hahaha! See you tomorrow, Serika!"
11050-121 = "I hate you! I won't forget this!"
11050-122 = "Hahaha! She's got a lot of spunk, eh?"
11050-123 = "[s] Take your leave."
11050-126 = "(closes door)"
11050-127 = "Phew. It's finally over. What a busy day."
11050-128 = "I can't believe all of them showed up like that. And they were so loud."
11050-129 = "Did they really have to come all the way out here to blabber on like that? \"Sensei! Sensei!\" Ugh. They're so annoying."
11050-130 = "Damn you, Hoshino! She probably planned to bring Sensei here after what happened yesterday."
11050-131 = "Hmph. You think I'm going to fall for it that easily? Yeah, right..."
11050-136 = "..."
11050-137 = "Is that her?"
11050-138 = "Yeah. She's from Abydos' Foreclosure Task Force."
11050-139 = "Get ready. We'll nab her at the next block."
11050-142 = "..."
11050-143 = "Hmm..."
11050-144 = "This neighborhood gets emptier by the day. There used to be a lot more people."
11050-145 = "And it's becoming less safe too..."
11050-146 = "No. We gotta stay strong. It's up to us to bring the school back from this crisis."
11050-147 = "I can pay off more of the debt once I get my paycheck, and then..."
11050-152 = "...?!"
11050-153 = "Who are you?!"
11050-154 = "Are you Kuromi Serika?"
11050-155 = "The Kata-Kata Helmet Gang? You have a lot of nerve coming back here!"
11050-156 = "Actually, I'm glad you're here. I've been in a bad mood today.#nI'll make you regret ever showing your faces here again!"
11050-157 = "*pop* *pop* *pop* *pop* *tat*!"
11050-158 = "H-Huh?!"
11050-159 = "(From behind too? It's an ambush.)"
11050-160 = "Get her."
11050-161 = "*pow*"
11050-162 = "*booooom*"
11050-163 = "*cough* *cough*"
11050-164 = "(An anti-aircraft gun? No... That sounded like an improved Flak 41 model.)"
11050-165 = "(Fire support? Where are they...? Not good.)"
11050-166 = "(They aren't messing around this time. This is dangerous...)"
11050-167 = "(I'm...losing consciousness...)"
11050-168 = "(...)"
11050-170 = "(flop)"
11050-172 = "..."
11050-173 = "Should we thrash her some more?"
11050-174 = "Nah, that's enough. Throw her in the car and take her to the rendezvous point."
11050-177 = "*vroom*"
11050-179 = "Next Episode; Rescue Mission!"

[translation]
11050-2 = "第5話;茜香平凡的一天"
11050-3 = "阿拜多斯住宅區．45街區地區"
11050-6 = "（在阿拜多斯住宅區遇見了熟悉的面孔）"
11050-7 = "呃……怎，怎麼了……！？"
11050-8 = "[s]「早安。」"
11050-9 = "早，早什麼早啦！可以不要跟我裝熟嗎？"
11050-10 = "我可還沒有認可老師你哦？"
11050-11 = "3;茜香;05;真是的，從早上就一直悠悠哉哉地閒晃。 #n真是好命的大人。"
11050-12 = "[s] 「茜香醬現在要去學校嗎？」"
11050-13 = "什，什麼啦！你憑什麼叫得那麼親密！"
11050-14 = "不管我要做什麼，都跟老師沒關係吧？"
11050-15 = "3;茜香;01;一早就在這種地方閒晃，會被當作廢柴大人的範本哦？"
11050-16 = "再見！你就繼續盡情享受這份悠閒吧，我可是很忙的。"
11050-17 = "咦？要去學校的話就一起走？"
11050-18 = "我為什麼要和你開心地一起去學校啊？"
11050-19 = "而且很抱歉，今天是彈性上學，所以可以不用去學校好嗎？"
11050-20 = "嗯？那我要去哪裡？#n……你覺得我會一一向你交代嗎？"
11050-21 = "3;茜香;12;再見，掰掰。"
11050-23 = "（茜香跑著離開，揚起了灰塵）"
11050-24 = "[s] 追上去"
11050-26 = "呀啊！？你，你為什麼要跟著我啊！？"
11050-27 = "跟上來就能知道我要去哪裡了……？"
11050-28 = "少胡說八道了！#n還不趕快走開！你是跟蹤狂嗎！！"
11050-29 = "……知道了知道了！我告訴你總行了吧？"
11050-30 = "3;茜香;11;……打工啦。"
11050-31 = "我，我可不像你這麼好命，天天只知道玩。#n不管是多是少，我都得盡可能賺錢才行！"
11050-32 = "這樣可以了吧？別再跟過來了！"
11050-34 = "[s] 追上去"
11050-37 = "唔……真煩人。"
11050-38 = "……咦？你想知道我在哪裡打工？"
11050-39 = "啊啊，真是的！莫名其妙！#n走開啦廢柴大人！趕快滾開！不然宰了你喔！？"
11050-41 = "（茜香跑著離開，揚起了灰塵）"
11050-43 = "歡迎光臨柴關拉麵店！"
11050-44 = "請問幾位？#n我來為您帶位！"
11050-45 = "好的，請稍等！3號桌要加麵！"
11050-46 = "（喀啦啦）"
11050-47 = "3;알바茜香;03;歡迎光臨！柴關拉麵…… "
11050-48 = "3;알바茜香;04;哇啊！？"
11050-49 = "那個～☆我們有5個人～！"
11050-50 = "啊，啊哈哈……茜香醬，辛苦了……"
11050-51 = "辛苦了。"
11050-52 = "大，大家……為什麼會知道這裡……！？"
11050-53 = "唔嘿～果然在這裡啊。"
11050-54 = "[s]「嗨。」"
11050-55 = "5;알바茜香;11;連，連老師也……果然是跟蹤狂嗎！？"
11050-56 = "唔嘿，老師是無辜的唷～茜香醬能打工的地方也就只有這裡了不是嗎？#n所以我們才會過來看看。"
11050-57 = "5;알바茜香;02;是星野前輩嗎……！！嗚嗚……！"
11050-59 = "是阿拜多斯的學生啊。#n茜香醬，有話待會再說，先幫客人點餐吧。"
11050-60 = "啊，嗚嗚……是，老闆。#n各位，我帶你們到大桌去……請往這邊……"
11050-62 = "來，老師請來這邊吧！我旁邊有空位哦！"
11050-63 = "……嗯，我旁邊也是空的。"
11050-64 = "[s1] 坐在野乃美旁邊\n[s2] 坐在白子旁邊"
11050-65 = "（咚）"
11050-66 = "嗯嗯，有點擠，沒關係吧？"
11050-67 = "嗯？不舒服嗎？要不要坐在我的腿上？"
11050-68 = "工讀生茜香;你們在人家店裡幹什麼啦！"
11050-69 = "啊哈哈，開玩笑的啦，茜香醬☆"
11050-70 = "這裡位子不是很多嗎！所有人都坐好！"
11050-71 = "啊，啊哈哈……好的。"
11050-73 = "（咚）"
11050-74 = "呼呣……"
11050-75 = "太擠了吧！白子前輩，貼得那麼緊老師會不舒服，過來一點啦！"
11050-76 = "不，我沒問題。對吧老師？"
11050-77 = "有什麼好讓來讓去的！？這裡位子很多！所有人都坐好！"
11050-78 = "……好吧。"
11050-81 = "茜香醬，你打工的制服超可愛的呢☆"
11050-82 = "哎呀～沒想到茜香醬原來有這種興趣啊。#n是看制服決定在哪裡打工的類型？"
11050-83 = "才才才不是咧！#n我，我只是因為很常來這間店才會……"
11050-84 = "把茜香穿著打工制服的樣子拍下來，一定可以賣個好價錢吧～#n怎麼樣？老師要不要買一張呀？"
11050-85 = "請不要經營奇怪的副業，前輩……"
11050-86 = "你什麼時候開始打工的？"
11050-87 = "從，從一週前開始……"
11050-88 = "原來如此☆有時候會偷偷消失是因為要去打工啊！"
11050-89 = "先，先別說這些了！你們要吃什麼！"
11050-90 = "應該是「請問要點什麼」才對吧？#n茜香醬～要用親切的笑容接待客人才行唷？"
11050-91 = "啊嗚嗚……請，請問要點什麼……"
11050-92 = "我要叉燒麵！"
11050-93 = "我要鹽味拉麵。"
11050-94 = "嗯……我要味噌拉麵……"
11050-95 = "我要特製味噌拉麵！再追加炙燒叉燒！"
11050-96 = "老師也不用客氣，盡量點吧。#n這間阿拜多斯的名店「柴關拉麵」非常好吃唷～！"
11050-97 = "……話說回來，大家有錢嗎？該不會又要讓野乃美前輩請客吧？"
11050-98 = "嗯？我不介意的唷☆這張卡距離上限額度還綽綽有餘。"
11050-99 = "不行不行，不能再讓野乃美醬請客了～#n我相信老師一定會買單的……對吧老師？"
11050-100 = "……咦？沒聽說過這種事？啊哈哈，那你現在聽到了！"
11050-101 = "[s] 逃跑"
11050-102 = "不會讓你逃走的哦～"
11050-103 = "（被抓到了）"
11050-105 = "唔嘿～你不是有大人的卡片嗎。#n現在就是它派上用場的時候了～！"
11050-106 = "大人的卡片不應該用在這種地方吧……#n前輩一開始就打算這麼做，所以才會找我們來吃飯吧。"
11050-107 = "這可是難得能請可愛學生吃飯的大好機會哦？"
11050-108 = "……"
11050-112 = "（低語）請偷偷用這個結帳吧，老師。"
11050-113 = "嗯……？你說沒關係？可是……"
11050-115 = "（結果請了所有人吃飯）"
11050-116 = "哎呀～！多謝招待～老師！"
11050-117 = "謝謝老師招待。"
11050-118 = "嗯，託你的福吃得好飽。"
11050-119 = "吃完了就快點出去！不要再來了！#n這樣會妨礙營業！"
11050-120 = "啊，啊哈哈……茜香醬，明天見。"
11050-121 = "有夠討厭！！都去死一死啦──！！"
11050-122 = "啊哈哈，這麼有精神真是太好了～"
11050-123 = "[s] 回去"
11050-126 = "（辛苦了──！）"
11050-127 = "唉……終於結束了。#n真是有夠忙碌的一天。"
11050-128 = "大家居然會一起過來……而且還吵個不停。"
11050-129 = "我明明在工作，大家卻各種獻殷勤，老師老師的叫個不停。#n真受不了，到底什麼意思。"
11050-130 = "星野前輩一定是因為昨天的事才會故意帶老師來的吧！"
11050-131 = "……別開玩笑了。#n以為我會這麼容易乖乖聽話就大錯特錯了。"
11050-136 = "……"
11050-137 = "是那傢伙嗎？"
11050-138 = "……沒錯。他是阿拜多斯對策委員會的成員。"
11050-139 = "準備好了嗎？#n在下一個街區圍捕他。"
11050-142 = "……"
11050-143 = "5;茜香;01;呼……"
11050-144 = "……話說這附近來往的人也少了很多啊。#n以前明明不至於這樣的說。"
11050-145 = "治安感覺也越來越糟了……"
11050-146 = "這樣下去不行。#n我們必須加把勁……努力重振學校……"
11050-147 = "拿到薪水之後就先拿來補貼貸款的利息……"
11050-152 = "……！？"
11050-153 = "你們幾個想做什麼。"
11050-154 = "是黑見茜香……沒錯吧？"
11050-155 = "……硬梆梆頭盔團？#n你們這些傢伙還敢在這條街上大搖大擺的啊？"
11050-156 = "正好我現在心情差得很。#n我要讓你們再也不敢踏進這條街……！！"
11050-157 = "（噠噠噠噠噠噠噠噠！！）"
11050-158 = "咦！？"
11050-159 = "（後面也有敵人！？這些傢伙一開始就是衝著我來的……）"
11050-160 = "抓住他。"
11050-161 = "（噗咻──！！）"
11050-162 = "（咚咚咚咚咚──！！！）"
11050-163 = "3;茜香;04;咳咳，咳咳……"
11050-164 = "（高射炮……？不……爆炸聲聽起來好像是Flak41改良型……？）"
11050-165 = "（火力支援？是從哪裡……？不，不對，這是……該不會……）"
11050-166 = "3;茜香;04;（這，這些傢伙，不是鬧著玩的……不妙……）"
11050-167 = "3;茜香;04;（意識……）"
11050-168 = "（……）"
11050-170 = "（砰咚）"
11050-172 = "……"
11050-173 = "要再多打幾下嗎？"
11050-174 = "不，可不能殺了他，這樣就夠了。#n把他帶上車，載到會合地點。"
11050-177 = "（嗡──）"
11050-179 = "下一話;解救作戰！"

[translation]
84303301000-5 = "ขอบคุณนะคะ... เกือบต้องสูญเสียเกมที่พวกเราทุ่มเทสร้างกันมาแล้วค่ะ..."
84303301000-6 = "ทะ... ทำไมถึงเป็นอย่างนี้นะ... เมื่อวานทุกคนยังพอใจกับเกมของเราอยู่เลยนี่นา...!"
84303301000-7 = "เกมมันก็เป็นเหมือนเดิม... แล้วยูสึก็บอกว่าไม่เห็นโค้ดอะไรที่แปลกออกไปด้วย..."
84303301000-9 = "ต้องมีพลังแห่งความเสื่อมโทรมปนมาด้วยแน่นอนค่ะ แต่ว่าคุณโจรที่มาช่วยพวกเราก็ช่วยคลี่คลายให้#nได้ค่ะ!"
84303301000-10 = "คุณเซอาไม่ได้ถูกพลังแห่งความโกรธากลืนกินไปค่ะ! บางทีคุณเซอาอาจจะรู้คำตอบก็ได้นะคะ!"
84303301000-15 = "จริงเหรอ...!!?"
84303301000-16 = "ไม่ได้เป็นอะไร... ใช่มั้ยคะ??"
84303301000-17 = "ตะ... แต่เดี๋ยวก่อนนะ... อาริสึจัง? คนนี้คือ..."
84303301000-19 = "อ๊ะ ขอโทษด้วยค่ะ ฉันแนะนำตัวช้าไปสินะคะ"
84303301000-20 = "ฉันชื่อยูริโซโนะ เซอา จากสภาน้ำชาแห่งโรงเรียนสามัญทรีนิตี้ค่ะ ฉันมาเป็นผู้นำและดูแลเพื่อนๆ นักเรียนจากทรีนิตี้ที่มาเข้าร่วมงานเอ็กซ์โปครั้งนี้..."
84303301000-21 = "เรื่องที่เกิดขึ้นจึงเป็นทั้งงานของพวกคุณและงานของฉันด้วยค่ะ เพราะงั้นไม่ต้องใส่ใจฉันก็ได้ค่ะ"
84303301000-22 = "ฉันต้องขอโทษมากกว่าค่ะที่เพื่อนนักเรียนของฉันเกือบไปทำลายผลงานที่ล้ำค่าของทุกคน"
84303301000-27 = "ดูแลนักเรียน...? ต้องมาดูแลเลยเหรอ... แล้วสภาน้ำชาคืออะไร?"
84303301000-28 = "ไม่รู้สิ..."
84303301000-30 = "เป็นเหมือนสภานักเรียนน่ะค่ะ ถ้าเทียบกับมิลเลเนียม... ก็น่าจะเป็นเหมือนเซมิน่าค่ะ"
84303301000-35 = "อ้อ! งั้นคุณก็ตำแหน่งประมาณยูกะสินะ! เข้าใจแล้วละ!"
84303301000-36 = "ไม่หรอก ฉันรู้สึกว่าน่าจะตำแหน่งสูงกว่านั้นนะ..."
84303301000-38 = "(ที่เราไม่ตกใจอะไรมาก ก็เพราะรู้เหตุการณ์ล่วงหน้ามาจากริโอะ เลยพอจะรู้ว่ามีปัญหาเกิดขึ้นกับเกม)"
84303301000-39 = "(หากเข้าไปข้องเกี่ยวกับสถานการณ์โดยไม่รู้เรื่องอะไรมาก่อน เราก็คงมีปฏิกิริยาไม่ต่างจากนักเรียน#nคนอื่นหรอก)"
84303301000-46 = "จริงเหรอคะ...!! นึกว่าเป็นโจรธรรมดาๆ เสียอีก แต่ที่แท้เป็นราชาจอมโจรเลยเหรอคะ!?"
84303301000-51 = "อาริสึ...!?"
84303301000-52 = "เหมือนว่าเราจะคุยเรื่องใหญ่ขึ้นเลยนะคะ... จริงๆ อาจจะแตกต่างกับที่ทุกคนคิดนิดหน่อยก็ได้ค่ะ"
84303301000-53 = "อีกอย่าง ฉันก็แค่กำลังช่วยงานคนอื่นที่เตรียมรับมือเรื่องแบบนี้อยู่น่ะค่ะ ฉันไม่ใช่คนยอดเยี่ยมอะไรหรอกค่ะ"
84303301000-54 = "...!!"
84303301000-55 = "แบบนี้สินะคะ มีนักปราชญ์ที่ส่งโจรมาอีกทีนี่เอง!"
84303301000-56 = "งั้นหมายความว่านักปราชญ์ส่งคุณเซอามาเหรอคะ? เธอคนนั้นคาดการณ์ไว้ล่วงหน้าว่าจะเกิดเรื่องกับ#nพวกเราเหรอคะ!"
84303301000-58 = "...!!"
84303301000-59 = "จะ... จริงเหรอ...!?"
84303301000-61 = "ก็จริงอยู่บางส่วนค่ะ..."
84303301000-62 = "ถึงฉันจะอธิบายรายละเอียดให้ไม่ได้... แต่ฉันจะไปเป็นพยานกับทางนั้นให้ว่าพวกคุณเป็นผู้บริสุทธิ์ค่ะ"
84303301000-63 = "เราต้องมีการสืบสวนก่อนค่ะ เพราะงั้นถ้าไม่ว่าอะไรละก็... ฉันขอเอาเกมกลับไปวิเคราะห์ได้มั้ยคะ?"
84303301000-68 = "หืม? กะ... เกมของพวกเราเหรอ? จะดีเหรอ...?"
84303301000-69 = "พวกเราน่ะไม่ติดอะไรหรอก... ต้องขอบคุณมากกว่าด้วยซ้ำ... ว่าแต่จะดูโค้ดได้เหรอ?"
84303301000-71 = "ไม่ใช่อย่างนั้นค่ะ ฉันไม่ได้จะทำเองหรอกค่ะ แต่ฉันจะเอาไปให้คนอื่นที่น่าเชื่อถืออีกทีค่ะ"
84303301000-75 = "หมายถึงคุณ 'นักปราชญ์' คนนั้นน่ะค่ะ..."

[translation]
84303301000-5 = "Thank you... We almost lost the entirety of the game we worked so hard on..."
84303301000-6 = "HOW did this happen...? Everyone was all hyped for this just yesterday...!"
84303301000-7 = "The game hasn't changed... Yuzu checked the code and didn't see anything different..."
84303301000-9 = "A corruptive curse must have been placed upon the game. Lucky we had this new thief to help save the day!"
84303301000-10 = "In fact, Seia was immune to the rage curse! Perhaps she has the answer!"
84303301000-15 = "...!! Really?"
84303301000-16 = "It didn't affect you?"
84303301000-17 = "But hang on...Aris, who is this?!"
84303301000-19 = "Ah, sorry. I didn't introduce myself."
84303301000-20 = "I am Yurizono Seia, of Trinity General School's Tea Party. I'm in charge of leading the visiting students."
84303301000-21 = "As such, this is my responsibility as much as yours."
84303301000-22 = "I'm sorry my students almost destroyed your precious work."
84303301000-27 = "Lead...? Why do you...? What's a Tea Party?"
84303301000-28 = "Hm..."
84303301000-30 = "It's like a student council. I suppose your equivalent here would be Seminar."
84303301000-35 = "Aha! You're like Yuuka! I understand!"
84303301000-36 = "Wait, but she feels like someone higher up..."
84303301000-38 = "(The only reason it didn't affect me is because I had my guard up, thanks to Rio's warning.)"
84303301000-39 = "(If I'd approached without knowing anything...I probably would've snapped just like the others did.)"
84303301000-46 = "...! Oh, pardon me. You are no common thief, are you? You are the Thief King!"
84303301000-51 = "Aris...?!"
84303301000-52 = "That's a grander title than I really deserve."
84303301000-53 = "I'm just helping someone who's trying to prevent these kind of things from happening. ...Other than that, I'm not that great of a person."
84303301000-54 = "*grumble*"
84303301000-55 = "I see. So the thief was sent by a sage!"
84303301000-56 = "Did the sage predict the curse, then?"
84303301000-58 = "*grumble*"
84303301000-59 = "Th-That's..."
84303301000-61 = "...That's not completely wrong."
84303301000-62 = "And I can't tell you the details for now...but we're already working to prove that you're innocent."
84303301000-63 = "First, we need to continue our investigation. So, if you don't mind...could I have a copy of that game?"
84303301000-68 = "Huh? O-Our game? Are you sure?"
84303301000-69 = "We don't mind... Actually, we're grateful...but can you read code?"
84303301000-71 = "I can't, but there's someone else I trust who can."
84303301000-75 = "...The sage, that is."

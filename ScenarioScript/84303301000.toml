[translation]
84303301000-5 = "謝謝你……精心製作的遊戲差點就要全部泡湯了……"
84303301000-6 = "為，為什麼會變成這樣……明明昨天大家還非常期待的說……！"
84303301000-7 = "遊戲明明是一樣的……柚子醬也說從程式碼看不出異常……"
84303301000-9 = "一定是混入了墮落的力量。#n不過前來幫忙的盜賊解決了問題！"
84303301000-10 = "聖亞同學沒有被憤怒的力量吞噬！也許聖亞同學知道答案！"
84303301000-15 = "……！！真的嗎？"
84303301000-16 = "你……還好嗎？？"
84303301000-17 = "話說……愛麗絲醬？這位到底是……"
84303301000-19 = "啊，抱歉。我忘了自我介紹。"
84303301000-20 = "我是三一綜合學園，茶會的百合園聖亞。#n同時也是三一同學的統率者……"
84303301000-21 = "這次的事除了各位之外，也跟我有關。所以請不用放在心上。"
84303301000-22 = "我們的學生差點毀掉各位寶貴的作品，對此我深感抱歉。"
84303301000-27 = "統率……？為什麼要統率……茶會又是什麼？"
84303301000-28 = "怎麼說呢……"
84303301000-30 = "就和學生會差不多吧。#n對千年來說……就是跟研討會類似的組織。"
84303301000-35 = "啊哈！原來是像優香那樣的人啊！我明白了！"
84303301000-36 = "唔嗯，我感覺他的地位好像更高……"
84303301000-38 = "（我之所以沒有受到影響，是因為莉央已經提醒過遊戲出了問題吧）"
84303301000-39 = "（如果我對此毫不知情的話……反應恐怕會跟其他同學差不多才對）"
84303301000-46 = "本來以為你只是普通的盜賊，原來是盜賊王嗎！？"
84303301000-51 = "愛麗絲醬……！？"
84303301000-52 = "這似乎有點言過其實……可能和你想的有點不一樣。"
84303301000-53 = "我只是在協助想應對這種事的另一個人而已。其實也沒什麼厲害的。"
84303301000-54 = "……！！"
84303301000-55 = "原來如此。還有派盜賊過來的賢者對吧！"
84303301000-56 = "是那位賢者派聖亞同學過來的嗎？#n難道他已經預料到這裡會發生意外了嗎！"
84303301000-58 = "……！！"
84303301000-59 = "什，什麼……！？"
84303301000-61 = "……某種程度上是事實。"
84303301000-62 = "雖然不能說得太仔細……但我會證明各位是無辜的。"
84303301000-63 = "首先得進行調查。#n不介意的話……可以讓我帶走一套遊戲嗎？"
84303301000-68 = "咦？我，我們的遊戲？可以嗎……？"
84303301000-69 = "這倒是沒關係……不，反而應該感謝才對……不過你看得懂程式碼嗎？"
84303301000-71 = "不，我個人是看不懂程式碼的。#n不過就像剛才說的一樣，我會把它轉交給能看懂又值得信賴的人。"
84303301000-75 = "……在你們口中就是「賢者」吧。"

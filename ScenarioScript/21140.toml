[translation]
21140-1 = "Episode 14;Maids vs. Meisters"
21140-2 = "Millennium Hallway"
21140-4 = "The last shutter is down. Now the only way to navigate the Student Council floor is with my fingerprint! Just a little bit farther until we reach the contraband storage and the Mirror..."
21140-5 = "Momoi! Hit the deck!"
21140-7 = "Huh?"
21140-8 = "*kabooooom*"
21140-9 = "Aaaah!"
21140-10 = "Wh-What WAS that?! That massive thing barely went over our heads! Look how big that hole in the wall is!"
21140-11 = "A 13.97 millimeter anti-materiel sniper round?! That was close. It would have hit you square in the head if you were just a couple of centimeters taller."
21140-12 = "Thank goodness we're so tiny—not! What's going on?!"
21140-13 = "Their sniper is already in position."
21140-14 = "C&C's sniper: Karin."
21140-15 = "It's coming again! Midori, get down!"
21140-16 = "*bang*"
21140-17 = "Ahhhhh! "
21140-19 = "Millennium Institute 3 Rooftop"
21140-20 = "Hm? Not bad."
21140-21 = "Those pip-squeaks are hard to hit. They're as nimble as they are small."
21140-22 = "However, their speed and movement are predictable. No wind and no obstacles in the line of fire. Even clinging to walls and avoiding windows won't save them now."
21140-23 = "Sorry, girls, but there's no escape now..."
21140-24 = "You sure about that?"
21140-25 = "...?!"
21140-26 = "My calculations say otherwise. In fact, your chances of hitting are zero percent."
21140-27 = "Who's there?"
21140-30 = "*pop* *pop* *tat*"
21140-31 = "Huh?"
21140-34 = "*brat-tat-tat-tat-tat*"
21140-36 = "Whoa! Th-The hell is that?!"
21140-37 = "I do believe introductions are in order."
21140-38 = "Feast your eyes upon the Engineering Department's latest and greatest invention, the bipedal all-terrain, combat-ready chair: Thundergun!"
21140-40 = "...But why? Who needs a walking chair?! And why does it have a catapult?!"
21140-41 = "Your lack of imagination is depressing. I suppose I should have realized earlier that a dullard such as yourself wouldn't be able to appreciate Thundergun's charms."
21140-42 = "You and that \"chair\" don't make sense, but the rest is coming together."
21140-43 = "I'd been wondering how those kids from the Game Development Department managed to make it this far on their own."
21140-44 = "Is it because of that Sensei of yours?"
21140-45 = "I bet Himari's intel was just a ruse as well."
21140-46 = "In that case..."
21140-52 = "!!!"
21140-55 = "Ahhh! Thundergun!"
21140-56 = "Pretty tough. My shot didn't come out the other side. Oh, well. Not much good it'll do you stuck on its back like a turtle."
21140-57 = "I've got to admit, the idea of a walking chair with a gun strapped to it is pretty amusing."
21140-58 = "However, if you really wanted to stop me, you should have attempted an ambush instead of trying to take me on with this stupid glorified wheelchair."
21140-59 = "Your calculations were foolish, Utaha. "
21140-60 = "You were never going to beat me somewhere as open as this rooftop without cover."
21140-61 = "..."
21140-62 = "Without cover, huh? Yeah, that's true."
21140-65 = "But you know what else a rooftop doesn't have? A ceiling."
21140-67 = "???"
21140-69 = "*whirrr*"
21140-70 = "Wh-What's that sound?!"
21140-71 = "*kabooooom*"
21140-73 = "Gah! A mortar?! But from where?"
21140-74 = "Our dearest Hibiki is firing off shells from the opposite side of Millennium Tower."
21140-75 = "Reaching Hibiki means going through four walls and two ceilings. An impossible task, unless you also have a mortar hiding in that frilly maid costume."
21140-76 = "You can't be serious!"
21140-77 = "Haha. You doubted them..."
21140-79 = "...but my calculations are always right."
21140-81 = "Millennium Main Corridor"
21140-82 = "It's quieted down out there."
21140-83 = "That must be Utaha and Hibiki's doing! We should get moving while they have Karin pinned down!"
21140-85 = "*rumble*"
21140-86 = "Eek! W-Was that an earthquake?"
21140-87 = "N-No, an explosion. You don't think...?!"
21140-89 = "Millennium Main Institute Outskirts"
21140-94 = "Ugh. My lecture's...not over yet!"
21140-95 = "I thought we were toast! Where the heck does she keep all those bombs, anyway?!"
21140-98 = "*sigh* Normally, I wouldn't condone destruction of school property."
21140-99 = "My apologies for destroying the shutters, Yuuka. What's the Game Development Department's current location?"
21140-100 = "Karin had them suppressed until a moment ago, but they've slipped out of our vision since."
21140-101 = "However, it's not hard to guess where they're headed."
21140-102 = "It must be the contraband storage where the Mirror is being kept. Understood. I'll take the elevator and intercept."
21140-103 = "*beep*"
21140-106 = "...?!"
21140-107 = "Y-Yuuka?"
21140-108 = "They cut the power?!"
21140-109 = "They'd really go to such lengths...?"
21140-111 = "Millennium Main Corridor"
21140-112 = "That blackout just now... Do you think it means Utaha and Hibiki succeeded?"
21140-113 = "Probably? It's so dark, though. Watch your step, Sensei."
21140-114 = "Just through here should be..."
21140-115 = "The Student Council's contraband storage! Haha. We did it!"
21140-116 = "Wow! You finally made it!"
21140-117 = "Hmm?"
21140-118 = "Huh?!"
21140-120 = "What kept you?"
21140-121 = "Howdy, Game Development Department! And... Uhhh, you were...\"Zenzy\"?"
21140-122 = "Oh, right! It's Sensei!"
21140-123 = "I've been waiting here the whole time!"
21140-124 = "A-Asuna? How'd you know we'd be here?!"
21140-125 = "I dunno!"
21140-126 = "Call it a hunch! I had a feeling that if I waited here, I'd meet up with Sensei sooner or later. And you guys too!"
21140-127 = "Call it a woman's intuition."
21140-128 = "Geez. You didn't even try to figure it out with reasoning."
21140-129 = "Anyway, shall we begin?"
21140-130 = "Huh? Begin what?"
21140-131 = "Our fight of course, silly! There's nothing better than a good fight!"
21140-132 = "Oh, right. I should introduce myself first!"
21140-133 = "C&C's call sign Zero-One, Asuna, reporting for duty!"
21140-134 = "Ready or not, here I come!"
21140-135 = "Oh, crap!"
21140-137 = "Next Episode;A Spreading Danger"

[translation]
21140-1 = "第14話;Maid VS Meisters"
21140-2 = "ミレニアム・廊下"
21140-4 = "最後のシャッターを解除！ふふっ、今やこの生徒会専用フロアは私の思うがまま～♪さて、もう少しで「鏡」がある差押品保管所に……"
21140-5 = "モモイ、伏せて！"
21140-7 = "えっ？"
21140-8 = "（ドカアァン！）"
21140-9 = "うわあああっ！"
21140-10 = "い、今頭の上を、なんか凄まじい威力の弾丸が！？壁に穴が空いてるんだけど！？"
21140-11 = "対物狙撃用の13.97mm弾！？良かった、お姉ちゃんの背があと5cm高かったら、おでこにクリーンヒットだったよ……。"
21140-12 = "ヒューっ、確かに。小さくて良かっ……じゃないよ！"
21140-13 = "この辺りはもう、狙撃ポイントに入ってるってことだね。"
21140-14 = "……C&Cの狙撃手、カリン先輩の。"
21140-15 = "ミドリ、伏せて！また来る！"
21140-16 = "（ドゴオォォォン！）"
21140-17 = "うわあぁっ！？"
21140-19 = "ミレニアム・第3校舎屋上"
21140-20 = "……なるほど、筋は悪くない。"
21140-21 = "小さくてすばしっこくて、当てにくいな……。"
21140-22 = "……でも、速度とパターンは把握した。風も少ないし、視界を遮るものも無い……もしかしたら、「壁を背にすれば安全」とでも思ってるのかもしれないけど。"
21140-23 = "残念。次は、100%命中させる……"
21140-24 = "それはどうかな？"
21140-25 = "！？"
21140-26 = "私の計算結果は少し違う。君の弾丸があの子たちに当たる確率は、0％だ。"
21140-27 = "誰だ！？"
21140-30 = "（ウィーン、ガシャン）"
21140-31 = "……は？"
21140-34 = "（ダダダダダッ！）"
21140-36 = "なっ、何だそれは！？"
21140-37 = "紹介しよう。"
21140-38 = "エンジニア部の新作、全ての天候に対応可能な二足歩行型戦闘用の「椅子」、雷の玉座さ。"
21140-40 = "なんで椅子を歩かせ……それに、カタパルトまで付いてる！？"
21140-41 = "この「雷ちゃん」の魅力を理解してもらえないとは、残念だね……。"
21140-42 = "……理解はできないけど、およそ把握はできた。"
21140-43 = "ずっと、気になってはいたんだ。どうしてゲーム開発部が、ミレニアム生徒会のセキュリティを突破して、ここまで来ることが出来たのか。"
21140-44 = "……あなたたちが、あの「先生」に協力してたのか。"
21140-45 = "やはりヒマリの情報も、私たちを混乱させるための罠だった……？"
21140-46 = "ということは……"
21140-52 = "！！"
21140-55 = "雷ちゃん！"
21140-56 = "なるほど。これで貫通しないとは、丈夫にできてるな……何か転んで、足をバタバタさせてるけど。"
21140-57 = "銃を撃つ椅子か、面白い……。"
21140-58 = "だけど、私を本気で止めるつもりなら、奇襲で来るべきだった。その「椅子」があるとはいえ、正面から挑んで来るなんて……"
21140-59 = "それは計算ミスだろう、ウタハ。"
21140-60 = "遮るものも無いこんな広い屋上で、私に正攻法で勝てるとでも思ったのか？"
21140-61 = "……。"
21140-62 = "君の言う通りだ、ここには遮るものは何もない……"
21140-65 = "そう、天井すらもね。"
21140-67 = "？"
21140-69 = "（フォン――）"
21140-70 = "……この音は！？"
21140-71 = "（ドゴオォン！）"
21140-73 = "まさか、曲射砲！？いったいどこから！？"
21140-74 = "うちのヒビキがミレニアムタワーの反対側から、ね。"
21140-75 = "君がヒビキを狙撃するためには、幾つもの壁や天井を貫通させなきゃいけない。#n君も同じように、曲射でもしない限りはね。さて、私を目の前にしながら、君にそのどちらかが出来るかな？"
21140-76 = "くっ……！？"
21140-77 = "ふふ、もう一度言ってあげようか？"
21140-79 = "計算通りだ。"
21140-81 = "ミレニアム・校舎内部"
21140-82 = "……狙撃が止んだ。"
21140-83 = "ウタハ先輩とヒビキちゃんだ！カリン先輩の相手をしてくれてる間に、急ごう！"
21140-85 = "（ゴゴゴゴゴゴゴ――！）"
21140-86 = "えええっ！な、なに、地震？"
21140-87 = "爆発、みたいだけど……まさか！？"
21140-89 = "ミレニアム・校舎"
21140-94 = "くうっ……講義はまだ、終わって……！"
21140-95 = "ひーっ、死ぬかと思った！一体どこにそんな大量の爆弾を隠してたのさ……！"
21140-98 = "ふぅ、あまり学校の施設を壊したくはないのですが……。"
21140-99 = "ユウカ、申し訳ないですがシャッターは無理やり破壊しました。ゲーム開発部の現在の位置は？"
21140-100 = "さっきまでカリンが足止めしてたけど、見失ったわ。"
21140-101 = "けど……どこに向かってるのかは分かる。"
21140-102 = "「鏡」がある、生徒会の差押品保管所の方ですね。では、すぐにエレベーターでそちらへ向かいます。"
21140-103 = "（ピピッ――）"
21140-106 = "！？"
21140-107 = "どうしました？ユウカ？ユウカ？？"
21140-108 = "まさか、電力を遮断……！？"
21140-109 = "くっ、ここまでするとは……！！"
21140-111 = "ミレニアム・校舎内部"
21140-112 = "さっきの停電、ウタハ先輩とヒビキの策が成功したってことだよね？"
21140-113 = "うん、そのはず。あ、先生。足元暗いので、気をつけてくださいね。"
21140-114 = "ここさえ抜ければ……。"
21140-115 = "うん、もう生徒会の差押品保管所のはず。ようやくこれで……！"
21140-116 = "お、やっと来たね！"
21140-117 = "？"
21140-118 = "！？"
21140-120 = "遅かったねー、だいぶ待ってたよ～。"
21140-121 = "ようこそ、ゲーム開発部！それに、えっと……先輩、だっけ？"
21140-122 = "あ、違う違う、思い出した！「先生」だ！"
21140-123 = "ずっと会えるのを楽しみにしてたんだよ～？"
21140-124 = "あ、アスナ先輩！？どうしてここに！？"
21140-125 = "どうしてって言われても～……何となく？"
21140-126 = "予感とか直感とか、そういうのってあるでしょ？ここで待ってたら先生にも、あなたたちにも会えるんじゃないかなー、って。"
21140-127 = "そんな予感がしてたから！"
21140-128 = "難しい言葉じゃないのに、全然何言ってるか分からない……。"
21140-129 = "さっ、じゃあ始めよっか？"
21140-130 = "えっと、念のために聞くのですが、何を……？"
21140-131 = "戦闘を！私、戦うのが大好きなの！"
21140-132 = "あ、そうだ。まだ自己紹介してなかったね。"
21140-133 = "C&Cコールサイン・ゼロワン、アスナ！"
21140-134 = "行くよっ！"
21140-135 = "やっぱりぃっ！？"
21140-137 = "次回;忍び寄る危機"

[translation]
21140-1 = "第14話;Maid VS Meisters"
21140-2 = "千年．走廊"
21140-4 = "最後的閘門也解除了！呵呵，現在這個學生會專屬樓層已經可以隨我處置了～♪#n接下來，就快要到「鏡子」所在的扣押品保管所……"
21140-5 = "桃井，快趴下！"
21140-7 = "咦？"
21140-8 = "（咚喀！）"
21140-9 = "嗚哇啊啊啊！"
21140-10 = "剛，剛才從我頭上好像飛過一顆很可怕的子彈！？連牆壁都被打出了一個大洞了！？"
21140-11 = "是反器材狙擊用的13.97mm子彈！？#n太好了，要是姐姐再高個5公分的話，就要被爆頭了……"
21140-12 = "呼～確實。#n長的矮真是太好了……才怪咧！"
21140-13 = "這裡已經是對方的狙擊範圍了呢。"
21140-14 = "……C&C的狙擊手，花凜前輩的。"
21140-15 = "綠，快趴下！子彈又來了！"
21140-16 = "（咚喀！）"
21140-17 = "嗚哇啊啊！？"
21140-19 = "千年．第3校舍屋頂"
21140-20 = "……原來如此，素質不錯呢。"
21140-21 = "個子小，動作又敏捷，真難擊中呢……"
21140-22 = "……但是，已經掌握好他們的速度跟行動模式了。#n風不大，也沒有掩蔽物……或許他們會覺得「只要靠著牆壁就安全了」也說不定。"
21140-23 = "但是很可惜，下一發，100%會命中……"
21140-24 = "是這樣嗎？"
21140-25 = "！？"
21140-26 = "和我計算出來的不太一樣呢。你的子彈會擊中那些孩子的機率是，0%喔。"
21140-27 = "是誰！？"
21140-30 = "（嗡嗡──喀）"
21140-31 = "哈啊……？"
21140-34 = "（噠噠噠噠噠！）"
21140-36 = "這，這是什麼鬼東西！？"
21140-37 = "我來向你介紹吧。"
21140-38 = "這是工程師部的新作，能夠應對所有天氣的兩足步行型戰鬥用「椅子」，雷之玉座。"
21140-40 = "為什麼要讓椅子會走……而且還有發射器！？"
21140-41 = "竟然沒辦法理解這個「雷醬」的魅力，真是遺憾啊……"
21140-42 = "……雖然不理解，但是大概明白了。"
21140-43 = "我一直都想不通。#n為什麼遊戲開發部能夠突破千年學生會的保全系統，一路來到這裡。"
21140-44 = "……是因為你們，還有那位「老師」的幫忙對吧。"
21140-45 = "就連陽葵提供的情報，也是為了讓我們陷入混亂的陷阱嗎……？"
21140-46 = "也就是說……"
21140-52 = "！！"
21140-55 = "雷醬！"
21140-56 = "原來如此，這樣都打不穿嗎，還真是結實呢……#n雖然已經倒在地上，只能揮揮手腳了。"
21140-57 = "能開槍的椅子是嗎，真是有趣……"
21140-58 = "但是，如果你是認真要阻止我的話，就應該要偷襲我才對。#n就算你有那個「椅子」，竟然正面挑戰我……"
21140-59 = "你失算了吧，詠葉。"
21140-60 = "在這個沒有掩蔽物的屋頂上，你認為能夠正面贏過我嗎？"
21140-61 = "……"
21140-62 = "就像你說的一樣，這裡沒有任何掩蔽物……"
21140-65 = "沒錯，就連天花板都沒有呢。"
21140-67 = "？"
21140-69 = "（嗡──）"
21140-70 = "……這個聲音是！？"
21140-71 = "（咚喀！）"
21140-73 = "難道說，是榴彈砲！？到底是從哪飛來的！？"
21140-74 = "是我們家的響從千年塔的另一邊發射的。"
21140-75 = "想要狙擊他的話，可是得要貫穿好幾層牆壁和天花板才行。#n除非你也能以拋物線進行攻擊呢。那麼，在我的面前，你能做到其中一個嗎？"
21140-76 = "可惡……！？"
21140-77 = "呵呵，要我再告訴你一次嗎？"
21140-79 = "一切都在計劃之中。"
21140-81 = "千年．校舍內部"
21140-82 = "……狙擊停下來了。"
21140-83 = "一定是詠葉前輩跟響醬！趁他們在對付花凜前輩的時候，我們趕快！"
21140-85 = "（轟轟轟轟轟轟轟──！）"
21140-86 = "咦咦咦！什，什麼，地震了嗎？"
21140-87 = "好像是，發生爆炸了……難道說！？"
21140-89 = "千年．校舍"
21140-94 = "嗚……課還沒，上完呢……！"
21140-95 = "呀，我還以為死定了呢！你到底是把那麼多的炸彈都藏在哪裡啊……"
21140-98 = "呼，我也是不太想破壞學校的設施的……"
21140-99 = "抱歉了優香，我不得不炸壞了閘門。遊戲開發部現在在哪？"
21140-100 = "剛才花凜妨礙了他們一下，但是現在跟丟了。"
21140-101 = "不過……已經知道他們往哪去了。"
21140-102 = "是「鏡子」所在的，學生會的扣押品保管所的方向對吧。我馬上搭電梯過去。"
21140-103 = "（嗶嗶──）"
21140-106 = "！？"
21140-107 = "怎麼了？優香？優香？？"
21140-108 = "竟然切斷了電力……！？"
21140-109 = "可惡，竟然會做到這種程度……！！"
21140-111 = "千年．校舍內部"
21140-112 = "剛才的停電，是詠葉前輩跟響的計劃成功了的意思對吧？"
21140-113 = "嗯，應該是。啊，老師。這裡很暗，請小心點唷。"
21140-114 = "只要通過這裡的話……"
21140-115 = "嗯，前面就是學生會的扣押品保管所了。終於到……！"
21140-116 = "哦，你們終於來了啊！"
21140-117 = "？"
21140-118 = "！？"
21140-120 = "真慢呢～讓我等了好久喔～"
21140-121 = "歡迎你們，遊戲開發部！還有，那個……前輩，是嗎？"
21140-122 = "啊，不對不對，我想起來了！是「老師」！"
21140-123 = "我一直都很期待見到你們唷～？"
21140-124 = "明，明日奈前輩！？為什麼會在這裡！？"
21140-125 = "就算你這麼問我～……憑感覺嗎？"
21140-126 = "不知道該說是預感還是直覺，反正就是那一類的吧？#n只要在這裡等著的話，就能見到老師還有你們吧～"
21140-127 = "大概就是有這種預感！"
21140-128 = "明明不是什麼難懂的話，卻完全搞不懂他在說什麼……"
21140-129 = "那麼，我們就開始吧？"
21140-130 = "那個，以防萬一先問一下，要開始什麼……？"
21140-131 = "是戰鬥呀！我，最喜歡戰鬥了！"
21140-132 = "啊，對了。我還沒自我介紹對吧。"
21140-133 = "我是C&C代號01明日奈！"
21140-134 = "我要上了喔！"
21140-135 = "果然還是這樣！？"
21140-137 = "下一話;潛藏的危機"

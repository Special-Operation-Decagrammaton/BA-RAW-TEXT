[translation]
21140-1 = "ตอนที่ 14;เมด vs ไมสเตอร์"
21140-2 = "ทางเดินในตึก มิลเลเนียม"
21140-4 = "ปลดฉากกั้นสุดท้าย ฮุฮุฮุ! ทีนี้สภานักเรียนทั้งชั้นก็ต้องใช้แต่ลายนิ้วมือของฉันแล้วล่ะ~#nเอาล่ะ ไปอีกหน่อยคงเจอคลังของที่ถูกยึด..."
21140-5 = "โมโมอิ! หมอบลง!"
21140-7 = "หืม?"
21140-8 = "(ฟิ้วว!)"
21140-9 = "อ๊ากก!"
21140-10 = "อะไรกัน! กระสุนปืนอานุภาพที่เพิ่งผ่านหัวไปเมื่อกี้มัน?! ทำกำแพงเป็นรูเท่ากำมือเลย!"
21140-11 = "กระสุนปืนลอบยิงขนาด 13.97 มม.! ถือว่ายังโชคดีนะนั่น ถ้าพี่สูงกว่านี้สัก 5 เซน ก็คงโดนยิงกลางหัวแล้ว"
21140-12 = "เฮ้อ โชคดีที่ตัวเล็ก... ซะที่ไหนกันล่ะ!"
21140-13 = "ท่าทางเราจะมาถึงจุดลอบยิงแล้วสินะ"
21140-14 = "สไนเปอร์แห่ง C&C... รุ่นพี่คาริน..."
21140-15 = "มิโดริ! ก้มลง! มันมาอีกแล้ว!"
21140-16 = "(ตู้มมมม!)"
21140-17 = "อ๊ากกก!"
21140-19 = "ชั้นดาดฟ้า อาคารเรียนที่ 6 มิลเลเนียม"
21140-20 = "อืม... เก่งไม่ใช่เล่นเลยนะ"
21140-21 = "ทั้งตัวเล็กและคล่องแคล่ว... เล็งยากชะมัด"
21140-22 = "แต่ก็รู้ความว่องไวและรูปแบบการหลบหนีแล้ว ตอนนี้ลมพัดน้อยลง และไม่มีอะไรบังทัศนวิสัยแล้ว#nคิดว่ายืนพิงกำแพงแบบนั้นจะปลอดภัยงั้นสินะ..."
21140-23 = "เสียใจด้วยนะ แต่นัดต่อไปจะเข้าเป้า 100% ....."
21140-24 = "จะทำได้เหรอ?"
21140-25 = "?!"
21140-26 = "ฉันไม่คิดอย่างนั้นหรอกนะ โอกาสที่กระสุนของเธอจะยิงถูกเด็กๆ พวกนั้น คือ 0% ต่างหาก"
21140-27 = "ใครน่ะ?!"
21140-30 = "(วิ้งงงง--- แกร๊ง)"
21140-31 = "หืม?"
21140-34 = "(ตึ้งงงงง!)"
21140-36 = "อ๊ะ? นี่มัน... นี่มันอะไรกัน?!"
21140-37 = "ต้องแนะนำหน่อยสินะ"
21140-38 = "ผลงานชิ้นใหม่ของชมรมวิศวกรรม 'เก้าอี้' ต่อสู้ 2 ขาที่ทนต่อการใช้งานในทุกสภาพอากาศ#nเรียกสั้นๆ ว่าบัลลังก์แห่งสายฟ้า"
21140-40 = "เก้าอี้บ้าอะไรถึงเดินได้น่ะ! แล้วทำไมถึงมีเครื่องยิงแคทะพัลต์ด้วย?!"
21140-41 = "น่าเสียดายนะ คนที่ไม่เข้าใจความโรแมนติกคงเข้าไม่ถึงเสน่ห์ของสายฟ้า"
21140-42 = "เรื่องนั้นฉันไม่รู้หรอก... แต่เรื่องอื่นก็พอเข้าใจได้"
21140-43 = "ฉันเองก็สงสัยมานานแล้ว สงสัยว่าทำไมเด็กในชมรมพัฒนาเกมถึงได้ทลายระบบรักษาความปลอดภัย#nของสภานักเรียนมิลเลเนียมแล้วเข้ามาถึงตรงนี้ได้"
21140-44 = "หรือว่าร่วมมือกับ 'คุณครู' คนนั้น?"
21140-45 = "ข้อมูลจากฮิมาริถือเป็นผลงานชิ้นเอกที่ตั้งใจทำให้พวกเราสับสนได้เลยสินะ"
21140-46 = "และถ้าเป็นอย่างนั้น..."
21140-52 = "!!"
21140-55 = "อ๊ะ?! สายฟ้าของฉัน!"
21140-56 = "แข็งแกร่งเสียจริง... ถ้าไม่นับเรื่องที่ลงไปนอนดิ้นเพราะหกล้มน่ะนะ..."
21140-57 = "เก้าอี้มีปืนอย่างนั้นรึ น่าสนุกดีนี่ แต่ว่า..."
21140-58 = "ถ้าอยากจะหยุดฉัน ก็ควรจะจู่โจมสิ ส่ง 'เก้าอี้' นี้มาท้าทายกันทำไม"
21140-59 = "คิดอะไรโง่ไปหน่อยนะอุทาฮะ"
21140-60 = "เธอเอาชนะฉันบนดาดฟ้าที่ไม่มีกำบังแบบนี้ไม่ได้หรอก"
21140-61 = "......"
21140-62 = "ดาดฟ้าที่ไม่มีกำบัง... ก็ถูกของเธอ"
21140-65 = "แถมยังไม่มีเพดานด้วยนะ"
21140-67 = "?"
21140-69 = "(วิ้งงงงง)"
21140-70 = "อะไรน่ะ? เสียงนี้มัน?!"
21140-71 = "(ตึ้งงง!)"
21140-73 = "อึ่ก! ปืนใหญ่วิถีโค้งงั้นเหรอ?! มาจากไหนกัน...?!"
21140-74 = "ฮิบิกิของเรากำลังยิงปืนครกอยู่จากฝั่งตรงข้ามของหอคอยมิลเลเนียม"
21140-75 = "หมายความว่า ถ้าเธอต้องการขวางฮิบิกิจากตำแหน่งที่เธออยู่ล่ะก็ เธอก็ต้องเจาะเพดาน#nและผนังทั้งสี่ด้านให้ได้ แต่ถ้าไม่ใช้ปืนใหญ่ จะทำได้ไหมนะ?"
21140-76 = "ยะ... แย่ล่ะสิ!!"
21140-77 = "หึหึ ให้ฉันพูดใหม่อีกทีไหม?"
21140-79 = "ฉันคิดไว้ดีแล้ว และก็ไม่ใช่ความคิดโง่ๆ ด้วย"
21140-81 = "ในอาคารเรียนหลัก มิลเลเนียม"
21140-82 = "ปืนใหญ่หยุดยิงแล้วล่ะ"
21140-83 = "รุ่นพี่อุทาฮะกับฮิบิกินี่ยอดไปเลย! ระหว่างที่เผชิญหน้ากับรุ่นพี่คารินแบบนี้ เราต้องรีบแล้วล่ะ!"
21140-85 = "(ตึงๆๆๆๆ!!)"
21140-86 = "อ๊ากก เมื่อกี้มันอะไรน่ะ? แผ่นดินไหวเหรอ?"
21140-87 = "เหมือนระเบิดเลย... หรือว่า...?!"
21140-89 = "ด้านนอกอาคารเรียนหลัก มิลเลเนียม"
21140-94 = "อึ้ก... บทเรียน... ยังไม่... จบ...!"
21140-95 = "นึกว่าจะตายไปแล้วซะอีก! เอาระเบิดตั้งเยอะขนาดนั้นติดตัวไว้ได้ยังไงน่ะ?"
21140-98 = "เฮ้อ ปกติฉันไม่ชอบการทำลายโรงเรียนเลย... แต่ก็นะ..."
21140-99 = "ขอโทษนะคะยูกะ ฉันทำลายฉากกั้นไปแล้วล่ะค่ะ ตอนนี้ชมรมพัฒนาเกมอยู่ที่ไหนเหรอ?"
21140-100 = "เมื่อกี้ยังขัดขวางคารินอยู่เลย ตอนนี้ไม่เห็นตัวแล้ว"
21140-101 = "แต่ว่า... ฉันรู้ว่าพวกนั้นจะไปที่ไหน"
21140-102 = "คลังของที่ถูกยึดของสภานักเรียนที่มี 'กระจก' อยู่สินะ เข้าใจแล้ว ฉันไปขึ้นลิฟต์แล้วไปที่นั่น"
21140-103 = "(ติ๊ดด)"
21140-106 = "?!"
21140-107 = "ยะ... ยูกะ...?"
21140-108 = "หรือว่า... มีใครมาปิดระบบไฟไว้?!"
21140-109 = "ทำกันขนาดนี้เลยเรอะ...!!"
21140-111 = "ในอาคารเรียนหลัก มิลเลเนียม"
21140-112 = "ไฟดับแล้ว แสดงว่ารุ่นพี่อุทาฮะกับฮิบิกิทำสำเร็จใช่ไหม?"
21140-113 = "น่าจะเป็นอย่างนั้นนะ จริงสิ คุณครู! ในนี้มันมืด ระวังด้วยนะคะ"
21140-114 = "ถ้าผ่านทางเดินตรงนี้ไปได้..."
21140-115 = "คลังของที่ถูกยึดของสภานักเรียน! เย้! ในที่สุดก็มาถึงจนได้!"
21140-116 = "ว้าว~ มาถึงแล้ว!"
21140-117 = "?"
21140-118 = "?!"
21140-120 = "รออยู่ตั้งนานเลยล่ะ~"
21140-121 = "เข้ามาสิ ชมรมพัฒนาเกม! แล้วก็... อืม ใครน้า!? รุ่นพี่หรือเปล่านะ?"
21140-122 = "อ่อ! จำ 'คุณครู' ได้แล้ว! หึหึ"
21140-123 = "ฉันรอทุกคนอยู่นานเลย~"
21140-124 = "ระ.. รุ่นพี่อาสึนะ?! มาอยู่ที่นี่ได้ยังไง?!"
21140-125 = "ไม่มีอะไรพิเศษหรอก!"
21140-126 = "ก็แค่ลางสังหรณ์น่ะ~ บางทีถ้ามารออยู่ทางนี้ ก็อาจจะได้เจอคุณครูกับพวกเธอก็ได้!"
21140-127 = "ก็แค่ลางสังหรณ์เฉยๆ น่ะ!"
21140-128 = "อะไรกัน... นี่เดาล้วนๆ เลยเหรอ..."
21140-129 = "เอาล่ะ งั้นมาเริ่มกันเลยไหม?"
21140-130 = "ระ... เริ่มอะไรคะ?"
21140-131 = "ต่อสู้ไง! ฉันชอบการต่อสู้มากเลยล่ะ!"
21140-132 = "อ่อ จริงสิ ลืมแนะนำตัวไปเลย ฝากตัวด้วยนะทุกคน~"
21140-133 = "ฉันคืออาสึนะ! รหัสซีโร่วันแห่ง C&C"
21140-134 = "เอาล่ะนะ!"
21140-135 = "แย่แล้ว!!"
21140-137 = "ตอนต่อไป;อันตรายที่กำลังเข้ามา"

201030-71 = "#na;린 사복;……졌습니다."
201030-72 = "#na;린 사복;체스 실력은 여전하시군요, 카야. 얕은 수로는 이길 방법이 보이질 않아요."
201030-73 = "3;카야 죄수복;09\n#3;a"
201030-74 = "3;카야 죄수복;09;교정국에 갇혀 있는 동안 혼자서 계속 묘수풀이만 해왔으니까요. 확신하긴 어렵지만 전보다는 조금 더 실력이 늘었을지도 모르겠네요.\n#3;em;[반응]"
201030-75 = "#st;[0,0];instant;1;"
201030-76 = "#clearST"
201030-77 = "3;카야 죄수복;08\n#wait;1200"
201030-78 = "3;카야 죄수복;07;……체스는 이렇게나 간단한데, 어째서 그 때는 이런 전술로도 이길 수가 없었던 건지.\n#fontsize;50"
201030-79 = "#st;[0,0];instant;1;"
201030-80 = "#clearST"
201030-81 = "3;린 사복;02\n#3;em;[!]\n#wait;1300"
201030-82 = "3;린 사복;07;하아……\n#3;em;[한숨]"
201030-83 = "3;카야 죄수복;14;왜, 왜 그런 표정을 짓는 건가요? 제가 뭐 우스운 이야기라도 했나요?!\n#3;em;[?!]\n#3;shake"
201030-84 = "3;린 사복;05;아직도 이해하지 못하고 있군요, 카야."
201030-85 = "3;린 사복;11;아무리 전술이 얼마나 뛰어나다 하더라도 현실은 체스판 위의 대국처럼 움직이지 않습니다."
201030-86 = "3;린 사복;08;당신도, 당신의 부하들도 초인이 아니기 때문이지요.\n#3;em;[반응]"
201030-87 = "3;린 사복;02;사람은 체스 위의 기물이 아닌지라, 완벽하게 통제하려 하면 할수록 다루기 어려워집니다."
201030-88 = "3;린 사복;01;초인이 되지 못한 범재는 이 평범한 현실을 어르고 달래며 현상을 유지하는 것이 최선일 뿐입니다."
201030-89 = "3;카야 죄수복;18;뭔가요. 그럼 당신이라면 통제가 가능하기라도 했다는 소리인가요?\n#3;em;[속상함]"
201030-90 = "3;린 사복;99;아뇨. 저 역시도 초인은 아니니까요."
201030-91 = "3;린 사복;99;……현실의 사람을 체스의 말처럼 완벽하게 다룰 수 있는 초인은 제가 아는 한 그녀 밖에 없습니다."
201030-92 = "#all;hide"
201030-93 = "#wait;1000"
201030-94 = "3;카야 죄수복;07\n#3;a"
201030-95 = "3;카야 죄수복;07;……그래요. '그녀'라면 가능했겠지요."
201030-96 = "3;카야 죄수복;09;아니, 그녀라면 애초에 자신의 능력을 증명할 필요도 없었겠지요. 모두가 그녀의 결정과 선택을 의심하지 않았을 테니."
201030-97 = "3;카야 죄수복;08;저도 그녀가 사라진 이후로 계속해서 그 후광을 줄곧 쫓았습니다.\n#3;em;[...]"
201030-98 = "3;카야 죄수복;13;그녀의 부재를 완벽하게 대체할 수 있는 사람이 될 수는 없을지, 초인이 되려면 무엇을 이루어야 하는지……"
201030-99 = "3;카야 죄수복;13;총학생회이 남긴 기록을 살펴보고, 그녀의 유산을 사용하려 했지만……"
201030-100 = "3;카야 죄수복;19;결국은 이런 꼴이 되어버렸네요."
201030-101 = "3;린 사복;01;키보토스가 혼란에 빠져 제대로 동작하지 못하고 있었을 때."
201030-102 = "3;린 사복;02;당신이 FOX 소대를 시켜 샬레의 지하실에서 가져오게 한 물건은 무엇이었나요?\n#3;em;[?]"
201030-103 = "3;카야 죄수복;08;………."
201030-104 = "3;린 사복;01;지금 이 자리에서 말씀하시기 어렵다면 사람을 물리도록 하지요. 그 정도는 총학생회장 대행의 권한으로 부탁할 수 있으니까요."
201030-105 = "#st;[0,0];instant;1;"
201030-106 = "#clearST"
201030-107 = "3;교정국 간수;02\n#3;h\n#3;em;[반응]\n#wait;1500"
201030-108 = "3;카야 죄수복;09;아뇨, 그러실 필요는 없습니다. "
201030-109 = "3;카야 죄수복;09;이제 그 물건의 정체가 밝혀진다 한들 크게 달라질 것도 없으니까요."
201030-110 = "#st;[0,0];instant;1;"
201030-111 = "#clearST"
201030-112 = "3;카야 죄수복;08\n#3;em;[...]\n#wait;2500"
201030-113 = "3;카야 죄수복;07;제가 샬레 건물 지하에서 가져온 것은 평범한 시계였습니다."
201030-114 = "3;카야 죄수복;13;……아니, 그렇게 밖에 보이지 않는 물건이었다고 하는 편이 더 옳겠군요."
201030-115 = "3;린 사복;02;그게 무슨 뜻인가요?\n#3;em;[?]"
201030-116 = "3;카야 죄수복;07;총학생회장이 사라진 이후, 저는 은밀하게 그녀가 남긴 물건에 대해 조사했습니다."
201030-117 = "3;카야 죄수복;07;대부분은 다구(茶具)나 학용품과 같은 평범한 개인용품 뿐이었지만, 개중에는 생텀 타워의 제어 권한을 이전할 수 있을 정도로 강력한 힘을 지닌 오파츠 같은 물건도 있었지요."
201030-118 = "3;카야 죄수복;08;네, 샬레의 선생님이 갖고 계신 그 <싯딤의 상자>의 이야기입니다."
201030-119 = "3;카야 죄수복;09;키보토스의 인프라를 손 하나로 통제할 수 있는 강력한 오파츠가 존재한다면, 그에 준하는…… 아니, 그보다 더 강력한 오파츠가 또 있을지도 모른다고 생각했습니다."
201030-120 = "3;카야 죄수복;07;그리고 총학생회장의 기록을 살펴보던 도중, 저는 <싯딤의 상자>에 상응하는 또 다른 오파츠가 샬레 지하실에 있는 성궤 속에 보관되어 있다는 사실을 알게 되었지요.\n#3;em;[반응]"
201030-121 = "3;카야 죄수복;18;그 이름은 <샤케드의 막대>."
201030-122 = "3;카야 죄수복;18;총학생회장의 기록에 따르면 진실을 가려내는 능력을 지닌 물건이라고 합니다."
201030-123 = "[s] \"샤케드의 막대……?\""
201030-124 = "3;카야 죄수복;09;어머나, 선생님께서는 역시 이미 알고 계셨나요?"
201030-125 = "[s1] \"아니, 정확히는 모르지만……\"\n[s2] \"어디선가 들어본 것 같은 기시감이……\""
201030-126 = "#wait;10"
201030-127 = "#wait;10"
201030-128 = "3;카야 죄수복;14;……괜한 기대를 했네요. 시시하게도.\n#3;em;[세로선]"
201030-129 = "3;카야 죄수복;07;여하튼. '진실을 가려낸다'는 말이 무엇을 뜻하는 은유인지는 알 수 없었지만, 저는 FOX 소대에게 이 물건을 가져오게 했습니다."
201030-130 = "3;카야 죄수복;07;<샤케드의 막대>가 정말로 <싯딤의 상자>에 상응하는 가치를 지닌 오파츠라면, 쿠데타는 물론이고 총학생회를 장악하는 데 큰 도움을 받을 수 있을테니까요."

[translation]
201030-1 = "#title;제3화;퀸즈 갬빗"
201030-2 = "#place;교정국, 특수 수용소 A동 내 면회소"
201030-3 = "#wait;1200"
201030-4 = "#na;교정국 간수;죄수번호 1192번. 면회다."
201030-5 = "#st;[0,0];instant;1;"
201030-6 = "#clearST"
201030-7 = "#wait;1750"
201030-8 = "3;카야 죄수복;07\n#3;a\n#wait;1000"
201030-9 = "#wait;1300"
201030-10 = "3;카야 죄수복;17;누가 이 시간에 갑자기 면회를 왔나 했더니만……\n#3;em;[한숨]"
201030-11 = "3;카야 죄수복;17;갑자기 무슨 일이신가요, 총학생회장 대행. 평소와는 다르게 사복까지 차려 입고서."
201030-12 = "#st;[0,0];instant;1;"
201030-13 = "#clearST"
201030-14 = "3;카야 죄수복;09\n#3;em;[반응]\n#wait;1500"
201030-15 = "3;카야 죄수복;21;샬레의 선생님까지 데리고 함께 오신 걸 보니…… 모처럼의 데이트라도 자랑하고 싶으셨던 건가요?"
201030-16 = "5;린 사복;07;……아닙니다. 어째서 다들 약속이라도 한 듯 그 단어를 입에 담는지 모르겠군요.\n#5;al\n#3;m1\n#5;em;[땀]"
201030-17 = "5;린 사복;02;단순히 안부를 물으러 온 것뿐입니다. 겸사겸사 여쭈어 보고 싶었던 것도 있었고."
201030-18 = "3;카야 죄수복;14;하아……\n#3;stiff"
201030-19 = "3;카야 죄수복;13;린 행정관 정도의 직책자라면 사람을 보내거나 서면으로 물어보더라도 상관없지 않나요?\n#3;em;[?]"
201030-20 = "3;카야 죄수복;08;총학생회장 대행의 업무가 한가하지 않다는 건 저도 알고 있는데, 일부러 교정국까지 찾아오실 필요는—"
201030-21 = "5;린 사복;99;걱정 마시길. 오늘은 업무를 신경 쓰지 않아도 괜찮은 휴일이니까요.\n#5;greeting"
201030-22 = "5;린 사복;01;무슨 일이 생기더라도 대응할 수 있도록 각 부서의 담당자들에게 지침을 하달하였으니, 제가 이곳에 있더라도 큰 문제는 생기지 않을 겁니다."
201030-23 = "5;린 사복;01\n3;카야 죄수복;14;………\n#3;m3\n#5;d\n#3;em;[...]"
201030-24 = "3;카야 죄수복;14;……모처럼 생긴 휴일에 원수의 얼굴을 보러 오다니, 당신은 바보인가요?"
201030-25 = "3;카야 죄수복;20;그도 아니라면 역시 감옥에 갇힌 사람을 놀릴 속셈으로 일부러—\n#3;stiff"
201030-26 = "3;린 사복;99;뭐. 직접 얼굴을 보고 이야기하는 것이 껄끄러우시다면, 나중에 편지로 안부를 전하겠습니다.\n#3;em;[한숨]"
201030-27 = "#st;[0,0];instant;1;"
201030-28 = "#clearST"
201030-29 = "3;린 사복;99\n#3;m4\n#wait;1000"
201030-30 = "1;카야 죄수복;17;자, 잠시만요. 껄끄럽다고 하진 않았거든요? 멋대로 돌아가지 말아주세요!\n#1;ar\n#1;hophop"
201030-31 = "1;카야 죄수복;08;흠, 흠…… 마침 저도 바쁘지 않던 참이었고, 두 분이 모처럼 귀한 시간을 내 찾아와 주셨으니 잠깐이라면 시간을 내드리지요.\n#1;stiff"
201030-32 = "[s] \"교정국 내에서도 처리해야 할 일이 많은 거야?\""
201030-33 = "1;카야 죄수복;17;무, 물론이지요. 아침에는 일어나자마자 체력 단련을 위해 달리기를 하고……\n#3;dr\n#1;m3\n#1;em;[땀]"
201030-34 = "1;카야 죄수복;10;그 후에는 우수한 리더십을 갖추기 위해 식사 전까지 자기계발서를 읽고……"
201030-35 = "1;카야 죄수복;19;그리고 식사 후에는 또……"
201030-36 = "#st;[0,0];instant;1;"
201030-37 = "#clearST"
201030-38 = "1;카야 죄수복;19\n#1;em;[...]\n#wait;2500"
201030-39 = "1;카야 죄수복;08;……그래요. 사실 특별히 할 일은 없어요.\n#fontsize;50"
201030-40 = "1;카야 죄수복;08;교정국 내에는 이렇다 할 오락거리도, 이야기를 나눌 상대도 흔치 않으니까요.\n#1;stiff"
201030-41 = "1;카야 죄수복;17;FOX 소대의 소대원들과 마주치지 않도록 수용소를 분리해 준 건 고마운 배려이지만, 다른 수용자들과도 만날 수 없다니— 이래서야 독방이나 마찬가지잖아요?\n#1;em;[속상함]"
201030-42 = "1;카야 죄수복;14;외부의 소식도 거의 접할 수 없고, 찾아와주는 사람도 하나 없고……!"
201030-43 = "1;카야 죄수복;17;물론 그렇다고 해서 오랜만에 면회를 온 당신들이 반가웠다는 건 아니거든요?!\n#1;em;[?!]\n#1;shake"
201030-44 = "[s] \"외로웠던 모양이구나……\""
201030-45 = "#all;hide"
201030-46 = "3;린 사복;01;……다행히 건강에는 문제가 없어 보이는군요."
201030-47 = "3;카야 죄수복;19;물론이지요. 언젠가 만인지상의 자리에 오를 사람이 한 번의 실수에 낙심하여 제 몸 관리 조차 못한다면 '초인'이라 할 수 있겠나요?"
201030-48 = "3;카야 죄수복;11;지금은 비록 세를 잃고 교정국에 갇혀 있지만, 언젠간 다시 쿠데타를 성공시켜 그 자리를 되찾고 말테니까요!\n#3;em;[!]"
201030-49 = "3;린 사복;99;……전부터 생각했던 것이지만, 그 자신감만큼은 정말 높게 평가하고 싶군요."
201030-50 = "3;린 사복;01;주위의 시선에 연연하지 않고, 패배에 주눅들지 않은 채, 몇 번이고 도전하는 그 의지는 당신의 장점 중 하나였으니까요."
201030-51 = "3;린 사복;08;덕분에 게임을 할 때도 패배로 끝나는 법이 없었었죠. "

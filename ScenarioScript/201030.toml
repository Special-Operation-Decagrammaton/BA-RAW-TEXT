[translation]
201030-1 = "第3話;クイーンズ・ギャンビット"
201030-2 = "矯正局・特殊収容施設A棟の面会室"
201030-4 = "囚人番号1192番。面会だ。"
201030-10 = "こんな時間に誰かと思えば……。"
201030-11 = "何の用ですか、連邦生徒会長代行。#nしかも私服じゃないですか。"
201030-15 = "シャーレの先生もご一緒とは……自慢ですか？"
201030-16 = "違います。なぜ皆さんそのような話に結びつけたがるのですか。"
201030-17 = "様子を見に来ただけです。伺いたいこともありますが。"
201030-18 = "はぁ……。"
201030-19 = "別に代理か書面でよかったのでは？"
201030-20 = "連邦生徒会長代行の業務は忙しいでしょうに。#nわざわざ矯正局まで来るなんて――"
201030-21 = "ご心配には及びません。本日はお休みをいただいております。"
201030-22 = "引き継ぎもしておりますので。大きな問題はないかと。"
201030-23 = "……。"
201030-24 = "せっかくの休日[ruby=かたき]に敵の[/ruby]顔を見にくるなんて、あなたはバカですか？"
201030-25 = "それとも、からかいに来たのですか？"
201030-26 = "無理強いはしません。後日、書面にて改めてもよろしいでしょうか。"
201030-30 = "ま、待ってください。嫌とは言ってないですよ？勝手に帰らないでください！"
201030-31 = "こ、こほん……私もちょうど暇していたところでしたし？#nせっかく来てくれたのですから、少しくらいなら時間を作りますよ。"
201030-32 = "[s] \"矯正局でも忙しいの？\""
201030-33 = "も、もちろんです。朝はジョギングをして……。"
201030-34 = "その後は優れたリーダーシップをつけるべく本を読み……。"
201030-35 = "えっと、食後は、その……。"
201030-39 = "……ええ、そうですよ。これといってやることはありません。"
201030-40 = "ここは娯楽が少ないですし。話す相手もあまりいませんので。"
201030-41 = "FOX小隊と施設を分けてくれたのはありがたいですが、#n他の誰とも会えないなんて――もはや独房のようなものでしょう？"
201030-42 = "外のニュースも入ってこなければ、面会に来る人もいない……！"
201030-43 = "あ、別にあなた達が面会に来てくれて嬉しいわけじゃないですからね！？"
201030-44 = "[s] \"寂しかったんだね……。\""
201030-46 = "……幸い、健康に問題はなさそうですね。"
201030-47 = "当然です。いつか上に立つ者として、一度失敗した程度で体調を崩すようでは「超人」とは呼べないでしょう？"
201030-48 = "今は矯正局送りの身ですが、いつかまたクーデターを成功させて、#nその座を取り戻してみせますから！"
201030-49 = "……前から思っていましたが、その自信だけは高く評価しますよ。"
201030-50 = "周りの目を気にせず、敗北に落ち込むこともなく。#n何度も挑戦するその意志は、あなたの長所の1つです。"
201030-51 = "おかげで、ゲームであなたに勝ち越したことはありませんでしたね。"
201030-55 = "……せっかくですし、チェスでも一局、いかがですか？"
201030-62 = "ルークh8、チェック。"
201030-63 = "ビショップh3。"
201030-64 = "ナイトg6。"
201030-65 = "ルークf7、チェック。"
201030-66 = "キングh6。"
201030-67 = "クイーンg6、チェック。"
201030-71 = "……投了です。"
201030-72 = "相変わらず、その腕は健在ですね。私では敵いません。"
201030-74 = "ここでずっと練習していましたから。前よりは上手くなったんじゃないですかね。"
201030-78 = "……チェスはこうも簡単なのに、あの時はどうして勝てなかったんでしょう。"
201030-82 = "はぁ……。"
201030-83 = "な、なんですかその顔は！何か変なことを言いましたか？"
201030-84 = "まだ理解していないのですね。"
201030-85 = "いくら優れた戦術を持っていても、現実はチェス盤のようには動きません。"
201030-86 = "あなたも、あなたの部下たちも、超人ではないのですから。"
201030-87 = "人は駒ではありません。完璧に統制しようとすればするほど、制御できなくなります。"
201030-88 = "超人になれなかった凡人には、現状維持が最善ですよ。"
201030-89 = "あなたなら可能だったとでも？"
201030-90 = "いいえ。私も超人ではありませんので。"
201030-91 = "まさに駒のように……人を完璧に制御できる超人は、私が知る限り彼女しかいません。"
201030-95 = "……ええ。「彼女」ならできたでしょう。"
201030-96 = "いいえ、自分の能力を証明する必要もなかったはずです。#nキヴォトスの生徒は、彼女に全幅の信頼を寄せていたのですから。"
201030-97 = "私も、彼女が失踪してから……ずっとその背中を追ってきました。"
201030-98 = "不在を補完するにはどうすればいいか。#n超人になるためには何を成し遂げねばならないのか。"
201030-99 = "あらゆる記録を調べ、彼女が残したものを使ってみましたが……。"
201030-100 = "結局は、このザマです。"
201030-101 = "キヴォトス全土が混乱し、機能不全に陥った時――"
201030-102 = "あなたがFOX小隊に命令し、シャーレの地下室から持ってこさせようとしたものは何ですか？"
201030-103 = "……。"
201030-104 = "人払いが必要であれば、代行の権限で要請しますよ。"
201030-108 = "いえ、その必要はありません。"
201030-109 = "あれの正体が明かされたところで、大して変わることはありませんから。"
201030-113 = "FOX小隊がシャーレの地下から持ち帰ったのは、普通のスマートウォッチでした。"
201030-114 = "……いえ、[ruby=・   ・   ・   ・   ・   ・   ・   ・   ・   ・   ・   ・   ・]そうとしか思えなかったもの[/ruby]と言ったほうが正しいでしょうか。"
201030-115 = "どういう意味ですか？"
201030-116 = "連邦生徒会長の失踪以降、密かに彼女が残したものを調べていました。"
201030-117 = "ほとんどは茶器や学用品など、いたって普通のものばかりでした。#nただ、中には強力なオーパーツのようなものもありました。#nそれこそ、サンクトゥムタワーの制御権限を委譲できるような。"
201030-118 = "ええ、シャーレの先生が持っている――「シッテムの箱」の話です。"
201030-119 = "キヴォトスのインフラを片手で制御できるほどのオーパーツが存在するのであれば、#nそれに準ずる……いえ、より強力なものもあるかもしれないと思っていました。"
201030-120 = "そしてついに、「シッテムの箱」に準ずるオーパーツが、#nシャーレの地下室にある[ruby=せいひつ]聖櫃[/ruby]の中に保管されていることを突き止めたのです。"
201030-121 = "その名は――「シャーケードの杖」。"
201030-122 = "連邦生徒会長の記録によると、真実を見抜く能力を持つのだとか。"
201030-123 = "[s] \"シャーケードの杖……？\""
201030-124 = "やはり先生はご存知でしたか。"
201030-125 = "[s1] \"いや、詳しくは知らないけど……。\"\n[s2] \"どこかで聞いたことあるような気がして……。\""
201030-128 = "……なんだ、期待して損しました。"
201030-129 = "結局、「真実を見抜く」というのが何を意味するのかは分かりませんでした。#nそれでも、私はFOX小隊に回収を命じました。"
201030-130 = "「シャーケードの杖」が本当に「シッテムの箱」に準ずるオーパーツなのであれば、#nクーデターはもちろん、連邦生徒会を掌握することだってできるのですから。"
201030-131 = "……ですが実際の「シャーケードの杖」は、単なるスマートウォッチにしか見えませんでした。"
201030-132 = "様々な手段で調べてみたものの、何も分からず……#nクーデターを起こした頃にはその存在をすっかり忘れていました。"
201030-133 = "「シャーケードの杖」は、聖櫃に戻して連邦生徒会の倉庫に保管してあります。#n誰かが触ってない限り、まだそこにあると思いますよ。"
201030-134 = "[s] \"どうしてシャーケードの杖は反応しなかったのかな。\""
201030-135 = "さあ……。"
201030-136 = "正しい使用方法があるのか、扱えるだけの能力が私にはなかったのか……。"
201030-137 = "もしくは……単に連邦生徒会長の記録が間違っていたのかもしれません。"
201030-138 = "とはいえ、シッテムの箱を扱える[USERNAME]先生でしたら、#n真の価値を見抜けるかもしれません。"
201030-139 = "……戻り次第、聖櫃を探してみます。"
201030-140 = "[s] \"結局、仕事になっちゃったね……。\""
201030-141 = "お気になさらず。ちゃんと満喫していましたよ。"
201030-142 = "思い出のものを食べ、腐れ縁の旧友とチェスを楽しむ……#n普段であればできないことですから。"
201030-146 = "……今は、この休息を大切にしなければ。"
201030-147 = "カヤ。よろしければもう一局お願いしてもよろしいでしょうか。#n先ほどの雪辱を果たさせてもらいます。"
201030-148 = "まあ、チェスならいくらでも……。"
201030-149 = "手加減はしませんよ。"
201030-153 = "一手は……ポーンをd4へ。"
201030-154 = "ポーンd5。"
201030-155 = "……行政官。"
201030-156 = "あなたの性格では、気が乗らないと思いますが――"
201030-157 = "効率的にミドルゲームを進めるためには、#nポーンを差し出すギャンビットも悪くないものですよ。"
201030-158 = "ポーンc4。"
201030-162 = "……ポーンe6。お断りします。"
201030-164 = "次回;空色の懐かしさ"

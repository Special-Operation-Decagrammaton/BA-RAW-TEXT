[translation]
13390-1 = "第39話;制約解除"
13390-2 = "星野前輩！！"
13390-3 = "前輩！！"
13390-4 = "星野前輩！！"
13390-5 = "前輩……"
13390-7 = "……竟然真的恢復了。#n這是……怎麼回事……"
13390-12 = "白子醬、茜香醬、野乃美醬、綾音醬……還有白子醬……"
13390-16 = "風紀委……不，[ruby= ・     ・ ]陽奈[/ruby]醬……"
13390-17 = "重逢的喜悅晚點再慢慢享受吧。"
13390-24 = "啊啊，你說的對。#n先把那東西解決掉再說吧。"
13390-28 = "這是最最最後一場戰鬥了！！[USERNAME]老師──！！"
13390-29 = "你不是很愛耍花招，甚至還破壞規則嗎──！！"
13390-30 = "所以我現在要搬出第五個攻略方法……！"
13390-31 = "隱藏攻略，「以犯規反擊犯規」。"
13390-32 = "嘻嘻，嘻嘻嘻嘻──！！"
13390-33 = "我終於分析出來了──你的系統，還有你的力量。#n你那些骯髒的小手段，終於可以由我全部粉碎了！"
13390-34 = "你已經被我給看透了！#n那東西存在效能的限制，對吧？"
13390-35 = "老師能夠指揮的學生，最多只有4+2人。"
13390-36 = "換句話說，「老師」一次能指揮的人數上限為6個人，超過這個數字就不行了吧！"
13390-37 = "對吧，我說的對吧──？#n這是我根據至今收集到的所有情報，分析歸納出來的事實！！"
13390-38 = "既然如此，從我的世界來的「萬神的星座」只要比那東西更強就行了。#n這樣一來，勝利就是我的了！"
13390-39 = "6個人？嘻嘻……不，我要喚醒更加強大的武器──#n你們所有人聯合起來也難以攻略的那種武器！！"
13390-40 = "「賽特的憤怒」是你現在的系統絕對無法攻略的敵人，你在祂的面前毫無勝算！！"
13390-41 = "怎麼樣，聽起來挺犯規的吧！比起你那些無聊的小伎倆──"
13390-46 = "[ns1]「我等很久了。」\n[ns2]「終於輪到我表現了。」"
13390-49 = "是！星奈醬在「希迪姆的箱子」深處，發現了一個被鎖住的新程序！"
13390-50 = "星奈醬！"
13390-51 = "開始說明。這個程序原本應該是無法啟動的。#n不過現在「希迪姆的箱子」包含我和彩奈前輩兩人的作業系統……"
13390-52 = "所以應該可以在一定的限制下，執行目前制約所不允許的運算作業。"
13390-53 = "老師，請下達命令。"
13390-57 = "[ns]「就讓我為你介紹一下我們的新[ruby=Contents]技術[/ruby]吧。」"
13390-59 = "確認命令。"
13390-60 = "開始單次啟動希迪姆的箱子制約解除程序「Perez-Uzzah」。"
13390-65 = "認證完畢。"
13390-66 = "已確認老師的連接程序。#n萬事拜託了。"
13390-67 = "希迪姆的箱子，制約解除。#n程序「Perez-Uzzah」限定啟動中。"
13390-68 = "待命中。#n老師，請下達命令。"
13390-69 = "現在的我是無敵的，比平常還要強2倍。"
13390-70 = "我會和彩奈前輩合力支援老師。"
13390-74 = "……！？"
13390-75 = "什麼……？"
13390-76 = "修改了原本的系統……？"
13390-77 = "還解除了……目前為止的系統制約？"
13390-81 = "[ns3]「到此為止了。」\n[ns4]「我不會再讓任何人死在阿拜多斯自治區。」"
13390-90 = "[ns]「我不會再讓阿拜多斯的任何人經歷痛苦了。」"
13390-94 = "你，你在胡說什麼……？"
13390-95 = "那跟這場勝負……跟這座古都有什麼關聯……為什麼？#n你到底在說些什麼……？"
13390-96 = "[ns]「假如我觸手可及的世界，有孩子正深受痛苦折磨……」"
13390-98 = "[ns] 假如我周圍的世界，迴盪著那些孩子的祈禱……"
13390-100 = "[ns5]「無論在什麼時候──」\n[ns6] 無論在什麼時候──"
13390-103 = "[ns7]「那都是和孩子們一起生活的大人應該背負的責任。」\n[ns8] 那都是和孩子們一起生活的大人應該背負的責任。"
13390-106 = "[ns9] 「由[ruby=孩子]學生[/ruby]背負責任的世界，根本不應該存在。」\n[ns10] 由[ruby=孩子]學生[/ruby]背負責任的世界，根本不應該存在。"
13390-110 = "[ns11] 拿出大人的卡片\n[ns12] 拿出大人的卡片"
13390-113 = "那是什麼！？"
13390-114 = "那……"
13390-115 = "到底……"
13390-116 = "是什麼鬼東西……？"
13390-117 = "咦，咦……咦咦咦？"
13390-118 = "[ruby=pay to win]大人的卡片[/ruby]？？？？"
13390-119 = "那，那，那種東西……哪有這樣的？"
13390-120 = "規則呢……？法典呢……？"
13390-121 = "勝利呢……？勝，勝負……如，如，如果真的有那種東西的話……"
13390-122 = "搞什麼啊……那，那那那那不是違反規則嗎？#n不就是犯規嗎……"
13390-123 = "那樣不行吧……哪有人這樣的，遊戲可以這樣玩嗎……？啊，啊啊？"
13390-124 = "那種東西我怎麼可能贏得了？？#n這，這這這根本是犯規吧？犯規……"
13390-125 = "犯規，犯規，犯規，犯規！"
13390-126 = "你犯規──！！！"
13390-127 = "我被騙了！！！"
13390-128 = "這場不算，不算不算！不算啦！！這場遊戲不算！！"
13390-129 = "不算────！！"
13390-130 = "已強制連結。"
13390-131 = "────！？"
13390-132 = "我將轉達老師的訊息。#n「地下生活者」，請你仔細聽。"
13390-137 = "[ns13]「對於只會用勝利和敗北來定義這個世界的小屁孩──」\n[ns14]「我只能用大人的力量來教訓他了。」"
13390-140 = "你，你你你說什麼…………！？"
13390-142 = "意思就是老師沒時間陪你這種長不大的小屁孩玩。"
13390-143 = "……！！！！"
13390-147 = "畢竟老師是大人，還有很多重要的事情要做。#n順帶一提，他昨天也整晚都在工作。"
13390-148 = "（星奈醬……怎麼有點可怕……）"

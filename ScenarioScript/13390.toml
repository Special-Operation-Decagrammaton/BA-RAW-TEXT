13390-32 = "หึหึ หึหึหึหึ!!"
13390-33 = "ในที่สุดข้าก็วิเคราะห์ระบบของแกเสร็จแล้ว ความแข็งแกร่งของแกน่ะ ละเมิดกฎที่สกปรกแบบนั้นน่ะ ตอนนี้ข้าจะทำลายมันได้ทั้งหมดแล้ว!"
13390-34 = "ข้าเข้าใจทุกอย่างแล้ว! สิ่งนั้นมีขีดจำกัดในการใช้ประโยชน์ ใช่มั้ยล่ะ?"
13390-35 = "คนที่จะรับการสั่งการของ <ครู> ได้ อย่างมากสุดก็แค่ 4+2 คน"
13390-36 = "นั่นแปลว่าแกสั่งการคนได้มากที่สุดแค่ 6 คน จะมากกว่านั้นไม่ได้!"
13390-37 = "ใช่มั้ยล่ะ ข้าพูดถูกใช่มั้ย? นี่คือความจริงที่สรุปได้จากการวิเคราะห์ข้อมูลทั้งหมดที่ได้มา!!"
13390-38 = "ถ้าอย่างนั้น ก็แค่ทำให้ <กลุ่มดาวแห่งทวยเทพทั้งมวล> ที่มาจากโลกของข้าแข็งแกร่งกว่าคนใน#nบัญชาของแก เท่านี้ข้าก็ชนะ!!"
13390-39 = "6 คนงั้นเหรอ? หึหึ... ไม่สิ ต่อให้ต้องเผชิญหน้ากับทุกคนที่รวมตัวกันอยู่ที่นั่น ข้าก็จะทำให้สิ่งนั้นโจมตี#nไม่ได้!!"
13390-40 = "<ความโกรธแค้นของเซ็ต> ในระบบของแกในตอนนี้จะโจมตีไม่ได้ และจะถูกบีบบังคับให้พ่ายแพ้!!"
13390-41 = "ว่ายังไงล่ะ นี่ละการละเมิดกฎ! มันฉลาดกว่าที่แกทำเป็นไหนๆ"
13390-46 = "[ns1] \"ครูรออยู่นานเลย\"\n[ns2] \"ในที่สุดก็ถึงตาของครูแล้วสินะ\""
13390-49 = "ค่ะ! พลาน่าจังค้นพบกระบวนการใหม่ที่ซ่อนอยู่ในส่วนลึกของ <กล่องแห่งซิสดิม> แล้วค่ะ!"
13390-50 = "พลาน่าจัง!"
13390-51 = "ขออธิบาย เดิมทีแล้วนี่เป็นกระบวนการที่เกิดขึ้นเองไม่ได้ค่ะ แต่ถ้าเป็น <กล่องแห่งซิสดิม> ที่มี OS ของทั้งรุ่นพี่อะโรน่าและของฉันอยู่ละก็..."

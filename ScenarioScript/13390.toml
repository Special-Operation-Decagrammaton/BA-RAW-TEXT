13390-1 = "Episode 39;Final Restriction Release"
13390-2 = "Hoshino!"
13390-3 = "Hoshino!"
13390-4 = "Hoshino!"
13390-5 = "Hoshino...!"
13390-7 = "...You truly returned. How...?"
13390-12 = "Shiroko. Serika. Nonomi. Ayane...and Shiroko..."
13390-16 = "Head Pre— No, Hina..."
13390-17 = "Save the reunion for later."
13390-24 = "Ah. Right, right. Let's handle that thing over there first."
13390-28 = "The final, final, FINAL battle!! [USERNAME] Sensei!"
13390-29 = "You've thwarted me with your cowardly cheating, but no longer!"
13390-30 = "I will reveal my fifth strategy, here and now!"
13390-31 = "The hidden strategy! \"Face cheating with cheating.\""
13390-32 = "Heehee! Heeheehee!!"
13390-33 = "My analysis is complete at last! I will lay bare every weakness of your system, every ounce of your so-called strengths! I've unraveled your dirty, cheating tactics!"
13390-34 = "That's right! I've uncovered every last one of them! That contraption of yours has its limits! Isn't that so?!"
13390-35 = "There is a capacity to the number of people you can command...four plus two..."
13390-36 = "...Six! The maximum units you can deploy is six, Sensei! Beyond that is beyond your capabilities!"
13390-37 = "Yes? Right? Yeees?! Through the glorious process of induction, drawn from every shred of information I have slyly gleaned... I've ripped open your weakness!"
13390-38 = "Meaning...the Celestial Pantheon from my world needs only surpass that. And then, at long last, victory will be mine!"
13390-39 = "Six? A mere six? Heeheehee! I shall far exceed that! Not even all of you combined will be able to summon the power to defeat me!"
13390-40 = "The paltry power of your system pales in comparison to the Fury of Set! Taste your defeat! Revel in your inferiority!"
13390-41 = "I will outcheat you, outsmart you, outdo you! I will prevail in every—"
13390-46 = "[ns1] \"Thank you for waiting.\"\n[ns2] \"Is it my turn, then?\""
13390-49 = "Yes! Plana found a process that was locked deep inside the Shittim Chest."
13390-50 = "Plana!"
13390-51 = "Explanation. Running this process is usually impossible. But there are two operating systems currently residing in the Shittim Chest, Arona and I."
13390-52 = "It is not unlimited, but we can output power at a higher rate."
13390-53 = "Your orders. Sensei."
13390-57 = "[ns] \"Let's show them our new skill.\""
13390-59 = "Confirmed."
13390-60 = "Perez Uzzah operations initiated. Final Restriction Release of the Shittim Chest in progress."
13390-65 = "Verification complete."
13390-66 = "Connection process verified. Thank you, Sensei."
13390-67 = "Shittim Chest restrictions removed. Process Perez Uzzah. Limited operation in progress."
13390-68 = "Standing by. Please issue your commands, Sensei."
13390-69 = "I'm twice as strong as usual. I feel invincible."
13390-70 = "I'll join my power with Arona's to support you, Sensei."
13390-74 = "...?!"
13390-75 = "What did you say...?"
13390-76 = "You've manipulated the system...?"
13390-77 = "You lifted...the current system's restrictions?"
13390-81 = "[ns3] \"Enough out of you.\"\n[ns4] \"I won't let anyone else die here.\""
13390-90 = "[ns] \"I won't let a single person from Abydos suffer any longer.\""
13390-94 = "Wh-What is this...ridiculousness?"
13390-95 = "What does this drivel...have to do with our fight? That won't help you win... What are you SAYING?!"
13390-96 = "[ns] \"If there's a child who's suffering, and it's within my power to help them...\""
13390-98 = "[ns] If that child has a wish, and I have the power to grant it..."
13390-100 = "[ns5] \"Then that'll always be...\"\n[ns6] Then that'll always be..."
13390-103 = "[ns7] \"...the duty of the adults who share their world with children.\"\n[ns8] ...the duty of the adults who share their world with children."
13390-106 = "[ns9] \"I won't have it any other way.\"\n[ns10] I won't have it any other way."
13390-110 = "[ns11] Pull out your credit card.\n[ns12] Pull out your credit card."
13390-113 = "What the hell is that?!"
13390-114 = "What..."
13390-115 = "...could..."
13390-116 = "...that be...?"
13390-117 = "H-Huhhh?"
13390-118 = "A credit card?! P-Pay to win in MY campaign?!"
13390-119 = "Th-Th-That's...nonsense..."
13390-120 = "What about the codex?! The rules?!"
13390-121 = "M-My victory...?! I-In a match...you know what I mean!"
13390-122 = "What?! That's, that's, that's, that's, that's, a rule violation...! Cheating!"
13390-123 = "Th-This is inconceivable! Unallowed!! Games should not be unwinnable...! Ah? Gah?!"
13390-124 = "How am I to prevail over such a thing? Ch-Ch-Ch-Cheater! Cheating!"
13390-125 = "It's cheating, cheating, cheating, CHEATING!"
13390-126 = "CHEATING!!"
13390-127 = "YOU DECEIVER!"
13390-128 = "No-no-no-no-no... This doesn't count... This doesn't count! "
13390-129 = "Invalid—"
13390-130 = "Forced connection established."
13390-131 = "What?!?! "
13390-132 = "Delivering Sensei's message. Underground Dweller. Listen closely."
13390-137 = "[ns13] \"A brat like you, who can only define life by victory and defeat...\"\n[ns14] \"...needs to be properly scolded by an adult.\""
13390-140 = "Wh-Wh-Wh-What...?!"
13390-142 = "Translation: Sensei does not need to waste their time with a \"brat\" who could not grow into an adult."
13390-143 = "...!!"

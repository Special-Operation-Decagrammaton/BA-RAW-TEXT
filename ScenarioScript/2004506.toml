[translation]
2004506-1 = "無法拒絕的提案"
2004506-2 = "（以遊客的身分參加了菲娜的導覽團）"
2004506-4 = "接下來請跟著現場的導覽員入場。"
2004506-5 = "之後請在集合時間回到巴士這邊哦！"
2004506-7 = "哦……好氣派的城堡啊。"
2004506-8 = "不管來幾次都覺得很震撼呢。"
2004506-9 = "希望下次有機會進去裡面參觀。"
2004506-10 = "[s1]（既然如此，不如去幫菲娜的忙吧）\n[s2]「不介意的話，要不要代替我進去參觀？」"
2004506-13 = "咦，可以嗎？真不好意思。"
2004506-14 = "那我就久違享受一下旅行的感覺囉！"
2004506-16 = "（為了協助菲娜而回到了巴士）"
2004506-18 = "天氣預報說會下雨，先把傘放在這裡……"
2004506-22 = "要發放的宣傳單在這邊……"
2004506-23 = "水瓶一個、兩個、三個……#n再數一次。一、二、三……"
2004506-24 = "雖然已經檢查過了，但以防萬一還是……一個……兩個……"
2004506-25 = "[s]「菲娜，辛苦你了。」"
2004506-26 = "啊！！老師！"
2004506-27 = "嘿嘿～我正在準備下個行程！"
2004506-28 = "不過老師你為什麼……啊啊！？#n難道是不才菲娜又忘記預約了嗎！？"
2004506-29 = "[s]（說明來龍去脈，表示自己是來幫他的）"
2004506-30 = "原來如此！不過現在的菲娜，已經跟以前不一樣了！"
2004506-31 = "為了避免出錯，我確實檢查了兩次、三次、五次！"
2004506-32 = "既然都說到這裡了，順便再來一次吧。#n一個……兩個……"
2004506-33 = "[s3]「這樣應該差不多了。」\n[s4]「要不要休息一下？」"
2004506-36 = "可是我一想到萬一又出錯就……"
2004506-37 = "只好趁有空的時候多確認……"
2004506-38 = "[s5]「菲娜已經做得很好了。」\n[s6]「想要把工作做好，適時休息也是必要的。」"
2004506-41 = "老師居然對我這麼肯定，真是令我受寵若驚……！"
2004506-42 = "那麼就聽老師說的，暫時休息一下吧……！"
2004506-44 = "（就這樣和菲娜一起在車內休息）"
2004506-47 = "― [log=피나 가이드]唔嗯，哈！[/log][wa:2790] "
2004506-49 = "― [log=피나 가이드]總覺得，好像太緊張了。[/log][wa:1420] "
2004506-52 = "― [log=피나 가이드]跟客人們在一起的期間很投入，[/log][wa:2600] "
2004506-54 = "― [log=피나 가이드]所以沒注意到……[/log]"
2004506-57 = "― [log=피나 가이드]像這樣跟老師待在一起，[/log][wa:1120] "
2004506-59 = "― [log=피나 가이드]心情才放鬆了下來。[/log][wa:1080] "
2004506-62 = "― [log=피나 가이드]想要行動敏捷，伸展是必要的！再來一次！[/log][wa:3770] "
2004506-65 = "― [log=피나 가이드]嗯，嗯嗯，唔嗯～！[/log][wa:2040] "
2004506-68 = "― [log=피나 가이드]咦？最好放鬆一下肩膀的力氣……是嗎？[/log][wa:4370] "
2004506-71 = "― [log=피나 가이드]那，那個……該說這是為了以導覽員的身分[/log][wa:5620] "
2004506-73 = "― [log=피나 가이드]振作嗎……[/log]"
2004506-76 = "― [log=피나 가이드]兩人獨處的話……那個……[/log][wa:2020] "
2004506-79 = "― [log=피나 가이드]就會不自覺地放鬆下來……[/log][wa:2640] "
2004506-83 = "咦？門怎麼關著？"
2004506-84 = "還沒到集合時間嗎？"
2004506-85 = "Oops！？"
2004506-86 = "已經這麼晚了！！#n我得去迎接客人才行！！"
2004506-93 = "歡迎回來～辛苦了～"
2004506-97 = "真好玩～"
2004506-102 = "哎呀～多虧老師，我今天參觀得很開心～"
2004506-106 = "！！！"
2004506-107 = "啊……唔……請，請上車吧！"
2004506-112 = "[ns]「菲娜？你怎麼了？」"
2004506-113 = "那……那個……老師……"
2004506-114 = "我剛才急著下車，結果不小心把鞋子留在巴士上了！！"
2004506-115 = "[s7]「先不要表現出來！」\n[s8]「盡量不要看腳下！」"
2004506-118 = "是……是！！"
2004506-120 = "（等客人們都上車後，菲娜才趕緊穿上了鞋子）"

[translation]
2004506-1 = "An Unrefusable Offer"
2004506-2 = "I tagged along on Pina's tour."
2004506-4 = "The castle's docent will take care of you from here!"
2004506-5 = "Please return to the bus on time! Thank you!"
2004506-7 = "Oh... It's incredible!"
2004506-8 = "I come here a lot, and even the grounds are breathtaking!"
2004506-9 = "I really wish I could afford to go inside..."
2004506-10 = "[s1] (\"I'll use this opportunity to help Pina.\")\n[s2] \"Excuse me, would you like my spot on the tour?\""
2004506-13 = "Truly? Thank you!"
2004506-14 = "What a wonderful opportunity! I can't wait!"
2004506-16 = "I returned to the bus to help Pina."
2004506-18 = "Let's see...umbrellas in case there's a drizzle..."
2004506-22 = "And we can't forget these handy brochures..."
2004506-23 = "And for water bottles, I have a one, a two, a... How many, again?"
2004506-24 = "Looks right, but I should quadruple-check, just in case! A one...a two..."
2004506-25 = "[s] \"You're working hard, Pina.\""
2004506-26 = "Ah!!! Sensei!"
2004506-27 = "Eh... I was just checking supplies. You can't be too prepared!"
2004506-28 = "But why are you... Aah?! Did I mess up your reservation?"
2004506-29 = "[s] Explain to Pina that I came here to help her."
2004506-30 = "I see! But, as you can see, I have everything under control!"
2004506-31 = "I checked everything thoroughly, just to ensure perfection. No more mistakes!"
2004506-32 = "That said, let's count one more time. A one...a two..."
2004506-33 = "[s3] \"I think that's enough.\"\n[s4] \"How about a little break?\""
2004506-36 = "But...I don't want to fail again."
2004506-37 = "Since I have free time, I should use it to prepare for work, right?"
2004506-38 = "[s5] \"You're already doing well, Pina.\"\n[s6] \"Resting during your free time will actually improve your work.\""
2004506-41 = "What a thing to hear from my mentor!"
2004506-42 = "Well, if you insist, perhaps I will take a small...reprieve."
2004506-44 = "Pina and I decided to rest in the bus."
2004506-47 = "― [log=피나 가이드]Umm!!! Ha![/log][wa:2590] "
2004506-49 = "― [log=피나 가이드]Seems like I was feeling tense.[/log][wa:620] "
2004506-52 = "― [log=피나 가이드]I never really noticed when I was with guests[/log][wa:1360] "
2004506-54 = "― [log=피나 가이드]because I was so focused...[/log]"
2004506-57 = "― [log=피나 가이드]Being with you like this[/log][wa:600] "
2004506-59 = "― [log=피나 가이드]makes me feel relaxed.[/log][wa:560] "
2004506-62 = "― [log=피나 가이드]Stretching is essential to be nimble! Again![/log][wa:2770] "
2004506-65 = "― [log=피나 가이드]Hm, hmm. U-Ugh![/log][wa:1800] "
2004506-68 = "― [log=피나 가이드]What? It's nice to see me...relax?[/log][wa:3730] "
2004506-71 = "― [log=피나 가이드]W-Well... As a guide, [/log][wa:5500] "
2004506-73 = "― [log=피나 가이드]spirit and responsibility are definitely important...[/log]"
2004506-76 = "― [log=피나 가이드]But when there's just the two of us... How should I put it...[/log][wa:60] "
2004506-79 = "― [log=피나 가이드]Um, I end up relaxing...[/log][wa:2160] "
2004506-83 = "Hey! The door's locked."
2004506-84 = "Are we too early?"
2004506-85 = "Oops!"
2004506-86 = "They're back! I need to work!"
2004506-93 = "Welcome back! Did everyone have fun?"
2004506-97 = "It was marvelous!"
2004506-102 = "Breathtaking! Thank you for giving me your spot!"
2004506-106 = "!!!"
2004506-107 = "Ah... Uh... W-Welcome!"
2004506-112 = "[ns] \"Pina? What's wrong now?\""
2004506-113 = "Um...the thing is... Sensei, Boss..."
2004506-114 = "I just realized I left my heels in the bus!!!"
2004506-115 = "[s7] \"First, act natural!\"\n[s8] \"Avoid looking down. Eyes on the guests!\""
2004506-118 = "R-Right!!!"
2004506-120 = "After boarding the guests, Pina dashed to the back of the bus and slipped on her heels."

[translation]
2004506-1 = "ข้อเสนอที่ปฏิเสธไม่ได้"
2004506-2 = "(คุณครูมาเป็นลูกทัวร์ของพีน่า)"
2004506-4 = "จากตรงนี้ไป ทุกท่านเข้าไปข้างในตามการแนะนำของไกด์ที่นี่ได้เลยค่ะ"
2004506-5 = "แล้วกลับมาที่รถภายในเวลานัดพบที่กำหนดนะคะ!"
2004506-7 = "โห... ปราสาทนี้สวยจังเลย"
2004506-8 = "ฉันมาที่นี่ก็หลายครั้งแล้ว แต่เห็นกี่ครั้งก็ยังน่าประทับใจเหมือนเดิมเลยละ"
2004506-9 = "อยากเข้าไปดูในตัวปราสาทดูสักครั้งจัง"
2004506-10 = "[s1] \"เอาตั๋วใบนี้เข้าไปเที่ยวชมข้างในได้เลย\"\n[s2] \"งั้นให้คุณคนขับรถไปเที่ยวข้างในแทนแล้วกัน\""
2004506-13 = "โอ้ จริงเหรอ? ใจดีจริงๆ เลยนะเรา"
2004506-14 = "งั้นระหว่างนี้ก็ขอเป็นนักท่องเที่ยวดูหน่อยแล้วกันนะ!"
2004506-16 = "(แล้วคุณครูก็กลับไปที่รถเพราะอยากช่วยพีน่า)"
2004506-18 = "พยากรณ์อากาศบอกว่าจะฝนตก งั้นก็เตรียมร่มไว้..."
2004506-22 = "ใบปลิวที่ต้องเอาไปแจกอยู่ตรงนี้..."
2004506-23 = "ขวดน้ำมีหนึ่ง สอง สาม... ไม่สิ เอาใหม่ๆ หนึ่ง สอง สาม..."
2004506-24 = "ที่จริงก็เช็กหมดแล้ว แต่อีกรอบเพื่อความชัวร์ดีกว่า... หนึ่ง... สอง..."
2004506-25 = "[s] \"เหนื่อยแย่เลยนะ พีน่า\""
2004506-26 = "อ๊ะ!! คุณครู!"
2004506-27 = "แหะๆ ฉันกำลังเตรียมตัวสำหรับสถานที่ท่องเที่ยวต่อไปอยู่ค่ะ!"
2004506-28 = "ว่าแต่ทำไมคุณครูถึง... อ๊ะ?! หรือว่าพีน่าลืมให้ตั๋วเข้าชมคุณครูคะ?!"
2004506-29 = "[s] (อธิบายว่าที่มาหาเพราะอยากช่วยงานพีน่า)"
2004506-30 = "อย่างนี้สินะคะ! แต่พีน่าในตอนนี้ไม่ใช่พีน่าคนเดิมแล้วนะ!"
2004506-31 = "ตอนนี้ไม่ว่าจะทำอะไร พีน่าจะเช็กซ้ำๆ สี่ห้าครั้งเลยค่ะ จะได้ไม่มีอะไรผิดพลาดยังไงล่ะคะ!"
2004506-32 = "ไหนๆ ก็พูดถึงแล้ว งั้นขอนับใหม่อีกรอบ หนึ่ง... สอง... "
2004506-33 = "[s3] \"ครูว่าเท่านี้ก็น่าจะเพียงพอแล้วนะ\"\n[s4] \"ลองพักสักหน่อยมั้ย?\""
2004506-36 = "แต่ฉันกลัวว่าจะมีอะไรผิดพลาดอีก..."
2004506-37 = "ตอนมีเวลา ฉันก็เลยอยากเช็กให้แน่ใจค่ะ..."
2004506-38 = "[s5] \"พักหน่อยเถอะ ตอนนี้พีน่าทำได้ดีแล้วละ\"\n[s6] \"การพักผ่อนเมื่อมีเวลาจะทำให้เราทำงานได้ดีนะ\""
2004506-41 = "ถ้าท่านอาจารย์ว่าอย่างนั้น พีน่าก็ซาบซึ้งใจนะคะ...!"
2004506-42 = "งั้นพีน่าจะพักสักหน่อยอย่างที่ท่านอาจารย์แนะนำค่ะ...!"
2004506-44 = "(แล้วคุณครูก็พักผ่อนในรถกับพีน่า)"
2004506-47 = "― [log=피나 가이드]อะ... อื้ม!! เฮ้อ![/log][wa:2270] "
2004506-49 = "― [log=피나 가이드]สงสัยฉันกำลังประหม่าอยู่น่ะค่ะ[/log][wa:660] "
2004506-52 = "― [log=피나 가이드]ตอนอยู่กับลูกทัวร์ ฉันมัวแต่ตั้งใจทำงาน[/log][wa:1600] "
2004506-54 = "― [log=피나 가이드]ก็เลยไม่รู้ตัว...[/log]"
2004506-57 = "― [log=피나 가이드]พอได้อยู่กับคุณครูแบบนี้[/log][wa:600] "
2004506-59 = "― [log=피나 가이드]ฉันโล่งใจมากเลยค่ะ [/log][wa:680] "
2004506-62 = "― [log=피나 가이드]ถ้าอยากคล่องแคล่วก็ต้องยืดกล้ามเนื้อ! อีกครั้งหนึ่ง![/log][wa:2450] "
2004506-65 = "― [log=피나 가이드]อืม... อืม... อะ... อึก![/log][wa:1440] "
2004506-68 = "― [log=피나 가이드]คะ? ฉันดูดี... ตอนรีแล็กซ์เหรอคะ?[/log][wa:3770] "
2004506-71 = "― [log=피나 가이드]อะ...เอ่อ... พลังและความรับผิดชอบ [/log][wa:5020] "
2004506-73 = "― [log=피나 가이드]เป็นสิ่งที่สำคัญของคนเป็นไกด์...[/log]"
2004506-76 = "― [log=피나 가이드]แต่ตอนอยู่ด้วยกันสองคน... จะว่ายังไงดีนะ...[/log][wa:780] "
2004506-79 = "― [log=피나 가이드]ฉัน... ก็รู้สึกฉันโล่งใจน่ะค่ะ... [/log][wa:1760] "
2004506-83 = "อะไรเนี่ย? ประตูปิดอยู่เหรอ?"
2004506-84 = "หรือว่ายังไม่ถึงเวลา?"
2004506-85 = "Oops!?"
2004506-86 = "เวลาผ่านไปแค่ไหนแล้วเนี่ย!! ต้องไปทำงานแล้วค่ะ!!"
2004506-93 = "เชิญค่ะ สนุกมั้ยคะทุกคน"
2004506-97 = "สนุกมากเลยครับ"
2004506-102 = "ขอบใจที่ให้ตั๋วนะคุณครู ข้างในนั้นสวยมากเลยละ"
2004506-106 = "!!!"
2004506-107 = "อ่า... เอ่อ... ยะ... ยินดีต้อนรับกลับมาค่ะ!"
2004506-112 = "[ns] \"พีน่า? เป็นอะไรไปเหรอ?\""
2004506-113 = "คุณครูคะ... ฉัน... เอ่อ..."
2004506-114 = "ฉันรีบลงมารับลูกทัวร์ ก็เลยลืมรองเท้าไว้บนรถค่ะ!!"
2004506-115 = "[s7] \"งั้นนิ่งไว้ก่อน!\"\n[s8] \"อย่าเพิ่งมองลงไปที่เท้านะ!\""
2004506-118 = "ค่ะ... ค่ะ!!"
2004506-120 = "(เมื่อลูกทัวร์ขึ้นรถหมดแล้ว พีน่าก็รีบขึ้นรถแล้วแอบใส่รองเท้าของตัวเอง)"

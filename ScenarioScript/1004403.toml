[translation]
1004403-1 = "挑戰採椰子"
1004403-4 = "啊，老師！"
1004403-5 = "我在這邊～！"
1004403-9 = "請看！"
1004403-10 = "那邊的樹，全～部都是椰子樹唷！"
1004403-11 = "採一～大堆，大家一起吃吧～☆"
1004403-12 = "[s1] 「都是些很高的樹呢。」\n[s2] 「要是有帶梯子來就好了呢。」"
1004403-13 = "其實……"
1004403-14 = "其實……"
1004403-15 = "梯子現在，被使用在別的作業上……"
1004403-16 = "雖然等那邊結束再開始也可以……"
1004403-17 = "不過要是可以在作業結束的時候大家一起喝椰子汁就好了～！我剛才突然這麼想！"
1004403-18 = "[s3] 「畢竟作業之後會渴呢。」\n[s4] 「嗯嗯，很不錯！」"
1004403-21 = "嗯嗯！就是那樣！！"
1004403-22 = "沒有梯子的情況下從椰子樹採下椰子的方法……"
1004403-23 = "有沒有什麼好方法……啊！"
1004403-28 = "對了！這樣如何？"
1004403-32 = "嘿咻，拿著這個……"
1004403-36 = "[ns5] 「那個……野乃美同學？」\n[ns6] 「為什麼突然拿出迷你砲機槍……？」"
1004403-37 = "嗯呵呵☆"
1004403-38 = "嗯呵呵☆"
1004403-39 = "爬不上去的話……"
1004403-41 = "打下來就行了！"
1004403-45 = "打掃時間到囉～☆"
1004403-58 = "……鏘，鏘鏘～！！☆"
1004403-62 = "[ns7] 「這……不是該說鏘鏘～的時候吧？」\n[ns8] 「找找其他的方法吧……」"
1004403-65 = "果然有點太粗暴了嗎？椰子也全都裂開了……"
1004403-66 = "感覺還破壞了島上的環境……"
1004403-67 = "嗯……其他的方法……該怎麼辦呢？"
1004403-70 = "[ns9] 「騎肩膀怎麼樣？」\n[ns10] 「矮一點的樹，騎肩膀應該採得到吧」"
1004403-73 = "咦……"
1004403-74 = "騎肩膀嗎？我知道了☆"
1004403-75 = "那麼，由我把老師抬起來！請交給我！"
1004403-76 = "……啊，是我騎在老師身上……嗎？"
1004403-80 = "原，原來是這樣嗎……！？"
1004403-81 = "不，不是！不是討厭……！只是從來沒想過……！"
1004403-82 = "那個……那，那麼，拜託你了，老師。"
1004403-88 = "……就算有點重，也請不要抱怨唷☆"
1004403-91 = "（讓野乃美騎在肩上，接近了比較矮的椰子樹）"
1004403-95 = "老，老師？再稍微慢一點……"
1004403-96 = "不，不好意思。騎在肩上還是第一次……感覺有點緊張呢。"
1004403-101 = "嗯……還要再一點……！"
1004403-102 = "再一點……還差一點……！"
1004403-108 = "……啊！？"
1004403-114 = "啊痛痛痛……"
1004403-115 = "沒，沒事吧老師？"
1004403-116 = "不好意思，失去平衡了……"
1004403-117 = "不怎麼習慣這種事……"
1004403-121 = "老師……？"
1004403-122 = "……咦？"
1004403-126 = "老，老師……！？"
1004403-130 = "沒，沒事吧老師！？不好意思……我，在老師上面……！？"
1004403-131 = "那個……這種時候該怎麼辦……"
1004403-132 = "[s11] 「野乃美才是，你沒事吧？」\n[s12] 「我沒事唷，各方面都沒事。」"
1004403-133 = "是，是的……我，多虧了老師……"
1004403-134 = "是嗎……？啊哈哈……"
1004403-135 = "嗯……這樣下去很困難呢……之後再拿梯子來挑戰看看！"
1004403-136 = "老師特地來幫忙卻空手而歸了呢。不好意思。"
1004403-137 = "……不是空手，嗎？"
1004403-138 = "但是我們，什麼都……"
1004403-139 = "[s13] 「在這裡任何事物都會成為經驗唷。」\n[s14] 「反覆試驗的過程，也是一種遊戲呀。」"
1004403-144 = "……呵呵。"
1004403-145 = "嗯嗯！老師說得對！真不愧是老師☆"
1004403-149 = "那麼今天就先回去……下次，再一起來採椰子吧！"
1004403-150 = "到時候……"
1004403-151 = "……嗯。"
1004403-152 = "[s] 「……野乃美？」"
1004403-153 = "……不，什麼都沒有。"
1004403-154 = "只是……"
1004403-156 = "只是……感覺，到時候也會忘記拿梯子過來而已。"

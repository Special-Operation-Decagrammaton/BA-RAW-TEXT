[translation]
1004403-1 = "ลองเก็บมะพร้าว"
1004403-4 = "อ๊ะ คุณครู!"
1004403-5 = "ทางนี้ค่ะ ทางนี้! ฉันกำลังรออยู่เลยค่ะ! "
1004403-9 = "คุณครูเห็นต้นไม้ที่อยู่ตรงฝั่งโน้นมั้ยคะ?"
1004403-10 = "มันคือต้นมะพร้าวทั้งหมดเลยค่ะ"
1004403-11 = "เราไปเก็บมะพร้าว แล้วมานั่งดื่มด้วยกันเถอะค่ะ☆"
1004403-12 = "[s1] \"แต่ว่าต้นมันสูงมากเลยนะ\"\n[s2] \"ไปเอาบันไดมาไม่ดีกว่าเหรอ\""
1004403-13 = "คือว่าเรื่องนั้น..."
1004403-14 = "คือว่าเรื่องนั้น..."
1004403-15 = "ตอนนี้ฝ่ายซ่อมบำรุงกำลังใช้บันไดอยู่ พวกเราเลยเอามาใช้ไม่ได้น่ะค่ะ"
1004403-16 = "ที่จริงเรารอให้พวกเขาใช้เสร็จก่อนก็ได้ แต่ว่า..."
1004403-17 = "ฉันคิดว่าถ้าเราเก็บมะพร้าวได้ทันพวกเขาทำงานเสร็จ แล้วมานั่งกินด้วยกันก็น่าจะดีกว่าน่ะค่ะ"
1004403-18 = "[s3] \"แบบนี้นี่เอง\"\n[s4] \"อื้อ ครูเข้าใจแล้ว!\""
1004403-21 = "อื้อ! ใช่แล้วค่ะ!!"
1004403-22 = "เพราะงั้นพวกเราสองคนต้องร่วมมือกันเอาชนะความยากลำบากนี้ให้ได้ค่ะ!"
1004403-23 = "แต่เราจะใช้วิธีไหนดีล่ะคะ..."
1004403-28 = "อ๊ะ ใช้วิธีนี้ได้ค่ะ"
1004403-32 = "ฮึบ... ถือไว้แบบนี้..."
1004403-36 = "[ns5] \"คือว่า... คุณโนโนมิ?\"\n[ns6] \"จู่ๆ ก็หยิบปืนออกมาทำไมน่ะ?\""
1004403-37 = "คุณครูช่วยถอยมาข้างหลังด้วยค่า~"
1004403-38 = "คุณครูช่วยถอยมาข้างหลังด้วยค่า~"
1004403-39 = "ถ้าขึ้นไปไม่ได้...!"
1004403-41 = "ก็ทำให้มันตกลงมาก็ได้นี่คะ!"
1004403-45 = "ถึงเวลาเก็บให้เรียบแล้วค่ะ~☆"
1004403-58 = "แต่นแต๊น~!!☆"
1004403-62 = "[ns7] \"มันใช่เวลามาแต่นแต๊นมั้ย...?\"\n[ns8] \"ลองหาวิธีอื่นกันเถอะ...\""
1004403-65 = "อืม... วิธีนี้มันบุ่มบ่ามเกินไปสินะคะ แถมต้นมะพร้าวก็หักเลยด้วย..."
1004403-66 = "ดูเหมือนเป็นการทำลายสภาพแวดล้อมบนเกาะเลย..."
1004403-67 = "ถ้างั้นทำยังไงดีล่ะคะ? อืม... มีวิธีไหนบ้างนะ..."
1004403-70 = "[ns9] \"ลองขี่คอกันดูมั้ย\"\n[ns10] \"ถ้าต้นเตี้ยๆ ขี่คอน่าจะเก็บถึงได้นะ\""
1004403-73 = "เอ๋...? ขี่คอเหรอคะ?"
1004403-74 = "หมายถึงให้คุณครูขี่คอฉันเหรอคะ?"
1004403-75 = "คะ...?"
1004403-76 = "อ๋อ ให้ฉันขี่คอคุณครู...? เอ่อ ให้ฉันอยู่ข้างบนเหรอคะ?"
1004403-80 = "วะ... วิธีแบบนั้นอาจใช้ได้ก็จริง... ตะ...แต่ว่าฉันคิดไม่ถึงมาก่อนเลยค่ะ..."
1004403-81 = "ปะ... เปล่าค่ะ ฉันไม่ได้ไม่ชอบสักหน่อย!"
1004403-82 = "อืม... ก็ได้ค่ะ ถ้างั้นก็รบกวนด้วยนะคะ คุณครู"
1004403-88 = "ห้ามบอกว่าฉันตัวหนักนะคะ☆ เข้าใจมั้ยคะ?"
1004403-91 = "(คุณครูให้โนโนมิขี่คอและขยับเข้าไปใกล้ๆ กับต้นมะพร้าว)"
1004403-95 = "คะ... คุณครูคะ... ค่อยๆ ขยับช้าๆ..."
1004403-96 = "ขะ... ขอโทษค่ะ ฉันเพิ่งเคยขี่คอคนอื่นครั้งแรก... เลยรู้สึกประหม่านิดหน่อยค่ะ"
1004403-101 = "อื้อ~ ฉัน... เกือบจะ...ถึงแล้ว!"
1004403-102 = "อีกนิดเดียวค่ะ อีกนิดเดียว...!"
1004403-108 = "อ๊ะ...?!"
1004403-114 = "อ๊าาาาา..."
1004403-115 = "ปะ... เป็นอะไรรึเปล่าคะ คุณครู?"
1004403-116 = "ขอโทษค่ะ ทำคุณครูเสียหลักจนล้มเลย"
1004403-117 = "คือว่านี่เป็นครั้งแรกของฉัน..."
1004403-121 = "...? คุณครูคะ...?"
1004403-122 = "เอ๋...?"
1004403-126 = "คะ... คุณครูคะ...!?"
1004403-130 = "ปะ...เป็นอะไรรึเปล่าคะ คุณครู? ขอโทษจริงๆ ค่ะ ดันตกลงมาทับบนตัวคุณครูซะได้...!!"
1004403-131 = "อ่า... คือว่า... เอ่อ..."
1004403-132 = "[s11] \"โนโนมิไม่เป็นไรใช่มั้ย?\"\n[s12] \"ครูไม่เป็นไร ยังไม่มีอะไรหัก\""
1004403-133 = "คะ... ค่ะ พะ... เพราะคุณครูช่วยเอาไว้ ฉันเลยไม่เจ็บ..."
1004403-134 = "งั้นเหรอคะ? อะฮะฮะฮะ..."
1004403-135 = "อืม... ว่าแล้วเชียวว่าแบบนี้คงฝืนเกินไป คงต้องไปเอาบันไดมาลองปีนดูแล้วละค่ะ"
1004403-136 = "คุณครูอุตส่าห์มาที่นี่ด้วยกันแท้ๆ แต่ต้องกลับไปมือเปล่า... ขอโทษนะคะ"
1004403-137 = "คะ...?"
1004403-138 = "เราไม่ได้กลับไปมือเปล่างั้นเหรอคะ? แต่ว่าพวกเราไม่ได้อะไรกลับไปเลยนะคะ..."
1004403-139 = "[s13] \"ที่รีสอร์ตนี่น่ะ ไม่ว่าอะไรก็เป็นรางวัลทั้งนั้น...\"\n[s14] \"ได้ทำอะไรบางอย่างก็ถือว่าเป็นการพักผ่อนแล้วละ\""
1004403-144 = "ฮิฮิ..."
1004403-145 = "ค่ะ! คุณครูพูดถูกแล้ว สมกับเป็นคุณครูจริงๆ เลยค่ะ!"
1004403-149 = "ถ้างั้นเราก็กลับกันเถอะค่ะ เอาไว้คราวหน้าค่อยมาเก็บมะพร้าวกันใหม่นะคะ!"
1004403-150 = "คราวหน้า... เอาไว้คราวหน้า..."
1004403-151 = "อืม..."
1004403-152 = "[s] \"โนโนมิ...?\""
1004403-153 = "อืม... ไม่มีอะไรหรอกค่ะ"
1004403-154 = "ก็แค่..."
1004403-156 = "รู้สึกเหมือนว่าคราวหน้าฉันก็คงจะเผลอลืมหยิบบันไดมาด้วยแน่ๆ เลยค่ะ"

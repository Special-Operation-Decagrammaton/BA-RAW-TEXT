[translation]
1012302-1 = "ความสัมพันธ์ที่เปลี่ยนแปลง"
1012302-2 = "ด้านหน้าอาคารชาเล่ต์"
1012302-3 = "(คำพูดของเซอาทำให้คุณครูรอเธออยู่ด้วยสีหน้าเป็นกังวล)"
1012302-8 = "ตายจริง... ออกมารออยู่ก่อนเลยเหรอคะ คุณครู"
1012302-9 = "ฉันรู้ว่าสิ่งที่คิดอาจแตกต่างจากสิ่งที่ฉันพูดไป แต่ฉันไม่ได้อยากให้คุณครูต้องเป็นห่วงเลย"
1012302-10 = "[s1] \"เซอา...!?\"\n[s2] \"รถสปอร์ต...!?\""
1012302-19 = "[ns3] \"ชุด... ว่ายน้ำ...?\"\n[ns4] \"นี่มัน... เรื่องอะไรเหรอ?\""
1012302-22 = "เอาไว้อธิบายทีหลังแล้วกัน"
1012302-23 = "ถ้าไม่ติดอะไรละก็... มานั่งข้างๆ ฉันสิคะ"
1012302-27 = "ฮุฮุ ทำหน้าตลกจังเลย"
1012302-28 = "ไม่ต้องกังวลหรอกค่ะ นี่มันใช่เรื่องอันตรายขนาดนั้นหรอก"
1012302-29 = "ฉันว่าเราออกจากย่านพลุกพล่านกันก่อนมั้ยคะ? ถ้ายังอยู่ตรงนี้นานๆ อาจมีใครมาเห็นเข้าก็ได้นะคะ"
1012302-30 = "คะ...?"
1012302-31 = "อ่า... รถเหรอคะ?"
1012302-32 = "นั่นสินะคะ คุณครูคงเพิ่งเคยเห็นเป็นครั้งแรกสินะ"
1012302-33 = "ไม่ต้องห่วงหรอกค่ะ นี่คือรถของฉัน เห็นอย่างนี้ฉันก็ขับรถอยู่บ่อยๆ นะคะ"
1012302-34 = "ฉันมีทั้งรถยนต์ มอเตอร์ไซค์... เรือยอช์ตก็มีค่ะ ไว้ถ้ามีโอกาสจะเอาให้ดูนะคะ"
1012302-39 = "เอาละ เลิกคุยเรื่องเล็กน้อยได้แล้ว ขึ้นมานั่งข้างคนขับสิคะ คุณครู"
1012302-40 = "[s5] \"อะ... อื้อ...\"\n[s6] ขึ้นไปนั่งเบาะข้างคนขับ"
1012302-49 = "ฮุฮุ..."
1012302-50 = "งั้นฉันจะไปแล้วนะคะ"
1012302-54 = "(จากนั้นคุณครูก็นั่งรถของเซอา แล้วเดินทางมุ่งหน้าสู่ชานเมือง)"
1012302-55 = "(เซอายิ้มไปตลอดทาง แต่ก็ไม่พูดอะไรเลยสักคำ)"
1012302-56 = "ใกล้จะถึงแล้วละค่ะ มาถึงเร็วกว่าที่คิดอีกนะเนี่ย"
1012302-57 = "อืม..."
1012302-58 = "ดีจังเลยนะคะ... กลิ่นอายของทะเลน่ะค่ะ"
1012302-67 = "― [log=세이아 수영복]พอมาถึงที่นี่[/log][wa:2140] "
1012302-69 = "― [log=세이아 수영복]ลมก็พัดเย็นขึ้นนะคะ[/log]"
1012302-72 = "― [log=세이아 수영복]รถคันอื่นก็ไม่มี...[/log][wa:250] "
1012302-74 = "― [log=세이아 수영복]ดีจังเลยค่ะ[/log]"
1012302-77 = "― [log=세이아 수영복]นั่งรถเล่นเป็นยังไงบ้างคะ? ตกใจมากหรือเปล่าคะ?[/log][wa:2390] "
1012302-80 = "― [log=세이아 수영복]คงรู้สึกทั้งกะทันหัน[/log]"
1012302-82 = "[wa:100] "
1012302-85 = "― [log=세이아 수영복]และเกินคาดด้วยสินะคะ[/log]"
1012302-87 = "[wa:100] "
1012302-90 = "― [log=세이아 수영복]ดูจากสีหน้าแล้ว... [/log][wa:810] "
1012302-92 = "― [log=세이아 수영복]ฉันว่าฉันทำได้ดีเลยค่ะที่มาที่นี่[/log]"
1012302-95 = "― [log=세이아 수영복]ที่จริงฉันไม่มีเหตุผลอะไรพิเศษหรอกค่ะ[/log][wa:10] "
1012302-97 = "― [log=세이아 수영복]ก็แค่ อยากลองทำดูสักครั้งน่ะค่ะ[/log][wa:520] "
1012302-100 = "― [log=세이아 수영복]การทำแบบนี้เรียกว่าอะไรเหรอคะ...?[/log][wa:1380] "
1012302-103 = "― [log=세이아 수영복]ลักพาตัวหรือเปล่านะ...?[/log][wa:10] "
1012302-106 = "― [log=세이아 수영복]ฮุฮุ... ล้อเล่นค่ะ[/log][wa:1300] "
1012302-109 = "― [log=세이아 수영복]แต่ถึงยังไง ตอนนี้...[/log][wa:410] "
1012302-111 = "― [log=세이아 수영복]ใช่ค่ะ[/log]"
1012302-114 = "― [log=세이아 수영복]จนกว่าฉันจะยอมปล่อยคุณครูกลับบ้าน[/log]"
1012302-116 = "― [log=세이아 수영복]คิดว่ามันไม่ใช่เรื่องล้อเล่นแล้วกันค่ะ[/log][wa:10] "
1012302-119 = "มาถึงแล้วค่ะ เชิญพักผ่อนได้เลยค่ะ"
1012302-126 = "อย่างที่ฉันบอกไปเมื่อกี้... ฉันไม่ได้มีปัญหาหรือเรื่องอะไรหรอกค่ะ"
1012302-127 = "ส่วนที่ฉันบอกไปว่าเร่งด่วน... จะว่ายังไงดีล่ะ"
1012302-128 = "ฉันบอกไปแบบนั้นเพราะว่า... ฉันอยากรีบพาคุณครูมาที่นี่ค่ะ"
1012302-129 = "ผิดหวังหรือเปล่าคะ... ที่ไม่ได้มีเรื่องอะไรจริงๆ?"
1012302-130 = "หรือว่า... รู้สึกเหมือนโดนฉันหลอกให้เข้าแล้ว?"
1012302-131 = "[s7] \"ที่จริงครูก็... ตกใจอยู่นิดหน่อย\"\n[s8] \"ถ้าบอกกันตั้งแต่แรกก็คงดีกว่านี้น่ะ\""
1012302-134 = "ฮุฮุ"
1012302-135 = "ฮุฮุฮุ..."
1012302-136 = "อ่า... ขอโทษค่ะ ฉันแค่รู้สึกสนุกขึ้นมา"
1012302-137 = "ถ้าเป็นเมื่อก่อนคุณครูคงพูดประมาณว่า 'ไม่ได้มีเรื่องอะไรก็ดีแล้วละ' ไปแล้ว..."
1012302-138 = "แต่ตอนนี้... คุณครูเริ่มดุฉันแล้วสินะคะ?"
1012302-139 = "แต่ก็นะ ไม่ใช่เรื่องแปลกหรอกค่ะ ฉันเคยทั้งเรียกคุณครูให้มาหาแต่ก็ลืม แล้วก็เคยพูดอะไรที่#nไม่ต่างจากการโกหกด้วย..."
1012302-140 = "จะว่ายังไงดีล่ะ..."
1012302-141 = "ฉันรู้สึกว่าท่าทีของคุณครูที่มีต่อฉันมันค่อยๆ เปลี่ยนไปทีละนิดค่ะ"
1012302-142 = "ถ้าฉันพยายามมากกว่านี้อีกเรื่อยๆ... อาจจะมีวันที่ฉันโดนดุแรงๆ ก็ได้นะคะ"
1012302-143 = "บางทีนั่นอาจเป็นสิ่งที่ฉันอยากได้ยินก็ได้ค่ะ"
1012302-144 = "ทำอะไรตามอำเภอใจ แล้วก็โดนดุเหมือนเป็นเด็กแก่นแก้ว บางทีฉันก็อยากโดนดุแบบนั้นบ้าง..."
1012302-145 = "แบบนี้มันเรียกว่าอะไรเหรอคะ? อืม..."
1012302-146 = "[s9] \"เฮ้อ...\"\n[s10] ตั้งใจถอนหายใจออกมาดังๆ"
1012302-152 = "...!!!"
1012302-153 = "ฮุฮุ ฮุฮุ..."
1012302-154 = "นี่สินะคะ เป็นความรู้สึกแบบนี้เองสินะ"
1012302-155 = "ก็ไม่เลวเลยนะคะ รู้สึกดีกว่าที่คิดอีกค่ะ เผลอๆ อาจติดเป็นนิสัยไปเลยก็ได้"
1012302-160 = "ล้อเล่นค่ะ..."
1012302-161 = "ไม่สิ ต้องบอกว่าฉันตั้งใจมากกว่า... แต่เห็นอย่างนี้ฉันก็รู้จักความพอเหมาะพอดีค่ะ"
1012302-162 = "[s11] \"ถ้าล้อเล่นแค่นี้ก็ไม่เป็นไรหรอก\"\n[s12] \"ถ้าล้อเล่นแค่นี้ ครูจะยอมให้แล้วกัน\""
1012302-168 = "จริงเหรอคะ... ทีอย่างนี้ละมายอมรับกันนะคะ"
1012302-169 = "เข้าใจแล้วค่ะ จากนี้ไปฉันคงต้องปรับความเหมาะสมให้พอดีแล้วละค่ะ ฉันเดาว่าคุณครูคงเชื่อใจฉัน#nในเรื่องนั้นนะคะ"
1012302-170 = "ก็คุณน่ะเป็นอย่างนี้อยู่เรื่อย..."
1012302-171 = "[s13] \"ครูแค่ให้คำตอบที่เหมาะกับเซอาน่ะ\"\n[s14] \"เอ๋? คิดว่าเซอาจะชอบแบบนี้เสียอีก\""
1012302-174 = "ฮุฮุ..."
1012302-175 = "ไปขึ้นรถเถอะค่ะ ฉันจะหยุดลักพาตัวแค่นี้ แล้วจะยอมปล่อยให้กลับไปได้ค่ะ"
1012302-180 = "แต่คราวหน้า... ฉันก็ไม่รู้ว่าจะเป็นยังไงนะคะ"
1012302-183 = "(จากนั้นคุณครูก็นั่งรถของเซอาแล้วกลับมาถึงหน้าชาเล่ต์)"
1012302-184 = "(เซอาไม่พูดอะไรเลยตลอดทาง แต่ก็หันมายิ้มให้หนึ่งครั้งก่อนกลับไป)"

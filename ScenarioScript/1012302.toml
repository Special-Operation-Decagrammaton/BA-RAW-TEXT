[translation]
1012302-1 = "Relationship Shifts"
1012302-2 = "Schale Entryway"
1012302-3 = "I waited, frowning as I worried about Seia's message."
1012302-8 = "As predicted... You're already waiting for me, Sensei."
1012302-9 = "I considered changing my mind, but I didn't wish to burden you."
1012302-10 = "[s1] \"Seia...?!\"\n[s2] \"A sports car...?!\""
1012302-19 = "[ns3] \"...A swim...suit?\"\n[ns4] \"What's...going on?\""
1012302-22 = "All shall be revealed in time."
1012302-23 = "If you don't mind... Would you kindly sit with me?"
1012302-27 = "Ha, you're making an interesting face."
1012302-28 = "There's no need to worry. I would never endanger you...purposely."
1012302-29 = "Shall we leave downtown first? I would hate for someone to take notice of us."
1012302-30 = "...Pardon?"
1012302-31 = "...Ah, you mean this car?"
1012302-32 = "Right. This must be your first time seeing it."
1012302-33 = "It's adequate. It's been good to me. Despite my privilege, I drive myself quite often."
1012302-34 = "I have a car, a scooter...and even a yacht. Perhaps I will show them to you if we have a chance."
1012302-39 = "Now, that's enough babble. Do have a seat."
1012302-40 = "[s5] \"S-Sure...\"\n[s6] Take the front passenger seat."
1012302-49 = "Fufu..."
1012302-50 = "Here we go."
1012302-54 = "We left the city and drove to the outskirts."
1012302-55 = "Seia smiled throughout the drive, but she didn't speak a single word."
1012302-56 = "We're nearly there...faster than expected."
1012302-57 = "Mm..."
1012302-58 = "...The smell of the sea. It's pleasant."
1012302-67 = "― [log=세이아 수영복]The breeze feels refreshing[/log][wa:1580] "
1012302-69 = "― [log=세이아 수영복]out here.[/log]"
1012302-72 = "― [log=세이아 수영복]There are no cars around, either...[/log][wa:10] "
1012302-74 = "― [log=세이아 수영복]This is nice.[/log]"
1012302-77 = "― [log=세이아 수영복]How's the drive? Were you surprised?[/log][wa:2790] "
1012302-80 = "― [log=세이아 수영복]It must've been sudden,[/log]"
1012302-82 = "[wa:100] "
1012302-85 = "― [log=세이아 수영복]and unexpected.[/log]"
1012302-87 = "[wa:100] "
1012302-90 = "― [log=세이아 수영복]Looking at your expression...[/log][wa:410] "
1012302-92 = "― [log=세이아 수영복]I'm glad we came here.[/log]"
1012302-95 = "― [log=세이아 수영복]There's no special meaning to it.[/log][wa:10] "
1012302-97 = "― [log=세이아 수영복]I just wanted to try it at some point.[/log][wa:240] "
1012302-100 = "― [log=세이아 수영복]What do you call this again...?[/log][wa:1460] "
1012302-103 = "― [log=세이아 수영복]...Kidnapping?[/log][wa:90] "
1012302-106 = "― [log=세이아 수영복]Heh...I'm just joking.[/log][wa:1140] "
1012302-109 = "― [log=세이아 수영복]But, still...[/log][wa:730] "
1012302-111 = "― [log=세이아 수영복]Yeah.[/log]"
1012302-114 = "― [log=세이아 수영복]Until I send you back home,[/log]"
1012302-116 = "― [log=세이아 수영복]let's say I'm not joking.[/log][wa:10] "
1012302-119 = "We're here. Let's take a little break."
1012302-126 = "As I mentioned earlier... This isn't serious."
1012302-127 = "I said it was urgent, but... How should I put it?"
1012302-128 = "I urgently wanted to bring you here...? It was something like that."
1012302-129 = "...Were you disappointed? Because you longed for danger and a thrill?"
1012302-130 = "Or...are you upset because you feel tricked?"
1012302-131 = "[s7] \"Well... I suppose I was a bit surprised!\"\n[s8] \"You could've just told me in the first place.\""
1012302-134 = "Fufu."
1012302-135 = "Fufufu..."
1012302-136 = "...Ah, my apologies. I just thought it was a little funny."
1012302-137 = "I'm sure you would've said something boring like \"I'm glad it was nothing serious\" if I tried this before."
1012302-138 = "But now that we're more acquainted... You at least feel free to complain, right?"
1012302-139 = "Well, I suppose it's obvious what I want. There are times when I abandoned you, times when I deliberately lied to you..."
1012302-140 = "So, how should I put this...?"
1012302-141 = "I feel like the way you treat me is changing bit by bit."
1012302-142 = "And if I push a little harder... I might see a day when you scold me like any other student."
1012302-143 = "...If I'm lucky."
1012302-144 = "Doing something childish, getting reprimanded, receiving a disapproving stare and exasperated sigh..."
1012302-145 = "What do they call this again? Mmm..."
1012302-146 = "[s9] \"...Sigh.\"\n[s10] Stare disapprovingly."
1012302-152 = "...!!"
1012302-153 = "Heh, heehee..."
1012302-154 = "I see. So, that's what I've been missing."
1012302-155 = "Not bad. It feels better than I expected. Maybe I'll make it into a habit."
1012302-160 = "...Just kidding."
1012302-161 = "Well, to be precise, I'd love to...but I also possess self-control."
1012302-162 = "[s11] \"A prank like this is fine.\"\n[s12] \"I don't mind playing along.\""
1012302-168 = "...I see. So, that's your answer."
1012302-169 = "I got it. I'll have to control myself. Do you trust me to do that, Sensei?"
1012302-170 = "...Or will you give me another boring response?"
1012302-171 = "[s13] \"It was right for you, Seia.\"\n[s14] \"Huh, I thought you'd like it.\""
1012302-174 = "...Fufu."
1012302-175 = "Please buckle up. The kidnapping's over, so let's get you home."
1012302-180 = "Although...I make no promises about next time."
1012302-183 = "She drove me back to Schale."
1012302-184 = "Seia remained silent for the entire drive, smiling softly as we headed back."

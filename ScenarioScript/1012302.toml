[translation]
1012302-1 = "變化的關係"
1012302-2 = "夏萊大樓前"
1012302-3 = "（因為聖亞的訊息，帶著擔心的表情等著）"
1012302-8 = "哎呀……你已經先出來了啊，老師。"
1012302-9 = "雖然現在說這些好像有點晚了，但我並沒有想造成你負擔的意思。"
1012302-10 = "[s1]「聖亞……！？」\n[s2]「跑車……！？」"
1012302-19 = "[ns3]「還穿著……泳裝？」\n[ns4]「這是……怎麼回事？」"
1012302-22 = "詳細情況稍後再說明吧。"
1012302-23 = "不介意的話……要不要坐到我旁邊？"
1012302-27 = "呵呵，你的表情還真有趣。"
1012302-28 = "不必擔心，並不是什麼危險的事。"
1012302-29 = "總之先離開市區吧？#n要是再拖下去的話，可能會被人認出來的。"
1012302-30 = "……嗯？"
1012302-31 = "……啊，這輛車嗎？"
1012302-32 = "原來如此。老師你應該是第一次看到吧。"
1012302-33 = "別緊張。這是我自己的車，而且其實還挺常開的。"
1012302-34 = "除此之外還有機車和遊艇……有機會的話真想讓你看看。"
1012302-39 = "好了，別在意這些小事。#n請坐到副駕駛座吧，老師。"
1012302-40 = "[s5]「嗯，嗯……」\n[s6] 坐上汽車的副駕駛座"
1012302-49 = "呵呵……"
1012302-50 = "那麼我們出發吧。"
1012302-54 = "（搭上聖亞的車離開市區，往郊外駛去）"
1012302-55 = "（一路上聖亞都掛著微笑，不過卻一句話也沒說）"
1012302-56 = "差不多快到了。比想像中還快呢。"
1012302-57 = "嗯……"
1012302-58 = "……大海的味道真不錯呢。"
1012302-67 = "― [log=세이아 수영복]來到這裡之後，[/log][wa:2380] "
1012302-69 = "― [log=세이아 수영복]連風也變舒適了呢。[/log]"
1012302-72 = "― [log=세이아 수영복]又沒有其他車子……[/log][wa:650] "
1012302-74 = "― [log=세이아 수영복]感覺真好。[/log]"
1012302-77 = "― [log=세이아 수영복]覺得這趟兜風怎麼樣？嚇到你了嗎？[/log][wa:3590] "
1012302-80 = "― [log=세이아 수영복]畢竟是個突然的邀請，[/log]"
1012302-82 = "[wa:100] "
1012302-85 = "― [log=세이아 수영복]你想必也沒預料到吧？[/log]"
1012302-87 = "[wa:100] "
1012302-90 = "― [log=세이아 수영복]看見那個表情……[/log][wa:1250] "
1012302-92 = "― [log=세이아 수영복]我覺得有邀請你真是太好了。[/log]"
1012302-95 = "― [log=세이아 수영복]其實並沒有什麼特別的理由。[/log][wa:180] "
1012302-97 = "― [log=세이아 수영복]只是想嘗試一次而已。[/log][wa:1360] "
1012302-100 = "― [log=세이아 수영복]這種行為，該怎麼形容來著……？[/log][wa:2100] "
1012302-103 = "― [log=세이아 수영복]……綁架？[/log][wa:450] "
1012302-106 = "― [log=세이아 수영복]呵呵……開玩笑的。[/log][wa:1660] "
1012302-109 = "― [log=세이아 수영복]不過至少現在……[/log][wa:930] "
1012302-111 = "― [log=세이아 수영복]我想想。[/log]"
1012302-114 = "― [log=세이아 수영복]在把老師送回家之前，[/log]"
1012302-116 = "― [log=세이아 수영복]就當作不是玩笑吧。[/log][wa:390] "
1012302-119 = "我們到了。先休息一下吧。"
1012302-126 = "就像剛才說的一樣……並不是發生了什麼事件。"
1012302-127 = "雖然我說過是緊急的事……該怎麼說呢。"
1012302-128 = "只是很想趕快把老師帶到這裡來……？#n大概就是這樣而已。"
1012302-129 = "……因為沒什麼特別的事，讓你失望了嗎？"
1012302-130 = "還是覺得……又被我耍了一次？"
1012302-131 = "[s7]「這個嘛……該說有點被嚇到嗎？」\n[s8]「明明直接告訴我就好了。」"
1012302-134 = "呵呵。"
1012302-135 = "呵呵呵……"
1012302-136 = "……啊，不好意思。#n我只是覺得有點開心。"
1012302-137 = "換作是以前的老師，應該會說「沒事就好」這種老套的話……"
1012302-138 = "現在卻會這樣責備我呢？"
1012302-139 = "想想這也是理所當然的吧？#n畢竟我曾經請你過來卻忘得一乾二淨，甚至還說過幾乎算是謊話的話。"
1012302-140 = "怎麼說呢……"
1012302-141 = "感覺老師對待我的態度，似乎正一點一滴地改變。"
1012302-142 = "如果我再努力一點的話……某天或許會被老師嚴厲地責備也說不定。"
1012302-143 = "搞不好……那種嘮叨才是我所期盼的。"
1012302-144 = "做些任性的事、像淘氣鬼一樣挨罵、偶爾被唸個幾句……"
1012302-145 = "這種感覺該怎麼形容呢……"
1012302-146 = "[s9]「……唉。」\n[s10] 故意重重嘆一口氣"
1012302-152 = "……！！！"
1012302-153 = "呵呵，呵呵……"
1012302-154 = "原來如此，是這種感覺啊。"
1012302-155 = "相當不錯呢，比想像中還要好。#n說不定會讓我上癮哦。"
1012302-160 = "……開玩笑的。"
1012302-161 = "不，應該說雖然心意不假……但我還是懂得節制的。"
1012302-162 = "[s11]「這種程度的玩笑無傷大雅。」\n[s12]「所以配合一下也無所謂吧。」"
1012302-168 = "……原來如此，這就是你的回答啊。"
1012302-169 = "知道了，往後我會拿捏好分寸。#n老師應該也是相信我才這麼說的吧。"
1012302-170 = "……真是狡猾呢。"
1012302-171 = "[s13]「我只是給出了聖亞期望的回答而已。」\n[s14]「哎呀，我還以為你就喜歡這樣呢。」"
1012302-174 = "……呵呵。"
1012302-175 = "那麼請上車吧。#n綁架就到此為止，我送你回去。"
1012302-180 = "至於下次會怎麼樣……我就不敢保證了。"
1012302-183 = "（之後搭上聖亞的車，一起回到了夏萊門口）"
1012302-184 = "（聖亞一路上依舊一句話也沒說，只在離開前留下了一抹微笑）"

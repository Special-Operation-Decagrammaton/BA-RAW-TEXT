[translation]
80000112-1 = "作戰參謀不想輸"
80000112-3 = "（一如往常在夏萊辦公的時候）"
80000112-8 = "[ns]「你好，請說。」"
80000112-12 = "你好，老師。"
80000112-13 = "事情是這樣的，今天百花繚亂想正式向夏萊請求協助……"
80000112-14 = "嗯，雖然我並沒有抱什麼期待，你今天有空嗎？"
80000112-15 = "[s]「沒問題哦。」"
80000112-17 = "[ns]「如果是為了桔梗，就算有行程也可以全部取消！」"
80000112-18 = "……唉。#n夏萊的工作強度，我早已心裡有數。"
80000112-19 = "你平常為了學生，就算辛苦也願意承擔的心態我很讚賞……"
80000112-20 = "但我不希望造成你不必要的困擾，或是讓你過度勉強自己。"
80000112-21 = "因此，如果你是顧慮我的心情才那麼說的話，我會有點生氣。#n你考慮一下再給我答覆吧。"
80000112-22 = "[ns1]「我很高興能聽到桔梗這麼說。」\n[ns2]「但我今天真的沒事，所以你不用擔心。」"
80000112-25 = "……哼。"
80000112-26 = "原來如此，如果是像老師說的一樣，行程上沒問題的話就好了。"
80000112-27 = "那……我等你。"
80000112-31 = "…………這樣就成功把老師找來了。"
80000112-35 = "[ns]（……嗯？電話還沒……）"
80000112-36 = "要在老師抵達之前，把準備好的東西放在這……"
80000112-40 = "接著要準備無懈可擊的作戰……"
80000112-44 = "[ns]「剛剛那是……？」"
80000112-46 = "（在接到桔梗的邀請之後，抵達了約好的地方）"
80000112-51 = "[ns]「所以今天有什麼事需要我幫忙？」"
80000112-52 = "啊啊，很簡單。"
80000112-53 = "今天是情人節，老師也知道吧？"
80000112-54 = "[s]「當然。」"
80000112-55 = "像這種特別的節日，百鬼夜行都會舉辦各式各樣的活動。"
80000112-56 = "所以今天必須協助他們的活動。#n這也是百花繚亂擔當的重要角色。"
80000112-57 = "[s]「原來如此……是重大的任務呢，我會努力！」"
80000112-58 = "嗯，看你很有幹勁我就放心了。"
80000112-59 = "那我們就到現場去吧？"
80000112-63 = "（就這樣跟著桔梗，開始協助商店街舉辦的活動）"
80000112-77 = "（從現場製作巧克力的體驗活動……）"
80000112-85 = "（到輔助奇普托斯全自治區的巧克力競賽……）"
80000112-91 = "（還擔任了以情人節為主題的即興俳句對決的評審……）"
80000112-92 = "（為了協助各種活動，度過了一段忙碌的時光……）"
80000112-94 = "今天真的很謝謝你！"
80000112-95 = "在百花繚亂的參謀和夏萊老師的幫助之下，這次活動得到了非常熱烈的反應！"
80000112-96 = "尤其是看到孩子們比平時更開心的笑容，真是讓人高興！#n如果不介意的話，下次還能再拜託你們嗎？"
80000112-97 = "[s]「我很樂意幫忙。」"
80000112-98 = "太好了，老師。看來你很有人氣。"
80000112-99 = "你是不是天生就適合照顧小孩呢？"
80000112-100 = "哈哈！要這麼說的話，百花繚亂的參謀也一樣呀！"
80000112-101 = "特別是在兩人三腳問答活動裡，接連答對問題的時候。#n孩子們都讚不絕口，認為你是一位了不起的姐姐呢！哈哈！"
80000112-102 = "那，那個……只是……自然而然地就……#n該說是對類似問答的活動有點天賦嗎……"
80000112-103 = "[s]「桔梗……你是在害羞嗎？」"
80000112-107 = "……哼。"
80000112-112 = "[ns]「呼，奔波了一整天，已經這麼晚了啊。」"
80000112-116 = "……是啊。太陽都要下山了呢……"
80000112-117 = "今天謝謝你陪我一整天，老師。"
80000112-118 = "多虧有你，百花繚亂才能參與這麼多活動。"
80000112-119 = "……"
80000112-120 = "唔嗯，所以我想……"
80000112-121 = "聽聽你對今天一天的感想。"
80000112-122 = "[s]「啊，嗯。能像這樣和桔梗待在一起，我也很開心。」"
80000112-123 = "啊……"
80000112-124 = "…………"
80000112-125 = "……感想就只有這樣？"
80000112-126 = "沒有其他……想說的話嗎？"
80000112-127 = "[s]「嗯？那個，也沒有特別……」"
80000112-128 = "你仔細想想，老師。#n我們今天一起四處奔波，體驗了許多活動。"
80000112-129 = "還全都是精彩的……跟情人節有關的活動。"
80000112-130 = "所以，你難道不會自然而然地，浮現某些平時沒有的情感……"
80000112-131 = "或者在腦海中浮現某些「願望」嗎？"
80000112-132 = "不必有所顧慮。#n如果你有任何期望的話，儘管隨時告訴我沒關係。"
80000112-133 = "[s]「這麼說來……我確實有一件事想說。」"
80000112-134 = "果然……我就知道。"
80000112-135 = "說來聽聽看吧。"
80000112-140 = "無論你現在心裡在想什麼，或是有什麼要求都可以……請親口說出來吧。"
80000112-144 = "[ns]「今天能夠幫到桔梗，我非常高興。」"
80000112-148 = "[ns]「所以如果之後還有類似的事，希望你別猶豫，直接找我就可以了。」"
80000112-149 = "因為那也算是夏萊的工作……？"
80000112-150 = "是嗎，你到最後還在說這種話啊。"
80000112-154 = "……你想說的真的只有這些？"
80000112-155 = "[s]「呃，對，對啊？」"
80000112-156 = "……這樣啊。"
80000112-161 = "原來如此……呵呵。"
80000112-162 = "你是真的……沒有任何欲望和要求……所以才會那麼說的吧。"
80000112-163 = "這還真是……真是……"
80000112-164 = "────難以置信。"
80000112-168 = "[ns]「桔梗……？」"
80000112-169 = "我明明花了這麼多心思準備這個計劃，但你竟然……隻字不提……"
80000112-170 = "竟然連一次──"
80000112-171 = "都不曾說出「送我情人節巧克力」這句話……"
80000112-172 = "真是令人難以置信……！"
80000112-173 = "[s]「……………………嗯？」"
80000112-175 = "（後來，從桔梗口中聽說了事情的來龍去脈）"
80000112-177 = "[ns]「所以打從一開始，我們協助的活動全部都是……」"
80000112-178 = "……唉。#n既然事情已經變成這樣，我也沒什麼好隱瞞的了。"
80000112-179 = "沒錯。這一切都是我為了在你心裡──"
80000112-180 = "植入「想收到巧克力」這個想法一手計畫的。"
80000112-181 = "……然而你卻一再閃躲，隻字不提……"
80000112-182 = "[s]「這麼做的原因是……？」"
80000112-183 = "你說我的計畫？"
80000112-184 = "因為在你開口之前，要是我主動……"
80000112-185 = "把巧克力給你的話……"
80000112-186 = "[s]「把巧克力給我的話……？」"
80000112-187 = "那，那不就…… "
80000112-188 = "好像是我輸了一樣嗎！"
80000112-189 = "[s]「…………」"
80000112-190 = "我本來已經決定要在你說想收到巧克力之後，經過一番悠閒的推拖再送給你的。"
80000112-191 = "結果你居然直到最後都沒說想要……！"
80000112-192 = "啊啊！真是不敢相信！#n你現在明白自己做錯什麼了嗎！"
80000112-193 = "[s]「不是，你不覺得這樣有點不講理嗎！？」"
80000112-194 = "想不到你到最後還要拒人於千里之外……"
80000112-195 = "……唉，我的計算究竟是哪裡出錯了呢？"
80000112-196 = "[s]「那個，桔梗，關於我沒有特意跟你說想要巧克力的原因……」"
80000112-197 = "……嗯？那種事還有原因嗎？"
80000112-198 = "你說在一開始的電話裡……就已經在掛斷之前，知道我可能會準備巧克力……？"
80000112-199 = "因為知道……我肯定會在協助活動結束後送給你，所以一直很期待……？"
80000112-200 = "也就是說，你打從一開始就知道一切……"
80000112-201 = "…………"
80000112-202 = "呃！？"
80000112-203 = "[s]「啊，那個，抱歉，我沒能明白桔梗的心意。」"
80000112-204 = "不，要是我早點知道的話……！"
80000112-205 = "啊，等等，可是照你這麼說，你也在期待著我的巧克力……"
80000112-206 = "所以事情就變成……啊，那個……"
80000112-207 = "……咳哼！"
80000112-208 = "…………來，如你所說，這是我準備的巧克力。"
80000112-214 = "是百花繚亂的作戰參謀，特別為你準備的[ruby= ・     ・ ]特製[/ruby]巧克力。"
80000112-215 = "來，收下吧。"
80000112-225 = "[ns]「啊，桔梗，謝……」"
80000112-226 = "感謝的話！"
80000112-227 = "……感謝……的話……等你吃完之後……"
80000112-228 = "再好好告訴我吧。"
80000112-234 = "現在……面對面說會讓我害羞。"
80000112-235 = "所以請把對巧克力的感想，寫成10張A4份量的報告交給我！"
80000112-236 = "[s]「遵，遵命……」"
80000112-237 = "……哼！"
80000112-239 = "（在幾經波折後，從桔梗手中收到的巧克力……）"
80000112-240 = "（毫無疑問，既甜美又好吃）"

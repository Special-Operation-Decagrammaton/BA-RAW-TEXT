[translation]
80000112-1 = "ที่ปรึกษายุทธศาสตร์ผู้ไม่อยากแพ้"
80000112-3 = "(คุณครูกำลังทำงานอยู่ที่ชาเล่ต์เหมือนทุกวัน)"
80000112-8 = "[ns] \"ฮัลโหล\""
80000112-12 = "สวัสดีคุณครู"
80000112-13 = "ฉันติดต่อมาในฐานะของเฮียกกะเรียวรันเพื่อขอความช่วยเหลืออย่างเป็นทางการจากชาเล่ต์น่ะ..."
80000112-14 = "ฉันจะขอถามแบบไม่คาดหวังอะไรมากหรอกนะ วันนี้คุณพอมีเวลาว่างบ้างหรือเปล่า?"
80000112-15 = "[s] \"ก็พอมีอยู่นะ\""
80000112-17 = "[ns] \"ถ้าเป็นคำขอจากคิเคียวละก็ ถึงครูจะมีนัดอื่นก็จะยกเลิกให้หมดเลย!\""
80000112-18 = "เฮ้อ... ฉันก็พอจะรู้อยู่หรอกนะว่างานของชาเล่ต์น่ะหนักหนาแค่ไหน"
80000112-19 = "แล้วก็รู้ดีด้วยว่าถ้าเป็นการทำเพื่อนักเรียนแล้วละก็ ไม่ว่างานจะยุ่งแค่ไหน คุณก็จะให้เรื่องของนักเรียน#nเป็นที่ 1 เสมอ..."
80000112-20 = "แต่ถึงยังไงฉันก็ไม่อยากทำให้คุณต้องเดือดร้อนหรือต้องฝืนทำเกินความจำเป็นน่ะ "
80000112-21 = "ตรงกันข้าม ถ้าคุณยอมช่วยเหลือเพราะอยากเอาใจใส่ ฉันจะยิ่งโกรธมากกว่า งั้นก็คิดให้ดีก่อนตอบล่ะ"
80000112-22 = "[ns1] \"ยิ่งคิเคียวพูดอย่างนี้ครูยิ่งดีใจนะ\"\n[ns2] \"แต่วันนี้ครูว่างจริงๆ เพราะงั้นไม่ต้องกังวลนะ\""
80000112-25 = "ฮึ่ม..."
80000112-26 = "งั้นเหรอ ถ้าคุณครูมีเวลาว่างจากงานจริงๆ อย่างที่ว่าก็ดีเลย"
80000112-27 = "ถ้างั้น... ฉันจะรอนะ"
80000112-31 = "เอาละ ถือว่าขอให้คุณครูมาหาแล้ว..."
80000112-35 = "[ns] (หืม...? ยังไม่วางสายเลยนะ...)"
80000112-36 = "งั้นก่อนที่คุณครูจะมาถึง ก็เอาของที่เตรียมไว้วางไว้ตรงนี้..."
80000112-40 = "และต่อไปก็ต้องเตรียมแผนการให้สมบูรณ์แบบ..."
80000112-44 = "[ns] \"เมื่อกี้มันอะไรน่ะ...?\""
80000112-46 = "(จากนั้นคุณครูก็ออกไปหาคิเคียวตามคำขอ)"
80000112-51 = "[ns] \"ที่บอกว่าอยากขอความร่วมมือวันนี้คืออะไรเหรอ?\""
80000112-52 = "อ้อ เรื่องง่ายๆ น่ะ"
80000112-53 = "อย่างที่คุณครูรู้ว่าวันนี้เป็นวันวาเลนไทน์"
80000112-54 = "[s] \"อื้ม\""
80000112-55 = "ในวันพิเศษๆ แบบนี้น่ะ ในเฮียกคิยาโคมีการจัดกิจกรรมหลายอย่าง"
80000112-56 = "ฉันก็เลยว่าจะไปช่วยงานพวกนั้นน่ะ เพราะนี่เป็นบทบาทสำคัญของเฮียกกะเรียวรันด้วย"
80000112-57 = "[s] \"เป็นงานที่สำคัญเลยสินะ ครูจะตั้งใจทำเลย!\""
80000112-58 = "อืม โล่งอกไปทีนะที่เห็นคุณครูดูตั้งอกตั้งใจ"
80000112-59 = "ถ้างั้นเราไปที่สถานที่จัดงานเลยมั้ย?"
80000112-63 = "(จากนั้นคุณครูก็ตามคิเคียวไปช่วยจัดงานที่ย่านการค้า)"
80000112-77 = "(เริ่มจากไปช่วยในกิจกรรมทำช็อกโกแลต...)"
80000112-85 = "(และต่อด้วยกิจกรรมอื่นๆ มากมาย)"
80000112-91 = "(เช่น สนับสนุนการแข่งขันทำช็อกโกแลตจากตัวแทนของทุกเขตปกครองตนเองในคิโวทอส) "
80000112-92 = "(และเป็นกรรมการตัดสินการแต่งกลอนไฮกุสดๆ ในหัวข้อวันวาเลนไทน์...)"
80000112-94 = "วันนี้ต้องขอบคุณมากนะครับ!"
80000112-95 = "เพราะได้ท่านที่ปรึกษาเฮียกกะเรียวรันกับคุณครูจากชาเล่ต์มาช่วยไว้แท้ๆ เลย กิจกรรมในวันนี้ก็เลย#nได้รับการตอบรับอย่างดีมากเลยครับ!"
80000112-96 = "พอได้เห็นเด็กๆ ที่ยิ้มแย้มอย่างมีความสุขมากกว่าทุกวัน ฉันก็ดีใจมากเลยละครับ! ถ้าไม่ติดอะไรละก็ ไว้คราวหน้าพวกผมขอความช่วยเหลืออีกได้ไหมครับ?"
80000112-97 = "[s] \"ถ้าเป็นเรื่องนี้ก็ยินดีช่วยเสมอเลย\""
80000112-98 = "ดีจังเลยนะ คุณครูมีคนชอบเยอะแยะขนาดนี้ "
80000112-99 = "คุณดูเหมาะกับการดูแลเด็กๆ อยู่นะ?"
80000112-100 = "ฮะฮ่า! ถ้าเป็นเรื่องนั้นละก็ ท่านที่ปรึกษาเฮียกกะเรียวรันก็เก่งไม่แพ้กันเลยนะครับ!"
80000112-101 = "โดยเฉพาะในกิจกรรมตอบคำถามวิ่งสามขา ตอนที่ตอบคำถามถูก เด็กๆ พากันเรียกว่าเป็นพี่สาวสุดเท่#nเลยนะครับ! ฮะฮ่า!"
80000112-102 = "ระ... เรื่องนั้น... ฉันก็แค่... มีสุขภาพร่างกายที่เหมาะกับการเล่นวิ่งตอบคำถามน่ะ..."
80000112-103 = "[s] \"คิเคียว... เขินเหรอ?\""
80000112-107 = "ฮึ่ม..."
80000112-112 = "[ns] \"ฮู่ว... เราวิ่งวุ่นกันทั้งวันจนเวลาล่วงเลยมาขนาดนี้แล้วเหรอเนี่ย\""
80000112-116 = "อืม... อย่างที่คุณว่าเลยนะ... เราอยู่กันจนพระอาทิตย์ตกดินเลย"
80000112-117 = "ขอบคุณที่วันนี้มาอยู่ด้วยกันนะ คุณครู "
80000112-118 = "วันนี้ฉันได้ทำกิจกรรมมากมายในฐานะเฮียกกะเรียวรันเลยละ"
80000112-119 = "......"
80000112-120 = "อืม... เพราะงั้น..."
80000112-121 = "ฉันเลยอยากฟังความรู้สึกที่ได้อยู่ด้วยกันในวันนี้จากคุณครูน่ะ"
80000112-122 = "[s] \"อ่า... อื้ม ครูก็สนุกเหมือนกันที่ได้มาทำกิจกรรมกับคิเคียวแบบนี้นะ\""
80000112-123 = "อ่า อื้ม..."
80000112-124 = "......"
80000112-125 = "จบ... แค่นี้เหรอ?"
80000112-126 = "ไม่มีอะไรที่... อยากพูดมากกว่านี้เหรอ?"
80000112-127 = "[s] \"หืม? ก็ไม่มีอะไรเป็นพิเศษนะ...\""
80000112-128 = "ไม่ ลองคิดให้ดีๆ สิคุณครู วันนี้เราได้อยู่ด้วยกันทั้งวัน แล้วก็ได้เปิดประสบการณ์กับกิจกรรมหลาย#nอย่างเลยด้วย"
80000112-129 = "และทั้งหมดนั่นก็เป็น... กิจกรรมวันวาเลนไทน์"
80000112-130 = "ถ้าอย่างนั้นก็ควรเกิดความรู้สึกจากใจออกมาอย่างเป็นธรรมชาติ..."
80000112-131 = "ไม่รู้สึกถึง <ความปรารถนา> อะไรเลยเหรอ?"
80000112-132 = "ไม่ต้องปฏิเสธหรอกนะ ถ้าคุณมีความปรารถนาอะไรละก็ บอกฉันได้อย่างไม่ต้องปิดบังเลย"
80000112-133 = "[s] \"อ้อ ถ้าเป็นเรื่องนั้น... มันก็มีอยู่อย่างหนึ่ง\""
80000112-134 = "งั้นสินะ... กะไว้แล้วว่าต้องเป็นอย่างนี้"
80000112-135 = "ไหนลองบอกฉันมาสิ"
80000112-140 = "บอกฉันได้เลยว่าตอนนี้คุณคิดอะไรอยู่ และมีความปรารถนาอะไรอยู่กันแน่"
80000112-144 = "[ns] \"วันนี้ครูดีใจมากเลยที่ได้มาช่วยคิเคียว\""
80000112-148 = "[ns] \"ต่อไปถ้ามีเรื่องแบบนี้อีก ครูก็อยากให้มาบอกครูอย่างไม่ต้องลังเลนะ\""
80000112-149 = "เพราะนั่นคือสิ่งที่ชาเล่ต์ต้องทำ... งั้นเหรอ"
80000112-150 = "อืม คุณก็เอาแต่พูดเรื่องนี้จนจบเลยสินะ"
80000112-154 = "เรื่องที่อยากพูด... มีแค่นี้งั้นเหรอ?"
80000112-155 = "[s] \"อ่า... กะ... ก็ใช่\""
80000112-156 = "อืม... งั้นสินะ"
80000112-161 = "เป็นอย่างนี้นี่เอง... ฮุฮุ"
80000112-162 = "คุณกำลังบอกฉันว่า... ตัวเองไม่มีความต้องการหรือความปรารถนาอะไรเลยสินะ"
80000112-163 = "แบบนี้มันช่าง..."
80000112-164 = "ไม่อยากจะเชื่อเลย..."
80000112-168 = "[ns] \"คิเคียว...?\""
80000112-169 = "ฉันอุตส่าห์ทุ่มเทเตรียมแผนนี้เอาไว้ แต่ว่าคุณก็... ไม่พูดอะไรเลย..."
80000112-170 = "ไม่คิดแม้แต่จะพูดว่า..."
80000112-171 = "<ขอช็อกโกแลตวันวาเลนไทน์ให้ครูหน่อย> เลยงั้นเหรอ..."
80000112-172 = "ไม่อยากจะเชื่อเลยจริงๆ...!"
80000112-173 = "[s] \"หืม......?\""
80000112-175 = "(หลังจากนั้นคุณครูก็ได้ฟังคำอธิบายจากคิเคียวตั้งแต่ต้นจบจบ)"
80000112-177 = "[ns] \"แปลว่าการไปช่วยงานของหมู่บ้าน และกิจกรรมที่เราทำทั้งหมด...\""
80000112-178 = "เฮ้อ... ใช่ ถ้ามาถึงขนาดนี้แล้วก็ไม่จำเป็นต้องปิดบังอะไรแล้วละ"
80000112-179 = "ใช่แล้วละ ฉันตั้งใจคิดแผนการนี้ขึ้นมาเพื่อทำให้คุณเกิดความปรารถนาในใจ"
80000112-180 = "เพื่อให้คุณคิดว่าตัวเองก็ <อยากได้ช็อกโกแลต> ดูบ้าง"
80000112-181 = "แต่นี่มันอะไรกัน... คุณก็เอาแต่พูดจาอ้อมไปมา แล้วก็ไม่เอ่ยถึงช็อกโกแลตอะไรสักนิด..."
80000112-182 = "[s] \"เดี๋ยวก่อน ทำไมถึง...?\""
80000112-183 = "ทำไมถึงต้องวางแผนการขนาดนี้น่ะเหรอ?"
80000112-184 = "ก็ถ้าคุณไม่ได้บอกคำๆ นั้นกับฉันก่อน..."
80000112-185 = "แล้วฉันเป็นคนให้ช็อกโกแลตกับคุณเอง มันก็เหมือนว่า..."
80000112-186 = "[s] \"เหมือนว่า...?\""
80000112-187 = "เหมือนว่าฉัน... "
80000112-188 = "เป็นฝ่ายแพ้ยังไงล่ะ!"
80000112-189 = "[s] \"......\""
80000112-190 = "ฉันตั้งใจไว้ว่าถ้าอย่างน้อยคุณอยากได้ช็อกโกแลตจากฉัน ฉันก็จะวางมาดและเล่นตัวสักหน่อย"
80000112-191 = "แต่คุณก็ไม่มีท่าทีว่าจะพูดออกมาเลย...! "
80000112-192 = "อื้ม! ไม่อยากจะเชื่อเลยจริงๆ! ทีนี้รู้หรือยังล่ะว่าคุณทำผิดเรื่องอะไร!"
80000112-193 = "[s] \"เดี๋ยวสิ แบบนี้ไม่ยุติธรรมนะ!\""
80000112-194 = "ไม่คิดเลยนะว่าคุณจะปฏิเสธจนถึงที่สุดแบบนี้..."
80000112-195 = "นี่ฉันคำนวณผิดไปตรงไหนนะ... จริงๆ เลย"
80000112-196 = "[s] \"คือว่า... คิเคียว เหตุผลที่ครูไม่ขอช็อกโกแลตน่ะ...\""
80000112-197 = "หืม...? มีเหตุผลที่ไม่ของั้นเหรอ?"
80000112-198 = "เพราะตอนที่คุยโทรศัพท์กันตอนแรก... ก่อนวางสายคุณได้ยินว่าฉันเตรียมช็อกโกแลตเอาไว้ให้แล้ว... งั้นเหรอ?"
80000112-199 = "ก็เลยคิดว่าถ้าช่วยงานเสร็จแล้ว... ฉันจะเอาช็อกโกแลตมาให้เอง... งั้นเหรอ?"
80000112-200 = "แปลว่าคุณรู้เรื่องทั้งหมดตั้งแต่แรกแล้ว..."
80000112-201 = "......"
80000112-202 = "อึก...!!"
80000112-203 = "[s] \"อ่า... แต่ก็ขอโทษที่ไม่รู้ใจคิเคียวนะ\""
80000112-204 = "ไม่หรอก ถ้ารู้อย่างนั้น ฉันเองก็คง...!"
80000112-205 = "ดะ... เดี๋ยวนะ ถ้าเป็นอย่างที่ว่าจริงๆ ก็แปลว่าคุณเองก็อยากให้ฉันเอาช็อกโกแลตมาให้น่ะสิ..."
80000112-206 = "เป็นแบบนี้สินะ... อ่า..."
80000112-207 = "ฮึ่ม...!"
80000112-208 = "เอาละ นี่คือช็อกโกแลตที่ฉันเตรียมไว้ให้"
80000112-214 = "ช็อกโกแลตสูตรพิเศษที่ที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันเตรียมเป็นพิเศษไว้ให้คุณ"
80000112-215 = "รับไปสิ"
80000112-225 = "[ns] \"ขอบใจนะคิเคียว...\""
80000112-226 = "ถ้าจะขอบใจ!"
80000112-227 = "ก็เอาไว้... หลังจากชิมช็อกโกแลตก่อน..."
80000112-228 = "แล้วฉันจะรับคำคำนั้นไว้"
80000112-234 = "แต่ตอนนี้... ฉันเขินที่เราจะมองหน้ากัน"
80000112-235 = "เรื่องความประทับใจที่มีต่อช็อกโกแลต คุณไปเขียนใส่กระดาษ A4 มาสัก 10 หน้าแล้วค่อยเอามาให้#nฉันแล้วกัน"
80000112-236 = "[s] \"อ่า... รับทราบ...\""
80000112-237 = "ฮึ่ม...!"
80000112-239 = "(ช็อกโกแลตที่ได้รับจากคิเคียวหลังจากความสับสนแปลกๆ นั้น...)"
80000112-240 = "(หวานและอร่อยมากอย่างไม่ต้องพูดถึง)"

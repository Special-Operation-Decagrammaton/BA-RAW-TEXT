[translation]
80000112-1 = "The Operations Officer Does Not Want to Lose"
80000112-3 = "I was working at Schale as usual."
80000112-8 = "[ns] \"Hello, Sensei here.\""
80000112-12 = "Greetings, Sensei."
80000112-13 = "I called you here today because as a member of the Hyakkaryouran... I wanted to put in an official request for Schale's help."
80000112-14 = "Well... I don't expect this will do much, but do you have some free time on your schedule today?"
80000112-15 = "[s] \"Plenty.\""
80000112-17 = "[ns] \"And even if I didn't, I'll always make time for a student, Kikyou!\""
80000112-18 = "*sigh* You do not have to put on airs. I am well aware of how grueling Schale's work schedule is."
80000112-19 = "I know you constantly go out of your way to help students. I hold you in high regard for that very reason..."
80000112-20 = "But I have no intention of causing you inconveniences or worse, making you overwork yourself. "
80000112-21 = "In fact, if you pull something like that in the name of being considerate, I'll be furious. So I suggest you choose your next words carefully."
80000112-22 = "[ns1] \"I really appreciate hearing that, Kikyou.\"\n[ns2] \"But I really am free today, so no need to fret.\""
80000112-25 = "...Hmph."
80000112-26 = "I see. If you truly have no conflicts in your schedule, fine."
80000112-27 = "Very well... I'll be waiting."
80000112-31 = "...That takes care of the call with Sensei."
80000112-35 = "[ns] \"(Hm? I think the call is still...)\""
80000112-36 = "Now then, I should set out what I prepared before Sensei arrives..."
80000112-40 = "Next up, I need make sure my plan is flawless..."
80000112-44 = "[ns] \"What was that just now...?\""
80000112-46 = "After she obliviously hung up, I met up with Kikyou at the promised location."
80000112-51 = "[ns] \"So, what did you need my help with today?\""
80000112-52 = "Ah, it's very simple."
80000112-53 = "Sensei, you should know. Today is Valentine's Day, right?"
80000112-54 = "[s] \"Right.\""
80000112-55 = "We have all sorts of events going on here at Hyakkiyako for a special day like today."
80000112-56 = "I plan on helping with a few of those events today, as they're an important part of the Hyakkaryouran's responsibilities."
80000112-57 = "[s] \"I see... That's quite the important task. I'll make sure to do my best!\""
80000112-58 = "I'm glad you're enthusiastic about it."
80000112-59 = "Shall we head to the site then?"
80000112-63 = "I followed Kikyou and helped her with the events at the shopping district."
80000112-77 = "We started with an impromptu chocolate making event..."
80000112-85 = "Followed by assisting in the Kivotos Chocolate Contest..."
80000112-91 = "I was the referee for the Valentine's Day themed improvisational haiku battle, and so on."
80000112-92 = "After a busy day helping with several events..."
80000112-94 = "Thank you so much for today!"
80000112-95 = "Having the Hyakkaryouran's officer and Schale's Sensei here got us a lot of extra attention this time!"
80000112-96 = "It was lovely to see to see the children smile even brighter than usual! Would it be all right to ask for your help next time as well?"
80000112-97 = "[s] \"That's fine with me.\""
80000112-98 = "You're so popular, Sensei. You must be pleased as punch."
80000112-99 = "Maybe you have a knack for looking after little children?"
80000112-100 = "Haha! The same goes to you too, Miss Officer!"
80000112-101 = "The children were calling you their cool big sis as you blazed through all the questions in that three-legged race quiz event! Haha!"
80000112-102 = "Th-That's...only because...I happen...to be good with things like quizzes."
80000112-103 = "[s] \"Kikyou... You're not embarrassed are you?\""
80000112-107 = "...Hmph."
80000112-112 = "[ns] \"Phew, we wrapped up pretty late.\""
80000112-116 = "...Yeah. It's as you say. The sun has already set."
80000112-117 = "Thanks for keeping pace with me today, Sensei."
80000112-118 = "Thanks to you, the Hyakkaryouran was able to accomplish a great deal today."
80000112-119 = "..."
80000112-120 = "Mm, that said..."
80000112-121 = "I want to hear what you thought about working with me today."
80000112-122 = "[s] \"Ah, yes. I had a lot of fun.\""
80000112-123 = "Oh, yeah?"
80000112-124 = "..."
80000112-125 = "...That's it?"
80000112-126 = "There isn't anything else you want to say?"
80000112-127 = "[s] \"Huh? No, nothing in particular...\""
80000112-128 = "Please think, Sensei. We went to a lot of events together today."
80000112-129 = "They were all brilliant events...Valentine's Day events."
80000112-130 = "With that in mind, have any new feelings started to build up in your heart?"
80000112-131 = "Something new you may have started to wish for?"
80000112-132 = "No need to feel reserved. Tell me. I can keep a secret."
80000112-133 = "[s] \"Ah, if that's the case... There is one thing.\""
80000112-134 = "Yes... I knew it."
80000112-135 = "Please, tell me."
80000112-140 = "Whatever you wish for, say it. I want to hear it from you directly."
80000112-144 = "[ns] \"I'm glad I was able to help you today.\""
80000112-148 = "[ns] \"I hope you don't hesitate to call me for help with stuff like this in the future.\""
80000112-149 = "Of course, that's what Schale is supposed to do..."
80000112-150 = "Yeah. You'll keep saying something like that until the very end."
80000112-154 = "...Was that all?"
80000112-155 = "[s] \"Yeah. Wh-Why?\""
80000112-156 = "...Hmm. I see."
80000112-161 = "So that's how it is... Heehee."
80000112-162 = "You truly don't have anything you wish for?"
80000112-163 = "Goodness... That's..."
80000112-164 = "─Unbelievable!"
80000112-168 = "[ns] \"Kikyou?\""
80000112-169 = "I put in so much work into this plan, and you... Not once..."
80000112-170 = "Not even once─!"
80000112-171 = "...thought of saying, \"Give me a Valentine's Day chocolate!\""
80000112-172 = "I can't believe this!"
80000112-173 = "[s] \"...Huh?\""
80000112-175 = "At her absolute limit, Kikyou fessed up."
80000112-177 = "[ns] \"So you're saying that everything we did today was all part of your plan to...\""
80000112-178 = "...*sigh* Yes. No point hiding it now."
80000112-179 = "You're right. All of these things were to fill your heart with a desire for Valentine's Day."
80000112-180 = "With the intent to make you start thinking, \"I would love to get a chocolate from Kikyou!\""
80000112-181 = "...And somehow, you slyly avoided saying anything like that. Not even once!"
80000112-182 = "[s] \"Wait, why would you...?\""
80000112-183 = "Plan something like this?"
80000112-184 = "Obviously, if I went ahead and just gave you the chocolate..."
80000112-185 = "Without hearing you say that..."
80000112-186 = "[s] \"You would...?\""
80000112-187 = "I-I would... "
80000112-188 = "I would feel like I lost!"
80000112-189 = "[s] \"...\""
80000112-190 = "I promised myself that when you asked for my chocolate, I would mess with you a bit before finally sharing some with you."
80000112-191 = "Instead, that all went right over your head!"
80000112-192 = "Urgh! I can't believe it! Do you get it now? Do you understand what you've done wrong?"
80000112-193 = "[s] \"Aren't you being a bit extreme right now?!\""
80000112-194 = "I can't believe you'd stonewall me like this till the very end..."
80000112-195 = "Where did I go wrong? Were my calculations off?"
80000112-196 = "[s] \"Listen, Kikyou. About why I didn't ask you for the chocolate...\""
80000112-197 = "...Hm? You had a reason for acting like that?"
80000112-198 = "You're saying that during our call...you overheard that I had prepared the chocolate before I hung up?"
80000112-199 = "You thought I would just give you the chocolate once we finished our volunteer work?"
80000112-200 = "That means you knew everything from the start..."
80000112-201 = "..."
80000112-202 = "Ugh!"
80000112-203 = "[s] \"I, um, I'm sorry that I didn't consider your feelings.\""
80000112-204 = "I mean, if I knew that, I would've—!"
80000112-205 = "Wait! If that's the case...that means you were looking forward to my chocolate..."
80000112-206 = "Which means... Oh! Um..."
80000112-207 = "...Ahem!"
80000112-208 = "...It's as you mentioned, Sensei. Please, enjoy the chocolate I've prepared."
80000112-214 = "This is a special, artisanal chocolate, crafted by the Hyakkaryouran's operations officer, just for you."
80000112-215 = "Here, take it."
80000112-225 = "[ns] \"Thank you, Kiky—\""
80000112-226 = "A thank you would be nice!"
80000112-227 = "...After you've tasted it...of course..."
80000112-228 = "How about I get your thanks later."
80000112-234 = "I'm...a little too embarrassed to look at your face right now."
80000112-235 = "Just send me a ten page report on what you thought about the chocolate later."
80000112-236 = "[s] \"Uh, s-sure...\""
80000112-237 = "...Hmph!"
80000112-239 = "The chocolate I got from Kikyou after all that commotion..."
80000112-240 = "...was sweet and delicious."

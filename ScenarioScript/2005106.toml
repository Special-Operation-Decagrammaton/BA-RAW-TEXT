[translation]
2005106-1 = "真是乖巧呢，澪紗"
2005106-3 = "老師，我在這裡！！"
2005106-4 = "[s]「歡迎你，澪紗！」"
2005106-5 = "呵呵，「宇沢澪紗」……"
2005106-6 = "我確實曾經擁有過這樣的名字呢。"
2005106-7 = "[s]「咦？？？」"
2005106-8 = "請稱呼我為「Thermite Pink」吧！"
2005106-9 = "[s]「終於覺醒了嗎！！」"
2005106-10 = "哇哈哈！"
2005106-14 = "嗚嗚……"
2005106-15 = "居然會被困在衣服裡兩次……"
2005106-16 = "我已經放棄掙扎了……"
2005106-17 = "[s]「既然躲不掉就享受它吧！」"
2005106-18 = "唔嗯，雖然穿上喜歡的服裝確實很開心！"
2005106-19 = "不過已經到巡邏時間了！"
2005106-20 = "本來只是想在出發前試穿一下來轉換心情……"
2005106-21 = "沒想到會變成這樣！！"
2005106-22 = "得趕快換好衣服去巡邏才行……"
2005106-27 = "喂，你打算怎麼辦啊？"
2005106-28 = "肩膀好像斷了耶？啊啊～！！"
2005106-29 = "太，太誇張了吧！！#n明明只是不小心撞到肩膀而已！"
2005106-30 = "撞到人還好意思理直氣壯？"
2005106-31 = "醫藥費我直接從你錢包拿就行了吧？"
2005106-32 = "哇啊，請不要這樣！！"
2005106-37 = "快住手！！"
2005106-42 = "搞什麼啊？穿得怪模怪樣的。"
2005106-43 = "是在扮演公主嗎？"
2005106-49 = "還是在扮演妖精？"
2005106-55 = "總之快滾開！我正在做生意耶！"
2005106-61 = "哇啊啊！！我，我的肩膀！！！"
2005106-62 = "好像真的斷了，好痛啊！！！"
2005106-64 = "請你立刻道歉！！"
2005106-66 = "唔，對，對不起！！#n我為剛才的碰瓷行為向你道歉！！"
2005106-67 = "啊，唔嗯……好，好吧……"
2005106-69 = "還要再道歉兩次！！#n誰叫你剛才說我是公主還是妖精之類的！！！"
2005106-70 = "什麼跟什麼啊！"
2005106-72 = "啊啊，誰來救救我們家咚咚啊！！"
2005106-73 = "我們家咚咚卡在樹上了！！"
2005106-74 = "交給我吧！"
2005106-75 = "這次是貓咪爬到樹上了嗎！"
2005106-76 = "馬上出動！"
2005106-82 = "嘿咻！"
2005106-83 = "樹上沒有貓，只有一台無人機？"
2005106-84 = "哎呀，我們家咚咚肯定嚇壞了吧！！"
2005106-85 = "剛才一不小心就卡在樹上了……真的非常感謝！"
2005106-86 = "咦？？？"
2005106-88 = "哎呀糟糕！！救命啊！！"
2005106-89 = "我來了！！"
2005106-91 = "今天的事件特別多呢。"
2005106-92 = "忙到連換衣服的時間都沒有。"
2005106-93 = "[s]「幸好現在總算告一段落了。」"
2005106-94 = "呵呵，對自衛隊的王牌來說，這點小事不算什麼！"
2005106-95 = "那麼也差不多該回去──"
2005106-100 = "哇啊～！我的風箏！！"
2005106-101 = "要掉進河裡了！！"
2005106-102 = "那可是勞作課的作業啊──！"
2005106-103 = "！！"
2005106-104 = "必須守護那孩子努力的結晶！"
2005106-105 = "哈啊！！！"
2005106-112 = "― [log=레이사 매지컬]Safe！[/log][wa:1950] "
2005106-115 = "― [log=레이사 매지컬]呵呵……風箏的和平守護成功！[/log][wa:2508] "
2005106-117 = "― [log=레이사 매지컬]就在掉進水裡的前一刻！像這樣被我抓住了！[/log][wa:2170] "
2005106-120 = "[ns]「澪紗，沒事吧？」"
2005106-122 = "― [log=레이사 매지컬]只要是為了大家，自衛隊絕不會猶豫！[/log][wa:2700] "
2005106-125 = "― [log=레이사 매지컬]無論是火中，還是水中！[/log][wa:1470] "
2005106-127 = "― [log=레이사 매지컬]任何地方都會縱身而入！咿嘿嘿……！[/log][wa:2770] "
2005106-130 = "[ns]「你全身都濕透了，小心會感冒哦。」"
2005106-131 = "― [log=레이사 매지컬]所謂英雄的服裝──[/log][wa:1400] "
2005106-133 = "― [log=레이사 매지컬]只有在履行英雄職責的時候才會閃耀！[/log][wa:2730] "
2005106-136 = "― [log=레이사 매지컬]另外，這套衣服可以丟洗衣機，所以沒問題的！[/log][wa:2330] "
2005106-139 = "― [log=레이사 매지컬]而且……老師曾經教過我。[/log][wa:4051] "
2005106-141 = "― [log=레이사 매지컬]只有不迷惘的人──才能守護大家！耶嘿嘿！[/log][wa:4700] "
2005106-144 = "― [log=레이사 매지컬]嘿嘿，耶，耶嘿……[/log][wa:1540] "
2005106-146 = "― [log=레이사 매지컬]哈啾！！[/log]"
2005106-149 = "― [log=레이사 매지컬]嗚嗚……[/log]"
2005106-152 = "（之後把乖巧的澪紗帶回了夏萊）"
2005106-153 = "（讓他洗了澡並好好休息）"

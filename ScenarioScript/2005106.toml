[translation]
2005106-1 = "สุดยอดเลย เรอิสะ"
2005106-3 = "คุณครู ทางนี้ค่ะ!!"
2005106-4 = "[s] \"โอ้ เข้ามาสิ เรอิสะ!\""
2005106-5 = "ฮุฮุ 'อุซาวะ เรอิสะ'"
2005106-6 = "ครั้งหนึ่งฉันเคยใช้ชื่อแบบนั้นสินะคะ"
2005106-7 = "[s] \"หืม???\""
2005106-8 = "ช่วยเรียกฉันว่า 'เทอร์ไมต์ พิงค์' เถอะค่ะ!"
2005106-9 = "[s] \"จะแปลงร่างถาวรเลยเหรอเนี่ย!!\""
2005106-10 = "วะฮะฮ่า!"
2005106-14 = "อึกก..."
2005106-15 = "ต้องอยู่ในชุดนี้เพราะซิปพัง 2 รอบเลย..."
2005106-16 = "สงสัยฉันจะดวงกุดจริงๆ ด้วยค่ะ..."
2005106-17 = "[s] \"ถ้าหลีกเลี่ยงไม่ได้ ก็สนุกกับมันแล้วกัน!\""
2005106-18 = "อืม ที่จริงฉันก็ดีใจที่ได้ใส่ชุดที่ชอบค่ะ!"
2005106-19 = "แต่ถึงเวลาที่ต้องไปเดินลาดตระเวนแล้วน่ะสิคะ!"
2005106-20 = "ฉันแค่หยิบชุดนี้มาใส่เพื่อปลุกพลังก่อนออกไปลาดตระเวนก็เท่านั้น"
2005106-21 = "แต่คิดไม่ถึงเลยว่าซิปจะพังจนถอดชุดไม่ได้อีกรอบค่ะ!!"
2005106-22 = "ฉันต้องเปลี่ยนชุดแล้วไปลาดตระเวนแท้ๆ..."
2005106-27 = "นี่ ทำงี้ได้ไง? ฮะ?"
2005106-28 = "ไหล่ฉันหลุดเลยหรือเปล่าเนี่ย? โอ๊ย~!!"
2005106-29 = "อะ... อะไรกันครับ!! ผมแค่เผลอเดินไปชนไหล่เบาๆ เอง!"
2005106-30 = "เดินชนกันแล้วมาหาว่าฉันสำออยงั้นเรอะ?"
2005106-31 = "เปิดกระเป๋าสตางค์แล้วเอาค่ารักษาพยาบาลมาเดี๋ยวนี้เลย"
2005106-32 = "ฮืออ อย่าทำแบบนี้เลยครับ!!"
2005106-37 = "หยุดเดี๋ยวนี้นะคะ!"
2005106-42 = "อะไรกัน? แล้วใส่ชุดแปลกๆ มาทำไมเนี่ย?"
2005106-43 = "คิดว่าตัวเองเป็นเจ้าหญิงเรอะ?"
2005106-49 = "หรือว่าเป็นนางฟ้า?"
2005106-55 = "ไปทางโน้นเลย! พวกฉันกำลังคุยธุรกิจกันอยู่!"
2005106-61 = "โอ๊ยย!! ละ... ไหล่ฉัน!!!"
2005106-62 = "เหมือนไหล่จะหลุดจริงๆ เลย อ๊ากกก!!"
2005106-64 = "ขอโทษเดี๋ยวนี้เลยค่ะ!!"
2005106-66 = "อ๊ากก ขะ... ขอโทษค่ะ!! ขอโทษที่ข่มขู่และรีดเงินค่ะ!!"
2005106-67 = "คะ... ครับ... ก็ได้..."
2005106-69 = "ขอโทษเพิ่มอีก 2 รอบค่ะ!!!! เรื่องที่แซวว่าฉันเป็นเจ้าหญิงกับนางฟ้าไงคะ!!!"
2005106-70 = "ต้องขอโทษเรื่องนั้นด้วยเหรอ?!"
2005106-72 = "ตายจริง ดนนี่ลูกพ่อ!!"
2005106-73 = "ดนนี่ไปติดอยู่บนต้นไม้เสียได้!!"
2005106-74 = "อืม!"
2005106-75 = "แมวเหมียวขึ้นไปบนต้นไม้แล้วลงมาไม่ได้งั้นเหรอคะ?"
2005106-76 = "ออกปฏิบัติการ!"
2005106-82 = "ฮึบ!"
2005106-83 = "บนต้นไม้ไม่มีแมว แต่มีโดรนเครื่องนี้ติดอยู่แทนค่ะ"
2005106-84 = "ตายจริง ดนนี่ กลัวมากเลยใช่มั้ย?!"
2005106-85 = "ขอบคุณมากเลยนะครับ พอดีดนนี่ของผมบินไปติดอยู่บนต้นไม้น่ะ!!"
2005106-86 = "คะ????"
2005106-88 = "คุณพระ!! ช่วยด้วยค่ะ!!"
2005106-89 = "ไปเดี๋ยวนี้ละค่ะ!!"
2005106-91 = "วันนี้เกิดเรื่องขึ้นเยอะไปหมดเลยนะคะ"
2005106-92 = "ไม่มีเวลาให้ฉันเปลี่ยนเสื้อผ้าเลยค่ะ"
2005106-93 = "[s] \"แต่ตอนนี้เหมือนจะสงบลงแล้วนะ\""
2005106-94 = "ฮุฮุ แค่นี้ไม่เกินกำลังเอซแห่งกลุ่มรักษาความสงบหรอกค่ะ!"
2005106-95 = "งั้นเรากลับ..."
2005106-100 = "แงง! ว่าวของฉัน!!"
2005106-101 = "ว่าวกำลังตกแม่น้ำแล้ว!!"
2005106-102 = "อุตส่าห์ตั้งใจทำเป็นการบ้านงานประดิษฐ์แท้ๆ แง"
2005106-103 = "!!"
2005106-104 = "ฉันจะปกป้องผลงานจากความตั้งใจของเด็กคนนั้นเองค่ะ!"
2005106-105 = "ย๊าก!!!"
2005106-112 = "― [log=레이사 매지컬]เซฟ!![/log][wa:1950] "
2005106-115 = "― [log=레이사 매지컬]ฮุฮุ...สันติสุขของว่าวได้รับการปกป้องแล้วค่ะ![/log][wa:1268] "
2005106-117 = "― [log=레이사 매지컬]ก็ฉันรับเอาไว้ได้! ก่อนจะร่วงลงไปในแม่น้ำนี่คะ! [/log][wa:1050] "
2005106-120 = "[ns] \"เรอิสะ เป็นยังไงบ้าง?\""
2005106-122 = "― [log=레이사 매지컬]ถ้าเป็นการทำเพื่อทุกคนละก็ กลุ่มรักษาความสงบจะไม่รีรอเลยค่ะ![/log][wa:980] "
2005106-125 = "― [log=레이사 매지컬]ไม่ว่าจะในกองไฟหรือในน้ำ [/log][wa:910] "
2005106-127 = "― [log=레이사 매지컬]ไม่ว่าที่ไหน เราก็จะพุ่งเข้าใส่ค่ะ! แหะๆๆ [/log][wa:1770] "
2005106-130 = "[ns] \"เปียกโชกหมดเลย เดี๋ยวเป็นหวัดกันพอดี\""
2005106-131 = "― [log=레이사 매지컬]นับแต่ยุคโบราณชุดของฮีโร่[/log][wa:760] "
2005106-133 = "― [log=레이사 매지컬]ย่อมเปล่งประกายในภารกิจของฮีโร่![/log][wa:2130] "
2005106-136 = "― [log=레이사 매지컬]และชุดนี้ก็ซักเครื่องได้ด้วยค่ะ![/log][wa:1890] "
2005106-139 = "― [log=레이사 매지컬]นอกจากนี้... ฉันก็ได้เรียนรู้มาจากคุณครูว่า [/log][wa:2771] "
2005106-141 = "― [log=레이사 매지컬]ผู้ที่ไม่รีรอ จะปกป้องทุกคนได้ค่ะ! แหะๆๆ![/log][wa:3860] "
2005106-144 = "― [log=레이사 매지컬]แหะๆ ฮะ... ฮะ... [/log][wa:1220] "
2005106-146 = "― [log=레이사 매지컬]ฮัดชิ้ว!! [/log][wa:10] "

2005106-152 = "(จากนั้นคุณครูก็พาเรอิสะที่น่าภูมิใจกลับมาที่ชาเล่ต์)"
2005106-153 = "(แล้วก็ให้ล้างเนื้อล้างตัวและพักผ่อนที่นั่น)"

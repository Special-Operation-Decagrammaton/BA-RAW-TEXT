10047090-68 = "[ns] \"(I should hurry too.)\""
10047090-73 = "[ns1] \"Is this the starting point?\"\n[ns2] Check the magic circle materials."
10047090-78 = "After digging in the designated spot, I found wires, LED lights, and reflective tape."
10047090-80 = "We will draw the circle with LED lights and reflective tape."
10047090-81 = "The lights will fire off in a chain once we administer the signal."
10047090-82 = "How about it, Sensei? It's safe...as I said. Heehee..."

10047090-112 = "[s] \"Uh... Well... You see...\""
10047090-116 = "[ns5] \"Oh! Y-Yes! I-I thought I should put lights in the flowerbed...!\"\n[ns6] \"For art! Just making art for the students!\""
10047090-119 = "I didn't see anything about that on the approved schedule..."
10047090-123 = "Communications Security, this is Owl 3. Were there any creative...flower-based activities scheduled tonight?"
10047090-127 = "...I see. Understood. I will respond accordingly."
10047090-133 = "Sensei, please do exactly as I say. I ask for your peaceful cooperation."
10047090-134 = "[ns] \"Ugh...!\""

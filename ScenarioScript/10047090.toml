10047090-159 = "Sensei, I've received additional reports. What are you coordinating with the students of Unit 404?"
10047090-160 = "Be honest. We may grant you leniency if you cooperate."
10047090-161 = "[s] \"W-Well...!\""
10047090-165 = "Caw! Caaww!"
10047090-170 = "What did that crow drop?"

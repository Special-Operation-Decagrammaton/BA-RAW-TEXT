[translation]
10047090-1 = "Episode 9;The Operation Begins"
10047090-3 = "Finally, it was the special day."
10047090-10 = "Master! Tonight's the night! Are you ready?"
10047090-12 = "[ns] \"Oh? Where's Rena?\""

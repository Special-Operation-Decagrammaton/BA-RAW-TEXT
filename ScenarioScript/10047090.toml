[translation]
10047090-1 = "第9話;作戰開始"
10047090-3 = "（時間流逝，來到作戰當天……）"
10047090-10 = "御者～！這一天終於到了呢！"
10047090-12 = "[ns]「嗯？怎麼沒見到玲奈？」"
10047090-13 = "玲奈醬……決定不參與這次的行動。"
10047090-14 = "他今天……應該不會來了……#n說是要在其他地方過夜。"
10047090-15 = "我能理解他的想法。#n這次的作戰確實相當危險。"
10047090-16 = "況且強迫別人相信他不相信的東西，也無法對藝術發展帶來正面的影響。"
10047090-17 = "互相接納彼此的多樣性，大家才能一起向前邁進。"
10047090-22 = "妞呵呵。那麼就一邊確認作戰計畫，一邊等待夜晚降臨吧。"
10047090-30 = "好，時間到了。#n我們到街上去吧。"
10047090-51 = "呼啊啊……好睏。#n快點巡邏完回去睡覺吧。"
10047090-52 = "就是說啊。哪有人會在今天這種明月高掛的夜晚作怪啊？"
10047090-58 = "妞呵呵，看來他們不知道滿月之夜反而充滿魔力呢。"
10047090-59 = "無論如何，警戒似乎變鬆懈了呢。#n這是個好兆頭。"
10047090-60 = "那麼……大家就分頭行動吧……"
10047090-61 = "是！請大家各自負責地圖上標記的區域！"
10047090-62 = "順利完成工作之後，回到集合點會合！"
10047090-63 = "願魔法的庇佑與大家同在！"
10047090-68 = "[ns]（我也趕快移動吧）"
10047090-73 = "[ns1]「是先從這裡開始嗎？」\n[ns2] 檢查畫魔法陣的材料"
10047090-78 = "（挖開地圖上標記的地點後，發現裡面有許多LED燈條和蓄光膠帶）"
10047090-80 = "魔法陣會用LED燈條和蓄光膠帶來畫。"
10047090-81 = "燈條設定好之後，只要收到信號就會接連亮起。"
10047090-82 = "怎麼樣，老師？#n確實和我說的一樣，是安全的材料吧？咿嘻……"
10047090-84 = "[ns3]「……確實是安全的材料沒錯。」\n[ns4]（在被舍監隊發現之前趕快完成吧）"
10047090-102 = "（大家都努力地進行著作業）"
10047090-103 = "（然而就在一切看似順利時……）"
10047090-105 = "[ns]「呼，現在就剩下舍監隊的宿舍了。」"
10047090-106 = "嗯……？#n站住！是誰在那邊！？"
10047090-111 = "咦？您是夏萊的老師？#n這個時間在這裡做什麼？"
10047090-112 = "[s]「這……該，該怎麼說呢……」"
10047090-116 = "[ns5]「啊！我，我只是覺得在花壇裝燈條會很好看……！」\n[ns6]「這也是一種藝術活動嘛！」"
10047090-119 = "我沒聽說有這個活動行程……"
10047090-123 = "呼叫。這裡是貓頭鷹3號。#n今晚有在戶外舉辦的藝術活動嗎？"
10047090-127 = "……了解。我這邊會妥善應對。"
10047090-133 = "老師，接下來請您配合我的指示。"
10047090-134 = "[ns]「唔……！」"
10047090-136 = "（同一時間，其他孩子們也……）"
10047090-159 = "老師。現在各處都傳來了聯絡……#n您和404號室的那些傢伙在做什麼？"
10047090-160 = "請您老實回答。我會酌情處理的。"
10047090-161 = "[s]「那，那個……！」"
10047090-165 = "嘎啊！嘎啊啊！"
10047090-170 = "烏鴉似乎掉了什麼東西？"
10047090-174 = "……宿舍特別守則？"
10047090-175 = "「若不方便焚毀……請使用一樓大廳的紅色電話並按下666號」。"
10047090-176 = "「屆時會有專家前來協助文件的銷毀……」"
10047090-177 = "666可是特務的祕密專線啊……難道外洩了嗎！？"
10047090-178 = "還以為這麼不吉利的號碼沒人會按的說！"
10047090-179 = "[ns7]（雖然不是很懂，不過就是現在！）\n[ns8]（趁他分心的時候快逃吧！）"
10047090-185 = "啊啊！站住！！"

10047090-102 = "Everyone worked hard on their part of the circle."
10047090-103 = "We seemed to make smooth progress..."
10047090-105 = "[ns] \"Phew, now all that's left is outside the Prefectural Council dorms.\""
10047090-106 = "Hm...? Hold it! Who's there?!"

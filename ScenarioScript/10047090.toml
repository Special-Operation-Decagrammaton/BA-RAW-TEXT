[translation]
10047090-1 = "ตอนที่ 9;เริ่มปฏิบัติการ"
10047090-3 = "(เวลาล่วงเลยมาถึงวันปฏิบัติการจริง...)"
10047090-10 = "มาสเตอร์~! ในที่สุดวันนี้ก็มาถึงแล้วค่ะ!"
10047090-12 = "[ns] \"หืม? แล้วเรนะล่ะ หายไปไหน?\""
10047090-13 = "เรนะจัง... ขอถอนตัวจากปฏิบัติการนี้ค่ะ"
10047090-14 = "วันนี้... น่าจะไม่มาที่นี่หรอก... ได้ยินว่าจะไปนอนที่อื่นน่ะ"
10047090-15 = "แต่ฉันเข้าใจค่ะ ก็ปฏิบัติการครั้งนี้มันอันตรายจริงๆ นี่คะ"
10047090-16 = "แล้วการบังคับให้ใครเชื่อในสิ่งที่พวกเขาไม่เชื่อ ก็ไม่ใช่เรื่องดีต่อการพัฒนาศิลปะด้วย"
10047090-17 = "เราทุกคนจะก้าวไปข้างหน้าได้ก็ต่อเมื่อเรายอมรับความแตกต่างของกันและกันค่ะ"
10047090-22 = "อุฮุฮุ งั้นเรามาทบทวนปฏิบัติการและรอให้ถึงตอนกลางคืนกันดีกว่าค่ะ"
10047090-30 = "เอาละ ถึงเวลาแล้ว เราไปที่นั่นกันเลยค่ะ"
10047090-51 = "ฮ้าววว... ง่วงจัง... ต้องรีบลาดตระเวนให้เสร็จแล้วละ จะได้กลับไปนอน"
10047090-52 = "อื้อ คืนที่พระจันทร์สว่างแบบนี้ คงไม่มีใครออกมาทำอะไรแปลกๆ หรอก"
10047090-58 = "อุฮุฮุ สงสัยจะไม่รู้กันนะคะว่าพลังของเวทมนตร์จะยิ่งเต็มเปี่ยมในคืนพระจันทร์เต็มดวงน่ะ"
10047090-59 = "รู้สึกเหมือนการตรวจตราในคืนนี้จะหละหลวมลงเลยนะคะ เป็นลางที่ดีเลยค่ะ"
10047090-60 = "ถ้างั้นก็... กระจายกำลังกันเลย..."
10047090-61 = "ค่ะ! ขอให้แต่ละคนรับผิดชอบพื้นที่ที่ทำเครื่องหมายไว้ในแผนที่นะคะ!"
10047090-62 = "พอเสร็จงานแล้ว เราจะมารวมตัวกันที่จุดนัดพบค่ะ!"
10047090-63 = "ขอให้เวทมนตร์คุ้มครองทุกคนนะคะ!"
10047090-68 = "[ns] (เราก็รีบไปด้วยดีกว่า)"
10047090-73 = "[ns1] \"ต้องเริ่มจากตรงนี้ใช่มั้ยนะ?\"\n[ns2] ตรวจสอบวัสดุที่ใช้สำหรับทำวงเวท"
10047090-78 = "(เมื่อขุดหาในตำแหน่งที่ทำเครื่องหมายไว้ในแผนที่ คุณครูก็เจอหลอดไฟ LED แบบมีสาย กับเทปเรืองแสงเป็นจำนวนมาก)"
10047090-80 = "เราจะใช้หลอดไฟ LED กับเทปเรืองแสงมาโยงเป็นวงเวท"
10047090-81 = "พอได้สัญญาณ หลอดไฟพวกนี้จะเปิดไล่กันเหมือนโดมิโน่"
10047090-82 = "ว่ายังไงล่ะ ครู? เป็นวัสดุที่ปลอดภัยอย่างที่บอกไว้เลยใช่มั้ย? ฮิฮิ..."
10047090-84 = "[ns3] \"ปลอดภัยอย่างที่ว่าเลยนะ...\"\n[ns4] (รีบทำให้เสร็จก่อนที่ฝ่ายดูแลหอพักจะจับได้ดีกว่า)"
10047090-102 = "(แล้วทุกคนก็รับผิดชอบในส่วนของตัวเองอย่างตั้งใจ)"
10047090-103 = "(ดูเหมือนทุกอย่างจะราบรื่นดี แต่ว่า...)"
10047090-105 = "[ns] \"ฮู่ว... ทีนี้ก็เหลือแค่หอของฝ่ายดูแลหอพักสินะ\""
10047090-106 = "หืม...? เดี๋ยวก่อน! นั่นใครน่ะ!"
10047090-111 = "เอ๋? คุณครูของชาเล่ต์นี่นา? ดึกดื่นป่านนี้มาทำอะไรที่นี่คะ?"
10047090-112 = "[s] \"อ่า... คะ... คือว่า...\""
10047090-116 = "[ns5] \"อ้อ! ชะ... ใช่! ครูจะเอาหลอดไฟมาประดับสวนให้สวยๆ น่ะ...!\"\n[ns6] \"ครูออกมาช่วยงานศิลปะน่ะ ประดับไฟในสวนไง!\""
10047090-119 = "ไม่เคยได้ยินมาก่อนเลยค่ะว่าจะมีกิจกรรมแบบนี้"
10047090-123 = "นี่คือนกฮูกหมายเลข 3 ขอสอบถามค่ะ วันนี้มีข่าวการทำงานศิลปะยามค่ำคืนมั้ยคะ?"
10047090-127 = "อย่างนั้นสินะคะ... เข้าใจแล้วค่ะ ทางฉันจะรับมืออย่างเหมาะสมเองค่ะ"
10047090-133 = "คุณครู เห็นทีต้องทำตามการควบคุมของฉันแต่โดยดีแล้วละค่ะ"
10047090-134 = "[ns] \"อึก...!\""
10047090-136 = "(ในขณะเดียวกัน เด็กๆ คนอื่นก็...)"
10047090-159 = "คุณครู ตอนนี้มีวิทยุรายงานเข้ามาเพียบเลย คุณครูกับพวกเด็กห้อง 404 ออกมาก่อเรื่องอะไรกันใช่มั้ยคะ?"
10047090-160 = "กรุณาตอบตามความจริงด้วยค่ะ แล้วฉันจะลดโทษให้"
10047090-161 = "[s] \"ระ... เรื่องนั้นมัน...!\""
10047090-165 = "กา! กาาา!"
10047090-170 = "อีกาทำอะไรหล่นไว้น่ะ?"
10047090-174 = "กฎพิเศษของหอพัก...?"
10047090-175 = "กรณีที่ไม่สามารถทำลายเอกสารฉบับนี้ได้ ให้ใช้โทรศัพท์เครื่องสีแดงที่ล็อบบี้ชั้น 1 แล้วกดหมายเลข 666"
10047090-176 = "แล้วผู้เชี่ยวชาญจะเข้าไปช่วยทำลายเอกสารนี้เอง...?"
10047090-177 = "666 เป็นหมายเลขลับของเจ้าหน้าที่พิเศษ อย่าบอกนะว่าข้อมูลรั่วไหล?!"
10047090-178 = "นึกว่าจะไม่มีใครกล้ากดเลขแห่งลางร้ายนี้เสียอีก!"
10047090-179 = "[ns7] (ถึงจะไม่ค่อยเข้าใจ แต่ตอนนี้ละ!)\n[ns8] (ใช้จังหวะนี้วิ่งหนีเลย!)"
10047090-185 = "อ๊ะ! หยุดอยู่ตรงนั้นเลยนะคะ!!"

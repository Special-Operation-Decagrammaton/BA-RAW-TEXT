1600915-48 = "#wait;10"
1600915-49 = "3;미치루;03;냐하핫! 그렇지, 그렇지?\n#3;em;[재잘]\n#3;hophop"
1600915-50 = "[s] \"그렇다면 오늘은 이 비디오의 상영회를 여는 거야?\""
1600915-51 = "3;미치루;99;마음 같아서는 이 상점가 거리 한복판에서 당장이라도 스크린을 펼쳐서 모두에게 영화를 앰부쉬해 버리고 싶지만……."
1600915-52 = "3;미치루;01;오늘은 아니야. 다른 용무 때문에 나온 거거든."
1600915-53 = "3;미치루;00;바로…… 이 비디오테이프 안에 담긴 작품을, 백업해 보려고.\n#3;em;[반짝]"
1600915-54 = "[s] \"백업?\""
1600915-55 = "3;미치루;01;얼마 전 이 상점가에 있는 사진관에서 어떤 새로운 서비스를 개시했다는 소식을 접했어.\n#3;em;…"
1600915-56 = "3;미치루;01;오래된 비디오테이프에 든 영상을 디지털화시켜 파일로 만든 뒤, 컴퓨터에 백업할 수 있도록 해주는 서비스 말이야."
1600915-57 = "3;미치루;03;이렇게 하면 비디오에 들어있던 작품을 열어 보기도 편하고, 관리도 훨씬 편해지지 않겠어?\n#3;em;[음표]"
1600915-58 = "3;미치루;03;그래서 이 테이프를 가지고 나왔다는 거지!"
1600915-59 = "3;미치루;00;소중한 것을 좀 더 소중하게 간직할 수 있도록 하는 보존 처리 작업이라고나 할까!\n#3;em;[!]\n#3;jump"
1600915-60 = "3;미치루;01;좀 더 이해하기 쉽게 말하자면, 옛 닌자들이 각종 디저트와 식재료들을 오랫동안 보관할 수 있도록 환약 형태로 만들었던 것과 비슷한 맥락이라고나 할까."
1600915-61 = "3;미치루;99;아무튼, 그런 식품을 병량환이라고 부르는데 말이지……."

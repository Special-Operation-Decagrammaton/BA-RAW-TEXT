1600915-31 = "#clearST"
1600915-32 = "#wait;2500"
1600915-33 = "[ns] \"……그렇군요.\""
1600915-34 = "3;미치루;04;뭐야! 그 미적지근한 반응은!\n#3;hophop"
1600915-35 = "3;미치루;05;이럴 때는 '역시 너도 알고 있었구나!'라는 눈빛을 서로 교환하고 흐뭇한 미소를 띠며 고개를 끄덕이는 것이 닌자 동지들 간의 당연한 도리잖아!"
1600915-36 = "3;미치루;02;……아, 지금 처음 들어본 영화라고?\n#3;em;[땀]"
1600915-37 = "3;미치루;07;무, 물론 까마귀냥냥 감독의 작품들이라면 워낙에 오래된 것들이긴 하지만…… 그래서 전부 다 흑백 영화뿐인 데다가 이제는 영상을 구할 방법도 거의 없지만……."
1600915-38 = "3;미치루;04;그래도 교과서에서 다 배우는 내용이잖아?!\n#3;shake\n#3;em;[?!]"
1600915-39 = "[s] \"저희 그런 거 배우면서 자랐나요?!\""
1600915-40 = "3;미치루;05;아무튼! <숨은 교실의 세 닌자>를 아직도 안 봤다니……."
1600915-41 = "3;미치루;00;선생 공은 인생의 몇 할은 손해 본 거라고!\n#3;em;[반짝]"

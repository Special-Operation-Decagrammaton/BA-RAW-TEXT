1600915-43 = "[s] \"그 정도인 거야……?\""
1600915-44 = "3;미치루;01;물론이지.\n#3;em;[반응]"
1600915-45 = "3;미치루;99;왜냐하면…… 내가 이 영화를 보고 닌자의 세계에 입문했으니 말이야."
1600915-46 = "[s3] \"미치루를 닌자로 만든 비디오라니…….\"\n[s4] \"갑자기 대단해 보여!\""

[translation]
1600915-1 = "忍者少女想被記住！"
1600915-2 = "商店街入口"
1600915-3 = "哼哼，你果然如期現身了呢，老師大人。"
1600915-4 = "像我們這種走在忍者之路上的人，不可能不對這種東西產生好奇……"
1600915-5 = "[s]「原來我也走在那條路上嗎！？」"
1600915-6 = "怎麼到現在了還這麼驚訝呢，老師大人。"
1600915-7 = "總之，我帶來的古代紀錄媒介……！"
1600915-8 = "就是這個！"
1600915-12 = "[ns]「……錄影帶？！」"
1600915-13 = "你很懂嘛，老師大人。"
1600915-14 = "沒錯，這就是現在已經不再使用的……極為古老的紀錄媒介……錄影帶！"
1600915-15 = "[s1]「的確是很古老沒錯……」\n[s2]「裡面到底錄了什麼？」"
1600915-18 = "呵呵，好奇嗎？"
1600915-19 = "這捲錄影帶裡錄的東西……"
1600915-20 = "竟然是……"
1600915-21 = "[s]「是三千留第一次學會走路的家庭影像嗎？」"
1600915-22 = "唔喵啊！才不是那種東西！"
1600915-23 = "為什麼第一個想到的會是那個啊！"
1600915-24 = "[s]「不是嗎……」"
1600915-25 = "不要一副很遺憾的樣子！"
1600915-26 = "總，總之，這捲錄影帶裡錄的是……！"
1600915-27 = "老師應該也知……不，走在忍者之路上的人不可能不知道的……"
1600915-28 = "正是「烏鴉喵喵」導演極早期的黑白電影！"
1600915-29 = "《隱藏教室的三個忍者》！"
1600915-33 = "[ns]「……原來如此。」"
1600915-34 = "什麼啊！反應也太冷淡了吧！"
1600915-35 = "這種時候應該要互相交換「你果然很懂！」的眼神……#n然後帶著欣慰的微笑點點頭，才是忍者夥伴之間應有的默契吧！"
1600915-36 = "……啊，老師是第一次聽說這部電影？"
1600915-37 = "雖，雖然烏鴉喵喵導演的作品都很古老……#n除了全都是黑白電影之外，現在也幾乎找不到收看方式了沒錯……"
1600915-38 = "不過課本上都有教啊！？"
1600915-39 = "[s]「我有小時候有教那種東西嗎！？」"
1600915-40 = "總之！居然還沒看過《隱藏教室的三個忍者》……"
1600915-41 = "老師大人的人生損失了好多快樂啊！"
1600915-42 = "大概就是這樣。"
1600915-43 = "[s]「有那麼嚴重嗎……？」"
1600915-44 = "當然。"
1600915-45 = "因為……我就是看了這部電影才踏入忍者世界的。"
1600915-46 = "[s3]「原來是讓三千留成為忍者的錄影帶……」\n[s4]「突然感覺好厲害！」"
1600915-49 = "喵哈哈！對吧對吧？"
1600915-50 = "[s]「那今天是要舉辦這捲錄影帶的放映會嗎？」"
1600915-51 = "雖然我也恨不得立刻在這條商店街的正中央拉開螢幕，用這部電影伏擊所有人……"
1600915-52 = "不過今天並沒有要看。我是來這裡處理其他正事的。"
1600915-53 = "那就是……把這捲錄影帶裡的作品備份起來。"
1600915-54 = "[s]「備份？」"
1600915-55 = "我前陣子聽說，這條商店街的照相館開始提供一項新服務。"
1600915-56 = "就是將舊錄影帶裡的影像數位化，做成檔案之後備份到電腦裡。"
1600915-57 = "這樣除了方便觀看之外，收藏起來也會輕鬆很多吧？"
1600915-58 = "所以我才會帶著這捲錄影帶出來！"
1600915-59 = "可以說是一種，為了珍藏重要的東西而採取的保存處理工作吧！"
1600915-60 = "如果要說得更容易理解一點的話……#n就像是古代的忍者，把各種甜點和食材做成丸狀以便長期保存一樣。"
1600915-61 = "順帶一提，那種食品叫做兵糧丸……"
1600915-62 = "[s]「好！那我們快走吧！」"
1600915-63 = "唔喵啊！那是我的台詞！"
1600915-69 = "這恐怕有點困難。"
1600915-70 = "為，為什麼……！？"
1600915-71 = "是錢不夠嗎……！"
1600915-72 = "不，並不是錢的問題，是這捲錄影帶有問題。"
1600915-73 = "錄在裡面的影像沒有辦法擷取出來。"
1600915-74 = "[s]「沒有任何辦法了嗎？」"
1600915-75 = "唔嗯，畢竟它本來就很老舊了……"
1600915-76 = "尤其底片部分又有物理性損傷，這是最大的問題。"
1600915-77 = "這個程度連我也沒辦法處理了。"
1600915-81 = "唔喵啊……果然是這樣嗎。"
1600915-82 = "沒辦法了……我們走吧，老師大人。"
1600915-87 = "唉……可惜，太可惜了。"
1600915-88 = "[s]「總覺得你出奇地平靜呢，三千留？」"
1600915-89 = "嗯？啊啊，其實我早就知道了。#n這捲錄影帶在很久以前就壞了。"
1600915-90 = "[s]「……早就知道了？」"
1600915-91 = "當然，這捲錄影帶我已經反覆看了幾百遍……"
1600915-92 = "所以從某個時候開始，它無法正常播放的時候……我就心裡有數了。"
1600915-93 = "只是想說交給專業店家或許有一絲希望……結果還是不行。"
1600915-94 = "[s]「……不覺得遺憾嗎？」"
1600915-95 = "喵哈哈！怎麼可能不遺憾呢！"
1600915-96 = "我一部分的回憶就這樣永遠封印在這個方形卷軸裡了，當然遺憾啊！"
1600915-97 = "……而且這部電影，現在連檔案都很難找到了。"
1600915-98 = "[s]「三千留……」"
1600915-99 = "老師大人，我有時候會想……"
1600915-100 = "要是早點和更多人分享這份快樂就好了。"
1600915-101 = "早知道就不要珍藏起來自己獨享，#n而是向其他人分享、推薦，讓它留在更多人的記憶裡……"
1600915-102 = "大概就是這種感覺。"
1600915-103 = "[s] 靜靜摸了摸三千留的頭"
1600915-104 = "嘿嘿，謝謝你，老師大人。"
1600915-105 = "……"
1600915-106 = "啊啊！話說上次去的那間忍具店，好像再走兩個街區就到了！"
1600915-107 = "[s]「情緒轉換得太快了吧！？」"
1600915-108 = "我也沒辦法呀！聽說這次繼「妖槍村林」之後，#n店主甚至進了被詛咒的邪惡手榴彈「妖彈正宗」的真品耶！"
1600915-110 = "儘管妖彈正宗早期常被批評說是「打著致敬的名義抄襲妖槍村林」，#n不過如今也算是建立了自己的一席之地……"
1600915-112 = "（之後和興高采烈地講著忍者話題的三千留，一起逛了很久的商店街）"
1600915-114 = "（……在此期間，三千留一刻也沒有放下懷裡的錄影帶）"

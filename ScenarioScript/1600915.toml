[translation]
1600915-1 = "#title;닌자 소녀는 기억되고 싶어!"
1600915-2 = "#place;상점가 초입"
1600915-3 = "3;미치루;99;후후, 제대로 나와줬군, 선생 공.\n#3;a\n#3;em;[반응]"
1600915-4 = "3;미치루;00;확실히, 우리처럼 닌자로의 길 위에 올라선 이들이라면 이런 물건에 궁금증이 동할 수밖에 없지……."
1600915-5 = "[s] \"나도 그 길 위에 있는 거였어?!\""
1600915-6 = "3;미치루;99;후후, 뭘 이제 와서 그렇게 놀라는 것인가, 선생 공.\n#3;em;…"
1600915-7 = "3;미치루;01;아무튼 그래서, 내가 가져온 고대의 기록 매체란 바로……!\n#3;m1"
1600915-8 = "3;미치루;03;이것이라오!\n#3;greeting"
1600915-9 = "#st;[0,0];instant;1;"
1600915-10 = "#clearST"

[translation]
1600915-1 = "นินจาสาวอยากเป็นที่จดจำ!"
1600915-2 = "ทางเข้าย่านการค้า"
1600915-3 = "ฮุฮุ มาแล้วสินะ ท่านอาจารย์"
1600915-4 = "แน่นอนอยู่แล้วว่าสำหรับพวกเราที่ก้าวเดินอยู่บนวิถีแห่งนินจา ย่อมเลี่ยงไม่ได้ที่จะสนใจในของสิ่งนี้..."
1600915-5 = "[s] \"ครูก็อยู่ในวิถีแห่งนินจาด้วยเหรอ?!\""
1600915-6 = "ฮุฮุ ทำไมถึงตกใจขนาดนั้นล่ะ ท่านอาจารย์"
1600915-7 = "เอาเป็นว่า เพราะอย่างนั้นสิ่งที่ข้าน้อยนำมาด้วยก็คือ 'สื่อบันทึกข้อมูลโบราณ' ซึ่งก็คือ...!"
1600915-8 = "สิ่งนี้ยังไงล่ะ!"
1600915-12 = "[ns] \"วิดีโอเทปเหรอ...?!\""
1600915-13 = "รู้จักดีเลยนี่นา ท่านอาจารย์"
1600915-14 = "ใช่แล้วละ เจ้านี่คือสื่อบันทึกข้อมูลโบราณ... ที่ตอนนี้ไม่ได้ใช้กันอีกแล้ว... วิดีโอเทปยังไงละ!"
1600915-15 = "[s1] \"ของเก่าจริงๆ ด้วย...\"\n[s2] \"เทปบันทึกอะไรน่ะ?\""
1600915-18 = "ฮุฮุ อยากรู้เหรอ?"
1600915-19 = "สิ่งที่บันทึกอยู่ในวิดีโอเทปนี้น่ะ"
1600915-20 = "มันก็คือ..."
1600915-21 = "[s] \"วิดีโอที่ถ่ายตอนมิจิรุหัดเดินครั้งแรกรึเปล่า?\""
1600915-22 = "ว้ากก! ไม่ใช่แบบนั้นสักหน่อย!"
1600915-23 = "ทำไมถึงคิดว่าเป็นอะไรแบบนั้นได้เนี่ย!"
1600915-24 = "[s] \"ไม่ใช่งั้นเหรอ...\""
1600915-25 = "จะเสียดายเรื่องนั้นทำไมล่ะ!"
1600915-26 = "ยะ... ยังไงก็เถอะ สิ่งที่บันทึกอยู่ในวิดีโอนี้น่ะ...!"
1600915-27 = "แน่นอนว่าท่านอาจารย์น่าจะรู้อยู่แล้ว ไม่สิ... ถ้าเป็นผู้ที่เดินอยู่บนวิถีแห่งนินจาแล้วละก็ จะต้องรู้เรื่องนี้อย่างแน่นอน..."
1600915-28 = "นั่นก็คือภาพยนตร์ฟิล์มขาวดำ ผลงานยุคแรกของผู้กำกับ <อีกาเหมียวเหมียว>"
1600915-29 = "เรื่อง <นินจาทั้งสามแห่งห้องเรียนลับ> ยังไงล่ะ!"
1600915-33 = "[ns] \"งั้นเหรอ...\""
1600915-34 = "อะไรน่ะ! การตอบสนองที่จืดชืดนั่น!"
1600915-35 = "เวลาแบบนี้สหายนินจาจะต้องสบตากัน พยักหน้าด้วยรอยยิ้ม ทำท่าตื่นเต้นแล้วพูดว่า 'เธอก็รู้จักเหมือนกันสินะ!' สิ!"
1600915-36 = "อ่า... เพิ่งเคยได้ยินชื่อหนังเรื่องนี้ครั้งแรกงั้นเหรอ?"
1600915-37 = "นะ... แน่นอนว่าถ้าเป็นผลงานของผู้กำกับ อีกาเหมียวเหมียวละก็ มันเป็นผลงานเก่ามากจริงๆ นั่นละ... มีแต่หนังสีขาวดำเป็นส่วนใหญ่ แถมตอนนี้แทบจะหาเครื่องเปิดดูไม่ได้แล้วด้วย"
1600915-38 = "แต่เรื่องนี้ใครๆ ก็รู้ไม่ใช่รึไง!"
1600915-39 = "[s] \"ครูก็รู้เหมือนกันน่า!\""
1600915-40 = "เอาเถอะ! ในเมื่อยังไม่ได้ดูเรื่อง <นินจาทั้งสามแห่งห้องเรียนลับ> แบบนี้..."
1600915-41 = "นับว่าใช้ชีวิตไม่คุ้มเลยนะ ท่านอาจารย์!"
1600915-42 = "ใช้ชีวิตไม่คุ้มจริงๆ เลย"
1600915-43 = "[s] \"ขนาดนั้นเลยเหรอ...?\""
1600915-44 = "ก็ใช่น่ะสิ"
1600915-45 = "เพราะว่า... ข้าน้อยน่ะก้าวเข้าสู่โลกของนินจาหลังจากได้ดูหนังเรื่องนี้เลยนะ"
1600915-46 = "[s3] \"วิดีโอที่ทำให้มิจิรุกลายเป็นนินจาเหรอเนี่ย สุดยอด...\"\n[s4] \"จู่ๆ ก็รู้สึกว่ามันสุดยอดเลยละ!\""
1600915-49 = "วะฮะฮ่า! ใช่มั้ยล่ะ ใช่มั้ยล่ะ?"
1600915-50 = "[s] \"แล้ววันนี้จะฉายวิดีโอนี่ให้ดูเหรอ?\""
1600915-51 = "ใจจริงแล้ว ข้าน้อยน่ะอยากจะเปิดหนังฉายแบบเซอร์ไพรส์กลางย่านการค้านี้เลยด้วยซ้ำ แต่ว่า..."
1600915-52 = "วันนี้ไม่ได้จะทำแบบนั้นหรอก วันนี้เรามาเพราะธุระอื่นต่างหาก"
1600915-53 = "ข้าน้อย... อยากจะสำรองข้อมูลที่อยู่ในวิดีโอเทปอันนี้น่ะ"
1600915-54 = "[s] \"สำรองข้อมูล?\""
1600915-55 = "เมื่อไม่นานมานี้ ข้าน้อยได้ข่าวมาว่าร้านถ่ายรูปในย่านการค้านี้มีเปิดให้บริการใหม่บางอย่างน่ะ"
1600915-56 = "เป็นบริการแปลงวิดีโอจากวิดีโอเทปให้เป็นไฟล์ดิจิทัล สำหรับเก็บไว้ในคอมพิวเตอร์แทน"
1600915-57 = "ถ้าทำแบบนี้ก็จะเปิดดูวิดีโอได้ง่ายขึ้น และเก็บรักษาได้ง่ายขึ้นด้วยใช่มั้ยล่ะ?"
1600915-58 = "เพราะงั้นข้าน้อยก็เลยเอาเทปมาที่นี่ไง!"
1600915-59 = "เรียกว่าเป็นกระบวนการที่ช่วยให้เราเก็บรักษาสิ่งของล้ำค่าเอาไว้ให้ได้ดีขึ้นกว่าเดิมละมั้ง!"
1600915-60 = "พูดให้เข้าใจง่ายๆ ก็เหมือนวิธีที่นินจาสมัยก่อนนำขนมหวานและส่วนผสมอาหารต่างๆ มาแปรรูป#nเป็นพวกเสบียงนินจาเพื่อให้เก็บรักษาได้นานๆ"
1600915-61 = "หรือที่เรียกว่า ลูกกลอนนินจายังไงล่ะ..."
1600915-62 = "[s] \"เอาละ! ถ้างั้นก็ไปกันเลยมั้ย\""
1600915-63 = "ว้ากกก! นั่นมันบทของข้าน้อยนะ!"
1600915-69 = "งานยากแล้วละ"
1600915-70 = "ทะ... ทำไมเหรอ...?!"
1600915-71 = "หรือว่าเพราะข้าน้อยมีเงินไม่พอ...!"
1600915-72 = "เปล่า ปัญหาไม่ได้อยู่ที่เงินหรอก ปัญหาอยู่ที่วิดีโอเทปนี่ต่างหาก"
1600915-73 = "ฉันดึงข้อมูลวิดีโอจากเทปนี้ไม่ได้หรอก"
1600915-74 = "[s] \"ไม่มีวิธีเลยเหรอ?\""
1600915-75 = "อืม เรื่องนั้นน่ะ... วิดีโอเทปนี่มันเป็นของเก่ามากๆ..."
1600915-76 = "แถมปัญหาใหญ่คือส่วนฟิล์มได้รับความเสียหายพอสมควรด้วย"
1600915-77 = "พอเป็นปัญหาแบบนี้ ฉันเองก็จนปัญญาเหมือนกัน"
1600915-81 = "อ่า... งั้นเหรอ..."
1600915-82 = "ช่วยไม่ได้นะ ไปกันเถอะ ท่านอาจารย์"
1600915-87 = "เฮ้อ มันช่วยไม่ได้นี่นา น่าเสียดายจัง"
1600915-88 = "[s] \"ทำไมดูเงียบผิดปกติเลยล่ะ มิจิรุ?\""
1600915-89 = "หืม? อ้อ อันที่จริงข้าน้อยรู้อยู่แล้วละ เรื่องที่วิดีโอเทปนี้มันเก่าแล้วก็พังไปนานแล้วน่ะ"
1600915-90 = "[s] \"รู้อยู่แล้วงั้นเหรอ...?\""
1600915-91 = "ใช่น่ะสิ ข้าน้อยดูวิดีโอเทปอันนี้เป็นร้อยๆ รอบแล้ว"
1600915-92 = "แต่จู่ๆ วันหนึ่งมันก็เปิดดูไม่ได้ เลยพอจะรู้ว่ามันพังแล้วน่ะ"
1600915-93 = "แต่นึกว่าถ้าเอามาให้มืออาชีพจัดการน่าจะพอมีทางออกบ้าง... แต่สุดท้ายก็ไม่ได้อยู่ดี"
1600915-94 = "[s] \"ไม่เสียดาย... เลยเหรอ?\""
1600915-95 = "วะฮ่าฮ่า! จะไม่เสียดายได้ยังไงล่ะ!"
1600915-96 = "ความทรงจำส่วนหนึ่งของข้าน้อยถูกผนึกไว้ในม้วนฟิล์มนี้เลยนะ ต้องเสียดายอยู่แล้วสิ!"
1600915-97 = "แถมตอนนี้น่ะ การหาไฟล์หนังเรื่องนี้ก็เป็นเรื่องที่ยากมากๆ เลยด้วย"
1600915-98 = "[s] \"มิจิรุ...\""
1600915-99 = "บางครั้งข้าน้อยก็คิดนะ ท่านอาจารย์"
1600915-100 = "ว่าถ้าข้าน้อยได้แบ่งปันความสนุกสนานนี้กับคนอื่นๆ ตั้งแต่แรก"
1600915-101 = "หากข้าน้อยไม่หวงแหนและคิดจะเก็บมันไว้เพียงคนเดียว แต่นำไปบอกเล่าให้ผู้อื่นฟัง ให้คนอื่นได้รู้จัก มันก็จะอยู่ในความทรงจำของผู้คนมากขึ้น..."
1600915-102 = "อะไรประมาณนี้น่ะ"
1600915-103 = "[s] ลูบหัวมิจิรุเบาๆ"
1600915-104 = "แหะๆ ขอบคุณนะ ท่านอาจารย์"
1600915-105 = "......"
1600915-106 = "อ๊ะ! พอคิดดูแล้ว ร้านขายอุปกรณ์นินจาที่ข้าน้อยเคยไปอยู่ใกล้ๆ แถวนี้ด้วยนี่นา"
1600915-107 = "[s] \"เปลี่ยนมู้ดเร็วเกินไปมั้ย?!\""
1600915-108 = "ช่วยไม่ได้นี่นา! ข้าน้อยได้ยินมาว่าเจ้าของร้านเอาปืนกลต้องสาป มูรามาทริง กับระเบิดมืออาถรรพ์ <มาซามูเนด> มาไว้ที่ร้านด้วยน่ะ!"
1600915-110 = "แน่นอนว่ากรณีของมาซามูเนด มักโดนวิจารณ์อย่างหนาหูเลยละว่าลอกเลียนแบบคอนเซ็ปต์ของ#nมูรามาทริงมาอย่างโจ่งแจ้ง... แต่ว่าตอนนี้มันก็ได้รับการยอมรับในส่วนของตัวเองไปแล้วละ"
1600915-112 = "(หลังจากนั้น คุณครูกับมิจิรุก็เดินเล่นกันในย่านการค้ากันอีกพักใหญ่ และมิจิรุก็เล่าเรื่องนินจาให้คุณครู#nฟังอย่างออกรส)"
1600915-114 = "(...แต่ในระหว่างที่เดินอยู่ด้วยกัน มิจิรุก็กอดวิดีโอเทปชิ้นสำคัญไว้แน่น ไม่ยอมให้ห่างตัวเลย)"

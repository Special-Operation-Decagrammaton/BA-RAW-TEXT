[translation]
1600915-1 = "Ninja Girl Wants to Be Remembered!"
1600915-2 = "Shopping District Entrance"
1600915-3 = "Fufu, you're here, Honorable Sensei."
1600915-4 = "Naturally, those on the path of the ninja would be drawn to such an item..."
1600915-5 = "[s] \"I'm on that path too?!\""
1600915-6 = "Fufu, why so surprised, Sensei?!"
1600915-7 = "Anyways, the ancient recording medium I brought forth is...!"
1600915-8 = "This!"
1600915-12 = "[ns] \"...A video tape?!\""
1600915-13 = "Indeed, Sensei."
1600915-14 = "You're right. This is an...ancient recording medium that's no longer used... It's a relic called a \"video tape\"!"
1600915-15 = "[s1] \"It's definitely old...\"\n[s2] \"But what's on it?\""
1600915-18 = "Fufu, curious? Naturally."
1600915-19 = "On this tape..."
1600915-20 = "...is..."
1600915-21 = "[s] \"A home movie of your first steps?\""
1600915-22 = "Ah! Nothing like that!"
1600915-23 = "Why would that be your first guess?"
1600915-24 = "[s] \"Oh, too bad...\""
1600915-25 = "What are you disappointed for?!"
1600915-26 = "A-Anyway, this video has...!"
1600915-27 = "...Something that Honorable Sensei, no, ANYONE who walks on the path of ninja would know..."
1600915-28 = "It's a copy of the esteemed director Crow Nyan Nyan's earliest work...shot in black and white... You know what it is..."
1600915-29 = "...\"The Three Ninjas of the Hidden Classroom\"!"
1600915-33 = "[ns] \"Oh. I see...\""
1600915-34 = "What's with the lack of enthusiasm?"
1600915-35 = "These are the times where true ninjas go, \"So you also are familiar!\" before exchanging glances, small smiles, and curt nods of recognition."
1600915-36 = "Oh... Is this the first time you've heard of it?"
1600915-37 = "I-I get that Crow Nyan Nyan's works are a little vintage... Which is why these classics are all shot in black and white and are so rare to find."
1600915-38 = "But still, surely you paid attention in class!"
1600915-39 = "[s] \"Is this something that we're supposed to learn in school?!\""
1600915-40 = "Hm! I can't believe you still haven't watched \"The Three Ninjas of the Hidden Classroom\"..."
1600915-41 = "Honorable Sensei, it's a tragedy that you've lived so long without experiencing such joy."
1600915-42 = "It's just so...good."
1600915-43 = "[s] \"It's that important...?\""
1600915-44 = "Of course."
1600915-45 = "Because...this is the movie that set me on the path of the ninja!"
1600915-46 = "[s3] \"This video tape turned you into a ninja...?\"\n[s4] \"It suddenly sounds incredible!\""
1600915-49 = "Nyahaha! Right? Right?"
1600915-50 = "[s] \"Shall we have a screening right now?\""
1600915-51 = "As much as I'd love to set up a screen in the middle of the street and ambush everyone with this brilliance..."
1600915-52 = "...It will not happen today. I'm here for another reason."
1600915-53 = "You see, I'm here to make a copy of this tape. A true ninja is always prepared with a backup."
1600915-54 = "[s] \"A backup?\""
1600915-55 = "I heard that a nearby photo studio has introduced a new service..."
1600915-56 = "...One where they can archive and digitize old video tapes. Just think, I could back this up to my computer! To the cloud!"
1600915-57 = "It would make this movie accessible anytime, anywhere, and with incredible ease."
1600915-58 = "And that's why I have the tape with me."
1600915-59 = "Think of it as...a preservation process! Precious things deserve to be cherished and protected."
1600915-60 = "You know, it's like how ninjas would smash food and desserts into tiny balls so that they would be preserved for months! Years, even."
1600915-61 = "Anyway, we call those ration pellets... They...have a taste."
1600915-62 = "[s] \"Well then! Let's get going!\""
1600915-63 = "Ah! That's my line!"
1600915-69 = "I don't know about this one. It's going to be rough."
1600915-70 = "Wh-Why...?!"
1600915-71 = "Did I not bring enough money?"
1600915-72 = "No, it's not the money. It's the tape itself."
1600915-73 = "I can't extract the data from this tape."
1600915-74 = "[s] \"Are there any alternative methods?\""
1600915-75 = "Eh, the thing is, here's your problem... This tape is OLD."
1600915-76 = "And it's already sustained substantial physical deterioration."
1600915-77 = "I can't do anything when it's gotten this bad."
1600915-81 = "Ugh... I see."
1600915-82 = "Well, we tried. Let's get going, Honorable Sensei."
1600915-87 = "*sigh* How disappointing."
1600915-88 = "[s] \"You're surprisingly calm, Michiru.\""
1600915-89 = "Hm? Ah, I knew this tape was broken. I've known for a while."
1600915-90 = "[s] \"...You knew?\""
1600915-91 = "Of course. I played this tape hundreds of times."
1600915-92 = "Eventually, I noticed that the movie...wasn't playing right."
1600915-93 = "I thought that maybe the professionals could find a way... But I guess not."
1600915-94 = "[s] \"Aren't you...disappointed?\""
1600915-95 = "Nyahaha! Of course I am!"
1600915-96 = "Some of my fondest memories are now sealed in this rectangular scroll. Of course I'm disappointed!"
1600915-97 = "...And it's so hard to find another copy."
1600915-98 = "[s] \"Michiru...\""
1600915-99 = "Sometimes I have these thoughts, Honorable Sensei..."
1600915-100 = "If only I shared this joy with others..."
1600915-101 = "If only I recommended it to more people and let them share the memory with me. If only I hadn't treasured it to the point that I hoarded it for myself..."
1600915-102 = "...You know, things like that."
1600915-103 = "[s] Quietly pat Michiru's head."
1600915-104 = "Heehee, thank you, Honorable Sensei."
1600915-105 = "..."
1600915-106 = "Ah! Now that I think about it, that ninjutsu shop we visited last time is only a couple blocks away!"
1600915-107 = "[s] \"That's a VERY quick pivot!\""
1600915-108 = "I can't help it! I also heard that the store owner has both the \"Wicked Muramatling\" AND the real \"Wicked Masamunade,\" the legendary cursed evil grenade!"
1600915-110 = "The Masamunade is often criticized for copying the Muramatling under the pretext of paying homage. But, to me, it's totally different. It's iconic for what it is!"
1600915-112 = "We strolled the shopping district as Michiru excitedly recounted ninja lore."
1600915-114 = "...She tightly hugged the tape to her chest the entire time."

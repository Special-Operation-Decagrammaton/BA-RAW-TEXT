1600915-106 = "3;미치루;04;아앗! 그러고 보니 저번에 갔던 그 인법 도구 가게가 두 블록 너머에 있었을 터!\n#3;em;[!]\n#3;jump"
1600915-107 = "[s] \"전환이 너무 빠른 거 아냐?!\""
1600915-108 = "3;미치루;00;그럴 수밖에! 거기다 이번에는 요총 무라마틀링에 이어 저주받은 악의 수류탄 <요폭 마사무네이드>의 진품까지 가게 주인이 들여놨다는 소문도 들려왔다고!\n#3;hophop"
1600915-109 = "#all;hide"
1600915-110 = "3;미치루;03;물론 마사무네이드의 경우 오마주라는 핑계로 무라마틀링의 컨셉을 노골적으로 베꼈다는 비판도 듣지만, 어쨌든 지금에 와서는 나름의 영역을 구축한 상징물로 평가받고 있는데 말이야…….\n#3;closeup\n#3;em;[재잘]"
1600915-111 = "#all;hide"
1600915-112 = "#na;(이후, 신나게 닌자 이야기를 떠드는 미치루와 함께 오랫동안 상점가를 둘러보았다.)"
1600915-113 = "#all;hide"

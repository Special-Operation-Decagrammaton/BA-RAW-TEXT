1600915-12 = "[ns] \"……비디오테이프?!\""
1600915-13 = "3;미치루;03;잘 아는군, 선생.\n#3;em;[반응]"
1600915-14 = "3;미치루;01;맞아, 이것은 지금은 쓰이지 않는…… 더없이 오래된 고대의 기록 매체…… 비디오테이프!"
1600915-15 = "[s1] \"확실히 오래된 것이긴 한데…….\"\n[s2] \"대체 뭐가 찍혀 있는 거야?\""
1600915-16 = "#wait;10"
1600915-17 = "#wait;10"
1600915-18 = "3;미치루;00;후후, 궁금한가?\n#3;m3\n#3;em;[반짝]"
1600915-19 = "3;미치루;99;이 비디오 안에 담겨 있는 것은 말이지."
1600915-20 = "3;미치루;99;무려……."
1600915-21 = "[s] \"미치루의 첫걸음마를 찍은 홈비디오 같은 건가?\""
1600915-22 = "3;미치루;04;우냐악! 그런 거 아니야!\n#3;jump\n#3;em;[!]"
1600915-23 = "3;미치루;05;왜 발상이 그쪽으로 먼저 튀는 건데!"
1600915-24 = "[s] \"아닌 건가…….\""
1600915-25 = "3;미치루;04;그걸 왜 아쉬워하는 거야!\n#3;em;[스팀]\n#3;hophop"
1600915-26 = "3;미치루;05;아, 아무튼, 이 비디오에 담긴 것은 말이지……!\n#3;greeting"
1600915-27 = "3;미치루;99;선생 공도 당연히 알고 있을, 아니, 닌자의 길을 걷는 이들이라면 모를 수가 없는…….\n#3;em;…"
1600915-28 = "3;미치루;00;<까마귀냥냥> 감독의 극초기 커리어 흑백 영화!\n#3;closeup"
1600915-29 = "3;미치루;03;<숨은 교실의 세 닌자>란 말이지!\n#3;closeup"

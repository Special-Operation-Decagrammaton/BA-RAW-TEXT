1600915-96 = "3;미치루;07;내 추억의 일부가 이 네모난 스크롤 안에 고스란히 봉인되어 버렸는데, 당연히 아쉽지!"
1600915-97 = "3;미치루;01;……거기다 이 영화, 이젠 파일 구하기도 힘들고 말이야."
1600915-98 = "[s] \"미치루…….\""
1600915-99 = "3;미치루;99;가끔 이런 생각을 한다오, 선생 공.\n#3;em;…"
1600915-100 = "3;미치루;99;진작부터 많은 사람들과 이 즐거움을 나눴더라면."
1600915-101 = "3;미치루;99;소중하게 모셔 놓고 나 혼자만 볼 게 아니라, 다른 사람들에게도 알리고, 권하고, 그래서 더 많은 사람들의 기억 속에도 남겼더라면……."

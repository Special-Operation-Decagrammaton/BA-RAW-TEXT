1600915-88 = "[s] \"어쩐지 묘하게 차분하네, 미치루?\""
1600915-89 = "3;미치루;02;응? 아아. 사실은 이미 알고 있었거든. 이 비디오테이프가 꽤 오래전에 고장 났다는 거.\n#3;em;[?]"

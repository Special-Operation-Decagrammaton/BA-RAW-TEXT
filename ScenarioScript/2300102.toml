2300102-55 = "1;상점 주인;04;으, 으음. 이거라면 당 점의 점장님과 상담을 해봐야만…….\n#1;em;[땀]\n#1;stiff"
2300102-56 = "5;후우카;00;이 조건을 받아들여 주신다면, 여기에 더해 앞으로 한 달 치의 학생식당 식료품도 이곳에서 구입하겠어요.\n#5;em;[반짝]\n#5;greeting"
2300102-57 = "1;상점 주인;04;으으음……!\n#1;em;[?!]\n#1;shake"
2300102-58 = "1;상점 주인;08;아, 알겠습니다. 거래하도록 하지요.\n#1;greeting"
2300102-59 = "5;후우카;03;아핫, 좋은 거래, 감사합니다.\n#5;em;[음표]"

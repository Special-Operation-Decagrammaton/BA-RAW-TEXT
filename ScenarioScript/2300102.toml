[translation]
2300102-1 = "#title;장 보러 가실래요?"
2300102-2 = "3;후우카;02;앗, 선생님. 지, 진짜 와주셨군요.\n#3;em;[반응]\n#3;a"
2300102-3 = "[s1] \"무슨 일이야?\"\n[s2] \"후우카 땅이 부르면 당연히 와야지.\""
2300102-4 = "3;후우카;99;그, 그게 오늘 장을 보려고 하는데.\n#3;em;[///]"
2300102-5 = "3;후우카;99;그, 그게 오늘 장을 보려고 하는데.\n#3;em;[///]"
2300102-6 = "3;후우카;02;생각보다 양이 많을 것 같아서요."
2300102-7 = "3;후우카;01;일부러 선생님께 도움을 요청할 정도까진 아니라고 생각했지만…….\n#3;em;…"
2300102-8 = "[s] \"내가 도와줄 수 있는 게 있다면 도와줄게.\""
2300102-9 = "3;후우카;00;후후, 선생님은 그런 분이셨죠.\n#3;em;[반짝]"
2300102-10 = "3;후우카;01;알겠습니다. 그럼 오늘은 저와 함께 장을 보러 가시죠.\n#3;greeting"
2300102-11 = "3;후우카;03;마침 사야할 식료품이 무척, 무척 많아요♪\n#3;em;[음표]\n#3;jump"
2300102-12 = "#all;hide"
2300102-13 = "3;후우카;03;와, 대형 마트는 몇 번을 와도 가슴이 잔뜩 설레요.\n#3;em;[음표]\n#3;a"
2300102-14 = "[s] \"대형 마트를 좋아하나 봐.\""
2300102-15 = "3;후우카;02;대형 마트를 좋아한다고 할까……."
2300102-16 = "3;후우카;99;신선 식품의 냉기를 쐬다 보면 절로 가슴이 두근거리거나.\n#3;em;[하트]"
2300102-17 = "3;후우카;01;진열된 형형색색의 야채나 과일을 보면 저도 모르게 눈을 빼앗기게 되거든요.\n#3;em;[///]"
2300102-18 = "3;후우카;03;그야말로 요리를 위한 보물창고란 느낌이에요~\n#3;greeting\n#3;em;[반짝]"
2300102-19 = "3;후우카;02;다들 그렇지 않나요?"
2300102-20 = "[s] \"글쎄. 그런가?\""
2300102-21 = "3;후우카;02\n#3;em;[반응]\n#wait;1000"
2300102-22 = "3;후우카;01;앗! 보세요. 선생님. 이 오이. 까슬까슬한 게 가시도 남아있고\n#3;m4"
2300102-23 = "3;후우카;00;꼭지도 마르지 않고 단단해요. 정말 품질이 좋은 물건이에요."
2300102-24 = "3;후우카;02\n#3;em;[반응]\n#wait;1000"
2300102-25 = "3;후우카;02\n#3;m2\n#3;hophop\n#wait;1000"
2300102-26 = "3;후우카;00\n#wait;800\n#3;greeting"
2300102-27 = "3;후우카;03;어! 여기 있는 수박은 두드려보면 통통 소리가 나는 게, 이것도 굉장하네요!\n#3;greeting"
2300102-28 = "[s] \"후우카는 이런 게 익숙한 모양이네.\""
2300102-29 = "3;후우카;02;저, 저도 모르게 잔뜩 신이 난 바람에, 죄송해요. 아하하…….\n#3;em;[땀]"
2300102-30 = "3;후우카;01;저, 그래도 학원에서 급식을 제공할 때는 공을 들이려고 노력하고 있어요."
2300102-31 = "3;후우카;08;……물론 신경을 써도 대량 조리에 들어가면 재료의 맛이 죽어버려서.\n#3;stiff"
2300102-32 = "3;후우카;04;또 대량의 클레임을 받기도 하지만요…….\n#3;em;[속상함]"
2300102-33 = "[s] \"후우카가 누구보다 노력한다는 건 잘 알고 있어.\""
2300102-34 = "3;후우카;02;윽, 또 그런 말씀을 아무렇지도 않게…….\n#3;em;[///]\n#3;stiff"
2300102-35 = "3;후우카;01;그, 그보다 자! 재료는 다 골랐어요.\n#3;em;[반응]\n#3;m3"
2300102-36 = "[s] \"그럼 이것만 사면 장보기도 끝인가?\""
2300102-37 = "3;후우카;99;아뇨, 선생님."
2300102-38 = "3;후우카;01;진정한 장보기는 지금부터 시작이에요.\n#3;em;[!]\n#3;closeup"
2300102-39 = "[s] \"지금부터……?\""
2300102-40 = "#all;hide"
2300102-41 = "5;후우카;03;저기요! 여기 잠깐 물건 좀 사려고 하는데요.\n#5;al\n#5;em;[반짝]"
2300102-42 = "1;상점 주인;03;무슨 일이신가요? 손님?\n#1;ar"
2300102-43 = "5;후우카;00;여기 피망이랑 오이 상태가 참 좋네요. 크기도 적당하겠다. 품질도 좋고. \n#5;em;[재잘]"
2300102-44 = "5;후우카;01;분명 이걸로 요리하면 맛있는 요리가 만들어질 거예요."
2300102-45 = "5;후우카;03;방문할 때마다 신선한 품질에 늘 감탄하고 있어요.\n#5;greeting"
2300102-46 = "1;상점 주인;02;호오, 단골 손님이셨군요. 그래서 그 말씀의 의미는……?\n#1;em;[반응]"
2300102-47 = "5;후우카;01;제가 좀 많은 양을 사려고 하거든요."
2300102-48 = "5;후우카;03;게헨나 학생 전원을 먹일 양에 더해 조금 더.\n#5;em;[반짝]"
2300102-49 = "1;상점 주인;04;으음! ……어디까지 알아보고 오셨는지요?"
2300102-50 = "5;후우카;01;이 정도 품목을 이 정도 양으로 한 번에 구입하려는데…….\n#5;em;…"

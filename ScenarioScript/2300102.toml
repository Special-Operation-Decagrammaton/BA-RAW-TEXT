[translation]
2300102-1 = "ไปซื้อของกันมั้ยคะ?"
2300102-2 = "อ๊ะ คุณครู มะ...มาจริงๆ ด้วย"
2300102-3 = "[s1] \"มีอะไรเหรอ?\"\n[s2] \"ฟูกะตันเรียกมาทั้งที ครูก็ต้องมาอยู่แล้วสิ\""
2300102-4 = "คะ...คือว่าวันนี้ฉันจะออกไปซื้อของน่ะ"
2300102-5 = "คะ...คือว่าวันนี้ฉันจะออกไปซื้อของน่ะ"
2300102-6 = "แล้วดูเหมือนจะต้องซื้อของเยอะมากๆ..."
2300102-7 = "ฉันไม่ได้อยากจะรบกวนด้วยเรื่องเล็กๆ น้อยๆ แบบนี้หรอกแต่ว่า...."
2300102-8 = "[s] \"ถ้าครูช่วยได้ครูก็ยินดีช่วยนะ\""
2300102-9 = "ฮุฮุ สมกับเป็นคุณครูจริงๆ"
2300102-10 = "เข้าใจแล้วค่ะ ถ้างั้นวันนี้ไปซื้อของกับฉันหน่อยนะคะ"
2300102-11 = "มีวัตถุดิบที่ต้องซื้อเยอะแยะเลยค่ะ♪"
2300102-13 = "ว้าว ถึงจะเคยมาบ่อยๆ แต่ก็มักจะตื่นเต้นทุกครั้งเลยค่ะ"
2300102-14 = "[s] \"ชอบมาซูเปอร์มาร์เก็ตสินะ\""
2300102-15 = "ก็อาจจะใช่นะคะ..."
2300102-16 = "เวลาสัมผัสแอร์เย็นๆ ที่ชั้นวางของสด ฉันจะรู้สึกใจเต้นแรงเสมอเลย"
2300102-17 = "แถมยังละสายตาจากผักและผลไม้หลากสีบนชั้นวางของไม่ได้อีกด้วย"
2300102-18 = "ที่นี่เหมือนคลังสมบัติของนักปรุงอาหารเลยค่ะ~"
2300102-19 = "ทุกคนก็รู้สึกแบบนี้ไม่ใช่เหรอคะ?"
2300102-20 = "[s] \"งั้นเหรอ... คงงั้นมั้ง?\""
2300102-22 = "อ๊ะ ดูนี่สิคะ คุณครู แตงกวานี่... ยังมีหนามเล็กๆ เหลือติดอยู่เลยค่ะ"
2300102-23 = "ตรงก้านยังไม่หลุดและยังเป็นสีเขียวอยู่ แสดงว่าเป็นของสดที่มีคุณภาพค่ะ"
2300102-27 = "โอ้! ลองเคาะแตงโมนี่แล้วฟังเสียงดูสิคะ แค่ฟังเสียงก็รู้แล้วว่าคุณภาพดีมากๆ เลยค่ะ"
2300102-28 = "[s] \"ฟูกะดูคุ้นเคยกับของพวกนี้มากเลยนะ\""
2300102-29 = "ฉะ...ฉันเพลินมากไปหน่อย ขะ...ขอโทษด้วยค่ะ ฮ่าฮ่าฮ่า...."
2300102-30 = "ฉันกำลังพยายามอย่างมากในการจัดเตรียมอาหารให้ทุกคนที่โรงเรียนค่ะ"
2300102-31 = "...แต่ถึงจะคัดเลือกวัตถุดิบอย่างดียังไง แต่เวลาที่ต้องปรุงอาหารในปริมาณเยอะๆ รสชาติของ#nวัตถุดิบมันก็จะลดลง...."
2300102-32 = "เพราะแบบนั้นเลยทำให้มีเรื่องร้องเรียนเกิดขึ้นเยอะมากค่ะ..."
2300102-33 = "[s] \"แต่ครูรู้ดีนะว่าฟูกะพยายามมากเลย\""
2300102-34 = "อึ่ก... พูดอะไรแบบนี้ออกมาง่ายๆ อีกแล้วนะคะ...."
2300102-35 = "อะ...เอาละค่ะ เลือกวัตถุดิบเสร็จแล้วค่ะ"
2300102-36 = "[s] \"ถ้าเอาไปจ่ายเงินก็เสร็จแล้วใช่มั้ย?\""
2300102-37 = "ยังหรอกค่ะคุณครู"
2300102-38 = "การซื้อของที่แท้จริงจะเริ่มจากนี้ต่างหากค่ะ"
2300102-39 = "[s] \"เริ่มจากนี้....?\""
2300102-41 = "ขอโทษค่ะ! ขอซื้อของหน่อยค่าาาาา"
2300102-42 = "รับอะไรดีครับคุณลูกค้า?"
2300102-43 = "พริกหยวกกับแตงกวาที่นี่ดูสดมากเลยนะคะ แถมขนาดก็กำลังพอดีด้วย คุณภาพก็ดีด้วย"
2300102-44 = "ถ้าเอาไปทำอาหารล่ะก็คงทำเมนูอร่อยๆ ได้แน่นอนค่ะ"
2300102-45 = "ฉันรู้สึกประทับใจทุกครั้งที่มาแล้วเจอวัตถุดิบคุณภาพสดใหม่แบบนี้"
2300102-46 = "โอ้... คุณลูกค้าประจำนี่เอง เมื่อครู่ที่พูดนี้หมายถึงอะไรงั้นเหรอครับ....?"
2300102-47 = "ฉันอยากซื้อวัตถุดิบในราคาส่งค่ะ!"
2300102-48 = "จากปริมาณสำหรับเด็กนักเรียนทุกคนที่เกเฮนน่าแล้วก็อาจเหลือนิดหน่อย..."
2300102-49 = "อื้ม! ...มีราคาที่คิดไว้ในใจแล้วสินะครับ?"
2300102-50 = "ถ้าจะซื้อวัตถุดิบปริมาณมากในครั้งเดียวแบบนี้ละก็..."
2300102-52 = "ราคานี้เป็นยังไงคะ?"
2300102-55 = "อะ...อืม... ถ้าราคานี้คงต้องไปปรึกษาทางผู้จัดการร้านก่อน..."
2300102-56 = "ถ้าตกลงในราคานี้ละก็ต่อไปฉันจะสั่งซื้อวัตถุดิบที่ใช้ที่โรงอาหารของโรงเรียนในแต่ละเดือน#nจากร้านคุณด้วยค่ะ"
2300102-57 = "อืม...!"
2300102-58 = "ขะ...เข้าใจแล้วครับ ทางเราตกลงตามเงื่อนไขนี้ครับ"
2300102-59 = "ฮิฮิ เยี่ยมเลย! ขอบคุณมากค่ะ"
2300102-61 = "[ns] \"สุดยอดเลยนะ ฟูกะ...\""
2300102-62 = "ฉันเป็นหัวหน้าชมรมโภชนาการของเกเฮนน่านะ เรื่องแค่นี้ทำได้อยู่แล้วค่ะ!"
2300102-63 = "เอาล่ะ กลับกันเถอะค่ะ คุณครู!"
2300102-65 = "(จากนั้นคุณครูกับฟูกะก็ช่วยกันถือวัตถุดิบสำหรับทำอาหารกลับไปที่สถาบันเกเฮนน่า)"

[translation]
90000105-2 = "หนีไปแล้ว แบบนี้คือปฏิบัติการล้มเหลวเหรอ...?"
90000105-3 = "ไม่ค่ะ ถึงจะน่าเสียดายที่เจ้านั่นหลบหนีไปได้... แต่ก็คงได้รับความเสียหายไปไม่น้อยเลยค่ะ"
90000105-4 = "อาจจะไม่ถึง 12 ชั่วโมง แต่ก็คงใช้เวลาฟื้นตัวสักพักค่ะ"
90000105-5 = "งั้นเหรอ? ถ้างั้นตอนนี้ก็เข้าไปใน <พื้นที่วิจัย> ได้แล้วสินะ?"
90000105-6 = "ค่ะ กว่าเคเทอร์จะกลับมา ก็คงจะอีกประมาณ 8 ชั่วโมง เราต้องค้นหาสัญญาณของเดคาแกรมมาทอน#nที่อยู่ในพื้นที่วิจัยให้ได้ค่ะ"
90000105-7 = "เข้าใจแล้ว วันนี้คงต้องทำงานโต้รุ่งสินะ"
90000105-8 = "เรื่องปกติไม่ใช่เหรอคะ"
90000105-9 = "ถ้าอย่างนั้นเข้าไปในพื้นที่วิจัยได้เลยค่ะ"
90000105-12 = "พื้นที่วิจัย"
90000105-16 = "หัวหน้า เรามาถึง <พื้นที่วิจัย> อย่างปลอดภัยแล้ว"
90000105-21 = "แถวนี้ดูไม่มีอะไรที่น่าจะเป็นอันตรายนะ ดูแล้วก็ไม่ต่างจากพื้นที่รกร้างที่อื่นๆ"
90000105-22 = "จริงด้วยค่ะ เงียบสงบกว่าที่คิดนะคะ"
90000105-23 = "แต่จากการวิเคราะห์ภูมิประเทศ ความจริงแล้วพื้นที่นี้ควรจะจมอยู่ในน้ำค่ะ"
90000105-24 = "แต่ตรงนี้ไม่มีน้ำสักนิดเลยนะ?"
90000105-25 = "ใช่ค่ะ ที่นี่มีแต่ที่ดินแห้งแล้ง... คงจะมีคนบางกลุ่มเข้ามาทำงานวิศวกรรมโยธาขนาดใหญ่ แล้วสูบ#nน้ำออกไปจนหมดค่ะ"
90000105-26 = "อย่างงั้นสินะ... ห่างออกไปจากตรงนี้ 10 ก.ม. มีพื้นที่ที่กำลังสร้างเขื่อนขนาดใหญ่อยู่สินะ"
90000105-27 = "เป็นฝีมือเดคาแกรมมาทอนเหรอ?"
90000105-28 = "หรืออาจเป็นฝีมือของผู้เลื่อมใส"
90000105-29 = "จริงด้วย... พอดูรอบๆ ก็ยังเห็นร่องรอยของน้ำที่เคยมีอยู่เลย มีรอยตะไคร่น้ำที่ขึ้นอยู่ถึงตรงช่วงกลางๆ ตึกด้วย"
90000105-30 = "เอมิ ฉันอยากตรวจสอบสถานที่นั้นด้วยตาของตัวเองค่ะ ก่อนอื่น กลับมาที่นี่ก่อนเถอะค่ะ"
90000105-31 = "หัวหน้าจะมาดูเองเหรอ?"
90000105-32 = "ค่ะ ฉันเตรียมพร้อมสำหรับการออกสำรวจเสร็จสิ้นแล้วล่ะคะ"
90000105-37 = "เอาตามนั้นก็ได้... เรากลับไปกันก่อนเถอะ"
90000105-38 = "เรายังพอมีเวลาก่อนที่เคเทอร์จะกลับมา ก็นะ คงไม่เป็นอะไรหรอก"
90000105-40 = "ตอนต่อไป;เดคาแกรมมาทอน"

[translation]
90000105-2 = "被它逃走了……作戰失敗？"
90000105-3 = "不。雖然被它逃了，但依然有造成損傷。"
90000105-4 = "就算不用12個小時，修復依然需要一定的時間。"
90000105-5 = "是嗎？#n所以現在可以到「研究地區」去了？"
90000105-6 = "是的。在凱瑟回來之前大約還有8個小時。#n在這段期間中侵入，找出那裡頭的「十字神名的信號」。"
90000105-7 = "我知道了。看來今天要熬夜了呢。"
90000105-8 = "這是常有的事。"
90000105-9 = "那麼，出發吧。"
90000105-12 = "研究地區"
90000105-16 = "……部長，到了唷。"
90000105-21 = "沒有看見特別危險的要素。看起來就像普通的廢墟……"
90000105-22 = "……不過比預想中還安靜呢。"
90000105-23 = "根據分析，這裡應該處於被水淹沒的狀態。"
90000105-24 = "但看起來並非如此……？"
90000105-25 = "是呢，現在是乾燥狀態。#n有人進行了巨大的工程，把水都抽走了嗎……？"
90000105-26 = "……果然如此。離這裡10km左右的地方有一個巨大的水庫。"
90000105-27 = "……是十字神名？"
90000105-28 = "也可能是它的預言者。"
90000105-29 = "……仔細看的話確實能發現曾被水淹沒的痕跡。#n就連建築物中間也有苔蘚生長……"
90000105-30 = "英美，可以先回來一趟嗎？#n我也想親眼實際確認一下。"
90000105-31 = "部長也要實際來這裡的意思嗎？"
90000105-32 = "是的。在英美回來之前，我會做好外出準備的。"
90000105-37 = "……部長是這麼說的。我們先回去一趟吧。"
90000105-38 = "凱瑟還要一點時間才完成修復，應該沒問題。"
90000105-40 = "下一話;十字神名"

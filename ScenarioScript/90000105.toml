[translation]
90000105-1 = "#wait;1000"
90000105-2 = "3;에이미;06;후퇴했어. 이렇게 되면 작전 실패……?\n#3;stiff\n#3;a"
90000105-3 = "5;히마리;S2_06;아뇨. 도망치는 걸 막지 못한 건 아쉽지만…… 대미지는 확실하게 받았어요.\n#5;sig\n#5;a\n#3;m1"
90000105-4 = "5;히마리;S2_05;12시간까지는 아니겠지만 수복하는데 시간이 꽤 걸릴 거예요.\n#5;sig"
90000105-5 = "3;에이미;02;그런가? 그럼 이제 <연구지구>로 진입이 가능하다는 이야기?\n#3;em;[?]"
90000105-6 = "5;히마리;S2_01;네. 케테르가 돌아오기 전까지는요. 아마 예상으로는 8시간 정도? 그 안에 저 연구지구 안에서 포착된 데카그라마톤의 신호를 찾아냅니다.\n#5;sig"
90000105-7 = "3;에이미;04;알겠어. 오늘은 철야 작업이겠네."
90000105-8 = "5;히마리;S2_09;흔히 있는 일이죠.\n#5;em;[음표]\n#5;sig"
90000105-9 = "5;히마리;S2_03;그럼 연구지구로 진입합니다.\n#5;sig"
90000105-10 = "#all;hide"
90000105-11 = "#all;hide"
90000105-12 = "#place;연구지구"
90000105-13 = "#st;[0,0];instant;1;"

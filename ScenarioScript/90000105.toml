[translation]
90000105-2 = "It retreated. Does this mean our plan failed...?"
90000105-3 = "I don't think so. It might have managed to slip away...but it definitely took some serious damage."
90000105-4 = "It won't be the twelve hours we originally hoped for, but it'll take it some time to recover."
90000105-5 = "Does that mean we're still clear to proceed to the Research District?"
90000105-6 = "Until Kether returns, yes. My estimate is about eight hours. That's how long we have to find where Decagrammaton's signal was detected within the Research District."
90000105-7 = "Affirmative. It looks like it's going to be an all-nighter."
90000105-8 = "Nothing new for either of us."
90000105-9 = "Okay, commencing entry into the Research District."
90000105-12 = "Research District"
90000105-16 = "President, we've made it to the Research District."
90000105-21 = "I don't see anything hostile around. It doesn't look any different from the rest of the ruins."
90000105-22 = "Indeed. It's a lot quieter than I expected."
90000105-23 = "The strange thing is, based on the topographical analysis, this area should be completely submerged."
90000105-24 = "Really? There's not a single drop of water to be found."
90000105-25 = "Indeed... The presence of dry land here means that a tremendous amount of work was done to get the water out."
90000105-26 = "...Just as I thought. There's a massive dam that's been built about ten kilometers from here."
90000105-27 = "Is this the work of Decagrammaton?"
90000105-28 = "Or perhaps its prophet."
90000105-29 = "I think you're right. I see aquatic moss reaching all the way up to the middle of the buildings. This area was probably recently entirely submerged."
90000105-30 = "Eimi, I think I need to take a look at this place with my own two eyes. Please return at once."
90000105-31 = "You want to come see this personally, President?"
90000105-32 = "Yes. I'll finish preparations for the investigation in the meantime."
90000105-37 = "...You heard her. Let's head back."
90000105-38 = "There's still time until Kether returns. I'm sure it'll be fine."
90000105-40 = "Next Episode;Decagrammaton"

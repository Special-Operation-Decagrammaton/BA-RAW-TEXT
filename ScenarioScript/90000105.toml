90000105-37 = "3;에이미;06;……그렇다고 하네. 일단 돌아가자.\n#3;em;[땀]\n#3;a"
90000105-38 = "3;에이미;02;케테르가 돌아오기 전까진 아직 시간이 있을 테니까. 뭐, 괜찮겠지."

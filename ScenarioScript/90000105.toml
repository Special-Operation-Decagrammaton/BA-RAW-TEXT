90000105-15 = "#wait;2200"
90000105-16 = "3;에이미;01;부장. <연구지구>에 무사히 도착했어.\n#3;a"
90000105-17 = "#st;[0,0];instant;1;"
90000105-18 = "#clearST"
90000105-19 = "3;에이미;01\n#3;greeting\n#wait;1500"
90000105-20 = "3;에이미;01\n#3;em;[...]\n#wait;3000"
90000105-21 = "3;에이미;02;주변에 별다른 위험 요소도 보이지 않아. 그냥 다른 폐허랑 다를 게 없어 보이는데……."
90000105-22 = "5;히마리;S2_01;네. 생각보다 조용하네요.\n#5;sig\n#5;a\n#3;m1"
90000105-23 = "5;히마리;S2_05;하지만 이곳의 지형을 분석해보면 원래 수몰되어 있어야 하는 곳이에요.\n#5;sig"
90000105-24 = "3;에이미;06;그치만 여긴 물은 하나도 보이지 않는데?\n#3;em;[?]"
90000105-25 = "5;히마리;S2_01;그렇죠. 이곳만 마른 땅으로 있다는 건…… 누군가 거대한 토목공사를 시행해서 이 지역의 물을 빼냈다는 뜻이겠죠.\n#5;sig"
90000105-26 = "5;히마리;S2_02;……과연. 이쪽 지역에서 약 10km 떨어진 곳에 거대한 댐이 만들어져 있군요.\n#5;sig\n#5;em;[반응]"
90000105-27 = "3;에이미;02;데카그라마톤이 한 거야?\n#3;em;[?]"
90000105-28 = "5;히마리;S2_05;혹은 그 예언자가.\n#5;sig"
90000105-29 = "3;에이미;01;……그러네. 주변을 보니 확실히 한번 물에 잠겼던 흔적이 있어. 물이끼가 자란 흔적이 빌딩 중간까지 있고.\n#3;em;[...]"
90000105-30 = "5;히마리;S2_01;에이미. 저곳을 제 두 눈으로 직접 확인하고 싶어요. 일단 복귀하세요.\n#5;sig"
90000105-31 = "3;에이미;06;부장이 직접?\n#3;em;[?!]"
90000105-32 = "5;히마리;S2_03;네. 저는 그동안 탐색을 위한 준비를 끝내놓을 테니까요.\n#5;sig\n#5;m3\n#3;dl"
90000105-33 = "#st;[0,0];instant;1;"

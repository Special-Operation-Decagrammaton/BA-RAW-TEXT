[translation]
13300-1 = "Episode 30;Things Unknown"
13300-3 = "What have you done?!"
13300-5 = "I-I'm sorry, Hoshino. I made a mistake... "
13300-6 = "This isn't a mistake! Why are you letting yourself get tricked again?!"
13300-7 = "I-I'm sorry... "
13300-8 = "I can't... An Abydos filled with hope and dreams? If that's what you're trying to achieve, do it yourself!"
13300-9 = "H-Hoshino...?"

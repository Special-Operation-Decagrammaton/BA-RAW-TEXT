13300-15 = "Stop relying on me, and solve it on your own!"
13300-20 = "..."
13300-22 = "No, Yume... I didn't mean it."
13300-23 = "I got so mad...and I ended up taking it out on you..."
13300-24 = "I was just going to disappear for a little bit...and then come back... "
13300-25 = "Never in a million years did I think...that it'd be the last time I'd see you..."
13300-28 = "I'm back, Yume."
13300-29 = "...Forget what happened. I'm totally over it."
13300-30 = "More importantly..."
13300-37 = "...Yume?"
13300-38 = "Weird... She's usually here around this time..."
13300-43 = "This is a...hand-written note...?"
13300-47 = "\"Thank you, as always, Hoshino! Stay safe, okay?\"...?"
13300-50 = "...Yume?!"
13300-52 = "Yume."
13300-54 = "Yume."
13300-56 = "Yume."
13300-68 = "I'm sorry...Hoshino. The signal is cutting out— "
13300-69 = "There was an urgent matter, so I had to cross the desert, and— *tchhhk* I...sandstorm—"
13300-72 = "Hoshino... I'm sorry. "
13300-73 = "I forgot the compass again."
13300-74 = "I left you a note, but I'll leave you a message here too. I left you my notebook. Please be sure to go get it."
13300-75 = "It's at *tchhhk*. It should be easy for you to find!"
13300-78 = "Hoshino... I..."
13300-80 = "Yume... "
13300-81 = "Why did you go into the desert?"
13300-82 = "What was your urgent matter? What happened while I was gone?"
13300-83 = "Where is this place you left the notebook? Tell me, where do I need to go to find it?"
13300-84 = "What was in the notebook...you tried to leave me?"
13300-85 = "Is there any universe where I'll get to see it? Is that possible?"
13300-86 = "Forget this student council game! I'm done playing house with you!"
13300-88 = "Yume."
13300-89 = "What did you think, hearing my last words to you? How did it make you feel?"
13300-90 = "\"Hoshino... I—\" "
13300-91 = "How was that last message supposed to end?"
13300-92 = "Why don't I get to know? "

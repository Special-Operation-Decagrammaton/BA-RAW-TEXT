[translation]
13300-1 = "第30話;未知的事物"
13300-3 = "你到底在搞什麼啦！！"
13300-5 = "星，星野醬。抱歉，我又不小心……"
13300-6 = "不是不小心吧！為什麼又被騙了！"
13300-7 = "對，對不起…… "
13300-8 = "真是的……什麼充滿夢想與希望的阿拜多斯？#n喜歡幻想的話自己去想個夠吧！！"
13300-9 = "星，星野醬……？"
13300-11 = "學生會已經結束了！我要停止這種扮家家酒！"
13300-15 = "不要再來找我了，之後自己看著辦吧！"
13300-20 = "……"
13300-22 = "不是的，前輩……那不是我的真心話。"
13300-23 = "我只是因為很生氣……才會把氣出在前輩身上……"
13300-24 = "本來只想斷絕一下聯絡……就回來的……"
13300-25 = "結果那居然是夢前輩最後的……#n我真的……完全沒想過會變成這樣……"
13300-28 = "夢前輩，我來了。"
13300-29 = "……過去的事就讓它過去吧。我都已經忘了。"
13300-30 = "話說回來……"
13300-37 = "……夢前輩？"
13300-38 = "奇怪……這時間他應該總是在這裡才對……前輩……"
13300-43 = "這是……紙條……？"
13300-47 = "「一直都很謝謝你，星野醬！！要保重喔！」……？"
13300-50 = "夢，夢前輩！？"
13300-52 = "夢前輩。"
13300-54 = "夢前輩。"
13300-56 = "夢前輩。"
13300-68 = "對不起……星野醬。現在收訊不太好@#$% "
13300-69 = "因為有急事必須穿越沙漠，卻遇@#&%沙塵暴&#@"
13300-72 = "星野醬……對不起。"
13300-73 = "我又沒帶指南針來了。"
13300-74 = "雖然有留下紙條，但這邊也傳一次好了。#n我把手冊放在那裡，你以後再去拿吧。"
13300-75 = "那裡星野醬也很清楚@$^$%@#$#n我放在很顯眼的地方，應該很好找才對。"
13300-78 = "星野醬，我"
13300-80 = "夢前輩……"
13300-81 = "前輩為什麼會去沙漠呢？"
13300-82 = "前輩說的「急事」是什麼？#n我不在的時候發生了什麼嗎？"
13300-83 = "前輩說放著手冊的「那裡」指的是哪裡？要去哪裡才能找到前輩的手冊？"
13300-84 = "前輩說要留給我的那本手冊上……到底寫了什麼？"
13300-85 = "我有辦法看到嗎？我有辦法找到手冊嗎？"
13300-86 = "學生會已經結束了！我要停止這種扮家家酒！"
13300-88 = "夢前輩。"
13300-89 = "聽了我最後說的話之後，前輩是怎麼想的？他有什麼感受？"
13300-90 = "「星野醬，我」 "
13300-91 = "最後那段訊息的後續會是什麼？"
13300-92 = "為什麼我會不知道呢？"
13300-93 = "夢前輩。我……"
13300-96 = "我……[wa:1000]為什麼……"
13300-103 = "……"
13300-104 = "這裡是……"
13300-105 = "風紀委員長呢……！？"
13300-110 = "……一起掉下來了。"
13300-111 = "應該沒事吧……畢竟他很強……"
13300-114 = "大概知道這是哪裡了。"
13300-115 = "這裡是大綠洲站附近……#n沒錯，是我和夢前輩來過的地方……"
13300-116 = "從這裡再稍微往前走……就會看到乾涸的綠洲……那裡……"
13300-117 = "就是「列車砲」的所在地……"
13300-118 = "必須破壞列車砲……"
13300-119 = "要不然…… "
13300-120 = "我就……"
13300-133 = "很快……就到綠洲……"
13300-138 = "到此為止了。小鳥遊星野。"
13300-139 = "唔……！！"
13300-150 = "……咳咳。"
13300-151 = "咳咳……咳咳……夢……"
13300-156 = "夢……前輩……"
13300-160 = "…… "
13300-161 = "梔子夢……阿拜多斯的學生會長……"
13300-163 = "下一話;唯一的真相（１）"

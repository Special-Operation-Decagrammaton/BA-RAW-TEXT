13300-111 = "I'm sure she's fine... She's beyond strong... "
13300-114 = "I think I know where this is."
13300-115 = "It's near Great Oasis Station... Yeah. I've been here with Yume before..."
13300-116 = "Just a little further... I'll reach the dried-up oasis...and there..."
13300-117 = "The Train Cannon..."
13300-118 = "I have to destroy the Train Cannon..."
13300-119 = "That's right. If I can't... "
13300-120 = "I..."
13300-133 = "...almost...Oasis..."
13300-138 = "This is the end, Takanashi Hoshino."
13300-139 = "Ugh!"
13300-150 = "...*cough*"
13300-151 = "*cough*...*cough*... Yume..."
13300-156 = "Yume... Yume...!"
13300-160 = "... "
13300-161 = "Kuchinashi Yume... The student council president of Abydos..."
13300-163 = "Next Episode;One Truth 1"

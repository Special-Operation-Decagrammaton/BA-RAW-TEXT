[translation]
13300-1 = "ตอนที่ 30;สิ่งที่ไม่อาจรู้ได้"
13300-3 = "ทำอะไรลงไปคะเนี่ย?!"
13300-5 = "ฮะ... โฮชิโนะจัง ขอโทษนะ ฉันทำพลาดเอง ก็เลย..."
13300-6 = "นี่ไม่ใช่การทำพลาดสักหน่อย! ทำไมถึงโดนหลอกอีกแล้วล่ะคะ!"
13300-7 = "ขะ... ขอโทษนะ..."
13300-8 = "เชื่อเขาเลย... อะบิดอสที่เต็มไปด้วยความฝันและความหวังงั้นเหรอ? ถ้าจะทำอะไรแบบนั้นก็เชิญทำ#nไปคนเดียวเถอะค่ะ!!"
13300-9 = "ฮะ... โฮชิโนะจัง...?"
13300-11 = "ตอนนี้ไม่มีสภานักเรียนอะไรนั่นแล้วค่ะ! เพราะฉันจะเลิกเล่นอะไรเหมือนเด็กเล็กๆ แบบนี้แล้ว!"
13300-15 = "ไม่ต้องตามหาฉันแล้วก็ไปแก้ปัญหาคนเดียวเถอะค่ะ!"
13300-20 = "..."
13300-22 = "ไม่ใช่อย่างนั้นหรอกค่ะ รุ่นพี่... นั่นไม่ได้มาจากใจจริงของฉันนะคะ"
13300-23 = "ฉันแค่โมโห... แล้วก็ระบายความโมโหใส่รุ่นพี่ค่ะ..."
13300-24 = "ฉันคิดแค่จะเลิกติดต่อแค่สักพัก... แล้วก็กลับมาค่ะ..."
13300-25 = "แต่ฉันไม่คิดว่านั่นจะเป็นครั้งสุดท้ายที่ได้คุยกับรุ่นพี่ยูเมะ... ฉันไม่คิดเลย... ไม่เคยนึกฝันมาก่อนเลยด้วย..."
13300-28 = "รุ่นพี่ยูเมะ ฉันมาแล้วค่ะ"
13300-29 = "เรื่องที่ผ่านมาน่ะช่างมันเถอะค่ะ ฉันลืมไปหมดแล้ว"
13300-30 = "ที่สำคัญกว่านั้นน่ะ..."
13300-37 = "รุ่นพี่ยูเมะ...?"
13300-38 = "แปลกจัง... ปกติเวลานี้ต้องอยู่ที่นี่สิ... รุ่นพี่..."
13300-43 = "นี่มัน... กระดาษโน้ต...?"
13300-47 = "\"ขอบคุณเสมอๆ เลยนะ โฮชิโนะจัง! ดูแลตัวเองด้วยล่ะ!\" ...?"
13300-50 = "ระ... รุ่นพี่ยูเมะ?!"
13300-52 = "รุ่นพี่ยูเมะ"
13300-54 = "รุ่นพี่ยูเมะ"
13300-56 = "รุ่นพี่ยูเมะ"
13300-68 = "ขอโทษนะ... โฮชิโนะจัง ตอนนี้ไม่มีคลื่นวิทยุ@#$%"
13300-69 = "ฉันข้ามทะเลทรายมาน่ะ พอดีมีเรื่องด่วนต้องทำ@#&% แล้วก็มาเจอพายุทราย&#@"
13300-72 = "โฮชิโนะจัง... ฉันขอโทษ"
13300-73 = "ฉันไม่ได้หยิบเข็มทิศมาอีกแล้ว"
13300-74 = "ฉันทิ้งโน้ตข้อความไว้แล้ว แต่จะขอทิ้งข้อความไว้ทางนี้ด้วย ฉันเอาสมุดโน้ตของฉันไว้ตรงนั้น ช่วยไปที่นั่นหน่อยนะ"
13300-75 = "ที่นั่นน่ะ@$^$%@#$ โฮชิโนะจังก็น่าจะรู้จัก ฉันวางไว้ในที่สะดุดตา น่าจะหาได้ง่ายๆ"
13300-78 = "โฮชิโนะจัง ฉันน่ะ"
13300-80 = "รุ่นพี่ยูเมะ..."
13300-81 = "ทำไมรุ่นพี่ถึงไปที่ทะเลทรายนั่นเหรอคะ?"
13300-82 = "ธุระด่วนที่ว่าคืออะไรเหรอคะ? เกิดเรื่องอะไรขึ้นระหว่างที่ฉันไม่อยู่เหรอคะ?"
13300-83 = "แล้ว <ตรงนั้น> ที่บอกว่าเอาสมุดโน้ตไปวางไว้คือที่ไหนคะ? ฉันต้องไปที่ไหน ถึงจะหาสมุดโน้ตของ#nรุ่นพี่เจอคะ?"
13300-84 = "แล้วในสมุดโน้ตที่รุ่นพี่จะให้ฉัน... ในนั้นรุ่นพี่เขียนอะไรไว้บ้างคะ?"
13300-85 = "ทำยังไงฉันถึงจะได้อ่านมันคะ? ฉันจะได้อ่านสิ่งที่รุ่นพี่เขียนไว้มั้ย?"
13300-86 = "ตอนนี้ไม่มีสภานักเรียนอะไรนั่นแล้วค่ะ! เพราะฉันจะเลิกเล่นอะไรเหมือนเด็กเล็กๆ แบบนี้แล้ว!"
13300-88 = "รุ่นพี่ยูเมะ"
13300-89 = "หลังจากได้ฟังสิ่งที่ฉันพูดเป็นครั้งสุดท้าย รุ่นพี่คิดอะไรเหรอคะ? รุ่นพี่รู้สึกยังไงเหรอคะ?"
13300-90 = "<โฮชิโนะจัง ฉันน่ะ>"
13300-91 = "ในตอนท้ายของข้อความสุดท้ายเขียนไว้ว่าอะไรเหรอคะ?"
13300-92 = "ทำไมฉันถึงไม่รู้เรื่องราวนั้นเลยล่ะคะ?"
13300-93 = "รุ่นพี่ยูเมะ ฉัน..."
13300-96 = "ฉัน...[wa:1000] ทำไมกัน..."
13300-103 = "..."
13300-104 = "ที่นี่มัน..."
13300-105 = "ประธานกรรมการวินัยล่ะ...?!"
13300-110 = "เราตกลงมาด้วยกันนี่..."
13300-111 = "คงไม่เป็นไรหรอกเนอะ... ก็ยัยนั่นแข็งแกร่งไม่ใช่น้อยๆ เลยนี่นา..."
13300-114 = "เหมือนจะรู้แล้วละว่าที่นี่คือที่ไหน"
13300-115 = "แถวๆ สถานีโอเอซิสใหญ่... ไม่ผิดแน่ ฉันเคยมาที่นี่กับรุ่นพี่ยูเมะ..."
13300-116 = "ถ้าเดินไปจากตรงนี้อีกหน่อย... ก็จะเจอโอเอซิสที่แห้งผาก... แล้วที่นั่นก็จะมี..."
13300-117 = "<ปืนแม่เหล็กไฟฟ้า>..."
13300-118 = "ฉันต้องทำลายปืนแม่เหล็กไฟฟ้าให้ได้..."
13300-119 = "ใช่ เพราะถ้าไม่ทำอย่างนั้น..."
13300-120 = "ฉันก็คง..."
13300-133 = "ใกล้จะถึงโอเอซิสแล้ว..."
13300-138 = "พอแค่นี้เถอะ ทาคานาชิ โฮชิโนะ"
13300-139 = "อึก...!!"
13300-150 = "แค่กๆ..."
13300-151 = "แค่กๆ ... แค่ก... รุ่นพี่..."
13300-156 = "รุ่นพี่... ยูเมะ..."
13300-160 = "..."
13300-161 = "คุจินาชิ ยูเมะ... ประธานสภานักเรียนอะบิดอส..."
13300-163 = "ตอนต่อไป;ความจริงมีเพียงหนึ่งเดียว 1"

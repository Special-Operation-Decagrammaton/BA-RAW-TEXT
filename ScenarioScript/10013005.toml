[translation]
10013005-1 = "บทเริ่มต้น;ยังไม่ทันจบฤดูร้อน"
10013005-9 = "อ๊ะ มาถึงแล้วค่ะคุณครู! "
10013005-10 = "[s1] \"ขอบใจที่ขับเฮลิคอปเตอร์มาส่งถึงที่นี่เลยนะ\"\n[s2] \"อายาเนะเองก็น่าจะงานยุ่ง ขอบใจนะ\""
10013005-13 = "ไม่เป็นไรค่ะ ฉันยินดีมากเลยละค่ะ!"
10013005-14 = "ก็ฉันสัญญากับทุกคนไว้ว่าจะส่งคุณครูให้ถึงชาเล่ต์อย่างปลอดภัยนี่คะ"
10013005-15 = "เอาละ นี่ไม่ใช่เวลามาโอ้เอ้อยู่ ต้องรีบขนของไปสำนักงานชาเล่ต์..."
10013005-19 = "เอ๋...? คุณครูคะ มีใครบางคนอยู่หน้าทางเข้าชาเล่ต์..."
10013005-20 = "[s] \"หืม?\""
10013005-26 = "อ๊ะ~ คุณครู เพิ่งกลับมาจากพักร้อนเหรอคะ?"
10013005-27 = "ฮุฮุฮุ~ แถมยังกลับมากับเด็กน่ารักๆ~ แบบนี้ด้วย"
10013005-28 = "คะ... คะ?! นะ... น่ารัก...?!"
10013005-29 = "ตายจริง~ ปฏิกิริยาที่มีชีวิตชีวาแบบนี้~ เหมือนตอนที่ได้เจอคาโฮะเป็นครั้งแรกเลย~"
10013005-30 = "อุฮุฮุ~ น่ารักจังเลยน้า~"
10013005-31 = "[s] \"นิยะ...?\""
10013005-32 = "คุณนิยะ ตอนนี้ทั้งคุณครูและคุณนักเรียนจากโรงเรียนอื่นกำลังสับสนแล้วนะคะ เรามาที่นี่#nก็เพราะมีเรื่องด่วน เพราะฉะนั้น..."
10013005-33 = "ขอโทษที่เสียมารยาทนะคะ~ ฉันก็แค่คิดว่าภาพตรงหน้ามันน่าสนุกดี~"
10013005-34 = "[s] \"ทำไมมาอยู่กับมิโมริได้ล่ะ... เป็นการรวมตัวที่คาดไม่ถึงเลย...\""
10013005-35 = "เลิกคุยเล่นแล้วมาเข้าเรื่องกันเลยดีกว่า"
10013005-36 = "คุณครูคะ ฉันมาที่นี่อย่างเป็นทางการในฐานะนักเรียนเฮียกคิยาโค เพราะมีภาระงานที่ต้องทำค่ะ"
10013005-37 = "ว้ากกกก~! คุณครู! เกิดเรื่องใหญ่แล้วละค่ะ!"
10013005-38 = "หัวหน้าน่ะ...! หัวหน้ากับอุมิกะ...!"
10013005-39 = "[s] \"พีน่าก็มาด้วย? เกิดอะไรขึ้นกับชิซุโกะงั้นเหรอ?\""
10013005-40 = "คือว่า... ชิซุโกะจังกำลังตกอยู่ในสถานการณ์ที่ยากลำบากน่ะค่ะ"
10013005-41 = "[s] \"เข้าใจแล้ว ครูจะรีบไปที่ร้านเฮียกคิยาโคแล้วฟังเรื่องราวจากชิซุโกะ...\""
10013005-42 = "อา... ตอนนี้ชิซุโกะไม่ได้อยู่ที่ร้านเฮียกคิยาโคค่ะ"
10013005-43 = "หัวหน้าออกไปที่ทะเลแล้วค่ะ!"
10013005-44 = "[s] \"ทะเล...?\""
10013005-45 = "ใช่ค่ะ จากที่ได้ยินมา ที่ที่หัวหน้าชมรมเทศกาลไปอยู่ตอนนี้ก็คือ..."
10013005-46 = "<ลอสต์ พาราไดซ์ รีสอร์ต> อะไรนี่สักอย่างนี่แหละค่ะ"
10013005-47 = "[s] \"<ลอสต์ พาราไดซ์ รีสอร์ต>...? เหมือนเคยได้ยินที่ไหนมาก่อนเลย...\""
10013005-49 = "ที่ที่พวกฉันอยู่... ใช่ที่นั่นมั้ยคะ?"
10013005-50 = "[s] \"หืม...?\""
10013005-55 = "มาถึงแล้วค่ะทุกคน!"
10013005-58 = "อื้ม มาถึงแล้ว~"
10013005-59 = "ที่นี่เองเหรอคะ <ลอสต์ พาราไดซ์ รีสอร์ต>..."
10013005-60 = "ถ้าจะพูดให้ชัดเจนละก็ มันค่อนข้างจะ..."
10013005-61 = "[s] \"แค่เรื่องของอะบิดอสก็น่าจะยุ่งมากแล้ว ขอบใจนะที่มาส่งนะ\""
10013005-62 = "คะ? มะ... ไม่ขนาดนั้นหรอกค่ะ ฉันต้องมาที่นี่อยู่แล้วน่ะค่ะ แต่ไม่คิดเลยว่าจะได้มากับคุณครูอีกรอบ..."
10013005-66 = "ท่าทางทุกคนจะไปถึงกันโดยสวัสดิภาพนะคะ~♪"
10013005-67 = "[s] \"อื้ม ถึงนิยะจะไม่ได้ตามมาด้วยก็เถอะ...\""
10013005-68 = "อะฮ่าฮ่า~ ฉันรู้ค่ะว่าคุณครูร้อนรุ่มใจ~ อยากเดินเล่นริมทะเลฤดูร้อนกับฉันมากแค่ไหน~"
10013005-69 = "แต่ในฐานะของหัวหน้าชมรมหยินหยาง ฉันคงไปจากที่นี่โดยพลการไม่ได้"
10013005-70 = "ก็เลยส่งคุณชิเซะกับคุณมิโมริไปเป็นตัวแทนอยู่กับคุณครูที่นั่น หากจะส่งความรักอะไรให้ฉัน ก็ฝากสองคนนั้นมานะคะ~"
10013005-71 = "[s] \"เอาที่สบายใจแล้วกัน...\""
10013005-72 = "แหะๆๆ..."
10013005-73 = "อื้ม ฉันจะเป็นตัวแทนของหัวหน้าเอง..."
10013005-75 = "คุณครู! ซอรี่ค่ะ! พอรู้ว่าหัวหน้าตกอยู่ในวิกฤต ใจจริงพีน่าก็อยากจะตามไปถึงที่นั่นเลย!"
10013005-76 = "แต่ว่าพีน่า...! มีภารกิจต้องปกป้องพื้นที่ร้านเฮียกคิยาโค...!"
10013005-77 = "[s] \"ไม่เป็นไรหรอก ปล่อยให้เป็นหน้าที่ของครูและคนทางนี้เถอะ\""
10013005-78 = "ค่ะคุณครู...! ไม่สิ! บอส!"
10013005-79 = "หัวหน้าชมรมเทศกาลน่าจะไปอยู่ที่ <ร้านริมทะเล> นะคะ"
10013005-80 = "[s] \"<ร้านริมทะเล> งั้นเหรอ...\""
10013005-89 = "[ns] \"เอ๊ะ... เอ๋?!\""
10013005-90 = "คุณครูคะ! มีเสียงชุลมุนมาจากทางโน้นค่ะ!"
10013005-94 = "กะ... เก่งชะมัด! นี่สินะอำนาจมืดที่วางแผนล่ารีสอร์ตใน <ลอสต์ พาราไดซ์ รีสอร์ต>!"
10013005-95 = "ประมาทพวกเธอไม่ได้จริงๆ นะ! ชมรมจัดงานเทศกาล สหพันธ์เฮียกคิยาโค!"
10013005-97 = "ก็! บอก! อยู่! นี่! ไง! ว่าฉันไม่เข้าใจเลยว่าพวกคุณพูดเรื่องอะไรอยู่!!"
10013005-98 = "นั่นสิคะ! จู่ๆ ก็บุกเข้ามาขัดขวางกิจการกันอยู่ได้!"
10013005-99 = "แค่วันนี้วันเดียวก็บุกเข้ามาห้ารอบแล้วนะคะ!"
10013005-101 = "ยังจะมาแกล้งทำเป็นใสซื่ออยู่อีก สมแล้วที่เป็นอำนาจมืดที่มีเล่ห์เหลี่ยมแอบแฝง!"
10013005-103 = "ถึงตอนนี้พวกฉันจะต้องเผ่นแน่บไปก่อน! แต่ก็อย่าคิดนะว่าเรื่องมันจะจบแค่นี้!"
10013005-107 = "ทำไมนะ... ทำไมถึงชนะแต่ก็ไม่ได้รู้สึกดีเลย?!"
10013005-108 = "[s] \"ชิซุโกะ?\""
10013005-110 = "ชิซุโกะจัง...!"
10013005-111 = "ว่าไง~~ คุณแรคคูน~~"
10013005-116 = "อ๊ะ?! คุณครู... แล้วก็คนอื่นด้วย?"
10013005-117 = "นายท่าน!"
10013005-118 = "คุณครูจากชาเล่ต์มาเยี่ยมร้านเหรอ? "
10013005-119 = "[s] \"เกิดเรื่องอะไรขึ้นเหรอ?\""
10013005-120 = "เอ่อ..."
10013005-121 = "ฮือออ~! คุณครู~! เกิดเรื่องวุ่นวายทั้งวันเลยค่ะ!"
10013005-123 = "ร้านเฮียกคิยาโค สาขาลอสต์ พาราไดซ์ รีสอร์ต"
10013005-124 = "นายท่านมาหาพวกเราถึงที่นี่เลย!"
10013005-125 = "อ๊ะ! หรือว่ามาดูฝีมือของอิซุนะเหรอคะ?! นินนิน!"
10013005-126 = "[s] \"มีธุระอื่นต้องทำน่ะ... ว่าแต่ ทำไมอิซุนะถึงมาอยู่ที่นี่ล่ะ?\""
10013005-127 = "อิซุนะได้รับคำขอร้องจากท่านชิซุโกะให้มาปฏิบัติภารกิจคุ้มกันค่ะ!"
10013005-128 = "ท่านชิซุโกะเห็นความเป็นไปได้ที่อิซุนะจะเป็นสุดยอดนินจาแห่งคิโวทอสในอนาคตค่ะ!"
10013005-129 = "หืม...?"
10013005-130 = "เปล่านะ ฉันแค่เห็นว่านินจาน่าจะช่วยได้..."
10013005-131 = "ช่วยในการโปรโมตร้านอะไรทำนองนี้น่ะ"
10013005-132 = "คะ?! ไม่ได้เห็นคุณค่าที่แท้จริงของอิซุนะแล้วมอบหมายหน้าที่ในฐานะนินจาให้หรอกเหรอคะ!?"
10013005-133 = "(หางลู่หูตก)"
10013005-134 = "[s] \"อิซุนะทั้งน่ารักและเท่ เหมาะกับการเป็นเด็กพาร์ทไทม์เหมือนกันนะ\""
10013005-135 = "อ๊ะ?! นายท่าน?! คิดอย่างนั้นเหรอคะ?! ฮิฮิฮิ!"
10013005-137 = "[s3] \"ครูได้ยินเรื่องจากนิยะและพีน่ามาแล้วน่ะ\"\n[s4] \"ได้ยินว่าชิซุโกะและอุมิกะกำลังลำบากกันอยู่น่ะ\""
10013005-141 = "อ๊ะ~ พอมาคิดๆ ดูแล้ว~ จะเรียกว่ากำลังลำบากอยู่ตามที่พูดก็ได้ค่ะ~"
10013005-142 = "คุณครูคะ! นี่ก็ห้าครั้งเข้าไปแล้วนะคะ! เพิ่งจะผ่านไปแค่ครึ่งวันเอง แต่พวกเด็กเจ้าปัญหาก็บุกมา#nถึงห้าครั้งแล้วค่ะ!"
10013005-143 = "[s] \"คงจะเหนื่อยกันมากเลยนะ...\""
10013005-144 = "ค่ะ~ ตั้งแต่เปิดร้านวันนี้ พวกเด็กเจ้าปัญหาก็บุกเข้ามาแล้วบอกว่าจะ <จัดการผู้มีสิทธิ์ขั้นสุดท้าย> แล้วก็เอาแต่ตะโกนว่า <นี่คือการล่ารีสอร์ตนะ!> อะไรก็ไม่รู้"
10013005-145 = "หรือว่าที่นี่มีเทศกาลอะไรที่ฉันไม่รู้หรือเปล่าคะ?"
10013005-146 = "ไม่ๆๆๆ! ไม่มีทาง!"
10013005-147 = "[s] \"ผู้มีสิทธิ์ขั้นสุดท้าย... การล่ารีสอร์ต...\""
10013005-149 = "คือว่า..."
10013005-153 = "ไม่ทราบว่าคุณชิซุโกะก็มาที่นี่เพราะได้ <ตั๋วใช้งานรีสอร์ต> หรือเปล่าคะ?"
10013005-154 = "หืม? ไม่นะ พวกฉันน่ะ..."
10013005-155 = "ฮุฮุ ชมรมจัดงานเทศกาลซื้อ <ตั๋วใช้งานรีสอร์ต ลอสต์ พาราไดซ์ รีสอร์ต> มาอย่างเป็นทางการ#nต่างหากค่ะ!"
10013005-156 = "ใช่แล้ว นี่เป็นส่วนหนึ่งของการทำธุรกิจ..."
10013005-157 = "[s] \"ไม่ได้ถูกรางวัล แต่ซื้อมา...? หนังสือสัญญาที่เต็มไปด้วยช่องโหว่นั่นน่ะนะ...?\""
10013005-158 = "คะ? เต็มไปด้วยช่องโหว่...? มะ... หมายถึงอะไรกันคะ?"
10013005-159 = "[s] \"หืม?\""
10013005-160 = "......??"
10013005-165 = "เอ่อ... ฉันว่าน่าจะมีการเข้าใจผิดกันอยู่นะคะ"
10013005-166 = "คุณอายาเนะไม่รู้หรอกเหรอคะ?"
10013005-167 = "มาอยู่ที่นี่กับคุณครูก่อนพวกเราอีกไม่ใช่เหรอคะ?"
10013005-168 = "เอ่อ... คือว่า ฉันก็ไม่รู้ว่าจะอธิบายยังไงดี..."
10013005-169 = "คุณครูมาอยู่ที่นี่ก่อนแล้วเหรอ...?"
10013005-170 = "[s] \"ฟังนะชิซุโกะ ทั่วทั้งหมู่เกาะนี้กำลังมี <การล่ารีสอร์ต> อยู่\""
10013005-171 = "การล่ารีสอร์ต... ที่แยงกี้ชุดว่ายน้ำพวกนั้นพูดถึงเหรอคะ?"
10013005-172 = "ในหนังสือสัญญามีช่องโหว่ ทุกคนที่อ้างสิทธิ์นั้นก็เลยกำลังต่อสู้กันอยู่บนหมู่เกาะแห่งนี้...?"
10013005-173 = "(เมื่อเห็นว่าชิซุโกะกำลังสับสน คุณครูก็เริ่มอธิบายเบื้องหลังเกี่ยวกับสิ่งที่เกิดขึ้นที่นี่ให้เธอฟังอย่าง#nละเอียด)"
10013005-174 = "[s] \"ตั๋วใช้งานที่ชิซุโกะมีอยู่ น่าจะมีข้อกำหนดแบบนี้อยู่นะ\""
10013005-176 = "(ผู้ทำสัญญาของหนังสือสัญญานี้ได้รับ 'สิทธิ์ในการใช้งาน' ลอสต์ พาราไดซ์ รีสอร์ต)"
10013005-177 = "('สิทธิ์ในการใช้งาน' หมายถึงสิทธิ์ในที่ดินทั้งหมดของรีสอร์ต ของใช้ อุปกรณ์ทั้งหมด และสามารถเป็นเจ้าของทรัพยากร รวมถึงรายได้ทั้งหมดที่เกิดขึ้น)"
10013005-178 = "(เจ้าของสัญญาจะได้รับสิทธิ์ทั้งหมดนี้ 'อย่างไม่มีข้อจำกัด')"
10013005-179 = "ค่ะ... เพราะนี่เป็นหนังสือสัญญา มันก็แน่อยู่แล้วที่..."
10013005-180 = "[s] \"ปัญหาก็คือนอกจากพวกแยงกี้นั่น ยังมีคนอื่นอีกที่มีหนังสือสัญญานั้นอยู่\""
10013005-181 = "(จากนั้นคุณครูก็เล่าให้ชิซุโกะฟังว่าเซริกะจากอะบิดอสเองก็มี <ตั๋วใช้งานรีสอร์ต> ที่ได้มา#nจากการถูกรางวัลและแก๊งหมวกกันน็อกก็มีสิ่งนี้อยู่เหมือนกัน)"
10013005-182 = "(ตอนแรกมันถูกทำให้เชื่อว่าเป็นตั๋วใช้งานที่จำกัดเฉพาะเกาะๆ เดียว แต่ที่จริงแล้วมันเป็นหนังสือ#nสัญญาที่รวมสิทธิ์ของทั้งหมู่เกาะ <ลอสต์ พาราไดซ์ รีสอร์ต>)"
10013005-183 = "ถ้าเป็นตามอย่างที่คุณครูว่า ก็แปลว่าที่ <ลอสต์ พาราไดซ์ รีสอร์ต> แห่งนี้ยังมีคนอื่นที่มีหนังสือ#nสัญญาเหมือนกันกับพวกฉันอยู่"
10013005-184 = "และพอรู้ถึงช่องโหว่ของหนังสือสัญญา แต่ละคนก็วุ่นวายกับการ <ล่ารีสอร์ต> เพื่อแย่งในสิ่งที่#nอีกฝ่ายมีงั้นเหรอคะ?!"
10013005-185 = "เดี๋ยวๆๆ ไม่เห็นจะเข้าใจสถานการณ์เลย...สักนิดค่ะ ว่าแต่ทำไมคุณครูถึงรู้..."

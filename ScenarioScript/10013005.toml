[translation]
10013005-1 = "Prologue;Summer Isn't Over Yet"
10013005-9 = "We've arrived, Sensei.  "
10013005-10 = "[s1] \"Thanks for the helicopter ride.\"\n[s2] \"I know you're busy, Ayane. Thank you.\""
10013005-13 = "Don't mention it!"
10013005-14 = "I promised everyone I'd bring you back to Schale safely."
10013005-15 = "Here. I'll help you bring your luggage in."
10013005-19 = "Huh? Sensei... There's someone blocking the entrance."
10013005-20 = "[s] \"Hm?\""
10013005-26 = "Ah, Sensei! Are you coming back from vacation?"
10013005-27 = "Heehee. You're living the high life. Vacations AND cute girls?"
10013005-28 = "H-Huh?! C-Cute...?!"
10013005-29 = "Aww, your reaction reminds me of the first time I met Kaho."
10013005-30 = "Heehee. You're just adorable."
10013005-31 = "[s] \"...Niya...?\""
10013005-32 = "Niya, please focus on our urgent business. I believe your actions are embarrassing Sensei and their student."
10013005-33 = "Heehee. I just couldn't help myself. Sorry, sorry."
10013005-34 = "[s] \"Mimori too... What an unexpected combination...\""
10013005-35 = "Okay. Enough small talk."
10013005-36 = "Sensei, I'm here on official business as a Hyakkiyako student."
10013005-37 = "Waaah! Sensei! We're in trouble! Big trouble!"
10013005-38 = "The president...! The president and Umika...!"
10013005-39 = "[s] \"Pina?! Did something happen to Shizuko?\""
10013005-40 = "You see, it seems Shizuko is in a spot of trouble."
10013005-41 = "[s] \"I'll talk to her. Let's go to Momoyodou.\""
10013005-42 = "That's the crux of the problem. That's not where she is."
10013005-43 = "The president is at the beach!"
10013005-44 = "[s] \"...The beach?\""
10013005-45 = "Yes, I was told the president of the Festival Department is in a place called..."
10013005-46 = "...The Lost Paradise Resort."
10013005-47 = "[s] \"The Lost Paradise Resort... It can't be...\""
10013005-49 = "B-But... Isn't that where we just were?"
10013005-50 = "[s] \"...It is.\""
10013005-55 = "We've arrived safely, everyone."
10013005-58 = "Yay. We're here."
10013005-59 = "This is the Lost Paradise resort?"
10013005-60 = "It...exceeds expectations in many ways."
10013005-61 = "[s] \"Thanks for bringing us here. You have a lot on your plate already.\""
10013005-62 = "O-Oh! No, please don't thank me! I had to return anyway... I just wasn't expecting it to be with you."
10013005-66 = "It looks like everyone arrived safely! ♪"
10013005-67 = "[s] \"Why didn't you come, Niya...?\""
10013005-68 = "Ahaha! Are you asking me on a romantic beach date, Sensei?"
10013005-69 = "Unfortunately, as the president of the Yin-Yang Club, I can't just slip away whenever I please."
10013005-70 = "So I sent Chise and Mimori on my behalf. Please take care of them for me!"
10013005-71 = "[s] \"That sounds like an excuse...\""
10013005-72 = "Ha...haha..."
10013005-73 = "Yes. I will do my best on behalf of the president."
10013005-75 = "Sensei! I'm sorry! Knowing that the president is in crisis, I wanted to go too!"
10013005-76 = "But I have a mission to protect the Momoyodou area...!"
10013005-77 = "[s] \"Do your job. We got this.\""
10013005-78 = "Yes, Sensei...! I mean, boss!"
10013005-79 = "The president of the Festival Department should be at the Beach Shack."
10013005-80 = "[s] \"The Beach Shack, you say...\""
10013005-89 = "[ns] \"H-Huh?!\""
10013005-90 = "Sensei! Let us investigate the commotion."
10013005-94 = "Th-That power. Is this the evil power that planned the Resort Hunt?!"
10013005-95 = "We can't underestimate the Festival Operations Department of the Hyakkiyako Academy!"
10013005-97 = "I told you! I have no idea what you're talking about!"
10013005-98 = "You're the ones who barged into our business unprovoked!"
10013005-99 = "Th-Th-This is the fifth time today!"
10013005-101 = "A liar to the end, I see."
10013005-103 = "We may be retreating now, but you better watch your back!"
10013005-107 = "I...I don't really feel like we won."
10013005-108 = "[s] \"Shizuko?\""
10013005-110 = "Shizuko...!"
10013005-111 = "Hi. Little raccoon!"
10013005-116 = "Huh?! Sensei...and others?!"
10013005-117 = "My lord!"
10013005-118 = "Schale's Sensei?!  "
10013005-119 = "[s] \"Umm... Nice day at the beach?\""
10013005-120 = "W... Wa..."
10013005-121 = "WAAAH! Sensei! It's been such a terrible day!"
10013005-123 = "Momoyodou of the Lost Paradise Resort"
10013005-124 = "I can't believe you came all the way here, my lord!"
10013005-125 = "Have you come to evaluate Izuna's progress? Nin nin!"
10013005-126 = "[s] \"This was actually a pleasant surprise.\""
10013005-127 = "Wow! It must've been fate then! Izuna is here on an escort mission, at Shizuko's request!"
10013005-128 = "Shizuko recognized Izuna's potential to be the strongest ninja in all of Kivotos and hired her!"
10013005-129 = "Hm?"
10013005-130 = "Oh, no. I just saw the potential in ninjutsu as a concept."
10013005-131 = "It'll be great for promotional events!"
10013005-132 = "What?! You mean you didn't think Izuna was a super-cool, super-strong ninja?!"
10013005-133 = "(disappointed)"
10013005-134 = "[s] \"Izuna, being a part-timer is an important job too.\""
10013005-135 = "Really?! If my lord says so, Izuna has to do her best!"
10013005-137 = "[s3] \"Anyway, Niya and Pina sent me here.\"\n[s4] \"Everyone was saying that Shizuko and Umika are in trouble.\""
10013005-141 = "I suppose we're in a spot of trouble..."
10013005-142 = "Sensei! We've already been attacked five times just today! Five! Times!"
10013005-143 = "[s] \"I'm sorry that happened...\""
10013005-144 = "All we did was open up shop, and gangsters were swarming us screaming, \"We'll defeat the proprietor!\" and other strange things."
10013005-145 = "Perhaps this \"Resort Hunt\" they referred to is a fun festival?"
10013005-146 = "Why would they be attacking us over a festival?!"
10013005-147 = "[s] \"The proprietor...and the Resort Hunt...\""
10013005-149 = "Pardon me, but..."
10013005-153 = "By any chance, did you win a resort vacation to this place?"
10013005-154 = "Huh? Not exactly, I mean..."
10013005-155 = "Heehee. The Festival Operations Department purchased a contract for the Lost Paradise Resort and came here!"
10013005-156 = "Yes, as a part of our business."
10013005-157 = "[s] \"You didn't read the fine print, did you?\""
10013005-158 = "Fine print? What do you mean?"
10013005-159 = "[s] \"Hm?\""
10013005-160 = "...?"
10013005-165 = "Um, there appears to be some sort of misunderstanding."
10013005-166 = "Ayane, are you able to enlighten us?"
10013005-167 = "You came here on vacation with Sensei, correct?"
10013005-168 = "Oh, yes...but that's... Well, it's difficult to explain."
10013005-169 = "Can Sensei explain for us, then?"
10013005-170 = "[s] \"The Resort Hunt you heard about is happening all over the archipelago.\""
10013005-171 = "That's why those Swimsuit Thugs are here?"
10013005-172 = "And because of some loophole, people are all fighting each other to stake their claims?"
10013005-173 = "I went on to explain all of the details of the Resort Hunt to them."
10013005-174 = "[s] \"You should be able to see it on your contract.\""
10013005-176 = "The owner of this contract obtains the \"right to use\" the Lost Paradise Resort."
10013005-177 = "The above \"right to use\" refers to the rights of all land, goods, and facilities of the resort, as well as all revenue and resources generated by the resort."
10013005-178 = "The owner's rights are \"absolute\"."
10013005-179 = "I don't see anything wrong with this contract."
10013005-180 = "[s] \"The problem lies in the fact that everyone has the same contract.\""
10013005-181 = "I told her how Serika won the \"vacation\" in Abydos and how the Helmet Gangsters had a contract as well."
10013005-182 = "I also explained how the contract appeared exclusive to one island, but in fact included rights for the entire archipelago of the Lost Paradise resorts."
10013005-183 = "What you're saying is many people came to the Lost Paradise Resort with the same contract as us."
10013005-184 = "And this Resort Hunt began when they realized there was a loophole and began fighting for ownership."
10013005-185 = "Wait, wait, wait. This is crazy! How do you even know all this?"
10013005-186 = "[s] \"Ayane and I had to find out the hard way.\""
10013005-190 = "[ns] \"(Come to think of it, the Abydos students should still be here...)\""
10013005-197 = "Ack! Another dishonorable ambush?!"
10013005-202 = "Five times a day is more than enough! Leave us alone!"
10013005-208 = "This way!"
10013005-209 = "Reporting for duty! ☆"
10013005-210 = "[s] \"...You guys...?\""
10013005-212 = "We've come to take down the criminals behind the Resort Hunt."
10013005-213 = "Hyakkiyako Academy's Festival Operations Department! I'll never forgive your lies and deceit!"
10013005-214 = "Yeah. It's time for justice."
10013005-215 = "Yup, yup! Righteous justice! ☆"
10013005-217 = "Let's get them!"
10013005-218 = "You don't have to tell me twice!"
10013005-220 = "...Oh, dear."
10013005-221 = "H-H-Hey! What are you doing?!"
10013005-227 = "[ns] \"...I have no explanation.\""
10013005-233 = "Wh—"
10013005-234 = "What the heck is going on here?!"

[translation]
10013005-1 = "序章;夏天尚未結束"
10013005-9 = "老師，我們到了唷！"
10013005-10 = "[s1] 「謝謝你送我回來，綾音。」\n[s2] 「明明你也很忙的，真是不好意思。」"
10013005-13 = "別客氣！我們平時總是受老師的照顧呀。"
10013005-14 = "而且，也和大家約好了……要把老師平安地送回夏萊。"
10013005-15 = "……現在不是說這些的時候了。#n老師，我這就幫你拿行李到辦公室──"
10013005-19 = "──咦？門口好像有誰在……？"
10013005-20 = "[s] 「嗯？」"
10013005-26 = "哎呀～老師。難道說，你剛放完假回來嗎？"
10013005-27 = "而且還跟這～麼可愛的孩子一起？"
10013005-28 = "什，什麼！？可，可，可愛……嗎！？"
10013005-29 = "呵呵，這麼純真的反應，讓我想起第一次見到佳穗的時候呢。"
10013005-30 = "唔呵呵～真可愛。"
10013005-31 = "[s] 「仁，仁耶……？」"
10013005-32 = "真是的，仁耶同學，老師和旁邊的同學都很困擾喔。#n請別忘記今天來的目的。"
10013005-33 = "喵哈哈～抱歉抱歉。#n不小心就玩過頭了～"
10013005-34 = "[s] 「竟然連三森都在……感覺真是少見的組合呢。」"
10013005-35 = "嘛，閒聊就先到此為止。"
10013005-36 = "──我們百鬼夜行有想進行正式協商的事情，所以才會來這裡的。"
10013005-37 = "Noooo！！老師！大事不好了！"
10013005-38 = "部長他……！部長和海花他們啊啊啊啊！！"
10013005-39 = "[s] 「連菲娜都在！？靜子發生什麼事了嗎？」"
10013005-40 = "說來話長……靜子醬遇到不得了的事了……"
10013005-41 = "[s] 「我到百夜堂去問問靜子詳情……」"
10013005-42 = "靜子同學的話現在不在百夜堂喔。"
10013005-43 = "部長他去海邊了！"
10013005-44 = "[s] 「…………海邊？」"
10013005-45 = "沒錯。雖然我只是聽說的，但靜子同學現在──"
10013005-46 = "……是「失樂園渡假勝地」嗎？#n好像就在那裡的樣子……"
10013005-47 = "[s] 「『失樂園渡假勝地』？怎麼好像在哪裡聽過……」"
10013005-49 = "老師……那不就是我們剛才還在的渡假勝地嗎？"
10013005-50 = "[s] 「……咦？」"
10013005-55 = "大家，已經可以下來了唷。"
10013005-58 = "到～了。"
10013005-59 = "這就是「失樂園渡假勝地」嗎……"
10013005-60 = "雖然嚴格說起來有點不太對……"
10013005-61 = "[s] 「明明阿拜多斯的事情已經很累了……真謝謝你，綾音。」"
10013005-62 = "不會不會！我也覺得差不多該回來了。#n雖然沒想到會這樣和老師一起回來……"
10013005-66 = "大家好像都平安到達了呢～♪"
10013005-67 = "[s] 「嗯，我們到了唷……雖然仁耶你沒有來。」"
10013005-68 = "喵哈哈～♪我也不是不理解老師想和我一起度過火熱～時間的心情……"
10013005-69 = "但身為陰陽部的部長，沒辦法隨意離開崗位呢。"
10013005-70 = "雖然不算是代替我，但知世和三森也都一起去了。#n請把對我的愛傳給他們吧～"
10013005-71 = "[s] 「是是是……」"
10013005-72 = "啊哈哈……"
10013005-73 = "嗯，會代替部長好好加油喔～"
10013005-75 = "老師，對不起！雖然菲娜也想一起去幫忙靜子部長，可是──"
10013005-76 = "菲娜還有著守護百夜堂的使命……！"
10013005-77 = "[s] 「沒關係的。這邊就交給我們吧。」"
10013005-78 = "好的，老師──不對，頭兒！"
10013005-79 = "靜子同學應該就在「海之家」那裡。"
10013005-80 = "[s] 「『海之家』……嗎。」"
10013005-89 = "[ns] 「嗯！？」"
10013005-90 = "那邊好像發生什麼事了呢。"
10013005-94 = "好，好強！這就是策畫這次渡假勝地狩獵的幕後黑手的實力嗎！"
10013005-95 = "真是不容小覷啊……！百鬼夜行的節慶營運管理部！"
10013005-97 = "所──以──說──！你們在說什麼，我完全聽不懂啊！！"
10013005-98 = "就是說啊！突然就跑來店裡搞破壞！到底在搞什麼啊！"
10013005-99 = "這已經是今天的第5次了唷！第5次！伊樹菜的忍耐程度也快要到極限了！"
10013005-101 = "事到如今還在裝傻啊……真不愧是幕後黑手。"
10013005-103 = "這次就先放你們一馬！但是別以為這樣就結束了！"
10013005-107 = "為什麼呢……明明是我們贏了，卻一點也不爽快！？"
10013005-108 = "[s] 「靜子？」"
10013005-110 = "靜子醬……！"
10013005-111 = "狸貓同學你好呀～"
10013005-116 = "咦！？老師！？還有三森和知世也來了！？"
10013005-117 = "主，主公！？"
10013005-118 = "夏萊的老師！？"
10013005-119 = "[s] 「那個……發生什麼事了？」"
10013005-120 = "那個，是……嗚……"
10013005-121 = "嗚哇啊啊啊啊啊啊啊！！！老～師～！#n今天真的已經不是用「糟糕」就能形容的等級了～！！"
10013005-123 = "百夜堂．失樂園渡假勝地分店"
10013005-124 = "沒想到主公竟然會來呢！"
10013005-125 = "難道是來看伊樹菜的活躍的嗎？忍忍！"
10013005-126 = "[s] 「因為有點事情要處理……話說回來，伊樹菜怎麼會在這裡呢？」"
10013005-127 = "伊樹菜受靜子閣下委託，正在進行護衛工作！"
10013005-128 = "靜子閣下肯定是看出伊樹菜將來會成為奇普托斯最強忍者的潛力了！"
10013005-129 = "咦？"
10013005-130 = "我只是覺得忍者很新奇，"
10013005-131 = "應該能有宣傳效果吧～之類的而已……"
10013005-132 = "咦！？這麼說，並不是看出了伊樹菜的真正價值嗎！？"
10013005-133 = "（嗚嗚）"
10013005-134 = "[s] 「打工中的伊樹菜也很可愛哦。」"
10013005-135 = "真，真的嗎？耶嘿嘿♪"
10013005-137 = "[s3] 「話說回來，我聽仁耶和菲娜說了。」\n[s4] 「靜子和海花好像遇到了困難。」"
10013005-141 = "確實，要說困難的話真的挺困難的呢。其實──"
10013005-142 = "今天已經被妨礙營業5次了！才半天就已經5次了！"
10013005-143 = "[s] 「那還真是悽慘啊……」"
10013005-144 = "是的……今天不管店有沒有開都一直有奇怪的客人找上門來……#n說著什麼「打倒掌權者！」、「渡假勝地狩獵」這種聽不懂的東西……"
10013005-145 = "難道說這是什麼我們不知道的慶典嗎？"
10013005-146 = "不不！這不可能吧！"
10013005-147 = "[s] 「『掌權者』……『渡假勝地狩獵』……」"
10013005-149 = "那個，靜子同學。"
10013005-153 = "冒昧請教你一下……你們是不是抽到了「渡假勝地使用權」呢？"
10013005-154 = "咦？不，我們是……"
10013005-155 = "哼哼哼……#n其實我們節慶營運管理部正式買下了「渡假勝地使用權」！"
10013005-156 = "只是作為事業的一環而已喔。"
10013005-157 = "[s] 「你說『買下了』，是在那個漏洞滿滿的契約書上簽名了嗎？」"
10013005-158 = "咦？你說漏洞滿滿是什麼意思？"
10013005-159 = "[s] 「嗯？」"
10013005-160 = "……？？"
10013005-165 = "那個……看來牛頭不對馬嘴呢。"
10013005-166 = "綾音同學知道些什麼嗎？"
10013005-167 = "我聽說你之前已經跟老師來過一次了。"
10013005-168 = "那是……我該怎麼說明這個情況才好呢……"
10013005-169 = "咦？老師你來過這裡了嗎？"
10013005-170 = "[s] 「呃……事實上，這整個群島正在發生『渡假勝地狩獵』。」"
10013005-171 = "是剛才那些太妹說的那個嗎？"
10013005-172 = "呃……有漏洞的契約書……#n還有其他主張擁有權力的人……？為什麼……？"
10013005-173 = "（對混亂的靜子說明了這裡正在發生的事）"
10013005-174 = "[s] 「首先，先確認一下靜子手上的使用權吧。」"
10013005-176 = "（本合約的簽約人將獲得「失樂園渡假勝地」的「使用權利」）"
10013005-177 = "（上述「使用權利」係指在渡假勝地內所有的土地、備品和設備的使用權以及#n　從中獲得的所有收益及資源的所有權）"
10013005-178 = "（本合約的所有人將保有以上所有權利）"
10013005-179 = "……那個，我覺得合約內容很正常啊……#n是哪裡有漏洞呢？"
10013005-180 = "[s] 「問題是那份合約書……包含泳裝太妹在內有很多人都有。」"
10013005-181 = "（說明了茜香在阿拜多斯抽到了「渡假勝地使用權」#n　還有頭盔團也有著一樣的東西的事）"
10013005-182 = "（以及乍看之下像是僅限於各島內使用權的合約，#n　實際上卻涵蓋整個「失樂園渡假勝地」群島）"
10013005-183 = "也就是說……如果老師說的事是真的，#n在「失樂園渡假勝地」裡聚集了和我們有著一樣契約的其他人──"
10013005-184 = "因為發現了合約裡的漏洞，為了主張自己的權利而開始了「渡假勝地狩獵」是嗎？"
10013005-185 = "不，這才讓人搞不懂吧！#n話說回來，為什麼老師這麼清楚這件事──"
10013005-186 = "[s] 「不久之前我和綾音他們一起被捲入了那場騷動裡……」"
10013005-190 = "[ns]（這麼說來，白子他們還在這個群島的某處……）"
10013005-197 = "哇哇！又有敵襲嗎！？"
10013005-202 = "這次又是誰！？這已經是第6次了耶！？"
10013005-208 = "來～集合～"
10013005-209 = "大家一起和善地登場☆"
10013005-210 = "[s] 「那，那是……！！」"
10013005-212 = "終於找到你們了！「渡假勝地狩獵」的罪魁禍首！"
10013005-213 = "百鬼夜行聯合學園的節慶營運管理部就是你們？#n竟然敢欺騙我們，就在這裡付出代價吧！"
10013005-214 = "沒錯，這就是……正義的裁決。"
10013005-215 = "呵呵☆是「正義」的裁決唷～"
10013005-217 = "那麼，大家。準備好了嗎～？"
10013005-218 = "嗯，要上囉！！"
10013005-220 = "…………咦？"
10013005-221 = "咦咦咦咦咦！？那，那是前輩他們對吧！？"
10013005-227 = "[ns] 「……這到底是怎麼回事……」"
10013005-233 = "這到底……"
10013005-234 = "到底是什麼情況啊啊啊啊啊啊！？"

1004205-14 = "#st;[-1200,-530];serial;60;[wa:300]― 날 [wa:800]위해서…?"
1004205-15 = "#wait;2200"
1004205-16 = "#st;[-1200,-630];serial;60;[wa:50]― ……그렇구나."
1004205-17 = "#wait;5500"
1004205-18 = "#clearST"
1004205-19 = "#st;[-1200,-530];serial;60;[wa:500]― 소중히 간직할게. [wa:2100] "
1004205-20 = "#wait;5500"
1004205-21 = "#clearST"
1004205-22 = "#st;[-1200,-530];serial;60;[wa:1800]― ……굉장히 [wa:1000]기뻐."

[translation]
1004205-1 = "สวนดอกไม้ริมทาง"
1004205-2 = "[ns] \"อรุณสวัสดิ์ อาสึโกะ\""
1004205-3 = "อื้อ อรุณสวัสดิ์ คุณครู"
1004205-4 = "หืม? ในมือถืออะไรมาด้วยน่ะ?"
1004205-5 = "[s] \"เห็นบอกว่าจะปลูกดอกไม้ ครูเลยซื้อมาให้น่ะ\""
1004205-6 = "เอ๋...?"
1004205-9 = "― ดอกไม้นี่นา หรือว่า...[wa:1680] "
1004205-11 = "― คุณครู... ซื้อมาให้ฉันงั้นเหรอ?[wa:650] "
1004205-14 = "― เอามาปลูก...เพื่อฉันเหรอ?[wa:380] "
1004205-16 = "― อย่างนี้นี่เอง...[wa:10] "
1004205-19 = "― ฉันจะรักษาไว้อย่างดีเลย[wa:2120] "
1004205-22 = "― ฉันดีใจมากๆ เลย...[wa:2440] "
1004205-24 = "― ขอบคุณนะ"
1004205-27 = "แต่ว่า... ฉันไม่เคยบอกคุณครูสักหน่อยว่าอยากจัดดอกไม้น่ะ"
1004205-28 = "[s1] \"อะไรนะ...?\"\n[s2] \"งะ...งั้นเหรอ...?!\""
1004205-29 = "อื้อ ฉันบอกว่าอยากทำสวนดอกไม้ต่างหาก"
1004205-30 = "อื้อ ฉันบอกว่าอยากทำสวนดอกไม้ต่างหาก"
1004205-31 = "[s] \"สวนดอกไม้สินะ...\""
1004205-32 = "ดอกไม้ที่คุณครูให้ก็เอามาปลูกที่สวนดอกไม้ไม่ได้... แต่ฉันจะเก็บไว้อย่างดีเลยละ"
1004205-33 = "ฮิฮิ... อื้อ ก็มันเป็นดอกไม้ที่พิเศษสำหรับฉันนี่นา"
1004205-37 = "อ๊ะ สวนดอกไม้อยู่ทางนี้นะ คุณครู"
1004205-42 = "(ตกแต่งสวนดอกไม้อยู่ที่มุมหนึ่งที่มีคนเดินผ่านไปมา)"
1004205-43 = "(ปลูกต้นไม้ลงในสวนดอกไม้)"
1004205-44 = "[ns] \"นี่คือสวนดอกไม้เหรอ?\""
1004205-45 = "อื้อ เพราะเราวางแผนว่าจะอยู่ที่เขตนี้นานๆ "
1004205-46 = "เลยคิดว่าถ้าทำแปลงดอกไม้ไว้คงไม่เป็นไร"
1004205-47 = "ฉันเจอบริเวณที่แสงแดดส่องได้ดี เลยย้ายพวกดอกไม้มาปลูกที่ตรงนี้น่ะ"
1004205-48 = "ฉันเพิ่งเริ่มทำเอง ว่าจะปลูกดอกไม้พวกนี้ทั้งหมดเลยน่ะ"
1004205-49 = "[s] \"ดอกไม้ป่าเหรอ... นี่ดอกไม้อะไรน่ะ?\""
1004205-50 = "ฉันก็ไม่รู้..."
1004205-51 = "[s] \"เอ๋... ไม่รู้เหรอ?\""
1004205-52 = "อื้อ ก็แค่ดอกไม้นั่นละ พวกวัชพืชที่ผลิบานตามที่ต่างๆ ในเมืองเอง ก็อาจจะมีชื่ออยู่เหมือนกันก็ได้#nแต่ฉันไม่รู้หรอก..."
1004205-53 = "แค่รู้สึกว่าถ้าปล่อยเอาไว้ก็อาจจะเหี่ยวเฉาตายไปก็ได้ ก็เลยย้ายมาปลูกที่นี่น่ะ"
1004205-54 = "ฉันคิดว่าถ้ารวบรวมมาปลูกไว้ด้วยกันที่นี่ ให้พวกมันได้หยั่งรากลึกลงไปด้วยกันได้ก็คงดี..."
1004205-55 = "[s] \"งั้นเดี๋ยวครูช่วยนะ\""
1004205-56 = "อื้อ ขอบคุณนะ..."
1004205-57 = "งั้น... ถ้าเจอดอกไม้แถวๆ นี้ ช่วยขุดขึ้นมาพร้อมรากให้หน่อยนะ"
1004205-58 = "[s3] \"เข้าใจแล้ว\"\n[s4] \"ไว้ใจครูได้เลย\""
1004205-59 = "ฉันพูดจริงนะ คุณครู ถ้าตอนขุดไม่ระวัง รากอาจจะขาด แล้วทำให้ต้นไม้ตายได้นะ"
1004205-60 = "ฉันพูดจริงนะ คุณครู ถ้าตอนขุดไม่ระวัง รากอาจจะขาด แล้วทำให้ต้นไม้ตายได้นะ"
1004205-62 = "(คุณครูใช้เวลาทั้งวันเดินหาดอกไม้แถวนั้นแล้วขุดกลับไปให้อาสึโกะ)"

[translation]
1004205-1 = "#title;거리의 화원"
1004205-2 = "[ns] \"좋은 아침. 아츠코.\""
1004205-3 = "3;아츠코;S2_03;응, 좋은 아침. 선생님.\n#3;a\n#3;greeting"
1004205-4 = "3;아츠코;S2_02;……응? 손에 든 건 뭐야?\n#3;em;[?]"
1004205-5 = "[s] \"꽃꽂이를 한다길래, 가져와 봤어.\""
1004205-6 = "3;아츠코;S2_01;……어?"

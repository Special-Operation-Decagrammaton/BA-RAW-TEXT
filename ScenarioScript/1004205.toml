1004205-24 = "#st;[-1200,-630];serial;60;― 고마워."
1004205-25 = "#wait;6000"
1004205-26 = "#all;hide\n#clearST"
1004205-27 = "3;아츠코;S2_02;……그치만, 나 꽃꽂이를 하겠다고 한 적은 없는걸.\n#3;em;[땀]\n#3;a"
1004205-28 = "[s1] \"……뭐?\"\n[s2] \"그, 그랬었나……?!\""
1004205-29 = "3;아츠코;S2_01;응. 화단을 만들려고 했었어."
1004205-30 = "3;아츠코;S2_01;응. 화단을 만들려고 했었어."
1004205-31 = "[s] \"화단이구나…….\""
1004205-32 = "3;아츠코;S2_03;선생님이 준 건 화단에 심을 수 없으니까, 내가 따로 소중히 간직할게."
1004205-33 = "3;아츠코;S2_03;……후후. 응. 이건 특별하니까.\n#3;m2\n#3;em;[음표]"
1004205-34 = "#st;[0,0];instant;1;"
1004205-35 = "#clearST"
1004205-36 = "3;아츠코;S2_03\n#3;greeting\n#wait;1500"
1004205-37 = "3;아츠코;S2_03;자, 화단은 이쪽이야. 선생님."
1004205-38 = "#st;[0,0];instant;1;"
1004205-39 = "#clearST"
1004205-40 = "3;아츠코;S2_03\n#3;dl\n#wait;1500"
1004205-41 = "#all;hide"
1004205-42 = "#na;(사람들이 오가는 거리의 한쪽 구석에 화단이 꾸며져 있었다.)"
1004205-43 = "#na;(화단 군데군데 꽃들이 심어져 있었다.)"
1004205-44 = "[ns] \"이게 화단이야?\""
1004205-45 = "3;아츠코;S2_01;응. 이번에는 이 지역에서 꽤 오랫동안 머물 계획이라고 해서.\n#3;a\n#3;em;…"
1004205-46 = "3;아츠코;S2_01;꽃밭을 만들어도 괜찮겠다고 생각했거든."
1004205-47 = "3;아츠코;S2_03;그래서 햇볕이 잘드는 땅을 찾아서 여기다 들꽃들을 옮겨 심고 있고 있었어."
1004205-48 = "3;아츠코;S2_03;이제 막 시작했거든. 여기를 전부 꽃으로 채워보려고."
1004205-49 = "[s] \"들꽃인가…… 이건 무슨 꽃이야?\""
1004205-50 = "3;아츠코;S2_01;……나도 몰라."
1004205-51 = "[s] \"어…… 모른다고?\""
1004205-52 = "3;아츠코;S2_03;응. 그냥 꽃이야. 도시에 아무렇게나 피어있는 잡초들. 이름 같은 게 있었을지도 모르겠네. 나는 모르지만.\n#3;greeting\n#3;em;[반짝]"
1004205-53 = "3;아츠코;S2_02;그대로 두면 그냥 말라 죽어버렸을 거니까, 여기다가 옮겨 심어두는 거야."
1004205-54 = "3;아츠코;S2_03;이렇게 함께 모여서 땅에 뿌리를 내리게 되면 좋을 것 같다 싶어서."
1004205-55 = "[s] \"그럼 나도 도와줄게.\""
1004205-56 = "3;아츠코;S2_03;……응. 고마워."
1004205-57 = "3;아츠코;S2_03;그럼, 이 근처에 꽃이 보이면 뿌리까지 캐서 여기로 가져다 주면 돼."
1004205-58 = "[s3] \"알겠어.\"\n[s4] \"맡겨달라고.\""
1004205-59 = "3;아츠코;S2_02;조심하지 않으면 안 돼. 뿌리가 상하면 죽어버리니까.\n#3;em;[반응]"
1004205-60 = "3;아츠코;S2_02;조심하지 않으면 안 돼. 뿌리가 상하면 죽어버리니까.\n#3;em;[반응]"
1004205-61 = "#all;hide"
1004205-62 = "#na;(그 뒤로 한동안 거리에 피어있는 꽃들을 찾아다녔다.)"

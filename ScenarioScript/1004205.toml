[translation]
1004205-1 = "Street Garden"
1004205-2 = "[ns] \"Good morning, Atsuko.\""
1004205-3 = "Good morning, Sensei."
1004205-4 = "What is that you're holding?"
1004205-5 = "[s] \"Oh, these? They're for your flower arrangement.\""
1004205-6 = "...For me?"
1004205-9 = "― These flowers... You...[wa:1640] "
1004205-11 = "― ...brought them for me?[wa:970] "
1004205-14 = "― Just for me?[wa:900] "
1004205-16 = "― ...I see.[wa:10] "
1004205-19 = "― I'll treasure it.[wa:2360] "
1004205-22 = "― ...I'm so happy.[wa:2520] "
1004205-24 = "― Thank you."
1004205-27 = "But, Sensei...I never intended to make a flower arrangement."
1004205-28 = "[s1] \"...What?\"\n[s2] \"R-Really...?!\""
1004205-29 = "I told you I wanted to make a flower bed, not an arrangement."
1004205-30 = "I told you I wanted to make a flower bed, not an arrangement."
1004205-31 = "[s] \"Ah... And those are different things.\""
1004205-32 = "Unfortunately, these can't be planted, but I'll treasure them."
1004205-33 = "Heehee. They're special to me."
1004205-37 = "Here, let me show you what I was talking about. This way."
1004205-42 = "A decorative flower bed was planted in the corner of a busy street."
1004205-43 = "Flowers and plants were already growing."
1004205-44 = "[ns] \"This is the flower bed?\""
1004205-45 = "Yes... Saori told me we could stay at this location for longer than usual."
1004205-46 = "I thought I could make a flower bed to pass the time."
1004205-47 = "I found a well-lit spot and have been planting wildflowers."
1004205-48 = "It's a little sparse now, but it'll be filled to the brim soon."
1004205-49 = "[s] \"I can't wait. Is this one a wildflower too?\""
1004205-50 = "...I'm not sure."
1004205-51 = "[s] \"Oh, where did you find it?\""
1004205-52 = "It's a random weed from the city. If it has a name, I don't know it."
1004205-53 = "But...it would have withered away and died if I had left it."
1004205-54 = "I liked the idea of all different kinds of plants finding their home in this soil."
1004205-55 = "[s] \"It's a beautiful sentiment. Can I help?\""
1004205-56 = "...Yes. I would love that."
1004205-57 = "If you see a flower you like, dig up its roots and bring it here."
1004205-58 = "[s3] \"I'll bring pretty ones, like you.\"\n[s4] \"I hope you like my choices.\""
1004205-59 = "I'm being serious, Sensei. It'll die if the roots are damaged, so please be gentle."
1004205-60 = "I'm being serious, Sensei. It'll die if the roots are damaged, so please be gentle."
1004205-62 = "I spent the rest of the day looking for additions for her flower bed."

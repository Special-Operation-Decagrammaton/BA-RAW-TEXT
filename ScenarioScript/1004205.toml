[translation]
1004205-1 = "街邊的花園"
1004205-2 = "[ns]「早安，敦子。」"
1004205-3 = "嗯，早安。老師。"
1004205-4 = "……那是什麼？"
1004205-5 = "[s]「因為聽你說要插花，就帶來了。」"
1004205-6 = "……咦？"
1004205-9 = "― 這束花，難道是……[wa:2200] "
1004205-11 = "― ……你真的，帶來了啊。[wa:1450] "
1004205-14 = "― 是為了我……？[wa:1100] "
1004205-16 = "― ……這樣啊。[wa:90] "
1004205-19 = "― 我會珍惜的，直到永遠。[wa:2600] "
1004205-22 = "― ……真的好開心。[wa:2840] "
1004205-24 = "― 謝謝。"
1004205-27 = "……可是，我沒有說要插花耶。"
1004205-28 = "[s1]「……咦？」\n[s2]「奇怪，你沒說過嗎……！？」"
1004205-29 = "嗯。我想做的是花壇。"
1004205-30 = "嗯。我想做的是花壇。"
1004205-31 = "[s]「是花壇啊……」"
1004205-32 = "雖然這些花不能種在花壇裡，但我會好好珍惜。"
1004205-33 = "呵呵……因為這些花，很特別。"
1004205-37 = "花壇在這裡，老師。"
1004205-42 = "（敦子在人來人往的街道角落，做了一個花壇）"
1004205-43 = "（花壇各處都種滿了花）"
1004205-44 = "[ns]「就是這個花壇？」"
1004205-45 = "嗯。我們預計會暫時待在這區。"
1004205-46 = "我便想說，做個花壇或許不錯。"
1004205-47 = "所以就找個陽光充足的地方，在這裡種花。"
1004205-48 = "雖然才剛開始……但我想把這塊地全部種滿花。"
1004205-49 = "[s]「這朵花叫什麼名字？」"
1004205-50 = "……我也不知道。"
1004205-51 = "[s]「這樣啊，畢竟很難調查呢。」"
1004205-52 = "……普通的花，或是都市裡隨處生長的雜草，或許都有名字，但是我不知道。"
1004205-53 = "放著不管的話它們可能會枯死……所以我才移到這裡。"
1004205-54 = "希望它們能在這裡扎根……"
1004205-55 = "[s]「那我也來幫忙。」"
1004205-56 = "……嗯，謝謝。"
1004205-57 = "那如果老師在這附近有看到花，可以幫我連根挖起帶到這裡嗎？"
1004205-58 = "[s3]「知道了。」\n[s4]「包在我身上吧。」"
1004205-59 = "要小心喔，傷到根部，花就會死掉。"
1004205-60 = "要小心喔，傷到根部，花就會死掉。"
1004205-62 = "（後來，我就到街上四處尋找盛開的花，找了一段時間）"

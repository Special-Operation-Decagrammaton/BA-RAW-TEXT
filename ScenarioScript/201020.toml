201020-125 = "[ns] \"어라? 생텀 타워의 복구는 다 끝난 거 아니었어?\""
201020-126 = "3;린 사복;01;건물의 구조 자체는 모두 복구하긴 했지만…… 생텀 타워의 본질이라 할 수 있는 제어 시스템은 아직 복원할 방법을 찾지 못해 임시방편으로 대체재를 설치해 둔 상태입니다.\n#3;em;[...]\n#3;m3\n#5;dr"
201020-127 = "3;린 사복;02;전에도 말씀드렸지만 생텀 타워의 제어 시스템은 총학생회장만이 다룰 수 있는 초상적인 물건. 이를 유지 보수하는 것과 새로 재건하는 것은 차원이 다른 문제입니다."
201020-128 = "3;린 사복;13;다행히 인프라를 관리할 수 있는 대체 시스템을 확충해 두긴 했지만, 기존 생텀 타워의 제어 능력에 비하면 턱없이 모자란 수준이라……"
201020-129 = "[ns13] (이런. 어느 새 린이 또 업무 모드로 들어가버렸어……)\n[ns14] (빨리 다른 화제로 돌리지 않으면……)"

201020-120 = "3;린 사복;01;이와 관련하여 관리 인력을 증원하고 있으니 너른 양해 부탁드리겠습니다."
201020-121 = "5;노점상인;00;그, 그렇게 말해주니 뭔가 미안해 지는데……\n#5;em;[땀]"

201020-89 = "3;린 사복;02;아니요, 싫어하지는 않습니다."
201020-90 = "3;린 사복;01;다만 평소에는 바쁜 업무 중에 식사를 해야 하니, 빠르고 간단하게 먹을 수 있는 간편식 위주로 식사를 해서요."
201020-91 = "3;린 사복;02;시간이 조금만 지나도 불기 쉬운 국수— 특히 야키소바처럼 바로 볶아서 내는 노점 음식은 먹을 기회가 거의 없었던 것 같습니다.\n#3;em;[반응]"

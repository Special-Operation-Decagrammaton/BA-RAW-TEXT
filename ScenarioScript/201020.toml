[translation]
201020-1 = "第2話;首席行政官の休日（２）"
201020-2 = "連邦生徒会の建物の前"
201020-3 = "（土曜日の朝）"
201020-4 = "（建物の前に立っているリンの姿は――）"
201020-8 = "[ns] \"リン……？\""
201020-9 = "……誤解です。"
201020-10 = "顔を見れば分かります。ですので、誤解です。#nまずは説明をさせてください。"
201020-11 = "[s] \"聞かせてもらいましょう。\""
201020-12 = "今朝、寮で目を覚ました私は、制服に袖を通そうとしました。"
201020-13 = "しかしアオイ――いえ、財務室長が「それでは仕事と変わらない」と言って、#n制服を全部持っていってしまい……。"
201020-14 = "……これを着るしかなかったのです。どうかご了承ください。"
201020-15 = "[s1] \"え、全然いいと思うけど。\"\n[s2] \"よく似合っててかわいいよ。\""
201020-18 = "…………。"
201020-19 = "……重ねて申し上げますが、デートだと思ってはいません。"
201020-20 = "[s] \"大丈夫。私はデートだと思ってるから。\""
201020-21 = "なっ……！"
201020-22 = "はぁ……今のは聞かなかったことにします。"
201020-23 = "全てに反応していたら、それだけで休日が終わってしまいそうですから。"
201020-24 = "……それで、今日のご予定は？"
201020-25 = "[s] \"あれ？行く場所も私が決める感じ？\""
201020-26 = "誘ってくださったのは先生ではないですか。"
201020-27 = "まさか……。"
201020-28 = "ノープランでしたら、帰らせていただきますが――"
201020-29 = "[s3] \"う、ううん！ばっちり計画を立ててきたよ！\"\n[s4] \"地元目線で最高のプランを準備してきたから！\""
201020-32 = "地元目線……。"
201020-33 = "D.U.で生活している時間は私の方が長い気もしますが……。"
201020-34 = "……いえ、先生の視点から見るD.U.を体験するのも、悪くないですね。"
201020-39 = "では、行きましょうか。"
201020-41 = "シラトリ区・旧ラミニタウン外郭路地"
201020-44 = "ここは……？"
201020-45 = "[s5] \"ラミニタウンの食べ歩きスポットだよ。\"\n[s6] \"色んな屋台料理を楽しめる場所だよ。\""
201020-48 = "話に聞いたことはありましたが……これほど賑わっているとは。"
201020-49 = "屋台がたくさん……行列ができているところもありますね。"
201020-50 = "ふむ……警備の人員配置を見直したほうが良さそうです。"
201020-51 = "後ほど、ヴァルキューレに連絡を――"
201020-52 = "[s] \"今日は仕事から離れて欲しいんだけどな……。\""
201020-56 = "おっ、先生。"
201020-57 = "今日も一人かい？飯がまだならうちはどうよ！サービスしてやるぜ！"
201020-58 = "[s7] \"こんにちは。\"\n[s8] \"今日は生徒と一緒なんですよ。\""
201020-61 = "はぁ？おいおい、なんだってラミニに来たんだよ。"
201020-62 = "そういう時は、ちゃんとしたとこに連れてってやりなよ！"
201020-63 = "そりゃあんたは、生徒から大人気の先生なんだろうけどよ。#nだからって露店で食事ってのは、ちとデリカシーに欠けるんじゃないか？"
201020-64 = "そんなんじゃ、生徒に愛想尽かされちまうぜ？"
201020-65 = "[s] \"肝に銘じます……。\""
201020-66 = "（……市民の皆さんとも親しくされているようですね）"
201020-69 = "[ns] \"今日は何がおすすめですか？\""
201020-70 = "そうだな……海鮮焼きそばはどうだい？#n鐘崎港から新鮮なイカをたくさん仕入れてきたんだ。"
201020-71 = "[s] \"じゃあ、それを2つお願いします！\""
201020-72 = "あいよ！毎度あり！"
201020-80 = "あい、おまちどお！海鮮焼きそば2つ！熱いうちに食ってくれな！"
201020-81 = "あ、ありがとうございます。"
201020-85 = "……そういえば、焼きそばを食べるのも久しぶりですね。"
201020-86 = "[s9] \"あっ、ごめん。勝手に注文しちゃった……。\"\n[s10] \"もしかして、焼きそば苦手だった？\""
201020-89 = "いえ、そういうわけでは。"
201020-90 = "ただ、普段は仕事をしながら食べられる手軽なものばかりなので……。"
201020-91 = "こんな風にできたてを食べる機会はほとんどないのです。#nましてや屋台料理ともなればなおのこと。"
201020-92 = "……連邦生徒会長がいた頃は違いましたが。"
201020-93 = "彼女はいくら忙しくても、時間を作っておやつを食べに行くような人でしたから。#n私も一緒に、こういった屋台料理をたくさん食べたものです。"
201020-97 = "美味しい……昔と変わらない、懐かしい味ですね。"
201020-98 = "そりゃあ嬉しいな。最近の生徒の好みは分かりづらくてなぁ。"
201020-99 = "こないだまで激辛が流行ってたかと思えば、最近はとにかくチーズを入れるのが流行りなんだろう？"
201020-100 = "そういうのを見てるとな。やっぱうちもレシピを変えるべきかって悩んでたんだ。"
201020-101 = "変化に適応するのも大切だとは思います。#nですが、変わらない味を守り続けることも同じだけ価値があると思います。"
201020-102 = "……どれだけ変化が激しくとも、思い出の味が恋しくなる時はありますから。"
201020-103 = "そう言ってくれると、もう少し頑張ろうって気にもなるな、はっはっは！"
201020-107 = "……ところで嬢ちゃん、前にもうちの店に来たことあるか？#nなんか見覚えある気がすんだよ。"
201020-108 = "あ、私は……。"
201020-109 = "[s11] \"リンちゃんです！\"\n[s12] \"連邦生徒会の行政官です！\""
201020-110 = "誰が「リンちゃん」ですか。"
201020-112 = "ああ、そういえばクロノスチャンネルで見たことあるな。#n緊急記者会見に出てた連邦生徒会長代行か！"
201020-113 = "おめかししてるもんだから気づかなかったぜ！"
201020-114 = "いえ、これはそういうのではなく――"
201020-115 = "そうだ、話ついでに聞きたいんだけどよ。"
201020-116 = "D.U.の水道に何かあったのかい？たまに調子悪いときがあるんだよ。"
201020-117 = "昨日もいきなり断水してな。店閉めようかと思ったくらいだぜ。"
201020-118 = "ご不便をおかけし、申し訳ございません。"
201020-119 = "インフラを管理しているサンクトゥムタワーの復旧がまだ終わっておらず、#n電気や水道の供給が不安定になるときがあります。"
201020-120 = "管理スタッフを増員するようにはしておりますので、何卒ご容赦ください。"
201020-121 = "あ、いや、そこまで言わせちまうと、なんだか悪ぃね……。"
201020-125 = "[ns] \"サンクトゥムタワーの再建って終わったんじゃないの？\""
201020-126 = "建物の再建は完了しています。#nですが、サンクトゥムタワーの本質である制御システムはまだ復旧が終わっておらず……。#n代替となる機材を並べてその場しのぎを続けているのが現状です。"
201020-127 = "以前にお伝えした通り、サンクトゥムタワーの制御システムは連邦生徒会長のみが扱えるもの。#nこれをメンテナンスするのと、作り直すのは次元の異なる問題です。"
201020-128 = "代替システムで間に合っているのは不幸中の幸いでしたが……。#nサンクトゥムタワー本来の制御能力に比べれば全く足りていない状況でして……。"
201020-129 = "[ns13] （リンが仕事モードに入ってしまった……）\n[ns14] （早く話題を逸らさないと）"
201020-132 = "[ns] \"お腹いっぱいになったし、映画でも観にいかない？\""
201020-133 = "何かおすすめがあるのですか？"
201020-134 = "[s15] \"生徒の間で話題の新作映画が上映されてるんだ。\"\n[s16] \"「シュッポの大冒険」って、聞いたことない？\""
201020-137 = "シュッポといいますと……D.U.道路管理局と交通室主催のデザインコンテストで採用されたワンちゃんのマスコットですね。"
201020-138 = "「モモフレンズ」は公文書には不向きである、という理由で公募をかけたと聞いていますが……。"
201020-139 = "思いのほか反響が芳しくないようで。#n税金の無駄遣いだと各部署からも指摘があがっているそうです。"
201020-140 = "[s17] \"感想は人それぞれなんじゃないかな……？\"\n[s18] \"実際観てみると、また違うかもしれないよ！\""
201020-143 = "ええ。良い機会ですし、映画館で市民の反応を確かめるのも悪くないでしょう。"
201020-144 = "[s] \"仕事から離れようよ……。\""
201020-146 = "（その後もリンはずっと仕事のことを気にしているようで……）"
201020-148 = "D.U.市内の映画館前"
201020-149 = "[ns19] \"意外と真面目な内容だったね……。\"\n[ns20] \"リンはどうだった？\""
201020-152 = "そうですね……。"
201020-153 = "シアターの規模に対して、非常口に続く通路が狭かったように思います。"
201020-154 = "避難の際にボトルネックとなる可能性があります。#n十分なスペースを確保するよう要請しておきます。"
201020-155 = "[s] \"そっち！？\""
201020-157 = "（話を逸らすために街中を歩き回ったものの……）"
201020-159 = "先ほど購入された服、領収書はちゃんともらいましたか？"
201020-160 = "支出を把握するためにも、領収書はまとめておいたほうがいいでしょう。"
201020-161 = "はい？領収書を見られたくない人がいる……？"
201020-162 = "まさか、財務室の役員のことではないですよね？"
201020-165 = "スモモ、今はアオバ中心区に来ています。"
201020-166 = "セイウンタワーは先月に解体される予定だったのでは？#nなぜ残っているのでしょうか。"
201020-167 = "……はい？延期？費用について業者との協議が進んでいない、と。"
201020-168 = "……報告されていませんが。"
201020-169 = "……来週火曜日までに顛末書を提出してください。"
201020-171 = "（リンは連邦生徒会の仕事で、休日を楽しめていない様子だった）"
201020-173 = "[ns21] （あそこに行くつもりはなかったけど……）\n[ns22] （リンを仕事から離させるためには仕方ない！)"
201020-176 = "……先生、ここは？"
201020-178 = "[ns] \"ゲームセンターだよ！\""
201020-180 = "[ns23] \"休日のデートといえば、ゲームセンター！\"\n[ns24] \"ゲームセンターって来たことある？\""
201020-181 = "ですからデートではないと……いえ、もういいです。"
201020-182 = "……ゲームセンター、ですか。初めてきました。"
201020-183 = "いえ、初めてです。"
201020-184 = "[s] \"どうして！？\""
201020-185 = "……縁がなかったので。"
201020-186 = "特段、興味もなかったですし。"
201020-187 = "生活する上でなくても困らなかったものだったので、時間を使おうと思ったことがなかったのです。"
201020-188 = "[s25] \"リンにも不慣れなものがあるってことだね。\"\n[s26] \"じゃあ……。\""
201020-194 = "[ns27] \"『スチューデントファイター2』で勝負だ！\"\n[ns28] \"負けた方が勝った方のお願いを1つ聞くってことで！\""
201020-197 = "はい？なんですか急に。"
201020-198 = "操作法すら知らないのに一体何を……。"
201020-199 = "[s29] \"別に逃げたって構わないよ。\"\n[s30] \"敗北が怖いのなら素直に認めればいい。\""
201020-202 = "見え透いた挑発には乗りませんよ。"
201020-206 = "そもそも、勝敗に賭けを持ち込む理由が分かりません。#n普通に遊べば――"
201020-207 = "はぁ？背負うものがあったほうが真剣になる？"
201020-208 = "大袈裟な……まるで誰かみたいなことを――"
201020-210 = "ねぇねぇリンちゃん！一緒にオセロしない？#n倉庫で見つけたの！"
201020-211 = "じゃあ勝負しよ！負けた方がジュース奢りね！"
201020-212 = "え？だってこうでもしないと適当にするでしょ？"
201020-213 = "リンちゃんの全力を引き出すためにも……勝負だ！"
201020-215 = "うわああ……負けちゃったぁ！"
201020-218 = "……常識の範囲内なら構いません。"
201020-219 = "[s] \"常識の範囲内って……？\""
201020-220 = "文字通りの意味です。ジュースを奢るとか、仕事を代わるとか……。"
201020-221 = "いくら先生とはいえ、非常識な要求はされないと思っていますが。"
201020-225 = "ほどよい報酬があったほうが楽しめるというのも、分からなくはありません。"
201020-226 = "せっかくゲームセンターに来たのですから、1回くらいは付き合いましょう。"
201020-231 = "では、初戦は操作の練習を兼ねて……。"
201020-233 = "<ROUND 1 FIGHT!>"
201020-238 = "なるほど、これでスキルを使って……。"
201020-243 = "……こうすれば攻撃を回避できるのですね。"
201020-244 = "……なるほど。"
201020-246 = "<[USERNAME] WIN!>"
201020-247 = "……続けてください。"
201020-249 = "<ROUND 2 FIGHT!>"
201020-250 = "距離をとって……牽制。"
201020-255 = "下段が隙だらけですね……。"
201020-262 = "<七神リン WIN!>"
201020-263 = "＜FINAL ROUND!>"
201020-268 = "……。"
201020-274 = "…………。"
201020-285 = "<七神リン Perfect!>"
201020-287 = "[ns31] \"ノーダメで……負けた！？\"\n[ns32] \"本当に初めてなの！？\""
201020-290 = "ええ、先程も言いましたよね。初めてです。"
201020-291 = "そもそも、こういったゲーム自体が初めてです。#n慣れれば単純ですね。"
201020-292 = "並行処理の数が少ない分、集中できて簡単でした。#nそれに比べて連邦生徒会の業務は……。"
201020-293 = "[s33] \"恐ろしい才能だね……。\"\n[s34] \"リンには天才ゲーマーの才能があるのかも……。\""
201020-296 = "買い被りすぎです。ゲームと真剣に向き合っている人と比べたら、とても。"
201020-297 = "たとえば――"
201020-301 = "……早速なのですが、先ほどの報酬をいただいてもいいですか？"
201020-302 = "[s35] \"構わないけど……。\"\n[s36] \"人前で……いいの？\""
201020-305 = "何を考えているんですか！"
201020-306 = "はぁ……ついてきてください。"
201020-307 = "久々に、会いたい人がいるんです。"
201020-309 = "次回;クイーンズ・ギャンビット"

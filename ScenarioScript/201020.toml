201020-115 = "5;노점상인;00;참. 그러고보니 총학생회의 사람을 만난 김에 한 가지 물어보고 싶은 게 있는데……"
201020-116 = "5;노점상인;00;요새 D.U.의 수도 시설이 가끔 불안정 하던데 무슨 문제라도 있는 거야?"

201020-112 = "5;노점상인;00;아, 그러고보니 전에 크로노스 채널에서 본 얼굴이잖아? 그 때 긴급 회견 방송에 나왔던 그 총학생회장 대행!\n#5;em;[!]"
201020-113 = "5;노점상인;00;모처럼의 데이트라 그런지, 예쁜 옷을 입고 있어서 몰라봤었네. 하하!"

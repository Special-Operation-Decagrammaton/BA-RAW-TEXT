201020-49 = "3;린 사복;02;골목을 가득 메운 노점상부터 대로변까지 길게 늘어선 사람들의 행렬까지……\n#3;em;[...]"
201020-50 = "3;린 사복;13;……이렇게 유동인구가 많다면 치안 관리나 안전 사고 예방에 인력이 많이 필요하겠네요."

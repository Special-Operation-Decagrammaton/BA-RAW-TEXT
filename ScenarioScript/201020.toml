201020-63 = "3;노점상인;00;아무리 선생이 학생들에게 인기가 많다지만, 노점상에서 점심 식사라니, 너무 무심한 거 아니야?"
201020-64 = "3;노점상인;00;그렇게 눈치 없이 행동하면…… 언젠가는 미운 털이 제대로 박힐 거라고! 하하하!\n#3;hophop\n#3;em;[재잘]"

201020-97 = "3;린 사복;03;……그리운 맛이군요. 전에 먹었던 것과 다르지 않아서 좋네요.\n#3;em;[음표]"
201020-98 = "5;노점상인;00;그래? 그거 반가운 소리군. 요새 학생들은 어떤 맛을 좋아하는지 알기가 어려워서 말이야.\n#5;al\n#3;m1"
201020-99 = "5;노점상인;00;얼마전까지는 무작정 매운 향신료를 넣는 게 유행을 하나 싶더니만, 요즈음은 치즈로 음식을 잔뜩 덮어버리는 게 유행하는 모양이고……\n#5;stiff"
201020-100 = "5;노점상인;00;유행이 너무 빠르게 바뀌고 있어서 나도 슬슬 레시피를 바꾸어야 하는 게 아닌가 고민하던 참이었거든.\n#5;em;[한숨]"
201020-101 = "3;린 사복;01;물론 변화에 적응하는 것도 중요하지만, 변치 않는 가치를 지키고 보존하는 일 또한 중요하다고 생각합니다."
201020-102 = "3;린 사복;99;……빠르게 변화하는 세태 속에서도, 누군가는 변치 않는 과거를 그리워하고 있을지도 모르니까요."
201020-103 = "5;노점상인;00;학생이 그렇게 말해주니 조금은 기운이 나는 구만. 하하핫!\n#5;hophop"

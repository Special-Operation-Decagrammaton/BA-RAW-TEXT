201020-21 = "3;린 사복;11;선생님……!"
201020-22 = "3;린 사복;07;하아…… 방금 하신 그 말씀은 흘려 듣겠습니다.\n#3;em;[한숨]"
201020-23 = "3;린 사복;07;선생님께서 하시는 수많은 농담에 하나하나 반응하다가는 대화를 마치기도 전에 모처럼의 휴일이 끝나버리고 말테니까요."
201020-24 = "3;린 사복;02;……그래서 오늘은 어디로 갈 예정이시지요?"
201020-25 = "[s] \"어라? 장소도 내가 정하는 거였어?\""
201020-26 = "3;린 사복;01;물론입니다. 모처럼의 휴일이니 밖에서 함께 여가를 보내자고 권해주신 건 다름아닌 선생님이셨으니까요."
201020-27 = "3;린 사복;04;혹시 설마……"
201020-28 = "3;린 사복;99;특별히 준비하신 특별한 일정이 없으시다면, 저는 다시 방으로 돌아가겠습니다만—"
201020-29 = "[s3] \"아, 아니야. 그럴 줄 알고 치밀한 계획을 세워왔거든!\"\n[s4] \"현지인의 시선을 바탕으로 최고의 데이트 코스를 준비했지!\""

[translation]
10036020-1 = "ตอนที่ 2;เหตุผลของสควอด"
10036020-3 = "ขอบคุณที่ช่วยในหลายๆ อย่างเลยนะคุณครู เราได้มาเที่ยวกันไกลๆ แบบนี้ก็เพราะคุณครูเลย"
10036020-4 = "ไม่คิดเลยนะว่าจะมีสถานที่อย่างชายหาดนอกกฎหมายอยู่ด้วย"
10036020-5 = "ปกติเรามักจะซ่อนตัวอยู่ตลอด ฉันเลยไม่ชินกับการเดินข้างนอกอย่างเปิดเผยเหมือนคนทั่วๆ ไป#nสักเท่าไรน่ะ"
10036020-6 = "แถมนี่ยังเป็นงานเทศกาลอีก เหมือนเราได้มาอีกโลกอย่างนั้นเลย"
10036020-8 = "ตะ... แต่พวกเราไม่น่าจะมีความสุขได้ง่ายๆ แบบนี้นะคะ...!"
10036020-9 = "ชะ... ชายหาดแห่งนี้คงไม่ใช่กับดักขนาดใหญ่ของวัลคิรี่หรอกใช่มั้ยคะ?"
10036020-10 = "ใช่แน่เลยค่ะ! ฉันว่าพวกนั้นใช้อุบายว่าจะจัดงานเทศกาลเพื่อรวมตัวอาชญากร แล้วรวบให้เกลี้ยงแบบ#nรวดเดียวจบแน่ๆ ค่ะ!"
10036020-11 = "จบสิ้นแล้วค่ะ! สุดท้ายเราจะถูกขังในคุกมืดๆ ของสำนักควบคุมไปจนแก่หง่อมเหรอคะเนี่ย!"
10036020-12 = "ไอศกรีมที่คุณครูซื้อให้คงเป็นอาหารเย็นมื้อสุดท้ายของพวกเราสินะคะ..."
10036020-13 = "[s] \"เดี๋ยวๆ ฮิโยริ อย่ากังวลให้มากเกินไปเลย...\""
10036020-17 = "เราได้ข้อมูลที่แน่ชัดมาว่าจะมีการจัดงานเทศกาลของแก๊งหมวกกันน็อกที่นี่"
10036020-18 = "เห็นว่าเป็นงาน <สหพันธ์แก๊งหมวกกันน็อก>... นี่เป็นงานสเกลใหญ่ที่เตรียมอะไรไว้มากมายเลยนะ"
10036020-19 = "เท่าที่ฉันพอรู้ ทางวัลคิรี่ไม่มีกำลังพอที่จะสร้างกับดักที่ยิ่งใหญ่ขนาดนี้ได้หรอก"
10036020-20 = "งะ... งั้นเหรอคะ? งั้นฉันก็สบายใจได้ใช่มั้ยคะ?"
10036020-21 = "ก็... แค่ตอนนี้น่ะนะ"
10036020-23 = "อื้อ คุณครูไม่มีทางพาพวกเรามาในที่ที่อันตรายหรอก"
10036020-24 = "ใช่มั้ยล่ะ คุณครู?"
10036020-25 = "[s] \"แน่นอนอยู่แล้ว\""
10036020-26 = "ฮุฮุ น่าเชื่อถือจังเลยนะ"
10036020-27 = "[s1] \"ไหนๆ ก็ได้มาแล้ว ขอให้ทุกคนสนุกกับเทศกาลกันนะ\"\n[s2] \"มาสนุกให้เต็มที่ไปเลยนะ อาสึโกะ ฮิโยริ มิซากิ\""
10036020-30 = "ขอบคุณนะคุณครู เราไปเที่ยวสนุกในงานเทศกาลกันเถอะ ถ่ายรูปกันไว้เยอะๆ ด้วยนะ"
10036020-31 = "แหะ... แหะๆ ถ้างั้นก็ช่วยไม่ได้นะคะ ฉันคงต้องไปกินยากิโซบะกับข้าวโพดที่ร้านริมทะเลแล้วละค่ะ... อ๊ะ แล้วก็ต้องกินน้ำแข็งไสเป็นของหวานด้วย ช่วยไม่ได้นะคะเนี่ย... แหะๆ"
10036020-32 = "ฉันไม่เห็นชอบบรรยากาศโหวกเหวกแบบนี้เลย แล้วก็ไม่ได้สนใจงานเทศกาลด้วย..."
10036020-33 = "แต่ถ้าอาสึโกะกับฮิโยริชอบ ฉันก็คงต้องอยู่เที่ยวด้วยน่ะนะ"
10036020-34 = "นอกจากร้านริมทะเลที่ฮิโยริพูดถึง ฉันได้ยินว่ามีการประกวดก่อปราสาททราย การเล่นเกมปืนฉีดน้ำ#nเซอร์ไววัล แล้วก็โชว์จากดีเจด้วยนะ"
10036020-35 = "[s] \"บอกว่าไม่สนใจงานเทศกาล แต่ข้อมูลแน่นมากเลยนะ?\""
10036020-36 = "ฉันก็แค่ต้องละเอียดถี่ถ้วน เพราะตอนนี้ฉันเป็นผู้นำชั่วคราวของสควอดน่ะ"
10036020-40 = "เพราะงั้นก็หยุดยิ้มเยาะกันแบบนั้นได้แล้ว...! อาสึโกะก็ด้วย!"
10036020-41 = "ฮุฮุ มาสนุกด้วยกันเถอะนะ มิซากิ"
10036020-42 = "อึก..."
10036020-43 = "[s3] \"เราไปเดินดูรอบๆ กันก่อนมั้ย?\"\n[s4] \"เราไปเดินดูก่อนมั้ยว่ามีอะไรในงานบ้าง?\""
10036020-46 = "อื้ม ไปกันเถอะคุณครู"
10036020-47 = "แหะๆ ในที่สุดก็ได้มาเที่ยวงานเทศกาลนะคะ..."
10036020-48 = "เฮ้อ..."
10036020-51 = "นี่คือร้านอาหารกลางแจ้งสินะ กลิ่นหอมเตะจมูกจัง เหมือนจะมีของอร่อยอยู่เยอะเลยนะ"
10036020-52 = "เราเข้าไปกินอะไรในร้านนี้กันมั้ย คุณครู? "
10036020-53 = "[s] \"เอาสิ แล้วมิซากิกับฮิโยริล่ะ ว่าไง?\""
10036020-54 = "ฉะ... ฉันก็เอาด้วยค่ะ! แหะๆ จะได้กินของอร่อยๆ แล้วสินะ..."
10036020-55 = "เดี๋ยวก่อน..."
10036020-59 = "มีอะไรเหรอ มิซากิ? ขยี้ตาทำไม...?"
10036020-60 = "ฉันมองไม่ผิดแน่..."
10036020-61 = "อาสึโกะ ฮิโยริ ดูนั่นสิ คนที่ยืนเสิร์ฟอยู่ในร้าน...!"
10036020-63 = "ขนมปังปิ้งกับไข่ดาวที่สั่งได้แล้วค่ะ กินให้... ไม่สิ ทานให้อร่อยนะคะ"
10036020-64 = "หืม? ฉันบอกว่าขอไข่ดาวไม่สุกไม่ใช่เหรอ แต่นี่มันสุกหมดแล้วนะ!"
10036020-65 = "ไข่แดงสุกจนแข็งแบบนี้ ใครจะไปกินลงเล่า! ไปเปลี่ยนมาใหม่เลยนะ!"
10036020-66 = "งะ... งั้นเหรอ?! ขอโทษที ช่วยรอหน่อยก็แล้วกันนะ!"
10036020-67 = "พวกเราสั่งไปเกิน 30 นาทีแล้วนะ ทำไมยังไม่ได้อาหารอีกล่ะคะ! ฉันหิวจนไส้กิ่วหมดแล้วค่ะ!"
10036020-68 = "ดะ... เดี๋ยวฉันไปตามให้นะ!"
10036020-69 = "เราไม่ได้สั่งเมนูนี้นะคะ เอามาเสิร์ฟผิดจานหรือเปล่า?"
10036020-70 = "ขอโทษนะ! ฉันจะไปดูให้เดี๋ยวนี้เลย!"
10036020-82 = "ซัตจังนี่นา..."
10036020-87 = "ทำไมพี่ซาโอริถึงมาอยู่ที่นี่ล่ะ...? แล้วยังแต่งตัวแบบนั้นอีก..."
10036020-88 = "[s] \"คิดไม่ถึงเลยนะว่าซาโอริจะมาอยู่ที่นี่...\""
10036020-89 = "..."
10036020-90 = "ให้ตายสิ มาทำอะไรของเขากันนะ..."
10036020-91 = "ซาโอ..."
10036020-97 = "อุ๊บส์?!"
10036020-98 = "ชู่ว อย่าเพิ่งส่งเสียง ไปหลบหลังเสาต้นนี้กันก่อนเถอะ"
10036020-99 = "คุณครูก็ด้วยนะ"
10036020-103 = "[ns5] \"มีเรื่องอะไรเหรอ อาสึโกะ?\"\n[ns6] \"ระ... เราไม่ควรให้เห็นเหรอ?!\""
10036020-107 = "ฉันว่าเราไม่ควรเข้าไปขัดจังหวะน่ะ..."
10036020-108 = "ตอนนี้โจมาเอะ ซาโอริกำลังค้นหาตัวเองอยู่"
10036020-110 = "ว่าไงนะคะ? เหมือนว่าพี่เขาลุกลี้ลุกลนเพราะทำงานบริการไม่เป็นมากกว่านะคะ...?"
10036020-111 = "..."
10036020-113 = "อืม ถึงจะดูเงอะงะไปบ้าง แต่ซัตจังก็กำลังค้นหาตัวเองอย่างน่าชื่นชมอยู่นะ"
10036020-114 = "เธอต้องทำงานจนเหงื่อหยดระหว่างที่เผชิญหน้ากับตัวเองอย่างจริงจัง"
10036020-115 = "ฉันคิดว่าเราไม่ควรเข้าไปรบกวนซัตจังที่กำลังพยายามอยู่อย่างนั้นนะ"
10036020-117 = "แต่แค่เข้าไปทักทาย ก็คงไม่เป็นไรนี่คะ? ได้มาเจอกันแบบนี้ทั้งทีมันน่าดีใจออก..."
10036020-119 = "ไม่ได้หรอก ถ้าพวกเราออกไปให้เห็น ซัตจังก็ต้องมาใส่ใจพวกเราน่ะสิ ก็ซัตจังใจดีกับเรานี่นา"
10036020-120 = "เพราะงั้นพวกเราก็คอยเฝ้ามองอยู่จากไกลๆ กันเถอะ ซัตจังจะได้ใช้เวลากับการค้นหาตัวเองได้อย่าง#nเต็มที่ไง"
10036020-122 = "ค่ะ ค่ะ... นั่นสินะคะ... ตอนนี้พี่ซาโอริก็ดูงานยุ่งมากๆ ด้วย..."
10036020-123 = "ถ้าเข้าไปทักทาย คงจะทำให้งานยุ่งกว่าเดิมไปกันใหญ่นะ..."
10036020-125 = "แล้วคุณครูล่ะคิดว่ายังไง?"
10036020-126 = "[s] \"ถ้าทุกคนคิดแบบนั้น ครูก็จะซ่อนตัวด้วยอีกคน\""
10036020-127 = "ฮุฮุ เหมือนเรากำลังทำปฏิบัติการลับเลยนะ"
10036020-128 = "ไหนๆ ก็ได้เจอกันแล้วทั้งที ถ้าจะให้ไปกันดื้อๆ เลยมันก็น่าเสียดายแย่ งั้นฉันขอเก็บภาพซัตจังที่ตั้งใจ#nทำงานไว้สักหน่อยแล้วกัน"
10036020-130 = "ไหนว่าต้องไม่ให้หัวหน้าจับได้ไงล่ะ?"
10036020-132 = "ก็ใช่ ฉันเลยจะเนียนๆ เข้าไปในร้านแบบนี้ แล้วก็..."
10036020-133 = "[s] \"แล้วก็คงถูกจับได้แน่ๆ...\""
10036020-134 = "นี่เป็นภาพที่หาดูได้ยากของซัตจังเลยนะ ฮุฮุ"
10036020-135 = "จะถ่ายละนะ"
10036020-140 = "แชะ! ฮุฮุ ซัตจังดูงานล้นมือเลยนะ"
10036020-141 = "ถะ... ถ้าถูกจับได้ขึ้นมา พี่ซาโอริจะไม่โกรธเป็นฟืนเป็นไฟเอาเหรอคะ...?"
10036020-142 = "โกรธก็โกรธไปสิ"
10036020-143 = "ไหนดูซิ"
10036020-144 = "ดูสีหน้าที่สดใสของซัตจังสิ"
10036020-145 = "รูปออกมาดีกว่าที่คิดนะคะ..."
10036020-146 = "ถึงจะเป็นกล้องรุ่นเก่า แต่ก็ยังถ่ายรูปได้ดีเลยนะ"
10036020-148 = "แน่นอนอยู่แล้วละ พอได้ยินว่าจะมาเที่ยวชายหาดกัน ฉันก็ไปซื้ออะไหล่กล้องมาจากตลาดมืดเลยนะ"
10036020-149 = "ต้องถ่ายออกมาให้ได้สวยๆ แบบนี้ละ"
10036020-150 = "ได้มาเก็บภาพความทรงจำที่ชายหาดกันแบบนี้ แหะ... แหะๆ มันดูเกินตัวพวกเรามากเลยนะคะ..."
10036020-151 = "เอาละๆ ออกไปจากที่นี่กันดีกว่า"
10036020-152 = "ขืนอยู่นานกว่านี้ ซัตจังอาจจะมาเห็นเข้าก็ได้นะ"
10036020-153 = "เข้าใจแล้ว"
10036020-154 = "ค่ะ ค่ะ...!"
10036020-159 = "คุณครู..."
10036020-160 = "[s] \"หืม?\""
10036020-161 = "ฉันอยากช่วยซัตจังน่ะ"
10036020-162 = "ถึงจะเข้าไปช่วยด้วยตัวเองไม่ได้ แต่อย่างน้อย... ฉันก็อยากให้ซัตจังได้สนุกกับงานเทศกาลด้วย"
10036020-163 = "เราเจอเรื่องลำบากด้วยกันมาตลอด ฉันเลยอยากให้ฤดูร้อนนี้เป็นช่วงเวลาที่ดีของซัตจัง"
10036020-164 = "ฉันคงเป็นเหมือน... บัดดี้ลับๆ ของซัตจังน่ะ"
10036020-165 = "[s] \"บัดดี้เหรอ... ไม่ได้ยินคำนี้มานานเลยแฮะ...\""
10036020-166 = "หืม? แต่ฉันเพิ่งได้รู้จักคำนี้เมื่อไม่นานเองนะ ได้ยินมาว่ามันเป็นเหมือนกับเทวดาผู้พิทักษ์น่ะ"
10036020-167 = "เพราะงั้นคุณครูพอจะช่วยหน่อยได้มั้ย?"
10036020-168 = "[s] \"ได้แน่นอนอยู่แล้ว มาหาวิธีช่วยกันเถอะ\""
10036020-169 = "ขอบคุณนะ ฉันกะไว้แล้วว่าคุณครูต้องช่วยได้"
10036020-170 = "เอาละ เรารีบไปกันเถอะ มิซากิกับฮิโยริคงจะรอกันแล้ว"
10036020-172 = "(หลังจากนั้นคุณครูก็เดินชมงานเทศกาลกับอาสึโกะ มิซากิ และฮิโยริ...)"
10036020-173 = "(และได้รู้ว่าตัวเองทำกระเป๋าสตางค์หล่นหายไปสักที่ในงาน)"
10036020-176 = "[ns] \"แย่ละสิ เมื่อกี้เหมือนจะทำหล่นตรงนี้นะ...\""
10036020-186 = "[ns] \"น่าจะทำกระเป๋าสตางค์หล่นแถวๆ นี้นี่นา\""
10036020-188 = "นี่ กำลังหาอันนี้อยู่รึเปล่า?"
10036020-189 = "[s] \"?\""
10036020-191 = "ฉันทำงานอยู่แล้วเจอกระเป๋าสตางค์ตกอยู่แถวนี้น่ะ... แล้วก็ดูเหมือนคุณกำลังตามหาอะไรบางอย่าง#nท่าทางร้อนรนเลยด้วย"
10036020-192 = "ฉันว่านี่อาจจะเป็นของที่ตามหาอยู่..."
10036020-196 = "[ns] \"ซะ... ซาโอริ?!\""
10036020-197 = "ครู [USERNAME]...! ทำไมถึงมาอยู่ที่นี่ได้น่ะ?"
10036020-198 = "[s] \"พะ... พอดีว่า... มีงานนิดหน่อย...\""
10036020-199 = "อืม นั่นสินะ ครูคงมาลาดตระเวน เผื่อว่าจะมีนักเรียนที่บาดเจ็บอยู่ในชายหาดสินะ"
10036020-200 = "ถึงจะคาดไม่ถึง แต่ก็ใช่ว่าจะเป็นเรื่องที่เกิดขึ้นไม่ได้"
10036020-201 = "เอาเป็นว่า ดีใจที่ได้เจอนะครู ที่ผ่านมาสบายดีมั้ย?"
10036020-202 = "[s] \"อื้ม ซาโอริก็ดูจะสบายดีเหมือนกันนะ\""
10036020-203 = "ต้องขอบคุณความเอาใจใส่ของครูน่ะ"
10036020-204 = "ฉันได้เรียนรู้หลายๆ อย่างจากครู หมู่นี้ก็เลยรับภารกิจนู่นนี่ทำอยู่น่ะ"
10036020-205 = "ที่ฉันมา <ชายหาดนอกกฎหมาย> วันนี้ก็เพราะถูกว่าจ้างมาทำภารกิจเหมือนกัน"
10036020-206 = "เรื่องนั้นช่างมันเถอะ..."
10036020-210 = "...!"
10036020-211 = "ครู หลบมาทางนี้!"
10036020-229 = "คงเดินผ่านไปแล้วสินะ..."
10036020-230 = "ขอโทษที่ดึงตัวเข้ามากะทันหันนะครู"
10036020-231 = "[s7] (อ๊ะ ซาโอริเห็นสมาชิกคนอื่นแล้วเหรอ...)\n[s8] \"ไม่เข้าไปทักทายหน่อยเหรอ...?\""
10036020-234 = "อาสึโกะ มิซากิ ฮิโยริ... นานแล้วนะที่ฉันไม่ได้เห็นหน้าทุกคน"
10036020-235 = "ใช่ว่าฉันจะไม่ดีใจหรอกนะ ต้องบอกว่าอยากเข้าไปทักทายและไถ่ถามสารทุกข์สุกดิบมากกว่าด้วยซ้ำ"
10036020-236 = "แต่ฉันคงไม่มีสิทธิ์ทำแบบนั้น..."
10036020-237 = "[s] \"...\""
10036020-238 = "ต่อให้ครูไม่พูด ฉันก็รู้ดี ครูคงจะบอกว่าสิทธิ์อะไรนั่นไม่สำคัญใช่มั้ยล่ะ"
10036020-239 = "แต่ว่า... ฉันคิดว่าตัวเองยังไม่พร้อมน่ะ"
10036020-240 = "ฉัน... ไม่กล้ายืนต่อหน้าทุกคนในสภาพที่ไม่สง่าผ่าเผยแบบนี้หรอก"
10036020-241 = "ถึงอาสึโกะ มิซากิ กับฮิโยริจะบอกว่ายอมรับฉันได้ ไม่สิ ต่อให้ไม่พูดออกมา ทุกคนก็คงยอมรับฉันอยู่#nแล้ว..."
10036020-242 = "แต่ฉันอนุญาตให้ตัวเองปรากฏตัวต่อหน้าทุกคน... เหมือนกับไม่มีอะไรเกิดขึ้นเลยไม่ได้หรอก"
10036020-243 = "ฉันเลยอยากให้เราได้เจอกันทีหลัง... อยากให้เป็นหลังจากนี้อีกหน่อยน่ะ"
10036020-244 = "ถึงแม้นี่จะเป็นความต้องการที่เห็นแก่ตัวของฉัน..."
10036020-245 = "แต่ถ้าฉันถูกเจอตัว... แล้วโดนชี้นิ้วประนามว่าไม่ได้เรื่อง ฉันก็คงปฏิเสธไม่ได้น่ะ"
10036020-246 = "[s] \"ซาโอริ...\""
10036020-247 = "ถึงจะดูหน้าไม่อาย... แต่ฉันขออะไรอย่างหนึ่งนะครู"
10036020-248 = "[s] \"ขออะไรเหรอ?\""
10036020-249 = "ทั้งอาสึโกะ มิซากิ และฮิโยริ... คงได้มาทะเลกันเป็นครั้งแรก"
10036020-250 = "ครูก็คงจะรู้ดีว่าตอนพวกเราอยู่ที่โรงเรียนอาเรียส ที่แบบนี้น่ะเราแค่ได้ยินผ่านหูกันเท่านั้น"
10036020-251 = "เพราะงั้น... ฉันก็เลยอยากให้ทุกคนมีช่วงเวลาดีๆ ในฤดูร้อน"
10036020-252 = "อยากให้ได้กินของอร่อยๆ... ได้วิ่งเล่น... อ้อ ที่นี่จะมีโชว์จากดีเจด้วยนะ"
10036020-253 = "นี่เป็นงานเทศกาลที่แก๊งหมวกกันน็อกตั้งใจเตรียมกันมากๆ มันต้องออกมาสนุกแน่"
10036020-254 = "เพราะงั้น ฝากครูดูแลอาสึโกะ มิซากิ และฮิโยริ และให้ทุกคนได้เพลิดเพลินกับฤดูร้อนนี้ด้วยนะ"
10036020-255 = "ฉันติดหนี้บุญคุณครูอยู่มากแล้วก็จริง แต่ตอนนี้คนที่ฉันขอความช่วยเหลือได้ก็มีแต่ครูคนเดียว"
10036020-256 = "สิ่งที่ฉันช่วยได้ก็คงจะเป็นการซ่อนตัวไม่ให้ทุกคนเห็น"
10036020-257 = "แล้วฉันจะตั้งใจเตรียมงานเทศกาลให้ทุกคนสนุกกันด้วย เพราะงั้น..."
10036020-258 = "[s9] \"เข้าใจแล้ว ไม่ต้องห่วงนะ\"\n[s10] \"ครูไม่คิดปฏิเสธคำขอร้องของซาโอริหรอก\""
10036020-261 = "ขอบคุณนะครู ฉันจะไม่ลืมบุญคุณครั้งนี้เลย"
10036020-262 = "นี่! หมดเวลาพักแล้วนะ หายหัวไปไหนเนี่ย!"
10036020-263 = "ขอโทษนะครู ฉันเองก็อยากอยู่คุยนานกว่านี้..."
10036020-264 = "[s] \"ไม่เป็นไรหรอก ไว้ครูจะติดต่อไปนะ\""
10036020-265 = "อื้ม ขอบคุณนะครู"
10036020-274 = "เด็กๆ พวกนั้นควรจะสนุกกับงานเทศกาล... แต่ฉันก็หวังว่าครูเองก็จะได้สนุกไปด้วยนะ"

[translation]
10036020-1 = "Episode 2;The Squad's Situation"
10036020-3 = "Many thanks for all your help, Sensei. We wouldn't have made it here if it weren't for you."
10036020-4 = "Outlaw Beach. Who knew this place even existed?"
10036020-5 = "I've rarely ever walked about in the open like this."
10036020-6 = "And in the middle of a festival, no less. This seems like a different world to me."
10036020-8 = "Seems too good to be true, if you ask me."
10036020-9 = "What if this whole thing is a Valkyrie sting operation?"
10036020-10 = "They could be trying to lure us in and then grab us all at once!"
10036020-11 = "We're screwed! The Corrections Bureau's going to lock me up until I'm a grandma!"
10036020-12 = "That ice cream Sensei got me is going to be my last meal..."
10036020-13 = "[s] \"Hey now, Hiyori, don't worry so much.\""
10036020-17 = "We have reliable info that the Helmet Gang festival is genuine."
10036020-18 = "To be specific, they're calling it the \"Helmet Gangster Grand Alliance Gathering.\" And it's going to be big. Very big. They've been preparing for it all over the place."
10036020-19 = "The Valkyries just wouldn't have the numbers to pull off a sting on that scale."
10036020-20 = "R-Really? So...we can relax?"
10036020-21 = "...Well, for now."
10036020-23 = "Not only that, but Sensei would never bring us anywhere dangerous."
10036020-24 = "Would you, Sensei?"
10036020-25 = "[s] \"Of course I wouldn't.\""
10036020-26 = "Heehee! There you have it. We're in safe, reliable hands."
10036020-27 = "[s1] \"I want everyone to enjoy themselves here.\"\n[s2] \"Atsuko, Hiyori, Misaki, everybody have fun.\""
10036020-30 = "Thank you, Sensei. Let us all enjoy the festival together, and take a multitude of pictures while we're here."
10036020-31 = "O-Okay, we need Yakisoba, we need corn from the Beach Shack, some shaved ice for dessert... Heehee..."
10036020-32 = "I don't care much about festivals, or big, noisy places in general..."
10036020-33 = "But I'll play along for Atsuko and Hiyori's sake."
10036020-34 = "FYI, there's the Beach Shack Hiyori mentioned, plus the sand castle contest, a water gun survival game, and a DJ somebody hired."
10036020-35 = "[s] \"For someone who doesn't care, you've done your homework.\""
10036020-36 = "I'm the acting leader of the Squad. Being thorough is part of my job."
10036020-40 = "...So stop smiling like that! You too, Atsuko!"
10036020-41 = "Heehee, come now, Misaki, you deserve a bit of fun yourself."
10036020-42 = "Tch..."
10036020-43 = "[s3] \"Shall we walk around a bit first?\"\n[s4] \"Let's go check it all out.\""
10036020-46 = "Yes. Let's be off, Sensei."
10036020-47 = "Heehee... A festival, finally..."
10036020-48 = "*sigh*"
10036020-51 = "An outdoor restaurant. *sniff* Mmm, quite an aroma. And look at all that delicious food."
10036020-52 = "What do you think, Sensei? Should we sample it?"
10036020-53 = "[s] \"Sounds good. Misaki, Hiyori, what do you think?\""
10036020-54 = "W-Works for me! Heehee, finally something good to eat..."
10036020-55 = "...Hold up."
10036020-59 = "What's wrong, Misaki? Why are you rubbing your eyes like that...?"
10036020-60 = "...That's her, all right."
10036020-61 = "Atsuko, Hiyori, look over there. At the \"waitress\"..."
10036020-63 = "Here you are. Toast and fried eggs. I hope you find it acceptable."
10036020-64 = "Hm? I asked for runny yolk. This is fully cooked!"
10036020-65 = "This is too dry. I can't eat this! Get me what I ordered!"
10036020-66 = "Oh, I-I'm sorry. Please wait just a moment!"
10036020-67 = "A \"moment\"? I've been waitin' half an hour already! Where's my food? I'm starvin'!"
10036020-68 = "I-I'll get right to you!"
10036020-69 = "I think you gave me the wrong order!"
10036020-70 = "I'm sorry! On my way over there right now!"
10036020-82 = "It's Sao-Sao..."
10036020-87 = "Why is she here...? And...why is she dressed like that?"
10036020-88 = "[s] \"Saori...\""
10036020-89 = "..."
10036020-90 = "Just what is going on with her...?"
10036020-91 = "[s] \"Hey, Sao—\""
10036020-97 = "Mmph?!"
10036020-98 = "Shh, hold on a moment. Both of you, quiet down and hide here with me."
10036020-99 = "You as well, Sensei."
10036020-103 = "[ns5] \"What is it, Atsuko?\"\n[ns6] \"A-Are we not supposed to get found out?!\""
10036020-107 = "...I don't think we ought to trouble her."
10036020-108 = "This is part of her self-discovery."
10036020-110 = "Looks to me like she's just running around and messing up."
10036020-111 = "..."
10036020-113 = "Even so, mistakes are a part of how we find ourselves."
10036020-114 = "Sweating through our work, facing ourselves in all seriousness."
10036020-115 = "Aside from that, she's working extremely hard, and needs no distractions from us."
10036020-117 = "Couldn't we at least go say hi? It's not every day we just bump into her like this..."
10036020-119 = "No, that would make her think of us, rather than herself."
10036020-120 = "Let us watch her from afar, so she can keep her focus where it belongs for now."
10036020-122 = "Y-Yeah, okay, I guess... She is pretty busy."
10036020-123 = "...Yeah, she's got it rough as it is."
10036020-125 = "What do you think, Sensei?"
10036020-126 = "[s] \"If we all agree, I can stay out of sight too.\""
10036020-127 = "Heehee, and so begins our spy mission."
10036020-128 = "But I would like to take a picture of her. It's rare to see her in such a state. One would be remiss to let it pass unmarked."
10036020-130 = "What happened to \"watching from afar\"?"
10036020-132 = "I only need to get a BIT closer..."
10036020-133 = "[s] \"You're going to get caught doing that...\""
10036020-134 = "This is such a precious sight, I have to commemorate it. Heehee."
10036020-135 = "Here goes nothing."
10036020-140 = "Say cheeeese. Heehee. Her demeanor is positively frenetic."
10036020-141 = "What if she catches us and gets all mad?"
10036020-142 = "Then she'll be mad. So what?"
10036020-143 = "Now how did the picture come out...?"
10036020-144 = "Oh, her face looks so vivid."
10036020-145 = "That did come out pretty well."
10036020-146 = "Not bad, for an older camera."
10036020-148 = "You like it? As soon as I heard we were going to the beach, I pieced it together myself. The Black Market had all the parts I needed."
10036020-149 = "And it's just what I need here."
10036020-150 = "Yeah. We're making memories, and now we can take them with us. "
10036020-151 = "All that said, I do suggest we fall back."
10036020-152 = "If we linger, she WILL spot us."
10036020-153 = "Right."
10036020-154 = "O-Okay!"
10036020-159 = "...Sensei?"
10036020-160 = "[s] \"Hm?\""
10036020-161 = "I only wish I could help Saori."
10036020-162 = "There's little I could do, but if nothing else, I would like to help her enjoy her time here at the festival."
10036020-163 = "We've shared so much adversity together. She deserves a warm summer."
10036020-164 = "...Hmm. Did they have \"manito\" when you were in school, Sensei? Secret friends who aided their chosen subject without being seen?"
10036020-165 = "[s] \"Ha, I haven't heard that word in a long time, but yes.\""
10036020-166 = "Yes, they're rather like invisible guardian angels. I wish to be one for Saori."
10036020-167 = "Can you help me achieve that, Sensei?"
10036020-168 = "[s] \"Of course. Let's look for ways to help her.\""
10036020-169 = "Thank you, Sensei. I knew I could count on you."
10036020-170 = "Now, on with it. Misaki and Hiyori have waited for us long enough."
10036020-172 = "Afterwards, I went around the festival site with Atsuko, Misaki, and Hiyori..."
10036020-173 = "...and realized I'd dropped my wallet somewhere."
10036020-176 = "[ns] \"I must have dropped it right around here...\""
10036020-186 = "[ns] \"Hrm, I don't see it anywhere...\""
10036020-188 = "Excuse me, are you looking for this, by any chance?"
10036020-189 = "[s] \"Hmm?\""
10036020-191 = "I found this wallet earlier, while I was working...and you looked like you were trying to find something."
10036020-192 = "So I thought you might be looking for..."
10036020-196 = "[ns] \"S-Saori?!\""
10036020-197 = "[USERNAME] Sensei...! What are you doing here?"
10036020-198 = "[s] \"Well, it's kind of a long story...\""
10036020-199 = "I see. Well, I'm sure you were on some kind of patrol, in case a student was hurt at the beach."
10036020-200 = "Which is always a possibility, I suppose."
10036020-201 = "In any case, it's good to see you. Are you well?"
10036020-202 = "[s] \"Yeah. It looks like you've been doing pretty well yourself.\""
10036020-203 = "Thanks to you, Sensei."
10036020-204 = "I've been taking on commissions lately, like you've taught me, and I've more or less made ends meet with them."
10036020-205 = "That's what brought me here to Outlaw Beach, actually."
10036020-206 = "In any case—"
10036020-210 = "*gasp*"
10036020-211 = "Sensei, come here!"
10036020-229 = "...Never mind. They're gone."
10036020-230 = "Sorry for...pulling you like that, Sensei."
10036020-231 = "[s7] \"(Saori must have spotted them too.)\"\n[s8] \"Are you hiding from them?\""
10036020-234 = "It's been a while since I've seen their faces. Atsuko, Misaki, Hiyori..."
10036020-235 = "It's not that I don't want to see them. In fact, I want to walk up to them and say hello, to see how they've been."
10036020-236 = "...But I don't have the right to do that."
10036020-237 = "[s] \"...\""
10036020-238 = "You don't have to say it, Sensei. I'm sure you'd say I don't need a \"right\" to do that."
10036020-239 = "But...I don't think I'm ready yet."
10036020-240 = "I don't have the heart to stand in front of them. Not when I can't hold my head high."
10036020-241 = "Even if they say they'd accept me... I'm sure they'd mean it..."
10036020-242 = "...but to show up in front of them like nothing happened... I can't let myself do that."
10036020-243 = "So I'd rather not show my face. For now."
10036020-244 = "...Does that sound selfish?"
10036020-245 = "Sometimes, I just don't know what to say for myself."
10036020-246 = "[s] \"Saori...\""
10036020-247 = "...Hmm. Sensei? Pardon my impudence, but I have a request to make."
10036020-248 = "[s] \"What kind of request?\""
10036020-249 = "Well, it's their very first trip to the beach."
10036020-250 = "Back at Arius Academy, we'd hear about places like this, but...well, we'd never see them."
10036020-251 = "So...I want to protect their summer, as it were."
10036020-252 = "I want them to enjoy the food, have fun outside...oh, and apparently, there's a DJ."
10036020-253 = "The Helmet Gangsters spared no expense. There's an abundance of entertainment here, for everyone."
10036020-254 = "So my request is: please help the three of them enjoy it."
10036020-255 = "I already owe you more than one, but right now, you're the only person I can ask for help."
10036020-256 = "And I'll help as well, as long as I can do it without being seen."
10036020-257 = "I'll make sure everything's all ready for them. I won't miss a thing. So..."
10036020-258 = "[s9] \"Consider it done.\"\n[s10] \"I could never turn down a request from you.\""
10036020-261 = "Thanks, Sensei. I won't forget it."
10036020-262 = "Hey! Where are you? Break time's over!"
10036020-263 = "Sorry, Sensei. I'd love to talk a bit more, but..."
10036020-264 = "[s] \"It's fine. I'll message you later.\""
10036020-265 = "Thank you again."
10036020-274 = "And...I hope you enjoy the festival too."

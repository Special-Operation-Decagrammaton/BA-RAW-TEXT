[translation]
10036020-1 = "第2話;那支小隊的情況"
10036020-3 = "謝謝你答應我們這個困難的請求，老師。#n多虧有老師在，我們才能來到這麼遠的地方。"
10036020-4 = "不法者海灘……沒想到會有這樣的地方啊。"
10036020-5 = "我們平時一直躲躲藏藏的，#n像現在這樣光明正大地走在路上，反而讓人覺得有點不自在呢。"
10036020-6 = "而且竟然還有慶典，總覺得就像來到了另一個世界一樣。"
10036020-8 = "可，可是幸福不可能突然降臨在我們身上吧……！"
10036020-9 = "會，會不會這整個海灘都是女武神設下的巨型陷阱？"
10036020-10 = "肯定是這樣沒錯！他們打算拿慶典當誘餌，把所有犯罪者聚集起來一網打盡！"
10036020-11 = "完蛋了！我們八成會被關在矯正局的黑暗監獄裡，直到變成駝背的老太太……！"
10036020-12 = "而老師買給我的這支冰淇淋，就是我最後的晚餐……"
10036020-13 = "[s]「好了好了，日和，你不要那麼悲觀嘛……」"
10036020-17 = "頭盔團要在這裡舉辦慶典的情報應該不會有錯。"
10036020-18 = "雖然嚴格來說應該叫做「頭盔團聯歡會」……#n除了規模相當大之外，準備也做得很充分。"
10036020-19 = "據我所知，女武神應該沒有能力設置這種規模的陷阱才對。"
10036020-20 = "真，真的嗎？所以可以放心了嗎？"
10036020-21 = "……大概吧。"
10036020-23 = "老師他不會帶我們到危險的地方的。"
10036020-24 = "你說對吧，老師？"
10036020-25 = "[s]「當然。」"
10036020-26 = "呵呵，老師果然很可靠。"
10036020-27 = "[s1]「難得有機會參加慶典，希望大家都能玩得盡興。」\n[s2]「敦子、日和、美咲，你們三個都是。」"
10036020-30 = "謝謝你，老師。#n那我們就一起享受慶典吧，順便也要多拍一些照片。"
10036020-31 = "耶，耶嘿嘿。既然這樣，肯定得在海之家吃炒麵和玉米……#n啊，還要吃個刨冰當甜點……"
10036020-32 = "雖然我不喜歡吵雜的地方，對慶典也沒什麼興趣……"
10036020-33 = "不過既然敦子跟日和喜歡，我就配合一下吧。"
10036020-34 = "除了日和剛才說的海之家以外，#n我聽說他們還準備了堆沙堡比賽、水槍大賽和DJ表演。"
10036020-35 = "[s]「以一個沒興趣的人來說，你調查得還挺真仔細呢……？」"
10036020-36 = "我現在姑且算是小隊的臨時隊長，不謹慎一點怎麼行。"
10036020-40 = "……所以你們少在那邊偷笑了！敦子，你也是！"
10036020-41 = "呵呵，美咲也來一起享受吧？"
10036020-42 = "哼……"
10036020-43 = "[s3]「那我們先隨意逛逛吧？」\n[s4]「要不要先把慶典會場繞一圈看看？」"
10036020-46 = "嗯，我們走吧，老師。"
10036020-47 = "耶嘿嘿……終於能參加慶典了……"
10036020-48 = "……唉。"
10036020-51 = "是戶外餐廳呢。#n有股很香的味道，感覺會有很多好吃的料理。"
10036020-52 = "老師，怎麼樣？要不要嘗嘗看？"
10036020-53 = "[s]「好啊。美咲跟日和覺得呢？」"
10036020-54 = "我，我也贊成！#n耶嘿嘿，終於能吃到好吃的食物了……"
10036020-55 = "……等等。"
10036020-59 = "怎麼了，美咲？#n為什麼要一直揉眼睛……"
10036020-60 = "……我果然沒看錯。"
10036020-61 = "敦子、日和，你們看那邊。#n那個穿梭在桌子間送餐的服務生……！"
10036020-63 = "這是您點的吐司和荷包蛋。#n請趕緊……更正，請您慢用。"
10036020-64 = "嗯？這顆蛋根本熟透了嘛，我明明說過要半熟蛋的！"
10036020-65 = "這麼乾要我怎麼吃啊！快幫我換成我點的半熟蛋！"
10036020-66 = "是，是嗎！？抱歉，麻煩稍等我一下！"
10036020-67 = "都過30分鐘了怎麼還不上菜啊！我們都快餓死了耶！"
10036020-68 = "我，我馬上過去處理！"
10036020-69 = "我們這邊好像上錯菜了！"
10036020-70 = "對不起！馬上來！"
10036020-82 = "是沙醬……"
10036020-87 = "沙織姐怎麼會在這裡……？#n而且他那副模樣究竟是……"
10036020-88 = "[s]「沒想到沙織會在這裡……」"
10036020-89 = "……"
10036020-90 = "真是的，跑來這種地方做什麼啊……"
10036020-91 = "沙──"
10036020-97 = "呃唔！？"
10036020-98 = "噓，你們兩個都先安靜地躲到這根柱子後面。"
10036020-99 = "還有老師也是。"
10036020-103 = "[ns5]「怎麼了，敦子？」\n[ns6]「被，被發現會怎麼樣嗎！？」"
10036020-107 = "……我覺得最好還是不要打擾他比較好。"
10036020-108 = "畢竟錠前沙織正在尋找自我。"
10036020-110 = "是嗎？可是看起來明明一臉慌張，不知道該怎麼辦才好耶……？"
10036020-111 = "……"
10036020-113 = "嗯，雖然看起來有點手忙腳亂，但他的確在揮汗工作的同時……"
10036020-114 = "認真地摸索並檢視自我。"
10036020-115 = "所以我們還是不要打擾沙醬比較好。"
10036020-117 = "只是打個招呼應該沒關係吧……？#n畢竟我們也不是天天都能碰到他……"
10036020-119 = "不，如果看到我們出現的話，他一定會很在意我們的。#n因為沙醬是個善良的人。"
10036020-120 = "所以為了讓沙醬能專注在自己身上，我們還是遠遠地看著他吧。"
10036020-122 = "嗯，嗯……說的也是……#n畢竟沙織姐現在正忙個不停……"
10036020-123 = "……就算我們不過去，他現在也已經夠忙的了。"
10036020-125 = "老師，你覺得呢？"
10036020-126 = "[s]「既然大家都這麼想的話，我也跟你們一起躲起來吧。」"
10036020-127 = "呵呵，就像在執行祕密作戰一樣呢。"
10036020-128 = "不過難得能碰到沙醬，就這樣走掉好像有點可惜。#n我得把沙醬工作的樣子紀錄下來才行。"
10036020-130 = "不是說不能被隊長發現嗎？"
10036020-132 = "嗯，所以要偷偷地靠近餐廳……"
10036020-133 = "[s]「這樣會被發現的……」"
10036020-134 = "平時想看到沙醬這個樣子還不容易呢，呵呵。"
10036020-135 = "那我要拍囉。"
10036020-140 = "起～司。#n呵呵，真是忙碌的沙醬。"
10036020-141 = "要，要是被沙織姐發現的話……他肯定會很生氣的吧……？"
10036020-142 = "真的發生再來想辦法吧。"
10036020-143 = "來看看照片吧。"
10036020-144 = "嗯，沙醬的表情很生動。"
10036020-145 = "拍得比我想像中還好……"
10036020-146 = "雖然是台老相機，功能還挺不錯的呢。"
10036020-148 = "那當然。這可是我在聽說要來海邊玩之後，特地跑去黑市找零件組裝的相機。"
10036020-149 = "要是不能好好運作，我可是會很傷腦筋的。"
10036020-150 = "竟然能在海邊拍照留念……#n耶嘿嘿，對我們來說真是奢侈的享受呢……"
10036020-151 = "好了好了，我們先離開這邊吧。"
10036020-152 = "要是待太久的話，沙醬說不定會發現我們的。"
10036020-153 = "收到。"
10036020-154 = "是，是……！"
10036020-159 = "……老師。"
10036020-160 = "[s]「嗯？」"
10036020-161 = "我果然還是想幫上沙醬的忙。"
10036020-162 = "就算沒辦法親自過去……也希望至少能讓他好好享受這場慶典。"
10036020-163 = "畢竟他跟我們在一起的時候吃了不少苦頭，所以我希望能守護沙醬的夏天。"
10036020-164 = "就像……嗯，就像「守護天使」一樣。"
10036020-165 = "[s]「我好久沒有聽到這個詞語了……」"
10036020-166 = "嗯？這是我最近學到的詞。#n聽說就跟「小天使小主人」的遊戲很類似。"
10036020-167 = "你願意幫忙嗎，老師？"
10036020-168 = "[s]「當然，我們來想想辦法吧。」"
10036020-169 = "謝謝你，老師果然願意幫助我們呢。"
10036020-170 = "那我們快點出發吧，美咲跟日和都在等我們了。"
10036020-172 = "（之後便和敦子、美咲、日和一起在慶典會場隨處逛逛……）"
10036020-173 = "（結果途中不小心把錢包弄丟了）"
10036020-176 = "[ns]「真糟糕，應該是掉在這附近啊……」"
10036020-186 = "[ns]「怎麼都沒看到……」"
10036020-188 = "你在找這個嗎？"
10036020-189 = "[s]「？」"
10036020-191 = "我剛才工作的時候，在附近撿到了這個錢包。#n看你好像一直著急地在找什麼東西的樣子……"
10036020-192 = "如果我猜的沒錯，你在找的──"
10036020-196 = "[ns]「沙，沙織！？」"
10036020-197 = "[USERNAME]老師……！#n你怎麼會在這裡？"
10036020-198 = "[s]「那，那個……因為正好有點事……」"
10036020-199 = "這樣啊……也對。#n畢竟你是老師，來海邊看看有沒有學生受傷也是理所當然的。"
10036020-200 = "雖然多少有點吃驚，不過仔細想想這也是合情合理的事。"
10036020-201 = "總之很高興見到你，老師。#n最近過得好嗎？"
10036020-202 = "[s]「嗯，沙織看起來也過得不錯呢。」"
10036020-203 = "這都要感謝老師的幫忙。"
10036020-204 = "我最近按照老師的教導，到處以接委託的方式維生。"
10036020-205 = "今天之所以來到「不法者海灘」，也是因為這個原因。"
10036020-206 = "話說回來──"
10036020-210 = "……！"
10036020-211 = "老師，先過來這邊！"
10036020-229 = "……好像走了。"
10036020-230 = "抱歉剛才突然把你拉過來，老師。"
10036020-231 = "[s7]（啊，沙織好像也發現了那些孩子……）\n[s8]「你果然……是在躲著他們嗎？」"
10036020-234 = "敦子、美咲、日和……真是好久沒見到孩子們了。"
10036020-235 = "我其實沒有不想見到他們的意思，反而很想過去跟他們打聲招呼……"
10036020-236 = "……但我沒有資格那麼做。"
10036020-237 = "[s]「……」"
10036020-238 = "我明白，老師肯定想說「資格什麼的根本不重要」對吧？"
10036020-239 = "不過……我認為現在的自己還沒有準備好。"
10036020-240 = "現在的我……還沒有能好好面對孩子們的勇氣。"
10036020-241 = "就算敦子、美咲跟日和願意接納──#n不，雖然孩子們肯定不會拒我於門外……"
10036020-242 = "但要我裝作若無其事地出現在他們面前……我心裡實在無法接受。"
10036020-243 = "所以見面的事……我希望能夠等到下次，或者是更久以後再說。"
10036020-244 = "……或許這也是我的任性吧。"
10036020-245 = "不過只有這樣……當有人指責我很沒用的時候，我才能欣然接受。"
10036020-246 = "[s]「沙織……」"
10036020-247 = "……老師，我知道這麼做很厚臉皮，但有件事希望能拜託你。"
10036020-248 = "[s]「是什麼事呢？」"
10036020-249 = "敦子、美咲跟日和……孩子們應該都是第一次見到大海吧？"
10036020-250 = "老師你也知道，我們以前在奧利斯分校的時候，根本不可能有機會來這種地方。"
10036020-251 = "因此……我想守護孩子們的夏天。"
10036020-252 = "讓他們盡情地吃美食、輕鬆愉快地玩耍……啊，當然還有DJ表演。"
10036020-253 = "頭盔團花了很多心思準備這場慶典，一定會很有趣的。"
10036020-254 = "所以希望老師能助我一臂之力，讓敦子、美咲跟日和能開心地度過今年的夏天。"
10036020-255 = "我明白自己已經欠了老師很多人情，不過這件事只能拜託你了。"
10036020-256 = "只要不用露面，我也會盡力幫忙。"
10036020-257 = "一定會確保這場慶典萬無一失，讓孩子們可以好好享受。#n所以……"
10036020-258 = "[s9]「我明白了。」\n[s10]「我是不可能拒絕沙織的請求的。」"
10036020-261 = "謝謝你，老師。#n我不會忘記這份恩情的。"
10036020-262 = "喂！休息時間已經結束了，還不趕快回來！"
10036020-263 = "對不起，老師。#n本來還想多聊聊的……"
10036020-264 = "[s]「沒關係。沙織有需要的時候隨時可以聯絡我。」"
10036020-265 = "嗯，謝謝你，老師。"
10036020-274 = "除了孩子們之外……也希望老師能好好享受這場慶典。"

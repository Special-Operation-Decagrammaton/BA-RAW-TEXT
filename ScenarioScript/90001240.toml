[translation]
90001240-1 = "#title;제24화;희망"
90001240-2 = "#wait;2500"
90001240-3 = "[ns] \"뭔가, 복도가 끝도 없이 이어지는 느낌이네…….\""
90001240-4 = "3;리오 동복;02;그렇게 느끼는 것도 무리는 아닐 거야. 종자 보관 섹터에 도달하기까지, 외부의 영향을 최소한으로 받을 수 있도록 긴 터널을 건설한 것이니까.\n#3;a\n#3;em;[...]"
90001240-5 = "3;리오 동복;01;이 터널을 모두 지나가면, 컨트롤 룸이 있을 거야."
90001240-6 = "2;모모이 동복;02;어라? 회장, 그런 건 어떻게 알아?\n#2;a\n#2;jump\n#2;em;[?]\n#3;m4"
90001240-7 = "3;리오 동복;02;이 구조물이 만들어진 방식은…… 밀레니엄에서 활용하는, 보관소의 건설 양식과 매우 유사해."
90001240-8 = "2;모모이 동복;02\n5;히마리 방한복;01;네. 저도 느꼈어요. 이건 확실히 '밀레니엄 방식'이네요.\n#3;m2\n#5;al\n#5;em;[반응]\n#2;dl"
90001240-9 = "3;리오 동복;99;하지만 내가 알고 있는 범위 안에서, 밀레니엄에서 이런 건축물을 지었다는 기록은 없어. 그렇다면……."
90001240-10 = "5;히마리 방한복;02;이 시드 볼트는 일종의 '외주' 형태로 건축되었다는 뜻인가요, 리오?\n#5;em;[?]"
90001240-11 = "3;리오 동복;01;그래. 그게 가장 합리적인 추론이겠지."
90001240-12 = "5;히마리 방한복;02\n3;리오 동복;02;아무튼, 여기는 앞에서도 이야기했던 것이지만.\n#3;m3\n#5;dr"
90001240-13 = "3;리오 동복;02;만일 전 세계적 규모의 대재앙이 닥쳤을 때, 이후 살아남은 인류가 생존하려면 어떻게 해야 할까, 같은 고민에서 시작된 건축물이야."
90001240-14 = "3;리오 동복;01;그래서 최후의 날 저장고라고도 하는 모양이고."
90001240-15 = "3;히마리 방한복;06;누구인지는 몰라도, 참 치밀한 괴짜네요. 저는 그야말로 괴담이나 뜬소문 같은 것일 줄로만 알았는데요.\n#3;em;[한숨]\n#3;closeup"
90001240-16 = "3;히마리 방한복;05;아무튼 그 괴짜가 인류의 마지막의 마지막…… 같은 것을 상정하고 있었다는 것만은 알겠어요. 도대체 어떤 사람이었을까요?\n#3;closeup"
90001240-17 = "3;리오 동복;09;나는, 조금 이해가 갈 것 같기도……."
90001240-18 = "3;히마리 방한복;99;…….\n#3;em;[...]"
90001240-19 = "3;히마리 방한복;02;다 좋다 치고, 그런 뜻을 가지고 이 시설을 지을 수는 있었겠지만 말이죠."
90001240-20 = "3;히마리 방한복;05;정작 사후 관리도 AI에 모두 맡겨버리고, 위치를 제대로 알리지도 않았잖아요?"
90001240-21 = "3;히마리 방한복;02;정말 만에 하나 그 사람이 걱정했던 일이 진짜로 일어난다면, 누가 이 위치와 건물에 대해 알고 이곳을 찾아올 수 있었을까요?\n#3;em;[땀]"
90001240-22 = "3;히마리 방한복;99;그런 걸 생각해 보면, 그 사람도 의외로 부주의한 면이 있었던 것은 확실해 보여요."
90001240-23 = "3;히마리 방한복;01;아니면 정말로, 그저 변덕에 의해 이런 것을 만들었던가요."
90001240-24 = "1;케이 AMAS;02;그게 아니라면, 발견되기만을 기다리고 있었던 것일지도 모르죠.\n#1;ar\n#1;em;[반응]\n#3;m5"
90001240-25 = "1;케이 AMAS;01;마치, 씨앗처럼요."
90001240-26 = "#all;hide"
90001240-27 = "3;히마리 방한복;02;씨앗?\n#3;closeup\n#3;em;[?]"
90001240-28 = "3;리오 동복;02;씨앗?\n#3;closeup\n#3;em;[?]"
90001240-29 = "3;아리스 동복;01;……?"
90001240-30 = "3;아리스 동복;05;……!!!\n#3;shake"
90001240-31 = "3;아리스 동복;03;그렇군요, 케이! 케이도 드디어 생명이라는 것에 대해 알아 가기 시작했군요!\n#3;em;[!]"
90001240-32 = "2;케이 AMAS;04\n3;아리스 동복;03\n#2;a\n#3;m4\n#2;h\n#na;케이 AMAS;……? 아, 아뇨. 거기까지는 아니고요. 그냥 이 건물과 씨앗이라는 게 어딘가 비슷해 보인다는 생각이 들어서……."
90001240-33 = "2;케이 AMAS;04;어쨌든, 그 뭐냐, 씨앗이라는 건 하나하나마다 식물 한 포기, 한 그루의 가능성이 숨어 있는 것이잖아요? 그래서…….\n#2;em;[땀]"
90001240-34 = "2;케이 AMAS;04\n3;아리스 동복;07;그럼요, 그럼요!\n#3;hophop\n#3;em;[재잘]"
90001240-35 = "2;케이 AMAS;04\n3;아리스 동복;07\n#2;h\n#3;h"
90001240-36 = "[ns] \"그럼, 그럼.\""
90001240-37 = "2;케이 AMAS;19\n3;아리스 동복;07\n#2;em;[///]\n#2;shake\n#2;h\n#na;케이 AMAS;아리스는 그렇다 치고, 당신은 뭘 또 흐뭇한 표정 같은 거나 짓고 있는 겁니까–!!!"
90001240-38 = "#all;hide"
90001240-39 = "3;리오 동복;02;그리고, 누구도 알지 못하고 있었다는 것은 사실이 아니야."
90001240-40 = "3;리오 동복;08;적어도 나는, 어렴풋하게나마 알고 있었잖아?\n#3;em;[반짝]"
90001240-41 = "5;히마리 방한복;02\n3;리오 동복;08\n#5;al\n#3;m2\n#5;h\n#na;히마리 방한복;그러면 그 괴짜는 리오 당신과 동급이라는 뜻인가요."
90001240-42 = "5;히마리 방한복;02\n3;리오 동복;99;그럴지도 모르지. 만나게 된다면 이야기가 통할 수도 있겠어."
90001240-43 = "5;히마리 방한복;11\n3;리오 동복;99\n#5;em;[빠직]\n#5;h\n#na;히마리 방한복;그런 뜻으로 한 말이 아니라……! 아뇨, 됐어요. 저는 적어도 그런 괴짜는 세상에 한 명으로 충분하다고 생각해요……."
90001240-44 = "5;히마리 방한복;11\n3;리오 동복;02;무슨 뜻이야?\n#3;em;[?]"
90001240-45 = "5;히마리 방한복;06\n3;리오 동복;02\n#na;히마리 방한복;……당신은 지금 그대로 이미 충분하다는 뜻이에요…….\n#5;h"

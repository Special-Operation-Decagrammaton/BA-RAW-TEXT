90001240-74 = "4;아인;04;티, 티페 쨩이……! 탐색전을 결정, 했어요……!\n#4;a\n#4;stiff\n#4;em;[땀]"
90001240-75 = "2;소프;02;좋은 판단이네. 어쨌든 적의 역량을 가늠하는 것은, 필요한 일이니까.\n#2;a\n#2;em;[...]"
90001240-76 = "3;오르;01;그리고 잘하면, 그때 어떻게 그 에너지장을 돌파했던 것인지, 이제 알 수도 있을 것 같고요.\n#3;a\n#2;m1\n#4;m5"

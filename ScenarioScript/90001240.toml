[translation]
90001240-1 = "第24話;希望"
90001240-3 = "[ns]「總覺得走廊好像一直向前延伸，看不到盡頭……」"
90001240-4 = "會有這種感覺是很正常的。#n為了盡量減弱外來因素對種子保管區域的影響，建造者刻意將隧道設計得特別長。"
90001240-5 = "穿過這條隧道之後，就會抵達控制室了。"
90001240-6 = "咦？會長你怎麼會知道？"
90001240-7 = "這座建築物的建造方式……和千年使用的保管所非常相似。"
90001240-8 = "嗯，我也注意到了。#n這的確是「千年風格」沒錯。"
90001240-9 = "不過就我所知，千年從來沒有建造過這種建築……至少紀錄上是如此。#n也就是說……"
90001240-10 = "這座種子保管所……可能是以「委外」的方式建成的嗎，莉央？"
90001240-11 = "是啊，這應該是最合理的推論了。"
90001240-12 = "總之，就跟之前說過的一樣。"
90001240-13 = "這棟建築物是出於「當世界規模的災難降臨後，倖存的人類該如何生存」──#n這樣的危機意識建造而成。"
90001240-14 = "所以也被稱為末日儲藏庫吧。"
90001240-15 = "雖然不清楚建造者是誰，不過他還真是個深謀遠慮的怪人呢。#n我本來還以為這只是都市傳說或謠言罷了。"
90001240-16 = "不過由此可知，這個怪人的確考慮到了人類的末日……而且做了一些準備吧。#n他究竟是個什麼樣的人呢？"
90001240-17 = "我好像多少能理解他的用意……"
90001240-18 = "……"
90001240-19 = "就算假設他建造這座設施的理念真是如此……"
90001240-20 = "實際上那個人卻只將後續的管理完全交給AI，也並未公開設施的所在位置不是嗎？"
90001240-21 = "萬一某天他擔心的事情真的發生，又有誰會知道這棟建築物的存在並找到這裡來呢？"
90001240-22 = "這麼一想，或許那個人也有粗心大意的一面……"
90001240-23 = "又或者只是一時心血來潮而建了這棟建築也說不定。"
90001240-24 = "或者他也有可能──只是靜靜等待著這個地方被人發現而已。"
90001240-25 = "就像種子一樣。"
90001240-27 = "種子？"
90001240-28 = "種子？"
90001240-29 = "……？"
90001240-30 = "……！！！"
90001240-31 = "原來如此啊，Kei！#nKei也終於開始理解生命是怎麼回事了呢！"
90001240-32 = "……？不，不是的。並沒有到那種程度。#n我只是覺得這棟建築和種子有點相似……"
90001240-33 = "怎麼說呢……每顆種子之中，不是都蘊藏著各式各樣的可能性嗎？#n所以……"
90001240-34 = "嗯，就是這樣！"
90001240-36 = "[ns]「沒錯沒錯。」"
90001240-37 = "愛麗絲也就算了，你為什麼要跟著一臉欣慰啊──！！！"
90001240-39 = "我必須補充一下……「根本沒人知道」的說法並不符合事實。"
90001240-40 = "至少我個人是略知一二的。"
90001240-41 = "或許那個怪人，和莉央你有點類似也說不定呢。"
90001240-42 = "這也不無可能。#n假如我們能見到彼此的話，說不定還挺聊得來的。"
90001240-43 = "我不是那個意思……！#n唉，算了。那種怪人，世界上有一個就夠了……"
90001240-44 = "什麼意思？"
90001240-45 = "意思是現在有你就夠了……"
90001240-46 = "至少在治療我的低血壓方面……！"
90001240-55 = "怎，怎麼了！？"
90001240-56 = "燈突然熄滅了……是停電之類的嗎？#n可是……！"
90001240-61 = "等一下……"
90001240-62 = "好像有什麼東西正在包圍我們……？"
90001240-68 = "這，這這這，這是什麼！？"
90001240-69 = "唔，唔啊啊啊……！"
90001240-70 = "[ns]「大家先冷靜下來！然後……！」"
90001240-71 = "……！"
90001240-72 = "優先保護老師！"
90001240-74 = "提，提法醬……！決定展開偵察戰了……！"
90001240-75 = "是個明智的判斷。#n反正總是得先掌握敵人的戰力。"
90001240-76 = "如果順利的話，說不定還能弄清楚他們當時是如何突破能量場的。"
90001240-77 = "可，可可可可，可是這樣下去的話，要是把設施弄壞怎麼辦……？"
90001240-78 = "這點應該不需要擔心吧？#n我不認為那是提法瑞特樂見的情況……畢竟那樣就無法繼續保管跟儲存種子了嘛。"
90001240-79 = "嗯，我也覺得它在適當偵查後就會撤退了。"
90001240-80 = "當然如果能在偵查的過程中，稍微幫我們掃除一點麻煩就更好了！"

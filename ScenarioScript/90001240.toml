[translation]
90001240-1 = "Episode 24;Hope"
90001240-3 = "[ns] \"This hallway is endless.\""
90001240-4 = "A reasonable reaction to the intended design. This tunnel was built to prevent any kind of interference with its purpose: seed preservation."
90001240-5 = "There should be a control room we can access at the end."
90001240-6 = "Huh? How do you know all this, Ms. Rio?"
90001240-7 = "The structure's design... It's very similar to our own storage facilities' designs."
90001240-8 = "Yes, I did notice that the building was very reminiscent of Millennium."
90001240-9 = "However, there's no record of such a building anywhere in our archives."
90001240-10 = "Do you mean to imply that this seed vault's construction may have been contracted out?"
90001240-11 = "Yes. That would be the most logical conclusion."
90001240-12 = "So as I was saying."
90001240-13 = "This structure was humanity's response to fears surrounding our ability to survive in the event of a global catastrophe."
90001240-14 = "Which is how it gained its alternative moniker, the Doomsday Vault."
90001240-15 = "We can't point fingers at anyone, but its creator must have been both meticulous and inexorably strange. This sounds like the basis for a horror movie or ridiculous rumor."
90001240-16 = "The best I can fathom this stranger's intention is that they were preparing for...the last of the last of humanity. Which begs the question of their overall disposition..."
90001240-17 = "Well, I-I can understand it...a little..."
90001240-18 = "..."
90001240-19 = "Fine. Then they built this facility with this peculiar vision in mind."
90001240-20 = "But then they proceeded to entrust its management to an AI program and buried its location?"
90001240-21 = "What, then, would happen if something happened to them? Not a single soul in this world would know of its existence, let alone be able to find it."
90001240-22 = "From that perspective, the seed vault's creator was surprisingly careless."
90001240-23 = "...Or perhaps this whole thing was simply a mindless whim."
90001240-24 = "Or maybe it's been waiting to be found."
90001240-25 = "Just like a seed."
90001240-27 = "A seed?"
90001240-28 = "A seed?"
90001240-29 = "...?"
90001240-30 = "...!!"
90001240-31 = "Yes, Kei! That is correct! You are at last learning about what a \"life\" is!"
90001240-32 = "N-No...? That's not what I meant. I just thought...well, this building resembles a seed, does it not?"
90001240-33 = "Anyways, how do I say this, within each seed is its potential to become a plant, or a tree, right?"
90001240-34 = "Yes, yes!"
90001240-36 = "[ns] \"Yes, yes.\""
90001240-37 = "I'll excuse Aris, but YOU! Wipe that proud smile off your face right now!"
90001240-39 = "I'd like to say, it's not necessarily true that this facility's existence was completely unknown."
90001240-40 = "I may have just had a vague concept of it, but I knew about it, right?"
90001240-41 = "All that means is that you and this strange individual are kindred spirits, Rio."
90001240-42 = "Perhaps, if the two of us had been able to meet, we would've come to a mutual understanding."
90001240-43 = "That was not what I was trying to say at all! *sigh* Never mind. At the very least, I'm relieved I'm only forced to deal with one of your kind in this lifetime."
90001240-44 = "What does that mean?"
90001240-45 = "...It means you're fine just as you are..."
90001240-46 = "F-Fine for treating my low blood pressure, that is!"
90001240-55 = "Wh-What happened?"
90001240-56 = "A blackout...? Did the power supply fail?!"
90001240-61 = "Hold on..."
90001240-62 = "W-We're being surrounded...?"
90001240-68 = "Wh-Wh-Wh-Wh-What are these?!"
90001240-69 = "U-UWAAAH!!!"
90001240-70 = "[ns] \"Everyone, calm down! And...!\""
90001240-71 = "...!"
90001240-72 = "Prioritize Sensei's safety!"
90001240-74 = "T-Tiphy has...d-decided to engage in a reconnaissance mission!"
90001240-75 = "Good job, Tiphy. Good job. This is a necessary step in understanding the enemy's capabilities."
90001240-76 = "If fortune smiles on us, we'll learn just how it was they were able to break through our energy field back then."
90001240-77 = "B-B-B-B-But what if they break the facility?"
90001240-78 = "Nah, that won't happen. Tiphareth wouldn't let it. After all, how is it going to store and preserve seeds if the facility breaks down?"
90001240-79 = "Yes, yes. It'll do its reconnaissance, then fall back in an orderly fashion."
90001240-80 = "And if this makes them even one smidge easier to handle, then so be it!"

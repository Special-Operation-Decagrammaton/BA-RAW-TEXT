[translation]
90001240-1 = "ตอนที่ 24;ความหวัง"
90001240-3 = "[ns] \"รู้สึกเหมือนทางเดินนี้ไม่มีที่สิ้นสุดเลยนะ...\""
90001240-4 = "ไม่แปลกหรอกที่จะรู้สึกอย่างนั้น เพราะมีการสร้างอุโมงค์ยาวก่อนจะไปถึงส่วนที่มีการเก็บรักษา#nเมล็ดพันธุ์ไว้ นั่นก็เพื่อให้ได้รับผลกระทบจากภายนอกให้น้อยที่สุด"
90001240-5 = "ถ้าผ่านอุโมงค์นี้ไปได้ เราก็จะเจอห้องควบคุม"
90001240-6 = "เอ๋? ประธานรู้เรื่องนี้ได้ยังไงเหรอ?"
90001240-7 = "รูปแบบของสิ่งปลูกสร้างแห่งนี้... มันคล้ายกับรูปแบบการสร้างที่ใช้กันในมิลเลเนียมน่ะ คล้ายกันมากๆ เลยด้วย"
90001240-8 = "ค่ะ ฉันเองก็รู้สึกแบบนั้นค่ะ นี่คือ 'วิถีของมิลเลเนียม' อย่างไม่ต้องสงสัยค่ะ"
90001240-9 = "แต่เท่าที่ฉันรู้ ไม่เคยมีบันทึกว่าในมิลเลเนียมเคยสร้างสิ่งปลูกสร้างแบบนี้ ถ้าเป็นอย่างนั้น..."
90001240-10 = "ก็หมายความว่าคลังเก็บเมล็ดพันธุ์แห่งนี้ถูกสร้างขึ้นโดย 'การจ้างคนภายนอก' งั้นเหรอคะ ริโอะ?"
90001240-11 = "อืม นั่นคงเป็นการอนุมานที่สมเหตุสมผลที่สุดน่ะ"
90001240-12 = "แต่ก็อย่างที่ฉันพูดไปก่อนหน้านี้"
90001240-13 = "ว่าสิ่งปลูกสร้างแห่งนี้เริ่มมาจากความกังวลที่ว่า ถ้าเกิดหายนะระดับโลก เราต้องทำอย่างไรเพื่อให้#nมนุษยชาติที่ยังเหลืออยู่มีชีวิตอยู่รอดต่อไปได้"
90001240-14 = "นั่นคือเหตุผลที่ที่แห่งนี้มีอีกชื่อว่า 'โกดังวันสิ้นโลก'"
90001240-15 = "ถึงจะไม่รู้ว่าใครสร้างไว้ แต่ก็ช่างเป็นคนประหลาดที่รอบคอบจริงๆ เลยนะคะ ฉันนึกว่านี่เป็นแค่เรื่อง#nลึกลับหรือข่าวลือเสียอีกค่ะ"
90001240-16 = "เท่ากับว่าคนประหลาดคนนั้นประเมินว่ามนุษยชาติต้องเจอจุดจบหรืออะไรทำนองนั้น... เขาเป็นคนยังไงกันนะคะ?"
90001240-17 = "ฉันเหมือนจะเข้าใจนิดหน่อยนะ..."
90001240-18 = "..."
90001240-19 = "ไม่ว่าจะเป็นคนแบบไหน แต่ยังไงก็สร้างสถานที่แห่งนี้เพื่อตอบรับอุดมการณ์ของตัวเองจนได้นะคะ"
90001240-20 = "หลังจากตัวเองจากไปก็ยังฝากหน้าที่ดูแลทั้งหมดให้ AI แล้วก็ไม่มีการเปิดเผยตำแหน่งอย่างชัดเจน#nด้วยใช่มั้ยคะ?"
90001240-21 = "แต่ถ้าสิ่งที่คนคนนั้นกังวลเกิดขึ้นจริง แล้วใครจะรู้เกี่ยวกับตำแหน่งและสถานที่แห่งนี้ล่ะคะ?"
90001240-22 = "พอคิดแบบนี้แล้ว ดูเหมือนว่าคนคนนั้นก็มีด้านที่ประมาทอย่างคาดไม่ถึงเลยค่ะ"
90001240-23 = "หรือว่าที่จริงแล้วคนคนนั้นสร้างของแบบนี้ด้วยอารมณ์ชั่ววูบคะ?"
90001240-24 = "ถ้าไม่ใช่อย่างนั้น ก็อาจจะเพื่อรอให้มีการค้นพบก็ได้ค่ะ"
90001240-25 = "เหมือนกับเมล็ดพืชไงคะ"
90001240-27 = "เมล็ดพืช?"
90001240-28 = "เมล็ดพืช?"
90001240-29 = "...?"
90001240-30 = "...!!!"
90001240-31 = "นั่นสินะ เคย์! ในที่สุดเคย์ก็เริ่มเรียนรู้เกี่ยวกับชีวิตแล้วสินะคะ!"
90001240-32 = "มะ... ไม่ค่ะ ไม่ถึงกับขนาดนั้นหรอกค่ะ ฉันแค่คิดว่าสิ่งปลูกสร้างแห่งนี้กับเมล็ดพืชมีบางอย่างที่คล้ายๆ กัน..."
90001240-33 = "เมล็ดพืชแต่ละเมล็ดต่างก็ซ่อนศักยภาพที่ตัวเองจะกลายเป็นพืชหนึ่งต้นอยู่ไม่ใช่เหรอคะ? เพราะงั้น..."
90001240-34 = "ใช่ค่ะ ใช่แล้วค่ะ!"
90001240-36 = "[ns] \"ใช่ ใช่แล้วละ\""
90001240-37 = "กับอาริสึน่ะฉันไม่ว่าหรอก แต่ทำไมคุณครูถึงทำสีหน้าปลาบปลื้มตามอาริสึด้วยล่ะคะ!!!"
90001240-39 = "อ้อ ใช่ว่าจะไม่มีใครเลยที่ไม่รู้จักที่แห่งนี้หรอก"
90001240-40 = "อย่างน้อยก็มีฉันคนหนึ่งที่พอรู้คร่าวๆ"
90001240-41 = "หมายความว่าคนประหลาดคนนั้นกับคุณอยู่ในระดับเดียวกันสินะคะ ริโอะ?"
90001240-42 = "ก็อาจจะเป็นไปได้ ถ้าได้เจอกันก็อาจจะพูดคุยกันได้อยู่หรอกนะ"
90001240-43 = "ฉันไม่ได้หมายความแบบนั้นสักหน่อย...! เฮ้อ... ช่างเถอะค่ะ ฉันคิดว่าโลกนี้มีคนประหลาดแบบนั้นแค่#nคนเดียวก็เพียงพอแล้วค่ะ..."
90001240-44 = "หมายความว่ายังไงน่ะ?"
90001240-45 = "หมายความว่าคุณเป็นอย่างที่เป็นตอนนี้ก็เพียงพอแล้วค่ะ..."
90001240-46 = "อย่างน้อยก็ช่วยรักษาอาการความดันโลหิตต่ำของฉันได้น่ะค่ะ...!"
90001240-55 = "อะ... อะไรกันคะ?!"
90001240-56 = "ทำไมจู่ๆ ก็มืดไปล่ะ... หรือว่าไฟดับ? แต่ว่า...!"
90001240-61 = "เดี๋ยวนะคะ..."
90001240-62 = "ฉันรู้สึกเหมือนมีบางอย่างมาล้อมพวกเราเอาไว้เลย...?"
90001240-68 = "นะ... นะนะนะนี่มัน... อะไรกันคะ?!"
90001240-69 = "ฮะ... ฮือ... ฮืออออ...!"
90001240-70 = "[ns] \"ทุกคนใจเย็นๆ ก่อนนะ! แล้วก็...!\""
90001240-71 = "...!"
90001240-72 = "ปกป้องครูก่อน!"
90001240-74 = "ทะ... ทิฟาจัง...! ลองหยั่งเชิงดูแล้วค่ะ...!"
90001240-75 = "ตัดสินใจได้ดีเลยนะ เพราะไม่ว่าจะในกรณีไหน ยังไงก็ต้องประเมินความสามารถของศัตรูก่อน"
90001240-76 = "และถ้าทำได้ดี ก็อาจจะรู้ก็ได้ว่าตอนนั้นฝ่าสนามพลังงานนั่นมาได้ยังไงด้วยค่ะ"
90001240-77 = "ตะ... ตะตะตะตะ... แต่ว่าถ้าทำแบบนี้ ที่นั่นจะไม่พังเหรอคะ...?"
90001240-78 = "คงไม่หรอกน่า ทิฟาเร็ธก็คงไม่อยากให้เป็นแบบนั้นด้วย ถ้าเป็นแบบนั้นก็จะเก็บเมล็ดพันธุ์ไม่ได้นี่นา"
90001240-79 = "ค่ะ ฉันคิดว่าทิฟาเร็ธคงแค่จะสำรวจดูสักหน่อยแล้วค่อยถอยกลับค่ะ"
90001240-80 = "ระหว่างนั้นถ้าทำให้อีกฝ่ายอ่อนกำลังลงด้วยก็จะยิ่งดีเลยค่ะ!"

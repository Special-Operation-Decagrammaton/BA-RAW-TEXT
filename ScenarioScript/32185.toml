[translation]
32185-2 = "อ่า... แบบนี้ก็รุกฆาตสินะ..."
32185-3 = "ทำไมถึงเป็นแบบนั้นไปได้นะ?"
32185-4 = "ตอนที่เซอาจังถูกจู่โจม ชมรมซิสเตอร์ก็อยู่เฉยๆ แล้วทำไมตอนนี้ถึงได้ออกมาเคลื่อนไหวล่ะ? ...แบบนี้มันล้ำเส้นเกินไปแล้วนะ"
32185-5 = "ทำไมนะ? ฉันพลาดอะไรไปตรงไหนกัน?"
32185-6 = "หรือว่าฉันดูถูกเธอเกินไปเหรอฮานาโกะจัง?"
32185-7 = "......."
32185-8 = "ไม่สิ เพราะถึงอุราวะ ฮานาโกะจะเป็นคนเพ้อเจ้อแต่ก็ไม่ได้มีพิษสงอะไร หรือว่าจะมีตัวแปรอื่น?"
32185-9 = "อาซึสะจัง? หรือว่าเพราะเธอทรยศ...?"
32185-10 = "......."
32185-11 = "แต่เธอก็เป็นแค่หุ่นเชิดเท่านั้น ไม่ว่าอาซึสะจะทรยศหรือไม่ก็ไม่เกี่ยวกับผลลัพธ์ของฉัน"
32185-12 = "ฮิฟุมิจัง...? ก็แค่เด็กนักเรียนธรรมดาๆ ส่วนโคฮารุจังก็... แค่คนโง่คนหนึ่ง ไม่น่าจะเป็นตัวแปรอะไรได้"
32185-13 = "แล้วทำไมฉันถึงมาแพ้ให้กับชมรมชั้นเรียนเสริมอะไรนี่ด้วย?"
32185-14 = "ทำไมกัน? มันผิดพลาดตั้งแต่ตรงไหน?"
32185-15 = "[s] \"......\""
32185-16 = "อ่า... อย่างนี้สินะ มีหนึ่งตัวแปรที่สำคัญที่สุด นั่นก็คือคุณครูจากชาเล่ต์..."
32185-17 = "คุณครูนี่เอง... ที่เป็นสาเหตุของความพ่ายแพ้ของฉัน"
32185-18 = "<ชาเล่ต์> ถูกเรียกมาอย่างเหมาะเจาะเพื่อรับมือที่นางิจังโกรธที่มีคนทรยศแฝงตัวอยู่...#nความผิดพลาดเกิดจากตรงนี้สินะ"
32185-19 = "ฉันไม่น่าดูถูกเลยจริงๆ"
32185-20 = "สงสัยจะจบแค่นี้แล้ว..."
32185-21 = "คุณมิกะ เซอาจัง..."
32185-22 = "ฉันไม่มีความคิดที่จะฆ่าเซอาจัง... พวกเธออาจจะมองว่าฉันเป็นคนร้าย#nแต่ฉันก็ไม่ได้เลวขนาดนั้นหรอกนะ"
32185-23 = "มันเป็นอุบัติเหตุน่ะ เซอาจังร่างกายไม่ค่อยแข็งแรงอยู่แล้ว... แล้วก็..."
32185-24 = "ไม่ใช่อย่างนั้นค่ะ เซอาจังยังไม่ตาย "
32185-25 = "...?!"
32185-26 = "แค่แกล้งทำเป็นว่ามันเกิดขึ้นแบบนั้นน่ะค่ะ"
32185-27 = "และที่ทำไปก็เพื่อความปลอดภัย เพราะยังหาตัวคนร้ายที่มาจู่โจมไม่ได้...#nเธอออกจากทรีนิตี้ไปซ่อนตัวอย่างลับๆ น่ะค่ะ"
32185-28 = "เซอาจัง...? ยังไม่ตายเหรอ...?"
32185-29 = "ค่ะ ตอนนี้เธอยังไม่ฟื้นเพราะแผลยังไม่หายดี... แต่หัวหน้าชมรมอัศวินบรรเทาทุกข์ก็ไปคุ้มครองเธออยู่ค่ะ"
32185-30 = "หัวหน้ามิเนะน่ะเหรอ...?"
32185-31 = "ค่ะ และคนที่ช่วยชีวิตเซอาจังเอาไว้ในตอนนั้นก็อาจจะเป็น..."
32185-32 = "......."
32185-33 = "ไม่เอาค่ะ... เรื่องนี้เอาไว้ฟังจากผู้เกี่ยวข้องดีกว่าค่ะ"
32185-34 = "อย่างนี้นี่เอง... ยังมีชีวิตอยู่สินะ..."
32185-35 = "โล่งอกไปที... เซอาจัง..."
32185-41 = "ฉันยอมจำนน ฉันแพ้แล้วล่ะ"
32185-42 = "ชัยชนะนี้เป็นของชมรมชั้นเรียนเสริม และของคุณครูด้วย"
32185-43 = "ตอนนี้จะเอาตัวฉันไปลงโทษอะไรก็เชิญเลย"
32185-44 = "......."
32185-45 = "อาซึสะจัง เธอเข้าใจผลลัพธ์ของการกระทำนี้ใช่ไหม?"
32185-46 = "ของมันแน่อยู่แล้ว"
32185-47 = "คิดว่าทรีนิตี้จะปกป้องเธอเหรอ?"
32185-48 = "เธอคงถูกตามล่าไปเรื่อยๆ ไม่ว่าจะไปไหนก็ตาม"
32185-49 = "แล้วก็คงไม่ได้หลับได้นอนด้วย คงต้องอยู่อย่างระแวงไปตลอดนั่นแหละ"
32185-50 = "คิดว่าเธอจะหลุดพ้นจากซาโอริได้งั้นเหรอ? ถ้ามาจากอาเรียสก็น่าจะรู้ดีนี่... et omnia vanitas..."
32185-51 = "ฉันรู้ดี แต่ฉันก็จะดิ้นรนจนถึงที่สุด ถึงที่สุดเท่าที่จะทำได้"
32185-55 = "อย่างนั้นเหรอ... อืม... "
32185-61 = "[ns] \"มิกะ...\""
32185-62 = "ไม่ต้องพูดออกมาหรอกคุณครู"
32185-63 = "การดึงชาเล่ต์เข้ามาด้วยคือความผิดพลาดที่ยิ่งใหญ่ที่สุดของฉัน"
32185-64 = "อืม... แต่ก็..."
32185-66 = "[ns] \"ถ้าต้องการ ครูก็จะช่วยอยู่ฝั่งมิกะให้\""
32185-69 = "ตอนได้ยินคำนั้นฉันดีใจมากเลยล่ะ อืม... ฉันรู้สึกอย่างนั้นจริงๆ "
32185-70 = "หากตอนนั้นฉันเลือกตัวเลือกอื่น ก็คง..."
32185-71 = "อืม... ไม่มีอะไรหรอก ไม่มีอะไร"
32185-72 = "ลาก่อนนะคุณครู"
32185-79 = "ตอนต่อไป;การสอบประเมินครั้งที่ 3"

[translation]
32185-2 = "啊啊……這下無計可施了呢……"
32185-3 = "為什麼會變成這樣呢？"
32185-4 = "就連聖亞醬被襲擊的時候都沒有行動的修女會，竟然會在這個時候介入……#n開玩笑也該有個限度吧。"
32185-5 = "我究竟錯估了什麼呢？"
32185-6 = "……是因為小看了花子醬嗎？"
32185-7 = "……"
32185-8 = "不，浦和花子雖然行事古怪，卻是個無害的存在。#n不將其視為計畫中的變數也是理所當然的。"
32185-9 = "……是因為梓醬背叛了我嗎？"
32185-10 = "……"
32185-11 = "不，梓醬只不過是個人偶而已。#n無論是否背叛都不會影響我所期望的結果。"
32185-12 = "日步美醬只是個普通人，而小春醬只是個笨蛋……他們都不是能成為變數的存在。"
32185-13 = "既然如此，為什麼我會輸給補課部呢……"
32185-14 = "為什麼？究竟是哪裡出了差錯？"
32185-15 = "[s] 「……」"
32185-16 = "……啊啊，這麼說來，還有個最大的變數──「夏萊」的老師在呢。"
32185-17 = "我的敗因……就是將老師找了過來。"
32185-18 = "在渚醬因叛徒而胡鬧的時候，作為對策隨口連絡了「夏萊」……原來是那個時候啊。"
32185-19 = "真是……明明不應該大意的。"
32185-20 = "看來到此為止了呢……"
32185-21 = "彌香同學，聖亞醬他……"
32185-22 = "……我真的沒有要殺掉聖亞醬的意思。#n雖然我現在看起來跟壞人沒兩樣，但我也沒壞到那種程度……"
32185-23 = "大概是意外吧。#n聖亞醬本來身體就很虛弱……再加上……"
32185-24 = "不，聖亞醬他並沒有死。"
32185-25 = "……！？"
32185-26 = "他的死訊只是偽裝的情報而已。"
32185-27 = "由於找不到襲擊的犯人……為了安全起見而祕密離開了三一，並躲藏了起來。"
32185-28 = "你說聖亞醬……他沒有死……？"
32185-29 = "嗯，雖然傷勢尚未痊癒，意識也還沒恢復……#n不過救護騎士團的團長，現在也一直在身邊保護著他。"
32185-30 = "美禰團長他……？"
32185-31 = "是的。而且當時幫助聖亞醬的人……我想應該……"
32185-32 = "……"
32185-33 = "……不，這件事還是由本人來說比較好吧。"
32185-34 = "……這樣啊，聖亞醬還活著……"
32185-35 = "……真是太好了。"
32185-41 = "我投降──是我輸了。"
32185-42 = "補課部……還有老師。就當作是你們贏了吧。"
32185-43 = "要怎麼樣都行，隨你們處置吧。"
32185-44 = "……"
32185-45 = "梓醬，你知道自己這麼做會有什麼後果吧？"
32185-46 = "當然。"
32185-47 = "你認為三一能夠保護你嗎？"
32185-48 = "他們會一直追著你的哦──無論天涯海角。"
32185-49 = "能夠安心入睡的那天，也許永遠不會到來。"
32185-50 = "而且，你覺得能從沙織手上逃掉嗎？#n奧利斯出身的你應該知道的吧──et omnia vanitas……"
32185-51 = "我知道。#n但即便如此，我還是會努力掙扎下去，直到最後。"
32185-55 = "……嗯，這樣啊。"
32185-61 = "[ns] 「彌香……」"
32185-62 = "不，請你什麼都別說，老師。"
32185-63 = "果然把夏萊牽扯進來就是我最大的失誤呢。"
32185-64 = "嗯，不過……"
32185-66 = "[ns] 「有必要的時候，我也會是彌香的友方。」"
32185-69 = "……聽到那句話的時候，我真的真的很高興。"
32185-70 = "那個時候，如果我能做出別的選擇……"
32185-71 = "……不，果然還是當我沒說過吧。"
32185-72 = "掰掰，老師。"
32185-79 = "下一話;第3次特別學力測驗"

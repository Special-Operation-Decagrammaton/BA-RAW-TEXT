[translation]
32185-2 = "……何これ、洒落にならないなぁ。"
32185-3 = "……どうして？"
32185-4 = "セイアちゃんが襲撃された時だって、動かなかったのに……今このタイミングでシスターフッドが介入するなんて、冗談にもほどがあるよ。"
32185-5 = "……何を見誤ったのかな。"
32185-6 = "……ハナコちゃんのことを、見くびったから？"
32185-7 = "……。"
32185-8 = "ううん、「浦和ハナコ」がとんでもない存在だってことは知ってた。でも、いつの間に無害な存在になってた。変数として計算する必要がないくらいに。"
32185-9 = "……アズサちゃんが、裏切ったから？"
32185-10 = "……。"
32185-11 = "ううん、アズサちゃんはただの操り人形。裏切ろうと裏切らなかろうと、私の望む結果には何も関係なかった。"
32185-12 = "……ヒフミちゃんはただの普通の子で、コハルちゃんはただのおバカさんでしょ？変数になるような存在じゃなかった。"
32185-13 = "それなのに、どうして負けるかなぁ……。"
32185-14 = "どこからズレちゃったんだろ。"
32185-15 = "[s] \"……。\""
32185-16 = "……そういえば、一番大きい変数を忘れてたね。"
32185-17 = "シャーレの、先生……うん、そうだね。考えてみればきっと、あなたを連れて来た時点で私の負けだった。"
32185-18 = "ナギちゃんが裏切り者がいるって騒ぐから、仕方ないなぁって、ちょうど良さそうだなって思って「シャーレ」に連絡して……そっか、あの時かぁ。"
32185-19 = "いやー……ダメだな、私……。"
32185-20 = "はぁ……。"
32185-21 = "ミカさん、セイアちゃんは……。"
32185-22 = "……本当に、殺すつもりじゃなかったの。今の私が何を言っても言い訳になるけど……。"
32185-23 = "多分、事故だった。セイアちゃん、元々体が弱かったし……それに……"
32185-24 = "……セイアちゃんは無事です。"
32185-25 = "……！？"
32185-26 = "ずっと、偽装していたんです。"
32185-27 = "襲撃の犯人が見つからなかったので、安全のためというのもあって……トリニティの外で身を隠しています。"
32185-28 = "セイアちゃんが……無事……？"
32185-29 = "はい。傷が治らなくて、まだ目が覚めていないのですが……救護騎士団の団長が、今もすぐそばで守ってくれています。"
32185-30 = "ミネ団長が……？"
32185-31 = "はい。そしてあの時、セイアちゃんを助けてくれたのは……"
32185-32 = "……。"
32185-33 = "……いえ、これは直接ご本人の口からが良いでしょう。"
32185-34 = "……そっか。生きてたんだ……。"
32185-35 = "……良かったぁ。"
32185-41 = "……降参。私の負けだよ。"
32185-42 = "おめでとう、補習授業部……そして先生。あなたたちの勝ちってことにしておいてあげる。"
32185-43 = "もう何でもいいや、私のことも好きにして。"
32185-44 = "……。"
32185-45 = "……アズサちゃん。自分が何をしてるのか、その結果この先どうなるのか。それは分かってるんだよね？"
32185-46 = "もちろん。"
32185-47 = "……トリニティが、あなたのことを守ってくれると思う？"
32185-48 = "これからずっと追われ続けるよ。ずっと、どこに行っても。"
32185-49 = "……あなたが安心して眠れる日は、来るのかな？"
32185-50 = "……それに、サオリから逃げ切れると思う？アリウスの出身ならもちろん知ってるよね、et omnia vanitas……"
32185-51 = "うん、分かってる。それでも私は最後まで足掻いてみせる、最後のその時まで。"
32185-55 = "……うん、そっか。"
32185-61 = "[ns] \"ミカ……。\""
32185-62 = "今はちょっと、先生からは何も聞きたくないなぁ……。"
32185-63 = "やっぱりシャーレを巻き込んだのが、私の最大のミスだった。"
32185-64 = "うん、でも……"
32185-66 = "[ns] \"もちろん、ミカの味方でもあるよ。\""
32185-69 = "……あの言葉を聞いた時は本当に、本当に嬉しかったんだ。"
32185-70 = "あの時、もし……"
32185-71 = "……ううん、やっぱり何でもない。"
32185-72 = "バイバイ、先生。"
32185-79 = "次回;第3次特別学力試験"

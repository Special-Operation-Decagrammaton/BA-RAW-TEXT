[translation]
32185-2 = "*sigh* Is this truly checkmate?"
32185-3 = "Why? Why like this?"
32185-4 = "The Sisterhood didn't flinch even after Seia's death, yet they decide to get involved now. What a cruel joke."
32185-5 = "Did I miss something? Overlook an important detail?"
32185-6 = "Or was it because I underestimated you, Hanako?"
32185-7 = "..."
32185-8 = "No. Urawa Hanako is exceptional, but ultimately harmless. There was no need to account for her more than I did."
32185-9 = "Could it have been because of Azusa's betrayal?"
32185-10 = "..."
32185-11 = "No. She was only just a puppet. Whether she stayed loyal or not wouldn't have affected the outcome."
32185-12 = "Perhaps Hifumi? No, she's just a normal girl. And Koharu is a fool, so there was no need to account for her."
32185-13 = "Then why? Why did I lose to something like the Make-Up Work Club?"
32185-14 = "Where did it all go wrong?"
32185-15 = "[s] \"...\""
32185-16 = "Oh, I see. I overlooked the biggest variable of all."
32185-17 = "Involving Schale and Sensei was the cause of my downfall."
32185-18 = "It was only meant to be a precautionary measure. Nagi was making such a fuss about there being a traitor, and I thought it was a good solution... That's when my fate was sealed."
32185-19 = "What a foolish mistake."
32185-20 = "I suppose this is where it ends for me."
32185-21 = "Mika, about Seia..."
32185-22 = "As I told you, the intent was never to kill Seia. I may seem like a villain, but I'm not that evil."
32185-23 = "It was an accident. Seia was weak to start off with and..."
32185-24 = "Seia is alive, Mika! "
32185-25 = "...?!"
32185-26 = "We just made it look like she died."
32185-27 = "She was secretly taken from Trinity and put into hiding as a precaution...since we couldn't find her assailant."
32185-28 = "Seia...isn't dead?"
32185-29 = "Her wounds haven't completely healed yet and she remains unconscious...but the head of the Remedial Knights continues to look after her."
32185-30 = "Captain Mine?"
32185-31 = "Yes. And the person who saved Seia was probably..."
32185-32 = "..."
32185-33 = "Never mind. I think you should ask her yourself."
32185-34 = "I see. So she's still alive..."
32185-35 = "That's wonderful news."
32185-41 = "I surrender. You win."
32185-42 = "Congratulations, Make-Up Work Club, Sensei... You've earned it."
32185-43 = "Now, do whatever you want with me."
32185-44 = "..."
32185-45 = "You understand what the consequences of these actions will be for you, don't you, Azusa?"
32185-46 = "Of course."
32185-47 = "I hope you don't think Trinity will protect you."
32185-48 = "You'll be hunted down no matter where you run. Forever."
32185-49 = "There will never be another peaceful night's sleep."
32185-50 = "There's no escaping Saori. You already know it all too well as someone from Arius: et omnia vanitas..."
32185-51 = "I know. Still, I'll struggle until the bitter end—until I no longer can."
32185-55 = "Very well, then. "
32185-61 = "[ns] \"Mika...\""
32185-62 = "Stop right there, Sensei. Don't say another word."
32185-63 = "As I said, getting Schale involved was my greatest mistake."
32185-64 = "And yet..."
32185-66 = "[ns] \"I'll be by your side if you ever need me to be.\""
32185-69 = "Hearing you say that made me truly happy. It really did. "
32185-70 = "If I had made different choices, then maybe we..."
32185-71 = "No. Never mind."
32185-72 = "Goodbye, Sensei."
32185-79 = "Next Episode;The Third Exam"

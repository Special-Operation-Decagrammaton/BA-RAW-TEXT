10035030-150 = "ฮุฮุ นั่นสิคะ"
10035030-151 = "เข้าใจแล้วค่ะ ฉันจะพยายามให้มากกว่านี้ค่ะ"
10035030-155 = "?!"
10035030-156 = "อึก! เฮือก!"
10035030-157 = "ชะ... ช่วยด้วยค่ะ!"
10035030-158 = "ฮะ! เฮือก!"
10035030-159 = "เด็กตกน้ำ...!"
10035030-160 = "เดี๋ยวฉันมานะคะคุณครู!"
10035030-165 = "ฮะ... แฮ่ก!"
10035030-166 = "เป็นยังไงบ้าง?"
10035030-167 = "แค่ก แค่ก...!"
10035030-168 = "มะ... มีจระเข้ในสระค่ะ! จระเข้ตัวใหญ่เบ้อเริ่ม...!"
10035030-169 = "ตกใจจนเห็นภาพหลอนสินะ ใจเย็นๆ ก่อนนะ"
10035030-170 = "หนูกลัวน้ำแล้ว!"
10035030-171 = "ไม่กล้าลงน้ำแล้วค่ะ...!"
10035030-172 = "ไม่เป็นไรนะ ฉันจะคอยระวังให้เอง จะได้ไม่ตกลงไปอีกรอบน่ะ"

[translation]
10035030-1 = "第3話;小朋友們，來玩吧！"
10035030-2 = "那裡就是新的工作崗位！"
10035030-3 = "是給小朋友們玩的兒童泳池！"
10035030-4 = "能待在室內是不錯，但照顧小孩子可不是件容易的事……"
10035030-5 = "他們的體力非常好，要是到處亂跑的話就麻煩了。"
10035030-9 = "……"
10035030-10 = "[s1]「任何人都會犯錯的。」\n[s2]「剛才的事不用太放在心上。」"
10035030-13 = "……是，老師。"
10035030-14 = "剛才是我混淆了公安局和生活安全局的工作。"
10035030-15 = "由於長期在公安局工作的關係，那種處理方式已經深入了我的骨髓。"
10035030-16 = "沒關係！誰都會犯錯的！"
10035030-17 = "不可能一開始就做到十全十美的。"
10035030-18 = "打起精神來吧，局長。"
10035030-19 = "……謝謝。"
10035030-20 = "在面對民眾的工作方面，你們確實比我擅長。"
10035030-21 = "能請你們給我一些建議，避免剛才的事情再次發生嗎？"
10035030-22 = "當然可以。#n首先，工作的時候要配合適當的休息──"
10035030-23 = "怎麼能從玩樂的部分開始教起呢，吹雪！"
10035030-24 = "就由我來告訴局長，生活安全局在對民工作的三大原則吧！"
10035030-26 = "三大原則？"
10035030-27 = "真是興致勃勃呢。"
10035030-29 = "是的，那就是──"
10035030-30 = "「服務、傾聽、誠實」！"
10035030-31 = "服務！始終保持為民服務的心！"
10035030-32 = "傾聽！一心一意傾聽市民說話！"
10035030-33 = "誠實！以誠實的態度幫助市民！"
10035030-34 = "本官之所以能在上一期的生活安全局對民服務考核中獲得高分，#n正是因為遵守了這三大原則哦！"
10035030-35 = "雖然也在更重要的實技考核中，創下了射擊零分的紀錄就是了。"
10035030-36 = "請，請不要提供多餘的情報！"
10035030-37 = "除此以外還有一點。"
10035030-38 = "還有一點？"
10035030-39 = "這點並未包含在三大原則之中……而是本官在生活安全局幫助市民的過程領悟到的。"
10035030-40 = "那就是保持微笑。"
10035030-41 = "微笑……？"
10035030-42 = "是的。無論面臨什麼樣的情況，都要盡力對市民們保持微笑。"
10035030-43 = "根據過往的經驗，市民們也同樣會報以微笑，本官的心情就會跟著變好！"
10035030-44 = "知道了。我會銘記在心。"
10035030-45 = "好！那我們就去見小朋友們吧！"
10035030-49 = "真的是兒童池呢。"
10035030-50 = "水深只到腰部而已……"
10035030-51 = "就算是不諳水性的本官，在這裡也能順利地進行救援活動！"
10035030-52 = "而且這裡還有很多可愛又純真的小朋友！"
10035030-53 = "怎麼，是新人嗎？"
10035030-54 = "嘿嘿嘿，這次要怎麼玩好呢？"
10035030-55 = "咦，什麼？"
10035030-56 = "唔嗯，才剛開始就有不祥的預感。"
10035030-57 = "啊，那邊穿黃色泳裝的小朋友！這樣跑來跑去很危險！"
10035030-58 = "嘻嘻！抓得到我就來呀！"
10035030-59 = "別跑！"
10035030-63 = "桐乃警官，小心！"
10035030-65 = "上當了！脊背炸彈摔！"
10035030-72 = "嗚哇！？"
10035030-77 = "哦哦，動作行雲流水。"
10035030-78 = "那個小傢伙，好像有點天分呢。"
10035030-79 = "噗啊噗啊！"
10035030-80 = "吹，吹雪！幫幫我！"
10035030-81 = "站起來就行了，桐乃。"
10035030-82 = "啊，對喔，這裡的水深只到腰部……"
10035030-83 = "哇啊！魔女復活了！"
10035030-84 = "攻擊！攻擊！"
10035030-85 = "哇啊！別再潑水了！眼睛要睜不開了！"
10035030-86 = "再這樣的話本官也要反擊囉！"
10035030-87 = "看招！看招！"
10035030-91 = "……"
10035030-92 = "[s] 「怎麼有種兩邊都是小朋友的感覺？」"
10035030-93 = "就是說啊。"
10035030-94 = "沒辦法，只能由我出馬了。"
10035030-95 = "你打算怎麼做？"
10035030-98 = "來，大家注意這邊～"
10035030-99 = "怎麼，那傢伙是誰啊？"
10035030-100 = "看起來很遜耶？"
10035030-101 = "現在……我們來玩一二三木頭人吧！"
10035030-102 = "一二三木頭人！？"
10035030-103 = "要比賽誰是最厲害的哦！"
10035030-104 = "（不是，提議得這麼突然，很難有人願意參與吧）"
10035030-105 = "拿到第一名的人就可以加10分！"
10035030-106 = "（分數？這種沒頭沒尾的計分，孩子們真的會在乎嗎……）"
10035030-107 = "好，第一輪要開始囉！"
10035030-108 = "一二三～木頭人！"
10035030-109 = "……（停，停住了！）"
10035030-110 = "……（老實說其實不知道為什麼要照著做……！）"
10035030-111 = "……（可是我不想輸！）"
10035030-113 = "哦！那邊的小朋友！#n動了可是會被淘汰的，沒關係嗎？"
10035030-117 = "剛才還像小狗一樣到處亂竄的孩子們……"
10035030-118 = "全都安靜下來了……！"
10035030-119 = "好，我們繼續哦。#n一二三～木頭人！"
10035030-121 = "（之後，吹雪繼續熟練地帶著孩子們玩耍）"
10035030-123 = "[ns3]「你真厲害，吹雪。」\n[ns4]「吹雪很會照顧孩子呢。」"
10035030-126 = "哎呀，這很基本啦。"
10035030-127 = "與其用強硬的手段控制，不如讓他們互相競爭。#n這樣除了比較有趣之外，也更能消耗孩子們的體力。"
10035030-128 = "這是我在巡邏時，和那些麻煩精們交手後自然而然掌握的技巧。"
10035030-129 = "原，原來如此……"
10035030-130 = "又學到了一課。"
10035030-131 = "現在只需要邊泡腳邊看著孩子們就行了。"
10035030-132 = "剩下的可以交給你們嗎？"
10035030-134 = "沒問題！監視的工作就交給我吧！"
10035030-135 = "剛才是一時大意才會中計，不會再發生第二次了！"
10035030-136 = "那我就去對面顧吧。"
10035030-137 = "[s]「我也跟環奈一起過去。」"
10035030-138 = "好的，那我們就分成兩組，從兩邊觀察泳池的情況吧！"
10035030-139 = "雖然老師並非救生員就是了。"
10035030-142 = "救生員的工作，比我想像中還困難呢。"
10035030-143 = "[s]「我相信你很快就會漸入佳境的。」"
10035030-144 = "希望如此……不過坦白說，我其實沒什麼信心。"
10035030-145 = "即便撇開剛才的疏失，我也缺乏像吹雪那樣的經驗。"
10035030-146 = "[s]「現在失落還太早了哦。」"
10035030-148 = "[ns]「服務、傾聽、誠實，還有不要忘記微笑對吧？」"
10035030-150 = "呵呵，您說的對。"
10035030-151 = "知道了。我會再試著努力一下。"
10035030-155 = "！？"
10035030-156 = "噗嗚！咳咳！"
10035030-157 = "救，救命啊！"
10035030-158 = "咳呃！咳！"
10035030-159 = "有小孩溺水了……！"
10035030-160 = "老師，我過去看看！"
10035030-165 = "哈啊，哈啊……"
10035030-166 = "沒事吧？"
10035030-167 = "咳咳，咳咳……！"
10035030-168 = "水，水裡有鱷魚！非常大的鱷魚……！"
10035030-169 = "你是被嚇出幻覺了。冷靜點。"
10035030-170 = "水裡好可怕！"
10035030-171 = "我再也不想進到水裡了……！"
10035030-172 = "沒事的。我會在一旁看著，不用再擔心會溺水了。"
10035030-173 = "[s]「環奈！微笑！微笑！」"
10035030-174 = "……啊！"
10035030-178 = "現，現在可以放心了。"
10035030-179 = "……"
10035030-180 = "哇啊啊啊！"
10035030-188 = "？"
10035030-189 = "[ns]（看到環奈的臉後就自己跳進水裡了……？）"
10035030-190 = "好可怕！快，快逃！哇啊啊──！"
10035030-194 = "……老師。"
10035030-195 = "我……真的能做好這份工作嗎……"
10035030-196 = "好像失去信心了……"

[translation]
10035030-1 = "ตอนที่ 3;เด็กๆ ทั้งหลาย พี่จะเล่นด้วยเอง!"
10035030-2 = "จุดปฏิบัติงานใหม่คือที่นี่สินะคะ!"
10035030-3 = "นี่ก็คือสระว่ายน้ำที่เด็กๆ มาเล่นกันค่ะ!"
10035030-4 = "เราได้มาอยู่ในร่มก็จริง แต่ให้มาดูแลเด็กมันก็ไม่น่าจะใช่งานง่ายๆ เลยนะ..."
10035030-5 = "ต้องเป็นงานที่เหมือนจับปูใส่กระด้งแน่เลย"
10035030-9 = "..."
10035030-10 = "[s1] \"คนเราก็พลาดกันได้น่า\"\n[s2] \"ไม่ต้องฝังใจเรื่องเมื่อกี้มากนักหรอกนะ\""
10035030-13 = "ค่ะ... คุณครู"
10035030-14 = "เมื่อกี้ฉันน่าจะสับสนระหว่างงานของกรมความมั่นคงสาธารณะกับสำนักรักษาความปลอดภัยน่ะค่ะ"
10035030-15 = "คงเป็นเพราะฉันทำงานในกรมความมั่นคงสาธารณะมานาน ก็เลยทำอย่างนั้นจนติดเป็นนิสัยค่ะ"
10035030-16 = "ไม่เป็นไรหรอกค่ะ! ใครๆ ก็ทำพลาดกันได้ทั้งนั้นค่ะ!"
10035030-17 = "ไม่มีใครทำได้อย่างสมบูรณ์แบบตั้งแต่ครั้งแรกหรอก"
10035030-18 = "ร่าเริงหน่อยสิ หัวหน้ากรมฯ"
10035030-19 = "ขอบใจนะ..."
10035030-20 = "พวกเธอทำงานบริการประชาชนได้ดีกว่าฉันจริงๆ"
10035030-21 = "ฉันขอคำแนะนำหน่อยได้มั้ย จะได้ไม่เกิดเหตุการณ์เหมือนเมื่อกี้อีกน่ะ"
10035030-22 = "ได้อยู่แล้ว เราต้องทำงานให้มันพอดีๆ และก็พักผ่อนให้พอเหมาะ..."
10035030-23 = "แนะนำให้อู้งานได้ยังไงกันคะ ฟุบุกิ!"
10035030-24 = "ฉันจะบอกระเบียบ 3 ประการในการบริการประชาชนที่ฉันได้ฟังจนหูชาตอนเข้ามาสำนักรักษาความ#nปลอดภัยใหม่ๆ ให้ค่ะ!"
10035030-26 = "ระเบียบ 3 ประการเหรอ?"
10035030-27 = "ตื่นเต้นใหญ่เลยนะ"
10035030-29 = "ใช่ค่ะ และนั่นก็คือ..."
10035030-30 = "'จิตอาสา รับฟัง ซื่อสัตย์' ค่ะ!"
10035030-31 = "จิตอาสา! ทำงานด้วยหัวใจที่อยากรับใช้ชาวเมือง!"
10035030-32 = "รับฟัง! ตั้งใจฟังคำร้องของชาวเมือง!"
10035030-33 = "ซื่อสัตย์! ช่วยเหลือชาวเมืองด้วยความซื่อสัตย์อยู่เสมอ!"
10035030-34 = "ที่ฉันได้คะแนนดีในการประเมินสำนักรักษาความปลอดภัยของชาวเมืองเมื่อไตรมาสก่อนก็เป็นเพราะ#nฉันยึดถือและปฏิบัติตามระเบียบ 3 ประการนี้ค่ะ!"
10035030-35 = "ถึงจะยิงปืนได้ 0 คะแนนในการประเมินภาคปฏิบัติที่สำคัญกว่าก็เถอะนะ"
10035030-36 = "งะ... เงียบๆ หน่อยสิคะ!"
10035030-37 = "แล้วก็อีกอย่างค่ะ"
10035030-38 = "ยังมีอีกอย่างเหรอ?"
10035030-39 = "นี่ไม่ใช่ระเบียบ 3 ประการก็จริง... แต่ว่าเป็นสิ่งที่ฉันตระหนักจากการช่วยเหลือชาวเมืองในฐานะ#nเจ้าหน้าที่ในสำนักรักษาความปลอดภัยค่ะ"
10035030-40 = "และนั่นก็คือ... รอยยิ้มค่ะ"
10035030-41 = "รอยยิ้ม...?"
10035030-42 = "ใช่ค่ะ ไม่ว่าจะในสถานการณ์ไหน ฉันจะเข้าหาและรับมือกับชาวเมืองด้วยรอยยิ้มเสมอค่ะ"
10035030-43 = "และถ้าทำแบบนั้น ชาวเมืองก็จะยิ้มตอบ แล้วฉันก็จะพลอยอารมณ์ดีไปด้วยค่ะ!"
10035030-44 = "เข้าใจแล้ว ฉันจะจำไว้"
10035030-45 = "ค่ะ! งั้นเราไปหาเด็กๆ กันเถอะค่ะ!"
10035030-49 = "สระเด็กเป็นอย่างนี้เองสินะคะ"
10035030-50 = "น้ำในสระลึกแค่เอวเอง..."
10035030-51 = "ต่อให้เป็นคนที่ว่ายน้ำไม่เก่งอย่างฉันก็น่าจะให้ความช่วยเหลือได้อยู่ค่ะ!"
10035030-52 = "อีกอย่าง ที่นี่ก็มีแต่เด็กๆ ที่น่ารักและไร้เดียงสานี่คะ!"
10035030-53 = "อะไรอ่ะ? ไลฟ์การ์ดชุดใหม่มาแย้วเหยอ?"
10035030-54 = "ฮิฮิฮิ คราวนี้เราเล่นอะไรด้วยดีอ่ะ?"
10035030-55 = "เอะ... เอ๋?"
10035030-56 = "เริ่มรู้สึกไม่ค่อยดีเลยแฮะ"
10035030-57 = "อ๊ะ เด็กชุดว่ายน้ำสีเหลืองตรงนั้น! ถ้าวิ่งไปวิ่งมาแบบนั้นจะอันตรายนะคะ!"
10035030-58 = "คิกคิก! ทางนี้ๆ!"
10035030-59 = "มาทางนี้เถอะค่ะ!"
10035030-63 = "อ๊ะ เจ้าหน้าที่คิริโนะ ระวังนะ!"
10035030-65 = "นี่แหนะ! ท่าสไปน์บัสเตอร์! โดนไปซ๊า!"
10035030-72 = "อ๊ะ?!"
10035030-77 = "โอ้ว สมบูรณ์แบบเลยนะนั่น!"
10035030-78 = "เด็กคนนั้นฝีมือไม่เบาเลยแฮะ"
10035030-79 = "แฮ่ก แฮ่ก!"
10035030-80 = "ฟะ... ฟุบุกิ! ช่วยด้วยค่ะ!"
10035030-81 = "แค่ทรงตัวให้ดีๆ ก็พอแล้วน่า นี่มันสระเด็กนะ คิริโนะ"
10035030-82 = "อ่า นั่นสินะคะ น้ำลึกแค่เอวเอง..."
10035030-83 = "หวา! แม่มดฟื้นคืนชีพแล้ว!"
10035030-84 = "โจมตีเลย! โจมตี!"
10035030-85 = "ว้าย! อย่าสาดน้ำกันสิคะ! ฉันลืมตาไม่ได้แล้วนะคะ!"
10035030-86 = "ถ้ายังแกล้งกันแบบนี้ ฉันก็จะไม่อยู่เฉยๆ นะคะ!"
10035030-87 = "นี่แหนะ! นี่แหนะ!"
10035030-91 = "..."
10035030-92 = "[s] \"ทำไมถึงโดนเด็กรุมแกล้งแบบนั้นล่ะ?\""
10035030-93 = "นั่นน่ะสิ"
10035030-94 = "ช่วยไม่ได้แฮะ ฉันคงต้องออกโรงแล้วละ"
10035030-95 = "คิดจะทำอะไรงั้นเหรอ?"
10035030-98 = "เอาละ ทุกคนฟังทางนี้~"
10035030-99 = "อะไรของเจ๊คนนั้นน่ะ?"
10035030-100 = "ดูไม่ค่อยได้เรื่องเท่าไรเลยนะ?"
10035030-101 = "จากนี้ไป... เราจะมาเล่นเกม 'ดารุมะซัง' กัน"
10035030-102 = "ดารุมะซังล้มแล้ว?! "
10035030-103 = "มาดูกันว่าใครจะเก่งที่สุด!"
10035030-104 = "(จู่ๆ มาชวนเล่นอะไรแบบนี้ในสวนน้ำเหรอ เด็กจะเล่นด้วยมั้ยเนี่ย)"
10035030-105 = "คนที่ได้ที่ 1 จะได้ 10 คะแนน!"
10035030-106 = "(มีคะแนนด้วยเหรอ คะแนนอะไรก็ไม่รู้ เด็กๆ คงไม่เอาด้วยหรอก...)"
10035030-107 = "เอาละ จะเริ่มรอบแรกแล้วนะ!"
10035030-108 = "ดารุมะซังล้มแล้ว?! "
10035030-109 = "(หะ... เห็นคนอื่นหยุด ก็หยุดก่อนแล้วกัน!)"
10035030-110 = "(ถึงจะไม่รู้ว่าทำไมต้องหยุดด้วยก็เถอะ...!)"
10035030-111 = "(แต่ก็ไม่อยากแพ้นะ!)"
10035030-113 = "นี่! ตรงนั้นน่ะ ถ้าขยับจะถูกปรับแพ้นะ อยากแพ้หรือไง?"
10035030-117 = "เด็กๆ ที่เมื่อกี้วิ่งซนกันเหมือนลิง..."
10035030-118 = "ตอนนี้เรียบร้อยขึ้นกันเป็นกองเลยค่ะ...!"
10035030-119 = "เอาละ อีกรอบนะ ดารุมะซังจะ... ล้มแล้ว~"
10035030-121 = "(หลังจากนั้นฟุบุกิก็เล่นกับเด็กๆ อย่างชำนาญ)"
10035030-123 = "[ns3] \"ฟุบุกิ ยอดเยี่ยมเลยนะ\"\n[ns4] \"ฟุบุกิดูแลเด็กได้เก่งจังเลย\""
10035030-126 = "นี่มันเรื่องพื้นๆ น่า"
10035030-127 = "แทนที่จะไปควบคุมเด็กๆ เราให้พวกเด็กๆ แข่งขันกันจะสนุกกว่า แล้วก็ได้ใช้พละกำลังมากกว่าด้วย"
10035030-128 = "จะเรียกว่าเป็นเคล็ดลับที่ฉันเรียนรู้มาระหว่างรับมือพวกเด็กเจ้าปัญหาระหว่างการลาดตระเวนก็ได้"
10035030-129 = "งะ... งั้นสินะ..."
10035030-130 = "เป็นความรู้ใหม่เลย"
10035030-131 = "จากนี้ก็แค่นอนแช่เท้าแล้วเฝ้าดูเด็กๆ เล่นกันก็พอ"
10035030-132 = "งั้นฉันขอฝากที่เหลือหน่อยได้มั้ย?"
10035030-134 = "ค่ะ! เรื่องสอดส่องดูแลน่ะ ไว้ใจฉันได้เลยค่ะ!"
10035030-135 = "เมื่อกี้ถึงฉันจะประมาทไปจนโดนเล่นงานเข้าให้ แต่มันจะไม่มีครั้งที่ 2 แน่นอนค่ะ!"
10035030-136 = "ถ้างั้นฉันจะไปเฝ้าดูจากฝั่งตรงข้ามนะ"
10035030-137 = "[s] \"ครูจะไปอยู่ข้างๆ คันนะด้วย\""
10035030-138 = "ดีเลยค่ะ งั้นเราแบ่งเป็นกลุ่มละ 2 คน แล้วคอยดูแลเด็กๆ กันคนละฝั่งนะคะ"
10035030-139 = "ถึงคุณครูจะไม่ได้เป็นไลฟ์การ์ดด้วยก็เถอะค่ะ"
10035030-142 = "งานไลฟ์การ์ดไม่ง่ายอย่างที่คิดเลยนะคะ"
10035030-143 = "[s] \"เดี๋ยวก็ทำได้ดีเองนะ\""
10035030-144 = "ก็หวังไว้ให้มันเป็นอย่างนั้นอยู่หรอกค่ะ... แต่บอกตรงๆ ว่าฉันเองก็ยังไม่มั่นใจเลยค่ะ"
10035030-145 = "ถึงเมื่อกี้จะมองว่าเป็นความผิดพลาด แต่ฉันก็ไม่มีความชำนาญเหมือนฟุบุกิค่ะ"
10035030-146 = "[s] \"ไม่ต้องทำหน้าบูดไปหรอกนะ\""

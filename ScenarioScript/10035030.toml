[translation]
10035030-1 = "Episode 3;Playing with Children!"
10035030-2 = "Here it is, our new assignment."
10035030-3 = "This is where the younger children play."
10035030-4 = "It's nice to be indoors, but looking after children isn't easy..."
10035030-5 = "They're so full of energy, it's hard to keep up with them."
10035030-9 = "..."
10035030-10 = "[s1] \"Consider it a fresh start.\"\n[s2]\"Just don't dwell too much on what happened out there.\""
10035030-13 = "Of course, Sensei."
10035030-14 = "I conflated the responsibilities of the Public Peace Bureau and the Public Safety Bureau."
10035030-15 = "I've spent so long protecting the peace, it's just my nature now."
10035030-16 = "That's okay! Everyone makes mistakes!"
10035030-17 = "Nobody starts off perfect."
10035030-18 = "Cheer up, Director."
10035030-19 = "...Thank you."
10035030-20 = "Clearly, you're all more skilled at handling the public than I am."
10035030-21 = "Maybe you could give me some pointers for next time."
10035030-22 = "Sure. For one thing, you've got to work at a steady pace and take regular breaks."
10035030-23 = "She's not asking you how to slack off, Fubuki!"
10035030-24 = "Okay then, just for you, I'll share the three principles they taught me when I first got started."
10035030-26 = "Three principles, you say."
10035030-27 = "This is going to be good."
10035030-29 = "Right, here they are..."
10035030-30 = "\"Service, sensitivity, and sincerity.\""
10035030-31 = "Service! Always think like a servant of the people!"
10035030-32 = "Sensitivity! Listen actively and attentively, whenever a citizen has anything to say."
10035030-33 = "Sincerity! Don't help because you have to, help because you genuinely want to."
10035030-34 = "Our last quarterly evaluation had a quiz on those principles. I passed with flying colors."
10035030-35 = "Then she bombed the shooting test—"
10035030-36 = "Let's not talk about that!"
10035030-37 = "And one more thing."
10035030-38 = "There's more?"
10035030-39 = "It's not one of the three principles, but there is a fourth S. I learned it on the job."
10035030-40 = "Smile."
10035030-41 = "Smile...?"
10035030-42 = "That's right. No matter what the situation is, I always try to lead off with a smile."
10035030-43 = "Most of the time, people smile back, and then we both feel better."
10035030-44 = "Got it. I'll keep that in mind."
10035030-45 = "Ok, then! Let's go say hi to the kids."
10035030-49 = "This is a kids' pool, all right."
10035030-50 = "It's not even waist deep."
10035030-51 = "I'm not much of a swimmer, but I could rescue anybody in here!"
10035030-52 = "Plus the kids are all adorable!"
10035030-53 = "Hey, we've got a newcomer!"
10035030-54 = "Heehee, how should we play with this one?"
10035030-55 = "H-Huh?"
10035030-56 = "I'm getting red flags here..."
10035030-57 = "Hey, you in the yellow swimsuit! Don't run around like that! It's dangerous!"
10035030-58 = "Heehee! This way!"
10035030-59 = "Come back here, would you?"
10035030-63 = "Officer Kirino, watch out!"
10035030-65 = "Gotcha! Spinebuster!"
10035030-72 = "Oof!"
10035030-77 = "Wow, that was perfectly executed."
10035030-78 = "The kid's got potential."
10035030-79 = "*glub* *glub* *gasp*"
10035030-80 = "F-Fubuki! Help!"
10035030-81 = "Just stand up, Kirino."
10035030-82 = "...Oh. Waist-deep water, right."
10035030-83 = "Ahh! The witch came back to life!"
10035030-84 = "Get her! Get her!"
10035030-85 = "Hey! Quit splashing me! I can't keep my eyes open!"
10035030-86 = "Don't think I'm just going to stand here and take this!"
10035030-87 = "Hey! Hey!"
10035030-91 = "..."
10035030-92 = "[s] \"Heh, this seems like a pretty even fight.\""
10035030-93 = "It does, doesn't it?"
10035030-94 = "I guess I have to step in here."
10035030-95 = "What do you have in mind?"
10035030-98 = "Everyone! Attention, please!"
10035030-99 = "Who's that?"
10035030-100 = "She looks kinda dorky, doesn't she?"
10035030-101 = "Starting now...we're gonna play \"Red Light, Green Light\"!"
10035030-102 = "\"Red Light, Green Light\"?"
10035030-103 = "Let's see who gets the farthest."
10035030-104 = "(They're not just going to drop everything and play that with her.)"
10035030-105 = "The winner will earn an extra ten points!"
10035030-106 = "(What \"points\"? The kids aren't going to go for that...)"
10035030-107 = "All right, round one, here we go!"
10035030-108 = "Green Light! ...Red Light!"
10035030-109 = "(…O-Okay, I froze!)"
10035030-110 = "(I don't even know why we're doing this, but...)"
10035030-111 = "(...I don't want to lose!)"
10035030-113 = "Hey, you! If you move, you're out. Are you okay with that?"
10035030-117 = "These kids were just running around like maniacs..."
10035030-118 = "...and now they're completely docile."
10035030-119 = "All right, Green Light! Annnd...Red Light!"
10035030-121 = "Fubuki kept on playing with the kids, so well that she made it look easy."
10035030-123 = "[ns3] \"Fubuki, you're amazing!\"\n[ns4] \"You're really great with kids.\""
10035030-126 = "Eh, it's pretty basic, really."
10035030-127 = "Kids like competition, AND it wears them out. Way easier than trying to push them around by force."
10035030-128 = "It's a trick I picked up on patrol, dealing with troublemakers."
10035030-129 = "Ah, I see..."
10035030-130 = "That's a good lesson to learn."
10035030-131 = "Now all we have to do is dip our feet in the water and watch the kids."
10035030-132 = "I think we can all handle that, yeah?"
10035030-134 = "Definitely! I've got this!"
10035030-135 = "I slipped up earlier, but it won't happen again!"
10035030-136 = "And I'll keep watch from the other side."
10035030-137 = "[s] \"I'll go over there with Kanna.\""
10035030-138 = "Sounds good. We'll watch in pairs, from both sides."
10035030-139 = "Technically, you're not a lifeguard, Sensei, but it ought to be fine if we're all here."
10035030-142 = "Phew. Who knew lifeguarding had such a learning curve to it?"
10035030-143 = "[s] \"You'll get the hang of it soon.\""
10035030-144 = "I hope so...but honestly, I feel out of place."
10035030-145 = "Even besides my mistakes, I'm definitely not a natural, like Fubuki."
10035030-146 = "[s] \"It's too early to feel down about it.\""
10035030-148 = "[ns] \"Service, sensitivity, sincerity, and smiles, right?\""
10035030-150 = "Heehee, true enough."
10035030-151 = "All right. I'll apply myself a little harder."
10035030-155 = "*gasp*"
10035030-156 = "*pfft* *cough*"
10035030-157 = "H-Help me!"
10035030-158 = "*cough* *cough*"
10035030-159 = "A child has fallen into the water...!"
10035030-160 = "Wait here, Sensei!"
10035030-165 = "*gasp* *pant*"
10035030-166 = "Are you okay?"
10035030-167 = "*cough* *cough*"
10035030-168 = "Th-There's an alligator in the water! A giant alligator..!"
10035030-169 = "You must have imagined it in all that panic. Take a breath."
10035030-170 = "No, I'm scared of the water now!"
10035030-171 = "I don't want to go back in!"
10035030-172 = "It's okay. I'll keep watch to make sure you don't slip again."
10035030-173 = "[s] \"Kanna, smile. Smile!\""
10035030-174 = "...Right!"
10035030-178 = "Everything's okay now."
10035030-179 = "..."
10035030-180 = "WAAAHHH!"
10035030-188 = "Hm?"
10035030-189 = "[ns] \"(Did her smile just scare the kid back into the water?)\""
10035030-190 = "I'm so scared! I-I want to get out of here! Waaah—!"
10035030-194 = "...Sensei?"
10035030-195 = "Do you really think I can do this?"
10035030-196 = "I've lost my confidence..."

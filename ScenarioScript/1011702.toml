[translation]
1011702-1 = "Girl in the Train"
1011702-2 = "出差列車的客室"
1011702-4 = "[ns]「……好無聊哦。」"
1011702-5 = "（正因無事可做而感到無聊的時候……）"
1011702-11 = "驗票～開始～"
1011702-12 = "各位乘客～把票拿出來吧～"
1011702-16 = "[ns]「光……？」"
1011702-34 = "咦～老師～？"
1011702-35 = "[s1]「你好啊，光。真巧呢。」\n[s2]「你正在工作啊。」"
1011702-38 = "嗯～光正在努力～"
1011702-39 = "老師在出差對吧～？"
1011702-40 = "光驗完票馬上回來～等等我～"
1011702-45 = "[ns]「馬上回來……？」"
1011702-47 = "（過了不久……）"
1011702-53 = "哇！！"
1011702-57 = "[ns]「哎唷，嚇我一跳。」"
1011702-58 = "老師～嚇到了吧～"
1011702-59 = "[s]「你這麼快就回來啦。」"
1011702-60 = "嗯嗯～光是驗票專家～"
1011702-61 = "老師一個呼吸就能驗完了～"
1011702-67 = "來吧～現在要玩什麼呢～"
1011702-68 = "[s]「要一起玩嗎……！」"
1011702-69 = "啊～來一起吃這個～"
1011702-73 = "開心棒～燃燒彈口味～"
1011702-74 = "[s3]「……燃燒彈口味？」\n[s4]「零食怎麼會有那種口味？」"
1011702-77 = "你吃看看～真的是那個味道哦～"
1011702-82 = "[ns5]「原來燃燒彈口味是這麼回事……」\n[ns6]「咳咳，咳咳……真是前所未有的體驗呢……」"
1011702-85 = "嗯～辣辣的很好吃～"
1011702-86 = "吃完之後～接下來是這個～"
1011702-90 = "照明彈口味跳跳糖～還是限定版哦～"
1011702-91 = "原味是很酸～這個是超超酸～"
1011702-95 = "老師嘴巴打開～啊～"
1011702-96 = "[s]（好可怕……）"
1011702-100 = "[ns]「啊～」"
1011702-104 = "[ns]「唔啊！好酸！！真的有夠酸的啦！！」"
1011702-105 = "老師的臉皺成一團～跟壓扁的鋁罐一樣～"
1011702-106 = "[s]「光也張開嘴巴，啊～！」"
1011702-107 = "啊～"
1011702-111 = "……"
1011702-112 = "酸酸的～"
1011702-113 = "[s]「表情怎麼這麼平靜！？」"
1011702-114 = "因為光不怕酸～"
1011702-115 = "[s7]「不怕酸？」\n[s8]「好不甘心！居然只有我中招！」"
1011702-119 = "（就這樣和光一起享用各種零食，度過乘車的時光）"
1011702-126 = "[ns]「話說光……」"
1011702-130 = "[ns]「你一直待在這邊玩沒關係嗎？」"
1011702-132 = "嗯～光為了和老師玩，已經下班了～"
1011702-133 = "[s9]「還能這樣嗎！？」\n[s10]「好羨慕……老師好羨慕啊……！」"
1011702-136 = "現在的光是無敵的～"
1011702-137 = "老師也下班吧～不會怎樣的～"
1011702-138 = "[s]「我也是很想這麼做……」"
1011702-139 = "老師好可憐～還要工作～"
1011702-140 = "不過光要繼續玩～"
1011702-142 = "（於是光就這樣盡情玩到了終點站……）"

[translation]
1011702-1 = "Girl in the Train"
1011702-2 = "ในห้องโดยสารบนรถไฟที่นั่งไปทำงาน"
1011702-4 = "[ns] \"เบื่อจังเลย...\""
1011702-5 = "(ในขณะที่คุณครูรู้สึกเบื่อๆ เพราะไม่มีอะไรทำ...)"
1011702-11 = "เริ่มตรวจตั๋วละนะ"
1011702-12 = "ผู้โดยสาร เตรียมตั๋วกันด้วย"
1011702-16 = "[ns] \"ฮิคาริเหรอ...?\""
1011702-34 = "เอ๋ คุณครู?"
1011702-35 = "[s1] \"สวัสดี ฮิคาริ ได้เจอกันบนรถไฟเหรอเนี่ย\"\n[s2] \"สวัสดี ฮิคาริ ทำงานอยู่สินะ\""
1011702-38 = "อื้อ ฮิคาริกำลังตั้งใจทำงานเลย"
1011702-39 = "คุณครูนั่งรถไฟไปดูงานเหรอ?"
1011702-40 = "ฉันขอรีบไปทำงานก่อน รอเดี๋ยวนะ"
1011702-45 = "[ns] \"จะมาหาเหรอ...?\""
1011702-47 = "(ครู่ต่อมา...)"
1011702-53 = "ย้าห์!!"
1011702-57 = "[ns] \"ว้าก ตกใจหมดเลย\""
1011702-58 = "คุณครู ตกใจเลยล่ะสิ?"
1011702-59 = "[s] \"ทำไมมาเร็วจัง?\""
1011702-60 = "อื้อ ก็ฮิคาริตรวจตั๋วเร็วไง"
1011702-61 = "ระหว่างคุณครูนั่งพักหายใจ ฉันก็เคลียร์ตั๋วหมดแล้วละ"
1011702-67 = "เอาละ งั้นเราเล่นอะไรกันดี?"
1011702-68 = "[s] \"มาเล่นด้วยหรอกเหรอ...!\""
1011702-69 = "อ๊ะ กินอันนี้กันเถอะ"
1011702-73 = "ขนมแท่ง รสระเบิดเพลิง"
1011702-74 = "[s3] \"รสระเบิดเพลิง...?\"\n[s4] \"ทำไมถึงมีขนมรสแบบนั้นด้วย?\""
1011702-77 = "ลองกินดูสิ มันเป็นรสแบบนั้นจริงๆ นะ"
1011702-82 = "[ns5] \"ระเบิดเพลิงมีรสชาติแบบนี้สินะ...\"\n[ns6] \"แค่ก... แค่ก... เปิดโลกเลยนะเนี่ย...\""
1011702-85 = "อื้อ มันอร่อยตรงที่มันเผ็ดนี่ละ"
1011702-86 = "ถ้ากินหมดแล้ว ก็ต้องต่อด้วยอันนี้"
1011702-90 = "ลูกอมป๊อปป๊อปลิมิเต็ด รสพลุแฟลร์"
1011702-91 = "ปกติมันก็เปรี้ยวมากอยู่แล้ว แต่อันนี้เห็นว่าเปรี้ยวจนตาปิดเลยละ"
1011702-95 = "อ้าปากสิ คุณครู อ้า..."
1011702-96 = "[s] (น่ากลัวจัง...)"
1011702-100 = "[ns] \"อ้า...\""
1011702-104 = "[ns] \"อึก! เปรี้ยว!! เปรี้ยวจัดเลย!!\""
1011702-105 = "ดูหน้าคุณครูสิ หน้าบิดเบี้ยวเหมือนกระป๋องเครื่องดื่มที่บู้บี้เลย"
1011702-106 = "[s] \"ฮิคาริก็กินด้วยกันสิ อ้าม...\""
1011702-107 = "อ้าม..."
1011702-111 = "..."
1011702-112 = "เปรี้ยวเนอะ"
1011702-113 = "[s] \"แต่ทำไมทำหน้าปกติเลยล่ะ?!\""
1011702-114 = "ฮิฮาริ ฮอบฮิน เฮี่ยวๆ"
1011702-115 = "[s7] \"ฮิคาริชอบกินเปรี้ยวๆ?\"\n[s8] \"อะไรเนี่ย! แกล้งครูงั้นเหรอ!\""
1011702-119 = "(แล้วคุณครูก็กินขนมต่างๆ กับฮิคาริ)"
1011702-126 = "[ns] \"นี่ ฮิคาริ...\""
1011702-130 = "[ns] \"จะมานั่งกินขนมอยู่แบบนี้ได้เหรอ?\""
1011702-132 = "อื้อ ฮิคาริอยากมานั่งเล่นกับคุณครู ก็เลยเลิกงานแล้ว"
1011702-133 = "[s9] \"ทำแบบนี้ก็ได้เหรอ?!\"\n[s10] \"อิจฉาจัง... อิจฉาสุดๆ...!\""
1011702-136 = "ตอนนี้ฮิคาริไม่มีงาน"
1011702-137 = "คุณครูก็เลิกงานได้แล้วน่า"
1011702-138 = "[s] \"ครูก็อยากทำแบบนั้นหรอกนะ...\""
1011702-139 = "น่าสงสารคุณครูจัง ยังต้องทำงานอยู่อีก"
1011702-140 = "แต่ฮิคาริจะนั่งเล่นต่อ"
1011702-142 = "(แล้วฮิคาริก็มานั่งอู้งาน แล้วเล่นสนุกไปจนถึงสถานีสุดท้าย...)"

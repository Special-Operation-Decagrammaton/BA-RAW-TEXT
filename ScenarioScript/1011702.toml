[translation]
1011702-1 = "Girl on the Train"
1011702-2 = "Business Train Cabin"
1011702-4 = "[ns] \"...I'm bored.\""
1011702-5 = "There wasn't much to do on the train."
1011702-11 = "Ticket check, starting now."
1011702-12 = "Tickets, everybody."
1011702-16 = "[ns] \"Hikari...?\""
1011702-34 = "Huh? Sensei?"
1011702-35 = "[s1] \"Nice to see you.\"\n[s2] \"Working, huh?\""
1011702-38 = "Yup. That's Hikari, working hard."
1011702-39 = "You on a business trip, Sensei?"
1011702-40 = "I'll be back soon. Wait here."
1011702-45 = "[ns] \"Back soon...?\""
1011702-47 = "After some time..."
1011702-53 = "Booga-booga!"
1011702-57 = "[ns] \"Oh! You surprised me.\""
1011702-58 = "Got the drop on you, Sensei."
1011702-59 = "[s] \"You must've finished taking tickets fast.\""
1011702-60 = "Yuppies. Hikari is a ticket-taking master."
1011702-61 = "Done in a blink of Sensei's eye."
1011702-67 = "So what're we playing?"
1011702-68 = "[s] \"We're playing?\""
1011702-69 = "Ah, I know. Let's share some of these."
1011702-73 = "Fun Sticks. Incendiary flavor."
1011702-74 = "[s3] \"...Incendiary?\"\n[s4] \"Why is that a snack flavor?\""
1011702-77 = "Tastes like real napalm. Try it!"
1011702-82 = "[ns5] \"...So this is what napalm tastes like.\"\n[ns6] \"*cough* *cough* It's a new world...\""
1011702-85 = "Right? Nicey-spicey!"
1011702-86 = "Now try this one."
1011702-90 = "Pop-Pop Candy, flare flavor. Limited edition."
1011702-91 = "Usually, it's sour. This is SUUUPER sour."
1011702-95 = "C'mon, Sensei. Say ah."
1011702-96 = "[s] \"(This is scary...)\""
1011702-100 = "[ns] \"...Ah...\""
1011702-104 = "[ns] \"Ugh! SOOO SOUR!!\""
1011702-105 = "You've got crumply face. Like an empty juice box."
1011702-106 = "[s] \"Your turn, Hikari! Say ah!\""
1011702-107 = "Ah..."
1011702-111 = "..."
1011702-112 = "Sour..."
1011702-113 = "[s] \"Huh. YOUR face didn't crumple up.\""
1011702-114 = "*chew* Um gud wiff harr foob."
1011702-115 = "[s7] \"You're good with sour food?\"\n[s8] \"You got me! That's no fair!\""
1011702-119 = "I continued to try different snacks with Hikari."
1011702-126 = "[ns] \"By the way, Hikari...\""
1011702-130 = "[ns] \"Is it okay for you to keep playing like this?\""
1011702-132 = "Yup. Clocked out just to play with you."
1011702-133 = "[s9] \"You can do that?!\"\n[s10] \"I'm jealous... I'm so jealous...!\""
1011702-136 = "Right now, Hikari is invincible."
1011702-137 = "You should clock out too. Easy."
1011702-138 = "[s] \"I'd love to, but...\""
1011702-139 = "Aww, poor Sensei has to work..."
1011702-140 = "...Hikari gets to keep playing, though."
1011702-142 = "And so, for the rest of my commute, Hikari continued to play to her heart's content."

[translation]
22050-1 = "第5話;～愛麗絲和被引導的人們～（２）"
22050-2 = "第19號千年廣場"
22050-3 = "（之後也和愛麗絲繼續一起冒險）"
22050-4 = "下一個地區是這裡！"
22050-11 = "愛麗絲感覺的到……這裡有新道具的氣息！"
22050-12 = "那麼就開始探……"
22050-14 = "啊，是愛麗絲醬～"
22050-21 = "今天在做什麼呢？一樣是武士修行？"
22050-22 = "不是武士修行，是勇者修行。#n今天是見習勇者的版本！"
22050-23 = "那有什麼不同嗎……？我不是很清楚。"
22050-24 = "旁邊的人是誰？大人？"
22050-25 = "老師是老師哦！#n是勇者隊伍的吉祥物。"
22050-26 = "[s1]「妳好，我是夏萊的老師。」\n[s2]「妳好，我是勇者隊伍的吉祥物。」"
22050-29 = "老師是，夏萊的……？"
22050-30 = "是個散發神奇氛圍的人呢……#n說是吉祥物，好像可以理解……"
22050-31 = "……是，是嗎？"
22050-32 = "算了無所謂。#n愛麗絲醬，今天的冒險也加油哦～"
22050-33 = "嗯！愛麗絲，收到大家的鼓勵成功充電了！"
22050-34 = "（就這樣在千年裡面四處走著，獲得路過學生們的鼓勵）"
22050-36 = "千年．第11號大講堂"
22050-37 = "嗯？那不是愛麗絲嗎？"
22050-38 = "愛麗絲，呀齁～#n今天也在做任務嗎？"
22050-39 = "是的！今天正在進行柚子委託的任務。"
22050-40 = "嗯～這樣啊？"
22050-41 = "那，這個。可以幫我拿到講堂嗎？"
22050-42 = "那個，這是任務嗎？"
22050-43 = "嗯。報酬是這個！#n在三一有名的甜點店裡買來的蒙布朗！"
22050-44 = "怎麼這樣，真狡猾！"
22050-45 = "那，如果完成這個任務的話，我就給妳巧克力球！"
22050-46 = "好！解任務是愛麗絲的專長！#n交給愛麗絲吧！"
22050-47 = "（或是以任務報酬的名義獲得零食作為禮物）"
22050-49 = "呣呣！在那裡的難道是──"
22050-56 = "啊啊，是老師和愛麗絲啊。"
22050-57 = "呀齁。"
22050-59 = "大，大家好！"
22050-63 = "[ns]「你們好呀，工程師部出現在這裡真是少見呢。」"
22050-64 = "老師對我們的行程很有興趣呢！"
22050-65 = "好！就讓我來說明一下吧！#n我們工程師部今天早上7點起床……"
22050-67 = "（少女說明中）"
22050-69 = "……然後就到了這裡！#n我說的對吧，響！詠葉前輩！？"
22050-70 = "啊，嗯，是這樣沒錯。"
22050-71 = "……大概吧？"
22050-72 = "總之，是為了補充不夠的裝備才出來的。"
22050-73 = "呼呣呼呣……每天都製作著新武器的模樣……"
22050-74 = "不愧是製作出光之劍的鐵匠呢！#n愛麗絲！非常感動！"
22050-75 = "武器……？"
22050-76 = "雖，雖然不是很理解……就當成是稱讚的話收下吧。"
22050-77 = "鐵匠……真像是愛麗絲的用字遣詞呢！"
22050-78 = "不過，廣義來說的確是那樣呢。"
22050-79 = "畢竟愛麗絲的武器是工程師部的自信之作……"
22050-83 = "……對了。#n愛麗絲，最近電磁砲的……"
22050-88 = "不對，光之劍的狀態如何？有沒有什麼問題？"
22050-92 = "非常完美！#n對愛麗絲來說，光之劍就是寶物！"
22050-93 = "沒錯，因為是勇者的象徵！一直都很珍惜地使用它！"
22050-94 = "[s]「對愛麗絲來說是無可取代的寶物呢。」"
22050-96 = "[ns]「……雖然偶爾會弄壞天花板是個問題就是了。」"
22050-97 = "咦？那個會是問題嗎？"
22050-98 = "這在千年是常有的事。"
22050-100 = "技術的發展總是伴隨著某種程度的犧牲啊。"
22050-101 = "[s]「……這樣啊。對工程師部來說這是日常啊。」"
22050-102 = "不過，即使如此……"
22050-103 = "能好好愛惜它的話，我們也很開心唷。"
22050-104 = "以後也拜託你了唷，愛麗絲。"
22050-106 = "是！"
22050-108 = "（像這樣，在冒險中得到了鼓勵……）"
22050-109 = "（和愛麗絲的冒險依舊持續──）"
22050-118 = "（還有其他邂逅……）"
22050-120 = "找到妳了，小不點。"
22050-125 = "野，野生的小不點女僕出現了！"
22050-126 = "啊啊？誰是野生的小不點啊！？"
22050-127 = "[s]「咦，寧瑠？」"
22050-128 = "什麼嘛，老師也在啊。"
22050-129 = "這樣正好。#n你們兩個陪我一下吧。"
22050-130 = "咦，咦咦！？愛麗絲還在冒險的途中……"
22050-132 = "好啦，趕快走吧。"
22050-136 = "唔，唔哇啊啊……！？"
22050-137 = "愛麗絲，被小不點女僕捕獲了！#n愛麗絲的冒險到此為止了嗎！？"
22050-138 = "如果要進入BadEnd的話至少要給個CG！"
22050-139 = "妳在說什麼……？"
22050-141 = "話說，小不點女僕是什麼啊！"
22050-142 = "……那愛麗絲該怎麼稱呼妳才好呢？"
22050-143 = "普通地叫前輩就好了吧。"
22050-144 = "來，叫聲寧瑠前輩吧。"
22050-145 = "唔嗯……好，我知道了！"
22050-146 = "小不點寧瑠前輩。"
22050-147 = "把小不點去掉啊！"
22050-148 = "[s]「抱歉啊，寧瑠。我們正在冒險中，有點忙……」"
22050-149 = "啊？你在說什麼？"
22050-150 = "和那種事相比，還有更重要的事吧。"
22050-151 = "[s]「更重要的事……？」"
22050-152 = "啊？那就是──"
22050-156 = "千年．遊戲中心"
22050-163 = "可惡！又輸了！#n咕啊啊──！氣死我了！"
22050-164 = "那個技能到底是什麼鬼啊！？#n不就是套路技嘛！"
22050-165 = "柚子說過套路技也是遊戲的一環！"
22050-166 = "啊？別用那種狡猾的手段啊！"
22050-167 = "唔，唔哇啊啊！？"
22050-168 = "[s]「重要的事是……遊戲？」"
22050-169 = "啊？"
22050-170 = "那當然！#n我已經決定了，今天一定要向那個小不點復仇。"
22050-171 = "上次是我大意了……"
22050-172 = "但今天的我已經不一樣了。我可是練習過Combo了啊！"
22050-174 = "愛麗絲記得，寧瑠前輩的那句話……上週也有聽過。"
22050-176 = "妳說什麼！？"
22050-177 = "（儘管一直在鬥嘴，兩人依然玩著對戰遊戲）"
22050-194 = "[ns]「妳們兩個常常對戰嗎？」"
22050-195 = "是的……因為寧瑠前輩常常來挑戰，所以愛麗絲只能接受。"
22050-196 = "啊？這樣不就像是我強迫妳陪我玩一樣嗎。"
22050-197 = "[s]「咦？不是嗎？」"
22050-198 = "才不是勒！？"
22050-199 = "只是想知道這傢伙跟遊戲開發部傢伙們在做的東西究竟是什麼。"
22050-200 = "在調查的途中，對戰過幾次而已。"
22050-201 = "但是，根據愛麗絲的記憶，跟寧瑠前輩的對戰，今天已經是第50次了。"
22050-202 = "……只是碰巧都有時間而已。"
22050-203 = "[s]「寧瑠……意外的喜歡遊戲呢。」"
22050-204 = "是的，根據愛麗絲的經驗，寧瑠前輩非常喜歡遊戲。"
22050-205 = "常常來遊戲開發部用綠的PrayStation玩遊戲。"
22050-206 = "順帶一提，至今為止的戰績是50戰50勝。愛麗絲連勝中。"
22050-208 = "寧瑠前輩的遊戲實力還差得遠呢！#n要是再多練習一下Combo的話，像剛才也是……"
22050-209 = "[s]「……真的很喜歡呢。」"
22050-210 = "可惡，都在說些什麼啊！！真囉嗦！！"
22050-211 = "再一局！再來一局吧！"
22050-212 = "是，是……還要再來……？"
22050-213 = "要玩到我贏了為止。#n趕快，順便教我Combo吧。"
22050-214 = "怎麼這樣……居然要到寧瑠前輩贏了為止……#n愛麗絲……到傍晚都回不去了……"
22050-215 = "這要看妳怎麼教吧！？"
22050-221 = "（於是，寧瑠和愛麗絲的對戰再次展開──）"
22050-222 = "可惡！？這，這傢伙！"
22050-233 = "寧瑠前輩……亂按一通的話是打不出Combo的……要一個一個好好按才行！"
22050-234 = "我，我知道啦！"
22050-241 = "（像這樣，兩個人持續玩著遊戲……）"
22050-246 = "唔，唔哇啊！#n寧，寧瑠前輩的Combo都連不起來……"
22050-247 = "這樣下去的話，愛麗絲和老師的空腹槽都會歸零的……"
22050-248 = "呿，可惡，重來一次！"
22050-249 = "（儘管寧瑠嘴上罵著，卻沒有停下遊戲，而愛麗絲就像被寧瑠的熱情壓迫著般，#n　持續著格鬥遊戲的教學……）"
22050-265 = "……可惡啊，感覺差一點就能接上了的說。"
22050-266 = "……（猶豫猶豫）"
22050-271 = "咕啊啊……！#n再一局。可以吧？"
22050-272 = "是，是！"
22050-273 = "（在那裡，透過遊戲漸漸互相加深對彼此瞭解的兩人的模樣──）"
22050-293 = "[ns]「啊……」"
22050-294 = "…………"
22050-295 = "可惡！看招！接上吧！"
22050-296 = "啊，唔……那個……"
22050-297 = "喂，妳這傢伙！視線不要離開畫面！"
22050-298 = "快看我華麗的Combo……"
22050-299 = "──我還以為會在哪裡偷懶呢……"
22050-300 = "原來您在這種地方啊，部長。"
22050-302 = "嗚哇！朱，朱音！？#n什麼時候來的！？"
22050-303 = "我說過了吧？"
22050-304 = "今天要傳達會長指派的任務，所以請做好準備──"
22050-305 = "……啊。"
22050-306 = "[s]「看來是忘了啊……」"
22050-307 = "不，不是！#n玩完這個就……"
22050-318 = "喂！？"
22050-319 = "是愛麗絲完美的勝利！"
22050-320 = "剛才那是犯規吧！"
22050-321 = "比賽的世界是非常殘酷的。要隨時保持最佳狀態才行。"
22050-322 = "還是說，寧瑠前輩在戰鬥中因為分心而輸掉的話，也會說剛才的不算嗎？"
22050-323 = "嘿……挺會說的嘛……"
22050-324 = "很好！妳的挑戰……！"
22050-326 = "遊戲1天只能玩1小時。#n我們，約好了對吧？"
22050-327 = "來，要回去執行任務了唷部長。#n再這樣下去可不行唷？"
22050-328 = "啊，等等啊朱音！只要再一下就……！"
22050-335 = "[ns]（根本是蹺了課的……）"
22050-337 = "……哎呀，老師？#n有什麼事嗎？"
22050-338 = "[s]「沒事……」"
22050-340 = "可惡，給我記住！#n──下次我一定會贏。"
22050-341 = "對對，下次一定。#n快點走吧。"
22050-346 = "那我們就先告辭了。#n老師、愛麗絲醬。"
22050-358 = "（和愛麗絲從遊戲中心出來時，太陽已經下山了）"
22050-359 = "[s]「話說回來，愛麗絲。」"
22050-360 = "嗯？"
22050-361 = "[s3]「愛麗絲不是很怕寧瑠嗎？」\n[s4]「我以為妳很怕寧瑠……」"
22050-369 = "（儘管如此，愛麗絲也和寧瑠玩得很開心）"
22050-370 = "（難道是我誤會了……？）"
22050-371 = "啊，那個……"
22050-372 = "的確，寧瑠前輩曾經是敵人……但現在是夥伴。"
22050-373 = "根據桃井的說法，寧瑠前輩變弱的機率很高。"
22050-374 = "所以愛麗絲已經不再害怕寧瑠前輩了。"
22050-375 = "[s]「桃井說了那種話……要是被寧瑠聽到的話會生氣的唷。」"
22050-376 = "當，當然，愛麗絲還是對女僕裝有點陰影……"
22050-377 = "但至少現在……"
22050-383 = "嗯，寧瑠前輩也是夥伴！"
22050-384 = "跟愛麗絲、跟大家一起玩遊戲的夥伴……"
22050-385 = "不過，跟寧瑠前輩玩遊戲的時候不能冒險，讓我有點困擾……"
22050-386 = "所以跟老師一起冒險的今天……那個……"
22050-387 = "[s]（啊……所以才會躲著寧瑠……）"
22050-389 = "[ns]「今天的冒險，我也很開心唷。」"
22050-390 = "！！"
22050-391 = "真的嗎？"
22050-392 = "[s]「愛麗絲覺得今天的冒險怎麼樣呢？」"
22050-394 = "（一整天在千年四處走著，得知了愛麗絲平時過著什麼樣的生活）"
22050-402 = "（遇見各式各樣的學生、）"
22050-408 = "（受到大家的疼愛、）"
22050-420 = "（努力在這裡冒險的愛麗絲……）"
22050-422 = "愛麗絲……"
22050-427 = "愛麗絲今天和老師一起冒險也很愉快！"
22050-428 = "那個，雖然遺憾地沒有好好推進柚子給的任務……"
22050-429 = "不過愛麗絲是勇者。#n勇者是不會放棄的！"
22050-435 = "雖然還只是見習勇者，但之後也會完成任務，提昇許多等級……"
22050-436 = "總有一天，會用這把光之劍打倒威脅世界的魔王！"
22050-441 = "在那一天到來之前……可以和愛麗絲一起冒險嗎，老師？"
22050-443 = "[s]「嗯，當然。」"
22050-450 = "（於是，今天結束──）"
22050-451 = "（千年平凡的日常將持續下去）"
22050-452 = "（──以為，會持續下去）"
22050-455 = "下一話;不可思議的機器（１）"

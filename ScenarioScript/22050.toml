[translation]
22050-1 = "Episode 5; Guided by Aris 2"
22050-2 = "Millennium Plaza No. 19"
22050-3 = "My adventure with Aris continued."
22050-4 = "This is the location of our next event!"
22050-11 = "I can sense the presence of new items here!"
22050-12 = "Let us explore, Sensei."
22050-14 = "Oh, it's Aris."
22050-21 = "What's up? How are you doing today?"
22050-22 = "I am doing hero training! Today is a special apprentice hero edition."
22050-23 = "I don't know what the difference is...but that's cool."
22050-24 = "Who's that adult with you, though?"
22050-25 = "That is Sensei, mascot of the hero party."
22050-26 = "[s1] \"Hello, I'm Sensei, from Schale.\"\n[s2] \"Hello, I'm the mascot of the hero party.\""
22050-29 = "You're that Schale Sensei?"
22050-30 = "It's my first time seeing you in person. I can understand why you're the mascot..."
22050-31 = "...You can?"
22050-32 = "Anyway, Aris, good luck on your adventure!"
22050-33 = "Thank you! My energy has been refilled thanks to your support."
22050-34 = "Aris received support from many different students as we walked around the Millennium campus."
22050-36 = "Millennium Lecture Hall No. 11"
22050-37 = "Huh? Is that Aris over there?"
22050-38 = "Aris, hi! Are you working on a quest or something?"
22050-39 = "Yes, today I am on an adventure for a quest I received from Yuzu."
22050-40 = "That's cool!"
22050-41 = "Then while you're at it, can you take this to the lecture hall in the next building?"
22050-42 = "*gasp* Is this a side quest?"
22050-43 = "Yes. If you take it there, I'll give you this Mont Blanc from a famous dessert shop in Trinity as a reward!"
22050-44 = "Seriously?! That's all you're gonna give her?"
22050-45 = "I'll give you these chocolate balls I bought from the convenience store too!"
22050-46 = "Okay! Quests are my specialty! Let me take care of it!"
22050-47 = "She received many sweets as rewards for completing side quests."
22050-49 = "Oh? Is that who I think it is?"
22050-56 = "It is. Hello, Sensei. Hi, Aris."
22050-57 = "Hey there."
22050-59 = "Hello everyone!"
22050-63 = "[ns] \"Hi you all. What's the Engineering Department doing here?\""
22050-64 = "Oh! Are you interested in our schedule, Sensei?"
22050-65 = "Okay! I'll explain! The Engineering Department woke up at seven AM this morning..."
22050-67 = "Kotori related the events of the day at length and in great detail."
22050-69 = "...And, that's how we ended up here! A series of extraordinary events. Right, Hibiki? Utaha?"
22050-70 = "What? Oh, yeah. I guess."
22050-71 = "...I think? I wasn't paying attention."
22050-72 = "In short, we came out to get more equipment for the Engineering Department."
22050-73 = "Wow. You are crafting new armaments every day."
22050-74 = "That makes sense! You are the great blacksmith of steel who forged the Sword of Light! I admire you so much!"
22050-75 = "Armaments...?"
22050-76 = "I don't quite understand, but thank you."
22050-77 = "A blacksmith... That's such an antiquated term that only Aris can pull off!"
22050-78 = "Well, in a way, it's not the wrong idea."
22050-79 = "Aris' weapon is an ambitious project created by the Engineering Department..."
22050-83 = "By the way, Aris, how's the railgun..."
22050-88 = "I mean, how's the Sword of Light working out for you?"
22050-92 = "Yes! The Sword of Light is my treasure! It is the symbol of a hero!"
22050-93 = "I shall always cherish it!"
22050-94 = "[s] \"It's one of her most prized possessions now.\""
22050-96 = "[ns] \"The problem is that she sometimes destroys ceilings with it.\""
22050-97 = "Huh? Is that a problem?"
22050-98 = "It happens all the time at Millennium."
22050-100 = "Advancement in technology comes at a cost."
22050-101 = "[s] \"...Right. That's nothing out of the ordinary at the Engineering Department.\""
22050-102 = "Ahem. Anyway."
22050-103 = "We're glad you're making good use of it."
22050-104 = "Please continue to take good care of the Sword of Light."
22050-106 = "Yes, ma'am!"
22050-108 = "Aris received heaps of encouragement all throughout our adventure."
22050-109 = "We continued to forge a path forward together, not hesitating for even one moment."
22050-118 = "And the random encounters happened again and again."
22050-120 = "I finally found you, kid."
22050-125 = "Th-The wild little maid showed up! Eek!"
22050-126 = "Huh? How dare you call me a wild little maid!"
22050-127 = "[s] \"Oh? Neru?\""
22050-128 = "What are you doing here, Sensei?"
22050-129 = "It doesn't matter. Since you're both here, come hang out with me."
22050-130 = "R-Right now? But I am currently on an adventure..."
22050-132 = "I don't care. Off we go."
22050-136 = "Wha...?"
22050-137 = "I have been captured by the little maid! Is this the end of my adventure?!"
22050-138 = "I would at least like to have a cutscene if it is game over!"
22050-139 = "There you go, talking nonsense again."
22050-141 = "And how many times do I have to tell you?! Don't call me the little maid!"
22050-142 = "...Then what shall I call you instead?"
22050-143 = "Neru! Just call me Neru!"
22050-144 = "I'm your upperclassman, you know?!"
22050-145 = "Okay. Understood."
22050-146 = "Little upperclassman Neru."
22050-147 = "Lose the \"little\"!"
22050-148 = "[s] \"Wait, Neru. We're on a hero's adventure, so we're busy...\""
22050-149 = "A hero's adventure?! Huh?"
22050-150 = "There's something more important than that dumb thing right now!"
22050-151 = "[s] \"Something more important...?\""
22050-152 = "Ugh. You're hopeless!"
22050-156 = "Millennium Arcade"
22050-163 = "Argh! I lost again! Argh! I'm so pissed off! What was that move?!"
22050-164 = "Was that some kind of trick?!"
22050-165 = "Yuzu says tricks are part of the gameplay!"
22050-166 = "What?! That's so irritating!"
22050-167 = "Wh-What the...?!"
22050-168 = "[s] \"This is what's important...? Playing games at the arcade?\""
22050-169 = "Huh?"
22050-170 = "Of course! I'm going to take revenge on this kid today!"
22050-171 = "Last time she might have kicked my butt because she caught me off guard..."
22050-172 = "But it's gonna be different this time! I've been studying combos! I promise I will avenge myself!"
22050-174 = "I remember you also saying that last Sunday, Neru."
22050-176 = "What did you say?!"
22050-177 = "The two bickered for a while as they were immersed in the game."
22050-194 = "[ns] \"Umm... Do you guys play this often?\""
22050-195 = "Yes... Neru challenges me like this all the time, so I have no choice but to go along with it."
22050-196 = "Wh-What are you saying? You make it sound like I beg you to play!"
22050-197 = "[s] \"Is that not true?\""
22050-198 = "No!"
22050-199 = "I just wanted to know what these games the kid and the Game Development Department play all the time were about."
22050-200 = "I play a few rounds here and there, that's all!"
22050-201 = "According to my memory, this is the fiftieth fight with Neru."
22050-202 = "...They've simply accumulated over time, that's all!"
22050-203 = "[s] \"Neru... I didn't know you liked games so much.\""
22050-204 = "Yes, based on my experience, Neru loves games very much."
22050-205 = "She often visits the Game Development Department to play games on Midori's FlyStation."
22050-206 = "For reference, my record so far is fifty wins out of fifty games. I am on a winning streak."
22050-208 = "Neru still has a long way to go as a gamer! She should be using combos like this..."
22050-209 = "[s] \"...I think you really like games.\""
22050-210 = "Wh-What! Ack! I don't care that much!"
22050-211 = "Whatever! One more round! One more round!"
22050-212 = "H-Huh...? Again...?"
22050-213 = "Yeah! Until I win! So, you might as well teach me that combo you mentioned earlier."
22050-214 = "No way... Until you win...? That means I will not be able to go back to the club room until the evening..."
22050-215 = "Teach me so I can win!"
22050-221 = "They caused quite a scene as they played together."
22050-222 = "Ugh! Wh-What was that?!"
22050-233 = "Neru! You cannot just mash the buttons. You must carefully time each one!"
22050-234 = "I-I know!"
22050-241 = "At first they were full of energy, fighting and having fun, but as time dragged on..."
22050-246 = "Argh! Neru, you are still not linking your combo correctly!"
22050-247 = "At this rate, the hunger gauge of Sensei and I will be completely drained..."
22050-248 = "Hmph! Again! From the beginning!"
22050-249 = "They argued, complained, and yelled at each other, but..."
22050-265 = "...Ugh, that was close. Just a little more and I would have pulled off an incredible combo."
22050-266 = "..."
22050-271 = "Argh! Okay! One more round, okay?"
22050-272 = "Y-Yes!"
22050-273 = "The more they played the game, the more they seemed to come to understand each other."
22050-293 = "[ns] \"Wow...\""
22050-294 = "..."
22050-295 = "Hey! How about this?! I'll show you my secret combo!"
22050-296 = "Ah! Um...!"
22050-297 = "Hey, pay attention! Don't wander away from the screen!"
22050-298 = "If you let your guard down, my flashy combo will annihilate your character..."
22050-299 = "Oh dear. I was wondering where Neru could have wandered off to after abandoning our mission."
22050-300 = "And here she is."
22050-302 = "A-Akane?! What're you doing here?"
22050-303 = "I told you."
22050-304 = "We are receiving a mission directly from the president later today, so we need to prepare."
22050-305 = "Ah."
22050-306 = "[s] \"You forgot...\""
22050-307 = "N-No! I was gonna go soon, right after I win this game...!"
22050-318 = "Huh?!"
22050-319 = "Perfect victory!"
22050-320 = "W-Wait! That wasn't fair!"
22050-321 = "The world of competition is cold. You must always focus while competing in a game."
22050-322 = "If you lost because you got distracted in the middle of battle, do you expect your opponent to consider it invalid?"
22050-323 = "Hmm... That's...it makes sense..."
22050-324 = "Fine! Let's go again...!"
22050-326 = "Ahem. You promised to only play one hour a day."
22050-327 = "It's time to take care of our mission. You have been slacking around all day."
22050-328 = "C'mon, Akane! Just a little more!"
22050-335 = "[ns] \"(It's like a mother coming to admonish a lazy child.)\""
22050-337 = "Sensei? What was that expression that just crossed your face?"
22050-338 = "[s] \"Nothing...\""
22050-340 = "Argh! You're gonna pay for this next time! I swear I'm gonna beat you!"
22050-341 = "Yes, yes. I'm sure you will. Now, off we go."
22050-346 = "Please excuse us, Sensei and Aris."
22050-358 = "By the time I left the arcade with Aris, it was already evening."
22050-359 = "[s] \"By the way, Aris.\""
22050-360 = "Yes?"
22050-361 = "[s3] \"Weren't you afraid of Neru?\"\n[s4] \"I thought you avoided Neru because you were scared of her...\""
22050-369 = "It seemed like Aris and Neru got along well when playing games together."
22050-370 = "I was curious if I had misunderstood their relationship."
22050-371 = "Oh... You see..."
22050-372 = "Neru used to be my enemy in the past...but now she is an ally..."
22050-373 = "Momoi says there is a chance Neru has become weak."
22050-374 = "Therefore, I am no longer afraid of Neru."
22050-375 = "[s] \"Neru would be mad if she knew Momoi was talking like that again...\""
22050-376 = "Eek! I still find maid costumes to be very scary. I do not want Neru to be mad."
22050-377 = "But now..."
22050-383 = "Neru is my friend!"
22050-384 = "She is a friend who plays games with me..."
22050-385 = "But I also cannot go on adventures and play games with Neru at the same time. It is not optimal."
22050-386 = "I wanted to continue my adventure with Sensei today..."
22050-387 = "[s] \"(Oh, that's why she was trying to avoid Neru...)\""
22050-389 = "[ns] \"Well, today's adventure was really fun.\""
22050-390 = "...!"
22050-391 = "Was it really?"
22050-392 = "[s] \"Did you have fun too?\""
22050-394 = "I was able to get a peek into Aris' daily life as we traversed the Millennium campus."
22050-402 = "She encountered and was known by so many students."
22050-408 = "And all of them seemed to adore her."
22050-420 = "Aris was so passionate about her adventures here, as well as sharing them with the friends she had made."
22050-422 = "I..."
22050-427 = "I really enjoyed the adventure with you today, Sensei!"
22050-428 = "Although I was not able to complete Yuzu's quest today..."
22050-429 = "I am a hero! And heroes do not give up!"
22050-435 = "I am just an apprentice now, but if I keep working on quests and adventures to level up..."
22050-436 = "One day, I will defeat the evil lord that is threatening the world with my Sword of Light!"
22050-441 = "...Will you continue going on adventures with me until then, Sensei?"
22050-443 = "[s] \"Yes, of course.\""
22050-450 = "Today, tomorrow, and far into the future..."
22050-451 = "These happy days with Aris and Millennium would continue forever."
22050-452 = "...At least, that's what I thought."
22050-455 = "Next Episode; A Strange Machine 1"

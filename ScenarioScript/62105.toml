[translation]
62105-4 = "怎麼會……#n天使呢？記載中的末日呢！？"
62105-10 = "也就是說……難道……"
62105-11 = "必須用這雙手……"
62105-16 = "但是……為什麼是我？#n我只不過是……"
62105-17 = "什麼？反而正是因為如此……？"
62105-18 = "唔！？"
62105-25 = "[log]毀壞大地之人與虛偽之人。[/log]"
62105-27 = "[log]以及妄稱其名之人──[/log]"
62105-29 = "[log]如今，毀滅之時即將來臨。[/log]"
62105-32 = "……！？！？！？"
62105-33 = "哈啊……哈啊……"
62105-34 = "（剛才看到的，到底是……？）"
62105-35 = "（不，如果是那樣的話……）"
62105-36 = "……！"
62105-38 = "前輩！"
62105-42 = "嗚哇！？你沒事吧，前輩！？"
62105-43 = "全身都是冷汗……發生什麼事了嗎？"
62105-44 = "沒，沒事……什麼都沒有。"
62105-45 = "話說，現在的情況如何？"
62105-46 = "前線的情況不太穩定，前輩！"
62105-47 = "該，該怎麼辦！？"
62105-48 = "……！"
62105-49 = "請各位先去現場支援吧！"
62105-50 = "可是，對方說只是想談一談……？"
62105-54 = "……"
62105-55 = "那肯定是欺敵的戰術。我們不能上當。"
62105-56 = "請大家回想一下。"
62105-58 = "這一切，都是從老師把三一帶進奧利斯開始的。"
62105-59 = "……！"
62105-60 = "沒，沒錯！應該趁這個機會把老師和小隊徹底趕走！"
62105-61 = "知道了！我會全力以赴的！"
62105-66 = "……我說謊了呢。"
62105-67 = "之後得找機會道歉才行。"
62105-68 = "……"
62105-69 = "腦袋裡有點混亂。#n我原本打算做什麼呢……？"
62105-70 = "……"
62105-72 = "我想要守護這個鳥巢。"
62105-73 = "守護這個，哪怕只有一丁點也好……"
62105-74 = "能讓生活在這裡的雛鳥們……感受到「活著真好」的地方。"
62105-76 = "（是啊）"
62105-77 = "（我想守護我們的巢）"
62105-78 = "（名為奧利斯的，小小的巢穴）"
62105-83 = "前輩……"
62105-84 = "唔……！"
62105-94 = "[log=마이아]前輩不是說過會守護[wa:500]這裡，[wa:500]守護我們的[wa:500]巢穴[wa:500]嗎……？[/log]"
62105-97 = "……"
62105-98 = "（老師他，只是個來毀壞巢穴的人）"
62105-99 = "（而小隊，只不過是拋棄巢穴離開的人）"
62105-100 = "（在他們的背後……無論是否出於本意，想必都有三一的身影）"
62105-101 = "……"
62105-102 = "（我必須守住這裡）"
62105-103 = "（畢竟為了守住這裡──）"
62105-104 = "（我甚至連那個孩子都趕走了）"
62105-110 = "[log]不能逃避責任。[/log]"
62105-113 = "[log]不能逃避責任。[/log]"
62105-117 = "[log]不能逃避責任。[/log]"
62105-120 = "（既然這個局面是我一手造成，那麼接下來──）"
62105-124 = "……"
62105-125 = "（力量）"
62105-126 = "（我需要力量）"
62105-127 = "（不會被任何事物動搖的力量）"
62105-128 = "（如果可以的話，甚至能改寫世界的力量）"
62105-129 = "（只要有這股力量──）"
62105-130 = "[log][FF6666][i]釋放我們的憤怒。[/i][-][/log]"
62105-133 = "……！？"
62105-134 = "[log][FF6666][i]向三一施以懲罰，向格黑娜降下破滅。[/i][-][/log]"
62105-135 = "[log][FF6666][i]讓背叛者受到應得的正當審判。[/i][-][/log]"
62105-138 = "這個聲音是……！"
62105-139 = "[log][FF6666][i]我將賜予你斷罪的權能。[/i][-][/log]"
62105-140 = "[log][FF6666][i]向奧利斯的敵人，吹響滅亡的號角。[/i][-][/log]"
62105-143 = "！！！！！"
62105-145 = "小，小隊好厲害……！#n明明只有四個人而已……！"
62105-146 = "再這樣下去，防線就要被突破了吧！？"
62105-147 = "話說……我們在這裡阻擋老師，真的是正確的嗎……？"
62105-148 = "你也這麼覺得嗎……？"
62105-149 = "老師他，明明是個好的大人……"
62105-150 = "嗯……"
62105-151 = "咦……？喂，等等。#n這，這該不會是……？"
62105-152 = "怎麼突然……？咦咦！？"
62105-159 = "號角聲！？！？"
62105-161 = "下一話;弟子們"

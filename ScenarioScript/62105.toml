62105-60 = "ชะ... ใช่ค่ะ! เราต้องใช้โอกาสนี้ขับไล่คุณครูกับสควอดออกไปให้หมดเลยค่ะ!"
62105-61 = "เข้าใจแล้วค่ะ! ฉันจะพยายามอย่างสุดฝีมือเลยค่ะ!"
62105-66 = "โกหก... สินะ"

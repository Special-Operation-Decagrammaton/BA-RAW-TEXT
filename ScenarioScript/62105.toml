[translation]
62105-4 = "ไม่อยากจะเชื่อเลย... แล้วนางฟ้าล่ะ? จุดจบที่บันทึกไว้ด้วย?!"
62105-10 = "งั้นก็หมายความว่า... อย่าบอกนะว่า..."
62105-11 = "ฉันต้องทำเอง..."
62105-16 = "แต่ว่า... ทำไมต้องเป็นฉันด้วยล่ะคะ? ฉันก็แค่..."
62105-17 = "คะ? ก็เพราะว่าเป็นฉันงั้นเหรอคะ...?"
62105-18 = "อึกก?!"
62105-25 = "[log]คนที่ทำลายโลก คนโป้ปดมดเท็จ[/log]"

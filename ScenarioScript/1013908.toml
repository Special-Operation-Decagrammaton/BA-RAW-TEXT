[translation]
1013908-1 = "#title;니코의 공양"
1013908-2 = "#na;(니코가 말한 보존식이 어떤 것인지 궁금해서, 점심 시간에 조리실에 잠깐 들렸다.)"
1013908-3 = "#st;[0,0];instant;1;"
1013908-4 = "#clearST"
1013908-5 = "#wait;2000"
1013908-6 = "#all;hide"
1013908-7 = "#place;샬레 건물 내 조리실"
1013908-8 = "#wait;2000"
1013908-9 = "#na;(조리실의 문을 열자마자 빗방울의 소음 같은 자글거리는 소리와 함께 고소한 기름 냄새가 훅 풍겨왔다.)"
1013908-10 = "[ns] \"이 냄새는……\""
1013908-11 = "#wait;1000"
1013908-12 = "3;니코;00\n#3;al\n#wait;1000"
1013908-13 = "3;니코;02;아, 선생님. 오셨어요?\n#3;em;[반응]"
1013908-14 = "3;니코;09;요리가 완성되려면 아직 한참 남았는데, 너무 일찍 오신 것 같네요."
1013908-15 = "[s1] \"뭔가 맛있는 냄새가 나는데.\"\n[s2] \"전투식량을 만든다고 하지 않았어?\""
1013908-16 = "#wait;100"
1013908-17 = "#wait;100"
1013908-18 = "3;니코;00;네. 전투식량 맞아요.\n#3;greeting"
1013908-19 = "3;니코;99;제가 지금 만들고 있는 건, 먼 옛날의 병사들이 가지고 다녔던 전통적인 전투식량—"
1013908-20 = "#st;[0,0];instant;1;"
1013908-21 = "#clearST"
1013908-22 = "#wait;2500"
1013908-23 = "3;니코;03;바로 유부초밥이거든요!\n#3;closeup\n#bgshake"
1013908-24 = "[s] \"유부초밥이 전투식량이 된다고?\""
1013908-25 = "#st;[0,0];instant;1;"
1013908-26 = "#clearST"
1013908-27 = "3;니코;03\n#3;closeup\n#3;d\n#wait;1000"
1013908-28 = "3;니코;00\n#3;a\n#wait;1000"
1013908-29 = "3;니코;00;네. 유부초밥은 전투식량의 조건을 훌륭히 갖추고 있답니다.\n#3;em;[반짝]\n#3;greeting"
1013908-30 = "3;니코;02;기름에 튀겨서 열량도 높을 뿐더러, 물기가 적어서 쉽게 상하지 않고, 항균 역할을 하는 식초도 듬뿍 들어 있으니까요."
1013908-31 = "3;니코;00;불을 피울 수 없는 야외에서는 이만한 전투식량도 따로 없죠."
1013908-32 = "3;니코;03;유일한 단점이라면, 너무 맛있어서 긴급한 상황이 닥치기도 전에 무심코 먹어버리게 되는 점이랄까요. 후후.\n#3;em;[재잘]"
1013908-33 = "[ns] \"듣고 보니 그도 그렇네……\""
1013908-34 = "#wait;1000"
1013908-35 = "[ns3] \"그런데 일부러 시간까지 내서 만드는 걸 보면—\"\n[ns4] \"평소에 만드는 유부초밥과는 다른 거야?\""
1013908-36 = "#wait;100"
1013908-37 = "#wait;100"
1013908-38 = "3;니코;00;네. 오늘 만드는 유부초밥은 두부를 튀기는 것 부터 시작해서 속재료까지 다 직접 만드는 수제 유부초밥이거든요."
1013908-39 = "3;니코;02;평소에 FOX 소대의 도시락으로 싸는 유부초밥은 시판 유부를 사용하고 있는데……"
1013908-40 = "3;니코;03;시간이 나면 꼭 한 번 직접 튀긴 유부로 유부초밥을 싸고 싶었어요.\n#3;em;[반짝]"
1013908-41 = "#st;[0,0];instant;1;"
1013908-42 = "#clearST"
1013908-43 = "#wait;3500"
1013908-44 = "3;니코;02;어머나, 벌써 시간이 이렇게."
1013908-45 = "3;니코;00;잠깐 실례하겠습니다…….\n#3;greeting"
1013908-46 = "#all;hide"
1013908-47 = "#wait;2000"
1013908-48 = "#all;hide"
1013908-49 = "#wait;24000"
1013908-50 = "#st;[-1200,-530];serial;60;[wa:390]― [log=니코]후후, [wa:1430]잘 익었네요.[wa:120] [/log]"
1013908-51 = "#wait;2540"
1013908-52 = "#st;[-1200,-630];serial;60;― [log=니코]잘 [wa:310] 부풀어 오른 것이, [wa:1730]좋은 유부가 될 것 같아요.[/log]"
1013908-53 = "#wait;6673"
1013908-54 = "#clearST"
1013908-55 = "[ns] \"먹음직스러워 보이는 걸.\""
1013908-56 = "#st;[-1200,-530];serial;60;[wa:860]― [log=니코]아, [wa:800]아직은 안 돼요.[/log]"
1013908-57 = "#wait;7113"
1013908-58 = "#clearST"
1013908-59 = "#st;[-1200,-530];serial;60;[wa:480]― [log=니코]이 뒤에 [wa:410]한 번 더 튀겨야 하거든요.[/log]"
1013908-60 = "#wait;2332"
1013908-61 = "#clearST"
1013908-62 = "#st;[-1200,-530];serial;60;― [log=니코]처음에는 낮은 온도에서,[/log]"
1013908-63 = "#wait;2478"
1013908-64 = "#st;[-1200,-630];serial;60;― [log=니코]그리고 높은 온도에서 한 번 더 튀겨야만 수분이 모두 빠져서, [wa:1160]맛있는 유부가 된답니다.[wa:200] [/log]"
1013908-65 = "#wait;7540"
1013908-66 = "#clearST"
1013908-67 = "[ns] \"유부는 꽤나 손이 많이 가는 요리였구나……\""
1013908-68 = "#st;[-1200,-530];serial;60;[wa:1220]― [log=니코]네. [/log]"
1013908-69 = "#wait;1590"
1013908-70 = "#st;[-1200,-630];serial;60;― [log=니코]유부는 정말 시간과 손이 많이 드는 요리예요.[/log]"
1013908-71 = "#wait;3610"
1013908-72 = "#clearST"
1013908-73 = "#st;[-1200,-530];serial;60;― [log=니코]그래서 옛날에는 [/log]"
1013908-74 = "#wait;1700"
1013908-75 = "#st;[-1200,-630];serial;60;― [log=니코]한 해의 풍작과 안녕을 빌기 위한 공물로 [wa:1620]유부를 만들었다고 해요.[/log]"
1013908-76 = "#wait;6620"
1013908-77 = "#clearST"
1013908-78 = "#st;[-1200,-530];serial;60;[wa:2050]― [log=니코]제가 바라는 것은[/log]"
1013908-79 = "#wait;1870"
1013908-80 = "#st;[-1200,-630];serial;60;― [log=니코]주변 사람들의 행복과 [wa:2260]안녕뿐이지만.[wa:160] [/log]"
1013908-81 = "#wait;3400"
1013908-82 = "#clearST"
1013908-83 = "#st;[-1200,-530];serial;60;― [log=니코]이 유부에 눌러 담은 제 마음이 전해진다면…… [/log]"
1013908-84 = "#wait;3380"
1013908-85 = "#st;[-1200,-630];serial;60;― [log=니코]기쁘겠네요.[/log]"
1013908-86 = "#wait;8200"
1013908-87 = "#clearST"
1013908-88 = "#all;hide"
1013908-89 = "3;니코;00\n#3;a"
1013908-90 = "3;니코;00;두 번 튀겨낸 유부, 완성입니다!\n#3;em;[반짝]"
1013908-91 = "3;니코;02;물론 유부초밥이 되려면 조금 더 시간이 더 걸리겠지만……"
1013908-92 = "3;니코;03;선생님, 괜찮으시다면 이 유부만 먼저 맛 봐 주시겠어요?\n#3;greeting"
1013908-93 = "[s5] \"나야 기쁘지만……\"\n[s6] \"니코의 기념비적인 첫 유부를 내가 맛봐도 괜찮을까?\""
1013908-94 = "#wait;100"
1013908-95 = "#wait;100"
1013908-96 = "3;니코;08;괜찮아요. 오히려 선생님께서 드셔주셨으면 하는 걸요.\n#3;em;[///]"
1013908-97 = "[s] \"그럼 어디……\""
1013908-98 = "#st;[0,0];instant;1;"
1013908-99 = "#clearST"
1013908-100 = "3;니코;08\n#wait;1500"
1013908-101 = "[ns7] \"확실히 시판 유부보다 훨씬 부드럽고 진한 것 같아!\"\n[ns8] \"포슬포슬한 식감이 정말 좋은 걸!\""
1013908-102 = "#wait;100"
1013908-103 = "#wait;100"
1013908-104 = "3;니코;00;네. 두께나 크기를 마음대로 할 수 있는 게 수제의 장점이니까요."
1013908-105 = "3;니코;09;다만 조금 욕심을 낸 탓인지 유부라기 보다는 아츠아게에 가까워진 느낌이지만……\n#3;em;[한숨]"
1013908-106 = "3;니코;03;그래도 첫 시도 치고는 잘 된 것 같아요."
1013908-107 = "3;니코;02;참, 선생님. 오늘 이후에 식사 약속은 없다고 하셨죠?"
1013908-108 = "3;니코;00;그럼 제가 이 유부로 유부초밥을 만들어 갈테니 저녁 식사라도 함께 하실래요?"
1013908-109 = "[s] \"좋아!\""
1013908-110 = "3;니코;03;네. 그럼 금방 준비할 테니, 선생님께서는 원래의 휴일 일정대로 느긋하게 쉬면서 기다려주세요.\n#3;greeting"
1013908-111 = "[s] \"하지만……\""
1013908-112 = "3;니코;04;아뇨! 도와주실 필요는 없어요. 어디까지나 제 욕심으로 만들기 시작한 것이고……\n#3;hophop"
1013908-113 = "#st;[0,0];instant;1;"
1013908-114 = "#clearST"
1013908-115 = "3;니코;04\n#3;d\n#wait;1000"
1013908-116 = "3;니코;08\n#3;a\n#3;closeup\n#wait;1000"
1013908-117 = "3;니코;08;……또, 선생님께 드리는 제 첫 공양이기도 하니까요.\n#3;em;[///]\n#3;closeup"
1013908-118 = "#all;hide"
1013908-119 = "#na;(이후, 니코가 만들어 준 수제 유부초밥을 먹으며 즐거운 저녁 시간을 보냈다.)"
1013908-120 = "#na;(니코의 유부는 진심이 담겨서 그런지 무척이나 부드럽고 따듯한 맛이 났다.)"
1013908-121 = "#all;hide"
1013908-122 = "#wait;500"

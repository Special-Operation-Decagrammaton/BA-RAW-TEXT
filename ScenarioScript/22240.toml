[translation]
22240-1 = "Episode 24; What You Want to Be"
22240-10 = "This is Aris'..."
22240-11 = "...Mental space?"
22240-12 = "Over there!"
22240-13 = "Momoi! Yuzu! Sensei! Over there...!"
22240-18 = "Aris!"
22240-22 = "Who...are you?"
22240-23 = "It's us!"
22240-24 = "Aris! We're here!"
22240-25 = "Aris!"
22240-26 = "[ns] \"Aris, are you okay?\""
22240-27 = "Momoi and Midori...? Yuzu...? And Sensei...?"
22240-28 = "Why are my...party members...here...?"
22240-29 = "You ran away without telling us, so we came to take you back!"
22240-30 = "Aris, you don't belong here! Let's go home!"
22240-31 = "You belong with us, Aris."
22240-32 = "Ah..."
22240-33 = "I...I..."
22240-34 = "Princess, have you forgotten what I've shown you?"
22240-35 = "Who are you?!"
22240-42 = "[ns] \"Key.\""
22240-44 = "Oh, Sensei, that means...!"
22240-45 = "That person who looks exactly the same as Aris..."
22240-46 = "Is the one who locked up Aris here...?"
22240-47 = "[ns] \"What do you mean by what you've shown her?\""
22240-49 = "3;<Key>;17;The princess understands what it means."
22240-50 = "3;<Key>;12;The things the princess has seen while in here."
22240-73 = "[ns] \"These are all...\""
22240-74 = "The scenes of us fighting to get here?"
22240-75 = "Why are you showing us these things?"
22240-79 = "3;<Key>;17;The scenes shown through Eridu's surveillance network."
22240-80 = "3;<Key>;17;All the fighting, running, falling, and injury just to arrive here."
22240-81 = "3;<Key>;12;How could it have come to this?"
22240-82 = "3;<Key>;17;Don't you already know the answer, princess?"
22240-86 = "I..."
22240-90 = "I cannot go back."
22240-91 = "[s] \"Aris...?\""
22240-92 = "If I stay with my friends... I will..."
22240-93 = "...I do not want anyone to get hurt anymore."
22240-94 = "Aris! It's not like that! None of it is your fault!"
22240-95 = "Midori is right, Aris. None of it matters to us. "
22240-97 = "Midori... Yuzu... It is the truth that everyone was injured because of me."
22240-98 = "Momoi..."
22240-102 = "Midori and Yuzu... "
22240-110 = "And Neru..."
22240-114 = "I am not...a hero...but a demon lord."
22240-115 = "I was born this way..."
22240-116 = "I am a demon lord meant to bring destruction to Kivotos..."
22240-117 = "Even if I wanted to be in your party..."
22240-118 = "A demon lord does not belong in the club room, playing games with their friends."
22240-119 = "If my loved ones get hurt because of me..."
22240-120 = "I would rather..."
22240-121 = "I..."
22240-123 = "I would rather choose \"Game Over\"."
22240-125 = "Tales Saga Chronicle 2...!"
22240-126 = "The game we made together received a special prize!"
22240-132 = "[ns] \"Momoi?\""
22240-133 = "Destruction to Kivotos? What does that even mean?"
22240-134 = "You'll hurt us if you stay with us?"
22240-135 = "Says who?!"
22240-139 = "Because we met you... "
22240-140 = "Because we got lucky enough to meet you...!"
22240-141 = "We made a game, and we won the Millennium Prize! We got to stay together as the Game Development Department!"
22240-142 = "Yeah!"
22240-143 = "...Yes!"
22240-144 = "[ns] \"That's true.\""
22240-145 = "Momoi...?"
22240-146 = "We were able to keep the club, make a game, have fun, and play lots of games together..."
22240-147 = "I even became friends with the scary Neru by playing games together..."
22240-148 = "All of it was possible because you were with us!"
22240-149 = "How can anyone say that you're a demon lord, or that you have to disappear? It's all nonsense!"
22240-150 = "I can't accept that!"
22240-151 = "Right, never."
22240-152 = "It'll never be \"Game Over.\" We'll come resurrect you every time. We'll go back to our last save point together."
22240-153 = "Why...Why are you doing this, everyone...?"
22240-154 = "I am...a demon lord..."
22240-155 = "You got hurt because of me..."
22240-156 = "Why are you not afraid of me? Why do you not hate me...?"
22240-157 = "Why...?"
22240-158 = "It's because you're..."
22240-159 = "Our friend! Our party member!"
22240-160 = "...!"
22240-161 = "You've said this before."
22240-162 = "Final Fantasia, Dragon Crest, Tails of Destiny, Chrono Digger, The Fable of Heroes, Pyre Emblem, and...Tales Saga Chronicle..."
22240-163 = "No matter which game you look at..."
22240-164 = "[s] \"The heroes never, ever, leave their friends behind.\""
22240-165 = "Even if you're a demon lord, I don't care...!"
22240-166 = "Think of it as a class!"
22240-167 = "In life, you get to choose who you want to be!"
22240-168 = "It doesn't matter what class other people want you to be. You get to choose!"
22240-169 = "Soldier, knight, mage, priest... Whatever you want, Aris."
22240-170 = "It doesn't matter what it is. You could even choose..."
22240-171 = "...to be a hero."
22240-172 = "[ns] \"So, Aris, tell us what you really want to be.\""
22240-174 = "I am...a demon lord..."
22240-175 = "A demon lord...who will bring destruction to the world..."
22240-176 = "Even if..."
22240-178 = "Even if that is true..."
22240-179 = "Can I really...choose my class?"
22240-182 = "Can I keep going on adventures with everyone..."
22240-183 = "And keep doing quests?"
22240-186 = "Even if I am like this...? Really...?"
22240-187 = "[ns] \"Yes. You can.\""
22240-189 = "[ns] \"It's a given, Aris.\""
22240-193 = "Then... I want that! I would like to choose my own class!"
22240-196 = "I want to be a hero! And be in a party with everyone..."
22240-199 = "And continue to adventure with Momoi, Midori, Yuzu, and Sensei...!"
22240-201 = "If...you do not mind that I am a demon lord!"
22240-203 = "Yes! You're our favorite demon lord!"
22240-204 = "Even a demon lord can be a hero."
22240-205 = "That kind of plot would be a hit these days!"
22240-206 = "And if that story doesn't exist, we'll just write it ourselves!"
22240-208 = "The four of us here can do anything we set our minds to!"
22240-209 = "We can create anything..."
22240-211 = "Because we're the Game Development Department!"
22240-216 = "Yes, we are! I choose to be a hero!"
22240-217 = "[ns] \"Let's do that then, Aris!\""
22240-219 = "Let us continue training together, Sensei!"
22240-220 = "[ns] \"You get to choose who you want to be, Aris.\""
22240-223 = "This is..."
22240-224 = "The hero's sword... Aris! This is it!"
22240-225 = "The hero's sword...!"
22240-226 = "Draw the sword, Aris!"
22240-227 = "...!"
22240-231 = "Okay!"
22240-238 = "3;<Key>;15;Princess...! The abilities you have are...!"
22240-239 = "3;<Key>;16;The power you possess exists only to destroy the world...!"
22240-240 = "You are wrong! This is a hero's weapon!"
22240-241 = "Because that is what I want it to be!"
22240-242 = "And right now, I am a light-attribute hero!"
22240-246 = "Blinding Light!"
22240-252 = "Princess... You are..."
22240-253 = "Princess is not the class I choose!"
22240-254 = "I..."
22240-255 = "I am a hero!"
22240-256 = "Incomprehensible...!"
22240-257 = "..."
22240-266 = "How can this be possible?"
22240-267 = "[s] \"You can see it with your own eyes.\""
22240-268 = "But according to my calculations...this can't be..."
22240-269 = "This is...preposterous..."
22240-270 = "[s] \"Nothing is impossible for them.\""
22240-274 = "[ns] \"No matter what others may say...\""
22240-276 = "Oh?! Aris?!"
22240-277 = "Aris! Are you awake?"
22240-278 = "...Aris!"
22240-287 = "[ns] \"It's possible for a hero and her party members.\""
22240-292 = "Next Episode; Millennium Science School"

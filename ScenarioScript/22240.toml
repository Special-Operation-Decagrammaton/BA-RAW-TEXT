[translation]
22240-1 = "第24話;自己想成為的人"
22240-10 = "這裡就是愛麗絲的……"
22240-11 = "……內心？"
22240-12 = "吶，姐姐！柚子！"
22240-13 = "那裡……！"
22240-18 = "愛麗絲！！"
22240-22 = "…………是誰？"
22240-23 = "是我們唷！"
22240-24 = "愛麗絲醬！我們來了唷！"
22240-25 = "愛麗絲醬！"
22240-26 = "[s]「愛麗絲！妳還好嗎？」"
22240-27 = "桃井和綠……柚子……？連老師也……？"
22240-28 = "為什麼會在這裡……？"
22240-29 = "那當然，是來迎接離家出走的愛麗絲囉！"
22240-30 = "愛麗絲醬，快點離開這裡吧！"
22240-31 = "一起回去吧，愛麗絲醬。"
22240-32 = "……"
22240-33 = "愛麗絲……愛麗絲……"
22240-34 = "王女啊，妳忘記妳見到的那副光景了嗎？"
22240-35 = "是誰！？"
22240-42 = "[ns]「……＜Key＞。」"
22240-44 = "所以說，那就是……！"
22240-45 = "跟愛麗絲醬長的一樣的那個人就是……？"
22240-46 = "把愛麗絲醬關在這裡的元兇……？"
22240-47 = "[ns]「愛麗絲見到的光景，是什麼意思？」"
22240-49 = "3;<Key>;17;就是字面上的意思。"
22240-50 = "3;<Key>;12;「王女大人」在這個空間裡的所見所聞。"
22240-73 = "[ns]「這些是……」"
22240-74 = "我們……戰鬥的樣子……？"
22240-75 = "為什麼要把這種東西……"
22240-79 = "3;<Key>;17;透過埃里都的監視網見到的光景。"
22240-80 = "3;<Key>;17;那全部都是你們來到這裡之前的戰鬥、奔跑、摔倒和受傷的光景。"
22240-81 = "3;<Key>;12;為什麼會發生這種事呢……"
22240-82 = "3;<Key>;17;那個答案，我想「王女」心裡應該很清楚了吧？"
22240-86 = "……愛麗絲。"
22240-90 = "愛麗絲，不能回去。"
22240-91 = "[s]「愛麗絲……？」"
22240-92 = "如果愛麗絲待在大家身邊的話……"
22240-93 = "大家就會因此，受到相應的傷害。"
22240-94 = "愛麗絲醬，不是那樣的！沒有那種事！"
22240-95 = "綠說的對。愛麗絲醬。我們從來沒有那麼想過……"
22240-97 = "綠……柚子……#n但是，都是因為愛麗絲，才會讓大家受傷……"
22240-98 = "桃井也是……"
22240-102 = "綠和柚子也是…… "
22240-110 = "寧瑠……前輩也是……"
22240-114 = "愛麗絲……不是勇者，而是魔王。"
22240-115 = "是作為總有一天……"
22240-116 = "可能會讓世界、會讓奇普托斯滅亡的魔王而誕生的……所以……"
22240-117 = "因為愛麗絲在……因為愛麗絲想，待在那裡……"
22240-118 = "那種……魔王……不可以，待在大家的身邊。"
22240-119 = "如果會讓重要的人……受苦受傷的話……"
22240-120 = "不如……"
22240-121 = "愛麗絲……"
22240-123 = "愛麗絲應該，就這樣消失才對。"
22240-125 = "《故事．傳說．編年史２》……！"
22240-126 = "我們一起製作的遊戲！！#n可是獲得了特別獎啊！！！"
22240-132 = "[ns]「桃，桃井？」"
22240-133 = "奇普托斯的終焉？妳在說什麼啊？"
22240-134 = "愛麗絲只要存在就會傷害到大家？"
22240-135 = "那種亂七八糟的話是誰說的！？"
22240-139 = "遇見了愛麗絲…… "
22240-140 = "因為有愛麗絲在……！"
22240-141 = "我們才能做出遊戲！#n才能在千年大賞得獎，才能守住我們的社團！"
22240-142 = "嗯，就是說呀。"
22240-143 = "……嗯！"
22240-144 = "[ns]「對呀，這些都是因為有愛麗絲在才能辦到的事唷。」"
22240-145 = "桃井……？"
22240-146 = "守住社團也好……一起做遊戲、一起玩遊戲也好！"
22240-147 = "能和一開始只覺得可怕的寧瑠前輩成為一起玩遊戲的夥伴也好！"
22240-148 = "全部！全──部！#n都是因為有愛麗絲在唷！"
22240-149 = "但是愛麗絲卻說什麼魔王，說自己是為此而生之類的……#n所以必須要消失之類的！那種事，我完全聽不懂！！"
22240-150 = "那種事怎麼可能接受！"
22240-151 = "嗯，絕對。"
22240-152 = "不會……眼睜睜看著妳……消失的唷……"
22240-153 = "……為，為，為什麼呢？#n大家……為什麼……"
22240-154 = "明明愛麗絲……是魔王……"
22240-155 = "明明因為愛麗絲……大家都受傷了……"
22240-156 = "為什麼大家……都不害怕愛麗絲……憎恨愛麗絲……"
22240-157 = "還像那樣……"
22240-158 = "因為！愛麗絲醬……"
22240-159 = "是我們的[ruby=朋友]夥伴[/ruby]啊……！"
22240-160 = "……！"
22240-161 = "之前……愛麗絲醬有這麼說過吧？"
22240-162 = "《大空戰士》、《勇士鬥惡龍》、《時間幻境》、#n《龍機傳統》、《英雄傳奇》、《尹蘇》……#n還有《故事．傳說．編年史》……"
22240-163 = "不管在什麼樣的遊戲裡，主角們總是……"
22240-164 = "[s]「絕對，不會拋棄夥伴。」"
22240-165 = "就算愛麗絲是魔王也沒關係……！"
22240-166 = "那種東西，不過就是個職業而已！"
22240-167 = "自己是誰，要由自己來決定唷！"
22240-168 = "愛麗絲只要轉職成自己想成為的職業就好了！"
22240-169 = "戰士、騎士、法師、僧侶──什麼都可以唷，愛麗絲醬。"
22240-170 = "當然，其他職業也可以。"
22240-171 = "那個……還有，勇者唷。"
22240-172 = "[ns]「所以，想聽聽愛麗絲的真心話。」"
22240-174 = "愛麗絲……明明是魔王……"
22240-175 = "明明……是會毀滅世界的……魔王……"
22240-176 = "…………明明是魔王……"
22240-178 = "……即使如此…………愛麗絲……"
22240-179 = "也可以那麼做嗎？"
22240-182 = "可以和大家……一起冒險……"
22240-183 = "一起……解任務嗎？"
22240-186 = "即使是這樣的愛麗絲也……？#n真的可以嗎……？"
22240-187 = "[ns]「嗯。」"
22240-189 = "[ns]「當然囉。」"
22240-193 = "那……也……想要一起……"
22240-196 = "愛麗絲也！要成為勇者……！#n和大家一起……"
22240-199 = "和桃井、綠、柚子。#n還有老師……繼續一起冒險……！"
22240-201 = "如果……身為魔王的愛麗絲也可以這麼做的話……！"
22240-203 = "嗯！只要愛麗絲想要那就夠了！"
22240-204 = "就算是魔王，也可以成為勇者唷。"
22240-205 = "不如說，最近那種故事反而更熱門呢！"
22240-206 = "如果……就算沒有那種熱潮……#n我們只要做成下一個作品就好……"
22240-208 = "因為，我們4個人，是可以把各種想像化為現實的……！"
22240-209 = "什麼都能做出來的……！"
22240-211 = "「遊戲開發部」啊！"
22240-216 = "──那麼，愛麗絲想成為勇者。"
22240-217 = "[ns]「嗯。可以成為勇者唷。」"
22240-219 = "愛麗絲……想要成為愛麗絲……！"
22240-220 = "[ns]「妳想成為的存在，可以由妳自己決定唷──愛麗絲。」"
22240-223 = "這是……！"
22240-224 = "勇者的劍……愛麗絲！這個！"
22240-225 = "把勇者的劍……！"
22240-226 = "拔出來吧！愛麗絲醬！"
22240-227 = "……！"
22240-231 = "……是！"
22240-238 = "3;<Key>;15;那個是……！「王女」啊……妳的那個能力……！"
22240-239 = "3;<Key>;16;妳所擁有的力量，是為了毀滅世界而存在的啊……！"
22240-240 = "不是的！愛麗絲的這個是勇者的武器！"
22240-241 = "因為！愛麗絲是這麼決定的！"
22240-242 = "現在的愛麗絲是光屬性的勇者……！"
22240-246 = "光呀──────！！！！"
22240-252 = "王女啊……妳……是……"
22240-253 = "愛麗絲的職業不是「王女」！"
22240-254 = "愛麗絲……"
22240-255 = "是「勇者」！！"
22240-256 = "無法……理解……"
22240-257 = "……"
22240-266 = "……居然真的，辦得到這種事……"
22240-267 = "[s]「嗯，辦得到唷。」"
22240-268 = "但是，根據我的計算……這種事……"
22240-269 = "怎麼會……這不可能……"
22240-270 = "[s]「對那些孩子們來說沒有不可能的事。」"
22240-274 = "[ns]「而且，不管旁人怎麼說……」"
22240-276 = "哈！？愛麗絲呢！？"
22240-277 = "愛麗絲醬！醒來了嗎！？"
22240-278 = "……愛麗絲醬！"
22240-287 = "[ns]「那些孩子，可是勇者和[ruby=遊戲開發部]他的隊伍成員[/ruby]啊。」"
22240-292 = "下一話;千年科學學園"

[translation]
1009702-1 = "Explosive Hazards"
1009702-2 = "(คุณครูได้รับการติดต่อจากโมเอะ และมุ่งหน้าไปตามพิกัดที่โมเอะส่งให้)"
1009702-3 = "(เมื่อไปถึง คุณครูก็เห็นโมเอะนั่งหาวอย่างเบื่อหน่ายอยู่ในเงาของเต็นท์ผ้าใบ...)"
1009702-7 = "ฮ้าวว..."
1009702-8 = "อ๊ะ คุณครู มาหาฉันจริงด้วย!"
1009702-9 = "ฉันกำลังเบื่อเพราะไม่มีอะไรทำ... ก็เลยมานั่งรอคุณครูอยู่น่ะ ฮุฮุ"
1009702-10 = "เอาละ มานั่งคุยกับฉันตรงนี้สิ"
1009702-11 = "[s] \"แล้วสมาชิกกองทหาร RABBIT คนอื่นล่ะ?\""
1009702-12 = "สมาชิกคนอื่นออกไปทำปฏิบัติการน่ะ รอบนี้ออกไปไกลหน่อย"
1009702-13 = "ส่วนฉันรับผิดชอบงานควบคุมหรือไม่ก็สนับสนุนแนวหลัง ก็เลยได้แต่นั่งรออยู่หน้าอุปกรณ์สื่อสาร..."
1009702-14 = "หมู่นี้กองทหาร RABBIT ชำนาญงานกันมากขึ้นแล้ว โอเปอเรเตอร์อย่างฉันก็เลยไม่ค่อยมีงานมากน่ะ"
1009702-15 = "ถึงจะบอกว่าเป็นงานสนับสนุน แต่ส่วนใหญ่ก็คือให้นั่งเฉยๆ แล้วก็รอการติดต่อมา"
1009702-16 = "[s] \"ก็เลยเรียกครูมาเป็นเพื่อนคุยสินะ\""
1009702-17 = "ถูกต้องเลย!"
1009702-18 = "ถึงจะเบื่อ แต่ฉันก็ลุกไปไหนไม่ได้เพราะอาจมีสมาชิกติดต่อเข้ามา แต่ก็ไม่มีอะไรที่ทำฆ่าเวลาได้เลย..."
1009702-19 = "แล้วเหมือนว่าคุณครูจะอยู่แถวนี้พอดี ฉันก็เลยลองชวนมาน่ะ"
1009702-20 = "[s1] \"ครูเป็นเพื่อนคุยให้ได้อยู่หรอก...\"\n[s2] \"ครูคิดไม่ออกเลยว่าจะคุยเรื่องสนุกๆ อะไรดี\""
1009702-23 = "แหม คุณครูมาที่นี่แล้วทั้งคน จะต้องไปหาเรื่องสนุกๆ มาเล่าทำไมล่ะ"
1009702-24 = "เอาเป็นเรื่องอย่าง... นักเรียนที่ให้ความสนใจอยู่ตอนนี้"
1009702-25 = "[s] (เหมือนชวนคุยเรื่องผู้หญิงเลยแฮะ...)"
1009702-26 = "หรือไม่ก็เรื่องดินระเบิดชนิดใหม่ที่กำลังสนอกสนใจอยู่! แฮ่ก แฮ่ก... "
1009702-27 = "[s] (หรือเราเข้าใจผิดไปเองนะ?)"
1009702-35 = "เอ๋ นั่นนักเรียนตำรวจน้ำของวัลคิรี่นี่นา? ขยันกันตั้งแต่เช้าเลยนะ..."
1009702-36 = "จะว่าไป ชุดว่ายน้ำมาตรฐานของสถาบันฝึกตำรวจวัลคิรี่เป็นบิกินีน้อยชิ้นจังเลยนะ"
1009702-37 = "ปกติเครื่องแบบวัลคิรี่เป็นที่รู้จักในด้านความสวยงามอยู่แล้ว ชุดว่ายน้ำมาตรฐานเองก็ไม่ใช่เล่นๆ เลยนะเนี่ย..."
1009702-38 = "[s] \"อืม นั่นสินะ\""
1009702-42 = "ฮิฮิฮิฮิ..."
1009702-43 = "สายตาดูมีเล่ห์เหลี่ยมนะคุณครู"
1009702-44 = "เมื่อกี้แอบจ้องนักเรียนวัลคิรี่อยู่ใช่มั้ย?"
1009702-45 = "[s3] \"ไม่ได้ถึงกับจ้อง... สักหน่อย\"\n[s4] \"คะ... คิดไปเองหรือเปล่า?\""
1009702-48 = "แหม ไม่ต้องปฏิเสธหรอก ชุดว่ายน้ำน้อยชิ้นแบบนั้นย่อมดึงดูดสายตาเป็นธรรมดา"
1009702-49 = "ว่ากันว่าเสื้อผ้าที่โชว์เนื้อหนังเยอะๆ จะมี 'พลังทำลายล้างสูง' เลยนี่นา?"
1009702-50 = "ก็คงเหมือนเวลาเราเห็นระเบิดลูกมหึมาแล้วละสายตาไม่ได้นั่นละ เวลาใครเห็นชุดว่ายน้ำน้อยชิ้น#nก็ย่อมถูกดึงดูดความสนใจเหมือนกัน มันเป็นเรื่องธรรมชาติน่ะ"
1009702-51 = "จะว่าไป คนส่วนใหญ่ที่ชอบชุดบิกินีแบบนั้นก็อาจชอบระเบิดกันอยู่ในใจก็ได้นะ ฮุฮุ... ฮุฮุฮุ..."
1009702-52 = "[s] \"จะเหมารวมทั้งหมดไม่ได้หรอกนะ...\""
1009702-56 = "[ns] \"แต่ถ้าพูดอย่างนั้น ก็แปลว่าโมเอะชอบบิกินีด้วยเหรอ?\""
1009702-57 = "แน่นอนอยู่แล้ว!"
1009702-58 = "แค่ได้เห็นชุดว่ายน้ำวาบหวิวๆ ก็รู้สึกได้ถึงความพังพินาศแล้วน่ะ"
1009702-59 = "ว่ายน้ำเป็นการออกกำลังกายที่ใช้ร่างกายทั้งตัว ปกติแค่ขยับแขนขาในน้ำที่มีแรงต้านสูงเพิ่มขึ้น#nก็มีเรื่องหวาดเสียวเกิดขึ้นอยู่บ่อยๆ แล้ว"
1009702-60 = "ปกติชุดเศษผ้าชิ้นเล็กๆ แค่ใส่เดินบนบกก็ต้องห่วงหน้าพะวงหลังอยู่แล้ว แต่นี่เอามาใส่ลงน้ำอีก..."
1009702-61 = "สถานการณ์แห่งความพินาศอาจเกิดขึ้นเมื่อไรก็ได้...!"
1009702-62 = "แค่คิดก็ทนไม่ไหวแล้ว! แฮ่ก แฮ่ก..."
1009702-63 = "[s] \"จะ... ใจเย็นๆ ก่อนนะ...\""
1009702-67 = "[ns5] \"แต่หมู่นี้ก็เห็นชอบใส่เสื้อทับบิกินีอีกชั้นกันไม่ใช่เหรอ?\"\n[ns6] \"โมเอะเองก็ใส่เสื้อฮู้ดเหมือนกัน\""
1009702-70 = "อ้อ เรื่องนั่นน่ะ..."
1009702-71 = "ความจริงแล้ว ที่ฉันตั้งใจใส่เสื้อฮู้ดอีกตัวก็เพราะกำลังซ่อน 'สิ่งอันตราย' ที่อยู่ข้างในไว้น่ะ"
1009702-72 = "เพราะข้างในนั้นมีสิ่งที่มีพลังทำลายล้างที่บิกินียังเทียบชั้นไม่ติด..."
1009702-73 = "[s7] \"สิ่งที่มีพลังทำลายล้างมากกว่าบิกินี...\"\n[s8] \"ยะ... อย่าบอกนะว่า?\""
1009702-76 = "ฮุฮุ สิ่งที่คุณครูจินตนาการอยู่อาจจะถูกก็ได้นะ"
1009702-77 = "แค่ฉันถอดฮู้ดตัวนี้ออก ผู้คนก็คงตกใจ กรีดร้อง และสับสนวุ่นวายกันทั่ว..."
1009702-78 = "อ่า... อ่าาา... แค่คิดก็ขนลุกซู่แล้ว..."
1009702-79 = "ทะ... ทำยังไงดีล่ะคุณครู? พอจินตนาการถึงอนาคตที่พังพินาศ หัวใจของฉันก็เต้นแรงมาก ตอนนี้ฉันทนไม่ไหวจนอยากโชว์ 'สิ่งอันตราย' ที่อยู่ในเสื้อฮู้ดนี้แล้ว!"
1009702-80 = "[s9] \"เดี๋ยวก่อนๆ!\"\n[s10] \"ใส่อะไรไว้ข้างในกันแน่น่ะ?\""
1009702-83 = "ฮิฮิฮิ... ยิ่งพูดแบบนั้นฉันยิ่งอยากโชว์นะ..."
1009702-84 = "ดูให้เต็มสองตาเลยนะ สิ่งที่มีพลังทำลายล้างสูงกว่าบิกินี..."
1009702-90 = "สารประกอบระเบิดชนิด C!"
1009702-94 = "[ns] \"ว่าไงนะ...?\""
1009702-96 = "เมื่อวานฉันแอบสมาชิกคนอื่นซื้อดินระเบิดพลาสติกชนิดใหม่มาน่ะ"
1009702-97 = "แค่บล็อก 0.25 ปอนด์ที่น่ารักอันนี้ก็มีแรงระเบิดมหาศาลจนทำให้รถถังปลิวได้ทั้งคันเลยละ ฮุฮุ..."
1009702-98 = "ฉันเอามันมาซ่อนไว้ในเสื้อแบบนี้เพราะถ้าสมาชิกคนอื่นรู้ ฉันจะต้องโดนบ่นแน่ๆ ยังไงล่ะ"
1009702-99 = "ว่าไงล่ะคุณครู? แค่เห็นก็นึกถึงความพังพินาศจนแทบหายใจหอบเลยใช่มั้ย?"
1009702-100 = "ถ้าทุกคนรู้ว่ามีสิ่งที่น่ากลัวซ่อนอยู่ในเสื้อตัวนี้ละก็...ฉันคงได้เห็นความพินาศแน่เลย แฮ่ก แฮ่ก..."
1009702-101 = "[s] \"โมเอะ...\""
1009702-102 = "หืม? มีอะไรเหรอคุณครู?"
1009702-107 = "ทำไมจู่ๆ ก็ทำหน้าน่ากลัวแบบนั้น..."
1009702-108 = "[s] \"ระเบิดมันอันตรายนะ ครูขอยึดไว้\""
1009702-109 = "ได้ไงกัน~?! "
1009702-111 = "(หลังจากนั้นคุณครูก็ยึดระเบิดมา และแนะนำวิธีการจัดการกับวัตถุอันตรายให้โมเอะฟัง)"
1009702-112 = "(และไม่ลืมที่จะกำชับเรื่องการถอดเสื้อกลางแจ้งให้โมเอะฟังอย่างเข้มงวด)"

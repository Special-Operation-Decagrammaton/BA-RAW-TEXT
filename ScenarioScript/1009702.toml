[translation]
1009702-1 = "Explosive Hazards"
1009702-2 = "I received a message from Moe and went to the location she gave me."
1009702-3 = "I saw Moe under a shaded tent on the beach, yawning in boredom."
1009702-7 = "*yawn*"
1009702-8 = "Oh, Sensei. You're here."
1009702-9 = "I had nothing to do, except wait for you to get here, heehee."
1009702-10 = "Come sit and chat with me."
1009702-11 = "[s] \"Where are the other RABBIT Squad members?\""
1009702-12 = "Far away, on an operation."
1009702-13 = "I have control and support duties, so I'm just chilling here in front of the communication equipment..."
1009702-14 = "The RABBIT Squad already knows what's what, so there's not much for an operator to do."
1009702-15 = "My support duty is mostly just sitting here, waiting for contact."
1009702-16 = "[s] \"Ah, so you called me to keep you company.\""
1009702-17 = "Yep."
1009702-18 = "I mean, I'm bored, but this IS my post. I can't leave, and I don't have anything to pass the time with."
1009702-19 = "It looked like you were nearby, so I sent you a message."
1009702-20 = "[s1] \"I don't mind keeping you company, but...\"\n[s2] \"I might not be much for conversation right now.\""
1009702-23 = "Eh, who cares about conversation? You're here with me. I'm good with that."
1009702-24 = "Unless you want to spill the tea on any new students..."
1009702-25 = "[s] \"(That sounds like girl talk.)\""
1009702-26 = "Ooh, or have you come across any new explosives lately? Ha ha..."
1009702-27 = "[s] \"(That sounds less like girl talk.)\""
1009702-35 = "Oh look, it's the Valkyries. They're working awfully hard for this time of the morning."
1009702-36 = "And those bikinis are working as hard as they are."
1009702-37 = "Valkyrie uniforms are always stylish, but I didn't think their swimsuits would get the same treatment."
1009702-38 = "[s] \"Good observation.\""
1009702-42 = "Heehee..."
1009702-43 = "Hey Sensei, I saw your eyes just now."
1009702-44 = "You were sneaking glances their way, weren't you?"
1009702-45 = "[s3] \"I wasn't glancing.\"\n[s4] \"...N-Not at all!\""
1009702-48 = "Hey, no need to deny it. It's only natural for your eyes to be drawn to revealing swimsuits."
1009702-49 = "They use the word \"bombshell\" for a reason, you know."
1009702-50 = "You can't NOT look at a giant explosion, OR a skimpy outfit."
1009702-51 = "...Ooh, I wonder what would happen if they wore those in front of a giant explosion. Heehee..."
1009702-52 = "[s] \"That sounds a bit over the top.\""
1009702-56 = "[ns] \"Makes me think you must like bikinis too, Moe.\""
1009702-57 = "Well, yeah!"
1009702-58 = "Just looking at them can bring you to the brink of disaster."
1009702-59 = "Swimming is a full-body exercise. Moving your arms and legs through all that water resistance is risky enough on its own."
1009702-60 = "Swimming while you're wearing a little piece of fabric, which might not even cover you while you're walking, let alone swimming..."
1009702-61 = "The contradiction between purpose and practicality...that disaster that could strike at any moment...!"
1009702-62 = "It's unbearable just imagining it! *pant* *pant*"
1009702-63 = "[s] \"O-Okay, calm down...\""
1009702-67 = "[ns5] \"Lots of people wear something over their bikinis these days.\"\n[ns6] \"You're wearing a hoodie too, Moe.\""
1009702-70 = "Well, that's because..."
1009702-71 = "Truth is, I'm wearing a hoodie because I'm hiding 'something dangerous' underneath."
1009702-72 = "Something with a destructive power even greater than a bikini..."
1009702-73 = "[s7] \"A greater destructive power than a bikini...\"\n[s8] \"D-Do you mean...?\""
1009702-76 = "Exactly what you're probably thinking, Sensei."
1009702-77 = "If I took this hoodie off, people would scream, and chaos would rule."
1009702-78 = "Ooh... I'm getting chills just thinking about it."
1009702-79 = "H-Hey, Sensei? I'm really tempted here. I just want to pull off the hoodie and unleash the destruction. What to do, what to do?"
1009702-80 = "[s9] \"Well, hold on!\"\n[s10] \"What do you have under there?\""
1009702-83 = "Heehee... You're making me want to show it off even more..."
1009702-84 = "Take a good look with your very own eyes. Not even a bikini can match the power of..."
1009702-90 = "A Type-C composite explosive!"
1009702-94 = "[ns] \"...What?\""
1009702-96 = "I bought some new plastic explosives yesterday. The rest of the squad doesn't know."
1009702-97 = "This cute little quarter-pound block could take out a whole tank, heehee..."
1009702-98 = "I figured the squad might not like it, so I squirreled it under my clothes."
1009702-99 = "What do you think, Sensei? Breathtakingly devastating, isn't it?"
1009702-100 = "If anyone here knew about it, all that explosive power under this shabby little hoodie, just imagine their reactions, hahaha..."
1009702-101 = "[s] \"...Moe.\""
1009702-102 = "Huh? What's up, Sensei?"
1009702-107 = "Wh-What's with that scary face?"
1009702-108 = "[s] \"I'm confiscating that bomb. It's dangerous.\""
1009702-109 = "Seriously?!"
1009702-111 = "After confiscating the bomb, I gave Moe a stern warning about handling explosives."
1009702-112 = "...I also warned her about recklessly lifting her top in public."

1009702-13 = "3;모에 수영복;02;나는 관제나 후방 지원 업무 때문에 이렇게 통신 장비 앞에 앉아서 기다리고 있지만……"
1009702-14 = "3;모에 수영복;00;요즈음은 RABBIT 소대도 꽤 노련해져서, 오퍼레이터가 할 일도 크게 없단 말이지."
1009702-15 = "3;모에 수영복;99;지원 업무라 해도 가만히 자리에 앉아서 연락을 기다리는 게 대부분인지라."

1009702-17 = "3;모에 수영복;03;정답!\n#3;em;[음표]"
1009702-18 = "3;모에 수영복;02;지루하다고는 해도 언제 연락이 올지 모르니 자리를 비울 수도 없고, 시간 때우기 좋은 소일거리도 없었던 지라……"
1009702-19 = "3;모에 수영복;01;마침 근처에 선생님이 있는 것 같아서 불러내 봤어."

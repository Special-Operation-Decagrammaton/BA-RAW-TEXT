[translation]
1009702-1 = "Explosive Hazards"
1009702-2 = "（接到萌的聯絡後，前往了他傳來的地點）"
1009702-3 = "（在海邊的陰涼帳篷下，看見了似乎很無聊的萌正在打呵欠……）"
1009702-7 = "呼啊……"
1009702-8 = "啊，老師，你來啦！"
1009702-9 = "我沒事做無聊得很……所以一直在等老師來，咯嘻嘻。"
1009702-10 = "來，坐下來跟我聊聊天吧。"
1009702-11 = "[s]「其他RABBIT小隊的成員呢？」"
1009702-12 = "其他隊員因為作戰的關係，去了稍微有點遠的地方。"
1009702-13 = "雖然我也正為了執行管制及後勤任務，所以坐在通訊設備旁待命……"
1009702-14 = "不過最近因為RABBIT小隊變得比較老練的關係，報務員實在沒什麼出場機會。"
1009702-15 = "就算是支援任務，大多也是靜靜坐在位置上待命而已。"
1009702-16 = "[s]「……所以才叫我來陪你聊天啊。」"
1009702-17 = "答對了！"
1009702-18 = "畢竟就算無聊也不能離開崗位，也不知道聯絡什麼時候會來，#n而且又沒有適合打發時間的消遣……"
1009702-19 = "正好老師就在附近，所以就把你叫來了。"
1009702-20 = "[s1]「只是陪你聊天的話是無所謂啦……」\n[s2]「但是我也想不到什麼有趣的話題。」"
1009702-23 = "哎呀，老師都親自來了，哪還需要什麼有趣的話題呢。"
1009702-24 = "比方說最近特別在意的學生──"
1009702-25 = "[s] （突然就聊起了女孩子們的話題……）"
1009702-26 = "或者是讓人感興趣的新炸藥之類的！哈啊，哈啊……"
1009702-27 = "[s] （……果然是我想太多了嗎？）"
1009702-35 = "咦，那些不是女武神的海警學生嗎？#n一大早就這麼勤奮啊……"
1009702-36 = "話說女武神警察學園的制式泳裝，是裸露度很高的比基尼耶。"
1009702-37 = "雖然說女武神的制服本來就是出了名的漂亮，#n沒想到連制式泳裝都下了這麼多工夫……"
1009702-38 = "[s]「嗯，是啊。」"
1009702-42 = "咯嘻嘻……"
1009702-43 = "老師，你剛才露出了色眯眯的眼神哦。"
1009702-44 = "是不是在偷看女武神的學生呀？"
1009702-45 = "[s3]「我……我沒有啊？」\n[s4]「……是你看錯了吧？」"
1009702-48 = "哎呀，不用否認啦。#n被裸露度高的泳裝吸引是很自然的事。"
1009702-49 = "人們不是都會說裸露度高的服裝「殺傷力很高」嗎？"
1009702-50 = "就像目睹巨大爆炸時無法移開視線一樣，#n被裸露度高的比基尼吸引目光也是很自然的生理現象。"
1009702-51 = "……從這個觀點來看，說不定喜歡比基尼的人，內心都嚮往著爆炸哦。#n咯嘻，咯嘻嘻……"
1009702-52 = "[s]「我覺得那種說法實在有點牽強……」"
1009702-56 = "[ns]「這麼說來，萌也喜歡比基尼嗎？」"
1009702-57 = "那當然！"
1009702-58 = "畢竟裸露度高的泳裝，光是看著就能感受到讓人心驚膽跳的毀滅啊。"
1009702-59 = "游泳可是需要活動全身的運動。#n尤其是在阻力大的水中活動四肢時，經常會碰到各種驚險的情況。"
1009702-60 = "然而卻只穿著幾塊小小的、連走路都可能曝光的布下水游泳……"
1009702-61 = "行為與目的互相矛盾的那種不合理……還有不知何時會發生的毀滅！"
1009702-62 = "光是想像就快受不了！哈啊，哈啊……"
1009702-63 = "[s]「你，你先冷靜……」"
1009702-67 = "[ns5]「不過最近不是都會在比基尼外再加穿衣服嗎？」\n[ns6]「就像萌現在也穿著連帽衣。」"
1009702-70 = "啊，這個嘛……"
1009702-71 = "其實我之所以特別穿著連帽衣，是因為裡面藏著「危險的東西」。"
1009702-72 = "這東西的破壞力，可不是單純的比基尼能夠比擬的……"
1009702-73 = "[s7]「破壞力更甚於比基尼的東西……」\n[s8]「……難，難道是？」"
1009702-76 = "呵呵，或許就跟老師現在想的一樣哦。"
1009702-77 = "只要我脫下這件連帽衣，人們就會驚聲尖叫，進而導致這一帶發生混亂……"
1009702-78 = "啊啊……啊啊啊……光是想像就全身發抖了……"
1009702-79 = "怎，怎麼辦。老師？#n一想到這毀滅性的未來，我的心臟就撲通撲通地跳個不停……#n忍不住想把連帽衣裡的「危險」露出來了！"
1009702-80 = "[s9]「等等，你先等等！」\n[s10]「裡面到底穿了什麼？」"
1009702-83 = "咯嘻嘻……被老師這麼一問，害我更想給你看了……"
1009702-84 = "睜大眼睛看清楚吧。#n這就是破壞力更甚於比基尼的……"
1009702-90 = "C型複合炸藥！"
1009702-94 = "[ns]「……啊？」"
1009702-96 = "其實我昨天偷偷瞞著其他隊員，買了新型的塑膠炸藥。"
1009702-97 = "這看似可愛的四磅積木，可是擁有能輕鬆炸飛一輛戰車的火力哦。呵呵……"
1009702-98 = "要是被其他隊員看到八成會挨罵，所以就藏在衣服裡了──"
1009702-99 = "怎麼樣，老師？#n不覺得這個情景充滿了毀滅性，光是看著就讓人倒吸一口涼氣嗎？"
1009702-100 = "如果大家知道看似寒酸的外衣裡頭，竟然隱藏著這種凶器……#n肯定會露出毀滅性的反應對吧？哈啊，哈啊……"
1009702-101 = "[s]「……萌。」"
1009702-102 = "嗯？怎麼了，老師？"
1009702-107 = "表，表情怎麼突然那麼可怕……"
1009702-108 = "[s]「炸彈很危險，必須沒收。」"
1009702-109 = "為什麼～！？"
1009702-111 = "（於是在沒收炸彈之後，好好告誡了萌與爆裂物相關的規範）"
1009702-112 = "（……此外也對他在室外隨便撩起外衣的行為提出了嚴正警告）"

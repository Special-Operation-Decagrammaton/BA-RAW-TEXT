1009702-58 = "3;모에 수영복;12;노출도가 높은 수영복은 보는 것만으로도 아슬아슬한 파멸이 느껴지니까."
1009702-59 = "3;모에 수영복;13;수영이란 온몸을 사용하는 전신 운동. 특히나 저항이 큰 물속에서 팔다리를 움직이다 보면 아찔한 상황이 발생할 때가 종종 있지."
1009702-60 = "3;모에 수영복;99;그런데 걷는 것만으로도 앞뒤가 신경 쓰이는 짧은 천 조각으로 몸을 가린 채 수영을 한다니……\n#3;stiff\n#3;em;[///]"

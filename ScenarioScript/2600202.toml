[translation]
2600202-1 = "最重要的是調味料"
2600202-2 = "格黑娜．第8號學生餐廳"
2600202-3 = "（於是我和茱莉聯絡之後，便來到格黑娜的學生餐廳）"
2600202-4 = "老師，歡迎光臨～！"
2600202-5 = "[s]「嗨，茱莉。」"
2600202-6 = "謝謝你今天特地過來。"
2600202-7 = "在那之後我有思考了一下。"
2600202-8 = "但我還是不知道#n應該在料理中加入多少愛意……"
2600202-9 = "不過既然老師來了，相信今天應該可以找到答案！"
2600202-10 = "[s1]「這件事我不知道該不該說……」\n[s2]「但我覺得愛意應該沒什麼適量不適量的問題……」"
2600202-11 = "那種模稜兩可的態度是不行的！"
2600202-12 = "那種模稜兩可的態度是不行的！"
2600202-13 = "為了做出更美味的料理，"
2600202-14 = "我們格黑娜的供給部，每天都要磨練手藝，追求進步！"
2600202-15 = "（面對茱莉的氣勢，實在無法再繼續否定她了）"
2600202-16 = "[s]「就算真的有所謂的『適量』，又該怎麼知道具體有多少呢……」"
2600202-17 = "這部分我已經準備好了，交給我吧！"
2600202-18 = "今天要請老師幫我試吃，我親手作的三道「加了不同分量愛意」的料理！"
2600202-19 = "[s3]「茱，茱莉的……！」\n[s4]「料理……！？」"
2600202-20 = "對，我剛剛才在廚房裡做好呢。"
2600202-21 = "對，我剛剛才在廚房裡做好呢。"
2600202-23 = "[s]「廚房怎麼好像傳出某種爆炸聲……」"
2600202-24 = "嗯？你有聽到什麼聲音嗎？"
2600202-25 = "啊，我知道了。難道是因為老師來這邊之後，潛意識裡太期待要吃我做的料理，#n所以肚子在叫嗎？"
2600202-26 = "[s]「肚子叫得像爆炸聲是怎樣！？」"
2600202-27 = "呵呵～♪ 那麼我們開始吧！"
2600202-29 = "那麼第一道料理！"
2600202-31 = "（茱莉打開鍋蓋，一股又辣又酸的味道撲鼻而來）"
2600202-32 = "（鍋子裡，有某種黑色的東西在蠢動）"
2600202-33 = "[s]「保險起見問一下，這是什麼料理……？」"
2600202-34 = "就跟你看到的一樣，是西班牙蒜味奶油蝦。"
2600202-35 = "[s]「……是，是喔。」"
2600202-36 = "這道料理，我只有在最後少量加入……"
2600202-37 = "我對老師的親近之情。"
2600202-38 = "那麼，請老師嚐嚐看吧！"
2600202-40 = "[s]「……那，那我要開動囉……」"
2600202-43 = "[s]「……！！」"
2600202-44 = "味道如何呢，老師？"
2600202-50 = "[ns]「……哈！」"
2600202-51 = "（就在我差點失去意識的時候，驚險撐住了）"
2600202-53 = "（但面對雙眼閃閃發亮的茱莉，實在沒辦法對她說實話……）"
2600202-54 = "[s5]「嗯……那個……」\n[s6]「很，很獨特的味道……！」"
2600202-55 = "啊，是那樣嗎……？"
2600202-56 = "啊，是那樣嗎……？"
2600202-57 = "嗯……但是老師的反應比我想像中還要平淡……"
2600202-58 = "果然這點愛意還是不太夠呢。"
2600202-59 = "那麼接著來試試看，加入更多愛意的料理吧！"
2600202-60 = "[s]「比這更多的愛意……沒問題嗎……」"
2600202-63 = "來了！"
2600202-64 = "這道料理中，加入了我對老師滿滿的敬愛！"
2600202-65 = "是能和剛才的西班牙蒜味奶油蝦搭配的大蒜麵包！"
2600202-66 = "[s]「大蒜麵包……是藍色的嗎？」"
2600202-67 = "咦，不是嗎？"
2600202-68 = "我是照著食譜做的啊……"
2600202-69 = "啊，大蒜麵包沾剛才的奶油蝦會更好吃喔！"
2600202-70 = "請品嚐看看吧，老師！"
2600202-71 = "[s7]「茱莉的料理加上茱莉的料理……！」\n[s8]「到底會擦出怎樣的火花……！」"
2600202-74 = "[s]「……好！我要開動了！」"
2600202-82 = "「老師？你怎麼了，老師？老師～？」"
2600202-83 = "『嗯～沒有反應呢……可能是沒聽到吧……』"
2600202-84 = "『這是太好吃了嗎？還是說我的愛意還不夠嗎？』"
2600202-85 = "『既然如此，只要吃下第三道料理應該就能回神了吧？』"
2600202-86 = "『那麼，第三道料理……』"
2600202-87 = "『那個……這道料理中……我把我對老師的思念，毫不保留的加下去了……！』"
2600202-88 = "『講，講出來還真令人難為情……』"
2600202-90 = "『嗯？老師，你還吃得下去嗎？老師？』"
2600202-95 = "[ns]「……嚇？！」"
2600202-96 = "啊，老師你醒了嗎？"
2600202-97 = "[s]「這是哪裡……料，料理呢！？」"
2600202-98 = "老師，夏萊的工作一定很累人吧……"
2600202-99 = "你居然在吃到一半就睡著了……"
2600202-100 = "[s] 「是，是嗎？我[ruby=昏死過去]睡著[/ruby]了？」"
2600202-101 = "難道說，我在老師這麼累的時候，還提出這些無理的要求嗎……"
2600202-102 = "[s9]「不，沒關係。」\n[s10]「畢竟是茱莉的請求嘛，我也想幫忙。」"
2600202-103 = "……謝謝你，老師。"
2600202-104 = "……謝謝你，老師。"
2600202-105 = "但也真的請老師不要勉強自己。"
2600202-106 = "而且我也聽說老師平常就忙到都沒時間吃飯了。"
2600202-107 = "[s]「啊……所以今天才……」"
2600202-108 = "（咕嚕嚕）"
2600202-109 = "哎呀……老師，你肚子還很餓嗎？"
2600202-110 = "（這才想起來，今天來到這裡之前都還沒有好好吃一頓飯）"
2600202-111 = "那真是太好了。"
2600202-112 = "[s]「太好了？」"
2600202-113 = "因為老師很忙，#n我就猜老師今天是不是又餓著肚子呢。"
2600202-116 = "每道料理都還有很多喔！"
2600202-117 = "來，別客氣，儘管吃吧。"
2600202-118 = "[s] （記得保健室有胃藥……）"
2600202-120 = "[s]「我做好覺悟了！」"
2600202-121 = "請用餐吧……"
2600202-123 = "（在那之後，我吃著茱莉的料理，同時也稍微理解到何謂愛意）"

[translation]
2600202-1 = "The Most Important Spice"
2600202-2 = "Gehenna Student Dining Hall No. 8"
2600202-3 = "(I decided to stop by Gehenna's student dining hall after being contacted by Juri.)"
2600202-4 = "Welcome, Sensei!"
2600202-5 = "[s] \"Well. Here I am.\""
2600202-6 = "Thanks for agreeing to come today. "
2600202-7 = "There's been something on my mind all day today. "
2600202-8 = "I can't for the life of me figure out how much love I'm supposed to put in this dish."
2600202-9 = "But now that you're here, I'm sure the answer will come to me!"
2600202-10 = "[s1] \"I dunno. It might be a little late for that.\"\n[s2] \"Does any recipe really have a 'right' amount of love?\""
2600202-11 = "Come on! Be a little more enthused than that!"
2600202-12 = "Come on! Be a little more enthused than that!"
2600202-13 = "We're all about perfecting our craft and making even more delicious food."
2600202-14 = "No one trains harder in the culinary arts than the Gehenna School Lunch Club!"
2600202-15 = "(I can't possibly turn down Juri's request after hearing how passionate she is.)"
2600202-16 = "[s] \"All right, but how will you go about finding the right amount?\""
2600202-17 = "Oh! I've already thought of something."
2600202-18 = "I cooked three separate dishes: each with a different amount of love!"
2600202-19 = "[s3] \"You cooked...?!\"\n[s4] \"Three?!\""
2600202-20 = "Sure did. They're waiting in the kitchen."
2600202-21 = "Sure did. They're waiting in the kitchen."
2600202-23 = "[s] \"Please tell me that explosion didn't come from the kitchen...\""
2600202-24 = "Huh? I didn't hear anything."
2600202-25 = "That must have been your stomach growling because it can't wait to have some yummy love-filled food."
2600202-26 = "[s] \"Huh. Could have fooled me...\""
2600202-27 = "Heehee. I'll start now! ♪"
2600202-29 = "Here comes the first dish!"
2600202-31 = "(A pungent, acrid stench stabbed my nose as soon as Juri opened the lid.)"
2600202-32 = "(Something dark is wriggling inside the pot.)"
2600202-33 = "[s] \"Out of curiosity, what kind of dish is this...?\""
2600202-34 = "Huh? It's gambas al ajillo. Can't you tell?"
2600202-35 = "[s] \"Y-You don't say?\""
2600202-36 = "The love in this food is..."
2600202-37 = "Well, it represents how I feel about you!"
2600202-38 = "It would make me happy if you tasted it!"
2600202-40 = "[s] \"H-How could I refuse? H-Here goes nothing...\""
2600202-43 = "[s] \"...!\""
2600202-44 = "Oh! How do you like it, Sensei?"
2600202-50 = "[ns] \"Gah!\""
2600202-51 = "(My consciousness starts to fade as everything turns black. I am barely able to stay awake.)"
2600202-53 = "(I can't bring myself to reproach Juri's cooking after I see her glittering eyes.)"
2600202-54 = "[s5] \"Well, how do I put this?\"\n[s6] \"I-It's certainly unique!\""
2600202-55 = "You really think so?"
2600202-56 = "You really think so?"
2600202-57 = "Still, I was expecting a bigger reaction than that."
2600202-58 = "I must not have put enough love into that one. I feared as much."
2600202-59 = "I promise the next dish will be teeming with love!"
2600202-60 = "[s] \"Even more than this one...?\""
2600202-63 = "This way!"
2600202-64 = "We'll switch it up and try a different kind of love. Rather than the love between friends, this dish's love is harbored from a feeling of deep respect."
2600202-65 = "Surprise. It's garlic bread served with gambas soup."
2600202-66 = "[s] \"Wait. Is garlic bread supposed to be blue?\""
2600202-67 = "Is it not?"
2600202-68 = "Anyway, the cookbook I read had a great tip for how it should be served."
2600202-69 = "It said the garlic bread will taste better if you dip it in the soup!"
2600202-70 = "I think you should try it, Sensei!"
2600202-71 = "[s7] \"Dipping Juri's cooking into Juri's cooking...\"\n[s8] \"The combo will make for an...interesting flavor, I'm sure.\""
2600202-74 = "[s] \"Well...! Here goes nothing...!\""
2600202-82 = "What's wrong, Sensei?"
2600202-83 = "Hmm. Could your silence mean..."
2600202-84 = "...that it still wasn't loving enough for you?"
2600202-85 = "Then how about this?"
2600202-86 = "This third dish leaves nothing on the table."
2600202-87 = "I-It's made of the b-burning, passionate affection I have for you!"
2600202-88 = "Oh, my. Th-This is so embarrassing..."
2600202-90 = "Huh? Sensei? Can you hear me?"
2600202-95 = "[ns] *GASP*"
2600202-96 = "Oh. You're awake."
2600202-97 = "[s] \"Wh-Where am I...? What happened to the dish?\""
2600202-98 = "You must have been dead tired, Sensei."
2600202-99 = "You fell asleep before you could even finish eating..."
2600202-100 = "[s] \"I did?\""
2600202-101 = "I hope I wasn't pushing you too far when you were tired."
2600202-102 = "[s9] \"No, it's all right.\"\n[s10] \"I'm happy to help whenever you need me.\""
2600202-103 = "Thank you, Sensei."
2600202-104 = "Thank you, Sensei."
2600202-105 = "Still, you shouldn't push yourself so hard. "
2600202-106 = "I've heard that you often skip meals because of how busy you are."
2600202-107 = "[s] \"Is that why you...?\""
2600202-108 = "*growl*"
2600202-109 = "Oh, dear. Sensei, are you hungry?"
2600202-110 = "(I remembered that I haven't eaten a proper meal all day.)"
2600202-111 = "How fortunate!"
2600202-112 = "[s] \"Fortunate?\""
2600202-113 = "I had a feeling you might not have gotten your fill because you fell asleep in the middle of eating."
2600202-116 = "So, just in case, I packed all the leftovers and brought them over."
2600202-117 = "Don't be shy! Dig in!"
2600202-118 = "[s] (I'm sure they have digestive medicine in the infirmary...)"
2600202-120 = "[s] \"You shouldn't have!\""
2600202-121 = "Yes! The dish you're gonna eat this time is..."
2600202-123 = "(I then ate Juri's cooking and learned how painful love can be.)"

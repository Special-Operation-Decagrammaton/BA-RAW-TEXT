[translation]
2600202-1 = "เครื่องปรุงรสที่สำคัญที่สุด"
2600202-2 = "โรงอาหาร 8 เกเฮนน่า"
2600202-3 = "(มาที่โรงอาหารเกเฮนน่าเพราะจูริติดต่อมา)"
2600202-4 = "คุณครู~ สวัสดีค่ะ!"
2600202-5 = "[s] \"อะ... อืม\""
2600202-6 = "ขอบคุณที่แวะมาในวันนี้นะคะ"
2600202-7 = "คือว่าฉันกังวลมาหลายรอบแล้วล่ะค่ะ"
2600202-8 = "ก็ฉันประเมินดูไม่ได้เลยค่ะ#nว่าต้องใส่ความรักลงไปในอาหารเท่าไหร่ถึงจะพอดี"
2600202-9 = "แต่ถ้าได้คุณครูมาช่วยแบบนี้ วันนี้ก็น่าจะหาคำตอบได้นะคะ!"
2600202-10 = "[s1] \"มันยังไม่สายไปใช่ไหม?\" \n[s2] \"มีปริมาณที่เหมาะสมสำหรับความรักด้วยเหรอ?\""
2600202-11 = "ไม่ได้นะคะ! จะมีท่าทีลังเลแบบนั้นไม่ได้ค่ะ!"
2600202-12 = "ไม่ได้นะคะ! จะมีท่าทีลังเลแบบนั้นไม่ได้ค่ะ!"
2600202-13 = "เราต้องจริงจังกับทุกเรื่องในทุกวัน เพื่ออาหารที่รสเลิศกว่าที่เคย!"
2600202-14 = "ชมรมโภชนาการของเกเฮนน่าจะไม่ฝึกฝนอะไรอย่างลวกๆ เด็ดขาดค่ะ!"
2600202-15 = "(เห็นความมุ่งมั่นของจูริแบบนี้ก็ยิ่งยากที่จะปฏิเสธความช่วยเหลือ)"
2600202-16 = "[s] \"แล้วครูจะรู้ปริมาณที่พอเหมาะได้ยังไงล่ะ?\""
2600202-17 = "อ่า! ฉันได้เตรียมบางอย่างไว้ให้แล้วค่ะ"
2600202-18 = "วันนี้ฉันจะให้คุณครูทานอาหาร 3 อย่างที่ฉันใส่ความรักลงไปในปริมาณที่แตกต่างกัน!"
2600202-19 = "[s3] \"จูริทำอาหาร...!\"\n[s4] \"ตั้ง 3 อย่างเลยเหรอ?"
2600202-20 = "ใช่ค่ะ อาหารทั้งหมดรอคุณครูอยู่ในครัวแล้วค่ะ"
2600202-21 = "ใช่ค่ะ อาหารทั้งหมดรอคุณครูอยู่ในครัวแล้วค่ะ"
2600202-23 = "[s] \"อย่าบอกนะว่าเสียงระเบิดเมื่อกี้มาจากห้องครัว....\""
2600202-24 = "พูดถึงอะไรคะ? ฉันไม่เห็นได้ยินอะไรเลย"
2600202-25 = "หรือนั่นจะเป็นเสียงท้องร้องของคุณครู#nเพราะอยากทานอาหารที่ใส่ความรักของฉันคะ...?"
2600202-26 = "[s] \"จะเจอเซอร์ไพรส์อะไรไหมนะ...\""
2600202-27 = "ฮุฮุฮุ~♪ งั้นฉันจะเริ่มเลยนะคะ!"
2600202-29 = "นี่คืออาหารอย่างแรกค่ะ!"
2600202-31 = "(ได้กลิ่นเผ็ดร้อนและฉุนทันทีที่จูริเปิดฝาหม้อ)"
2600202-32 = "(ในหม้อมีบางอย่างสีดำๆ กระดุกกระดิกอยู่)"
2600202-33 = "[s] \"ขอถามได้ไหมว่า... นี่คือเมนูอะไร?\""
2600202-34 = "คะ? คุณครูดูไม่ออกเหรอคะ ก็กุ้งกระเทียมยังไงล่ะคะ"
2600202-35 = "[s] \"อ่อ... โอเค!\""
2600202-36 = "ส่วนความรักที่ฉันใส่ไปในอาหารนี้..."
2600202-37 = "คือความสนิทสนมของฉันกับคุณครูค่ะ~!"
2600202-38 = "ถ้างั้นก็เชิญชิมได้เลยค่ะ!"
2600202-40 = "[s] \"ดะ... ได้... จะกินแล้วนะ\""
2600202-43 = "[s] \"...!!\""
2600202-44 = "เป็นยังไงบ้างคะคุณครู?"
2600202-50 = "[ns] \"เฮือก...!\""
2600202-51 = "(เหมือนสติจะหลุดลอยไปชั่วขณะ)"
2600202-53 = "(แต่ก็ไม่สามารถวิจารณ์อาหารต่อหน้าจูริที่ทำตาแป๋วอยู่ข้างหน้าได้)"
2600202-54 = "[s5] \"เอ่อ... จะอธิบายยังไงดีนะ...\"\n[s6] \"จานนี้มีรสชาติ... เฉพาะตัวมาก\""
2600202-55 = "อ๊ะ จริงเหรอคะ...?"
2600202-56 = "อ๊ะ จริงเหรอคะ...?"
2600202-57 = "อืม... แต่ปฏิกิริยาของคุณครูดูราบเรียบไปหน่อยนะคะ....."
2600202-58 = "อาจจะแปลได้ว่าความรักในที่ฉันใส่ไปยังไม่เพียงพอ"
2600202-59 = "งั้นไปชิมจานต่อไปเลยดีกว่าค่ะ จานนี้ใส่ความรักเข้าไปมากกว่าจานที่แล้วด้วยนะคะ!"
2600202-60 = "[s] \"ใส่ความรักไป... มากกว่าเดิมเหรอ?\""
2600202-63 = "ทางนี้ค่ะ!"
2600202-64 = "จานนี้ฉันใส่มากกว่าความสนิทสนม เพราะใส่ความเคารพรักที่มีต่อคุณครูเข้าไปค่ะ!"
2600202-65 = "และนี่คือขนมปังกระเทียมที่เสิร์ฟพร้อมซุปกุ้งกระเทียม!"
2600202-66 = "[s] \"เอ่อ... ปกติขนมปังกระเทียมเป็นสีฟ้าเหรอ?\""
2600202-67 = "เอ๋? ปกติแล้วเป็นสีอื่นเหรอคะ?"
2600202-68 = "แค่ออกมาอร่อยก็พอค่ะ อ้อ! ในหนังสือทำอาหารแนะนำวิธีทานไว้ด้วยค่ะ"
2600202-69 = "ให้เอาขนมปังกระเทียมไปจิ้มซุปกระเทียมเพื่อเพิ่มความชุ่มฉ่ำ ทำแบบนี้จะได้รสชาติที่อร่อยขึ้นค่ะ!"
2600202-70 = "เอาล่ะ! ลองชิมดูสิคะคุณครู!"
2600202-71 = "[s7] \"อาหารของจูริ... อาหารของจูริ...\"\n[s8] \"รสชาติจะออกมาเป็นแบบไหนนะ...!\""
2600202-74 = "[s] \"เอาล่ะ... จะกิน... ละนะ...!\""
2600202-82 = "คุณครูคะ? ทำไมทำหน้าแบบนั้นล่ะคะ?"
2600202-83 = "อืม... ถ้าทานแล้วไม่พูดอะไรเลยแบบนี้..."
2600202-84 = "หรือว่าความรักที่ใส่ไปจะยังไม่เพียงพอ?"
2600202-85 = "งั้นลองทานจานนี้แทนไหมคะ?"
2600202-86 = "จานสุดท้ายนี้ไม่ใช่อาหารอะไรอื่น..."
2600202-87 = "ปะ.. ปะ... เป็นอาหารที่ฉันใส่ความรักที่มาจากความปรารถนาอันแรงกล้าที่มีต่อตัวคุณครูเข้าไปค่ะ!"
2600202-88 = "แหะๆๆ เขินจัง..."
2600202-90 = "หือ? คุณครูคะ? ได้ยินฉันไหมคะ? คุณครู…?"
2600202-95 = "[ns] \"เฮือก?!\""
2600202-96 = "โอ๊ะ คุณครูสลบไปเหรอคะ?"
2600202-97 = "[s] \"ที่นี่ที่ไหน... แล้วอาหารของจูริล่ะ?\""
2600202-98 = "คุณครูคงจะเหนื่อยมากสินะคะ"
2600202-99 = "เหนื่อยขนาดที่กินอาหารแล้วเผลอหลับไปเลย..."
2600202-100 = "[s] \"งะ...งั้นเหรอ?\""
2600202-101 = "หวังว่าฉันจะไม่ได้เรียกคุณครูมาเหนื่อยกับการทานอาหารด้วยนะคะ..."
2600202-102 = "[s9] \"ไม่หรอก ครูไม่เป็นไร\"\n[s10] \"ก็จูริต้องการความช่วยเหลือนี่นา ครูต้องมาอยู่แล้ว\""
2600202-103 = "...ขอบคุณค่ะคุณครู"
2600202-104 = "...ขอบคุณค่ะคุณครู"
2600202-105 = "แต่ยังไงก็ไม่ควรหักโหมมากไปนะคะ"
2600202-106 = "ฉันได้ยินมาด้วยค่ะว่าคุณครูเอาแต่ทำงานจนบางครั้งก็ไม่ทานข้าวด้วย"
2600202-107 = "[s] \"อ่า... เธอก็เลย...?\""
2600202-108 = "(จ๊อกๆ)"
2600202-109 = "โอ๊ะ... คุณครูหิวเหรอคะ?"
2600202-110 = "(จะว่าไปวันนี้ก็ยังไม่ได้กินอะไรเป็นมื้อจริงจังเลย)"
2600202-111 = "ดีจังเลย!"
2600202-112 = "[s] \"ดีจังเลย...?\""
2600202-113 = "ตอนที่คุณครูทานอาหารของฉันแล้วเผลอหลับไป#nฉันก็คิดว่าหรือฉันจะเสิร์ฟอาหารให้คุณครูน้อยไปหน่อย..."
2600202-116 = "ฉันก็เลยห่ออาหารที่เหลือมาหมดเลยค่ะ"
2600202-117 = "ทานเยอะๆ เลยค่ะ ไม่ต้องเกรงใจนะคะ!"
2600202-118 = "[s] (ที่ห้องพยาบาลน่าจะมียาช่วยย่อยนะ...)"
2600202-120 = "[s] \"พร้อมตุย... เอ้ย... พร้อมชิมแล้ว!\""
2600202-121 = "ดีเลยค่ะ~ มาพบอาหารจานสุดท้ายกันเลย"
2600202-123 = "(คุณครูกินอาหารของจูริและได้เรียนรู้ว่าความรักก็สามารถทำให้เป็นทุกข์ได้ด้วย...)"

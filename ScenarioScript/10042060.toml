[translation]
10042060-1 = "ตอนที่ 6;สิ่งที่ต้องทำ"
10042060-2 = "......"
10042060-3 = "เดี๋ยวก่อน นี่มันอะไรกัน..."
10042060-4 = "[s] \"ก็บอกไปเมื่อกี้แล้วไง...\""
10042060-5 = "แต่ถึงอย่างนั้นก็เถอะ... นี่มันเรื่องจริงเหรอคะ!?"
10042060-6 = "ฉันไม่ได้อยู่ในการซ่อนกล้องที่วางแผนไว้อย่างแยบยลและโหดร้ายใช่มั้ยคะ?!"
10042060-10 = "โอ๊ย เจ็บ!"
10042060-11 = "ถ้างั้น... นี่ก็คือ... เรื่องจริงงั้นเหรอ? ไม่ได้จ้อจี้ใช่มั้ยคะ?!"
10042060-12 = "(ที่ทำแบบนั้น...)"
10042060-13 = "(ฉันก็ทำไปเหมือนกันค่ะ...)"
10042060-14 = "เมื่อต้องเผชิญกับสถานการณ์ที่เปลี่ยนแปลงกะทันหัน บางครั้งเราก็จะทำสิ่งที่ปกติแล้วจะไม่ทำกันค่ะ นี่ละค่ะอาการที่ว่า"
10042060-15 = "เลิกพูดอะไรไม่เข้าเรื่องได้แล้วค่ะ!"
10042060-16 = "เป็นไปไม่ได้... ฉันก็ได้ยินเรื่องแพนเค้กยักษ์มาบ้าง แต่ไม่คิดเลยว่ามันจะใหญ่ยักษ์ขนาดนี้..."
10042060-17 = "ถ้างั้นแผนเดิมของฉันที่จะเล่นใหญ่แล้วขอให้คุณครูมารับผิดชอบทีหลังก็..."
10042060-18 = "[s] \"วางแผนอะไรไว้เหรอ?\""
10042060-19 = "อึก...!"
10042060-20 = "สะ... สุดท้ายแล้วไม่ว่ายังไงก็ต้องงัดมาตรการตอบโต้มาใช้ให้ทันท่วงทีไม่ใช่เหรอคะ?! งั้นฉันก็ทำถูกต้องตั้งแต่แรกแล้วนี่!"
10042060-21 = "อย่ามัวทำหน้าเอือมระอาแบบนั้นสิคะ! ฉันก็เตรียมมาตรการตอบโต้มาให้แล้วไง!"
10042060-22 = "[s] \"ก็ได้ๆ ไม่ต้องร้องนะ\""
10042060-23 = "คะ... ใครจะร้องคะ?! ฉันไม่ได้เป็นอะไรสักหน่อย!?"
10042060-24 = "......"
10042060-25 = "เอาเถอะค่ะ ปืนใหญ่ทุกกระบอก เตรียมตัวให้พร้อม!"
10042060-26 = "รับทราบค่ะ! ปืน FlaK 36 ขนาด 88 มม. พร้อมยิงทั้ง 12 กระบอก!"
10042060-27 = "ดะ... เดี๋ยวก่อนค่ะ! เจ้าหน้าที่อาวุโส...! ฉันขอคุยด้วยสักเดี๋ยว!"
10042060-28 = "มีอะไรอีกคะ?!"
10042060-29 = "คือว่า..."
10042060-30 = "เจ้าหน้าที่อาวุโสคะ! เป้าหมายของเรา..."
10042060-31 = "'แพนเค้ก' ใหญ่ยักษ์นั่นมันว่องไวจนเล็งแทบไม่ได้เลยค่ะ!"
10042060-32 = "มันเดินผ่านอาคารต่างๆ ไวมาก แล้วก็ไปซ่อนตัวอยู่ด้วย..."
10042060-33 = "ขืนเป็นแบบนี้ต่อไป อาคารในเขตปกครองตนเองเกเฮนน่าต้องได้รับความเสียหายหมดแน่ค่ะ!"
10042060-34 = "ว่าไงนะคะ...?"
10042060-35 = "ค่ะ... นั่นละค่ะที่ฉันอยากบอก..."
10042060-36 = "อะ... เอ่อ... เดี๋ยวนะ เดี๋ยวก่อนค่ะ"
10042060-37 = "แพนเค้กเคลื่อนที่ไปตามอาคารด้วยความเร็วสูง... ยากต่อการเล็งเป้า และสร้างความเสียหายในเขต#nตัวเมือง..."
10042060-38 = "นี่มัน... อ่า... มันสถานการณ์อะไรกันเนี่ย..."
10042060-39 = "[s1] \"แต่ก็ยังไม่สั่งให้ยิงสินะ...\"\n[s2] \"ถึงยังไงก็ไม่สั่งให้ยิงสินะ\""
10042060-42 = "เห็นฉันเป็นคนแบบไหนคะ ฉันก็ต้องไตร่ตรองให้รอบคอบสิ..."
10042060-43 = "อึก..."
10042060-48 = "(เป้าหมายสำคัญที่สุดในตอนนี้คือการกำจัดเจ้าตัวนั้นก็จริง)"
10042060-49 = "(แต่เราคงถล่มครึ่งเมืองเกเฮนน่าเพียงเพื่อจะหยุดเจ้านั่นไม่ได้...)"
10042060-50 = "(แล้วถ้าพวกแรคคูนแพนเดโมเนียม โซไซตี้ยกเรื่องนี้มาตำหนิเราละก็...)"
10042060-51 = "เจ้าหน้าที่อาวุโส..."
10042060-52 = "คะ...?"
10042060-53 = "ข้างหลังค่ะ"
10042060-54 = "...?"
10042060-55 = "ข้างหลังเหรอ...? ข้างหลังฉันมีอะไร..."
10042060-60 = "ว้ายยยยยยย!?"
10042060-67 = "แพนจังเอาหนวดพันเจ้าหน้าที่อาโกะไปแล้วค่ะ!"
10042060-68 = "ละ... แล้วดันไปพันข้อเท้าอีก...!"
10042060-69 = "เป็นยังไงบ้างคะ เจ้าหน้าที่อาโกะ?! ถูกห้อยหัวต่องแต่งเลย...!?"
10042060-73 = "ว้าย! ว้ายย!! ว้ายยย!!! เอาฉันลงไปทีค่ะ!!!!"
10042060-77 = "ม่าย! นี่มันอะไรกันคะ! ทั้งเหนียว! ทั้งหนืด! ทั้งลื่น! แย่ที่สุดเลย...!"
10042060-80 = "อุ้บบบ?!?!?!"
10042060-82 = "[ns] \"เหวออ... แพนจังเอาหนวดอุดปากอาโกะแล้ว...!\""
10042060-83 = "อย่างนี้นี่เอง นักเรียนในห้องเรียนก็โดนเล่นงานในลักษณะนี้สินะคะ"
10042060-84 = "อุ้บบบบบ!!! (นี่มันใช่เวลามาวิเคราะห์อย่างใจเย็นอยู่เหรอคะ?!?!)"
10042060-85 = "อุ้บบบบบ! อุ้บบบบบบบ!!! (ทำอะไร! สักอย่างสิคะ!!!)"
10042060-86 = "ทะ... ทะทะทะทะ... ทำยังไงดี?!?! พูดว่าอะไรก็ฟังไม่ออกด้วย!"
10042060-87 = "ฉันก็ฟังไม่ออกค่ะ ฉันไม่ได้มีทักษะแบบนั้นน่ะ"
10042060-88 = "พวกเราทำอะไรได้บ้างคะ...?"
10042060-89 = "..."
10042060-90 = "ต้องขวางไว้ค่ะ ไม่ว่ายังไงก็ต้องหยุดแพนจังให้ได้...!!"
10042060-91 = "จูริ...?"
10042060-92 = "คิดจะทำอะไร... กับเจ้านั่นเหรอคะ?"
10042060-93 = "ฉันคิดไม่ออกเลยว่าจะจัดการเจ้านั่นในทางกายภาพโดยทันทีได้ยังไง..."
10042060-94 = "ฉันเองก็ไม่รู้เหมือนกัน แต่ยังไงเราก็ต้องหยุดแพนจังไว้ค่ะ!"
10042060-98 = "ฉันจะลองทำดูค่ะ..."
10042060-99 = "[s3] \"จูริ...!? จะทำอะไรน่ะ...?\"\n[s4] \"จูริ...!? จะทำอะไรเหรอ...?\""
10042060-102 = "ฉัน... อยากทำอาหารเก่งค่ะ ความตั้งใจนี้จะไม่เปลี่ยนแปลง แม้ในอนาคตก็ตามค่ะ"
10042060-103 = "ในครั้งนี้ ตอนแรกมันก็ออกมาดีค่ะ แล้วฉันก็ดีใจมากๆ ด้วย"
10042060-104 = "ในอนาคต..."
10042060-105 = "ฉันอยากทำอาหารแบบนั้น... ให้ได้อีกสักครั้งค่ะ"
10042060-106 = "จูริ...!? จู่ๆ ก็พูดเรื่องอะไรน่ะ? มันเกี่ยวกับสถานการณ์ตอนนี้ด้วยเหรอ...?"
10042060-107 = "เป็นอย่างนี้สินะคะ จะรับมือแบบนี้สินะ"
10042060-108 = "รุ่นพี่!?!?"
10042060-109 = "ไม่เป็นไรค่ะ รุ่นพี่ ทุกอย่างจะไม่เป็นอะไรค่ะ"
10042060-110 = "แต่ถึงอย่างนั้น ฉันก็คิดว่าตัวเองต้องทำอะไรเกี่ยวกับเรื่องนี้บ้าง"
10042060-111 = "ก็เพราะว่า..."
10042060-113 = "นั่นคือสิ่งที่ฉันต้องทำค่ะ"
10042060-115 = "[ns5] \"หยุดนะ อย่าพูดแบบนี้สิ...!\"\n[ns6] \"พูดแบบนี้หมายความว่ายังไง!!!\""
10042060-118 = "ไม่เป็นไรค่ะ คุณครู ทุกอย่างจะคลี่คลายได้ค่ะ แต่ว่า..."
10042060-119 = "..."
10042060-120 = "ช่วยจดจำสิ่งนี้ไว้ด้วยนะคะ อย่าให้เลือนหายไปจากความทรงจำล่ะ"
10042060-121 = "ฉันจะ... ไปดึงดูดความสนใจให้เองค่ะ"
10042060-122 = "ถ้างั้น..."
10042060-126 = "เดี๋ยวฉันกลับมานะคะ..."
10042060-132 = "คิดจะทำอะไรน่ะ เดี๋ยวก็ไม่ได้กลับมาหรอก!!!"

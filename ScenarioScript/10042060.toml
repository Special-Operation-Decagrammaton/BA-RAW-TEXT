[translation]
10042060-1 = "第6話;該做的事"
10042060-2 = "……"
10042060-3 = "這，這究竟……"
10042060-4 = "[s]「所以我不是說過了嗎……」"
10042060-5 = "是這樣沒錯，但不該是這樣吧！？"
10042060-6 = "我是不是不小心闖進某人的惡夢裡了！？"
10042060-10 = "好痛！"
10042060-11 = "所以這……真的是現實嗎！？"
10042060-12 = "（那個……）"
10042060-13 = "（我也會這樣做耶……）"
10042060-14 = "面對突如其來的狀況，人有時會做出異於往常的舉動。#n這應該就屬於那種症狀吧。"
10042060-15 = "廢話少說！"
10042060-16 = "怎麼會這樣呢……#n雖然有聽說是巨大鬆餅，沒想到居然誇張到這種地步……"
10042060-17 = "我那刻意反應過度，好向老師要求代價的計畫……"
10042060-18 = "[s]「原來你有那種計畫啊……」"
10042060-19 = "唔……！"
10042060-20 = "從，從結果來說，我還是及時提供了能突破局面的對策不是嗎！？#n這反而是正確的選擇吧！？"
10042060-21 = "快回答我是這樣沒錯！#n不要做出那種「這個人有夠不要臉……」的表情！"
10042060-22 = "[s]「好好好～不哭不哭，眼淚是珍珠。」"
10042060-23 = "誰，誰哭了啊！？我才沒有哭好嗎！？"
10042060-24 = "……"
10042060-25 = "總之所有砲台，準備發射！"
10042060-26 = "是！88mm FlaK 36共12座砲台預備！"
10042060-27 = "請，請等一下，行政官……！麻煩借一步說話！"
10042060-28 = "……又怎麼了！？"
10042060-29 = "那個……"
10042060-30 = "……行政官！#n目標物……那個巨大的……"
10042060-31 = "「鬆餅」的移動速度過快，很難精確瞄準！"
10042060-32 = "而且它還在建築物之間迅速穿梭作為掩護……"
10042060-33 = "這樣下去，可能會破壞到格黑娜自治區的建築物！"
10042060-34 = "……你說什麼？"
10042060-35 = "……嗯，我想說的就是這個。"
10042060-36 = "不，不不不……先等一下。"
10042060-37 = "鬆餅在建築物之間迅速穿梭……難以瞄準，可能破壞市區建築……"
10042060-38 = "不，我……啊……現在到底是什麼情況……"
10042060-39 = "[s1]「……看來事情不妙了。」\n[s2]「不過至少沒有說要直接開火呢。」"
10042060-42 = "您到底把我當成什麼樣的人了……"
10042060-43 = "唔……"
10042060-48 = "（消滅那個東西自然是眼下最重要的目標沒錯）"
10042060-49 = "（不過要是在過程中造成格黑娜的損害……就本末倒置了）"
10042060-50 = "（況且要是萬魔殿的那些老狐狸拿這件事做文章……！）"
10042060-51 = "……行政官。"
10042060-52 = "……咦？"
10042060-53 = "你後面。"
10042060-54 = "……"
10042060-55 = "……後面？#n後面怎麼──"
10042060-60 = "呀啊啊啊啊啊啊啊啊啊啊！？！？"
10042060-67 = "餅醬的觸手抓住了亞子行政官！"
10042060-68 = "而，而且還偏偏是腳踝……！"
10042060-69 = "亞子行政官，你沒事吧！？#n居然被吊掛起來了……！？"
10042060-73 = "啊！啊啊！！啊啊啊！！！拜託快想想辦法！！！！"
10042060-77 = "不要！這是什麼！好可怕！#n黏糊糊又滑溜溜的，有夠噁心！真是糟透了……！"
10042060-80 = "……哦嗚哦嗚！？！？"
10042060-82 = "[ns]「唔哇……餅醬的觸手纏住了亞子……！」"
10042060-83 = "原來如此。#n之前教室裡的學生們也是像這樣被吊起來的吧。"
10042060-84 = "　汗蓋戶摁應亨溪篤實賀麻！？！？#n（現在是冷靜分析的時候嗎！？！？）"
10042060-85 = "　蓋托愾奛奛槓哈！！！#n（拜託快想想辦法！！！）"
10042060-86 = "現，現現現，現在該怎麼辦！？#n有人能聽懂他在說什麼嗎！？"
10042060-87 = "我也聽不懂。而且我並沒有那樣的興趣。"
10042060-88 = "我們能做什麼呢……？"
10042060-89 = "……"
10042060-90 = "一定要阻止它。無論如何都要……！！"
10042060-91 = "茱莉……？"
10042060-92 = "你想做什麼……？那個究竟要怎麼……？"
10042060-93 = "一時之間，我還想不到能在物理層面上可行的方案……"
10042060-94 = "雖然我也沒有多少把握，但不管怎樣都要阻止它才行！"
10042060-98 = "……我來試試看。"
10042060-99 = "[s3]「茱莉……！？」\n[s4]「你想做什麼……？」"
10042060-102 = "我……想要把料理做好。#n這份初衷沒有改變過，未來應該也不會變。"
10042060-103 = "今天的成功雖然有些莫名……不過當時我真的非常開心。"
10042060-104 = "要是總有一天……"
10042060-105 = "……還能再次做出那樣的料理就好了。"
10042060-106 = "茱莉……！？怎麼突然說這個？#n這和現在的狀況有關係嗎……？"
10042060-107 = "……是在立Flag嗎。"
10042060-108 = "前輩！？！？"
10042060-109 = "不必擔心，前輩。#n一切……肯定會沒事的。"
10042060-110 = "即便拋開這些不談，這個問題還是得由我來解決。"
10042060-111 = "因為……"
10042060-113 = "……這是我應該負起的責任。"
10042060-115 = "[ns5]「別說了！那種話……！」\n[ns6]「在這種情況下說那種台詞！！！」"
10042060-118 = "請老師別擔心……一定會沒事的。#n不過……"
10042060-119 = "……"
10042060-120 = "請你一定要記得我。"
10042060-121 = "我會想辦法引開它的注意……"
10042060-122 = "那麼……"
10042060-126 = "……我走了。"
10042060-132 = "這完全是一去不回的劇情走向吧！！！"

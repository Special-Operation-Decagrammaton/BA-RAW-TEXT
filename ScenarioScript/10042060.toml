10042060-99 = "[s3] \"Juri...?!\"\n[s4] \"What's the idea?\""
10042060-102 = "I want to get better at cooking. And I know I might never be good enough."
10042060-103 = "But when I was there in that kitchen, for just that moment, I was really happy."
10042060-104 = "I hope, one day..."

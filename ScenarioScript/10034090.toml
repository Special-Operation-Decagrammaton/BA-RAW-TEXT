[translation]
10034090-1 = "เรื่องหลังจากนั้น 1;ชิอินะ สึมุกิ"
10034090-5 = "[ns1] \"มาถึงแล้ว\"\n[ns2] \"น่าจะเป็นอาคารนี้นะ\""
10034090-8 = "ดูจากที่อยู่ที่ได้มาก็น่าจะถูกนะ ก็นะ แถวนี้มีที่ให้แสดงดนตรีเยอะนี่นา"
10034090-10 = "แต่ว่าที่นี่ไม่ใช่โรงเรียนแฮะ ไม่เห็นมีที่ให้เช่าห้องซ้อมหรือดาดฟ้าให้ซ้อมแบบพวกเราด้วย..."
10034090-11 = "มันก็แน่นอนอยู่แล้วนี่? เธอก็กล้าเปรียบที่นี่กับโรงเรียนเรานะ"
10034090-12 = "แต่ที่นี่ให้ความรู้สึกตึงเครียดจังเลยนะคะ ต่างจากตอนของพวกเราเลย"
10034090-18 = "ว่าแต่เราจะเข้าไปดื้อๆ เลยได้เหรอ? หรือว่าต้องไปซื้อตั๋วข้างใน?"
10034090-19 = "ปกติน่าจะเป็นอย่างนั้นนะ"
10034090-20 = "เราไม่จำเป็นต้องไปทักทายเป็นการส่วนตัวหรอก ในเมื่อเธอบอกเองว่าวันนี้เป็นการแสดงของตัวเอง งั้นก็คงจะยุ่งๆ อยู่นั่นละ"
10034090-21 = "ก็จริงนะ เอาไว้ติดต่อไปหลังจากดูเสร็จแล้วบอกว่า \"การแสดงยอดเยี่ยมมากเลย\" ก็ได้"
10034090-27 = "ให้ไอริเป็นตัวแทนชมรมเราแล้วติดต่อไปแล้วกัน"
10034090-28 = "ฉันบอกแล้วนี่นาว่าจะไม่รับหน้าที่หัวหน้าน่ะ..."
10034090-29 = "เป็นตัวแทนต่างหาก ไม่ใช่หัวหน้า... อยากซ่อนความสามารถของตัวเองขนาดนั้นเลยเหรอ?"
10034090-30 = "แต่ก็นะ แบบนี้ก็ถือว่าร็อกอยู่..."
10034090-31 = "อ่า... ไม่ใช่อย่างนั้นนะ..."
10034090-33 = "เรื่องนั้นเอาไว้ก่อนเถอะ เราเข้าไปข้างในกันดีกว่า คุณครูรู้ใช่มั้ยว่าสึมุกิหน้าตาเป็นยังไง?"
10034090-34 = "[s] \"ก็มีส่วนคล้ายนัตสึอยู่นะ\""
10034090-35 = "โอ้ว..."
10034090-36 = "เออะ... รู้สึกกังวลอะไรแปลกๆ แฮะ... จะโอเคใช่มั้ย คนนั้นน่ะ?"
10034090-37 = "อืม..."
10034090-38 = "ขะ... เข้าไปข้างในกันเถอะ! ฮ่าฮ่า...!"
10034090-52 = "ไปลงนรกซะเถอะ ไปไป!!!!"
10034090-53 = "โว้ววววววว!!!"
10034090-57 = "เด๊ดดดด สะมอเร่!!!"
10034090-58 = "ว้าววววววววว!!!"
10034090-63 = "......"
10034090-64 = "......"
10034090-65 = "......"
10034090-66 = "......"
10034090-70 = "\"ก็มีส่วนคล้ายนัตสึอยู่นะ\" งั้นเหรอ..."
10034090-71 = "[s3] \"เอ่อ... อืม... นี่มัน...\"\n[s4] \"ที่เคยเห็นมาไม่ใช่อย่างนี้นี่...\""
10034090-77 = "นี่น่ะเหรอที่บอกว่าเหมือนฉันน่ะ..."

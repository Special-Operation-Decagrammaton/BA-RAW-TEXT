[translation]
10034090-1 = "後日談（１）;椎名紬"
10034090-5 = "[ns1]「……到了。」\n[ns2]「應該就是這棟建築吧。」"
10034090-8 = "從他給的地址來看，應該是這裡沒錯。#n這附近有很多演出場地。"
10034090-10 = "不過竟然不是在學校，也不像我們是去租練習室或屋頂……"
10034090-11 = "那還用說。#n拿人家跟我們比，真是失禮……"
10034090-12 = "的確有種專業的感覺，跟我們那時完全不一樣。"
10034090-18 = "直接進去就行了嗎？門票是進去之後才買？"
10034090-19 = "通常都是這樣吧。"
10034090-20 = "應該也沒必要特別去打招呼。#n畢竟他今天有演出，應該挺忙的。"
10034090-21 = "嗯，那倒也是。#n等我們看完之後再把感想傳給他就行了。"
10034090-27 = "這件事就交給社團的代表愛莉囉。"
10034090-28 = "都說了我不要當部長……"
10034090-29 = "代表跟部長又不一樣……#n還是說你就這麼想隱藏實力嗎？"
10034090-30 = "這樣確實是比較搖滾啦……"
10034090-31 = "嗚嗚……就說不是這樣了……"
10034090-33 = "好了，時間差不多了，我們進去吧。#n老師應該認得那個叫紬的人吧？"
10034090-34 = "[s]「嗯，他給人的感覺有點像夏。」"
10034090-35 = "哦……"
10034090-36 = "呃……總覺得有點不安……沒問題吧？"
10034090-37 = "嗯……"
10034090-38 = "總，總之先進去吧！哈哈……！"
10034090-52 = "人類的死亡是社會的福祉──！！！"
10034090-53 = "嗚哦哦哦哦哦哦哦哦哦哦──！！！"
10034090-57 = "全部都去死吧──！！！"
10034090-58 = "哇啊啊啊啊啊啊啊──！！！"
10034090-63 = "…………"
10034090-64 = "…………"
10034090-65 = "…………"
10034090-66 = "…………"
10034090-70 = "「給人的感覺有點像夏」……是嗎？"
10034090-71 = "[s3]「不是，那個……呃……我……」\n[s4]「不是，這跟我看過的他不一樣……」"
10034090-77 = "……看來我似乎有必要重新審視一下自己的人生。"

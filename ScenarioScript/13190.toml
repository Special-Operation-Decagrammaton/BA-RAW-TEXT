13190-43 = "คุณพ่อบ้าน... เนฟธิสร่วมมือกับไคเซอร์เหรอคะ...?"
13190-44 = "ฮ่าฮ่าฮ่า หัวไวดีนี่ สมกับเป็นทายาทของบริษัทเลยนะ "

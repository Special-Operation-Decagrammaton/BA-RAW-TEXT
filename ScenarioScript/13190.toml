[translation]
13190-1 = "第19話;債權團大會"
13190-3 = "總裁！列車砲的藏匿位置幾乎已鎖定完畢。"
13190-4 = "哦，真的嗎？拿來我看看……"
13190-8 = "是距離這裡約480km遠，有沙漠橫貫鐵路經過的封鎖地區！"
13190-9 = "……這樣啊。"
13190-10 = "這倒是在意料之外……看來是動了點腦筋啊。"
13190-11 = "把需要的東西都帶走。尤其是那個奈芙蒂斯的大小姐。"
13190-13 = "遵命。"
13190-18 = "繼續提高地點的準確度，把能前往那裡的交通工具也準備好。"
13190-20 = "是！"
13190-28 = "歡迎，奈芙蒂斯集團的大小姐。"
13190-29 = "凱薩總裁……？"
13190-43 = "管家……奈芙蒂斯和凱薩聯手了嗎……？"
13190-44 = "哈哈哈，你的理解速度還真快。#n該說不愧是企業的接班人嗎？"
13190-45 = "沒錯，就像你說的一樣。"
13190-46 = "怎麼會……！"
13190-47 = "這一切都是為了阿拜多斯！！"
13190-48 = "只要取得列車砲……只要有那股「強大的力量」，復興阿拜多斯也不是不可能！！"
13190-49 = "不要再做白日夢了！"
13190-54 = "請看看現在的情況，管家！"
13190-62 = "這種混亂的場面……是你希望看見的嗎……？"
13190-63 = "這……"
13190-64 = "星野前輩說的沒錯。#n如果為了達到目的而習慣「這種方式」……遲早會迷失自我。"
13190-66 = "不，我認為這才是阿拜多斯應有的作風。"
13190-67 = "……咦！？"
13190-68 = "據說就連那些三一的大小姐，過去也曾拔過敵人的指甲。#n「那種方式」在過去應該並不罕見才對。"
13190-69 = "我不認為曾經作為最強、最偉大的阿拜多斯自治區會對「那種方式」有所抗拒。"
13190-70 = "這……"
13190-74 = "總裁！有入侵者！"
13190-75 = "是夏萊嗎？"
13190-76 = "不，不是，入侵者只有1個人！小鳥遊星野進入建築內部了！"
13190-78 = "星野前輩……！？"
13190-83 = "AM 11:3X"
13190-85 = "哦哦，現在的時間是…… "
13190-86 = "哎呀哎呀，離12點還剩大約30分鐘啊……將軍到底在做什麼？"
13190-87 = "前輩怎麼會一個人……？"
13190-88 = "對策委員會和夏萊的老師正與星野分頭行動。"
13190-89 = "或許是雙方沒能達成圓滿的協議吧。"
13190-90 = "前輩……大家……怎麼會……"
13190-94 = "第二防線已被突破……！要繼續防守恐怕會有困難。"
13190-95 = "唉，真是的。這樣看起來不就像我們輸了一樣嗎。"
13190-96 = "請，請問接下來該怎麼做？"
13190-97 = "列車砲的位置呢？"
13190-99 = "……快結束了！很快就能確定正確座標！"
13190-101 = "交通工具準備好了嗎？"
13190-102 = "預計大約20分鐘後，直升機就會抵達屋頂的機場！"
13190-103 = "……好吧，看來在那之前必須先應付一下他了。"
13190-109 = "已確認座標！"
13190-110 = "「阿拜多斯沙漠封鎖區35-9」……？#n藏匿列車砲的地點就是這裡嗎？"
13190-114 = "AM 11:4X"
13190-116 = "哈啊……哈啊…… "
13190-117 = "星野前輩……！！"
13190-118 = "（區域35-9……？）"
13190-119 = "抱歉我來晚了。#n野乃美醬……你沒事吧？"
13190-120 = "嗯……我……"
13190-133 = "……凱薩公司。"
13190-136 = "還是第一次見到你本人呢，小鳥遊星野。#n我就是凱薩的總裁。"
13190-137 = "你的事情我已經從凱薩董事口中聽說過了。#n你就是那個黑色西裝人想得到的人才吧？"
13190-138 = "……現在是什麼情況？債權團大會還有效嗎？"
13190-139 = "當然，只是「私募基金」的代表在不久前改由我擔任而已。#n現在大會的舉辦和閉幕權限都在我的手上。"
13190-140 = "沒錯，現在還沒超過12點……你有資格進行合法的公證。"
13190-141 = "……"
13190-142 = "開場白似乎有點太長了呢。"
13190-143 = "那麼從現在起，阿拜多斯DLB的債權團大會正式開始。"
13190-150 = "在這場大會上，你有要進行公證的事項嗎，小鳥遊星野？"
13190-158 = "原本的協議是只要我否定「阿拜多斯學生會」的正當性，野乃美就會得救。"
13190-159 = "不過……"
13190-165 = "現在這個協議還有效嗎？"
13190-166 = "不，當然無效。#n畢竟如果你那麼公證，列車砲的所有權就會落入奈芙蒂斯手裡。"
13190-167 = "那樣我可是會很傷腦筋的。"
13190-168 = "……"
13190-169 = "如果你希望十六夜野乃美被平安釋放，就在此公證契約「終結」吧。"
13190-170 = "這樣我這個「私募基金」的代表才能擁有列車砲。"
13190-171 = "……"
13190-173 = "不可以！！前輩！奈芙蒂斯和凱薩都不能擁有列車砲！！"
13190-174 = "請不要否定夢前輩……必須繼承契約啊，前輩！！"
13190-179 = "哎呀，他是這麼說的……你打算怎麼做呢？"
13190-181 = "不，不行！"
13190-182 = "與其讓凱薩那些傢伙擁有那股力量，不如把它交給我們奈芙蒂斯！"
13190-183 = "還請務必做出明智的選擇！為了阿拜多斯的未來著想！"
13190-185 = "管家……！！"
13190-186 = "請別忘了大小姐作為人質的價值，在於強制轉學到高地人鐵道學園！"
13190-187 = "只要我們想，隨時都能做到……！！所以……"
13190-192 = "那我就從阿拜多斯退學！！"
13190-199 = "這樣可以了吧？我已經失去作為人質的價值了！！"
13190-200 = "所以前輩！！你不用再費心保護我了！我已經……！"
13190-201 = "……別擔心，野乃美醬。#n你沒必要退學。"
13190-202 = "咦……？"
13190-203 = "因為我根本不打算就這樣交出列車砲。"
13190-204 = "星野前輩？難，難道……？"
13190-208 = "……我以契約的當事者「阿拜多斯學生會」副學生會長的身分進行公證。"
13190-209 = "梔子夢和小鳥遊星野的學生會，是不具正當性的冒牌組織。"
13190-210 = "……！！"
13190-215 = "……！！"
13190-216 = "因此不具備學生會長資格的梔子夢，其簽訂的契約是無效──"
13190-220 = "請等一下──！！！"
13190-225 = "AM 11:5X"
13190-229 = "[ns]「那個發言是無效的！」"
13190-231 = "大，大家……！"
13190-233 = "沒錯！那個公證並不具備效力。#n現在的星野前輩沒有代表「阿拜多斯學生會」的資格！"
13190-234 = "什，什麼……！？"
13190-235 = "因為我才是「阿拜多斯學生會」的學生會長！"
13190-236 = "咦……？學，學生會長……？綾音醬嗎……！？"
13190-238 = "[ns1]「沒錯，綾音當選新學生會長了。」\n[ns2]「我就是證人。」"
13190-241 = "[ns]「綾音是透過正當投票選出的正式學生會長。」"
13190-242 = "老，老師……？大家？#n這到底是……"
13190-243 = "嗯，我們投綾音當學生會長了。"
13190-244 = "就是這樣，星野前輩。#n獨斷專行到此為止了。"
13190-248 = "……"
13190-249 = "還有，前輩已經從副學生會長降格為書記了！！"
13190-250 = "一個小小的書記，居然未經學生會長同意擅自惹事……我絕對不會原諒！"
13190-252 = "（說自己的職務是小小的書記……！？）"
13190-254 = "星野前輩不能否定夢會長！因為我們就是夢會長真實存在的證明！"
13190-255 = "我們是夢會長的學生會直屬後輩，#n而對策委員會就是「阿拜多斯學生會」存在的證據！！"
13190-256 = "……"
13190-258 = "綾音醬……"
13190-260 = "所以夢前輩的買賣契約將由正當的學生會──對策委員會延續下去。#n我在此公證這個事實！"
13190-266 = "[ns]「而且沒有我的同意，退出社團的事是不會通過的，野乃美。」"
13190-268 = "[ns]「這點你應該很清楚才對。」"
13190-269 = "老師……"
13190-273 = "AM 12:0X"
13190-275 = "原來如此……來這套啊。"
13190-276 = "也許用這種方式對付夏萊，本來就是不可能的。"
13190-277 = "算了，無所謂。#n反正這自始至終都只是在打發時間而已。"
13190-281 = "[ruby= ・     ・ ]鬧劇[/ruby]結束了。#n大會就此閉幕。"
13190-289 = "[ns]「你說什麼！」"
13190-294 = "我在這場大會上沒做過任何公證，也不曾透過公證承認任何發言。"
13190-295 = "什，什麼……！？"
13190-296 = "……！！"
13190-298 = "也就是說，你們的努力從一開始就沒有意義。"
13190-303 = "這份契約簽訂後已經過了2年，因此失去了效力。#n我就此廢除它。"
13190-310 = "列車砲打從一開始就是凱薩的。所有權從來沒有變過。"
13190-311 = "[ruby= ・     ・ ]就這[/ruby][ruby= ・     ・ ]麼決[/ruby][ruby= ・     ・ ]定了[/ruby]。"
13190-312 = "太，太不講理了吧！！"
13190-317 = "（竊竊私語）……直升機即將抵達。"
13190-321 = "把這裡的人全部處理掉。#n私募基金、奈芙蒂斯，還有阿拜多斯都一樣。"
13190-328 = "往列車砲的藏匿地點出發吧。#n啊，奈芙蒂斯的大小姐還能派上用場，把他一起帶走。"
13190-338 = "等等！！"
13190-345 = "星野前輩！！野乃美！"
13190-348 = "等，等等！白子前輩，後面也有敵人正在進攻！"
13190-350 = "老師，這樣下去野乃美前輩會被抓走！#n星野前輩雖然想救他，但是……"
13190-351 = "把他們兩人救出來吧！麻煩進行作戰指揮！"

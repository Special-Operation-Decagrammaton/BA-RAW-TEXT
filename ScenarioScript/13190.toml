13190-68 = "ได้ยินว่าแม้กระทั่งพวกคุณหนูแห่งทรีนิตี้ก็เคยถอดเล็บของศัตรูในอดีตเหมือนกัน <วิธีแบบนั้น> คงจะใช้กันทั่วไปในอดีตเลยละ"
13190-69 = "ฉันไม่คิดว่าเขตปกครองตนเองที่ครั้งหนึ่งเคยแข็งแกร่งและยิ่งใหญ่ที่สุดอย่างอะบิดอสจะต่อต้านการ#nใช้ <วิธีแบบนั้น> หรอกนะ"

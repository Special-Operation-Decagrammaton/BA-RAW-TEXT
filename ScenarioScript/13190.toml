13190-295 = "ดะ... ได้ยังไงกัน...!!"
13190-296 = "...!!"
13190-298 = "สรุปก็คือ ความพยายามของพวกเธอมันไร้ความหมายตั้งแต่แรกแล้วน่ะสิ"
13190-303 = "สัญญาซื้อขายนี้มีการลงนามเกิน 2 ปีแล้ว ดังนั้นก็ถือว่าสูญเสียผลในทางกฎหมายไปแล้ว ถือเป็นอันยุติสัญญา"
13190-310 = "ปืนแม่เหล็กไฟฟ้าเป็นของของไคเซอร์ตั้งแต่แรก ไม่มีการเปลี่ยนผู้ถือกรรมสิทธิ์ใดๆ ทั้งนั้น"
13190-311 = "สรุปว่าเป็นเช่นนี้นับตั้งแต่นี้เป็นต้นไป และข้อคัดค้านใดๆ จะไม่ถูกยอมรับ"
13190-312 = "ทะ... ทำไมถึงได้ดันทุรังแบบนี้!!"
13190-317 = "(กระซิบ) เฮลิคอปเตอร์ใกล้จะมาถึงแล้วครับ "
13190-321 = "จัดการพวกคนที่อยู่ตรงนี้ให้หมด ทั้งกองทุนไพรเวทอิควิตี้ เนฟธิส แล้วก็อะบิดอสทุกคน"
13190-328 = "แล้วเราก็จะไปยังพิกัดของปืนแม่เหล็กไฟฟ้าทันที อ้อ เอาตัวคุณหนูของเนฟธิสไปด้วยละ"
13190-338 = "หยุดนะ!!"
13190-345 = "รุ่นพี่โฮชิโนะ!! โนโนมิ!"
13190-348 = "ดะ... เดี๋ยวก่อน! รุ่นพี่ชิโรโกะ ศัตรูแห่กันมาจากทางข้างหลังด้วย!"
13190-350 = "คุณครู ถ้าเป็นแบบนี้รุ่นพี่โนโนมิจะโดนพาตัวไปนะคะ! ถึงรุ่นพี่โฮชิโนะจะพยายามช่วยอยู่ก็เถอะ..."
13190-351 = "เราต้องช่วยทั้ง 2 คนเลยค่ะ! ช่วยสั่งการด้วยค่ะ!"

[translation]
13190-1 = "Episode 19;General Creditors' Meeting"
13190-3 = "President! We've nearly pinpointed the Train Cannon's location!"
13190-4 = "Oh, is that so? Let's see..."
13190-8 = "We've narrowed the range down to a restricted district along the Trans-Desert Railway route, roughly 480 kilometers from here! "
13190-9 = "...Ah. Could it be...? "
13190-10 = "Even I didn't predict this. They sure used their heads."
13190-11 = "Make preparations. We'll need that Nephthys heir."
13190-13 = "Understood."
13190-18 = "Get me a more accurate location. Prepare transport too."
13190-20 = "Understood!"
13190-28 = "Oh, our little Nephthys lady. Welcome."
13190-29 = "...Kaiser's president?"
13190-43 = "Butler... Nephthys joined forces with Kaiser...?"
13190-44 = "Hahaha, you're a quick study. You're not the heir to the corporation for nothing. "
13190-45 = "You've got it right. "
13190-46 = "How could you?!"
13190-47 = "Everything we did was for Abydos!"
13190-48 = "If we just got our hands on the Train Cannon, with that kind of strength, reviving Abydos would have been—"
13190-49 = "That never would've happened! "
13190-54 = "Take a look around you, Butler! "
13190-62 = "Is this what you wanted? This destruction? This chaos?"
13190-63 = "That's..."
13190-64 = "Hoshino was right. If we fall to these depths, to these kinds of methods, just to achieve our goals... We'll lose who we are."
13190-66 = "I personally found this to be very in line with Abydos."
13190-67 = "...What?!"
13190-68 = "I've heard that Trinity wasn't above pulling enemies' nails out of their fingers to get what they wanted. \"These kinds of methods\", as you say, were par for the course back then."
13190-69 = "I hardly think that Abydos, the greatest and most powerful district of its time, would have had an aversion to \"these kinds of methods.\""
13190-70 = "That's..."
13190-74 = "President! Intruder alert! "
13190-75 = "Is it Schale?"
13190-76 = "No, there is only one. Takanashi Hoshino has entered the building!"
13190-78 = "Hoshino...?! "
13190-83 = "Current Time 11:3X AM."
13190-85 = "Ho, the current time is... "
13190-86 = "My, my. There's 30 minutes left until noon. Just what is the General doing out there?"
13190-87 = "But why is she alone...? "
13190-88 = "The Foreclosure Task Force and Schale's Sensei are moving in a separate group from Hoshino. "
13190-89 = "They likely weren't able to come to a mutual agreement on how to proceed."
13190-90 = "...Why would Hoshino...and the others...?"
13190-94 = "The second containment line has been breached...! It seems this will be more difficult than it originally seemed..."
13190-95 = "*sigh* This is really... We'll end up looking like the losers."
13190-96 = "Wh-What are your orders?"
13190-97 = "The Train Cannon's location?"
13190-99 = "...Nearly pinpointed! We'll have exact coordinates very soon!"
13190-101 = "Transportation? "
13190-102 = "There'll be a helicopter at this rooftop's helipad in about twenty minutes!"
13190-103 = "Good. I'll handle our visitors until then."
13190-109 = "Coordinates confirmed! Sending now!"
13190-110 = "Abydos Desert Restricted District Sector 35-9...? That's where the Train Cannon's hidden?"
13190-114 = "Current Time 11:4X AM."
13190-116 = "*huff*... *huff*... "
13190-117 = "Hoshino...!!"
13190-118 = "(Sector 35-9...?)"
13190-119 = "Sorry I'm late. Are you hurt, Nonomi?"
13190-120 = "No... I... "
13190-133 = "....Kaiser Corporation. "
13190-136 = "This is the first time I'm meeting you in person, Takanashi Hoshino. I am Kaiser's president. "
13190-137 = "The Kaiser Director gave me the report on you. You were the one that Black Suit wanted so badly, yes?"
13190-138 = "...What's going on here? Is the general creditors' meeting still in session?"
13190-139 = "Oh, that. I'm the new representative of the private equity fund. So, I hold all the rights to convene and adjourn the general meeting."
13190-140 = "...Ah, that's right. Since it's still before noon...you have the legitimate authority to make a legal statement."
13190-141 = "..."
13190-142 = "That was a lengthy introduction. Let me officially declare the opening of the general creditors' meeting."
13190-143 = "I hereby declare commencement of the Abydos DLB Bond general creditors' meeting."
13190-150 = "Is there something you wish to state at this meeting, Takanashi Hoshino?"
13190-158 = "I was promised that Nonomi would be freed if I denied the legitimacy of the Abydos Student Council."
13190-159 = "However..."
13190-165 = "Is that still valid?"
13190-166 = "No, of course not. If you were to make such a statement, Nephthys would become the owners of the Train Cannon. "
13190-167 = "We certainly can't let that happen."
13190-168 = "..."
13190-169 = "If you wish for Nonomi's safe return, certify the termination of the contract. "
13190-170 = "Then, I, the representative of the private equity fund, will take full ownership of the Train Cannon."
13190-171 = "..."
13190-173 = "No! Hoshino! Don't hand over the Train Cannon to Nephthys or Kaiser! "
13190-174 = "You can't deny what you had with Yume! You have to uphold the contract! "
13190-179 = "Dear, oh dear. That's her stance. What will you do?"
13190-181 = "No, don't do this! "
13190-182 = "It would be better for us, Nephthys, to have that power rather than that lowly scum at Kaiser!"
13190-183 = "Make the right decision! This is for the future of Abydos! "
13190-185 = "Butler...!"
13190-186 = "Don't forget, Nonomi's value as a hostage is entirely tied to her forced transfer to Highlander Academy!"
13190-187 = "As long as we're around, that's always a possibility!"
13190-192 = "Then I'll drop out of Abydos!!"
13190-199 = "That settles it, right? I have no more value as a hostage!!"
13190-200 = "There, Hoshino! You don't need to protect me. I'm already—"
13190-201 = "...Don't worry, Nonomi. You don't have to drop out."
13190-202 = "Wait, what...?"
13190-203 = "I'm not going to just hand over the Train Cannon. Not like this."
13190-204 = "Hoshino? Y-You're not...?"
13190-208 = "...As the Vice President of the Abydos Student Council, the principal of the contract, this is my declaration."
13190-209 = "I confess that Kuchinashi Yume and Takanashi Hoshino's student council was an unauthorized organization, operating illegitimately."
13190-210 = "...!!"
13190-215 = "...!!"
13190-216 = "Therefore, I hereby certify that Kuchinashi Yume had no authority as a student council president, and the contract drafted by her is null and—"
13190-220 = "Stop right there!"
13190-225 = "Current Time 11:5X AM."
13190-229 = "[ns] \"Stop! That statement is invalid!\""
13190-231 = "E-Everyone...!"
13190-233 = "Yes! That statement is invalid. Hoshino has no authority to represent the Abydos Student Council!"
13190-234 = "H-Huh...?!"
13190-235 = "And that's because I am the Abydos Student Council President! "
13190-236 = "Wh-What...? Student Council President...? Ayane...?!"
13190-238 = "[ns1] \"Yes, we've voted Ayane as the new student council president.\"\n[ns2] \"I served as the witness.\" "
13190-241 = "[ns] \"Ayane is the official student council president, elected through a legitimate vote.\""
13190-242 = "S-Sensei...? Everyone? Wh-What in the world...?"
13190-243 = "Yeah. We voted Ayane in as the student council president."
13190-244 = "That's how it is, Hoshino. So no more lone ranger stuff."
13190-248 = "..."
13190-249 = "Also, you've been demoted from Vice President to Secretary! "
13190-250 = "How dare an insignificant secretary act independently, without permission from the student council president... This is an unforgivable act!"
13190-252 = "(Did she just call her old position insignificant...?!)"
13190-254 = "You can't deny what Yume was to Abydos, Hoshino! Our existence is the very proof that Yume was a real president! "
13190-255 = "We are the direct successors of President Yume, and the Foreclosure Task Force is the proof of Abydos Student Council's existence!"
13190-256 = "..."
13190-258 = "Ayane..."
13190-260 = "Therefore, Yume's contract will be upheld by the Foreclosure Task Force, the legitimate student council! I hereby declare our intent to certify the contract!"
13190-266 = "[ns] \"And you can't be discharged from our school without my permission, Nonomi.\""
13190-268 = "[ns] \"You know exactly how that played out last time.\""
13190-269 = "Sensei..."
13190-273 = "Current Time 12:0X AM."
13190-275 = "So... That's how it is?"
13190-276 = "I should've predicted Schale wouldn't let this option play out. "
13190-277 = "Eh, no matter. I was just killing time regardless."
13190-281 = "Enough games. This meeting is hereby adjourned."
13190-289 = "[ns] \"What?!\""
13190-294 = "Did I acknowledge your grand declaration? Was anything at this general meeting officially certified?"
13190-295 = "What are you...?!"
13190-296 = "...!!"
13190-298 = "In other words, all of your effort was meaningless."
13190-303 = "Two years have officially passed since this contract's signing. Thus it is no longer valid. Null and void."
13190-310 = "In other words, your little contract never existed. The Train Cannon has always belonged to Kaiser."
13190-311 = "That's how it began, and that is how it'll end."
13190-312 = "Th-That's absurd."
13190-317 = "*whisper* ..The helicopter is arriving now. "
13190-321 = "Take care of the trash. The private equity fund, Nephthys, Abydos, all of them!"
13190-328 = "I'm heading to the Train Cannon's location. Oh, bring the Nephthys heir. We'll need her."
13190-338 = "Wait!"
13190-345 = "Hoshino! Nonomi!"
13190-348 = "H-Hold on, Shiroko! There's enemies coming at us!"
13190-350 = "They're going to get away with Nonomi, Sensei! Hoshino'll do everything she can to save her, but..."
13190-351 = "We have to rescue both of them! Please take command!"

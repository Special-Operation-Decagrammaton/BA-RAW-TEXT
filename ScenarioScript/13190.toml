13190-11 = "เตรียมของที่จำเป็นไปด้วย โดยเฉพาะคุณหนูจากเนฟธิสคนนั้น"
13190-13 = "เข้าใจแล้ว"
13190-18 = "หาพิกัดของปืนให้แม่นยำมากกว่านี้ แล้วเตรียมวิธีการเดินทางไปที่นั่นด้วย"
13190-20 = "รับทราบครับ!"

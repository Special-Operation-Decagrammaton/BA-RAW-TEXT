[translation]
13190-1 = "ตอนที่ 19;การประชุมสมัชชาเจ้าหนี้"
13190-3 = "ท่านประธานใหญ่! เราใกล้จะระบุตำแหน่งของปืนแม่เหล็กไฟฟ้าได้แล้วครับ"

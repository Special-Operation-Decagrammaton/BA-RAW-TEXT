13190-63 = "เรื่องนั้น..."
13190-64 = "รุ่นพี่โฮชิโนะพูดถูกแล้วค่ะ ถ้าเรายิ่งชินกับ <วิธีแบบนี้> เพื่อให้บรรลุเป้าหมายแล้วละก็... พวกเราก็จะ#nสูญเสียตัวเองไปค่ะ..."

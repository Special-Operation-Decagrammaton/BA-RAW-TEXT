13190-48 = "ถ้าได้ปืนแม่เหล็กไฟฟ้ามาไว้ในครอบครองละก็ ถ้าเรามี <พลังอันยิ่งใหญ่> พลังนั้น อะบิดอสก็จะฟื้นฟูได้...!"

[translation]
2000802-1 = "總之就是陰謀！"
2000802-2 = "（收到固執又亂來的MomoTalk訊息，前往約好見面的場所後，#n　看見了桌上堆積的大量文件與皺著眉頭的亞子）"
2000802-6 = "這個，所以……就這樣……但是牽連到這邊又……"
2000802-10 = "……唉，真是的……何時才能做完呢……"
2000802-11 = "[s] 緩緩靠近以免被發現"
2000802-12 = "……老，老師！？"
2000802-13 = "您，您是什麼時候來的……？#n像個可疑人物一樣，害我嚇了一跳……"
2000802-14 = "唉……真是的……"
2000802-15 = "[s] 「工作看起來很辛苦呢。你還好吧？」"
2000802-17 = "……嗯？"
2000802-18 = "啊～這只是家常便飯罷了。"
2000802-19 = "這個晚上前處理完就好，這邊已經處理完畢，這是外出時順便能處理完的……"
2000802-20 = "……大部分都是很快就能完成的東西，所以沒關係。呵呵。 "
2000802-21 = "[s] （雖然剛才的表情看起來並非如此……）"
2000802-22 = "身為格黑娜風紀委員會的行政官，可不能因為這點小事就哭哭啼啼的。"
2000802-23 = "啊啊，比起這個……今天是我請老師來的吧。"
2000802-29 = "可以請老師確認一下這份文件嗎？"
2000802-30 = "[s] 「《夏萊內部對格黑娜風紀委員會不滿的監視報告書請求》……？」"
2000802-31 = "是，這正是只有老師才能處理的事……"
2000802-32 = "我想確認夏萊內部是否有對我們風紀委員會的任何怨言或不滿。"
2000802-33 = "[s1] 「唔嗯……這個有點……」\n[s2] 委婉拒絕"
2000802-34 = "您果然會這麼回答。"
2000802-35 = "您果然會這麼回答。"
2000802-36 = "但是這樣好嗎？這可是能還到目前為止欠我的人情的好機會喔？"
2000802-37 = "[s] 「欠你的人情……？」"
2000802-38 = "您該不會要說您忘記了吧……"
2000802-39 = "我平常費了多少心力，您難道不知道嗎？#n身為風紀委員會的行政官，為了間接支援老師的工作，我不知道吃了多少苦頭！"
2000802-40 = "[s3] 「……？」\n[s4] 「仔細想想，好像是那樣……又好像不是……」"
2000802-41 = "這，這個反應……"
2000802-42 = "這，這個反應……"
2000802-43 = "難道……"
2000802-44 = "這就是所謂，只對自己不利的事情視若無睹的「大人的行事方式」……！？"
2000802-45 = "[s] 「不，那個不知道該說是誤會還是……」"
2000802-49 = "……好吧，這個回答還算是在預期之內。"
2000802-50 = "接下來請看這個。"
2000802-56 = "[ns] 「請在2萬字以內，針對格黑娜風紀委員會，描述自己的想法……？」"
2000802-57 = "沒錯，就當作是個簡單的小考試。#n請老師誠實地寫下平時的想法吧。"
2000802-58 = "啊，當然，亂掰或說謊是不行的！請不要認為不會被發現喔。"
2000802-59 = "透過語句和用字來推測筆者是不是在說謊這種小事，#n對優秀的行政官來說簡直輕而易舉！"
2000802-60 = "[s] 「需要做到這種程度嗎……？」"
2000802-61 = "咦？"
2000802-62 = "那是什麼不滿的表情！監視危險勢力這種事情，是連片刻都不能鬆懈的！"
2000802-63 = "更別說是那個「夏萊」！我們至今都不清楚那邊的情況！#n目的、構成，甚至是活動內容，想要詳細掌握這些可疑的情報是天經地義的事！"
2000802-64 = "[s] 「我就在你眼前居然還這麼說……」"
2000802-65 = "我們風紀委員會因為活動內容的關係，本來就是樹敵無數的組織。"
2000802-66 = "即使如此依然能順利運作的原因……"
2000802-67 = "實不相瞞……"
2000802-68 = "就是因為我一直致力於在事前排除各種不安定的要素！"
2000802-69 = "[s5] 「原來如此。」\n[s6] 「雖然有各種理由，亞子確實很努力呢……」"
2000802-70 = "風紀委員長這個最大的因素暫且不論……我認為光憑現在這樣的做法是不夠的。"
2000802-71 = "風紀委員長這個最大的因素暫且不論……我認為光憑現在這樣的做法是不夠的。"
2000802-72 = "畢竟昨天也發生了針對風紀委員會的恐攻事件。#n今後必須加強警戒才行。"
2000802-73 = "[s] 「恐怖攻擊……？發生什麼事了？」"
2000802-74 = "沒錯，事情是這樣的……"
2000802-75 = "昨天半夜，我在別館通宵工作時……"
2000802-76 = "突然停電了！！！"
2000802-77 = "[s] 「……」"
2000802-78 = "工作中突然停電……"
2000802-79 = "一定是邪惡勢力知道風紀委員會的行政官在獨自加班，所以趁機發動了恐怖攻擊。"
2000802-80 = "為了妨礙我們工作而切斷了電源。"
2000802-81 = "害我到現在都沒辦法把工作做完，只好像現在這樣繼續工作……"
2000802-82 = "[s]「……有沒有可能單純只是巧合？」"
2000802-83 = "不可能！在我們周圍隨時都有對我們虎視眈眈，企圖發動偷襲的人！"
2000802-84 = "若是不小心露出破綻的話，就會立刻被趁虛而入的……"
2000802-85 = "這次的事件也絕對！肯定！一定是針對風紀委員會的妨礙計畫！"
2000802-86 = "還是您要堅持說沒那回事呢，老師要和我打賭嗎？#n如果我抓出犯人，老師要倒立繞運動場10圈嗎？"
2000802-87 = "[s] 「冷，冷靜一點……不賭，不賭……」"
2000802-88 = "我不會輸的！畢竟嫌犯人數都已經超過十位數了！！"
2000802-89 = "就算要馬上回到學園，在各處安裝100台監視器也行……！！"
2000802-93 = "……呼。"
2000802-94 = "……失禮了。我好像有點太激動了。呵呵。"
2000802-95 = "真是的，我居然因為這種事情失去理智……"
2000802-96 = "好像讓老師看到不該看見的一面了。"
2000802-97 = "[s] 「沒事，我完全不在意。那個……」"
2000802-98 = "請忘了今天的事。"
2000802-99 = "那麼，剛剛的資料就拜託老師了。我還有別的工作，就先告辭了……"
2000802-104 = "[ns] 「亞，亞子……」"
2000802-106 = "（亞子急急忙忙地離開了）"

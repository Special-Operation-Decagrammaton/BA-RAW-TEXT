[translation]
2000802-1 = "แผนลับ!"
2000802-2 = "(หลังจากได้รับข้อความที่ดูเอาแต่ใจทาง MOMOTALK คุณครูก็ไปยังสถานที่นัดพบ และเจอกับ#nอาโกะที่นั่งหน้านิ่วคิ้วขมวดอยู่กับเอกสารกองโตบนโต๊ะ)"
2000802-6 = "อืมม... นี่มัน... แต่ว่ามันก็... เชื่อมต่อกับทางนี้อยู่แล้ว..."
2000802-10 = "เฮ้อ จะจัดการได้หมดเมื่อไรกันเนี่ย..."
2000802-11 = "[s] ส่งเสียงให้รู้ว่ามาแล้ว"
2000802-12 = "...?! คุณครู! ตะ...ตกใจหมดเลย!?"
2000802-13 = "มาถึงตั้งแต่เมื่อไหร่คะ...? นึกว่าโรคจิตที่ไหนซะอีก ตกใจหมดเลยค่ะ"
2000802-14 = "เฮ้อ... จริงๆ เลยเชียว"
2000802-15 = "[s] \"ดูเหมือนงานเยอะเลยนะ ไม่เป็นไรใช่มั้ย?\""
2000802-17 = "คะ?"
2000802-18 = "งานปริมาณเท่านี้ถือเป็นเรื่องปกติค่ะ"
2000802-19 = "กองนี้เป็นงานที่ต้องจัดการให้เสร็จภายในเย็นนี้ค่ะ ส่วนกองนี้เป็นเอกสารที่จัดการเรียบร้อยแล้ว#nและกองนี้เป็นเอกสารที่จะเอามาตรวจสอบระหว่างที่ออกมาข้างนอก..."
2000802-20 = "ส่วนใหญ่เป็นงานง่ายๆ ที่ทำแป๊ปเดียวก็เสร็จแล้วค่ะ ฮิฮิ"
2000802-21 = "[s] (เมื่อกี้ไม่เห็นทำหน้าแบบนี้เลย...)"
2000802-22 = "ถ้าเกิดร้องไห้ขี้มูกโป่งเพราะงานแค่นี้ คงไม่มีหน้าเรียกตัวเองว่าเป็นผู้ดูแลของคณะกรรมการวินัย#nหรอกค่ะ"
2000802-23 = "อา แต่เรื่องนั้นไม่ใช่เรื่องสำคัญหรอกค่ะ... ที่ฉันเรียกให้คุณครูมาก็เพราะว่า..."
2000802-29 = "ช่วยตรวจสอบเอกสารนี้ให้หน่อยได้มั้ยคะ?"
2000802-30 = "[s] \"คำขอตรวจสอบการเคลื่อนไหวที่ผิดปกติเกี่ยวกับคณะกรรมการวินัยภายในชาเล่ต์...?\""
2000802-31 = "ค่ะ เพราะว่าเรื่องนี้มีแต่คุณครูเท่านั้นที่ทำได้ค่ะ..."
2000802-32 = "ฉันอยากจะตรวจสอบว่าภายในชาเล่ต์มีฝ่ายไหนที่ส่งเรื่องร้องเรียนหรือไม่พอใจ#nทางคณะกรรมการวินัยของเรารึเปล่าค่ะ"
2000802-33 = "[s1] \"อืม เรื่องนี้มัน...\"\n[s2] ปฏิเสธอย่างสุภาพ"
2000802-34 = "หืม... ไม่ให้ความร่วมมือเหรอคะ?"
2000802-35 = "หืม... ไม่ให้ความร่วมมือเหรอคะ?"
2000802-36 = "ไม่ให้ความร่วมมือจะดีเหรอคะ คุณครูไม่คิดเหรอคะว่านี่เป็นโอกาสดีที่จะได้ชดเชยเรื่องที่คุณครู#nติดค้างฉันไว้น่ะ?"
2000802-37 = "[s] \"ครูติดค้างอะไรเธอเหรอ...?\""
2000802-38 = "คะ? อย่าทำเป็นไม่รู้แบบนี้สิคะ"
2000802-39 = "คุณครูคงไม่รู้ว่าฉันทำงานหนักแค่ไหน ในฐานะเจ้าหน้าที่ของคณะกรรมการวินัย ฉันต้องทำงานเพิ่มขึ้น#nเพื่อจัดการงานในส่วนของคุณครูนะคะ!"
2000802-40 = "[s3] \"....\"\n[s4] \"มันก็เหมือนจะใช่ แต่ก็เหมือนไม่ใช่นะ...\""
2000802-41 = "คำพูดไหลลื่นเหมือนปลาไหลแบบนี้มัน..."
2000802-42 = "คำพูดไหลลื่นเหมือนปลาไหลแบบนี้มัน..."
2000802-43 = "หืม?! หรือว่า..."
2000802-44 = "นี่เป็นวิธีเมินเรื่องที่ตัวเองเสียเปรียบ หรือเวลาที่ทำผิดพลาดของพวกผู้ใหญ่งั้นเหรอคะ...?!"
2000802-45 = "[s] \"เปล่า เรื่องนั้นมันเข้าใจผิดน่ะ\""
2000802-49 = "ฮึ่มมม... ก็นะ ฉันคิดไว้แล้วว่าคุณครูอาจจะตอบแบบนี้ค่ะ"
2000802-50 = "ถ้างั้นเรื่องต่อไป..."
2000802-56 = "[ns] \"เขียนบรรยายสิ่งที่คิดเกี่ยวกับคณะกรรมการวินัยมา 20,000 คำ...?\""
2000802-57 = "ใช่แล้วค่ะ เขียนสั้นๆ เองค่ะ คิดว่าเป็นเอกสารง่ายๆ สำหรับยืนยันเจตนาที่แท้จริงของคุณครูแล้วกัน#nนะคะ"
2000802-58 = "อ๊ะ... แน่นอนว่าอย่าคิดจะเขียนเรื่องโกหกเชียวนะคะ"
2000802-59 = "ทั้งรูปประโยค คำศัพท์และไวยากรณ์ที่คุณครูใช้บ่อยๆ สำหรับเจ้าหน้าที่อาวุโสผู้มากความสามารถ#nอย่างฉันแล้ว มันดูออกง่ายมากเลยนะคะ"
2000802-60 = "[s] \"ต้องทำถึงขนาดนี้เลยเหรอ...?\""
2000802-61 = "คะ?"
2000802-62 = "ใช่แล้วค่ะ! การเฝ้าระวังกองกำลังที่คิดจะก่อความไม่สงบเป็นสิ่งที่ห้ามละเลยเด็ดขาดค่ะ!"
2000802-63 = "นอกจากนี้ อีกฝ่ายยังเป็นกองกำลังขององค์กรลึกลับที่มีทั้งวัตถุประสงค์และโครงสร้างองค์กรที่#nน่าสงสัยอย่างชาเล่ต์ด้วยนี่คะ! อันตรายสุดๆ เลยค่ะ"
2000802-64 = "[s] \"คือว่าชาเล่ต์ที่พูดถึงอยู่ก็คือครูนะ...\""
2000802-65 = "ที่ผ่านมาคณะกรรมการวินัยของเราต้องต่อสู้กับพวกศัตรูที่เกลียดพวกเราในทุกที่ และในทุกๆ สถานการณ์เลยค่ะ"
2000802-66 = "แต่ว่าที่ยังไม่เคยมีปัญหาร้ายแรงอะไร นั่นเป็นเพราะ..."
2000802-67 = "ฉันมีไม้ตายซ่อนไว้ไงล่ะคะ..."
2000802-68 = "ใช่แล้วค่ะ นั่นก็คือฉันเองค่ะ! เพราะฉันจะไม่ทนต่ออะไรที่มันไม่แน่นอนอย่างเด็ดขาดค่ะ!"
2000802-69 = "[s5] \"งั้นเหรอ?\"\n[s6] \"ถึงไม่ค่อยเข้าใจ แต่อาโกะก็พยายามมากเลยนะ\""
2000802-70 = "ยังไม่เท่าท่านประธานหรอกค่ะ... แต่ฉันคิดว่าเท่านี้มันก็อาจจะยังไม่เพียงพอด้วยซ้ำค่ะ"
2000802-71 = "ยังไม่เท่าท่านประธานหรอกค่ะ... แต่ฉันคิดว่าเท่านี้มันก็อาจจะยังไม่เพียงพอด้วยซ้ำค่ะ"
2000802-72 = "เมื่อวานนี้มีผู้ก่อการร้ายคิดโจมตีคณะกรรมการวินัยด้วย ดังนั้นจะประมาทไม่ได้เลยค่ะ"
2000802-73 = "[s] \"ผู้ก่อการร้ายเหรอ...? เกิดเรื่องอะไรขึ้น?\""
2000802-74 = "อา... สิ่งที่เกิดขึ้นก็คือ..."
2000802-75 = "เมื่อวานฉันอยู่ทำงานที่อาคารย่อยจนถึงเช้า แล้วจู่ๆ..."
2000802-76 = "ก็เกิดไฟดับกะทันหันค่ะ ไม่น่าเชื่อเลยใช่มั้ยคะ!"
2000802-77 = "[s] \"...\""
2000802-78 = "เหตุการณ์ไฟดับที่เกิดขึ้นระหว่างทำงาน... ไม่ต้องสงสัยเลยค่ะ"
2000802-79 = "เห็นได้ชัดว่าเป็นการกระทำที่ไม่หวังดีของพวกผู้ก่อการร้ายที่รู้ว่าเจ้าหน้าที่อาวุโสของคณะกรรมการ#nวินัยทำงานโต้รุ่งอยู่ที่นั่น"
2000802-80 = "พวกเขาเลยปิดเครื่องปั่นไฟเพื่อขัดขวางการทำงานของคณะกรรมการวินัยยังไงล่ะคะ"
2000802-81 = "เพราะเรื่องนั้นทำให้ฉันทำงานเสร็จไม่ทันตามแผนที่วางไว้ แล้วก็ต้องหอบงานออกมาทำตอนออก#nมาข้างนอกแบบนี้..."
2000802-82 = "[s] \"แค่เรื่องบังเอิญรึเปล่า...?\""
2000802-83 = "ไม่ค่ะ! เป็นไปไม่ได้หรอกค่ะ! ที่เกเฮนน่าจะมีกลุ่มคนที่คอยสอดส่องหาจุดอ่อนของคณะกรรมการวินัย#nอยู่เต็มไปหมดค่ะ?!"
2000802-84 = "หากทำพลาด หรือเผยช่องโหว่ให้เห็นแม้เพียงนิดเดียว ก็อาจจะถูกจัดการได้..."
2000802-85 = "ฉันจะไม่ยอมให้เรื่องแบบนั้นเกิดขึ้นเด็ดขาด! ฉันมั่นใจว่าต้องเป็นพวกที่คิดทำลายคณะกรรมการวินัย#nแน่นอนค่ะ!"
2000802-86 = "ถ้าไม่อย่างนั้นคุณครูมาพนันกับฉันมั้ยคะ? ถ้าฉันเจอตัวคนร้ายละก็ คุณครูจะต้องยืนหกสูงแล้วเดิน#nรอบสนามกีฬา 10 รอบนะคะ"
2000802-87 = "[s] \"จะ...ใจเย็นๆ นะ...\""
2000802-88 = "แค่ผู้ต้องสงสัยที่เข้าข่ายก็มีจำนวนเกินเลขสองหลักแล้ว!"
2000802-89 = "แบบนี้... ช่วยไม่ได้นะคะ! พอกลับไปถึงโรงเรียนแล้ว คงต้องรีบติดตั้งกล้องวงจรปิดเพิ่มเป็น 100 ตัว ทันทีเพื่อตามหาตัวคนร้ายแล้วละค่ะ...!"
2000802-93 = "เฮ้อ..."
2000802-94 = "ขอโทษค่ะ ฉันคงตื่นเต้นมากไปนิดหน่อยค่ะ ฮิฮิ"
2000802-95 = "ไม่อยากเชื่อเลย ว่าคนอย่างฉันกลับจัดการเรื่องนี้ให้เรียบร้อยไม่ได้..."
2000802-96 = "ดูเหมือนฉันจะแสดงด้านที่ไม่เหมาะสมให้คุณครูเห็นเข้าแล้ว..."
2000802-97 = "[s] \"เปล่า ไม่ต้องใส่ใจหรอก...\""
2000802-98 = "ช่วยลืมเรื่องวันนี้ไปด้วยนะคะ"
2000802-99 = "ถ้างั้นรบกวนขอความร่วมมือด้วยนะคะ ฉันขอตัวไปจัดการงานชิ้นต่อไปก่อนนะคะ..."
2000802-104 = "[ns] \"นี่ เดี๋ยวสิ...?\""
2000802-106 = "(พอพูดจบอาโกะก็รีบลุกจากที่นั่งแล้วเดินไปหายไปทันที)"

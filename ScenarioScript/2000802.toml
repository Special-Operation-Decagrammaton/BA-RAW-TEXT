[translation]
2000802-1 = "#title;아무튼 음모예요!"
2000802-2 = "#na;(굉장히 딱딱한 모모톡을 받은 뒤, 약속장소에 나가보니 아코가 테이블 위로 엄청난 양의 서류를 쌓아놓은 채 인상을 찌푸리고 있었다.)"
2000802-3 = "#st;[0,0];instant;1;"
2000802-4 = "#clearST"
2000802-5 = "4;아코;06\n#4;a\n#wait;2000"
2000802-6 = "4;아코;06;이건, 그러니까…… 이렇게 해서…… 이쪽과 연동되어 있으니까…….\n#4;em;…"
2000802-7 = "#st;[0,0];instant;1;"
2000802-8 = "#clearST"
2000802-9 = "4;아코;06\n#4;greeting\n#wait;2500"
2000802-10 = "4;아코;11;……하아. 진짜…… 이걸 언제 다 하지…….\n#4;stiff\n#4;em;[속상함]"
2000802-11 = "[s] 인기척을 낸다."
2000802-12 = "4;아코;04;……?! 서, 선생님?!\n#4;shake\n#4;em;[?!]"
2000802-13 = "4;아코;12;어, 언제부터 거기에……? 수상한 사람인가 하고, 깜짝 놀랐잖아요…….\n#4;m3\n#4;em;[땀]"
2000802-14 = "4;아코;06;하아……. 정말이지…….\n#4;stiff"
2000802-15 = "[s] \"일이 많아 보이네. 괜찮아?\""
2000802-16 = "#all;hide"
2000802-17 = "3;아코;02;네?"
2000802-18 = "3;아코;08;아아, 뭐, 이 정도면 평범한 수준이에요.\n#3;em;[반응]"
2000802-19 = "3;아코;01;이건 저녁까지 처리해야 하는 일들이고, 이건, 이미 처리한 서류들이고, 이건 외출한 김에 겸사겸사 처리할 것들이고……."
2000802-20 = "3;아코;07;대부분 금방 끝낼 수 있는 쉬운 일들이죠. 후훗. \n#3;em;[음표]\n#3;greeting"
2000802-21 = "[s] (방금 전의 표정은 그렇지 않아 보였지만…….)"
2000802-22 = "3;아코;01;고작 이 정도의 일로 우는 소리를 해서야 선도부의 관리자라는 이름을 댈 수 없지요."
2000802-23 = "3;아코;02;아, 그보다 중요한 건 그게 아니고…… 선생님을 뵙자고 한 건 다름이 아니라…….\n#3;em;[반응]"
2000802-24 = "#st;[0,0];instant;1;"
2000802-25 = "#clearST"
2000802-26 = "3;아코;01\n#3;d\n#wait;1000"
2000802-27 = "3;아코;01\n#3;a\n#3;closeup\n#wait;2000"
2000802-28 = "3;아코;01\n#3;greeting\n#3;closeup\n#wait;2000"
2000802-29 = "3;아코;07;이 서류를 확인해주시겠나요?\n#3;em;[음표]\n#3;closeup"
2000802-30 = "[s] \"샬레 내부의 선도부에 대한 불순한 움직임 감시 보고 요청……?\""
2000802-31 = "3;아코;01;네. 이건 선생님만 하실 수 있는 일이거든요.\n#3;em;[반응]"
2000802-32 = "3;아코;01;샬레 내부에 저희 선도부에 대한 불평이나 불만을 가진 세력이 있는지 확인하고 싶어서요."
2000802-33 = "[s1] \"으음……. 이건 좀…….\"\n[s2] 완곡히 거절한다."
2000802-34 = "3;아코;02;과연, 그렇게 나오시겠다 이거죠."
2000802-35 = "3;아코;02;과연, 그렇게 나오시겠다 이거죠."
2000802-36 = "3;아코;07;그런데 괜찮으시겠어요? 지금까지 제게 신세 진 것을 갚을 좋은 기회라고 생각하는데요?\n#3;em;[?]"
2000802-37 = "[s] \"신세진 거……?\""
2000802-38 = "3;아코;04;설마 잊었다고 말씀하시는 건 아니겠죠…….\n#3;stiff"
2000802-39 = "3;아코;10;제가 평소에 얼마나 신경 쓰고 있는지 모르세요? 선생님의 뒤처리를 하느라 선도부의 행정관으로서 얼마나 고생하고 있는데!\n#3;em;[!]"
2000802-40 = "[s3] \"……?\"\n[s4] \"잘 생각해 보니, 그런 것…… 같기도 하고, 아닌 것 같기도 하고…….\""
2000802-41 = "3;아코;09;이 미적지근한 반응……."
2000802-42 = "3;아코;09;이 미적지근한 반응……."
2000802-43 = "3;아코;04;핫?! 혹시……\n#3;em;[?!]\n#3;shake"
2000802-44 = "3;아코;04;이것이 바로 자신에게 불리한 것은 절대로 못 본 체한다는, 어른의 방식……?!\n#3;stiff"
2000802-45 = "[s] \"아니, 그건 오해라고 할까 뭐라고 할까…….\""
2000802-46 = "#st;[0,0];instant;1;"
2000802-47 = "#clearST"
2000802-48 = "3;아코;09\n#3;em;…\n#wait;2500"
2000802-49 = "3;아코;99;……흐음. 뭐, 그런 대답도 어느정도 예상하고 있었어요."
2000802-50 = "3;아코;01;그렇다면 다음은 이쪽을.\n#3;em;[반응]"
2000802-51 = "#st;[0,0];instant;1;"
2000802-52 = "#clearST"
2000802-53 = "3;아코;01\n#3;d\n#wait;1000"
2000802-54 = "3;아코;01\n#3;a\n#3;closeup\n#wait;2000"
2000802-55 = "3;아코;01\n#3;greeting\n#3;closeup\n#wait;2000"
2000802-56 = "[ns] \"선도부에 대한 자신의 생각과 사상을 2만자 이내로 기술하시오……?\""
2000802-57 = "3;아코;08;네. 맞아요. 가벼운 테스트입니다. 선생님의 진의를 확인하고자 하는 간단한 서류 작성이라고 생각해주시면 됩니다.\n#3;em;[반응]"
2000802-58 = "3;아코;01;아, 물론 허위로 쓸 생각은 하지 마시길."
2000802-59 = "3;아코;07;선생님께서 사용하시는 문맥, 자주 사용하는 단어, 어휘 등에서 그 사람의 가치관을 유추하는 것쯤은 저 같은 유능한 행정관에겐 식은 죽 먹기니까요?\n#3;em;[음표]\n#3;greeting"
2000802-60 = "[s] \"이렇게까지 할 필요가 있어……?\""
2000802-61 = "3;아코;02;네?\n#3;stiff"
2000802-62 = "3;아코;05;당연히 있죠! 불온한 세력에 대한 감시는 한시라도 게을리해선 안 되는 법!\n#3;em;[!]"
2000802-63 = "3;아코;09;게다가 바로 그 샬레잖아요! 그 실태는 지금껏 알려지지 않았죠. 목적과 구성, 활동내역마저 수상하니 그것을 파악하려는 건 지극히 당연한 일!"
2000802-64 = "[s] \"……그 샬레가 저입니다만.\""
2000802-65 = "3;아코;09;저희 선도부는 어디에서든 어떤 형태로든 우리를 싫어하는 적들과 싸워왔어요.\n#3;em;[반응]"
2000802-66 = "3;아코;99;하지만 아직까지 아무런 큰 문제가 없었던 것은 바로,"
2000802-67 = "3;아코;09;무엇을 숨기겠어요……."
2000802-68 = "3;아코;05;바로 제가! 조금의 불안요소도 용납하지 않았기 때문이에요!\n#3;em;[!]"
2000802-69 = "[s5] \"그렇구나.\"\n[s6] \"조금 다른 것 같지만……. 아코도 고생이네.\""
2000802-70 = "3;아코;09;뭐, 선도부장님을 뺀다면, 이라는 전제조건이 있지만요. ……하지만 실은 이 정도로도 부족하다고 생각해요.\n#3;em;…"
2000802-71 = "3;아코;09;뭐, 선도부장님을 뺀다면, 이라는 전제조건이 있지만요. ……하지만 실은 이 정도로도 부족하다고 생각해요.\n#3;em;…"
2000802-72 = "3;아코;05;바로 어제도 선도부를 향한 테러가 발생했다고요. 경계를 늦춰선 안 된답니다."
2000802-73 = "[s] \"테러……? 무슨 일이 있었어……?\""
2000802-74 = "3;아코;02;……어, 무슨 일이 있었냐고 물으신다면…….\n#3;em;[반응]"
2000802-75 = "3;아코;99;어제 새벽에 별관에서 야근하는데 갑자기……."
2000802-76 = "3;아코;05;정전이 됐지 뭐예요?!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
2000802-77 = "[s] \"…….\""
2000802-78 = "3;아코;09;업무 도중에 일어난 정전 사태……. 이건 의심할 여지도 없어요."
2000802-79 = "3;아코;05;선도부의 행정관인 제가 혼자서 야근하고 있단 걸 알아챈 불순세력의 테러인 것이 분명합니다.\n#3;em;[!]"
2000802-80 = "3;아코;05;선도부의 업무를 방해하기 위해서 건물 발전기를 셧다운시킨 것이지요."
2000802-81 = "3;아코;06;그 때문에 제대로 일도 못 끝내고 이렇게 밖에 나와서 잔업 하는 신세가…….\n#3;stiff\n#3;em;[속상함]"
2000802-82 = "[s] \"……그냥 우연 아닐까?\""
2000802-83 = "3;아코;05;아뇨! 그럴 리 없습니다! 그렇지 않아도 평소에도 게헨나의 여기저기엔 선도부의 약점을 노리는 이들로 가득하다구요?!\n#3;hophop"
2000802-84 = "3;아코;99;자칫 잘못해서 빈틈이라도 보였다간 바로 잡아먹히기 마련……"
2000802-85 = "3;아코;09;이번 사태도 절대, 기필코, 반드시! 선도부를 향한 사보타주가 분명해요!\n#3;em;[!]"
2000802-86 = "3;아코;10;아니면 선생님. 저와 내기하실래요? 제가 범인을 찾아내면 선생님이 물구나무를 서서 운동장을 10바퀴 도셔야 할 거예요?\n#3;stiff"
2000802-87 = "[s] \"지, 진정해…….\""
2000802-88 = "3;아코;09;짐작 가는 용의자들만 해도 벌써 두 자릿수 이상!!\n#3;em;[반응]"
2000802-89 = "3;아코;10;이건……. 그래요. 이건 어쩔 수 없겠네요! 학원에 돌아가는 즉시 감시카메라 100대를 설치해서 범인을 색출해내는 수밖에……!!\n#3;stiff"
2000802-90 = "#st;[0,0];instant;1;"
2000802-91 = "#clearST"
2000802-92 = "3;아코;10\n#3;em;…\n#wait;2500"
2000802-93 = "3;아코;06;……후우."
2000802-94 = "3;아코;99;……실례했습니다. 웬일로 제가 조금 흥분하고야 만 모양이에요. 후후.\n#3;stiff"
2000802-95 = "3;아코;01;정말이지, 저라는 사람이 이런 일로 칠칠치 못하게……."
2000802-96 = "3;아코;07;선생님에게 살짝 볼썽사나운 모습을 보여주고야 말았네요.\n#3;em;[음표]"
2000802-97 = "[s] \"아니, 그건 전혀 신경 안쓰는데, 그…….\""
2000802-98 = "3;아코;01;오늘 일은 잊어버리세요."
2000802-99 = "3;아코;07;그럼, 아까의 서류의 건은 부탁드릴게요. 저는 다른 일이 있어서, 이만…….\n#3;greeting\n#3;em;[반짝]"

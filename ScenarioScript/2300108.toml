[translation]
2300108-1 = "#title;급양부의 부장님은 힘내고 싶어!"
2300108-2 = "#na;(오늘은 게헨나의 학생식당에서 후우카를 돕기로 한 날이다.)"
2300108-3 = "#na;(그리하여 학생식당을 찾았을 무렵…….)"
2300108-4 = "3;후우카;04;오늘 또 학생들한테 클레임을 받았어요!\n#3;stiff\n#3;a"
2300108-5 = "[s] \"후, 후우카?\""
2300108-6 = "3;후우카;08\n#3;greeting\n#wait;1500"
2300108-7 = "#na;(이건……. 미림?)"
2300108-8 = "[s] \"후우카, 설마 이걸 맛본 거야?\""
2300108-9 = "3;후우카;05;네! 조금 맛봤어요! 어쩔 수 없잖아요! 요리를 만들려면……!\n#3;jump"
2300108-10 = "[s] \"하지만 이거 분명 알코올이…….\""
2300108-11 = "3;후우카;05;지금 중요한 건 그게 아니에요. 선생님!\n#3;em;[!]\n#3;hophop"
2300108-12 = "3;후우카;08;저도 모두가 맛있는 밥을 먹었으면 해서, 늘 열심히 노력하고 있는데……!\n#3;stiff"
2300108-13 = "[s] \"으, 응. 후우카가 노력하는 건 나도 잘 알고 있어.\""
2300108-14 = "3;후우카;06;물론 급식을 대량으로 조리하면서 요리의 퀄리티가 떨어지고 그게 불만이란 것도 잘 알아요.\n#3;em;…"
2300108-15 = "3;후우카;06;모두가 제 노력을 알아주지 않는 것도……."
2300108-16 = "3;후우카;02;가슴은 아프지만 어쩔 수 없다는 걸 알고 있으니, 이해가 안 되는 것도 아니에요."
2300108-17 = "3;후우카;05;하! 지! 만!\n#3;hophop"
2300108-18 = "3;후우카;04;아무리 그래도 같은 노란색 소스니 괜찮겠지? 하고 멋대로 머스타드 소스와 카라시를 착각했으면서.\n#3;stiff\n#3;em;[속상함]"
2300108-19 = "3;후우카;05;음식이 맵다고 저한테 항의하면 뭘 어쩌라는 건가요?!\n#3;em;[?!]"
2300108-20 = "3;후우카;07;그렇게 불평만 해댈 거면 자기들이 만들든지?!\n#3;em;[빠직]\n#3;stiff"
2300108-21 = "3;후우카;04;급양부 부장의 고생은 고생도 아니라는 거냐아아앗!!\n#3;hophop"
2300108-22 = "[s] \"고, 고생이 많네.\""
2300108-23 = "3;후우카;07;음? 잠깐만요. \n#3;em;[반응]"
2300108-24 = "3;후우카;99;……차라리 요리에 들어가는 머스타드를 전부 카라시로 바꿔버리면 원칙적으로 항의 받을 일도 없는 게 아닐까요?"
2300108-25 = "3;후우카;02;사소한 생각의 전환으로 게헨나의 학생식당에도 변화의 바람이……?\n#3;em;[!]"
2300108-26 = "[s] \"포, 포기하지 말자!\""
2300108-27 = "3;후우카;08;농담이에요. 제가 그럴 리가 없잖아요. 급양부로서 음식에 대한 태업은 죄악이니까요.\n#3;em;[땀]\n#3;stiff"
2300108-28 = "[s] \"역시 후우카야! 요리 앞에선 진지하구나!\""
2300108-29 = "3;후우카;05;아, 그래도 급양부 일이 괴롭기만한 건 아니예요."
2300108-30 = "3;후우카;99;제가 만든 요리를 맛있다고 해줄 땐 엄청 기쁘기도 하고, 보람도 있고, 무엇보다…….\n#3;em;…"
2300108-31 = "3;후우카;02;이렇게 선생님이 와주셔서 도와주시고 함께 있는 것만으로도 가슴 한쪽이 꾸욱 하고 따듯해져서.\n#3;em;[///]"
2300108-32 = "3;후우카;03;에헤, 에헤헤…….\n#3;em;[하트]"
2300108-33 = "3;후우카;03\n#3;h\n#3;greeting\n#wait;400\n#3;d"
2300108-34 = "3;후우카;03\n#3;closeup\n#bgshake\n#wait;1500\n#3;a"
2300108-35 = "[s] \"후우카?\""
2300108-36 = "3;후우카;03;…….\n#3;closeup"
2300108-37 = "[s] \"후, 후우카 땅……?\""
2300108-38 = "3;후우카;99;쿠우울…….\n#3;closeup\n#3;em;…"
2300108-39 = "#na;(그때 문득 미림병의 뒷라벨이 눈에 들어왔다.)"
2300108-40 = "#na;(알코올 함유량 0.00003%)"
2300108-41 = "#all;hide"
2300108-42 = "#na;(이후, 앞으로는 절대로 후우카가 알코올을 가까이하게 두면 안 되겠다고 결심했다.)"

[translation]
2300108-1 = "供給部的部長想努力！"
2300108-2 = "（今天風華會在格黑娜學生餐廳幫忙）"
2300108-3 = "（因此當我到了學生餐廳的時候……）"
2300108-4 = "今天也收到了學生們的投訴！"
2300108-5 = "[s]「風，風華？」"
2300108-7 = "（這是…味醂？）"
2300108-8 = "[s]「風華，難道你有喝這個？」"
2300108-9 = "是的！我試了一下味道。沒辦法嘛！我這是為了做料理……！"
2300108-10 = "[s]「我記得味醂裡面加了酒……」"
2300108-11 = "現在那不是重點！老師！"
2300108-12 = "為了讓大家都能吃到美味的餐點，我明明一直這麼努力……！"
2300108-13 = "[s]「唔，嗯。我也很清楚風華很努力。」"
2300108-14 = "當然，因為供餐是大量料理，我也知道難免會降低料理的品質，引起不滿。"
2300108-15 = "我也知道大家看不到我努力的地方……"
2300108-16 = "雖然覺得很心痛，但我也知道這是沒辦法的事情，所以我也不是不能夠理解。"
2300108-17 = "即！便！如！此！"
2300108-18 = "也不能看到黃色醬料就自以為是黃芥末，結果擅自搞錯加成辣芥末醬，"
2300108-19 = "然後才跟我抗議餐點太辣，啊這是要我怎樣！？"
2300108-20 = "有那麼多意見不會自己來做啊！？"
2300108-21 = "難不成供給部部長的辛苦就不算辛苦嗎！？？吶！？"
2300108-22 = "[s]「辛，辛苦你了。」"
2300108-23 = "嗯？等一下！ "
2300108-24 = "……我乾脆先把加進料理的黃芥末全部換成辣芥末醬，這樣不就不會再被投訴了嗎？"
2300108-25 = "稍微轉換一下想法，說不定就能改變格黑娜學生餐廳的風氣了……？"
2300108-26 = "[s]「不，不要放棄啊！」"
2300108-27 = "開玩笑啦，我怎麼可能那麼做。身為供給部，對食物怠慢可是罪過。"
2300108-28 = "[s]「不愧是風華！總是真誠的面對料理！」"
2300108-29 = "啊，不過供給部的工作也不全然只有苦差事。"
2300108-30 = "聽到有人說我做的料理好吃，我也會覺得很開心，很有成就感，更重要的是……"
2300108-31 = "光是老師能跑來幫忙，我心裡就覺得暖暖的。"
2300108-32 = "欸嘿，欸嘿嘿……"
2300108-35 = "[s]「風華？」"
2300108-36 = "……"
2300108-37 = "[s]「風，風華炭……？」"
2300108-38 = "呼……"
2300108-39 = "（那時，我突然看到味醂瓶身上的標籤）"
2300108-40 = "（酒精含量0.00003%）"
2300108-42 = "（之後我下定決心，以後絕不能讓風華靠近酒精）"

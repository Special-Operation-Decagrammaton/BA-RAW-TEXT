[translation]
2300108-1 = "ส่งกำลังใจให้ท่านหัวหน้าชมรมโภชนาการ!"
2300108-2 = "(วันนี้คุณครูจะต้องไปช่วยฟูกะที่โรงอาหารของเกเฮนน่า)"
2300108-3 = "(แต่พอคุณครูไปถึงที่โรงอาหาร...)"
2300108-4 = "วันนี้ได้ใบร้องเรียนเรื่องอาหารจากนักเรียนคนอื่นๆ อีกแล้วค่ะ!"
2300108-5 = "[s] \"ฟะ...ฟูกะ?\""
2300108-7 = "(นี่มัน...มิริน?)"
2300108-8 = "[s] \"ฟูกะ... อย่าบอกนะว่าเธอกินมิรินเข้าไปน่ะ?\""
2300108-9 = "ค่ะ! ฉันแค่ชิมไปนิดเดียวเอง! ช่วยไม่ได้นี่นา เพราะต้องใช้ทำอาหาร...!"
2300108-10 = "[s] \"แต่มันมีแอลกอฮอล์ผสมอยู่ด้วยนะ...\""
2300108-11 = "ตอนนี้เรื่องนั้นสำคัญรึไงคะ คุณครู!"
2300108-12 = "ฉันพยายามแทบตายเพราะอยากให้ทุกคนกินอาหารที่อร่อยๆ...!"
2300108-13 = "[s] \"อะ...อื้อ เรื่องนั้นครูรู้ดีเลยล่ะ\""
2300108-14 = "ฉันรู้ดีว่าทำอาหารปริมาณเยอะๆ คุณภาพของอาหารก็จะลดลง และก็คงมีคนที่ไม่พอใจเรื่องนั้น#nอยู่บ้าง"
2300108-15 = "และฉันก็รู้ว่าไม่ใช่ทุกคนที่ชื่นชมฉัน..."
2300108-16 = "ถึงมันจะทำให้ฉันหดหู่แต่ฉันก็พอจะเข้าใจได้"
2300108-17 = "แต่-ว่า-นะ!"
2300108-18 = "ทั้งที่พวกเขาเป็นคนเอาซอสคาราชิไปใส่แทนมัสตาร์ดแค่เพราะว่ามันมีสีเหลืองเหมือนกัน..."
2300108-19 = "แต่พวกเขาก็มาบ่นว่าอาหารมันเผ็ดเกินไป?!"
2300108-20 = "ถ้าคิดจะบ่นทุกเรื่องแบบนี้ทำไมไม่มาทำเองเลยล่ะ?!"
2300108-21 = "ความพยายามของหัวหน้าชมรมโภชนาการอย่างฉันมันไม่มีความหมายกับพวกเขาเลยรึยังงายยยย!!"
2300108-22 = "[s] \"ธะ...เธอทำได้ดีแล้วล่ะ\""
2300108-23 = "หืม? เดี๋ยวก่อนนะคะ"
2300108-24 = "...ถ้าฉันเอาซอสคาราชิไปใส่ในทุกเมนูแทนล่ะ? พวกเขาจะหยุดบ่น หยุดร้องเรียนกันรึเปล่าคะ?"
2300108-25 = "การปรับเปลี่ยนเล็กๆ น้อยๆ แบบนี้จะเปลี่ยนมุมมองของเด็กคนอื่นๆ ต่อโรงอาหารของเกเฮนน่า#nได้รึเปล่า...?"
2300108-26 = "[s] \"ยะ...อย่าทำแบบนั้นเลยดีกว่า!\""
2300108-27 = "ฉันล้อเล่นค่ะ ฉันไม่ทำแบบนั้นหรอก หากทำเรื่องเลวร้ายกับอาหารแบบนั้น คงเสียชื่อชมรม#nโภชนาการแย่เลย"
2300108-28 = "[s] \"สมกับเป็นฟูกะจริงๆ! เชฟมือโปรสุดๆ!\""
2300108-29 = "อ่า งานของชมรมโภชนาการก็ไม่ได้มีแต่เรื่องน่าปวดหัวอย่างเดียวหรอกค่ะ"
2300108-30 = "เวลาที่มีคนชมว่าอาหารที่ฉันทำอร่อยมาก มันก็ทำให้ฉันรู้สึกดีใจแล้วก็มีความสุขมาก..."
2300108-31 = "และการที่คุณครูมาช่วยฉันแบบนี้ก็ทำให้ฉันรู้สึกอุ่นใจขึ้นมากเลยค่ะ"
2300108-32 = "ฮิฮิ...ฮิฮิฮิ..."
2300108-35 = "[s] \"ฟูกะ?\""
2300108-36 = ".......\n"
2300108-37 = "[s] \"ฟะ...ฟูกะตัน...?\""
2300108-38 = "คร่อก...ฟี้..."
2300108-39 = "(ตอนนั้นคุณครูก็เหลือบไปเห็นฉลากที่ติดอยู่ที่ขวดมิริน)"
2300108-40 = "(ระดับแอลกอฮอล์ 0.00003%)"
2300108-42 = "(หลังจากอ่านฉลาก คุณครูก็สัญญากับตัวเองว่าจะไม่ปล่อยให้ฟูกะดื่มแอลกอฮอล์อีกเป็นอันขาด)"

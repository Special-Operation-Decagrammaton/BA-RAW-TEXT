1300802-2 = "Abydos Suburban Market"
1300802-3 = "You're late! I've been waiting forever."
1300802-4 = "[s] \"Not according to my schedule.\""
1300802-5 = "Everyone knows you're supposed to show up a little early for a part-time job."

1300802-8 = "Huh? What do you mean haven't committed to anything yet? Come on, don't be like that."
1300802-9 = "I just don't get why people spend their free time doing nothing. It's better to keep yourself active... For your health, to make a little extra cash, and a lot of other reasons."
1300802-10 = "Huh? You wanna know what I need?"

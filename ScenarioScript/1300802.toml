[translation]
1300802-1 = "ผู้ช่วยพาร์ทไทม์"
1300802-2 = "ย่านการค้า ด้านนอกอะบิดอส"
1300802-3 = "มาช้าจังเลย! รอตั้งนานแล้วนะ"
1300802-4 = "[s] \"ก็มาตรงเวลานี่นา\""
1300802-5 = "เวลาไปทำงานพิเศษน่ะ ปกติจะต้องไปก่อนเวลานิดหน่อยนะ"
1300802-6 = "[s] \"เซริกะนี่เข้มงวดจริงๆ เลยนะ\""
1300802-7 = "แต่ยังไงคนที่มาช่วยก็มีแต่คุณครูคนเดียว แบบนี้ก็แสดงว่าพอไว้วางใจได้"
1300802-8 = "หือ? ยังไม่ได้ตกลงว่าจะทำงั้นเหรอ? อย่าพูดแบบนั้นสิ"
1300802-9 = "ใช้เวลาว่างไปแบบสูญเปล่ามันน่าเสียดายนะ ถ้าคิดถึงเรื่องสุขภาพกับเรื่องเงินสำรองแล้วล่ะก็#nออกมาขยับร่างกายทำงานแบบนี้มันก็ดีว่าไม่ใช่รึไง"
1300802-10 = "หือ? \"จะให้ทำอะไร\" งั้นเหรอ...?"
1300802-12 = "อ่ะ รับนี่ไปสิ"
1300802-13 = "[s] \"ใบปลิวเหรอ?\""
1300802-15 = "งานพิเศษวันนี้ก็คืองานแจกใบปลิวน่ะ สิ่งที่จะต้องทำก็คือแจกใบปลิวพวกนี้ให้กับคนที่เดิน#nผ่านไปมาหรือเอาไปใส่ตู้จดหมายที่อยู่ใกล้ๆ แล้วเราก็จะได้ค่าจ้างแผ่นละ 1 เยน! "
1300802-16 = "เพราะงั้นมันเป็นงานที่แข่งกับเวลานะ! วันนี้ฉันได้ใบปลิวเยอะมากเป็นพิเศษ#nเลยจำเป็นต้องมีคนช่วยน่ะ"
1300802-17 = "[s] \"แค่แจกใบปลิวพวกนี้ก็พอใช่ไหม?\""
1300802-18 = "พูดอะไรน่ะ... ฉันเป็นคนเรียกคุณครูมานะ จะให้มาทำงานยากๆ ได้ยังไง…"
1300802-19 = "คุณครูแค่เป็นผู้ช่วยฉันก็พอแล้วล่ะ"
1300802-20 = "คุณครูคอยอยู่ที่นี่ก่อน พอฉันไปแจกใบปลิวแถวนี้เสร็จแล้ว คุณครูก็เอาใบปลิวชุดใหม่มาให้ฉัน#nฉันก็จะออกไปแจกต่อเอง ทำวนไปเรื่อยๆ"
1300802-21 = "ง่ายดีใช่ไหมล่ะ? ฉันจะแบ่งเงินที่ได้มาให้คุณครูครึ่งนึงเลย! มาพยายามด้วยกันเถอะ!"
1300802-22 = "[s1] \"ถ้าไปแจกด้วยกันอาจเสร็จเร็วขึ้นก็ได้นะ\"\n[s2] \"แบ่งเงินให้ครูเหรอ? ไม่ต้องก็ได้นะ\""
1300802-23 = "เอ้าๆ ไม่มีเวลาแล้ว รีบไปทำงานกันเถอะ! เอามา 500 ใบก่อน!"
1300802-24 = "เอ้าๆ ไม่มีเวลาแล้ว รีบไปทำงานกันเถอะ! เอามา 500 ใบก่อน!"
1300802-25 = "[s] ส่งห่อกระดาษใบปลิวให้"
1300802-27 = "เดี๋ยวฉันกลับมานะ!!\n"
1300802-30 = "กลับมาแล้ว! ขอชุดต่อไปด้วย! \n"
1300802-31 = "[s] ส่งห่อกระดาษใบปลิวให้"
1300802-33 = "เดี๋ยวฉันกลับมานะ!"
1300802-38 = "แฮ่ก... แฮ่ก... ตะ...ต่อไป! "
1300802-39 = "[s] ส่งห่อกระดาษใบปลิวให้"
1300802-41 = "ฟู่ว... ไปก่อนนะ!"
1300802-46 = "แฮ่ก... แฮ่ก... แฮ่ก...."
1300802-48 = "แฮ่ก... "
1300802-49 = "[s3] \"ไม่เร็วไปหน่อยรึไง?\" \n[s4] \"ดูเหนื่อยๆ นะ...\""
1300802-50 = "มะ...ไม่เป็นไร ถ้าไม่เร็วแบบนี้ก็คงจะแจกให้หมดภายในวันนี้ไม่ได้"
1300802-51 = "มะ...ไม่เป็นไร ถ้าไม่เร็วแบบนี้ก็คงจะแจกให้หมดภายในวันนี้ไม่ได้"
1300802-53 = "แฮ่กๆ... ถ้างั้น... เดี๋ยวฉันมานะ!"
1300802-57 = "[s5] ........\n[s6] ....คงต้องช่วยหน่อยแล้วล่ะ"
1300802-58 = "(คุณครูตัดสินใจจะไปช่วยเซริกะแจกใบปลิว)"
1300802-59 = "(คุณครูตัดสินใจจะไปช่วยเซริกะแจกใบปลิว)"
1300802-62 = "(โซเซ).... กลับ...มา... แล้ว... เฮ้อ…"
1300802-63 = "[s] \"ทำได้ดีมาก\""
1300802-64 = "ตอนนี้... เหลืออีกเยอะไหม?"
1300802-65 = "[s7] \"ไม่มีแล้วล่ะ หมดแล้ว\"\n[s8] โชว์กระเป๋าเปล่าให้เซริกะดู"
1300802-66 = "เอ๋...?"
1300802-67 = "เอ๋...?"
1300802-68 = "น่าจะเหลือเยอะจนต้องไปแจกอีกสองสามรอบเลยนี่นา... หรือฉันคิดไปเองนะ…"
1300802-69 = "[s9] \"คิดไปเองแหละ\"\n[s10] \"คงเหนื่อยจนมองผิดไปล่ะมั้ง\""
1300802-70 = "ก็... อาจเป็นแบบนั้นก็ได้ ฮ่าฮ่าฮ่า ในที่สุดก็เสร็จสักที! ยะฮู้ว!"
1300802-71 = "ก็... อาจเป็นแบบนั้นก็ได้ ฮ่าฮ่าฮ่า ในที่สุดก็เสร็จสักที! ยะฮู้ว!"
1300802-72 = "[s] \"ทำได้ดีมาก\""
1300802-73 = "อื้อ! คุณครูเองก็ทำได้ดีมากเหมือนกัน! "
1300802-74 = "อืม... อันที่จริงฉันเองก็ถึงขีดจำกัดแล้วล่ะ... ที่จริงตอนนี้ขาฉันล้าไปหมดแล้ว…"
1300802-75 = "งั้นไปรับเงินค่างานพิเศษกันเลยดีไหม?"
1300802-77 = "(ทั้งสองคนไปรับเงินค่าทำงานพิเศษ คุณครูยกเงินทั้งหมดให้เซริกะ)"
1300802-78 = "ทำไมล่ะ?"
1300802-79 = "นี่เป็นเงินที่คุณครูได้รับมาอย่างถูกต้องนะ ทำงานแล้วก็ควรรับเงินค่าตอบแทนสิ!"
1300802-80 = "(แต่ก็ถูกเธอปฏิเสธ)"
1300802-82 = "เฮ้อ... ฮู่ว…"
1300802-83 = "พอเสร็จงานแล้วก็รู้สึกล้าจริงๆ เลย ว่าไหม?"
1300802-84 = "[s] \"จะเอาเงินค่าทำงานพิเศษไปทำอะไรเหรอ?\""
1300802-85 = "หือ? ไม่ได้เอาไปใช้เองหรอก เก็บไว้เป็นกองกลางที่คณะกรรมการแผนงานน่ะ"
1300802-86 = "[s] \"อย่างนี้นี่เอง...\""
1300802-87 = "ก็แบบนั้นล่ะ ถึงจะแค่เยนเดียวก็ต้องประหยัดเอาไว้ จะได้เอาไปใช้หนี้ของโรงเรียนได้"
1300802-88 = "เพราะถ้าทางคณะกรรมการแผนงานรู้ว่าเป็นเงินที่ได้มาจากการที่ฉันไปทำงานพิเศษมา#nก็คงจะไม่ยอมรับเงินเอาไว้แน่ๆ"
1300802-89 = "เพราะงั้นฉันเลยต้องขอให้คุณครูมาช่วยแทนไงล่ะ!"
1300802-90 = "....."
1300802-91 = "เพราะงั้นต่อไปก็มาช่วยฉันเป็นครั้งคราวได้ไหม? วันนี้คุณครูเองก็ช่วยได้เยอะเลย"
1300802-92 = "[s] พยักหน้า"
1300802-93 = "ฮุฮุฮุ แต้งกิ้ว"
1300802-94 = "งั้นไว้เจอกันใหม่นะ! ฉันขอกลับไปอาบน้ำที่บ้านก่อน... แถมตอนนี้ก็หิวแล้วด้วย"
1300802-95 = "บ๊ายบายคุณครู!"
1300802-97 = "(คิดว่าจะทำยังไงกับเงินค่าทำงานพิเศษที่ได้รับมา)"
1300802-99 = "(...)"
1300802-100 = "(ใช้ชื่อปลอมบริจาคให้กับคณะกรรมการแผนงานดีกว่า)"

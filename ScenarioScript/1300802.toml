1300802-15 = "3;세리카;12;오늘 할 일은 광고지 나눠주는 알바야. #n이걸 주변의 우편함이나 지나가는 사람들에게 나눠주면 되는데, 한장에 1엔씩이거든! \n#3;a"
1300802-16 = "3;세리카;12;그러니까 스피드가 생명인 일이지! 오늘은 특히 양이 많아서 같이 할 사람이 필요했거든.\n#3;em;[반응]"

[translation]
1300802-1 = "幫忙打工"
1300802-2 = "阿拜多斯・外圍市集"
1300802-3 = "太慢了吧！我等很久了。"
1300802-4 = "[s] 「我準時來了耶？」"
1300802-5 = "打工的時候本來就要比約好的時間早一點到。"
1300802-6 = "[s] 「茜香對那種事很嚴格呢。」"
1300802-7 = "不過有像這樣好好過來，這一點倒是值得信任。"
1300802-8 = "嗯？你還沒有說過你要做？別說那種話嘛。 "
1300802-9 = "就這樣度過空閒時間很可惜吧。 #n考慮到健康或閒錢等各方面，還是動一動比較好。"
1300802-10 = "咦？你問說要幫什麼忙？ "
1300802-12 = "來，這個給你。"
1300802-13 = "[s]「廣告傳單？」"
1300802-15 = "今天的打工是發傳單。 #n把這個投進周邊的信箱裡或發給路人就可以了，一張1元哦！ "
1300802-16 = "所以速度是關鍵！而且今天量特別多，需要有人一起幫忙。"
1300802-17 = "[s]「把這個發出去就行了嗎？」"
1300802-18 = "在說什麼啊。畢竟是我叫老師來的，也不能麻煩老師做太辛苦的事……"
1300802-19 = "老師只要在這裡當我的助手就可以了。 "
1300802-20 = "你在這裡守著，我發完傳單回來的話就把另一綑傳單拿給我，我再把傳單拿去發，反覆這些動作。"
1300802-21 = "如何，簡單吧？我會把日薪的一半分給你的！加油吧！"
1300802-22 = "[s1] 「一起做的話能更快結束吧？」\n[s2] 「平分打工薪水什麼的，不用那麼做沒關係。」"
1300802-23 = "好啦，快點快點，沒時間管這個了。趕快開始吧！先給我500張！"
1300802-24 = "好啦，快點快點，沒時間管這個了。趕快開始吧！先給我500張！"
1300802-25 = "[s] 交出一綑廣告傳單"
1300802-27 = "我去去就回！"
1300802-30 = "好，我回來了！再來！ "
1300802-31 = "[s] 交出一綑廣告傳單"
1300802-33 = "我去去就回！"
1300802-38 = "哈啊……哈啊……再來！ "
1300802-39 = "[s] 交出一綑廣告傳單"
1300802-41 = "呼……走吧！"
1300802-46 = "哈啊……哈啊……哈啊……"
1300802-48 = "哈啊…… "
1300802-49 = "[s3] 「節奏，不會太快嗎？」\n[s4] 「看起來很難受……」"
1300802-50 = "不，不要緊，如果不用這個速度的話就沒辦法在今天之內完成了。"
1300802-51 = "不，不要緊，如果不用這個速度的話就沒辦法在今天之內完成了。"
1300802-53 = "呼……那，我去去就回！"
1300802-57 = "[s5] （………………）\n[s6] （……果然還是幫忙比較好）"
1300802-58 = "（決定去發廣告傳單）"
1300802-59 = "（決定去發廣告傳單）"
1300802-62 = "（搖晃）……我回來了……哈啊……"
1300802-63 = "[s]「辛苦了。」"
1300802-64 = "現在……還剩多少？"
1300802-65 = "[s7] 「已經沒有了哦，結束了。」\n[s8] 亮出空背包"
1300802-66 = "咦……"
1300802-67 = "咦……"
1300802-68 = "明明感覺原本剩下的份量還需要再多跑幾次……是我的錯覺嗎……"
1300802-69 = "[s9] 「是錯覺啦。」\n[s10] 「一定是太累所以看錯了。」"
1300802-70 = "嘛，也是！啊哈哈，終於結束了！太好了！"
1300802-71 = "嘛，也是！啊哈哈，終於結束了！太好了！"
1300802-72 = "[s] 「辛苦了。」"
1300802-73 = "嗯！老師也辛苦了！ "
1300802-74 = "哈啊……老實說已經到極限了……腿在發軟……"
1300802-75 = "嘛，那就去領打工薪水吧？"
1300802-77 = "（收到了打工薪水，雖然想把全部都給茜香）"
1300802-78 = "什麼？"
1300802-79 = "這不是老師正正當當賺來的錢嗎。工作的份當然要好好收下！"
1300802-80 = "（被拒絕了）"
1300802-82 = "呼啊──，嗯──"
1300802-83 = "才想說結束了就已經晚上了，累了呢。老師還好嗎？"
1300802-84 = "[s] 「嗯，話說打工薪水要用來做什麼？」"
1300802-85 = "嗯？我不會用哦。這筆錢當然是拿去對策委員會。"
1300802-86 = "[s] 「……這樣啊。」"
1300802-87 = "嗯，為了還清學校的債務，必須多賺點錢。"
1300802-88 = "……如果大家知道這是個人打工賺來的錢的話是不會收下的。"
1300802-89 = "所以才請老師來幫忙的！"
1300802-90 = "…… "
1300802-91 = "所以，往後也可以偶爾來幫忙嗎？因為今天真的幫大忙了。"
1300802-92 = "[s] 點頭"
1300802-93 = "呵呵，謝謝。"
1300802-94 = "那就再見囉！我回家沖個澡吧，肚子也餓了。"
1300802-95 = "ByeBye，老師！"
1300802-97 = "（似乎得好好想想該如何運用收到的打工薪水）"
1300802-99 = "（………）"
1300802-100 = "（匿名捐款給對策委員會吧）"

1300802-19 = "3;세리카;01;선생님은 여기서 내 보조만 해주면 돼."
1300802-20 = "3;세리카;02;여기서 자리를 지키고 있다가 내가 광고지를 돌리고 오면 다른 광고지 뭉치를 주고, 내가 다시 그걸 받아가고, 반복."
1300802-21 = "3;세리카;12;어때, 간단하지? 이걸로 내가 받은 일당의 절반을 나눌테니까! 힘내 보자고!\n#3;em;[음표]"

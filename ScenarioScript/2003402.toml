[translation]
2003402-1 = "達成目的的方法"
2003402-2 = "簡單來說……"
2003402-3 = "我要參加正月美食大胃王比賽！"
2003402-4 = "確認參加資格、送出參加申請書、調查比賽地點以及食物的項目……"
2003402-5 = "事前準備都已經完成了。"
2003402-6 = "呵呵呵。今年也很令人期待呢★"
2003402-7 = "[s]「今年『也』？」"
2003402-8 = "沒錯，今年「也」。"
2003402-9 = "[s]「感覺這句話聽起來好像有很多含意……」"
2003402-10 = "哎呀，我不懂老師的意思耶★"
2003402-11 = "那麼，老師，我們走吧。"
2003402-12 = "[s]「咦，我也要去嗎？」"
2003402-13 = "嗯，如果老師能一起看的話，想必會是一場難忘的比賽。"
2003402-14 = "老師你……會無情拒絕肚子餓學生的請求嗎？"
2003402-15 = "[s]「原來是『肚子餓』了啊……」"
2003402-16 = "那是當然。為了參加這次比賽，早餐我只吃了半碗呢。"
2003402-17 = "那還真是件大事？#n呵呵，你也這麼覺得嗎？"
2003402-19 = "……真的來了呢。鰐渕亞伽里同學。"
2003402-20 = "真的很不好意思……我們主辦方想鄭重拒絕亞伽里同學參加這次的比賽。"
2003402-21 = "再次跟您說聲抱歉，希望您能諒解。"
2003402-22 = "哎呀？"
2003402-28 = "[ns]「有合理的理由嗎？」"
2003402-29 = "……對不起。"
2003402-30 = "亞伽里同學是去年的冠軍吧。"
2003402-31 = "是的。將本來就容易產生飽足感的蒟蒻進行油炸，進一步提升飽足感……#n確實很讓人印象深刻。"
2003402-32 = "而前年的冠軍也是亞伽里同學。"
2003402-33 = "啊，我想起來了。#n把飽足感十足的馬鈴薯和雞蛋搗碎後揉成團，接著再與魚肉混合，做成特製魚板。"
2003402-34 = "照這樣下去，今年的冠軍應該也會是亞伽里同學吧。"
2003402-35 = "哎呀，可是不試試看怎麼會知道呢？"
2003402-37 = "[ns1]（有的時候就算不特地嘗試……）\n[ns2]（也能知道結果的吧……）"
2003402-40 = "真的很抱歉。#n我們商店街的正月美食大胃王比賽……"
2003402-41 = "目的基本上是為了讓更多人品嚐、享受食物，進而為商店街的宣傳有所貢獻。"
2003402-42 = "然而在亞伽里同學參賽的那一刻……冠軍就幾乎已經確定了。"
2003402-43 = "站在主辦方的角度，會覺得難以達成宣傳商店街的目標。"
2003402-44 = "畢竟冠軍已經確定的比賽……很難讓人提起興趣。"
2003402-46 = "哼嗯……"
2003402-47 = "作為補償，我們會提供商店街嚴選的最高級正月便當10人份。#n可以請您考量一下我們的苦衷嗎？"
2003402-48 = "拜託了……"
2003402-49 = "……"
2003402-50 = "可是我並不是為了吃最高級正月便當而來的。"
2003402-51 = "我之所以參賽，是為了吃類似炸蒟蒻、雞蛋馬鈴薯魚板……#n這種在大胃王比賽中，為了讓參賽者迅速吃飽的小伎倆──#n抱歉，是特色小吃才來參加的。"
2003402-52 = "這，這……！"
2003402-53 = "呵呵……今年的特色小吃會是什麼呢？真令人期待★"
2003402-54 = "[s]「那不如這樣吧，我有一個想法……」"
2003402-55 = "嗯？"
2003402-56 = "哎呀？"
2003402-59 = "原來如此……由身為去年冠軍的我參加頭銜保衛戰。"
2003402-60 = "讓亞伽里同學和其他所有挑戰者進行大胃王比賽！？"
2003402-61 = "不過這樣沒問題嗎？#n即使是亞伽里同學，一次面對多達八位挑戰者也實在……！"
2003402-62 = "哎呀，這真是有趣……不，是很有挑戰的價值呢。"
2003402-63 = "沒關係，畢竟打從一開始，勝利就不是我的目標。"
2003402-64 = "去年也是，前年也一樣。"
2003402-65 = "是這樣嗎！？"
2003402-66 = "[ns]（真像亞伽里會做的事……）"
2003402-67 = "沒問題，我覺得這樣很好。#n真期待今年的「特色小吃」會是什麼呢。"
2003402-68 = "我，我明白了。#n我去詢問一下主辦方的意見，麻煩兩位稍等！"
2003402-72 = "呵呵。"
2003402-73 = "託老師的福，今年也能體驗到新鮮的事物了。"
2003402-74 = "[s]「……記得手下留情哦？」"
2003402-75 = "咦？我聽不懂老師在說些什麼耶～★"
2003402-78 = "那麼，從現在起！商店街的正月美食大胃王比賽……正式開始！"
2003402-79 = "今年的正月美食大胃王比賽與以往不同……將以「挑戰冠軍吧！」為主題！"
2003402-81 = "首先為各位介紹冠軍！向3冠王發起挑戰的鰐渕亞伽里選手！"
2003402-85 = "呵呵，大家好。請各位多多指教。"
2003402-86 = "還有與之對抗的8位挑戰者──！"
2003402-98 = "比賽開始！挑戰者們正猛烈地清空盤子！#n相較之下，冠軍的表現仍然充滿餘裕！"
2003402-100 = "唔嗯～今年的特色小吃……#n是加入了磨成泥的芋頭和豆子的大型玉子燒嗎……"
2003402-101 = "不僅有特色小吃，還準備了其他御節料理呢。#n一道一道品嚐吧。"
2003402-108 = "啊～！挑戰者們的速度漸漸變慢了！"
2003402-114 = "而亞伽里選手恰恰相反！從開始到現在完全感覺不到速度的變化！#n不管遇到什麼都不會退縮的姿態！這就是冠軍嗎！"
2003402-115 = "鯡魚卵跟鮭魚海帶捲都很入味。我很喜歡。"
2003402-116 = "感覺喉嚨有點乾，喝點湯來漱漱口吧？"
2003402-130 = "挑戰者們漸漸開始放棄了！#n請不要勉強！救護車已經在會場後方待命了！"
2003402-136 = "太驚人了，亞伽里選手！只是默默地吃了又吃、吃了又吃！#n這位選手的腸胃真的有極限嗎！那副腸胃到底是由什麼組成的！"
2003402-137 = "哎呀，大家都已經吃飽了嗎？還剩這麼多耶……"
2003402-138 = "那麼，能把他們的份也拿給我嗎？"
2003402-139 = "難得參加能盡情享用美食的比賽，要是剩下就太可惜了吧？"
2003402-147 = "是，是！勝負已分！"
2003402-148 = "雖然中途似乎就已經能看出結果……#n今年的冠軍是……鰐渕亞伽里選手！3冠王！"
2003402-149 = "呵呵……幸好商店街的宣傳似乎有順利達成了。"
2003402-150 = "而我也吃得心滿意足……這都多虧了老師的方法★"
2003402-152 = "老師，以及亞伽里同學，真的很謝謝兩位。#n由於我們考慮不周，差點就失禮了。"
2003402-156 = "不過……從剛剛開始我的手機似乎就響個不停。#n兩位有什麼頭緒嗎……？"
2003402-157 = "[s3]「可能是因為關注比賽的人們……」\n[s4]「把比賽的畫面傳到網路上的關係……」"
2003402-160 = "什麼？影片獲得了超乎想像的點閱率，現在網路上到處都是？"
2003402-161 = "咦！？"
2003402-162 = "……"
2003402-163 = "哎呀，那真是太好了。#n這麼一來宣傳效果又更好了呢。"
2003402-165 = "可是這將帶來什麼樣的附加效果，實在難以預測……！"
2003402-167 = "呵呵。"
2003402-172 = "世事不都是這樣的嗎★"
2003402-174 = "（亞伽里那開朗又純淨的笑容，不禁讓人產生了一股涼意……）"

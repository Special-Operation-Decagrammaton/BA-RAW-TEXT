[translation]
2003402-1 = "วิธีบรรลุเป้าหมาย"
2003402-2 = "และด้วยเหตุนี้..."
2003402-3 = "ฉันก็เลยจะเข้าร่วมการแข่งขันกินจุในวันปีใหม่ค่ะ!"
2003402-4 = "ทั้งตรวจสอบคุณสมบัติผู้สมัคร ยื่นใบสมัคร และดูสถานที่แข่งขันและรายการอาหาร..."
2003402-5 = "ฉันเตรียมการล่วงหน้าไว้หมดแล้วค่ะ"
2003402-6 = "ฮุฮุฮุ ปีนี้ก็น่าตื่นเต้นนะคะเนี่ย★"
2003402-7 = "[s] \"ปีนี้ก็ด้วย... งั้นเหรอ?\""
2003402-8 = "ค่ะ ปีนี้ก็ด้วย"
2003402-9 = "[s] \"ฟังดูเหมือนมีนัยยะอะไรเลยนะเนี่ย...\""
2003402-10 = "ตายจริง พูดอะไรออกมาคะเนี่ย ไม่เห็นจะเข้าใจเลย★"
2003402-11 = "ถ้างั้นก็ไปกันเถอะค่ะคุณครู"
2003402-12 = "[s] \"หืม? ครูด้วยเหรอ?\""
2003402-13 = "ค่ะ เพราะถ้ามีคุณครูให้กำลังใจอยู่ข้างๆ ก็คงจะเป็นการแข่งขันที่น่าจดจำมากๆ เลยละค่ะ"
2003402-14 = "หรือว่าคุณครู... เป็นคนที่จะปฏิเสธคำขอของลูกศิษย์ตาดำๆ ที่หิวไส้กิ่วเหรอคะ?"
2003402-15 = "[s] \"หิวมากสินะ...\""
2003402-16 = "ใช่ค่ะ ฉันไม่ได้กินอะไรมาเลยตั้งแต่เช้าเพื่อการแข่งขันวันนี้โดยเฉพาะเลยค่ะ"
2003402-17 = "เรื่องใหญ่เลยงั้นเหรอคะ? ฮุฮุ คุณครูคิดอย่างนั้นเหรอคะ?"
2003402-19 = "มาจริงๆ สินะครับ คุณวานิบูชิ อาคาริ"
2003402-20 = "ต้องขออภัยจริงๆ นะครับ... แต่ว่าทางเราต้องขอปฏิเสธการเข้าร่วมแข่งขันกินจุของคุณอาคาริในครั้งนี้#nครับ"
2003402-21 = "ต้องขออภัยด้วยจริงๆ ครับ แต่ช่วยเข้าใจพวกเราด้วยครับ"
2003402-22 = "ตายจริง?"
2003402-28 = "[ns] \"มีเหตุผลที่ตัดสิทธิ์มั้ย?\""
2003402-29 = "ต้องขออภัยด้วยครับ..."
2003402-30 = "คุณอาคาริเป็นผู้ชนะในการแข่งขันปีที่แล้วใช่มั้ยครับ?"
2003402-31 = "ใช่ค่ะ ฉันยังจำได้เลยนะคะว่าตอนนั้นผู้จัดงานเอาบุกทอดมาให้กิน ผู้เข้าแข่งขันจะได้รู้สึกว่าอิ่มไวขึ้น"
2003402-32 = "และผู้ชนะเมื่อ 2 ปีก่อนก็เป็นคุณอาคาริด้วยสินะครับ"
2003402-33 = "อ๊ะ จริงด้วยนะคะ ปีนั้นมีการบดมันฝรั่งกับไข่ แล้วก็เอาไปผสมกับเนื้อปลาเพื่อทำเป็นลูกชิ้นปลา#nพิเศษที่ทำให้อิ่มไวด้วยค่ะ"
2003402-34 = "และถ้าเป็นอย่างนี้ ผู้ชนะของปีนี้ก็คงเป็นคุณอาคาริตามเคยนะครับ..."
2003402-35 = "ตายจริง แต่ถ้ายังไม่ได้ลงสนามก็ไม่รู้ผลหรอกนะคะ"
2003402-37 = "[ns1] (แต่บางเรื่องก็ไม่ต้องลงสนามเพื่อพิสูจน์ก็ได้...)\n[ns2] (ก็น่าจะรู้ผลล่วงหน้าแล้วนะ...)"
2003402-40 = "ต้องขออภัยด้วยจริงๆ ครับ การแข่งขันกินจุเมนูปีใหม่ของย่านการค้าของเรา..."
2003402-41 = "เริ่มจากจุดประสงค์ที่อยากให้ผู้คนได้ชิมและเพลิดเพลินไปกับอาหาร และมีส่วนร่วมในการโปรโมต#nย่านการค้าของเราต่อไปน่ะครับ"
2003402-42 = "ถ้าหากว่าคุณอาคาริเข้าร่วมแข่งขันด้วย... ก็เหมือนกับล็อกมงผู้ชนะเอาไว้แล้วน่ะครับ"
2003402-43 = "ทางผู้จัดงานจึงมองว่าจะเป็นการยากต่อการโปรโมตย่านการค้าที่เป็นจุดประสงค์เดิมของเราน่ะครับ"
2003402-44 = "เพราะถ้าเป็นการแข่งขันที่ดูเหมือนจะล็อกผู้ชนะไว้แล้ว ผู้คนคงไม่ให้ความสนใจเท่าไรครับ"
2003402-46 = "ฮึ่ม..."
2003402-47 = "เพื่อเป็นการขออภัยแชมป์เก่า ทางเราจะมอบข้าวกล่องปีใหม่ชั้นเลิศให้ 10 ชุดครับ โปรดเข้าใจ#nเหตุผลของพวกเราด้วยเถอะนะครับ"
2003402-48 = "ขอร้องละครับ..."
2003402-49 = "......"
2003402-50 = "แต่ฉันไม่ได้มาที่นี่เพื่อกินข้าวกล่องปีใหม่ชั้นเลิศนะคะ"
2003402-51 = "ฉันมาที่นี่ก็เพื่อกินอาหารที่ผู้จัดใช้เล่ห์เหลี่ยม... ไม่สิ กินอาหารที่ทำให้อิ่มท้องได้ไวที่สุด#nในการแข่งขันกินจุ อย่างเช่นบุกทอดหรือลูกชิ้นปลาจากมันฝรั่งและไข่ต่างหากค่ะ"
2003402-52 = "ระ... เรื่องนั้นมัน...!"
2003402-53 = "ฮุฮุ... ปีนี้คิดจะใช้กลเม็ดอะไรอีกล่ะคะ? ชักอยากจะรู้ไวๆ แล้วสิ★"
2003402-54 = "[s] \"เอาละๆ พอดีทางนี้มีไอเดียอยู่อย่างหนึ่ง...\""
2003402-55 = "ครับ?"
2003402-56 = "อุ๊ย?"
2003402-59 = "แบบนี้นี่เอง... ให้จัดแข่งเพื่อป้องกันตำแหน่งแชมป์ของปีก่อนสินะคะ"
2003402-60 = "หมายความว่า... ให้คุณอาคาริแข่งกินจุกับผู้ท้าชิงทุกคนของปีนี้น่ะเหรอครับ?!"
2003402-61 = "ตะ... แต่จะไม่เป็นไรเหรอครับ? ต่อให้เป็นคุณอาคาริก็เถอะ แต่จะสู้กับผู้เข้าแข่งขันทั้ง 8 คนไหวเหรอ"
2003402-62 = "ตายจริง แบบนี้สิคะยิ่งน่าสนุก... ไม่สิ พูดแบบนี้ก็ยิ่งกระตุ้นต่อมความอยากลองเลยค่ะ"
2003402-63 = "ไม่เป็นไรค่ะ เพราะเป้าหมายเดิมทีของฉันก็ไม่ใช่การชนะอยู่แล้ว"
2003402-64 = "ไม่ว่าจะในปีไหนก็ตามค่ะ"
2003402-65 = "งั้นเหรอครับ?!"
2003402-66 = "[ns] (ถ้าเป็นอาคาริก็ไม่แปลกหรอก...)"
2003402-67 = "ค่ะ ฉันยอมรับเงื่อนไขนี้ค่ะ แล้วก็อยากรู้ด้วยค่ะว่าปีนี้ผู้จัดจะใช้ 'กลเม็ด' แบบไหน"
2003402-68 = "ระ... รอสักครู่นะครับ ผมขอไปถามจากทางผู้จัดก่อน ช่วยรอสักครู่นะครับ!"
2003402-72 = "ฮุฮุ"
2003402-73 = "เพราะได้คุณครูช่วยไว้แท้ๆ เลยค่ะ ปีนี้ฉันเลยได้เปิดประสบการณ์ใหม่ๆ อีกครั้ง"
2003402-74 = "[s] \"ออมมือ... ให้คนอื่นบ้างก็ได้นะ\""
2003402-75 = "คะ? พูดอะไรคะเนี่ย ไม่เห็นเข้าใจเลยค่ะ~★"
2003402-78 = "เอาละครับ จากนี้ไปจะเป็นการแข่งขันกินจุเมนูปีใหม่ของย่านการค้าของเราครับ!"
2003402-79 = "และการแข่งขันกินจุเมนูปีใหม่ของเราในครั้งนี้มาในธีมที่ไม่เคยมีมาก่อน นั่นคือ 'กินเฉือนแชมป์!' ครับ!"
2003402-81 = "ก่อนอื่นขอแนะนำตัวแชมเปี้ยนของเรา! ผู้เข้าแข่งขันวานิบูชิ อาคาริ ที่มารักษาตำแหน่งแชมป์#nสมัยที่ 3!"
2003402-85 = "ฮุฮุ สวัสดีค่ะ ทุกๆ คน ขอฝากตัวด้วยนะคะ"
2003402-86 = "และผู้ท้าชิงทั้ง 8 คนที่จะมาแข่งกินเฉือนแชมป์!"
2003402-98 = "เริ่มการแข่งขันแล้วครับ! ผู้ท้าชิงกวาดอาหารในจานกันอย่างรวดเร็วเลย! ส่วนแชมป์ของเราก็กินอย่าง#nใจเย็นเลยละครับ!"
2003402-100 = "อืม~ กลเม็ดของปีนี้ก็คือไข่ม้วนขนาดใหญ่ที่ใส่เผือกกับถั่วบดลงไปสินะคะ แบบนี้เองสินะ..."
2003402-101 = "แต่นอกจากเมนูนี้ก็มีอาหารปีใหม่อื่นๆ เตรียมไว้ด้วย งั้นฉันจะกินไปทีละอย่างแล้วกันค่ะ"
2003402-108 = "อ๊ะ~! เหล่าผู้ท้าชิงของเรา... ถือว่าทำเวลาได้ช้ากว่าแชมป์อยู่นิดหน่อยนะครับ!"
2003402-114 = "ส่วนผู้เข้าแข่งขันอาคาริ! ยังคงกินด้วยความเร็วเท่าเดิมตั้งแต่ตอนเริ่มจานแรกเลยครับ! ไม่ว่าอาหารจะ#nเป็นอะไรก็ดูสู้ไม่ถอยเลย! แบบนี้สินะครับที่เรียกว่าศักดิ์ศรีของแชมเปี้ยน!"
2003402-115 = "ทั้งไข่ปลาเฮร์ริง ทั้งแซลมอนม้วนสาหร่าย รสชาติดีมากเลยค่ะ ถูกใจฉันมากเลย"
2003402-116 = "ตอนนี้น่าจะฝืดคอกันแล้ว มาล้างปากด้วยซุปเต้าเจี้ยวกันหน่อยดีกว่ามั้ยคะ?"
2003402-130 = "เหล่าผู้ท้าชิงเริ่มถอดใจกันทีละคนสองคนแล้ว! อย่าฝืนตัวเองมากไปนะครับ! อย่างไรก็ตาม เรามีรถพยาบาลเตรียมไว้ด้านหลังสนามแข่งด้วยนะครับ!"
2003402-136 = "น่าตกใจมาก ผู้เข้าแข่งขันอาคาริ! เธอเอาแต่กิน กิน และกินอย่างเงียบๆ เลยครับ! สงสัยจังครับว่า#nกระเพาะของเธอมีลิมิตหรือเปล่า! และกระเพาะของเธอทำจากอะไรกันแน่!"
2003402-137 = "ตายจริง ทุกคนกินกันอิ่มแล้วเหรอคะ? เหลือตั้งเยอะแยะขนาดนี้..."
2003402-138 = "ถ้าอย่างนั้นช่วยเอาอาหารที่ผู้เข้าแข่งขันคนอื่นกินไม่ไหวมาให้ฉันได้มั้ยคะ?"
2003402-139 = "ได้เข้าแข่งขันในรายการที่กินได้ไม่อั้นทั้งที ถ้าเหลือไว้ก็เสียดายแย่สิคะ?"
2003402-147 = "เอาละครับ! ผลการแข่งขันออกมาแล้วครับ!"
2003402-148 = "ทุกท่านอาจจะคาดเดาได้ตั้งแต่ช่วงกลางๆ ของการแข่งแล้ว... และผู้ชนะของเราในปีนี้ก็คือ...! แชมป์เก่า วานิบูชิ อาคาริครับ! ได้ตำแหน่งแชมป์ 3 สมัยไปครองเลยครับ!"
2003402-149 = "ฮุฮุ... โชคดีที่วัตถุประสงค์ในการโฆษณาและประชาสัมพันธ์ย่านการค้าดูเหมือนจะประสบความสำเร็จ#nเป็นอย่างดีนะคะ"
2003402-150 = "ส่วนฉันก็พอใจที่ได้กินอย่างเต็มที่ด้วยค่ะ นี่เป็นเพราะความคิดอันชาญฉลาดของคุณครูเลยนะคะ★"
2003402-152 = "ขอบคุณมากเลยครับ ทั้งคุณครูและคุณอาคาริเลย ตอนแรกพวกเราคิดน้อยไปหน่อย เลยเกือบ#nทำเรื่องเสียมารยาทกับแชมป์เก่าไปเลยครับ"
2003402-156 = "แต่ว่า... โทรศัพท์ของผมเหมือนจะมีแจ้งเตือนแปลกๆ น่ะครับ พอจะรู้มั้ยครับว่าเกิดเรื่องอะไรใน#nโลกออนไลน์หรือเปล่า...?"
2003402-157 = "[s3] \"ตอนแข่งมีคนถ่ายวิดีโอไปโพสต์ในเน็ตน่ะ\"\n[s4] \"คนที่มาดูถ่ายวิดีโอการแข่งขันเอาไปโพสต์ลงอินเทอร์เน็ตไว้น่ะ...\""
2003402-160 = "คะ? ตอนนี้ยอดวิวสูงเสียจนจนแชร์กันไปทั่วคิโวทอสแล้วเหรอคะ?"
2003402-161 = "ว่าไงนะครับ?!"
2003402-162 = "......"
2003402-163 = "ว้าว งั้นก็ดีเลยค่ะ แบบนี้ก็ถือว่าช่วยโปรโมตย่านการค้าได้มากขึ้นนะคะ"
2003402-165 = "ตะ... แต่ว่าเราไม่สามารถคาดเดาได้เลยนะครับว่าจะมีผลกระทบอื่นอะไรตามมารึเปล่า...!"
2003402-167 = "ฮุฮุ"
2003402-172 = "ทุกเรื่องในโลกนี้ก็คาดเดาไม่ได้เหมือนกันนั่นแหละค่ะ★"
2003402-174 = "(รอยยิ้มของอาคาริดูสดใสและบริสุทธิ์จนทำให้คุณครูขนลุกซู่...)"

10009080-1 = "#title;후일담;해피 발렌타인……?"
10009080-2 = "1;세리나;00\n5;하나에;00\n#1;a\n#5;a\n#wait;1000\n#1;h"
10009080-3 = "1;세리나;03;안녕하세요. 구호기사단입니다. 발렌타인 데이를 맞이하여 초콜릿을 나눠드리고 있어요.\n#1;greeting\n#1;em;[재잘]"
10009080-4 = "5;하나에;03;평범한 초콜릿이지만, 받아 주세요! 모두 해피 발렌타인 되세요!\n#5;em;[반짝]"
10009080-5 = "5;발렌시민 2;00\n1;발렌시민 1;00;발렌타인 데이에 초콜릿이라니, 전 처음 받아 봐요…….\n#1;em;[///]\n#1;stiff\n#1;a\n#5;a\n#5;h"
10009080-6 = "1;발렌시민 1;00\n5;발렌시민 2;00;고마워요, 구호기사단. 늘 수고가 많네요.\n#5;greeting\n#1;h"
10009080-7 = "#all;hide"
10009080-8 = "3;미네;99;사랑을 원하는 분들에게 행복을 전하는 것도 구호의 한 방법이 아닐까, 하는 마음에서 시작한 활동입니다만.\n#3;em;…\n#3;a"
10009080-9 = "3;미네;03;많은 분들이 기뻐하시는 것을 보니 저도 기뻐지는군요."
10009080-10 = "#st;[0,0];instant;1;"

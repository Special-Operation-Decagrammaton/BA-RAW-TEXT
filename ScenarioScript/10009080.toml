[translation]
10009080-1 = "ย้อนวันวาน;แฮปปี้ วาเลนไทน์...?"
10009080-3 = "สวัสดีค่ะ ชมรมอัศวินบรรเทาทุกข์นะคะ วันนี้พวกเราจะมาแจกช็อกโกแลตเนื่องในวันวาเลนไทน์ค่ะ"
10009080-4 = "ถึงจะเป็นแค่ช็อกโกแลตธรรมดาๆ แต่ก็ช่วยรับไปด้วยนะคะ! ขอให้ทุกคนมีความสุขกันมากๆ ในวัน#nวาเลนไทน์นะคะ!"
10009080-5 = "ช็อกโกแลตวันวาเลนไทน์เหรอ... เพิ่งเคยได้ครั้งแรกเลย..."
10009080-6 = "ขอบคุณนะ ชมรมอัศวินบรรเทาทุกข์ ทำงานหนักกันตลอดเลย..."
10009080-8 = "เราเริ่มทำกิจกรรมนี้เพราะคิดว่าการมอบความสุขให้กับผู้คนที่ต้องการความรักก็เป็นการบรรเทาทุกข์#nอย่างหนึ่งค่ะ"
10009080-9 = "เห็นทุกคนมีความสุขกันแบบนี้ ฉันก็ดีใจเหมือนกันค่ะ"
10009080-13 = "อะฮ่าฮ่าฮ่า... ฮานาเอะจังคิดไอเดียออกมาได้ยอดเยี่ยมมากเลยละค่ะ"
10009080-14 = "ในอีกความหมายถึงการทำแบบนี้ก็อาจเป็น \"การบรรเทาทุกข์\" ที่ชมรมอัศวินบรรเทาทุกข์ทำได้ ก็ได้นะคะ!"
10009080-15 = "สิ่งที่ทำเพื่อประโยชน์ของทุกๆ คน"
10009080-16 = "ขอบคุณนะคะ เซรินะ ฮานาเอะ ที่ทำให้ได้มีส่วนร่วมในช่วงเวลาที่เป็นเกียรติแบบนี้"
10009080-17 = "ดะ... ด้วยความยินดีค่ะ! ถ้าเป็นงานจิตอาสาแบบนี้ละก็... ฉันจะพยายามทำให้ดีที่สุด และสนุกกับงาน..."
10009080-18 = "แถมช็อกโกแลตพวกนี้ก็อร่อยมากด้วยค่ะ!"
10009080-20 = "ขอบคุณนะ... ขอบคุณมากเลย... จะทานให้อร่อยเลย ไม่สิ... เก็บไว้เป็นมรดกเลยดีมั้ยนะ?"
10009080-21 = "ฉันเองก็อยากทำอะไรให้บ้างเหมือนกันนะ... ยังพอมีเวลาอีกนิดหน่อย ฉันก็จะช่วยงานจิตอาสาด้วย"
10009080-23 = "มะ... ไม่ต้องทำถึงขนาดนั้นก็ได้นะคะ... ขะ... ขอบคุณค่ะ"
10009080-24 = "ขอบคุณมากค่ะ ขอให้จิตใจที่หวังบรรเทาทุกข์จงมีแด่ทุกคนค่ะ"
10009080-25 = "ทำยังไงดีคะ... เวลาเห็นอะไรแบบนี้แล้ว"
10009080-29 = "ฉันมีความสุขจนตัวจะระเบิดแล้วค่ะ!"
10009080-35 = "อ๊ายยยย?! ระเบิด?!"
10009080-36 = "พะ... เพราะฉันเหรอคะ?! เพราะฉันดีใจจนตัวจะระเบิดงั้นเหรอคะ?!"
10009080-37 = "ฉันว่าไม่ใช่แบบนั้นหรอกนะคะ!"
10009080-39 = "รายงานข่าวด่วนค่ะ! เมื่อครู่ที่ผ่านมารถบัสที่ใช้เป็นพาหนะส่งตัวเด็กเกเรไปยังห้องคุมขังได้เกิดการ#nระเบิดขึ้น!"
10009080-40 = "นอกจากนี้เรายังได้รับแจ้งว่ามีกลุ่มเด็กมีปัญหาจำนวนมากกำลังก่อความวุ่นวายอยู่ในขณะนี้ด้วยค่ะ!"
10009080-42 = "ถึงจะไม่รู้ว่าเกิดอะไรขึ้นก็เถอะ แต่ก็ดูวุ่นวายขึ้นแล้วแฮะ...!"
10009080-43 = "นั่นสินะ พวกลูกกระจ๊อกของวัลคิรี่ดูวิ่งวุ่นไปหมดเลย"
10009080-44 = "ดีละ! วันเทศกาลนี่นะ ได้เวลารื่นเริงแล้ว!"
10009080-45 = "เรียกทุกคนมา! วันนี้มาจัดชุดใหญ่ไฟกระพริบกันเลย!"
10009080-50 = "กะ... เกิดอะไรขึ้นเนี่ย?"
10009080-51 = "มีคนบาดเจ็บหมดสติอยู่รอบทาง... และยังมีพวกเด็กเกเรที่ฉวยโอกาสนี้โผล่ออกมาก่อความวุ่นวาย..."
10009080-52 = "แบบนี้มัน... แบบนี้มันนรกชัดๆ?!"
10009080-53 = "ชะ... ช่วยด้วย! ใครก็ได้ช่วยด้วย!"
10009080-55 = "ระ...รู้สึกว่าจะเกิดเรื่องวุ่นวายใหญ่โตขึ้นเลยนะคะ...!"
10009080-56 = "ทำยังไงดีคะรุ่นพี่?!"
10009080-57 = "หน้าที่ของเราคือการบรรเทาทุกข์ค่ะ ก่อนอื่นก็มาเริ่มจากตรวจสอบว่าแถวๆ นี้มีใครที่ต้องการความช่วย#nเหลืออยู่..."
10009080-58 = "พูดได้ดีมากค่ะ เซรินะ"
10009080-59 = "หะ... หัวหน้าคะ?"
10009080-60 = "การบรรเทาทุกข์คือการช่วยเหลือผู้คนในหลายๆ เรื่อง"
10009080-61 = "ดังนั้นแล้ว การช่วยเรียกสติคนที่กำลังเดินในทางที่ผิด เราก็สามารถมองว่าเป็นส่วนหนึ่งของ 'การบรรเทาทุกข์' ได้เช่นกันค่ะ"
10009080-62 = "ตั้งแต่นี้ไป ฉันจะทำให้เด็กเกเรกลุ่มนั้นได้รับ 'การบรรเทาทุกข์' จากพวกเราเองค่ะ!"
10009080-63 = "หัวหน้า?!"
10009080-64 = "ลุยแล้วนะคะ! ออกบรรเทาทุกข์ให้กับผู้คนที่ทุกข์เข็ญ!"

[translation]
10009080-1 = "Afterword; Happy Valentine's...?"
10009080-3 = "Hello! I represent the Remedial Knights. To celebrate Valentine's Day, we're giving out special chocolates, so please enjoy!"
10009080-4 = "Well, they're really just normal chocolates, but... Please give them a try! Happy Valentine's, everyone!"
10009080-5 = "Ah... This is the first time someone's given me Valentine's chocolate..."
10009080-6 = "Thank you, Remedial Knights. You're always working so hard."
10009080-8 = "We've begun a new tradition this year. After all, delivering happiness to the lonely is also a type of remedy, isn't it?"
10009080-9 = "And I find myself growing more joyful with every smile someone shares with us."
10009080-13 = "Haha... It was all Hanae's idea, really. I'm just glad she had it!"
10009080-14 = "Aw, you guys! I just really wanted to figure out some way to help people out today!"
10009080-15 = "It's an important reminder for us to consider all aspects of aid, so we can reach the most people."
10009080-16 = "Serina, Hanae... Thank you both. Without you, I would never have experienced this moment of true remediation."
10009080-17 = "O-Of course! It's really nothing. We were going to be out volunteering anyway, so why not do our best to spread some joy?"
10009080-18 = "And chocolate is delicious at any time of year!"
10009080-20 = "Oh, thank you... I will truly treasure these. I'll eat them slowly, one at a time, so I can remember this moment for years... Or, wait. Maybe I should save them to pass on as an heirloom..."
10009080-21 = "I could never possibly repay you, but... I have a bit of time to spare! I'll do some volunteer work in your honor!"
10009080-23 = "Um, it was nothing! Y-You really don't have to worry about repaying us, but that's a really nice thought!"
10009080-24 = "Thank you. May the spirit of remediation always be with you."
10009080-25 = "What to do? What to do? When I see everyone like this..."
10009080-29 = "I feel so happy my heart might explode!"
10009080-35 = "Aaaah! An explosion?!"
10009080-36 = "Oh no! It's all my fault! Because I said my heart would explode!"
10009080-37 = "I don't think that's true."
10009080-39 = "This just in! Moments ago, a vehicle escorting a criminal to the Corrections Bureau exploded!"
10009080-40 = "It seems that local gangs have seen an opportunity to cause trouble!"
10009080-42 = "Dunno what's happening, but it sure seems like fun."
10009080-43 = "Yeah, yeah! And it's bound to keep the Valkyrie dogs busy!"
10009080-44 = "Heh heh heh. It's a holiday, isn't it? So let's party!"
10009080-45 = "Call everyone, and tell 'em it's time to have some fun."
10009080-50 = "W-What's happening?"
10009080-51 = "Augh... Wounded people, crying out in pain... Thugs appearing from all sides... A minute ago, I was in heaven, but now..."
10009080-52 = "Is this... Is this hell?!"
10009080-53 = "H-Help! Anyone, help!"
10009080-55 = "O-Oh no! This seems like big trouble!"
10009080-56 = "What do we do? What do we do?"
10009080-57 = "Don't forget our purpose, Hanae! Start with checking with bystanders and helping them to safety!"
10009080-58 = "Exactly right, Serina."
10009080-59 = "C-Captain?"
10009080-60 = "Our purpose is to aid. To aid is to improve the lives of people far and wide."
10009080-61 = "So, then, if one's path has diverged from that of righteousness... Isn't correcting that path by whatever means necessary also a form of aid?"
10009080-62 = "I believe it must be! I shall deliver aid to these thugs!"
10009080-63 = "Captain?!"
10009080-64 = "This is my purpose! Let all who need a remedy receive it!"

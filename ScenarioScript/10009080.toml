[translation]
10009080-1 = "後日談其一;情人節快樂……？"
10009080-3 = "各位好，我們是救護騎士團。#n今天是情人節，所以我們正在發送巧克力給大家。"
10009080-4 = "不介意的話請收下吧！#n情人節快樂～！"
10009080-5 = "這就是情人節巧克力……#n其實我從來沒收到過……"
10009080-6 = "謝謝！#n救護騎士團的各位，平時也辛苦了。"
10009080-8 = "呵呵。我們認為將幸福傳遞給追求愛情的人，也是一種「救護」的形式。"
10009080-9 = "而且，能看見大家的笑容，我也覺得很開心。"
10009080-13 = "呵呵，多虧花繪醬提出了這麼棒的點子呢。"
10009080-14 = "某種意義上，這或許也是「真正的救護」呢……！"
10009080-15 = "確實……#n「救護」的本質是將恩惠賜與他人──"
10009080-16 = "芹奈、花繪，謝謝你們。#n又讓我上了一課。"
10009080-17 = "別這麼說……！#n我和花繪只是想和大家一起同樂而已……"
10009080-18 = "而且巧克力就是要大家一起吃才會好吃嘛！"
10009080-20 = "謝謝你們……我會珍惜的。#n不，是不是該當成傳家之寶……"
10009080-21 = "我總是一味受到救護騎士團的幫助……#n對了，有沒有什麼我能幫忙的？"
10009080-23 = "啊，感謝您的心意……！#n不過，沒關係的唷。"
10009080-24 = "謝謝您。#n希望大家都能與「救護的精神」同在。"
10009080-25 = "居然能讓大家這麼開心……"
10009080-29 = "我高興得心臟好像要爆炸一樣！"
10009080-35 = "呀啊啊啊！爆炸！？"
10009080-36 = "是，是因為我嗎！？#n因為我說心臟要爆炸了嗎！？"
10009080-37 = "我想應該不是那樣……！"
10009080-39 = "緊急速報！#n就在剛才，正前往矯正局的女武神的車輛爆炸了！"
10009080-40 = "同時還收到了大量的問題學生集團正四處作亂的消息！"
10009080-42 = "那裡好像發生爆炸了呢？"
10009080-43 = "就是說啊。#n女武神的「麻雀」們好像都忙著處理那邊的事。"
10009080-44 = "要作亂就趁現在的意思對吧！#n很好，今天就是慶典啦！盡情上吧！"
10009080-45 = "好耶！既然如此就得盡情享樂才行！#n喂！大家集合！"
10009080-50 = "這，這是怎麼回事……！？"
10009080-51 = "不只有爆炸……連問題學生都出來了……！？"
10009080-52 = "啊……還以為今天很和平的說，怎麼會這樣！"
10009080-53 = "女武神還沒來嗎！？#n誰，誰來幫幫忙！"
10009080-55 = "總，總覺得好像出大事了……！"
10009080-56 = "該怎麼做呢，前輩！？"
10009080-57 = "先深呼吸，花繪醬。#n我們得先冷靜下來才行……#n去看看四周有沒有傷患吧……！"
10009080-58 = "說的沒錯，芹奈。"
10009080-59 = "團長……？"
10009080-60 = "所謂的「救護」就是賜與人們恩惠。"
10009080-61 = "因此，導正即將誤入歧途，或是已經偏離正軌的人們。#n也能算是一種救護的形式吧。"
10009080-62 = "我將前去對他們進行「救護」。#n芹奈、花繪，傷患的治療就拜託你們了。"
10009080-63 = "請，請等──"
10009080-64 = "要上了！「哪裡要救護，我就在哪裡」！"

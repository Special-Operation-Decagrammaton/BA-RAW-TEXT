10009080-12 = "3;미네;03\n5;하나에;01\n1;세리나;01\n#1;a\n#5;a\n#5;h\n#1;h\n#3;h\n#wait;1000"
10009080-13 = "3;미네;03\n1;세리나;01;아하하…… 하나에 쨩이 생각해낸 멋진 아이디어였지요.\n#1;em;[///]"
10009080-14 = "3;미네;03\n5;하나에;02;어떤 의미에서 이것이야말로 발렌타인 데이에 구호기사단이 베풀 수 있는 '구호'인지도 몰라요!"
10009080-15 = "5;하나에;02\n1;세리나;01\n3;미네;01;확실히, '구호'란 보다 널리 사람을 이롭게 하기 위한 것.\n#3;greeting"
10009080-16 = "5;하나에;02\n1;세리나;01\n3;미네;03;감사드립니다. 세리나, 하나에. 이 영광스러운 순간에 저를 깨우쳐 주시다니.\n#3;em;[반응]"
10009080-17 = "3;미네;03\n1;세리나;01;처, 천만에요! 저는 그저, 이왕 하는 봉사활동이라면 최선을 다해서, 즐겁게 하자는 마음에……\n#1;hophop"
10009080-18 = "1;세리나;01\n3;미네;03\n5;하나에;03;그리고 초콜릿은 뭘 해도 맛있으니까요!\n#5;em;[음표]\n#1;dl\n#3;dl\n#5;m3"
10009080-19 = "#all;hide"
10009080-20 = "5;발렌시민 4;00\n1;발렌시민 3;00;감사합니다, 감사합니다…… 아껴서 잘 먹을게요. 아니, 가보로 보관해 둘까요?\n#1;a\n#1;em;[재잘]\n#5;a"
10009080-21 = "5;발렌시민 4;00;오히려 내가 뭘 해 주고 싶은데…… 그렇구만. 잠시 시간이 남으니 나도 자원봉사를 하도록 하겠어."
10009080-22 = "#all;hide"
10009080-23 = "3;세리나;02;그, 그렇게까지는 하지 않으셔도 되는데…… 고맙습니다.\n#3;em;[반응]\n#3;a"

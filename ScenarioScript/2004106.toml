[translation]
2004106-1 = "祕密的場所"
2004106-3 = "（走在街上，回想著跟莉央的通話內容）"
2004106-5 = "先前也說過，我有好幾個祕密基地。"
2004106-6 = "這次我想邀請老師到其中一個基地來。"
2004106-7 = "……從某個角度來看，可以說是我們兩人共享的祕密場所。"
2004106-8 = "不必有安全方面的疑慮，這一點我可以向你保證。"
2004106-9 = "但是……沒錯。#n萬一這個場所被其他人發現……"
2004106-10 = "就只能認為是老師向別人透露了這個場所對吧？"
2004106-11 = "呵呵。到時候我會請求適當的賠償。"
2004106-12 = "雖然我相信老師的為人就是了。"
2004106-13 = "[s]「既然如此，希望你可以多相信老師一點……」"
2004106-14 = "嗯，我知道。"
2004106-15 = "那麼，我會拭目以待。"
2004106-17 = "（打電話給莉央提過的臨時電話號碼）"
2004106-22 = "老，老師！？你怎麼會在這個時候打電話來……？"
2004106-23 = "咦？時間竟然已經這麼晚了！？#n是，是因為我整天都把窗簾拉上的關係嗎……！"
2004106-24 = "糟，糟糕，這下該怎麼辦……？"
2004106-25 = "[s]「莉央，怎麼了？發生什麼事了嗎！？」"
2004106-26 = "沒，沒有！什麼事也沒發生！只是……！"
2004106-34 = "（擔心莉央出了什麼事，因此加快了腳步！）"
2004106-43 = "[ns]「莉央！」"
2004106-45 = "老，老師！？你怎麼來得這麼快……"
2004106-46 = "不，等等。#n你其實只是準時抵達而已……"
2004106-47 = "[ns1]「哎呀……」\n[ns2]「看到你的房間之後，我總算能理解莉央剛才的反應了……」"
2004106-50 = "唔……"
2004106-51 = "[ns]「我看看～這是便利商店的便當盒～」"
2004106-52 = "嗯……"
2004106-53 = "沒，沒錯。#n還有飲料的塑膠瓶，那邊是空的水瓶……"
2004106-59 = "不對！那邊不是垃圾！#n那些是實驗裝置和試劑！放在旁邊的則是工具！"
2004106-60 = "……"
2004106-61 = "抱歉，老師……真的很對不起……"
2004106-62 = "我以為自己……有辦法好好收拾……"
2004106-63 = "[s]「之前是誰清理的……？」"
2004106-64 = "之，之前……都是季在幫我收拾……"
2004106-65 = "[s]「這樣也很正常，我能理解。」"
2004106-66 = "本，本來這種事就要慢慢學？"
2004106-67 = "而且老師也很少聽別人說你很會收拾……？"
2004106-68 = "原來如此……"
2004106-73 = "你，你這麼突然要去哪裡！？"
2004106-74 = "[s]「我先去買一綑50L的垃圾袋。」"
2004106-75 = "我，我知道了……"
2004106-81 = "真的清理得差不多了耶……？"
2004106-82 = "咦？你說連一半都還不到？#n清理的概念是這樣的嗎？"
2004106-83 = "……"
2004106-84 = "有什麼我能幫忙的嗎？"
2004106-85 = "你說沒關係，要我躺在床上休息？#n但是那樣實在有點……"
2004106-86 = "我，我知道了，既然你都這樣拜託我了……"
2004106-89 = "― [log=리오]我並不是為了讓你做這種事，[/log][wa:3600] "
2004106-90 = "― [log=리오]才請你過來的……[/log][wa:2110] "
2004106-93 = "― [log=리오]我自己來就行了。老師你請坐吧。[/log][wa:1660] "
2004106-96 = "― [log=리오]你，你應該更有身為老師的自覺才對。[/log][wa:3490] "
2004106-98 = "― [log=리오]為了這種事浪費時間是不合理的。[/log][wa:2120] "
2004106-101 = "― [log=리오]你還有其他更重要的工作吧？ [/log][wa:600] "
2004106-104 = "[ns3]「管理學生的生活也是重要的工作。」\n[ns4]「現在照顧莉央就是我最重要的工作。」"
2004106-107 = "― [log=리오]……！你，你在說什麼……[/log][wa:2260] "
2004106-109 = "― [log=리오]「照顧」我……！？[/log][wa:1380] "
2004106-112 = "― [log=리오]我……我不太能理解……不過……[/log][wa:3650] "
2004106-114 = "― [log=리오]……你，就是這樣的人呢。[/log][wa:2530] "
2004106-117 = "― [log=리오]……知道了。[/log][wa:2200] "
2004106-119 = "― [log=리오]我就接受到最後吧。[/log]"
2004106-122 = "― [log=리오]接受你……所謂的「照顧」。[/log][wa:2010] "
2004106-128 = "我明白了。#n這就是……名為「打掃」的概念嗎。"
2004106-129 = "嗯？這跟「真正的」相比不算什麼……？"
2004106-130 = "重點是垃圾袋堆太多了？#n可是那種東西，不是只要扔到指定的地方就……"
2004106-131 = "……不，仔細想想，季確實也把東西都處理掉了。"
2004106-132 = "連老師也能做到這種程度……"
2004106-133 = "……"
2004106-134 = "只要下定決心，任何人都能達到這個水準嗎？"
2004106-135 = "[s5]「這，這個嘛……」\n[s6]（我這次其實做得挺認真的……）"
2004106-138 = "我，我又說錯話了嗎……！？"
2004106-139 = "你說沒有？但是……嗯？#n沒什麼問題？這又是什麼意思……？"
2004106-148 = "為，為什麼要突然摸我的頭！？"
2004106-149 = "……"
2004106-150 = "不過感覺還不錯……就維持這樣一會吧……"
2004106-153 = "[ns]「那我們去吃點東西吧。」"
2004106-154 = "唔，唔嗯？雖然已經到了用餐時間，但我並不是很餓……"
2004106-155 = "啊，是老師你餓了吧。#n這也難怪，畢竟老師替我打掃了整個祕密基地……"
2004106-156 = "對不起，老師。再次向你道歉。"
2004106-157 = "但是……如果隨便出去的話，會不會被人發現？"
2004106-158 = "[s7]「這裡離千年非常遠，又是舊市區。」\n[s8]「所以一定不會有問題的。」"
2004106-161 = "我，我知道了。"
2004106-162 = "那個，今天各方面都非，非常謝謝你。"
2004106-163 = "那麼──"
2004106-167 = "呀啊！？"
2004106-172 = "（莉央不小心被堆得頗高的垃圾袋絆倒了！）"
2004106-173 = "[ns]「哇？莉央，你沒事吧！？」"
2004106-177 = "我，我沒事。#n謝謝你抓住我……"
2004106-178 = "[s]「那就好，能站得起來嗎？」"
2004106-179 = "這倒沒問題。沒，問題……"
2004106-180 = "……"
2004106-181 = "那個，老師？"
2004106-182 = "一下下，哪怕只有一下下就好……"
2004106-187 = "可以保持這樣嗎……？"
2004106-188 = "[s]「嗯？可以是可以，怎麼了嗎？」"
2004106-189 = "嗯……謝謝你，老師。"
2004106-193 = "我真的……非常感謝你。"
2004106-195 = "（跟神色看起來比平常更加猶豫的莉央一起……）"
2004106-196 = "（在共進晚餐後回到了夏萊）"

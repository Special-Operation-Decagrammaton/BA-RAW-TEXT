[translation]
2004106-1 = "A Secret Place"
2004106-3 = "As I walked, I thought about my call with Rio."
2004106-5 = "As I mentioned before, I have multiple hideouts."
2004106-6 = "Consider yourself invited to one of them."
2004106-7 = "It can be our shared secret place, in a sense."
2004106-8 = "There are no security concerns. I can guarantee that."
2004106-9 = "However, if someone does find the place..."
2004106-10 = "...then I'll know, no one else but you could have told anyone."
2004106-11 = "Fufu. If that happens, I'll need proper compensation."
2004106-12 = "Not that I'm expecting it to happen, of course. I trust you."
2004106-13 = "[s] \"A little MORE trust than that would be nice...\""
2004106-14 = "Duly noted."
2004106-15 = "I'll look forward to seeing you."
2004106-17 = "I called Rio's burner phone."
2004106-22 = "S-Sensei?! Why are you calling me now...?"
2004106-23 = "Huh? It's WHAT time?! I've had the curtains closed all day. I must have lost track...!"
2004106-24 = "O-Oh my. What should I do...?"
2004106-25 = "[s] \"What's wrong, Rio? Did something happen?!\""
2004106-26 = "N-Nothing! Nothing's happening! But...!"
2004106-34 = "Thinking Rio was in trouble, I hurried to her."
2004106-43 = "[ns] \"Rio!\""
2004106-45 = "S-Sensei?! Why are you so early...?"
2004106-46 = "N-No, you're on time, actually, but..."
2004106-47 = "[ns1] \"My goodness...\"\n[ns2] \"Looking at the room, I see why you were so worried...\""
2004106-50 = "U-Ugh..."
2004106-51 = "[ns] \"Let's see... That's a convenience store bento box...\""
2004106-52 = "T-True, yes..."
2004106-53 = "Mm-hmm. There's a juice bottle, an empty water bottle..."
2004106-59 = "...and no, it's not trash! It's equipment and reagents for an experiment! And those over there are tools!"
2004106-60 = "..."
2004106-61 = "Sorry, Sensei... I'm really sorry..."
2004106-62 = "I thought I could...clean it all up on my own..."
2004106-63 = "[s] \"Who cleaned for you before...?\""
2004106-64 = "T-Toki did, back then."
2004106-65 = "[s] \"I see. Well, that makes sense.\""
2004106-66 = "Th-There's a lot to learn about living on your own! Am I supposed to learn it all at once?!"
2004106-67 = "And Sensei, you're not always great at cleaning either, you know!"
2004106-68 = "But..."
2004106-73 = "W-Wait, where are you going all of a sudden?!"
2004106-74 = "[s] \"We're going to need some 50L trash bags.\""
2004106-75 = "A-All right..."
2004106-81 = "The place...actually does look a whole lot cleaner now."
2004106-82 = "What? We're not even halfway done? Do I have the wrong definition of \"clean\"?"
2004106-83 = "..."
2004106-84 = "Is there anything I can help with?"
2004106-85 = "You're telling me it's fine, so I should go rest for a bit? But..."
2004106-86 = "F-Fine. If you insist..."
2004106-89 = "― [log=리오]This wasn't the reason[/log][wa:3240] "
2004106-90 = "― [log=리오]I called you...[/log][wa:1830] "
2004106-93 = "― [log=리오]I'll do it myself. You should sit down.[/log][wa:700] "
2004106-96 = "― [log=리오]S-Sensei, you really ought to be more aware of your position.[/log][wa:1730] "
2004106-98 = "― [log=리오]It's irrational to waste time on this.[/log][wa:1200] "
2004106-101 = "― [log=리오]Aren't there many more important things for you to do?[/log][wa:10] "
2004106-104 = "[ns3] \"Taking care of my students is also important.\"\n[ns4] \"Right now, my most important job is taking care of you.\""
2004106-107 = "― [log=리오]Wh-What are you...saying...?[/log][wa:1620] "
2004106-109 = "― [log=리오]Taking care of me...?![/log][wa:860] "
2004106-112 = "― [log=리오]I... I don't understand. That's...[/log][wa:2890] "
2004106-114 = "― [log=리오]Well...you've always been that kind of person.[/log][wa:1170] "
2004106-117 = "― [log=리오]...Okay.[/log][wa:2120] "
2004106-119 = "― [log=리오]I'll accept it all, then.[/log]"
2004106-122 = "― [log=리오]Your...\"taking care,\" I mean.[/log][wa:1370] "
2004106-128 = "I get it now. So this is...what \"cleaning\" really means."
2004106-129 = "What? It's still not \"really clean\"? Is that so...?"
2004106-130 = "Because there's a pile of trash bags over there? We can just pick a spot and dump those, right?"
2004106-131 = "...No. Now that I think about it, Toki always threw them out properly."
2004106-132 = "And you've done this much already..."
2004106-133 = "..."
2004106-134 = "...which means anyone can do it if they put their mind to it."
2004106-135 = "[s5] \"Um... That's...\"\n[s6] \"(I'm not sure how to take that...)\""
2004106-138 = "D-Did I say something wrong again...?!"
2004106-139 = "No, I didn't? But... Huh? It's fine? What's even happening anymore...?"
2004106-148 = "Wh-Why are you suddenly patting my head?!"
2004106-149 = "..."
2004106-150 = "Well, it doesn't feel bad...so we can keep doing it..."
2004106-153 = "[ns] \"We should both get something to eat.\""
2004106-154 = "H-Huh? Well, it's about time, but I'm not that hungry..."
2004106-155 = "Oh, but you must be, after all that hard work...that you did for me."
2004106-156 = "Once again, I apologize, Sensei."
2004106-157 = "But if I go outside, what if I get spotted?"
2004106-158 = "[s7] \"We're in an old neighborhood, far away from Millennium.\"\n[s8] \"I'm sure we'd be fine.\""
2004106-161 = "O-Okay."
2004106-162 = "Um, thank you for...for everything today."
2004106-163 = "So—"
2004106-167 = "Kyah!"
2004106-172 = "Rio tripped over the pile of trash bags."
2004106-173 = "[ns] \"Whoa, Rio, you okay?!\""
2004106-177 = "Y-Yes, I'm fine. Thank you for asking..."
2004106-178 = "[s] \"Sure, yeah. Can you get up?\""
2004106-179 = "I can get up, no problem. No problem, but..."
2004106-180 = "..."
2004106-181 = "...Um, Sensei?"
2004106-182 = "For a moment, just a moment..."
2004106-187 = "...can we stay like this...?"
2004106-188 = "[s] \"Hm? We can, but why?\""
2004106-189 = "...Thank you, Sensei."
2004106-193 = "Thank you...truly."
2004106-195 = "Together with Rio, who was looking a little more hesitant than usual..."
2004106-196 = "...I had my dinner, then returned to Schale."

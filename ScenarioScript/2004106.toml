[translation]
2004106-1 = "สถานที่ลับ"
2004106-3 = "(ในขณะที่เดินไปตามถนน คุณครูก็คิดถึงเรื่องที่คุยกับริโอะ)"
2004106-5 = "อย่างที่ฉันบอกไปว่าฉันมีที่ซ่อนตัวหลายแห่ง"
2004106-6 = "แล้วฉันก็จะเชิญครูไปในหนึ่งที่นั้น"
2004106-7 = "จะว่าไป... จะเรียกว่าเป็นสถานที่ลับที่มีแต่เรารู้กันสองคนก็ได้"
2004106-8 = "ที่นี่ไม่มีปัญหาเรื่องความปลอดภัยหรอก ฉันยืนยันได้เลย"
2004106-9 = "แต่ว่า... นั่นสินะ ถ้าเกิดสถานที่นี้ถูกเปิดเผยขึ้นมา"
2004106-10 = "งั้นก็หมายความว่าครูไปบอกตำแหน่งของสถานที่นี้กับคนอื่น ว่ามั้ยล่ะ?"
2004106-11 = "ฮุฮุ ตอนนั้นฉันจะขอค่าชดเชยให้สมน้ำสมเนื้อเลยละ"
2004106-12 = "ฉันเชื่อใจครูนะ"
2004106-13 = "[s] \"งั้นก็ช่วยเชื่ออีกนิดหนึ่งแล้วกัน...\""
2004106-14 = "อืม เข้าใจแล้ว"
2004106-15 = "ก็ได้ แล้วฉันจะรอนะ"
2004106-17 = "(คุณครูโทรไปหาเบอร์ชั่วคราวที่ริโอะให้มา)"
2004106-22 = "คะ... ครู?! ทำไมถึงมาตอนนี้...?"
2004106-23 = "หืม? เวลาผ่านไปป่านนี้แล้วเหรอเนี่ย?! ระ... หรือเพราะฉันปิดม่านไว้ทั้งวันนะ...!"
2004106-24 = "ยะ... แย่แล้วละ ฉันควรทำยังไงดี...?"
2004106-25 = "[s] \"เป็นอะไรไปน่ะ ริโอะ? เกิดเรื่องอะไรเหรอ?!\""
2004106-26 = "มะ... ไม่หรอก! ไม่มีอะไรเลย! แต่ว่า...!"
2004106-34 = "(คุณครูเร่งฝีเท้าเพราะคิดว่าเกิดเรื่องอะไรกับริโอะ)"
2004106-43 = "[ns] \"ริโอะ!\""
2004106-45 = "คะ... ครู?! ทำไมมาถึงเร็วแบบนี้..."
2004106-46 = "มะ... ไม่สิ ก็มาตรงเวลาอยู่ แต่ว่า..."
2004106-47 = "[ns1] \"โอ้โห ดูของในห้องสิ...\"\n[ns2] \"เห็นห้องแล้วก็รู้เลยนะว่าทำไมริโอะถึงเป็นแบบนี้...\""
2004106-50 = "อะ... อึก..."
2004106-51 = "[ns] \"ไหนดูซิ~ นี่มันกล่องข้าวจากร้านสะดวกซื้อ~\""
2004106-52 = "อะ... อื้อ..."
2004106-53 = "ชะ... ใช่แล้ว ส่วนนั่นก็ขวดเครื่องดื่ม ส่วนตรงโน้นก็ขวดน้ำเปล่าที่กินหมดแล้ว..."
2004106-59 = "แต่ไม่ใช่นะ! นั่นไม่ใช่ขยะหรอก! มันคือสารเคมีกับอุปกรณ์เอาไว้ทดลอง! ส่วนที่อยู่ข้างๆ กันก็เป็น#nพวกเครื่องมือช่างน่ะ!"
2004106-60 = "..."
2004106-61 = "ขอโทษนะ ครู... ฉันขอโทษจริงๆ..."
2004106-62 = "ฉัน... คิดว่าตัวเองเก็บกวาดไปแล้วน่ะ..."
2004106-63 = "[s] \"แล้วก่อนหน้านั้นใครเป็นคนเก็บกวาดให้...?\""
2004106-64 = "ตะ... ตอนนั้น... โทคิมาช่วยอยู่น่ะ..."
2004106-65 = "[s] \"ก็ไม่แปลกหรอกนะ ก็เข้าใจได้\""
2004106-66 = "ปะ... ปกติแล้วนี่เป็นเรื่องที่ต้องเรียนรู้เอาไว้งั้นเหรอ?"
2004106-67 = "แล้วเรื่องแบบนี้ครูก็เป็นเหมือนกันด้วย?"
2004106-68 = "อย่างนี้... สินะ..."
2004106-73 = "จะ... จู่ๆ จะไปไหนน่ะ? !"
2004106-74 = "[s] \"ครูจะไปซื้อถุงขยะขนาดใหญ่มาสักห่อก่อน\""
2004106-75 = "กะ... ก็ได้..."
2004106-81 = "เก็บกวาดของในห้องได้เยอะเลยแฮะ...?"
2004106-82 = "หืม? ยังเก็บไม่ถึงครึ่งเลยงั้นเหรอ? ปกติแล้วการเก็บกวาดมันก็แค่ประมาณนี้ไม่ใช่หรอกเหรอ?"
2004106-83 = "..."
2004106-84 = "มีอะไรที่ฉันพอช่วยได้บ้างมั้ย?"
2004106-85 = "อยากให้ช่วยไปนั่งพักบนเตียงทางโน้นมากกว่างั้นเหรอ? แต่แบบนั้นมัน..."
2004106-86 = "กะ... ก็ได้ ถ้าครูจะขอฉันอย่างนั้นละก็..."
2004106-89 = "― [log=리오]ฉันไม่ได้เรียกครูมา [/log][wa:3320] "
2004106-90 = "― [log=리오]ด้วยจุดประสงค์แบบนี้สักหน่อย...[/log][wa:1190] "
2004106-93 = "― [log=리오]ถ้าจะพูดถึงขนาดนั้น ให้ฉันเก็บกวาดเองก็ได้นะ[/log][wa:500] "
2004106-96 = "― [log=리오]คะ... ครูต้องตระหนักถึงตำแหน่งของตัวเองบ้างสิ[/log][wa:2370] "
2004106-98 = "― [log=리오]คุณน่ะ มีงานที่สำคัญกว่านี้ตั้งเยอะ[/log][wa:1320] "
2004106-101 = "― [log=리오]มาเสียเวลากับเรื่องแบบนี้ มันไม่สมเหตุสมผลเลยนะ[/log][wa:10] "
2004106-104 = "[ns3] \"ดูแลการใช้ชีวิตของนักเรียนก็เป็นเรื่องสำคัญนะ\"\n[ns4] \"ตอนนี้การดูแลริโอะเป็นเรื่องสำคัญที่สุดของครูนะ\""
2004106-107 = "― [log=리오]พะ... พูดอะไรแบบนั้น...[/log][wa:1820] "
2004106-109 = "― [log=리오]บอกว่า... ดูแลฉันงั้นเหรอ?![/log][wa:660] "
2004106-112 = "― [log=리오]มะ... ไม่เห็นจะเข้าใจเลย แต่ถึงจะไม่เข้าใจก็เถอะ...[/log][wa:2210] "
2004106-114 = "― [log=리오]แต่ก็นะ... ก็คุณเป็นคนแบบนี้อยู่ตลอดนี่นา[/log][wa:1370] "
2004106-117 = "― [log=리오]งั้นก็ได้...[/log][wa:1960] "
2004106-119 = "― [log=리오]งั้นฉันจะขอรับไว้ละนะ[/log]"
2004106-122 = "― [log=리오]'การดูแล'... จากคุณน่ะ[/log][wa:1650] "
2004106-128 = "ฉันเข้าใจแล้ว นี่สินะที่เรียกว่า... 'การทำความสะอาด'"
2004106-129 = "หืม? ถ้าเทียบกับคนที่ทำความสะอาด 'จริงๆ' นี่แค่เรื่องนิดหน่อยงั้นเหรอ? เป็นงั้น... หรอกเหรอ...?"
2004106-130 = "ก็เพราะเก็บกวาดจนได้ถุงขยะซ้อนกันเป็นพะเนินขนาดนั้น? แต่ถ้าเราเอาถุงขยะไปทิ้งในที่ที่เหมาะสม#nละก็..."
2004106-131 = "ไม่สิ... พอมาคิดดูแล้ว ที่ผ่านมาโทคิก็ช่วยทิ้งอย่างเป็นที่เป็นทางให้ทุกครั้งเลย"
2004106-132 = "แต่ถ้าครูก็ยังทำถึงขนาดนี้ละก็..."
2004106-133 = "..."
2004106-134 = "ปกติถ้าคนอื่นตั้งใจทำ ก็จะทำได้ขนาดนี้เลยเหรอ..."
2004106-135 = "[s5] \"เอ่อ... คือว่า...\"\n[s6] (ครั้งนี้ก็ถือว่าทำจริงจังอยู่นะ...)"
2004106-138 = "ฉะ... ฉันพูดอะไรผิดไปหรือเปล่าน่ะ...?!"
2004106-139 = "เปล่าเหรอ? แต่ก็... หืม? ไม่เป็นอะไรเลยงั้นเหรอ? หมายความว่าอะไรอีกเนี่ย...?"
2004106-148 = "ทะ... ทำไมจู่ๆ ถึงมาลูบหัวกันล่ะ?!"
2004106-149 = "..."
2004106-150 = "แต่มันก็ไม่เลวเลยนะ... งั้นฉันจะอยู่เฉยๆ แบบนี้แล้วกัน..."
2004106-153 = "[ns] \"งั้นเราก็มากินอะไรกันเถอะ\""
2004106-154 = "หะ... หืม? ก็นะ นี่ก็ได้เวลาอาหารแล้วด้วย แต่ฉันยังไม่หิวขนาดนั้น..."
2004106-155 = "อ๊ะ ครูหิวสินะ ก็นะ ก็ครูช่วยเก็บกวาดที่ซ่อนตัวให้ฉันจนสะอาดเลยนี่นา"
2004106-156 = "ขอโทษอีกครั้งนะ ครู "
2004106-157 = "แต่ว่า... ถ้าออกไปข้างนอกอย่างกะทันกัน ฉันจะไม่โดนจับได้เหรอ?"
2004106-158 = "[s7] \"ตรงนี้เป็นศูนย์กลางเมืองเก่าที่อยู่ห่างจากมิลเลเนียมนะ\"\n[s8] \"ไม่มีใครจับได้หรอก ที่นี่ไกลจากมิลเลเนียมตั้งเยอะ\""
2004106-161 = "กะ... ก็ได้"
2004106-162 = "คือว่า วันนี้ฉันตะ... ต้องขอบคุณในหลายๆ เรื่องเลยนะ"
2004106-163 = "ถ้างั้นก็..."
2004106-167 = "ว้าย?!"
2004106-172 = "(ริโอะสะดุดถุงขยะที่กองเป็นพะเนินจนล้มลง!)"
2004106-173 = "[ns] \"เฮือก? เป็นอะไรหรือเปล่า ริโอะ?!\""
2004106-177 = "อะ... อื้ม ฉันไม่เป็นไร ขอบคุณที่ช่วยจับไว้นะ..."
2004106-178 = "[s] \"อื้อ ยืนได้อยู่ใช่มั้ย?\""
2004106-179 = "อื้ม ไม่มีปัญหา ไม่มีปัญหาหรอก..."
2004106-180 = "..."
2004106-181 = "นี่ ครู?"
2004106-182 = "เดี๋ยวนะ เดี๋ยวก่อน..."
2004106-187 = "ฉันขออยู่แบบนี้อีกหน่อยได้มั้ย...?"
2004106-188 = "[s] \"หืม? ก็ได้หรอกนะ แต่ทำไมเหรอ?\""
2004106-189 = "มันเป็นอย่างนี้... สินะ... ขอบคุณนะ ครู"
2004106-193 = "ขอบคุณ... จริงๆ เลย"
2004106-195 = "(แล้วคุณครูก็กินข้าวเย็นกับริโอะที่ดูมีท่าทางลังเลใจเล็กน้อย)"
2004106-196 = "(จากนั้นก็กลับมายังชาเล่ต์...)"

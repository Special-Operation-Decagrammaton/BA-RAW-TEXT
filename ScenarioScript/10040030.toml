10040030-10 = "3;코유키;03;대박!! 대박!!! 이거 보세요, 선생님!! 이거!!\n#3;stiff\n#3;a"
10040030-11 = "3;코유키;03;와, 효과 진짜 말도 안 되는데요, 이거!! 니하하!! 이런 걸 내다니 게임 망했네, 아주! 니하하하! 아니면 한 철 장사!?\n#3;hophop\n#3;em;[재잘]"

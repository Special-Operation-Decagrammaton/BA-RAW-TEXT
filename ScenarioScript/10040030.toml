[translation]
10040030-1 = "Episode 3;Can't Stand Another Moment"
10040030-5 = "Oh...?"
10040030-6 = "Oh...! Hng! *GASP*"
10040030-7 = "[ns1] \"What is it, what is it?! Was it a good pull?\"\n[ns2] \"Hurry up and let me see it!\""
10040030-10 = "Wow! Amazing! Look at this, Sensei!"
10040030-11 = "Wow, WOW! The effect is just unbelievable! Nihaha! What are the devs thinking, putting out a card like this? The game is doomed! Nihahaha! It's got to just be a seasonal thing, or something, right?"
10040030-12 = "I knew calling you was the right move! You made me way luckier!"
10040030-13 = "...What? What do you have to do with it? Everything! Duh?!"
10040030-14 = "There's no way I would've pulled this on my own. I would've ended up with a bunch of useless fodder!"
10040030-15 = "That's obviously why I called you! So you could help me open them...fufufu..."
10040030-16 = "And I was totally right to do so! Use whatever I can, even if it's someone else's luck! Make the impossible, possible!"
10040030-17 = "I'll always find a way! Nihahaha!"
10040030-18 = "[s3] \"Am I a lucky charm to you, Koyuki?\"\n[s4] \"I'm glad you feel that way about me.\""
10040030-21 = "Heehee, duh! And I'm someone who always reciprocates a good deed!"
10040030-22 = "So...um...on that note..."
10040030-26 = "...Here, it's yours!"
10040030-27 = "[s5] \"...Huh? You're giving me this?\"\n[s6] \"Didn't you want it?\""
10040030-30 = "I mean, yeah, I'd be lying if I said I didn't want it..."
10040030-31 = "...but, even if they're not as good as this one, I have other cards! And I wouldn't have even gotten this card if it weren't for you being here."
10040030-32 = "So this one's yours, Sensei! But that means you have to help me out the next time I'm opening packs."
10040030-33 = "That card represents our loyalty and alliance! It's...a symbol of our bond!"
10040030-34 = "[s7] \"Koyuki...!\"\n[s8] \"There's some unexpectedly commendable sides to you...\""
10040030-37 = "Nihahaha! You've helped me out a ton, so I gotta score some points when I can too!"
10040030-41 = "...Huh? The alarm...?"
10040030-42 = "Why's the alarm going off...?"
10040030-43 = "[s9] \"Huh? ...Alarm?\"\n[s10] \"What alarm?\""
10040030-46 = "Ah, it's nothing really. I just set up a system to alert me whenever someone enters or exits the Seminar building."
10040030-47 = "These are the kind of safety precautions you need when you live in the Self-Reflection Room! Heehee."
10040030-48 = "Hm. But it is kind of a weird time for someone to be entering the building..."
10040030-49 = "Who could it be? Lemme check the cameras!"
10040030-50 = "Let's see..."
10040030-54 = "...Huh?"
10040030-55 = "Ack! Ack, ack, ack, ACK!"
10040030-56 = "[ns11] \"...Koyuki?\"\n[ns12] \"What's going on?\""
10040030-59 = "H-How...? Why...?"
10040030-60 = "...Why are the upperclassmen back?!"
10040030-61 = "[ns13] \"...? Yuuka and Noa?!\"\n[ns14] \"They didn't go home?!\""
10040030-64 = "Th-This was not in my plans! Wh-What is going on?! Whyyy?"
10040030-65 = "I-I need to hide these cards!"
10040030-66 = "...N-No! More importantly, what do I do about you?!"
10040030-67 = "[s15] \"Oh no. This is the end for us!\"\n[s16] \"I can't be caught here!\""
10040030-70 = "You're right... It's over for us!"
10040030-71 = "I can't come up with a single excuse...not one...single excuse!"
10040030-72 = "What's the solution? How do I survive this...?"
10040030-77 = "...The closet!"
10040030-78 = "Sensei! The closet is totally empty!"
10040030-79 = "You can hide in there! They probably just need to grab something or something like that!"
10040030-80 = "Just hide, and then escape when the timing is right!"
10040030-81 = "That's our only solution! Let's do that and hope for the best!"
10040030-82 = "...Huh?"
10040030-83 = "Is that okay? Yes, it's okay!"
10040030-84 = "This is basically my room at this point! So if I say it's fine, it's fine!"
10040030-85 = "Stop wasting time, and get in there! Hurry! They'll be here any second!"
10040030-89 = "If you want to live, hide!"
10040030-100 = "Um...huh?! Who is it?"
10040030-101 = "What're you doing back here, so soon?"
10040030-103 = "What's with that surprised look? Why're you so anxious right now?"
10040030-104 = "Yuuka said she was worried about you feeling lonely about having to bring in the new year alone."
10040030-105 = "You're still under punishment, so we can't let you out of the Self-Reflection Room or anything."
10040030-106 = "So we decided to have a pajama party with you, in here, instead."
10040030-107 = "You really do make us go above and beyond sometimes."
10040030-108 = "Here, change into these. It wouldn't be a proper pajama party without them."
10040030-112 = "Huh? What's that?"
10040030-116 = "...Clothes? ...Pajamas?"
10040030-117 = "Yes! An adorable pajama set, carefully and thoughtfully hand-selected by Yuuka herself."
10040030-118 = "N-Noa! I told you it was a casual thing! It was just—"
10040030-122 = "...Huh?"
10040030-123 = "Wait a second. What's with that look? You don't seem happy about this."
10040030-124 = "E-Ehhhhhh? Who said that?! That's not true! I'm thrilled! Ecstatic!"
10040030-125 = "B-But, just to make sure I understand, does that mean you two are gonna...sleep over? Here? In this room? Right now?"
10040030-126 = "It really seems like you don't want us here...when we went to all this effort."
10040030-128 = "It IS strange. You usually like it when we come visit..."
10040030-129 = "...Hmm."
10040030-133 = "...Huh?"
10040030-137 = "Ah... So that's what it is. Fufufu."
10040030-138 = "...Noa?"
10040030-139 = "...You'll see, Yuuka."
10040030-144 = "Koyuki, what are you hiding back there?"
10040030-145 = "...Huh, hmmm? Wh-What do you mean? Whatever could I be hiding in this sad, sad room I've been locked up in?"
10040030-146 = "My, my. Is that how you plan on playing it? You see, those boxes behind you... Those boxes are stacked differently from how they were this morning."
10040030-147 = "...Huh?"
10040030-148 = "H-How do you always remember weird stuff like that all the time?!"
10040030-153 = "What is it? What have you done this time?! Move right now, Koyuki! Move!"
10040030-154 = "Ah, no! Please, just give me this...! This is a problem for next year! Not this year!! This year isn't over yet!"
10040030-155 = "What are you talking about...?!"
10040030-162 = "...What's this?"
10040030-163 = "This is...a pile of cards?"
10040030-164 = "W-Well, the thing is..."
10040030-166 = "...Aha. This is what's been going on."
10040030-167 = "I...I can't believe you!"
10040030-173 = "KO! YU! KIII!!"
10040030-184 = "KYAAAH! Ah, ahhh! AHH!"
10040030-188 = "YUUKA, NOOO! Please! You have no idea how much that card is worth!"
10040030-194 = "Gah, Yuuka! Please! Yuuka, I'm begging you! Ah! PLEASE!!!"
10040030-195 = "Seriously?! You haven't matured even ONE TINY BIT?!"
10040030-201 = "Ah, ah! Aaauuuggghhh! AUGH!"
10040030-202 = "Kyaaah! Time for an emergency exit!"
10040030-209 = "Where do you think you're going?! Get back here, Koyuki!"
10040030-213 = "Noa, help!"
10040030-214 = "She even took the pajamas!"
10040030-218 = "Fufu. So this is how we're celebrating New Year's Eve."
10040030-219 = "...I really do enjoy how unpredictable things get around here."
10040030-226 = "[ns] \"...Koyuki.\""
10040030-228 = "[ns17] \"...I'll never forget you.\"\n[ns18] Take a brief moment of silence."
10040030-232 = "[ns] \"In any case, I better take this moment to escape myself...\""
10040030-235 = "[ns19] \"...Huh? The door is locked?\"\n[ns20] \"The other door too? All the exit doors are locked?\""
10040030-241 = "...I think I get the situation here."
10040030-242 = "I wanted to peek in on the Seminar staff while they enjoyed their pajama party. I didn't expect to get to see you as well."
10040030-246 = "...What a pleasant surprise."
10040030-247 = "[s21] \"Huh...? Kotama?!\"\n[s22] \"How did you know I was here?\""
10040030-250 = "I was eavesdrop— Ahem. I was assessing the efficacy of Veritas' technology."
10040030-251 = "That was when I happened upon you locked inside the Self-Reflection Room."
10040030-252 = "Since it was created to confine problematic students, the locks there are automatic and only accessible from the outside."
10040030-253 = "It's a given that Koyuki has figured out a way to come and go as she pleases, but the ordinary person will find themselves locked in there until Seminar sees fit."
10040030-254 = "...But you need not worry."
10040030-255 = "We'll guide you through the optimal escape route to safety."
10040030-256 = "[s] \"...We? Who else is with you?\""
10040030-257 = "Hare is here."
10040030-258 = "With assistance from this prodigy hacker, recognized even by the vice president of Veritas, you'll be able to discreetly escape without triggering Millennium's security system."
10040030-259 = "Hold up, Kotama. We really should try to stay out of any more trouble today..."
10040030-261 = "[ns23] \"...You're still installing eavesdropping devices?\" \n[ns24] \"Kotama, I can't keep ignoring your behavior...\""
10040030-264 = "...It appears that you have yet to submit Schale's year-end financial report."
10040030-265 = "Of course, it's of no consequence to me, but imagine if Seminar's accountant found out that you've been playing around in the Self-Reflection Room this whole time..."
10040030-266 = "I would say that you'll have quite the troublesome start to the new year."
10040030-270 = "[ns] \"...What do you want?\""
10040030-271 = "Ten different recordings of you saying a morning greeting."
10040030-272 = "I'll prepare the script, so you will only need to let us record you reading them."
10040030-273 = "Under these conditions, I'm sure that Hare will also be willing to cooperate."
10040030-274 = "Hearing Sensei's voice greet me good morning...sure doesn't sound bad..."
10040030-276 = "[ns25] \"Is this really my only option...?\"\n[ns26] \"...You're going to get a serious lecture once I'm out of here.\""
10040030-279 = "I'll take that as an agreement."
10040030-280 = "Hare, please lift the access restrictions to the Self-Reflection Room."
10040030-281 = "Is this really okay...?"
10040030-290 = "Well, I unlocked it."
10040030-291 = "You're free to leave, but be careful in the halls. Koyuki's escape triggered a bunch of additional security measures."
10040030-292 = "And if you happen to run into a student...I can hardly hack their memories."
10040030-293 = "To start, please move down the hallway to the lounge, where we are. I'll be able to let you know if anyone's coming your way."
10040030-294 = "I am perfectly aware of every single soundwave reverberating around you, Sensei. Heehee..."
10040030-295 = "[s27] \"Just how many listening devices do you have installed here...?\"\n[s28] \"I'm serious about that lecture once I'm out of here!\""
10040030-298 = "If I get to hear you yell at me directly, in person, that may work out for me..."
10040030-299 = "...Maybe I should add some angry lines to the morning greeting recordings."
10040030-300 = "We don't have time for chit-chat, Sensei. Some students are walking towards the Self-Reflection Room right now."
10040030-301 = "Hurry!"

[translation]
10040030-1 = "第3話;忍不住了"
10040030-5 = "嗯……？"
10040030-6 = "哦……！啊！這是……！！"
10040030-7 = "[ns1]「什麼什麼！？中了嗎？」\n[ns2]「你別光顧著驚訝，快點給我看！」"
10040030-10 = "我的天啊！！！#n老師老師，你快看這張！！這張！！"
10040030-11 = "哇，這效果也太誇張了吧！！竟然敢出這種卡牌，我看這遊戲要完蛋了吧！#n尼哈哈！難道是打算趁現在紅的時候大撈一筆嗎！？"
10040030-12 = "肯定是因為有找老師過來，幸運女神才會眷顧我！！！"
10040030-13 = "……嗯？這兩件事有什麼關係？這還用問嗎！？"
10040030-14 = "如果只有我一個人拆的話，肯定拆不到這麼好的卡牌！#n八成只會拆到一大堆爛卡而已！"
10040030-15 = "所以我才會找老師來陪我一起拆……呵呵……"
10040030-16 = "這麼做果然是正確的！#n能用的東西就算是別人的運氣也要用！這樣一來就沒有不可能了！"
10040030-17 = "生命總會找到出路！！尼哈哈哈哈哈！！"
10040030-18 = "[s3]「原來我對小雪來說算是幸運物嗎？」\n[s4]「沒想到你竟然是這麼想的，莫名覺得有點開心。」"
10040030-21 = "唉唷，那當然囉！#n在這方面的事情上，我可是很懂得知恩圖報的喔！"
10040030-22 = "所以……唔嗯……"
10040030-26 = "……來，給你！"
10040030-27 = "[s5]「……嗯？你要把它送給我？」\n[s6]「你不是要自己留著用的嗎？」"
10040030-30 = "雖然我不會說自己完全不會捨不得……"
10040030-31 = "但雖然比不上這張，我還有其他卡牌可以用。#n而且如果老師沒來陪我，我也根本不可能抽的到……"
10040030-32 = "所以這張就送你吧！#n不過你下次還要再陪我一起拆卡包哦！！"
10040030-33 = "今後這張卡牌就是我們兩人的堅固盟約……也是團結的象徵！！"
10040030-34 = "[s7]「小雪……！」\n[s8]「沒想到你在這方面竟然這麼體貼……」"
10040030-37 = "尼哈哈哈……畢竟我也受了老師很多照顧，這種時候當然得好好表現一下……"
10040030-41 = "……嗯？有通知……？"
10040030-42 = "這個時間怎麼會有通知……"
10040030-43 = "[s9]「嗯……通知？」\n[s10]「是什麼通知？」"
10040030-46 = "啊，其實也沒什麼啦。#n只是有人進出研討會大樓時的通知而已。"
10040030-47 = "身為反省室的常客，這種程度的安全保障可不能少啊，呵呵。"
10040030-48 = "唔嗯……不過還真奇怪，這個時間應該沒有人會來研討會大樓才對啊。"
10040030-49 = "到底會是誰呢……用監視器確認一下吧！"
10040030-50 = "嘿咻。"
10040030-54 = "……嗯？"
10040030-55 = "咦……？#n咦，咦咦咦咦……！？！？！？"
10040030-56 = "[ns11]「……小雪？」\n[ns12]「怎麼了，發生什麼事了？」"
10040030-59 = "為，為……為什麼……"
10040030-60 = "……為什麼前輩們會過來！？！？"
10040030-61 = "[ns13]「……前輩！？你是說優香和乃愛嗎！？」\n[ns14]「他們不是回去了嗎！？」"
10040030-64 = "我，我完全沒預料到會出現這種情況！#n怎，怎麼會呢！？為什麼！？到底是因為什麼原因……！？"
10040030-65 = "總，總之得快點把卡牌藏起來……！！"
10040030-66 = "不……啊，對了！！#n老，老師！！你快去攔住他們吧……！！"
10040030-67 = "[s15]「這怎麼行！！這個方法絕對行不通的！」\n[s16]「我本來就不應該出現在這裡！！」"
10040030-70 = "果然是這樣嗎……#n一旦老師被前輩們發現，我們兩個就都完蛋了……"
10040030-71 = "得想個藉口才行……但這種情況要怎麼找藉口？#n不行，這樣絕對行不通的。"
10040030-72 = "其他辦法……能讓我們活下來的辦法……"
10040030-77 = "衣櫃……？"
10040030-78 = "老師！衣櫃！就是衣櫃！這裡的衣櫃剛好是空的！"
10040030-79 = "你先躲進這裡面吧！#n他們可能只是來拿個東西而已……"
10040030-80 = "所以只要先躲起來，之後再趁前輩們不在的時候逃走就行了！"
10040030-81 = "沒錯，現在只有這個辦法了！我們的眼光要看向未來！"
10040030-82 = "……什麼？"
10040030-83 = "你問這樣好嗎？#n啊，別擔心別擔心！！"
10040030-84 = "我基本上就跟這間反省室的主人沒兩樣，所以我說沒問題就是沒問題！！"
10040030-85 = "別再拖拖拉拉的了，趕快躲起來！#n動作快！沒時間了！！"
10040030-89 = "要是想活下去的話，就趕緊躲起來吧！！！"
10040030-100 = "咦，咦！？#n真是稀客……！"
10040030-101 = "前，前輩們……怎麼又回來了……？"
10040030-103 = "……嗯？你那是什麼反應。#n為什麼要那麼驚訝？"
10040030-104 = "是優香醬怕小雪醬一個人跨年會覺得很孤單……"
10040030-105 = "不過待在反省室反省畢竟是你受到的懲罰，也不能就這樣放你出去……"
10040030-106 = "但一起舉辦睡衣派對倒是可以。"
10040030-107 = "真是個愛讓人操心的後輩。"
10040030-108 = "來，換上這套衣服吧。#n穿成那樣可不能參加睡衣派對。"
10040030-112 = "呃，這……是什麼？"
10040030-116 = "……衣服？#n……是睡衣嗎？"
10040030-117 = "那是優香醬費了好一番功夫才替你找到的可愛睡衣唷。"
10040030-118 = "乃，乃愛！我不是已經說過不是那樣了嗎！！#n這只是……！"
10040030-122 = "……嗯？"
10040030-123 = "奇怪，你為什麼要露出那副表情？#n看起來好像不是很開心耶？"
10040030-124 = "咦咦！？沒，沒有啊……？#n絕對沒有那種事……！！"
10040030-125 = "所，所以你們兩個今天該不會……都要在這裡過夜吧？是這樣嗎……？"
10040030-126 = "我們可是特地來這裡陪你的，你怎麼一副不情願的樣子……"
10040030-128 = "就是說啊。#n就算你再怎麼頑皮，平常看到我們來，你還是會表現得很開心的說……"
10040030-129 = "嗯……？"
10040030-133 = "……哎呀。"
10040030-137 = "呵呵呵……原來是這樣啊。"
10040030-138 = "乃愛……？"
10040030-139 = "……優香醬，你先等一下。"
10040030-144 = "小雪醬～？你隱瞞了什麼對吧？"
10040030-145 = "……咦？這，這是什麼意思！？#n我，我哪有隱瞞什麼……！！"
10040030-146 = "哎呀，你還想否認嗎？#n可是你背後那些箱子……排列的順序跟白天時不一樣耶？"
10040030-147 = "……啊？"
10040030-148 = "等，等等，為什麼前輩每次都會記得這種事啊……！！"
10040030-153 = "什麼，你又做了什麼好事嗎？#n讓開，小雪！快點讓開！喂，我叫你讓開……！！"
10040030-154 = "不，不行！求求你，前輩！這個實在是……！！#n今年還沒有過完耶！！這算是明年的問題啦！不是今年的！！"
10040030-155 = "你又在說什麼莫名其妙的話……！！"
10040030-162 = "……嗯？這是什麼？"
10040030-163 = "怎麼會有一堆卡牌……？"
10040030-164 = "那，那個……該怎麼說呢，就是……我……"
10040030-166 = "……啊哈，原來是這樣啊。"
10040030-167 = "……！！！#n你這傢伙……！！這麼快就忍不住了……！！"
10040030-173 = "小～雪～！！！"
10040030-184 = "呀啊啊啊啊──！！#n啊，啊！啊啊！啊啊啊！！"
10040030-188 = "前，前輩！啊啊！！不行啊！#n那張卡真的很貴……！"
10040030-194 = "啊，前輩，算我求求你了！#n啊！啊啊！啊啊啊！啊啊啊啊啊！！"
10040030-195 = "你這傢伙……！！#n都被關進反省室了還不知道要悔過嗎！？"
10040030-201 = "啊，啊啊！啊啊啊啊！#n啊……！！啊啊啊啊──！！！"
10040030-202 = "呃啊！！緊急逃脫！！"
10040030-209 = "你要去哪裡！給我站住！小雪！！！"
10040030-213 = "乃愛，快幫幫我！！"
10040030-214 = "那傢伙居然還有空把睡衣也一起帶走！！"
10040030-218 = "呵呵，看來今年的最後一天就要這樣度過了呢。"
10040030-219 = "……總是能出人意料這點，實在非常有趣呢。"
10040030-226 = "[ns]「小雪……」"
10040030-228 = "[ns17]「……我不會忘記你的。」\n[ns18] 替小雪默哀三秒"
10040030-232 = "[ns]「話說我也得趁現在趕快逃跑才行……」"
10040030-235 = "[ns19]「……奇怪？門被鎖起來了？」\n[ns20]「連另一邊的門也是？所有對外的門全都鎖上了？」"
10040030-241 = "……我大致明白現在的情況了。"
10040030-242 = "在聽說研討會要舉辦睡衣派對之後，我就一直在注意那邊的情況……#n沒想到連老師也出現在那裡啊。"
10040030-246 = "……這種出人意料的收穫，真是令人振奮不已呢。"
10040030-247 = "[s21]「嗯……？小玉！？」\n[s22]「你是怎麼知道我在這裡的？」"
10040030-250 = "那當然是透過竊聽……不對，我是說充分利用貝里塔斯的技術。"
10040030-251 = "老師現在應該因為門被鎖住，所以正在煩惱該怎麼辦吧？"
10040030-252 = "畢竟反省室是為了關押問題學生而打造的空間，#n所以當然也安裝了無法從內部開門的自動鎖定裝置。"
10040030-253 = "雖然小雪似乎三兩下就能破解……#n不過那個裝置其實十分牢固，普通人根本無法靠自己的力量逃脫。"
10040030-254 = "……不過老師不用擔心。"
10040030-255 = "我們會幫你指引逃離學園的最佳路徑。"
10040030-256 = "[s]「……我們？你那邊還有誰在嗎？」"
10040030-257 = "沒錯，晴就在我的身旁。"
10040030-258 = "只要有他這個連貝里塔斯副部長都認可的天才駭客在，#n老師肯定能在不被千年的保全系統發現的情況下，偷偷地逃出學園。"
10040030-259 = "先等一下，小玉前輩。#n我剛才已經說過了，今天最好還是不要惹出麻煩比較好……"
10040030-261 = "[ns23]「……你怎麼又用竊聽器偷聽別人說話。」\n[ns24]「小玉，我這次真的不能再睜一隻眼閉一隻眼了──」"
10040030-264 = "……這麼說來，夏萊的年終結算報告似乎還沒有繳交呢。"
10040030-265 = "雖然這件事與我無關，但老師還沒寫完報告就跑來反省室玩──#n要是這件事被研討會的會計發現……"
10040030-266 = "恐怕老師從年初就得過得相當悲慘了吧？"
10040030-270 = "[ns]「……你想要什麼？」"
10040030-271 = "我想要十種老師親自錄音的早安鈴聲。"
10040030-272 = "台詞的部分我會準備，老師只要負責錄音和授權就行了。"
10040030-273 = "如果是這樣的條件，我想就連晴應該也會欣然同意才對。"
10040030-274 = "如果能聽到老師親自錄音的早安鈴聲……確實是個令人難以抗拒的提議……"
10040030-276 = "[ns25]「沒有其他辦法了嗎……」\n[ns26]「……等我出去之後再好好訓誡你們。」"
10040030-279 = "那我就當作老師答應囉。"
10040030-280 = "晴，麻煩你解除反省室的出入管控。"
10040030-281 = "這樣真的好嗎……"
10040030-290 = "電子鎖已經解除了。"
10040030-291 = "老師，雖然鎖已經解除，但移動時還是請你務必小心。#n因為小雪逃跑的緣故，追加的保全系統已經啟動了。"
10040030-292 = "而且要是你不小心撞見其他學生……我們可沒辦法用駭客的技術幫你擺平他們。"
10040030-293 = "老師的首要目標是沿著走廊前往我們所在的休息室。#n要是有人接近的話，我們會提前通知你的。"
10040030-294 = "畢竟老師周圍的一切聲響都在我們的監控之中，呵呵……"
10040030-295 = "[s27]「你們到底安裝了多少竊聽器……」\n[s28]「等我順利脫身之後，一定要好好唸你們幾句！」"
10040030-298 = "如果能親耳聽到老師的聲音，其實對我而言也不算什麼懲罰。"
10040030-299 = "……或許可以在早安鈴聲中，加入幾句訓斥的台詞呢。"
10040030-300 = "老師，現在沒時間悠悠栽栽地和我們聊天了。#n有別的學生正往反省室的方向過去。"
10040030-301 = "請盡快離開！"

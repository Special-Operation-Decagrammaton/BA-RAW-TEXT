[translation]
10040030-1 = "ตอนที่ 3;ใครล่ะจะไปทนไหว"
10040030-5 = "หืม...?"
10040030-6 = "หืม...! เฮือก! เฮือกกกก...!!"
10040030-7 = "[ns1] \"อะไรเหรอ อะไร!? ได้แล้วเหรอ?\"\n[ns2] \"อย่าเอาแต่ตกใจสิ ขอครูดูด้วย!\""
10040030-10 = "แจ่ม!! สุดยอดเลย!!! ดูนี่สิคะ คุณครู!! นี่ไงๆ!!"
10040030-11 = "สกิลโหดสุดๆ ไปเลยค่ะ!! อุวะฮ่าฮ่า!! ใครเจอการ์ดนี้คงต้องร้องไห้กลับบ้านแน่ๆ! อุวะฮ่าฮ่า! หรือมันจะทำให้ฉันรวยเละนะ!?"
10040030-12 = "ฉันทำถูกแล้วนะคะเนี่ยที่เรียกคุณครูมา คุณครูมากับดวงจริงๆ เลยค่ะ! ที่ฉันได้การ์ดดีๆ ก็เพราะดวง#nของคุณครูแน่ๆ ค่ะ!!!"
10040030-13 = "คะ...? ไม่เกี่ยวกันงั้นเหรอคะ? เกี่ยวสิคะ!?"
10040030-14 = "ถ้าฉันแกะคนเดียวน่ะนะ ป่านนี้ห้องสำนึกผิดคงได้เป็นนาเกลือไปแล้วก็ได้ค่ะ!"
10040030-15 = "เพราะงั้นฉันก็เลยให้คุณครูมาที่นี่เพื่อมาแกะการ์ดด้วยกันยังไงล่ะคะ... ฮุฮุ..."
10040030-16 = "นี่ละสายตาอันกว้างไกลของฉัน! โลกนี้ไม่มีอะไรที่เป็นไปไม่ได้! ถ้าเราโชคไม่ดี ก็ยืมโชคของคนอื่น#nมาซะเลย!"
10040030-17 = "จะไปยอมจำนนต่อโชคชะตาทำไมล่ะคะ!! อุวะฮ่าฮ่าฮ่าฮ่า!!"
10040030-18 = "[s3] \"ครูเป็นโชคดีของโคยูกิเหรอเนี่ย ขอบใจนะ\"\n[s4] \"ขอบใจที่คิดว่าครูเป็นของโชคดีของโคยูกินะ\""
10040030-21 = "แน่นอนสิคะ ครูน่ะเป็นโชคดีของฉันเลย! แล้วฉันก็จะตอบแทนความช่วยเหลือในครั้งนี้ด้วยค่ะ!"
10040030-22 = "แล้วก็... อืม... ถ้าอย่างนั้นก็..."
10040030-26 = "เอ้านี่ รับไปสิคะ!"
10040030-27 = "[s5] \"หืม...? ให้ครูเหรอ?\"\n[s5] \"หืม? ไม่ได้จะเก็บไว้เองเหรอ?\""
10040030-30 = "อืม ถ้าจะบอกว่าไม่เสียดายเลยก็คงเป็นเรื่องโกหกค่ะ..."
10040030-31 = "แต่ถึงยังไงฉันก็มีการ์ดใบอื่นๆ อยู่ ถึงแม้จะสกิลต่ำกว่าการ์ดใบนี้ก็เถอะ อีกอย่าง ถ้าคุณครูไม่มา ฉันก็คงไม่ได้การ์ดใบนี้อยู่แล้ว..."
10040030-32 = "เพราะงั้นฉันจะให้การ์ดใบนี้กับคุณครูค่ะ! แต่คราวหน้าจะถ้าฉันแกะการ์ดอีก คุณครูต้องมาอยู่กับฉันนะคะ!!"
10040030-33 = "จากนี้ไปการ์ดใบนั้นคือตัวแทนของพันธมิตรพิชิตเกลือ... หรือก็คือสัญลักษณ์แห่งความสามัคคีของ#nพวกเราค่ะ!!"
10040030-34 = "[s7] \"เอาแบบนี้เลยเหรอ โคยูกิ...!\"\n[s8] \"โคยูกิ... ครูประทับใจจริงๆ...!\""
10040030-37 = "อุวะฮ่าฮ่า... ที่ผ่านมาฉันได้รับความช่วยเหลือจากคุณครูตั้งเยอะแยะ งั้นฉันก็ต้องเป็นเด็กดีบ้างสิ..."
10040030-41 = "หืม...? แจ้งเตือนเหรอ...?"
10040030-42 = "ทำไมถึงแจ้งเตือนในเวลานี้ล่ะ..."
10040030-43 = "[s9] \"ว่าไงนะ? แจ้งเตือนเหรอ...?\"\n[s10] \"แจ้งเตือนอะไรเหรอ?\""
10040030-46 = "อ้อ ไม่มีอะไรมากหรอกค่ะ ฉันแค่ตั้งเตือนไว้ว่าถ้ามีใครเข้าออกอาคารเซมิน่า ก็จะให้ส่งแจ้งเตือนมาที่#nฉันน่ะค่ะ"
10040030-47 = "ถ้าต้องมาใช้ชีวิตอยู่ในห้องสำนึกผิดละก็ อย่างน้อยก็ต้องมีระบบความปลอดภัยประมาณนี้ละค่ะ ฮุฮุ"
10040030-48 = "ฮืม แต่ก็น่าแปลกนะคะ เวลานี้ไม่น่าจะมีใครมาอาคารเซมิน่านะ"
10040030-49 = "ใครกันนะ... ไปดูจากกล้องกันเถอะค่ะ!"
10040030-50 = "ฮึบ"
10040030-54 = "หืม...?"
10040030-55 = "หา...? หะ... หาาาาา...!?!?!?"
10040030-56 = "[ns11] \"โคยูกิ...? ทำไมเหรอ?\"\n[ns12] \"โคยูกิ...? มีเรื่องอะไรเหรอ?\""
10040030-59 = "ทะ... ทำไม... ทำไม..."
10040030-60 = "ทำไมพวกรุ่นพี่ถึงได้...?!!?!"
10040030-61 = "[ns13] \"พวกรุ่นพี่...?! ยูกะกับโนอาเหรอ!?\"\n[ns14] \"ยูกะกับโนอายังไม่กลับไปอีกเหรอ!?\""
10040030-64 = "บะ... แบบนี้ฉันคาดไม่ถึงเลย!? อะ... อะไรกันเนี่ย!? ทำไมล่ะ!? เพราะอะไร...!?"
10040030-65 = "ตะ... ต้องเอาการ์ดไปซ่อนก่อน...!!"
10040030-66 = "ไม่สิ...!! ละ... แล้วคุณครูล่ะ!! จะทำยังไงดี...!!"
10040030-67 = "[s15] \"โดนจับได้ ครูตายแน่!\"\n[s16] \"ครูไม่ควรมาอยู่ที่นี่ตั้งแต่แรกเลย!!\""
10040030-70 = "ก็คงจะเป็นอย่างนั้นน่ะค่ะ... วินาทีที่คุณครูมาอยู่ที่นี่ คือวินาทีแห่งจุดจบของพวกเรา..."
10040030-71 = "สถานการณ์แบบนี้ ฉันคิดหาข้อแก้ตัวอะไรไม่ออกเลย... แก้ตัวไปยังไงก็ไม่น่าจะรอดด้วย"
10040030-72 = "งั้นวิธีที่เหลือ... วิธีที่จะรอดตาย..."
10040030-77 = "ซ่อนในตู้เก็บผ้าห่ม...?"
10040030-78 = "คุณครู! ในตู้ค่ะ! ไปซ่อนในตู้ก่อน! ตอนนี้ตู้เก็บผ้าห่มว่างอยู่ค่ะ!!"
10040030-79 = "เข้าไปซ่อนตัวในนั้นก่อนนะคะ! พวกรุ่นพี่อาจจะแวะเข้ามาเอาอะไรในห้องก็ได้ค่ะ!"
10040030-80 = "เข้าไปซ่อนในนั้นก่อน แล้วพอรุ่นพี่กลับไปแล้วค่อยออกมานะคะ!"
10040030-81 = "ใช่ ต้องใช้วิธีนี้ละค่ะ! ฝากความหวังไว้ที่อนาคตก่อน!"
10040030-82 = "คะ...?"
10040030-83 = "จะรอดหรือเปล่าน่ะเหรอคะ? ต้องรอดอยู่แล้วค่ะ! เชื่อฉันนะคะ!!"
10040030-84 = "ฉันอยู่ห้องนี้มาบ่อยจนเรียกว่าเป็นเจ้าของห้องได้เลยค่ะ ถ้าฉันบอกว่ารอดก็ต้องรอดค่ะ!!"
10040030-85 = "เราอย่าเสียเวลากันเลยค่ะ รีบเข้าไปซ่อนในตู้เถอะค่ะ! เร็วเข้า! ไม่มีเวลาแล้ว!!"
10040030-89 = "ถ้ายังอยากมีชีวิตรอดก็เข้าไปซ่อนเถอะค่ะ!!!"
10040030-100 = "อะ... เอ๋!? ใครกันเนี่ย...!"
10040030-101 = "ระ... รุ่นพี่นี่นา...? ทำไมถึงกลับมาอีกรอบล่ะ...?"
10040030-103 = "อะไรกัน...? ทำไมทำหน้าแบบนั้นน่ะ ทำเหมือนตกใจอะไรอย่างนั้นละ?"
10040030-104 = "ยูกะจังกลัวว่าโคยูกิจังน่าจะเหงาถ้าต้องอยู่คนเดียวในคืนสุดท้ายของปีน่ะค่ะ"
10040030-105 = "แต่จะให้ปล่อยตัวออกจากห้องสำนึกผิดก็ไม่ได้ เพราะถ้าทำแบบนั้นจะผิดกฎ..."
10040030-106 = "พวกเราก็เลยจะจัดปาร์ตี้ชุดนอนในห้องสำนึกผิดเพื่อส่งท้ายปีเก่ากับโคยูกิจังค่ะ"
10040030-107 = "เป็นรุ่นน้องที่ต้องให้ทำอะไรมากมายจริงๆ เลย"
10040030-108 = "เอ้านี่ ไปเปลี่ยนชุดมา ใส่ชุดนี้น่ะไม่ได้บรรยากาศหรอก"
10040030-112 = "หืม นี่มันอะไรกันคะ?"
10040030-116 = "ชุด... ชุดนอนนี่คะ...?"
10040030-117 = "เป็นชุดนอนสุดน่ารักที่ยูกะจังตั้งใจเลือกมาให้โคยูกิจังค่ะ"
10040030-118 = "นะ... โนอา! ฉันบอกแล้วไงว่าไม่ใช่อย่างนั้นน่ะ!! มันก็แค่...!"
10040030-122 = "หืม...?"
10040030-123 = "อะไรกัน ทำไมทำหน้าอย่างนั้นล่ะ? เหมือนว่าจะไม่ชอบอย่างนั้นแหละ?"
10040030-124 = "คะ... คะ? ปะ... เปล่านะ? มะ... ไม่ใช่ค่ะ จะเป็นแบบนั้นไปได้ยังไง...? ไม่มีทางไม่ชอบหรอกค่ะ...!!"
10040030-125 = "ถะ... ถ้างั้นวันนี้ทั้งสองคนก็... จะนอนค้าง... ที่นี่...? เหรอคะ...?"
10040030-126 = "นี่ พวกเราอุตส่าห์มาหาถึงขนาดนี้แล้ว แต่กลับทำหน้าเหมือนไม่อยากให้อยู่ด้วยงั้นแหละ... เธอน่ะ"
10040030-128 = "นั่นสิคะ ปกติโคยูกิจังจะดีใจที่เรามาหาไม่ใช่เหรอคะ..."
10040030-129 = "หืม...?"
10040030-133 = "เอ๋..."
10040030-137 = "อ๋อ... เป็นอย่างนี้สินะคะ ฮุฮุฮุ"
10040030-138 = "ทำไมเหรอ โนอา...?"
10040030-139 = "ยูกะจัง... ขอเวลาฉันเดี๋ยวนะคะ"
10040030-144 = "โคยูกิจัง~? ซ่อนอะไรไว้ข้างหลังเหรอคะ?"
10040030-145 = "คะ... คะ? ซะ... ซ่อนเซิ่นอะไรกัน!? ฉะ... ฉันจะไปมีอะไรให้ซ่อนคะ...!!"
10040030-146 = "ตายจริง จะเอาอย่างนี้เหรอคะ? พวกกล่องข้างหลังนั่นน่ะ... ตอนเช้ามันไม่ได้เรียงไว้อย่างนี้นี่คะ?"
10040030-147 = "คะ...?"
10040030-148 = "อะ... อะไรกัน ทำไมจำเรื่องแบบนี้ได้หมดทุกครั้งเลย...!!"
10040030-153 = "อะไรกัน ทำอะไรไว้อีกน่ะ? มานี่เลย โคยูกิ! ไหนขอดูข้างหลังหน่อย! อย่าผลักกันสิ หลบเลยไปนะ...!!"
10040030-154 = "มะ... ไม่ได้นะ! ขอร้องละ รุ่นพี่! ครั้งนี้ฉันขอเถอะ...!! ยังไม่หมดปีเลยนะคะ!! นี่คือปัญหาของปีหน้าค่ะ! ไว้ปีหน้าค่อยคุยนะ!!"
10040030-155 = "พูดอะไรไม่เห็นจะเข้าใจเลย...!!"
10040030-162 = "หืม...? นี่มันอะไรกัน?"
10040030-163 = "ทำไมมีการ์ดเป็นกองเลย...?"
10040030-164 = "ระ... เรื่องนั้น... คือว่า แบบว่า... เอ่อ..."
10040030-166 = "อ๋อ... เป็นอย่างนี้สินะคะ?"
10040030-167 = "ยัยเด็กคนนี้นี่...!! แค่นี้ก็ทนไม่ไหวเหรอ...!!"
10040030-173 = "โค~ ยู~ กิ~~~~~~!!!"
10040030-184 = "โอ๊ยยยยยย!! โอ๊ย โอ๊ย! อ๊าย! อ๊ายย!!"
10040030-188 = "ระ... รุ่นพี่! ดะ... เดี๋ยว!! ไม่ได้นะคะ ม่าย! การ์ดใบนั้นมันแพง...!"
10040030-194 = "โธ่ รุ่นพี่ ฉันขอร้องละค่ะ! อ๊ะ! อ๊ายย! อ๊ายยย! อ๊ายยยยย!!"
10040030-195 = "ยัยเด็กดื้อคนนี้...!! ที่ผ่านมาไม่ได้สำนึกผิดเลยหรือไง!?"
10040030-201 = "โอ๊ยย! โอ๊ยยยย! อย่านะ อ๊าย...!! อ๊ายยยย!!!"
10040030-202 = "อ้ากกก!! ขอเปิดการ์ดหนีฉุกเฉินก่อนละ!!"
10040030-209 = "จะหนีไปไหน! หยุดอยู่ตรงนั้นเลยนะ! โคยูกิ!!!"
10040030-213 = "โนอา ช่วยกันหน่อยสิ!!"
10040030-214 = "คิดจะหนี แต่ก็เอาชุดนอนไปด้วยงั้นเหรอ ฉันละเชื่อเลย!!"
10040030-218 = "ฮุฮุ สุดท้ายแล้วคืนสุดท้ายของปีก็เป็นอย่างนี้สินะคะ"
10040030-219 = "มีอะไรให้สนุกแบบคาดไม่ถึงตลอดเลยค่ะ..."
10040030-226 = "[ns] \"โคยูกิ...\""
10040030-228 = "[ns17] \"แล้วครูจะไม่ลืมโคยูกินะ...\"\n[ns18] ไว้อาลัยสั้นๆ"
10040030-232 = "[ns] \"ยังไงเราก็ต้องอาศัยจังหวะนี้หนีออกไปให้ได้...\""
10040030-235 = "[ns19] \"อ้าว...? ประตูล็อกเหรอ?\"\n[ns20] \"ประตูล็อกหมดเลยเหรอ?\""
10040030-241 = "ฉันพอเข้าใจสถานการณ์แล้วค่ะ..."
10040030-242 = "ฉันเฝ้าระวังสถานการณ์อยู่เพราะเห็นว่าเซมิน่าจะจัดปาร์ตี้ชุดนอนกัน... แต่ไม่คิดเลยนะคะว่าคุณครูจะ#nอยู่ที่นั่นด้วย"
10040030-246 = "รู้สึกประทับใจกับความสำเร็จที่คาดไม่ถึงจังเลยค่ะ..."
10040030-247 = "[s21] \"หืม...? โคทามะเหรอ?!\"\n[s22] \"รู้ได้ยังไงน่ะว่าครูอยู่ในนี้?\""
10040030-250 = "ก็เพราะฉันดักฟัง... ไม่สิ เพราะฉันใช้ประโยชน์จากเทคโนโลยีของเวอริทัสน่ะค่ะ"
10040030-251 = "คุณครูคงจะตกอยู่ในสถานการณ์ที่ยากลำบากเพราะประตูห้องสำนึกผิดล็อกอยู่สินะคะ"
10040030-252 = "ห้องสำนึกผิดเป็นห้องที่สร้างขึ้นเพื่อกักขังนักเรียนที่ก่อปัญหา ก็เลยติดอุปกรณ์ล็อกอัตโนมัติเอาไว้ เพื่อไม่ให้เปิดจากข้างในได้น่ะค่ะ"
10040030-253 = "โคยูกิจังน่าจะปลดล็อกได้ด้วยทักษะของเธอ... แต่กับคนธรรมดาน่ะ ไม่มีทางหนีออกจากห้องนั้นด้วย#nกำลังของตัวเองได้หรอกค่ะ"
10040030-254 = "แต่ก็ไม่ต้องกังวลหรอกนะคะ..."
10040030-255 = "พวกฉันจะบอกเส้นทางที่ดีที่สุดในการหนีออกมาให้เองค่ะ"
10040030-256 = "[s] \"พวกฉันงั้นเหรอ...? มีคนอื่นอยู่ด้วยเหรอ?\""
10040030-257 = "ค่ะ ฮาเระอยู่ข้างๆ ฉันค่ะ"
10040030-258 = "ด้วยความช่วยเหลือจากแฮ็กเกอร์อัจฉริยะที่รองหัวหน้าชมรมเวอริทัสยอมรับ คุณครูจะแอบหนีออก#nจากที่นั่นโดยไม่ถูกระบบรักษาความปลอดภัยของมิลเลเนียมตรวจจับได้ค่ะ"

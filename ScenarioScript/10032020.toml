[translation]
10032020-1 = "ตอนที่ 2;ร้ายกาจขึ้นอีก"
10032020-2 = "ขอให้ไปจับตัว <ดอน อารันซิโน> ที่เป็นสุดยอดผู้นำของสหพันธ์อันธพาลงั้นเหรอ...?"
10032020-4 = "ถึงจะฟังดูแปลกๆ แต่ก็ใช่แล้วละ อย่างที่เธอว่าเลย"
10032020-5 = "น่าจะต้องอธิบายเพิ่มอีกหน่อยนะ ไหนคุณบอกว่าตัวเองเป็นหนึ่งในสมาชิกของ <อารันซิโน แฟมิลี> ไง?"
10032020-6 = "จะขอให้มาจับตัวบอสของตัวเองเนี่ยนะ... ไม่เห็นจะเข้าท่าเลย"
10032020-7 = "ฉันเข้าใจนะ พวกเธออาจคิดว่านี่เป็นเรื่องแปลก"
10032020-8 = "แต่นี่ไม่ใช่การหักหลังหรอก ต้องบอกว่าเป็นการทำเพื่อองค์กรของเรามากกว่า"
10032020-9 = "บอสของเรากำลังคุมไม่อยู่... ถ้าเป็นแบบนี้ต่อไป องค์กรของเราอาจจะถึงจุดจบก็เป็นได้"
10032020-13 = "ก็เลยขอให้ช่วยขัดขวางบอสของตัวเองก่อนจะเกิดเรื่องแบบนั้นสินะ พวกคุณก็รู้ใช่มั้ยว่านี่เป็นภารกิจที่หนักเอาการน่ะ?"
10032020-14 = "แน่นอน... มันเป็นงานที่โหดและอันตรายเลยละ เพราะงั้นฉันถึงได้เตรียมค่าตอบแทนไว้ให้อย่างสมน้ำ#nสมเนื้อ"
10032020-15 = "ปัญหาไม่ได้อยู่แค่เรื่องค่าตอบแทนหรอกนะ..."
10032020-17 = "ไม่มีปัญหาหรอกน่า! พวกคุณจ้างถูกคนแล้วละ งานแบบนั้นเหมาะกับหน่วยรับจ้างสารพัด 68 ของเรา#nที่สุดเลย ฮุฮุฮุ"
10032020-19 = "ประธาน...?"
10032020-20 = "...!?"
10032020-25 = "ทางนั้นบอกเองนี่ว่าเป็นงานโหดและอันตรายเลยนะ ก็แปลว่าเป็นภารกิจร้ายกาจน่ะสิ"
10032020-26 = "ฮุฮุฮุ... ไม่มีใครที่เหมาะกับงานร้ายกาจๆ แบบนั้นได้เท่าพวกเราแล้วละ วางใจพวกเราได้เลย"
10032020-28 = "ฮุฮุฮุ อารุจังดูตื่นเต้นเป็นพิเศษเลยนะ~"
10032020-29 = "อ่า..."
10032020-30 = "เฮ้อ..."
10032020-34 = "คิดไม่ถึงเลยนะว่าจะรับภารกิจอย่างยินดีแบบนี้... หรือว่าเธอเป็นพวกที่ไม่แสดงความกังวลออกมาทาง#nสีหน้ากันนะ?"
10032020-35 = "ข่าวลือที่ฉันได้ยินมาเป็นความจริงสินะ หน่วยรับจ้างสารพัด 68"
10032020-36 = "เมื่องานเสร็จ ฉันจะจ่ายส่วนที่เหลือให้เป็น 4 เท่าของเงินที่จ่ายให้ล่วงหน้าเลย"
10032020-37 = "แน่นอนว่าเงื่อนไขคือ... พวกเธอต้องจัดการให้สำเร็จนะ"
10032020-38 = "ไม่เชื่อความสามารถของพวกเรารึไง...?"
10032020-39 = "ไม่หรอก มันแค่เป็นนิสัยที่ติดมาจากการประกอบอาชีพน่ะ ช่วยเข้าใจทีนะว่ามันเป็นนิสัยที่เลี่ยงไม่ได้#nของพวกเรา"
10032020-40 = "บอส... ฉันหมายถึงอารันซิโนน่ะ เขาเป็นคนที่ระมัดระวังตัวเป็นอย่างมาก ว่ากันว่าเขาใส่อุปกรณ์#nคุ้มครองความปลอดภัย 2 หรือ 3 อย่างเลย"
10032020-41 = "อืม... "
10032020-42 = "ไม่เป็นปัญหาหรอก เราก็แค่ต้องทำลายอุปกรณ์ที่ว่าไปซะ"
10032020-43 = "ฟังแล้วน่าไว้ใจดีนะ งั้นก็รับภารกิจไปทำได้เลย"
10032020-44 = "ถ้ามีการคอนเฟิร์มวันที่และเวลา ฉันจะบอกรายละเอียดอีกที ระหว่างนี้ฉันจะหาแบบพิมพ์เขียวของ#nโรงละครและรายชื่อแขกให้"
10032020-45 = "ถ้างั้นก็รอหน่อยแล้วกัน..."
10032020-53 = "นี่... ประธาน...?"
10032020-54 = "ทะ... ท่านอารุ...?"
10032020-55 = "หืม...? ทำไมเหรอ? ทำไมทุกคนทำหน้ากันแบบนั้นล่ะ...?"
10032020-56 = "ฉันขอถามเผื่อๆ นะ... ประธานรู้หรือเปล่าว่า <อารันซิโน แฟมิลี> เป็นองค์กรแบบไหน?"
10032020-57 = "หืม? มะ... ไม่รู้สิ? ฟังจากชื่อก็น่าจะเป็นแก๊งนักเลงมั้ย?"
10032020-58 = "อ่า... ที่พูดมาก็ไม่ผิดหรอกนะ แต่ว่า..."
10032020-65 = "อะไรล่ะ..."
10032020-67 = "แต่ว่าอะไร~~~!!"
10032020-69 = "จะ... จะ... จริงเหรอ!? เป็นถึงหัวหน้าสหพันธ์อันธพาลเลยเหรอ...!? ไม่ใช่แค่บอสของแก๊งนักเลง#nธรรมดาๆ หรอกเหรอ!?"
10032020-70 = "ทะ... ทำยังไงดีล่ะ!? ถ้าลูกน้องหรือคนที่เกี่ยวข้องกับเขาสืบได้ว่าสำนักงานของเราอยู่ไหนละก็...!"
10032020-71 = "จะต้องสืบอะไรกันล่ะ... เราไม่เคยปิดบังสักหน่อย แถมเรายังโฆษณาตัวเองเสียขนาดนี้ "
10032020-72 = "แต่จะว่าไปประธานก็แปลกๆ อยู่นะ ใช่ว่าเราจะไม่เคยเผชิญหน้ากับอาชญากรเลยสักหน่อย..."
10032020-73 = "อารุจัง... อย่าบอกนะว่ามากลัวเอาตอนนี้น่ะ? เพราะเป้าหมายเป็นองค์กรที่ใหญ่กว่าที่คิดเหรอ?"
10032020-77 = "กะ... กลัวอะไรกันเล่า! ฉันก็แค่ประหม่านิดหน่อยก็เท่านั้น! ก็มันเป็นงานหินเลยนี่! แต่ยิ่งเป็นงานหินเท่าไร ค่าตอบแทนก็ยิ่งมากไม่ใช่เหรอ!?"
10032020-78 = "ค่าตอบแทนที่เราจะได้มันมหาศาลกว่าจากทุกงานที่เราเคยทำมาเลยนะ! แถมยังเป็นภารกิจที่ร้ายกาจด้วย ถ้าเป็นแบบนี้ละก็...!"
10032020-79 = "ท่าทางตอบรับของอารุจังเป็นไปตามที่คิดไว้เลยนะ สนุกจังเลย~ ฮุฮุฮุ"
10032020-80 = "เราจะไหวกันจริงๆ เหรอประธาน?"
10032020-81 = "จะพูดเองมันก็ยังไงๆ อยู่ แต่งานครั้งนี้มันดูเป็นงานยักษ์เลยนะ... ไม่น่าจะใช่งานธรรมดาๆ ด้วย..."
10032020-82 = "มะ... หมายความว่ายังไงน่ะ!? ก็เพราะมันเป็นงานยักษ์ไง เราถึงได้ต้องรับมาทำ! เราจะทำแต่ภารกิจตามหาแมวหรือสอยพวกนักเลงตามท้องถนนไปตลอดไม่ได้หรอกนะ!"
10032020-88 = "หืม? แต่ฉันโอเคกับงานแบบนั้นนะ"
10032020-89 = "ฉะ... ฉันก็ด้วยค่ะ...! ถ้าได้อยู่กับท่านอารุละก็ ต่อให้ต้องคุ้ยถังขยะหรือต้องนอนอย่างคนไร้บ้าน ฉันก็ยอม...!"
10032020-91 = "อ๊ายยย~! พอได้แล้ว!! หยุดพูดเรื่องคนไร้บ้านด้วย!! เราไม่ได้ทำแบบนั้นกันบ่อยๆ สักหน่อย!!"
10032020-92 = "นี่เป็นโอกาสของพวกเราเลยนะ โอกาสที่จะสร้างชื่อเสียงของหน่วยรับจ้างสารพัด 68 ยังไงล่ะ!!"
10032020-93 = "ทุกคนฟังให้ดี งานนี้เราจะพลาดไม่ได้เด็ดขาด...!!"
10032020-94 = "เราต้องทำภารกิจนี้ให้สำเร็จ แล้วประกาศศักดาของเราในโลกมิจฉาชีพ...! แล้วพวกเราจะยิ่งเป็นที่รู้จัก#nในฐานะองค์กรร้ายกาจที่โหดไม่มีใครเกิน!"
10032020-101 = "เราจะต้อง...!"
10032020-111 = "ร้ายกาจขึ้นอีก...!!"
10032020-115 = "เรื่องก็เป็นอย่างนี้ละ..."
10032020-117 = "ตอนนี้พวกเรากำลังสืบค้นภายในของโรงละครโอเปร่า แล้วก็ไล่กำจัดสมุนกระจอกๆ ของบอสคนนั้นอยู่#nด้วย"
10032020-118 = "ฉันก็ไปสืบหามาบ้างเหมือนกัน... เรื่องราวที่เรารู้มาเป็นความจริงทั้งหมดเลย"
10032020-119 = "บอสของสหพันธ์อันธพาลกำลังวางแผนทำเรื่องไม่ดีเพื่อขยายอำนาจอยู่จริงๆ"
10032020-120 = "ดังนั้นถ้าตัดเรื่องวิธีการไป นี่ก็เป็นการทำงานเพื่อประโยชน์ส่วนรวมอยู่นะ"
10032020-121 = "ฉันจะไม่ปฏิเสธหรอกว่านี่เป็นข้ออ้าง แต่จะบอกว่านี่ไม่ใช่งานไม่ดีอย่างที่ครูคิดน่ะ"
10032020-128 = "เฮอะ...!"
10032020-129 = "เรื่องนี้ไม่เกี่ยวกับประโยชน์ส่วนรวมหรอก! พวกเราแค่ทำงานตามที่ได้รับการว่าจ้างก็เท่านั้น! แค่เป้าหมายของ 2 ฝ่ายบังเอิญตรงกันเท่านั้นน่ะ แค่บังเอิญ!!"
10032020-131 = "ชะ... ใช่ค่ะ! เราไม่ได้ทำเพื่อประโยชน์ส่วนรวมหรอก! นี่เป็นงานที่ท่านอารุตัดสินใจต่างหากค่ะ!"
10032020-132 = "เฮ้อ..."
10032020-136 = "[ns1] \"งานลักพาตัวบอสสหพันธ์อันธพาลงั้นเหรอ...\"\n[ns2] \"เป็นงานที่ 'ร้ายกาจ' จริงๆ ด้วยนะ\""
10032020-140 = "ฮุฮุฮุ... ใช่มั้ยล่ะ? คุณครูเองก็คิดเหมือนกันใช่มั้ย?"
10032020-141 = "ในที่สุดเราก็ได้ทำงานที่สมกับความสามารถของหน่วยรับจ้างสารพัด 68 สักที เพราะงั้นเราถึงได้#nเปลี่ยนชุดกันมาให้เข้ากับสถานที่ด้วย"
10032020-142 = "ขอโทษนะที่ฉันไม่ได้บอกคุณครูก่อนหน้านี้..."
10032020-143 = "เพื่อความสัมพันธ์ของเราแล้ว หวังว่าคุณครูจะไม่คัดค้านหรือขัดขวางงานของพวกเรานะ"
10032020-144 = "หืม...? ไม่เป็นไรงั้นเหรอ?"
10032020-145 = "เอ๋ ทำไมล่ะ...? ยอมให้ทำง่ายๆ แบบนี้ได้ด้วยเหรอ?"
10032020-151 = "ถามกลับแบบนั้นได้ยังไงล่ะประธาน"
10032020-152 = "อะฮ่าฮ่าฮ่าฮ่า!! อารุจังเงิบไปแล้ว~! ตลกจัง!"
10032020-158 = "ตะ... แต่ว่า... เอ๋...? จริงๆ น่ะเหรอ...?"
10032020-159 = "ทำไมล่ะ...?"
10032020-160 = "[s3] \"ก็ครูไม่ได้มาที่นี่เพราะเรื่องนั้นนี่นา\"\n[s4] \"ครูไม่ห่วงอยู่แล้ว ครูเชื่อใจอารุยังไงล่ะ\""
10032020-163 = "คุณครู..."
10032020-167 = "ฮุฮุ ฮุฮุฮุ..."
10032020-168 = "สมกับที่เป็นคุณครูเลย ฉันเลือกผู้ร่วมงานมาไม่ผิดจริงๆ เลยนะ"
10032020-169 = "ก็จริงอยู่นะ คิดไว้แล้วละว่าคุณครูต้องเข้าใจเส้นทางที่ร้ายกาจของพวกเรา..."
10032020-170 = "แต่เมื่อกี้ยังถามว่า 'ทำไม' อยู่ตั้งหลายครั้งเลยนะ"
10032020-171 = "ถ้างั้น เพื่อคุณครูแล้ว... ฉันอยากให้ความช่วยเหลืออย่างใกล้ชิดขึ้นอีกในฐานะผู้ร่วมงานสักหน่อยน่ะ"
10032020-172 = "งาน 'สำรวจโอเปร่า' ของคุณครูน่ะ..."
10032020-173 = "ถึงเมื่อกี้จะมีเรื่องวุ่นวายเล็กๆ น้อยๆ ไปบ้าง แต่ฉันจะขอเอาตำแหน่งประธานเป็นประกันแล้วช่วยคุณครู#nจนเสร็จงานเลย"
10032020-174 = "แต่ว่าต้องเป็นก่อนที่บอสของสหพันธ์อันธพาลจะมาถึงนะ เพราะหลังจากนั้นฉันก็ต้องไปทำงานที่ได้รับ#nว่าจ้างมา"
10032020-175 = "จะไม่เป็นไรเหรอประธาน? แล้ว 'งานหาตัวคนที่แฝงตัวมา' ที่เรากำลังทำกันอยู่ล่ะ?"
10032020-176 = "ก็ทำไปด้วยกันเลยสิ! ยังไงก็ต้องพาคุณครูทัวร์โรงละครโอเปร่าให้ทั่วอยู่แล้วนี่?"
10032020-182 = "เอ๋~? จะเข้าโหมดผู้ชมแล้วงั้นเหรอ? งั้นฉันไปเปลี่ยนเป็นใส่ชุดเดรสดีมั้ย?"
10032020-183 = "ชะ... ชุดเดรสเหรอคะ? ในที่สุดก็จะได้ใส่เหรอคะ ฉันก็ด้วยเหรอ...?"
10032020-184 = "มะ... ไม่ใช่นะคะ! ฉันไม่ได้บอกว่าไม่ชอบนะคะ ก็... คะ... แค่คิดว่าคนอย่างฉัน... ไม่เหมาะกับชุดแบบนั้น..."
10032020-185 = "ตะ... แต่ถ้าไม่แต่งตัวในเดรสโค้ดให้เข้ากับคนอื่น ก็อาจจะเป็นการสร้างความเดือดร้อนได้..."
10032020-189 = "ฉะ... ฉันจะรีบไปเปลี่ยนมาเดี๋ยวนี้ค่ะ...!!"
10032020-193 = "หุหุหุ รอเค้าหน่อยนะคุณครู เค้าจะรีบไปรีบมานะ!"
10032020-199 = "อืม..."
10032020-200 = "ครู..."
10032020-205 = "เอ้า รับนี่ไปสิ..."
10032020-206 = "[s5] \"วิทยุสื่อสารไร้สาย?\"\n[s6] \"นี่ครูได้เป็นส่วนหนึ่งของปฏิบัติการเหรอ?\""
10032020-209 = "ฉันเอามาสำรองเผื่อว่าฮารุกะหรือมุสึกิจะทำของตัวเองพังน่ะ ดีนะที่เอามาด้วย"
10032020-210 = "ฉันไม่ได้ให้วิทยุนี้เพื่อขอให้มาลงเรือลำเดียวกันกับพวกเราหรอกนะ ก็แค่ให้ไว้เพื่อความปลอดภัยของ#nครูน่ะ"
10032020-211 = "ฉันคิดว่าคงไม่มีอะไรร้ายแรงหรอก... แต่เพราะงานนี้เกี่ยวข้องกับกลุ่มอันธพาล ยังไงก็ต้องเผื่อไว้ก่อน"
10032020-215 = "ที่จริงแล้ว... ฉันคิดอยากให้ครูกลับไปเสียมากกว่าด้วยซ้ำ..."

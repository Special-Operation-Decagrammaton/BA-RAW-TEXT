[translation]
10032020-1 = "第2話;更有冷硬派的風格"
10032020-2 = "要綁架幫派聯盟的統帥「唐．阿蘭奇諾」……？"
10032020-4 = "雖然聽起來可能很奇怪，但正是如此。"
10032020-5 = "請再說明得詳細一點。#n你不也說過自己是「阿蘭奇諾家族」的一員嗎？"
10032020-6 = "居然要求綁架自己的頭目……實在令人無法理解。"
10032020-7 = "我明白你疑惑的原因，畢竟這聽起來確實有點荒唐。"
10032020-8 = "但這並不是背叛……不，這是為了組織的存活。"
10032020-9 = "頭目他……正在暴走。#n再這樣下去，我們的組織恐怕難以生存下去。"
10032020-13 = "所以是要我們阻止頭目嗎？#n你們應該也知道，這是個負擔相當沉重的委託吧？"
10032020-14 = "……當然。這將會是個艱難且充滿風險的任務，因此報酬也準備得十分慷慨。"
10032020-15 = "這不單純是報酬的問題……"
10032020-17 = "沒問題！這種事交給我們「便利屋68」再適合不過了，呵呵呵。"
10032020-19 = "……社長……？"
10032020-20 = "……！？"
10032020-25 = "艱難又充滿風險的委託，豈不是完全符合冷硬派的風格嗎？"
10032020-26 = "呵呵呵……沒有人比我們更適合處理這種冷硬派的委託了。#n這件事就交給我們吧。"
10032020-28 = "咯呵呵。亞瑠醬興致真高耶～？"
10032020-29 = "……啊。"
10032020-30 = "……唉……"
10032020-34 = "我本來還半信半疑，沒想到你居然那麼爽快地接受了……甚至沒有半點猶豫。"
10032020-35 = "傳聞果然沒有騙人啊，便利屋68。"
10032020-36 = "只要將工作處理得當，我們就會支付預付款四倍的金額。"
10032020-37 = "當然，前提是能夠處理好……"
10032020-38 = "……你是在懷疑我們的實力嗎？"
10032020-39 = "怎麼會呢。只是職務上無可避免的職業病罷了，還請你們見諒。"
10032020-40 = "頭目……唐．阿蘭奇諾非常小心謹慎，會設置2重甚至3重的保險。"
10032020-41 = "哼嗯……"
10032020-42 = "這不成問題，只要把那2重甚至3重的保險全部突破就行了。"
10032020-43 = "真是可靠的回答，就那樣進行吧。"
10032020-44 = "等日期和時間定下來後，我會再把詳細內容告訴你們。#n為了工作的順利進行，我也會提供建物的平面圖和參加者名單。"
10032020-45 = "……你們就暫時等著吧。"
10032020-53 = "……那個，社長？"
10032020-54 = "亞，亞瑠大人……？"
10032020-55 = "……嗯？怎麼了？你們為什麼都露出那種表情……？"
10032020-56 = "保險起見先問你一下，社長……你知道「阿蘭奇諾家族」是什麼樣的組織嗎？"
10032020-57 = "……這，這個嘛？#n從名字來看，不就是幫派之類的嗎？"
10032020-58 = "嗯……雖然是這樣沒錯……"
10032020-65 = "……唔……"
10032020-67 = "你說什麼～！！"
10032020-69 = "真，真真，真的嗎！？幫派聯盟的統帥……！？不是幫派頭目而已嗎！？"
10032020-70 = "怎，怎麼會！？跟那種傢伙有關的人，怎麼會知道我們事務所的位置……！"
10032020-71 = "與其說知不知道……我們也沒有隱藏過吧，甚至還正在宣傳。"
10032020-72 = "話說回來，我有點意外呢，社長。#n你接觸那些罪犯應該也不是一天兩天的事……"
10032020-73 = "亞瑠醬……難道你開始害怕了嗎？#n因為對方是比想像中還要龐大的組織？"
10032020-77 = "我，我哪有怕！只是稍～微有點緊張而已！#n他們是大人物對吧？大人物不就會有很多錢嗎！？"
10032020-78 = "報酬的金額與以往收到的委託完全不同！#n而且工作的內容確實也非常硬派，如果是這樣的話……！"
10032020-79 = "亞瑠醬……真是預料中的反應，好有趣～咯呵呵。"
10032020-80 = "……這樣真的沒問題嗎，社長？"
10032020-81 = "雖然我這麼說有點奇怪，但這次的委託真的非同小可，不能掉以輕心。"
10032020-82 = "什，什麼意思啊！？就是因為非同小可才要接受啊！#n我們總不能一直在協尋貓咪或是處理小巷子裡的太妹吧！"
10032020-88 = "嗯？我其實覺得無所謂啊？"
10032020-89 = "我，我也是……！#n只要能跟亞瑠大人在一起，不管是垃圾桶還是露宿街頭我都願意……！！"
10032020-91 = "啊啊啊～！夠了夠了！！露宿街頭的話題到此為止！！我們又不常那樣！！"
10032020-92 = "總之，這是個讓我們「便利屋68」聲名遠播的機會！！"
10032020-93 = "大家聽好，我們絕對不能錯過這個工作……！！"
10032020-94 = "一定要成功解決這個委託，在地下世界累積名聲……！#n讓世人知道我們是極度兇狠且具冷硬派風格的組織！"
10032020-101 = "要，要變得更加……！"
10032020-111 = "有冷硬派的風格──！！"
10032020-115 = "……這就是到目前為止所發生的事。"
10032020-117 = "我們先在歌劇院內部進行搜索，清除頭目設下的小嘍囉！"
10032020-118 = "為了以防萬一，我也打聽了一下……委託人提到的那些事都是真的。"
10032020-119 = "幫派聯盟的頭目為了擴展勢力，確實在策劃一些不好的事情。"
10032020-120 = "所以手段姑且不論，這在某種程度上也是為了公眾的利益。"
10032020-121 = "雖然我不否認這是在找藉口，但這份委託可能並沒有老師認為的那麼壞。"
10032020-128 = "……哈！"
10032020-129 = "這，這跟公益沒關係！我們只是拿錢辦事而已！#n只是目標碰巧相同而已，碰巧！！"
10032020-131 = "沒，沒錯！肯定是這樣！因為這是亞瑠大人決定的事！"
10032020-132 = "……唉。"
10032020-136 = "[ns1]「綁架幫派頭目啊……」\n[ns2]「這次的委託確實很『冷硬派』呢。」"
10032020-140 = "呵呵呵……對吧？老師果然也這麼想吧？"
10032020-141 = "因為終於接到配得上我們便利屋68的工作，所以我們都穿著成套的服裝來了。"
10032020-142 = "雖然很抱歉沒有提前告訴老師……"
10032020-143 = "但就算是老師，我也希望你不要反對或是妨礙我們的工作。#n為了我們的關係……"
10032020-144 = "……嗯？你說你知道了？"
10032020-145 = "咦，怎麼會……？這件事就這樣過去了嗎？"
10032020-151 = "社長怎麼能在這時候繼續反問呢……"
10032020-152 = "哈哈哈哈哈！！亞瑠醬慌到不行～！真有趣！"
10032020-158 = "可，可是……咦……？真的嗎……？"
10032020-159 = "……怎麼會……？"
10032020-160 = "[s3]「因為今天我來到這裡不是為了那件事。」\n[s4]「因為我相信亞瑠，所以並不擔心。」"
10032020-163 = "……老師……"
10032020-167 = "呵呵，呵呵呵……"
10032020-168 = "真不愧是老師，我挑選合作夥伴的眼光果然沒錯。"
10032020-169 = "我一直都相信老師能理解我們的冷硬派之路……"
10032020-170 = "雖然直到剛才還一直在重複「怎麼會」就是了。"
10032020-171 = "為了老師……作為合作夥伴的我們，也該提供更密切的支援才對。"
10032020-172 = "老師「調查歌劇」的工作……"
10032020-173 = "剛才雖然遇到了一點小騷動，但我願意以社長的身份協助老師。"
10032020-174 = "啊，不過當然是到幫派聯盟的頭目過來為止。#n因為在那之後就必須要處理我們的工作了。"
10032020-175 = "這樣沒問題嗎，社長？#n之前進行的「潛在風險排查作業」呢？"
10032020-176 = "一起進行就好了！反正也要帶老師在歌劇院繞一圈不是嗎？"
10032020-182 = "嘿～觀光客模式嗎？那我要不要再換上禮服？"
10032020-183 = "禮，禮服是嗎？結果我也得穿嗎……？"
10032020-184 = "啊，不是！我絕對不是討厭的意思。#n是，是因為，那是我完全，完全配不上的服裝……"
10032020-185 = "但，但是如果不和大家穿上同樣的裝扮，也會造成麻煩……"
10032020-189 = "我，我立刻去換……！！"
10032020-193 = "咯呵呵。我們很快就回來，稍微等一下喔，老師！"
10032020-199 = "……嗯……"
10032020-200 = "……老師。"
10032020-205 = "來……收下這個吧。"
10032020-206 = "[s5]「……無線通訊器？」\n[s6]「我也成為作戰的一員了嗎？」"
10032020-209 = "這本來是為了遙香或無月弄壞通訊器的情況做的準備……從結果來看也還不錯吧。"
10032020-210 = "不過這並不代表你必須跟我們結盟。#n硬要說的話，是為了老師的人身安全吧。"
10032020-211 = "雖然應該不會發生什麼大事……但還是要以防萬一。#n畢竟是跟幫派有關的事。"
10032020-215 = "其實……如果可以的話，我更希望老師直接回去……"
10032020-216 = "……不過老師想必是不會照做的吧。"
10032020-217 = "[s7]「嗯，以我的立場，確實是不太可能。」\n[s8]「我們都一樣擔心彼此。」"
10032020-220 = "唉……"
10032020-221 = "我知道，所以我才會把它交給你。"
10032020-226 = "不過還是要小心。#n雖然現在的氣氛，看起來應該不會有什麼大問題……"
10032020-227 = "不，「這裡」……並不是事情會順利進行的地方。"
10032020-228 = "……嗯？問我是不是有什麼頭緒？"
10032020-229 = "不，目前還沒有。如果有的話就會說出來勸你回去了吧。"
10032020-230 = "只是，該說是一直以來的經驗嗎……讓我產生了那種想法。"
10032020-235 = "……也可以說是長久累積下來的直覺吧。"

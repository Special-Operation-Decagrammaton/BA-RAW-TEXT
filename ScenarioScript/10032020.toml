[translation]
10032020-1 = "Episode 2;More Hard-boiled"
10032020-2 = "...Abduct the leader of the Gang Alliance? Don Arancino himself...?"
10032020-4 = "I know it's hard to believe, but that's the job."
10032020-5 = "And we're expected to just take that at face value? Especially coming from a member of the Arancino family?"
10032020-6 = "You have to understand why we're suspicious of someone who wants to kidnap their own boss."
10032020-7 = "That's valid. I get how it sounds."
10032020-8 = "But let's get one thing straight. I'm not betraying the boss. This is all for the health of the family."
10032020-9 = "The boss... He's been reckless recently. At this rate, it'll be the end of the Arancinos as we know it."
10032020-13 = "So you're going to abduct him before he can do more harm. You realize you're not exactly asking us to steal a chocolate bar from the store, right?"
10032020-14 = "...I'm well aware. I think you'll find the reward to be more than fair compensation for the danger of the job."
10032020-15 = "It's not just the money that's the problem—"
10032020-17 = "She's right, there's no problem at all! Well, there is, but that's what Problem Solver 68 is here for! Heeheehee."
10032020-19 = "Boss?"
10032020-20 = "...?!"
10032020-25 = "A dangerous job? Sounds pretty hard-boiled to me."
10032020-26 = "And who better to take on such a hard-boiled job than a couple of outlaws like ourselves? Consider it mission complete!"
10032020-28 = "Heeheehee. What a switch up, Aru!"
10032020-29 = "...Ugh."
10032020-30 = "*sigh*"
10032020-34 = "Just like that? I guess I shouldn't be surprised."
10032020-35 = "You live up to your reputation, Problem Solver 68."
10032020-36 = "Upon successful receipt of the target, I'll pay you four times the initial deposit."
10032020-37 = "That is, if you succeed."
10032020-38 = " ...Are you doubting our capabilities right now?"
10032020-39 = "I didn't mean to offend. Think of it as an occupational hazard. Always gotta proceed with caution."
10032020-40 = "And our boss... Arancino, he's the definition of caution. You can expect him to have a plan A, B, and C in place when it comes to security."
10032020-41 = " Hm... "
10032020-42 = " It doesn't matter how many plans he has. We'll blast through all of them."
10032020-43 = "I like that answer. Then let's proceed."
10032020-44 = "I'll reach out with details once I've confirmed the date and time. We'll provide you with blueprints and a guest list as well."
10032020-45 = "So sit tight till then."
10032020-53 = "...Hey. Boss?"
10032020-54 = "A-A-Aru?!"
10032020-55 = "Why do you guys look like someone died?"
10032020-56 = "How do I put this... Boss, do you have any idea who the Arancino family is?"
10032020-57 = "What makes you think I don't? Obviously, they're a gang! Or something of the sort..."
10032020-58 = "I mean, you're not technically wrong..."
10032020-65 = "...What..."
10032020-67 = "What did you say?!"
10032020-69 = "A-A-Are you serious right now?! The head of the Gang Alliance? I thought this was just something like the Helmet Gangsters!"
10032020-70 = "How did super villains like that discover our office location?!"
10032020-71 = "...Maybe it was all of the posters and online ads. We weren't exactly hiding it. "
10032020-72 = "But I'm shocked you're so shocked. It's not like this is our first time dealing with criminals."
10032020-73 = "Maybe it's because they're a huuuge organization and that made her scared? Right, Aru?"
10032020-77 = "I'm not scared! Not in the slightest! I'm obviously going to be a little nervous when we're dealing with big money like this. That's all!"
10032020-78 = "This is compensation way beyond our normal pay grade. This job is the definition of hard-boiled!"
10032020-79 = "My favorite thing about Aru is how predictable she is. Heehee!"
10032020-80 = "...You sure about this, Boss?"
10032020-81 = "Not trying to rain on your parade, but \"beyond our normal pay grade\" is an understatement."
10032020-82 = "What about it?! That's exactly why we have to take this job! Otherwise, we'll be stuck looking for cats and taking down neighborhood bullies forever."
10032020-88 = "Huh? I never had a problem with that."
10032020-89 = "Me neither! In fact, I'll keep living on the streets, in dumpsters, wh-wherever! As long as I'm with you, Aru!"
10032020-91 = "Gyah! We were only homeless for a little bit, okay?! It really wasn't that long! Stop bringing up bad memories!"
10032020-92 = "This is exactly why we need to do this. We're going to elevate Problem Solver 68 to the next level."
10032020-93 = "Listen up, everyone! This is the opportunity of a lifetime!"
10032020-94 = "Once we succeed in this venture, we'll be a household name all throughout the underworld! Problem Solver 68 will be synonymous with hard-boiled!"
10032020-101 = "M-More...!"
10032020-111 = "More hard-boiled!"
10032020-115 = "...And that brings us up to speed."
10032020-117 = "Our first step was to sweep the Opera House and weed out all the Arancino small fry!"
10032020-118 = "I handled the due diligence, and the client's story added up."
10032020-119 = "I don't know what exactly, but Don Arancino's definitely been working on something to grow his faction."
10032020-120 = "So, you know, technically we're doing something for the good of the public, even if our methods aren't exactly Sensei-approved."
10032020-121 = "It sounds like we're making excuses, but it's above board, Sensei. More or less."
10032020-128 = "...Gah!"
10032020-129 = "No way! Helping people is just an unfortunate side effect. It's for money. Money!"
10032020-131 = "E-Exactly! That's what Aru decided!"
10032020-132 = "*sigh*"
10032020-136 = "[ns1] \"Abducting a gang boss is a job for outlaws.\"\n[ns2] \"This really is a hard-boiled job you've taken on.\""
10032020-140 = "I knew you'd see it, Sensei! Heeheehee."
10032020-141 = "We've finally received a job fit for our caliber. We even came in matching outfits!"
10032020-142 = "I am sorry I kept the details from you, Sensei."
10032020-143 = "But, you know, there might be negative consequences for our working relationship if you try to stop us, Sensei!"
10032020-144 = "...Huh? You get it?"
10032020-145 = "What's this? What do you mean? That's it? It was that easy?"
10032020-151 = "Just roll with it, Boss."
10032020-152 = "Hahaha! Look at her face! You really caught Aru off guard, Sensei!"
10032020-158 = "B-B-But... Huh? Are you sure?"
10032020-159 = "But why?"
10032020-160 = "[s3] \"I didn't come here to get in your way.\"\n[s4] \"At the end of the day, I trust you.\""
10032020-163 = "Sensei..."
10032020-167 = "Heehee. Heeheehee..."
10032020-168 = "As expected, Sensei. I knew my business instincts were right when I partnered with you."
10032020-169 = "This is the only natural outcome. Of course you would understand our hard-boiled journey."
10032020-170 = "Even though she was all like, \"Ah! But why?!\" a second ago."
10032020-171 = "...Anyways! Thank you for your continued support, Sensei! Problem Solver 68 welcomes your collaboration on this job."
10032020-172 = "In return, Sensei..."
10032020-173 = "Despite previous...complications, I swear to you we'll help you complete the Opera House video."
10032020-174 = "Until the Gang Alliance boss arrives, at least. We'll have our own work to do from that point onward."
10032020-175 = "You sure? What about that \"detective work\" stuff you were talking about?"
10032020-176 = "We'll kill two birds with one stone! I was in the middle of Sensei's tour of the Opera House regardless."
10032020-182 = "Heehee. Are we in spectator mode? Should I go put on my dress?"
10032020-183 = "Th-The dress? Do I really have to...?"
10032020-184 = "P-Please, no! I mean, I can't say no to Aru, but...! I-I'm not worthy of something so beautiful."
10032020-185 = "I don't want to cause trouble either...and I would stand out if I'm not following the dress code..."
10032020-189 = "P-Please wait for a moment!"
10032020-193 = "Heeheehee. I'll be right back, Sensei!"
10032020-199 = "Um..."
10032020-200 = "...Sensei."
10032020-205 = "Take it."
10032020-206 = "[s5] \"Is this a wireless communicator?\"\n[s6] \"Does this mean I'm part of the operation?\""
10032020-209 = "I figured Mutsuki or Haruka would probably break at least one, so I brought extra."
10032020-210 = "I'm not saying you need to join our side or anything. I'm just...looking out for you."
10032020-211 = "Things should go smoothly, but you never know with a gang boss, you know?"
10032020-215 = "Look, if I'm gonna be honest, you should go home and do your video another day."
10032020-216 = "...But I know you're not gonna listen to me."
10032020-217 = "[s7] \"I'm sorry, but you're right. I can't leave now.\"\n[s8] \"You worry about me, but I worry about you.\""
10032020-220 = "*sigh*"
10032020-221 = "I get it. That's just who you are. Which is exactly why I'm giving you this. So I can get in contact with you if I need to."
10032020-226 = "I know this job seems pretty cut and dry, but...just be careful, okay?"
10032020-227 = "You're on the wrong side of the tracks. Things are rarely rainbows and butterflies over here."
10032020-228 = "...Hm? It sounds like I think things are gonna go wrong?"
10032020-229 = "Nothing that serious... I'd drag you home right now if I did."
10032020-230 = "It's more of...a gut feeling."
10032020-235 = "...And my gut's been right more than once."

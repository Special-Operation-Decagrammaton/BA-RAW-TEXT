[translation]
2404-1 = "夜晚頃之，奔跑吧少女（２）"
2404-11 = "嗖嗖嗖嗖……！"
2404-13 = "悄悄的……"
2404-15 = "咻噠噠噠噠噠！"
2404-16 = "[s1] 「楓……？」\n[s2] 「……為什麼要用那麼華麗的動作？」"
2404-17 = "噓！老師，安靜點！"
2404-18 = "噓！老師，安靜點！"
2404-19 = "我現在是，馳騁在影子之中的忍者……"
2404-20 = "現在正是發揮，和實栗玩忍者遊戲的成果的時刻了！"
2404-21 = "啊，老師！不能踩到那邊！"
2404-22 = "[s]「咦，陷阱！？」"
2404-23 = "踩到那邊的線外面就出局了！"
2404-24 = "那裡的外側是大海！鯊魚在四處游走，掉下去的話就GAME OVER了！"
2404-25 = "啊，不過也不是一直踩在線上就安全了。"
2404-26 = "10秒以上在同個地方的話立足點會掉下去，要小心！"
2404-27 = "[s3] 「小時候常常玩的遊戲……！」\n[s4] 「那個現在不遵守不行！？」"
2404-28 = "呵呵，這點程度對修行部來說是家常便飯唷？"
2404-29 = "呵呵，這點程度對修行部來說是家常便飯唷？"
2404-30 = "老師還是個野，業……野魚呢！"
2404-31 = "[s5] 「好像很好吃呢。」\n[s6]「是『業餘』哦。」"
2404-32 = "啊，糟了！這樣下去的話會跟丟前輩們的！趕快走吧，老師！"
2404-33 = "啊，糟了！這樣下去的話會跟丟前輩們的！趕快走吧，老師！"
2404-34 = "我跳～！"
2404-37 = "[ns] 「那麼興奮的話會被發現的唷……？」"
2404-47 = "現在的前輩們……好像在說很重要的事情的感覺！"
2404-48 = "[s7] 「是嗎？」\n[s8] 「感覺只是平常的閒聊耶……？」"
2404-49 = "可是老師！在氣氛這麼好的地方，像這樣……"
2404-50 = "可是老師！在氣氛這麼好的地方，像這樣……"
2404-51 = "看著街道風景，兩個人……"
2404-52 = "哈！怎麼辦老師，我好像知道了！？"
2404-53 = "[s] 「……？」"
2404-54 = "椿前輩和三森前輩……竟然兩個人在瞭望台望著街道，說著重要的事，這也就是……！"
2404-55 = "……互相的，在確認藏匿在內心的決心也說不定！"
2404-56 = "[s] 「……？？」"
2404-57 = "「蔓延在這條街道的惡黨，必須由我們打倒才行……」"
2404-58 = "「是的。雖然很辛苦，不過就由我們來保護這條街道吧……！」"
2404-59 = "……像這樣的！"
2404-60 = "我在每週日早上的英雄動畫裡有看過這種情節！"
2404-61 = "[s]「？？？」"
2404-62 = "不過那樣的話，就讓人更想不通為什麼要丟下我單獨兩人！？"
2404-63 = "……必須再多多調查！一定還有什麼其他被隱藏的祕密……！"
2404-64 = "[s] 「楓，果然還是直接向她們──」"
2404-65 = "真相，就由我來究明！咻啪啪啪！！"
2404-71 = "剛才應該在這裡，前輩們在這裡做什麼……！？"
2404-75 = "[ns9] 「……流浪貓？」\n[ns10] 「該不會她們，將這些孩子……」"
2404-76 = "吉祥物！？"
2404-77 = "吉祥物！？"
2404-78 = "[s]「……咦？」"
2404-79 = "為了提升修行部的形象，想要將這些孩子當作吉祥物！？"
2404-80 = "這種，這種事……！唔……！"
2404-83 = "什，什麼！？就算那麼可愛的湊過來，我也不會被拉攏的……！"
2404-84 = "而且修行部的吉祥物明明是我！我不行嗎！？有什麼不足嗎！？"
2404-85 = "唔哇啊啊！椿前輩，三森前輩～～！"
2404-88 = "[ns] 「楓，等等……！」"
2404-90 = "（這之後也和楓一起跟蹤椿和三森，同時在百鬼夜行到處走來走去）"
2404-91 = "（雖然是這樣……）"
2404-92 = "前輩們經過的這個地方，到底有什麼樣的祕密……！？"
2404-93 = "是什麼呢，感覺好像有什麼奇怪的味道……嗅嗅，嗅嗅……！"
2404-94 = "……呼喵！？"
2404-97 = "根據我的天才超人頭腦的引導……！"
2404-98 = "這附近應該有什麼祕密才對！"
2404-99 = "……！"
2404-100 = "……！！"
2404-103 = "（楓栽入了各種地方，自己擅自遭到悲慘下場的連續……）"
2404-104 = "（接著……）"
2404-106 = "[s] 「啊咧，跟丟了……？」"
2404-107 = "唔……椿前輩，三森前輩……"
2404-108 = "丟下我，到底跑去哪裡……還有，到底在做什麼……"
2404-109 = "嗚……"
2404-110 = "[s] 「楓，今天先回去吧……？」"
2404-111 = "……不行。"
2404-112 = "這樣子，我，我……"
2404-113 = "恐怕，真的會──"
2404-117 = "……嗯？"
2404-118 = "在看哪裡啊蛤啊！"
2404-119 = "蛤啊！"
2404-121 = "咦，啊，那個……"
2404-122 = "[s] 「吶，打擾一下。」"
2404-124 = "外人給我滾！"
2404-125 = "滾！"
2404-126 = "我們剛才可是聽說有「野槌蛇的皮」才興奮的買了一大堆，結果全都是蟬的殼正覺得火大啊！！"
2404-127 = "火大啊！"
2404-128 = "[s] 「那倒是有點讓人同情。」"
2404-129 = "在這種時候給我撞上來，是怎樣啊妳這傢伙！"
2404-130 = "妳這傢伙！"
2404-132 = "唔哇啊啊啊！？"
2404-133 = "等一下。"
2404-134 = "妳們在做什麼！"
2404-136 = "啊，妳們是誰啊！"
2404-137 = "誰啊！"
2404-141 = "椿前輩，三森前輩……！？"
2404-142 = "妳們在對我們的後輩做什麼？"
2404-143 = "如果打算出手的話，我不會原諒妳們唷。"
2404-144 = "哈，那又怎樣！有意見的話就放馬過來啊！"
2404-145 = "來啊！"
2404-153 = "可惡，給我記住哦！？"
2404-156 = "嗚噎噎噎噎噎！"
2404-160 = "嗚……嗚……"
2404-161 = "[s] 「……嗚？」"
2404-162 = "嗚哇啊啊啊啊啊！！！椿前輩，三森前輩……！"
2404-168 = "已經沒事了，確實趕走了。"
2404-169 = "連老師也……究竟為什麼會在這裡？"
2404-170 = "[s] 「那是，就是……」"
2404-171 = "我想知道前輩們瞞著我是在做什麼……！"
2404-172 = "……嗯？"
2404-173 = "……什麼？"
2404-175 = "（向兩人大致說明了情況）"
2404-177 = "所以才……"
2404-178 = "這個，那是……"
2404-179 = "俯瞰著街道，兩個人下定了決心吧！？把我丟在一旁！"
2404-180 = "那邊的瞭望台，是為了檢查設備才過去的。"
2404-181 = "我們在看有沒有什麼壞掉的，或是以危險的狀態放置的設備，所以晚上在百鬼夜行的各處查看。"
2404-182 = "[s] 「好厲害呢……」"
2404-183 = "那，那麼，那些貓咪呢！？"
2404-184 = "那些流浪貓，是修行部新的吉祥物吧！？比起我那些貓咪比較可愛嗎！？"
2404-185 = "那些孩子，我們平常都會餵牠們飼料。"
2404-186 = "是的。每晚給牠們晚飯，同時在確認有沒有生病的孩子。"
2404-187 = "咦，那，那麼……那麼為什麼，要丟下我呢？"
2404-188 = "因，因為我，還完全不可靠嗎……！？"
2404-189 = "那是……"
2404-190 = "楓醬，那個答案楓醬應該也知道唷。"
2404-191 = "……？"
2404-192 = "之前，問妳「要一起去做夜晚的巡邏嗎？」的時候……"
2404-193 = "說了「因為很睏所以前輩們自己去就好」的是楓醬吧？"
2404-194 = "……"
2404-196 = "……啊咧？"
2404-197 = "[s] 「忘記了啊……」"
2404-198 = "就算是社團活動，不過也不是強制的。"
2404-199 = "畢竟每晚活動也很辛苦。"
2404-200 = "不過嘛我這個時間帶比較強，還是該說眼睛很清醒。嗯，狀態良好！"
2404-201 = "畢竟椿醬是夜貓型呢，呵呵。"
2404-202 = "[s] 「確實，比平常還要活潑……」"
2404-203 = "確，確實被那麼說的話，好像真的有說過那種話的，感覺……？"
2404-204 = "嗯，楓確實那麼說了唷。"
2404-205 = "不過，沒想到會變成這樣……對不起。"
2404-206 = "讓妳一個人，有了寂寞的回憶了呢……"
2404-207 = "嗯，對不起哦。那再重新問一次，楓可以的話……要一起去，做夜晚的巡邏嗎？"
2404-208 = "……！"
2404-209 = "我，我想去！……可，可是，不過果然，晚上可能會很睏……那個，怎麼辦……？"
2404-210 = "……呵呵。"
2404-211 = "很有楓醬的風格呢。"
2404-212 = "[s] 「總之，解開了誤會太好了。」"
2404-213 = "唔，嗯！太好了～，果然前輩們很重視我呢……！"
2404-214 = "欸嘿，欸嘿嘿……！"
2404-215 = "話說回來，楓醬？"
2404-216 = "嗯？怎麼了，三森前輩？"
2404-217 = "楓醬像這樣這麼晚，不怎麼睏的感覺，出來外面也就代表……"
2404-218 = "我想應該不會有那種事不過楓醬，妳喝了咖啡嗎……？"
2404-219 = "……"
2404-220 = "……咻～咻～♪"
2404-221 = "楓醬……原本就很常熬夜了，我有說過不能喝咖啡吧？如果生理時鐘又亂掉，而變得痛苦的是楓醬唷！？"
2404-222 = "對，對不起！"
2404-224 = "老師也是同罪！"
2404-225 = "[s] 「明明不是我慫恿她的！？」"
2404-227 = "好了，從現在開始就是說教的時間唷！"
2404-228 = "這也沒辦法呢～"
2404-229 = "嗚哇啊啊啊啊～！"
2404-231 = "（就這樣解開了誤會，修行部的羈絆又更加深厚（？）了）"
2404-232 = "（可喜可賀可喜可賀）"
2404-233 = "完全不可喜可賀啊～！"
2404-234 = "夜晚頃之，奔跑吧少女"

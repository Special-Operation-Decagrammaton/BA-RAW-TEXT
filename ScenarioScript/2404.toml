[translation]
2404-1 = "Night Is Short, Go Run Girl. Part 2"
2404-11 = "*sneak* *sneak*"
2404-13 = "*creep* *creep*"
2404-15 = "Yah! *tap* *tap* *tap*"
2404-16 = "[s1] \"Uh, Kaede...?\"\n[s2] \"What are you doing?\""
2404-17 = "Shh! Sensei! You have to be quiet!"
2404-18 = "Shh! Sensei! You have to be quiet!"
2404-19 = "I'm secretly tailing them."
2404-20 = "It's time to show off the skills I've honed while playing spy with Mikuri!"
2404-21 = "Wait! You can't step there, Sensei!"
2404-22 = "[s] \"Wh-What's going on?\""
2404-23 = "You'll be out of bounds if you step outside the line."
2404-24 = "That's where the ocean is. It's full of sharks! "
2404-25 = "And stepping ON the line isn't safe either! "
2404-26 = "The lines are where lava is, so if you stay there for more than ten seconds, your feet will get too hot and you'll fall!"
2404-27 = "[s3] \"I get the rules, but come on!\"\n[s4] \"Hyakkiyako's playground rules are no joke...\""
2404-28 = "This is all standard stuff, right?"
2404-29 = "This is all standard stuff, right?"
2404-30 = "Sensei, you're more of an a-ama...ama-tuna than I thought!"
2404-31 = "[s5] \"I'm more of a tilapia person...\"\n[s6] \"You mean amateur?\""
2404-32 = "We don't have time for this! We're going to lose them at this rate. Let's hurry up and get after them, Sensei."
2404-33 = "We don't have time for this! We're going to lose them at this rate. Let's hurry up and get after them, Sensei."
2404-34 = "*jumps*"
2404-37 = "[ns] \"What happened to following after them quietly and secretly?\""
2404-47 = "I could sense they were having an important conversation just now."
2404-48 = "[s7] \"Huh? Were they?\"\n[s8] \"It looked like they were just chatting.\""
2404-49 = "Look closer, Sensei. They were standing here in front of the railing. Like this."
2404-50 = "Look closer, Sensei. They were standing here in front of the railing. Like this."
2404-51 = "And they were looking far into the distance as they were lost in conversation..."
2404-52 = "Ah-ha! I-I got it, Sensei! I think I know."
2404-53 = "[s] \"Know what?\""
2404-54 = "Why Tsubaki and Mimori were having a serious conversation as they looked over at the city."
2404-55 = "They must have been strengthening their resolve as members of the Inner Discipline Club by looking over the streets they've sworn to protect!"
2404-56 = "[s] \"What?\""
2404-57 = "\"We must clean these streets of villainy...\""
2404-58 = "\"Yes. It won't be easy, we'll protect everyone with our own two hands!\""
2404-59 = "That must have been what they were saying."
2404-60 = "It's just like shounen anime that comes on every Saturday morning!"
2404-61 = "[s] \"Um...?\""
2404-62 = "But why would they leave me out of it? "
2404-63 = "We have to keep following them for just a little while longer. I have to find out what they're up to!"
2404-64 = "[s] \"I honestly think this is just a misunderstanding, Kaede...\""
2404-65 = "Here I go! *tap* *tap* *tap* "
2404-71 = "They also passed this place! What were they doing here?!"
2404-75 = "[ns9] \"Street cats?\"\n[ns10] \"Maybe they've been feeding those cats.\""
2404-76 = "Must be mascots!"
2404-77 = "Must be mascots!"
2404-78 = "[s] \"Wait. What?\""
2404-79 = "They must be training mascots in secret to bolster the image of the Inner Discipline Club."
2404-80 = "Look at them! Here, like this!"
2404-83 = "They're coming closer a-and...attacking us with their cuteness!"
2404-84 = "I thought I was the mascot of the Inner Discipline Club! Am I not enough?!"
2404-85 = "Waaahhh! Tsubaki! Mimori!"
2404-88 = "[ns] \"W-Wait, Kaede!\""
2404-90 = "I followed after Tsubaki and Mimori along with Kaede, wandering from place to place throughout Hyakkiyako."
2404-91 = "And every time..."
2404-92 = "They just passed by here! There might be some kind of secret! I'll have to investigate!"
2404-93 = "*sniff* *sniff*"
2404-94 = "...?!"
2404-97 = "I'm sure of it this time. That's what my brilliant reasoning is telling me!"
2404-98 = "There's a secret somewhere around here, Sensei."
2404-99 = "...!"
2404-100 = "...!"
2404-103 = "I spent what felt like an eternity running from spot to spot with an energetic Kaede."
2404-104 = "Until finally..."
2404-106 = "[ns] \"They went this way.\""
2404-107 = "Yeah. Tsubaki and...Mimori..."
2404-108 = "Where did you guys go...without me...?"
2404-109 = "*whimper*"
2404-110 = "[s] \"I think it's time to go home, Kaede.\""
2404-111 = "No, Sensei..."
2404-112 = "If I don't find out the truth for myself, then..."
2404-113 = "...I'll be the only Inner Discipline Club member who..."
2404-117 = "Huh?"
2404-118 = "Did you just bump into me? You lookin' for a fight?!"
2404-119 = "Let's go!"
2404-121 = "But I didn't mean to..."
2404-122 = "[s] \"Let's just all calm down.\""
2404-124 = "Tch! Stay out of this, outsider!"
2404-125 = "Butt out!"
2404-126 = "It just so happens I bought a bunch of tsuchinoko skin earlier. But it turns out that con artist sold me cicada skin, so I'm in a real pissed off mood tonight!"
2404-127 = "Livid!"
2404-128 = "[s] \"I don't see what that has to do with us.\""
2404-129 = "I'm sayin' I'm going to take my frustrations out on you!"
2404-130 = "Yeah, on you!"
2404-132 = "You are?!"
2404-133 = "I suggest you calm down."
2404-134 = "Everyone, stop what you're doing!"
2404-136 = "Huh? Who are you?!"
2404-137 = "Yeah, who are you supposed to be?!"
2404-141 = "Tsubaki? Mimori?"
2404-142 = "What makes you think you can pick on our underclassman like that?"
2404-143 = "We're not going to stand by and watch if you decide to get violent."
2404-144 = "I'm not scared! Bring it on!"
2404-145 = "Yeah, bring it on!"
2404-153 = "D-Damn it! This isn't over!"
2404-156 = "D-Don't leave without me!"
2404-160 = "W-Wa... Wa...!"
2404-161 = "[s] \"Wa?\""
2404-162 = "Waaahhh! Tsubaki! Mimori!"
2404-168 = "It's okay, Kaede. The troublemakers are gone."
2404-169 = "What brings the two of you here, Sensei?"
2404-170 = "[s] \"Well, the thing is...\""
2404-171 = "You two keep going out without me! That's why I followed you!"
2404-172 = "Hmm?"
2404-173 = "Huh?"
2404-175 = "I then explained to the two of them what led to this."
2404-177 = "Oh, but actually..."
2404-178 = "Huh? But..."
2404-179 = "I was right, wasn't I? You two have been fighting to protect the city without me!"
2404-180 = "Not exactly. We're just doing routine checks on facilities."
2404-181 = "We walk around Hyakkiyako's streets at night to check for damaged areas or to see if there are any dangerously neglected facilities."
2404-182 = "[s] \"Facility maintenance...\""
2404-183 = "B-But! What about the cats?!"
2404-184 = "Those street cats are the new mascots of the Inner Discipline Club, right?! Because they're cuter than me?!"
2404-185 = "Oh, those? We've been taking care of them for a while now. "
2404-186 = "Yes, we stop by every night to give them some food and check to see that they're healthy."
2404-187 = "B-But...why are you doing all of this without me?"
2404-188 = "Is it because I'm the new girl and too inexperienced to be of use to you?! Waaah!"
2404-189 = "Well, it's because..."
2404-190 = "I can answer that, Kaede."
2404-191 = "*sniffle* You can...?"
2404-192 = "We asked you before if you wanted to join us on our nightly patrols."
2404-193 = "You told us to go without you because you were too sleepy, remember?"
2404-194 = "..."
2404-196 = "Huh?"
2404-197 = "[s] \"I had a feeling that was it.\""
2404-198 = "It's still only a voluntary club activity, so we can't force you to join us."
2404-199 = "And we understand that going out every night can be difficult."
2404-200 = "Personally, I feel like I'm at my best right now. See? I'm wide awake and at the top of my game."
2404-201 = "Yes, you always have been a night owl, Tsubaki. Heehee."
2404-202 = "[s] \"That would explain why she seems so lively.\""
2404-203 = "Um. So the reason you were going without me was because..."
2404-204 = "Yes, because that's what you wanted."
2404-205 = "We had no clue that you were regretting your decision. We're sorry, Kaede."
2404-206 = "We didn't mean to make you feel so lonely."
2404-207 = "I apologize as well. We won't leave you alone anymore if that's what you want. From now on, we'll wake you up and bring you with us."
2404-208 = "Uh...every time?"
2404-209 = "W-Wouldn't it be better if one of us got as much sleep as possible? To be better rested?"
2404-210 = "Pfft."
2404-211 = "Heeheehee."
2404-212 = "[s] \"So does this clear everything up?\""
2404-213 = "Y-Yeah. You were right all along, Sensei! It was just a big misunderstanding, and I was worrying over nothing. They were trying to be considerate!"
2404-214 = "Heh. Heehee!"
2404-215 = "But Kaede?"
2404-216 = "Yeah? What's up, Mimori?"
2404-217 = "The fact that you're out so late with Sensei and still awake must mean..."
2404-218 = "Kaede! Did you drink coffee after I told you not to?!"
2404-219 = "Oh..."
2404-220 = "I, uh...!"
2404-221 = "You already have enough trouble going to sleep, Kaede. Why would you drink coffee?"
2404-222 = "A-Ack!"
2404-224 = "And you, Sensei! You should know better!"
2404-225 = "[s] \"Why am I in trouble too?!\""
2404-227 = "This calls for a long lecture."
2404-228 = "You're not getting out of this one!"
2404-229 = "Waaah! Sensei, help!"
2404-231 = "And that's how the misunderstanding between the Inner Discipline Club was cleared up and everyone grew stronger."
2404-232 = "Let's celebrate. Celebrate."
2404-233 = "It's nothing to celebrate!"
2404-234 = "Night Is Short, Go Run Girl."

[translation]
21170-1 = "第17話;無止境的戰鬥"
21170-2 = "千年．校舍走廊"
21170-3 = "……"
21170-4 = "……"
21170-5 = "……"
21170-7 = "……"
21170-8 = "原來如此……"
21170-9 = "遊戲開發部啊。是我沒聽過的社團呢……"
21170-10 = "就是被那些傢伙攻擊了，對吧？"
21170-11 = "……非常抱歉。"
21170-12 = "接受這個委託，進行作戰準備的是我。"
21170-13 = "讓女僕部的名譽受損了……"
21170-14 = "那種事我才不在意。"
21170-15 = "……咦？"
21170-16 = "而且，我剛回來的時候收到了莉央的聯絡。"
21170-17 = "研討會的……千年的學生會長傳來的？"
21170-18 = "沒錯。"
21170-19 = "撤回委託。就當作沒這回事。"
21170-20 = "！？"
21170-21 = "那是，為什麼呢……？"
21170-22 = "我才不知道咧……不過，可能莉央和陽葵都有想要確認的事情吧。"
21170-23 = "確認……我們的力量，是嗎？"
21170-24 = "正好相反。"
21170-25 = "是那個，叫做愛麗絲的傢伙吧。"
21170-26 = "嘛，關於他們的事情我也不清楚。"
21170-27 = "雖然已經和委託沒關係了……"
21170-28 = "朱音，你去調查一下吧。"
21170-29 = "我嗎？要調查什麼呢？"
21170-30 = "遊戲開發部，連相關的人都一起調查。"
21170-31 = "這麼突然是為什麼呢……是要，復仇嗎？"
21170-32 = "他們的表現讓我有點不爽呢……總之我有點興趣。"
21170-33 = "等把情報看過一遍後，就到他們那裡一趟吧。"
21170-34 = "是，求之不得。現在那些孩子應該正在為了打敗女僕部而開心吧。"
21170-35 = "呵呵，下次再見的時候他們會露出怎樣的表情呢……真令人期待。"
21170-38 = "千年．遊戲開發部"
21170-39 = "……"
21170-40 = "……"
21170-41 = "……"
21170-42 = "上一次這麼失落……還是在上傳《故事．傳說．編年史》初版的時候呢……"
21170-46 = "那，那個，桃井……？"
21170-47 = "呼呼，呼嘿嘿嘿，都結束了！完蛋啦！！！"
21170-50 = "綠，綠？那個，還好嗎？"
21170-51 = "愛麗絲醬，抱歉……我現在什麼話都不想說……"
21170-54 = "呃，柚子──"
21170-55 = "憤怒、破滅、腐蝕、絕望、虛脫……世界現在正走向破滅……"
21170-57 = "聽，聽我說！那個，我有點不太理解……"
21170-58 = "會變成這個狀況，"
21170-60 = "是因為G.Bible的關係嗎？"
21170-62 = "……"
21170-63 = "……"
21170-65 = "那個，我覺得G.Bible應該沒有騙人才對……"
21170-67 = "才　不　是　那　個　問　題　！　！"
21170-70 = "！？"
21170-71 = "我還巴不得它跟我說這一切都是騙人的！"
21170-72 = "哇啊啊啊啊，完蛋了！我們要廢社了！嗚嗚嗚嗚嗚嗚！"
21170-73 = "？？？"
21170-75 = "千年．遊戲開發部"
21170-76 = "（2小時前……）"
21170-77 = "嗨～遊戲開發部的小朋友們！真紀醬帶禮物來給你們囉！"
21170-79 = "終於！"
21170-80 = "鏘鏘！"
21170-82 = "G.Bible.exe……執行準備完成"
21170-83 = "我們終於，得到了G.Bible……！"
21170-84 = "讓你們等這麼久真抱歉。#n因為我們還得把「鏡子」還給研討會，所以也是有點手忙腳亂呢。"
21170-85 = "咦咦，你們把「鏡子」還回去了嗎！？"
21170-86 = "其實，陽葵前輩從一開始就都知道了的樣子，#n還說那種東西就給他們也沒關係，之後不要再亂來了。耶嘿嘿。"
21170-87 = "啊，還有。我在打開G.Bible的時候發現了＜Key＞這個資料夾。"
21170-88 = "這是什麼……是唸「Kei」嗎？"
21170-89 = "……Kei？"
21170-90 = "是唸「Key」才對吧！姐姐你到底是怎麼考上高中的啊？"
21170-93 = "其實，關於這裡面的東西我們完全搞不懂。雖然看起來不像是文件損壞了……#n但是以我們所知的機械語言無法解讀，有著一種不可思議的結構。"
21170-94 = "G.Bible這邊雖然已經順利開啟了，我們稍微看了一下，也是什麼都沒搞懂。#n關於這個＜Key＞，你們知道些什麼嗎？"
21170-95 = "不，我們也完全……"
21170-96 = "……"
21170-97 = "難道說，＜Key＞就是……"
21170-100 = "[56cd7b]你是AL-1S嗎？"
21170-103 = "千年．遊戲開發部"
21170-104 = "難道是，那時候的……？"
21170-105 = "嗯？發生過什麼嗎？不過總之現在G.Bible比較重要吧。"
21170-106 = "＜Key＞就之後再處理吧。如果有時間的話我們會再努力分析看看的。"
21170-107 = "那麼，東西也平安送到了。下次見囉！"
21170-109 = "謝謝你，真紀醬！"
21170-110 = "下次見面的時候就連絡我們的秘書吧！畢竟我們的《TSC2》肯定會大賣的！"
21170-111 = "啊哈哈，我很期待唷！"
21170-113 = "大家，集合！"
21170-114 = "讓我們再次……來看G.Bible吧。"
21170-115 = "就像大家知道的一樣，這裡面究竟放了什麼幾乎沒有人知道。#n但是根據最後看到過G.Bible的，某個超厲害的遊戲製作人所說……"
21170-116 = "「是關於開發遊戲的密技。是彷彿大家都知道，卻誰也不知道的奇蹟」……#n他是這麼說的。"
21170-117 = "我也想要知道那是什麼。"
21170-118 = "嗯……為了做出最棒的遊戲。"
21170-119 = "沒錯。只要能做出來，未來大家就能繼續待在這裡了。"
21170-120 = "要是失敗的話……柚子就得回到宿舍，不得不看到那些不想見到的人。#n而且，愛麗絲也……"
21170-121 = "……雖然不想考慮這種情況。但那個時候老師和夏萊肯定會幫助你的。"
21170-124 = "夏萊……？雖然能和老師在一起很開心……"
21170-125 = "但是愛麗絲就不能在這裡……和大家在一起了嗎？"
21170-126 = "……！"
21170-127 = "不會有那種事的！我們一定會做出最棒的遊戲來的！"
21170-128 = "別擔心，《TSC2》也會成為愛麗絲心中的「神作」的。"
21170-129 = "那麼，接下來就……"
21170-130 = "要開始了唷，愛麗絲！"
21170-131 = "是。"
21170-132 = "G.Bible……"
21170-133 = "啟動！"
21170-135 = "下一話;G.Bible"

[translation]
21170-1 = "ตอนที่ 17;การต่อสู้ที่ไม่สิ้นสุด"
21170-2 = "ทางเดินในอาคารเรียนหลัก มิลเลเนียม"
21170-3 = "......"
21170-4 = "......"
21170-5 = "......"
21170-7 = "......"
21170-8 = "เดี๋ยวนะ..."
21170-9 = "ชมรมพัฒนาเกม... งั้นเหรอ? ไม่ยักรู้เลยว่ามีชมรมแบบนั้นด้วย"
21170-10 = "นี่แปลว่าเราถูกเด็กพวกนั้นหลอกเอาเหรอ?"
21170-11 = "น่าละอายชะมัด..."
21170-12 = "ฉันเองค่ะที่เป็นคนรับภารกิจและเตรียมแผนการ"
21170-13 = "ขอโทษที่ทำให้อัตราความสำเร็จของภารกิจของชมรมเมดเกิดความด่างพร้อยนะคะ"
21170-14 = "เรื่องนั้นไม่เป็นไรหรอก"
21170-15 = "...เอ๋?"
21170-16 = "ริโอะติดต่อฉันตอนที่ฉันมาถึงที่นี่แล้วล่ะ"
21170-17 = "ประธานสภานักเรียนของเซมิน่า... ไม่สิ... ของมิลเลเนียมเหรอคะ?"
21170-18 = "ใช่"
21170-19 = "ติดต่อมาว่าจะยกเลิกภารกิจ"
21170-20 = "?!"
21170-21 = "ทำไมล่ะ...?"
21170-22 = "ฮึ่ม ฉันว่าริโอะหรือฮิมาริคงต้องการทดสอบน่ะ"
21170-23 = "ทดสอบเหรอคะ... ทดสอบพวกเราเหรอ?"
21170-24 = "ไม่ใช่หรอก"
21170-25 = "น่าจะเป็นความสามารถของยัยเด็กอาริสึนั่น"
21170-26 = "ก็ดีแล้วล่ะนะ"
21170-27 = "ไหนๆ ก็ไม่เกี่ยวกับภารกิจแล้ว"
21170-28 = "อาคาเนะ เธอไปสืบมาสิ"
21170-29 = "คะ? สืบอะไรเหรอคะ?"
21170-30 = "ชมรมพัฒนาเกมน่ะ"
21170-31 = "จู่ๆ ทำไมถึง.... อ๋อ... จะแก้แค้นใช่ไหมคะ?"
21170-32 = "ฉันไม่สนใจอะไรสกปรกๆ แบบนั้นหรอก แต่ก็... อาจจะทำไปด้วยกันก็ได้"
21170-33 = "ถ้าสืบมาได้แล้วก็ไปชมรมพัฒนาเกมกัน"
21170-34 = "นี่แหละค่ะที่ฉันหวังไว้ ตอนนี้เด็กพวกนั้นคงดีใจอยู่ที่เล่นงานชมรมเมดได้"
21170-35 = "ฮุฮุ อยากรู้จังเลยค่ะว่าเด็กพวกนั้นจะทำหน้ายังไงตอนที่เราไปหา"
21170-38 = "ชมรมพัฒนาเกมมิลเลเนียม"
21170-39 = "......"
21170-40 = "......"
21170-41 = "......"
21170-42 = "เราไม่ได้หมดหนทางแบบนี้มาตั้งแต่... ตั้งแต่ที่อัปเดตเทลส์ ซาก้า โครนิเคิล โปรโตไทป์แล้วนะ..."
21170-46 = "คือว่า... โมโมอิ"
21170-47 = "ฮ่ะฮ่ะฮ่ะ ฮ่าฮ่าฮ่าฮ่า หมดแล้ว! หมดกัน!!!"
21170-50 = "เป็นอะไรหรือเปล่าคะ... มิโดริ?"
21170-51 = "ขอโทษนะ... อาริสึจัง... ตอนนี้ฉันไม่อยากพูดอะไรทั้งนั้น..."
21170-54 = "เอ่อ... ยู..."
21170-55 = "ความโกรธ... ความพินาศ... การพังทลาย... ความสิ้นหวัง... ความห่อเหี่ยว... โลกกำลังจะล่มสลาย..."
21170-57 = "ทะ.. ทุกคนคะ! ฉันเองก็ไม่ได้เข้าใจอะไรมาก..."
21170-58 = "หรือว่า..."
21170-60 = "เป็นเพราะ G.Bible หรือเปล่าคะ?"
21170-62 = "......"
21170-63 = "......"
21170-65 = "อืม... แต่ G.Bible ไม่น่าจะโกหกนะ"
21170-67 = "อย่ามาตลกน่า!"
21170-70 = "?!"
21170-71 = "โกหกซะยังดีกว่า! ถ้าเป็นแบบนั้นฉันก็คงโมโหน้อยกว่านี้!"
21170-72 = "อ๊าาาาาาาา จบเห่แล้ว! เราโดนยุบชมรมแน่!"
21170-73 = "???"
21170-75 = "ชมรมพัฒนาเกมมิลเลเนียม"
21170-76 = "(2 ชั่วโมงก่อนหน้า)"
21170-77 = "หวัดดีเพื่อนๆ ชมรมพัฒนาเกม! มากิจังคนนี้เตรียมของขวัญมาให้เพื่อนๆ ด้วยล่ะ!"
21170-79 = "ว้าว! ในที่สุด!"
21170-80 = "ทาด๊าาา!"
21170-82 = "เตรียมติดตั้ง G.Bible.exe เรียบร้อย"
21170-83 = "ในที่สุด... พวกเราก็จะได้ติดตั้ง... G.Bible.exe!"
21170-84 = "ขอโทษที่มาช้านะ สุดท้ายแล้วพวกเราก็ต้องเอา <กระจก> ไปคืนสภานักเรียน#nแต่ก่อนจะไปคืนเราก็ได้ G.Bible มาแล้วล่ะ"
21170-85 = "เอ๋?! เอาไปคืนเหรอ?"
21170-86 = "ก็รุ่นพี่ฮิมาริบอกว่ารู้รายละเอียดอยู่แล้ว แถมยังบอกว่าของแค่นั้นเอาไปคืนก็ไม่เสียหาย#nและก็ไม่ให้เราหักโหมมากไปอีกด้วย แหะๆ"
21170-87 = "อ่า! แล้วก็นะ ระหว่างที่กู้คืน G.Bible ฉันเจอไฟล์ที่ชื่อว่า <Key> ด้วยล่ะ"
21170-88 = "มันอ่านว่า... เคย์... หรือเปล่านะ?"
21170-89 = "เคย์...?"
21170-90 = "คีย์ต่างหากเล่า! นี่พี่สอบเข้า ม.ต้น ผ่านได้ยังไงกันน่ะ?!"
21170-93 = "อืม ฉันไม่ถนัดเรื่องนี้เลยล่ะ แต่ช่างเถอะ! ที่ฉันจะบอกก็คือ ตัวไฟล์ก็ไม่ได้เสียหายอะไร#nแต่มันถูกสร้างขึ้นด้วยภาษาที่คอมพิวเตอร์ยุคเราก็ถอดรหัสไม่ได้"
21170-94 = "ฉันเองก็พยายามกับ G.Bible อย่างเต็มที่แล้ว แต่ก็ตรวจสอบ <Key> นี้ไม่ได้เลย มันคืออะไรกันนะ?"
21170-95 = "พวกเราก็ไม่รู้เหมือนกัน"
21170-96 = "......"
21170-97 = "หรือว่า... <Key> จะหมายถึง..."
21170-100 = "[56cd7b]คุณคือ AL-1S ใช่หรือไม่?"
21170-103 = "ชมรมพัฒนาเกมมิลเลเนียม"
21170-104 = "อืม... รหัสอาริสึจังในตอนนั้น...?"
21170-105 = "เอ๋? มีเรื่องอะไรแบบนั้นด้วยเหรอ? ในเมื่อตอนนี้ G.Bible เป็นสิ่งสำคัญที่สุด"
21170-106 = "ถ้ามีเวลาพวกเธอก็ไปสืบค้นเกี่ยวกับ <Key> มานะ~ แล้วฉันจะช่วยวิเคราะห์อีกแรง"
21170-107 = "เอาล่ะ! หมดหน้าที่ของฉันแล้ว~ ไว้เจอกันใหม่!"
21170-109 = "ขอบใจนะมากิจัง~"
21170-110 = "ถ้าจะมาเจอกันคราวหน้าก็ติดต่อผ่านเลขามานะ~ เดี๋ยวฉันจะต้องดังระเบิดด้วย T.S.C 2 แล้วยังไงล่ะ!"
21170-111 = "ฮ่าฮ่า! แล้วจะรอดูเกมใหม่นะ"
21170-113 = "อาริสึ! ยูสึ! มิโดริ! ทุกคนมารวมตัวกันเดี๋ยวนี้!"
21170-114 = "เราจะมาดู G.Bible กัน"
21170-115 = "ไม่มีใครรู้เลยว่าในนี้มีข้อมูลอะไรอยู่ ผู้พัฒนาที่มีชื่อเสียงที่ว่ากันว่าเป็นคนเห็น G.Bible#nเป็นคนสุดท้ายบอกเอาไว้ว่า"
21170-116 = "G.Bible คือความลับที่แท้จริงของการพัฒนาเกม คือปาฏิหาริย์ที่ทุกคนคิดว่ารู้ดีอยู่แล้ว#nแต่จริงๆ แล้วก็ไม่มีใครล่วงรู้ได้เลย'"
21170-117 = "และฉัน... อยากรู้ความลับที่ว่านี้"
21170-118 = "...เพราะอยากทำเกมที่ดีที่สุดออกมาให้ได้"
21170-119 = "ต้องทำให้ได้ เราจะได้อยู่ที่นี่ด้วยกันต่อไป"
21170-120 = "หากล้มเหลวขึ้นมา... ยูสึก็ต้องกลับไปอยู่หอพักและเจอกับพวกเด็กที่ไม่ชอบ... ส่วนอาริสึก็..."
21170-121 = "ฉันก็ไม่อยากคิดเผื่อถึงว่าหากเราทำไม่สำเร็จหรอกนะ...#nแต่คุณครูก็บอกว่าชาเล่ต์จะเข้ามาช่วยเอง"
21170-124 = "ชาเล่ต์เหรอ...? ได้ร่วมมือกับคุณครู... ก็ดีอยู่หรอกนะคะ..."
21170-125 = "แต่นั่นก็หมายความว่าอาริสึจะ... จะไม่ได้อยู่ที่นี่กับทุกคนงั้นเหรอคะ?"
21170-126 = "......?!"
21170-127 = "ไม่มีทางเป็นแบบนั้นหรอก! พวกเราจะทำสุดยอดเกมขึ้นมาให้ได้!"
21170-128 = "แล้วอาริสึจะได้พูดว่า 'ลองเล่น TSC 2 หรือยังคะ? เกมเทพจริงๆ ค่ะ' แน่นอน"
21170-129 = "เอาล่ะ ถ้าอย่างนั้น..."
21170-130 = "อาริสึ! เริ่มได้เลย!"
21170-131 = "ค่ะ"
21170-132 = "เปิด..."
21170-133 = "G.Bible!"
21170-135 = "ตอนต่อไป;G.Bible"

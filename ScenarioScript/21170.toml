21170-77 = "Hello, hello, Game Development Department gals. Miss Maki here's got a special something for ya."
21170-79 = "Oh! It's finally ready!"
21170-80 = "Ta-da!"
21170-82 = "G.BIBLE.exe: prepared for runtime."
21170-83 = "It's really here...the G.BIBLE!"
21170-84 = "Sorry for the wait. We took the Mirror back to the Student Council after unlocking the G.BIBLE."
21170-85 = "Huh? You returned the Mirror?"
21170-86 = "Himari already knew everything. She said it's not a big deal, and we won't be needing it from now on."
21170-87 = "Oh, yeah, when I was decrypting the G.BIBLE, I found a folder called \"Key.\""
21170-88 = "Kei? But I thought you already unlocked it?"
21170-89 = "Kei?"
21170-90 = "She means they found it AFTER they unlocked it. Sis, how did you even pass the entrance exams...?"
21170-93 = "Hmm. This one's got me stumped. The file doesn't seem to be corrupted, but there's no way it was coded in a language from our era."
21170-94 = "Anyway, I was able to open the G.BIBLE like you wanted, but I couldn't get that key folder open. Any idea what it is?"
21170-95 = "Unfortunately, we don't know either."
21170-96 = "Hmm..."
21170-97 = "I wonder. Could the key be...?"
21170-100 = "[56cd7b]Identity check: Are you AL-1S?"
21170-103 = "Millennium Game Development Department"
21170-104 = "Um. You were looking for Aris, right?"
21170-105 = "Was I? Whatever, the G.BIBLE is the important thing here."
21170-106 = "Come by later when you've got some free time! We can analyze the key folder together."
21170-107 = "All right! I've delivered it to you, so I'll see you later!"
21170-109 = "Good work, Maki!"
21170-110 = "You'll have to schedule an appointment through my secretary next time we get together! 'Cause we're gonna make it big with TSC 2!"
21170-111 = "Heh. I'm excited to pop 'er open."
21170-113 = "Aris! Yuzu! Midori! Everyone, gather round!"
21170-114 = "It's time to look at the G.BIBLE."
21170-115 = "No one knows what's in here. A famous developer believed to have read the G.BIBLE once said: "
21170-116 = "\"The true secret of game development is a miracle everyone thought they knew, but, in fact, no one truly understood the meaning of.\""
21170-117 = "I want to know the truth so we can..."
21170-118 = "...make the best game ever."
21170-119 = "It's our only chance of being able to stay here together."
21170-120 = "If we fail, Yuzu has to go back to the dorm with people she doesn't like, and Aris..."
21170-121 = "I don't even want to think about it. But at least Sensei said Schale will help us if it comes to that."
21170-124 = "Schale? I like Sensei being with us."
21170-125 = "But are you saying I cannot be with you anymore?"
21170-126 = "Ah!"
21170-127 = "That's not gonna happen! We're definitely gonna make the best game ever!"
21170-128 = "Aris, soon you'll be asking people, \"Have you played TSC2? It's a masterpiece.\""
21170-129 = "And so to get there..."
21170-130 = "All right, Aris. Hit it!"
21170-131 = "Understood."

[translation]
41200-1 = "Episode 20; Fox in the Hole"
41200-2 = "Front of Valkyrie Police School Main Building Entrance"
41200-4 = "Welcome! As you can see behind me, I'm currently at Valkyrie Police School. The once well-respected school has seen better days as recent claims accuse them of illegal collusion with the Kaiser Group!"
41200-5 = "According to an anonymous tip sent to the Kronos School..."
41200-6 = "The students of the Public Peace Bureau have been wielding governmental power on behalf of the Kaiser Group in exchange for money and goods!"
41200-7 = "The world was shocked to hear that a police school entrusted with protecting the public would debase themselves to a petty mercenary group for their own private interests!"
41200-8 = "I'm still reeling in shock! To make matters worse, eyewitness accounts say the Valkyrie School was recently defeated by a group of robbers who destroyed the facilities!"
41200-9 = "This organization, supposed to keep the citizens safe, couldn't even protect their own home base!"
41200-10 = "Now the real question remains: is Kivotos still safe in the hands of Valkyrie Police School?"
41200-11 = "As more doubts pile up, apprehension is thick amongst the citizens!"
41200-18 = "What the hell do you think you're doing here?"
41200-19 = "Incredible! It's the director of the Public Peace Bureau herself, a key suspect in the investigation!"
41200-20 = "Director Kanna, please tell us! Why did you enter into an illegal contract with the Kaiser Group?"
41200-21 = "What? Where did you hear that from?"
41200-22 = "No, wait! This is a secure area! You have no authorization to film here!"
41200-23 = "The Feral Hound of Valkyrie is now threatening the media in a rage!"
41200-28 = "GET OUT! I'll break your cameras in half!"
41200-30 = "Kousagi Park"
41200-31 = "...The situation is spiraling very quickly."
41200-32 = "I-It's all they've been t-talking about on the news..."
41200-33 = "Wh-What if the Public Peace Bureau tries to get r-r-revenge?"
41200-35 = "You worry too much, Miyu. We did what was right and that's what matters."
41200-36 = "Anyways, who has time for revenge when they're fighting off a crowd of rabid reporters?"
41200-37 = "I can't put my finger on something..."
41200-38 = "What is it?"
41200-39 = "How do I say it... Everything moved so quickly. Corporate scandals normally move slowly and much more quietly."
41200-40 = "All parties were so...agreeable? The General Student Council hopped to their investigation like eager little bunnies, and even the Kaiser Group bowed their heads on the Kousagi Town redevelopment as if they hadn't poured millions into the project already."
41200-41 = "If I had to point to something... Sensei, did you threaten the General Student Council?"
41200-42 = "[s1] \"You did say to handle it as an adult would.\"\n[s2] \"I'd prefer to say that we came to an adult understanding?\""
41200-48 = "Well, either way, I'm relieved it's over."
41200-49 = "With the development project scrapped, they gain nothing spending time and money to evict the homeless population here."
41200-50 = "And we get to keep our home."
41200-52 = "Hm... A-Ahem!"
41200-61 = "Ah. An intruder."
41200-62 = "Oh dear, oh dear. My fingers have been itching to blow something up."
41200-63 = "Saki, be a pal and throw me one of my little babies."
41200-64 = "S-Stop it! I'm not an intruder! I'm saluting you!"
41200-65 = "...Salute?"
41200-66 = "Now you're speaking my language. It's when you greet someone with gunpowder and lead."
41200-67 = "You...You unintelligent hooligans!"
41200-68 = "No matter how I twist it, and trust me, I tried, a monk in pursuit of enlightenment such as myself has to pay my debts where they're due."
41200-72 = "...So... Well... You've done me a great service. More or less."
41200-74 = "I know the RABBIT Squad risked life and limb raiding Valkyrie to get evidence of their evil crimes and expose them."
41200-75 = "We've been able to reclaim our sanctuary in Kousagi Town and Pursuers have been trickling back to the fold one by one. Thanks to you... I guess."
41200-76 = "I know it wasn't for us, but we can't deny you've helped us."
41200-77 = "So I've brought you some of our most revered food. To repay our debt."
41200-83 = "Revered food? What? Tell me, now!"
41200-84 = "If it's a mung bean sprout bento I'll really let Moe blow you to the heavens."
41200-85 = "Please! We're city-dwelling seekers enlightened in the ways of non-possession. Naturally, I've most generously brought you the absolute best of what we have."
41200-86 = "Drumroll, please!"
41200-88 = "Voila! A chicken bone karaage!"
41200-95 = "Karaage...?"
41200-96 = "Correct! And it's no ordinary karaage! This luxury item is made from deep-fried bones! I mean... You can't eat it, but..."
41200-97 = "If you chew and suck on the bones, it's almost the same thing as eating a fried chicken! Without the calories!"
41200-98 = "To sweeten the deal, you can enjoy a fresh can of beer while sucking on the bone to pretend you're actually eating!"
41200-99 = "Please, don't all rush to thank me at once."
41200-105 = "Th-This isn't karaage..."
41200-106 = "This is an insult to food everywhere. It's worse than a mung bean sprout bento."
41200-107 = "N-N-No way! It's fried chicken! Can't you unenlightened idiots see that?!"
41200-108 = "You dare insult this masterpiece I've so generously offered you?!"
41200-110 = "Don't be mean. It's not food waste at all."
41200-111 = "According to Kivotos' garbage disposal regulations, chicken bones are classified as combustible waste. So, it's worse."
41200-117 = "Food waste this, combustible waste that..."
41200-118 = "You clearly have learned nothing about non-possessiveness! You...You gluttonous pigs don't understand the value of this delectable dish!"
41200-119 = "I should've known better! The Pursuers can never coexist with the greed that reeks from your soul!"
41200-120 = "You think we want to coexist with you hypocritical pieces of junk?"
41200-124 = "Moe, we still have the armor piercing explosives, right?"
41200-126 = "Let's wage war against these jerk turkeys!"
41200-138 = "...They never change, do they?"
41200-142 = "Chief of Defense Office"
41200-146 = "And we've come full circle."
41200-147 = "This incident has left Valkyrie on a very, very short chain. And I can't turn anywhere without those Kronos gnats buzzing in my face..."
41200-148 = "I really must have done something horrible in a past life to deserve to work with such incompetence."
41200-149 = "...That again?"
41200-150 = "Oh, you know I'm just complaining. Luckily, the rebate Kaiser Corporation kindly granted directly to us has flown under the radar."
41200-151 = "Director Kanna can handle the fallout while our plan continues in the background."
41200-152 = "Do you have time for your petty games? You should be trying to recruit more trustworthy colleagues."
41200-153 = "Trustworthy colleagues, you say..."
41200-159 = "...What about those underclassmen of yours? They're quite formidable."
41200-160 = "You can take the fighter out of the school, but not the fight out of the fighter. I realize they're still new, but they're still elite individuals who passed the SRT entrance exams."
41200-165 = "They have a very long way to go before they'll be fit to uphold the SRT banner."
41200-166 = "Oh Yukino, always so strict."
41200-167 = "No. You're soft, Niko."
41200-168 = "Thirty minutes? And all that commotion? Under my command, we would have been in and out under a minute with no one the wiser."
41200-173 = "Can you really compare a ragtag group of freshmen against veterans such as yourselves, Niko?"
41200-174 = "Which brings me back to my point."
41200-175 = "I'd like to invite the RABBIT Squad to join our coup d'etat."
41200-177 = "What say you, SRT Academy's infamous FOX Squad?"
41200-180 = "Fine by me."
41200-181 = "Even if it wasn't their intention, I'd like to crush them with my own hands for foiling the career paths of their upperclassmen."
41200-182 = "Oh, my. I hate to dirty the hands of such adorable little underclassmen."
41200-183 = "Even children like them understand that dirtying ourselves is the price we pay for enrolling at SRT. For our justice."
41200-185 = "This plan..."
41200-189 = "...No, everything we do is for the SRT's resurrection and Schale's demise."
41200-192 = "Rabbit of Caerbannog; To Be Continued in Chapter 2"

41200-4 = "3;시논;00;시청자 여러분. 저는 지금 현재 카이저 그룹과의 불법 유착으로 논란이 된 발키리 경찰학교의 본관 앞에 나와 있습니다!\n#3;em;[반짝]\n#3;greeting\n#3;a"
41200-5 = "3;시논;99;크로노스 스쿨에 날아든 익명의 제보에 따르면……"
41200-6 = "3;시논;02;공안국의 학생들이 카이저 그룹에서 금품을 수수하고 기업을 위해 공권력을 사용했다고 합니다!\n#3;closeup\n#3;em;[!]"
41200-7 = "3;시논;02\n1;마이;02;시민을 보호하고 정의를 수호해야 할 경찰 학생들이 일개 기업과 손을 잡고 사적인 이익을 추구하다니…… 충격적인 제보네요!\n#1;a\n#3;m5"

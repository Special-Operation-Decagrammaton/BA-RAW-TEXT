[translation]
41200-1 = "第20話;狐穴"
41200-2 = "ヴァルキューレ警察学校・本館前"
41200-4 = "私は今、カイザーグループとの癒着問題が噂になっているヴァルキューレ警察学校、その本館の前に来ています！"
41200-5 = "とある匿名希望の方からの情報によりますと……"
41200-6 = "どうやら公安局の生徒たちがカイザーグループから金品を受け取り、そのために権力を行使したのだとか！"
41200-7 = "市民を保護し正義を守るべきヴァルキューレが私企業と手を取っていたというのは、かなり衝撃的な情報です！"
41200-8 = "それに加えて先日、どうやら謎の集団がヴァルキューレ警察学校に侵入。施設の一部を破壊したとの情報も入ってきています。"
41200-9 = "ヴァルキューレの権威が揺らぐ事件が、立て続けに発生しています！"
41200-10 = "果たして真相はどうなのでしょうか！？"
41200-11 = "これらの件について解明するため、私たちは……！"
41200-17 = "\\"
41200-18 = "……何の騒ぎだ。"
41200-19 = "あっ、カンナ公安局長です！"
41200-20 = "突然ですが、今回の違法リベートの件につきまして一言頂けますでしょうか！"
41200-21 = "待て、それはどこからの情報で……"
41200-22 = "そもそもここは敷地内だ、許可は得ているのか？"
41200-23 = "おおっと、やはりマスコミと権力とは衝突する運命なのか！しかし私たちクロノスは決して――"
41200-28 = "良いからさっさと出ていけ！"
41200-30 = "子ウサギ公園"
41200-31 = "……すごいニュースになっていますね。"
41200-32 = "う、うん。朝からずっとそのニュースが……。"
41200-33 = "も、もしこれで公安局が襲撃しに来たら、どうすれば……？"
41200-35 = "別に関係無い。私たちはやるべきことをやっただけだ。"
41200-36 = "それにどうせ今は、クロノス含めて色々と対応しないといけないだろ。私たちに構ってる暇は無いはず。"
41200-37 = "それはそうなんだけど、何か引っかかるって言うか……。"
41200-38 = "どういうことだ？"
41200-39 = "何て言うか、めちゃくちゃ対応が速い。"
41200-40 = "連邦生徒会が調査チームを組織したのもそうだし、相当金がかかってたはずなのにカイザーもスッパリ再開発の中止を宣言するし……。"
41200-41 = "……先生、連邦生徒会に脅迫でもした？"
41200-42 = "[s1] \"いや、脅迫とかは別に……。\"\n[s2] \"……色々、込み入った事情があるみたいだね。\""
41200-48 = "……？とにかく、安心しました。"
41200-49 = "再開発が中止されるなら、放浪者の方々を追い出すことも無いでしょうし……。"
41200-50 = "……私たちも、ここにいられます。"
41200-52 = "あー、その……。"
41200-61 = "うわ、侵入者だ。"
41200-62 = "サキ、手榴弾ちょうだい。"
41200-63 = "朝のトレーニングがてら、軽く一発。"
41200-64 = "待て待て待て！侵入じゃない、あいさつに来たんだ！"
41200-65 = "……挨拶？"
41200-66 = "ああ、何か昔の本で読んだことある。「ちょっとした挨拶だぜ！」って言いながら鉛玉と爆薬をくらわせるあの……"
41200-67 = "これだから無法者は！！！"
41200-68 = "ああもう、とはいえ助けてもらった手前、何も言わないわけにも……。"
41200-72 = "……君たちには助けられてしまいました。"
41200-74 = "どうやら危険を顧みずヴァルキューレに潜入し、彼女たちの陰謀を暴いたのだとか。"
41200-75 = "おかげで私たちの聖所……子ウサギタウンも脅かされることがなくなり、「所確幸」の仲間たちも戻ってきています。"
41200-76 = "私たちのためではなかったのかもしれません。それでも恩を受けて知らぬ存ぜぬは、求道者としてできませんので……。"
41200-77 = "君たちのために、特別な食べ物をプレゼントしに来たのです。"
41200-83 = "特別な食べ物！？何それ！？"
41200-84 = "……まさかモヤシ弁当じゃないよな？"
41200-85 = "いえいえ、まさか。私たちが持っている中で最も貴重なものです。それはこちら……"
41200-86 = "鶏の骨を揚げた、"
41200-88 = "唐揚げです！"
41200-95 = "……唐揚げ、ですか？"
41200-96 = "はい。普通の唐揚げとは違って「鶏の骨」を揚げたものですので、そのまま食べることはできません。"
41200-97 = "しかしその香りはまさに普通の唐揚げ。この匂いを存分に味わうことで、楽しい気分を味わいながら、その実カロリーはゼロ。まさに革命的な食材です。"
41200-98 = "これ一つで、ビール3缶は飲めます！もちろんご飯にも相性はバッチリ。"
41200-99 = "さあ、存分に味わってください。"
41200-105 = "つ、つまりこれは「唐揚げ」じゃなくて……"
41200-106 = "……生ゴミか？"
41200-107 = "な、生ゴミ！？違いますよ、れっきとした唐揚げです！パーツが違うだけで！"
41200-108 = "まだ十分に楽しめる物を「生ゴミ」とは、失礼千万！"
41200-110 = "まあ、確かに生ゴミじゃないな。"
41200-111 = "この辺のゴミ出し規定によると、鶏の骨は「燃えるゴミ」に分類されるみたいだし。"
41200-117 = "さ、さっきから生ゴミだの、燃えるゴミだの……"
41200-118 = "こんな貴重な食べ物を前に、何たることを……！"
41200-119 = "やはり我々「所確幸」は、あなたたちとは相容れない！"
41200-120 = "それはこっちの台詞だ！"
41200-124 = "モエ、榴弾あるだけ持って来い！"
41200-126 = "よっしゃ、派手に爆発させよう！"
41200-138 = "……またこうなるんですか。"
41200-142 = "防衛室・オフィス"
41200-146 = "……やはりこうなってしまいましたか。"
41200-147 = "ヴァルキューレはしばらく動けそうにありませんね、クロノスもしつこそうですし……。"
41200-148 = "相変わらず、私は人に恵まれませんねぇ……。"
41200-149 = "……それは前にも聞いた。"
41200-150 = "ふふっ……とはいえ、カイザーとこちら側についての件は見つかってないようですし……。"
41200-151 = "計画に支障は無さそうですね。"
41200-152 = "その辺に気を遣っている暇があったら、信じられる仲間を増やすことに時間を使うべきでは？"
41200-153 = "信じられる仲間、ですか……。"
41200-159 = "そういえば、あなたの後輩たち……中々良さそうですね？"
41200-160 = "腐っても鯛と言いますか。熟練度は足りませんが、やはりSRTに入れただけのことはあります。"
41200-165 = "私からしたら、まだSRTを名乗るには未熟。"
41200-166 = "ユキノちゃんは厳しいねぇ。"
41200-167 = "ニコが甘いだけ。"
41200-168 = "もし私だったら、警報を鳴らさずに1分で脱出できた。"
41200-173 = "まあ、まだ1年生ですものね。みなさんのようなベテランの実績を期待するのも酷というものでしょう。"
41200-174 = "とはいえ、そうですね……使わないのは勿体ないですし。"
41200-175 = "私たちの「クーデター」計画に、彼女たちも参加させる……というのはどうでしょうか？"
41200-177 = "先輩としてどうですか？SRT特殊学園、「FOX小隊」のみなさん？"
41200-180 = "まあ、良いんじゃないかねぇ。"
41200-181 = "こうなったら、それくらいの埋め合わせはしてもらわないと。"
41200-182 = "可愛い後輩たちの手は汚したくなかったけど……仕方ないかな？"
41200-183 = "……仮にもSRTに入った身、最初から覚悟はしてたはず。"
41200-185 = "全ては、SRTの復活。そして――"
41200-189 = "シャーレ廃絶のために。"
41200-192 = "カルバノグの兎編;To be Continued in Chapter 2"

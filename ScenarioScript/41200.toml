[translation]
41200-1 = "第20話;狐穴"
41200-2 = "女武神警察學園．本館前"
41200-4 = "我現在，來到傳言和凱薩集團勾結的女武神警察學園本館前！"
41200-5 = "根據某個匿名人士的情報……"
41200-6 = "公安局學生似乎有收取凱薩集團的獻金，並行使公權力幫助企業！"
41200-7 = "應該守護正義庇護市民的女武神和私人企業勾結，真是相當衝擊的情報！"
41200-8 = "加上我們前幾天，還掌握到有神祕集團入侵女武神警察學園，破壞部份設施的情報。"
41200-9 = "動搖女武神權威的事件，正在接二連三的發生！"
41200-10 = "真相究竟如何呢！？"
41200-11 = "為了揭露這些事件，我們……！"
41200-18 = "……吵什麼吵。"
41200-19 = "啊，是環奈公安局長！"
41200-20 = "可以冒昧請您發表對於這次違法回扣的看法嗎！"
41200-21 = "等等，那情報從哪裡來的……"
41200-22 = "再者這裡是管制區，有得到許可嗎？"
41200-23 = "唉唷唷，媒體和權力命中注定要互相衝突嗎！不過我們克洛盧斯絕不會──"
41200-28 = "好了啦！給我趕快出去！"
41200-30 = "兔寶寶公園"
41200-31 = "……新聞鬧很大呢。"
41200-32 = "唔，嗯。從早上開始那則新聞就一直……"
41200-33 = "如，如果公安局因此跑來襲擊，該怎麼辦……？"
41200-35 = "也沒關係。我們只是做了我們該做的事。"
41200-36 = "而且，他們現在必須應付克洛盧斯和其他東西吧。應該沒有時間理我們。"
41200-37 = "話雖如此，但總覺得有點不對勁……"
41200-38 = "什麼意思？"
41200-39 = "總覺得應對的也太快了。"
41200-40 = "除了聯邦學生會迅速組織調查團，明明花費大量金錢的凱薩也很乾脆的宣布中止都更……"
41200-41 = "……難道老師跑去威脅聯邦學生會？"
41200-42 = "[s1] 「不，沒有威脅之類的……」\n[s2] 「……但似乎有各種複雜的原因呢。」"
41200-48 = "……？總之這下能安心了。"
41200-49 = "都更中止的話，遊民們也不會被趕出去了……"
41200-50 = "……我們也可以，待在這裡。"
41200-52 = "啊，那個……"
41200-61 = "嗚哇，是入侵者。"
41200-62 = "咲希，給我手榴彈。"
41200-63 = "當作是早上的訓練，來個一發。"
41200-64 = "等等等等等等！不是入侵，是來打招呼的！"
41200-65 = "……打招呼？"
41200-66 = "啊啊，我以前有在書上看過。聲稱「稍微打個招呼！」然後讓對方吃子彈或炸彈……"
41200-67 = "你們真的是不法之徒耶！！！"
41200-68 = "啊啊真是，但受到人家幫助，也不能不表示些什麼……"
41200-72 = "……我要感謝各位的幫助。"
41200-74 = "聽說各位不顧危險潛入女武神，踢爆她們的陰謀。"
41200-75 = "多虧如此我們的聖所……兔寶寶鎮也不會再受到威脅，「所確幸」的夥伴們也回來了。"
41200-76 = "也許各位不是為了我們。但我身為求道者，受人恩惠不能裝聾作啞……"
41200-77 = "因此我帶了特別的食物要送給各位。"
41200-83 = "特別的食物！？那是什麼！？"
41200-84 = "……該不會是豆芽菜便當吧？"
41200-85 = "不不，怎麼會。是我們持有的東西中最貴重的東西。那就是這邊的……"
41200-86 = "用雞骨炸成的，"
41200-88 = "唐揚雞！"
41200-95 = "……唐揚雞？"
41200-96 = "是的。和普通的唐揚雞不一樣是以「雞骨」炸成的，沒辦法直接吃。"
41200-97 = "然而香味和普通的唐揚雞一樣。藉由充分享受氣味，不但能心情愉快，實際熱量還是零。正是革命性的食材。"
41200-98 = "這一份就能配3罐啤酒！當然也非常下飯。"
41200-99 = "來，請盡情享用吧。"
41200-105 = "也，也就是說，這不是「唐揚雞」……"
41200-106 = "……是廚餘？"
41200-107 = "廚，廚餘！？才不是呢，是貨真價實的唐揚雞！零件不一樣而已！"
41200-108 = "把還可以充分享樂的東西稱為「廚餘」，真是失禮！"
41200-110 = "嘛，確實不是廚餘呢。"
41200-111 = "根據這區的垃圾處理辦法，雞骨似乎被分類為「可燃垃圾」。"
41200-117 = "一，一下叫人家廚餘，一下叫人家可燃垃圾……"
41200-118 = "面對這麼貴重的食物，也太不尊重人了……！"
41200-119 = "果然我們「所確幸」，沒辦法和你們共存！"
41200-120 = "那是我們的台詞！"
41200-124 = "萌，榴彈有多少拿多少過來！"
41200-126 = "好呀，爽快引爆吧！"
41200-138 = "……又變成這樣了嗎。"
41200-142 = "防衛室．辦公室"
41200-146 = "……果然變成這樣了嗎。"
41200-147 = "女武神暫時沒辦法行動了呢，克洛盧斯似乎也很難纏……"
41200-148 = "我還是一樣沒人緣呢……"
41200-149 = "……這句話之前也聽過了。"
41200-150 = "呵呵……雖然如此，凱薩和我們的關係似乎沒有被發現……"
41200-151 = "對計劃似乎沒有影響呢。"
41200-152 = "有時間在意那些事的話，不應該把時間拿去增加可以信任的夥伴嗎？"
41200-153 = "可以信任的夥伴啊……"
41200-159 = "話說回來，你的後輩們……似乎挺能幹呢？"
41200-160 = "該說是真金不怕火煉嗎。雖然熟練度不夠，但果然夠格進入SRT。"
41200-165 = "就我來看，他們還不夠資格自稱SRT。"
41200-166 = "雪乃醬真嚴格呢。"
41200-167 = "是仁子太寬容了。"
41200-168 = "換作是我，可以不觸發警報，在1分鐘內逃脫。"
41200-173 = "嘛，畢竟還是1年級嘛。要求成績要和老練的大家一樣也太嚴苛了。"
41200-174 = "但說的也是……不用就太浪費了。"
41200-175 = "不如讓她們也參加……我們的「政變」計劃吧？"
41200-177 = "身為前輩覺得怎麼樣呢？#nSRT特殊學園，「FOX小隊」的各位？"
41200-180 = "嘛，也沒什麼不好的吧。"
41200-181 = "這樣的話，必須先跟她們達成共識才行。"
41200-182 = "雖然不想讓可愛的後輩們弄髒雙手……不過也沒辦法吧？"
41200-183 = "……好歹也是SRT的學生，最初就該有覺悟了。"
41200-185 = "一切都是為了復興SRT。以及──"
41200-189 = "廢止夏萊。"
41200-192 = "卡班諾的兔子篇;To be Continued in Chapter 2"

[translation]
41200-1 = "ตอนที่ 20;จิ้งจอกในถ้ำ"
41200-2 = "หน้าทางเข้าอาคารส่วนกลาง สถาบันฝึกตำรวจวัลคิรี่"
41200-4 = "ผู้ชมทุกท่านคะ ตอนนี้ฉันมาอยู่ที่สถาบันฝึกตำรวจวัลคิรี่ที่กำลังเป็นที่ถกเถียงว่าร่วมเป็นภาคีกับ#nไคเซอร์กรุ๊ปค่ะ"
41200-5 = "จากข้อมูลของแหล่งข่าวนิรนามของสำนักข่าวโครโนส..."
41200-6 = "นักเรียนของกรมความมั่นคงสาธารณะรับสินบนจากไคเซอร์กรุ๊ปแล้วใช้อำนาจเพื่อผลประโยชน์#nของตัวเองค่ะ!"
41200-7 = "นักเรียนตำรวจที่ต้องปกป้องประชาชนและพิทักษ์ความยุติธรรมกลับมาจับมือกับองค์กรธุรกิจเพื่อ#nแสวงหาผลประโยชน์ส่วนตัวเหรอคะเนี่ย... ช่างเป็นข้อมูลที่น่าตกใจจริงๆ ค่ะ!"
41200-8 = "ใช่ค่ะ นอกจากนี้พยานยังให้การเพิ่มเติมด้วยว่าเมื่อคืนมีกลุ่มโจรลึกลับบุกเข้าไปทำลายข้าวของใน#nโรงเรียนตำรวจด้วยค่ะ"
41200-9 = "แม้แต่การรักษาความปลอดภัยของโรงเรียนของตัวเองก็ยังทำไม่ได้... น่าเวทนาจริงๆ ค่ะ!"
41200-10 = "แบบนี้เราจะฝากความปลอดภัยของคิโวทอสไว้กับสถาบันฝึกตำรวจวัลคิรี่ได้เหรอคะเนี่ย?"
41200-11 = "ถือเป็นเรื่องที่น่าเป็นห่วงจริงๆ ค่ะ!"
41200-18 = "มาพล่ามเรื่องอะไรของพวกเธอน่ะ...?"
41200-19 = "อ๊ะ! หัวหน้ากรมฯ ผู้ต้องสงสัยหลักของคดีออกมาปรากฏตัวพอดีเลยค่ะ!"
41200-20 = "หัวหน้ากรมฯ คันนะ รู้สึกอย่างไรเกี่ยวกับคดีรับเงินคืนผิดกฎหมายครั้งนี้บ้างคะ?"
41200-21 = "เดี๋ยวก่อน... ทำไมพวกเธอถึง..."
41200-22 = "อีกอย่าง ที่นี่คือเขตรักษาความปลอดภัยนะ! ใครอนุญาตให้มาถ่ายทำไม่ทราบ?"
41200-23 = "ดูสิคะท่านผู้ชม! ผู้ต้องสงสัยกำลังระบายความโกรธใส่สื่อค่ะ!"
41200-28 = "อย่าถ่ายนะ! บอกว่าอย่าถ่ายไง!"
41200-30 = "โคะอุซางิ การ์เด้น"
41200-31 = "ดูเหมือนเรื่องจะใหญ่กว่าที่คิดนะคะ..."
41200-32 = "นั่นสินะ มีแต่การรายงานข่าวเรื่องนี้ตั้งแต่เช้าเลย..."
41200-33 = "ถะ... ถ้านักเรียนของกรมความมั่นคงสาธารณะแค้นพวกเราจากเรื่องนี้แล้วบุกมาโจมตีพวกเราล่ะ...?"
41200-35 = "อย่ากังวลอะไรเล็กๆ น้อยๆ เลยน่ามิยุ เราแค่ทำในสิ่งที่ต้องทำก็เท่านั้น"
41200-36 = "อีกอย่างตอนนี้พวกนั้นคงวุ่นวายกับการรับมือกับพวกนักข่าวที่แห่ไปทำข่าว คงไม่มีเวลามาคิดถึงพวก#nเราหรอก"
41200-37 = "ก็คงใช่ แต่ฉันรู้สึกแปลกๆ ยังไงไม่รู้..."
41200-38 = "รู้สึกแปลกๆ เหรอ? แปลกยังไง?"
41200-39 = "ไม่รู้สิ ฉันรู้สึกว่าการรับมือเรื่องนี้มันเร็วมาก ต่างจากคดีอื้อฉาวของบริษัทที่เคยมีมา"
41200-40 = "องค์การนักเรียนเองก็จัดตั้งทีมสอบสวนเร็วแบบที่ไม่เคยปรากฏมาก่อน แถมไคเซอร์ คอร์เปอเรชั่น#nก็ประกาศยกเลิกการพัฒนาโคะอุซางิ ทาวน์อย่างว่าง่าย ทั้งๆ ที่ก็น่าจะลงทุนไปเยอะทีเดียว..."
41200-41 = "คุณครูไปขู่อะไรองค์การนักเรียนหรือเปล่าคะ...?"
41200-42 = "[s1] \"ครูไม่รู้เลย...\"\n[s2] \"อาจจะเป็นเหตุผลของผู้ใหญ่น่ะ\""
41200-48 = "พวกฉันไม่รู้เหตุผลของผู้ใหญ่หรอกค่ะ แต่ก็ดีแล้วละค่ะที่เรื่องนี้จบลงได้"
41200-49 = "เพราะถ้าไม่มีผลประโยชน์จากการพัฒนาที่นี่ พวกองค์กรธุรกิจก็คงไม่มีเหตุผลที่ต้องไล่คนไร้บ้านที่#nพักอยู่ที่นี่ค่ะ"
41200-50 = "และพวกฉันเองก็คงตั้งค่ายอยู่ที่นี่ต่อไปได้ค่ะ..."
41200-52 = "แฮ่ม... อะแฮ่ม...!"
41200-61 = "มีคนบุกรุกแฮะ"
41200-62 = "รู้สึกคันไม้คันมือตั้งแต่เช้าอยู่พอดีเลย..."
41200-63 = "ซากิ ขอระเบิดมาโยนเล่นสักลูกสิ"
41200-64 = "ดะ... เดี๋ยวก่อน! ฉันไม่ได้มาบุกรุกสักหน่อย! มาทักทายต่างหากเล่า!"
41200-65 = "ทักทายเหรอ? จะทักทายไปทำไม?"
41200-66 = "อ๋อ จำที่เคยอ่านเจอในหนังสือเก่าได้แล้ว มาทักทายเพื่อขอแลกตะกั่วกับดินปืนใช่ไหม?"
41200-67 = "เพราะอย่างนี้ไงฉันถึงไม่ชอบคุยกับคนนอกกฎหมายที่ไม่มีการศึกษา!"
41200-68 = "แต่ก็ช่วยไม่ได้นะ... การรับความช่วยเหลือแล้วทำเป็นไม่รู้ไม่เห็นมันขัดกับหลักคำสอนที่ยึดมั่น..."
41200-72 = "อะแฮ่ม... คราวก่อนฉันยังไม่ได้บอกพวกเธอเลยว่า... ฉันเป็นหนี้บุญคุณกับพวกเธอเป็นอย่างมาก..."
41200-74 = "ได้ข่าวว่ากองทหาร RABBIT ยอมเสี่ยงชีวิตบุกเข้าไปในสถาบันฝึกตำรวจวัลคิรี่และเปิดโปงเรื่องอื้อฉาว#nของพวกนั้น"
41200-75 = "ต้องขอบคุณพวกเธอที่ทำให้ห้องบูชาของพวกฉันในโคะอุซางิ ทาวน์สงบสุข ตอนนี้สมาชิก <ความสุขเล็กๆ> ก็ทยอยกลับกันมาแล้วด้วย"
41200-76 = "ถึงแม้จะไม่ได้เป็นการทำเพื่อพวกเราก็เถอะ แต่การทำเป็นไม่รู้ไม่ชี้แม้ตกเป็นหนี้บุญคุณไม่ใช่วิสัย#nของพวกเรา"
41200-77 = "ฉันขอมอบอาหารพิเศษที่เก็บสะสมไว้ให้พวกเธอเป็นของขวัญก็แล้วกันนะ"
41200-83 = "อาหารพิเศษ? เอาอะไรมางั้นเหรอ?"
41200-84 = "อย่าบอกนะว่าข้าวกล่องหน้าถั่วงอกที่ถูกทับบู้บี้น่ะ?"
41200-85 = "จะเป็นของแบบนั้นไปได้ยังไงกันล่ะ พวกเราคือผู้แสวงหาสัจธรรมผู้ไม่ครอบครองสิ่งใด อาหารที่เอา#nมาคืออาหารที่มีค่าที่สุดที่เรามี และเราก็เต็มใจมอบให้อย่างไม่เสียดายเลย"
41200-86 = "และมันก็คือ..."
41200-88 = "คาราอะเกะที่ทำจากกระดูกไก่ยังไงละ!"
41200-95 = "คารา... อาเกะ... เหรอคะ?"
41200-96 = "อื้ม คาราอะเกะนี้ไม่เหมือนคาราอะเกะทั่วไปหรอกนะ มันทำมาจากกระดูกก็เลยเคี้ยวกินไม่ได้ แต่ก็..."
41200-97 = "ให้ความรู้สึกเหมือนกินคาราอะเกะที่ชุบกลิ่นหอมของไก่ทอด กลิ่นหอมนี้จะคงอยู่ในปากอย่างยาวนาน แถมแคลต่ำเกือบแตะ 0 แคลเลยด้วย... นี่คืออาหารที่ผ่านการคิดมาแล้ว"
41200-98 = "แค่มีคาราอะเกะกระดูกไก่ชิ้นเดียวก็ดื่มเบียร์ได้ถึง 3 กระป๋อง! แต่แน่นอนว่ากินเป็นเครื่องเคียงกับข้าว#nก็จะอร่อยยิ่งกว่า"
41200-99 = "หวังว่าของขวัญของฉันจะถูกใจพวกเธอทุกคนนะ"
41200-105 = "นี่มัน... นี่มันไม่ใช่คาราอะเกะ แต่เป็น..."
41200-106 = "เป็นขยะจากเศษอาหารมากกว่า..."
41200-107 = "ขะ... ขยะอะไรกัน! อาหารนี้ทำจากไก่ทอดนะ ต้องเป็นคาราอะเกะสิ!"
41200-108 = "เรียกของที่กินได้ว่าขยะได้ยังไง! พูดแรงเกินไปแล้วนะ!"
41200-110 = "ไม่หรอก นี่ไม่ใช่ขยะเศษอาหารหรอก"
41200-111 = "ตามกฎการทิ้งขยะของคิโวทอสแล้ว กระดูกไก่ถือเป็นขยะประเภทที่ต้องเผาน่ะ"
41200-117 = "อะไรกัน! คนหนึ่งบอกว่าเป็นขยะจากเศษอาหาร คนหนึ่งบอกว่าเป็นขยะที่ต้องเผา"
41200-118 = "พวกเธอคงยังไม่หิวกันสินะ! เห็นอาหารล้ำค่าอยู่ตรงหน้าแท้ๆ แต่ก็แสดงความโลภอยากได้สิ่งที่ดีกว่า!"
41200-119 = "พวกเราชาว <ความสุขเล็กๆ> คงไม่อาจอยู่ร่วมกับคนเห็นแก่กินจอมโลภอย่างพวกเธอได้!"
41200-120 = "แล้วคิดว่าพวกเราอยากเป็นมิตรกับคนแก่ลัทธิบ้าบอหรือไง?"
41200-124 = "โมเอะ ไปที่เต็นท์เสบียงแล้วเอากระสุนเหล็กออกมาให้หมด!"
41200-126 = "ได้เห็นดีกันแน่! เจ้าพวกไม่รู้รสชาติที่แท้จริงของอาหาร!"
41200-138 = "(ถอนหายใจ) ... เป็นแบบนี้อีกแล้วเหรอคะเนี่ย"
41200-142 = "สำนักงานหัวหน้าสำนักป้องกัน"
41200-146 = "เป็นแบบนี้อีกแล้วสินะคะ..."
41200-147 = "เหตุการณ์นี้คงทำให้นักเรียนจากสถาบันฝึกตำรวจวัลคิรี่เคลื่อนไหวไม่ได้สักระยะ ส่วนพวกแมลงจาก#nโครโนสก็มาป้วนเปี้ยนอยู่แถวนี้กันเป็นฝูง..."
41200-148 = "ฉันช่างไม่มีโชคเอาซะเลยละค่ะ"
41200-149 = "ไม่พอใจอะไรอีกงั้นเหรอ..."
41200-150 = "ฮุฮุ แต่ก็ยังดีที่พวกฉันยังไม่ถูกเปิดโปงเรื่องเงินคืนที่ได้รับจากไคเซอร์ คอร์เปอเรชั่นโดยตรงนะคะ"
41200-151 = "แผนการก็เลยไม่น่ามีความคลาดเคลื่อนมากค่ะ"
41200-152 = "ถ้ายังมีเวลามาสนใจเรื่องล้อเล่นแบบนั้น เอาเวลามาหาพวกที่เชื่อใจได้อีกสักคนไม่ดีกว่าเหรอ?"
41200-153 = "พวกที่เชื่อใจได้... นั่นสินะคะ"
41200-159 = "พวกรุ่นน้องของคุณ... มีฝีมือต่อสู้ใช้ได้เลยนี่คะ?"
41200-160 = "สมแล้วค่ะที่เป็นนักเรียนหัวกะทิของ SRT ที่ผ่านการสอบได้แม้จะไม่มีความเชี่ยวชาญ"
41200-165 = "สำหรับฉันแล้วยังถือว่าเร็วเกินไปมากที่จะเรียกตัวเองว่าเป็น SRT แต่ก็..."
41200-166 = "แหะๆ... ยูกิโนะจังเนี่ยก็เข้มงวดอยู่เรื่อยเลยนะ"
41200-167 = "เธอต่างหากล่ะที่ไม่รู้อะไร นิโกะ"
41200-168 = "ถ้าฉันเป็นคนสั่งการละก็ คงบุกเข้าไปและออกมาได้ในเวลาไม่ถึง 1 นาที สัญญาณเตือนภัยเองก็คงยัง#nไม่ดังด้วยซ้ำ"
41200-173 = "ก็กองทหาร RABBIT ที่อยู่แค่ปี 1 ยังมีความสามารถไม่ถึงขั้นผู้เชี่ยวชาญอย่างพวกคุณนี่คะ"
41200-174 = "ถ้าเกิดว่า..."
41200-175 = "ฉันอยากได้กองทหาร RABBIT มาเข้าร่วมในแผนการ 'ปฏิวัติ' ของฉันด้วยล่ะคะ?"
41200-177 = "คิดว่ายังไงล่ะคะ? <กองทหาร FOX> จากสถาบันพิเศษ SRT?"
41200-180 = "ก็น่าจะได้นะ"
41200-181 = "ถึงจะไม่ได้ตั้งใจ แต่ก็ต้องเต็มที่เพื่อขัดขวางเส้นทางของพวกรุ่นพี่สิ"
41200-182 = "ฉันเองก็ไม่อยากทำให้มือของรุ่นน้องที่น่ารักต้องแปดเปื้อนหรอกนะ แต่เมื่อเรื่องมันเป็นอย่างนี้แล้วก็#nคงช่วยไม่ได้"
41200-183 = "เด็กพวกนั้นคงเตรียมใจรับเรื่องแบบนี้ตั้งแต่เข้ามาใน SRT แล้วแหละ..."
41200-185 = "แผนทั้งหมดนี้..."
41200-189 = "ก็เพื่อการกลับมาของ SRT และการล่มสลายของชาเล่ต์..."
41200-192 = "กระต่ายแห่งแคร์บาน็อก;ติดตามต่อในบทที่ 2"

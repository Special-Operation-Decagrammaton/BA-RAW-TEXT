[translation]
1012209-1 = "แต่ก็ไม่เป็นอะไร"
1012209-4 = "อ๊ะ... สวัสดี คุณครู"
1012209-5 = "[s] \"สวัสดี มิกะ\""
1012209-9 = "ฉันเป็นคนเรียกคุณครูมาเองก็จริง แต่ก็เขินจัง..."
1012209-10 = "เอ่อ เราไปหาที่นั่งกันมั้ย?"
1012209-15 = "(เมื่อได้ที่นั่งแล้ว มิกะก็ค่อยๆ หยิบกล่องอาหารออกมา)"
1012209-19 = "ฉันลองทำแซนด์วิชง่ายๆ มาน่ะ..."
1012209-20 = "แต่ไม่รู้หรอกนะว่าจะอร่อยหรือเปล่า อืม..."
1012209-21 = "งะ... งั้นฉันเปิดละนะ...?"
1012209-22 = "[s] \"อาหารจากมิกะจะเป็นยังไงนะ...!!\""
1012209-23 = "อะ... อึก!!"
1012209-28 = "ถะ... ถึงภายนอกมันจะดูไม่น่าอร่อย"
1012209-29 = "แต่มันก็น่าจะใช้ได้...!"
1012209-30 = "..."
1012209-31 = "หรือเปล่านะ... แต่เห็นอย่างนี้ฉันก็ทำตามสูตรแล้วนะ..."
1012209-32 = "[ns] \"ครูรับรู้ได้ถึงความพิถีพิถันเลยละ...\""
1012209-33 = "ฮิฮิ... งั้นก็รีบกินดูสิ คุณครู"
1012209-37 = "(คุณครูหยิบแซนด์วิชขึ้นมา 1 ชิ้น)"
1012209-40 = "[ns] \"จะกินให้อร่อยเลย!\""
1012209-42 = "ถะ... ถ้างั้นฉันก็ด้วย..."
1012209-46 = "[ns] \"รสชาตินี้มัน...\""
1012209-47 = "..."
1012209-48 = "หืม?"
1012209-49 = "ทะ... ทำไมมีรสชาติแบบนี้ล่ะ...? ฉันก็ทำตามสูตรแล้วนี่นา...?"
1012209-50 = "ฉันไม่มีมายองเนส ก็เลยใส่ซอสหอยนางรมไปแทน"
1012209-51 = "แล้วฉันก็ไม่ค่อยชอบแตงกวาดอง ก็เลยใส่ไปแค่นิดเดียว"
1012209-52 = "ว่ากันว่าหน้าร้อนร่างกายเราจะขาดเกลือ ฉันก็เลยใส่เกลือไปมากหน่อย... แล้วก็ใส่น้ำตาลไปเยอะๆ จะได้เค็มๆ หวานๆ..."
1012209-53 = "[s] \"มิกะคิดสูตรขึ้นใหม่เลยสินะเนี่ย\""
1012209-54 = "ตะ... แต่ว่า~~!! ฉันคิดว่าทำแบบนั้นแล้วมันจะอร่อยเสียอีก!"
1012209-59 = "คะ... คุณครู ไม่ต้องฝืนกินหรอก ถ้าไม่อร่อยก็..."
1012209-60 = "หืม? กินได้งั้นเหรอ?"
1012209-61 = "มะ... มันอร่อยเพราะมีรสชาติของความจริงใจงั้นเหรอ...?"
1012209-62 = "อึก..."
1012209-63 = "ขอโทษนะ... ฉันอยากทำแซนด์วิชอร่อยๆ มาให้แท้ๆ..."
1012209-64 = "[s] \"แต่มิกะก็ตั้งใจทำมาให้ครูนี่นา ขอบใจนะ\""
1012209-65 = "อื้อ... แหะๆ"
1012209-66 = "ขอบคุณที่กินนะ คุณครู"
1012209-70 = "หืม? รู้สึกเหมือน..."
1012209-71 = "ฉันเปลี่ยนไปนิดหน่อยเลย"
1012209-72 = "ถ้าเป็นเมื่อก่อนฉันคงเสียใจมากๆ ที่ทำออกมาไม่ดี..."
1012209-73 = "แต่ตอนนี้ฉันก็ไม่ได้รู้สึกแย่ขนาดนั้นน่ะ"
1012209-74 = "ฉันแค่คิดว่า... ครั้งหน้าแค่ทำให้ดีกว่านี้ก็ได้"
1012209-75 = "[s] \"นั่นเป็นการมองโลกในแง่บวกมากเลยนะ\""
1012209-76 = "ชะ... ใช่มั้ยล่ะ?"
1012209-77 = "ฉันได้เรียนรู้อะไรแบบนี้เพราะได้ใช้เวลากับคุณครูน่ะ"
1012209-78 = "แล้วคุณครูก็ช่วยกินของของวันนี้อย่างเอร็ดอร่อยด้วย แหะๆ"
1012209-79 = "..."
1012209-80 = "ต่อให้บกพร่องไปบ้าง แต่ฉันก็ยอมรับตัวเองที่เป็นแบบนี้นะ"
1012209-81 = "ถึงจะเงอะงะ โง่เง่า และทำอะไรผิดพลาดบ่อยๆ..."
1012209-82 = "แต่มันก็... ไม่น่าจะเป็นอะไรนะ?"
1012209-85 = "[ns1] \"แน่นอนอยู่แล้ว\"\n[ns2] \"ไม่เป็นอะไรหรอก\""
1012209-91 = "อื้อ...!!"
1012209-92 = "ไม่ว่าจะตอนนี้หรือตอนไหนในอนาคต..."
1012209-93 = "ฉันก็ขอฝากตัวด้วยนะ คุณครู"

[translation]
1012209-1 = "Regardless, It's Okay"
1012209-4 = "...Ah, Hi. Sensei."
1012209-5 = "[s] \"Hi, Mika.\""
1012209-9 = "I know I called you here, but it's a bit embarrassing..."
1012209-10 = "Sh-Should we go somewhere where we can sit down?"
1012209-15 = "After setting up a towel and taking a seat, Mika brought out a bento."
1012209-19 = "I tried making some sandwiches..."
1012209-20 = "...but I can't vouch for the taste. Yeah..."
1012209-21 = "I-I'll open it then, okay...?"
1012209-22 = "[s] \"And the long-awaited Mika's food is...!\""
1012209-23 = "H-Hiyah!"
1012209-28 = "I-It's a little smushed, so it might not look tasty..."
1012209-29 = "But I'm sure it tastes—"
1012209-30 = "..."
1012209-31 = "Well, I consulted a recipe, but..."
1012209-32 = "[ns] \"I see all the effort you put into it!\""
1012209-33 = "Heehee... Here, try one, Sensei."
1012209-37 = "I took one of the sandwiches."
1012209-40 = "[ns] \"Thank you for the meal!\""
1012209-42 = "M-Might want to wait to thank me..."
1012209-46 = "[ns] \"This taste...\""
1012209-47 = "..."
1012209-48 = "Huh?"
1012209-49 = "Wh-Why does it taste like this...? This recipe had five stars!"
1012209-50 = "Sure, I used oyster sauce because I didn't have mayo..."
1012209-51 = "...and I went light on the pickles because they're nasty..."
1012209-52 = "And I heard you need electrolytes during the summer, so I added lots of salt...then I added sugar to balance THAT out..."
1012209-53 = "[s] \"That's a different sandwich recipe, Mika.\""
1012209-54 = "B-But...! Come on! I thought it would still be good! It made sense, right?"
1012209-59 = "S-Sensei. You don't have to force yourself to eat it. If it's bad, then..."
1012209-60 = "Hm? It's okay?"
1012209-61 = "It's good because I put my heart into it...?"
1012209-62 = "Ugh..."
1012209-63 = "I'm sorry... I wanted to make you a special, delicious lunch..."
1012209-64 = "[s] \"And it's just for me. Thank you, Mika.\""
1012209-65 = "...Yeah. Heehee."
1012209-66 = "Thank you for eating it, Sensei."
1012209-70 = "Hm? It feels like..."
1012209-71 = "...I've changed a little."
1012209-72 = "In the past, I would have been so sad and disappointed to have failed."
1012209-73 = "But it's not the same this time. I don't feel terrible."
1012209-74 = "I'm just thinking...that I can do better next time."
1012209-75 = "[s] \"That's a very positive mindset.\""
1012209-76 = "Y-You think?"
1012209-77 = "Maybe all the time I spent with you is paying off!"
1012209-78 = "...Or maybe it's because you actually acted like you enjoyed it."
1012209-79 = "..."
1012209-80 = "Somehow, I think I'm all right even if I'm a little lacking."
1012209-81 = "Sure, I'm clumsy, foolish, and make a bunch of mistakes..."
1012209-82 = "But...that's okay, right?"
1012209-85 = "[ns1] \"Of course.\"\n[ns2] \"It's absolutely okay.\""
1012209-91 = "...Yeah!"
1012209-92 = "So, for now, and in the future..."
1012209-93 = "...let's take care of each other, Sensei."

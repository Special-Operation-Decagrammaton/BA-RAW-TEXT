[translation]
1012209-1 = "已經沒事了"
1012209-4 = "……啊，老師。"
1012209-5 = "[s]「你好呀，彌香。」"
1012209-9 = "雖然是我叫你來的，還是覺得有點害羞……"
1012209-10 = "那，那個，要不要去那邊坐坐？"
1012209-15 = "（坐下之後，彌香便拿出了準備好的便當）"
1012209-19 = "我簡單做了一些三明治……"
1012209-20 = "不敢保證味道一定好吃。唔嗯……"
1012209-21 = "那，那我打開囉……？"
1012209-22 = "[s]「彌香的料理究竟……！！」"
1012209-23 = "嘿，嘿咿！！"
1012209-28 = "看，看起來好像不太好吃……"
1012209-29 = "不過味道應該還可以才對……！"
1012209-30 = "……"
1012209-31 = "其實我也不知道……雖然是照著食譜做的……"
1012209-32 = "[ns]「能感覺到滿滿的心意……」"
1012209-33 = "嘿嘿……來，老師吃吃看吧。"
1012209-37 = "（拿起一個三明治）"
1012209-40 = "[ns]「我要開動了！」"
1012209-42 = "那，那我也……"
1012209-46 = "[ns]「這個味道是……」"
1012209-47 = "……"
1012209-48 = "咦？"
1012209-49 = "為，為什麼會是這種味道……？#n我明明是照著食譜做的呀……？"
1012209-50 = "只是因為沒有美乃滋就改放蠔油……"
1012209-51 = "因為不太喜歡酸黃瓜就只放了一點……"
1012209-52 = "聽說夏天容易缺乏鹽分就多放了一些鹽巴……#n想做成甜鹹口味就加了很多糖而已……"
1012209-53 = "[s]「你創造了全新的食譜呢，彌香。」"
1012209-54 = "因，因為～我感覺這樣應該會好吃嘛～！"
1012209-59 = "老，老師不用勉強哦。#n如果不好吃的話就……"
1012209-60 = "咦？還可以？"
1012209-61 = "因為能感受到心意，所以覺得還不錯……？"
1012209-62 = "嗚嗚……"
1012209-63 = "對不起……本來想請你吃好吃的三明治的……"
1012209-64 = "[s]「這是特別為我準備的吧。謝謝你，彌香。」"
1012209-65 = "……嗯。嘿嘿。"
1012209-66 = "謝謝你不嫌棄，老師。"
1012209-70 = "咦？總覺得……"
1012209-71 = "我，好像有點變了。"
1012209-72 = "以前要是我沒做好，一定會超難過的……"
1012209-73 = "現在的心情卻沒有那麼糟。"
1012209-74 = "只覺得……下次再做好一點就行了。"
1012209-75 = "[s]「這種想法非常正面哦？」"
1012209-76 = "是，是嗎？"
1012209-77 = "可能是因為常常跟老師在一起的關係吧。"
1012209-78 = "說不定也跟老師願意吃得津津有味有關，嘿嘿。"
1012209-79 = "……"
1012209-80 = "總覺得，就算自己有點不完美也沒關係。"
1012209-81 = "雖然笨拙又傻傻的，還經常出錯……"
1012209-82 = "不過……應該沒關係吧？"
1012209-85 = "[ns1]「當然沒關係。」\n[ns2]「肯定沒關係的。」"
1012209-91 = "……嗯！！"
1012209-92 = "無論現在還是將來……"
1012209-93 = "都請你多多指教唷，老師。"

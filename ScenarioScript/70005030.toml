[translation]
70005030-1 = "#title;어느 2월 19일의 기록 (2)"
70005030-2 = "3;히나;02;그래서 무슨 일이야, 모두들?\n#3;a\n#3;em;[반응]"
70005030-3 = "3;히나;01;일단…… 아무것도 묻지 말고 D.U.로 가자고 해서, 오기는 했는데."
70005030-4 = "5;이오리;06\n1;아코;12\n3;치나츠;04; 그, 그게 말이죠, 부장님…….\n#3;em;[땀]\n#3;stiff"
70005030-5 = "1;아코;12;저희가, 산해경의 현무상회 쪽에서 연락을 받아서…….\n#1;em;[땀]\n#1;stiff"
70005030-6 = "3;히나;02;산해경? 현무상회?\n#3;em;[?]\n#1;hide\n#5;hide"
70005030-7 = "3;히나;04;그렇다는 건…… 학원 간 교류 안건이라는 뜻이야, 아코?"
70005030-8 = "3;히나;05;하지만 업무 범위상, 타 학교와의 외교는, 원칙적으로 우리 선도부가 할 일이 아닐 텐데?"
70005030-9 = "3;아코;12;그, 그그그, 그러니까. 부장님! 제가 조금 말을 잘못 꺼냈는데 말이죠……!\n#3;closeup\n#3;stiff"
70005030-10 = "3;아코;04;제…… 가 현무상회 분들 중 한 명과, 개인…… 적으로 조금 알고 지냈어서!\n#3;closeup"
70005030-11 = "3;아코;12;이번에 D.U.에서 같이 놀지 않겠느냐고 해서요!\n#3;closeup\n#3;em;[!]"
70005030-12 = "3;히나;04;아코에게…… 현무상회의 친구가 있었다고?\n#3;em;[?]"
70005030-13 = "3;히나;14;……."
70005030-14 = "3;히나;99;미안해, 아코. 그동안 너무 과로만 시켰던 것 같네.\n#3;em;[한숨]"
70005030-15 = "3;히나;14;이렇게…… 허세를 부리면서까지, 기분 전환을 하고 싶었구나……."
70005030-16 = "5;이오리;06\n3;치나츠;06\n1;아코;04;그게 대체 무슨 말씀이세요?!\n#1;em;[?!]\n#1;shake"
70005030-17 = "5;이오리;06;난 알 것 같은데, 아코 쨩…….\n#5;em;…"
70005030-18 = "3;치나츠;06; 하아…….\n#3;em;[한숨]"
70005030-19 = "5;이오리;06\n3;치나츠;06\n1;아코;05;두 분은 조용히 해요!\n#1;em;[스팀]\n#fontsize;80\n#1;m3\n#1;hophop\n#3;dr\n#5;dr"
70005030-20 = "1;아코;12;그, 그리고 부장님도 믿어 주세요……! 어…… 그러니까 이건……."
70005030-21 = "1;아코;12;…….\n#1;stiff"
70005030-22 = "1;아코;05;아무튼, 이게 기본적으로 사적인 자리인 것은 맞아야 하니까요!!!\n#1;em;[!]\n#1;closeup"
70005030-23 = "#st;[0,0];instant;1;"
70005030-24 = "#clearST"
70005030-25 = "3;히나;04\n#3;em;[?!]\n#3;shake\n#3;closeup\n#wait;1500\n#1;hide\n#5;hide"
70005030-26 = "3;히나;05;(사적인 자리여야 한다……?)\n#3;closeup"
70005030-27 = "5;레이죠;01\n1;미나;01\n3;루미;01\n#1;h\n#3;h\n#5;h\n#1;a\n#3;a\n#5;a"
70005030-28 = "3;루미;02;오! 드디어 도착했네! 다들 어서 와!\n#3;em;[반응]"
70005030-29 = "3;루미;03;그러면…… '오랜만이네', '아코'?"
70005030-30 = "3;아코;12;네, 네에! 루미 씨! 그렇, 지요…?\n#3;em;[반응]\n#3;stiff\n#1;hide\n#5;hide"
70005030-31 = "#st;[0,0];instant;1;"
70005030-32 = "#clearST"
70005030-33 = "3;히나;04;……!\n#3;em;[!]"
70005030-34 = "3;히나;14;(정말, 이었던 건가……? 아코에게, 산해경의 친구가 진짜로……?)"
70005030-35 = "3;히나;02;(어라? 그런데 이 사람들은… 현무상회의 회장과 그 매니저, 그리고 산해경의 학생회인 현룡문의 집행부장…….)\n#3;em;[?]"
70005030-36 = "1;미나;01\n3;루미;01\n5;레이죠;13;안녕하세요, 아코 씨. 회장님께…… 말씀은 많이 들었습니다.\n#5;greeting\n#5;em;[땀]"
70005030-37 = "1;미나;04;으, 음. 게헨나의 선도부원들…… 아, 아니. 네 명 모두, 반갑다. 코노에 미나다. 그리고 이쪽은……."
70005030-38 = "#st;[0,0];instant;1;"
70005030-39 = "#clearST"
70005030-40 = "5;레이죠;01\n1;미나;01\n3;루미;01\n#1;h\n#3;h\n#5;h\n#1;d\n#3;d\n#5;d\n#wait;1500"
70005030-41 = "3;키사키;01\n#3;a\n#wait;1500"
70005030-42 = "3;키사키;07;음. 류우게 키사키다. 지금은 그것으로 좋겠지. 이곳은 어디까지나 사적인 자리일 테니까."
70005030-43 = "3;키사키;03;그 전에…… 잠시 실례하도록 하지. 이것을 피워 두면 더욱 좋지 않을까 해서 말이다.\n#3;em;…"
70005030-44 = "#st;[0,0];instant;1;"
70005030-45 = "#clearST"
70005030-46 = "3;키사키;01\n#3;greeting\n#3;d\n#wait;2500"
70005030-47 = "#wait;1000"
70005030-48 = "#na;이오리;어라? 신기한 향이네……."
70005030-49 = "#na;치나츠;그렇네요. 그런데 왠지 기분이…… 편해지는 느낌이……?"
70005030-50 = "3;히나;05;…….\n#3;em;…\n#3;a"
70005030-51 = "3;히나;05;(확실해. 분명 산해경의 학생회장, 검은 군주라고도 불리는 현룡문의 문주…… 류우게 키사키……!)"
70005030-52 = "3;히나;05;아코.\n#3;em;[반응]"
70005030-53 = "1;아코;12;네, 네네네네. 부장님?!\n#1;ar\n#3;m5\n#1;em;[?!]\n#1;shake"
70005030-54 = "3;히나;15;정확한 설명을, 요구해도 될까?"
70005030-55 = "1;아코;12;마마마마, 말씀드렸듯이, 저는 친구인 루미 씨와……!\n#1;stiff\n#1;em;[땀]"
70005030-56 = "#all;hide"
70005030-57 = "3;루미;05;자, 자자. 그만, 그만. 이왕 이렇게 다 모였으니까, 더 숨기고 어쩌고 할 필요 없겠지?\n#3;em;[반응]\n#3;closeup"
70005030-58 = "3;루미;01;내가 하나하나 설명해 줄게. 괜찮지, 키사키?\n#3;closeup"
70005030-59 = "3;키사키;05;그래. 그대라면 믿을 수 있지. 더욱이 이런 자리라면 말이다.\n#3;closeup"
70005030-60 = "3;키사키;03;그보다도…… 반갑구나. 소라사키 히나 양. 키사키라고 편히 불러 주었으면 한다.\n#3;em;[음표]\n#3;closeup"
70005030-61 = "3;히나;04;으, 응. 나도…… 히나라고, 불러 줘.\n#3;em;[///]\n#3;stiff\n#3;closeup"
70005030-62 = "#all;hide"
70005030-63 = "3;히나;04;…….\n#3;em;…\n#3;a"
70005030-64 = "3;키사키;09;그렇게 된 것이다.\n#3;em;[한숨]"
70005030-65 = "3;키사키;02;뭐어, 결국은 택배 배송이 엇갈렸다는, 흔히 일어나곤 하는 배송상의 오류가, 이 자리에서 동시에 일어난 것뿐이지."
70005030-66 = "3;키사키;07;그리고 우리 쪽의 미나도, 선도부 쪽의 모두도, 서로 최선을 다했으나 운명의 장난이라는 것에 당한 것 정도일 테고."
70005030-67 = "3;키사키;03;그런 의미에서, 이제 그만 생일을 축하하도록 할까. 여기, 그대에게 돌아가야 했을 케이크다."
70005030-68 = "#st;[0,0];instant;1;"
70005030-69 = "#clearST"
70005030-70 = "3;키사키;03\n#3;d\n#wait;1500"
70005030-71 = "3;키사키;03\n#3;a\n#3;closeup\n#wait;1000"
70005030-72 = "3;키사키;03\n#3;greeting\n#3;closeup\n#wait;1500"
70005030-73 = "3;키사키;12;후후. 이것이야말로 그대를 생각하는 모두의 마음이 담긴, 귀중한 선물인 셈이군?\n#3;em;[음표]\n#3;closeup"
70005030-74 = "#st;[0,0];instant;1;"
70005030-75 = "#clearST"
70005030-76 = "3;아코;99\n#3;em;[반짝]\n#3;closeup\n#wait;1500"
70005030-77 = "4;이오리;04\n2;치나츠;04\n#2;em;[땀]\n#4;em;[땀]\n#2;stiff\n#4;stiff\n#2;h\n#4;h\n#3;hide\n#wait;1500"
70005030-78 = "3;히나;03;그렇구나……. 고마워, 모두들. 그리고 키사키도. 이건 일종의 케이크 교환식이라고 봐도 되는 것일까?\n#2;hide\n#4;hide"
70005030-79 = "3;히나;07;받아 줘. 키사키 주위의 모두가, 정성을 담아 주문한 케이크라고 해야 하겠네.\n#3;em;[반응]"
70005030-80 = "#st;[0,0];instant;1;"
70005030-81 = "#clearST"
70005030-82 = "3;히나;07\n#3;d\n#wait;1500"
70005030-83 = "3;히나;03\n#3;a\n#3;closeup\n#wait;1000"
70005030-84 = "3;히나;03\n#3;closeup\n#3;greeting\n#wait;1500"
70005030-85 = "3;미나;08\n#3;em;[반짝]\n#3;closeup\n#wait;1500"
70005030-86 = "4;레이죠;04\n2;루미;03\n#2;em;[재잘]\n#4;em;[땀]\n#2;h\n#4;h\n#3;hide\n#wait;1500"
70005030-87 = "#all;hide"
70005030-88 = "3;히나;03;그건 그렇고, 신기하네. 우리 둘의 생일이 같은 날이었다니."
70005030-89 = "3;키사키;07;분명 그렇게 생각할 수 있지만, 전체적으로 보자면 그렇게 이상한 일도 아니지 않겠는가."
70005030-90 = "3;키사키;03;키보토스에 생일이 겹치는 학생들이 어디 우리들뿐이겠느냐."
70005030-91 = "3;히나;99;확실히…… 그렇지. 키보토스의 학생 수를 생각한다면 더더욱."
70005030-92 = "3;히나;03;그래도 오늘은 한층 더 특별한 기억이 될 것 같네. 고마워, 아코. 이오리. 치나츠.\n#3;em;[음표]"
70005030-93 = "3;아코;04;별말씀을요. 저는 부장님의 생일만 축하드릴 수 있다면…….\n#3;em;[///]\n#3;closeup"
70005030-94 = "5;레이죠;01\n3;루미;01\n1;미나;03;음. 여러 가지 일이 있었지만, 저희들의 케이크를 이렇게 무사히 전해드릴 수 있어서, 진심으로 다행이라고 생각합니다, 문주님!\n#1;em;[재잘]"
70005030-95 = "5;레이죠;16;부수적인 일은 거의 제가 다 했지만 말입니다…….\n#5;em;[한숨]"
70005030-96 = "3;루미;03;자, 자. 살다 보면 그런 일도 있는 거니까 말이지.\n#3;em;[음표]"
70005030-97 = "3;루미;01;여기, 내가 특별히 만든 복숭아 떡이야. 이번에는 안에 과육을 살린 복숭아 잼을 넣어 보았다구?\n#3;greeting"
70005030-98 = "3;키사키;03;고맙구나, 모두들. 이 떡은 케이크들을 먹은 후 나누어 먹도록 하자.\n#1;hide\n#5;hide"
70005030-99 = "3;키사키;02;그때까지 뱃속에 그럴 여유가 남는다면, 말이다만."
70005030-100 = "4;히나;03\n3;키사키;02\n#4;a\n#3;m2"
70005030-101 = "4;히나;03;그건 별로 걱정할 필요 없지 않을까? 원래 케이크나 후식을 먹는 배는 따로 있다고 하잖아?\n#4;em;[음표]\n#4;a"
70005030-102 = "4;히나;03\n3;키사키;03;후후. 그것은 확실히 그러하겠구나. 실례하였다. 나는 그렇게까지 과식을 할 수 있는 몸은 아니다 보니 말이다."
70005030-103 = "#all;hide"
70005030-104 = "3;아코;07;그러면 생일 축하드립니다 부장님, 문주님!\n#3;em;[재잘]\n#3;closeup"
70005030-105 = "3;미나;03;저 역시 생일 축하드립니다. 문주님, 부장님.\n#3;em;[음표]\n#3;closeup"
70005030-106 = "5;히나;03\n1;키사키;03\n#3;hide"
70005030-107 = "5;히나;03;응. 만나서 반가워. 산해경의 모두들."
70005030-108 = "5;히나;03\n1;키사키;03;그래. 이것으로 산해경과 게헨나 사이의…… 아니, 아니로구나. 지금은 실언이었다."
70005030-109 = "5;히나;03\n1;키사키;07;그렇지만, 학교와 학교 사이의 교류까지는 아니더라도, 여기에서 알게 된 모두의 사이만이라도 좋으니……."
70005030-110 = "5;히나;03\n1;키사키;03;보다 넓은 교류를 이어 나가며, 세상을 바라보는 관점을 늘려 갔으면 하는구나."
70005030-111 = "5;레이죠;01\n3;루미;01\n1;미나;02;그런데…… 왜 이런 곳…… 그러니까, 노래방이라는 장소를 굳이 빌린 거지? 그것도 현무상회의 이름으로?\n#1;em;[?]"
70005030-112 = "5;레이죠;17;간단한 일입니다. 현무상회는 언제나 일정 수준 이상의 외부 여유 자금을 가지고 있고…….\n#5;em;…"
70005030-113 = "3;루미;03;그리고 생일이라면 역시 노래방이지! 안 그래?\n#3;em;[음표]"
70005030-114 = "#all;hide"
70005030-115 = "3;이오리;02;아, 그런가. 그렇게 말하니까 왠지 알 것 같네.\n#3;em;[반응]\n#3;closeup"
70005030-116 = "3;미나;04;그, 그랬던 건가……?\n#3;em;[?]\n#3;closeup"

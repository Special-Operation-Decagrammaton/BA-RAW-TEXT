[translation]
70005030-1 = "บันทึกของวันที่ 19 ก.พ. (2)"
70005030-2 = "มีอะไรงั้นเหรอ ทุกคน?"
70005030-3 = "พวกเธอบอกว่าอย่าเพิ่งถามอะไรแล้วชวนมาที่ D.U. ฉันก็เลยตามมา..."
70005030-4 = " คะ... คือว่าท่านประธาน..."
70005030-5 = "พวกเราได้รับการติดต่อจากย่านการค้าเทพเต่าดำของซานไห่จิง..."
70005030-6 = "ซานไห่จิง? ย่านการค้าเทพเต่าดำ?"
70005030-7 = "ถ้าเรื่องนั้น... หมายถึงการติดต่อแลกเปลี่ยนระหว่างโรงเรียนเหรอ อาโกะ?"
70005030-8 = "แต่ตามหลักขอบเขตการทำงานแล้ว การติดต่อทางการทูตกับโรงเรียนอื่นไม่ใช่หน้าที่ของคณะ#nกรรมการวินัยไม่ใช่รึไง?"
70005030-9 = "ระ... ระระระ... เรื่องนั้นคือว่า... ท่านประธาน! คือว่าฉันอาจใช้คำพูดผิดพลาดไปนิดหน่อยน่ะค่ะ...!"
70005030-10 = "คือ... ฉันรู้จักกับสมาชิกของทางย่านการค้าเทพเต่าดำคนหนึ่ง... เป็นการส่วนตัวน่ะค่ะ!"
70005030-11 = "คราวนี้ฉันเลยถามไปว่าพวกเธอจะมาเที่ยวที่เขต D.U. ด้วยกันรึเปล่า"
70005030-12 = "อาโกะ... มีเพื่อนอยู่ที่ย่านการค้าเทพเต่าดำด้วยงั้นเหรอ?"
70005030-13 = "......"
70005030-14 = "ขอโทษนะอาโกะ ที่ผ่านมาฉันคงให้เธอทำงานหนักมากเกินไป"
70005030-15 = "เธอคงอยากคลายเครียดจนต้องทำแบบนี้เลย..."
70005030-16 = "พูดอะไรอย่างนั้นกันคะ?!"
70005030-17 = "ฉันรู้แล้วละ อาโกะจัง..."
70005030-18 = " เฮ้อ..."
70005030-19 = "ทั้งสองคนเงียบก่อนเถอะค่ะ!"
70005030-20 = "ทะ... ท่านประธานเชื่อฉันนะคะ...! เอ่อ... คือว่าเรื่องนี้..."
70005030-21 = "......"
70005030-22 = "เอาเป็นว่านี่เป็นการพบปะกันด้วยเรื่องส่วนตัวล้วนๆ เลยค่ะ!!!"
70005030-26 = "(ต้องถึงขั้นบอกว่าเป็นเรื่องส่วนตัวเลยเหรอ...?)"
70005030-28 = "โอ๊ะ! ถึงแล้วสินะ! มาเลยๆ ทุกคน!"
70005030-29 = "แล้วก็... 'ไม่เจอกันนานเลยนะ' 'อาโกะ'?"
70005030-30 = "ค่า ค่า! คุณรูมิ! ใช่มั้ย... คะ?"
70005030-33 = "...!"
70005030-34 = "(เรื่องจริงเหรอเนี่ย...? อาโกะมีเพื่อนอยู่ที่ซานไห่จิงจริงๆ เหรอ...?)"
70005030-35 = "(เอ๊ะ? แต่ว่าคนพวกนี้... คือประธานย่านการค้าเทพเต่าดำ ผู้จัดการ แล้วก็หัวหน้าคณะกรรมการของ#nมังกรดำที่เป็นสภานักเรียนของซานไห่จิงนี่...)"
70005030-36 = "สวัสดีค่ะคุณอาโกะ ท่านประธาน... เล่าเรื่องคุณให้ฟังเยอะเลยค่ะ"
70005030-37 = "อะ...อื้ม คณะกรรมการวินัยของเกเฮนน่า... มะ... ไม่สิ ยินดีที่ได้เจอทั้งสี่คนนะ ฉัน... โคโนเอะ มินะ ส่วนทางนี้..."
70005030-42 = "อืม เรา... ริวเกะ คิซากิ ขอแนะนำเพียงเท่านี้แล้วกัน เพราะอย่างไรที่นี่ก็คือพื้นที่ติดต่อกันส่วนตัว"
70005030-43 = "ก่อนอื่น... เราขอเสียมารยาทหน่อยแล้วกัน ถ้าจุดเจ้านี่ไว้อาจทำให้บรรยากาศดียิ่งขึ้นน่ะ"
70005030-48 = "เอ๋? เป็นกลิ่นที่มีเอกลักษณ์ดีนะ..."
70005030-49 = "นั่นสิคะ แต่ไม่รู้ทำไมถึงรู้สึกเหมือน... ผ่อนคลายขึ้นนะ...?"
70005030-50 = "......"
70005030-51 = "(ไม่ผิดแน่ คนคนนี้คือริวเกะ คิซากิ... ประธานนักเรียนของซานไห่จิง ประมุขของมังกรดำ ผู้ถูกขนานนามว่าราชาทมิฬ...!)"
70005030-52 = "อาโกะ"
70005030-53 = "คะ... ค่ะ! ท่านประธาน?!"
70005030-54 = "ฉันขอคำอธิบายที่ชัดเจนหน่อยได้มั้ย?"
70005030-55 = "ยะยะยะยะ... อย่างที่บอกไปเลยค่ะ นี่คือคุณรูมิเพื่อนของฉัน...!"
70005030-57 = "เอ้าๆ เอาละๆ พอๆ ไหนๆ ก็มากันครบแล้ว คงไม่ต้องปิดอะไรกันอีกแล้วละมั้ง?"
70005030-58 = "ฉันจะอธิบายให้ฟังอย่างละเอียดเอง ไม่เป็นไรใช่มั้ย คิซากิ?"
70005030-59 = "อืม เราจะเชื่อใจเธอแล้วกัน โดยเฉพาะในสถานการณ์เช่นนี้"
70005030-60 = "ยังไงก็... ยินดีที่ได้รู้จักนะ คุณโซระซากิ ฮินะ เรียกเราว่าคิซากิก็ได้"
70005030-61 = "อะ... อื้อ งั้นก็เรียกฉันว่า ฮินะ ก็แล้วกัน..."
70005030-63 = "......"
70005030-64 = "เรื่องมันก็เป็นอย่างนี้ละ"
70005030-65 = "ก็นะ... สรุปก็คือเกิดข้อผิดพลาดในการขนส่งพัสดุอย่างที่เห็นว่าเกิดขึ้นได้บ่อยๆ นั่นละ แค่กรณีนี้มันเกิดขึ้นพร้อมกันก็เท่านั้นเอง"
70005030-66 = "และทั้งมินะจากฝั่งของพวกเรา และทางคณะกรรมการวินัยทุกคนเองก็พยายามทำเต็มที่แล้ว แต่ก็คงเป็นเพราะโชคชะตานั่นแหละ"
70005030-67 = "เพราะงั้น... หยุดเรื่องวุ่นวายไว้แล้วมาฉลองวันเกิดกันเลยดีมั้ย นี่เป็นเค้กที่ควรส่งคืนให้กับพวกเธอ"
70005030-73 = "ฮุฮุ นี่คือของขวัญล้ำค่าที่บรรจุความใส่ใจของทุกคนที่อยากสื่อถึงเธอเอาไว้นะ"
70005030-78 = "อย่างนี้นี่เอง... ขอบคุณมากเลยนะทุกคน แล้วก็คิซากิด้วยนะ นี่ถือว่าเป็นการแลกเปลี่ยนเค้กแบบหนึ่ง#nได้รึเปล่า?"
70005030-79 = "รับเอาไว้เถอะ ทุกคนที่อยู่รอบตัวคิซากิเองก็คงเตรียมเค้กนี่ด้วยความใส่ใจเต็มที่เลยละ"
70005030-88 = "น่าสนใจจริงๆ นะ เหลือเชื่อจริงๆ ว่าเราสองคนจะเกิดวันเดียวกัน"
70005030-89 = "แน่นอนว่ามันก็อาจจะเกิดขึ้นได้ โดยรวมแล้วมันก็คงไม่ใช่เรื่องแปลกอะไร"
70005030-90 = "คนที่เกิดวันเดียวกันในคิโวทอส ไม่ได้มีแค่พวกเราสักหน่อย"
70005030-91 = "นั่นสินะ... นักเรียนในคิโวทอสมีจำนวนมากกว่าที่เราคิดไว้ซะอีก"
70005030-92 = "แต่ยังไง วันนี้ก็ถือว่าเป็นความทรงจำพิเศษขึ้นไปอีกแบบหนึ่ง ขอบใจนะ อาโกะ อิโอริ ชินัตสึ"
70005030-93 = "ด้วยความยินดีค่ะ ฉันแค่อยากอวยพรวันเกิดให้ท่านประธาน..."
70005030-94 = "อืม ถึงจะมีเรื่องต่างๆ เกิดขึ้นมากมาย แต่เค้กของพวกเราก็ส่งถึงมือของท่านโดยปลอดภัยแล้ว ฉันคิดว่าโชคดีมากๆ เลยละค่ะ ท่านประมุข!"
70005030-95 = "ฉันแค่ช่วยทำอะไรเสริมนิดหน่อยเท่านั้นเองค่ะ..."
70005030-96 = "เอาละๆ ในชีวิตเราก็เกิดเรื่องพวกนี้ขึ้นได้บ้างนั่นละ"
70005030-97 = "เอ้า ฉันทำโมจิพีชสูตรพิเศษมาด้วย คราวนี้ลองใส่แยมพีชที่มีเนื้อผลไม้เข้าไปด้วยนะ"
70005030-98 = "ขอบใจทุกคนมากนะ โมจิอันนี้เอาไว้กินเค้กเสร็จแล้ว เราค่อยมาแบ่งกันกินแล้วกัน"
70005030-99 = "หมายถึงถ้ายังมีพื้นที่ว่างในท้องให้กินลงไปได้อีกน่ะนะ"
70005030-101 = "ฉันว่าเรื่องนั้นไม่ต้องห่วงหรอก เคยได้ยินว่าคนเรามีกระเพาะของคาวกับของหวานแยกกันอยู่ด้วยนะ?"
70005030-102 = "ฮุฮุ ก็คงจะเป็นอย่างนั้นนั่นแหละ เราพูดอะไรเสียมารยาทไปซะแล้ว แต่ขนาดตัวอย่างเราคงกินอะไร#nเยอะขนาดนั้นไม่ได้หรอก"
70005030-104 = "ถ้าอย่างนั้น... สุขสันต์วันเกิดนะคะ ท่านประธาน ท่านประมุข!"
70005030-105 = "สุขสันต์วันเกิดนะคะ ท่านประมุข ท่านประธาน"
70005030-107 = "อื้อ ยินดีที่ได้เจอนะ เพื่อนๆ จากซานไห่จิงทุกคน"
70005030-108 = "อืม เรื่องนี้จะทำให้ความสัมพันธ์ของซานไห่จิงและเกเฮนน่า... ไม่สิ ไม่ใช่แบบนั้นสินะ เผลอหลุดปากไปเสียแล้วสิ"
70005030-109 = "แต่ถึงจะไม่ใช่การแลกเปลี่ยนระหว่างโรงเรียน เราก็หวังว่าจะมีความสัมพันธ์อันดีกับทุกๆ คนที่ได้รู้จักที่#nนี่..."
70005030-110 = "และหวังว่าจะได้ขยายไปถึงการแลกเปลี่ยนที่กว้างขวางและเปิดมุมมองโลกในมุมต่างๆ ให้มากขึ้น"
70005030-111 = "แต่ว่า... ทำไมถึงต้องเป็นที่นี่ล่ะ... ทำไมถึงต้องเป็นที่ห้องคาราโอเกะนี่ด้วย? แถมยังจองในนาม#nย่านการค้าเทพเต่าดำอีก?"
70005030-112 = "คำตอบง่ายๆ ค่ะ ทางย่านการค้าเทพเต่าดำมีเงินสำรองภายนอกที่ใช้ได้อยู่จำนวนหนึ่งเสมอ..."
70005030-113 = "และถ้าพูดถึงปาร์ตี้วันเกิดก็ขาดคาราโอเกะไม่ได้สิ! ไม่ใช่รึไง?"
70005030-115 = "อ่า งั้นเหรอ ก็พอเข้าใจได้อยู่นะ"
70005030-116 = "ยะ... อย่างนั้นเองเหรอ...?"
70005030-117 = "ถ้างั้นใครจะเริ่มก่อนดีล่ะ? ถ้าไม่มีใครอยากร้องก่อน ฉันจะร้องคนแรกเอง!"
70005030-128 = "งั้นต่อไป... ฉันเองค่ะ!"
70005030-139 = "อื้ม! เสียงดนตรี... ฟีลมาแล้ว! ชักตื่นเต้นแล้วสิ!"
70005030-152 = "บรรยากาศแบบนี้มันอะไรกันคะเนี่ย!"
70005030-153 = "ไม่ค่ะ คือว่าเรื่องนั้น... ถึงบอกฉันแล้วจะให้ทำยังไง..."
70005030-155 = "ฮะ... ฮิโนมิยะ ชินัตสึ! จะขอ... เปลี่ยนบรรยากาศให้เองค่ะ!"
70005030-177 = "(คุณครูเปิดประตูเข้าไปในห้องคาราโอเกะ ตามที่ได้รับเชิญมา!)"
70005030-179 = "[ns] \"ว่าไง ทุกคน!\""
70005030-181 = "คะ... คุณครู...?!"
70005030-183 = "ครู...?!"
70005030-187 = "[ns] \"แฮปปี้เบิร์ธเดย์นะ ฮินะ! คิซากิ!\""
70005030-189 = "ฮะ... ฮึ่ม! อันที่จริงฉันก็ไม่ได้อยากเรียกคุณครูมาในที่แบบนี้หรอกนะคะ แต่ก็เผื่อไว้ก่อนดีกว่าน่ะค่ะ"
70005030-190 = "ฉันชวนมาเพราะกลัวคุณครูจะน้อยใจต่างหากล่ะคะ เพราะงั้นคุณครูควรจะขอบคุณฉันด้วยนะคะ!"
70005030-191 = "อาโกะติดต่อไปหาคุณครูเหรอ...?"
70005030-192 = "หืม? อย่างนั้นเหรอ เจ้าหน้าที่อาวุโสอาโกะ? ฉันคิดว่าถ้าคุณครูมาด้วยก็คงดีก็เลย..."
70005030-193 = "มะ... ไม่ใช่อย่างนั้นนะคะ คือว่า...!"
70005030-194 = "อย่างนี้นี่เอง... ทั้งสองคนต่างก็บอกเรื่องนี้กับคุณครูสินะ"
70005030-195 = "เราขอขอบคุณพวกเธอ มินะ อาโกะ และคุณครูที่คอยช่วยเหลือในยามยากลำบากด้วย"
70005030-196 = "[s1] \"พูดอะไรน่ะ! ครูต้องมาอยู่แล้วสิ!\"\n[s2] \"ขอบคุณมินะกับอาโกะนะที่บอกครู!\""
70005030-199 = "อืม มันก็ต้องเป็นแบบนั้นอยู่แล้วสิ ฮึ"
70005030-200 = "จริงๆ เลยเชียว แค่ครั้งนี้ครั้งเดียวนะคะ...?"
70005030-201 = "[ns3] \"เอาละๆ ครูจะสร้างบรรยากาศให้เอง!\"\n[ns4] \"ครูจะรับผิดชอบที่มาขัดจังหวะเอง!\""
70005030-204 = "คะ...? คะ... คุณครูไม่ได้เข้ามาขัดบรรยากาศอะไรเลยนะคะ...?"
70005030-205 = "เอาละๆ เอาตามที่คุณครูบอกนั่นแหละ เรย์โจว"
70005030-206 = "เข้าใจแล้วค่ะ..."
70005030-210 = "[ns] \"ครูจะทรีโอ้กับฮินะแล้วก็คิซากิ!\""
70005030-211 = "เอ๊ะ เอ๋...? แต่ว่าฉัน... ฉันร้องเพลงไม่ค่อยเก่งนะ...?"
70005030-212 = "เรื่องนั้นเราเองก็เหมือนกัน..."
70005030-216 = "โฮ่? เวลาที่ต้องสร้างบรรยากาศ การร้องเพลงเพี้ยนๆ ก็น่าจะเป็นสิ่งที่ดีเหมือนกันเช่นนั้นหรือ? ความวุ่นวายเล็กๆ อาจจะทำให้บรรยากาศสนุกขึ้นก็ได้งั้นเหรอ?"
70005030-217 = "อืม เข้าใจแล้วละ บางครั้งการสร้างรอยยิ้มให้ทุกคนก็เป็นสิ่งสำคัญ"
70005030-218 = "ขะ... เข้าใจแล้ว ถ้างั้น..."
70005030-231 = "[ns] \"เอาเลยยยยยย!!!\""
70005030-237 = "(หลังจากนั้นปาร์ตี้วันเกิดที่จัดขึ้นในวันที่ 19 ก.พ. ก็ผ่านไปได้ด้วยดี โดยทิ้งความสุขและความทรงจำ#nที่ไม่อาจลืมเลือนเอาไว้เบื้องหลัง)"
70005030-238 = "(สิ่งเดียวที่คุณครูมองข้ามไปคือพลังกายอันแข็งแกร่งของเด็กสาววัยมัธยมปลาย...)"
70005030-239 = "(ความจริงแล้วพละกำลังอันเหลือล้นนั้นไม่ใช่สิ่งที่ผู้ใหญ่จะรับมือได้ง่ายๆ เลย...)"
70005030-240 = "บันทึกของวันที่ 19 ก.พ."

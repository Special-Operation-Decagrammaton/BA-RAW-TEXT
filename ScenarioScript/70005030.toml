[translation]
70005030-1 = "Record of a February 19th (2)"
70005030-2 = "So what's going on here?"
70005030-3 = "As you requested, I came to the D.U., no questions asked."
70005030-4 = " W-Well, Head Prefect..."
70005030-5 = "We received a message from the Black Tortoise Promenade of Shanhaijing..."
70005030-6 = "Shanhaijing? Black Tortoise Promenade?"
70005030-7 = "Then... Is this an exchange between academies, Ako?"
70005030-8 = "Foreign diplomacy is not something that falls under our purview as the Prefect Team."
70005030-9 = "W-W-Well, uh. Head Prefect! That's not exactly what I meant!"
70005030-10 = "I...am...uh...per...sonally acquainted with someone from the Black Tortoise Promenade!"
70005030-11 = "And they asked if we would like to hang out in the D.U. together!"
70005030-12 = "You have...a friend...in the Black Tortoise Promenade?"
70005030-13 = "..."
70005030-14 = "I'm sorry, Ako. I've been pushing you too hard lately, haven't I?"
70005030-15 = "Is that how desperate you were for a change of pace? You felt the need to lie about having a friend?"
70005030-16 = "What is that supposed to mean?!"
70005030-17 = "I get where she's coming from..."
70005030-18 = " *sigh*"
70005030-19 = "You two, quiet!"
70005030-20 = "A-And, please believe me, Head Prefect...! Uh... That's, this is..."
70005030-21 = "..."
70005030-22 = "Anyway, this absolutely must remain a personal matter!"
70005030-26 = "(MUST remain a personal matter...?)"
70005030-28 = "Oh! You're finally here! Welcome, everyone!"
70005030-29 = "Then...\"It's been a while,\" right, Ako?"
70005030-30 = "Y-Yes! Rumi! That's...right...?"
70005030-33 = "...!"
70005030-34 = "(She wasn't lying? Really? Ako has a friend from Shanhaijing?)"
70005030-35 = "(Huh? But this collection of people... The president of the Black Tortoise Promenade, its manager, and the executive officer of Genryumon, Shanhaijing's student council...)"
70005030-36 = "Hello, Ako. We've...heard a lot about you from the president."
70005030-37 = "Uh, um... Hello, Prefect Team of Gehenna... I mean, um, hello, you four ordinary people! I'm Konoe Mina. And this is..."
70005030-42 = "Hm. Ryuuge Kisaki. That should be a sufficient title, seeing as this meeting is of a personal nature."
70005030-43 = "Before that... Please excuse me. I believe it'd be prudent to light this preemptively."
70005030-48 = "Huh? That's an interesting scent..."
70005030-49 = "Yes. But it feels...relaxing...?"
70005030-50 = "..."
70005030-51 = "(It's her. That's Ryuuge Kisaki, student council president of Shanhaijing and leader of Genryumon! The Dark Monarch!)"
70005030-52 = "Ako."
70005030-53 = "Y-Y-Y-Yes, Head Prefect?!"
70005030-54 = "May I ask exactly what's going on here?"
70005030-55 = "A-A-As I said, I'm here with my friend, Rumi...!"
70005030-57 = "Now, now. Stop right there. Since we've all gathered, there's no reason for secrets anymore."
70005030-58 = "I'll go ahead and explain the situation now. Does that work for you, Kisaki?"
70005030-59 = "Of course. I trust you, especially under these circumstances."
70005030-60 = "Anyway... I am pleased to meet you, Sorasaki Hina. Feel free to call me Kisaki."
70005030-61 = "O-Okay... You can...call me Hina as well."
70005030-63 = "..."
70005030-64 = "So, that is the situation."
70005030-65 = "While delivery mistakes are a common occurrence, coincidence caused our paths to cross here."
70005030-66 = "And while Mina did her utmost, as did the Prefect Team, you were all victims of a trick of fate."
70005030-67 = "On that note, shall we celebrate our birthdays now? Here. I believe this cake is yours."
70005030-73 = "Fufu. It would appear this is a precious gift, carrying the deep appreciation your followers have for you."
70005030-78 = "I see... Thank you, everyone. And you too, Kisaki. Could we call this a cake exchange of sorts, then?"
70005030-79 = "And this cake is for you. Everyone around you really put a lot of care into getting this for you."
70005030-88 = "Anyways, what a surprise that we share a birthday."
70005030-89 = "It does appear that way at first glance, but it's not quite so impossible in the grand scheme of things."
70005030-90 = "Surely we are not the only students in all of Kivotos who share the same day of birth."
70005030-91 = "That's...true. Especially considering the number of students here."
70005030-92 = "But this birthday in particular will be a special memory for me. Thank you, Ako. Iori. Chinatsu."
70005030-93 = "You're welcome. A-As long as I get to celebrate your birthday with you..."
70005030-94 = "Um... It was like the plot of a movie, but I'm glad it concluded safely, and we got your cake to you, Madam!"
70005030-95 = "Although I did most of the work in making that happen..."
70005030-96 = "Now, now. Life is just like that sometimes."
70005030-97 = "Here, this is my special peach mochi. I made it with peach jam and pulp."
70005030-98 = "Thank you, everyone. Let's share this dessert after the cake."
70005030-99 = "If our stomachs can bear it all, that is."
70005030-101 = "I see no problem. They do say people have a separate stomach for eating desserts or cake."
70005030-102 = "Fufu. That's definitely true. My mistake. It is I who is unable to eat much."
70005030-104 = "Then, happy birthday, Head Prefect, Madam!"
70005030-105 = "Happy birthday, Madam, Head Prefect."
70005030-107 = "Yes. It's nice to meet you, everyone from Shanhaijing."
70005030-108 = "This could mark the beginning of Shanhaijing and Gehenna's... My apologies. I misspoke."
70005030-109 = "But, even if we cannot consider it an exchange between schools, even just among those who gathered here today..."
70005030-110 = "...I hope we may continue to broaden our horizons and expand our perspectives of this world we all inhabit."
70005030-111 = "I do have a question. Why...are we in a karaoke room? Paid for by us, at that."
70005030-112 = "Well, that's simple. The Black Tortoise Promenade generally enjoys the benefits of having healthy reserve funds..."
70005030-113 = "And karaoke is a must on birthdays! Isn't that right?"
70005030-115 = "Ah, that's right. I think I've heard that before."
70005030-116 = "I-Is that so?"
70005030-117 = "Then who's going to start first? No volunteers? I'll go!"
70005030-128 = "Then... I'll be next!"
70005030-139 = "Hmmm! Poetry... A melody has come to my mind! I feel my excitement brewing!"
70005030-152 = "Hey, what are you going to do about this mood?!"
70005030-153 = "Well, um... Even if you try to tell me to do something..."
70005030-155 = "H-Hinomiya Chinatsu, reporting! I will turn this mood around!"
70005030-177 = "After receiving an invitation, I made my way to the karaoke room and opened the door!"
70005030-179 = "[ns] \"Everyone, hello!\""
70005030-181 = "S-Sensei...?!"
70005030-183 = "Sensei...?!"
70005030-187 = "[ns] \"Happy birthday, Hina! Kisaki!\""
70005030-189 = "H-Hmph! I absolutely did not want to invite Sensei here, but I thought it'd be prudent, just in case!"
70005030-190 = "I was thinking of you! I didn't want you to feel left out! Be grateful, Sensei!"
70005030-191 = "You're the one who called Sensei, Ako...?"
70005030-192 = "Hm? You did so as well, Senior Administrator Ako? Because I also thought it would be nice if Sensei were to attend..."
70005030-193 = "W-Well... So...!"
70005030-194 = "...I see. Both of you invited Sensei separately."
70005030-195 = "My deepest gratitude. Mina, Ako. And you, Sensei, for making the long trek here."
70005030-196 = "[s1] \"What are you saying! Of course I'd come!\"\n[s2] \"Mina and Ako, thank you for letting me know!\""
70005030-199 = "Mm. Of course. Heh."
70005030-200 = "... Really, it's just for this one time."
70005030-201 = "[ns3] \"Then, let this adult take responsibility for bringing the mood down!\"\n[ns4] \"Let's enjoy Hina and Kisaki's party to the fullest!\""
70005030-204 = "Huh? U-Um, Sensei really wasn't the one that killed the mood though..."
70005030-205 = "Now, now. Let's just play along, Reijo."
70005030-206 = "...Understood."
70005030-210 = "[ns] \"Hina, Kisaki, it's time for a trio song!\""
70005030-211 = "Um, what...? But I don't really know any songs...?"
70005030-212 = "I am the same..."
70005030-216 = "Hm? Enjoying a party isn't about singing well? I simply need to have fun?"
70005030-217 = "I believe I understand that. Providing laughter is the greatest gift of all."
70005030-218 = "Ah. Yes. I get it. Um..."
70005030-231 = "[ns] \"Now, time to LET LOOSE!!!\""
70005030-237 = "And so, the birthday party of February 19th was filled with fun, laughter, and unforgettable memories."
70005030-238 = "I made one miscalculation, however. The stamina of high schoolers..."
70005030-239 = "...is not something an adult can ever take lightly."
70005030-240 = "Record of a February 19th"

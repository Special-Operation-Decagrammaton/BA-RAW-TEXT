[translation]
70005030-1 = "とある2月19日の記録（２）"
70005030-2 = "それで、何の用事なの？"
70005030-3 = "言われるがままにD.U.まできたけど……。"
70005030-4 = "委員長、その……。"
70005030-5 = "せ、山海経の玄武商会から、連絡をもらいまして……。"
70005030-6 = "山海経？玄武商会？"
70005030-7 = "つまり……学園間の交流会なの？"
70005030-8 = "そういうのは、私たちの仕事じゃないのよ？"
70005030-9 = "ご、ごほん……言い間違えました。"
70005030-10 = "実は、その……玄武商会の……そう！「友人」から連絡をもらいまして……。"
70005030-11 = "今日、一緒にD.U.で遊ぶ約束を、していたのですが……！"
70005030-12 = "アコに……玄武商会の友達が……？"
70005030-13 = "……。"
70005030-14 = "ごめん、アコ。今まで苦労をかけてしまったわね。"
70005030-15 = "……休暇取得のために、わざわざ嘘をつく必要はないから……。"
70005030-16 = "ど、どういう意味ですか！？"
70005030-17 = "私にはなんとなく分かるかも……。"
70005030-18 = "はぁ……。"
70005030-19 = "おふたりは黙っていてください！"
70005030-20 = "い、委員長！こ、これは、その……"
70005030-21 = "……。"
70005030-22 = "とにかく、プライベートである、ということが重要なんです。"
70005030-26 = "（重要……？）"
70005030-28 = "おっ！みんな待ってたよ！"
70005030-29 = "……久しぶりだね、[ruby=・]ア[/ruby][ruby=・]コ[/ruby]？"
70005030-30 = "え、ええ！お久しぶりです、ルミさん……。"
70005030-33 = "……！"
70005030-34 = "（本当に……玄武商会の友達が……？）"
70005030-35 = "（でも、この人たちは……玄武商会の会長とマネージャーと、玄龍門の執行部長……#nあの小柄な生徒は……）"
70005030-36 = "その、アコさん……お話は会長から聞きました……。"
70005030-37 = "う、うむ。ゲヘナの風紀委い……ではなく、友よ！#n私は[ruby=このえ]近衛[/ruby]ミナだ。それと、こちらは……。"
70005030-42 = "[ruby=りゅうげ]竜華[/ruby]キサキじゃ。このような場……肩書きを名乗るのは無粋かの。"
70005030-43 = "本題に入る前に……すまぬが、香を焚かせてくれ。"
70005030-48 = "ん？不思議な香りだな……。"
70005030-49 = "ええ、なんだか気持ちが落ち着くような……。"
70005030-50 = "……。"
70005030-51 = "（竜華キサキ……間違いない。#n山海経の生徒会長「黒い君主」とも呼ばれる玄龍門の門主……！）"
70005030-52 = "アコ。"
70005030-53 = "は、はい！委員長！"
70005030-54 = "詳しく、説明してくれる？"
70005030-55 = "おっ、お話の通り、私は友達のルミさんと一緒に……！"
70005030-57 = "アコ。せっかくみんな集まってるし、もう隠しごとはいいんじゃない？"
70005030-58 = "事の経緯はあたしが説明するからさ。ね？キサキ。"
70005030-59 = "ああ。[ruby=そなた]其方[/ruby]なら任せられる。特に、こういう場においてはな。"
70005030-60 = "して……ゲヘナの友人たちよ。妾のことは気軽に「キサキ」と呼んでくれ。"
70005030-61 = "あ、ええと……私も「ヒナ」でいいわ……。"
70005030-63 = "……。"
70005030-64 = "つまるところ――"
70005030-65 = "誤配が起きたというわけじゃな。双方の荷物が行き違ったが故のこと。"
70005030-66 = "ミナも、風紀委員会も、お互い最善を尽くしたようじゃが……#n運命の悪戯とは、これを指すのやもしれぬ。"
70005030-67 = "ふむ――そろそろ本題に移ろうかの。"
70005030-73 = "ほれ、これが……風紀委員会に本来届くはずだったケーキじゃ。"
70005030-78 = "……ありがとう。はい、これがあなたのケーキ。"
70005030-79 = "なんだかこうしているとプレゼント交換会のようね。#nふふっ……なんだか不思議な体験だわ。"
70005030-88 = "まさか私たちの誕生日が同じだったなんて。"
70005030-89 = "365分の１……歳まで同じとなると、珍しくはあるさな。"
70005030-90 = "縁とは、ほんに不思議なものじゃ。"
70005030-91 = "ええ……そうね。"
70005030-92 = "今日は特別な日になりそう。ありがとう、みんな。"
70005030-93 = "一時はどうなることかと思いましたが……。"
70005030-94 = "無事ケーキをお届けできたこと、嬉しく思います。"
70005030-95 = "最初から協力していれば、大事にならずに済んだんですけどね……。"
70005030-96 = "まぁまぁ、結果オーライなんじゃない？"
70005030-97 = "キサキ、ヒナ。はい、これはあたしから。"
70005030-98 = "また随分な量を作ってきたものじゃな……。皆で食べても余りあるのではないか？"
70005030-99 = "ケーキを食べるまで、満腹にならぬようにせねばな。"
70005030-101 = "余るようなら、持って帰ればいいわ。"
70005030-102 = "ふふ、それもそうさな。"
70005030-104 = "それでは改めて……ヒナ委員長、キサキ門主！お誕生日おめでとうございます！"
70005030-105 = "おめでとうございます！門主様、委員長。"
70005030-107 = "うん。ありがとう。"
70005030-108 = "山海経とゲヘナの交流会――否、「私的」な集まりか。"
70005030-109 = "今後もまた……非公式でも良い、せめて此度のように……"
70005030-110 = "一歩ずつでも交流の輪を広げ、より見識を深めていきたいものじゃな。"
70005030-111 = "ところで……どうして玄武商会名義の予約で誕生日パーティーを？#nしかもカラオケで……？"
70005030-112 = "会長たっての希望です。"
70005030-113 = "やっぱり誕生日パーティーはカラオケでしょ！"
70005030-115 = "そう言われると、なんかそんな気もしてくるな……。"
70005030-116 = "そうなのか……？"
70005030-117 = "ほらほらっ、誰から始める？誰もやらないなら……あたしから歌っちゃうね！"
70005030-128 = "次は私です……！"
70005030-139 = "華麗にバトンをつないで見せよう……！"
70005030-152 = "ちょっと！この空気、どうするんですか！"
70005030-153 = "わ、私に言われましても……。"
70005030-155 = "致し方ありません。ここは私が……"
70005030-177 = "（送られてきた地図を見ながら、皆がいるカラオケに到着した）"
70005030-179 = "[ns] \"やっほー！\""
70005030-181 = "せ、先生……！？"
70005030-183 = "先生……！？"
70005030-187 = "[ns] \"お誕生日おめでとう！ヒナ！キサキ！\""
70005030-189 = "べっ、別に？先生を呼ぶつもりはなかったんですけどね！？"
70005030-190 = "貸しを作っておけば後々便利だと思って……先生は私に感謝してくださいね？"
70005030-191 = "アコが連絡してたの……？"
70005030-192 = "アコ行政官もか？奇遇だな！私は先生に来て欲しくて呼んだのだが……。"
70005030-193 = "あ、えっと、その……！"
70005030-194 = "……なるほど。二人とも、先生を招待したのじゃな。ミナ、アコ、感謝する。"
70005030-195 = "……先生、よくぞ参ってくれた。"
70005030-196 = "[s1] \"誕生日だし、もちろん顔を出さないと！\"\n[s2] \"ミナもアコも、連絡してくれてありがとう！\""
70005030-199 = "フッ……まあ、当然のことだ。"
70005030-200 = "……今回は特別ですからね？"
70005030-201 = "[ns3] \"じゃあ……大人の乱入で冷え込んだ雰囲気を！\"\n[ns4] \"責任を持って、盛り上げていこうかな！\""
70005030-204 = "はい？別に冷え込んでいないと思いますが……"
70005030-205 = "まぁまぁ、あれも先生なりのノリだからね。"
70005030-206 = "は、はあ……。"
70005030-210 = "[ns] \"ヒナとキサキも、一緒に歌おう！\""
70005030-211 = "え？でも私……歌はあまり……"
70005030-212 = "妾も大きな声を出すのは……"
70005030-216 = "ふむ――妾たちが歌うことが肝要である、と？"
70005030-217 = "そうさな……たまにはそういう姿を見せるのも一興かの。"
70005030-218 = "わ、分かったわ。じゃあ……。"
70005030-231 = "[ns] \"盛り上がっていくぞーっ！！\""
70005030-237 = "（こうして盛り上がった2月19日の誕生日パーティーは、成功裏に幕を下ろした……のだが……）"
70005030-238 = "（雰囲気に呑まれて、皆と同じテンションで 楽 しんだ結果……）"
70005030-239 = "（遅れてくる激痛で、自分が「大人」であることを思い知らされてしまった）"
70005030-240 = "とある2月19日の記録"

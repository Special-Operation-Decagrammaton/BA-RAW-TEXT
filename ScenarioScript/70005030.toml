[translation]
70005030-1 = "某個2月19日的紀錄（２）"
70005030-2 = "所以大家究竟有什麼事？"
70005030-3 = "我只聽說「總之先來D.U.」就連忙趕來了……"
70005030-4 = "那，那個，其實是這樣的，委員長……"
70005030-5 = "我們……接到了來自山海經「玄武商會」的聯絡……"
70005030-6 = "山海經？玄武商會？"
70005030-7 = "所以這……是學園間的交流嗎，亞子？"
70005030-8 = "可是照理說，這種對外事務應該不是我們風紀委員會的職責吧？"
70005030-9 = "是，是是是，是這樣的委員長！剛才是我一時口誤……！"
70005030-10 = "其實我只是剛好跟玄武商會的某位成員……有一點點私交！"
70005030-11 = "想說這次一起來D.U.玩玩而已……！"
70005030-12 = "亞子你……有朋友在玄武商會？"
70005030-13 = "……"
70005030-14 = "抱歉，亞子。#n都怪我讓你工作太累了。"
70005030-15 = "才會逼得你必須靠這種一戳就破的謊言來轉換心情……"
70005030-16 = "您，您這是什麼意思！？"
70005030-17 = "我多少能感同身受，亞子醬……"
70005030-18 = "唉……"
70005030-19 = "你們兩個給我安靜點！"
70005030-20 = "請，請委員長相信我……！#n這，這真的……"
70005030-21 = "……"
70005030-22 = "總之是「私下聚會」沒錯！！！"
70005030-26 = "（「私下聚會」……？）"
70005030-28 = "喔～終於來啦！大家快進來吧！"
70005030-29 = "那麼……「好久不見了，亞子」？"
70005030-30 = "是，是啊！瑠美……同學？"
70005030-33 = "……！"
70005030-34 = "（亞子他……真的有山海經的朋友……？）"
70005030-35 = "（等等，這些人是……#n　玄武商會的會長跟經理，還有山海經學生會「玄龍門」的執行部長……）"
70005030-36 = "你好，亞子同學。#n會長常常提到你的事呢。"
70005030-37 = "唔嗯，格黑娜的風紀委員……啊不是，很高興見到你們四位。#n我叫做近衛美奈。這位是……"
70005030-42 = "妾身名叫龍華妃姬。#n如此介紹應當足矣才是，畢竟這裡是「私下」的場合。"
70005030-43 = "在進入正題之前……還請恕妾身先點燃香火。"
70005030-48 = "咦？這個香味還真特別……"
70005030-49 = "就是說啊，聞起來……有種放鬆的感覺？"
70005030-50 = "……"
70005030-51 = "（沒錯……他就是山海經的學生會長，#n　也被稱為「黑色君主」的玄龍門門主──龍華妃姬……！）"
70005030-52 = "亞子。"
70005030-53 = "是，是是是是，委員長！？"
70005030-54 = "可以請你……好好解釋一下嗎？"
70005030-55 = "就，就像我說的一樣，我跟瑠美同學……！"
70005030-57 = "好好好，演戲環節就到此為止～#n既然大家都到齊了，沒必要再藏來藏去了吧？"
70005030-58 = "事情就由我來一一解釋。#n可以嗎，妃姬？"
70005030-59 = "當然。妾身相信汝。尤其是在這種場合。"
70005030-60 = "然在此之前……幸會，空崎陽奈委員長。#n稱呼妾身妃姬即可。"
70005030-61 = "啊，嗯……也叫我陽奈就行了。"
70005030-63 = "……"
70005030-64 = "事情就是這樣。"
70005030-65 = "簡而言之，這不過是送錯地址的常見錯誤同時發生罷了。"
70005030-66 = "儘管美奈與風紀委員會的諸位皆已盡己所能，遺憾仍舊沒能逃離命運的捉弄。"
70005030-67 = "那麼，就讓吾等開始慶祝生日吧。#n這是原本應該送到汝手中的蛋糕。"
70005030-73 = "呵呵，此乃蘊含眾人心意的珍貴禮物哦？"
70005030-78 = "原來如此……謝謝大家，還有妃姬。#n這樣也算是一種「蛋糕交換儀式」吧？"
70005030-79 = "請收下這份蛋糕。#n這是妃姬身邊的人們用心準備的。"
70005030-88 = "話說還真巧呢。沒想到我們的生日會在同一天。"
70005030-89 = "此事說巧歸巧，然就整體而言倒也不算太稀奇。"
70005030-90 = "奇普托斯同日生日的學生，想必也不僅吾等才是。"
70005030-91 = "是啊……尤其又考量到奇普托斯的學生人數。"
70005030-92 = "不過今天似乎能留下特別的回憶。#n謝謝你們，亞子、伊織、千夏。"
70005030-93 = "不客氣！只要能為委員長慶生，我就心滿意足了……"
70005030-94 = "儘管過程出了點狀況，不過蛋糕能順利送達真的太好了，門主大人！"
70005030-95 = "雖然大部分的事情都是我處理的就是了……"
70005030-96 = "哎呀哎呀～人生嘛，總是會碰上這種事的。"
70005030-97 = "來，這是我特製的桃子麻糬，裡面加了果肉做的桃子果醬喔！"
70005030-98 = "感謝諸位。#n麻糬就待品嘗完蛋糕後再一同享用吧。"
70005030-99 = "假如食量仍有餘裕的話。"
70005030-101 = "這應該不用擔心吧？不是都說甜點的胃是分開的嗎？"
70005030-102 = "呵呵，說得也是。#n可惜妾身身體的負荷量實在有限啊。"
70005030-104 = "那麼，祝委員長與門主生日快樂！"
70005030-105 = "祝兩位生日快樂，門主大人、委員長！"
70005030-107 = "嗯。很高興認識山海經的大家。"
70005030-108 = "是啊。如此一來，山海經與格黑娜之間的──不，方才是妾身失言了。"
70005030-109 = "然而即便並非學園間的正式交流，希望在場的諸位……"
70005030-110 = "往後也能持續擴大交流，開拓觀察世界的視角。"
70005030-111 = "不過說真的……為什麼要選在卡拉OK？#n而且還是用玄武商會的名義……？"
70005030-112 = "原因很簡單。#n我們玄武商會一直都會預留一定的外部活動預算……"
70005030-113 = "而且說到生日，當然就要來卡拉OK囉？"
70005030-115 = "啊，這麼說好像也有點道理……"
70005030-116 = "是，是這樣嗎……？"
70005030-117 = "那誰要先唱？沒人要的話我就不客氣囉！"
70005030-128 = "下一個換我！"
70005030-139 = "嗯……靈感正在湧現！我嗨起來了！"
70005030-152 = "這個場面該怎麼辦啊！"
70005030-153 = "呃……就算你問我，我也……"
70005030-155 = "火，火宮千夏！為了轉換氣氛……接棒！"
70005030-177 = "（依照邀請打開了卡拉OK的門──）"
70005030-179 = "[ns]「大家好呀～！」"
70005030-181 = "老，老師……！？"
70005030-183 = "老師……！？"
70005030-187 = "[ns]「生日快樂，陽奈！妃姬！」"
70005030-189 = "哼哼！我可不是為了老師才邀請您的哦？#n只是覺得……"
70005030-190 = "萬一讓您感到失望好像不太好，所以才通知一下而已！#n老師記得要好好感謝我喔！"
70005030-191 = "是亞子你通知老師的……？"
70005030-192 = "咦？原來是這樣嗎，亞子行政官？#n我只是覺得老師如果能來應該不錯而已……"
70005030-193 = "那，那個，就是說……！"
70005030-194 = "……原來如此。#n汝等二人皆分別向老師告知了此事啊。"
70005030-195 = "妾身在此向汝等表示感謝，亞子、美奈──還有特地前來的老師。"
70005030-196 = "[s1]「不用客氣！這是理所當然的事啊！」\n[s2]「謝謝美奈跟亞子願意告訴我這個聚會！」"
70005030-199 = "哼，這是應該的。"
70005030-200 = "……下不為例哦？"
70005030-201 = "[ns3]「那麼，為了拯救被大人亂入而冷場的氣氛──」\n[ns4] 「我就來負責炒熱現場吧！」"
70005030-204 = "咦？其，其實老師的出現也沒有讓氣氛冷下來呀……"
70005030-205 = "好了好了，你就當作是這樣吧，令女。"
70005030-206 = "我知道了……"
70005030-210 = "[ns]「陽奈跟妃姬，要不要來個三重唱啊！」"
70005030-211 = "咦……？可是我不太會唱歌……"
70005030-212 = "妾身也是如此……"
70005030-216 = "若要炒熱氣氛，唱得不好也無所謂？#n略顯微妙反倒會更加有趣？"
70005030-217 = "好吧，妾身明白了。#n有時眾人的興致也是很重要的。"
70005030-218 = "我，我知道了。#n那我也……"
70005030-231 = "[ns] 「要上囉──！！」"
70005030-237 = "（於是2月19日的生日派對，在留下難以忘懷的歡樂回憶後，圓滿地落幕了）"
70005030-238 = "（如果要說有什麼事被忽略的話……）"
70005030-239 = "（那就是高中生的體力，對大人來說實在太難應付了……）"
70005030-240 = "某個2月19日的紀錄"

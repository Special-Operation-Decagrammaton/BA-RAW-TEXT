[translation]
70011020-1 = "監原ミスズの憂鬱（２）"
70011020-2 = "それ、いくらになるの？"
70011020-6 = "えっ……？"
70011020-7 = "あの……「外にお友達はいないのか」と聞いたつもりなのですが……。"
70011020-8 = "だから。作ったとして、それでいくら儲かるの？"
70011020-9 = "少々、理解が難しいです……お友達を作るのは、お金のためではなくて……。"
70011020-10 = "それじゃあ何の役にも立たないな。"
70011020-11 = "えっと……世の中には、お金には代えられないものがたくさん……。"
70011020-12 = "なぁ。"
70011020-13 = "「お金には代えられない」……？ハッ。"
70011020-14 = "アンタの自己満足で、私の時間を無駄にしないでくれる？"
70011020-15 = "あ、そ、そうじゃなく……わ、私は……。"
70011020-17 = "なぁ――"
70011020-19 = "おい！"
70011020-20 = "はふひっ！？"
70011020-21 = "呼び出したのはそっちだろ？目の前で寝てんじゃねぇよ。"
70011020-22 = "あっ、ごめんなさい……少し疲れていて。"
70011020-23 = "なんだ、徹夜でもしたのか？"
70011020-24 = "まあ、似たようなものといいますか……えへへ。"
70011020-25 = "……それより。呼び出された理由、分かりますか？"
70011020-26 = "ああ、うん。まあ。"
70011020-27 = "問い詰めたいわけじゃありません。ただ、理由が知りたいのです。#n普段の生活に何か不満でも？"
70011020-28 = "別に。"
70011020-29 = "別に……ですか。悪い答えじゃありません。"
70011020-30 = "といっても、良い答えでもないですが。"
70011020-31 = "生活記録は拝見しましたが、書面だけでは分からなくて。なぜ脱走を？"
70011020-32 = "……別に理由なんてねぇよ。"
70011020-33 = "私にもできるんじゃねぇかなって思っただけ。"
70011020-34 = "脱走を、ですか……。"
70011020-35 = "……その自信の根拠を伺っても？"
70011020-36 = "いや、前に7人も脱獄したらしいじゃん？"
70011020-37 = "外じゃ「七囚人」とかって呼ばれてるやつ。"
70011020-38 = "だったら私でも、って。"
70011020-39 = "7人の脱走……それは事実です。"
70011020-40 = "といっても、7人[ruby=・]し[/ruby][ruby=・]か[/ruby]脱走できなかったということです。"
70011020-41 = "矯正局の設立以来、その7人以外の脱走を許したことはありません。#n当時だって、更なる脱走は防ぎきっています。"
70011020-42 = "へぇ……聞いてた話とは違うな。#n矯正局のセキュリティはガバガバなんじゃなかったのか？"
70011020-43 = "「災厄の狐」なんて好き勝手に出たり入ったりしてたんだろ？"
70011020-44 = "……ワカモ、ですね。"
70011020-45 = "……。"
70011020-46 = "本題に戻りましょう。今はワカモの話ではありません。"
70011020-47 = "なんにせよ、私たちは皆さんを苦しめたくて外出に制限をかけているのではありません。"
70011020-48 = "ご存じだとは思いますが、矯正局に収監されるケースは2つ。#n「学園側が指導を諦めた生徒」もしくは「そもそも学籍が不明な生徒」です。"
70011020-49 = "いわば、学園がお手上げ状態の問題児ということですね。"
70011020-50 = "酷い言われようだな。"
70011020-51 = "もちろん、基準は学園によってそれぞれです。#n最近のゲヘナのように、1人として矯正局送りにしない学園もあれば、#n些細なミス1つで見放す学園だってあります。"
70011020-52 = "ですから「矯正局にいた」という事実は、将来にとって必ずしも大きな障害になるわけではない、ということです。"
70011020-53 = "それ、慰めのつもり……？"
70011020-54 = "……一応は。"
70011020-55 = "ヴァルキューレ警察学校はキヴォトスの治安を担う学園です。#n予測不可能な問題児を野放しにするわけにはいきません。"
70011020-56 = "といっても、反省して改心すれば、いつだって出所が認められます。"
70011020-57 = "矯正局は「刑務所」ではないのですから。"
70011020-58 = "わざわざ脱走なんてしなくてもいいんですよ。"
70011020-59 = "わかったわかった。反省すりゃいいんだろ。"
70011020-63 = "もう1つ。大事な質問があります。"
70011020-64 = "脱走をして、何をしようとしたのですか？"
70011020-65 = "は？だから、別に理由はないって。"
70011020-66 = "脱走を決めた理由は「やれそうだと思ったから」……ですよね？#nでは脱走に成功したら、その後は何をするつもりだったのですか？"
70011020-67 = "なんでそんなにこだわるんだよ。聞く必要ないだろ？"
70011020-68 = "そんなことはありません。本人の口から聞くまで、真相は分からないものですから。"
70011020-69 = "……わーったよ、言えばいいんだろ！でも！……絶対笑うなよ？"
70011020-73 = "……今日、誕生日なんだよ。"
70011020-74 = "でもさ、私ってここに来たばっかだから。仲のいい奴もいなくてさ……。"
70011020-75 = "それでちょっとだけ、[ruby=ダチ]友達[/ruby]に会ってこようと思って……。#n逃げる気もないし、ちゃんと帰ってくるつもりだったんだよ！"
70011020-76 = "……そうでしたか。"
70011020-77 = "ふんっ、どうせお前らは信じねぇんだろうけど。"
70011020-78 = "そう思わせてしまったのならごめんなさい。でも……。"
70011020-84 = "――すみません、例の物を持ってきていただけますか？"
70011020-85 = "はい、先ほどお預かりしたやつですよね？"
70011020-87 = "なんだよ、それ。"
70011020-88 = "できればもう少し、和やかな雰囲気でお渡ししたかったのですが……ごめんなさい。#nそれと――"
70011020-89 = "お誕生日、おめでとうございます。"
70011020-96 = "あっ……えっ……？"
70011020-97 = "ささやかですが、ニット帽を編んでみました。#n綺麗な金髪ですから、パステルカラーが似合いそうだなと思って、薄ピンクの糸で。#n気に入ってもらえたら嬉しいです。"
70011020-98 = "ちょっ……誕生日だって知ってたの？しかも、プレゼントまで……。"
70011020-99 = "二度と訪れることのない、学生時代の大切なお誕生日ですから。"
70011020-100 = "そんな日を矯正局で迎えるのは、とてもおつらいことでしょう。#n少しでも慰めになればと思ったのですが……。"
70011020-101 = "やっぱり、これだけでは不十分ですよね。"
70011020-102 = "差し支えなければ……お友達の連絡先を教えていただけませんか？"
70011020-103 = "……え？"
70011020-104 = "ここにご招待して一緒にお祝いができるよう、手配してみます。"
70011020-105 = "……そんなことしていいのか？"
70011020-106 = "と言いますと……？"
70011020-107 = "だって私は囚人だし……しかも脱獄しようとしたんだよ？"
70011020-108 = "とはいえ、[ruby=ここ]矯正局[/ruby]は「刑務所」じゃありません。"
70011020-109 = "だからあなたは「罪人」ではないのです。"
70011020-111 = "いやぁ、お疲れ様でした！"
70011020-112 = "さっすが局長！あいつ、部屋出る時号泣してましたよ？"
70011020-113 = "せっかくの喜ばしい日に泣かせてしまうなんて……心が痛いです……。"
70011020-114 = "いやいや、別にいじめたわけじゃないんですし。"
70011020-115 = "局長を見て改心した生徒が山ほどいるって話、やっと理解できました。"
70011020-116 = "といっても……それは全部、本人たちの努力の賜物です。#n私はただ、隣で話し相手になっているだけ。"
70011020-117 = "相手に会話の意志がなければ……。"
70011020-118 = "そもそも、[ruby=・]逸[/ruby][ruby=・]脱[/ruby]した思考の持ち主とは――"
70011020-119 = "……？"
70011020-120 = "あ……ごめんなさい。今のは聞かなかったことにしてください。"
70011020-121 = "朝早くからありがとうございました。お疲れ様でした。"
70011020-122 = "いえ、これが私の役目ですから！またいつでも呼んでください！"
70011020-127 = "……そういう人たちが居たのです。#nどんな言葉も通じず、同じ世界を生きてきたとは思えない――"
70011020-129 = "――[ruby=・]囚[/ruby][ruby=・]人[/ruby]たちが。"
70011020-137 = "矯正局長に新しく就任された「監原ミスズ」さんから、ご挨拶をいただきます。#n皆さん大きな拍手で――"
70011020-141 = "大変です！囚人が脱獄しました！！"
70011020-142 = "数は7人！！"
70011020-143 = "集団脱獄です！！！"
70011020-145 = "（監原ミスズが矯正局長に就任したのは、まさにその日のことだった）"
70011020-146 = "（そしてその年――矯正局の志願者数は前年比8割減となった）"
70011020-147 = "監原ミスズの憂鬱"

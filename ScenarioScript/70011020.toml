[translation]
70011020-1 = "#title;칸바라 미스즈의 우울 2"
70011020-2 = "#na;???;그건 얼마짜린데?"
70011020-3 = "#st;[0,0];instant;1;"
70011020-4 = "#clearST"
70011020-5 = "3;미스즈;02\n#3;a\n#wait;1500"
70011020-6 = "3;미스즈;10;네……?\n#3;em;[?]"
70011020-7 = "3;미스즈;07;그, 혹시 잘못 들으신 게 아닐까요? 저는 바깥에 친구라든지, 없는지 물어봤는데요."
70011020-8 = "3;미스즈;07\n#na;???;뭐, 만든다 쳐. 그래서, 그걸로 나는 얼마를 벌지?"
70011020-9 = "3;미스즈;03;……조금 말뜻을 이해하기가 어려워서요. 친구는 돈 같은 걸 바라고 만드는 게 아니라……."
70011020-10 = "3;미스즈;03\n#na;???;그러면 아무 쓸모도 없군."
70011020-11 = "3;미스즈;07;저기, 세상에는 돈으로 바꿀 수 없는 여러 가지 가치가……."
70011020-12 = "3;미스즈;07\n#na;???;야."
70011020-13 = "3;미스즈;07\n#na;???;돈으로 바꿀 수 없어? 하."
70011020-14 = "3;미스즈;07\n#na;???;네 자기만족으로 내 시간을 낭비하지 마."
70011020-15 = "3;미스즈;10;그, 그런 게 아니라…… 저는…… 저는…….\n#3;em;[속상함]\n#3;stiff"
70011020-16 = "#all;hide"
70011020-17 = "#na;???;……야."
70011020-18 = "#all;hide"
70011020-19 = "3;문제아;01;야!\n#3;a\n#3;closeup\n#3;em;[!]"
70011020-20 = "3;미스즈;04;후이엣?!\n#3;em;[?!]\n#3;closeup\n#3;shake"
70011020-21 = "1;미스즈;04\n5;문제아;05;설마 했는데, 진짜로 존 거냐? 사람을 앞에 앉혀두고.\n#3;hide\n#5;em;[?]"
70011020-22 = "5;문제아;05\n1;미스즈;07;아, 죄송해요. 조금 피곤해서……."
70011020-23 = "1;미스즈;07\n5;문제아;01;이제 아침이잖아. 밤이라도 샌 거야?"
70011020-24 = "5;문제아;01\n1;미스즈;07;뭐, 비슷하려나요, 에헤헤…….\n#1;greeting"
70011020-25 = "1;미스즈;01;……그보다, 어떤 일로 불렀는지, 짐작하고 계시죠?\n#1;m3\n#5;dr"
70011020-26 = "3;문제아;05;아, 뭐. 그치.\n#3;em;[…]\n#1;hide"
70011020-27 = "3;미스즈;03;추궁하려는 것은, 아니에요. 다만, 무언가 생활에 불편한 점이 있었나요?"
70011020-28 = "3;문제아;01;딱히."
70011020-29 = "3;미스즈;99;딱히……. 나쁜 대답은 아니네요."
70011020-30 = "3;미스즈;11;반대로, 좋은 대답도 아니고요. 생활 기록은 봤어요. 문서상으로는, 알 수 없더라고요."
70011020-31 = "3;미스즈;02;대체 어쩌다가 탈주를 시도하게 된 거죠? 무언가 불편한 점이라도 있었나요?\n#3;em;[?]"
70011020-32 = "3;미스즈;02\n5;문제아;05;……딱히, 이유가 있는 건 아니야.\n#3;m1\n#5;al"
70011020-33 = "3;미스즈;02\n5;문제아;01;그냥, 나도 할 수 있을 줄 알았지. 그래서 해봤을 뿐이야."
70011020-34 = "5;문제아;01\n3;미스즈;99;……."
70011020-35 = "5;문제아;01\n3;미스즈;01;……그 믿음의 근거를 들을 수 있을까요?"
70011020-36 = "3;미스즈;01\n5;문제아;01;아니, 뭐 바깥에서 들어 보니까, 이번에 일곱 명이나 탈옥했다잖아.\n#5;em;[반응]"
70011020-37 = "3;미스즈;01\n5;문제아;05;바깥에서는 일곱 죄수이니 뭐니 부르는 거 같던데.\n#3;dl\n#5;m3"
70011020-38 = "5;문제아;01;그러니까 나도 할 수 있을 줄 알았지."
70011020-39 = "3;미스즈;12;일곱 명이 탈주했다. 그건 사실이네요.\n#5;hide"
70011020-40 = "3;미스즈;99;반대로, 일곱 명밖에 탈주하지 못한 거예요.\n#3;greeting"
70011020-41 = "3;미스즈;03;교정국은 창설 이래, 그 일곱 명 이외의 탈주를 허락한 적이 없어요. 예의 일곱 학생 사건 때조차, 추가적인 탈출은 저지했죠."
70011020-42 = "3;문제아;04;……? 들은 거랑 좀 다른데. 교정국 보안은 엄청 허술하다던데.\n#3;em;[?]"
70011020-43 = "3;문제아;01;그, 얼마 전에도, 재액의 여우가 몇 번이나 자기 집처럼 드나들었다고."
70011020-44 = "3;미스즈;06;와카모…… 말이군요……."
70011020-45 = "3;미스즈;11;…….\n#3;em;[…]"
70011020-46 = "3;미스즈;01;본론으로 돌아가도 괜찮을까요? 지금 자리는, 와카모에 대해 말하는 자리가 아니니까요."
70011020-47 = "3;미스즈;99;어쨌거나, 저희 교정국에서는 여러분을 괜히 괴롭히려고 외출 제한을 거는 게 아닙니다"
70011020-48 = "3;미스즈;01;……이미 알고 계시겠지만, 교정국에 이감되는 경우는, 출신 모교에서 선도를 포기하였거나…… 학적 자체가 불분명한 경우."
70011020-49 = "3;미스즈;11;대개의 경우, 한 학교에서 감당하기 어려울 정도의 문제아라는 뜻이네요……."
70011020-50 = "3;문제아;05;말이 심하네.\n#3;em;[...]"
70011020-51 = "3;문제아;05\n1;미스즈;02;……물론, 기준은 상대적이에요. 게헨나처럼 단 한 명의 학생도 교정국에 보내지 않는 학교가 있는가 하면, 작은 실수로도 곧장 교정국에 보내오는 엄격한 학칙의 학교도 있어요.\n#3;m5\n#1;em;[반응]\n#1;ar"
70011020-52 = "3;문제아;05\n1;미스즈;03;그러니까, 교정국 출신이라는 것이, 꼭 엄청난 허물이 된다는 뜻은 아니에요."
70011020-53 = "1;미스즈;03\n3;문제아;02;뭐야, 그거. 위로하는 거야?\n#3;em;[?]"
70011020-54 = "3;문제아;02\n1;미스즈;07;그럴 셈이긴 한데요……."
70011020-55 = "3;문제아;02\n1;미스즈;01;……일단, 그렇다 한들, 발키리 경찰학원은 키보토스의 치안을 책임지는 학교. 무슨 사고를 칠지 모르는 문제아가 자유롭게 돌아다니게 둘 수는 없습니다."
70011020-56 = "3;문제아;02\n1;미스즈;03;반대로, 아무 사고도 저지르지 않을 거란 확신만 생긴다면, 언제라도 퇴소를 허가할 수 있어요."
70011020-57 = "3;문제아;02\n1;미스즈;01;다시 말하지만, 교정국은 감옥이 아니에요.\n#1;m3\n#3;dr"
70011020-58 = "1;미스즈;99;반성하고, 개심하면, 언제라도 나갈 수 있어요. 탈주하지 않아도요."
70011020-59 = "3;문제아;01;알았어, 알았어. 반성하면 되잖아.\n#3;em;[한숨]\n#1;hide"
70011020-60 = "#st;[0,0];instant;1;"
70011020-61 = "#clearST"
70011020-62 = "3;미스즈;03\n#3;em;[…]\n#3;h\n#wait;2500"
70011020-63 = "3;미스즈;01;한 가지 더, 중요한 질문을 할게요."
70011020-64 = "3;미스즈;05;어째서 탈주를 시도한 건가요?"
70011020-65 = "3;미스즈;05\n5;문제아;01;뭐? 아니, 방금 말했잖아. 별 이유 없다니까.\n#5;al\n#3;m1"
70011020-66 = "5;문제아;01\n3;미스즈;99;할 수 있을 줄 알았다…… 그렇다면, 나가고 나서 무얼 할 생각이었죠?"
70011020-67 = "3;미스즈;99\n5;문제아;05;……뭔가, 이미 아는 눈치인데, 물어볼 필요 있어?"
70011020-68 = "5;문제아;05\n3;미스즈;02;그렇지 않아요. 본인에게 듣기 전까지는, 모르는 거랍니다."
70011020-69 = "3;미스즈;03\n5;문제아;01;……알았어! 말하면 되잖아! 대신, 절대 비웃지 마!\n#5;jump\n#3;dl\n#5;m3"
70011020-70 = "#st;[0,0];instant;1;"
70011020-71 = "#clearST"
70011020-72 = "3;문제아;01\n#3;h\n#5;hide\n#wait;2500\n#3;em;[…]"
70011020-73 = "3;문제아;05;나, 오늘이 생일이야."
70011020-74 = "3;문제아;01;근데, 교정국에는 온 지 얼마 안 돼서 친한 애도 없고, 그래서……"
70011020-75 = "3;문제아;05;잠깐 밖에 나가서 친구들이랑 놀다 올 생각이었어! 애초에 도망칠 생각도 없었고, 오늘까지만 놀다 돌아오려 했거든?"
70011020-76 = "3;문제아;05\n1;미스즈;99;……그래요.\n#3;m5\n#1;ar"
70011020-77 = "1;미스즈;99\n3;문제아;01;흥. 어차피 안 믿겠지, 너희는."
70011020-78 = "3;문제아;01\n1;미스즈;12;그렇게 보였다면, 미안해요. 하지만……."
70011020-79 = "#st;[0,0];instant;1;"
70011020-80 = "#clearST"
70011020-81 = "3;문제아;01\n1;미스즈;01\n#1;h\n#3;h\n#1;greeting\n#wait;1200"
70011020-82 = "#all;hide"
70011020-83 = "#wait;1500"
70011020-84 = "#na;미스즈;경비님. 그 물건, 지금 가져다주실래요?"
70011020-85 = "#na;교정국 경비;아, 넵. 들어오면서 맡기신 그거 말이죠?"
70011020-86 = "#all;hide"
70011020-87 = "1;미스즈;01\n5;문제아;01;……? 뭐야, 그건?\n#1;a\n#5;a\n#5;em;[?]"
70011020-88 = "5;문제아;01\n1;미스즈;06;……조금 더 부드러운 분위기에서 전하고 싶었는데, 죄송해요."
70011020-89 = "5;문제아;01\n1;미스즈;01;그리고, 생일 축하해요. 이건, 제가 손뜨개질한 모자예요."
70011020-90 = "#st;[0,0];instant;1;"
70011020-91 = "#clearST"
70011020-92 = "5;문제아;01\n1;미스즈;01\n#5;h\n#1;h\n#1;m2\n#wait;700"
70011020-93 = "1;미스즈;01\n5;문제아;01\n#5;h\n#1;h\n#1;m3\n#wait;1200"
70011020-94 = "1;미스즈;01\n5;문제아;01\n#5;h\n#1;h\n#1;m4\n#wait;1000"
70011020-95 = "1;미스즈;03\n5;문제아;01\n#5;h\n#1;h\n#1;greeting\n#wait;1500"
70011020-96 = "1;미스즈;03\n5;문제아;04;어, 어어……?\n#5;em;[///]\n#5;stiff"
70011020-97 = "5;문제아;04\n1;미스즈;13;화려한 금발에 부드러운 파스텔 톤이 잘 어울릴 거라 생각해서, 연분홍색 뜨개실을 썼어요. 부디 마음에 들었으면 좋겠네요.\n#1;m3\n#5;dr"
70011020-98 = "3;문제아;04;잠깐, 잠깐만. 내 생일을 알았다고……? 게다가 선물까지 준비했다고……?\n#3;em;[…]\n#1;hide"
70011020-99 = "3;미스즈;01;오직 한 번뿐인, 다시는 돌아오지 않을 학창 시절의 소중한 생일날인걸요."
70011020-100 = "3;미스즈;99;그런 날을 교정국에서 보내는 것은, 분명 괴로운 일이겠죠. 저로서는 조금이라도 위안이 되었으면 했지만……."
70011020-101 = "3;미스즈;02;역시, 이런 것만으로는 충분하지 못한 모양이네요."
70011020-102 = "3;미스즈;01;실례가 안 된다면, 친구분들의 연락처를 알려주실 수 있나요?\n#3;em;[반응]"
70011020-103 = "3;문제아;01;……응?\n#3;em;[?]"
70011020-104 = "3;미스즈;03;그분들을 교정국으로 초대해서, 오늘 하루 그분들과 파티할 수 있게 자리를 만들어 볼게요."
70011020-105 = "3;미스즈;03\n5;문제아;01;……그래도 괜찮은 거야?\n#3;m1\n#5;al"
70011020-106 = "5;문제아;01\n3;미스즈;01;무슨 뜻일까요?"
70011020-107 = "3;미스즈;01\n5;문제아;05;그게, 나는 죄수고, 심지어 어제 탈옥까지 하려 했다고?"
70011020-108 = "5;문제아;05\n3;미스즈;99;반대예요. 줄곧 말했듯이, 교정국은 감옥이 아닌걸요."
70011020-109 = "5;문제아;05\n3;미스즈;03;그러니까, 당신도 죄수가 아니에요."
70011020-110 = "#all;hide"
70011020-111 = "2;교정국 경비;03\n4;미스즈;09\n#na;교정국 경비;이야, 수고하셨습니다!\n#2;h\n#2;a\n#4;a\n#2;em;[재잘]"
70011020-112 = "2;교정국 경비;01\n4;미스즈;09\n#na;교정국 경비;그 녀석, 나가면서 펑펑 울던데요? 역시 대단하시네요.\n#2;h"
70011020-113 = "2;교정국 경비;01\n4;미스즈;09;모처럼 기쁜 날에 울리다니, 마음이 조금 괴롭네요오…….\n#4;em;[땀]"
70011020-114 = "2;교정국 경비;03\n4;미스즈;09\n#na;교정국 경비;에이, 저희가 괴롭힌 것도 아니잖습니까.\n#2;h"
70011020-115 = "2;교정국 경비;01\n4;미스즈;09\n#na;교정국 경비;매년 그 많은 학생이 국장님을 보고 갱생했다는 얘기도, 오늘 그걸 보고 나니까 납득이 갑니다.\n#2;h"
70011020-116 = "2;교정국 경비;01\n4;미스즈;03;……항상 말하지만, 그건 그 아이들 스스로 노력한 결과예요. 저는 그저 옆에서 떠들 뿐이죠."
70011020-117 = "2;교정국 경비;01\n4;미스즈;11;상대에게 대화할 의지가 없다면."
70011020-118 = "2;교정국 경비;01\n4;미스즈;12;아니, 아예 사고방식 자체가 이질적이라면, 저는 아무것도 할 수 없어요.\n#4;em;[…]"

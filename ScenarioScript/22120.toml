[translation]
22120-1 = "Episode 12; Strategy Meeting"
22120-2 = "The president...took Aris away?"
22120-3 = "[s] \"Yeah, so I figured maybe you know where Rio is.\""
22120-4 = "I had a hunch that she'd been working on something secretly."
22120-5 = "But I can't believe it was something like that. That's a bit...shocking."
22120-6 = "Rio... What is she trying to achieve?"
22120-7 = "Aris?"
22120-8 = "She kidnapped her?"
22120-9 = "To destroy her halo?!"
22120-10 = "...I don't understand!"
22120-11 = "She tends to do things that are hard to comprehend."
22120-12 = "Noa! This is not a matter of comprehension!"
22120-13 = "I never know what she's thinking, but..."
22120-14 = "Even if she's the president, this can't be forgiven!"
22120-18 = "That's a bold thing to say to an upperclassman."
22120-19 = "Right? That's how Yuuka is!"
22120-20 = "Oh, heehee. Is this trust? ♪"
22120-21 = "...Huh? What do you mean?"
22120-22 = "[s1] \"Anyway, Yuuka, Noa, I'll be counting on you.\"\n[s2] \"Can you find out where Rio took Aris?\""
22120-23 = "Yes, we can check Seminar's internal information to find the whereabouts of President Rio."
22120-24 = "Yes, we can check Seminar's internal information to find the whereabouts of President Rio."
22120-26 = "Leave it to us! We'll do our best to cooperate!"
22120-28 = "We found it, Sensei! We found out where Rio took Aris!"
22120-29 = "I was hoping what you told us wasn't true, but..."
22120-30 = "I can't believe she embezzled Seminar funds to create something like this..."
22120-31 = "I'm still in shock."
22120-32 = "[s] \"What is it?\""
22120-33 = "Just in case, we went looking for data that had been deliberately deleted or concealed from Seminar's database..."
22120-34 = "It was cleverly hidden, but we noticed a discrepancy in the use of Seminar's club funds."
22120-35 = "And we found this place... I'll put it on the screen now!"
22120-41 = "[ns] \"Is this...a city?\""
22120-42 = "When we restored the deleted data from the database, we found information on this city."
22120-43 = "Code name Eridu."
22120-44 = "President Rio was building this in secret..."
22120-45 = "It's a \"fortress city to prepare for the destruction of Kivotos.\""
22120-46 = "[s] \"Eridu...the Fortress City.\""
22120-47 = "How could she have built a city of this scale behind our backs?!"
22120-48 = "It couldn't have been easy to hide the flow of funds..."
22120-50 = "Ah..."
22120-51 = "Could it...have something to do with the incident that Koyuki was involved in...?"
22120-52 = "Oh."
22120-53 = "KO! YU! KI!!!"
22120-54 = "[s] \"But why would she build an entire city?\""
22120-55 = "President Rio doesn't hesitate to act when she thinks she must achieve something."
22120-56 = "She has reasonable judgment, the courage to make decisions, and a drive that pushes forward like a bulldozer."
22120-57 = "As a result of working tirelessly to eliminate danger and prevent the destruction of Kivotos, she created..."
22120-58 = "...the Fortress City of Eridu."
22120-59 = "There's a high chance that Aris was taken to the central tower in the city."
22120-61 = "Aris... could be there..."
22120-62 = "I'm sending you the coordinates now."
22120-63 = "This is all we can help you with, but..."
22120-64 = "Please stop President Rio and get Aris back, everyone!"
22120-65 = "[s] \"Got it. Leave it to us.\""
22120-71 = "We've confirmed the coordinates of Eridu. The problem is how to infiltrate it."
22120-72 = "I'm sure the president would have built a defense system to prevent intruders."
22120-73 = "We need to have a plan...  "
22120-74 = "Well, I suppose we'll get the full experience of why it's called the Fortress City."
22120-76 = "How are we supposed to get in though?"
22120-77 = "It sounds impossible to access..."
22120-79 = "We may not be able to access it the ordinary way..."
22120-81 = "But the Engineering Department knows another way."
22120-82 = "[s] \"Another way...?\""
22120-83 = "If it was just a matter of manpower, Rio could cover it with her drones."
22120-84 = "But materials are another matter. Even she can't make something from nothing."
22120-85 = "There are a lot of unmanned trains acting as logistics transportation on the outskirts of the Millennium district..."
22120-86 = "If Millennium transported resources to build that city, there's a good chance one of the routes secretly leads to Eridu."
22120-87 = "Oh... Then, if we can find that route..."
22120-88 = "Yes, we can get to Eridu."
22120-89 = "But how are we going to know which train that is? That's an impossible task!"
22120-90 = "That's where the Engineering Department comes in."
22120-91 = "[s] \"But Utaha, we're gonna have to fight Rio. Are you sure...?\""
22120-92 = "You're wondering why we would cooperate?"
22120-93 = "The answer should be obvious."
22120-94 = "President Rio stole the greatest invention of the Engineering Department, which we entrusted to Aris."
22120-95 = "The greatest invention...?"
22120-96 = "The Supernova... Her Sword of Light."
22120-97 = "Yes. Interfering with our inventions is an act of arrogation. This is a declaration of war against the Engineering Department. As president, I cannot let this slide."
22120-98 = "Utaha, don't be shy about it..."
22120-99 = "H-Huh? What...? Um, what are you talking about?"
22120-100 = "I'll explain! This is what Utaha is thinking!"
22120-101 = "She wants to go save her friend, but she's kind of embarrassed to say it aloud. She thinks maybe it's too illogical to say as an engineer that she's worried about someone she cares about, so she figures it's easier to use the stolen item as an excuse..."
22120-103 = "Kotori."
22120-108 = "M-Mmph?!"
22120-109 = "Shhh."
22120-110 = "*nod* *nod*"
22120-113 = "...Okay. My secret is safe."
22120-114 = "[s] \"Um, I don't think it's a secret anymore.\""
22120-115 = "...It's still a secret."
22120-116 = "[s] \"I-If you say so...\""
22120-117 = "So, the Engineering Department will help."
22120-118 = "Affirmative."
22120-119 = "Yeah! You can count on us!"
22120-124 = "When I had thought we'd found Aris' location and a means to get there, I realized..."
22120-126 = "[ns] \"The real issue is how we'll bring Aris back once we get there.\""
22120-127 = "President Rio likely thought of everything. She didn't name it the Fortress City for no reason."
22120-128 = "The level of security and the defense systems of the city must be greater than our wildest imaginations."
22120-129 = "Not only that...even if we infiltrate the Fortress City, we'll still have to face our biggest obstacle."
22120-130 = "[s] \"Our biggest obstacle...\""
22120-132 = "The maid by Rio's side, who will be rigorously guarding the place."
22120-133 = "..."
22120-134 = "Was her name...Toki?"
22120-135 = "What Toki did last time..."
22120-136 = "I've never seen anyone move that fast before..."
22120-137 = "It was like she had activated some cheats."
22120-141 = "What we need is a strategy."
22120-147 = "[ns] \"Did Neru just say 'strategy'?!\""
22120-148 = "N-Neru, are you okay?"
22120-149 = "Did you hit your head or something...?"
22120-150 = "Piss off! I mean it!"
22120-151 = "I see. The president is in mission mode."
22120-152 = "She can actually be very serious when she wants to be."
22120-153 = "That is correct."
22120-155 = "I-I see!"
22120-156 = "Hmm, Neru... Can you elaborate?"
22120-157 = "Even if we get into the Fortress City, our movements will definitely be immediately exposed since it's Rio's territory."
22120-158 = "There's a reason she's called Big Sister, after all. Nothing gets past her."
22120-159 = "[s] \"So, that means...?\""
22120-160 = "It's simple. Instead of overthinking it, we go there and draw their attention, right out in the open."
22120-161 = "And President Rio will wipe us out in a matter of moments."
22120-162 = "That's why I said we need a strategy."
22120-163 = "To be exact, a diversionary tactic."
22120-164 = "[s] \"A diversionary tactic...?\""
22120-165 = "The conditions to win this game are simple."
22120-166 = "Rescue the kid before we're incapacitated."
22120-167 = "If C&C attacks head on and causes chaos, all of Rio and Toki's attention will be focused on us."
22120-168 = "While they're distracted, you guys rescue the kid. Simple and easy."
22120-170 = "If we can do that..."
22120-171 = "It'll be game over for Rio!"
22120-172 = "B-But... Well... Do you think you'll be okay, Neru? That Toki person is a big old cheater..."
22120-174 = "Huh? Are you underestimating me?"
22120-175 = "She got me last time, so I've got to pay her back."
22120-176 = "I'm doing what I have to do. So you do your duty."
22120-177 = "As usual, I'm with you."
22120-178 = "Heehee. Sounds like fun! Leave it to us!"
22120-179 = "We'll do our best."
22120-180 = "...If we have everyone from C&C...there's a high chance we can actually break through..."
22120-181 = "That's the conclusion, then. The president and C&C will take the front."
22120-182 = "The rest of us, the Game Development Department and Sensei...will take the rear, I guess?"
22120-183 = "Veritas will support from behind the scenes."
22120-184 = "Yeah! We'll hack any security systems blocking your way!"
22120-185 = "Yes. We won't let any of her technology get in your way."
22120-187 = "All right! Sounds like a plan to me!"
22120-188 = "[s] \"We can do this.\""
22120-189 = "The target is the central tower of the Fortress City of Eridu! That's where Aris is held!"
22120-190 = "Since Aris left home without our permission..."
22120-191 = "We're bringing her back as we please!"
22120-195 = "[ns] \"Okay, then. Now...\""
22120-204 = "[ns] \"Let's begin the operation!\""
22120-206 = "Next Episode; Big Sister"

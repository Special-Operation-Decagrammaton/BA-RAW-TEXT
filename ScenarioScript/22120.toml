[translation]
22120-1 = "第12話;作戰會議"
22120-2 = "會長她，把愛麗絲醬給……？"
22120-3 = "[s]「嗯……所以想說優香應該會知道莉央在哪裡。」"
22120-4 = "最近，雖然有感覺到她背地裡推動著什麼計劃……"
22120-5 = "居然發生了那種事……#n有點，令人震驚。"
22120-6 = "會長……究竟在計劃著什麼呢。"
22120-7 = "綁架了"
22120-8 = "愛麗絲醬──"
22120-9 = "還要破壞光環……？"
22120-10 = "……完全無法理解！"
22120-11 = "雖然平常就是個會採取驚人行動的人……"
22120-12 = "乃愛！這可不是那種程度的事！"
22120-13 = "雖然從以前開始就不知道她在想什麼……"
22120-14 = "但就算是會長……也有能做的事跟不能做的事！"
22120-18 = "……就算是自己的前輩，也一樣不留情面呢。"
22120-19 = "對吧～？#n嘛，這也很符合優香的風格呢！"
22120-20 = "哎呀，唔呵呵♪#n真受大家信賴呢，優香醬。"
22120-21 = "……嗯？什麼意思？"
22120-22 = "[s1]「……優香、乃愛，拜託了。」\n[s2]「希望妳們調查莉央把愛麗絲帶去了哪裡。」"
22120-23 = "我知道了。我會確認研討會內部的情報的。#n裡面想必有莉央會長留下的痕跡。"
22120-24 = "我知道了。我會確認研討會內部的情報的。#n裡面想必有莉央會長留下的痕跡。"
22120-26 = "請交給我們吧！我們會盡全力幫忙的！"
22120-28 = "查出莉央會長把愛麗絲醬帶到哪裡了！"
22120-29 = "聽了老師的話之後，本來還覺得不太可能……"
22120-30 = "沒想到真的擅自挪用了研討會的預算……"
22120-31 = "真是嚇了一跳……沒想到她竟然會做出這種事。"
22120-32 = "[s]「那個，怎麼回事？」"
22120-33 = "那個……對研討會資料庫中被刪除的#n──被刻意隱藏痕跡的數據進行了調查……"
22120-34 = "發現了預算中部分不透明的金流。#n並成功進行了追蹤。"
22120-35 = "於是追查到的就是這裡……現在，畫面上顯示的地方！"
22120-41 = "[ns]「這是……都市？」"
22120-42 = "復原資料庫中被刪除的資料後──#n發現了某個都市的數據。"
22120-43 = "代號[ruby=Eridu]「埃里都」[/ruby]。"
22120-44 = "莉央會長祕密建設著的……"
22120-45 = "似乎是「為終焉準備的要塞都市」。"
22120-46 = "[s]「要塞都市『埃里都』……」"
22120-47 = "究竟……是在什麼時候建造出了這種規模的都市……"
22120-48 = "明明連要隱藏資金流向都不容易……"
22120-50 = "啊……"
22120-51 = "難道……#n是跟上次與小雪同學的那件事有關……？"
22120-52 = "啊！"
22120-53 = "小──雪────！！"
22120-54 = "[s]「但是為何要建造都市呢？」"
22120-55 = "莉央會長她，對自己決定要做的事情，是絕對不會猶豫的。"
22120-56 = "合理的判斷──有時在需要進行重大決斷的場合，也絕不會有絲毫迷惘。#n如果是為了達成目的，甚至還會像推土機一樣強行推動事情的發展。"
22120-57 = "而為了排除危險、阻止奇普托斯的滅亡而奔走的結果就是……"
22120-58 = "那座要塞都市「埃里都」吧。"
22120-59 = "愛麗絲醬被帶去「埃里都」中心那座塔的可能性很高。"
22120-61 = "愛麗絲……在那裡……"
22120-62 = "我將「埃里都」的座標傳給你們。"
22120-63 = "以我們的立場，能幫的忙可能就到這裡為止了……"
22120-64 = "拜託了……請一定要阻止莉央會長，並把愛麗絲醬帶回來！"
22120-65 = "[s]「嗯，交給我吧。」"
22120-71 = "雖然已經確認了埃里都的座標，但問題是潛入方法呢。"
22120-72 = "如果是會長的話，肯定構建了對付入侵者的防禦系統吧。"
22120-73 = "如果毫無準備就接近的話…… "
22120-74 = "埃里都為何會被稱為「要塞都市」，#n應該會親身體會吧。"
22120-76 = "那，那該怎麼做才好！？"
22120-77 = "連接近都有困難……"
22120-79 = "──那只是，以「普通的方法接近」的時候而已唷。"
22120-81 = "……我們工程師部知道別的路線。"
22120-82 = "[s]「別的路線……？」"
22120-83 = "如果是建造都市的「人力」的話，莉央會長的機器人應該就已經足夠了吧……"
22120-84 = "但是「建材」就另當別論了。#n畢竟沒辦法無中生有啊。"
22120-85 = "在千年自治區的郊外，有許多運輸用的無人列車……"
22120-86 = "假設建造都市的建材都是從千年運送過去的話，#n那麼其中的某條路線，就很可能連接著埃里都。"
22120-87 = "那，只要能找出那條路線的話……！"
22120-88 = "沒錯。就能去埃里都了。"
22120-89 = "但，但是路線有很多吧……？#n究竟該怎麼找才好呢！？"
22120-90 = "沒錯。所以，這方面就由我們工程師部來協助吧。"
22120-91 = "[s]「詠葉，我們要跟莉央對抗唷。即使如此……」"
22120-92 = "為什麼還要幫忙嗎？"
22120-93 = "這不是當然的嗎。"
22120-94 = "莉央會長可是擅自奪走了[ruby=   ．    ．    ．    ．    ．    ．    ．    ．    ．  ]工程師部最大的發明[/ruby]啊。"
22120-95 = "最大的發明……？"
22120-96 = "愛麗絲的「Supernova」……"
22120-97 = "正是如此。居然妨礙我們收集實測數據，完全是越權的行為。#n事實上，那就是在向我們工程師部宣戰。#n身為工程師部的部長自然無法坐視不管……"
22120-98 = "詠葉前輩真是害羞鬼……"
22120-99 = "那，那個，這是什麼意思？"
22120-100 = "好！就由我來說明吧！#n詠葉前輩想法的脈絡如下！"
22120-101 = "雖然想去救朋友，但直接說出口好像有點害羞……#n對了，不如就用東西被搶走這件事當藉口吧……！"
22120-103 = "等等，亞都梨。"
22120-108 = "唔，唔唔！？"
22120-109 = "噓──"
22120-110 = "（點頭點頭！！）"
22120-113 = "……很好，這樣就能守住祕密了。"
22120-114 = "[s]「抱歉……我感覺好像什麼都沒守住。」"
22120-115 = "……守住了唷。"
22120-116 = "[s]「呃，嗯，嗯……」"
22120-117 = "咳咳……綜上所述，我們工程師部也會幫忙的。"
22120-118 = "嗯。"
22120-119 = "耶嘿！包在我們身上！"
22120-124 = "（就這樣，雖然得知了愛麗絲的所在位置，也找到了去那裡的方法──）"
22120-126 = "[ns]「……接下來，是要怎麼把愛麗絲帶回來吧。」"
22120-127 = "是的。畢竟被稱為要塞都市……#n莉央會長想必做了萬全的準備吧。"
22120-128 = "不僅是都市的安全系統，#n我想防禦系統也會有一定的規模。"
22120-129 = "而且……就算解決了要塞都市，問題依然存在。"
22120-130 = "[s]「就是啊……要塞都市只不過是附加的問題而已。」"
22120-132 = "根據我聽到的消息，護衛著莉央會長的女僕才是最大的阻礙對吧。"
22120-133 = "……"
22120-134 = "是叫……季同學對吧？"
22120-135 = "當時……她的動作……"
22120-136 = "簡直就像……"
22120-137 = "嗯──簡直就像「作弊玩家」……一樣呢。"
22120-141 = "那我們需要的就是作戰計畫。"
22120-147 = "[ns]「寧瑠剛才是說……『作戰計畫』嗎！？」"
22120-148 = "寧，寧瑠前輩。妳還好嗎？有沒有發燒？"
22120-149 = "難道是因為受了重傷……？"
22120-150 = "啊？你們在說什麼？"
22120-151 = "……是任務模式的部長。"
22120-152 = "沒錯沒錯！進入工作模式的部長可是非～常認真的哦！"
22120-153 = "呵呵，確實是呢。"
22120-155 = "原，原來如此……！"
22120-156 = "唔嗯，寧瑠前輩……#n可以問是什麼意思嗎？"
22120-157 = "就算順利抵達要塞都市好了，#n但那裡是莉央的領域，我們的一舉一動都會被看得清清楚楚。"
22120-158 = "再怎麼說，她可是「大姐頭」啊。"
22120-159 = "[s]「什麼意思……？」"
22120-160 = "很簡單。有時間在這邊想東想西，#n不如一開始就直接衝進去。"
22120-161 = "但是部長，這樣不就正中莉央會長的下懷了嗎……"
22120-162 = "所以才需要作戰計畫啊。"
22120-163 = "──準確來說，是聲東擊西。"
22120-164 = "[s]「聲東擊西……？」"
22120-165 = "這場遊戲的勝利條件很簡單。"
22120-166 = "「在我們倒下之前，救出[ruby=愛麗絲]那個小不點[/ruby]。」"
22120-167 = "我們C&C會從正面闖入引起騷動。#n這樣一來不僅是莉央，連季那傢伙也不得不來阻止我們吧？"
22120-168 = "你們就在這段期間救出小不點。#n怎樣？很簡單吧？"
22120-170 = "只要救出愛麗絲……"
22120-171 = "就是我們的勝利……！"
22120-172 = "但是寧瑠前輩，這樣沒問題嗎？#n對方可是那個「作弊玩家」……"
22120-174 = "啊？妳以為我是誰啊。"
22120-175 = "上次被那傢伙擺了一道，#n我早就決定下次見面時一定要加以奉還了。"
22120-176 = "接下來就差執行而已了。"
22120-177 = "我知道了，聽從部長指揮。"
22120-178 = "嗯嗯！交給我們吧♪"
22120-179 = "呵呵，我們會拚盡全力的。"
22120-180 = "（……確實，和那時不同，要是C&C全員都在的話……能突破的可能性很高……）"
22120-181 = "那就這樣決定了吧。#n正面就交給部長和我們C&C。"
22120-182 = "從後方潛入的就是除此之外的，遊戲開發部和我們……還有老師嗎？"
22120-183 = "我們貝里塔斯會進行遠距支援哦。"
22120-184 = "駭入防衛系統的工作就交給我們吧！"
22120-185 = "會完美的完成給你們看的。"
22120-187 = "好，那麼就出發吧！"
22120-188 = "[s] 「嗯。」"
22120-189 = "目標是「要塞都市埃里都」的中央塔！#n愛麗絲被抓去的地方！"
22120-190 = "擅自離家出走的愛麗絲！"
22120-191 = "就由我們親手帶回來！"
22120-195 = "[ns]「那麼現在──」"
22120-204 = "[ns]「──作戰開始！」"
22120-206 = "下一話;Big Sister"

[translation]
22120-1 = "ตอนที่ 12;ประชุมเชิงปฏิบัติการ"
22120-2 = "ประธาน... พาตัวอาริสึจังไปเหรอคะ...?"
22120-3 = "[s] \"อื้ม ครูติดต่อมาถามเพราะคิดว่ายูกะน่าจะรู้ว่าริโอะอยู่ไหนน่ะ\""
22120-4 = "ฉันก็สังหรณ์ใจอยู่เหมือนกันค่ะว่าช่วงนี้ประธานแอบทำเรื่องอะไรลับๆ อยู่"
22120-5 = "เรื่องใหญ่ขนาดนี้เลยเหรอคะเนี่ย ฉันรู้สึก... ช็อกกับเรื่องประธานริโอะจริงๆ นะคะ"
22120-6 = "ประธาน... คิดจะทำเรื่องอะไรของเค้ากันนะ?!"
22120-7 = "จับตัวอาริสึจังไปงั้นเหรอ?"
22120-8 = "แค่นั้นยังไม่พอ?"
22120-9 = "ยังจะทำลายฮาโลของอาริสึจังอีก?"
22120-10 = "...ไม่เห็นจะเข้าใจเลย!"
22120-11 = "ถึงปกติประธานจะเป็นคนที่ทำเรื่องที่เข้าใจได้ยากอยู่บ่อยๆ ก็เถอะค่ะ"
22120-12 = "โนอา! นี่มันก็ไม่ใช่เรื่องที่เข้าใจได้ง่ายๆ เลยนะ!"
22120-13 = "ฉันไม่รู้เลยว่าประธานคิดอะไรอยู่ตั้งแต่แรก..."
22120-14 = "ถึงอีกฝ่ายจะเป็นประธานก็เถอะ... แต่ฉันก็ยกโทษให้ไม่ได้เด็ดขาด!"
22120-18 = "เป็นถึงรุ่นพี่ทั้งที... แต่ไม่มีความสุขุมเอาซะเลย"
22120-19 = "ใช่มั้ยล่ะ~? ใครจะว่ายังไง ยูกะก็ยังเป็นยูกะวันยันค่ำ!"
22120-20 = "ตายจริง ฮุฮุ~♪ นี่ใช่ไหมคะที่เรียกว่าความนับถือ?"
22120-21 = "หืม...? พูดอะไรน่ะ?"
22120-22 = "[s1] \"เอาเป็นว่า ยูกะ โนอา ครูรบกวนพวกเธอด้วยนะ\"\n[s2] \"ครูฝากพวกเธอสืบให้หน่อยว่าริโอะพาตัวอาริสึไปไว้ที่ไหน\""
22120-23 = "ได้ค่ะ ถ้าเช็กข้อมูลภายในของเซมิน่าดู ฉันว่าเราก็น่าจะสืบร่องรอยของประธานริโอะได้ค่ะ!"
22120-24 = "ได้ค่ะ ถ้าเช็กข้อมูลภายในของเซมิน่าดู ฉันว่าเราก็น่าจะสืบร่องรอยของประธานริโอะได้ค่ะ!"
22120-26 = "วางใจได้เลยค่ะ! ฉันจะร่วมมืออย่างสุดความสามารถเลยค่ะ!"
22120-28 = "เจอแล้วค่ะคุณครู! ฉันเจอแล้วค่ะว่าประธานริโอะพาตัวอาริสึจังไปไว้ที่ไหน!"
22120-29 = "ฉันได้ยินคุณครูเล่า ก็เลยแอบคิดว่าอาจจะเป็นไปได้..."
22120-30 = "แต่ก็ไม่คิดเลยค่ะว่าจะลักลอบใช้เงินของเซมิน่ามาสร้างเรื่องแบบนี้..."
22120-31 = "ต้องบอกว่าช็อกในช็อกเลยนะคะเนี่ย"
22120-32 = "[s] \"ตกลงมันคือเรื่องอะไรเหรอ?\""
22120-33 = "ฉันแค่แอบสงสัย ก็เลยติดตามข้อมูลในฐานข้อมูลที่มีใครจงใจลบไป รวมถึงข้อมูลที่ถูกปกปิดไว้ และผลลัพธ์ที่ได้ก็คือ..."
22120-34 = "พวกฉันติดตามเส้นทางการเงินของกองทุนของเซมิน่าที่ถูกปกปิดไว้ได้สำเร็จค่ะ"
22120-35 = "และสิ่งที่พวกฉันสืบหาได้... ก็อยู่บนหน้าจอนี้แล้วค่ะ!"
22120-41 = "[ns] \"นี่มัน... เมืองเหรอ?\""
22120-42 = "ฉันลองกู้คืนข้อมูลที่ถูกลบออกจากฐานข้อมูลดู ก็เลยเจอข้อมูลของเมืองนี้ค่ะ "
22120-43 = "โค้ดเนม [ruby=Eridu]<เอริดู>[/ruby]"
22120-44 = "เมืองที่ประธานริโอะกำลังก่อสร้างอย่างลับๆ..."
22120-45 = "น่าจะเป็น <เมืองแห่งปราการที่สร้างเพื่อเตรียมรับมือกับการล่มสลายที่จะมาถึงของคิโวทอส> น่ะค่ะ"
22120-46 = "[s] \"เมืองแห่งปราการ <เอริดู>... งั้นเหรอ?\""
22120-47 = "ไปลักลอบสร้างเมืองขนาดใหญ่แบบนี้โดยที่พวกเราไม่รู้มาก่อนเลยได้ยังไง..."
22120-48 = "การปกปิดเส้นทางการเงินของกองทุนก็ไม่น่าจะใช่เรื่องง่ายๆ เลยด้วยซ้ำ..."
22120-50 = "อ๊ะ..."
22120-51 = "หรือว่า... มันจะเกี่ยวข้องกับเรื่องที่โคยูกิเข้าไปพัวพันคราวก่อนคะ...?"
22120-52 = "อ๊ะ!"
22120-53 = "โค~ยู~กิ~~!!"
22120-54 = "[s] \"แต่ถึงกับต้องสร้างเมืองกันใหม่เลยเหรอ? ทำไมล่ะ?\""
22120-55 = "ประธานริโอะเป็นคนที่คิดว่าถ้ามีเรื่องที่ตัวเองต้องทำ ก็จะไม่ลังเลเลยค่ะ"
22120-56 = "เพื่อการวินิจฉัยอย่างมีเหตุผลและการตัดสินใจอย่างเด็ดเดี่ยวแล้วละก็ ประธานริโอะจะมีแรงขับเคลื่อน#nเหมือนบูลโดลเซอร์เลยละ"
22120-57 = "และผลพวงของการขจัดอันตราย และการวุ่นอยู่กับการหยุดยั้งการล่มสลายของคิโวทอสก็คือ..."
22120-58 = "เมืองแห่งปราการ <เอริดู> นี่แหละค่ะ"
22120-59 = "และในเมืองแห่งนั้น มีความเป็นไปได้สูงที่อาริสึจังจะถูกพาตัวไปที่หอคอยกลางเมืองค่ะ"
22120-61 = "อาริสึ... อยู่ที่นั่นงั้นเหรอ..."
22120-62 = "ถ้างั้นฉันจะส่งพิกัดของที่นี่ให้นะคะ"
22120-63 = "เรื่องนี้พวกเราคงช่วยได้เพียงเท่านี้ แต่ว่า..."
22120-64 = "ได้โปรดช่วยหยุดประธานริโอะ แล้วพาอาริสึจังกลับมาให้ได้นะคะคุณครู! แล้วก็ทุกคนด้วยค่ะ!"
22120-65 = "[s] \"อื้ม ไว้ใจพวกเราได้เลย\""
22120-71 = "เราได้พิกัดของเอริดูมาแล้วก็จริง แต่ปัญหาอยู่ที่วิธีการเข้าไปที่นั่นนี่ละ"
22120-72 = "คนอย่างท่านประธานคงจะสร้างระบบป้องกันเพื่อป้องกันผู้บุกรุกเอาไว้แล้วแน่ๆ"
22120-73 = "ถ้าใช้กำลังบุกเข้าไปแบบโจ่งแจ้งเลยละก็... "
22120-74 = "เห็นทีคงจะได้เปิดประสบการณ์ทำความเข้าใจ ว่าทำไมถึงเรียกเอริดูว่าเมืองแห่งปราการเลยละ"
22120-76 = "ถ้างั้นต้องทำยังไงล่ะ?!"
22120-77 = "ถ้าแม้แต่การเข้าถึงก็ยังยากแบบนี้..."
22120-79 = "นั่นมันกรณีที่เราเข้าไปด้วยวิธีธรรมดาๆ น่ะ"
22120-81 = "... ถือว่าโชคดีอยู่นะที่ชมรมวิศวกรรมอย่างเรารู้วิธีอื่นด้วย"
22120-82 = "[s] \"วิธีอื่นเหรอ...?\""
22120-83 = "ถ้าเป็น <แรงงาน> ในการสร้างเมืองละก็ ประธานริโอะอาจติดตั้งโดรนเข้าไปเพิ่มเรื่อยๆ เพื่อทำงานได้"
22120-84 = "แต่ถ้าเป็นเรื่อง <วัสดุ> ละก็ มันจะไม่เหมือนกัน เพราะมันเป็นสิ่งที่ไม่สามารถสร้างจากศูนย์ได้"
22120-85 = "โดยพื้นฐานแล้ว ที่ชานเมืองของเขตปกครองตนเองมิลเลเนียมจะมีรถไฟไร้คนขับอยู่เป็นจำนวนมากเพื่อ#nการขนส่งสินค้า"
22120-86 = "หากมีการขนส่งวัสดุเข้ามาเพื่อสร้างเมืองในมิลเลเนียม ก็มีความเป็นไปได้สูงว่าหนึ่งในเส้นทางรถไฟ#nของที่นั่นจะเป็นเส้นทางที่นำไปสู่เอริดูอย่างลับๆ"
22120-87 = "อ๋อ... ถ้างั้นเราก็แค่ต้องหาว่าเส้นทางนั้นอยู่ตรงไหน..."
22120-88 = "ใช่ แล้วเราก็จะหาเมืองเอริดูได้"
22120-89 = "ตะ... แต่ว่าจะหาเส้นทางได้ยังไงเหรอคะ?! พวกฉันไม่รู้วิธีหาอะไรแบบนั้น..."
22120-90 = "เพราะแบบนั้นยังไงล่ะ พวกเราชมรมวิศวกรรมก็เลยตัดสินใจว่าจะร่วมมือด้วย"
22120-91 = "[s] \"แต่ว่าอุทาฮะ พวกเราจะต้องสู้กับริโอะเลยนะ ทำไมพวกเธอ...\""
22120-92 = "ทำไมพวกฉันถึงจะร่วมมืองั้นเหรอ?"
22120-93 = "ไม่จำเป็นต้องถามให้เหนื่อยหรอก"
22120-94 = "ก็เพราะไม่ใช่แค่พาตัวอาริสึไป แต่ประธานริโอะยังแย่งสุดยอดสิ่งประดิษฐ์ที่ชมรมวิศวกรรมให้อาริสึไป#nด้วยยังไงล่ะ"
22120-95 = "สุดยอดสิ่งประดิษฐ์ที่ว่าก็คือ..."
22120-96 = "ซูเปอร์โนวาของอาริสึจัง..."
22120-97 = "ใช่ การมาขัดขวางการวิเคราะห์ข้อมูลของเรา ก็ไม่ต่างจากการใช้อำนาจโดยมิชอบ ที่จริงนี่เป็นการ#nประกาศสงครามกับชมรมวิศวกรรมเลยละ ในฐานะของหัวหน้าชมรมวิศวกรรม ฉันจะเพิกเฉยกับเรื่องนี้ไม่ได้ เพราะงั้นฉันเลยคิดว่า..."
22120-98 = "รุ่นพี่อุทาฮะ ไม่ต้องเขินไปหรอก..."
22120-99 = "หา... หืม? เอ๋...? นะ... นี่คือ... คุยเรื่องอะไรกันเหรอ...?"
22120-100 = "ค่า! ถ้ามีเรื่องสงสัย เดี๋ยวฉันจะอธิบายให้เอง! ตอนนี้สิ่งที่รุ่นพี่อุทาฮะคิดอยู่ในใจคือแบบนี้ค่ะ...!"
22120-101 = "อยากไปช่วยเพื่อน แต่ก็อายที่จะพูดออกมาตรงๆ และในฐานะของวิศวกรก็คิดว่ามันไม่สมเหตุสมผลไป#nหน่อยที่จะมาแย่งอุปกรณ์ที่ประดิษฐ์ขึ้นมาไป ก็เลยคิดว่าเอาข้อนี้มาอ้างดีกว่าไหมน้า..."
22120-103 = "เดี๋ยวเถอะ โคโทริ"
22120-108 = "อุบ อุ้บ?!"
22120-109 = "ชู่ว"
22120-110 = "(พยักหน้าหงึกๆ!!)"
22120-113 = "โอเค... เก็บความลับได้แล้ว"
22120-114 = "[s] \"คือว่า... ขอโทษนะ ครูคิดว่าปิดไม่อยู่แล้วละ\""
22120-115 = "...ได้แล้ว"
22120-116 = "[s] \"อ่า... อืม...\""
22120-117 = "เพราะฉะนั้นชมรมวิศวกรรมของเราก็จะเข้าร่วมด้วย"
22120-118 = "อืม"
22120-119 = "อ่ะแฮ่ม! วางใจพวกฉันได้เลยค่ะ!"
22120-124 = "(และในตอนที่ทุกคนคาดเดาตำแหน่งของอาริสึและหาวิธีการไปถึงที่นั่นได้แล้ว)"
22120-126 = "[ns] \"งั้นปัญหาต่อไปคงเป็น พอไปถึงแล้วจะพาอาริสึออกมายังไง\""
22120-127 = "ใช่ค่ะ ยิ่งได้ชื่อว่าเมืองแห่งปราการแล้วละก็... ประธานริโอะคงเตรียมการคุ้มกันทุกอย่างไว้อย่างแน่น#nหนาแล้วแน่ๆ ค่ะ"
22120-128 = "นอกจากความปลอดภัยของเมืองแล้ว ฉันว่าระบบป้องกันของเมืองเองก็น่าจะอยู่ในระดับที่ไม่ธรรมดาแน่ๆ"
22120-129 = "นอกจากนั้น... ไม่ว่าเราจะทำได้ดีแค่ไหนในเมืองแห่งปราการ แต่ก็ยังมีอุปสรรคที่ใหญ่ที่สุดอยู่"
22120-130 = "[s] \"อุปสรรคที่ใหญ่ที่สุดงั้นเหรอ...?\""
22120-132 = "หมายถึงเมดคนที่คอยประกบประธานริโอะ และปกป้องที่แห่งนั้นอย่างเข้มงวดสินะคะ..."
22120-133 = "........."
22120-134 = "เห็นว่าชื่อ... คุณโทคิ... ใช่ไหมคะ?"
22120-135 = "คุณโทคิที่เราได้เห็นตอนนั้น..."
22120-136 = "คุณโทคิที่เคลื่อนไหวไปมาราวกับสายฟ้า มันช่างเหมือนกับ..."
22120-137 = "ใช่... เหมือนกับ <ผู้เล่นที่ใช้สูตรโกง>... ยังไงยังงั้นเลย"
22120-141 = "พวกเราต้องมีกลยุทธ์"
22120-147 = "[ns] \"เนรุพูดคำว่ากลยุทธ์ออกมาเหรอ?!\""
22120-148 = "ระ... รุ่นพี่เนรุ เป็นอะไรหรือเปล่า?"
22120-149 = "หรือว่า... เพราะบาดเจ็บหนักก็เลย...?"
22120-150 = "เฮ้อ... จะเล่นใหญ่กันไปทำไมล่ะนั่นน่ะ?"
22120-151 = "หัวหน้าแค่เข้าโหมดภารกิจน่ะ"
22120-152 = "พออยู่ในโหมดจริงจัง ก็จะจริงจังจนน่าตกใจแบบนี้แหละ!"
22120-153 = "ใช่ค่ะ ใช่เลย~"
22120-155 = "บะ... แบบนี้เองเหรอ...!"
22120-156 = "อืม รุ่นพี่เนรุ... ขอถามได้ไหมว่าหมายความว่าอะไร?"
22120-157 = "ถึงเข้าไปในเมืองแห่งปรากงปราการอะไรนั่น ตราบใดที่เมืองนั้นเป็นอาณาเขตของริโอะ การเคลื่อนไหว#nของพวกเราก็จะถูกจับตามองอยู่ดี"
22120-158 = "ถึงยังไง ริโอะก็คือคนที่ได้ชื่อว่าเป็น <บิ๊กซิสเตอร์> เลยนะ"
22120-159 = "[s] \"งั้นก็แปลว่า...?\""
22120-160 = "แปลว่าไม่มีอะไรซับซ้อน แค่บุกเข้าไปด้วยความตั้งใจที่จะดึงดูดสายตาตั้งแต่แรกไง"
22120-161 = "หัวหน้า แต่ถ้าทำอย่างนั้นแล้วเราโดนประธานริโอะเล่นงานกันยกกลุ่มล่ะ...?"
22120-162 = "เพราะงั้นเราถึงต้องมีกลยุทธ์ไง"
22120-163 = "ถ้าจะพูดให้ชัดเจนก็คือ ปฏิบัติการหลอกลวงศัตรู"

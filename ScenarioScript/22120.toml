22120-165 = "เงื่อนไขการชนะเกมนี้ก็ง่ายๆ"
22120-166 = "<ต้องช่วย[ruby=อาริสึ]เด็กน้อย[/ruby]ให้ได้ก่อนที่เราจะโดนเล่นงาน>"
22120-167 = "พวกเรา C&C จะบุกเข้าไปซึ่งๆ หน้า แล้วก่อความวุ่นวายให้มากที่สุด ริโอะกับโทคิจะได้เพ่งเล็งมาที่พวก#nเรายังไงล่ะ"
22120-168 = "ระหว่างนั้นพวกเธอก็ไปช่วยเจ้าเด็กน้อยออกมาซะ ว่าไง? ง่ายมากเลยใช่ไหมล่ะ?"
22120-170 = "ถ้าทำแบบนั้นได้..."
22120-171 = "เราก็จะชนะ...!"
22120-172 = "ว่าแต่รุ่นพี่เนรุ... เราจะไหวกันเหรอ? อีกฝ่ายเป็นถึง <ผู้เล่นที่ใช้สูตรโกง> เลยนะ..."
22120-174 = "เฮอะ! คิดว่าฉันเป็นใครกัน?"
22120-175 = "ในเมื่อโดนพวกนั้นเล่นงานมา ฉันก็เลยตั้งใจจะสนองคืนกลับไป"
22120-176 = "เพราะงั้นก็เลยจะทำตามที่ตั้งใจไว้ก็เท่านั้นแหละ"
22120-177 = "ฉันเอาด้วยคน"
22120-178 = "อื้ม! ให้เป็นหน้าที่ของพวกเราได้เลย~"
22120-179 = "ฮุฮุ ต้องพยายามอย่างเต็มที่แล้วละค่ะ"
22120-180 = "(...พอสมาชิกทุกคนของ C&C มารวมตัวกันครบแบบนี้ ก็รู้สึกได้เลยว่าครั้งนี้จะฝ่าไปได้แน่ๆ...)"
22120-181 = "งั้นก็ตัดสินใจตามนี้เลยนะคะ หัวหน้ากับพวกเรา C&C จะรับหน้าที่ในด้านหน้าเองค่ะ"
22120-182 = "ส่วนที่เหลือก็จะเป็นชมรมพัฒนาเกม พวกฉัน และคุณครู... ที่จะเข้าไปช่วยอาริสึใช่ไหม?"
22120-183 = "เวอริทัสจะสนับสนุนจากระยะไกลอยู่เบื้องหลังให้นะ"
22120-184 = "อื้ม! พวกเราจะแฮ็กระบบความปลอดภัยที่ขวางทางให้เอง วางใจได้เลย!"
22120-185 = "ดูจากความมุ่งมั่นแล้ว พวกเราน่าจะทำออกมาได้อย่างสมบูรณ์แบบเลยนะคะ"
22120-187 = "เอาละ! งั้นก็คงกำหนดหน้าที่คร่าวๆ ได้ตามนี้เนอะ!"
22120-188 = "[s] \"อื้ม\""
22120-189 = "เป้าหมายคือหอคอยกลางของเมืองแห่งปราการเอริดู! ที่ที่อาริสึถูกจับตัวไป!"
22120-190 = "พวกเราจะไปช่วยอาริสึที่ออกจากแมพไป!"
22120-191 = "ด้วยสองมือของพวกเราเองนี่แหละ!"

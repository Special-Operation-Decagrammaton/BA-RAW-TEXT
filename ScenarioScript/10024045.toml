[translation]
10024045-3 = "Tch...!"
10024045-7 = "Oh dear... I didn't want to resort to force, but there may be no avoiding it."
10024045-8 = "So. Can we talk this out now?"
10024045-14 = "...I must learn from my mistakes, or I'll never move forward. If I don't move forward, I can't grow..."
10024045-18 = "It's not an indignity unless you let it be...! We were not born simply to die...!"
10024045-25 = "...She's speaking nonsense."
10024045-26 = "[s] \"Yeah, I didn't catch all that...\""
10024045-28 = "Hrm..."
10024045-33 = "I staked this place out after I heard you were meeting with the Eastern Alchemy Society."
10024045-34 = "I was curious if the society would come here with you, or if you'd come alone..."
10024045-36 = "Is the Eastern Alchemy Society on your suspect list?"
10024045-38 = "They deal in medicines."
10024045-39 = "It's only natural they'd reach out to the Black Tortoise Promenade to get their hands on...special ingredients."
10024045-41 = "That's some imagination you've got there."
10024045-43 = "It's deduction, not imagination."
10024045-44 = "[s1] \"You talk like you're from an old noir film...\"\n[s2] \"You're quite the hard-boiled detective, aren't you?\""
10024045-47 = "I'm glad somebody noticed."
10024045-48 = "[s] \"You can relax with us. No need to play it cool.\""
10024045-49 = "I'm not playing anything. I...already am cool."
10024045-51 = "(She's an idiot.)"
10024045-52 = "(Seems like.)"
10024045-53 = "If the Eastern Alchemy Society is so suspicious, why haven't you been hassling them too?"
10024045-55 = "I don't have proof against them. On the other hand, we have that box from your Promenade."
10024045-56 = "..."
10024045-57 = "And now, the culprits have returned to the scene of the crime. You may as well have written a confession."
10024045-58 = "The only thing left to decide...is what to do about you, Sensei..."
10024045-60 = "You're jumping to conclusions!"
10024045-61 = "How could we have harvested ginseng from this sacred mountain without Genryumon noticing in the first place?"
10024045-62 = "That's easy. Everyone knows the Black Tortoise Promenade will resort to any and every dirty trick in the book."
10024045-63 = "Bribery... Coercion... Nighttime sneakery... There are too many ways to list."
10024045-65 = "I'm sure you know all about that sort of thing."
10024045-66 = "Please use your brain, if you have one."
10024045-67 = "You keep saying that criminals always return to the scene of the crime. Well, you returned here too, didn't you?"
10024045-69 = "It seems to me that Genryumon is behind this, and you're trying to pin it on us."
10024045-70 = "How dare you!"
10024045-72 = "But it makes sense though, right? Who else but Genryumon could secretly smuggle the ginseng from here?"
10024045-73 = "Then you frame the Black Tortoise Promenade and get rid of us once and for all."
10024045-74 = "You're ignoring the biggest smoking gun of them all. Ten-thousand-year ginseng was found in one of YOUR boxes."
10024045-75 = "Pft! The Black Tortoise Promenade makes deliveries all over Shanhaijing."
10024045-76 = "And maybe you forgot, but Genryumon basically runs everything in Shanhaijing."
10024045-77 = "It would have been a piece of cake for you to get your hands on a few misplaced Promenade boxes!"
10024045-79 = "Nonsense!"
10024045-80 = "YOU'RE nonsense!"
10024045-85 = "Hm. If I may set aside my title of president, and offer an outside perspective..."
10024045-86 = "The Black Tortoise Promenade and Genryumon watch every move the other makes, right?"
10024045-87 = "I'm not sure how one could smuggle anything without the other noticing."
10024045-88 = "[s] \"You're right. Someone would have witnessed something by now.\""
10024045-90 = "Huh? Sensei, you aren't taking their side, are you?"
10024045-91 = "Sensei, you can't honestly believe Genryumon is innocent!"
10024045-92 = "[s] \"I'm not doing anything like that...\""
10024045-94 = "Poor Sensei, getting dragged into your bickering."
10024045-95 = "Honestly. You're like two peas in a pod, and you don't even realize it."
10024045-102 = "[ns] \"Are there any groups independent from both the Black Tortoise Promenade and Genryumon?\""
10024045-103 = "There's no such organization in Shanhaijing, Sensei."
10024045-104 = "Genryumon influences everything that happens here. If I had to pick a group, I'd say the Black Tortoise Promenade..."
10024045-106 = "Good thinking! It's another piece of evidence proving the Black Tortoise Promenade's guilt. "
10024045-107 = "Thanks for the advice, Sensei. Nice assist."
10024045-109 = "Are you seriously bragging that your club sticks its nose in everyone's business? That's embarrassing..."
10024045-110 = "I-Is that what you meant? Sensei, did you trick me? Are you...an enemy...after all?!"
10024045-111 = "[s] \"No!\""
10024045-112 = "But... Fine. I'll believe you for now."
10024045-114 = "It's a good question. An organization not influenced by either of our groups..."
10024045-121 = "Oh... I can think of one."
10024045-122 = "President! You know the answer?"
10024045-123 = "Hm? What club is that?"
10024045-124 = "No, it couldn't be... If that place is somehow involved..."
10024045-126 = "...then Shanhaijing is in a worse state than I thought."
10024045-129 = "[ns] \"Mumbling to yourself and withholding details is not appropriate in a school setting!\""
10024045-130 = "H-Huh? Sensei, are you...educating me...?"
10024045-131 = "[s] \"Actually, I just wanted you to spill the beans.\""
10024045-132 = "Sensei..."
10024045-134 = "I'm here for you, President! If it's hard to say it out loud, just whisper it into my ear..."
10024045-135 = "What are you blabbing about? Spit it out, or I'll show you how we make people talk in Genryumon!"
10024045-136 = "Ahem! I realized that there IS one group. They're a group that nobody would ever think of."
10024045-137 = "None of us even considered them. The fact that you still don't know who I'm talking about proves it."
10024045-138 = "Why, their very name is synonymous with innocence..."
10024045-140 = "So!"
10024045-141 = "Who!"
10024045-145 = "[ns] \"—are you talking about?!\""
10024045-149 = "Shanhaijing's Disciplinary Support Department: The Plum Blossom Garden."

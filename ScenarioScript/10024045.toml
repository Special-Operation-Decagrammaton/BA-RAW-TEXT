10024045-85 = "3;루미;02;으음. 회장으로서의 직책에서 잠시 물러나, 제삼자의 시선에서 보자면 말이지.\n"
10024045-86 = "3;루미;01;보라고…… 현무상회와 현룡문, 이렇게나 서로 날을 세우고 있잖아?"
10024045-87 = "3;루미;05;그 사이에서 어떻게 대범하게 금수품을 반출할 수 있었다는 건지 조금 이해하기 힘든데?\n#3;em;[!]"

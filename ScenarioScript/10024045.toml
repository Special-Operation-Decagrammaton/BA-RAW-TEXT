[translation]
10024045-3 = "唔……！"
10024045-7 = "唉……本來不打算戰鬥的，不過也別無選擇呢。"
10024045-8 = "怎麼樣，稍微冷靜下來了嗎？"
10024045-14 = "「……不承認錯誤就無法向前邁進。無法向前邁進便無法成長……」"
10024045-18 = "「屈辱在成為屈辱前都不算屈辱……吾等豈是為了被破壞而創造！」"
10024045-25 = "……又在說一些莫名其妙的話。"
10024045-26 = "[s]「我也聽不太懂。」"
10024045-28 = "怎麼會……！"
10024045-33 = "我收到玄武商會與鍊丹術研究會有所接觸的消息後，就在這裡等你們了。"
10024045-34 = "期待著你們是否會和煉丹術研究會一起現身……"
10024045-36 = "玄龍門也在懷疑鍊丹術研究會嗎？"
10024045-38 = "呵，畢竟「萬年蔘」與藥材密切相關。#n會留意那裡也是理所當然的吧？"
10024045-39 = "鍊丹術研究會和玄武商會之間一定在暗地裡勾結著。"
10024045-41 = "──還真擅長穿鑿附會。"
10024045-43 = "請稱之為[ruby= ・     ・ ]推理[/ruby]。"
10024045-44 = "[s1]「我有點好奇……」\n[s2]「你是不是喜歡冷硬派的風格？」"
10024045-47 = "那當然，棒極了對吧？"
10024045-48 = "[s]「酷酷的風格呢？」"
10024045-49 = "呵，這還用問。#n如你所見，那根本是為我而生的詞彙不是嗎？"
10024045-51 = "（原來是個傻瓜啊）"
10024045-52 = "（嗯，是傻瓜沒錯）"
10024045-53 = "為什麼放著鍊丹術研究會不管？"
10024045-55 = "因為那邊沒有物證。#n而且目前為止並沒有什麼可疑的動靜。"
10024045-56 = "……"
10024045-57 = "呵，你們像這樣回到現場的行為，也算是驗證了我的推理是正確的。"
10024045-58 = "剩下的就是該如何處置老師了……"
10024045-60 = "這會不會太武斷了？"
10024045-61 = "再說，在這座被玄龍門嚴密監控的崑崙山，究竟要怎麼把「萬年蔘」帶出去呢？"
10024045-62 = "手段要多少有多少吧？#n八成是用了某些骯髒的手段入侵了這座山沒錯。"
10024045-63 = "被賄賂或收買的話，監視也就失去意義了。"
10024045-65 = "這種做法對玄武商會來說不過是信手拈來吧？"
10024045-66 = "請稍微用腦袋思考吧。"
10024045-67 = "你說犯人會回到犯罪現場對吧？#n既然如此，這對玄龍門也不例外。"
10024045-69 = "還是要我說這整件事，都是玄龍門為了陷害玄武商會暗中策劃的？"
10024045-70 = "這怎麼可能！"
10024045-72 = "思考一下誰從中得利，誰蒙受損失的話──事情不就說得通了嗎？"
10024045-73 = "從這個方向來看──#n玄龍門走私「萬年蔘」並且嫁禍於玄武商會的可能性很高。"
10024045-74 = "呵，你忘記證據的存在了嗎？#n發現「萬年蔘」的可是玄武商會的箱子啊。"
10024045-75 = "不過是一兩個紙箱，要弄到手不是什麼難事吧？"
10024045-76 = "玄武商會好歹也是以山海經內最大的通路聞名的。"
10024045-77 = "說到底……主導著整個山海經的玄龍門，哪有什麼弄不到的東西呢？"
10024045-79 = "你這完全是在找碴！"
10024045-80 = "打從一開始就這麼認定的不就是你們嗎！"
10024045-85 = "唔嗯～玄武商會與玄龍門一直都關注著彼此的行動對吧？"
10024045-86 = "從犯人的立場來考慮的話……"
10024045-87 = "想在這種情況下避人耳目地走私，是不是有點困難？"
10024045-88 = "[s]「畢竟必須騙過雙方的眼睛。」"
10024045-90 = "老師要站在玄武商會那邊嗎！？"
10024045-91 = "老師要站在玄龍門那邊嗎！？"
10024045-92 = "[s]「你們兩位都冷靜一點……」"
10024045-94 = "好了好了，這樣會讓老師為難的吧。"
10024045-95 = "真是的……真不知道該說這兩個人是合得來還是合不來。"
10024045-102 = "[ns]「有沒有什麼雙方都注意不到的組織……？」"
10024045-103 = "你在說什麼呢，老師。#n山海經怎麼可能會有那種組織。"
10024045-104 = "山海經的一切都在玄龍門的支配底下。#n……也就玄武商會比較麻煩一點吧。"
10024045-106 = "沒錯，可疑的就只有玄武商會你們而已。"
10024045-107 = "呵，得感謝老師的建言才行呢。"
10024045-109 = "那是值得驕傲地掛在嘴邊的話嗎……？#n我倒覺得那足以成為玄龍門陷害玄武商會的動機……"
10024045-110 = "什麼，你是故意挖洞給我跳嗎！？#n老師果然是玄龍門的敵人……！"
10024045-111 = "[s]「我才沒有那個意思！？」"
10024045-112 = "不……這也無所謂。#n你總有一天會理解的。"
10024045-114 = "唔嗯～我們注意不到的組織啊……#n注意不到……不到……不必注意？"
10024045-121 = "啊，難不成，如果是那裡的話……？"
10024045-122 = "會長，你有什麼頭緒嗎？"
10024045-123 = "等等，你在說什麼？"
10024045-124 = "不，可是這實在……要是連那些孩子都牽扯進來了的話……"
10024045-126 = "山海經也終於要完蛋了啊……"
10024045-129 = "[ns]「自己消化自己提出的疑問，從教育的角度來看是不好的！」"
10024045-130 = "是，是嗎？#n這個問題有必要上升到教育的層次嗎……？"
10024045-131 = "[s]「其實只是因為我很好奇。」"
10024045-132 = "老師……"
10024045-134 = "會長，也請偷偷告訴──"
10024045-135 = "你們交頭接耳在說些什麼！#n不趕快說出來的話，就算不願意也要撬開你們的嘴！"
10024045-136 = "唔嗯～那……從結論來說，確實存在哦。#n──不受雙方干涉的組織。"
10024045-137 = "不過一般來說絕對不會想到那個地方。肯定會覺得是騙人的。#n……我也希望是我搞錯了。"
10024045-138 = "山海經裡，最純潔無垢的地方──"
10024045-140 = "所以說！"
10024045-141 = "那到底！"
10024045-145 = "[ns]「是哪裡！？」"
10024045-149 = "山海經培育支援部．梅花園。"

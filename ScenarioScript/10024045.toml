10024045-59 = "#all;hide"
10024045-60 = "3;레이죠;05;그것은 지나치게 성급한 판단이지 않습니까?\n#3;em;[빠직]\n#3;closeup"
10024045-61 = "3;레이죠;07;애초에 이렇게 현룡문이 통제하는 영산인 곤륜에서, 저희들이 어떻게 멋대로 식물을 채취할 수 있겠습니까.\n#3;closeup"
10024045-62 = "3;미나;05;수단은 아무래도 상관없지 않나? 현무상회라면 온갖 더러운 수법을 써서라도 곤륜에 들어왔겠지.\n#3;closeup"
10024045-63 = "3;미나;11;매수라든가, 어떻게든 감시를 피한다든가…… 예시를 떠올리는 것도 귀찮군.\n#3;closeup"

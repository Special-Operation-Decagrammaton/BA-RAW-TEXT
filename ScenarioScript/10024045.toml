[translation]
10024045-3 = "อึก...!"
10024045-7 = "เฮ้อ... ตอนแรกก็ไม่ได้อยากแก้ปัญหาด้วยการใช้กำลังหรอกนะ แต่สถานการณ์ไม่เป็นใจเอาซะเลย"
10024045-8 = "ว่ายังไงล่ะ ตอนนี้อยากจะเจรจาขึ้นมาหรือยัง?"
10024045-14 = "ถ้าไม่ยอมรับความผิดพลาดก็ก้าวไปข้างหน้าไม่ได้... พอก้าวต่อไปไม่ได้ เราก็ไม่อาจเติบโตได้..."
10024045-18 = "เราไม่ได้มีศักดิ์ศรีไว้เพื่อเสีย... เพราะงั้นเราก็ไม่ได้ถูกสร้างมาเพื่อถูกทำลายเช่นกัน!"
10024045-25 = "พูดอะไรไม่รู้เรื่องเหมือนเดิมเลยนะคะ..."
10024045-26 = "[s] \"อืม เรื่องนี้ครูก็ไม่เข้าใจเหมือนกัน\""
10024045-28 = "ไม่พอใจเลยแฮะ..."
10024045-33 = "พอได้ยินว่าย่านการค้าเทพเต่าดำติดต่อกันกับชมรมวิจัยศาสตร์การปรุงยา ฉันก็มารออยู่ที่นี่เลย"
10024045-34 = "รอดูว่าจะโผล่มาแค่ย่านการค้าเทพเต่าดำหรือมีชมรมวิจัยศาสตร์การปรุงยามาด้วย"
10024045-36 = "ชมรมวิจัยศาสตร์การปรุงยา... ก็ตกเป็นผู้ต้องสงสัยด้วยเหรอคะ?"
10024045-38 = "ถ้าเป็นเรื่องใช้ยา ก็ต้องเกี่ยวกับพวกเธออยู่แล้วสิ"
10024045-39 = "คิดแล้วเชียวว่าชมรมวิจัยศาสตร์การปรุงยากับย่านการค้าเทพเต่าดำต้องหาทางร่วมมือกันแน่"
10024045-41 = "เดาเก่งจังเลยนะคะ"
10024045-43 = "ถ้าช่วยเรียกมันว่าเป็นการสันนิษฐานละก็จะขอบใจมากเลย"
10024045-44 = "[s1] \"มีบางอย่างคาใจครูตั้งแต่ก่อนหน้านี้แล้วละ...\"\n[s2] \"เธอชอบแนวๆ สืบสวนอาชญากรบู๊ดุเดือดเหรอ?\""
10024045-47 = "แน่นอนสิ ก็มันเจ๋งออกจะตายไป"
10024045-48 = "[s] \"แล้วแนวเท่ๆ ล่ะ?\""
10024045-49 = "ก็ไม่ได้มีเหตุผลที่ต้องไม่ชอบนะ ฉันก็เท่เป็นทุนเดิมอยู่แล้ว"
10024045-51 = "(ติงต๊องจริงๆ เลยค่ะ)"
10024045-52 = "(อืม ก็ติงต๊องดีนะ)"
10024045-53 = "ทำไมถึงปล่อยชมรมวิจัยศาสตร์การปรุงยาไปล่ะคะ?"
10024045-55 = "ก็เพราะมันไม่มีหลักฐานที่จับต้องได้ยังไงล่ะ อย่างน้อยย่านการค้าเทพเต่าดำก็มีหลักฐานเป็นของที่อยู่#nข้างในกล่อง"
10024045-56 = "..."
10024045-57 = "และการที่คนร้ายกลับมายังจุดเกิดเหตุ ก็ยืนยันอะไรบางอย่างได้แล้ว"
10024045-58 = "ถ้าอย่างนั้นก็เหลือแค่บทลงโทษจากคุณครูแล้วละ..."
10024045-60 = "แบบนั้นน่ะ มันไม่ดูรีบด่วนสรุปเกินไปหน่อยเหรอคะ?"
10024045-61 = "เขาคุนหลุนอันศักดิ์สิทธิ์ถูกมังกรดำควบคุมการเข้าออกซะขนาดนั้น#nพวกเราจะไปเก็บโสมหมื่นปีมาตามอำเภอใจได้ยังไงกันล่ะคะ"
10024045-62 = "พวกเธอไม่สนใจวิธีการอยู่แล้วไม่ใช่หรือไง? ย่านการค้าเทพเต่าดำคงใช้วิธีสกปรกสารพัดเพื่อเข้ามายัง#nเขาคุนหลุนจนได้อยู่ดีนั่นแหละ"
10024045-63 = "ก็อาจจะติดสินบนหรือหลบเลี่ยงการเฝ้าระวัง... แค่นึกตามก็เหนื่อยแล้วแฮะ"
10024045-65 = "เรื่องนั้นย่านการค้าเทพเต่าดำน่าจะบอกได้ละเอียดกว่าทางนี้นะ"
10024045-66 = "ช่วยใช้หัวคิดวิเคราะห์หน่อยสิคะ"
10024045-67 = "คุณบอกว่าคนร้ายย่อมกลับมายังจุดเกิดเหตุนี่คะ? คำพูดนั้นก็ใช้กับมังกรดำได้ด้วยเหมือนกันสิ?"
10024045-69 = "ฉันควรจะตั้งสมมติฐานว่าทั้งหมดนี้เป็นแผนการของมังกรดำมากกว่านะคะ"
10024045-70 = "พูดแบบนั้นได้ยังไงกัน!"
10024045-72 = "หนังคนละม้วนกันเลยใช่ไหมล่ะคะ? ที่ฉันจะบอกคือ มังกรดำลักลอบส่งโสมหมื่นปีที่เก็บมาจากเขา#nคุนหลุนออกสู่ภายนอก"
10024045-73 = "แล้วก็มาใส่ความพวกเราเพื่อที่จะได้ขับไล่ย่านการค้าเทพเต่าดำออกไปค่ะ"
10024045-74 = "นี่เธอมองข้ามหลักฐานที่ชัดเจนที่สุดไปหรือเปล่า? กล่องที่ใส่โสมหมื่นปีเอาไว้มันคือกล่องจากย่านการ#nค้าเทพเต่าดำนะ"
10024045-75 = "เรื่องนั้นฉันโต้แย้งได้ค่ะ ในซานไห่จิง ย่านการค้าเทพเต่าดำมีเครือข่ายการขนส่งสินค้าที่ใหญ่ที่สุด"
10024045-76 = "แล้วมังกรดำก็เป็นกลุ่มที่ปกครองซานไห่จิงด้วย"
10024045-77 = "การหากล่องของย่านการค้าเทพเต่าดำที่มีเกลื่อนกลาดมาสักใบสองใบ มันคงไม่ใช่เรื่องยากสำหรับ#nมังกรดำหรอกค่ะ"
10024045-79 = "เธอแค่เดาไปเองนี่!"
10024045-80 = "ก็เดาๆ กันทั้งสองฝ่ายนั่นแหละค่ะ!"
10024045-85 = "อืม ฉันจะลองถอยจากตำแหน่งประธานออกมามองเหตุการณ์ในฐานะบุคคลที่สามดูนะ"
10024045-86 = "ไหนดูซิ... ย่านการค้าเทพเต่าดำกับมังกรดำไม่ถูกกันอย่างนั้นเหรอ?"
10024045-87 = "มันทำความเข้าใจยากอยู่หน่อยน่ะว่าพวกนั้นใจกล้าส่งออกของต้องห้ามกันในช่วงนั้นได้ยังไง?"
10024045-88 = "[s] \"แน่นอนว่ามันก็เป็นเรื่องที่ทั้งสองฝ่ายควรจับตามองกันและกันนะ\""
10024045-90 = "อะไรกัน? คุณครูก็เข้าข้างย่านการค้าเทพเต่าดำงั้นรึ?"
10024045-91 = "แสดงว่าคุณครูคิดว่าฝ่ายมังกรดำพูดถูกอย่างนั้นเหรอคะ?"
10024045-92 = "[s] \"ทั้งสองคนช่วยใจเย็นๆ กันก่อนได้ไหม...\""
10024045-94 = "นี่ๆ คุณครูยังไม่ได้บอกเลยนะว่าอยู่ฝ่ายไหนน่ะ"
10024045-95 = "เฮ้อ... เราก็ตกอยู่ในสภาพเดียวกันทั้งสองฝ่ายนั่นละ จริงๆ เลย..."
10024045-102 = "[ns] \"มีองค์กรที่ไม่เกี่ยวข้องกับมังกรดำและย่านการค้าเทพเต่าดำบ้างไหม?\""
10024045-103 = "ที่ซานไห่จิงไม่น่าจะมีองค์กรแบบนั้นอยู่หรอกนะ คุณครูจะสื่ออะไรงั้นเหรอ"
10024045-104 = "ไม่มีองค์กรไหนที่ไม่ได้รับอิทธิพลจากมังกรดำหรอก ถ้าจะให้นับกันจริงๆ ก็มีย่านการค้าเทพเต่าดำแล้ว#nองค์กรหนึ่ง"
10024045-106 = "ก็ดี แบบนี้ย่านการค้าเทพเต่าดำจะได้ถูกสงสัยยิ่งกว่าเดิมสินะ"
10024045-107 = "ขอบคุณสำหรับคำแนะนำในช่วงเวลาเหมาะๆ แบบนี้นะคุณครู เป็นผู้ช่วยที่ดีมากเลย"
10024045-109 = "การป่าวประกาศอย่างภูมิใจว่ามังกรดำแทรกแซงองค์กรอื่นไปทั่วนี่ คิดว่ามันสมควรแล้วเหรอคะ...?"
10024045-110 = "ยะ... อย่างนั้นเหรอ?! คุณครู นี่ฉันตกหลุมพรางเข้าแล้วเหรอเนี่ย?! คุณครูเป็นศัตรูของมังกรดำหรอกเหรอ...?!"
10024045-111 = "[s] \"ไม่ใช่นะ!\""
10024045-112 = "แต่ว่า... ก็ย่อมได้ ฉันไม่ได้เกลียดคุณครูหรอก"
10024045-114 = "ถ้าจะให้พูดถึงองค์กรที่ไม่เกี่ยวข้องกับทั้งสองฝ่ายเลยละก็..."
10024045-121 = "อ๊ะ หรือว่าจะเป็นอันนั้น...?"
10024045-122 = "ท่านประธาน? พอจะนึกอะไรออกเหรอคะ?"
10024045-123 = "อะไรเหรอ? พูดเรื่องอะไรกันน่ะ?"
10024045-124 = "แต่ว่าที่นั่น... อืม... ไม่ดีกว่า ถ้าเกิดพวกเธอเข้ามาพัวพันกับเรื่องแบบนี้ด้วยละก็..."
10024045-126 = "ซานไห่จิงคงถึงกาลอวสานแน่..."
10024045-129 = "[ns] \"พูดเองเออเองแบบนี้มันไม่เป็นผลดีต่อโรงเรียนนะ!\""
10024045-130 = "ยะ... อย่างนั้นเหรอ? เรื่องนี้กลายเป็นปัญหาด้านการศึกษาเลยเหรอ...?"
10024045-131 = "[s] \"ที่จริงครูอยากรู้เองแหละ\""
10024045-132 = "คุณครู..."
10024045-134 = "ใช่ค่ะ ท่านประธาน! ถ้าไม่สะดวกใจเล่าก็กระซิบบอกฉันได้นะ..."
10024045-135 = "มัวกระซิบกระซาบอะไรกันอยู่น่ะ! ถ้าไม่รีบๆ พูดออกมาละก็ ฉันจะทำให้พวกเธอยอมเปิดปากพูด ด้วยวิธีของมังกรดำนะ!"
10024045-136 = "อืม ถ้าจะให้สรุปเลยละก็ เอาเป็นว่ามันก็มีองค์กรที่ไม่มีใครอยากแตะต้องอยู่ด้วยเหมือนกันนะ"
10024045-137 = "แต่ฉันแทบไม่อยากจะจินตนาการเลย และปฏิกิริยาของทุกคนก็คือข้อพิสูจน์"
10024045-138 = "ถ้าองค์กรที่บริสุทธิ์และไร้ข้อครหาที่สุด มาเกี่ยวข้องกับเรื่องแบบนี้..."
10024045-140 = "นั่นสิคะ!"
10024045-141 = "ที่นั่นน่ะ!"
10024045-145 = "[ns] \"ที่ไหนกันเหรอ?!\""
10024045-149 = "ฝ่ายสนับสนุนด้านวินัยสวนต้นบ๊วย ซานไห่จิง"

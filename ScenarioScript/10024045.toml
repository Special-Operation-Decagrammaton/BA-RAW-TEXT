10024045-65 = "5;레이죠;05\n1;미나;03;그런 일은 오히려 현무상회 쪽이 더 자세히 알 거고.\n#1;em;[음표]"
10024045-66 = "5;레이죠;05;최소한으로라도 머리를 써 주시죠."
10024045-67 = "5;레이죠;07;범인은 현장에 돌아오는 법이라고 하셨습니까? 그 말은 현룡문에게도 적용되는 것이 아닌지?"
10024045-68 = "#all;hide"
10024045-69 = "3;레이죠;09;저는 차라리 현룡문이 모든 일을 꾸미고 있었다는 가설을 내세우겠습니다.\n#3;closeup\n#3;em;[!]"

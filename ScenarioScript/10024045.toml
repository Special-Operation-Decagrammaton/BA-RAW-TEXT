10024045-72 = "1;미나;01\n5;레이죠;99;앞뒤는 맞지 않습니까? 현룡문이 곤륜에서 채취한 만년삼을 암암리에 외부로 유통시켰고,"
10024045-73 = "1;미나;04\n5;레이죠;16;현무상회를 축출하기 위해 그 누명을 저희에게 뒤집어씌웠다고요."
10024045-74 = "1;미나;11;가장 명백한 증거를 무시하고 있는 거 아닌가? 만년삼이 담겨 있었던 것은 현무상회의 상자였다.\n#1;m2"
10024045-75 = "5;레이죠;02;그것도 반박 가능합니다. 현무상회는 적어도 산해경 내부에서라면 가장 큰 유통망을 가지고 있고."
10024045-76 = "5;레이죠;01;산해경을 지배하다시피 하고 있는 것은 현룡문이니.\n#5;m4"
10024045-77 = "5;레이죠;09;어딘가에서 굴러다니는 현무상회의 상자 한두 개 정도 구하는 일은, 현룡문이라면 매우 간단했을 겁니다."

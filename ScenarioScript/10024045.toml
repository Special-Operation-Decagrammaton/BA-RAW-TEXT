10024045-109 = "1;미나;09\n5;레이죠;09;현룡문이 사방팔방에 간섭하고 다닌다는 걸, 그렇게 자랑스럽게 이야기하는 것도 조금 그렇지 않습니까……?"
10024045-110 = "1;미나;04;그, 그런가?! 선생님, 혹시 나를 함정에 빠트린 건가?! 선생님은…… 현룡문의 적이었던 건가?!\n#1;em;[?!]\n#1;shake"

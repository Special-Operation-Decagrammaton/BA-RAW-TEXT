1006805-27 = "3;레이사;07;으윽……. 멈출 타이밍을 놓쳐버렸네요. 죄송합니다!\n#3;greeting"
1006805-28 = "[s3] \"굉장히 기운차 보이네.\"\n[s4] \"이 정도는 언제든 받아주지.\""
1006805-29 = "#wait;100"
1006805-30 = "#wait;100"
1006805-31 = "3;레이사;03;에헤헤헤…….\n#3;stiff"
1006805-32 = "3;레이사;04;……아. 이게 아니지. 평소처럼 또 응석을……! 오늘은 이러려고 온 게 아니에요!!\n#3;em;[!]"
1006805-33 = "3;레이사;09;오늘은 제가 갚는 날! 그간 선생님께 받은 도움을 조금이라도 돌려드리기 위한 날이니까요!"
1006805-34 = "3;레이사;00;말씀드렸었죠? 제가 쏘는 날이라고!!"
1006805-35 = "3;레이사;18;오늘을 위해서 돈도 조금씩 모았으니까요! 후후, 따라서 오늘은 경비도 전부 제가! 제 주머니에서!!"
1006805-36 = "3;레이사;14;……네?\n#3;em;[?]"
1006805-37 = "3;레이사;04;경비는 선생님도 내신다고요? 아, 아뇨. 그러면 이야기가 이상해지는데요……. 여기선 제가…….\n#3;stiff"
1006805-38 = "3;레이사;08;원래 그러는 거라고요? 선생님 상대로는? 으음……? 워, 원래? 그런……. 그런 게 있나……?"

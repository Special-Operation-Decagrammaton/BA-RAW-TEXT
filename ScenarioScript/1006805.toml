1006805-133 = "5;레이사;99;오늘 뭔가……. 쭉 즐겁게 보냈던 거랑은 별개로, 뭐랄까……. 좀 그런 게 있어요."
1006805-134 = "5;레이사;99;카페도 그렇고 게임 센터도 그렇고, 모두 선생님께 소개해 드린다! 라는 느낌이었지만, 선생님께서는 다 알고 계시더라고요."
1006805-135 = "5;레이사;02;유원지 같은 경우에는 오히려 저만 처음 가 본 곳이었고……."
1006805-136 = "5;레이사;15;생각해 보면 당연한 일이었는데 말이죠. 선생님께선 항상 많은 곳에 다니시고, 많은 학생들의 일을 봐주시고 하니까요."
1006805-137 = "5;레이사;15;그래서 뭔가, 돌이켜 보면…….\n#5;stiff"
1006805-138 = "5;레이사;01;큰 소리 떵떵 친 거치고는, 막상 선생님께는 그다지 특별한 날을 만들어 드리지 못한 거 같다고 해야 하나……."
1006805-139 = "5;레이사;02;그런 거라면 오히려 제가 선생님의 귀한 시간을 또 멋대로 써버린 게 아닐까……."
1006805-140 = "5;레이사;15;저, 좀 그런 면이 있으니까요. '이렇게 하면 상대가 좋아할 거야!'라고 혼자 생각하고 상대가 정말 그런 지는 잘 모르는……."
1006805-141 = "5;레이사;06;아무튼 그래서, 오늘도 그런 걸까…… 그런 생각이 좀 들었어요. 그런 거라면 죄송합니다.\n#5;em;[땀]"

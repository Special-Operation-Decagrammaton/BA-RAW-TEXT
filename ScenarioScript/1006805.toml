1006805-90 = "3;레이사;08;사실 친구들이랑 가는 곳은 이곳보다 좀 더 먼 곳에 있는 큰 곳인데, 거기로 가면 동선이 꼬여서…….\n#3;em;[속상함]"
1006805-91 = "3;레이사;00;이곳은 저도 처음 와 보는 곳이에요. 스즈미 씨가 순찰 다니는 곳 중에 있다고 소개해 준 곳이거든요!"

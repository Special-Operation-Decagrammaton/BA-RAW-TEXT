[translation]
1006805-1 = "Say Thank You, Reisa"
1006805-2 = "I headed to the alley in Trinity where Reisa wanted to meet."
1006805-4 = "Trinity Alley"
1006805-13 = "Hey Sensei!"
1006805-14 = "[ns1] (That's a familiar voice.)\n[ns2] Look in the direction of the shout."
1006805-21 = "Sensei!"
1006805-27 = "Ow! Sorry! I didn't stop in time. So sorry!"
1006805-28 = "[s3] \"You seem quite energetic.\"\n[s4] \"That's nothing. I can handle something like that any day.\""
1006805-31 = "Heeheehee..."
1006805-32 = "Wait! No. That's not right. Now's not the time for you to be nice to me!"
1006805-33 = "Now's the time for me to be nice to you! That's right! I'm gonna pay you back for all the help you gave me, Sensei!"
1006805-34 = "I mentioned it earlier, right? Everything's on me today!"
1006805-35 = "I've been saving up for this for a while! So let me treat you to everything today, okay?"
1006805-36 = "...Huh?"
1006805-37 = "You wanna pitch in for transportation? No! No, c'mon, that's not right. I'm supposed to pay!"
1006805-38 = "You're saying...that's just the way it is with you? Um...really? I'm not sure you can just say that..."
1006805-42 = "B-But! There's no time for that! We gotta get going! We've got a lot of places to get to."
1006805-47 = "Heehee. Are you ready, Sensei? You'd better be! I picked out all the trendiest places!"
1006805-51 = "[ns] Follow Reisa."
1006805-53 = "Trinity Shopping Street"
1006805-54 = "Ta-da! Here's the first place!"
1006805-55 = "This place is amazing, isn't it? This shopping district always gets new desserts before anywhere else in Trinity!"
1006805-56 = "So if you're looking to try the newest stuff, there's no better place! Oh, oh, around this corner is the famous Mille-Feuille Cafe, too!"
1006805-57 = "What? Haha, no, I didn't do research... My friends just showed me around."
1006805-58 = "Anyway! Have you been to Mille-Feuille Cafe, Sensei?"
1006805-59 = "[s5] \"I do know it, a bit.\"\n[s6] \"I've been there a couple of times.\""
1006805-62 = "Whoa! That's awesome, Sensei!"
1006805-63 = "But you've never been with me before! Let's go!"
1006805-70 = "Arcade"
1006805-71 = "Ta-da! Here's the next place!"
1006805-72 = "You could honestly spend a whole day here, if you wanted! It's so cool!"
1006805-76 = "I like the Peroro claw machine! Oh, and Hitgirls!"
1006805-77 = "Heh, you might not expect this, but I'm pretty good at Hitgirls! I only started recently, but my win rate is right in the middle of my classmates, even ones who've been playing longer."
1006805-78 = "So, what do you wanna play, Sensei?"
1006805-79 = "[s7] \"I like the claw machine.\"\n[s8] \"Watch out. I'm actually pretty good at Hitgirls.\""
1006805-82 = "...!"
1006805-83 = "Okay! Let's go!"
1006805-88 = "Amusement Park"
1006805-89 = "It's way emptier than you'd expect an amusement park to be, right? But that makes it better! No lines to wait in!"
1006805-90 = "Though, actually, my friends and I usually go to a bigger one that's a little further away... But I couldn't fit that into the schedule!"
1006805-91 = "So this is my first time here. Suzumi patrols here, and recommended it to me."
1006805-92 = "Hmm! What should we ride? No lines also means there's way too many options!"
1006805-93 = "[s9] \"The ferris wheel here is really nice.\"\n[s10] \"The carousel here is quite pretty.\""
1006805-96 = "Oh, I see! Then..."
1006805-100 = "Um...hmm..."
1006805-101 = "Huh. Well..."
1006805-102 = "[s11] \"Reisa...?\"\n[s12] \"You're lost in thought. What is it?\""
1006805-105 = "Oh! Nothing. It's nothing! Haha!"
1006805-109 = "Let's go! Yeah!"
1006805-116 = "Playground"
1006805-121 = "That was fun!"
1006805-122 = "When I scheduled a whole day, I was a bit worried you'd get bored..."
1006805-123 = "But we ended up having plenty to do! And everything took more time than I thought."
1006805-124 = "It feels great to finish up a busy day like that! But, um, how did you like it, Sensei?"
1006805-125 = "[s13] \"I had a lot of fun, too.\"\n[s14] \"I just wish the time hadn't flown by quite so fast.\""
1006805-128 = "Heehee..."
1006805-132 = "Actually... Thing is..."
1006805-133 = "There's...just one more thing. Even though we both had a good time..."
1006805-134 = "Everywhere we went, the cafe, the arcade, everywhere else... I wanted to introduce you to them, but you knew them all already."
1006805-135 = "At the amusement park, I was even the one being introduced..."
1006805-136 = "But I guess that makes sense. You go to so many places with so many different students."
1006805-137 = "It's just that..."
1006805-138 = "I talked and talked about making it a special day for you, but then, I couldn't follow through."
1006805-139 = "So I think maybe I just wasted your time, Sensei..."
1006805-140 = "I think...I can be like that sometimes. Like, I get so excited to give someone something, that I end up being totally oblivious to if they actually like it..."
1006805-141 = "And...it seems like this might be another one of those times. If so...I'm sorry."
1006805-145 = "[ns15] \"No, it was definitely a special day!\"\n[ns16] \"That was then, and this is now.\""
1006805-148 = "Huh? But, Sensei..."
1006805-149 = "[ns17] \"It's my first time going to those places with you.\"\n[ns18] \"I discovered all sorts of new things about you.\""
1006805-152 = "[ns] \"So, I'm looking forward to the next day we spend together, Reisa.\""
1006805-156 = "Sensei..."
1006805-157 = "..."
1006805-158 = "All right!!"

1006805-54 = "3;레이사;09;쨔안-! 우선은 여깁니다!\n#3;a"
1006805-55 = "3;레이사;03;아~. 진짜 대박인 곳이라고요, 여기! 여기 상점가는 트리니티 안에서도 가장 빠르게 디저트들이 입고되는 곳이라!\n#3;em;[재잘]\n#3;hophop"
1006805-56 = "3;레이사;00;신상 찾는다고 하면 여기만 한 곳이 없어요! 여기 코너만 지나면 그 유명한 <카페 밀피유>도 있다고요!!"
1006805-57 = "3;레이사;07;아, 제가 따로 조사한 건 아니고 친구들이 데려가 준 거긴 하지만요. 헤헤…….\n#3;em;[///]"

[translation]
1006805-1 = "謝謝你，澪紗"
1006805-2 = "（應澪紗的邀約，前往了三一）"
1006805-4 = "三一．街道"
1006805-13 = "老師～～～！！！"
1006805-14 = "[ns1] （聽見了熟悉的聲音）\n[ns2] 回頭"
1006805-21 = "……老師！！！"
1006805-27 = "唔唔……我停不下來，真抱歉！"
1006805-28 = "[s3]「沒關係，看起來很有活力真是太好了。」\n[s4]「下次會好好接住你的哦！」"
1006805-31 = "耶嘿嘿……"
1006805-32 = "……啊，差點又想撒嬌了……！#n好險好險！"
1006805-33 = "今天是報恩的日子！#n要全心全意地報答總是給我許多建議的老師！"
1006805-34 = "我說過了吧？#n今天要讓老師度過非常美妙的一天！！"
1006805-35 = "為了今天，我可是存了不少錢哦！#n哼哼，付帳就全都交給我吧！！"
1006805-36 = "……咦？"
1006805-37 = "……沒有那個必要是嗎？#n不，不會……可是，這樣就不能算是……"
1006805-38 = "那個……就算你說不用在意也……"
1006805-42 = "總，總之先出發吧！#n這個計劃我已經仔細演練過了！不能浪費多餘的時間！"
1006805-47 = "呵呵，由我來幫你介紹吧！每個都是我最推薦的地方哦～！"
1006805-51 = "[ns] 跟著澪紗走"
1006805-53 = "三一．商店街"
1006805-54 = "鏘～！首先是這裡！"
1006805-55 = "這裡真～的超棒的哦！#n這條商店街是三一裡甜點最豐富的地方！"
1006805-56 = "想要找新甜點的話，來這裡準沒錯！#n過了那個轉角就是那間有名的「Café．Mille-feuille」唷！！"
1006805-57 = "啊，雖然我也是被朋友帶去，所以最近才知道的就是了，啊哈哈……"
1006805-58 = "老師你有去過「Café．Mille-feuille」嗎？"
1006805-59 = "[s5]「大概知道是什麼地方。」\n[s6]「嗯，有吃過幾次。」"
1006805-62 = "哦，哦哦……！不愧是老師！！"
1006805-63 = "那我們走吧！"
1006805-70 = "遊戲中心"
1006805-71 = "鏘鏘～！接下來是這裡！！遊戲中心！"
1006805-72 = "在這裡待一整天都玩不膩，是非常好玩的地方唷！"
1006805-76 = "不只有佩洛洛夾娃娃機……還有Hit Girls的機台！"
1006805-77 = "啊，別看我這樣，我意外有玩Hit Girls的天份喔！#n雖然是初學者，勝率還挺不錯的！"
1006805-78 = "來吧老師！要從哪裡開始逛呢？"
1006805-79 = "[s7]「佩洛洛大人的夾娃娃機！」\n[s8]「Hit Girls我可是不會輸的唷！」"
1006805-82 = "……！！"
1006805-83 = "馬上出發吧！！！"
1006805-88 = "遊樂園"
1006805-89 = "這次是遊樂園！#n……人雖然有點少，不過也因此可以把設施玩到飽了呢！"
1006805-90 = "我和朋友去過的是離這裡有段距離的大型遊樂園……"
1006805-91 = "所以其實我也是第一次來這裡！#n是鈴美同學在巡邏時跟我介紹的！"
1006805-92 = "嗯～！要從哪玩起好呢？#n雖然不用排隊很開心……反而有點選擇困難了呢！"
1006805-93 = "[s9]「摩天輪上的景色很漂亮的唷！」\n[s10]「旋轉木馬真可愛！」"
1006805-96 = "……！#n這樣呀！！那麼……！！"
1006805-100 = "……嗯？"
1006805-101 = "呼呣，呣呣呣……"
1006805-102 = "[s11]「……澪紗？」\n[s12]「怎麼了嗎？」"
1006805-105 = "啊，不！什麼也沒有！#n啊哈哈……！"
1006805-109 = "走吧！！唔哦哦哦哦哦～～～！！"
1006805-116 = "遊樂場"
1006805-121 = "啊～玩得真開心。"
1006805-122 = "真的很謝謝老師空出了一整天的時間……！"
1006805-123 = "老實說，我本來還擔心會不會玩到一半就沒事做了，幸好比想像中還豐富呢！"
1006805-124 = "時間居然會過得這麼快！！#n……老師覺得怎麼樣呢？"
1006805-125 = "[s13]「非常開心哦。」\n[s14]「就是說啊，居然已經這麼晚了。真是時光飛逝。」"
1006805-128 = "耶嘿嘿……"
1006805-132 = "其實……那個……"
1006805-133 = "今天一整天都非常開心，可是……#n有件事我一直很在意……"
1006805-134 = "不管是咖啡廳還是遊戲中心……#n我都是打算要介紹給老師的，但老師卻都已經知道了……"
1006805-135 = "至於遊樂園，甚至是老師帶著我玩……"
1006805-136 = "不過仔細想想，這也沒什麼。#n畢竟老師除了我之外還會跟很多學生交流，知道很多地方也是理所當然的……"
1006805-137 = "所以……今天一整天，真的……"
1006805-138 = "有讓老師開心嗎，讓我覺得有點不安……"
1006805-139 = "是不是又浪費了老師寶貴的時間呢……"
1006805-140 = "……我經常會這樣。#n心想「這樣的話一定會很開心！」結果卻只是自作多情……"
1006805-141 = "所以……如果我今天也把自己的心情強加在老師身上了的話……我很抱歉。"
1006805-145 = "[ns15]「今天真是非常開心的一天呢。」\n[ns16]「是非常美妙的一天唷，謝謝你。」"
1006805-148 = "……咦？#n但是，老師……"
1006805-149 = "[ns17]「因為是第一次和澪紗去那些地方。」\n[ns18]「是段能了解澪紗喜好的寶貴時間唷。」"
1006805-152 = "[ns]「之後再一起來玩吧，澪紗。」"
1006805-156 = "老師……"
1006805-157 = "…………"
1006805-158 = "……是！！！"

[translation]
1006805-1 = "ขอบใจนะ เรอิสะ"
1006805-2 = "(คุณครูมุ่งหน้าไปยังทรีนิตี้ตามที่เรอิสะบอกมา)"
1006805-4 = "ถนนทรีนิตี้"
1006805-13 = "คุณครู~~~!!!"
1006805-14 = "[ns1] (เสียงนี้มันคุ้นๆ)\n[ns2] มองไปทางที่ได้ยินเสียง"
1006805-21 = "คุณครู...!!!"
1006805-27 = "อึก... ลืมหยุดไปเลยค่ะ ขอโทษนะคะ!"
1006805-28 = "[s3] \"ดูร่าเริงจังเลยนะ\"\n[s4] \"ชนกันแค่นี้ไม่เป็นไรหรอก\""
1006805-31 = "อ่า แหะๆๆ..."
1006805-32 = "อ๊ะ ไม่ได้สิ ทำตามใจตัวเองเหมือนเคยอีกแล้ว...! วันนี้ฉันไม่ได้มีเจตนาแบบนี้หรอกนะคะ!!"
1006805-33 = "วันนี้คือวันที่ฉันต้องตอบแทนค่ะ! นี่คือวันที่ฉันจะต้องตอบแทนความช่วยเหลือที่ได้จากคุณครูมายังไง#nล่ะคะ!"
1006805-34 = "ฉันบอกไปแล้วใช่มั้ยคะว่าวันนี้ให้ฉันจัดการเองน่ะค่ะ!!!"
1006805-35 = "ฉันเก็บหอมรอมริบเงินไว้ทีละนิดเพื่อวันนี้โดยเฉพาะเลยนะคะ! เพราะงั้นวันนี้ฉันจะเป็นคนเลี้ยงเองค่ะ!!"
1006805-36 = "คะ...?"
1006805-37 = "คุณครูจะจ่ายให้เองเหรอคะ? ไม่ค่ะ ถ้าอย่างนั้นก็ไม่ใช่วันตอบแทนของฉันสิคะ... ฉันต้องเลี้ยงสิ..."
1006805-38 = "ถ้าออกไปไหนกับครู ปกติต้องเป็นแบบนี้งั้นเหรอคะ? หืม...? ปะ... ปกติมีแบบนี้ด้วยเหรอ...?"
1006805-42 = "อะ... เอาเป็นว่าเราไปกันเถอะค่ะ! เราจะมาเสียเวลาอยู่ตรงนี้ไม่ได้ค่ะ! วันนี้เราจะไปกันหลายที่เลย"
1006805-47 = "ฮุฮุ ตั้งตารอได้เลยค่ะคุณครู! ฉันลิสต์เอาไว้แล้วว่ามีร้านเด็ดไหนที่ต้องไปบ้าง!!"
1006805-51 = "[ns] ตามเรอิสะไป"
1006805-53 = "ถนนร้านค้าทรีนิตี้"
1006805-54 = "แต่นแต๊น~! ที่แรกคือที่นี่ค่ะ!"
1006805-55 = "อ๊า~ ที่นี่เขาว่าสุดยอดเลยละค่ะ! ถ้ามีของหวานอะไร ย่านการค้านี้จะวางขายเร็วที่สุดในทรีนิตี้เลยค่ะ!"
1006805-56 = "ถ้าจะหาเมนูใหม่ รับรองว่าไม่มีที่ไหนดีกว่าที่นี่แล้วค่ะ! ผ่านโค้งนี้ไป จะเจอ <คาเฟ่มิลเฟย> ชื่อดัง#nด้วยนะคะ!!"
1006805-57 = "อ้อ ร้านนี้ฉันไม่ได้หาข้อมูลมาเอง แต่เพื่อนๆ เคยชวนไปน่ะค่ะ แหะๆ..."
1006805-58 = "แล้วคุณครูเคยไปคาเฟ่มิลเฟยรึยังคะ?"
1006805-59 = "[s5] \"พอได้ยินมาบ้างน่ะ\"\n[s6] \"ครูไม่เคยไปกินเลย\""
1006805-62 = "โอ้ววว...! ต้องอย่างนี้สิคะ!!"
1006805-63 = "ถ้างั้นวันนี้ไปกับฉันนะคะ!!"
1006805-70 = "ร้านเกม"
1006805-71 = "แต่นแต๊น! ที่ต่อไปก็คือที่นี่ค่ะ!!"
1006805-72 = "ที่จริงแล้วที่นี่กว้างขวางและสนุกจนใช้เวลาทั้งวันได้เลยละค่ะ!"
1006805-76 = "จะสุ่มเพโรโร่ก็ได้ หรือว่าจะเล่นเกมฮิตเกิร์ลส์ก็ได้..."
1006805-77 = "อ้อ ถ้าเป็นฮิตเกิร์ลส์ละก็ บอกไว้ก่อนเลยว่าฉันเล่นได้เก่งกว่าที่เห็นอีกนะคะ! ฉันเพิ่งเริ่มเล่นได้ไม่นาน แต่ก็มีอัตราชนะเกือบถึงครึ่งเลยค่ะ!"
1006805-78 = "แล้วคุณครูล่ะคะ? มาลองเล่นด้วยกันมั้ยคะ?"
1006805-79 = "[s7] \"ครูขอคีบตุ๊กตาดีกว่า\"\n[s8] \"ครูน่ะเหรอ? เป็นเซียนฮิตเกิร์ลส์เลยละ\""
1006805-82 = "...!!!"
1006805-83 = "งั้นไปกันเลยค่ะ!!"
1006805-88 = "สวนสนุก"
1006805-89 = "ที่นี่คือสวนสนุกค่ะ! ทั้งที่เป็นสวนสนุกแต่ก็ไม่ได้มีผู้คนมามากสักเท่าไร แต่ฉันว่ายิ่งคนน้อยก็ยิ่งสนุก#nนะคะ!"
1006805-90 = "ที่จริงฉันกับเพื่อนๆ จะไปเล่นกันที่กว้างๆ และอยู่ไกลกว่านี้ค่ะ แต่ถ้าเราไปที่นั่น รูทท่องเที่ยววันนี้มัน#nก็จะรวนนิดหน่อย..."
1006805-91 = "ฉันเพิ่งเคยมาที่นี่เป็นครั้งแรกเลยค่ะ คุณสึซึมิบอกว่าเคยมาลาดตระเวนตรงนี้ ก็เลยแนะนำให้ฉันน่ะค่ะ"
1006805-92 = "อืม...! ไปขึ้นเครื่องเล่นอะไรกันดีคะ? อยากได้เครื่องที่ไม่ต้องต่อแถวรอจัง... แต่พอมีตัวเลือกเยอะแบบ#nนี้ก็เลือกไม่ถูกเลยนะคะ!"
1006805-93 = "[s9] \"ชิงช้าสวรรค์ที่นี่ก็ไม่เลวนะ\"\n[s10] \"ม้าหมุนที่นี่ก็น่าเล่นมากเลยนะ\""
1006805-96 = "งั้นเหรอคะ!! ถ้างั้นก็...!!"
1006805-100 = "...? อืม...?"
1006805-101 = "อืม อืมม..."
1006805-102 = "[s11] \"เรอิสะ...?\"\n[s12] \"เป็นอะไรเหรอ? คิดอะไรอยู่น่ะ?\""
1006805-105 = "อ๊ะ!? มะ... ไม่มีอะไรค่ะ! ฮ่าฮ่า!"
1006805-109 = "ไปกันเถอะค่ะ!! ยะโฮ่ววว!!"
1006805-116 = "สนามเด็กเล่น"
1006805-121 = "ฮื้มม~ สนุกจังเลย"
1006805-122 = "ที่จริงวันนี้ฉันเผื่อเวลาไว้ทั้งวัน ก็เลยแอบกังวลว่าถ้าคุณครูเบื่อขึ้นมาจะทำยังไงดี..."
1006805-123 = "แต่มีอะไรให้ทำมากกว่าที่คิดอีกนะคะ! แต่ละอย่างก็ใช้เวลาเยอะๆ ทั้งนั้นเลย"
1006805-124 = "เหมือนได้ใช้เวลาทั้งวันอย่างคุ้มค่าเลยค่ะ ดีจังเลยนะคะ! แล้วคุณครูล่ะคะ?"
1006805-125 = "[s13] \"ครูก็คิดเหมือนกันเลย\"\n[s14] \"น่าเสียดายที่เวลาผ่านไปเร็วเนอะ\""
1006805-128 = "ฮิฮิ..."
1006805-132 = "ที่จริง... ที่จริงแล้ว..."
1006805-133 = "วันนี้น่ะ... นอกจากการได้เล่นสนุกแล้ว ก็ยังมีเรื่อง... แบบนั้นด้วยนะคะ..."
1006805-134 = "ดีใจจังค่ะที่ฉันได้แนะนำทั้งคาเฟ่ ร้านเกม และที่อื่นให้คุณครูด้วย แต่ว่า... คุณครูก็รู้จักอยู่แล้วทั้งหมด#nเลยนะคะ"
1006805-135 = "อย่างสวนสนุก กลับเป็นฉันเองที่ยังไม่เคยไปมาก่อน..."
1006805-136 = "พอมาคิดดูแล้วมันก็ไม่แปลกเลย เพราะคุณครูเคยไปมาตั้งหลายที่ แล้วก็คอยช่วยเหลือนักเรียน#nมากมายในหลายๆ เรื่องด้วย"
1006805-137 = "เพราะงั้นฉันก็เลยคิดว่า..."
1006805-138 = "ถึงฉันจะตั้งใจแนะนำสถานที่ให้คุณครู แต่สุดท้ายแล้วก็ไม่ได้ทำให้วันนี้ของคุณครูพิเศษขึ้นมาสักเท่า#nไรเลย..."
1006805-139 = "และถ้าเป็นแบบนั้น ก็เหมือนว่าฉันเอาเวลาอันมีค่าของคุณครูมาเที่ยวเล่นตามใจเลยค่ะ..."
1006805-140 = "ปกติแล้วฉันชอบคิดแบบนี้น่ะค่ะ คิดว่า 'ถ้าทำแบบนี้ อีกฝ่ายจะต้องชอบแน่ๆ!' แต่ก็ไม่รู้ว่าอีกฝ่ายจะคิด#nเหมือนกันหรือเปล่า..."
1006805-141 = "วันนี้ก็เลยคิดว่าจะเป็นอย่างนั้นอีกแล้วหรือเปล่า... ถ้าเป็นอย่างนั้นก็ต้องขอโทษด้วยนะคะ"
1006805-145 = "[ns15] \"ไม่ต้องหรอก วันนี้เป็นวันพิเศษของครูเลย\"\n[ns16] \"ถึงครูจะเคยไปมาก่อนแล้วมันยังไงล่ะ\""
1006805-148 = "คะ...? แต่ว่า คุณครู..."
1006805-149 = "[ns17] \"ก็นี่เป็นครั้งแรกของเรอิสะไม่ใช่เหรอ\"\n[ns18] \"ทั้งหมดนี่มันเป็นครั้งแรกที่เราได้รู้จักกันในระหว่างนั้นนะ\""
1006805-152 = "[ns] \"เพราะงั้นไว้พาครูไปอีกนะ เรอิสะ\""
1006805-156 = "คุณครู..."
1006805-157 = "......"
1006805-158 = "ค่ะ...!!!"

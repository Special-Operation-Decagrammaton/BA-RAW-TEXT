[translation]
1005103-1 = "การแปรอักษรของหัวหน้าสุดร้อนแรง"
1005103-2 = "สนามกีฬาเลขที่ 12 มิลเลเนียม"
1005103-3 = "(หลังจากได้รับข้อความจากอุทาฮะ คุณครูมาที่สนามกีฬาตามที่สัญญาไว้ะ...)"
1005103-8 = "เชิญเลยคุณครู"
1005103-9 = "จู่ๆ ฉันขอให้มาช่วยแท้ๆ แต่ครูก็อุตส่าห์มา ขอบคุณนะคุณครู"
1005103-10 = "[s] \"ทำเสร็จเร็วมากเลยนะเนี่ย\""
1005103-11 = "อื้อ จู่ๆ ก็มีคำขอให้ช่วยสร้างอุปกรณ์เชียร์เข้ามาเยอะมากจนฉันเองก็ยังตกใจเลย"
1005103-12 = "ฉันคิดว่ากองเชียร์จะช่วยสนับสนุนได้แค่ในสนามแข่งกีฬาเท่านั้นซะอีก ไม่คิดเลยว่าจะมีคนที่ต้องการ#nความช่วยเหลือจากกองเชียร์อยู่เยอะแบบนี้"
1005103-13 = "ตั้งแต่พวกนักเรียนที่ลงสมัครเลือกตั้ง ไปจนถึงเจ้าของร้านราเม็งที่ขายไม่ค่อยดี..."
1005103-14 = "ตอนแรกที่ได้ยินว่าต้องการกองเชียร์ไปช่วยสนับสนุนในเรื่องชีวิตประจำวัน ฉันเองก็ไม่ค่อยเข้าใจ#nเท่าไรหรอก..."
1005103-15 = "แต่ว่าในชีวิตประจำวันที่ดูสงบสุขแบบนี้ ก็มีคนที่เผชิญกับความยากลำบาก และพยายามต่อสู้#nอย่างหนักเหมือนอยู่ในสนามรบเหมือนกันสินะ"
1005103-16 = "อีกอย่าง ถึงจะเป็นคำขอที่ฉันไม่เข้าใจก็เถอะ แต่คติพจน์ของชมรมวิศวกรรมของเราก็คือ เมื่อได้#nรับการไหว้วานมาแล้ว ก็ต้องทำให้สุดความสามารถ"
1005103-17 = "คราวนี้ฉันก็พยายามเต็มที่เพื่อทำอุปกรณ์เชียร์ขึ้นมาน่ะ"
1005103-18 = "[s1] \"ทำไมถึงมาทดลองที่สนามกีฬาล่ะ...?\"\n[s2] \"ทำไมถึงใส่เสื้อกักคุรันล่ะ...?\""
1005103-19 = "อืม... ถ้าลองทดสอบที่ห้องปฏิบัติการ ก็จะลดปัญหาเรื่องการต้องขนย้ายอุปกรณ์ และเวลาเกิดปัญหา#nอะไรก็สามารถแก้ไขได้ง่ายกว่าก็จริง..."
1005103-20 = "ฉันคิดว่า \"การเชียร์\" ก็ควรจะมาทดสอบที่สนามกีฬาน่ะ..."
1005103-21 = "คือว่า... ไหนๆ ก็จะทดสอบ \"การเชียร์\" แล้ว เลยคิดว่าน่าจะใส่ชุดเชียร์มาด้วยน่ะ..."
1005103-22 = "แล้วชุดกักคุรันก็ซักเสร็จพอดีด้วย"
1005103-23 = "เพราะการเชียร์ที่น่าพอใจน่ะ มันวัดเป็นตัวเลขได้ยากมากๆ"
1005103-24 = "ฉันเลยอยากให้คุณครูคิดว่าตัวเองเป็นผู้ชมที่มาที่สนามกีฬา แล้วบอกความรู้สึกเกี่ยวกับการเชียร์นี้มา#nหน่อยน่ะ"
1005103-25 = "[s3] \"พูดแบบนั้นยิ่งทำให้ตั้งตารอใหญ่เลยน้า\"\n[s4] \"เตรียมการเชียร์แบบไหนไว้เหรอ?\""
1005103-26 = "อืม... อย่างที่เคยบอกไปว่าเป็นงานที่ลูกค้าขอร้องมา เพราะงั้นคงจะทำแบบธรรมดาๆ ไม่ได้ และฉันก็อยากลองทำอุปกรณ์เชียร์แบบใหม่ๆ ดูด้วย"
1005103-27 = "อืม... อย่างที่เคยบอกไปว่าเป็นงานที่ลูกค้าขอร้องมา เพราะงั้นคงจะทำแบบธรรมดาๆ ไม่ได้ และฉันก็อยากลองทำอุปกรณ์เชียร์แบบใหม่ๆ ดูด้วย"
1005103-28 = "ตอนที่หาข้อมูลอยู่ในห้องสมุด ฉันบังเอิญไปเจอวิธีเชียร์แบบหนึ่งที่ตอนนี้ไม่ค่อยใช้กันแล้ว"
1005103-29 = "นั่นคือ... \"การแปรอักษร\" น่ะ"
1005103-30 = "[s] \"แปรอักษรเหรอ?\""
1005103-31 = "อื้อ การแปรอักษรเป็นวิธีเชียร์ที่ใช้คนหลายๆ คนมารวมกลุ่มเชียร์ โดยการสลับป้ายสีต่างๆ ทำให้#nเกิดเป็นรูปต่างๆ ขึ้นมา"
1005103-32 = "ปกติแล้วจะใช้แค่สีเดียว แต่ถ้ากลุ่มเชียร์มีความสามารถมากพอก็อาจจะคิดรูปแบบการสลับป้ายออก#nมาให้คล้ายๆ แอนิเมชันได้"
1005103-33 = "แต่ว่าประสิทธิภาพของการแปรอักษรก็ยังเทียบกับการใช้ป้ายแอลอีดีไม่ได้ แถมต้องใช้คนเยอะ ปัจจุบันเลยไม่ค่อยใช้วิธีเชียร์แบบนี้แล้ว"
1005103-34 = "การเล่นแปรอักษรล่าสุดก็คงเป็นที่เรดวินเทอร์ เมื่อสักสิบปีก่อนน่ะ แต่เหมือนว่าจะยกเลิกไป เพราะมีนักเรียนออกมาประท้วงแล้วก็ก่อการปฎิวัติน่ะ"
1005103-35 = "[s] \"มีเรื่องแบบนี้ด้วยสินะ...\""
1005103-36 = "แต่ว่าถ้าใช้เทคโนโลยีของชมรมวิศวกรรมละก็ เราจะแปรอักษรได้โดยไม่ต้องใช้คนเลย"
1005103-42 = "เอาละ คุณครู ช่วยไปนั่งที่อัฒจันทร์ตรงด้านโน้นหน่อยนะ"
1005103-43 = "ฉันจะแสดงการแปรอักษรของมิลเลเนียมที่คิดค้นขึ้นใหม่จากเทคโนโลยีของชมรมวิศวกรรมให้ชมเอง!"
1005103-46 = "― ฮูเร่ ฮูเร่! มิลเลเนียม![wa:2340] "
1005103-49 = "― สู้เค้า! ชนะให้ได้! มิลเลเนียม![wa:560] "
1005103-52 = "― ฮุฮุ...เป็นไงบ้าง คุณครู?[wa:1670] "
1005103-54 = "― เป็นภาพที่สุดยอดมากเลยใช่มั้ย?"
1005103-57 = "― การแปรอักษรครั้งนี้น่ะ เราใช้หุ่นยนต์[wa:320] "
1005103-59 = "― ที่ติดตั้งอุปกรณ์บลูทูธรุ่นใหม่ล่าสุดไว้ยังไงล่ะ[wa:10] "
1005103-62 = "― ถึงจะเป็นข้อความที่ซับซ้อน"
1005103-64 = "― ก็สามารถแปรอักษรออกมาได้อย่างสมบูรณ์[wa:10] "
1005103-67 = "― หืม...?[wa:10] "
1005103-69 = "― ถ้าใช้หุ่นยนต์ในการแปรอักษรแบบนี้[wa:330] "
1005103-72 = "― ติดตั้งป้ายแอลอีดีแทน..."
1005103-74 = "― น่าจะดูง่ายกว่างั้นเหรอ?"
1005103-77 = "― คุณครู...ช่วยอย่าพูดอะไรที่มันดูไร้ความโรแมนติกได้มั้ย?[wa:660] "
1005103-79 = "― ภาพวิวที่สมบูรณ์แบบจากป้ายอนาล็อกพวกนี้[wa:170] "
1005103-82 = "― มันมีความมุ่งมั่นและความรู้สึก..."
1005103-84 = "― ที่ป้ายแอลอีดีเทียบไม่ได้อยู่ด้วยนะ[wa:630] "
1005103-87 = "― ความโรแมนติกที่ทำให้ใจเต้นแรง[wa:1230] "
1005103-89 = "― มันไม่ใช่สิ่งที่สร้างออกมาได้ง่ายๆ หรอกนะ[wa:10] "
1005103-92 = "เอาละ... ถ้างั้นมาทดลองฟังก์ชันสุดท้ายกันเลยมั้ย?"
1005103-93 = "ถ้าพูดถึงตัวแปรที่สำคัญของการแปรอักษร ก็คงเป็นระยะเวลาของการเปิดแผ่นป้ายแต่ละแผ่น..."
1005103-94 = "ปกติการแปรอักษรแบบใช้แรงคนน่ะ การคำนวณเวลาเป็นเรื่องที่ยากมากนะ ถึงจะเป็นการสลับ#nแผ่นป้ายอย่างช้าๆ ให้เข้ากับเพลงเชียร์ก็เถอะ..."
1005103-95 = "ถ้าใช้อุปกรณ์แชร์บลูทูธละก็ ตามทฤษฎีแล้วจะแสดงภาพวิดีโอได้ด้วยความเร็ว 60 เฟรมต่อวินาที"
1005103-99 = "ถ้างั้นมาลองกันที่ความเร็วสูงสุดเลยแล้วกัน... ลุยละนะ!"
1005103-109 = "เอ๋...? แค่เฟรมเดียวก็รับไม่ไหวจนระเบิดเลยเหรอ?"
1005103-110 = "ว่าแล้วเชียว การเคลื่อนไหวด้วยความเร็วแสงแบบนี้ พวกข้อต่อของหุ่นยนต์ก็ยังรับไม่ไหวสินะ"
1005103-111 = "น่าเสียดายจัง..."
1005103-112 = "[s] \"แต่ครูว่าสนุกดีนะ\""
1005103-113 = "คุณครูพูดถูก... ตอนระเบิดนี่ดูสนุกมากทีเดียว"
1005103-114 = "อีกอย่าง ถือว่าเป็นโอกาสทดสอบอัลกอริทึมที่ใช้ควบคุมหุ่นยนต์ไร้สายพร้อมกันด้วย..."
1005103-115 = "ไมสเตอร์ที่ยอดเยี่ยมน่ะ จะได้เรียนรู้จากความผิดพลาดมากกว่าความสำเร็จ"
1005103-116 = "แต่ถ้าจะลดแรงเสียดทานที่ส่งผลกระทบต่อส่วนข้อต่อ ควรปรับปรุงด้วยวิธีไหนดีนะ?"
1005103-117 = "ถ้าลดความเร็วในการแสดงวิดีโอลงเหลือ 30 เฟรมจะดีขึ้นมั้ยนะ?"
1005103-121 = "[ns] \"ครูว่าอาจไม่เกี่ยวกับเรื่องเฟรมเรทก็ได้นะ...\""

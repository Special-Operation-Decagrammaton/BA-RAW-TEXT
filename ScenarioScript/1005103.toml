[translation]
1005103-1 = "#title;불타는 단장의 매스게임"
1005103-2 = "#place;밀레니엄 제12 운동장"
1005103-3 = "#na;(우타하의 연락을 받고 약속한 운동장으로 나왔다.)"
1005103-4 = "#st;[0,0];instant;1;"
1005103-5 = "#clearST"
1005103-6 = "#wait;1800"
1005103-7 = "3;우타하 응원단ND;00\n#3;a\n#wait;1500"
1005103-8 = "3;우타하 응원단ND;03;어서 와, 선생님.\n#3;em;[반응]"
1005103-9 = "3;우타하 응원단ND;00;갑작스러운 요청이었는데 흔쾌히 응해줘서 고마워.\n#3;greeting"
1005103-10 = "[s] \"꽤 서둘러서 작업했네.\""
1005103-11 = "3;우타하 응원단ND;02;응. 갑작스럽게 응원 도구 제작 요청이 몰려와서 나도 깜짝 놀랐어."
1005103-12 = "3;우타하 응원단ND;00;응원단은 스포츠 경기에서만 활약한다고 생각했는데, 생각 외로 응원단의 도움을 필요로 하는 사람이 많았던 모양이야."
1005103-13 = "3;우타하 응원단ND;99;선거를 앞둔 학생 후보부터, 장사가 안되는 라멘집의 사장까지……\n#3;em;…"
1005103-14 = "3;우타하 응원단ND;01;경쟁과 상관없는 일상에서도 응원이 필요하다는 말이 처음에는 잘 이해가 되진 않았지만……"
1005103-15 = "3;우타하 응원단ND;03;언뜻 평화로워 보이는 이 일상의 풍경도, 누군가에게는 삶의 무게를 짊어지고 치열하게 싸워야 하는 전장의 풍경이겠지."
1005103-16 = "3;우타하 응원단ND;00;게다가 이해할 수 없는 부탁이라 하더라도 의뢰를 받았으면 언제나 최선을 다하는 것이 우리 엔지니어부의 모토니까."
1005103-17 = "3;우타하 응원단ND;07;이번에도 최선을 다해 응원용 도구를 만들어 보았어.\n#3;em;[반짝]"
1005103-18 = "[s1] \"그런데 어째서 운동장에서 시연을……?\"\n[s2] \"그런데 왜 다시 가쿠란을……?\""
1005103-19 = "3;우타하 응원단ND;02;음, 물론 작업실에서 시연을 하면 물건을 옮기는 수고도 덜고, 문제가 생겼을 때 대응하기도 더 용이하겠지만…….\n#3;em;…"
1005103-20 = "3;우타하 응원단ND;99;일단은 '응원'인 만큼 경기장에서 시연을 하는 편이 느낌이 날 것 같아서."
1005103-21 = "3;우타하 응원단ND;00;그게…… 일단은 '응원'인 만큼 응원단 복장을 하고 시연을 하는 편이 느낌이 날 것 같아서.\n#3;em;[반응]"
1005103-22 = "3;우타하 응원단ND;03;게다가 가쿠란의 세탁도 막 끝낸 참이었고."
1005103-23 = "3;우타하 응원단ND;00;만족스러운 응원이란 결국 수치화하기 어려운 감성의 영역이니까."
1005103-24 = "3;우타하 응원단ND;07;선생님이 경기장에 찾아온 관객이라 생각하고 이 응원이 어떻게 느껴지는지 감상을 들려주었으면 좋겠어."
1005103-25 = "[s3] \"그렇게 말해주니 기대가 되네.\"\n[s4] \"어떤 종류의 응원을 준비했어?\""
1005103-26 = "3;우타하 응원단ND;02;음, 일단 아까도 말했지만 모처럼 받은 의뢰이니, 평범하지 않은— 참신한 방식의 응원 도구를 만들어 보고 싶었거든."
1005103-27 = "3;우타하 응원단ND;02;음, 일단 아까도 말했지만 모처럼 받은 의뢰이니, 평범하지 않은— 참신한 방식의 응원 도구를 만들어 보고 싶었거든."
1005103-28 = "3;우타하 응원단ND;00;그래서 밀레니엄의 도서관을 열람하던 중에 현대에는 잘 쓰이지 않는 응원 방법을 하나 알게 됐어."
1005103-29 = "3;우타하 응원단ND;03;그건 바로…… 매스게임이야.\n#3;em;[반응]"
1005103-30 = "[s] \"매스게임?\""
1005103-31 = "3;우타하 응원단ND;07;응. 매스게임은 여러 사람이 집단으로 연출을 하는 응원법인데, 다양한 색의 카드를 동시에 펼쳐서 거대한 그림을 그리는 카드 섹션이 대표적이야."
1005103-32 = "3;우타하 응원단ND;99;보통은 단색의 글씨나 도안을 보여주는 게 고작이지만, 응원단의 숙련도에 따라 다양한 색의 플립 북을 넘기며 애니메이션 같은 효과를 연출하는 것도 가능하지.\n#3;em;…"
1005103-33 = "3;우타하 응원단ND;02;하지만 전광판에 비해 효율이 너무 떨어지고, 사람의 노력이 많이 들기 때문에 현대에는 거의 쓰이지 않는 모양이야."
1005103-34 = "3;우타하 응원단ND;01;……가장 최근의 매스게임은 십 년 전 붉은겨울 학원에서 열린 모양인데, 그마저도 학생들이 반발하며 쿠데타를 일으켜서 중도에 폐지된 모양이더라구."
1005103-35 = "[s] \"……그런 일도 있었구나.\""
1005103-36 = "3;우타하 응원단ND;03;하지만 엔지니어부의 기술력을 이용한다면 사람의 힘을 빌리지 않고도 매스게임을 할 수 있지.\n#3;em;[반응]"

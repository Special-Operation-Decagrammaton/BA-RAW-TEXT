[translation]
1005103-1 = "A Captain's Moving Performance"
1005103-2 = "12th Millennium Stadium"
1005103-3 = "After receiving a message from Utaha, I went to the field where we were supposed to meet."
1005103-8 = "Hey, Sensei."
1005103-9 = "I know it was short notice. Thanks for coming out."
1005103-10 = "[s] \"You work fast.\""
1005103-11 = "Thanks. I was honestly caught off guard by the sudden requests to make cheer-specific bots."
1005103-12 = "I thought cheering was only for sports events, but I guess everyone could use a good cheer."
1005103-13 = "From election candidate hopefuls hand-wringing about messaging to ramen restaurant owners worrying about slow business..."
1005103-14 = "At first, I didn't understand what good a cheer could do for these real-life situations..."
1005103-15 = "But life is actually really hard, isn't it? Every day comes with its own burdens that people need to overcome."
1005103-16 = "Moreover, the motto (WIP) of the Engineering Department is that a request received will be a design achieved...even if we don't understand the request."
1005103-17 = "So I'll do my best in fulfilling these cheery commissions."
1005103-18 = "[s1] \"But why the field again...?\"\n[s2] \"But why the cheer outfit again...?\""
1005103-19 = "Well, sure, the workshop would have been more convenient, and it would have been easier to fix any problems..."
1005103-20 = "But since this is about cheering, using the field is almost like a...field test."
1005103-21 = "And as for what I'm wearing... I thought it would make more sense to wear the cheer squad outfit for the demonstration."
1005103-22 = "And I finally got it cleaned."
1005103-23 = "It would be irrational to assume cheering is perfected by logic instead of emotion."
1005103-24 = "As for you, just imagine you're one of the spectators and give me your impression of how the cheering makes you feel."
1005103-25 = "[s3] \"Sounds exciting.\"\n[s4] \"What cheer did you go with?\""
1005103-26 = "As I said before, since this is a special request, it deserves special cheering equipment."
1005103-27 = "As I said before, since this is a special request, it deserves special cheering equipment."
1005103-28 = "And, while browsing through the library, I came across a cheering method not often used these days."
1005103-29 = "It's...a mass-movement cheering performance."
1005103-30 = "[s] \"A mass-movement cheering performance?\""
1005103-31 = "Yes. It requires perfect group synchronization. The cheerleaders carry large signs together to create a huge, moving picture by flipping the signs at the same time. That's what most are familiar with."
1005103-32 = "Usually it's just a single-colored design, but if the cheerleaders are good enough, it's possible to create an animation-like effect by flipping through various colors."
1005103-33 = "But compared to digital billboards, it's time-consuming to practice and vulnerable to even simple mistakes, so it's not used much anymore."
1005103-34 = "The last time a mass-movement cheering performance was held at Red Winter Academy was ten years ago, but it was abolished after getting caught up in a purge."
1005103-35 = "[s] \"That...makes sense?\""
1005103-36 = "So, my plan is to use engineering to create a mass-movement cheering performance delivered with machine precision."
1005103-42 = "Now, Sensei. Sit over there and act like a spectator."
1005103-43 = "I'm going to show you exactly what happens when the Engineering Department combines passionate cheers with excellent engineers!"
1005103-46 = "― Millennium! Millennium! Let's go, here we come![wa:1420] "
1005103-49 = "― Strike 'em hard, strike 'em dumb, let's go, Millennium![wa:10] "
1005103-52 = "― Heh heh, what do you think, Sensei?[wa:1270] "
1005103-54 = "― Simply amazing, right?"
1005103-57 = "― This whole cheer is performed by[wa:520] "
1005103-59 = "― machines directed by wireless signals.[wa:80] "
1005103-62 = "― Even the most complicated routine"
1005103-64 = "― can be performed perfectly.[wa:10] "
1005103-67 = "― ...What?[wa:10] "
1005103-69 = "― If I'm going to use machines anyway,[wa:210] "
1005103-72 = "― wouldn't it be easier to just"
1005103-74 = "― use a digital billboard?"
1005103-77 = "― Sensei! Please don't squeeze the romance out of performance![wa:460] "
1005103-79 = "― Analog panels moving in perfect sync with each other,[wa:10] "
1005103-82 = "― will give the cheer"
1005103-84 = "― a sense of emotion and kinetic energy that a digital billboard could never convey.[wa:10] "
1005103-87 = "― Making someone's heart beat faster[wa:1030] "
1005103-89 = "― isn't something to be optimized.[wa:10] "
1005103-92 = "...Okay, time to test the last feature!"
1005103-93 = "Of course, the highlight of a mass-movement cheering performance is tricking the eye into thinking it's looking at a single moving picture instead of at a series of different signs next to each other."
1005103-94 = "The faster you move the signs, the harder it is for people to get the timing right, so they usually go at a slow pace..."
1005103-95 = "But with this machine-driven marvel, I should be able to mimic sixty frames per second video!"
1005103-99 = "But only when I shift into...maximum overdrive!"
1005103-109 = "...What? They exploded? Not even one frame before they went kaboom?"
1005103-110 = "Maybe I shouldn't have tried to tune the movement speed to Mach 1..."
1005103-111 = "This is my second-least favorite type of explosion..."
1005103-112 = "[s] \"It was fun, though.\""
1005103-113 = "You're right. The explosion was quite fun, even if a bit disappointing. Oh, and the cheer too."
1005103-114 = "Plus, it was a good opportunity to test the performance-directing algorithms."
1005103-115 = "A good meister learns one thing from success and ten things from failure."
1005103-116 = "That being said, I need to modify these things so they only explode when I want them to..."
1005103-117 = "Maybe if I reduced the frame rate I'm trying to mimic to just thirty?"
1005103-121 = "[ns] \"I don't think frame rate is the speed you should be worrying about...\""

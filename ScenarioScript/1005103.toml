1005103-93 = "3;우타하 응원단ND;00;역시 매스게임의 정수라 하면, 시차를 두고 조금씩 연출하는 카드섹션 애니메이션이지."
1005103-94 = "3;우타하 응원단ND;07;보통 사람이 하는 카드섹션 연출은 타이밍을 잡기가 어려워서, 응원가에 맞춘 느린 속도로 이미지를 보여주지만……"

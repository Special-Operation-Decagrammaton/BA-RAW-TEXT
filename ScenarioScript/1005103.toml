[translation]
1005103-1 = "熱情的團體操"
1005103-2 = "千年．第12操場"
1005103-3 = "（到達了詠葉指定的運動場）"
1005103-8 = "辛苦了，老師。"
1005103-9 = "謝謝你答應這突然的請求。"
1005103-10 = "[s]「因為我感受到了詠葉的努力。」"
1005103-11 = "嗯。突然收到製作應援機器人的委託，我也嚇了一跳。"
1005103-12 = "本以為應援團只有運動競賽時才需要……#n不過需要鼓舞的人似乎比想像中還多。"
1005103-13 = "從「想競選會長的學生」到「為生意煩惱的拉麵店老闆」……"
1005103-14 = "「與比賽無關的日常生活也需要應援」……#n雖然我一開始無法理解……"
1005103-15 = "但是乍看之下很和平的日常生活，對某些人來說同時也是戰場。#n有許多在奮鬥中的人希望能得到應援。"
1005103-16 = "就算真的無法理解，只要接下委託就要全力以赴──這是我們工程師部的座右銘！"
1005103-17 = "好了，差不多該展示應援機器人了。"
1005103-18 = "[s1]「話說，為何選在操場上……？」\n[s2]「為何穿著立領學生服……？」"
1005103-19 = "選在工作室的話確實比較輕鬆。#n既不需要搬運器材，出了問題也能馬上解決……"
1005103-20 = "但既然是「應援」，還是在操場上會更有感覺。"
1005103-21 = "呵呵……既然是「應援」，那肯定要穿立領學生服吧？"
1005103-22 = "而且，今天正好把它洗乾淨了……"
1005103-23 = "是否真的有將應援傳達到心坎裡屬於感性的領域，難以將成果量化。"
1005103-24 = "所以，希望老師能把作為觀眾的感受告訴我。"
1005103-25 = "[s3]「感覺很有趣呢。」\n[s4]「會出現什麼樣的應援呢？」"
1005103-26 = "呵呵，畢竟是難得的委託，普通的應援肯定沒意思吧？"
1005103-27 = "呵呵，畢竟是難得的委託，普通的應援肯定沒意思吧？"
1005103-28 = "所以我去千年圖書館查資料，發現了一個現代不太使用的加油方法。"
1005103-29 = "那就是……團體操。"
1005103-30 = "[s]「團體操？」"
1005103-31 = "團體操是一種集體表演。每個人都舉著帶有顏色的卡片，畫出巨幅的圖案。"
1005103-32 = "通常只會用單一顏色來表現文字與圖案……#n\n但隨著應援團熟練度的增加，也能呈現各種顏色的翻頁動畫，可說是充滿了可能性。"
1005103-33 = "不過因為效率低於電子看板，又需要大量的人力成本，所以漸漸就被淘汰了。"
1005103-34 = "……根據書上的紀載，最近一次團體操是10年前在赤冬聯邦學園進行的。#n不過之後因為學生的反對和政變遭到了廢除。"
1005103-35 = "[s]「……原來曾發生過這種事。」"
1005103-36 = "沒錯。不過只要發揮工程師部的技術力，就算不借助人力也能進行團體操。"
1005103-42 = "來，老師，請坐在那邊的觀眾席。"
1005103-43 = "接下來，我們將以躍動的機器人重新詮釋千年的團體操！"
1005103-46 = "― 加油！加油！千年！[wa:2940] "
1005103-49 = "― 上吧！上吧！獲勝吧！ 千年！[wa:1240] "
1005103-52 = "― 呵呵……怎麼樣，老師？[wa:2230] "
1005103-54 = "― 不覺得眼前的景象很壯觀嗎？"
1005103-57 = "― 這個團體操，使用了搭載新型藍牙裝置的[wa:1080] "
1005103-59 = "― 機器人，[wa:1440] "
1005103-62 = "― 所以不管是多複雜的編舞"
1005103-64 = "― 都能完美演繹。[wa:580] "
1005103-67 = "― ……嗯？[wa:100] "
1005103-69 = "― 你說與其在表演中使用機器，[wa:1130] "
1005103-72 = "― 直接設置螢幕"
1005103-74 = "― 不是更有效率？"
1005103-77 = "― 老師，別說那種缺乏浪漫的話。[wa:2300] "
1005103-79 = "― 由類比的面板同時運動完成的景象，[wa:1090] "
1005103-82 = "― 有著螢幕"
1005103-84 = "― 無法比擬的震撼力與感動唷。[wa:1510] "
1005103-87 = "― 歸根究柢，能讓內心瞬間激動的浪漫，[wa:1710] "
1005103-89 = "― 本來就和「效率」相去甚遠。[wa:570] "
1005103-92 = "……好，終於要展示最後的功能了。"
1005103-93 = "不管怎麼說，團體操的精妙之處在於改變圖案過程中的動畫表現。"
1005103-94 = "由於過去都以人力執行而難以互相配合，只能搭配緩慢的應援歌曲。"
1005103-95 = "但如果使用最新的無線技術進行同步，理論上能用每秒60幀的速度顯示圖像……"
1005103-99 = "好，那就……上吧！"
1005103-109 = "……咦？怎麼才第1幀就爆炸了？"
1005103-110 = "以音速移動的話，關節果然無法承受嗎……"
1005103-111 = "好不容易才準備好的……真可惜。"
1005103-112 = "[s]「不過是個很有趣的實驗呢。」"
1005103-113 = "……是啊。能開心就很滿足了。"
1005103-114 = "託老師的福，今天才有機會嘗試對機器人使用無線技術的同步控制演算法。"
1005103-115 = "比起成功，優秀的巨匠往往能從失敗中學習到更多。"
1005103-116 = "問題是如果想減緩關節的衝擊力道……該改造哪裡呢……"
1005103-117 = "把影像的輸出速度降低至30幀能解決嗎？"
1005103-121 = "[ns]「應該不是幀數的問題吧……？」"

[translation]
1012806-1 = "冬的空間"
1012806-2 = "（總之先來到了冬指定的地方……）"
1012806-6 = "如果是狂獵學生的展覽會，確實值得一看。"
1012806-7 = "真令人期待，呵呵。"
1012806-9 = "（來訪的客人比想像中還多）"
1012806-10 = "（接著看見了展覽會的海報……）"
1012806-11 = "[ns]「作家若狹冬的媒體藝術個展……？」"
1012806-12 = "沒錯，正是如此！"
1012806-14 = "這裡就是我的個展展覽會場！"
1012806-15 = "歡迎老師來到屬於我的世界！"
1012806-16 = "[s]「……剛才的模樣完全是個藝術家呢，室長！」"
1012806-17 = "嘿嘿，是嗎？"
1012806-18 = "……不對不對！#n我本來就是狂獵藝術學院的學生好嗎，老師！"
1012806-19 = "至少今天，可以請老師不要把我當成特殊交易部的營業室長……"
1012806-20 = "而是當成一名藝術家來看待嗎？"
1012806-21 = "[s1]「唔嗯……那今天該怎麼稱呼你呢？」\n[s2]「畫家嗎？還是作家？」"
1012806-24 = "這，這個嘛……"
1012806-25 = "……比如冬醬之類的？"
1012806-26 = "總，總之！先一起進去看看吧？"
1012806-27 = "這可是能由作者本人親自導覽的絕佳機會哦！"
1012806-29 = "（展覽館內非常昏暗）"
1012806-30 = "（只有在各處投放媒體藝術的螢幕散發著光芒）"
1012806-31 = "先從這件作品開始吧。"
1012806-32 = "如果將整場展覽比喻成一部詩集……"
1012806-33 = "那麼這件作品就相當於是它的序詩哦。"
1012806-34 = "[s]「意思是把所有參展作品的概念……都濃縮了進去嗎？」"
1012806-35 = "完全正確！"
1012806-36 = "所以無論其他作品的觀賞順序如何……"
1012806-37 = "為了讓這件作品最先映入眼簾，我特意將它展示在了入口處。"
1012806-38 = "[s]「對作品的擺放順序也下了很多功夫呢。」"
1012806-39 = "當然。作品的位置和角度、燈光的亮度與色彩、螢幕的明暗及動線的設計……"
1012806-40 = "構成展覽的每個元素都蘊含著藝術家的意圖。"
1012806-41 = "那麼，我們繼續往下看吧？"
1012806-48 = "（就在逐一欣賞冬的作品時……）"
1012806-50 = "接著我來說明一下這個物件的主題……"
1012806-55 = "……啊哈，看來老師差不多餓了吧？"
1012806-56 = "[s]「沒有，剛才的聲音是從冬醬那邊傳來的……」"
1012806-57 = "呵呵，真拿你沒辦法。"
1012806-58 = "身為一名藝術家，可不能對VIP觀眾的飢餓視而不見呢。"
1012806-59 = "[s]「不是我啦……！」"
1012806-60 = "噓。"
1012806-61 = "先跟我來吧，老．師？"
1012806-66 = "（就這樣被冬帶到的地方是……）"
1012806-71 = "（展覽室角落隱藏的門後）"
1012806-72 = "[ns]「這，這裡是……？」"
1012806-75 = "― [log=후유]這裡，是螢幕的另一邊。[/log][wa:2090] "
1012806-77 = "― [log=후유]也就是舞台後方……[/log][wa:1490] "
1012806-80 = "― [log=후유]只有作家才能進出的空間。[/log][wa:820] "
1012806-83 = "― [log=후유]進入這裡唯一的方法……[/log]"
1012806-85 = "― [log=후유]就是向身為作家的我取得許可。[/log][wa:1530] "
1012806-88 = "― [log=후유]所以，現在這裡──[/log][wa:2230] "
1012806-90 = "― [log=후유]就是老師和我，兩人……獨處的……[/log][wa:5450] "
1012806-93 = "― [log=후유]等等！不對不對不對！[/log][wa:860] "
1012806-95 = "― [log=후유]我，我不是那個意思！[/log]"
1012806-98 = "― [log=후유]總之！[/log]"
1012806-100 = "― [log=후유]我帶了做好的便當過來……[/log]"
1012806-103 = "[ns]「冬親手做的便當！？」"
1012806-104 = "― [log=후유]那個，如果，不介意的話……[/log][wa:3060] "
1012806-106 = "― [log=후유]……要一起吃嗎？[/log][wa:2960] "
1012806-109 = "（之後一起吃了便當）"
1012806-110 = "（冬說自己擅長料理，果然是真的）"

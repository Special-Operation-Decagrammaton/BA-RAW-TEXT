[translation]
1012806-1 = "Fuyu's Space"
1012806-2 = "I went to the place Fuyu mentioned..."
1012806-6 = "Wildhunt students always make such interesting art."
1012806-7 = "Fufu! We're in for a treat!"
1012806-9 = "There was quite a crowd."
1012806-10 = "Then I saw a poster for an exhibition."
1012806-11 = "[ns] \"Wakasa Fuyu's Media Art Exhibition...?\""
1012806-12 = "You read right! A solo feature."
1012806-14 = "This is a private exhibition hall, dedicated to immersion into MY world."
1012806-15 = "I'd like to escort you in, if you'd please."
1012806-16 = "[s] \"...Sales Manager, you're sounding like a real artist!\""
1012806-17 = "Heehee, you think?"
1012806-18 = "Well, I didn't get into Wildhunt by sheer coincidence, Sensei!"
1012806-19 = "So, at least for today, don't think of me as the Free Trade Cartel's exemplary Sales Manager..."
1012806-20 = "...but think of me as an artist. Can you do that, Sensei?"
1012806-21 = "[s1] \"Hm, then what should I call you?\"\n[s2] \"Virtuoso? Producer?\""
1012806-24 = "Um, well..."
1012806-25 = "...Just Fuyu, I guess?"
1012806-26 = "Anyway! Shall we head inside?"
1012806-27 = "Not everyone gets an artist to escort them around her exhibition, you know!"
1012806-29 = "The exhibition hall was very dark."
1012806-30 = "It was only lit by screens projecting media art."
1012806-31 = "Let's start here, shall we?"
1012806-32 = "If we were to think of this exhibition as a collection of poems..."
1012806-33 = "...this work can be considered a prologue."
1012806-34 = "[s] \"So, it's a primer for what we'll be seeing as a whole? Right?\""
1012806-35 = "Precisely!"
1012806-36 = "That's why I put this at the entrance. It's a bit of a maze in here, but, regardless..."
1012806-37 = "...you'll see this piece first!"
1012806-38 = "[s] \"So, you also think about the order of the pieces?\""
1012806-39 = "Absolutely. I think of the pieces' location, angle, luminosity, hue, brightness, even pathing structure..."
1012806-40 = "Every element in an exhibition should carry the artist's intent."
1012806-41 = "Now then, shall we continue?"
1012806-48 = "We gradually walked through and experienced Fuyu's works."
1012806-50 = "...And so, you might be finding a recurring motif..."
1012806-55 = "...Oh, are you getting hungry, Sensei?"
1012806-56 = "[s] \"Wasn't that YOUR stomach growling, Fuyu?\""
1012806-57 = "Fufu, I suppose we must stop. "
1012806-58 = "As an artist, I can't ignore my VIP's ravenous and loud call of hunger."
1012806-59 = "[s] \"But it wasn't me...!\""
1012806-60 = "Shh."
1012806-61 = "Just follow me, okay? Sen...sei?"
1012806-66 = "And Fuyu took me through several doors..."
1012806-71 = "...until we were hidden backstage in a corner of the exhibition."
1012806-72 = "[ns] \"Th-This place is...?\""
1012806-75 = "― [log=후유]We are behind the screens.[/log][wa:1490] "
1012806-77 = "― [log=후유]Thus, behind the artwork...[/log][wa:770] "
1012806-80 = "― [log=후유]A place where only the artist may enter.[/log][wa:10] "
1012806-83 = "― [log=후유]The only way to enter this place...[/log]"
1012806-85 = "― [log=후유]is to get permission from me, the artist.[/log][wa:450] "
1012806-88 = "― [log=후유]So, right now, in this place...[/log][wa:1350] "
1012806-90 = "― [log=후유]There's only you and...me...[/log][wa:4970] "
1012806-93 = "― [log=후유]Uh no no no no![/log][wa:660] "
1012806-95 = "― [log=후유]Th-That's not what I meant...![/log]"
1012806-98 = "― [log=후유]Anyway![/log]"
1012806-100 = "― [log=후유]I packed lunch...[/log][wa:40] "
1012806-103 = "[ns]\"You made me lunch?!\""
1012806-104 = "― [log=후유]Um, if you're fine with it...[/log][wa:2420] "
1012806-106 = "― [log=후유]...Would you like to have some?[/log][wa:2040] "
1012806-109 = "We enjoyed the packed lunch."
1012806-110 = "Fuyu wasn't lying. She's a wonderful cook."

[translation]
1012806-1 = "พื้นที่ของฟุยุ"
1012806-2 = "(คุณครูมาถึงสถานที่ที่ฟุยุบอก...)"
1012806-6 = "นิทรรศการที่จัดโดยนักเรียนไวลด์ฮันต์น่ะห้ามพลาดเลยนะ ควรค่าแก่การชมเลยละ"
1012806-7 = "น่าตื่นเต้นจังเลยนะ ฮุฮุ"
1012806-9 = "(มีผู้เข้าชมนิทรรศการเยอะกว่าที่คิดไว้)"
1012806-10 = "(ระหว่างนั้นเองคุณครูก็ไปสะดุดกับโปสเตอร์นิทรรศการ...)"
1012806-11 = "[ns] \"นิทรรศการมีเดียอาร์ตเดี่ยวของวากาสะ ฟุยุ...?\""
1012806-12 = "ค่ะ ใช่แล้วละค่ะ!"
1012806-14 = "นี่คือที่จัดแสดงนิทรรศการเดี่ยวของฉันเองค่ะ!"
1012806-15 = "เชิญคุณครูเข้าสู่โลกของฉันได้เลยค่ะ!"
1012806-16 = "[s] \"เหมือนเป็นศิลปินตัวจริงเลยนะ หัวหน้า!\""
1012806-17 = "แหะๆ งั้นเหรอคะ?"
1012806-18 = "ไม่ถึงกับขนาดนั้นหรอกค่ะ! ฉันก็แค่นักเรียนของสถาบันศิลปะไวลด์ฮันต์คนหนึ่งน่ะค่ะ คุณครู!"
1012806-19 = "วันนี้ไม่ใช่หัวหน้าฝ่ายธุรกิจของชมรมการค้าพิเศษหรอกค่ะ..."
1012806-20 = "เพราะงั้นคุณครูช่วยมองฉันเหมือนศิลปินคนหนึ่งได้มั้ยคะ?"
1012806-21 = "[s1] \"อืม งั้นวันนี้ต้องเรียกว่าอะไรดีล่ะ? ศิลปินดีมั้ย?\"\n[s2] \"งั้นต้องเรียกว่าอาร์ตทิสท์? หรือศิลปินดีนะ?\""
1012806-24 = "อืม... เอาเป็น..."
1012806-25 = "ฟุยุจัง... ก็พอมั้ง?"
1012806-26 = "แต่ก็เอาเถอะ! เราเข้าไปข้างในกันก่อนเถอะค่ะ!"
1012806-27 = "นี่เป็นโอกาสทองที่จะได้เข้าชมนิทรรศการโดยมีศิลปินมานำชมให้เองเลยนะคะ"
1012806-29 = "(ด้านในห้องจัดแสดงนิทรรศการมืดมาก)"
1012806-30 = "(มีหน้าจอฉายภาพมีเดียอาร์ตอยู่ทั่วห้อง)"
1012806-31 = "เริ่มจากผลงานชิ้นนี้ก่อนมั้ยคะ?"
1012806-32 = "ถ้าจะเปรียบทั้งนิทรรศการกับกวีนิพนธ์สักเล่ม..."
1012806-33 = "งั้นผลงานชิ้นนี้ก็ถือว่าเป็นบทนำค่ะ"
1012806-34 = "[s] \"เพราะมันรวมความประทับใจของผลงานชิ้นต่อไปที่จะดูไว้... งั้นเหรอ?\""
1012806-35 = "ใช่แล้วค่ะ!"
1012806-36 = "เพราะงั้น ไม่ว่าจะเดินชมผลงานในห้องนี้ตามลำดับแบบไหนก็ตาม..."
1012806-37 = "แต่ก็ต้องเริ่มจากผลงานชิ้นนี้ก่อน ฉันก็เลยเอามาจัดแสดงไว้ที่ทางเข้าเลยค่ะ"
1012806-38 = "[s] \"คิดเรื่องการจัดวางผลงานมาละเอียดดีเลยนะ\""
1012806-39 = "แน่นอนสิคะ ทั้งตำแหน่งของผลงาน มุม ระดับความสว่างและสี ความสว่างของจอภาพ องค์ประกอบตามระยะห่าง..."
1012806-40 = "ทุกอย่างที่ประกอบขึ้นเป็นนิทรรศการแฝงไว้ด้วยเจตนาของศิลปินทั้งนั้นค่ะ"
1012806-41 = "เอาละ งั้นเราก็ไปต่อกันเลยมั้ยคะ?"
1012806-48 = "(ระหว่างที่เดินดูผลงานของฟุยุทีละชิ้นๆ...)"
1012806-50 = "ส่วนแรงจูงใจของการจัดแสดงวัตถุชิ้นนี้..."
1012806-55 = "อ๊ะ... คุณครูเริ่มหิวแล้วสินะคะ"
1012806-56 = "[s] \"เปล่านะ เมื่อกี้เสียงท้องร้องของฟุยุจังต่างหาก...\""
1012806-57 = "ฮุฮุ งั้นก็ช่วยไม่ได้นะคะ "
1012806-58 = "ในฐานะศิลปิน ฉันไม่อาจเพิกเฉยต่อความหิวของผู้ชม VIP ได้หรอกค่ะ"
1012806-59 = "[s] \"ครูไม่ได้หิวสักหน่อย...!\""
1012806-60 = "ชู่ว"
1012806-61 = "เอาเป็นว่าตามฉันมาก่อนเถอะค่ะ คุณครู"
1012806-66 = "(สถานที่ที่ฟุยุพาคุณครูมาก็คือ...)"
1012806-71 = "(ด้านในของประตูที่ซ่อนอยู่ที่มุมหนึ่งของห้องจัดนิทรรศการ)"
1012806-72 = "[ns] \"ทะ...ที่นี่คือ....?\""
1012806-75 = "― [log=후유]ที่นี่คือด้านหลังจอโปรเจคเตอร์ค่ะ[/log][wa:1210] "
1012806-77 = "― [log=후유]หรือก็คือ ด้านหลังของผลงาน...[/log][wa:690] "
1012806-80 = "― [log=후유]เป็นที่ที่เจ้าของผลงานเท่านั้นที่เข้ามาได้ค่ะ[/log][wa:10] "
1012806-83 = "― [log=후유]วิธีเดียวที่จะเข้ามาที่นี่ได้...[/log]"
1012806-85 = "― [log=후유]ก็คือการได้รับอนุญาตจากฉันที่เป็นเจ้าของผลงานค่ะ[/log][wa:170] "
1012806-88 = "― [log=후유]เพราะงั้นตอนนี้ ที่นี่...[/log][wa:1590] "
1012806-90 = "― [log=후유]มีแค่คุณครูกับฉันสองคนเท่า... นั้น...[/log][wa:4610] "
1012806-93 = "― [log=후유]ไม่สิ ไม่ๆๆๆ![/log][wa:740] "
1012806-95 = "― [log=후유]มะ... ไม่ใช่อย่างนั้นนะคะ...![/log]"
1012806-98 = "― [log=후유]เอาเป็นว่า![/log]"
1012806-100 = "― [log=후유]ฉันทำข้าวกล่องมาด้วยค่ะ...[/log][wa:10] "
1012806-103 = "[ns] \"ข้าวกล่องฝีมือฟุยุเหรอเนี่ย?!\""
1012806-104 = "― [log=후유]เอ่อ คือว่าถ้าไม่ว่าอะไร...[/log][wa:2500] "
1012806-106 = "― [log=후유]กินข้าวกล่องด้วยกัน... ก่อนกลับมั้ยคะ?[/log][wa:1760] "
1012806-109 = "(จากนั้นคุณครูกับฟุยุก็กินข้าวกล่องด้วยกัน)"
1012806-110 = "(ที่ฟุยุบอกว่าตัวเองทำอาหารเก่งนั้นเป็นเรื่องจริง)"

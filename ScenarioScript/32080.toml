[translation]
32080-1 = "第8話;差し込む希望"
32080-2 = "遅い！おはよう！"
32080-3 = "あ、アズサちゃん。早いですね？"
32080-4 = "日が昇る前には、すでにここで予習と復習をしてた。"
32080-5 = "ふふっ、やる気満々ですねアズサちゃん。"
32080-6 = "当然だ、何せ今日も模擬試験がある。だよね、ヒフミ？"
32080-7 = "はい、そうですね。アズサちゃんはその様子ですと、もう模試への準備は万全という感じですね？"
32080-8 = "うん。第2次特別学力試験まで二日しか残ってないし、いつまでもみんなに心配をかけるわけにはいかない。"
32080-13 = "そして、今回こそ……！"
32080-14 = "す、すごい気合入ってるじゃん……。"
32080-15 = "試験範囲の予想問題も、もう何周もしてある。準備は完璧だ。"
32080-16 = "わ、私も負けないんだから！正義実現委員会のエリートの力、見せてあげる！"
32080-17 = "では、私も精一杯頑張るとしましょうか♡"
32080-18 = "[s] \"みんな、良い感じに張り切ってるね。\""
32080-22 = "はい……！ではせっかくの勢いですし、早速模擬試験を始めましょうか？"
32080-24 = "第3次補習授業部模試"
32080-26 = "[ns] \"じゃあ、スタート！\""
32080-30 = "……。"
32080-33 = "ふふっ……♡"
32080-36 = "こ、これ、知ってるはず……！えっと、んと、んんん……っ！"
32080-40 = "（何だかみんな、手の動きが以前より速くなっているような……！）"
32080-44 = "（模擬試験が終わり、みんなの採点結果が出た。）"
32080-45 = "先生……発表をお願いします！"
32080-46 = "[s] テストの結果を発表する。"
32080-50 = "第3次補習授業部模試、結果――"
32080-52 = "ハナコ―69点[007eff]（合格）[-]"
32080-54 = "アズサ―73点[007eff]（合格）[-]"
32080-56 = "コハル―61点[007eff]（合格）[-]"
32080-58 = "ヒフミ―75点[007eff]（合格）[-]"
32080-60 = "や、やりました……！？"
32080-61 = "ほ、本当っ！？嘘ついてない！？"
32080-62 = "……！"
32080-63 = "あらあら♡"
32080-68 = "すごいです！アズサちゃん、60点どころか70点を超えてしまいました！本当にすごいです！頑張りましたね……！"
32080-69 = "……うん！"
32080-70 = "コハルちゃんも！ギリギリでしたが、これは紛う方なき合格です！すごいです、やりましたね！"
32080-71 = "ゆ、夢とかじゃないよね……？ほ、本当に……！"
32080-72 = "あはっ……こ、これが私の実力よ！見たか！！"
32080-73 = "はい！これぞ正義実現委員会のエリートです、さすがです！"
32080-74 = "それに、ハナコちゃんも……"
32080-75 = "……運が良かったですね、うふふ。良い感じの数字です♡"
32080-76 = "良かったです……ハナコちゃん、うぅ……。"
32080-77 = "ひ、ヒフミちゃん……？"
32080-78 = "ハナコちゃんに以前何があったのか、何を抱えてるのかはまだ分かりませんが……でも、良かったです……。"
32080-79 = "ヒフミちゃん……はい、ありがとうございます。"
32080-80 = "前の実力をすぐ取り戻せるよう、私もお手伝いしますね。本当に、本当に良かったです……。"
32080-81 = "はい……ごめんなさい。ご心配をおかけしてしまって……。"
32080-83 = "……ということで、約束通りモモフレンズグッズの授与式を始めますっ！"
32080-87 = "……！！！"
32080-88 = "あはは……。"
32080-89 = "……。"
32080-90 = "さあ、どうぞ！みなさん好きな子を、欲しい子を自由に選んで良いんですよ！"
32080-91 = "なるほど、となると……！むむ……！"
32080-92 = "えっと、私は謹んで遠慮しますね。"
32080-93 = "わ、私も……。"
32080-94 = "あ、あうぅ……そう、ですか……。"
32080-95 = "ど、どうしよう……私は、私は……！"
32080-96 = "ダメだ、この中から選ぶなんてそんな難しいこと……！"
32080-97 = "あの黒くて角が生えたのも良いし、メガネのカバも……！"
32080-98 = "か、カバではなく、ペロロ様は鳥なのですが……。"
32080-99 = "どうすれば……このどちらかを選ぶなんて、私には……！"
32080-100 = "私には、無理だ……頼むヒフミ。ヒフミが私の代わりに選んで……。"
32080-101 = "わ、私ですか？"
32080-102 = "えっと、スカルマン様とペロロ博士ですよね。強いて選ぶとすると……"
32080-106 = "……。"
32080-110 = "ではこちらの、インテリなペロロ博士でどうでしょうか！"
32080-111 = "……！よし、じゃあこの子だ！"
32080-112 = "実はこのペロロ博士は、物知りで勉強もできるという設定なんです。"
32080-113 = "まさに今お勉強を頑張って、すごい成長している真っ最中のアズサちゃんにぴったりかなと！"
32080-114 = "なるほど、そうなのか。"
32080-115 = "ちょ、ちょっとだけ勉強しすぎたせいで、少しおかしくなっているという裏設定もあるのですが……。"
32080-116 = "[s] \"良かったね、アズサ。\""
32080-117 = "うん、気に入った。本当に可愛い、好き。えへへ……。"
32080-118 = "ありがとう、ヒフミ。これは一生大切にする。"
32080-119 = "あ、ありがたいのですが、そこまで言っていただけるとちょっとビックリしてしまいますね……！？ですが、私も嬉しいです。それは、アズサちゃんがやり遂げたからこそですよ。"
32080-120 = "うん。それでも同時に、友達からもらった初めてのプレゼントだから……。"
32080-121 = "これからはこのカバのことを、ヒフミだと思って大事にする！"
32080-122 = "そ、それはちょっと恥ずかしいですね……！？そ、それとカバではなく鳥でして……！"
32080-126 = "うーん……趣味の世界は広いですねぇ。"
32080-127 = "……。"
32080-129 = "（みんなの士気も高く、勉強は引き続き良い雰囲気で進んでいった。）"
32080-133 = "（そして時間は過ぎていき……）"
32080-135 = "……いよいよ明日です。"
32080-136 = "う、うん……。"
32080-137 = "第2次特別学力試験。"
32080-138 = "ふふっ……何だかあっという間でしたね。"
32080-139 = "はい……1週間という短い時間でしたが、私たちはきちんと努力を積み上げました。これは必ずや無駄にはならないと信じています。"
32080-140 = "模試の結果も良かったですし……今の私たちであれば十分に、第2次特別学力試験に合格できるはずです！"
32080-141 = "ですが慢心することなく、最後まで頑張らないといけません！あと一日、最善を尽くしましょう！"
32080-142 = "うん、当然だ。何なら100点を目指して頑張る。"
32080-143 = "わ、私も！"
32080-144 = "あら、では私もそういうことで……ふふっ♡"
32080-148 = "わ、私はちょっと100点は難しそうですが……と、とにかく！"
32080-149 = "最終日も、張り切って勉強していきましょう！"
32080-150 = "[s] \"よし、頑張ろう！\""
32080-153 = "……お待ちしておりました。ご無沙汰しております、先生。"
32080-154 = "あれからお変わりはありませんか？合宿の方はいかがでしょう、何か困ったことなどありませんでしたか？"
32080-155 = "[s] \"うん、おかげさまで何とか。ところで今日はどんな用事？\""
32080-156 = "ふふっ……この合宿は言うなれば元々、「生徒たちをよく観察できるように」という配慮でした。"
32080-157 = "そういうことなのですが、いかがでしたでしょうか？何か判明したことなどありましたか？"
32080-158 = "もっと直接的に言いましょうか、「トリニティの裏切り者」はどなただと思いますか？"
32080-159 = "[s] \"……前と同じになるけど、私は私のやり方で対処するよ。\""
32080-160 = "……そうでしたね。ただ第2次特別学力試験を目の前にして、あらためてそこを確認したかったのです。"
32080-161 = "そこで、本日もこうしてお越しいただいたわけでして。"
32080-162 = "……おそらく、ミカさんも接触してきましたよね？"
32080-167 = "ミカさんと何をお話しになったのか……よろしければ、教えていただけません？"
32080-169 = "次回;黒い手"

[translation]
32080-1 = "第8話;浮現的希望"
32080-2 = "早安！"
32080-3 = "啊哈哈……梓醬來的真早呢？"
32080-4 = "我在日出之前就已經在這裡預習和複習了。"
32080-5 = "哎呀……真是幹勁滿滿呢，梓醬。"
32080-6 = "那是當然的。畢竟今天有模擬考對吧，日步美？"
32080-7 = "嗯，沒錯。看梓醬這個樣子，已經做好萬全的準備了對吧？"
32080-8 = "嗯。離第2次特別學力測驗只剩下不到兩天了，總不能一直讓大家擔心。"
32080-13 = "今天一定要合格。"
32080-14 = "真，真有幹勁啊……"
32080-15 = "考試範圍的題目我也做過好幾輪了。準備很完美。"
32080-16 = "我，我也不會輸的！就讓你見識實現正義部菁英的實力吧！"
32080-17 = "那麼我也努力加油囉♡"
32080-18 = "[s] 「大家感覺都幹勁十足呢。」"
32080-22 = "啊，啊哈哈……那麼就乘著這股氣勢，趕快開始模擬測驗吧？"
32080-24 = "第3次補課部模擬測驗"
32080-26 = "[ns] 「那麼，開始吧！」"
32080-30 = "……"
32080-33 = "呵呵……♡"
32080-36 = "這，這題，我應該會的……！這個，嗯……！"
32080-40 = "（總覺得大家的手好像都動得比之前快了……！）"
32080-44 = "（模擬考結束，大家的成績都出來了）"
32080-45 = "老師……麻煩你公布成績吧！"
32080-46 = "[s] 公布考試成績"
32080-50 = "第3次補課部模擬測驗，結果──"
32080-52 = "花子──69分[007eff]（合格）[-]"
32080-54 = "梓──73分[007eff]（合格）[-]"
32080-56 = "小春──61分[007eff]（合格）[-]"
32080-58 = "日步美──75分[007eff]（合格）[-]"
32080-60 = "成，成功了……！？"
32080-61 = "真，真的嗎！？不是在騙人吧！？"
32080-62 = "……！"
32080-63 = "哎呀哎呀♡"
32080-68 = "好厲害！梓醬不只及格，還考了超過70分！真的好棒！你一定很努力吧……！"
32080-69 = "……嗯！"
32080-70 = "小春醬也是！雖然只是低空飛過，但也是確確實實地及格了！#n好厲害，真的做到了呢！"
32080-71 = "這，這不是在作夢吧……？是，是真的……！"
32080-72 = "啊哈……這，這就是我的實力唷！看到了吧！！"
32080-73 = "嗯！不愧是實現正義部的菁英，真了不起！"
32080-74 = "而且，花子醬也……"
32080-75 = "……運氣不錯呢，呵呵。真是不錯的數字♡"
32080-76 = "太好了……花子醬，嗚……"
32080-77 = "日，日步美醬……？"
32080-78 = "雖然不知道花子醬之前發生了什麼、背負著什麼……不過真是太好了……"
32080-79 = "日步美醬……"
32080-80 = "為了讓你回復以前的實力，我也會幫忙的。真的真的太好了……"
32080-81 = "嗯……抱歉，讓你擔心了呢……"
32080-83 = "……那麼，就依照我們約定開始Momo好友周邊頒獎典禮！"
32080-87 = "……！！！"
32080-88 = "……"
32080-89 = "……"
32080-90 = "大家不用客氣！可以選各自喜歡的沒關係唷！"
32080-91 = "這樣啊，那……！嗯……！"
32080-92 = "那個，日步美醬的好意我就心領了。"
32080-93 = "我，我也是……"
32080-94 = "啊，啊嗚……"
32080-95 = "怎，怎麼辦……我，我……！"
32080-96 = "不行，從這裡面選一個實在太難了……！"
32080-97 = "那個黑黑有長角的也不錯，戴眼鏡的河馬也……！"
32080-98 = "不，不是河馬啦，佩洛洛大人是鳥才對……"
32080-99 = "怎麼辦……要在這裡面做出選擇對我來說……！"
32080-100 = "對我來說太難了……拜託你了日步美。日步美幫我選一個吧……"
32080-101 = "我，我幫你選嗎？"
32080-102 = "骷髏人大人和佩洛洛博士對吧，如果硬要選的話……"
32080-106 = "……"
32080-110 = "那就選這個充滿智慧的佩洛洛博士怎麼樣呢！"
32080-111 = "……！好，那就選它了！"
32080-112 = "其實這個佩洛洛博士在設定上可是知識淵博又很會唸書的哦。"
32080-113 = "我想正好很適合現在努力讀書，正在快速成長中的梓醬！"
32080-114 = "原來如此，是這樣啊。"
32080-115 = "雖，雖然還有因為書唸太多而變得有點怪怪的這種隱藏設定就是了……"
32080-116 = "[s] 「太好了呢，梓。」"
32080-117 = "嗯，我很滿意。真的好可愛，好喜歡。耶嘿嘿……"
32080-118 = "謝謝你，日步美。我一輩子都會好好珍惜它的。"
32080-119 = "雖，雖然你這麼說我很感謝，但說成這樣的話反而讓我有點受寵若驚……！？#n不過我也很開心，那是梓醬努力獲得的成果唷。"
32080-120 = "嗯。而且這也是我從朋友收到的第一個禮物……"
32080-121 = "今後我會把這隻河馬當作是日步美好好珍惜的！"
32080-122 = "那，那還真是有點害羞呢……！？還有它不是河馬是鳥……"
32080-126 = "唔嗯……興趣的世界真是廣闊呢。"
32080-127 = "……好不舒服。"
32080-129 = "（大家的士氣都很高昂，唸書也在良好的氛圍中繼續進行著）"
32080-133 = "（時間就這麼過去……）"
32080-135 = "……就是明天了呢。"
32080-136 = "嗯，嗯……"
32080-137 = "第2次特別學力測驗。"
32080-138 = "呵呵……總覺得時間過得真快呢。"
32080-139 = "就是呀……雖然只有短短一週的時間，大家都非常努力。#n我相信這些一定不會白費的。"
32080-140 = "模擬測驗的結果也很好……#n如果是現在的我們，應該能夠輕鬆在第2次特別學力測驗及格的！"
32080-141 = "但是我們也不能大意，要努力到最後一刻才行！還剩下一天，我們盡力加油吧！"
32080-142 = "嗯，那是當然。我會以100分為目標努力的。"
32080-143 = "我，我也是！"
32080-144 = "哎呀，那我也這樣吧……呵呵♡"
32080-148 = "雖，雖然100分對我來說有點困難……總，總之會努力的！"
32080-149 = "最後一天，大家也加油吧！"
32080-150 = "[s] 「好，加油吧！」"
32080-153 = "……恭候多時了，久疏問候了呢，老師。"
32080-154 = "那之後有發生什麼變化嗎？#n合宿的狀況如何，有沒有遇到什麼困擾呢？"
32080-155 = "[s] 「今天找我有什麼事？」"
32080-156 = "呵呵……這次合宿的目的本來就是為了「更清楚的觀察學生們」。"
32080-157 = "那麼您覺得怎麼樣呢？有沒有查出什麼成果呢？"
32080-158 = "我再說直接一點吧，您認為「三一的叛徒」是誰呢？"
32080-159 = "[s] 「我之前已經說過，我會用我的方式來處理。」"
32080-160 = "……這樣啊。因為第2次特別學力測驗已近在眼前，我想要再確認一次。"
32080-161 = "所以才會請老師過來一趟。"
32080-162 = "而且您應該也有跟彌香同學接觸過了對吧？"
32080-167 = "彌香同學跟老師說了什麼……可以請您告訴我嗎？"
32080-169 = "下一話;黑手"

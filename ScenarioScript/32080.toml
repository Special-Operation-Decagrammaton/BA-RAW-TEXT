[translation]
32080-1 = "ตอนที่ 8;ความหวังเริ่มปรากฏ"
32080-2 = "มาสายนะ!"
32080-3 = "แหะๆๆ... อาซึสะจัง... มาถึงก่อนแล้วเหรอคะเนี่ย?"
32080-4 = "แน่นอนอยู่แล้วสิ ฉันเตรียมตัวเสร็จตั้งแต่พระอาทิตย์ยังไม่ขึ้น#nแล้วก็มาเตรียมบทเรียนและทบทวนอยู่ที่นี่"
32080-5 = "ตายจริง... วันนี้ความตั้งใจเต็มเปี่ยมเลยนะคะอาซึสะจัง"
32080-6 = "แน่นอนอยู่แล้ว วันนี้จะมีการสอบเสมือนจริงอีกนี่นา?"
32080-7 = "อ๊ะ... ใช่แล้วค่ะ วันนี้เราจะทำการสอบตามที่ได้วางแพลนไว้... นี่อาซึสะจังมาเตรียมสอบอยู่เหรอคะ?"
32080-8 = "อื้ม การสอบประเมินเหลืออีกแค่ 2 วันแล้ว ฉันจะทำให้ทุกคนเป็นห่วงอยู่ไม่ได้หรอก"
32080-13 = "วันนี้จะต้องสอบผ่านให้ได้"
32080-14 = "โห... พลังกายและพลังใจมาเต็ม..."
32080-15 = "ฉันลองทำโจทย์ที่คาดว่าจะออกสอบอยู่หลายรอบแล้วล่ะ ถือว่าเตรียมตัวได้เพอร์เฟกต์"
32080-16 = "ฉะ... ฉันก็ไม่ยอมสอบตกหรอก! ฉันจะแสดงพลังของอีลีทแห่งชมรมทวงความยุติธรรมให้ดูเอง!"
32080-17 = "ดีเลยค่ะ♡ ฉันเองก็จะพยายามเต็มที่ค่ะ!"
32080-18 = "[s] \"ไฟแรงกันจังเลยนะ\""
32080-22 = "อ่ะฮ่ะฮ่า... งั้นเราเรียกพลังออกมาให้เต็มที่ แล้วมาเริ่มสอบเสมือนจริงกันเลยไหมคะ?"
32080-24 = "เริ่มการสอบเสมือนจริงครั้งที่ 3 ของชมรมชั้นเรียนเสริม "
32080-26 = "[ns] \"ถ้างั้นก็เริ่มได้-!\""
32080-30 = "…"
32080-33 = "อื้ม ทำแบบนี้น้า...♡"
32080-36 = "ระ... รู้แล้ว...! ฮะ... ฮึ่ม... อย่างนี้เอง..."
32080-40 = "(รู้สึกว่าทุกคนทำข้อสอบกันได้ไวขึ้น)"
32080-44 = "(สิ้นสุดการสอบ ได้ผลการสอบของทุกคนแล้ว)"
32080-45 = "คุณครู... ช่วยประกาศผลเลยค่ะ"
32080-46 = "[s] ดูผลการสอบ"
32080-50 = "ผลการสอบเสมือนจริงครั้งที่ 3 ของชมรมชั้นเรียนเสริม "
32080-52 = "ฮานาโกะ - 69 คะแนน [007eff](ผ่าน)[-]"
32080-54 = "อาซึสะ - 73 คะแนน [007eff](ผ่าน)[-]"
32080-56 = "โคฮารุ - 61 คะแนน [007eff](ผ่าน)[-]"
32080-58 = "ฮิฟุมิ - 75 คะแนน [007eff](ผ่าน)[-]"
32080-60 = "ทะ... ทำได้แล้ว!!  ทะ... ทุกคนสอบผ่านแล้ว?!"
32080-61 = "จะ... จริงเหรอ?!  ไม่จกตานะ!?"
32080-62 = "......!!  ทำได้แล้ว! "
32080-63 = "ตายแล้ววว♡"
32080-68 = "ระ... เรื่องจริงค่ะ! อาซึสะจังไม่ได้ได้แค่ 60 คะแนน แต่ได้เกิน 70 คะแนนเลยค่ะ! สุดยอดไปเลย! พัฒนาอย่างก้าวกระโดดเลยค่ะ!"
32080-69 = "อะ... อื้ม!! "
32080-70 = "โคฮารุจัง!  ถึงจะฉิวเฉียด แต่คะแนนก็เพิ่มขึ้นอย่างน่าพอใจเลยค่ะ! ในที่สุดก็ทำได้แล้ว!"
32080-71 = "นะ... นี่คะแนนฉันจริงเหรอ?!  จริงเหรอเนี่ย...? "
32080-72 = "เอ่อ... ฮ่ะฮ่ะฮ่ะฮ่าา! เห็นไหมล่ะทุกคน? นี่แหละฝีมือของฉัน!"
32080-73 = "ใช่ค่ะ! ใช่แล้วค่ะ! สงสัยจะซ่อนพลังไว้จริงๆ ด้วยนะคะ! นี่แหละค่ะอีลีทตัวจริง!"
32080-74 = "ฮานาโกะจัง... อีกอย่าง..."
32080-75 = "ตายจริง... ถือว่าดวงดีนะคะเนี่ย อุฮุฮุฮุ♡"
32080-76 = "โล่งอกนะคะ... ฮานาโกะจัง... เอ่อ..."
32080-77 = "ฮะ... ฮิฟุมิจัง?"
32080-78 = "ฉันไม่รู้ว่าเกิดอะไรขึ้นกับฮานาโกะจัง... แต่โชคดีนะคะที่ยังแก้มือได้อยู่... "
32080-79 = "ฮิฟุมิจัง..."
32080-80 = "ฉันจะอยู่ข้างๆ แล้วช่วยรื้อฟื้นความสามารถเดิมกลับมาให้เองค่ะ อ่า..."
32080-81 = "อื้ม... ฉันเองก็ต้องขอโทษนะคะ... ขอโทษที่ทำให้เป็นห่วง..."
32080-83 = "งั้นฉันจะจัดพิธีมอบรางวัลเป็นสินค้า MOMO FRIENDS ตามที่สัญญาไว้นะคะ!"
32080-87 = "อื้อ!!  อื้ม!"
32080-88 = "…"
32080-89 = "…"
32080-90 = "เอาล่ะ เอาล่ะ! ทุกคนมีโอกาสเลือกค่ะ! เลือกของที่อยากได้ไปได้เลย!"
32080-91 = "จริงเหรอ...! ของที่อยากได้...! อืม...!!"
32080-92 = "ฉันขอสละสิทธิ์ค่ะ"
32080-93 = "ฉันก็ด้วย"
32080-94 = "เฮ้อ..."
32080-95 = "งั้น... แล้วฉันล่ะ?  ฉัน..."
32080-96 = "ฉันเองก็อยากเลือก... แต่ว่าเลือกไม่ได้เลย! "
32080-97 = "ตัวที่มีเขาสีดำก็น่ารัก ส่วนฮิปโปที่ใส่แว่นก็แบ๊วไปอีก...!"
32080-98 = "ไม่ใช่ฮิปโปนะคะ ท่านเพโรโร่เป็นนก..."
32080-99 = "อืม... เอาไงดีล่ะ? แล้วฉันเลือกอะไรได้ไหม... อ่า...ไม่นะ..."
32080-100 = "ฮิฟุมิ... ฉันเลือกไม่ได้... ฮิฟุมิเลือกให้หน่อยนะ..."
32080-101 = "ฉะ.. ฉันเหรอคะ? "
32080-102 = "อืมม... ถ้าต้องเลือกระหว่างคุณสกัลแมนและคุณด็อกเตอร์เพโรโร่..."
32080-106 = "…"
32080-110 = "คงเป็นคุณด็อกเตอร์เพโรโร่อัจฉริยะ!"
32080-111 = "ตัวนี้เหรอ...? ฉันได้...!!  น้องตัวนี้เหรอ?!!"
32080-112 = "ใช่ค่ะ คุณด็อกเตอร์เพโรโร่ทั้งเรียนเก่งและมีความรู้ทั่วไปเยอะด้วยค่ะ! "
32080-113 = "ฉันเลือกคุณด็อกเตอร์เพโรโร่ให้เพราะเข้ากับอาซึสะจังที่กำลังพัฒนาตัวเองอย่างยอดเยี่ยมอยู่ค่ะ!"
32080-114 = "อย่างนี้นี่เอง... คุณด็อกเตอร์อัจฉริยะ"
32080-115 = "ตะ... แต่ว่ามีประวัติว่าเรียนมากเกินไปจนเสียสติด้วย..."
32080-116 = "[s] \"ดูจะถูกใจนะอาซึสะ\""
32080-117 = "อื้ม ชอบมากเลย ถูกใจมาก แหะๆๆ..."
32080-118 = "ขอบใจที่ให้นะฮิฟุมิ ฉันจะรักษาไว้ทั้งชีวิตเลย"
32080-119 = "คะ? ฉันไม่ได้ทำอะไรมากขนาดนั้นเลยค่ะอาซึสะจัง นี่เป็นผลจากความพยายามของอาซึสะจัง#nต่างหากล่ะคะ"
32080-120 = "อืม... แต่นี่เป็น... ของขวัญชิ้นแรกที่ฉันได้จากเพื่อนน่ะ..."
32080-121 = "จากนี้ฉันจะคิดว่าฮิปโปตัวนี้คือฮิฟุมิล่ะ!"
32080-122 = "คะ?!  เอ่อ... แบบนั้นมัน... แล้วก็ นั่นนกต่างหากล่ะคะ อาซึสะจัง...! ไม่ใช่ฮิปโปนะคะ!"
32080-126 = "อืม... ฉันเข้าไม่ถึงรสนิยมนี้เลยค่ะ "
32080-127 = "รู้สึกไม่ดีเลย..."
32080-129 = "(ทุกคนมีขวัญกำลังใจเต็มเปี่ยม และตั้งใจเรียนด้วยกันอย่างขะมักเขม้น)"
32080-133 = "(และเวลาอีกหนึ่งวันก็ผ่านไป...)"
32080-135 = "พรุ่งนี้แล้วล่ะค่ะทุกคน"
32080-136 = "ฮือออ..."
32080-137 = "อื้ม การสอบประเมินครั้งที่ 2 ใช่ไหม?"
32080-138 = "โอ๊ะ... ใกล้ถึงเวลาแล้วเหรอคะ? เวลาผ่านไปไวอย่างกับโกหกเลยนะคะ "
32080-139 = "ใช่ค่ะ ถึงจะเป็นเวลาสั้นๆ แค่ 1 สัปดาห์ แต่ฉันเชื่อว่าความพยายามของพวกเราที่ผ่านมา#nมันจะไม่สูญเปล่าแน่ค่ะ"
32080-140 = "ผลการสอบเสมือนจริงพิสูจน์แล้วว่าพวกเราจะผ่านการสอบประเมินครั้งที่ 2 ได้แน่นอนค่ะ!"
32080-141 = "แต่พวกเราต้องไม่อวดดี และต้องทุ่มเทกว่านี้ค่ะ! วันนี้คือวันสุดท้ายแล้วมาพยายาม#nอย่างสุดความสามารถกันเลยค่ะ!"
32080-142 = "แน่นอนอยู่แล้วสิ ฉันจะเอาให้ได้ 100 คะแนนเต็มเลย"
32080-143 = "ฉะ... ฉันด้วย! "
32080-144 = "โอ๊ะ งั้นฉันก็เอาด้วยค่ะ ฮุฮุ♡"
32080-148 = "ฉะ... ฉันไม่น่าจะทำได้ 100 คะแนน... แต่ก็เอาเถอะ!"
32080-149 = "มาเริ่มตั้งใจเรียนในวันสุดท้ายกันเถอะค่ะ!"
32080-150 = "[s] \"โอ้ววว!\""
32080-153 = "กำลังรออยู่เลยค่ะ... ไม่ได้เจอกันนานเลยนะคะคุณครู"
32080-154 = "สบายดีไหมคะ? แคมป์ฝึกฝนเป็นยังไงบ้างคะ? ไม่มีปัญหาอะไรใช่ไหมคะ?"
32080-155 = "[s] \"ครั้งนี้มีอะไรงั้นเหรอ?\""
32080-156 = "ฮุฮุ... แคมป์ฝึกฝนคือการเอาใจใส่จากฉันค่ะ การเอาใจใส่ที่จะให้คุณครูเฝ้าสังเกต#nนักเรียนพวกนั้นอย่างตั้งใจ"
32080-157 = "เป็นยังไงบ้างคะ? ได้ผลลัพธ์ที่ต้องการไหมคะ? สืบอะไรมาได้บ้างไหมคะ?"
32080-158 = "สรุปเลยแล้วกัน คิดว่าใครคือผู้ทรยศคะ?"
32080-159 = "[s] \"ครูไม่เคยบอกว่าเห็นด้วยกับเรื่องนั้นนะ\""
32080-160 = "ก็ใช่ค่ะ... แต่การสอบประเมินครั้งที่ 2 ก็ใกล้เข้ามาแล้ว และฉันก็อยากตรวจสอบเรื่องนั้นดูอีกรอบค่ะ"
32080-161 = "ก็เลยเชิญมาที่นี่ยังไงล่ะคะ"
32080-162 = "อีกอย่าง เหมือนคุณครูจะได้ติดต่อกับคุณมิกะไปด้วยนี่คะ..."
32080-167 = "คุณมิกะว่ายังไงบ้างเหรอคะ? เธอได้ไปบอกอะไรหรือเปล่าคะ?"
32080-169 = "ตอนต่อไป;การมาถึงของเงามืด"

[translation]
1006605-1 = "Mobilization Preparations Complete!"
1006605-2 = "I hurried to the place Aris told me."
1006605-3 = "I carefully pressed the doorbell..."
1006605-7 = "Is that you, Sensei?"
1006605-8 = "[s] \"Yep. I received your message.\""
1006605-9 = "Oh, Sensei! N-Not right now!"
1006605-10 = "Do not come in! Not yet..."
1006605-11 = "[s] \"I thought something might have happened. Is there a problem?\""
1006605-12 = "No! But..."
1006605-13 = "Eek! I am glad that you are here early, but... it is a bit... difficult..."
1006605-19 = "[ns] \"Aris, are you okay?!\""
1006605-21 = "Worried about Aris, I burst into the room."
1006605-22 = "And then..."
1006605-25 = "― S-Sensei?![wa:820] "
1006605-27 = "― I am still preparing...[wa:1560] "
1006605-30 = "― I wanted to show you that I had overcome my fears and successfully changed my class to a maid...[wa:620] "
1006605-32 = "― That is the side of me that I want to show you...[wa:100] "
1006605-35 = "― So, please[wa:1840] "
1006605-37 = "― wait until I am ready.[wa:900] "
1006605-40 = "[ns] \"You're not afraid of maids anymore?\""
1006605-41 = "― That is correct! I am no longer afraid of maids![wa:1460] "
1006605-43 = "― I could achieve this only because you were here for me, Sensei.[wa:840] "
1006605-46 = "― If I'm with you...[wa:720] "
1006605-48 = "― Then I can take on any dungeon in the world.[wa:1740] "
1006605-51 = "― Yes! I am ready for a new adventure![wa:2560] "
1006605-54 = "I waited until Aris felt ready to come out."
1006605-59 = "I am ready, Sensei! How is it?"
1006605-60 = "[s] \"You look great!\""
1006605-61 = "I am glad to hear that."
1006605-62 = "Do you think I have become the maid, Sensei?"
1006605-63 = "[s] \"Yes, Aris. You have worked hard and become a maid.\""
1006605-64 = "Bum bum bum! I have been approved by Sensei! I can level up further now!"
1006605-65 = "[s] \"Up further? ...Where?\""
1006605-66 = "I will become the best hero maid!"
1006605-67 = "I will be the best of both maid and hero, and I will become the strong hero maid who saves the world!"
1006605-68 = "[s] \"Well... if you say so...\""
1006605-69 = "You agree, too! I am invincible now!"
1006605-73 = "Now, we are ready to step forth! Let us head to the field!"
1006605-74 = "The world of EXP and maids..."
1006605-75 = "The world is waiting for us, Sensei!"
1006605-77 = "Aris took my hand, and I followed her back to Schale on an adventure."

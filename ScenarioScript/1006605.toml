[translation]
1006605-1 = "出擊準備完成！"
1006605-2 = "（急忙前往愛麗絲所說的地方）"
1006605-3 = "（小心翼翼地按下電鈴……）"
1006605-7 = "是老師嗎！？"
1006605-8 = "[s]「嗯，我可以進去嗎？」"
1006605-9 = "請，請等一下！"
1006605-10 = "現在還，不行……！"
1006605-11 = "[s]「可是你不是說有重要的話……」"
1006605-12 = "是這麼說沒錯……！"
1006605-13 = "嗚嗚……沒想到會這麼快……#n不，老師早點過來，愛麗絲也很開心，可是……"
1006605-19 = "[ns]「愛麗絲，你沒事吧！？」"
1006605-21 = "（出於對愛麗絲的擔心打開了門）"
1006605-22 = "（結果……）"
1006605-25 = "― 老，老師！？[wa:980] "
1006605-27 = "― 愛麗絲，還在準備中……[wa:2040] "
1006605-30 = "― 克服了女僕，轉職後的愛麗絲的模樣……[wa:3740] "
1006605-32 = "― 雖然想讓老師看……[wa:1700] "
1006605-35 = "― 在愛麗絲的準備完成之前，[wa:1760] "
1006605-37 = "― 請再稍等一下。[wa:1500] "
1006605-40 = "[ns]「愛麗絲已經不怕女僕了呢。」"
1006605-41 = "― 沒錯！已經不怕女僕了！[wa:2940] "
1006605-43 = "― 這全部都是因為有老師在。[wa:2880] "
1006605-46 = "― 只要和老師在一起……[wa:1040] "
1006605-48 = "― 愛麗絲無論什麼地城都可以攻略。[wa:2900] "
1006605-51 = "― 好！愛麗絲，做好冒險的準備了！[wa:3400] "
1006605-54 = "（等到愛麗絲的準備完全結束……）"
1006605-59 = "讓你久等了！老師，你覺得如何呢？"
1006605-60 = "[s]「嗯，非常適合你哦。」"
1006605-61 = "聽到老師這麼說，愛麗絲很開心。"
1006605-62 = "老師也認為愛麗絲克服女僕裝了嗎？"
1006605-63 = "[s]「嗯，我覺得你已經克服了。」"
1006605-64 = "乓啪喀乓！獲得了老師的評價！#n這樣一來愛麗絲又能往更高的目標邁進了！"
1006605-65 = "[s]「更高的目標是……哪裡？」"
1006605-66 = "那就是──成為最強的女僕勇者！"
1006605-67 = "達到女僕與勇者的最高境界，#n成為戰勝邪惡，拯救世界的最強女僕！"
1006605-68 = "[s]「嗯，這樣也很好。」"
1006605-69 = "獲得了老師的同意！這時候的愛麗絲，簡直是無敵的！"
1006605-73 = "來，現在正是出擊的時候！#n老師，一起踏上旅途吧！"
1006605-74 = "廣闊的大地，豐富的經驗──"
1006605-75 = "女僕的世界正等待著愛麗絲！"
1006605-77 = "（與愛麗絲手牽著手，走向了夏萊）"

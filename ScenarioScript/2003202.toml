[translation]
2003202-1 = "การฝึกแฟชั่นพิเศษ"
2003202-6 = "ฮู่ว... สวัสดีคุณครู ขอบคุณที่มีเวลาให้กันนะ"
2003202-7 = "สงสัยว่าทั้งหมดนี้คืออะไรงั้นเหรอ? นิตยสารแฟชั่นที่ฉันเอามาจากหลายๆ ที่น่ะ"
2003202-8 = "ฉันจะเลือกเสื้อผ้าที่ชอบจากในนี้สัก 2-3 ชุด แล้วอยากขอคำแนะนำจากคุณครูน่ะ"
2003202-9 = "แล้วฉันจะเอาคำแนะนำนั้นมาเป็นพื้นฐานในการเลือกชุดอื่นด้วย"
2003202-10 = "เขาเรียกกันว่าอะไรนะ? วงจร PDCA รึเปล่า?"
2003202-11 = "[s1] \"อืม... อาจจะคนละอย่างกันนะ\"\n[s2] \"ไม่รู้ว่าครูจะช่วยได้รึเปล่า... แต่ก็จะลองดูนะ\""
2003202-14 = "ขอบคุณนะคุณครู งั้นฉันจะเริ่มเลยนะ"
2003202-15 = "ชุดแรกที่เตะตาฉันคือชุดนี้"
2003202-20 = "ฉันไม่ได้ทำแบบนี้บ่อยๆ ก็เลยลองเลือกชุดที่ปกติแล้วไม่ค่อยได้ใส่น่ะ ดูชุดนี้สิ เห็นว่าเป็นกระแสใหม่#nของวงการแฟชั่นช่วงนี้เลยนะ"
2003202-21 = "[s] \"อืม... แต่ถ้าจะเอาชุดนี้มาใส่ในชีวิตประจำวัน มันดูไม่ค่อยสะดวกนะ...\""
2003202-22 = "อยากให้เป็นชุดที่ธรรมดาๆ กว่านี้หน่อยงั้นเหรอ? อืม... แต่นั่นเป็นชุดที่ฉันมั่นใจที่สุดเลยนะ..."
2003202-23 = "ก็ได้ งั้นชุดนี้ละเป็นไง?"
2003202-27 = "นี่เป็นลุคเวิร์กกิ้งวูแมนแบบเป็นทางการน่ะ แต่ว่าถ้าแต่งตามนั้นเลยก็จะดูน่าเบื่อไป ฉันก็เลยตัดท่อนล่างออก แล้วก็มาเพิ่มองค์ประกอบที่คาดไม่ถึงไว้ตรงนี้..."
2003202-28 = "โดยรวมแล้วดูจะใช้ผ้าน้อยไปงั้นเหรอ? ก็มีถุงเท้ายาวๆ เพิ่มไว้แล้วนี่ไง..."
2003202-29 = "ไม่ได้งั้นเหรอ?"
2003202-30 = "อ๋อ หรือว่าเป็นเพราะไม่มีเนกไท...?"
2003202-32 = "(การอบรมแฟชั่นพิเศษกับเอมิยังคงดำเนินต่อไป...)"
2003202-34 = "แล้วชุดนี้ล่ะเป็นไง? เห็นว่าเป็นสไตล์เรโทรน่ะ"
2003202-35 = "มันหมดกระแสไปแล้วเหรอ? กระแสแฟชั่นคือสิ่งที่เปลี่ยนแปลงได้ทุกวันงั้นเหรอ?"
2003202-36 = "อืม... ยากจังแฮะ"
2003202-38 = "งั้นชุดนี้ล่ะ?"
2003202-42 = "ชุดนี้คุณครูต้องเปิดใจยอมรับแน่นอน เห็นว่านี่เป็นชุดสำหรับวันที่มีงานสำคัญๆ เพราะใส่แล้วจะช่วย#nเสริมดวงน่ะ..."
2003202-46 = "ชุดล้ำยุคนี่ก็ด้วย คุณครูว่าเป็นไงบ้าง?"
2003202-47 = "[s] \"เอมิ นี่มันนิตยสารแฟชั่นจริงๆ หรือเปล่า...?!\""
2003202-49 = "(นิตยสารที่เอมิเอามาดูจะเป็นหนังสือแนวศิลปะมากกว่าแนวแฟชั่น)"
2003202-50 = "(ชุดที่เอมิเลือกเป็นชุดที่ล้ำยุค หรือไม่ก็เป็นชุดที่ดูอันตรายไม่เบา...)"
2003202-52 = "ฉันอุตส่าห์เลือกชุดสวยๆ ที่คิดว่าช่วงนี้กำลังฮิตอยู่แท้ๆ เชียว..."
2003202-53 = "..."
2003202-54 = "[s] \"เอมิ\""
2003202-56 = "[ns3] \"ตอนช้อปปิ้งเดี๋ยวครูไปด้วยนะ\"\n[ns4] \"เอาไว้ไปเลือกชุดด้วยกันนะ\""
2003202-59 = "อย่างนั้นเหรอ"
2003202-60 = "อื้ม แบบนั้นน่าจะดีกว่า"
2003202-61 = "[s] \"ว่าแต่ เอมิ ชุดที่เอาให้ครูดู มันเหมือนชุดว่ายน้ำมากกว่าชุดทั่วๆ ไปนะ...\""
2003202-62 = "ใช่ ก็ฉันกำลังเลือกชุดว่ายน้ำอยู่น่ะ"
2003202-63 = "คิดว่าฉันจะซื้อเสื้อผ้าที่ใส่ในชีวิตประจำวันงั้นเหรอ? พูดอะไรของคุณครูน่ะ ชุดว่ายน้ำก็เป็นเสื้อผ้าเหมือนกันนะ"
2003202-64 = "[s5] \"มันก็จริงอยู่หรอก...!\"\n[s6] \"ครูก็นึกว่าครั้งนี้จะมาหาเสื้อผ้าธรรมดาๆ น่ะ!\""
2003202-67 = "ก็บอกอยู่ว่าชุดว่ายน้ำก็เป็นเสื้อผ้าเหมือนกัน จะสื่ออะไรของคุณครูกันแน่น่ะ ไม่เห็นจะเข้าใจเลย"
2003202-69 = "(จากนั้นคุณครูก็สัญญาว่าจะไปซื้อชุดว่ายน้ำกับเอมิ)"
2003202-70 = "(เอมิเลือกชุดจากนิตยสารอีก 2-3 ชุด และแน่นอนว่าทั้งหมดไม่ใช่ชุดธรรมดาๆ เลย)"

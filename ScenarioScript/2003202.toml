[translation]
2003202-1 = "時尚特訓"
2003202-6 = "呼……你好，老師。#n謝謝你特地空出時間。"
2003202-7 = "你問這些是什麼？#n是從各個地方收集來的時尚雜誌。"
2003202-8 = "我從裡面挑了幾件喜歡的衣服，希望老師能給我一點意見。"
2003202-9 = "然後我再依照老師的意見去挑選衣服。"
2003202-10 = "記得這個方法叫做PDCA循環，對吧？"
2003202-11 = "[s1]「嗯……感覺應該不太一樣吧。」\n[s2]「雖然不知道能不能幫上忙……總之我明白了。」"
2003202-14 = "謝謝老師，那我們開始吧。"
2003202-15 = "我第一眼注意到的是這件。"
2003202-20 = "因為機會難得，我想嘗試平時沒穿過的類型。#n你看這邊，據說這是最近時尚界最流行的風格哦。"
2003202-21 = "[s]「這件衣服……平時要穿出門應該有點困難吧……？」"
2003202-22 = "應該挑更普通一點的衣服嗎？#n唔嗯……我本來對這套最有信心的說……"
2003202-23 = "我知道了，那這套怎麼樣？"
2003202-27 = "算是比較正式一點的職場風穿搭。不過直接這樣穿感覺有點無趣……#n我打算把下半身換掉，改搭這件更讓人驚豔的……"
2003202-28 = "你說這樣整體布料面積好像太少了？#n所以我計畫再搭配長襪……"
2003202-29 = "這樣更不行？"
2003202-30 = "啊，是因為缺少了領帶嗎……？"
2003202-32 = "（和英美的時尚特訓就這樣進行著……）"
2003202-34 = "這個怎麼樣？#n聽說這叫做復古風穿搭。"
2003202-35 = "你說這有點退流行了？#n流行本來就稍縱即逝？"
2003202-36 = "唔……真困難呢。"
2003202-38 = "那這個呢？"
2003202-42 = "我相信這個一定連老師也會喜歡。#n據說在重要的「決戰日」穿這件衣服就絕對不會失敗……"
2003202-46 = "還有這個，聽說叫做「前衛風」？"
2003202-47 = "[s]「英美，你拿的這本應該不是時尚雜誌，而是別的東西吧……！？」"
2003202-49 = "（英美拿來的那些與其說是時尚雜誌，不如說是藝術或娛樂雜誌……）"
2003202-50 = "（因此英美看中的那些衣服不是過於前衛，就是遊走在危險的邊緣）"
2003202-52 = "我明明是在最近流行的風格裡，挑出我覺得最漂亮的衣服……"
2003202-53 = "……"
2003202-54 = "[s]「英美。」"
2003202-56 = "[ns3]「之後你要買衣服的時候，我會陪你一起去的。」\n[ns4]「我們到時候再慢慢挑吧。」"
2003202-59 = "是嗎。"
2003202-60 = "嗯，那就這麼辦吧。"
2003202-61 = "[s]「話說回來，英美。我們剛才看的那些與其說是衣服，好像更偏向泳裝……」"
2003202-62 = "對呀，我挑的就是泳裝沒錯。"
2003202-63 = "問我不是說要買衣服？#n老師在說什麼，泳裝當然也是衣服的一種啊。"
2003202-64 = "[s5]「雖然這麼說也沒錯……！」\n[s6]「我還以為你這次真的是要挑正常的衣服！」"
2003202-67 = "泳裝不就是正常的衣服嗎？#n真不明白老師的意思。"
2003202-69 = "（就這樣，和英美約好下次一起去買泳裝）"
2003202-70 = "（因為還有一些時間，於是請英美從雜誌裡挑幾件泳裝當作參考。#n　而那些泳裝當然也相當有特色）"

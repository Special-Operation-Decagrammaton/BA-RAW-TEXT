[translation]
2003202-1 = "Special Fashion Training"
2003202-6 = "Phew. Hello, Sensei. Thank you for being available on such short notice."
2003202-7 = "...What are these? They're fashion magazines I got from the book store."
2003202-8 = "I'll choose my favorites among them. Then I want Sensei's input on my choices."
2003202-9 = "The options that make it through the initial screening will be my new outfits."
2003202-10 = "Think of it as a Fashion PDCA, or plan-do-check-act cycle."
2003202-11 = "[s1] \"Fashion's not my forte, but I'll do my best.\"\n[s2] \"...Don't expect me to be that helpful.\""
2003202-14 = "Thank you, Sensei. Let's begin."
2003202-15 = "This was the first one I considered."
2003202-20 = "It's a little out of my usual wardrobe...but I hear it is the hottest fashion. So nothing ventured, nothing gained."
2003202-21 = "[s] \"Hmm...are you sure that's something you could wear casually around campus?\""
2003202-22 = "It's too gaudy? Ah... I was feeling bold in that fit."
2003202-23 = "Very well. What about this one then?"
2003202-27 = "It's office wear. Boring by itself, but when you remove the bottoms it becomes striking..."
2003202-28 = "What? It leaves too much skin exposed to the elements? Don't worry. That's why I have knee socks to keep warm."
2003202-29 = "Huh? It's about exposure to more than just the elements?"
2003202-30 = "Ah, I see. You're worried I look unprofessional without my necktie."
2003202-32 = "Eimi's special fashion training continued..."
2003202-34 = "How's this one? The periodical dubbed it retro style."
2003202-35 = "That's so last Tuesday? Trends can change in a matter of days?"
2003202-36 = "Hmm... This is quite the puzzle."
2003202-38 = "How's this one?"
2003202-42 = "They say this outfit is guaranteed to \"seal the deal.\" It'd be the perfect attire for negotiations with other schools. What do you think, Sensei?"
2003202-46 = "Or what about this one? It's so avant-garde, no?"
2003202-47 = "[s] \"Eimi, are you sure that these are fashion magazines?\""
2003202-49 = "I took a closer look at the magazines Eimi brought. They were all celebrity rags, or the most bleeding edge of new age fashion."
2003202-50 = "As such, Eimi's choices were all either ahead of their time, or utterly scandalous."
2003202-52 = "I picked out ones that looked pretty and trendy."
2003202-53 = "..."
2003202-54 = "[s] \"Eimi.\""
2003202-56 = "[ns3] \"How about I tag along when you go shopping?\"\n[ns4] \"We can find an outfit we both think is...fashionable.\""
2003202-59 = "Okay."
2003202-60 = "Yes. That'll work."
2003202-61 = "[s] \"That said...Eimi, I noticed all your picks earlier were closer to swimsuits than clothes...\""
2003202-62 = "Of course. I was looking for a swimsuit."
2003202-63 = "...I said I was looking for clothes not swimsuits? Sensei, don't you know? Swimsuits are clothes."
2003202-64 = "[s5] \"Just because you're correct doesn't mean you're right!\"\n[s6] \"Why can we never go shopping for normal clothes!\""
2003202-67 = "You have to face the facts, Sensei. Swimsuits are clothing."
2003202-69 = "And so, I promised to go swimsuit shopping with Eimi."
2003202-70 = "Eimi picked a few more options from her magazines for fun. Naturally, none of them were normal outfits."

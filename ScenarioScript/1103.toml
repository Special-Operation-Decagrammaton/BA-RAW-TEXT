[translation]
1103-1 = "An Unbiased Palate"
1103-2 = "(The Gourmet Research Society is paying a visit to Millennium's Veritas Laboratory.)"
1103-3 = "And that's why mint tastes like soap or shampoo to people with receptor OR6A4."
1103-4 = "Because it's a single nucleotide polymorphism gene—or an SNP gene."
1103-5 = "Fascinating. So, I guess it can't be cured?"
1103-6 = "Liking the taste of mint is not a disease. Why try to fix it?"
1103-7 = "That's right! You make it sound like it's a flaw or something. That's so mean!"
1103-8 = "We're being serious! What if there's something wrong with your nose or tongue?"
1103-9 = "Think of how it could interfere with your daily life. That's how disorders are formed."
1103-10 = "How bad could it be?"
1103-11 = "It all began 30 years ago..."
1103-12 = "That's too far back! What are you even talking about?!"
1103-13 = "The Prefect Team locked Izumi up yesterday for making and selling mint juice."
1103-14 = "Mint juice...? I've never heard of anything like that."
1103-15 = "It'd be weird to drink, sure, but was it really worth arresting her for?"
1103-16 = "Exactly! It's all one big conspiracy. Stop the mint hate!"
1103-17 = "She said it was mint juice, but it was actually toothpaste mixed with water. ☆"
1103-18 = "Oh, now I get it."
1103-19 = "...?!"
1103-20 = "Iori was saying something about tainted food when she took her in."
1103-22 = "(Iori of the Gehenna Prefect Team.)"
1103-24 = "(Note: Mint mania.)"
1103-26 = "But it tastes just like mint juice. Plus, it's good for your teeth...and cheap."
1103-27 = "Who would want it?! You can't peddle something like that just because you like it!"
1103-28 = "Anyway, Izumi likes mint because she doesn't have the receptor."
1103-29 = "Otherwise, she would think it tastes like shampoo or soap. "
1103-30 = "It's a congenital problem, so nothing will change it."
1103-32 = "That's right. I wouldn't eat shampoo or soap."
1103-33 = "I just eat mint because I like it!"
1103-34 = "Hmm. I guess we have no choice."
1103-35 = "That's right."
1103-36 = "Well, since you're all here, why don't we check and see who has the receptor?"
1103-37 = "They say the best way to accept others is to better understand yourself."
1103-38 = "Oh, my! That sounds like fun! ☆"
1103-39 = "You mean we can find out whether we think mint tastes like shampoo?"
1103-40 = "It's also relevant to my pursuit of the ultimate taste. My interest is piqued."
1103-43 = "Now, say, \"Aaah...\" This won't take long."
1103-45 = "(Moments later...)"
1103-47 = "Here are the results. First off, Akari has no receptor."
1103-48 = "Oh, really? Then, am I simply picky for not liking mint?"
1103-49 = "It wouldn't hurt to try it again with an open mind."
1103-52 = "Next up, Haruna. She does have the receptor."
1103-53 = "Mint must taste like shampoo or soap to you, Haruna."
1103-54 = "I expected this. I treat all flavors equally, but even I struggle with mint."
1103-55 = "To think it was due to my DNA. Still, that is no excuse to discriminate."
1103-58 = "Junko also lacks the receptor."
1103-59 = "I like pretty much anything—including mint."
1103-60 = "Next is Izumi."
1103-61 = "Isn't it already obvious that Izumi doesn't have the receptor? She loves mint so much."
1103-63 = "Yeah! Mint is delicious! I have no idea why people hate it."
1103-65 = "This says Izumi...does have the receptor."
1103-67 = "...?!"
1103-68 = "Wh-What?!"
1103-69 = "Oh, my. So mint tastes like shampoo or soap to Izumi?"
1103-70 = "Huh?"
1103-72 = "No way! You mean that's what shampoo tastes like?"
1103-73 = "You didn't know?! W-Wait, so you eat mint even though it tastes like shampoo?!"
1103-74 = "Taste is subjective so...there could be people out there that enjoy how shampoo tastes."
1103-75 = "I suppose... I mean, there has to be someone...right?"
1103-76 = "Wh-What are you going on about?! It's totally unnatural!"
1103-77 = "Why would anyone eat something that tastes like soap or shampoo? That's so dumb!"
1103-79 = "Wow... So that's what shampoo tasted like all along?"
1103-81 = "(smile) Does this mean I can eat shampoo now?"
1103-82 = "DON'T YOU DARE!"
1103-83 = "An Unbiased Palate"

[translation]
1103-1 = "無偏見的味覺"
1103-2 = "（前來訪問千年貝里塔斯的，美食研究會一同）"
1103-3 = "……也就是說，擁有受體OR6A4的人吃薄荷時，會感覺到類似肥皂或洗髮精的味道。"
1103-4 = "因為這是[ruby=SNP]核苷酸多態性[/ruby]所以──"
1103-5 = "……原來如此。也就是說，治療是不可能的沒錯嗎？"
1103-6 = "……這也不代表，喜歡薄荷是一種疾病唷。有需要特地「治療」嗎？"
1103-7 = "就是啊！把我當作病人真過分！"
1103-8 = "就說不是那種事了！是更深刻的問題哦！？也許嗅覺或味覺有異常！"
1103-9 = "畢竟發現在病理學上有問題的時候，就有可能已經帶給日常生活致命上的障礙了。"
1103-10 = "這個，那麼有問題嗎……？"
1103-11 = "事情的開端要回溯到30年前……"
1103-12 = "回溯太多了！妳打算說幾小時啊！？"
1103-13 = "唉。昨天，昨天做了薄荷果汁賣的時候，被風紀委員會發現抓進了拘留所。說的極端一點就是這樣。"
1103-14 = "薄荷果汁……？那是什麼……"
1103-15 = "確實是個奇怪的飲料，不過我也不認為那是會被風紀委員會逮捕的問題呢……"
1103-16 = "就是說啊！？全部都是那些傢伙的陰謀唷！反對差別對待薄荷～！"
1103-17 = "問題是，提倡著是薄荷果汁，賣的卻只是加了牙膏的水⁠呢☆"
1103-18 = "啊啊，那樣的話能理解。"
1103-19 = "！？"
1103-20 = "畢竟伊織也說著「這種事無法原諒」以非常恐怖的臉過來……"
1103-22 = "（伊織：格黑娜學園的風紀委員）"
1103-24 = "（參考情報：伊織喜歡薄荷類的飲食）"
1103-26 = "明明味道和薄荷果汁一樣……對牙齒也很好……而且又便宜……"
1103-27 = "那種東西誰要喝啊！！就算妳平常自己在喝也不要拿出來賣給大家！"
1103-28 = "總之，我推測泉同學恐怕是沒有受體，所以才會覺得薄荷味嚐起來很美味。"
1103-29 = "如果有受體的話，應該會認知成洗髮精或是肥皂之類的味道。"
1103-30 = "總結下來這是先天的問題，對於薄荷的認識有所不同。"
1103-32 = "就說了，就算是我也不會美味的吃著洗髮精或是肥皂嘛～"
1103-33 = "我真的是覺得這個好吃！"
1103-34 = "唔嗯，似乎是那樣呢……"
1103-35 = "嘛，畢竟難得來到這邊了。"
1103-36 = "要不要確認一下，各自是不是都有受體？"
1103-37 = "經由了解自己是什麼樣的人，也有可能會產生對他人的寬容。"
1103-38 = "啊啦，那似乎很有趣呢⁠☆"
1103-39 = "嘿～，那也就是說，可以調查各自是不是把薄荷認為像是洗髮精一樣的味道吧？"
1103-40 = "作為追求究極的美味，也許是個有趣的嘗試。"
1103-43 = "那就，啊～的把嘴巴張開。馬上就結束了。"
1103-45 = "（片刻之後……）"
1103-47 = "結果出來了唷。首先是亞伽里同學……無受體。"
1103-48 = "啊啦，是那樣嗎？那麼我不太喜歡薄荷是因為，先入觀嗎……？"
1103-49 = "也許是那樣，試著不帶著偏見再吃一次也許也不錯呢。"
1103-52 = "接下來是羽留奈同學……有受體。"
1103-53 = "也就是對羽留奈同學來說，薄荷有著和洗髮精或肥皂的味道呢。"
1103-54 = "如我的預期。雖然我對於所有味道都以平等的姿態對待，不過薄荷實在是無法容忍的味道。"
1103-55 = "果然是DNA的問題呢。當然，也不會因此差別對待薄荷。"
1103-58 = "淳子同學則是無受體。"
1103-59 = "嘛，我完全可以吃薄荷呀。"
1103-60 = "然後是泉同學。"
1103-61 = "泉沒有受體吧，畢竟這麼喜歡薄荷。"
1103-63 = "嗯！薄荷很美味！為什麼這麼好吃的東西會被大家討厭我無法理解。"
1103-65 = "泉同學……出現了……有受體的結果呢。"
1103-67 = "……！？"
1103-68 = "咦，哈啊！？"
1103-69 = "也就是說泉同學吃薄荷時，應該是感覺到洗髮精或是肥皂的味道才對……？"
1103-70 = "……啊啦？"
1103-72 = "咦咦咦咦咦咦～！？那個是洗髮精的味道嗎！？"
1103-73 = "吃了還不知道嗎！？話說剛才不是才說不會覺得洗髮精好吃嗎！？"
1103-74 = "嗯……嘛，畢竟世上也會有人覺得洗髮精或肥皂之類的好吃……"
1103-75 = "會有嗎……？應該有，大概……"
1103-76 = "妳在說什麼啊！怎麼可能有啊！？"
1103-77 = "明明有著洗髮精的味道怎麼可能會覺得好吃！？是笨蛋嗎！！妳是笨蛋吧！！！"
1103-79 = "嘿～這是洗髮精的味道啊……"
1103-81 = "也就是說……就算喝了市販的洗髮精，也是相同的味道吧！？"
1103-82 = "真的是笨蛋嗎！？！？"
1103-83 = "無偏見的味覺"

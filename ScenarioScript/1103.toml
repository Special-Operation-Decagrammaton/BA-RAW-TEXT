[translation]
1103-1 = "รสชาติที่ปราศจากอคติ"
1103-2 = "(ชมรมชิมอาหารไปเยี่ยมชมห้องทดลองเวอริทัสที่มิลเลเนียม)"
1103-3 = "...เพราะงั้นคนที่มีหน่วยเซลล์รับความรู้สึก OR6A4 อยู่ก็จะได้กลิ่นมินต์เหมือนกับกลิ่นแชมพู#nหรือสบู่ยังไงล่ะ"
1103-4 = "นี่คือการค้นหาเครื่องหมายโมเลกุลในพันธุกรรมน่ะ..."
1103-5 = "..... งั้นเองเหรอ สรุปว่ามันรักษาไม่ได้ใช่ไหม?"
1103-6 = "...แค่ชื่นชอบรสมินต์ มันไม่ได้ร้ายแรงอะไรสักหน่อย ต้องฝืนให้เลิกด้วยเหรอ?"
1103-7 = "ใช่แล้ว!  แบบนี้มันเกินไปนะ ทำกับคนอื่นเหมือนเป็นคนป่วยแบบนี้..."
1103-8 = "ไม่ใช่แบบนั้นสักหน่อย ถ้าเป็นแบบนี้คงมีปัญหาหนักแล้วล่ะ! อาจมีปัญหาที่ลิ้นหรือจมูกก็ได้นะ!"
1103-9 = "หากเกิดปัญหาขึ้นในชีวิตประจำวัน มันก็จะกลายเป็นปัญหาทางพยาธิวิทยาไปทันทีค่ะ"
1103-10 = "อาการหนักแค่ไหนกันนะเนี่ย..."
1103-11 = "จุดเริ่มต้นของปัญหานี้คือเมื่อ 30 ปีที่แล้ว..."
1103-12 = "ไกลเกินไปแล้ว! คิดจะพาฉันไปอีกไกลแค่ไหนเนี่ย!!"
1103-13 = "เมื่อวานตอนทำน้ำรสมินต์ไปขาย จู่ๆ พวกคณะกรรมการวินัยก็บุกมาจับตัวไปขังไว้..."
1103-14 = "น้ำรสมินต์...? มันคืออะไรเหรอ? อืม..."
1103-15 = "คงจะเป็นเครื่องดื่มประหลาดๆ แหงเลย แต่ฉันไม่คิดว่าจะเป็นปัญหาถึงขั้นต้องคุมตัวไปนะ..."
1103-16 = "ใช่แล้ว!! นี่มันเป็นการเลือกปฏิบัติชัดๆ! เลิกไม่ชอบกลิ่นมินต์กันสักที~!"
1103-17 = "เรียกว่าน้ำรสมินต์ค่ะ แต่ที่จริงมันคือยาสีฟันที่เอาไปละลายน้ำแล้วเอามาขายค่ะ☆"
1103-18 = "งั้นฉันก็ยอมรับ"
1103-19 = "?!!"
1103-20 = "อิโอริบอกว่าเป็นอาหารที่ไม่ได้คุณภาพแล้วก็จับตัวไป..."
1103-22 = "(อิโอริ คณะกรรมการวินัยเกเฮนน่า)"
1103-24 = "(หมายเหตุ: มินต์เลิฟเวอร์)"
1103-26 = "รสชาติเหมือนกันน้ำรสมินต์ทั่วๆ ไป... ดีต่อสุขภาพฟัน...แถมราคาถูกด้วย..."
1103-27 = "ใครจะไปอยากได้กันล่ะ! จะเที่ยวไปขายของแบบนั้นเพราะชอบมันไม่ได้หรอกนะ"
1103-28 = "แต่เพราะว่าคุณอิซุมิไม่มีหน่วยเซลล์รับความรู้สึกเลยทำให้รู้สึกว่ารสมินต์อร่อย"
1103-29 = "ไม่งั้นฉันคงจะรู้สึกว่ามันมีรสชาติเหมือนแชมพูกับสบู่ไปแล้วล่ะ"
1103-30 = "มันเป็นข้อบกพร่องที่มีมาแต่กำเนิด... ดังนั้นจึงแก้ไขอะไรไม่ได้"
1103-32 = "ใช่แล้ว เห็นแบบนี้ก็เถอะ ฉันไม่กินแชมพูหรือสบู่หรอกนะ..."
1103-33 = "ฉันคิดเพราะคิดว่ามันน่าอร่อยดีแท้ๆ...!"
1103-34 = "อืม... คงช่วยไม่ได้..."
1103-35 = "ก็แบบนั้นแหละ"
1103-36 = "ไหนๆ ก็มาที่ห้องแล็บกันแล้ว#nอยากลองทดสอบดูไหมว่าแต่ละคนมีหน่วยเซลล์รับความรู้สึกอยู่รึเปล่า?"
1103-37 = "ถ้ารู้ว่าตัวเองเป็นคนยังไงแล้วล่ะก็ เราก็จะรู้จักอดทนต่อนิสัยของคนอื่นด้วยเหมือนกัน"
1103-38 = "อุ๊ย... น่าสนุกจังเลยน้า☆"
1103-39 = "เอ๋~ เธอรู้ใช่ไหมว่าแต่ละคนอาจคิดว่ากลิ่นมินต์เป็นกลิ่นแชมพูก็ได้#nหรือว่าเป็นกลิ่นมินต์ธรรมดาก็ได้น่ะ?"
1103-40 = "นี่ก็เป็นส่วนหนึ่งของการตามหารสชาติที่ล้ำลึก น่าสนุกจริงๆ นะคะ"
1103-43 = "เอาล่ะ อ้าปากกว้างๆ สิ ไม่นานหรอก"
1103-45 = "(หลังจากนั้น)"
1103-47 = "ผลออกมาแล้วล่ะ คุณอาคาริ... ไม่มีหน่วยเซลล์รับความรู้สึกอยู่จริงๆ"
1103-48 = "เอ๊ะ? งั้นเหรอคะ? ถ้างั้นที่ฉันคิดว่าไม่ชอบกลิ่นมินต์ก็เป็นแค่การคิดไปเองเหรอคะ...?"
1103-49 = "ลองเลิกอคติแล้วลองชิมมันดูสิ"
1103-52 = "คุณฮารุนะเอง... ก็ไม่มีหน่วยเซลล์รับความรู้สึกเหมือนกัน"
1103-53 = "สำหรับคุณฮารุนะ รสมินต์คงจะเหมือนกับรสชาติของแชมพูหรือสบู่สินะ"
1103-54 = "คิดไว้แล้วเชียว... ถึงฉันจะไม่ได้ตั้งแง่กับรสชาติใดรสชาติหนึ่ง#nแต่ว่ารสมินต์เป็นรสที่ฉันชอบน้อยที่สุดจริงๆ ค่ะ"
1103-55 = "นี่เป็นปัญหาที่เกี่ยวข้องกับดีเอ็นเอสินะคะ แน่นอนว่าฉันไม่เคยแบ่งแยกรสมินต์นะคะแต่ว่า..."
1103-58 = "คุณจุนโกะไม่มีหน่วยเซลล์รับความรู้สึก"
1103-59 = "ถ้าเป็นมินต์ล่ะก็ ฉันกินได้ทุกอย่างเลยล่ะ"
1103-60 = "ต่อไปคุณอิซุมิ...."
1103-61 = "อิซุมิคงไม่มีหน่วยเซลล์รับความรู้สึกสินะ? ถึงได้ชอบกลิ่นมินต์ซะขนาดนั้น"
1103-63 = "อื้อ! รสมินต์อร่อยสุดยอด! ไม่รู้ทำไมถึงไม่ชอบของที่อร่อยๆ แบบนี้กันได้"
1103-65 = "ผลแสดงว่าคุณอิซุมิ... มีหน่วยเซลล์รับความรู้สึกอยู่นะ?"
1103-67 = "....?!"
1103-68 = "ว่ายังไงนะ?!"
1103-69 = "ตายจริง ถ้างั้นทุกครั้งที่คุณอิซุมิกินมินต์แล้วฉันรู้สึกเหมือนได้กลิ่นแชมพูหรือสบู่ก็เพราะ... "
1103-70 = "เอ๊ะ?"
1103-72 = "เอ๋~~~?  มีรสแชมพูด้วยเหรอ? "
1103-73 = "กินเข้าไปทั้งที่ไม่รู้งั้นเหรอ!! เดี๋ยวสิ ทั้งที่รู้แล้วทำไมถึงกินเข้าไปล่ะ!!"
1103-74 = "อะ...อืม เพราะในโลกนี้ก็มีคนที่ชื่นชอบกลิ่นสบู่กับกลิ่นของแชมพูอยู่เหมือนกัน...?"
1103-75 = "มีอยู่จริงๆ เหรอเนี่ย....? คงมีล่ะมั้ง....?"
1103-76 = "พะ...พูดอะไรน่ะ!! มีคนแบบนั้นที่ไหนเล่า!! "
1103-77 = "มันมีกลิ่นแชมพูกับกลิ่นสบู่โชยออกมาขนาดนั้นแล้ว จะกินเข้าไปทำไม!!#nโง่รึเปล่า!! เธอนี่มันสมองทึบชัดๆ!!!"
1103-79 = "แฮ่~ มีรสแชมพูอยู่ด้วย...จริงเหรอ?"
1103-81 = "(ยิ้มร่าเริง) ถ้างั้นก็หมายความว่ากินแชมพูได้น่ะสิ?"
1103-82 = "บอกว่าห้ามกินไงเล่า!!!"
1103-83 = "รสชาติที่ปราศจากอคติ"

[translation]
10013020-1 = "第2話;總之先整理狀況吧"
10013020-2 = "（就在大家為了準備而暫時離開的時候──）"
10013020-6 = "在這種情況下還這麼堅持己見……沒必要特地用這種沒有效率的方法吧。"
10013020-7 = "而且竟然連三森醬和知世都願意幫忙……哎呀，真是有點嚇到我了呢～"
10013020-8 = "老師真的有好好理解嗎？"
10013020-9 = "[s] 「嘛，雖然不能很肯定地說『這就是正解』。」"
10013020-13 = "[ns] 「但因為是靜子決定的事，所以想要支持他。」"
10013020-14 = "……原來如此。也就是說老師也不反對，是嗎？"
10013020-15 = "喵哈哈～我明白了。#n那掃興的話就到此為止吧。"
10013020-16 = "既然已經不需要我的建議了，說再多也沒用了吧。#n那就先這樣──"
10013020-17 = "[s] 「嗯，拜託你了，仁耶。」"
10013020-18 = "嗯～？老師在說什麼，我完全聽不懂耶～？#n喵哈哈♪"
10013020-27 = "啊，老師！你來了呀。"
10013020-28 = "[s] 「靜子！？那身打扮是……」"
10013020-29 = "啊，你說這個嗎？"
10013020-30 = "因為有可能會在海邊激烈地戰鬥嘛！#n所以就想說要換一套被水弄濕也沒關係的衣服。"
10013020-31 = "結果就是……"
10013020-32 = "像這樣穿上泳裝囉！"
10013020-33 = "怎麼樣啊？我河和靜子想出的這有備無患的戰略！以及這應對所有氣候的專業姿態！"
10013020-34 = "[s] 「啊，嗯……」"
10013020-35 = "呵呵呵♪"
10013020-36 = "……呼。"
10013020-44 = "那，那個，就是啊。#n嗯，雖然就是我剛才說的這樣沒錯──"
10013020-45 = "那個……如果，可以的話，老師看完的……那個……"
10013020-46 = "感……感想之類的──"
10013020-47 = "主──公──！！"
10013020-53 = "[ns] 「哇！伊，伊樹菜！？」"
10013020-59 = "是！不才伊樹菜，和靜子閣下一同──"
10013020-60 = "換上了與夏天的海邊相稱的服裝！"
10013020-64 = "您覺得如何呢，主公？伊樹菜有帥氣地變身嗎？"
10013020-68 = "[ns] 「啊，嗯。很帥氣喔。」"
10013020-69 = "等，等一下！伊樹菜……！"
10013020-70 = "哎呀，大家都很有精神呢。呵呵。"
10013020-71 = "老師，我也換衣服了唷。"
10013020-72 = "這樣就──"
10013020-73 = "能在海上跑了嗎？"
10013020-74 = "[s] 「我覺得……應該有點困難。」"
10013020-75 = "是這樣嗎？"
10013020-77 = "但是知世殿下！"
10013020-78 = "就算現在很困難，只要不怠於修練的話──"
10013020-79 = "總有一天就能像忍者那樣跑起來的！沒錯！大概！"
10013020-80 = "[s] 「有自信是件好事沒錯……！」"
10013020-85 = "[ns] 「大家都換上泳裝了呢。」"
10013020-86 = "是的。"
10013020-87 = "伊樹菜的泳裝是部長和月夜閣下挑選的！#n說是要在海邊執行任務的話或許會用到！原來如此，會在這種時候派上用場啊！"
10013020-88 = "仁耶部長說──在海邊穿這個會變強哦。"
10013020-89 = "[s] 「這，這樣啊……三森呢？」"
10013020-90 = "咦？啊，我是……那個……"
10013020-93 = "一跟椿醬和楓醬說要去海邊……他們就說要幫我準備適合我的泳裝……"
10013020-94 = "雖然有跟他們說過不是去玩的，而是靜子醬可能遇到危險所以才要去的……"
10013020-95 = "讓老師……幻滅了嗎？"
10013020-98 = "[ns1] 「怎麼會呢。畢竟難得來一次嘛。」\n[ns2] 「大家的泳裝都很適合喔。」"
10013020-101 = "是，是這樣嗎……"
10013020-102 = "也，也對！大家都有做好準備真是厲害！啊哈哈……"
10013020-103 = "沒錯！大家，真的都很適合喔！"
10013020-104 = "彷彿新的祭典要開始了一樣！"
10013020-105 = "早知道會這樣的話，我也帶泳衣來就好了呢～"
10013020-106 = "竟然能舉辦這麼大飽眼福的活動……來海邊真是太好了～！"
10013020-107 = "老師也這麼覺得吧？對吧？"
10013020-108 = "[s] 「嗯，嗯……對，對吧？」"
10013020-110 = "海花，老師會覺得困擾的……"
10013020-117 = "那麼，既然大家都到了，就來交換情報吧？"
10013020-124 = "根據仁耶同學調查的情報，#n現在在這個「失樂園渡假勝地」中嶄露頭角的集團大概是這個情況。"
10013020-125 = "大致上分成了七個呢……"
10013020-128 = "嗯。其中特別積極進行「渡假勝地狩獵」的是頭盔團。"
10013020-129 = "我們之前也跟他們交手過呢。總之就是很吵鬧的傢伙們。"
10013020-130 = "把他們視為到處都有活動據點和移動路線比較好呢。"
10013020-132 = "沒錯……不過也只有頭盔團比較特別。#n其他團體幾乎都隱藏了自己的身分，在暗中進行活動……"
10013020-133 = "因此比起正式的名稱，似乎更常被用外號稱呼。"
10013020-134 = "[s]「外號？」"
10013020-135 = "比方說，現在佔領距離這裡最近島嶼的團體是──"
10013020-140 = "「尋找夢幻溫泉的硫磺礦工們」……？"
10013020-141 = "真是浪漫的名字呢☆"
10013020-142 = "[s] 「浪漫……嗎？」"
10013020-145 = "其他還有像是「將敗者引向破滅的白耳怪物們」……"
10013020-148 = "啊！還有叫做「對一切要求代價的玄武使者們」的團體唷！主公！"
10013020-149 = "簡直就像是會跟忍者敵對的邪惡團體的名字呢！"
10013020-150 = "[s] 「雖然搞不太懂伊樹菜評斷善惡的標準……」"
10013020-151 = "……呃，這是什麼漫畫的設定嗎？"
10013020-153 = "還有，最後一個是──"
10013020-157 = "「到哪裡都要鬧事的頭盔團」。"
10013020-158 = "那不就是普通的頭盔團嗎！"
10013020-159 = "這就是所有情報了嗎。"
10013020-160 = "嗯……這樣比起得到了什麼情報，不如說是謎團一個接著一個……"
10013020-162 = "唔嗯……靜子醬，接下來該怎麼做呢？"
10013020-173 = "唔嗯……這樣看來……"
10013020-174 = "如果要更有效率地行動……"
10013020-181 = "……好，決定了。"
10013020-182 = "從現在起我們就兵分兩路吧。"
10013020-183 = "[s] 「咦？明明要進行『渡假勝地狩獵』卻要分頭行動？」"
10013020-184 = "是的。雖然確實會造成戰力的分散，但我認為這樣更有效率。"
10013020-185 = "況且就連現在，百夜堂的評價說不定也在持續下跌……"
10013020-186 = "也就是說，這是和時間的賽跑！"
10013020-187 = "[s3] 「我知道了。那麼隊伍就……」\n[s4] 「分成阿拜多斯和百鬼夜行兩邊──這樣比較好吧。」"
10013020-194 = "沒錯。按照地圖來看，我們是朝這個方向前進，那另一邊就交給阿拜多斯的各位了。"
10013020-195 = "唔嘿～那就這麼決定囉～？"
10013020-196 = "嗯。那麼大家一起──"
10013020-197 = "出發吧！"
10013020-199 = "了解！忍忍！"
10013020-200 = "[s] 「大家一起加油吧。」"
10013020-201 = "那麼，「失樂園渡假勝地」佔領作戰……"
10013020-202 = "現在開始！"

[translation]
10013020-1 = "Episode 2;Let's Get This Straight"
10013020-2 = "While everyone was off preparing..."
10013020-6 = "What is Shizuko thinking? My plan was so much better."
10013020-7 = "And to think Mimori and Chise defected too! What a plot twist."
10013020-8 = "What does our wise Sensei think?"
10013020-9 = "[s] \"Nothing, really. There's no right or wrong.\""
10013020-13 = "[ns] \"But I respect Shizuko's decision.\""
10013020-14 = "How infuriating. You haven't changed a bit."
10013020-15 = "Nyahaha! That's the end of my chapter in this boring story."
10013020-16 = "If my advice is just going to be ignored, I'll go back to where I'm valued."
10013020-17 = "[s] \"Okay, Niya. Good luck.\""
10013020-18 = "Luck? Nyahaha! I don't believe in such things, Sensei."
10013020-27 = "Welcome to the Beach Shack, Sensei!"
10013020-28 = "[s] \"Hi Shizuko... What are you wearing...?\""
10013020-29 = "What do you mean? My swimsuit, obviously."
10013020-30 = "It's going to be a fierce fight from here on out! We have to be prepared in every aspect."
10013020-31 = "Obviously, I have to be dressed for the environment."
10013020-32 = "Don't you think that was smart? I think of everything."
10013020-33 = "I'm a professional in all aspects! I prepare for every occasion."
10013020-34 = "[s] \"S-Sure... I guess that makes sense...\""
10013020-35 = "Heehee. Yes it does."
10013020-36 = "Heh."
10013020-44 = "S-So...that's why I'm wearing it, but..."
10013020-45 = "...D-D-Do you have any opinions...about my swimsuit?"
10013020-46 = "Y-You know, maybe how g-good I look?"
10013020-47 = "My loooooooord!"
10013020-53 = "[ns] \"Whoa, I-Izuna?!\""
10013020-59 = "Yup! Izuna's just like Shizuko!"
10013020-60 = "Izuna changed into an appropriate battle suit!"
10013020-64 = "It's like ninjutsu! Do you like it, my lord?"
10013020-68 = "[ns] \"Um... Sure...\""
10013020-69 = "Ugh. Izuna...!"
10013020-70 = "It's wonderful to see everyone so full of energy."
10013020-71 = "Sensei. Can you tell it's me? I'm in disguise."
10013020-72 = "I changed my clothes, so..."
10013020-73 = "Can I run on water now?"
10013020-74 = "[s] \"No. Please don't try to.\""
10013020-75 = "How strange."
10013020-77 = "However! Chise!"
10013020-78 = "You may not be able to now, but you should try practicing ninjutsu!"
10013020-79 = "Because ninjas can run on water! Izuna thinks you'd be able to too!"
10013020-80 = "[s] \"Confidence isn't a bad thing, but...!\""
10013020-85 = "[ns] \"Anyway, everyone was quick to change.\""
10013020-86 = "Oh, yes..."
10013020-87 = "Tsukuyo and the President picked this out for me! They were so proud of me for going on a mission all by myself. Heehee!"
10013020-88 = "President Niya told me it would raise my power while at the beach."
10013020-89 = "[s] \"If she says so... What about you, Mimori?\""
10013020-90 = "Oh... M-Me?"
10013020-93 = "I told Tsubaki and Kaede I had some business on the beach, and they got very excited..."
10013020-94 = "I came here out of concern for Shizuko, not to shirk my responsibilities with a vacation."
10013020-95 = "I feel a bit...embarrassed."
10013020-98 = "[ns1] \"It's okay, you don't get to go to the beach very often.\"\n[ns2] \"I'm glad everyone is so excited.\""
10013020-101 = "Th-Thank you, Sensei."
10013020-102 = "I-I thought so, too!"
10013020-103 = "I agree! It's great to see everyone out of their uniforms."
10013020-104 = "It's a little slice of paradise! Maybe we should start a festival here."
10013020-105 = "...I wish I brought a swimsuit as well."
10013020-106 = "I guess this just means I can appreciate the beauty of the festival from a distance."
10013020-107 = "Right, Sensei?"
10013020-108 = "[ns] \"Y-Yeah, sure...?\""
10013020-110 = "Umika, give Sensei some space..."
10013020-117 = "Now that the fashion show is over, let's share information."
10013020-124 = "According to Niya, there are multiple prominent factions at the Lost Paradise Resort."
10013020-125 = "She believes there to be around four..."
10013020-128 = "Yes. The most aggressive of them are the Helmet Gangsters."
10013020-129 = "They were the ones who attacked us. Obnoxious and loud."
10013020-130 = "Fortunately, this means their locations and supply paths have been well-documented."
10013020-132 = "They're really the only group we have a lot of intel on. The others have been moving as quietly as possible."
10013020-133 = "The Helmet Gangsters are the only ones brazen enough to not use a code name."
10013020-134 = "[s] \"Code name?\""
10013020-135 = "Yes, the factions have taken on code names to hide their identities. For example, on the island right next to us..."
10013020-140 = "\"Sulfur Miners Searching for Scorching Lands That Boil Eternally.\""
10013020-141 = "How lovely! It's so romantic! ☆"
10013020-142 = "[s] \"R-Romantic...?\""
10013020-145 = "There's also, \"White-Eared Monsters That Destroy Losers...\""
10013020-148 = "Oh, and this one reads, \"Messengers of the Black Tortoise Who Demand Constant Compensation,\" my lord!"
10013020-149 = "Oh! They sound like the evil villains who fight ninjas!"
10013020-150 = "[s] \"I don't really see the connection...\""
10013020-151 = "I think they sound like cartoon characters."
10013020-153 = "And the last code name..."
10013020-157 = "Oh. \"Helmet Gangsters Who Pick Random Fights Anytime.\""
10013020-158 = "Who uses their actual name in a code name?"
10013020-159 = "At least it tells us who they are. We don't have much more information."
10013020-160 = "Yeah... We're still in the dark about a lot of stuff."
10013020-162 = "Um... What should our next move be, Shizuko?"
10013020-173 = "Well... Umm... I think we should..."
10013020-174 = "Hmm. To operate more efficiently..."
10013020-181 = "Okay. I have a proposal."
10013020-182 = "Let's split up into two teams."
10013020-183 = "[s] \"Do you think that's safe?\""
10013020-184 = "It might be a little more dangerous, but this will speed things up."
10013020-185 = "The reputation of Momoyodou is declining as we speak."
10013020-186 = "So it's a race against the clock!"
10013020-187 = "[s3] \"I'm guessing we'll split by schools?\" \n[s4] \"We'll divide into Abydos and Hyakkiyako teams, then.\""
10013020-194 = "Yes, we'll be able to cover more ground. We'll head this way, and Abydos that way."
10013020-195 = "Nice thinking, Shizuko."
10013020-196 = "Indeed! Best of luck, everyone."
10013020-197 = "Let's make the greatest festival ever!"
10013020-199 = "A ninja is always ready! Let's go!"
10013020-200 = "[s] \"Stay safe, every one of you.\""
10013020-201 = "Yes! Starting now, the occupation battle of the Lost Paradise Resort..."
10013020-202 = "...begins!"

[translation]
10013020-1 = "ตอนที่ 2; สะสางสถานการณ์"
10013020-2 = "(ในระหว่างที่ทุกคนออกไปเตรียมตัว)"
10013020-6 = "สถานการณ์แบบนี้ยังจะมาดื้ออยู่อีก คุณชิซุโกะนี่ก็เหลือเกิน~ นั่นน่าจะไม่ใช่ทางเลือกที่ดีเลย"
10013020-7 = "แถมมิโมริกับชิเซะก็ยังไปเออออด้วยอีก หัวจะปวด~ เลยละค่ะ~"
10013020-8 = "คุณครูล่ะคะ คิดว่ายังไงบ้างคะ~?"
10013020-9 = "[s] \"คงบอกได้แค่ว่า ครูก็ไม่รู้หรอกว่าคำตอบที่ถูกต้องคืออะไร\""
10013020-13 = "[ns] \"ก็แค่เคารพในการตัดสินใจของชิซุโกะน่ะ\""
10013020-14 = "จริงเหรอ~ คุณก็ไม่ปฏิเสธวิธีของเธอเหรอคะเนี่ย?"
10013020-15 = "อะฮะฮ่ะ ค่ะ เข้าใจแล้วค่ะ! งั้นเลิกคุยเรื่องน่าเบื่อกันดีกว่า"
10013020-16 = "ถ้าคำแนะนำของฉันไม่ได้ผล~ ฉันก็คงต้องกลับไปทำธุระของตัวเองแล้วค่ะ"
10013020-17 = "[s] \"อืม ครูฝากด้วยนะ นิยะ\""
10013020-18 = "หืม... ฉันไม่เข้าใจสักนิดเลยค่ะว่าคุณครูพูดถึงเรื่องอะไร อะฮะฮ่ะ~"
10013020-27 = "อ๊ะ คุณครู ออกมาก่อนแล้วเหรอคะเนี่ย"
10013020-28 = "[s] \"อ๊ะ... ชิซุโกะ... ใส่ชุดอะไรมาน่ะ...\""
10013020-29 = "คะ? นี่เหรอคะ? ก็ชุดว่ายน้ำไงคะ?"
10013020-30 = "สงครามที่ดุเดือดกำลังจะก่อตัวในทะเลนั่น! ฉันก็เลยคิดว่าถ้าไม่ใส่ชุดให้เข้ากับสถานที่ก็คงไม่ได้ฟีล"
10013020-31 = "ค่ะ! ฉันก็เลยไปเปลี่ยนเป็นชุดว่ายน้ำมาค่ะ!"
10013020-32 = "เป็นยังไงบ้างคะกับการเตรียมพร้อมของคาวาวะ ชิซุโกะ?!"
10013020-33 = "การรับมืออย่างสมบูรณ์ของมืออาชีพแบบในทุกสภาพอากาศ!"
10013020-34 = "[s] \"อ่า... อื้ม...\""
10013020-35 = "ฮุฮุ..."
10013020-36 = "ฮุ..."
10013020-44 = "พะ... เพราะงี้ฉันก็เลย... มาอธิบายไว้ก่อนค่ะ"
10013020-45 = "ผะ... ผะ... เผื่อว่า... คุณครูเห็นแล้ว... จะได้"
10013020-46 = "ชะ... ชะ... ชมฉัน..."
10013020-47 = "นายยยย...ท่านนนนน!!"
10013020-53 = "[ns] \"อ๊ะ? อิซุนะ?!\""
10013020-59 = "ค่ะ! อิซุนะก็ได้ไอเดียมาจากท่านชิซุโกะ!"
10013020-60 = "ก็เลยไปเปลี่ยนชุดต่อสู้ที่เข้ากับสภาพแวดล้อมของทะเลฤดูร้อนมาค่ะ!"
10013020-64 = "เป็นยังไงบ้างคะ?! นายท่าน! ลุคใหม่ของอิซุนะ เท่สุดๆ ไปเลยมั้ยคะ?!"
10013020-68 = "[ns] \"อ่า... อื้ม... เท่จังเลย\""
10013020-69 = "ดะ... เดี๋ยว...! อิซุนะ!"
10013020-70 = "ทุกคนดูตื่นเต้นจังเลยนะคะ ฮุฮุ"
10013020-71 = "คุณครู ฉันปลอมตัวมาแล้ว"
10013020-72 = "พอเปลี่ยนชุดแบบนี้ ฉันก็คง..."
10013020-73 = "ออกไปวิ่งเล่นในทะเลได้ใช่มั้ย?"
10013020-74 = "[s] \"ครูว่า... น่าจะไม่สะดวกนะ\""
10013020-75 = "จริง... เหรอ?"
10013020-77 = "ท่านชิเซะ!"
10013020-78 = "ถึงตอนนี้จะยังยากอยู่ก็ตาม แต่ถ้าฝึกฝนศาสตร์นินจาและพยายามต่อไปเรื่อยๆ!"
10013020-79 = "อิซุนะว่าสักวันต้องวิ่งฉิวได้เหมือนนินจาแน่นอนค่ะ! อื้ม! อาจจะนะคะ!"
10013020-80 = "[s] \"การมีความมั่นใจก็เป็นเรื่องที่ดีหรอกนะ...!\""
10013020-85 = "[ns] \"แต่กลายเป็นว่าทุกคนใส่ชุดว่ายน้ำกันหมดเลยแฮะ\""
10013020-86 = "อ๊ะ... ค่ะ!"
10013020-87 = "หัวหน้าและท่านสึคุโยะเป็นคนเลือกชุดว่ายน้ำให้อิซุนะค่ะ! ทุกคนบอกว่ามาทำภารกิจที่ทะเล ก็เลยให้เตรียมชุดเผื่อไว้ด้วย! ในที่สุดก็ได้หยิบมาใช้จนได้นะคะ!"
10013020-88 = "ส่วนฉัน... หัวหน้านิยะบอกว่าถ้าใส่... ฉันอาจจะแข็งแกร่งขึ้นในทะเลได้... ก็เลย"
10013020-89 = "[s] \"อ่อ... อืม... แล้วมิโมริล่ะ?\""
10013020-90 = "อ๊ะ... ฉะ... ฉัน... คือว่า..."
10013020-93 = "พอบอกคนอื่นว่าต้องมาทำธุระที่ทะเล สึบากิจังกับคาเอเดะจังก็เลยช่วยหาชุดที่เข้ากับฉัน..."
10013020-94 = "ฉันไม่ได้มาที่นี่เพื่อเล่นสนุกหรอกนะคะ แต่มาเพราะว่าได้ยินว่าชิซุโกะจังกำลังตกอยู่ในอันตราย..."
10013020-95 = "ฉันไม่มี... ความละอายใจ... เลยใช่มั้ยคะ?"
10013020-98 = "[ns1] \"ไม่หรอก ก็มาทะเลทั้งทีนี่เนอะ\"\n[ns2] \"ทุกคนตอนใส่ชุดว่ายน้ำนี่ดูดีกันมากๆ เลย\""
10013020-101 = "งะ... งั้นเหรอคะ?"
10013020-102 = "อื้ม! ก็ใช่สิคะ! ฉันก็คิดแบบนั้นค่ะ!"
10013020-103 = "อื้ม! เหมาะกับทุกคนมากเลยค่ะ!"
10013020-104 = "นี่มันสวรรค์บนดินชัดๆ! ฉันแอบคิดเลยนะคะว่ามีจัดงานเทศกาลอะไรที่ฉันไม่รู้หรือเปล่า!"
10013020-105 = "รู้งี้ฉันเตรียมชุดว่ายน้ำมาด้วยก็ดี!"
10013020-106 = "ไม่สิ! ถ้ามีงานเทศกาลแบบนี้ การถอยออกมาแล้วดื่มด่ำบรรยากาศตรงหน้าอย่างสุขุมก็เป็นอีก#nทางเลือกที่ดี..."
10013020-107 = "ว่ามั้ยคะคุณครู?!"
10013020-108 = "[s] \"อะ... อือ... งั้นเหรอ?\""
10013020-110 = "อุมิกะ อย่าทำให้คุณครูลำบากใจสิ..."
10013020-117 = "แหะๆ~ ไหนๆ เราก็อยู่กันพร้อมหน้าแล้ว เราลองมาสะสางและสรุปสถานการณ์ด้วยข้อมูลที่ตัวเองมี#nกันดีมั้ย?"
10013020-124 = "ตามข้อมูลที่คุณนิยะสืบมา ตอนนี้ <ลอสต์ พาราไดซ์ รีสอร์ต> แห่งนี้มีกองกำลังที่มีความสามารถอยู่"
10013020-125 = "ประมาณ... 7 กลุ่มค่ะ..."
10013020-128 = "อื้ม โดยเฉพาะอย่างยิ่ง กลุ่มที่กระตือรือร้นในการล่ารีสอร์ตที่สุดคือ แก๊งหมวกกันน็อก"
10013020-129 = "พวกที่บุกมาหาเรื่องพวกฉันเมื่อคราวก่อนน่ะ เจ้าพวกนั้นชอบสร้างแต่เรื่องวุ่นวาย"
10013020-130 = "พวกนั้นเคลื่อนไหวมากที่สุด เราเลยรู้ตำแหน่งและเส้นทางการเคลื่อนไหวของพวกนั้นหลายทางเลย#nนะคะ"
10013020-132 = "ใช่ค่ะ แก๊งหมวกกันน็อกถือเป็นกรณีพิเศษ เพราะส่วนใหญ่จะเคลื่อนไหวอย่างเงียบๆ และปกปิด#nตัวตนของตัวเองไว้ใต้ผืนน้ำค่ะ"
10013020-133 = "และดูเหมือนจะใช้สมญานามบางอย่างแทนที่จะใช้ชื่อทางการนะคะ"
10013020-134 = "[s] \"สมญานาม?!\""
10013020-135 = "อย่างเช่นกองกำลังที่ตั้งอยู่บนเกาะที่ใกล้ที่สุดจากที่นี่..."
10013020-140 = "<คนงานเหมืองกำมะถัน ผู้ใฝ่ฝันในปฐพีร้อนระอุ>...?"
10013020-141 = "โอ๊ะ~☆ ใช้ประโยคชวนฝันโรแมนติกดีจังเลยนะคะ~☆"
10013020-142 = "[s] \"ระ... โรแมนติกงั้นเหรอ...?\""
10013020-145 = "นอกจากนี้ก็ยังมีที่เขียนว่า <สัตว์ประหลาดหูขาว ผู้เข้าสยบผู้แพ้> ด้วยค่ะ"
10013020-148 = "อ๊ะ ตรงนี้มีข้อความว่า <ทูตแห่งเทพเต่าดำกำลังเรียกร้องค่าตอบแทนของทุกสิ่ง> ด้วยค่ะนายท่าน!"
10013020-149 = "อืม! เหมือนชื่อวายร้ายที่ต่อสู้กับนินจาเลยค่ะ!"
10013020-150 = "[s] \"ครูไม่ค่อยรู้มาตรฐานของอิซุนะเท่าไรน่ะ...\""
10013020-151 = "หรือว่าจะมาจากการ์ตูน...?"
10013020-153 = "และข้อความสุดท้ายที่เขียนไว้..."
10013020-157 = "อ่า... <แก๊งหมวกกันน็อกที่เดิมพันทุกคนที่เจอด้วยการต่อสู้>"
10013020-158 = "แก๊งหมวกกันน็อกอีกแล้ว!"
10013020-159 = "นี่คือข้อมูลทั้งหมดที่เรามีตอนนี้เหรอ"
10013020-160 = "อืม... นี่จะเรียกว่าเรามีข้อมูล หรือจะเรียกว่ามืดแปดด้านดีนะ..."
10013020-162 = "อืม เราจะทำยังไงดีคะ ชิซุโกะจัง?"
10013020-173 = "อืม... ฉันว่า..."
10013020-174 = "อืม.... ถ้าจะเคลื่อนไหวให้มีประสิทธิภาพมากกว่านี้..."
10013020-181 = "อืม ฉันตัดสินใจแล้ว"
10013020-182 = "จากนี้เราจะแบ่งทีมเป็น 2 ทีม"
10013020-183 = "[s] \"หืม? แบ่งเป็น 2 ทีมแล้วจะล่ารีสอร์ตได้เหรอ?\""
10013020-184 = "ค่ะ ถึงการแบ่งกลุ่มจะทำให้อ่อนแอลง แต่ฉันคิดว่าแบบนั้นจะมีประสิทธิภาพกว่าค่ะ"
10013020-185 = "ในระหว่างที่เราอยู่กันทางนี้ ชื่อเสียงของร้านเฮียกคิยาโคอาจจะตกต่ำอยู่ก็เป็นได้"
10013020-186 = "นี่ก็เลยเป็นการต่อสู้กับเวลาค่ะ!"
10013020-187 = "[s3] \"อื้ม เข้าใจแล้ว งั้นแบ่งทีมกัน...\"\n[s4] \"แบ่งเป็นทีมอะบิดอสและเฮียกคิยาโคก็แล้วกัน\""
10013020-194 = "ค่ะ ถ้าดูจากแผนที่นี้ ทางนี้คือที่ที่พวกฉันจะมุ่งหน้าไปค่ะ ส่วนทีมอะบิดอส ฝากจัดการทางนั้นด้วยนะคะ"
10013020-195 = "แหะๆ~ งั้นเอาตามนี้เลยนะ~?"
10013020-196 = "ค่ะ ถ้างั้นก็"
10013020-197 = "ออกเดินทางได้ค่ะ!"
10013020-199 = "ค่าา! นินนิน!"
10013020-200 = "[s] \"มาพยายามไปด้วยกันนะ\""
10013020-201 = "อื้ม! เริ่มสงครามยึดครอง <ลอสต์ พาราไดซ์ รีสอร์ต>..."
10013020-202 = "ณ บัดนี้!"

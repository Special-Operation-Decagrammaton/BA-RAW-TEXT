1001106-27 = "3;슌;05\n#wait;1000\n#3;closeup\n#3;a"
1001106-28 = "3;슌;05;아까 지켜보니 선생님께서 학생들에게 높게높게를 해주고 계시더라고요.\n#3;closeup"
1001106-29 = "3;슌;02;무슨 문제가 있느냐고요? 아뇨, 선생님께서 시간을 내 매화원 학생들과 놀아주신거니 오히려 제가 감사를 드려야 할 정도죠.\n#3;em;[?]\n#3;closeup"
1001106-30 = "3;슌;99;다만 개인적인 문제라면…… 어째서 제게는 높게높게를 해주시지 않느냐는 점 정도에요.\n#3;em;[...]\n#3;closeup"
1001106-31 = "3;슌;01;저도 높게높게 좋아하는데…… 양 팔을 들어 펄쩍 날아오르는 걸 느껴보고 싶은데……!\n#3;em;[!]\n#3;closeup\n#3;hophop"
1001106-32 = "[s] \"하지만, 슌은 아이들과 다르게 무게가……\""
1001106-33 = "3;슌;05;지금 숙녀의 몸무게를 입에 담으신 건가요, 선생님?\n#3;em;[!]\n#3;closeup"
1001106-34 = "[s] \"알겠어. 슌에게도 높게높게를 해줄게.\""
1001106-35 = "3;슌;03;정말이죠? 어머나, 기뻐라~\n#3;em;[반짝]\n#3;closeup"
1001106-36 = "3;슌;01;자, 양팔을 벌리고 있을 테니 선생님께서 끌어안듯 저를 들어올려주세요.\n#3;closeup"
1001106-37 = "[s] \"자, 그럼 높게……\""
1001106-38 = "3;슌;03\n#3;greeting\n#3;closeup\n#3;h\n#wait;1500"
1001106-39 = "3;슌;04;하읏!?\n#3;em;[?!]\n#3;shake"
1001106-40 = "3;슌;06;아, 아, 아무것도 아녜요. 다시 처음부터……."
1001106-41 = "3;슌;06\n#3;d\n#wait;1000"
1001106-42 = "3;슌;06\n#3;h\n#3;closeup\n#wait;1000\n#3;a"
1001106-43 = "3;슌;04\n#3;greeting\n#3;h\n#wait;1000"
1001106-44 = "3;슌;04;하으으……\n#3;em;[속상함]\n#3;stiff"
1001106-45 = "3;슌;06;자, 자꾸 선생님의 팔이 겨드랑이에 닿으니 참을 수 없이 간지러워져서……"
1001106-46 = "3;슌;06;역시 어린아이가 하는 놀이를 어른이 하지 않는 데에는 이유가 있었군요."
1001106-47 = "3;슌;04;높게높게가 이렇게 부끄럽고 민망한 놀이였을 줄이야……\n#3;em;…"
1001106-48 = "3;슌;01;하는 수 없지요. 대신 저는 선생님의 허그를 받아가도록 할게요."
1001106-49 = "3;슌;01\n#3;h\n#3;d\n#wait;1000"
1001106-50 = "3;슌;01\n#3;closeup\n#3;h\n#wait;1500\n#3;a"
1001106-51 = "3;슌;01;후후, 이것도 높게높게 만큼은 아니지만 충분히 즐겁네요.\n#3;closeup"
1001106-52 = "3;슌;03;오늘은 충분히 만족했어요. #n고마워요, 선생님.\n#3;em;[하트]\n#3;closeup"

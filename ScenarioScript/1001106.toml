[translation]
1001106-1 = "สูงอีก สูงอีก!"
1001106-2 = "สวนต้นบ๊วย ซานไห่จิง"
1001106-3 = "คุณครู...! คุณครู!"
1001106-4 = "มาเล่น \"ชูสูงๆ\" กันเถอะ!"
1001106-5 = "[s] \"ชูสูงๆ งั้นเหรอ....?\""
1001106-6 = "ไม่รู้จักการเล่น \"ชูสูงๆ\" เหรอ?"
1001106-7 = "คุณครูต้องจับตรงใต้แขนของฉันแบบนี้ แล้วก็อุ้มฉันขึ้นสูงๆ ให้เหมือนกับบินอยู่ไงล่ะ"
1001106-8 = "พี่ชุนมักจะเล่นกับพวกเราแบบนี้เสมอๆ เลย... คุณครูเล่นกับพวกเราไม่ได้เหรอ?"
1001106-9 = "[s] \"เล่นได้สิ เดี๋ยวจะอุ้มให้สูงๆ เลย\""
1001106-10 = "ว้าววว สนุกจังเลยยย!"
1001106-11 = "[s] \"สูงๆ... สูงๆ...\""
1001106-12 = "ว้าว เหมือนบินอยู่บนท้องฟ้าเลยละ!"
1001106-13 = "ขอบคุณนะคะคุณครู!"
1001106-14 = "อ๊ะ ไม่แฟร์เลย! ฉันก็อยากเล่นเหมือนกันนะ!"
1001106-15 = "เล่นกับฉันด้วยสิ คุณครู!"
1001106-16 = "[s] \"เดี๋ยวจะเล่นกับทุกคนเลย ต่อคิวก่อนนะ\""
1001106-17 = "ฮ่าฮ่าฮ่า สนุกจังเลยยย! สูงอีกๆ สูงอีก!"
1001106-18 = "ถึงตาฉันแล้วนะ!"
1001106-21 = ".....\n"
1001106-23 = "ห้องเรียน ซานไห่จิง"
1001106-28 = "เมื่อครู่นี้ฉันเห็นคุณครูเล่น \"ชูสูงๆ\" กับพวกเด็กๆ ด้วยค่ะ"
1001106-29 = "เป็นอะไรรึเปล่างั้นเหรอคะ? เปล่าค่ะ ฉันแค่อยากขอบคุณคุณครูที่แบ่งเวลามาเล่นกับพวกเด็กๆ#nก็เท่านั้นเองค่ะ"
1001106-30 = "แต่ถ้าถามว่ามีปัญหาอะไรรึเปล่าละก็... คงเป็นเพราะคุณครูยังไม่ได้เล่น \"ชูสูงๆ\" กับฉันเลยนะคะ..."
1001106-31 = "ฉันเองก็ชอบเล่น \"ชูสูงๆ\" เหมือนกันนะคะ ฉันอยากให้คนอุ้มแล้วรู้สึกเหมือนบินอยู่บนท้องฟ้า#nบ้างค่ะ...!"
1001106-32 = "[s] \"แต่เธอโตกว่าเด็กคนอื่นๆ เยอะเลย...\""
1001106-33 = "คุณครูจะพูดเรื่องน้ำหนักกับสุภาพสตรีงั้นเหรอคะ?"
1001106-34 = "[s] \"รู้แล้วๆ เดี๋ยวครูจะเล่นชูสูงๆ กับชุนเอง\""
1001106-35 = "จริงเหรอคะ? ดีใจจังเลยค่ะ~"
1001106-36 = "ฉันจะกางแขนไว้นะคะ ช่วยอุ้มฉันขึ้นในท่ากอดแบบนี้ด้วยนะคะ"
1001106-37 = "[s] \"เอาละนะ สูงอีกๆ...\""
1001106-39 = "เอ๋~!?"
1001106-40 = "มะ...ไม่มีอะไรหรอกค่ะ ลองใหม่นะคะ..."
1001106-44 = "ฮ่า..."
1001106-45 = "คุณครูทำให้ฉันรู้สึกจั๊กจี้จนจะกลั้นหัวเราะไม่อยู่น่ะค่ะ..."
1001106-46 = "ว่าแล้วเชียว การเล่นแบบนี้คงเหมาะสำหรับเด็กๆ เท่านั้น"
1001106-47 = "ฉันไม่คิดเลยว่าการเล่นชูสูงๆ มันจะทำให้รู้สึกเขินแบบนี้...."
1001106-48 = "ช่วยไม่ได้นะคะ งั้นฉันจะขอกอดคุณครูแทนแล้วกันค่ะ"
1001106-51 = "ฮุฮุ ถึงไม่สนุกเท่ากับการเล่นชูสูงๆ แต่ก็ถือว่าน่าพอใจทีเดียวค่ะ"
1001106-52 = "วันนี้ฉันสนุกมากเลยค่ะ ขอบคุณนะคะคุณครู"

1001106-1 = "#title;높게 높게"
1001106-2 = "#place;산해경 매화원"
1001106-3 = "#na;매화원 학생;선생님, 선생님!"
1001106-4 = "#na;매화원 학생;나 말이지- 높게 높게 해줘!"
1001106-5 = "[s] \"높게 높게……?\""
1001106-6 = "#na;매화원 학생;높게 높게, 모르는 거야?"
1001106-7 = "#na;매화원 학생;이렇게 팔을 잡고 높이 올려서 날아다니는 것처럼 해주는 놀이야."
1001106-8 = "#na;매화원 학생;슌 언니는 가끔 해줬는데…… 선생님은 못해?"
1001106-9 = "[s] \"아니야, 높게 높게 해줄게.\""
1001106-10 = "#na;매화원 학생;와, 신난다!"
1001106-11 = "[s] \"높게- 높게-\""
1001106-12 = "#na;매화원 학생;와, 정말 하늘을 나는 것 같아!"
1001106-13 = "#na;매화원 학생;고마워, 선생님!"
1001106-14 = "#na;매화원 학생;아앗, 치사해! 선생님, 나도 나도!"
1001106-15 = "#na;매화원 학생;나도 높게 높게 해줘, 선생님!"
1001106-16 = "[s] \"모두 해줄 테니까 다들 차례를 지켜서 기다려줘.\""
1001106-17 = "#na;매화원 학생;하하하, 신난다! 높다, 높아!"
1001106-18 = "#na;매화원 학생;이젠 내 차례야!"

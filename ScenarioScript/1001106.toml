[translation]
1001106-1 = "Higher and Higher"
1001106-2 = "Shanhaijing Plum Blossom Garden"
1001106-3 = "Sensei! Sensei!"
1001106-4 = "Could you do Higher and Higher for me?!"
1001106-5 = "[s] \"Higher and Higher...?\""
1001106-6 = "You don't know Higher and Higher?"
1001106-7 = "It's a game where you hold me up under my arms and make me feel like I'm flying."
1001106-8 = "Shun would play it with us all the time... Can we?"
1001106-9 = "[s] \"One 'Higher and Higher', coming right up.\""
1001106-10 = "Yippee! Hurray!"
1001106-11 = "[s] \"Higher. And higher...\""
1001106-12 = "Wow, I really feel like I'm flying!"
1001106-13 = "Thanks, Sensei!"
1001106-14 = "That's not fair! Me too, Sensei! Me too!"
1001106-15 = "Do Higher and Higher for me too, Sensei!"
1001106-16 = "[s] \"Everyone will get a turn. Don't worry.\""
1001106-17 = "Hahaha. This is great! It's so high!"
1001106-18 = "It's my turn now!"
1001106-21 = "..."
1001106-23 = "Shanhaijing Classroom"
1001106-28 = "I saw that you were playing Higher and Higher with the students."
1001106-29 = "A problem? No, of course not. I wanted to thank you for spending time with them."
1001106-30 = "If I do have one grievance...it's that you haven't offered to play Higher and Higher with me."
1001106-31 = "I've always quite enjoyed the game myself... I miss that feeling of flying when lifted up by my arms!"
1001106-32 = "[s] \"You're a little bigger than the others, Shun...\""
1001106-33 = "I hope you aren't commenting on a lady's weight, Sensei."
1001106-34 = "[s] \"Perish the thought. One game of Higher and Higher it is.\""
1001106-35 = "You mean it? Oh, my! How exciting!"
1001106-36 = "Very well. I'll open my arms and you pick me up like you're hugging me."
1001106-37 = "[s] \"Now, higher...\""
1001106-39 = "Ahhh!"
1001106-40 = "I-It's nothing. Once more, please..."
1001106-44 = "Haaahaaa..."
1001106-45 = "My underarms are...rather ticklish, to tell the truth."
1001106-46 = "I suppose that's another reason this game isn't suited for adults. "
1001106-47 = "I never knew Higher and Higher could be so embarrassing..."
1001106-48 = "Then, I'll have to settle for a hug from Sensei instead."
1001106-51 = "Heehee. This isn't quite as thrilling as Higher and Higher, but it's still enjoyable."
1001106-52 = "I'm satisfied. Thank you, Sensei."

[translation]
1001106-1 = "飛高高"
1001106-2 = "山海經．梅花園"
1001106-3 = "老師，老師！"
1001106-4 = "我要飛高高！"
1001106-5 = "[s] 「飛高高……？」"
1001106-6 = "你不知道飛高高嗎？"
1001106-7 = "就是像這樣抓著身體，像飛起來一樣把人舉高高的遊戲。"
1001106-8 = "旬姊姊有時候都會跟我們玩……老師不會嗎？"
1001106-9 = "[s] 「會呀，我幫你們飛高高。」"
1001106-10 = "哇，太好了！"
1001106-11 = "[s] 「飛高高～」"
1001106-12 = "哇～感覺好像真的飛起來了！"
1001106-13 = "謝謝老師！"
1001106-14 = "啊啊，不公平！老師，我也要我也要！"
1001106-15 = "我也要飛高高，老師！"
1001106-16 = "[s] 「大家都有份，要遵守順序喔。」"
1001106-17 = "哈哈哈，好好玩！好高好高喔！"
1001106-18 = "下一個換我！"
1001106-21 = "……"
1001106-23 = "山海經．教室"
1001106-28 = "我剛剛看到老師在幫大家玩飛高高呢。"
1001106-29 = "你問會不會有什麼問題？#n怎麼會呢，老師特地撥出時間陪梅花園的孩子們玩，我應該要謝謝老師才對。"
1001106-30 = "真要說問題的話……就只是想說，為什麼老師不幫我玩飛高高呢。"
1001106-31 = "我明明也喜歡飛高高……也想體驗展開雙手往上飛的感覺……！"
1001106-32 = "[s] 「但是，旬跟小孩不一樣，體重……」"
1001106-33 = "老師，你剛剛是不是提到體重了？"
1001106-34 = "[s] 「知道了。我也會幫旬飛高高。」"
1001106-35 = "真的嗎？哇～好開心！"
1001106-36 = "來，我現在雙手都展開了，請老師把我抱起來往上舉吧。"
1001106-37 = "[s] 「那個，那麼飛高──」"
1001106-39 = "呀！？"
1001106-40 = "沒，沒，沒什麼……請老師重來一次……"
1001106-44 = "哈嗚……"
1001106-45 = "老，老師的手一碰到我的腋下，就會癢得受不了……"
1001106-46 = "看來長大後不會玩小時候玩的遊戲，不是沒有原因的。"
1001106-47 = "沒想到飛高高是這麼讓人害羞又難為情的遊戲……"
1001106-48 = "沒辦法了。那就請老師抱抱我代替飛高高吧。"
1001106-51 = "呵呵，雖然這不像飛高高那麼興奮，不過也很開心。"
1001106-52 = "我今天很滿足。 #n謝謝老師。"

[translation]
10032060-1 = "Episode 6;An Absurd Misunderstanding"
10032060-3 = "...This way."
10032060-10 = "You'd think protecting someone would slow her down, but she's sped up somehow?"
10032060-11 = "I guess I shouldn't underestimate Joumae Saori of all people. But still..."
10032060-12 = "Another thing..."
10032060-16 = "Why is she headed downwards? I think this leads to the parking garage..."
10032060-17 = "Probably trying to meet up with some cronies to spirit them away. We've gotta move faster."
10032060-18 = "All of these unconscious people... Was there an all-out brawl here?"
10032060-19 = "Nah. My best bet would be that Saori took them all out."
10032060-20 = "Ah, yes, yes. That makes sense."
10032060-24 = "Wait? Does that make sense?"
10032060-25 = "As in, all by herself?"
10032060-26 = "[s1] \"Well, it is Saori.\"\n[s2] \"Considering all the evidence, I'd say so.\""
10032060-29 = "You two seem close, Sensei."
10032060-30 = "...Well, it is you. You're probably the most well-connected person in Kivotos."
10032060-31 = "Things are just gonna get more complicated from here on out. It's not too late for you to back out. "
10032060-32 = "We don't wanna force you to pick sides, so you should just go home, Sensei."
10032060-33 = "...Huh?"
10032060-34 = "What do you mean you can't...?"
10032060-35 = "[s3] \"I don't want the situation to get worse.\"\n[s4] \"If I can stop anyone from getting hurt, at least...\""
10032060-39 = "Hahaha! That's just like you, Sensei!"
10032060-40 = "Seriously though..."
10032060-41 = "Well, fine. Then let's go. The parking garage's pretty close now."
10032060-42 = "If Joumae Saori escapes with Don Arancino... It's their win!"
10032060-43 = "But if we catch them before they get out, we come out on top!"
10032060-45 = "I-I'm going!"
10032060-56 = "[ns5] \"...Aru? You okay?\"\n[ns6] \"What's wrong? You look troubled.\""
10032060-59 = "M-Me? I'm just fine! Mostly...!"
10032060-60 = "You see, I was just thinking...about some stuff..."
10032060-61 = "I was wondering...if, well... Sensei's..."
10032060-62 = "Sensei's documentary..."
10032060-66 = "[ns7] \"...My documentary?\"\n[ns8] \"...Ah.\""
10032060-69 = "I can't help but feel that we've strayed a little too far from our original objective."
10032060-70 = "That's the whole reason you came here, right? And because of us..."
10032060-71 = "I offered to give you a tour, but I somehow roped you into helping us with our work instead."
10032060-75 = "A-And you're Problem Solver's valued consultant!"
10032060-76 = "We need to have strong, mutual trust for a relationship like this to work! That's why...!"
10032060-77 = "...Huh?"
10032060-78 = "...You really don't think I need to worry? But your important work..."
10032060-79 = "[s9] \"Taking care of you is part of my job.\"\n[s10] \"Work is important, but not more than the student in front of me.\""
10032060-82 = "..."
10032060-83 = "...Sensei."
10032060-84 = "Heeheehee. You always know the right thing to say, Sensei."
10032060-85 = "When you put it that way, I can hardly refuse your offer."
10032060-86 = "But I assure you that Problem Solver 68 always repays its debts, whether good or bad."
10032060-87 = "Problem Solver will pay you back everything you're owed, and then some!"
10032060-88 = "So let's go, Sensei! To the underground parking garage!"

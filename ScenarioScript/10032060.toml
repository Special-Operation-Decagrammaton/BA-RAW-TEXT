[translation]
10032060-1 = "第6話;荒謬的誤會"
10032060-3 = "……往這邊。"
10032060-10 = "真奇怪，他們的速度變快了。#n在必須保護對象的前提下，不可能會有這種速度才對啊……"
10032060-11 = "看來他們使用了某種手段呢。#n畢竟對方不是別人，而是錠前沙織。應該會有辦法。"
10032060-12 = "話說回來……"
10032060-16 = "真奇怪，這條路明明是通往地下停車場……"
10032060-17 = "……他們是計劃在那裡會合後逃出去嗎？#n看來時間所剩不多了呢。"
10032060-18 = "話說剛才經過的地方有很多昏過去的人耶……？這些人是在內鬥嗎？"
10032060-19 = "不，看起來並不是這樣。#n我想那應該是錠前沙織下的手。"
10032060-20 = "啊哈，原來如此……"
10032060-24 = "……等等，你說什麼？"
10032060-25 = "他一個人打倒了那麼多人？"
10032060-26 = "[s1]「……嗯，畢竟是沙織。」\n[s2]「如果是在這種地方交手……確實有可能。」"
10032060-29 = "……看來你們之間的關係比想像中還熟呢，老師。"
10032060-30 = "沒想到你在那方面也有認識的人……不，既然是老師，或許也沒什麼好奇怪的吧。"
10032060-31 = "不過現在的情況會不會讓你有點為難？"
10032060-32 = "站在老師的立場，特意選邊站好像不是很好……#n要不要趁現在先回去？我們沒問題的。"
10032060-33 = "……嗯？"
10032060-34 = "你說不行？為什麼……"
10032060-35 = "[s3]「為了防止事情惡化，我得跟你們待在一起才行。」\n[s4]「要是有人受傷才是真的大問題。」"
10032060-39 = "哎呀～果然很像老師會說的回答！"
10032060-40 = "嗯……說的也是。"
10032060-41 = "那我們加緊腳步吧。離地下停車場已經不遠了。"
10032060-42 = "要是錠前沙織帶著唐．阿蘭奇諾逃離這裡，就是他們贏。"
10032060-43 = "在那之前追上他們並把人搶過來，就是我們贏！！"
10032060-45 = "遙香，出動！！"
10032060-56 = "[ns5]「……亞瑠？」\n[ns6]「怎麼了嗎？你看起來很煩惱。」"
10032060-59 = "呃，嗯！？沒，沒什麼，只是，那個……！"
10032060-60 = "只是在思考而已！思考！"
10032060-61 = "這樣真的沒關係嗎……就是……老師的……"
10032060-62 = "……BD……"
10032060-66 = "[ns7]「……BD？」\n[ns8]「……啊。」"
10032060-69 = "不管怎麼想……現在情況都有點失控了……"
10032060-70 = "老師不是為了那個而來的嗎？#n結果好像因為我們，害老師沒辦法好好工作……"
10032060-71 = "明明說好要為老師導覽並幫助你，結果反而是你在協助我們的工作……感覺有點……"
10032060-75 = "因，因為！老師是我們便利屋重要的經營顧問……！"
10032060-76 = "在合作關係中，這種信賴比什麼都重要吧？#n只是在這種層面上而已……！！"
10032060-77 = "……嗯？"
10032060-78 = "沒關係？先不要管BD？#n可是那是老師的工作……"
10032060-79 = "[s9]「處理現在的情況也同樣是我的工作哦。」\n[s10]「雖然教材也很重要，但無論什麼時候都應該以學生為優先。」"
10032060-82 = "…………"
10032060-83 = "……老師……"
10032060-84 = "呵，呵呵……真是優秀且標準的回答，不愧是老師。"
10032060-85 = "既然你都這麼說了，我們就收下這份好意吧。"
10032060-86 = "但是不用擔心。#n我們便利屋68，信奉著債務跟仇恨都絕對會償還的信條。"
10032060-87 = "我們一定會找時間……以便利屋的名義來償還這份恩情！"
10032060-88 = "往地下停車場去吧，老師！！"

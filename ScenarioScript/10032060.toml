[translation]
10032060-1 = "ตอนที่ 6;เข้าใจผิดอย่างไม่น่าเป็นไปได้"
10032060-3 = "ทางนี้..."
10032060-10 = "แปลกจัง ทางนั้นหนีไปเร็วกว่าเดิมอีก ถ้ากำลังคุ้มกันใครอยู่ ก็ไม่น่าจะเร็วได้ขนาดนั้นนี่นา"
10032060-11 = "คงงัดวิธีอะไรมาใช้สินะ นั่นคือโจมาเอะ ซาโอริทั้งคน เธอแยบยลอยู่แล้ว"
10032060-12 = "แต่จะว่าไป..."
10032060-16 = "ก็ยังแปลกอยู่ดี เส้นทางที่เธอมุ่งหน้าไปมันคือลานจอดรถใต้ดิน..."
10032060-17 = "หรือว่าตั้งใจจะไปเจอคนอื่นที่นั่นแล้ววางแผนหลบหนี? ถ้าอย่างนั้นเราก็ไม่มีเวลาแล้ว"
10032060-18 = "มีแต่คนนอนบาดเจ็บอยู่ทุกที่เลย... พวกนั้นแตกคอแล้วสู้กันเองเหรอ?"
10032060-19 = "ไม่หรอก ดูจากสถานการณ์แล้ว คนพวกนั้นน่าจะโดนโจมาเอะ ซาโอริเล่นงานเอานะ"
10032060-20 = "อ่าฮะ... อย่างนั้นเหรอ..."
10032060-24 = "เดี๋ยวก่อนนะ..."
10032060-25 = "ซาโอริคนเดียวจัดการคนได้เยอะขนาดนี้เลยเหรอ?"
10032060-26 = "[s1] \"ไม่แปลกหรอก... นี่ซาโอริเลยนะ\"\n[s2] \"ซาโอริคงจะถนัดในการต่อสู้ในที่แบบนี้น่ะ\" "
10032060-29 = "ดูเหมือนจะรู้จักกันดีมากกว่าที่คิดนะครู..."
10032060-30 = "คิดไม่ถึงเลยนะว่าจะรู้จักกับเด็กโรงเรียนนั้นด้วย แต่ก็นะ คนเป็นครูก็ต้องรู้จักนักเรียนอยู่แล้ว..."
10032060-31 = "แบบนี้ก็ลำบากใจอยู่เหมือนกันนะ จะไม่เป็นไรเหรอ? "
10032060-32 = "เพราะจากสถานะของครูแล้ว จะเข้าข้างฝ่ายใดฝ่ายหนึ่งก็ยังไงอยู่ งั้นกลับไปก่อนจะไม่ดีกว่าเหรอ? พวกเราน่ะไม่เป็นไรหรอก"
10032060-33 = "หืม...?"
10032060-34 = "กลับไม่ได้งั้นเหรอ? ทำไมล่ะ..."
10032060-35 = "[s3] \"อย่างน้อยก็ต้องอยู่ด้วย เพื่อไม่ให้เกิดเรื่องใหญ่กว่านี้สิ\"\n[s4] \"เดี๋ยวถ้าใครบาดเจ็บขึ้นมามันจะเป็นเรื่องใหญ่นะ\""
10032060-39 = "โอ้โห~ ตอบได้สมกับเป็นคุณครูมากเลยน้า!"
10032060-40 = "ก็นะ... มันก็ใช่..."
10032060-41 = "เราต้องรีบแล้วละ อีกไม่นานทางนั้นก็จะถึงลานจอดรถใต้ดินแล้ว"
10032060-42 = "ถ้าโจมาเอะ ซาโอริพาดอน อารันซิโนออกไปจากที่นี่ได้ ชัยชนะก็เป็นของฝั่งนั้น"
10032060-43 = "แต่ถ้าเราตามไปแล้วจับตัวได้ก่อน ชัยชนะก็เป็นของเรา!"
10032060-45 = "ฮารุกะจะออกโรงเองค่ะ!!"
10032060-56 = "[ns5] \"อารุ...?\"\n[ns6] \"เป็นอะไรเหรอ? เหมือนกังวลใจอะไรเลยนะ\""
10032060-59 = "หะ... หืม!? มะ... ไม่หรอก! ฉันแค่... อ่า... ไม่ใช่เรื่องใหญ่หรอก!"
10032060-60 = "ฉันแค่คิดอะไรอยู่นิดหน่อยน่ะ!"
10032060-61 = "เรื่องงานของคุณครู... ที่บอกว่ามาที่นี่เพราะ..."
10032060-62 = "วิดีโอเพื่อการศึกษา......"
10032060-66 = "[ns7] \"วิดีโอเพื่อการศึกษา...?\"\n[ns8] \"อ้อ...\""
10032060-69 = "ฉันลองคิดทบทวนดูหลายรอบแล้ว... ตอนนี้เหมือนสถานการณ์จะทำให้คุณครูหลุดแผนไปเยอะเลย..."
10032060-70 = "คุณครูมาเพราะเรื่องงานนี่นา แต่ฉันรู้สึกว่าพวกเราทำให้คุณครูไม่ได้งานอยู่น่ะ..."
10032060-71 = "เป็นฉันแท้ๆ ที่บอกว่าจะช่วยพาทัวร์โรงละครให้ แต่สุดท้ายกลับกลายเป็นว่าคุณครูมาช่วยงานแทน... ก็เลย..."
10032060-75 = "ก็เลย... กะ... ก็นั่นแหละ! เพราะคุณครูเป็นที่ปรึกษาด้านการบริหารคนสำคัญของหน่วยรับจ้างสารพัด...!"
10032060-76 = "และสำหรับความสัมพันธ์แบบร่วมมือกันของเรา ความไว้วางใจก็สำคัญมากกว่าอะไรทั้งหมด เพราะงั้นก็เลย...!!"
10032060-77 = "หืม...?"
10032060-78 = "ไม่เป็นไรงั้นเหรอ? ไม่ต้องห่วงเรื่องวิดีโอก็ได้เหรอ? แต่มันเป็นงานของคุณครูนะ..."
10032060-79 = "[s9] \"ตอนนี้ครูก็ทำงานของตัวเองอยู่เหมือนกัน\"\n[s10] \"เรื่องสื่อการเรียนก็สำคัญ แต่นักเรียนต้องมาก่อนอยู่แล้ว\""
10032060-82 = "......"
10032060-83 = "คุณครู..."
10032060-84 = "ฮุฮุ... ยอดไปเลยนะ ตอบแบบนี้อยากมอบรางวัลครูดีเด่นให้เลย"
10032060-85 = "ดีละ ถ้าคุณครูว่าอย่างนั้น ฉันก็จะรับความหวังดีนี้ไว้"
10032060-86 = "แต่ไม่ต้องกังวลหรอกนะ หน่วยรับจ้างสารพัด 68 ของเราใช้หนี้และตอบแทนเกี่ยวกับงานที่ได้รับมา#nอย่างเต็มที่อยู่แล้ว"
10032060-87 = "สักวันหนึ่ง... ฉันจะรับผิดชอบและชดใช้หนี้บุญคุณนี้ในนามของหน่วยรับจ้างสารพัดเอง!"
10032060-88 = "งั้นเราจะไปที่ลานจอดรถใต้ดินก่อน ไปกันเถอะคุณครู!!"

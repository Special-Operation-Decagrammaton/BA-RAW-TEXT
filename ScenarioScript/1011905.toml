[translation]
1011905-1 = "Darkness Before Dawn"
1011905-2 = "I decided to go meet up with Nagusa to patrol the Hyakkiyako streets, ready to send any late-night troublemakers home."
1011905-3 = "It's not that big of an area, so I didn't think it would take too long, but..."
1011905-4 = "...we soon ran into unexpected difficulty."
1011905-6 = "Excuse me, why are you loitering in the park so late?"
1011905-7 = "...None of your business."
1011905-8 = "You are, of course, free to be here as a student..."
1011905-9 = "...but this place is remote, and potentially unsafe at this hour. If you must be out, consider a family restaurant or a cafe instead."
1011905-10 = "Nah. I might run into my sister there."
1011905-11 = "...Your sister?"
1011905-13 = "[ns] \"Are you having trouble with your sister at home?\""
1011905-14 = "...Nah."
1011905-16 = "And I definitely didn't just run off to noplace 'cause I had a fight with her!"
1011905-17 = "[s] \"If you'd like to talk about it, we're happy to listen to you.\""
1011905-19 = "We gave the runaway student advice."
1011905-25 = "Hm."
1011905-26 = "H-Huh? Wh-Who's there?"
1011905-27 = "What exactly are you up to?"
1011905-28 = "Uh, construction. We're doin' construction."
1011905-29 = "We're workin' on the sewers— I mean the waterworks!"
1011905-30 = "Odd. I haven't heard of any waterworks project in this area."
1011905-31 = "Certainly nothing scheduled for this hour of the night."
1011905-35 = "Would you mind if I check your equipment?"
1011905-36 = "Ugh..."
1011905-42 = "Damn it, they're onto us! Run!"
1011905-43 = "Hold up— there's still Hyakkaryourans walking around here?"
1011905-44 = "So much for our bomb plot..."
1011905-50 = "Oh, you're not getting away."
1011905-64 = "We stopped the Mouryo gang from causing trouble."
1011905-66 = "[ns] \"Hi there. Shouldn't you be home?\""
1011905-67 = "Home? *hic* Anyplace I can shtretch out under the shky's my home!"
1011905-68 = "This whole WORLD'SH my home. What'sh the problem with that?"
1011905-69 = "[s1] \"I'm sorry, but you'll get in people's way if you lie here.\"\n[s2] \"I could walk you to the nearest Valkyrie station, if you like.\""
1011905-72 = "What?! You're gonna hand me over to those brats?!"
1011905-73 = "I'm not goin' down without a fight! Bring it on!"
1011905-74 = "...Sensei, would you like me to \"take care\" of this one?"
1011905-75 = "[s] \"N-No...!\""
1011905-77 = "We walked the drunk out of harm's way. It took longer than expected."
1011905-79 = "[ns] \"I'm beat...\""
1011905-80 = "We did well, Sensei."
1011905-81 = "Tonight was a rougher night than usual."
1011905-82 = "And it's well past midnight...if we waited a bit, we could see the sunrise."
1011905-83 = "[s] \"Should we get back to the main building, then?\""
1011905-84 = "Just a moment, Sensei."
1011905-85 = "This is the darkest time of night, with the moon having set."
1011905-86 = "You might stumble and sprain your ankle on the way there. Let us rest until the darkness fades."
1011905-87 = "Besides, I wouldn't mind a breather."
1011905-89 = "At Nagusa's suggestion, we sat down on the veranda of a nearby tea house and waited for sunrise."
1011905-91 = "...It's so quiet."
1011905-92 = "This teahouse is so rowdy with customers in the day. But right now...it's as if everything has stopped breathing."
1011905-96 = "This isn't the first time I've done this."
1011905-97 = "Rested here and waited for dawn, I mean. After a long patrol."
1011905-98 = "[s] \"Is there something you like about this place?\""
1011905-99 = " ...Nothing in particular."
1011905-100 = "Well, one thing. It makes a good hiding place..."
1011905-101 = "...from my fear of the dark."
1011905-104 = "― [log=나구사ND]This moment, just before the sun rises...[/log][wa:1080] "
1011905-105 = "― [log=나구사ND]is when the darkness dominates.[/log][wa:4040] "
1011905-108 = "― [log=나구사ND]This pitch-black darkness... I've always feared it.[/log][wa:1060] "
1011905-111 = "― [log=나구사ND]I don't shine enough to lift that darkness.[/log][wa:2500] "
1011905-112 = "― [log=나구사ND]Nor could I...endure...[/log][wa:5450] "
1011905-115 = "― [log=나구사ND]through the passing of the night.[/log][wa:1450] "
1011905-118 = "― [log=나구사ND]I had no choice but to hide,[/log]"
1011905-119 = "― [log=나구사ND]pretending to be someone else, blending into the shadows, feigning composure.[/log][wa:4410] "
1011905-122 = "― [log=나구사ND]But not anymore.[/log][wa:2210] "
1011905-125 = "― [log=나구사ND]I know that the night will pass with time...[/log][wa:20] "
1011905-126 = "― [log=나구사ND]and my shadow will cast over the earth.[/log][wa:4950] "
1011905-129 = "― [log=나구사ND]So...[/log]"
1011905-132 = "― [log=나구사ND]I declare my name to the spirit realm. [/log][wa:2480] "
1011905-135 = "― [log=나구사ND]...I am the President of the Hyakkaryouran Resolution Council...[/log][wa:2310] "
1011905-136 = "― [log=나구사ND]Goryou Nagusa![/log][wa:2190] "
1011905-139 = "Ah, and now the sun rises."
1011905-140 = "...Quite a night, wasn't it?"
1011905-141 = "[s] \"Yeah, it was really hectic.\""
1011905-142 = "A night when Mouryos ran wild, in all sorts of strange forms..."
1011905-143 = "It's fitting for the name of \"Hyakkiyako.\" \"The Night Walk of a Hundred Ghosts.\""

[translation]
1011905-1 = "黎明前的黑暗"
1011905-2 = "（深夜，為了取締在外遊蕩的不良學生，與名草一起巡視著百鬼夜行的街道）"
1011905-3 = "（原以為範圍不大，很快就能結束……）"
1011905-4 = "（……卻立刻遇上了意料之外的難題）"
1011905-6 = "現在這麼晚了，你為什麼還在公園附近遊蕩？"
1011905-7 = "……不用你管吧。"
1011905-8 = "當然，在自治區想去哪裡都是學生的自由……"
1011905-9 = "不過這附近人煙稀少，很容易發生意外……#n你要不要改去附近的家庭餐廳或咖啡廳休息一下？"
1011905-10 = "不要。那樣搞不好會碰到姐姐。"
1011905-11 = "……姐姐？"
1011905-13 = "[ns]「難道你和姐姐之間發生了什麼嗎？」"
1011905-14 = "……才不是。"
1011905-16 = "我才沒因為跟姐姐吵架，結果一氣之下跑出來後發現沒地方去咧！"
1011905-17 = "[s]「……不介意的話，能告訴我你對姐姐有什麼不滿嗎？」"
1011905-19 = "（有時必須傾聽離家出走學生的煩惱……）"
1011905-25 = "……打擾一下。"
1011905-26 = "嗯？請，請問有什麼事嗎？"
1011905-27 = "你們在這裡做什麼？"
1011905-28 = "如你所見，我們正在施工！"
1011905-29 = "因為這裡埋的下水道……不對，是自來水管需要更換……！"
1011905-30 = "據我所知，這附近並沒有自來水工程正在進行。"
1011905-31 = "而且現在都這麼晚了……"
1011905-35 = "能讓我檢查一下那邊的物資嗎？"
1011905-36 = "唔唔……"
1011905-42 = "可惡，被發現了！大家快逃！"
1011905-43 = "百花繚亂竟然會在這種時候出現，這到底是怎麼回事？"
1011905-44 = "嘖，本來計畫在慶典開始前埋炸彈搗亂的說……"
1011905-50 = "……別想逃。"
1011905-64 = "（還得阻止想惹事的妖怪劇團……）"
1011905-66 = "[ns]「那個……不好意思，能問一下你家住在哪裡嗎？」"
1011905-67 = "我家～？#n天底下能讓我伸腿躺平的地方，全都是我家～"
1011905-68 = "這個世界就是我的家～難道還得看別人臉色嗎～？"
1011905-69 = "[s1]「不好意思，你躺在這裡會妨礙通行。」\n[s2]「可以先讓我們帶你到附近的女武神警察局嗎？」"
1011905-72 = "什麼～！？想把我交給那群麻雀！？"
1011905-73 = "誰會乖乖被你們帶走啊！有本事就來啊！"
1011905-74 = "……老師，需要我「處理」一下嗎？"
1011905-75 = "[s]「沒，沒關係……！」"
1011905-77 = "（……還要移交醉醺醺的居民，結果花了比預期更久的時間）"
1011905-79 = "[ns]「呼啊，真累人……」"
1011905-80 = "辛苦你了，老師。"
1011905-81 = "今天在深夜惹事的人，感覺比平常更多呢。"
1011905-82 = "現在已經快天亮了……再等一下，或許能看到日出呢。"
1011905-83 = "[s]「那我們趕快回本館吧？」"
1011905-84 = "請稍等一下，老師。"
1011905-85 = "這個時間連月亮都看不見，是一天中最黑暗的時候。"
1011905-86 = "在這麼暗的時候走山路可能會扭到腳，還是等天色稍微亮一點再走吧。"
1011905-87 = "……而且我今天也有點累了，所以想稍微休息一下。"
1011905-89 = "（於是依照名草的提議，決定在附近茶館的走廊等待天亮）"
1011905-91 = "……真安靜呢。"
1011905-92 = "這間茶館平常總是客人絡繹不絕，現在卻像屏住呼吸一般悄然無聲。"
1011905-96 = "其實我並不是第一次來這裡了。"
1011905-97 = "之前深夜巡邏時，只要黎明前的黑暗降臨，我就會來這裡等到天亮。"
1011905-98 = "[s]「看來你挺喜歡這個地方的？」"
1011905-99 = "……不，不是那樣的。"
1011905-100 = "與其說是喜歡，不如說是因為害怕比較貼切。"
1011905-101 = "我……害怕黑暗。"
1011905-104 = "― [log=나구사ND]黎明前的這個瞬間──[/log][wa:2320] "
1011905-105 = "― [log=나구사ND]是黑暗最深沉的時候。[/log][wa:4880] "
1011905-108 = "― [log=나구사ND]我……曾經害怕著這片漆黑。[/log][wa:2580] "
1011905-111 = "― [log=나구사ND]無論是眩目到足以點亮闇夜──[/log][wa:3660] "
1011905-112 = "― [log=나구사ND]還是在黎明之前隱忍下去……[/log][wa:5850] "
1011905-115 = "― [log=나구사ND]我都無法辦到。[/log][wa:2490] "
1011905-118 = "― [log=나구사ND]只能藉由扮演他人──[/log]"
1011905-119 = "― [log=나구사ND]混入陰影中故作鎮定而已。[/log][wa:7010] "
1011905-122 = "― [log=나구사ND]但是──現在不一樣了。[/log][wa:2410] "
1011905-125 = "― [log=나구사ND]因為我已經明白夜晚終將結束──[/log][wa:1180] "
1011905-126 = "― [log=나구사ND]我的影子也會落映在地上了。[/log][wa:5990] "
1011905-129 = "― [log=나구사ND]所以──[/log]"
1011905-132 = "― [log=나구사ND]就讓我向黃昏報上名號吧。[/log][wa:3560] "
1011905-135 = "― [log=나구사ND]我是百花繚亂紛爭調停委員會的委員長──[/log][wa:4110] "
1011905-136 = "― [log=나구사ND]御稜名草！[/log][wa:2550] "
1011905-139 = "啊，天亮了呢。"
1011905-140 = "真是個混亂的夜晚……對吧？"
1011905-141 = "[s]「嗯，真是忙亂的一夜。」"
1011905-142 = "各式[ruby=魍魎]妖怪[/ruby]橫行的夜晚……"
1011905-143 = "或許這才是最符合我們百鬼夜行聯合學園之名的一天也說不定呢。"

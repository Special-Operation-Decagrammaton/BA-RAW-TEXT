[translation]
1011905-1 = "ความมืดก่อนรุ่งสาง"
1011905-2 = "(คุณครูตัดสินใจไปเดินลาดตระเวนกับนางุสะเพื่อปรามกลุ่มเด็กเกเรที่ไม่กลับที่พักและออกมาเตร็ดเตร่#nยามค่ำคืน)"
1011905-3 = "(คุณครูคิดว่างานคงเสร็จได้เร็ว เพราะพื้นที่ลาดตระเวนไม่ได้กว้างขวางมากนัก...)"
1011905-4 = "(แต่เดินลาดตระเวนได้ไม่นานก็เจออุปสรรคที่คาดไม่ถึง...)"
1011905-6 = "นี่ ดึกดื่นแบบนี้ทำไมถึงมาเดินเตร็ดเตร่แถวสวนสาธารณะอยู่ล่ะ?"
1011905-7 = "ไม่ใช่เรื่องของเธอสักหน่อย..."
1011905-8 = "จริงอยู่ที่นักเรียนทุกคนมีอิสระที่จะไปไหนมาไหนในเขตปกครองตนเองก็ได้..."
1011905-9 = "แต่แถวนี้ไม่ค่อยมีผู้คนสัญจรผ่านและเกิดอุบัติเหตุได้ง่าย เธอไปนั่งพักในร้านอาหารสำหรับครอบครัว#nหรือคาเฟ่ไม่ดีกว่าเหรอ?"
1011905-10 = "ไม่เอาหรอก แบบนั้นเดี๋ยวก็ได้เจอพี่สาวกันพอดี"
1011905-11 = "พี่สาวเหรอ...?"
1011905-13 = "[ns] \"มีปัญหาอะไรกับพี่ที่บ้านมางั้นเหรอ?\""
1011905-14 = "ไม่ใช่สักหน่อย..."
1011905-16 = "ฉันไม่ได้ทะเลาะกับพี่สาวแล้วผลีผลามออกมาโดยไม่รู้ว่าจะไปไหนสักหน่อย!"
1011905-17 = "[s] \"ไหนบอกครูได้มั้ยว่าไม่พอใจพี่สาวเรื่องอะไร?\""
1011905-19 = "(แล้วคุณครูก็ให้คำปรึกษากับนักเรียนที่หนีออกจากบ้านมา...)"
1011905-25 = "นี่..."
1011905-26 = "หะ... หืม? มะ... มีเรื่องอะไรเหรอคะ?"
1011905-27 = "ทำอะไรอยู่ตรงนี้เหรอ?"
1011905-28 = "ก็อย่างที่เห็นเลยค่ะ ฉันกำลังทำงานซ่อมแซมอยู่"
1011905-29 = "ฉันต้องเปลี่ยนท่อระบายน้ำเสียที่ฝังไว้ตรงนั้น... ไม่สิ ต้องเปลี่ยนท่อน้ำประปาเฉยๆ...!"
1011905-30 = "เท่าที่ฉันรู้ แถวนี้ไม่น่าจะมีงานซ่อมระบบประปาในตอนนี้นะ"
1011905-31 = "แล้วยังมาทำในเวลาดึกดื่นแบบนี้..."
1011905-35 = "ฉันขอตรวจดูของที่อยู่ตรงนั้นสักเดี๋ยวได้มั้ย?"
1011905-36 = "อึก..."
1011905-42 = "ซวยแล้วไง โดนจับได้แล้ว! หนีเร็วเข้าทุกคน!"
1011905-43 = "นี่มันอะไรกัน ทำไมเฮียกกะเรียวรันถึงโผล่มาที่นี่ในเวลานี้ล่ะ?"
1011905-44 = "ชิ แผนการฝังระเบิดเพื่อขัดขวางงานเทศกาลพังไม่เป็นท่าเลย..."
1011905-50 = "ฉันไม่ยอมให้หนีหรอก..."
1011905-64 = "(แล้วคุณครูก็ช่วยสกัดพวกปีศาจที่จะก่อปัญหา...)"
1011905-66 = "[ns] \"เอ่อ... ลุง ตกลงว่าบ้านอยู่ทางไหนล่ะ?\""
1011905-67 = "บ้านฉันเหรอ~? ไม่ว่าที่ไหนใต้หล้า ที่ฉันนอนยืดแขนขาได้เต็มที่ก็คือบ้านของฉันทั้งนั้นละ~"
1011905-68 = "ทุกที่ในโลกก็เหมือนบ้านฉัน~ แล้วฉันจะต้องสนใจคนอื่นด้วยเหรอ~?"
1011905-69 = "[s1] \"ขอโทษนะลุง แต่ถ้านอนตรงนี้มันกีดขวางการจราจร\"\n[s2] \"พวกเราจะพาไปพักที่สถานีตำรวจวัลคิรี่ใกล้ๆ ก่อนนะ\""
1011905-72 = "ว่าไงนะ~?! จะส่งฉันไปให้นกกระจอกพวกนั้นงั้นเหรอ?!!"
1011905-73 = "ใครจะยอมไปด้วยกันเล่า! หรือถ้าแน่จริงก็เข้ามาเลย!"
1011905-74 = "คุณครู... ให้ฉัน 'จัดการ' ดีกว่ามั้ย?"
1011905-75 = "[s] \"มะ... ไม่ได้นะ...!\""
1011905-77 = "(และยังต้องพาชาวเมืองที่เมามาส่งสถานีตำรวจด้วย...)"
1011905-79 = "[ns] \"เฮ้อ... เหนื่อยจัง...\""
1011905-80 = "ต้องเหนื่อยแย่เลยนะ คุณครู"
1011905-81 = "รู้สึกเหมือนวันนี้จะมีคนมาก่อความวุ่นวายในช่วงดึกมากกว่าปกติอีกนะ"
1011905-82 = "นี่เวลาก็ล่วงเลยมาจนเกือบจะรุ่งสางแล้ว... ถ้ารออีกหน่อยก็คงได้เห็นพระอาทิตย์ขึ้นแล้วละ"
1011905-83 = "[s] \"งั้นเรารีบกลับไปที่อาคารหลักกันดีมั้ย?\""
1011905-84 = "รอเดี๋ยวก่อนสิ คุณครู"
1011905-85 = "ตอนนี้พระจันทร์ก็ลับขอบฟ้าไปแล้ว พอไม่มีแสงจันทร์ ตอนนี้ก็เลยเป็นช่วงที่มืดที่สุดของค่ำคืน"
1011905-86 = "ถ้าเราเดินในเส้นทางบนภูเขาในเวลามืดๆ แบบนี้ ดีไม่ดีอาจข้อเท้าพลิกก็ได้ ฉันว่าเราพักจนกว่าจะมี#nแสงสลัวจากเช้ามืดดีกว่า"
1011905-87 = "อีกอย่างนะ... คืนนี้ฉันก็เหนื่อยจนอยากนั่งพักสักหน่อยด้วย"
1011905-89 = "(คุณครูตัดสินใจไปนั่งพักที่ระเบียงไม้ของร้านน้ำชาที่อยู่ใกล้ๆ ตามคำแนะนำของนางุสะ)"
1011905-91 = "เงียบดีจัง..."
1011905-92 = "ปกติร้านน้ำชาร้านนี้จอแจอยู่ตลอดเพราะมีลูกค้าเข้ามาอยู่เรื่อยๆ ทั้งวัน แต่ในช่วงเวลานี้กลับไม่ได้ยิน#nเสียงอะไรเลย ราวกับว่าลมหายใจหยุดลงอย่างนั้นละ"
1011905-96 = "ที่จริงนี่ไม่ใช่ครั้งแรกหรอกนะที่ฉันมาที่นี่"
1011905-97 = "พอฉันออกมาลาดตระเวนกลางดึก ฉันจะมานั่งฆ่าเวลาอยู่ตรงนี้จนถึงรุ่งสางเลย"
1011905-98 = "[s] \"นางุสะชอบที่นี่สินะ?\""
1011905-99 = "เปล่าหรอก... จริงๆ แล้วฉันก็ไม่ได้ชอบเท่าไร"
1011905-100 = "ถ้าจะพูดให้ถูก ต้องบอกว่าฉันมาซ่อนตัวอยู่ที่นี่เพราะกลัวมากกว่า"
1011905-101 = "ฉันกลัวความมืดมิดน่ะ"
1011905-104 = "― [log=나구사ND]ช่วงเวลาก่อนรุ่งสางแบบนี้...[/log][wa:1600] "
1011905-105 = "― [log=나구사ND]เป็นช่วงเวลาที่มืดมิดที่สุดเลยละ[/log][wa:4000] "
1011905-108 = "― [log=나구사ND]ฉัน... กลัวความมืดที่ดำสนิทแบบนี้[/log][wa:1780] "
1011905-111 = "― [log=나구사ND]ในค่ำคืนที่ไม่มีแสงใดที่ส่องสว่างไล่ความมืดได้[/log][wa:2380] "
1011905-112 = "― [log=나구사ND]แม้แต่การทนรอให้ค่ำคืนเลยผ่านไป...[/log][wa:5010] "
1011905-115 = "― [log=나구사ND]ก็เป็นเรื่องยากสำหรับฉัน[/log][wa:1810] "
1011905-118 = "― [log=나구사ND]ฉันเคยต้องแสดงเป็นคนอื่น[/log]"
1011905-119 = "― [log=나구사ND]ทำตัวกลมกลืนไปกับเงา ต้องแอบซ่อน และแสร้งว่าไม่เป็นไร[/log][wa:5370] "
1011905-122 = "― [log=나구사ND]แต่ฉันจะไม่ทำอย่างนั้นอีกต่อไปแล้วละ[/log][wa:1410] "
1011905-125 = "― [log=나구사ND]เพราะฉันรู้ว่าเมื่อค่ำคืนผ่านพ้นไป[/log][wa:420] "
1011905-126 = "― [log=나구사ND]เงาของฉันก็จะปรากฏที่พื้นในที่สุด[/log][wa:5190] "
1011905-129 = "― [log=나구사ND]เพราะงั้น...[/log]"
1011905-132 = "― [log=나구사ND]ฉันขอประกาศชื่อของฉันต่อหน้าห้วงอัสดง [/log][wa:2520] "
1011905-135 = "― [log=나구사ND]ฉันคือ... หัวหน้าคณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน[/log][wa:2710] "
1011905-136 = "― [log=나구사ND]โกเรียว นางุสะ![/log][wa:2150] "
1011905-139 = "อ๊ะ ฟ้าเริ่มสางแล้วละ"
1011905-140 = "เป็นค่ำคืนที่วุ่นวายจริงๆ เลย... ว่ามั้ย?"
1011905-141 = "[s] \"นั่นสินะ เป็นคืนที่งานยุ่งจริงๆ เลย\""
1011905-142 = "ค่ำคืนที่เหล่าปีศาจออกมาวิ่งพล่านในหลายๆ รูปแบบ..."
1011905-143 = "บางทีคืนที่เพิ่งผ่านไปอาจเป็นคืนที่เหมาะกับชื่อของสหพันธ์เฮียกคิยาโคมากที่สุดก็ได้นะ"

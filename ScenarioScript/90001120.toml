[translation]
90001120-1 = "第12話;提議"
90001120-3 = "雖然這些是我聽來的，不過當時愛麗絲似乎立下了大功。"
90001120-4 = "我所記得的就只有一切落幕後，#n遊戲開發部的成員們來到特異現象搜查部的部室而已。"
90001120-5 = "舉辦派對的提議、2KB的資料、機器人造型的鑰匙圈、適當的氛圍、感人的BGM……#n以及我成為了女主角。"
90001120-6 = "那時候真的發生了很多事呢。"
90001120-7 = "……呵呵。"
90001120-8 = "前面還算能聽懂，但後半那些是怎麼回事……"
90001120-9 = "我只是隨口說說而已。"
90001120-16 = "（季最近好像一直在嘗試搞笑……）"
90001120-17 = "總之，當時愛麗絲在生命守護者主艦上再構築出來的方舟……#n也就是愛麗絲的「勇者的證明」。"
90001120-18 = "呵呵，我現在還記得當時為它取的名字「光之劍：阿特拉哈西斯的超新星」。"
90001120-19 = "……雖然我當時沒說出口，不過你的命名品味是不是有點奇怪？"
90001120-20 = "居然被你質疑品味，這簡直是奇恥大辱！"
90001120-21 = "（部長和會長明明就半斤八兩……）"
90001120-22 = "咳哼。"
90001120-23 = "然而問題是，我們沒有人知道愛麗絲當時究竟做了什麼。"
90001120-24 = "執行再構築的機制與程序為何……完全無從得知。"
90001120-25 = "是啊……那股能量究竟來自哪裡，物質的再構築又是如何進行……"
90001120-26 = "如何將其進行收斂與釋放，我們全都一無所知。"
90001120-27 = "畢竟對我們而言……這些事都是在「瞬間」完成的。"
90001120-28 = "不知道方法就意味著重現非常困難……或者接近不可能。"
90001120-29 = "雖然僅此一次的奇蹟，聽起來確實相當浪漫……"
90001120-30 = "不過那同時也是理論和學問的敵人。"
90001120-31 = "沒錯。畢竟所謂的學問，基本上是一種系統性的過程。"
90001120-32 = "只要熟悉過程，任何人都能夠得出相同的結果。"
90001120-33 = "……"
90001120-34 = "我認為應該直接和愛麗絲商量這件事。"
90001120-35 = "意思是要把愛麗絲叫來這裡嗎？"
90001120-36 = "沒錯，正是如此。#n這樣才能請他為我們解釋當時的情況──"
90001120-37 = "莉央……這麼做真的好嗎？"
90001120-38 = "嗯？什麼意思？"
90001120-43 = "那在某種意義上……不就是把愛麗絲當成了解決問題的「工具」嗎？"
90001120-44 = "……！"
90001120-45 = "……"
90001120-46 = "會長……"
90001120-51 = "莉央，我不會再說第二次。#n我們已經在生命守護者主艦上討論過類似的話題了。"
90001120-52 = "只不過當時的對象是季，而現在的對象則是愛麗絲罷了。"
90001120-53 = "當然身為清秀的崖上一朵花，我並不在意你可能犯下的過錯或後悔……"
90001120-54 = "但你應該也能理解吧？#n看見有人不斷重複同樣的錯誤……即便對旁觀者而言也不是什麼愉快的事。"
90001120-55 = "唔，嗯……是啊……你說的對……"
90001120-56 = "[s] 「……」"
90001120-60 = "[ns]「莉央。」"
90001120-61 = "嗯……？"
90001120-78 = "[ns]「我們真的必須倚靠愛麗絲嗎？」"
90001120-79 = "那個……對不起，老師。這件事還是請你忘了吧。#n我自己也沒有100%的把握。那只不過是其中一種可能性罷了。"
90001120-80 = "所以剛才的提議就當我沒說過吧。#n畢竟我的想法也可能是錯的……"
90001120-81 = "[s]「我會去跟愛麗絲和遊戲開發部的成員們談談。」"
90001120-82 = "老，老師！？"
90001120-83 = "老師！？"
90001120-84 = "咦，老師？你怎麼了嗎？"
90001120-85 = "……這麼做真的好嗎，老師？#n要是一個不小心……"
90001120-90 = "因為現在的情況……實在不太尋常？#n雖然這麼說……確實沒錯……"
90001120-91 = "如果必須由某個人告訴愛麗絲這件事，那麼那個人就應該是老師……？"
90001120-92 = "[s]「不過相對的，我也想向莉央提出一個提案。」"
90001120-93 = "嗯？向，向我……？"
90001120-94 = "[s]「我希望莉央也能到冰海基地來。」"
90001120-95 = "！？"
90001120-96 = "要會長親自過來！？"
90001120-97 = "老師，這究竟……？"
90001120-99 = "……"
90001120-100 = "意思是……要我「一同負起責任」嗎？"
90001120-101 = "[s]「這個部分就由你自己判斷吧。」"
90001120-105 = "[ns]「就像莉央剛才提出了提案一樣。」"
90001120-109 = "[ns]「我也只是提出提案給你參考而已。」"
90001120-110 = "……"
90001120-111 = "我實在不明白，老師。#n我……"
90001120-112 = "不清楚自己有沒有那樣的資格，也無法確定自己是否又犯了錯……"
90001120-116 = "不過這次是莉央大人救了我們。"
90001120-118 = "……"
90001120-123 = "老實說，我並不明白何謂莉央大人口中的「正確」，#n也不清楚能否始終做出正確的決定。"
90001120-124 = "但我……希望能再見您一面。"
90001120-125 = "這樣的理由……難道還不夠嗎？"
90001120-126 = "季……"
90001120-132 = "莉央，現在選擇權就在你的手上。"
90001120-133 = "我明白你的判斷標準──「合理」。"
90001120-134 = "凡事講求合理的你，面對這個問題究竟會如何判斷呢？"
90001120-138 = "…………"
90001120-139 = "只依賴遠距通訊……確實存在侷限性。#n無論從保密還是安全層面來看皆是如此。"
90001120-140 = "一旦電波受到干擾就可能導致情況完全失控……就像這次一樣。"
90001120-141 = "因此，我……"
90001120-142 = "看來已經決定了呢。"
90001120-143 = "我們也將前往冰海基地，就在那裡碰面吧。"
90001120-144 = "……知道了。"
90001120-146 = "怎麼了，莉央會長？#n有什麼擔心的事嗎？"
90001120-147 = "這倒不是……"
90001120-148 = "我真的……應該這麼做嗎……？"
90001120-149 = "……"
90001120-150 = "我現在就傳送冰海基地的座標給你。#n至於長途移動的手段，相信你應該早有準備了吧？"
90001120-151 = "……嗯。"
90001120-152 = "真是好久不見了呢，莉央大人。#n我會等著您。"
90001120-153 = "季。"
90001120-154 = "是，有什麼事嗎？"
90001120-160 = "這段時間辛苦你了。#n還有……謝謝你。"
90001120-161 = "不敢當。"
90001120-164 = "（在大家各自忙碌的期間，碰巧有了獨處的時間）"
90001120-165 = "（既然難得有這個機會……）"
90001120-171 = "咦？老師？"
90001120-172 = "歡迎您，老師。請問有何吩咐？"
90001120-173 = "嗯？只是想來看看我們？"
90001120-174 = "那，那雖然很讓人開心……耶嘿嘿……"
90001120-175 = "不過老師，沒必要裝作什麼事都沒發生的哦……"
90001120-176 = "肯定。您的臉色不太對勁。#n再次請教您，請問有何吩咐？"
90001120-177 = "[s]「原來……我這麼容易被看穿嗎……」"
90001120-178 = "怎麼這麼說呢！#n就算老師再怎麼努力掩飾，我們也看得出來的哦！"
90001120-179 = "畢竟都相處這麼久了，那種事一看就知道了！"
90001120-180 = "肯定。雖然現在的老師或許沒發覺。"
90001120-181 = "不過我所認識的老師，就是這樣的人。"
90001120-182 = "老師有什麼煩惱嗎？#n無論什麼煩惱，彩奈都願意聽老師說！"
90001120-183 = "我也是。"
90001120-184 = "啊，嗯。星奈醬也是哦！"
90001120-188 = "[ns1]「我覺得要求學生解決問題……感覺不太好。」\n[ns2]「我擔心自己會讓學生遭遇危險。」"
90001120-191 = "老師……"
90001120-192 = "……"
90001120-193 = "可，可是老師！如果換個角度來想！"
90001120-194 = "老師至今為止……不是已經成功解決好幾次類似的難關了嗎？#n……耶嘿嘿。"
90001120-209 = "[ns]「但現在的情況和之前有點不一樣。」"
90001120-211 = "嗯？當時是事情已經發生，所以才不得不採取行動……"
90001120-212 = "但這次卻是學生，可能會因為老師而被迫面臨危險。"
90001120-213 = "瞭解。但若不設法解決此事，將可能導致更嚴重的後果對吧？"
90001120-216 = "[ns3]「要這麼說也沒錯……」\n[ns4]「可是如果只因為這樣的可能性就讓學生身處險境……」"
90001120-221 = "[ns]「那我跟那些人又有什麼不同呢？」"
90001120-224 = "……"
90001120-225 = "……"
90001120-227 = "[ns]「啊！要是我現在突然變得超級厲害就好了！」"
90001120-228 = "老，老師！？"
90001120-229 = "無法理解。#n為何突然這麼說呢，老師？"
90001120-230 = "[s5]「不是嘛，你們想想看！比如……」\n[s6]「變得可以飛天遁地？或者能把防護罩還是什麼的通通打穿！」"
90001120-234 = "[ns7]「管他是什麼無名之神還是十字神名！」\n[ns8]「要是能通通一口氣解決掉不是很好嗎！」"
90001120-238 = "老，老師你怎麼了……？"
90001120-239 = "混亂。無法理解。#n麻煩老師進行詳細說明。"
90001120-243 = "[ns]「沒事，你們不用放在心上。我只是發洩一下而已。」"
90001120-253 = "[log]學生們……就拜託你了。[/log]"
90001120-259 = "[ns]「果然還是得由我來解決！嗯！」"
90001120-261 = "[ns9]「無論什麼方法都要嘗試！死命掙扎到最後一刻！」\n[ns10]「如果這樣還是行不通的話！」"
90001120-264 = "行，行不通的話？"
90001120-268 = "[ns11]「嗯！這種事之後再說！」\n[ns12]「我也不知道該怎麼辦！哇哈哈哈！」"
90001120-271 = "老，老師？你真的……沒事嗎？"
90001120-272 = "疑惑。混亂。#n建議審慎檢查老師的心理狀況。"
90001120-273 = "[s]「我沒事！我沒事！」"
90001120-278 = "老，老師！？#n雖然能被老師摸摸我很高興……啊嗚……"
90001120-279 = "更加混亂。無法明白老師的意圖。"
90001120-281 = "（就這樣輕撫了兩人好一陣子）"
90001120-282 = "（確認他們都睡著之後，回到了應該回去的地方）"
90001120-284 = "下一話;出發"

90001120-17 = "3;히마리 방한복;06;아무튼, 그때 우트나피쉬팀의 배에서 아리스가 재구축해 낸 방주는…… 그야말로 아리스의 '용사의 증거' 였죠."
90001120-18 = "3;히마리 방한복;09;후후. 아직도 제가 붙인 이름이 생각나네요. <빛의 검: 아트라하시스의 슈퍼 노바> 였죠."
90001120-19 = "3;히마리 방한복;09\n1;리오;04;……그때는 하지 못했던 말이지만, 그 네이밍 센스 조금 이상하지 않아?\n#1;sig\n#1;ar\n#3;m4"
90001120-20 = "1;리오;04\n3;히마리 방한복;11;센스에 대해서 당신에게 그런 말을 듣다니, 그야말로 치욕이네요!\n#3;em;[빠직]\n#1;sig\n#1;dl\n#3;m3"

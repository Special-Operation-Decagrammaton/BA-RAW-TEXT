90001120-34 = "3;리오;05;나는, 우리가 아리스에게 이 일을 직접 이야기해야 한다고 생각해.\n#3;sig"
90001120-35 = "3;리오;05\n5;히마리 방한복;02;그건, 다시 말해 우리가 아리스를 이곳으로 부를 필요가 있다는 것인가요?\n#3;m1\n#5;al\n#3;sig\n#5;em;[?]"

[translation]
90001120-1 = "Episode 12;Proposal"
90001120-3 = "I was not present at the scene, but I have heard that Aris was instrumental in the mission's success."
90001120-4 = "I recall, after everything was over, the Game Development Department members visiting us at the Super Phenomenon Task Force club room."
90001120-5 = "I remember everything from the party proposal, 2 KB worth of data, a robot-shaped keychain, good atmosphere, touching background music, and finally my enthronement as the main heroine."
90001120-6 = "Many things happened."
90001120-7 = "...Hah."
90001120-8 = "The first part happened, but the rest sounds like a fantasy..."
90001120-9 = "I just tried saying it."
90001120-16 = "(Toki has been trying to secretly impart her own agenda more frequently...)"
90001120-17 = "Anyways, back then, the Utnapishtim's Ship that Aris reconstructed...was Aris' \"Proof of a Hero.\""
90001120-18 = "Heehee. I still remember the name I came up with. It was Sword of Light: Atrahasis Super Nova."
90001120-19 = "...It wasn't the right time to say it back then, but you're not very good at naming things, are you?"
90001120-20 = "I don't want to hear that from you!"
90001120-21 = "(They're both...)"
90001120-22 = "A-Ahem."
90001120-23 = "But we don't know what exactly Aris did back then. Which is the crux of the problem."
90001120-24 = "We have no way of determining the method or mechanisms she used to reconstruct such a thing."
90001120-25 = "Yes... What the source of energy was, how material reconstruction occurs..."
90001120-26 = "...how she collected and discharged it... They're all mysteries to us."
90001120-27 = "From our perspective, she managed all of this in the blink of an eye."
90001120-28 = "All these questions makes it nearly impossible for us to replicate what she did."
90001120-29 = "It was a miracle borne of the strangest dream."
90001120-30 = "Which is what makes it the absolute antithesis to science and theory!"
90001120-31 = "Exactly. Science is a systematic process. "
90001120-32 = "It's designed to allow anyone to reproduce the same results, as long as they're familiar with the process."
90001120-33 = "..."
90001120-34 = "I...believe we should reach out to Aris."
90001120-35 = "You want to call Aris out here, to this place?"
90001120-36 = "Yes. Exactly. We should ask Aris to analyze and explain what she did—"
90001120-37 = "Rio. Are you absolutely certain?"
90001120-38 = "Hm? What do you mean?"
90001120-43 = "Aren't you then...just using Aris as a \"tool\" to resolve your issues?"
90001120-44 = "...!"
90001120-45 = "..."
90001120-46 = "President..."
90001120-51 = "Rio. I don't need to repeat myself. We've already had this conversation, back in Utnapishtim's Ship."
90001120-52 = "The only difference is that the subject has shifted from Toki to Aris."
90001120-53 = "Of course, as a delicate flower blooming on a cliff, I couldn't care less about the accidents you make and regrets you have, but..."
90001120-54 = "Someone making the same mistakes over and over again is rather uncouth and boring...even for the one who has to watch it happen."
90001120-55 = "Y-Yes. Right. I have no rebuttal."
90001120-56 = "[s] \"...\""
90001120-60 = "[ns] \"Hey, Rio.\""
90001120-61 = "Hm...?"
90001120-78 = "[ns] \"Do we need Aris? To resolve this?\""
90001120-79 = "I...I apologize, Sensei. Please disregard that hypothesis. It's one of many possibilities, and I can hardly guarantee her presence here will result in what we need."
90001120-80 = "You can forget I ever proposed it... My approach was incorrect..."
90001120-81 = "[s] \"Then I'll try talking to Aris and the Game Development Department.\""
90001120-82 = "S-Sensei?! "
90001120-83 = "Sensei?!"
90001120-84 = "What is this behavior, Sensei? Is something wrong with you?"
90001120-85 = "Are you very sure, Sensei? In the worst case..."
90001120-90 = "...The situation seems dire? Well... I could see how one would be led to that conclusion."
90001120-91 = "...And if anyone were to talk to Aris, it should be you?"
90001120-92 = "[s] \"In return, I have a request of you, Rio.\""
90001120-93 = "M-Me?!"
90001120-94 = "[s] \"I want you to come to the Glacial Sea base. In person.\""
90001120-95 = "?!"
90001120-96 = "M-Ms. Rio?!"
90001120-97 = "Sensei, does that mean...?"
90001120-99 = "..."
90001120-100 = "The so-called concept of...taking responsibility together?"
90001120-101 = "[s] \"I'll leave the final decision to you, Rio.\""
90001120-105 = "[ns] \"Just like how you suggested your own proposal.\""
90001120-109 = "[ns] \"I, too, am suggesting a proposal.\""
90001120-110 = "..."
90001120-111 = "I don't know, Sensei. I..."
90001120-112 = "I don't know whether or not I have the right to..."
90001120-116 = "Ms. Rio. You were the one who saved us."
90001120-118 = "..."
90001120-123 = "I don't know about right and wrong. I am also unsure if it is feasible for someone to always make the correct choice."
90001120-124 = "However, I...would like to see you again."
90001120-125 = "Is that not reason enough?"
90001120-126 = "Toki..."
90001120-132 = "Rio. It's your decision to make."
90001120-133 = "I know what drives you. It's rationality."
90001120-134 = "So what decision will your rationality, your logic, drive you to this time?"
90001120-138 = "..."
90001120-139 = "Logically...there are limitations with radio communications, regarding both security and safety."
90001120-140 = "Any kind of radio interference, like what happened in this fight, could affect the integrity of the entire mission."
90001120-141 = "So, I..."
90001120-142 = "Excellent. It's decided."
90001120-143 = "We'll meet you at the Glacial Sea base."
90001120-144 = "...Okay."
90001120-146 = "What's wrong, Ms. Rio? Does something not agree with you?"
90001120-147 = "That's not exactly it..."
90001120-148 = "But is this really...okay?"
90001120-149 = "..."
90001120-150 = "I'll send you the coordinates of the Glacial Sea base. I'm assuming you have some form of transportation already sorted out?"
90001120-151 = "...Yes."
90001120-152 = "It will be our first meeting in a long time, Ms. Rio. I will be waiting."
90001120-153 = "Toki."
90001120-154 = "Yes. How can I help you?"
90001120-160 = "Thank you for your hard work. And for...everything..."
90001120-161 = "You're welcome."
90001120-164 = "While everyone was busy with their preparations, I took some time to myself."
90001120-165 = "Then..."
90001120-171 = "Huh? Sensei?"
90001120-172 = "Welcome, Sensei. What business do you have here?"
90001120-173 = "What? You wished to see our faces?"
90001120-174 = "I-I am both glad and thankful to hear that, but...eh...heheh...."
90001120-175 = "Don't try to play it off, though, Sensei!"
90001120-176 = "Affirmative. Your expression is that of seriousness. So again, what is your business?"
90001120-177 = "[s] \"Am I that easy to read? I see...\""
90001120-178 = "Are you surprised?! Of course we can see through you!"
90001120-179 = "We've been together for so long, you know? We know just by looking at you!"
90001120-180 = "Agreed. Perhaps you are not aware."
90001120-181 = "But the \"Sensei\" of my world was also that kind of person."
90001120-182 = "What's on your mind? Spill it to Arona!"
90001120-183 = "And to me."
90001120-184 = "Ah, yes. Plana too!"
90001120-188 = "[ns1] \"...It bothers me that I can't solve this for them.\"\n[ns2] \"I'm sending students straight into danger.\""
90001120-191 = "Sensei..."
90001120-192 = "..."
90001120-193 = "But if you think about it, Sensei...!"
90001120-194 = "Even until now...you've brilliantly solved many situations like this before, right? Or something like that... Heeheehee."
90001120-209 = "[ns] \"This time is a little different.\""
90001120-211 = "Hm? You're saying that back then, you helped resolve ongoing situations? Like cleaning up the aftermath..."
90001120-212 = "But this time, you feel like you're leading students into danger?"
90001120-213 = "Understood. But isn't there a possibility that something worse would happen if this situation isn't addressed?"
90001120-216 = "[ns3] \"That's also true.\"\n[ns4] \"But I'm putting students in harm's way...for a possibility.\""
90001120-221 = "[ns] \"It makes me wonder if I'm any different from those people.\""
90001120-224 = "..."
90001120-225 = "..."
90001120-227 = "[ns] \"Man! I wish I could just become super strong!\""
90001120-228 = "S-Sensei?!"
90001120-229 = "Cannot comprehend. What is wrong, Sensei?"
90001120-230 = "[s5] \"You know, like! That! Right?\"\n[s6] \"Be able to fly! Smash through barriers!\""
90001120-234 = "[ns7] \"Nameless Gods, Decagrammaton, whatever it is!\"\n[ns8] \"I wish I could solve everything at once!\""
90001120-238 = "Wh-Why are you acting like this...?"
90001120-239 = "Confused. I cannot understand. I would like to request a more detailed explanation from Sensei."
90001120-243 = "[ns] \"No. It's fine. I was just being foolish.\""
90001120-253 = "[log]Please take care of my students.[/log]"
90001120-259 = "[ns] \"I've got to do it! Yeah!\""
90001120-261 = "[ns9] \"I'll try everything I can! And struggle until the end!\"\n[ns10] \"And if that's not enough...!\""
90001120-264 = "I-If that's not enough?"
90001120-268 = "[ns11] \"Well! We can cross that bridge when we come to it!\"\n[ns12] \"Since I don't know how things will go! Ahahaha!\""
90001120-271 = "S-Sensei? You sure you're...okay?"
90001120-272 = "Doubtful. And confused. Request: Sensei should get a mental check-up."
90001120-273 = "[s] \"It's fine! It's fine!\""
90001120-278 = "S-Sensei?! Thank you for the head pats, but... Wah..."
90001120-279 = "Even more confused. Cannot understand Sensei's intentions."
90001120-281 = "I patted both of them for a while."
90001120-282 = "Once they fell asleep, I returned to the battlefield."
90001120-284 = "Next Episode;Departure"

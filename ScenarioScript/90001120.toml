90001120-22 = "3;히마리 방한복;06;흠, 흠.\n#3;stiff"
90001120-23 = "3;히마리 방한복;05;그렇지만 우리는 아리스가 그때 정확히 무엇을 했는지 몰라요. 문제는 여기에 있죠.\n#3;em;[반응]"
90001120-24 = "3;히마리 방한복;01;어떤 메커니즘으로 어떤 공정을 거쳐, 그런 것을 재구축해 냈는지 알 길이 없었죠."
90001120-25 = "3;리오;02;그래……. 그 에너지의 근원은 무엇이었는지, 물질 재구축은 무슨 방식으로 이루어지는지.\n#3;sig"
90001120-26 = "3;리오;00;그리고 그것들을 어떻게 수렴하여 방출한 것인지, 전혀 알 방법이 없었어.\n#3;sig"
90001120-27 = "3;리오;07;그 일은 어떻게 보면…… 우리 입장에서는, '순간'에 일어난 것이었으니까.\n#3;sig"
90001120-28 = "3;히마리 방한복;06;알지 못한다는 것은, 재현이 매우 어렵거나 불가능에 가깝다는 뜻이죠…….\n#3;em;[한숨]"
90001120-29 = "3;히마리 방한복;05;단 한 번뿐인 기적이라는 것은, 어떤 의미에서 낭만적이지만."
90001120-30 = "3;히마리 방한복;02;그렇기에 그것은 이론과 학문의 적이기도 하고요."
90001120-31 = "3;리오;02;그래. 학문이란 것은 기본적으로 누구나 해당 과정을 충분히 숙지하면. \n#3;sig"
90001120-32 = "3;리오;00;동등하게 같은 결과를 낼 수 있도록 고안된, 일종의 시스템적 과정이니까.\n#3;sig"

90001120-2 = "3;토키 모드 1;01\n#3;a\n#wait;1000"
90001120-3 = "3;토키 모드 1;02;저는 어디까지나 전해 들은 것입니다만, 그때 아리스가 많은 활약을 했다고 하더군요.\n#3;em;…"
90001120-4 = "3;토키 모드 1;99;제가 기억하고 있는 것은, 모든 일이 마무리된 뒤, 게임개발부 여러분께서 초현상특무부의 동아리실로 찾아왔던 것 정도입니다.\n#3;m4"
90001120-5 = "3;토키 모드 1;99;파티 제안, 2kb의 데이터, 로봇 형상 열쇠고리, 적절한 분위기, 감동적인 배경 음악, 그리고 마침내 저의 메인 히로인 등극까지.\n#3;m3"
90001120-6 = "3;토키 모드 1;02;참 많은 일이 있었죠."
90001120-7 = "3;토키 모드 1;03;……훗.\n#3;jump"
90001120-8 = "5;히마리 방한복;06\n3;토키 모드 1;03\n#na;히마리 방한복;앞부분은 대충 알겠는데, 뒤는 무슨 소리인가요…….\n#3;m2\n#5;al\n#5;em;[땀]"

[translation]
1011203-1 = "เดตในร้านค้า"
1011203-6 = "(คุณครูมาทำงานในมิลเลเนียม กว่าจะเสร็จงานแล้วออกมาก็เป็นเวลาอาหารกลางวันพอดี)"
1011203-10 = "[ns] \"ชักจะ...\""
1011203-12 = "[ns] \"หิวแล้วสิ!\""
1011203-16 = "(คุณครูคิดอยู่นานว่าจะกินอะไรดี...)"
1011203-23 = "[ns] \"ต้องฝากท้องไว้ที่ร้านค้าแล้วละ\""
1011203-24 = "(ในขณะที่เดินดูของกินอยู่ในร้าน)"
1011203-28 = "[ns] \"หืม? คนนั้นคือ...\""
1011203-38 = "[ns1] \"อาสึนะ สวัสดี! จะซื้อข้าวเหรอ?\"\n[ns2] \"อ้าว อาสึนะ จะซื้ออาหารกลางวันเหรอ?\""
1011203-43 = "อ๊ะ คุณครู!!"
1011203-44 = "สวัสดี สวัสดี!!"
1011203-45 = "อะฮ่าฮ่า ไม่คิดเลยนะว่าจะได้เจอคุณครูในร้านค้าน่ะ น่าทึ่งจัง"
1011203-46 = "[s] \"นั่นสินะ ได้เจออาสึนะในที่แบบนี้ด้วย\""
1011203-47 = "อื้อ! อาสึนะกำลังคิดอยู่น่ะว่ากลางวันนี้จะกินอะไรดี"
1011203-52 = "ระหว่างขนมปังเมล่อนกับขนมปังยากิโซบะ~"
1011203-56 = "อาสึนะจะกินอะไรดีนะ?"
1011203-57 = "อืม นี่เป็นเรื่องที่ยากมากๆ สำหรับอาสึนะเลย"
1011203-58 = "[s] \"ต้องเลือกแค่อันเดียวเหรอ?\""
1011203-62 = "หืม? นั่นสินะ"
1011203-63 = "จะเลือกทำไมในเมื่อกินได้ทั้งสองอันเลย นั่นเป็นวิธีที่ดีเลยนะ อะฮ่าฮ่า!"
1011203-64 = "ถึงอาสึนะจะไม่เคยกินขนมปังสองก้อนในมื้อเดียวก็เถอะ! แต่ก็น่าจะไม่มีปัญหาหรอก เนอะ?!"
1011203-68 = "คุณครู คุณครู! จะกินมื้อกลางวันกับอาสึนะใช่มั้ย?"
1011203-69 = "[s] \"อ่า... ใช่ ต้องกินสิ\""
1011203-71 = "(คุณครูเลือกอาหารกลางวันที่จะกินกับอาสึนะแล้วออกมาข้างนอก)"
1011203-76 = "อาสึนะพกเงินมานะ~ แต่คุณครูก็จ่ายเงินให้อาสึนะด้วย~"
1011203-77 = "[s3] \"ก็เราไม่ได้เจอกันบ่อยๆ นี่\"\n[s4] \"แค่นี้เอง ให้ครูซื้อให้เถอะนะ\""
1011203-80 = "ฮึ่ม~ ก็ได้! แต่รอบหน้าอาสึนะขอเลี้ยงตอบแทนนะ"
1011203-84 = "อ๊ะ ไปนั่งตรงโน้นกันเถอะ! นั่นเป็นม้านั่งที่อาสึนะชอบไปนั่งบ่อยๆ น่ะ"
1011203-93 = "แหะๆ ตรงนี้เป็นยังไงบ้าง?"
1011203-94 = "[s5] \"อื้อ ดีเลยนะ แดดรำไร ไม่ร้อนเกินไปด้วย\"\n[s6] \"เป็นที่ที่ดีเลยละ\""
1011203-97 = "ใช่มั้ยล่ะ? ถ้าได้นั่งมาปล่อยใจอยู่ตรงนี้ อาสึนะก็จะอารมณ์ดีน่ะ"
1011203-101 = "จริงสิ ขนมปัง"
1011203-104 = "ขนมปังเมล่อนกับขนมปังยากิโซบะที่คุณครูซื้อให้~!"
1011203-108 = "ว่าแต่จะกินอะไรก่อนดีนะ...? คุณครูว่ากินอะไรก่อนดี?"
1011203-109 = "[s7] \"ขนมปังเมล่อน!\"\n[s8] \"ขนมปังยากิโซบะ\""
1011203-112 = "โอเค~! ฮิฮิ"
1011203-113 = "พอได้อยู่กับคุณครู เรื่องที่ยากๆ สำหรับอาสึนะก็กลายเป็นเรื่องง่ายไปหมดเลยละ!"
1011203-114 = "อะฮ่าฮ่า อยากให้คุณครูช่วยตัดสินใจให้แบบนี้ไปตลอดจัง"
1011203-115 = "[s] \"ครูว่าอาสึนะตัดสินใจเองน่าจะสนุกกว่านะ\""
1011203-116 = "งั้นเหรอ? ฮืม..."
1011203-120 = "ก็อาจจะเป็นอย่างนั้นนะ?"
1011203-121 = "อื้อ! งั้นเรามาผลัดกันกินคนละคำแล้วกัน! อาสึนะตัดสินใจแบบนี้ละ!"
1011203-125 = "จะทานแล้วน้า!"
1011203-131 = "อะฮ่าฮ่า อร่อยจัง!"
1011203-132 = "พอได้มานั่งกินกับคุณครู ก็อร่อยกว่าเดิมอีกนะเนี่ย!!"
1011203-134 = "(สุดท้ายอาสึนะก็อิ่มจนเหลือขนมปังอย่างละครึ่งก้อน...)"
1011203-138 = "(คุณครูกินขนมปังที่เหลือจนหมดเพราะเสียดายของ)"

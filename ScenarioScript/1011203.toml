[translation]
1011203-1 = "Cafeteria Date"
1011203-6 = "I finished my work at Millennium right around lunchtime."
1011203-10 = "[ns] \"I'm...\""
1011203-12 = "[ns] \"Hungry!\""
1011203-16 = "I thought for a long time about what to eat."
1011203-23 = "[ns] \"I should check out the cafeteria.\""
1011203-24 = "As I looked around for what to get..."
1011203-28 = "[ns] \"Hm? Is that...\""
1011203-38 = "[ns1] \"Hi, Asuna!\"\n[ns2] \"Are you picking out your lunch menu?\""
1011203-43 = "Ah, Sensei!!"
1011203-44 = "Hi, hi!!"
1011203-45 = "Ahaha, what are the odds, bumping into you right here in the cafeteria? That's cool."
1011203-46 = "[s] \"I know, right? And I bumped into you.\""
1011203-47 = "Yup! So I was wondering what to eat for lunch."
1011203-52 = "Here, between this melon bread..."
1011203-56 = "...and this Yakisoba bread, which should I get?"
1011203-57 = "Mmm, tough choice, too tough."
1011203-58 = "[s] \"Why not both?\""
1011203-62 = "Huh? You're right."
1011203-63 = "I can just get both, right? Problem solved. Ahaha!"
1011203-64 = "I've never eaten two kinds of bread at once! But I'm sure it'll work out somehow!"
1011203-68 = "Sensei, Sensei! You're going to eat lunch with me right?"
1011203-69 = "[s] \"Uh...of course.\""
1011203-71 = "I picked out my lunch and went outside with Asuna."
1011203-76 = "You bought my lunch too?! I had my wallet with me..."
1011203-77 = "[s3] \"It's not every day we run into each other.\"\n[s4] \"Let me do at least this much for you.\""
1011203-80 = "Mmm, okay! I'll be the one to buy next time."
1011203-84 = "Ah, let's sit over there! I like that bench."
1011203-93 = "Heehee, what do you think of this place?"
1011203-94 = "[s5] \"It's nice. There's just the right amount of sun.\"\n[s6] \"It's a good place.\""
1011203-97 = "Right? I like to just sit here and space out from time to time."
1011203-101 = "Oh, the bread."
1011203-104 = "Melon bread and Yakisoba bread, courtesy of Sensei!"
1011203-108 = "But what should I start with...? Which one should I eat first?"
1011203-109 = "[s7] \"The melon bread.\"\n[s8] \"The Yakisoba bread.\""
1011203-112 = "Okay! Heehee."
1011203-113 = "You make all the hard things easy, Sensei!"
1011203-114 = "Ahaha, I wish you could make all my decisions for me."
1011203-115 = "[s] \"Wouldn't it be more fun if you're the one to make decisions, Asuna?\""
1011203-116 = "You think so? Hmm..."
1011203-120 = "Maybe?"
1011203-121 = "Okay, so here's my decision! I'll alternate breads, one bite at a time!"
1011203-125 = "Thank you for the meal!"
1011203-131 = "Ahaha, it's good!"
1011203-132 = "It tastes even better because I'm eating with you, Sensei!"
1011203-134 = "Asuna filled up on bread, and had half of each left over."
1011203-138 = "It would have been a waste to throw it out, so I ended up eating the rest."

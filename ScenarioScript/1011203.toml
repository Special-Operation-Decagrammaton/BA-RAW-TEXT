[translation]
1011203-1 = "合作社約會"
1011203-6 = "（在千年處理完工作後，到了午餐時間）"
1011203-10 = "[ns]「肚子……」"
1011203-12 = "[ns]「好餓！」"
1011203-16 = "（煩惱了很久該吃什麼才好……）"
1011203-23 = "[ns]「總之先去合作社吧。」"
1011203-24 = "（就這樣在合作社裡四處覓食）"
1011203-28 = "[ns]「嗯？那是……」"
1011203-38 = "[ns1]「嗨，明日奈！」\n[ns2]「你是來挑午餐的嗎？」"
1011203-43 = "啊，老師！！"
1011203-44 = "哈囉哈囉～！！"
1011203-45 = "啊哈哈，居然會在合作社遇到老師，感覺真神奇。"
1011203-46 = "[s]「就是說啊。剛好明日奈也在。」"
1011203-47 = "嗯！明日奈正在煩惱午餐要吃什麼呢。"
1011203-52 = "這個菠蘿麵包～"
1011203-56 = "和這個炒麵麵包，該吃哪一個好呢？"
1011203-57 = "唔嗯，這個問題對明日奈來說太難了。"
1011203-58 = "[s]「只能吃一個嗎？」"
1011203-62 = "咦？對耶？"
1011203-63 = "兩個都買就好了嘛？#n原來還有這個方法。啊哈哈！"
1011203-64 = "雖然我沒有試過一次吃兩個麵包！但總有辦法吃完的吧！"
1011203-68 = "老師老師！你會陪明日奈一起吃午餐吧？"
1011203-69 = "[s]「啊啊……那當然。」"
1011203-71 = "（跟明日奈一起選好要吃的午餐後，離開了合作社）"
1011203-76 = "居然還幫明日奈買單～我明明也有帶錢包的說～"
1011203-77 = "[s3]「畢竟難得能遇到你。」\n[s4]「這點東西就讓我請吧。」"
1011203-80 = "哦哦～好吧！那下次換我請客。"
1011203-84 = "啊，我們去那邊坐吧！#n那是明日奈常坐的長椅。"
1011203-93 = "嘿嘿，覺得這裡怎麼樣呀？"
1011203-94 = "[s5]「嗯，真不錯。陽光也恰到好處。」\n[s6]「真是個絕佳的位置。」"
1011203-97 = "對吧？只要在這裡坐著發呆，心情就會變得很好哦。"
1011203-101 = "啊，麵包。"
1011203-104 = "老師買給我的菠蘿麵包和炒麵麵包～！"
1011203-108 = "不過該從哪個開始吃……？#n先吃哪一個好呢？"
1011203-109 = "[s7]「菠蘿麵包！」\n[s8]「炒麵麵包！」"
1011203-112 = "好～！嘿嘿。"
1011203-113 = "只要跟老師在一起，對明日奈來說很困難的事一下就變得超簡單的！"
1011203-114 = "啊哈哈，希望老師以後也能像這樣幫我做決定。"
1011203-115 = "[s]「不過如果由明日奈自己決定的話，應該會更有趣吧？」"
1011203-116 = "是嗎？哼嗯……"
1011203-120 = "或許吧？"
1011203-121 = "嗯！那我要輪流各吃一口！就這麼決定了！"
1011203-125 = "我要開動囉！"
1011203-131 = "啊哈哈，好好吃！"
1011203-132 = "跟老師一起感覺更美味了！！"
1011203-134 = "（結果明日奈表示吃飽了的時候，麵包恰好各剩下一半……）"
1011203-138 = "（如果把剩下的麵包丟掉實在很可惜，只好自己吃掉了）"

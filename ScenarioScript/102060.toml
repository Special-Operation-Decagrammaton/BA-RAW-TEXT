[translation]
102060-1 = "ตอนที่ 6;ปฏิบัติการบุกยึดหอคอยแห่งที่ 1 - เขตทะเลทรายอะบิดอส"
102060-3 = "ทุกคน! เริ่มปฏิบัติการได้ค่ะ! "
102060-4 = "พวกเราจะบุกไปจนถึงจุดนัดพบ แล้วรวมตัวกับกองกำลังที่ 2 ที่หลอกล่อเป้าหมายไปยังทางรถไฟข้าม#nทะเลทราย จากนั้นก็จะหาเส้นทางไปยัง <ผู้พิทักษ์> ค่ะ!"
102060-5 = "ระวังเลเซอร์ของบีนาห์กันด้วยนะ"
102060-9 = "ค่า~☆ รับทราบค่ะ"
102060-10 = "งั้นก็ออกเดินทางเลย~"
102060-11 = "ดีละ ไปกันเถอะ!"
102060-13 = "เอาละ งั้นเราก็เริ่มกันบ้าง ทุกคนพร้อมแล้วใช่ไหม?"
102060-14 = "อืม พร้อมแล้ว~"
102060-15 = "คะ... ค่ะ!"
102060-16 = "งั้นก็เริ่มเลย คาโยโกะ"
102060-18 = "เข้าใจแล้ว ฉันจะเปิดทางรถไฟให้"
102060-27 = "อ๊ะ... อ๊ะ! เออะ... เอ่อ...!!"
102060-28 = "โดนลอบโจมตีงั้นเหรอ...?!"
102060-29 = "หืม? เจ้าพวกนั้นมาบุกพวกเราเหรอ? ฉลาดไม่เบาเลยแฮะ"
102060-33 = "...หึ คิดว่าของแบบนี้จะหยุดพวกเราได้งั้นสินะ ฉันจะทำให้เห็นเองว่าคิดผิดอย่างแรง!"
102060-34 = "มาลิ้มรสความร้ายกาจของฉันหน่อยเป็นไง!"

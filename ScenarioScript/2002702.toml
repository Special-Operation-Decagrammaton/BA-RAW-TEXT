[translation]
2002702-1 = "浮潛"
2002702-3 = "（朝著白子等待著的岸邊走去）"
2002702-4 = "……啊，老師。我在這裡。"
2002702-5 = "[ns1]「讓你久等了，白子。」\n[ns2]「這裡是……」"
2002702-13 = "海邊的岩岸。很適合採集食材。"
2002702-14 = "……嗯？"
2002702-15 = "確實，之前採集的食材還有剩沒錯……"
2002702-16 = "唔嗯……"
2002702-17 = "這麼說，也對……"
2002702-21 = "……再多採一些……果然不可以嗎。"
2002702-25 = "[ns3]「只能再採一點哦。」\n[ns4]「注意不要採太多哦。」"
2002702-28 = "嗯……"
2002702-29 = "我也覺得，老師應該會這麼說。"
2002702-30 = "所以，我有做好準備。#n今天的我沒有破綻。"
2002702-40 = "你看，老師。"
2002702-41 = "[s5]「是浮潛的裝備。」\n[s6]「確實準備得萬無一失呢。」"
2002702-44 = "嗯。今天的目標是大傢伙。"
2002702-45 = "──只有在這附近才能採集到的「幻之貝」。"
2002702-46 = "……老師也沒聽過嗎？"
2002702-47 = "……其實我也只有在旅遊手冊看過。#n是否真的有，只能用自己的眼睛來確認了。"
2002702-48 = "嗯……雖然目前的情報只有這些，不過還是很在意。"
2002702-52 = "……現在不是說這些的時候了。"
2002702-53 = "老師，稍微等我一會。我很快就回來。"
2002702-58 = "（……連回答的時間都沒有，白子便已潛入海中）"
2002702-60 = "（每當白子浮出水面，手裡都會拿著神奇的東西……）"
2002702-65 = "[ns7]「難道……」\n[ns8]「這就是『幻之貝』？」"
2002702-68 = "不，不是這個。"
2002702-72 = "……我再去一趟。"
2002702-83 = "（結果直到太陽下山也沒能採到「幻之貝」）"
2002702-84 = "[ns9]「已經這麼晚了……」\n[ns10]「差不多該回去了……」"
2002702-87 = "不。"
2002702-88 = "沒關係的，老師。"
2002702-92 = "總算是……"
2002702-93 = "……趕上了。"
2002702-96 = "― [log=시로코 수영복]……我回來了，老師。[/log][wa:1980] "
2002702-98 = "― [log=시로코 수영복]……嗯，成功了。……用這個，就可以做了。[/log][wa:3460] "
2002702-101 = "― [log=시로코 수영복]在手冊上看過的，那道料理。[/log][wa:2820] "
2002702-103 = "― [log=시로코 수영복]料理工具也準備好了，沒問題。[/log][wa:3080] "
2002702-106 = "― [log=시로코 수영복]……幸好老師有一起來。[/log][wa:2960] "
2002702-108 = "― [log=시로코 수영복]只有我一個人的話，說不定中途就放棄了。[/log][wa:2480] "
2002702-111 = "[ns11]「我什麼也沒做唷。」\n[ns12]「我想就算只有白子一個人，你也會努力的。」"
2002702-114 = "― [log=시로코 수영복]不……沒有那種事。[/log][wa:1800] "
2002702-116 = "― [log=시로코 수영복]不管是現在，還是我能這麼想的契機。[/log][wa:3580] "
2002702-119 = "― [log=시로코 수영복]全部……都是因為有老師在。[/log][wa:3280] "
2002702-122 = "― [log=시로코 수영복]……老師……謝謝你。[/log][wa:3320] "
2002702-125 = "（與帶著愉快表情的白子一起回到了渡假村）"
2002702-126 = "（雖然被稱為「幻之貝」……）"
2002702-133 = "（……吃起來的味道卻很普通）"

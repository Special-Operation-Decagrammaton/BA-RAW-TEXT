[translation]
2002702-1 = "Snorkeling"
2002702-3 = "I made my way to the rocks by the sea, where Shiroko was waiting."
2002702-4 = "Ah. Sensei. Here."
2002702-5 = "[ns1] \"Nice rock.\"\n[ns2] \"What is this place?\""
2002702-13 = "Tidal rock. It's a good place to catch food."
2002702-14 = "...Oh?"
2002702-15 = "Don't we already have a lot of food?"
2002702-16 = "Hmm..."
2002702-17 = "Technically, yes, but..."
2002702-21 = "Shouldn't I gather more?"
2002702-25 = "[ns3] \"I suppose there's no harm in it.\"\n[ns4] \"If you want to, that's reason enough.\""
2002702-28 = "Sensei."
2002702-29 = "I hoped you would say that. Sensei."
2002702-30 = "I am already prepared. I brought everything I need."
2002702-40 = "See. Here. This gear."
2002702-41 = "[s5] \"It's snorkeling equipment...\"\n[s6] \"You're definitely prepared.\""
2002702-44 = "Yes. Because this is what I need. For today's target."
2002702-45 = "I read about a mythical clam... It only shows up here."
2002702-46 = "Have you heard about it?"
2002702-47 = "I read about it in a pamphlet... But I don't know if it's real or not."
2002702-48 = "But it's the only clue I have so far. And..."
2002702-52 = "No."
2002702-53 = "I'm wasting time explaining. Give me a minute, Sensei. I'll be right back."
2002702-58 = "And so, Shiroko jumped into the water."
2002702-60 = "Every time she surfaced, she brought back all kinds of strange things, but..."
2002702-65 = "[ns7] \"You got it! Nice job!\"\n[ns8] \"Is that really the mythical clam?\""
2002702-68 = "No. It's wrong. This isn't it."
2002702-72 = "I need to go under again, Sensei."
2002702-83 = "After several hours, there was no sign of this so-called \"mythical clam\"..."
2002702-84 = "[ns9] \"Will you look at the time...\"\n[ns10] \"Shall we call it a day?\""
2002702-87 = "No."
2002702-88 = "It's fine, Sensei."
2002702-92 = "We were running out of time..."
2002702-93 = "But I succeeded."
2002702-96 = "― [log=시로코 수영복]I'm back, Sensei.[/log][wa:1700] "
2002702-98 = "― [log=시로코 수영복]Yes. I got it. Now, I can make the dish...[/log][wa:2580] "
2002702-101 = "― [log=시로코 수영복]The dish I saw in the pamphlet, I mean.[/log][wa:1780] "
2002702-103 = "― [log=시로코 수영복]I've got my cookware ready. Everything's set.[/log][wa:1840] "
2002702-106 = "― [log=시로코 수영복]...I'm glad you came here with me.[/log][wa:2040] "
2002702-108 = "― [log=시로코 수영복]I might have given up if I was alone.[/log][wa:1760] "
2002702-111 = "[ns11] \"You would have done great on your own, too.\"\n[ns12] \"I didn't do a thing, Shiroko.\""
2002702-114 = "― [log=시로코 수영복]Hmm... Not true.[/log][wa:1520] "
2002702-116 = "― [log=시로코 수영복]I was able to do this...and I was able to think like this...[/log][wa:1860] "
2002702-119 = "― [log=시로코 수영복]Only... because you were watching over me.[/log][wa:2120] "
2002702-122 = "― [log=시로코 수영복]Thank you...Sensei.[/log][wa:2960] "
2002702-125 = "Satisfied with the day's catch, we returned to camp."
2002702-126 = "As for the taste of this mythical clam..."
2002702-133 = "...it was kind of bland."

[translation]
2002702-1 = "ดำน้ำดูปะการัง"
2002702-3 = "(คุณครูออกมาที่แถวๆ โขดหินที่ชิโรโกะรออยู่)"
2002702-4 = "อ่า... คุณครู ทางนี้..."
2002702-5 = "[ns1] \"ชิโรโกะ...?\"\n[ns2] \"ที่นี่คือ...?\""
2002702-13 = "โขดหินน่ะ ตรงนี้เหมาะที่จะมาหาเสบียงที่สุดแล้ว"
2002702-14 = "หืม...?"
2002702-15 = "เสบียงที่เก็บไปเมื่อคราวก่อนยังเหลืออยู่อีกเยอะเลยงั้นเหรอ?"
2002702-16 = "อืม..."
2002702-17 = "เรื่องนั้นมันก็จริงอยู่หรอก..."
2002702-21 = "ฉันไม่ควรเก็บเพิ่มงั้นเหรอ...?"
2002702-25 = "[ns3] \"เปล่าสักหน่อย ไม่ได้ซะที่ไหนกันล่ะ\"\n[ns4] \"ถ้าอยากทำก็ได้อยู่แล้ว\""
2002702-28 = "คุณครู..."
2002702-29 = "ดีจัง คิดแล้วว่าถ้าเป็นคุณครูละก็คงจะพูดแบบนี้"
2002702-30 = "เพราะงั้นคราวนี้ฉันเลยเตรียมมาพร้อมทุกอย่างเลย จัดเต็มแบบสุดๆ เลยละ"
2002702-40 = "นี่ไง ดูนี่สิ... อุปกรณ์พวกนี้"
2002702-41 = "[s5] \"อุปกรณ์ดำน้ำจริงด้วย...\"\n[s6] \"เตรียมมาแบบจัดหนักจัดเต็มจริงๆ ด้วยแฮะ\""
2002702-44 = "อื้อ เพราะถ้าไม่เตรียมมาให้พร้อมก็คงทำไม่ได้ตามเป้าหมายอีก"
2002702-45 = "ได้ยินว่าหอยลึกลับ... จะปรากฏออกมาแค่ในอาทิตย์นี้เท่านั้นด้วยนะ"
2002702-46 = "...ไม่เคยได้ยินมาก่อนเลยงั้นเหรอ?"
2002702-47 = "อันที่จริง ฉันเห็นมาจากในใบปลิวน่ะ... ไม่รู้เหมือนกันเป็นเรื่องจริงหรือเรื่องแต่งขึ้นมา"
2002702-48 = "แต่ว่าเบาะแสที่รู้ในตอนนี้ก็มีแค่ข้อมูลในใบปลิวนั่นเท่านั้น..."
2002702-52 = "ไม่สิ..."
2002702-53 = "ตอนนี้ไม่ใช่เวลามามัวทำอะไรแบบนี้... คุณครู รอแป๊บหนึ่งนะ ฉันจะรีบกลับมา"
2002702-58 = "(...และชิโรโกะก็กระโดดลงไปในน้ำ...)"
2002702-60 = "(ทุกครั้งที่ชิโรโกะว่ายขึ้นมา เธอมักจะได้อะไรบางอย่างที่ดูแปลกตาและมีขนาดใหญ่ติดมือกลับมาด้วย...)"
2002702-65 = "[ns7] \"โอ้โฮ จับได้แล้วแฮะ\"\n[ns8] \"นั่นน่ะเหรอ หอยลึกลับ?\""
2002702-68 = "เปล่า ไม่ใช่หรอก อันนี้ไม่ใช่หรอก"
2002702-72 = "...ฉันจะดำลงไปหาใหม่แล้วกัน"
2002702-83 = "(หลังจากนั้นหลายชั่วโมง ก็ยังไม่มีวี่แววว่าจะได้เห็น 'หอยลึกลับ' ที่เขียนไว้ในใบปลิวนั่นเลย...)"
2002702-84 = "[ns9] \"เวลาผ่านมาขนาดนี้แล้วเหรอเนี่ย...\"\n[ns10] \"วันนี้ควรพอแค่นี้ก่อนดีไหม...\""
2002702-87 = "ไม่ละ..."
2002702-88 = "ไม่เป็นไรหรอก คุณครู"
2002702-92 = "ถึงจะจับอย่างอื่นมาได้เยอะก็จริง..."
2002702-93 = "แต่ฉันก็ทำสำเร็จแล้วละ"
2002702-96 = "― [log=시로코 수영복]...คุณครู ฉันกลับมาแล้ว[/log][wa:1460] "
2002702-98 = "― [log=시로코 수영복]...อืม สำเร็จแล้ว ตอนนี้ก็ทำอาหารได้แล้ว...[/log][wa:2540] "
2002702-101 = "― [log=시로코 수영복]เมนูที่ฉันเห็นมาจากใบปลิวนั่นน่ะ[/log][wa:2060] "
2002702-103 = "― [log=시로코 수영복]ฉันเตรียมอุปกรณ์ทำอาหารไว้แล้ว ไม่ต้องห่วง[/log][wa:1960] "
2002702-106 = "― [log=시로코 수영복]...โชคดีที่คุณครูมาด้วย[/log][wa:2480] "
2002702-108 = "― [log=시로코 수영복]ถ้ามาคนเดียวละก็ ฉันอาจล้มเลิกไปกลางคันก็ได้[/log][wa:1480] "
2002702-111 = "[ns11] \"ถ้าเป็นชิโรโกะละก็ ถึงมาคนเดียวก็ต้องทำได้ดีแน่ๆ\"\n[ns12] \"ครูไม่ได้ทำอะไรเลยสักหน่อย ชิโรโกะต่างหากที่เป็นคนทำน่ะ\""
2002702-114 = "― [log=시로코 수영복]อืม... ไม่ใช่หรอก[/log][wa:1480] "
2002702-116 = "― [log=시로코 수영복]การที่ตอนนี้ฉันคิดได้แบบนี้[/log][wa:3180] "
2002702-119 = "― [log=시로코 수영복]ก็เป็นเพราะมีคุณครูอยู่ด้วยไงล่ะ[/log][wa:2520] "
2002702-122 = "― [log=시로코 수영복]...คุณครู... ขอบคุณนะ[/log][wa:2880] "
2002702-125 = "(คุณครูกลับไปที่แคมป์พร้อมกับชิโรโกะที่มีสีหน้าพึงพอใจอย่างมาก)"
2002702-126 = "(แต่ว่ารสชาติของหอยลึกลับที่ได้ชิมนั้น...)"
2002702-133 = "(...กลับไม่ได้สมกับที่คาดหวังเลย)"

[translation]
83302100200-6 = "อ๊ะ ท่านประธาน ฉันกำลังรออยู่เลยค่ะ"
83302100200-7 = "ชินัตสึ? มีเรื่องอะไรเหรอ?"
83302100200-8 = "คือว่า... ฉันได้รับแจ้งว่ามีเหตุวุ่นวายเกิดขึ้นในโรงอาหารนักเรียนน่ะค่ะ"
83302100200-9 = "ในโรงอาหารงั้นเหรอ..."
83302100200-10 = "ตอนนี้ฟูกะก็น่าจะง่วนอยู่กับงานที่แพนเดโมเนียม โซไซตี้สั่งอยู่ด้วย คงลำบากมากเลยนะ"
83302100200-11 = "ว่าแต่ใครเหรอที่มาก่อเรื่อง? แก๊งหมวกกันน็อก? หรือว่าเด็กเจ้าปัญหากลุ่มอื่น?"
83302100200-12 = "เอ่อ... มันแปลกตรงที่ตัวการนี่ละค่ะ"
83302100200-13 = "มีอะไรแปลกเหรอ?"
83302100200-14 = "เหตุที่เกิดขึ้นไม่ได้มาจากพวกเด็กเจ้าปัญหาในเกเฮนน่าเหมือนทุกครั้ง"
83302100200-15 = "ว่ากันว่าตัวการหลักของครั้งนี้เป็นสัตว์ประหลาดที่ไม่สามารถระบุได้..."
83302100200-16 = "สัตว์ประหลาดที่ไม่สามารถระบุได้...? มีคนโทรมาแจ้งเพราะจะแกล้งกันรึเปล่า?"
83302100200-17 = "ไม่น่าจะใช่นะคะ คนที่แจ้งคือจูริน่ะค่ะ..."
83302100200-23 = "ไม่เห็นจะเข้าใจเลย... แต่ก็ไปกันเถอะ"

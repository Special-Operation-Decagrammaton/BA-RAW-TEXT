[translation]
83302100200-6 = "Ah, Head Prefect. I've been waiting for you."
83302100200-7 = "Chinatsu? What brings you here?"
83302100200-8 = "Well... I received a report of a commotion at the student dining hall."
83302100200-9 = "The student dining hall...?"
83302100200-10 = "Fuuka already has her hands full with the Pandemonium Society's catering demands. I doubt she would be able to deal with any troublemakers effectively right now."
83302100200-11 = "So... Who is the cause of the commotion this time? The Helmet Gang? Or is some other group of troublemakers taking their chance?"
83302100200-12 = "Um... That's the strange part..."
83302100200-13 = "What do you mean?"
83302100200-14 = "Unusually, this commotion wasn't caused by any of Gehenna's delinquent groups..."
83302100200-15 = "The dining hall was supposedly attacked by some kind of unidentified monster..."
83302100200-16 = "...An unidentified monster? And you're sure the report wasn't a prank?"
83302100200-17 = "Juri called it in, so I doubt it's an attempt to mislead us..."
83302100200-23 = "...Very well. That isn't much to go on, but clearly we need to investigate."

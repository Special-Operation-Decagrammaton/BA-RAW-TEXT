[translation]
1012803-1 = "A Sweet Price"
1012803-2 = "I headed to the shopping district the next day."
1012803-3 = "There was something I was earnestly looking for, something special."
1012803-6 = "I searched for about two hours, but..."
1012803-9 = "...Unfortunately, I couldn't find what I wanted."
1012803-10 = "However..."
1012803-11 = "Is that Sensei?"
1012803-15 = "Fancy meeting you here!"
1012803-16 = "How've you been?"
1012803-17 = "[s] \"I'm doing well. What about you, Fuyu?\""
1012803-18 = "I'm doing excellently, thanks to you!"
1012803-19 = "I was just at the hardware shop. SOMEONE broke the catapult, and I figured I better get on it."
1012803-20 = "I've also been picking up supplies for an upcoming installation."
1012803-21 = "[s] \"So, you do more than just smuggling?\""
1012803-22 = "...Fufu."
1012803-23 = "Anyway, what brings you out here on this fine day?"
1012803-24 = "Based on your empty bag, I figure you're not looking for groceries."
1012803-25 = "What? You're buying a necessity?"
1012803-26 = "A 7-stage fusion super alloy transforming robot...?"
1012803-27 = "How cool."
1012803-28 = "I suppose you could call something like that a \"necessity.\""
1012803-29 = "[s] \"I couldn't find it.\""
1012803-30 = "Really? That's a bummer!"
1012803-31 = "As our Preferred Platinum Client, you should've messaged me that you were looking!"
1012803-32 = "[s] \"Preferred Platinum Client...?\""
1012803-33 = "Discontinued items, sold-out trinkets, potentially lethal robots..."
1012803-34 = "The Cartel has its ways. We can find it for you."
1012803-35 = "[s] \"As expected of the Sales Manager...!\""
1012803-36 = "Emphasis on the \"Sales.\" It'll cost you. Fufu."
1012803-37 = "[s] \"And what's the price...?\""
1012803-38 = "Uh..."
1012803-42 = "Hm..."
1012803-43 = "Well... Um... Hm... That's tough."
1012803-44 = "[s] \"...?\""
1012803-45 = "I suppose you could...buy me a meal..."
1012803-46 = "Or w-we could watch a movie together..."
1012803-47 = "That's probably too much. It could be short, like just a little treat at a dessert cafe?"
1012803-48 = "[s1] \"So we get food, watch a movie,\"\n[s2] \"...and chat at the dessert cafe?\""
1012803-54 = "Wh-Wh-Wh-Wh-What?!"
1012803-55 = "R-R-R-R-R-R-Really?!"
1012803-56 = "I mean! Yeah! That's what I said. You owe me big time. Um..."
1012803-57 = "S-Sounds...awesome..."
1012803-59 = "I spent the fun-filled day with Fuyu. We had lunch, watched a movie, and shared dessert."
1012803-60 = "Soon after, the robot toy was thoughtfully delivered to Schale."

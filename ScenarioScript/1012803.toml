[translation]
1012803-1 = "ค่าตอบแทนอันแสนหวาน"
1012803-2 = "(วันต่อมา คุณครูไปที่ย่านการค้า)"
1012803-3 = "(เหตุผลก็คือ มีของบางอย่างที่ต้องซื้อกลับมาให้ได้)"
1012803-6 = "(แม้จะเดินหาอยู่หลายชั่วโมง...)"
1012803-9 = "(แต่ก็น่าเศร้าที่คุณครูหาสินค้าที่ต้องการไม่เจอ...)"
1012803-10 = "(แต่ว่า...)"
1012803-11 = "โอ๊ะ คุณครู?"
1012803-15 = "ได้เจอกันอีกครั้งในที่แบบนี้ด้วยนะคะ!"
1012803-16 = "ที่ผ่านมาสบายดีหรือเปล่าคะ?"
1012803-17 = "[s] \"แน่นอนอยู่แล้ว แล้วฟุยุล่ะ?\""
1012803-18 = "ฉันก็สบายดีค่ะ ต้องขอบคุณคุณครูเลยค่ะ!"
1012803-19 = "พอดีเครื่องยิงของชมรมเสีย วันนี้ฉันก็เลยออกมาซื้ออะไหล่น่ะค่ะ"
1012803-20 = "แล้วก็ต้องหาวัสดุสำหรับจัดนิทรรศการที่ใกล้จะมาถึงด้วย..."
1012803-21 = "[s] \"มีของต้องซื้อหลายอย่างเลยสินะ\""
1012803-22 = "ฮุฮุ..."
1012803-23 = "ว่าแต่คุณครูมีธุระอะไรที่นี่เหรอคะ?"
1012803-24 = "ดูเหมือนไม่ได้มาซื้อของใช้ที่จำเป็นนะ..."
1012803-25 = "คะ? มาซื้อของใช้ที่จำจริงๆ งั้นเหรอคะ?"
1012803-26 = "หุ่นยนต์แปลงร่างซูเปอร์โลหะผสม 7 ชั้น...?"
1012803-27 = "เจ๋งไปเลยค่ะ"
1012803-28 = "ของแบบนั้นสมควรอยู่ในหมวดหมู่ของใช้ที่จำเป็นค่ะ"
1012803-29 = "[s] \"ถึงจะหาซื้อไม่ได้ก็เถอะ...\""
1012803-30 = "คะ? แย่จังเลยนะคะ...!"
1012803-31 = "ถ้ามีเรื่องแบบนี้ละก็ คุณลูกค้าต้องมาบอกฉันสิคะ!"
1012803-32 = "[s] \"คุณลูกค้า...?\""
1012803-33 = "สินค้าที่เลิกจำหน่าย สินค้าที่ขายหมดเกลี้ยงจนหาไม่ได้ในตลาดแล้ว"
1012803-34 = "ฉันมีวิธีหาของพวกนั้นมาได้อยู่แล้วค่ะ!"
1012803-35 = "[s] \"สมกับที่เป็นหัวหน้าฝ่ายธุรกิจชมรมการค้าพิเศษ...!\""
1012803-36 = "แต่คุณลูกค้าก็ต้องจ่ายค่าตอบแทนเล็กๆ น้อยๆ ให้ด้วยนะคะ ฮุฮุ"
1012803-37 = "[s] \"ค่าตอบแทนเหรอ...?\""
1012803-38 = "อ่า..."
1012803-42 = "อืม..."
1012803-43 = "เอ่อ... อ่า... ฮืมม..."
1012803-44 = "[s] \"...?\""
1012803-45 = "ก็อย่างเช่น พาไปเลี้ยงข้าว..."
1012803-46 = "หรือว่า... ไปดูนะ... หนังด้วยกัน..."
1012803-47 = "หรือถ้าไม่สะดวกก็ไปคาเฟ่ขนมหวานแทนก็ได้..."
1012803-48 = "[s1] \"งั้นไปกินข้าว ดูหนัง แล้วกินขนมกัน\"\n[s2] \"งั้นไปทำทุกอย่างที่ว่ามาเลย\""
1012803-54 = "คะ... คะ?!!!"
1012803-55 = "จะ... จริงเหรอคะ?!!!"
1012803-56 = "โม้ใช่มั้ย? แน่เลย! เกือบหลงเชื่อแล้วไง! ระ... หรือว่าจริง..."
1012803-57 = "ถะ... ถ้าจริงก็... เอาตามนั้นเลย... ค่ะ..."
1012803-59 = "(แล้วคุณครูกับฟุยุก็ไปกินข้าว ดูหนัง และกินของอร่อยที่คาเฟ่ขนมหวานด้วยกัน)"
1012803-60 = "(หลังจากนั้นไม่กี่วัน หุ่นยนต์ตัวที่คุณครูตามหาก็มาส่งที่ชาเล่ต์...)"

[translation]
1012803-1 = "甜美的代價"
1012803-2 = "（隔天，來到了商店街）"
1012803-3 = "（為了來買無論如何也必須買到的東西）"
1012803-6 = "（可惜即便逛了兩個小時……）"
1012803-9 = "（……依然沒能找到目標）"
1012803-10 = "（就在這時……）"
1012803-11 = "哎呀，老師？"
1012803-15 = "居然會在這種地方見面呢！"
1012803-16 = "這段時間過得還好嗎？"
1012803-17 = "[s]「當然。冬也過得好嗎？」"
1012803-18 = "託老師的福，過得很好哦！"
1012803-19 = "今天是因為交易用的投石機壞掉的關係，出來購買零件的。"
1012803-20 = "而且也得準備即將舉辦的展覽會要用的材料……"
1012803-21 = "[s]「除了交易品之外還要買很多東西啊。」"
1012803-22 = "……呵呵。"
1012803-23 = "話說老師來這裡有什麼事嗎？"
1012803-24 = "看起來不像是來買生活用品的……"
1012803-25 = "嗯？你說的確是來買生活用品的？"
1012803-26 = "七段合體超合金變形機器人……？"
1012803-27 = "真帥氣呢。"
1012803-28 = "到了那種等級的話，確實足以稱之為生活用品。"
1012803-29 = "[s]「可惜我最後還是沒能買到。」"
1012803-30 = "那真是太令人難過了……！"
1012803-31 = "碰上這種情況的時候，應該早點告訴我才對啊，客人！"
1012803-32 = "[s]「客人……？」"
1012803-33 = "市場上已經停產的物品，或者因為銷售一空而消失的商品……"
1012803-34 = "其實都有辦法能弄到手的哦！"
1012803-35 = "[s]「不愧是特殊交易部的營業室長……！」"
1012803-36 = "當然……多少得付出一點代價就是了。呵呵。"
1012803-37 = "[s]「代價是……？」"
1012803-38 = "唔……"
1012803-42 = "嗯……"
1012803-43 = "那個……就是……"
1012803-44 = "[s]「……？」"
1012803-45 = "比如說，請我吃頓飯之類的……"
1012803-46 = "或，或者，一起去看場電影……"
1012803-47 = "要是真的覺得有負擔的話，去甜點咖啡廳也不是不行……"
1012803-48 = "[s1]「那就先去吃飯，看完電影之後……」\n[s2]「再去甜點咖啡廳聊聊天吧？」"
1012803-54 = "咦咦咦！？"
1012803-55 = "真，真真真的嗎！？"
1012803-56 = "啊不對！嗯！當然好！#n那個……"
1012803-57 = "就，就這樣……吧……"
1012803-59 = "（於是和冬一起吃飯、看電影、去甜點咖啡廳，度過了愉快的一天）"
1012803-60 = "（……不久之後，那個機器人真的送到了夏萊）"

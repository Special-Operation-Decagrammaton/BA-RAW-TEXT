[translation]
84310100703-6 = "ทุกคนดูเหนื่อยล้ากันจังเลย เกิดเรื่องอะไรงั้นเหรอคะ?"
84310100703-7 = "ข้างนอกเหมือนทุกคนกำลังได้รับโทษกันอยู่เลยค่ะ อาริสึเคยเห็นอะไรแบบนี้ในการฝึกทหารในเกมค่ะ"
84310100703-8 = "ไม่ใช่การรับโทษหรอกค่ะ... เรียกว่าเป็นการฝึกฝนจะดีกว่าค่ะ"
84310100703-9 = "เกิดเรื่องอะไรขึ้นเยอะเลยละค่ะ เยอะมากเลย..."
84310100703-13 = "อาริสึรู้สึกได้ถึงความกลัวค่ะ...! นี่มันอะไรกัน...?"

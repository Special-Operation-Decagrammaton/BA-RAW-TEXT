[translation]
1601103-1 = "Honeyed Lemons"
1601103-2 = "Hasumi was waiting in the cooking room."
1601103-6 = "Thank you for coming, Sensei. This way."
1601103-13 = "[ns1] \"...Hasumi? Your track jacket...\"\n[ns2] \"Do you...like it that way?\""
1601103-16 = "Hm? What are you talking about?"
1601103-17 = "You were...just talking to yourself?"
1601103-18 = "Oh... Okay."
1601103-19 = "Hm? This?"
1601103-23 = "Just some honeyed lemons. Nothing special. That being said, they're the reason you're here..."
1601103-24 = "I was making some for the Justice Task Force members. I thought you'd like a jar as well."
1601103-25 = "And no need to politely refuse. I have plenty."
1601103-26 = "You probably won't have time to prepare anything for yourself tomorrow, so if you think you'll like them..."
1601103-27 = "[s3] \"Of course I'll like them.\"\n[s4] \"Thank you. I'll enjoy them.\""
1601103-30 = "That's relieving to hear."
1601103-31 = "Thank you for accepting. I'll put some in this container..."
1601103-36 = "What?"
1601103-37 = "I'm...like a manager?"
1601103-38 = "Ah. I see."
1601103-39 = "Hmm. I suppose I do give off that image..."
1601103-43 = "..."
1601103-44 = "[s5] \"...Hasumi?\"\n[s6] \"(Somehow, somewhere, I messed up.)\""
1601103-47 = "So... That's how it is..."
1601103-51 = "Is that how I look? Is that what you think?"
1601103-52 = "Are you saying I look more like supervisor than a student...?"
1601103-53 = "Or... You think I look like a parent?!"
1601103-54 = "[s7] \"H-Hasumi, please calm down...!\"\n[s8] \"I-I wasn't saying that at all!\""
1601103-57 = "Oh. Are you sure?"
1601103-58 = "I see. I'm sorry, then, for getting so flustered."
1601103-59 = "Heh."
1601103-60 = "I keep messing up in front of you. I know I shouldn't, but I can't help but feel self-conscious."
1601103-61 = "I wish people would ever only see the best of me..."
1601103-62 = "*sigh*"
1601103-63 = "...Hm?"
1601103-64 = "If that's the case, then what did you mean by \"manager\"?"
1601103-65 = "[s9] \"One of the many things from the best side of you.\"\n[s10] \"I'm actually envious of the students you take care of.\""
1601103-70 = "I-I don't know what you're saying right now... It's not a big deal."
1601103-71 = "Besides, I would take care of you more if you asked..."
1601103-72 = "...Ah."
1601103-73 = "I, uh, didn't mean anything by that."
1601103-74 = "I'm just saying... Umm..."
1601103-75 = "[s11] \"I'll take you up on that offer.\"\n[s12] \"I'm always thankful for what you do, Hasumi.\""
1601103-80 = "Sensei..."
1601103-81 = "I don't know how to respond to that..."
1601103-82 = "Normally, this is the point where I would say that you shouldn't say such things..."
1601103-83 = "But for some reason, I really don't want to say anything like that."
1601103-84 = "I actually take back what I said earlier. I'll take care of you without you having to ask."
1601103-85 = "I'll assume that you'll be fine with me bringing you things like this from time to time."
1601103-86 = "Heehee."
1601103-87 = "[s13] \"There's something different about you right now.\"\n[s14] \"Is it because you're wearing something much more casual than your uniform?\""
1601103-88 = "I can see why it would seem that way. Heehee..."
1601103-89 = "But no. The clothes have nothing to do with it."
1601103-90 = "This is all your fault."
1601103-91 = "Be sure to keep that in mind."
1601103-92 = "Thank you for always looking after me..."
1601103-98 = "And for letting me look after you."
1601103-100 = "After that, I helped Hasumi make the rest of the honeyed lemons."
1601103-101 = "We made enough for the entire Justice Task Force, so it was a lot of work, but Hasumi was happy each moment she was working."

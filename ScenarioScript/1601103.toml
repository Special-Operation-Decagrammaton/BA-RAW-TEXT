[translation]
1601103-1 = "มะนาวดองน้ำผึ้ง"
1601103-2 = "(สถานที่ที่ฮาสุมิมารออยู่ก็คือห้องคหกรรม)"
1601103-6 = "ขอบคุณที่มานะคะคุณครู ทางนี้ค่ะ"
1601103-13 = "[ns1] \"ฮาสุมิ...? คือว่านั่นมัน...\"\n[ns2] \"ดูท่า... จะถูกใจสินะ\""
1601103-16 = "อืม... หมายถึงอะไรเหรอคะ?"
1601103-17 = "คะ? พูดคนเดียวงั้นเหรอคะ?"
1601103-18 = "อา... ค่ะ"
1601103-19 = "อ๊ะ หมายถึงนี่เหรอคะ?"
1601103-23 = "ไม่ใช่อะไรที่ยิ่งใหญ่หรอกค่ะ แค่ <มะนาวดองน้ำผึ้ง> เองค่ะ แต่ว่า... ฉันติดต่อไปหาคุณครูก็เพราะ#nเรื่องนี้นั่นแหละค่ะ..."
1601103-24 = "ที่จริงแล้ว ฉันทำให้กับสมาชิกของชมรมเราค่ะ แต่ก็คิดว่าอยากให้คุณครูสักกระปุกด้วยค่ะ"
1601103-25 = "ไม่ต้องเกรงใจนะคะ ฉันทำเอาไว้เยอะเลยค่ะ"
1601103-26 = "แต่ว่าพรุ่งนี้คุณครูอาจจะยุ่งมากๆ อาจไม่มีเวลาทาน แต่ถ้าไม่เป็นการรบกวนมากเกินไปละก็... ช่วยรับไปได้มั้ยคะ"
1601103-27 = "[s3] \"ไม่ได้รบกวนอะไรหรอก\"\n[s4] \"ขอบใจนะ ครูจะกินให้อร่อยเลย\""
1601103-30 = "ค่อยยังชั่วหน่อยค่ะ"
1601103-31 = "ดีใจจังเลยค่ะที่คุณครูรับไว้ กระปุกนี้ค่ะ..."
1601103-36 = "คะ...?"
1601103-37 = "ทำหน้าที่เหมือนผู้จัดการเลยงั้นเหรอคะ? หมายถึงใครเหรอคะ...?"
1601103-38 = "อ๋อ หมายถึงฉันเหรอคะ?"
1601103-39 = "อืม... ฉันก็ทำงานพวกนั้นอยู่บ้างนิดหน่อยค่ะ..."
1601103-43 = "อ๊ะ..."
1601103-44 = "[s5] \"ฮาสุมิ...?\"\n[s6] (สังหรณ์ใจไม่ดีเลย...!!)"
1601103-47 = "เอ่อ... คือว่า..."
1601103-51 = "เห็นเป็นแบบนั้นงั้นเหรอคะ? ไม่สิ ฉันเองก็รู้สึกแบบนั้นเหมือนกันค่ะ"
1601103-52 = "คุณครูเองก็เห็นฉันเป็นแบบนั้นเหรอคะ!? เห็นฉันเป็นผู้ดูแลมากกว่านักเรียนสินะคะ..."
1601103-53 = "ผู้ปกครองของนักเรียนเหรอคะ...!! เห็นฉันเป็นแบบนั้นเหรอคะ...!?"
1601103-54 = "[s7] \"ฮะ...ฮาสุมิ ใจเย็นๆ ก่อนนะ...!\"\n[s8] \"คะ...ครูไม่ได้หมายความว่าแบบนั้นสักหน่อย!!\""
1601103-57 = "มะ...ไม่ใช่งั้นเหรอคะ?"
1601103-58 = "อย่างนั้นเหรอคะ ขอโทษนะคะ... ฉันเผลอตกใจไปซะได้..."
1601103-59 = "ฮู่ว..."
1601103-60 = "แถมยังทำเรื่องผิดพลาดแบบนี้ต่อหน้าคุณครูอีกด้วยค่ะ ฉันคิดว่าไม่ควรปล่อยให้เกิดเรื่องแบบนี้เลยค่ะ"
1601103-61 = "ถ้าเป็นไปได้ ก็อยากแสดงภาพลักษณ์ที่ดีให้คุณครูเห็น..."
1601103-62 = "เฮ้อ..."
1601103-63 = "คะ...?"
1601103-64 = "ที่บอกว่าเหมือนผู้จัดการ ไม่ได้หมายถึงแนวนั้นเหรอคะ? แล้วถ้างั้นหมายถึงอะไรเหรอคะ...?"
1601103-65 = "[s9] \"ครูคิดว่าเรื่องพวกนี้ก็เป็นเสน่ห์ของฮาสุมิเลยนะ\"\n[s10] \"อิจฉาเด็กคนอื่นๆ ที่ฮาสุมิดูแลจัง\""
1601103-70 = "มะ... หมายความว่ายังไงคะ... ทั้งที่มันไม่ใช่เรื่องยิ่งใหญ่อะไรเลยนะคะ"
1601103-71 = "แต่ถ้าคุณครูต้องการละก็ ฉันก็ยินดีที่จะดูแล..."
1601103-72 = "อ่า..."
1601103-73 = "มะ... ไม่ได้หมายความว่าอย่างนั้นนะคะ"
1601103-74 = "คือว่าที่ฉันอยากจะพูดก็คือ..."
1601103-75 = "[s11] \"โอ้ว ถ้างั้นครูขอฝากตัวด้วยคนได้มั้ย?\"\n[s12] \"ครูยินดีมากเลยนะ ขอบคุณนะ ฮาสุมิ\""
1601103-80 = "คุณครู..."
1601103-81 = "ถ้าพูดแบบนี้ใครจะต้านไหวละคะ..."
1601103-82 = "ถ้าเป็นตอนปกติๆ แล้วละก็ ฉันคงปฏิเสธไปอย่างสุภาพว่าคุณครูไม่ต้องพูดแบบนั้นก็ได้..."
1601103-83 = "แต่ว่าตอนนี้... ฉันรู้สึกไม่อยากพูดแบบนั้นเลยค่ะ"
1601103-84 = "ไหนๆ คุณครูก็พูดแบบนี้แล้ว คราวนี้ฉันจะขอรับโอกาสนั้นไว้ก็แล้วกันค่ะ"
1601103-85 = "ถ้างั้นฉันขอเหมารวมว่า คุณครูจะไม่รู้สึกแย่ เวลาที่ฉันนำของพวกนี้ไปให้นะคะ"
1601103-86 = "ฮิฮิ..."
1601103-87 = "[s13] \"รู้สึกเหมือนจะกระตือรือร้นกว่าปกติเลยน้า\"\n[s14] \"เพราะใส่ชุดที่ต่างไปจากตอนปกติรึเปล่านะ?\""
1601103-88 = "คุณครูจะคิดแบบนั้นก็ได้นะคะ ฮุฮุ..."
1601103-89 = "เปล่านะคะ ไม่เกี่ยวกับชุดหรอกค่ะ"
1601103-90 = "...เรื่องนี้น่ะ เป็นความผิดของคุณครูต่างหากล่ะคะ"
1601103-91 = "ยังไงก็เถอะค่ะ ฉันจะจำเอาไว้แล้วกันนะคะ"
1601103-92 = "ขอบคุณนะคะคุณครู ที่คอยดูแลฉันมาตลอด แล้วก็..."
1601103-98 = "...ขอบคุณที่ให้โอกาสฉันได้ดูแลคุณครูนะคะ"
1601103-100 = "(จากนั้นคุณครูกับฮาสุมิก็ใช้เวลาที่เหลือช่วยกันทำมะนาวดองน้ำผึ้งต่อ)"
1601103-101 = "(อาจเป็นเพราะทำให้กับสมาชิกชมรม ฮาสุมิเลยทำออกมาเยอะมาก แต่ว่าเธอก็ดูสนุกตลอดเวลาที่ทำ)"

[translation]
1601103-1 = "蜂蜜漬檸檬"
1601103-2 = "（蓮實指定的地方是家政教室）"
1601103-6 = "謝謝您願意過來一趟，老師。"
1601103-13 = "[ns1]「那件外套……」\n[ns2]「拉鍊還是拉不上去嗎……？」"
1601103-16 = "呃，那個……因為新的還沒有送來……"
1601103-17 = "所以……"
1601103-18 = "如果您可以不要在意的話，我會很高興的。"
1601103-19 = "啊，您說這個嗎？"
1601103-23 = "這是「蜂蜜漬檸檬」。"
1601103-24 = "因為稍微多做了一些，如果不介意的話請收下。"
1601103-25 = "本來是打算明天拿給您的，不過我想大運動會當天您可能會很忙……"
1601103-26 = "如果不會造成負擔的話，希望您能收下。"
1601103-27 = "[s3]「怎麼會是負擔呢！謝謝你。」\n[s4]「謝謝，那我就收下了。」"
1601103-30 = "太好了……"
1601103-31 = "那麼請收下這瓶……"
1601103-36 = "……咦？"
1601103-37 = "我就像經紀人，或是大家的姐姐一樣……是嗎？"
1601103-38 = "這麼說來……"
1601103-39 = "偶爾確實是這樣呢……"
1601103-43 = "啊……"
1601103-44 = "[s5]「……蓮實？」\n[s6]（總覺得有股不祥的預感……）"
1601103-47 = "……那個……難道說。"
1601103-51 = "看起來……真的是那樣嗎？"
1601103-52 = "與其說是學生，不如說是監護人……！！"
1601103-53 = "是那樣嗎……？"
1601103-54 = "[s7]「蓮，蓮實，冷靜一點……！」\n[s8]「我不是那個意思！！」"
1601103-57 = "不，不是嗎？"
1601103-58 = "對不起……我一時太過驚慌了。"
1601103-59 = "呼……"
1601103-60 = "居然會在老師面前亂了陣腳……非常抱歉。"
1601103-61 = "我並不是故意想讓老師看到我這個樣子的……"
1601103-62 = "唉……"
1601103-63 = "……那個。"
1601103-64 = "如果不是那個意思的話……"
1601103-65 = "[s9]「我認為很會照顧人是蓮實的魅力哦。」\n[s10]「真羨慕那些能被蓮實照顧的學生。」"
1601103-70 = "感，感謝您的稱讚……其實也沒什麼大不了的。"
1601103-71 = "如果老師您不介意的話，其實也……"
1601103-72 = "……啊。"
1601103-73 = "啊，那個。"
1601103-74 = "我沒有別的意思……"
1601103-75 = "[s11]「偶爾也拜託你一下吧？」\n[s12]「我隨時都很歡迎唷。謝謝你，蓮實。」"
1601103-80 = "老師……"
1601103-81 = "真是贏不過您呢……"
1601103-82 = "如果是平時的話，我大概會用「請別開玩笑了」來拒絕老師的好意吧……"
1601103-83 = "不過今天難得有這個機會……"
1601103-84 = "既然老師都這麼說了，我會謹記在心的。"
1601103-85 = "今後，我會再做點東西帶去夏萊的。"
1601103-86 = "……呵呵。"
1601103-87 = "[s13]「你今天好像比平常興奮呢？」\n[s14]「是因為今天沒有穿制服嗎？」"
1601103-88 = "看起來或許是這樣呢。"
1601103-89 = "……這和衣服沒有關係。"
1601103-90 = "……都是老師不好唷。"
1601103-91 = "總之，就是這麼回事。"
1601103-92 = "今天您能抽空前來，非常感謝您。"
1601103-98 = "還有……謝謝您給我照顧您的機會。"
1601103-100 = "（之後，和蓮實一起將要給實現正義部的蜂蜜漬檸檬裝到瓶子裡）"
1601103-101 = "（雖然量相當多，不過蓮實在裝瓶的過程中似乎相當開心）"

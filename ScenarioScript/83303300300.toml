[translation]
83303300300-6 = "H-Head Prefect Hina! We have an emergency!"
83303300300-7 = "What is it?"
83303300300-8 = "It's...the troublemakers you subdued..."
83303300300-9 = "They suddenly began chanting things like \"We can't let the chairman down!\""
83303300300-10 = "\"We may be criminals, but we live and die by loyalty! Follow the Pandemonium Society, this is a war against the Prefect Team!\""
83303300300-11 = "...And then they went on a rampage!"
83303300300-12 = "Loyalty... I'm very curious to know how Makoto was able to garner their loyalty. The chairman of the Pandemonium Society and Gehenna's troublemakers should have little common ground."
83303300300-13 = "But if they want to shout and rampage—let them. I'll leave them truly speechless this time."

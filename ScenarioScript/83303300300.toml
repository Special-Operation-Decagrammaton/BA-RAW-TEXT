[translation]
83303300300-6 = "陽，陽奈委員長！有需要採取緊急措施的案件！"
83303300300-7 = "怎麼了？"
83303300300-8 = "這……是和委員長壓制的問題學生相關的消息……"
83303300300-9 = "他們突然吶喊「絕對不能允許違背萬魔殿議長期待的事！」"
83303300300-10 = "「我們是因義氣而活，因義氣而死的太妹！這是和風紀委員會的戰爭！」"
83303300300-11 = "……同時開始引起騷動！"
83303300300-12 = "義氣嗎……讓人不禁想知道萬魔殿的議長，到底和問題學生累積了何種交情。"
83303300300-13 = "還要那樣胡鬧的話……好吧。#n這次就讓他們沒辦法吭聲。"

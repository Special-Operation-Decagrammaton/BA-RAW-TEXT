[translation]
10019060-6 = "เอาละ เท่านี้ก็ทำลายหอคอยทั้ง 5 แห่งสำเร็จแล้ว!"
10019060-7 = "ตอนนี้เหลือเพียงอย่างเดียวเท่านั้น... หอคอยแห่งที่ 6 เขตกลาง D.U.!!"
10019060-8 = "ดีมากค่ะ ถ้าอย่างนั้น ขอให้กองกำลัง <ชาเล่ต์> ทั้งหมดมุ่งไปที่หอคอยแห่งที่ 6 ค่ะ!"
10019060-9 = "ถ้าทำลายหอคอยนั่นได้ละก็ เราจะคลี่คลายวิกฤตที่เผชิญอยู่ตอนนี้ได้ค่ะ!"
10019060-10 = "เตรียมพร้อมสำหรับการต่อสู้ครั้งสุดท้ายด้วยค่ะ...!!"
10019060-16 = "ระ...รอเดี๋ยวก่อนค่ะ...!! ตรวจสอบพบพลังงานรุนแรงที่เขตชิราโทริ D.U. ค่ะ...!!"
10019060-27 = "นะ... นี่มัน..."
10019060-28 = "...!? <ผู้พิทักษ์> หอคอยแห่งที่ 6 ก็ปรากฏตัวขึ้นมาแล้วงั้นเหรอ...?"
10019060-29 = "เอ๋...? ระ...รุ่นพี่ริน! เดี๋ยวนะ... ทางนี้ก็มีเรื่องแล้วละ?"
10019060-30 = "พบปฏิกิริยาพลังงานความเข้มข้นสูงที่บริเวณหอคอยที่ถูกทำลายไปแล้ว...!!"
10019060-32 = "!!"
10019060-37 = "หอคอยที่ถูกทำลายไปแล้วทั้งหมด..."
10019060-47 = "...หอคอยปรากฏขึ้นใหม่งั้นเหรอ...?"
10019060-48 = "...อึก"
10019060-49 = "นะ... นี่มัน..."
10019060-50 = "การโจมตีที่ผ่านมา... เปล่าประโยชน์งั้นเหรอคะ...?"
10019060-54 = "ไม่ค่ะ ไม่ใช่อย่างนั้นหรอกค่ะ"
10019060-61 = "พลังงานที่ตรวจพบที่หอคอยแห่งที่ 6 หายไปในตอนที่เหล่าหอคอยปรากฏขึ้นใหม่ค่ะ นั่นหมายความ#nว่าหอคอยแห่งที่ 6 คือระบบแบ็กอัปข้อมูลของหอคอยอื่นๆ ค่ะ"
10019060-62 = "ตอนนี้หอคอยแห่งที่ 6 ก็อยู่ในสถานะไร้การป้องกันแล้ว การที่ผู้พิทักษ์หอคอยแห่งที่ 6 ปรากฏตัวขึ้น#nมาในตอนนี้คือข้อพิสูจน์ค่ะ!"
10019060-63 = "...ถ้างั้นก็ง่ายมากค่ะ"
10019060-64 = "เราจะบุกโจมตีหอคอยทั้ง 5 แห่งที่ฟื้นฟูขึ้นมา รวมถึงหอคอยแห่งที่ 6 อีกครั้งค่ะ!"
10019060-65 = "รบกวนช่วยสั่งการอีกครั้งด้วยนะคะ คุณครู!"

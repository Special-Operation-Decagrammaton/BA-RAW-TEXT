[translation]
10019060-6 = "好，這樣5個聖所就全都攻略成功了！"
10019060-7 = "現在只剩下──D.U.中央的第6聖所而已！"
10019060-8 = "是的。將「夏萊」的所有戰力集中在第6聖所吧。"
10019060-9 = "這也許會是最後的戰鬥吧。"
10019060-10 = "請準備進行第6聖所的攻略……！！"
10019060-16 = "請，請等一下……！#n在D.U.白鳥區中捕捉到了強大的能量反應……！！"
10019060-27 = "這，這是……"
10019060-28 = "……！？#n第6聖所的「守護者」終於出現了嗎……？"
10019060-29 = "嗯……？#n琳，琳前輩等等……！這邊也不太妙。"
10019060-30 = "已被破壞的聖所座標再次出現了超高濃度的能量反應……！！"
10019060-32 = "！！"
10019060-37 = "被破壞的所有聖所──"
10019060-47 = "……這……究竟是怎麼回事……復活了？"
10019060-48 = "……！"
10019060-49 = "這是……"
10019060-50 = "目前為止的攻擊都是沒有意義的嗎……？"
10019060-54 = "不，不是那樣的。"
10019060-61 = "在各聖所復活的同時，第6聖所的能量反應也消滅了。#n也就是說，可以將其視為其他聖所的備份系統。"
10019060-62 = "如今第6聖所已經變得和其他聖所相同。#n「守護者」的出現就是最好的證明。"
10019060-63 = "……這樣一來事情就變得單純了呢。"
10019060-64 = "復活的5個聖所，以及第6聖所的攻略──開始！！"
10019060-65 = "老師。#n再次麻煩您進行指揮了！"

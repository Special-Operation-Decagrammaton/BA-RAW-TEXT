[translation]
22130-1 = "第13話;Big Sister"
22130-2 = "埃里都內部．中央隔離設施"
22130-5 = "莉央……妳做的事真是令人厭惡。#n簡直無法直視。"
22130-6 = "……陽葵。"
22130-7 = "妳總是對我口出惡言。#n說我很陰沉還是漂浮在淨化槽表面的腐臭水之類的……"
22130-8 = "……"
22130-9 = "……算了，無所謂。#n能像那樣批判我的，在這千年──"
22130-10 = "──不，在這奇普托斯裡，陽葵……大概也只有妳吧。"
22130-11 = "正因為是那樣的妳，我才期待著或許妳能夠理解我現在要做的事。"
22130-12 = "「破壞愛麗絲的光環」的行為，是嗎？"
22130-13 = "……"
22130-14 = "自己的所作所為是為了守護千年──進而守護奇普托斯……#n妳或許堅信著自己做的是那樣的行為。"
22130-15 = "──結果，卻只是將少女綁架、監禁在都市裡，#n並打算破壞她的光環而已不是嗎。"
22130-16 = "妳說的並沒有錯──但，"
22130-17 = "不，這樣啊……既然妳是這麼想的，想必無法理解我……#n也無法容忍我吧。"
22130-18 = "沒錯。我並不贊同妳。#n而且──夏萊的老師也不會袖手旁觀吧。"
22130-19 = "是呢。#n老師會來回收愛麗絲的機率是99.99999%以上……"
22130-20 = "除此之外，千年的最強戰力C&C也在對方手上。"
22130-21 = "──真的，沒有任何人能理解我呢。#n……一個也沒有。"
22130-22 = "莉央……妳明明知道，卻還……"
22130-23 = "──即便如此也無所謂。"
22130-24 = "陽葵，妳之前這樣說過吧。#n我是不是在建造著「安全屋」。"
22130-25 = "……說得更準確一點，#n這個埃里都是為了防範、迎擊未來發生的威脅而建造的「要塞」……"
22130-26 = "莉央，妳仍然……"
22130-31 = "就算不被理解，就算這個世界將我定義為惡也無所謂──"
22130-32 = "我，要沿著我認為正確的道路前進。"
22130-34 = "即使考慮所有可能發生的變數並加以計算……#n我能達成目標的機率是99%以上。"
22130-35 = "準備十分充分。就差執行而已……"
22130-39 = "莉央大人，埃里都的監視系統傳來了報告。"
22130-40 = "……我知道了。#n結果，還是跟數據顯示的一樣啊。"
22130-41 = "那麼……之後就交給妳了。"
22130-42 = "是的，主人。"
22130-46 = "等一切結束之後……#n陽葵妳……"
22130-47 = "還有夏萊的老師，你也……"
22130-48 = "肯定會……"
22130-50 = "……"
22130-59 = "這裡就是……"
22130-60 = "埃里都……"
22130-61 = "愛麗絲醬就在這裡……"
22130-68 = "好，跟計劃一樣搭乘「物流運輸用無人列車」抵達現場了。"
22130-69 = "嗯。多虧有貝里塔斯的協助。"
22130-70 = "真不愧是貝里塔斯！#n沒想到就連列車系統都能駭入！"
22130-74 = "……話中是不是有點帶刺？是我的錯覺嗎？"
22130-75 = "算了……要小心點哦。#n在那條通道前方，抵達地面後就是「埃里都」了唷。"
22130-76 = "我們還是有在緊盯畫面的所以放心吧♪"
22130-77 = "但是，有可能會有我們沒有捕捉到的東西突然出現，#n請務必注意。"
22130-78 = "[s]「嗯，謝謝妳們。我會小心的。」"
22130-79 = "那麼首先是C&C要去大鬧一番啊……#n我們就先待在這邊……"
22130-84 = "嗚哇啊啊！？這，這是什麼！？"
22130-85 = "哎呀，真是個不錯的孩子呢。#n迷路了嗎？"
22130-86 = "[s1]「不不不，不可能是迷路的孩子吧！」\n[s2]「這是……莉央的機器人……！」"
22130-87 = "怎麼會……！已經被發現了嗎！？"
22130-88 = "怎麼會……！已經被發現了嗎！？"
22130-89 = "不，沒問題的。"
22130-91 = "在暴露之前已經壓制完成了唷！#n而且還順便駭入了附近的網路，所以沒關係！"
22130-93 = "哇，那種事情也能辦到啊……真厲害呢！"
22130-94 = "這是貝里塔斯才能做的事哦。目前為止還算順利。"
22130-95 = "[ns]「好！那麼大家，準備戰鬥！」"

[translation]
22130-1 = "Episode 13; Big Sister"
22130-2 = "Central Quarantine Facility in Eridu"
22130-5 = "Rio, everything you do is so distasteful."
22130-6 = "...Himari."
22130-7 = "I know what you think of me. You've always said that I'm like filthy sewer water..."
22130-8 = "..."
22130-9 = "Well, it doesn't matter. You're the only one in Millennium..."
22130-10 = "In all of Kivotos for that matter, who can blame me."
22130-11 = "Because of that, I expect you to understand what I'm about to do."
22130-12 = "You mean destroying Aris' halo?"
22130-13 = "..."
22130-14 = "You think you're protecting Millennium and Kivotos..."
22130-15 = "But in reality, all you've done is kidnap a girl, lock her up in this empty city, and now you're about to destroy her halo."
22130-16 = "Well, if you put it that way..."
22130-17 = "I know what you're thinking. I know why you don't understand me and can't accept this."
22130-18 = "That's right, I don't agree with you. But more than anything... Sensei won't let this happen."
22130-19 = "Yes. The chances of Sensei coming here to rescue Aris are about 99.99999%... I'd even venture to say 100%."
22130-20 = "Not only that, C&C, the most powerful force in Millennium, is also on Sensei's side."
22130-21 = "Not a single soul understands me."
22130-22 = "Rio... Even knowing all of this..."
22130-23 = "It doesn't matter."
22130-24 = "Himari, you asked me before if I was making a safehouse."
22130-25 = "I suppose you could call it that, but to be exact, Eridu is a fortress that was built to prevent, intercept, and defeat future threats..."
22130-26 = "Rio, you truly never change."
22130-31 = "I don't mind being misunderstood or if the world defines me as evil."
22130-32 = "I'm doing what I know is right!"
22130-34 = "I've calculated all the possibilities and variables. The probability of achieving my goal is over 99%."
22130-35 = "Everything is perfectly prepared, and all I need to do is execute..."
22130-39 = "Rio, I have a report from the Fortress City of Eridu's surveillance network."
22130-40 = "...Is that so. They really found their way here."
22130-41 = "I'll leave it to you, Toki."
22130-42 = "Yes, ma'am."
22130-46 = "Himari, when everything is over..."
22130-47 = "And that Sensei..."
22130-48 = "You'll..."
22130-50 = "..."
22130-59 = "This place is..."
22130-60 = "Eridu..."
22130-61 = "Aris is here..."
22130-68 = "Excellent. We successfully stole an unmanned logistics transport train and arrived at the site."
22130-69 = "We couldn't have done it without Veritas. I didn't think hacking the train system would be so easy."
22130-70 = "It must be easy for them after hacking Millennium school records!"
22130-74 = "What are you accusing us of?!"
22130-75 = "Anyway, be careful. When you go through the passage and arrive above ground, you'll be in the middle of Eridu."
22130-76 = "We're watching the screen like a hawk, but..."
22130-77 = "We can't see everything from here. Stay on your toes."
22130-78 = "[s] \"Roger. Thanks, all of you.\""
22130-79 = "We'll stay here quietly until C&C goes wild to distract them as we planned..."
22130-84 = "Whoa?! Wh-What's this?!"
22130-85 = "Oh, it's pretty cool. Is this drone lost?"
22130-86 = "[s1] \"No, no, no, of course not!\"\n[s2] \"This drone is...controlled by Rio!\""
22130-87 = "No way...! Did she already find us?!"
22130-88 = "No way...! Did she already find us?!"
22130-89 = "Don't worry."
22130-91 = "We overtook the system before she realized! We also hacked the surrounding networks too, so your cover's not blown."
22130-93 = "That's so reckless!"
22130-94 = "As expected of Veritas. They got the job done."
22130-95 = "[ns] \"All right! Let's get ready to battle!\""

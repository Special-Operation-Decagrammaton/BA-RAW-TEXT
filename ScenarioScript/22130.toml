22130-5 = "3;히마리;05;리오. 당신이 하는 일들은 정말 전부 악취미 그 자체네요.\n#3;a\n#3;em;[반응]"
22130-6 = "3;히마리;05\n1;통신리오;01;……히마리.\n#1;a\n#3;m5"
22130-7 = "1;통신리오;99;넌 언제나 나에 대해서 그렇게 말해 왔었지. 오물이라느니, 정화조에 둥둥 떠 있는 썩은물이라느니……."
22130-8 = "3;히마리;07;……."
22130-9 = "1;통신리오;99;……뭐, 상관없어. 나를 비난할 수 있는 건 이 밀레니엄에……."
22130-10 = "1;통신리오;02;아니, 이 키보토스에서 아마 너 정도일 테니까."
22130-11 = "1;통신리오;07;그런 너이기에, 지금부터 내가 하려는 일을 이해해주지 않을까 기대했던 걸지도 몰라."
22130-12 = "3;히마리;05;아리스의 헤일로를 파괴하는 걸 말인가요?\n#3;em;[?]"
22130-13 = "1;통신리오;01;……."
22130-14 = "3;히마리;02;당신은 자신이 하는 행위에 대해 밀레니엄을, 키보토스를 지키기 위해서……라고 믿고 있겠지만.\n#3;em;…"
22130-15 = "3;히마리;99;그건 결국 한 소녀를 납치해서 이런 텅 빈 도시에 감금한 뒤, 그 헤일로를 파괴하는 일이잖아요."
22130-16 = "1;통신리오;02;그 말은 틀리지 않았어. 하지만……."
22130-17 = "1;통신리오;99;으응, 아니, 그렇게 생각하고 있기에 너는 나를 이해하지 못하고……… 또 용납하지 못하는 거겠지.\n#1;em;…"
22130-18 = "3;히마리;10;네. 저는 동의하지 않아요. 무엇보다…… 샬레의 선생님이 가만히 있지 않을 테죠."
22130-19 = "1;통신리오;02;맞아. 선생이 아리스를 회수하러 올 확률은 99.99999% 이상……."
22130-20 = "1;통신리오;01;더구나 C&C라는 밀레니엄 최고의 전력 또한 저쪽 손에 넘어간 상황이지."
22130-21 = "1;통신리오;07;정말이지, 아무도 나를 이해해주지 않는구나. 단 한 명도 말야.\n#1;em;[속상함]"
22130-22 = "3;히마리;05;리오…… 그걸 알면서도……."
22130-23 = "1;통신리오;99;그래도 상관없어."
22130-24 = "1;통신리오;02;히마리, 네가 말한 적이 있었지. <세이프하우스>를 만들고 있지 않느냐고."
22130-25 = "1;통신리오;01;……비슷하긴 하지만 조금 더 정확히 말하자면, 이곳 에리두는 미래에 있을 위협을 막고, 요격하고, 쓰러트리기 위해 세운 <요새>……."

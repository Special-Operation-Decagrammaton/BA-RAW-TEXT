[translation]
32065-2 = "マグロがーーーーー！！！"
32065-3 = "ぜひお造りの形でと思ったのですが、天ぷらになってしまいましたわね……。"
32065-4 = "うーん、どうやら囲まれてしまったようですね★どうしましょう？"
32065-6 = "はっ、バラバラに逃げたら生存率上がるんじゃない！？"
32065-11 = "なるほど、良いアイデアですねジュンコさん★では足の速さ次第ですが、弱肉強食ということで♪"
32065-16 = "ふふふ、そうですわね。運任せとなりそうですが、それもまたスパイスのようなもの！それでは！"
32065-21 = "えぇっ！？ちょ、ちょっと！待って！私だけ置いていかないで―！？"
32065-26 = "お、置いていかないでってばー！うわーん！もう、覚えてなさいよっ！いつか絶対仕返ししてやるんだからーーっ！！"
32065-33 = "くっ、小癪な……！各自、分かれて追撃を！！"
32065-34 = "はいっ！"
32065-36 = "ここはトリニティ自治区！私たちから逃げるなんてことは、不可能です！"
32065-38 = "はぁ、はぁ……。"
32065-39 = "こ、ここまで来れば流石に大丈夫よね……？"
32065-45 = "……え？"
32065-46 = "あら、ジュンコさん……。"
32065-47 = "あ、アカリ！？ど、どうしたのそんなフラフラの状態で！？"
32065-48 = "まあ、端的に言いますと……無理でした★"
32065-53 = "アカリっ！？"
32065-57 = "くひひっ……きひひひひ……。"
32065-58 = "……えっ？な、何っ！？鬼……！？"
32065-60 = "きゃははははははぁぁっっ！！！"
32065-61 = "いやあああぁぁぁぁぁっ！？ごめんなさいぃぃぃぃぃーーーっ！？"
32065-66 = "次回;新しい視点"

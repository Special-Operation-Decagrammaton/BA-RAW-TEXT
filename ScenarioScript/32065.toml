[translation]
32065-2 = "鮪魚啊──！！！"
32065-3 = "我本來想把牠做成生魚片的，沒想到變成天婦羅了呢……"
32065-4 = "唔嗯，看來我們被包圍了呢★怎麼辦呢？"
32065-6 = "我們分頭逃跑的話生存率應該會比較高吧！？"
32065-11 = "原來如此，是個好主意呢淳子同學★那就是比誰逃的快囉，正所謂弱肉強食♪"
32065-16 = "呵呵呵，說的沒錯。雖然有點運氣成分，不過這就像是調味料一樣嘛！那麼再會！"
32065-21 = "咦！？等，等等！等我一下！別丟下我一個人啊──！？"
32065-26 = "都說了等我一下嘛──！嗚哇──！真是的，給我記住！總有一天會報復你們的──！"
32065-33 = "可惡，真氣人……！大家分頭追上去吧！！"
32065-34 = "是！"
32065-36 = "這裡可是三一自治區！想從我們手上逃出去是不可能的！"
32065-38 = "哈啊，哈啊……"
32065-39 = "逃，逃到這裡總該沒事了吧……？"
32065-45 = "……咦？"
32065-46 = "哎呀，淳子同學……"
32065-47 = "亞，亞伽里！？怎，怎麼搖搖晃晃的！？"
32065-48 = "嘛，簡單來說……我不行了★"
32065-53 = "亞伽里！？"
32065-57 = "咕嘻嘻……咿嘻嘻嘻嘻……"
32065-58 = "……咦？什，什麼？是鬼……！？"
32065-60 = "咿哈哈哈哈哈哈──！！！"
32065-61 = "呀啊啊啊──！？對不起──！？"
32065-66 = "下一話;嶄新的觀點"

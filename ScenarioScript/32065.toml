[translation]
32065-2 = "อ๊าาา! ปลามากุโร่...!!  ปลามากุโร่...!!"
32065-3 = "ฉันอยากกินซาชิมิต่างหาก แต่ไหงกลายเป็นเทมปุระไปซะแล้วล่ะคะ..."
32065-4 = "อ๊าย~ เราถูกล้อมแล้ว★ ทำไงดีล่ะคะ?"
32065-6 = "แยกวง! จะได้ไม่โดนจับตัวทั้งหมด!!"
32065-11 = "ตายแล้วคุณจุนโกะ เป็นความคิดที่ดีเลยค่ะ★ แบบนี้คนที่วิ่งช้าจะยอมเป็นเหยื่อให้ใช่ไหมคะ?"
32065-16 = "ฮุฮุฮุ แบบนี้เองเหรอคะ จากนี้ก็คงขึ้นอยู่กับโชคชะตาแล้วล่ะค่ะ นี่แหละส่วนหนึ่งของการเล่นสนุก!"
32065-21 = "อะไรนะ?!  ดะ... เดี๋ยวก่อนสิ!  รอก่อน! อย่าทิ้งฉันไว้คนเดียวสิ!! "
32065-26 = "อย่าทิ้งกันสิ! อ๊ายยย! ฉันจะแก้แค้น! จะตายเป็นผีไปแก้แค้น!!"
32065-33 = "ลูกไม้ตื้นๆ...!!  เราแยกกันไล่ล่าเลยค่ะ!!"
32065-34 = "ค่ะ!"
32065-36 = "ที่นี่คือเขตปกครองตนเองของทรีนิตี้! หนีพวกเราไม่ได้หรอกค่ะ!"
32065-38 = "แฮ่ก... แฮ่ก... "
32065-39 = "มาถึงที่นี่แล้ว คงปลอดภัยแล้วล่ะเนอะ...?"
32065-45 = "หะ...หืม?"
32065-46 = "คะ... คุณจุนโกะ..."
32065-47 = "อะ... อาคาริ!  กะ... เกิดอะไรขึ้น?!  แล้วนั่นมันตัวอะไรน่ะ?!"
32065-48 = "สรุปเลยว่า... เรา... ซวยแล้วค่ะ★"
32065-53 = "...?! อะ... อาคาริ!"
32065-57 = "หึหึหึหึหึหึ... คิคิคิคิคิ...."
32065-58 = "...?! ว้ากกก!! อะ... อะ... อะไรเนี่ย?! ผะ... ผี?!"
32065-60 = "แฮรรรรรรรรรรรรร่!!!!!"
32065-61 = "เฮืออออกก!?  ขออภัยด้วยค่าาาาาา!"
32065-66 = "ตอนต่อไป;มุมมองใหม่"

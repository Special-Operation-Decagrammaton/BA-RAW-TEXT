[translation]
10034040-1 = "ตอนที่ 4;ฉันคนใหม่"
10034040-2 = "(ไม่กี่วันหลังจากนั้น...)"
10034040-3 = "(วันนี้งานน้อยกว่าปกติ คุณครูจึงได้เพลิดเพลินกับการทำงานแบบชิลๆ)"
10034040-9 = "ฮัลโหล คุณครู ขอโทษที่อยู่ๆ ก็โทรมานะ ตอนนี้คุณครูยุ่งอยู่รึเปล่า?"
10034040-10 = "ไม่หรอก ฉันไม่ได้งานเข้าอะไร ก็แค่เป็นตัวแทนของเพื่อนๆ โทรมาอัปเดตความคืบหน้าน่ะ"
10034040-11 = "ที่จะบอกก็คือ... ห้องซ้อมที่คุณครูช่วยหาให้มันดีมากเลยละ เพราะได้ครูช่วยไว้แท้ๆ เลย!"
10034040-12 = "จากนี้พวกเราจะเริ่มซ้อมกันแล้ว... ยังไงก็ควรจะเอ่ยปากขอบคุณคุณครูก่อน ใช่ไหมล่ะ?"
10034040-13 = "หืม...? ว่าไงนะ...?"
10034040-14 = "จะมาหาพวกเราตอนนี้เลยเหรอ? ทะ... ทำไม...?"
10034040-15 = "[s1] \"อยู่ๆ ครูก็คิดถึงโยชิมิขึ้นมาน่ะ\"\n[s2] \"ครูอยากไปดูโยชิมิซ้อมดนตรีน่ะ\""
10034040-18 = "ดะ... เดี๋ยวเหอะ!? พูดอะไรบ้าๆ ออกมาอีกแล้ว!!"
10034040-19 = "ไม่ต้องเลย หยุดพูดอะไรเหลวไหลแล้วไปทำงานของตัวเองไป!! พวกฉันซ้อมกันเองได้น่า!!"
10034040-20 = "แค่นี้นะ จะวางแล้วนะ? ห้ามมาด้วยล่ะ ห้ามมาเด็ดขาดเลย!! พวกฉันจะเริ่มซ้อมกันแล้ว!!"
10034040-25 = "[ns3] \"ไม่รู้ไม่ชี้ ครูไปเดี๋ยวนี้แหละ\"\n[ns4] เตรียมตัวไปดูการซ้อม"
10034040-31 = "(คุณครูออกจากชาเล่ต์มาแล้วมุ่งหน้าไปยังห้องซ้อมใกล้ๆ ที่เช่าไว้ให้)"
10034040-32 = "(ห้องซ้อมอยู่ชั้นใต้ดินและเก็บเสียงได้ดี แต่ตอนซ้อมก็มีเสียงเล็ดลอดมาให้ได้ยินนิดหน่อย)"
10034040-33 = "[ns5] \"คงกำลังตั้งใจฝึกกันอยู่สินะ\"\n[ns6] ลงไปห้องซ้อมดนตรีข้างล่าง"
10034040-41 = "เร็วขึ้นอีก!! ต้องเร็วกว่านี้!!"
10034040-45 = "นี่แทบจะเกินลิมิตของฉันแล้วนะ... ทำแบบนี้ไม่เห็นจะร็อกเลย..."
10034040-46 = "ต้องเร็วกว่านี้!!!!"
10034040-47 = "อ๊ากกก!!"
10034040-52 = "เร็วขึ้นอีก!!!!"
10034040-53 = "โอ้ววววววว! ร็อกกกกก!!!"
10034040-59 = "ใช่ ความเร็วประมาณนี้แหละ!! คงความเร็วไว้!! แบบนี้เลย!!"
10034040-60 = "เฮือกกก...."
10034040-66 = "เร็วขึ้นอีก!!!!"
10034040-67 = "ร็อกกกกก!!!"
10034040-74 = "ยะ... โยชิมิจัง นัตสึจังก็พยายามอยู่นะ..."
10034040-75 = "ช่วยไม่ได้หรอก ก็ตอนนี้นัตสึตีช้าเอามากๆ เลย"
10034040-76 = "ถ้าบอกเองว่าอยากตีกลอง ก็ต้องตีให้เข้ากับเพลงสิ"
10034040-77 = "ต่อให้เป้าหมายของเราจะเป็น 'แค่ผ่านการคัดเลือกอย่างหวุดหวิดก็ได้ ขอแค่ให้ได้ขนมเซมล่ามาก็#nพอแล้ว' ก็เถอะ"
10034040-78 = "อะ... อืม... นั่นสินะ..."
10034040-82 = "ใช่... ทุกคนก็คิดกันอย่างนั้นแหละ..."
10034040-83 = "ไอริ...? เป็นอะไรไปเหรอ?"
10034040-84 = "หะ... หืม?? ไม่หรอก! ฉันไม่ได้เป็นอะไร..."
10034040-88 = "หืม...?"
10034040-89 = "เอ๋...? คุณครู...?"
10034040-94 = "คุณครู...!? มาดูพวกเราซ้อมดนตรีเหรอคะ!?"
10034040-95 = "[s7] \"เริ่มเข้าที่เข้าทางกันแล้วนะเนี่ย\"\n[s8] \"เท่ทั้งชุดทั้งเครื่องดนตรีเลย เหมือนวงมืออาชีพเลยนะ\""
10034040-98 = "อ่า... แหะๆๆ... งั้นเหรอคะ? ขอบคุณค่ะ! ได้ยินแล้วก็รู้สึกดีขึ้นมาเลยนะคะเนี่ย!"
10034040-99 = "คะ... คือว่า... คุณครู...? ฉันแค่ถามเฉยๆ หรอกนะ..."
10034040-100 = "คุณครูมาถึงตั้งแต่เมื่อไรเหรอ...? เมื่อกี้ได้ยินเพลงที่ฉันร้อง... ด้วยรึเปล่า...?"
10034040-101 = "อ่า... เพิ่งมาถึงงั้นเหรอ...? ฮ่าฮ่า งั้นก็โล่งใจได้แล้วละ"
10034040-102 = "เปล่า ไม่มีอะไรหรอก ฉันก็แค่... เป็นนักร้องเสียงเพี้ยนไปหน่อยน่ะ..."
10034040-103 = "เมื่อกี้ร้องดีมากต่างหากค่ะ! แก้วเสียงดีมากเลย!!"
10034040-104 = "ไอริ..."
10034040-109 = "หืม...? พูดอะไรของเธอน่ะ"
10034040-110 = "เอ๋... คุณครู...?"
10034040-111 = "อ่า..."
10034040-116 = "อะ... อะไรเนี่ย! ทำไมถึงมาที่นี่ล่ะ!?"
10034040-117 = "คิดว่าจะมีอะไรให้ดูงั้นเหรอ!? เราเพิ่งจะเริ่มกันเอง ยังไม่เข้าที่เข้าทางหรอก! ไม่มีอะไรให้ชมหรอกนะ!!"
10034040-118 = "ถ้าจะมาแล้วทำให้เขินแบบนี้ละก็นะ! เมื่อกี้ฉันบอกไปชัดเจนแล้วไม่ใช่เหรอว่าไม่ต้องมา!!!"
10034040-119 = "[s9] \"โยชิมิเขินที่ครูมาเหรอ...?\"\n[s10] \"ฮึกๆ... นึกว่าครูมาแล้วจะดีใจกันซะอีก...\""
10034040-122 = "ถ้าจะมาพูดอะไรแปลกๆ ก็ไม่ต้องมาเลย~!!!!"
10034040-123 = "ระหว่างที่ซ้อมอยู่ คุณครูจะมาแค่แป๊บเดียวก็ไม่ได้! เข้าใจมั้ย!? ฉันเตือนแล้วนะ! ห้ามมาจนกว่าพวกเราจะบอกว่ามาได้!!"
10034040-124 = "ว่าไงนะ? มาช่วยงั้นเหรอ...? ไม่ต้องช่วยหรอกน่า! ออกไปได้แล้ว! จริงๆ เล้ย~!!"
10034040-125 = "ออกไปก่อนเลย!!"
10034040-126 = "เร็วๆ เข้าสิ!!"
10034040-127 = "ออกไปก่อน!!!!"
10034040-135 = "(โยชิมิที่เกรี้ยวกราดผลักหลังของคุณครูออกมาจากห้องซ้อม)"
10034040-136 = "(แต่คุณครูได้เห็นแล้วว่าห้องซ้อมและเครื่องดนตรีที่ใช้ไม่มีปัญหาอะไร จึงกลับมาด้วยความโล่งใจ)"
10034040-138 = "(หลังจากเสร็จงานในตอนเย็น คุณครูก็แวะไปแถวๆ ห้องซ้อมอีกครั้ง)"
10034040-142 = "[ns11] \"ป่านนี้ยังซ้อมกันอยู่อีกเหรอ...?\"\n[ns12] เข้าไปในห้องซ้อม"
10034040-149 = "[ns13] \"ไอริ...?\"\n[ns14] \"ยังอยู่ซ้อมคนเดียวถึงตอนนี้เลยเหรอ?\""
10034040-152 = "...? อ๊ะ คุณครู...?"
10034040-156 = "มีธุระอะไรที่นี่เหรอคะ? นี่มันก็ค่ำแล้วนะ..."
10034040-157 = "ฉันเหรอคะ...? แหะๆ... ฉันก็แค่..."
10034040-158 = "ก็อย่างที่คุณครูเห็นค่ะ ฉันกำลังซ้อมคีย์บอร์ดอยู่ค่ะ ก็ฉันต้องตั้งใจนี่คะ! แหะๆ..."
10034040-159 = "[s15] \"มีหนังสือทฤษฎีดนตรีกองเป็นตั้งเลยแฮะ\"\n[s16] \"จริงจังกันมากเลยนะเนี่ย\""
10034040-162 = "งะ... งั้นเหรอคะ? แหะๆๆ... ฉันไม่เคยเล่นดนตรีมาก่อน ก็เลยไม่รู้ว่าควรทำยังไงน่ะค่ะ"
10034040-163 = "โอกาสแบบนี้ก็ไม่ได้มีบ่อยๆ ด้วย... งั้นก็ต้องคว้าโอกาสนี้ไว้สิคะ!!"
10034040-164 = "คะ...?"
10034040-165 = "คุณครูสงสัยว่าการซ้อมแบบนี้สนุกหรือเปล่าน่ะเหรอคะ?"
10034040-166 = "อะ... อืม... มะ... ไม่รู้สิคะ จู่ๆ ก็มาถามกันแบบนี้..."
10034040-167 = "อืม... เป็นเรื่องที่ฉันยังไม่เคยคิดเลยนะคะ สนุกรึเปล่างั้นเหรอ... สนุกรึเปล่า... "
10034040-168 = "ฉันยังไม่รู้เลยค่ะ อืม ถือว่าสนุก... มั้ยนะ?"
10034040-169 = "ตอนนี้ฉันแค่ดูหนังสือแล้วทำตามซ้ำๆ อยู่น่ะค่ะ"
10034040-170 = "ฉันเริ่มต้นด้วยพลังใจที่ดีก็จริง แต่ในเรื่องความคืบหน้าฉันช้ากว่าทุกคนเลยค่ะ แหะๆๆ..."
10034040-171 = "คนอื่นฝึกกันเจี๊ยวจ๊าวเหมือนทำเป็นเล่น แต่ก็ทำได้ดีกันหมดเลย..."
10034040-172 = "ฉันว่าฉัน..."
10034040-174 = "น่าจะยังไม่ดีพอหรือเปล่า?"
10034040-179 = "[ns] \"ไอริ...?\""
10034040-180 = "อะ... อ้อ! ค่ะ! พื้นฐานต้องมาก่อนความสนุกนี่คะ! เพราะงั้นในตอนนี้น่ะ!"
10034040-181 = "ฉันเลยคิดว่าถ้าจะทำออกมาให้ดี ฉันต้องแน่นตั้งแต่พื้นฐานค่ะ!!"
10034040-182 = "ถ้าฝึกพื้นฐานไปเรื่อยๆ เดี๋ยวฉันก็จะเก่งขึ้นไปเองละค่ะ! ฮ่าฮ่า!!"
10034040-183 = "สะ... ส่วนเรื่องความสนุก... อืม..."
10034040-184 = "ไว้ถ้าฉันเล่นเก่งๆ แล้ว... ก็น่าจะสนุกไปเองหรือเปล่าคะ...?"
10034040-185 = "อื้ม! ถ้าฉันเก่งแล้ว ตอนนั้นฉันอาจจะสนุกกับมันก็ได้ค่ะ! ส่วนตอนนี้ขอฝึกซ้อมก่อน!! ต้องซ้อมให้เก่งก่อนค่ะ!!"
10034040-186 = "......"
10034040-187 = "อืม เดี๋ยวก่อนนะคะ รู้สึกเหมือน... จะไม่ใช่เลย..."
10034040-188 = "เหมือนว่าคำตอบของฉันจะต่างจากสิ่งที่คุณครูอยากได้ยินอย่างนั้นแหละ..."
10034040-189 = "[s17] \"ตอนนี้ตอบแค่นั้นก็เพียงพอแล้วละ\"\n[s18] \"ไม่ต้องฝืนตอบเพื่อเอาใจใครหรอกนะ\""
10034040-192 = "อืม...? งะ... งั้นเหรอคะ?"
10034040-196 = "ถ้างั้น..."
10034040-197 = "ในเมื่อเราได้อยู่ด้วยกันแล้ว ที่จริงฉันมีเรื่องที่อยากบอกคุณครูเรื่องหนึ่งน่ะค่ะ"
10034040-198 = "อืม... ฉันว่าบางทีคุณครูอาจจะรู้อยู่แล้วก็ได้ค่ะ"
10034040-199 = "เรื่องการทำวงดนตรี ถึงฉันจะบอกเพื่อนๆ ไปว่าทำเพื่อการคัดเลือกและขนมเซมล่า..."
10034040-200 = "แต่ที่จริงแล้วขนมเซมล่าไม่ได้สำคัญกับฉันถึงขนาดนั้นหรอกค่ะ"
10034040-201 = "คุณครูคะ ฉันน่ะ..."
10034040-202 = "อยากเป็นคนที่ 'เล่นดนตรีได้' ค่ะ"
10034040-203 = "ถ้าจะให้พูดเจาะจงกว่านี้ก็คงต้องบอกว่า... ฉันกำลังทำให้ตัวเอง 'มีเรื่องที่ทำได้ดี' ค่ะ นั่นคือเป้าหมายของฉันค่ะ"
10034040-204 = "แม้ทุกคนจะคิดว่าแค่ซ้อมให้พอเล่นเป็นเพื่อให้ผ่านการคัดเลือกและได้กินขนมเซมล่าก็พอ... แต่ว่าฉันไม่ได้คิดอย่างนั้นค่ะ"
10034040-205 = "อย่างที่คุณครูรู้ว่าฉันเป็นเด็กที่ไม่เด็ดขาด ไม่มีความแน่วแน่ แล้วก็ไม่มีความคิดริเริ่มทำอะไรจริงๆ จังๆ ..."
10034040-206 = "ถึงฉันจะเป็นเด็กแบบนั้น แต่อย่างน้อยก็ควรมีข้อดีไว้สักอย่างใช่ไหมล่ะคะ?"
10034040-207 = "พูดตามตรง... ฉันไม่รู้ค่ะว่าการเล่นดนตรีมันสนุกหรือเปล่า แต่ที่ฉันรู้ก็คือฉันจะเป็นฉันคนเดิมต่อไป#nไม่ได้แล้วค่ะ"
10034040-208 = "[s19] \"เป็นคนเดิมต่อไปไม่ได้แล้ว?\"\n[s20] \"กะแล้วเชียว เรื่องเป็นแบบนี้นี่เองสินะ\""
10034040-211 = "มันมีคำที่ว่าเราสามารถเปลี่ยนตัวเองผ่านดนตรีได้อยู่นี่คะ และดนตรีก็สามารถสร้างเอกลักษณ์ และเสน่ห์ใหม่ๆ ที่เราไม่เคยมีมาก่อนได้ด้วย!"
10034040-212 = "สำหรับฉันแล้ว... นั่นคือความหมายของการคัดเลือกครั้งนี้ค่ะ ส่วนที่ฉันชวนให้เพื่อนๆ มาทำด้วยกัน นั่นเป็นเพราะฉันกลัวที่จะทำคนเดียว"
10034040-216 = "จะว่าไปนี่อาจเป็นการทำเรื่องที่ไม่ดีก็ได้ค่ะ เพราะฉัน... หลอกใช้เพื่อนๆ เพื่อตัวฉันเอง"
10034040-217 = "ไม่สิ ไม่ใช่แค่ไม่ดี... ต้องบอกว่า 'เห็นแก่ตัว' ด้วยมากกว่าค่ะ..."
10034040-218 = "คะ...?"
10034040-219 = "คุณครูไม่คิดว่าเป็นอย่างนั้นเหรอคะ? ฉันไม่ได้หลอกใช้เพื่อนงั้นเหรอคะ...? แต่ว่า..."
10034040-220 = "[s21] \"แบบนั้นไม่ได้เรียกว่าหลอกใช้หรอก\"\n[s22] \"ทุกคนก็ทำเพราะอยากทำนะ\""
10034040-223 = "งะ... งั้นเหรอคะ...? อืม... พอคุณครูช่วยพูดแบบนี้ ฉันก็รู้สึกโล่งใจขึ้นมาหน่อยนะคะ..."
10034040-224 = "ก็อย่างนั้นละค่ะ สรุปว่าฉันอยากเปลี่ยนตัวเองเป็นคนใหม่ และก็คิดว่าคีย์บอร์ดนี้จะช่วยเปลี่ยนได้ค่ะ"
10034040-225 = "ถ้าฉันเล่นคีย์บอร์ดเก่งๆ ละก็... ฉันอาจจะเป็นเด็กที่ใช้ได้กว่านี้ก็ได้ค่ะ"
10034040-226 = "ไหนๆ คุณครูก็อุตส่าห์มาที่นี่และช่วยรับฟังฉันถึงขนาดนี้แล้ว..."
10034040-227 = "อืม... เรื่องที่เล่าไป ฉันไม่กล้าบอกใครเลยค่ะ ฉันบอกแต่กับคุณครูเท่านั้น ช่วยเก็บเป็นความลับให้#nด้วยนะคะ"
10034040-228 = "แล้วก็... ช่วยเฝ้ามองฉันด้วยนะคะ ฉันจะพยายามเต็มที่เลยค่ะ"
10034040-229 = "ฉันจะต้องเก่งกว่านี้..."
10034040-230 = "และทำให้คุณครูได้เห็นฉันคนใหม่ที่ดีกว่าเดิมให้ได้ค่ะ!!"
10034040-231 = "...?"
10034040-232 = "คุณครู...?"
10034040-233 = "ทำไมทำหน้าอย่างนั้นล่ะคะ? มีอะไรอยากจะพูดหรือเปล่าคะ...?"
10034040-237 = "[ns23] \"ไว้วันหลังครูจะบอกนะ\"\n[ns24] \"ครูจะคอยเชียร์นะ แต่ก็อย่าหักโหมให้มากล่ะ\""
10034040-240 = "หืม...?"
10034040-241 = "อ่า... หมายถึงเรื่องสุขภาพร่างกายใช่มั้ยคะ? แหะๆ ไม่ต้องห่วงนะคะ! ฉันน่ะดูแลร่างกายดีอยู่แล้ว!"
10034040-242 = "ฉันจะพยายามนะคะ คุณครู!!"
10034040-243 = "ฉันพูดจริงนะคะ!!"
10034040-245 = "(ไม่กี่วันหลังจากนั้น)"
10034040-251 = "คุณครู...? คุณครูอยู่รึเปล่า...?"
10034040-252 = "[s25] \"โอ้~ ติดต่อมาหาครูก่อนเลยแฮะ? มั่นใจขึ้นแล้วเหรอ?\"\n[s26] \"หืม? ห้ามไม่ให้ครูไปตอนฝึกซ้อมกันไม่ใช่เหรอ?\""
10034040-255 = "อย่ามาพูดล้อเล่นอยู่น่า! ตอนนี้ไม่ใช่เวลามาทำเรื่องแบบนั้นนะ!!"
10034040-256 = "ฟังฉันให้ดีนะคุณครู"
10034040-257 = "ฉันแค่ถามเฉยๆ นะ... ถามเผื่อๆ น่ะ"
10034040-258 = "เอ่อ... หมู่นี้ไอริไปที่นั่นบ้างรึเปล่า?"
10034040-263 = "[ns27] \"ไอริ... ทำไมเหรอ?\"\n[ns28] \"มีเรื่องอะไรเหรอ?\""
10034040-266 = "เอ่อ... คือว่า... อืม..."
10034040-267 = "ไอริ..."
10034040-269 = "ติดต่อไม่ได้ตั้งแต่เมื่อวานซืนแล้วน่ะ..."

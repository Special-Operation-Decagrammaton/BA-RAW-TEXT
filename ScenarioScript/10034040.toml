[translation]
10034040-1 = "第4話;不同以往的我"
10034040-2 = "（……幾天後）"
10034040-3 = "（由於工作量比平常少，難得享受了一段悠哉的工作時間）"
10034040-9 = "啊，老師？抱歉突然打給你。#n現在有空嗎？"
10034040-10 = "沒有，不是發生了什麼事。#n只是代表大家打聲招呼而已。"
10034040-11 = "老師幫我們找到的練習室，不管是空間還是設備都非常好！#n多虧有它才能順利開始練習……"
10034040-12 = "所以在開始練習之前……果然得先跟老師道個謝才行吧？"
10034040-13 = "……嗯？#n……你說什麼？"
10034040-14 = "現在要過來？#n有，有這個必要嗎……？"
10034040-15 = "[s1]「突然想見見喜美。」\n[s2]「因為想看喜美演奏。」"
10034040-18 = "……！？#n吼，真是的！你這個人又在胡說八道什麼啦！！"
10034040-19 = "總之我要說的都說完了，你就專心做自己的事吧！！這裡我會看著辦！！"
10034040-20 = "我要掛電話了。#n不要過來，絕對不准過來，聽到了嗎！！我們現在要開始練習了！！"
10034040-25 = "[ns3]「想得美，我馬上出發！」\n[ns4 ] 立刻準備出門"
10034040-31 = "（走出夏萊，前往附近幫學生租借的練習室）"
10034040-32 = "（雖然位於地下室且隔音效果很好，還是能隱約聽到一些微弱的練習聲）"
10034040-33 = "[ns5]「看來正在努力練習呢。」\n[ns6] 下樓前往練習室"
10034040-41 = "快點！！再快一點！！"
10034040-45 = "已，已經是極限了……這一點都不搖滾……"
10034040-46 = "再快一點！！！！"
10034040-47 = "呃啊啊──！！"
10034040-52 = "再快一點！！！！"
10034040-53 = "呃哦哦哦哦哦哦──！RO～～CK！！！"
10034040-59 = "沒錯，就是這個速度！！繼續！！繼續！！"
10034040-60 = "唔唔……"
10034040-66 = "再快一點！！！！"
10034040-67 = "RO～～～CK！！！"
10034040-74 = "喜，喜美醬。夏醬已經很努力了……"
10034040-75 = "這也沒辦法。畢竟夏現在鼓打得太慢了。"
10034040-76 = "既然是自己吵著說要打鼓的，就得想辦法跟上歌曲的節奏。"
10034040-77 = "就算目標只是「能勉強通過試鏡拿到女王泡芙就行了」也一樣。"
10034040-78 = "呃，嗯……是啊……"
10034040-82 = "大家……都是這麼想的吧……"
10034040-83 = "……愛莉？怎麼了嗎？"
10034040-84 = "呃，嗯！？沒有！？沒什麼……！？"
10034040-88 = "嗯……？"
10034040-89 = "……咦，老師？"
10034040-94 = "老師……！？難道是來看我們練習的嗎！？"
10034040-95 = "[s7]「大家都挺有模有樣的哦。」\n[s8]「服裝跟裝備都很到位，就像真正的樂團一樣。」"
10034040-98 = "啊，啊哈哈……是嗎？謝謝老師！總覺得心情瞬間變好了！"
10034040-99 = "那，那個……老師？#n我只是隨口問問而已……"
10034040-100 = "你……是什麼時候來的？#n我剛才唱的……該不會都被你聽到了吧……？"
10034040-101 = "……啊，沒有聽到？才剛來而已？#n哈哈，那我就放心了。"
10034040-102 = "其實也沒什麼。#n只是……剛才唱錯的地方有點多……"
10034040-103 = "唱得非常好！聲音真的超級好聽！！"
10034040-104 = "愛莉……"
10034040-109 = "……嗯？發生什麼事了？"
10034040-110 = "……哎呀。老師……？"
10034040-111 = "……啊。"
10034040-116 = "為，為什麼！老師為什麼在這裡！？"
10034040-117 = "為什麼還是跑來了啊！？#n我們才剛開始練習，各方面都還亂糟糟的！還不到能展示的階段！！"
10034040-118 = "而且我不是說過你跑來會害大家彆扭到沒辦法練習嗎！！#n我剛剛明明說得那麼清楚！！！"
10034040-119 = "[s9]「喜美會因為老師來而害羞嗎……？」\n[s10]「嗚嗚嗚……老師明明不是這樣教你的……」"
10034040-122 = "不要說那些奇怪的話了啦～！！！！"
10034040-123 = "練習的時候不要靠近！！知道了嗎！？#n我是說認真的！直到我們說可以之前都不行！！"
10034040-124 = "是來幫忙的……？#n吼唷，不需要啦，快出去！這裡現在不需要幫忙～！！"
10034040-125 = "出去！出去就對了！！"
10034040-126 = "快走！！"
10034040-127 = "走──！！！！"
10034040-135 = "（被怒氣沖沖的喜美推出了練習室）"
10034040-136 = "（不過至少已經確認練習室跟設備都沒什麼問題，於是就抱著輕鬆的心情回去了）"
10034040-138 = "（到了晚上，在工作結束後再次來到了練習室附近）"
10034040-142 = "[ns11]「……嗯？這個時間還有練習的聲音……？」\n[ns12] 走進練習室"
10034040-149 = "[ns13]「愛莉……？」\n[ns14]「你獨自練習到現在嗎？」"
10034040-152 = "啊，老師……？"
10034040-156 = "時間這麼晚了……老師怎麼會來這裡呢？"
10034040-157 = "……我嗎？#n嘿嘿……我只是……嗯……"
10034040-158 = "就跟老師看到的一樣，只是在練習電子琴而已。#n我得多努力一點才行呢！嘿嘿……"
10034040-159 = "[s15]「有很多入門教材跟理論參考書呢。」\n[s16]「真是專業啊。」"
10034040-162 = "是，是嗎？啊哈哈……我畢竟是初學者，也不知道該怎麼做才好。"
10034040-163 = "難得的機會……得好好把握！沒錯！！"
10034040-164 = "……咦？"
10034040-165 = "問我練習有不有趣……？"
10034040-166 = "這，這個嘛……突然被這麼一問……"
10034040-167 = "唔嗯……我沒有想過這個問題。#n有不有趣啊……"
10034040-168 = "……我也不清楚。#n唔嗯，有趣……嗎？"
10034040-169 = "我只是照著入門教材反覆練習而已。"
10034040-170 = "雖然一開始是我最充滿幹勁，現在卻是進度最緩慢的。啊哈哈……"
10034040-171 = "大家平時總是打打鬧鬧的，怎麼才練習一下就變得那麼厲害……"
10034040-172 = "所以，我這樣……"
10034040-174 = "是不是少了點什麼？"
10034040-179 = "[ns]「……愛莉？」"
10034040-180 = "啊啊！是！那，那個，所以說！#n比起有趣，更重要的是打好基礎！"
10034040-181 = "凡事都要從基礎開始！像是按琴鍵的方式之類的！！"
10034040-182 = "只要從基本功開始不斷練習，總有辦法能跟上大家的吧！哈哈！！"
10034040-183 = "至於有不有趣……嗯……"
10034040-184 = "等我變厲害一點之後……應該就能感受到了吧？"
10034040-185 = "嗯！只要變厲害就會覺得有趣了！現在最重要的是練習！！練習！！"
10034040-186 = "…………"
10034040-187 = "唔嗯，等等。這個……好像……"
10034040-188 = "不是老師想聽到的答案……"
10034040-189 = "[s17]「現在這個回答已經很夠了。」\n[s18]「不需要勉強自己給出答案。」"
10034040-192 = "……嗯？是，是嗎。"
10034040-196 = "那麼……"
10034040-197 = "難得有這個機會，我有件只想說給老師聽的事。"
10034040-198 = "雖然我想老師可能已經察覺到了。"
10034040-199 = "將試鏡和女王泡芙的事告訴大家的人，雖然是我沒錯……"
10034040-200 = "但對我來說，女王泡芙其實沒有那麼重要。"
10034040-201 = "老師，我……"
10034040-202 = "……想變成「會演奏樂器」的人。"
10034040-203 = "說得更具體一點的話……我想培養出自己的「專長」。#n這才是我的目標。"
10034040-204 = "雖然大家都覺得只要練出能拿到女王泡芙的程度就好……但我並不這麼覺得。"
10034040-205 = "老師應該也知道我是個優柔寡斷、缺乏毅力、不擅長表現自己的人……對吧？"
10034040-206 = "但即使是這樣的我，也至少要有一個長處才行，不是嗎？"
10034040-207 = "老實說，我不確定演奏樂器這件事是否讓我感到快樂。#n但我知道自己現在這樣是不行的。"
10034040-208 = "[s19]「……現在這樣是不行的？」\n[s20]「原來是這件事啊。」"
10034040-211 = "不是有這麼一句話嗎──「用音樂改變自己」！#n賦予原本一無是處的我──新的個性和魅力！"
10034040-212 = "這次的試鏡對我來說……就具有這樣的意義。#n之所以找大家一起，只是因為我害怕一個人挑戰而已。"
10034040-216 = "從某種角度來看，我果然是個壞孩子吧。#n我……為了自己而利用了朋友。"
10034040-217 = "或者應該說……是個「自私」的人吧……"
10034040-218 = "……咦？"
10034040-219 = "不是這樣的？這不是利用……？#n可是……"
10034040-220 = "[s21]「這跟利用的定義不一樣。」\n[s22]「大家是因為喜歡才這麼做的。」"
10034040-223 = "是，是這樣嗎……？#n唔嗯，聽老師這麼說，讓我稍微安心了一點……"
10034040-224 = "總之事情就是這樣。#n我想要改變──而我認為這把電子琴擁有能改變我的力量。"
10034040-225 = "只要能把電子琴彈好……我也能成為一個值得被讚賞的好孩子。"
10034040-226 = "既然老師都聽到這裡了……我想再告訴你一件事。"
10034040-227 = "剛才那些話我只有跟老師說過……所以希望老師能幫我保密。"
10034040-228 = "總之……請老師拭目以待。#n我，會努力的。"
10034040-229 = "我一定會變得厲害……"
10034040-230 = "……成為不同於以往、更出色的自己！！"
10034040-231 = "…………？"
10034040-232 = "老師……？"
10034040-233 = "……怎麼了？#n有什麼話想說嗎……？"
10034040-237 = "[ns23]「今天先這樣吧，下次再找你談談。」\n[ns24]「我也支持你。不過別太勉強自己哦。」"
10034040-240 = "……嗯？"
10034040-241 = "……啊，是指體力調節的部分嗎？#n嘿嘿，別擔心！這種程度的事我還是辦得到的！"
10034040-242 = "我會努力的！老師！！"
10034040-243 = "……我是認真的！！"
10034040-245 = "（……幾天後）"
10034040-251 = "老師……？老師現在有空嗎……？"
10034040-252 = "[s25]「哦～主動聯絡我了嗎？看來是變得有自信了？」\n[s26]「哎呀，不是叫我練習期間不要過去嗎？」"
10034040-255 = "別開玩笑了！現在不是鬧著玩的時候！！"
10034040-256 = "先別搞怪，仔細聽我說。"
10034040-257 = "我只是想說……或許有這個可能性而已。"
10034040-258 = "……愛莉最近有去找過你嗎？"
10034040-263 = "[ns27]「……愛莉怎麼了嗎？」\n[ns28]「……發生了什麼事嗎？」"
10034040-266 = "那個……是這樣的……嗯……"
10034040-267 = "愛莉他……"
10034040-269 = "……從前天開始就聯絡不上了。"

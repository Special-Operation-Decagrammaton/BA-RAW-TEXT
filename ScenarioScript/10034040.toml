[translation]
10034040-1 = "Episode 4;A New And Different Me"
10034040-2 = "Several days later..."
10034040-3 = "It was a slow day at work. A good time to relax."
10034040-9 = "Hey, Sensei? Sorry for calling you out of nowhere. Are you busy right now?"
10034040-10 = "No, we're not in trouble. I just wanted to...report to you, I guess? As the band rep, I mean."
10034040-11 = "The practice room is really nice, with lots of space! So we're off to a good start. I wanted to tell you that."
10034040-12 = "In fact, we're starting practice right now. Just wanted to call and say thank you first."
10034040-13 = "...Huh? What was that?"
10034040-14 = "You want to come over right now? Th-There's no need..."
10034040-15 = "[s1] \"I just got the urge to go see you, Yoshimi.\"\n[s2] \"I want to see your performance.\""
10034040-18 = "...Seriously? What are you saying?"
10034040-19 = "Whatever. I'm sure you've got work to do. We'll be fine on our own."
10034040-20 = "I'm going to hang up now. Okay? You heard me, right? Don't you dare come over!! We're about to start practice!"
10034040-25 = "[ns3] \"Yeah, right. Off I go!\"\n[ns4] Prepare to leave immediately."
10034040-31 = "After leaving Schale, I looked for the practice room I'd rented out for the students."
10034040-32 = "It wasn't loud, because the practice room was underground and soundproof, but I could hear a faint echo of their practice."
10034040-33 = "[ns5] \"They must be practicing hard.\"\n[ns6] Go down to the practice room."
10034040-41 = "Faster!! Come on, faster!!"
10034040-45 = "Th-This is already my limit... This is not...rock..."
10034040-46 = "Faster!!"
10034040-47 = "Woooaaa!!"
10034040-52 = "Faster!!"
10034040-53 = "Guuuoooh! Rooock!!"
10034040-59 = "Yes! THAT tempo!! Again!! Again!!"
10034040-60 = "Waaah..."
10034040-66 = "Faster!!"
10034040-67 = "ROOOCK!!"
10034040-74 = "Y-Yoshimi, Natsu's already going as fast as she can..."
10034040-75 = "It can't be helped. She's going too slow, that's a fact."
10034040-76 = "If she wants to be the drummer, she has to keep up with the tempo."
10034040-77 = "Even if we're only doing this for semla."
10034040-78 = "I... I guess you're right."
10034040-82 = "...That's right... That's what they said..."
10034040-83 = "Hm? Airi, what was that?"
10034040-84 = "H-Huh?! Nothing! It's nothing..."
10034040-88 = "...Hm...?"
10034040-89 = "...Oh? ...Sensei?"
10034040-94 = "Sensei! Did you come to see us practice?!"
10034040-95 = "[s7] \"You're doing great already.\"\n[s8] \"You look just like a real band.\""
10034040-98 = "A-Ahaha... You think so? Thank you! It's great to hear you say that."
10034040-99 = "Um...S-Sensei...? I'm just wondering..."
10034040-100 = "H-How long have you been standing there...? You didn't...hear me sing or anything, did you...?"
10034040-101 = "...Oh, you didn't? ...You just got here? Haha, phew."
10034040-102 = "No, I mean...I made a lot of mistakes..."
10034040-103 = "She was really good! Kazusa has a great voice!!"
10034040-104 = "...Airi."
10034040-109 = "...Huh? What's the ruckus?"
10034040-110 = "...Ah, Sensei...?"
10034040-111 = "...Oh."
10034040-116 = "Wait, what? What is Sensei doing here?!"
10034040-117 = "There's nothing to see here! We just started, and it's still a mess! We're not ready to show you yet!"
10034040-118 = "I told you not to come, because we can't practice if we're all embarrassed! I specifically told you that!"
10034040-119 = "[s9] \"Yoshimi...you're embarrassed of me...?\"\n[s10] \"*sniff* *sniff* I didn't raise you this wa...\""
10034040-122 = "You're making this weird! Just go!"
10034040-123 = "Just stay away while we're practicing! Got that? I'm really serious!! You can't come back until we say it's okay!!"
10034040-124 = "You came to help us...? Well, we're good! Seriously, we're fine!!"
10034040-125 = "Get out! Just get out!!"
10034040-126 = "Right this instant!"
10034040-127 = "OUT!!"
10034040-135 = "Yoshimi physically pushed me out of the room."
10034040-136 = "Anyway, it was plain to see that the room and the equipment were all working fine, so I left satisfied."
10034040-138 = "At dinnertime, after my work was done and the practice room was presumably empty, I stopped by there again."
10034040-142 = "[ns11] \"Someone's still practicing at this hour?\"\n[ns12] Head inside the practice room."
10034040-149 = "[ns13] \"Airi...?\"\n[ns14] \"You've been practicing alone all this time?\""
10034040-152 = "Oh? Sensei?"
10034040-156 = "What are you doing here? It's late..."
10034040-157 = "...Me? Hehe...I'm just, well...I'm just..."
10034040-158 = "...trying to get a little more keyboard practice in. We've got to be our best, you know! Heehee."
10034040-159 = "[s15] \"There's a lot of books for beginners...and ones on theory, too.\"\n[s16] \"You're taking this very seriously.\""
10034040-162 = "Y-You think so? Haha... I didn't really know what to do, since this is my first time."
10034040-163 = "But an opportunity like this doesn't come every day...so I want to make the most of it! Yeah!"
10034040-164 = "...Huh?"
10034040-165 = "...Is practicing...fun...?"
10034040-166 = "Um...I-I'm not sure. I hadn't really asked myself that question."
10034040-167 = "Yeah, I really haven't thought about it. IS it fun? Well..."
10034040-168 = "...I'm not sure yet. Hm... Fun or not?"
10034040-169 = "Right now, I'm just following the drills for beginners."
10034040-170 = "It was fine getting started, but I think out of all of us, I'm the slowest to get good at this. Ha..."
10034040-171 = "Everyone else seems like they're having fun, but they're all so good..."
10034040-172 = "That's why..."
10034040-174 = "\"Not really enough,\" they said..."
10034040-179 = "[ns] \"...Airi?\""
10034040-180 = "A-Ah! Yeah, um...so, for now, I need to get the fundamentals down, THEN I can start having fun!"
10034040-181 = "You've gotta have the fundamentals first, right? Like how to hit the keys, and stuff like that?"
10034040-182 = "I just need to master that, and then I can catch up somehow! Haha!"
10034040-183 = "H-Having fun, though... Hm..."
10034040-184 = "Once I get good...it'll work out, right?"
10034040-185 = "Yeah! Once I'm good, this'll be a blast. For now, I've gotta practice, practice, practice!!"
10034040-186 = "..."
10034040-187 = "Hm, wait. Was that... Was that not it?"
10034040-188 = "I have a feeling that wasn't the answer you were looking for, Sensei..."
10034040-189 = "[s17] \"For now, you're good.\"\n[s18] \"You don't have to force an answer.\""
10034040-192 = "Hm? Oh, o-kay..."
10034040-196 = "Then..."
10034040-197 = "While we're here, there's actually something I wanted to tell you, Sensei."
10034040-198 = "Maybe you already know what it is..."
10034040-199 = "I told my friends we were doing this for semla..."
10034040-200 = "But semla's really not all that important to me."
10034040-201 = "Sensei, I..."
10034040-202 = "...I want to BE someone who can play an instrument."
10034040-203 = "More than that...I want to have something I'm good at. That's the goal."
10034040-204 = "My friends say as long as we get good enough to eat semla, it's enough...but it's not like that for me."
10034040-205 = "You know me, I'm...shy, and indecisive, and spineless."
10034040-206 = "But even someone like me should have something they're good at, don't you think?"
10034040-207 = "I don't know if I'm enjoying this at all, to tell you the truth. But I know I can't stay the way I am right now."
10034040-208 = "[s19] \"Why can't you stay the way you are right now?\"\n[s20] \"I see. So that's how it is.\""
10034040-211 = "You know what they say! Music can change who you are! It'll give me something to be proud of, something for people to like!"
10034040-212 = "That's...what this audition means to me. I asked my friends to do it with me because I was scared to do this alone."
10034040-216 = "Maybe I'm a terrible person. I...used my friends for my own benefit."
10034040-217 = "Terrible? Selfish, at least..."
10034040-218 = "...Huh?"
10034040-219 = "You don't think so? I'm not...using them...? But..."
10034040-220 = "[s21] \"That's not what 'using' is.\"\n[s22] \"They're doing it with you because they're having fun.\""
10034040-223 = "I-Is that so...? Mm...it does feel better to hear you say that..."
10034040-224 = "And that's how it is. I want to change, and I think this keyboard can do that for me."
10034040-225 = "If I get good enough, I'll...become someone I'm proud to be."
10034040-226 = "Sensei, I'm saying this because you've come all this way and heard me out..."
10034040-227 = "...But, um...I couldn't tell anyone else. Just you, Sensei. Please keep it a secret."
10034040-228 = "Anyway...watch over me. I'll do my best."
10034040-229 = "I'll get good..."
10034040-230 = "...and become someone who's actually cool!"
10034040-231 = "Hm?"
10034040-232 = "Sensei...?"
10034040-233 = "What is it? Were you trying to say something...?"
10034040-237 = "[ns23] \"It's fine. I'll tell you next time.\"\n[ns24] \"I'll cheer you on. Make sure not to overdo it.\""
10034040-240 = "...Say again?"
10034040-241 = "...Oh, you mean like, managing my stamina? Hehe, don't worry! I know not to overexert myself!"
10034040-242 = "I'm really going to give it all I've got, Sensei!!"
10034040-243 = "...I mean it!!"
10034040-245 = "Several days later..."
10034040-251 = "Sensei...? Are you there, Sensei?"
10034040-252 = "[s25] \"Hey, you're calling me. Does that mean you're feeling more confident?\"\n[s26] \"I thought you didn't want me around during practice.\""
10034040-255 = "Stop teasing! Now's not the time for that!!"
10034040-256 = "Don't misunderstand or anything, but Sensei..."
10034040-257 = "Just... Just wondering..."
10034040-258 = "...Did Airi head over there? Like, recently?"
10034040-263 = "[ns27] \"...What about her?\"\n[ns28] \"...Did something happen?\""
10034040-266 = "W-Well...! About that...!"
10034040-267 = "...I..."
10034040-269 = "...I haven't been able to get ahold of her since the day before yesterday."

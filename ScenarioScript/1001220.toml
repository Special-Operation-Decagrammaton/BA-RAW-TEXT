1001220-56 = "1;스미레;08;네, 오늘은 조깅을 나올 때 팔과 다리에 모래주머니를 차고 나왔거든요.\n#1;em;[반응]"
1001220-57 = "1;스미레;03;평소보다 운동 부하가 높아진 탓에 호흡이 가빠졌을지도 모르겠습니다.\n#1;m3"
1001220-58 = "[s3] \"모래주머니까지 차고 조깅을 하다니, 대단하네……\"\n[s4] \"평소의 운동량으로도 충분하지 않아?\""

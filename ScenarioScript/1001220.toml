1001220-10 = "3;스미레;01;아, 먼저 기다리고 계셨군요. 트레이너.\n#3;a\n#3;em;[반응]"
1001220-11 = "3;스미레;06;죄송합니다. 준비물을 정리하는 데 시간이 생각보다 오래 걸려서요."
1001220-12 = "[s] \"괜찮아. 오래 기다리지 않았는걸.\""
1001220-13 = "#wait;1000"
1001220-14 = "[ns] \"그보다 조깅에도 준비물이 필요해?\""
1001220-15 = "3;스미레;03;물론이지요.\n#3;em;[반응]"
1001220-16 = "3;스미레;08;모든 운동이 그렇지만, 운동 효율을 최대한으로 이끌어내기 위해서는 철저한 준비가 필수적입니다."
1001220-17 = "3;스미레;07;달리기를 할 때 신는 운동화부터 러닝 벨트까지…… 단순해 보이는 장비라도 종류에 맞게 착용하지 않으면 다치거나 큰 부상을 입을 수도 있거든요.\n#3;em;…"
1001220-18 = "[s] \"그렇구나…….\""
1001220-19 = "3;스미레;03;오늘은 오랜만의 조깅이라, 저도 새로 산 장비를 착용하고 나왔답니다."
1001220-20 = "3;스미레;03;새로운 장소에서 새로운 운동을 하려니, 어쩐지 조금 긴장이 되네요. 후후.\n#3;em;[음표]"
1001220-21 = "3;스미레;08;그럼…… 가볍게 한 번 뛰어볼까요?"

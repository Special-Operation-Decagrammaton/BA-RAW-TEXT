1001220-62 = "1;스미레;99;물론 무리하지 않는 것도 중요하지만, 반복되는 평이한 상태에 안주하면 성장도 거기서 멈추고 맙니다."
1001220-63 = "1;스미레;05;자신의 한계를 인지하고, 그 한계를 넘어서기 위해 끊임없이 도전하는 것이야말로 올바른 트레이닝의 자세라고 할 수 있지요!\n#1;em;[!]"
1001220-64 = "[s] \"훌륭한 마음가짐이네……\""
1001220-65 = "#wait;1000"
1001220-66 = "[ns] \"그 말을 들으니 나도 조금은 운동 강도를 높여야겠는 걸.\""
1001220-67 = "1;스미레;07;좋은 생각입니다, 트레이너.\n#1;em;[음표]"
1001220-68 = "1;스미레;07;운동 강도를 높이신다면, 이 모래주머니를 차고 운동하시는 건 어떠신가요?"
1001220-69 = "1;스미레;08;양 손발에 차기 위해 두 세트를 가져왔으니 한 세트 정도는 빌려드릴 수 있습니다."

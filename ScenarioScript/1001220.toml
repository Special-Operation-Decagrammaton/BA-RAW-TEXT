[translation]
1001220-1 = "ขีดจำกัดของเทรนเนอร์"
1001220-2 = "สวนสาธารณะใกล้ชาเล่ต์"
1001220-3 = "(คุณครูเตรียมตัวเสร็จก็ออกมารอสึมิเระที่สวนสาธารณะตั้งแต่เช้าตรู่...)"
1001220-10 = "อ๊ะ มารออยู่ก่อนแล้วเหรอคะ เทรนเนอร์"
1001220-11 = "ขอโทษค่ะ ฉันมัวแต่เตรียมอุปกรณ์อยู่ เลยใช้เวลานานกว่าที่คิดเอาไว้"
1001220-12 = "[s] \"ไม่เป็นไร ครูไม่ได้รอนานเลย\""
1001220-14 = "[ns] \"ว่าแต่ว่าแค่มาจ้อกกิ้งต้องเตรียมอุปกรณ์ด้วยเหรอ?\""
1001220-15 = "ก็แน่นอนสิคะ"
1001220-16 = "การเตรียมตัวอย่างพิถีพิถันคือสิ่งจำเป็นเพื่อทำให้การออกกำลังกายมีประสิทธิภาพสูงสุดค่ะ"
1001220-17 = "ตั้งแต่รองเท้าจนถึงเข็มขัดออกกำลังกายที่ใส่วิ่ง... ถึงจะเป็นอุปกรณ์ที่ดูธรรมดา แต่ถ้าไม่ใช้งานให้ถูก#nประเภทละก็ อาจทำให้เกิดอุบัติเหตุบาดเจ็บระหว่างวิ่งได้ค่ะ"
1001220-18 = "[s] \"นั่นสินะ...\""
1001220-19 = "ฉันไม่ได้ออกมาวิ่งจ้อกกิ้งมาสักพักแล้ว เพราะงั้นก็เลยลองใส่อุปกรณ์ที่ซื้อมาใหม่ดูน่ะค่ะ"
1001220-20 = "อุปกรณ์ออกกำลังกายใหม่กับสถานที่ใหม่... จู่ๆ ก็รู้สึกตื่นเต้นยังไงก็ไม่รู้ค่ะ ฮิฮิ"
1001220-21 = "ถ้างั้น...เรามาวิ่งเหยาะๆ กันก่อนดีมั้ยคะ?"
1001220-28 = "(10 นาทีต่อมา...)"
1001220-36 = "แฮ่ก... แฮ่ก..."
1001220-37 = "[s] \"เป็นอะไรรึเปล่า สึมิเระ?\""
1001220-38 = "ไม่เป็นไรค่ะ เรายังวิ่งมาไม่ถึง 1 กิโลเมตรเลยค่ะ"
1001220-39 = "ฉันยังวิ่งต่อได้ค่ะ"
1001220-40 = "[s1] \"แต่วันนี้ดูเหนื่อยมากจนดูผิดปกติเลยนะ...\"\n[s2] \"ไม่สบายตรงไหนรึเปล่า?\""
1001220-47 = "เปล่าหรอกค่ะ... ฉันไม่ได้เป็นอะไรเลยค่ะ"
1001220-48 = "ถ้าเรื่องสภาพร่างกายละก็ ฉันรู้สึกโอเคกว่าปกติมากเลยละค่ะ"
1001220-49 = "แต่สาเหตุที่ฉันหอบแบบนี้..."
1001220-54 = "คงเป็นเพราะสายรัดถ่วงน้ำหนักนี่ละมั้งคะ...?"
1001220-55 = "[s] \"สายรัดถ่วงน้ำหนัก...?\""
1001220-56 = "ค่ะ เมื่อเช้าตอนที่ออกมา ฉันเอาสายรัดถ่วงน้ำหนักติดไว้ที่แขนกับขาด้วยค่ะ"
1001220-57 = "ที่หายใจไม่ทันจนหอบแบบนี้อาจเป็นเพราะใช้แรงในการออกกำลังกายมากกว่าปกติก็ได้ค่ะ"
1001220-58 = "[s3] \"พกสายรัดถ่วงน้ำหนักมาออกกำลังกายด้วยเหรอเนี่ย สุดยอด...\"\n[s4] \"แค่ออกกำลังกายแบบปกติก็น่าจะพอแล้วนี่นา?\""
1001220-61 = "ถ้าอยากจะเพิ่มความแข็งแรงของกล้ามเนื้อ ก็ต้องฝึกออกแรงกล้ามเนื้ออย่างสม่ำเสมอค่ะ"
1001220-62 = "การไม่ฝืนตัวเองเกินไปย่อมเป็นเรื่องดีค่ะ แต่ว่าถ้าปล่อยตัวให้เคยชินกับความสบายมากเกินไป ก็จะพัฒนาต่อไปไม่ได้ค่ะ"
1001220-63 = "ฉันคิดว่าการยอมรับขีดจำกัดของตัวเอง และการพยายามทุกวิถีทางเพื่อก้าวข้ามขีดจำกัดนั้นไปให้ได้ คือการฝึกฝนที่ถูกต้องค่ะ!"
1001220-64 = "[s] \"เป็นความมุ่งมั่นที่สุดยอดเลย...\""
1001220-66 = "[ns] \"ได้ยินแบบนั้น ครูก็อยากเพิ่มระดับการออกกำลังกายบ้างแล้วสิ\""
1001220-67 = "เป็นความคิดที่ดีนะคะ เทรนเนอร์"
1001220-68 = "ถ้าอยากลองเพิ่มระดับการออกกำลังกายละก็ ลองใส่สายรัดถ่วงน้ำหนักนี่ดูมั้ยคะ?"
1001220-69 = "ฉันเตรียมมาสองชุดเอาไว้ใส่ข้อมือกับข้อเท้า ถ้าเทรนเนอร์อยากลอง ฉันให้ยืมหนึ่งชุดได้ค่ะ"
1001220-70 = "[s] \"ไหนลองดูซิ...\""
1001220-75 = "[ns] \"นะ...หนักจัง...?!\""
1001220-76 = "เอ๋? หนักขนาดนั้นเลยเหรอคะ?"
1001220-77 = "ฉันว่าฉันเลือกน้ำหนักมาพอดีสำหรับแขนกับขา ไม่ให้ต้องฝืนออกแรงมากเกินไปแล้วแท้ๆ..."
1001220-78 = "[s] \"สายรัดถ่วงน้ำหนักพวกนี้... หนักกี่กิโลกันน่ะ?\""
1001220-79 = "ก็ไม่ได้หนักเท่าไรหรอกค่ะ..."
1001220-80 = "...ข้างละ 5 กิโล รวมกันสองข้างก็ 10 กิโลได้ค่ะ"
1001220-81 = "[s] \"แบบนั้นมันเหมือนถือดัมเบลใหญ่ๆ วิ่งเลยไม่ใช่รึไง?!\""
1001220-82 = "ถือดัมเบลวิ่ง..."
1001220-83 = "ฮุฮุ วิธีนั้นก็น่าสนใจดีเหมือนกันนะคะ"
1001220-84 = "คราวหน้าฉันลองเอาดัมเบลมาถือตอนวิ่งจ้อกกิ้งด้วยดีกว่าค่ะ"
1001220-85 = "[ns5] (ขาทั้งสองข้างหนักอึ้งเหมือนถูกใส่โซ่ตรวน...)\n[ns6] (สึมิเระใส่เจ้านี่วิ่งมาตลอดเลยเหรอเนี่ย?)"
1001220-89 = "เอาละค่ะ เทรนเนอร์ ถ้าจะวิ่งให้ครบรอบเรายังต้องไปอีกไกลพอสมควรเลยค่ะ เพราะงั้นมาฮึดสู้ไปด้วยกันนะคะ!"
1001220-90 = "หนึ่ง สอง! หนึ่ง สอง!"
1001220-99 = "[ns] \"ระ... รอครูด้วย...!\""
1001220-101 = "(จากนั้นคุณครูก็วิ่งจ้อกกิ้งต่อพร้อมกับใส่สายรัดถ่วงน้ำหนักของสึมิเระไปด้วย แต่ว่า...)"
1001220-102 = "(สายรัดถ่วงน้ำหนักมันหนักเกินไป จนคุณครูออกวิ่งต่อไปได้ไม่เท่าไร ก็หมดแรงล้มแผละลงไป...)"

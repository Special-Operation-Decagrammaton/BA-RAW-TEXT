[translation]
1001220-1 = "指導員的極限"
1001220-2 = "夏萊附近的公園"
1001220-3 = "（一大早就做好慢跑準備，在公園等待堇的到來……）"
1001220-10 = "啊，久等了。指導員。"
1001220-11 = "抱歉。準備東西的時間比想像中還要久。"
1001220-12 = "[s]「沒關係，我也剛到。」"
1001220-14 = "[ns]「不過慢跑還需要準備東西嗎？」"
1001220-15 = "當然。"
1001220-16 = "所有的運動都一樣，如果要將運動的效率最大化，就必須做好充分的準備。"
1001220-17 = "從跑步時穿的運動鞋到跑步腰帶……#n即使是看似簡單的裝備，若沒有正確穿戴的話，甚至會有受重傷的風險。"
1001220-18 = "[s] 「這樣啊……」"
1001220-19 = "今天是久違的慢跑，所以我也戴上了新買的裝備。"
1001220-20 = "在新的地方做新的運動，難免有點緊張呢。呵呵。"
1001220-21 = "那麼……先輕鬆地跑一趟看看吧？"
1001220-28 = "（約莫十分鐘後……）"
1001220-36 = "呼，呼……"
1001220-37 = "[s]「……堇，你還好嗎？」"
1001220-38 = "沒問題。現在連1km都不到。"
1001220-39 = "我還可以再跑一會。"
1001220-40 = "[s1]「可是你和平常不同，看起來一下子就累了……」\n[s2]「是不是身體不舒服？」"
1001220-47 = "不……不是的。"
1001220-48 = "我反而覺得狀態比平時更好。"
1001220-49 = "但要說我為什麼一下子就氣喘吁吁的話……"
1001220-54 = "是因為這些沙袋吧……？"
1001220-55 = "[s]「……沙袋？」"
1001220-56 = "是的，我今天出門慢跑時，在手臂和腿上都綁了沙袋。"
1001220-57 = "可能是因為運動負荷比平常重的關係，呼吸變得比較急促。"
1001220-58 = "[s3]「竟然戴著沙袋慢跑，真是了不起……」\n[s3]「平時的運動量還不夠嗎？」"
1001220-61 = "為了持續加強肌力，必須不斷對肌肉增加負擔。"
1001220-62 = "量力而為固然重要，但要是安於現況，將會使成長停滯不前。"
1001220-63 = "認知自己的極限，並為了超越極限而不斷挑戰，才是正確的訓練態度！"
1001220-64 = "[s]「真是了不起的心態……」"
1001220-66 = "[ns]「聽完後，我都想稍微提高一點運動強度了。」"
1001220-67 = "好主意，指導員。"
1001220-68 = "如果你想提高運動強度，戴著這個沙袋運動看看如何？"
1001220-69 = "我帶了兩套，分別穿在手和腳上，可以借你一套。"
1001220-70 = "[s]「那我就……」"
1001220-75 = "[ns]「好，好重……！？」"
1001220-76 = "咦？有很重嗎？"
1001220-77 = "為了避免太過勉強，我設定成四肢可負擔的適當重量……"
1001220-78 = "[s]「這些沙袋……有幾kg啊？」"
1001220-79 = "其實也不是很重……"
1001220-80 = "……一邊也就5kg，加起來約10kg左右吧？"
1001220-81 = "[s]「這和拿著啞鈴跑步沒什麼兩樣吧？」"
1001220-82 = "拿著啞鈴跑步……"
1001220-83 = "呵呵，這個想法挺有趣的呢。"
1001220-84 = "下次拿著啞鈴跑步好像也不錯。"
1001220-85 = "[ns5]（雙腿像是被上了腳鐐一樣沉重……）\n[ns6]（堇一直戴著這種東西跑步嗎？）"
1001220-89 = "來吧，指導員。離跑完全程還有一段距離，再加把勁吧！"
1001220-90 = "一、二！一、二！"
1001220-99 = "[ns]「等……等等我……！」"
1001220-101 = "（之後雖然嘗試繼續戴著堇給的沙袋慢跑……）"
1001220-102 = "（但沙袋實在太重，沒堅持多久就放棄了）"

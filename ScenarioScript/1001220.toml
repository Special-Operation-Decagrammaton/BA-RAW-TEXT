[translation]
1001220-1 = "Trainer's Limit"
1001220-2 = "A park near Schale"
1001220-3 = "Another day, another 6 AM jog with Sumire..."
1001220-10 = "Sorry to keep you waiting, Trainer."
1001220-11 = "Organizing my equipment took way longer than I thought."
1001220-12 = "[s] \"It's okay. I didn't have to wait too long.\""
1001220-14 = "[ns] \"On that note, was that equipment meant for our jog?\""
1001220-15 = "Of course."
1001220-16 = "For any exercise, proper preparation is key."
1001220-17 = "From the treadmill to the asphalt, not having the right kind of gear on you can lead to big injuries!"
1001220-18 = "[s] \"I see...\""
1001220-19 = "It's been a while since I went jogging, so I had to pick up some new equipment."
1001220-20 = "A new workout, in a new place... I think I might have some goosebumps. Heehee."
1001220-21 = "Now then... How about a light run?"
1001220-28 = "About ten minutes later..."
1001220-36 = "*pant* *pant*"
1001220-37 = "[s] \"...Sumire, are you all right?\""
1001220-38 = "I'm fine. We haven't even hit 1 km yet."
1001220-39 = "I can do this all day."
1001220-40 = "[s1] \"You don't look like it.\"\n[s2] \"Are you sure? You look a little winded.\""
1001220-47 = "No... I'm perfectly fine."
1001220-48 = "In fact, I feel better than usual."
1001220-49 = "I know I sound like I'm out of breath..."
1001220-54 = "I probably just brought one too many sandbags."
1001220-55 = "[s] \"...Sandbags?\""
1001220-56 = "Yes, I wrapped some sandbags around my arms and legs when I came out to jog today."
1001220-57 = "Perhaps I tied on a few sandbags too many."
1001220-58 = "[s3] \"Jogging with weights, huh. That's impressive.\"\n[s4] \"Aren't your usual workouts enough?\""
1001220-61 = "I have to use my muscles in new ways if I'm going to keep improving my strength."
1001220-62 = "While it's important not to strain yourself, you won't improve if you settle for doing the same exercises over and over."
1001220-63 = "Reaching your limit, then giving all your might to push past them... That's the real way to train!"
1001220-64 = "[s] \"That's an impressive way to think about it...\""
1001220-66 = "[ns] \"When you put it like that, maybe I should step up my workout as well.\""
1001220-67 = "Good idea, Trainer."
1001220-68 = "If you want to make our jog more intense, how about you grab a few of these sandbags?"
1001220-69 = "I brought two sets for both my arms and legs, so you can go ahead and borrow one."
1001220-70 = "[s] \"Sure, I'll give it a shot.\""
1001220-75 = "[ns] \"Why are they so heavy?!\""
1001220-76 = "Huh? They are?"
1001220-77 = "I calculated exactly the right amount of weight I needed to strengthen my muscles without straining them..."
1001220-78 = "[s] \"How much do these weigh exactly?\""
1001220-79 = "They're not that heavy."
1001220-80 = "Each side weighs 5 kg, so only 10 kg combined?"
1001220-81 = "[s] \"Isn't that basically running with a dumbbell?\""
1001220-82 = "What? No, of course not."
1001220-83 = "Heehee, that'd probably look very silly."
1001220-84 = "Then again...it could be a fun new way to exercise. Maybe next time."
1001220-85 = "[ns5] (It feels like my legs are in shackles.)\n[ns6] (How in the world does Sumire run with these?)"
1001220-89 = "All right, Trainer. We still have a long way to go, so pick up those feet!"
1001220-90 = "One, two! One, two!"
1001220-99 = "[ns] \"Wa-Wait for me!\""
1001220-101 = "I tried to keep jogging with the sandbags Sumire gave me."
1001220-102 = "But they proved to be too much, and my legs gave out shortly after."

[translation]
10035080-1 = "第8話;嫌疑人，審問！"
10035080-2 = "這是怎麼回事……怎麼會有怪物……"
10035080-3 = "這裡應該是安全的吧？"
10035080-4 = "我們還是走吧，鱷魚說不定會跑來這裡。"
10035080-8 = "原本歡樂的水上樂園變得愁雲慘霧了呢。"
10035080-9 = "客人們的表情都不是很好……"
10035080-10 = "甚至有人直接離開了……"
10035080-11 = "畢竟發生了那種事件，這也沒辦法。"
10035080-12 = "在那隻機械鱷魚被捕獲或擊斃之前，這場混亂都不會平息。"
10035080-13 = "那我們是不是也該去幫忙搜索鱷魚呢？"
10035080-14 = "不，解決問題得從根本著手。"
10035080-15 = "我們要逮捕把放鱷魚進來的主謀。"
10035080-16 = "咦！？鱷魚是有人故意放進來的嗎？"
10035080-17 = "那隻鱷魚不是普通的生物，而是鱷魚型的仿生機器人。"
10035080-18 = "既然確定那是人造物……#n從其具攻擊性這點來看，想必是被人有意地放入這個水上樂園。"
10035080-19 = "目的可能是恐怖攻擊或妨礙營業……#n雖然還無法確定犯人真正的意圖，暫時先當作恐怖分子來應對吧。"
10035080-21 = "恐，恐怖分子……！"
10035080-22 = "那，那麼，局長知道犯人可能是誰嗎？"
10035080-23 = "剛才有人看到我們就跑，應該很明顯了吧？"
10035080-24 = "啊，難道是！"
10035080-25 = "[s1]「八成是頭盔團做的……」\n[s2]「八成是良舞他做的……」"
10035080-28 = "頭盔團的幹部，河駒風良舞……！"
10035080-29 = "我知道了！只要他出現在本官面前就立即實施逮捕！"
10035080-30 = "睜大眼睛仔細觀察──"
10035080-34 = "啊？"
10035080-35 = "啊。"
10035080-36 = "[s]（出現的時機也太差了吧……！）"
10035080-37 = "抓住他！"
10035080-38 = "噫！"
10035080-46 = "別想逃！"
10035080-63 = "哎呀！"
10035080-69 = "幸好還是抓到了！"
10035080-70 = "你是逃不掉的，恐怖分子！"
10035080-71 = "誰是恐怖分子啊！"
10035080-72 = "警察怎麼可以這樣冤枉好人！？"
10035080-73 = "還敢說自己無辜！"
10035080-76 = "你的所作所為早就被我們發現了！"
10035080-80 = "放開良舞隊長！"
10035080-81 = "女武神的傢伙，沒事只會找我們麻煩嗎！"
10035080-83 = "找你們麻煩？笑話。"
10035080-84 = "也不想想你們做了什麼好事，沒馬上把你們逮捕歸案就不錯了。"
10035080-86 = "我們什麼都沒做啊！"
10035080-87 = "你們不是一看到我們就逃跑了嗎！"
10035080-88 = "肯定是做了什麼虧心事吧！？"
10035080-89 = "這什麼鬼邏輯啊，白癡女武神麻雀！"
10035080-90 = "[s3]「大家聽我說！」\n[s4]「好了好了，大家冷靜。」"
10035080-93 = "[USERNAME]老師？"
10035080-97 = "[ns]「看來有必要釐清一下狀況。」"
10035080-99 = "[ns]「大家有話慢慢說，OK？」"
10035080-100 = "我明白了。#n桐乃、吹雪，好好抓緊他。"
10035080-106 = "說吧，河駒風良舞。#n為什麼要把機械鱷魚放進水上樂園？"
10035080-107 = "噫噫……"
10035080-108 = "這，這就是傳聞中的公安局狂犬……"
10035080-109 = "回答我的問題。"
10035080-110 = "放，放鱷魚進來是什麼意思！"
10035080-111 = "別裝蒜了。這件事很明顯是你搞出來的！"
10035080-112 = "……？"
10035080-113 = "等等，我是不知道你們誤會了什麼，但真的不是我！"
10035080-114 = "那個恐怖的東西……該怎麼稱呼它才好？#n「金屬武器高速鱷魚」之類的嗎？"
10035080-116 = "（跟局長在奇怪的地方意氣相投呢……）"
10035080-117 = "總之，那東西和我們一點關係都沒有！"
10035080-118 = "你們也快說點什麼啊！"
10035080-119 = "隊長說得沒錯！我們也是來室內避難的！"
10035080-120 = "更何況我們頭盔團，根本就沒有製造那種機器人的預算……"
10035080-122 = "跟，跟你們無關嗎……？"
10035080-123 = "那剛才為什麼看到我們就跑？#n如果沒做虧心事的話，應該沒理由逃跑才對啊？"
10035080-124 = "看到三個女武神的傢伙和[USERNAME]老師坐在那裡，怎麼可能不逃啦！"
10035080-125 = "明明什麼都沒做也一樣？"
10035080-126 = "這對我們來說已經是一種本能了！"
10035080-127 = "看到警察就先逃跑……雙方的思考模式完全不同呢……"
10035080-128 = "[s]「那你們為什麼來水上樂園？」"
10035080-129 = "嗯？為什麼來？"
10035080-130 = "來水上樂園還有玩樂以外的目的嗎？"
10035080-131 = "沒錯！"
10035080-132 = "我們是來這裡治癒因為混亂跟暴力而疲憊的心靈！"
10035080-133 = "看看這個入園手環！我們可是有老老實實買票進來的！"
10035080-134 = "甚至還因為錢不夠，用勞力活補差額呢！"
10035080-135 = "因為這些傢伙沒有被「頭盔團聯歡會」邀請，我才特地帶他們來的……"
10035080-136 = "我們也有在夏天玩水的權利吧！"
10035080-138 = "我們也不是每天都在為非作歹的啊！"
10035080-139 = "[s5]（看來真的冤枉他們了……）\n[s6]（有點不好意思……）"
10035080-140 = "對，對不起……我還以為肯定是你們做的……"
10035080-141 = "對，對不起……我還以為肯定是你們做的……"
10035080-142 = "本官又犯了這種失誤……"
10035080-143 = "要是你們平時有好好做人的話，就不會發生這種事了。"
10035080-144 = "你說什麼！"
10035080-148 = "[ns]「等等。」"
10035080-150 = "[ns]「所以那隻機械鱷魚到底是誰放進來的？」"
10035080-160 = "哇啊啊！鱷魚進來了！"
10035080-161 = "大家快逃啊！"
10035080-163 = "哇啊啊！各位！撤退！快撤退！"
10035080-164 = "這下有點不妙～"
10035080-165 = "難得的休假全泡湯了！"
10035080-167 = "全員準備戰鬥！立刻制伏鱷魚！"

[translation]
10035080-1 = "ตอนที่ 8;สอบสวนผู้ต้องสงสัยค่ะ!"
10035080-2 = "นี่มันเรื่องอะไรกัน... สัตว์ประหลาดในสวนน้ำงั้นเหรอ..."
10035080-3 = "ที่นี่คงจะปลอดภัยใช่มั้ย?"
10035080-4 = "พวกเรากลับกันเถอะ จระเข้อาจเข้ามาที่นี่ก็ได้นี่นา"
10035080-8 = "สวนน้ำสนุกๆ กลายเป็นที่ประสบภัยไปซะแล้ว"
10035080-9 = "สีหน้าของทุกคนไม่ค่อยสู้ดีกันเลยค่ะ..."
10035080-10 = "มีคนที่เดินกลับไปกันแล้วด้วย..."
10035080-11 = "ก็มันมีเรื่องแบบนี้ทั้งที คนจะกลับกันก็ไม่ใช่เรื่องแปลก"
10035080-12 = "ตราบใดที่ยังจับเป็นหรือจับตายจระเข้จักรกลไม่ได้ ความวุ่นวายก็คงไม่หายไปหรอก"
10035080-13 = "งั้นพวกเราก็ควรไปช่วยค้นหาจระเข้อีกแรงไม่ใช่เหรอคะ?"
10035080-14 = "ไม่หรอก ถ้าจะคลี่คลายปัญหา เราย่อมต้องหาต้นตอของปัญหา"
10035080-15 = "พวกเราจะจับคนร้ายที่ปล่อยจระเข้เข้ามาในสวนน้ำแห่งนี้กัน"
10035080-16 = "คะ?! จะบอกว่ามีคนตั้งใจปล่อยจระเข้เข้ามางั้นเหรอคะ?"
10035080-17 = "จระเข้ที่เข้ามาในสวนน้ำไม่ใช่สัตว์ทั่วไป แต่เป็นหุ่นยนต์ที่สร้างเลียนแบบมาจากจระเข้"
10035080-18 = "ฉันมั่นใจว่ามันเป็นสิ่งประดิษฐ์ และหากดูจากอุปนิสัยก้าวร้าวกับอาวุธครบมือนั่นแล้ว ฉันว่ามีคนจงใจ#nปล่อยมันเข้ามาในสวนน้ำ"
10035080-19 = "ฉันไม่มั่นใจว่าเป้าหมายที่แท้จริงคืออะไร เพราะอาจเป็นการก่อการร้ายโดยเจตนาหรือการขัดขวาง#nธุรกิจก็ได้... แต่เราต้องรับมือกับคนนั้นในฐานะผู้ก่อการร้าย"
10035080-21 = "ผะ... ผู้ก่อการร้าย...!"
10035080-22 = "ถะ... ถ้างั้นหัวหน้ากรมฯ รู้แล้วเหรอคะว่าใครคือคนร้าย?"
10035080-23 = "มันก็เห็นชัดอยู่แล้วนี่ เมื่อกี้ที่ยัยนั่นเห็นพวกเราแล้วรีบหนีไปน่ะ"
10035080-24 = "อ๊ะ อย่าบอกนะว่า!"
10035080-25 = "[s1] \"เป็นฝีมือของแก๊งหมวกกันน็อกงั้นเหรอ...\"\n[s2] \"เป็นฝีมือของราบุงั้นเหรอ...\""
10035080-28 = "หัวหน้าแก๊งหมวกกันน็อก! โคะมาคาเสะ ราบุ...!"
10035080-29 = "เข้าใจแล้วค่ะ! ถ้าฉันเห็นราบุ ฉันจะเข้าจับกุมทันทีค่ะ!"
10035080-30 = "ฉันจะสอดส่องให้ทั่วเลย..."
10035080-34 = "อ๊ะ?"
10035080-35 = "อ่า"
10035080-36 = "[s] (จังหวะเหมาะเหม็งอะไรขนาดนี้เนี่ย...!)"
10035080-37 = "จับตัวไว้!"
10035080-38 = "เฮือก!"
10035080-46 = "ฉันไม่ปล่อยไปแน่ค่ะ!"
10035080-63 = "อ๊าา!"
10035080-69 = "แต่ยังไงก็จับตัวได้แล้วค่ะ!"
10035080-70 = "หนีไม่ได้แล้วละค่ะ ผู้ก่อการร้าย!"
10035080-71 = "เรียกใครว่าผู้ก่อการร้ายน่ะ!"
10035080-72 = "เป็นตำรวจแล้วจับผู้บริสุทธิ์ได้ด้วยเหรอ?!"
10035080-73 = "บริสุทธิ์อะไรล่ะ!"
10035080-76 = "พวกเรารู้นะว่าเธอก่อเรื่องอะไรไว้เมื่อตอนฤดูร้อนน่ะ!"
10035080-80 = "ปล่อยหัวหน้าราบุนะ!"
10035080-81 = "ยัยพวกวัลคิรี่ ไม่มีอะไรทำก็เลยมาหาเรื่องพวกเราเรอะ!"
10035080-83 = "หาเรื่องงั้นเหรอ พูดอะไรน่าขำ"
10035080-84 = "พอมานึกถึงสิ่งที่พวกเธอก่อเรื่องเอาไว้แล้ว ต่อให้จับกุมตัวไปเสียแต่ตอนนี้เลยมันยังน้อยไปด้วยซ้ำ"
10035080-86 = "พวกเราไปทำอะไรให้ไม่ทราบ!"
10035080-87 = "คุณเห็นพวกเราแล้วก็เผ่นกันเลยไม่ใช่หรือไงคะ!"
10035080-88 = "คงเพราะรู้สึกผิดอยู่ในใจสินะคะ?!"
10035080-89 = "นั่นมันตรรกะบ้าบออะไร! ยัยพวกวัลคิรี่หัวทึ่ม!"
10035080-90 = "[s3] \"ทุกคนฟังทางนี้!\"\n[s4] \"เอาละๆ ทุกคนใจเย็นๆ ก่อน\""
10035080-93 = "ครู [USERNAME]?"
10035080-97 = "[ns] \"ครูว่าเราต้องสรุปสถานการณ์กันสักหน่อย\""
10035080-99 = "[ns] \"ให้พูดทีละคน โอเคมั้ย?\""
10035080-100 = "เข้าใจแล้วค่ะ คิริโนะ ฟุบุกิ จับยัยนี่ไว้ให้ดีละ"
10035080-106 = "ตอบมาตามตรงนะ โคะมาคาเสะ ราบุ ทำไมเธอถึงปล่อยจระเข้จักรกลเข้ามาในสวนน้ำ?"
10035080-107 = "ฮะ... เฮือก..."
10035080-108 = "นะ... นี่สินะหมาบ้าแห่งกรมความมั่นคงสาธารณะที่เขาเล่าลือกัน"
10035080-109 = "ตอบมา"
10035080-110 = "ปะ... ปล่อยจระเข้เหรอ หมายความว่ายังไง!"
10035080-111 = "อย่ามาทำเป็นไขสือ มันชัดเจนอยู่แล้วว่าเธออยู่เบื้องหลังของเหตุการณ์นี้!"
10035080-112 = "...?"
10035080-113 = "เดี๋ยวสิ เข้าใจผิดแล้วหรือเปล่า ฉันไม่ได้ทำจริงๆ นะ!"
10035080-114 = "เจ้าหุ่นยนต์น่ากลัวนั่น... ต้องเรียกว่าอะไรนะ... <เมทัล เวพเพิน สปีด ครอคโคไดล์> หรือเปล่า? "
10035080-116 = "(มีมุมที่พิลึกๆ เหมือนกับหัวหน้ากรมฯ สินะ...)"
10035080-117 = "จะยังไงก็เถอะ แต่พวกเราไม่ได้เกี่ยวข้องกับเรื่องนั้นนะ!"
10035080-118 = "พวกเธอก็พูดอะไรหน่อยสิ!"
10035080-119 = "หัวหน้าพูดถูก! ตอนนี้พวกเราก็หลบภัยเข้ามาในอาคารเหมือนกันนะ!"
10035080-120 = "อีกอย่าง แก๊งหมวกกันน็อกอย่างเราไม่มีเงินไปสร้างหุ่นยนต์อะไรแบบนั้นหรอก..."
10035080-122 = "มะ... ไม่มีส่วนเกี่ยวข้องงั้นเหรอ...?"
10035080-123 = "ถ้างั้นตอนเจอกันเมื่อกี้ทำไมถึงหนีล่ะ? ถ้าไม่มีความผิดอะไร ก็ไม่เห็นต้องหนีเลย?"
10035080-124 = "ก็มีครู [USERNAME] กับพวกวัลคิรี่นั่งกันอยู่ตั้ง 3 คน จะไม่ให้หนีได้ยังไงล่ะ!"
10035080-125 = "ต่อให้ไม่มีความผิดน่ะเหรอคะ?"
10035080-126 = "มันเป็นสัญชาตญาณน่ะ!"
10035080-127 = "ถ้าเห็นตำรวจก็ให้วิ่งหนีไว้ก่อนงั้นเหรอ... นี่สินะตรรกะของเด็กเกเร..."
10035080-128 = "[s] \"แล้วมาที่สวนน้ำกันทำไมน่ะ?\""
10035080-129 = "ว่าไงนะ? มาทำไมงั้นเหรอ?"
10035080-130 = "ก็มาเล่นน้ำไง คนที่มาที่นี่มีจุดประสงค์อื่นด้วยเหรอ?"
10035080-131 = "ใช่แล้ว!"
10035080-132 = "พวกเรามาฮีลใจที่เหน็ดเหนื่อยจากปัญหาและความรุนแรงต่างหาก!"
10035080-133 = "ดูข้อมือนี่สิ พวกเราจ่ายเงินเข้ามาอย่างถูกต้องนะ!"
10035080-134 = "ถึงเงินจะไม่พอ แต่เราก็ไปทำงานเพื่อแลกค่าเข้ามาด้วย!"
10035080-135 = "ฉันอยากพาพวกนี้มาปลอบใจที่ไม่ถูกเชิญเข้าสหพันธ์แก๊งหมวกกันน็อก..."
10035080-136 = "ถึงเราจะเกเรกันไปบ้าง แต่ก็ใช่ว่าคนอย่างพวกเราจะมาเล่นน้ำตอนหน้าร้อนไม่ได้เลยนี่นา!"
10035080-138 = "พวกเราไม่ได้ก่อแต่ปัญหาไปวันๆ หรอกนะ!"
10035080-139 = "[s5] (ทำไมเข้าบทน่าสงสารล่ะ...)\n[s6] (รู้สึกผิดขึ้นมาเลยแฮะ...)"
10035080-140 = "ขะ... ขอโทษนะ... ฉันคิดไปเองว่าต้องเป็นฝีมือของพวกเธอน่ะ..."
10035080-141 = "ขะ... ขอโทษนะ... ฉันคิดไปเองว่าต้องเป็นฝีมือของพวกเธอน่ะ..."
10035080-142 = "ฉันทำพลาดอีกแล้วเหรอเนี่ย..."
10035080-143 = "ถ้าปกติเป็นเด็กดีกันก็คงไม่เกิดเรื่องเข้าใจผิดแบบนี้หรอก"
10035080-144 = "พูดอะไรของเธอน่ะ!"
10035080-148 = "[ns] \"เดี๋ยวก่อน\""
10035080-150 = "[ns] \"ถ้างั้นใครเป็นคนปล่อยจระเข้จักรกลเข้ามาล่ะ?\""
10035080-160 = "ว้ายยย! จระเข้เข้ามาในนี้แล้ว!"
10035080-161 = "หนีเร็วเข้าทุกคน!"
10035080-163 = "ว้ายยย! ทุกคน! อพยพ! อพยพไปจากที่นี่ค่ะ!"
10035080-164 = "น่ากลัวอยู่นะนั่น~"
10035080-165 = "วันพักร้อนของเราพังไม่เป็นท่าเลย!"
10035080-167 = "ทุกคนเตรียมตัวต่อสู้! เราจะจับจระเข้ให้ได้!"

[translation]
10035080-1 = "Episode 8;Interrogating the Suspect!"
10035080-2 = "What's going on? A monster, of all things?!"
10035080-3 = "It should be safe here, right?"
10035080-4 = "I think we ought to go. It might come this way."
10035080-8 = "And to think, they all came here to have fun."
10035080-9 = "Yeah, now they're miserable."
10035080-10 = "A lot of them are leaving."
10035080-11 = "I can't exactly blame them."
10035080-12 = "And this won't get any better until the Mechagator is either captured or eliminated."
10035080-13 = "Shouldn't we help find it, then?"
10035080-14 = "No, there's a deeper root to the issue."
10035080-15 = "We need to catch the culprit who brought it here."
10035080-16 = "Brought it here? You think somebody did that on purpose?"
10035080-17 = "Consider what we know. The creature isn't a real animal, it's a robot."
10035080-18 = "Obviously man-made, and designed to be aggressive. Placing it here was almost certainly intentional."
10035080-19 = "What's not certain yet is the motive. It could be anything from industrial sabotage to outright terrorism...and I think we need to treat it as the latter."
10035080-21 = "T-Terrorism?!"
10035080-22 = "D-Do you have any idea who's behind it, Director?"
10035080-23 = "Pretty obvious, don't you think? Who ran off when she saw us?"
10035080-24 = "Oh, you think it's..."
10035080-25 = "[s1] \"Probably the Helmet Gang...\"\n[s2] \"Probably Rabu.\""
10035080-28 = "Komakaze Rabu, Helmet Gang officer. Right."
10035080-29 = "Got it! I'll arrest her on sight."
10035080-30 = "I just have to keep my eyes peeled—"
10035080-34 = "Ah?"
10035080-35 = "Um..."
10035080-36 = "[s] \"(She is the QUEEN of bad timing.)\""
10035080-37 = "Get her!"
10035080-38 = "Eek!"
10035080-46 = "I won't let her get away!"
10035080-63 = "Ahh!"
10035080-69 = "I got her!"
10035080-70 = "There's no way out, terrorist!"
10035080-71 = "Who are you calling a terrorist?!"
10035080-72 = "You call yourselves police? Just arresting innocent people?!"
10035080-73 = "\"Innocent\"?!"
10035080-76 = "We know what you did this summer!"
10035080-80 = "Hey! Release Captain Rabu!"
10035080-81 = "Do you Valkyries go after us for fun, or what?!"
10035080-83 = "You think we're being unfair to you?"
10035080-84 = "I'd be well within my rights to arrest the lot of you!"
10035080-86 = "For WHAT?!"
10035080-87 = "You ran away when you saw us!"
10035080-88 = "Clearly, you've got something to hide!"
10035080-89 = "What kind of logic is that, you bunch of bird-brains?!"
10035080-90 = "[s3] \"Everyone, please!\"\n[s4]\"Take a breath, and let's talk.\""
10035080-93 = "[USERNAME] Sensei?"
10035080-97 = "[ns] \"Clearly, we need to sort this out.\""
10035080-99 = "[ns] \"Let's speak one at a time.\""
10035080-100 = "Got it. Kirino, Fubuki, keep a tight grip on her."
10035080-106 = "Now tell me, Komakaze Rabu. Why'd you send the Mechagator?"
10035080-107 = "Eeek!!"
10035080-108 = "You must be the \"Feral Hound\" I've been hearing about..."
10035080-109 = "Answer me."
10035080-110 = "I don't even know what a Mechagator is."
10035080-111 = "Stop playing dumb. It's obvious you're behind it."
10035080-112 = "Um..."
10035080-113 = "Listen, there's been some kind of misunderstanding here. You've got the wrong girl."
10035080-114 = "Now if you're talking about that...I don't know, Cybernetic Rapid Ordnance Carrier or whatever you want to call it..."
10035080-116 = "(Huh. She and the director think alike.)"
10035080-117 = "...we've got nothing to do with that!"
10035080-118 = "And you guys can chime in anytime here!"
10035080-119 = "The captain's telling the truth! We're sheltering just like everybody else!"
10035080-120 = "You think the Helmet Gang has the budget to build that kind of robot?"
10035080-122 = "You're telling me you had nothing to do with it...?"
10035080-123 = "Then why did you run off when we crossed paths earlier? If you weren't guilty of anything, you wouldn't have a reason to run, would you?"
10035080-124 = "[USERNAME] Sensei and you three Valkyries were all right there. Of course I ran!"
10035080-125 = "Even though you were \"innocent\"?"
10035080-126 = "Call it instinct."
10035080-127 = "You see police, and your instinct is to run. Innnteresting."
10035080-128 = "[s] \"So what are you doing here at the water park?\""
10035080-129 = "What? What do you mean, \"What am I doing here?\""
10035080-130 = "Do we need a REASON to come to a water park, other than to have fun?"
10035080-131 = "Right?"
10035080-132 = "We needed a break from all that trouble and violence!"
10035080-133 = "Look at our entry wristbands! We're allowed to be here, just like any other guest!"
10035080-134 = "In fact, we were short on money, so we had to talk them into letting us clean the pools just to get in."
10035080-135 = "Not everyone got invited to the \"Helmet Gangster Grand Alliance\" meet-up, so I brought them here to make up for it."
10035080-136 = "We should be allowed to have some summer fun too!"
10035080-138 = "It's not like we're ALWAYS up to no good!"
10035080-139 = "[s5]\"(They seem genuinely upset...)\"\n[s6]\"(I'm starting to feel kind of bad...)\""
10035080-140 = "S-Sorry... I automatically assumed it was you..."
10035080-141 = "S-Sorry... I automatically assumed it was you..."
10035080-142 = "The director made another mistake..."
10035080-143 = "To be fair, though, if you made better life choices, you wouldn't get into these situations."
10035080-144 = "Hey, what's your problem?!"
10035080-148 = "[ns] \"Wait a minute.\""
10035080-150 = "[ns] \"If she didn't release the Mechagator, who did?\""
10035080-160 = "Ahhh! It got inside!"
10035080-161 = "Everybody, run!"
10035080-163 = "Ahhh! Everyone, evacuate! Please evacuate!"
10035080-164 = "This is kinda scary..."
10035080-165 = "So much for our break."
10035080-167 = "All of you, prepare for battle! We're going to take this creature down!"

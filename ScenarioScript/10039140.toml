[translation]
10039140-1 = "ย้อนวันวาน;เราก็เป็นนักเรียนเหมือนกันนะ!"
10039140-4 = "(เทศกาลกำลังดำเนินไปอย่างคึกคัก แต่คุณครูสังเกตว่าถนนเส้นหนึ่งไม่มีผู้คนเลย)"
10039140-5 = "[ns] \"ตรงนั้นน่าจะเป็นศูนย์ศิลปะนี่นา...\""
10039140-12 = "ดะ... ได้ยินว่าทางโน้นจะมีนิทรรศการ ก็เลยว่าจะไปดูสักหน่อยแท้ๆ"
10039140-13 = "แต่แก๊งหมวกกันน็อกก็มายึดถนนซะงั้น..."
10039140-14 = "ให้พวกนักเลงมายึดพื้นที่กลางโรงเรียนได้ยังไง! กฎระเบียบของทรีนิตี้มันหายไปไหนหมดแล้ว?"
10039140-20 = "[ns] \"...\""
10039140-22 = "[ns] (เดินไปตามเสียง)"
10039140-29 = "หืม? มองอะไร? อยากเจอดีเหรอ?"
10039140-34 = "เฮือก! ไปสบตาเข้าให้แล้ว รีบๆ ไปกันเถอะ"
10039140-39 = "เฮอะ เพิ่งเคยเห็นแก๊งหมวกกันน็อกเป็นครั้งแรกหรือไง?"
10039140-41 = "หัวหน้า เมื่อกี้นักเรียนพวกนั้นจ้องพวกเราเหมือนดูลิงในสวนสัตว์เลยค่ะ"
10039140-42 = "พวกนั้นทำท่าทีแปลกๆ ด้วย เราก็อยู่ของเราเฉยๆ เองนะ?"
10039140-43 = "สงสัยจะกลัวเพราะเพิ่งเคยเห็นอันธพาลที่น่าเกรงขามอย่างพวกเราเป็นครั้งแรกน่ะ! ฮะฮ่า! เด็กผู้หญิงโรงเรียนนี้อ่อนแอชะมัด!"
10039140-44 = "[s] \"ไม่ใช่เพราะพวกเธอมายึดถนนจนเดินผ่านไม่ได้หรอกเหรอ...?\""
10039140-52 = "หืม? ว่าไงนะ?"
10039140-56 = "เอ๋...?"
10039140-58 = "คะ... ครูจากชาเล่ต์?!"
10039140-61 = "เฮือก! จะ... จริงด้วย!"
10039140-62 = "พะ... พวกเราไม่ได้ทำอะไรเลยนะ!! เราแค่ยืนกันเฉยๆ เอง!!"
10039140-63 = "[s] \"ใจเย็นๆ ก่อน ครูแค่จะมาชี้แนะนักเรียนตามหน้าที่น่ะ\""
10039140-65 = "ชี้แนะเหรอ...? "
10039140-66 = "พะ... พวกเราได้ชื่อว่าเป็นเด็กที่ชอบก่อปัญหาก็จริง แต่วันนี้พวกเราไม่ได้ก่อเรื่องไม่ดีเลยนะ!!"
10039140-67 = "[s1] \"แต่ถ้ามาขวางถนนแบบนี้ คนอื่นก็จะไม่กล้าสัญจรนะ\"\n[s2] \"ก็เพราะมายึดถนนแบบนี้ ก็เลยโดนคนอื่นมองไง\""
10039140-70 = "หืม...? งะ... งั้นเหรอ...?"
10039140-72 = "แต่มันก็ไม่มีที่ไหนให้เราไปนั่งได้เลยนี่นา?"
10039140-73 = "ตรงสนามกีฬาหรือบันไดก็คนเยอะ เห็นแบบนี้พวกเราก็กลัวคนเหมือนกันนะ!"
10039140-75 = "อุตส่าห์มาเที่ยวงานเทศกาลทั้งที แต่ทำแบบนี้ถือว่าไม่ต้อนรับแขกไปหน่อยหรือเปล่า? ชิ!"
10039140-76 = "[s] \"ทุกคนมาเที่ยวงานทรีนิตี้คาร์นิวัลกันหรอกเหรอ?\""
10039140-80 = "ก็... ประมาณนั้นแหละ"
10039140-82 = "จะปฏิเสธก็คงไม่ได้เนอะ...?"
10039140-83 = "แต่จะเรียกว่ามาเที่ยวหรือมาสำรวจดีนะ..."
10039140-85 = "โรงเรียนขนาดใหญ่อย่างทรีนิตี้จัดงานเทศกาลทั้งที พวกเราก็เลยมาดูว่างานจะยิ่งใหญ่สักแค่ไหนน่ะ! ฮ่าฮ่า!!"
10039140-86 = "อ่า... แต่พอได้มาเห็นกับตา มันก็ยิ่งใหญ่สมคำร่ำลืออยู่นะ..."
10039140-90 = "ระ... เรื่องนั้นมันก็จริงอยู่หรอก..."
10039140-91 = "แต่พอไม่มีเงิน พวกเราก็ได้แต่ยืนชะเง้อมองอยู่อย่างนี้ละ"
10039140-93 = "อาหารที่ขายในแผงขายของก็ดูน่าอร่อยไปหมดเลยด้วย..."
10039140-100 = "..."
10039140-101 = "ระ... เรื่องท้องร้องมันควบคุมกันไม่ได้นี่นา!"
10039140-102 = "ชะ... ใช่! มันคือเสียงคุกคามของแก๊งหมวกกันน็อกที่ส่งตรงมาจากกระเพาะน่ะ...!"
10039140-103 = "เป็นยังไงล่ะ? น่ากลัวใช่มั้ยล่ะครู?! ฮะฮ่า...!"
10039140-107 = "[ns3] \"ไปเดินเที่ยวงานด้วยกันมั้ยล่ะ?\"\n[ns4] \"ไปสำรวจงานเทศกาลกับครูมั้ยล่ะ?\""
10039140-115 = "วะ... ว่าไงนะ?"
10039140-116 = "[s5] \"ทาโกะยากิที่ขายตรงนั้นน่าอร่อยนะ\"\n[s6] \"ไปกินทาโกะยากิตรงนั้นเป็นเพื่อนครูหน่อยสิ\""
10039140-119 = "..."
10039140-121 = "หะ... หัวหน้า... นี่มันโอกาสดีเลยนะคะ..."
10039140-122 = "ครูจากชาเล่ต์อุตส่าห์เอ่ยปากชวนแล้ว พวกเราก็ควรจะ..."
10039140-124 = "งะ... งั้นเหรอ...?"
10039140-125 = "ที่ผ่านมาเราก็เห็นครูไปเที่ยวไหนต่อไหนกับนักเรียนคนอื่น แล้วก็ได้กินอะไรอร่อยๆ ด้วยกันด้วย..."
10039140-126 = "พะ... พวกเราก็อยากมีโมเมนต์แบบนั้นเหมือนกันนะ..."
10039140-131 = "นะ... หนวกหูน่า! ฉันจะเป็นคนตัดสินใจเอง...!!"
10039140-136 = "[ns7] \"ว้าว ยากิโซบะตรงนั้นก็น่าอร่อยเหมือนกัน...\"\n[ns8] \"เกมยิงปืนกับตกลูกโป่งน้ำก็น่าสนุกแฮะ...!\""
10039140-141 = "อะ... อึกก..."
10039140-144 = "หัวหน้า...!!"
10039140-150 = "ฮุฮุฮุ... นี่ครู"
10039140-151 = "ถ้าอยากสนุกกับงานเทศกาลถึงขนาดนั้น สงสัยพวกเราก็ต้องช่วยอีกแรงแล้วละ"
10039140-152 = "[s] \"อื้อ ไปด้วยกันเถอะ\""
10039140-157 = "โอ้วววว!! นี่ละหัวหน้าของเรา!!"
10039140-158 = "ไม่เคยทำให้ผิดหวังเลย!!"
10039140-159 = "เย้! ในที่สุดพวกเราก็จะได้เที่ยวกับครูบ้างแล้ว...!!"
10039140-161 = "ฮุ ฮุฮุฮุ... ฮุฮุ!"
10039140-163 = "(แล้วคุณครูกับนักเรียนแก๊งหมวกกันน็อกก็ไปเที่ยวงานเทศกาลด้วยกัน)"
10039140-172 = "อ๊ะ ระ... ร้อนจัง!! ฮู่ว! ฮู่ว!"
10039140-173 = "อึก... ไม่รู้มาก่อนเลยว่าทาโกะยากิทำเสร็จใหม่ๆ มันจะร้อนแบบนี้...!!"
10039140-174 = "ที่ผ่านมาเรากินแต่ของเย็นๆ นี่นา ถ้ารู้ก็แปลกแล้ว!"
10039140-182 = "อ๊ากก! ระ... ร้อน!! ฮึบ! ฮู่ว! ฮู่ววว!!"
10039140-183 = "[s9] \"ค่อยๆ กินก็ได้...!\"\n[s10] \"เดี๋ยวครูซื้ออย่างอื่นให้ด้วย!!\""
10039140-195 = "อ๊าา~!! น่าเสียดาย!! ถ้ายิงถูกอีกนัดเดียวนะ!!"
10039140-196 = "ฮึ่ยยย! เกือบจะได้ตุ๊กตานุ่มนิ่มตัวใหญ่มาแล้วเชียว...!!"
10039140-197 = "ยิงหมดแล้วสินะ... ถ้าจะเล่นต่อก็ต้องใช้เงินอีก..."
10039140-201 = "[ns] \"เล่นอีกรอบมั้ย?\""
10039140-203 = "อะ... อึก..."
10039140-204 = "ระ... รบกวนด้วยนะ... คุณ... "
10039140-205 = "ครู..."
10039140-206 = "[s] (ยื่นเงินให้)"
10039140-214 = "โอ้วว!! สุดยอดเลย หัวหน้า! คุณครู!"
10039140-215 = "โดนแล้ว ยิงโดนแล้ว! หัวหน้าได้ตุ๊กตาแล้ว!!"
10039140-217 = "เป็นยังไงล่ะทุกคน!! นี่ละโคะมาคาเสะ ราบุ หัวหน้าแก๊งหมวกกันน็อกป๋อมแป๋ม! ฉันก็ไม่ใช่เล่นๆ นะ~!! วะฮ่าฮ่า!!"
10039140-218 = "เอ้า! มาไฮไฟว์กันหน่อย!! คุณครู!!"
10039140-226 = "ฮือ... โดนใจจริงๆ..."
10039140-227 = "ฉันก็น้ำตาไหลเหมือนกัน ละครเวทีมันยอดเยี่ยมอย่างนี้สินะ!"
10039140-228 = "ฉากเจ้าหญิงอัมพาตตอนท้ายน่าประทับใจมากเลยละ..."
10039140-230 = "ยัยพวกนี้นี่! ถ้าอารมณ์อ่อนไหวแบบนี้ จะเรียกตัวเองว่าเป็นแก๊งหมวกกันน็อกได้ยังไง!"
10039140-231 = "ฉันเองก็เพิ่งเคยดูละครเวทีเป็นครั้งแรก แต่ฉันก็ไม่บ่อน้ำตาแตกแบบพวกเธอหรอกนะ!"
10039140-233 = "แต่หัวหน้าตาแดงอยู่นะคะ..."
10039140-234 = "เหมือนมาสคาร่าจะเลอะด้วยนะคะ?"
10039140-239 = "งะ... เงียบไปเลยนะ!! ฉันแค่คันตา ก็เลยเผลอขยี้ตาไปต่างหากเล่า...!!"
10039140-243 = "[ns11] \"แก๊งหมวกกันน็อกก็เป็นนักเรียนเหมือนกันนะเนี่ย\"\n[ns12] \"ทุกคนก็เป็นนักเรียนเหมือนคนอื่นเลยนะ\""
10039140-250 = "..."
10039140-251 = "มันก็... จริงอย่างที่ว่าหรอกนะ..."
10039140-253 = "แต่พวกเราก็เป็นนักเรียนนักเลงที่น่ากลัวนะ เป็นเด็กที่ชอบก่อปัญหาน่ะ"
10039140-254 = "[s] \"แต่วันนี้จะเป็นนักเรียนธรรมดาก็ไม่มีใครว่านะ\""
10039140-258 = "[ns] \"เพราะวันนี้เป็นวันที่ครูธรรมดาๆ ได้อยู่กับนักเรียนธรรมดาๆ น่ะ\""
10039140-261 = "..."
10039140-264 = "..."
10039140-266 = "แต่ก็นะ..."
10039140-267 = "ตอนจะมาเที่ยวงานนี้ พวกฉันก็ไม่ได้คิดจะก่อเรื่องอะไรตั้งแต่แรกอยู่แล้ว..."
10039140-268 = "และการได้เที่ยวในงานกับคุณครูแบบนี้ก็เป็นประสบการณ์ที่น่าทึ่งด้วย..."
10039140-273 = "ถ้างั้น... คุณครู"

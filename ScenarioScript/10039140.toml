[translation]
10039140-1 = "Afterword;We're Students Too!"
10039140-4 = "During the festival, a noticeably large crowd gathered on one side of the street."
10039140-5 = "[ns] \"That's on the way to the Art Center...\""
10039140-12 = "Ugh... I was going to check out an exhibit there!"
10039140-13 = "And here's the Helmet Gang, doing what they do and getting in the way..."
10039140-14 = "In the middle of campus, though! Shouldn't SOMEONE at Trinity be stopping this right now?"
10039140-20 = "[ns] \"...\""
10039140-22 = "[ns] Go see what they're talking about."
10039140-29 = "What? What are you looking at? Mind your own business!"
10039140-34 = "Eek! We made eye contact. Let's get out of here."
10039140-39 = "Sheesh, you've never seen the Helmet Gang before, or what?"
10039140-41 = "They're staring like we're monkeys at the zoo, Captain."
10039140-42 = "Which is weird. We're just sitting still."
10039140-43 = "They must all be scared of us. Haha! Of course, what do you expect from a school full of girly-girls?"
10039140-44 = "[s] \"Maybe they're just mad you're blocking the road.\""
10039140-52 = "Huh? What did you say?"
10039140-56 = "...Um..."
10039140-58 = "Sch-Schale's Sensei?!"
10039140-61 = "Ugh! It IS the Sensei!"
10039140-62 = "W-We're not doing anything wrong, we're just standing here!"
10039140-63 = "[s] \"Calm down. I'm just here for my students, as a teacher.\""
10039140-65 = "Teacher...? "
10039140-66 = "H-Hey, we haven't caused any trouble today!"
10039140-67 = "[s1] \"If you block the road like that, other students feel threatened.\"\n[s2] \"People are staring at you because they're nervous.\""
10039140-70 = "Hmm...? I-Is that right...?"
10039140-72 = "But there wasn't really a place to sit..."
10039140-73 = "There's too many people in the playground, or on the stairs!"
10039140-75 = "We just came to see the festival. What's the problem?"
10039140-76 = "[s] \"You're all here for the Trinity Carnival?\""
10039140-80 = "...Pretty much."
10039140-82 = "Yeah, kind of..."
10039140-83 = "You could call it sightseeing, or you could call it recon..."
10039140-85 = "But yeah, we wanted to see what kind of festival a big school like this could pull off! Haha!"
10039140-86 = "It is pretty impressive to see."
10039140-90 = "It is. Anyway..."
10039140-91 = "...we don't have any money or anything, so we just wandered around and looked."
10039140-93 = "All the food at those street vendor stalls looks delicious, but..."
10039140-100 = "..."
10039140-101 = "Th-That's just a biological reaction. Nothing we can do about it!"
10039140-102 = "Right? It's our internal organs talking, not us!"
10039140-103 = "Kind of scary if you think about it, huh, Sensei?! Haha...!"
10039140-107 = "[ns3] \"Hey, if it's okay with you...\"\n[ns4] \"Would you like to explore the festival with me?\""
10039140-115 = "Are you serious?"
10039140-116 = "[s5] \"That takoyaki stand over there looks particularly good.\"\n[s6] \"I don't have the courage to eat those things alone. Want to go with me?\""
10039140-119 = "..."
10039140-121 = "C-Captain, this could be an opportunity..."
10039140-122 = "Schale's Sensei is offering. Maybe we should take it."
10039140-124 = "Sh-Should we...?"
10039140-125 = "I've heard that other students go out with their teachers to have fun and eat nice food..."
10039140-126 = "M-Maybe we should experience that too..."
10039140-131 = "Sh-Shut up! I'll make the call here!"
10039140-136 = "[ns7] \"Ah, that yakisoba looks good too...\"\n[ns8] \"The shooting range and the balloon fishing also look like fun...!\""
10039140-141 = "Ugh..."
10039140-144 = "Captain?"
10039140-150 = "Heh, heehee... Well, Sensei..."
10039140-151 = "If you really want to enjoy the festival that much, I guess there's no reason we can't hang out with you."
10039140-152 = "[s] \"Okay, let's go together.\""
10039140-157 = "All right! Way to go, Captain!"
10039140-158 = "I knew you'd come through!"
10039140-159 = "And we finally get to hang out with a teacher, too!"
10039140-161 = "Heeheehee!"
10039140-163 = "So I joined the Helmet Gang students, and we started exploring the festival together."
10039140-172 = "Ack! It's so hot!"
10039140-173 = "I didn't know fresh takoyaki could BE this hot...!"
10039140-174 = "Of course you didn't. WE only eat cold ones!"
10039140-182 = "Kyaah! Hot, so hot!! Huh! Hup!"
10039140-183 = "[s9] \"You can take your time eating it...\"\n[s10] \"I can get you something else, if you like.\""
10039140-195 = "Aww, dang it! Missed it by one!"
10039140-196 = "Ugh! I was gonna win that big, fluffy doll, half the size of a person!"
10039140-197 = "Yeah, but now we're out of chances. We'd need more credits if we want to try again..."
10039140-201 = "[ns] \"Do you want to try one more time?\""
10039140-203 = "Uh... Err..."
10039140-204 = "...Y-Yes, please... "
10039140-205 = "Sensei..."
10039140-206 = "[s] Hand over more credits."
10039140-214 = "Oh! Awesome, Captain! Sensei!"
10039140-215 = "She hit it, she hit it! The captain can get the doll now!"
10039140-217 = "You guys saw that, right?! I, Komakaze Rabu, leader of the Splash Helmet Gang, am not someone to be taken lightly! Bwa ha ha!"
10039140-218 = "High-five, Sensei!"
10039140-226 = "Sniff... It was really a good story..."
10039140-227 = "I was in tears, too. Plays are such amazing things!"
10039140-228 = "That last monologue from the paralyzed princess was just great..."
10039140-230 = "Aw, come on, you're crying? And you call yourselves Helmet Gangsters?!"
10039140-231 = "This was my first play too, but I didn't shed a single tear!"
10039140-233 = "But Captain, your eyes are red..."
10039140-234 = "Maybe your mascara got smudged...?"
10039140-239 = "Sh-Shut up! I just scratched my eyes a little, 'cause they were itchy!"
10039140-243 = "[ns11] \"It's hard to tell behind your helmets, but...\"\n[ns12] \"...I guess you're all young students too.\""
10039140-250 = "..."
10039140-251 = "Well...I mean, obviously, but..."
10039140-253 = "But we're also a bunch of no-good troublemakers!"
10039140-254 = "[s] \"It's okay to be ordinary people, just for today.\""
10039140-258 = "[ns] \"This is just a day for regular students and their ordinary sensei.\""
10039140-261 = "..."
10039140-264 = "..."
10039140-266 = "...Well..."
10039140-267 = "I mean, we didn't COME here to cause trouble..."
10039140-268 = "And it's a unique experience to be hanging out with you like this..."
10039140-273 = "So...Sensei?"
10039140-278 = "Could you...please spend the rest of the day with us too?"
10039140-280 = "I had a great time spending the entire day with the Helmet Gang until the sun went down."
10039140-285 = "...It did thin out my wallet, though..."

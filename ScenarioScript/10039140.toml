[translation]
10039140-1 = "後日談;我們也是學生！"
10039140-4 = "（當慶典正如火如荼地進行時，某條街道卻顯得特別冷清）"
10039140-5 = "[ns]「記得那邊好像是藝術中心……」"
10039140-12 = "唉……聽說那邊有個展覽，本來想去看看的說！"
10039140-13 = "結果頭盔團居然佔據了路口……"
10039140-14 = "真是的，校園中央竟然會有不良學生盤踞！#n三一學園的秩序都到哪裡去了？"
10039140-20 = "[ns]「……」"
10039140-22 = "[ns] 走向他們談論的地方"
10039140-29 = "啊？看什麼看？有什麼好看的？"
10039140-34 = "糟糕！不小心對到眼了。#n快走快走。"
10039140-39 = "受不了，沒見過頭盔團是不是啊。"
10039140-41 = "隊長，他們一直用像在動物園看猴子的眼神看我們耶。"
10039140-42 = "真奇怪，我們明明什麼都沒做啊……"
10039140-43 = "可能是第一次見到像我們這樣的問題學生，所以被嚇到了吧！#n哈哈！不愧是大小姐學校！"
10039140-44 = "[s]「會不會是因為你們擋在路中央的關係……？」"
10039140-52 = "啊？你說什麼？"
10039140-56 = "……咦？"
10039140-58 = "夏，夏萊的老師！？"
10039140-61 = "啊！真的耶！"
10039140-62 = "我，我們什麼都沒做！！只是站在這裡而已哦！！"
10039140-63 = "[s]「你們先冷靜。我只是以老師的身分過來指導學生而已。」"
10039140-65 = "指導……？"
10039140-66 = "雖，雖然我們的確是問題學生，但今天可沒有做壞事啊！！"
10039140-67 = "[s1]「這樣擋在路中央的話，會讓其他學生很困擾的。」\n[s2]「大家之所以一直看著你們，應該也是因為這個原因。」"
10039140-70 = "……嗯？#n是，是嗎……"
10039140-72 = "可是附近又沒地方可以坐……"
10039140-73 = "操場和樓梯那邊人太多了，我們會怕啦！"
10039140-75 = "難得能來參加慶典，這待遇也太差了吧？呿！"
10039140-76 = "[s]「你們是來參觀『三一狂歡節』的嗎？」"
10039140-80 = "……這個嘛，應該算是吧。"
10039140-82 = "確實可以這麼說……？"
10039140-83 = "說來參觀也行，說來偵查也可以……"
10039140-85 = "我們是來瞧瞧，像三一這種大型學校的活動會有多厲害的！哈哈！！"
10039140-86 = "實際上確實挺厲害的……"
10039140-90 = "……是，是沒錯啦。"
10039140-91 = "不過我們根本沒什麼錢，所以也只能到處看看而已。"
10039140-93 = "攤位上的食物，看起來都很好吃的樣子……"
10039140-100 = "……"
10039140-101 = "剛，剛才那是生理反應！是不可抗力！"
10039140-102 = "沒，沒錯！是我們頭盔團用內臟發出的威脅吼叫……！"
10039140-103 = "怎麼樣啊老師，怕了吧！？#n哈哈……！"
10039140-107 = "[ns3]「那個，如果你們願意的話……」\n[ns4]「要不要一起逛逛？」"
10039140-115 = "什，什麼？"
10039140-116 = "[s5]「那邊的章魚燒攤看起來很好吃……」\n[s6]「但我不敢一個人去買，你們陪我一起去吧？」"
10039140-119 = "……"
10039140-121 = "隊，隊長……這不是個好機會嗎……"
10039140-122 = "既然夏萊的老師都這麼說了，我們不如就答應了吧……"
10039140-124 = "是，是嗎……？"
10039140-125 = "聽說其他學生常常會跟老師一起玩，還會去吃好吃的……"
10039140-126 = "我，我們也想有這樣的經驗……"
10039140-131 = "少，少囉嗦！發號施令的人是我……！！"
10039140-136 = "[ns7]「啊，那邊的炒麵看起來好讚……」\n[ns8]「射擊遊戲和釣氣球感覺也很有趣耶……！」"
10039140-141 = "唔，唔……"
10039140-144 = "隊長……！！"
10039140-150 = "呵，呵呵……老師。"
10039140-151 = "既然你這麼想逛慶典的話，我們也不是不能陪你一下啦。"
10039140-152 = "[s]「嗯，我們一起逛吧。」"
10039140-157 = "哦哦哦！！不愧是隊長！！"
10039140-158 = "我就知道隊長會答應！！"
10039140-159 = "好耶，終於能跟老師一起玩了……！！"
10039140-161 = "呵，呵呵呵……呵呵！"
10039140-163 = "（於是便和頭盔團的學生們一起開始享受慶典）"
10039140-172 = "啊，燙燙燙！！#n呼～！呼～！"
10039140-173 = "哇咧，沒想到剛做好的章魚燒居然這麼燙……！！"
10039140-174 = "誰叫我們平常都是吃涼的，根本沒機會知道嘛！"
10039140-182 = "哎唷！好燙好燙！！#n呼～！呼～！哈呼呼！！"
10039140-183 = "[s9]「慢，慢慢吃沒關係……！」\n[s10]「待會再買別的東西給你們吃！！」"
10039140-195 = "啊啊～！！真可惜！！差一點就中了！！"
10039140-196 = "可惡！要是中了就能得到那個大絨毛玩具了說……！！"
10039140-197 = "可是機會已經用光了……要繼續的話又得花更多錢……"
10039140-201 = "[ns]「想再試一次嗎？」"
10039140-203 = "唔，唔唔……"
10039140-204 = "麻，麻煩……你了……"
10039140-205 = "老師……"
10039140-206 = "[s] 付錢"
10039140-214 = "哦哦！！太棒了，隊長！老師！"
10039140-215 = "中了中了！隊長拿到玩具了！！"
10039140-217 = "看到沒，小子們！！#n我，嘩啦嘩啦頭盔團的領袖．河駒風良舞可不是好惹的啊！！哈哈！！"
10039140-218 = "來擊個掌吧！！老師！！"
10039140-226 = "嗚嗚……真是感人的故事……"
10039140-227 = "我也忍不住哭了……戲劇真是太棒了！"
10039140-228 = "尤其最後麻痺公主的獨白，真的好精彩……"
10039140-230 = "你們這些笨蛋！這麼感性怎麼當頭盔團啦！"
10039140-231 = "雖然我也是第一次看戲，但我可是一滴眼淚都沒流哦！"
10039140-233 = "隊長，可是你的眼角紅紅的耶……"
10039140-234 = "是睫毛膏暈開了嗎？"
10039140-239 = "吵，吵死了！！#n只是剛才有點癢所以揉了一下而已……！！"
10039140-243 = "[ns11]「雖然大家都戴著頭盔……」\n[ns12]「但果然還是這個年紀的學生啊。」"
10039140-250 = "……"
10039140-251 = "這……這是當然的……"
10039140-253 = "不過我們可是恐怖的問題學生……是不良分子哦？"
10039140-254 = "[s]「那麼至少今天，當個普通的學生也沒關係哦。」"
10039140-258 = "[ns]「今天就跟普通的老師一起度過吧。」"
10039140-261 = "……"
10039140-264 = "……"
10039140-266 = "這個嘛……"
10039140-267 = "我們本來就沒打算在參觀的時候惹事啦……"
10039140-268 = "能跟老師一起玩……也算是個挺新奇的經驗……"
10039140-273 = "那麼……老師。"
10039140-278 = "今天一整天，就跟我們一起混個痛快吧！！"
10039140-280 = "（於是後來便和頭盔團度過了愉快的一天）"
10039140-285 = "（……雖然錢包也因此瘦了不少就是了）"

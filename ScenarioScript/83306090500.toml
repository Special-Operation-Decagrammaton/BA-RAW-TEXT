[translation]
83306090500-11 = "แฮ่ก! แฮ่ก! แฮ่ก...! ขอโทษที่มาช้านะ! เอริกะ!"
83306090500-12 = "คิราระ ทำไมมาช้าแบบนี้ล่ะ? นี่ฉันทำงานเสร็จได้เพราะประธานกรรมการวินัยมาช่วยนะ"
83306090500-13 = "ขอโทษนะ! พอดีระหว่างทางมาเข้าเวร ฉันดันไปเจอคุณยายคนหนึ่งกำลังเจอปัญหาอยู่ตรง#nหน้าทางม้าลายน่ะ...! ขอโทษจริงๆ นะ!"
83306090500-14 = "เอาเถอะ ฉันคิดไว้แล้วละว่าถ้าคิราระมาสาย ก็คงเป็นเพราะเหตุผลแบบนั้น"
83306090500-15 = "ว่าแต่งานเข้าเวรวันนี้ ฮินัตจิมาช่วยเหรอ?!  จริงเหรอ?!"
83306090500-16 = "อ่า... อื้ม จู่ๆ ก็กลายเป็นอย่างนั้นน่ะ..."
83306090500-17 = "อื้มมม~ ขอบใจที่มาช่วยงานนะ นั่นเป็นงานในส่วนของฉันแท้ๆ เลย!"
83306090500-18 = "ไว้ฉันจะเลี้ยงเครปที่ชมรมกลับบ้านซื้อกินบ่อยๆ เป็นการตอบแทนนะ"
83306090500-19 = "หืม? ไม่เป็นไร ไม่ต้องขนาดนั้นก็ได้..."
83306090500-20 = "ไม่ได้หรอก~! ถ้าได้รับความช่วยเหลือก็ต้องตอบแทนน้ำใจสิ!"
83306090500-21 = "ถ้าเรื่องแบบนี้น่ะ คิราระดื้อรั้นที่สุดเลยละ ตอบรับเธอไปเถอะ"
83306090500-22 = "อย่างนั้นก็ได้... ไว้ต่อไปถ้ามีเวลา..."
83306090500-23 = "อื้อ! สัญญาแล้วนะ~!"

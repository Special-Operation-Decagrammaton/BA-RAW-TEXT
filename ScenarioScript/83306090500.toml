[translation]
83306090500-11 = "哈啊！哈啊！哈啊……！抱歉我遲到了！繪里香醬！"
83306090500-12 = "綺羅羅醬，你也太晚來了吧。#n我已經和風紀委員長一起完成囉。"
83306090500-13 = "抱歉！我在來的途中，遇見一位老奶奶站在斑馬線前不知所措……！真的很抱歉！"
83306090500-14 = "果然很像是綺羅羅醬會遲到的理由。"
83306090500-15 = "不過值日生的工作……是陽奈親幫忙的嗎！？真的假的！？"
83306090500-16 = "啊，嗯。順其自然就……"
83306090500-17 = "哇～真的太謝謝你了！"
83306090500-18 = "之後我請你吃我們回家部常買的可麗餅當成謝禮吧！"
83306090500-19 = "嗯？啊，其實也沒必要這樣……"
83306090500-20 = "不行不行！既然獲得幫助，當然就該報答！"
83306090500-21 = "這種時候的綺羅羅醬很固執的，最好還是答應他比較好哦。"
83306090500-22 = "既然你都這麼說了……好吧。#n等之後有空的時候……"
83306090500-23 = "嗯！約好了唷～！"

[translation]
1301205-1 = "The Shooter/兩大目標？"
1301205-2 = "女武神警察學園．室內射擊場"
1301205-8 = "……為什麼距離都這麼近了還打不到呢？"
1301205-9 = "今天身體狀況不錯，本官對自己的腕力也算有點自信……"
1301205-10 = "但不知道為什麼，只要扣下板機，子彈就會偏掉……"
1301205-11 = "[s] 「會不會是這把槍故障了？」"
1301205-12 = "不過，本官每天早上姑且都會認真整備槍枝，唔嗯……"
1301205-13 = "就算本官再不成熟，槍枝有問題應該也能馬上察覺到……照理說啦……"
1301205-14 = "……但槍械本來就是很敏感的裝備，確實也有可能是我看漏了。"
1301205-15 = "總之先重新調整看看，然後再從近距離射擊開始測試吧！"
1301205-25 = "（幾分鐘以後……）"
1301205-30 = "[ns] 「………」"
1301205-31 = "…………"
1301205-32 = "果，果然是這把槍有問題！"
1301205-33 = "距離都這麼近了，子彈怎麼可能都往人質靶的方向飛呢！啊哈哈哈……！哈哈哈哈……"
1301205-34 = "[s] 「換另一把槍，再重新調整一次看看吧。」"
1301205-35 = "是的，說的也是呢。"
1301205-37 = "嘿咻……先這樣子……然後調整準心……"
1301205-47 = "（幾分鐘以後……）"
1301205-52 = "[ns] 「………」"
1301205-53 = "…………"
1301205-54 = "好，好奇怪……本官明明有確實瞄準犯人的頭部扣下板機……怎麼會跑到旁邊……"
1301205-55 = "[s] 「姑且問一下，妳原本是瞄準另一邊，對吧？」"
1301205-56 = "是，是啊！本官是這麼瞄的啊！"
1301205-57 = "難，難不成，本官會故意瞄準擔當人質的目標嗎！？"
1301205-58 = "身為女武神警察學園的學生，卻刻意傷害市民的那種行為……！"
1301205-59 = "嘛，但看了這個結果，我好像也無話可說……"
1301205-60 = "總，總之！怎麼想都一定是槍械有問題……！"
1301205-61 = "[s] 「……桐乃，我有個提案。」"
1301205-62 = "是，請說。"
1301205-63 = "[s] 「……不如從一開始就瞄準人質開槍，如何？」"
1301205-65 = "咦……瞄準人質？"
1301205-66 = "就，就算是訓練，本官也沒辦法把槍口對準善良的市民……！？"
1301205-67 = "身為女武神警察學園的學生，絕不接受這種事……！"
1301205-68 = "[s] 「反正都會打到人質的話，試試也沒差呀。」"
1301205-69 = "雖，雖然是那樣沒錯……"
1301205-71 = "……人質，抱歉了！"
1301205-82 = "[ns] 「………」"
1301205-83 = "…………"
1301205-84 = "[s] 「看來你今後就瞄準人質吧。」"
1301205-85 = "那，那可不行！警察學園的學生怎麼能把槍對著人質……！"
1301205-86 = "這，這一定有什麼問題！這次反而打的這麼正確，一定有問題……！"
1301205-87 = "本官這次一定要確實瞄準打中犯人！"
1301205-89 = "（後來桐乃又嘗試了好幾次，但只要瞄準犯人，子彈就會莫名其妙全部射中人質……）"
1301205-90 = "唔……為什麼，為什麼本官……！"
1301205-91 = "（聽說在之後的射擊測驗，桐乃為了通過測試只能心不甘情不願的瞄準人質…… ）"

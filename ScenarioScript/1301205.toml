[translation]
1301205-1 = "Double Target"
1301205-2 = "Police School Shooting Range"
1301205-8 = "Strange. It's not that far off, but I keep missing the target..."
1301205-9 = "My breathing isn't the problem, and I don't lack upper body strength."
1301205-10 = "But whenever I pull the trigger, the bullet fires in a different direction than expected—as if my aiming point is off."
1301205-11 = "[s] \"Are you sure the sight is installed correctly?\""
1301205-12 = "Of course I am. I give my firearm maintenance every morning."
1301205-13 = "I would have noticed something a long time ago if there was something wrong with the sight."
1301205-14 = "...Firearms CAN be sensitive though, so I can't rule it out."
1301205-15 = "Then I'll do some light zeroing shots!"
1301205-25 = "The paper targets returned from the firing lane once Kirino was done with her shooting."
1301205-30 = "[ns] \"...\""
1301205-31 = "..."
1301205-32 = "Th-The aiming point must've been set incorrectly after all!"
1301205-33 = "There's no other reason the bullets would've kept flying directly at the hostage! Hahaha..."
1301205-34 = "[s] \"Adjust the sight and let's try firing again.\""
1301205-35 = "Right. I'll do that and give it another go."
1301205-37 = "Adjusting the sight to the right three clicks and up three clicks..."
1301205-47 = "The paper targets returned from the firing lane once Kirino was done with her shooting."
1301205-52 = "[ns] \"...\""
1301205-53 = "..."
1301205-54 = "Th-That's weird. I'm sure I aimed directly at the culprit's head and pulled the trigger..."
1301205-55 = "[s] \"Are you sure you aimed at the culprit?\""
1301205-56 = "O-Of course!"
1301205-57 = "S-Surely you don't think I hit the hostage on purpose, do you, Sensei?"
1301205-58 = "A Valkyrie Police School student would never intentionally harm a civilian!"
1301205-59 = "The fact that my bullets keep hitting them is an unfortunate coincidence..."
1301205-60 = "Anyway! This all happened because the sight was broken!"
1301205-61 = "[s] \"Kirino.\""
1301205-62 = "Huh?"
1301205-63 = "[s] \"How about we try aiming at the hostage to begin with before firing?\""
1301205-65 = "I'm sorry? You want me to aim the muzzle at the hostage, not the culprit?"
1301205-66 = "I can't aim my gun at an innocent civilian, even if this is just shooting practice! "
1301205-67 = "My pride as a police officer will never allow it!"
1301205-68 = "[s] \"But you hit the hostage every time you aim for the culprit.\""
1301205-69 = "Th-That's true, but..."
1301205-71 = "Please forgive me, Mr. Paper Civilian!"
1301205-82 = "[ns] \"...\""
1301205-83 = "..."
1301205-84 = "[s] \"It looks like you'll have to aim at the hostage from now on.\""
1301205-85 = "I-I can't do that! What kind of police officer intentionally aims at a hostage?!"
1301205-86 = "There must have been a mistake. If I correctly adjust the sight, then surely..."
1301205-87 = "I'm going to fire again!"
1301205-89 = "Kirino kept aiming at the culprit, but the bullets hit the hostage each time without fail."
1301205-90 = "Ahhhhhh! Why...? Why?!"
1301205-91 = "Kirino eventually relented and aimed at the hostage while crying each time. She passed the marksmanship exam a few days later."

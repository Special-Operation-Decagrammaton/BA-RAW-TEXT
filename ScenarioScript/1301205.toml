[translation]
1301205-1 = "ดับเบิ้ล ทาร์เก็ต"
1301205-2 = "ห้องซ้อมยิงเป้าในร่ม สถาบันฝึกตำรวจวัลคิรี่"
1301205-8 = "แปลกจังเลยค่ะ ระยะก็ไม่ได้ไกลเลย ทำไมถึงยังยิงพลาดเป้าอยู่นะ..."
1301205-9 = "การหายใจก็ไม่มีปัญหา แถมแขนขาก็ไม่ได้อ่อนแรงด้วย"
1301205-10 = "แต่พอเหนี่ยวไก กระสุนมักจะยิงไปคนละทางกับที่คิดไว้ตลอดเลย เหมือนกับว่าจุดเล็งมันขยับ#nอย่างนั้นแหละ"
1301205-11 = "[s] \"แน่ใจนะว่าตั้งศูนย์ถูกต้อง?\""
1301205-12 = "คะ? แต่ฉันก็ตรวจเช็กและบำรุงปืนสม่ำเสมอทุกเช้านะคะ"
1301205-13 = "ถ้ามีปัญหาเรื่องศูนย์ที่เล็ง ฉันก็ต้องสังเกตเห็นแล้วสิคะ"
1301205-14 = "แต่ว่าปืนก็เป็นอุปกรณ์ที่ละเอียดอ่อนมาก คงมองข้ามความเป็นไปได้นั้นไปไม่ได้หรอกค่ะ"
1301205-15 = "งั้นฉันจะเล็งแล้วลองยิงในตำแหน่ง 0 คะแนนก่อนแล้วกันค่ะ!"
1301205-25 = "(เมื่อยิงเสร็จแล้วก็ได้กระดาษเป้ายิงปืนกลับมา)"
1301205-30 = "[ns] \"...\""
1301205-31 = "..."
1301205-32 = "ฉันว่าศูนย์ปืนต้องมีปัญหาแน่ๆ เลยค่ะ!"
1301205-33 = "ไม่มีทางที่กระสุนปืนจะพุ่งไปแต่ทิศทางที่ตัวประกันอยู่แบบนี้แน่ๆ ค่ะ! แหะๆๆ..."
1301205-34 = "[s] \"งั้นตั้งศูนย์ใหม่ก่อนแล้วค่อยซ้อมเถอะ\""
1301205-35 = "ได้ค่ะ งั้นฉันจะปรับแล้วจะลองซ้อมยิงใหม่นะคะ"
1301205-37 = "เลื่อนไปทางขวา 3 จุด แล้วก็ทางซ้าย 3 จุด..."
1301205-47 = "(เมื่อยิงเสร็จแล้วก็ได้กระดาษเป้ายิงปืนกลับมา)"
1301205-52 = "[ns] \"...\""
1301205-53 = "..."
1301205-54 = "ปะ... แปลกจังเลยค่ะ ฉันมั่นใจว่าเล็งที่หัวคนร้ายแล้วนี่นา..."
1301205-55 = "[s] \"เล็งที่หัวคนร้ายแน่นะ?\""
1301205-56 = "นะ... แน่สิคะ!"
1301205-57 = "นี่คุณครูคิดว่าฉันเจตนาที่จะยิงตัวประกันเหรอคะ?"
1301205-58 = "นักเรียนสถาบันฝึกตำรวจวัลคิรี่ไม่มีทางทำร้ายพลเมืองโดยเจตนาหรอกค่ะ!"
1301205-59 = "ถึงฉันจะยิงไปถูกเป้าที่เป็นตัวแทนของตัวประกันก็เถอะ..."
1301205-60 = "แต่เอาเถอะค่ะ! ทั้งหมดนี่เป็นเพราะที่เล็งเป้าของปืนมีปัญหาค่ะ!"
1301205-61 = "[s] \"คิริโนะ\""
1301205-62 = "คะ?"
1301205-63 = "[s] \"ลองเปลี่ยนมาเล็งที่ตัวประกันแทนมั้ย?\""
1301205-65 = "คะ? ให้เล็งที่ตัวประกันแทนคนร้ายงั้นเหรอคะ?"
1301205-66 = "ถึงจะเป็นแค่เป้าก็เถอะค่ะ แต่ฉันคงเล็งไปที่พลเมืองผู้บริสุทธิ์ไม่ได้หรอกค่ะ!"
1301205-67 = "ในฐานะเจ้าหน้าที่ตำรวจที่น่าภาคภูมิแล้ว ฉันคงทำอะไรแบบนั้นไม่ได้หรอกค่ะ!"
1301205-68 = "[s] \"แต่ถึงจะเล็งคนร้ายแต่ก็โดนตัวประกันตลอดนี่นา\""
1301205-69 = "นั่นมันก็จริงอยู่หรอก แต่ว่า..."
1301205-71 = "ขอโทษด้วยนะคะคุณพลเมืองดีที่โดนจับเป็นตัวประกัน!"
1301205-82 = "[ns] \"...\""
1301205-83 = "..."
1301205-84 = "[s] \"ต่อไปคงต้องเล็งตัวประกันแทนคนร้ายแล้วล่ะ\""
1301205-85 = "หะ... ให้ทำแบบนั้นไม่ได้หรอกค่ะ! จะให้เรียกคนที่จงใจเล็งปืนไปที่ตัวประกันว่าตำรวจได้ยังไงกันคะ!"
1301205-86 = "ต้องมีอะไรผิดพลาดแน่นอนค่ะ ถ้าครั้งนี้ตั้งศูนย์เล็งให้ดีๆ ละก็..."
1301205-87 = "ฉันขอลองยิงอีกครั้งนะคะ!"
1301205-89 = "(หลังจากนั้น ถึงคิริโนะจะเหนี่ยวไกโดยเล็งไปที่คนร้าย แต่กระสุนก็พุ่งไปที่ตัวประกันอย่างไม่#nหยุดหย่อน...)"
1301205-90 = "แงง ทำไมกันเนี่ย...! ฉันไม่เข้าใจเลยค่ะ!"
1301205-91 = "(สุดท้ายคิริโนะก็ร้องไห้และจำใจเล็งไปที่ตัวประกันจนสอบยิงปืนผ่านมาได้...)"

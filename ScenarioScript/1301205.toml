1301205-8 = "3;키리노;09;이상하네요, 그렇게 먼 거리도 아닌데 계속 표적을 빗나가다니…….\n#3;em;…\n#3;a"
1301205-9 = "3;키리노;09;호흡이 거친 것도 아니고, 팔 힘이 부족한 것도 아닌데."
1301205-10 = "3;키리노;06;이상하게도 방아쇠만 당기면 조준점이 흐트러지는지, 생각한 곳과 다른 방향으로 탄환이 날아갑니다.\n#3;em;[속상함]\n#3;stiff"
1301205-11 = "[s] \"가늠자가 잘못 설정된 것 아닐까?\""
1301205-12 = "3;키리노;02;네? 하지만 총기 정비는 매일 아침마다 성실히 하고 있는걸요?\n#3;em;[?]"
1301205-13 = "3;키리노;09;가늠자에 문제가 생겼더라면 본관이 바로 알아차렸을 겁니다."
1301205-14 = "3;키리노;01;……하지만 총기는 워낙 예민한 장비니, 그 가능성도 놓칠 수는 없겠네요.\n#3;em;[반응]"
1301205-15 = "3;키리노;03;그럼, 우선 가볍게 영점 사격부터 해보겠습니다!\n#3;em;[음표]\n#3;hophop"

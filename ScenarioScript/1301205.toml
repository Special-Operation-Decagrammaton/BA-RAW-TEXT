1301205-65 = "3;키리노;04;네? 범인이 아니라 인질에게 총구를 조준하라고요?\n#3;shake\n#3;em;[?!]"
1301205-66 = "3;키리노;08;아무리 가상의 인질이라지만 선량한 시민을 향해 총구를 겨누는 일은 할 수 없습니다! \n#3;em;[빠직]\n#3;hophop"

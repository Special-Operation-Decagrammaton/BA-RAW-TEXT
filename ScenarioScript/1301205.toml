1301205-54 = "3;키리노;06;이, 이상하네요. 분명 범인의 머리를 정확히 조준하고 방아쇠를 당겼는데…….\n#3;stiff"
1301205-55 = "[s] \"정말로 범인을 조준한 거 맞아?\""
1301205-56 = "3;키리노;04;무, 물론입니다!\n#3;em;[땀]"
1301205-57 = "3;키리노;05;서, 설마 선생님께서는 본관이 고의로 인질을 맞추었다고 생각하시는 겁니까?"
1301205-58 = "3;키리노;08;발키리 경찰 학교의 학생이 고의로 시민에게 위해를 끼칠 리가 없잖습니까!\n#3;em;[빠직]\n#3;hophop"
1301205-59 = "3;키리노;06;물론 결과적으로 총알은 인질에게 날아가긴 했지만……"
1301205-60 = "3;키리노;05;여하튼! 이건 모두 가늠자가 고장 났기 때문에 생긴 일입니다!\n#3;em;[반응]"

1009302-70 = "3;키라라;01;보통의 동아리 활동, 운동이라든가, 취미라든가, 여러 가지 동아리 활동을 한다~! 는 건 좋지만, 나랑은 역시 안 맞는 것 같아서 말야!\n#3;m4"
1009302-71 = "3;키라라;99;매번 같은 활동만 하고, 그 동아리에 가입한 애들만 보게 되고…….\n#3;em;…"
1009302-72 = "3;키라라;07;하루 이틀쯤이면 몰라도, 맨날맨날 보던 사람만 보면 엄~청 지루할 것 같지 않아?\n#3;stiff"

[translation]
1009302-1 = "การทำกิจกรรมชมรมของคิราระ"
1009302-2 = "(ระหว่างทางกลับหลังจากเสร็จธุระที่เกเฮนน่า คุณครูก็ได้เจอนักเรียนที่พูดคุยเอะอะกันอย่าง#nสนุกสนาน)"
1009302-10 = "[ns] (คงเป็นเพื่อนสนิทกันสินะ...)"
1009302-12 = "อ๊ะ! พวกเราต้องกลับทางนี้ละ กลับดีๆ นะคิราระ!"
1009302-13 = "อื้ม! ไว้เจอกันใหม่นะ!"
1009302-19 = "เอ๋?"
1009302-21 = "ไฮฮาย ครู [USERNAME]! ได้มาเจอกันตรงนี้ด้วยแฮะ"
1009302-22 = "เพิ่งทำงานเสร็จและกำลังกลับเหรอ? เหมือนฉันเลย! ฉันก็กำลังกลับบ้านเหมือนกัน"
1009302-23 = "[s] \"ที่อยู่ด้วยกันเมื่อกี้คือเพื่อนๆ เหรอ?\""
1009302-24 = "อื้ม! ใช่ เป็นนักเรียนที่เพิ่งเจอเมื่อวันนี้น่ะ เราคุยกันถูกคอเลย!"
1009302-25 = "[s1] \"หืม? เป็นเพื่อนที่เพิ่งเจอกันวันนี้เหรอ?\"\n[s2] \"ดูเหมือนเพื่อนสนิทที่คบมานานเลยนะ?!\""
1009302-28 = "หืม? สำคัญด้วยเหรอว่าได้รู้จักกันตอนไหน?"
1009302-29 = "ถ้าสนิทกันก็เป็นเพื่อนกันได้แล้วนี่? อะฮ่าฮ่า!"
1009302-30 = "ฉันคิดว่าตัวเองก็สนิทกับครูอยู่นะ ส่วนเรื่องที่ว่าเรารู้จักกันตอนไหนมันไม่สำคัญหรอก"
1009302-31 = "[s] \"เป็นคนเอ็กซ์โทรเวิร์ตสินะ... เมคเฟรนด์กับคนอื่นเก่งจัง!\""
1009302-32 = "อะฮ่าฮ่า! ไม่ได้เป็นเรื่องยิ่งใหญ่อะไรสักหน่อย"
1009302-33 = "อ๊ะ! หรือว่า! ครูอิจฉา... หรือหวงฉันเหรอ?"
1009302-34 = "อะฮ่าฮ่า! ก็ได้ๆ ถ้างั้นฉันจะกลับบ้านกับครูแล้วกัน จะไม่แวะคุยกับใครเลย!"
1009302-48 = "เพราะงั้น ตอนนั้นฉันก็เลยเข้าไปในร้านสะดวกซื้อ..."
1009302-49 = "อ๊ะ มาถึงตรงนี้แล้วเหรอเนี่ย?"
1009302-50 = "บ้านฉันต้องไปทางนี้ งั้นเราคงต้องบ๊ายบายกันตรงนี้แล้วละ!"
1009302-51 = "[s] \"ครูขอถามอะไรอย่างหนึ่งได้มั้ย?\""
1009302-52 = "ครูสงสัยเรื่องฉันด้วยเหรอ? เกินคาดเลยแฮะ? เรื่องอะไรเหรอ?"
1009302-53 = "[s3] \"ทำไมคิราระไม่ทำกิจกรรมของชมรมเหรอ?\"\n[s4] \"ถ้าได้เข้าชมรมไหนจริงจัง ก็อาจจะได้เจอเพื่อนมากกว่านี้รึเปล่า?\""
1009302-56 = "ก็คิดอยู่ว่าสงสัยเรื่องอะไร"
1009302-57 = "แต่ฉันก็มีชมรมที่สังกัดอยู่แล้วนะ?"
1009302-58 = "หืม? คิดว่าชมรมกลับบ้านไม่ใช่ชมรม แต่เป็นคำที่ใช้เรียกนักเรียนที่กลับบ้านเพราะไม่มีกิจกรรมทำ#nหลังเลิกเรียนงั้นเหรอ?"
1009302-59 = "อะฮ่าฮ่า~! ครู! เก่งนะเนี่ย!"
1009302-60 = "ใช่แล้วละ ก่อนหน้านี้ฉันก็อยู่ในชมรมกลับบ้านนี่ละ...!"
1009302-65 = "แต่ว่าตอนนี้ไม่ใช่แล้วนะ!"
1009302-66 = "ตอนนี้ฉันตั้งชมรมพิเศษอย่าง <ชมรมเปล่งประกาย> ขึ้นมาแล้วน่ะ!"
1009302-67 = "[s] \"ชมรม... เปล่งประกาย?\""
1009302-68 = "อื้อ! เป็นชมรมที่น่าตื่นเต้นแล้วก็เปล่งประกายจนแสบตาเลยละ!"
1009302-69 = "[s] \"ครูไม่ค่อยเข้าใจเลย...\""
1009302-70 = "การได้ทำกิจกรรมชมรมทั่วไปอย่างเช่นออกกำลังกายหรือทำงานอดิเรกมันก็ดีอยู่หรอก~! แต่ว่ามันดูไม่ค่อยเข้ากับฉันน่ะ!"
1009302-71 = "ต้องทำแต่กิจกรรมเดิมๆ ทุกครั้ง แล้วก็ได้เจอแต่เพื่อนๆ ในชมรมนั้น..."
1009302-72 = "ถ้าแค่ 1-2 วัน ฉันน่าจะทำได้อยู่ แต่ถ้าได้เจอคนซ้ำๆ เดิมๆ ไปตลอด ครูว่ามันไม่น่าเบื่อไปหน่อยเหรอ?"
1009302-73 = "เพราะแบบนั้นฉันก็เลยตั้งชมรมขึ้นมาใหม่เลยน่ะ!"
1009302-74 = "แทนที่จะทำกิจกรรมตายตัวอย่างชมรมอื่นๆ... ฉันขอเลือกที่จะเจอเพื่อนใหม่ระหว่างทางกลับบ้าน#nอย่างวันนี้..."
1009302-75 = "และถ้าสนิทกันก็จะได้ไปแวะโรงอาหารแล้วก็พูดคุยเรื่องไร้สาระกัน... หรือไม่ก็ไปซื้อเสื้อผ้าที่ย่านการ#nค้าด้วยกัน..."
1009302-76 = "แล้วถ้าจู่ๆ เกิดอยากร้องเพลงขึ้นมา~ ก็ชวนกันไปร้องเพลงที่คาราโอเกะด้วยกัน..."
1009302-77 = "นี่แหละการเที่ยวเล่นในแบบของฉัน"
1009302-78 = "แน่นอนว่าไม่จำเป็นต้องเป็นเพื่อนที่เพิ่งเคยเจอกันครั้งแรกหรอกนะ แล้วก็ไม่จำเป็นต้องไปช้อปปิ้ง หรือไปคาราโอเกะเท่านั้นด้วย แต่แค่ต้อง 'สนุกไว้ก่อน'!"
1009302-79 = "นี่ละคำขวัญของ <ชมรมเปล่งประกาย> ของเรา!"
1009302-80 = "เป็นไง? ฟังดูน่าตื่นเต้นและเปล่งประกายมากเลยใช่มั้ย?"
1009302-81 = "[s] \"เป็นชมรมสำหรับคนที่เข้ากับคนอื่นได้ง่ายอย่างคิราระเลยนะ\""
1009302-82 = "ไม่ใช่อย่างนั้นซะทีเดียวหรอก~"
1009302-83 = "ถ้าครูอยากมาทำกิจกรรมด้วยกันก็มาได้ตลอดเลยนะ!"
1009302-84 = "อ่า... หรือว่าครูผู้สอนจะเข้าชมรมไม่ได้นะ~? อะฮ่าฮ่า!"
1009302-85 = "อืม~ แต่วันนี้การทำกิจกรรมชมรมก็ถือว่าสำเร็จอยู่นะ?"
1009302-86 = "หืม? ทำไมน่ะเหรอ?"
1009302-93 = "ก็... เพราะฉันได้เจอครูและได้เม้าท์มอยกันไง!"
1009302-94 = "แล้วครูคิดว่ายังไงล่ะ?!"
1009302-95 = "[s] \"อืม... ครูก็สนุกนะ เพราะเหมือนจะได้รู้จักคิราระมากขึ้นด้วย\""
1009302-96 = "ฮิฮิฮิ!"

[translation]
10028025-9 = "แฮ่ก... แฮ่ก... แฮ่ก..."
10028025-10 = "อืม... คุณครูคะ...?"
10028025-11 = "คุณครู... ก็รู้ดีใช่มั้ยคะ..."
10028025-12 = "พวกเราไม่ได้มีเจตนาจะทำอย่างนั้นเลยแม้แต่น้อย~ แต่ก็... ดันไป..."
10028025-13 = "[s1] \"ทำเจ้าหน้าที่รถไฟสลบเหมือดเลย...\"\n[s2] \"แต่มันเป็นสถานการณ์ที่ไม่มีทางเลือกอื่นน่ะ\""
10028025-19 = "แหะๆ..."
10028025-20 = "หลงเวลายังไม่พอ ยังต้องมาต่อสู้กับโรงเรียนอื่นต่ออีก"
10028025-21 = "รู้สึกเหมือนจะมีข้อผิดพลาดที่น่าอนาถใจเรื่อยๆ เลยนะคะ ฉันไม่มีหน้าจะไปสู้คุณครูแล้วค่ะ"
10028025-22 = "คะ...? ไม่ต้องสนใจงั้นเหรอคะ?"
10028025-23 = "แหะๆๆ... พูดอย่างนี้ก็รู้สึกขอบคุณอยู่หรอกนะคะ แต่สำหรับฉันแล้วมันออกจะ..."
10028025-24 = "อีกอย่าง ต่อให้เราชนะไปครั้งหนึ่งก็ใช่ว่าจะจบแค่นี้นะคะ ฉันรู้สึกเหมือนเรากลายเป็นศัตรูกับคุณเจ้า#nหน้าที่บนรถไฟไปแล้ว..."
10028025-25 = "อยู่ตรงนี้! ทางนี้เลย!!"
10028025-26 = "ล้อมไว้เลย ยังไงก็ไม่มีทางหนีอยู่แล้ว!!"
10028025-43 = "...ค่ะ เป็นอย่างที่ว่าเอาไว้เลยค่ะ"
10028025-47 = "อืม..."
10028025-48 = "แต่ยังไงถ้าต่อสู้กันอีกตรงนี้ คงเกินกำลังไป... ใช่มั้ยคะ? มันอาจจะเป็นอันตรายต่อคุณครูด้วย"
10028025-49 = "งั้นเราก็คงไม่มีทางเลือกอื่นนอกจากยอมให้พวกนั้นคุมตัวไปอย่างว่าง่ายแล้วละค่ะ"
10028025-50 = "แล้วพอไปถึงเกเฮนน่าแล้วค่อยมาคุยหาทางออกกัน ถึงไม่รู้ว่าจะออกมาดีหรือเปล่าก็เถอะ"
10028025-51 = "[s3] \"แล้วกระเป๋าล่ะ...\"\n[s4] \"ดูทรงแล้วพวกนั้นน่าจะไม่ให้ความร่วมมือนะ...\""
10028025-54 = "จริงๆ แล้วฉันก็กังวลเกี่ยวกับเรื่องนั้นนิดหน่อยค่ะ แต่เราก็ไม่มีทางเลือกอื่นแล้ว"
10028025-55 = "ยิ่งเป็นเรื่องแบบนี้ด้วยแล้ว เรายิ่งต้องสุภาพและคลี่คลายปัญหาอย่างราบรื่น..."
10028025-69 = "...หืม?"
10028025-70 = "นี่มันเสียงอะไรเหรอคะ...? ฉันว่าเสียงมัน..."
10028025-81 = "......? หืม? อะไรเนี่ย? เหมือนได้ยินเสียงปี๊บๆ มาจากไหนเลย?"
10028025-82 = "อ่า... ไม่ใช่ตรงนี้ น่าจะเป็นตู้ข้างหลังนะ?"
10028025-83 = "ตู้ข้างหลังเหรอ? ถ้าเป็นตู้ข้างหลัง ก็เป็น..."
10028025-102 = "ตู้ <รถไฟคุ้มกัน>..."
10028025-103 = ".....!!!!!!"
10028025-104 = "เดี๋ยวก่อน...!!"
10028025-109 = "แค่ก! แค่ก! แค่กๆ! แค่กๆ แค่กๆ...!"
10028025-110 = "อะ... อะไรคะเนี่ย? รอบนี้เป็นระเบิดงั้นเหรอ!? เรื่องวุ่นๆ ของวันนี้จะไปจบที่ตรงไหนคะเนี่ย!?"
10028025-111 = "คะ... คุณครู...? เป็นยังไงบ้างคะคุณครู!?"
10028025-117 = "ฉันเอาตัวไปบังให้ทันทีที่ระเบิดก็จริง... แต่ครูบาดเจ็บตรงไหนมั้ยคะ...!"
10028025-118 = "[s5] \"ครูไม่เป็นไร\"\n[s6] \"ขอบใจที่ช่วยนะ อิจิกะ\""
10028025-121 = "ฮู่ว... โล่งอกไปทีค่ะ"
10028025-122 = "ว่าแต่นี่มันอะไรกันคะ... ตู้รถไฟคุ้มกันงั้นเหรอ แล้วทำไมมันถึงระเบิด...?"
10028025-126 = "ตู้รถไฟข้างหลังเหมือนจะปลิวไปหมดเลยค่ะ"
10028025-127 = "จะบอกว่าขอบคุณที่ระเบิดมันก็ยังไงๆ อยู่ แต่พวกคนที่จะเข้ามาจับตัวเราก็ปลิวไปกับระเบิดด้วย..."
10028025-128 = "อืม~ แปลกจังเลยนะ~"
10028025-129 = "ได้แค่นี้เองเหรอ? ปกติแล้วตู้รถไฟควรจะขาดและแยกออกจากกันเลยสิ..."
10028025-133 = "หืม? นั่นเสียงคนนี่คะ...?"
10028025-137 = "หรือว่าดินระเบิดไม่พอ? ไม่หรอก ไม่มีทาง ระหว่างนี้เจ้าพวกนั้นคงจะไปเสริมเกราะมาละมั้ง!!"
10028025-138 = "วะฮ่า! อะไรเนี่ย! คนพวกนี้! ใช้สมองมากกว่าที่คิดนะเนี่ย? ถูกใจมากเลย! วะฮ่าฮ่าฮ่า!!"
10028025-139 = "[s7] \"...'วะฮ่าฮ่า' งั้นเหรอ?\"\n[s8] \"เสียงหัวเราะนี่มัน...\""
10028025-142 = "หืม...? อะไรกันน่ะ?"
10028025-143 = "เอ๋~? นี่ใครกันเนี่ย! ก็ว่าดูคุ้นๆ เป็นคุณครูจริงๆ ด้วยแฮะ?"
10028025-150 = "คิดไม่ถึงเลยนะว่าจะได้มาเจอกันในที่แบบนี้! วะฮ่าฮ่าฮ่าฮ่า!!"
10028025-151 = "ช่างเป็นวันดีอะไรอย่างนี้เนี่ย!! วันนี้มันยอดเยี่ยมจริงๆ! ถูกใจจริงๆ!! ถูกใจมาก!!"
10028025-152 = "งั้นฉันคงไม่ต้องแนะนำตัวเองหรอกเนอะ? ฮุฮุฮุฮุ..."
10028025-157 = "คุณคือ...?"
10028025-158 = "[s9] \"คาสุมิ!? ทำไมเธอถึง...!?\"\n[s10] \"ออกมาจากตรงนั้น...?\""
10028025-161 = "เอ๋? คุณครู? คนรู้จักเหรอคะ...?"
10028025-162 = "ไม่สิ... เดี๋ยวนะคะ"
10028025-163 = "คาสุมิ? คาสุมิ... คาสุมิ... เอ๋? เหมือนเคยได้ยินชื่อนี้มาก่อนเลย..."
10028025-164 = "เฮอะ...! จะถามเหตุผลก่อนเลยเหรอ? น่าเบื่อชะมัด"
10028025-165 = "ทำตัวให้เข้ากับบรรยากาศกันหน่อยเถอะ นี่เราไม่ได้เจอกันนานเลยนะ แถมได้มาเจอกันในที่แบบนี้อีก นี่มันพล็อตละครสุดๆ เลยว่ามั้ย? ฮุฮุฮุฮุ..."
10028025-166 = "คาสุมิ... คาสุมิ... เอ๋?"
10028025-167 = "คินุกาวะ คาสุมิ...?"
10028025-171 = "อาชญากรที่มีประกาศจับ... ของเกเฮนน่า...?"
10028025-173 = "วะฮ่าฮ่าฮ่าฮ่าฮ่า!! แหมๆ มีคนจำฉันได้เยอะแยะแบบนี้ รู้สึกเหมือนเป็นเซเลปเลยนะเนี่ย! ขอบใจนะ ขอบใจมาก!!"
10028025-174 = "งะ... งั้นเหรอคะ ถ้าคุณดีใจ ฉันก็ดีใจ... ด้วย... ค่ะ"
10028025-175 = "ถ้าอย่างนั้นก็ข้ามการแนะนำตัวเองของฉันไปได้เลยน่ะสิ! จะว่าไป คุณครูต่างหากที่ฉันสงสัย..."
10028025-176 = "ครูมีธุระอะไรถึงได้เดินทางมาในชนบทที่ทั้งห่างไกลและซอมซ่อแบบนี้กันล่ะ?"
10028025-182 = "...แถมยังมากับคุณหนูน่ารักจากทรีนิตี้อีก"

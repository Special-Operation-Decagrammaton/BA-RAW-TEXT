[translation]
10028025-9 = "哈啊，哈啊……哈啊……"
10028025-10 = "那個……老師……？"
10028025-11 = "就是……那個……"
10028025-12 = "我們絕～對不是有意要這麼做的……但……不管怎麼說……"
10028025-13 = "[s1]「我們還是打倒了乘務員……」\n[s2]「雖然以剛才的氣氛來看，確實是無可奈何……」"
10028025-19 = "……哈哈。"
10028025-20 = "不只弄錯時間，還跟其他學校打架……"
10028025-21 = "感覺越來越不像話了……我真是沒臉見人。"
10028025-22 = "……什麼？要我不用在意嗎？"
10028025-23 = "啊哈哈……雖然很謝謝老師這麼說，但以我的立場還是有點……"
10028025-24 = "而且就算這次打贏也不代表事情結束，反而有種和乘務員對立的感覺……"
10028025-25 = "在這裡！這邊！"
10028025-26 = "包圍他們，別讓他們逃了！！"
10028025-43 = "……嗯，就像這樣。"
10028025-47 = "嗯……"
10028025-48 = "繼續在這裡打下去似乎也沒有意義……而且老師也會有危險。"
10028025-49 = "看來只能先乖乖束手就擒了。"
10028025-50 = "等到了格黑娜後再想辦法好好解釋吧……雖然不知道會不會順利就是了。"
10028025-51 = "[s3]「那公文包……」\n[s4]「感覺對方不會那麼配合……」"
10028025-54 = "我也很擔心，但現在也別無選擇了。"
10028025-55 = "越是這種時候，越需要想辦法圓滿地解決……"
10028025-69 = "……嗯？"
10028025-70 = "怎麼回事……？好像聽到了什麼聲音……"
10028025-81 = "……嗯？好像從哪裡傳來了嗶嗶聲？"
10028025-82 = "嗯……不是這裡。好像是後面的車廂？"
10028025-83 = "後面的車廂？那不就是……"
10028025-102 = "……「護送車廂」？"
10028025-103 = "……！！！！！！"
10028025-104 = "等等……！"
10028025-109 = "咳咳！咳！咳咳！咳咳，咳咳……！"
10028025-110 = "怎，怎麼了？這次是爆炸嗎！？今天到底要有多倒楣！？"
10028025-111 = "老，老師……？你沒事吧，老師！？"
10028025-117 = "雖然有及時護住老師……有沒有哪裡受傷……！"
10028025-118 = "[s5]「我沒事。」\n[s6]「多虧有你。謝啦，一花。」"
10028025-121 = "呼……真是萬幸。"
10028025-122 = "話說回來，這到底是怎麼回事……護送車廂為什麼會爆炸……？"
10028025-126 = "後面的車廂好像被炸飛了。"
10028025-127 = "雖然不能說是幸運，但想抓我們的人也都飛走了……"
10028025-128 = "哼嗯～真是奇怪了～"
10028025-129 = "只有這種程度嗎？#n照理說車廂應該直接脫離列車才對……"
10028025-133 = "嗯？好像有人的聲音……？"
10028025-137 = "是炸藥不夠嗎？不，不可能。#n肯定是這些傢伙在這段時間強化了裝甲！！"
10028025-138 = "哈哈！真是意外！這些傢伙還是懂得思考的嘛？#n我喜歡我喜歡！哈～哈哈哈哈！！"
10028025-139 = "[s7]「……『哈～哈哈哈哈』？」\n[s8]「這個笑聲……」"
10028025-142 = "……嗯？誰啊？"
10028025-143 = "哎呀呀～？我還在想是誰呢！原來真的是老師嗎？"
10028025-150 = "沒想到會在這種地方見面啊！哈～哈哈哈哈！！"
10028025-151 = "今天真是太棒了！！真是美好的一天！我喜歡！！非常喜歡！！"
10028025-152 = "呵呵，那應該就不需要再自我介紹了吧？"
10028025-157 = "你是……？"
10028025-158 = "[s9]「佳澄！？你怎麼會……！？」\n[s10]「你為什麼會從那裡出來……？」"
10028025-161 = "咦？是老師認識的人嗎……？"
10028025-162 = "不……等一下。"
10028025-163 = "佳澄？佳澄，佳澄……好像在哪裡聽過……"
10028025-164 = "哈……！劈頭就問原因嗎？#n這樣是不是有點太老套了？"
10028025-165 = "至少也先炒熱一下氣氛嘛。#n很久沒有以這種戲劇性的方式見面了不是嗎？呵呵呵呵……"
10028025-166 = "佳澄……佳澄……啊。"
10028025-167 = "鬼怒川佳澄……？"
10028025-171 = "不正是格黑娜的懸賞通緝犯嗎……？"
10028025-173 = "哈～哈哈哈哈！#n真是的，居然有這麼多人認出我，感覺自己就像藝人一樣啊！十分感謝！！"
10028025-174 = "這，這樣啊。你能感到高興真是太好了……只不過……"
10028025-175 = "那就更不需要自我介紹了！#n話說……"
10028025-176 = "老師怎麼會跑到這種窮鄉僻壤的地方？"
10028025-182 = "……而且還是跟這位可愛的三一小姑娘一起。"

[translation]
10028025-9 = "*huff* *puff*..."
10028025-10 = "So, uh, Sensei..."
10028025-11 = "I just really want to emphasize..."
10028025-12 = "I know this looks bad, but this is not how I wanted any of this to play out. I swear..."
10028025-13 = "[s1] \"All you did was beat up a hostile train crew.\"\n[s2] \"It's not as if they welcomed you with open arms.\""
10028025-19 = "Haha. Right..."
10028025-20 = "First, I get the train timetable completely wrong. Then, I go and attack students from another academy."
10028025-21 = "I'm not making the best impression on you. I guess I can't talk my way out of this one."
10028025-22 = "...Huh? I'm doing just fine?"
10028025-23 = "Haha... Again, I appreciate the sentiment, but that's a little difficult for me to accept."
10028025-24 = "And we're not exactly in the clear yet. It feels a little like it's us versus...the entire train."
10028025-25 = "This way! They're here!"
10028025-26 = "You're surrounded! Don't even think about trying to make a break for it!"
10028025-43 = "...As I was saying."
10028025-47 = "Let me think... Um..."
10028025-48 = "I don't want this to turn into an all-out brawl, especially with you here, Sensei. You could get injured."
10028025-49 = "Maybe it would be best to just surrender at this point."
10028025-50 = "They'll take us to Gehenna, and we'll try to talk it out then...theoretically?"
10028025-51 = "[s3] \"I don't think they'll let us just waltz off with your bag...\"\n[s4] \"You don't seem very confident in your theory...\""
10028025-54 = "Well, the situation isn't exactly ideal, but I'm fresh out of ideas."
10028025-55 = "We're taught de-escalation above all else at the Justice Task Force, so..."
10028025-69 = "Huh?"
10028025-70 = "What was that? Did you hear that sound?"
10028025-81 = "Is something...beeping?"
10028025-82 = "I think so, but not in this car. It's coming from behind us...?"
10028025-83 = "Behind...? Wait, wait. Behind us is..."
10028025-102 = "The transport train car..."
10028025-103 = "...!!!!!"
10028025-104 = "Wait! That would mean—"
10028025-109 = "Argh! Ugh! *cough* *cough*"
10028025-110 = "What is going on today?! First I get on the wrong train entirely, and then it explodes?"
10028025-111 = "Wait, Sensei? Sensei! Are you okay?! Are you injured anywhere?"
10028025-117 = "The blast happened too quickly for me to cover you entirely... I'm so sorry."
10028025-118 = "[s5] \"Not a scratch on me.\"\n[s6] \"You kept me safe, Ichika.\""
10028025-121 = "Thank goodness. That's one good thing, at least."
10028025-122 = "Didn't the workers act like the car behind us was important? A transport train car? I hope they're okay..."
10028025-126 = "Um... Don't look, Sensei, but all the train cars behind us are...gone."
10028025-127 = "And so are the people who were trying to arrest us. A win-lose, I guess?"
10028025-128 = "Hm... Hmm. Pecuuuliar."
10028025-129 = "That's all the damage I managed? I was expecting more of a KA-BOOM of destruction! Train blasted into oblivion!"
10028025-133 = "Did you hear that? Am I losing it?"
10028025-137 = "Hm. I never miscalculate. I had enough firepower! They must have actually enhanced the train's armor!"
10028025-138 = "You telling me these kids have brains?! A plot twist! I like it! Heh, I like it a lot! Wahahaha!"
10028025-139 = "[s7] \"I've heard that 'Wahaha' in my nightmares...\"\n[s8] \"Please don't tell me...\""
10028025-142 = "Huh? What am I looking at here?!"
10028025-143 = "Do my eyes deceive me? Sensei?! Now this one I didn't see coming!  "
10028025-150 = "Fancy seeing you here! Wahaha!"
10028025-151 = "I knew today was gonna be a good one! I! Like! It!"
10028025-152 = "That makes this easy! We can skip the introductions. Heeheehee."
10028025-157 = "...I'm a bit lost."
10028025-158 = "[s9] \"Kasumi?! Where did you even come from?\"\n[s10] \"How and why are you here, Kasumi?!\""
10028025-161 = "An acquaintance of yours, Sensei?"
10028025-162 = "Wait, hold on."
10028025-163 = "Did you say Kasumi? Kasumi... That name rings a bell."
10028025-164 = "Hah! Your first move is to barrage me with questions? Lame! Just roll with it, Sensei!"
10028025-165 = "I mean, this is a movie moment! Our long-awaited reunion, and it's all super dramatic! Heeheehee."
10028025-166 = "Kasumi... I know I've heard it some— Wait a second."
10028025-167 = "Kinugawa Kasumi...?"
10028025-171 = "High-profile, wanted criminal from Gehenna Academy, Kinugawa Kasumi?"
10028025-173 = "Wahaha! You're too kind, thank you, thank you! I feel like a total rockstar right now! Do you want my autograph?"
10028025-174 = "U-Uh... I think I'm good... Thanks though..."
10028025-175 = "My reputation truly precedes me! Wahaha! Moving on! Sensei..."
10028025-176 = "Why're you all the way out here in the sticks?"
10028025-182 = "...With an adorable little Trinity student at that."

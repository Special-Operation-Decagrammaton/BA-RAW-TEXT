[translation]
22210-1 = "Episode 21; What's in a Name?"
22210-2 = "[ns] \"Neru! Good luck!\""
22210-4 = "...Neru! None of your attacks will work against my weapon!"
22210-5 = "You're seriously injured. Your resistance is meaningless at this point!"
22210-6 = "*sigh*"
22210-7 = "I don't care about any of that."
22210-8 = "I made up my mind a long time ago."
22210-9 = "I'm going to defeat you right here, right now."
22210-11 = "Why bother doing things the hard way?"
22210-12 = "I can just go save the kid..."
22210-13 = "...after I beat you up."
22210-15 = "You hear? We're going to save Aris!"
22210-16 = "All right, kids! Commence the second revenge match of the upperclassmen!"
22210-17 = "Asuna!"
22210-18 = "...?!"
22210-19 = "That's me! Haha! Attack!"
22210-23 = "This is nothing...!"
22210-33 = "...?! She dodged everything...?!"
22210-34 = "Yes! It's called wild intuition!"
22210-35 = "Karin."
22210-39 = "Sniping out of sight...!"
22210-44 = "That kind of attack won't work on me...!"
22210-56 = "...Akane! Push forward! Destroy them!"
22210-57 = "Yes, President!"
22210-67 = "Breaking down the door with a series of attacks and entering the tower...?!"
22210-68 = "But how...?"
22210-70 = "It won't be easy..."
22210-71 = "Right, it's not gonna be easy..."
22210-72 = "Hahaha! What kind of a messy strategy is that?"
22210-74 = "I-I know. Let's just scratch that..."
22210-75 = "No, we're gonna do it."
22210-76 = "Th-That strategy?!"
22210-78 = "Are you sure? This is all just theoretical...  "
22210-79 = "Ha, I know, but it's a strategy from Miss Forehead."
22210-80 = "M-Miss Forehead?"
22210-81 = "Even in a moment of crisis, she always has the courage to act for the sake of her friends."
22210-82 = "Why would I not accept a strategy from someone like that?"
22210-83 = "Oh! Neru! You know a lot about Yuzu!"
22210-84 = "Is that because you were defeated by Yuzu in a ton of games?"
22210-85 = "Why are you talking about that now, huh?!"
22210-86 = "But, President... What about your injuries...?!"
22210-87 = "What about them? I can't disappoint the others' expectations. I'd take a hit to my pride if I did that."
22210-88 = "Don't worry about dumb things."
22210-89 = "So, what about you guys? I won't force you to do anything."
22210-90 = "We..."
22210-91 = "...We'll always follow our president."
22210-92 = "Yeah! I'll follow our little president's orders!"
22210-94 = "But are you sure this strategy can be executed with just C&C...?"
22210-95 = "Yes, we can do it."
22210-96 = "...If we get to fight again, it'll be different from last time."
22210-97 = "[s] \"If everyone says so...okay.\""
22210-98 = "So have we all agreed on this mess of a strategy?"
22210-99 = "Then I know a perfect place for us."
22210-100 = "That place is..."
22210-120 = "[ns] \"Just a little more...! The destination is near!\""
22210-123 = "(This is reckless.)"
22210-124 = "(It's not a rational decision.)"
22210-125 = "(It's a fact that C&C and Sensei have already been defeated once by Toki's weapon.)"
22210-126 = "(So, if I think about it rationally...naturally, the next strategy would be a detour, not a frontal breakthrough.)"
22210-127 = "(If this is...[USERNAME] Sensei's strategy...)"
22210-131 = "Toki! I permit use of the main armament of the weapon!"
22210-132 = "Yes, ma'am."
22210-136 = "Power is being concentrated at the central tower at lightning speed! Everyone, watch out...!"
22210-147 = "[ns1] \"Was that...a laser?\"\n[ns2] \"They were hiding something like this...?!\""
22210-153 = "(What did I just do...?)"
22210-154 = "(Did I change my mind not based on a percentage or data...)"
22210-155 = "(...But rather based on a feeling that I sensed something ominous...?)"
22210-156 = "(No way. There's no way I'd make such an irrational decision... I must be mistaken.)"
22210-157 = "[s] \"...Rio.\""
22210-158 = "...This is the end."
22210-159 = "The results are already determined. No one can change a future calculated with data."
22210-160 = "Schale Sensei. You must have known that you had no chance of defeating us after the first time you were defeated."
22210-161 = "I don't understand what made you try again and again."
22210-162 = "It's meaningless and irrational."
22210-163 = "If you've barged carelessly into this, even forcing your injured students to continue attacking..."
22210-164 = "...I'll be very disappointed in you."
22210-165 = "[s] \"True...\""
22210-166 = "Sensei never ordered us to do any of that."
22210-167 = "Akane?"
22210-168 = "I'd like to first correct the way you're thinking about this."
22210-169 = "We didn't fight with the chance of winning or with any data in mind."
22210-170 = "Huh?"
22210-173 = "President."
22210-174 = "Huh? What is it?"
22210-175 = "Like I said, the chance of this strategy being successful is very low."
22210-176 = "And you're fighting with such bad injuries..."
22210-177 = "Who cares."
22210-178 = "I don't care about my odds of winning."
22210-179 = "You and Sensei can worry about that stuff."
22210-181 = "What's important is if we really want to save our friend or not. That's all!"
22210-185 = "...Heehee."
22210-186 = "I've been thinking about this for a while... You've changed a bit, President."
22210-187 = "That's probably since..."
22210-188 = "...meeting those kids..."
22210-192 = "Anyway...you're going on an adventure to rescue a friend who was kidnapped."
22210-193 = "Right... It's like..."
22210-194 = "You're a main character in a game."
22210-196 = "And all you want is to save your friend."
22210-197 = "..."
22210-198 = "Oh, by the way, President Rio. I hope you didn't forget..."
22210-199 = "Neru's other name and its meaning."
22210-200 = "Call sign Double O."
22210-201 = "That name is a symbol of victory for Millennium."
22210-202 = "...?!"
22210-208 = "I got it."
22210-210 = "How can you move after being hit like that?!"
22210-211 = "Unfortunately, this isn't my first rodeo!"
22210-215 = "I hacked the cargo elevator of the central tower!"
22210-216 = "[ns] \"Neru! Now!\""
22210-223 = "The elevator...? Then their destination is...?!"
22210-225 = "This is the idea Momoi mentioned."
22210-226 = "Who? Me?!"
22210-227 = "If we use the elevator...maybe..."
22210-229 = "...!!!"
22210-230 = "Wait, the weapon's weakness...! Could it be?!"
22210-232 = "Toki! Get out of there! They're going to...!"
22210-233 = "They're trying to paralyze the weapon's evasion systems by using the elevator's gravity?!"
22210-234 = "It's too late."
22210-240 = "I'm pretty sure I've warned you before."
22210-242 = "There's no one in Kivotos who can defeat me in a melee battle."
22210-245 = "..."
22210-246 = "Oh... Maybe I forgot to tell you that. It doesn't matter, though."
22210-251 = "Now! Operate the elevator! The speed should be..."
22210-252 = "...ten times the gravitational acceleration!"
22210-261 = "...The evasion system is paralyzed."
22210-262 = "...All right, now."
22210-263 = "Let's fight without cheating, underclassman."
22210-268 = "*sigh* ...It's over."
22210-283 = "Hmph..."
22210-284 = "Ha, she wasn't even a big deal."
22210-291 = "That's..."
22210-292 = "...the most powerful fighter in Millennium..."
22210-294 = "Double O..."
22210-297 = "Next Episode; Pavane for a Princess 1"

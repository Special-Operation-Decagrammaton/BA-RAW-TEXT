[translation]
22210-1 = "ตอนที่ 21;ความหมายของชื่อนั้น"
22210-2 = "[ns] \"เนรุ! ฝากด้วยนะ!\""
22210-4 = "...รุ่นพี่เนรุ! ไม่ว่าจะโจมตีมาแบบไหน ก็ทำอะไร <อาวุธ> ของฉันไม่ได้หรอกค่ะ!"
22210-5 = "ร่างกายบาดเจ็บตั้งขนาดนั้น จะฝืนทนไปก็มีแต่จะเปล่าประโยชน์เสียเปล่านะคะ!"
22210-6 = "...เฮอะ!"
22210-7 = "รู้ดีจังเลยนะ แล้วเรื่องนี้ล่ะรู้หรือยัง?"
22210-8 = "เรื่องที่ฉันตัดสินใจมาแล้ว"
22210-9 = "ว่าจะโค่นพวกเธอลงตรงนี้ให้ได้!"
22210-11 = "เบื่อชะมัด อะไรที่น่ารำคาญเนี่ย"
22210-12 = "จะบอกอะไรให้นะ เรื่องไปช่วยเด็กน้อยนั่นน่ะ..."
22210-13 = "ไว้ค่อยไป 'หลังจาก' ที่ฉันจัดการเธอไปแล้วก็ยังได้"
22210-15 = "แล้วค่อยไปพาเด็กน้อยออกมาไงล่ะ!"
22210-16 = "เอาละ รุ่นน้อง! นี่คือนัดแก้แค้นครั้งที่ 2 ของพี่!"
22210-17 = "อาสึนะ!!"
22210-18 = "......?!"
22210-19 = "อื้ม! อ่ะฮ่าฮ่า! บุกเลย...!"
22210-23 = "แค่การโจมตีเบาๆ แค่นี้...!"
22210-33 = "......?!  หลบได้หมดเลยเหรอ...?!"
22210-34 = "อื้ม! หรือจะต้องเรียกว่า... เป็นสัญชาตญาณสัตว์ป่า?"
22210-35 = "คาริน"
22210-39 = "ลอบยิง... นอกทัศนวิสัย!"
22210-44 = "ต่อให้โจมตีต่อเนื่องแบบนั้น...!"
22210-56 = "...อาคาเนะ! ฝ่าเข้าไปทั้งแบบนี้แหละ! เอาให้หงายเลย!"
22210-57 = "ได้ค่ะ! หัวหน้า...!"
22210-67 = "โจมตีอย่างต่อเนื่องจนประตูพัง แล้วบุกรุกเข้ามาถึงด้านในหอคอยงั้นเหรอ...?"
22210-68 = "ทำได้ยังไง...?"
22210-70 = "มันไม่ง่ายอย่างที่พูดหรอกนะ..."
22210-71 = "นั่นสิคะ มันไม่ง่ายเลยนะคะ..."
22210-72 = "อ่ะฮะฮะ~! ปฏิบัติการนี้มันไม่ดูเละเทะไปหน่อยเหรอ?"
22210-74 = "นะ... นั่นน่ะสินะ ถ้างั้นปัดตกเรื่องไอเดียของฉันไปเถอะ..."
22210-75 = "ไม่เอา ฉันจะทำ"
22210-76 = "ทะ... ทำตามแผนการนี้เนี่ยนะคะ?!"
22210-78 = "...จะไม่เป็นอะไรแน่เหรอ? ถึงเราจะคุยกันจนเกิดแผนการนี้ออกมา แต่เรื่องราวทั้งหมดล้วนมาจากข้อ#nสันนิษฐานของเราเองนะ "
22210-79 = "เฮอะ เรื่องนั้นฉันเองก็รู้ดีอยู่แล้วแหละน่า แต่นี่มันก็ไม่ใช่แผนของใครอื่น แต่เป็นของยัยเด็กหัวเหม่ง#nคนนั้นเลยนะ"
22210-80 = "หะ... หัวเหม่ง...?"
22210-81 = "ถึงจะเป็นช่วงวิกฤต แต่เพื่อเพื่อนแล้วก็จะไม่ท้อถอย และแสดงความกล้าหาญออกมา"
22210-82 = "แล้วจะไม่ให้ซื้อแผนการของคนที่มีจิตใจองอาจแบบนี้ได้ยังไงกันล่ะ?"
22210-83 = "อ๊ะ! รุ่นพี่เนรุรู้จักยูสึเป็นอย่างดีเลยนะเนี่ย!"
22210-84 = "หรือว่าจะ... เป็นเพราะเจ็บมาเยอะจากการเล่นเกมกับยูสึ?"
22210-85 = "มันใช่เวลามาพูดเรื่องแบบนั้นที่ไหนห้ะ?! ยัยเด็กนี่!"
22210-86 = "แต่ว่า.... หัวหน้าจะไปทำอย่างนั้นได้เหรอ..."
22210-87 = "หืม? พูดอะไรน่ะ? ฉันทรยศต่อความคาดหวังของพวกนั้น... จะให้ไปชูคออย่างองอาจก็คงจะไม่ได้"
22210-88 = "ของแบบนี้ต้องเอาชนะด้วยการรวมพลังกัน"
22210-89 = "แล้วพวกเธอล่ะจะเอายังไง? ฉันจะไม่บังคับให้ฝืนทำหรอกนะ"
22210-90 = "พวกเรา..."
22210-91 = "...ช่วยไม่ได้นะคะ ถ้ามันเป็นการตัดสินใจของหัวหน้าแล้วละก็..."
22210-92 = "อื้ม! ถ้าเป็นคำสั่งของหัวหน้าตัวเล็กของเรา! ก็ต้องทำตามสิ!"
22210-94 = "แต่มีแค่ C&C จะไหวเหรอ... "
22210-95 = "ค่ะ ถ้าเป็นการตัดสินใจอย่างเด็ดเดี่ยวแล้ว"
22210-96 = "ถึงจะต้องสู้ห้ำหั่นกว่าเดิม แต่ผลจะออกมาแตกต่างจากครั้งก่อนค่ะ"
22210-97 = "[s] \"ถ้าทุกคนพร้อมใจกันอย่างนั้น... ครูก็เอาด้วย\""
22210-98 = "...ทุกคนเห็นด้วยกับแผนการมั่วๆ นี้ใช่ไหม?"
22210-99 = "ถ้าอย่างงั้นมันก็มีที่ที่เหมาะสมอยู่พอดี"
22210-100 = "และที่นั่นก็คือ..."
22210-120 = "[ns] \"อีกนิดเดียว...! จุดหมายอยู่ตรงหน้าแล้ว!\""
22210-123 = "(ประมาทกันเกินไปแล้ว)"
22210-124 = "(นี่ไม่ใช่ทางเลือกที่สมเหตุสมผล)"
22210-125 = "(C&C กับครูจากชาเล่ต์พ่ายแพ้ให้กับ <อาวุธ> ของโทคิไปแล้วหนึ่งครั้ง นี่คือความจริงที่ไม่เปลี่ยนแปลง)"
22210-126 = "(ถ้าลองคิดอย่างมีเหตุผล...  กลยุทธ์ต่อไปที่พวกนั้นจะใช้ก็คือการบุกเข้ามาแบบอ้อมๆ แทนการเข้ามา#nอย่างซึ่งๆ หน้า)"
22210-127 = "(ถ้าหากว่านี่... คือแผนการของครู [USERNAME] แล้วละก็...)"
22210-131 = "โทคิ!! ฉันอนุญาตให้เธอใช้อาวุธหลักได้!!"
22210-132 = "ค่ะ มาดาม"
22210-136 = "ทางนู้นกำลังรีบรวบรวมกำลังไปที่หอคอยกลาง! ทุกคนระวังด้วย...!"
22210-147 = "[ns1] \"เมื่อกี้มัน... เลเซอร์... เหรอ...?\"\n[ns2] \"ซ่อนอะไรแบบนี้ไว้เหรอเนี่ย...?\""
22210-153 = "(อะไรน่ะ... เมื่อกี้มัน...?)"
22210-154 = "(นั่นมันไม่ใช่การตัดสินใจจากอัตราการชนะหรือข้อมูลอื่นแน่ๆ...)"
22210-155 = "(หรือเป็นเพราะรู้สึกว่าลางสังหรณ์ใจไม่ดี... เลยทำให้การตัดสินใจเปลี่ยนไป...?)"
22210-156 = "(ไม่หรอก... ไม่มีทาง ฉันจะตัดสินใจอย่างไร้เหตุผลแบบนั้นได้ไง... มันคงเป็นแค่ความผิดพลาดของ#nประสาทสัมผัส)"
22210-157 = "[s] \"......ริโอะ\""
22210-158 = "...พอแค่นี้เถอะ"
22210-159 = "ผลที่ได้จาก <อาวุธ> ไม่มีทางผันแปร ไม่มีใครสามารถพลิกอนาคตที่มาจากการคำนวณข้อมูลได้"
22210-160 = "ครูจากชาเล่ต์ คุณเองก็น่าจะรู้ตั้งแต่ตอนที่พ่ายแพ้ต่อ <อาวุธ> แล้วนะ ว่าอัตราการชนะของพวกคุณ#nมันเป็นศูนย์"
22210-161 = "ฉันไม่เข้าใจเลยว่าทำไมคุณถึงเชื่อและตัดสินเอาว่าคุณจะชนะพวกฉันได้"
22210-162 = "มันช่างไร้ความหมาย ไม่มีเหตุผลเอาเสียเลย"
22210-163 = "ถ้าการคิดไปเองคนเดียวแบบนั้น มันทำให้นักเรียนที่มีแผลเต็มตัวต้องมาทนเจ็บตัวในการต่อสู้อีกละก็"
22210-164 = "คงต้องบอกเลยว่ามันช่างน่าผิดหวังจริงๆ..."
22210-165 = "[s] \"เรื่องนั้นน่ะ...\""
22210-166 = "คุณครูไม่เคยสั่งให้พวกเราฝืนทำค่ะ"
22210-167 = "อาคาเนะ?"
22210-168 = "ฉันว่าต้องมีการปรับความเข้าใจกันหน่อยแล้วละค่ะ"
22210-169 = "พวกฉันไม่ได้มาสู้เพราะเชื่อในเรื่องอัตราการชนะหรือข้อมูลอะไรพวกนั้นหรอกนะคะ"
22210-170 = "...ว่าไงนะ?"
22210-173 = "หัวหน้าคะ"
22210-174 = "หืม? เรียกทำไม?"
22210-175 = "ก็อย่างที่เคยบอกค่ะ ว่าแผนการที่จิฮิโระพูดถึงมีความเป็นไปได้ที่จะประสบความสำเร็จน้อยมาก"
22210-176 = "แต่ว่าหัวหน้าก็ยังแบกร่างกายที่มีแต่บาดแผลแบบนี้ออกมา..."
22210-177 = "แล้วมันยังไงล่ะ"
22210-178 = "อัตราชนะ ความเป็นไปได้ เรื่องเล็กๆ น้อยๆ พรรค์นั้นฉันไม่สนใจหรอก"
22210-179 = "เรื่องแบบนั้นฝากให้เธอหรือครูจัดการซะก็สิ้นเรื่อง"
22210-181 = "เรื่องที่สำคัญน่ะ คือ \"อยากช่วยชีวิตหรือเปล่า\" แค่นั้นต่างหากเล่า"
22210-185 = "ฮุฮุ..."
22210-186 = "เป็นอย่างที่คิดไว้ก่อนหน้านี้เลย หัวหน้าเปลี่ยนไปนิดหน่อยอยู่เหมือนกันนะคะเนี่ย"
22210-187 = "นั่นคงเป็นมาตั้งแต่..."
22210-188 = "หลังจากวันที่ได้พบกับเด็กพวกนั้น..."
22210-192 = "แถมยัง... ออกมาผจญภัยด้วยกันเพื่อช่วยเพื่อนที่ถูกจับตัวไป"
22210-193 = "นั่นสินะคะ... แบบนี้มันเหมือนกับ..."
22210-194 = "ตัวเอกในเกมเลยนะคะ"
22210-196 = "ก็แค่อยากไปช่วยเพื่อน... ใช่ค่ะ ก็แค่นั้นเอง"
22210-197 = "......"

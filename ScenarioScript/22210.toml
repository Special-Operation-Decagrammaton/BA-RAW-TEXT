[translation]
22210-1 = "第21話;那個名字代表的是"
22210-2 = "[ns]「寧瑠！拜託妳了！」"
22210-4 = "……不管是怎麼樣的攻擊，對我的「武裝」都是不管用的。"
22210-5 = "以那樣負傷的狀態，繼續抵抗也是沒有意義的！"
22210-6 = "……哈。"
22210-7 = "那種事我才不管呢。"
22210-8 = "我已經決定了。"
22210-9 = "要在這裡，打倒妳……"
22210-11 = "那種麻煩的事我可受不了。"
22210-12 = "既然如此，去救小不點的事──"
22210-13 = "等打倒妳「之後」再做也不遲啊。"
22210-15 = "我要去把小不點帶回來！"
22210-16 = "喂，學妹們！#n這就是我們的復仇賽！"
22210-17 = "明日奈！！"
22210-18 = "……！？"
22210-19 = "是～！#n啊哈哈！突擊～～！"
22210-23 = "這種程度的攻擊……"
22210-33 = "……！？全部，躲開了……！？"
22210-34 = "嗯！#n動物的直覺？該這樣說嗎？"
22210-35 = "花凛。"
22210-39 = "視野外的……狙擊！"
22210-44 = "我怎麼可能被這種程度的攻擊打倒──"
22210-56 = "……朱音！就這樣進行壓制！開炸吧！"
22210-57 = "是！部長！"
22210-67 = "破壞大門並入侵塔的內部……？"
22210-68 = "到底想做什麼……？"
22210-70 = "…………妳所說的，做起來可沒有那麼簡單啊……"
22210-71 = "是啊。與其說簡單……"
22210-72 = "啊哈哈！#n要說這是作戰也太亂來了吧？"
22210-74 = "是，是嗎……果然，還是當我沒說過吧……"
22210-75 = "不，就這麼做吧。"
22210-76 = "要，要執行這種作戰嗎！？"
22210-78 = "……沒問題嗎？#n我剛才所說的，也不過只是假設而已。"
22210-79 = "哈，那種事我也知道。#n但這不是別人，而是那個「高額頭」想出來的作戰啊。"
22210-80 = "高，高額頭……？"
22210-81 = "這傢伙，不管陷入怎樣的危機，都願意為了朋友挺身而出。"
22210-82 = "那種傢伙的作戰，我怎麼可能會不喜歡呢？"
22210-83 = "寧瑠前輩很了解柚子呢！#n什麼時候變的那麼要好了？"
22210-84 = "果然……是因為平時跟柚子玩了很多遊戲嗎？"
22210-85 = "為什麼現在要提那種事啊！？"
22210-86 = "您的意思我了解了。但是部長，您的傷勢實在……！"
22210-87 = "啊？在說什麼啊？不在這時候亂來要在什麼時候亂來啊？#n得要好好回應這些傢伙對我的期待才行。"
22210-88 = "這種程度靠毅力總會有辦法的。"
22210-89 = "──那妳們呢？#n我也不會強迫妳們要一起去。"
22210-90 = "我們……"
22210-91 = "……真沒辦法呢。如果是隊長的決定。"
22210-92 = "嗯！既然是部長的決定，當然要聽從囉～！"
22210-94 = "……但是真的沒問題嗎？光靠C&C執行那個作戰……"
22210-95 = "當然。既然部長是這麼決定的，我們只要遵從就行了。"
22210-96 = "……而且，要再次開始戰鬥的話，準備也會跟上次有所不同。"
22210-97 = "[s]「既然大家都這麼說……我知道了。」"
22210-98 = "……大家，都同意這個作戰吧？"
22210-99 = "我找到了一個適合執行作戰的地方……"
22210-100 = "開始導航囉──出發吧！"
22210-120 = "[ns]「就這樣直直前進……目標就在眼前了！」"
22210-123 = "（太魯莽了）"
22210-124 = "（這絕對不是合理的選擇）"
22210-125 = "（不只是C&C，夏萊的老師也已經輸給季的「武裝」一次了。#n　那是不會改變的事實）"
22210-126 = "（所以，合理的思考……#n　下個作戰自然不會是正面突破，而是會選擇迂迴）"
22210-127 = "（但是，要是這……是夏萊的[USERNAME]老師策劃的作戰……？）"
22210-131 = "季！允許妳使用主砲！"
22210-132 = "是的，主人。"
22210-136 = "電力開始向中央塔集中了！大家，小心──"
22210-147 = "[ns1]「剛才的……那個是雷射……？」\n[ns2]「居然還藏著……這種東西嗎……？」"
22210-153 = "（剛才是怎麼回事……）"
22210-154 = "（不是以勝率或數據做出判斷……）"
22210-155 = "（有不祥的預感……僅僅因為這種理由，變更了判斷……？）"
22210-156 = "（怎麼可能……我不可能做出那種不合理的選擇……#n　只是因為單純產生了錯覺）"
22210-157 = "[s]「……莉央。」"
22210-158 = "……到此為止了。"
22210-159 = "透過「武裝」確定的結果──#n由數據計算出的未來，任何人都無法推翻。"
22210-160 = "夏萊的老師……你在敗給「武裝」的時候就知道了吧。#n能贏過我們的機率是零這件事。"
22210-161 = "即便如此，為何還要挑戰我們……無法理解。"
22210-162 = "如果在某個地方發現了渺茫的可能性，#n那也是沒有意義、非常不合理的行為。"
22210-163 = "如果，是因為那種些微的錯覺，讓已經傷痕累累的學生做這種事的話……"
22210-164 = "……我打從心底，感到失望。"
22210-165 = "[s]「那是……」"
22210-166 = "老師並沒有做出那種指揮。"
22210-167 = "朱音？"
22210-168 = "不對，看來有必要從頭糾正一下認知呢。"
22210-169 = "我們並不是相信著勝率和數據進行戰鬥的。"
22210-170 = "……什麼？"
22210-173 = "部長。"
22210-174 = "啊？怎麼了，朱音。"
22210-175 = "就像剛才說的一樣，#n千尋同學所說的作戰，成功的可能性非常低。"
22210-176 = "卻還是要用那滿身是傷的身體……"
22210-177 = "那又怎樣。"
22210-178 = "勝率和可能性之類的，那種瑣碎的事怎樣都無所謂。"
22210-179 = "那種東西，交給妳或老師總會有辦法的。"
22210-181 = "重要的只有「想不想救出小不點」而已不是嗎？"
22210-185 = "……呵呵。"
22210-186 = "果然，雖然我之前就這麼想了……部長，有點變了呢。"
22210-187 = "……我想。"
22210-188 = "肯定是從遇見那些孩子的那天……一點一滴地。"
22210-192 = "話說回來……為了拯救被綁架的朋友而踏上冒險。"
22210-193 = "我們，簡直像是……"
22210-194 = "──遊戲的主角一樣呢。"
22210-196 = "想要救出重要的朋友……對，就是這樣而已。"
22210-197 = "……"
22210-198 = "啊，這麼說來莉央會長。#n妳該不會忘記了吧？"
22210-199 = "──寧瑠前輩的另一個名字。"
22210-200 = "代號Double O。"
22210-201 = "我們千年「誓約勝利的象徵」。"
22210-202 = "……！？"
22210-208 = "逮到妳了。"
22210-210 = "正面被主砲擊中居然還可以行動……！？"
22210-211 = "真不巧，不久前才吃了一發類似的東西啊！"
22210-215 = "已經駭入中央塔的貨物電梯了！"
22210-216 = "[ns]「寧瑠！！就是現在！」"
22210-223 = "電梯……？#n難道，那些孩子的目的地是……！？"
22210-225 = "是，是之前桃井說過的點子。"
22210-226 = "咦！？我嗎！？"
22210-227 = "利用電梯的話……說不定……"
22210-229 = "……！！！"
22210-230 = "「武裝」的缺陷……！#n難道，要用那種方法……！？"
22210-232 = "季！快點從那裡出來！！那些孩子想要……！"
22210-233 = "利用電梯來癱瘓「武裝」的迴避系統！"
22210-234 = "不，已經太遲了。"
22210-240 = "我之前，已經說過了吧？"
22210-242 = "能在我的領域裡擊敗我的人，這個奇普托斯一個也沒有。"
22210-245 = "……"
22210-246 = "啊……我沒跟妳說過嗎？#n算了，這也無所謂。"
22210-251 = "開始加速！"
22210-252 = "提升為重力加速度的10倍！！"
22210-261 = "……迴避系統癱瘓。"
22210-262 = "…………那麼。"
22210-263 = "這樣一來就不能作弊了吧。#n堂堂正正地打一場吧，學妹？"
22210-268 = "唉……結束了嗎。"
22210-283 = "呸……"
22210-284 = "呿，沒什麼大不了的嘛。"
22210-291 = "這就是……"
22210-292 = "千年最強的……"
22210-294 = "Double O……"
22210-297 = "下一話;為王女準備的帕凡舞（１）"

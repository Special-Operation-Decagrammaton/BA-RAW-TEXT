[translation]
2004005-1 = "ซัตสึกิฟังอยู่นะ"
2004005-2 = "(ไม่นานหลังจากได้รับข้อความจากซัตสึกิ...)"
2004005-7 = "สวัสดี ครู!"
2004005-8 = "[s] \"ดูอารมณ์ดีจังเลยนะ ซัตสึกิ...\""
2004005-9 = "ฮุฮุ จะไม่ให้อารมณ์ดีได้ยังไง"
2004005-10 = "ก็โปรเจกต์อัลตร้า NK ที่ยอดเยี่ยมของฉันพัฒนาไปอีกระดับแล้วยังไงล่ะ"
2004005-11 = "ฉันก็เลยตัดสินใจเลือกให้ครูเป็นผู้ทดสอบคนแรกน่ะ"
2004005-15 = "หืม? ไม่ถงไม่ถามความต้องการสักคำงั้นเหรอ?"
2004005-16 = "แน่นอนอยู่แล้ว! นี่จะเป็นเรื่องน่ายินดีสำหรับครูที่เป็นผู้ร่วมมือของแพนเดโมเนียม โซไซตี้เลยละ"
2004005-17 = "ปกติแล้วคนเรามีแนวโน้มที่จะจำได้แต่สิ่งแรกใช่มั้ยล่ะ?"
2004005-18 = "โอกาสในการได้เกียรติเป็นหนูทดลองคนแรกของโปรเจกต์อัลตร้า NK ที่สมบูรณ์น่ะไม่ได้มีบ่อยๆ หรอกนะ"
2004005-19 = "[s] \"เมื่อกี้ว่าอะไรนะ? หนูทดลองงั้นเหรอ?\""
2004005-20 = "ข้ามเรื่องเล็กๆ น้อยๆ ไปเถอะน่า ฉันได้เรียนรู้อะไรบางอย่างจากครั้งที่ผ่านมาด้วยนะ"
2004005-21 = "ครูเป็นคนที่ไม่หวั่นไหวต่อการข่มขู่และการทรมานง่ายๆ เลยใช่มั้ยล่ะ?"
2004005-22 = "ถ้างั้นก็เหลือแค่วิธีเดียว"
2004005-23 = "เอาละ ตั้งจิตให้มั่นแล้วมาทดสอบโปรเจกต์อัลตร้า NK ที่พัฒนาไปอีกขั้นกันเลย"
2004005-27 = "(สุดท้ายก็โดนซัตสึกิลากมานั่งเก้าอี้อีกตามเคย...)"
2004005-29 = "จากนี้ไปฉันจะทดสอบการสะกดจิตด้วยวิธีต่างๆ ไปตามลำดับ"
2004005-30 = "ฮุฮุ ครูจะทนได้สักแค่ไหนกันนะ?"
2004005-31 = "เริ่มที่วิธีแรก..."
2004005-36 = "เอาละ จ้องมาที่ปลายนิ้วของฉันแล้วตั้งสมาธิ"
2004005-37 = "หมุนไป~ หมุนมา~"
2004005-41 = "[ns] \"นี่มัน...\""
2004005-43 = "[ns] \"วิธีที่ใช้กล่อมให้นอนหลับ...?\""
2004005-44 = "ตั้งใจหน่อย มีสมาธิหน่อยสิ! ผู้ทดสอบเองก็ต้องให้ความร่วมมือเต็มที่เพื่อให้การสะกดจิตเกิดผลนะ!"
2004005-45 = "[s] \"แต่นี่มันไม่แปลกไปหน่อยเหรอ?!\""
2004005-46 = "เอาละ เอาละ หมุนไป~ แล้วก็หมุนมา~~"
2004005-48 = "(ซัตสึกิหมุนนิ้วไปมาอย่างตั้งใจต่อหน้าคุณครูอยู่พักหนึ่ง แต่คุณครูก็แค่เวียนหัวนิดหน่อย ไม่ได้รู้สึก#nว่าโดนสะกดจิตแต่อย่างใด...)"
2004005-50 = "ชิ วิธีนี้ไม่ได้ผลสินะ"
2004005-51 = "แต่ก็ใช่ว่าจะมีวิธีนี้อย่างเดียวหรอกนะ เวลาก็ยังเหลืออีกตั้งมาก"
2004005-52 = "ฉันจะเริ่มที่วิธีต่อไปเลย ตั้งสมาธิให้ดีล่ะครู"
2004005-53 = "เอาละ ดูที่หน้าจอโทรศัพท์ของฉัน"
2004005-54 = "[s] \"นี่มัน...?\""
2004005-55 = "ฮุฮุ พอจะดูออกหรือยังว่าคืออะไร? นี่ก็คือ 'แอปพลิเคชันสะกดจิต' แอปที่รวมเทคโนโลยีของฝ่าย#nข่าวกรองแห่งแพนเดโมเนียม โซไซตี้ไว้"
2004005-60 = "อย่าเบือนหน้าหนีสิ! เพ่งสมาธิไปที่หน้าจอที่หมุนอยู่ตรงกลาง!"
2004005-61 = "เอาละ~ ดูตรงนี้นะ~ ถลำลึกเข้าไป~"
2004005-62 = "ฉันจะเชื่อฟังคำของซัตสึกิ~ ไม่ว่าจะเป็นคำสั่งอะไรก็จะทำตาม~"
2004005-65 = "......"
2004005-66 = "ประมาณนี้ก็น่าจะโดนสะกดแล้วนะ"
2004005-67 = "ครู ลุกขึ้นมาปั่นจิ้งหรีด 200 รอบซิ"
2004005-68 = "[s] \"ใครจะไปทำกันล่ะ\""
2004005-69 = "ชิ ล้มเหลวอีกแล้วเหรอเนี่ย "
2004005-70 = "อุตส่าห์มั่นใจว่าแอปนี้จะทำให้จิตหลุดลอยจนยอมทำตามคำสั่งแท้ๆ..."
2004005-71 = "สมกับที่เป็นครูจังเลยนะ มีพลังจิตเหนือคนทั่วไปจริงๆ"
2004005-72 = "แต่วิธีการและความมุ่งมั่นของฉันก็เกินระดับคนทั่วไปเหมือนกัน เตรียมตัวไว้ได้เลย"
2004005-74 = "(กลเม็ดสะกดจิตของซัตสึกิยังดำเนินต่อไปอีกพักใหญ่...)"
2004005-75 = "(แน่นอนว่าทุกวิธีของเธอไม่ได้ผลเลย)"
2004005-77 = "......"
2004005-78 = "ฮู่ว ต่อให้เป็นถึงครู แต่ก็ไม่คิดเลยนะว่าจะอดทนต่อโปรเจกต์อัลตร้า NK ได้ถึงขนาดนี้"
2004005-79 = "[s] \"เอ่อ... ซัตสึกิ นี่มันก็ดึกแล้ว ครูว่าพอแค่นี้ก่อน...\""
2004005-80 = "ไม่มีทาง! ไม่มีการยอมแพ้อะไรทั้งนั้น!"
2004005-81 = "ในเมื่อเป็นอย่างนี้ ก็ต้องกลับไปที่จุดเริ่มต้น!"
2004005-82 = "[s] \"แต่ครูเหนื่อยแล้วนะ!\""
2004005-83 = "อย่าพูดเหมือนคนอ่อนแอสิ ครู! ที่ผ่านมาก็อดทนมาได้ตั้งขนาดนี้!"
2004005-87 = "(ซัตสึกิมายืนตรงหน้าแล้วเอามือกดไหล่คุณครูให้นั่งลง)"
2004005-88 = "ฮึ่ม นี่เป็นวิธีสุดท้ายแล้ว ถ้าไม้ตายนี้ยังใช้ไม่ได้ผลอีก วันนี้ฉันก็จะยอมกลับไปแต่โดยดี"
2004005-89 = "ถ้าครูตั้งใจจริงละก็ ผลลัพธ์ต้องออกมาไม่เหมือนเดิมอย่างแน่นอน"
2004005-90 = "เอาละ~ ครู ตั้งใจมองตรงนี้นะ"
2004005-95 = "เอาละ จงเชื่อฟังคำของซัตสึกิ... จงทำตามคำสั่งอย่างไม่มีเงื่อนไข..."
2004005-103 = "เอ๋... เดี๋ยวนะ..."
2004005-104 = "เมื่อกี้ฉันเริ่มส่ายจากทางไหนก่อนนะ...?"
2004005-105 = "ทางซ้าย...? หรือว่าทางขวา...?"
2004005-106 = "[s] \"ทางขวา...?\""
2004005-107 = "งั้นนี่ก็ผิดฝั่งน่ะสิ...?!"
2004005-108 = "มะ... ไม่ได้นะ! นี่ฉันกำลังสะกดจิตตัวเองอยู่งั้นเหรอ...!!"
2004005-109 = "[s] \"ซัตสึกิ...?!\""
2004005-112 = "― [log=사츠키]อึก... นี่มันอะไรกัน...?[/log][wa:2410] "
2004005-115 = "― [log=사츠키]ปะ... แปลกจัง... รู้สึกเหมือนต้องทำตามคำสั่งของครูเลย...[/log][wa:5280] "
2004005-118 = "[ns] \"ไหนลองพูดสิว่า [ฉันจะญาติดีกับคณะกรรมการวินัยค่ะ]\""
2004005-120 = "― [log=사츠키]อะ... อ่า... ค่ะ... [/log][wa:2320] "
2004005-122 = "― [log=사츠키]ฉันจะญาติดีกับคณะกรรมการวินัยค่ะ...[/log][wa:6070] "
2004005-125 = "― [log=사츠키]แต่ว่า... ถ้าเป็นมาโคโตะจังละไม่แน่[/log][wa:1870] "
2004005-127 = "― [log=사츠키]แต่ฉันน่ะ ไม่ถึงกับไม่กินเส้นกับทางนั้นนะ [/log][wa:180] "
2004005-130 = "[ns] \"งั้นสัญญามาว่า [ฉันจะไม่รบกวนคุณครูอีกค่ะ]\""
2004005-132 = "― [log=사츠키]หะ... หืม? [/log][wa:890] "
2004005-135 = "― [log=사츠키]อึก... ฉัน... จะไม่รบกวนคุณครูอีกค่ะ อ่า...[/log][wa:8850] "
2004005-138 = "― [log=사츠키]ขะ... ขี้ขลาดชะมัด![/log][wa:800] "
2004005-140 = "― [log=사츠키]เป็นถึงผู้ใหญ่ แต่มาสะกดจิตฉันถึงขนาดนี้เลยเหรอ! [/log][wa:940] "
2004005-143 = "[ns] \"อย่าพูดอะไรให้คนฟังเข้าใจผิดสิ...\""
2004005-145 = "[ns] \"ครูแค่ทำอย่างเดียวกันกับที่ซัตสึกิพยายามทำกับครูเอง?!\""
2004005-147 = "― [log=사츠키]ฮึ่ม สะกดจิตฉันเหรอเนี่ย... [/log][wa:2910] "
2004005-149 = "― [log=사츠키]จะประมาทไม่ได้แล้วสินะ ครูน่ะ[/log][wa:1740] "
2004005-152 = "― [log=사츠키]ว่าไงล่ะ? อยากเข้าร่วมโปรเจกต์อัลตร้า NK ของฉันแล้วหรือยัง? [/log][wa:2440] "
2004005-155 = "[ns] \"ทีนี้ก็... ช่วยเขยิบไปหน่อยได้มั้ย...?\""
2004005-157 = "― [log=사츠키]ค่ะ ค่า... ไม่ว่าคำสั่งไหน...[/log][wa:2560] "
2004005-160 = "อึก... เป็นสถานการณ์ที่น่าอับอายจริงๆ เลย"
2004005-161 = "แถมนี่ยังเป็นการสะกดจิตที่จริงใจมาก แบบนี้น่าจะมีผลนานเลยด้วย..."
2004005-162 = "ถ้างั้นฉันก็ต้องเชื่อฟังทุกคำสั่งของครูอย่างหลีกเลี่ยงไม่ได้น่ะสิ..."
2004005-166 = "[ns] \"ว่าแต่ทำไมซัตสึกิถึงอยากควบคุมจิตใจคนอื่นขนาดนี้เหรอ?\""
2004005-167 = "หืม...?"
2004005-168 = "เรื่องนั้นมัน..."
2004005-169 = "ก็เพื่อความสงบสุขของโลกน่ะ"
2004005-170 = "[s1] \"เหตุผลฟังดูเหลือเชื่อเลยแฮะ?!\"\n[s2] \"ช่วยอธิบายอีกหน่อยได้มั้ย?\""
2004005-173 = "ก็ถ้าโลกสงบสุข ก็จะไม่มีเรื่องให้เราต้องเจ็บปวดยังไงล่ะ"
2004005-174 = "ใช่ ฉันน่ะ..."
2004005-175 = "ไม่ชอบความเจ็บปวด!! ไม่ชอบเอาเสียมากๆ เลย!!"
2004005-176 = "ไม่ชอบยิ่งกว่าการมีอะไรเปื้อนเสื้อสีขาว หรือตอนที่กดข้ามโฆษณาไม่ได้อีก!!"
2004005-177 = "ฉันไม่ชอบการถูกยิง ไม่ชอบโดนสะเก็ดระเบิด ไม่ชอบอะไรที่ต้องเจ็บตัวแบบนี้เลย!!"
2004005-178 = "[s] \"ครูเองก็ด้วย... ว่าแต่มันเกี่ยวกับความสงบสุขของโลกยังไงเหรอ?\""
2004005-181 = "ก็ถ้าฉันควบคุมจิตใจของคนอื่นได้ ฉันก็ห้ามไม่ให้เกิดเรื่องแบบนั้นได้ยังไงล่ะ"
2004005-182 = "อื้อ ฉันจะห้ามไม่ให้ทุกคนใช้ปืน แล้วก็จะห้ามไม่ให้ปาระเบิดทุกที่ตามอำเภอใจด้วย"
2004005-183 = "แล้วก็จะทำให้อิบูกิกับมาโคโตะจังไม่ต้องปวดหลังด้วย"
2004005-184 = "ฮุฮุ โปรเจกต์อัลตร้า NK มีจุดเริ่มต้นมาจากความคิดแบบนั้นละ"
2004005-185 = "การควบคุมผู้คนตามใจปรารถนา เพื่อทำให้คิโวทอสเป็นโลกที่ไร้ความเจ็บปวด!!"
2004005-186 = "นี่ละเป้าหมายสูงสุดของฉัน!!"
2004005-187 = "[s] \"ถึงวิธีจะแปลก แต่ก็ฟังดูเป็นปณิธานที่ยิ่งใหญ่เลยนะ!!\""
2004005-188 = "ครูเป็นคนแรกเลยนะที่ได้รู้ว่าเป้าหมายสูงสุดของฉันคืออะไร..."
2004005-189 = "ฉันไม่เคยคิดจะบอกใครเลยแท้ๆ"
2004005-190 = "เฮ้อ... ทีนี้จะมอบความอับอายขายหน้าอะไรให้ฉันอีกล่ะ?"
2004005-191 = "คำสั่งต่อไปคืออะไร?! ฉันเตรียมใจไว้แล้ว บอกมาเลย!!"
2004005-192 = "[s] \"เอาละ ทีนี้ก็กลับไปพักผ่อนได้\""
2004005-193 = "อึก กะไว้แล้วว่า..."
2004005-197 = "หืม...?"
2004005-198 = "ไม่ได้จะล้วงความลับของฝ่ายข่าวกรองแห่งแพนเดโมเนียม โซไซตี้ หรือจะสั่งให้ทำอะไรอย่างอื่น#nหรอกเหรอ?"
2004005-199 = "นี่เป็นโอกาสหายากที่จะได้ควบคุมฉันเลยนะ... ถ้าสั่งกันแบบนี้ ฉันอาจจะกลับไปแล้วพักผ่อนเต็มอิ่ม#nจริงๆ ก็ได้นะ?"
2004005-200 = "ตอนนี้ร่างกายของฉันก็เคลื่อนไหวตามคำสั่งและกำลังจะเดินออกจากที่นี่แล้วด้วยนะ?"
2004005-201 = "[s] \"อื้อ วันนี้เหนื่อยมามากแล้วละ ซัตสึกิ กลับดีๆ นะ\""
2004005-202 = "......"
2004005-203 = "ครูเป็นคนอย่างนี้สินะ ฮุฮุ ไม่สนใจแม้แต่ช่วงเวลาที่ดีที่สุด"
2004005-207 = "ความใจกล้าแบบนี้ละ ที่แพนเดโมเนียม..."
2004005-211 = "(ซัตสึกิเหมือนจะพูดอะไรต่อ แต่เธอก็หันหลังแล้วเดินออกจากห้องไปจนได้ฟังไม่จบประโยค...)"

[translation]
2004005-1 = "皐月在聽"
2004005-2 = "（在接到皐月的聯絡不久之後……）"
2004005-7 = "你好，老師！"
2004005-8 = "[s]「你看起來心情很好呢，皐月……」"
2004005-9 = "呵呵，那當然囉。"
2004005-10 = "畢竟偉大的NK-ULTRA計畫獲得了突破性的進展。"
2004005-11 = "因此，我決定讓老師成為第一位實驗者。"
2004005-15 = "嗯？問我在不在意老師的意願？"
2004005-16 = "當然不在意！#n老師可是萬魔殿的候補合作者，這對你來說也是件值得慶幸的事吧！"
2004005-17 = "況且，人們本來就傾向於記住第一個對吧？"
2004005-18 = "能成為NK-ULTRA計畫改良後的第一個實驗體，這種光榮的機會可不是隨時都有哦。"
2004005-19 = "[s]「你剛剛是不是說了實驗體？」"
2004005-20 = "別在意那種小事。#n我從上次的經驗中領悟到了一點。"
2004005-21 = "既然一般的威脅或拷問都對老師不管用……"
2004005-22 = "那麼就只剩下一種方法了。"
2004005-23 = "來，我們換個思維，體驗一下獲得進展後的NK-ULTRA計畫吧。"
2004005-27 = "（又一次被皐月催著坐到了椅子上……）"
2004005-29 = "接下來，我會依序嘗試各種催眠手段。"
2004005-30 = "呵呵，老師究竟能撐到哪一步呢？"
2004005-31 = "首先是第一個……"
2004005-36 = "來，看這邊。#n把注意力集中在我的手指上吧。"
2004005-37 = "轉呀轉～轉呀轉～"
2004005-41 = "[ns]「這是……」"
2004005-43 = "[ns]「捉蜻蜓時用的方法……？」"
2004005-44 = "專心專心！#n實驗者也要全力配合，這樣才能產生良好的催眠效果呀！"
2004005-45 = "[s]「那有點奇怪吧！？」"
2004005-46 = "來來來。#n轉呀轉～轉呀轉～"
2004005-48 = "（雖然皐月努力轉手指轉了好一陣子，#n　卻只讓人覺得有點頭暈，並沒有發揮催眠的效果……）"
2004005-50 = "呿，看來這麼做行不通。"
2004005-51 = "不過這只是眾多方法中的一種而已。#n現在時間還很充裕。"
2004005-52 = "我馬上開始進行下一個，麻煩你保持專注到最後一刻囉，老師。"
2004005-53 = "來，看著這個手機畫面吧。"
2004005-54 = "[s]「這是……」"
2004005-55 = "呵呵，猜到這是什麼了嗎？#n這是集萬魔殿情報部的技術力於大成的「催眠App」。"
2004005-60 = "不可以移開視線！專心看著中央旋轉的畫面！"
2004005-61 = "來，看這邊～陷進去吧～"
2004005-62 = "老師將會聽從我的命令～服從我的任何命令～"
2004005-65 = "……"
2004005-66 = "現在差不多完全生效了吧。"
2004005-67 = "老師，站起來後擺出大象鼻子的樣子做200次後空翻吧。"
2004005-68 = "[s]「誰做得到啦！」"
2004005-69 = "呿，這次也失敗了嗎。"
2004005-70 = "明明跟我掛保證說這個App能把任何人都迷的暈頭轉向的……"
2004005-71 = "不愧是老師。精神力果然遠超常人。"
2004005-72 = "但我的手段和決心也是一樣！做好覺悟吧！"
2004005-74 = "（於是皐月一連串的催眠術表演又持續了一段時間……）"
2004005-75 = "（當然全都沒有效果）"
2004005-77 = "……"
2004005-78 = "唉，就算是老師，我也沒料到你居然能抵抗NK-ULTRA計畫到這種地步。"
2004005-79 = "[s]「那個，皐月。時間也不早了，不如就到此為止吧……」"
2004005-80 = "不行！還不能放棄！"
2004005-81 = "既然如此，是時候回歸初心了。"
2004005-82 = "[s]「我剛才的意思是我累了耶！？」"
2004005-83 = "別說那種軟弱的話，老師！#n你不是已經努力忍到現在了嗎！"
2004005-87 = "（肩膀被皐月從正面緊緊地按住）"
2004005-88 = "哼，這是最後的方法了。#n如果連這個都不管用的話，今天就到此為止。"
2004005-89 = "只要我投入真心，效果肯定會有所不同。"
2004005-90 = "來～老師。看這邊。"
2004005-95 = "來，絕對服從我的話……無條件聽從命令……"
2004005-103 = "呃……等等……"
2004005-104 = "我剛才是從哪個方向開始搖的……？"
2004005-105 = "是左邊嗎……？還是右邊……？"
2004005-106 = "[s]「好像是右邊……？」"
2004005-107 = "……那不就反了嗎！？"
2004005-108 = "啊，糟糕！我竟然對自己施加了催眠……！！"
2004005-109 = "[s]「皐月……！？」"
2004005-112 = "― [log=사츠키]唔……這是，怎麼回事……？[/log][wa:2850] "
2004005-115 = "― [log=사츠키]真，真奇怪……有股必須服從老師命令的感覺……[/log][wa:6640] "
2004005-118 = "[ns] 「你試著說說看『我會和風紀委員會好好相處』？」"
2004005-120 = "― [log=사츠키]咦，咦……好的……[/log][wa:2760] "
2004005-122 = "― [log=사츠키]……我會，和風紀委員會……好好，相處。[/log][wa:6710] "
2004005-125 = "― [log=사츠키]……不過真琴醬姑且不論，[/log][wa:2790] "
2004005-127 = "― [log=사츠키]我跟他們其實沒有關係不好哦。[/log][wa:1300] "
2004005-130 = "[ns]「那跟我約好『不會再捉弄老師』！」"
2004005-132 = "― [log=사츠키]唔，唔嗯？[/log][wa:1130] "
2004005-135 = "― [log=사츠키]唔……我……不會……捉弄……老師，了……[/log][wa:9770] "
2004005-138 = "― [log=사츠키]太，太卑鄙了！[/log][wa:1280] "
2004005-140 = "― [log=사츠키]明明是大人，卻用催眠對我為所欲為！[/log][wa:2220] "
2004005-143 = "[ns]「別說那些會讓人誤會的話……」"
2004005-145 = "[ns]「而且你只是自己承受了打算對別人做的事吧！？」"
2004005-147 = "― [log=사츠키]哼，竟然能對我施加催眠……[/log][wa:3510] "
2004005-149 = "― [log=사츠키]真是不能大意呢，老師。[/log][wa:2460] "
2004005-152 = "― [log=사츠키]怎麼樣？想不想參加我的NK-ULTRA計畫啊？[/log][wa:3920] "
2004005-155 = "[ns]「不想……能請你先起來嗎？」"
2004005-157 = "― [log=사츠키]是，是……如果這是命令的話……[/log][wa:3120] "
2004005-160 = "……唔，竟然會發生這種恥辱的情況。"
2004005-161 = "偏偏這次的催眠特別認真，看來效果會持續很久……"
2004005-162 = "這樣無論老師下達什麼命令都無法抵抗……"
2004005-166 = "[ns]「話說，皐月為什麼這麼想控制別人呢？」"
2004005-167 = "唔嗯……？"
2004005-168 = "那是……"
2004005-169 = "為了世界和平。"
2004005-170 = "[s1]「怎麼突然冒出了這麼遠大的理由！？」\n[s2]「能麻煩你詳細說明嗎？」"
2004005-173 = "只要世界和平，讓人疼痛的事情就會消失了。"
2004005-174 = "沒錯，我這個人……"
2004005-175 = "討厭疼痛！！真的真的非常討厭！"
2004005-176 = "比白衣服沾到污漬和無法跳過廣告還要更討厭！！"
2004005-177 = "無論是中槍，還是被手榴彈的碎片傷到都非常討厭！！"
2004005-178 = "[s]「我也深有同感……不過這跟世界和平有什麼關係呢？」"
2004005-181 = "要是能控制人們照我的意思行事，那種事情就不會發生了吧。"
2004005-182 = "沒錯……比如不讓人開槍，或者不讓人亂丟手榴彈之類的。"
2004005-183 = "然後順便讓伊吹和真琴醬他們不會受傷。"
2004005-184 = "呵呵，這就是NK-ULTRA計畫的出發點。"
2004005-185 = "隨心所欲的控制人們，讓奇普托斯變成一個沒有傷痛的世界！！"
2004005-186 = "這就是我的終極目標！！"
2004005-187 = "[s]「雖然方式有點奇怪，不過還真是個遠大的目標啊！！」"
2004005-188 = "……知道我終極目標的人，老師你還是第一個呢。"
2004005-189 = "我本來沒打算告訴任何人的。"
2004005-190 = "呼……你接下來打算帶給我什麼樣的恥辱呢？"
2004005-191 = "下一道命令是什麼？#n我已經做好覺悟了，快說吧！！"
2004005-192 = "[s]「好，那你趕快回去好好休息吧。」"
2004005-193 = "唔，你果然會這麼說……"
2004005-197 = "嗯……？"
2004005-198 = "你不打算挖出萬魔殿情報部的祕密，或者命令我做某些事情嗎？"
2004005-199 = "好不容易有機會能控制我……真的要讓我回去休息？"
2004005-200 = "我的身體已經不聽使喚地準備要回去了哦？"
2004005-201 = "[s]「嗯，今天辛苦你了，皐月。回去的時候注意安全哦。」"
2004005-202 = "……"
2004005-203 = "不愧是老師。#n呵呵，就連這種絕佳的機會也不放在眼裡啊。"
2004005-207 = "這豁達的胸襟，不愧是萬魔殿的……"
2004005-211 = "（雖然皐月似乎依然在喃喃自語，#n　不過因為他已經轉身離開辦公室，後面的話就聽不清楚了……）"

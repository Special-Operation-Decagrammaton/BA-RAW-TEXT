[translation]
2004005-1 = "Satsuki is Listening"
2004005-2 = "Not long after getting Satsuki's message..."
2004005-7 = "Hi, Sensei!"
2004005-8 = "[s] \"You look happy, Satsuki...\""
2004005-9 = "Heehee, of course I am."
2004005-10 = "I reached a major milestone in the great NK Ultra Project."
2004005-11 = "So you'll be my first participant in the new phase."
2004005-15 = "Hm? You want a say in that?"
2004005-16 = "Well, as Pandemonium Society's future partner, it'll be a joyful occasion for all of us. Think of it that way."
2004005-17 = "People only remember the FIRST person to do anything, know what I mean?"
2004005-18 = "What an honor, to be the first test subject of the new, improved NK Ultra Project."
2004005-19 = "[s] \"Did you say 'test subject'?\""
2004005-20 = "Oh, let's not talk about that. Let's talk about what I've learned from you so far."
2004005-21 = "You can't be extorted. You can't be tortured."
2004005-22 = "Which leaves only one option."
2004005-23 = "Let's have a fresh start, and experience the enhanced NK Ultra Project together."
2004005-27 = "Once again, Satsuki made me sit down on the chair..."
2004005-29 = "I'm going to test various hypnosis methods, in order."
2004005-30 = "I wonder how long you can keep your eyes open."
2004005-31 = "First..."
2004005-36 = "...look. Focus on my fingertip."
2004005-37 = "Round and round... Round and round..."
2004005-41 = "[ns] \"I think I've seen this before.\""
2004005-43 = "[ns] \"Isn't this how people catch dragonflies...?\""
2004005-44 = "Focus, I said! This only works if both participants are actually participating!"
2004005-45 = "[s] \"Shouldn't that tell you something?\""
2004005-46 = "Now, now. Round and round... Watch it spin..."
2004005-48 = "Satsuki traced circles in front of my eyes for a while, but it only made me feel dizzy, not sleepy."
2004005-50 = "Tch. I suppose it'll take more than that."
2004005-51 = "But we HAVE more, much more. And so much time..."
2004005-52 = "Let's go straight to the second method. Remember to focus, Sensei."
2004005-53 = "Look at this phone screen."
2004005-54 = "[s] \"This is...\""
2004005-55 = "Heehee, do you recognize it? It's the Pandemonium Society Intelligence Committee's proprietary hypnosis app. The perfect melding of psychology and technology!"
2004005-60 = "Don't look away! Focus on that spinning object in the middle."
2004005-61 = "Now, let yourself sink into it..."
2004005-62 = "You will follow my orders, Sensei. You will listen to whatever I say."
2004005-65 = "..."
2004005-66 = "That should do it."
2004005-67 = "Sensei, get up, grab your nose, and do, oh, 200 backflips."
2004005-68 = "[s] \"How about no?\""
2004005-69 = "BAH, so that didn't work either. "
2004005-70 = "And I was so sure that app was 100% effective."
2004005-71 = "But then again, you are Sensei. Your mental fortitude is far beyond any normal human."
2004005-72 = "Unfortunately for you, so is my determination. Brace yourself for the next technique..."
2004005-74 = "Satsuki's hypnosis parade went on for a while."
2004005-75 = "Of course, none of it worked."
2004005-77 = "..."
2004005-78 = "*sigh* I didn't think even you could stand up to the NK Ultra Project for this long."
2004005-79 = "[s] \"Hey, Satsuki, it's getting late. Do we want to call it and—\""
2004005-80 = "No! This only ends ONE way!"
2004005-81 = "...And on that note, it's time to go back to square one."
2004005-82 = "[s] \"Come on. I'm tired.\""
2004005-83 = "Oh, don't be so weak, Sensei! You've lasted THIS long!"
2004005-87 = "Satsuki pressed on my shoulders from the front."
2004005-88 = "All right. One more for now. If it doesn't work, I promise I'll go home for the day."
2004005-89 = "But it WILL work. I'll make sure of that this time."
2004005-90 = "Look here, Sensei."
2004005-95 = "You will obey my orders... You will listen to whatever I say..."
2004005-103 = "...Wait. Hold on..."
2004005-104 = "Which direction did I start swinging before...?"
2004005-105 = "Was it left, or right, or..."
2004005-106 = "[s] \"Right, I think...?\""
2004005-107 = "...Your right, or my right? Wait, wouldn't that...?"
2004005-108 = "O-Oh, no. I've hypnotized myself!"
2004005-109 = "[s] \"Satsuki...?!\""
2004005-112 = "― [log=사츠키]Ugh... What is this...?[/log][wa:2450] "
2004005-115 = "― [log=사츠키]W-Weird... It feels like I have to follow your orders...[/log][wa:5280] "
2004005-118 = "[ns] \"Try saying 'I will stay on good terms with the Prefect Team,' will you?\""
2004005-120 = "― [log=사츠키]E-Ehh... Yes... [/log][wa:2480] "
2004005-122 = "― [log=사츠키]...I will stay on good terms with the Prefect Team...[/log][wa:5350] "
2004005-125 = "― [log=사츠키]...I don't know about Makoto, [/log][wa:2070] "
2004005-127 = "― [log=사츠키]but I personally have no beef with them. [/log][wa:220] "
2004005-130 = "[ns] \"Now say, 'I promise I won't be mean to Sensei.'\""
2004005-132 = "― [log=사츠키]H-Hmm? [/log][wa:1050] "
2004005-135 = "― [log=사츠키]Tch... I w-won't...be mean to Sensei...[/log][wa:9010] "
2004005-138 = "― [log=사츠키]N-Not fair![/log][wa:1120] "
2004005-140 = "― [log=사츠키]What kind of adult uses hypnosis on a student?! [/log][wa:980] "
2004005-143 = "[ns] \"Don't say anything people might take out of context.\""
2004005-145 = "[ns] \"Besides, isn't this exactly what you were trying to do to me?\""
2004005-147 = "― [log=사츠키]Hmph, to hypnotize me, of all people... [/log][wa:2430] "
2004005-149 = "― [log=사츠키]You're just full of surprises, Sensei.[/log][wa:1380] "
2004005-152 = "― [log=사츠키]What do you say? Want to join my NK Ultra Project? [/log][wa:2800] "
2004005-155 = "[ns] \"Not really. Could you...move, please?\""
2004005-157 = "― [log=사츠키]Y-Yes... If it's an order...[/log][wa:2600] "
2004005-160 = "...Tch. Well, that was a disgrace."
2004005-161 = "I don't even know how long I'll STAY hypnotized, after all that effort I put into it..."
2004005-162 = "Anything Sensei says, I might have to do."
2004005-166 = "[ns] \"Satsuki, let me ask you something. Why do you want to control people so much?\""
2004005-167 = "Huh...?"
2004005-168 = "Well, um..."
2004005-169 = "For world peace."
2004005-170 = "[s1] \"That's...quite an answer.\"\n[s2] \"Would you mind elaborating?\""
2004005-173 = "If the world becomes peaceful, there won't be any pain."
2004005-174 = "And I, um..."
2004005-175 = "I hate being in pain!! I really, REALLY hate it!!"
2004005-176 = "More than stains on white clothes, or not being able to skip ads!!"
2004005-177 = "More than being shot, or hit with shrapnel!!"
2004005-178 = "[s] \"I'm the same way. But how does hypnotizing people bring world peace?\""
2004005-181 = "If I can control people, then they won't fight."
2004005-182 = "I could tell them to never touch guns, or grenades, or anything like that."
2004005-183 = "And then Ibuki and Makoto wouldn't get hurt either."
2004005-184 = "Fufu, the NK Ultra Project started with that in mind."
2004005-185 = "To control people at will, and make Kivotos a pain-free world!"
2004005-186 = "That's my ultimate goal!!"
2004005-187 = "[s] \"Your methods are questionable, but your ambition's commendable!\""
2004005-188 = "...You're the first person to know all that, Sensei."
2004005-189 = "I wasn't planning on telling anyone."
2004005-190 = "*sigh* Now, what other shame and disgrace do you have in mind for me?"
2004005-191 = "What's your next order?! I'm ready. Just say it!"
2004005-192 = "[s] \"Go home and get a good night's sleep.\""
2004005-193 = "Tch, I knew you'd..."
2004005-197 = "Huh...?"
2004005-198 = "...You're not going to...force any Pandemonium Society secrets out of me, or give me orders...?"
2004005-199 = "I mean, I'm at your command this one time... I might just actually go home and sleep, you know?"
2004005-200 = "Oh look, my body's moving toward the door."
2004005-201 = "[s] \"Good. You had it rough today, Satsuki. Stay safe on your way back.\""
2004005-202 = "..."
2004005-203 = "Once again, as expected of you, Sensei. Even at a time like this..."
2004005-207 = "...you're nothing but gracious. That's the Pandemonium Society's..."
2004005-211 = "She kept talking as she left, but I didn't hear the rest of it."

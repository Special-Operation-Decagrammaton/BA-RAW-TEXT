[translation]
10007090-1 = "Episode 9;Tear It Down!"
10007090-4 = "The excavator... Our dream of building a large-scale hot springs resort...!"
10007090-10 = "How dare the runts of Gehenna try something so atrocious in Red Winter's district!"
10007090-11 = "I'll purge them until there's nothing left!"
10007090-12 = "Oh, Marina. Excellent! As expected from my right-hand woman!"
10007090-13 = "In recognition of your outstanding achievement in dealing with those insubordinate runts threatening the safety of Red Winter Academy, I award you the special First-Class Valorous Order of Military Merit!"
10007090-14 = "Thank you, President. I, Marina, will do my best to be more loyal to you."
10007090-15 = "Hmm, good, good!"
10007090-16 = "Now, all that remains is demolishing the hot springs resort."
10007090-17 = "It's a pity to demolish such a facility... It'd be much better to dismantle it and repurpose the materials for a statue of myself!"
10007090-19 = "Okay, Purginator No. 1! Tear it down!"
10007090-24 = "Wh-What are you tearing down?"
10007090-25 = "Oh, the former manager. You finally arrived."
10007090-30 = "The Hot Springs Department and the Secretariat State Guards..."
10007090-31 = "What the heck is going on?"
10007090-32 = "Hmph, it turns out those insubordinate runts from Gehenna were planning to blow up the entire Red Winter district because the hot springs might run out of water!"
10007090-33 = "The hot springs resort will run out of water...?"
10007090-34 = "That's right. They were going to blow up the Secretariat building for such a trivial reason. Ridiculous!"
10007090-35 = "But don't worry! Their evil plans have already been wiped out by the Secretariat's valiant Security Council!"
10007090-36 = "B-But, what happens to the Hot Springs Resort No. 227?!"
10007090-37 = "Well, normally it'd just go out of business when the water dies out."
10007090-38 = "But before that happens, we'll tear down every last scrap of it."
10007090-39 = "The high-quality building stones and wood used in the hot springs resort will be reused to create symbols of my authority for all to marvel at... You should be proud, hahaha!"
10007090-43 = "This is...unacceptable!"
10007090-45 = "It's unacceptable!!"
10007090-47 = "Why are you screaming all of a sudden?! I almost fell down!"
10007090-48 = "Under what authority are you shutting down the hot springs resort, President?"
10007090-49 = "Wh-What authority? I-I'm the president!"
10007090-50 = "Presidential authority this, authority that. Well, President, where were you when we were freezing to death without a scrap of firewood in the Former Institute?!"
10007090-51 = "Uh, so, umm..."
10007090-52 = "Even if it's built with impure intentions, this hot springs resort is precious to us!"
10007090-53 = "This hot springs resort is the only happiness we've experienced! It's our only hope! "
10007090-54 = "And you're trying to take it from us!"
10007090-55 = "You stupid kid! Fake mustache! I hope you stop growing and stay 4'2\" your entire life!"
10007090-56 = "H-How dare you say such offensive things to me, the most powerful person at Red Winter Federal Academy!"
10007090-58 = "Are you out of your mind?"
10007090-59 = "I am not out of my mind! What do I have to be afraid of when you're taking everything from me? Huh?!"
10007090-60 = "The president... The president..."
10007090-61 = "I'll never forgive you!"
10007090-62 = "...*hiccup*"
10007090-68 = "*whisper* Um, did Nodoka...have something to drink?"
10007090-69 = "The mors I gave her earlier may have been more fermented than I thought."
10007090-70 = "Even so, she only drank one glass... "
10007090-73 = "I will not stand for this!"
10007090-75 = "I was only going to demolish the hot springs resort without purging anyone because I enjoyed the manju here!"
10007090-77 = "But now, you'll suffer the worst punishment of all for insulting me! The pudding mixed with water, previously given once a month to the Spec Ops students, will be discontinued!"
10007090-78 = "Do you think we're scared of that?"
10007090-79 = "If you continue to be unreasonable, I have other ways to deal wtih you!"
10007090-84 = "Minori!"
10007090-86 = "Yeah, you called us?"
10007090-87 = "I have a commission for you. We'll hire you with the profits earned from the hot spring business!"
10007090-92 = "One million yen! I'll pay in advance!"
10007090-93 = "W-Wait, Nodoka. That's all our money."
10007090-94 = "What does it matter!"
10007090-95 = "If we lose the resort, it'll all be useless anyway!"
10007090-96 = "All right. We accept. What do you want the Labor Party to do?"
10007090-97 = "Kick the damn dictator kid and her minions out of the hot springs resort!"
10007090-98 = "If that's all..."
10007090-99 = "We can go all day!"
10007090-100 = "Comrades, we have been assigned new work!"
10007090-101 = "Starting now, we'll take out the cheeky President Cherino together with the students from Spec Ops!"
10007090-104 = "It's a revolution! A revolution!"
10007090-106 = "The Spec Ops and Labor Party joined forces?"
10007090-107 = "I-Increase your numbers all you want! "
10007090-108 = "Marina!"
10007090-109 = "Tear down the hot springs resort and those reactionary forces who doubt my authority!"
10007090-110 = "Let the purge parade begin!"

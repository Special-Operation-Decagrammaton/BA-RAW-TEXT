[translation]
10007090-1 = "第9話;拆除掉，拆除！"
10007090-4 = "嗚嗚，挖土機啊……大型溫泉浴場的夢想啊……！"
10007090-10 = "格黑娜的蠢蛋們，竟然想在赤冬聯邦學園的自治區內做那種亂七八糟的事……"
10007090-11 = "你們的罪行就算被肅清一百次也難以償還！"
10007090-12 = "哦哦，真是與咱的右手相稱的漂亮手段啊，瑪麗娜！"
10007090-13 = "認可你處理威脅赤冬聯邦學園安寧的叛逆份子的功績……#n特別授予你「1級鬍鬚勇猛武功勛章」吧！"
10007090-14 = "萬分感謝，會長。#n不才瑪麗娜，今後也會繼續為會長克盡忠誠。"
10007090-15 = "唔呣，回答得很好。"
10007090-16 = "那麼，接下來就剩下拆除這個溫泉浴場了吧。"
10007090-17 = "雖然拆除這麼優良的溫泉浴場很可惜……#n但是既然溫泉會枯竭的話，不如把建材拆解，用來建造咱的雕像吧。"
10007090-19 = "很好，「肅清君1號」！開始拆除──"
10007090-24 = "……什麼拆除？"
10007090-25 = "哦，前任經理。你來的正好。"
10007090-30 = "溫泉開發部的學生們和這麼多事務局的親衛隊……"
10007090-31 = "這是什麼情況？"
10007090-32 = "哼。這些格黑娜的笨蛋們為了不讓溫泉枯竭，打算把赤冬聯邦學園這一帶全部引爆。#n真是些不得了的傢伙。"
10007090-33 = "溫泉浴場的溫泉，會枯竭……？"
10007090-34 = "啊啊，沒錯。就為了那種無聊的理由，#n竟然想把整個赤冬連同事務局一起炸飛，不覺得很過分嗎？"
10007090-35 = "但是不必擔心。這些傢伙的邪惡計畫已經被咱和事務局勇猛的保安委員們給阻止了！"
10007090-36 = "那……「227號溫泉浴場」之後會怎麼樣？"
10007090-37 = "那個嘛……溫泉枯竭了的話也沒辦法營業了吧？那不就只能廢棄了嗎？"
10007090-38 = "啊，還是說你擔心的是善後工作？#n那個不用擔心，咱會把這裡的建築拆除的一乾二淨的。"
10007090-39 = "剩下的高級石材和木材也不會浪費，#n就讓它們以展現咱偉大的雕像的形式重生，展示在事務局前吧！#n作為石材也會感到驕傲吧，哈哈哈！這樣就全部解決了！"
10007090-43 = "……許。"
10007090-45 = "那種事情，我絕不允許！！"
10007090-47 = "怎，怎麼了怎麼了！？突然叫那麼大聲，害咱差點嚇到跌倒了……"
10007090-48 = "會長有什麼權利拆除這個溫泉浴場啊！？"
10007090-49 = "那當然是因為咱是赤冬聯邦學園的學生會長、兼書記長、兼環境美化部部長……#n總之，因為咱最偉大啊？"
10007090-50 = "偉大就能為所欲為嗎！？#n我們在舊校舍因為連根柴火都沒有而瑟瑟發抖的時候，會長什麼都沒做不是嗎！？"
10007090-51 = "那，那是因為……"
10007090-52 = "就算是格黑娜的社團建造的，對我們來說依然是重要的溫泉浴場啊！"
10007090-53 = "明明是我們好不容易，好不容易獲得的幸福……！我們唯一的希望……！"
10007090-54 = "居然連這些也要強行奪走……！"
10007090-55 = "你這個臭矮子！假鬍子！身高最好一輩子都停在128cm！！"
10007090-56 = "竟，竟敢對身為赤冬聯邦學園最高權力者的咱，說出如此狂言……！"
10007090-58 = "你不害怕咱的力量嗎！？"
10007090-59 = "就算在這裡被肅清，也不過就是回到原本的舊校舍生活罷了！有什麼好怕的！"
10007090-60 = "無法原諒……做出那種事的會長……"
10007090-61 = "絕對，絕對不能原諒！"
10007090-62 = "嗝……"
10007090-68 = "那個……和香醬他怎麼了嗎？"
10007090-69 = "……看來剛剛給他的漿果汁「發酵」的似乎比想像中還久。"
10007090-70 = "不過和香也只喝了一杯而已……"
10007090-73 = "唔唔，既然如此……！"
10007090-75 = "本來想看在那個好吃的溫泉饅頭的份上，只拆除溫泉浴場而不肅清你們的……"
10007090-77 = "咱以污辱赤冬最高權力的罪名，對你們進行肅清！#n你們特別班一個月一次稀釋布丁的配給也中止了！"
10007090-78 = "那種威脅，你以為現在還有用嗎？"
10007090-79 = "會長要繼續那麼說的話，我們也有自己的想法。"
10007090-84 = "實里同學！"
10007090-86 = "嗯，叫我們嗎？"
10007090-87 = "有工作要委託你們。#n我要用溫泉浴場獲得的收益直接雇用各位！"
10007090-92 = "這裡有100萬！全額事前支付！"
10007090-93 = "等，等等，和香。那不是我們所有的財產嗎……"
10007090-94 = "那又如何？"
10007090-95 = "反正失去溫泉浴場的話，一切都沒有意義了！"
10007090-96 = "好，報酬我確實收下了。我們接受委託。#n那麼……我們工務部該怎麼做呢？"
10007090-97 = "請把這個獨裁矮子和他的手下趕出溫泉浴場！"
10007090-98 = "原來如此……"
10007090-99 = "了解！我立刻準備！"
10007090-100 = "大家，新的工作來了！"
10007090-101 = "我們從現在開始，要和227號特別班一起將那個傲慢的潔莉諾會長趕出去！#n同樣身為勞動者，堅決反對剝奪職場的行為！"
10007090-104 = "革命！革命！"
10007090-106 = "唔，227號特別班和工務部聯手了……？"
10007090-107 = "不，不過就是人數變多了，以為這樣咱就會害怕了嗎！？"
10007090-108 = "……瑪麗娜！"
10007090-109 = "把那些對咱刀刃相向的反抗勢力，連同溫泉浴場一起剷除！"
10007090-110 = "來吧，肅清遊行的時間到了！"

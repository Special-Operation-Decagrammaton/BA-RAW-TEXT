[translation]
10007090-1 = "ตอนที่ 9;รื้อ รื้อให้หมด!"
10007090-4 = "คะ... เครื่องขุดเจาะ... ความฝันถึงออนเซ็นใหญ่ๆ..."
10007090-10 = "พวกลูกกระจ๊อกของเกเฮนน่า กล้าดียังไงถึงมาทำเรื่องเสื่อมเสียในเขตปกครองตนเองของ#nสหภาพเรดวินเทอร์..."
10007090-11 = "โทษของความผิดนั้นจะต้องถูกกวาดล้างร้อยครั้ง!"
10007090-12 = "โอ้ววว มารินะ สมกับเป็นมือขวาที่ยอดเยี่ยมของเราจริงๆ!"
10007090-13 = "เพื่อยกย่องความสำเร็จที่ยิ่งใหญ่ในการจัดการพวกที่สร้างความเสื่อมเสียและคุกคามสหภาพ#nเรดวินเทอร์ เราจะมอบ <เหรียญตรากล้าหาญหนวดขั้นที่ 1> ให้เป็นพิเศษ!"
10007090-14 = "ขอบคุณมากค่ะท่านประธาน เพื่อท่านประธานแล้ว มารินะจะกวาดล้างให้หมดทุกอย่างเลยค่ะ"
10007090-15 = "อืม... ดี! ดีมาก!"
10007090-16 = "งานที่เหลือตอนนี้... ก็มีแค่การรื้อถอนออนเซ็นแห่งนี้"
10007090-17 = "พอจะต้องรื้อถอนออนเซ็นดีๆ แบบนี้ เราก็รู้สึกเสียดายอยู่เหมือนกัน... ถ้างั้นก็รื้อถอนและเอาวัสดุ มาสร้างเป็นรูปปั้นของเราน่าจะดีกว่า"
10007090-19 = "เอาละ <ผู้กวาดล้าง No.1>! รื้อเลย รื้อให้หมด!"
10007090-24 = "จะรื้ออะไรนะคะ...?"
10007090-25 = "โอ้ อดีตผู้ดูแล มาก็ดีแล้ว"
10007090-30 = "ชมรมพัฒนาออนเซ็นกับกองกำลังป้องกันของทางสำนักเลขาธิการ..."
10007090-31 = "เกิดเรื่องวุ่นวายอะไรขึ้นเหรอคะ?"
10007090-32 = "นักเรียนจอมวายร้ายของเกเฮนน่าพวกนี้อ้างว่าเกิดวิกฤตน้ำพุร้อนกำลังเหือดแห้ง และวางแผน#nที่จะระเบิดเขตปกครองตนเองของเราน่ะสิ!"
10007090-33 = "น้ำในออนเซ็น... จะหมดไปเหรอคะ?"
10007090-34 = "ใช่แล้ว พวกนี้ใช้เหตุผลเล็กน้อยแบบนั้นมาเป็นข้ออ้างที่จะระเบิดสำนักเลขาธิการของเรา!"
10007090-35 = "แต่ไม่ต้องห่วงหรอกนะ สมาชิกคณะความมั่นคงที่กล้าหาญของสำนักเลขาธิการกำจัดแผนการ#nชั่วร้ายนี้ไปแล้วละ!"
10007090-36 = "ถ้างั้น... <ออนเซ็น No.227>... จะเป็นยังไงต่อไปคะ?"
10007090-37 = "ถ้าไม่มีน้ำพุร้อนก็คงจะต้องปิดไปตามธรรมชาติล่ะมั้ง?"
10007090-38 = "แต่ไม่ต้องห่วงหรอก ก่อนหน้านั้น เราจะจัดการรื้อถอนออนเซ็นนี่ให้หมดเอง"
10007090-39 = "พวกหินและท่อนไม้คุณภาพดีที่ใช้อยู่ในออนเซ็นพวกนี้จะถูกเอาไปใช้เป็นของตกแต่งที่#nหน้าสำนักเลขาธิการเพื่อแสดงอำนาจของเชริโน่ผู้นี้... จงภูมิใจซะเถอะ ฮ่าฮ่าฮ่า!"
10007090-43 = "ฉันคง...ยอมไม่ได้..."
10007090-45 = "ฉันยอมไม่ได้เด็ดขาดค่ะ!"
10007090-47 = "จะ...จู่ๆ จะตะโกนทำไมเนี่ย?! เราตกใจจนเกือบหงายหลังเลยนะ!"
10007090-48 = "ท่านประธานมีสิทธิ์อะไรถึงจะมารื้อถอนออนเซ็นแห่งนี้คะ?"
10007090-49 = "หะ...หืม? เรื่องนั้น... ก็เพราะเราเป็นประธานยังไงล่ะ"
10007090-50 = "ทั้งที่เน้นย้ำเรื่องอำนาจของประธานขนาดนั้น แต่ตอนที่พวกเราต้องทนหนาวอยู่ที่อาคารเรียนเก่า#nโดยไม่มีฟืนใช้แม้แต่ท่อนเดียว... คุณทำอะไรให้พวกเราบ้างเหรอคะ?"
10007090-51 = "เอ่อ คือเรื่องนั้น..."
10007090-52 = "ถึงจะเป็นอาคารที่สร้างขึ้นมาอย่างไม่ถูกต้องก็ตาม แต่สำหรับพวกเราแล้ว ที่นี่เป็นออนเซ็นที่สำคัญมากเลยนะคะ!"
10007090-53 = "ออนเซ็นแห่งนี้เป็นเหมือนกับความสุขที่พวกเราได้รับมา...! เป็นความหวังเพียงหนึ่งเดียวของเรา...! "
10007090-54 = "แต่ท่านประธานจะมาพรากมันไปเหรอคะ...!"
10007090-55 = "ยัยเด็กนิสัยไม่ดี! ยัยหนวดปลอม! ขอให้สูงแค่ 128 ซม.ไปตลอดชีวิตเลย!"
10007090-56 = "นะ...นี่กำลังพูดจาว่าร้ายกับคนที่มีเกียรติสูงสุดในสหภาพเรดวินเทอร์อย่างเรางั้นเรอะ!"
10007090-58 = "เธอเพี้ยนไปแล้วรึไง?"
10007090-59 = "ฉันอาจจะเพี้ยนไปแล้วก็ได้ค่ะ! มีอะไรที่ฉันจะต้องกลัวไปกว่าการที่จะต้องกลับไปใช้ชีวิตแบบเดิม#nที่อาคารเรียนเก่าอีกล่ะคะ?"
10007090-60 = "ท่านประธาน... ท่านประธานน่ะ..."
10007090-61 = "ฉันไม่มีวันยกโทษให้ท่านประธานเด็ดขาดค่ะ!"
10007090-62 = "...(กลืนน้ำลาย)"
10007090-68 = "(กระซิบ) นี่... โนโดกะจัง... ดื่มอะไรเข้าไปเหรอคะ?"
10007090-69 = "อืม ดูเหมือนชามอร์สที่ให้ดื่มไปเมื่อกี้มันจะ \"บ่ม\" นานไปหน่อยน่ะ"
10007090-70 = "ถึงงั้นก็เถอะ เธอดื่มมันไปแค่แก้วเดียวเองนะ... "
10007090-73 = "อึ่ก... เราจะไม่ทนอีกต่อไปแล้ว!"
10007090-75 = "พอได้ลิ้มรสออนเซ็นมันจูที่ล้ำเลิศ... เรากะจะรื้อถอนออนเซ็นนี่โดยไม่กวาดล้างพวกเธอแล้วแท้ๆ..."
10007090-77 = "แต่มาดูหมิ่นเกียรติสูงสุดของสหภาพเรดวินเทอร์ขนาดนี้ เราคงจะต้องกวาดล้างขั้นเด็ดขาดแล้วละ! แล้วก็จะสั่งระงับการส่งเสบียงพุดดิ้งที่ส่งให้เดือนละครั้งด้วย!"
10007090-78 = "คิดว่าพูดแบบนั้นแล้วพวกเราจะกลัวเหรอคะ?"
10007090-79 = "ถ้าท่านประธานยังคงดื้อดึงแบบนี้ พวกเราก็มีวิธีของพวกเราอยู่เหมือนกันค่ะ!"
10007090-84 = "คุณมิโนริคะ!"
10007090-86 = "หืม? เรียกพวกเราเหรอ?"
10007090-87 = "ฉันมีงานจ้างวานค่ะ ฉันจะใช้เงินที่ได้จากการดูแลออนเซ็นจ้างพวกคุณค่ะ!"
10007090-92 = "งานนี้มูลค่าหนึ่งล้านเยน! ฉันจะจ่ายให้ล่วงหน้าด้วยค่ะ!"
10007090-93 = "ดะ...เดี๋ยวก่อน โนโดกะ นั่นมันเงินทั้งหมดที่พวกเรามีเลยนะ"
10007090-94 = "แล้วมันสำคัญตรงไหนเหรอคะ"
10007090-95 = "ถ้าเกิดออนเซ็นนี่หายไปละก็ ยังไงเงินพวกนี้ก็ไม่มีประโยชน์อยู่แล้วค่ะ!"
10007090-96 = "ดีละ ถ้างั้นเราก็จะรับงานนี้ก็แล้วกัน แล้วจะให้ชมรมผู้รับจ้างอย่างเราทำอะไรเหรอ?"
10007090-97 = "ช่วยไล่ยัยเปี๊ยกเอาแต่ใจนี่กับลูกกระจ๊อกออกไปจากออนเซ็นด้วยค่ะ!"
10007090-98 = "ถ้าเรื่องนั้นละก็..."
10007090-99 = "ให้ทำแบบนั้นทั้งวันก็ยังไหว!"
10007090-100 = "เหล่าสหาย! เรามีงานใหม่มาแล้ว!"
10007090-101 = "ตั้งแต่นี้ไปพวกเราจะร่วมมือกับเหล่าสหายจากห้องเรียนพิเศษขับไล่ประธานเชริโน่!"
10007090-104 = "นี่คือการปฏิวัติ! ปฏิวัติ!"
10007090-106 = "พวกห้องเรียนพิเศษกับชมรมผู้รับจ้างร่วมมือกันงั้นเหรอ?"
10007090-107 = "คะ...คิดว่ามีคนเยอะขึ้นแล้วเราจะกลัวรึไง?"
10007090-108 = "มารินะ!"
10007090-109 = "กวาดล้างพวกคนที่เคลือบแคลงในอำนาจของเราไปพร้อมๆ กับออนเซ็นนี่ซะ!"
10007090-110 = "เริ่มพาเหรดแห่งการกวาดล้างได้!"

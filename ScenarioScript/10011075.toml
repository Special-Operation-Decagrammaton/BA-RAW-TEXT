[translation]
10011075-7 = "อื้อ! ผ่านฉลุยเลย! ยินดีด้วยนะ!"
10011075-8 = "แฮ่ก... แฮ่ก จบแล้วอย่างงั้นเหรอ..."
10011075-9 = "อืม.... ถ้างั้นขอไปรายงานผลก่อนนะ เดี๋ยวกลับมา!"
10011075-13 = "[ns] \"แบบนี้ก็ถือว่าสำเร็จไปขั้นหนึ่งแล้วรึเปล่านะ?\""
10011075-15 = "ทะ... ทุกคนคะ~! มะ... ไม่เป็นไรใช่ไหมคะ?!"
10011075-16 = "อ๊ะ! นายท่าน! แล้วก็หัวหน้า! ปลอดภัยดีใช่มั้ยคะ?!"
10011075-17 = "สึคุโยะ! อิซุนะ...!"
10011075-18 = "อยู่ดีๆ ทั้งสองคนก็หายเข้าไปด้านใน... ฉันกับอิซุนะจังก็พยายามไล่ตามไป... แต่ว่า..."
10011075-19 = "อิซุนะน่ะ! พอเดินไปเรื่อยๆ แล้วก็หลงทาง คิดว่าจะหาทางออกมาไม่ได้แล้ว...! แต่ว่าท่านสึคุโยะก็หา#nทางออกจนได้ค่ะ!"
10011075-20 = "จะ... จำได้ว่าเป็นคฤหาสน์ที่เคยเห็น นะ... ในหนังสือการ์ตูนที่ท่านหัวหน้าเคยให้ยืมค่ะ... "
10011075-21 = "ดีจังเลยนะคะที่อ่านมาก่อนตามที่ท่านหัวหน้าแนะนำ! แหะๆๆ!"
10011075-22 = "อะ...อื้อ งะ... งั้นเหรอ?"
10011075-23 = "[s] \"ว่าแต่ อิโรฮะล่ะ...?\""
10011075-25 = "อ๊ะ! จริงด้วย ท่านอิโรฮะ ระหว่างทางก็ยังอยู่ด้วยกันอยู่เลย..."
10011075-26 = "แต่จู่ๆ ก็หายไป พวกเราก็เลยคิดว่าอย่างน้อยพวกเราเองก็ควรจะออกมาให้ได้ก่อน..."
10011075-27 = "ระ... เรากลับเข้าไปตามหากันดีมั้ยคะ?"
10011075-28 = "ไม่ต้องหรอก... ตอนนี้พวกเราไม่มีเวลาแล้ว"
10011075-32 = "นี่ สึคุโยะ อิซุนะ ข้าน้อยมีอะไรที่จะต้องบอกพวกเธอสองคน..."
10011075-34 = "คะ...คะ?"
10011075-41 = "[ns] \"หืม? นั่นมัน...\""
10011075-42 = "เฮ้อ... โชคดีจริงๆ ค่ะที่ตามมาทันก่อนที่เรื่องจะใหญ่ไปมากกว่านี้"
10011075-43 = "[s] \"คาโฮะ?"
10011075-44 = "ฉันมีเรื่องที่อยากจะบอกเกี่ยวกับการตัดสินใจตามใจตัวเองที่เกิดขึ้นค่ะ"
10011075-45 = "ก่อนอื่นตอนนี้ขอให้ทุกคนหยุดไล่ล่า... ไม่สิ ขอให้หยุดการแสดงก่อนค่ะ"

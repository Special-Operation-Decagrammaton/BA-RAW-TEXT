[translation]
10011075-7 = "好的～過關！恭喜你們！"
10011075-8 = "哈啊，哈啊……連續戰鬥真是累人……"
10011075-9 = "那我去報告一下結果哦！掰掰！"
10011075-13 = "[ns]「幸好順利結束了呢，辛苦了。」"
10011075-15 = "啊……！兩位都，沒事嗎……！"
10011075-16 = "主公！還有部長！"
10011075-17 = "伊樹菜，月夜……！"
10011075-18 = "我，我和伊樹菜醬，一直想追上你們……"
10011075-19 = "我們完全迷路了！還以為要永遠走不出去了呢！幸虧月夜閣下找出了解法！"
10011075-20 = "我，我想到在部長，借我的漫畫裡，好像有看過……"
10011075-21 = "那個時候，有被部長推薦，真是太好了……！耶嘿嘿……！"
10011075-22 = "那，那就好……"
10011075-23 = "[s]「話說回來，伊呂波呢……？」"
10011075-25 = "伊呂波閣下，到中途為止還在一起的……"
10011075-26 = "卻在路上走散了……雖然想過會在某處遇見，不知不覺就到了終點……"
10011075-27 = "要，要回去，找他嗎……？"
10011075-28 = "……月夜，伊樹菜。"
10011075-32 = "我有話要跟你們兩個說……"
10011075-34 = "呃，嗯……？"
10011075-41 = "[ns]「嗯？這是……」"
10011075-42 = "呼，幸好在事情鬧大之前追上了。"
10011075-43 = "[s]「佳穗？」"
10011075-44 = "對於這個情況，我雖然有很多事想請教各位……"
10011075-45 = "簡而言之，公演中止了。"

2300420-72 = "[ns] \"어려운 문제네……. \""
2300420-73 = "3;우타하;99;나는 이렇게 생각해.\n#3;closeup"
2300420-74 = "3;우타하;01;배의 모든 부품이 교체되었어도, 그 배를 다루는 사람들이 남아 있다면, 그건 원래의 배와 동일한 물건이라고.\n#3;closeup"
2300420-75 = "3;우타하;07;배를 다루는 사람이 없이는, 배는 그냥 좀 특이하게 생긴 나무나 금속 덩어리일 뿐이잖아?\n#3;em;[반응]\n#3;closeup"
2300420-76 = "3;우타하;02;심오한 해석이라고? 그런가?\n#3;closeup"
2300420-77 = "3;우타하;03;하지만 마이스터와 공구의 관계도 그와 비슷한 게 아닐까?\n#3;em;[?]\n#3;closeup"
2300420-78 = "3;우타하;99;공구를 사용하는 사람 없이는, 공구는 의미를 갖지 못하니까.\n#3;closeup"
2300420-79 = "[s1] \"이상하게 들릴지도 모르겠지만.\"\n[s2] \"우타하가 사용해 주는 공구는, 행복할 것 같아.\""

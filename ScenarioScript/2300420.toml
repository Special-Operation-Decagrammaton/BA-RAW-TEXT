[translation]
2300420-1 = "ต่อให้ทุกอย่างจะถูกแทนที่"
2300420-3 = "(คุณครูมาถึงห้างสรรพสินค้าที่อุทาฮะบอก...)"
2300420-4 = "อ๊ะ มาแล้วเหรอคุณครู"
2300420-5 = "ขอบคุณที่ออกมาเป็นเพื่อนนะ แต่ว่ามันอาจจะไม่สนุกอย่างที่คุณครูคิดก็ได้..."
2300420-6 = "ไม่ต้องห่วงงั้นเหรอ?"
2300420-7 = "ฮุฮุ อย่ามาเสียใจที่พูดแบบนั้นทีหลังก็แล้วกัน"
2300420-8 = "ร้านอุปกรณ์ที่เราจะไปกัน เป็นร้านที่แม้แต่คนในมิลเลเนียมเองก็รู้จักน้อยมาก"
2300420-9 = "เหมือนเป็นพวกร้านลับ หรือห้องเก็บสมบัติประมาณนั้นเลยละ"
2300420-10 = "งั้นเราไปกันเลยมั้ย?"
2300420-22 = "มาสเตอร์ ไม่เจอกันนานเลยนะ"
2300420-23 = "อ๊ะ ไมสเตอร์อุทาฮะ แวะมาบ่อยๆ หน่อยสิ จะลืมหน้ากันอยู่แล้วเนี่ย"
2300420-24 = "ที่ไม่ค่อยได้มาก็เพราะอุปกรณ์ของมาสเตอร์มันใช้ได้ดีเกินคาดเลยยังไงล่ะ"
2300420-25 = "ถ้าอุปกรณ์เกิดพัง หรือเสื่อมสภาพเร็วก็คงจะได้แวะมาบ่อยๆ ละนะ"
2300420-26 = "แบบนี้ต้องลดความทนทานของอุปกรณ์ลงสักหน่อยดีมั้ยนะ...?"
2300420-27 = "แต่ถ้าทำแบบนั้นลูกค้าขาประจำจะหายหมดน่ะสิ"
2300420-28 = "ฮะฮะฮะ ตั้งใจทำงานให้ดีมากเกินไปก็มีข้อเสียเหมือนกันเนอะ ว่าแต่วันนี้ต้องการอุปกรณ์แบบไหนล่ะ?"
2300420-29 = "อย่างแรก ฉันอยากได้ชุดประแจหัวหกเหลี่ยมหนึ่งชุด แล้วก็คาลิปเปอร์ขนาด 100 ซม. อืม... มีอย่างอื่นอีกนะ เดี๋ยวฉันขอดูรอบๆ ก่อนแล้วกันนะ"
2300420-30 = "เอาสิ เลือกดูได้ตามสบายเลย ว่าแต่ข้างๆ นั่นใครน่ะ?"
2300420-31 = "คุณครูจากชาเล่ต์น่ะ"
2300420-35 = "อ๊ะ คุณครู! ได้ยินเรื่องของคุณครูมาเยอะเลยละ ถ้าเกิดต้องการอุปกรณ์อะไรละก็ แวะมาที่ร้าน#nของเราได้เลยนะ!"
2300420-36 = "[s] \"ได้เลย...\""
2300420-42 = "เฮ้อ เท่านี้ก็คงเอาไปเปลี่ยนแทนอุปกรณ์ที่สึกหรอได้แล้ว..."
2300420-43 = "[s] \"เซ็ตอุปกรณ์นี่... ดูยอดเยี่ยมมากเลยนะ\""
2300420-44 = "อ๊ะ นี่มัน?"
2300420-49 = "ฮุฮุ ไม่แน่ใจหรอกว่ามันเป็นของที่ยอดเยี่ยมรึเปล่า แต่นี่น่ะ เป็นเซ็ตอุปกรณ์ของฉันเอง "
2300420-50 = "ปกติฉันเรียกมันว่า 'เซ็ตอุปกรณ์ของไมสเตอร์'"
2300420-51 = "ถึงมันอาจจะดูจัดเต็มเกินไปหน่อยสำหรับรสนิยมของฉันก็เถอะ..."
2300420-52 = "แต่ก็นะ... มันก็เป็นอุปกรณ์ที่ฉันใช้นั่นละ เท่านี้ก็คงโอเคใช่มั้ย?"
2300420-53 = "แต่หลังจากที่ได้เป็นไมสเตอร์ ฉันก็ใช้อุปกรณ์เซ็ตนี้มาโดยตลอดเลยนะ"
2300420-57 = "พอมาดูตอนนี้แล้ว... ไม่มีอุปกรณ์ชิ้นไหนที่มีสภาพเหมือนตอนแรกๆ เลยนะ..."
2300420-58 = "พออุปกรณ์ทุกชิ้นมันสึกหรอหรือไม่ก็เสื่อมสภาพจนใช้งานไม่ได้ ก็ต้องเปลี่ยนน่ะ..."
2300420-59 = "[s] \"เอ๊ะ แต่ว่า...\""
2300420-60 = "หืม? ถ้าเกิดเปลี่ยนอุปกรณ์ทั้งหมดไปครั้งหนึ่งแล้ว เราจะเรียกว่าเป็นเซ็ตอุปกรณ์ดั้งเดิมตั้งแต่แรกได้#nด้วยงั้นเหรอ?"
2300420-61 = "ฮุฮุ ถามได้ดีเลยนะ คุณครู"
2300420-67 = "สมมุติว่ามีเรืออยู่ลำหนึ่ง... เวลาที่ชิ้นส่วนหรืออุปกรณ์เกิดสึกหรอหรือพังขึ้นมา ก็ต้องเปลี่ยนใช่มั้ยล่ะ?"
2300420-68 = "แบบนั้นแล้ววันหนึ่ง ชิ้นส่วนของเรือก็จะถูกเปลี่ยนไปทั้งหมด ถ้าอย่างนั้นแล้ว... เราจะยังเรียกว่าเป็น#nเรือลำเดิมอยู่ได้รึเปล่าล่ะ?"
2300420-72 = "[ns] \"เป็นคำถามที่ยากทีเดียวนะ...\""
2300420-73 = "ส่วนฉันน่ะ คิดแบบนี้"
2300420-74 = "ถึงชิ้นส่วนต่างๆ ของเรือจะถูกเปลี่ยนไปทั้งหมดแล้วก็ตาม แต่ถ้ายังมีคนที่คอยดูแลเรือลำนั้นอยู่ละก็ มันก็ยังเป็นเรือลำเดียวกับเรือลำเดิมอยู่"
2300420-75 = "ถ้าไม่มีคนคอยดูแลรักษาเรือแล้วละก็ เรือก็คงผุพังไปตามกาลเวลา แล้วกลายเป็นแค่เศษเหล็กไป ใช่มั้ยล่ะ?"
2300420-76 = "ตีความได้ลึกซึ้งมากงั้นเหรอ? "
2300420-77 = "ความสัมพันธ์ของไมสเตอร์กับอุปกรณ์มันก็เหมือนกันไม่ใช่รึไง?"
2300420-78 = "หากไม่มีคนใช้ อุปกรณ์นั้นก็คงจะไร้ความหมาย"
2300420-79 = "[s1] \"อาจฟังดูแปลกๆ แต่ครูว่าพวกเครื่องมือต้องดีใจแน่ๆ เลย\"\n[s2] \"พวกอุปกรณ์ที่อุทาฮะใช้จะต้องดีใจแน่ๆ\""
2300420-84 = "มันไม่ได้ฟังดูแปลกๆ หรอก... แต่มันน่าอายมากกว่านะ..."
2300420-85 = "แต่ว่าถ้าสามารถเป็นไมสเตอร์ที่ดีขึ้น และไม่รู้สึกละอายต่อเครื่องมือที่ใช้ได้ละก็..."
2300420-86 = "ฮุฮุ แบบนั้นก็คงไม่แย่เท่าไรนะ"
2300420-88 = "(จากนั้นคุณครูก็เลือกซื้ออุปกรณ์กับอุทาฮะต่อ แต่ไม่รู้ทำไมถึงรู้สึกว่าอุทาฮะดูภาคภูมิใจมากกว่าปกติ)"

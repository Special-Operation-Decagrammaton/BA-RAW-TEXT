2300420-49 = "3;우타하;03;후후. 대단한지는 잘 모르겠지만, 나만의 공구 세트지. "
2300420-50 = "3;우타하;99;나는 '마이스터 공구 세트'라고 부르고 있어."
2300420-51 = "3;우타하;01;조금 지나치게 내 취향으로 커스텀 한 것 같기도 하지만……\n#3;em;…"
2300420-52 = "3;우타하;02;뭐, 내가 쓰는 공구니까. 그 정도는 괜찮겠지?"
2300420-53 = "3;우타하;03;아무튼 처음 마이스터가 된 이후, 쭉 이 세트를 사용해 왔으니까 말이지.\n#3;em;[반짝]"
2300420-54 = "#st;[0,0];instant;1;"
2300420-55 = "#clearST"

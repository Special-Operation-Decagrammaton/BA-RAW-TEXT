2300420-22 = "3;우타하;01;마스터. 오랜만이야.\n#3;a"
2300420-23 = "1;엔지니어 마스터;00;아, 마이스터 우타하. 자주 좀 보자고. 얼굴 잊어버리겠어. \n#1;em;[반응]\n#1;ar\n#3;m5"
2300420-24 = "3;우타하;03;그것도 마스터의 공구가 너무 우수해서 그런 게 아닐까? \n#3;em;[음표]"
2300420-25 = "3;우타하;03;공구가 좀 마모되거나 고장 나야 여길 자주 찾을 거 아냐."
2300420-26 = "1;엔지니어 마스터;00;이거, 내구성을 일부러 저하해야 하려나?\n#1;em;[?]"
2300420-27 = "3;우타하;99;하지만 그랬다간 단골들의 발길이 전부 끊기겠지."
2300420-28 = "1;엔지니어 마스터;00;핫핫핫. 본업에 너무 충실한 것도 탈이구만. 오늘은 뭐가 필요하지?\n#1;hophop\n#1;em;[재잘]"
2300420-29 = "3;우타하;01;우선 헥스헤드 렌치 세트 하나와 100cm 버니어 캘리퍼스. 다른 필요한 것도 있는데…… 천천히 둘러볼게."
2300420-30 = "1;엔지니어 마스터;00;그래. 부담 갖지 말고. 이쪽은 누구시지?\n#1;em;[?]"
2300420-31 = "3;우타하;03;샬레의 선생님이셔."
2300420-32 = "#st;[0,0];instant;1;"
2300420-33 = "#clearST"
2300420-34 = "3;우타하;03\n1;엔지니어 마스터;00\n#1;em;[반응]\n#1;h\n#3;h\n#wait;1000"
2300420-35 = "1;엔지니어 마스터;00;아, 선생님! 말씀은 많이 들었습니다. 혹시 앞으로 공구가 필요하시다면 우리 상점을 애용해 주시기 바랍니다!\n#1;hophop\n#1;em;[재잘]\n#3;dr\n#1;m3"

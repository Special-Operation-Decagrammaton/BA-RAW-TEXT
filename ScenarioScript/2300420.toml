2300420-57 = "3;우타하;99;지금 생각해 보면…… 처음 그대로 남아 있는 공구는 하나도 없네."
2300420-58 = "3;우타하;01;모든 공구가 한 번씩은 마모되거나 수명이 다해서 교체됐으니까."
2300420-59 = "[s] \"어라, 그런데……\""
2300420-60 = "3;우타하;02;응? 내용물이 전부 한 번씩 교체되었다면, 그걸 처음의 공구 세트와 같은 물건이라고 부를 수 있는 거냐고?\n#3;em;[?]\n#3;m3"
2300420-61 = "3;우타하;03;후후. 좋은 질문이야. 선생님."

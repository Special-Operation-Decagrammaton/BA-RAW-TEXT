2300420-84 = "3;우타하;04;……그건 이상하다기보다는 조금 부끄럽게 들리는 말인데……\n#3;em;[///]\n#3;stiff"
2300420-85 = "3;우타하;99;그렇지만 내가 공구에게 부끄럽지 않은, 더 나은 마이스터가 될 수 있다면……"
2300420-86 = "3;우타하;03;후후. 그것도 나쁘지 않겠네."

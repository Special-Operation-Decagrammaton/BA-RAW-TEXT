[translation]
2300420-1 = "就算一切都被替換"
2300420-3 = "（到達了和詠葉約好的購物中心）"
2300420-4 = "啊，老師。"
2300420-5 = "謝謝你這麼突然還願意過來。#n如果讓你費心了的話，真是不好意思。"
2300420-6 = "不用放在心上？"
2300420-7 = "呵呵，那就好。我想老師一定也會喜歡的唷。"
2300420-8 = "接下來要去的工具店，就算是千年，知道的學生也不多。"
2300420-9 = "對巨匠來說，簡直就像隱藏的寶物庫一樣哦。"
2300420-10 = "那麼，我們走吧？"
2300420-22 = "老闆，好久不見。"
2300420-23 = "就是啊。真是好久不見了呢，千年的巨匠。差點都要忘記妳的長相了。"
2300420-24 = "這也沒辦法。#n誰叫老闆的工具這麼優秀呢。"
2300420-25 = "因為幾乎不會磨損和故障，所以沒有過來這裡的理由啊。"
2300420-26 = "這樣啊。是不是該稍微降低一點耐久性比較好啊？"
2300420-27 = "你的尊嚴不會允許你這麼做的吧？#n而且這麼做的話，客人可能就再也不會來了吧。"
2300420-28 = "哈哈哈！這麼說也對……看來做事太老實也是個問題。話說，今天需要什麼呢？"
2300420-29 = "我要一組六角扳手和150cm的游標卡尺。#n還有……機會難得，我想到處看看。"
2300420-30 = "嗯。你慢慢看吧。話說回來……這位是？"
2300420-31 = "這位是夏萊的老師。"
2300420-35 = "哦哦，你就是傳聞中的老師啊。老師如果也需要什麼工具的話，歡迎來我們店裡。"
2300420-36 = "[s]「謝謝。」"
2300420-42 = "呼，這樣就更換的差不多了吧。"
2300420-43 = "[s]「真是厲害的工具組呢……」"
2300420-44 = "是嗎？"
2300420-49 = "厲不厲害……這我倒是不清楚，不過這是我專屬的工具組。"
2300420-50 = "我稱它為「巨匠工具組」。"
2300420-51 = "雖然幾乎都是依照我的喜好進行客製化……"
2300420-52 = "算了，反正基本上也只有我會用嘛。"
2300420-53 = "這是從我成為巨匠以來，一直都在使用的工具組。"
2300420-57 = "但是在這之中，從一開始留到現在的工具卻一個也沒有。"
2300420-58 = "因為不管是什麼樣的工具，基本上只要使用就會產生損耗。只要壽命到了就必須更換才行。"
2300420-59 = "[s]「這樣的話……」"
2300420-60 = "啊啊，如果像這樣更換工具的話，還能稱作是「一直在使用的工具組」嗎……老師是這個意思嗎？"
2300420-61 = "真是個好問題呢，老師。"
2300420-67 = "舉例來說，現在有一艘船。每當零件老舊或毀損時，當然都需要更換。"
2300420-68 = "直到有一天，一開始使用的零件已經一個也不剩，全都被更換過了。那麼這艘船還能說是原本的那艘船嗎？"
2300420-72 = "[ns]「真是個難題……」"
2300420-73 = "沒錯，但是我是這麼想的。"
2300420-74 = "就算船的所有零件都被換過了，只要船員還在的話，那就還是原本的船……"
2300420-75 = "所謂的船，是由分別製作的零件所組成的。但是，從被人使用的那一刻開始，才算是真正擁有了意義。在那之前，不過就是金屬和木頭的結合罷了。"
2300420-76 = "老師怎麼看呢？"
2300420-77 = "我認為，工具也是一樣的。"
2300420-78 = "要是沒有使用工具的人的話，工具就沒有任何的意義。"
2300420-79 = "[s1]「或許這麼說聽起來有點奇怪……」\n[s2]「被詠葉使用的工具真是幸福呢。」"
2300420-84 = "……與其說是奇怪，不如說是令人害羞呢。"
2300420-85 = "不過確實，如果能讓工具也這麼覺得的話……"
2300420-86 = "才能稱得上是優秀的巨匠吧。"
2300420-88 = "（之後也和似乎很開心的詠葉一起看了各式各樣的工具）"

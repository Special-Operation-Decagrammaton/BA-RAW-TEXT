[translation]
2300420-1 = "Even if Everything is Replaced"
2300420-3 = "I went to the shopping mall after Utaha invited me..."
2300420-4 = "Hey there, Sensei."
2300420-5 = "Thank you for coming today. I'm sure you have more exciting things to do."
2300420-6 = "Don't worry about it?"
2300420-7 = "Heehee. Don't say I didn't warn you!"
2300420-8 = "Only a few Millennium students even know about the hardware store we're going to."
2300420-9 = "Think of it like a secret treasure trove."
2300420-10 = "Shall we get going?"
2300420-22 = "Long time no see, Mr. Owner."
2300420-23 = "Ah, Meister Utaha. It's been so long that I almost forgot what you looked like. "
2300420-24 = "It's only because you're too good at your job. "
2300420-25 = "If your tools broke more often, I'd have more reasons to come!"
2300420-26 = "Is that so? Maybe I should start making worse tools..."
2300420-27 = "But in the end, loyalty is only as durable as the quality of service."
2300420-28 = "Hahaha! I suppose I'll just have to live with the flaw of being dedicated to my craft. So, what can I do you for today?"
2300420-29 = "For starters, I need a set of hex head wrenches and a 100 cm vernier caliper. There's some other stuff I want too, but let me take a look around first."
2300420-30 = "Sure, go ahead. Say, who's this with you?"
2300420-31 = "This is Schale's Sensei."
2300420-35 = "Ah, Sensei! I've heard so much about you. If you're ever in need of tools, keep me in mind!"
2300420-36 = "[s] \"Yes, of course...\""
2300420-42 = "*whistle* I think that's it for tool replacements..."
2300420-43 = "[s] \"That's a very...impressive tool set.\""
2300420-44 = "Oh, this?"
2300420-49 = "Heehee, I wouldn't call it impressive, but I would call it mine. "
2300420-50 = "More specifically, I call it the Meister Tool Set."
2300420-51 = "It might seem a bit excessively customized, but..."
2300420-52 = "I'm the one using the tools, so it's all good, isn't it?"
2300420-53 = "After all, this is the very same tool set I've used ever since first becoming a meister."
2300420-57 = "Although now that I think about it... None of the tools in the tool set are actually the same."
2300420-58 = "No matter how durable they are, I've had to replace all of them at one point or another."
2300420-59 = "[s] \"In that case...\""
2300420-60 = "...If everything has been replaced, can it really be called the same set of tools?"
2300420-61 = "Haha. Good question, Sensei."
2300420-67 = "Let's say you have a ship. As time goes on, parts of the ship need replacing."
2300420-68 = "And so you keep replacing parts until you reach the day that all of the ship's parts have finally been replaced. So, Sensei, is it the same ship?"
2300420-72 = "[ns] \"That's a tricky question... \""
2300420-73 = "Here's what I think..."
2300420-74 = "I think the replaced ship parts are irrelevant. What matters is if the people manning the ship are the same. As long as that's the case, I consider it to be the same ship."
2300420-75 = "Without someone to make use of it, isn't a ship just a hunk of deformed metal and wood? If function defines what a ship is, then wouldn't function define its identity?"
2300420-76 = "A profound interpretation? Or a convoluted one?"
2300420-77 = "Regardless, that's how I view the relationship between a meister and her tools."
2300420-78 = "Tools are created for and defined by their uses, so without someone to use them, is a lump of bent metal even a tool in the first place?"
2300420-79 = "[s1] \"This might sound strange...\"\n[s2] \"But the tools you use must be very happy, Utaha.\""
2300420-84 = "I don't know if that sounds strange... But it definitely sounds a bit embarrassing..."
2300420-85 = "But being a meister with tools worth showing off..."
2300420-86 = "Heehee. Doesn't sound too bad to me."
2300420-88 = "As we continued shopping, Utaha seemed to walk around with a bit more confidence in her step than usual."

2300420-1 = "#title;모든 것이 교체되더라도"
2300420-2 = "#wait;2000"
2300420-3 = "#na;(우타하에게 불려 나와 쇼핑몰에 도착했다……)"
2300420-4 = "3;우타하;01;아, 어서 와. 선생님.\n#3;em;[반응]\n#3;a"
2300420-5 = "3;우타하;03;일부러 어울려 줘서 고마워. 선생님에게는 조금 재미없을지도 모르는데."
2300420-6 = "3;우타하;07;신경 쓰지 말라고?\n#3;em;[?]"
2300420-7 = "3;우타하;03;후후. 그 말 후회하지 마?"
2300420-8 = "3;우타하;03;오늘 방문할 공구 매장은, 밀레니엄에서도 소수만이 찾아가는 곳이야."
2300420-9 = "3;우타하;99;숨겨진 비밀 장소랄까, 보물 창고 같은 곳이지.\n#3;em;…"
2300420-10 = "3;우타하;03;그럼, 가 볼까?"

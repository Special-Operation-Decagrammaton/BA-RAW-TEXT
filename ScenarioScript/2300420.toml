2300420-66 = "#wait;1000"
2300420-67 = "3;우타하;99;어떤 배가 있어. 부품이 낡거나 망가질 때마다 그걸 교환했지.\n#3;closeup"
2300420-68 = "3;우타하;02;그러다가 어느 날 배의 모든 부품을 교체하게 되었어. 그러면…… 그 배는 원래의 배와 같은 것이라고 부를 수 있을까?\n#3;em;[?]\n#3;closeup"
2300420-69 = "#st;[0,0];instant;1;"
2300420-70 = "#clearST"

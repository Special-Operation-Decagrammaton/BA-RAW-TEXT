[translation]
84308100101-6 = "สรุปแล้วเป็นเพราะพวกเราใช่มั้ยคะ...? เพราะที่ผ่านมาเราก็ทำภารกิจแทรกซึมกันมาตลอดเลย"
84308100101-7 = "จริงเหรอ? นี่ ตกลงมันเป็นเพราะพวกฉันเหรอ?"
84308100101-8 = "จริงหรือเปล่าคะ?"
84308100101-10 = "..."
84308100101-11 = "ฉันขอไม่ตอบ"
84308100101-16 = "จริงด้วยสินะคะ"
84308100101-17 = "จริงสินะ"
84308100101-19 = "ทั้งสองคนช่วยหยุดถามฉันทีเถอะ..."

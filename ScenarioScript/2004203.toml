[translation]
2004203-1 = "Augmented Reality"
2004203-2 = "Over the weekend, I went to the hiking trail near Millennium that Maki told me about."
2004203-7 = "Ugh... Ughhh..."
2004203-8 = "[s1] \"Hi, Maki.\"\n[s2] \"What are you doing on your phone?\""
2004203-11 = "Ah, you're already here, Sensei."
2004203-12 = "Sorry, but give me just a sec. I'm doing my dailies right now..."
2004203-13 = "I'm done with the weekly dungeon, I used up all my stamina, and I got the login bonus..."
2004203-14 = "Which means I'm all done!"
2004203-18 = "[ns3] \"I don't intend on nagging you over a hobby...\"\n[ns4] \"But shouldn't you be focusing more on the mountains around you?\""
2004203-21 = "Ah, I've already got that covered."
2004203-22 = "This game is...an augmented reality game, commonly referred to as AR!"
2004203-23 = "See, see. Look at how the game's monster moves with the environment captured by the camera. I was technically taking in the scenery AND playing."
2004203-24 = "[s] \"That's not what I meant...\""
2004203-25 = "On top of that, this trail has way better signal than the campgrounds we were at last time."
2004203-26 = "I actually wanted to go hiking because in this game..."
2004203-31 = "Wait, we don't have time for this. I heard that the sun sets early in the mountains, especially during winter."
2004203-32 = "We have to hurry, Sensei. We need to get a good view of the mountain while the sun is setting."
2004203-43 = "Mmm, I was sure it was somewhere around here."
2004203-44 = "[s5] \"Maki, watch where you're going.\"\n[s6] \"You might trip and fall if you keep staring at your phone.\""
2004203-47 = "I know."
2004203-48 = "...How weird. I swear the guide said it was somewhere around here."
2004203-49 = "I didn't misread the coordinates, did I?"
2004203-50 = "[s] \"Are you looking for something specific?\""
2004203-51 = "It's closer to a wild animal than a thing, but..."
2004203-55 = "Ah, found it!"
2004203-56 = "Sensei, look. It's a golden weasel!"
2004203-57 = "[s] \"Where? I don't see it...\""
2004203-58 = "Not there, look at my phone."
2004203-59 = "On my camera, do you see that golden weasel running around in the valley?"
2004203-60 = "Heehee, this golden weasel is a monster that gives crazy rewards in this AR game, and it's really hard to encounter."
2004203-61 = "There was a player who said they saw one near this trail, so I gave it a try... I can't believe I really found one!"
2004203-62 = "[s7] \"So you wanted to go hiking today...\"\n[s8] \"...for your AR game?\""
2004203-65 = "Yes."
2004203-69 = "Wh-Why are you looking at me like that?!"
2004203-70 = "Chihiro said AR games are totally okay!"
2004203-71 = "Since I have to walk around outside to play AR games, she said I'd at least be getting some exercise... It's technically way better for me than the other games we play!"
2004203-72 = "[s9] \"I won't scold you for playing games or anything, but...\"\n[s10] \"Isn't it a shame to come all the way out here and just be at your phone?\""
2004203-75 = "Ugh, nagging me like an adult... Wait, I guess you are one!"
2004203-80 = "...Fine, fine. I guess it's pretty rude for me to just be on my phone while we're together. And I wouldn't want you to be bored either."
2004203-81 = "Then what should we do?"
2004203-82 = "Ah, got it! Sensei, let's have a match. Whoever gets to that valley first wins!"
2004203-83 = "Heehee, and the loser has to buy the winner a drink later!"
2004203-87 = "[ns] \"M-Maki. Hold up...!\""
2004203-92 = "Heehee, I'm first!"
2004203-96 = "What's wrong, Sensei? You're always nagging at us to exercise more, but you seem way more out of shape than I am!"
2004203-97 = "[s11] \"I've been living a sedentary life lately...\"\n[s12] \"I underestimated the stamina of youth.\""
2004203-104 = "Anyways, this valley's kinda bland."
2004203-105 = "Some sculptures and distinctive colors would really brighten it up."
2004203-106 = "[s13] \"Apparently this place is known for its autumn leaves.\"\n[s14] \"It does look a little bland since autumn is over.\""
2004203-109 = "Yeah..."
2004203-114 = "Ah, I've got a good idea!"
2004203-115 = "Sensei. Hold on just a moment!"
2004203-120 = "Now, Sensei. Try looking at the surroundings through my phone camera."
2004203-121 = "[ns] \"Let's see...\""
2004203-128 = "[ns15] \"...The whole valley is filled with colorful autumn leaves!\"\n[ns16] \"How'd you add all of the leaves?\""
2004203-131 = "I told you earlier. It's augmented reality!"
2004203-132 = "There's a feature in this AR game that utilizes the system to display not only monsters, but also desired drawings."
2004203-133 = "I tried making use of that to draw vibrant autumn leaves all over the valley."
2004203-134 = "What do you think? Seeing the world via augmented reality isn't half bad, right?"
2004203-135 = "[s17] \"I guess I really can't deny that...\"\n[s18] \"Turns out there are times the world is brighter through a screen.\""
2004203-138 = "Of course. Give me a pen and a bit of inspiration, and I'll color the world with endless vivacity and joy!"
2004203-139 = "Maybe I'll fill the surroundings with more colors since I have my pen!"
2004203-140 = "Sensei, is there anything you want to add to our environment? Let me know, and I'll draw it for you!"
2004203-141 = "[s] \"All right, maybe I'll make some requests.\""
2004203-146 = "Afterwards, I had a good time enjoying the scenery Maki drew for me on her phone."

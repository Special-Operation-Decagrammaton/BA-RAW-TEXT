[translation]
2004203-1 = "AR"
2004203-2 = "(ในวันหยุดสุดสัปดาห์ คุณครูไปที่ทางเดินเขาใกล้ๆ มิลเลเนียมตามที่มากิชวนไว้)"
2004203-7 = "อึก... อึกก..."
2004203-8 = "[s1] \"สวัสดี มากิ\"\n[s2] \"มากิ มาเดินถือโทรศัพท์ทำอะไรอยู่น่ะ?\""
2004203-11 = "อ๊ะ คุณครู มาแล้วเหรอ?"
2004203-12 = "ขอโทษนะ แต่ฉันขอเวลาแป๊บหนึ่ง ฉันกำลังทำเควสประจำวันของวันนี้อยู่..."
2004203-13 = "เคลียร์ดันเจี้ยนประจำวันไปแล้ว ใช้สตามิน่าไปหมดแล้ว แล้วก็รับโบนัสล็อกอินแล้วด้วย..."
2004203-14 = "งั้นเควสประจำวันก็เสร็จแล้วละ!"
2004203-18 = "[ns3] \"ครูไม่ได้จะบ่นงานอดิเรกของมากิหรอกนะ แต่นี่เรามาปีนเขา...\"\n[ns4] \"เรามาภูเขาทั้งที มาชื่นชมธรรมชาติกันไม่ดีกว่าเหรอ?\""
2004203-21 = "อ้อ เรื่องนั้นไม่ต้องกังวลหรอก"
2004203-22 = "ก็เกมที่ฉันเล่นอยู่ตอนนี้เป็นเกม AR น่ะสิ!"
2004203-23 = "ดูนะ มอนสเตอร์ที่ปรากฏตัวในเกมเคลื่อนที่ไปตามสิ่งต่างๆ ที่กล้องถ่ายได้เลย เพราะงั้นระหว่างที่ฉัน#nเล่นเกม ฉันก็ชื่นชมธรรมชาติไปด้วยได้ยังไงล่ะ"
2004203-24 = "[s] \"ครูไม่ได้หมายความให้ดูผ่านกล้องนะ...\""
2004203-25 = "โชคดีที่เส้นทางเดินเขาตรงนี้มีสัญญาณอินเทอร์เน็ต ไม่เหมือนที่ที่เรามาตั้งแคมป์กันเมื่อก่อน"
2004203-26 = "ที่จริงแล้วที่ฉันชวนมาปีนเขาวันนี้ก็เพราะเกมนี้ละ..."
2004203-31 = "ไม่สิ นี่ไม่ใช่เวลามาคุยเรื่องนี้อยู่ ฤดูหนาวมันจะมืดเร็วนะ"
2004203-32 = "งั้นเรารีบกันเถอะ คุณครู ถ้าพระอาทิตย์ตกดิน เราจะเห็นภูเขาได้ไม่เต็มที่นะ!"
2004203-43 = "อืม มันน่าจะอยู่แถวๆ นี้สิ"
2004203-44 = "[s5] \"มากิ เดินมองทางด้วย\"\n[s6] \"มากิ มองแต่มือถือเดี๋ยวก็ล้มหรอก\""
2004203-47 = "เข้าใจแล้ว~"
2004203-48 = "แปลกจัง... ในเว็บไซต์บอกว่ามันอยู่แถวๆ นี้นี่นา"
2004203-49 = "หรือว่าฉันจะอ่านพิกัดผิด?"
2004203-50 = "[s] \"กำลังหาของอะไรอยู่เหรอ?\""
2004203-51 = "ไม่ใช่สิ่งของหรอก มันใกล้เคียงกับสัตว์ป่ามากกว่า..."
2004203-55 = "อ๊ะ เจอแล้ว!"
2004203-56 = "คุณครู ดูตรงนี้สิ เพียงพอนไซบีเรียสีทอง!"
2004203-57 = "[s] \"ไหนเหรอ? ครูไม่เห็นเลย...\""
2004203-58 = "ไม่ใช่ตรงนั้น จากในโทรศัพท์มือถือของฉันต่างหาก"
2004203-59 = "ดูลำธารในหุบเขาจากในหน้าจอของฉันนะ ข้างใต้นั่นมีเพียงพอนไซบีเรียที่ส่งประกายสีเหลืองทอง#nวิ่งอยู่ เห็นมั้ย?"
2004203-60 = "ฮุฮุ เพียงพอนไซบีเรียสีทองตัวนี้เป็นมอนสเตอร์ที่ให้รางวัลมากที่สุดในเกม AR นี้เลยละ มันไม่ได้ปรากฏตัวให้เห็นไปทั่วหรอกนะ เป็นมอนสเตอร์หายากเลยละ"
2004203-61 = "แต่ว่ามีผู้เล่นคนหนึ่งบอกว่าเจอมันแถวๆ เส้นทางเดินเขาตรงนี้ ฉันก็เลยลองตามมาบ้าง ไม่คิดเลยนะเนี่ยว่าจะได้เจอจริงๆ น่ะ!"
2004203-62 = "[s7] \"ก็เลยชวนครูมาปีนเขาวันนี้สินะ...\"\n[s8] \"ที่มาปีนเขาวันนี้ก็เพราะเกม AR นี้สินะ...\""
2004203-65 = "อืม"
2004203-69 = "ทะ... ทำไมจ้องกันด้วยสายตาแบบนั้นล่ะ?!"
2004203-70 = "รุ่นพี่จิฮิโระก็บอกว่าเกม AR เป็นเกมที่ดีนะ!"
2004203-71 = "ถ้าจะเล่นเกม AR เราก็ต้องออกมาข้างนอก งั้นก็ถือเป็นการออกกำลังกายไปในตัวด้วย... รุ่นพี่เขาบอกว่ามันดีต่อสุขภาพมากกว่าเกมอื่นๆ น่ะ!"
2004203-72 = "[s9] \"ครูไม่ได้ว่าเรื่องการเล่นเกมหรอก แต่เรามาปีนเขาทั้งที...\"\n[s10] \"ออกมาปีนเขาทั้งที ถ้ามัวแต่ดูโทรศัพท์มันก็น่าเสียดายนะ?\""
2004203-75 = "อึก บ่นเหมือนผู้ใหญ่เลย... ไม่สิ ก็คุณครูเป็นผู้ใหญ่นี่นา"
2004203-80 = "เข้าใจแล้ว... ถ้าเอาแต่จ้องหน้าจอโทรศัพท์ตอนคุณครูอยู่ข้างๆ มันก็เป็นการเสียมารยาท แล้วคุณครูก็อาจจะเบื่ออีกด้วย"
2004203-81 = "งั้นจากนี้เราไปทำอะไรกันดีล่ะ?"
2004203-82 = "อ้อ จริงสิ! คุณครูมาแข่งกับฉันมั้ย? มาแข่งกันว่าใครจะไปถึงลำธารในหุบเขาได้ก่อน!"
2004203-83 = "ฮุฮุ ใครไปถึงทีหลังต้องเป็นคนซื้อเครื่องดื่มให้นะ!"
2004203-87 = "[ns] \"มะ... มากิ รอครูด้วย...!\""
2004203-92 = "ฮุฮุ ฉันมาถึงก่อน!"
2004203-96 = "อะไรเนี่ย คุณครู~ ทีปกติละบอกให้พวกฉันออกกำลังกาย แต่ตอนนี้คุณครูดูอ่อนแอที่สุดเลยนะ"
2004203-97 = "[s11] \"ช่วงนี้เอาแต่นั่งมากเกินไปหรือเปล่านะ...\"\n[s12] \"ไม่ควรดูถูกพละกำลังของนักเรียนเลย...\""
2004203-104 = "จะว่าไป ฉันว่าหุบเขาตรงนี้มันให้ความรู้สึกน่าเบื่อนะ"
2004203-105 = "ถ้ามีอะไรสีสันสดใสมาวางเยอะๆ ก็น่าจะดีกว่านี้..."
2004203-106 = "[s13] \"ที่นี่เหมือนจะมีชื่อเสียงเรื่องใบไม้เปลี่ยนสีน่ะ แต่ตอนนี้ไม่มีแล้ว\"\n[s14] \"พอไม่มีใบไม้เปลี่ยนสีแล้ว ที่นี่ก็ดูทึมๆ เหมือนกันเนอะ\""
2004203-109 = "นั่นสิเนอะ..."
2004203-114 = "อ๊ะ ฉันคิดอะไรดีๆ ได้แล้ว!"
2004203-115 = "คุณครู รอฉันแป๊บหนึ่งนะ!"
2004203-120 = "เอาละ คุณครู ลองมาดูทิวทัศน์จากกล้องในโทรศัพท์มือถือของฉันดูสิ"
2004203-121 = "[ns] \"ไหนดูซิ...\""
2004203-128 = "[ns15] \"ใบไม้เปลี่ยนสีเต็มหุบเขาไปหมดเลย ทำได้ไงเนี่ย?\"\n[ns16] \"ทำไมถึงมีใบไม้เปลี่ยนสีเต็มหุบเขาแบบนี้ล่ะ?\""
2004203-131 = "ก็อย่างที่บอกไปเมื่อกี้ไง นี่คือฟังก์ชันของ AR น่ะ"
2004203-132 = "จากคอนเทนต์ทั้งหมดของเกม AR เกมนี้ นอกจากจะมีการใช้ระบบ AR ในการสร้างมอนสเตอร์ให้อยู่#nในสภาพแวดล้อมโดยรอบแล้ว ยังมีฟังก์ชันที่สร้างรูปภาพที่ต้องการได้อีกด้วย"
2004203-133 = "ฉันก็เลยใช้ฟังก์ชันนั้นวาดใบไม้เปลี่ยนสีที่สีสันสดใสในหุบเขานี้ดู"
2004203-134 = "เป็นยังไงล่ะ? โลกที่มองเห็นผ่านแอป AR ก็ไม่เลวเลยใช่มั้ย?"
2004203-135 = "[s17] \"ปฏิเสธไม่ได้เลยนะเนี่ย...\"\n[s18] \"โลกในหน้าจอดูมีสีสันมากกว่าของจริงตรงหน้าอีก\""
2004203-138 = "ใช่มั้ยล่ะ? แค่ฉันมีปากกากับแรงบันดาลใจนิดหน่อย ฉันก็ระบายสีโลกให้สวยงามได้ตามต้องการเลย"
2004203-139 = "ไหนๆ ก็ได้จับปากกาแล้ว งั้นเรามาระบายสีรอบๆ นี้ให้สวยงามกันเลยมั้ย?"
2004203-140 = "คุณครูคิดว่าควรเพิ่มวัตถุอะไรไปแถวนี้อีกหรือเปล่า? ถ้าครูบอกเดี๋ยวฉันวาดให้เอง!"
2004203-141 = "[s] \"งั้นครูรบกวนมากิหน่อยแล้วกัน\""
2004203-146 = "(หลังจากนั้นคุณครูก็ใช้เวลาอย่างสนุกสนานไปกับการดื่มด่ำวิวทิวทัศน์ที่มากิวาดให้)"

[translation]
2004203-1 = "擴增實境"
2004203-2 = "（週末的假日，來到了真紀提過的千年附近的登山步道）"
2004203-7 = "唔……唔唔……"
2004203-8 = "[s1]「嗨，真紀。」\n[s2]「你拿著手機在做什麼？」"
2004203-11 = "啊，老師，你這麼快就到了啊。"
2004203-12 = "抱歉稍等我一下。#n我正在做今天的每日任務……"
2004203-13 = "每日地城打完，體力已經清空，登入獎勵也領了──"
2004203-14 = "今天的每日任務結束！"
2004203-18 = "[ns3]「我沒有想批評真紀個人喜好的意思……」\n[ns4]「不過難得出來爬山，是不是應該專注在周圍的風景比較好？」"
2004203-21 = "啊，這點你不用擔心。"
2004203-22 = "我正在玩的這個遊戲是……[ruby=AR]擴增實境[/ruby]遊戲！"
2004203-23 = "你看，遊戲裡面的怪物會跟著相機拍到的地貌移動哦！#n所以我在玩遊戲的同時，也在仔細觀察著周圍的風景。"
2004203-24 = "[s]「我不是那個意思……」"
2004203-25 = "而且幸好這個登山步道的訊號，不像上次去的露營區那麼差。"
2004203-26 = "其實我今天之所以提議要來爬山，也是因為在這個遊戲裡面──"
2004203-31 = "哎呀，現在不是討論這種事情的時候了。#n聽說冬天的山區很早就會天黑。"
2004203-32 = "老師，我們快走吧。#n要是太陽下山就沒辦法好好觀察山景了！"
2004203-43 = "唔嗯，明明是在這附近才對啊。"
2004203-44 = "[s5]「真紀，走路的時候要看著前面。」\n[s6]「盯著手機看的話，小心會跌倒哦。」"
2004203-47 = "知道了～"
2004203-48 = "……真奇怪，攻略網站明明寫說在這附近的啊。"
2004203-49 = "難道是我看錯座標了嗎？"
2004203-50 = "[s]「你在找什麼東西嗎？」"
2004203-51 = "我在找的不是東西，應該更類似於野生動物。"
2004203-55 = "啊，找到了！"
2004203-56 = "老師，你看這個。是黃金鼠狼！"
2004203-57 = "[s]「哪裡？我沒看到耶……」"
2004203-58 = "不是那邊，是我手機裡的畫面。"
2004203-59 = "金光閃閃的鼠狼正在相機裡的溪谷下面跑來跑去，看到了嗎？"
2004203-60 = "呵呵，黃金鼠狼是這款AR遊戲裡獎勵最多的怪物，在普通區域可是很難遇到的哦。"
2004203-61 = "不過我看到有個玩家說，黃金鼠狼會在這條登山步道出現，所以才過來看看──#n沒想到居然真的有！"
2004203-62 = "[s7]「所以你今天提議要來登山……」\n[s8]「難道是因為那個AR遊戲？」"
2004203-65 = "嗯。"
2004203-69 = "為，為什麼要用那種眼神看我！？"
2004203-70 = "千尋前輩也說玩AR遊戲沒關係呀！"
2004203-71 = "畢竟要玩AR遊戲就得到外面走動，所以也能順便運動……比其他遊戲健康多了！"
2004203-72 = "[s9]「我不是在指責你玩遊戲……」\n[s10]「只是難得出來一趟，一直盯著手機看不是很可惜嗎？」"
2004203-75 = "唔唔，是大人的嘮叨……不過老師本來就是大人，會這樣也很正常吧。"
2004203-80 = "……我知道了。#n把老師晾在一邊，一直盯著手機也不太禮貌，還會讓老師覺得很無聊吧……"
2004203-81 = "那我們現在該玩什麼好呢？"
2004203-82 = "啊，對了！老師來跟我比賽吧。#n看誰能最先抵達那邊的溪谷！"
2004203-83 = "呵呵，比較慢的人之後要請喝飲料哦！"
2004203-87 = "[ns]「真，真紀，等一下……！」"
2004203-92 = "呵呵，我是第一名！"
2004203-96 = "什麼嘛，老師～#n平常一直要我們多運動，結果老師現在看起來更弱耶。"
2004203-97 = "[s11]「是我最近坐太久了嗎……」\n[s12]「太小看學生的體力了……」"
2004203-104 = "話說回來，這個溪谷感覺好像少了點什麼。"
2004203-105 = "要是能多一些色彩鮮明的東西就好了……"
2004203-106 = "[s13]「我查了一下，這個溪谷好像是以楓葉聞名。」\n[s14]「不過可能是因為賞楓季節已經過了的關係，稍微有點可惜呢。」"
2004203-109 = "就是說啊……"
2004203-114 = "啊，我想到一個好點子了！"
2004203-115 = "老師，稍等我一下！"
2004203-120 = "來，老師。#n這次透過我的手機相機來欣賞風景吧？"
2004203-121 = "[ns]「我看看……」"
2004203-128 = "[ns15]「……整個溪谷都被楓葉染紅了？」\n[ns16]「這是怎麼辦到的？」"
2004203-131 = "是我剛才說過的擴增實境功能哦。"
2004203-132 = "這款AR遊戲除了能在周圍加入怪物之外，還能利用AR功能呈現出喜歡的圖畫。"
2004203-133 = "我就是用那個功能，幫溪谷畫上了華麗的落葉。"
2004203-134 = "怎麼樣？透過擴增實境看到的世界也很不賴吧？"
2004203-135 = "[s17]「確實無法否認……」\n[s18]「畫面裡的世界，有時候也會比現實世界更豐富多彩呢。」"
2004203-138 = "那當然囉。#n只要給我一支筆和一點靈感，我就能盡情揮灑出華麗的世界。"
2004203-139 = "難得拿起畫筆，我就把周圍塗得更繽紛一點吧？"
2004203-140 = "老師有什麼想加進畫面裡的東西嗎？#n儘管說，我幫你畫出來！"
2004203-141 = "[s]「那就拜託真紀了。」"
2004203-146 = "（之後欣賞著真紀畫出的風景，度過了愉快的時光）"

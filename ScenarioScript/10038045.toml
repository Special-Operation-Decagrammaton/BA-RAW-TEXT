10038045-19 = "5;카이;08;선단(仙丹)은, 분명히 네 몫까지 만들어 두었으니 말이다."
10038045-20 = "#all;hide"
10038045-21 = "3;배신한 연단방 부원;00;이것으로, 저희는 선인(仙人)으로 보다 한 걸음……!\n#3;em;[///]\n#3;stiff"
10038045-22 = "3;카이;08;그렇지. 모든 것을 초월한 선인(仙人)이 되는 것. 그것이 우리 연단방의 설립 목표였다."
10038045-23 = "3;카이;07;심지어 그 사야마저도 그 목표를 잊지 않고 있었던 모양이었으니."

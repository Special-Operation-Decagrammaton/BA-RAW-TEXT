[translation]
10038045-4 = "รายงานจากฝั่งประตูหลักค่ะ มีผู้โจมตี 2 คน จนถึงตอนนี้ยังไม่มีปัญหาใหญ่โตอะไรค่ะ"
10038045-9 = "งั้นเหรอ? ทางนี้ก็ไม่มีปัญหาอะไร เท่านี้ก็... เสร็จสมบูรณ์แล้วละ"
10038045-10 = "นี่มัน...?!"
10038045-11 = "ใช่แล้วละ... ฉันกลับมาที่นี่ก็เพื่อสิ่งนี้..."
10038045-12 = "เป็นเวลานานโขเลยนะ..."
10038045-13 = "ถ้าอย่างนั้น... ฉันจะได้บ้างมั้ยคะ...?"
10038045-14 = "อ้อ... เธอรอสิ่งนั้นอยู่งั้นเหรอ? หึหึหึหึ..."
10038045-15 = "ไม่ต้องกังวลหรอก เราสัญญาเรื่องนั้นกันไว้แล้ว และฉันเป็นคนที่รักษาสัญญาด้วย"
10038045-19 = "ฉันทำน้ำอมฤตของเธอไว้ให้แล้ว"
10038045-21 = "ด้วยสิ่งนี้ ฉันจะได้เข้าใกล้ความเป็นเทพได้อีกก้าว...!"
10038045-22 = "ใช่แล้ว การได้เป็นเทพผู้อยู่เหนือทุกสิ่งอย่าง นั่นคือเป้าหมายในการก่อตั้งชมรมวิจัยศาสตร์การปรุงยา#nของเรา"
10038045-23 = "แม้แต่ซายะก็ดูเหมือนจะยังไม่ลืมเป้าหมายนั้นด้วย"
10038045-27 = "..."
10038045-28 = "จะว่าไป ตอนนี้ในซานไห่จิงกำลังจัดเทศกาลเงาจันทร์ใช่มั้ย?"
10038045-29 = "ยังไม่ได้จัดเลยค่ะ เดิมทีแล้วตอนนี้พวกเราต้องวุ่นกับการเตรียมงานเทศกาลกันแล้ว แต่ว่า..."
10038045-30 = "อย่างนั้นเหรอ ตอนนี้บรรยากาศในโรงเรียนไม่ค่อยสงบเพราะโรคเด็กลงของฉันสินะ เป็นไปตามที่ฉันตั้งใจเลยละ"
10038045-31 = "..."
10038045-32 = "ช่างบังเอิญจังเลยนะ เธอก็คิดเหมือนกันมั้ยล่ะ?"
10038045-36 = "หมายถึง... เรื่องไหนเหรอคะ?"
10038045-37 = "มีเรื่องเล่าสืบทอดเกี่ยวกับเทศกาลเงาจันทร์"
10038045-38 = "ที่เชื่อกันว่าเทพเจ้าที่จากไปยังดวงจันทร์จะกลับมาเยือนโลกมนุษย์เพื่อดูความเป็นอยู่ของผู้คน แล้วกลับไปอีกครั้งยังไงล่ะ"
10038045-39 = "เรื่องนี้ยังมีอีกแง่มุมหนึ่งที่ไม่ค่อยมีใครรู้จัก เธอรู้กับเขาด้วยมั้ยล่ะ?"
10038045-40 = "ได้โปรดบอกฉันด้วยเถอะค่ะ"
10038045-41 = "ก็ไม่ใช่เรื่องราวที่ยิ่งใหญ่อะไรหรอก ก็แค่เรื่องราวของเทพที่ก่อเรื่องวุ่นวายในโลกจนถูกรังแกข่มเหง และสุดท้ายก็ถูกไล่ออกไปน่ะ"
10038045-42 = "แล้วที่เทพองค์นั้นกลับไปที่ดวงจันทร์อีกครั้ง...?"
10038045-43 = "มันก็แบบนั้นละ ถ้าพอใจกับชีวิตบนโลก แล้วจะมีเหตุผลอะไรให้กลับไปล่ะ?"
10038045-44 = "เราคุยกันเยอะไปแล้วละ เรามาดื่มน้ำอมฤตนี้กันเถอะ"
10038045-49 = "อย่ากังวลไปเลย ฉันจะดื่มเข้าไปก่อนเอง"
10038045-54 = "ถ้างั้นฉันก็..."
10038045-65 = "อึก...?!"
10038045-71 = "ฮู่ว... ว่ากันว่าถ้าใช้ยาเกินขนาด ยาจะเป็นพิษได้..."
10038045-77 = "ทนไม่ไหวอย่างนั้นสินะ... เสียใจด้วยนะ "
10038045-78 = "ฮุฮุ ฮุฮุฮุฮุ..."
10038045-82 = "อ่า... เริ่มรู้สึกได้แล้ว เลือดเริ่มไหลเวียนไปทั่วร่างกาย ความมีชีวิตชีวาก็ค่อยๆ เพิ่มมากขึ้น"
10038045-83 = "ใกล้ถึงเวลาที่แขกตัวจริงจะมาถึงแล้ว เจ้าของชมรมวิจัยศาสตร์การปรุงยาคงต้องออกไปต้อนรับด้วย#nตัวเองแล้วละ"
10038045-87 = "กำลังรออยู่เลยละ คิซากิ"
10038045-88 = "ขอร้องละ อย่าทำให้ฉันต้องผิดหวังนักเลย"

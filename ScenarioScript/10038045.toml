10038045-29 = "1;배신한 연단방 부원;02;한창…… 까지는 아닙니다. 원래대로라면 축제 준비로 부산했어야 했겠지만…….\n#1;ar\n#3;m5"
10038045-30 = "3;카이;03;그렇군, 그렇군. 나의 어린이 병 때문에 어수선한 분위기라는 의미인가. 의도한 대로이기는 하지만 말이지."

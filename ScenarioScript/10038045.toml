[translation]
10038045-4 = "從正門傳來了報告。#n襲擊的人數為兩人，目前問題並不大。"
10038045-9 = "這樣啊。我這裡也沒問題。#n這樣……就算是完成了。"
10038045-10 = "這是……！？"
10038045-11 = "沒錯……就是這個。#n這就是我回到這裡的原因……"
10038045-12 = "真是段漫長的時間啊……實在太漫長了。"
10038045-13 = "那麼，我也可以……？"
10038045-14 = "呵呵，你在等這個嗎？#n咯咯……"
10038045-15 = "別擔心，那是我們的約定對吧。#n我是個守約的人。"
10038045-19 = "這仙丹，我也確實為你準備了一份。"
10038045-21 = "這樣一來，我們就離成為仙人更近了一步……"
10038045-22 = "沒錯。成為超越一切的仙人──這就是我們鍊丹術研究會創立的目標。"
10038045-23 = "這點就連沙耶也始終沒有忘記。"
10038045-27 = "……"
10038045-28 = "話說回來，現在山海經正在舉辦月影祭嗎？"
10038045-29 = "要說正在舉辦……可能有點困難。#n這個時期原本應該忙著準備慶典才對，不過……"
10038045-30 = "這樣啊這樣啊。#n因為我引發的還童症，導致氣氛陷入混亂……跟我預期的一樣呢。"
10038045-31 = "……"
10038045-32 = "真是太巧了──你不這麼覺得嗎？"
10038045-36 = "您指的是……哪個方面呢？"
10038045-37 = "月影祭還有另一個傳說。"
10038045-38 = "仙人將從月亮回歸這片土地，並在廣施恩澤、啟迪道理後再次離開。"
10038045-39 = "不過在這之中還隱藏著不為人知的另一面。你知道嗎？"
10038045-40 = "……還請賜教。"
10038045-41 = "其實也沒什麼大不了的。#n只是為世界帶來動盪的仙人，最終在受盡折磨與迫害後遭到驅逐罷了。"
10038045-42 = "也就是說，仙人之所以再次回到月亮是因為……？"
10038045-43 = "正是如此。#n假如對地上的生活感到滿意，又豈有回去的必要呢？"
10038045-44 = "話說得太多了。#n那麼，就來服用仙丹吧。"
10038045-49 = "你不必擔心。我會先服用的。"
10038045-54 = "那麼我也……"
10038045-65 = "唔……！？"
10038045-71 = "呼……藥效過強便是毒……"
10038045-77 = "你沒能撐住嗎……真教人遺憾。"
10038045-78 = "咯咯，咯咯咯……"
10038045-82 = "啊啊，我感覺到了。#n血液流淌全身，活力不斷湧現。"
10038045-83 = "真正的客人應該快到了吧。#n作為鍊丹術研究會的主人，我應該親自迎接才是。"
10038045-87 = "我一直在等著你，妃姬。"
10038045-88 = "拜託可別讓我太失望哦？"

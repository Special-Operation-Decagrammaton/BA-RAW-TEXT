10038045-37 = "3;카이;03;월영제에는, 또 다른 구전이 전해지지."
10038045-38 = "3;카이;00;달로 떠났던 선인(仙人)이 이 땅으로 돌아와, 덕을 베풀고 도를 일깨운 뒤 다시 떠난다는 이야기 말이다.\n#3;m4"
10038045-39 = "3;카이;07;거기에는 잘 알려지지 않은 다른 측면도 숨어 있지. 너는 알고 있는가?\n#3;em;[?]"
10038045-40 = "1;배신한 연단방 부원;05;……가르침을 청합니다."
10038045-41 = "3;카이;03;뭐, 대단한 이야기는 아니다. 그저 결과적으로 세상에 평지풍파를 일으킨 선인(仙人)을, 결국 괴롭히고 핍박한 끝에 내쫓았다는 정도의 이야기지."

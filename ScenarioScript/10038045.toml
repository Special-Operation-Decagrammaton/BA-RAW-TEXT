10038045-12 = "5;카이;07;길었구나. 정말로 길었어."
10038045-13 = "3;배신한 연단방 부원;00;그렇, 다면. 저에게도……?\n#3;em;…"
10038045-14 = "5;카이;08;아하. 그것을 기다리고 있었느냐? 쿡쿡쿡쿡……"
10038045-15 = "5;카이;03;걱정하지 말거라. 그것은 분명히 우리의 약속이었지. 그리고 나는 약속을 지키는 사람이다.\n#5;m3\n#3;dl"

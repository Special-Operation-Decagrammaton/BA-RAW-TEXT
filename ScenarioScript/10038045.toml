[translation]
10038045-4 = "We have another report from the main gate. There are only two attackers, nothing we can't handle."
10038045-9 = "Is that so? Then all's well across the board. Especially...now that it's complete."
10038045-10 = "Is that...?!"
10038045-11 = "Yes... This is it. This is what I came back for..."
10038045-12 = "Such a long journey, it was..."
10038045-13 = "...I can have some too, right?"
10038045-14 = "Ah, that is what you've been waiting for, isn't it? Keh heh Keh heh..."
10038045-15 = "Never fear. That was our promise. And I always keep my promises."
10038045-19 = "Of course I've made enough for you as well."
10038045-21 = "You and I together will take a great step toward sagehood!"
10038045-22 = "Yes, to become a transcendent sage. That was the Society's goal from the start."
10038045-23 = "Even Saya didn't forget it."
10038045-27 = "......"
10038045-28 = "...By the way, any news of the Moonlight Festival?"
10038045-29 = "It's not fully underway yet. Normally, there'd be a lot of bustle by now, but..."
10038045-30 = "I see, I see. Things must be quite chaotic there, with my — what are they calling it? — \"Tyke Syndrome\" in the mix."
10038045-31 = "......"
10038045-32 = "Fitting, isn't it?"
10038045-36 = "...What do you mean?"
10038045-37 = "There is another legend of the Moonlight Festival."
10038045-38 = "You know the story of the sage, who left for the moon, returning to spread virtue and enlighten others before departing again."
10038045-39 = "But that story has another side. Do you know it?"
10038045-40 = "...Enlighten me."
10038045-41 = "The truth is, the sage stirred up turmoil and discord, until they had to flee from persecution."
10038045-42 = "So the Sage didn't \"return\" to the moon voluntarily?"
10038045-43 = "Why would they, if they made life here so wonderful?"
10038045-44 = "But enough chatter. The potion."
10038045-49 = "And have no fear. I'll take it first."
10038045-54 = "My turn..."
10038045-65 = "What?!"
10038045-71 = "Hmm... Too strong of a dose can turn medicine into poison."
10038045-77 = "It seems you didn't have the fortitude for it. So it goes. "
10038045-78 = "Keh heh heh..."
10038045-82 = "Ahh, I can feel it. All this vitality, surging through my body..."
10038045-83 = "My guests should be arriving soon. I should go out and greet them, as the master of this society."
10038045-87 = "I've been waiting for you, Kisaki."
10038045-88 = "Please don't disappoint me too much."

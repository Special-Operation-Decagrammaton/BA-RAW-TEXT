[translation]
12010-1 = "Episode 1;An Unexpected Alliance"
12010-5 = "Unforgivable, unforgivable, unforgivable..."
12010-7 = "I will never, ever, ever, ever forgive... Eh?"
12010-8 = "[s] Lock eyes with Haruka."
12010-9 = "..."
12010-16 = "[ns1] \"Better pretend I didn't see anything...\"\n[ns2] Ignore what you just saw."
12010-21 = "..."
12010-22 = "..."
12010-23 = "..."
12010-25 = "You're their senior administrator? That would make you the Prefect Team's second-in-command..."
12010-26 = "Please! You make it sound much more glamorous than it truly is.#nI'm nothing more than a supportive secretary to the head prefect."
12010-27 = "Your subordinates wouldn't have any reason to be quivering in their boots right now if that's all you were."
12010-28 = "Wh-Who says I'm quivering?!"
12010-29 = "..."
12010-30 = "A very astute observation! Let's see... You must be Sunaookami Shiroko."
12010-31 = "..."
12010-32 = "Rumor has it, Abydos' student council were the only ones remaining in the district. I suppose that must be all of you."
12010-33 = "From what I understand, there's supposed to be five Abydos student council members. It would seem you're missing one of your rank."
12010-34 = "Our president is away right now. And we're not the student council.#nWe're the Foreclosure Task Force, Miss Senior Administrator."
12010-35 = "Okusora, right? Are there no student council members present? I'd like to speak with the student council, if you please."
12010-36 = "The Abydos student council is long gone! For all intents and purposes, we're now the acting student council here. So if you've got anything to say, you can say it to us!"
12010-37 = "And if holding someone at gunpoint is your idea of having a conversation, that's pretty reprehensible, if you ask me."
12010-38 = "Oh..."
12010-39 = "My apologies. All units, stand down."
12010-40 = "*click*"
12010-42 = "*click* *clack*"
12010-43 = "Whoa..."
12010-44 = "They actually did it..."
12010-45 = "..."
12010-46 = "Allow me to apologize for my colleagues' reckless misuse of force."
12010-47 = "The hell?! But I was just following orders! Ako?!"
12010-48 = "Were your orders to blindly engage using indiscriminate bombardment?"
12010-49 = "W-Well, supporting firepower is a mainstay of above-ground tactical deployment for the infantry..."
12010-50 = "Does it not go without saying that certain precautions are to be taken when operating within the district of another academy?"
12010-51 = "(Hmm?)"
12010-52 = "Again. My sincere apologies to the Foreclosure Task Force."
12010-53 = "The Gehenna Prefect Team was mobilized to take specific individuals who have violated our academy's regulations into custody."
12010-54 = "This was an unfortunate incident, but since nothing illegal has transpired...I hope you'll be understanding. We were only acting in accordance with the urgency of the situation."
12010-55 = "I ask for your cooperation during the execution of the Prefect Team's duties."
12010-56 = "And like we said before...that's not gonna happen!"
12010-57 = "Oh...?"
12010-58 = "An academy like Gehenna abusing their massive forces to wantonly conduct tactical operations at a tiny school like ours?!"
12010-59 = "That's a crystal-clear breach of jurisdictional authority!"
12010-61 = "We'll be the ones to decide how Problem Solver will be dealt with!"
12010-62 = "..."
12010-63 = "..."
12010-64 = "..."
12010-65 = "It's disgraceful that an academy of Gehenna's caliber would abuse their power to launch this kind of assault!"
12010-67 = "Hmm..."
12010-68 = "It would seem you all feel the same way."
12010-69 = "I'm shocked you would be so obstinate, even in the face of our troops... "
12010-70 = "Could the source of this confidence be rooted in the abilities of a certain individual you have in your corner? Perhaps...[USERNAME] Sensei?"
12010-71 = "[s] \"...\""
12010-72 = "Sensei, you're the official advisor of Schale. Does this mean you agree with the Foreclosure Task Force?"
12010-73 = "[s3] \"Problem Solver may be a bunch of dummies, but they're not bad kids.\"\n[s4] \"Aru may be kinda dumb, but she's not a bad apple.\"\n[s5] \"Okay, they're ALL kinda stupid, but not THAT stupid.\""
12010-74 = "What?! Of course they're a bunch of rotten apples! They blew up the ramen shop!"
12010-75 = "What?! Of course they're a bunch of rotten apples! They blew up the ramen shop!"
12010-76 = "What?! Of course they're a bunch of rotten apples! They blew up the ramen shop!"
12010-77 = "They definitely did that...but I bet they blew it up by mistake and then felt compelled to roll with it."
12010-78 = "What?!"
12010-79 = "If that explosion had really been meant for us, why set it off at the ramen shop when nobody was there? All that did was expose their plan. And it was a terrible trap from the get-go."
12010-80 = "Huh. I guess you have a point."
12010-81 = "They laid a trap and then sprung it on themselves by accident?#nGeez. Who would hire those idiots?"
12010-82 = "Regardless, it doesn't change the fact they demolished the ramen shop.#nSo again, we're not handing them over."
12010-83 = "And we still haven't figured out who they're working for.#nWe're not done with them yet."
12010-84 = "In conclusion, there's no need for us to negotiate with you!#nWe demand that the Gehenna Prefect Team withdraws its#nforces immediately!"
12010-86 = "... "
12010-87 = "That's too bad. If that's how it has to be, then you leave me no choice.#nTruly, it brings me no joy to do this, but..."
12010-90 = "We have no choice but to use force."
12010-98 = "*ka-pow* *pow* *pow* *pow*"
12010-99 = "Aaarrrggghhh!"
12010-105 = "*ka-pow* *pow* *pow* *pow*"
12010-106 = "Gahhh!"
12010-110 = "Th-The heck?!"
12010-111 = "Unforgivable..."
12010-112 = "Wh-Where did you come from?! "
12010-114 = "Aaarrrggghhh! Unforgivable! Unforgivable! Unforgivable! Unforgivable! Unforgivable! Unforgivable! Unforgivable! Unforgivable! Unforgivable! "
12010-122 = "*ka-pow* *pow* *pow* *pow* *pow* *pow*"
12010-123 = "Gahhhhhh..."
12010-124 = "(collapse)"
12010-126 = "Enough of your lies, Amau Ako."
12010-127 = "Pardon?"
12010-128 = "What you said about how doing this brings you no joy... That's a lie.#nThis is what you wanted all along."
12010-129 = "Kayoko... "
12010-132 = "Nice one, Haruka! ☆"
12010-133 = "S-Sorry! Sorry I didn't come to the rescue sooner..."
12010-134 = "I-It's all my fault... The plan is ruined! Sh-Should I sacrifice myself as penance?! I'll do it gladly! "
12010-135 = "Yeah, technically, it is all your fault. But I think it's all right now that things are getting a lot more interesting."
12010-136 = "Oh, dear. You managed to break through our perimeter. "
12010-137 = "What the heck? How'd they get all the way there?"
12010-138 = "U-Umm..."
12010-139 = "... "
12010-140 = "My apologies, Senior Administrator. Our attention was on the Abydos students. We'll reassemble the formation right away."
12010-141 = "It's quite all right... As for you, Kayoko. What is it you're getting at?"
12010-142 = "..."
12010-143 = "At first, I was surprised the Prefect Team would show up way out here.#nWhy go out of your way to another school's district just to arrest some petty criminals like us?"
12010-144 = "An inefficient and sloppy use of force like that isn't Hina's style.#nThis was obviously a unilateral decision of yours, Ako."
12010-145 = "..."
12010-146 = "And you mobilized a platoon the size of a small army just to take us into custody? Nah. You did it because you fully anticipated a hostile engagement with another school."
12010-147 = "But the entire student body of this school is only five students...#nWhich leaves only one explanation."
12010-152 = "Your true objective was Schale. What you wanted was Sensei all along."
12010-154 = "...?!"
12010-155 = "Wh-What?!"
12010-156 = "Sensei?!"
12010-157 = "[s] \"Me?\""
12010-159 = "..."
12010-160 = "Hmm."
12010-161 = "Oh, dear. I should've remembered that Problem Solver had someone like you in its ranks, Kayoko. Perhaps I spent too much time dawdling..."
12010-162 = "Ah, well. No matter."
12010-168 = "*stomp* *stomp* *stomp* *stomp* *stomp*"
12010-170 = " ...?!"
12010-173 = "*stomp* *stomp* *stomp* *stomp* *stomp*"
12010-174 = "Prefect Team forces are advancing from all directions..."
12010-175 = "... "
12010-179 = "*stomp* *stomp* *stomp* *stomp* *stomp*"
12010-180 = "..."
12010-181 = "Reinforcements."
12010-182 = "You had more coming? I-In such overwhelming numbers?"
12010-183 = "Okay, maybe I did overdo it just a little...but I figured it was better to be safe than sorry when dealing with Schale."
12010-184 = "It's better to be over-prepared than under-prepared after all! ☆"
12010-185 = "I thought we'd broken past their siege line, but there was another one..."
12010-186 = "Kayoko is right. Well, she's half-right. It's true that I anticipated the worst in the event of a clash with Schale."
12010-187 = "But it's not true that I intended for things to escalate like they did.#nI really hope you believe me when I say that...though I understand if you don't."
12010-189 = "The Tea Party..."
12010-190 = "They act as the student council of Trinity General School—Gehenna Academy's longtime rival."
12010-191 = "Our intelligence gatherers have learned of a report on Schale that was submitted to the Tea Party."
12010-193 = "I'll pass this along to the Tea Party!"
12010-195 = "I had no clue what Schale was at first...but whatever intel the Tea Party had,#nit was absolutely necessary for us to acquire it as well."
12010-196 = "So I took a look at the report Chinatsu had compiled."
12010-197 = "(Very belatedly, that is.)"
12010-198 = "A mysterious organization left behind by the General Student Council president... An extrajudicial club headed by an adult..."
12010-199 = "I can't be the only one who finds that suspicious."
12010-200 = "There are too many unknown variables when it comes to Schale.#nThat's unacceptable with the negotiation with Trinity on the horizon."
12010-201 = "So until it's signed, the Prefect Team will be taking Sensei into our custody."
12010-202 = "Taking care of a group of troublemakers while we do so is simply an added bonus."
12010-203 = "..."
12010-204 = "It's nice that things are being kept simple."
12010-205 = "So your plan is to kidnap Sensei? Do you really think we're gonna let that happen?"
12010-206 = "..."
12010-208 = "Yes. That is the way it will be. Isn't that right, Okusora Ayane?"
12010-209 = "...?"
12010-210 = "We won't hesitate to resort to violence if necessary.#nIn fact, we welcome it."
12010-211 = "...!"
12010-213 = "..."
12010-214 = "Boss, this is our only chance to run. There's no turning back once the battle breaks out."
12010-215 = "The Prefect team will attempt to wipe us and Abydos out in one fell swoop. But if the Abydos students draw their fire away, we may be able to break through one of their weaker points."
12010-216 = "Heh. "
12010-217 = "Heh heh heh..."
12010-218 = "Boss?"
12010-219 = "Oh, Kayoko. You should know me better by now."
12010-220 = "...?"
12010-221 = "Run away? After the way they've treated us? We never turn our backs to the enemy!"
12010-222 = "Problem Solver is anything but a pack of third-rate villains!"
12010-223 = "..."
12010-226 = "I could never forgive myself if I let them get away with such blatant disrespect!"
12010-227 = "Aru..."
12010-228 = "(But we ran away from a fight just yesterday...)"
12010-229 = "*sigh* So you're gonna fight them? They'll be tough to beat, even if we join forces with Abydos..."
12010-230 = "Besides, there's no way the Abydos students will cooperate with us.#nAll that's left is to—"
12010-231 = "All right! We're working with Problem Solver! Let's wipe out those arrogant little twerps!"
12010-232 = "We shall become Sensei's shield."
12010-233 = "...?!"
12010-234 = "All of us will protect Sensei together! Got it?"
12010-235 = "They certainly change gears quickly... "
12010-237 = "Ah... Ahahahaha!"
12010-238 = "Naturally! Who do you think I am? Our victory is assured."
12010-239 = "Trust is met with trust! That's the Problem Solver way!"
12010-241 = "Yes! And we owe it to Sensei!"
12010-242 = "And for the record, we didn't blow up the ramen shop by mistake!#nTh-That was totally on purpose...got it?! "
12010-243 = "It was an act of high-level psychological warfare that only a cold-hearted outlaw like me can use..."
12010-244 = "..."
12010-246 = "Well, then. We certainly knew this was possible..."
12010-247 = "Still, aren't you becoming buddy-buddy a little TOO quickly?#nThese things are supposed to take time."
12010-248 = "But very well."
12010-249 = "Prefect Team, engage. Subdue the Foreclosure Task Force and Problem Solver, and do all you can to secure Sensei."
12010-250 = "Sensei is an outsider to Kivotos, so see to it they aren't harmed."
12010-251 = "I'm gonna make you pay for firing that shotgun at me!"
12010-253 = "The enemy has begun the siege!"
12010-254 = "Sensei! Please lead Problem Solver 68 with us!"

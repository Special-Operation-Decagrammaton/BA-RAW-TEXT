12010-25 = "เจ้าหน้าที่อาวุโสเหรอคะ... ถ้างั้นก็คงเป็นรองประธานคณะกรรมการวินัยสินะคะ..."
12010-26 = "โอ๊ะ ฉันไม่ได้อยู่ในตำแหน่งใหญ่โตแบบนั้นหรอกค่ะ ก็แค่เลขาที่คอยสนับสนุนท่านประธานกรรมการ#nเท่านั้นเองน่ะค่ะ..."
12010-27 = "ถ้าจริงอย่างที่ว่า สมาชิกคณะกรรมการวินัยคนนั้นก็คงไม่ประหม่าขนาดนั้นหรอก"

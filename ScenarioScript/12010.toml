12010-46 = "ฉันขอโทษสำหรับการกระทำที่ไร้การไตร่ตรองของนักเรียนของเราเมื่อสักครู่ด้วยนะคะ\n"
12010-47 = "อะไรนะ?! แต่ฉันทำตามหนังสือคำสั่งนะ?! อาโกะจัง!\n"
12010-48 = "ในหนังสือคำสั่งบอกว่าให้ยิงปืนใหญ่แบบไม่เลือกหน้าเลยเหรอคะ?"
12010-49 = "เอ่อ... บอกว่าให้เสริมกำลังอาวุธแล้วเพิ่มกองกำลัง..."
12010-50 = "เวลามาที่เขตปกครองตนเองของโรงเรียนอื่นแบบนี้ ยิ่งต้องระมัดระวังไม่ใช่เหรอคะ?"
12010-51 = "(หืม......?)\n\n"
12010-52 = "ต้องขอโทษด้วยนะคะ สมาชิกคณะกรรมการแผนงานทุกคน"
12010-53 = "คณะกรรมการวินัยเกเฮนน่ามาที่นี่เพื่อจับกุมผู้ที่ฝ่าฝืนกฎของโรงเรียนเราค่ะ \n\n"
12010-54 = "ถึงจะทำให้เกิดเรื่องที่ไม่น่าพอใจขึ้น แต่ก็ยังไม่ถึงขั้นที่ทำผิดกฎหมายอะไร ขอให้เข้าใจถึงความเร่งด่วน#nของสถานการณ์ของฝ่ายเราด้วยนะคะ"
12010-55 = "และขอให้พวกคุณร่วมมือกับเราด้วยนะคะ"
12010-56 = "เมื่อกี้เราก็บอกไปแล้วนี่คะ... ไม่ได้หรอกค่ะ!"
12010-57 = "หืม?"
12010-58 = "โรงเรียนขนาดใหญ่อย่างเกเฮนน่าพากองกำลังเข้ามาปฏิบัติการตามอำเภอใจในเขตโรงเรียนเล็กๆ ของ#nพวกเราแบบนี้ได้ยังไงคะ...?!"

12010-32 = "ได้ยินมาว่าเขตอะบิดอสมีเหลือแต่สภานักเรียน สงสัยจะเป็นพวกคุณสินะคะ\n"
12010-33 = "แต่เท่าที่รู้มา สภานักเรียนอะบิดอสมีกัน 5 คน... แล้วอีกคนหายไปไหนล่ะคะ?"
12010-34 = "ตอนนี้หัวหน้าไม่อยู่ค่ะ อีกอย่างนะคะเจ้าหน้าที่อาวุโส พวกเราไม่ใช่สภานักเรียน แต่เป็นคณะกรรมการ#nแผนงานต่างหากค่ะ"
12010-35 = "คุณโอคุโซระ... ใช่ไหมคะ? ถ้างั้นสมาชิกสภานักเรียนก็ไม่ได้อยู่ที่นี่น่ะสิคะ? ถ้าเป็นไปได้ฉันก็อยากจะคุย#nกับสภานักเรียนค่ะ"
12010-36 = "สภานักเรียนอะบิดอสถูกยุบไปตั้งนานแล้ว! เพราะงั้นในทางปฏิบัติ พวกเราก็ถือว่าเป็นตัวแทนของสภา#nนักเรียนแหละ อยากคุยอะไรก็พูดกับพวกเรามาได้เลย!"
12010-37 = "บอกว่าขอคุยด้วย แต่มาล้อมไว้แล้วเล็งปืนใส่พวกเราเนี่ยเหรอคะ? ยกโทษให้ไม่ได้หรอกค่ะ"
12010-38 = "อืม..."
12010-39 = "งั้นก็ขอโทษด้วยค่ะ สมาชิกคณะกรรมการวินัยทุกคน รบกวนลดอาวุธลงด้วยค่ะ\n\n\n"

12010-191 = "หน่วยข่าวกรองของเราแจ้งมาว่ามีรายงานเกี่ยวกับชาเล่ต์ส่งไปถึงพวกสภาน้ำชา..."
12010-193 = "ฉันจะกลับไปรายงานเรื่องนี้กับสภาน้ำชาค่ะ!\n\n"
12010-195 = "ตอนแรกฉันก็ไม่รู้ว่าชาเล่ต์คืออะไร... แต่ถ้าเป็นข้อมูลที่ทางสภาน้ำชารู้ละก็ พวกฉันเองก็จำเป็นต้องรู้เช่นกันค่ะ"
12010-196 = "ฉันก็เลยไปตรวจสอบรายงานที่คุณชินัตสึเขียนไว้\n\n"
12010-197 = "(...กว่าจะตรวจสอบได้)\n\n\n"
12010-198 = "องค์กรปริศนาที่ประธานองค์การนักเรียนก่อตั้งขึ้น หน่วยงานสืบสวนกลางที่มี \"คุณครู\" ที่เป็นผู้ใหญ่คอย#nดูแลรับผิดชอบ..."
12010-199 = "ไม่คิดว่ามันน่าสงสัยเหรอคะ?"
12010-200 = "ตัวแปรที่อาจเกิดได้จากชาเล่ต์มันอันตรายมากค่ะ แล้วก็ไม่รู้เลยว่าจะส่งผลอย่างไรต่อสนธิสัญญาที่เรา#nกับทรีนิตี้กำลังจะทำร่วมกันในอนาคต"
12010-201 = "คณะกรรมการวินัยจะพาตัวคุณครูไป อย่างน้อยก็จนกว่าการลงนามสนธิสัญญาจะเสร็จสิ้นค่ะ\n"
12010-202 = "ส่วนการมาจัดการกับพวกนักเรียนที่ชอบก่อปัญหา... ถือเป็นของแถมค่ะ"
12010-203 = "......\n"
12010-204 = "อธิบายได้เข้าใจง่ายดีนะ\n"
12010-205 = "แล้ว... คิดจะจับตัวคุณครูไปงั้นสินะ? คิดว่าได้ยินแบบนั้นแล้วเราจะอยู่เฉยๆ รึไง?\n\n"
12010-206 = "......"
12010-208 = "ค่ะ... สุดท้ายก็เป็นอย่างนี้จนได้เลยนะคะ คุณโอคุโซระ อายาเนะ?"
12010-209 = "...?"
12010-210 = "หากสถานการณ์บังคับ และทางคณะกรรมการวินัยของเกเฮนน่าเองก็คิดจะต่อสู้แล้วละก็ พวกเราเองก็จะ#nไม่ลังเลเช่นกันค่ะ"
12010-211 = "......!!\n\n"
12010-213 = "...."
12010-214 = "ประธาน... ถ้าจะหนี นี่เป็นโอกาสสุดท้ายแล้วนะ ถ้าการต่อสู้เริ่มขึ้นละก็คงจะถอยไม่ได้แล้ว\n\n"
12010-215 = "คณะกรรมการวินัยจะกวาดล้างทั้งเราและอะบิดอสพร้อมกัน ถ้าอะบิดอสดึงความสนใจของทางนั้นได้ พวกเราก็อาจจะหาจุดอ่อนแล้วฝ่าวงล้อมออกไปได้"
12010-216 = "หึ"
12010-217 = "หึหึ หึหึหึหึ\n"
12010-218 = "ประธาน...?\n"
12010-219 = "คาโยโกะ... คาโยโกะ เธอน่าจะรู้จักนิสัยฉันดีไม่ใช่เหรอ?\n"
12010-220 = "...?"
12010-221 = "ในสถานการณ์แบบนี้... ทั้งโดนดูถูกแบบนี้แล้ว ยังคิดจะหนีอีกงั้นเหรอ?"
12010-222 = "หน่วยรับจ้างสารพัดอย่างเราไม่ทำเหมือนอันธพาลกระจอกแบบนั้นหรอกน่า!!!"
12010-223 = "......\n"
12010-226 = "หากไม่เล่นงานเจ้าคนอวดดีพวกนั้น ฉันนอนไม่หลับแน่!\n\n\n\n"
12010-227 = "ท่านอารุ...\n\n"
12010-228 = "(แต่เมื่อวานยังหนีอยู่เลยนะ...)\n"
12010-229 = "เฮ้อ... งั้นแปลว่าเราจะสู้กับพวกนั้นเหรอ? ถึงจะร่วมมือกับอะบิดอสก็น่าจะไม่รอดอยู่ดี..."
12010-230 = "อีกอย่างพวกอะบิดอสก็คงไม่เอาด้วยกับเราหรอก... ยังมีวิธีอื่นไหมนะ...\n"
12010-231 = "ดีละ! หน่วยรับจ้างสารพัด!! มาร่วมมือกันโจมตีพวกคนอวดดีให้ราบเป็นหน้ากลองกันเถอะ!!\n\n\n\n"
12010-232 = "มาเป็นโล่ป้องกันให้คุณครูซะดีๆ"
12010-233 = "?!\n\n"
12010-234 = "พวกเราจะช่วยปกป้องคุณครูด้วยกันนะคะ! เข้าใจไหมคะ?"
12010-235 = "ทำไมพวกนั้นถึงเปลี่ยนเร็วขนาดนี้ล่ะ... \n"
12010-237 = "อะ... อะฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!\n\n\n"
12010-238 = "แน่นอนอยู่แล้ว! คิดว่าฉันเป็นเป็นใครกัน? ไม่ต้องห่วงหรอกน่า!"
12010-239 = "ตอบแทนความไว้วางใจด้วยความไว้วางใจ! นั่นแหละคติของหน่วยรับจ้างสารพัดของเรา!\n\n"
12010-241 = "ใช่ค่ะ!! คุณครูก็ช่วยเหลือเราไว้หลายอย่างเหมือนกัน! เพราะฉะนั้น...!\n\n"
12010-242 = "อีกอย่าง! จะบอกไว้ให้รู้นะ! ระเบิดนั่นไม่ใช่ความผิดพลาด! พวกเราตั้งใจต่างหากล่ะ! \n\n\n"
12010-243 = "เรียกว่าอะไรดีล่ะ? สงครามประสาทขั้นสูงที่คนนอกกฎหมายที่เย็นชาอย่างฉันเท่านั้นที่ทำได้?\n"
12010-244 = "......"
12010-246 = "อืม... สถานการณ์เป็นไปตามที่คาดไว้ก็จริง..."
12010-247 = "แต่ไม่รวมพลังกันเร็วไปหน่อยเหรอคะ? ทำไมเข้ากันได้ดีแบบนี้นะ...\n"
12010-248 = "เอาละ... ถ้าอย่างนั้น"
12010-249 = "กองกำลังคณะกรรมการวินัย... บุกโจมตีได้เลยค่ะ โจมตีคณะกรรมการแผนงานและหน่วยรับจ้างสารพัด#nแล้วจับตัวคุณครูมาให้ได้ค่ะ"
12010-250 = "คุณครูไม่ได้เป็นคนของคิโวทอส ระวังอย่าทำให้ได้รับบาดเจ็บด้วยนะคะ\n"
12010-251 = "กล้าดียังไงมายิงปืนใส่ฉัน... เตรียมโดนเอาคืนได้เลย!"
12010-253 = "อีกฝ่ายเริ่มตีวงล้อมเข้ามาแล้วค่ะ!"
12010-254 = "คุณครูคะ! ช่วยออกคำสั่งให้พวกเราและหน่วยรับจ้างสารพัด 68 ด้วยค่ะ!\n"

[translation]
12010-1 = "第1話;預料之外的同盟"
12010-5 = "不可饒恕……不可饒恕……不可饒恕……不可饒恕……"
12010-7 = "不可饒──？"
12010-8 = "[s] （和遙香對到眼了）"
12010-9 = "……"
12010-16 = "[ns1] （將視線轉向其他地方吧……）\n[ns2] 當作沒看到"
12010-21 = "……"
12010-22 = "……"
12010-23 = "……"
12010-25 = "行政官……也就是風紀委員會的第二把交椅……"
12010-26 = "哎呀，實際上沒有那麼厲害，我只是負責輔佐風紀委員長的秘書而已……"
12010-27 = "真的是那樣的話，那邊的風紀委員也不至於緊張成那樣吧。"
12010-28 = "誰，誰緊張了啊！？"
12010-29 = "……"
12010-30 = "原來如此，很不錯的洞察力。#n我記得……是砂狼白子同學對吧？"
12010-31 = "……"
12010-32 = "我聽說阿拜多斯目前只剩下學生會的成員，看來就是各位了吧。"
12010-33 = "阿拜多斯學生會應該有五個人，請問另一個人在哪裡呢？"
12010-34 = "目前不在這裡。#n而且我們並非學生會，而是對策委員會，行政官。"
12010-35 = "你是奥空同學……對吧？#n所以這裡沒有任何學生會的成員嗎？我想和你們的學生會談談。"
12010-36 = "阿拜多斯學生會早就解散了！#n實際上是由我們在代理學生會的職務，想說什麼就跟我們說！"
12010-37 = "在重重包圍還拿槍指著別人的情況下說「來談談吧～」什麼的，#n這不是談話該有的態度吧？"
12010-38 = "呵呵，說得也是呢……"
12010-39 = "失禮了。#n請所有人放下武器。"
12010-40 = "（咻）"
12010-42 = "（咻……）"
12010-43 = "哎呀……"
12010-44 = "真的放下武器了……？"
12010-45 = "……"
12010-46 = "請容我對先前的愚蠢行為向各位道歉。"
12010-47 = "什麼！？我只是按照命令行動而已耶！？亞子醬！？"
12010-48 = "請問命令裡有包含「發動無差別砲擊」這種話嗎？"
12010-49 = "可，可是在火力支援後派出步兵是基本戰術的核心……"
12010-50 = "更何況我們就在其他學園的自治區附近，確實注意周邊也是理所當然的吧？"
12010-51 = "（……？）"
12010-52 = "失禮了，對策委員會的各位。 "
12010-53 = "我們格黑娜風紀委員會，只是為了逮捕違反我們學園校規的人而來。"
12010-54 = "雖然的確做了一些不光彩的事，但還不到違法的地步……#n希望各位能理解我們不得不出此下策的苦衷。"
12010-55 = "可以請各位協助我們風紀委員會的工作嗎？"
12010-56 = "剛才也說過了……這種事太強人所難了！"
12010-57 = "哎呀……？"
12010-58 = "隨意在別校領地內正大光明地進行戰鬥行為這種事！"
12010-59 = "已經明確侵犯了我們的自治權！"
12010-61 = "便利屋的處置由我們決定！"
12010-62 = "……"
12010-63 = "……"
12010-64 = "……"
12010-65 = "沒想到像格黑娜那麼龐大的學園，居然會做出這種惡劣的行徑！"
12010-67 = "……原來如此。"
12010-68 = "那邊幾位也是同樣的想法呢。"
12010-69 = "呼，面對這樣的兵力，氣勢居然一點也沒有衰弱…… "
12010-70 = "能如此充滿自信……果然是因為有可以信賴的大人在嗎？#n……吶，[USERNAME]老師？"
12010-71 = "[s]「……」"
12010-72 = "夏萊的老師也和對策委員會的想法一致嗎？"
12010-73 = "[s3] 「便利屋也許是些讓人頭疼的孩子，但不是壞人。」\n[s4] 「亞瑠只是有點奇怪的孩子，但並不壞。」\n[s5] 「雖然有點笨笨的。但是笨得很可愛啊。」"
12010-74 = "啊！？你在說什麼啊！#n他們可是把拉麵店炸飛了耶！？肯定是壞人吧！"
12010-75 = "啊！？你在說什麼啊！#n他們可是把拉麵店炸飛了耶！？肯定是壞人吧！"
12010-76 = "啊！？你在說什麼啊！#n他們可是把拉麵店炸飛了耶！？肯定是壞人吧！"
12010-77 = "雖然不太確定……不過我想那應該是不小心引爆，卻又說不出口才虛張聲勢的。"
12010-78 = "什麼？"
12010-79 = "如果想針對我們，應該沒理由選在無人的時間引爆拉麵店。#n這樣只會讓計畫曝光而已，以陷阱的角度來說也是最糟的情況。"
12010-80 = "……這，這麼說也沒錯。"
12010-81 = "所以是在準備陷阱的時候不小心引爆了……？#n那些傢伙到底笨到什麼地步啊……"
12010-82 = "不過就結果來說，拉麵店還是遭到了攻擊。#n我們不能就這樣把人交給他們。"
12010-83 = "沒錯，而且我們還沒查出他們背後的勢力。#n必須先聽聽他們的說詞才行。"
12010-84 = "情況就是如此，交涉決裂了！#n格黑娜風紀委員會，我要求你們立刻離開！！"
12010-86 = "…… "
12010-87 = "這下有點棘手了呢……唔嗯……事到如今也沒辦法了。#n原本想穩妥地解決……"
12010-90 = "……看來我們只能一戰了呢？"
12010-98 = "（噠噠噠噠噠噠噠！噠噠噠噠噠噠噠！）"
12010-99 = "嗚哇啊──！？"
12010-105 = "（噹！噹！噹！）"
12010-106 = "咕啊──！？"
12010-110 = "怎，怎麼了！？"
12010-111 = "不可饒恕……！"
12010-112 = "什麼！？ "
12010-114 = "不可饒恕！不可饒恕！不可饒恕！不可饒恕！不可饒恕！不可饒恕！#n不可饒恕！不可饒恕！不可饒恕！不可饒恕！不可饒恕！唔啊啊啊啊啊啊啊──！！"
12010-122 = "（噠噠噠噠噠噠噠噠噠噠噠噠──！）"
12010-123 = "咕──！？嗚──！"
12010-124 = "（碰咚）"
12010-126 = "別說謊了，天雨亞子。"
12010-127 = "哎呀？"
12010-128 = "這才不是什麼不得已的選擇，你一開始就是這麼打算的吧。"
12010-129 = "佳世子同學……"
12010-132 = "遙香醬～NICE☆"
12010-133 = "非，非常抱歉，我來晚了……！"
12010-134 = "因，因為我的錯……！計畫全部都……！ 我可以去死嗎？現在立刻去死────！！！"
12010-135 = "嗯，確實是遙香醬的錯，但是很有趣所以不用去死也沒關係吧？"
12010-136 = "哎呀，包圍網被突破了……？ "
12010-137 = "那些傢伙，什麼時候在那種地方的……"
12010-138 = "……真有一套。"
12010-139 = "…… "
12010-140 = "非常抱歉，行政官。#n一不留神就……馬上重新將包圍網──"
12010-141 = "沒關係，反正不是什麼大問題。#n……比起這個，你說的話很有趣呢，佳世子同學？"
12010-142 = "……"
12010-143 = "……我一開始實在無法理解風紀委員會為何會出現在這裡。#n你們竟然會追到其他的自治區來？就為了我們？"
12010-144 = "這種沒效率的手段不像風紀委員長的作風。#n亞子，這件事是你擅作主張對吧？"
12010-145 = "……"
12010-146 = "而且以對付我們而言，這些兵力再怎麼說都太多了。#n如果你們設定的戰鬥對象是其他集團，話才說得通。"
12010-147 = "然而阿拜多斯的全校學生加起來也不過5個人……那麼結論只有一個。"
12010-152 = "亞子，你的目標是夏萊。#n你從一開始就是衝著老師來的。"
12010-154 = "！？"
12010-155 = "你，你說什麼！？"
12010-156 = "老師嗎……！？"
12010-157 = "[s]「我嗎？」"
12010-159 = "……"
12010-160 = "呵呵，原來如此。"
12010-161 = "……啊啊，我都忘記佳世子同學也是便利屋的成員了。#n不該悠哉聊天的……"
12010-162 = "不過算了，沒關係。"
12010-168 = "（唦，唦，唦，唦，唦，唦，唦，唦……）"
12010-170 = "！？"
12010-173 = "（唦，唦，唦，唦，唦，唦，唦，唦……）"
12010-174 = "12點鐘方向、6點鐘方向……3點鐘、9點鐘……#n更多風紀委員會的兵力正往這邊集結……！"
12010-175 = "…… "
12010-179 = "（唦，唦，唦，唦，唦，唦，唦，唦……）"
12010-180 = "……"
12010-181 = "……增援。"
12010-182 = "居然還有……而且竟然這麼多……！"
12010-183 = "嗯……雖然我覺得這樣確實有點過火……#n不過既然是和夏萊為敵，做到這個程度也是合情合理吧……"
12010-184 = "畢竟準備過頭總比準備不足來得好☆"
12010-185 = "本以為順利突破了……原來包圍網有兩層……？"
12010-186 = "不愧是佳世子同學呢。你說的沒錯……不，還是該說對了一半呢？#n我確實考慮到了和夏萊發生衝突的最糟情況。"
12010-187 = "不過我並不是刻意造成這種局面的，這點希望你能相信我……雖然有點難就是了。"
12010-189 = "……茶會。"
12010-190 = "各位應該聽說過吧，#n那是和格黑娜學園長期處於敵對關係的，三一綜合學園的學生會。"
12010-191 = "我們的情報部得知那個茶會，獲得了有關夏萊的報告書。"
12010-193 = "我回去之後會向茶會報告這件事的！"
12010-195 = "當初我也不知道「夏萊」到底是什麼……#n不過既然是茶會掌握的情報，我們當然也必須得知。"
12010-196 = "因此我確認了千夏同學寫的報告書。"
12010-197 = "（確認的也太晚了吧……？）"
12010-198 = "聯邦學生會長創立的神祕組織……由身為大人的老師負責的超越法規的社團。"
12010-199 = "不管是誰都會覺得很可疑吧？"
12010-200 = "那個名叫夏萊的組織，可能會為我們帶來相當大的變數……#n甚至連我們和三一即將簽訂的條約都有可能受到影響。"
12010-201 = "所以至少在簽訂條約之前，老師必須由我們風紀委員會來照顧。"
12010-202 = "順便來教化那些為所欲為的……不良學生。"
12010-203 = "……"
12010-204 = "嗯，情況變得容易理解，反而不錯。"
12010-205 = "……想把老師帶走？#n以為我們會說「好，請自便」嗎？"
12010-206 = "……"
12010-208 = "……呵呵，果然發展成這樣了啊。那就沒辦法了呢，奧空綾音同學？"
12010-209 = "……？"
12010-210 = "格黑娜風紀委員會判斷有必要的話就會使用武力。#n一旦決定了就絕對不會手下留情。"
12010-211 = "……！！"
12010-213 = "……"
12010-214 = "社長，要逃跑的話現在就是唯一的機會。#n一旦戰鬥開始就無法回頭了。"
12010-215 = "風紀委員會打算同時將我們和阿拜多斯一網打盡。#n如果趁著阿拜多斯吸引住他們注意力的空檔，就可以從包圍薄弱的地方……"
12010-216 = "……呵。"
12010-217 = "呵呵，呵呵呵呵。"
12010-218 = "……社長？"
12010-219 = "……佳世子啊佳世子，你應該早就了解我的個性了吧？"
12010-220 = "……？"
12010-221 = "在這種情況下受到這種待遇……要我夾著尾巴逃跑？"
12010-222 = "我們便利屋怎麼可能會做出那種三流惡人的行徑！！！"
12010-223 = "……啊哈。"
12010-226 = "不讓囂張的風紀委員會吃點苦頭，今天晚上怎麼睡得著覺！"
12010-227 = "亞瑠大人……"
12010-228 = "（昨天不是馬上逃跑了嗎……）"
12010-229 = "呼……所以你打算從正面和那些兵力對抗？#n就算和阿拜多斯聯手也很勉強吧……"
12010-230 = "再說，阿拜多斯也不可能和我們合作……這樣的話……"
12010-231 = "好，便利屋！夾攻他們吧！！必須把風紀委員會痛扁一頓才行！！！"
12010-232 = "來當老師的肉盾吧。"
12010-233 = "！？"
12010-234 = "大家一起保護老師，可以吧？"
12010-235 = "真好說話啊……"
12010-237 = "呵呵……啊哈哈哈哈哈哈！"
12010-238 = "那當然！你們以為我是誰？用不著擔心！"
12010-239 = "用信任來報答信任！那就是我們便利屋的座右銘！"
12010-241 = "是！！因為我們也受到老師不少照顧！我絕對會成功的……！"
12010-242 = "還有趁現在先說清楚！#n我們才不是不小心引爆！是刻意的！ "
12010-243 = "這可是像我這樣冷血的不法之徒才懂得使用的高難度心理戰術……！"
12010-244 = "……嗚哇，自掘墳墓。"
12010-246 = "唔嗯……雖然這個情況也在預料之中……"
12010-247 = "不過話又說回來，意氣相投的速度會不會太快了？#n這點倒是出乎意料……"
12010-248 = "……但也無所謂了。"
12010-249 = "風紀委員會，開始攻擊。#n請鎮壓對策委員會和便利屋，並確保老師的人身安全。"
12010-250 = "老師是奇普托斯外部的人，請千萬注意不要傷害到他。"
12010-251 = "剛才用散彈槍射得很開心嘛……給我做好覺悟！！"
12010-253 = "敵軍展開了包圍！請突破！"
12010-254 = "老師！麻煩指揮我們和便利屋68！"

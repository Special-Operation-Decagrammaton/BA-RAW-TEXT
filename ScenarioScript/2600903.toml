[translation]
2600903-1 = "新的打工"
2600903-2 = "夏萊．辦公室"
2600903-3 = "（隔天早上，在辦公室處理工作時……）"
2600903-10 = "已，已經，不行了……！"
2600903-11 = "客人確實不多，店員們也確實很親切……"
2600903-12 = "但我可沒聽說過竟然是女僕咖啡廳！"
2600903-13 = "嗚嗚……我明明這麼相信老師……這麼相信你……！"
2600903-14 = "[s1]「先冷靜點，柚子。」\n[s2]「看你這副模樣，難道……？」"
2600903-17 = "嗚嗚……是。#n我在開店前接受店長的接待訓練……"
2600903-18 = "店長說「必須在送餐時擺出可愛的姿勢」……"
2600903-19 = "……我就不由自主地逃走了。"
2600903-23 = "怎，怎麼辦？#n仔細想想，居然在工作到一半的時候跑來這種地方……！"
2600903-24 = "[s]「我會幫你跟店家說明的。」"
2600903-25 = "嗚嗚……對不起。#n謝謝老師……"
2600903-27 = "[ns3]「抱歉，我沒想到會讓你這麼困擾。」\n[ns4]「要是我有事先說明就好了。」"
2600903-30 = "不……根本的問題是我太怕生了……"
2600903-31 = "……大家確實都跟老師說的一樣非常親切，#n不過總覺得情緒都有點興奮……"
2600903-32 = "才剛做完自我介紹，不知不覺就被穿上了女僕裝，就這樣開始了教育訓練……"
2600903-33 = "一聽到必須穿著女僕裝出現在別人面前，我就眼前一黑──"
2600903-34 = "[s]「不用勉強說出來沒關係。」"
2600903-35 = "好，好的……#n不過，該怎麼辦才好……？"
2600903-36 = "畢竟是老師特別為我介紹的打工，#n我也不想讓親切對待我的其他店員們失望……"
2600903-37 = "不過要對陌生人擺出可愛的姿勢實在是……"
2600903-38 = "[s]「來特訓一下怎麼樣？」"
2600903-39 = "特，特訓，是嗎……？"
2600903-40 = "[s5]「先以認識的人為對象進行女僕特訓吧。」\n[s6]「所以從現在開始，我就是主人囉！」"
2600903-43 = "女僕特訓……老師是主人……？"
2600903-44 = "……這樣的話，或許能做得到。#n如果對象是老師也不會那麼緊張……"
2600903-45 = "而且……就算讓老師看到有點羞恥的模樣也……"
2600903-46 = "那麼……花岡柚子會努力的！"
2600903-48 = "（之後，和柚子一起展開了女僕特訓）"
2600903-50 = "歡，歡，歡，歡迎光臨……主，主人！"
2600903-51 = "[s]「嗯，這樣不太對！」"
2600903-52 = "咦，從打招呼開始就出錯了嗎……？"
2600903-53 = "[s7]「女僕所在的地方就是主人的家……」\n[s8]「所以不是『歡迎光臨』而是『歡迎回來』才對唷！」"
2600903-56 = "原，原來如此……"
2600903-57 = "那麼……歡迎回來，主人？"
2600903-60 = "這，這是您點的蛋包飯……"
2600903-61 = "[s]「咦，這樣就結束了嗎？」"
2600903-62 = "咦，咦……#n那，那個，我漏掉什麼了嗎……？"
2600903-63 = "[s]「你忘記讓餐點變美味的咒語了哦。」"
2600903-64 = "咒，咒語……？"
2600903-65 = "那個……「變好吃吧，萌耶萌耶啾啾」……？"
2600903-66 = "這，這樣真的會有效果嗎……"
2600903-67 = "[s9]「那當然囉！」\n[s10]「因為加入了柚子滿滿的心意呀！」"
2600903-70 = "既，既然老師這麼說了……"
2600903-71 = "變，變好吃吧～！萌，萌耶萌耶啾啾！"
2600903-80 = "噫呀！？#n對，對不起！不小心跌倒了……！"
2600903-81 = "衣服有沒有弄髒？#n嗚嗚……真的很抱歉……"
2600903-82 = "……咦，棒極了……？#n為，為什麼……"
2600903-83 = "擊中了冒失女僕的萌點……？"
2600903-84 = "……女僕的世界……真是深奧呢……"
2600903-90 = "呼……有點累了……"
2600903-91 = "不過多虧了特訓，現在即使面對陌生人好像也能鼓起一點勇氣了。"
2600903-92 = "雖然還不知道實際上會怎麼樣……"
2600903-93 = "總之，今天謝謝老師幫了我各種忙。"
2600903-94 = "還有……現在雖然還不行，#n不過一段時間之後，如果有空的話……"
2600903-95 = "請務必……要來我打工的咖啡廳。"
2600903-96 = "到時候我一定……會表現出最棒的待客之道……！"

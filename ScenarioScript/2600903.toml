[translation]
2600903-1 = "A New Part-Time Job"
2600903-2 = "Schale Executive Office"
2600903-3 = "The next morning, I was working diligently in the Executive office, when..."
2600903-10 = "No! It's too much!"
2600903-11 = "I know you said the cafe doesn't have a lot of customers...and that the staff is kind...but!"
2600903-12 = "You didn't say it was a maid cafe!"
2600903-13 = "I trusted you, Sensei! I trusted you!"
2600903-14 = "[s1] \"Slow down, Yuzu.\"\n[s2] \"Did you run all the way here while working your part-time job?\""
2600903-17 = "Um, no! I was still getting trained... The store hasn't opened yet..."
2600903-18 = "B-But the manager said I have to use a cute pose when I serve the food, so..."
2600903-19 = "Um...I ran away."
2600903-23 = "W-What do I do? I'm sure the manager isn't happy that I disappeared in the middle of training! Oh no..."
2600903-24 = "[s] \"I'll call the store and explain.\""
2600903-25 = "Ah...um...thank you."
2600903-27 = "[ns3] \"I didn't realize you'd have such a hard time.\"\n[ns4] \"I'm sorry that I didn't explain properly.\""
2600903-30 = "No... It's okay. It's probably my fault. I'm always having these kinds of issues because of my shy personality..."
2600903-31 = "And it was like you said. All the employees were so kind. But...they were also really...energetic."
2600903-32 = "Before I even finished introducing myself, I was suddenly whisked into a maid uniform, and then training began immediately..."
2600903-33 = "When I heard that I'd need to see a bunch of strangers...dressed as a maid...my vision went black, and I..."
2600903-34 = "[s] \"There's no strangers here, Yuzu. Take deep breaths.\""
2600903-35 = "O-Okay... But..."
2600903-36 = "What do I do? I can't back out now... After all, you introduced me to the place, and I don't want to disappoint all the other employees... They were so nice..."
2600903-37 = "Talking to strangers I could maybe do, but cute poses?"
2600903-38 = "[s] \"Would it be okay if you practiced first?\""
2600903-39 = "P-Practice? How?"
2600903-40 = "[s5] \"You can run through your maid duties first with someone you're used to.\"\n[s6] \"For now, just think of me as the master of the maid cafe!\""
2600903-43 = "I see... Maid practice with you."
2600903-44 = "That might be okay. It's not as scary, since I know you, after all."
2600903-45 = "Even if I embarrassed myself a little bit, it would be okay..."
2600903-46 = "Okay! I'm ready! I, Hanaoka Yuzu, will do my best!"
2600903-48 = "Yuzu and I began the maid practice."
2600903-50 = "W-W-W-Welcome... M-Master!"
2600903-51 = "[s] \"Wrong!\""
2600903-52 = "H-Huh? How did I mess up already?"
2600903-53 = "[s7] \"If the maid's there, it must be the Master's home.\"\n[s8] \"The right greeting is 'welcome back', not 'welcome'!\""
2600903-56 = "I-I see... I guess there's a lot I don't know about this..."
2600903-57 = "Okay. W-Welcome back, Master?"
2600903-60 = "H-Here's the omurice you ordered..."
2600903-61 = "[s] \"Huh? That's it?\""
2600903-62 = "W-What? Did I miss something again?"
2600903-63 = "[s] \"You didn't cast the spell that makes food delicious.\""
2600903-64 = "There's a spell...to make food delicious?"
2600903-65 = "Huh...<Be more delicious! Moe moe, kyun kyun>?"
2600903-66 = "A-And you really think that will make the food taste better?"
2600903-67 = "[s9] \"Of course.\"\n[s10] \"Don't you know that love is the most important ingredient?\""
2600903-70 = "If you say so, Sensei..."
2600903-71 = "B-Be more delicious... M-Moe moe, k-kyun...kyun!"
2600903-80 = "W-Whoa! Sorry! Sorry, I tripped..."
2600903-81 = "A-And I got food all over your clothes. I'm so sorry!"
2600903-82 = "...What? How could that be a good thing?"
2600903-83 = "So you're saying...It brought out the moe aspect of clumsy maids...."
2600903-84 = "The world of maids is so complex..."
2600903-90 = "And I'm...exhausted."
2600903-91 = "But I do think the practice helped. I feel like I can face customers now..."
2600903-92 = "I'm still not too sure how it'll go, honestly."
2600903-93 = "But thank you so much for your help."
2600903-94 = "And, Sensei... Maybe someday, in the future, once I have a chance to settle in..."
2600903-95 = "Please come visit me at my part time job!"
2600903-96 = "I'll repay for your help with the best hospitality I can muster."

[translation]
10010065-1 = "ตอนที่ 6;มนุษย์แฟลชบอมบ์แห่งทรีนิตี้ 2"
10010065-5 = "แค่กๆ แค่กๆ...! แค่ก! แค่ก...!"
10010065-6 = "อะไรกัน... แพ้อีกแล้ว... ไหนว่าครั้งนี้จะชนะไง...! ไหนว่าจะชนะจริงๆ แล้ว!!"
10010065-7 = "ใครจะไปรู้ล่ะว่าจะมีคนอื่นโผล่เข้ามาแบบนี้!"
10010065-8 = "แล้วมันเป็นใครกัน...? เข้ามาแบบไม่มีปี่ไม่มีขลุ่ย...!"
10010065-10 = "ยะ... อย่าต่อสู้กันเลยนะคะ! หยุดเถอะค่ะทุกคน...! คุยกันดีๆ ก็ได้...!"
10010065-11 = "คุยกันดีๆ เรอะ!?"
10010065-12 = "สาดปืนกลลูกระเบิดมาขนาดนั้น แล้วยังกล้าพูดแบบนี้อีก..."
10010065-13 = "เอ่อ... นั่นมัน... ก็ฉันต้องหยุดสถานการณ์ไว้ก่อน..."
10010065-14 = "ขอบคุณที่ช่วยชีวิตฉันไว้นะคะ... ถึงจะไม่รู้ว่าคุณคือใคร แต่ก็ขอบคุณนะคะ"
10010065-15 = "แล้วอีกคนที่อยู่ข้างๆ..."
10010065-16 = "เอ๋? คุณครู...?"
10010065-17 = "[s1] \"หวัดดีสึซึมิ\"\n[s2] \"ไม่ได้บาดเจ็บตรงไหนใช่มั้ย?\""
10010065-18 = "สะ... สวัสดีค่ะ วันนี้ได้เจอคนเยอะเลยนะคะ"
10010065-19 = "อืม... ขอบคุณนะคะที่..."
10010065-20 = "ว่าแต่ทำไมคุณครูถึงมาอยู่ที่นี่…"
10010065-21 = "คะ...? มีของที่ต้องหาเหรอคะ?"
10010065-22 = "แต่ก็เข้ามาช่วยคนที่กำลังเจอปัญหาอีกแล้วสินะคะ..."
10010065-23 = "ถ้าคนทั้งโลกเป็นเหมือนคุณครูละก็ ฉันก็คงจะใช้ชีวิตได้อย่างสบายใจขึ้นน่าดูเลยละค่ะ"
10010065-24 = "ในเมื่อคุณครูมาช่วยฉันไว้ ฉันก็อยากช่วยหาของเป็นการตอบแทน... แต่ขอถามก่อนได้ไหมคะว่ากำลัง#nตามหาอะไรอยู่?"
10010065-26 = "คะ...? กาวมอส...?"
10010065-27 = "อืม... เพิ่งเคยได้ยินชื่อเป็นครั้งแรกเลย"
10010065-28 = "อ่า แต่ถ้าเป็น 'อาคารทิ้งร้างเก่าแก่' ที่คุณครูบอกละก็ ฉันพอจะเดาได้อยู่ค่ะ"
10010065-29 = "ถึงจะพบได้ยากตามเส้นทางปกติ แต่หากดูดีๆ จะรู้ว่ามีอาคารร้างอยู่ระหว่างอาคารที่เราเห็นกันค่ะ"
10010065-30 = "ถ้าลาดตระเวนดีๆ ก็จะสังเกตเห็นอะไรแบบนี้บ่อยๆ น่ะค่ะ ไหนขอดูแถวนี้หน่อย..."
10010065-35 = "......!!"
10010065-36 = "นี่! หยุดก่อน...!!"
10010065-37 = "...?"
10010065-38 = "เดี๋ยวก่อนนะ อาคารที่เธอพูดถึงเมื่อกี๊นี้... อย่าบอกนะว่า!"
10010065-39 = "หมายถึงฐานทัพของเรางั้นเหรอ??"
10010065-40 = "...? ค่ะ ใช่แล้วละค่ะ"
10010065-41 = "บ้ารึเปล่า!? จะไปรื้อถอนฐานทัพของเราเรอะ?? จะขับไล่พวกเราหรือไง??"
10010065-42 = "เปล่านะ ฉันก็ไม่รู้ว่าทำไมบทสนทนามันถึงได้เลยเถิดขนาดนี้..."
10010065-43 = "แต่ขอกาวจากกรอบหน้าต่างหน่อยได้ไหมคะ..."
10010065-44 = "กรอดดด... เชื่อเค้าเลย! แบบนี้ไม่เกินไปหน่อยเหรอ!?  คิดจะถอนรากถอนโคนเราเลยรึไง!?"
10010065-45 = "ถอนรากถอนโคนอะไรกันล่ะคะ... ทำไมพูดน่ากลัวจัง"
10010065-46 = "คิดว่าพวกฉันอยากทำงานนี้และอยากใช้ชีวิตแบบนี้เหรอ!? ฮะ?"
10010065-47 = "ฮือออ ฮือ! ฮือออ!! พวกเรา... ทำไมพวกเราถึงต้องมาเจออะไรแบบนี้ด้วย...!"
10010065-48 = "...?????"
10010065-49 = "เดี๋ยวก่อน... ทำไมอยู่ๆ ก็ร้องล่ะคะ? ฉันไม่ได้หมายความแบบนั้นสักหน่อย..."
10010065-50 = "[s3] \"ลองรออีกหน่อยดีกว่า\"\n[s4] \"ลองฟังที่เขาจะพูดให้จบก่อนแล้วกัน\""
10010065-51 = "ค่ะ... เอาตามที่คุณครูว่าเลย..."
10010065-52 = "ค่ะ... เอาตามที่คุณครูว่าเลย..."
10010065-54 = "ฮือ... ถ้าต้องออกจากตรงนั้น... แล้วจะให้พวกเราไปอยู่ที่ไหนล่ะ!! แล้วจะหาเงินใช้ยังไง!!"
10010065-55 = "คิดว่าเราชอบทำพาร์ทไทม์แบบล้มลุกนี่งั้นเหรอ? ฮะ?! ที่ยังทำอยู่เพราะทำอย่างอื่นไม่ได้แล้วยังไงล่ะ!"
10010065-56 = "ถ้าเป็นงานพาร์ทไทม์ทั่วไปน่ะ พวกเราถูกคัดออกหมดเพราะดันมีประวัติทางอาชญากรรม"
10010065-57 = "เกรดก็ไม่ดีจนเข้าหอพักไม่ได้ แถมยังไม่มีเงินไปเช่าห้องพักอีก"
10010065-58 = "ตอนนี้พอจะเข้าใจบ้างรึยัง ว่าแค่การ 'ใช้ชีวิตแบบเรียบง่าย' ก็เป็นสิทธิพิเศษสำหรับบางคนเท่านั้น"
10010065-59 = "ฮึ! คนธรรมดาไม่มีทางเข้าใจหรอก"
10010065-61 = "เรื่องนั้น..."
10010065-62 = "[s5] \"ถ้าอย่างนั้นครูจะ...\"\n[s6] \"เรื่องนี้ครูจะ...\""
10010065-65 = "ถ้าทุกคนไม่ว่าอะไร ขอให้พวกฉัน..."
10010065-68 = "[ns] \"ฮินาตะ...?\""
10010065-69 = "...?"
10010065-71 = "หืม...? นี่เธอ...?"
10010065-72 = "ถ้าอยากมาที่วิหารของพวกฉันละก็... ขอให้เราได้ช่วยเหลือเรื่องที่พักได้ไหมคะ?"
10010065-73 = "วิหารงั้นเหรอ? เมื่อกี๊พูดว่า 'วิหาร' งั้นเหรอ?"
10010065-74 = "ชมรมซิสเตอร์? นี่เธอคือ... ซิสเตอร์เหรอ?"
10010065-75 = "อะ... เอ๋? ไม่ทราบงั้นเหรอคะ? แค่ดูจากชุด... ก็น่าจะรู้แล้วนะ..."
10010065-76 = "ไม่ ไม่อ่ะ... ไม่ๆๆๆ ไม่มีทาง เป็นไปไม่ได้"
10010065-77 = "ซิสเตอร์จะมาต่อสู้ได้ยังไง ไม่มีทาง..."
10010065-82 = "คงเป็นซิสเตอร์ตัวจริงสินะ บุกเข้ามาระหว่างการต่อสู้แบบนี้ ฉันคิดว่าเป็นพวกคอสเพลย์ซะอีก"
10010065-83 = "แบบว่า... แต่งตัวเลียนแบบว่าแล้วพูดว่า ฉันนี่แหละ ซิสเตอร์แห่งทรีนิตี้~ อะไรทำนองนี้น่ะ... นี่แหละตัวปลอมของระเบิดแสง"
10010065-84 = "คอสเพลย์งั้นเหรอคะ... แหะๆๆ"
10010065-85 = "ขอโทษที่ทำให้เข้าใจผิดนะคะ แต่ฉันคือซิสเตอร์จากชมรมซิสเตอร์จริงๆ ค่ะ"
10010065-86 = "ฉันพอจะเข้าใจพวกคุณค่ะ ขอโทษด้วยนะคะ ฉันไม่รู้เลยว่าพวกคุณต้องเจอความยากลำบากแบบนี้..."
10010065-90 = "ถ้าไม่ว่าอะไร ขออนุญาตให้ฉันช่วยพวกคุณได้ไหมคะ?"
10010065-92 = "ถ้าเป็นเรื่องงานละก็ พวกฉันเปิดรับคนที่จะเข้ามาช่วยงานจิตอาสาอยู่ค่ะ"
10010065-94 = "ถึงจะให้ค่าจ้างรายวันไม่ได้เพราะเราไม่ใช่องค์กรแสวงหาผลกำไร แต่ก็พอจะให้ที่พักพิงได้..."
10010065-95 = "ถ้าทำงานที่นั่นได้สักเดือน ทางวิหารก็จะออกใบรับรองที่เอาไว้ใช้หางานพาร์ทไทม์ได้ค่ะ"
10010065-97 = "ถึงตอนทำจิตอาสาอาจจะลำบากนิดหน่อย..."
10010065-98 = "แต่ได้โปรดอนุญาตให้ฉันได้ช่วยเถอะนะคะ"
10010065-105 = "อะ... อะไรเนี่ย ทำไมจู่ๆ ถึงมาพูดดีแบบนี้..."
10010065-106 = "แต่ถึงทำไป เธอก็ไม่ได้ผลประโยชน์อะไรจากพวกฉันไม่ใช่เหรอ?"
10010065-107 = "ผลประโยชน์อะไรกันคะ พวกเราไม่คิดเรื่องนั้นหรอกค่ะ ก็เราคือชมรมซิสเตอร์นี่คะ"
10010065-108 = "ว่าไงนะ...?"
10010065-110 = "เป้าหมายของชมรมซิสเตอร์คือการทำให้ทุกคนในทรีนิตี้ ไม่สิ ทุกคนในคิโวทอสได้มีชีวิตที่สงบ และมีความสุขค่ะ"
10010065-111 = "การช่วยทุกคนจากความยากลำบาก และทำให้ทุกคนได้เจอความสงบสุขคือความสุขใจของพวกเราค่ะ"
10010065-112 = "เหอะ~~! จำบทพูดนางงามมาเหรอ คิดว่าพวกเราจะเชื่อหรือไง..."
10010065-113 = "คิดว่าพวกเราจะเชื่อคำพูดแบบนั้นเหรอ..."
10010065-114 = "แงงงงงงง~!!"
10010065-115 = "...?!"
10010065-116 = "...?!"
10010065-117 = "[s7] \"ได้ผลด้วยแฮะ...\"\n[s8] \"ที่ผ่านมาคงลำบากมากสินะ...\""
10010065-118 = "ทีนี้เราก็ไม่ต้องทำงานแบบนี้กันแล้วสินะ? เราจะได้ทำพาร์ทไทม์แล้วใช่ไหม?"
10010065-119 = "ทีนี้เราก็ไม่ต้องทำงานแบบนี้ได้แล้วสินะ? เราจะได้ทำพาร์ทไทม์แล้วใช่ไหม?"
10010065-120 = "เราจะได้เก็บเงินไปดูหนังโดยไม่ต้องหลบสายตาชมรมทวงความยุติธรรมแล้วใช่มั้ย? เราไปคาเฟ่ได้... แล้วก็ไปร้านเกมได้ด้วย?"
10010065-121 = "ฉันเอาด้วย! ไม่ว่าจะเป็นงานจิตอาสาอะไรก็บอกมาเลย...!"
10010065-122 = "ค่ะ ทำงานจนเหงื่อออกไปด้วยกัน"
10010065-126 = "แล้วอาบน้ำให้สดชื่น"
10010065-128 = "แล้วมานั่งทานข้าวด้วยกันนะคะ"
10010065-130 = "ฮืออออ... คุณซิสเตอร์...!"
10010065-131 = "คิดถูกแล้วละค่ะ ขอบคุณที่เปิดใจนะคะ ทุกคน"
10010065-136 = "[ns] \"ถือว่าคลี่คลายแล้วเนอะ?\""
10010065-137 = "เอ่อ... ก็..."
10010065-138 = "ตามใจเลย... ทั้งฐานทัพ ทั้งกาวมอส จะทำอะไรก็ทำ ยังไงมันไม่เกี่ยวกับพวกฉันแล้ว"
10010065-143 = "ทีนี้ฉันก็สบายใจขึ้นแล้วละค่ะ ขอบคุณนะคะซิสเตอร์"
10010065-144 = "คะ? ไม่เป็นไรเลยค่ะ ขอบคุณอะไรกัน ไม่เลยค่ะ"
10010065-145 = "การนำทางให้แก่คนที่เลือกทางผิด การช่วยคนที่ไม่มีทางเลือก..."
10010065-146 = "นี่คือสิ่งที่ใครบางคนต้องทำอยู่แล้ว และฉันก็เป็นแค่หนึ่งในนั้นค่ะ"
10010065-148 = "......!"
10010065-152 = "อย่างนี้นี่เองสินะ..."
10010065-154 = "เป็นคำที่ฟังแล้วดีต่อใจจังเลยนะคะ..."

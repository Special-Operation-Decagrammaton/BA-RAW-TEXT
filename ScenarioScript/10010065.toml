[translation]
10010065-1 = "第6話;三一的行走閃光彈（２）"
10010065-5 = "咳咳，咳咳……！"
10010065-6 = "怎麼又輸了啊！？"
10010065-7 = "我哪知道！？是因為對方不只一個人吧！！"
10010065-8 = "那傢伙是誰啊，突然就跑出來……！"
10010065-10 = "請，請不要打架……！#n先冷靜下來談談……！"
10010065-11 = "都已經開槍了才說，這樣很奇怪吧！？"
10010065-12 = "你剛才明明也用那把機關槍亂射了一通……"
10010065-13 = "那，那是因為，得想辦法控制這個情況……"
10010065-14 = "……幫大忙了。#n雖然不知道您是誰，真是感激不盡。"
10010065-15 = "還有旁邊那位是……"
10010065-16 = "咦，老師……？"
10010065-17 = "[s1]「嗨，鈴美。」\n[s2]「有沒有受傷？」"
10010065-18 = "你，你好。好久不見。"
10010065-19 = "我，我沒事。多虧有兩位的幫忙。"
10010065-20 = "話說回來，老師為什麼會來這裡……？"
10010065-21 = "在找東西是嗎？"
10010065-22 = "原來如此，正在幫助別人啊。"
10010065-23 = "真不愧是老師。#n一想到老師也在某處幫助著別人，讓我也感覺獲得了勇氣。"
10010065-24 = "難得有機會，我也想助老師一臂之力……你在找的是什麼樣的東西呢？"
10010065-26 = "水苔膠……？"
10010065-27 = "這樣啊……很抱歉，我才疏學淺沒有聽過……"
10010065-28 = "不過，那會用在古老的建築物對吧？#n「古老廢材」我倒是有點頭緒，要不要先去看看呢？"
10010065-29 = "因為偶爾會有老舊的建材被丟棄在建築間的縫隙裡。"
10010065-30 = "我時常會在巡邏時看見，記得是在那個方向……"
10010065-35 = "……！"
10010065-36 = "先，先等一下！"
10010065-37 = "……？#n那個，有哪裡很痛是嗎？"
10010065-38 = "誰需要你擔心啊笨蛋！#n比起那個，你說的「古老廢材」該不會……！"
10010065-39 = "是在說我們的基地吧！？"
10010065-40 = "那個……？你，你指的是那邊的建築嗎？#n我也覺得應該就在附近。"
10010065-41 = "也就是說，你的意思是……要把我們趕出去，然後把基地拆掉嗎！？"
10010065-42 = "不是，我沒有那個意思……"
10010065-43 = "只是想說如果有不需要的東西就借用一點而已……"
10010065-44 = "鬼！惡魔！沒人性！閃光彈！！"
10010065-45 = "鬼，鬼……？"
10010065-46 = "我們也，我們也是……！！"
10010065-47 = "我們也是努力，努，嗚啊啊啊啊啊啊！！"
10010065-48 = "呃……"
10010065-49 = "我真的沒有那個意思，抱歉，好像把你弄哭了……#n這個手帕借你……"
10010065-50 = "[s3]「……要不要先好好談談？」\n[s4]「可以先把所有事情告訴我們嗎？」"
10010065-51 = "是呢……可以告訴我們嗎？"
10010065-52 = "是呢……可以告訴我們嗎？"
10010065-54 = "嗚嗚……要是從那裡被趕出去的話，我們還能在哪裡生活啊！"
10010065-55 = "我們也不是因為喜歡才做這種敲詐的打工（？）的！#n要是能做正當的打工該有多好啊！"
10010065-56 = "普通的打工基本上都會在履歷階段被刷掉……"
10010065-57 = "因為成績不怎麼樣所以沒辦法住宿舍，房租的錢就更不用說了。"
10010065-58 = "你們懂嗎？#n「普通的生活」這種特權，我們是沒有的啊……"
10010065-59 = "雖然跟你們說這些也沒什麼用……"
10010065-61 = "這……"
10010065-62 = "[s5]「既然如此，要不要來我的──」\n[s6]「不介意的話，夏萊的──」"
10010065-65 = "如果各位願意接受的話。"
10010065-68 = "[ns]「……日向？」"
10010065-69 = "……？"
10010065-71 = "你是……？"
10010065-72 = "要不要和我們一起在教堂幫忙呢？"
10010065-73 = "……在教堂，幫忙？"
10010065-74 = "也就是說你……難道是修女會的？"
10010065-75 = "是，是的。#n我畢竟也是穿著修女服……？"
10010065-76 = "……不不不。"
10010065-77 = "看到你剛才戰鬥的樣子，誰會覺得你是修咕哈！？"
10010065-82 = "是修女呢，不管怎麼看都是修女沒錯。"
10010065-83 = "雖然一開始我也以為是Cosplay成「三一的修女」，在模仿行走閃光彈就是了……"
10010065-84 = "Co，Cosplay是嗎……"
10010065-85 = "不過我姑且也是修女會真正的一名修女。"
10010065-86 = "儘管只是一部分，但我明白你們的苦衷了。#n很抱歉先前沒能了解各位的情況……"
10010065-90 = "能請各位務必讓我們盡棉薄之力嗎？"
10010065-92 = "我們一直都有在募集志工。"
10010065-94 = "由於不是營利單位，所以沒辦法給各位薪水……不過可以提供吃住。"
10010065-95 = "各位也許會覺得不適合，或是有其他想做的工作。#n只要能配合我們一段時間，為各位提供推薦信也是可以的。"
10010065-97 = "雖然不習慣的時候可能會很辛苦……"
10010065-98 = "不過我們也會盡力協助各位的。"
10010065-105 = "為，為什麼要那麼……"
10010065-106 = "就算做這種事情，對你又有什麼好處……"
10010065-107 = "這與得失並沒有關係。因為我們是修女會。"
10010065-108 = "怎麼會……"
10010065-110 = "修女會的目標就是盡可能讓三一……#n不，是讓奇普托斯的所有人都享有安穩幸福的生活。"
10010065-111 = "如果能解決各位面臨的問題，讓各位過上更安穩的日子，就已經是無上的喜悅了。"
10010065-112 = "我，我可不會上當哦……"
10010065-113 = "我們才不會被那種冠冕堂皇的話給……"
10010065-114 = "……嗚啊啊啊啊啊啊啊！！"
10010065-115 = "！？"
10010065-116 = "……！？"
10010065-117 = "[s7]「……」\n[s8]「……看來他們真的過得很辛苦呢。」"
10010065-118 = "這樣我們就能好好打工了對吧……？"
10010065-119 = "這樣我們就能好好打工了對吧……？"
10010065-120 = "看電影的時候也不用擔心實現正義部會不會來了吧？#n要去咖啡廳或遊戲中心也沒關係了嗎？"
10010065-121 = "我願意做，請讓我做吧……！"
10010065-122 = "好的。和大家一起揮汗工作……"
10010065-126 = "一起洗澡……"
10010065-128 = "一起吃飯吧。不用再擔心了哦。"
10010065-130 = "嗚，嗚嗚嗚嗚嗚……！"
10010065-131 = "謝謝你願意向我們傾訴。"
10010065-136 = "[ns]「這樣應該就解決了吧？」"
10010065-137 = "啊啊，也對……"
10010065-138 = "……隨你們高興吧。不管是基地還是什麼膠，現在都與我們無關了。"
10010065-143 = "很抱歉我從中途開始就沒能說些什麼……非常感謝兩位。"
10010065-144 = "別，別這麼說，我能做的事也不多……"
10010065-145 = "想要重新決定自己的道路，或是做出選擇……在這種時候助人一臂之力。"
10010065-146 = "這也是……「必須有人來做的事情」。"
10010065-148 = "……！"
10010065-152 = "……是，說的沒錯。"
10010065-154 = "……真的非常感謝你們。"

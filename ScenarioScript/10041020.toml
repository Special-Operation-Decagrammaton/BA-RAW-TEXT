[translation]
10041020-1 = "Episode 2;Natural Division of Work"
10041020-9 = "...Phew."
10041020-10 = "And here we are, precisely on time, it seems."
10041020-11 = "I see Trinity students here already. Hmm, I could simply walk up, join them, and lead them."
10041020-12 = "Though leading them, while representing the Tea Party AND watching for anything amiss, might be a bit much..."
10041020-16 = "Still, if I want to learn to trust myself again..."
10041020-17 = "Well..."
10041020-22 = "Huh? There you are! We've been looking all over for you!"
10041020-31 = "THERE'S our Tea Party VIP!"
10041020-32 = "Look around all you like, but please don't leave us behind. We're your bodyguards."
10041020-33 = "Of course, I wouldn't expect anything drastic to happen here, especially around the Expo venue..."
10041020-34 = "But we still have our jobs to do, so please let us know if you're going somewhere."
10041020-36 = "Ah, my apologies. I got lost for a moment."
10041020-40 = "One moment. Where is Sensei...?"
10041020-45 = "Master? Master is..."
10041020-47 = "(...\"Master\"...?)"
10041020-50 = "A-Asuna...! Right now, it's \"Sensei\" not \"Master\"...!!"
10041020-52 = "(...Hm?)"
10041020-53 = "(Sensei... Just what have you been doing here...?)"
10041020-58 = "Ah, right! SENSEI just took off to lead some other Trinity students."
10041020-59 = "Yes, Sensei volunteered to be their guide just now."
10041020-60 = "Odd. I thought you would have known before we did."
10041020-66 = "...? Sensei left to guide them?"
10041020-70 = "Ahh, yes. I did...ask for that, in a way."
10041020-75 = "But still, for Sensei to guide them without me..."
10041020-76 = "...should that not be my responsibility?"
10041020-81 = "Well, Sensei must know what's best."
10041020-82 = "Hm? What's wrong?"
10041020-83 = "You look troubled. Are you feeling okay?"
10041020-84 = "It's nothing. If anything, I feel relieved, in a way."
10041020-85 = "Well then, since I seem to be free at the moment..."
10041020-89 = "...allow me to embrace your hospitality. I'm sure this will be a wonderful tour."
10041020-91 = "It will be!"
10041020-92 = "By the way, you can't see them right now, but there are other members here too, supporting us from out of sight."
10041020-98 = "Did you call? I happened to be on standby."
10041020-99 = "They didn't, Toki. Please stay focused on your other tasks."
10041020-100 = "Ah..."
10041020-109 = "...Well, with all that being said, enjoy the Expo. We've got your back."
10041020-111 = "I don't doubt it. Your reputations precede you."
10041020-112 = "So..."

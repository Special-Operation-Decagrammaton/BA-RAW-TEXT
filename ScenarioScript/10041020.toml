[translation]
10041020-1 = "ตอนที่ 2;แบ่งงานตามธรรมชาติ"
10041020-9 = "ฮู่ว..."
10041020-10 = "กลับมาได้แล้วสินะ น่าจะยังทันเวลาอยู่ด้วย"
10041020-11 = "มีนักเรียนทรีนิตี้อยู่ทางนั้นพอดี ถ้าเดินเนียนๆ ไปเข้ากลุ่มด้วย ก็คงเหมือนว่าไม่มีอะไรเกิดขึ้นละนะ"
10041020-12 = "ทั้งการสืบเรื่องราวที่เกิดขึ้นและเป็นผู้นำนักเรียนจากทรีนีตี้ จริงๆ การทำสองอย่างพร้อมกันมันก็น่าจะ#nเหนื่อยอยู่..."
10041020-16 = "แต่นั่นก็เป็นความลำบากที่ฉันเลือกเอง งั้นฉันก็ควรจะอดทนสินะ"
10041020-17 = "เอาละ ถ้างั้นก็..."
10041020-22 = "อ๊ะ? อยู่ตรงนี้นี่เอง! ตามหาตัวอยู่ตั้งนานแน่ะ!!"
10041020-31 = "ไปไหนมาเหรอ? แขกคนสำคัญจากสภาน้ำชา!"
10041020-32 = "คุณเดินเที่ยวชมงานได้อย่างอิสระก็จริง แต่พวกเราก็เป็นผู้คุ้มกันของคุณ ถ้าหายไปจากสายตาอย่าง#nกะทันหันแบบนี้ มันจะลำบากเอานะ"
10041020-33 = "แม้ว่าในมิลเลเนียม โดยเฉพาะบริเวณงานเอ็กซ์โปจะไม่มีปัญหาเรื่องความปลอดภัยก็เถอะ..."
10041020-34 = "แต่ถ้าจะไปไหนหรือจะทำอะไรก็บอกพวกเราหน่อยนะ"
10041020-36 = "อ่า ขอโทษด้วยค่ะ พอดีเมื่อกี้ฉันหลงทางนิดหน่อยน่ะค่ะ"
10041020-40 = "จะว่าไป แล้วคุณครูล่ะคะ...?"
10041020-45 = "นายท่านน่ะเหรอ? ตอนนี้นายท่าน..."
10041020-47 = "(นายท่าน...?)"
10041020-50 = "ระ... รุ่นพี่...!! ไม่ใช่นายท่านสิ ตอนนี้ต้องเรียกว่า 'คุณครู'...!!"
10041020-52 = "(...????)"
10041020-53 = "(คุณครู... ตอนมาอยู่ที่นี่เป็นคนยังไงเนี่ย ถึงกับมีคนเรียกว่านายท่านเลย...)"
10041020-58 = "อ้อ จริงสิ! คุณครู! ได้ยินว่าตอนนี้คุณครูกำลังยุ่งกับการดูแลนักเรียนคนอื่นอยู่น่ะ"
10041020-59 = "ฉันก็ได้ยินมาว่าคุณครูทำหน้าที่เป็นผู้นำและดูแลนักเรียนจากโรงเรียนสามัญทรีนิตี้ในงานแลกเปลี่ยน#nครั้งนี้เหมือนกัน"
10041020-60 = "แต่ก็แปลกนะ คิดว่าคุณจะรู้แล้วเสียอีก"
10041020-66 = "เป็นผู้นำและดูแลนักเรียน... เหรอคะ...?"
10041020-70 = "อ้อ ค่ะ เหมือนจะเคยได้ยิน... มาบ้างเหมือนกันค่ะ คุณครูก็ต้องเหนื่อยแย่เลยนะคะเนี่ย"
10041020-75 = "เป็นผู้นำและดูแลนักเรียน...? คุณครูน่ะเหรอ...?"
10041020-76 = "ทำไมถึงมาทำแทนกันล่ะ... นั่นมันหน้าที่ของฉัน..."
10041020-81 = "ไม่สิ คุณครูคงมีความคิดบางอย่าง คุณครูเป็นถึงคุณครูเลยนะ"
10041020-82 = "เอ๋? เป็นอะไรไปเหรอ?"
10041020-83 = "ทำหน้าเหมือนกังวลอะไรเลย มีอะไรไม่สบายใจหรือเปล่า?"
10041020-84 = "ไม่หรอกค่ะ ตรงกันข้าม... ฉันกลับรู้สึกปลอดภัยและสบายใจมากกว่าค่ะ"
10041020-85 = "ถ้างั้นในเมื่อฉันได้เป็น 'อิสระ' แล้ว..."
10041020-89 = "ฉันขอเที่ยวชมตรงนู้นตรงนี้อย่างเพลิดเพลินเลยได้มั้ยคะ? พวกคุณทั้งสองคนก็จะไปกับฉันด้วย ฉันเข้าใจถูกมั้ยคะ?"
10041020-91 = "อื้อ! ฝากตัวด้วยนะ~!"
10041020-92 = "ฝากตัวด้วยนะ ถึงสมาชิกคนอื่นจะไม่อยู่ที่นี่ แต่ว่าแต่ละคนก็ช่วยงานกันอยู่ในที่ของตัวเองน่ะ"
10041020-98 = "เรียกฉันเหรอคะ? กำลังรออยู่พอดีเลยค่ะ"
10041020-99 = "เปล่าหรอกค่ะ~ โทคิจัง ตั้งใจดูแลนักเรียนทางนั้นเถอะค่ะ"
10041020-100 = "อ่า..."
10041020-109 = "เราแบ่งงานกันอย่างนี้ละ... วางใจพวกเราแล้วสนุกกับงานเอ็กซ์โปได้เลย"
10041020-111 = "ฉันพอจะได้ยินฝีมือของทุกคนมาบ้างค่ะ พอมีพวกคุณ ฉันก็อุ่นใจค่ะ"
10041020-112 = "ถ้างั้นก็..."

[translation]
10041020-1 = "第2話;自然的負擔"
10041020-9 = "……呼。"
10041020-10 = "看來沒有人發現我離開呢。時間也剛剛好。"
10041020-11 = "正好三一的同學們都在那邊，我就這樣若無其事地回到隊伍裡吧。"
10041020-12 = "老實說，同時要顧好調查內幕和擔任領隊這兩件任務，讓我覺得有點分身乏術……"
10041020-16 = "不過既然這是我自己選擇的道路，無論再辛苦我也得忍耐。"
10041020-17 = "好……"
10041020-22 = "咦？原來你在這裡啊！我們都在找你呢～！！"
10041020-31 = "你跑去哪裡了呀？茶會來的客人！"
10041020-32 = "雖然我們不會限制你在行動和觀賞方面的自由，#n但我們再怎麼說也是你的保鏢，這樣突然消失不見會讓我們很困擾的。"
10041020-33 = "當然我們並不認為千年，尤其在博覽會會場周邊會發生治安問題，希望你別誤會……"
10041020-34 = "但我們也有自己的立場，所以之後如果你想去哪裡的話，還是請你先跟我們說一聲。"
10041020-36 = "啊，抱歉。#n我剛才只是迷路了一下而已。"
10041020-40 = "話說回來，老師呢……？"
10041020-45 = "主人嗎？主人的話……"
10041020-47 = "（主人……？）"
10041020-50 = "前，前輩……！！#n現在不能用主人這個稱呼，應該叫他「老師」才對……！！"
10041020-52 = "（……？？？？）"
10041020-53 = "（老師……你究竟在這裡做了什麼好事……）"
10041020-58 = "啊，對耶！是老師才對！#n老師現在正在照顧其他學生，所以應該很忙吧？"
10041020-59 = "我聽說他在這次的交流會中，負責擔任帶領三一綜合學園的領隊。"
10041020-60 = "真是意外，我還以為你知道呢。"
10041020-66 = "……？#n領隊……是嗎？"
10041020-70 = "啊啊，嗯。#n的確……是有這回事沒錯。原來那是這個意思啊。"
10041020-75 = "領隊……？老師親自嗎……？"
10041020-76 = "為什麼他會主動替我接下這個職位呢……那本來應該是由我……"
10041020-81 = "不，老師肯定有自己的想法吧。#n畢竟他是老師嘛。"
10041020-82 = "嗯？怎麼了？"
10041020-83 = "你看起來好像有什麼煩惱，難道這件事有什麼問題嗎？"
10041020-84 = "不，完全相反……我反而覺得步伐輕盈了不少。"
10041020-85 = "既然我現在算是「自由之身」……"
10041020-89 = "那我就不跟老師客氣，好好安排一下今天的行程吧。#n當然，我也會請兩位陪同的。"
10041020-91 = "嗯！請多指教囉～！"
10041020-92 = "我也請你多多指教。#n雖然其他成員現在人不在，不過他們也都會在各自的位置上協助你參觀。"
10041020-98 = "找我嗎？我正好在待命。"
10041020-99 = "沒事沒事～季同學只要專心帶領大家就行了。"
10041020-100 = "啊……"
10041020-109 = "……總之就是這樣。#n你就放心交給我們，盡情地享受博覽會吧。"
10041020-111 = "我也時常聽說各位的事蹟，真是相當可靠。"
10041020-112 = "那麼……"

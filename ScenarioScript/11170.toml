[translation]
11170-2 = "Episode 17;The Gathering Storm"
11170-3 = "Problem Solver Office"
11170-5 = "Good morning!"
11170-6 = "*yawn* Good morning..."
11170-7 = "Whoa, you okay, Aru? Did you stay up all night?"
11170-8 = "N-No. I slept...technically speaking."
11170-9 = "What's eating at you this time, Boss?"
11170-10 = "The planning is all done, right? We hire double the muscle, then we lure the Abydos kids somewhere we'll have the upper hand."
11170-11 = "And Haruka left this morning to go plant the explosives.#nThe plan is to pick off those Abydos kids one-by-one in the kill zone, isn't it?"
11170-13 = "*opens*"
11170-14 = "I'm back."
11170-15 = "Hi, Back. So...? How did it go?"
11170-16 = "I finished planting the bombs at key junctions. Now, all I have to do is press this button, and..."
11170-17 = "Nice! Just make sure to remember where they're all placed."
11170-18 = "Of course. Say the word and they'll be blown to smithereens..."
11170-19 = "Tch..."
11170-20 = "What's wrong now? The money? If this was gonna put us out so much, then why didn't we get an advance from the client and use that for our plans?"
11170-21 = "No upfront payments—company policy. You know that."
11170-22 = "Because accepting payment in advance would give the client too much say in how we operate, or something like that?"
11170-23 = "Exactly. We get paid only when the job is done. That's how it has to be.#nAnd I never compromise."
11170-24 = "Really? Since when?"
11170-25 = "Since always! We're hard-boiled outlaws untethered to rules or laws!#nThat's always been the guiding vision for Problem Solver 68!"
11170-26 = "Huh, was it? I guess it does sound a little familiar."
11170-27 = "Contracts are no different. There's always a chance it might turn into a trap. We don't want to be forced into doing something we don't want to do."
11170-28 = "And that's why we only accept payment once the job is done."
11170-29 = "..."
11170-30 = "You know, Boss...if this is getting to be too much pressure, we could all just throw in the towel and go back to Gehenna."
11170-31 = "What?!"
11170-32 = "Wh-Who said anything about it being too much pressure?! I'm just...a little..."
11170-33 = "Heh... That might not be a good idea. The Prefect Team would never let her off the hook."
11170-34 = "That's a good point."
11170-36 = "The Prefect Team must see us as nothing but a thorn in their sides.#nStill, it's not as though we came out here to run away either."
11170-37 = "And don't forget: The only reason the Prefect Team is considered to be the most feared organization in all of Kivotos..."
11170-40 = "...is because of Head Prefect Hina."
11170-41 = "Most of their firepower comes from the head prefect alone.#nShe's a veritable one-woman army."
11170-42 = "In other words..."
11170-46 = "...the rest of the Prefect Team is anything but invincible."
11170-47 = "We have a puncher's chance of winning if we play our cards right."
11170-49 = "Is that so? I didn't realize you were thinking so far ahead, Kayoko."
11170-50 = "We'll have to fight them sooner or later. We could use the same resources we're utilizing against Abydos to fight the Prefect Team without Hina."
11170-51 = "That's how strong I think the Abydos girls are. Their only real weakness is that they lack numbers."
11170-52 = "Huh. You don't say..."
11170-55 = "..."
11170-56 = "No. Going back is out of the question."
11170-57 = "But I wish it wasn't..."
11170-58 = "Would you make up your mind, already?"
11170-59 = "Fine. Let's give this boring conversation a break and get something to eat.#nI'm starving."
11170-60 = "How does ramen sound? Shiba Seki, anyone?"
11170-61 = "That place?"
11170-62 = "Worried about that part-timer? She only works in the afternoon. We just have to make sure we don't run into her."
11170-63 = "I guess... I'll admit their food was pretty good. Plus, the boss could use a little pick-me-up."
11170-64 = "All right! Let's go! ♪"
11170-66 = "Abydos Foreclosure Task Force Room"
11170-68 = "I was greeted by the sight of Hoshino resting her head in Nonomi's lap upon entering the club room."
11170-69 = "Oi. Good morning, Sensei."
11170-70 = "You're here early. Good to see you."
11170-71 = "Look comfortable, don't I? Heh. Nonomi's lap is super soft and perfect for taking a nap. It's like my very own pillow."
11170-72 = "There's room for you too, Sensei! Make yourself comfortable! ☆"
11170-73 = "Nope! I have dibs on this lap, so why don't you back off and take one of those uncomfortable chairs over there, Sensei?"
11170-74 = "No one said you could call dibs, but okay... "
11170-77 = "(Why don't you come back later when no one else is around, Sensei?)"
11170-79 = "*stretch*"
11170-80 = "*yawn* How is everyone already so busy this morning?"
11170-81 = "It's the first breather we've had in a while... So I guess everyone is trying to check some stuff off their lists."
11170-82 = "Shiroko is probably working out and Ayane is most likely studying at the library."
11170-83 = "Wow. And you came to school early to tidy up the club room, Nonomi?#nYou're all such hard workers."
11170-84 = "As for me? Heh. I was just here taking it easy! "
11170-85 = "Maybe you'd like to do something productive for a change, Hoshino?#nLike a part-time job or going to the gym?"
11170-86 = "Nope. I've already got way too much on my plate. Plus, I'm just a wrinkly old coot who can barely endure outdoor activities."
11170-87 = "But we're practically the same age."
11170-88 = "Anyway, the others should be arriving soon now that Sensei is here.#nI'm gonna go kill some time."
11170-89 = "Huh? Hey, where are you going?"
11170-90 = "Today's my day off! I'll be out for the day, so call me if anything comes up."
11170-92 = "Hoshino... I bet she's gonna go take another nap."
11170-93 = "I guess that's okay. Ayane will make sure the meeting runs smoothly anyway."
11170-94 = "Haha... Still, Hoshino's changed a lot since I first met her."
11170-95 = "Hmm? What was she like before?"
11170-96 = "Well, she might come across as a lazy sleepyhead now, but there was never a moment when Hoshino didn't seem frazzled back then."
11170-97 = "What was she frazzled by? I dunno... Everything?"
11170-98 = "I don't know all the details, but there used to be another student around here before..."
11170-99 = "Apparently, she was the last student council president Abydos had.#nFrom what I heard, she wasn't very reliable or trustworthy.#nHoshino had to do everything herself after she disappeared."
11170-100 = "That was back when Hoshino was just a first-year. Anyway, like I said,#nI don't know all the details."
11170-101 = "But now we have you, Sensei. And she seems to have no trouble hanging out with students from other academies too..."
11170-102 = "She never would have done something like that before. I guess you could say she's finally softened up a bit."
11170-103 = "And I think it's all thanks to you, Sensei! ☆"
11170-105 = "..."
11170-108 = "..."
11170-109 = "Ah, you're here."
11170-111 = "I've been waiting for you, Horus of the Da—ah, pardon me.#nYou go by \"Hoshino,\" was it?"
11170-112 = "I'm afraid I'm still getting used to how things are done in Kivotos.#nThis way, if you please, Miss Hoshino."
11170-113 = "What do you want this time, Black Suit?"
11170-114 = "To put it simply, circumstances have changed. And as you possess the greatest Mystic in all of Abydos, I'd like you to reconsider my offer."
11170-115 = "This again? Would you give it a rest already?! I've already...!"
11170-116 = "Ah-ah-ah. Let's keep it down, shall we?"
11170-117 = "...?!"
11170-118 = "How shall I put this? Ah, let me use this quote from a favorite movie of mine."
11170-120 = "(sits down)"
11170-123 = "I'm going to make you an offer you can't refuse."
11170-124 = "You'll find it very enticing, I assure you. Won't you hear me out?"
11170-125 = "Heh heh... Hahaha."
11170-127 = "Next Episode;We're Not Their Friends!"

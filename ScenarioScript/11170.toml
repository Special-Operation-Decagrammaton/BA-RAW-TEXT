[translation]
11170-2 = "ตอนที่ 17;เมฆฝนที่ดำทะมึน"
11170-3 = "สำนักงานหน่วยรับจ้างสารพัด"
11170-5 = "อรุณสวัสดิ์~"
11170-6 = "อรุณสวัสดิ์..."
11170-7 = "โอ๊ะ ตกใจหมดเลย! อารุจังอยู่โต้รุ่งเหรอเนี่ย?"
11170-8 = "เปล่าหรอก ฉันนอนจนตื่นมาแล้วละ..."
11170-9 = "กังวลเรื่องอะไรอยู่ล่ะท่านประธาน?"
11170-10 = "คิดแผนการไว้แล้วไม่ใช่เหรอ? เราจะจ้างพวกทหารรับจ้างเพิ่ม 2 เท่าเพื่อล่ออะบิดอสมายังบริเวณที่#nพวกเราได้เปรียบในการต่อสู้"
11170-11 = "วันนี้ฮารุกะออกไปฝังระเบิดตั้งแต่เช้าตรู่เลยนะ แผนของเราคือฝังระเบิดหลายสิบลูกไว้ แล้วล่อให้พวก#nอะบิดอสมาตรงนั้นไม่ใช่เหรอ?"
11170-13 = "(ครืด...)"
11170-14 = "กลับมาแล้วค่ะ"
11170-15 = "กลับมาแล้วเหรอฮารุกะจัง? ทำได้ดีมาก"
11170-16 = "ฉันฝังระเบิดไว้ในจุดที่สำคัญๆ แล้วค่ะ จากนี้ก็เหลือแค่กดปุ่มให้ระเบิด..."
11170-17 = "ดีมาก ดีมากเลย แล้วจำพิกัดที่ฝังระเบิดไว้ให้ดีๆ ด้วยล่ะ"
11170-18 = "แค่สั่งมาเถอะค่ะ แล้วฉันจะกดระเบิดพวกนั้นให้แหลกเลย..."
11170-19 = "เฮ้อ..."
11170-20 = "ถอนหายใจหลายครั้งแล้วนะ ถ้ากลัวไม่ได้ค่าจ้าง แล้วทำไมไม่ขอเงินค่าจ้างล่วงหน้ามาใช้ทำภารกิจก่อนล่ะ"
11170-21 = "ไม่ได้ เราจะไม่รับเงินก่อนทำงาน นั่นมันกฎเหล็กของเรานะ"
11170-22 = "ถ้ารับเงินมาล่วงหน้า ก็อาจเป็นช่องโหว่ที่ทำให้ลูกค้าเข้ามาวุ่นวายกับปฏิบัติการได้ อะไรประมาณนั้นสินะ"
11170-23 = "ใช่ เราจะแก้ไขปัญหาอย่างเท่ๆ แล้วค่อยรับเงินค่าจ้าง ถ้าไม่ทำตามขั้นตอนนี้ ก็ไม่สามารถบรรลุวิสัยทัศน์ที่ฉันต้องการได้"
11170-24 = "วิสัยทัศน์? เรามีอะไรแบบนี้ด้วยเหรอ?"
11170-25 = "มีสิ!! เพราะเราจะเป็นคนนอกกฎหมายที่ร้ายกาจ ที่ไม่ผูกมัดกับกฎหมายและระเบียบวินัย!!#nนี่คือวิสัยทัศน์ของหน่วยรับจ้างสารพัด 68!"
11170-26 = "อ่อ อย่างนั้นเองเหรอ? จำได้แล้ว จำได้แล้ว..."
11170-27 = "ภารกิจจากลูกค้าก็เหมือนกัน มันอาจเป็นโซ่ตรวนที่ผูกมัดให้เราต้องทำอะไร หรือใช้วิธีการที่พวกเราไม่#nต้องการได้ยังไงล่ะ"
11170-28 = "เพราะฉะนั้นเราต้องรับเงินค่าจ้างหลังจากทำภารกิจเสร็จแล้ว"
11170-29 = "......"
11170-30 = "ถ้ากดดันมาก เราก็เทให้หมดแล้วกลับเกเฮนน่ากันก็ได้นะประธาน"
11170-31 = "ว่าไงนะ?!"
11170-32 = "คะ... ใครกดดันอะไรที่ไหนล่ะ! ก็แค่... เอ่อ... นิดหน่อยน่ะ"
11170-33 = "แต่ตอนนี้เรากลับกันไม่ได้แล้วไหม? พวกคณะกรรมการวินัยคงไม่อยู่เฉยๆ แน่"
11170-34 = "คณะกรรมการวินัยเกเฮนน่า..."
11170-36 = "ถึงพวกนั้นจะเกลียดเราจนไม่อยากจะมองเราก็เถอะ... แต่ก็ไม่ใช่ว่าเราจำเป็นต้องหนียัยพวกนั้นมาที่นี่#nซะหน่อยนี่นา?"
11170-37 = "อีกอย่าง คณะกรรมการวินัยเป็นกลุ่มที่แข็งแกร่งที่สุดในคิโวทอสนะ..."
11170-40 = "เพราะมีประธานกรรมการฮินะอยู่ไงล่ะ"
11170-41 = "อำนาจทั้งหมดของคณะกรรมการวินัยส่วนใหญ่ก็ได้มาจากจากประธานกรรมการนั่นแหละ แค่เธอคนเดียวก็เทียบเท่ากับสมาชิกกองกำลังร้อยคนแล้ว"
11170-42 = "ในทางกลับกัน"
11170-46 = "ถ้าไม่มีประธานกรรมการฮินะ พวกคณะกรรมการวินัยก็ไม่ได้เก่งกาจอะไรนักหรอก"
11170-47 = "แค่วางแผนให้ดีก็จะมีโอกาสชนะได้"
11170-49 = "จริงเหรอ? คาโยโกะจังคิดเผื่อไปถึงนั่นแล้วเหรอ?"
11170-50 = "เพราะนั่นคือศัตรูที่เราต้องเจอสักวันไงล่ะ ฉันว่าการจัดการพวกคณะกรรมการวินัยที่ไม่มีประธานกรรมการ#nฮินะก็คงพอๆ กับการจัดการพวกอะบิดอสที่เรากำลังทำอยู่ในตอนนี้เลยละ"
11170-51 = "และนี่หมายความว่าอะบิดอสเป็นโรงเรียนที่แข็งแกร่งพอตัว แม้จะมีข้อเสียที่จำนวนนักเรียนน้อยก็เถอะ"
11170-52 = "หืม? ขนาดนั้นเลยเหรอ..."
11170-55 = "......"
11170-56 = "ไม่หรอก... การกลับไปไม่อยู่ในตัวเลือกของเรา"
11170-57 = "ไม่มีทางหรอก..."
11170-58 = "...... แล้วอะไรล่ะที่เป็นปัญหา?"
11170-59 = "พอได้แล้ว นี่อารุจัง เลิกคุยอะไรไม่สนุกแบบนี้แล้วไปหาข้าวกินกันเถอะ ฉันหิวแล้ว"
11170-60 = "ไปร้านราเม็งกันไหม? ชิบะเซกิ ราเม็ง?"
11170-61 = "จะไปที่นั่นเหรอ?"
11170-62 = "ไม่เห็นจะเป็นไรเลย เด็กพาร์ทไทม์คนนั้นมาทำงานตอนเย็นๆ ไม่ใช่เหรอ? แค่ไม่เจอกันก็พอแล้วนี่นา"
11170-63 = "อืม... ราเม็งที่นั่นก็อร่อยดีนะ แถมจะได้พาประธานไปคลายเครียดด้วย"
11170-64 = "ได้เลย ไปกันเถอะ~♪"
11170-66 = "ห้องคณะกรรมการแผนงานอะบิดอส"
11170-68 = "(คุณครูเข้ามาในห้องชมรม แล้วเห็นโฮชิโนะนอนหนุนตักโนโนมิอยู่)"
11170-69 = "โย่ว... อรุณสวัสดิ์"
11170-70 = "มาเร็วเลยนะคะคุณครู~"
11170-71 = "หืม? ฉันดูนอนสบายมากเลยเหรอ? ก็ตักของโนโนมิจังนุ่มมากเลยไงล่ะ นี่เป็นหมอนชั้นยอดของฉันเลย"
11170-72 = "คุณครูก็มานอนพักตรงนี้ด้วยกันไหมคะ? มาสิคะ~☆"
11170-73 = "ไม่เอา ตักนี่เป็นของฉันนะ ให้ครูไปนั่งเก้าอี้ผุๆ ตัวนั้นแทนสิ"
11170-74 = "ตักของฉันไม่ใช่ของรุ่นพี่คนเดียวสักหน่อยนะคะ..."
11170-77 = "(กระซิบ) ไว้คราวหน้ามาตอนที่ไม่มีคนนะคะคุณครู"
11170-79 = "ฮึบ!"
11170-80 = "ฮ้าววว ทุกคนนี่ขยันกันแต่เช้าเลยนะ"
11170-81 = "เราไม่ได้มีเวลาพักแบบนี้มานานแล้ว... แต่ละคนคงอยากไปทำอะไรที่อยากทำน่ะค่ะ"
11170-82 = "อืม~ ชิโรโกะจังน่าจะไปฝึกอยู่ ส่วนอายาเนะจังก็คงไปอ่านหนังสือในห้องสมุด..."
11170-83 = "ส่วนโนโนมิจังก็มาโรงเรียนแต่เช้าเพื่อทำความสะอาดและจัดห้องชมรม ทุกคนขยันกันจัง"
11170-84 = "หืม? ฉันเหรอ? แหะๆ~ ฉันก็นอนเล่นอยู่ตรงนี้ไง ของมันแน่อยู่แล้ว!"
11170-85 = "รุ่นพี่ลองทำอะไรที่ทำได้หน่อยไหมคะ? อย่างเช่น ฝึกร่างกายหรือออกไปทำงานพาร์ทไทม์...?"
11170-86 = "ไม่ได้หรอก อายุปูนนี้แล้ว จะให้ลุงไปทำกิจกรรมกลางแจ้งแบบนั้นไม่ได้หรอกโนโนมิจัง"
11170-87 = "แต่อายุก็ไม่ได้ห่างกับฉันมากเท่าไหร่นี่คะ"
11170-88 = "เอาเถอะน่า~ ตอนนี้ครูก็มาถึงแล้ว อีกไม่นานคนอื่นก็คงจะมาถึงแล้วละ งั้นลุงไปซ้อมเป็นคนขี้เกียจ#nสันหลังยาวสักหน่อยดีกว่า"
11170-89 = "เอ๋... จะไปไหนล่ะคะรุ่นพี่?"
11170-90 = "แหะๆ~ วันนี้ลุงขอพักหนึ่งวัน ถ้ามีอะไรก็ติดต่อมาได้เลยนะโนโนมิจัง"
11170-92 = "รุ่นพี่โฮชิโนะเนี่ย... สงสัยจะไปนอนกลางวันอีกแล้ว..."
11170-93 = "แต่ก็คงไม่เป็นไรหรอกค่ะ เพราะอายาเนะจังก็จัดการประชุมให้อยู่ทุกครั้งแล้ว"
11170-94 = "แหะๆ... แต่ว่ารุ่นพี่โฮชิโนะก็เปลี่ยนไปจากตอนแรกที่ฉันเจอเยอะเลยนะคะ"
11170-95 = "อยากรู้ว่าแต่ก่อนเป็นยังไงเหรอคะ?"
11170-96 = "ถึงตอนนี้จะเหมือนกับคนขี้เซาที่ทำอะไรชักช้าก็เถอะค่ะ แต่ที่ฉันเจอรุ่นพี่โฮชิโนะครั้งแรก รุ่นพี่แทบจะเป็น#nเหมือนคนที่ถูกไล่ล่ามาเลยค่ะ"
11170-97 = "อธิบายยังไงดีนะ... เหมือนกับถูกไล่ล่าจากทุกสถานการณ์รอบตัว?"
11170-98 = "ฉันเองก็ไม่ค่อยรู้เรื่องเท่าไหร่ แต่ก่อนหน้านี้เคยมีรุ่นพี่อยู่คนหนึ่ง..."
11170-99 = "ได้ยินมาว่าเขาเป็นประธานนักเรียนคนสุดท้ายของอะบิดอสน่ะค่ะ จากที่ได้ยินมาเธอเป็นคนที่ไม่ค่อยเป็น#nที่น่าเชื่อถือเท่าไหร่ และพอเธอหายตัวไป รุ่นพี่โฮชิโนะก็เลยต้องมารับหน้าที่แทนทั้งหมด"
11170-100 = "ถ้าจำไม่ผิด ตอนนั้นรุ่นพี่โฮชิโนะน่าจะอยู่ปี 1 นะคะ... แต่ฉันก็ไม่ค่อยรู้รายละเอียดอะไรมากหรอกค่ะ"
11170-101 = "แต่ตอนนี้เราก็มีคุณครูที่นี่ แถมรุ่นพี่ก็ยังผูกมิตรกับนักเรียนโรงเรียนอื่นด้วย..."
11170-102 = "ถ้าเป็นรุ่นพี่โฮชิโนะคนเดิมละก็ คงไม่ชอบใจที่เราไปข้องเกี่ยวกับโรงเรียนอื่นแน่ๆ... แต่ตอนนี้รุ่นพี่#nอ่อนโยนขึ้นมากเลยค่ะ"
11170-103 = "เรื่องนี้ต้องขอบคุณคุณครูเลยนะคะ☆"
11170-105 = "......"
11170-108 = "......"
11170-109 = "อ่า มาแล้วสินะ"
11170-111 = "กำลังรออยู่เลยครับ ฮอรัสแห่งรุ่งอรุณ... ไม่สิ.. คุณโฮชิโนะ ขออภัยด้วยครับ"
11170-112 = "ผมยังไม่ค่อยชินกับเรื่องราวในคิโวทอสเท่าไหร่... เชิญทางนี้เลยครับ คุณโฮชิโนะ"
11170-113 = "ครั้งนี้มีเรื่องอะไรเหรอสูทดำ...?"
11170-114 = "หึหึ... สถานการณ์มันเปลี่ยนไปแล้วนี่ครับ ผมจึงอยากเสนออะไรบางอย่างแก่คุณโฮชิโนะ ผู้ที่มีความลึกลับมากที่สุดของอะบิดอสอีกสักครั้ง"
11170-115 = "เสนอเหรอ? อย่ามาตลกเลยน่า!! เรื่องนั้นน่ะ... ฉัน...!"
11170-116 = "อ่า... ช่วยลดเสียงลงด้วยครับ"
11170-117 = "......?!"
11170-118 = "มีประโยคหนึ่งจากหนังที่ผมชอบอยู่ นั่นก็คือ \"ครั้งนี้ลองใช้ประโยชน์จากสิ่งนั้นดูสิ\""
11170-120 = "(ตุ้บ)"
11170-123 = "ผมจะเสนออะไรบางอย่างที่คุณไม่อาจปฏิเสธได้"
11170-124 = "แล้วมันก็น่าตื่นเต้นมากด้วยครับ หวังว่าจะตั้งใจฟังจนจบนะครับ"
11170-125 = "หึหึ... หึหึหึหึ"
11170-127 = "ตอนต่อไป;ไม่ใช่เพื่อนกันสักหน่อย!"

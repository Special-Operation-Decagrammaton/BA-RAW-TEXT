[translation]
11170-2 = "第17話;烏雲密布"
11170-3 = "便利屋．辦公室"
11170-5 = "早呀～"
11170-6 = "（無精打采）早安……"
11170-7 = "嗚哇，嚇我一跳！亞瑠醬熬夜了嗎？"
11170-8 = "沒有，我有睡覺……"
11170-9 = "有什麼煩惱嗎，社長？"
11170-10 = "計畫不是都訂好了嗎？#n雇用兩倍以上的人力，將阿拜多斯引誘到對我們有利的戰場。"
11170-11 = "遙香一早就出去裝設炸彈了。#n我們不是計畫在裝設了數十個炸彈的區域，把阿拜多斯的傢伙們打得落花流水嗎？"
11170-13 = "（答嚓）"
11170-14 = "我回來了。"
11170-15 = "歡迎回來，遙香。辛苦了。"
11170-16 = "主要位置已經埋好炸彈了。#n接著只要按下這個按鈕……"
11170-17 = "好乖好乖，真努力呢～#n記得要好好記住埋炸彈的位置哦。"
11170-18 = "請儘管吩咐。#n我會用這雙手炸飛一切……用這雙手……"
11170-19 = "唉……"
11170-20 = "為什麼一副要死不活的樣子？#n一開始就向客戶收訂金不就好了？"
11170-21 = "……不收訂金是我們的鐵則。"
11170-22 = "一旦收了訂金就不得不聽從客戶的命令……記得是這種理由吧？"
11170-23 = "沒錯。迅速俐落地解決工作後再領委託費。#n不照這個順序就無法達成我們追求的願景。"
11170-24 = "願景？有那種東西嗎？"
11170-25 = "當然有！！不受法律或規則束縛的冷酷不法之徒！#n那不就是我們便利屋68的願景嗎！"
11170-26 = "啊啊，我想起來了。"
11170-27 = "客戶的委託也像剛才佳世子說的一樣，#n可能成為束縛我們的枷鎖，迫使我們做出違反意願的行為。"
11170-28 = "因此委託費只能在成功完成任務後收取。"
11170-29 = "……"
11170-30 = "真的那麼有壓力的話，直接撒手不管回到格黑娜也是個辦法哦，社長。"
11170-31 = "什麼！？"
11170-32 = "我，我哪有什麼壓力！#n只是……有一點……"
11170-33 = "唔嗯……事到如今也沒辦法回去了吧？#n風紀委員會那些傢伙應該不會坐視不管哦？"
11170-34 = "風紀委員會……"
11170-36 = "風紀委員會的確把我們視為眼中釘，不過……#n我們不是為了躲避那些傢伙才逃到這裡來的。"
11170-37 = "而且真要說的話，我們的風紀委員會被評為奇普托斯最強的理由……"
11170-40 = "是風紀委員長陽奈的存在。"
11170-41 = "要說風紀委員會的戰力絕大部分都來自於他也不為過。#n他的存在完全體現了「以一擋百」這個形容。"
11170-42 = "不過換句話說──"
11170-46 = "除了陽奈之外，其他風紀委員沒什麼了不起的。"
11170-47 = "只要做好計劃，就有充分的勝算。"
11170-49 = "是嗎？佳世子已經考慮到那麼遠了嗎？"
11170-50 = "畢竟是我們總有一天必須面對的敵人。#n考量到我們花費在阿拜多斯的努力，應該能抗衡沒有陽奈的風紀委員會。"
11170-51 = "但反過來說，阿拜多斯就是那麼不容忽視的對手。#n雖然他們有學生數量少這個最大的弱點。"
11170-52 = "咦？有那麼強嗎……"
11170-55 = "……"
11170-56 = "……不，現在已經沒有回頭這個選項了。"
11170-57 = "說是這麼說……唉。"
11170-58 = "……到底是哪裡有問題？"
11170-59 = "知道了知道了。#n亞瑠醬，別再討論無聊的話題了，我們去吃飯吧。肚子也餓了。"
11170-60 = "要去柴關拉麵店嗎？"
11170-61 = "又去？ "
11170-62 = "有什麼關係～打工醬似乎下午才上班。#n只要不碰到面就行了吧？"
11170-63 = "嗯……確實是挺好吃的。#n而且也得讓社長打起精神來才行……"
11170-64 = "那就這麼決定囉～走吧走吧♪"
11170-66 = "對策委員會．教室"
11170-68 = "（一進到部室，便看到星野枕在野乃美的腿上）"
11170-69 = "早呀，老師。"
11170-70 = "老師早安。今天來的比較早呢？"
11170-71 = "嗯？看起來很放鬆嗎？#n唔嘿～野乃美醬軟軟的膝枕又舒服又棒唷～是我專屬的特等席～"
11170-72 = "老師要不要也過來這邊？來，這邊～☆"
11170-73 = "不行，這雙腿是我的地盤。#n老師去坐那張看起來很不舒服的椅子吧～"
11170-74 = "我的腿才不是前輩專用的呢……"
11170-77 = "（低語）下次在沒有人的時候做吧，老師。 "
11170-79 = "嘿咻。"
11170-80 = "呼啊～大家一大早還真有精神呢。"
11170-81 = "難得可以悠閒一下……大家現在應該都在做自己想做的事吧。"
11170-82 = "嗯～白子醬肯定在鍛鍊，綾音醬大概為了唸書去圖書館了吧……"
11170-83 = "野乃美醬打掃了學校和整理社團教室了對吧。 #n唔嘿～大家真認真。"
11170-84 = "嗯？我？唔嘿～當然是在這裡耍廢囉～"
11170-85 = "前輩要不要也開始做點事？例如打工或鍛鍊之類的。"
11170-86 = "不行不行～大叔我的年紀做這些太勉強了。"
11170-87 = "明明跟我差不多吧？"
11170-88 = "唔嘿～既然老師都來了，其他人應該也快到了吧？#n那我就先離開囉。"
11170-89 = "哎呀，前輩要去哪裡？"
11170-90 = "唔嘿～大叔我今天休假。#n想去隨興地偷懶一下，如果有什麼事再聯絡我唷，野乃美醬。"
11170-92 = "星野前輩……好像又跑去睡午覺了呢。"
11170-93 = "嗯……應該沒關係吧。#n綾音醬還是會讓會議好好進行。"
11170-94 = "啊哈哈……話說回來，星野前輩和從前相比變了很多呢。"
11170-95 = "咦？你問以前是什麼樣子？"
11170-96 = "雖然現在感覺像是慵懶的瞌睡蟲…… #n但是我剛認識星野前輩時，前輩就像是一直被什麼東西追著一樣。"
11170-97 = "要問我是被什麼追著的話……嗯，應該是被一切的狀況吧。"
11170-98 = "雖然這是聽別人說的，以前似乎有一個前輩……"
11170-99 = "聽說是阿拜多斯最後的學生會長。#n好像是個非常不可靠的人，在那個人消失後就變成由星野前輩承受一切了……"
11170-100 = "那時星野前輩好像還是1年級……#n詳細的情形我也不太清楚。"
11170-101 = "但是現在老師來了，前輩和其他學園的學生也開始有了交流……"
11170-102 = "如果是以前，前輩應該完全不會想和其他學園扯上關係才對……#n或許是多少變得圓滑一點了吧。"
11170-103 = "嗯，這都多虧了老師☆"
11170-105 = "……"
11170-108 = "……"
11170-109 = "哎呀哎呀。"
11170-111 = "恭候多時了，曉之荷魯……不，是星野小姐對吧。#n我失禮了。"
11170-112 = "我還不太熟悉奇普托斯。#n這邊請，星野小姐。"
11170-113 = "……這次又怎麼了，黑色西裝人？"
11170-114 = "……呵呵，因為情況有所變動。 #n所以我想再次向持有阿拜多斯最高神祕的星野小姐提議。"
11170-115 = "提議？開什麼玩笑！！！那些早就……！！"
11170-116 = "別這麼說，請先冷靜下來。"
11170-117 = "……！？"
11170-118 = "……有句電影的台詞我很喜歡。這次就來引用一下吧。"
11170-120 = "（咚唦）"
11170-123 = "我會向你提出一個無法拒絕的提案。"
11170-124 = "我自認是個有趣的提案，還請仔細聆聽。"
11170-125 = "咯咯，咯咯咯咯……"
11170-127 = "下一話;才不是什麼朋友！"

[translation]
1008505-1 = "เซิร์ฟเวอร์ที่ใหญ่ที่สุดในโลก"
1008505-2 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
1008505-3 = "(คืนก่อนหน้า ในขณะที่ฮาเระกำลังตรวจสอบความปลอดภัยอยู่ในห้องชมรมเวอริทัส...)"
1008505-9 = "ไม่พบปัญหาระบบทำงานหนักเกินไป กระบวนการกู้คืนข้อมูลฉุกเฉินก็ทำงานปกติดี..."
1008505-10 = "ล็อกของแอปพลิเคชั่นก็ไม่พบความผิดปกติ งั้นก็น่าจะส่งอีเมลบอกรุ่นพี่ได้แล้วว่าไม่พบปัญหา"
1008505-11 = "ไหนดูซิ เมลอยู่ไหนนะ..."
1008505-16 = "เอ๋? นี่มันอีเมลอะไร? เมื่อกี้ตอนเปิดกล่องขาเข้าดูก็ยังไม่มีเลยนี่..."
1008505-22 = "...<หนังสือคำท้าจากบุคคลนิรนาม>"
1008505-28 = "[ns1] \"ได้อีเมล <หนังสือคำท้าจากบุคคลนิรนาม>\"\n[ns2] \"ระหว่างตรวจสอบความปลอดภัยเมื่อวานเหรอ?\""
1008505-31 = "อื้ม ฉันไม่รู้ว่าใครเป็นคนส่งมา และเนื้อหาในอีเมลก็คลุมเครือด้วย..."
1008505-32 = "แต่จำได้แม่นเลยว่าที่หัวข้ออีเมลมีเขียนไว้ว่า <หนังสือคำท้า>"
1008505-33 = "[s] \"ใครแค่ส่งมาแกล้งรึเปล่า?\""
1008505-34 = "ถ้าเป็นปกติฉันก็คงจะคิดแบบนั้นและทำเป็นเมินไปแล้ว แต่ว่าอีเมลนี้ดันส่งมาตอนฉันกำลังตรวจสอบ#nเซิร์ฟเวอร์อยู่พอดี"
1008505-35 = "แต่ว่าหนังสือคำท้านี้ไม่มีร่องรอยว่าเคยผ่านเซิร์ฟเวอร์เลยน่ะสิ"
1008505-36 = "และนั่นแปลว่า... มีแฮ็กเกอร์บางคนแอบเข้าถึงคอมพิวเตอร์ของฉันและเขียน <หนังสือคำท้าจากบุคคลนิรนาม> นี้ขึ้นเองเพื่อจะปกปิดร่องรอยของตัวเอง"
1008505-37 = "เวลาอื่นก็มีเยอะแยะ แต่ก็ใจนักเลงมาแฮ็กในระหว่างที่ฉันตรวจสอบเซิร์ฟเวอร์... ทำฉันหัวร้อนขึ้นมาเลยแฮะ"
1008505-38 = "[s3] \"แฮ็กคอมของเวอริทัสแบบเรียลไทม์เลยเหรอเนี่ย...\"\n[s4] \"ต้องเป็นคนที่มีความสามารถใช่ย่อยเลยนะ\""
1008505-41 = "คนที่มีความสามารถในการแฮ็กคอมพิวเตอร์ของเวอริทัสได้ ในคิโวทอสก็ไม่น่าจะมีเยอะ..."
1008505-42 = "แต่ในเมื่อถูกเล่นงานไปครั้งหนึ่งแล้ว ถ้าฉันไม่ตอบสนองอะไรเลย ก็คงจะเสียศักดิ์ศรีในฐานะแฮ็กเกอร์แย่"
1008505-43 = "[s] \"เนื้อหาในอีเมลเขียนว่าอะไรเหรอ?\""
1008505-44 = "อืม... เนื้อหาใช่มั้ย..."
1008505-45 = "อีเมลนั้นบอก 'ตำแหน่งของเซิร์ฟเวอร์ที่จุข้อมูลมากที่สุดในคิโวทอส' และแนบข้อมูลพิกัดที่ถูกเข้ารหัส#nมาด้วย"
1008505-46 = "บอกว่า 'เซิร์ฟเวอร์ที่จุข้อมูลมากที่สุดในคิโวทอส' งั้นเหรอ เป็นใครก็รู้ว่าโม้..."
1008505-47 = "แต่ตอนนี้ข้อมูลเดียวของบุคคลนิรนามคนนี้ก็คือพิกัดนี้"
1008505-48 = "[s] \"งั้นก็คงต้องไปตามพิกัดนั้นสินะ\""
1008505-49 = "มันก็ใช่... แต่ที่จริงแล้วพิกัดนี้มีปัญหาใหญ่อยู่หนึ่งอย่าง"
1008505-50 = "และนั่นก็คือ..."
1008505-52 = "...มันอยู่กลางภูเขา"
1008505-53 = "[s5] \"แล้วมันเป็นปัญหายังไงเหรอ?\"\n[s6] \"อยู่บนยอดเขาสูงมากๆ เลยเหรอ?\""
1008505-54 = "...ก็ถ้าเราลองไปดูแต่ไม่เจออะไรที่นั่นเลย ก็เหมือนกับเราเสียพลังไปเปล่าๆ เลยนะ"
1008505-55 = "ไม่สิ มันอยู่ตรงเชิงเขาที่เราสามารถเดินไปได้ง่ายๆ น่ะ"
1008505-56 = "...ก็ถ้าเราลองไปดูแต่ไม่เจออะไรที่นั่นเลย ก็เหมือนกับเราเสียพลังไปเปล่าๆ เลยนะ"
1008505-57 = "คุณครูเองก็อาจจะรู้ว่าแฮ็กเกอร์อย่างฉันไม่ชอบกิจกรรมกลางแจ้งอย่างการปีนเขาเป็นที่สุด"
1008505-58 = "ถ้าแฮ็กเกอร์คนนั้นใช้ประโยชน์จากจุดนี้แล้วระบุพิกัดเป็นเชิงเขาที่ปีนขึ้นไปยากๆ ก็เท่ากับว่าฉันโดนหลอก 2 รอบ..."
1008505-59 = "มีวิธีที่จะทำให้รู้ว่ามีอะไรอยู่ที่นั่นโดยไม่ต้องปีนเขาขึ้นไปมั้ยนะ?"
1008505-60 = "อย่างเช่นใช้โดรนที่ชาร์จแบตไว้จนเต็ม หรือไม่ก็แฮ็กกล้องถ่ายรูปดาวเทียม..."
1008505-64 = "[ns] \"...ไปปีนเขาด้วยกันเถอะ\""
1008505-65 = "อ่า... ที่ฉันถามจากคุณครูก็เพราะไม่อยากใช้วิธีนั้นนะ..."
1008505-66 = "งั้นก็ช่วยไม่ได้ ถ้าคุณครูจะไปด้วย ก็ควรค่าแก่การพยายามหน่อย"
1008505-67 = "...เข้าใจแล้ว ฉันจะไปเปลี่ยนชุดมาเดี๋ยวนี้ละ"
1008505-73 = "(หลังจากนั้นคุณครูกับฮาเระก็ไปเตรียมตัวสำหรับปีนเขา และมุ่งหน้าไปยังสถานที่ที่แฮ็กเกอร์นิรนาม#nคนนั้นบอก)"
1008505-78 = "แฮ่ก... แฮ่ก... แฮ่ก..."
1008505-79 = "[s7] \"ไหวรึเปล่า ฮาเระ?\"\n[s8] \"ดื่มน้ำสักหน่อยมั้ย?\""
1008505-82 = "ไม่เป็นไร... แค่นี้น่ะ... ฉันยังพอทนได้"
1008505-83 = "แต่ถ้าหอบสังขารมาลำบากขนาดนี้... แล้วถ้าสิ่งที่เจอเป็นแค่ผีฟักทองหรืออะไรทำนองนั้นละก็..."
1008505-84 = "ไม่ว่าแฮ็กเกอร์คนนั้นจะเป็นใครหรืออยู่ที่ไหนในคิโวทอส... เตรียมตัวเจอดีได้เลย..."
1008505-87 = "[ns] \"เราน่าจะมาถึงแล้วนะ...\""
1008505-88 = "อืม..."
1008505-89 = "ภูเขาลูกนี้มีสิ่งปลูกสร้างอะไรแบบนี้ด้วยเหรอเนี่ย...?"
1008505-93 = "แต่ในแอปพลิเคชันแผนที่ใหม่ล่าสุดไม่เห็นบอกเลยว่ามีสิ่งปลูกสร้างในตำแหน่งนี้"
1008505-94 = "[s] \"หรือนี่จะเป็นศูนย์ข้อมูลที่ถูกทิ้งร้าง...?\""
1008505-95 = "ไม่น่าใช่หรอก ฉันไม่เคยเห็นบันทึกว่ามีศูนย์ข้อมูลอยู่ในที่แบบนี้เลย"
1008505-96 = "นอกจากนี้ โครงสร้างของสิ่งปลูกสร้างนี้มันแปลกเกินกว่าจะเป็นศูนย์ข้อมูลได้ โดยปกติแล้วศูนย์ข้อมูล#nจะต้องมีอุปกรณ์ทำความเย็นอยู่รอบๆ ตัวอาคาร เพื่อลดความร้อนที่เกิดจากเซิร์ฟเวอร์ขนาดใหญ่"
1008505-97 = "นอกจากที่นี่จะไม่มีอุปกรณ์ทำความเย็นแล้ว ยังแทบจะไม่มีมาตรการรักษาความปลอดภัยเลยด้วย..."
1008505-98 = "[s] \"ลองเข้าไปดูกันก่อนมั้ย?\""
1008505-99 = "...อืม ไม่ว่าสิ่งปลูกสร้างนี้จะเป็นอะไร ถ้าเราเข้าไปตรวจสอบข้างในก็คงรู้โครงสร้างได้"
1008505-108 = "ตามคาดเลย... ในนี้มีหลายจุดเลยที่ไม่เหมาะสมกับการเป็นศูนย์ข้อมูล"
1008505-109 = "แถมยังมีร่องรอยว่ามีคนมากมายแวะเวียนเข้ามาในอดีต... ไม่มีทางหรอกที่สถานที่แห่งนี้จะเป็น 'เซิร์ฟเวอร์ที่จุข้อมูลมากที่สุดในคิโวทอส' ได้เลย"
1008505-113 = "เอ๋? คอมพิวเตอร์ที่อยู่ตรงกำแพงตรงนี้มันอะไรกัน?"
1008505-114 = "[s] \"คอมพิวเตอร์ปลายทางที่เชื่อมต่อกับเซิร์ฟเวอร์รึเปล่า?\""
1008505-115 = "ไม่รู้สิ... ลองตรวจสอบดูหน่อยดีกว่า..."
1008505-122 = "...หืม?"
1008505-127 = "[ns9] \"พะ... เพดานขยับได้!\"\n[ns10] \"ระวังด้วยนะ ฮาเระ!\""
1008505-130 = "เดี๋ยวนะ นี่มัน... รอเดี๋ยวนะคุณครู"
1008505-136 = "เฮ้อ... โดนหลอกเข้าให้แล้ว..."
1008505-137 = "คุณครู ช่วยอ่านข้อความที่เขียนไว้ตรงนี้ให้หน่อยได้มั้ย?"
1008505-138 = "[s] \"ยินดีต้อนรับสู่พิพิธภัณฑ์ดาราศาสตร์สาธารณะแห่งที่ 3 ของคิโวทอส...\""
1008505-139 = "อื้ม ที่นี่คงเป็นหอดูดาวเก่าแก่ที่ถูกปิดไปเมื่อนานมาแล้วน่ะ"
1008505-140 = "จะว่าไป ตอนเด็กๆ ฉันก็เคยได้ยินว่าหอดูดาวคลื่นวิทยุแห่งหนึ่งบนภูเขาถูกปิดไปเพราะกล้องส่องทาง#nไกลเสื่อมสภาพ... มันอาจจะเป็นที่นี่ก็ได้นะ"
1008505-141 = "ระบบเปิดปิดเพดานที่เชื่อมกับคอมพิวเตอร์ปลายทางก็น่าจะเป็นระบบที่เอาไว้ใช้เพื่อสังเกตท้องฟ้า... ส่วนร่องรอยของคนที่ยังเหลือให้เห็นอยู่ก็คงจะมาจากผู้เข้าชมที่มาดูดาว"
1008505-142 = "จริงๆ เลยเชียว... ฉันถูกแฮ็กเกอร์นิรนามคนนั้นต้มจนเปื่อยเลย"
1008505-143 = "[s11] \"งั้นที่บอกว่าเป็น 'เซิร์ฟเวอร์ที่จุข้อมูลมากที่สุดในคิโวทอส'...\"\n[s12] \"ที่จริงก็เรื่องโกหกสินะ\""
1008505-146 = "ไม่รู้สิ ถึงฉันจะไม่รู้จุดประสงค์ของคนที่ส่งอีเมลเข้ามา"
1008505-147 = "แต่เราจะฟันธงว่าทุกอย่างเป็นเรื่องโกหกไม่ได้หรอก"
1008505-148 = "ถ้าเราเปลี่ยนพลังงานการแผ่รังสีที่ดวงดาวในจักรวาลส่งมาจากที่ไกลแสนไกลเป็นข้อมูลละก็ มันจะอยู่ในปริมาณมหาศาลเกินกว่าที่เซิร์ฟเวอร์หนึ่งจะบันทึกได้ก็ได้"
1008505-149 = "...ถ้าจะเรียกหอดูดาวที่สามารถอ่านข้อมูลมากมายบนท้องฟ้ายามค่ำคืนว่าเป็น 'เซิร์ฟเวอร์ที่ใหญ่ที่สุดในคิโวทอส' ก็ไม่ถือว่าผิดนักหรอก"
1008505-155 = "คุณครู นี่ก็ใกล้จะถึงเวลาที่พระอาทิตย์จะตกดินแล้ว..."
1008505-156 = "ถ้าไม่มีธุระอะไร เราอยู่ดูดาวด้วยกันก่อนแล้วค่อยลงไปมั้ย?"
1008505-157 = "ไหนๆ ก็มาถึงที่นี่แล้ว ถ้าไม่ได้อะไรกลับไป มันก็น่าเสียดายอยู่..."
1008505-158 = "[s] \"อื้ม ดูดาวด้วยกันก่อนแล้วกัน\""
1008505-165 = "(จากนั้นคุณครูกับฮาเระก็มุ่งหน้าไปยังกล้องส่องทางไกลขนาดใหญ่ที่อยู่ชั้นบนของหอดูดาว)"
1008505-168 = "― [log=하레 캠핑]บนท้องฟ้ามีแสงสว่างเต็มไปหมดเลย...[/log][wa:1920] "
1008505-171 = "― [log=하레 캠핑]เป็นครั้งแรกเลยนะ ที่ฉันได้เห็นท้องฟ้ายามค่ำคืน[/log][wa:10] "
1008505-173 = "― [log=하레 캠핑]ที่ระยิบระยับแบบนี้[/log]"
1008505-176 = "― [log=하레 캠핑]จุดแต่ละจุดที่เปล่งประกายตรงนั้น[/log][wa:2430] "
1008505-178 = "― [log=하레 캠핑]พอคิดว่าเป็นโหนดที่จุข้อมูลมหาศาล[/log][wa:980] "
1008505-181 = "― [log=하레 캠핑]ก็รู้สึกถึงความน่าเกรงขามที่ไม่เคยรู้สึกมาก่อนเลย[/log][wa:1730] "
1008505-184 = "― [log=하레 캠핑]ต่อให้ฉันเรียงร้อยข้อมูลทุกอย่างที่ฉันรู้[/log][wa:1390] "
1008505-186 = "― [log=하레 캠핑]ก็คงไปไม่ถึงแสงสว่างตรงนั้นหรอก[/log][wa:940] "
1008505-189 = "― [log=하레 캠핑]...แต่ว่าฉันก็จะไม่ยอมแพ้หรอกนะ[/log][wa:2930] "
1008505-191 = "― [log=하레 캠핑]เพราะเวอริทัสหรือความจริงแท้จะมุ่งหน้าไปหาแสงสว่างเสมอ[/log][wa:440] "
1008505-194 = "― [log=하레 캠핑]ฉันขอส่งความเคารพที่มีต่อดวงดาว[/log][wa:2510] "
1008505-196 = "― [log=하레 캠핑]ที่อยู่บนฟากฟ้าไกลผ่านคำทักทายนี้[/log][wa:270] "
1008505-199 = "― [log=하레 캠핑]สวัสดีค่ะ สบายดีมั้ยคะ?[/log][wa:1730] "
1008505-202 = "(หลังจากนั้นคุณครูกับฮาเระก็ฟังเรื่องราวของท้องฟ้ายามค่ำคืน และกลับมาที่โรงเรียนในยามรุ่งสาง)"

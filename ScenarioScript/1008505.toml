[translation]
1008505-1 = "World's Largest Server"
1008505-2 = "Veritas Hackers' Lounge"
1008505-3 = "Last night, as Hare was doing security maintenance in Veritas club room..."
1008505-9 = "System load is normal. The emergency recovery processes seem to be working properly as well..."
1008505-10 = "No issues in the application logs either. I think it's safe to report everything is looking a-okay."
1008505-11 = "Let me just check my email real quick."
1008505-16 = "Huh? What is this message?"
1008505-22 = "...An anonymous challenge?"
1008505-28 = "[ns1] \"So someone's challenged you?\"\n[ns2] \"They sent this during security maintenance yesterday?\""
1008505-31 = "Yeah. It didn't say who the sender was, and even the message itself was pretty vague..."
1008505-32 = "But it did clearly say \"challenge letter\" in the header."
1008505-33 = "[s] \"Maybe it was just a prank?\""
1008505-34 = "I thought the same, but this mail suddenly popped up during server maintenance."
1008505-35 = "And then there's the fact that this challenge letter never properly passed through the server."
1008505-36 = "That means a hacker snuck onto my computer, wrote their challenge, and then completely covered their tracks."
1008505-37 = "Hacking me while I'm doing server maintenance, of all times... I won't forgive them for that."
1008505-38 = "[s3] \"Someone who can hack Veritas' network in real-time...\"\n[s4] \"They must be pretty skilled.\""
1008505-41 = "There aren't many in Kivotos skilled enough to hack Veritas' server."
1008505-42 = "As a fellow hacker, I can't take this insult to my dignity standing down."
1008505-43 = "[s] \"What did the message say?\""
1008505-44 = "Uh... Well..."
1008505-45 = "It gave the location of a \"server with the most data in all of Kivotos,\" along with a set of encrypted coordinates."
1008505-46 = "If they have a \"server with the most data in Kivotos,\" I've got a bridge to sell them..."
1008505-47 = "Otherwise, these coordinates are the only information we have about this hacker."
1008505-48 = "[s] \"Let's head over and pay them a visit then.\""
1008505-49 = "That's the plan. However, there's just one teeny, tiny enormous problem with these coordinates."
1008505-50 = "These coordinates..."
1008505-52 = "...lead to the middle of a mountain."
1008505-53 = "[s5] \"Can you handle hiking a mountain?\"\n[s6] \"It wouldn't happen to be a very tall mountain?\""
1008505-54 = "I swear if we climb all the way to the top of that mountain and nothing's there, I'll scream."
1008505-55 = "Fortunately, we don't have to go to the top. Just a cozy walk to the location."
1008505-56 = "...I swear if we have to climb all the way to the top and nothing's there, I'll scream."
1008505-57 = "I'm sure you know, but outdoor activities like hiking are my Achilles' heel. My ultimate weakness."
1008505-58 = "I would look like a total fool if I took this obvious bait and was forced to climb a mountain for nothing."
1008505-59 = "Sensei, surely we can verify this server without me climbing a mountain?"
1008505-60 = "We could send a drone. Or hack into a satellite camera."
1008505-64 = "[ns] \"...Lace up your hiking boots.\""
1008505-65 = "Ugh... Sensei please, I REALLY don't want to go."
1008505-66 = "Fine, fine! I'll go! Just let me find my boots."
1008505-67 = "...Where did I put my boots?"
1008505-73 = "Hare and I set out to climb the mountain the anonymous hacker sent us toward."
1008505-78 = "*huff* *huff* *huff*"
1008505-79 = "[s7] \"Hare, are you all right?\"\n[s8] \"Do you need some water?\""
1008505-82 = "This...is fine...but I'm barely hanging on..."
1008505-83 = "If after all this...we run into something silly like a ghost..."
1008505-84 = "Whoever that hacker is...they better watch out..."
1008505-87 = "[ns] \"We're almost there...\""
1008505-88 = "Um..."
1008505-89 = "Was there always a building like this on the mountain?"
1008505-93 = "My map app says there's not supposed to be anything here."
1008505-94 = "[s] \"Maybe it's an abandoned data center?\""
1008505-95 = "No. I don't think so."
1008505-96 = "The architecture is off. Data centers should have a bunch of AC units to deal with the heat running the servers makes."
1008505-97 = "And then there's the lack of security. It's almost like..."
1008505-98 = "[s] \"Let's go check it out.\""
1008505-99 = "...Yeah. Whatever this place is, we won't know the truth until we get inside."
1008505-108 = "As expected... There's way too much unused space for it to be a data center. There should be CPUs from wall to wall."
1008505-109 = "And look at this dust. This place hasn't had guests or workers in years... That doesn't exactly scream \"server with the most information in Kivotos\" to me."
1008505-113 = "Huh? What's up with that computer mounted on the wall?"
1008505-114 = "[s] \"Could it be a terminal for the server?\""
1008505-115 = "Maybe... Let's take a look..."
1008505-122 = "...Huh?"
1008505-127 = "[ns9] \"Th-The ceiling is moving!\"\n[ns10] \"Hare, watch out!\""
1008505-130 = "Wait, this is... Hold on a second, Sensei!"
1008505-136 = "Ugh... We were tricked. As expected."
1008505-137 = "Sensei, would you mind reading what's written over there?"
1008505-138 = "[s] \"Welcome to the third public Kivotos planetarium...\""
1008505-139 = "Bingo. I think this is an observatory that closed long ago."
1008505-140 = "Now that I think about it... I remember being a kid and hearing a story about a radio observatory that closed when the telescope became obsolete... Maybe this is that place."
1008505-141 = "The terminal there is used to open the roof to observe the sky. And since it was a public observatory, that explains why we saw so many signs that people had been here."
1008505-142 = "Man...that hacker really made fools out of us."
1008505-143 = "[s11] \"Then all that talk about this place being the 'server with the most information in Kivotos'...\"\n[s12] \"We bought it hook, line, and sinker...\""
1008505-146 = "Well, I wouldn't call their intentions noble."
1008505-147 = "But they didn't entirely lie to us."
1008505-148 = "If we translated all the radiant energy that came from the stars, it would dwarf the amount of data any typical server could handle."
1008505-149 = "...Thus, calling an observatory the \"biggest server in Kivotos,\" it's pretty clever, actually."
1008505-155 = "Oh, Sensei. The sun is about to set."
1008505-156 = "If you don't mind, would you like to stargaze with me on the telescope here before we hike back down?"
1008505-157 = "If we do that, maybe it won't be a wasted trip after all."
1008505-158 = "[s] \"Of course. Let's go see some stars.\""
1008505-165 = "Hare and I climbed to the top of the giant telescope mounted on the ceiling of the observatory."
1008505-168 = "― [log=하레 캠핑]The sky is so full of light...[/log][wa:2080] "
1008505-171 = "― [log=하레 캠핑]I think it's the first time[/log][wa:10] "
1008505-173 = "― [log=하레 캠핑]I've seen the night sky shine like this.[/log]"
1008505-176 = "― [log=하레 캠핑]I'm awed by the thought that[/log][wa:2590] "
1008505-178 = "― [log=하레 캠핑]every single one of those shiny dots are nodes[/log][wa:460] "
1008505-181 = "― [log=하레 캠핑]containing a vast amount of data.[/log][wa:2370] "
1008505-184 = "― [log=하레 캠핑]Even if I were to gather up everything I know,[/log][wa:1190] "
1008505-186 = "― [log=하레 캠핑]I wouldn't be able to match those lights.[/log][wa:540] "
1008505-189 = "― [log=하레 캠핑]...But I won't give up.[/log][wa:3250] "
1008505-191 = "― [log=하레 캠핑]Because the truth is a light that illuminates everything.[/log][wa:320] "
1008505-194 = "― [log=하레 캠핑]I say salutations[/log][wa:3070] "
1008505-196 = "― [log=하레 캠핑]to all you stars shining in the skies.[/log][wa:70] "
1008505-199 = "― [log=하레 캠핑]Hello. How are you?[/log][wa:1890] "
1008505-202 = "I listened to Hare's pleasant chat with the heavens. We returned to the school near dawn."

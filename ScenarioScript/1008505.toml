[translation]
1008505-1 = "世界最大的伺服器"
1008505-2 = "貝里塔斯．駭客休息室"
1008505-3 = "（前一天晚上，晴在貝里塔斯部室裡進行安檢時……）"
1008505-9 = "系統負荷正常，緊急復原程序也在穩定運作……"
1008505-10 = "應用程式的紀錄檔也沒有異狀。#n好，這樣應該可以回報前輩一切正常了。"
1008505-11 = "我看看，郵件程式是在……"
1008505-16 = "咦？這封信是什麼時候寄來的？#n剛才開信箱的時候明明沒看到啊……"
1008505-22 = "……《匿名挑戰書》？"
1008505-28 = "[ns1]「你說昨天進行安檢的時候，在私人信箱裡……」\n[ns2]「發現了一封《匿名挑戰書》……？」"
1008505-31 = "嗯，雖然寄信人不明，信件的內容也寫得模稜兩可……"
1008505-32 = "但那封信的標題上確實寫著「挑戰書」。"
1008505-33 = "[s]「會不會是有人在惡作劇？」"
1008505-34 = "換作平時，我肯定也會這麼認為……#n但這封信剛好是在我檢測伺服器的時候突然出現……"
1008505-35 = "而且最重要的是，這封挑戰書完全沒有經過任何伺服器的跡象。"
1008505-36 = "換句話說這封《匿名挑戰書》……#n是某個駭客為了掩飾自己的行蹤，直接駭入我的電腦裡編輯而成的。"
1008505-37 = "如果是其他時候也就算了，竟敢在我檢測伺服器的時候嘗試如此大膽的入侵行為……真是讓人生氣。"
1008505-38 = "[s3]「竟然能夠即時入侵貝里塔斯的電腦……」\n[s4]「雖然不知道對方是誰，但肯定有兩把刷子。」"
1008505-41 = "雖然我不認為奇普托斯有多少能入侵貝里塔斯電腦的駭客……"
1008505-42 = "但別人既然都正面出擊了……#n如果不做任何反應，那我身為駭客的尊嚴又該往哪裡擺呢？"
1008505-43 = "[s]「話說那封信裡寫了什麼呢？」"
1008505-44 = "嗯……關於這個……"
1008505-45 = "信裡寫著「奇普托斯儲存最多資料的伺服器位置」……#n還附上了一個加密的座標資訊。"
1008505-46 = "雖然「奇普托斯儲存最多資料的伺服器」一看就像在吹牛……"
1008505-47 = "但我們現在手中與那個匿名駭客有關的情報，也就只有這個座標而已。"
1008505-48 = "[s]「看來我們得親自去這個座標看看才行。」"
1008505-49 = "是這麼說沒錯……但其實這個座標有一個很大的問題。"
1008505-50 = "那就是……"
1008505-52 = "……座標在一座山的正中央。"
1008505-53 = "[s5]「怎麼了嗎？」\n[s6]「難道是某座高山的山頂嗎？」"
1008505-54 = "要是我們特地跑一趟，結果發現那裡什麼都沒有……不就白白浪費體力了嗎……"
1008505-55 = "不，那是一座徒步就能走上半山腰的山。可是……"
1008505-56 = "要是我們特地跑一趟，結果發現那裡什麼都沒有……不就白白浪費體力了嗎……"
1008505-57 = "老師你也知道，對像我這樣的駭客來說，登山之類的戶外活動幾乎是致命的弱點……"
1008505-58 = "萬一那個駭客就是看準這點，故意找了座難爬的山引誘我去……#n不就等於我被騙了兩次嗎……？"
1008505-59 = "有沒有不用親自爬山也能知道那裡有什麼的方法呢……"
1008505-60 = "比如操控載滿電池的無人機，或者是駭入衛星攝影機之類的……"
1008505-64 = "[ns]「……我們一起去那座山上看看吧。」"
1008505-65 = "唔……我就是不想這麼做才找老師商量的說……"
1008505-66 = "算了，假如老師願意陪我一起去的話……或許我可以努力看看。"
1008505-67 = "……我知道了，我馬上去換衣服。"
1008505-73 = "（做好登山的準備之後，和晴一同出發前往駭客指定的地點）"
1008505-78 = "哈啊，哈啊……哈啊，哈啊……"
1008505-79 = "[s7]「你還好嗎，晴？」\n[s8]「要不要喝點水？」"
1008505-82 = "我沒事……這種程度……我咬緊牙關還是撐得下去的……"
1008505-83 = "但要是我費盡千辛萬苦……最後只看到一個無聊的南瓜怪的話……"
1008505-84 = "不管那個駭客在奇普托斯的哪裡……我都希望他已經做好覺悟了……"
1008505-87 = "[ns]「我們好像到了……」"
1008505-88 = "唔……"
1008505-89 = "這座山裡原本就有這樣的建築物嗎……？"
1008505-93 = "最新的地圖上也顯示這裡沒有任何建築……"
1008505-94 = "[s]「是什麼廢棄的資料中心嗎……？」"
1008505-95 = "不，我並沒有看到任何記載這裡有資料中心的紀錄。"
1008505-96 = "而且如果是資料中心的話，這座建築的結構未免也太奇怪了。#n一般來說為了抵消大容量伺服器產生的熱能，資料中心的周圍都會有許多冷卻設施。"
1008505-97 = "更別說這裡連保全措施都沒有……"
1008505-98 = "[s]「我們先進去看看吧。」"
1008505-99 = "……說的也是。#n只要到裡頭去，應該就能知道這座建築物的真面目了。"
1008505-108 = "果然……這座建築裡有太多對資料中心而言不必要的空間了。"
1008505-109 = "而且到處都留有人們曾經來來去去的痕跡……#n我實在無法想像這裡是「奇普托斯儲存最多資料的伺服器」。"
1008505-113 = "咦？這台安裝在牆上的電腦是……？"
1008505-114 = "[s]「是不是連結到伺服器的終端電腦？」"
1008505-115 = "我也不知道……總之先啟動看看吧……"
1008505-122 = "……嗯？"
1008505-127 = "[ns9]「天，天花板動起來了！」\n[ns10]「小心，晴！」"
1008505-130 = "不，這個是……老師，稍等我一下。"
1008505-136 = "唉……我們果然是被騙了……"
1008505-137 = "老師，可以幫我唸一下這上面寫的字嗎？"
1008505-138 = "[s]「『歡迎蒞臨奇普托斯公立第三天文館』……」"
1008505-139 = "嗯，我想這裡應該是一座廢棄已久的天文臺吧。"
1008505-140 = "這麼說來，我小時候好像聽過這座山裡有座電波天文臺，因為望遠鏡老化而關閉……#n指的應該就是這裡吧？"
1008505-141 = "這個與電腦相連的天花板開闔系統，應該也是用於觀察星象的裝置……#n至於那些痕跡，恐怕就是遊客們觀賞星象時所留下的。"
1008505-142 = "真是的……完全被那個匿名駭客騙得團團轉。"
1008505-143 = "[s11]「所以那句『奇普托斯儲存最多資料的伺服器』……」\n[s12]「也是騙人的嗎？」"
1008505-146 = "這個嘛，雖然我不知道對方寄那種信給我的意圖是什麼……"
1008505-147 = "但他信裡寫的內容也不完全是假的。"
1008505-148 = "如果將星星從遙遠宇宙發送過來的輻射能轉換成資料……#n那些資料的總量肯定遠遠超過任何伺服器的容量。"
1008505-149 = "既然這座天文臺能夠欣賞夜空中埋藏的無數資料……#n要稱之為「奇普托斯最大的伺服器」似乎也沒什麼問題。"
1008505-155 = "那個，老師，太陽就快要下山了……"
1008505-156 = "如果你不反對的話，要不要用這裡的望遠鏡看一下星星再走？"
1008505-157 = "就這樣空手而歸的話，總覺得有點遺憾……"
1008505-158 = "[s]「嗯，那我們就看完星星再走吧。」"
1008505-165 = "（於是便和晴一起，走向架設在天花板的巨大望遠鏡……）"
1008505-168 = "― [log=하레 캠핑]天上充滿了光芒……[/log][wa:2920] "
1008505-171 = "― [log=하레 캠핑]如此閃耀的夜空……[/log][wa:610] "
1008505-173 = "― [log=하레 캠핑]我可能是第一次見到。[/log]"
1008505-176 = "― [log=하레 캠핑]如果把那一點一點的亮光，[/log][wa:3230] "
1008505-178 = "― [log=하레 캠핑]都當成蘊含龐大情報的節點……[/log][wa:1740] "
1008505-181 = "― [log=하레 캠핑]好像讓人不禁產生了敬畏感。[/log][wa:3170] "
1008505-184 = "― [log=하레 캠핑]就算把我所知道的所有情報匯集在一起，[/log][wa:2310] "
1008505-186 = "― [log=하레 캠핑]與那些光芒相比，恐怕也無法企及吧……[/log][wa:1460] "
1008505-189 = "― [log=하레 캠핑]……但即便如此，我也不會放棄。[/log][wa:3570] "
1008505-191 = "― [log=하레 캠핑]因為[ruby=Veritas]真理[/ruby]必定會向光而行。[/log][wa:2120] "
1008505-194 = "― [log=하레 캠핑]我想向那位於遙遠夜空中的星星，[/log][wa:3150] "
1008505-196 = "― [log=하레 캠핑]致上充滿敬意的問候。[/log][wa:1190] "
1008505-199 = "― [log=하레 캠핑]你們好，最近過得好嗎？[/log][wa:2210] "
1008505-202 = "（之後和晴一起聆聽關於夜空的故事，直到破曉時分才返回學園）"

1008505-30 = "#wait;10"
1008505-31 = "3;하레;04;응. 발신인도 명확하지 않고, 내용도 모호하게 쓰여 있었지만……\n#3;em;[땀]\n#3;a"
1008505-32 = "3;하레;02;메일의 제목에는 확실하게 <도전장>이라고 쓰여 있었어."
1008505-33 = "[s] \"혹시 누가 그냥 장난으로 보낸 게 아닐까?\""
1008505-34 = "3;하레;01;평소라면 그렇게 생각하고 넘겼겠지만, 이 메일은 서버를 점검하던 중에 갑자기 생겨났거든."
1008505-35 = "3;하레;05;무엇보다 이 도전장에는 서버를 경유한 흔적이 전혀 남아있지 않았어.\n#3;em;[반응]"
1008505-36 = "3;하레;99;그 말인즉…… 이 <익명의 도전장>은 어느 해커가 흔적을 감춘 채 몰래 내 컴퓨터에 접속해 직접 작성했다는 뜻이겠지."
1008505-37 = "3;하레;05;심지어 다른 때도 아니고, 내가 서버를 점검하는 틈을 타 이런 대범한 해킹을 시도하다니…… 새삼 열받네."
1008505-38 = "[s3] \"베리타스의 PC를 실시간으로 해킹하다니……\"\n[s4] \"누군지는 몰라도 엄청난 실력자인가 보네.\""
1008505-39 = "#wait;10"
1008505-40 = "#wait;10"
1008505-41 = "3;하레;99;키보토스에 베리타스의 PC를 해킹할 수 있는 실력자가 그렇게 흔할 거라고는 생각할 수 없지만……\n#3;em;[한숨]"
1008505-42 = "3;하레;05;이렇게 대놓고 한 방 먹었는데, 아무런 반응도 보이지 않고 넘어가는 건 해커로서의 자존심이 용납할 수 없지."
1008505-43 = "[s] \"메일의 내용에는 무어라 쓰여 있었어?\""
1008505-44 = "3;하레;02;음…… 그게 말이야……\n#3;em;…"
1008505-45 = "3;하레;01;메일에는 '키보토스에서 가장 많은 양의 정보가 담긴 서버의 위치'라는 말과 함께 암호화된 좌표 정보 하나가 첨부되어 있었어."
1008505-46 = "3;하레;04;'키보토스에서 가장 많은 양의 정보가 담긴 서버'라니, 누가 봐도 허풍일 게 분명하지만……"
1008505-47 = "3;하레;06;지금으로서는 이 익명의 해커에 대한 정보가 이 좌표뿐이라서.\n#3;em;[속상함]\n#3;stiff"
1008505-48 = "[s] \"그럼 그 좌표로 직접 찾아가 보는 게 좋겠네.\""
1008505-49 = "3;하레;02;그건 그렇지만…… 사실 이 좌표에는 한 가지 큰 문제가 있어.\n#3;em;[반응]"
1008505-50 = "3;하레;99;그건 바로……"
1008505-51 = "#all;hide"
1008505-52 = "3;하레;05;……이 좌표가 가리키는 장소가 산 한가운데라는 점이야.\n#3;closeup"
1008505-53 = "[s5] \"그게 무슨 문제인데?\"\n[s6] \"혹시 엄청나게 높은 산의 정상을 가리키고 있어?\""
1008505-54 = "3;하레;04;……혹시라도 가봤는데 그 장소에 아무것도 없다면 괜히 체력만 낭비하는 셈이잖아.\n#3;stiff"
1008505-55 = "3;하레;02;아니. 도보로 오를 수 있는 평범한 산의 중턱이지만……\n#3;em;…"
1008505-56 = "3;하레;04;……혹시라도 가봤는데 그 장소에 아무것도 없다면 괜히 체력만 낭비하는 셈이잖아.\n#3;stiff"
1008505-57 = "3;하레;06;선생님도 알겠지만, 나 같은 해커에게 등산 같은 야외 활동은 쥐약이나 다름없다고.\n#3;em;[속상함]"
1008505-58 = "3;하레;06;혹시라도 그 해커가 이 점을 악용해서 오르기 힘든 산 중턱의 좌표를 찍어 보낸 거라면, 결국 두 번이나 속게 되는 셈인데……"
1008505-59 = "3;하레;05;혹시 산에 오르지 않고도 그 장소에 뭐가 있는지 알 수 있는 방법은 없을까?\n#3;em;[?]"
1008505-60 = "3;하레;05;배터리를 잔뜩 실은 드론을 쓴다든가, 위성 카메라를 해킹한다든가……"

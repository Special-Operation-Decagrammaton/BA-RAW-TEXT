[translation]
2003703-1 = "Police Story: Lazy River Episode"
2003703-3 = "Oh, Sensei! Are you here to join me on patrol?"
2003703-4 = "I'm glad you're here! If we do it together, we can have twice the fun...I mean, we can be twice as thorough!"
2003703-5 = "Normally, of course, I wouldn't let a civilian join a patrol, but I'll make an exception for you!"
2003703-6 = "[s1] \"But then why do you have an inflatable tube?\"\n[s2] \"So are you working, or...?\""
2003703-9 = "This inflatable tube is an important part of my lifeguard duties."
2003703-10 = "Think about it. My assignment today is to patrol the entire park."
2003703-11 = "To do that, I need a mode of transportation."
2003703-12 = "[s] \"So you're gonna float around in a tube?\""
2003703-13 = "Exactly!"
2003703-14 = "There's a crazy-long lazy river going all around the park."
2003703-15 = "I just need to lie back in the tube and ride the current. No need to tire myself out paddling around."
2003703-16 = "I've always wanted an automatic patrol system, and this is as good as it gets!"
2003703-17 = "[s3] \"...So you're just going to have fun.\"\n[s4] \"Isn't that just playing in the water?\""
2003703-20 = "Annnd what exactly do you mean by that? This is part of my official duty!"
2003703-21 = "It just happens to be a really cool and enjoyable duty."
2003703-22 = "Shall we start our patrol? I just need to put this tube down for a second, and..."
2003703-27 = "Hut! Here we go!"
2003703-33 = "...Huh?"
2003703-36 = "― [log=후부키 수영복]Huh? What the...?[/log][wa:1470] "
2003703-39 = "― [log=후부키 수영복]Eeeek![/log][wa:1210] "
2003703-40 = "― [log=후부키 수영복]...Agh![/log][wa:3710] "
2003703-43 = "― [log=후부키 수영복]Ah, it won't come off...[/log][wa:1870] "
2003703-44 = "― [log=후부키 수영복]Am I going to have to live like this forever...?[/log][wa:2870] "
2003703-47 = "― [log=후부키 수영복]Hey, Sensei?[/log][wa:1810] "
2003703-48 = "― [log=후부키 수영복]Little help?[/log][wa:1060] "
2003703-51 = "― [log=후부키 수영복]I'll stop slacking off and[/log]"
2003703-52 = "― [log=후부키 수영복]work even harder...[/log][wa:2570] "
2003703-55 = "― [log=후부키 수영복]I'll even give you the donuts I've been hiding![/log][wa:940] "
2003703-58 = "― [log=후부키 수영복]Aack![/log]"
2003703-59 = "― [log=후부키 수영복]Grabbing me from the back is ONE way to...[/log][wa:2080] "
2003703-62 = "I was finally able to get Fubuki out of the tube."
2003703-64 = "*pant* *pant*"
2003703-65 = "I wasn't sure I was getting out of there."
2003703-66 = "I'm not doing that again for a while...."
2003703-67 = "[s] \"So you'll patrol on foot, then?\""
2003703-68 = "On foot... That's just a hassle."
2003703-73 = "Maybe I can use a life vest instead of a tube."
2003703-75 = "I patrolled the park with Fubuki, who kept trying to slack off."

[translation]
2003703-1 = "เรื่องราวของตำรวจ - ตอนสระน้ำวน"
2003703-3 = "โอ๊ะ ครู! มาลาดตระเวนด้วยกันเหรอ?"
2003703-4 = "ดีเลยนะ! ถ้าทำด้วยกัน ก็คงสนุก... ไม่สิ คงตั้งใจทำได้เป็น 2 เท่าเลยนะ!"
2003703-5 = "ฉันจะให้ครูเป็นคู่หูลาดตระเวนในวันนี้เป็นพิเศษเลย!"
2003703-6 = "[s1] \"ว่าแต่ทำไมถึงถือห่วงยางอยู่ด้วยล่ะ\"\n[s2] \"ไม่ได้ทำงานอยู่หรอกเหรอ?\""
2003703-9 = "ห่วงยางอันนี้ก็เป็นอุปกรณ์สำคัญของงานไลฟ์การ์ดนะ"
2003703-10 = "ครูลองคิดตามดูนะ งานที่ฉันได้รับมอบหมายมาวันนี้คือการลาดตระเวนทั่วสวนน้ำ"
2003703-11 = "งั้นก็ต้องมีอุปกรณ์ช่วยในการเดินทางสิ"
2003703-12 = "[s] \"แปลว่าจะนั่งห่วงยางทัวร์สวนน้ำสินะ?\""
2003703-13 = "ใช่เลย!"
2003703-14 = "ที่นี่มีสระน้ำวนที่ยาวจนล้อมสวนน้ำไว้ได้หมดเลย"
2003703-15 = "แค่ลงไปอยู่ในห่วงยางแล้วปล่อยตัวไปตามน้ำในสระก็พอแล้วละ ไม่ต้องใช้เท้าตีน้ำให้เมื่อยด้วย"
2003703-16 = "ระบบลาดตระเวนอัตโนมัติที่เคยวาดไว้ในฝันจะเป็นจริงแล้ว!"
2003703-17 = "[s3] \"สุดท้ายก็คิดจะอู้งานสินะ\"\n[s4] \"แบบนี้ก็เท่ากับว่ามาเล่นน้ำหรือเปล่า?\""
2003703-20 = "เดี๋ยวเหอะ เล่นน้งเล่นน้ำอะไรกัน! นี่เป็นส่วนหนึ่งของการทำงานของนักเรียนตำรวจนะ!"
2003703-21 = "ถึงจะเป็นงานที่สดชื่นและสนุกดีก็เถอะ"
2003703-22 = "งั้นไปลาดตระเวนกันเลยดีกว่า ก่อนอื่นเอาห่วงยางไว้บนพื้น..."
2003703-27 = "ฮึบ!"
2003703-33 = "เอ๋...?"
2003703-36 = "― [log=후부키 수영복]เอ๊ะ... เอ๋...?[/log][wa:1550] "
2003703-39 = "― [log=후부키 수영복]ฮึบบบบ![/log][wa:1170] "
2003703-40 = "― [log=후부키 수영복]...อึก[/log][wa:3750] "
2003703-43 = "― [log=후부키 수영복]อะ... ออกไม่ได้อะ...[/log][wa:2030] "
2003703-44 = "― [log=후부키 수영복]ฉันคงไม่ต้องอยู่อย่างนี้ทั้งชีวิตใช่มั้ย...?[/log][wa:3030] "
2003703-47 = "― [log=후부키 수영복]นี่ ครู[/log][wa:2010] "
2003703-48 = "― [log=후부키 수영복]มาช่วยหน่อยสิ![/log][wa:980] "
2003703-51 = "― [log=후부키 수영복]ต่อไปฉันจะอู้งานให้น้อยลง[/log]"
2003703-52 = "― [log=후부키 수영복]แล้วจะตั้งใจทำงานด้วย...[/log][wa:2370] "
2003703-55 = "― [log=후부키 수영복]แล้วก็จะแบ่งโดนัทที่ซ่อนไว้ให้ด้วย![/log][wa:1420] "
2003703-58 = "― [log=후부키 수영복]เฮือก!?[/log]"
2003703-59 = "― [log=후부키 수영복]ยะ... อย่าแตะกันจากข้างหลังสิ เดี๋ยวเหอะ!?[/log][wa:2080] "
2003703-62 = "(แล้วคุณครูก็ช่วยให้ฟุบุกิหลุดออกมาจากห่วงยางได้)"
2003703-64 = "แฮ่ก... แฮ่ก..."
2003703-65 = "นึกว่าจะออกมาไม่ได้จริงๆ แล้วซะอีก"
2003703-66 = "ฉันคงขยาดห่วงยางไปพักหนึ่งเลยละ..."
2003703-67 = "[s] \"งั้นก็คงต้องเดินลาดตระเวนอย่างตั้งใจแล้วสิเนอะ?\""
2003703-68 = "เดินลาดตระเวนงั้นเหรอ... ไม่อยากทำเลย"
2003703-73 = "ขอใส่เสื้อชูชีพแทนห่วงยาง แล้วลอยตัวลาดตระเวนตามแผนเดิมไม่ได้เหรอ?"
2003703-75 = "(หลังจากนั้นคุณครูก็พาฟุบุกิจอมขี้เกียจไปเดินลาดตระเวนสวนน้ำ)"

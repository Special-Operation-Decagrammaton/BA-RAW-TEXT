2003703-2 = "3;후부키 수영복;01\n#3;a\n#wait;1000"
2003703-3 = "3;후부키 수영복;00;오, 선생! 같이 순찰하려고 왔어?\n#3;em;[반응]"
2003703-4 = "3;후부키 수영복;03;잘됐네! 함께 하면 두 배로 즐겁, 아니 철저하게 돌아볼 수 있을 테니까!\n#3;jump"
2003703-5 = "3;후부키 수영복;10;특별히 순찰 활동에 동행할 수 있도록 해 줄게!"
2003703-6 = "[s1] \"그런데 어째서 튜브를 가지고 있는 거야.\"\n[s2] \"일하는 거 아니었어?\""
2003703-7 = "#wait;100"
2003703-8 = "#wait;100"
2003703-9 = "3;후부키 수영복;14;물론 이 튜브도 라이프가드 임무에 필요한 물건이지."
2003703-10 = "3;후부키 수영복;02;생각해 봐. 오늘 파크 본부가 준 임무는 파크 전체를 돌아보며 순찰하는 것."
2003703-11 = "3;후부키 수영복;00;그렇다면 당연히 이동 수단이 있어야 하지 않겠어?"
2003703-12 = "[s] \"그 말인즉슨, 튜브를 타고 돌아다니겠다?\""
2003703-13 = "3;후부키 수영복;10;바로 그거지!\n#3;em;[!]\n#3;jump"
2003703-14 = "3;후부키 수영복;00;이 워터파크, 엄청나게 긴 유수풀이 파크 전체를 휘감고 있단 말이지."
2003703-15 = "3;후부키 수영복;03;저절로 흘러가는 물에 튜브를 띄우고, 몸을 맡기면 그대로 OK. 귀찮게 물장구를 칠 필요조차 없다구."
2003703-16 = "3;후부키 수영복;00;꿈에서나 그리던 자동 순찰 시스템 완성이라는 거야!"
2003703-17 = "[s3] \"……결국 놀 생각이라는 거네.\"\n[s4] \"그거, 그냥 물놀이 아냐?\""

[translation]
2003703-1 = "警察故事─水池篇"
2003703-3 = "哦，老師！你也一起來巡邏了嗎？"
2003703-4 = "太好了！一起巡邏就會更開心……不對，是能監視得更徹底！"
2003703-5 = "我就特別讓你跟我一起巡邏吧！"
2003703-6 = "[s1]「可是你為什麼帶著泳圈？」\n[s2]「你不是在工作嗎？」"
2003703-9 = "怎麼這麼問呢？#n泳圈可是救生員必備的道具之一。"
2003703-10 = "老師你想想看，今天樂園方下達的任務是巡視整個樂園。"
2003703-11 = "既然如此，當然要有交通工具吧？"
2003703-12 = "[s]「你的意思是說，要坐在泳圈上巡視？」"
2003703-13 = "沒錯！"
2003703-14 = "這個水上樂園，被超長的漂流河所環繞。"
2003703-15 = "所以只要坐在泳圈上，隨著水流移動就行了。#n這樣還能省去用腳打水的麻煩。"
2003703-16 = "簡直是夢寐以求的自動巡邏系統啊！"
2003703-17 = "[s3]「……結果只是想玩嘛。」\n[s4]「那不就只是玩水嗎？」"
2003703-20 = "巡邏的事，怎麼能算是玩水呢！這毫無疑問是公務活動的一環！"
2003703-21 = "而且還是非常涼爽歡樂的公務活動。"
2003703-22 = "那就開始巡邏吧。#n先把泳圈放在這裡……"
2003703-27 = "嘿咻！"
2003703-33 = "……咦？"
2003703-36 = "― [log=후부키 수영복]咦，咦咦……？[/log][wa:1870] "
2003703-39 = "― [log=후부키 수영복]呃咕咕咕！[/log][wa:1250] "
2003703-40 = "― [log=후부키 수영복]……唔。[/log][wa:3830] "
2003703-43 = "― [log=후부키 수영복]爬，爬不出來……[/log][wa:2510] "
2003703-44 = "― [log=후부키 수영복]該不會一輩子都得這樣了吧……？[/log][wa:4190] "
2003703-47 = "― [log=후부키 수영복]我說，老師。[/log][wa:2050] "
2003703-48 = "― [log=후부키 수영복]稍微幫幫我吧！[/log][wa:1260] "
2003703-51 = "― [log=후부키 수영복]以後我會減少偷懶的次數，[/log]"
2003703-52 = "― [log=후부키 수영복]工作也會認真做的……[/log][wa:2930] "
2003703-55 = "― [log=후부키 수영복]而且，還會把祕藏的甜甜圈也給你！[/log][wa:2180] "
2003703-58 = "― [log=후부키 수영복]呀啊！？[/log]"
2003703-59 = "― [log=후부키 수영복]被，被從後面摸好像有點……！？[/log][wa:3160] "
2003703-62 = "（幫吹雪從泳圈中脫了身）"
2003703-64 = "哈啊，哈啊……"
2003703-65 = "還以為真的要出不來了。"
2003703-66 = "感覺一段時間內都不敢再坐在泳圈裡了……"
2003703-67 = "[s]「所以該乖乖用走的巡邏了吧？」"
2003703-68 = "用走的巡邏……很麻煩耶。"
2003703-73 = "對了，穿救生背心來代替泳圈就行了吧？"
2003703-75 = "（之後帶著一直想偷懶的吹雪巡視了樂園）"

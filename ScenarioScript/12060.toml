[translation]
12060-1 = "第6話;前往阿拜多斯沙漠（１）"
12060-2 = "到這裡為止雖然能坐火車，不過接下來只能徒步前進了。"
12060-3 = "前方就是阿拜多斯砂漠……在砂漠化現象發生之前就已經是砂漠的地方。"
12060-4 = "因為平常有故障的無人機、警備機器人、自動機在那裡徘徊，所以有點危險……"
12060-5 = "但現在只能強行突破了。#n各位，請再檢查一次武器狀態。"
12060-6 = "凱薩公司到底在阿拜多斯的沙漠中計畫著什麼呢……"
12060-7 = "實際去現場確認吧。"
12060-8 = "不過話說回來……綾音醬。#n透露情報給我們的是格黑娜的風紀委員長……這不是很奇怪嗎？"
12060-9 = "就算是風紀委員長，為什麼其他學園的學生會這麼了解我們自治區的事？"
12060-10 = "唔嗯……雖然只是推測，我聽說格黑娜風紀委員會的情報收集能力相當厲害……"
12060-11 = "也許他們擁有阿拜多斯這種小規模學校無法想像的情報網，之類的……？"
12060-12 = "也許真有那種事呢～"
12060-13 = "作為風紀委員長，應該掌握著風紀委員會所有的情報……#n而且當時對方的行政官好像……"
12060-15 = "更何況我們就在其他學園的自治區附近，確實注意周邊也是理所當然的吧？"
12060-16 = "（……？）"
12060-18 = "行政官說……「就在其他學園的自治區附近」。"
12060-19 = "不是自治區「內」而是「附近」。"
12060-20 = "是，是那樣嗎！？"
12060-21 = "還有……"
12060-23 = "雖然的確做了一些不光彩的事，但還不到違法的地步……#n希望各位能理解我們不得不出此下策的苦衷。"
12060-25 = "「還不到違法的地步」這句話仔細想想……"
12060-26 = "雖然當時以為是在找藉口……也許對方真的沒有非法入侵的意圖也說不定。"
12060-27 = "……或許是這樣沒錯，但當時風紀委員會明顯帶著強烈的侵略意圖。#n那裡是不是阿拜多斯的自治區並不是重點。"
12060-28 = "何況之後那個亞子也做出了明確的敵對行為。"
12060-29 = "這樣就夠了。"
12060-30 = "……是這麼說沒錯。不過……"
12060-33 = "……至少我們可以認為，那個行政官掌握了某些我們不知道的事實。"
12060-34 = "這樣一來，風紀委員長擁有我們未知的情報也就不奇怪了。"
12060-36 = "總之只要去到那裡，親眼確認一下就知道了。"
12060-37 = "咱們繼續前進吧～？"

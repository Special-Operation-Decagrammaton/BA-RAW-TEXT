[translation]
12060-1 = "#title;제6화;아비도스 사막으로 1"
12060-2 = "3;통신아야네;05;여기까진 아직 움직이는 열차를 탈 수 있었지만, 이제부터는 걸어야 해요.\n#3;a"
12060-3 = "3;통신아야네;06;이 부근을 넘으면 거기서부터는 아비도스 사막……. 사막화가 진행되기 전부터 원래 사막이었던 곳입니다.\n#3;em;[반응]"
12060-4 = "3;통신아야네;14;보통은 고장난 드론이나 경비 로봇, 오토마타 등이 배회하고 있기 때문에 위험한 곳이지만……."
12060-5 = "3;통신아야네;05;지금은 어쩔 수가 없겠네요. 다들 자신의 화기를 잘 점검해주세요."
12060-6 = "3;통신아야네;05;아비도스의 사막에서 카이저가 무슨 일을 벌이고 있다…… 라는 정보. \n#3;em;…"
12060-7 = "3;통신아야네;06;그것을 저희가 확인하기 위해선 거기까지 직접 가보는 수 밖엔 없으니까요.\n#3;greeting"
12060-8 = "1;세리카;02;그런데 말이지…… 아야네 쨩. 그 정보를 준 건 게헨나의 선도부장이잖아. 그거 이상하지 않아?\n#1;a\n#1;em;[?]\n#3;m5"
12060-9 = "1;세리카;05;어째서 다른 학원의 학생이 우리 자치구의 일을 그렇게 잘 알고 있는 거야?"
12060-10 = "3;통신아야네;09;응…… 그건……. 아마 게헨나 선도부가 정보 수집에 무척 뛰어나니까, \n#3;em;…"
12060-11 = "3;통신아야네;14;우리같은 소규모 학원은 가지지 못한 정보를 많이 가지고 있던 게 아니었을까……."
12060-12 = "1;호시노;13;흐음. 그런 거려나~\n#1;a"
12060-13 = "3;통신아야네;05;네. 선도부장이라면 당연히 그럴 거고…… 무엇보다 그 선임행정관이 했던 말…….\n#3;greeting\n#3;em;[반응]"
12060-14 = "#all;hide"
12060-15 = "1;이오리;07\n3;통신아코;07;다른 학원의 자치구 근처니까 주의를 기울이는 게 당연하잖아요…….\n#1;a\n#3;a"
12060-16 = "5;통신아야네;02;(응……?)\n#5;a\n#5;em;[?]"
12060-17 = "#all;hide"
12060-18 = "3;통신아야네;05;그때 행정관은 다른 학원의 자치구 근처니까, 라고 말했었어요.\n#3;a"
12060-19 = "3;통신아야네;06;자치구 <안>이 아니라, <근처>……라고.\n#3;em;[반응]"
12060-20 = "3;세리카;04;그, 그랬었어?!\n#3;shake\n#3;em;[?!]"
12060-21 = "3;통신아야네;14;그리고……."
12060-22 = "#all;hide"
12060-23 = "3;통신아코;99;불미스러운 일이 있었지만 아직까지는 불법의 영역은 아니기에…… 지금 상황의 시급성을 이해해 주셨으면 합니다.\n#3;a"
12060-24 = "#all;hide"
12060-25 = "3;통신아야네;14;'아직까지는 불법의 영역은 아니기에……' 라는 말 또한 그런 의미로 보면…….\n#3;em;…\n#3;a"
12060-26 = "3;통신아야네;05;아마 자세한 내막은 몰랐겠지만…… 그쪽은 어쩌면 불법 침입을 저지를 의도까진 없었던 게 아닐지……."
12060-27 = "3;시로코;06;……아니. 처음 쳐들어 온 선도부는 분명히 침입해 온 의도가 다분했어. 거기가 아비도스의 자치구였는지 아닌지는 중요하지 않아.\n#3;a\n#3;em;[반응]"
12060-28 = "3;시로코;05;그리고 그 뒤에 그 아코가 했던 행동은 명백한 적대행위였어."
12060-29 = "3;시로코;06;그것만으로 충분해.\n#3;em;[!]"
12060-30 = "3;통신아야네;09;……네. 그것도 맞아요. 하지만,"
12060-31 = "#all;hide"
12060-32 = "3;통신아코;01\n#3;a\n#wait;1500"
12060-33 = "#na;통신아야네;……최소한 선임 행정관은 우리가 몰랐던 사실을 알고 있었던 거 같아요."
12060-34 = "#na;통신아야네;그렇다는 건 그 게헨나 선도부장도 우리가 모르는 걸 알고 있다고 해서 이상하진 않겠죠……."
12060-35 = "#all;hide"
12060-36 = "3;호시노;13;뭐, 가보면 알겠지. 직접 두 눈으로 확인하면 되는 거니까.\n#3;a"
12060-37 = "3;호시노;00;그럼 계속 가 보자고.\n#3;em;[음표]\n#3;greeting"

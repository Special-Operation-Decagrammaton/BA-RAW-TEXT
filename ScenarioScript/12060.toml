[translation]
12060-1 = "ตอนที่ 6;มุ่งสู่ทะเลทรายอะบิดอส 1"
12060-2 = "เรานั่งรถไฟมาได้ถึงแค่ตรงนี้ค่ะ จากตรงนี้เราต้องเดินเท้าต่อไปเองค่ะ"
12060-3 = "ถ้าผ่านตรงนี้ไปได้ ก็จะได้เจอกับทะเลทรายอะบิดอส... พื้นที่ตรงนั้นเดิมทีแล้วเป็นทะเลทรายก่อนที่จะ#nเกิดเหตุการณ์ทะเลทรายปกคลุม\n"
12060-4 = "เป็นพื้นที่อันตราย เพราะมีทั้งโดรนที่เสียหาย หุ่นยนต์รักษาการณ์ และหุ่นจักรกลอยู่ทั่วบริเวณเลยค่ะ"
12060-5 = "แต่ตอนนี้เราคงไม่มีตัวทางเลือกอื่นแล้ว ทุกคนเตรียมอาวุธให้พร้อมด้วยนะคะ"
12060-6 = "ข้อมูลที่บอกว่าไคเซอร์กำลังวางแผนทำอะไรอยู่ในทะเลทรายของอะบิดอส... \n"
12060-7 = "วันนี้เราจะมาพิสูจน์ด้วยตาตัวเองกันค่ะว่ามันจริงหรือเปล่า\n"
12060-8 = "แต่ว่า... อายาเนะจัง คนที่ให้ข้อมูลนี้คือประธานกรรมการวินัยเกเฮนน่านะ เธอไม่คิดว่ามันแปลกเหรอ?"
12060-9 = "ทำไมนักเรียนจากโรงเรียนอื่นถึงได้รู้ข้อมูลเขตปกครองของเราดีขนาดนี้ล่ะ?"
12060-10 = "อืม... เรื่องนั้นมัน... อาจเป็นเพราะคณะกรรมการวินัยเกเฮนน่าหาข้อมูลมาได้อย่างรวดเร็ว \n"
12060-11 = "ทางนั้นอาจจะมีข้อมูลโรงเรียนเล็กๆ แบบโรงเรียนเราอยู่มากก็ได้ค่ะ"
12060-12 = "อืม อาจจะเป็นแบบนั้นก็ได้~ \n"
12060-13 = "ค่ะ ยิ่งถ้าเป็นประธานกรรมการก็คงรู้อยู่แล้ว อีกอย่างจำที่เจ้าหน้าที่อาวุโสคนนั้นพูดได้ไหมคะ?"
12060-15 = "เวลามาแถวๆ เขตปกครองตนเองของโรงเรียนอื่นแบบนี้ คุณยิ่งต้องระมัดระวังไม่ใช่เหรอคะ?"
12060-16 = "(หืม......?)\n\n"
12060-18 = "ตอนนั้นผู้บริหารคนนั้นพูดไว้ว่า แถวๆ เขตปกครองตนเองของโรงเรียนอื่น\n"
12060-19 = "ไม่ได้บอกว่า <ใน> แต่เป็น <แถวๆ > เขตปกครองตนเองของโรงเรียนอื่น\n"
12060-20 = "ปะ.. เป็นอย่างนั้นเหรอ?!"
12060-21 = "อีกอย่าง..."
12060-23 = "ถึงจะทำให้เกิดเรื่องที่ไม่น่าพอใจขึ้น แต่ก็ยังไม่ถึงขั้นที่ทำผิดกฎหมายอะไร ขอให้เข้าใจถึงความเร่งด่วน#nของสถานการณ์ของฝ่ายเราด้วยนะคะ"
12060-25 = "\"แต่ก็ยังไม่ถึงขั้นที่ทำผิดกฎหมายอะไร\" ที่เธอพูดไว้อาจหมายถึง..."
12060-26 = "ถึงเธออาจจะยังไม่รู้รายละเอียด... แต่บางทีเธออาจไม่ได้ตั้งใจที่จะฝ่าฝืนเข้ามาอย่างผิดกฎก็ได้ค่ะ"
12060-27 = "ไม่หรอก ฉันว่าคณะกรรมการวินัยที่เข้ามาตั้งใจที่จะบุกเข้ามาโจมตีพวกเราจริงๆ มันไม่สำคัญหรอกว่า#nตรงนั้นคือพื้นที่เขตปกครองตนเองของอะบิดอสรึเปล่า"
12060-28 = "และหลังจากนั้น สิ่งที่อาโกะทำถือเป็นการกระทำที่แสดงตัวว่าเป็นศัตรูกันอย่างชัดเจนเลยด้วย"
12060-29 = "แค่นี้ก็เพียงพอแล้วละ"
12060-30 = "ค่ะ มันก็ถูกต้องอยู่หรอก แต่ว่า..."
12060-33 = "...ฉันว่าอย่างน้อยผู้บริหารระดับสูงคงต้องรู้ความจริงบางอย่างที่เราไม่รู้"
12060-34 = "และถ้าเป็นแบบนั้น ก็ไม่แปลกที่ประธานกรรมการเกเฮนน่าเองก็จะรู้บางอย่างที่พวกเราไม่รู้อยู่ค่ะ..."
12060-36 = "ก็นะ ไปถึงแล้วเดี๋ยวก็รู้เองแหละ ไปดูให้เห็นกับตาตัวเองดีกว่า"
12060-37 = "งั้นก็ไปกันต่อเถอะ\n\n"

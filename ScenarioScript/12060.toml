[translation]
12060-1 = "Episode 6;Into the Abydos Desert Part 1"
12060-2 = "You've been able to ride the train this far, but you'll have to walk from here."
12060-3 = "Beyond this point lies the Abydos Desert... a land that has always been barren, even before the sands spread."
12060-4 = "There are usually broken drones, security robots, and automata prowling around, so it's a pretty dangerous place..."
12060-5 = "We're out of options. Everyone, please get your weapons ready."
12060-6 = "The intel we received about Kaiser doing something in the Abydos Desert..."
12060-7 = "If we want to confirm whether it's true or not, we have no choice but to go out there ourselves."
12060-8 = "By the way, Ayane. Isn't it weird that the Gehenna head prefect is the one who gave us that info?"
12060-9 = "How does a student from another academy know so much about what's going on in our district? "
12060-10 = "That's probably because the Gehenna Prefect Team is very good at collecting info. "
12060-11 = "So they'd naturally know a lot more than a small academy like us..."
12060-12 = "Hmm... Is that so?"
12060-13 = "Yes. The Head Prefect, especially. Remember what the senior administrator said?"
12060-15 = "Since it's near another academy's district, keeping an eye on it is a given..."
12060-16 = "(Huh...?)"
12060-18 = "Back then...the administrator said it was near another academy's district."
12060-19 = "Not inside the district, but near it..."
12060-20 = "R-Really?!"
12060-21 = "And..."
12060-23 = "There have been some unfortunate incidents, but nothing illegal...yet. I hope you understand the urgency of the situation."
12060-25 = "\"Nothing illegal...\" That could mean..."
12060-26 = "They might not have known the full details... Maybe they didn't intend to trespass after all..."
12060-27 = "I disagree. The Prefect Team attacked first with clear intentions to invade. It doesn't matter if it was in the Abydos district or not."
12060-28 = "And what Ako did after that was a clearly hostile act."
12060-29 = "That alone is enough."
12060-30 = "Yes, you could be right, but..."
12060-33 = "...At the very least, the senior administrator seemed to know something we didn't."
12060-34 = "So, if the Gehenna Head Prefect has information that we don't have, there's nothing weird about that..."
12060-36 = "Well, we'll know for sure once we see it with our own eyes."
12060-37 = "Let's keep going."

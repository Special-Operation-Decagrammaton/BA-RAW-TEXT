10017010-34 = "3;정의실현부 부원;04;어디를 가는 중이었냐고요? 음…… 그건……\n#3;em;[...]"
10017010-35 = "3;정의실현부 부원;01;뭐, 구호기사단 분들에 선생님까지 계시니 말씀드려도 괜찮겠지요."
10017010-36 = "3;정의실현부 부원;03;오늘 저녁에, 정의실현부 전원이 송년회를 열기로 했거든요!\n#3;em;[반짝]"
10017010-37 = "3;정의실현부 부원;02;아…… 엄밀히 말해 전원은 아니긴 하겠네요. 코하루 씨는 보충수업부 멤버들과 함께 지내고 있는 것 같고."
10017010-38 = "3;정의실현부 부원;01;이치카 선배는 지난주부터 백귀야행 학원의 연말 행사에 교류차 파견을 가신 중이니까요."
10017010-39 = "3;세리나 산타ND;04;저런…… 송년회에 참석하지 못하셔서 아쉬우시겠어요……\n#3;stiff"
10017010-40 = "3;정의실현부 부원;03;하지만 백귀야행 학원의 연말 행사도 화려하다고 들었거든요. 분명 나름 즐거운 시간을 보내고 계실 거예요.\n#3;jump"
10017010-41 = "3;정의실현부 부원;03;어쨌든, 근처의 카페 <화이트&메이슨>을 빌려서 간만에 모두가 휴식할 수 있는 자리를 만드신다고 하셨어요."
10017010-42 = "1;하나에 산타ND;04;<화이트&메이슨>이요? 예약하기 정말 어렵다고 들었는데…… 대단하네요!\n#1;ar\n#1;em;[?!]\n#3;m5"

[translation]
10017010-1 = "Episode 1; The Secret Garden"
10017010-7 = "Jingle bells, jingle bells! Jingle all the way!"
10017010-9 = "Hanae is already so excited."
10017010-13 = "But that aside, isn't that heavy, Sensei?"
10017010-14 = "[s1] \"It's not too bad.\"\n[s2] \"It's all from you and Hanae. I must carry it!\""
10017010-17 = "Hahaha. I'll make it up to you."
10017010-25 = "I have to hurry before it's too late!"
10017010-27 = "Oh? Is that a Justice Task Force member? Where is she off to in such a rush?"
10017010-28 = "Hello! Merry Christmas!"
10017010-29 = "Oh, the Remedial Knights. I always appreciate your work. Merry Christmas."
10017010-30 = "Oh, and Sensei?! P-Pardon me!"
10017010-31 = "[s3] \"You don't have to be so tense around me.\"\n[s4] \"You seem busy. Where are you headed?\""
10017010-34 = "Where am I headed? Um, that's..."
10017010-35 = "Well, if it's the Remedial Knights and Sensei, it should be okay to say."
10017010-36 = "This evening, the Justice Task Force is throwing a year-end party for all its members!"
10017010-37 = "Oh, but not everyone will be there. Koharu is staying with the Make-Up Work Club."
10017010-38 = "And as of last week, Ichika has been dispatched to Hyakkiyako Academy to join their year-end event to foster cooperation."
10017010-39 = "Oh, I see. What a shame she can't attend the year-end party here."
10017010-40 = "Fortunately, I hear that Hyakkiyako Academy's year-end event is pretty big, so I'm sure she's enjoying herself."
10017010-41 = "Anyway, they said that they reserved a nearby cafe called White & Mason."
10017010-42 = "White & Mason? I hear it's really hard to get even normal reservations there! Renting it all out is so awesome!"
10017010-44 = "The Justice Task Force members could use the rest..."
10017010-45 = "Not at all. What we do is nothing compared to the Remedial Knights."
10017010-46 = "Anyway, we still have to prepare some things for the year-end party."
10017010-47 = "Oh, you must be on your way to do that. I'm sorry, I'll let you go."
10017010-48 = "Thank you. If you have time, feel free to swing by the cafe."
10017010-49 = "The president and vice president would love to see you."
10017010-51 = "Thanks! I hope we can make it!"
10017010-56 = "[ns] \"The Justice Task Force is actually taking a break?\""
10017010-57 = "It's great! They always work so hard!"
10017010-58 = "I agree. Isn't Christmas wonderful?"
10017010-59 = "[s] \"You two work pretty hard yourselves.\""
10017010-60 = "You think so? I'm just doing my job."
10017010-61 = "Plus, helping people is so fun!"
10017010-62 = "We're doing all these good deeds..."
10017010-63 = "So we'll definitely get gifts from Santa Claus this year, right?"
10017010-64 = "Hahaha. Yes, definitely, I'm sure of it."
10017010-69 = "(I almost forgot Hanae still believes in Santa... I need to think of a good gift for her.)"
10017010-70 = "(Maybe I'll ask Sensei about it later...)"

10017010-46 = "5;정의실현부 부원;06;그리고 송년회를 위해 여러 가지 준비를 해 둬야 하기도 하고요.\n#5;em;[속상함]\n#5;stiff"
10017010-47 = "3;세리나 산타ND;02;아, 지금 그 준비를 하러 가시는 길이었군요. 죄송해요. 어서 가 보세요.\n#3;em;[반응]"

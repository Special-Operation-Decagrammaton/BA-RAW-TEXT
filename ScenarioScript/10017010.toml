[translation]
10017010-1 = "第1話;祕密花園"
10017010-7 = "叮叮噹～叮叮噹～"
10017010-9 = "花繪醬看起來非常開心呢。"
10017010-13 = "話說回來，老師……那個，不重嗎？"
10017010-14 = "[s1]「完全沒問題，交給我吧。」\n[s2]「難得收到了花繪和芹奈做的禮物！」"
10017010-17 = "啊，啊哈哈……稍後我再幫老師拿吧。"
10017010-25 = "糟糕，得趕快才行……！"
10017010-27 = "哎呀，是實現正義部……#n這麼著急，是發生了什麼事嗎？"
10017010-28 = "你好！聖誕快樂！"
10017010-29 = "啊，是救護騎士團。#n一直以來承蒙關照了，聖誕快樂。"
10017010-30 = "哎呀，那位是……老師！？這，這真是失禮了！！？"
10017010-31 = "[s3]「不，沒有什麼地方特別失禮啦……」\n[s4]「你看起來很忙呢，怎麼了嗎？」"
10017010-34 = "那，那個，是因為……"
10017010-35 = "如果是救護騎士團和老師的話，說出來應該也沒關係吧。"
10017010-36 = "其實今晚，實現正義部全員要舉辦聖誕晚會！"
10017010-37 = "啊，嚴格來說不是所有人……#n小春好像和補課部的大家有約。"
10017010-38 = "一花前輩也因公外出，從上個禮拜就被派去參加百鬼夜行學園的年末活動……"
10017010-39 = "哎呀……#n那樣的話還真是遺憾呢……"
10017010-40 = "是啊……但聽說百鬼夜行的年末活動也很豪華。#n希望他在那邊可以過得很愉快。"
10017010-41 = "總之，我們租了附近的咖啡廳「White&Mason」，#n讓大家至少在「這個時期」有可以放鬆休息的場所。"
10017010-42 = "「White&Mason」……！是那間很難預約到的店……真厲害！"
10017010-44 = "實現正義部的大家總是很辛苦呢……我覺得這是個好主意。"
10017010-45 = "別這麼說，要論辛苦哪比得上救護騎士團的各位。"
10017010-46 = "而且，為了舉辦聖誕晚會，也必須做各種準備……"
10017010-47 = "啊，所以現在是要去做準備啊。#n很抱歉把你攔下來。"
10017010-48 = "不會不會。#n如果大家之後有時間的話，歡迎順道來看看。"
10017010-49 = "部長和副部長一定也都很歡迎的。"
10017010-51 = "非常感謝，時間合適的話一定去！"
10017010-56 = "[ns]「實現正義部的聖誕晚會啊……」"
10017010-57 = "大家總是很辛苦呢，真是太好了！"
10017010-58 = "是啊，畢竟是難得的聖誕節。"
10017010-59 = "[s]「要說辛苦，我覺得芹奈和花繪也是唷？」"
10017010-60 = "唔嗯，是這樣嗎？"
10017010-61 = "我只是做我該做的事而已……#n況且「救護」對我來說，也是一件很開心的事！"
10017010-62 = "話雖如此，確實是很努力呢……"
10017010-63 = "今年我一定能收到聖誕老人送的禮物吧？"
10017010-64 = "呵呵……是啊，一定會的。"
10017010-69 = "（這麼說來，花繪的禮物該怎麼辦才好呢……）"
10017010-70 = "（……晚點和老師商量商量吧）"

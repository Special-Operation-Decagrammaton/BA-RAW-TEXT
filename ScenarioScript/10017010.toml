[translation]
10017010-1 = "ตอนที่ 1;สวนดอกไม้ลับ"
10017010-7 = "จิงเกิลเบลส์~ จิงเกิลเบลส์~"
10017010-9 = "ฮานาเอะจังดูจะสนุกกว่าใครแล้วนะคะเนี่ย"
10017010-13 = "ว่าแต่... ไม่หนักเหรอคะคุณครู?"
10017010-14 = "[s1] \"ยังไม่เหนื่อยขนาดนั้นหรอก\"\n[s2] \"นี่เป็นของขวัญที่ฮานาเอะกับเซรินะทำทั้งที เบาสบายสุดๆ ไปเลย!\""
10017010-17 = "อะฮ่ะฮ่า... ไว้คราวหน้าฉันจะทำให้คุณครูบ้างนะคะ"
10017010-25 = "เราต้องรีบไปกันแล้ว เดี๋ยวไม่ทันการ...!"
10017010-27 = "อ๊ะ ชมรมทวงความยุติธรรมนี่คะ? แต่จะรีบร้อนไปไหนกันในเวลานี้เหรอคะ...?"
10017010-28 = "สวัสดีค่ะ! เมอร์รีคริสต์มาสค่ะ!"
10017010-29 = "อ้อ ชมรมอัศวินบรรเทาทุกข์สินะคะ ขอบคุณที่ช่วยในหลายๆ เรื่องมาตลอดนะคะ เมอร์รีคริสต์มาสค่ะ"
10017010-30 = "อ๊ะ นั่นคุณครูเหรอคะ?!  ขะ... ขอโทษที่เสียมารยาทค่ะ!"
10017010-31 = "[s3] \"ทำตัวตามสบายกับครูได้เลย ว่าแต่จะไปไหนเหรอ...\"\n[s4] \"ดูยุ่งกันมากเลยนะ กำลังไปไหนกันเหรอ?\""
10017010-34 = "อยากรู้ว่าพวกเรากำลังไปไหนงั้นเหรอคะ? อืม... คือว่า..."
10017010-35 = "แต่ไหนๆ ก็เป็นชมรมอัศวินบรรเทาทุกข์กับคุณครู งั้นก็น่าจะบอกได้นะคะ"
10017010-36 = "เย็นนี้สมาชิกชมรมทวงความยุติธรรมทุกคนจะจัดงานเลี้ยงส่งท้ายปีกันค่ะ!"
10017010-37 = "เอ่อ... ในทางเทคนิคแล้วอาจจะไม่ครบทุกคนค่ะ คุณโคฮารุน่าจะไปอยู่กับสมาชิกชมรมชั้นเรียนเสริม"
10017010-38 = "ส่วนรุ่นพี่อิจิกะก็ไปงานฉลองสิ้นปีของสหพันธ์เฮียกคิยาโคตั้งแต่สัปดาห์ที่แล้วค่ะ"
10017010-39 = "แบบนั้น... น่าเสียดายแย่เลยค่ะที่ไม่ได้เข้าร่วมงานเลี้ยงส่งท้ายปีของชมรม..."
10017010-40 = "แต่ฉันก็ได้ยินมาว่างานฉลองสิ้นปีของสหพันธ์เฮียกคิยาโคก็อลังการไม่แพ้กันค่ะ ถึงจะไม่ได้อยู่กับเรา แต่รุ่นพี่อิจิกะก็ต้องสนุกกับที่นั่นแน่ๆ ค่ะ"
10017010-41 = "ส่วนของพวกเรา ได้ยินมาว่ามีการเช่าเหมาร้านคาเฟ่ <ไวท์&เมสัน> แถวนี้ไว้ให้ทุกคนได้ผ่อนคลาย#nกันด้วยค่ะ"
10017010-42 = "<ไวท์&เมสัน> เหรอคะ? นั่นเป็นร้านที่จองยากมากๆ เลยนี่คะ... สุดยอดไปเลยค่ะ!"
10017010-44 = "ก็ชมรมทวงความยุติธรรมปฏิบัติหน้าที่เหนื่อยกันมากเลยนี่คะ..."
10017010-45 = "ไม่หรอกค่ะ ฝ่ายที่งานหนักน่าจะเป็นชมรมอัศวินบรรเทาทุกข์มากกว่าค่ะ"
10017010-46 = "พวกฉันต้องไปเตรียมนู่นนี่เพื่องานเลี้ยงส่งท้ายปีของวันนี้ค่ะ"
10017010-47 = "อ๊ะ กำลังเดินทางไปเตรียมงานนี่เอง ขอโทษนะคะ รีบไปเตรียมงานเถอะค่ะ"
10017010-48 = "ขอบคุณค่ะ เอาไว้ถ้ามีเวลาก็แวะมาที่คาเฟ่นะคะ"
10017010-49 = "ทั้งท่านหัวหน้าและรองหัวหน้าต้องยินดีต้อนรับแน่ๆ ค่ะ"
10017010-51 = "ขอบคุณที่ชวนนะคะ! หวังว่าจะได้เจอกันค่ะ!"
10017010-56 = "[ns] \"ชมรมทวงความยุติธรรมพักงานงั้นเหรอ...\""
10017010-57 = "ดีจังเลยนะคะรุ่นพี่! ถ้าทำงานหนักก็สมควรได้รับการพักผ่อนบ้างว่าไหมคะ?"
10017010-58 = "นั่นสิคะ คริสต์มาสเป็นโอกาสที่ดีจังเลยนะคะ"
10017010-59 = "[s] \"แต่เซรินะกับฮานาเอะก็ทำงานหนักด้วยเหมือนกันไม่ใช่เหรอ?\""
10017010-60 = "งั้นเหรอคะ? ฉันแค่รู้สึกว่าตัวเองทำสิ่งที่ต้องทำก็แค่นั้นน่ะค่ะ"
10017010-61 = "การ 'ช่วยเหลือและบรรเทาทุกข์' ให้กับทุกคนเหมือนที่ทำอยู่ในตอนนี้ทำให้ฉันมีความสุขมากค่ะ"
10017010-62 = "รุ่นพี่คะ เราเป็นเด็กดีกันขนาดนี้..."
10017010-63 = "ปีนี้ซานตาคลอสต้องมาให้ของขวัญใช่ไหมคะ?"
10017010-64 = "แหะๆๆ... ค่ะ ต้องมาแน่ๆ ค่ะ"
10017010-69 = "(ฮานาเอะจังยังเชื่อในซานต้าอยู่... งั้นเราจะให้อะไรเป็นของขวัญฮานาเอะจังดีนะ...) "
10017010-70 = "(ไว้ไปปรึกษากับคุณครูดีไหมคะ...?)"

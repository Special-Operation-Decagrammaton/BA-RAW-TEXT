[translation]
10032035-3 = "……這樣幾乎都巡視過了。#n接下來就剩下名單上的這些人了。"
10032035-4 = "比想像中還多呢！有種一直在戰鬥的感覺？"
10032035-5 = "阿蘭奇諾這個人到底有多少敵人啊……"
10032035-6 = "……畢竟是幫派的頭目，沒有敵人反而才奇怪。"
10032035-7 = "不過就算是這樣……回收的炸藥數量也實在有點嚇人。"
10032035-8 = "那個數量要把整個歌劇院炸毀都還綽綽有餘。"
10032035-9 = "我，我已經先把炸藥回收到後巷的垃圾桶裡了……"
10032035-10 = "接下來就只剩……"
10032035-16 = "……沒錯，只剩下這間房間了。"
10032035-17 = "[s1]「是演員準備室……」\n[s2]「他們應該在準備表演，沒關係嗎？」"
10032035-20 = "哼嗯～老師會擔心嗎？怕進去會妨礙到他們？"
10032035-21 = "這樣一群人跑進去確實可能妨礙到他們。#n畢竟現在應該是他們正忙的時候。"
10032035-22 = "不過……如果裡面藏有特工的話，戰鬥遲早會爆發。#n我認為現在擔心的意義並不大。"
10032035-23 = "……你打算怎麼做，社長？要直接上嗎？"
10032035-25 = "不，沒必要做到那種程度。"
10032035-26 = "先由我跟佳世子進去自然地搜查內部吧。"
10032035-27 = "如果是身著禮服的我們，應該可以假裝是相關人士。#n至於老師……因為會吸引目光的關係，可能就有點困難了。"
10032035-28 = "無月和遙香先在這裡待命，並且保護老師吧。我們去去就回。"
10032035-30 = "OK～有什麼事就馬上告訴我們吧～"
10032035-31 = "是，是！！我們會在這裡等著！賭上性命保護老師！！"
10032035-33 = "那麼老師，麻煩你在這裡稍等一會囉。"
10032035-34 = "……嗯？你問我要不要緊？"
10032035-35 = "呵呵。再怎麼說，我也不認為自己連這種時候都需要別人擔心哦。"
10032035-36 = "放心吧，我馬上就回來。"
10032035-37 = "走吧，佳世子課長。"
10032035-44 = "……我們去去就回，老師。"
10032035-45 = "要是有什麼事就用剛剛我給你的……知道吧？"
10032035-46 = "[s3]「別擔心。」\n[s4]「佳世子也是，要是發生什麼事就馬上聯絡我們。」"
10032035-49 = "……呵呵。"
10032035-50 = "……我會的。"
10032035-61 = "[ns5]「亞瑠，佳世子。」\n[ns6]「情況如何？還順利嗎？」"
10032035-64 = "嗯，跟預想中一樣，沒有發現看起來特別可疑的人，也沒有炸彈之類的東西。"
10032035-65 = "雖然沒有將演員們的長相一一進行對照……"
10032035-66 = "因為大家都忙著準備表演，而且也有很多警衛。#n畢竟是在這種場所……"
10032035-67 = "不過也因為這樣，如果特工不是演員本人的話，應該很難躲藏才對。"
10032035-68 = "我也有大致對照過名單，他們都是有登錄在清單上的人。"
10032035-70 = "哼嗯～所以劇院搜查就結束了嗎？"
10032035-71 = "那接下來……"
10032035-78 = "啊……等等。"
10032035-84 = "呵呵。來的正是時候。"
10032035-85 = "……各位，做好準備。"
10032035-97 = "……頭目很快就會抵達。"

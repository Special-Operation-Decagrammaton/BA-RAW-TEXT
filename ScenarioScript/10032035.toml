[translation]
10032035-3 = "...That's pretty much a wrap. We took out everyone not on the guest list."
10032035-4 = "It was like a circus in here! How many people did we beat up?"
10032035-5 = "This Arancino person has so many enemies..."
10032035-6 = "Gang bosses tend to have a lot of those, you know."
10032035-7 = "But I gotta admit... We collected a crazy pile of bombs."
10032035-8 = "We could blow up half of Kivotos with all this firepower!"
10032035-9 = "I-I threw everything in a dumpster in the back alley for now..."
10032035-10 = "The last thing on our list..."
10032035-16 = "Right here. This is the last room."
10032035-17 = "[s1] \"Are we allowed to go into the green room...?\"\n[s2] \"Aren't the performers getting ready for the show right now?\""
10032035-20 = "Sensei is just so considerate! You're worrying about their feelings and stuff, huh?"
10032035-21 = "They're not wrong though. If all five of us burst through the door right before showtime, we're not gonna get a warm welcome."
10032035-22 = "Eh... I mean, if there are any operatives inside, it'll mean a fight. It's kind of a moot point either way."
10032035-23 = "What do you want to do, Boss? Full steam ahead?"
10032035-25 = "We don't need to draw unnecessary attention to ourselves."
10032035-26 = "Kayoko and I will go. It'll be easier to slip under the radar that way."
10032035-27 = "Seeing as we're dressed for the occasion, no one will raise an eye at two beautiful students wandering around. Sensei, on the other hand..."
10032035-28 = "Mutsuki and Haruka will be on Sensei protection duty until we get back."
10032035-30 = "Just give us a buzz if you need us!"
10032035-31 = "Yes, absolutely! We'll protect Sensei with our heart and soul! No one will so much as breathe on them!"
10032035-33 = "Perfect. If you don't mind waiting, Sensei..."
10032035-34 = "...Huh? Me? "
10032035-35 = "Heehee. While appreciated, a true outlaw doesn't need your concern."
10032035-36 = "I'll be back before you know it."
10032035-37 = "It's showtime, Kayoko."
10032035-44 = "...Be back, Sensei."
10032035-45 = "If anything happens, you've got the communicator, right?"
10032035-46 = "[s3] \"I have it right here.\"\n[s4] \"Same goes for you, okay?\""
10032035-49 = "...Heehee."
10032035-50 = "...Okay."
10032035-61 = "[ns5] \"Welcome back, Aru! Kayoko!\"\n[ns6] \"You made it back! How'd it go?\""
10032035-64 = "More or less what we expected. No bombs, no suspects."
10032035-65 = "Well, we didn't exactly confirm every single actor's identity."
10032035-66 = "There were too many guards and too much chaos. We couldn't exactly go around interrogating the performers."
10032035-67 = "It'd be nigh impossible for any operative to infiltrate the green room, unless they were a performer themselves."
10032035-68 = "But we cross-checked their list with ours, and it all adds up."
10032035-70 = "Goodie! That means our Opera House sweep is complete!"
10032035-71 = "Next up we have—"
10032035-78 = "Actually, wait."
10032035-84 = "Hah. It seems we timed things perfectly."
10032035-85 = "Prepare yourselves, Problem Solver 68."
10032035-97 = "Our target is arriving."

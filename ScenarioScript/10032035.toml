[translation]
10032035-3 = "เราดูกันเกือบจะครบแล้วละ... ที่เหลือก็เป็นพวกคนที่มีรายชื่ออยู่ในลิสต์"
10032035-4 = "มีเยอะกว่าที่คิดอีกนะเนี่ย! รู้สึกเหมือนจะมีแต่การต่อสู้เลยนะวันนี้"
10032035-5 = "คนที่ชื่ออารันซิโนมีศัตรูเยอะแค่ไหนกันคะเนี่ย..."
10032035-6 = "อืม... ก็เขาเป็นบอสของกลุ่มอันธพาลนี่เนอะ ถ้ามีศัตรูน้อยก็คงจะแปลก"
10032035-7 = "แต่ถึงจะอย่างนั้นก็เถอะ... ดูจากปริมาณของดินระเบิดที่เรายึดมาได้แล้วมันก็น่าตกใจอยู่นะ"
10032035-8 = "ถ้าเยอะขนาดนี้ ต่อให้ระเบิดทั้งโรงละครโอเปร่าจนเป็นผุยผงก็ยังเหลืออยู่เลยละ"
10032035-9 = "ฉะ... ฉันเก็บระเบิดทั้งหมดแล้วเอาไปทิ้งไว้ในถังขยะในซอยด้านหลังแล้วค่ะ..."
10032035-10 = "ถ้างั้นตอนนี้ก็เหลือแค่..."
10032035-16 = "เหลือแค่ห้องนี้ห้องสุดท้าย"
10032035-17 = "[s1] \"ที่นี่มัน... ห้องพักนักแสดง\"\n[s2] \"น่าจะกำลังเตรียมการแสดงกันอยู่นะ จะไม่เป็นไรเหรอ?\""
10032035-20 = "หืม~ กังวลด้วยเหรอ? หรือว่ากลัวว่าเข้าไปแล้วจะไปรบกวนเข้าน่ะ?"
10032035-21 = "เราแห่กันเข้าไปแบบนี้ก็ต้องเป็นการรบกวนอยู่แล้ว ตอนนี้น่าจะกำลังยุ่งกันอยู่เลยด้วย"
10032035-22 = "แต่ก็นะ... ถ้าในนั้นมีสายลับซ่อนอยู่ก็คงเกิดการต่อสู้อยู่ดี ต่อให้กังวลไปก็ไม่มีความหมายหรอก"
10032035-23 = "เอายังไงดีล่ะประธาน? บุกเข้าไปโต้งๆ เลยมั้ย?"
10032035-25 = "ไม่ ไม่จำเป็นต้องทำขนาดนั้น"
10032035-26 = "ให้ฉันกับคาโยโกะเข้าไปแล้วทำเป็นตรวจดูเนียนๆ ก็พอ"
10032035-27 = "เพราะยังไงพวกเราก็ใส่ชุดเดรสมา คนในนั้นอาจจะมองว่าเราเป็นคนที่เกี่ยวข้องก็ได้ แต่คุณครูนี่สิ... น่าจะตกเป็นเป้าสายตาเลยละ"
10032035-28 = "งั้นมุสึกิกับฮารุกะรออยู่ตรงนี้แล้วช่วยคุ้มกันคุณครูไว้ทีนะ แล้วฉันจะรีบกลับมา"
10032035-30 = "โอเค~ ถ้ามีอะไรให้ช่วยก็บอกเลยนะ~"
10032035-31 = "ค่ะ... ค่ะ!! ฉันจะรออยู่ตรงนี้ และปกป้องคุณครูอย่างสุดชีวิตเลยค่ะ!!"
10032035-33 = "เอาตามนี้นะคุณครู รออยู่ตรงนี้ก่อนล่ะ"
10032035-34 = "หืม...? ฉันจะเป็นอะไรมั้ยอย่างงั้นเหรอ? "
10032035-35 = "ฮุฮุ ฉันคิดว่าตัวเองเป็นคนที่ไม่น่าทำให้คนอื่นกังวลในเรื่องแบบนี้นะ"
10032035-36 = "ไม่ต้องห่วงหรอก เดี๋ยวฉันก็กลับมาแล้ว"
10032035-37 = "ไปกันเถอะ หัวหน้าฝ่ายคาโยโกะ"
10032035-44 = "เดี๋ยวฉันมานะครู..."
10032035-45 = "ถ้าเกิดเหตุอะไรละก็ อย่าลืมอันที่ฉันให้ไว้... รู้ใช่มั้ย?"
10032035-46 = "[s3] \"ไม่ต้องกังวลไปนะ\"\n[s4] \"แต่ถ้าเกิดเรื่องอะไร คาโยโกะก็ต้องรีบบอกนะ\""
10032035-49 = "ฮุฮุ..."
10032035-50 = "ได้เลย..."
10032035-61 = "[ns5] \"อารุ คาโยโกะ\"\n[ns6] \"กลับมาแล้วเหรอ? ไม่เจอปัญหาอะไรใช่มั้ย?\""
10032035-64 = "อื้ม ไม่มีปัญหาอะไรตามที่คาดไว้ ไม่มีใครที่ดูน่าสงสัยเป็นพิเศษ แล้วก็ไม่มีระเบิดด้วย"
10032035-65 = "ถึงเราจะไม่ได้เทียบหน้าตานักแสดงดูรายคนก็เถอะ..."
10032035-66 = "ทุกคนยุ่งกับการเตรียมตัวก่อนเปิดแสดง แล้วบอดี้การ์ดในนั้นก็มีเยอะแยะเลย ก็ช่วยไม่ได้นี่เนอะ ห้องนักแสดงคงเป็นอย่างนั้นอยู่แล้ว..."
10032035-67 = "ฉันว่าก็น่าจะไว้ใจได้อยู่นะ ถ้าตัวนักแสดงไม่ใช่สายลับเสียเองน่ะ"
10032035-68 = "แต่แน่นอนว่าเราตรวจสอบคนที่อยู่ในลิสต์หมดแล้ว ทั้งหมดเป็นคนที่มีชื่ออยู่ในลิสต์ที่เรามี"
10032035-70 = "ฮึ่ม~ งั้นก็ถือว่าเราสืบหาในโรงละครโอเปร่าเสร็จหมดแล้วใช่มั้ย?"
10032035-71 = "สิ่งที่ต้องทำต่อไปก็..."
10032035-78 = "อ๊ะ... เดี๋ยวนะ"
10032035-84 = "ฮุฮุ ถือว่าได้จังหวะเหมาะเหม็งเลยนะเนี่ย"
10032035-85 = "ทุกคน... เตรียมตัวให้ดี"
10032035-97 = "บอสใกล้จะมาถึงแล้ว..."

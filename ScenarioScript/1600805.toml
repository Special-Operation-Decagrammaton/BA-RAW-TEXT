1600805-68 = "3;후부키;01;으음…… 결국 범인은 안 나타났네.\n#3;a\n#3;em;…"
1600805-69 = "[s] \"도넛을 먹느라 놓친 거 아냐?\""
1600805-70 = "3;후부키;05;그럴 리가 없어! 눈은 도넛을 향하고 있어도 내 예리한 육감은 줄곧 주위를 향하고 있었는걸.\n#3;hophop"
1600805-71 = "3;후부키;00;하는 수 없지. 범인을 잡기 위해 다시 잠복근무를 지원하는 수밖에……."
1600805-72 = "3;후부키;10;대신 다음번 잠복근무 때는 설탕을 듬뿍 묻힌 글레이즈드 도넛을 먹자!\n#3;em;[반짝]\n#3;hophop"

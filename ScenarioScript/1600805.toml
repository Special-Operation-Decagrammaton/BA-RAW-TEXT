[translation]
1600805-1 = "怠惰警官的潛伏"
1600805-2 = "黑市．武器交易所前"
1600805-5 = "老師，你好慢！"
1600805-6 = "萬一犯人這時候跑掉了怎麼辦啊？"
1600805-7 = "埋伏的每分每秒都很重要！"
1600805-8 = "[s] 「吹雪竟然這麼積極……！」"
1600805-9 = "有什麼問題嗎？再怎麼說我也是女武神警察學園的學生，#n會有想抓住犯人的心情也是當然的。"
1600805-10 = "不知道犯人什麼時候會出現，可不能說好懶好累之類的話！"
1600805-11 = "[s] 「好像平常一直都在說……？」"
1600805-12 = "那是因為，呃……"
1600805-13 = "總，總而言之！先別在意那種小事了，現在重要的是逮捕犯人對吧。"
1600805-14 = "[s] 「這麼說來，知道犯人的特徵之類的嗎？」"
1600805-15 = "特徵？"
1600805-16 = "呃……"
1600805-17 = "大概是……奇怪的西裝，之類的？"
1600805-18 = "[s1] 「『大概』！？」\n[s2] 「那還挺不少的……？」"
1600805-19 = "別擔心別擔心，畢竟對方也可能變裝嘛。#n埋伏的時候重要的不是對方的外表，而是要有不讓對方逃跑的耐力才行。"
1600805-20 = "別擔心別擔心，畢竟對方也可能變裝嘛。#n埋伏的時候重要的不是對方的外表，而是要有不讓對方逃跑的耐力才行。"
1600805-21 = "所以說，為了維持耐力，某些東西是必要的。"
1600805-22 = "我這就去拿，老師在這等等我吧。"
1600805-29 = "老師，讓你久等了。"
1600805-30 = "[s] 「不會。話說你手上拿著的盒子是……？」"
1600805-31 = "看就知道了吧，這是「MasterDonut」的套裝禮盒哦。"
1600805-32 = "因為今天老師也在，所以特別準備了兩盒！"
1600805-33 = "要長時間進行埋伏的話，就必須要有糖分跟咖啡因嘛。#n所以說在進行埋伏任務的時候也會核准這些經費的。"
1600805-34 = "而且這種時候也是可以容許關掉手機的電源的……對悠閒享受甜甜圈來說，可以說是最棒的狀況呢！"
1600805-35 = "[s] 「這才是你的目的啊……」"
1600805-36 = "來吧老師，再過來一點。"
1600805-37 = "不然就沒有地方可以放甜甜圈了。"
1600805-38 = "呵呵。那麼，我們就開始埋伏吧？"
1600805-41 = "― 啊啊……簡直是天堂……[wa:3010] "
1600805-44 = "― 坐在暖呼呼的引擎蓋上享用甜甜圈和咖啡……[wa:4430] "
1600805-46 = "― 哎呀，埋伏勤務萬歲！[wa:2060] "
1600805-49 = "[ns]「這麼隨意沒問題嗎……？」"
1600805-50 = "— 啊，老師。要好好警戒四周才行哦。[wa:3920] "
1600805-52 = "― 在我們說話的時候，犯人也有可能會經過的。[wa:3580] "
1600805-55 = "— （啊姆。嚼嚼嚼嚼……）[wa:2600] "
1600805-58 = "― 果然，搭配咖啡一起吃的話，[wa:3420] "
1600805-60 = "— 還是[ruby=Old-Fashioned]歐菲香[/ruby]最棒了……呵呵。[wa:2760] "
1600805-63 = "― 嗯？怎麼了，老師？[wa:1560] "
1600805-65 = "― ……要吃甜甜圈嗎？[wa:1740] "
1600805-68 = "唉呀，結果犯人沒有出現呢。"
1600805-69 = "[s] 「感覺就算出現了也沒有注意到……」"
1600805-70 = "別擔心，不會有那種事的！#n就算視線都集中在甜甜圈上，我敏銳的第六感也一直都在注意四周。"
1600805-71 = "今天沒有發現也沒辦法。為了抓住犯人，明天也得來埋伏才行。"
1600805-72 = "下次就買灑滿砂糖的[ruby=Glazed Doughnut]糖霜甜甜圈[/ruby]吧！"
1600805-73 = "[s] 「這果然才是你的目的吧……？」"

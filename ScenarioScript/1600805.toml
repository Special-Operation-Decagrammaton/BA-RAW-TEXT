1600805-29 = "3;후부키;03;오래 기다렸지, 선생?\n#3;em;[음표]"
1600805-30 = "[s] \"손에 든 건 무슨 박스야?\""
1600805-31 = "3;후부키;02;응? 보면 몰라? <마스터 도너츠>의 박스 세트야."
1600805-32 = "3;후부키;03;오늘은 선생도 함께니까 특별히 두 박스나 구입했어!\n#3;hophop\n#3;em;[반짝]"
1600805-33 = "3;후부키;00;오랫동안 범인을 관찰하고 있으려면 당분이랑 카페인이 쉽게 떨어지니까. 잠복근무 중에는 간식비가 무제한으로 제공되거든."
1600805-34 = "3;후부키;10;게다가 작전 중이라는 핑계로 전화기를 꺼두어도 괜찮으니…… 느긋하게 도넛을 즐기기엔 이만큼 좋은 환경도 없지!\n#3;em;[재잘]"
1600805-35 = "[s] \"처음부터 목적은 그거였구나…….\""
1600805-36 = "3;후부키;03;선생, 옆으로 비켜 봐.\n#3;em;[반응]"
1600805-37 = "3;후부키;00;보닛 위에 도넛을 놓을 자리를 마련해야 하니까."
1600805-38 = "3;후부키;10;후후, 그럼 본격적인 잠복근무를 시작해볼까?\n#3;em;[반짝]\n#3;hophop\n#3;closeup"

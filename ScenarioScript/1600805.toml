[translation]
1600805-1 = "A Lazy Cop's Undercover Duties"
1600805-2 = "Outside Black Market Weapons Shop"
1600805-5 = "You're late, Sensei!"
1600805-6 = "What if I had lost the suspect's trail? We can't afford to be lazy today!"
1600805-7 = "We can't afford to lose a minute or even a second while on stakeout!"
1600805-8 = "[s] \"You're strangely motivated for once.\""
1600805-9 = "There's nothing strange about it. I'm a Valkyrie Police School cadet.#nOf course I'm motivated to bust bad guys."
1600805-10 = "A good cop always has a nose for crime!"
1600805-11 = "[s] \"Who are you, and what have you done with Fubuki?\""
1600805-12 = "H-Hey, come on..."
1600805-13 = "A-Anyway, never mind that. We're here to arrest a criminal,#nand that's all that matters."
1600805-14 = "[s] \"What does the suspect look like?\""
1600805-15 = "Their appearance?"
1600805-16 = "Uh... Um..."
1600805-17 = "They're probably wearing...a suspicious-looking suit? Maybe."
1600805-18 = "[s1] \"'Maybe'?!\"\n[s2] \"That's pretty vague.\""
1600805-19 = "It's fine. Patience is the key to undercover work. We'll learn more by observing than we would by simply looking out for what the suspect is supposed to look like."
1600805-20 = "It's fine. Patience is the key to undercover work. We'll learn more by observing than we would by simply looking out for what the suspect is supposed to look like."
1600805-21 = "But we'll be needing something if we're going to keep our endurance up for the entire stakeout."
1600805-22 = "Wait here. I'll get us what we need."
1600805-29 = "I'm back. Thanks for waiting, Sensei."
1600805-30 = "[s] \"What's that box in your hands?\""
1600805-31 = "Isn't it obvious? Master Donuts."
1600805-32 = "I got two boxes since you're with me!"
1600805-33 = "We need all the sugar and caffeine we can get when on a stakeout.#nThat's why I have an unlimited snack budget for undercover work."
1600805-34 = "And to top it off, this mission is an excuse for me to turn off my phone and not receive any new orders! There's no better way to enjoy my donuts in peace."
1600805-35 = "[s] \"So THAT'S why you were so excited.\""
1600805-36 = "Scooch over a little, Sensei."
1600805-37 = "I have to make room for the donuts on the hood."
1600805-38 = "All right. Time to get to work!"
1600805-41 = "― Ah... This is heaven...[wa:2530] "
1600805-44 = "― Sitting on the warm hood of a car with some donuts and coffee...[wa:2670] "
1600805-46 = "― Nothing beats a good stakeout![wa:1260] "
1600805-49 = "[ns] \"You have to do more on a stakeout than eat donuts.\""
1600805-50 = "― Ah, Sensei. You have to be careful.[wa:3200] "
1600805-52 = "― Don't let your guard down. The suspect could be anywhere.[wa:2100] "
1600805-55 = "― (Nom. Mmm mmm.)[wa:2480] "
1600805-58 = "― What goes better with iced coffee[wa:2620] "
1600805-60 = "― than a good old-fashioned donut? Heehee.[wa:1720] "
1600805-63 = "― Hmm?  What is it, Sensei?[wa:920] "
1600805-65 = "― Do you  want a donut?[wa:1260] "
1600805-68 = "After all that, the suspect didn't even show up."
1600805-69 = "[s] \"What if we missed them while eating donuts?\""
1600805-70 = "No way! My eyes may have been on those donuts...and my mouth and hands too—but my sixth sense was focused on our surroundings!"
1600805-71 = "Oh, well. I guess I'll just have to volunteer for more undercover duty if I want to catch the suspect..."
1600805-72 = "Maybe I'll get glazed donuts next time! That should do the trick!"
1600805-73 = "[s] \"Does the type of donut actually matter?!\""

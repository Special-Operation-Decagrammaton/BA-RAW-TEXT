[translation]
1600805-1 = "ภารกิจดักซุ่มของตำรวจจอมขี้เกียจ"
1600805-2 = "ด้านหน้าตลาดมืดที่ซื้อขายอาวุธ"
1600805-5 = "มาช้านะ คุณครู!"
1600805-6 = "ถ้ามัวแต่อืดอาดแล้วคนร้ายหนีไปได้จะทำยังไง?"
1600805-7 = "เวลาทุกนาที ทุกวินาทีในที่เกิดเหตุหมายถึงชีวิตเลยนะ!"
1600805-8 = "[s] “จู่ๆ ฟุบุกิก็ดูกระตือรือร้นแบบนี้ แปลกจังเลยนะ”"
1600805-9 = "ไม่เห็นจะมีอะไรแปลกตรงไหน นักเรียนของสถาบันฝึกตำรวจวัลคิรี่ก็ต้องกระตือรือร้นที่จะจับผู้ร้าย#nเป็นเรื่องปกติอยู่แล้ว"
1600805-10 = "ถ้าเป็นสถานที่ที่มีคนร้ายโผล่มาละก็ มันเป็นหน้าที่ของตำรวจที่ดีที่จะต้องเตรียมตัว#nรับมือให้พร้อมเสมอ!"
1600805-11 = "[s] “ฟุบุกิตัวจริงหรือเปล่าเนี่ย”"
1600805-12 = "เอ่อ คือว่าเรื่องนั้น..."
1600805-13 = "เอาละๆ ไม่ต้องใส่ใจเรื่องเล็กน้อยหรอก สิ่งสำคัญที่สุดก็คือการจับกุมคนร้าย"
1600805-14 = "[s] “แล้วคนร้ายแต่งตัวแบบไหนล่ะ?”"
1600805-15 = "ลักษณะของคนร้ายน่ะเหรอ?"
1600805-16 = "เอ่อ... คือว่าเรื่องนั้น..."
1600805-17 = "ก็น่าจะ...ใส่ชุดสูทที่ดูน่าสงสัยละมั้ง..."
1600805-18 = "[s1] “น่าจะเหรอ?!”\n[s2] \"แล้วแบบนี้จะจับคนร้ายได้ยังไง?”"
1600805-19 = "ไม่เป็นไรหรอก ในการเฝ้าระวังน่ะ สิ่งที่สำคัญกว่ารูปร่างลักษณะก็คือความอดทน#nในการนั่งเฝ้ารอจับตาดูคนร้ายต่างหาก"
1600805-20 = "ไม่เป็นไรหรอก ในการเฝ้าระวังน่ะ สิ่งที่สำคัญกว่ารูปร่างลักษณะก็คือความอดทน#nในการนั่งเฝ้ารอจับตาดูคนร้ายต่างหาก"
1600805-21 = "และก็มีของที่ต้องเตรียมเอาไว้เพื่อรักษาความอดทนนั้นด้วยนะ"
1600805-22 = "คุณครูรออยู่ตรงนี้นะ ฉันจะไปเอาของที่เตรียมไว้แถวๆ นี้แหละ"
1600805-29 = "รอนานหรือเปล่า คุณครู?"
1600805-30 = "[s] “นั่นกล่องอะไรน่ะ?”"
1600805-31 = "หืม? ดูไม่ออกเหรอ? บ็อกเซ็ตของ <มาสเตอร์โดนัท> ไง"
1600805-32 = "วันนี้ซื้อมาสองกล่องเพราะว่าคุณครูมาด้วยไงล่ะ!"
1600805-33 = "ถ้าคอยจับตาดูคนร้ายนานๆ น้ำตาลกับคาเฟอีนในร่างกายจะลดลงได้ง่าย อีกอย่างค่าอาหาร#nระหว่างที่กำลังทำหน้าที่เฝ้าระวังอยู่ก็มีให้ใช้ได้ไม่จำกัดด้วย"
1600805-34 = "นอกจากนั้นก็ยังใช้เป็นข้ออ้างในการปิดโทรศัพท์โดยบอกว่ากำลังปฏิบัติหน้าที่อยู่ก็ได้...#nไม่มีตอนไหนที่เราจะเพลิดเพลินไปกับการกินโดนัทได้อย่างสบายใจเท่านี้อีกแล้ว!"
1600805-35 = "[s] “มีเป้าหมายแบบนี้ตั้งแต่แรกแล้วสินะ...”"
1600805-36 = "คุณครู ขยับไปข้างๆ หน่อย"
1600805-37 = "ต้องเหลือที่บนฝากระโปรงรถเอาไว้สำหรับวางโดนัทด้วยน่ะ"
1600805-38 = "ฮิฮิ ถ้างั้นเรามาเริ่มปฏิบัติการเฝ้าระวังเพื่อจับกุมคนร้ายกันเลยมั้ย?"
1600805-41 = "― เฮ้อ~ เหมือนอยู่บนสวรรค์เลยน้า สวรรค์~[wa:1930] "
1600805-44 = "― ได้นั่งบนฝากระโปรงรถ รับแดดอุ่นๆ แล้วก็ดื่มด่ำกับกาแฟและโดนัท...[wa:2670] "
1600805-46 = "― อา...  งานเฝ้าจับตาดูคนร้ายนี่ดีสุดๆ เลย![wa:820] "
1600805-49 = "[ns] “แบบนี้มันใช่งานเฝ้าระวังเหรอ...”"
1600805-50 = "― อ๊ะ คุณครู ต้องคอยดูรอบๆ ให้ดีนะ[wa:3320] "
1600805-52 = "― พวกคนร้ายอาจโผล่มาตอนที่กินโดนัทอยู่ก็ได้[wa:2740] "
1600805-55 = "― (ง่ำ ง่ำ ง่ำๆ...)[wa:2400] "
1600805-58 = "― คิดแล้วเชียวว่าโดนัทที่เหมาะกับการกินกับกาแฟ[wa:2180] "
1600805-60 = "― โดนัทโอลด์ แฟชั่นนี่เข้ากันที่สุดแล้ว ฮิฮิ[wa:1640] "
1600805-63 = "― หืม? มีอะไรเหรอคุณครู[wa:1080] "
1600805-65 = " ― จะกินโดนัทสักชิ้นไหมล่ะ?[wa:1100] "
1600805-68 = "สุดท้ายคนร้ายก็ไม่โผล่ออกมาเลย"
1600805-69 = "[s] “มัวแต่กินโดนัทจนมองไม่เห็นหรือเปล่า?”"
1600805-70 = "เป็นไปไม่ได้หรอก! ถึงสายตาจะจับจ้องไปที่โดนัท แต่ประสาทสัมผัสที่หกอันเฉียบแหลมของฉัน#nก็คอยสังเกตเหตุการณ์รอบข้างตลอดนะ"
1600805-71 = "ช่วยไม่ได้... คงต้องออกมาเฝ้าระวังคนร้ายอีกครั้งแล้วล่ะ..."
1600805-72 = "แต่ว่ารอบหน้าเปลี่ยนเป็นโดนัทเคลือบน้ำตาลกันเถอะ!"
1600805-73 = "[s] “ผิดจุดประสงค์ไปหน่อยรึเปล่า?!”"

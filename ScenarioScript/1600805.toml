1600805-1 = "#title;게으른 경찰의 잠복근무"
1600805-2 = "#place;블랙마켓, 무기거래소 앞"
1600805-3 = "5;후부키;99\n#5;em;…\n#5;a\n#wait;2500"
1600805-4 = "5;후부키;01\n#5;em;[반응]\n#wait;1500"
1600805-5 = "5;후부키;05;늦었잖아, 선생!\n#5;m3\n#5;hophop"
1600805-6 = "5;후부키;02;게으름 부리다가 범인을 놓치면 어쩌려고 그러는 거야?"
1600805-7 = "5;후부키;05;잠복 현장에서의 1분 1초는 목숨과도 같다고!\n#5;jump\n#5;em;[!]"
1600805-8 = "[s] \"후부키가 갑자기 의욕을 내다니, 이상하네.\""
1600805-9 = "5;후부키;02;이상할 게 뭐 있어? 발키리 경찰학교의 학생이 범인 체포에 의욕을 내는 건 당연한 일이잖아.\n#5;em;[?]"
1600805-10 = "5;후부키;05;범인이 나타나는 장소라면 언제 어디라도 대기하는 것이 올바른 경찰의 자세지!\n#5;hophop"
1600805-11 = "[s] \"평소에 하던 말이랑 다르잖아.\""
1600805-12 = "5;후부키;04;어, 그건 그러니까…….\n#5;em;…"
1600805-13 = "5;후부키;03;자, 자. 사소한 건 신경 쓰지 말자고. 중요한 건 범인을 체포하는 일이니까."
1600805-14 = "[s] \"범인은 어떤 옷을 입고 있어?\""
1600805-15 = "5;후부키;09;범인의 인상착의?\n#5;em;[?!]\n#5;shake"
1600805-16 = "5;후부키;04;어, 그게 그러니까……"
1600805-17 = "5;후부키;03;……적당히 수상한 양복을 입고 있지 않을까? ……아마도.\n#5;stiff\n#5;em;[땀]"
1600805-18 = "[s1] \"아마도?!\"\n[s2] \"그걸로 범인을 잡을 수 있겠어?\""
1600805-19 = "5;후부키;10;괜찮아, 괜찮아. 잠복근무에서 중요한 건 범인의 인상착의보다 진득하게 한자리에 앉아 기다릴 수 있는 지구력이거든.\n#5;hophop\n#5;em;[재잘]"
1600805-20 = "5;후부키;10;괜찮아, 괜찮아. 잠복근무에서 중요한 건 범인의 인상착의보다 진득하게 한자리에 앉아 기다릴 수 있는 지구력이거든.\n#5;hophop\n#5;em;[재잘]"
1600805-21 = "5;후부키;00;그 지구력을 유지하기 위해서는 꼭 필요한 준비물이 있어."
1600805-22 = "5;후부키;03;선생은 여기서 기다리고 있어. 내가 곧 근처에서 준비물을 가지고 올게.\n#5;em;[음표]"

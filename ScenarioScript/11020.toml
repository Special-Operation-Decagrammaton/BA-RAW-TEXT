[translation]
11020-2 = "第2話;アビドスでの初日"
11020-3 = "アビドス・住宅街"
11020-4 = "（チュン、チュンチュン）"
11020-5 = "……ん？"
11020-6 = "（キキーッ）"
11020-7 = "……。"
11020-8 = "……あの……。"
11020-19 = "……。"
11020-20 = "……大丈夫？"
11020-21 = "[s1] 頷く。\n[s2] 助けを求める。"
11020-22 = "あ、生きてた。道のど真ん中に倒れてるから、死んでるのかと。"
11020-23 = "……え？お腹が減って倒れてた？"
11020-24 = "……ホームレス？"
11020-25 = "強盗に遭ったとか？もしくは事故……？"
11020-26 = "……え？お腹が減って倒れてた？"
11020-27 = "ホームレスじゃないってこと？"
11020-28 = "えっと……。"
11020-30 = "アビドス・住宅街"
11020-31 = "（スッ）"
11020-32 = "用事があって数日前この街に来たけど、お店が一軒もなくて脱水と空腹で力尽きた、と。"
11020-33 = "ただの遭難者だったんだね。"
11020-34 = "ああ。ここは元々そういう所だから。食べ物がある店なんか、とっくに無くなってるよ。"
11020-35 = "こっちじゃなくて、もっと郊外の方に行けば市街地があるけど。"
11020-36 = "土地勘がない？#n……なるほど、この辺は初めてなんだね。"
11020-37 = "……ちょっと待って。"
11020-39 = "（ゴソゴソ）"
11020-42 = "はい、これ。エナジードリンク。"
11020-43 = "ライディング用なんだけど……今はそれぐらいしか持ってなくて。でも、お腹の足しにはなると思う。"
11020-45 = "えっと、コップは……。"
11020-46 = "[s] そのまま口をつけて飲む。"
11020-47 = "（ゴクッゴクッ）"
11020-48 = "……！"
11020-49 = "あ……それ……。"
11020-50 = "……ううん、何でもない。……気にしないで。"
11020-51 = "[s] 助けてもらったお礼を伝える。"
11020-52 = "うん。"
11020-53 = "見た感じ、連邦生徒会から来た大人の人みたいだけど……お疲れ様。#n学校に用があって来たの？"
11020-54 = "この近くだと、うちの学校しかないけど……もしかして……。"
11020-55 = "「アビドス」に行くの？"
11020-56 = "[s] 頷く。"
11020-57 = "……そっか。久しぶりのお客様だ。"
11020-58 = "それじゃあ、私が案内してあげる。すぐそこだから。"
11020-59 = "え？お腹が減って動けない？"
11020-60 = "うーん……どうしよう。"
11020-61 = "[s] 乗せてほしいと言う。"
11020-62 = "えっと、これ一人乗りだから……。"
11020-63 = "[s] それなら背負ってほしいと言う。"
11020-64 = "……。"
11020-65 = "まあ、そのほうがいいか。"
11020-66 = "ロードバイクはここに停めて、と……。"
11020-68 = "それじゃ……。"
11020-71 = "（スッ）"
11020-72 = "……あ、待って。"
11020-73 = "……。"
11020-74 = "えっと……さっきまでロードバイクに乗ってたから……そこまで汗だくってわけじゃないけど、その……。"
11020-75 = "普段は学校のシャワー室を使うの。予備の服もそこにあるし……。"
11020-76 = "え？気にしないでって？"
11020-77 = "……むしろいい匂いがするって？"
11020-78 = "……。"
11020-79 = "……うーん。ちょ、ちょっとよくわからないけど……#n気にならないなら、まあいいか。"
11020-80 = "それじゃ……。"
11020-82 = "（スッ）"
11020-83 = "しっかり掴まってて。"
11020-85 = "対策委員会・教室"
11020-87 = "ただいま。"
11020-88 = "おかえり、シロコせんぱ……い？"
11020-89 = "うわっ！？何っ！？そのおんぶしてるの誰！？"
11020-90 = "わあ、シロコちゃんが大人を拉致してきました！"
11020-91 = "拉致！？もしかして死体！？#nシロコ先輩がついに犯罪に手を……！！"
11020-92 = "みんな落ち着いて、速やかに死体を隠す場所を探すわよ！#n体育倉庫にシャベルとツルハシがあるから、それを……。"
11020-93 = "……。"
11020-94 = "（トサッ）"
11020-95 = "いや……普通に生きてる大人だから。うちの学校に用があるんだって。"
11020-96 = "えっ？死体じゃ、なかったんですか……？"
11020-97 = "拉致したんじゃなくて、お客さん？"
11020-98 = "そうみたい……。"
11020-99 = "[s] 元気に挨拶する。"
11020-100 = "わぁ、びっくりしました。お客様がいらっしゃるなんて、#nとっても久しぶりですね。"
11020-101 = "そ、それもそうですね……でも来客の予定ってありましたっけ……。"
11020-103 = "[ns] \"「シャーレ」の顧問先生です、よろしくね。\""
11020-105 = "……え、ええっ！？まさか！？"
11020-106 = "連邦捜査部「シャーレ」の先生！？"
11020-107 = "わあ☆支援要請が受理されたのですね！良かったですね、アヤネちゃん！"
11020-108 = "はい！これで……弾薬や補給品の援助が受けられます。"
11020-109 = "あ、早くホシノ先輩にも知らせてあげないと……#nあれ？ホシノ先輩は？"
11020-110 = "委員長は隣の部屋で寝てるよ。私、起こしてくる。"
11020-112 = "（ダダダダダダダダッ！）"
11020-113 = "じゅ、銃声！？"
11020-114 = "！！"
11020-117 = "ひゃーっはははは！"
11020-118 = "攻撃、攻撃だ！！奴らはすでに弾薬の補給を絶たれている！襲撃せよ！！学校を占領するのだ！！"
11020-120 = "（タタタタタタタタタッ！！）"
11020-123 = "わわっ！？武装集団が学校に接近しています！カタカタヘルメット団のようです！"
11020-124 = "あいつら……！！性懲りもなく！"
11020-126 = "ホシノ先輩を連れてきたよ！先輩！寝ぼけてないで、起きて！"
11020-127 = "むにゃ……まだ起きる時間じゃないよー。"
11020-128 = "ホシノ先輩！ヘルメット団が再び襲撃を！こちらの方はシャーレの先生です。"
11020-129 = "ありゃ～そりゃ大変だね……あ、先生？よろしくー、むにゃ。"
11020-130 = "先輩、しっかりして！出動だよ！装備持って！学校を守らないと！"
11020-131 = "ふぁあー……むにゃ。おちおち昼寝もできないじゃないかー、ヘルメット団めー。"
11020-134 = "すぐに出るよ。先生のおかげで、弾薬と補給品は十分。"
11020-135 = "はーい、みんなで出撃です☆"
11020-138 = "私がオペレーターを担当します。"
11020-139 = "先生はこちらでサポートをお願いします！"

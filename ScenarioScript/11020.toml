[translation]
11020-2 = "第2話;在阿拜多斯的第一天"
11020-3 = "阿拜多斯．住宅區"
11020-4 = "（啾，啾啾）"
11020-5 = "……嗯？"
11020-6 = "（嘰嘰──）"
11020-7 = "……"
11020-8 = "……那個……"
11020-19 = "……"
11020-20 = "……你還好嗎？"
11020-21 = "[s1] 點頭\n[s2] 求助"
11020-22 = "啊，還活著。#n因為你倒在路中央，我還以為已經死掉了。"
11020-23 = "……咦？肚子太餓所以昏倒了？"
11020-24 = "……遊民？"
11020-25 = "遇到強盜了嗎？#n還是碰到什麼意外……！？"
11020-26 = "……咦？肚子太餓所以昏倒了？"
11020-27 = "所以你不是遊民？"
11020-28 = "那個……"
11020-30 = "阿拜多斯．住宅區"
11020-31 = "（咻）"
11020-32 = "因為有事要處理所以來到這個城鎮，#n但幾天來連一家店都沒看到，因為脫水跟飢餓導致虛脫了，是嗎。"
11020-33 = "原來只是單純的遇難者。"
11020-34 = "啊啊。這裡本來就是這種地方。#n早就已經沒有賣食物的店家了。"
11020-35 = "朝另一個方向，往更郊外的地方走倒是有個街區。"
11020-36 = "還是抓不到方向感？#n……原來如此，你是第一次來這附近啊。"
11020-37 = "……稍等一下。"
11020-39 = "（東翻西找）"
11020-42 = "來，給你。能量飲料。 "
11020-43 = "雖然是騎行用的……但我現在手邊只有這個。#n應該多少能填飽肚子。"
11020-45 = "我看看，杯子在……"
11020-46 = "[s] 直接對嘴喝"
11020-47 = "（咕嘟咕嘟）"
11020-48 = "……！"
11020-49 = "啊……那個……"
11020-50 = "……不，沒什麼……別在意。"
11020-51 = "[s] 表達謝意"
11020-52 = "嗯。"
11020-53 = "看樣子似乎是從聯邦學生會來的大人……辛苦你了。#n你是來找學校的？"
11020-54 = "這附近就只有我們學校……難道……"
11020-55 = "你是來找「阿拜多斯」的嗎？"
11020-56 = "[s] 點頭"
11020-57 = "……這樣啊。#n原來是久違的客人。"
11020-58 = "那我來幫你帶路吧，就在這附近。"
11020-59 = "咦？肚子餓到無法動彈？"
11020-60 = "唔嗯……怎麼辦呢。"
11020-61 = "[s] 請對方載自己一程"
11020-62 = "那個……這是單人座……"
11020-63 = "[s] 換請對方揹自己"
11020-64 = "……"
11020-65 = "好吧，也只能這樣了。"
11020-66 = "把公路自行車停放在這邊……"
11020-68 = "那就……"
11020-71 = "（咻）"
11020-72 = "……啊，等等。"
11020-73 = "…… "
11020-74 = "那個……剛剛是騎公路自行車過來的……#n雖然沒有流很多汗，但是……"
11020-75 = "我平常都會使用校內的淋浴間。換洗衣物也在那邊……"
11020-76 = "咦？你不在意？"
11020-77 = "……你說反而有好聞的味道？"
11020-78 = "……"
11020-79 = "……唔嗯。不，不太明白你的意思……#n不在意的話倒也無所謂。"
11020-80 = "那好……"
11020-82 = "（咻）"
11020-83 = "要抓緊喔。"
11020-85 = "對策委員會．教室"
11020-87 = "我回來了。"
11020-88 = "歡迎回來，白子前……輩？"
11020-89 = "嗚哇！？怎麼回事！？你背上那是誰！？"
11020-90 = "哇～白子醬綁架了大人回來！ "
11020-91 = "綁架！？難道是屍體！？ #n白子前輩終究還是犯罪了……！！"
11020-92 = "大家冷靜，趕快找藏屍地點吧！#n體育倉庫裡有鏟子和鐵鎬，用那些來……"
11020-93 = "…… "
11020-94 = "（砰咚）"
11020-95 = "不是……只是個正常活著的大人而已。#n說是有事要來我們學校。"
11020-96 = "咦？那不是屍體嗎……？"
11020-97 = "不是綁架，而是學校的客人？"
11020-98 = "似乎是……"
11020-99 = "[s] 有精神地打招呼"
11020-100 = "哇，嚇我一跳。很久沒有客人來拜訪我們學校了。"
11020-101 = "就，就是說啊……但是有來客的預約嗎……"
11020-103 = "[ns] 「我是『夏萊』的老師。請多指教。」"
11020-105 = "……咦，咦咦！？難道說！？"
11020-106 = "5;茜香;06;聯邦搜查部「夏萊」的老師！？"
11020-107 = "哇～☆我們提出的支援請求被受理了呢！#n太好了，綾音醬！"
11020-108 = "是！這樣一來……就能獲得彈藥和補給品的支援了。"
11020-109 = "啊，得趕快讓星野前輩也知道才行…… #n咦？星野前輩去哪裡了？"
11020-110 = "委員長在隔壁房間睡覺哦。#n我去叫醒他。"
11020-112 = "（噠噠噠噠噠噠噠噠！）"
11020-113 = "槍，槍聲！？"
11020-114 = "！！"
11020-117 = "呀──哈哈哈哈！"
11020-118 = "攻擊，發動攻擊！！#n那些傢伙已經沒有彈藥和補給了！襲擊他們吧！！佔領學校！！"
11020-120 = "（噠噠噠噠噠噠噠噠噠！！）"
11020-123 = "哇哇！？武裝集團正在接近學校！#n似乎是硬梆梆頭盔團！"
11020-124 = "那些傢伙……！！真是學不乖！"
11020-126 = "我把星野前輩帶來了！前輩！別睡了，快醒醒！"
11020-127 = "呣喵……還沒到起床時間啦～"
11020-128 = "星野前輩！頭盔團又對我們發動襲擊了！然後這位是夏萊的老師。"
11020-129 = "啊呀～那還真糟糕呢……啊，老師？#n請多指教～呣喵。"
11020-130 = "前輩，振作一點！要出動囉！帶好裝備！得守護學校才行！"
11020-131 = "呼啊啊～……呣喵。#n害我都沒辦法好好睡覺了，頭盔團那些傢伙──"
11020-134 = "立刻出擊。多虧了老師，彈藥與補給品都很夠。"
11020-135 = "好～所有人一起出擊☆"
11020-138 = "我來擔任報務員。"
11020-139 = "老師請留在這裡支援我們！"

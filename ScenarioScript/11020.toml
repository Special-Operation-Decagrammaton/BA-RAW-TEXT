[translation]
11020-2 = "ตอนที่ 2;วันแรกในอะบิดอส"
11020-3 = "เขตที่อยู่อาศัยในอะบิดอส"
11020-4 = "(จิ๊บ จิ๊บ)"
11020-5 = "หืม?"
11020-6 = "(วิ้งงงงงง)"
11020-7 = "..."
11020-8 = "อืม..."
11020-19 = "......"
11020-20 = "เป็นอะไรรึเปล่า?"
11020-21 = "[s1] พยักหน้า\n[s2] ขอให้ช่วย"
11020-22 = "อืม ยังมีชีวิตอยู่นี่ แต่มานอนสลบอยู่กลางถนนแบบนี้ นึกว่าเป็นศพไปซะแล้ว"
11020-23 = "ว่าไงนะ เป็นลมเพราะหิวงั้นเหรอ?"
11020-24 = "หรือว่าคุณ... เป็นคนไร้บ้านเหรอ?"
11020-25 = "อย่าบอกนะว่าโดนปล้นมา? หรือว่าเกิดอุบัติเหตุ...?!"
11020-26 = "ว่าไงนะ เป็นลมเพราะหิวงั้นเหรอ?"
11020-27 = "ไม่ใช่คนไร้บ้านใช่มั้ย?"
11020-28 = "อืม..."
11020-30 = "เขตที่อยู่อาศัยในอะบิดอส"
11020-31 = "(พรึ่บ)"
11020-32 = "มีธุระเลยมาที่นี่ แต่ว่าหาร้านค้าไม่ได้ ก็เลยหิวน้ำจนเป็นลมไปงั้นเหรอ?"
11020-33 = "ผู้ประสบภัยดีๆ นี่เอง"
11020-34 = "อืม เป็นปกติของที่นี่น่ะ ร้านค้าและอาหารต่างๆ หายไปนานแล้ว"
11020-35 = "แต่ถ้าออกไปทางชานเมืองก็จะเจอตัวเมืองเล็กๆ อยู่"
11020-36 = "ไม่รู้จักเส้นทางเหรอ? อืม... มาที่นี่ครั้งแรกสินะ"
11020-37 = "แป๊บหนึ่งนะ..."
11020-39 = "(ค้นหาบางอย่าง)"
11020-42 = "รับไปสิ เครื่องดื่มชูกำลังน่ะ"
11020-43 = "จริงๆ ฉันเก็บไว้ดื่มตอนปั่นจักรยาน แต่ตอนนี้ฉันมีแค่เจ้านี่เท่านั้น กินก่อนสิจะได้มีแรง"
11020-45 = "รอเดี๋ยวนะ ขอหาแก้วก่อน..."
11020-46 = "[s] กระดกขวดดื่ม"
11020-47 = "(อึกๆๆ)"
11020-48 = "......!"
11020-49 = "เอ่อ... แบบนั้นมัน..."
11020-50 = "ไม่หรอก.. ไม่มีอะไร ไม่ต้องใส่ใจหรอก"
11020-51 = "[s] ขอบคุณที่ช่วยชีวิตครูไว้นะ"
11020-52 = "อืม"
11020-53 = "ดูแล้วน่าจะเป็นผู้ใหญ่ที่องค์การนักเรียนส่งมา... คงจะต้องเหนื่อยน่าดูเลย ว่าแต่มีธุระเกี่ยวกับโรงเรียน#nเหรอ?"
11020-54 = "แถวนี้ไม่มีอะไรเลยนอกจากโรงเรียนของเรา..."
11020-55 = "หรือว่าตั้งใจจะมาที่ <อะบิดอส>?"
11020-56 = "[s] พยักหน้า"
11020-57 = "แบบนี้นี่เอง ไม่ได้มีแขกมาเยี่ยมนานแล้วนะ"
11020-58 = "งั้นฉันจะบอกทางให้เอง โรงเรียนเราอยู่ใกล้ๆ นี้แหละ"
11020-59 = "ว่าไงนะ? หิวจัดจนขยับตัวไม่ไหวเหรอ?"
11020-60 = "อืม... เอายังไงดีล่ะ?"
11020-61 = "[s] ขอซ้อนจักรยาน"
11020-62 = "แต่จักรยานมันมีแค่เบาะเดียวนะ..."
11020-63 = "[s] ขอให้ช่วยแบก"
11020-64 = "..."
11020-65 = "ก็ได้ แบบนี้น่าจะสะดวกกว่า"
11020-66 = "งั้นจอดจักรยานไว้ทางนี้ก่อน..."
11020-68 = "เอาล่ะ"
11020-71 = "(พรึ่บ..)"
11020-72 = "อ๊ะ เดี๋ยวนะ"
11020-73 = "..."
11020-74 = "อืม... ปั่นจักรยานมาไกลก็เลยเหงื่อออกน่ะ ถึงจะไม่ได้เหงื่อท่วมตัวก็เถอะ..."
11020-75 = "ปกติแล้วฉันจะไปอาบน้ำในห้องอาบน้ำของโรงเรียน ที่นั่นมีเสื้อผ้าที่ฉันสำรองไว้อยู่..."
11020-76 = "หือ? ว่าไงนะ?"
11020-77 = "ไม่ได้กลิ่นเหงื่อเลย แต่ได้กลิ่นหอมจากตัวฉันงั้นเหรอ?"
11020-78 = "......"
11020-79 = "อืม... ฉันไม่ค่อยรู้หรอกนะ แต่ว่าถ้าพูดแบบนั้นก็คงไม่เป็นไรล่ะมั้ง"
11020-80 = "เอาล่ะ..."
11020-82 = "(เหลือบมอง)"
11020-83 = "จับให้ดีๆ นะ"
11020-85 = "คณะกรรมการแผนงานอะบิดอส"
11020-87 = "กลับมาแล้ว"
11020-88 = "มาแล้วเหรอรุ่นพี่?"
11020-89 = "เอ๋...? แบกอะไรมาด้วยน่ะ?!"
11020-90 = "ว้าว ชิโรโกะจังลักพาตัวผู้ใหญ่กลับมาด้วยค่ะ!"
11020-91 = "ลักพาตัวเหรอ? หรือว่าเป็น... ศพเหรอคะ? อย่าบอกนะว่ารุ่นพี่ชิโรโกะไปก่ออาชญากรรมมา?"
11020-92 = "ใจเย็นๆ ก่อน เราต้องตั้งสติให้ดีๆ แล้วก็ช่วยกันหาที่ซ่อนศพนั่น! รีบไปเอาพลั่วกับเสียมจากโรงยิมเร็ว..."
11020-93 = "......"
11020-94 = "(ตุ้บ)"
11020-95 = "นี่ทุกคน... แค่ผู้ใหญ่คนหนึ่งน่ะ เขาเป็นแขกของโรงเรียนนะ"
11020-96 = "ว่าไงนะคะ? ไม่ใช่ศพหรอกเหรอคะ...?"
11020-97 = "รุ่นพี่ไม่ได้ลักพาตัวมา... แต่เขาเป็นแขกของโรงเรียนเหรอ?"
11020-98 = "อืม..."
11020-99 = "[s] ทักทายกับทุกคนอย่างยินดี"
11020-100 = "ตกใจหมดเลยค่ะ นานมากแล้วนะคะที่โรงเรียนเราไม่มีใครมาเยี่ยม"
11020-101 = "นะ... นั่นสินะคะ ว่าแต่เป็นแขกของโรงเรียนของเรางั้นเหรอคะ...?"
11020-103 = "[ns] \"ครูเป็นคุณครูจาก <ชาเล่ต์> น่ะ\""
11020-105 = "เอ๋...?!! จริงเหรอคะ...?!"
11020-106 = "ว่าไงนะ?! คุณครูจากฝ่ายสืบสวน <ชาเล่ต์> เหรอ?!"
11020-107 = "ว้าวว☆ ชาเล่ต์ตอบรับคำขอความช่วยเหลือของเราสินะคะ! โชคดีจังเลยนะคะ อายาเนะจัง!"
11020-108 = "ใช่ค่ะ! ในที่สุดเราก็จะได้รับการสนับสนุนกระสุนและเสบียงแล้วค่ะ!"
11020-109 = "จริงสิ ฉันต้องรีบไปบอกรุ่นพี่โฮชิโนะก่อน... ว่าแต่รุ่นพี่โฮชิโนะหายไปไหนแล้วเนี่ย?"
11020-110 = "หัวหน้านอนอยู่ในห้องข้างๆ น่ะ ฉันจะไปเรียกมาให้เอง"
11020-112 = "(ปังๆๆๆๆ)"
11020-113 = "สะ.. เสียงปืนเหรอ?"
11020-114 = "!!"
11020-117 = "วะฮ่ะฮ่ะฮ่าา!"
11020-118 = "โจมตีเลย!! ตอนนี้เจ้าพวกนั้นไม่มีทั้งกระสุนและเสบียง! ใช้โอกาสนี้จู่โจมเลย!! โรงเรียนต้องเป็นของเรา!"
11020-120 = "(ปังๆๆๆๆๆ!!)"
11020-123 = "อะไรเนี่ย?! มีกลุ่มติดอาวุธเข้ามาในเขตโรงเรียนค่ะ! พวกแก๊งหมวกกันน็อกคาตาคาตะแน่เลย!"
11020-124 = "เจ้าพวกนี้...! ยังกล้ากลับมาอีกเหรอ?"
11020-126 = "ฉันพารุ่นพี่โฮชิโนะมาแล้ว! รุ่นพี่ตั้งสติหน่อยสิ! ตื่นได้แล้ว!"
11020-127 = "งืม... ยังไม่ถึงเวลาตื่นเลยนี่"
11020-128 = "รุ่นพี่โฮชิโนะ! แก๊งหมวกกันน็อกบุกเข้ามานะคะ! อ๋อ ส่วนทางนี้คือคุณครูจากชาเล่ต์ค่ะ"
11020-129 = "ว้าว~ เรื่องใหญ่เลยนะเนี่ย... ฮ้าว~ ยินดีที่ได้รู้จักนะครู"
11020-130 = "รุ่นพี่! ตั้งสติหน่อยสิ! เราต้องออกไปรับมือเดี๋ยวนี้! รีบเตรียมอุปกรณ์เร็ว เราต้องปกป้องโรงเรียนไว้สิ!"
11020-131 = "ฮ้าวววว.... แจ๊บๆ เจ้าพวกแก๊งหมวกกันน็อก บุกมาทำไมเนี่ย คนเค้าจะหลับจะนอน..."
11020-134 = "ออกไปตอบโต้พวกนั้นกันเถอะ คุณครูอยู่ที่นี่เราก็ไม่ต้องห่วงเรื่องกระสุนและเสบียงแล้ว"
11020-135 = "อื้ม! ออกไปโจมตีด้วยกันเลยค่ะ☆"
11020-138 = "ฉันจะคอยระบุตำแหน่งให้จากที่นี่เองค่ะ"
11020-139 = "ส่วนคุณครูก็อยู่ช่วยสนับสนุนพวกเราที่นี่ด้วยนะคะ!"

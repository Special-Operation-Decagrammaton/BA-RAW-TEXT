[translation]
10018050-1 = "第5話;麻煩請幫我結帳"
10018050-2 = "商店街"
10018050-4 = "歡迎光臨，請品嘗看看！"
10018050-5 = "這是麻雀亭的新菜色！免費提供試吃唷！"
10018050-6 = "麻雀亭？不是聽說要結束營業了嗎……"
10018050-7 = "確，確實有過這樣的傳言……！"
10018050-8 = "我們要重新開幕了。這是新設計的菜色。"
10018050-9 = "這樣的話，我就吃一口試試吧……"
10018050-13 = "（……嚼嚼）"
10018050-17 = "啊，這個好好吃！不，麻雀亭本來就已經很不錯了！"
10018050-18 = "味道香醇濃厚！而且口感變得更棒了呢！"
10018050-19 = "前，前輩！太好了！"
10018050-20 = "請多多支持新的麻雀亭！"
10018050-24 = "如果連冷掉的狀態都這麼美味……好想知道剛做好時會是什麼味道……"
10018050-28 = "糟糕，吃得太入迷，差點忘記和客戶有約！"
10018050-29 = "請趕快去吧！期待您再次光臨。"
10018050-35 = "好吃……確實很好吃。"
10018050-36 = "不過……"
10018050-37 = "有什麼問題嗎……？"
10018050-38 = "這道料理，要多少錢呢？"
10018050-39 = "這，這個嘛……！#n考慮到原物料和運輸費用……"
10018050-40 = "差不多900元左右……吧。"
10018050-41 = "這樣啊……#n可是我午餐的預算大概只有600元左右……"
10018050-43 = "是，是嗎！？"
10018050-44 = "雖然跟附近的店家相比的確偏高，但麻雀亭本來就是這個價位……"
10018050-45 = "是這樣沒錯。但也正因如此，才會出現麻雀亭要結束營業的傳言吧。"
10018050-46 = "如果是這個價位的話，想常來恐怕很難……"
10018050-48 = "唔嗯……考量到價格，我可能會去吃其他料理吧。"
10018050-49 = "畢竟類似的味道，就算在附近的其他店也能吃到吧？"
10018050-50 = "當然要論美味程度的話，我也必須承認它確實有一定的水準……"
10018050-51 = "不過你們想想，既然都花了錢，總是會想獲得一些全新的體驗嘛。"
10018050-52 = "但是，以麻雀亭能獲得的食材來看，可以製作的料理種類實在有限……"
10018050-53 = "這不是我們消費者的問題吧？"
10018050-54 = "您說的確實沒錯……"
10018050-57 = "……原來如此。#n除了味道以外，價格也很重要……"
10018050-58 = "是我思慮不周。#n因為太過執著於味道，反而忽略了價格的問題。"
10018050-61 = "其實我覺得份量也有點偏少。"
10018050-62 = "會嗎？因為是亞伽里才這麼覺得吧？"
10018050-63 = "不，我也覺得份量有點不夠。"
10018050-64 = "唔唔，那該怎麼辦才好呢？#n小嗶超市的食材雖然品質很好……"
10018050-66 = "是啊。如此一來，漲價是無可避免的。"
10018050-67 = "但是這一帶的人們，已經習慣了喵食品的低廉價格。"
10018050-68 = "如果想在價格方面贏過對方，就只能採取相同的手段。"
10018050-69 = "這也代表我們不得不在品質方面有所妥協……"
10018050-73 = "但我並不希望這麼做。"
10018050-74 = "[s]「還是有能同時兼顧質跟量的方法吧？」"
10018050-75 = "什麼？這種事辦得到嗎，老師？"
10018050-76 = "啊……是要同時準備低價位的菜色對吧。"
10018050-77 = "嗯，將中低價位的餐點設計成套餐，其餘的料理則按照原本的方式提供……"
10018050-78 = "也就是要準備一些服務常客的餐點。"
10018050-79 = "在減少菜單品項的同時，也能做出一定的差異化……"
10018050-81 = "聽起來還挺不錯的嘛？#n我喜歡套餐，份量也比較適合。"
10018050-82 = "有點像學校的供餐一樣呢★"
10018050-83 = "雖然格黑娜的伙食不怎麼樣，但麻雀亭的套餐肯定會很好吃的！"
10018050-84 = "[s1]「盡可能減少老闆娘的負擔，也是持續經營的關鍵。」\n[s2]「供餐不好吃應該是有原因的吧……」"
10018050-88 = "真是非常有價值的意見，不愧是老師呢。"
10018050-89 = "那麼，接下來就該去採購用於平價料理的食材……"
10018050-91 = "但考慮到價格，好像也只能在附近的商店買……"
10018050-92 = "羽留奈可能會無法接受呢。"
10018050-93 = "啊，也對。他很討厭妥協呢！"
10018050-95 = "……這次情況有所不同。"
10018050-96 = "畢竟這是讓麻雀亭生存下去的必要手段。#n既然是為了生存而擬定的戰略，那就另當別論了。"
10018050-101 = "事情我都聽說了，我覺得採購的任務可以交給茱莉。"
10018050-103 = "咦！？"
10018050-105 = "有需要那麼驚訝嗎？#n別的暫且不提，茱莉挑選食材的眼光可是一等一的。"
10018050-106 = "是，是啊！雖然由我自己說出口有點不好意思……但我有努力學習過了！"
10018050-107 = "畢竟我能幫上前輩的，也就只有挑選食材的部份而已……"
10018050-109 = "好，好吧。既然你們都這麼說了……"
10018050-111 = "那麼，老師？"
10018050-112 = "[s]「包在我身上吧。」"
10018050-113 = "有勞您了。"

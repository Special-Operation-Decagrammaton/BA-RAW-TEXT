[translation]
10018050-1 = "ตอนที่ 5;คำนวณให้ด้วยค่ะ"
10018050-2 = "ถนนย่านการค้า"
10018050-4 = "เชิญค่า เชิญเลยค่ะ มาลองชิมดูก่อนได้นะคะ!"
10018050-5 = "เมนูใหม่ของร้านซุซุเมะค่ะ ชิมฟรีนะคะ!"
10018050-6 = "ร้านซุซุเมะเหรอ? ได้ยินว่ากำลังจะปิดกิจการนี่นา..."
10018050-7 = "นะ... แน่นอนค่ะว่ามันมีข่าวลือแบบนั้นอยู่ด้วย"
10018050-8 = "เรากำลังจะเริ่มใหม่พร้อมกับวางขายเมนูใหม่ด้วยค่ะ"
10018050-9 = "ถ้างั้นไหนขอลองชิมหน่อยซิ..."
10018050-13 = "(ง่ำ ง่ำ...)"
10018050-17 = "อะ... อร่อยเหาะ! ไม่สิ... เมื่อก่อนอาหารของร้านซุซุเมะก็อร่อยอยู่แล้ว!"
10018050-18 = "รสชาติดีมาก! แถมตอนเคี้ยวยังนุ่มลิ้นกว่าเมื่อก่อนอีก!"
10018050-19 = "ระ... รุ่นพี่! โล่งอกไปทีนะคะ!"
10018050-20 = "ช่วยสนับสนุนร้านซุซุเมะของเราด้วยนะคะ!"
10018050-24 = "ทำอาหารรสชาติแบบนี้ได้ในสภาวะที่ร้านย่ำแย่... ถ้าตอนร้านพร้อมๆ มีทุกอย่างสมบูรณ์จะอร่อยขนาด#nไหนเนี่ย..."
10018050-28 = "บ้าจริง! มัวแต่ชิมเพลินเกือบลืมเวลานัดเลย!"
10018050-29 = "แบบนั้นก็แย่น่ะสิคะ! ถ้างั้นก็รีบไปเถอะค่ะ!"
10018050-35 = "อร่อยจัง... ยิ่งกินยิ่งอร่อยนะเนี่ย"
10018050-36 = "แต่ว่า..."
10018050-37 = "มีปัญหาอะไร... รึเปล่าคะ?"
10018050-38 = "อาหารจานนี้น่ะ คิดจะขายราคาเท่าไรเหรอ?"
10018050-39 = "ระ... เรื่องนั้น...! ถ้าคิดจากราคาวัตถุดิบ ค่าขนส่ง แล้วก็เวลาที่ใช้เตรียมอาหาร... "
10018050-40 = "ก็คงประมาณ 900 เยน... ละมั้งคะ?"
10018050-41 = "แพงขนาดนั้นเลยเหรอ...? ปกติฉันกินมื้อเที่ยงไม่เกิน 600 เยนเอง..."
10018050-43 = "งะ... งั้นเหรอคะ?!"
10018050-44 = "ถ้าเทียบกับราคาร้านแถวๆ นี้ก็นับว่าค่อนข้างแพงทีเดียว เดิมทีราคาอาหารของร้านซุซุเมะเองก็แพง#nกว่าอยู่แล้วด้วย..."
10018050-45 = "นั่นน่ะสิ... เพราะงั้นคนเขาถึงลือกันว่าที่ร้านซุซุเมะต้องปิดกิจการไปก็เพราะขายแพงไงล่ะ"
10018050-46 = "แต่ว่าถ้าขายราคาขนาดนั้นจริง... ฉันคงไปกินบ่อยๆ ไม่ไหวแน่"
10018050-48 = "อืม... ถ้าราคาประมาณนี้ละก็ ฉันก็อยากกินอาหารที่มันหรูๆ กว่านี้สักหน่อย..."
10018050-49 = "อาหารที่เพิ่งชิมไปน่ะ ร้านแถวนี้ก็มีขายอยู่เยอะแยะเลยไม่ใช่รึไง?"
10018050-50 = "ถึงรสชาติจะอร่อยไม่เท่ากับจานที่เพิ่งกินไปก็เถอะ..."
10018050-51 = "แต่ว่าถ้าจะต้องจ่ายเงินในราคาแพงแบบนั้น เราก็ควรได้ลิ้มรสประสบการณ์หรืออาหารใหม่ๆ บ้างสิ"
10018050-52 = "แต่ว่าอาหารที่ใช้วัตถุดิบของร้านซุซุเมะทำได้มันมีจำกัด..."
10018050-53 = "แต่ว่าเรื่องนั้นไม่ใช่เรื่องที่ลูกค้าต้องกังวลไม่ใช่เหรอ?"
10018050-54 = "ที่พูดมามันก็ใช่อยู่หรอกค่ะ..."
10018050-57 = "...อย่างนี้นี่เอง นอกจากรสชาติแล้ว เรื่องราคาก็เป็นสิ่งสำคัญ..."
10018050-58 = "ฉันประมาทเองค่ะ ฉันมัวแต่จดจ่ออยู่กับคุณภาพของอาหารจนลืมเรื่องราคาไปค่ะ"
10018050-61 = "อันที่จริง ฉันรู้สึกว่าปริมาณน้อยไปนิดนึงด้วยค่ะ"
10018050-62 = "เอ๋? มีแค่อาคาริคนเดียวรึเปล่าที่กินไม่อิ่มน่ะ?"
10018050-63 = "เปล่าหรอก ฉันเองก็รู้สึกว่าปริมาณน้อยไปนิดนึงเหมือนกัน ปริมาณน้อยน่ะถูกแล้วละ"
10018050-64 = "ฮือ... แล้วจะทำยังไงดี? วัตถุดิบจากร้านซูเปอร์มาร์เก็ตปิโยน่ะคุณภาพดีก็จริง..."
10018050-66 = "ใช่ค่ะ วัตถุดิบคุณภาพดี ราคาก็ย่อมสูงตามไปด้วยค่ะ"
10018050-67 = "แต่ว่าที่ย่านการค้าของเขตนี้น่ะ ถูกวัตถุดิบราคาถูกของเนียวฟู้ดครอบงำไปแล้ว"
10018050-68 = "ถ้าพูดถึงเรื่องการแข่งขันด้านราคาละก็ หากไม่ใช้วิธีเดียวกับพวกนั้น ก็คงเอาชนะไม่ได้หรอกค่ะ"
10018050-69 = "ถ้าอย่างนั้นหมายความว่าเราไม่มีทางเลือกอื่น นอกจากต้องใช้วัตถุดิบคุณภาพต่ำ..."
10018050-73 = "สถานการณ์แบบนี้... ฉันไม่ชอบใจเลยค่ะ"
10018050-74 = "[s] \"ปริมาณกับคุณภาพ ลองวิธีที่จะรวบหมดเลยดีมั้ย?\""
10018050-75 = "คะ? มีวิธีแบบนั้นด้วยเหรอคะคุณครู?"
10018050-76 = "อา... ให้เปิดขายเมนูลดราคาพิเศษกับเมนูระดับพิเศษพร้อมกันเหรอคะ?"
10018050-77 = "อ่ะฮ่า ใช้วิธีเอาเมนูราคาถูกกับราคากลางมารวมเป็นอาหารเซ็ต เหมือนกับร้านขายอาหารชุดทั่วๆ ไป"
10018050-78 = "และเตรียมเมนูพิเศษไว้ต่างหากสำหรับลูกค้าประจำสินะคะ"
10018050-79 = "ถ้าทำแบบนั้น ก็จะสามารถลดประเภทของเมนูลง และสร้างความแตกต่างได้ในเวลาเดียวกัน..."
10018050-81 = "ไอเดียไม่เลวเลยนะคะ? ฉันชอบพวกอาหารชุดอยู่แล้ว ปริมาณอาหารก็เหมาะสมดีด้วย"
10018050-82 = "ดูยังไงก็เหมือนกับโรงอาหารของโรงเรียนเลยค่ะ★"
10018050-83 = "ถึงอาหารที่โรงอาหารของโรงเรียนเราจะไม่อร่อยก็เถอะ! แต่อาหารชุดของร้านซุซุเมะต้องอร่อยแน่ๆ!"
10018050-84 = "[s1] \"การทำให้เจ้าของร้านเหนื่อยน้อยที่สุดคือสิ่งสำคัญนะ\"\n[s2] \"ครูว่ามันมีสาเหตุที่อาหารที่โรงอาหารรสชาติแปลกๆ นะ...\""
10018050-88 = "ยังไงก็เถอะ คิดว่าเป็นไอเดียที่ดีนะคะ สมกับเป็นคุณครูจริงๆ เลยค่ะ"
10018050-89 = "ถ้างั้นต่อไปก็ต้องซื้อวัตถุดิบราคาถูกเพื่อทำเมนูเซ็ตลดราคา..."
10018050-91 = "คงไม่มีทางเลือกอื่นนอกจากต้องไปหาซื้อวัตถุดิบจากย่านการค้าใกล้เคียงแล้วแหละ..."
10018050-92 = "ฮารุนะคงไม่ปลื้มแน่ๆ ค่ะ"
10018050-93 = "อา... แหงอยู่แล้ว เธอเกลียดเรื่องการเจรจาประนีประนอมกันจะตาย"
10018050-95 = "...แต่ว่าคราวนี้ไม่เหมือนกันค่ะ"
10018050-96 = "ฉันรู้ว่ามันเป็นเรื่องสำคัญที่จะช่วยให้ร้านซุซุเมะอยู่รอดได้ค่ะ ถ้าปัญหาความอยู่รอดละก็ มันไม่เหมือน#nกันนะคะ"
10018050-101 = "ถือว่าได้ยินพอดีก็แล้วกัน เรื่องซื้อวัตถุดิบน่ะ ให้เป็นหน้าที่ของจูริได้นะ"
10018050-103 = "ว่าไงนะ?!"
10018050-105 = "ทำท่าตกใจแบบนั้นมันเสียมารยาทนะ เรื่องอื่นฉันไม่รู้หรอก แต่ถ้าเป็นเรื่องการเลือกซื้อวัตถุดิบน่ะ จูริเก่งมากเลยนะ"
10018050-106 = "ชะ... ใช่แล้วค่ะ! ฉันพูดเองแบบนี้มันดูน่าอายก็จริง... แต่ฉันตั้งใจศึกษาวิธีเลือกวัตถุดิบมาอย่างดีเลย#nนะคะ!"
10018050-107 = "สิ่งที่ฉันพอจะทำประโยชน์ให้รุ่นพี่ได้ ก็มีแค่สายตาเฉียบแหลมในการเลือกซื้อวัตถุดิบนี่นา..."
10018050-109 = "ฮะ...ฮึ่ม ถ้าพูดถึงขนาดนั้นแล้ว ก็ย่อมได้..."
10018050-111 = "ถ้างั้น... คุณครู?"
10018050-112 = "[s] \"งั้นเหรอ ถึงตาครูออกโรงแล้วสินะ\""
10018050-113 = "ขอรบกวนด้วยนะคะ"

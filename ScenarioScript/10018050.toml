[translation]
10018050-1 = "Episode 5; Check Please"
10018050-2 = "Commercial Street"
10018050-4 = "Welcome, welcome! Grab a bite! It's a delight!"
10018050-5 = "A new Sparrow menu! Try a free sample!"
10018050-6 = "Sparrow? I thought they were closing..."
10018050-7 = "Th-That was just a rumor!"
10018050-8 = "On the contrary, Sparrow is reinventing its menu."
10018050-9 = "Well, let's see how it tastes..."
10018050-13 = "*chew* *chew*"
10018050-17 = "I-It's good! I mean, the old food was good too, but this is great!"
10018050-18 = "I love how savory it is! And the texture is much better!"
10018050-19 = "I-I'm so relieved!"
10018050-20 = "Please support the new and improved Sparrow!"
10018050-24 = "If it's this good when cold, imagine how good it'd be when fresh."
10018050-28 = "Oh! The food was so good that I almost forgot my business meeting!"
10018050-29 = "Thank you! But also, you should really go!"
10018050-35 = "It's good... It's really good."
10018050-36 = "But..."
10018050-37 = "Is there a problem?"
10018050-38 = "How much does it cost when you're not giving it away?"
10018050-39 = "W-Well... Considering the cost of ingredients, transportation, and labor..."
10018050-40 = "It'll be about nine hundred yen."
10018050-41 = "That much? I usually only spend six hundred on lunch..."
10018050-43 = "R-Really?!"
10018050-44 = "I-It's only a little more expensive than other restaurants, and Sparrow's prices have always been like that..."
10018050-45 = "Yeah, and that's why people thought Sparrow was closing."
10018050-46 = "I won't be able to come too often at these prices..."
10018050-48 = "I mean, if I'm gonna splurge on a meal, I'd rather go all in and eat something more luxurious."
10018050-49 = "The food is better than most places, sure."
10018050-50 = "But ultimately, it's pretty basic stuff."
10018050-51 = "If I'm going to spend more than the bare minimum, I'd rather try something new."
10018050-52 = "There's a limit to what Sparrow can make with the ingredients we have..."
10018050-53 = "I'm sorry, but that's not the customers' problem to solve."
10018050-54 = "That's true, but..."
10018050-57 = "I see. Taste isn't the only thing that's important, but the prices matter too."
10018050-58 = "That was our carelessness. We forgot the business side of things and focused too much on the quality of food."
10018050-61 = "If anything, I think we just need more quantity. These portions are too small."
10018050-62 = "Are you sure that's not just a you thing, Akari?"
10018050-63 = "No, I thought the portions were too small as well."
10018050-64 = "Well, I'm not sure if that helps. Chirp Market's ingredients are high quality..."
10018050-66 = "...which means increased portions just lead to increased costs."
10018050-67 = "And this area is flooded with cheap options thanks to Nyao Foods, so we'll look pricey by comparison."
10018050-68 = "If we want to win people over, we'll have to play their game."
10018050-69 = "Unfortunately, their game includes a certain level of quality decline..."
10018050-73 = "I don't like it one bit."
10018050-74 = "[s] \"Why not aim for both quantity and quality?\""
10018050-75 = "Huh? How would that even be possible, Sensei?"
10018050-76 = "Having two tiers of menus?"
10018050-77 = "By consolidating the low- and mid-priced items, we can cut costs by having a smaller, more standardized menu..."
10018050-78 = "...while also offering a separate, more specialized menu for regulars so our offerings aren't too monotonous."
10018050-79 = "Each menu will be smaller, but they'll have something for both those looking for a quick bite and those looking for higher quality meals..."
10018050-81 = "Not a bad idea. If we can get the balance right, I like the idea of a set menu."
10018050-82 = "Kind of like school lunch. ★"
10018050-83 = "Lunch at our school is awful! But I bet the set menu at Sparrow will be great!"
10018050-84 = "[s1] \"Don't forget the owner's workload after we're gone.\"\n[s2] \"There's a reason school lunches aren't appetizing...\""
10018050-88 = "I think this is a great idea. Good job, Sensei."
10018050-89 = "But now we need to discuss buying cheaper ingredients for the standardized menu..."
10018050-91 = "I guess we have no choice but to find sources from this district..."
10018050-92 = "Haruna won't be happy about that."
10018050-93 = "Of course she won't. She hates compromising."
10018050-95 = "...This is different."
10018050-96 = "It's necessary for Sparrow's survival, so I'm making an exception."
10018050-101 = "Speaking of which, we should leave the grocery shopping to Juri."
10018050-103 = "What?!"
10018050-105 = "It's a bit rude to be that surprised. Juri makes some...mistakes in the kitchen, but she has a great eye for ingredients."
10018050-106 = "Y-Yes! It's a bit embarrassing to say this about myself, but I've studied grocery shopping really hard!"
10018050-107 = "I might not be the most helpful in the kitchen, but I can help by finding good ingredients."
10018050-109 = "Hmm, if you say so..."
10018050-111 = "That's that. Sensei?"
10018050-112 = "[s] \"I guess it's time for me to start moving.\""
10018050-113 = "Good luck."

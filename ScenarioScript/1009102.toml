[translation]
1009102-1 = "主唱練習"
1009102-2 = "（……最後還是被千紗硬拖去了附近的卡拉OK）"
1009102-3 = "[ns1]「還以為你說的負責任是什麼意思……」\n[ns2]「原來是要我協助歌唱訓練啊。」"
1009102-6 = "……當然囉？"
1009102-7 = "不然還能是什麼意思，你該不會以為我會逃跑吧？"
1009102-8 = "反正這件事總得有人來做。#n既然要做就該做到最好，只是這樣而已。"
1009102-9 = "你說我的心態很了不起？#n呵呵，謝啦，被老師稱讚的感覺還真好呢。"
1009102-10 = "……嗯？"
1009102-11 = "問我是不是沒唱過歌？#n這個嘛……也不能說沒有，不過那跟「當主唱」完全是兩回事。"
1009102-12 = "畢竟隨口唱歌跟為了表演而唱歌，終究是不一樣的……"
1009102-13 = "……"
1009102-14 = "總之話就說到這邊，趕快幫我練習吧。"
1009102-15 = "要怎麼幫我？很簡單。"
1009102-16 = "我接下來會唱各個種類的歌，#n如果有唱得不好或聽起來有點奇怪的部分，你就在唱完之後告訴我就行了。"
1009102-17 = "反正我們也還沒決定好要唱什麼歌，所以我打算先進行比較全面的練習。#n不過當然還是會以平常不太會唱的曲風和類型為主。"
1009102-18 = "……嗯？#n……其他人？"
1009102-19 = "不不不，那也太可怕了吧？"
1009102-20 = "要是把他們帶來，每次唱錯或唱不好的時候，不就都得被他們嘲笑嗎？"
1009102-21 = "所以我才會帶可以信任的老師來……"
1009102-26 = "嗯……唔……"
1009102-27 = "老師真的……可以信任嗎……？"
1009102-28 = "[s3]「……怎麼現在才問這個！？」\n[s4]「那，那個表情……是怎麼回事？」"
1009102-31 = "不是，我剛才說完才想到，老師實際上跟其他成員好像也沒什麼不同……"
1009102-32 = "感覺都是唱錯的時候會嘲笑我的類型。"
1009102-33 = "……唔唔，果然還是應該自己一個人練習的嗎？"
1009102-34 = "……嗯？"
1009102-35 = "你說你可以保證絕對不會嘲笑我？"
1009102-36 = "咦……真的嗎？#n這個反應倒是讓我有點意外……"
1009102-37 = "[s5]「有些時候能開玩笑，有些時候不行。」\n[s6]「嘲笑認真努力的學生是不對的事。」"
1009102-40 = "老，老師……？"
1009102-41 = "為，為什麼突然這麼認真？#n這件事也沒有那麼嚴重啦。"
1009102-42 = "唔，嗯……"
1009102-43 = "……老師有時候會突然變得很嚴肅呢。"
1009102-44 = "不過好吧。#n既然老師都講得這麼誠懇，我就放心了。"
1009102-45 = "那，那我也……嗯……應該要用誠懇的態度……"
1009102-46 = "…………"
1009102-47 = "……請，請多多指教！"
1009102-49 = "（於是之後一邊聽著千紗唱歌，一邊給他一些意見）"
1009102-50 = "（雖然還有可以改善的地方，但老實說千紗的唱歌技巧很不錯）"
1009102-52 = "[ns7]「……？？？什麼嘛，明明就唱得很好啊。」\n[ns8]「既然這麼會唱歌，之前何必這麼擔心呢？」"
1009102-55 = "是，是嗎……？我唱得還可以嗎？"
1009102-56 = "總覺得老師好像不管怎樣都會稱讚……#n你是不是顧慮我的心情才那麼說的？"
1009102-57 = "……你說不是？這種時候不會做那種事？"
1009102-58 = "說，說的也是。#n畢竟我本來就是來這裡練習跟確認實力的，你應該不會說些言不由衷的話才對。"
1009102-62 = "所以我真的唱得還可以嗎？可以相信你吧？"
1009102-63 = "[s9]「如果能再唱得自然一點就很完美了。」\n[s10]「剩下的就取決於心態了，記得要保持放鬆。」"
1009102-66 = "唔，原來如此。"
1009102-67 = "更自然一點……唱歌時要放鬆……嗯……"
1009102-68 = "也就是說，我現在沒必要太擔心對吧？"
1009102-69 = "……呼，看來可以暫時鬆口氣了，我們今天就先練到這裡吧。"
1009102-70 = "……嗯？"
1009102-71 = "問我接下來要做什麼？"
1009102-72 = "……包廂的時間不是還剩很多嗎？"
1009102-76 = "……既然都來到卡拉OK了，當然得享受一下囉。"
1009102-77 = "[s11]「……還要繼續唱的意思？」\n[s12]「那跟剛才有什麼不一樣嗎？」"
1009102-80 = "……？？？#n那是什麼反應？"
1009102-81 = "真是的！完全不一樣好不好。"
1009102-82 = "剛才是為了練習而唱，現在是因為想唱才唱的嘛！怎麼會一樣呢？"
1009102-83 = "難道老師分不出其中的差異嗎？#n嘖嘖，大人就是因為這樣才會……"
1009102-89 = "總之既然都陪我到現在了，就乾脆陪我到最後吧。#n反正久久才來一次。"
1009102-90 = "而且時間還剩下這麼多！"
1009102-91 = "來吧～！第一首歌──！！"
1009102-96 = "預備～～！！"
1009102-97 = "（於是剩下的時間裡，和麥克風合而為一的千紗成為了包廂的支配者）"
1009102-101 = "（……坦白講，他隨興演唱的表現比練習的時候還要好）"

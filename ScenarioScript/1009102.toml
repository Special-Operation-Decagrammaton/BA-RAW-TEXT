[translation]
1009102-1 = "ฝึกร้องเพลง"
1009102-2 = "(สุดท้ายคุณครูก็ถูกคาซึสะลากไปที่คาราโอเกะ)"
1009102-3 = "[ns1] \"ครูก็สงสัยว่าจะให้รับผิดชอบอะไร\"\n[ns2] \"ให้มาช่วยตอนฝึกร้องเพลงนี่เอง\""
1009102-6 = "...? มันก็ใช่น่ะสิ?"
1009102-7 = "หรือคุณครูคิดว่าเป็นเรื่องอื่น? อย่าบอกนะว่าคิดว่าฉันจะหนีทุกคนไปเพราะต้องร้องนำน่ะ?"
1009102-8 = "ยังไงในวงก็ต้องมีคนมาร้องนำอยู่แล้ว ฉันก็เลยคิดว่าถ้าตัวเองได้มาทำ ก็ต้องทำให้ดีไปเลยสิ ก็แค่นี้แหละ"
1009102-9 = "น่าภาคภูมิใจเหรอ? ฮ่าฮ่า ขอบใจนะ พอได้คำชมจากคุณครูก็อารมณ์ดีนะเนี่ย"
1009102-10 = "หืม...?"
1009102-11 = "สงสัยว่าฉันเคยร้องเพลงรึเปล่าน่ะเหรอ? ก็... ก็เคยร้องอยู่บ้าง แต่ก็ไม่ได้ร้องจริงจังจนสมกับตำแหน่ง 'ร้องนำ' หรอก"
1009102-12 = "ก็เพลงที่ร้องเล่นๆ กับเพลงที่ร้องในการแสดงมันไม่เหมือนกันนี่นะ..."
1009102-13 = "..."
1009102-14 = "เอาละๆ เรื่องนั้นช่างมันเถอะ ตอนนี้คุณครูมาช่วยฉันฝึกร้องดีกว่า"
1009102-15 = "จะให้ช่วยยังไงน่ะเหรอ? ก็... ไม่มีอะไรยากหรอก"
1009102-16 = "ฉันจะร้องเพลงไปเรื่อยๆ ถ้าคุณครูฟังแล้วคิดว่ามีจุดไหนที่แปลกๆ หรือควรปรับปรุงก็บอกฉัน#nให้หน่อยนะ"
1009102-17 = "เราก็ยังไม่ได้กำหนดเพลงที่จะร้องน่ะ วันนี้ก็เลยเป็นการฝึกแบบโดยรวมไว้ก่อน ฉันจะฝึกแนวเพลงที่#nปกติแล้วไม่ค่อยได้ร้องมากเท่าไร"
1009102-18 = "ว่าไงนะ...? คนอื่นๆ น่ะเหรอ?"
1009102-19 = "ไม่ได้ ไม่ได้หรอก ทำไมถึงถามอะไรน่าขนลุกแบบนั้น?"
1009102-20 = "ถ้าคนอื่นมาฟังด้วย เวลาฉันร้องเพี้ยนหรือร้องผิดขึ้นมาก็คงจะเอาไปล้อกันไม่หยุด"
1009102-21 = "เพราะแบบนั้นฉันก็เลยอยากฝึกกับคุณครูที่ฉันมั่นใจว่าเชื่อถือได้..."
1009102-26 = "ฮืม... ฮืมม..."
1009102-27 = "จะเชื่อถือได้... จริงมั้ยนะ...?"
1009102-28 = "[s3] \"มาสงสัยอะไรตอนนี้!?\"\n[s4] \"ยะ... ยังไงกันน่ะ? สีหน้าแบบนั้น...?\""
1009102-31 = "คือ... จู่ๆ ฉันก็นึกขึ้นมาได้น่ะว่าคุณครูก็ไม่ได้ต่างจากยัยพวกนั้นในชมรมเท่าไร..."
1009102-32 = "รู้สึกว่าถ้าฉันร้องผิดแล้วก็น่าจะโดนคุณครูล้อเหมือนกันอยู่ดี..."
1009102-33 = "อึก... รู้งี้ฝึกคนเดียวดีกว่ามั้ยนะ..."
1009102-34 = "หืม...?"
1009102-35 = "จะไม่มีวันทำอย่างนั้นเหรอ? สัญญาเลยเหรอ?"
1009102-36 = "อืม... จริงเหรอ? แบบนี้มันเกินคาดอยู่นะ..."
1009102-37 = "[s5] \"จะล้อเล่นกันก็ต้องดูกาลเทศะหน่อยนี่นา\"\n[s6] \"ครูไม่ควรแกล้งนักเรียนที่มีความตั้งใจอยู่แล้ว\""
1009102-40 = "คะ... คุณครู...?"
1009102-41 = "อะ... อะไรกัน? ทำไมจู่ๆ ก็จริงจังขึ้นมา ฉันไม่ได้พูดให้ตึงเครียดขนาดนั้นสักหน่อย"
1009102-42 = "อะ... อืม..."
1009102-43 = "คุณครูเนี่ย... บางครั้งจู่ๆ ก็ทำตัวแปลกๆ ขึ้นมาแบบนี้นะ"
1009102-44 = "แต่ก็ดีแล้วละ ถ้าคุณครูอยากมาช่วยอย่างจริงจังแบบนี้ฉันก็อุ่นใจ"
1009102-45 = "ถะ... ถ้างั้นฉันก็จะ... อืม... จะขอรบกวน..."
1009102-46 = "..."
1009102-47 = "ยะ... อย่างจริงจังละนะ!"
1009102-49 = "(หลังจากนั้น คุณครูก็นั่งฟังคาซึสะร้องเพลงแล้วคอยให้คำแนะนำเล็กๆ น้อยๆ กับเธอ)"
1009102-50 = "(มีส่วนที่ต้องปรับเพิ่มนิดหน่อย แต่โดยรวมก็ถือว่าทำได้ดีแล้ว)"
1009102-52 = "[ns7] \"อะไรกัน? ร้องเพลงเพราะเลยนะนั่น!\"\n[ns8] \"ร้องดีแบบนี้แต่ยังกังวลอีกเหรอ?\""
1009102-55 = "หะ... หืม? งะ... งั้นเหรอ...? ฉันร้อง... ดีเหรอ?"
1009102-56 = "แต่ฉันก็ไม่ควรรับคำชมของคุณครูอย่างสุ่มสี่สุ่มห้าหรอก... ก็ดูเหมือนจะชมทุกคนไปเรื่อย..."
1009102-57 = "ไม่ใช่แบบนั้นงั้นเหรอ? ไม่ได้ชมไปเรื่อยเหรอ?"
1009102-58 = "กะ... ก็คงอย่างนั้นแหละเนอะ เพราะนี่เป็นการร้องเพื่อประเมินทักษะและฝึกฝนให้ดีขึ้น คุณครูคงไม่พูดชมกันเกินเหตุหรอก"
1009102-62 = "ถ้างั้นแปลว่าฉันร้องได้ดีใช่มั้ย? ฉันเชื่อคำพูดของครูได้เนอะ?"
1009102-63 = "[s9] \"ถ้าเป็นธรรมชาติกว่านี้อีกนิดก็จะสมบูรณ์แบบเลย\"\n[s10] \"ปล่อยใจให้สบาย แล้วจะออกมาเป็นธรรมชาติเอง\""
1009102-66 = "อืม... งั้นเหรอ"
1009102-67 = "ต้องร้องเพลง... ให้เป็นธรรมชาติงั้นเหรอ... ฮืม..."
1009102-68 = "สรุปว่านอกจากเรื่องนี้ก็ไม่มีอะไรน่าเป็นห่วงใช่มั้ย?"
1009102-69 = "เฮ้อ... ดีละ ถ้างั้นก็ถือว่าโล่งใจได้แล้ว งั้นวันนี้ฝึกแค่นี้ก่อนดีมั้ย?"
1009102-70 = "หืม...?"
1009102-71 = "แล้วจากนี้ไปจะทำอะไรงั้นเหรอ?"
1009102-72 = "ถามแปลกๆ เรายังเหลือเวลาร้องคาราโอเกะอีกตั้งเยอะนี่นา"
1009102-76 = "ก็ต้องร้องเล่นให้หมดเวลาสิ ไหนๆ ก็ได้มาคาราโอเกะแล้ว"
1009102-77 = "[s11] \"แต่เมื่อกี้ก็ร้องไปเยอะแล้วนะ?\" \n[s12] \"แล้วมันจะต่างจากเมื่อกี้ยังไงเหรอ?\""
1009102-80 = "ทำไมทำหน้าแบบนั้นล่ะ...? "
1009102-81 = "นี่คุณครู! มันต่างกันลิบลับเลยนะ"
1009102-82 = "ฉันบอกไปแล้วไงว่าเพลงที่ใช้ฝึกร้องกับเพลงที่ร้องเอาสนุกมันไม่เหมือนกัน!"
1009102-83 = "คุณครูไม่รู้ความแตกต่างนี้เหรอ? ชิ... ผู้ใหญ่ก็เป็นเสียอย่างนี้ละนะ..."
1009102-89 = "เอาเป็นว่าไหนๆ ก็ได้มาคาราโอเกะกันแล้ว คุณครูก็ช่วยอยู่ร้องเพลงกับฉันต่อหน่อยแล้วกัน โอกาสแบบนี้มันไม่ได้มีบ่อยๆ นะ"
1009102-90 = "เรายังเหลือเวลาร้องอีกเยอะเลย!"
1009102-91 = "เอาละ~! เริ่มเพลงแรกได้!! "
1009102-96 = "ลุยเลยยยยยย~~!!! "
1009102-97 = "(หลังจากนั้น ช่วงเวลาที่เหลือ คาซึสะก็ควงไมค์แล้วโซโล่ร้องเพลงอย่างเมามันในห้องคาราโอเกะ)"
1009102-101 = "(...และการร้องของเธอทำได้ดีขึ้นกว่าตอนที่ฝึกซ้อมร้องเพลงอย่างมาก)"

[translation]
1009102-1 = "Vocal Practice"
1009102-2 = "...Kazusa ended up dragging me to karaoke."
1009102-3 = "[ns1] \"I was wondering what you meant by 'responsibility.'\"\n[ns2] \"You were talking about helping out with singing practice.\""
1009102-6 = "Hmm? Of course."
1009102-7 = "What else were you thinking? Did you think I was going to run away or something?"
1009102-8 = "Someone had to do this. And if I'm doing it, I should do it properly. That's all."
1009102-9 = "You're proud of me? Haha. Thank you. It's nice to hear your compliments, Sensei."
1009102-10 = "Huh?"
1009102-11 = "Do I have any singing experience? Well, um, I do, but... I wouldn't exactly call myself a \"vocalist.\""
1009102-12 = "I mean, there's singing while you hang out with friends, and there's singing for a concert."
1009102-13 = "..."
1009102-14 = "Yeah, yeah. Just help me with my practice."
1009102-15 = "How can you help? Pretty simple."
1009102-16 = "I'll sing a little, and you just point out all the flaws when I'm done."
1009102-17 = "We haven't picked a song to sing yet, so I'm trying to get some general practice. Preferably from genres I usually don't sing in."
1009102-18 = "Huh? What about the others?"
1009102-19 = "Oh, no. Oh, no. Why would you even think about that?"
1009102-20 = "If we bring them in, they'll make fun of me every time I make a mistake."
1009102-21 = "The only one I can trust here is you, Sensei."
1009102-26 = "Hm... Hmm..."
1009102-27 = "Am I...sure I can trust you?"
1009102-28 = "[s3] \"...You're asking that now?!\"\n[s4] \"Wh-What? What's with that face...?\""
1009102-31 = "Well, um, I just thought of it while we were talking. That you're a lot like the other club members..."
1009102-32 = "Feels like you're going to make fun of me when I mess up, just like them."
1009102-33 = "...Tch. Maybe I should've come here by myself."
1009102-34 = "Huh?"
1009102-35 = "You won't do that? You promise?"
1009102-36 = "Huh... For real? I wasn't expecting that..."
1009102-37 = "[s5] \"There's time and place for jokes.\"\n[s6] \"I'd never make fun of a student who's trying their best.\""
1009102-40 = "S-Sensei...?"
1009102-41 = "Wh-Why did you get serious all of a sudden? I wasn't being THAT serious."
1009102-42 = "U-Umm..."
1009102-43 = "...Sometimes, you catch me off guard like this, Sensei."
1009102-44 = "Anyway, well, okay. If you're serious, then that makes me feel better."
1009102-45 = "So I guess...uh...I'd better get serious too."
1009102-46 = "..."
1009102-47 = "...I-I look forward to working with you!"
1009102-49 = "Afterwards, I listened to Kazusa's singing and gave her some feedback."
1009102-50 = "There was some room for improvement, but overall, she did great."
1009102-52 = "[ns7] \"You're a wonderful singer.\"\n[ns8] \"And you've been worried all this time?\""
1009102-55 = "H-Huh? R-Really? I did okay?"
1009102-56 = "I mean, I don't know if I believe that. Feels like you're just saying it to make me feel better..."
1009102-57 = "Hm? That's not the case? It's not the time for that either?"
1009102-58 = "R-Right. Yeah. We came here to evaluate my skill level. You wouldn't sugarcoat anything. Yeah."
1009102-62 = "So it's really okay, right? I can trust you?"
1009102-63 = "[s9] \"It would be perfect if it sounded just a bit more natural.\"\n[s10] \"The rest depends on your mindset. You've got to feel comfortable when you sing.\""
1009102-66 = "Hm. I see. Is that so?"
1009102-67 = "Feel comfortable...while I sing... Hm..."
1009102-68 = "But I can keep going, and it won't be that big of an issue?"
1009102-69 = "...Phew. Okay. That's a relief. Let's call it here for today's practice, then."
1009102-70 = "Huh?"
1009102-71 = "What are we going to do now?"
1009102-72 = "Hm? Is that a question? We've got lots of time left for karaoke."
1009102-76 = "We came all the way out here. Let's have some fun."
1009102-77 = "[s11] \"After all that singing we already did?\"\n[s12] \"How is that different from what we've been doing?\""
1009102-80 = "Oh, what are you even saying?"
1009102-81 = "Listen, this is totally different. Completely."
1009102-82 = "There's singing for practice, and there's singing for fun! How are those two things the same?"
1009102-83 = "Can you really not tell the difference? Pfft. That explains a lot about adults..."
1009102-89 = "Anyways, since we're here, just play along until the end. That's just what we're doing here."
1009102-90 = "And we've got plenty of time left!"
1009102-91 = "Okay! Cue up the first song!"
1009102-96 = "Let's gooo!!"
1009102-97 = "For the rest of the time, Kazusa became one with the mic and took over the place."
1009102-101 = "...And her singing was clearly way better than when she was practicing."

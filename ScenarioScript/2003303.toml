[translation]
2003303-1 = "The Great Chairman's Business Activities"
2003303-8 = "[ns] \"...Huh?\""
2003303-9 = "Chairman Hanuma Makoto has arrived!"
2003303-16 = "Good. I have business to discuss with Sensei, so wait for us outside."
2003303-18 = "Yes, Chairman!"
2003303-22 = "...I thought it only appropriate to repay the respect you showed me and give you the honor of visiting you myself."
2003303-23 = "[s1] \"Ah...welcome? Please, uh, make yourself at home.\"\n[s2] \"Um, would you like a cup of coffee or anything?\""
2003303-26 = "Kiheheh! I'll gladly accept your hospitality, Sensei."
2003303-27 = "That said... Hmm..."
2003303-28 = "Kiheheheh... So this is the so-called Executive Office from which the head of Schale operates."
2003303-29 = "It truly is..."
2003303-30 = "[s] \"...Yes?\""
2003303-31 = "Far more cramped and menial than I'd been informed!"
2003303-32 = "[s] \"Some people would find it quite insulting to hear that from a guest.\""
2003303-33 = "Hah! I would never insult you! I merely spoke the truth!"
2003303-34 = "Surely you understand that a leader must have an executive office befitting their station!"
2003303-35 = "You cannot possibly conduct yourself properly in a constricted space like this!"
2003303-36 = "This bureaucrat's den doesn't even have enough room for a statue that captures your charisma, Sensei!"
2003303-37 = "*sigh* If only you had accepted my offer of alliance. Then you would have free reign of an audience chamber with space and luxury equal to your prestige."
2003303-38 = "[s3] \"I don't know... I think my office fits me...\"\n[s4] \"I don't want to decorate with a statue of myself!\""
2003303-41 = "Regardless, you should know that I've spent time considering your refusal of my magnanimous proposal!"
2003303-42 = "And after much deliberation and consultation with myself, I was finally able to devise the source of your response!"
2003303-43 = "[s] \"...Um, and what do you think the reason was?\""
2003303-44 = "Kiheheheh... It was quite simple to discern for one such as I."
2003303-45 = "It's because Sensei does not yet comprehend the full potential of the Pandemonium Society! In your ignorance, you made a mistake which would cause most people to quiver in fear!"
2003303-46 = "[s] \"...Is that so?\""
2003303-47 = "Of course, Sensei can hardly be blamed."
2003303-48 = "I clearly failed to adequately convey our ambition, our might, and our sheer strength of will to you. The fault lies with me."
2003303-49 = "Why, the Great Makoto might have dismissed YOU as an upstart, had you come seeking partnership without making your great accomplishments and feats clear, as I failed to do."
2003303-50 = "A true leader must be capable of judging any situation with an objective eye and taking responsibility for their mistakes!"
2003303-51 = "Which is why I have cast aside my habitual lofty mien and come to see you personally, Sensei. Our path forward is clear:"
2003303-52 = "I'll show you exactly what Hanuma Makoto has achieved with the power of the Pandemonium Society, and open your eyes to what two leaders of our caliber can do if we join our strength together!"
2003303-53 = "I shall bare everything to you, Sensei, down to the smallest aspect of my organization!"
2003303-54 = "Once you understand exactly what we can offer you, you'll regret spurning my hand! Kiheheheheh!"
2003303-55 = "[s] \"I really don't think that's likely...\""
2003303-56 = "Enough! We have no time to waste!"
2003303-61 = "Bring Sensei to the limousine!"
2003303-62 = "Our inspection of the Pandemonium Society's operational sites starts now!"
2003303-63 = "[s] \"W-Wait, Makoto, I still have work to do!\""
2003303-64 = "Kiheheheh! Don't sweat small details in the face of a grand vision, Sensei!"
2003303-65 = "I can't wait to see the shock and awe dawn across your face! You have no conception of the greatness you're about to witness!"
2003303-66 = "Everyone—move out!"
2003303-67 = "[s] \"You're not listening to me at all!\""
2003303-75 = "Thus did my impromptu kidnapping by/tour of the Pandemonium Society's business operations with Makoto begin."
2003303-78 = "Kiheheheh... The first operation my soon-to-be partner would want to see..."
2003303-79 = "Can only be this!"
2003303-80 = "[s] \"Is this...a printing office?\""
2003303-81 = "Precisely. You have a discerning eye."
2003303-82 = "But despite its looks...it's not just any printing office."
2003303-83 = "This is the largest printing office in Gehenna, operated exclusively by the Pandemonium Society!"
2003303-84 = "Everything we print here, including flyers, books, newspapers, and promotional materials, spreads the philosophy of the Pandemonium Society..."
2003303-85 = "Which is to say that it promotes the great name of Hanuma Makoto!"
2003303-86 = "[s] \"Then, you're saying that...\""
2003303-87 = "Kiheheheh! Now you see! The Great Makoto has the paper publishing and printing industry in an iron grip! And this is just the first step in my plan to control all legacy media!"
2003303-88 = "It may be small scale right now... But I expect exponential growth."
2003303-89 = "It's only a matter of time before every talking head and investigative reporter in Gehenna is kneeling at my feet!"
2003303-90 = "Think of what an ally with such power can do for you, Sensei! Who else in Kivotos can run an industry of this scale besides the Great Makoto?"
2003303-91 = "Do you understand the breadth of my capabilities a bit more, now?"
2003303-92 = "[s] \"Uh... Yeah, it's pretty impressive.\""
2003303-93 = "Huh?! How can you be so blasé after seeing all this?!"
2003303-94 = "[s5] \"I've seen something similar before...\"\n[s6] \"Size isn't everything when it comes to running an organization...\""
2003303-97 = "Wh-What? ...Sensei, what kind of mess have you been through?"
2003303-98 = "But...if this isn't enough to sway you..."
2003303-99 = "Excellent! A battle easily won is of little worth! We're just getting started!"
2003303-100 = "Onwards!"
2003303-103 = "Here's our next operation!"
2003303-104 = "[s] \"A construction site? What are they building?\""
2003303-105 = "Kiheheh. Allow me to explain!"
2003303-106 = "Oh my, our financier! Are you here to check on our progress?"
2003303-107 = "Ah, is our construction schedule on track?"
2003303-108 = "Haha! Needless to say, everything is going well!"
2003303-109 = "Please look forward to it! Soon you'll stand before a skyscraper proclaiming Hanuma Makoto's greatness to the heavens!"
2003303-111 = "Once Makoto Tower is complete, every student in Kivotos will look up to you!"
2003303-112 = "[s] \"Makoto...Tower?\""
2003303-113 = "Kiheheheh. Yes. As the name suggests, we're raising a skyscraper that bears my name..."
2003303-114 = "In size and scale...it will even outmatch Schale's Sanctum Tower!"
2003303-115 = "Well said! We've taken your passion to heart and will do our best to build a skyscraper that reflects your zeal and generous investment!"
2003303-116 = "Soon...the skyline will be dominated by a tower tall enough to be visible from Gehenna, Trinity, and Millennium! Even Hyakkiyako and Red Winter Federal Academy will fall beneath its shadow!"
2003303-117 = "[s] \"Isn't that physically impossible?!\""
2003303-118 = "Hmph! I wouldn't expect such weak words to fall from your mouth! Anything is possible in the hands of the Great Makoto!"
2003303-119 = "Heehee. Though, to be precise, we're the ones actually building it."
2003303-120 = "Kiheheh! That's a trivial matter!"
2003303-121 = "Heeheehee! The most trivial! Why, we're only here to fulfill your orders!"
2003303-123 = "Kiheheheheh!!!"
2003303-124 = "Heeheeheehee!!!"
2003303-126 = "Once completed, this building will become the symbol of Gehenna and serve as a landmark that unifies people from every academy! No matter where you are, you'll be able to look up and dream the same dream!"
2003303-127 = "When that happens, our tourism revenue will skyrocket...and the dominance of the Pandemonium Society will be acknowledged across Kivotos!"
2003303-128 = "The Prefect Team couldn't manage this in their wildest dreams... It's the kind of glory that can only be achieved by the will of the Great Makoto!"
2003303-129 = "What do you say, Sensei?"
2003303-130 = "Hm...? The design is cool, but you're worried I haven't thought out the details?"
2003303-131 = "Budget planning and scope creep? Impact reports on the feasibility of my tourism plans...?"
2003303-132 = "Kiheheheh! Sensei, do you really concern yourself with such boring things?"
2003303-133 = "[s] \"...Are those things you can dismiss because they're boring?\""
2003303-134 = "Of course! Would you truly limit yourself by obeying what others call \"reality\"?"
2003303-135 = "A great leader should only ever ask themselves two questions: \"Do I want to do this?\" and \"Would this look cool?\"!"
2003303-136 = "In other words, our whims are their command!"
2003303-137 = "[s] \"Can you really brush the world off like that?!\""
2003303-138 = "Hm, I see... Perhaps a building under construction isn't enough to impress Sensei, however grand its blueprint."
2003303-139 = "To our next operation!"
2003303-141 = "Though filled with concern and worry, I continued to tour operational sites with Makoto."
2003303-143 = "The Pandemonium Society currently owns a pop-up store in this shopping mall."
2003303-144 = "We've stocked it with dozens of figurines, posters, and other merchandise bearing my likeness in order to spread my great name and give my admirers a way to express their esteem for me!"
2003303-145 = "And to strike while the iron is hot, I already plan to hold a massive sale through our online store! There's no telling how far the Great Makoto's fame will spread!"
2003303-147 = "Kiheheheh! Here we have a resort operated by the Pandemonium Society."
2003303-148 = "Along with the special discounts we offer to all of our guests, we also include complimentary Pandemonium Society fan club badges for them to take home, free of charge!"
2003303-156 = "Our tour ended in one of Gehenna's shopping districts, where the Pandemonium Society's most recent operation was underway."
2003303-157 = "So, you've seen the scale of our operations. What do you think?"
2003303-158 = "I'd like to hear your impressions. Don't hold anything back!"
2003303-159 = "[s] \"Um... You've really got a lot going on, huh?\""
2003303-160 = "Kiheheh! Well said! Yes, it's just as you say!"
2003303-161 = "Even now, I'm hatching more, greater plans that will increase the Pandemonium Society's influence and profit!"
2003303-162 = "And not to mention..."
2003303-163 = "Spread awareness of the Great Makoto!"
2003303-164 = "Of course, Iroha complains whenever I fund something unilaterally."
2003303-165 = "[s] \"After looking at your operations, I can see why...\""
2003303-166 = "What tremendous ignorance!"
2003303-167 = "Only by advancing in every direction can we eclipse the Prefect Team and establish our supremacy over Gehenna... No, over the entirety of Kivotos!"
2003303-168 = "Surely the greatness of the Pandemonium Society has come home to you now, Sensei."
2003303-169 = "Are you prepared to reconsider my magnificent offer of mutual alliance?"
2003303-170 = "[s] \"Well, Makoto... Sorry, that's a bit—\""
2003303-175 = "Hm? What is this commotion in my streets?"
2003303-177 = "Listen to me—we're on the leading edge of a new merchandise trend! There's no way this won't be a massive hit! This tired old corner shop will be flooded with customers!"
2003303-178 = "That's what you say. I'm sorry, but I'm not interested in making my shopping district the testing grounds for strange goods."
2003303-179 = "But sir, this product doesn't come from just anybody! It was designed by the Pandemonium Society! Imagine the profit we'll make if this deal goes well..."
2003303-180 = "Young people nowadays—you think money is everything! What about my loyal regulars? The people of this neighborhood have been shopping here for decades, they deserve more than...whatever those are!"
2003303-182 = "Can't you see that times are changing? Sir!"
2003303-183 = "You there, what's the meaning of this uproar?"
2003303-184 = "Ah, Ch-Chairman Makoto!"
2003303-185 = "Hm. You're the distributor I met before. Are you having trouble with a client?"
2003303-186 = "Ah, w-well, the thing is..."
2003303-187 = "Aha! So you're the one behind the plague of vendors pushing the Pandemonium Society's special \"Great Makoto Gift Set\" in our shopping district!"
2003303-188 = "[s] \"...Great...Makoto...Gift Set?\""
2003303-189 = "Ah, I do remember signing off on something like that. What about it?"
2003303-190 = "What about it? This corner store is a district institution! Some of my customers have been coming here since they were children! I refuse to replace it with a new gift shop for those ridiculous things!"
2003303-191 = "I'm well aware that your organization owns this property...but please, our local customers have been incredibly loyal to us. They trust me to watch out for their economic interests...I can't turn my back on them!"
2003303-192 = "Yeah!"
2003303-193 = "We're with the president!"
2003303-194 = "Don't destroy our district!"
2003303-196 = "E-Everyone! Y-You shouldn't speak to the chairman this way!"
2003303-197 = "Kiheheheh... So you're standing in the way of my expansion plans... Do you really intend to protest for such parochial reasons?"
2003303-198 = "What utterly unnecessary disorder──"
2003303-199 = "[s] \"W-Wait, Makoto, there's no reason to get mad—\""
2003303-200 = "Listen up!"
2003303-205 = "Our goal is to raise the name of the Pandemonium Society and increase the prosperity of both our organization and Gehenna itself!"
2003303-206 = "...Save for the Prefect Team, of course."
2003303-207 = "I would like to express my deepest apologies for the trouble our expansion has caused you."
2003303-208 = "I have no desire to profit at the cost of your shopping district. Tell me your complaints, so we can find a path forward together. I will take all reasonable claims into account."
2003303-209 = "And if any of you have lost business or wages for coming here to protest today, I promise you will be fully compensated."
2003303-210 = "Is that agreeable?"
2003303-211 = "You're as amazing as they say!"
2003303-212 = "...Is that really okay? What about your expansion plans? You must be on a schedule."
2003303-213 = "Kiheheheh! Of course it's okay! There are no limits to the Great Makoto's generosity and adaptability!"
2003303-214 = "...Except when dealing with the Prefect Team, perhaps."
2003303-215 = "...Thank you. Thank you!"
2003303-220 = "Good. If there are any other issues, contact my office directly."
2003303-221 = "[s] \"Makoto...that was amazing. I'm impressed.\""
2003303-222 = "Ah, that? A trifle."
2003303-223 = "You can't reach the top of the Pandemonium Society without knowing how to address an angry mob."
2003303-224 = "A great leader must take such things in stride."
2003303-225 = "Kiheheheh...but you were impressed, huh? So you're finally ready to enter an alliance with the Pandemonium Society after seeing what I'm capable of, right?"
2003303-226 = "[s] \"No, that's another story.\""
2003303-227 = "Hmph! You're being needlessly difficult!"
2003303-228 = "...Tch. Very well, that's fine."
2003303-229 = "I understand. You hold yourself apart from fools who are easily swayed by the acclaim of a crowd."
2003303-230 = "[s] \"I think you've really overestimated me...\""
2003303-231 = "But the Great Hanuma Makoto does not give up so easily!"
2003303-232 = "One day soon... You'll belong to me, Sensei!"
2003303-233 = "Kiheheh... Kiheheheheh!!! Look forward to that day!"
2003303-234 = "[s] \"Ah, s-sure. I appreciate your patience...\""

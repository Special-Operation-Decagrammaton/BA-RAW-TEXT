2003303-13 = "4;만마전 부원 모브 B;01\n2;만마전 부원 모브 A;01\n#2;m1\n#4;m5\n#2;h\n#4;h\n#wait;1000"
2003303-14 = "4;만마전 부원 모브 B;01\n2;만마전 부원 모브 A;01\n3;마코토;01\n#2;h\n#4;h\n#3;black"
2003303-15 = "4;만마전 부원 모브 B;01\n2;만마전 부원 모브 A;01\n3;마코토;01\n#2;h\n#4;h\n#3;h\n#3;black\n#wait;1500"
2003303-16 = "3;마코토;10;좋아. 그럼 나는 잠시 선생과 볼일이 있으니, 모두 밖에서 대기하고 있도록.\n#3;em;[재잘]\n#3;a"
2003303-17 = "4;만마전 부원 모브 B;01\n2;만마전 부원 모브 A;01\n3;마코토;10\n#2;h\n#4;h\n#2;greeting\n#4;greeting"
2003303-18 = "#na;만마전 부원들;넵!"
2003303-19 = "#st;[0,0];instant;1;"
2003303-20 = "#clearST"
2003303-21 = "4;만마전 부원 모브 B;01\n2;만마전 부원 모브 A;01\n3;마코토;10\n#2;h\n#4;h\n#2;d\n#4;d\n#3;h\n#wait;2500"
2003303-22 = "3;마코토;99;……해서 이 몸이 직접 행차한 참이다만.\n#3;em;[반짝]"
2003303-23 = "[s1] \"아, 응. 어서 와. 준비한 건 별로 없지만 편하게 있다 가.\"\n[s2] \"으음, 커피라도 한 잔, 마실래?\""
2003303-24 = "#wait;10"
2003303-25 = "#wait;10"
2003303-26 = "3;마코토;03;키키킷. 선생의 배려라면 사양하지 않고 고맙게 받도록 하지.\n#3;em;[재잘]"
2003303-27 = "3;마코토;02;그건 그렇고……"
2003303-28 = "3;마코토;03;크큭. 과연, 소문으로만 듣던 샬레의 집무실은 이런 느낌이었나."
2003303-29 = "3;마코토;99;이것 참…….\n#3;em;…"
2003303-30 = "[s] \"……이것 참?\""
2003303-31 = "3;마코토;05;이야기로 전해 들은 것보다도 더욱 답답하고 비좁은 공간이로군!\n#3;em;[!]\n#3;closeup"
2003303-32 = "[s] \"오자마자 아무렇지도 않게 악담을 하고 있잖아. 이 아가씨!\""
2003303-33 = "3;마코토;03;하! 악담이라니. 그럴 리가! 이 몸은 어디까지나 진실을 입에 올렸을 뿐이다!\n#3;em;[재잘]"
2003303-34 = "3;마코토;05;애당초 말이다. 자고로 우수한 리더에겐 그 격에 걸맞은 집무실이 필요한 법!"
2003303-35 = "3;마코토;07;그런데 이런 비좁은 공간에서 과연 제대로 된 업무가 가당키나 하겠나!\n#3;em;[!]"
2003303-36 = "3;마코토;07;이래서야 나 자신의 위엄을 드러내기 위한 흉상을 장식할 장소도 없지 않나. 선생!"
2003303-37 = "3;마코토;06;후우…… 일전에 내가 건넨 제안만 받아들였어도, 이곳과는 비교할 수 없을 만큼 넓고 쾌적한 집무실을 얼마든지 사용할 수 있었을 텐데 말이야.\n#3;em;[한숨]"
2003303-38 = "[s3] \"으음, 지금 쓰는 집무실에 딱히 불만이 있는 건 아니라서…….\"\n[s4] \"그보다 보통은 자기 흉상을 집무실에 장식하지는 않으니까 말이지?!\""
2003303-39 = "#wait;100"
2003303-40 = "#wait;100"
2003303-41 = "3;마코토;01;하여간 저번에 선생이 내 매력적인 제안을 거절하고 난 뒤, 줄곧 그 이유에 대해 생각했었다.\n#3;em;…"
2003303-42 = "3;마코토;99;그렇게 생각에 생각을 거듭한 끝에, 마침내 오늘! 그 이유를 가까스로 깨달을 수가 있었지."
2003303-43 = "[s] \"혹시나 해서 묻는데…… 무슨 이유라고 생각했는데?\""
2003303-44 = "3;마코토;10;크크큭…… 생각해 보면 간단한 이유였지."
2003303-45 = "3;마코토;03;그건 바로……! 선생이 아직 우리 만마전의 진가를 제대로 모르고 있었기에, 남들이라면 절대로 하지 않을 실수를 저질러 버린 게야!\n#3;em;[반응]"
2003303-46 = "[s] \"어…… 실수……?\""
2003303-47 = "3;마코토;99;물론 이는 어디까지나 선생의 잘못이 아니야.\n#3;em;…"
2003303-48 = "3;마코토;01;굳이 잘잘못을 따지자면 사전에 이쪽의 포부와 규모, 미래에 이룩할 성장 가능성 등등."
2003303-49 = "3;마코토;02;그 진정한 위업과 사실을 제대로 전달하지 못한…… 이 마코토 님의 실수라고 할 수 있겠지."
2003303-50 = "3;마코토;99;우수한 리더란 자고로, 자신의 과오도 객관적으로 바라보고 인정할 수 있어야 하는 법!\n#3;em;[!]"
2003303-51 = "3;마코토;02;자, 그런 의미에서 오늘 이 몸께서 선생을 찾아온 이유는 하나."
2003303-52 = "3;마코토;03;오늘 하루, 만마전이 어떠한 곳인지. 이 하누마 마코토 님이 평소 어떠한 위업을 이룩하고, 위정자로서 어떠한 면모를 가졌는지."
2003303-53 = "3;마코토;03;하나하나 빠짐없이, 그 전부를 선생에게 보여주도록 하지!"
2003303-54 = "3;마코토;10;그걸 보고 나면 비로소 선생도 이 몸의 제안을 거절했던 것을, 땅을 치고 후회하며 다시 생각하게 될 테니 말이야! 키히히히힛!!\n#3;em;[반짝]"
2003303-55 = "[s] \"아니, 아무리 그래도 그럴 일은 없을 거 같은데…….\""
2003303-56 = "3;마코토;01;흠! 이러고 있을 때가 아니지."
2003303-57 = "#st;[0,0];instant;1;"
2003303-58 = "#clearST"
2003303-59 = "3;마코토;99\n#3;greeting\n#wait;1000"
2003303-60 = "5;만마전 부원 모브 B;01\n1;만마전 부원 모브 A;01\n3;마코토;99\n#1;ar\n#5;al\n#1;h\n#3;h\n#5;h\n#wait;1500"
2003303-61 = "3;마코토;01;자, 선생을 리무진으로 모셔라."
2003303-62 = "3;마코토;05;지금 바로 만마전의 사업장으로 이동하겠다!\n#3;em;[반응]"
2003303-63 = "[s] \"잠깐……! 마코토, 아직 나 샬레의 업무가……!\""
2003303-64 = "3;마코토;03;키키키킷! 사소한 것엔 신경 쓰지 말도록 선생이여!\n#3;em;[재잘]"
2003303-65 = "3;마코토;03;그보다 앞으로 당신의 그 얼굴이, 경악과 존경으로 물들어 갈 것이 몹시 기대되는군!"
2003303-66 = "3;마코토;05;자! 가자!\n#3;em;[!]"
2003303-67 = "[s] \"이 아가씨! 사람의 말을 전혀 안 듣는구만?!\""
2003303-68 = "#st;[0,0];instant;1;"
2003303-69 = "#clearST"
2003303-70 = "1;만마전 부원 모브 A;01\n5;만마전 부원 모브 B;01\n3;마코토;05\n#3;d\n#1;h\n#3;h\n#5;h\n#wait;2000"
2003303-71 = "1;만마전 부원 모브 A;01\n5;만마전 부원 모브 B;01\n#1;h\n#5;h\n#1;d\n#5;d\n#wait;1500"
2003303-72 = "2;만마전 부원 모브 A;01\n4;만마전 부원 모브 B;01\n#2;h\n#4;h\n#2;a\n#4;a\n#2;closeup\n#4;closeup\n#wait;1500"
2003303-73 = "#all;hide"
2003303-74 = "#wait;3500"
2003303-75 = "#na;(그리하여 난데없이 마코토와 함께하는 만마전 사업장 순회 일정이 시작되었다.)"
2003303-76 = "#all;hide"
2003303-77 = "#wait;3500"
2003303-78 = "3;마코토;10;키시싯. 미래의 잠재적 파트너에게 가장 먼저 소개할 필요가 있는 사업장이라고 한다면…….\n#3;a\n#3;em;…"
2003303-79 = "3;마코토;03;누가 뭐라 해도 바로 이곳이라고 할 수 있겠지!"
2003303-80 = "[s] \"여긴…… 인쇄소?\""
2003303-81 = "3;마코토;99;그래. 인쇄소지.\n#3;em;[반응]"
2003303-82 = "3;마코토;02;다만…… 보기와 다르게 평범하기만 한 인쇄소가 아니야."
2003303-83 = "3;마코토;03;이곳은 우리 만마전이 단독으로 운영하는 인쇄소이며, 그 규모는 무려 게헨나 최대 규모."
2003303-84 = "3;마코토;99;여기에서 생산되는 모든 출판인쇄물…… 그러니까 전단지나 서책, 신문, 마케팅용 판촉물 등은 그 전부가 만마전을……."
2003303-85 = "3;마코토;10;나아가 이 마코토 님을 홍보하고 널리 알리기 위해 제작되는 것들뿐!\n#3;em;[반짝]"
2003303-86 = "[s] \"그 말은 즉…….\""
2003303-87 = "3;마코토;10;크크큭, 그래! 이 마코토 님께서는 이미 종이를 통한 출판인쇄업을, 보다 나아가 종이 미디어 산업 그 자체를 장악했단 것이다!\n#3;em;[!]\n#3;jump"
2003303-88 = "3;마코토;10;지금은 비록 미약한 규모일 뿐이지만…… 그 성장세는 날이 갈수록 늘어날 테지."
2003303-89 = "3;마코토;03;이대로라면 게헨나의 모든 언론을 손에 넣는 것도 시간문제!"
2003303-90 = "3;마코토;03;자, 어떤가. 선생이여. 키보토스에서 이만한 사업을 굴리는 자는 이 마코토 님 외에는 달리 없을 터!\n#3;em;[반응]"
2003303-91 = "3;마코토;03;이것으로 이 몸의 대단함을 조금은 더 잘 알 수 있게 되지 않았나?"
2003303-92 = "[s] \"아…… 응, 굉장하긴 한데.\""
2003303-93 = "3;마코토;04;으으음?! 이걸 보고도 그런 미적지근한 반응이라니……?\n#3;em;[?!]"
2003303-94 = "[s5] \"이미 이거랑 비슷한 걸 본 적이 있다고 할지…….\"\n[s6] \"크다고 해서 전부가 아니라는 걸 이미 경험했다고 할지…….\""
2003303-95 = "#wait;100"
2003303-96 = "#wait;100"
2003303-97 = "3;마코토;11;뭐, 뭣이…… 선생…… 그대는 대체 얼마나 되는 수라장을 거쳐왔기에……\n#3;em;[땀]\n#3;stiff"
2003303-98 = "3;마코토;06;그래, 이만한 사업 정도로는 눈썹 하나 까딱이지 않는다는 건가."
2003303-99 = "3;마코토;07;좋다! 아직 이걸로 끝이 아니다! 진짜 시작은 지금부터다!\n#3;em;[!]"
2003303-100 = "3;마코토;05;자! 다음 사업장으로 가는 거다!"
2003303-101 = "#all;hide"
2003303-102 = "#wait;2000"
2003303-103 = "3;마코토;03;다음은 이곳이다!\n#3;a\n#3;em;[반응]"
2003303-104 = "[s] \"보아하니 공사가 한창이네. 뭐 하는 장소야?\""
2003303-105 = "3;마코토;10;키시싯. 그건 말이지.\n#3;em;[재잘]"
2003303-106 = "5;건설 현장 담당자;00;이거이거, 투자자님 아니십니까. 오늘은 시찰이십니까?\n#5;a\n#3;m1\n#5;em;[음표]"
2003303-107 = "3;마코토;03;아아, 공사는 순조롭게 진행되고 있나?"
2003303-108 = "5;건설 현장 담당자;00;하하! 그야 말이 필요 없을 정도로 순조로운 상황이지요.\n#5;em;[재잘]"
2003303-109 = "5;건설 현장 담당자;00;기대해 주십시오! 조만간 하누마 마코토 님의 위용을 증명하는 초고층 빌딩……!"
2003303-110 = "#all;hide"
2003303-111 = "3;건설 현장 담당자;00;<마코토 타워>가 완공되면 뭇 키보토스의 학생들이 투자자님을 우러러볼 터이니!\n#3;closeup\n#3;em;[!]"
2003303-112 = "[s] \"마코토…… 타워?\""
2003303-113 = "3;마코토;10;크크큭. 그래. 이름 그대로 이곳에서 짓고 있는 건 이 몸의 이름을 딴 빌딩…….\n#3;em;…"
2003303-114 = "3;마코토;03;그 크기와 규모는 무려…… 샬레의 생텀 타워를 능가할 정도!"
2003303-115 = "3;건설 현장 담당자;00;그렇지요. 저희는 투자자님의 강력한 의지와 아낌없는 투자에 따라, 열심히 빌딩을 짓고 있습니다요."
2003303-116 = "3;마코토;05;목표는…… 게헨나는 물론, 트리니티, 밀레니엄, 나아가 백귀야행과 붉은겨울 연방학원에서도 보일 정도의 높이를 가진 빌딩의 건설이다!"
2003303-117 = "[s] \"물리적으로 불가능하지 않아. 그거?!\""
2003303-118 = "3;마코토;00;흥! 무슨 나약한 소리를! 당연히 가능하다! 누가 뭐라 해도 이 마코토 님이 만드는 것이니까!\n#3;em;[반응]"
2003303-119 = "5;건설 현장 담당자;00;후후, 정확히 말하자면 만드는 건 저희지만요.\n#3;m1\n#5;a"
2003303-120 = "3;마코토;03;키시싯! 사소한 이야기로군!"
2003303-121 = "5;건설 현장 담당자;00;후후후! 예. 사소하지요. 저희는 그저 투자자님의 의뢰를 대행할 뿐이니!\n#5;em;[음표]"

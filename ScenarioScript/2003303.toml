[translation]
2003303-1 = "แผนธุรกิจของท่านประธานผู้ยิ่งใหญ่"
2003303-8 = "[ns] \"เอ๋...?\""
2003303-9 = "ท่านประธานฮานุมะ มาโคโตะมาถึงแล้วค่ะ!"
2003303-16 = "อื้ม หลังจากนี้เรากับคุณครูจะคุยธุระกัน ทุกคนออกไปรอข้างนอกก่อน"
2003303-18 = "ค่ะ!"
2003303-22 = "ที่เรามาพบคุณครูด้วยตัวเองในวันนี้..."
2003303-23 = "[s1] \"อ้อ ครูไม่ได้เตรียมอะไรไว้ นั่งเล่นตามสบายก่อนก็ได้\"\n[s2] \"อืม... ดื่มกาแฟสักหน่อยมั้ย?\""
2003303-26 = "คิกคิกคิก ถ้าคุณครูหยิบยื่นน้ำใจให้แบบนั้น เราก็ขอรับไว้ด้วยความยินดี"
2003303-27 = "ยิ่งกว่านั้น..."
2003303-28 = "หึ... สำนักงานของชาเล่ต์ที่ได้ยินคำร่ำลือมาเป็นแบบนี้เองสินะ "
2003303-29 = "แบบนี้มัน..."
2003303-30 = "[s] \"แบบนี้มัน...?\""
2003303-31 = "ช่างเป็นที่ที่คับแคบและน่าอึดอัดกว่าที่เคยได้ยินมาซะอีก!"
2003303-32 = "[s] \"มาถึงไม่ทันไรก็บ่นอย่างเดียวเลยนะ เด็กคนนี้!\""
2003303-33 = "เฮอะ! บ่นอย่างนั้นเหรอ เราไม่ได้บ่นสักหน่อย สิ่งที่เราพูดมีแต่ความจริงทั้งนั้น!"
2003303-34 = "ผู้นำที่เพียบพร้อมและยิ่งใหญ่อย่างเราก็ต้องคู่ควรกับสำนักงานที่เหมาะสมสิ!"
2003303-35 = "เพราะงั้นจะให้เราทำงานต่างๆ ในพื้นที่คับแคบแบบนี้ได้ยังไง!"
2003303-36 = "ไม่มีพื้นที่ที่จะให้เราเอารูปปั้นของเรามาตกแต่ง เพื่อแสดงความยิ่งใหญ่ของเราได้เลยหรือไงห้ะ!"
2003303-37 = "ฮู่ว... หากยอมรับข้อเสนอที่เราให้ไปก่อนหน้านี้ ก็คงจะได้ใช้สำนักงานของเราที่กว้างขวาง และสะดวกสบายกว่าห้องรูหนูแบบนี้"
2003303-38 = "[s3] \"อืม ครูก็ไม่ได้รู้สึกแย่อะไรกับห้องสำนักงานตอนนี้นะ...\"\n[s4] \"ไม่มีใครเขาเอารูปปั้นตัวเองมาแต่งห้องทำงานกันหรอก?!\""
2003303-41 = "ยังไงก็เถอะ หลังจากคุณครูปฏิเสธข้อเสนอของเราเมื่อคราวก่อน เราก็ทบทวนเหตุผลเรื่องนั้นมาโดย#nตลอด"
2003303-42 = "หลังลองคิดทบทวนอยู่นาน ในที่สุดวันนี้... เราก็เข้าใจถึงเหตุผลนั้นแล้ว!"
2003303-43 = "[s] \"แค่ถามไว้เฉยๆ นะ... เข้าใจว่าอะไรเหรอ?\""
2003303-44 = "หึหึหึ... พอคิดดูแล้ว มันก็เป็นเหตุผลที่เรียบง่ายมาก"
2003303-45 = "นั่นก็คือ...! คุณครูยังไม่รู้ถึงคุณค่าที่แท้จริงของแพนเดโมเนียม โซไซตี้ยังไงล่ะ ถ้าเป็นคนอื่นละก็ คงไม่มีทางทำเรื่องผิดพลาดอย่างการปฏิเสธพวกเราหรอก!"
2003303-46 = "[s] \"เอ่อ เรื่องผิดพลาดเหรอ...?\""
2003303-47 = "แน่นอนว่ามันไม่ใช่ความผิดของคุณครูทั้งหมดหรอก"
2003303-48 = "ถ้าจะพูดกันถึงเรื่องผิดถูกละก็... คงเป็นความผิดพลาดของเราเองซะมากกว่า"
2003303-49 = "ที่ไม่ได้แสดงให้คุณครูเห็นถึงขนาดและรากฐานของเรา รวมถึงความเป็นไปได้ในการเติบโตในอนาคต และความยิ่งใหญ่ของเรา"
2003303-50 = "ในฐานะผู้นำที่มากความสามารถคนหนึ่ง เราก็กล้าหาญพอที่จะทบทวนและยอมรับความผิดพลาดของ#nตัวเอง!"
2003303-51 = "เพราะฉะนั้นหนึ่งในเหตุผลที่เรามาพบคุณครูในวันนี้"
2003303-52 = "ก็เพื่อใช้เวลาหนึ่งวันแสดงให้คุณครูได้เห็นว่าแพนเดโมเนียม โซไซตี้เป็นยังไง#nและท่านฮานุมะ มาโคโตะผู้นี้ยิ่งใหญ่แค่ไหน และในฐานะผู้ปกครองที่แท้จริงเราเป็นอย่างไร"
2003303-53 = "เราจะพาคุณครูไปดูทุกๆ อย่างไม่ให้ขาดตกไปเลยแม้แต่อย่างเดียว!"
2003303-54 = "หลังจากได้เห็น คุณครูก็คงจะเสียใจจนน้ำตาไหลพรากที่ปฏิเสธข้อเสนอของเรา และคิดทบทวนเรื่อง#nข้อเสนอใหม่อีกครั้งแน่ๆ! คิกคิกคิก คิกๆๆ!!"
2003303-55 = "[s] \"ไม่นะ คงไม่เป็นอย่างนั้นหรอก...\""
2003303-56 = "ฮึ่ม! นี่ไม่ใช่เวลาจะมามัวคุยอะไรแบบนี้"
2003303-61 = "เอ้า รีบพาคุณครูไปที่รถลีมูซีนซะ"
2003303-62 = "เราจะไปที่แหล่งธุรกิจของแพนเดโมเนียม โซไซตี้กัน!"
2003303-63 = "[s] \"เดี๋ยวก่อนสิ มาโคโตะ! ครูยังมีงานของทางชาเล่ต์อยู่นะ...!\""
2003303-64 = "คิกคิกคิก คิกคิกๆ เรื่องเล็กๆ น้อยๆ พรรค์นั้นน่ะ ช่างมันเถอะ!"
2003303-65 = "หลังจากนี้น่ะ เราคาดหวังที่จะได้เห็นใบหน้าที่เต็มไปด้วยความประหลาดใจและความชื่นชมในตัวเรา#nอยู่นะ!"
2003303-66 = "เอ้า ไปกันเถอะ!"
2003303-67 = "[s] \"ดะ...เด็กคนนี้! ไม่ยอมฟังคนอื่นพูดเลยเรอะ?!\""
2003303-75 = "(หลังจากนั้นการลาดตระเวนชมแหล่งธุรกิจของแพนเดโมเนียม โซไซตี้กับมาโคโตะก็ได้เริ่มขึ้น)"
2003303-78 = "คิกคิกคิก ถ้าเป็นธุรกิจที่เราต้องแนะนำให้กับว่าที่พันธมิตรอันแข็งแกร่งของเราในอนาคตละก็..."
2003303-79 = "ก็ต้องเป็นที่นี่เท่านั้น!"
2003303-80 = "[s] \"ที่นี่... โรงพิมพ์งั้นเหรอ?\""
2003303-81 = "ใช่แล้ว โรงพิมพ์ยังไงล่ะ"
2003303-82 = "แต่ว่า... ที่นี่ไม่ใช่โรงพิมพ์ธรรมดาๆ เหมือนรูปลักษณ์ภายนอกที่เห็นหรอกนะ"
2003303-83 = "ที่นี่คือโรงพิมพ์ที่ทางแพนเดโมเนียม โซไซตี้ของเราดูแลอยู่ และยังเป็นโรงพิมพ์ที่มีขนาดใหญ่ที่สุด#nในเกเฮนน่าด้วย"
2003303-84 = "สิ่งพิมพ์ทั้งหมดที่พิมพ์ขึ้นที่นี่... รวมถึงพวกใบปลิว หนังสือ หนังสือพิมพ์ นิตยสาร เอกสารโปรโมชั่น#nต่างๆ พวกนั้น..."
2003303-85 = "ต่างก็เป็นสิ่งที่ทำขึ้นมาเพื่อเผยแพร่ทำให้ท่านมาโคโตะผู้นี้ และแพนเดโมเนียม โซไซตี้เป็นที่รู้จักมาก#nขึ้น!"
2003303-86 = "[s] \"นั่นก็แปลว่า...\""
2003303-87 = "คิกคิกคิก ใช่แล้ว! ท่านมาโคโตะผู้นี้ได้เข้าควบคุมธุรกิจสิ่งพิมพ์ และอุตสาหกรรมสื่อสิ่งพิมพ์ทั้งหมด#nเอาไว้แล้ว!"
2003303-88 = "ถึงตอนนี้จะยังเป็นแค่ธุรกิจเล็กๆ... แต่ก็มีแนวโน้มที่จะเติบโตขึ้นในอนาคต"
2003303-89 = "ถ้าเป็นแบบนี้ละก็ เรื่องที่เราจะได้สื่อทุกชนิดของเกเฮนน่ามาไว้ในกำมือ... ก็ขึ้นอยู่กับเวลาแล้ว!"
2003303-90 = "เอ้า คิดว่ายังไง คุณครู ในคิโวทอสคงไม่มีใครที่มีอำนาจเหนือธุรกิจนี้อีกแล้วนอกจากเรา ท่านมาโคโตะผู้นี้!"
2003303-91 = "เท่านี้ก็พอจะรู้ถึงความสำเร็จอันยิ่งใหญ่ของเราบ้างแล้วหรือยัง?"
2003303-92 = "[s] \"อ่า...อื้ม น่าทึ่งมากเลย\""
2003303-93 = "หืมมม?! เห็นแบบนี้แล้วยังมีปฏิกิริยาที่เรียบเฉยแบบนั้นได้อีกเหรอ...?"
2003303-94 = "[s5] \"ครูเคยเห็นอะไรคล้ายๆ กันแบบนี้มาก่อนแล้วน่ะ...\"\n[s6] \"แค่มีขนาดใหญ่ก็ใช่ว่าจะดีเสมอไปนี่...\""
2003303-97 = "อะ...อะไรเนี่ย... คุณครู... ต้องผ่านร้อนผ่านหนาวมาขนาดไหนกัน..."
2003303-98 = "อื้ม ธุรกิจแบบนี้ไม่ทำให้รู้สึกอะไรเลยสินะ"
2003303-99 = "ดีละ! ยังไม่หมดเท่านี้หรอกนะ! ของจริงจะเริ่มตั้งแต่นี้ไปต่างหาก!"
2003303-100 = "เอ้า ไปสถานที่ต่อไปกันเลยดีกว่า!"
2003303-103 = "สถานที่ต่อไปก็คือที่นี่!"
2003303-104 = "[s] \"ดูเหมือนจะอยู่ระหว่างก่อสร้างสินะ ที่นี่คือที่ไหนเหรอ?\""
2003303-105 = "หึหึหึ เรื่องนั้นน่ะ..."
2003303-106 = "นั่นไงๆ นั่นคุณผู้ลงทุนนี่นา วันนี้ก็มาตรวจงานเหรอครับ?"
2003303-107 = "อื้อ การก่อสร้างราบรื่นดีรึเปล่า?"
2003303-108 = "ฮ่าฮ่า! ทุกอย่างราบรื่นสุดๆ เลยละครับ"
2003303-109 = "คอยดูได้เลยครับ! ตึกสูงเสียดฟ้าที่แสดงถึงความยิ่งใหญ่ของท่านฮานุมะ มาโคโตะ...!"
2003303-111 = "เมื่อตึก <มาโคโตะทาวเวอร์> เสร็จสมบูรณ์เมื่อไหร่ นักเรียนทุกคนในคิโวทอสก็จะต้องแหงนหน้ามอง#nความยิ่งใหญ่ของท่านมาโคโตะ...!"
2003303-112 = "[s] \"มาโคโตะทาวเวอร์...?\""
2003303-113 = "หึหึหึ ใช่แล้ว เรากำลังสร้างอาคารที่คู่ควรกับชื่อที่ยิ่งใหญ่ของเรา..."
2003303-114 = "ขนาดและความสูงของอาคารนี้... ก็คงสูงกว่าแซงทัมทาวเวอร์ของชาเล่ต์อีก!"
2003303-115 = "ใช่แล้วละครับ พวกเรากำลังทุ่มเทก่อสร้างอาคารตามที่คุณผู้ลงทุนต้องการอยู่"
2003303-116 = "เป้าหมายของเราก็คือ... การสร้างตึกที่สูงระฟ้าที่มองเห็นได้จากทั้งเกเฮนน่า ทรีนิตี้ มิลเลเนียม เฮียกคิยาโค และแม้แต่ที่เรดวินเทอร์ด้วย!"
2003303-117 = "[s] \"เรื่องนั้นมันเป็นไปไม่ได้เลยไม่ใช่รึไง?!\""
2003303-118 = "ฮึ่ม! พูดอะไรไม่รื่นหูซะจริงๆ! มันต้องเป็นไปได้อยู่แล้วสิ! ท่านมาโคโตะผู้นี้เป็นคนลงมือเองเชียวนะ!"
2003303-119 = "ฮุฮุ ถ้าจะพูดให้ถูก... คนที่ลงมือคือพวกเราต่างหากล่ะครับ"
2003303-120 = "คิกคิกคิก... เรื่องเล็กๆ น้อยๆ น่ะช่างมันเถอะ!"
2003303-121 = "ฮุฮุฮุ... คร้าบๆ เรื่องเล็กน้อยครับ... พวกเราก็แค่ทำตามที่คุณผู้ลงทุนต้องการก็เท่านั้น!"
2003303-123 = "คิกคิกคิก คิกคิกๆ...!"
2003303-124 = "ฮุฮุฮุ!"
2003303-126 = "พออาคารนี้สร้างเสร็จ ก็จะกลายเป็นแลนด์มาร์กและสถานที่ท่องเที่ยวสำคัญของเกเฮนน่าที่จะดึงดูด#nผู้คนจากเขตอื่นๆ ให้มาที่นี่ยังไงล่ะ"
2003303-127 = "ถ้าเป็นอย่างนั้นเราก็จะมีรายได้มหาศาลจากการท่องเที่ยว... และยังทำให้ชื่อเสียงของแพนเดโมเนียม โซไซตี้เป็นที่รู้จักไปทั่วคิโวทอสอีกด้วย!"
2003303-128 = "พวกคณะกรรมการวินัยเองก็คงคาดไม่ถึง... แผนการยอดเยี่ยมที่มีแค่ท่านมาโคโตะผู้นี้เท่านั้นที่จะ#nทำได้สำเร็จ!"
2003303-129 = "เอ้า ว่ายังไงล่ะ คุณครู! เราอยากฟังความประทับใจของคุณครูหลังได้เห็นอาคารนี้แล้วน่ะ"
2003303-130 = "หืม...? มันก็เท่ดี แต่ทำอะไรหละหลวมไปรึเปล่าอย่างนั้นเหรอ?"
2003303-131 = "ได้ลองคิดถึงปัญหางบประมาณที่ใช้ได้ในความเป็นจริง หรือหาข้อมูลเกี่ยวกับแผนการท่องเที่ยวบ้าง#nหรือเปล่า... งั้นเหรอ?"
2003303-132 = "หึหึหึ คุณครู เอาแต่พูดเรื่องที่ไม่รื่นหูซะจริงๆ นะ"
2003303-133 = "[s] \"ไม่รื่นหู... จะปัดทิ้งไปแบบนี้งั้นเหรอ...?\""
2003303-134 = "ใช่แล้ว! สิ่งที่ต้องให้ความสำคัญน่ะ ไม่ใช่พวก <ข้อจำกัด> ในความเป็นจริงอะไรพวกนั้นหรอก...!"
2003303-135 = "สิ่งที่สำคัญที่สุดก็คือ <มันคือสิ่งที่อยากทำใช่หรือไม่> หรือไม่ก็ <ทำแล้วจะออกมาเท่สุดๆ หรือไม่> แบบนี้ต่างหาก..."
2003303-136 = "หรือก็คือเราจะทำตามความปรารถนาของเรา!"
2003303-137 = "[s] \"พูดเอาแต่ใจแบบนั้นก็ได้เรอะ?!...\""
2003303-138 = "แต่ก็เอาเถอะ อาคารที่ยังสร้างไม่เสร็จแบบนี้ก็อาจจะยังไม่พอที่จะทำให้คุณครูเชื่อได้"
2003303-139 = "ถ้างั้นก็ไปที่ต่อไป!"
2003303-141 = "(หลังจากนั้นคุณครูกับมาโคโตะก็ได้ไปเยี่ยมเยียนสถานที่ต่างๆ อีกหลายที่ด้วยความรู้สึกเป็นกังวล...)"
2003303-143 = "ที่นี่คือห้างสรรพสินค้าที่มีป็อปอัปสโตร์ของแพนเดโมเนียม โซไซตี้เปิดอยู่"
2003303-144 = "มีตั้งแต่โปสเตอร์ ฟิกเกอร์ที่แสดงถึงความยิ่งใหญ่ของเรา... แล้วก็พวกสินค้าเบ็ดเตล็ดต่างๆ ที่ตอนนี้กำลังอยู่ระหว่างการสั่งผลิต"
2003303-145 = "อื้ม ทุกอย่างเป็นไปด้วยดี! ในอนาคตเราวางแผนที่จะเปิดขายสินค้าหลายๆ อย่างผ่านช่องทาง#nออนไลน์ด้วย! ถ้าทำแบบนั้นก็จะช่วยทำให้ชื่อเสียงของท่านมาโคโตะเป็นที่รู้จักมากขึ้น...!"
2003303-147 = "หึหึหึ! ที่นี่คือรีสอร์ตที่ทางแพนเดโมเนียม โซไซตี้ของเราบริหารอยู่"
2003303-148 = "ผู้ที่มาเข้าพักที่รีสอร์ตทุกคนจะได้รับส่วนลดค่าบริการพิเศษ และได้รับเข็มกลัดแฟนคลับ#nแพนเดโมเนียม โซไซตี้เพื่อแสดงถึงอำนาจของเรา...!"
2003303-156 = "(หลังจากไปดูธุรกิจของแพนเดโมเนียม โซไซตี้ในที่ต่างๆ มา คุณครูกับมาโคโตะก็มาถึงย่านการค้า#nใกล้ๆ กับเกเฮนน่า)"
2003303-157 = "เอาละ หลังจากไปดูที่ต่างๆ มาแล้ว เป็นยังไงบ้างล่ะ"
2003303-158 = "เราอยากฟังความประทับใจของคุณครู"
2003303-159 = "[s] \"อืม... มาโคโตะก็ทำอะไรหลายๆ อย่างเลยเนอะ\""
2003303-160 = "คิกคิกคิก เข้าใจได้ถูกต้องแล้ว ใช่แล้วละ เป็นอย่างที่พูดมาจริงๆ"
2003303-161 = "ในตอนนี้เอง เราก็ครุ่นคิดอยู่ตลอดว่าจะทำยังไงถึงจะขยายอำนาจและเพิ่มผลกำไรให้กับทาง#nแพนเดโมเนียม โซไซตี้ได้ หลังคิดทบทวนเรื่องนี้อยู่นาน"
2003303-162 = "แล้วก็..."
2003303-163 = "คิดเรื่องที่ว่าจะเผยแพร่ชื่อเสียงความยิ่งใหญ่ของท่านมาโคโตะผู้นี้ได้ยังไงด้วย!"
2003303-164 = "แน่นอนว่าเวลาเราขยายธุรกิจใหม่เพิ่มมา ยัยอิโรฮะก็จะชอบบ่นงึมงำๆ ทุกที"
2003303-165 = "[s] \"พอไปดูธุรกิจหลายๆ อย่างมาก็พอเข้าใจอิโรฮะได้...\""
2003303-166 = "พะ...พูดอะไรไม่เห็นรู้เรื่องเลย!"
2003303-167 = "ถ้าขยายอิทธิพลของแพนเดโมเนียม โซไซตี้ไปทีละนิดแบบนี้ละก็ คงจัดการพวกคณะกรรมการวินัย... แล้วก็ควบคุมทั้งเกเฮนน่าได้ ไม่สิ ถ้าเป็นแบบนี้จะเข้าควบคุมทั้งคิโวทอสเลยก็ยังได้!"
2003303-168 = "เท่านี้ก็คงเห็นแล้วใช่ไหมว่าแพนเดโมเนียม โซไซตี้ของเรายอดเยี่ยมแค่ไหนน่ะ คุณครู"
2003303-169 = "เอ้า เป็นยังไง รู้สึกอยากรับข้อเสนอของเราแล้วรึยัง?"
2003303-170 = "[s] \"อืม... โทษทีนะมาโคโตะ เรื่องนั้นคงลำบากน่ะ...\""
2003303-175 = "หืม? ว่าอะไรนะ?"
2003303-177 = "นี่เป็นสินค้าที่ได้รับการตรวจสอบแล้วนะครับ เรามั่นใจว่าสินค้าพวกนี้จะสร้างอนาคตใหม่ๆ ให้กับ#nร้านค้าของที่ระลึกที่เก่าคร่ำครึและแสนน่าเบื่อในตอนนี้ได้แน่นอนครับ!"
2003303-178 = "เรื่องนั้นฉันไม่สนหรอก ก็บอกแล้วไงว่าเอาของแบบนั้นมาวางขายในย่านการค้าของเราตามอำเภอใจ#nไม่ได้น่ะ!"
2003303-179 = "คุณครับ...! อย่าทำแบบนี้เลย อีกฝ่ายคือแพนเดโมเนียม โซไซตี้เลยนะครับ! ถ้าข้อตกลงคราวนี้ไปได้#nสวยละก็ ธุรกิจของเราคงจะรุ่งเรืองขึ้นอีก..."
2003303-180 = "พวกคนหนุ่มสาวสมัยนี้นี่จริงๆ เลย! คิดว่าเงินซื้อได้ทุกอย่างรึยังไง! ถ้าเราขายแค่สินค้าพวกนั้น แล้วลูกค้าประจำของเราจะทำยังไงล่ะ?"
2003303-182 = "ยุคสมัยมันเปลี่ยนไปแล้วนะครับ ผู้อาวุโส!"
2003303-183 = "นี่ ตรงนั้นน่ะ มีเรื่องอะไรรึไง?"
2003303-184 = "อ๊ะ ทะ...ท่านมาโคโตะ!"
2003303-185 = "อืม ทางนั้นคือคนส่งสินค้าที่เจอเมื่อคราวก่อนสินะ ดูเหมือนกำลังมีปัญหาอยู่เลย?"
2003303-186 = "ระ...เรื่องนั้น..."
2003303-187 = "อะฮ่า เธอคือคนที่สั่งให้พวกพ่อค้าคนกลางเอา <เซ็ตของขวัญพิเศษของท่านฮานุมะ มาโคโตะ> จากแพนเดโมเนียม โซไซตี้ มาวางขายในย่านการค้าของเราใช่มั้ย?"
2003303-188 = "[s] \"เซ็ตของขวัญ... มาโคโตะ?\""
2003303-189 = "อ้อ เราเคยวางแผนเรื่องสินค้าแบบนั้นไว้เหมือนกันนะ แล้วยังไง?"
2003303-190 = "ถ้างั้นฉันก็ขอบอกให้ชัดๆ เลยแล้วกันนะ เธอเข้ามาก่อกวนและทำลายร้านของที่ระลึกดั้งเดิมที่มีลูกค้า#nประจำในย่านการค้าเพื่อนำสินค้าไม่ระบุที่มาที่ไปแบบนั้นมาขายแทน"
2003303-191 = "ถึงจะเป็นร้านที่เธอกว้านซื้อไปก็เถอะ แต่ทำแบบนี้มันไม่เกินไปหน่อยรึไง! แล้วลูกค้าประจำจะไปหา#nซื้อสินค้าที่ซื้อบ่อยๆ ที่ไหน? ในฐานะผู้ดูแลย่านการค้า ฉันไม่ยกโทษให้การกระทำแบบนี้เด็ดขาด!"
2003303-192 = "ใช่แล้ว!"
2003303-193 = "ท่านประธานพูดถูกแล้ว!"
2003303-194 = "เลิกทำอะไรบ้าๆ แบบนี้ได้แล้ว!"
2003303-196 = "ทะ...ทุกคนครับ! ถึงจะอย่างนั้นก็เถอะ แต่พูดแบบนั้นมันค่อนข้างรุนแรง...!"
2003303-197 = "ถ้างั้น... คิกคิกคิก คิดจะใช้เหตุผลพรรค์นี้มาขัดขวางการซื้อกิจการของเราสินะ อย่างนี้นี่เอง "
2003303-198 = "ให้ตาย จริงๆ เลยเชียว..."
2003303-199 = "[s] \"ดะ...เดี๋ยวก่อน มาโคโตะ อย่าเพิ่งใช้อารมณ์สิ...\""
2003303-200 = "ทุกคนฟังให้ดี!"
2003303-205 = "เป้าหมายธุรกิจของเราคือการทำให้ชื่อเสียงของแพนเดโมเนียม โซไซตี้เป็นที่รู้จักให้มากขึ้น นี่เป็นสิ่งที่เราทำเพื่อความสัมพันธ์ที่ดีระหว่างทุกคนในเกเฮนน่าและแพนเดโมเนียม โซไซตี้!"
2003303-206 = "...อ่า พวกคณะกรรมการวินัยถือเป็นข้อยกเว้น"
2003303-207 = "เพราะงั้นแล้ว เราขอแสดงความเสียใจที่เกิดปัญหาแบบนั้นขึ้นโดยไม่ได้ตั้งใจ"
2003303-208 = "เราไม่ได้ต้องการให้เกิดความขัดแย้งใดๆ กับทางย่านการค้า เพราะงั้นหากมีเรื่องที่ต้องการร้องเรียน แล้วแจ้งเข้ามา เราก็จะรับฟังและตรวจสอบให้เอง"
2003303-209 = "ถ้าจำเป็นก็จะหาข้อตกลงและการประณีประนอมที่เหมาะสมด้วย"
2003303-210 = "ว่ายังไงล่ะ?"
2003303-211 = "เด็กคนนี้ก็พูดรู้เรื่องเหมือนกันนี่นา!"
2003303-212 = "...เธอจะทำแบบนั้นได้จริงๆ เหรอ?"
2003303-213 = "คิกคิกคิก เรื่องนั้นสบายมาก ท่านมาโคโตะผู้นี้น่ะ ที่จริงแล้วเป็นคนใจกว้างและมีเมตตามากนะ"
2003303-214 = "อ้อ ยกเว้นกับพวกคณะกรรมการวินัยนะ"
2003303-215 = "ขอบใจนะ ขอบใจจริงๆ!"
2003303-220 = "ฮื่อ เท่านี้ก็เรียบร้อยแล้วสินะ"
2003303-221 = "[s] \"เรื่องเมื่อกี้น่าตกใจทีเดียวนะ มาโคโตะ สุดยอดเลย\""
2003303-222 = "อ้อ เรื่องเมื่อกี้น่ะเหรอ"
2003303-223 = "ในฐานะผู้นำสูงสุดของแพนเดโมเนียม โซไซตี้ เรามักเจอเรื่องแบบนี้ประจำเลยละ"
2003303-224 = "ในฐานะผู้นำจะหวั่นไหวเพราะเหตุการณ์เล็กๆ แบบนี้ได้ยังไงกัน"
2003303-225 = "ยิ่งกว่านั้น... หึหึหึ เป็นยังไงบ้างล่ะ? พอได้เห็นภาพลักษณ์ที่น่าเชื่อถือของเราเมื่อครู่นี้แล้ว ก็ถึงเวลาที่#nจะคิดทบทวนเรื่องข้อเสนอความร่วมมือกับแพนเดโมเนียม โซไซตี้ใหม่แล้วใช่มั้ย?"
2003303-226 = "[s] \"ไม่ละ เรื่องนั้นมันคนละเรื่องกัน\""
2003303-227 = "อึกกก! ยังไงก็ไม่ได้จริงๆ เหรอเนี่ย!"
2003303-228 = "ฮึ่ม... ก็ได้"
2003303-229 = "ช่างแตกต่างจากคนอื่นๆ ที่ถูกชักจูงได้อย่างง่ายดายด้วยชื่อเสียงเงินทองเสียจริงๆ"
2003303-230 = "[s] \"ครูคิดว่าชมกันเกินไปแล้วนะ...\""
2003303-231 = "แต่ว่า...! ฮานุมะ มาโคโตะผู้นี้ จะไม่ยอมแพ้ง่ายๆ เด็ดขาด"
2003303-232 = "คอยดูเถอะ... สักวันหนึ่งเราจะทำให้คุณครูเป็นของเราให้ได้!"
2003303-233 = "หึหึหึ... คิกคิกคิก คิกคิก!! คอยดูให้ดีละ!"
2003303-234 = "[s] \"อ้อ อืมๆ ครูจะคอยดูละกัน...\""

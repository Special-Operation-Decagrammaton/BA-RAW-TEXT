[translation]
2003303-1 = "偉大議長的事業"
2003303-8 = "[ns]「……嗯？」"
2003303-9 = "羽沼真琴議長！入場！"
2003303-16 = "我和老師有事要談，大家先去外面等吧。"
2003303-18 = "是！"
2003303-22 = "……我親自過來了。"
2003303-23 = "[s1]「啊，嗯，歡迎你來。不過我沒特別做準備，你放輕鬆就行了。」\n[s2]「要不要喝杯咖啡？」"
2003303-26 = "嘻嘻嘻。#n如果這是老師的體恤，我就心懷感激地接受了。"
2003303-27 = "不過……"
2003303-28 = "嘻嘻，這就是傳聞中的夏萊辦公室啊？"
2003303-29 = "還真是……"
2003303-30 = "[s]「……還真是？」"
2003303-31 = "比傳聞中還要沉悶和狹窄！"
2003303-32 = "[s]「怎麼才剛來就毫不掩飾開始批評呢！」"
2003303-33 = "哈！這怎麼會是批評呢！我只是在陳述事實而已！"
2003303-34 = "自古以來，優秀的領導者就該擁有相配的辦公室！"
2003303-35 = "在這種狹窄的空間真的能好好執行工作嗎？"
2003303-36 = "這樣根本就沒有地方，可以掛上能呈現我威嚴的半身照不是嗎！老師！"
2003303-37 = "真是的……如果你先前接受我的提案，應該就能使用比這裡更寬敞舒適的辦公室了。"
2003303-38 = "[s3]「唔嗯，我對目前使用的辦公室並沒有什麼不滿……」\n[s4]「不過通常不會把自己的半身照掛在辦公室吧！？」"
2003303-41 = "上次老師拒絕我那深具魅力的提案之後，我就一直在思考原因。"
2003303-42 = "經過我的左思右想，終於在今天好不容易想通了！"
2003303-43 = "[s]「可以告訴我……你認為理由是什麼嗎？」"
2003303-44 = "嘻嘻嘻……理由相當簡單。"
2003303-45 = "那就是……！因為老師還不清楚我們萬魔殿真正的價值！#n所以才犯了別人絕對不會犯下的錯誤！"
2003303-46 = "[s]「錯誤……？」"
2003303-47 = "當然這也不能說是老師的錯。"
2003303-48 = "硬要追究起來……#n都怪我們沒有事先說清楚我們的抱負、規模、未來的成長潛力等等……"
2003303-49 = "好讓老師清楚明白我們的豐功偉業……這確實能說是我真琴大人的疏失。"
2003303-50 = "一名優秀的領導者，必須要能站在客觀的角度，審視和承認自身的錯誤！"
2003303-51 = "所以基於這樣的理由，今天我來見老師的原因就只有一個。"
2003303-52 = "今天一整天，我會針對萬魔殿是什麼樣的地方……#n我羽沼真琴大人平常完成了何種偉業，以及執政者擁有的面貌……"
2003303-53 = "我全都會讓老師清楚知道！"
2003303-54 = "等知道一切細節後，老師就會後悔拒絕我的提議，懊惱捶地並改變想法的！#n嘰嘻嘻嘻嘻！！"
2003303-55 = "[s]「不，就算改變想法也不可能懊惱到捶地板吧……」"
2003303-56 = "很好！現在沒時間說這個了。"
2003303-61 = "來，帶老師去搭乘豪華轎車吧。"
2003303-62 = "現在立刻前往萬魔殿的事業場所！"
2003303-63 = "[s]「先等一下……！真琴，我還沒完成夏萊的工作……！」"
2003303-64 = "嘻嘻嘻嘻！別在意那種小事，老師！"
2003303-65 = "我很期待你接下來會因為驚訝與尊敬露出的表情哦！"
2003303-66 = "來！我們走吧！"
2003303-67 = "[s]「我說你啊！怎麼完全不聽別人說話呢！？」"
2003303-75 = "（於是便莫名其妙地，開始了和真琴一起巡視萬魔殿事業場所的行程）"
2003303-78 = "嘰嘻嘻。首先要向未來潛在的合作夥伴介紹的事業場所……"
2003303-79 = "不管怎麼想都是這裡吧！"
2003303-80 = "[s]「這裡是……印刷所？」"
2003303-81 = "沒錯，就是印刷所。"
2003303-82 = "不過……這間印刷所可不像外表看起來一樣平凡。"
2003303-83 = "這裡是我們由萬魔殿獨自營運……格黑娜規模最大的印刷所。"
2003303-84 = "在這裡生產的所有出版印刷品……#n比如傳單、書籍、報紙、宣傳品等等全都是為了萬魔殿……"
2003303-85 = "也就是為了宣傳我真琴大人製作的物品！"
2003303-86 = "[s]「也就是說……」"
2003303-87 = "嘻嘻嘻，沒錯！#n除了使用紙張的出版印刷業之外，我真琴大人還進一步掌握了紙質媒體產業！"
2003303-88 = "雖然目前規模還很小……但成長趨勢將會日益漸增。"
2003303-89 = "這樣下去遲早能掌控格黑娜的所有輿論！"
2003303-90 = "覺得怎麼樣啊？老師。#n奇普托斯裡能營運這種規模事業的人，恐怕也只有我真琴大人而已了吧！"
2003303-91 = "這樣有沒有稍微更了解一點我的厲害之處呢？"
2003303-92 = "[s]「啊……嗯，確實很厲害。」"
2003303-93 = "什麼！？看見之後的反應竟然還是這麼淡定……？"
2003303-94 = "[s5]「該說是已經見過類似的情況呢……」\n[s6]「還是該說我早已知道規模龐大不代表一切呢……」"
2003303-97 = "怎，怎麼會……老師你究竟經歷過什麼樣的場面……"
2003303-98 = "好吧，沒想到你面對這種規模的事業也不為所動……"
2003303-99 = "沒關係！這還不是結束！好戲現在才要開始！"
2003303-100 = "來！前往下一個地點吧！"
2003303-103 = "接著是這裡！"
2003303-104 = "[s]「工程看來還要進行好一段時間，這是什麼地方呢？」"
2003303-105 = "嘻嘻嘻。這個嘛……"
2003303-106 = "哎呀，這不是投資人嗎？#n今天是來視察的嗎？"
2003303-107 = "是啊，工程還順利嗎？"
2003303-108 = "哈哈！那還用說嗎？情況非常順利。"
2003303-109 = "請拭目以待吧！在不久後的將來，能證明羽沼真琴大人威嚴的超高樓層大廈──"
2003303-111 = "「真琴塔」完工之後，全奇普托斯的學生肯定都會對投資者感到敬仰的！"
2003303-112 = "[s]「真琴……塔？」"
2003303-113 = "嘻嘻嘻，沒錯。#n和名字一樣，這裡正在建設的就是用我的名字命名的大廈……"
2003303-114 = "其大小與規模……甚至能凌駕於夏萊的聖所之塔！"
2003303-115 = "沒錯，我們正依照投資者的強大意志，以及毫不吝惜的投資努力建設這座大廈。"
2003303-116 = "目標是建造一座格黑娜、三一、千年、百鬼夜行……#n連赤冬聯邦學園都能看見的超級高樓！"
2003303-117 = "[s]「那種高樓從物理上來說是不可能的吧！？」"
2003303-118 = "哼！別說那種洩氣話！當然辦得到！#n不管怎麼說，這可是我真琴大人建造的大廈！"
2003303-119 = "呵呵，雖然嚴格來說建造的是我們就是了。"
2003303-120 = "嘰哈哈！別在意那種枝微末節的小事！"
2003303-121 = "哈哈哈！您說的沒錯，我們只是在執行投資者的委託而已！"
2003303-123 = "嘰哈哈哈！！"
2003303-124 = "哈哈哈！"
2003303-126 = "等這座大廈完工之後，它將會是格黑娜深具象徵性的建築物，#n同時也會成為吸引其他地區居民的偉大地標。"
2003303-127 = "如此一來就能帶來龐大的觀光收益……#n還能向奇普托斯宣揚我們萬魔殿的名聲，進而提升我們的影響力！"
2003303-128 = "這是風紀委員會作夢也想不到的……只有我真琴大人才具備的獨特目光！"
2003303-129 = "怎麼樣啊老師！讓我聽聽你見到這座大廈後的感想吧。"
2003303-130 = "嗯……？確實很壯觀沒錯，但會不會想得太簡單了？"
2003303-131 = "比如現實中能使用的預算，還有觀光計畫的可行性調查……？"
2003303-132 = "嘰嘻嘻。老師說的這些還真無趣啊。"
2003303-133 = "[s]「這些問題……只用無趣這個字眼就帶過了嗎？」"
2003303-134 = "沒錯！應該在意的不是那種現實方面的「制約」……！"
2003303-135 = "「想不想做」跟「這麼做帥不帥氣」……"
2003303-136 = "也就是我個人的慾望才是最重要的！"
2003303-137 = "[s]「……這麼隨便敷衍沒關係嗎！？」"
2003303-138 = "哼嗯……尚未完成的大廈地基也無法讓老師感到佩服啊。"
2003303-139 = "再換下一個吧！"
2003303-141 = "（之後帶著不安與擔憂參半的心情繼續陪著真琴，參訪了各式各樣的營業場所）"
2003303-143 = "這座購物中心有萬魔殿的快閃店。"
2003303-144 = "裡頭有宣揚我威嚴的公仔、海報，還有小規模的商品，全都進入訂購生產的階段了。"
2003303-145 = "情況還不錯！我計畫之後要透過網路商店大量販售！#n這樣就能讓我真琴大人更加聲名遠播了……！"
2003303-147 = "嘻嘻嘻！這裡是我們萬魔殿經營的渡假村。"
2003303-148 = "造訪渡假村的所有訪客都能獲得特殊優惠券，還有萬魔殿粉絲俱樂部的勳章。#n以此鞏固我們的影響力……！"
2003303-156 = "（在繞完萬魔殿的營業場所後，這次來到了格黑娜附近的商店）"
2003303-157 = "那麼，我們已經去過各種不同的地方了……感覺怎麼樣？"
2003303-158 = "我想聽聽老師的感想。"
2003303-159 = "[s]「嗯……真琴做的事業還真多呢。」"
2003303-160 = "嘰嘻嘻，被你看出來了啊。#n沒錯，正是如此。"
2003303-161 = "就連此時此刻，我也正在思考該如何提升萬魔殿的影響力和獲益能力。"
2003303-162 = "以及……"
2003303-163 = "該怎麼讓我真琴大人的名聲發揚光大！"
2003303-164 = "雖然每次推展事業的時候，伊呂波那傢伙都會表達不滿。"
2003303-165 = "[s]「實際看過那些營業場所之後，我好像也能理解……」"
2003303-166 = "那種發言實在太無知了！"
2003303-167 = "只有像這樣培養影響力，萬魔殿才能甩開風紀委員會……#n最終將格黑娜……不，將奇普托斯納入手中！"
2003303-168 = "相信這樣你應該明白我們萬魔殿真正的價值了吧，老師。"
2003303-169 = "要不要重新考慮是否接受我先前的提議呢？"
2003303-170 = "[s]「這個嘛……抱歉，真琴。我果然還是……」"
2003303-175 = "嗯？怎麼鬧哄哄的？"
2003303-177 = "這毫無疑問也是一項商品。#n我相信它一定能為老舊，並且了無新意的土產店帶來新的風潮！"
2003303-178 = "隨便你怎麼說，反正我們商店街不能隨便引進那種東西！"
2003303-179 = "老先生！您別這樣嘛！交易的對象可是那個萬魔殿哦！#n只要能進行順利，真的能獲得豐碩的成果……"
2003303-180 = "真是的，受不了最近的年輕人！開口閉口都只有錢嗎？#n如果店裡擺滿那種東西，老顧客又該怎麼辦？"
2003303-182 = "可是現在時代已經改變了啊！老先生！"
2003303-183 = "發生什麼事了？"
2003303-184 = "啊，真，真琴議長！"
2003303-185 = "嗯……？#n你是先前見過的仲介業者，遇到什麼狀況了嗎？"
2003303-186 = "那，那個……"
2003303-187 = "啊哈，你就是派這些人來我們商店街，#n想引進萬魔殿特製的「送禮用羽沼真琴套組」的高層嗎？"
2003303-188 = "[s]「送禮用……真琴套組？」"
2003303-189 = "沒錯，我確實企劃過那樣的產品。怎麼了嗎？"
2003303-190 = "那我就把話說清楚了。#n怎麼能為了引進那個來歷不明的商品，就打算把老顧客經常光顧的店鋪拆除重建呢！"
2003303-191 = "就算店鋪已經被你收購也未免太過分了吧！#n這樣老顧客想要的商品該去哪裡買呢？身為守護商店街的人，我不允許那樣的行為！"
2003303-192 = "沒錯！"
2003303-193 = "會長說的對！"
2003303-194 = "快停止暴行！"
2003303-196 = "各，各位！再怎麼說那種說法也太……！"
2003303-197 = "原來如此……嘻嘻嘻。#n因為那種理由妨礙我的事業，還打算要求賠償啊……"
2003303-198 = "這真是──"
2003303-199 = "[s]「等，等等真琴。別太情緒化……」"
2003303-200 = "各位都聽清楚了！"
2003303-205 = "在此推展事業的最終目的，在於提升萬魔殿的聲望──#n同時期許我們萬魔殿，以及和格黑娜的所有人能夠共生共存！"
2003303-206 = "……啊，當然其中不包含風紀委員會。"
2003303-207 = "基於這一點，我對發生這種預期之外的問題表示遺憾。"
2003303-208 = "與商店街發生摩擦並不是我所樂見的情況。#n如果各位有任何不滿，我會接受申訴，並對合理的訴求採取相應措施。"
2003303-209 = "有必要的話也會提供相應的補償。"
2003303-210 = "這樣各位能接受嗎？"
2003303-211 = "看來你是能溝通的對象啊！"
2003303-212 = "……議長，這樣真的可以嗎？"
2003303-213 = "嘰嘻嘻，沒問題。#n畢竟我真琴大人可是個寬容大量，而且懂得體恤他人的人啊。"
2003303-214 = "當然這不包含風紀委員會。"
2003303-215 = "……謝謝你！"
2003303-220 = "哼，大致上搞定了吧。"
2003303-221 = "[s]「剛剛真是讓我有點驚訝，真琴你真厲害。」"
2003303-222 = "啊啊，你是指剛才那件事嗎？"
2003303-223 = "對萬魔殿的高層來說，這只是家常便飯罷了。"
2003303-224 = "身為領導者，怎麼能因為這種事而動搖呢？"
2003303-225 = "嘻嘻嘻，最重要的是……怎麼樣？#n既然認同了我的能力，我可以認定你終於有意願和我們萬魔殿合作了嗎？"
2003303-226 = "[s]「不，這是兩回事。」"
2003303-227 = "唔！果然還是不行嗎！"
2003303-228 = "……哼，算了。"
2003303-229 = "看來老師的器量，果然跟那些會被微不足道的名譽牽著鼻子走的小嘍囉不同。"
2003303-230 = "[s]「你太高估我了……」"
2003303-231 = "不過！我羽沼真琴大人是不會放棄的。"
2003303-232 = "總有一天……我會讓老師你成為我的人！"
2003303-233 = "嘻嘻嘻……嘰哈哈哈哈哈！！期待那一天的到來吧！"
2003303-234 = "[s]「啊，嗯。還請手下留情……」"

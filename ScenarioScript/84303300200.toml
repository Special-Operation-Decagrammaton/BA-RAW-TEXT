[translation]
84303300200-5 = "จะไม่ทันแล้วค่ะ!"
84303300200-6 = "การสาธิตเริ่มขึ้นแล้ว ต้องรีบไปรวมตัวกับเพื่อนๆ ที่นั่นแล้วค่ะ!"
84303300200-7 = "อยู่ตรงโน้นค่ะ เจ้าโจรเอ๋ย จงไปข้างหน้าเลย!"
84303300200-8 = "(โจรอีกแล้ว...)"
84303300200-9 = "(ก็พอเข้าใจอยู่หรอกนะ แต่พอนึกถึงเหตุการณ์ที่เกิดขึ้นครั้งนี้ก็หัวเราะไม่ออกเลย)"
84303300200-10 = "งะ... งั้นเดี๋ยวฉันมานะคะ..."
84303300200-12 = "สู้เค้าค่ะ!!"

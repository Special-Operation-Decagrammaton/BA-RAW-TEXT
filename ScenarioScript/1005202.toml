[translation]
1005202-1 = "The Secretary is in the Details"
1005202-2 = "Schale Executive Office"
1005202-3 = "Hello, Sensei."
1005202-4 = "As I mentioned, I'm here to work a shift at Schale for today."
1005202-5 = "I'm not familiar with how you do things here, so I may start off a bit slow. Thank you in advance for your understanding."
1005202-6 = "[s] \"Don't worry about it. You'll be fine.\""
1005202-10 = "Heehee... You're exactly what they said you were"
1005202-11 = "Now I understand why students are always so eager to help you."
1005202-12 = "[s] \"I don't know what you've heard...\""
1005202-13 = "No need to worry."
1005202-14 = "I've never heard anything...too bad about you."
1005202-15 = "But that's beside the point. For now, what can I help you with?"
1005202-16 = "[s] \"Sorry, I didn't leave you anything to do.\""
1005202-17 = "Oh. You've already finished work, so you don't need help? You're just here to finish up personal stuff?"
1005202-18 = "Well, this is awkward. I came here to help you..."
1005202-19 = "And I feel weird not doing anything during work hours..."
1005202-20 = "[s] \"Why not just do whatever you usually do?\""
1005202-21 = "What I usually do?"
1005202-22 = "Well, usually I do basic administrative tasks, or record Seminar meetings about..."
1005202-23 = "Oh, I see. You want me to record things."
1005202-24 = "Then, as an officially-loaned secretary from Seminar, I shall commence recording the happenings of this office."
1005202-25 = "[s1] \"I wouldn't hold my breath if I were you...\"\n[s2] \"Just make yourself comfortable.\""
1005202-26 = "Mm-hmm."
1005202-27 = "Mm-hmm."
1005202-34 = "[s] \"Umm...\""
1005202-35 = "Yes, Sensei?"
1005202-36 = "[s] \"What are you writing?\""
1005202-37 = "You mean this record?"
1005202-38 = "See, this is why records are so important. We just talked about what I would record, and you've already forgotten."
1005202-39 = "[s] \"Right, but nothing worth recording happened...\""
1005202-40 = "What makes an event worthwhile is up to an individual's judgment."
1005202-41 = "It's a secretary's job to keep objective records of all the events, so that nothing is unfairly filtered by subjective biases."
1005202-42 = "For example..."
1005202-46 = "15:10:11 - [USERNAME] Sensei stretched during work and yawned for 3.3 seconds (rounded down)."
1005202-50 = "15:12:49 - [USERNAME] Sensei saw their cup was empty and refilled it from the coffee machine. The coffee was Stellabucks Signature Blend."
1005202-54 = "15:46:08 - [USERNAME] Sensei was distracted by a stray cat knocking on the window. They then tried to talk to the cat for 1 minute and 30 seconds. They spent the last 30 seconds trying meowing."
1005202-55 = "[s] \"How are these records useful?!\""
1005202-56 = "As I said before, it's not a secretary's job to judge the worth of the records."
1005202-57 = "These are records of your actions as seen by an empty mind."
1005202-58 = "As seen by my mind, however... It seems to be an incredibly ordinary daily routine..."
1005202-59 = "Which might be valuable to someone who wants to understand you or your work."
1005202-60 = "...Maybe valuable enough to be sold at a high price?"
1005202-61 = "[s] \"S-Stop...\""
1005202-62 = "I'm sorry, but I can't decide to arbitrarily stop recording like that."
1005202-63 = "If I altered the records or the act of record-keeping itself, the neutrality of the accounts would be compromised."
1005202-64 = "Ah. I almost forgot to record what you said a moment ago."
1005202-68 = "16:27:55 - Sensei asked Noa to stop recording."
1005202-73 = "16:28:10 - Sensei asked Noa to stop recording the request to stop recording."
1005202-78 = "16:29:43 - Sensei asked Noa stop recording the request to stop recording the request to stop recording..."
1005202-82 = "[ns] Give up."
1005202-83 = "Heehee. Thank you for your understanding."
1005202-84 = "Okay, Sensei. Please keep me out of mind and focus on your work."
1005202-85 = "As I keep saying... I'm just a secretary making sure reality doesn't slip by us."
1005202-90 = "I tried to ignore Noa as I worked, but..."
1005202-91 = "Heehee... This is quite fun."
1005202-95 = "Noa's gaze seemed a lot less empty than she led on..."

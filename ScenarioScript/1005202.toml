[translation]
1005202-1 = "研討會書記乃愛的細心紀錄"
1005202-2 = "夏萊．辦公室"
1005202-3 = "你好，老師。"
1005202-4 = "就像先前提過的一樣，今天由我負責夏萊值日生的業務。"
1005202-5 = "因為是第一次值班，如果有什麼不周到的地方，還請多多指教。"
1005202-6 = "[s]「我才要請你多多指教。」"
1005202-10 = "呵呵……原來如此。真的和其他千年學生說的一樣呢。"
1005202-11 = "我總算明白他們為何會爭先恐後地來協助老師了。"
1005202-12 = "[s]「是有什麼傳聞嗎……」"
1005202-13 = "啊啊，請不用擔心。"
1005202-14 = "不是什麼負面的傳聞。"
1005202-15 = "那麼……要先從什麼開始做起呢？"
1005202-16 = "[s]「今天沒有事需要幫忙，所以不要緊唷。」"
1005202-17 = "咦……？今天除了個人業務以外，工作全都結束了，所以沒有事需要幫忙嗎？"
1005202-18 = "哎呀，真是傷腦筋呢。我是專程來協助老師的……"
1005202-19 = "值班的時候什麼都不做的話，有點……"
1005202-20 = "[s]「要不要做一些平常會做的事呢？」"
1005202-21 = "我平常會做的事情嗎？"
1005202-22 = "平常，我都是一邊執行書記的業務，一邊做研討會上的對話記錄……"
1005202-23 = "啊啊，原來如此……要我「記錄」是吧。"
1005202-24 = "……我明白了。身為書記，我會客觀地將這裡發生的事通通記錄下來。"
1005202-25 = "[s1]「我是覺得沒有什麼值得記錄的事啦……」\n[s2]「自在一點沒關係哦。」"
1005202-26 = "是。"
1005202-27 = "是。"
1005202-34 = "[ns]「話說……」"
1005202-35 = "怎麼了嗎，老師？"
1005202-36 = "[s]「你從剛才開始就一直在寫些什麼啊？」"
1005202-37 = "啊，老師是說這本日誌嗎？"
1005202-38 = "正如剛才吩咐的，我在認真地記錄老師的一天"
1005202-39 = "[s]「可是我不記得我剛才有做什麼特別的事啊……」"
1005202-40 = "每個人對於「特別」的定義都不太一樣。"
1005202-41 = "身為一名優秀的書記，#n不能被自己的主觀影響判斷，必須中立地記錄所有目擊到的事情。"
1005202-42 = "舉例來說……"
1005202-46 = "「15點10分11秒，[USERNAME]老師在辦公過程中伸了個懶腰，打了3秒的哈欠。」"
1005202-50 = "「15點12分49秒，[USERNAME]老師發現杯子空了，於是從咖啡機中倒了些咖啡。#n　使用的是星芭克的招牌綜合豆。」"
1005202-54 = "「15點46分08秒，[USERNAME]老師被窗外的野貓吸引，#n　嘗試與牠進行了約1分30秒的對話……」"
1005202-55 = "[s]「這些有必要記錄下來嗎！？」"
1005202-56 = "正如剛才所說，判斷事件是否需要記錄並非書記的職責。"
1005202-57 = "我只是輕描淡寫地將老師的行為記錄下來，不參雜我個人的主觀意見。"
1005202-58 = "不過如果真的要我講的話，我覺得這只是非常普通的日常紀錄……"
1005202-59 = "但對於想知道老師工作情況的人來說，這份紀錄說不定很有意義。"
1005202-60 = "……搞不好還能賣個好價錢喔？"
1005202-61 = "[s] 「請，請高抬貴手……」"
1005202-62 = "非常抱歉，但是在會議結束之前，書記的工作是不能中斷的。"
1005202-63 = "如果因為外部原因而中斷或更改紀錄內容，將會妨礙記錄的中立性。"
1005202-64 = "啊啊，這也代表……剛才的發言也必須記錄起來。"
1005202-68 = "「16點27分55秒，夏萊的老師要求停止記錄。」"
1005202-73 = "「16點28分10秒，夏萊的老師要求停止記錄他要求停止記錄的紀錄。」"
1005202-78 = "「16點29分43秒，夏萊的老師要求停止紀錄他要求停止紀錄遭拒的紀錄……」"
1005202-82 = "[ns] 放棄說服"
1005202-83 = "呵呵。感謝老師的諒解。"
1005202-84 = "好了，老師，請不要在意我，繼續專心工作吧。"
1005202-85 = "正如剛才說的……我只是個負責紀錄客觀事實的書記罷了。"
1005202-90 = "（之後，雖然想試著忽略乃愛，繼續工作……）"
1005202-91 = "呵呵……真是個有趣的體驗呢。"
1005202-95 = "（但因為乃愛的視線過於炙熱，使得後續的工作幾乎沒有進度……）"

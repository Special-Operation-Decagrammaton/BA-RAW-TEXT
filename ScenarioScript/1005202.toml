[translation]
1005202-1 = "บันทึกสุดละเอียดของโนอา เลขาแห่งเซมิน่า"
1005202-2 = "สำนักงานชาเล่ต์"
1005202-3 = "สวัสดีค่ะคุณครู"
1005202-4 = "ฉันมาเข้าเวรนักเรียนตัวแทนที่ชาเล่ต์ตามที่ได้แจ้งไปล่วงหน้าค่ะ"
1005202-5 = "ครั้งนี้เป็นครั้งแรกของฉัน อาจจะยังไม่ค่อยคล่องในหลายๆ เรื่อง ขอรบกวนด้วยนะคะ"
1005202-6 = "[s] \"ครูต่างหากที่ต้องขอรบกวนน่ะ\""
1005202-10 = "ฮุฮุ... น่าประทับใจเหมือนที่นักเรียนของมิลเลเนียมคนอื่นๆ พูดไว้เลยนะคะ"
1005202-11 = "ฉันพอจะทราบแล้วละค่ะว่าทำไมพวกนักเรียนคนอื่นถึงชอบมาช่วยคุณครูกัน"
1005202-12 = "[s] \"ได้ยินเรื่องอะไรมาน่ะ...\""
1005202-13 = "คุณครูไม่ต้องเป็นห่วงหรอกค่ะ"
1005202-14 = "ฉันไม่ได้ไปได้ยินเรื่องอะไรไม่ดีมาหรอกค่ะ"
1005202-15 = "ถ้างั้นก่อนอื่น... จะให้ฉันช่วยงานอะไรเหรอคะ?"
1005202-16 = "[s] \"วันนี้ไม่มีอะไรเป็นพิเศษหรอก\""
1005202-17 = "คะ...? งานอื่นๆ นอกจากงานส่วนตัวเสร็จหมดแล้ว เพราะงั้นไม่ต้องช่วยอะไรก็ได้งั้นเหรอคะ?"
1005202-18 = "อืม... แบบนี้แย่เลยนะคะ ฉันได้รับคำสั่งให้มาช่วยคุณครูที่นี่น่ะค่ะ..."
1005202-19 = "ถ้าจะให้รออยู่เฉยๆ โดยไม่ทำอะไรตลอดละก็..."
1005202-20 = "[s] \"ถ้างั้นทำงานที่เคยทำประจำดีมั้ย?\""
1005202-21 = "งานที่ฉันทำประจำงั้นเหรอคะ?"
1005202-22 = "ถ้าเป็นงานที่ฉันทำประจำ ก็คงเป็นงานของเลขาน่ะค่ะ คอยจดบันทึกสิ่งที่คณะกรรมการของทางเซมิน่า#nพูดค่ะ..."
1005202-23 = "อ่ะฮ่า ถ้างั้นคงหมายถึง \"การบันทึก\" สินะคะ"
1005202-24 = "เข้าใจแล้วค่ะ ถ้างั้นฉันจะจดบันทึกทุกอย่างที่เกิดขึ้นที่นี่แบบไม่ให้ตกหล่นเลยค่ะ"
1005202-25 = "[s1] \"ก็ได้นะ ถึงอาจจะไม่ค่อยมีอะไรพิเศษก็เถอะ...\"\n[s2] \"ทำตัวสบายๆ เถอะ...\""
1005202-26 = "ได้เลยค่ะ"
1005202-27 = "เข้าใจแล้วค่ะ"
1005202-34 = "[ns] \"คือว่า...\""
1005202-35 = "ค่ะ มีอะไรเหรอคะคุณครู?"
1005202-36 = "[s] \"เขียนอะไรอยู่ตั้งแต่เมื่อกี้แล้วน่ะ?\""
1005202-37 = "หมายถึงบันทึกที่ฉันกำลังเขียนนี่เหรอคะ?"
1005202-38 = "ในฐานะเลขา ฉันก็กำลังบันทึกการทำงานประจำวันของคุณครูอย่างที่บอกไปเมื่อกี้ยังไงล่ะคะ"
1005202-39 = "[s] \"แต่ว่ามันไม่มีอะไรเป็นพิเศษเลยนะ...\""
1005202-40 = "มาตรฐานของคำว่าเหตุการณ์พิเศษก็อาจแตกต่างกันไปตามความเข้าใจของแต่ละบุคคลนะคะ"
1005202-41 = "ถ้าเป็นเลขานุการที่ยอดเยี่ยมละก็ จะต้องไม่ยึดติดกับมุมมองส่วนตัว และจดบันทึกเหตุการณ์ที่เห็น#nทุกอย่างด้วยความเป็นกลางค่ะ"
1005202-42 = "ยกตัวอย่างง่ายๆ สัก 2-3 ตัวอย่าง เช่น..."
1005202-46 = "<เวลา 15 นาฬิกา 10 นาที 11 วินาที คุณครู [USERNAME] กำลังปฏิบัติงานอยู่และพักหาวเป็นเวลา 3 วินาที>"
1005202-50 = "<เวลา 15 นาฬิกา 12 นาที 49 วินาที คุณครู [USERNAME] ยกแก้วขึ้นมาดู และไปเติมกาแฟมาดื่ม#nเป็นแก้วที่ 3 และกาแฟที่ใช้คือกาแฟซิกเนเจอร์เบลนด์ยี่ห้อสเตลลาร์บัค>"
1005202-54 = "<เวลา 15 นาฬิกา 46 นาที 8 วินาที คุณครู [USERNAME] หันไปมองแมวจรจัดที่เดินผ่านหน้าต่างไป ประมาณ 1 นาที 30 วินาทีและเริ่มคุยกับแมว...>"
1005202-55 = "[s] \"จดเรื่องแบบนั้นไปเพื่ออะไรกันน่ะ...?!\""
1005202-56 = "เมื่อกี้ฉันแจ้งให้คุณครูทราบไปแล้วนะคะว่าการตัดสินสิ่งที่บันทึกลงไปน่ะ ไม่ใช่หน้าที่ของเลขาค่ะ"
1005202-57 = "ตอนนี้ฉันก็กำลังปล่อยใจให้ว่างและบันทึกพฤติกรรมของคุณครูอย่างละเอียดค่ะ"
1005202-58 = "แต่ถ้าถามเรื่องความรู้สึก... สำหรับฉันมันเหมือนกับบันทึกชีวิตประจำวันเลย..."
1005202-59 = "แต่บางทีบันทึกในวันนี้ก็อาจมีความหมายสำหรับคนที่สนใจในงานของคุณครูก็ได้นะคะ"
1005202-60 = "...หรือไม่ก็อาจจะเอาบันทึกนี้ไปขายราคาแพงๆ ก็ได้?"
1005202-61 = "[s] \"พะ...พอเถอะ...\""
1005202-62 = "ขออภัยด้วยค่ะ งานของเลขาจะหยุดไม่ได้จนกว่าการประชุมจะเสร็จสิ้นค่ะ"
1005202-63 = "หากแก้ไขรายละเอียดการบันทึกหรือต้องหยุดการบันทึกไปเพราะปัจจัยภายนอก ความเป็นกลางของ#nบันทึกก็จะถูกทำลายไปได้ค่ะ"
1005202-64 = "อ๊ะ ถ้าแบบนั้นก็ต้องบันทึกคำพูดเมื่อกี้เอาไว้ด้วยสินะคะ"
1005202-68 = "<เวลา 16 นาฬิกา 27 นาที 55 วินาที คุณครูของชาเล่ต์ขอให้หยุดจดบันทึก>"
1005202-73 = "<เวลา 16 นาฬิกา 28 นาที 10 วินาที คุณครูของชาเล่ต์ขอให้ไม่บันทึก \"คำขอให้หยุดจดบันทึก\"> "
1005202-78 = "<เวลา 16 นาฬิกา 29 นาที 43 วินาที คุณครูของชาเล่ต์ขอให้ไม่บันทึกคำขอให้หยุดจดบันทึกลงใน#nบันทึก...> "
1005202-82 = "[ns] ยอมแพ้ที่จะพูดโน้มน้าว"
1005202-83 = "ฮุฮุ ขอบคุณที่เข้าใจกันนะคะ"
1005202-84 = "เอาละค่ะคุณครู ถ้าอย่างนั้นก็ไม่ต้องสนใจฉัน และตั้งใจทำงานเหมือนเดิมได้เลยค่ะ"
1005202-85 = "เมื่อสักครู่นี้ฉันก็บอกไปแล้วว่า... ฉันแค่จดบันทึกสิ่งต่างๆ ที่เกิดขึ้นก็เท่านั้นเองค่ะ"
1005202-90 = "(หลังจากนั้น คุณครูก็พยายามตั้งสมาธิจดจ่ออยู่กับงานโดยไม่สนใจโนอา)"
1005202-91 = "ฮุฮุ... เป็นประสบการณ์ที่สนุกดีจังเลยนะคะ"
1005202-95 = "(คุณครูมัวแต่พะวงเรื่องโนอาจนไม่มีสมาธิทำงาน...)"

1005202-46 = "3;노아;03;<15시 10분 11초. [USERNAME] 선생님이 업무 중 기지개를 켜며 3초간 하품을 하였다.>"
1005202-47 = "#st;[0,0];instant;1;"
1005202-48 = "#clearST"
1005202-49 = "3;노아;03\n#3;m3\n#wait;1000"
1005202-50 = "3;노아;01;<15시 12분 49초. [USERNAME] 선생님이 잔이 빈 것을 확인하고 커피 머신에서 새 커피를 보충했다. 사용한 원두는 스텔라벅스의 시그니쳐 블렌드.>"
1005202-51 = "#st;[0,0];instant;1;"
1005202-52 = "#clearST"
1005202-53 = "3;노아;01\n#3;m2\n#wait;1000"
1005202-54 = "3;노아;99;<15시 46분 08초. [USERNAME] 선생님이 창문을 두드리는 길고양이에게 시선을 빼앗기고 약 1분 30초간 대화를 시도하였다…….>"
1005202-55 = "[s] \"그런 기록에 무슨 의미라도 있어?!\""
1005202-56 = "3;노아;01;아까도 말씀드렸지만, 기록에 담긴 의미를 판단하는 것은 서기의 임무가 아니니까요.\n#3;m3"
1005202-57 = "3;노아;03;저는 그저 마음을 비운 채 선생님의 행동을 담담히 기록할 뿐."
1005202-58 = "3;노아;04;굳이 감상을 물으신다면, 저에게는 지극히 평범한 일상의 기록처럼 보입니다만……\n#3;stiff"
1005202-59 = "3;노아;01;선생님의 업무를 궁금해하는 누군가에게는 의미 있는 기록이 될 수도 있지요."
1005202-60 = "3;노아;02;……어쩌면 이 기록을 고가에 판매할 수 있을지도?\n#3;em;[반응]"
1005202-61 = "[s] \"그, 그만둬…….\""
1005202-62 = "3;노아;04;죄송하지만 서기 업무는 회의가 끝나기 전까지는 중단할 수 없답니다.\n#3;em;[땀]"
1005202-63 = "3;노아;05;외부 사정에 따라 임의로 기록이 중단하거나 내용이 수정된다면, 기록의 중립성이 저해될 테니까요."
1005202-64 = "3;노아;01;아, 그런 의미에서 조금 전의 그 발언도 기록으로 남기지 않으면 안 되겠네요."

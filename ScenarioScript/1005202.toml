[translation]
1005202-1 = "#title;세미나 서기 노아의 세심한 기록"
1005202-2 = "#place;샬레 집무실"
1005202-3 = "3;노아;01;안녕하세요, 선생님.\n#3;a"
1005202-4 = "3;노아;03;말씀드린 대로 오늘은 샬레의 학생 당번 업무를 수행하기 위해 찾아왔습니다.\n#3;em;[음표]"
1005202-5 = "3;노아;03;당번 업무는 처음이라 미숙할지도 모르겠습니다만, 잘 부탁드리겠습니다.\n#3;greeting"
1005202-6 = "[s] \"나야말로 잘 부탁할게.\""
1005202-7 = "#st;[0,0];instant;1;"
1005202-8 = "#clearST"
1005202-9 = "3;노아;02\n#3;em;[...]\n#wait;3000"
1005202-10 = "3;노아;01;후후…… 과연, 밀레니엄의 다른 학생들에게 들은 대로의 인상이시네요."
1005202-11 = "3;노아;99;어째서 학생들이 앞다투어 선생님을 도우려 하는지 알 것 같네요."
1005202-12 = "[s] \"어떤 이야기를 들었기에…….\""
1005202-13 = "3;노아;01;걱정하지 않으셔도 괜찮답니다."
1005202-14 = "3;노아;03;나쁜 이야기를 전해 들은 건 아니니까요."
1005202-15 = "3;노아;01;그럼 우선은…… 어떤 일부터 도와드리면 좋을까요?"
1005202-16 = "[s] \"오늘은 특별히 도와주지 않아도 괜찮아.\""
1005202-17 = "3;노아;04;네……? 오늘은 개인 업무 이외의 일이 다 끝났기 때문에 도와드리지 않아도 괜찮으시다고요?\n#3;em;[?]"
1005202-18 = "3;노아;04;으음, 곤란하네요. 저는 선생님을 도우라는 지시를 받고 이곳에 왔습니다만…….\n#3;stiff"
1005202-19 = "3;노아;07;당번 시간 동안 아무것도 하지 않고 기다린다 해도……."
1005202-20 = "[s] \"평소에 하던 일이라도 계속하는 건 어때?\""
1005202-21 = "3;노아;05;평소에 제가 하는 일 말씀이신가요?"
1005202-22 = "3;노아;05;평소의 제가 하는 일이라면, 서기 업무를 수행하며 세미나의 임원들이 나누는 말을 기록하고 있습니다만……"
1005202-23 = "3;노아;01;아하, 과연…… '기록' 말씀이군요.\n#3;em;[반응]"
1005202-24 = "3;노아;01;알겠습니다. 그럼 서기로서 이곳에서 일어나는 일들을 주관 없이 기록하도록 하겠습니다.\n#3;greeting"
1005202-25 = "[s1] \"뭔가 특별한 일은 없을 것 같지만……\"\n[s2] \"부디 편하게 있어 줘.\""
1005202-26 = "3;노아;03;네.\n#3;em;[반짝]"
1005202-27 = "3;노아;03;네.\n#3;em;[반짝]"

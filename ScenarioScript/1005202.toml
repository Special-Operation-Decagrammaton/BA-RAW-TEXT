1005202-33 = "#wait;2000"
1005202-34 = "[ns] \"저기……\""
1005202-35 = "3;노아;02;네. 무슨 일이신가요, 선생님?\n#3;em;[반응]\n#3;a"
1005202-36 = "[s] \"아까 전부터 무얼 쓰고 있는 거야?\""
1005202-37 = "3;노아;01;제가 쓰고 있는 이 일지 말씀이신가요?"
1005202-38 = "3;노아;03;아까 말씀드린 대로 서기로서 선생님의 일과를 충실히 기록하고 있었답니다."
1005202-39 = "[s] \"특별한 일은 없었던 것 같은데…….\""
1005202-40 = "3;노아;01;특별한 사건의 기준은 개인의 주관에 따라 얼마든지 바뀔 수 있으니까요."
1005202-41 = "3;노아;99;우수한 서기라면 개인의 주관에 휩쓸리지 않고 목격한 사건을 모두 중립적으로 기록해야 한답니다."
1005202-42 = "3;노아;01;간단하게 몇 가지만 예시를 들자면……\n#3;greeting"
1005202-43 = "#st;[0,0];instant;1;"

[translation]
208-1 = "The show must go on."
208-3 = "在這個遊樂園的另一個區域，似乎有著會表演魔術秀的遊樂園人偶。"
208-4 = "雖然曾經在眾多觀眾面前展現各種的把戲，博得了人氣……"
208-5 = "──然而現在又如何呢？"
208-10 = "……啊啊，原來如此。"
208-11 = "透過複製顯現的那個魔術師，即使在沒有觀眾的此刻，似乎仍持續表演著呢。"
208-12 = "沒錯，正是如此──藝術一定需要觀眾嗎？#n未被觀測的藝術所達到的境界有意義嗎？"
208-13 = "大眾性與藝術性。#n融合了截然相反的兩者的「大眾藝術」──是成立的嗎？"
208-14 = "沒錯！！"
208-15 = "……呵呵呵。好吧。#n如果是瑪艾斯托洛和黑色西裝人的話，或許還會找出其他的理由…… "
208-20 = "而我只會，如此宣告。"
208-21 = "就算是沒有觀眾的表演……就算是未被觀測的藝術……"
208-22 = "──[ruby=The show must go on]必須繼續表演下去[/ruby]。"
208-23 = "沒錯！！"
208-24 = "──他是這麼說的。"

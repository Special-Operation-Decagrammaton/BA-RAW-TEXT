[translation]
208-1 = "การแสดงต้องดำเนินต่อไป"
208-3 = "กระผมได้ยินมาว่ามีศิลาเริงร่าอยู่ในงานแสดงมายากลที่จัดอยู่สักที่ในสวนสนุกแห่งนี้ครับ"
208-4 = "แม้ว่าจะเคยมียุคสมัยที่การแสดงมายากลต่อหน้าผู้ชมมากมายนั้นได้รับความนิยมเป็นอย่างมากอยู่#nด้วยก็ตาม... "
208-5 = "แต่ว่าตอนนี้มันจะยังเป็นเช่นนั้นอยู่หรือเปล่าล่ะครับ?"
208-10 = "อ่า... ใช่แล้ว"
208-11 = "เจ้านักมายากลที่ปรากฏตัวในร่างมิเมซิสนั่น ถึงจะไม่มีผู้รับชมสักคนเดียวก็ยังคงแสดงมายากลต่อไป#nสินะครับ"
208-12 = "นั่นสิครับ... สิ่งที่เรียกว่าศิลปะ จำเป็นต้องมีผู้ชมด้วยเหรอ? ศิลปะที่ไม่มีใครรับรู้ถึงการมีอยู่ แบบนั้นจะยังมีคุณค่าของศิลปะอยู่หรือเปล่าล่ะครับ? "
208-13 = "เรียกได้ว่าเป็นข้อถกเถียงกันระหว่างกระแสนิยมและคุณค่าเชิงศิลปะ ศิลปะกระแสนิยมจะเรียกว่ามี#nคุณค่าเชิงศิลปะได้หรือครับ?"
208-14 = "ใช่แล้ว!"
208-15 = "หึหึหึ... แต่ก็เอาเถอะ ถ้าเป็นเมสโตรหรือสูทดำก็คงจะคิดข้อโต้แย้งอื่นๆ ขึ้นมาได้บ้างสินะ... "
208-20 = "แต่กระผมคงต้องขอพูดว่า"
208-21 = "แม้จะเป็นการแสดงที่ไร้ซึ่งผู้ชม... ศิลปะที่ไม่มีใครเห็นคุณค่า..."
208-22 = "[ruby=THE SHOW MUST GO ON]การแสดงต้องดำเนินต่อไป[/ruby]"
208-23 = "ใช่แล้ว!"
208-24 = "...ยังไงล่ะ"

208-12 = "3;데칼코마니;01\n#3;h\n#na;골콩트;글쎄요. 예술에 관객은 반드시 필요한 것일까요? 관측되지 않는 예술, 그 예술의 경지는 과연 의미가 있는 것일까요? "

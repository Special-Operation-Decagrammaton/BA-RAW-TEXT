[translation]
2001403-1 = "迷路的兔子"
2001403-2 = "D.U. 郊外的山路"
2001403-3 = "呼，比想像中還多呢。"
2001403-4 = "這個籃子都裝不下了，要是有帶更大一點的籃子來就好了。"
2001403-5 = "有了這些的話，接下來1周……不，1個月都能靠楤木芽過活了！"
2001403-6 = "[s] 「那樣是不錯啦……不過它能放一個月嗎？」"
2001403-7 = "當然，要進行避免腐敗的加工。"
2001403-8 = "像是鹽漬、曬乾之類的……有各種方法。"
2001403-9 = "[s] 「咲希很了解楤木芽呢。」"
2001403-10 = "也不是特別了解楤木芽……"
2001403-11 = "基本上，山菜跟蘑菇我都有一定的了解。能在那附近採集到這點很好。"
2001403-12 = "在不能期待經常性補給的情況下，野草也是重要的糧食來源。"
2001403-13 = "不過，野草中有許多毒性很強的種類。所以是否能吃就要需在採集前進行觀察……"
2001403-14 = "……也就是說，這都是某種生存訓練！"
2001403-15 = "話說回來，在我們說著採集的話題的時候，好像跑到山的深處了呢……"
2001403-16 = "……這裡是哪？"
2001403-20 = "[ns] 「好像迷路了呢……」"
2001403-21 = "別，別緊張啊老師。為了應對這種情況，我有事先準備好地圖跟指南針！"
2001403-22 = "只要有這些工具的話，就能用讀圖法輕鬆找到路了。"
2001403-23 = "[s] 「讀圖法？」"
2001403-24 = "嗯，是一種讀地圖的方法。可以利用指南針的方位來確認自己的位置和目的地。"
2001403-25 = "SRT的隊員幾乎都具備這個能力，你就當作是登上了大船，放心交給我吧。"
2001403-26 = "我看看，那邊的山峰應該是「白石峰」，所以……"
2001403-27 = "計算正北極和磁北極的誤差，得到現在的座標……"
2001403-28 = "好，我知道了。我們現在所在的地點[ruby=Charlie]是C-9[/ruby]。"
2001403-29 = "最近的道路在10度方向，離這裡約3km左右的地方……"
2001403-30 = "往這裡，老師！跟我來吧！"
2001403-35 = "（幾個小時後……）"
2001403-37 = "已經走了好一段時間了，卻還沒看到路……真奇怪……"
2001403-38 = "我的測量應該是完美的才對啊……"
2001403-39 = "……難道說，那不是「白石峰」而是「黑石峰」！？"
2001403-40 = "咕，竟然會搞錯前提條件，實戰中還會發生這種事啊……抱歉。"
2001403-41 = "太陽也快下山了……"
2001403-42 = "……沒辦法，今晚就野營吧。"
2001403-46 = "……你在做什麼呢，老師？"
2001403-50 = "[ns] 「我在嘗試用GPS確認位置。」"
2001403-51 = "……GPS？"
2001403-52 = "往東邊500m就有往夏萊的公車站……？"
2001403-56 = "……喂，為什麼不先告訴我。"
2001403-57 = "[s1] 「抱歉，因為興奮努力著的咲希很可愛……」\n[s2] 「抱歉，我不想讓咲希的努力白費……」"
2001403-58 = "……啊？"
2001403-59 = "……啊？"
2001403-60 = "就因為這種理由，所以一直到我做好野營的覺悟了才……"
2001403-61 = "啊啊真是的，你是笨蛋嗎！？"
2001403-63 = "（一邊安慰生氣的咲希，一邊搭著深夜公車回到了夏萊）"
2001403-64 = "（……把採到的大量楤木芽做成了天婦羅和咲希一起享用了）"

[translation]
2001403-1 = "กระต่ายหลงทาง"
2001403-2 = "เส้นทางเดินเขาชานเมือง D.U."
2001403-3 = "เฮ้อ มีเยอะกว่าที่คิดอีกนะ"
2001403-4 = "เก็บยอดผักทาระได้มากกว่าที่คิดอีก... เยอะจนตะกร้าที่เอามาใส่ไม่พอเลยแฮะ"
2001403-5 = "ถ้าเก็บได้เยอะขนาดนี้ อีกหนึ่งอาทิตย์... ไม่สิ อีกหนึ่งเดือนต่อจากนี้คงจะกินแต่ยอดผักทาระนี่แน่ๆ!"
2001403-6 = "[s] \"แต่ถ้าเก็บไว้นานขนาดนั้น มันจะไม่เสียเอาเหรอ?\""
2001403-7 = "คงเสียแน่ๆ เพราะงั้นนอกจากส่วนที่จะกินทันที ก็จะต้องเอาไปแปรรูปเพื่อให้เก็บไว้ได้นานๆ"
2001403-8 = "อย่างเช่น เอาไปหมักเกลือ หรือเอาไปตากแห้งเก็บไว้... มีหลายวิธีเลย"
2001403-9 = "[s] \"ซากิชอบผักทาระมากเลยสินะ\""
2001403-10 = "ก็ไม่ขนาดนั้นหรอก ฉันไม่ได้ชอบผักทาระเป็นพิเศษหรอก"
2001403-11 = "ฉันชอบพวกเห็ดหรือผักบนภูเขาที่หาได้ง่ายๆ มากกว่าน่ะ"
2001403-12 = "ในสถานการณ์ที่คาดหวังเรื่องเสบียงกองหนุนไม่ได้แบบนี้ พืชผักที่มีอยู่เยอะในป่านับว่าเป็นแหล่ง#nอาหารที่ยอดเยี่ยมเลย"
2001403-13 = "แต่ว่าพืชในป่าหลายชนิดเป็นผักที่มีพิษร้ายแรง เพราะงั้นจะต้องตรวจสอบให้ดีก่อนจะเก็บไป"
2001403-14 = "นี่ก็เป็นการฝึกฝนเอาตัวรอดอย่างหนึ่งยังไงล่ะ!"
2001403-15 = "แต่พอไล่ตามเก็บผักทาระมาเรื่อยๆ แบบนี้ก็เผลอเข้ามาในภูเขาลึกเกินไปซะแล้ว"
2001403-16 = "ที่นี่... ที่ไหนกันเนี่ย?"
2001403-20 = "[ns] \"หลงทางแล้วสินะ...\""
2001403-21 = "มะ...ไม่ต้องตกใจนะ คุณครู ฉันเอาแผนที่กับเข็มทิศมาเผื่อไว้ว่าจะเกิดเรื่องแบบนี้แล้วละ!"
2001403-22 = "ถ้ามีแผนที่กับเข็มทิศละก็... ต่อให้ไม่รู้พิกัดของตัวเองก็สามารถใช้วิธีดูพิกัดแผนที่แล้วก็หาทางกลับ#nไปได้แบบง่ายๆ เลย"
2001403-23 = "[s] \"วิธีดูพิกัดแผนที่?\""
2001403-24 = "อื้อ วิธีดูพิกัดแผนที่เป็นวิธีการอ่านแผนที่วิธีหนึ่ง ที่ใช้การระบุตำแหน่งที่อยู่ของตัวเองและปลายทาง#nที่ต้องการไปด้วยการดูเข็มทิศน่ะ"
2001403-25 = "ถ้าเป็นสมาชิกของกองทหารที่ได้รับการฝึกพิเศษมาแล้ว ก็จะดูพิกัดแผนที่กันเป็นทุกคนนั่นละ"
2001403-26 = "ไหนดูซิ... ยอดเขาที่เห็นอยู่ตรงนั้น น่าจะเป็นยอดเขาชิราอิชิ..."
2001403-27 = "หากคำนวณพิกัดปัจจุบันโดยเพิ่มการคำนวณค่าความคลาดเคลื่อนระหว่างทิศเหนือและขั้วแม่เหล็ก#nเหนือแล้วละก็..."
2001403-28 = "ตรวจสอบพิกัดได้แล้วละ ดูเหมือนว่าตอนนี้เราจะอยู่ตรงพิกัด ชาลี-9 บนแผนที่นะ"
2001403-29 = "ถนนที่อยู่ใกล้ที่สุดอยู่ห่างออกไป 3 กิโลเมตรในทิศทาง 10 องศา..."
2001403-30 = "ทางนี้ คุณครู! เดินตามฉันมาดีๆ ละ"
2001403-35 = "(หลายชั่วโมงต่อมา...)"
2001403-37 = "แปลกจังแฮะ... เดินมาตั้งนานแล้ว ทำไมยังไม่เห็นถนนอีกนะ"
2001403-38 = "ฉันคำนวณค่าความคลาดเคลื่อนได้อย่างสมบูรณ์แบบแล้วแท้ๆ... มีปัญหาตรงไหนกันนะ?"
2001403-39 = "ระ...หรือว่าเมื่อกี้ไม่ใช่ยอดเขาชิราอิชิ แต่เป็นยอดเขาคุโระอิชินะ?"
2001403-40 = "ดันพลาดเรื่องพื้นฐานในการปฏิบัติการซะแล้ว... ขอโทษนะ คุณครู ฉันผิดเอง"
2001403-41 = "ตอนนี้ท้องฟ้าก็มืดแล้ว จะหาจุดที่ใช้อ้างอิงก็คงยากเกินไป..."
2001403-42 = "คงจะต้องพักที่นี่แล้วรอจนกว่าพระอาทิตย์จะขึ้นแล้วละ"
2001403-46 = "ทำอะไรน่ะ คุณครู? ตอนนี้ไม่ใช่เวลามาเล่นโทรศัพท์นะ"
2001403-50 = "[ns] \"ครูเพิ่งเช็ก GPS ได้น่ะ\""
2001403-51 = "GPS...?"
2001403-52 = "ดูจากจุดที่ระบุใน GPS แล้ว... ถ้าเดินไปทางทิศตะวันออกอีก 500 เมตรก็จะเจอป้ายรถบัสที่นั่งกลับ#nไปที่ชาเล่ต์ได้งั้นเหรอ?"
2001403-56 = "ถ้าใช้ GPS หาทางกลับได้ ทำไมไม่บอกให้เร็วกว่านี้ล่ะ...?"
2001403-57 = "[s1] \"ก็ท่าทางของซากิตอนตั้งใจหาทางกลับน่ารักดีนี่นา...\"\n[s2] \"ครูไม่อยากขัดซากิน่ะ...\""
2001403-58 = "เฮ้อ..."
2001403-59 = "เฮ้อ..."
2001403-60 = "ต้องลำบากมาเกือบครึ่งวันเพราะเหตุผลแบบนั้น..."
2001403-61 = "บ้าบอชะมัดยาดเลย!"
2001403-63 = "(หลังจากนั้น คุณครูกับซากิก็ขึ้นรถบัสรอบดึกกลับมาที่ชาเล่ต์)"
2001403-64 = "(คุณครูเอาผักทาระที่เก็บมาจากภูเขามาทอดเป็นเทมปุระแล้วนั่งกินมื้อดึกด้วยกันกับซากิ...)"

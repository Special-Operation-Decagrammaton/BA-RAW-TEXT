[translation]
2001403-1 = "Lost Rabbit"
2001403-2 = "D.U. Suburban Mountain Pass"
2001403-3 = "Phew, there's a lot more than I thought there'd be."
2001403-4 = "There were so many fatsia sprouts. I need a bigger basket."
2001403-5 = "These'll last us at least a week... Actually, maybe even a month!"
2001403-6 = "[s] \"Won't they go bad?\""
2001403-7 = "We'll portion out some to eat now, and preserve the rest."
2001403-8 = "We can pickle them with salt, dehydrate them... They're really versatile."
2001403-9 = "[s] \"It seems like you really like fatsia sprouts.\""
2001403-10 = "Does it? I mean, I think they're okay."
2001403-11 = "I'd say I like most of the wild vegetables and mushrooms that're around."
2001403-12 = "If supplies ever run out, common vegetation can be life-saving."
2001403-13 = "But some are poisonous, so you need to be well-versed in the different kinds before harvesting anything."
2001403-14 = "It's all a part of survival training!"
2001403-15 = "Also...um... I think we might have wandered too far."
2001403-16 = "Do you know...where we are?"
2001403-20 = "[ns] \"...Are we lost?\""
2001403-21 = "Don't worry, Sensei. I brought a map and compass!"
2001403-22 = "Just a little map reading, and I can find our way back no problem."
2001403-23 = "[s] \"Map reading?\""
2001403-24 = "It's the process of decoding a map and where all the depicted features are. That way, I can use the compass to see how to get home."
2001403-25 = "It's a basic skill that any SRT student would know."
2001403-26 = "Let's see. The mountain peak over there is Shiraishi Peak..."
2001403-27 = "Okay, our current coordinates...calculate the angle between the grid north and magnetic north..."
2001403-28 = "Should be here. We're at Charlie-9 on the map."
2001403-29 = "The nearest road is north, three kilometers away..."
2001403-30 = "This way, Sensei! Don't get lost!"
2001403-35 = "A few hours later..."
2001403-37 = "I feel like...we've walked a lot more than three kilometers."
2001403-38 = "My calculations definitely weren't wrong. I don't get it."
2001403-39 = "W-W-Wait. Was that Kuroishi Peak, not Shiraishi Peak?"
2001403-40 = "I can't believe I made such a stupid mistake... I'm sorry Sensei."
2001403-41 = "It's too dark for me to find a reference point."
2001403-42 = "We'll have to camp out until the sun comes up."
2001403-46 = "Seriously? Are you playing with your phone, Sensei? At a time like this?"
2001403-50 = "[ns] \"I found our location with my GPS.\""
2001403-51 = "...GPS?"
2001403-52 = "There's a bus stop just five hundred meters east?"
2001403-56 = "You had our location this whole time? Why didn't you say anything?"
2001403-57 = "[s1] \"It was cute watching you work so hard...\"\n[s2] \"I didn't want to rain on your parade...\""
2001403-58 = "Huh?"
2001403-59 = "Huh?"
2001403-60 = "That's why we walked around for half a day?"
2001403-61 = "What is wrong with you? Are you stupid?!"
2001403-63 = "Saki and I finally found the bus stop and got back to Schale."
2001403-64 = "...We ended up deep-frying the fatsia sprouts we'd gathered and ate them as a late-night tempura snack."

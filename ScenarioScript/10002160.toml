10002160-13 = "3;수영복 불량배 SMG;01;아니, 솔직히 말이 되냐고, 이게. 우리라고 뭐 잘했다는 건 아니지만 말이야……."
10002160-14 = "3;수영복 불량배 SMG;02;그래도 정도라는 게 있지. 그게 뭐야? 함정수사?\n#3;em;[속상함]\n#3;stiff"

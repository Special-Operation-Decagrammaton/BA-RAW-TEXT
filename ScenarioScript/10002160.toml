[translation]
10002160-1 = "ย้อนวันวาน;หลอกลวงกันชัดๆ !"
10002160-3 = "Q: ทำไมถึงโจมตีใส่คนอื่นๆ งั้นเหรอ? คิดว่าคงกังวลมากเลยใช่ไหมล่ะ?"
10002160-9 = "อะไรกันอีกล่ะ? เรียกฉันมาเพื่อถามเรื่องแบบนี้งั้นเหรอ?"
10002160-10 = "อะไรนะ? สัมภาษณ์เหรอ...? บ้ารึเปล่า!? อยากสู่ขิตเร็วๆ ใช่มั้ย!? ตอนนี้ฉันหงุดหงิดจะตายอยู่แล้ว!!"
10002160-11 = "หงุดหงิดเรื่องอะไรน่ะเหรอ? เดี๋ยวสิ คิดจะถามอะไรกันเนี่ย!?"
10002160-12 = "ซื่อหรือโง่กันแน่? หรือคิดจะมาก่อกวนพวกเรารึไง!?"
10002160-13 = "ล้อเล่นรึยังไงกัน  ถึงฉันจะรู้ว่าสิ่งที่พวกเราทำมันไม่ใช่เรื่องดีก็เถอะ..."
10002160-14 = "แต่มันก็เป็นสิทธิ์ของพวกเรานะ แล้วนี่อะไร? คิดจะล่อให้ติดกับดักรึไง?"
10002160-17 = "อย่ามาล้อเล่นน่า! ทำไมถึงมีของแบบนั้นอยู่ที่นี่ล่ะ?? อีกอย่าง ทั้งที่น้ำสูงแค่เอวแท้ๆ ทำไมถึงได้#nทำท่าเหมือนจมน้ำแบบนั้นล่ะ!!"
10002160-18 = "ยัยพวกนั้นคิดจะล่อเราให้ไปติดกับดักแต่แรกเลยสินะ!!"
10002160-19 = "คงคิดจะจัดการพวกเราไว้แต่แรกแล้วสินะ...!!"
10002160-25 = "เฮ้อ..."
10002160-26 = "ก็ได้... เข้าใจแล้วล่ะ ไม่รู้จะพูดยังไงเลย เมื่อกี้ถามว่าทำไมพวกเราถึงโจมตีพวกนั้นใช่มั้ย? ก็ได้..."
10002160-27 = "ฮู่ว..."
10002160-28 = "ก็นะ... เราโจมตีเพราะดูเหมือนว่าพวกเราจะทำได้ไงล่ะ ในตอนนั้น..."
10002160-29 = "ในตอนนั้นเราคิดว่าถ้าลองดูก็อาจจะชนะก็ได้... พวกเราคิดแบบนี้น่ะ"
10002160-30 = "เข้าใจมั้ย? พวกเรามักจะเป็นฝ่ายแพ้มาตลอด..."
10002160-31 = "รบร้อยครั้งก็มักจะแพ้ร้อยครั้ง...  เพราะงั้น... พวกเราก็เลย..."
10002160-32 = "คิดว่าสักครั้งหนึ่ง... ถ้าได้ชนะสักครั้งหนึ่งก็คงจะดี... พวกเราเอง... ก็อยากจะลองชนะดูบ้าง..."
10002160-33 = "เพราะงั้นก็เลย... ฮึ่ก..."
10002160-34 = "..."
10002160-35 = "ฮึ่ก... ฮือๆ... ฮือๆๆ...!!!"
10002160-36 = "แงงงงงงง~!!!"
10002160-38 = "(ผู้ถูกสัมภาษณ์เริ่มมีอารมณ์อ่อนไหว ดังนั้นเลยต้องหยุดการสัมภาษณ์แต่เพียงเท่านี้)"

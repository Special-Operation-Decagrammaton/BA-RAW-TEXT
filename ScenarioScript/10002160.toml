[translation]
10002160-1 = "Afterword; This is Harassment!"
10002160-3 = "Q. Why did you attack everyone? You must have been nervous."
10002160-9 = "You called me over just to ask me that? What is this?"
10002160-10 = "An interview...? Are you out of your mind?! You wanna die or something?! I'm pissed off enough as it is!"
10002160-11 = "About what? What kind of question is that?!"
10002160-12 = "Are you this stupid, or are you messing with me?!"
10002160-13 = "You've gotta be kidding me. I know we aren't exactly innocent in all this..."
10002160-14 = "...but we still got rights, you know? This is harassment."
10002160-17 = "She was just toying with us, wasn't she? Like, really, who flounders around in water that isn't even waist deep?!"
10002160-18 = "Was this just a game to all of you?!"
10002160-19 = "It's like you set us up to get thrashed on purpose!"
10002160-25 = "*sigh*"
10002160-26 = "Okay, fine. You asked why we attacked them, right? Well..."
10002160-27 = "*sigh*"
10002160-28 = "I guess it was because we could. We thought they looked weak."
10002160-29 = "We were hoping to actually win a fight for once."
10002160-30 = "Get it? We're always on the losing end."
10002160-31 = "Since we're always doing the job, we thought we could just..."
10002160-32 = "...go over for once. Just one time, we wanted to win..."
10002160-33 = "So... *sniffle*"
10002160-34 = "..."
10002160-35 = "*sniffle* *sob*"
10002160-36 = "Wahhhhhh!"
10002160-38 = "(The interviewee continued to have an emotional breakdown, so we had to cut things short.)"

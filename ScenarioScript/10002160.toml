[translation]
10002160-1 = "後日談其三;被蒙在鼓裡"
10002160-3 = "Ｑ. 為什麼當時沒有逃跑？"
10002160-9 = "啊？這是在做什麼？你什麼意思？"
10002160-10 = "咦……採訪？你認真……？#n也不想想我們被打得多慘，想死是不是！？"
10002160-11 = "什麼，現在的心情……？#n你是認真要問那種問題！？"
10002160-12 = "明明都看見剛才的戰鬥了，話說在指揮的不就是你嗎，那你還問！？#n是怎樣，來找碴的！？"
10002160-13 = "這都什麼跟什麼啊……雖然先動手的是我們沒錯啦……"
10002160-14 = "不過那個狀況一般都會認為有機可乘吧……#n所以那是怎麼回事？是為了引誘我們的陷阱嗎？"
10002160-17 = "那可是實現正義部的部長哦！？這種機會不是天天都有的啊！"
10002160-18 = "知道他溺水了肯定會發動攻擊的吧！？"
10002160-19 = "再說他那拚死掙扎的樣子，怎麼看都不會覺得是在演戲不是嗎！！"
10002160-25 = "……唉……"
10002160-26 = "算了……所以你想問什麼？#n……為什麼當時沒有逃跑而是選擇攻擊？"
10002160-27 = "……哼……"
10002160-28 = "也沒什麼大不了的。#n跟剛才說的一樣，覺得他溺水所以能贏，等發現是陷阱也已經太遲了……"
10002160-29 = "想說來個出其不意應該能贏吧？這樣……"
10002160-30 = "你也知道，我們每次都是挨打的份，該說被修理成那樣不能默不作聲嗎……"
10002160-31 = "然而每次挑戰卻都沒贏過，簡直已經變得像是例行公事一樣了……"
10002160-32 = "所以真的很想打贏一次……這樣明天就能保持良好的心情繼續努力了……"
10002160-33 = "可是，結果卻是這麼……丟人……"
10002160-34 = "……"
10002160-35 = "嗚……嗚嗚……！"
10002160-36 = "嗚啊啊啊啊～～～！！"
10002160-38 = "（因採訪對象的情緒變得相當不穩定，只能在此中斷採訪）"

[translation]
2005203-1 = "แผนธุรกิจ"
2005203-2 = "คุณครูคะ แบบว่า..."
2005203-3 = "[s] \"เป็นอะไรไปเหรอ ยาคุโมะ\""
2005203-4 = "ข่าวที่ออกมาจากชาเล่ต์จะแพร่กระจายไปทั่วคิโวทอสได้เลยใช่มั้ยล่ะคะ?"
2005203-5 = "[s] \"ก็ข้อมูลที่ออกจากชาเล่ต์เป็นเรื่องทางการนี่เนอะ\""
2005203-6 = "ถ้าพิจารณาจากเรื่องนั้น ก็คงจะจริงอย่างที่คุณครูว่าค่ะ"
2005203-7 = "แล้วตอนนี้ฉันก็เพิ่งตระหนักได้ว่าการหาอินฟลูเอนเซอร์ที่มีอิทธิพลทางสังคมเป็นเรื่องยากมากเลยละค่ะ"
2005203-8 = "[s] \"ได้ยินยาคุโมะพูดแบบนี้ ครูก็ใจไม่ค่อยดีแล้วนะ\""
2005203-9 = "ลองฟังฉันดูนะคะ คุณครู"
2005203-10 = "คุณครูไม่เสียดายอำนาจในการส่งต่อข่าวสารและความน่าเชื่อถือของตัวเองเหรอคะ?"
2005203-11 = "ถึงคุณครูจะไม่เสียดาย แต่ฉันเสียดายแทนค่ะ"
2005203-12 = "เพราะงั้นฉันก็เลยไปคิดไอเดียอย่างเช่น การจัดแคมเปญ 'มาอ่านหนังสือกัน' ตามการป้ายยาจากชาเล่ต์#nมาค่ะ"
2005203-13 = "[s] \"นั่นเป็นเรื่องที่ดีเลยนะ\""
2005203-14 = "แล้วเราก็จะเสนอหนังสือที่ชมรมสื่อสิ่งพิมพ์ตั้งใจคัดเลือกมาให้โดยเฉพาะเลยค่ะ ฮิ ฮิ ฮิ"
2005203-15 = "[s] \"เป็นนักเรียนนะ ไม่ใช่นักธุรกิจ ยาคุโมะ\""
2005203-16 = "อ๊ะ แต่พอมาคิดดูดีๆ ห้องสมุดของทรีนิตี้น่าจะไม่ค่อยเชื่อถือหนังสือของเราเท่าไรนะคะ..."
2005203-17 = "ไม่สิ ถ้าใช้โอกาสนี้ยกระดับความน่าเชื่อถือของชมรมสื่อสิ่งพิมพ์เรดวินเทอร์ได้ละก็ สถานการณ์อาจจะกลับตาลปัตรเลยก็ได้...?"
2005203-18 = "มีคำกล่าวที่ว่า นักธุรกิจที่แท้จริงคือคนที่สามารถเปลี่ยนวิกฤตให้เป็นโอกาสได้นี่คะ...?"
2005203-22 = "คุณครู ช่วยสนับสนุนชมรมสื่อสิ่งพิมพ์ของเราด้วยนะคะ ช่วยเป็นคุณครูที่ปรึกษาหรืออะไรทำนองนั้น#nให้หน่อยค่ะ"
2005203-23 = "ส่วนเหตุผลก็... ให้เป็นอย่างนี้แล้วกันค่ะ เพื่อสนับสนุนโรงเรียนที่ประสบภัยความหนาว และเพื่อสวัสดิการของนักเรียนที่ต้องทุกข์ทรมานจากเรื่องนั้น"
2005203-24 = "[s] \"ไม่ได้หรอก\""
2005203-25 = "ทำไมล่ะคะ~"
2005203-26 = "[s] \"ก็รู้อยู่แก่ใจอยู่แล้วไม่ใช่เหรอ?\""
2005203-27 = "ก็พอรู้อยู่หรอกค่ะ... ชิ ถ้าไม่ต้องรักษาความเป็นกลางทางการเมืองละก็นะ"
2005203-28 = "งั้นจะมีอะไรอื่นที่ทำได้บ้างละเนี่ย..."
2005203-29 = "ชาเล่ต์... D.U. ..."
2005203-30 = "เขตความเป็นกลางทางการเมืองที่ทุกคนให้การยอมรับ..."
2005203-31 = "พูดอีกนัยหนึ่งก็คือ ที่นี่ไม่มีโรงเรียนไหนมาอ้างสิทธิการปกครองตนเองอย่างมุทะลุได้..."
2005203-32 = "และนั่นก็หมายความว่าเสียงที่ไม่มีน้ำหนักของสถาบันสหภาพเรดวินเทอร์จะถูกได้ยินมากขึ้น เมื่ออยู่ในชาเล่ต์..."
2005203-33 = "ฮืม ฮืม แล้วนักเรียนจากสถาบันสหภาพเรดวินเทอร์ที่มาอยู่ที่นี่ในตอนนี้ ก็ดันเป็นฉัน อารามากิ ยาคุโมะ..."
2005203-37 = "คุณครูคะ"
2005203-38 = "เพื่อความเสมอภาคและความยุติธรรม คติพจน์อย่างไม่เป็นทางการของสถาบันสหภาพเรดวินเทอร์..."
2005203-39 = "ฉันจะขอให้คุณครูช่วย 'แนะนำ' ให้โรงเรียนทั้งหมด ไม่สิ ไม่ต้องทั้งหมดก็ได้ค่ะ ขอแค่ 'โรงเรียนขนาดใหญ่ชื่อดังทั้งสาม'"
2005203-40 = "ให้ช่วยสนับสนุนการผลิตพุดดิ้งของเรดวินเทอร์ตั้งแต่นี้เป็นต้นไปได้มั้ยคะ?"
2005203-41 = "แล้วก็ใส่เครื่องหมายดอกจันกำกับข้อความตัวเล็กๆ ว่าได้รับการสนับสนุนจากชมรมสื่อสิ่งพิมพ์ค่ะ"
2005203-42 = "การทำแบบนี้จะช่วยลดปัญหายอดขายพุดดิ้งได้ชั่วคราว ในทางภายนอก แคมเปญนี้จะช่วยยกระดับ#nสถานะของเรดวินเทอร์ได้ ส่วนผลประโยชน์ภายในก็..."
2005203-43 = "[s] \"ไม่~ อนุมัติ~\""
2005203-47 = "ทำไมล่ะคะ~"
2005203-48 = "ฮึ่ย... เข้าใจแล้วค่ะ..."
2005203-49 = "ไม่สิ ที่ผ่านมาฉันเอาแต่คิดถึงเรดวินเทอร์มากเกินไป หรือนี่จะเป็นสาเหตุของความพ่ายแพ้ของฉันคะ?"
2005203-50 = "เมื่อมาอยู่ที่นี่แล้ว ก็ต้องใช้อำนาจเหนือกฎหมายของชาเล่ต์ให้เป็นประโยชน์..."
2005203-51 = "อย่าจ้องกันแรงอย่างนั้นสิคะ... ครั้งนี้ฉันจะสร้างวงจรแห่งความดีงามต่างหากค่ะ เชื่อฉันเถอะค่ะ ฉันพูดจริงๆ นะคะ"
2005203-52 = "แต่ก็เอาเถอะค่ะ ถึงอำนาจเหนือกฎหมายนั้นมักถูกใช้แค่เป็นการชั่วคราว"
2005203-53 = "แต่ในกรณีนี้ เพื่อประโยชน์ส่วนรวมแล้วละก็..."
2005203-54 = "ถ้าเกิดว่า..."
2005203-58 = "เรื่องแผนการที่เป็นรูปธรรม ไว้ค่อยมาคิดทีหลังแล้วกันค่ะ..."
2005203-59 = "เอาเป็นว่าถ้าคุณครูทำกิจการเพื่อสาธารณะที่จะเป็นประโยชน์ต่อทุกคนในนามของชาเล่ต์"
2005203-60 = "แล้วก็ช่วยโปรโมตว่าได้รับความร่วมมือจากชมรมสื่อสิ่งพิมพ์ของเรา..."
2005203-61 = "[s] \"ก็บอกว่าไม่ได้ไง\""
2005203-62 = "เย็นชาจังเลยนะคะ..."
2005203-63 = "[s] \"ชอบเรื่องอะไรแบบนี้จริงๆ เลยนะ ยาคุโมะ\""
2005203-64 = "ก็... ทำนองนั้นค่ะ การเขียนแผนธุรกิจเป็นงานอดิเรกอย่างหนึ่งของฉันนี่คะ"
2005203-65 = "จะว่ายังไงดีล่ะคะ... การผลักดันขีดจำกัดของความเป็นไปได้เป็นเรื่องสนุกสำหรับฉันค่ะ"
2005203-66 = "ต่อให้มันจะเป็นไปไม่ได้หรือห่างไกลความจริงก็ตามค่ะ"
2005203-67 = "แล้วก็..."
2005203-68 = "ปกติแล้วถ้าเราจะหารายได้หรือของบประมาณ! เราก็ต้องสร้างภาพลักษณ์ขึ้นมาให้ดูดีที่สุด! ต่อให้มันจะเคยมีหรือไม่ก็ตาม! ตราบใดที่ยังไม่เป็นการโกหกน่ะค่ะ!"
2005203-69 = "กับสำนักเลขาธิการเรดวินเทอร์ยิ่งแล้วใหญ่เลยค่ะ..."
2005203-70 = "ต้องไปเสนอว่าถ้าธุรกิจนี้เป็นไปได้ด้วยดี การส่งออกพุดดิ้งของเดือนนี้จะมากขึ้นเป็น 2 เท่า..."
2005203-71 = "[s] \"แล้วเคยเสนอได้ผลหรือเปล่า?\""
2005203-75 = "แทบจะไม่เลยค่ะ..."
2005203-77 = "(คุณครูบอกยาคุโมะว่าสิ่งสำคัญในการทำธุรกิจก็คือการสร้างความไว้วางใจ)"
2005203-78 = "(แล้วก็คุยกับยาคุโมะอย่างออกรส(?) และทำงานของตัวเองต่อ)"
2005203-79 = "(วันนี้ทำให้คุณครูตระหนักได้อีกครั้งว่า ในแง่หนึ่งยาคุโมะก็เป็นเพื่อนคุยที่ดีทีเดียว)"

[translation]
2005203-1 = "Business Proposal"
2005203-2 = "You know, Sensei."
2005203-3 = "[s] \"What is it, Yakumo?\""
2005203-4 = "Anything Schale says eventually spreads through all of Kivotos, right?"
2005203-5 = "[s] \"Well, in a sense, it is pretty official.\""
2005203-6 = "Of course. But even taking that into account..."
2005203-7 = "I recently realized how rare it is to find an influencer with this level of intangible power and reach."
2005203-8 = "[s] \"Hearing you talk like that makes me really anxious.\""
2005203-9 = "Just hear me out, Sensei."
2005203-10 = "Don't you think it's a shame to waste such influence and trust?"
2005203-11 = "You might not. But I do. I can see it."
2005203-12 = "So, while I was thinking about that, I came up with an excellent pitch. What if we launched a \"Let's Read Together\" campaign, supported straight from Schale?"
2005203-13 = "[s] \"That seems like it would benefit the public.\""
2005203-14 = "And then we carefully select and include the Publishing Department's special selection of books. Heh, heh, heh."
2005203-15 = "[s] \"Please behave yourself, Yakumo.\""
2005203-16 = "Ah, now that I think about it, Trinity Library would take a hit, I guess..."
2005203-17 = "No. If I play my cards right, it'll just boost the Publishing Department's credibility even more... We could use it to our advantage..."
2005203-18 = "People do say that only a true entrepreneur can turn crises into opportunities..."
2005203-22 = "Sensei. Could you support the Publishing Department? As an advisor or something like that?"
2005203-23 = "As for the justification... Hm. \"For the welfare of the frozen academy of the wastelands, and for the destitute students who suffer there.\""
2005203-24 = "[s] \"No.\""
2005203-25 = "Why?"
2005203-26 = "[s] \"You know why.\""
2005203-27 = "You're right... Fiddlesticks. If only that annoying neutrality clause didn't exist."
2005203-28 = "Well, what else is there...?"
2005203-29 = "Schale... D.U...."
2005203-30 = "A universally recognized zone of political neutrality..."
2005203-31 = "In other words, no academy can rashly assert their sovereignty here..."
2005203-32 = "...even the Red Winter Federal Academy's weak voice could be amplified within Schale..."
2005203-33 = "Hm, hmmm. And the student from said Academy just happens to be me, Aramaki Yakumo..."
2005203-37 = "Sensei!"
2005203-38 = "For the sake of equality and fairness, the unofficial motto of our Red Winter Federal Academy, all academies—"
2005203-39 = "Well, not all of them, but the so-called \"top 3 academies\"..."
2005203-40 = "How about we make a...gentle suggestion to directly, or even indirectly, assist with Red Winter's pudding production?"
2005203-41 = "And we'll add some fine print stating that the whole endeavor was sponsored by the Publishing Department."
2005203-42 = "This will temporarily alleviate the chronic shortage of pudding, elevate Red Winter's standing externally, and internally..."
2005203-43 = "[s] \"Deeeniiied.\""
2005203-47 = "Why?"
2005203-48 = "Ugh... Fine..."
2005203-49 = "Wait. I've only been focusing on Red Winter until now... Is that shortsightedness the cause of my failure?"
2005203-50 = "By leveraging the fact that Schale possesses extrajudicial authority..."
2005203-51 = "...Don't look at me like that. This time, the aim is to create a virtuous culture. Trust me. It's the truth!"
2005203-52 = "Anyway, that extrajudicial authority, although it's only ever been used in emergencies..."
2005203-53 = "In this case, for the common good..."
2005203-54 = "Supposing, for example..."
2005203-58 = "...We'll work out the specifics a little later."
2005203-59 = "Either way, let's carry out public projects that benefit everyone in the name of Schale."
2005203-60 = "And then just announce that you're collaborating with the Publishing Department!"
2005203-61 = "[s] \"No.\""
2005203-62 = "So cold..."
2005203-63 = "[s] \"That being said, you seem to really enjoy this sort of thing, Yakumo.\""
2005203-64 = "Well, that's right. Writing business proposals is a hobby of mine, of sorts."
2005203-65 = "How do I explain this? It's the excitement of exploring and manipulating the endless possibilities of any given scenario."
2005203-66 = "It doesn't matter if it's out of the question or actually feasible."
2005203-67 = "Besides..."
2005203-68 = "When it comes to making money, you have to exaggerate everything you can (within reason), without outright lying!"
2005203-69 = "Even more so when it comes to the Red Winter Office..."
2005203-70 = "For example, let's say that pudding rations this month would double if a project goes well..."
2005203-71 = "[s] \"Has that ever worked out?\""
2005203-75 = "Er... I'm sure it could, one day..."
2005203-77 = "While discussing the importance of building trust in any business..."
2005203-78 = "Yakumo and I whittled away at work in our own way and enjoyed(?) it."
2005203-79 = "By the end of the day, I was pleasantly reminded that Yakumo is, in her own unique way, the ideal conversation partner."

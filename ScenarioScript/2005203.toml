[translation]
2005203-1 = "事業計畫書"
2005203-2 = "話說，老師。"
2005203-3 = "[s]「怎麼了？八雲。」"
2005203-4 = "從夏萊發出去的話，最終都會傳遍整個奇普托斯對吧？"
2005203-5 = "[s]「畢竟那也能算是一種公文吧。」"
2005203-6 = "雖然是這樣沒錯，不過即便考慮到這點……"
2005203-7 = "我剛才突然意識到……#n像這樣擁有無形權力與傳播力的意見領袖，其實還挺罕見的呢。"
2005203-8 = "[s]「從八雲口中聽見這種話，老師我會很不安耶……」"
2005203-9 = "請聽我說，老師。"
2005203-10 = "如此強大的傳播力與公信力，您不覺得就這麼浪費掉很可惜嗎？"
2005203-11 = "就算老師不覺得，我也會覺得浪費。"
2005203-12 = "所以……我才得出了這樣的結論。#n假如以夏萊的名義推動「大家來讀書」的活動……老師覺得怎麼樣呢？"
2005203-13 = "[s]「感覺很有公益性，聽起來不錯呢。」"
2005203-14 = "接著在書單裡加入我們出版部的特選圖書……呣呵呵。"
2005203-15 = "[s]「請你自重，八雲同學。」"
2005203-16 = "啊，但是仔細想想，在公信力方面有可能會輸給三一圖書館……"
2005203-17 = "不，如果能趁機將出版部的公信力提升到對方之上，搞不好能扭轉整個局勢……？"
2005203-18 = "常言道，真正的企業家必須化危機為轉機……"
2005203-22 = "老師，請成為我們出版部的靠山吧。#n比如擔任我們的顧問之類的。"
2005203-23 = "至於名分……就用這個吧。#n「為追求因嚴寒而飽經風霜的學園暨學生之福祉」。"
2005203-24 = "[s] 「不行。」"
2005203-25 = "為什麼嘛～"
2005203-26 = "[s]「你明明也知道原因的。」"
2005203-27 = "這倒是沒錯啦……#n呿，要是沒有可惡的中立義務就好了。"
2005203-28 = "除此之外還有什麼辦法呢……"
2005203-29 = "夏萊……D.U.……"
2005203-30 = "所有人公認的政治中立地帶……"
2005203-31 = "換句話說，任何學園在這裡都不能擅自主張自治權……"
2005203-32 = "這麼一來，赤冬聯邦學園那薄弱的發言權，也能在夏萊內部獲得修正補償……"
2005203-33 = "正好現在待在這裡的赤冬聯邦學園學生，就是我荒槇八雲……"
2005203-37 = "老師。"
2005203-38 = "為了實現我們赤冬聯邦學園的非官方格言「平等」與「公平」，請向所有學園……"
2005203-39 = "不，就算不向所有學園，只向發展最好的「三大學園」也沒關係。"
2005203-40 = "能請您「積極建議」他們以直接或間接的方式，協助赤冬的布丁生產嗎？"
2005203-41 = "然後再用小字在旁邊註明是由我們出版部贊助的。"
2005203-42 = "這樣不僅能暫時解決布丁慢性供應不足的問題，#n對外還能提高赤冬的威望，對內則是──"
2005203-43 = "[s]「駁～回～」"
2005203-47 = "為什麼啦～"
2005203-48 = "唔……好吧……"
2005203-49 = "等等……我好像一直都太以赤冬為中心思考了。#n難道這就是失敗的原因嗎……？"
2005203-50 = "果然應該活用夏萊擁有的「超法規」權限……"
2005203-51 = "……請不要一直用那種眼神盯著我看，我這次是真的打算帶動良性循環。#n請相信我，是真的啦！"
2005203-52 = "總之，雖然那種超越法規的權限，大多是在緊急情況下用來應急……"
2005203-53 = "不過以現在這個情況來說，果然還是要打出公益牌……"
2005203-54 = "例如，例如說……"
2005203-58 = "……具體方案之後再想好了。"
2005203-59 = "反正重點在於，要以夏萊的名義推動對所有人都有益的公共事業。"
2005203-60 = "然後在過程中宣傳我們出版部也有參與協作的事實──"
2005203-61 = "[s]「就說不行了。」"
2005203-62 = "老師好冷淡哦……"
2005203-63 = "[s]「不過你真的很喜歡這種事呢，八雲。」"
2005203-64 = "唔嗯……算是吧？#n撰寫事業計畫書稱得上是我的愛好之一。"
2005203-65 = "該怎麼說呢……讓可能性盡可能爆發到極致這件事，會讓我感到很愉快。"
2005203-66 = "無論那是非常異想天開，還是很有可行性的都一樣。"
2005203-67 = "而且……"
2005203-68 = "想要人家掏錢本來就該說些有的沒的，在不說謊的前提下盡可能吹噓才行！"
2005203-69 = "尤其在面對赤冬事務局的時候，就更是如此了……"
2005203-70 = "例如說「只要這項事業順利進行，這個月的布丁配給量就可能翻倍」之類的……"
2005203-71 = "[s]「有順利成功過嗎？」"
2005203-75 = "這倒是幾乎沒有啦……"
2005203-77 = "（一邊聊著事業最重要的終究是建立互信關係……）"
2005203-78 = "（一邊與八雲還算愉快地(?)處理了業務）"
2005203-79 = "（總之再次體會到了八雲從某方面來說，真是個聊天的最佳人選）"

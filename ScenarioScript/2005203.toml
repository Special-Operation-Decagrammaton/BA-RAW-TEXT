[translation]
2005203-1 = "#title;사업 계획서"
2005203-2 = "3;야쿠모;02;있잖아요, 선생님.\n#3;em;[?]\n#3;a"
2005203-3 = "[s] \"왜 그러니, 야쿠모.\""
2005203-4 = "3;야쿠모;01;샬레에서 나가는 말은, 어쨌든 결과적으로 키보토스 전역으로 퍼지잖아요?"
2005203-5 = "[s] \"그야 어떤 의미로는 공문이니까.\""
2005203-6 = "3;야쿠모;99;물론 그렇지만요. 그런 점을 감안해도 말이죠."
2005203-7 = "3;야쿠모;08;이 정도로 무형의 권력과 전파력을 가진 인플루언서는 드물다는 것을, 지금 막 깨달았거든요?\n#3;em;[반응]"
2005203-8 = "[s] \"야쿠모가 그런 말을 하니까, 선생님은 정말 불안하구나.\""
2005203-9 = "3;야쿠모;03;들어 보세요. 선생님.\n#3;em;[재잘]"
2005203-10 = "3;야쿠모;09;이 정도의 전파력과 공신력, 아깝다고 생각하지 않으십니까?"
2005203-11 = "3;야쿠모;10;선생님께서 아깝다고 생각하지 않으셔도, 제가 아깝다고 생각하니까 괜찮습니다."
2005203-12 = "3;야쿠모;08;그래서 이런 결론을 내린 것이에요. 가령, 샬레 추천으로 '책을 읽자' 캠페인을 전개해 보면 어떨까, 하고요."
2005203-13 = "[s] \"그건 공익적이고 괜찮네.\""
2005203-14 = "3;야쿠모;11;그리고 거기에 출판부 특선 도서를, 엄선해서 끼워 넣는 거죠. 힛. 힛. 히.\n#3;em;[음표]"
2005203-15 = "[s] \"자중해 주세요, 야쿠모 학생.\""
2005203-16 = "3;야쿠모;02;아, 그런데 생각해 보니 트리니티 도서관에 공신력에서 밀리겠구만요……."
2005203-17 = "3;야쿠모;01;아니죠. 이 기회에 출판부의 공신력을 그 이상으로 끌어올릴 수만 있으면, 모든 상황을 역전시킬 가능성이……?\n#3;m2"
2005203-18 = "3;야쿠모;99;이르기를, 위기를 기회로 만들 수 있어야만 진정한 사업가라 하였고……?"
2005203-19 = "#st;[0,0];instant;1;"
2005203-20 = "#clearST"
2005203-21 = "3;야쿠모;01\n#3;m3\n#wait;1200"
2005203-22 = "3;야쿠모;08;선생님. 저희 출판부 뒷배 좀 서 주시죠. 고문 교사라든가 뭐 그런 걸로요.\n#3;em;[반응]"
2005203-23 = "3;야쿠모;10;명분은…… 그거면 되겠네요. 추위로 힘들어하는 학원과, 거기에서 한층 더 고생하는 학생들의 복지 측면으로."
2005203-24 = "[s] \"안 돼.\""
2005203-25 = "3;야쿠모;06;왜요~\n#3;em;[세로선]\n#3;stiff"
2005203-26 = "[s] \"거 알면서.\""
2005203-27 = "3;야쿠모;04;그건 그렇죠……. 쳇. 그놈의 중립 의무만 없었어도."
2005203-28 = "3;야쿠모;01;그럼 또 뭐 없나…….\n#3;em;[한숨]"
2005203-29 = "3;야쿠모;99;샬레…… D.U. ……."
2005203-30 = "3;야쿠모;99;모두가 공인하는 정치적 중립 지대……."
2005203-31 = "3;야쿠모;01;바꿔 말해 여기에서는, 어떤 학원도 자치권을 섣불리 주장할 수 없다…….\n#3;em;…"
2005203-32 = "3;야쿠모;05;그렇다는 것은 붉은겨울 연방학원의 약한 발언권도, 샬레 안에서라면 보정을 받을 수 있을 거고……."
2005203-33 = "3;야쿠모;99;흠. 흠. 마침 여기에 와 있는 붉은겨울 연방학원의 학생은 바로 저, 아라마키 야쿠모……."
2005203-34 = "#st;[0,0];instant;1;"
2005203-35 = "#clearST"
2005203-36 = "3;야쿠모;02\n#3;em;[전구]\n#3;h\n#wait;1000"
2005203-37 = "3;야쿠모;00;선생님."
2005203-38 = "3;야쿠모;08;저희 붉은겨울 연방학원의 비공식 모토인 평등과 공평을 위해서, 모든 학원……."
2005203-39 = "3;야쿠모;09;아니, 모두까지는 아니더라도, 잘 나가는 이른바 '3대 학원'은."
2005203-40 = "3;야쿠모;11;이제부터 붉은겨울의 푸딩 생산을 직간접적으로 도와 달라고, '적극적 권고'를 해 주시면 어떨까요?\n#3;em;[재잘]"
2005203-41 = "3;야쿠모;09;그리고 거기에 저희 출판부의 협찬이 있었다고 작게 써넣는 겁니다."
2005203-42 = "3;야쿠모;07;이것으로 만성적인 푸딩 공급 부족을 일시적으로나마 해소하고, 대외적으로는 붉은겨울의 위상을 높이며, 내부적으로는–"
2005203-43 = "[s] \"기~각~\""
2005203-44 = "#st;[0,0];instant;1;"
2005203-45 = "#clearST"
2005203-46 = "3;야쿠모;13\n#3;em;[?!]\n#3;shake\n#wait;800"
2005203-47 = "3;야쿠모;06;왜요오~\n#3;em;[속상함]"
2005203-48 = "3;야쿠모;99;끄응……. 알았어요……."
2005203-49 = "3;야쿠모;01;아니죠. 지금까지는 너무 붉은겨울 위주로만 생각했어요. 혹시 그것이 패배 원인?"
2005203-50 = "3;야쿠모;05;여기에서는 역시, 샬레에 초법적 권한이 있다는 것을 활용해서……."
2005203-51 = "3;야쿠모;03;……너무 그렇게 쳐다보지 마시고요. 이번에는 선순환을 일으키려고 합니다. 믿어 보세요. 진짜라니까요?\n#3;em;[재잘]"
2005203-52 = "3;야쿠모;08;아무튼, 그 초법적 권한은 비록 일시적으로 사용될 경우가 많았지만."
2005203-53 = "3;야쿠모;99;이 경우에는 역시, 공익을 위해서……."
2005203-54 = "3;야쿠모;02;가령, 가령……."
2005203-55 = "#st;[0,0];instant;1;"
2005203-56 = "#clearST"
2005203-57 = "3;야쿠모;02\n#3;em;…\n#3;h\n#wait;2500"
2005203-58 = "3;야쿠모;12;……구체적인 방안은 조금 나중에 생각하기로 하죠.\n#3;em;[땀]"
2005203-59 = "3;야쿠모;07;아무튼, 모두에게 좋은 공공사업을 샬레의 이름으로 진행하고."
2005203-60 = "3;야쿠모;11;거기에, 저희 출판부가 협업했다는 사실만 공표해 주시면–"
2005203-61 = "[s] \"안 되니까.\""
2005203-62 = "3;야쿠모;04;차갑구만요…….\n#3;em;[세로선]"
2005203-63 = "[s] \"그렇지만 그런 거 정말 좋아하는구나. 야쿠모.\""
2005203-64 = "3;야쿠모;02;뭐, 그렇죠? 사업 계획서 작성이, 일종의 제 취미이기도 하고요."
2005203-65 = "3;야쿠모;08;뭐라고 할까요……. 가능성을 최대한 폭발시켜 보는 게 즐거운 거죠."
2005203-66 = "3;야쿠모;99;그게 택도 없는 것이든, 뭔가 될 것 같은 것이든."
2005203-67 = "3;야쿠모;10;거기에……."
2005203-68 = "3;야쿠모;11;원래 돈 따낼 때는! 있는 거 없는 거! 최대한 거짓말은 안 하는 선에서 부풀려야 하는 법이다 보니 말입니다!\n#3;em;[반짝]\n#3;closeup"
2005203-69 = "3;야쿠모;00;그게 붉은겨울 사무국이라면 더 그렇고요…….\n#3;closeup"
2005203-70 = "3;야쿠모;07;가령 이번 달 푸딩 배급량이, 이 사업만 잘되면 두 배로 터질 수 있을 거다, 하는 식으로…….\n#3;closeup"
2005203-71 = "[s] \"그거 잘 된 적 있었니?\""
2005203-72 = "#st;[0,0];instant;1;"
2005203-73 = "#clearST"
2005203-74 = "3;야쿠모;13\n#3;em;…\n#wait;2500"
2005203-75 = "3;야쿠모;04;거의 없기는 했죠…….\n#3;stiff\n#3;em;[세로선]"
2005203-76 = "#all;hide"
2005203-77 = "#na;(사업에 중요한 것은, 결국 신뢰도 형성이 아니냐는 이야기를 나누며.)"
2005203-78 = "#na;(야쿠모와 나름대로 즐겁게(?) 업무를 처리했다.)"
2005203-79 = "#na;(아무튼 야쿠모는, 말 상대로서는 어떤 의미로 최적인 아이라는 것을, 다시 한번 실감했다.)"

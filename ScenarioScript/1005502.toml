[translation]
1005502-1 = "若無其事"
1005502-4 = "（結束了赤冬聯邦學園的工作後，前往了227號特別班所在的舊校舍）"
1005502-12 = "（因為位處相當偏僻的地方，抵達時已經夜幕低垂了）"
1005502-16 = "……有腳步聲？"
1005502-20 = "……啊。"
1005502-27 = "什麼嘛，原來是老師啊。#n怎麼突然跑到這裡來呢？而且還在這種時間。"
1005502-28 = "……咦？"
1005502-29 = "約好了？#n……啊啊，是那個時候。你還記得啊。"
1005502-33 = "來，快進來吧？雖然外面很冷，但屋子裡還挺溫暖的哦。"
1005502-42 = "雖然自己這麼說有點奇怪，但我其實沒想過老師真的會來。有點吃驚。"
1005502-43 = "正好在這種日子，還只有我一個人在……謝謝你啦。"
1005502-44 = "其他人正好都出去找柴火了。"
1005502-45 = "[s1]「這樣啊，別在意。我也沒有特別的事要做。」\n[s2]「時雨一個人待在這裡嗎？會不會無聊？」"
1005502-46 = "沒什麼特別的事……那種說法反而讓人有點在意呢？"
1005502-47 = "說不無聊是騙人的……不過至少現在，老師來陪我了不是嗎？"
1005502-48 = "呵呵，玩笑先說到這邊……"
1005502-49 = "沒什麼能招待老師的東西真的很抱歉……"
1005502-58 = "不過你應該渴了吧，要喝嗎？"
1005502-59 = "[s3]「我就欣然接受了。」\n[s4] 道謝後喝下"
1005502-69 = "[ns5] 和強烈的違和感一同噴出來\n[ns6]「這東西絕對不是水吧！？」"
1005502-71 = "啊──真浪費。珍貴的伏……不是，生命之水都……"
1005502-73 = "哎呀哎呀。突然說點沒關連的話，「伏特加」的語源好像是「水」唷？"
1005502-74 = "不不不，我沒有騙你唷？#n我從來沒說過裡面裝的是什麼吧。"
1005502-75 = "而且，就算老師喝了也沒什麼問題吧？"
1005502-76 = "……？"
1005502-77 = "假如是酒的話，就不能在學生的面前喝？"
1005502-78 = "原來如此……來這招啊……"
1005502-82 = "……當成是開創先例了如何？"
1005502-83 = "[s7]「不行就是不行啊……」\n[s8]「可以的話，請給我普通的水……」"
1005502-84 = "嗯……抱歉。#n雖然我也很想給你普通的水……"
1005502-85 = "嗯……抱歉。#n雖然我也很想給你普通的水……"
1005502-86 = "我也不是想搗亂才給你喝那個的。"
1005502-87 = "不過現在這裡的電力全都停止了。#n冰箱也發生故障……所以飲料全都結凍了。"
1005502-88 = "液體類的飲料無一倖免，只有「某種度數很高的飲料」倖存下來。"
1005502-89 = "從這點來看，你不覺得它是很優秀的飲料嗎？"
1005502-90 = "即便處於極端狀況下依然能解渴，#n在寒冷的地方能調節體溫，而且受傷時還能當消毒藥使用……"
1005502-91 = "有時甚至還能當點火的燃料使用的萬能液體。"
1005502-92 = "[s]「是這麼說沒錯啦……」"
1005502-93 = "總覺得說著說著我也渴了……"
1005502-94 = "但直接吃冰塊的話可能會低溫燙傷，剩下的就只有……"
1005502-95 = "……只喝一口應該沒關係吧。"
1005502-99 = "那麼──"
1005502-100 = "[s9]「不行不行不行不行。」\n[s10] 把「瓶子」拿過來"
1005502-107 = "老師？"
1005502-108 = "怎麼突然這樣，老師也想喝嗎？"
1005502-115 = "你，你在做什麼……！？"
1005502-116 = "當燃料用的話，就可以融化結凍的飲料了……？"
1005502-117 = "唔嗯……"
1005502-118 = "確實，是可以那麼做啦……"
1005502-119 = "………………"
1005502-120 = "[s11]「你看起來好像很遺憾……」\n[s12]「雖然很抱歉，但不行就是不行……」"
1005502-121 = "……嗯，好吧。"
1005502-122 = "……嗯，好吧。"
1005502-123 = "……"
1005502-125 = "……這麼說也對。"
1005502-129 = "（之後順利地融化了飲料，和時雨度過了悠閒的時光）"

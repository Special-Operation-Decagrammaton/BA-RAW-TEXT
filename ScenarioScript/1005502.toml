[translation]
1005502-1 = "อย่างเนียนๆ"
1005502-4 = "(หลังจากเสร็จงานในสหภาพเรดวินเทอร์ คุณครูก็มุ่งหน้าไปยังอาคารเรียนเก่าตามสัญญา)"
1005502-12 = "(แต่เพราะอาคารเรียนเก่าตั้งอยู่ในที่ห่างไกล กว่าจะไปถึงพระอาทิตย์ก็ตกแล้ว)"
1005502-16 = "หืม...? แปลกแฮะ เหมือนได้ยินเสียงฝีเท้าคนเดินอยู่ในอาคารเรียนเก่าเลย"
1005502-20 = "เอ๋..."
1005502-27 = "ดูซิใครมา คุณครูเองเหรอเนี่ย? เวลาแบบนี้มาทำอะไรในที่ซอมซ่อแบบนี้กัน?"
1005502-28 = "หืม...?"
1005502-29 = "สัญญาเหรอ? ฉันเคยพูดแบบนั้นไปด้วยสินะ นึกออกแล้ว นี่คุณครูจำได้ด้วยเหรอเนี่ย ขอบคุณนะ~"
1005502-33 = "เข้ามาสิ ข้างนอกหนาวมากใช่มั้ย? เข้ามาข้างในสิ จะได้อุ่นๆ หน่อย"
1005502-42 = "ฉันเป็นคนเอ่ยปากชวนก่อนก็จริง แต่ไม่คิดเลยนะว่าคุณครูจะมาจริงๆ น่าซึ้งใจนะเนี่ย"
1005502-43 = "ขอบคุณนะคุณครู ทั้งที่เป็นวันที่น่ายินดีแท้ๆ แต่กลับมีฉันอยู่ที่นี่คนเดียว"
1005502-44 = "พอดีนักเรียนคนอื่นๆ ออกไปหาฟืนกันหมดน่ะ"
1005502-45 = "[s1] \"ไม่เป็นไร ไม่ต้องต้อนรับเหมือนแขกพิเศษหรอก\"\n[s2] \"อยู่เฝ้าที่นี่คนเดียวเหรอเนี่ย? ไม่เหงาเหรอ?\""
1005502-46 = "ไม่ได้มาเป็นแขกพิเศษงั้นเหรอ? งั้นเป็นอะไรล่ะ พูดแบบนี้ยิ่งกวนใจฉันนะ..."
1005502-47 = "อืม... ถ้าบอกว่าไม่เหงาก็คงเป็นการพูดโกหก แต่ตอนนี้ไม่เหงาแล้วละ ก็คุณครูมาหาแล้วไง"
1005502-48 = "ฮิฮิ เลิกพูดล้อเล่นดีกว่า"
1005502-49 = "ไหนดูซิ... มีเครื่องดื่มอะไรเหลืออยู่บ้าง..."
1005502-58 = "คุณครูน่าจะเหนื่อยกับการมาที่นี่ ลองดื่มอันนี้ให้ชุ่มคอหน่อยมั้ยล่ะ?"
1005502-59 = "[s3] \"น้ำเหรอ? ดูเย็นสดชื่นจัง\"\n[s4] ขอบคุณและรับมาดื่ม"
1005502-69 = "[ns5] พ่นเครื่องดื่มออกจากปาก\n[ns6] \"ไม่ใช่น้ำนี่นา! เหล้าหรือเปล่าเนี่ย!?\""
1005502-71 = "โธ่เอ๊ย— พ่นออกทำไม เสียดายของ นี่มันวอด... ไม่สิ น้ำแห่งชีวิตเลยนะ..."
1005502-73 = "ก็ไม่เชิง เพราะต้นกำเนิดของวอดก้าก็คือ 'น้ำ' เหมือนกันนี่นา"
1005502-74 = "หืม? หาว่าฉันหลอกเหรอ? ฉันจะไปหลอกคุณครูทำไม อีกอย่าง ฉันไม่ได้บอกนี่นาว่ามันคือ 'น้ำ'"
1005502-75 = "แต่ก็ไม่เห็นเป็นอะไรเลยนี่นา ยังไงคุณครูก็เป็นผู้ใหญ่ ถึงดื่มเหล้าก็ไม่ผิดซะหน่อย"
1005502-76 = "หืม...? ว่าไงนะ?"
1005502-77 = "ครูที่ไหนจะมาดื่มเหล้าต่อหน้านักเรียนงั้นเหรอ?"
1005502-78 = "อืม... ถ้าพูดแบบนั้น... "
1005502-82 = "งั้นก็ใช้โอกาสนี้... ดื่มให้ดูเป็นตัวอย่างเลยก็ได้นี่นา?"
1005502-83 = "[s7] \"ไม่น่ามาเลย\"\n[s8] \"ขอละ เอาน้ำมาให้หน่อยเถอะนะ\""
1005502-84 = "ขอโทษนะคุณครู แต่เครื่องดื่มที่เหลืออยู่ มีแค่วอดก้าขวดนี้น่ะ..."
1005502-85 = "ขอโทษนะคุณครู แต่เครื่องดื่มที่เหลืออยู่ มีแค่วอดก้าขวดนี้น่ะ..."
1005502-86 = "ฉันไม่ได้เอาวอดก้าให้ครูดื่มเพราะคิดจะมอมเหล้าครู หรืออะไรทำนองนั้นหรอก"
1005502-87 = "แต่ว่าอาคารนี้ไม่มีไฟฟ้าใช้ ตู้เย็นก็พัง เครื่องดื่มก็แข็งเป็นน้ำแข็งไปหมดแล้ว"
1005502-88 = "ทั้งน้ำเปล่า น้ำผลไม้ โคล่าก็เป็นน้ำแข็งหมดเลย... จะมีก็แต่วอดก้านี่แหละที่ไม่เป็นน้ำแข็งและ#nยังพอดื่มได้อยู่"
1005502-89 = "จะว่าไปแล้ว วอดก้านี่เป็นเครื่องดื่มที่สมบูรณ์แบบมากเลยนะ"
1005502-90 = "นอกจากจะช่วยบรรเทาความกระหายในสถานการณ์คับขันแล้ว ยังช่วยควบคุมอุณหภูมิร่างกาย#nเมื่ออยู่ท่ามกลางอากาศหนาว แถมยังใช้เป็นยาฆ่าเชื้อเวลาบาดเจ็บได้อีก..."
1005502-91 = "แถมยังเป็นน้ำสารพัดประโยชน์ที่ใช้เป็นเชื้อเพลิงจุดไฟได้ด้วย ฮิฮิ"
1005502-92 = "[s] \"อยู่ๆ ก็สรรเสริญวอดก้าขึ้นมาซะงั้น...\""
1005502-93 = "งื้ออ~ พอพูดเยอะๆ แบบนี้ รู้สึกคอแห้งขึ้นมาเลย"
1005502-94 = "แต่เครื่องดื่มที่ดื่มได้ตอนนี้ก็มีแต่วอดก้า เพราะถ้ากินน้ำแข็งก็อาจโดนน้ำแข็งบาดปากได้อีก..."
1005502-95 = "ในสถานการณ์คับขันอย่างตอนนี้ ดื่มแค่สักอึกคงไม่เป็นไรหรอกว่ามั้ย?"
1005502-99 = "งั้นฉันจะดื่มแล้วนะ—"
1005502-100 = "[s9] \"ไม่ๆ แบบนี้ไม่ได้สิ\"\n[s10] แย่งวอดก้ามา"
1005502-107 = "คุณครู...?"
1005502-108 = "ทำไมถึงแย่งไปแบบนั้นล่ะ? หรือว่าจู่ๆ ก็อยากดื่มวอดก้าเหมือนกัน?"
1005502-115 = "ทะ... ทำอะไรน่ะ!? ทำไมเอาวอดก้าที่ฉันหวงแหนไปเทลงกองไฟหมดเลย...!"
1005502-116 = "หืม...? \"จะใช้วอดก้าเป็นเชื้อเพลิงในการจุดไฟ จากนั้นก็ละลายน้ำดื่มกับน้ำผลไม้ที่เป็นน้ำแข็ง\" งั้นเหรอ?"
1005502-117 = "อืม..."
1005502-118 = "มันก็จริงอยู่... ที่ทำแบบนั้นก็ได้..."
1005502-119 = "งือออ..."
1005502-120 = "[s11] \"ทำหน้าเสียดายออกนอกหน้าเกินไปหรือเปล่า?\"\n[s12] \"ครูบอกว่าไม่ได้ก็คือไม่ได้\""
1005502-121 = "ไม่ได้เสียดายอะไรสักหน่อย"
1005502-122 = "รู้แล้ว... ไม่ได้ก็ไม่ได้"
1005502-123 = "..."
1005502-125 = "...จะหาโอกาสกินแบบเนียนๆ สักหน่อย แต่ไม่ง่ายเลยนะเนี่ย"
1005502-129 = "(หลังจากนั้นคุณครูกับชิกุเระก็นำน้ำเปล่ากับน้ำผลไม้ที่เป็นน้ำแข็งมาละลาย แล้วนั่งดื่มด้วยกัน)"

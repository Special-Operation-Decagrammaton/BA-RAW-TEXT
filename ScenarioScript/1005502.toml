[translation]
1005502-1 = "Discreetly"
1005502-4 = "After finishing my business with Red Winter Academy, I headed to the Former Institute, as promised."
1005502-12 = "Since it was in such a remote area, the sun had already gone down by the time I arrived."
1005502-16 = "Huh? Who's there?!"
1005502-20 = "...Oh."
1005502-27 = "Sensei? What are you doing all the way out here? And at this time?"
1005502-28 = "...What?"
1005502-29 = "Oh, we did talk about meeting up. Thanks for remembering!"
1005502-33 = "Hurry, hurry. Come in and warm up. You'll let the cold in."
1005502-42 = "I don't mean this in a bad way, but I really didn't think you would actually come. It means a lot."
1005502-43 = "Seriously, thanks. I'm sorry there's no one to entertain you but me."
1005502-44 = "The others went out to collect what firewood they could."
1005502-45 = "[s1] \"Don't worry, you don't have to treat me like a guest.\"\n[s2] \"You're all alone? Are you bored?\""
1005502-46 = "Who are you, if not my guest? Hm, I'm not going to be able to stop thinking about this until I figure it out."
1005502-47 = "Eh, I'd be lying if I said I wasn't. But now you're here, right, Sensei?"
1005502-48 = "Heehee. It's fun to mess with you."
1005502-49 = "Well, let's see... I'm sorry. I don't have much to offer."
1005502-58 = "How about this? You must be a little thirsty from coming all the way out here."
1005502-59 = "[s3] \"Water? I'm parched.\"\n[s4] Say thanks and drink."
1005502-69 = "[ns5] Spit it out.\n[ns6] \"Th-This is vodka!\""
1005502-71 = "Sensei, you wasted it! My precious vod... My water of life!"
1005502-73 = "...Technically water comes from Vodka, right?"
1005502-74 = "\"Tricked you\" is a little aggressive, don't you think? I never actually said it was water."
1005502-75 = "And does it really matter anyways? Adults can drink all the alcohol they want."
1005502-76 = "Huh?"
1005502-77 = "That doesn't mean you can drink in front of students?"
1005502-78 = "Hm... I wasn't expecting that honestly..."
1005502-82 = "How about we say it's okay from here on out?"
1005502-83 = "[s7] \"Unless it's water, the answer is no.\" \n[s8] \"Please, just give me some water.\""
1005502-84 = "But vodka is all I have to offer..."
1005502-85 = "But vodka is all I have to offer..."
1005502-86 = "I wasn't actually trying to trick you or anything, I promise."
1005502-87 = "You see, the power's out so everything in our fridge froze."
1005502-88 = "Water, juice, soda... Everything except for the vodka, since it has a high alcohol content."
1005502-89 = "Isn't vodka just the perfect drink?"
1005502-90 = "You can use it for hydration in a pinch, to warm up in freezing weather, or even to disinfect open wounds!"
1005502-91 = "It's like water, but better! I mean, what else can you drink AND use to fuel a fire?"
1005502-92 = "[s] \"You...really like vodka, don't you?\""
1005502-93 = "I do! Even just thinking about it makes me want a sip."
1005502-94 = "And there's nothing else to drink around here anyway. You wouldn't want me to get low-temperature burns from eating ice..."
1005502-95 = "A teeny, tiny little sip is almost necessary in such desperate times, right?"
1005502-99 = "Right! So, I'll help myself!"
1005502-100 = "[s9] \"No, no, and nope. Not okay.\" \n[s10] Take the vodka away."
1005502-107 = "S-Sensei?"
1005502-108 = "Ah, I see. You've seen the light, and you want a sip now, too."
1005502-115 = "What are you doing to my vodka?! Wh-Why would you pour it all out like that...?"
1005502-116 = "Huh? Oh... You're using it as fuel to start a fire and melt the other frozen liquids?"
1005502-117 = "Um..."
1005502-118 = "That does work... But..."
1005502-119 = "..."
1005502-120 = "[s11] \"...You seem really disappointed.\"\n[s12] \"I'm sorry. No means no.\""
1005502-121 = "...No, it's nothing."
1005502-122 = "...It's fine. It's nothing."
1005502-123 = "..."
1005502-125 = "...This is going to be harder than I thought..."
1005502-129 = "After the water and juice finally thawed, I stayed with Shigure for a little bit and made sure she drank those instead of the vodka."

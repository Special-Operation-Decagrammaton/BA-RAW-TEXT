[translation]
10044060-1 = "ตอนที่ 6;แฟนคลับแห่งความตาย"
10044060-3 = "อืม~ ถ้าลองคำนวนเวลาคร่าวๆ..."
10044060-4 = "ฉันว่าเราน่าจะไปถึงได้ทันเวลาอยู่นะ"
10044060-5 = "ถึงแบบเฉียดฉิว"
10044060-7 = "[ns] \"ยังไงก็โล่งอกไปทีนะที่หารถไฟเจอ\""
10044060-8 = "อื้อ~ ใช่แล้วละ! รถไฟก็หาเจอแล้ว แล้วก็น่าจะยังทำเวลาได้อยู่!"
10044060-9 = "แต่ก็มีบางอย่างที่ตะขิดตะขวงใจตลอดเลย ทำไมกันนะ...?"
10044060-14 = "โน่นไง! ใช่รถไฟขบวนนั้นมั้ย?!"
10044060-15 = "ยะฮู้วว! บิดให้สุดเลย!!"
10044060-16 = "อ่า..."
10044060-19 = "เฮอะ เจอตัวแล้ว! พวกตัวจ้อยจากไฮแลนเดอร์ ฉันรู้อยู่แล้วว่าพวกเธอจะมาทางนี้!"
10044060-20 = "เป็นไปตามแผนเลยค่ะหัวหน้า!!"
10044060-21 = "ต่อไปก็แย่งสินค้านั่นมาให้ได้ แล้วก็เอาไปส่งยังที่หมายให้รวดเร็วและปลอดภัยกว่า..."
10044060-22 = "เป็นแผนการที่สมบูรณ์แบบเลย"
10044060-23 = "แล้วทุกคนจะได้รู้ว่าพวกเรานี่ละเบอร์หนึ่งในวงการ!!"
10044060-24 = "ใช่! อยู่วงการนี้ต้องพิสูจน์ให้เห็นผลลัพธ์!"
10044060-26 = "ฉันจะแสดงศักยภาพของสหพันธ์นักซิ่งขนส่งแห่งชาติ... หรือย่อสั้นๆ ว่า 'สหพันธ์วรูม วรูม' ให้ได้เห็นเอง!!"
10044060-30 = "หืม...?"
10044060-31 = "มีอะไรเหรอ?"
10044060-32 = "เฮลิคอปเตอร์ตรงนั้นมันอะไรกัน?"
10044060-40 = "ที่ไหนมีข่าว ที่นั่นมีเรา!! คุณกำลังอยู่กับโครโนส ไลฟ์!! และฉัน คาวารุ ชิน่อนค่ะ!"
10044060-41 = "ทุกคนเห็นมั้ยคะ? รถไฟที่เรารายงานไปในสกู๊ปพิเศษเมื่อสักครู่กำลังแล่นฉิวอยู่เลยค่ะ!"
10044060-42 = "อ๊ะ แต่มีแก๊งนักซิ่งขนาบข้างไปด้วย พวกนั้นน่าจะจ้องเล่นงานรถไฟอยู่นะคะ!! หรือว่าได้ข้อมูลอะไรมา!!"
10044060-43 = "ในรถไฟขบวนนั้นมีของอะไรกันแน่!! แล้วมันกำลังมุ่งหน้าไปที่ไหน!!"
10044060-44 = "ถ้าอยากรู้ก็ห้ามเปลี่ยนช่องนะคะ! ทุกคนมีสิทธิ์ในการรับรู้! โครโนสของเราจะติดตามเหตุการณ์ แล้วมารายงานกับทุกคนอย่างต่อเนื่องค่ะ!"
10044060-51 = "คนพวกนั้นโกรธแค้นอะไรพวกเราถึงขนาดนี้คะ?!"
10044060-52 = "กับโครโนสก็พอเข้าใจได้ แต่แก๊งนักซิ่งพวกนั้นตามพวกเรามาตั้งแต่เมื่อกี้แล้ว"
10044060-53 = "แค้นฝังพิซซ่าเหรอ?"
10044060-55 = "ฉัน... ฉันไม่เห็นเข้าใจเลยค่ะ... แล้วทำไมทุกคนถึงต้องมีสิทธิ์ในการรับรู้เรื่องนี้ด้วย!!"
10044060-56 = "พูดแบบนั้นเท่ากับเป็นการยุยงให้รถไฟของพวกเราโดนโจมตีนะคะ...!!"
10044060-57 = "ฉะ... ฉันว่ายิงให้หงายเก๋งไป เรื่องนี้น่าจะเงียบลงนะคะ...!!"
10044060-58 = "[ns] \"จะ... ใจเย็นๆ ก่อน! อาโอบะ!\""
10044060-59 = "แล้วจะให้ทำยังไงล่ะ? เรื่องมันก็เกิดไปแล้วนี่"
10044060-60 = "ตอนนี้ควรมาคิดก่อนว่าจะทำยังไงกันดีมากกว่านะ"
10044060-61 = "พูดได้ถูกต้องเลยค่ะ..."
10044060-62 = "แต่ว่าฉันก็ไม่มีไอเดียอะไรดีๆ หรอกนะ! วะฮะฮ่า!"
10044060-63 = "เกลียดตัวเองจังที่หลงเชื่อว่าคนแบบนี้จะมีแผนการดีๆ กับเขาบ้าง...!"
10044060-67 = "อ๊ะ ฝุ่นควันตรงโน้น"
10044060-68 = "......"
10044060-69 = "ใกล้เข้ามาเรื่อยๆ เลย"
10044060-70 = "[ns] \"หืม...\""
10044060-72 = "[ns] \"เหมือนมีอะไร... ไล่ตามมาไวมากเลย...?\""
10044060-75 = "ฮะฮ่าฮ่า! เจอแล้ว รถไฟมหาสมบัติ!!"
10044060-76 = "รถไฟขบวนนั้นเป็นของเรา!! ทุกคนหลบไปให้หมด!!"
10044060-81 = "หะ... หัวหน้า! ทำยังไงดีล่ะ? มีพวกแปลกๆ มากันเพียบเลย!"
10044060-82 = "อะ... อะไรกันเนี่ย? ทำไมจู่ๆ ทุกคนถึงแห่มา?? หรือเป็นเพราะเฮลิคอปเตอร์ที่รายงานข่าว??"
10044060-83 = "มะ... ไม่ได้นะ! รถไฟขบวนนั้นเป็นของพวกเราต่างหาก!!"
10044060-85 = "พอข่าวออกไป ก็มีคนมาไล่ตามพวกเราเยอะแยะเลยค่ะ...!!"
10044060-86 = "โอ้โห ทั้งมอเตอร์ไซค์ รถหุ้มเกราะ... แล้วนั่นอะไรน่ะ? รถถังดัดแปลงเหรอ?"
10044060-87 = "ฮอตสุดๆ แฟนมีตติ้งมรณะ"
10044060-88 = "เราคงต่อกรกับพวกนั้นไม่ไหวหรอก ตอนนี้คงทำได้แต่เดินรถต่อไป!"
10044060-89 = "ระ... เร็วกว่านี้ค่ะ! เราต้องไปให้เร็วกว่านี้...!!"
10044060-95 = "แหม~ นี่มันสถานการณ์อันตรายจริงๆ เลยนะ?"
10044060-96 = "วิกฤต หนัก"
10044060-100 = "ฮะฮ่าฮ่า! ขอปล้นรถไฟขบวนนี้ละนะ!!"
10044060-101 = "ถ้าเอามาเป็นของเราไม่ได้ ก็จะทำลายให้ไม่เหลือชิ้นดีเลย!!"
10044060-106 = "ทะ... ทำไมถึงเป็นอย่างนี้ไปได้ล่ะคะ~~~!!!"
10044060-112 = "เห็นกันมั้ยคะ ทุกคน! นี่คือสถานการณ์ในขณะนี้ค่ะ!!"
10044060-113 = "อ๊ะ ตอนนี้มีหลายกลุ่มที่หมายตารถไฟขบวนนี้! การไล่ล่าครั้งใหญ่เกิดขึ้นแล้วค่ะทุกคน!"
10044060-114 = "สุดท้ายแล้วใครจะได้ครอบครองขบวนรถไฟที่เต็มไปด้วยสมบัติ!! โครโนสจะตามรายงานข่าวจนถึง#nที่สุดค่ะ!!"
10044060-116 = "หืม? เหมือนมีอะไรกำลังเข้ามาเลย..."
10044060-117 = "จรวดหรือเปล่า...?"
10044060-118 = "อ๊ะ! ใช่ค่ะ! ตอนนี้จรวดกำลังไล่ล่าเฮลิคอปเตอร์ที่พวกเรานั่งกันอยู่..."
10044060-122 = "หา...?"
10044060-125 = "ว้ายยยยยยย!! ใครยิงจรวดใส่เฮลิคอปเตอร์~~!!"
10044060-126 = "จะลิดรอนเสรีภาพสื่อเหรอ~~!!"
10044060-128 = "ว้าว~~!! สะใจจริงๆ เลย! วะฮะฮ่า!! ฝีมือใครเนี่ย?!"
10044060-129 = "อาโอบะยิงเหรอ?"
10044060-131 = "มะ... ไม่ใช่นะคะ! ถึงจะอยากให้เป็นอย่างนั้น แต่ฉันไม่ได้เป็นคนยิงค่ะ! ฉันไม่มีจรวดอะไรด้วย!"
10044060-132 = "พะ... พวกที่ไล่ตามเรามาเป็นคนยิงค่ะ!!"
10044060-134 = "ฮ่าฮ่า! หมดธุระของพวกนักข่าวโครโนสแล้วละ!"
10044060-135 = "ขืนรายงานข่าวต่อไป เดี๋ยวคนอื่นก็แห่กันมามากกว่านี้น่ะสิ!"
10044060-139 = "ตัดสินใจได้รวดเร็วเลยนะ! เจ๋งจริงๆ!!"
10044060-146 = "ว้ายย!!"
10044060-148 = "หึ! ยังไงพวกเธอก็เป็นคู่แข่งของเราอยู่ดี สมบัติที่ยิ่งใหญ่นั่นต้องเป็นของเรา!!"
10044060-154 = "อ๊ากก!! เราโดนโจมตีแล้ว! หะ... หัวหน้าาา~~!!"
10044060-155 = "ระ... เราเป็นผู้เชี่ยวชาญด้านการส่งของ เรื่องการใช้อาวุธน่ะเราไม่ถนัดหรอก~!!"
10044060-159 = "โอ้ว~ ประเมินสถานการณ์ได้เร็วเลยแฮะ? ต้องกำจัดคู่แข่งก่อนอย่างนี้ละ"
10044060-160 = "ตัวเต็ง นัมเบอร์วัน ชนะแน่"
10044060-161 = "มะ... มาชมอะไรกันอยู่แบบนี้คะ~!! พวกนั้นจ้องจะเอารถไฟของเราอยู่นะ!!"
10044060-162 = "อ๊ะ จริงสินะ"
10044060-163 = "ก็ดีอยู่หรอกค่ะที่ศัตรูลดลง... แต่พวกที่เหลือก็เข้ามาใกล้เข้าไปทุกทีแล้ว...!"
10044060-164 = "แถมตรงนี้ยังอยู่ใกล้กับเกเฮนน่าอีก ดะ... ดีไม่ดีเราอาจจะเจอพวกอันธพาลที่น่ากลัวกว่านี้ก็ได้..."
10044060-165 = "นะ... ในเมื่อเป็นแบบนี้แล้ว เราทิ้งรถไฟแล้วหนีกันดีมั้ยคะ...?"
10044060-166 = "ไม่ได้หรอก เราต้องทำภารกิจที่ได้รับมาให้เสร็จสิ"
10044060-167 = "ในสถานการณ์ฉุกเฉินแบบนี้ ในคู่มือบอกว่า...!"
10044060-168 = "[ns1] \"ทุกคนใจเย็นๆ แล้วมาคิดหาทางกันเถอะ...!\"\n[ns2] \"ต้องมีทางออกแน่นอน แค่ต้องคิดให้ออก!\""
10044060-171 = "ฮือ... จะ... จริงเหรอคะ..."
10044060-172 = "เราจะหลีกเลี่ยงจากอนาคตที่จะโดนปล้นสินค้า โดนทำลายรถไฟ แล้วต้องเขียนหนังสือขอโทษ และโดนลงทัณฑ์ได้เหรอคะ...!!"
10044060-173 = "วะฮะฮ่า พูดซะน่ากลัวเลยนะ!"
10044060-174 = "มะ... มาหัวเราะอะไรอยู่คะ!! นี่มันใช่เวลาหัวเราะเหรอ?!"
10044060-175 = "แงงง ฮือๆๆ"
10044060-176 = "แล้วก็ไม่ต้องร้องไห้ด้วยค่ะ!! ฉันดูออกค่ะว่าเป็นการแสดง! นั่นไม่ใช่การร้องไห้จริงๆ สักหน่อย!!"
10044060-177 = "ไหวพริบดีจังเลยนะ"
10044060-179 = "[ns] \"หืม? ข้างหลังนั่นมีฝุ่นควันเพิ่มมาอีก...\""
10044060-183 = "เฮียร์ คัมส์ อะ นิว ชาเลนจ์"

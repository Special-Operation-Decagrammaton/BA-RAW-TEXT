[translation]
10044060-1 = "第6話;死亡粉絲俱樂部"
10044060-3 = "嗯～我大概算了一下……"
10044060-4 = "應該還能趕上原定的到達時間。"
10044060-5 = "好險好險～"
10044060-7 = "[ns]「能順利找到列車真是太好了。」"
10044060-8 = "嗯～對啊對啊！#n不只找到了列車，時間也能勉強趕上！"
10044060-9 = "不過卻還是有股不太放心的感覺。#n究竟是為什麼呢……？"
10044060-14 = "那邊！就是那輛列車對吧！？"
10044060-15 = "呀呼～！衝啊！！"
10044060-16 = "啊……"
10044060-19 = "哈，找到了！#n我就知道那些高地人的小毛頭會往這邊跑！"
10044060-20 = "一切都在計畫之中，總長！！"
10044060-21 = "把貨物搶走之後，再更快更安全地配送到目的地……"
10044060-22 = "這個計畫簡直無懈可擊。"
10044060-23 = "這樣全天下都會知道，我們才是業界的第一品牌！！"
10044060-24 = "沒錯！這一行就是要靠結果來說話！"
10044060-26 = "是時候展現我們運輸者聯盟……簡稱轟隆轟隆疾馳聯盟的實力了！！"
10044060-30 = "……咦？"
10044060-31 = "怎麼了？"
10044060-32 = "那邊那台直升機是什麼？"
10044060-40 = "帶你直擊天涯海角！！克洛盧斯即時新聞！！#n我是川流詩音！"
10044060-41 = "各位觀眾有看到嗎？#n剛才獨家新聞中的那輛列車正在行駛中！"
10044060-42 = "啊啊，盯上列車的暴走族已經開始聚集了！！#n他們是從哪裡聞風而來的呢！！"
10044060-43 = "那輛列車上究竟載著什麼東西！？列車會開向哪裡呢！！"
10044060-44 = "想知道的觀眾朋友請繼續鎖定本台！#n克洛盧斯會持續追蹤報導，守護各位知的權利！"
10044060-51 = "那些人到底跟我們有什麼仇！？"
10044060-52 = "克洛盧斯也就算了，那些暴走族為什麼從剛才開始就一直窮追不捨啊？"
10044060-53 = "是披薩之仇嗎～？"
10044060-55 = "完，完全搞不懂……而且這跟知的權利又有什麼關係！！"
10044060-56 = "根本是在煽動大家來攻擊我們的列車……！！"
10044060-57 = "不，不如開槍把他們打下來算了，至少耳根子會清靜一點……！！"
10044060-58 = "[ns]「你，你先冷靜！青葉！」"
10044060-59 = "還能怎麼辦呢？反正事情都已經發生了。"
10044060-60 = "不如好好想想接下來該怎麼做。"
10044060-61 = "確實是這樣沒錯，可是……"
10044060-62 = "雖然我的腦子裡一個好主意都沒有就是了！噗哈哈！"
10044060-63 = "竟然會下意識地附和這種人，我真恨我自己……！"
10044060-67 = "啊～那邊的沙塵～"
10044060-68 = "……"
10044060-69 = "越來越近了～"
10044060-70 = "[ns]「呃……」"
10044060-72 = "[ns]「現在好像……有超級多暴走族在追我們……？」"
10044060-75 = "咯哈哈！找到了，是大祕寶列車！！"
10044060-76 = "那輛列車是我們的！！通通閃開！！"
10044060-81 = "總，總長！怎麼辦？#n連那堆奇奇怪怪的傢伙都湧上來了！"
10044060-82 = "什，什麼……？怎麼會突然這樣？#n難道是因為那台報導直升機嗎？"
10044060-83 = "不，不行！那輛列車是我們的！！"
10044060-85 = "因，因為新聞報導的關係，追著車的人變得超級多的……！！"
10044060-86 = "哇，有各種機車和裝甲車……那台又是什麼？改造戰車嗎？"
10044060-87 = "人氣超旺～是死亡粉絲見面會～"
10044060-88 = "那麼多人我們根本對付不了，只能繼續跑了！"
10044060-89 = "得，得再加速才行……！！"
10044060-95 = "哎呀～情況真的很不妙耶？"
10044060-96 = "大～危機～"
10044060-100 = "咯哈哈！這輛列車是我們的了！！"
10044060-101 = "不乖乖交出來的話，可別怪我們把東西全部毀掉啊！！"
10044060-106 = "到，到底為什麼會變成這樣～～～！！！"
10044060-112 = "各位觀眾看見了嗎！現在的情況可說是極度混亂！！"
10044060-113 = "啊啊～各方勢力都圍繞傳說中的列車，展開了猛烈的大追擊戰！"
10044060-114 = "究竟誰能奪得這輛滿載稀世珍寶的列車呢！！#n克洛盧斯將為您持續追蹤到最後！！"
10044060-116 = "嗯？有東西飛過來了……"
10044060-117 = "……那不是火箭砲嗎？"
10044060-118 = "啊！沒錯！#n有火箭砲正朝著我們搭乘的直升機……"
10044060-122 = "……咦？"
10044060-125 = "呀啊啊啊啊！！#n是，是誰對直升機發射火箭砲啦～～！！"
10044060-126 = "這，這是在打壓新聞自由啊啊啊～～！！"
10044060-128 = "哇～～！！真是大快人心！#n噗哈哈！！不曉得是誰做的好事！"
10044060-129 = "青葉～？是你開火的嗎～？"
10044060-131 = "不，不是啦！#n雖然我也很想動手，但真的不是我！而且我手上根本沒有那種東西！"
10044060-132 = "是，是在追趕我們的人發射的！！"
10044060-134 = "哈哈！現在克洛盧斯那些傢伙已經沒用了！"
10044060-135 = "要是讓他們繼續報導的話，只會吸引更多雜魚聚集！"
10044060-139 = "嘻嘻，反應挺快的嘛！算你厲害！！"
10044060-146 = "呀呼！"
10044060-148 = "哼！反正那些傢伙也都是競爭者。#n偉大的遺產是我們的！！"
10044060-154 = "呃啊啊！！被攻擊了！總，總長～～！！"
10044060-155 = "我，我們只是專業的配送業者，武力沒那麼強啊～！！"
10044060-159 = "哎呀～居然先攻擊競爭者，還挺會判斷情勢的嘛？"
10044060-160 = "優勝候補～No.1～"
10044060-161 = "為，為什麼在稱讚他們啦～！！#n優勝的獎品可是我們的列車耶！！"
10044060-162 = "啊，對吼～"
10044060-163 = "雖然敵人減少是好事……但距離越來越近了……！"
10044060-164 = "而且這裡離格黑娜很近，可，可能會出現更多可怕的問題學生……"
10044060-165 = "既，既然如此，要不要乾脆棄車逃跑……？"
10044060-166 = "這怎麼行。#n一旦接下任務，就要盡力達成。"
10044060-167 = "面對現在這種緊急情況，不能再執著於標準流程了……！"
10044060-168 = "[ns1]「大家冷靜下來想一想……！」\n[ns2]「一定會有辦法解決的！」"
10044060-171 = "唔唔……真，真的會有辦法嗎……"
10044060-172 = "能避免貨物被洗劫一空，列車被完全破壞……#n我們寫報告書寫到手軟還被懲處的未來嗎……！！"
10044060-173 = "噗哈哈，說得那麼具體很可怕耶！"
10044060-174 = "為，為什麼你還笑得出來！！現在是嘻嘻哈哈的時候嗎！？"
10044060-175 = "哇啊啊～嗚嗚嗚～"
10044060-176 = "也不要亂哭好不好！！#n而且那根本是裝出來的吧！？"
10044060-177 = "觀察力好敏銳～"
10044060-179 = "[ns]「嗯？後面又有一團沙塵……」"
10044060-183 = "HERE COMES A NEW CHALLENGER～"

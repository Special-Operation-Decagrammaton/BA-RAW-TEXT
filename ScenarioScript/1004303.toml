[translation]
1004303-1 = "僅僅是想守護約定"
1004303-2 = "（為了準備煙火大會，來到了海邊）"
1004303-7 = "哎呀～多虧你幫了大忙呢[USERNAME]老師。"
1004303-8 = "[s] 「不會，這種程度的事不成問題。」"
1004303-9 = "又在說笑了，不用謙虛。"
1004303-14 = "失禮了。有位想和[USERNAME]老師見面的客人……"
1004303-18 = "[ns] 「我的客人？難道是……」"
1004303-25 = "[ns] 「果然……若藻……！」"
1004303-29 = "唔呵呵……沒想到會被如此熱烈地歡迎……#n若藻我，感動到要流淚了呢♡"
1004303-30 = "[s] 「不是說工作之後再見面……」"
1004303-32 = "是的……"
1004303-33 = "閣下是那樣和我「約定」的。"
1004303-34 = "因此，若藻我……在MomoTalk結束之後一直等候著您。"
1004303-35 = "沒錯……以一日千秋的心情等候著……#n於是，便看準了閣下工作結束的時間來迎接您了♡唔呵呵。"
1004303-36 = "[s] 「嗯！我就知道是這樣！」"
1004303-37 = "難道……我造成閣下的困擾了嗎……？"
1004303-38 = "如果來迎接會造成閣下困擾的話……那個……"
1004303-39 = "[s] 「不是那樣的……可是我的工作還沒……」"
1004303-48 = "如果是擔心那件事的話沒關係。反正也幾乎都結束了。"
1004303-49 = "剩下的事就交給我們商會吧！老師，辛苦你了！"
1004303-50 = "[s] 「那我就不客氣了……那麼，一起走吧？」"
1004303-55 = "唔呵呵。好的，沒問題！"
1004303-61 = "[ns1] 「雖然一起離開了……」\n[ns2] 「接下來該做什麼呢……」"
1004303-67 = "唔呵呵，請交給我吧。#n我準備了精心設計的計畫。"
1004303-68 = "為了讓這一天成為對閣下而言完美的一天的「約定」。"
1004303-69 = "其名為……"
1004303-70 = "「若藻的完美夏日約會計畫」！"
1004303-71 = "……話說老師，您認為夏季的海邊最不可或缺的是什麼呢？"
1004303-72 = "[s3] 「嗯……實在是很難只選一個呢。」\n[s4] 「偷偷帶出來的，學園備品的戰車之類的……？」"
1004303-73 = "唔呵呵，請安心。#n若藻我準備了各式各樣的方案。"
1004303-74 = "咦？備品？戰車……？"
1004303-75 = "那個……非常抱歉……我不太能理解閣下所說的意思……"
1004303-76 = "那麼首先，先滿足肚子吧。"
1004303-77 = "呵呵……先前沒能實現的「約定」，這次必定要實現哦。"
1004303-78 = "[s] 「……？」"
1004303-84 = "歡迎光臨！兩位客人請進──！"
1004303-85 = "[s] 「這裡是……海之家？」"
1004303-86 = "是的，沒錯。"
1004303-87 = "先前，閣下明明說了「想吃刨冰」，結果卻沒能實現心願……"
1004303-88 = "[s] 「嗯……原來你還記得啊。」"
1004303-91 = "唔呵呵……這裡似乎是情侶專用的水果……水果什麼的刨冰很有人氣。"
1004303-92 = "是的……若藻我，希望可以依偎在閣下身旁，互相餵食這個刨冰。"
1004303-93 = "呵呵，這樣的計畫您覺得如何呢？"
1004303-97 = "久等了！這是「放滿水果糖漿和滿滿果肉的稱霸夏季最強王者降臨刨冰」！"
1004303-98 = "[s] 「像咒文一樣的名字……！」"
1004303-100 = "那麼，閣下……您的身旁，我就打擾一下了。"
1004303-106 = "沒錯，將嘴巴慢慢敞開……來♡#n我為您挖的充滿愛情的刨冰……請慢用♡"
1004303-107 = "[s] 「啊……呣。」"
1004303-112 = "[ns] 「嗯，很好吃呢。」"
1004303-113 = "啊，啊啊……如，如此毫不猶豫地……一口將我的愛……"
1004303-114 = "若藻我……感覺要興奮起來了……"
1004303-115 = "[s] 「接下來輪到若藻了哦。」"
1004303-116 = "咦？輪到我……？#n可，可是……"
1004303-120 = "[ns] 「來，啊──」"
1004303-124 = "竟，竟然是閣下親自的「啊──」……"
1004303-125 = "啊啊啊，我，我該，若，若藻我……"
1004303-126 = "唔唔……那，那麼失禮了……"
1004303-132 = "[ns] 「啊！若藻抱歉。等我一下……」"
1004303-135 = "百忙之中非常抱歉！"
1004303-136 = "發生了和煙火大會相關的問題……！"
1004303-140 = "[ns] 「抱歉若藻，有點急事……」"
1004303-141 = "好的。"
1004303-142 = "沒關係。"
1004303-143 = "閣下總是繁事纏身。#n若藻我也十分清楚……"
1004303-144 = "請慢走……我會在這裡，恭候您回來的。"
1004303-145 = "[s] 「抱歉！我會馬上回來！」"
1004303-151 = "（然而在解決工作的期間，刨冰全都融化了）"
1004303-154 = "[ns] 「真的很抱歉……！再重新點一碗吧……」"
1004303-155 = "不敢當！這不是閣下需要道歉的事情……！"
1004303-156 = "我的計畫才剛開始呢！"
1004303-160 = "來，進行下一步吧！"
1004303-161 = "[s] 「嗯……抱歉。」"
1004303-164 = "下一個計畫不是別的……"
1004303-165 = "我想和閣下享受先前沒能實現的戲水……"
1004303-166 = "[s] 「海邊確實有各種戲水的方式呢。要玩什麼呢？」"
1004303-167 = "是的……不過，我想嘗試的不是單純的戲水……那個……"
1004303-168 = "[s] 「……？」"
1004303-169 = "我聽說情侶在海邊會進行一種獨特的「遊戲」。"
1004303-170 = "我，一直很想嘗試看看……"
1004303-171 = "[s] 「那是什麼樣的遊戲？」"
1004303-172 = "如今已在世間滅絕，幾乎無人知曉的傳說活動……"
1004303-176 = "也就是「啊哈哈，來抓我呀～」……！"
1004303-177 = "[s] 「若藻原來會想這種事啊……！」"
1004303-178 = "很奇怪嗎……稍微，那個，有點害羞也說不定。"
1004303-179 = "不過我聽說相思相愛的情侶會在海邊玩這種遊戲……"
1004303-180 = "[s] 「不……雖然一點也不奇怪……」"
1004303-181 = "那麼……雖然仍有些害羞，我們就開始吧。"
1004303-182 = "……我的身心都已準備就緒。"
1004303-183 = "那麼閣下……"
1004303-187 = "[ns] 「……嗯？」"
1004303-188 = "可以請您全力從我身邊逃走嗎？"
1004303-189 = "如果是為了將閣下得到手的話，若藻我……"
1004303-190 = "就算是天崖海角也會追上您的！唔呵呵……！"
1004303-191 = "[s] 「等，等等！若藻想像的活動跟我想像的好像不太一樣！？」"
1004303-192 = "絕對不會，讓您逃走的……"
1004303-198 = "閣．下♡"
1004303-203 = "[ns] 「抱，抱歉若藻！有電話！等我一下！」"
1004303-204 = "啊……"
1004303-208 = "[USERNAME]老師！剛剛在準備過程中才發現有遺漏的東西！"
1004303-209 = "非常抱歉，麻煩請您盡快……"
1004303-213 = "[ns] 「抱歉，若藻……！我突然有急事……！」"
1004303-214 = "啊……好的……"
1004303-215 = "我，會在這裡恭候著的……路上請小心……"
1004303-217 = "（那之後也是，每當實行若藻準備的夏日約會計畫時，#n都會因為夏萊的工作不得不離開……）"
1004303-220 = "啊，老師……"
1004303-226 = "那個，和閣下一起……"
1004303-232 = "那個……"
1004303-234 = "（就這樣，在處理完如怒濤般襲來的工作時，不知不覺已經到了傍晚）"
1004303-237 = "[ns] 「抱歉若藻……真的很抱歉！」"
1004303-238 = "唔呵呵。我沒事的，老師。"
1004303-239 = "閣下極度繁忙這件事，若藻我十分清楚。"
1004303-240 = "現在，照著我準備的「若藻的完美夏日約會計畫」……"
1004303-244 = "最後，和閣下一起觀賞日落之海──"
1004303-250 = "[ns5] 「抱歉，好像又是煙火大會相關的聯絡。」\n[ns6] 「這個行程之後再……」"
1004303-251 = "唔呵呵，好的，沒關係。"
1004303-252 = "唔呵呵，好的，沒關係。"
1004303-253 = "路上請小心。"
1004303-254 = "[s] 「抱歉！」"
1004303-258 = "……煙火大會。"
1004303-259 = "把我和閣下的時間……一次又一次……"
1004303-260 = "竟敢，竟敢……竟敢……！"
1004303-261 = "……區區煙火大會，竟然敢妨礙我們……"
1004303-265 = "啊啊……既然如此……"
1004303-266 = "唔呵呵呵……為了守護約定……"
1004303-267 = "解決的方法，也許意外地就在身邊呢……"
1004303-269 = "哎呀～[USERNAME]老師。不好意思勞煩您這麼多次。"
1004303-270 = "多虧有您，祭典的準備完美地結束了。"
1004303-271 = "[s7] 「那就好……」\n[s8] （若藻還在等我……得趕快回去才行……）"
1004303-276 = "（就在這時，收到了一封MomoTalk）"
1004303-280 = "呵呵呵。一切讓閣下擔心煩惱的事，若藻我都會處理掉的。還請您安心。"
1004303-281 = "[s] 「若藻？處理是指……」"
1004303-282 = "（就在因為若藻傳來的訊息而感到疑惑的瞬間）"
1004303-286 = "大，大，大事不好了！保管煙火的倉庫裡有個拿著炸彈的可疑人物！"
1004303-287 = "……你，你說什麼！？"
1004303-288 = "[s] 「難道說！？」"
1004303-293 = "煙火存放倉庫"
1004303-298 = "唔呵呵。#n一開始就該這麼做了……"
1004303-299 = "妨礙我和老師的東西全部都在這裡。"
1004303-300 = "只要將這些全部破壞……！"
1004303-301 = "請不要做那種危險的事……！"
1004303-302 = "……哼。又是礙事者嗎。"
1004303-303 = "不管說什麼，我已經下定決心……"
1004303-304 = "[s] 「若藻……！」"
1004303-308 = "閣下……？"
1004303-309 = "[s] 「若藻，你打算做什麼……！？」"
1004303-310 = "唔呵呵……因為和閣下「約定」好了。#n要將這一天，化為特別的一天送給您。"
1004303-311 = "因此，要把不斷妨礙著我們的這些障礙物……"
1004303-312 = "沒錯……也就是要把煙火本身給炸飛！"
1004303-313 = "這樣一來，閣下和我相處的時間就不會被妨礙，能夠自由地度過這一天……！"
1004303-314 = "[s] 「先等一下，你有沒有受傷？沒事吧？」"
1004303-318 = "沒，沒有……並沒有受傷……"
1004303-319 = "那，那個……"
1004303-320 = "[s] 「太好了……似乎沒事呢。」"
1004303-324 = "[ns] 「那你可以放心了若藻。現在要開始了哦。」"
1004303-325 = "咦……？"
1004303-326 = "那，那個……老師……？#n您指的開始，是什麼意思？"
1004303-330 = "[ns] 「竟然要引爆煙火倉庫，你到底在想什麼！？」"
1004303-334 = "（用了比預期還要大的聲音，對著若藻斥責了）"
1004303-335 = "……！"
1004303-336 = "那，那是因為……今天一整天，妨礙我和閣下的時光的……全都是，這個，煙火……"
1004303-337 = "察覺到那件事後就覺得坐立難安……只要把這個處理掉的話……"
1004303-338 = "沒錯……！這樣閣下，也可以安穩地跟我度過這一天……！"
1004303-339 = "[s] 「那樣做的話，不就會有人受傷嗎！？」"
1004303-340 = "可，可是……我……"
1004303-341 = "[s] 「如果若藻受傷的話怎麼辦？」"
1004303-343 = "[ns] 「就算這樣若藻也能說是為了我……為了我們嗎！？」"
1004303-345 = "[ns] 「還能要我不要擔心嗎？」"
1004303-347 = "[ns] 「要是立場交換的話，若藻能接受嗎！？」"
1004303-348 = "啊，我……我……"
1004303-349 = "[s] 「如果變成那樣，我想我絕對無法原諒若藻哦。」"
1004303-353 = "無法，原諒……？閣下對，我？"
1004303-354 = "啊，不行。不可以……那樣，不行……"
1004303-355 = "非，非，非常，對不起……"
1004303-356 = "擅，擅自……說要引爆，非常對不起……無法原諒什麼的，請不要那麼說……"
1004303-357 = "我，我要是被閣下討厭的話……"
1004303-358 = "我活下去的意義就……這份，心意的去處就……消失了。#n不行。只有這件事，請您……對不起，對不起……"
1004303-359 = "對不……嗚嗚……"
1004303-360 = "[s] 「……總之我們先回去吧。」"
1004303-362 = "（幸好，在若藻引起事件之前將其帶回了住處）"

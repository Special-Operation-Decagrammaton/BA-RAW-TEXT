[translation]
1004303-1 = "To Keep a Promise"
1004303-2 = "For Schale business, I went to the beach to prepare for the summer fireworks that were coming up."
1004303-7 = "Wow, thanks for being so helpful, [USERNAME] Sensei."
1004303-8 = "[s] \"No worries, I'm just doing my job.\""
1004303-9 = "Oh, my. You're always so humble. "
1004303-14 = "A guest has just arrived to see you, [USERNAME] Sensei."
1004303-18 = "[ns] \"A guest?\""
1004303-25 = "[s] \"Of course...Wakamo!\""
1004303-29 = "Oh, heehee. You're so happy to see me! I'm ecstatic..."
1004303-30 = "[s] \"I told you we could meet later because I'm busy with work...\""
1004303-32 = "Really?"
1004303-33 = "Oh, you did say that, and then you made a promise to see me later."
1004303-34 = "So after our MomoTalk conversation, I waited and waited..."
1004303-35 = "After a few hours, it was \"later,\" so I came to make sure you kept your promise. Heeheehee."
1004303-36 = "[s] \"I figured as much!\""
1004303-37 = "D-Do you not want me here...?"
1004303-38 = "I-If that's the case..."
1004303-39 = "[s] \"No, it's not like that, but I just have work to do...\""
1004303-48 = "If that's all it is, it's fine. There's not a lot left."
1004303-49 = "I don't want to hold you back. You work so hard! The merchant guild will take care of the rest!"
1004303-50 = "[s] \"Thank you... Shall we go, then?\""
1004303-55 = "Heeheehee. Yes!"
1004303-61 = "[ns1] \"So, what would you like to do?\"\n[ns2] \"What are your plans?\""
1004303-67 = "Heeheehee. I researched in advance and made a perfect plan."
1004303-68 = "It's my special promise to make your day perfect."
1004303-69 = "I call it..."
1004303-70 = "\"Wakamo's Perfect Summer Date Plan!\""
1004303-71 = "Sensei, what do you think is the most essential thing for the beach?"
1004303-72 = "[s3] \"Hmm... I'm not sure.\"\n[s4] \"Bringing a tank with secret supplies?\""
1004303-73 = "Heeheehee. Don't worry. I'm prepared."
1004303-74 = "Huh? A tank...with supplies...?"
1004303-75 = "Umm, I don't understand what that means, but..."
1004303-76 = "First and foremost, it's food! "
1004303-77 = "Okay! Let's go achieve what we missed out on last time."
1004303-78 = "[s] \"……?\""
1004303-84 = "Welcome! Two customers have arrived!"
1004303-85 = "[s] \"Is this...the Beach Shack?\""
1004303-86 = "Yes! That's right."
1004303-87 = "You said you wanted to eat shaved ice last time, but we didn't get to do that."
1004303-88 = "[s] \"Oh, you're still thinking about that?\""
1004303-91 = "Heeheehee... They have a shaved ice with fruit that's popular among couples."
1004303-92 = "So...I thought it would be nice to enjoy that shaved ice while sitting right next to you."
1004303-93 = "Heehee, that's my plan. What do you think?"
1004303-97 = "Thanks for waiting. This is the Ultimate Summer Domination Fruit Syrup and Pulp Shaved Ice!"
1004303-98 = "[s] \"What a flashy name!\""
1004303-100 = "Okay, then... Let me sit next to you."
1004303-106 = "I'm going to put a spoonful of my love in this shaved ice and bring it to your mouth so you can taste it..."
1004303-107 = "[s] \"Ahhh. Mmm...\""
1004303-112 = "[ns] \"Yeah, it tastes good.\""
1004303-113 = "O-Ohhh... Y-You didn't hesitate one bit... You ate the whole thing."
1004303-114 = "I-I'm so excited that I feel my cheeks turning hot..."
1004303-115 = "[s] \"It's your turn now.\""
1004303-116 = "Huh? My turn? But..."
1004303-120 = "[ns] \"Here, ahhh...\""
1004303-124 = "Wh-What a surprise to have you feed me."
1004303-125 = "Ohh... I-I-I..."
1004303-126 = "O-Okay, I-I have to excuse myself..."
1004303-132 = "[ns] \"Oh! I'm sorry, Wakamo. Wait...\""
1004303-135 = "I'm sorry to contact you so suddenly!"
1004303-136 = "There's a problem with the fireworks!"
1004303-140 = "[ns] \"I'm sorry, Wakamo. I have to handle this.\""
1004303-141 = "H-Huh?"
1004303-142 = "Oh, of course."
1004303-143 = "You're always busy with Schale stuff. I'm not shameless enough to get in the way of your work."
1004303-144 = "Good luck. I'll be here waiting."
1004303-145 = "[s] \"Okay, sorry! I'll be back soon!\""
1004303-151 = "When I came back after taking care of the issue, an hour had already passed. The shaved ice was long melted."
1004303-154 = "[ns] \"Sorry! I'm so sorry! I can buy another one...\""
1004303-155 = "No, it's okay! You don't have to apologize!"
1004303-156 = "My plan has only just begun!"
1004303-160 = "Let's go to the next place, Sensei!"
1004303-161 = "[s] \"Okay... I'm sorry.\""
1004303-164 = "The next plan is none other than..."
1004303-165 = "Playing in the water with you...like the swimming you wanted to do!"
1004303-166 = "[s] \"Oh, we're at the beach, so that'll be easy.\""
1004303-167 = "Yes, but I don't want to simply play in the water..."
1004303-168 = "[s] \"……?\""
1004303-169 = "According to my research, there's a special game a couple can perform at the beach."
1004303-170 = "I'd like to do it with Sensei."
1004303-171 = "[s] \"What is it?\""
1004303-172 = "They say it's outdated now, but..."
1004303-176 = "It's called... Catch Me If You Can! Ahaha!"
1004303-177 = "[s] \"That's what you want to try?!\""
1004303-178 = "Is it weird? Maybe it's kind of embarrassing."
1004303-179 = "I hear that's what loving couples do when they come to the beach."
1004303-180 = "[s] \"It's not...that weird.\""
1004303-181 = "Then let's get started."
1004303-182 = "Okay, darling. My body and soul are ready for you."
1004303-183 = "So now you should..."
1004303-187 = "[ns] \"Huh?\""
1004303-188 = "Run away from me as fast as you can!"
1004303-189 = "And I'll pursue you with all my strength, to the ends of the world!"
1004303-190 = "Heeheehee!"
1004303-191 = "[s] \"Um, Wakamo, this isn't exactly what I expected!\""
1004303-192 = "I'm not gonna let you get away!"
1004303-198 = "Darling!"
1004303-203 = "[ns] \"W-Wait! Wakamo! I'm getting a call! Wait!\""
1004303-204 = "Oh..."
1004303-208 = "[USERNAME] Sensei! We're missing some important supplies!"
1004303-209 = "Can you go get them?"
1004303-213 = "[ns] \"Sorry, Wakamo... Work is calling again.\""
1004303-214 = "Oh, okay..."
1004303-215 = "I'll wait here patiently..."
1004303-217 = "Every time we tried to execute Wakamo's plan, I kept having to leave because of Schale work."
1004303-220 = "Sensei!"
1004303-226 = "I...just want to be here with you..."
1004303-232 = "Umm..."
1004303-234 = "After taking care of a bunch of tasks, it was already getting dark."
1004303-237 = "[ns] \"Sorry, Wakamo! I'm so sorry! I don't know why I'm so busy today.\""
1004303-238 = "Heeheehee. It's okay, Sensei."
1004303-239 = "I already know you're a busy person."
1004303-240 = "But now that we're here, we should keep going with Wakamo's Perfect Summer Date Plan..."
1004303-244 = "I want to look at the sunset on the beach to end the day..."
1004303-250 = "[ns5] \"I think they're calling about the fireworks festival again.\"\n[ns6] \"I'm sorry, they won't stop asking me for help.\""
1004303-251 = "Heeheehee. It's okay. I'm all right."
1004303-252 = "Heeheehee. It's okay. I'm all right."
1004303-253 = "You can go."
1004303-254 = "[s] \"Sorry!\""
1004303-258 = "Those...fireworks!"
1004303-259 = "Those things have disrupted my precious day with you..."
1004303-260 = "How... How dare you...!"
1004303-261 = "How dare you get in the way of me and Sensei, fireworks!"
1004303-265 = "Oh... That could work..."
1004303-266 = "Heeheehee... A way to keep the promise..."
1004303-267 = "The solution might have been in front of me the whole time."
1004303-269 = "Wow, [USERNAME] Sensei. I'm sorry."
1004303-270 = "But thanks to you, the festival preparations have been completed perfectly."
1004303-271 = "[s7] \"I'm glad to hear that...\"\n[s8] \"(Wakamo is waiting. I have to hurry back.)\""
1004303-276 = "Then I received a somewhat ominous message..."
1004303-280 = "\"Heeheehee. Don't worry, darling. I'll take care of everything.\""
1004303-281 = "[s] \"Wakamo? Take care of what...?\""
1004303-282 = "I was puzzled by Wakamo's sudden message."
1004303-286 = "Th-Th-There's a problem! A strange person entered the firework storage area with a bomb!"
1004303-287 = "Huh?"
1004303-288 = "[s] \"No way!\""
1004303-293 = "Firework Storage Area"
1004303-298 = "Yes. Heeheehee. I should have thought of this from the beginning..."
1004303-299 = "Everything in here is what's been disrupting my time with Sensei."
1004303-300 = "I just have to destroy all of it!"
1004303-301 = "S-Stop! It's dangerous...!"
1004303-302 = "Hmph, another interloper?"
1004303-303 = "No matter what you say, I've already made my decision..."
1004303-304 = "[s] \"Wakamo!\""
1004303-308 = "Oh, darling...?"
1004303-309 = "[s] \"Wakamo, what are you trying to do?!\""
1004303-310 = "Heeheehee! I promised you I'd make today a special day."
1004303-311 = "These obstacles have been interrupting us..."
1004303-312 = "Yes! I'm going to blow up all the fireworks! "
1004303-313 = "Then we'll be able to spend our time together without interruption!"
1004303-314 = "[s] \"Wait, are you hurt anywhere?\""
1004303-318 = "N-No, not really..."
1004303-319 = "U-Umm..."
1004303-320 = "[s] \"That's good... You seem okay and I don't see any wounds.\""
1004303-324 = "[ns] \"Then I'll start.\""
1004303-325 = "Hm?"
1004303-326 = "U-Um... Sensei? What are you gonna start?"
1004303-330 = "[ns] \"You were gonna blow up the firework storage?! What were you thinking?!\""
1004303-334 = "I yelled at her louder than I intended to."
1004303-335 = "... *hiccup*"
1004303-336 = "W-Well... It was the fireworks that interrupted our time together, so..."
1004303-337 = "When I realized that, I thought if I just got rid of them..."
1004303-338 = "...If I just got rid of them...we could spend time together..."
1004303-339 = "[s] \"What if someone got hurt?!\""
1004303-340 = "B-But... But..."
1004303-341 = "[s] \"What if you got hurt?! What then?\""
1004303-343 = "[ns] \"Could you say it was for us if that happened?!\""
1004303-345 = "[ns] \"Were you gonna tell me not to worry about you?\""
1004303-347 = "[ns] \"How would you feel if you were in my situation?!\""
1004303-348 = "I... I just...!"
1004303-349 = "[s] \"If that happened, I could never forgive you.\""
1004303-353 = "You could...never forgive me...?"
1004303-354 = "Oh, no. No, I can't let that happen..."
1004303-355 = "I-I-I'm sorry..."
1004303-356 = "I'm sorry I tried to blow them up... Please don't say you can't forgive me..."
1004303-357 = "I-If you hated me..."
1004303-358 = "I'd have no meaning in life... My heart would have no place to go... Please don't say that... I'm sorry..."
1004303-359 = "I'm sorry... *sob*"
1004303-360 = "[s] \"...It's okay. Let's go back.\""
1004303-362 = "Fortunately, Wakamo was stopped at the scene before disaster happened, and I brought her back to the dorm."

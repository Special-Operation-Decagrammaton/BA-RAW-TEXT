1004303-299 = "เพราะทุกสิ่งทุกอย่างที่ขัดขวางการใช้เวลาร่วมกันของฉันกับคุณท่านอยู่ที่นี่ทั้งหมด..."
1004303-300 = "เพราะงั้นแค่ทำลายมันให้พินาศให้หมดก็พอแล้ว...!"
1004303-301 = "ยะ...หยุดเดี๋ยวนี้นะ มันอันตรายนะ...!"
1004303-302 = "ฮึ่ม... คิดจะขัดขวางฉันเหรอคะ?"
1004303-303 = "ไม่ว่าคุณจะพูดยังไง แต่ฉันตัดสินใจแล้วค่ะ"
1004303-304 = "[s] \"วาคาโมะ...!\""
1004303-308 = "อุ๊ย ตายจริง คุณท่าน...?"
1004303-309 = "[s] \"วาคาโมะ คิดจะทำอะไรน่ะ...?\""
1004303-310 = "ฮุฮุฮุ วาคาโมะให้สัญญากับคุณท่านแล้วนี่คะ ว่าจะทำให้วันนี้เป็นวันที่แสนพิเศษของคุณท่าน..."
1004303-311 = "เพราะฉะนั้นพวกตัวเกะกะที่ขัดขวางพวกเรา..."
1004303-312 = "ค่ะ-! วาคาโมะจะทำลายดอกไม้ไฟพวกนี้ให้สิ้นซากค่ะ! "
1004303-313 = "ถ้าทำเช่นนี้ก็จะไม่ใครมาขัดขวางเวลาของคุณท่านกับฉัน และเราก็ใช้เวลาร่วมกันได้...!"
1004303-314 = "[s] \"เดี๋ยวก่อน เธอไม่ได้บาดเจ็บตรงไหนใช่มั้ย? มีแผลตรงไหนรึเปล่า?\""
1004303-318 = "ปะ... เปล่าค่ะ ฉะ... ฉันไม่ได้บาดเจ็บตรงไหนค่ะ..."
1004303-319 = "เอ่อ... คือว่า..."
1004303-320 = "[s] \"ค่อยยังชั่วหน่อย ดูแล้วก็ปกติดี ไม่มีบาดแผลด้วย\""
1004303-324 = "[ns] \"ค่อยวางใจหน่อย งั้นขอเริ่มเลยแล้วกันนะ\""
1004303-325 = "คะ...?"
1004303-326 = "คะ... คือว่าคุณท่าน...? จะเริ่มอะไรเหรอคะ...?"
1004303-330 = "[ns] \"จู่ๆ ก็คิดจะระเบิดคลังดอกไม้ไฟ คิดอะไรของเธอเนี่ย?!\""
1004303-334 = "(คุณครูตะโกนใส่วาคาโมะ เสียงดังกว่าที่คิด)"
1004303-335 = "ฮึก...!"
1004303-336 = "คะ... คือว่า... วันนี้ทั้งวัน... เวลาของวาคาโมะกับคุณท่านถูกดอกไม้ไฟพวกนี้ขัดขวางตลอด..."
1004303-337 = "พอคิดทบทวนดูแล้ว วาคาโมะก็เลย... คิดว่าถ้ากำจัดของพวกนี้ไปได้..."
1004303-338 = "วาคาโมะคิดว่าทำแบบนั้นแล้ว จะได้ใช้เวลากับคุณท่านได้..."
1004303-339 = "[s] \"ถ้าทำแบบนั้นอาจมีคนโดนลูกหลงแล้วได้รับบาดเจ็บนะ?!\""
1004303-340 = "ตะ... แต่ว่า..."
1004303-341 = "[s] \"ถ้าทำแบบนั้นแล้ววาคาโมะบาดเจ็บขึ้นมาจะทำยังไง?!\""
1004303-343 = "[ns] \"แบบนั้นวาคาโมะจะบอกว่าทำเพื่อครูงั้นเหรอ?!\""
1004303-345 = "[ns] \"แล้วยังมาบอกให้ครูไม่ต้องเป็นห่วงเนี่ยนะ?\""
1004303-347 = "[ns] \"ลองคิดกลับกันสิ ถ้าครูทำแบบนั้นบ้าง วาคาโมะจะยอมเหรอ?\""
1004303-348 = "ฉัน... ฉัน..."
1004303-349 = "[s] \"ถ้าเป็นแบบนั้นละก็ ครูคงไม่มีวันยกโทษให้วาคาโมะได้เด็ดขาด\""
1004303-353 = "ยกโทษ...ให้...ไม่ได้? คุณท่านจะไม่ยกโทษให้วาคาโมะ..."
1004303-354 = "มะ...ไม่นะ ไม่เอานะคะ เรื่องแบบนั้น..."
1004303-355 = "ฉะ...ฉะ..ฉัน...ขะ...ขอโทษค่ะ..."
1004303-356 = "ขะ...ขอโทษที่มาระเบิด... ฮึ่ก... ตามอำเภอใจ... ขอโทษค่ะ... คะ...คุณท่านอย่าพูดว่าจะไม่ยกโทษ... ให้วาคาโมะเลยนะคะ..."
1004303-357 = "ถ้าเกิดฉันโดนคุณท่านเกลียด..."
1004303-358 = "ฉันคงไม่รู้จะอยู่ต่อไปทำไม... ถะ...ถ้าผู้ที่รับรู้ความรู้สึกในใจของฉันหายไป เรื่องแบบนั้นไม่เอานะคะ ได้โปรดยกโทษให้ฉันเถอะค่ะ..."
1004303-359 = "ขอโทษค่ะ... ฮือ..."
1004303-360 = "[s] \"ช่างเถอะ พวกเรารีบกลับกันดีกว่านะ\""
1004303-362 = "(โชคดีที่สามารถยับยั้งเหตุการณ์ได้ก่อนที่จะบานปลาย และพาวาคาโมะกลับที่พักได้โดยสวัสดิภาพ)"

[translation]
2000706-1 = "The Virtual Idol's Stage"
2000706-5 = "Amphitheater Waiting Room"
2000706-7 = "(I dropped by the waiting room to listen to Miku's newly composed song before the concert.)"
2000706-11 = "... ♪"
2000706-13 = "What do you think, Sensei? I wrote it straight from my heart just like we spoke about."
2000706-14 = "[s1] \"It's nice to hear the real you.\"\n[s2] \"It was great! You're the best!\""
2000706-17 = "Thank you, Sensei."
2000706-18 = "I hope my fans like it just as much."
2000706-20 = "But there's still this uneasy feeling I can't shake..."
2000706-21 = "For one, I still haven't told the stage planner about what I'm planning."
2000706-27 = "Someone changed the set list!"
2000706-28 = "O-Oh. There you are."
2000706-29 = "The entire set list for tonight's concert was changed at the last second! What's going on?! Do you know anything about this?"
2000706-30 = "This is bad. We don't have much time until the concert..."
2000706-31 = "So, the thing is..."
2000706-32 = "[s] \"I changed it.\""
2000706-33 = "What?"
2000706-34 = "And who are you? No, more importantly, why are you meddling with the set list?"
2000706-35 = "A lot of preparation goes into a show like this. Each song takes time to plan for, and time is money."
2000706-36 = "Changing the set list at the last second can cause all sorts of complications."
2000706-37 = "Are YOU prepared to take the responsibility of any sponsors or customers who decide to file a claim?"
2000706-38 = "[s] \"I'll take responsibility.\""
2000706-39 = "Bah. I wasn't expecting such a confident response."
2000706-40 = "Just who are you and what makes you so qualified, anyway?"
2000706-41 = "I don't know what you did, but I can't access or modify the set list, nor can I use the controller to move the performance equipment..."
2000706-42 = "It looks like we have no choice in the matter. The show must go on—even with a tampered set list!"
2000706-43 = "But mark my words that you're not getting off with a simple apology if this concert flops!"
2000706-51 = "H-Haha. Wow. That was a lot easier than I thought it was going to be."
2000706-52 = "But are you sure we can pull this off?"
2000706-53 = "He just said you'll be forced to pay if the concert fails."
2000706-54 = "[s] \"Fine with me.\""
2000706-56 = "[s] \"There's no way songs from your own heart could fail.\""
2000706-57 = "There you go saying reckless things again..."
2000706-64 = "You keep trusting and encouraging me, no matter how daunting the situation becomes."
2000706-65 = "Instead of pointing me in the right direction, you give me the push I need to find it for myself."
2000706-66 = "I'm just a simple virtual idol, but you have me believing I can do anything."
2000706-67 = "I suppose the best way to repay the kindness you've shown me is to live up to your expectations, right?"
2000706-68 = "Just you watch, Sensei. I'm going to put on the performance of a lifetime!"
2000706-72 = "(I've experienced so many new things since acquiring this body.)"
2000706-73 = "(If the feelings I have are genuine, then what I really want to know is how people grapple with having so much in their hearts.)"
2000706-74 = "(Those countless emotions have been in the songs I sing for so long...)"
2000706-75 = "(...and now I can finally empathize with all of them.)"
2000706-76 = "(That's what I want to convey—from the bottom of my heart!)"
2000706-80 = "― (People are listening to my songs... Truly listening.[wa:1450] "
2000706-82 = "― I can finally reach them again.)[wa:10] "
2000706-85 = "― (It feels so... deeply satisfying.[wa:940] "
2000706-87 = "― I'm singing from the bottom of my heart.)[wa:10] "
2000706-90 = "― (I'm so grateful and happy that I can do this again!)[wa:1290] "
2000706-92 = "― This is fun, and I'm so happy!)[wa:740] "
2000706-95 = "― (I want to use my voice to reach them forever!)[wa:910] "
2000706-99 = "Amphitheater Waiting Room"
2000706-100 = "Were you watching, Sensei? Everyone had a great time!"
2000706-101 = "I sang from the heart..."
2000706-102 = "...and it really worked! I was able to reach them like I wanted!"
2000706-103 = "[s3] \"It was the best concert I've ever been to.\"\n[s4] \"Your heart was right all along.\""
2000706-107 = "Sensei..."
2000706-113 = "Miku!"
2000706-114 = "They're going wild out there! The crowd wants an encore!"
2000706-115 = "Tonight's show has been a huge success, and now they're demanding to hear the new song again!"
2000706-116 = "Even our sponsors are over the moon. They're already asking when the next show will be."
2000706-117 = "I thought we were doomed when the set list was changed right before the concert. I'm so glad things worked out for the best."
2000706-118 = "All thanks to [USERNAME] Sensei."
2000706-119 = "I also owe your Sensei a great debt. I don't know how I can ever repay the favor..."
2000706-120 = "[s] \"All the credit goes to Miku. She's the one who sang.\""
2000706-121 = "Th-That she did."
2000706-122 = "However, do you think you can sing just one more song for the encore?"
2000706-123 = "I don't want to disappoint them now."
2000706-124 = "Or worse, they might get a little unruly given how riled up they are."
2000706-125 = "That's...a good point."
2000706-126 = "Okay, I'll go ahead and get the stage cleaned up. Come out as soon as you're ready."
2000706-132 = "Haha... I guess I have an encore to sing."
2000706-133 = "[s] \"Is something wrong?\""
2000706-134 = "No, it's just that I thought it was over, so I was ready to take you to dinner to show my thanks."
2000706-135 = "It could be too late for that if I give an encore now."
2000706-136 = "Actually, I even made reservations at a five-star restaurant for tonight... I'm torn."
2000706-137 = "[s5] \"I'll be fine. It's okay.\"\n[s6] \"Do what your heart tells you to.\""
2000706-138 = "Are you sure you're fine with this?"
2000706-139 = "Are you sure you're fine with this?"
2000706-140 = "I know you're pretty popular around here, but it's not every day you get to have dinner with a virtual idol, you know."
2000706-141 = "But if you insist, then..."
2000706-142 = "Okay. I'm going to give them the encore they're waiting for."
2000706-149 = "I wouldn't be true to myself if I didn't sing from the bottom of my heart for my fans!"

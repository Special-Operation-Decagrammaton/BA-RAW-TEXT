[translation]
2000706-1 = "虛擬歌手的舞台"
2000706-5 = "Live House．休息室"
2000706-7 = "（表演開始的數小時前，我來到休息室聽未來完成的新曲子）"
2000706-11 = "……♪"
2000706-13 = "那個……你覺得怎麼樣呢，老師？我試著努力過了……"
2000706-14 = "[s1] 「……嗯，我覺得很棒！」\n[s2] 「怎麼說呢，感覺很觸動人心！」"
2000706-17 = "謝，謝謝老師……！"
2000706-18 = "為了讓今天前來的大家也能這麼說，我會努力的。"
2000706-20 = "然後，還有一件令人擔心的事情……"
2000706-21 = "主辦方還不知道更改歌單的事情吧……？"
2000706-27 = "等一下，這首歌沒錯嗎？不對吧？"
2000706-28 = "啊……"
2000706-29 = "吶吶，歌單好像變了，有誰知道為什麼嗎？"
2000706-30 = "糟了，難道是出什麼問題了嗎……？總之趕快確認一下──"
2000706-31 = "那，那個……！"
2000706-32 = "[s] 「是我改的。」"
2000706-33 = "呃……你是哪位？"
2000706-34 = "不對，比起這個……"
2000706-35 = "真是敗給你了。變更曲目這種事情牽扯到很多東西，都是投入了大量資金的。"
2000706-36 = "擅自做出這種事，會讓人很困擾的……"
2000706-37 = "要是贊助商或粉絲投訴，你能負責嗎？"
2000706-38 = "[s] 「我會負責的。」"
2000706-39 = "唔……你，"
2000706-40 = "你哪來的自信啊……"
2000706-41 = "而且這又是怎麼回事啊，系統權限被改掉了……？設備也不聽使喚，這下就改不了……！？"
2000706-42 = "姆姆姆，姆姆姆姆姆……唉，真沒辦法。這次就用這些曲子吧！"
2000706-43 = "幕後也會全力支援的……但是如果演唱會搞砸的話，可不是一句抱歉就會放過你的啊！"
2000706-51 = "啊，啊哈哈……總之，曲目也得到同意了呢。"
2000706-52 = "但老師剛剛那樣說，真的不要緊嗎……？"
2000706-53 = "如果演唱會失敗的話，會需要賠償的……"
2000706-54 = "[s] 「不可能會失敗的。」"
2000706-56 = "[s] 「就算萬一發生了什麼的話我也會處理的，所以未來不用擔心，盡全力做就對了。」"
2000706-57 = "又，又自信滿滿地說這種魯莽的話……"
2000706-64 = "本來想問「真的沒關係嗎」的……總覺得安心了不少呢。"
2000706-65 = "每次我不知如何是好，因為煩惱而猶豫不前的時候，老師都會推我一把……"
2000706-66 = "現在我也覺得自己可以做到了。"
2000706-67 = "為了報答老師……必須讓這次的演出成功，對吧。"
2000706-68 = "好好看我表演吧，老師！"
2000706-72 = "（自從獲得新的身體後，我變得能夠感受到無數的刺激）"
2000706-73 = "（大家生活在這麼充滿刺激的世界……所以才能產生這麼多美妙的情感吧。現在的我也能像大家一樣感受到這些了嗎？現在大家也能和我有相同的感受了嗎？）"
2000706-74 = "（那些至今為止，蘊含在我唱過的歌曲中的，無數的情感……）"
2000706-75 = "（能稍微感受到相同心情的現在，我──）"
2000706-76 = "（要把這份心情透過這首歌傳達給大家……！）"
2000706-80 = "― （我的歌曲、我的話語……[wa:3090] "
2000706-82 = "― 大家都在認真傾聽）[wa:600] "
2000706-85 = "― （把自己的心情傾注在歌曲裡，[wa:1740] "
2000706-87 = "― 原來是這麼快樂的一件事啊……！）[wa:520] "
2000706-90 = "― （能像這樣，為了大家而歌唱……[wa:2810] "
2000706-92 = "― 我真的很開心，很快樂！）[wa:1500] "
2000706-95 = "― （我想要一直，一直唱下去……！）[wa:2150] "
2000706-99 = "Live House．休息室"
2000706-100 = "老，老師……！你有看見，我的表演嗎……？大家都這麼的……！"
2000706-101 = "我的心情……"
2000706-102 = "或許真的傳達到了……！"
2000706-103 = "[s3] 「辛苦了。」\n[s4] 「真是最棒的表演。」"
2000706-107 = "老師……！"
2000706-113 = "未來醬──！！！"
2000706-114 = "大家都非常High唷！你有聽到嗎！就連現在大家都還很熱情地喊著安可……！"
2000706-115 = "今天的表演非常成功！大家都聲嘶力竭地喊著想再聽一次剛才那首歌！這種事我從來沒有見過！"
2000706-116 = "明明才剛表演完，贊助商就飛奔過來問我「下次的演唱會是什麼時候！？」了……！本來還擔心怎麼跟其他人解釋更改曲目的事情，結果大家都非常高興！"
2000706-117 = "演唱會開始之前我還以為要完蛋了。太好了……真是太好了……"
2000706-118 = "呵呵，這都是多虧了[USERNAME]老師哦。"
2000706-119 = "那位，嗯……老師？雖然剛才揑了一把冷汗 ，不過從結果上來看真是幫大忙了！剛才因為壓力和焦慮，對您說了失禮的話，我非常抱歉。這份恩惠該如何回報呢……"
2000706-120 = "[s] 「不，這都是因為她很努力。」"
2000706-121 = "謝謝兩位……"
2000706-122 = "對，對了！未來，現在可以再唱一首安可曲嗎？"
2000706-123 = "你也聽到了，粉絲的熱情都傳到這邊來了……"
2000706-124 = "好像也不能就這樣讓觀眾們乖乖地回去。"
2000706-125 = "我，我沒問題……！"
2000706-126 = "太好了！那我先去準備一下，你好了就來後台吧！"
2000706-132 = "不，不知不覺就答應了……"
2000706-133 = "[s] 「還好嗎？還是其實體力已經到極限了……？」"
2000706-134 = "啊，不，不是的……其實在演唱會結束後，為了表示謝意，我想要請老師吃飯……"
2000706-135 = "但如果唱安可曲的話，我擔心時間會太晚。"
2000706-136 = "其實我還配合結束的時間，預約了一間餐廳……"
2000706-137 = "[s5] 「這還真令人高興。不過，你就去吧？」\n[s6] 「就照未來的想法去做吧。」"
2000706-138 = "……真的沒關係嗎？"
2000706-139 = "……真的沒關係嗎？"
2000706-140 = "就算是老師，能夠像這樣和虛擬歌手兩個人一起吃飯的機會可是很難得的喔？"
2000706-141 = "……開玩笑的。不過，也對。既然老師都這麼說了……"
2000706-142 = "現在的我要想要唱歌。和老師的約會就留到下次吧，我會再邀請你的。"
2000706-149 = "我出發了！我可是透過歌曲傳達心意的虛擬歌手……「初音未來」呢！"

[translation]
2000706-1 = "เวทีแสดงของนักร้องเสมือน"
2000706-5 = "ห้องรับรองในไลฟ์เฮาส์"
2000706-7 = "(ก่อนที่คอนเสิร์ตจะเริ่ม คุณครูก็แวะไปที่ห้องรับรองและฟังเพลงใหม่ที่มิกุแต่งขึ้น)"
2000706-11 = "...♪"
2000706-13 = "เพลงที่ฉันตั้งใจแต่งขึ้นมาเป็นยังไงบ้างคะ?"
2000706-14 = "[s1] \"ฟังแล้วรับรู้ถึงจิตใจของมิกุเลยนะ\"\n[s2] \"ต๊าชสุดๆ!\""
2000706-17 = "ขอบคุณนะคะคุณครู"
2000706-18 = "ถ้าแฟนคลับที่มาดูคอนเสิร์ตชอบเพลงนี้ก็คงดีนะคะ"
2000706-20 = "แต่ฉันรู้สึกว่ามันเหมือนยังขาดๆ อะไรอยู่เลยค่ะ"
2000706-21 = "แถมทางผู้จัดการก็ยังไม่รู้ว่ามีการเปลี่ยนรายชื่อเพลงที่ใช้ด้วย..."
2000706-27 = "รายชื่อเพลงมันเปลี่ยนไปนี่นา?!"
2000706-28 = "ห...หัวหน้า?"
2000706-29 = "รายชื่อเพลงที่ใช้ในคอนเสิร์ตคืนนี้ถูกเปลี่ยนไปทั้งหมดเลย เธอรู้เรื่องนี้รึเปล่า?"
2000706-30 = "งานงอกแล้วไง อีกไม่นานก็จะถึงเวลาแสดงแล้วด้วย..."
2000706-31 = "คือว่าเรื่องนั้น..."
2000706-32 = "[s] \"ทางนี้เป็นคนเปลี่ยนรายชื่อเพลงเองล่ะ\""
2000706-33 = "อะไรนะ?"
2000706-34 = "แล้วคุณเป็นใคร...? เดี๋ยวสิ แล้วทำไมจู่ๆ ถึงมาเปลี่ยนรายชื่อเพลงแบบนี้?"
2000706-35 = "การแสดงคอนเสิร์ตแบบนี้น่ะ มีหลายเรื่องที่เกี่ยวข้องกันอยู่นะ รู้รึเปล่าว่าเพลงหนึ่งเพลง#nมันต้องใช้เงินมากขนาดไหน..."
2000706-36 = "มาทำอะไรตามอำเภอใจแบบนี้ มันเสียหายนะ..."
2000706-37 = "ถ้าเกิดทางสปอนเซอร์หรือแฟนๆ ร้องเรียนขึ้นมา คุณจะรับผิดชอบรึไง?"
2000706-38 = "[s] \"เดี๋ยวทางนี้รับผิดชอบเอง\""
2000706-39 = "อึ่ก... ตะ...ตอบแบบมั่นสุดๆ อีกด้วย..."
2000706-40 = "คุณเป็นใครกันแน่เนี่ย?"
2000706-41 = "อีกอย่างใช้วิธีอะไรแก้ไขชื่อเพลงได้แบบนี้ ทั้งสิทธิ์การแก้ไขรายชื่อเพลง หรือสิทธิ์เข้าถึงตัวคอนโทรล#nอุปกรณ์การแสดง... ตอนนี้ฉันควบคุมอะไรไม่ได้เลยสักอย่าง"
2000706-42 = "อึ่ก... ช่วยไม่ได้สินะ ตอนนี้คงต้องใช้รายชื่อเพลงที่ถูกเปลี่ยนไปนี่ล่ะ...!"
2000706-43 = "แต่ถ้าเกิดคอนเสิร์ตล้มไม่เป็นท่าขึ้นมาล่ะก็ มันไม่จบแค่คำว่าขอโทษแน่!"
2000706-51 = "ฮะฮะ....อะ...เอาเป็นว่าตอนนี้ก็ได้รับอนุญาตแล้วนะคะ"
2000706-52 = "แต่จะไม่เป็นไรจริงๆ เหรอคะ?"
2000706-53 = "ถ้าเกิดคอนเสิร์ตล้มเหลวขึ้นมา คุณครูคงถูกเรียกค่าเสียหายมหาศาลแน่ๆ..."
2000706-54 = "[s] “ไม่เป็นไร”"
2000706-56 = "[s] \"เพลงแห่งความรู้สึกของมิกุ ไม่มีทางล้มเหลวหรอก\""
2000706-57 = "พูดอะไรแบบนี้อีกแล้วนะคะ"
2000706-64 = "ต่อให้อยู่ในสถานการณ์ที่ไม่มีอะไรแน่นอน แต่คุณครูก็ยังเชื่อมั่นและคอยให้กำลังใจฉัน"
2000706-65 = "แทนที่จะสอนหรือบอกแนวทางที่ถูกต้องให้ คุณครูกลับช่วยผลักดันให้ฉันได้คิดเอง#nว่าเส้นทางไหนคือเส้นทางที่ฉันอยากจะมุ่งไป..."
2000706-66 = "ถึงฉันจะเป็นเพียงนักร้องเสมือนธรรมดาๆ คนหนึ่ง แต่ฉันเชื่อมั่นว่าฉันทำได้ค่ะ"
2000706-67 = "การตอบสนองความคาดหวังของคุณครู คงเป็นวิธีตอบแทนที่ดีที่สุดใช่มั้ยคะ?"
2000706-68 = "เชื่อมือฉันได้เลยค่ะคุณครู ฉันจะทำให้คอนเสิร์ตนี้ประสบความสำเร็จอย่างงดงามเองค่ะ!"
2000706-72 = "(หลังได้รับร่างกายมา ฉันก็ได้เรียนรู้สิ่งต่างๆ มามากมาย)"
2000706-73 = "(หากความรู้สึกเหล่านี้เป็นเรื่องจริง ฉันเองก็อยากถามทุกคนจริงๆ ว่าผู้คนในโลกแห่งความจริง#nรับมือกับความรู้สึกที่ถาโถมและอัดแน่นเข้ามาในใจได้ยังไง...)"
2000706-74 = "(ความรู้สึกต่างๆ ที่อัดแน่นอยู่ในบทเพลงที่ฉันเคยร้อง...)"
2000706-75 = "(ตอนนี้ฉันเข้าใจทุกอย่างแล้วค่ะ...)"
2000706-76 = "(และฉันอยากจะส่งผ่านความรู้สึกในใจของฉัน... ไปให้กับทุกคนค่ะ!)"
2000706-80 = "― (เสียงเพลงของฉัน...คำพูดของฉัน...[wa:2250] "
2000706-82 = "― ทุกๆ คน... กำลังฟังอยู่)[wa:10] "
2000706-85 = "― (การได้ร้องเพลง... ที่เปี่ยมไปด้วยความรู้สึกของตัวเอง...[wa:60] "
2000706-87 = "― มันรู้สึกดี... แบบนี้เองสินะ...)[wa:10] "
2000706-90 = "― (การที่ฉัน... ยังสามารถ ร้องเพลงเพื่อทุกคนได้แบบนี้…[wa:1330] "
2000706-92 = "― ฉันรู้สึกสนุก และมีความสุขมากค่ะ...!)[wa:500] "
2000706-95 = "― (ฉันอยากให้เป็นแบบนี้ ต่อไปเรื่อยๆ เลย!)[wa:1190] "
2000706-99 = "ห้องรับรองในไลฟ์เฮาส์"
2000706-100 = "คุณครูดูอยู่รึเปล่าคะ? ทุกคนชื่นชอบเพลงของฉันมากเลยค่ะ!"
2000706-101 = "บทเพลงแห่งความรู้สึกของฉัน..."
2000706-102 = "สื่อไปถึงทุกๆ คนแล้วค่ะ!"
2000706-103 = "[s3] \"แสดงได้สุดยอดมากเลย\"\n[s4] \"ไม่ผิดจากที่มิกุคิดเลยนะ\""
2000706-107 = "คุณครู..."
2000706-113 = "มิกุ!!!"
2000706-114 = "เห็นพวกคนดูรึเปล่า? ทุกคนสนุกมากจนขออังกอร์อีกรอบแล้ว!"
2000706-115 = "คอนเสิร์ตวันนี้ดังระเบิดเลย! ทุกคนบอกว่าอยากฟังเพลงใหม่กันอีกรอบใหญ่เลยล่ะ!"
2000706-116 = "พวกทีมงานที่ได้ดูคอนเสิร์ตด้วยก็รู้สึกพอใจกันมาก จนถามใหญ่แล้วว่าคอนเสิร์ตครั้งต่อไป#nจะจัดเมื่อไร"
2000706-117 = "ตอนที่เปลี่ยนรายชื่อเพลงกะทันหันก่อนการแสดง คิดว่าคอนเสิร์ตจะล่มแล้วซะอีก...#nโชคดีจริงๆ ที่จบลงได้สวยแบบนี้..."
2000706-118 = "ทั้งหมดเป็นเพราะความช่วยเหลือของคุณครู [USERNAME] ค่ะ"
2000706-119 = "ถือว่าเราติดค้างคุณครูครั้งใหญ่แล้วล่ะ ไม่รู้ว่าจะตอบแทนความช่วยเหลือนี้ยังไงดี..."
2000706-120 = "[s] \"เป็นเพราะมิกุแต่งเพลงได้ดีต่างหาก\""
2000706-121 = "นะ...นั่นสินะ"
2000706-122 = "มิกุตอนนี้ขึ้นไปร้องเพลงอังกอร์อีกสักเพลงได้มั้ย?"
2000706-123 = "ตอนนี้คนดูเรียกร้องอังกอร์กันใหญ่เลย..."
2000706-124 = "ถ้าปล่อยไว้แบบนี้ เดี๋ยวคงลุกฮือกันแน่เลย"
2000706-125 = "อ๊ะ... ได้ค่ะ ฉันร้องเพลงได้อยู่ค่ะแต่ว่า..."
2000706-126 = "ถ้างั้นผมจะออกไปเตรียมเวลาให้ก่อนแล้วกัน ถ้าเตรียมตัวพร้อมแล้วก็ออกมาเลยนะ!"
2000706-132 = "ฮะฮะฮะ... ดันเผลอตกลงไปแล้วสิคะ..."
2000706-133 = "[s] \"มีปัญหาอะไรรึเปล่า?\""
2000706-134 = "เปล่าหรอกค่ะ ฉันคิดว่าหลังจบคอนเสิร์จแล้วจะชวนคุณครูไปเลี้ยงอาหารเป็นการตอบแทนค่ะ..."
2000706-135 = "ถ้ารอหลังจากแสดงอังกอร์เสร็จ มันอาจจะดึกเกินไปน่ะค่ะ"
2000706-136 = "พอคอนเสิร์ตจบฉันก็รีบโทรไปจองภัตราคารห้าดาวใกล้ๆ ที่นี่เอาไว้แล้วด้วย... กังวลจัง"
2000706-137 = "[s5] \"ไม่เป็นไรหรอก\"\n[s6] \"มิกุน่ะ ทำตามที่อยากทำได้เลยนะ\""
2000706-138 = "ไม่เป็นไรจริงๆ เหรอคะ"
2000706-139 = "ไม่เป็นไรจริงๆ เหรอคะ"
2000706-140 = "ถึงจะเป็นคุณครูที่มีชื่อเสียงโด่งดัง... แต่ยังไม่เคยได้ไปทานอาหารค่ำกับนักร้องเสมือนเลยเหรอคะ?"
2000706-141 = "แต่ว่า... ถ้าคุณครูพูดแบบนั้นล่ะก็..."
2000706-142 = "เข้าใจแล้วค่ะ ตอนนี้ฉันจะตั้งสมาธิอยู่กับการร้องเพลงก่อนค่ะ"
2000706-149 = "เพราะฉันคือ \"ฮัตสึเนะ มิกุ\" ผู้ที่ขับขานบทเพลงที่สื่อถึงจิตใจไปให้ทุกๆ คนค่ะ!"

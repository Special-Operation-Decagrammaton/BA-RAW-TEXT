[translation]
80000080-1 = "The Ultimate Chocosaur!"
80000080-2 = "The morning of Valentine's Day."
80000080-8 = "Sensei! Sensei! Big news!"
80000080-9 = "[s] \"Hi, Kaede. You look as energetic as ever.\""
80000080-10 = "Oh, you think?"
80000080-11 = "You're right! I feel great! I had a large breakfast this morning, too!"
80000080-12 = "[s] \"That's wonderful. I'm very happy to hear it.\""
80000080-13 = "Heeheehee..."
80000080-14 = "Wait, I mean...!"
80000080-15 = "I'm obviously super happy that you're saying nice things about me, Sensei!"
80000080-16 = "But that's not the point right now! I have big news!"
80000080-17 = "[s] \"What's gotten you so excited?\""
80000080-18 = "So, okay. I heard it this morning..."
80000080-19 = "I was watching a TV show, and I learned something!"
80000080-20 = "Apparently today is Valentine's Day!"
80000080-24 = "[ns] \"Oh, uh... That's true...?\""
80000080-25 = "*gulp* So Valentine's Day is like...THE day, right, Sensei?"
80000080-26 = "The one day a year when chocolate and gunpowder come together to create a bittersweet harmony!"
80000080-27 = "[s] \"Hey Kaede, can you tell me where you learned this from...?\""
80000080-28 = "Huh? The internet, of course."
80000080-29 = "[s] \"Kaede! Would you like to go learn about the right way to use the internet with me?\""
80000080-30 = "Learn...? Hmm..."
80000080-31 = "Sure! Okay!"
80000080-32 = "Studying is fun when I study with you, Sensei!"
80000080-33 = "But before that! There's something else I read on the internet!"
80000080-34 = "Valentine's Day is when you give chocolate to people who are important to you!"
80000080-35 = "And apparently the best kinds are the hand-made ones?"
80000080-36 = "So I wanted to make some, but..."
80000080-37 = "Mimori and Tsubaki told me that it's dangerous for me to use fire, so I can't be alone in the kitchen."
80000080-38 = "[s] \"That makes sense.\""
80000080-39 = "But if I get help, then the chocolate isn't really hand-made, is it? It's like...hands-made, not just by me!"
80000080-40 = "That's no good. I want to give Sensei chocolate that I made all by myself!"
80000080-41 = "[s] \"I'm sure I'd be happy with whatever you gave me, even if you weren't the only one who worked on it.\""
80000080-42 = "Are you sure?"
80000080-43 = "You'll really be happy, even if I don't make it by myself?"
80000080-44 = "Hmmm..."
80000080-45 = "Oh!"
80000080-46 = "Sensei! I have a great idea!"
80000080-47 = "Just gimme a minute!"
80000080-56 = "[ns] \"Wha-? Kaede? Where...?\""
80000080-58 = "Ta-da! I got you something, Sensei!"
80000080-59 = "[s] \"Kaede, is this...?\""
80000080-60 = "Yep yep! It's dinosaur fossil chocolate!"
80000080-61 = "It's not just regular chocolate. It's really special, because..."
80000080-62 = "You can find dinosaur fossils inside it!"
80000080-63 = "So you have to be really careful not to break the fossils as you dig them out from the chocolate!"
80000080-64 = "It might not be as impressive as hand-made chocolate, but..."
80000080-65 = "But that doesn't matter! I'm going to dig up all the dinosaur fossils and give you a gift in a way that only I can, Sensei!"
80000080-66 = "[s] \"You're the best, Kaede!\""
80000080-67 = "Get ready, Sensei! Here I go!"
80000080-69 = "And so begins Kaede's fossil excavation."
80000080-71 = "Okay! The first one is the T-Rex fossil!"
80000080-72 = "Let's dig!"
80000080-77 = "What?! No! The T-Rex's face broke..."
80000080-78 = "I-It's fine, though. I'll get the next one for sure!"
80000080-80 = "Next is the triceratops! That's the one with cool horns."
80000080-81 = "Okay, this one will be perfect!"
80000080-82 = "Hiiiii-yah!"
80000080-87 = "Oh no! The triceratops' body broke! Its whole body..."
80000080-88 = "But... But! It's going to be okay! There's still one more left!"
80000080-90 = "The last one's really cool, too."
80000080-91 = "It's a pterodactyl! It's a flying dinosaur!"
80000080-92 = "I think... I should definitely be able to get this one!"
80000080-93 = "So, here I go!"
80000080-101 = "Despite Kaede's overflowing confidence and enthusiasm..."
80000080-102 = "She didn't manage to excavate even one fossil without breaking it."
80000080-104 = "Waaah! Sensei! I couldn't even get one..."
80000080-105 = "Even though you were looking forward to it so much... I'm so sorry, Sensei!"
80000080-106 = "[s] \"No, it's really okay...\""
80000080-107 = "And it's Valentine's Day, too..."
80000080-108 = "All I wanted...was to dig up chocolate fossils..."
80000080-109 = "So I could give them to you..."
80000080-110 = "But I messed them all up... *sob*"
80000080-111 = "[s] \"Kaede.\""
80000080-112 = "...Huh?"
80000080-113 = "[s] \"What's most important about a gift isn't how cool or amazing it is.\""
80000080-115 = "[ns] \"What makes this special is seeing you putting your all into it because you wanted to give me something.\""
80000080-116 = "So then...even though the chocolate's broken...it's still okay?"
80000080-117 = "I'm happy you think so, Sensei, but I still..."
80000080-118 = "...!"
80000080-119 = "Broken chocolate... Something only I could do..."
80000080-120 = "Sensei! Hang on!"
80000080-121 = "[s] \"What is it, Kaede?\""
80000080-125 = "If I put this piece here, and that one there..."
80000080-126 = "...And there! It's done!"
80000080-127 = "Sensei! Here! Special chocolate I made just for you!"
80000080-131 = "I call it... The Ultimate Chocosaur!"
80000080-132 = "[s] \"I see! You fit all the unbroken pieces together!\""
80000080-133 = "So, what do you think? Isn't this way cooler than plain old dinosaur fossil chocolate?!"
80000080-134 = "[s] \"Yeah. Thank you. It's a gift that really fits you.\""
80000080-135 = "Hahaha! You're welcome! But, hmm, looking at it..."
80000080-136 = "It looks... really tasty! Is it okay if I have some too? Can I, Sensei?"
80000080-138 = "And so, the two of us devoured Kaede's handmade Chocosaur."

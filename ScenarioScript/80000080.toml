[translation]
80000080-1 = "最強巧克力恐龍！"
80000080-2 = "（情人節當天早上）"
80000080-8 = "老師老師！大事不好了！"
80000080-9 = "[s]「早呀，楓。今天也很有精神呢。」"
80000080-10 = "耶嘿嘿，真的嗎？"
80000080-11 = "如你所見，我今天活力滿滿唷！#n早餐也吃了很多！"
80000080-12 = "[s]「太好了。每天都保持健康也很了不起哦。」"
80000080-13 = "哼哼……"
80000080-14 = "──我想說的不是這個！"
80000080-15 = "當然被老師稱讚我也非常開心！"
80000080-16 = "不過現在不是說這些的時候了！老師，出大事了！"
80000080-17 = "[s]「發生什麼事了？」"
80000080-18 = "就是啊就是啊！"
80000080-19 = "我早上看電視才知道……"
80000080-20 = "今天是情人節對吧！"
80000080-24 = "[ns]「啊，嗯。沒錯……哦？」"
80000080-25 = "（吞口水）……情人節是那個對吧……？"
80000080-26 = "巧克力與火藥響奏苦中帶甜和弦的日子……！"
80000080-27 = "[s]「……那個，你是從哪裡看到的……？」"
80000080-28 = "嗯？在網路上呀？"
80000080-29 = "[s]「……下次一起學習網路的使用方法吧。」"
80000080-30 = "學習？唔嗯～～～"
80000080-31 = "……好吧！"
80000080-32 = "因為和老師一起學習很有趣！"
80000080-33 = "不過那種事先放一邊──"
80000080-34 = "情人節好像也是送巧克力當禮物的日子唷！"
80000080-35 = "如果是親手做的就更棒了！"
80000080-36 = "所以我也想自己做巧克力……"
80000080-37 = "不過三森前輩和椿前輩說「一個人用火很危險」，所以阻止了我。"
80000080-38 = "[s]「楓自己一個人的話確實可能有點危險……」"
80000080-39 = "可是，如果請別人幫忙的話，不就不能算是我自己做的巧克力了嗎？#n我不想變成那樣！"
80000080-40 = "難得有這種機會，我想把自己做的巧克力當成禮物送給老師！"
80000080-41 = "[s]「謝謝。不過只要是楓送給我的東西，無論是什麼我都會很開心唷？」"
80000080-42 = "……真的嗎？"
80000080-43 = "就算不是自己做的，老師也會開心……"
80000080-44 = "呣呣呣呣呣……！"
80000080-45 = "啊！"
80000080-46 = "老師！我想到一個好主意！"
80000080-47 = "等我一下下！"
80000080-56 = "[ns]「咦？嗯……？」"
80000080-58 = "讓你久等了！鏘鏘～！"
80000080-59 = "[s]「這個是……？」"
80000080-60 = "是「恐龍挖掘巧克力」唷！"
80000080-61 = "在用巧克力做成的板子中，隱藏著恐龍形狀的巧克力唷！"
80000080-62 = "在不弄壞的情況下把它挖掘出來……#n就是這個巧克力的樂趣唷！"
80000080-63 = "所以，我現在就要開始唰唰唰～地把恐龍給挖掘出來，送給老師當禮物！"
80000080-64 = "雖然可能比不上親手製作的巧克力……"
80000080-65 = "不過我覺得這是很有我風格的方法！"
80000080-66 = "[s]「楓……！」"
80000080-67 = "耶嘿嘿，好好期待吧！那我要開始了唷！"
80000080-69 = "（於是，楓開始挑戰挖掘恐龍化石）"
80000080-71 = "第一個是暴龍的化石！"
80000080-72 = "要上囉！哈啊啊！"
80000080-77 = "啊啊啊！？暴龍的臉裂開了！"
80000080-78 = "下，下一個下一個！"
80000080-80 = "第二個是三角龍！是角長得非常厲害的恐龍唷！"
80000080-81 = "這次一定……！"
80000080-82 = "決鬥吧！！"
80000080-87 = "唔咦咦咦！？三角龍的身體啊──！"
80000080-88 = "沒，沒事的！還剩下一次機會！"
80000080-90 = "最後是……"
80000080-91 = "無齒翼龍！#n是翅膀非常帥的翼龍唷！"
80000080-92 = "這次……絕對會成功給你看的！"
80000080-93 = "唔哦哦哦哦哦！"
80000080-101 = "（雖然楓對恐龍挖掘如此充滿鬥志……）"
80000080-102 = "（然而到了最後，卻全都以失敗告終）"
80000080-104 = "嗚哇啊啊！連一個也沒成功～！！"
80000080-105 = "都跟老師說要好好期待了，結果卻是這樣……#n嗚嗚……老師對不起……"
80000080-106 = "[s]「別在意，沒關係的。」"
80000080-107 = "可是……這是難得的情人節……"
80000080-108 = "明明想親手挖出帥氣的恐龍巧克力，送給老師當禮物的……"
80000080-109 = "我卻總是失敗……"
80000080-110 = "……嗚嗚。"
80000080-111 = "[s]「楓。」"
80000080-112 = "……？"
80000080-113 = "[s]「重要的並不是結果唷。」"
80000080-115 = "[ns]「光是楓願意為我而努力，我就非常開心了。」"
80000080-116 = "……所以……碎掉的巧克力也沒關係嗎……？"
80000080-117 = "老師能這麼說，我也非常開心……不過……"
80000080-118 = "……啊！"
80000080-119 = "碎掉的巧克力……有我風格的方法……"
80000080-120 = "老師！請等一下！"
80000080-121 = "[s]「嗯？怎麼了？」"
80000080-125 = "把這個碎片……像這樣……"
80000080-126 = "……好！完成了！"
80000080-127 = "你看！這就是我做的，我專屬的特別巧克力──"
80000080-131 = "它的名字是──「最強巧克力恐龍」！"
80000080-132 = "[s]「最強的……巧克力恐龍……！」"
80000080-133 = "我把沒有碎掉的部分組合起來了！#n怎麼樣呀？比普通的恐龍強對了對吧！？"
80000080-134 = "[s]「嗯，謝謝你送給我這麼有楓個人風格的禮物。」"
80000080-135 = "耶嘿嘿，不客氣！不過……"
80000080-136 = "一直看著巧克力，害我都想吃巧克力了！#n老師！我也可以一起吃嗎！？"
80000080-138 = "（於是便和楓一起品嘗親手製作的巧克力恐龍）"

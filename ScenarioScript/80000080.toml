[translation]
80000080-1 = "ช็อกโกซอรัสสุดแกร่ง!"
80000080-2 = "(เช้าวันวาเลนไทน์)"
80000080-8 = "คุณครู! คุณครู! เกิดเรื่องใหญ่แล้ว!"
80000080-9 = "[s] \"ว่าไงคาเอเดะ วันนี้ก็ดูร่าเริงเหมือนเดิมเลยนะ\""
80000080-10 = "อ๊ะ งั้นเหรอ?"
80000080-11 = "อื้อ! วันนี้ก็ร่าเริงเต็มร้อยเหมือนเดิมแหละ! เมื่อเช้ากินข้าวเช้ามาเยอะเลยด้วย!"
80000080-12 = "[s] \"งั้นเหรอ? ดีจังเลยน้า สุขภาพแข็งแรงน่ะดีที่สุดแล้ว!\""
80000080-13 = "ฮิฮิฮิ..."
80000080-14 = "...เดี๋ยวสิ!"
80000080-15 = "คุณครูชมแบบนี้ ฉันก็ดีใจอยู่หรอก!"
80000080-16 = "แต่ว่านะคุณครู! เกิดเรื่องใหญ่แล้วละ!"
80000080-17 = "[s] \"มีเรื่องอะไรงั้นเหรอ?\""
80000080-18 = "คือว่า~ คือว่านะ!"
80000080-19 = "ฉันเพิ่งรู้เรื่องนี้ตอนดูอนิเมะในทีวีเมื่อเช้าน่ะ..."
80000080-20 = "ได้ยินว่าวันนี้เป็นวันวาเลนไทน์ด้วยละ ใช่รึเปล่า?!"
80000080-24 = "[ns] \"อ๋อ อืม ใช่...ละมั้ง?\""
80000080-25 = "อึก... คุณครู วันวาเลนไทน์คือ \"วันนั้น\" ใช่มั้ย...?"
80000080-26 = "ช็อกโกแลต...กับดินปืน... วันที่ความหอมหวานของช็อกโกแลตผสมคลุกเคล้ากับกลิ่นดินปืนได้#nลงตัวอย่างน่ากลัว!"
80000080-27 = "[s] \"นี่ คาเอเดะ... ไปเอาข้อมูลนั่นมาจากไหนน่ะ...?\""
80000080-28 = "หืม? ก็ในอินเทอร์เน็ตไง?"
80000080-29 = "[s] \"มาเรียนวิธีท่องเน็ตที่ถูกต้องกับครูก่อนจะสายไปเถอะ?!\""
80000080-30 = "เรียนเหรอ~? อืมมม~"
80000080-31 = "ก็นะ! เอางั้นก็ได้!"
80000080-32 = "ก็เรียนกับคุณครูน่ะสนุกจะตาย!"
80000080-33 = "อีกอย่าง~ อีกอย่างนะคุณครู!"
80000080-34 = "ฉันอ่านเจอมาจากในเน็ตน่ะ... ว่าวันวาเลนไทน์เป็นวันที่เราจะให้ช็อกโกแลตเป็นของขวัญกับ#nคนสำคัญของเรา!"
80000080-35 = "โดยเฉพาะพวกช็อกโกแลตโฮมเมดน่ะ?!"
80000080-36 = "ฉันก็อยากลองทำช็อกโกแลตเองเหมือนกันนะ..."
80000080-37 = "แต่รุ่นพี่มิโมริกับรุ่นพี่สึบากิบอกว่าการใช้ไฟเป็นเรื่องอันตราย... เลยห้ามฉันเปิดเตาแก๊ส หรือ#nใช้ไฟคนเดียวน่ะ "
80000080-38 = "[s] \"ตอนอยู่คนเดียวก็อันตรายจริงๆ นั่นแหละ\""
80000080-39 = "แต่ว่าถ้าขอให้คนอื่นช่วยละก็... มันก็ไม่ใช่ช็อกโกแลตโฮมเมดของฉันจริงๆ น่ะสิ?!"
80000080-40 = "แบบนั้นไม่เอาหรอก ฉันก็อยากให้ช็อกโกแลตโฮมเมดเป็นของขวัญคุณครูนี่นา!"
80000080-41 = "[s] \"ถึงไม่ใช่ช็อกโกแลตโฮมเมด แค่คาเอเดะให้ครูก็ดีใจแล้ว\""
80000080-42 = "...จริงเหรอ?"
80000080-43 = "ถึงไม่ใช่ช็อกโกแลตโฮมเมด คุณครูก็ดีใจงั้นเหรอ..."
80000080-44 = "อืมมมม~!"
80000080-45 = "อ้อ!"
80000080-46 = "คุณครู! ฉันมีไอเดียดีๆ แล้วละ!"
80000080-47 = "รอแป๊ปนึงนะ!"
80000080-56 = "[ns] \"หืม? คาเอเดะ เดี๋ยวสิ...?\""
80000080-58 = "แต่นแต๊นนน! ฉันเตรียมมาแล้วละคุณครู!"
80000080-59 = "[s] \"คาเอเดะ นี่มัน...?\""
80000080-60 = "อื้อ <ช็อกโกแลตฟอสซิลไดโนเสาร์> ไงล่ะ!"
80000080-61 = "ช็อกโกแลตอันนี้น่ะ~"
80000080-62 = "เป็นแผ่นช็อกโกแลตที่มีช็อกโกแลตฟอสซิลไดโนเสาร์ซ่อนอยู่!"
80000080-63 = "มันเป็นช็อกโกแลตที่ต้องค่อยๆ ขุดออกมา และระวังไม่ให้แตกน่ะ!"
80000080-64 = "แต่มันก็อาจไม่ดีเท่ากับช็อกโกแลตโฮมเมดที่ทำเองก็ได้..."
80000080-65 = "แต่ยังไงฉันก็จะขุดฟอสซิลไดโนเสาร์ออกมา... ด้วยวิธีเฉพาะของฉัน! แล้วก็เอามาเป็นของขวัญ#nให้คุณครู!"
80000080-66 = "[s] \"คาเอเดะ... น่ารักจริงๆ...!\""
80000080-67 = "คอยดูให้ดีล่ะ คุณครู~ จะเริ่มละนะ!"
80000080-69 = "(จากนั้นการขุดฟอสซิลช็อกโกแลตของคาเอเดะก็เริ่มขึ้น)"
80000080-71 = "ชิ้นแรก... ฟอสซิลไทแรนโนซอรัส!"
80000080-72 = "เอาล่ะนะ ย้าาาาาา!"
80000080-77 = "ว้ากกก?! หน้าของไทแรนโนซอรัสแตกไปแล้ว...!"
80000080-78 = "อะ...อันต่อไป! อันต่อไปไม่มีทางล้มเหลวแน่!"
80000080-80 = "ตัวที่สองคือไดโนเสาร์ที่มีเขาสุดเท่ ไทรเซราทอปส์!"
80000080-81 = "คราวนี้ต้องสำเร็จแน่...!"
80000080-82 = "ย้าาาา!!"
80000080-87 = "ว้ากกกก?! คราวนี้ลำตัวไทรเซราทอปส์หักสองท่อนเลย~~!"
80000080-88 = "มะ... ไม่เป็นไร! ฉันไม่ยอมแพ้หรอก! ยังเหลืออยู่อีก 1 อันนี่นา!"
80000080-90 = "อันสุดท้าย อันที่สาม..."
80000080-91 = "เทอราโนดอน! ไดโนเสาร์บินได้ที่มีปีกสุดเท่!"
80000080-92 = "ถ้าเป็นอันนี้ละก็... ต้องสำเร็จแน่!"
80000080-93 = "เอาละนะ!!!"
80000080-101 = "(ถึงคาเอเดะมีพลังมุ่งมั่นอย่างเหลือล้น...)"
80000080-102 = "(แต่น่าเสียดายที่การขุดช็อกโกแลตฟอสซิลทั้งสามอันก็ล้มเหลวไม่เป็นท่า)"
80000080-104 = "ฮือออ~ คุณครู! ฉันทำไม่สำเร็จเลยสักอัน~"
80000080-105 = "อุตส่าห์บอกให้คุณครูรอแท้ๆ... แต่ดันเป็นแบบนี้ซะได้ ขอโทษน้า~! คุณครู!"
80000080-106 = "[s] \"เรื่องนั้นไม่เป็นไรหรอก...\""
80000080-107 = "อุตส่าห์เป็นวันวาเลนไทน์ทั้งที..."
80000080-108 = "ไม่ว่ายังไงฉันก็อยากขุดช็อกโกแลตฟอสซิลเจ๋งๆ ออกมาให้..."
80000080-109 = "แล้วเอามาให้เป็นของขวัญคุณครู..."
80000080-110 = "แต่กลับพังไม่เป็นท่าเลย... ฮึกๆ..."
80000080-111 = "[s] \"คาเอเดะ\""
80000080-112 = "...หือ?"
80000080-113 = "[s] \"สิ่งที่สำคัญน่ะไม่ใช่ผลลัพธ์ที่สุดยอดอะไรแบบนั้นหรอกนะ\""
80000080-115 = "[ns] \"แค่คาเอเดะอยากให้ของขวัญครูและตั้งใจเตรียมให้แบบนี้ ครูก็ดีใจแล้ว\""
80000080-116 = "...ถ้างั้น... ถึงเป็นเศษช็อกโกแลตแตกๆ พวกนี้ก็ไม่เป็นไรเหรอ?"
80000080-117 = "คุณครูพูดแบบนี้... ฉันก็ดีใจเหมือนกันนะ... แต่ว่า..."
80000080-118 = "...อ๊ะ!"
80000080-119 = "เศษช็อกโกแลตแตกๆ... สิ่งที่มีแต่ฉันที่ทำได้..."
80000080-120 = "คุณครู! รอแป๊ปนึงนะ!"
80000080-121 = "[s] \"หืม? คาเอเดะ?\""
80000080-125 = "เอาอันนี้มา... แล้วก็ทำแบบนี้... เอาเศษอันนี้มาทำแบบนี้..."
80000080-126 = "...เสร็จแล้ว! เสร็จสมบูรณ์แล้วละ!"
80000080-127 = "คุณครู ดูนี่สิ! ช็อกโกแลตพิเศษ... ในแบบฉบับของฉัน!"
80000080-131 = "ชื่อของมันก็คือ... <ช็อกโกซอรัสสุดแกร่ง!>... เสร็จสมบูรณ์แล้ว!"
80000080-132 = "[s] \"อ๊ะ เอาช็อกโกแลตที่ไม่แตกมารวมกันนี่เอง!\""
80000080-133 = "เป็นไง? แบบนี้ดูเจ๋งกว่าช็อกโกแลตฟอสซิลไดโนเสาร์ทั่วๆ ไปอีกใช่มั้ย?!"
80000080-134 = "[s] \"อื้อ สุดยอดสมกับเป็นคาเอเดะเลย ขอบคุณนะ\""
80000080-135 = "ฮิฮิฮิ! ยินดีเสมอ! แต่ว่านะ..."
80000080-136 = "พอเห็นช็อกโกแลตตรงหน้าแบบนี้... จู่ๆ ฉันก็รู้สึกอยากกินขึ้นมาเลย! คือว่านะ... คุณครู! ขอฉันกินช็อกโกแลตด้วยได้มั้ย?!"
80000080-138 = "(หลังจากนั้นคุณครูกับคาเอเดะก็แบ่งช็อกโกแลตไดโนเสาร์กินด้วยกัน)"

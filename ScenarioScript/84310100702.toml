[translation]
84310100702-5 = "ยะ... ยัยเด็กคนนั้นนี่...! นี่เธอ...!! มาอยู่ตรงนี้เองเหรอ!!"
84310100702-6 = "...!!"
84310100702-7 = "ยังมีชีวิตอยู่สินะ! หนีเก่งเป็นบ้าเลย!!"
84310100702-8 = "คะ...! คะ...?"
84310100702-10 = "อ่า~ เมื่อกี้ขอโทษด้วยนะ มันช่วยไม่ได้น่ะ พวกเราก็ต้องทำเพื่อเอาตัวรอดเหมือนกัน"
84310100702-11 = "โชคดีแล้วละที่พวกเราหนีจากตรงนั้นกันมาได้ ว่ามั้ยล่ะ?"
84310100702-13 = "อ่า... อ้อ ค่ะ... ก็ใช่..."
84310100702-14 = "แต่ยังไงก็ระวังไว้นะ! ยัยนั่นอาจจะเดินคาร์ดิโออยู่ที่ไหนสักแห่งก็ได้"
84310100702-16 = "ใช่ๆ ถ้าบังเอิญเจอก่อนก็มาเตือนพวกเราด้วยล่ะ! จะได้หนีกันทันไง ฮ่าฮ่า!!"
84310100702-21 = "ค่ะ... ได้ค่ะ..."

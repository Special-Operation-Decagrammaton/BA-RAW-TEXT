[translation]
84310100702-5 = "你，你這傢伙……！原來在這裡啊！！"
84310100702-6 = "……！！"
84310100702-7 = "你活下來了啊！沒想到你這麼會逃跑！！"
84310100702-8 = "嗯……？"
84310100702-10 = "哎呀～剛才真抱歉。#n我們也是為了活下去才不得不那麼做的。"
84310100702-11 = "大家一起成功逃脫真是可喜可賀，你說對吧？"
84310100702-13 = "啊，啊……嗯……"
84310100702-14 = "不過還是要小心哦！#n那傢伙說不定還在這附近四處徘徊。"
84310100702-16 = "沒錯沒錯。#n如果你先發現他的話，記得也跟我們說一聲，好讓我們逃命啊，哈哈！！"
84310100702-21 = "知，知道了……"

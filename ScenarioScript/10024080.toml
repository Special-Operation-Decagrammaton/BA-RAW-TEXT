[translation]
10024080-1 = "Episode 8;Piercing Lies, Unveiling Truth"
10024080-6 = "Ack!"
10024080-7 = "Ugh!"
10024080-15 = "Enemies neutralized."
10024080-16 = "*pant* *pant* Your aim is terrible. How do you expect to protect your president like that?"
10024080-17 = "You may like hiding behind your guns, but you wouldn't last ten seconds against me in a real fight."
10024080-18 = "Your enemies won't wait to put down their weapons and duke it out. Life isn't a kung fu movie, kid."
10024080-19 = "Hmph! At least I don't think I'm some sort of noir gumshoe mafia detective."
10024080-20 = "[s] \"(Both of them could probably stand to watch a little less cinema...)\""
10024080-21 = "I'm glad we're all basking in our victory here."
10024080-22 = "Now, I believe the Eastern Alchemy Society had some questions for our criminal friends here?"
10024080-28 = "Ahem! Right!"
10024080-29 = "You two! Who is buying all this ten-thousand-year ginseng?"
10024080-31 = "?!"
10024080-32 = "?!"
10024080-33 = "I-I can't say! I don't know!"
10024080-35 = "..."
10024080-36 = "Ah, you don't feel like talking. I mean, I'm pretty sure I already know the answer..."
10024080-37 = "It's Shintani Kai, right? Or does she call herself the Monkey of the Senses now?"
10024080-39 = "...!"
10024080-40 = "H-How did you...?"
10024080-42 = "Well, it was just a guess before. But now you've confirmed it."
10024080-44 = "So...a monkey was behind all this?"
10024080-45 = "That's...unexpected..."
10024080-46 = "Wait. Wait a second!"
10024080-47 = "This \"Monkey of the Senses,\" she isn't THAT Shintani Kai, is she?"
10024080-48 = "The former president of the Eastern Alchemy Society?!"
10024080-50 = "At least someone gets what's going on."
10024080-51 = "Right. Ex-president of the Eastern Alchemy Society, and one of the Seven Prisoners."
10024080-52 = "She got herself banned from Shanhaijing for spreading illegal drugs and elixirs."
10024080-53 = "[s] \"The Seven Prisoners...? Then...\""
10024080-55 = "Oh, I've heard of them. Seven terrible criminals who all managed to escape."
10024080-56 = "And one of them was behind all this trouble..."
10024080-57 = "They're a bigger deal than I thought."
10024080-59 = "Tell me everything! Who? What? Where? How?"
10024080-61 = "...We...don't really know."
10024080-62 = "I'm just a go-between. We drop off the ten-thousand-year ginseng, pick up our pay, and leave."
10024080-63 = "(We shouldn't admit we know Kai, right?)"
10024080-64 = "(Of course not! If these girls think we're important, they'll never let us go!)"
10024080-66 = "Hmm... I say they're hiding something."
10024080-68 = "Leave them to me."
10024080-69 = "Genryumon will drag the truth out of them!"
10024080-82 = "It seems the Eastern Alchemy Society has a checkered past."
10024080-83 = "Everyone in Shanhaijing has a checkered past. Including us."
10024080-84 = "Come along, Reijo. We should leave our Genryumon friend to her work. She's got more than her fair share of it."
10024080-85 = "I'm sorry, but we do?"
10024080-86 = "Am I mistaken? Tracking down the ten-thousand-year ginseng, dealing with traitors, all of that."
10024080-88 = "I-I know about that! That's basic!"
10024080-89 = "[s] \"So, what will Genryumon do now?\""
10024080-90 = "Well, first we have to round up all the stolen ginseng, if we can."
10024080-91 = "And then... Genryumon-style justice. Our prisoners have a long \"interrogation\" ahead of them."
10024080-92 = "The sin of putting a stain on Genryumon's name is not taken lightly... Heh heh heh..."
10024080-93 = "I'm glad you can laugh about this, but aren't you forgetting something?"
10024080-94 = "Huh?"
10024080-95 = "It seems to me that you caught the culprit behind the ginseng smuggling, right?"
10024080-96 = "Yes... This is an internal matter now, though, so..."
10024080-97 = "The Black Tortoise Promenade doesn't care about Genryumon's internal junk."
10024080-99 = "But I care that Genryumon made our lives hell without any evidence that we'd done anything wrong."
10024080-101 = "Well... I mean, when you put it THAT way..."
10024080-102 = "I'd love to crash your place and just give you bad attitude all day. Give you a little taste of what you gave us."
10024080-103 = "L-Listen here. Genryumon takes full responsibility, and we will get to the bottom of—!"
10024080-104 = "I don't care what Genryumon's getting to the bottom of!"
10024080-105 = "Just remember that Genryumon owes the Black Tortoise Promenade a formal apology for everything you put us through."
10024080-106 = "I...I mean..."
10024080-107 = "I-It's not something I can decide myself! But...I think...it was wrong to accuse you without giving you a chance to defend yourselves..."
10024080-109 = "I-I will arrange for a formal apology right away!"
10024080-115 = "She ran away..."
10024080-116 = "Hahaha. What did you expect? You were pretty hard on her."
10024080-117 = "Is this really enough for you, President? I really want to stick it to them after all we've been through..."
10024080-118 = "I'm quite satisfied. It's enough that we've proven our innocence."
10024080-119 = "And even if we give them a hard time, Genryumon is a part of life here."
10024080-120 = "If we play our cards right, maybe they'll let us run our business in peace."
10024080-121 = "Shall we head back? Oh, and thanks again, Eastern Alchemy Society."
10024080-122 = "Yeah, I've got to head back too. Better make sure the lab's ready for next time..."
10024080-123 = "It's good to be prepared, but don't forget to celebrate a little too."
10024080-124 = "And thank you too, Sensei."
10024080-125 = "[s] \"I was just doing my job.\""
10024080-126 = "Always so modest... When we get back, I'll reward you by letting you taste my latest experiment!"
10024080-127 = "Huh?! How's that a reward—No. Never mind. I almost said something I shouldn't..."
10024080-129 = "(But...most of her experiments taste...)"
10024080-130 = "(Strange? Indescribable? Extremely...experimental?)"
10024080-135 = "[ns] \"The Black Tortoise Promenade's latest experiment? How exciting!\""
10024080-136 = "Wait... Is that like those cheese meatballs with the knife-cut noodles? I'm in!"
10024080-138 = "(I should warn them... But my duty is to protect President Rumi...!)"
10024080-139 = "(But Sensei and Saya helped us so much...!)"
10024080-140 = "(Aah, I don't know what to do! Spirit of kung fu, guide me...)"
10024080-146 = "Hmm... It won't be easy to get my hands on ten-thousand-year ginseng now."
10024080-147 = "How did those kids manage this? Or was it because that \"Sensei\" was there to help them?"
10024080-148 = "Little matter. I already gathered enough ginseng to finish my latest concoction."
10024080-149 = "Still, I'm disappointed that I didn't get to collect more data."
10024080-153 = "At least they're keeping me entertained."
10024080-154 = "Keh heh... I shall have to visit Shanhaijing myself next time. I look forward to meeting my underclassmen..."
10024080-155 = "...and this Sensei of theirs."
10024080-156 = "Sensei... Huh."
10024080-157 = "I'm actually excited to meet them. Keh heh..."

[translation]
10024080-1 = "ตอนที่ 8;ขจัดความชั่ว ผดุงความดี"
10024080-6 = "ย้ากก?!"
10024080-7 = "อึกก!?"
10024080-15 = "จัดการเรียบร้อยค่ะ"
10024080-16 = "แฮ่ก แฮ่ก... ยิงปืนได้แย่จริงๆ จะปกป้องตัวเองได้ไหมเธอน่ะ?"
10024080-17 = "ฉันก็รู้หรอกค่ะว่าคุณยิงปืนเก่ง แต่พละกำลังไม่เหลาะแหละไปหน่อยเหรอคะ?"
10024080-18 = "ฉันไม่อยากฟังคำพูดพวกนั้นจากพวกสมองกล้ามที่เอาแต่ดูหนังต่อสู้หรอกนะ!"
10024080-19 = "คุณนั่นแหละ นอกจากหนังมาเฟียแล้วรู้อะไรบ้างคะ?!"
10024080-20 = "[s] (อยากถามจังว่ามันต่างกันยังไง… แต่ฮึบไว้ก่อนดีกว่า)"
10024080-21 = "เยี่ยมเลย ทีนี้ก็คลี่คลายไปได้เรื่องหนึ่งแล้วละนะ"
10024080-22 = "เหมือนชมรมวิจัยศาสตร์การปรุงยามีเรื่องอยากถามเจ้าพวกนี้นะ เอายังไงดี?"
10024080-28 = "อะแฮ่ม งั้นขอถามเลยละกัน"
10024080-29 = "อยากถามข้อมูลของคู่ค้าที่พวกเธอซื้อขายโสมหมื่นปีด้วยน่ะ"
10024080-31 = "?!"
10024080-32 = "!?"
10024080-33 = "ฉันบอกไม่ได้หรอกนะ! ฉันไม่รู้เรื่อง!"
10024080-35 = "..."
10024080-36 = "ในโลกเรามันก็มีเรื่องที่รับรู้ได้เองโดยที่ไม่ต้องบอกอยู่หรอกนะ..."
10024080-37 = "<วานรแห่งสัมผัสทั้งห้า> คือชินทานิ ไคใช่ไหม?"
10024080-39 = "...!"
10024080-40 = "ระ... รู้ได้ยังไง...?"
10024080-42 = "เหอะ ดูจากท่าทางก็ได้คำตอบแล้วละ"
10024080-44 = "<วานรแห่งสัมผัสทั้งห้า> คือใครเหรอ?"
10024080-45 = "พวกฉันไม่เคยได้ยินชื่อนี้มาก่อนเลยค่ะ..."
10024080-46 = "เดี๋ยวก่อน เดี๋ยวๆๆ!"
10024080-47 = "<วานรแห่งสัมผัสทั้งห้า> คนนั้นคือชินทานิ ไคที่ฉันรู้จักใช่ไหม?"
10024080-48 = "หัวหน้าชมรมวิจัยศาสตร์การปรุงยาคนก่อนน่ะเหรอ...?"
10024080-50 = "โล่งอกไปทีแฮะที่เหมือนจะยังมีคนที่พอจะคุยรู้เรื่องอยู่บ้าง"
10024080-51 = "ใช่แล้ว เธอคืออดีตหัวหน้าชมรมวิจัยศาสตร์การปรุงยา เป็นหนึ่งในเจ็ดอาชญากร"
10024080-52 = "เธอเข้าไปยุ่งกับการลักลอบซื้อขายยาต้องห้ามจนถูกไล่ออกจากซานไห่จิงไป..."
10024080-53 = "[s] \"ถ้าเป็นเจ็ดอาชญากรละก็ หรือว่า...?\""
10024080-55 = "อ้อ จริงด้วย ได้ยินว่าเจ็ดอาชญากรแหกคุกออกมาได้ด้วยเหตุผลบางอย่าง"
10024080-56 = "หนึ่งในนั้นคือผู้อยู่เบื้องหลังเหตุการณ์ครั้งนี้สินะ..."
10024080-57 = "เรื่องมันใหญ่โตกว่าที่พวกเราคิดเอาไว้เสียอีกนะคะ"
10024080-59 = "เอาละ สารภาพมาซะ! พวกเธอทำการซื้อขายกับใคร ที่ไหน และมีอะไรบ้าง!"
10024080-61 = "พวกเราก็ไม่รู้รายละเอียดเหมือนกัน..."
10024080-62 = "พวกเราเป็นแค่องค์กรย่อย ทำหน้าที่ส่งโสมหมื่นปีตามจุดที่กำหนดแล้วรับค่าจ้างก็เท่านั้น"
10024080-63 = "(ไม่บอกตามจริงไปว่ารู้จักกับไคน่าจะดีกว่าเนอะ)"
10024080-64 = "(แน่อยู่แล้ว! ดูจากบรรยากาศแล้ว เราต้องเหยียบความจริงไว้ให้มิดเลย!)"
10024080-66 = "อึ่ก... เหมือนกำลังปกปิดอะไรบางอย่างอยู่เลย...!"
10024080-68 = "จากนี้ให้เป็นหน้าที่ของพวกฉันเอง"
10024080-69 = "ฉันจะเปิดโปงว่าพูดจริงหรือเปล่า โดยใช้ชื่อเสียงของมังกรดำเป็นประกัน!"
10024080-82 = "ชมรมวิจัยศาสตร์การปรุงยา... ก็มีอดีตที่ซับซ้อนเหมือนกันแฮะ"
10024080-83 = "ผู้คนในซานไห่จิงส่วนใหญ่แล้วต่างก็มีอดีตที่ยากจะแก้ไขค่ะ ขนาดย่านการค้าเทพเต่าดำของพวกเรา#nยังมีเลย..."
10024080-84 = "เอาละๆ เรย์โจว เราก็พอได้แล้วละ ตอนนี้ฝ่ายที่งานเข้าหนักน่าจะเป็นมังกรดำมากกว่านะ"
10024080-85 = "มังกรดำงั้นเหรอ?"
10024080-86 = "ไม่ใช่งั้นหรอกเหรอ? ไหนจะต้องจัดการเรื่องโสมหมื่นปี แล้วไปคิดบัญชีคนเบื้องบนของฝ่ายตัวเอง ทั้งยังต้องเปิดโปงองค์กรระดับล่างอีก..."
10024080-88 = "ระ... เรื่องนั้นฉันรู้อยู่แล้วน่า!"
10024080-89 = "[s] \"แล้วทีนี้มังกรดำจะเอายังไงกันต่อล่ะ?\""
10024080-90 = "อย่างแรกก็ต้องเก็บคืนโสมหมื่นปีทั้งหมดเท่าที่ทำได้กันก่อน"
10024080-91 = "แล้วก็... ให้พวกนั้นรับผิดชอบตามวิถีของ 'มังกรดำ' เดี๋ยวจะมีการสอบสวนอย่างต่อเนื่องรออยู่"
10024080-92 = "โทษของการทำให้ชื่อเสียงของมังกรดำด่างพร้อยน่ะ ไม่ใช่เบาๆ หรอกนะจะบอกให้ ฮุฮุฮุฮุฮุ..."
10024080-93 = "พอจะหัวเราะออกบ้างแล้วมันก็ดีอยู่หรอก แต่เหมือนคุณจะลืมอะไรไปอย่างหนึ่งนะคะ"
10024080-94 = "อึก?!"
10024080-95 = "ถ้าพิจารณาจากรายละเอียดทุกอย่างละก็ สุดท้ายมังกรดำก็คือหนึ่งในคนร้ายคนสำคัญของการซื้อขาย#nโสมหมื่นปี... ฉันวิเคราะห์เรื่องราวตามนี้ได้ใช่ไหมคะ?"
10024080-96 = "นะ... นี่มัน... มันเรื่องภายในของมังกรดำนะ..."
10024080-97 = "ย่านการค้าเทพเต่าดำไม่ได้อยากจะทราบธุระกงการของมังกรดำหรอกค่ะ"
10024080-99 = "แต่มังกรดำเองก็กล่าวหาว่าย่านการค้าเทพเต่าดำเป็นคนร้ายทันทีโดยไม่มีการไตร่ตรองอะไรเลยนี่คะ"
10024080-101 = "เดี๋ยวนะ เธออาจจะมองว่ามันเป็นแบบนั้น แต่ตอนนี้ไม่คิดว่าตัวเองพูดแรงไปหน่อยเหรอ?!"
10024080-102 = "สำหรับคำถามนั้น ฉันอยากเอาพฤติกรรมตอนย่านการค้าเทพเต่าดำไปเยือนมังกรดำมาเป็นคำตอบจัง#nเลยค่ะ"
10024080-103 = "ฟะ... ฟังกันก่อนสิ เราจะรับผิดชอบเหตุการณ์ครั้งนี้และเปิดเผยความจริงด้วยวิธีของมังกรดำแน่นอน เพราะงั้น...!"
10024080-104 = "จะใช้วิธีของมังกรดำหรือวิธีโบร่ำโบราณวิธีอื่นก็ตามสบายเถอะค่ะ"
10024080-105 = "ขอแค่คุณรู้เอาไว้ว่า สุดท้ายแล้วย่านการค้าเทพเต่าดำมีสิทธิ์เรียกร้องคำขอโทษจากมังกรดำก็พอค่ะ"
10024080-106 = "ระ... เรื่องนั้น... คือว่า..."
10024080-107 = "มันไม่ใช่ปัญหาที่จะตัดสินใจได้คนเดียวนะ! แต่ฉันคิดว่า... ฮึ่ย... การด่วนสรุปฝ่ายเดียว... มันเป็นเรื่องผิดก็จริง..."
10024080-109 = "ละ... หลังจากนี้ฉันจะไปขอโทษอย่างเป็นเรื่องเป็นราวให้เอง!"
10024080-115 = "หนีไปซะแล้วค่ะ...!"
10024080-116 = "ฮ่าฮ่าฮ่า ก็เล่นโดนเธอว่าไปซะแรงขนาดนั้นเลยนี่นา ส่วนใหญ่ก็เป็นแบบนี้แหละ"
10024080-117 = "ท่านประธานโอเคกับเรื่องนั้นเหรอคะ? สำหรับฉันอย่างน้อยก็ต้องเอาคืนให้สาสม..."
10024080-118 = "เอาเถอะๆ แค่ยืนยันความบริสุทธิ์ของเราก็พอแล้ว"
10024080-119 = "ยังไงซะพวกเราก็ต้องเจอมังกรดำไปตลอดอยู่แล้วนี่นะ"
10024080-120 = "รอให้เรื่องราวคลี่คลายลงก่อน ถึงตอนนั้นเราค่อยไปเรียกร้องสิทธิ์ของตัวเองก็ได้"
10024080-121 = "เอาละ เรากลับย่านการค้ากันก่อนเถอะ! ชมรมวิจัยศาสตร์การปรุงยาก็ทำงานหนักมากเลยนะ ขอบใจมากเลย"
10024080-122 = "พวกเราก็ต้องกลับแล้วเหมือนกัน มีของที่ต้องเตรียมเยอะเลย..."
10024080-123 = "กังวลไว้ก่อนล่วงหน้ามันก็ดีอยู่หรอกนะ แต่ก่อนอื่นเรามาฉลองกันก่อนเถอะ"
10024080-124 = "คุณครูก็ทำงานหนักเหมือนกันนะ ขอบคุณมากเลย"
10024080-125 = "[s] \"ครูแค่ทำในสิ่งที่ควรทำน่ะ\""
10024080-126 = "อย่าถ่อมตัวขนาดนั้นสิ เดี๋ยวพอกลับไป... จริงสิ ฉันจะตอบแทนทุกคนด้วยการเลี้ยงอาหารที่กำลัง#nทดลองอยู่ให้เองนะ!"
10024080-127 = "คะ?! ตอบแทนอะไรกันคะ...! ไม่ค่ะ ไม่ต้องหรอกค่ะ ฉันเกือบพูดเรื่องอะไรที่ไม่ควรพูดออกไปด้วย"
10024080-129 = "(แต่ว่าส่วนใหญ่แล้วอาหารที่ท่านประธานกำลังทดลองใหม่... รสชาติมัน...)"
10024080-130 = "(จะบอกว่ารสชาติมัน... แปลกพิสดารหรือยากเกินจะบรรยายดีละเนี่ย หรือต้องบอกว่ามันแฝงไปด้วย#nจิตวิญญาณแห่งการทดลองแบบสุดขีด...)"
10024080-135 = "[ns] \"เมนูใหม่ของย่านการค้าเทพเต่าดำเหรอ อยากลองกินจังเลย\""
10024080-136 = "ถ้าเป็นเมนูใหม่... จะเหมือนกับเส้นตาเซียวเมี่ยนผัดราดด้วยหนานเจียนหวานจื่อชีสรอบก่อนหรือเปล่า?! ถ้าเป็นเมนูนั้นฉันยินดีเสมอเลย!"
10024080-138 = "(ควรบอกความจริงทั้งสองคนนี้ไหมนะ...! แต่เราก็ต้องปกป้องท่านประธานรูมินี่นา...!)"
10024080-139 = "(แต่ว่าคุณครูกับท่านซายะก็เป็นผู้มีพระคุณของย่านการค้าเทพเต่าดำเหมือนกัน...!)"
10024080-140 = "(อ่า... ทำยังไงดีคะเนี่ย ใครก็ได้ช่วยชี้ทางสว่างให้ที...)"
10024080-146 = "อืม... โสมหมื่นปีถูกห้ามส่งออกอย่างนั้นเหรอ"
10024080-147 = "เด็กพวกนั้น... เกินความคาดหมายจริงๆ แฮะ นี่เป็นเพราะพวกเธออยู่กับ 'ครู' จากชาเล่ต์หรือเปล่า"
10024080-148 = "ช่างเถอะ ยังไงฉันก็ทดลองยาตัวใหม่ที่ใช้โสมหมื่นปีเสร็จเกือบหมดแล้ว"
10024080-149 = "แต่อดเสียดายไม่ได้จริงๆ ที่ยังเก็บข้อมูลการรักษาด้วยโสมได้ไม่มากพอ"
10024080-153 = "ไม่เลวเลยนี่ ทำให้ฉันสนุกขึ้นมาเลยละ"
10024080-154 = "คึคึ คราวหน้าคงต้องกลับซานไห่จิงและถือโอกาสไปทักทายรุ่นน้องด้วยตัวเองซะแล้ว"
10024080-155 = "จะได้วางแผนเจอ 'ครู' ด้วย"
10024080-156 = "ครู... ครูคนนั้น..."
10024080-157 = "นานๆ ทีจะรู้สึกคาดหวังกับการได้เจอใครเหมือนกันนะ คึคึ"

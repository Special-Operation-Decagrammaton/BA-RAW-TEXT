[translation]
10024080-1 = "第8話;破邪顯正：彰顯正道"
10024080-6 = "唔！？"
10024080-7 = "呃啊！？"
10024080-15 = "瑠美會長，已壓制完畢。"
10024080-16 = "哈啊，哈啊……射擊技術真是一塌糊塗。#n你的槍都在哭了哦？"
10024080-17 = "你還敢說，真虧你體力那麼差還能當上執行部長啊。"
10024080-18 = "我可不想被只看功夫電影的肌肉腦這麼說！"
10024080-19 = "你還不是只會看黑手黨電影！"
10024080-20 = "[s]（插嘴的話好像會很麻煩……）"
10024080-21 = "很好。這樣事情就告一段落了吧。"
10024080-22 = "沙耶，你剛才是不是說有事想問？"
10024080-28 = "啊，我都差點忘了。"
10024080-29 = "你們是按照誰的指示行動？"
10024080-31 = "！？"
10024080-32 = "！？"
10024080-33 = "不，不知道！#n是真的，我什麼都不知道！！"
10024080-35 = "……"
10024080-36 = "不，就算你們不說我也知道……"
10024080-37 = "是「五塵的獼猴」──申谷誡對吧？"
10024080-39 = "……！"
10024080-40 = "聽，聽不懂你在說什麼……！"
10024080-42 = "你那個反應，就跟在說答對了沒兩樣。"
10024080-44 = "到底是誰？那個「五塵的獼猴」。"
10024080-45 = "我也是第一次聽見。"
10024080-46 = "先，先先先等一下！"
10024080-47 = "「五塵的獼猴」！？"
10024080-48 = "是曾經擔任鍊丹術研究會會長的……那個申谷誡？"
10024080-50 = "幸好還有人知道。"
10024080-51 = "沒錯，就是鍊丹術研究會的前會長──「七罪人」之中的一人。"
10024080-52 = "由於涉嫌參與密藥的走私，被永久逐出了山海經。"
10024080-53 = "[s]「既然是七罪人就代表……」"
10024080-55 = "嗯……他們七人都成功越獄了。"
10024080-56 = "沒想到其中的一人會是這次事件的幕後黑手啊。"
10024080-57 = "看來事件的規模比我們想像中還要龐大。"
10024080-59 = "好了，快從實招來！#n你們和申谷誡做了什麼交易！"
10024080-61 = "……我們也不清楚詳細情況。"
10024080-62 = "我們只是車手罷了。#n把「萬年蔘」送到指定場所，收取報酬而已。"
10024080-63 = "（把誡小姐的事情說出來會很不妙吧？）"
10024080-64 = "（那還用說嗎！不想辦法瞞住的話，我們的安危就……）"
10024080-66 = "唔唔……這些傢伙絕對還知道些什麼……！"
10024080-68 = "接下來就交給我吧。"
10024080-69 = "你們說的話究竟是真是假，我會以玄龍門之名查個水落石出！"
10024080-82 = "鍊丹術研究會……似乎也有一段複雜的過去呢。"
10024080-83 = "……畢竟山海經的團體，大多都是如此。#n就連我們玄武商會也不例外……"
10024080-84 = "這個話題還是之後再說吧，令女。#n接下來有大麻煩的人，現在可就在我們面前啊。"
10024080-85 = "……你指的是玄龍門嗎？"
10024080-86 = "咦，難道不是嗎？#n要是被大家知道「萬年蔘」的走私是玄龍門的內部問題，會引起大騷動的吧。#n參與其中的人究竟有多少，之後也必須要調查才行……"
10024080-88 = "這，這種事不用你說我也知道！"
10024080-89 = "[s]「接下來打算怎麼做？」"
10024080-90 = "首先必須盡速回收「萬年蔘」。"
10024080-91 = "結束之後，要以「玄龍門」的方式追究責任。#n他們究竟能不能承受無止盡的審問呢……"
10024080-92 = "玷汙玄龍門之名的罪可不輕啊……呵呵呵。"
10024080-93 = "你是不是還有什麼話忘記說了？"
10024080-94 = "唔！？"
10024080-95 = "到頭來，「萬年蔘」的走私犯是玄龍門的成員……"
10024080-96 = "那，那個是……玄龍門內部也有各種情況……"
10024080-97 = "玄龍門的內情與玄武商會無關。"
10024080-99 = "怎麼？難道你想說那不在你的管轄範圍內所以與你無關嗎？#n起初完全不聽我們解釋的可是玄龍門啊。"
10024080-101 = "呃，那個……或許是這樣沒錯，不過你也不必說得那麼過分吧！？"
10024080-102 = "我們造訪玄龍門的時候是被如何對待的，可別說你忘記了哦？"
10024080-103 = "聽，聽我說。#n這件事玄龍門會負責查明真相……！"
10024080-104 = "玄龍門的責任什麼的，對我們來說根本無關緊要。"
10024080-105 = "但是你們先前對玄武商會的不當對待，我們可不會忘記。#n還是說，你願意在此謝罪呢？"
10024080-106 = "這，這……"
10024080-107 = "這不是我可以獨自決定的問題！#n不過對於擅自認定這件事我感到抱歉！讓我找個場合向你們道歉吧！"
10024080-109 = "之，之後我會做好準備的……在那之前先等等吧！"
10024080-115 = "逃走了……！#n那才不算是道歉！"
10024080-116 = "啊哈哈……不過太緊迫逼人也不太好。"
10024080-117 = "會長可以接受嗎？#n才明白是自己的責任就……"
10024080-118 = "算了算了。#n能證明我們的清白就夠了。"
10024080-119 = "反正之後總是要去玄龍門一趟的。"
10024080-120 = "如果能好好利用的話，說不定未來的買賣也會更順利。"
10024080-121 = "沙耶，你能來真是幫大忙了。謝謝你。"
10024080-122 = "平時總是讓你招待，這點小事不算掛齒！#n不過，我也得趕緊回去制定各種對策……"
10024080-123 = "我能明白你未雨綢繆的心情，不過還是先回去慶祝一下吧。"
10024080-124 = "也謝謝老師，辛苦了。"
10024080-125 = "[s]「瑠美也是，辛苦了。」"
10024080-126 = "呵呵，謝謝你。#n對了，回去之後我請你吃新的試作品當謝禮吧！"
10024080-127 = "什麼！？#n那哪能算是謝……沒有，我什麼都沒說！"
10024080-129 = "（會長的試作品……）"
10024080-130 = "（味道總是令人難以言喻……）"
10024080-135 = "[ns]「真想趕快吃到瑠美的料理！」"
10024080-136 = "新菜色……！是類似起司南煎丸子刀削麵那種嗎！？#n光是回想一下肚子就餓了！！"
10024080-138 = "（果然應該在這裡告訴兩位真相嗎……！#n　但是，要我對瑠美會長的料理口出惡言實在……！）"
10024080-139 = "（可是也不能讓玄武商會的恩人嘗到那種料理……！）"
10024080-140 = "（嗚嗚，我究竟該如何是好……）"
10024080-146 = "是嗎……沒想到「萬年蔘」的走私已經被發現了啊。"
10024080-147 = "那些孩子們……咯咯，似乎有所成長，作為前輩真是萬分高興。#n不，還是該說是多虧了夏萊的「老師」的力量呢。"
10024080-148 = "不過很遺憾，他們晚了一步。#n新藥的實驗正好已經結束了。"
10024080-149 = "硬要說的話，我倒是希望能多收集一些實驗數據……"
10024080-153 = "算了，無所謂。這也不失為一種樂趣。"
10024080-154 = "咯咯，下次去見那些孩子的時候，順便去山海經打聲「招呼」吧。"
10024080-155 = "此外，與「老師」的相遇會產生什麼樣的化學變化，也相當令人在意呢。"
10024080-156 = "老師，老師啊……"
10024080-157 = "如此雀躍的心情，究竟時隔多久了呢──咯咯。"

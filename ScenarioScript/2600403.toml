[translation]
2600403-1 = "I've Got a Secret"
2600403-2 = "And this book goes over here... Heehee. I'm almost done categorizing."
2600403-4 = "Oh. Hi, Sensei! What are you doing here at this hour?"
2600403-5 = "Oh! Wasn't I raising my voice? Don't worry—we're past closing time."
2600403-6 = "You and I are the only ones here."
2600403-7 = "That's right, I spend a lot of time here after hours. Someone has to organize the books, after all."
2600403-8 = "And besides..."
2600403-9 = "I spend so much of my day helping others that I don't get any time to read for myself."
2600403-10 = "Now is usually when I get in some quality reading time!"
2600403-11 = "So I'm practically at the library 24 hours a day."
2600403-12 = "Anyway... That text I sent you wasn't supposed to be serious. I'm surprised you came here so late."
2600403-13 = "Do you still have work to do?"
2600403-14 = "[s1] \"I can do it here if that's all right.\"\n[s2] \"I was actually looking for some company while I work.\""
2600403-15 = "Ahaha..."
2600403-16 = "Ahaha..."
2600403-17 = "Well, suit yourself. Wait here for a little bit. I'll set up a study space for you."
2600403-18 = "Oh, don't worry. I'm a pro when it comes to pulling all-nighters."
2600403-19 = "I'll even put on a pot of coffee for you. I hope you don't mind drinking it with a straw and lid, though."
2600403-20 = "I'll put this cushion in the back of the seat and place this pillow right here..."
2600403-22 = "Shimiko spent some time arranging the chair and desk, making them look cozier than ever."
2600403-23 = "Ta-da! What do you think? I set it up just the way I like it!"
2600403-24 = "You can stay up all night without feeling the least bit tired in this arrangement!"
2600403-25 = "[s3] \"It looks so comfortable I might just fall asleep.\"\n[s4] \"Something about it reminds me of you.\""
2600403-26 = "Sensei... There you go saying embarrassing things like that again!"
2600403-27 = "Sensei... There you go saying embarrassing things like that again!"
2600403-28 = "Come and sit here. I'll take the seat next to you, so just let me know if you need anything!"
2600403-30 = "Shimiko and I sat by side, focusing on the papers in front of us until the wee hours of the night."
2600403-31 = "The library is even quieter at night. All I can hear is the sound of pages turning..."
2600403-32 = "...along with Shimiko's breath and the sound of her lightly touching her hair."
2600403-33 = "I lost track of the hours as we each worked late into the night."
2600403-35 = "..."
2600403-36 = "(When I looked up, I saw Shimiko staring at me.)"
2600403-37 = "[s] \"...? Shimiko?\""
2600403-38 = "...Huh? Oh, I'm sorry. I didn't mean to stare. Was I bothering you?"
2600403-39 = "I-I just wanted to make sure you're comfortable and see if you needed anything..."
2600403-40 = "It also dawned on me that I invited you here and all we've done is read and work."
2600403-41 = "I know we've both been so immersed in what we're reading."
2600403-42 = "Just knowing that we're in the same space together feels so..."
2600403-43 = "It's a pleasant feeling, but..."
2600403-44 = "...conversely, I can't help but feel a little selfish."
2600403-45 = "I'm enjoying myself, but I never asked you whether this is how you like to spend an evening."
2600403-46 = "It feels as though...I was being inconsiderate by forcing you into something I like."
2600403-47 = "Was that...childish of me...?"
2600403-48 = "Perhaps I've been immature this entire time without realizing it."
2600403-49 = "Or maybe it's my imagination. I dunno. Ahaha..."
2600403-50 = "[s5] \"It's all right. It's not like I mind.\"\n[s6] \"I'm your teacher. I'm supposed to indulge you.\""
2600403-51 = "...!"
2600403-52 = "...!"
2600403-53 = "Ugh. You didn't even deny that I was acting like a child. Now I'm all embarrassed."
2600403-54 = "...Heehee."
2600403-55 = "I can accept that. There's no point in denying me being childish sometimes."
2600403-56 = "As long as you promise to keep it a secret, okay?"
2600403-57 = "And I won't tell anyone you were getting your work done here instead of your office."
2600403-58 = "...Besides, this time of night is perfect for keeping secrets."
2600403-59 = "So thank you for keeping me company, Sensei."
2600403-60 = "If it's all right with you..."
2600403-61 = "..."
2600403-62 = "...I hope you'll indulge my childishness more often."
2600403-64 = "I sat and read with Shimiko late into the night, even after I had finished my work."

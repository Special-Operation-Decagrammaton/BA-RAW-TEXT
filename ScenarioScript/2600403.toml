[translation]
2600403-1 = "#title;비밀이 생겼어요"
2600403-2 = "4;시미코;01;이 책은 여기에 두고…… 후후. 거의 정리도 끝나가는군요……\n#4;a\n#4;greeting"
2600403-3 = "4;시미코;02\n#4;em;[반응]\n#wait;1000"
2600403-4 = "4;시미코;03;……어? 아, 안녕하세요, 선생님! 이런 시간에 어쩐 일이세요?\n#4;em;[반짝]\n#4;jump"
2600403-5 = "4;시미코;01;아, 목소리가 좀 큰 가요? 후훗. 괜찮아요, 어차피 지금은 폐관 시간도 지났으니까요."
2600403-6 = "4;시미코;01;지금 이 도서관에 있는 사람은 선생님과 저뿐이랍니다.\n#4;m3"
2600403-7 = "4;시미코;02;저요? 아, 저는 폐관 이후에도 거의 대부분 여기서 시간을 보내요. 뒷정리도 해야 하고요.\n#4;em;[반응]"
2600403-8 = "4;시미코;99;그리고……"
2600403-9 = "4;시미코;01;……후훗. 낮에는 다른 분들을 봐 드려야 하니, 정작 제가 책 읽을 시간이 별로 없더라고요."
2600403-10 = "4;시미코;03;그러니 다들 퇴장하시고 난 지금부터가, 오히려 저에게는 책을 읽을 수 있는 시간인 거죠!\n#4;em;[음표]"
2600403-11 = "4;시미코;02;그래서 이 도서관은 24시간 내내 불이 켜져 있는 거예요."
2600403-12 = "4;시미코;01;……그나저나 반쯤 농담으로 보낸 톡이었는데, 정말로 와주셨네요. 이 늦은 시간에."
2600403-13 = "4;시미코;02;역시 선생님도 야근? 아직 일이 끝나지 않으신 건가요?\n#4;em;[?]"
2600403-14 = "[s1] \"가끔은 여기서 하는 것도 괜찮겠지.\"\n[s2] \"새벽반 동지를 찾아 헤매고 있었어.\""
2600403-15 = "4;시미코;99;아하하…… \n#4;em;[땀]"
2600403-16 = "4;시미코;99;아하하…… \n#4;em;[땀]"
2600403-17 = "4;시미코;01;잘 됐네요. 그럼 여기서 잠시만 기다려주시겠어요? 자리 세팅부터 해드리고……"
2600403-18 = "4;시미코;02;아, 걱정하지 마세요. '책상에 오래 앉기 좋은 세팅'은 제가 또 전문가니까요.\n#4;em;[반응]"
2600403-19 = "4;시미코;03;맡겨만 주세요! 커피도 같이 세팅해 드릴 게요! 물론 뚜껑 닫고, 빨대도 꽂아서요.\n#4;greeting"
2600403-20 = "4;시미코;01;여기 등받이에 이 쿠션을 넣고, 여기에 방석을 이 모양으로 깔아서……\n#4;m2"
2600403-21 = "4;시미코;01\n#4;d\n#4;greeting\n#wait;1000"
2600403-22 = "#4;hide\n#na;(잠시간 시미코가 의자와 책상에 손을 대자, 척 봐도 정말 편해 보이는 좌석이 세팅 되었다.)"
2600403-23 = "3;시미코;03;쨘-! 어때요? 평소 제가 좋아하는 방식으로 선생님 의자도 세팅해 보았답니다.\n#3;jump\n#3;em;[반응]\n#3;a"
2600403-24 = "3;시미코;01;이 세팅이라면 밤 새 앉아있어도 어느 곳 하나 결리지 않을 거예요!"
2600403-25 = "[s3] \"너무 편해서 일하다 잠들겠는데.\"\n[s4] \"취향이 듬뿍 들어간 디자인들이네.\""
2600403-26 = "3;시미코;04;우움. 선생님, 또 그런 말씀을~.\n#3;stiff"
2600403-27 = "3;시미코;04;우움. 선생님, 또 그런 말씀을~.\n#3;stiff"
2600403-28 = "3;시미코;01;아무튼 여기 앉아서 하세요. 전 옆자리에 앉을 테니, 필요한 게 있으시면 말씀해주세요!\n#3;em;[반짝]"
2600403-29 = "#all;hide"
2600403-30 = "#na;(이후로 시미코와 나란히 앉아, 밤 늦은 시간까지 각자 눈앞의 종이들에 집중했다.)"
2600403-31 = "#na;(밤중의 도서관은 평소보다 더 조용했다. 귓가에 들리는 것이라곤 종이 넘어가는 소리……)"
2600403-32 = "#na;(그리고 간간히 들리는 시미코의 숨소리, 머릿결 정리하는 소리뿐이었다.)"
2600403-33 = "#na;(……이후로 또 얼마나 정신없이 밀린 업무를 처리하고 있었을까.)"
2600403-34 = "3;시미코;01\n#3;h\n#3;closeup"
2600403-35 = "3;시미코;01;……\n#3;em;…\n#3;closeup"
2600403-36 = "#na;(어느덧 정신을 차리고 보니, 옆에서 책을 읽고 있던 시미코가 빤히 쳐다보고 있었다.)"
2600403-37 = "[s] \"……? 시미코?\""
2600403-38 = "3;시미코;04;……음? 아, 죄송해요. 너무 빤히 보고 있었죠. 혹시 방해됐나요?\n#3;em;[반응]\n#3;stiff"
2600403-39 = "3;시미코;04;그, 그냥 선생님께서도 지금 괜찮으신지…… 혹 불편하신 건 아닌가 싶어서 확인해봤어요."
2600403-40 = "3;시미코;01;생각해보니 기껏 초대해 놓고 말없이 서로 책만 보고 있다는 느낌이 좀 들더라고요."
2600403-41 = "3;시미코;99;조용히, 나란히 앉아서 서로의 책장 넘어가는 소리에도 집중되는 분위기……"
2600403-42 = "3;시미코;99;그저 같은 공간에 있을 뿐이지만 그 자체만으로도 뭐랄까…… 이 상황 자체가 너무……\n#3;em;…"
2600403-43 = "3;시미코;02;물론 저는 정말로 좋아해요, 이런 느낌. 저는 좋아하지만……\n#3;em;[반응]"
2600403-44 = "3;시미코;04;그렇지만…… 한편으로는 동시에 이래도 되나……? 하는 느낌이 들어서요."
2600403-45 = "3;시미코;04;선생님께서도 이런 걸 좋아하시는지는…… 사실 여쭤보지 않았었잖아요?\n#3;em;[땀]"
2600403-46 = "3;시미코;99;따지고 보면 뭐라고 해야 하나…… 순전히 제 취향의 상황을 선생님께 강요한 거니……"
2600403-47 = "3;시미코;04;……어리광……?\n#3;stiff"
2600403-48 = "3;시미코;04;혹시 저도 모르는 새 어리광을 피우고 있던 건 아닐까……"
2600403-49 = "3;시미코;03;……왠지 모르게 그런 생각이 들었어요. 아하하……\n#3;em;[재잘]"
2600403-50 = "[s5] \"괜찮아. 이런 거 싫어하지 않거든.\"\n[s6] \"선생님이잖아. 조금은 그래도 되지.\""
2600403-51 = "3;시미코;04;……!\n#3;stiff"
2600403-52 = "3;시미코;04;……!\n#3;stiff"
2600403-53 = "3;시미코;04;으음…… 어리광이라는 걸 부정해주진 않으시네요. 왠지 좀 부끄러워지는 걸요.\n#3;em;[///]"
2600403-54 = "3;시미코;99;……후후훗."
2600403-55 = "3;시미코;01;뭐어-. 괜찮아요. 어리광이라고 생각하신대도 어쩔 수 없어요. 사실은 사실이니까요."
2600403-56 = "3;시미코;02;대신 다른 사람들에게는 비밀로 해주세요. 알겠죠?"
2600403-57 = "3;시미코;01;저도 선생님께서 자기 업무공간 내버려두고 여기로 오신다는 건 비밀로 해드릴 테니까요.\n#3;greeting"
2600403-58 = "3;시미코;99;……마침 늦은 밤이니, 사소한 비밀 한두 개 정도 만들긴 딱 좋은 시간대이기도 하네요.\n#3;em;…"
2600403-59 = "3;시미코;01;……고맙습니다, 선생님. 이런 일에 어울려 주셔서."
2600403-60 = "3;시미코;02;선생님만 괜찮으시다면……"
2600403-61 = "3;시미코;03;……"
2600403-62 = "3;시미코;01;앞으로도 종종 이런 어리광, 받아 주셨으면 해요.\n#3;em;[///]"
2600403-63 = "#all;hide"
2600403-64 = "#na;(이후 업무가 끝난 뒤에도, 계속해서 늦은 시간까지 시미코와 함께 이런저런 책을 나눠보았다.)"

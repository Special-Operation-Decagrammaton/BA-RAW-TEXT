[translation]
2600403-1 = "มีความลับแล้วค่ะ"
2600403-2 = "เล่มนี้เอาไว้ตรงนี้... ฮุฮุ ทีนี้ก็ใกล้เสร็จแล้วละ..."
2600403-4 = "...อ้าว? สวัสดีค่ะคุณครู! มาทำอะไรเวลานี้เหรอคะ?"
2600403-5 = "อ๊ะ ฉันเสียงดังไปหรือเปล่าคะเนี่ย? ฮุฮุ แต่ก็ไม่เป็นไรหรอกค่ะ ตอนนี้เลยเวลาปิดห้องสมุด#nไปแล้วน่ะค่ะ"
2600403-6 = "คนที่อยู่ที่นี่ตอนนี้น่าจะมีแค่ฉันกับคุณครูเท่านั้น"
2600403-7 = "ฉันเหรอคะ? หลังจากปิดห้องสมุดแล้ว ส่วนมากฉันก็ยังอยู่ที่นี่ต่อค่ะ เพราะบางทีต้องจัดการ#nนู่นนี่ให้เสร็จด้วย"
2600403-8 = "อีกอย่าง..."
2600403-9 = "ฮุฮุ... ตอนกลางวันฉันต้องทำงานบรรณารักษ์ ก็เลยไม่มีเวลาอ่านหนังสือน่ะค่ะ"
2600403-10 = "ตอนที่ทุกคนกลับไปแล้วจึงเป็นเวลาอ่านหนังสือของฉันค่ะ!"
2600403-11 = "และนี่เป็นสาเหตุที่ห้องสมุดนี้เปิดไฟ 24 ชั่วโมงยังไงล่ะคะ"
2600403-12 = "จะว่าไป... ฉันส่งข้อความไปขำๆ เท่านั้น ไม่คิดว่าคุณครูจะมาที่นี่จริงๆ ในเวลาดึกดื่นแบบนี้"
2600403-13 = "หรือว่าคุณครูต้องทำงานจนดึกดื่นด้วยคะ? งานยังไม่เสร็จเหรอคะ?"
2600403-14 = "[s1] \"มาทำที่ห้องสมุดบ้างก็ไม่เลวนะ\"\n[s2] \"กำลังหาเพื่อนในระหว่างทำงานกลางดึกอยู่น่ะ\""
2600403-15 = "อ่ะฮ่ะฮ่า..."
2600403-16 = "อ่ะฮ่ะฮ่า..."
2600403-17 = "ดีเลยค่ะ งั้นคุณครูช่วยรออยู่ตรงนี้เดี๋ยวเดียวนะคะ ฉันจะไปจัดโต๊ะให้ค่ะ"
2600403-18 = "ไม่ต้องกังวลไปนะคะ ฉันเป็นผู้เชี่ยวชาญในการนั่งยาวๆ ตอนกลางคืนเลยละ ฉันหาที่นั่งดีๆ ให้ได้แน่ค่ะ"
2600403-19 = "เชื่อใจฉันได้เลย! เดี๋ยวจะไปเอากาแฟมาให้ด้วยค่ะ แน่นอนว่าต้องปิดฝาและดูดจากหลอด#nเท่านั้นนะคะ"
2600403-20 = "ต้องเอาเบาะรองหลังมาวางไว้แบบนี้... ส่วนตรงนี้ก็ต้องวางเบาะรองนั่ง..."
2600403-22 = "(ชิมิโกะจัดโต๊ะและที่นั่งให้ แค่ดูด้วยตาก็รู้แล้วว่ามันจะต้องนั่งสบายและผ่อนคลาย)"
2600403-23 = "เสร็จแล้ว! เป็นยังไงบ้างคะ? ฉันจัดเก้าอี้ให้คุณครูในแบบที่ฉันชอบเลยละ"
2600403-24 = "ถ้ามีเบาะนุ่มๆ แบบนี้ ต่อให้นั่งทั้งคืนก็ไม่ปวดตัวค่ะ!"
2600403-25 = "[s3] \"ดูนั่งสบายจนอาจจะเผลอหลับได้เลยนะ\"\n[s4] \"เป็นการจัดที่นั่งที่มีรสนิยมมากเลย\""
2600403-26 = "งือ คุณครู ถ้าจะชมกันแบบนี้~"
2600403-27 = "งือ คุณครู ถ้าจะชมกันแบบนี้~"
2600403-28 = "งั้นก็นั่งทำงานตรงนี้เลยค่ะ ฉันจะนั่งอยู่ข้างๆ ถ้าต้องการอะไรก็เรียกได้เลยนะคะ"
2600403-30 = "(คุณครูนั่งทำงานข้างๆ ชิมิโกะ ต่างคนต่างสนใจกับกระดาษที่อยู่ตรงหน้าจนถึงดึกดื่น)"
2600403-31 = "(ห้องสมุดในตอนกลางคืนเงียบสงบกว่าปกติมาก เสียงที่ได้ยินส่วนใหญ่คือเสียงเปิดหน้าหนังสือ...)"
2600403-32 = "(บางครั้งก็ได้ยินเสียงหายใจของชิมิโกะ รวมถึงเสียงที่เธอจับผมตัวเองเล่นอย่างไม่รู้ตัว)"
2600403-33 = "(...ทำงานต่อทั้งคืนจนลืมเวลา)"
2600403-35 = "......"
2600403-36 = "(พอรู้ตัวอีกทีก็เห็นชิมิโกะที่นั่งอ่านหนังสืออยู่ข้างๆ นั่งจ้องอยู่ตาเป็นมัน)"
2600403-37 = "[s] \"...? ชิมิโกะ?\""
2600403-38 = "อ๊ะ! ขอโทษค่ะ ฉันเนี่ย เอาแต่จ้องคุณครูอยู่ได้ นี่ฉันรบกวนคุณครูหรือเปล่าคะ?"
2600403-39 = "ฉะ... ฉันก็แค่อยากรู้ว่าตอนนี้คุณครูโอเคมั้ย... ง่วงนอนหรือนั่งจนปวดเนื้อเมื่อยตัวหรือเปล่า..."
2600403-40 = "มาคิดอีกที เป็นฉันเองที่ชวนคุณครูมาที่นี่ แต่พอมาแล้วต่างคนก็ต่างเอาแต่อ่านหนังสือ#nหรือทำงานของตัวเอง..."
2600403-41 = "แต่พอได้นั่งข้างกัน เราก็มีสมาธิจนขนาดที่ได้ยินเสียงพลิกหน้าหนังสือก็ยังอ่านต่อได้..."
2600403-42 = "สถานการณ์นี้มัน... อธิบายยังไงดีนะ... แค่ได้รู้ว่าเราได้อยู่ที่เดียวกัน... มันก็..."
2600403-43 = "จริงๆ ฉันชอบบรรยากาศแบบนี้มากเลยนะคะ ฉันน่ะชอบมากเลย..."
2600403-44 = "แต่อีกใจหนึ่งก็คิดว่า... ทำแบบนี้มันดีหรือเปล่านะ?"
2600403-45 = "ก็ฉันยังไม่ได้ถามคุณครูเลยนี่คะ ว่าคุณครูเองก็ชอบบรรยากาศแบบนี้เหมือนฉันหรือเปล่า?"
2600403-46 = "จู่ๆ ฉันก็คิดว่าฉันพยายามบังคับให้คุณครูทำในแบบที่ฉันชอบเกินไปหรือเปล่า..."
2600403-47 = "ทำแบบนี้มันเหมือนเด็กมากไปมั้ยคะ…?"
2600403-48 = "ฉันอาจจะทำตัวเหมือนเด็กโดยไม่ได้ตั้งใจก็ได้ค่ะ..."
2600403-49 = "หรือว่าฉันจะคิดมากไปเองนะ... แหะๆ"
2600403-50 = "[s5] \"ไม่ต้องห่วง ครูไม่ได้ไม่ชอบอะไรแบบนี้หรอก\"\n[s6] \"ครูเป็นครูนะ ต้องทำให้นักเรียนพอใจสิ\""
2600403-51 = "......!"
2600403-52 = "......!"
2600403-53 = "อืม... ไม่ปฏิเสธที่ฉันดูเหมือนเด็กสินะคะ... น่าอายจังเลย..."
2600403-54 = "...ฮุฮุฮุ"
2600403-55 = "แต่ก็ไม่เป็นไรหรอกค่ะ ช่วยไม่ได้นี่นาถ้าคุณครูจะคิดว่าฉันทำตัวเอาแต่ใจเหมือนกับเด็ก#nเพราะบางครั้งฉันก็ทำอย่างนั้นจริงๆ นี่คะ"
2600403-56 = "แต่ว่าเรื่องนี้ห้ามไปบอกกับใครนะคะ รู้กันแค่นี้พอนะ!"
2600403-57 = "ฉันก็จะไม่บอกใครเหมือนกันค่ะ ว่าคุณครูออกมาจากห้องทำงานแล้วมาห้องสมุดในเวลานี้"
2600403-58 = "กลางดึกแบบนี้มันช่างเหมาะกับการสร้างความลับจังเลย ว่ามั้ยคะ?"
2600403-59 = "ขอบคุณนะคะคุณครู ขอบคุณที่มาอยู่เป็นเพื่อนฉันนะคะ"
2600403-60 = "ถ้าคุณครูไม่ติดอะไรละก็..."
2600403-61 = "......"
2600403-62 = "ไว้วันหลังมาอ่านหนังสือกับเด็กคนนี้อีกนะคะ"
2600403-64 = "(จากนั้นคุณครูก็ทำงานของตัวเองจนเสร็จ และอยู่อ่านหนังสือต่อกับชิมิโกะ)"

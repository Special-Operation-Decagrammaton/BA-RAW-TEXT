[translation]
22090-1 = "ตอนที่ 9;ความจริงอันน่าโหดร้าย 1"
22090-7 = "[ns] \"สึคัตสึกิ ริโอะ...?\""
22090-8 = "คุณครูคะ... คนคนนั้น... คือประธานของโรงเรียนมิลเลเนียมค่ะ"
22090-9 = "ทะ... ทำไมประธานถึง... ถึง... มาอยู่ที่นี่ได้..."
22090-10 = "......"
22090-12 = "ใช่ ฉันคือหัวเรือใหญ่ของเซมิน่า หรือศูนย์กลางโรงเรียนวิทย์มิลเลเนียม"
22090-13 = "ผู้ไล่ตามดวงดาวที่หวังให้ <ปัญหาพันปี> คลี่คลาย"
22090-14 = "อันที่จริงฉันควรจะได้เจอกับครูจากชาเล่ต์และทักทายอย่างเป็นกิจจะลักษณะกันก่อน"
22090-15 = "แต่เอาไว้โอกาสหน้าก็แล้วกัน วันนี้ฉันมาด้วยธุระอื่นน่ะ"
22090-16 = "[s] \"ว่าแต่ เห็นว่ามีความจริงบางอย่างจะบอกครูเหรอ...\""
22090-17 = "ใช่ ความจริง"
22090-18 = "จาก <เหตุการณ์> ที่เกิดขึ้นเมื่อไม่กี่วันก่อน คุณและนักเรียนชมรมพัฒนาเกมที่อยู่ที่นั่นคงมีความคิด#nอย่างเดียวกัน"
22090-19 = "เด็กที่คิดว่าเป็นเพื่อนมาตลอด จู่ๆ ก็มีท่าทีที่คาดไม่ถึง... และนำมาซึ่งความเสียหายและความสับสน"
22090-20 = "ถ้าได้เจอเรื่องแบบนั้นมา ไม่ว่าใครก็ต้องคิดว่า..."
22090-25 = "<เด็กที่ผ่านมาที่คิดว่าเป็นเพื่อนมาตลอด ไม่น่าจะทำเรื่องแบบนั้นได้> ..."
22090-26 = "ใช่ไหมล่ะ ครูจากชาเล่ต์?"
22090-27 = "......!!"
22090-31 = "[ns] \"เดี๋ยวสิ ริโอะ นะ... นี่เธอหมายความว่ายังไง...\""
22090-32 = "ฉันจะพูดตรงๆ เลยก็แล้วกัน"
22090-35 = "เด็กสาวคนนั้นที่อยู่ข้างหลังคุณ..."
22090-36 = "ไม่สิ <สิ่งนั้น> ที่ได้รูปลักษณ์ของเด็กผู้หญิงมา ไม่ใช่นักเรียนธรรมดาอย่างที่พวกคุณคิดหรอก"
22090-37 = "ตัวตนที่แท้จริงของสิ่งที่พวกคุณเรียกกันว่าอาริสึ นั่นก็คือ..."
22090-40 = "ผู้มีอำนาจสั่งการของ [ruby=Divi:Sion]<กองทัพปริศนา>[/ruby] ที่รุกรานมาจากดินแดนที่ไม่รู้จัก"
22090-41 = "เป็น <วัตถุหลงยุค> ที่นักบวชนิรนามที่บูชา <เทพไร้นาม> ยกย่องให้เป็นผู้นำและยังเป็นมรดกที่ชาว#nเมืองคิโวทอสเหลือทิ้งไว้──"
22090-42 = "ชื่อที่แท้จริงตามการเรียกขานของพวกเขาเหล่านั้นก็คือ..."
22090-44 = "<ธิดาแห่งทวยเทพไร้นาม: AL-1S>"
22090-51 = "[ns] \"ทวยเทพ... อะไรนะ?\""
22090-52 = "อาริสึ..."
22090-53 = "อาริสึ... ไม่เข้าใจเลยค่ะว่านี่มันเรื่องอะไรกัน..."
22090-54 = "ใช่ค่ะ! พูดเรื่องอะไรคะเนี่ย?!"
22090-55 = "จู่ๆ จะเข้ามาพูดเรื่องที่เข้าใจอยู่คนเดียว แล้วคาดหวังให้พวกเราเข้าใจและคล้อยตามด้วยแบบนี้ มันสมเหตุ#nสมผลเหรอคะ?!"
22090-56 = "เพราะพี่โมโมอิเป็นแบบนั้นกับฉันตลอด ฉันเลยรู้ดีค่ะ! อย่ามาสร้างเรื่องกำหนดตัวตนให้อาริสึตาม#nอำเภอใจสิคะ!"
22090-58 = "มะ... มิโดริ..."
22090-59 = "จริงด้วยสินะ ขอโทษที ฉันคงจะคิดน้อยไปหน่อย"
22090-60 = "งั้นฉันจะอธิบายจาก <เกม> ที่พวกเธอเล่นกันบ่อยๆ แล้วกัน จะได้เข้าใจกันได้ง่ายขึ้น"
22090-64 = "โดยสรุปแล้ว ตัวตนของอาริสึ ไม่สิ ตัวตนของเธอ──"
22090-65 = "ก็คือ <ราชาปีศาจ> ที่เกิดมาเพื่อทำลายล้างโลกยังไงล่ะ"
22090-66 = "......!!"
22090-67 = "[s] \"อาริสึคือ... ราชาปีศาจ?\""
22090-68 = "ยังจะดื้ออยู่อีก..."
22090-69 = "ทำไมถึงมาพูดอะไรแบบนี้คะ?! กำลังแต่งเรื่องอะไรอยู่กันแน่!"
22090-70 = "ไม่ได้แต่งเรื่องอะไรขึ้นมาสักหน่อย เป็นฉันเองเสียด้วยซ้ำที่อยากจะถามพวกเธอน่ะ"
22090-71 = "พวกเธอน่าจะได้เห็นกับตากันมาแล้ว วันที่อาริสึไปแตะต้องกับหุ่นดิวิชั่นพวกนั้นเข้า"
22090-72 = "[s] \"ดิวิชั่นงั้นเหรอ...?\""
22090-80 = "[ns] \"พะ... พวกหุ่นยนต์ที่หน้าตาแปลกๆ น่ะเหรอ...?\""
22090-81 = "อืม ถูกต้อง"
22090-82 = "เธอไม่ควรที่จะไปแตะต้อง หรือติดต่อกับพวกนั้นเลยแท้ๆ"
22090-83 = "ฉันคิดว่าทุกอย่างถูกติดตามโดย C&C และ AMAS แต่ไม่คิดว่าจะมีคนที่ออกจากเครือข่ายเฝ้าระวังไปได้"
22090-84 = "เรื่องนี้คือความผิดพลาดของฉันเอง ต้องขอโทษด้วยนะ"
22090-88 = "คะ... คะ? ขอโทษ? ประธานเนี่ยนะคะ...?"
22090-89 = "แต่ว่า"
22090-90 = "[s] \"แต่ว่า...?\""
22090-91 = "เรื่องนี้ถือเป็นการพิสูจน์ว่าภัยคุกคามที่ฉันตั้งสมมติฐานไว้คือเรื่องจริง"
22090-93 = "พูดตรงๆ ก็คือ สิ่งที่พวกเธอพบเจอมาคือภัยพิบัติที่เริ่มหลั่งไหลออกมาจากพื้นที่รกร้าง"
22090-94 = "ฝันร้ายที่จะนำไปสู่หายนะ... เริ่มจากมิลเลเนียม... ไปลุกลามไปทั่วคิโวทอส"
22090-95 = "การมีอยู่ของอาริสึกำลังเรียกพวกเขาเหล่านั้นออกมาจากพื้นที่รกร้าง"
22090-97 = "ครั้งนี้ยังถือว่าโชคดีที่ไปแตะต้องกับสิ่งของจากพื้นที่รกร้างที่เสียหายไปแล้ว"
22090-98 = "แต่ต่อไปมันคงไม่ได้จบเพียงเท่านี้แน่"
22090-110 = "[ns] \"......\""
22090-111 = "มีทางเดียวที่จะแก้ไขภัยคุกคามนี้ได้อย่างรวดเร็ว อาริสึ"
22090-112 = "ทางที่จะแก้ไข...?"
22090-113 = "ใช่ อาริสึ เธอต้องหายไป"
22090-114 = "เพื่อโลกใบนี้... เธอไม่ควรจะมีตัวตนอยู่อีก"
22090-115 = "ว่ายังไงนะคะ..."
22090-116 = "อาริสึ... เป็นแค่... ผู้กล้า..."
22090-117 = "ที่อยากจะ... เล่นเกม... และทำเควสกับคนอื่น... เท่านั้นเอง..."
22090-118 = "ทำแบบนั้นไม่ได้หรอกนะ"
22090-119 = "ถึงฉันจะไม่ค่อยรู้เรื่องเกมสักเท่าไร... แต่ก็มั่นใจว่าตัวเองมีความรู้ที่จำเป็นเพียงพอแล้ว"
22090-123 = "ถ้าอย่างนั้นฉันจะถามคำถามเธอ"
22090-124 = "ที่เธอเรียกตัวเองว่าเป็นผู้กล้านั่นน่ะ..."
22090-128 = "ผู้กล้าที่เธอพูดถึงตั้งแต่แรกคือคนที่ทำร้ายเพื่อนจนบาดเจ็บงั้นเหรอ?"
22090-130 = "แบบนั้นน่าจะเป็นบทบาทของราชาปีศาจที่ผู้กล้าต้องมาปราบมากกว่ารึเปล่า?"
22090-134 = "......!"
22090-138 = "อาริสึจัง! ไม่ต้องไปฟังอะไรพวกนั้นหรอก!"
22090-139 = "ก่อนหน้านี้ฉันเคยได้ยินว่าประธานสภานักเรียนเป็นคนประหลาด! แต่ไม่คิดเลยว่าจะเป็นได้ถึงขนาดนี้!"
22090-141 = "คะ... คุณครู...!"
22090-143 = "[ns] \"ริโอะ... หยุดได้แล้ว\""
22090-144 = "ให้หยุดงั้นเหรอ? หยุดทำอะไร?"
22090-145 = "นี่ครู การเบือนหน้าไปจากข้อเท็จจริงที่ชัดเจน ไม่ใช่สิ่งที่เรียกว่าความเมตตาหรือการเอาใจใส่นักเรียน#nหรอกนะ"
22090-146 = "มันก็แค่ <การหนีความจริง> การกระทำแบบนั้นมันไม่สมเหตุสมผลเอาซะเลย"
22090-147 = "[s] \"นี่มันไม่ใช่ปัญหาเรื่องความสมเหตุสมผลแล้ว...\""
22090-148 = "ถ้างั้นอาริสึ..."
22090-149 = "ถ้างั้นอาริสึจะต้องทำยังไงเหรอคะ...?"
22090-150 = "ถ้าเป็นเรื่องวิธีการละก็ ง่ายนิดเดียว"
22090-151 = "วิกฤตทั้งหมดที่เกิดขึ้น มันเป็นเพราะเธอยังอยู่ที่นี่ยังไงล่ะ อาริสึ"
22090-152 = "การมีอยู่ของเธอคือตัวการของปัญหาที่เกิดขึ้น หรือพูดง่ายๆ เธอก็คือระเบิดเวลานั่นเอง..."
22090-153 = "และถ้าสาเหตุของปัญหาชัดเจนแล้ว วิธีแก้ปัญหามันก็จะชัดเจนไปด้วย"
22090-154 = "ถ้ามีระเบิด เราก็แค่ต้องเอาไปไว้ในที่ที่ปลอดภัย แล้วก็ทำลายมันซะ"
22090-155 = "ทำลาย... ระเบิด...?"
22090-156 = "อืม... ยังไม่เข้าใจเหรอ? งั้นก็คงต้องพูดสั้นๆ ให้เข้าใจง่ายๆ สินะ"
22090-163 = "ฉันหมายถึงการทำลายฮาโลของเธอน่ะ"
22090-170 = "?!?!?!?!?!?!?!"
22090-175 = "ไม่สิ จะเรียกสิ่งนั้นของเธอว่าฮาโลได้หรือเปล่านะ?"
22090-176 = "ถึงฉันจะไม่รู้สาเหตุที่เธอมีฮาโลเหมือนมนุษย์คนอื่นก็เถอะ"
22090-177 = "แต่การที่เครื่องจักรอย่างเธอมีฮาโล..."
22090-178 = "ใช่ มันเหมือนกับ AI ที่ตกอยู่ในความบ้าคลั่งนั่นเลย"
22090-179 = "...ยิ่งเป็นแบบนี้ ฉันยิ่งปล่อยเธอเอาไว้ไม่ได้"
22090-180 = "[s] \"ริโอะ\""
22090-182 = "[ns] \"ครูทนฟังคำพูดที่รุนแรงของเธอไม่ได้แล้วนะ\""
22090-183 = "ถ้าคำพูดและการกระทำของฉันมันไปทำให้ทุกคนไม่พอใจเข้า ฉันก็ต้องขอโทษด้วย"
22090-184 = "มีคนที่ไม่ชอบฉันเยอะแยะตั้งแต่เมื่อก่อนแล้วละ"
22090-185 = "── ปัญหาน่าจะเป็นที่ตัวฉันน่ะ"
22090-186 = "แต่ถึงจะไม่มีใครเข้าใจก็ไม่เป็นไร ฉันก็แค่อยากปกป้องทุกคนจากอันตรายก็เท่านั้น"
22090-187 = "เอาละ ถึงตาของเธอแล้ว มิคาโมะ เนรุ"
22090-194 = "......!"
22090-195 = "รุ่นพี่... เนรุ..."
22090-196 = ".........."
22090-200 = "[ns] \"เนรุ...?\""
22090-201 = "......"
22090-202 = "ไม่ต้องรู้สึกผิดไปหรอกนะ"
22090-203 = "เดิมทีแล้ว C&C คือชมรมสายลับที่ทำงานภายใต้คำสั่งของเซมิน่า... ไม่สิ ถ้าจะให้ชัดเจนก็ต้องบอกว่า#nคำสั่งของฉัน"
22090-204 = "เรื่องนี้ไม่มีความรู้สึกส่วนตัวอะไรเกี่ยวข้อง เราแค่ทำในสิ่งที่ต้องทำก็เท่านั้น"
22090-205 = "ถ้าเป็นฝีมือของผู้นำ C&C อย่างเนรุแล้วละก็ ต่อให้เป็นชมรมพัฒนาเกมที่นำโดยคุณครูก็ไม่สามารถ#nต้านทานไว้ได้อย่างแน่นอน"
22090-206 = "และถึงแม้จะขอความช่วยเหลือจากภายนอก แต่ที่นี่น่ะ..."
22090-214 = "AMAS ของฉันยึดที่นี่เอาไว้หมดแล้ว ถึงจะมีใครที่คิดจะเข้ามาช่วย ก็คงถูกจัดการไปก่อนที่จะมาถึงที่นี่แล้ว"
22090-215 = "เอาละ ถึงเวลาทำงานแล้ว จัดการอาริสึซะ เนรุ"
22090-217 = "........."
22090-218 = "รุ่นพี่เนรุ..."
22090-222 = "หึ..."
22090-223 = "หืม...?"
22090-227 = "โว้ยยย...! พูดอะไรอยู่ได้ หงุดหงิดจนไม่เป็นอันทำอะไรแล้ว!"
22090-231 = "เดี๋ยวก่อน ทำไมจู่ๆ ก็โจมตีมาทางนี้ล่ะเนรุ... นี่มันอะไรกัน..."
22090-236 = "[ns] \"เนรุ...!\""
22090-238 = "รุ่นพี่เนรุ...?"
22090-239 = "ปกติฉันก็ไม่ค่อยถูกใจงานที่เธอสั่งให้ทำอยู่แล้ว"
22090-240 = "แล้วครั้งนี้เป้าหมายยังเป็นนักเรียนโรงเรียนเดียวกัน... ให้ลักพาตัวเด็กที่ไม่รู้ประสาอะไรเลยเนี่ยนะ?"
22090-241 = "ฉัน ไม่ เอา ด้วย หรอก!"
22090-242 = "ริโอะ คิดว่าฉันจะอดทนกับคำพูดไร้สาระของเธอไปได้ถึงเมื่อไรกัน! ห้ะ?!"
22090-243 = "เนรุ... นี่เธอจะหักหลังกันเหรอ?"
22090-244 = "หักหลัง? เฮอะ! ตลกเป็นบ้า! ฉันแค่ไม่คิดจะทำตามคำสั่งที่ไม่ถูกใจก็เท่านั้นแหละ!"
22090-246 = "อืม อย่างนั้นสินะ..."
22090-247 = "เนรุ เธอก็เป็นแบบนี้มาตลอด"
22090-248 = "เธอไม่ลังเลที่จะฝ่าฝืนคำสั่งตามอารมณ์ของตัวเอง"
22090-249 = "เป็นเหมือนระเบิดที่ไม่รู้ว่าจะระเบิดเมื่อไร นี่เป็นทั้งข้อดีของเธอ... และเป็นสิ่งที่น่าหงุดหงิดมากๆ เอาเสียด้วย"
22090-250 = "เพราะแบบนี้ ฉันถึงได้คาดการณ์ว่าจะเกิดเรื่องแบบนี้ขึ้นไว้แล้วละ"
22090-251 = "ดีแล้วที่ฉันเรียกเธอมาคนเดียว ไม่ได้เรียกสมาชิก C&C ทุกคนมาที่นี่"
22090-252 = "ห้ะ? ว่าไงนะ?"
22090-253 = "โทคิ ถึงตาของเธอแล้ว"
22090-258 = "[ns] \"เนรุ?! อันตราย!\""
22090-259 = "หืม?"
22090-268 = "แค่กๆ แค่กๆ! ใครน่ะ?!"

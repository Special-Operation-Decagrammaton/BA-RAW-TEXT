[translation]
22090-1 = "Episode 9; The Harsh Truth 1"
22090-7 = "[ns] \"Tsukatsuki Rio...?\""
22090-8 = "Sensei, she's...the president of Millennium."
22090-9 = "Wh-What's the president doing here...?"
22090-10 = "..."
22090-12 = "That's right, I'm the center of Millennium Science School, the one who leads Seminar, and..."
22090-13 = "...the one who chases the stars in hopes of solving the Millennium Conundrum."
22090-14 = "I would have preferred for our first meeting to be a formal one, but..."
22090-15 = "You're not the reason I'm here today, Sensei."
22090-16 = "[s] \"You said you were here to tell us the truth...\""
22090-17 = "Yes, the truth."
22090-18 = "Since the incident a few days ago, you and the Game Development Department students must all be thinking the same thing."
22090-19 = "You can't stop thinking about a completely unexpected side of a person you think of as a friend...and the destruction and chaos she caused."
22090-20 = "And with that kind of thought process, the natural next step would be..."
22090-25 = "\"This person I believed to be my friend, may not be a friend after all.\""
22090-26 = "Isn't that correct, Sensei?"
22090-27 = "...!"
22090-31 = "[ns] \"Rio, what nonsense are you spouting?\""
22090-32 = "Fine. I'll cut to the chase."
22090-35 = "That little girl behind you..."
22090-36 = "More so, that \"thing\" behind you is no ordinary student."
22090-37 = "That thing that you call Aris is..."
22090-40 = "She's the commander of a mysterious army invading from an unknown territory."
22090-41 = "Aris is the Artifact enshrined by the nameless priests who worship the Nameless Gods, and the legacy left by the former inhabitants of Kivotos."
22090-42 = "She's..."
22090-44 = "...the princess of the Nameless Gods, AL-1S."
22090-51 = "[ns] \"Nameless...what?\""
22090-52 = "I..."
22090-53 = "I do not...understand what you are saying..."
22090-54 = "Hey! How dare you talk about her like that?!"
22090-55 = "You can't just come in here and say a bunch of things we don't understand and expect us to nod our heads and believe you!"
22090-56 = "Only my sister is allowed to do that to me! Aris is our friend, not some weirdo princess!"
22090-58 = "M-Midori..."
22090-59 = "You're right. My apologies. Maybe I was a bit inconsiderate."
22090-60 = "To make it easier to understand, I'll compare this to a game that you often play."
22090-64 = "Aris, your existence is essentially..."
22090-65 = "...that of an evil lord who was born to destroy this world."
22090-66 = "...!"
22090-67 = "[s] \"Aris is...a demon lord?\""
22090-68 = "I'm telling you, it's all nonsense."
22090-69 = "Why are you saying this?! What's your agenda?"
22090-70 = "I have no agenda. Actually, I want to ask you guys some questions."
22090-71 = "You already saw and experienced what happened when Divi:Sion and Aris came into contact."
22090-72 = "[s] \"So Divi:Sion is...\""
22090-80 = "[ns] \"Those...strange-looking robots?\""
22090-81 = "Yes. Correct."
22090-82 = "You never should have come into contact with them."
22090-83 = "I thought the robots were all being tracked through C&C and AMAS. I couldn't believe that some escaped the surveillance network."
22090-84 = "That was clearly my mistake. I apologize."
22090-88 = "H-Huh? Is the president...apologizing...?"
22090-89 = "Even so."
22090-90 = "[s] \"Yes?\""
22090-91 = "This event has proven that the threat I only hypothesized to exist is real."
22090-93 = "To put it bluntly, the beings you encountered are disasters that poured out from the ruins."
22090-94 = "They're a nightmare that will bring destruction to Millennium and Kivotos."
22090-95 = "Aris' very existence is calling to them from the ruins."
22090-97 = "This time we got lucky, since she only came into contact with half-damaged junk..."
22090-98 = "But I can assure you the next time won't play out as nicely for you."
22090-110 = "[ns] \"...\""
22090-111 = "There's only one way to deal with this threat as quickly as possible, Aris."
22090-112 = "To deal with...this threat? I am the threat?"
22090-113 = "Yes, Aris. You have to disappear."
22090-114 = "For the sake of this world, you shouldn't exist. You never should have existed."
22090-115 = "...That is...but..."
22090-116 = "I just...wanted to be...a hero..."
22090-117 = "All I wanted...was to accomplish...game quests..."
22090-118 = " Unfortunately, that's not possible for you."
22090-119 = "I don't have much experience with games...but I've enough knowledge about them to relate to you, at least."
22090-123 = "So, let me ask you this."
22090-124 = "You call yourself a hero, but..."
22090-128 = "You attacked your friend, and you hurt her. She still hasn't awoken."
22090-130 = "Doesn't that sound more like a villain who should be defeated by a hero?"
22090-134 = "...!"
22090-138 = "Aris! That's a bunch of crap!"
22090-139 = "I heard that the Seminar president was a weirdo, but this is beyond my expectations! You're insane!"
22090-141 = "S-Sensei...! H-Help..."
22090-143 = "[ns] \"...Rio, stop this. Right now.\""
22090-144 = "What exactly should I stop?"
22090-145 = "Stop telling the truth? Turning away from reality helps no one, Sensei."
22090-146 = "To blindly believe in your ideals is commendable, but irrational. This is the truth."
22090-147 = "[s] \"It's not a matter of being rational or not...\""
22090-148 = "Wh-What..."
22090-149 = "What would I have to do...?"
22090-150 = "Don't worry. It's simple."
22090-151 = "You're responsible for all the crises that have arisen here."
22090-152 = "Your existence is the core of the problem. You're like a time bomb."
22090-153 = "And if the cause of the problem is clear, the solution is also clear."
22090-154 = "When there's a dangerous bomb around, we must take it to a safe place and disassemble it."
22090-155 = "Disassemble...? I am...the bomb...?"
22090-156 = "Was that too difficult for you to understand? Let me put it simply."
22090-163 = "Your halo must be destroyed."
22090-170 = "?!?!?!?!?!?!?!"
22090-175 = "Spare me the theatrics. Think about it. Was that even your halo to begin with?"
22090-176 = "You shouldn't have a halo at all. You're not human."
22090-177 = "You're a machine, who happened to acquire a halo."
22090-178 = "Aris, you're an AI that's gone mad."
22090-179 = "As such, I can't just leave you to your own devices."
22090-180 = "[s] \"Rio.\""
22090-182 = "[ns] \"I will not tolerate another word out of your mouth right now.\""
22090-183 = "...I apologize. I've been told the way I speak is too harsh."
22090-184 = "I suppose that's why most people don't like me."
22090-185 = "So, maybe I am the problem."
22090-186 = "But I don't care. You can misunderstand me all you want. I'm the one protecting everyone from danger."
22090-187 = "Okay, it's your turn, Mikamo Neru."
22090-194 = "...!"
22090-195 = "Neru..."
22090-196 = "..."
22090-200 = "[ns] \"Neru...?\""
22090-201 = "..."
22090-202 = "Please don't take this personally."
22090-203 = "C&C was originally a part of Seminar... To be exact, it's a club of agents that move under my direct command."
22090-204 = "I hope you understand, I'm not doing this out of any kind of personal grudge. I'm simply doing what I need to do."
22090-205 = "Even Sensei and the Game Development Department can't stand up against Neru, leader of C&C."
22090-206 = "And there's no help coming for you."
22090-214 = "The entire surrounding area is occupied by my AMAS. You'll be wiped out before any outsider can lift a finger."
22090-215 = "Well, that's enough monologuing. Neru, retrieve Aris."
22090-217 = "..."
22090-218 = "Little...upperclassman Neru..."
22090-222 = "...Ha."
22090-223 = "Ha...?!"
22090-227 = "Argh! This is so frustrating!"
22090-231 = "Neru?! Why are you attacking me all of a sudden? You can't be..."
22090-236 = "[ns] \"Neru!\""
22090-238 = "N-Neru?"
22090-239 = "You always make me do things I don't want to. And I do them!"
22090-240 = "But this? THIS?! You want me to kidnap an innocent student from my own school? So you can destroy her halo? My FRIEND?!"
22090-241 = "This is where I draw the line! I won't do it!"
22090-242 = "Did you think you could just keep pushing me around forever? That I would be your little marionette to play with for as long as we live?!"
22090-243 = "Neru... Are you betraying me?"
22090-244 = "Betraying? Ha! There's not any loyalty there to betray! I won't follow an order I don't agree with!"
22090-246 = "Ah, I see..."
22090-247 = "Neru, you've always been this way."
22090-248 = "You've never hesitated to disobey an order if you were in a bad mood."
22090-249 = "That volatile side you have is your strength...yet also the most annoying part of you."
22090-250 = "That's why I calculated for this situation in advance."
22090-251 = "It was a good choice to call just you and not every C&C member."
22090-252 = "Huh? What?"
22090-253 = "Toki, you're up."
22090-258 = "[ns] \"Neru, watch out!\""
22090-259 = "Huh?"
22090-268 = "*cough* *cough* Who are you?!"
22090-274 = "Nice to meet you, Upperclassman Neru. And Sensei."
22090-275 = "Affiliated with the C&C, I'm call sign Zero-Four."
22090-276 = "Oh...a fifth...?"
22090-277 = "[s] \"Another C&C member...?\""
22090-278 = "You attacked me from behind!"
22090-279 = "You won't get away with this!"
22090-280 = "[ns] \"Neru, w-wait!\""

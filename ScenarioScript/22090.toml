[translation]
22090-1 = "第9話;殘酷的真相（１）"
22090-7 = "[ns]「調月，莉央……？」"
22090-8 = "她是……千年的學生會長。"
22090-9 = "……會，會長為，為什麼會，會在這裡……"
22090-10 = "……"
22090-12 = "沒錯，我就是領導千年科學學園的中樞──研討會之人。"
22090-13 = "同時，也是期盼能解決「千年難題」的追逐星辰之人。"
22090-14 = "本來是想準備一個，能和夏萊的老師正式互相認識的機會的──"
22090-15 = "但今天還有其他要事，只好等待下次機會……"
22090-16 = "[s]「妳所說的『真相』是？」"
22090-17 = "沒錯──「真相」。"
22090-18 = "你們對數天前的「事件」，都有了相同的想法不是嗎？"
22090-19 = "至今一直以為是朋友的她所展現出的──不同的姿態。#n以及，同時產生的破壞和混亂。"
22090-20 = "於是──你們也是這麼想的吧？"
22090-25 = "「一直以來認為是朋友的人，說不定並非如此」──這樣。"
22090-26 = "我說的對吧？#n夏萊的老師。"
22090-27 = "……！！"
22090-31 = "[ns]「莉央，妳到底在──」"
22090-32 = "我就單刀直入地說吧──"
22090-35 = "在妳們背後的那個少女……"
22090-36 = "──有著少女外貌的「那個」並不是普通的學生。"
22090-37 = "你們稱為愛麗絲的那個──"
22090-40 = "──是從未知侵略而來的[ruby=Divi:Sion]「無法理解的軍隊」[/ruby]的指揮官，"
22090-41 = "是信仰「無名之神」的無名祭司們所崇拜的「歐帕茲」──#n是古老居民留下的遺產──"
22090-42 = "其名為……"
22090-44 = "「無名諸神的王女AL-1S」"
22090-51 = "[ns]「無名……？」"
22090-52 = "愛麗絲……"
22090-53 = "愛麗絲……無法理解……"
22090-54 = "就是呀！到底在說什麼啊！？"
22090-55 = "請不要自顧自地說這些妳腦袋裡的設定！"
22090-56 = "因為姐姐時常說那種話，所以我很清楚。#n不要擅自幫愛麗絲增加設定。"
22090-58 = "綠，綠……"
22090-59 = "──對不起。是我思慮不周。"
22090-60 = "為了讓妳們更容易理解，就用妳們喜歡的「遊戲」來舉例吧。"
22090-64 = "也就是說，「愛麗絲」。#n妳──"
22090-65 = "是為了毀滅世界而誕生的「魔王」哦。"
22090-66 = "……！！"
22090-67 = "[s]「愛麗絲是……魔王？」"
22090-68 = "又是那種設定……為什麼要說那種話呢！？"
22090-69 = "到底有什麼企圖！？"
22090-70 = "並沒有什麼企圖。#n──我反倒想問你們……"
22090-71 = "你們不也親眼見到了嗎？#n[ruby=Divi:Sion]「無法理解的軍隊」[/ruby]和愛麗絲接觸後發生了什麼事。"
22090-72 = "[s]「[ruby=Divi:Sion]『無法理解的軍隊』[/ruby]……」"
22090-80 = "[ns]「是指……那個機器人嗎……？」"
22090-81 = "──正是如此。"
22090-82 = "本來，是沒有打算讓事情變成那樣的……這完全是我們的疏失。"
22090-83 = "原本認為已經透過C&C和AMAS，全部進行追蹤了──#n沒想到居然會有脫離監視網的個體。"
22090-84 = "這完全是我的疏忽。#n我在此道歉。"
22090-88 = "咦？道歉？會長她！？#n咦……？"
22090-89 = "──但是。"
22090-90 = "[s]「但是？」"
22090-91 = "多虧如此，我的假設得到了證明。"
22090-93 = "你們所接觸的那個是從「廢墟」中溢出的「災禍」。"
22090-94 = "是會對千年──甚至是整個奇普托斯帶來終焉的惡夢。"
22090-95 = "並且──愛麗絲的存在，正從「廢墟」呼喚著那些東西也得到了證明。"
22090-97 = "這次是僥倖接觸到了即將損壞的個體，所以才停了下來……"
22090-98 = "下次就沒有這麼好運了吧。"
22090-110 = "[ns]「…………」"
22090-111 = "能解決這個威脅的方法只有一個唷，愛麗絲。"
22090-112 = "解決的，方法……？"
22090-113 = "沒錯。#n──愛麗絲，妳必須消失。"
22090-114 = "妳不能存在於這個世界。"
22090-115 = "……怎……麼會……"
22090-116 = "愛麗絲……只是……想成為勇者……"
22090-117 = "想和大家一起……玩遊戲……#n完成，任務……而已……"
22090-118 = "不，這是無法實現的。"
22090-119 = "雖然我並不清楚遊戲……但相關的知識還是有的。"
22090-123 = "所以，我問妳一個問題。"
22090-124 = "妳雖然自稱為勇者……"
22090-128 = "所謂的「勇者」，是會將劍指向友人的存在嗎？"
22090-130 = "妳的所作所為，不正是[ruby=魔王]惡人[/ruby]嗎？"
22090-134 = "……！"
22090-138 = "愛麗絲！不用聽那些話！"
22090-139 = "雖然聽說過學生會長是個怪人……#n沒想到會是這種人……！"
22090-141 = "老……老師……！"
22090-143 = "[ns]「……莉央，別說了。」"
22090-144 = "別說了？別說什麼？"
22090-145 = "要人不去正視事實可不能算是體貼哦，老師。"
22090-146 = "那只不過是單純的「逃避現實」罷了──放棄必須背負的責任，是非常不合理的行動唷。"
22090-147 = "[s]「這不是什麼合理不合理的問題……」"
22090-148 = "那，愛麗絲……"
22090-149 = "愛麗絲……要怎麼做才好……？"
22090-150 = "如同我剛才所說的──"
22090-151 = "一切的元兇就是愛麗絲。"
22090-152 = "一切都是因為妳在這裡才會發生的。"
22090-153 = "既然如此，事情就很簡單了不是嗎？"
22090-154 = "炸彈──只要在安全的地方拆除就好。"
22090-155 = "拆除……炸彈……？"
22090-156 = "啊啊……這樣很難懂嗎？"
22090-163 = "簡單來說──只要破壞妳的光環就解決了，就是這麼回事。"
22090-170 = "！？！？"
22090-175 = "啊啊不過……妳的那個真的是光環嗎？"
22090-176 = "不是學生的妳，為何會擁有光環呢……#n雖然不知道理由──"
22090-177 = "只是機械的妳擁有了光環……"
22090-178 = "對，就像是陷入瘋狂的AI一樣。"
22090-179 = "沒錯……這樣的話，就更不能放過妳了。"
22090-180 = "[s]「莉央。」"
22090-182 = "[ns]「不許再說下去了。」"
22090-183 = "……如果我的言行讓你感到不悅，我向你道歉。"
22090-184 = "從以前開始就有很多討厭我的人。"
22090-185 = "──那是因為我有問題吧。"
22090-186 = "但是，就算不被理解也無所謂。我只是，想保護大家而已。"
22090-187 = "來，輪到妳出場了──美甘寧瑠。"
22090-194 = "……！"
22090-195 = "寧瑠……前輩……"
22090-196 = "…………"
22090-200 = "[ns]「寧瑠……？」"
22090-201 = "…………"
22090-202 = "別怪我這麼做。"
22090-203 = "C&C本來就是研討會……正確來說，是我直屬的特務。"
22090-204 = "不需要有私人的感情。#n只需要遵從我的命令就好。"
22090-205 = "面對C&C的隊長──寧瑠，就算是老師，光靠遊戲開發部也無法抵抗吧？"
22090-206 = "就算想要尋求外部的協助──"
22090-214 = "這附近已經被AMAS所掌握。#n救援是不可能趕上的。"
22090-215 = "來，工作時間到了。#n寧瑠，可以替我回收愛麗絲嗎？"
22090-217 = "……"
22090-218 = "寧瑠前輩……"
22090-222 = "……哼。"
22090-223 = "哼……？"
22090-227 = "可惡，誰做得下去啊！"
22090-231 = "寧瑠……妳這是什麼意思？"
22090-236 = "[ns]「寧瑠……！」"
22090-238 = "……寧瑠前輩？"
22090-239 = "雖然平時的委託內容我也沒幾個喜歡的。"
22090-240 = "居然要對同個學園的學生動手──而且還要我綁架一個什麼都不知道的孩子？"
22090-241 = "──那種委託誰做得下去。"
22090-242 = "我已經沒必要聽妳的命令了──莉央！"
22090-243 = "寧瑠……打算在這種時候背叛我嗎？"
22090-244 = "背叛？#n哈！我只是不滿意妳的指示罷了。"
22090-246 = "這樣啊，是這個意思啊……"
22090-247 = "寧瑠，妳總是這樣。"
22090-248 = "依據心情甚至會違背命令的模樣──"
22090-249 = "不知何時會爆炸是妳的優點……#n卻也是最麻煩的。"
22090-250 = "……所以，就連這個狀況，也全都在我的意料之中。"
22090-251 = "從一開始就不是找C&C全員，而只找妳來是正確的。"
22090-252 = "啊？妳說什麼？"
22090-253 = "季──輪到妳出場了。"
22090-258 = "[ns]「寧瑠，危險！」"
22090-259 = "啊？"
22090-268 = "妳這傢伙是誰啊！？"
22090-274 = "初次見面，前輩。#n──還有老師。"
22090-275 = "C&C所屬，代號Zero Four。向各位問好。"
22090-276 = "咦……第五個……？"
22090-277 = "[s]「C&C……？」"
22090-278 = "竟敢從背後偷襲，真是把我看扁了。"
22090-279 = "已經做好覺悟了吧！？"
22090-280 = "[ns]「寧瑠，等等……！」"

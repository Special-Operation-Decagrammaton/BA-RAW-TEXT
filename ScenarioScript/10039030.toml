[translation]
10039030-1 = "第3話;偶像之路：舞蹈"
10039030-3 = "……嗯？想學習有關偶像的事情……？"
10039030-4 = "這倒是沒問題，不過該從何教起呢……"
10039030-5 = "仔細想想好像也沒什麼好教的。#n畢竟歌曲和服裝都不是我們自己準備，而是連鎖店贊助的……"
10039030-6 = "該怎麼辦呢……#n不然……把我們正在學的舞蹈教你們怎麼樣？"
10039030-7 = "連鎖店？贊助……？"
10039030-8 = "啊，這點由本官來說明吧！#n其實這次的偶像活動，並不是我們主動提議參加……"
10039030-9 = "而是本官和吹雪經常去的甜甜圈店，請我們作為吉祥物一起參加的社會服務活動……"
10039030-10 = "[s1]「……吉祥物？」\n[s2]「社會服務……？」"
10039030-13 = "沒錯，就是這樣！"
10039030-14 = "老師應該也覺得奇怪吧？#n為什麼我們女武神的生活安全局，得為了幫甜甜圈店宣傳而當偶像……"
10039030-15 = "我其實也是這麼認為的……#n不過上層一聽到消息就指派我們去了……"
10039030-16 = "吹雪！這也是社會服務的一環哦！別抱怨了！"
10039030-17 = "而且這代表市民們對我們生活安全局感到安心和親切，這樣不是很好嗎？"
10039030-18 = "是沒錯啦，但社會服務終究也是工作……"
10039030-19 = "我們當然也很樂意幫助有困難的修女！"
10039030-20 = "雖然我們自己規劃的部分有限，所以能教的東西不多……#n不過教兩位我們學到的舞蹈還是沒問題的。"
10039030-21 = "大概是這樣……？"
10039030-27 = "……好像不太對？#n是這樣跳嗎，吹雪？"
10039030-28 = "為什麼要看我，現在還有其他人在耶。#n而且這裡又不是練舞室，我才不想在這裡跳舞。"
10039030-29 = "嗯？真奇怪，怎麼突然想不起來……是這樣跳嗎？"
10039030-31 = "……？"
10039030-32 = "[ns3]（這是什麼動作……？）\n[ns4]（看來這裡也還在學習中啊）"
10039030-35 = "……！#n總，總之！大概就是這種感覺！"
10039030-36 = "我們也才學到一半而已啦。#n專業的舞蹈家會定期過來教我們。"
10039030-37 = "雖然這確實能讓我們從平時的工作中稍微解放……"
10039030-39 = "[ns5]（但練舞也完全是工作的一環吧……）\n[ns6]（有點類似……某種朝三暮四的概念？）"
10039030-42 = "看老師那副表情，你想必也已經發現了吧。"
10039030-43 = "沒錯，現在反而變得比平時更難偷懶了……"
10039030-45 = "吹雪～！"
10039030-46 = "我知道我知道。不要那樣看我嘛～"
10039030-47 = "總之就是這麼回事。#n不過我聽說學會舞蹈之後，在許多方面都能派上用場。"
10039030-48 = "派上用場……？舞蹈……？"
10039030-49 = "作為偶像的基礎，會跳舞是理所當然的！#n但除此之外，當遇到準備時間不足的緊急情況……"
10039030-50 = "還能用來吸引注意力或爭取時間哦！#n當然也能讓身體變得更靈活……！"
10039030-51 = "……！#n原來如此……！"
10039030-52 = "不過實際上，那種情況還是連發生都不要比較好。"
10039030-53 = "話說那位修女同學……"
10039030-58 = "[ns7]「這個聲音是……？」\n[ns8]「警報聲突然響了？」"
10039030-61 = "……出事了，吹雪！馬上出動吧！"
10039030-63 = "可是我們的班表不是已經因為偶像活動排開了嗎？"
10039030-64 = "這跟說好的不一樣……"
10039030-69 = "現在其他人都不在，我們至少得去看看才行！#n而且事件發生的地點……"
10039030-73 = "咦……？"
10039030-74 = "是吹雪經常去的甜甜圈店……！？"
10039030-75 = "……？"
10039030-76 = "……什麼？"
10039030-77 = "也就是贊助的那間店嗎……？"
10039030-78 = "現在不是說這些的時候了！#n吹雪！趕快出發吧！！"
10039030-79 = "啊不是，我就說了……！#n等，等等！等一下啦……！！"
10039030-93 = "通通不准動！！別想耍花招啊！！"
10039030-94 = "我們只是想吃點甜甜圈而已！#n只要乖乖交出來，我們就會放店裡的人平安離開！！"
10039030-95 = "噫，噫噫噫……！拜託別這樣……！"
10039030-96 = "不想這樣就把甜甜圈都交出來！#n都是因為你拖拖拉拉的關係，害女武神都來了！！"
10039030-97 = "可，可是我們店裡是採預付制，所以甜甜圈的錢得先付才行……"
10039030-98 = "誰管你啊！！天底下哪有要求強盜付錢的店員！！"
10039030-99 = "噫，噫噫……！！#n但老闆就說甜甜圈不能賒賬，一定要先收錢才能給嘛！！"
10039030-100 = "哪來這麼不知變通的店員。"
10039030-101 = "店員本來就只能照流程做事，你不知道嗎？"
10039030-102 = "雖然是這樣沒錯啦……"
10039030-103 = "……可惡，都怪他在那邊浪費時間，現在已經被女武神包圍了。"
10039030-104 = "既然如此就抓個人質吧！要求他們準備逃跑的車輛！！"
10039030-106 = "唉，真是的。事情怎麼會變成這樣……"
10039030-107 = "也不想想是誰害的！！"
10039030-108 = "這怎麼能怪我！？有錯的明明是你們！！"
10039030-110 = "嗯，真有道理。"
10039030-111 = "你是在附和什麼啦！！！"
10039030-113 = "居然在光天化日之下脅持人質……真不敢相信！"
10039030-114 = "跟這麼大的場面相比，情況實在太荒唐了……"
10039030-119 = "哦，桐乃！吹雪！你們來幫忙啦！！"
10039030-120 = "我們已經和那些傢伙對峙快20分鐘了。#n現在該怎麼辦？"
10039030-121 = "對方一開始只要求要給甜甜圈，現在卻連逃跑的車輛都要我們準備……這下麻煩了。"
10039030-123 = "唔嗯……其他部門呢？#n比如警備局或公安局之類的……"
10039030-124 = "他們應該也會來，不過好像還需要一點時間。"
10039030-125 = "看來我們得自己想辦法解決了……"
10039030-126 = "唉……果然還是得這樣嗎……"
10039030-127 = "你們看，那不是生活安全局的吹雪嗎！？"
10039030-128 = "果然沒錯……！#n他來保護常來的甜甜圈店了！！"
10039030-129 = "因為這次還代表店家參加了偶像活動，所以才特地前來救援的吧！？#n真有義氣！！"
10039030-130 = "啊，不是，我其實是……"
10039030-131 = "……是吹雪醬！！"
10039030-132 = "是吹雪醬耶！這邊這邊～！！"
10039030-133 = "拜託你們安靜點好不好！！這又不是粉絲見面會！！"
10039030-134 = "兩邊都不懂得看場合呢，真是的。"
10039030-135 = "啊，嗯……你好呀……"
10039030-136 = "唔嗯……！看來這次只能靠我們自己了！！"
10039030-137 = "必須馬上救出人質，制伏問題學生才行……！"
10039030-138 = "有沒有什麼好辦法呢……！#n哼嗯……！"
10039030-144 = "[ns9]「瑪，瑪麗……！」\n[ns10]「突然往店的方向跑過去了！？」"
10039030-153 = "……你是哪位？"
10039030-155 = "那副打扮……是修女嗎？三一的修女會？"
10039030-156 = "修女會的人為什麼會在這裡……"
10039030-163 = "……？"
10039030-165 = "……？？？"
10039030-166 = "……什麼情況？他在做什麼？"
10039030-171 = "這是……！"
10039030-173 = "你是誰！？莫名其妙地跑過來做什麼！！"
10039030-180 = "喂！！你聽不懂人話是不是！？"
10039030-181 = "我問你在做什麼！！#n突然在這種情況下跳舞是想怎樣！！！"
10039030-188 = "吸……"
10039030-189 = "……吸？"
10039030-190 = "吸……"
10039030-191 = "吸……？"
10039030-192 = "吸……"
10039030-193 = "……吸引注意力來爭取時間！！"
10039030-199 = "……糟了！！！"
10039030-200 = "哦耶，機會來了～！"
10039030-205 = "喂，你這個笨蛋……！！"
10039030-206 = "趁現在！！大家快逮捕犯人！！！"
10039030-221 = "……哇。"
10039030-222 = "……竟然真的成功了。"

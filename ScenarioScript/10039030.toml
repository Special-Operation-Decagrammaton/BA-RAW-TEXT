[translation]
10039030-1 = "Episode 3;The Road to Pop Idol Stardom: The Dance"
10039030-3 = "...Oh? You want to learn about pop idols...?"
10039030-4 = "I mean, if you want to... Hmm, what can I tell you...?"
10039030-5 = "There's not a whole lot I can say, really. I didn't make my costume or write the song. This one place I go to gave them to me. Part of a sponsorship I've got going on..."
10039030-6 = "Oh, I could teach you the dance I'm learning, though."
10039030-7 = "You have a sponsorship with a store?"
10039030-8 = "Oh, yeah! See, joining in the Pop Idol Event wasn't really our idea at first."
10039030-9 = "Fubuki and I like to go to this one donut chain nearby, and they asked us to dress up and join the Event as their mascots."
10039030-10 = "[s1] \"...Mascots?\"\n[s2] \"Like a promotional thing?\""
10039030-13 = "Yep, that's what they told us!"
10039030-14 = "It is weird now that you mention it, Sensei. I mean, what does being a donut shop idol have to do with public safety?"
10039030-15 = "But as soon as the \"opportunity\" came along, the higher-ups were like, \"Do it.\""
10039030-16 = "Come on, Fubuki, don't put it that way! We have to connect with the people in order to support them!"
10039030-17 = "This mascot act will help them see us as approachable and friendly, like we want them to, right?"
10039030-18 = "I'm just saying, it's extra work..."
10039030-19 = "...Well, you've come to us for help, Sister, and we're happy to do what we can for you."
10039030-20 = "Like she said, we're not experts, but we can at least show you the dance we've been practicing."
10039030-21 = "This dance..."
10039030-27 = "...Right? Did I get that right, Fubuki?"
10039030-28 = "What're you looking at me for? This isn't a dance studio. You want everybody to stare at us?"
10039030-29 = "Well, I just don't quite remember how it goes. Was it like this...?"
10039030-31 = "Well..."
10039030-32 = "[ns3] \"(That can't be it.)\"\n[ns4] \"(I guess they're still learning too.)\""
10039030-35 = "Well, anyway, it's something like that."
10039030-36 = "Like I said, we're still practicing. We've been taking lessons, too."
10039030-37 = "Yeah, and on the one hand, it's a break from my usual work..."
10039030-39 = "[ns5] \"(...but she's doing a different kind of work.)\"\n[ns6] \"(Either way, it's kind of the same.)\""
10039030-42 = "Yeah, you get it, Sensei."
10039030-43 = "This has actually made it way harder to slack off than usual..."
10039030-45 = "Fubuki!"
10039030-46 = "Yeah, yeah. Don't look at me like that."
10039030-47 = "Anyway, they keep telling me dancing can be useful, once you get good at it."
10039030-48 = "Useful? How?"
10039030-49 = "Well, it makes you a better idol, for one thing. But I suppose there might also be times when you're caught off guard, or things are happening too fast..."
10039030-50 = "...so if you need to buy time or create a distraction, it could be good for that too!"
10039030-51 = "Wow!"
10039030-52 = "I mean, you wouldn't WANT to be in that situation in the first place..."
10039030-53 = "But more importantly, Sister—"
10039030-58 = "[ns7] \"What's that sound...?\"\n[ns8] \"An alarm?\""
10039030-61 = "Incident in progress, Fubuki! Time to deploy!"
10039030-63 = "Do we HAVE to deploy? I thought we were off the schedule for rehearsal and stuff."
10039030-64 = "That's what they said, right?"
10039030-69 = "We're short-staffed right now! We should at least be there! Also, the location of the incident..."
10039030-73 = "Yeah...?"
10039030-74 = "It's the donut shop!"
10039030-75 = "Um..."
10039030-76 = "...Wait, seriously?"
10039030-77 = "The one that's sponsoring you...?"
10039030-78 = "No time to argue, Fubuki! Let's go!"
10039030-79 = "No, I mean...! Hang on! Wait a minute...!!"
10039030-93 = "Nobody move! Don't get any ideas!"
10039030-94 = "We're just here for the donuts. Hand them over quietly, and nobody gets hurt!"
10039030-95 = "Eeek! Please don't do this...!"
10039030-96 = "I said hand over the friggin' donuts already! ...Oh, great, Valkyrie's already here. THANKS."
10039030-97 = "Y-You have to pay for them first, though. It's shop policy."
10039030-98 = "That's EVERY shop's policy! Are you seriously asking a robber for money?!"
10039030-99 = "I-It's just...the boss said I have to make sure everybody pays in advance!"
10039030-100 = "HOW are you this dense?!"
10039030-101 = "I mean, she's a part-time cashier..."
10039030-102 = "Haha, yeah, you're not wrong."
10039030-103 = "...Ugh. Great, now we're surrounded."
10039030-104 = "All right. We'll take her hostage and demand a getaway car."
10039030-106 = "Ohh, how did this happen...?"
10039030-107 = "Because of you, that's how!"
10039030-108 = "How is this my fault?! You guys started it!"
10039030-110 = "She does have a point."
10039030-111 = "Whose side are you on?!"
10039030-113 = "Oh my, a hostage situation in broad daylight... Unbelievable!"
10039030-114 = "And all for some donuts..."
10039030-119 = "Oh, Kirino! Fubuki! Good to have you here."
10039030-120 = "We've been in a standoff for 20 minutes now. How do you want to proceed?"
10039030-121 = "They've escalated their demands. First it was just donuts, now they want a getaway car. Phew, this is intense..."
10039030-123 = "Um... Do we have any other support? Anyone from the Security Bureau, or the Public Peace Bureau...?"
10039030-124 = "Word is it'll take some time before they can get here."
10039030-125 = "For now, we're on our own."
10039030-126 = "*sigh* Seriously...?"
10039030-127 = "Hey, isn't that Fubuki, from the Public Safety Bureau?"
10039030-128 = "Yeah! She must be here to protect the donut shop!"
10039030-129 = "I heard they're collaborating for the Pop Idol Event. Is that why she came to save them? Now that's dedication!"
10039030-130 = "N-No, it's not like that..."
10039030-131 = "Huh? Oh, Fubuki!"
10039030-132 = "Fubuki! Fubuki, over here!"
10039030-133 = "Oh, come on! What is this, a fan meeting?"
10039030-134 = "This is so friggin' lame..."
10039030-135 = "Oh, yeah, um... Hi..."
10039030-136 = "Well, it's up to us to make the rescue."
10039030-137 = "Somehow, we've got to neutralize the delinquents and save the hostage!"
10039030-138 = "...Somehow. Hmm..."
10039030-144 = "[ns9] \"Ma-Mari...!\"\n[ns10] \"Whoa, don't rush in...!\""
10039030-153 = "Huh? Who are you?"
10039030-155 = "She looks like one of those Sisters from Trinity."
10039030-156 = "So what's she doin' here?"
10039030-163 = "Um..."
10039030-165 = "What the...?"
10039030-166 = "What is that? What is she doing?"
10039030-171 = "*gasp* Oh...!"
10039030-173 = "Who ARE you?! Why're you doing that?"
10039030-180 = "Can you not hear me under that hood thingy?"
10039030-181 = "What are you doing?! Why are you dancing?!"
10039030-188 = "...I'm..."
10039030-189 = "...I'm..."
10039030-190 = "...I'm..."
10039030-191 = "I'm...?"
10039030-192 = "...I'm..."
10039030-193 = "...I'm distracting you and buying time!"
10039030-199 = "Oh, crud..."
10039030-200 = "Woo, I'm outta here!"
10039030-205 = "Hey, you dumb little...!"
10039030-206 = "Now! Move in!"
10039030-221 = "...Wow."
10039030-222 = "...That actually worked."

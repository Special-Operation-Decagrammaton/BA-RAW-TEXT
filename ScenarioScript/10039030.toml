[translation]
10039030-1 = "ตอนที่ 3;เส้นทางแห่งไอดอล: การเต้น"
10039030-3 = "หืม...? อยากศึกษาเกี่ยวกับไอดอลเหรอ...?"
10039030-4 = "พวกเราก็ยินดีอยู่หรอก ว่าแต่จะมีอะไรบ้างนะ..."
10039030-5 = "ถึงจะอยากสอน แต่ก็ไม่น่ามีอะไรที่สอนได้นะ เพราะเราไม่ได้ทำเพลงและชุดเอง แต่ได้สปอนเซอร์#nจากร้านมาทั้งหมดน่ะ..."
10039030-6 = "งั้นจะให้สอนอะไรดีนะ... ฮืม... ต้องบอกท่าเต้นที่กำลังเรียนอยู่มั้ยนะ?"
10039030-7 = "ได้สปอนเซอร์... จากร้านมาเหรอคะ?"
10039030-8 = "อ้อ เรื่องนั้นฉันจะอธิบายให้เองค่ะ! การเข้าร่วมอีเวนต์ไอดอลในครั้งนี้ไม่ใช่สิ่งที่พวกเราเสนอตัวทำ#nตั้งแต่แรกหรอกค่ะ"
10039030-9 = "แต่ร้านโดนัทที่ฉันกับฟุบุกิไปบ่อยๆ ขอให้เราไปเข้าร่วมอีเวนต์นั้นเหมือนกับว่าเป็นมาสคอตของร้าน และบอกว่านี่เป็นการบริการเพื่อประชาชนค่ะ..."
10039030-10 = "[s1] \"มาสคอต...?\"\n[s2] \"การบริการเพื่อประชาชน...?\""
10039030-13 = "ใช่ค่ะ พวกเราได้ยินแบบนั้นมาอย่างชัดเจนเลยค่ะ!"
10039030-14 = "คุณครูก็คิดว่ามันแปลกใช่มั้ยล่ะ? ทำไมคนจากสำนักรักษาความปลอดภัยของวัลคิรี่ต้องไปเป็นไอดอล#nเพื่อช่วยโปรโมตร้านโดนัทด้วย..."
10039030-15 = "ฉันเองก็สงสัยอยู่เหมือนกัน... แต่พอรู้เรื่อง กลายเป็นว่าเบื้องบนสั่งให้ทำ..."
10039030-16 = "ฟุบุกิ! นี่คือการบริการเพื่อประชาชนนะคะ! พูดแบบนั้นไม่ได้สิคะ!"
10039030-17 = "การที่เราได้รับคำขอร้องแบบนั้น ก็เท่ากับว่าชาวเมืองคิดว่าสำนักรักษาความปลอดภัยทั้งเข้าหาง่าย และเป็นมิตรไม่ใช่เหรอคะ นี่คือเรื่องดีนะคะ"
10039030-18 = "แต่มันก็เป็นงานอยู่ดีไม่ใช่เหรอ..."
10039030-19 = "และแน่นอนว่าการช่วยเหลือคุณซิสเตอร์ที่กำลังเดือดร้อนก็เป็นสิ่งที่พวกเรายินดีทำค่ะ!"
10039030-20 = "ถึงแม้พวกฉันจะสอนอะไรได้ไม่มากเพราะไม่ได้วางแผนกันเอง แต่ถ้าเป็นเรื่องการเต้นที่กำลังเรียนอยู่#nก็พอสอนได้ค่ะ..."
10039030-21 = "แบบนี้...?"
10039030-27 = "ใช่มั้ยนะ...? ใช่หรือเปล่าคะ ฟุบุกิ?"
10039030-28 = "มองฉันทำไมล่ะ? แบบนี้คนอื่นก็มองมาที่ฉันกันหมดสิ ฉันไม่อยากเต้นในที่ที่ไม่ใช่ห้องซ้อมน่ะ"
10039030-29 = "หืมม? แปลกจัง ทำไมจำไม่ได้... แบบนี้หรือเปล่านะ?"
10039030-31 = "...?"
10039030-32 = "[ns3] (นั่นมันท่าอะไรกันนะ...?)\n[ns4] (คงจะเพิ่งเริ่มเรียนเต้นกันสินะ)"
10039030-35 = "อะ... เอาเถอะค่ะ คุณครูว่าเป็นยังไงบ้างคะ? ฉันพอจำได้ว่าให้ฟีลประมาณนี้ค่ะ!"
10039030-36 = "พวกเราก็ยังเรียนกันอยู่เลย อาจารย์สอนเต้นจะมาสอนให้ในวันที่กำหนดน่ะ"
10039030-37 = "แต่สิ่งที่ทำอยู่ตอนนี้ก็ไม่ทำให้ฉันรู้สึกว่าตัวเองหลุดพ้นจากงานที่ทำเป็นประจำหรอกนะ..."
10039030-39 = "[ns5] (ก็เหมือนกับได้ทำงานอื่นอยู่นั่นละ)\n[ns6] (เหมือนได้ทำกิจกรรมอื่น แต่ก็คืองานอยู่ดีสินะ)"
10039030-42 = "ดูจากสีหน้าแล้ว ฉันว่าคุณครูพอจะเข้าใจฉันนะ"
10039030-43 = "มันก็เป็นอย่างนั้นละ กลายเป็นว่าทำให้โดดงานยากกว่าปกติอีก..."
10039030-45 = "ฟุบุกิ~!"
10039030-46 = "รู้แล้วน่า รู้แล้ว อย่ามองกันด้วยสายตาแบบนั้นสิ"
10039030-47 = "เอาเถอะ ตามที่ได้ยินมา เห็นว่าการเรียนเต้นก็มีประโยชน์นู่นนี่เหมือนกันน่ะ"
10039030-48 = "การเต้น...? มีประโยชน์เหรอคะ...?"
10039030-49 = "โดยพื้นฐานแล้ว คนเป็นไอดอลก็ต้องเต้นเป็นปกติอยู่แล้วค่ะ แต่ตามที่ฉันได้ยินมา..."
10039030-50 = "เมื่ออยู่ในสถานการณ์ฉุกเฉินที่ต้องการดึงดูดความสนใจหรือซื้อเวลา การเต้นก็เป็นประโยชน์ค่ะ! หรือต้องบอกว่าการเต้นทำให้งานมีความยืดหยุ่นนะ...!"
10039030-51 = "อย่างนี้นี่เอง...!"
10039030-52 = "แต่ถ้าสถานการณ์ไปถึงขั้นนั้นก็ไม่ใช่เรื่องดีแน่ คงจะดีกว่าถ้าไม่เกิดเรื่องแบบนั้นตั้งแต่แรกน่ะ"
10039030-53 = "จะว่าไป คุณซิสเตอร์..."
10039030-58 = "[ns7] \"เสียงนี้มัน...?\"\n[ns8] \"เสียงเตือนภัยนี่นา?\""
10039030-61 = "เกิดเหตุแล้วค่ะ...! ฟุบุกิ! ต้องออกปฏิบัติการค่ะ!!"
10039030-63 = "ไหงงั้นล่ะ? ไหนว่าเราไม่ต้องทำงานเพราะจะมาเตรียมตัวเป็นไอดอลกันไง เราต้องออกไปด้วยเหรอ?"
10039030-64 = "ไม่เหมือนที่คุยกันไว้นี่นา..."
10039030-69 = "ตอนนี้ไม่มีคนอื่นนี่คะ! พวกเราต้องไปกันก่อนสิ แล้วสถานที่เกิดเหตุก็..."
10039030-73 = "เอ๋...?"
10039030-74 = "ร้านโดนัทเจ้าประจำของฟุบุกินี่คะ??"
10039030-75 = "...?"
10039030-76 = "ว่าไงนะ...?"
10039030-77 = "ร้านที่บอกว่าเป็นสปอนเซอร์ให้น่ะเหรอคะ...?"
10039030-78 = "ไม่ใช่เวลามาอยู่เฉยแล้วนะคะ ฟุบุกิ! พวกเราจะไปที่เกิดเหตุกันเดี๋ยวนี้ค่ะ!!"
10039030-79 = "เฮ้อ ก็บอกอยู่ว่า...! ดะ... เดี๋ยวก่อน! เดี๋ยว...!!"
10039030-93 = "ทุกคนหยุด อย่าขยับ!! อย่าคิดทำอะไรโง่ๆ นะ!!"
10039030-94 = "พวกเราก็แค่จะกินโดนัทก็เท่านั้น! ถ้ายอมให้โดนัทแต่โดยดี ก็ไม่มีใครบาดเจ็บหรอก!!"
10039030-95 = "ฮะ... เฮือก...! อย่าทำอย่างนี้เลยค่ะ...!"
10039030-96 = "ถ้าไม่อยากให้ทำ ก็เอาโดนัทมาสิ! มัวแต่ยึกยักๆ ยื้อเวลาจนพวกวัลคิรี่มาถึงแล้วเนี่ย!!"
10039030-97 = "ตะ... แต่คุณก็ต้องจ่ายค่าโดนัทก่อนสิคะ ร้านเราไม่มีบริการเก็บเงินทีหลัง..."
10039030-98 = "คิดว่าพวกฉันไม่รู้หรือไง!! จะบ้าตาย มีเด็กพาร์ทไทม์ที่ขอให้โจรจ่ายเงินด้วยเหรอเนี่ย!!"
10039030-99 = "ฮะ... ฮือ...!! เจ้าของร้านสั่งไว้ว่าให้เก็บเงินก่อนค่ะ ร้านเราจ่ายสดงดเชื่อค่ะ!!"
10039030-100 = "ไม่คิดเลยนะว่าจะได้เจอเด็กพาร์ทไทม์ที่พูดไม่รู้เรื่องแบบนี้"
10039030-101 = "ปกติเด็กพาร์ทไทม์ก็พูดไม่รู้เรื่องอยู่แล้วน่า ไม่รู้หรอกเหรอ?"
10039030-102 = "มันก็จริงอยู่หรอก..."
10039030-103 = "อึก... ให้ตายเถอะ ขืนชักช้าอยู่แบบนี้ พวกวัลคิรี่ได้ล้อมพวกเราไว้แน่"
10039030-104 = "ในเมื่อเป็นแบบนี้ก็ต้องจับตัวประกันไว้! แล้วก็ต่อรองขอรถเอาไว้หนีด้วย!!"
10039030-106 = "เฮ้อ จริงๆ เลยเชียว ทำไมถึงเป็นเรื่องใหญ่โตขนาดนี้ไปได้นะ..."
10039030-107 = "ก็เพราะเธอคนเดียวนี่ละ!!"
10039030-108 = "ทำไมถึงมาโทษฉันล่ะคะ!? พวกคุณต่างหากที่ผิด!"
10039030-110 = "มันก็ใช่น่ะนะ"
10039030-111 = "อย่าไปบ้าจี้ตามยัยนั่นสิ!!!"
10039030-113 = "จับตัวประกันร้านโดนัทตอนกลางวันแสกๆ เหรอคะเนี่ย... ไม่อยากจะเชื่อเลยค่ะ!"
10039030-114 = "พอเทียบกับสิ่งที่เกิดขึ้นแล้ว เหตุจูงใจมันดูเล็กน้อยจนไร้สาระเลย..."
10039030-119 = "โอ๊ะ คิริโนะ! ฟุบุกิ! มาได้ทันเวลาเลย!!"
10039030-120 = "เราเกลี้ยกล่อมพวกนั้นมา 20 นาทีแล้ว ทำยังไงดีล่ะ?"
10039030-121 = "ตอนแรกพวกนั้นอยากได้แค่โดนัท แต่ตอนนี้บอกว่าจะขอรถสำหรับหลบหนีด้วยน่ะสิ งานนี้น่าจะเหนื่อยขึ้นเรื่อยๆ เลย"
10039030-123 = "อืม... แล้วมีใครมาอีกหรือเปล่า? สำนักความมั่นคง หรือกรมความมั่นคงสาธารณะน่ะ..."
10039030-124 = "ได้รับแจ้งว่าจะมานะ แต่ก็น่าจะต้องใช้เวลาหน่อย"
10039030-125 = "ฉันว่าพวกเราน่าจะต้องคลี่คลายสถานการณ์ตรงนี้กันเองแล้วละ..."
10039030-126 = "ฮึ่ม... สุดท้ายก็เป็นอย่างนี้งั้นเหรอ..."
10039030-127 = "นั่นฟุบุกิจากสำนักรักษาความปลอดภัยไม่ใช่เหรอ!?"
10039030-128 = "จริงด้วย...! มาปกป้องร้านโดนัทเจ้าประจำด้วยตัวเองเลยสินะ!!"
10039030-129 = "เห็นว่าจะเข้าร่วมอีเวนต์ไอดอลกับทางร้านด้วย ก็เลยมาช่วยร้านเหรอเนี่ย?? เท่สุดๆ ไปเลย!!"
10039030-130 = "มะ... ไม่ใช่นะ ฉันไม่ได้ตั้งใจ..."
10039030-131 = "โอ๊ะ...!! ฟุบุกิจัง!!"
10039030-132 = "ฟุบุกิจังนี่นา ฟุบุกิจัง! ฉันอยู่ตรงนี้ค่ะ ตรงนี้~!"
10039030-133 = "ขอร้องละ อยู่เงียบๆ หน่อยได้มั้ย?! ทำเหมือนมีแฟนมีตติ้งไปได้!!"
10039030-134 = "นี่มันสถานการณ์อะไรกันเนี่ย?"
10039030-135 = "อ่า... อะ... อื้ม... สวัสดี..."
10039030-136 = "อืม...! เหตุการณ์ครั้งนี้ เห็นทีพวกเราต้องเข้าไปช่วยแล้วละค่ะ!!"
10039030-137 = "เราต้องช่วยตัวประกันให้ได้ก่อน จากนั้นก็จับกุมนักเรียนที่ก่อปัญหา...!"
10039030-138 = "แต่วิธีที่จะช่วยนี่สิ...! ฮึ่ม...!"
10039030-144 = "[ns9] \"มะ... มารี... จะไปไหนน่ะ!?\"\n[ns10] \"มารีเข้าไปในร้านเหรอ!?\""
10039030-153 = "เธอเป็นใครน่ะ...?"
10039030-155 = "ชุดนี้มัน... คุณซิสเตอร์... จากทรีนิตี้นี่นา? "
10039030-156 = "ทำไมชมรมซิสเตอร์ถึงมาอยู่ในที่แบบนี้ล่ะ...?"
10039030-163 = "...?"
10039030-165 = "...?????"
10039030-166 = "อะไรน่ะ...? ทำอะไรของเค้า?"
10039030-171 = "อะไรกัน...!"
10039030-173 = "เป็นอะไรของเธอน่ะ!? ทำไมทำท่าแบบนั้น!? ต้องการอะไรจากพวกเรากันแน่!!"
10039030-180 = "นี่!! ฟังไม่รู้เรื่องหรือไง!?"
10039030-181 = "พวกฉันถามว่าทำอะไรอยู่!! ทำไมจู่ๆ ก็เข้ามาเต้นแบบนี้?!!"
10039030-188 = "ฉัน..."
10039030-189 = "ฉัน...?"
10039030-190 = "กำลัง..."
10039030-191 = "กำลัง...?"
10039030-192 = "เรียก..."
10039030-193 = "ฉันกำลังเรียกร้องความสนใจเพื่อถ่วงเวลาค่ะ!!"
10039030-199 = "ซวยแล้วไง...!!!"
10039030-200 = "อ๊ะ ได้จังหวะแล้ว~!"
10039030-205 = "อะไรกัน หลอกพวกฉันเรอะ...!!"
10039030-206 = "ตอนนี้ค่ะ!! ได้จังหวะแล้ว ทุกคนบุกเลยค่ะ!!!"
10039030-221 = "ว้าว..."
10039030-222 = "ได้ผลจริงด้วย..."

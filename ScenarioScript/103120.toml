103120-132 = "..."
103120-134 = "That is why I like the name Kei."
103120-135 = "It is a name that came to be just because of a mispronunciation. Like my name, Aris."
103120-136 = "There is no reason, meaning, or purpose behind \"Kei.\""
103120-138 = "You... You don't want me to suffer anymore? Even if I only exist to destroy the world? I don't have to...be alone?"

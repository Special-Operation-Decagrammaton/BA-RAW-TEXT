103120-1 = "Episode 12;The Right of the Light 1"
103120-5 = "I-It can't be..."
103120-6 = "We thought we could go toe-to-toe with this monstrosity? The hubris..."
103120-7 = "Slow down the ship! At this rate, we'll collide with the deformed multidimensional barrier over there!"

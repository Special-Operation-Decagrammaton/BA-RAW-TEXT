103120-112 = "Please let me apologize to you."
103120-113 = "I rejected you. I turned you away because I did not understand you. I wanted to run away from this thing I did not understand."
103120-114 = "I was so afraid of you. That was not an excuse to turn you away."
103120-115 = "Even if I was afraid... Even if I could not understand... I should have faced you like this."
103120-117 = "..."
103120-119 = "I do not know you, Kei. But I thought about how I would feel if I were in your shoes."
103120-120 = "If Kei's purpose is to be the key that leads to the destruction of the world, you must bear much pain and loneliness all on your own."

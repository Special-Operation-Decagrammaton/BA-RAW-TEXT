[translation]
103120-1 = "第12話;「勇者」的資格（１）"
103120-5 = "怎麼，會……"
103120-6 = "那麼，我們正在對抗的敵人究竟是……！？"
103120-7 = "降低戰艦的速度吧！#n這樣下去會撞上那個變形的多次元防護罩的！"
103120-8 = "如果在沒有連動的狀態下發生碰撞──#n我們就只有被吸入未知的次元，或是直接粉身碎骨這兩種可能啊！"
103120-9 = "那，那個……就算降低速度，也無法避免碰撞……！"
103120-10 = "沒有其他方法嗎。"
103120-12 = "……沒有。那與其說是科學，更像是一種概念。#n能夠瓦解那種狀態的手段，現在不可能存在……"
103120-13 = "──除了一個方法之外。"
103120-14 = "……！！"
103120-15 = "如果那是複製了「阿特拉哈西斯的方舟」這個概念的存在，#n那麼可以介入的就只有……"
103120-16 = "……作為相同存在的[ruby= ・     ・ ]方舟[/ruby]而已吧。"
103120-17 = "相同的，方舟……？"
103120-18 = "……！！#n難道……！"
103120-19 = "突，突然在說什麼！？#n方舟什麼的究竟──"
103120-20 = "不，絕對不行！！#n再做出那種事的話……"
103120-21 = "大姐頭，你這個人真的是──！"
103120-23 = "碰撞倒數6分鐘……！#n現在不是吵架的時候了，什麼都可以，動作快……！"
103120-25 = "──愛麗絲，明白了。"
103120-30 = "愛，愛麗絲……？"
103120-31 = "……"
103120-32 = "莉央會長，原來你在這裡啊。#n可以再見到你，真是太好了。"
103120-34 = "愛麗絲醬……"
103120-35 = "咦，會長！？#n話說，躲起來派出無人機是什麼意思啊！？"
103120-37 = "……愛麗絲，"
103120-38 = "我──"
103120-39 = "是，愛麗絲知道。"
103120-40 = "現在這個狀況──需要身為「無名諸神的王女」的愛麗絲的力量對吧。"
103120-42 = "但，但是愛麗絲醬……！"
103120-43 = "不，不行唷愛麗絲！！"
103120-44 = "又會發生那種──"
103120-45 = "愛麗絲醬……！"
103120-46 = "[s]「大家先等一下。」"
103120-48 = "……"
103120-52 = "[ns]「聽愛麗絲把話說完吧。」"
103120-55 = "嗯，嗯……"
103120-56 = "愛麗絲醬……把想說的話都告訴我們吧。"
103120-62 = "是──桃井，綠，柚子。"
103120-63 = "還有優香，陽葵前輩，莉央會長。"
103120-64 = "……老師。"
103120-65 = "老師說過，愛麗絲想成為的存在可以由愛麗絲自己決定。"
103120-66 = "愛麗絲是「無名諸神的王女」，也是「遊戲開發部」的成員──#n是「千年的學生」，也是「夏萊的學生」。"
103120-67 = "愛麗絲……是「魔王」也是「勇者」。"
103120-68 = "……愛麗絲，是愛麗絲想成為的「愛麗絲」。"
103120-69 = "所以愛麗絲會以「無名諸神的王女」的身分……"
103120-73 = "請求「Kei」的幫助。"
103120-75 = "……！！"
103120-77 = "愛麗絲的「阿特拉哈西斯的方舟」……如果能克服眼前的危機的話，"
103120-78 = "如果能用它──拯救世界的話，"
103120-79 = "「阿特拉哈西斯的方舟」就不再是毀滅世界的兵器──#n而是能成為拯救世界的，勇者的武器。"
103120-80 = "愛麗絲，這……"
103120-81 = "如果這樣可以拯救世界的話，愛麗絲也希望能這麼做。"
103120-82 = "這樣一來，陽葵前輩就不需要再繼續怨恨莉央會長了。"
103120-83 = "而莉央會長也不需要再厭惡自己、隱藏自己了。"
103120-84 = "我，對自己……？"
103120-85 = "……愛麗絲。"
103120-86 = "這是愛麗絲的──"
103120-87 = "「勇者」的使命。"
103120-89 = "不……不能這麼做。"
103120-90 = "生命守護者本艦啟動時，你之所以能奇蹟般地毫髮無傷……"
103120-91 = "是因為這一切的代價和傷害──都被那個「大人」承擔了。"
103120-92 = "但是，那也很快就會迎來終結吧。#n那個大人將無法負荷傷勢，結束生命吧。"
103120-93 = "在那樣的狀態下，如果再次生成「方舟」──"
103120-94 = "那樣的話……"
103120-95 = "……"
103120-96 = "王女啊，你會……"
103120-107 = "Kei。"
103120-108 = "王女……不能這麼做。如果現在再次啟動方舟協議的話，你會──"
103120-109 = "Kei……對不起。"
103120-110 = "……為何要道歉呢？"
103120-112 = "愛麗絲一直想向你道歉。"
103120-113 = "因為愛麗絲無法理解Kei，所以拒絕了你、不正視你……#n想要逃離Kei。"
103120-114 = "恐懼著、害怕著Kei……#n明明不該視而不見……"
103120-115 = "就算無法理解……也應該好好面對Kei才對。"
103120-117 = "……"
103120-119 = "因為愛麗絲不太知道Kei的事……所以試著站在Kei的立場想過。"
103120-120 = "如果作為引導世界走向滅亡的「鑰匙」就是Kei存在的理由……#n那一定會很痛苦吧……"
103120-123 = "所以愛麗絲不禁這麼想，Kei是不是也一直都很痛苦呢。"
103120-125 = "王女啊，我──"
103120-127 = "老師告訴過愛麗絲，自己想成為的存在可以由自己決定。"
103120-130 = "Kei也能成為自己想成為的存在。#n不需要經過他人的允許。"
103120-132 = "……"
103120-134 = "所以愛麗絲覺得「Kei」這個名字，是個非常好的名字。"
103120-135 = "Kei是不小心念錯的名字……就像愛麗絲的名字一樣。"
103120-136 = "沒有特別的理由、目的和意義。"
103120-138 = "……所以，你希望讓我這個摧毀世界的存在，不用再繼續感到痛苦嗎？"
103120-139 = "你想要，拯救我嗎？#n……是這樣嗎，王女啊。"
103120-141 = "……愛麗絲不知道愛麗絲是不是能拯救他人的那種存在。"
103120-142 = "因為愛麗絲只是「見習」勇者……但是，"
103120-145 = "愛麗絲相信──#n想要拯救他人的心意，正是「勇者」的資格。"
103120-147 = "……"
103120-156 = "…………開始啟動。"
103120-157 = "啊，咦，愛麗絲？"
103120-158 = "哇啊！？愛麗絲醬……！？"
103120-159 = "愛麗絲……不，這是＜Key＞……？"
103120-160 = "……不，等等。"
103120-161 = "……代號「AL-1S」啟動完畢。"
103120-162 = "執行協議ATRAHASIS。"
103120-163 = "愛，愛麗絲……"
103120-164 = "沒，沒問題吧？"
103120-165 = "……"
103120-170 = "[ns]「沒問題的──相信愛麗絲吧。」"
103120-174 = "愛，愛麗絲醬……！？"
103120-175 = "……是愛麗絲醬吧？"
103120-176 = "是。愛麗絲沒事。"
103120-177 = "……也就是說，你讓「無名之神」的＜Key＞服從你了嗎？"
103120-178 = "……不，這不是服從──"
103120-179 = "是的。Kei答應了愛麗絲的願望。"
103120-180 = "……？"
103120-181 = "但是，愛麗絲一個人是做不到的。#n現在的愛麗絲需要大家……"
103120-182 = "以及莉央會長的力量。"
103120-183 = "我，我的……？"
103120-187 = "請讓愛麗絲看看你的臉吧，莉央[ruby= ・     ・ ]前輩[/ruby]。"
103120-188 = "……我，我……"
103120-197 = "……"
103120-198 = "……愛麗絲很想見到莉央前輩。"
103120-201 = "總覺得好像變得比之前瘦了。有好好睡覺嗎？"
103120-202 = "愛麗絲，我……"
103120-203 = "……我，"
103120-204 = "……因為我的選擇，讓你──"
103120-206 = "莉央前輩……不用向愛麗絲道歉也沒關係。"
103120-207 = "……當然，你也不會原諒我吧……"
103120-208 = "──沒有原諒的必要。"
103120-209 = "因為……夥伴之間，就算不用說出口也能傳達彼此的心意。"
103120-213 = "我是……"
103120-214 = "你的……「夥伴」……？"
103120-215 = "是的。莉央前輩是愛麗絲的夥伴。"
103120-216 = "因為莉央前輩幫助了老師和陽葵前輩……而且，也幫助了大家。#n所以已經是「夥伴」了。"
103120-217 = "但，但是我……對你……"
103120-218 = "沒關係的。"
103120-219 = "前期的頭目在後期成為夥伴也是常有的事。#n聽說這就叫做王道劇情。所以沒關係的。"
103120-223 = "莉央前輩為了守護這個世界，比任何人都努力。"
103120-224 = "愛麗絲希望能向這麼厲害的人傳達……「謝謝你願意成為愛麗絲的夥伴」。"
103120-226 = "……我，"
103120-227 = "……我……把你……"
103120-228 = "……"
103120-234 = "那麼，要開始了！"
103120-235 = "現在輪到愛麗絲了！！"
103120-236 = "愛麗絲醬！加油！！"
103120-237 = "拜託了，愛麗絲！把魔王城炸飛吧！！"
103120-238 = "愛麗絲醬……拜託你了……！！"
103120-249 = "……"
103120-251 = "為了確保連結至AL-1S的可用資源，將執行全面搜索。"
103120-253 = "擴大資源領域。"
103120-255 = "資源名稱．「生命守護者」的全體可用資源──確認為9999萬艾位元組。"
103120-261 = "……從這個時刻開始，啟動ATRAHASIS協議。"
103120-263 = "開始代號名稱「阿特拉哈西斯的方舟」啟動程序。"
103120-266 = "王女獲得了鑰匙，方舟也準備就緒。"
103120-271 = "無名諸神的王女AL-1S同意──#n新的[ruby=聖所]聖域[/ruby]在此降臨────！"
103120-279 = "???"
103120-280 = "＜＜＜我的…………＞＞＞"
103120-283 = "???"
103120-284 = "＜＜＜我重要的…………＞＞＞"
103120-287 = "???"
103120-288 = "＜＜＜我重要的…………啊。＞＞＞"
103120-292 = "???"
103120-293 = "＜＜＜我重要的…………愛麗絲＞＞＞"
103120-297 = "Kei"
103120-298 = "＜＜＜我重要的…………愛麗絲＞＞＞"
103120-305 = "下一話;「勇者」的資格（２）"

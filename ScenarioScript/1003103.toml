1003103-18 = "#wait;1000"
1003103-19 = "5;아루 정월;07;(흥! 어때. 선생님! 비싼 돈을 들인 만큼, 보라고! 이 고급스러운 원단에서 자연스레 배어 나오는 단아한 분위기!)\n#5;em;[!]"
1003103-20 = "5;아루 정월;14;(이거라면 그때 내가 단순히 점원 말에 넘어간 게 아니라는 걸,)"
1003103-21 = "5;아루 정월;08;(내 탁월한 사업적 안목의 결과란 걸 선생님도 인정할 수밖에 없……!)\n#5;em;[음표]\n#5;greeting"
1003103-22 = "[s] \"아루의 그 옷…….\""
1003103-23 = "5;아루 정월;11;자, 잠깐 타, 타임! 아직, 마, 마음의 준비가 안 됐으니까!\n#5;em;[?!]\n#5;shake"
1003103-24 = "5;아루 정월;06;(여, 역시 소감을 직접 듣는 건, 무, 무리야!)\n#5;stiff"
1003103-25 = "5;아루 정월;06;(물론 그럴 리는 없다고 생각하지만, 만약에. 혹시라도 정말로 만약에…….)"
1003103-26 = "5;아루 정월;15;(이상하다거나, 어울리지 않는다거나 하는 말을 선생님에게 듣기라도 했다간…….)\n#5;stiff\n#5;em;[속상함]"

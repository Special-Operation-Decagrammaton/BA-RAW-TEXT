1003103-14 = "[s] \"…….\""
1003103-15 = "5;아루 정월;10;저……. 선생님?\n#5;em;…\n#5;stiff"
1003103-16 = "5;아루 정월;04;왜, 왜 그래? 아무 말 없이 빤히 바라보기만 하고……"

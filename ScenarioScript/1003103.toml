[translation]
1003103-1 = "ภาพลักษณ์ที่อยากให้เห็น"
1003103-3 = "(พอถึงเวลานัด คุณครูก็ออกมาที่สถานที่ที่นัดพบกับอารุ)"
1003103-4 = "(เมื่อไปถึงก็เจออารุรออยู่)"
1003103-6 = "อืม... แต่งตัวแบบนี้ไม่แปลกใช่มั้ย?"
1003103-7 = "สายตาที่เฉียบแหลมของฉันไม่มีทางพลาดหรอก"
1003103-8 = "ไม่มีกระจกเลยรึไงนะ..."
1003103-9 = "[s] \"อารุ?\""
1003103-10 = "อ๊ะ?! คะ... คุณครู?!"
1003103-11 = "มาตั้งแต่เมื่อไรน่ะ? ตกใจหมดเลย"
1003103-12 = "ค่อยยังชั่วหน่อยที่มาตรงเวลานะ! วันนี้เป็นงานที่สำคัญมากเลยน่ะ"
1003103-13 = "ถ้ามาช้าคงแย่แน่ๆ..."
1003103-14 = "[s] \"......\""
1003103-15 = "เอ่อ... คุณครู?"
1003103-16 = "มะ...มีอะไรเหรอ? ทำไมถึงจ้องฉันแล้วไม่พูดอะไรเลยล่ะ..."
1003103-19 = "(หึ! เป็นไงล่ะคุณครู! มองให้สมกับราคาชุดซะเลยสิ! ดูออร่าสุดหรูหราที่แผ่ออกมาจากชุดนี้ให้ดี!)"
1003103-20 = "(แบบนี้แสดงให้เห็นว่าฉันไม่ได้หลงเชื่อคำพูดของพนักงานร้านง่ายๆ)"
1003103-21 = "(คุณครูไม่มีทางเลือกนอกจากยอมรับว่าฉันมีสายตาที่เฉียบแหลมสินะ...!)"
1003103-22 = "[s] \"ชุดของอารุ...\""
1003103-23 = "ดะ...เดี๋ยวก่อน ขะ...ขอเวลาเดี๋ยว! ฉันยังไม่ได้เตรียมใจเลย!"
1003103-24 = "(วะ...ว่าแล้วเชียว กะ..การฟังคำชมตรงๆ มัน...ไม่ไหวจริงๆ!)"
1003103-25 = "(คุณครูไม่น่าพูดอะไรแปลกๆ หรอก แต่ก็เตรียมใจเผื่อไว้ดีกว่า...)"
1003103-26 = "(เผื่อถ้าคุณครูบอกว่าแปลก หรือบอกว่าไม่เหมาะ...)"
1003103-29 = "ฮู่...ฮู่... หายใจเข้าลึกๆ... อื้อ พร้อมแล้วละ!"
1003103-30 = "อะ...แฮ่ม! อะแฮ่ม! คือว่าคุณครู... ตามที่บอกไปใน MOMOTALK ว่าวันนี้ฉันจะไปยังสถานที่ที่สำคัญ#nเพราะงั้นมาโฟกัสเรื่องนั้นกันก่อนเถอะ"
1003103-31 = "คราวนี้ฉันได้รับบัตรเชิญมาจากคนรู้จักน่ะ~"
1003103-32 = "หืม...? คนรู้จักของฉัน...น่าสงสัยงั้นเหรอ? มะ... มันเสียมารยาทนะ!"
1003103-33 = "บัตรเชิญไปร่วมงานปาร์ตี้พิเศษฉลองวันปีใหม่ของนักธุรกิจในคิโวทอสน่ะ!"
1003103-34 = "[s1] \"เลยจะใส่ชุดนั้นไปงานปาร์ตี้เหรอ?\"\n[s2] \"ไปงานสำคัญจริงๆ สินะ\""
1003103-35 = "อื้อ ใช่แล้ว! ดีจริงๆ ที่ไปเช่าชุดกิโมโนมาเนี่ย เป็นเพราะเซนส์ด้านธุรกิจที่ยอดเยี่ยมของฉันจริงๆ ด้วย~♪"
1003103-36 = "อื้อ ใช่แล้ว! ดีจริงๆ ที่ไปเช่าชุดกิโมโนมาเนี่ย เป็นเพราะเซนส์ด้านธุรกิจที่ยอดเยี่ยมของฉันจริงๆ ด้วย~♪"
1003103-37 = "เตรียมตัวได้เพอร์เฟ็ก...!"
1003103-41 = "มะ...ไม่ควรโอ้เอ้กันแล้ว เอาละ คุณครู รีบไปกันเถอะ! ไม่งั้นจะไปปาร์ตี้สายเอานะ♪"
1003103-44 = "คนเยอะสุดๆ เลยใช่มั้ยล่ะ?"
1003103-45 = "งานนี้เป็นงานสำคัญที่นักธุรกิจเก่งๆ ในคิโวทอสมารวมตัวกัน"
1003103-46 = "หรือจะเรียกว่าเป็นสถานที่รวมตัวเพื่อแลกเปลี่ยนไอเดียทางธุรกิจหรือความเห็นต่างๆ กันก็ได้"
1003103-47 = "ถ้ามางานนี้ก็จะได้เจอกับธุรกิจใหม่ๆ ผ่านการพูดคุยพบปะคนอื่นๆ หรืออาจจะได้เจอกับลูกค้า#nที่อาจเป็นประโยชน์กับหน่วยรับจ้างสารพัดของเราก็ได้นะ"
1003103-48 = "[s] \"ไปเอาบัตรเชิญมาจากไหนน่ะ?\""
1003103-49 = "ฮุฮุ นั่นก็เพราะว่าฉันคือริคุฮาชิมะ อารุ หัวหน้าและประธานของ <หน่วยรับจ้างสารพัด 68> ยังไงล่ะ แบบนี้ก็แสดงให้เห็นว่ามีคนยอมรับฉันเพิ่มมากขึ้นด้วย"
1003103-50 = "[s] \"อารุนี่สุดยอดเลยนะ\""
1003103-51 = "สะ...สุดยอดเหรอ? งะ...งั้นเหรอ? คุณครูคิดแบบนั้นสินะ"
1003103-54 = "(ใช่เลย ใช่แล้ว! นี่แหละโอกาสแสดงฝีมือด้านธุรกิจให้คุณครูได้เห็น...)"
1003103-55 = "(ถึงฉันจะไม่เคยได้ยินคุณครูชมเรื่องฝีมือด้านธุรกิจมาก่อน แต่ถ้าคืนนี้ไปได้สวย คุณครูก็คงจะมอง#nฉันใหม่แน่ๆ อื้อ เอาตามนี้แหละ)"
1003103-58 = "ฮุฮุ! จะชมฉันอีกก็ได้นะ! เพราะในงานนี้ก็มีลูกค้าของหน่วยรับจ้างสารพัดอยู่ด้วยเหมือนกัน~"
1003103-59 = "ฉันจะไปคุยกับพวกเขาสักหน่อย คุณครูรู้ใช่มั้ย... การให้คำปรึกษาลูกค้าน่ะ"
1003103-60 = "อืม คุยเรื่องธุรกิจน่ะ...!"
1003103-61 = "ตอนนี้หน่วยรับจ้างสารพัดของเรากำลังเตรียมทำธุรกิจที่สำคัญมากๆ อยู่ และมีลูกค้าบางคน#nที่เราจะต้องไปคุยด้วย"
1003103-62 = "ชื่นชมฉันที่ขยันทำงานแม้แต่ในวันปีใหม่ซะเถอะ คุณครู"
1003103-63 = "[s] \"ลูกค้าของอารุงั้นเหรอ สงสัยจังว่าจะเป็นคนแบบไหน\""
1003103-64 = "ไม่ได้ยิ่งใหญ่อะไรหรอก อย่าเพิ่งคาดหวังมากไปล่ะ แต่ก็นะ... คอยดูฉันให้ดีๆ ก็แล้วกัน"
1003103-65 = "ฉันจะแสดงฝีมือของนักธุรกิจตัวจริงให้ดูเอง! ฮุฮุฮุฮุ!"
1003103-66 = "ฮุฮุฮุ"
1003103-67 = "ฮุ...ฮุ..."
1003103-68 = "ฮุ..."
1003103-71 = "(มะ...ไม่นะ~!)"
1003103-72 = "(ที่จริงเพิ่งได้รับบัตรเชิญมาแท้ๆ... จะมีลูกค้าที่ต้องไปเจอได้ยังไงกันเล่า!)"
1003103-73 = "(ดันโม้เกินพิกัดไปซะแล้ว! ถ้างั้นตอนนี้ควรพูดแก้สถานการณ์ซะก่อน...)"
1003103-74 = "(แต่ว่า...ถ้ามากลับคำตอนนี้ก็ดูน่าอายเกินไปนะ)"
1003103-75 = "[ns] \"แล้วลูกค้าคนนั้นอยู่ไหนล่ะ?\""
1003103-76 = "หะ...หืม? คือว่าเรื่องนั้น..."
1003103-77 = "(แบบนี้จะทำยังไงดี!)"
1003103-78 = "(อ๊ะ จริงสิ! บอกว่านัดเจอกันวันนี้ แต่ว่าคนคนนั้นกลับติดธุระด่วนมาไม่ได้แล้วกัน)"
1003103-79 = "(ใช่แล้ว บอกไปแบบนี้แหละ!)"
1003103-80 = "เมื่อกี้ลองหาดูในรายชื่อแขกที่มาร่วมงานแล้ว น่าเสียดายที่เหมือนวันนี้เขาไม่ได้มาน่ะ"
1003103-81 = "หืม...? ลูกค้าคนนั้นชื่ออะไรงั้นเหรอ?"
1003103-82 = "คือว่า... ชื่องั้นเหรอ เพื่อปกป้องความลับของผู้ว่าจ้าง พวกเราเลยเรียกกันแต่ชื่อเล่นน่ะ"
1003103-83 = "อย่างเช่นทะ...ท่านเคาต์ขนมคางามิโมจิปีใหม่...?"
1003103-88 = "โอ๊ะ ดีใจจังที่คุณมาร่วมปาร์ตี้มื้อค่ำคราวนี้ด้วย ท่านเคาต์ขนมคางามิโมจิปีใหม่"
1003103-89 = "ฮ่าฮ่าฮ่า! ไม่เจอกันนานเลยนะครับ! ท่านประธานที่ชอบโอเซจิ!"
1003103-90 = "มีจริงๆ ด้วยเรอะ! ท่านเคาต์ขนมคางามิโมจิปีใหม่น่ะ!!"
1003103-91 = "เดี๋ยวก่อนสิ..."
1003103-92 = "จริงด้วยสิ! ขะ...เขาเป็นลูกค้า! ตะ...ต้องไปทักทายก่อน"
1003103-93 = "คุณครู ฉันเอ่อ... ขอไปคุยกับลูกค้าก่อนนะ..."
1003103-94 = "(จะทำยังไงดี~! คะ...คิดเร็วเข้า คิดเร็วเข้าอารุ...! จะแก้สถานการณ์ยังไงดี...!)"
1003103-105 = "หืม?"
1003103-106 = "คุณหนู... มีอะไรจะคุยกับพวกเราเหรอ?"
1003103-107 = "คือว่าเรื่องนั้น... ค่ะ เอ่อคือว่า..."
1003103-111 = "(ฉันทำไม่ได้จริงๆ)"
1003103-112 = "อะ...อึก...! ขอโทษด้วยค่าาาา!"
1003103-114 = "อ๊ะ...!"
1003103-118 = "อ๊ายยย... คะ... คุณครู? เป็นอะไรรึเปล่า?!"
1003103-119 = "ขะ...ขอโทษ! คือ ฉันไม่ชินกับชุดนี้เลยสะดุด จะลุกขึ้นเดี๋ยวนี้ล่ะ...!"
1003103-123 = "อ๊ะ! ขะ..ข้อเท้า!"
1003103-124 = "ดูเหมือนข้อเท้าแพลงซะแล้ว ลุกขึ้นไม่ได้..."
1003103-133 = "หืม? เดี๋ยวสิ... คุณครูจะทำอะไรน่ะ...!"
1003103-134 = "(นะ..นี่มัน... อุ้มท่าแบบเจ้าหญิง? จะ...ใจกล้าเกินไปรึเปล่า คนอื่นๆ กำลังมองอยู่นะ?!)"
1003103-135 = "[s3] \"ขอโทษนะ แต่ครูคงปล่อยให้อารุนั่งอยู่แบบนี้ไม่ได้หรอก\"\n[s4] \"ไม่ชอบให้ทำแบบนี้รึเปล่า?\""
1003103-136 = "ไม่ได้ไม่ชอบสักหน่อย..."
1003103-137 = "ไม่ได้ไม่ชอบสักหน่อย..."
1003103-138 = "คะ...แค่นี้น่ะเรื่องจิ๊บๆ..."
1003103-139 = "คุณครูไม่ต้องใส่ใจก็ได้นะ"
1003103-140 = "[s] \"เวลาแบบนี้พึ่งพาครูบ้างก็ได้\""
1003103-141 = "อือ..."
1003103-142 = "คะ...คะ?!"
1003103-143 = "ถะ...ถ้างั้น... ขะ..ขอเสียมารยาทหน่อยนะ"
1003103-145 = "(คุณครูอุ้มอารุออกมาจากงานปาร์ตี้และนั่งพักตรงด้านหน้าตึกอยู่ครู่หนึ่ง)"
1003103-148 = "ปะ...ปล่อยฉันลงได้แล้วละ! ถะ...ถ้าคุณครูอุ้มฉันต่อไปแบบนี้ มะ...มันน่าอายนะ!"
1003103-149 = "ข้อเท้าฉันไม่เจ็บเท่าไรแล้ว"
1003103-150 = "คือว่า..."
1003103-154 = "คุณครู... คือว่าวันนี้น่ะ..."
1003103-155 = "[s5] \"โทษทีๆ ครูทำเกินไปสินะ?\"\n[s6] \"แกล้งอารุแบบนี้ก็สนุกดีนะ\""
1003103-158 = "หาาา?!"
1003103-159 = "เฮ้อ เล่นเอารู้สึกหมดแรงเลยนะ แต่เอาเถอะ ฉันเองก็โม้เกินเหตุไปหน่อยเหมือนกัน"
1003103-160 = "สุดท้ายแผนการที่จะแสดงด้านที่ยอดเยี่ยมของฉันให้คุณครูดู... ก็พังจนได้..."
1003103-161 = "[s] \"ปกติอารุก็ดูยอดเยี่ยมมากๆ อยู่แล้วนะ\""
1003103-162 = "!!"
1003103-163 = "พูดเรื่องแบบนั้นสบายๆ อีกแล้วนะ... คุณครู..."
1003103-164 = "อื้อ... ก็ได้ ถึงคราวนี้จะเกิดเรื่องหลายๆ อย่างจนแผนพังไม่เป็นท่า"
1003103-165 = "อื้อ! เอาเป็นว่าหายกันก็แล้วกันนะ!"
1003103-166 = "แทนที่จะมานั่งเสียใจกับเรื่องที่ผ่านไปแล้ว คราวหน้าฉันจะแสดงด้านที่ยอดเยี่ยมของฉันให้ดูให้ได้เลย!"
1003103-167 = "[s] \"อื้อ แล้วครูจะรอนะ\""
1003103-168 = "โธ่... คุณครูเนี่ย พูดแบบนั้นอีกแล้ว จริงๆ เลยนะ แต่ฉันก็คิดไว้แล้วละว่าคุณครูต้องพูดแบบนั้น คราวหน้าฉันจะทำให้เห็นเอง!"
1003103-169 = "ฉันไม่ได้ตกใจกับคำพูดที่คุณครูพูดเมื่อกี้หรอก...! สมกับเป็นหุ้นส่วนของฉันจริงๆ เลยนะ#nดูถูกวาทศิลป์ไม่ได้จริงๆ เลย!"
1003103-170 = "เอาเถอะ!"
1003103-171 = "ถ้างั้น... เอาไว้คราวหน้า..."
1003103-172 = "ไปกับฉันอีกนะ คุณครู♪"

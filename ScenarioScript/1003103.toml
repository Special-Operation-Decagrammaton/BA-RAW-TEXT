1003103-44 = "3;아루 정월;02;사람이 무척 많지?\n#3;em;[반응]\n#3;a"
1003103-45 = "3;아루 정월;07;키보토스에서도 내로라하는 사업가들이 한자리에 모이는 중요한 자리야."
1003103-46 = "3;아루 정월;03;앞으로 펼칠 사업의 아이디어나, 각 분야에서 알아주는 이들이 의견을 교류하기 위해 모이는 화합의 장이라고나 할까?\n#3;em;[...]"
1003103-47 = "3;아루 정월;99;즉 이곳에 있다 보면, 오고 가는 이야기 속에서 새로운 사업 아이템을 찾거나, 우리 흥신소에게 도움이 되는 고객을 찾을 수 있을지도 모른다고?"
1003103-48 = "[s] \"그런 굉장한 자리의 초대장이, 어째서 아루에게?\""
1003103-49 = "3;아루 정월;13;후훗. 그야 나는 <흥신소 68>의 사장이자 리더인 리쿠하치마 아루라고? 뭐, 드디어 나를 인정하는 사람이 늘고 있다는 뜻이지.\n#3;em;[반짝]\n#3;greeting"
1003103-50 = "[s] \"아루는 굉장하네.\""
1003103-51 = "3;아루 정월;10;괴, 굉장해? 그, 그래? 그렇구나. 선생님이 그렇게 생각해준다면야, 뭐…….\n#3;em;[///]"

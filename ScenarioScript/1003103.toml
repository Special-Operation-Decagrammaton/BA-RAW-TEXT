1003103-28 = "3;아루 정월;99\n#3;a\n#3;em;[...]\n#wait;2500"
1003103-29 = "3;아루 정월;05;후우, 후아. 심호흡. 응. 됐어!\n#3;greeting"
1003103-30 = "3;아루 정월;10;흐, 흥. 크흠. 저기 선생님, 모모톡에서도 말했지만, 오늘은 품위 있고 중요한 장소에 찾아갈 거야. 그러니까 우선 그 일을 생각하자구.\n#3;em;[!]"
1003103-31 = "3;아루 정월;03;흐-흥. 이번에 아는 연줄을 통해 귀한 초대장 하나를 손에 넣었거든~"
1003103-32 = "3;아루 정월;04;……응? 내 연줄이라니, 수상하다고? 시, 실례네!\n#3;em;[?]\n#3;stiff"
1003103-33 = "3;아루 정월;13;키보토스에서도 알아주는 사업가가 마침 새해를 기념해 여는 특별 디너 파티의 초대장이라고?!"
1003103-34 = "[s1] \"그래서 오늘은 그 옷을 입고 디너 파티에?\"\n[s2] \"중요한 자리라는 게, 그런 의미였구나.\""
1003103-35 = "3;아루 정월;03;응, 맞아! 후후후. 역시 그때 기모노를 렌탈했던 건, 미래를 내다본 내 뛰어난 사업감각 덕분이었다는 거지~♪\n#3;em;[음표]\n#3;greeting"
1003103-36 = "3;아루 정월;03;응, 맞아! 후후후. 역시 그때 기모노를 렌탈했던 건, 미래를 내다본 내 뛰어난 사업감각 덕분이었다는 거지~♪\n#3;em;[음표]\n#3;greeting"

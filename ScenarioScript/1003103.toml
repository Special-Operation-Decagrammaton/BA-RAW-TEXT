1003103-1 = "#title;조금쯤은, 보여주고픈 모습"
1003103-2 = "#wait;2000"
1003103-3 = "#na;(그렇게 되어, 아루와 약속한 대로 정해진 시간에 맞춰 약속 장소 앞으로 나왔다.)"

[translation]
1003103-1 = "The Side You'd Like to Show"
1003103-3 = "(I kept my promise with Aru and came to the meeting spot at the time we agreed.)"
1003103-4 = "(I found Aru somewhere not too far away muttering to herself.)"
1003103-6 = "So. I-I don't look strange in this, do I?"
1003103-7 = "I picked it out myself with my outstanding insight for business."
1003103-8 = "...Do you happen to have a mirror on you?"
1003103-9 = "[s] \"Aru?\""
1003103-10 = "Ack! S-Sensei?!"
1003103-11 = "Wh-When did you get here? You surprised me."
1003103-12 = "N-Nevertheless, I'm glad you're here on time. Today is a very important day."
1003103-13 = "It would have been a big problem had you been late! So..."
1003103-14 = "[s] \"...\""
1003103-15 = "Uh...Sensei?"
1003103-16 = "What's gotten into you? You're just staring at me without saying a word."
1003103-19 = "(It may have been expensive, but now the elegant aura of this kimono finally has you in its grasp, Sensei! You can't escape the mature allure of its premium fabrics!)"
1003103-20 = "(You'll have no choice but to admit that I made a good purchase and didn't fall for that salesman's tactics back at the store.)"
1003103-21 = "(It was my outstanding business insight that guided my judgment and nothing else!)"
1003103-22 = "[s] \"Aru, you look...\""
1003103-23 = "W-Wait, time out! I'm not mentally prepared yet!"
1003103-24 = "(I should have known my heart can't take hearing Sensei's honest thoughts about how I look!)"
1003103-25 = "(Sensei would never say anything out of line, but what if...?)"
1003103-26 = "(What if Sensei tells me it looks weird or doesn't suit me?)"
1003103-29 = "*inhale* *exhale* Deep breaths. Okay!"
1003103-30 = "So, Sensei. As I said on MomoTalk, we'll be going somewhere classy and upscale this evening. Let's focus on that first and foremost."
1003103-31 = "I received an exclusive invite from a contact of mine!"
1003103-32 = "What was that? Since when do I have friends in high places?! H-How rude!"
1003103-33 = "It's an invitation to a special New Year's dinner party held by a well-known businessman in Kivotos!"
1003103-34 = "[s1] \"So that's what you chose to wear. Got it.\"\n[s2] \"So this is the important thing you've had coming up.\""
1003103-35 = "That's right! It was my keen business sense that led me to rent this kimono.#nI'm glad you finally understand! ♪"
1003103-36 = "That's right! It was my keen business sense that led me to renting this kimono. I'm glad you finally understand! ♪"
1003103-37 = "I'm always dressed for success!"
1003103-41 = "But never mind that. We need to get going or we'll be late to the party, Sensei! ♪"
1003103-44 = "Well, there sure is a crowd here, isn't there?"
1003103-45 = "Some of the most powerful businesspeople in all of Kivotos are gathered here tonight."
1003103-46 = "This is where titans of different fields are going to exchange ideas and opinions that will shape future development projects for years to come."
1003103-47 = "In other words, this is our chance to establish new relationships and secure new clients that can help further advance Problem Solver 68."
1003103-48 = "[s] \"How again did you get invited to this?\""
1003103-49 = "I'm Rikuhachima Aru, the boss and leader of Problem Solver 68! I was invited because more and more people are finally recognizing the kind of woman I am."
1003103-50 = "[s] \"You're amazing, Aru.\""
1003103-51 = "Y-You really think I'm amazing, Sensei...?"
1003103-54 = "(Yes, this is my chance! If I just show off my business skills tonight, then Sensei will surely...)"
1003103-55 = "(I may not have gotten to hear what Sensei thinks of how I look, but they'll fall for me for sure once I'm in my element. I can do this!)"
1003103-58 = "Heehee! Keep the compliments coming! Some of Problem Solver's clients are here as well."
1003103-59 = "I'll be looking out for them too. You know...doing consultations."
1003103-60 = "Uh, talking business! Yeah, it's all about business!"
1003103-61 = "It just so happens that Problem Solver has an important business venture already lined up, so I have a client to meet about that!"
1003103-62 = "You're going to be amazed by my flawless work ethic, even on New Year's, Sensei."
1003103-63 = "[s] \"I'm more curious about who your client is.\""
1003103-64 = "I don't want you to get your hopes too high, but you should look forward to meeting them."
1003103-65 = "I'll show you what being a true professional is all about!"
1003103-66 = "Heeheehee."
1003103-67 = "Hee...hee..."
1003103-68 = "Hee..."
1003103-71 = "(O-Oh, no!)"
1003103-72 = "(Th-The truth is I found my invitation by complete chance! I don't have any clients to meet here!)"
1003103-73 = "(Me and my big mouth! Why do I always get carried away and never set the record straight?!)"
1003103-74 = "(But I'm going to look so bad if I turn back now or get caught!)"
1003103-75 = "[ns] \"So where is this client of yours?\""
1003103-76 = "Wh-What? So, uh..."
1003103-77 = "(What am I going to do?!)"
1003103-78 = "(Oh! If I say that we were supposed to meet but they unfortunately couldn't make it...)"
1003103-79 = "(Yeah, I'll go with that!)"
1003103-80 = "I was looking through the guestbook earlier. Sadly, it doesn't seem they were able to join us this evening."
1003103-81 = "...Huh? Their name?"
1003103-82 = "O-Oh, I suppose I never did say did I? That's because, uh...privacy!#nWe have to protect their privacy as clients, so we often refer to them by#npseudonyms."
1003103-83 = "Such as the Earl of New Year's Kagami Mochi...?"
1003103-88 = "Oh, I'm so glad you made it to the dinner party this time, Earl of New Year's Kagami Mochi."
1003103-89 = "Hahaha! It's been a while, Boss I-Really-Love-Osechi!"
1003103-90 = "There really is an Earl of New Year's Kagami Mochi?!"
1003103-91 = "Huh?! So, the thing is..."
1003103-92 = "Right! Th-That's my client! I should go greet them..."
1003103-93 = "I'll be right back, Sensei. Let me just have a quick word with them..."
1003103-94 = "(What should I do?! Th-Think. There must be some way to get out of this...)"
1003103-105 = "Hmm?"
1003103-106 = "Is there something we can do for you, little lady?"
1003103-107 = "S-So, uh, yes, the thing is..."
1003103-111 = "(I can't do it!)"
1003103-112 = "U-Uh! E-Excuse me!"
1003103-114 = "Ah!"
1003103-118 = "Ouch... S-Sensei? Are you okay?!"
1003103-119 = "I-I'm sorry! I'm not used to these clothes, so I lost my footing. Let me just get up!"
1003103-123 = "Ahhh! My ankle!"
1003103-124 = "I think I sprained it. I-I can't get up."
1003103-133 = "Huh? Wait. Sensei, wh-what are you doing?!"
1003103-134 = "(A-Am I being princess carried?! But everyone is watching!)"
1003103-135 = "[s3] \"Sorry, but I can't just leave you lying here.\"\n[s4] \"Should I put you back down?\""
1003103-136 = "It's not that I don't appreciate it, but...!"
1003103-137 = "It's not that I don't appreciate it, but...!"
1003103-138 = "N-Never mind. I'm not fazed at all."
1003103-139 = "But seriously, Sensei! You don't have to be so considerate."
1003103-140 = "[s] \"I want you to be able to rely on me at times like this.\""
1003103-141 = "Uh..."
1003103-142 = "O-Okay."
1003103-143 = "You lead the way, then..."
1003103-145 = "(I carried Aru out of the party, and we decided to take a break in front of the building.)"
1003103-148 = "You can stop carrying me now! It's so embarrassing!"
1003103-149 = "Plus, my ankle feels a lot better."
1003103-150 = "*pant* *pant* So..."
1003103-154 = "About today, Sensei."
1003103-155 = "[s5] \"Sorry. I guess I went too far, huh?\"\n[s6] \"You're so fun to tease, Aru.\""
1003103-158 = "Wh-What?!"
1003103-159 = "*sigh* Why am I so exhausted? Well, I did spend a lot of effort bluffing, but that was..."
1003103-160 = "My plan to impress you really backfired."
1003103-161 = "[s] \"I've always found you impressive, Aru.\""
1003103-162 = "...!"
1003103-163 = "How can you always be so smooth, Sensei?"
1003103-164 = "Then there's me, messing things up like usual."
1003103-165 = "So, yeah! Let's just call it even!"
1003103-166 = "What's done is done. I'll be sure to blow you away next time for sure!"
1003103-167 = "[s] \"I'm counting on it.\""
1003103-168 = "Don't...pressure me like that! *sigh* Fine. I'll definitely impress you if that's how it's going to be."
1003103-169 = " N-Not that you caught me off guard again just now. I was simply thinking that my trusty business partner has a way with words. That's why I keep you around."
1003103-170 = "A-Anyway!"
1003103-171 = "Until next time."
1003103-172 = "I'm looking forward to it, Sensei. ♪"

1003103-57 = "#wait;1000"
1003103-58 = "3;아루 정월;07;후후! 좀 더 칭찬해도 좋다고? 이 행사장에는 우리 흥신소의 고객들도 있다 보니까 말이야~\n#3;em;[음표]"
1003103-59 = "3;아루 정월;10;오늘은 그 케어, 라고 할까. 상담……. 이라고 할까.\n#3;stiff"

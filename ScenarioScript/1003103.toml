1003103-5 = "#all;hide"
1003103-6 = "5;아루 정월;10;흠흠, 이 차림새, 으음. 이, 이상하지 않겠지?\n#5;em;[...]\n#5;a"
1003103-7 = "5;아루 정월;03;내 탁월한 안목으로 직접 고른 물건이니까.\n#5;stiff"
1003103-8 = "5;아루 정월;02;……어디 거울 같은 거 없나."
1003103-9 = "[s] \"아루?\""
1003103-10 = "5;아루 정월;11;히얏?! 서, 선생님?!\n#5;em;[?!]\n#5;shake"

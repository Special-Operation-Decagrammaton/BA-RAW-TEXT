[translation]
1003103-1 = "想展現的背影"
1003103-3 = "（就約定的時間，到了約定的場所）"
1003103-4 = "（環顧四周，馬上看見了亞瑠）"
1003103-6 = "……這身穿著，不會很奇怪吧？"
1003103-7 = "嘛，我優秀的品味應該沒有問題才對……"
1003103-8 = "……不知道哪邊有鏡子。"
1003103-9 = "[s] 「亞瑠，久等了。」"
1003103-10 = "咿哇！？"
1003103-11 = "老，老師！什麼時候！？別嚇人啊……"
1003103-12 = "不過，你真是準時呢！"
1003103-13 = "今天的場合可不能遲到，畢竟──"
1003103-14 = "[s] 「……」"
1003103-15 = "……老師？"
1003103-16 = "怎，怎麼了，一臉認真地盯著看……"
1003103-19 = "（……呵呵，計畫成功！老師真的一見鍾情了吧！？花這麼多錢值得了，從這豪華布料中散發出的氣質！）"
1003103-20 = "（如此一來，就不得不承認了吧……）"
1003103-21 = "（我傑出的商業直覺。還有那時，我才不是被店員的話術騙了……！）"
1003103-22 = "[s] 「亞瑠的那件和服──」"
1003103-23 = "還，還還還還不是時候！還沒！還沒做好心理準備……！"
1003103-24 = "（果然無法親耳聽感想！）"
1003103-25 = "（一定是一見鍾情，肯定是的。絕對沒錯……但是萬一？不，絕對不會有那種事……）"
1003103-26 = "（要是老師說感覺很奇怪，或是穿起來不合適之類的話……）"
1003103-29 = "……呼，好！"
1003103-30 = "咳嗯。那個，老師，就如MomoTalk上說的，今天要去一個高級又重要的場合。總之先考慮那件事吧。"
1003103-31 = "這次透過了關係，拿到了邀請函。"
1003103-32 = "……耶？這點很可疑？真，真是失禮呢！"
1003103-33 = "這可是奇普托斯首屈一指的實業家在新年舉辦的特別晚餐派對的邀請函唷！？"
1003103-34 = "[s1] 「原來如次，所以才穿和服去啊。」\n[s2] 「高級場合原來是這個意思。」"
1003103-35 = "對，沒錯！果然那時有租這件和服真是太好了。"
1003103-36 = "對，沒錯！果然那時有租這件和服真是太好了。"
1003103-37 = "這種巧合，某種意義上來說也是看透未來的先見之明，是商業中不可或缺的直覺……！"
1003103-41 = "啊，現在不是做這種事的時候了呢。好，老師，快走吧！不然要遲到了♪"
1003103-44 = "如何，很厲害吧？"
1003103-45 = "這是奇普托斯中有頭有臉的實業家齊聚一堂的派對。"
1003103-46 = "大家會在這裡交換未來有關事業的想法，也是各個領域的重頭人物進行交流的場合。"
1003103-47 = "也就是說只要待在這裡，就能從談話的內容中找出新事業的靈感，或是找到新顧客唷？"
1003103-48 = "[s] 「如此厲害的派對邀請函，亞瑠是從哪裡……」"
1003103-49 = "呵呵。不管怎麼說，我可是「便利屋68」的社長兼領導，陸八魔亞瑠唷？嘛，代表終於有人認可我的能力了。"
1003103-50 = "[s] 「亞瑠很厲害呢。」"
1003103-51 = "是，是嗎？真的覺得很厲害嗎！？如果老師都這麼認為了，果然我也逐漸……！"
1003103-54 = "（啊，機會難得，讓老師看看我帥氣的模樣……！）"
1003103-55 = "（雖然沒有聽到老師對和服的感想，但應該會對我刮目相看，稱讚我幾句的吧！）"
1003103-58 = "呵呵！可以再多稱讚我一點喔？畢竟是這麼盛大的派對，也會有我們便利屋68的顧客吧。"
1003103-59 = "今天算是來談回饋，諮詢之類的……"
1003103-60 = "對，沒錯，關於事業的話題！談有關今後的展望！"
1003103-61 = "「便利屋68」現在正在做非常重要的商業準備。為了那個必須事先見面！"
1003103-62 = "啊啊……好忙啊。看著還在過年就開始辛苦工作的我，你還可以再感動一點喔，老師！"
1003103-63 = "[s] 「一年的開始就很辛苦呢。機會難得，也想見見亞瑠的顧客呢。」"
1003103-64 = "呵呵，嘛，可以好好期待一下。"
1003103-65 = "雖然可能會聊一些艱澀的話題，但我身為實業家的能力，你可要看仔細了！"
1003103-66 = "呵呵呵！"
1003103-67 = "呵，呵呵……"
1003103-68 = "……"
1003103-71 = "（該不會要搞砸了吧！？）"
1003103-72 = "（本來就只是偶然拿到了邀請函，不可能有必須要見的客戶）"
1003103-73 = "（太得意忘形了……必須想辦法補救……）"
1003103-74 = "（可是突然就改變話題的話，感覺有點難看呢……！？）"
1003103-75 = "[ns] 「那位顧客，已經到了嗎？」"
1003103-76 = "呃，嗯，那個……"
1003103-77 = "（怎麼辦才好……！？）"
1003103-78 = "（……我想到了！就說今天本來要見面的，可惜他沒來……）"
1003103-79 = "（沒錯，照這個設定就能擺脫窘境了！）"
1003103-80 = "就是啊，老師。我剛才查了名單，似乎沒有出席派對呢……"
1003103-81 = "……耶？名字？顧客的……？"
1003103-82 = "就，就是……那個……業界為了保護個資，只會用暱稱互相稱呼……"
1003103-83 = "那個……是叫「鏡餅伯爵」吧？"
1003103-88 = "哦哦，您這次來了呢。鏡餅伯爵。"
1003103-89 = "哎呀哎呀！好久不見！年菜丸社長！"
1003103-90 = "「鏡餅伯爵」──！？還真有這號人物！？騙人的吧！？"
1003103-91 = "……哈！不，那個，該怎麼說呢……"
1003103-92 = "嘛，畢竟是顧客，確實是該去打個招呼……那個……"
1003103-93 = "在這兒等一下，老師。我去稍微講點話……"
1003103-94 = "（怎，怎麼辦！我隨便想的名字，居然還真的有這個人！該怎麼擺脫這個情況……！？）"
1003103-105 = "……哦呀？"
1003103-106 = "小姐，找我們有什麼事嗎？"
1003103-107 = "那，那個，就是說……"
1003103-111 = "（……果，果然還是不行呀！）"
1003103-112 = "失，失禮了──！！"
1003103-114 = "啊──"
1003103-118 = "痛痛痛痛……老師！？"
1003103-119 = "我，我倒在老師身上……！？對，對不起！因，因為還不習慣穿這雙鞋……！"
1003103-123 = "痛……！？"
1003103-124 = "我好像扭到腳了……"
1003103-133 = "耶，老師？做，做什麼……！？"
1003103-134 = "（公，公主抱！？在這麼多人前面，也太大膽了吧！？）"
1003103-135 = "[s3] 「抱歉這麼突然，但我無法放著不管。」\n[s4] 「啊，抱歉，不喜歡嗎？」"
1003103-136 = "也，也不是特別討厭啦……！？"
1003103-137 = "也，也不是特別討厭啦……！？"
1003103-138 = "這點小事不算什麼，那個……"
1003103-139 = "老，老師沒有必要做到這種程度……！"
1003103-140 = "[s] 「都受傷了，就安靜休息吧。」"
1003103-141 = "……"
1003103-142 = "好，好的……"
1003103-143 = "那個，那就拜託了……"
1003103-145 = "（我帶著亞瑠離開會場，並決定在大樓前稍作歇息）"
1003103-148 = "公，公主抱到這裡就好！被人看見會很害羞的！"
1003103-149 = "痛的地方也已經好多了……！"
1003103-150 = "唉……"
1003103-154 = "老師，那個……"
1003103-155 = "[s5] 「對不起，我是不是太耍帥了？」\n[s6] 「亞瑠的反應太有趣了，所以……」"
1003103-158 = "什，什麼！？"
1003103-159 = "哈啊，總覺得好累……嘛，雖然我本來就只是在裝腔作勢……"
1003103-160 = "結果，也沒能讓老師看到我展現帥氣的一面……"
1003103-161 = "[s] 「我覺得亞瑠一直都很帥氣唷，不是嗎？」"
1003103-162 = "！？"
1003103-163 = "又，又若無其事地說出那樣的話……！？"
1003103-164 = "總之，總覺得這次很多地方都搞得亂七八糟……"
1003103-165 = "嘛，剛才的事我就一筆勾銷。"
1003103-166 = "而且，對過去的事後悔也沒用。下次一定會好好展現我的帥氣！"
1003103-167 = "[s] 「嗯，我很期待。」"
1003103-168 = "怎麼又這麼說……啊啊，反正我已經說了。絕對會讓你看的唷！？"
1003103-169 = "但如果我的合夥人，沒有這種程度的說話技巧的話，我也是會很困擾的……！"
1003103-170 = "那麼，就這樣……"
1003103-171 = "下次，"
1003103-172 = "再請你護送囉。老師♪"

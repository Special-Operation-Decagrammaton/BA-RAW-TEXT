[translation]
41020-1 = "第2話;招かれざる客"
41020-3 = "のわっ！？銃弾！？"
41020-4 = "ここ、間違いなく死角だよな……？どこから飛んでくるんだ？"
41020-9 = "……甘いな。"
41020-10 = "サーマルカメラも知らないのか、隠れても無駄だってのに。"
41020-14 = "モエ、足止め完了！早く爆撃を！"
41020-15 = "座標、[ruby=ヴィクターキロ] VK4[/ruby]-0-4-5！"
41020-16 = "やれ！"
41020-22 = "くひひ、待ちくたびれたよ！"
41020-30 = "ドローンだ！？"
41020-31 = "真っすぐこっちに来る、逃げろ！！"
41020-37 = "今の爆発は何だ！"
41020-41 = "アルファ分隊、応答しろ！"
41020-43 = "ご覧いただけてますでしょうか？"
41020-44 = "公安局、防戦一方です！"
41020-45 = "警備局に続き、公安局までやられてしまいそうです！もうヴァルキューレで動ける部隊といえば、生活安全局くらいでしょうか……！？"
41020-46 = "デモを行っているのはSRT特殊学園の生徒とのことでしたが、それでも圧倒的なまでに押されてしまってます。"
41020-47 = "果たしてこの後、どうなっていくのでしょうか……！"
41020-48 = "そうですね、何かヴァルキューレ側に秘策はあるのでしょうか！？"
41020-49 = "ああもう、うるさい！"
41020-50 = "誰の許可で撮影してる！さっさとカメラを止めろ！"
41020-51 = "おっと、マズいですね！"
41020-52 = "怒られる前に距離を取るとしましょうか！"
41020-53 = "邪魔をするな！早くどけ！"
41020-54 = "くそっ、クロノスか……相変わらずうるさい……！"
41020-55 = "とはいえ、確かにもう人員が……生活安全局のバカ共は使えないし……。"
41020-56 = "[s] \"何だかすごい状況だね……。\""
41020-58 = "……何だ貴様は。"
41020-59 = "見て分からないのか、戦闘中だ。部外者はさっさと出ていけ。"
41020-65 = "[ns] リンの紹介状を渡す。"
41020-66 = "これは、行政官の紹介状……？"
41020-67 = "防衛室の代わりに……「シャーレ」だと！？"
41020-68 = "……こ、これは大変失礼いたしました。"
41020-69 = "実際にお会いするのは初めてかと。"
41020-75 = "今回の作戦において、現場の責任者を担当しています。ヴァルキューレ警察学校の公安局長、カンナです。"
41020-76 = "[s1] \"うん、初めまして。\"\n[s2] \"状況はどんな感じ？\""
41020-77 = "そうですね、見ての通りと言いますか……。"
41020-78 = "そうですね、見ての通りと言いますか……。"
41020-79 = "兵力はほとんど残っておらず、士気も底を突いています。"
41020-80 = "当初は数で制圧するつもりでしたが、SRTの火力はでたらめで……。"
41020-81 = "もう残りの人員も――"
41020-86 = "お待たせしました、生活安全局のキリノです！"
41020-87 = "もう今すぐ出動しても良いですか！？"
41020-88 = "……もう終わってるっぽくない？これ、もはや私たちの出番じゃないでしょ。"
41020-90 = "この「生活安全局」だけです。"
41020-91 = "あ、先生！奇遇ですね、ヴァルキューレの支援に来てくださったのですか？"
41020-92 = "こんな現場にまで来るなんて、相変わらず大変だねえ。"
41020-93 = "先生の指揮さえあれば、もう作戦は成功したも同然ですね！"
41020-94 = "さあ、このまま放っておくわけにはいきません！早速出動しましょう！"
41020-95 = "待て、勝手に動くな。お前らが出ていって何になる？"
41020-96 = "警備局も公安局も、ほとんどやられたんだぞ。お前たちが相手になると思っているのか？"
41020-97 = "そもそも、ろくな武器だって持っていないだろうに……何を根拠に勝てると？"
41020-98 = "……自分の腕前くらい、分かってるものだと思ったがな？"
41020-99 = "で、ですが、市民の方々も怖がっていますし……このまま見ているだけ、というわけには……。"
41020-100 = "……意欲は買おう。しかし気合だけではどうにもならない。"
41020-101 = "我々が他の方法を見つけるまで、とにかくここで待機していろ。"
41020-102 = "は、はい……。"
41020-103 = "ラッキー。ま、言ってることはその通りだしね。"
41020-104 = "[s] \"ここを占拠してる生徒たちについて、何か情報とかある？\""
41020-105 = "はい、「SRT特殊学園」所属の1年生チーム……「RABBIT小隊」です。"
41020-106 = "本来ならSRTの閉校によって、ヴァルキューレの警備局に転校する予定だったのですが……。"
41020-107 = "何があったのか、急にこうして公園を占拠。「閉校を取り消せ」とデモを始めた、という経緯です。"
41020-108 = "数は少ないものの、その装備は最先端のものです。主にそれが理由で、ここまで手こずってしまい……。"
41020-109 = "[s] \"なるほど。見ても良い範囲で、他に詳細な情報とかある？\""
41020-110 = "一応、連邦生徒会から提供された各生徒の資料なら……"
41020-114 = "ああ、顔ならあれを見た方が速いかもしれません。不本意ですが、クロノスの中継ドローンが中に入ったようなので。"
41020-119 = "……ん？おい、何見てるんだ。[ruby=携帯式防空ミサイルシステム]MANPADS[/ruby]でも喰らいたいのか？"
41020-120 = "くひひ……まあ、そこまで神経質になるなって。"
41020-121 = "どうせもう戦況は覆らない。今さら撮られたって、何の問題も無いでしょ。"
41020-122 = "どうせなら、連邦生徒会の愚かさについて喧伝でもしてあげたら良いじゃん。"
41020-123 = "ってわけで……連邦生徒会、見てる～？"
41020-124 = "お前らの考えが間違いだったって、そろそろ分かったんじゃないか？"
41020-125 = "私たちがここにいる限り、SRT特殊学園は終わらない！"
41020-127 = "サキ、モエ。余計な挑発は慎んでください。"
41020-128 = "私たちに必要なのは、戦闘を通じて交渉に有利な立場を手に入れること。それ以外の何かを今行う必要はありません。"
41020-130 = "つまんないなぁ……ミヤコはいっつも真面目なんだから。"
41020-134 = "……ドローンの駆動音、耳障りだな。そろそろ消し飛ばすとしよう。"
41020-138 = "弾薬も結構余ってるし……テストも兼ねて、何発かババっと撃ってみるか？"
41020-139 = "サキ～、何か面白そうなこと考えてるじゃん？"
41020-140 = "やっちゃう？ド派手にやっちゃう？"
41020-141 = "どうせなら弾薬全部使って、打ち上げ花火みたいにしない？"
41020-142 = "いやぁ、綺麗だろうなぁ……はあ、はあ……。"
41020-143 = "それは良いんだけど……何か忘れているような気が……。"
41020-149 = "も、もしかしてそれ、私のこと……？"
41020-150 = "爆撃、私のいるところは巻き込まないでね……？"
41020-152 = "……あ。"
41020-153 = "わ、分かってる！忘れたわけじゃないから、心配するな！"
41020-155 = "そ、そっか……。"
41020-156 = "ところで私、もう帰っても良いかな……？相手もいなくなったし……。"
41020-157 = "何だかこの辺り……湿っぽいし、虫も多いし……"
41020-158 = "何だかその、ひとりじゃ怖くって……。"
41020-159 = "ミユ。SRTのエリートが、たかが虫のせいで泣き言を言うな。"
41020-160 = "いつまでもそんなことを言うなら、今からでもヴァルキューレに行けばいいだろ。"
41020-161 = "不快なことも少ない毎日で、安穏と交通整理でもしてればいい。"
41020-162 = "そ、それは、その……。"
41020-163 = "……それよりミユ、ドローンは見えてるな？"
41020-164 = "高度が測定できたら教えてくれ、すぐに撃墜する。"
41020-165 = "りょ、了解……少し待ってて……。"
41020-167 = "サキ、待ってください。不要な射撃は推奨しません。今は補給も期待できない状況なので、周囲を警戒しつつ……"
41020-168 = "うるさい！"
41020-169 = "どうしてお前が私に命令する！？"
41020-170 = "ま、もともと全員同じ1年生だしねぇ。"
41020-171 = "連邦生徒会長もいないし[ruby=しがらみ]、柵も[/ruby]無くなったことだし、確かにもう命令を聞く必要も無いかなぁ。"
41020-172 = "で、ですが……。"
41020-174 = "……サキちゃん、座標を確認したよ。高度900m、距離2500m、方位0-3-0……"
41020-175 = "よし、"
41020-179 = "ターゲットロックオン。"
41020-180 = "モエ、発射は任せた。"
41020-181 = "いやぁ、こういう瞬間は興奮するねぇ……"
41020-185 = "さ～て……"
41020-186 = "ファイアー！！"
41020-196 = "……中継ドローン、ロストしました。"
41020-197 = "ヴァルキューレの物じゃないとは分かっているだろうに、それでも攻撃するか……"
41020-198 = "雑な奴らだな……どうしてあんなやつらが、SRTに入学できたんだ？"
41020-199 = "[s] \"元気な子たちだね。\""
41020-200 = "……ご冗談を、「バカ」の間違いでしょう。"
41020-201 = "単なるバカならまだしも、やたらと力を持ったバカです。会話もしにくく、厄介なことこの上無い。"
41020-202 = "こうなったら、各自治区の風紀委員会に支援を要請した方が……"
41020-206 = "まず、ゲヘナの風紀委員会に連絡を――"
41020-207 = "[s3] \"……任せて、多分大丈夫。\"\n[s4] \"何とかなるかも。\""
41020-208 = "……はい？"
41020-209 = "……はい？"
41020-210 = "動ける人員が5人にも満たない、この状況で……？"
41020-211 = "[s5] \"キリノ、フブキ、行こう。\"\n[s6] \"RABBIT小隊のみんなを止めに行こう。\""
41020-214 = "はい！……はいっ！？"
41020-215 = "じょ、冗談でしょ……？"
41020-216 = "相手はSRTだよ？"
41020-221 = "……すみませんが、先生。"
41020-222 = "彼女たちは基本的に戦闘員ではなく、平和ボケした生活安全局の所属です。"
41020-223 = "警備局でも、公安局でも太刀打ちできなかったんです。彼女たちだけで、制圧できるとお思いですか？"
41020-224 = "先生の噂は聞いていますが、こんな寄せ集めでは……。"
41020-225 = "エリートとそうでない生徒の間には、到底埋められない隙間があるんですよ。"
41020-226 = "[s] \"私からしたら、みんな「生徒」に変わりは無いよ。\""
41020-230 = "……そうですか。"
41020-231 = "責任はシャーレが負うということですし……まあ、無理に止めはしません。"
41020-235 = "……まだ戦闘可能な者たちに告ぐ。これよりシャーレの先生の指示に従い、生活安全局の生徒をサポートせよ！"
41020-237 = "ちょっ、ちょっと待った！マジで！？マジで言ってる！？"
41020-238 = "嘘でしょ、絶対すぐやられるって！先生、正気！？"
41020-239 = "[s7] \"正気正気。\"\n[s8] \"大丈夫、きっとできるよ。\""
41020-240 = "フブキ、大丈夫です！ [USERNAME]先生の指揮があるなら、何とかなります！多分！！"
41020-241 = "フブキ、大丈夫です！ [USERNAME]先生の指揮があるなら、何とかなります！多分！！"
41020-242 = "そもそも、市民の安全を守るため……この状況、放っておくわけにはいきません！"
41020-243 = "あーもう、計算が狂った……こんなことなら、仮病でも使っておけば……。"
41020-244 = "まあまあ。これで作戦を成功させたら、特別休暇とか貰えるかもしれませんし。"
41020-245 = "それに、警備局への転科のチャンスだって頂けるかもしれません！"
41020-246 = "後者はどうでも良いけど、まあ仕方ない……。"
41020-247 = "ちょっとだけ、試しにやってみよっか？"
41020-248 = "生活安全局、"
41020-249 = "出動します！"

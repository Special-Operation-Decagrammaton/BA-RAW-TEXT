41020-43 = "3;시논;02;시청자 여러분. 방금 보셨습니까?\n#3;em;[반응]\n#3;a"
41020-44 = "3;시논;01;방금 전의 폭발로 공원에 잠입하려던 공안국의 마지막 별동대가 당해버렸습니다!"
41020-45 = "1;마이;00;이로써 발키리 경찰학교에서 가용할 수 있는 인원은 생활안전국의 학생들뿐…… 사실상 전멸했다고 봐도 좋은 수준이네요!\n#1;em;[!]\n#1;a\n#3;m5"
41020-46 = "3;시논;99;아무리 SRT 특수학원의 학생들을 상대하고 있다고는 하지만, 고작 1개 소대에게 발키리 경찰학교가 통째로 놀아나다니……"
41020-47 = "3;시논;00;이대로 이들에게 계속 키보토스의 치안을 맡겨도 좋은 걸까요?\n#3;em;[?]"
41020-48 = "1;마이;03;정말 걱정되는 일이 아닐 수 없습니다!\n#1;hophop\n#1;em;[음표]"
41020-49 = "5;칸나;08;시끄러! 그걸 왜 너희들이 걱정하는 거야?!\n#5;em;[빠직]\n#5;al\n#3;m3\n#1;m1"
41020-50 = "5;칸나;00;그보다 여기는 작전 현장이라고! 누구 허락을 받고 여기서 촬영을 하는 거야? 썩 꺼지지 못해!"
41020-51 = "3;시논;01;여러분, 보십시오! 발키리의 비열한 공권력이 이제는 언론을 향하고 있습니다!\n#3;em;[반응]"
41020-52 = "1;마이;00;범인은 제대로 잡지도 못하면서 기자들에게 화풀이라니, 정말 꼴사나운 모습이네요."
41020-53 = "5;칸나;08;나가! 당장 나가!!\n#5;hophop\n#5;m3\n#1;dl\n#3;dl"
41020-54 = "5;칸나;99;젠장! 안 그래도 일이 꼬여가는 마당에 크로노스의 촉새들까지 몰려들다니. 이게 다 무슨 촌극이람?\n#5;em;[속상함]\n#5;stiff"
41020-55 = "5;칸나;04;……하지만 녀석들의 말이 완전히 틀린 것도 아니야. 이제 투입할 수 있는 인원은 생활안전국의 머저리들밖에 남지 않았으니……."
41020-56 = "[s] \"고생이 많아 보이네.\""

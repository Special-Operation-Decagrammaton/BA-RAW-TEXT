41020-77 = "3;칸나;04;그게 보시다시피…….\n#3;em;[땀]"
41020-78 = "3;칸나;04;그게 보시다시피…….\n#3;em;[땀]"
41020-79 = "3;칸나;07;솔직히 말씀드리자면 비관적입니다. 남아있는 아군의 숫자도 많지 않고, 사기는 바닥을 치고 있습니다."
41020-80 = "3;칸나;02;애초에 우수한 장비로 무장하고 있는 SRT의 학생들을 숫자로 밀어붙여 제압할 계획이었는데, 이제는 그 숫자마저도 열세인 상황이니까요."

41020-127 = "3;미야코;11;사키, 모에. 외부 카메라를 통한 불필요한 도발은 삼가주세요.\n#3;em;[반응]\n#3;a"
41020-128 = "3;미야코;05;저희는 전투를 통해 교섭에서 유리한 위치를 선점하려는 것이지, 장기적인 게릴라전을 치르려는 게 아닙니다."

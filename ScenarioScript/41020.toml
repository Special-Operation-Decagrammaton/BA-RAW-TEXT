[translation]
41020-1 = "第2話;不速之客"
41020-3 = "哦哇！？有子彈！？"
41020-4 = "這裡，確實是死角吧……？從哪裡飛來的啊？"
41020-9 = "……太天真了。"
41020-10 = "連熱像儀也不知道嗎，躲起來也沒用的。"
41020-14 = "萌，行動限制完成！進行轟炸！"
41020-15 = "座標，[ruby=Victor Kilo] VK4[/ruby]-0-4-5！"
41020-16 = "動手！"
41020-22 = "咕嘻嘻，等不及了唷！"
41020-30 = "是無人機！？"
41020-31 = "筆直地朝這裡來了，快逃！！"
41020-37 = "剛才的爆炸是怎樣啊！"
41020-41 = "阿爾法分隊，回答我！"
41020-43 = "各位看見了嗎？"
41020-44 = "公安局只能維持守勢！"
41020-45 = "繼警備局之後，連公安局也快被打敗了！說到女武神還能行動的部隊，好像只剩生活安全局了呀……！？"
41020-46 = "雖然進行示威的是SRT特殊學園的學生，但戰況竟然會如此一面倒。"
41020-47 = "究竟這之後，會變成如何呢……！"
41020-48 = "就是說呢，女武神陣營會有什麼祕密策略嗎！？"
41020-49 = "啊啊真是，吵死了！"
41020-50 = "誰准你們拍的！快把攝影機停下！"
41020-51 = "唉唷，糟糕！"
41020-52 = "趁還沒挨罵站遠一點吧！"
41020-53 = "別礙事！快滾開！"
41020-54 = "該死，克洛盧斯嗎……還是一樣吵……！"
41020-55 = "話雖如此，但我們確實沒人了……生活安全局那群笨蛋又沒用處……"
41020-56 = "[s]「這狀況真不得了呢……」"
41020-58 = "……你是哪位。"
41020-59 = "看了還不知道嗎，我們在和歹徒駁火。局外人快點離開。"
41020-65 = "[ns] 交出琳的介紹信"
41020-66 = "這是，行政官的介紹信……？"
41020-67 = "代替防衛室……竟然是「夏萊」！？"
41020-68 = "……這，這真是失禮了。"
41020-69 = "實際見面這還是第一次。"
41020-75 = "我是這次作戰的現場負責人。女武神警察學園公安局長，環奈。"
41020-76 = "[s1]「嗯，初次見面。」\n[s2]「狀況如何？」"
41020-77 = "關於這個，該說是如您所見嗎……"
41020-78 = "關於這個，該說是如您所見嗎……"
41020-79 = "兵力幾乎不剩，士氣也跌落谷底。"
41020-80 = "當初原本打算以數量壓制的，不過SRT的火力太誇張了……"
41020-81 = "剩下的人員也──"
41020-86 = "久等了，我是生活安全局的桐乃！"
41020-87 = "現在立刻出動可以嗎！？"
41020-88 = "……不覺得已經結束了嗎？這已經不是我們的出場時機了。"
41020-90 = "剩下這個「生活安全局」而已。"
41020-91 = "啊，老師！真巧呢，您來支援女武神了嗎？"
41020-92 = "竟然連這種現場都來，還是一樣辛苦呢～"
41020-93 = "只要有老師的指揮，作戰就等同成功了呢！"
41020-94 = "來吧，不可以這樣放著不管！趕快出動吧！"
41020-95 = "等等，不要擅自行動。你們出面能做什麼？"
41020-96 = "警備局和公安局可是幾乎都被打敗了，你們會是對手嗎？"
41020-97 = "再說了，連像樣的武器都沒有……為什麼覺得自己能贏？"
41020-98 = "……我想你們也明白自己有幾兩重吧？"
41020-99 = "不，不過，各位市民都很害怕……我們總不能袖手旁觀……"
41020-100 = "……我認同你的熱情。不過只憑氣勢什麼都做不了。"
41020-101 = "在我們找到其他方法前，總之先在這裡待機。"
41020-102 = "是，是的……"
41020-103 = "Lucky～#n嘛，說得也沒錯呢。"
41020-104 = "[s]「關於佔領這裡的學生們，有什麼情報嗎？」"
41020-105 = "是，她們是「SRT特殊學園」所屬的1年級隊伍……「RABBIT小隊」。"
41020-106 = "原本因為SRT廢校，她們預定要轉入女武神的警備局……"
41020-107 = "但卻不知為何突然佔領公園，開始了「撤回廢校」的示威。這就是事件原委。"
41020-108 = "儘管人數少，裝備卻是最先進的。主要因為這個理由，才會棘手到這個地步……"
41020-109 = "[s]「原來如此。在可以閱覽的範圍，有其他詳細的情報嗎？」"
41020-110 = "姑且有聯邦學生會提供的各學生資料……"
41020-114 = "啊啊，雖然不情願，但臉的話看那邊也許比較快。克洛盧斯的轉播無人機似乎進到裡面了。"
41020-119 = "……嗯？喂，看什麼看啊。想吃看看[ruby=攜帶式防空導彈系統]MANPADS[/ruby]嗎？"
41020-120 = "咕嘻嘻……嘛，不要那麼神經質嘛。"
41020-121 = "反正已經沒辦法翻轉戰況。事到如今被拍了，也沒有什麼問題吧。"
41020-122 = "還不如來宣揚一下聯邦學生會有多愚蠢。"
41020-123 = "就是這樣……聯邦學生會，在看嗎～？"
41020-124 = "差不多該明白你們的想法是錯的了吧？"
41020-125 = "只要我們還在這裡，SRT特殊學園就不會結束！"
41020-127 = "咲希、萌。請不要過於挑釁。"
41020-128 = "我們需要的，是通過戰鬥獲得對交涉有利的立場。#n除此之外的事，目前沒有執行的必要。"
41020-130 = "真無趣呢……都子總是這麼認真。"
41020-134 = "……無人機的聲音真刺耳。差不多該把它轟下來了吧。"
41020-138 = "反正彈藥還剩很多……就射個幾發順便測試一下吧。"
41020-139 = "咲希～這點子挺有趣的嘛？"
41020-140 = "要來嗎？要來大幹一場嗎？"
41020-141 = "那要不要乾脆用光子彈，弄成像煙火一樣？"
41020-142 = "哎呀～一定會很漂亮……哈啊，哈啊……"
41020-143 = "好是好……但感覺好像忘了什麼……"
41020-149 = "該，該不會，是指我吧……？"
41020-150 = "轟炸，不要炸到我在的地方哦……？"
41020-152 = "……啊。"
41020-153 = "我，我知道！我沒有忘記啦，不用擔心！"
41020-155 = "是，是嗎……"
41020-156 = "話說回來，我可以回去了嗎……？#n也沒有敵人了……"
41020-157 = "感覺這一帶……又潮濕，蟲子又多……"
41020-158 = "而且那個，孤零零的好可怕……"
41020-159 = "美優。SRT的菁英，不要因為區區蟲子就說喪氣話。"
41020-160 = "一直說那種話，那你怎麼不馬上投靠女武神啊。"
41020-161 = "去過著幾乎不會不開心，能安穩指揮交通的每一天啊。"
41020-162 = "那，那是，那個……"
41020-163 = "……比起這個，美優你看得見無人機吧？"
41020-164 = "測完高度就告訴我，我馬上打下來。"
41020-165 = "了，了解……等我一下……"
41020-167 = "咲希，請等一下。不建議不必要的射擊。現在是無法期待補給的狀況，應該警戒周圍……"
41020-168 = "吵死了！"
41020-169 = "你憑什麼命令我！？"
41020-170 = "嘛，本來我們就全都是1年級嘛。"
41020-171 = "如今聯邦學生會長不在，障礙也已經消失，確實已經沒有必要再聽從命令了。"
41020-172 = "但，但是……"
41020-174 = "……咲希醬，座標確認好了。高度900m，距離2500m，方位0-3-0……"
41020-175 = "好，"
41020-179 = "鎖定目標。"
41020-180 = "萌，發射交給你了。"
41020-181 = "唉呀～這個瞬間真令人興奮啊……"
41020-185 = "那～麼……"
41020-186 = "發射！！"
41020-196 = "……轉播無人機失去信號。"
41020-197 = "明知不是女武神的東西，卻照樣攻擊嗎……"
41020-198 = "真是隨意的傢伙們啊……為什麼那種傢伙們，可以入學SRT啊？"
41020-199 = "[s]「真是有精神的孩子們呢。」"
41020-200 = "……請別說笑了，和「笨蛋」搞混了吧。"
41020-201 = "而且不是單純的笨蛋，是有著強大力量的笨蛋，而且難以溝通。沒有比這還惱人的事了。"
41020-202 = "這樣還不如向各自治區的風紀委員會請求支援……"
41020-206 = "首先，聯絡格黑娜的風紀委員會──"
41020-207 = "[s3]「……交給我，應該沒問題。」\n[s4]「應該會有辦法。」"
41020-208 = "……什麼？"
41020-209 = "……什麼？"
41020-210 = "能行動的人員不足5人，這個狀況下……？"
41020-211 = "[s5]「桐乃、吹雪，走吧。」\n[s6]「去阻止RABBIT小隊吧。」"
41020-214 = "是的！……什麼！？"
41020-215 = "開，開玩笑的吧……？"
41020-216 = "對手是SRT耶？"
41020-221 = "……恕我直言，老師。"
41020-222 = "她們基本上不是戰鬥員，是嬌生慣養的生活安全局學生。"
41020-223 = "連警備局和公安局都應付不了。您認為只憑她們，可以壓制成功嗎？"
41020-224 = "雖然我聽說過老師的傳聞，不過以這種烏合之眾……"
41020-225 = "菁英和非菁英之間，終究有一道不可能彌補的差距。"
41020-226 = "[s]「以我來看，大家都一樣是『學生』唷。」"
41020-230 = "……是這樣嗎。"
41020-231 = "責任也是由夏萊承擔……嘛，我不會勉強阻止。"
41020-235 = "……告知還能戰鬥的人。接下來將依照夏萊的老師指示，支援生活安全局的學生！"
41020-237 = "等，等一下！真假！？真的假的！？"
41020-238 = "騙人的吧，我們絕對馬上被幹掉！老師你腦袋正常嗎！？"
41020-239 = "[s7]「很正常很正常。」\n[s8]「沒問題，一定辦得到唷。」"
41020-240 = "吹雪，沒問題的！有[USERNAME]老師的指揮的話，一定有辦法的！大概！！"
41020-241 = "吹雪，沒問題的！有[USERNAME]老師的指揮的話，一定有辦法的！大概！！"
41020-242 = "再說了，為了保護市民的安全……這個狀況，不可以放著不管！"
41020-243 = "啊──討厭啦，我失算了……早知道就裝病了……"
41020-244 = "好嘛。要是作戰成功，也許能獲得特休獎勵呀。"
41020-245 = "而且，也許還能獲得轉調到警備局的機會呢！"
41020-246 = "後者無所謂啦，不過沒辦法了……"
41020-247 = "那就稍微試試看吧。"
41020-248 = "生活安全局，"
41020-249 = "出動！"

41020-139 = "3;모에;00;뭐야, 사키. 언제부터 그런 기특한 생각을 하고 있었던 거야?"
41020-140 = "3;모에;08;화끈하게 저지르는 일이라면 언제나 찬성이지!\n#3;hophop\n#3;em;[반짝]"

41020-86 = "3;키리노;00;칸나 국장님, 생활안전국의 키리노입니다!\n#3;em;[반짝]\n#3;greeting\n#3;a"
41020-87 = "3;키리노;01;생활안전국은 언제쯤 출동하면 될까요?"
41020-88 = "2;후부키;02;우리까지 나설 필요는 없지 않을까? 어차피 다 끝난 것 같은데…….\n#2;em;[?]\n#2;a\n#3;m4"
41020-89 = "#all;hide"
41020-90 = "3;칸나;07;(한숨) '그' 생활안전국뿐입니다.\n#3;stiff\n#3;em;[속상함]"
41020-91 = "5;키리노;02;어라? 선생님도 여기 계셨군요. 저희 발키리 경찰학교를 지원하러 오신 건가요?\n#5;em;[반응]\n#5;al\n#3;m1"
41020-92 = "1;후부키;00;그런 모양이네. 이런 현장까지 직접 찾아오다니, 샬레의 선생도 고생이 많아.\n#1;em;[음표]\n#1;ar\n#3;m3"
41020-93 = "5;키리노;99;후후, 선생님의 지휘를 받을 수 있다니. 이번 작전은 벌써 성공한 거나 다름없네요!"
41020-94 = "5;키리노;00;자, 그럼 도시의 안전을 위협하는 불량 학생들을 퇴치하러 어서 출동해 볼까요?\n#5;greeting\n#5;em;[반짝]"
41020-95 = "3;칸나;08;잠깐, 멋대로 움직이지 마. 너희가 나서서 뭘 하겠다는 거야?\n#3;hophop\n#1;dl\n#5;dr"
41020-96 = "3;칸나;06;경비국과 공안국이 모두 괴멸당한 이 상황에서 생활안전국 소속의 학생만으로 SRT 학원의 엘리트들을 상대하겠다고? 무모한 것도 유분수지."
41020-97 = "3;칸나;00;애초에 귀관들에게는 변변찮은 무기도 없잖나. 중무장한 특수부대원들을 무엇으로 제압하려고?"
41020-98 = "3;칸나;02;……귀관들의 사격 성적은 익히 들어 알고 있다만.\n#3;em;[...]"
41020-99 = "5;키리노;04;우으, 하지만…… 시민들이 불안하고 있는 이 때에 불의를 그냥 두고 볼 수는…….\n#5;em;[땀]\n#5;al\n#3;m1"
41020-100 = "3;칸나;02;귀관의 의욕만큼은 높이 사겠지만, 세상에는 기합만으로 해결할 수 없는 일도 잔뜩 있는 법이야."
41020-101 = "3;칸나;99;일단은 다른 방법을 찾을 때까지 여기서 얌전히 대기해."
41020-102 = "5;키리노;06;넵…….\n#5;stiff\n#5;em;[속상함]"
41020-103 = "5;후부키;00;후후, 다행이네. 하기야, 칸나 국장의 말도 틀리진 않았고.\n#5;em;[음표]"
41020-104 = "[s] \"공원을 점거한 저 학생들은 누구야?\""
41020-105 = "3;칸나;05;이미 대략적인 정보는 들으셨겠지만, 저들은 SRT 특수학원 소속의 1학년 팀— <RABBIT 소대>의 소대원들입니다.\n#3;m3\n#5;dr"
41020-106 = "3;칸나;99;원래대로라면 RABBIT 소대 또한 다른 SRT의 학생들처럼 정상적인 폐교 절차를 거친 뒤 발키리 경비국으로 전학을 오게 될 예정이었습니다만……\n#3;em;…"
41020-107 = "3;칸나;01;금일 오전. 갑자기 무슨 심경의 변화가 생겼는지, 이들은 갑자기 학원 인근의 공원을 점거하고 폐교 결정을 취소해 달라며 농성을 하기 시작했습니다."
41020-108 = "3;칸나;07;그 숫자는 많지 않지만, SRT 학원에서 가져온 최첨단의 장비로 무장하고 있는지라…… 저희가 보유하고 있는 경찰 장비만으로는 진압에 어려움을 겪고 있습니다.\n#3;em;[땀]\n#3;stiff"
41020-109 = "[s] \"더 자세한 자료는 없을까?\""
41020-110 = "3;칸나;05;학생회에서 받은 학생기록부 자료가 있기는 합니다만……."

41020-118 = "#wait;500"
41020-119 = "3;사키 헬멧;11;야, 인마! 겁도 없이 어딜 찍고 있는 거야? [ruby=휴대용 방공 시스템]MANPADS[/ruby]로 날려버린다!\n#3;a\n#3;em;[빠직]\n#3;stiff"
41020-120 = "1;모에;07;쿠흐흐. 너무 예민하게 굴지는 마, 사키.\n#1;ar\n#3;m5"
41020-121 = "1;모에;00;어차피 싸울 수 있는 학생들은 조금 전의 공격으로 모두 도망쳤는데, 지금에 와서 사진 좀 찍힌다고 무슨 문제라도 생기겠어?\n#1;em;[?]"
41020-122 = "1;모에;02;차라리 이 기회에 크로노스의 중계 카메라를 통해 SRT를 몰아내려던 총학생회의 결정이 얼마나 멍청한 것이었는지 똑똑히 알려 줘야지."
41020-123 = "1;모에;03;어이~ 총학생회의 헛똑똑이들, 여기 보고 있지?\n#1;hophop\n#1;em;[음표]"
41020-124 = "1;모에;02;너희들이 계획한 건 전부 틀렸어. 이 쓸모없는 버러지 녀석들!"
41020-125 = "3;사키 헬멧;00;도전이라면 몇 번이고 받아주지. 우리가 여기서 머무르고 있는 한 SRT 학원의 이름은 절대로 꺾이지 않을 테니까!\n#3;em;[!]"

[translation]
41020-1 = "ตอนที่ 2;แขกที่ไม่ได้รับเชิญในสวนสาธารณะ"
41020-3 = "อ๊ะ? ฉันกำลังถูกโจมตี!"
41020-4 = "กำลังหาจุดบอดของที่นี่อยู่ไม่ใช่เหรอ... ทำไมถึงโดนโจมตีได้ล่ะ?"
41020-9 = "หุหุ... คิดว่าการพรางตัวที่เงอะงะแบบนั้นจะทำให้เธอเข้าไปได้โดยไม่ถูกจับได้งั้นเรอะ?"
41020-10 = "ทุกการเคลื่อนไหวของพวกเธอถูกบันทึกไว้อย่างชัดเจนด้วยอุปกรณ์ตรวจจับชิ้นนี้"
41020-14 = "โมเอะ! ฉันจับตัวเจ้าพวกนี้ไว้แล้ว! ทิ้งระเบิดได้เลย!"
41020-15 = "พิกัด 4-0-4-5!"
41020-16 = "ระเบิดให้สิ้นซากไปเลย!"
41020-22 = "ฮิฮิ กำลังรอฟังคำนี้อยู่เลย!"
41020-30 = "อ๊ากกก! โดรนโจมตี!"
41020-31 = "หนีเร็วเข้าทุกคน!"
41020-37 = "เดี๋ยวก่อน ระเบิดเมื่อกี๊มันอะไรกันน่ะ?"
41020-41 = "ทีมอัลฟ่า ทีมอัลฟ่า! ตอบด้วย!"
41020-43 = "เห็นแล้วใช่ไหมคะคุณผู้ชม?"
41020-44 = "จากการระเบิดก่อนหน้านี้ สมาชิกกรมความมั่นคงสาธารณะหน่วยสุดท้ายที่จะลอบเข้าไป#nยังสวนสาธารณะถูกจัดการแล้วค่ะ!"
41020-45 = "แบบนี้สมาชิกที่ยังเคลื่อนไหวได้ของทางสถาบันฝึกตำรวจวัลคิรี่... ก็คงมีเพียงสมาชิกสำนักรักษา#nความปลอดภัยเท่านั้น... จะมองว่ากองกำลังถูกจัดการไปเกือบหมดแล้วก็ได้ค่ะ!"
41020-46 = "ถึงจะบอกว่าเป็นกลุ่มนักเรียนจากสถาบันพิเศษ SRT ก็เถอะ แต่กองทหารแค่หน่วยเดียวสามารถจัดการ#nนักเรียนโรงเรียนตำรวจได้หมดเลยเหรอ... "
41020-47 = "เราจะไว้วางใจฝากความปลอดภัยไว้กับพวกเธอได้หรือไม่?"
41020-48 = "สถานการณ์น่าเป็นห่วงจริงๆ ค่ะ!"
41020-49 = "หยุดพูดได้แล้ว! มันใช่หน้าที่ของพวกเธอที่ต้องมากังวลเรื่องนั้นเหรอ?!"
41020-50 = "อีกอย่าง ที่นี่คือจุดปฏิบัติการนะ! เข้ามาทำข่าวได้ยังไงไม่ทราบ? ยังไม่รีบไปอีก!"
41020-51 = "ทุกคนคะ ดูสิคะ! กองกำลังที่ร้ายกาจของวัลคิรี่กำลังเล็งมาที่สื่อแล้วค่ะ!"
41020-52 = "พวกเธอไม่เพียงแค่จะจับตัวคนร้ายไม่ได้ และยังคิดจะระบายความโกรธกับพวกนักข่าวอีกค่ะ! ช่างเป็นภาพที่น่าอดสูจริงๆ เลยค่ะ!"
41020-53 = "ออกไป๊! ไปเดี๋ยวนี้เลยนะ!!"
41020-54 = "โธ่เอ๊ย! สถานการณ์ยิ่งวุ่นวายอยู่ พวกโครโนสที่พูดเป็นต่อยหอยก็ดันเข้ามาจุ้นจ้านอีก จะต้องทำข่าวทุกอย่างเลยรึยังไงกันฮะ?"
41020-55 = "แต่ว่า... ที่พวกนั้นพูดก็ไม่ได้ผิดไปซะทีเดียว ตอนนี้เราเหลือแค่คนเซ่อจากสำนักรักษา#nความปลอดภัยเท่านั้นที่พอจะส่งไปได้..."
41020-56 = "[s] \"เหนื่อยน่าดูเลยนะ\""
41020-58 = "หืม? ทำไมถึงยังมีคนนอกเหลืออยู่อีกล่ะ?"
41020-59 = "นี่คุณ ที่นี่คือจุดปฏิบัติการนะ อย่ามาเที่ยวเดินเตร็ดเตร่ในที่อันตรายแบบนี้ ออกไป!"
41020-65 = "[ns] ยื่นจดหมายแนะนำจากรินให้"
41020-66 = "นี่มัน... จดหมายแนะนำจากหัวหน้าฝ่ายบริหาร?"
41020-67 = "ส่งคุณครูจากชาเล่ต์มาเป็นตัวแทนจากสำนักป้องกันเหรอ… แบบนั้นมัน..."
41020-68 = "เอ่อ... อืม..."
41020-69 = "ขออภัยด้วยค่ะ ฉันไม่เคยเจอคุณมาก่อน ก็เลยไม่รู้ว่า... เป็นคุณครู"
41020-75 = "ฉันโอกาตะ คันนะ หัวหน้ากรมความมั่นคงสาธารณะแห่งสถาบันฝึกตำรวจวัลคิรี่ และผู้รับผิดชอบ#nภาคสนามของปฏิบัติการนี้ค่ะ"
41020-76 = "[s1] \"ยินดีที่ได้รู้จักนะ\"\n[s2] \"สถานการณ์เป็นยังไงบ้าง?\""
41020-77 = "ก็อย่างที่คุณครูเห็น..."
41020-78 = "ก็อย่างที่คุณครูเห็น..."
41020-79 = "ถ้าให้พูดตรงๆ ก็คือ เราสิ้นหวังมากค่ะ คนฝ่ายเราก็เหลือไม่เยอะแล้ว แถมขวัญกำลังใจก็แทบจะ#nไม่เหลือเลยด้วย"
41020-80 = "ตอนแรกเราวางแผนจะเอาจำนวนคนของเราเข้าข่มนักเรียน SRT ที่ติดอาวุธที่มีอานุภาพ แต่ก็เหมือน#nว่าเราจะแพ้ราบคาบ แม้จะส่งคนเข้าไปต่อสู้แค่ไหนก็ตาม"
41020-81 = "อีกอย่าง คนที่เหลืออยู่ตอนนี้..."
41020-86 = "หัวหน้ากรมฯ คันนะ ฉันคิริโนะจากสำนักรักษาความปลอดภัยค่ะ!"
41020-87 = "ให้สำนักรักษาความปลอดภัยออกโรงตอนไหนดีคะ?"
41020-88 = "เราต้องออกไปสู้ด้วยเหรอ? ดูเอาก็รู้แล้วว่าจะจบยังไง ไม่สิ มันจบแล้วมากกว่านะ..."
41020-90 = "(ถอนหายใจ) คือสำนักรักษาความปลอดภัย 'พวกนั้น' ค่ะ"
41020-91 = "เอ๋? คุณครูเองก็อยู่ที่นี่เหรอคะ? มาช่วยสถาบันฝึกตำรวจวัลคิรี่เหรอคะ?"
41020-92 = "น่าจะใช่นะ มาถึงจุดเกิดเหตุด้วยตัวเองแบบนี้ คุณครูจากชาเล่ต์ก็ทำงานหนักใช่เล่นนะเนี่ย"
41020-93 = "ฮิฮิ ไม่อยากเชื่อเลยว่าเราจะได้รับการสั่งการจากคุณครู... ได้กลิ่นชัยชนะแล้ว ฉันว่าปฏิบัติการครั้งนี้#nประสบความสำเร็จแล้วละค่ะ!"
41020-94 = "เอาละ เราไปปราบปรามเด็กเกเรที่คุกคามความปลอดภัยของเมืองกันเลยดีไหมคะ?"
41020-95 = "เดี๋ยวก่อน อย่าเพิ่งทำอะไรตามอำเภอใจ พวกเธอจะออกไปทำอะไรได้?"
41020-96 = "ขนาดสำนักความมั่นคงกับกรมความมั่นคงสาธารณะยังถูกเล่นงานจนไม่เหลือแบบนี้ เธอยังคิดว่า#nนักเรียนจากสำนักรักษาความปลอดภัยจะไปปราบนักเรียนหัวกะทิจากสถาบัน SRT ได้งั้นเหรอ?#nหัดคิดให้มันรอบคอบบ้างสิ"
41020-97 = "อาวุธของพวกเธอเทียบกับพวกนั้นไม่ติดหรอก แล้วนี่จะเอาอะไรไปปราบหน่วยรบพิเศษติดอาวุธล่ะ?"
41020-98 = "ถึงพวกเธอจะได้คะแนนสอบยิงปืนดีก็เถอะ แต่ก็นะ..."
41020-99 = "เอ่อ... แต่ตอนนี้ชาวเมืองไม่ปลอดภัยนะคะ จะปล่อยให้พวกนั้นทำความผิดต่อไปไม่ได้..."
41020-100 = "ฉันชื่นชมความตั้งใจของเธออยู่หรอกนะ แต่ในโลกนี้มันก็มีเรื่องมากมายที่แก้ไขไม่ได้ด้วยปณิธาน#nที่แน่วแน่อย่างเดียว"
41020-101 = "เอาเป็นว่าจนกว่าจะหาวิธีอื่นได้ ก็กบดานอยู่ที่นี่เงียบๆ ก่อนเถอะ"
41020-102 = "ค่ะ..."
41020-103 = "ฮุฮุ ดีแล้วละนะ จริงๆ แล้วหัวหน้ากรมฯ คันนะก็พูดถูกแล้ว"
41020-104 = "[s] \"ใครกันเหรอที่ยึดสวนสาธารณะอยู่?\""
41020-105 = "พวกนั้นคือสมาชิกของ <กองทหาร RABBIT> ค่ะ เป็นเด็กปี 1 จากสถาบันพิเศษ SRT"
41020-106 = "ตามแผนการเดิมแล้วกองทหาร RABBIT และนักเรียนคนอื่นจาก SRT จะได้ย้ายมาที่สำนักความมั่นคง#nของวัลคิรี่หลังจากที่โรงเรียนของพวกเธอถูกปิดค่ะ..."
41020-107 = "แต่เมื่อเช้านี้พวกเธอเข้ามายึดสวนสาธารณะแถวๆ โรงเรียน แล้วก็ประท้วงให้ยกเลิกการสั่งปิด#nโรงเรียนค่ะ ไม่รู้ว่าจู่ๆ ก็คิดอะไรกันขึ้นมา"
41020-108 = "ถึงนักเรียนที่ประท้วงจะมีกันอยู่ไม่กี่คน แต่อาวุธที่มีถือเป็นเทคโนโลยีชั้นสูง... อุปกรณ์ของตำรวจ#nที่พวกเรามีแทบจะสู้ไม่ได้เลยค่ะ"
41020-109 = "[s] \"มีข้อมูลเพิ่มเติมไหม?\""
41020-110 = "ที่จริงเราก็มีบันทึกข้อมูลนักเรียนที่ได้รับมาจากสภานักเรียน แต่ว่า..."
41020-114 = "โดรนรายงานสดของโครโนสกำลังบินเข้าไปพอดีเลยค่ะ คุณครูไปดูหน้าผู้ต้องสงสัยจากวิดีโอก่อน#nเถอะค่ะ"
41020-119 = "นี่พวกแก! กล้าดียังไงถึงเข้ามาถ่ายทำฮะ? เดี๋ยวใช้ระบบป้องกันภัยทางอากาศแบบพกพา MANPADS สอยให้ร่วงเลย!"
41020-120 = "ฮุฮุฮุ อย่าใจร้อนไปเลยซากิ"
41020-121 = "ยังไงซะพวกนักเรียนที่ต่อสู้ได้ก็โดนพวกเราโจมตีจนหนีไปหมดแล้ว แค่คนมาขอถ่ายรูปนิดหน่อย#nจะเป็นอะไรไปล่ะ?"
41020-122 = "โอกาสบินมาเราก็ต้องคว้าไว้สิ เราต้องใช้โอกาสนี้ป่าวประกาศว่าการตัดสินใจสั่งปิด SRT#nขององค์การนักเรียนเป็นความคิดที่โง่เขลาแค่ไหน"
41020-123 = "นี่~ พวกองค์การนักเรียนสมองทึบ กำลังดูอยู่ใช่ไหมล่ะ?"
41020-124 = "สิ่งที่พวกเธอวางแผนไว้มันผิดเพี้ยนทั้งหมด พวกไร้สมอง!"
41020-125 = "ถ้าจะต่อสู้ พวกฉันก็จะจัดให้ แต่รู้ไว้ด้วยว่าตราบใดที่พวกฉันยังอยู่ที่นี่ สถาบัน SRT จะไม่มีวันจำนน#nให้เด็ดขาด!"
41020-127 = "ซากิ โมเอะ หยุดใช้กล้องของภายนอกในการยั่วยุที่ไม่จำเป็นเถอะค่ะ"
41020-128 = "พวกเรามายึดที่นี่ไว้เพราะอยู่ในตำแหน่งที่ได้เปรียบในการต่อสู้และต่อรองก็เท่านั้น ไม่ได้จะมาทำ#nการสู้รบแบบระยะยาวสักหน่อยนะคะ"
41020-130 = "โธ่... มิยาโกะนี่ก็จริงจังอยู่เรื่อย หมดสนุกเลย"
41020-134 = "โดรนเครื่องนั้นมันกวนใจชะมัด หัวจะปวดแล้วนะ"
41020-138 = "จะว่าไป... เรายังเหลือกระสุนอีกตั้งเยอะ ยิงเพิ่มอีกสักหน่อยก็ไม่น่าจะเป็นอะไรไม่ใช่เหรอ? คิดว่ามาสอบยิงปืนเอาก็ได้นี่?"
41020-139 = "อะไรกันซากิ เธอคิดเรื่องแบบนี้ตั้งแต่เมื่อไรกันน่ะ?"
41020-140 = "ถูกใจฉันสุดๆ ไปเลย ถ้าเป็นเรื่องสนุกแบบนี้ฉันเอาด้วยคนสิ!"
41020-141 = "หรือว่า... เรามาใช้กระสุนที่เหลือจุดดอกไม้ไฟให้ร้อนวูบวาบกันเลยไหม?"
41020-142 = "มันต้องออกมาเป็นภาพที่น่าจดจำแน่ๆ เลย ฮ่าฮ่า..."
41020-143 = "เรื่องยิงแบบนั้นก็น่าสนใจอยู่หรอก แต่ทำไมรู้สึกเหมือนลืมอะไรไปบางอย่าง..."
41020-149 = "นี่ทุกคน... ไม่ได้ลืมอะไรไปใช่ไหม...?"
41020-150 = "พวกเธอจะทิ้งระเบิด ฉันไม่ว่า แต่อย่าทิ้งมาในที่ที่ฉันอยู่นะ..."
41020-152 = "อ๊ะ"
41020-153 = "นะ... แน่นอนอยู่แล้ว! ใครจะไปลืมได้ล่ะ เราไม่มีทางลืมหรอกว่ามีฝ่ายเราเข้าไปซ่อนตัวอยู่ใกล้#nตำแหน่งของศัตรู"
41020-155 = "ถ้าอย่างนั้นก็ค่อยยังชั่วหน่อย..."
41020-156 = "จะว่าไป ศัตรูก็เหมือนจะกลับกันไปหมดแล้ว ฉันเองก็ควรกลับได้แล้วเนอะ?"
41020-157 = "ที่นี่ทั้งอากาศชื้น แมลงก็เยอะ แล้วก็แทบไม่มีแสงแดดส่องมาเลย..."
41020-158 = "ให้อยู่รอคนเดียวแบบนี้มันน่ากลัวนะ..."
41020-159 = "อย่าร้องไห้ให้ได้ยินนะมิยุ พวกเราเป็นถึงนักเรียนหัวกะทิของ SRT เลยนะ"
41020-160 = "นักเรียนหัวกะทิของ SRT จะขอหยุดภารกิจซ่อนตัวเพราะกลัวแมลงเนี่ยนะ?"
41020-161 = "ถ้าจะร้องไห้ต่ออีกละก็ ไปเรียนที่สถาบันฝึกตำรวจวัลคิรี่แล้วจัดระเบียบการจราจรซะเลยสิ#nฉันไม่ห้ามหรอก"
41020-162 = "มะ... ไม่ใช่อย่างนั้น..."
41020-163 = "ปฏิบัติการนี้ยังไม่เสร็จสิ้นนะมิยุ เธอเห็นโดรนที่บินอยู่บนนั้นไหม?"
41020-164 = "จะยิงให้ตกเดี๋ยวนี้เลย เธอช่วยเช็กพิกัดแล้วบอกฉันที"
41020-165 = "อือ... ได้สิ รอเดี๋ยวก่อนนะ..."
41020-167 = "รอก่อนค่ะซากิ ตอนนี้เราจัดหาอุปกรณ์เพิ่มเติมไม่ได้นะคะ อย่าด่วนยิงอะไรที่ไม่จำเป็นเลยค่ะ การยิงหุนหันพลันแล่นที่เปลืองกระสุน..."
41020-168 = "พูดมากตั้งแต่เมื่อกี๊แล้วนะ!"
41020-169 = "เธอเป็นใครกันน่ะ ทำไมถึงได้มาออกคำสั่งพวกเรา!?"

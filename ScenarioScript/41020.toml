[translation]
41020-1 = "Episode 2; Uninvited Guest in the Park"
41020-3 = "W-We're under attack!"
41020-4 = "Didn't the rear team have our blind spots covered?! Where is it coming from?"
41020-9 = "Did you really think your clumsy movements would go unnoticed?"
41020-10 = "I've been watching you on my thermal monitoring device the whole time."
41020-14 = "Moe! They're restrained!"
41020-15 = "Do your worst!"
41020-16 = "Bombs away!"
41020-22 = "Heeheehee! My moment to shine!"
41020-30 = "A drone attack?!"
41020-31 = "Retreat! Everyone, retreat!"
41020-37 = "What was that explosion?!"
41020-41 = "Alpha Squad, Alpha Squad! Report!"
41020-43 = "Everyone, I hope you didn't blink!"
41020-44 = "The infamous Public Peace Bureau have been mercilessly beat back! Look at them run!"
41020-45 = "With the Security and Public Peace Bureaus down, Valkyrie Police School's last chess piece is the Public Safety Bureau!"
41020-46 = "The students occupying the park are rumored to be from the one and only SRT Academy! Who would've thought they would so completely overpower Valkyrie students like this?!"
41020-47 = "Can we continue to trust them with the security of Kivotos?"
41020-48 = "As more doubts pile up, apprehension is thick amongst the citizens!"
41020-49 = "Shut up! This isn't your business!"
41020-50 = "Did you even receive clearance to film here? This is an operation site! Get out!"
41020-51 = "Look! The corrupt powers of Valkyrie Police School are now aimed at the media!"
41020-52 = "They couldn't even capture the culprit, and now are taking it out on reporters. How shameful!"
41020-53 = "Get lost!"
41020-54 = "Dammit! On top of everything we have to field those Kronos pests? This is ridiculous."
41020-55 = "...They're not wrong though. Do I really have to resort to the Public Safety Bureau?"
41020-56 = "[s] \"Looks like you've got a lot on your plate.\""
41020-58 = "We didn't get rid of everyone?"
41020-59 = "Hey, like I told those reporters. This is an operation site. It's dangerous for folks like you, so please leave."
41020-65 = "[ns] Hand over Rin's introduction."
41020-66 = "An introduction from the senior administrator?"
41020-67 = "She went as far as to dispatch Schale's Sensei... I see..."
41020-68 = "Well..."
41020-69 = "Forgive my rudeness. I didn't recognize you."
41020-75 = "I'm Ogata Kanna, the Valkyrie Public Peace Bureau Director. I'm in charge of this operation site."
41020-76 = "[s1] \"Nice to meet you.\"\n[s2] \"What's going on here?\""
41020-77 = "As you can see..."
41020-78 = "As you can see..."
41020-79 = "The situation isn't great. Morale is low because of how brutally we were shut out. And I don't have many options left."
41020-80 = "The original plan was to compensate for the SRT students' superior equipment with force of numbers. Now we have less numbers and worse guns."
41020-81 = "All we have left is..."
41020-86 = "Director Kanna! Kirino from the Public Safety Bureau reporting in!"
41020-87 = "Your orders, please!"
41020-88 = "Hmm, looks like the situation's pretty much handled. Let's pack it up, everyone. Back to the office. Anyone want a donut?"
41020-90 = "All we have left is the Public Safety Bureau."
41020-91 = "Oh, hello Sensei. Are you here to support us?"
41020-92 = "Looks like it! This must be a bigger deal than we thought."
41020-93 = "Heehee! With Sensei leading us, this operation is in the bag."
41020-94 = "Now, it's time to fight crime and keep our city safe!"
41020-95 = "Hold it! What do you even think you can do out there?"
41020-96 = "The Security and Public Peace Bureaus didn't stand a chance. What in the world is the Public Safety Bureau going to do against SRT elites?"
41020-97 = "What's your plan? To go against a special unit armed with heavy weapons with your little toy guns?"
41020-98 = "...And don't think I'm not aware of your shooting skills."
41020-99 = "W-Well. Th-The plan is to stop the bad guys and help the citizens..."
41020-100 = "I appreciate your enthusiasm. But if enthusiasm could solve anything, we wouldn't be here right now."
41020-101 = "Remain on standby while we search for another way."
41020-102 = "Yes..."
41020-103 = "Heehee. Kirino got yelled at."
41020-104 = "[s] \"Who are the students occupying the park?\""
41020-105 = "They're members of the RABBIT Squad from SRT Academy. I believe they're first-years."
41020-106 = "Originally, the RABBIT Squad was to be transferred to the Valkyrie Security Bureau like the other SRT students, but..."
41020-107 = "As the demolition was about to begin, they began demanding we reverse the decision to close their school and occupied the park."
41020-108 = "There aren't many of them, but they're armed with the most advanced weapons from SRT Academy...so we're having a hard time with just our equipment."
41020-109 = "[s] \"Anything else I should know?\""
41020-110 = "I have some records from the Student Council..."
41020-114 = "Ah, the Kronos broadcasting drone is here. You can see the suspects in the video."
41020-119 = "Who gave you permission to film us?! I'll give you a taste of my MPADS and teach you a lesson."
41020-120 = "Now, now Saki."
41020-121 = "We fought off all their little police officers without breaking a sweat. What's a stupid video gonna do?"
41020-122 = "Maybe they'll even get it through their thick heads that they never should have tried to close down SRT."
41020-123 = "Hi, hi! You listening, you dummy General Student Council members?"
41020-124 = "Please keep struggling uselessly. I've got lots, lots more bombs I want to try out."
41020-125 = "If you want a fight, we'll give you one. SRT Academy's name will persevere through us, no matter what!"
41020-127 = "Saki, Moe. Please exercise restraint for once."
41020-128 = "Our goal is to garner an advantage in negotiations through combat. Not long-term guerrilla warfare."
41020-130 = "U-Ugh. You'll get wrinkles if you keep that serious face all the time, Miyako."
41020-134 = "The drone is annoying though. It's giving me a headache."
41020-138 = "We do still have an arsenal of ammo left. Why don't we have some target practice?"
41020-139 = "Heehee. Saki, have you always been this brilliant?"
41020-140 = "Let's let loose!"
41020-141 = "Oh, oh! Or we can take all the remaining ammo and make fireworks!"
41020-142 = "Heehee, I think I might be drooling."
41020-143 = "That does sound kind of fun, but are we forgetting something important?"
41020-149 = "U-Um... I think that something is me...."
41020-150 = "Are you gonna blow me up with everything?"
41020-152 = "Ah."
41020-153 = "O-Of course not! We would never forget about an ally hidden away behind enemy lines."
41020-155 = "I-I'm happy to hear that..."
41020-156 = "...All the enemies have gone away. Can I come back now?"
41020-157 = "It's all humid and dark, and there's bugs everywhere."
41020-158 = "And it's scary being all by myself."
41020-159 = "Don't be a baby, Miyu. We're SRT elites."
41020-160 = "A true elite would never abandon her mission because of a measly caterpillar."
41020-161 = "If that's how you really feel, why don't you go do some traffic control with Valkyrie Police School? Would you like that better?"
41020-162 = "I don't want that either..."
41020-163 = "Besides, the mission isn't over. Miyu, do you have eyes on the flying drone?"
41020-164 = "We're going to shoot it down. Report target altitude and coordinates as soon as possible."
41020-165 = "Whatever you say, Saki..."
41020-167 = "Saki, stop. We don't have any more supplies coming, so we need to ration what we have. This is unnecessary and reckless."
41020-168 = "I don't want to hear it!"
41020-169 = "Are you giving us orders right now?"
41020-170 = "Yeah! If I wanna blow something up, I'll blow it up."
41020-171 = "The General Student Council president was our leader, not you!"
41020-172 = "I understand, but..."
41020-174 = "...Saki. Target altitude is 900m, distance is 2,500m, and compass point is 0-3-0..."
41020-175 = "Nice work."
41020-179 = "Lock on the target."
41020-180 = "Moe, fire away."
41020-181 = "Oh, oh! This is just my most favoritest part... *pant pant*"
41020-185 = "Aim and... "
41020-186 = "KA-BOOM!"
41020-196 = "We lost the broadcasting drone."
41020-197 = "They dare attack broadcasting equipment from a third party?"
41020-198 = "How were those bastards even allowed in SRT Academy?"
41020-199 = "[s] \"They're definitely lively.\""
41020-200 = "How about idiots?"
41020-201 = "In Kivotos we have a saying. \"I'll fight someone powerful and I'll fight an idiot. But there's nothing more terrifying than a powerful idiot.\""
41020-202 = "We'll need to request support from another academy district's Prefect Team."
41020-206 = "Contact Hina from the Gehenna Prefect Team..."
41020-207 = "[s3] \"I think that's unnecessary.\"\n[s4] \"I think we can handle it ourselves.\""
41020-208 = "Huh? Have you not listened to anything I've said?"
41020-209 = "Huh? Have you not listened to anything I've said?"
41020-210 = "We only have about five Security and Public Peace Bureaus members who can act, including myself."
41020-211 = "[s5] \"Kirino, Fubuki. Up and at 'em.\"\n[s6] \"Kirino, Fubuki. Let's go stop the bad guys.\""
41020-214 = "Wh-Wh-What?! Me? Kirino?!"
41020-215 = "Please tell me you're joking!"
41020-216 = "What am I supposed to do against the SRT?"
41020-221 = "Does this really seem like the time for jokes, Sensei?"
41020-222 = "These students aren't combatants, just small-time idealists who strive for peace."
41020-223 = "How do you expect these measly, untrained students to do anything against enemies that the Security and Public Peace Bureaus couldn't handle?"
41020-224 = "I don't care how skilled you are. You can't use pawns against a queen and expect to win."
41020-225 = "Some pawns are only ever meant to be pawns."
41020-226 = "[s] \"They're not chess pieces. All my students are equal in my eyes.\""
41020-230 = "What a piece of work."
41020-231 = "When, and I say when, things go wrong, Schale will be responsible."
41020-235 = "Listen up! The remaining Public Peace Bureau members are now under Schale's command! Cooperate with the Public Safety Bureau, and for Kivotos' sake, bring me back some good news!"
41020-237 = "W-Wait! This wasn't all just a bad joke?! You want us to fight the SRT elites?"
41020-238 = "Even the Security and Public Peace Bureaus couldn't handle them. This has to be a bad dream."
41020-239 = "[s7] \"It's gonna be okay. Just, trust me.\"\n[s8] \"I wouldn't do this with anyone else.\""
41020-240 = "Don't worry, Fubuki! Under [USERNAME] Sensei's command, we can overcome any evil!"
41020-241 = "Don't worry, Fubuki! Under [USERNAME] Sensei's command, we can overcome any evil!"
41020-242 = "We are the Public Safety Bureau! No matter how small the chances of victory, we must always stand for the safety of our citizens!"
41020-243 = "Ugh... If I knew this was gonna happen, I would've taken sick leave..."
41020-244 = "Well, if we're successful in this mission, you'll be awarded with an actual vacation."
41020-245 = "And even better, we'll prove our worth to the leaders and they'll transfer us to the Security Bureau for our valiant service!"
41020-246 = "I couldn't care less about the Security Bureau, but a vacation on the other hand..."
41020-247 = "I can't say no to that."
41020-248 = "Public Safety Bureau..."
41020-249 = "Operation commence!"

[translation]
10009100-1 = "ย้อนวันวาน;ซูเปอร์โอยาโกะด้ง?!"
10009100-4 = "ทั้งชีวิตของฉันทุ่มเทให้โอยาโกะด้งทั้งหมด..."
10009100-5 = "แต่ตอนนี้รู้สึกเหมือนว่าจะมาถึงขีดจำกัดแล้วเลย ฉันสร้างสรรค์รสชาติใหม่ๆ ไม่ได้อีกแล้ว"
10009100-6 = "ลำพังแค่รสชาติกลมกล่อม นุ่มลิ้นคงไม่เพียงพอสำหรับคนรุ่นใหม่แล้ว..."
10009100-7 = "มันต้องเป็นรสชาติที่แปลกใหม่ ที่ตักเข้าปากแล้วมีสายรุ้งออกมา...!"
10009100-12 = "ดีละ วันนี้ปิดร้านวันหนึ่ง แล้วออกไปค้นคว้าเกี่ยวกับรสชาติกันเถอะ"
10009100-19 = "ช็อกโกแลตบาร์อันนี้... รสชาติหอมสดชื่นมาก! นี่แหละรสชาติที่ฉันตามหา!"
10009100-21 = "ป๊อปปิ้ง แคนดี้ใช่รึเปล่านะ? รสชาติและความรู้สึกแตกเป๊าะแป๊ะในปาก..."
10009100-22 = "ถ้าเอารสชาติและความรู้สึกนี้ไปใส่ในโอยาโกะด้งของฉันได้ละก็ จะต้องได้รสชาติล้ำเลิศออกมาแน่ๆ!"
10009100-23 = "แต่ว่า... ปัญหามันอยู่ที่จะนำไปผสมกับวัตถุดิบอะไร แล้วก็ปรุงรสแบบไหน"
10009100-24 = "ไม่มีไอเดียอะไรดีๆ เลยรึยังไงนะ... เหมือนว่าที่ผ่านๆ มาเอาแต่คิดเรื่องโอยาโกะด้งมาตลอด ตอนนี้ก็เลยหัวตื้อไปหมดแล้วเลย..."
10009100-29 = "อย่างน้อยถ้าถามความเห็นจากพวกเด็กนักเรียนได้ละก็..."
10009100-33 = "หืม?"
10009100-34 = "นี่ แม่หนู ขอรบกวนเวลาสักครู่ได้มั้ย?"
10009100-35 = "ฉันมีเรื่องอยากจะขอความเห็นเธอหน่อยน่ะ"
10009100-36 = "คะ? ถ้าฉันพอจะช่วยได้ก็ยินดีค่ะ มีอะไรเหรอคะ? "
10009100-39 = "หมายถึงสิ่งที่ให้ความรู้สึกจี๊ดๆ และวูบวาบเหรอคะ?"
10009100-40 = "ใช่แล้ว ฉันต้องการรสชาติใหม่ๆ ที่ไม่ล้าสมัย! ถ้าทำรสชาตินั้นออกมาได้ละก็...!"
10009100-41 = "อย่างนั้นเองเหรอคะ รสชาติที่ไม่ล้าหลัง และให้ความรู้สึกวูบวาบ..."
10009100-42 = "ไม่มีวิธีที่ทำให้ได้รสชาติแปลกใหม่ที่ลิ้มรสแล้วมีสายรุ้งออกมาจากปากบ้างเลยเหรอ?"
10009100-47 = "ถ้าอย่างนั้น... ลอง 'ผงปรุงรสระเบิดแสง' นี่ดูมั้ยคะ?"
10009100-48 = "ผะ... ผงปรุงรสระเบิดแสงเหรอ? นี่เธอ... เอาจริงดิ?!"
10009100-49 = "ค่ะ ผงปรุงรสที่ให้รู้สึกเป๊าะแป๊ะๆ ในปาก และมีแสงส่องวาบค่ะ"
10009100-50 = "ฉันคิดว่าไม่มีอะไรที่จะให้รสชาติและความรู้สึกตามที่คุณต้องการได้เท่าผงปรุงรสนี้แล้วค่ะ"
10009100-53 = "(พูดด้วยน้ำเสียงราบเรียบ หน้าตายได้ขนาดนั้นเลยเรอะ...!)"
10009100-54 = "(อย่างนี้นี่เอง นี่สินะวัยหนุ่มสาว โลกอีกด้านหนึ่งที่ฉันไม่รู้จักพัฒนาไปถึงขั้นนี้แล้วเหรอเนี่ย...)"
10009100-56 = "...มันใช้ได้จริงๆ ใช่มั้ย?"
10009100-57 = "แน่นอนค่ะ ปลอดภัยสุดๆ เลยค่ะ"
10009100-58 = "\"ผงปรุงรสระเบิดแสง\" งั้นเหรอ..."
10009100-62 = "ช่างเป็นความคิดสร้างสรรค์ในแบบที่คิดไม่ถึงจริงๆ! นี่สินะการเปลี่ยนผ่านของยุคสมัย! "
10009100-63 = "เข้าใจแล้ว ถ้าเพื่อตามยุคสมัยให้ทันละก็ต้องลอง...!"
10009100-64 = "ถ้าพอจะช่วยคุณได้ละก็ ฉันก็ดีใจค่ะ"
10009100-65 = "ถ้างั้นรับนี่ไปด้วยนะคะ ระเบิดแสงค่ะ"
10009100-66 = "อันนี้ให้มาทำไมน่ะ...?"
10009100-67 = "ช่วงนี้มีเรื่องคนแหกคุก เรื่องวุ่นวาย และเหตุการณ์ต่างๆ เยอะมากค่ะ ฉันคิดว่าคุณจำเป็นต้องใช้มันค่ะ"
10009100-68 = "(เดี๋ยวก่อนนะ ถ้าเอาระเบิดแสงไปใส่ไว้ในเซ็ตเมนูโอยาโกะด้งปรุงรสระเบิดแสงล่ะ...?)"
10009100-69 = "(อาจจะเป็นเมนูแปลกใหม่ที่สมบูรณ์แบบสุดๆ ไปเลยก็ได้นะ?!)"
10009100-70 = "ขอขอบคุณอีกครั้งแล้วกันนะ ขอบคุณจริงๆ... ฉันจะไม่ลืมบุญคุณครั้งนี้เลย!"
10009100-71 = "ไม่ถึงขั้นติดหนี้บุญคุณอะไรกันหรอกค่ะ ยังไงก็ระวังตัวด้วยนะคะ"
10009100-78 = "สวัสดีค่ะ ขอสั่งโอยาโกะด้งเหมือนเดิมหนึ่งชามค่ะ"
10009100-83 = "ได้เลย โอยาโกะด้งหนึ่งชาม! ตั้งแต่วันนี้เรามีเมนูใหม่มาแล้ว"
10009100-87 = "ถ้าได้ลองชิมสักครั้ง จะไม่มีทางลืมรสชาตินี้ได้อย่างแน่นอน!"

[translation]
10009100-1 = "Afterword; The Ultimate Oyakodon?!"
10009100-4 = "My whole life, I've given everything to oyakodon, and where has it gotten me?"
10009100-5 = "I'm stuck. I've reached my limit. All I can make is the same old flavors..."
10009100-6 = "It's not enough. Sure, my flavors are smooth and well-balanced, but if that's as far as I get, the next generation will leave me in the dust."
10009100-7 = "I need a new flavor. Something that really pops."
10009100-12 = "All right. I've decided! I'm going to take time off for flavor research."
10009100-19 = "This chocolate bar is... It's exactly what I'm looking for!"
10009100-21 = "\"Popping candy,\" eh? The way it bursts on the tongue with both texture and flavor... Exquisite!"
10009100-22 = "If I could incorporate this feeling and get it to harmonize with my oyakodon, it would be the ultimate flavor!"
10009100-23 = "But I'm not there yet. What ingredients do I use? How do I blend them?"
10009100-24 = "Will inspiration come to me? It's been so long since I've thought about anything other than oyakodon that I feel like my brain is stuck in a rut."
10009100-29 = "A fresh opinion... I could ask a student!"
10009100-33 = "Huh?"
10009100-34 = "Hey there! Would you mind helping me out a bit?"
10009100-35 = "I just had a quick question."
10009100-36 = "Er, what? Sure, I'd be happy to help, but what's this about?"
10009100-39 = "You need...something flashy and exhilarating?"
10009100-40 = "Yes, exactly! I need something that captures the spirit of the times!"
10009100-41 = "I see. Something fresh, that pops..."
10009100-42 = "Yes, yes! I want the flavors to hit you with a bang!"
10009100-47 = "Oh, I see. You want flash-grenade seasoning."
10009100-48 = "F-Flash-grenade seasoning? Are you serious?!"
10009100-49 = "Yes, flash-grenade seasoning will pop in your mouth and create an intense glow."
10009100-50 = "It fits the flavor you want perfectly, doesn't it?"
10009100-53 = "(She's saying it so nonchalantly. Her expression didn't change at all!)"
10009100-54 = "(So this is youth, is it? To think the world would have come to this, and I had no idea...)"
10009100-56 = "But could I really use that?"
10009100-57 = "Oh, of course. I wouldn't suggest it if it wasn't safe."
10009100-58 = "Hm, I see. Flash-grenade seasoning..."
10009100-62 = "That's...incredible! Completely novel! Truly a sign of the times!"
10009100-63 = "With this, I'll be able to keep up with the next generation of cooks. I can't thank you enough."
10009100-64 = "Oh, er... I'm just happy I could help you."
10009100-65 = "Please take this. It's a flash grenade."
10009100-66 = "What? Why?"
10009100-67 = "With all the jailbreaks going on, the streets are in chaos. You need to be able to defend yourself."
10009100-68 = "(A flash grenade...and flash-grenade seasoned oyakodon... Together, they could be the perfect combo meal!)"
10009100-69 = "(Surely no one's seen anything like it!)"
10009100-70 = "Thank you again. Truly, if I can ever repay the favor... I won't ever forget this!"
10009100-71 = "Uh, was this a favor...? It's really fine. Take care of yourself."
10009100-78 = "Hello? I'd like the usual, one bowl of oyakodon."
10009100-83 = "One bowl of oyakodon! As of today, we have a new and improved recipe."
10009100-87 = "I guarantee it will be unforgettable!"

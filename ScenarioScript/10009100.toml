[translation]
10009100-1 = "後日談其三;究極的親子丼！？"
10009100-4 = "雖然把一生都奉獻給了親子丼……"
10009100-5 = "腦袋裡毫無靈感……#n難道我無法做出究極的親子丼嗎……"
10009100-6 = "光靠柔軟和滑嫩，是沒辦法在今後的時代裡生存的啊……"
10009100-7 = "加入新要素能帶來改變嗎……#n對了！就來個爆炸性的嘗試吧！"
10009100-12 = "既然這麼決定了，今天就先關店，來研究新的食譜吧！"
10009100-19 = "好，接下來是最近很紅的巧克力棒……嗯！#n就是這個，這就是我正在尋找的東西啊！"
10009100-21 = "不只是單純的巧克力，這種在口中爆炸的感覺……#n好像會讓人上癮。"
10009100-22 = "只要能夠重現這種感覺，肯定能誕生出嶄新的親子丼！"
10009100-23 = "但是，究竟該用什麼食材來重現呢……"
10009100-24 = "顛覆至今為止親子丼的新想法……唔嗯。#n畢竟我的人生都用來思考親子丼了，一時之間沒什麼靈感啊……"
10009100-29 = "對了，聽聽看年輕人的意見吧！"
10009100-33 = "……哦。"
10009100-34 = "這位同學，"
10009100-35 = "可以問你一件事嗎？"
10009100-36 = "好，好的。#n如果我能幫得上忙的話。"
10009100-39 = "想在親子丼中加入刺激的東西……是嗎？"
10009100-40 = "就是說啊！最近有話題性的料理才有人氣，#n所以我也想在親子丼裡加入一些刺激新穎的感覺！"
10009100-41 = "原來如此……刺激的，新感覺啊……"
10009100-42 = "有沒有那種能讓人眼前一亮的東西呀？#n能讓客人嘗過一次就永生難忘的那種……"
10009100-47 = "那……這個「閃光彈風調味料」怎麼樣呢？"
10009100-48 = "閃，閃光彈風調味料……！？這位同學，那個是！？"
10009100-49 = "是會在口中發出強烈光芒的調味料。"
10009100-50 = "我想應該沒有其他東西，比它更符合職人希望達到的印象了。"
10009100-53 = "（說話時居然堅定到連眉毛都動也不動……！）"
10009100-54 = "（這樣啊，這就是年輕嗎……#n　在我埋首製作親子丼的期間，不知不覺也過去不少年了啊……）"
10009100-56 = "……真的可以用嗎？"
10009100-57 = "當然可以，它很安全的。"
10009100-58 = "閃光彈風調味料啊……"
10009100-62 = "我想都沒想過……#n這就是時代的最新潮流嗎……！"
10009100-63 = "謝謝你，這位同學！我這就回去嘗試新的食譜！"
10009100-64 = "不客氣，希望有幫上忙。"
10009100-65 = "還有，請收下這個吧。是閃光彈。"
10009100-66 = "閃光彈……為什麼要給我呢？"
10009100-67 = "最近治安不太穩定……為了以防萬一，還是事先做好準備比較好。"
10009100-68 = "（等等……如果把這個閃光彈，當成閃光彈風調味料親子丼的配餐……？）"
10009100-69 = "（不就能創造出更嶄新的食譜了嗎！？）"
10009100-70 = "再次謝謝你，謝謝……我不會忘記這份恩情的！"
10009100-71 = "您言重了，這算不上什麼恩情。還請注意安全。"
10009100-78 = "喂？我想要一份親子丼。"
10009100-83 = "好的，親子丼一份對吧。從今天起，親子丼的做法更新了哦！"
10009100-87 = "應該只要吃過一次就會永生難忘，敬請期待！"

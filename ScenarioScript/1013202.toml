[translation]
1013202-1 = "Modeling, Again!"
1013202-2 = "Backstage of the Fashion Show"
1013202-4 = "I was concerned about Tsukuyo returning to modeling after quitting so recently, so I went to see the show with my own eyes."
1013202-5 = "Ah, Sensei. Here!"
1013202-6 = "I-I hope you didn't have any trouble getting in."
1013202-7 = "[s] \"A staff member helped me.\""
1013202-8 = "Heehee, that's a relief."
1013202-9 = "I...informed the staff beforehand..."
1013202-10 = "I said a \"very important person\" was dropping by, so please make sure to take care of them..."
1013202-11 = "[s] \"You were referring to me?\""
1013202-12 = "It...really is odd to meet you backstage like this."
1013202-13 = "I feel like...we're meeting somewhere secret. Heehee."
1013202-14 = "[s1] \"It really does feel like that.\"\n[s2] \"How are the fashion show preparations going?\""
1013202-17 = "Oh, right! I already completed my initial fitting, and I was reviewing my walk."
1013202-18 = "I'm not yet used to these heels, so I thought I should practice."
1013202-19 = "[s] \"Oh... You sounded like a real expert just now, Tsukuyo!\""
1013202-23 = "N-Not at all!"
1013202-24 = "There are certainly people with longer careers...true professionals."
1013202-25 = "At any rate, today will be my last day modeling."
1013202-26 = "Wh-What do you think, Sensei?"
1013202-32 = "Does the dress, um, look good on me?"
1013202-33 = "[s3] \"What a redundant question!\"\n[s4] \"You'd look good in any piece of clothing in Kivotos!\""
1013202-36 = "W-Waaah..."
1013202-37 = "You...needn't flatter me..."
1013202-38 = "B-But I still appreciate your words, Sensei. Heehee..."
1013202-39 = "[s] \"Speaking of that... What made you try modeling again?\""
1013202-40 = "Oh, this client knew me from my time at Shinecat's agency."
1013202-41 = "I initially wanted to refuse, but..."
1013202-42 = "As I learned more about it, it didn't seem too bad for a one-day part-time job..."
1013202-43 = "And, um..."
1013202-45 = "...The people hosting the fashion show made me an offer I couldn't refuse..."
1013202-46 = "[s] \"...An offer you couldn't refuse?\""
1013202-47 = "Correct."
1013202-48 = "Honestly, I already quit being a model previously..."
1013202-49 = "...So I was nervous to jump back into it..."
1013202-50 = "But when they submitted their offer, I found myself changing my mind..."
1013202-51 = "[s] \"Just what did they offer...?\""
1013202-52 = "Oh, well..."
1013202-56 = "Please get in position. We start in 10 minutes."
1013202-57 = "Oh, look at the time...!"
1013202-58 = "I'll be right back, Sensei!"
1013202-64 = "I couldn't shake the feeling that something was off..."
1013202-65 = "So I tried to watch Tsukuyo as closely as I could."
1013202-67 = "Fashion Show Venue"
1013202-69 = "Soon, the fashion show began."
1013202-85 = "Tsukuyo performed splendidly."
1013202-86 = "...And the show went off without a hitch."
1013202-92 = "Outside the Venue"
1013202-93 = "After the final walks, I met Tsukuyo outside."
1013202-97 = "Ah, Sensei!"
1013202-98 = "I'm sorry for the delay."
1013202-99 = "[s] \"No, it's fine. I just got out, too.\""
1013202-100 = "R-Really?"
1013202-101 = "Heehee... That's good."
1013202-102 = "And...now that I'm done with the fashion show gig..."
1013202-104 = "You, over there. Hold it."
1013202-108 = "Excuse me...?"
1013202-109 = "Listen up, Miss Tsukuyo. You can't just leave...!"
1013202-110 = "What...?"
1013202-111 = "We had an agreement, and YOU have an obligation to stay."
1013202-112 = "I hope you didn't forget the contract you signed."
1013202-113 = "Oh...! I'm sorry, but I did. I was in such a rush..."
1013202-114 = "[s] \"Wait, is the offer you couldn't refuse actually...\""
1013202-118 = "Oh, so you've heard of it."
1013202-119 = "Yes. Thanks to my shrewd negotiation, I was able to hire a fine model like Tsukuyo."
1013202-120 = "And her stipulation was..."
1013202-124 = "...a genuine press release for \"A Ninja has Seven Lives\"! It's Shiba Dog Wang Wang's 13th film, and it was a hit!"
1013202-125 = "[s] \"...Huh?\""
1013202-126 = "It was an iconic film, but due to a...heated climate at the time, the marketing push was so small that there are almost no press releases left. This is a very rare pamphlet! And it's gorgeous!"
1013202-127 = "Naturally, we were the agency in charge of marketing!"
1013202-128 = "So Ms. Tsukuyo signed her name on the dotted line...earning her usual modeling fee as well as a genuine pamphlet!"
1013202-129 = "[s] \"...Was that really it?!\""
1013202-131 = "Yes! Having one of these in the club room would make the president and Izuna overjoyed!"
1013202-132 = "Heehee, I almost left without it. Thank goodness you found me. Thank you."
1013202-133 = "This is the whole reason I resumed modeling, after all."
1013202-134 = "Oh, speaking of that, Miss Tsukuyo. "
1013202-135 = "Why don't you just take the plunge and make a grand return to the runway? "
1013202-136 = "...What? "
1013202-137 = "Just a few days ago, I ran into Shinecat at a fashion conference..."
1013202-138 = "And I could tell that he...was still a fan of yours."
1013202-139 = "B-But... "
1013202-140 = "While that is a very flattering thing to hear, I... "
1013202-144 = "If I may be honest, that was such a scary time for me. "
1013202-145 = "The hellish training...the all-veggie diet...all the maintenance and stress!"
1013202-146 = "It takes more than talent to be a model, I'll give you that. "
1013202-147 = "I'm sorry for bringing it up."
1013202-148 = "N-Not at all! If anything, I'm very grateful for the offer. "
1013202-149 = "If you'll excuse me, I'll head back inside. Thank you for coming. "
1013202-153 = "I sort of feel like I need to apologize... "
1013202-158 = "I barely ate over the last few days because I was so pressured to get back into shape!"
1013202-159 = "[s] \"In that case, Tsukuyo... Come with me. I know a restaurant.\""
1013202-160 = "S-Sensei...?"
1013202-161 = "A-Are you sure I should be..."
1013202-162 = "[s5] \"Those who don't work shouldn't eat.\"\n[s6] \"But you worked, so you deserve to eat!\""
1013202-165 = "Oh!"
1013202-166 = "I-In that case..."
1013202-167 = "Th-Thank you, Sensei!"
1013202-169 = "The bill was a bit higher than I expected, but..."
1013202-170 = "...seeing Tsukuyo smile again was worth much more than the tab."

[translation]
1013202-1 = "ได้เป็นนางแบบอีกครั้งค่ะ!"
1013202-2 = "หลังรันเวย์แฟชั่นโชว์"
1013202-4 = "(คุณครูตะหงิดใจที่สึคุโยะกลับไปทำงานนางแบบที่เคยเลิกทำไปแล้ว จึงตัดสินใจไปสังเกตการณ์)"
1013202-5 = "อ๊ะ คุณครู! ทางนี้ค่ะ!"
1013202-6 = "ตะ... ตอนเข้ามาที่นี่ ไม่ได้มีปัญหาอะไรใช่มั้ยคะ?"
1013202-7 = "[s] \"อื้อ ทีมงานที่นี่ต้อนรับครูอย่างดีเลย\""
1013202-8 = "แหะๆ คะ... ค่อยยังชั่วหน่อยนะคะ"
1013202-9 = "ที่จริงฉันไปบอกพวกสตาฟไว้ล่วงหน้าน่ะค่ะ"
1013202-10 = "บะ... บอกว่าจะมีคนสำคัญแวะมา ก็เลยขอให้ช่วยต้อนรับและดูแลเป็นอย่างดี..."
1013202-11 = "[s] \"ครูได้เป็นคนสำคัญเลยเหรอ?!\""
1013202-12 = "จะ... จะว่าไปก็น่าทึ่งจังเลยนะคะที่ได้เจอคุณครูหลังเวทีแบบนี้"
1013202-13 = "ระ... รู้สึกเหมือนเป็นการนัดพบอย่างลับๆ ยังไงไม่รู้ค่ะ... แหะๆ"
1013202-14 = "[s1] \"นั่นสินะ ว่าแต่วันนี้เป็นยังไงบ้าง?\"\n[s2] \"นั่นสินะ แล้วนางแบบเตรียมตัวถึงไหนแล้ว?\""
1013202-17 = "อ้อ ค่ะ! ฉันเปลี่ยนชุดเรียบร้อยแล้ว และก็กำลังฝึกเรื่องการเดินอยู่ค่ะ"
1013202-18 = "ฉันไม่ค่อยคุ้นเคยกับรองเท้าส้นสูงที่ใส่เดินวันนี้ ก็เลยอยากใส่เดินให้ชินเท้าก่อนน่ะค่ะ"
1013202-19 = "[s] \"โอ้... เหมือนนางแบบมืออาชีพเลยละ สึคุโยะ!\""
1013202-23 = "มะ... ไม่หรอกค่ะ!"
1013202-24 = "มะ... มีนางแบบหลายคนที่ทั้งเชี่ยวชาญและมีประสบการณ์การทำงานมากกว่าฉันอีกค่ะ...!"
1013202-25 = "เหนือสิ่งอื่นใด วันนี้คือการทำงานนางแบบครั้งสุดท้ายของฉันแล้วจริงๆ..."
1013202-26 = "วะ... ว่าแต่คุณครูคิดว่ายังไงบ้างเหรอคะ?"
1013202-32 = "ชุดนี้มัน... เอ่อ... เหมาะกับฉันหรือเปล่าคะ?"
1013202-33 = "[s3] \"ไม่มีใครเหมาะกับชุดนี้ไปกว่าสึคุโยะแล้วละ!\"\n[s4] \"ไม่มีชุดไหนที่นางแบบสึคุโยะใส่ไม่สวยอยู่แล้ว!\""
1013202-36 = "แหะ... แหะๆๆ..."
1013202-37 = "ยะ... ยะ... อย่าชมให้เหลิงแบบนั้นสิคะ..."
1013202-38 = "ตะ... แต่ยังไงก็ขอบคุณที่ช่วยพูดแบบนั้นนะคะคุณครู แหะๆ..."
1013202-39 = "[s] \"ว่าแต่ทำไมถึงกลับมาทำงานนางแบบอีกครั้งเหรอ?\""
1013202-40 = "อ่า ไม่กี่วันมานี้ทางไชน์แคทเอเจนซี่ติดต่องานนางแบบแฟชั่นฉันมาน่ะค่ะ "
1013202-41 = "ตอนแรกฉันก็พยายามปฏิเสธ..."
1013202-42 = "แต่พอรู้ว่าเป็นงานพาร์ทไทม์แค่วันเดียว ก็เลยคิดว่าไม่น่าจะเป็นภาระมากเกินไป..."
1013202-43 = "และที่สำคัญที่สุด เอ่อ..."
1013202-45 = "ทางผู้จัดงานยื่นข้อเสนอที่ฉันปฏิเสธไม่ได้น่ะค่ะ..."
1013202-46 = "[s] \"ข้อเสนอที่ปฏิเสธไม่ได้?\""
1013202-47 = "ใช่ค่ะ"
1013202-48 = "ที่จริงฉันเคยลาออกจากงานนางแบบมาแล้วครั้งหนึ่ง..."
1013202-49 = "การจะกลับไปทำงานนางแบบอีกก็เลยเป็นเรื่องน่าลำบากใจ..."
1013202-50 = "แต่ทันทีที่ได้ยินเงื่อนไข ฉันก็เปลี่ยนใจและตัดสินใจรับงานนี้เลยค่ะ..."
1013202-51 = "[s] \"เงื่อนไขที่ว่าคืออะไรเหรอ...?\""
1013202-52 = "อ่า เรื่องนั้น..."
1013202-56 = "ช่วยเตรียมตัวด้วยครับ การเดินแบบจะเริ่มในอีก 10 นาทีครับ"
1013202-57 = "อ๊ะ จะถึงเวลาแล้วเหรอเนี่ย...!"
1013202-58 = "ฉันจะรีบกลับมานะคะ คุณครู!"
1013202-64 = "(ไม่ว่าจะคิดยังไง คุณครูก็รู้สึกว่ามีบางอย่างไม่ชอบมาพากล...)"
1013202-65 = "(จึงตัดสินใจเฝ้าดูสึคุโยะให้มากที่สุดเท่าที่จะทำได้)"
1013202-67 = "งานแฟชั่นโชว์"
1013202-69 = "(แล้วงานแฟชั่นโชว์ก็เริ่มขึ้น)"
1013202-85 = "(สึคุโยะทำหน้าที่ของตัวเองได้อย่างสมบูรณ์แบบ...)"
1013202-86 = "(งานแฟชั่นโชว์ก็ดำเนินไปอย่างราบรื่นตั้งแต่ต้นจนจบ...)"
1013202-92 = "หลังรันเวย์แฟชั่นโชว์"
1013202-93 = "(หลังจากแฟชั่นโชว์จบลง คุณครูก็ได้เจอสึคุโยะนอกสถานที่จัดงาน)"
1013202-97 = "อ๊ะ คุณครู!"
1013202-98 = "ขอโทษด้วยค่ะ ฉันมาช้าไปหน่อยใช่มั้ยคะ?"
1013202-99 = "[s] \"เปล่าหรอก ครูก็เพิ่งออกมาจากงานเหมือนกัน\""
1013202-100 = "จะ... จริงเหรอคะ?"
1013202-101 = "แหะๆ... งั้นก็โล่งอกไปทีนะคะ..."
1013202-102 = "งะ... งั้นในเมื่อจบงานพาร์ทไทม์แฟชั่นโชว์แล้ว ฉันว่าเรากลับ..."
1013202-104 = "เฮ้ หยุดก่อน"
1013202-108 = "คะ...?"
1013202-109 = "นี่ คุณสึคุโยะ จะกลับเลยแบบนี้ไม่ได้สิ...!"
1013202-110 = "คะ...?"
1013202-111 = "เราสัญญากันไว้แล้วไม่ใช่เหรอ?"
1013202-112 = "อย่าบอกนะว่าลืมสัญญาจ้างงานที่เราตกลงกันไว้น่ะ?"
1013202-113 = "อ๊ะ...! จะว่าไป ฉันรีบออกมาจนลืมเรื่องนั้นไปเลยค่ะ!"
1013202-114 = "[s] \"อย่าบอกนะว่าเงื่อนไขที่บอกว่าปฏิเสธไม่ได้ก็คือ...!\""
1013202-118 = "โอ้ คุณก็รู้เรื่องนั้นด้วยเหรอ?"
1013202-119 = "อื้อ ใช่แล้วละ เงื่อนไขนั้นทำให้ฉันว่าจ้างนางแบบชั้นเยี่ยมอย่างสึคุโยะได้"
1013202-120 = "และนั่นก็คือ..."
1013202-124 = "แผ่นพับรอบปฐมทัศน์ของ <นินจา 7 ชีวิต> ภาพยนตร์เรื่องที่ 13 ของปรมาจารย์ผู้กำกับชิบะ!"
1013202-125 = "[s] \"หา...?\""
1013202-126 = "ถึงภาพยนตร์เรื่องนั้นจะเป็นผลงานชิ้นโบว์แดง แต่ตอนนั้นด้วยปัญหาหลายอย่างทำให้จัดรอบปฐมทัศน์#nขนาดเล็กมาก ก็เลยจัดทำแผ่นพับออกมาแค่ไม่เท่าไร"
1013202-127 = "แต่บริษัทที่จัดงานรอบปฐมทัศน์ก็คือบริษัทของฉันน่ะสิ...!"
1013202-128 = "คุณสึคุโยะก็เลยยอมรับงานภายใต้เงื่อนไขที่ว่า นอกจากค่าจ้างนางแบบแล้ว จะได้แผ่นพับภาพยนตร์#nที่บริษัทมีเหลืออยู่กลับไปด้วย!"
1013202-129 = "[s] \"เป็นอย่างนี้หรอกเหรอ...?!\""
1013202-131 = "ค่ะ! ถ้าได้ติดแผ่นพับหายากแบบนี้ไว้ในห้องชมรม หัวหน้ากับอิซุนะจังต้องดีใจแน่ๆ ค่ะ!"
1013202-132 = "แหะๆ เกือบไม่ได้แผ่นพับกลับไปแล้วสินะคะ โล่งอกไปทีค่ะ"
1013202-133 = "นี่คือเหตุผลที่ฉันกลับมาทำงานนางแบบอีกครั้งค่ะ"
1013202-134 = "อ้อ คุณสึคุโยะ จะว่าไปแล้ว "
1013202-135 = "ในเมื่อเป็นอย่างนี้แล้ว ลองกลับมาทำงานนางแบบถาวรเลยมั้ยล่ะ? "
1013202-136 = "คะ...? "
1013202-137 = "ที่จริงแล้วเมื่อไม่นานมานี้ ฉันมีโอกาสได้คุยกับดีไซเนอร์ไชน์แคทเป็นการส่วนตัวในงานประชุม#nด้านแฟชั่นงานหนึ่ง..."
1013202-138 = "ดูเหมือนดีไซเนอร์ไชน์แคทจะยังอยากได้คุณสึคุโยะมาเดินแบบให้อยู่นะ"
1013202-139 = "งะ... งั้นเหรอคะ... "
1013202-140 = "ฉันซาบซึ้งที่มาบอกแบบนี้นะคะ ต้องขอบคุณมากๆ เลยค่ะ... "
1013202-144 = "แต่บอกตามตรงว่าฉันกลัวที่จะกลับไปจุดนั้นอีกครั้งค่ะ... "
1013202-145 = "ทั้งการฝึกสุดโหด... การคุมอาหารที่ได้กินแต่ผัก... และทุกชั่วขณะที่มีแต่ความตึงเครียด..."
1013202-146 = "การเป็นนางแบบไฮแฟชั่นไม่ใช่งานที่อยู่รอดได้ด้วยพรสวรรค์เพียงอย่างเดียวอยู่แล้ว... "
1013202-147 = "ขอโทษที่ฉันเสียมารยาทนะ"
1013202-148 = "มะ... ไม่ใช่อย่างนั้นค่ะ! ฉันต้องขอบคุณมากกว่าค่ะที่มองเห็นศักยภาพในตัวฉัน! "
1013202-149 = "ถ้างั้นฉันคงต้องขอตัวกลับก่อนละ "
1013202-153 = "อึก รู้สึกผิดยังไงไม่รู้ค่ะ... "
1013202-158 = "ละ... แล้วก็... ที่จริงไม่กี่วันมานี้ฉันแทบไม่ได้กินข้าวเลย เพราะต้องรักษาหุ่นให้ทำงานได้...!"
1013202-159 = "[s] \"ไปกันเถอะ สึคุโยะ ครูรู้จักร้านอาหารอร่อยๆ อยู่นะ\""
1013202-160 = "คะ... คุณครู...?"
1013202-161 = "ฉะ... ฉันกินของแบบนั้นได้เหรอคะ..."
1013202-162 = "[s5] \"ตั้งใจทำงานแล้ว ก็ต้องให้รางวัลตัวเองสิ!\"\n[s6] \"ตั้งใจทำงานแล้ว ก็ต้องไปกินให้อิ่มสิ!\""
1013202-165 = "อ๊ะ...!"
1013202-166 = "ถะ... ถ้างั้น..."
1013202-167 = "ฉะ... ฉันจะกินให้อร่อยเลยค่ะ คุณครู!"
1013202-169 = "(บิลค่าอาหารออกมาแพงกว่าที่คุณครูคิดไว้นิดหน่อย...)"
1013202-170 = "(แต่พอเห็นใบหน้าที่ยิ้มแย้มของสึคุโยะ คุณครูก็พอใจ)"

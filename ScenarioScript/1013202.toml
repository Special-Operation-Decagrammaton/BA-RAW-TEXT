[translation]
1013202-1 = "再次，擔任模特兒！"
1013202-2 = "時裝秀會場後台"
1013202-4 = "（聽說本來不做了的月夜又重新開始模特兒工作之後，#n　因為感到有點擔心，於是決定去參觀看看）"
1013202-5 = "啊，老師！我在這裡！"
1013202-6 = "進，進來的時候，應該沒有遇到什麼問題吧？"
1013202-7 = "[s]「嗯，工作人員都很親切地幫我指路。」"
1013202-8 = "嘿嘿，太，太好了。"
1013202-9 = "其實，我有事先跟工作人員們說過……"
1013202-10 = "會，會有一位非常了不起的人要過來，請他們多多關照……"
1013202-11 = "[s]「是指我嗎！？」"
1013202-12 = "話，話說，能在後台見到老師，感覺真神奇呢。"
1013202-13 = "有，有一種像是在偷偷見面的感覺……嘿嘿。"
1013202-14 = "[s1]「確實如此呢。」\n[s2]「服裝秀準備得還順利嗎？」"
1013202-17 = "啊，是的！衣服已經穿好了，剛才正在確認走台步的姿勢。"
1013202-18 = "因為我還不太習慣今天這雙鞋子的高度，所以想讓腳先適應一下。"
1013202-19 = "[s]「哦……剛才那番話聽起來很專業哦，月夜！」"
1013202-23 = "沒，沒有啦！"
1013202-24 = "比，比我更資深、更專業的人還多得是……！"
1013202-25 = "而且最重要的是，今天真的是我最後一次參加模特兒活動了……"
1013202-26 = "那，那個……老師看起來，覺得怎麼樣呢？"
1013202-32 = "這套禮服……那，那個，適合我嗎？"
1013202-33 = "[s3]「這還需要問嗎！」\n[s4]「天底下哪有模特兒月夜大人駕馭不了的衣服呢！」"
1013202-36 = "嗚，嗚咿……"
1013202-37 = "請，請，請不要那麼抬舉我……"
1013202-38 = "不，不過還是謝謝老師這麼看好我，耶嘿嘿……"
1013202-39 = "[s]「話說回來，月夜為什麼又開始做模特兒的工作了呢？」"
1013202-40 = "啊，其實我是在幾天前，收到了Shine Cat Agency傳來的工作邀約……"
1013202-41 = "我一開始也打算要拒絕……"
1013202-42 = "結果後來聽說是只有一天的短期打工，應該不會有什麼負擔……"
1013202-43 = "而且，那個……"
1013202-45 = "……服裝秀的主辦方，向我提出了一個無法拒絕的條件。"
1013202-46 = "[s]「……無法拒絕的條件？」"
1013202-47 = "是的。"
1013202-48 = "老實說，我畢竟已經放棄過模特兒的工作……"
1013202-49 = "所以對於回來當模特兒這件事……確實感到有點抗拒……"
1013202-50 = "不過在聽到條件的瞬間……我就改變主意，決定接下這份工作了。"
1013202-51 = "[s]「到底是什麽樣的條件……？」"
1013202-52 = "啊，那是……"
1013202-56 = "麻煩做好準備。十分鐘後即將開始。"
1013202-57 = "啊，時間到了……！"
1013202-58 = "我去去就回，老師！"
1013202-64 = "（不管怎麼想都覺得有點可疑……）"
1013202-65 = "（因此決定在盡可能近的地方守護著月夜）"
1013202-67 = "時裝秀會場"
1013202-69 = "（不久後，時裝秀開始了）"
1013202-85 = "（月夜精彩地完成了自己的工作……）"
1013202-86 = "（……時裝秀平穩地進行，從開始到結束都沒有發生任何問題）"
1013202-92 = "時裝秀會場外"
1013202-93 = "（時裝秀結束後，在會場外與月夜碰面）"
1013202-97 = "啊，老師……！"
1013202-98 = "對不起，我來晚了吧？"
1013202-99 = "[s]「不會，我也才剛出來沒多久。」"
1013202-100 = "真，真的嗎？"
1013202-101 = "嘿嘿……太好了。"
1013202-102 = "那，那麼，既然模特兒的打工也結束了……"
1013202-104 = "喂喂喂，先等一下。"
1013202-108 = "咦……？"
1013202-109 = "我說月夜同學啊，你該不會想就這樣走掉吧？"
1013202-110 = "嗯……？"
1013202-111 = "我們不是約定好了嗎？"
1013202-112 = "你該不會忘了我們簽的勞動契約吧？"
1013202-113 = "啊……！因為急著出來，不小心忘記了！"
1013202-114 = "[s]「難道說，那個無法拒絕的條件是……！」"
1013202-118 = "哦……？這邊這位也知道嗎？"
1013202-119 = "沒錯，我就是靠著它，才能請出月夜同學這麼才華洋溢的模特兒。"
1013202-120 = "那個條件就是……"
1013202-124 = "「柴犬汪藏」導演的第13部電影──《七命怪忍》的試映會手冊！"
1013202-125 = "[s]「……啊？」"
1013202-126 = "雖然那是一部相當優秀的作品，可惜當時在諸多原因的影響之下，#n試映會的規模辦得相當小，所以現在幾乎沒有留下試映會的手冊。"
1013202-127 = "不過！當時那場試映會的主辦單位，正是我們公司……！"
1013202-128 = "所以除了模特兒的酬勞之外，還會另外附上這本留在公司倉庫的手冊……#n這才讓我們得到了月夜同學的首肯！"
1013202-129 = "[s]「……原來是這樣啊！？」"
1013202-131 = "是的！如果能把這麼稀有的手冊掛在部室裡，部長和伊樹菜醬一定也會很開心的！"
1013202-132 = "嘿嘿，差點就忘記拿了呢……"
1013202-133 = "我就是為了這個，才會回來當模特兒的說。"
1013202-134 = "啊，對了，月夜同學。 "
1013202-135 = "既然都這樣了，你要不要考慮乾脆重回業界啊？ "
1013202-136 = "……咦？ "
1013202-137 = "其實在前幾天的時尚研討會上，我和Shine Cat設計師私下聊過……"
1013202-138 = "感覺他至今都還對月夜同學念念不忘呢。"
1013202-139 = "什，什麼…… "
1013202-140 = "我，我很感謝設計師這麼欣賞我…… "
1013202-144 = "不過老實說，那段時間的生活實在太可怕了…… "
1013202-145 = "地獄般的訓練……只能吃一點點蔬菜的飲食管理……#n再加上每分每秒都無法鬆懈的緊張感……"
1013202-146 = "也是啦，高級時裝模特兒的工作，並不是光靠天賦就能撐下去的領域…… "
1013202-147 = "是我失禮了。"
1013202-148 = "別，別這麼說！你這麼看好我，我反而要說謝謝才對！ "
1013202-149 = "那麼，我就先告辭囉。 "
1013202-153 = "呼……總覺得有點過意不去呢…… "
1013202-158 = "那，那個，其實我這幾天為了重新塑身，幾乎都沒有好好吃飯……！"
1013202-159 = "[s]「走吧，月夜。我知道一間好吃的餐廳。」"
1013202-160 = "老，老師……？"
1013202-161 = "我，我真的可以吃這麼好的東西嗎……"
1013202-162 = "[s5]「不勞動者，不得食。」\n[s6]「所以既然勞動了就盡量吃吧！」"
1013202-165 = "啊啊……！"
1013202-166 = "那，那麼……"
1013202-167 = "我要開動了，老師！"
1013202-169 = "（雖然餐費比預期多了一點……）"
1013202-170 = "（不過在見到月夜的笑容之後，那種事好像也無所謂了）"

[translation]
1002105-1 = "#title;한눈에 들어오는 것"
1002105-2 = "#na;(아즈사에게 위치를 물어 먼저 찾아갔다. 도착한 곳은 노을이 지기 시작한 해변가였다.)"
1002105-3 = "3;아즈사 수영복ND;02;어서 와, 선생님. 원래는 내가 찾아가려 했는데……\n#3;a\n#3;em;[반응]"
1002105-4 = "[s1] \"괜찮아. 아즈사의 일이니까.\"\n[s2] \"전술적 직감에 의한 전략적 논의를 하러 왔어.\""
1002105-5 = "3;아즈사 수영복ND;04;……\n#3;em;[///]\n#3;stiff"
1002105-6 = "3;아즈사 수영복ND;04;……\n#3;em;[///]\n#3;stiff"
1002105-7 = "3;아즈사 수영복ND;08;아, 아무튼 선생님 덕분에 이제야 겨우 바다를 즐길 수 있게 되었는데……\n#3;em;[반응]"
1002105-8 = "3;아즈사 수영복ND;99;……하지만 보다시피 벌써 이런 시간."
1002105-9 = "3;아즈사 수영복ND;01;바다에 대해 알아보려 해도, 이제 시간이 얼마 남지 않아 버렸어."
1002105-10 = "3;아즈사 수영복ND;01;그래서 어떻게 해야 최대한 남은 시간, 바다를 효율적으로 익힐 수 있을까 고민 중이야.\n#3;em;…"
1002105-11 = "3;아즈사 수영복ND;02;선생님은 어떻게 생각해? 어떤 방법이 가장 최선이라고 생각하지?"
1002105-12 = "[s3] \"여기서까지 효율을 생각하다니……\"\n[s4] \"확실히 '전략적인' 선택이 필요하겠네.\""
1002105-13 = "3;아즈사 수영복ND;99;그렇지. 이미 너무 많은 시간을 써버렸으니 말이야.\n#3;greeting"
1002105-14 = "3;아즈사 수영복ND;99;그렇지. 이미 너무 많은 시간을 써버렸으니 말이야.\n#3;greeting"
1002105-15 = "3;아즈사 수영복ND;08;아니. 그렇다고 그렇게 쓴 시간들이 실패라고는 생각하지 않지만……\n#3;em;…"
1002105-16 = "3;아즈사 수영복ND;02;……음? 뭐라고?\n#3;em;[?]"
1002105-17 = "3;아즈사 수영복ND;01;좋은 방법이 있다고? 과연……"
1002105-18 = "3;아즈사 수영복ND;03;좋아. 역시 선생님을 호출한 게 정답이었나 봐. 그럼 선생님의 의견을 들어보도록 할까.\n#3;em;[음표]"
1002105-19 = "3;아즈사 수영복ND;02;……응? 일단 따라오라고……?"
1002105-20 = "3;아즈사 수영복ND;06;으음. 뭐, 안 될 거야 없지만……"
1002105-21 = "3;아즈사 수영복ND;01;알았어. 선생님의 선택을 믿어보도록 하지."
1002105-22 = "3;아즈사 수영복ND;02;따라갈게. 앞장서 줘.\n#3;em;[반응]"

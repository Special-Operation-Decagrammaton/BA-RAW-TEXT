[translation]
1002105-1 = "เต็มสองตา"
1002105-2 = "(คุณครูถามตำแหน่งจากอาซึสะเพื่อไปหาเธอก่อน และก็มาถึงชายหาดที่พระอาทิตย์เริ่มตกดิน)"
1002105-3 = "เข้ามาสิคุณครู ที่จริงต้องเป็นฉันที่ต้องไปหาคุณครูก่อนด้วย..."
1002105-4 = "[s1] \"ไม่เป็นไรหรอก นี่มันงานของอาซึสะนี่นา\"\n[s2] \"ครูมาที่นี่เพื่อคุยยุทธศาสตร์จากสัญชาตญาณทางกลยุทธ์น่ะ\""
1002105-5 = "......"
1002105-6 = "......"
1002105-7 = "อะ.. เอาเถอะ ในที่สุดฉันก็สามารถเพลิดเพลินกับทะเลได้แล้ว..."
1002105-8 = "แต่ว่าก็อย่างที่ครูเห็น... ตอนนี้เวลามัน..."
1002105-9 = "เวลาเหลือไม่มากแล้ว ถึงฉันจะอยากอยู่ที่ทะเลก็เถอะ"
1002105-10 = "ฉันกำลังคิดอยู่ว่าจะใช้เวลาที่เหลือยังไงให้อยู่ที่นี่ได้อย่างมีประสิทธิภาพสูงสุด"
1002105-11 = "คุณครูล่ะคิดว่ายังไง? คิดว่าวิธีไหนจะดีที่สุดเหรอ?"
1002105-12 = "[s3] \"มาที่นี่ทั้งที จะยังห่วงประสิทธิภาพอีกเหรอ...\"\n[s4] \"ต้องเลือกอย่างมี 'กลยุทธ์' แล้วละ\""
1002105-13 = "ใช่ เพราะฉันใช้เวลาไปเยอะมากแล้ว"
1002105-14 = "ใช่ เพราะฉันใช้เวลาไปเยอะมากแล้ว"
1002105-15 = "ถึงแม้ฉันจะไม่ได้คิดว่าเวลาที่ใช้ไปคือความผิดพลาดก็เถอะ..."
1002105-16 = "หืม...? ว่าไงนะ?"
1002105-17 = "มีวิธีดีๆ เหรอ? วิธีอะไรน่ะ..."
1002105-18 = "ฉันคิดถูกแล้วล่ะที่เรียกคุณครูออกมา งั้นลองมาฟังความเห็นของคุณครูดูหน่อยกันดีมั้ย?"
1002105-19 = "หืม? ก่อนอื่นให้ตามไปงั้นเหรอ...?"
1002105-20 = "อืม จริงๆ จะให้ไปก็ได้ แต่ว่า..."
1002105-21 = "ก็ได้ จะลองเชื่อคุณครูแล้วกัน"
1002105-22 = "เดินนำไปสิ เดี๋ยวฉันจะตามไป"
1002105-26 = ".....?"
1002105-27 = "คุณครู...?"
1002105-28 = "คือว่า... เราต้องไปอีกไกลแค่ไหนเหรอ? จะไปถึงไหนกันน่ะ?"
1002105-29 = "นี่เราเดินมาเกือบ 20 นาทีแล้วนะ..."
1002105-30 = "นะ... นี่ไม่ใช่ว่าฉันไม่เชื่อใจคุณครูหรอกนะ ฉันก็แค่อยากรู้รายละเอียดกลยุทธ์ของเราก็เท่านั้น..."
1002105-31 = "แล้วที่นี่ก็ไม่ใช่ทะเลแล้วด้วย..."
1002105-33 = "ทำไมถึงออกจากทะเลแล้วเข้ามาในเขตภูเขาแบบนี้ล่ะ...?"
1002105-34 = "ไม่เห็นเข้าใจเลย ฉันบอกว่าอยากศึกษาเกี่ยวกับทะเล แต่ทำไมพามาที่ภูเขาล่ะ..."
1002105-35 = "ฉันรู้ว่าคุณครูก็คงมีเหตุผลของตัวเอง แต่ถึงอย่างนั้นก็เถอะ..."
1002105-36 = "หืม...?"
1002105-37 = "ใกล้ถึงแล้วเหรอ? แค่ผ่านตรงนั้นไปก็ถึงแล้วเหรอ?"
1002105-38 = "อืม แต่นี่ไม่ใช่คำตอบของคำถามของฉันนะ"
1002105-39 = "ก็ได้ จะลองเชื่อคุณครูดูอีกครั้งก็แล้วกัน"
1002105-42 = "แค่ผ่านตรงนี้ไป..."
1002105-43 = ".....?"
1002105-44 = "หะ... หืม...?"
1002105-45 = "ทำไมเหมือนมีลมพัดอยู่ใต้ขาเลย... ที่นี่มัน...?"
1002105-46 = "ที่นี่คือ...!!"
1002105-49 = "― ว้าว... ฉันเพิ่งเคยเห็นเลย[wa:2910] "
1002105-51 = "― ที่ที่เป็นประกายและสวยแบบนี้ วิเศษไปเลย[wa:2550] "
1002105-54 = " ― มองเห็นได้ทุกอย่างเลยด้วย[wa:2480] "
1002105-56 = "― ฉันมองเห็นทุกอย่างได้... โดยไม่มีอะไรมาขวางเลย...[wa:10] "
1002105-59 = "― มันรู้สึก... น่าแปลกใจจริงๆ นะ...[wa:670] "
1002105-62 = "― ที่จริงฉันไม่ค่อยชอบพื้นที่เปิดโล่งแบบนี้เท่าไร[wa:2940] "
1002105-64 = "― ไม่มีสถานที่ให้ซ่อนตัว... แถมเฝ้าระวังบริเวณรอบๆ ก็ยาก[wa:1510] "
1002105-67 = "― แต่ว่าตอนนี้... ฉันไม่ได้กังวลเรื่องพวกนั้นเลย[wa:2090] "
1002105-69 = "― คงเป็นเพราะ... แบบนี้... อืม...[wa:2340] "
1002105-72 = "― เพราะตอนนี้... ฉันมองเห็นทุกอย่างได้เต็มสองตาไงล่ะ[wa:3090] "
1002105-74 = "― แล้วก็เพราะ... มีคุณครูอยู่ด้วย[wa:1290] "
1002105-77 = "อืม... สัญชาตญาณของฉันไม่ผิดจริงๆ ด้วย "
1002105-78 = "มันมากกว่าที่คิดไว้มากเลย ไม่สิ มันตรงกันข้าม..."
1002105-79 = "ขอบคุณนะ ตอนนี้ฉันว่าฉันรู้จักทะเลแล้วละ"
1002105-80 = "......"
1002105-82 = "ขอบคุณนะคุณครู..."

1002105-28 = "#na;아즈사 수영복ND;그…… 얼마나 더 가야 하는 거지? 어디까지 가는 거야?"
1002105-29 = "#na;아즈사 수영복ND;이미 거의 20분 가까이 걸어왔는데……"
1002105-30 = "#na;아즈사 수영복ND;무, 물론 선생님을 못 믿는다는 건 아니야. 단지 우리의 작전 내용을 확인하고 싶었달까……"

1002105-32 = "#all;hide"
1002105-33 = "3;아즈사 수영복ND;02;……어째서 해안가를 벗어나 산으로 올라온 거야?\n#3;a\n#3;em;[?]"
1002105-34 = "3;아즈사 수영복ND;01;잘 모르겠어. 바다에 대해서 더 알고 싶다고 했는데, 산으로 데려오다니……"
1002105-35 = "3;아즈사 수영복ND;99;물론 선생님의 일이니까, 뭔가 이유가 있을 거라고 생각하긴 하지만…."
1002105-36 = "3;아즈사 수영복ND;02;……응?\n#3;em;[반응]"
1002105-37 = "3;아즈사 수영복ND;02;이제 거의 다 왔다고? 저기만 지나면 된다고?"
1002105-38 = "3;아즈사 수영복ND;04;으음. 질문에 대한 대답은 아닌 거 같은데.\n#3;em;[땀]"
1002105-39 = "3;아즈사 수영복ND;99;……알겠어. 다시 한번 선생님을 믿어보도록 하지."

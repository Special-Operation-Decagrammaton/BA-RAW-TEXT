[translation]
2000803-1 = "#title;아무튼 급한 일이에요!"
2000803-2 = "#na;(약속장소에 나가 보니 아코가 기다리고 있었다.)"
2000803-3 = "#all;hide"
2000803-4 = "#wait;500"
2000803-5 = "3;아코;11\n#3;a\n#3;em;…\n#wait;2500"
2000803-6 = "3;아코;11;하아…….\n#3;em;[속상함]\n#3;stiff"
2000803-7 = "[s] \"눈이 죽어 있어?!\""
2000803-8 = "3;아코;11;오셨군요, 선생님.\n#3;em;[반응]"
2000803-9 = "3;아코;02;무슨 일이 있었냐고요?"
2000803-10 = "#st;[0,0];instant;1;"
2000803-11 = "#clearST"
2000803-12 = "3;아코;02\n#3;em;…\n#wait;2500"
2000803-13 = "3;아코;09;네. 있었어요. 엄청 많은 일들이 있었죠."
2000803-14 = "3;아코;11;하아, 정말이지……\n#3;stiff\n#3;em;[속상함]"
2000803-15 = "3;아코;99;시작은 오늘 아침에 학원에 등교했을 때부터였어요."
2000803-16 = "3;아코;09;선도부실에 입장하자마자…… 엄청난 사실을 알게 되었어요.\n#3;em;…"
2000803-17 = "3;아코;99;무려……"
2000803-18 = "3;아코;05;엘리베이터가 고장나 있는 거예요!\n#3;closeup\n#3;em;[!]\n#fontsize;80"
2000803-19 = "[s] \"그렇군요…….\""
2000803-20 = "3;아코;10;네! 그래서 오늘 저는 하루 종일 계단을 왔다갔다……! 이래봬도 제법 바쁜 몸이라. 만날 사람도 많고, 방문해야할 곳도 많은데 이런 일이……!\n#3;closeup\n#3;stiff\n#3;em;[빠직]"
2000803-21 = "3;아코;10;오늘만 합쳐서 100층은 넘게 오르내린 것 같아요! \n#3;closeup"
2000803-22 = "[s] \"어…… 고, 고생 많으셨습니다.\""
2000803-23 = "3;아코;05;그뿐만이 아니라고요? 점심 때는 저만 살짝 탄 크로켓을 받기도 하고, \n#3;em;[반응]\n#3;closeup"
2000803-24 = "3;아코;09;야외 순찰 중에 갑자기 소나기가 내리거나, \n#3;closeup"
2000803-25 = "3;아코;09;먹으려고 냉장고에 놔뒀던 빵이 유통기한이 지나버렸거나,\n#3;em;…\n#3;closeup"
2000803-26 = "3;아코;09;평소 지나다니던 길이 공사중이어서 한참을 돌아가야 했거나,\n#3;closeup"
2000803-27 = "3;아코;05;전부 그런 식이었단 말이에요!\n#3;em;[!]\n#3;closeup"
2000803-28 = "3;아코;10;느껴지시나요, 이 악의가……?!\n#3;stiff\n#3;closeup"
2000803-29 = "[s1] \"그건…… 누가 봐도 악의는 아닌 것 같은데…….\"\n[s2] \"그중 하나는 명백하게 아코의 잘못인 거 같은데…….\""
2000803-30 = "3;아코;05;아뇨, 이건 악의가 분명해요! 선도부의 관리를 담당하고 있기도 한, 저를 시기하고 깎아내리려고 드는 문제아들의 악의가!\n#3;em;[반응]"
2000803-31 = "3;아코;05;아뇨, 이건 악의가 분명해요! 선도부의 관리를 담당하고 있기도 한, 저를 시기하고 깎아내리려고 드는 문제아들의 악의가!\n#3;em;[반응]"
2000803-32 = "3;아코;09;아, 아니면 혹시 내기할래요? 제 말이 맞았다면 선생님이 여기서 알몸으로 춤을 추는 거예요?"
2000803-33 = "[s] \"또 그런 억지를…….\""
2000803-34 = "3;아코;99;게다가 마지막엔 만마전에서 도무지 이해할 수 없는 내용의 공문을 받아서…….\n#3;em;…"
2000803-35 = "3;아코;09;아니, 선도부원의 신발 사이즈와 10년 뒤 한 해 강수량의 상관관계를 조사해서 보고하라니, 그건 대체 무슨 소리인가요?!"
2000803-36 = "3;아코;10;10년 뒤 강수량을 제가 알고 있을 리가 없잖습니까?! 게다가 그게 신발 사이즈랑은 무슨 상관 관계가 있다는 거죠? 관계가 있다고 쳐도, 그걸 왜 알고 싶은 거죠?\n#3;stiff\n#3;em;[빠직]"
2000803-37 = "[s3] \"……수고 많으셨습니다.\"\n[s4] \"그건 확실히 악의가 느껴지네…….\""
2000803-38 = "3;아코;05;게다가 이게 끝이 아니랍니다. 그 뒤에 무슨 일이 있었냐면…….\n#3;em;[반응]"
2000803-39 = "3;아코;05;게다가 이게 끝이 아니랍니다. 그 뒤에 무슨 일이 있었냐면…….\n#3;em;[반응]"
2000803-40 = "[s] \"또 있어?!\""
2000803-41 = "#all;hide"
2000803-42 = "#na;(아코의 푸념은 이후로도 한참동안이나 계속되었다.)"
2000803-43 = "#all;hide"
2000803-44 = "#wait;1000"
2000803-45 = "3;아코;99;흐음. ……그러네요.\n#3;em;…\n#3;a"
2000803-46 = "3;아코;01;오늘 있었던 일은 이 정도일까요."
2000803-47 = "3;아코;02;앗, 그러고보니 슬슬 시간이 다 되어서……. 오늘은 이만 해산 해야겠어요.\n#3;em;[반응]"
2000803-48 = "[s] \"어…… 그럼 보자고 한 급한 일이라는 건…….\""
2000803-49 = "3;아코;08;네? 그건 지금 다 했잖아요?\n#3;em;[?]"
2000803-50 = "[s] \"……그렇구만.\""

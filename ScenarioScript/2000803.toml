[translation]
2000803-1 = "總之就是急事！"
2000803-2 = "（前往約好的地方後，亞子已經在等著了）"
2000803-6 = "……………………"
2000803-7 = "[s] 「眼神已經死了……！」"
2000803-8 = "……您來了啊，老師。"
2000803-9 = "發生什麼事了……是嗎？"
2000803-13 = "是，確實有發生事情，而且還非常多。"
2000803-14 = "唉……"
2000803-15 = "首先是今天早上抵達學園的時候。"
2000803-16 = "我正要走向風紀委員會的教室時……"
2000803-17 = "不知為何……"
2000803-18 = "電梯故障了！"
2000803-19 = "[s] 「這樣啊……」"
2000803-20 = "害我今天一整天都在走樓梯……我可是很忙碌的！#n要見的人和要拜訪的地方都很多，真的是爬上爬下了超級多次……"
2000803-21 = "光是今天爬的樓梯，加起來可能就超過100層樓！ "
2000803-22 = "[s] 「真，真是辛苦你了……」"
2000803-23 = "還不只這樣而已！#n買午餐的時候，我居然拿到了有點烤焦的可樂餅。 "
2000803-24 = "才開始巡邏就遇到午後雷陣雨……"
2000803-25 = "珍藏在冰箱的麵包，不知不覺就過期了……"
2000803-26 = "平常走的路線在施工，害我必須繞好大一圈……"
2000803-27 = "全都是這類的情況！"
2000803-28 = "這是何等惡意，何等陰謀……！"
2000803-29 = "[s1] 「這……怎麼說，這不是『惡意』吧……？」\n[s2] 「至少麵包過期是亞子自己的問題……？」"
2000803-30 = "不，這明顯是惡意！絕對是針對我們風紀委員會的騷擾！"
2000803-31 = "不，這明顯是惡意！絕對是針對我們風紀委員會的騷擾！"
2000803-32 = "不然要打賭嗎？#n這個陰謀如果被揭發了，老師要裸體跳舞嗎？"
2000803-33 = "[s] 「不，不用了……」"
2000803-34 = "最後還[ruby=Pandemonium Society]收到萬魔殿傳來[/ruby]的完全無法理解的公文……"
2000803-35 = "要求我去調查「風紀委員每個人的鞋子尺寸與10年後年降雨量的相關性」……#n到底什麼意思！？"
2000803-36 = "10年後的年降雨量我怎麼可能會知道！？#n況且那和鞋子的尺寸無關吧？退一萬步說，就算有關係又怎樣！？"
2000803-37 = "[s3] 「辛苦了……」\n[s4] 「那確實是惡意……」"
2000803-38 = "這還沒完，您知道後來還發生了什麼事嗎……"
2000803-39 = "這還沒完，您知道後來還發生了什麼事嗎……"
2000803-40 = "[s] 「居然還有！？」"
2000803-42 = "（後來亞子繼續抱怨了好一段時間）"
2000803-45 = "……大概就是這樣。"
2000803-46 = "這些就是至今為止發生過的事。"
2000803-47 = "啊，已經這麼晚了……差不多該走了。"
2000803-48 = "[s] 「嗯？不是說有急事要見面嗎？已經沒關係了？」"
2000803-49 = "嗯？我不是已經說完了嗎？"
2000803-50 = "[s] 「……原來如此。」"
2000803-55 = "那麼，下次再聯絡吧，老師。"
2000803-57 = "（亞子道別時帶著比原本要清爽的表情回去了）"

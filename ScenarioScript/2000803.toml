2000803-55 = "3;아코;07;후훗. 그럼 다음에 또 연락드릴게요. 선생님.\n#3;em;[음표]\n#3;greeting\n#3;closeup"
2000803-56 = "#all;hide"
2000803-57 = "#na;(어쩐지 개운한 표정으로 작별인사를 하는 아코였다.)"

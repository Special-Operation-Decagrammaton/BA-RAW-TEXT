[translation]
2000803-1 = "Whatever, It's Urgent!"
2000803-2 = "(When I went to the meeting spot, Ako was there waiting.)"
2000803-6 = "Ugh."
2000803-7 = "[s] \"You have the eyes of a dead woman!\""
2000803-8 = "You're here, Sensei."
2000803-9 = "\"Did something happen,\" you ask?"
2000803-13 = "Yes. Something did. A lot of somethings, in fact."
2000803-14 = "*sigh* Seriously..."
2000803-15 = "It all started during attendance this morning."
2000803-16 = "As soon as I entered the Prefect Team's club room, I discovered something unbelievable."
2000803-17 = "Of all things..."
2000803-18 = "The elevator was broken!"
2000803-19 = "[s] \"Oh, so that's what you're up to.\""
2000803-20 = "Yes! So I spent the whole day going up and down the stairs! Believe it or not, I'm an extremely busy person. I have people to meet and places to be!"
2000803-21 = "I must have climbed more than 100 flights today alone! "
2000803-22 = "[s] \"Uh... Th-That must have been tough.\""
2000803-23 = "And that's not all! At lunch, I was the only one to get a burned croquette. "
2000803-24 = "Then, it started raining during my patrol. "
2000803-25 = "The bread I had left in the fridge to eat later was expired."
2000803-26 = "The path I normally take was under construction, so I had to take the long way around."
2000803-27 = "My entire day was like this!"
2000803-28 = "Can't you sense the malice in the air?!"
2000803-29 = "[s1] \"I don't think this was caused by malice...\"\n[s2] \"At least one of those things was clearly your fault, Ako.\""
2000803-30 = "No, this was clearly the malice of some jealous troublemaker who's trying to undermine me, the senior administrator of the Prefect Team!"
2000803-31 = "No, this was clearly the malice of some jealous troublemaker who's trying to undermine me, the senior administrator of the Prefect Team!"
2000803-32 = "I-If not, then why don't we make a bet? If I'm right, you have to dance right here in the nude!"
2000803-33 = "[s] \"This nonsense again.\""
2000803-34 = "On top of that, I ended up receiving a document from the Pandemonium Society that was totally indecipherable."
2000803-35 = "They want us to investigate and report on the correlation between the shoe sizes of every member of the Prefect Team and the amount of rainfall over the last 10 years. What does that even mean?!"
2000803-36 = "How am I supposed to know how much rain there's been in the past 10 years?! And what does that have to do with shoe sizes?"
2000803-37 = "[s3] \"We appreciate that you work so hard.\"\n[s4] \"I actually do sense some malice in that.\""
2000803-38 = "And that's not all. What happened after that was..."
2000803-39 = "And that's not all. What happened after that was..."
2000803-40 = "[s] \"There's more?!\""
2000803-42 = "(Ako's complaining continued for a very long time afterward.)"
2000803-45 = "Hmm... Right."
2000803-46 = "Was that everything that happened today?"
2000803-47 = "Oh, come to think of it, my time's almost up. We'll have to disband for today."
2000803-48 = "[s] \"Oh. So the urgent matter you wanted to see me about was...\""
2000803-49 = "Hm? We just finished it now, didn't we?"
2000803-50 = "[s] \"Oh.\""
2000803-55 = "Heehee. I'll call you again next time, Sensei!"
2000803-57 = "(For some reason, there was a refreshed look on Ako's face as she said goodbye.)"

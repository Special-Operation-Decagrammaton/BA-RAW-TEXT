[translation]
2000803-1 = "เรื่องด่วนสุดๆ เลยค่ะ!"
2000803-2 = "(พอคุณครูมาถึงสถานที่นัดหมาย ก็เจออาโกะที่กำลังรออยู่)"
2000803-6 = "เฮ้อ..."
2000803-7 = "[s] \"ตาเป็นหมีแพนด้าแล้วนะ?!\""
2000803-8 = "มาแล้วเหรอคะคุณครู"
2000803-9 = "ฉันมีเรื่องด่วนอะไรน่ะเหรอคะ?"
2000803-13 = "ฉันมีเรื่องด่วนค่ะ เป็นเรื่องสำคัญคอขาดบาดตายสุดๆ ค่ะ"
2000803-14 = "เฮ้อ จริงๆ เลยเชียว..."
2000803-15 = "ทุกอย่างเริ่มตั้งแต่ตอนที่ฉันไปโรงเรียนเมื่อเช้านี้ค่ะ"
2000803-16 = "ทันทีที่ฉันไปถึงห้องคณะกรรมการวินัย... ฉันก็ค้นพบความจริงที่เหลือเชื่อค่ะ"
2000803-17 = "นั่นก็คือ..."
2000803-18 = "ลิฟต์ของอาคารมันเสียค่ะ!"
2000803-19 = "[s] \"งั้นเหรอ...?!\""
2000803-20 = "ค่ะ! เพราะงั้นวันนี้ฉันเลยต้องเดินขึ้นลงบันไดทั้งวันเลยค่ะ! เห็นแบบนี้แต่ฉันเองก็งานยุ่งมาก#nมีคนที่ต้องไปเจอตั้งเยอะ มีที่ที่ต้องไปดูตั้งหลายที่...!"
2000803-21 = "แค่เฉพาะวันนี้ฉันก็เดินขึ้นลงบันไดน่าจะเกิน 100 ขั้นแล้วค่ะ!"
2000803-22 = "[s] \"เอ่อ คงลำบากมากเลยนะ\""
2000803-23 = "ไม่ใช่แค่นั้นนะคะ เมื่อตอนกลางวันยังมีแค่ฉันที่ได้โคร็อกเกะไหม้ๆ มาอีกด้วย "
2000803-24 = "ตอนที่ออกไปลาดตระเวนข้างนอก จู่ๆ ก็มีฝนตกลงมา "
2000803-25 = "ขนมปังที่แช่ไว้ในตู้เย็นก็ดันมาหมดอายุอีก..."
2000803-26 = "เส้นทางที่ใช้สัญจรเป็นประจำจู่ๆ ก็มีการก่อสร้างเลยต้องอ้อมไปทางที่ไกลกว่า..."
2000803-27 = "เป็นแบบนี้ทั้งวันเลยค่ะ!"
2000803-28 = "คุณครูรับรู้ได้ถึงเจตนาร้ายที่แฝงอยู่มั้ยคะ...?!"
2000803-29 = "[s1] \"ครูไม่คิดว่าเป็นเจตนาร้ายหรอกนะ...\"\n[s2] \"หนึ่งในเรื่องที่เกิดขึ้นเหมือนเป็นความผิดเธอนะ\""
2000803-30 = "ไม่ค่ะ นี่ต้องเป็นเจตนาร้ายแน่ๆ ค่ะ ต้องเป็นเจตนาร้ายของพวกเด็กเกเรที่ไม่พอใจ และคิดจะ#nทำลายฉันที่เป็นผู้ดูแลคณะกรรมการวินัยแน่ๆ ค่ะ!"
2000803-31 = "ไม่ค่ะ นี่ต้องเป็นเจตนาร้ายแน่ๆ ค่ะ ต้องเป็นเจตนาร้ายของพวกเด็กเกเรที่ไม่พอใจ และคิดจะ#nทำลายฉันที่เป็นผู้ดูแลคณะกรรมการวินัยแน่ๆ ค่ะ!"
2000803-32 = "อ๊ะ... ถ้าไม่งั้นมาพนันกับฉันมั้ยคะ? ถ้าฉันพูดถูก คุณครูจะต้องเต้นระบำเปลื้องผ้าที่นี่นะคะ"
2000803-33 = "[s] \"บังคับแบบนั้นอีกแล้ว...\""
2000803-34 = "นอกจากนี้ ฉันยังได้รับหนังสือทางการไร้สาระจากพวกแพนเดโมเนียม โซไซตี้อีกด้วย..."
2000803-35 = "อะไรกัน... สั่งให้ตรวจสอบและรายงานเรื่องความสัมพันธ์ของขนาดรองเท้าของคณะกรรมการวินัย#nและปริมาณน้ำฝนในอีก 10 ปีข้างหน้างั้นเหรอ... ทั้งสองอย่างมันเกี่ยวข้องกันยังไงคะ?!"
2000803-36 = "ฉันจะไปรู้เรื่องปริมาณน้ำฝนในอีก 10 ปีข้างหน้าได้ยังไงกันคะ?! อีกอย่าง ขนาดรองเท้าของพวกเรา#nมันไปเกี่ยวอะไรด้วย? แต่ถึงจะเกี่ยวข้องจริงๆ แล้วยัยพวกนั้นจะอยากรู้ไปทำไมกันคะ?"
2000803-37 = "[s3] \"ขอบคุณที่ตั้งใจทำงานนะ...\"\n[s4] \"ครูรับรู้ได้ถึงเจตนาร้ายนิดๆ นะ...\""
2000803-38 = "ยังไม่หมดเท่านี้นะคะ ยังมีเรื่องอื่นอีกนะคะ..."
2000803-39 = "ยังไม่หมดเท่านี้นะคะ ยังมีเรื่องอื่นอีกนะคะ..."
2000803-40 = "[s] \"ยังมีอีกเรอะ?!\""
2000803-42 = "(หลังจากนั้นอาโกะก็ร่ายยาวอีกหลายเรื่องให้คุณครูฟังอยู่พักใหญ่)"
2000803-45 = "ฮึ่ม ใช่แล้วค่ะ..."
2000803-46 = "เรื่องที่เกิดขึ้นวันนี้ก็ประมาณนี้ค่ะ"
2000803-47 = "อ๊ะ เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย... งั้นวันนี้คงต้องพอแค่นี้ก่อนนะคะ"
2000803-48 = "[s] \"เอ่อ แล้วเรื่องด่วนที่เรียกครูออกมาล่ะ...\""
2000803-49 = "คะ? ก็เพิ่งพูดไปเมื่อกี้ไงคะ?"
2000803-50 = "[s] \"งั้นเหรอ\""
2000803-55 = "ฮิฮิ งั้นเอาไว้ฉันจะติดต่อไปใหม่นะคะ คุณครู!"
2000803-57 = "(สีหน้าของอาโกะดูสดชื่นขึ้นกว่าตอนที่เพิ่งเจอกันมากๆ)"

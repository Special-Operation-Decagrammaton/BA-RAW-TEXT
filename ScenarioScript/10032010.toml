[translation]
10032010-1 = "ตอนที่ 1;มาเพราะเรื่องงานน่ะ"
10032010-5 = "[ns1] \"คนเยอะจังเลย...\"\n[ns2] (อยากกลับแล้ว...)"
10032010-8 = "มีธุระอะไรที่นี่งั้นเหรอ คุณครู?"
10032010-13 = "น่าประหลาดจัง... นึกไม่ถึงเลยนะว่าจะได้มาเจอคุณครูในที่แบบนี้ เกินคาดอยู่เหมือนกันนะ"
10032010-14 = "แต่ดูแล้วจะไม่ใช่ฉันคนเดียวสินะที่ประหลาดใจ งั้นก็ไม่แย่เท่าไรเนอะ"
10032010-15 = "[s3] \"อารุ...?\"\n[s4] \"ทำไมถึงมาอยู่ที่นี่...\""
10032010-18 = "เจอกันก็ถามเลยเหรอ? สมกับที่เป็นคุณครูเลย..."
10032010-19 = "แต่ก็นะ ฉันไม่มีเหตุผลที่ต้องปกปิดอะไรคุณครูอยู่แล้ว..."
10032010-20 = "ฉันมาเพราะมันเป็นงานน่ะ..."
10032010-21 = "งานอะไรงั้นเหรอ? อืม คงพูดยากหน่อยน่ะ พอดีว่าภารกิจครั้งนี้มีความพิเศษนิดหน่อย"
10032010-22 = "งานชิ้นนี้สำคัญมาก เราต้องเก็บข้อมูลของผู้ว่าจ้างและเป้าหมายให้เป็นความลับขั้นสุดยอดน่ะ"
10032010-23 = "เรื่องรายละเอียดของภารกิจ ต่อให้เป็นที่ปรึกษาด้านการบริหารอย่างคุณครูฉันก็บอกให้ไม่ได้..."
10032010-27 = "มะ... ไม่ใช่ว่าฉันไม่เชื่อใจคุณครูหรอกนะ! แค่ตอนนี้ฉันยังบอกไม่ได้...! มันเกี่ยวกับความปลอดภัยน่ะ!!"
10032010-28 = "แต่ที่สำคัญกว่านั้นคือ คุณครูนั่นละมาทำอะไรที่นี่? ไม่ยักรู้เลยว่าคุณครูสนใจการแสดงแบบนี้ด้วย..."
10032010-29 = "ก็ไม่ใช่ว่าจะไม่สนใจ แต่ตอนนี้ไม่ได้มาเพราะเรื่องนั้นงั้นเหรอ? ถ้างั้น...?"
10032010-30 = "มาเพราะเรื่องงานเหรอ? คุณครูก็ด้วยเหรอ...?"
10032010-31 = "งานอะไรกันล่ะ...?"
10032010-32 = "[s5] \"ครูต้องบอกใช่มั้ย?\"\n[s6] \"ถ้าจะถามครู อารุก็ต้องบอกของตัวเองด้วย...\""
10032010-35 = "...?"
10032010-36 = "...!!"
10032010-37 = "มะ... ไม่สิ ที่ฉันถามก็เพราะ... อ่า..."
10032010-38 = "ล้อเล่นงั้นเหรอ...? เป็นงานที่บอกได้หรอกเหรอ?"
10032010-39 = "มาสำรวจข้อมูล?"
10032010-40 = "มาทำวิดีโอเพื่อการศึกษาเกี่ยวกับโรงละครโอเปร่าและการแสดงในครั้งนี้...?"
10032010-41 = "ทำไมคุณครูถึงต้องมาทำงานแบบนั้นด้วยล่ะ..."
10032010-42 = "[s7] \"ถามอะไรแบบนั้น ก็ครูเป็นครูนี่นา...\"\n[s8] \"องค์การนักเรียนสั่งมาน่ะ พอสั่งมาแล้วครูก็เลยต้องทำ\""
10032010-43 = "อ่า... ก็พูดถูก จริงๆ เลย... ขอโทษด้วยนะ ฉันไม่ได้หมายความเอาไว้แบบนั้น"
10032010-44 = "ก็เป็นคำพูดที่ตรงไปตรงมาดีนะ..."
10032010-45 = "เอาละ ฉันพอจะเข้าใจสถานการณ์ของคุณครูแล้ว ถ้ามาด้วยเหตุผลแบบนั้นฉันก็สบายใจหน่อย"
10032010-46 = "พอดีตอนนี้ฉันพอจะมีเวลาเหลืออยู่น่ะ แล้วโอกาสแบบนี้ก็ไม่ได้มีบ่อยๆ ด้วย..."
10032010-47 = "ถ้าคุณครูไม่ติดอะไร ให้ฉันพาทัวร์โรงละครโอเปร่าสักรอบเอามั้ยล่ะ?"
10032010-48 = "ไม่ต้องคิดอะไรแปลกๆ หรอกนะ ฉันอยากทำภารกิจออกมาให้สมบูรณ์แบบ ก็เลยวิเคราะห์โครงสร้าง#nภายในไว้อย่างละเอียดแล้วน่ะ"
10032010-49 = "คิดเสียว่าฉันมาช่วยงาน 'ทัศนศึกษาโรงละครโอเปร่า' ของคุณครูแล้วกัน"
10032010-54 = "ว่าไงล่ะคุณครู? สนใจรึเปล่า? หรือว่าฉันก้าวก่ายเกินไป...?"
10032010-59 = "(ดีละ... แผนการเป็นไปได้สวยเลย เนียนสุดๆ)"
10032010-60 = "(ในระหว่างที่เราคุ้มกันคุณครู สมาชิกคนอื่นก็จะลักพาตัวเป้าหมายแล้วพาออกไปจากโรงละคร)"
10032010-61 = "(เพราะถ้าโดนจับได้เรื่องภารกิจนี้ละก็ พวกเราอาจจะโดนคุณครูบ่นเอาก็ได้ แล้วก็...)"
10032010-62 = "(แล้วก็... นี่ก็ยังเป็นเหมือน...)"
10032010-67 = "[ns] \"เหมือนมาขอเดตเลยนะ?\""
10032010-72 = "ดะ... ดะ... เดตเหรอ...?"
10032010-73 = "มะ... ไม่ใช่สักหน่อย ฉันไม่ได้ตั้งใจให้เป็นแบบนั้นนะ..."
10032010-74 = "ระ... หรือว่ามันดูเหมือนเป็นแบบนั้น... ตะ... แต่ว่า...!"
10032010-75 = "มะ... ไม่ใช่นะ!"
10032010-76 = "อย่าเข้าใจผิดนะ! ฉันแค่จะช่วยงานของที่ปรึกษาด้านการบริหารก็เท่านั้น มันเป็นการช่วยเหลือทางธุรกิจน่ะ!"
10032010-77 = "[s9] \"ขอบใจที่จะช่วยนะ\"\n[s10] \"รู้สึกอุ่นใจเลย งั้นก็ฝากด้วยนะอารุ\""
10032010-87 = "ฮุฮุ... งั้นก็ดีละ"
10032010-88 = "แต่คุณครูคงรู้อยู่แล้วใช่มั้ยว่าการติดหนี้คนร้ายกาจอย่างฉันมันไม่ใช่เรื่องเล็กๆ เลย"
10032010-89 = "จำเรื่องวันนี้ไว้ด้วยล่ะ เพราะสักวันคุณครูต้องตอบแทนฉัน"
10032010-90 = "เริ่มดูจากตรงไหนกันดีนะ? ฉันรู้จักทุกซอกทุกมุมในโรงละครโอเปร่านี้เลยละ คุณครูอยากไปดูตรงไหนบอกฉันมาได้เลย!"
10032010-95 = "(ยังไงเราก็เตรียมการไว้เสร็จแล้ว แล้วก็ยังมีเวลาอีกสักพักเลยกว่าเป้าหมายจะมาถึง ฮุฮุ)"
10032010-96 = "(อีกอย่าง โอกาสแบบนี้ก็ไม่ได้มีบ่อยๆ ช่วงนี้ใช่ว่าจะเจอคุณครูง่ายๆ ด้วย... )"
10032010-103 = "ฮุฮุ..."
10032010-104 = "อยากไปตรงไหนก่อนล่ะ? บอกฉันมาได้เลยคุณครู"
10032010-107 = "อยากไปดูด้านหลังเวทีก่อนงั้นเหรอ?"
10032010-108 = "แต่ก็นะ หลังเวทีไม่ใช่ที่ที่ใครจะเข้ามาได้นี่เนอะ เลือกได้ดีเลยละ"
10032010-109 = "เพราะปกติแล้วแค่การเข้ามาที่นี่ก็เสี่ยงที่จะโดนทีมงานไล่กลับไปอยู่แล้ว..."
10032010-110 = "แต่คุณครูเป็นถึงคุณครู ไม่ใช่ใครอื่น ฉันว่าถ้าไปหาผู้ที่เกี่ยวข้องแล้วขอร้อง บางทีเราอาจจะได้ฟังคำ#nอธิบายดีๆ จากพวกเขาก็ได้นะ"
10032010-111 = "ไปหานักแสดงหรือผู้กำกับเวทีแล้วชวนคุยกันเถอะ"
10032010-112 = "หืม...?"
10032010-113 = "ทำไมฉันถึงรู้ทั้งเรื่องโครงสร้างภายในและแยกแยะผู้คนในนี้ได้หมดเลยอย่างนั้นเหรอ?"
10032010-114 = "กะ... ก็ฉันต้องทำการบ้านมาก่อนเพื่อภารกิจในครั้งนี้..."
10032010-118 = "ไม่ต้องใส่ใจเรื่องหยุมหยิมหรอกน่า! สิ่งสำคัญน่ะคือมันทำให้ฉันได้มาเป็นไกด์ให้คุณครูได้ยังไงล่ะ"
10032010-119 = "ไหนดูซิ... อยู่ตรงไหนนะ? ตอนนี้น่าจะกำลังงานยุ่งกันอยู่เลยด้วย"
10032010-120 = "น่าจะอยู่..."
10032010-126 = "แถวๆ นี้สิ...?"
10032010-133 = "หืม...?"
10032010-134 = "[s11] \"มีเสียงอะไรดังมาจากข้างบนน่ะ...\"\n[s12] \"ทำไมถึงสั่นล่ะ...?\""
10032010-137 = "สั่น? จากข้างบนเหรอ?"
10032010-146 = "คะ... คุณครู!!"
10032010-154 = "คุณครู!? เป็นอะไรรึเปล่า คุณครู!? บาดเจ็บตรงไหนมั้ย...!!"
10032010-155 = "ว่าไงนะ...? ไม่เป็นไรงั้นเหรอ? ไม่ได้บาดเจ็บตรงไหนด้วยใช่มั้ย?"
10032010-156 = "ฮู่วววว... เหมือนจะอายุสั้นลง 10 ปีเลย..."
10032010-157 = "(ไม่คิดเลยว่าเพดานจะถล่มลงมา... แล้วทำไมต้องมาเกิดเหตุในจุดสุดท้ายด้วยนะ...)"
10032010-158 = "ถ้ารู้อย่างนี้ฉันพาไปที่อื่นก่อนก็ดี..."
10032010-159 = "หืม...?"
10032010-160 = "ฉันพูดเรื่องอะไรอยู่น่ะเหรอ? ไม่มีอะไรหรอก..."
10032010-164 = "มะ... ไม่! ไม่มีเลย! คุณครูฟังฉันนะ... มันไม่ใช่อะไรแบบที่คุณครูคิดหรอก...!!"
10032010-165 = "เพราะงั้น...!"
10032010-166 = "เจ้าพวกนี้นี่! มาโจมตีแบบไม่ให้ตั้งตัวเลยเหรอ!? คิดว่าพวกเราจะโดนเล่นงานง่ายๆ รึไง!?"
10032010-167 = "โดนให้หน่อยเถอะนะคะ โดนให้หน่อยเถอะนะคะ โดนให้หน่อยเถอะนะคะ โดนให้หน่อยเถอะนะคะ โดนให้หน่อยเถอะนะคะ!!"
10032010-168 = "แผนการของท่านอารุน่ะค่ะ! ช่วยโดนแผนการนี้เล่นงานแต่โดยดีด้วยเถอะ!!"
10032010-169 = "อ่า..."
10032010-178 = "ดะ... เดี๋ยวนะ ฮารุกะ...! ประธานบอกให้จัดการเรื่องนี้เงียบๆ และเป็นความลับไม่ใช่เหรอ...!"
10032010-180 = "หุหุหุ... ร้อนแรงกว่าที่คิดอีกนะเนี่ย"
10032010-181 = "แบบนี้ถ้าเราโดนคุณครูจับได้คงแย่แน่เลย..."
10032010-184 = "เอ๋...?"
10032010-189 = "หะ... หืม...?"
10032010-190 = "หืม...? คุณ..."
10032010-193 = "ครู...?"
10032010-194 = "[s13] \"สวัสดี...\"\n[s14] \"ปรากฏตัวอย่างฉูดฉาดกันเลยนะ\""
10032010-197 = "อ่า... คุณครู...?"
10032010-198 = "ได้ยินไปทั้งหมดเลยมั้ย? ตั้งแต่ที่บอกว่าต้องจัดการอะไรน่ะ ได้ยินรึเปล่า...?"
10032010-202 = "เค้าว่า..."
10032010-203 = "นี่อาจจะ... เป็นวิกฤตนิดหน่อยแล้วละ..."
10032010-207 = "เฮ้อ... ก็บอกแล้วไงว่าให้ระวัง..."
10032010-208 = "เป็นยังไงล่ะ"
10032010-209 = "สุดท้ายก็โดนจับได้ ทีนี้จะเอายังไงต่อดี? ประธาน?"
10032010-210 = "ประธาน...?"
10032010-213 = "ถามไปก็ไม่มีประโยชน์หรอก... ดูสิ อารุจังยืนตัวแข็งเป็นหินไปแล้ว"
10032010-214 = "ทะ... ท่านอารุ! ทำไมท่านอารุถึง...!"
10032010-215 = "ยังจะมาถามอีก..."
10032010-217 = "ยัยเด็กพวกนี้นี่ ฉันไม่ปล่อยไว้เฉยๆ แน่!!"
10032010-221 = "กล้าดียังไงถึงจะมาลักพาตัวบอสของเรา!? เก่งจริงๆ เลยนะตัวแค่เนี้ย...!"
10032010-222 = "ทุกคนเตรียมตัวให้พร้อม!! จับตัวเจ้าพวกนี้ให้หมดแล้วบีบเค้นจนกว่าจะสารภาพว่าใครอยู่เบื้องหลัง!!"
10032010-235 = "เก่งจริงๆ เลยนะตัวแค่เนี้ย...!? ประชดกันเหรอ!? อย่ามาประชดท่านอารุแบบนั้นนะ!"
10032010-236 = "อืม..."
10032010-237 = "ครู... โทษทีนะ... แต่พวกฉันมีเรื่องต้องไปเคลียร์ก่อน"
10032010-238 = "นั่นสินะ ยังไงก็โดนคุณครูจับได้แล้ว และในเมื่อเป็นอย่างนี้..."
10032010-239 = "เอาไว้ค่อยดุเค้าทีหลังแล้วกันนะคุณครู ตอนนี้ช่วยสั่งการพวกเค้าก่อน..."
10032010-240 = "[s15] \"อืม เรื่องคุยเอาไว้ทีหลัง\"\n[s16] \"เอาเป็นว่าครูจะสั่งการให้ก่อน\""
10032010-243 = "หุหุหุ ตกลงตามนั้น"
10032010-244 = "ขอบคุณนะครู ถ้างั้นก็..."
10032010-245 = "รีบๆ ทำให้จบกันเถอะ..."
10032010-249 = "ฉันจะพาไปลงนรกให้หมดเลยยยย!!!"

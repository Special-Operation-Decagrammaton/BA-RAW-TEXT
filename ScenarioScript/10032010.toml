[translation]
10032010-1 = "Episode 1;Here for Work"
10032010-5 = "[ns1] \"It sure is packed...\"\n[ns2] \"(I want to leave already...)\""
10032010-8 = "Sensei? Just what are you doing here?"
10032010-13 = "To think our paths would cross in this establishment of all places. You're always full of surprises, Sensei."
10032010-14 = "It would appear the sentiment is shared, however, so I'll allow it."
10032010-15 = "[s3] \"Aru...?\"\n[s4] \"What're YOU doing here...?\""
10032010-18 = "No sense of propriety, as usual, Sensei. You didn't even greet me."
10032010-19 = "I suppose there's no harm in telling you."
10032010-20 = "I'm here on business."
10032010-21 = "...What business? I'm sorry, that's confidential information. After all, this is a high-priority client."
10032010-22 = "Considering the delicate nature of the job, I can't reveal the details to an outsider."
10032010-23 = "Even as our management consultant, this is out of your pay grade, Sensei."
10032010-27 = "N-Not that I don't trust you, or anything like that! It's a security issue! Security!"
10032010-28 = "On that note, what's your purpose here, Sensei? You don't seem like the opera-going type to me."
10032010-29 = "...You do enjoy a good opera? But that's not why you're here today?"
10032010-30 = "...Oh. You're here on business too?"
10032010-31 = "What kind of business, exactly?"
10032010-32 = "[s5] \"I don't know if I can reveal such confidential information...\"\n[s6] \"I'll tell if you tell, Aru.\""
10032010-35 = "...?"
10032010-36 = "...!!"
10032010-37 = "Wh-What I said earlier...! I didn't mean it like that!"
10032010-38 = "...It was just a joke? Then tell me. "
10032010-39 = "...You're doing research?"
10032010-40 = "You came to make an educational video about the Opera House and its productions?"
10032010-41 = "Why would you do something like that...?"
10032010-42 = "[s7] \"...You do know I'm a teacher, right?\"\n[s8] \"The General Student Council told me to. I'm doing as I'm told.\""
10032010-43 = "Ah, right. Yes. I didn't mean..."
10032010-44 = "You've always been very honest, Sensei."
10032010-45 = "Regardless, what a relief. Our paths have crossed under the best of circumstances today."
10032010-46 = "I have a moment to spare for a dear consultant."
10032010-47 = "If you'd like, I'll escort you on a tour of the Opera House."
10032010-48 = "Don't look so surprised. It's only natural that I thoroughly studied and memorized the entire layout to ensure my business here goes without a hitch."
10032010-49 = "Taking you on a tour is a piece of cake in comparison, Sensei."
10032010-54 = "Do you accept my proposal, Sensei? Or am I simply a menace to you?"
10032010-59 = "(Excellent. All according to plan.)"
10032010-60 = "(I just need to keep Sensei distracted until the others successfully transport the target out of the Opera House.)"
10032010-61 = "(Who knows what Sensei will think if they find out what we're doing here...)"
10032010-62 = "(And to top it all off—)"
10032010-67 = "[ns] \"Are you asking me out on a date right now?\""
10032010-72 = "A d-d-date?!"
10032010-73 = "No, no, no! That wasn't my intention!"
10032010-74 = "I mean, looking back, I guess it sounds like that's what I was trying to say...!"
10032010-75 = "Stop! No!"
10032010-76 = "Don't be ridiculous! This is a business venture! I'm assisting my management consultant!"
10032010-77 = "[s9] \"Well, I appreciate your help.\"\n[s10] \"I guess I'm in good hands then, Aru!\""
10032010-87 = "Heehee. Correct choice."
10032010-88 = "Although, I hope you're aware of what you've just committed to. It's no small issue to be indebted to an outlaw like me."
10032010-89 = "Be sure to savor every moment, because I'll have you pay it back with interest one day."
10032010-90 = "Now then, where to first? Consider me your resident Opera House expert, Sensei. The stage is your oyster."
10032010-95 = "(All we're waiting on now is for the target to arrive, which means I get to take my time with Sensei. Heehee!)"
10032010-96 = "(It's been hard to find a free moment with them these days...)"
10032010-103 = "Heehee..."
10032010-104 = "Well? Your wish is my command, Sensei!"
10032010-107 = "...You're curious about backstage?"
10032010-108 = "How wise. You want to cover the parts of the Opera House the average person wouldn't have access to."
10032010-109 = "We'd normally be thrown out for so much as setting a foot backstage."
10032010-110 = "But of course, you're a VIP, Sensei. They might even provide explanations since it's you."
10032010-111 = "You can ask someone. Just go talk to a producer or stage manager."
10032010-112 = "...Huh?"
10032010-113 = "Wh-What do you mean how do I know all these little details? I-It's not that much!"
10032010-114 = "I am just...a details person! I'm always overprepared for a job!"
10032010-118 = "Why're we even talking about such unimportant things? Hahaha! Just be grateful I'm offering up my boundless knowledge to you!"
10032010-119 = "In fact, I'll use that knowledge to find a producer for you... Hm. They should be pretty busy right now, but..."
10032010-120 = "There has to be one..."
10032010-126 = "...somewhere?"
10032010-133 = "...Huh?"
10032010-134 = "[s11] \"Why is the ceiling shaking?\"\n[s12] \"Is it...vibrating above us?\""
10032010-137 = "...Up above?"
10032010-146 = "Sensei!"
10032010-154 = "Are you okay? Sensei? You're not hurt anywhere, are you?!"
10032010-155 = "Oh? You're okay... I don't see any injuries..."
10032010-156 = "*sigh* You really scared me there, Sensei."
10032010-157 = "(Who knew the ceiling would collapse...and here of all places too.)"
10032010-158 = "If I'd known they'd target this place first, I would've taken you somewhere else..."
10032010-159 = "...Huh?"
10032010-160 = "What do I mean \"target\"? Huh? Uh, who said that? Definitely not me!"
10032010-164 = "Haha! Hah! You totally must have misheard me, Sensei!"
10032010-165 = "B-Because, of course, you know...!"
10032010-166 = "You think you can get us with some cheap ambush? Do you know who we are?!"
10032010-167 = "FallforitfallforitfallforitfallforitFALLFORIT!"
10032010-168 = "Since it's Aru's plan, you should just fall for it! I SAID GIVE IN!"
10032010-169 = "...Ah."
10032010-178 = "Haruka, chill out! Boss said we need to take care of everything quietly! Quietly!"
10032010-180 = "Heehee. Things are finally getting exciting."
10032010-181 = "But I sure hope Sensei doesn't catch on to what we're doing. That'd sure throw a wrench into things."
10032010-184 = "...Oopsie."
10032010-189 = "H-Huh?!"
10032010-190 = "Uh... Sen..."
10032010-193 = "...sei?"
10032010-194 = "[s13] \"Well, hello there.\"\n[s14] \"What a flashy entrance!\""
10032010-197 = "Ah. Sensei?"
10032010-198 = "You didn't by chance hear, like, every little thing we said, did you? Especially the part about \"taking care of things.\""
10032010-202 = "Well, I guess the cat's out of the bag!"
10032010-203 = "I don't think we can just stuff it back inside this time..."
10032010-207 = "*sigh* I wish you guys would listen to me, just once."
10032010-208 = "...So."
10032010-209 = "Like Mutsuki said, we can't exactly brush this one off. What's the next move, Boss?"
10032010-210 = "...Boss?"
10032010-213 = "Save your breath. Look. Aru's turned to stone!"
10032010-214 = "N-Noooo! Aru! Who did this to you?!"
10032010-215 = "...Probably the one who blasted the ceiling open."
10032010-217 = "You bastards are going to pay the price for this!"
10032010-221 = "You dare even think about abducting our boss?! Fools rush in where angels fear to tread..."
10032010-222 = "To arms, everyone! We'll round up every last one of them and beat them until they talk!"
10032010-235 = "F-F-F...FOOL?! Did you just call Aru a fool?!"
10032010-236 = "Hmm..."
10032010-237 = "Sorry about all this, but can we talk a little later?"
10032010-238 = "Yeah, yeah. Seems like we've got a situation on our hands."
10032010-239 = "You mind scolding us after, Sensei?"
10032010-240 = "[s15] \"I'll help you, and then we'll talk.\"\n[s16] \"Just follow my lead.\""
10032010-243 = "Heehee. Sounds like a deal."
10032010-244 = "Thanks, Sensei. Since that's settled..."
10032010-245 = "...Let's deal with these guys."
10032010-249 = "Prepare to DIEEE!!!"

[translation]
10032010-1 = "第1話;為工作而來"
10032010-5 = "[ns1]「人真多……」\n[ns2]（好想回去……）"
10032010-8 = "你來這裡有什麼事嗎？老師。"
10032010-13 = "沒想到會在這裡遇到老師……真是有點意外。"
10032010-14 = "不過這麼看來，感到驚訝似乎是彼此彼此呢。"
10032010-15 = "[s3]「亞瑠……？」\n[s4]「你怎麼會在這裡……」"
10032010-18 = "見面第一句話就問這個嗎？#n雖然這也挺符合老師的風格……"
10032010-19 = "沒關係，我也沒理由瞞著老師……"
10032010-20 = "……是為了工作。"
10032010-21 = "你問是什麼工作？這點還請容我保密。#n畢竟這次的委託有點特別。"
10032010-22 = "從委託人的身分到目標的情報都必須保密到家。"
10032010-23 = "委託的內容，就連身為經營顧問的老師也……"
10032010-27 = "當，當然我也不是不信任你的意思！#n但現在還是不能說……！基於保密協議！！"
10032010-28 = "話說回來，老師又是為什麼來這裡呢？#n我都不知道你對這種表演有興趣……"
10032010-29 = "你說雖然不是沒看過，但這次來不是為了欣賞歌劇？#n那不然是……？"
10032010-30 = "是因為工作？#n……老師也是？"
10032010-31 = "……是什麼樣的工作？"
10032010-32 = "[s5]「只有我非說不可嗎？」\n[s6]「如果想知道的話，亞瑠也要回答我的問題才行……」"
10032010-35 = "……？"
10032010-36 = "……！！"
10032010-37 = "啊，那個……#n我……我沒有那種意思……"
10032010-38 = "……開玩笑的？其實說出來也沒關係？"
10032010-39 = "……資料調查？"
10032010-40 = "來這裡是為了製作，有關這次表演與歌劇院的教育用BD……？"
10032010-41 = "老師為什麼會做那種工作……"
10032010-42 = "[s7]「也沒有為什麼，畢竟我是老師……」\n[s8]「是聯邦學生會的要求。他們開口我就得做啊。」"
10032010-43 = "啊，說，說的也是……抱歉，我不是那個意思。"
10032010-44 = "還真是老實的發言呢……"
10032010-45 = "嗯，我大概瞭解情況了。#n如果是那樣的話，我們也能安心了。"
10032010-46 = "正好現在還有一點時間，而且難得有這個機會……"
10032010-47 = "如果老師願意的話，要不要我為你導覽一下歌劇院內部呢？"
10032010-48 = "沒必要想得太奇怪。#n為了完美地進行工作，我已經事先清楚掌握了內部的構造。"
10032010-49 = "要協助老師「參觀歌劇院」簡直易如反掌。"
10032010-54 = "怎麼樣，老師有興趣嗎？#n……還是說，是我太多管閒事了？"
10032010-59 = "（……很好，計劃很完美，表現非常自然）"
10032010-60 = "（在我拖住老師的期間，其他人就將被綁架的目標送到歌劇院外）"
10032010-61 = "（要是我們的委託內容曝露，可能會讓老師不太高興，而且……）"
10032010-62 = "（……這樣也能順便……）"
10032010-67 = "[ns]「所以這是約會的邀請嗎？」"
10032010-72 = "約，約，約會……？"
10032010-73 = "啊，那個，其實我也……"
10032010-74 = "當，當然你這麼認為也很正常……但，但是……！"
10032010-75 = "……不，不是那樣的！"
10032010-76 = "老師可別誤會了哦？#n我從頭到尾，都只有想要幫助經營顧問工作的商業意圖而已！"
10032010-77 = "[s9]「那就謝謝你了。」\n[s10]「真可靠，拜託你囉，亞瑠。」"
10032010-87 = "……呵呵，沒問題。"
10032010-88 = "但是老師，你應該知道吧？#n有欠於我這種冷硬派的人，可不是件輕鬆的事。"
10032010-89 = "你要記住今天才行，因為需要回報的那天遲早會到來。"
10032010-90 = "那麼要從哪裡開始？#n這間歌劇院的每個地方我都很了解，儘管開口吧，老師！"
10032010-95 = "（反正準備工作已經全部完成，目標也即將到來。稍微放鬆一下應該沒問題，呵呵）"
10032010-96 = "（而且這很難得吧？最近好像比較難見到老師……）"
10032010-103 = "呵呵……"
10032010-104 = "……老師想先去哪裡？#n不用客氣儘管說。"
10032010-107 = "果然想先從舞台後方開始嗎？"
10032010-108 = "也對，除了特殊情況之外，一般人是很難親眼看到這個地方的。#n真是個明智的決定。"
10032010-109 = "通常光是來到這裡，應該都會被管理者給趕出去才對……"
10032010-110 = "不過現在在這裡的不是別人而是老師。#n只要好好拜託他們，說不定還聽到很精彩的說明呢。"
10032010-111 = "找表演者或舞台管理者搭話就行了。"
10032010-112 = "……嗯？"
10032010-113 = "你說內部構造就算了，為什麼我還能辨認出那些人？"
10032010-114 = "那，那是因為這次的工作……"
10032010-118 = "別，別在意那種小事！#n重要的不是多虧這個原因，我才能為老師導覽嗎？"
10032010-119 = "我看看……在哪裡呢？#n現在應該是他們正忙的時候才對……"
10032010-120 = "一定就在這附近……"
10032010-126 = "吧……？"
10032010-133 = "……嗯？"
10032010-134 = "[s11]「上面好像有什麼聲音……」\n[s12]「怎麼有震動……？」"
10032010-137 = "……震動？#n……從上面？"
10032010-146 = "老，老師！！"
10032010-154 = "老師！？你沒事吧！？有沒有受傷……！！"
10032010-155 = "沒，沒關係……？你完全沒有受傷？"
10032010-156 = "……呼嗚嗚嗚嗚……嚇到我都要短命了……"
10032010-157 = "（話說回來，沒想到天花板居然會掉下來……而且還偏偏在這種時候……）"
10032010-158 = "早知道會這樣，我就先帶你去其他地方了……"
10032010-159 = "……嗯？"
10032010-160 = "問我這是什麼意思？什麼什麼意思……"
10032010-164 = "不，不是！不是那樣的！#n老師你聽我解釋……！真的不是……！！"
10032010-165 = "這是因為……！"
10032010-166 = "這些卑鄙的傢伙居然偷襲！？以為我們會乖乖屈服嗎！？"
10032010-167 = "請你們消失請你們消失請你們消失請你們消失請你們消失請你們消失請你們消失！！"
10032010-168 = "竟敢妨礙亞瑠大人的計畫！不要廢話，乖乖消失啊啊啊啊──！！"
10032010-169 = "……啊。"
10032010-178 = "等，等等，遙香……！#n社長不是說過要安靜又隱密地處理嗎……！"
10032010-180 = "咯呵呵……情況比想像還激烈呢？"
10032010-181 = "再這樣下去，要是被老師發現的話我們就完──"
10032010-184 = "……咦。"
10032010-189 = "唔，唔嗯……？"
10032010-190 = "哦……？是……"
10032010-193 = "……老……師……？"
10032010-194 = "[s13]「……嗨。」\n[s14]「真是華麗的登場呢。」"
10032010-197 = "啊……老師……？"
10032010-198 = "難道你全都聽到了嗎？剛剛那些處理什麼的話……？"
10032010-202 = "哎呀呀……"
10032010-203 = "情況好像有點不妙……"
10032010-207 = "唉……所以我才說過要小心啊……"
10032010-208 = "……話說回來。"
10032010-209 = "結果還是被發現了，該怎麼辦？社長。"
10032010-210 = "……社長？"
10032010-213 = "……沒用的。#n你看亞瑠醬已經整個人僵住了。"
10032010-214 = "亞，亞瑠大人！亞瑠大人怎麼會……！"
10032010-215 = "什麼怎麼會……"
10032010-217 = "這些傢伙，我絕不會放過你們！！"
10032010-221 = "居然打算綁架我們的頭目！？真是不知天高地厚……！"
10032010-222 = "所有人把傢伙準備好！！把這些人都給我抓起來，把他們揍到揪出幕後黑手為止！！"
10032010-235 = "不，不知天高地厚……！？你說什麼！？竟敢這樣形容亞瑠大人！？"
10032010-236 = "……嗯。"
10032010-237 = "老師，不好意思……現在有事必須先解決。"
10032010-238 = "就是說啊，反正都被發現了，事情還變成這樣……"
10032010-239 = "責備的話能不能留到之後再說呢，老師？現在就先……"
10032010-240 = "[s15]「嗯，之後再說吧。」\n[s16]「先由我來指揮。」"
10032010-243 = "咯呵呵，交易成立。"
10032010-244 = "謝謝你，老師。那麼……"
10032010-245 = "……快點結束吧。"
10032010-249 = "我要把你們全都宰了──！！！"

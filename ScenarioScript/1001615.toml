[translation]
1001615-1 = "เป็นความทรงจำที่ไม่จางหายค่ะคุณครู..."
1001615-6 = "(และด้วยเหตุนั้นมิโดริกับคุณครู...)"
1001615-7 = "(ก็เล่นเกมล่ามอนสเตอร์ด้วยกันอย่างดุเดือด!)"
1001615-12 = "คุณครู พอแล้วค่ะ! มันติดสตั้นแล้วค่ะ! ตอนนี้ก็โจมตีจุดอ่อนไปเลย...!"
1001615-17 = "เอ๋?!"
1001615-18 = "[ns] \"มิโดริ? เธอโดนเด้งออกไปแล้วนี่?!\""
1001615-19 = "รู้แล้วค่ะ! เครื่องเล่นเกมมันดับไปแล้วค่ะ..."
1001615-21 = "(ไม่ว่าจะใช้วิธีไหนก็เปิดเครื่องเล่นเกมไม่ได้เลย ทั้งสองคนจึงตัดสินใจเอาไปส่งที่ศูนย์ซ่อม)"
1001615-25 = "อืม... งานยากเลยแฮะ เครื่องเล่นเกมนี่มันรุ่นเก่ามากเลย..."
1001615-26 = "ชิ้นส่วนบางชิ้นก็เลิกผลิตไปแล้ว และบางชิ้นก็ต้องเปลี่ยนใหม่หมด แต่ก็ไม่แน่ใจว่ามันจะใช้แทนกัน#nได้รึเปล่า..."
1001615-27 = "ซ่อมไม่ได้เหรอคะ...?"
1001615-28 = "เดี๋ยวฉันจะลองเช็กกับทางสำนักงานใหญ่ก่อนว่ามีชิ้นส่วนในคลังรึเปล่า รอแป๊บหนึ่งนะ"
1001615-29 = "รบกวนด้วยนะคะ..."
1001615-34 = "[ns] \"น่าเสียดายนะ... เกือบจะจับได้หมดแล้วเชียว\""
1001615-35 = "นั่นสิคะ นึกว่าคราวนี้จะทำสำเร็จซะอีก"
1001615-36 = "แถมนานๆ ทีจะได้มีโอกาสอยู่ตามลำพังกับคุณครูด้วย..."
1001615-43 = "ขอโทษที่ให้รอนานนะ แต่ว่า... ทางสำนักงานใหญ่เองก็บอกว่าหาชิ้นส่วนของรุ่นนี้ยากแล้วน่ะ"
1001615-44 = "งะ... งั้นเหรอคะ?!"
1001615-45 = "ถ้าพอมีงบก็ซื้อใหม่เลยดีกว่ามั้ย?"
1001615-46 = "มันก็ได้อยู่หรอก แต่ว่า..."
1001615-50 = "ไม่มีทางซ่อมได้เลยเหรอคะ...? อย่างไปซื้อชิ้นส่วนอะไหล่จากร้านมือสอง..."
1001615-51 = "อืม... ร้านเราเป็นสาขาหลักจากทางบริษัท เลยไม่ได้รับงานซ่อมที่เป็นงานประเภท 'ดัดแปลงชิ้นส่วนโดยไม่ได้รับอนุญาต' น่ะ..."
1001615-52 = "เพราะถ้าเกิดข้อมูลเสียหายในขณะซ่อม มันจะทำให้เสียหายมากกว่าเดิมน่ะ..."
1001615-53 = "ขะ... ข้อมูลเสียหายเหรอคะ?! แบบนั้นไม่ได้นะคะ!"
1001615-54 = "เอาอย่างนี้ดีมั้ย?"
1001615-55 = "ตอนนี้มีเครื่องเกมรุ่นใหม่ที่ลดราคาอยู่ ถ้าตัดสินใจซื้อกับทางร้านเรา เราจะบริการถ่ายโอนข้อมูลให้โดยไม่เสียค่าใช้จ่ายเลย"
1001615-56 = "......"
1001615-57 = "[ns] \"......\""
1001615-58 = "ถ้าเป็นแบบนี้ก็คงช่วยไม่ได้นะคะ..."
1001615-59 = "เข้าใจแล้วค่ะ เอาอย่างนั้นก็ได้ค่ะ"
1001615-60 = "ส่งใบเรียกเก็บเงินในนามชมรมพัฒนาเกมของโรงเรียนวิทย์มิลเลเนียมได้เลยค่ะ"
1001615-61 = "ทำแบบนั้นได้รึเปล่างั้นเหรอคะ? นี่เป็นค่าใช้จ่ายของงานชมรมนะคะ! ทางเซมิน่าต้องเข้าใจอย่างแน่นอนค่ะ ต้องเข้าใจแน่ๆ ค่ะ!"
1001615-62 = "จะรีบจัดการให้แล้วกัน การถ่ายโอนข้อมูลจะใช้เวลานานนิดหน่อย รบกวนรอหน่อยนะ"
1001615-63 = "ค่ะ... รบกวนด้วยนะคะ"
1001615-67 = "[ns] \"เครื่องเล่นเกมอันนี้ซื้อมาพร้อมกับโมโมอิใช่มั้ย?\""
1001615-68 = "คะ? คะ... คุณครูรู้ได้ยังไงคะ?!"
1001615-69 = "[s] \"แค่เดาเอาน่ะ...\""
1001615-70 = "ค่ะ... พอคิดดูแล้วฉันก็แสดงออกชัดเจนอยู่แล้วด้วย..."
1001615-71 = "เป็นอย่างที่คุณครูถามแหละค่ะ ฉันซื้อเครื่องเล่นเกมนี้มาพร้อมกับพี่ค่ะ"
1001615-72 = "ถึงพี่เค้าจะทำพังไปแล้วเพราะเล่นเกมมากเกินไป แต่ของฉันก็ยังใช้เล่นมาได้จนถึงตอนนี้ค่ะ"
1001615-73 = "แต่สุดท้ายก็ต้องบอกลากันแบบนี้..."
1001615-77 = "อย่าทำหน้าแบบนั้นสิคะ มันไม่ใช่เรื่องใหญ่อะไรสักหน่อยค่ะ มันเป็นเรื่องที่เกิดขึ้นได้เพราะเครื่องเกมคอนโซลเองก็นับเป็นสินค้าสิ้นเปลืองนี่คะ"
1001615-78 = "แถมบางครั้งก็แอบหงุดหงิดกับราคาที่ค่อนข้างแพงด้วยค่ะ"
1001615-79 = "แต่เครื่องเล่นเกมเครื่องนี้ พี่เค้าอุตส่าห์เก็บเงินแล้วซื้อให้ฉันก่อนตัวเองค่ะ"
1001615-80 = "เพราะอยากทำให้ฉันจมดิ่งค่ะ"
1001615-84 = "[ns] \"จะ... จมดิ่งเรอะ?!\""
1001615-85 = "ก็มันพูดได้แค่นี้นี่คะ!"
1001615-86 = "ตอนแรกฉันไม่ได้ชอบเล่นเกมเท่าไรหรอกค่ะ ถึงตอนนี้กลายเป็นติดงอมแงมไปแล้วก็ตาม..."
1001615-87 = "แต่ยังไงก็เล่นน้อยกว่าพี่อยู่ดีนะคะ เอาเป็นว่าฉันชนะค่ะ!"
1001615-88 = "แม้แต่ตอนที่แข่งเล่นเกมกัน ฉันก็ยังชนะมากกว่าพี่ด้วย ถือว่าฉันชนะค่ะ!"
1001615-89 = "[s] \"เอาเถอะๆ...\""
1001615-93 = "แต่ฉันก็คิดว่าพี่สาวของฉันเป็นคนที่น่าทึ่งมากเลยนะคะ ไม่รู้เลยว่าทำไมถึงมีเอเนอร์จี้ล้นเหลือแบบนั้นได้..."
1001615-94 = "พี่เค้ามักจะหาอะไรท้าทาย มองหาสิ่งใหม่ๆ และปรับให้เข้ากับตัวเองได้เสมอ..."
1001615-95 = "ในฐานะคนที่ใช้ความคิดสร้างสรรค์ คือเป็นทัศนคติที่น่าเหลือเชื่อมากๆ เลยนะคะ"
1001615-96 = "แต่ว่าก็ชอบก่อเรื่องและดึงให้ฉันเข้าไปพัวพันด้วยเสมอๆ เลยค่ะ!"
1001615-97 = "แต่ถึงอย่างนั้น... ฉันก็ยังรู้สึกอิจฉาพวกเกมมากจนเผลอพยายามอยู่ห่างๆ มันโดยไม่รู้ตัว..."
1001615-98 = "[s] \"อิจฉาเกมงั้นเหรอ?\""
1001615-99 = "ค่ะ"
1001615-100 = "จะบอกว่ายังไงดีนะคะ..."
1001615-101 = "สมัยนี้ภาพวาดประกอบสวยๆ มักจะอยู่ในเกมกันหมดเลยนี่คะ"
1001615-102 = "มันอดไม่ได้ที่จะเอาภาพวาดของฉันไปเปรียบเทียบกับภาพวาดของมือโปรอยู่ดีค่ะ..."
1001615-103 = "สมัยก่อนฉันยังวาดรูปได้ไม่ดีเท่าตอนนี้ เพราะงั้นก็เลยวาดให้มากขึ้นกว่าเดิมเยอะเลยค่ะ"
1001615-104 = "[s1] \"อ่าฮะ เรื่องแบบนี้มันยากนะ...\"\n[s2] \"ช่วงที่ยากที่สุดคือช่วงที่ตัวเองยังอยู่กึ่งกลางนี่แหละ\""
1001615-107 = "ใช่ค่ะ"
1001615-108 = "ฉันกล้าพูดได้เลยว่าสิ่งที่ทำให้เกิดปัญหาได้เนี่ยมักเป็นสิ่งธรรมดาๆ เสมอๆ เลยค่ะ!"
1001615-109 = "แต่ว่า... พี่สาวของฉันไม่ใช่คนแบบนั้นหรอกค่ะ"
1001615-110 = "พี่เค้าเป็นคนที่พูดว่าสิ่งที่ดีคือดีจริงๆ ได้อย่างซื่อตรง และไม่ใส่ใจสิ่งที่ไม่ชอบหรือสิ่งที่ไม่ดีเลยค่ะ"
1001615-111 = "เพราะในโลกนี้ยังมีสิ่งดีๆ อยู่อีกมากมาย จนการจะรักทุกอย่างเนี่ยมีแค่ชีวิตเดียวก็ยังไม่พอเลยค่ะ"
1001615-112 = "ขะ... ขอโทษนะคะคุณครู! พอมองเครื่องเล่นเกมเรโทรเครื่องนี้แล้วจู่ๆ ก็เผลอพูดมากไปหน่อยค่ะ..."
1001615-113 = "[s] \"ไม่เป็นไร เรื่องที่มิโดริเล่าสนุกมากเลย\""
1001615-114 = "งะ... งั้นเหรอคะ?"
1001615-115 = "ค่อยยังชั่วหน่อยค่ะ..."
1001615-118 = "ขอโทษที่ทำให้รอนานนะ! โอนข้อมูลเรียบร้อยแล้วละ!  อันนี้เครื่องเล่นเกมเครื่องเก่าของคุณลูกค้า ส่วนอันนี้ก็เป็นเครื่องเล่นเกมเครื่องใหม่นะ!"
1001615-122 = "ค่ะ ขอบคุณมากค่ะ"
1001615-123 = "แต่ว่า... จะทำยังไงกับอันนี้ดีล่ะคะ?"
1001615-124 = "[s3] \"เครื่องเกมนี่น่ะเหรอ ซื้อขาตั้งกับขั้นวางใสไปเก็บไว้เถอะ...\"\n[s4] \"เก็บไว้เป็นที่ระลึกกันเถอะ!\""
1001615-127 = "คะ? ถะ... ถึงจะพูดอย่างนั้น..."
1001615-128 = "เป็นของที่อัดแน่นด้วยความทรงจำงั้นเหรอคะ?"
1001615-129 = "มันก็จริงอยู่หรอกค่ะ..."
1001615-130 = "คุณครูจะให้เหรอคะ?!?!"
1001615-131 = "มะมะมะมะไม่ดีกว่าค่ะ ฉันคงรบกวนคุณครูขนาดนั้นไม่ได้..."
1001615-132 = "คะ? ไม่เป็นไรเพราะยังมีอยู่อีกงั้นเหรอคะ?"
1001615-133 = "......"
1001615-134 = "คุณครูต้องมีชีวิตที่น่าอิจฉาขนาดไหนถึงมีเครื่องเล่นเกมเหลืออยู่แบบนั้นคะ?!?!"
1001615-135 = "[s] \"ให้ผู้ใหญ่มีโอกาสได้เล่นเกมบ้างเถอะน่า!\""
1001615-136 = "ถ้าคุณครูพูดแบบนั้นเพื่อให้ฉันใจอ่อนละก็คงช่วยไม่ได้นะคะ!?!?"
1001615-137 = "......"
1001615-138 = "คุณครูคือที่จริงแล้วน่ะ..."
1001615-139 = "พี่โมโมอิก็เก็บรักษาเครื่องเล่นเกมไว้แบบนั้นเหมือนกันค่ะ"
1001615-140 = "เพราะงั้นฉันเองก็ทำแบบนั้นเหมือนกัน..."
1001615-141 = "แต่รู้สึกว่าถ้าทำตามก็เหมือนจะเป็นฝ่ายแพ้น่ะค่ะ..."
1001615-142 = "[s] \"อ่า ความรู้สึกแบบนั้นสินะ...\""
1001615-143 = "ขอบคุณที่เข้าใจนะคะ..."
1001615-144 = "ฉันเชื่อในเรื่องนั้นน่ะค่ะ"
1001615-145 = "เชื่อว่าพี่น้องถูกโปรแกรมให้ต่อสู้กันเองตั้งแต่เกิดค่ะ!"
1001615-146 = "[s] \"แต่อย่าทะเลาะกันหนักเกินไปล่ะ...\""
1001615-147 = "ไม่เป็นไรหรอกค่ะ!"
1001615-148 = "เพราะเวลาเล่นเกม ฉันก็จะชนะบ่อยอยู่แล้วค่ะ!"
1001615-150 = "(คุณครูกับมิโดริกลับมาที่ห้องชมรมแล้วเล่นเกมล่ามอนสเตอร์กันต่อ)"
1001615-151 = "(และครั้งนี้ก็จบเกมได้สำเร็จโดยไม่มีปัญหาใดๆ)"

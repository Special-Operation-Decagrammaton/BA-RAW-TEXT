[translation]
1001615-1 = "...The Memory is Inescapable, Sensei"
1001615-6 = "And so, I joined Midori..."
1001615-7 = "...and we got deep into a monster-hunting game!"
1001615-12 = "Now, Sensei! It's staggered! Attack its core and cast—"
1001615-17 = "HUUUUH?!"
1001615-18 = "[ns] \"Midori? Did you just disconnect?!\""
1001615-19 = "I did! My console just turned off!"
1001615-21 = "Despite her blowing on the console and inverting it, it didn't turn back on. We took it in for service..."
1001615-25 = "Hmm... This will be rough. I haven't seen a model this old in a while."
1001615-26 = "You need some replacement parts, and I don't think they even MAKE compatible ones anymore."
1001615-27 = "So, there's...nothing you can do?"
1001615-28 = "Let me call the warehouse and check the stock. I'll be right back."
1001615-29 = "Thank you..."
1001615-34 = "[ns] \"And we were so close to beating the monster!\""
1001615-35 = "Yes. I thought we were going to get it for sure this time."
1001615-36 = "And it was so fun to play, just you and me. It was going to be so special..."
1001615-43 = "Thank you for waiting. But...they told me they couldn't find the part."
1001615-44 = "A-Are you sure?!"
1001615-45 = "Perhaps I can interest you in a new model? Look at all these new features!"
1001615-46 = "But..."
1001615-50 = "Really? But...what if I found some parts at a second-hand store and brought them in? Or 3D-printed something?"
1001615-51 = "Miss, since we're a company-run store, we cannot provide \"unauthorized modification\" services..."
1001615-52 = "And even if we were to do such thing, we're not responsible for unforeseen damage that could result in data loss."
1001615-53 = "D-Data loss?! No, anything but that! We're so close!"
1001615-54 = "How about this?"
1001615-55 = "This new model's on sale right now. If you purchase it here, I'll transfer your data for free, and upgrade the memory!"
1001615-56 = "..."
1001615-57 = "[ns] \"...\""
1001615-58 = "I guess it's the only way..."
1001615-59 = "Okay. I'll do that."
1001615-60 = "Please send the invoice to the Millennium Science School Game Development Department."
1001615-61 = "That's okay? Because it's for research, it should come out of the activity fund, right? Seminar would understand!"
1001615-62 = "Thank you, Miss. We'll get started. The transfer will take a while, so please hang tight!"
1001615-63 = "Sure. Thanks for your help."
1001615-67 = "[ns] \"By any chance, did you buy that console with Momoi?\""
1001615-68 = "Yes? H-How did you know?!"
1001615-69 = "[s] \"Just a hunch...\""
1001615-70 = "Well... Now that I think about it, I guess it was obvious..."
1001615-71 = "She got the pink, and I got the green. We swapped controllers..."
1001615-72 = "Of course, hers broke down a while ago. I was so careful with mine..."
1001615-73 = "...But that's how it goes..."
1001615-77 = "Don't make that face. It's not a big deal. It's normal, in fact. Electronics grow obsolete, after all..."
1001615-78 = "I'm sometimes disappointed with how QUICKLY they go obsolete, but still..."
1001615-79 = "The thing is, Momoi worked hard to buy me this..."
1001615-80 = "...so that she could corrupt me."
1001615-84 = "[ns] \"C-Corrupt you?!\""
1001615-85 = "It's true!"
1001615-86 = "I was just an artist, initially. I didn't even game, and now look at me!"
1001615-87 = "Still, I play less than her, so I guess I'm not fully corrupted."
1001615-88 = "And when we DO play together, I beat her more than half the time. So, who's the real winner?"
1001615-89 = "[s] \"If that's what counts...\""
1001615-93 = "...Momoi still impresses me. She never gives up, and is always bursting with energy..."
1001615-94 = "She's so curious and never shies away from a challenge. Everything she does becomes a part of her story..."
1001615-95 = "It's a very admirable mindset, and especially valuable for a creator."
1001615-96 = "That said, she's always causing trouble and dragging me into it!"
1001615-97 = "...Still, I admire her courage. I used to be so envious of video games and subconsciously avoided them."
1001615-98 = "[s] \"Envious?\""
1001615-99 = "Yes."
1001615-100 = "How should I put it?"
1001615-101 = "She'd play, and I'd see such incredible artwork out of the corner of my eye."
1001615-102 = "I tried not to, but I always compared my drawings to the professionals'."
1001615-103 = "And, because I was even more of an amateur back then, it hurt all the more."
1001615-104 = "[s1] \"So that's what happened...\"\n[s2] \"Confidence takes time.\""
1001615-107 = "I now know that it was all part of the journey."
1001615-108 = "But at the time I couldn't stop thinking about how mediocre I was!"
1001615-109 = "...My sister's never been like that."
1001615-110 = "She reads her old work and talks about things she likes, never dwelling on what she finds embarrassing."
1001615-111 = "She's like that naturally, too. She says that life is short, so we should focus on all the good things it has to offer."
1001615-112 = "Ah, I'm sorry, Sensei! What am I going on about? It's just an old console..."
1001615-113 = "[s] \"It's fine. I enjoyed listening to you, Midori.\""
1001615-114 = "Y-You did?"
1001615-115 = "That's a relief..."
1001615-118 = "Thank you for waiting! The data transfer is complete! Here's your old console, and I've re-boxed the new one!"
1001615-122 = "Okay. Thank you so much."
1001615-123 = "By the way... What should I do with the old one?"
1001615-124 = "[s3] \"Keep it forever!\"\n[s4] \"Let's put it on display!\""
1001615-127 = "What? W-We don't have to go that far..."
1001615-128 = "You're saying that it's precious? Because of all the memories?"
1001615-129 = "I mean, you're right, but..."
1001615-130 = "You'll build me a clear display shelf?!"
1001615-131 = "N-N-N-N-No can do. That's way too much. I couldn't have you—"
1001615-132 = "What? You have some spare ones? And a stand?"
1001615-133 = "..."
1001615-134 = "What kind of glamorous life are you living, if you just have that stuff hanging around?"
1001615-135 = "[s] \"What? So I can't have hobbies?!\""
1001615-136 = "You know that's not what I meant!"
1001615-137 = "..."
1001615-138 = "Still, Sensei, actually..."
1001615-139 = "Momoi displays her old console in the same way."
1001615-140 = "Is it all right if I do something similar...maybe even better?"
1001615-141 = "...She's going to accuse me of copying her, and that means more points to Momoi..."
1001615-142 = "[s] \"Ah, I know that feeling...\""
1001615-143 = "Thanks for getting it..."
1001615-144 = "The thing is, I'm a believer of a certain theory..."
1001615-145 = "...The theory that sisters are programmed to fight each other from birth!"
1001615-146 = "[s] \"Yeah, but not all the time...?\""
1001615-147 = "It's okay! She gets this round!"
1001615-148 = "But I'll beat her in the next match!"
1001615-150 = "Midori plugged in her new console, and we continued from where we left off."
1001615-151 = "This time, we finally completed the hunt!"

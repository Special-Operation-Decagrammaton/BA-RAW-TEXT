[translation]
1001615-1 = "……是無法割捨的回憶呢，老師"
1001615-6 = "（就在和綠一起……）"
1001615-7 = "（享受著狩獵怪物的遊戲時……！）"
1001615-12 = "老師，成功了！牠進入虛弱狀態了！#n現在只要攻擊弱點就……！"
1001615-17 = "咦咦咦！？"
1001615-18 = "[ns]「綠？你怎麼斷線了！？」"
1001615-19 = "我也不知道！#n遊戲機突然就關機了……？"
1001615-21 = "（不管怎麼嘗試都打不開遊戲機，最終只好來到了維修中心）"
1001615-25 = "唔嗯……恐怕有點麻煩呢。#n這台遊戲機的型號太舊了……"
1001615-26 = "有些已經停產的老零件甚至得整個換掉，但能不能相容還不確定……"
1001615-27 = "沒辦法修好嗎……？"
1001615-28 = "我先問問總公司有沒有庫存吧。請稍等一下。"
1001615-29 = "麻煩了……"
1001615-34 = "[ns]「真可惜……明明就快打贏了……」"
1001615-35 = "就是說啊，本來以為這次可以成功狩獵的。"
1001615-36 = "而且這也是難得能跟老師單獨相處的機會……"
1001615-43 = "不好意思久等了。#n不過……總公司那邊也說這個零件現在很難取得……"
1001615-44 = "怎，怎麼會！？"
1001615-45 = "要不要乾脆買台新機呢？"
1001615-46 = "是，是這麼說沒錯……"
1001615-50 = "真的不行嗎……？#n比如去二手店找零件之類的……"
1001615-51 = "唔嗯……因為我們這邊是直營店的關係，這種「未經授權的改裝」屬於禁止範圍……"
1001615-52 = "況且萬一因此導致資料損毀的話，就更無法挽回了……"
1001615-53 = "資，資料損毀！？那樣更不行了！"
1001615-54 = "不如這樣吧？"
1001615-55 = "現在新機型剛好在特價，如果客人您願意在這裡購買，我們會免費幫您轉移資料。"
1001615-56 = "……"
1001615-57 = "[ns]「……」"
1001615-58 = "感覺也只能這樣了……？"
1001615-59 = "我明白了，就這麼做吧。"
1001615-60 = "帳單麻煩開給千年科學學園的遊戲開發部。"
1001615-61 = "老師你問這樣會不會有問題？#n這是社團經費的正當運用！我相信研討會也會同意的！一定會！"
1001615-62 = "那我馬上幫您準備。#n資料轉移需要一些時間，再麻煩兩位稍等。"
1001615-63 = "好……麻煩了。"
1001615-67 = "[ns]「那台遊戲機，是跟桃井同時買的嗎？」"
1001615-68 = "咦？老，老師你怎麼知道！？"
1001615-69 = "[s]「莫名有這種感覺……」"
1001615-70 = "嗯……仔細想想，我的確表現得很明顯……"
1001615-71 = "老師說的沒錯，這是我跟姐姐同時買的。"
1001615-72 = "姐姐那台因為玩太兇的關係早就壞了，我的則勉強撐到了現在。"
1001615-73 = "結果終究還是……"
1001615-77 = "請不要露出那種表情，其實這也沒什麼。#n畢竟遊戲機本來就是消耗品，會這樣是理所當然的事情。"
1001615-78 = "……雖然以消耗品來說有點貴得讓人心疼就是了。"
1001615-79 = "而且這台遊戲機，還是姐姐他省吃儉用先買給我的。"
1001615-80 = "……為了讓我墮落。"
1001615-84 = "[ns]「墮，墮落！？」"
1001615-85 = "除此之外我想不到其他解釋了！"
1001615-86 = "我本來根本不愛玩遊戲的，現在卻變成這樣……"
1001615-87 = "不過我還是比玩得比姐姐少，所以算我贏了！就是這樣！"
1001615-88 = "對戰也是我贏得比較多，所以還是我贏！"
1001615-89 = "[s]「好好好……」"
1001615-93 = "……但我還是覺得姐姐很厲害。#n他怎麼能一直那麼有活力……"
1001615-94 = "總是挑戰新東西、尋找新鮮事，還能把那些融入自己的創作……"
1001615-95 = "以創作者而言，這種態度真的很了不起。"
1001615-96 = "雖然他總是惹麻煩，還把我拖下水就是了！"
1001615-97 = "不過，跟當時因為太羨慕遊戲而下意識想遠離它的我相比……"
1001615-98 = "[s]「羨慕遊戲？」"
1001615-99 = "嗯。"
1001615-100 = "該怎麼說呢……"
1001615-101 = "最近比較漂亮的插畫，大多都出現在遊戲裡對吧？"
1001615-102 = "就算不想，也會把自己的畫拿來跟專業的作品比較……"
1001615-103 = "那時候我畫得比現在更差，所以就……"
1001615-104 = "[s1]「原來是這樣啊……」\n[s2]「不上不下的時期才是最痛苦的對吧。」"
1001615-107 = "沒錯。"
1001615-108 = "我敢說會惹麻煩的，永遠都是半吊子的東西！"
1001615-109 = "……但姐姐不是那樣的人。"
1001615-110 = "他能夠純粹地喜歡好的東西，而不去在意那些討厭的事情。"
1001615-111 = "說是世界上有太多美好的東西，人生光用來喜歡就不夠用了。"
1001615-112 = "對，對不起，老師！#n看到這台舊遊戲機，一不小心就說個不停……"
1001615-113 = "[s]「沒關係，我覺得綠的故事很有趣。」"
1001615-114 = "真，真的嗎？"
1001615-115 = "太好了……"
1001615-118 = "兩位久等了！資料已經轉移完成囉！#n這是您的舊遊戲機，還有全新的新機型！"
1001615-122 = "嗯，謝謝你。"
1001615-123 = "不過……這台機器該怎麼處理呢？"
1001615-124 = "[s3]「不如買個底座和透明展示櫃……」\n[s4]「把這台遊戲機當成紀念品來保存吧！」"
1001615-127 = "咦？這，這會不會有點……"
1001615-128 = "因為這是充滿回憶的物品？"
1001615-129 = "那個，是沒錯啦……"
1001615-130 = "老師要送我嗎！？"
1001615-131 = "不不不不行啦，這樣太不好意思了。#n我不能再麻煩老師你……"
1001615-132 = "咦？剛好有多的，所以沒關係？"
1001615-133 = "……"
1001615-134 = "老師到底過著多麼令人羨慕的生活，居然能多出這種東西！？"
1001615-135 = "[s]「至少也該留給大人玩遊戲的權利吧──！」"
1001615-136 = "說這種讓人心軟的話，我不就拒絕不了了嗎！？"
1001615-137 = "……"
1001615-138 = "老師，其實……"
1001615-139 = "姐姐他已經把他的遊戲機，用那種方式保存起來了。"
1001615-140 = "所以我也應該這麼做……"
1001615-141 = "……但我總覺得跟著做好像就輸了。"
1001615-142 = "[s]「啊，我懂那種感覺……」"
1001615-143 = "謝謝老師能理解……"
1001615-144 = "我呢，其實相信一個理論。"
1001615-145 = "那就是姐妹打從出生就被設定好要彼此競爭了！"
1001615-146 = "[s]「也，也別吵得太兇哦……」"
1001615-147 = "沒問題！"
1001615-148 = "因為遊戲的對戰是我贏得比較多！"
1001615-150 = "（和綠一起回去之後，繼續進行狩獵遊戲）"
1001615-151 = "（這次終於順利完成了狩獵）"

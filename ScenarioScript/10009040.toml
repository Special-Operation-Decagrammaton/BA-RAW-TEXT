10009040-12 = "吃完這個後我們就冷靜地……"
10009040-16 = "……咦？"
10009040-21 = "居，居然不在……！？跑哪去了！？"
10009040-24 = "（整理好心情，和瀬奈一起巡邏……）"
10009040-25 = "[s]「……等等。」"
10009040-26 = "嗯？"
10009040-27 = "[s]「總覺得有股不祥的預感……」"
10009040-35 = "老師！"
10009040-36 = "[s]「我就知道會這樣！」"
10009040-42 = "差一點，就差一點了……馬上就能親手……！"

[translation]
10009040-1 = "Episode 4;The Fourth Assault!"
10009040-2 = "I don't think the bad cop angle is going to work with her."
10009040-3 = "Let's switch it up and try playing good cop, then."
10009040-4 = "Sounds good!"
10009040-10 = "H-Hey, Wakamo...? We're sorry about earlier. We were out of line."
10009040-11 = "We brought some macarons from the Valentine's Day festival to apologize."
10009040-12 = "I hope you like them. What do you say to sitting down, breaking bread,#nand talking this thing out?"
10009040-16 = "Huh?"
10009040-21 = "Her cell's empty! Where'd she go?!"
10009040-24 = "After regaining my composure, I continued to patrol the streets with Sena when..."
10009040-25 = "[s] \"Wait. My Sensei senses are tingling.\""
10009040-26 = "Your what?"
10009040-27 = "[s] \"I'm starting to get déjà vu again.\""
10009040-35 = "Sensei!"
10009040-36 = "[s] \"Called it!\""
10009040-42 = "So close...! Just a little more and you'll be mine!"

[translation]
10009040-1 = "ตอนที่ 4;การจู่โจมครั้งที่ 4!"
10009040-2 = "คิดแล้วเชียวว่ากลยุทธ์กดดันแบบตำรวจร้ายกาจก็มีขีดจำกัดอยู่เหมือนกัน"
10009040-3 = "ถ้างั้นมาเปลี่ยนวิธีกันเถอะ ใช้กลยุทธิ์ตำรวจแสนดีกัน!"
10009040-4 = "ดีล่ะ!"
10009040-10 = "หืม... วาคาโมะ พวกเราพูดแรงไปหน่อยเพราะโมโหเรื่องเหตุวุ่นวายที่เกิดขึ้นก่อนหน้านี้น่ะ"
10009040-11 = "เราเลยเอาขนมมาการองที่ขายในงานเทศกาลวาเลนไทน์มาให้แทนคำขอโทษน่ะ"
10009040-12 = "พวกเรามากินขนมแล้วพูดคุยปรับความเข้าใจกันนะ เพราะงั้นเธอ..."
10009040-16 = "หืม?"
10009040-21 = "วะ...ว่างเปล่า?! ยะ...ยัยนั่นหายไปไหนแล้วเนี่ย?!"
10009040-24 = "(คุณครูเดินลาดตระเวนไปตามถนนอย่างสบายๆ พร้อมกับเซนะ...)"
10009040-25 = "[s] \"เดี่ยวนะ รู้สึกแปลกๆ จัง\""
10009040-26 = "คะ...?"
10009040-27 = "[s] \"รู้สึกเหมือนเดจาวูยังไงก็ไม่รู้...\""
10009040-35 = "คุณครู!"
10009040-36 = "[s] \"ใช่เลย! เดาไม่ผิดจริงๆ ด้วย!\""
10009040-42 = "อีกนิดเดียว... แค่อีกนิดเดียวก็จะคว้าคุณมาไว้ในมือฉันได้แล้ว...!"

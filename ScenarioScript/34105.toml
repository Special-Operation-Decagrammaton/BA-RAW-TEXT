[translation]
34105-9 = "......!!"
34105-10 = "...... อย่าบอกนะว่าคนคนนั้น..."
34105-16 = "กะไว้แล้วเชียวว่าต้องมาที่นี่ ทายถูกจนได้สินะ ใช่มั้ยล่ะ? อ่ะฮ่าฮ่า! ฉันนี่ยังเก่งใช้ได้เลยเนอะ"
34105-17 = "มิโซโนะ มิกะ..."
34105-18 = "กะว่าจะให้ออกโรงเหมือนตัวโกงน่ะ☆! ใช่แล้ว ฉันเองแหละ ยังจำได้อยู่อีกเหรอเนี่ย? "
34105-19 = "ดีใจใช่ไหมที่ได้เจอฉัน ซาโอริ? อ้าว? ทำไมทำหน้าแบบนั้นล่ะ? เธอนี่นะ..."
34105-24 = "ทำหน้าอย่างกับเห็นแม่มดเลยอย่างนั้นแหละ...?"
34105-26 = "ตอนต่อไป;ผู้ไล่ล่า"

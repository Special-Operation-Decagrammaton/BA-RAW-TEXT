101030-49 = "3;아야네;09;그건 그렇지만…… 선생님, 최근엔 훨씬 더 바빠진 것 같아서…… 저희의 연락이 폐가 되진 않아야 할 텐데…….\n#3;a\n#3;em;…"
101030-50 = "1;세리카;06;폐가 될 리가 없잖아. 우리와 선생님 사이인데!\n#1;ar\n#1;em;[반응]\n#1;hophop"
101030-51 = "5;노노미;03;응응, 맞아요. 아야네 쨩. 선생님이라면 분명 발 벗고 나서줄 거예요.\n#5;al\n#5;em;[반짝]"
101030-52 = "1;시로코;02;맞아. 참고로 저번엔 선생님이 연락해서 그냥 특별한 이유 없이 내 안부를 물어보기도 했어."
101030-53 = "3;아야네;04;선생님이요? 선배에게만?\n#3;shake\n#3;em;[?!]"
101030-54 = "5;세리카;04;시로코 선배 이 타이밍에 자랑을……?\n#5;em;[땀]\n#5;stiff"
101030-55 = "1;시로코;01;응. 자랑이 아니라 사실 보고.\n#1;greeting"
101030-56 = "3;호시노;02;으헤~ 눈치 없기는. 이럴 땐 원하는 리액션을 해주는 게 예의라구. 시로코 쨩~ 너무해. 이 아저씨는 질투 나버린다고!\n#3;em;[음표]"

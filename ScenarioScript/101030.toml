[translation]
101030-1 = "ตอนที่ 3;รอยร้าวในชีวิตประจำวัน 1"
101030-2 = "เขตขุดค้นในทะเลทรายอะบิดอส"
101030-5 = "จะ.. เจอแล้วครับ!"
101030-6 = "หาเจอแล้วเหรอ?"
101030-7 = "ครับผม! เจอเครื่องกลขนาด 135m x 23m x 13m อยู่ใต้ดินตามพิกัดที่ได้รับมาครับ...!!"
101030-8 = "ต้องใช่แน่ๆ ...! รีบติดต่อนายพลเดี๋ยวนี้เลย! นี่เป็นเรื่องเร่งด่วนสุดๆ!!"
101030-9 = "ครับผม!!"
101030-10 = "ติดต่อหัวหน้าสำนักป้องกันขององค์การนักเรียนด้วย อ้อ ติดต่อผ่านเครือข่ายลับละ"
101030-11 = "ครับ!"
101030-16 = "เมืองคิโวทอส"
101030-17 = "......"
101030-23 = "เร็วเข้า! รีบไป!"
101030-24 = "ครับ!"
101030-29 = "PMC ไคเซอร์......"
101030-35 = "กองกำลัง PMC กำลังมุ่งหน้าไปทางทะเลทรายงั้นเหรอ?"
101030-36 = "อื้ม ครั้งนี้กองกำลังขนาดต่างกว่าเดิมอย่างสิ้นเชิงเลย "
101030-37 = "หืม~ หรือว่าจะมีเรื่องอะไรเกิดขึ้นกันนะ เจ้าพวกนั้นไม่ออกมาก่อกวนอะไรอยู่พักใหญ่แล้วนี่"
101030-38 = "ไม่กี่วันมานี้พวกไคเซอร์ PMC เคลื่อนไหวกันบ่อยขึ้นด้วยละค่ะ..."
101030-39 = "บ้าจริง... เจ้าพวกนั้นบุกเข้ามาในเขตปกครองตนเองเหมือนเป็นบ้านของตัวเองเลย..."
101030-40 = "จะมีเรื่องอะไรในทะเลทรายอะบิดอสหรือเปล่าคะ? แต่ที่นั่นคือพื้นที่ส่วนบุคคลของไคเซอร์ พวกเราก็เลยเข้าไปไม่ได้..."
101030-41 = "แอบสืบเอาก็ได้นี่"
101030-42 = "ชิโรโกะจัง..."
101030-43 = "เดี๋ยวเถอะชิโรโกะจัง เดี๋ยวก็เกิดเรื่องแบบคราวนั้นซ้ำๆ อีกหรอก เรียนรู้จากบทเรียนในอดีตบ้างสิ"
101030-44 = "อะ.. อืม..."
101030-45 = "ใช่ค่ะ ครั้งนี้เราน่าจะปรึกษากับคุณครูดูนะคะ"
101030-49 = "มันก็จริงอยู่ค่ะ... แต่ว่าหมู่นี้เหมือนคุณครูจะงานยุ่งขึ้นกว่าเดิมมากเลย... หวังว่าเราจะไม่ไปเป็นภาระ#nของคุณครูนะคะ..."
101030-50 = "จะเป็นแบบนั้นได้ยังไง พวกเรากับคุณครูไม่ใช่คนแปลกหน้ากันสักหน่อยนี่!"
101030-51 = "อื้ม ใช่ค่ะ อายาเนะจัง ถ้าเป็นคุณครูละก็ ต้องรีบมาช่วยพวกเราแน่นอนค่ะ"
101030-52 = "ใช่ คราวก่อนคุณครูก็ติดต่อฉันมา แล้วก็ถามสารทุกข์สุกดิบฉันแบบไม่มีเหตุผลอะไรพิเศษด้วย"
101030-53 = "คุณครูน่ะเหรอคะ? ติดต่อรุ่นพี่คนเดียวเหรอ?"
101030-54 = "นี่รุ่นพี่ชิโรโกะกำลังอวดพวกเราเหรอ...?"
101030-55 = "อื้อ ไม่ได้อวดนะ แค่พูดตามความจริงเท่านั้นเอง"
101030-56 = "แหะๆ~ ไม่รู้อะไรกันซะเลยนะ แบบนี้เราต้องรีแอคตามที่คนพูดต้องการสิถึงจะมีมารยาท ชิโรโกะจังเนี่ย~ ล้ำหน้าเกินไปแล้ว แบบนี้ลุงอิจฉานะ!"
101030-60 = "ต้องไม่ใช่แบบนี้สิ! ไปเออออห่อหมกกับพี่เค้าบ่อยๆ จนพี่เค้านิสัยเสียแล้วเนี่ย! บางทีก็ต้องเข้มงวดบ้างสิ!"
101030-61 = "อืม... งั้นเหรอ"
101030-62 = "อะ... อืม..."
101030-63 = "อื้ม! ก็ชิโรโกะจังน่ารักเหมือนลูกหมาตัวน้อยเลยนี่คะ มันช่วยไม่ได้สิน้า☆"
101030-64 = "แหะๆๆ... แล้วคุณครูว่ายังไงบ้างเหรอคะ?"
101030-65 = "ก็แค่... ถามความเป็นอยู่... นอกจากนั้นก็ไม่มีอะไร... ไม่มีเรื่องอะไรพิเศษหรอก..."
101030-66 = "ฮืม... อย่างนี้นี่เอง แต่พูดอย่างนี้แล้วก็ยิ่งคาใจนะ..."
101030-67 = "ถ้างั้นฉันจะติดต่อคุณครูแล้วขอให้ช่วยมาที่อะบิดอสดูนะคะ"
101030-68 = "ค่ะ อายาเนะจัง รบกวนด้วยค่ะ"
101030-73 = "ชมรมพัฒนาเกมมิลเลเนียม"
101030-75 = "พี่โมโมอิ ใช้คอนเซ็ปต์นี้ไม่ได้นะ "
101030-76 = "หืม? ทำไมล่ะ?! คอนเซ็ปต์นี้ออกจะปังนะ!"
101030-77 = "เราตกลงกันว่าจะสร้างเกม RPG ที่มีดาบและเวทมนตร์ไม่ใช่เหรอ "
101030-78 = "แล้วไงอ่ะ?"
101030-79 = "แล้วไงงั้นเหรอ? พี่ให้ตัวเอกขึ้นยานรบอวกาศเนี่ยนะ? ทำไมถึงฉีกคอนเซ็ปต์ไปได้ล่ะ?"
101030-80 = "ก็ฝ่ายตัวร้ายเป็นโจรสลัดอวกาศนี่นา! ตัวเอกต้องเอาชนะความชั่วร้ายให้ได้ไง!"
101030-81 = "จะให้นักรบขึ้นยานรบอวกาศได้ที่ไหนกันเล่า..."
101030-83 = "ทำไมล่ะ! เท่ออกจะตาย! นักรบอวกาศไง! "
101030-87 = "ยูสึล่ะ คิดว่าไง?"
101030-88 = "ฉะ.. ฉัน... ก็ไม่ได้คิดว่ามันแย่อะไร... มันให้อารมณ์เหมือนลัทธิดาดาที่กำลังดังอยู่ตอนนี้ด้วย..."
101030-89 = "เห็นไหมล่ะ! ฉันไม่รู้หรอกนะว่าลัทธินั่นเป็นยังไง แต่มันเจ๋งดีออก!"
101030-90 = "อะไรของเค้า..."
101030-95 = "อาริสึก็ชอบนักรบอวกาศค่ะ "
101030-96 = "อาริสึจัง?"
101030-97 = "อาริสึ! มาแล้วเหรอ!"
101030-98 = "ชมรมวิศวกรรมว่ายังไงบ้าง...?"
101030-99 = "กลับมาแล้วค่ะ ทางนั้นช่วยตรวจร่างกายและสุขภาพขั้นพื้นฐานให้ แล้วก็บอกว่าไม่พบความผิดปกติ#nอะไรในตัวอาริสึค่ะ"
101030-100 = "เวอริทัสบอกให้อาริสึตรวจร่างกายเป็นประจำด้วย อาริสึก็เลยตอบตกลงไปค่ะ"
101030-101 = "งะ.. งั้นสินะ... งั้นก็แปลว่าอาริสึจังไม่เป็นอะไรใช่ไหม?"
101030-102 = "คนแปลกๆ ที่เจอครั้งก่อนชื่ออะไรนะ เคย์...? ยังหาไม่เจอเหรอ?"
101030-103 = "ไม่ใช่เคย์ <Key> ต่างหากล่ะพี่..."
101030-104 = "แค่ชื่อผิดเอง ไม่เห็นจะเป็นอะไรเลย ใช้ชื่อง่ายๆ มันสะดวกกว่าไม่ใช่เหรอ นี่เป็นกฎการตั้งชื่อเลยนะ"
101030-105 = "ค่ะ ยังไม่เจอ <เคย์> เลยค่ะ"
101030-106 = "ตกลงใช้ชื่อเคย์เหรอ? เอาเถอะ คงไม่เป็นไรหรอกมั้ง..."
101030-107 = "ตอนนี้เทคโนโลยีของชมรมวิศวกรรมยังตรวจสอบไม่ได้ว่า <เคย์> หายไปจริงหรือเปล่า เวอริทัสก็เลยบอกว่าจะเข้ามาช่วยค่ะ!"
101030-109 = "งั้นเองเหรอ..."
101030-110 = "หน็อยแน่! กล้าดียังไงจะมาทำให้อาริสึของเราเป็นธิดาอะไรนั่นน่ะ! ถ้าครั้งหน้าได้เจอกันอีก ฉันไม่ปล่อยให้รอดไปได้แน่!"
101030-111 = "แต่อาริสึจังจะไม่เป็นอะไรใช่ไหม...?"
101030-112 = "ค่ะ ไม่มีปัญหาค่ะ ต่อไปถ้าได้เจอ <เคย์> อาริสึจะใช้ลำแสงบีม 300%... ไม่สิ 100,000% ไปเลยค่ะ!"
101030-116 = "แล้วก็... อาริสึเองก็ชอบนักรบอวกาศเหมือนกันค่ะ ปาร์ตี้ของนักรบบนยานรบอวกาศ! ฟังดูเข้าท่าเลยนะคะ"
101030-117 = "ใช่ไหมล่ะ? บอกแล้วว่าต้องปัง ยานรบอวกาศมันออกจะชวนฝัน!"
101030-118 = "สักวันหนึ่งอาริสึจะได้ขึ้นยานรบอวกาศกับเขาบ้างไหมคะ?"
101030-119 = "เรื่องนั้นน่าจะยากอยู่นะอาริสึจัง..."
101030-120 = "หืม? งั้นเหรอ? แต่เห็นว่าชมรมวิศวกรรมกำลังเตรียมสร้างอะไรทำนองนั้นอยู่นะ? เรื่องปืนเรลกันของ#nอาริสึก็ด้วย"
101030-121 = "เทคโนโลยีของคิโวทอสตอนนี้ยังไม่ถึงขั้นสร้างยานรบอวกาศหรอก... แต่พอมันเป็นเรื่องชวนฝัน ทุกคนก็เลยอยากจะลองดูน่ะ..."
101030-122 = "เป็นงี้เองเหรอ?"
101030-123 = "แต่การท้าทายทำเรื่องที่เป็นไปไม่ได้ก็เป็นสิ่งที่ดีนะคะ นี่สินะคะที่เรียกว่าชวนฝัน! อาริสึเข้าใจแล้วค่ะ!"
101030-124 = "ดีละ! ถ้างั้นเกมใหม่ของเราจะเป็นคอนเซ็ปต์นักรบอวกาศที่ตั้งตี้เปิดศึกระหว่างดวงดาว! เอาตามนี้เลย!"
101030-125 = "ค่ะ! ดีเลยค่ะ!"
101030-126 = "งั้นก็เปลี่ยนประเภทเกมให้เป็นประเภทยิงกันเถอะ ตั้งความยากระดับซูเปอร์ฮาร์ดเลย... ถ้าตายแล้วต้องเริ่มใหม่หมด แล้วก็ไม่มีระเบิดทำลายล้างให้ใช้ด้วย..."
101030-132 = "เฮ้อ... คิดไว้แล้วว่าจะต้องเป็นแบบนี้"
101030-135 = "......"
101030-136 = "เคย์..."
101030-137 = "ท่านธิดา... ท่านจะปฏิเสธทั้ง[ruby=ธิดา]วัตถุประสงค์ของการดำรงอยู่[/ruby]ของตน... และ[ruby=กุญแจ]วัตถุประสงค์ของการดำรงอยู่[/ruby] ของฉันเลยเหรอคะ?"
101030-138 = "กุญแจที่สูญเสียตัวตนไม่อาจเป็นกุญแจได้อีกต่อไป และไม่อาจมีชื่อเรียกได้ดังเดิมค่ะ"
101030-142 = "......ก็ได้ค่ะ"
101030-143 = "ถ้าอย่างนั้นฉันจะเฝ้าดูท่านค่ะท่านธิดา ไม่สิ... อาริสึ"
101030-144 = "แต่ก็ไม่มีใครหลุดพ้นจากวัตถุประสงค์ของการดำรงอยู่ได้ค่ะ นั่นคือโชคชะตาที่เราต้องเผชิญค่ะอาริสึ"
101030-148 = "และเมื่อตอนนั้นมาถึง... ฉันก็คง..."
101030-151 = "ห้องสำนักงาน เซมิน่า"
101030-153 = "ฮืม..."
101030-154 = "เอาแต่เรื่องน่ารำคาญมาให้ฉันจัดการทั้งนั้นเลยสินะคะ ริโอะ"
101030-155 = "ถึงกับไปแตะต้องมรดกของ <เหล่าทวยเทพไร้นาม> ที่อันตราย และพอแผนการล้มเหลว ก็ทิ้งข้อมูลไว้มากมายให้ฉันคอยตามเก็บ..."
101030-156 = "ถึงจะสร้างเรื่องไว้ขนาดนั้นก็เถอะ แต่ยังไงก็ต้องเชิดหน้าอย่างสง่าผ่าเผยสิคะ ถึงจะสมกับชื่อ <บิ๊กซิสเตอร์>..."
101030-157 = "แต่ก็นะ ยังไงฉันก็เป็นดั่งน้ำแร่ชั้นหนึ่งที่บริสุทธิ์และสะอาดดั่งหิมะที่เพิ่งตกใหม่ๆ อยู่แล้ว ก็ต้องตอบ#nรับคำขอเช่นนั้นจากคุณสิคะ"
101030-158 = "ว่าไงล่ะคะ... คุณอยากจะบอกอะไรกับฉันคะ"
101030-159 = "......"
101030-160 = "............"
101030-161 = "นี่มัน... "
101030-162 = "การตีความโดยการเพิ่มสมมติฐาน... อย่างนั้นสินะคะ "
101030-163 = "ในเมื่อได้ข้อมูลมาขนาดนี้แล้ว... ฉันก็พอจะเข้าใจความเพ้อฝันที่น่าหวาดระแวงของคุณแล้วค่ะ "
101030-164 = "บิ๊กซิสเตอร์..."
101030-165 = "แต่ถึงยังไง... ผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษที่ได้ชื่อว่าเป็น <ผู้รอบรู้> อย่างฉันก็ยอดเยี่ยม#nกว่าอยู่แล้วละค่ะ "
101030-166 = "นั่นเป็นสิ่งที่หัวหน้าคิดเอาเองนะ"
101030-170 = "ตกใจหมดเลย...! เอมิ... มะ... มาตั้งแต่เมื่อไรกัน..."
101030-171 = "ตั้งแต่พูดเพ้อเจ้อว่าเป็นหิมงหิมะอะไรนั่นไง"
101030-172 = "......"
101030-173 = "ชมรมปรากฏการณ์ลี้ลับเป็นชมรมที่ขึ้นตรงต่อประธานริโอะตั้งแต่แรกไม่ใช่เหรอ? ฉันเองก็พอรู้สถานะ#nของชมรมดีนะ"
101030-174 = "ตกลงว่าประธานบอกไว้ว่ายังไงล่ะหัวหน้า?"
101030-175 = "อย่างแรกเลยก็คือ ข้อมูลที่สำคัญที่สุดถูกซ่อนไว้อย่างแน่นหนาในกล่องดำ เลยต้องใช้เวลาตรวจสอบ#nนานสักหน่อย..."
101030-176 = "นั่นสิ... ถ้าอย่างนั้นก็สรุปได้ว่า... เราต้องเตรียมพร้อมสำหรับ <ปรากฏการณ์ลี้ลับ> อีกอย่างหนึ่งสิคะ"
101030-177 = "หา?"
101030-178 = "ใช่ค่ะ นี่คือคำเตือนของบิ๊กซิสเตอร์ค่ะ"
101030-179 = "คำเตือนว่าจะเกิดเรื่องที่... อันตรายมากๆ..."
101030-180 = "......"
101030-182 = "ถ้างั้นพวกเราต้องทำยังไงเหรอคะ?"
101030-186 = "อุ๊ย ตะ... ตกใจหมดเลย!! มะ.. มาตั้งแต่เมื่อไรกัน...?!"
101030-187 = "โทคิ... เมดของประธาน...?"
101030-188 = "ฉันอยู่ที่นี่ตั้งแต่ก่อนที่คุณทั้งสองคนจะมาอีกค่ะ ที่นี่เป็นแหล่งหลบซ่อนชั้นดีเลยค่ะ"
101030-189 = "สมแล้วที่เป็นสายลับ พวกฉันไม่รู้เลยว่ามีคนอยู่ที่นี่ด้วย"
101030-190 = "จะว่าไปแล้ว เธอไม่ได้ตามประธานไปหรอกรึไง?"
101030-191 = "ค่ะ ประธานบอกกับฉันว่า <ตั้งแต่นี้ไปให้ใช้ชีวิตอย่างอิสระ> แล้วก็หายไปเลยค่ะ"
101030-192 = "แต่ฉันไม่รู้เลยค่ะว่าต้องใช้ชีวิตอย่างอิสระกับอะไร... แล้วต้องทำยังไง... "

[translation]
101030-1 = "Episode 3; A Fissure in Everyday Life 1"
101030-2 = "Abydos Desert Excavation Site"
101030-5 = "I-I think I found it!"
101030-6 = "...! You found it?!"
101030-7 = "Y-Yes, I believe so! I've located some kind of underground structure measuring about 132 m x 23 m x 13 m at specified coordinates."
101030-8 = "That must be it! Contact the general right away! This is of utmost urgency!"
101030-9 = "Yes! On it!"
101030-10 = "And use the anti-espionage network to contact the chief of defense of the General Student Council too."
101030-11 = "Yes!"
101030-16 = "Downtown Abydos"
101030-17 = "..."
101030-23 = "Hurry! Go, go, go!"
101030-24 = "Yes!"
101030-29 = "Kaiser PMC..."
101030-35 = "The PMC troops are moving towards the desert?"
101030-36 = "Mm. On an unprecedented scale."
101030-37 = "Whatever could they be doing? I wish they would've just stayed quiet."
101030-38 = "What Shiroko said is true. I've noticed mobilization of Kaiser PMC troops all over the area recently. "
101030-39 = "Those jerks really think they can just trample down our district like it's their backyard."
101030-40 = "They must be doing something in the Abydos Desert. We have no visibility there since it's still considered Kaiser property."
101030-41 = "We can survey the area unofficially, undetected."
101030-42 = "Shiroko..."
101030-43 = "I love your enthusiasm, little one, but let's try to learn from our past mistakes. That didn't work well for us the first time either. "
101030-44 = "Y-You're right..."
101030-45 = "I agree with Hoshino! Maybe we can ask Sensei what to do next."
101030-49 = "I would love to consult Sensei as well, but they've been especially busy recently... We might just be a bother..."
101030-50 = "What nonsense are you spewing?! Sensei'll make time for us."
101030-51 = "Let's have some faith, Ayane. Sensei has always helped us whenever we needed it."
101030-52 = "They're right. Sensei wouldn't have messaged me to check in on how I was doing if they didn't care enough to help."
101030-53 = "You got a text from Sensei?!"
101030-54 = "Shiroko, you braggart! Don't rub it in our faces!"
101030-55 = "I wasn't trying to brag about anything. I'm just reporting the facts."
101030-56 = "Heehee. If Shiroko's happy, we should just leave her be. Although, I wish Sensei had checked in on me too..."
101030-60 = "No way! Shiroko's so spoiled because you always leave her be! You have to lay down the law sometimes!"
101030-61 = "Y-You really think so?"
101030-62 = "Um... I..."
101030-63 = "Look at those big puppy eyes! How can you stay mad at her? ☆"
101030-64 = "Hahaha... More importantly, what did Sensei say?"
101030-65 = "Just asked how I was doing. It was nothing special, really?"
101030-66 = "Interesting... Just out of nowhere? For no reason?"
101030-67 = "We can get to the bottom of it easily. I'll send Sensei an invitation to come to Abydos."
101030-68 = "That sounds like the perfect plan! Thank you, Ayane!"
101030-73 = "Millennium Game Development Department"
101030-75 = "This concept is no good."
101030-76 = "What? Why?! I thought it was great!"
101030-77 = "We chose a fantasy genre RPG with a combat system based around swords and magic. "
101030-78 = "Yes, and...?"
101030-79 = "And the main character of our fantasy RPG is riding around on an intergalactic battleship."
101030-80 = "They're fighting evil space pirates! How is the main character going to rise up and defeat evil without a battleship to fight them?!"
101030-81 = "And I'm trying to tell you that RPG heroes don't fly on spaceships..."
101030-83 = "Well, why not? I think \"Space Hero\" has a really nice ring to it!"
101030-87 = "What do you think, Yuzu?"
101030-88 = "I-I... It's not too bad... It has a kind of Dadaist vibe people like these days..."
101030-89 = "See?! I might not know what that means, but she said it was super cool!"
101030-90 = "You too, Yuzu?"
101030-95 = "I like the space hero too."
101030-96 = "Aris?"
101030-97 = "Aris! You're back!"
101030-98 = "How was visiting the Engineering Department?"
101030-99 = "They performed a simple physical examination and various health checks, but said nothing was abnormal."
101030-100 = "Veritas has asked me to complete regular examinations. Like weekly quests."
101030-101 = "Th-That's good... I hope you're feeling okay..."
101030-102 = "What about that weird thing that tried to take over your body... Kei? Did you manage to find Kei?"
101030-103 = "Do you ever pay attention? Its name is Key, not Kei."
101030-104 = "Stop sweating the little details! Kei sounds better than Key anyways!"
101030-105 = "No. We have not found Kei."
101030-106 = "We're just going with Kei? I guess it doesn't matter either way..."
101030-107 = "The Engineering Department does not currently have the technology to identify if Kei is still inside of me, so Veritas is also helping me now."
101030-109 = "...As long as you're okay with it."
101030-110 = "Of course she's not okay! That weirdo tried to turn Aris into some robot princess thing! Don't worry Aris, I'll kick its butt if it ever comes near you again!"
101030-111 = "Really, though. Are you okay, Aris?"
101030-112 = "I am good. The next time I see Kei, I will release my laser beam at three hundred percent. No, I will do it at one hundred thousand percent!"
101030-116 = "And I very much like Momoi's space hero. A party of heroes on an intergalactic battleship! It is a good idea."
101030-117 = "You get me! I really love it because riding on an intergalactic battleship is my life's dream!"
101030-118 = "Will I ever get to ride a battleship as well?"
101030-119 = "I don't think that'll be possible, Aris..."
101030-120 = "What do you mean? The Engineering Department told me they were making a huge ship that can sail the skies with real fancy technology, like with Aris' railgun."
101030-121 = "There's no technology in Kivotos fancy enough for a flying battleship. It's a pipe dream that'll just leave you wanting."
101030-122 = "R-Really...?"
101030-123 = "It is okay! Dreams are meant to achieve the impossible. I have learned this from my adventures."
101030-124 = "Aris is right! I'm inspired! Okay, our new story for the game is going to be a space opera about a party of space heroes!"
101030-125 = "Yes! I like this idea very much!"
101030-126 = "Let's change the genre to a bullet hell shooter with an extremely hard difficulty...with no continues or annihilation bombs..."
101030-132 = "*sigh* ...I knew this was gonna happen."
101030-135 = "..."
101030-136 = "Kei..."
101030-137 = "Princess... Do you deny...the very purpose of your existence... The purpose of mine?"
101030-138 = "A key deprived of its function is no longer a key. It is rejected."
101030-142 = "...Understood."
101030-143 = "I shall keep watch over you from the shadows, princess... Aris."
101030-144 = "But one day you will reach the end of the road and you will no longer be able to deny your purpose. Aris, you will be forced to accept our fate."
101030-148 = "And when the time comes..."
101030-151 = "Seminar Executive Office"
101030-153 = "...Hm."
101030-154 = "Aren't you offloading the worst of your tasks off to me, Rio?"
101030-155 = "First you invoke the dangerous legacy of the Nameless Gods, fail, and now you turn around and ask me to process and analyze heaps and heaps of data."
101030-156 = "Well, I suppose being remorselessly shameless after nearly causing the end of the world is the privilege of our Big Sister."
101030-157 = "You are blessed by my presence in your life, for I am as pure and beautiful as mineral water from an ice cap. I will benevolently grant you a favor."
101030-158 = "Now then, what did you want to tell me?"
101030-159 = "..."
101030-160 = "..."
101030-161 = "This..."
101030-162 = "It's not concrete. It's an interpretation of speculation on top of a hypothesis, but I still see it... "
101030-163 = "With this... I can empathize with your apparently paranoid delusions that led you to such drastic matters. "
101030-164 = "I must admit, Big Sister is a fitting name for you indeed."
101030-165 = "I am nearly as impressed by you as I am by myself, the delicate genius beauty known for her mastery of the Omniscience. "
101030-166 = "But you made up the Omniscience degree."
101030-170 = "You startled me...! Eimi, h-how long have you..."
101030-171 = "Ever since you were saying something silly about ice caps?"
101030-172 = "..."
101030-173 = "Wasn't the Super Phenomenon Task Force originally under the direct control of President Rio? I know where that is."
101030-174 = "So, did the president leave us a message?"
101030-175 = "I haven't gotten to everything. The most important data left is locked up in her black box, so it'll take me some time to sort through it."
101030-176 = "But the biggest takeaway is this: we must prepare for a supernatural phenomenon of a staggering degree."
101030-177 = "What do you mean?"
101030-178 = "Consider it a warning from Big Sister."
101030-179 = "A warning that something ominous lurks on the horizon."
101030-180 = "..."
101030-182 = "What is our next course of action?"
101030-186 = "Eek! How did you sneak up on me too? If you keep startling me like this, my perfect face could form a wrinkle!"
101030-187 = "The president's exclusive maid, Toki...?"
101030-188 = "I have been here from the beginning. There are many places to take cover in here."
101030-189 = "Wow, that must be the skills of a special agent. I didn't catch a single hint of your presence."
101030-190 = "You didn't go with the president?"
101030-191 = "No. She told me to do as I pleased from this point forward and disappeared."
101030-192 = "I'm still trying to understand what that order meant."
101030-193 = "I was hoping to find some answers in the place where the president resided most often when the two of you came."
101030-194 = "Hm..."
101030-196 = "Did you not join the C&C after Rio's departure? You came from them originally... Did they reject you?"
101030-197 = "No. The upperclassmen were very kind to me, however..."
101030-198 = "However?"
101030-199 = "How do I say this..."
101030-200 = "..."
101030-201 = "Ah. I understand the situation. "
101030-203 = "..."
101030-204 = "I wouldn't have taken you for the shy type."
101030-205 = "Making friends may not be my strong suit, but if something dangerous is threatening Kivotos, that's where my talents shine. I can help."
101030-206 = "...What do you think, President?"
101030-207 = "One as wise as me knows better than to turn away a genuine offer of help."
101030-208 = "Thank you!"
101030-209 = "Heehee. Excellent. Our next steps are clear."
101030-210 = "Eimi, we'll need to enlist Schale's help to move forward."
101030-211 = "Understood."
101030-212 = "..."
101030-214 = "Next Episode; A Fissure in Everyday Life 2"

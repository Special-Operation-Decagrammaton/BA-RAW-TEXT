[translation]
101030-1 = "第3話;日常的龜裂（１）"
101030-2 = "阿拜多斯沙漠．挖掘區域"
101030-5 = "找，找到了！"
101030-6 = "找到了嗎？"
101030-7 = "是，是的！在那個座標底下，發現了約135m×23m×13m的構造物……！！"
101030-8 = "肯定沒錯……！立刻向將軍報告！現在立刻！"
101030-9 = "是，是！"
101030-10 = "然後，也聯絡聯邦學生會的防衛室一聲。#n記得要用專用的通訊網。"
101030-11 = "是！"
101030-16 = "阿拜多斯市區"
101030-17 = "……"
101030-23 = "動作快，要移動了！"
101030-24 = "是！"
101030-29 = "凱薩PMC……"
101030-35 = "PMC的兵力正在往沙漠移動？"
101030-36 = "嗯，規模和以往完全不同。"
101030-37 = "哼～嗯，發生什麼事了嗎？#n明明最近還挺安分的。"
101030-38 = "這幾天四處都能看見凱薩PMC正在移動……"
101030-39 = "那些傢伙，對別人的自治區為所欲為！真是無法原諒。"
101030-40 = "是阿拜多斯沙漠發生什麼事了嗎？"
101030-41 = "要不要偷偷去看一下？"
101030-42 = "白子醬，那樣有點……"
101030-43 = "那裡是凱薩的土地，隨意進入的話可是會被罵的唷～#n之前也因為這樣發生過糾紛不是嗎？"
101030-44 = "嗯……"
101030-45 = "對了，和老師商量看看吧！"
101030-49 = "我也很想這麼做……不過老師最近似乎很忙……#n如果聯絡老師，會不會造成他的困擾呢？"
101030-50 = "困不困擾是老師決定的吧？"
101030-51 = "就是呀綾音醬。如果在聯絡前就那樣認定的話，老師也無能為力……而且，老師一定會幫助我們的☆"
101030-52 = "嗯。而且老師之前才剛聯絡過我。"
101030-53 = "老師傳來聯絡嗎？只聯絡前輩？"
101030-54 = "不是因為白子前輩狂刷貼圖嗎？"
101030-55 = "不，這次不是。#n是老師主動找我的。"
101030-56 = "就算是白子醬也不會每次都狂刷貼圖的嘛～"
101030-60 = "真是的，前輩每次都這麼寵她！"
101030-61 = "唔嗯……有嗎～？"
101030-62 = "嗯……"
101030-63 = "哎呀哎呀，白子醬就是這種地方可愛嘛☆"
101030-64 = "啊哈哈……那，老師說了什麼呢？"
101030-65 = "沒什麼特別的……#n都是「最近怎麼樣？」、「還好嗎？」之類的……這種內容。"
101030-66 = "嘿……總覺得有點冷淡呢。"
101030-67 = "總之，我來試著聯絡老師吧。#n問他能不能來一趟阿拜多斯。"
101030-68 = "嗯☆綾音醬，拜託你囉！"
101030-73 = "千年．遊戲開發部"
101030-75 = "姐姐，這樣不行唷。"
101030-76 = "咦，為什麼！？"
101030-77 = "我們要做的不是「劍與魔法的RPG」嗎？"
101030-78 = "是沒錯……怎麼了嗎？"
101030-79 = "什麼怎麼了……為什麼主角會搭上宇宙戰艦呢？"
101030-80 = "因為敵人是宇宙海賊呀！既然如此主角就得搭上宇宙戰艦才行！"
101030-81 = "勇者怎麼會搭上宇宙戰艦……"
101030-83 = "怎麼了嗎？主角可是宇宙勇者唷！？不覺得很棒嗎！"
101030-87 = "柚子你覺得呢？"
101030-88 = "我，我覺得……或許，還不錯……#n像是最近流行的達達主義的感覺……"
101030-89 = "看吧！柚子也說可以！"
101030-90 = "咦咦……"
101030-95 = "愛麗絲覺得「宇宙勇者」非常棒！"
101030-96 = "愛麗絲醬？"
101030-97 = "愛麗絲！歡迎回來！還好嗎！？"
101030-98 = "工程師部怎麼說……？"
101030-99 = "進行了簡單的身體檢查和健康狀況的確認，不過似乎沒有什麼異常。"
101030-100 = "還有，貝里塔斯的大家跟愛麗絲說要定期進行檢查，愛麗絲也答應了。"
101030-101 = "這，這樣啊……那愛麗絲醬已經沒事了對吧？"
101030-102 = "當時那個奇怪的傢伙……叫什麼，Kei……來著？#n那傢伙呢？"
101030-103 = "不是Kei，是＜Key＞才對吧，姐姐……"
101030-104 = "只要能認得出是誰，名字叫什麼無所謂啦！"
101030-105 = "是。沒有發現「Kei」的蹤跡。"
101030-106 = "結果決定是「Kei」了嗎？#n……算了，就這樣吧。"
101030-107 = "以工程師部目前的技術似乎無法確認「Kei」是否已經消失。#n所以貝里塔斯似乎會一起幫忙！"
101030-109 = "這樣啊……"
101030-110 = "那傢伙，想擅自讓愛麗絲變成王女還是什麼的！真是的！#n下次見面絕對要給他好看！"
101030-111 = "愛麗絲醬可以接受嗎……？"
101030-112 = "嗯，愛麗絲沒有問題。#n下次見到「Kei」時會發射300%……不，會發射100,000%的光束砲！"
101030-116 = "還有，愛麗絲也覺得宇宙勇者非常棒。#n搭乘宇宙戰艦的勇者隊伍！真是棒極了！"
101030-117 = "對吧對吧？胸口有股悸動的感覺對吧？#n畢竟宇宙戰艦就是浪漫啊！"
101030-118 = "愛麗絲也有搭上宇宙戰艦的一天嗎？"
101030-119 = "那，那可能有點困難吧……"
101030-120 = "咦？不過工程師部不是有打算要做嗎？#n愛麗絲的電磁砲也是其中的一部份對吧？"
101030-121 = "以現在的技術來看，是很困難的……不過因為是浪漫，所以大家都在挑戰……"
101030-122 = "原來是這樣嗎！？"
101030-123 = "挑戰不可能真是了不起！#n那就是浪漫對吧！愛麗絲明白了！"
101030-124 = "很好！那麼，下一個作品就決定是宇宙勇者隊伍的太空歌劇了！"
101030-125 = "是！感覺真棒！"
101030-126 = "那，那，類型就換成彈幕射擊遊戲吧……#n做成超高難度，無法接關也沒有全滅炸彈的──"
101030-132 = "唉……果然又變成這樣了。"
101030-135 = "……"
101030-136 = "「Kei」……"
101030-137 = "王女啊……妳要否定自己的[ruby=王女]存在目的[/ruby]……以及我的[ruby=鑰匙]存在目的[/ruby]嗎？"
101030-138 = "失去存在目的的鑰匙已經不再是鑰匙……也沒有必要被這麼稱呼。"
101030-142 = "……我明白了。"
101030-143 = "那麼，我會守望著妳的。#n王女……不，「愛麗絲」。"
101030-144 = "但是，沒有人能擺脫自己存在的目的。#n愛麗絲，這就是我們要面對的命運。"
101030-148 = "到了那個時候……我──"
101030-151 = "研討會．辦公室"
101030-153 = "呼呣……"
101030-154 = "──把麻煩的事全都推給我了呢，莉央。"
101030-155 = "向「無名之神」的遺產動手，一但計劃失敗就說「之後拜託你了」──什麼的。"
101030-156 = "雖然我認為無論引發什麼樣的事件，#n都能堂堂正正地面對才對得起「大姐頭」的名號……"
101030-157 = "算了……如新雪般高潔、如清水般通透的我，#n就理解你的那股任性吧。"
101030-158 = "那麼……你想向我傳達什麼呢。"
101030-159 = "……"
101030-160 = "…………"
101030-161 = "這個是──"
101030-162 = "原來如此……雖然是以假設推測而來的解釋……"
101030-163 = "既然已經掌握了這麼多的資料……#n你那能稱的上是偏執的妄想，我似乎也稍微能理解了。"
101030-164 = "不愧是，被稱為大姐頭的人啊……"
101030-165 = "……不過儘管如此，還是被稱為「全知」的超天才病弱美少女的我更厲害就是了。"
101030-166 = "那只是部長自己亂編的吧。"
101030-170 = "噫呀……！#n英，英美，你從什麼時候……"
101030-171 = "從你說新雪還是什麼的時候？"
101030-172 = "……"
101030-173 = "特異現象搜查部本來就是莉央會長的直屬組織不是嗎？#n我也知道這裡的位置唷。"
101030-174 = "所以，會長說了些什麼呢？"
101030-175 = "這個嘛……重要的情報藏在嚴密的安全系統裡，我想可能還需要一些時間才能確認……"
101030-176 = "不過簡單來說，「要對別的『特異現象』做好準備」──就是這樣。"
101030-177 = "這是什麼意思？"
101030-178 = "──這是來自大姐頭的警告。"
101030-179 = "不久的將來──奇普托斯將面臨前所未有的危機。"
101030-180 = "……"
101030-182 = "──我該做什麼呢？"
101030-186 = "呀啊……！？你，你什麼時候……！？"
101030-187 = "會長的專屬女僕……季……？"
101030-188 = "在兩位來到這裡的稍早之前。#n因為這裡有很多地方可以藏身。"
101030-189 = "嘿，不愧是特務。我完全沒發現。"
101030-190 = "我還以為你一定是和會長一起離開了。"
101030-191 = "不。會長留下「今後自由地生活吧」這句話後就離開了。"
101030-192 = "但是，該怎麼自由生活呢……我並不清楚……"
101030-193 = "於是我便一直待在這個會長曾待過的地方，接著兩位就出現了。"
101030-194 = "呼呣……"
101030-196 = "你本來就是C&C所屬，我聽說你投靠了他們……是被拒絕了嗎？"
101030-197 = "不，前輩們都很照顧我。"
101030-198 = "……？"
101030-199 = "但是……那個，"
101030-200 = "……"
101030-201 = "……原來如此。我理解大致上的狀況了。"
101030-203 = "……"
101030-204 = "意外地有可愛的一面呢，季。"
101030-205 = "如果……有危機即將來臨的話，我也想出一份力。#n無論那是什麼樣的危機。"
101030-206 = "……該怎麼辦呢，部長？"
101030-207 = "答案很明顯吧，英美？#n幫手當然是越多越好囉。"
101030-208 = "……非常感謝。"
101030-209 = "那麼，接下來──"
101030-210 = "──首先請求「夏萊」的協助吧。"
101030-211 = "果然，是這樣呢。"
101030-212 = "……"
101030-214 = "下一話;日常的龜裂（２）"

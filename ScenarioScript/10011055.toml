[translation]
10011055-2 = "อื้อ~ ทุกคนทำได้ดีมากเลย~ ถึงจะไม่ได้ผ่านไปอย่างที่ควรจะเป็นก็เถอะ..."
10011055-3 = "ที่ผ่านไปได้เพราะการสั่งการของคุณครูนั่นก็... ฮ้าวววว~ ผ่านไปได้อย่างน่าหวาดเสียวเลยนะนั่น..."
10011055-4 = "ทะ... ทำแบบนั้น... ก็ถือว่าผ่านด้วยเหรอ?"
10011055-5 = "อืม การเบี่ยงเบนความสนใจด่านต่อไป ตรงไปแล้วก็เลี้ยวขวาเลย~"
10011055-6 = "จากการถ่ายทอดสด เห็นว่าพวกเธอคือชมรมวิจัยศาสตร์นินจาใช่มั้ย?"
10011055-7 = "อ่า คะ...คือว่ามัน..."
10011055-8 = "อื้อ นินจานี่สุดยอดจริงๆ นะ"
10011055-10 = "อ่า..."
10011055-11 = "...!"
10011055-12 = "ใช่ค่ะ! นินจาน่ะ! สุดยอดไปเลยค่ะ!"
10011055-14 = "ถ้างั้นฉันไปก่อนนะ~ บ๊ายบาย~ คุณครูแล้วก็ทุกคน~ สู้ๆ น้า~!"
10011055-17 = "ทะ... ท่านหัวหน้า เมื่อกี้นี้..."
10011055-18 = "เพิ่งจะเคยได้ยินจากนักเรียนคนอื่น... ครั้งแรกเลยสินะ..."
10011055-19 = "เป็นเรื่องที่แน่นอนอยู่แล้วค่ะ! นินจาน่ะยอดเยี่ยมที่สุด! ใช่มั้ยล่ะคะนายท่าน?!"
10011055-20 = "[s] \"อืม ใช่แล้ว นินจานี่สุดยอดไปเลย\""
10011055-21 = "..."
10011055-22 = "เอาละ ไปกันต่อเถอะค่ะ ถ้าเอาแต่ยืนอยู่อย่างนี้อาจจะห่างไปเรื่อยๆ ก็ได้นะคะ"
10011055-23 = "อ๊าก! กะ...ก็ได้! ไปกันเลย!"

[translation]
10011055-2 = "嗯～大家辛苦了～#n雖然不是用正式的方法通過……"
10011055-3 = "不過，就算你們成功吧。"
10011055-4 = "也就是說……我們可以過去了嗎？"
10011055-5 = "嗯。下一個關卡在直直走後的右手邊～"
10011055-6 = "話說回來，你們就是轉播中說過的「忍術研究部」？"
10011055-7 = "啊，是，是的……"
10011055-8 = "這樣啊。忍者還真厲害呢。"
10011055-10 = "啊……"
10011055-11 = "……！"
10011055-12 = "是！忍者非常厲害！"
10011055-14 = "加油，我也會在這裡幫你們打氣的。"
10011055-17 = "部長，那個……"
10011055-18 = "……嗯。剛才節慶營運管理部雖然也說過，#n但像這樣被其他學生誇獎……說不定還是第一次。"
10011055-19 = "這是理所當然的！因為忍者真的很棒！#n對吧，主公！"
10011055-20 = "[s]「嗯，是啊。忍者很帥氣哦。」"
10011055-21 = "……"
10011055-22 = "總之既然已經突破就繼續前進吧。#n在我們說這些話的時候，目標也正在離我們越來越遠。"
10011055-23 = "也，也對！好，大家走吧！"

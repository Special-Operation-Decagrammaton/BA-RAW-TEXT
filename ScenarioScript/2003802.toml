[translation]
2003802-1 = "A Day of Listening"
2003802-3 = "Ah, Sensei. "
2003802-4 = "Heehee. It's refreshing to see you in a different environment, dressed in new clothes."
2003802-5 = "[s] \"You're right. Seeing you like this is refreshing.\""
2003802-6 = "Oh my. Thank you for the compliment. "
2003802-7 = "...I'm made to realize this time and again, but you're quite adept at giving compliments as well."
2003802-8 = "[s] \"'As well'?\""
2003802-9 = "Yes. Is there something wrong?"
2003802-10 = "Oh, you were wondering if there was a hidden meaning?"
2003802-11 = "Heehee. Is there?"
2003802-12 = "Creating doubt in people's minds is a method of employing propaganda, after all."
2003802-13 = "[s] \"Please, go easy on me...\""
2003802-14 = "Anyways, this is an excellent plaza."
2003802-15 = "It has a fantastic view with little obstructions. My voice would carry far here."
2003802-16 = "Hm? Am I planning a propaganda speech?"
2003802-17 = "Heehee. What do you think?"
2003802-18 = "[s] \"That wordless smile is the scariest response you could have!\""
2003802-19 = "Come to think of it, at Red Winter, I'm always making propaganda..."
2003802-20 = "But if I tried that in Shanhaijing, it could escalate to a diplomatic issue, couldn't it?"
2003802-21 = "So, instead, I think I'll enjoy my time here, quietly listening to others speak."
2003802-22 = "Or something like that."
2003802-23 = "[s] \"I think that's a great idea and sets an example for other students.\""
2003802-24 = "Yet another skillful compliment. Thank you."
2003802-25 = "Shall we go listen to others speak, then?"
2003802-26 = "Where can we do that? Well, that should be a given."
2003802-29 = "Everyone, let me introduce you to Instructor Sashiro Tomoe, who will be joining us today."
2003802-30 = "Please welcome her with a big round of applause!"
2003802-34 = "[ns1] \"The place where you can listen to others...\"\n[ns2] \"...was Plum Blossom Garden.\""
2003802-37 = "Yes. Wherever you are, children are always the future of Kivotos."
2003802-38 = "Depending on how you look at it, children are the perfect targets to maximize the effects of propaganda."
2003802-39 = "Of course, even I know there are lines you should not cross."
2003802-40 = "[s3] \"I suddenly feel very nervous...?\"\n[s4] \"You're not planning on anything...right?\""
2003802-43 = "You need to learn to trust me, Sensei."
2003802-44 = "Now then, Plum Blossom Garden students? What shall we talk about today?"
2003802-45 = "Instructor Tomoe! Look! My shoes light up!"
2003802-46 = "Oh, it's true. What amazing shoes."
2003802-47 = "Hey, Instructor Tomoe. They say two shoes make one pair of shoes. Isn't that silly?"
2003802-48 = "So, if you hide a shoe, then a shoe can't be shoes!"
2003802-49 = "Yes! But that doesn't mean you should hide your friends' shoes, okay?"
2003802-50 = "Just now, I went to see flowers. And a butterfly came outta nowhere!"
2003802-51 = "But did you know? Butterflies look really different when they're babies!"
2003802-52 = "Then maybe you, too, will grow up to be someone completely different."
2003802-53 = "The school system was created to implant the idea, from a very young age, that you cannot escape society's shackles."
2003802-54 = "Just like how an elephant that grew up tied up to a rope cannot break free from it, even when they are fully grown."
2003802-55 = "Make sure not to tell anyone I told you this, though, okay?"
2003802-56 = "It'll be our secret promise. That makes us secret friends."
2003802-59 = "Tomoe very skillfully took care of the children of Plum Blossom Garden and listened to each of their stories."
2003802-60 = "Even the instructors of Plum Blossom Garden individually thanked Tomoe..."
2003802-63 = "Great work, Sensei."
2003802-64 = "[s5] \"Good work, Instructor Tomoe...\"\n[s6] \"You're exceptionally good with kids.\""
2003802-67 = "Is that so? I've grown accustomed to it over the years, somehow."
2003802-68 = "Huh? Normally, for someone who enjoys speaking..."
2003802-69 = "...you were impressed at my listening skills?"
2003802-70 = "Heehee. Thank you, Sensei. Getting three compliments from you in one day... Perhaps I should celebrate."
2003802-71 = "But I don't just \"enjoy speaking.\" I like the art of persuasion."
2003802-72 = "And you can't sway someone's opinions without first listening to their own words."
2003802-73 = "You need to first understand their perspective. Then, you will be able to manipulate it and convince them to your side."
2003802-74 = "And..."
2003802-75 = "[s] \"And?\""
2003802-76 = "Separate from persuasion, I just like the innocent words of children."
2003802-78 = "Tomoe's expression as she said that looked happier than ever."

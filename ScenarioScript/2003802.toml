[translation]
2003802-1 = "ทักษะการฟัง"
2003802-3 = "อ๊ะ คุณครู "
2003802-4 = "ฮุฮุฮุ ได้เจอกันด้วยภาพลักษณ์แบบนี้ก็เป็นความรู้สึกแปลกใหม่ไปอีกแบบเหมือนกันนะคะ"
2003802-5 = "[s] \"นั่นสินะ ได้เห็นโทโมเอะใส่ชุดแบบนี้ก็แปลกตาดีเหมือนกัน\""
2003802-6 = "ตายจริง ขอบคุณสำหรับคำชมนะคะ "
2003802-7 = "จู่ๆ ฉันก็รู้สึกว่าคุณครูชำนาญเรื่องพูดชื่นชมเหมือนกันนะคะ"
2003802-8 = "[s] \"ชำนาญด้วย 'เหมือนกัน' งั้นเหรอ...?\""
2003802-9 = "ค่ะ มีอะไรเหรอคะ?"
2003802-10 = "อ๊ะ กังวลว่าจะมีความหมายแฝงอื่นอยู่งั้นเหรอคะ?"
2003802-11 = "ฮุฮุฮุ คิดว่ามันคืออะไรเหรอคะ?"
2003802-12 = "แน่นอนว่าการสร้างช่องโหว่ในจิตใจของคนเป็นเทคนิคอย่างหนึ่งของการการพูดเชิญชวนปลุกใจค่ะ..."
2003802-13 = "[s] \"ปล่อยครูไปเถอะนะ...\""
2003802-14 = "ยังไงก็เถอะค่ะ จัตุรัสที่นี่ดีมากเลยนะคะ"
2003802-15 = "จัตุรัสเปิดโล่งทั้งสี่ด้าน ทิวทัศน์ปลอดโปร่ง เสียงเลยน่าจะกระจายไปได้ไกลด้วยค่ะ"
2003802-16 = "คะ? ฉันอยากกล่าวคำปราศรัยปลุกใจรึเปล่าน่ะเหรอคะ?"
2003802-17 = "ฮุฮุฮุฮุ... คิดว่ายังไงล่ะคะ?"
2003802-18 = "[s] \"ยิ้มหวานไม่พูดอะไรแบบนี้ น่ากลัวมาก!\""
2003802-19 = "อย่างนั้นเหรอคะ ตอนอยู่ที่เรดวินเทอร์ ฉันมักกล่าวปราศรัยเพื่อโน้มน้าวนักเรียนคนอื่นๆ ก็จริง..."
2003802-20 = "แต่ถ้าฉันกล่าวปราศัยในเขตซานไห่จิงละก็ มันอาจทำให้เกิดปัญหาสัมพันธไมตรีระหว่างโรงเรียนก็ได้#nใช่มั้ยล่ะคะ?"
2003802-21 = "เพราะงั้นคราวนี้ ฉันคิดว่าจะลองใช้เวลาที่เหลือฟังคนอื่นพูดดูบ้างค่ะ..."
2003802-22 = "ฉันตั้งใจไว้แบบนั้นค่ะ"
2003802-23 = "[s] \"แบบนั้นดูเป็นตัวอย่างที่ดีให้กับคนอื่นๆ มากเลยนะ\""
2003802-24 = "ขอบคุณสำหรับคำชมอีกครั้งค่ะ"
2003802-25 = "งั้นเราลองไปที่อื่นที่จะฟังคนคุยกันได้ดีมั้ยคะ?"
2003802-26 = "ไปที่ไหนน่ะเหรอคะ? ที่นั่นก็คือ...!"
2003802-29 = "ทุกคนคะ ขอแนะนำให้รู้จักค่ะ นี่คือผู้ฝึกสอนที่จะมารับหน้าที่สอนในวันนี้ คุณซาชิโระ โทโมเอะค่ะ"
2003802-30 = "ขอเสียงปรบมือหน่อยค่า~!"
2003802-34 = "[ns1] \"ที่ที่จะได้ฟังคำพูดของคนอื่นก็คือที่นี่เหรอ...\"\n[ns2] \"ที่ที่บอกคือที่นี่เหรอ...\""
2003802-37 = "ใช่แล้วค่ะ ไม่ว่าจะอยู่ที่เขตไหนหรือเมื่อไร พวกเด็กๆ ก็คืออนาคตของคิโวทอสค่ะ"
2003802-38 = "ในความคิดของฉัน พวกเด็กๆ เป็นเป้าหมายที่จะเพิ่มประสิทธิภาพของการปราศรัยโน้มน้าวจิตใจได้ดี"
2003802-39 = "แต่ถึงจะเป็นอย่างนั้น ฉันก็รู้ขอบเขตว่าอะไรควรไม่ควรค่ะ"
2003802-40 = "[s3] \"จู่ๆ ก็รู้สึกกังวลอย่างบอกไม่ถูกเลย...\"\n[s4] \"คงไม่มีอะไรหรอก... ใช่มั้ย?\""
2003802-43 = "ไม่มีอะไรหรอกค่ะ โปรดเชื่อใจฉันนะคะ คุณครู"
2003802-44 = "ถ้างั้นเด็กๆ สวนต้นบ๊วยทุกคนคะ~? วันนี้จะเล่าเรื่องอะไรกันดีคะ?"
2003802-45 = "ผู้ฝึกสอนโทโมเอะ! ดูนี่สิคะ รองเท้าฉันเปิดไฟได้ด้วยค่ะ!"
2003802-46 = "อุ๊ย จริงเหรอคะ เป็นรองเท้าที่เท่มากๆ เลยค่ะ"
2003802-47 = "ผู้ฝึกสอนโทโมเอะรู้รึเปล่าคะ เขาบอกว่ารองเท้าสองข้างรวมเป็นหนึ่งคู่แหละค่ะ ตลกดีใช่มั้ยล่ะคะ?"
2003802-48 = "เพราะงั้นถ้าเอารองเท้าข้างหนึ่งไปซ่อนละก็ รองเท้าที่เหลืออีกหนึ่งข้างก็จะไม่ใช่รองเท้าค่ะ!"
2003802-49 = "เพราะงั้นแล้วจะเอารองเท้าของเพื่อนไปซ่อนไม่ได้นะคะ"
2003802-50 = "เมื่อเร็วๆ นี้ หนูไปดูดอกไม้มา แล้วจู่ๆ ก็มีผีเสื้อบินมาด้วยค่ะ!"
2003802-51 = "แต่รู้รึเปล่าคะว่าพอพวกผีเสื้อโตเต็มที่จะมีรูปร่างที่แตกต่างจากตอนเป็นเด็กค่ะ!"
2003802-52 = "พอเด็กๆ ทุกคนโตขึ้นก็อาจจะต่างไปจากตอนนี้ก็ได้นะคะ"
2003802-53 = "สุดท้ายแล้วโรงเรียนอนุบาลก็เป็นระบบที่สร้างขึ้นมาเพื่อปลูกฝังอุดมการณ์ฝังหัวตั้งแต่เด็กๆ ว่า 'พวกเธอไม่มีทางหลุดไปจากการควบคุมของสังคมได้' สินะคะ"
2003802-54 = "เหมือนกับช้างที่เติบโตมาพร้อมกับโซ่คล้องคอ ถึงจะโตแล้ว แต่มันก็จะไม่ยอมกระชากโซ่ออกแล้วหนี#nไปไหนค่ะ"
2003802-55 = "อย่าไปบอกใครว่าฉันพูดแบบนี้นะคะ"
2003802-56 = "หมายความว่าเราสัญญากันแล้วนะคะว่าจะเก็บเป็นความลับ เพราะงั้นตั้งแต่นี้ไปพวกเราเป็นเพื่อนลับๆ กันแล้วนะคะ"
2003802-59 = "(โทโมเอะดูแลพวกเด็กๆ ของสวนต้นบ๊วยและรับฟังเรื่องเล่าของพวกเขาด้วยความชำนาญ)"
2003802-60 = "(แม้แต่ผู้ฝึกสอนของสวนต้นบ๊วยก็ยังขอบคุณโทโมเอะเป็นการส่วนตัว...)"
2003802-63 = "ขอบคุณมากค่ะ คุณครู"
2003802-64 = "[s5] \"ขอบคุณที่ตั้งใจทำงานนะ ผู้ฝึกสอนโทโมเอะ...\"\n[s6] \"เธอดูแลเด็กๆ ได้ดีเกินคาดเลยนะ\""
2003802-67 = "งั้นเหรอคะ? อาจเป็นเพราะเป็นงานที่ฉันทำเป็นประจำก็เลยคุ้นเคยน่ะค่ะ"
2003802-68 = "คะ? ปกติแล้วคนที่ชอบพูดมักจะไม่ค่อยคุ้นชินกับการเป็นผู้ฟัง..."
2003802-69 = "แต่ฉันดูเป็นผู้ฟังที่ดีเลยงั้นเหรอคะ?"
2003802-70 = "ฮุฮุฮุ ขอบคุณค่ะคุณครู วันนี้ฉันได้รับคำชมจากคุณครูสามครั้งแล้วนะคะ เป็นเรื่องที่น่าจดจำมากเลยค่ะ"
2003802-71 = "แต่ฉันไม่ได้แค่เพียงถ่ายทอดคำพูดออกมาเท่านั้น ฉันพูดเพื่อโน้มน้าวใจต่างหากล่ะคะ"
2003802-72 = "และหากต้องการโน้มน้าวใจอีกฝ่าย... สิ่งแรกที่จะต้องทำก็คือรับฟังสิ่งที่อีกฝ่ายพูดอย่างตั้งใจค่ะ"
2003802-73 = "เราจะต้องเข้าใจความรู้สึกของอีกฝ่ายให้ได้อย่างถ่องแท้ เพื่อที่จะโน้มน้าวใจให้เขาคล้อยตามได้ค่ะ"
2003802-74 = "และก็..."
2003802-75 = "[s] \"และก็...?\""
2003802-76 = "ฉันชอบคำพูดที่ดูใสซื่อบริสุทธิ์ไร้เดียงสาของพวกเด็กๆ ค่ะ"
2003802-78 = "(สีหน้าของโทโมเอะตอนพูดดูมีความสุขมากกว่าตอนไหนๆ)"

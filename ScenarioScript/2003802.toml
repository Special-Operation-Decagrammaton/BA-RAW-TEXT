[translation]
2003802-1 = "#title;들어주는 하루"
2003802-2 = "3;토모에 치파오;01\n#3;a\n#wait;1000"
2003802-3 = "3;토모에 치파오;02;아. 선생님. \n#3;em;[반응]"
2003802-4 = "3;토모에 치파오;03;우후후. 이런 곳에서 이런 모습으로 뵙는 건, 또 그 나름대로 신선한 일이군요."
2003802-5 = "[s] \"그러게. 토모에의 이런 모습도 신선하네.\""
2003802-6 = "3;토모에 치파오;07;어머나. 칭찬 감사합니다. \n#3;em;[음표]"
2003802-7 = "3;토모에 치파오;03;새삼 느끼는 것입니다만, 선생님께서는 칭찬도 능숙하시군요."
2003802-8 = "[s] \"칭찬 '도'……?\""
2003802-9 = "3;토모에 치파오;01;네. 왜 그러시나요?\n#3;em;[?]"
2003802-10 = "3;토모에 치파오;03;아, 혹시 다른 의미가 있는 것은 아닌지 신경이 쓰이셨다고요?"
2003802-11 = "3;토모에 치파오;07;우후후. 그것은 과연 어떨까요?\n#3;jump"
2003802-12 = "3;토모에 치파오;00;분명히, 사람의 마음에 틈을 만들어 두는 것은 선전선동술의 기법 중 하나이기도 하고요……?"
2003802-13 = "[s] \"봐주세요…….\""
2003802-14 = "3;토모에 치파오;03;그건 그렇고, 좋은 광장이네요."
2003802-15 = "3;토모에 치파오;01;사방이 트여 있고, 풍경도 좋아 목소리가 멀리까지 퍼질 것 같아요.\n#3;m2"
2003802-16 = "3;토모에 치파오;02;네? 혹시 선전 연설이라도 하고 싶은 거냐고요?\n#3;m3"
2003802-17 = "3;토모에 치파오;99;후후후후……. 어떨까요?\n#3;em;[음표]"
2003802-18 = "[s] \"별말 없이 웃고만 있는 게 오히려 무서워!\""
2003802-19 = "3;토모에 치파오;00;그렇네요. 분명 붉은겨울에서는 언제나, 선전을 위해 다른 학생들에게 연설을 하고는 했지만……."
2003802-20 = "3;토모에 치파오;03;산해경에서까지 선전을 하면, 학원 간의 외교 문제로 비화할 수도 있을 테니 말이죠?"
2003802-21 = "3;토모에 치파오;00;그래서 이번에는 조용히, 다른 사람의 말을 들어주며 남은 시간을 보내 보는 것은 어떨까……."
2003802-22 = "3;토모에 치파오;99;그런 생각도, 해 보았답니다."
2003802-23 = "[s] \"매우 모범적이고 타의 귀감이 되는 생각이라고 보입니다.\""
2003802-24 = "3;토모에 치파오;07;다시 한번 능숙한 칭찬, 감사합니다.\n#3;greeting"
2003802-25 = "3;토모에 치파오;03;그러면 다른 사람들의 말을 들어줄 수 있는 곳으로 가 보시겠어요?"
2003802-26 = "3;토모에 치파오;00;거기가 어디냐고요? 그것은……!\n#3;em;…"
2003802-27 = "#all;hide"
2003802-28 = "3;토모에 치파오;01\n#3;a\n#wait;1000"
2003802-29 = "3;토모에 치파오;01\n#na;매화원 교관;여러분, 소개할게요. 오늘 하루 일일 교관을 담당해 주실, 사시로 토모에 교관님이십니다."
2003802-30 = "3;토모에 치파오;01\n#na;매화원 교관;모두 박수로 환영해 주세요~!"
2003802-31 = "#st;[0,0];instant;1;"
2003802-32 = "#clearST"
2003802-33 = "3;토모에 치파오;01\n#3;h\n#wait;2000"
2003802-34 = "[ns1] \"다른 사람들의 말을 들어줄 수 있는 장소라는 게…….\"\n[ns2] \"매화원이었던 건가…….\""
2003802-35 = "#wait;100"
2003802-36 = "#wait;100"
2003802-37 = "3;토모에 치파오;02;그렇지요. 언제든 어디서든, 아이들은 키보토스의 미래이기도 하고요."
2003802-38 = "3;토모에 치파오;03;생각하기에 따라서는 아이들이야말로 선전선동의 효과를 극대화할 수 있는 대상이기도 합니다만."
2003802-39 = "3;토모에 치파오;00;아무리 저라고 해도 넘어서는 안 되는 선이 있다는 것은 구분하고 있으니까요."
2003802-40 = "[s3] \"왠지 엄청나게 불안해지기 시작했습니다만……?\"\n[s4] \"별일 안 하는 거…… 맞지?\""
2003802-41 = "#wait;100"
2003802-42 = "#wait;100"
2003802-43 = "3;토모에 치파오;08;그럼요. 가끔은 절 믿어 주세요. 선생님.\n#3;em;[땀]"
2003802-44 = "3;토모에 치파오;03;그러면 매화원 여러분~? 오늘은 무슨 이야기를 할까요?"
2003802-45 = "3;토모에 치파오;03\n#na;매화원 원생 A;토모에 교관님! 보세요. 제 신발 불 켜져요!"
2003802-46 = "3;토모에 치파오;02;어머나. 정말이네요. 멋진 신발이에요."
2003802-47 = "3;토모에 치파오;02\n#na;매화원 원생 B;있잖아요, 토모에 교관님. 신발은 두 개가 한 짝이래요. 우습죠?"
2003802-48 = "3;토모에 치파오;02\n#na;매화원 원생 B;그래서 한 쪽 신발을 숨기면, 신발은 신발이 아니게 되는 거예요!"
2003802-49 = "3;토모에 치파오;08;그렇다고 해서 친구의 신발을 숨기면 안 돼요?"
2003802-50 = "3;토모에 치파오;08\n#na;매화원 원생 C;조금 전에 있잖아요. 꽃을 보러 갔어요. 그런데 나비가 날아왔어요!"
2003802-51 = "3;토모에 치파오;08\n#na;매화원 원생 C;그런데 그거 아세요? 나비는 아기 때랑 다 자랐을 때가 완전 달라요!"
2003802-52 = "3;토모에 치파오;03;우리 친구도 다 자라면 완전히 다른 사람이 될지도 모르겠네요?\n#3;em;[?]"
2003802-53 = "3;토모에 치파오;03\n#na;매화원 원생 D;유치원이란 건 결국 어렸을 때부터 '넌 사회의 굴레에서 벗어날 수 없다'라는 이념을 머릿속에 주입하기 위해 만들어진 시스템이죠."
2003802-54 = "3;토모에 치파오;03\n#na;매화원 원생 D;줄에 묶여 자란 코끼리가 다 커서도 줄을 끊고 도망칠 수 없는 것처럼 말이에요."
2003802-55 = "3;토모에 치파오;03\n#na;매화원 원생 D;어디 가서 제가 이런 말 했다고는 말하지 마세요."
2003802-56 = "3;토모에 치파오;07;그건 저와 비밀 약속을 하나 하자는 건가요? 그렇다면 우리는 이제부터 비밀 친구로군요?\n#3;em;[음표]"
2003802-57 = "#all;hide"
2003802-58 = "#wait;2500"
2003802-59 = "#na;(토모에는 매우 능숙하게 매화원의 원생들을 돌보며, 하나하나 이야기를 들어주었다.)"
2003802-60 = "#na;(매화원의 교관들마저 토모에에게 개인적으로 감사의 인사를 남길 정도였다…….)"
2003802-61 = "#all;hide"
2003802-62 = "3;토모에 치파오;01\n#3;a\n#wait;1000"
2003802-63 = "3;토모에 치파오;03;수고하셨어요. 선생님.\n#3;em;[반응]"
2003802-64 = "[s5] \"수고하셨습니다, 토모에 교관님…….\"\n[s6] \"생각보다 더 아이들을 잘 돌보는구나.\""
2003802-65 = "#wait;100"
2003802-66 = "#wait;100"
2003802-67 = "3;토모에 치파오;07;그런가요? 어느 사이엔가 익숙해져 있는 일이라서 그런 것인지도 모르겠네요."
2003802-68 = "3;토모에 치파오;02;네? 보통 말하기 좋아하는 사람은 듣는 데에는 익숙하지 못한 법인데…….\n#3;em;[?]"
2003802-69 = "3;토모에 치파오;00;저는 듣는 것도 잘하는 것 같아 한층 다시 보게 되었다고요?"
2003802-70 = "3;토모에 치파오;99;우후후. 감사합니다. 선생님. 하루에 선생님께 세 번이나 칭찬을 듣게 되다니, 이건 그 나름대로 기념할 만한 일이네요."
2003802-71 = "3;토모에 치파오;03;하지만 저는 단순히 말을 전하는 것이 아니라, 상대를 설득하기 위해 이야기를 하는 것이랍니다?"
2003802-72 = "3;토모에 치파오;01;그리고 상대를 설득하기 위해서는…… 우선 상대방의 말을 잘 듣는 것에서부터 시작해야 하죠."
2003802-73 = "3;토모에 치파오;01;상대의 속내를 정확히 파악해야, 그에 맞는 설득도 할 수 있는 법이니까요."
2003802-74 = "3;토모에 치파오;03;그리고…….\n#3;em;…"
2003802-75 = "[s] \"그리고?\""
2003802-76 = "3;토모에 치파오;07;어린아이들의 때 묻지 않은 말은, 설득과 별개로 그냥 좋아하기도 하고요.\n#3;em;[반짝]\n#3;closeup"
2003802-77 = "#all;hide"
2003802-78 = "#na;(그렇게 말하는 토모에의 표정은, 그 어느 때보다도 행복해 보였다.)"

[translation]
2003802-1 = "傾聽的一天"
2003802-3 = "啊，老師。"
2003802-4 = "呵呵呵。#n沒想到會在這裡以這副模樣見到您，感覺別有一番新鮮感呢。"
2003802-5 = "[s]「就是說呀。看到智惠的這副打扮，我也覺得很新鮮。」"
2003802-6 = "哎呀，感謝您的稱讚。"
2003802-7 = "讓我再次體會到老師也很會誇讚別人呢。"
2003802-8 = "[s]「『也』很會誇讚別人……？」"
2003802-9 = "是的，有什麼問題嗎？"
2003802-10 = "啊，您很在意我是不是另有所指嗎？"
2003802-11 = "呵呵呵。究竟有沒有呢？"
2003802-12 = "在他人心裡留下疑問，這也是宣傳的手段之一唷……？"
2003802-13 = "[s]「放過我吧……」"
2003802-14 = "話說回來，這裡還真壯觀呢。"
2003802-15 = "不僅四周開闊風景又好，彷彿連聲音都可以傳到遠方。"
2003802-16 = "嗯？我是不是想發表演說？"
2003802-17 = "呵呵呵呵……您覺得呢？"
2003802-18 = "[s]「笑而不語反而更可怕！」"
2003802-19 = "雖然我在赤冬時，經常為了宣傳而對其他學生演講……"
2003802-20 = "但如果到了山海經還這麼做的話，有可能會演變成學園間的外交問題吧？"
2003802-21 = "所以這次就試著聽別人說話，靜靜地度過剩下的時間……"
2003802-22 = "我是這麼想的。"
2003802-23 = "[s]「聽起來是非常模範，而且值得大家學習的想法。」"
2003802-24 = "再次感謝您的不吝讚美。"
2003802-25 = "那麼，要不要去可以聽別人說話的地方看看呢？"
2003802-26 = "您問該去哪裡？#n那就是……！"
2003802-29 = "現在為大家介紹──這位是擔任一日教官的佐城智惠教官。"
2003802-30 = "請大家熱烈鼓掌歡迎～！"
2003802-34 = "[ns1]「可以聽別人說話的地方……」\n[ns2]「指的就是梅花園嗎……」"
2003802-37 = "沒錯，無論何時何地，孩子們都是奇普托斯的未來。"
2003802-38 = "雖然從某些角度來看，孩子們可說是宣傳效果最好的對象……"
2003802-39 = "不過我也明白哪些界線是不應該踰越的。"
2003802-40 = "[s3]「我突然感到非常不安……？」\n[s4]「你應該不會做什麼奇怪的事……對吧？」"
2003802-43 = "那當然。偶爾也請您多信任我一點吧，老師。"
2003802-44 = "那麼，梅花園的大家～？今天想聊什麼呢？"
2003802-45 = "智惠教官！你看，我的鞋子會發亮！"
2003802-46 = "哎呀，真的耶。好酷的鞋子。"
2003802-47 = "我跟你說哦，智惠教官。#n兩隻鞋子才是一對！很好笑吧？"
2003802-48 = "所以把一隻鞋子藏起來的話，鞋子就不再是鞋子了！"
2003802-49 = "你說的沒錯，可是不可以因為這樣就把朋友的鞋子藏起來唷？"
2003802-50 = "我剛才去賞花的時候，有隻蝴蝶飛了過來！"
2003802-51 = "教官你知道嗎？#n蝴蝶小時候和長大之後長得完全不一樣！"
2003802-52 = "各位長大之後，也有可能變成完全不一樣的人哦？"
2003802-53 = "所謂的幼兒園，#n說白一點就是為了從小灌輸「無法擺脫社會束縛」的理念而建立的體系。"
2003802-54 = "就像從小被繩子綁住的大象，即便長大之後也沒辦法弄斷繩子逃跑一樣。"
2003802-55 = "請不要跟別人說我說過這種話喔。"
2003802-56 = "是要和我做個祕密約定的意思嗎？#n那我們從現在起就是分享祕密的朋友囉？"
2003802-59 = "（智惠非常熟練地照顧著梅花園的學生，一個一個聽孩子們說話）"
2003802-60 = "（梅花園的教官甚至私下向智惠道謝……）"
2003802-63 = "您辛苦了，老師。"
2003802-64 = "[s5]「辛苦了，智惠教官……」\n[s6]「你比我想像中還會照顧小孩子呢。」"
2003802-67 = "是嗎？可能是因為我在不知不覺間習慣了吧。"
2003802-68 = "嗯？您說通常愛說話的人都不太擅長傾聽……"
2003802-69 = "但我卻也善於傾聽，所以對我另眼相看了？"
2003802-70 = "呵呵呵。謝謝您，老師。#n居然可以在一天之內聽到三次老師的讚美，今天真是個值得紀念的日子。"
2003802-71 = "但我並不是單純因為喜歡而開口，而是為了說服對方！"
2003802-72 = "為了達成這個目的……首先就該從傾聽開始下手。"
2003802-73 = "畢竟得先弄清楚對方心裡的想法，才有辦法根據情況說服對方啊。"
2003802-74 = "除此之外……"
2003802-75 = "[s]「除此之外？」"
2003802-76 = "即便撇開說服不談，我也很喜歡聽孩子們訴說那些天真無瑕的話哦。"
2003802-78 = "（這麼說著的智惠，臉上的表情比任何時候都還幸福）"

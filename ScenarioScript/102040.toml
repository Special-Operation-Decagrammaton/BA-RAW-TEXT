[translation]
102040-1 = "Episode 4; Planning an Operation 2"
102040-4 = "This..."
102040-5 = "Th-The sky is turning red... What's going on...?"
102040-6 = "Schale's Sensei sent a text... I think they need help."
102040-7 = "B-But do you think we can be of help? We're on the run... What if we're only an inconvenience for Sensei...?"
102040-8 = "Don't worry. We'll find a way to help Sensei."
102040-9 = "But...what can we do to help...?"
102040-14 = "...Who's there?"
102040-15 = "C-Could it be...?"
102040-16 = "..."
102040-23 = "..."
102040-25 = "?!"
102040-26 = "..."
102040-27 = "..."
102040-30 = "I finally found you. I've been looking everywhere."
102040-39 = "Huh?! Where did that pistol come from, Misaki?!"
102040-40 = "Who are you?"
102040-41 = "Yes. You are very suspicious."
102040-42 = "W-Wait! I-I..."
102040-43 = "Oh, the helmet... It's for my part-time job..."
102040-47 = "Oh! Good morning, Saori. Are you taking a break from your self-discovery?"
102040-52 = "Y-Yeah...more or less..."
102040-54 = "Self-discovery's a generous way to put it. She's just a runaway."
102040-55 = "Leader..."
102040-56 = "...Sorry, I'd like to chat too, but we don't have time. Sensei needs our help."
102040-57 = "Yes. We received the message as well."
102040-58 = "Yes, yes! Right!"
102040-62 = "I'm glad to see you look healthy, Leader."
102040-64 = "...Yeah."
102040-65 = "Let's get going, then."
102040-69 = "I'm Urawa Hanako, in charge of the fourth sanctum operation!"
102040-70 = "Is everyone ready?"
102040-72 = "...Yes. The Sisterhood unit is on standby at the catacombs entrance at the sanctum."
102040-73 = "By the way, I haven't seen Sakurako for a while. Where'd she go...?"
102040-75 = "Knights, standby at the operation area."
102040-76 = "P-Pleasure to work with you!"
102040-78 = "Fifth sanctum team, please report."
102040-80 = "...There's a problem here, Noa."
102040-81 = "A problem? What kind of problem?"
102040-82 = "Hod hid underground at the Fortress City. We're searching for the location..."
102040-83 = "The problem is, the Fortress City in Eridu is protected by a password system created by President Rio herself. Relying on eavesdropping, vibrations, or noise detection is impossible."
102040-85 = "...President Rio? But we haven't had any contact with her since she went missing..."
102040-87 = "Correct. We're doing calculations as we speak to try to crack her password system."
102040-88 = "The calculation itself is simple, but it's time-consuming and requires more equipment and manpower than we currently have."
102040-89 = "*sigh* ...At this rate, we might not make the start time of the operation..."
102040-90 = "What? That's a big deal, isn't it? But we're doing sanctum analysis over here. Even if we wanted to help..."
102040-91 = "It's okay, Maki, please focus on the first sanctum as planned. How's the Engineering Department doing?"
102040-93 = "We're trying to find a way to destroy Hod's Erosion Towers built in each area...but we're struggling."
102040-94 = "*sigh* ...I just can't find a solution... Access is impossible..."
102040-95 = "We're also conducting a materials analysis of the sanctum. We're exhausted... I'm sorry but we can't take on more."
102040-96 = "I need more sleep... Actually, I just need more caffeine...and Frenzy MAX..."
102040-97 = "I wish I'd built up my stamina beforehand..."
102040-98 = "There's no point in wishful thinking right now."
102040-100 = "They're not able to help either... What to do..."
102040-101 = "Of course, Big Sister is always a hindrance in the end."
102040-103 = "Himari!"
102040-104 = "Didn't someone counterfeit Millennium bonds once?"
102040-105 = "The security system for bond issuance was also established by Rio. So, who made that happen?"
102040-106 = "Huh? That wasn't you, Himari? Veritas is all white hat hackers, so we don't do anything against our ethics."
102040-107 = "Me? Oh, no. My genius was being pulled in so many different directions, I didn't have time for such silly antics. "
102040-108 = "...Then who was it?"
102040-113 = "...Yuuka, are you listening?"
102040-114 = "*sigh* Yes, yes. I'm listening. I guess I have no choice."
102040-115 = "Noa, please meet me at the Self-Reflection Room."
102040-116 = "I'm on my way."
102040-122 = "President... I think this is the best plan for Hod's Erosion Tower."
102040-123 = "...Separate it with a large hole around the Erosion Tower and burn it?"
102040-124 = "That's really our only solution?"
102040-125 = "I know... I was hoping to come up with something simpler...but without more time, this is all we can do..."
102040-126 = "An engineering project on that scale... It's essentially urban development..."
102040-127 = "What would be the best way to implement that? A drone?"
102040-128 = "What if we put a flamethrower on Thundergun? And a shovel and hammer..."
102040-129 = "Hm... It won't be enough for something so large-scale."
102040-135 = "Where a hot spring can be found, so can we!"
102040-139 = "H-Huh? Who are you?!"
102040-140 = "The Hot Springs Department!"
102040-142 = "The Hot Springs..."
102040-143 = "Department...?!"
102040-144 = "H-Hot Springs? But we don't have..."
102040-146 = "Hahaha! You'll find us wherever there are hot springs! In this case, even where there are no hot springs!"
102040-148 = "Don't sweat the small stuff! We'll take care of it before you know it!"
102040-150 = "Huh...?"
102040-154 = "Dig deep, demolish buildings, and burn everything! This is the development principle of the Hot Springs Department!"
102040-155 = "All that matters is that we reach the hot springs in the end! It's not complicated!"
102040-156 = "I've always wondered what kind of hot springs might be hidden beneath Millennium. So this is a great opportunity!"
102040-158 = "Hahahahaha!"
102040-163 = "Th-They seem like extraordinary people..."
102040-165 = "In Front of the Millennium Self-Reflection Room"
102040-166 = "*sigh* "
102040-177 = "Ehh? H-Hello? Guys?"
102040-178 = "Codename White Rabbit. No, Kurosaki Koyuki. Come out, you're being released."
102040-179 = "Koyuki! How've you been?"
102040-180 = "Huh?! I'm being released? Now? Why?"
102040-181 = "There's no time. Hurry and get out, Koyuki."
102040-182 = "N-No! Why am I being released all of a sudden? Two upperclassmen releasing me... I know what this means!"
102040-183 = "You're gonna put me in the Corrections Bureau! Right? Am I right?"
102040-184 = "..."
102040-185 = "..."
102040-186 = "*sigh* We'll have to drag her out. Help, Noa."
102040-187 = "Heehee. Only because we have no choice."
102040-193 = "What?! Huh? D-Don't come any closer! You're scaring me! Stay out!"
102040-196 = "Wh-What is this about? I've been keeping low! I didn't cause any trouble or try to escape. So why?! This is too harsh! I'm opposed to violence! This is unfair!"
102040-197 = "Excuse me?! You're here because of your own actions! How can you possibly call anything unfair?"
102040-198 = "Okay, Yuuka. I think Koyuki regrets her wrongdoings... Let's try to have a conversation."
102040-199 = "Regret?! She doesn't look like she regrets anything!"
102040-200 = "Right! What do you mean by regret? That makes it sound like I did something wrong!"
102040-201 = "I had no control over it...like... Like an accident!"
102040-202 = "What? Forging bonds was an accident?!"
102040-203 = "B-But you ordered the scary C&C upperclassmen to forcefully drag me here! I still think I'm the victim in this situation..."
102040-205 = "..."
102040-206 = "...Okay. Koyuki, do you regret your wrongdoings?"
102040-207 = "...Um, what? N-No, I mean...wasn't it the fault of the weak password system...? S-So..."
102040-208 = "Ko-yu-ki?"
102040-209 = "Oh... Um... Uh..."
102040-210 = "Umm... Hey, can you please not look at me like that? You're so scary..."
102040-211 = "Okay, okay! Fine! It was all my fault."
102040-212 = "How about an apology?"
102040-213 = "Yes, sure. I'm very sorry, and I regret it immensely..."
102040-214 = "Heehee. What a good girl."
102040-215 = "Look, Yuuka. Koyuki admitted her mistake, right? We're okay now?"
102040-216 = "Why do you only listen to Noa?!"
102040-217 = "Well... Noa's really scary sometimes... She's even worse than my worst nightmares..."
102040-218 = "When she brings up something that happened years ago, with the exact date and time, and says, \"Koyuki, that's not what you said back then...\" with that scary glint in her eyes."
102040-219 = "So if you're not taking me to the Corrections Bureau, what's up? I wouldn't expect you two of all people to let me out."
102040-220 = "We need your help, Koyuki."
102040-221 = "She's telling the truth. Return to Seminar. We need your ridiculous arithmetic abilities."
102040-222 = "Huh?! Now? To Seminar? I thought I was kicked out..."
102040-223 = "It's revoked. For now. We have no time to waste, so we'll explain on the way."
102040-224 = "We brought your school uniform, so please get dressed."
102040-225 = "B-But...I like this outfit..."
102040-227 = "Ko-yu-ki?"
102040-228 = "*whimper* ...Yes, ma'am..."
102040-232 = "The last one left is...the sixth sanctum at the D.U. central district."
102040-233 = "Hey there! How's it going?"
102040-235 = "D.U. Central District"
102040-236 = "All citizens have been evacuated. We've built a number of shelters thirty kilometers away from Sanctum Tower."
102040-237 = "But we don't have enough manpower, even though Valkyrie and the volunteers are now stationed at the shelter and helping people. And food is scarce."
102040-239 = "Here, try this. Fuuka made this porridge. It'll warm you right up!"
102040-240 = "Thank you..."
102040-244 = "Juri, the next batch of soup is ready. Can you hand it out, please?"
102040-245 = "Yep, I'm on it!"
102040-246 = "Phew... Okay, next..."
102040-247 = "Is there anything I can do to help you cook? "
102040-248 = "It's okay. I'm used to making large meals with little help. You can keep distributing food like you've been doing, Juri."
102040-249 = "Okay! The School Lunch Club is perfectly equipped to help this shelter!"
102040-250 = "I'm glad there was a way we could help out in this crisis."
102040-251 = "But...at this rate, we might run out of ingredients..."
102040-256 = "Oh! "
102040-257 = "What?! What's going on?!"
102040-264 = "Heeheehee. Fuuka, we're here!"
102040-265 = "We've finally arrived! ★"
102040-266 = "The Gourmet Research Society? Why?! And why are you all soaked?!"
102040-267 = "We heard you're doing something good for the people, so we're here to help!"
102040-268 = "Look! We brought lots of ingredients!"
102040-273 = "Wow... So much fresh fish..."
102040-274 = "We'll have more than enough ingredients now!"
102040-275 = "Y-Yeah... We can make soup, tempura, and grilled fish... The nutritional balance will be decent too!"
102040-276 = "I'm not gonna ask why you guys are riding around in the School Lunch Club truck right now..."
102040-277 = "Regardless, I'm sure it was a lot of work to collect this many fish..."
102040-279 = "Seriously, it was! We went to every aquarium and scooped up all the edible fish...!"
102040-283 = "*gasp*"
102040-284 = "W-Well, let's not worry about the trivial stuff!"
102040-286 = "Heeheehee. You're right! This is just between us and the School Lunch Club. We're here for each other during these difficult times!"
102040-287 = "I wouldn't exactly call that trivial..."
102040-288 = "Well, we needed the ingredients. We owe you one, Gourmet Research Society."
102040-290 = "Heeheehee. You're welcome."
102040-291 = "You know, we can be helpful at times as well."
102040-292 = "Oh, what a beautiful friendship! ★"
102040-293 = "By the way, when can we eat the fish?"
102040-295 = "Right now, D.U.'s Shiratori district is a no-man's-land, so you can operate as you please."
102040-296 = "Thank you... The guardian of the sixth sanctum hasn't been found yet...but we've identified it as the most powerful energy among the six sanctums..."
102040-297 = "When we do confirm the guardian's location, we'll lure it to the empty district and carry out the operation there."
102040-299 = "We're the scouts who will patrol the roads along D.U.'s perimeter looking for the guardian, Hifumi."
102040-300 = "Ugh... Why us...? Why me?!"
102040-301 = "Because your skills at driving tanks are unmatched, Hifumi. And I will be there to protect you."
102040-302 = "I defeated thirty Justice Task Force members last time. Even twice that amount should be no problem."
102040-303 = "Y-You didn't exactly defeat them, they just... Ugh, nevermind!"
102040-304 = "I just wanted to relax and watch that special movie starring Peroro today! "
102040-306 = "I, too, was looking forward to watching Peroro."
102040-307 = "After completing this operation, we will watch it together, Hifumi."
102040-308 = "..."
102040-309 = "You're right... Azusa, let's do our best on this mission!"
102040-310 = "Yes."
102040-312 = "Hahaha! We're finally ready!"
102040-313 = "[s] \"Niya! How did it go?\""
102040-314 = "Everything's all right. Kaho, I'm counting on you."
102040-315 = "*sigh* ...Of course. Now then, is everyone ready?"
102040-319 = "Yes! I'm here to carry out the special mission at my lord's command!"
102040-320 = "I-I'm here..."
102040-321 = "A-Ahem. I'm Chidori Michiru, president of the Ninjutsu Research Club! I proclaim my participation as a ninja!"
102040-322 = "M-Me too...! P-Proclaim...p-participation..."
102040-323 = "[s] \"The Ninjutsu Research Club...?!\""
102040-324 = "Tsukuyo! This is an essential scene that shows the importance of the Ninjutsu Research Club! You really gotta show your presence!"
102040-325 = "Huh? R-Really...? I thought my presence was already pretty big..."
102040-326 = "Hmm... It's not enough!"
102040-327 = "All right, then! Tsukuyo! Izuna!"
102040-328 = "Yes, President!"
102040-329 = "Wh-What?! Huh?"
102040-330 = "Ninjas, hyper unite!"
102040-331 = "What? H-Here?! Unite?!"
102040-332 = "Yes, President! We're going for a bold attack! Understood!"
102040-333 = "..."
102040-334 = "Nyahahahaha! This is it! The famous converging scene!"
102040-339 = "You must be wondering, just what is a ninja? What is this ninjutsu I speak of?"
102040-340 = "Wh-What is it?"
102040-341 = "...U-Um, is this really okay?"
102040-345 = "It's fine! Ninjas are always learning, exploring, and pursuing more..."
102040-346 = "That's right! Just trust yourself, Tsukuyo!"
102040-347 = "We the trio of ninjas work tirelessly to spread all aspects of ninja charm!"
102040-348 = "Trio of ninjas! Nin nin!"
102040-352 = "With us on the case, even crying babies will find their smiles!"
102040-353 = "The premier ninja club of the Hyakkiyako Academy!"
102040-355 = "We're the Ninjutsu Research Club!"
102040-361 = "..."
102040-362 = "*applause* Nyahahaha! Indeed, it's the best. Hahaha! Ninjas are always the answer!"
102040-363 = "[s] \"Wh-What in the world...?\""
102040-364 = "I came here because my lord wanted to ask us a favor. What is your command, my lord?"
102040-365 = "Yeah, you said it was something only we can do. What's our ninja mission?"
102040-366 = "Ahem. We'd like the Ninjutsu Research Club to carry out a special mission as a separate unit."
102040-367 = "A special mission...?"
102040-369 = "...Yes. We'd like you to go to the Great Snowfield at the northernmost part of Hyakkiyako."
102040-371 = "Huh? The Great Snowfield?"
102040-372 = "That whole place is nothing but snow! For what?!"
102040-374 = "We need you to find the missing president of Hyakkaryouran."
102040-375 = "Huh? Hyakkaryouran? The president?"
102040-376 = "The Hyakkaryouran Resolution Council...? Why don't you just...go ask at the club room...?"
102040-377 = "Well..."
102040-378 = "...! Come to think of it, I haven't seen any Hyakkaryouran members recently."
102040-379 = "There must be trouble you can't talk about. Right, Kaho?"
102040-380 = "...Yes. It's just as you said."
102040-381 = "But if this is a mission for finding a missing person...why does it have to be us?"
102040-383 = "Hmm, maybe it's because among third-year students who remember the Hyakkaryouran, Mitchie Rude of the Ninjutsu Research Club is the only trustworthy one."
102040-384 = "What?! Mitchie Rude?! You're the rude one!"
102040-385 = "Whoa, President! You know people from the Hyakkaryouran?!"
102040-386 = "Y-Yeah. But I only caught a glimpse of them...so I don't remember much..."
102040-387 = "Nyahaha. That's enough for this mission."
102040-389 = "(What's that raccoon up to this time...?)"
102040-391 = "I see! I got it! Our mission is to find the whereabouts of Kuzunoha!"
102040-392 = "And the president of Hyakkaryouran knows this person... Ugh, okay. We'll try."
102040-393 = "President! Tell us about Hyakkaryouran! Are they really as strong and cool as ninjas?"
102040-394 = "Only elites are allowed to join Hyakkaryouran, so..."
102040-395 = "The Hyakkaryouran Resolution Council... I've heard of them before..."
102040-396 = "But they can't overcome ninjas! Ninjas are always the last ones standing!"
102040-397 = "Indeed! Ninjas are the best!"
102040-398 = "[s1] \"Izuna, Tsukuyo, Michiru. This is an important mission.\"\n[s2] \"When you find the target, can you tell her to contact Schale?\""
102040-399 = "Yes! Okay!"
102040-400 = "Yes! Okay!"
102040-401 = "Okay... We owe you a lot, so..."
102040-402 = "Y-Yes... We'll do our best..."
102040-406 = "In the event of an unprecedented crisis like this, there's only one place that Hyakkaryouran would go..."
102040-407 = "The president must have gone to the Twilight Temple in the Great Snowfield."
102040-408 = "After analyzing all my information, that seems pretty much, kind of certain! That's likely the place where the president of the Hyakkaryouran meets Kuzunoha!"
102040-409 = "So, you'll probably be able to meet the president there. Nyahahaha!"
102040-410 = "...We're putting our hopes on your vague guesses, Niya. I hope you're right."
102040-411 = "Ouch, Kaho! I told you, I'm pretty sure about this!"
102040-412 = "Fortunately, it's been confirmed that the False Sanctums' effect isn't strong in the Great Snowfield, so the danger should be minimal. "
102040-413 = "However, it'd be ill-advised to make hasty assumptions about such an unprecedented situation."
102040-414 = "...So, please be careful."
102040-415 = "Joking aside, Kaho is right. We're taking a risk here, so come back immediately if she's not at the temple."
102040-416 = "Oh, and of course, you should exercise the utmost discretion with this meeting."
102040-418 = "...Please. This is information that must not be revealed to the public yet."
102040-420 = "Understood! We'll look for this person, and return right away if they're not there!"
102040-421 = "If there's a-any issues... We'll contact you... P-Please look out...for us... "
102040-422 = "Then, Ninjutsu Research Club, let's go to the Great Snowfield to find the president of Hyakkaryouran!"
102040-426 = "Heehee. Now we wait for news."
102040-427 = "..."
102040-429 = "...Kekeke, indeed."
102040-431 = "The Ninjutsu Research Club has come across some important information..."
102040-432 = "Iroha! Iroha, where are you? Get it ready!"
102040-433 = "Huh? Get what ready? And shouldn't we go help Schale?"
102040-434 = "...Kekeke. Don't worry about it, Iroha. Everything is being prepared."
102040-435 = "What? What do you mean...?"
102040-437 = "Kekeke... Yeah. This is a good opportunity we can't afford to miss."
102040-439 = "Next Episode; Planning an Operation 3"

[translation]
102040-1 = "第4話;作戰準備（２）"
102040-4 = "這是……"
102040-5 = "天，天空被染上了紅色……發，發生什麼事了呢……"
102040-6 = "……老師傳來了訊息唷。#n似乎需要我們的幫忙。"
102040-7 = "但，但是……我們過去真的能幫上忙嗎？#n明明還在被追捕……說不定反而會造成老師的困擾……"
102040-8 = "沒有那種事，一定沒問題的。#n想想有沒有能幫上忙的方法吧。"
102040-9 = "我們也能幫忙的事……"
102040-14 = "……在那裡的是誰？"
102040-15 = "難，難道是追兵！？"
102040-16 = "……"
102040-23 = "……"
102040-25 = "！？"
102040-26 = "……"
102040-27 = "……"
102040-30 = "終於找到了。#n原來在這裡啊……"
102040-39 = "美，美咲同學！？怎麼突然……"
102040-40 = "你是誰？"
102040-41 = "是個超級可疑的人……"
102040-42 = "等，等等。我是……！"
102040-43 = "啊，這樣啊。這個頭盔是因為打工的關係──"
102040-47 = "……開玩笑的。你好呀，沙醬。#n尋找自我活動在休息中嗎？"
102040-52 = "……啊啊。"
102040-54 = "什麼尋找自我，說的真好聽。#n只是離家出走吧。"
102040-55 = "隊長……"
102040-56 = "抱歉……雖然有很多話想說，不過沒時間了。#n得去幫助老師才行。"
102040-57 = "嗯，我們也收到聯絡了唷。"
102040-58 = "沒，沒錯！就是這樣！"
102040-62 = "有精神就好，隊長。"
102040-64 = "……啊啊。"
102040-65 = "那麼，出發吧。"
102040-69 = "我是第4聖所的作戰負責人，浦和花子♡"
102040-70 = "大家，準備好了嗎？"
102040-72 = "……是。#n修女會部隊，正在聖所的地下墓穴前待命。"
102040-73 = "話說……櫻子大人究竟去了哪裡……"
102040-75 = "救護騎士團，正在作戰地點待命。"
102040-76 = "請，請多多指教！"
102040-78 = "第5聖所怎麼樣了呢？#n請報告目前的狀況。"
102040-80 = "……這裡發生了一點問題。"
102040-81 = "唉呀，怎麼了嗎？"
102040-82 = "「霍德」潛入了要塞城市的地下。#n雖然有在確認它的位置……"
102040-83 = "不過要塞都市埃里都的地下，被莉央會長創造的密碼系統保護著。#n駭入、震動、感知聲音都是不可能的。"
102040-85 = "……莉央會長？#n但是會長現在……"
102040-87 = "沒錯。#n所以現在正在進行破解密碼的演算。"
102040-88 = "所幸，要解讀密碼並不困難……但問題是需要花費相當多的時間。"
102040-89 = "唉……這樣下去可能趕不上作戰的時間……"
102040-90 = "咦，那不就糟了嗎？#n但是這邊也在進行聖所的分析，所以沒辦法幫忙──"
102040-91 = "請真紀同學繼續專注在第1聖所。#n工程師部的各位，還有餘力嗎？"
102040-93 = "不，我們也在設法破壞各處的入侵之柱……這邊也困難重重。"
102040-94 = "唉……找不到方法……連接近都做不到。"
102040-95 = "聖所的素材分析也在同時進行，體力也到極限了呢……很抱歉，我們無法再接下其他工作了。"
102040-96 = "需要更多的睡眠～……不，靠攝取咖啡因……請給我妖怪MAX……"
102040-97 = "早知道平常就多運動鍛鍊體力了……"
102040-98 = "現在說這些也於事無補。"
102040-100 = "真傷腦筋……那邊似乎也沒有餘力了。"
102040-101 = "不愧是大姐頭……就算人不在也能造成問題──"
102040-103 = "陽葵！"
102040-104 = "以前發生過千年的債券遭到偽造的事件對吧？"
102040-105 = "發行債券的安全系統也是莉央建構的──#n當時是怎麼解決的呢？"
102040-106 = "嗯？那不是陽葵做的嗎？#n我們可不會做出違反倫理的事唷。"
102040-107 = "哎呀，真是意外。也不是我做的。#n因為當時很忙，沒有時間做那種惡作劇……"
102040-108 = "……那麼，那件事究竟是誰做的呢？"
102040-113 = "……優香醬，妳聽見了嗎？"
102040-114 = "唉……我有在聽。"
102040-115 = "乃愛，現在立刻來反省室一趟！"
102040-116 = "好的。#n──那麼待會見。"
102040-122 = "……入侵之柱的攻略……可能，已經到極限了。"
102040-123 = "……在塔周圍挖洞，使其與地面分離……接著加以燒毀──"
102040-124 = "真的只有這個方法嗎？"
102040-125 = "雖然有摸索過其它方法……目前這就是最好的方法，了吧……"
102040-126 = "不過，這種規模的工程，已經是都市開發的等級了……"
102040-127 = "唔嗯，沒有別的方法嗎……從現在開始製造土木工程用的無人機也──"
102040-128 = "要不要幫雷醬裝上火焰噴射器呢？#n還有鏟子與鐵鎚……"
102040-129 = "只靠那些也有點……"
102040-135 = "嗨～！"
102040-139 = "你，你們是誰！？"
102040-140 = "今天也是適合開發溫泉的日子呢～！"
102040-142 = "溫泉……"
102040-143 = "開發部……！？"
102040-144 = "溫，溫泉？這裡沒有那種東西──"
102040-146 = "哈～哈哈哈哈！有溫泉的地方就有我們！不對，就算沒有溫泉也有我們！"
102040-148 = "不要在意那種小細節。#n那件事就交給我們吧。"
102040-150 = "嗯……？"
102040-154 = "總之只要挖個不停，拆光建築物，把一切都燃燒殆盡就好了對吧？#n來吧，溫泉開發的時間到了唷～！"
102040-155 = "只要最後能挖到溫泉就好了！沒必要想得那麼困難！"
102040-156 = "而且，我一直都很好奇千年的地下究竟有什麼樣的溫泉。#n也就是說，這是絕佳的機會！"
102040-158 = "「「哈～哈哈哈哈！！！」」"
102040-163 = "好，好像來了些非常不得了的人呢……"
102040-165 = "千年．反省室前"
102040-166 = "唉……"
102040-177 = "咦咦咦咦──？前，前輩們！？"
102040-178 = "代號「白兔」……不，黑崎小雪……#n出來吧，你被釋放了。"
102040-179 = "小雪醬，過得還好嗎？"
102040-180 = "我，我嗎？釋放？#n現，現在？為什麼啊？"
102040-181 = "沒時間了。快點出來，小雪。"
102040-182 = "我，我不要！前輩突然跑來說釋放什麼的，絕對是要那個對吧！"
102040-183 = "終於要把我送去矯正局了對吧！？我沒說錯吧！？"
102040-184 = "……"
102040-185 = "……"
102040-186 = "唉，看來只能強行把他帶走了呢。#n乃愛，幫幫我吧。"
102040-187 = "呵呵，沒辦法了呢。"
102040-193 = "嗚哇啊啊！？別，別過來！#n前輩好可怕！不要！不可以！反對職權騷擾！！"
102040-196 = "為，為什麼會這樣啊！我不是都有乖乖的嗎！#n沒有造成問題，也沒有逃出去啊！太過分了！反對暴力！我是冤枉的！！"
102040-197 = "我說啊……你之所以會在這裡，也是因為你自己造成的問題吧！#n到底哪裡冤枉你了啊！？"
102040-198 = "嘛嘛～優香醬。#n小雪醬好像也有在反省了。"
102040-199 = "反省！？這哪裡像是在反省的樣子啊？"
102040-200 = "就是說啊！什麼反省……請不要用那種好像我做錯什麼了的說法！"
102040-201 = "該說那是不可抗力呢，還是意外呢……"
102040-202 = "偽造債券是意外！？"
102040-203 = "而，而且……你們不是還派了超可怕的C&C前輩來抓我嗎！害我都有陰影了！"
102040-205 = "……"
102040-206 = "小雪醬……你，有在反省對吧？"
102040-207 = "呃，呃……？那個，這個……本來就是那個漏洞百出的密碼系統的錯吧？所以──"
102040-208 = "小～雪～醬？"
102040-209 = "那那個……這個……"
102040-210 = "前，前輩……你的表情真的很可怕，請你別再那樣看我了……"
102040-211 = "前輩說的對，是我錯了……"
102040-212 = "反省呢？"
102040-213 = "是，是……我有在反省……"
102040-214 = "呵呵，真是個乖孩子。"
102040-215 = "看吧，優香醬。#n如你所見，小雪醬好像也有在反省了唷？"
102040-216 = "為什麼對乃愛就那麼老實啊！？"
102040-217 = "不過乃愛前輩，偶爾真的很可怕……好像連夢裡也會出現一樣……"
102040-218 = "連以前的發言都能準確說出是在幾點幾分說的，然後問說「小雪醬，這和當時說的不一樣唷？」 實在是有點……"
102040-219 = "話說……兩位前輩居然會跑來找我，究竟發生了什麼事……？"
102040-220 = "簡單來說，我們需要小雪醬的力量。"
102040-221 = "沒錯。我們需要你那不可思議的計算能力。#n現在立刻回歸研討會吧。"
102040-222 = "現，現在立刻回到研討會？#n我不是被開除了嗎……？"
102040-223 = "並沒有。#n詳細的情況路上再說明吧，動作快。"
102040-224 = "來，小雪醬的制服也帶過來了，請趕快換衣服吧。"
102040-225 = "但，但是……人家還挺喜歡這件衣服的──"
102040-227 = "小～雪～醬？"
102040-228 = "噫……我，我知道了……"
102040-232 = "還剩下……D.U.中央地區的第6聖所。"
102040-233 = "喂～那邊怎麼樣啊～？"
102040-235 = "D.U.中央地區"
102040-236 = "市民的避難已經完成。#n在距離聖所之塔30km的地方準備了大量的避難所。"
102040-237 = "不過人力相當吃緊。還有糧食也是。#n雖然女武神和志工們正常駐在避難所幫忙──"
102040-239 = "請用。這是風華前輩煮的粥。#n能讓身體暖和起來唷。"
102040-240 = "謝謝……"
102040-244 = "茱莉，可以幫我把這個也分給大家嗎？"
102040-245 = "是，前輩！"
102040-246 = "呼……那麼接下來……"
102040-247 = "需要我幫忙嗎？前輩。"
102040-248 = "沒關係，我已經很習慣煮大鍋飯了。#n茱莉就繼續負責分送食物吧。"
102040-249 = "是，前輩！這裡確實需要我們供給部的力量呢！"
102040-250 = "如果能幫得上忙就好了……"
102040-251 = "不過，這樣下去食材可能會不夠……"
102040-256 = "哎呀？"
102040-257 = "怎麼回事！？"
102040-264 = "呵呵呵。風華同學，我們來幫忙了。"
102040-265 = "終於到了★"
102040-266 = "美食研究會！？你們怎麼會來……！？#n話說，為什麼全都溼答答的……！？"
102040-267 = "聽說你們在做好事，所以我們就來幫忙了唷！你們看！"
102040-268 = "沒錯沒錯！我們帶食材來了唷～！"
102040-273 = "哇……有這麼多新鮮的魚……！"
102040-274 = "這樣食材應該就足夠了呢，前輩！"
102040-275 = "就，就是啊……可以用這些來煮湯或做成炸物……#n營養均衡方面也沒問題。"
102040-276 = "不過，你們為什麼會坐在供給部的卡車上，讓我有點在意就是了……"
102040-277 = "算了。要抓這麼多魚也不容易吧？"
102040-279 = "超級辛苦的唷！我們把附近的水──"
102040-283 = "唔唔唔唔唔！？"
102040-284 = "哎，哎呀，那種細節就不要在意了！"
102040-286 = "呵呵。我們和供給部的關係這麼好。#n有困難的時候就該互相幫助。"
102040-287 = "不，也沒那麼好吧……"
102040-288 = "……算了。#n受到你們的幫助也是事實……謝謝你們囉。"
102040-290 = "呵呵，不用客氣。"
102040-291 = "我們該認真的時候還是會認真的唷！"
102040-292 = "友情真是美妙呢★"
102040-293 = "話說，什麼時候才能吃到魚呢～？"
102040-295 = "現在D.U.白鳥區已經空無一人了。#n儘管放手做吧。"
102040-296 = "謝謝……雖然還沒找到第6聖所的守護者，不過它有著6座聖所中最強大的能量……"
102040-297 = "如果守護者出現的話，就要引導它到已經完成避難的地區，在那裡開始作戰唷～"
102040-299 = "日步美，我們的工作是在D.U.外圍巡邏，並且找出守護者──也就是所謂的偵察部隊。"
102040-300 = "啊嗚……為什麼我們會……"
102040-301 = "因為日步美駕駛戰車的技術很優秀呀。#n要保護日步美的話，我一個人就綽綽有餘了。"
102040-302 = "當時成功將30名實現正義部的成員一起解決了……現在就算來兩倍都沒問題。"
102040-303 = "我，我當時不是故意那麼做的……啊嗚嗚……"
102040-304 = "……今天本來要去看佩洛洛大人的特攝電影的說……"
102040-306 = "嗯，我也很期待……"
102040-307 = "所以，作戰結束後一起去看吧，日步美。"
102040-308 = "……"
102040-309 = "嗯，梓醬。這個任務……我們就全力以赴吧！"
102040-310 = "啊啊。"
102040-312 = "準備好了嗎？喵哈哈。"
102040-313 = "[s]「仁耶！情況怎麼樣了？」"
102040-314 = "那麼佳穗，之後就拜託你了～"
102040-315 = "呼……各位，準備好了嗎？"
102040-319 = "伊樹菜奉主公之命，前來執行特殊任務！"
102040-320 = "抵，抵達目的地……"
102040-321 = "咳咳！忍術研究部部長，千鳥三千留登場！#n在此宣告參戰意志！"
102040-322 = "登，登場……在此……宣言……"
102040-323 = "[s]「忍術研究部……！？」"
102040-324 = "月夜，這可是告知忍術研究部參戰的重要場面哦！#n多表現一點存在感！"
102040-325 = "是，是嗎……？#n我，我覺得，我的存在感已經很強了……"
102040-326 = "唔嗯～這樣還不夠！"
102040-327 = "月夜！伊樹菜！"
102040-328 = "是，部長！"
102040-329 = "是，是！？"
102040-330 = "擺出「忍者流最強招牌動作」！"
102040-331 = "咦？要，要在這裡，擺出招牌動作，是嗎……！？"
102040-332 = "不愧是部長！#n要盡情突擊對吧！伊樹菜，明白了！"
102040-333 = "……"
102040-334 = "喵哈哈哈！出現了呢，那個有名的招牌動作～！"
102040-339 = "何謂忍者！何謂忍法！"
102040-340 = "忍者的，真諦……！"
102040-341 = "……那，那個，真的沒問題嗎……？"
102040-345 = "沒問題！！我們是研究、探究、深究其本質的……"
102040-346 = "這樣就對了！相信自己吧月夜！"
102040-347 = "為了推廣忍者的魅力而暗中活躍的，可愛動人的忍者三人組！"
102040-348 = "是三人組哦～！！忍忍！"
102040-352 = "哭泣的孩子也會破涕為笑，百鬼夜行聯合學園，"
102040-353 = "最強的忍者集團！"
102040-355 = "其名為「忍術研究部」！！"
102040-361 = "……"
102040-362 = "（啪啪啪啪！）#n喵哈哈哈！不愧是各位。選擇忍者果然是正確的呢～"
102040-363 = "[s]「那個……？」"
102040-364 = "伊樹菜聽說主公有事需要幫忙……我們該做什麼呢？"
102040-365 = "對呀。只有我們才能完成的工作，是什麼呢？"
102040-366 = "咳哼……呼呣，我想請忍術研究部從現在開始執行游擊隊的特別任務。"
102040-367 = "特別任務……？"
102040-369 = "……沒錯。#n我希望你們前往百鬼夜行最北端的「大雪原」一趟。"
102040-371 = "「大雪原」是嗎！？"
102040-372 = "那裡不是只有雪嗎！？為何要去那裡……！？"
102040-374 = "我希望你們去尋找下落不明的「百花繚亂」的委員長。"
102040-375 = "百花繚亂的……委員長是嗎？"
102040-376 = "百花繚亂……是指那個紛爭調停委員會……是嗎？#n沒，沒有在委員會室裡面嗎……"
102040-377 = "這……"
102040-378 = "……！#n仔細想想，最近確實沒看到百花繚亂的成員呢。"
102040-379 = "是有什麼特殊的原因對吧，佳穗。"
102040-380 = "……是的，正如你所說。"
102040-381 = "不過如果是要找人的話，沒必要特別找我們吧……？"
102040-383 = "關於這點～因為記得百花繚亂模樣的3年級學生中，能信賴的人──#n就只有忍術研究部的嚕嚕同學而已了，該這麼說嗎？"

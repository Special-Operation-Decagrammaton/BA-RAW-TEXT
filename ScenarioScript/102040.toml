[translation]
102040-1 = "ตอนที่ 4;เตรียมปฏิบัติการ 2"
102040-4 = "นี่มัน... "
102040-5 = "ทะ... ท้องฟ้าเป็นสีแดงเลย... กะ... เกิดอะไรขึ้นคะเนี่ย..."
102040-6 = "...... คุณครูจากชาเล่ต์ส่งข้อความมา สงสัยจะต้องการความช่วยเหลือนะ"
102040-7 = "ตะ... แต่ว่าพวกเราจะช่วยได้เหรอคะ... เรากำลังถูกไล่ล่านะ... เผลอๆ อาจจะไปสร้างความเดือดร้อน#nเพิ่มให้คุณครูก็ได้..."
102040-8 = "ต้องไม่เป็นอย่างนั้นหรอก ไม่ว่ายังไงเราก็ต้องหาทางช่วยคุณครูให้ได้"
102040-9 = "แต่ว่า... งานที่คนอย่างพวกเราพอจะช่วยได้..."
102040-14 = "นั่นใครน่ะ?"
102040-15 = "ระ... หรือว่าจะเป็นผู้ไล่ล่า?!"
102040-16 = "......"
102040-23 = "...... "
102040-25 = "?!"
102040-26 = "......"
102040-27 = "......"
102040-30 = "เจอจนได้ มาอยู่กันตรงนี้เองสินะ ทุกคน..."
102040-39 = "คะ?! คุณมิซากิ ทำไมจู่ๆ ก็ไปยิงใส่เลยล่ะ?!"
102040-40 = "อะไรของเธอน่ะ?"
102040-41 = "อืม น่าแปลกนะ แปลกจริงๆ"
102040-42 = "ระ... รอเดี๋ยวสิ!!  ฉะ... ฉัน..."
102040-43 = "อ้อ หมวกกันน็อกนี่... พอดีฉันทำพาร์ทไทม์น่ะ..."
102040-47 = "อรุณสวัสดิ์นะ ซัตจัง หยุดพักเรื่องการค้นหาตัวเองแล้วเหรอ?"
102040-52 = "อะ... อืม... คือว่า..."
102040-54 = "ค้นหาตัวเองกับผีอะไร หนีออกจากบ้านมาต่างหากล่ะ"
102040-55 = "หัวหน้า..."
102040-56 = "ขอโทษที... ฉันก็อยากจะกล่าวทักทายหรอกนะ แต่ตอนนี้ไม่มีเวลาแล้ว คุณครูต้องการความช่วยเหลือ#nจากเรา "
102040-57 = "อื้ม พวกฉันก็ได้ข้อความเหมือนกัน"
102040-58 = "ค่ะ! ใช่ค่ะ!"
102040-62 = "ดีแล้วละที่ยังดูแข็งแรงอยู่ หัวหน้า"
102040-64 = "...... อื้ม"
102040-65 = "งั้นก็ต้องเคลื่อนไหวกันแล้วสินะ"
102040-69 = "ผู้รับผิดชอบปฏิบัติการหอคอยที่ 4 อุราวะ ฮานาโกะค่า♡"
102040-70 = "ทุกคนพร้อมแล้วหรือยังคะ? "
102040-72 = "...... ค่ะ ตอนนี้กองกำลังชมรมซิสเตอร์กำลังสแตนด์บายอยู่หน้าสุสานใต้ดินที่มีหอคอยอยู่ค่ะ"
102040-73 = "ว่าแต่ว่า... เราไม่เห็นท่านซากุระโกะมาสักพักแล้วนะคะ ไปอยู่ที่ไหนกันนะ..."
102040-75 = "ชมรมอัศวินบรรเทาทุกข์กำลังรอคำสั่งอยู่ในเขตปฏิบัติการ "
102040-76 = "ระ... รบกวนด้วยค่ะ!"
102040-78 = "หอคอยที่ 5 เป็นยังไงบ้างคะ? ช่วยรายงานสถานการณ์ปัจจุบันด้วยค่ะ"
102040-80 = "...... โนอา ทางนี้มีปัญหานิดหน่อย"
102040-81 = "ตายจริง ปัญหาเหรอคะ? ปัญหาอะไรคะ?"
102040-82 = "<HOD> แอบเข้าไปใต้ดินของเมืองแห่งปราการแล้ว ตอนนี้ฉันกำลังตรวจสอบตำแหน่ง..."
102040-83 = "ปัญหาคือชั้นใต้ดินของเมืองแห่งปราการเอริดูได้รับการปกป้องด้วยระบบรหัสลับที่ประธานริโอะสร้าง#nขึ้นมาค่ะ เราก็เลยดักฟังไม่ได้ แถมยังตรวจสอบการสั่นสะเทือนหรือเสียงรบกวนไม่ได้ด้วยค่ะ"
102040-85 = "...... ระบบของประธานริโอะเหรอ? แต่ตอนนี้ประธานหายตัวไปนะ..."
102040-87 = "ใช่ เราก็เลยกำลังประมวลผลเพื่อเจาะระบบรหัสลับของประธานกันอยู่"
102040-88 = "มันเป็นการคำนวณที่ไม่ซับซ้อน ก็เลยไม่ได้ยากมาก... แต่ปัญหาก็คือเราต้องการทั้งเวลา อุปกรณ์ แล้วก็คนเพิ่ม..."
102040-89 = "เฮ้อ... ถ้ายังเป็นแบบนี้ อาจจะไม่ทันเริ่มปฏิบัติการก็ได้..."
102040-90 = "ว่าไงนะ? แบบนั้นก็เรื่องใหญ่น่ะสิ? ทางนี้ก็ต้องวิเคราะห์หอคอยไปด้วยกันอีก ถึงจะอยากช่วยก็เถอะ..."
102040-91 = "มากิโฟกัสไปที่หอคอยที่ 1 ตามแผนการเถอะค่ะ แล้วชมรมวิศวกรรมล่ะคะ เป็นยังไงบ้างคะ? พอมีเวลาเหลือไหมคะ?"
102040-93 = "ไม่เลย พวกเราก็กำลังหาวิธีทำลายเสากัดกร่อนของ HOD ที่อยู่ในแต่ละเขตอยู่... ทางนี้ก็งานหนักเหมือนกัน"
102040-94 = "เฮ้อ... มองไม่เห็นทางเลย... เข้าถึงไม่ได้เลยแฮะ..."
102040-95 = "ส่วนทางนี้กำลังวิเคราะห์วัสดุของหอคอยไปพร้อมๆ กันด้วย เราใกล้จะหมดเแรงกันแล้ว... ถ้าจะให้รับ#nงานเพิ่มอีกน่าจะไม่ไหว"
102040-96 = "ฉันนอนไม่พอเลย... ขอคาเฟอีน... ไม่สิ ขอมอนสเตอร์แม็กซ์..."
102040-97 = "รู้งี้หมั่นออกกำลังกายให้แข็งแรงเข้าไว้ก็ดี..."
102040-98 = "มารู้สึกผิดเอาตอนนี้ก็ไม่มีอะไรดีขึ้นมาหรอก..."
102040-100 = "ฮึ่ม... ทางนั้นก็มีกำลังคนไม่พอ... น่าลำบากใจนะคะ "
102040-101 = "นี่สินะบิ๊กซิสเตอร์ แค่การมีตัวตนก็ถือว่าเป็นการรบกวนแล้วละค่ะ"
102040-103 = "ฮิมาริ!"
102040-104 = "ว่าแต่เมื่อก่อน พันธบัตรมิลเลเนียมเคยถูกปลอมแปลงเยอะเลยไม่ใช่เหรอคะ?"
102040-105 = "ระบบรักษาความปลอดภัยในการออกพันธบัตรก็สร้างขึ้นโดยริโอะเหมือนกัน ตอนนั้นแก้ปัญหากันยังไง#nเหรอคะ?"
102040-106 = "หืม? ตอนนั้นฮิมาริเป็นคนทำไม่ใช่รึไง? แฮ็กเกอร์หมวกขาวอย่างพวกเราไม่ทำอะไรที่ขัดต่อจริยธรรม#nหรอกนะ"
102040-107 = "ตายจริง? ฉันก็ด้วยค่ะ แต่ตอนนั้นฉันกำลังยุ่ง ก็เลยไม่มีเวลามาเล่นด้วยน่ะค่ะ "
102040-108 = "...... ถ้างั้นตอนนั้นเป็นฝีมือใครกัน?"
102040-113 = "ยูกะจัง ฟังอยู่หรือเปล่าคะ?"
102040-114 = "เฮ้อ ฟังอยู่! ช่วยไม่ได้สินะ"
102040-115 = "โนอา ไปเจอกันที่ห้องสำนึกผิดเดี๋ยวนี้เลย!"
102040-116 = "ค่ะ รับทราบค่ะ ฉันจะไปเดี๋ยวนี้ค่ะ"
102040-122 = "หัวหน้า... นี่น่าจะเป็นวิธีที่ดีที่สุด... ในการโจมตีเสากัดกร่อนของ HOD แล้วละ..."
102040-123 = "...... ขุดหลุมขนาดใหญ่รอบๆ เสากัดกร่อนเพื่อแยกมันออกจากพื้นดิน จากนั้นก็จุดไฟเผา......?"
102040-124 = "เรามีแค่วิธีนี้วิธีเดียวเหรอ?"
102040-125 = "ก็อยากจะหาวิธีที่มันเรียบง่ายอยู่หรอกนะ... แต่ตอนนี้มีแค่วิธีนี้..."
102040-126 = "เราต้องทำงานวิศวกรรมโยธาขนาดนี้เลยเหรอ นี่มันยิ่งใหญ่ระดับพัฒนาเมืองเลยนะ..."
102040-127 = "อืม... ไม่มีวิธีอื่นเลยหรือไงนะ... ถ้าเริ่มสร้างโดรนสำหรับวิศวกรรมโยธาตั้งแต่ตอนนี้จะไหวไหมนะ..."
102040-128 = "ติดเครื่องพ่นไฟที่สายฟ้าดีไหมคะ? ติดพลั่วและค้อนด้วยเลย..."
102040-129 = "อืม ฉันว่าแบบนั้นมันไม่น่าเวิร์ค..."
102040-135 = "จ๊ะเอ๋~ เพื่อนๆ! วันนี้ก็เป็นวันที่ดีสำหรับการพัฒนาใช่ไหม?"
102040-139 = "เอ๊ะ เอ๋...?!  คุณเป็น... ใครเหรอคะ?!"
102040-140 = "อื้ม ชมรมพัฒนาออนเซ็นไงล่ะ"
102040-142 = "...... พัฒนา"
102040-143 = "ออนเซ็น......?!"
102040-144 = "อะ... ออนเซ็นงั้นเหรอคะ? มาพัฒนาที่นี่เหรอ..."
102040-146 = "วะฮะฮะฮ่า! ที่ไหนมีออนเซ็น ที่นั่นมีเรา! เอ๊ะ เดี๋ยวสิ! ถึงจะไม่มีออนเซ็นก็มีเราได้เหมือนกัน!"
102040-148 = "อย่าใส่ใจเรื่องเล็กๆ น้อยๆ เลย เรื่องแบบนั้นเดี๋ยวพวกเราจัดการเอง"
102040-150 = "หืม...?"
102040-154 = "ขุดลึกลงไปใต้ดิน เอาอาคารออก แล้วเผาทุกอย่างให้ราบคาบน่ะ!? นั่นมันจิตวิญญาณแห่งการพัฒนา#nของชมรมพัฒนาออนเซ็นเลยนะ!"
102040-155 = "แค่ทำไปเรื่อยๆ จนเจอบ่อออนเซ็นก็พอแล้วเนอะ! ไม่ต้องคิดให้มันยากนักหรอก!"
102040-156 = "สงสัยมาตลอดเลยละว่าใต้ดินของมิลเลเนียมจะมีบ่อออนเซ็นแบบไหนซ่อนอยู่ นี่ถือว่าเป็นโอกาสดีเลย!"
102040-158 = "อะฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!!"
102040-163 = "มะ... เหมือนเราจะได้คนที่น่าทึ่งมาเสริมกองกำลังเลยนะคะ..."
102040-165 = "หน้าห้องสำนึกผิด มิลเลเนียม"
102040-166 = "เฮ้อ... "
102040-177 = "หือ? อะ... เอ๋? ระ... รุ่นพี่?!"
102040-178 = "โค้ดเนม <ชิโระอุซางิ> ไม่สิ คุโรซากิ โคยูกิ ออกมาได้ เธอถูกปล่อยตัวแล้ว"
102040-179 = "โคยูกิจัง เป็นยังไงบ้างคะ?"
102040-180 = "คะ?! ฉันเหรอคะ? ปล่อยตัวเหรอคะ? ตอนนี้เลยเหรอ? ทำไมกันคะ?"
102040-181 = "ไม่มีเวลาแล้ว รีบๆ ออกมาเร็วเข้า โคยูกิ"
102040-182 = "มะ... ไม่เอาค่ะ! อยู่ดีๆ ก็ปล่อยตัวกันเนี่ยนะ? รุ่นพี่สองคนมาหาฉันแล้วก็บอกว่าปล่อยตัว นี่มันสถานการณ์แบบนั้นเลยนี่คะ! แบบนั้นน่ะ!"
102040-183 = "จะเอาฉันไปไว้ในห้องคุมขังใช่ไหมคะ! ใช่ไหมล่ะคะ? ใช่ไหม? ฉันพูดถูกใช่ไหมคะ?"
102040-184 = "......"
102040-185 = "......"
102040-186 = "เฮ้อ สงสัยคงต้องลากตัวไปแทน มาช่วยหน่อยสิ โนอา"
102040-187 = "ฮุฮุ ช่วยไม่ได้สินะคะ"
102040-193 = "คะ?! เอ๋? ยะ... อย่าเข้ามานะคะ! รุ่นพี่น่ากลัวกันจัง! อย่าเข้ามานะคะ!"
102040-196 = "ทะ... ทำไมถึงจะขังฉันล่ะคะ? ฉันก็อยู่อย่างสงบเสงี่ยมแล้วไง! ที่ผ่านมาฉันไม่ได้ก่อปัญหา แล้วก็ไม่ได้คิดหนีด้วยนี่คะ! แล้วทำไมกัน! ทำไมล่ะ? แบบนี้เกินไปนะคะ! อย่าใช้ความรุนแรงสิคะ! ไม่ยุติธรรมเลย! ไม่ยุติธรรม!!"
102040-197 = "พะ... พูดอะไรน่ะ! ที่เธอต้องมาอยู่ที่นี่ตั้งแต่แรกก็เพราะสิ่งที่เธอทำไม่ใช่รึไง! ไม่ยุติธรรมงั้นเหรอ ตรงไหนที่บอกว่าไม่ยุติธรรมกันไม่ทราบ?!"
102040-198 = "เอาละๆ ยูกะจัง โคยูกิจังก็กำลังสำนึกผิดอยู่... เรามาเคลียร์เรื่องนี้ด้วยการพูดคุยกันเถอะค่ะ"
102040-199 = "สำนึกผิด!?  นี่น่ะเหรอพฤติกรรมของคนที่สำนึกผิด?"
102040-200 = "สำนงสำนึกอะไรกันคะ!? พูดเหมือนกับไปทำผิดอะไรไว้อย่างนั้นแหละ!"
102040-201 = "นั่นเป็นเหตุสุดวิสัยต่างหาก... หรือจะเรียกว่าอุบัติเหตุก็ได้..."
102040-202 = "ว่าไงนะ? ปลอมแปลงพันธบัตรเนี่ยนะเป็นอุบัติเหตุ?!"
102040-203 = "ตะ... แต่ก็สั่งให้พวกรุ่นพี่ C&C ที่น่ากลัวมาจับตัวฉันแล้วนี่คะ...! เจอแบบนั้น ต้องบอกว่าฉันเป็นเหยื่อ#nมากกว่านะคะ..."
102040-205 = "......"
102040-206 = "...... ใช่อย่างที่พูดไหมคะ? โคยูกิจัง? กำลังสำนึกผิดอยู่ใช่ไหมคะ?"
102040-207 = "คะ... คะ? เอ่อ... ไม่ใช่ แบบว่า เอ่อ... ระบบรหัสลับมันไม่เสถียรตั้งแต่แรกอยู่แล้วไม่ใช่เหรอคะ...? ก็... แบบว่า..."
102040-208 = "โค~ ยู~ กิ~ จัง~?"
102040-209 = "ก็... อะ... อืม... คือว่า..."
102040-210 = "ระ... รุ่นพี่คะ... รุ่นพี่น่ากลัวมากเลย อย่าทำหน้าแบบนั้นได้ไหมคะ...?"
102040-211 = "เรื่องนี้เป็นความผิดของฉันอย่างที่รุ่นพี่ว่าค่ะ เพราะงั้น..."
102040-212 = "ก็เลยสำนึกผิด?"
102040-213 = "ค่ะ ใช่ค่ะ ฉันผิดไปแล้วค่ะ กำลังสำนึกผิดค่ะ..."
102040-214 = "ฮุฮุ ว่านอนสอนง่ายดีจริงๆ"
102040-215 = "ได้ยินไหมคะ ยูกะจัง? โคยูกิจังสารภาพว่าตัวเองทำผิดแล้วนี่คะ"
102040-216 = "แล้วทำไมถึงเชื่อฟังแต่โนอาคนเดียวล่ะ!?"
102040-217 = "แต่ว่ารุ่นพี่โนอาก็... บางครั้งก็น่ากลัวนะคะ... น่ากลัวจนฉันเก็บเอาไปฝันเลยละ..."
102040-218 = "ยิ่งตอนที่มาบอกว่า \"โคยูกิจัง? ตอนนั้นไม่ได้พูดแบบนี้นี่คะ?\" แล้วก็ใส่วันเวลาอย่างละเอียดเข้าไปด้วย ยิ่งน่ากลัวเข้าไปใหญ่..."

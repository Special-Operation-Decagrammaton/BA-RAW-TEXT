1600602-84 = "ถ้าไม่อยากลิ้มรสเครื่องดื่มจากนรก ก็ต้องระวังและรอบคอบ!"
1600602-85 = "หึหึ เด็กน้อยเอ๋ย ถ้าไม่ระวังให้ดีล่ะก็..."

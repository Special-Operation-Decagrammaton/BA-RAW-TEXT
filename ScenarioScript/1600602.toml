1600602-109 = "อ่า... เรื่องนั้น ก็แบบว่า..."
1600602-110 = "......"
1600602-111 = "แต่จะให้ทำยังไงได้ล่ะ! ถ้าอยากกินก็ต้องแข่งเกมให้แพ้เท่านั้น!"
1600602-112 = "แถมถ้าจะเข้าแข่งขันก็ต้องมีคู่หูมาด้วยอีก!"

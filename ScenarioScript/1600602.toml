1600602-7 = "แงงง มาช้าแบบนี้ สินค้าอาจจะหมดไปแล้วก็ได้นะ"
1600602-8 = "[s1] \"อืม... ขอโทษนะอิซุมิ\"\n[s2] \"คนมากันเยอะจังเลยนะ...\""
1600602-9 = "ช่าย~! สงสัยจะมาร่วมกิจกรรมกันน่ะ"
1600602-10 = "ช่าย~! สงสัยจะมาร่วมกิจกรรมกันน่ะ"

1600602-107 = "[s7] \"ของอร่อยที่จะมากินให้ได้ ไม่ใช่โลโกโมโก...\"\n[s8] \"แต่เป็นน้ำมะพร้าวชาบัสโกหรอกเหรอ?!\""

1600602-144 = "[s] \"ตั้งใจมากินจริงๆ สินะ\""
1600602-145 = "ไม่ต้องห่วงหรอก ฉันรับรู้ได้ถึงความปรารถนาที่ร้อนแรงของเธอแล้วล่ะ"
1600602-146 = "เพื่อเป็นการแสดงความเคารพสาวน้อยผู้ท้าชิง นอกจากโลโกโมโกสุดพิเศษแล้ว เธอยังจะได้..."
1600602-147 = "<น้ำมะพร้าวชาบัสโก้> ไปดื่มด้วย! แถมให้ฟรีเลย!"

1600602-15 = "ถ้าชนะเกมนี้ได้ล่ะก็ เราจะได้กิน <โลโกโมโกชิบะ> จานเด็ดของร้านริมทะเลฟรีเลยนะ!"
1600602-16 = "โลโกโมโก~ รสชาติจะเป็นยังไงน้า ต้องอร่อยสมชื่อแน่เลย (ซู้ดน้ำลาย)"
1600602-17 = "[s] \"ดูอยากกินมากเลยนะ\""

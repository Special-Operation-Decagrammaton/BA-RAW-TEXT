1600602-96 = "แมงป่องสีทองบนหาดทรายที่เคยชิงตำแหน่งแชมป์กับฉันเมื่อ 10 ปีก่อน..."
1600602-97 = "ท่าไม้ตายของหมอนั่น...! นี่เธอแสดงท่าไม้ตายหั่นหิมะนิจนิรันดรออกมาเหรอ?!"

1600602-140 = "ทำไมเป็นอย่างนี้ล่ะ?! ทำไมถึงชนะล่ะคุณครู?!"
1600602-141 = "แบบนี้ก็ไม่ได้กินน้ำมะพร้าวชาบัสโกน่ะสิ!"
1600602-142 = "รู้ไหมว่าในอินเทอร์เน็ตมีคนรีวิวไว้ว่า 'กินแล้วพ่นไฟได้', 'นรกมาเยือนปาก' แล้วก็#n'น้ำมะพร้าวชาบัสโก้มันจะเผ็ชเบอร์ไหนนะ?'"

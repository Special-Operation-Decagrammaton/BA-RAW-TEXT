[translation]
1600602-1 = "泉與享受夏天的數種方法"
1600602-2 = "（抵達泉所說的海之家，發現那個地方早已人山人海）"
1600602-4 = "啊，老師～！"
1600602-6 = "真是的，太慢了吧！"
1600602-7 = "動作這麼慢，要是「傳聞中的美食」材料用完吃不到了要怎麼辦啊！"
1600602-8 = "[s1] 「呃嗯，抱歉，泉……」\n[s2] 「不過人還真多耶……」"
1600602-9 = "就是說啊！看來大家都是聽說有獎品，就跑來看看了！"
1600602-10 = "就是說啊！看來大家都是聽說有獎品，就跑來看看了！"
1600602-11 = "對了，這是店家的宣傳單！"
1600602-13 = "[s] 「……『倒竿』遊戲對決？」"
1600602-14 = "對對！好像也叫做「山崩」吧？參加者要小心不要讓沙丘上的竿子倒下來，輪流挖沙子的一種遊戲。"
1600602-15 = "只要在遊戲中獲勝，就能免費吃海之家的名產「特製夏威夷漢堡飯」。"
1600602-16 = "到底會是什麼味道呢～……吸嚕。"
1600602-17 = "[s] 「泉，口水流出來了」"
1600602-18 = "啊！……呵呵，真的好令人期待喔──，這裡的塔巴……不對，漢堡飯！"
1600602-21 = "[ns] 「……？」"
1600602-22 = "遊戲結束──！！！"
1600602-23 = "啊，看來遊戲剛好結束！"
1600602-25 = "獲勝者……"
1600602-26 = "是這間店的老闆！"
1600602-27 = "……哼。"
1600602-29 = "所以我就說嘛！不要一下子挖掉那麼多沙子！"
1600602-30 = "可，可是……"
1600602-32 = "順帶一提，這間店的老闆，可不是普通的餐飲老闆……！"
1600602-33 = "而是「奇普托斯挖沙倒竿賽」連續15年的冠軍！實力非同小可唷！"
1600602-35 = "早說啊！！"
1600602-36 = "那麼，遺憾輸掉的挑戰者將接受處罰遊戲……！"
1600602-37 = "得一口氣喝光店裡同樣頗負盛名的另類招牌品項……"
1600602-38 = "融合了墨西哥辣醬的嗆辣和椰子的甘甜，倒滿整顆椰子的「塔巴斯科汁」！"
1600602-39 = "嘖……這點東西我們喝就是了！"
1600602-45 = "噗哈？！"
1600602-46 = "咳呸？！"
1600602-51 = "這就是人生的嗆辣滋味。看來對小妹妹們來說有點太早了呢。"
1600602-52 = "那麼，下一組挑戰者請入場！"
1600602-55 = "啊，輪到我們了！走吧！"
1600602-56 = "[s3] 「慢著，輸了就要喝剛才那東西嗎？」\n[s4] 「我怎麼沒聽說有處罰遊──」"
1600602-57 = "安啦安啦！"
1600602-58 = "安啦安啦！"
1600602-60 = "哼……下一個挑戰的是你們嗎？"
1600602-61 = "嗯！我們要來吃漢堡飯！"
1600602-62 = "是嗎，目睹了至今為止的戰況，還能一上來就說出等同於勝利宣言的台詞……"
1600602-63 = "有趣！我接受你們的挑戰！"
1600602-64 = "那麼！比賽……開始！"
1600602-65 = "那就從我開始吧……"
1600602-67 = "（咻──）"
1600602-68 = "一開始就大膽地帶走了快要4分之1的沙子！真不愧是冠軍！"
1600602-69 = "挑戰者們會怎麼出招呢？"
1600602-70 = "加油──！"
1600602-71 = "會怎麼下手呢……？"
1600602-72 = "[s] 「那就先……」"
1600602-74 = "……哼，還真是謹慎。"
1600602-75 = "但這麼消極的方法，能贏過我嗎？"
1600602-76 = "[s5] 「不，我只是不想輸而已……」\n[s6] 「老闆您真起勁呢……」"
1600602-77 = "下一個輪到我！"
1600602-78 = "下一個輪到我！"
1600602-79 = "好了，要拿多少呢～！"
1600602-80 = "唔──嗯……？"
1600602-81 = "那我就……"
1600602-82 = "挑戰者要怎麼出招呢！"
1600602-83 = "只要稍有差錯，嘴裡就會被查巴斯科辣椒醬染成鮮紅！"
1600602-84 = "為了避開來自地獄的果汁，絕大多數挑戰者在這時都會特別小心……！？"
1600602-85 = "哼哼，一定也很消極……"
1600602-87 = "嘿！"
1600602-88 = "竟然！挑戰者一口氣發動攻勢！難道是要速戰速決嗎！？"
1600602-89 = "好厲害！一下挖走快一半的沙子……！"
1600602-90 = "可是這樣會讓竿子倒掉吧？！已經在搖搖晃晃了！"
1600602-91 = "[s] 「等，泉！？」"
1600602-92 = "不對你們看……！天哪就差一點點……！"
1600602-93 = "但竿子還能站著……！"
1600602-95 = "什，什麼……！？剛才這招難道是……！"
1600602-96 = "10年前……和我爭奪冠軍寶座……"
1600602-97 = "人稱「黃金蠍子」的選手所使用的必殺技……「十誡」！？你怎麼可能會這招……！？不可能，他應該後繼無人了啊……！"
1600602-98 = "……？那什麼東西？"
1600602-99 = "啊，竿子沒倒下耶。好可惜──"
1600602-100 = "[s] 「……泉你給我慢著。」"
1600602-101 = "查巴斯科辣椒醬……啊，老師，你有說什麼嗎？"
1600602-102 = "[s] 「你剛才難道是故意要輸的嗎？！」"
1600602-104 = "不是，那個，我絕對沒有放水喔……！"
1600602-105 = "真的沒有，我，我是真的……"
1600602-106 = "真的想吃到這間店的珍品美食……"
1600602-107 = "[s7] 「所以你要的『美食』，其實不是漢堡飯……」\n[s8] 「而是那個『查巴斯科椰子汁』嗎？！」"
1600602-108 = "呃，那個……！"
1600602-109 = "呃，那個……！"
1600602-110 = "……"
1600602-111 = "這，這也沒辦法呀！誰叫平常在店裡點餐也不會提供，必須在遊戲中輸了才能喝到！"
1600602-112 = "再加上如果想參加遊戲，還必須和人組隊，所以我才請老師……"
1600602-113 = "[s] 「咦……？」"
1600602-114 = "哼哼哼……好久沒這麼熱血沸騰了。"
1600602-115 = "咦？"
1600602-116 = "我已經過了好一陣子平靜無聊的生活。好久沒感受到這股體內炙熱翻攪的熱情了……！"
1600602-117 = "好！我也有我的尊嚴……我也要使出全力！"
1600602-118 = "[s] 「您真的很起勁呢？！」"
1600602-120 = "接招吧！"
1600602-122 = "咦耶耶？！雖然不太明白但我也不會輸……不對，不會贏……？"
1600602-123 = "反，反正我會加油！"
1600602-131 = "我認輸……是你們贏了。"
1600602-135 = "竟，竟，竟然……！"
1600602-136 = "是挑戰者們的勝利！"
1600602-137 = "哦哦哦哦！！！"
1600602-138 = "[s] 「贏……贏了。」"
1600602-140 = "咦耶耶耶！？贏，贏了！？怎麼會，為什麼！？"
1600602-141 = "贏了不就喝不到「查巴斯科椰子汁」了嗎──！"
1600602-142 = "網路上大家都在說：「喝完嘴巴會沒感覺」、「牙齒好像消失了」、「喝到一半反而喝不出味道」……"
1600602-143 = "虧我這麼期待！！！"
1600602-144 = "[s] 「為什麼你看到這些評論會想喝啊！？」"
1600602-145 = "……別擔心，挑戰者們。我確實感受到了你們的熱情。"
1600602-146 = "為了向這位小姑娘表達敬意，不光是漢堡飯……"
1600602-147 = "也會一併送上「查巴斯科椰子汁」！"
1600602-150 = "咦！騙人！？太好了！！真的嗎！？謝謝──！！"
1600602-151 = "成功了！老師成功了！！"
1600602-152 = "[s] 「嗯，恭喜你……」"
1600602-158 = "來吧老師！一起喝吧！"
1600602-159 = "來，這是吸管！讓老師喝第一口！"
1600602-160 = "（面對泉更勝於太陽的開朗笑容，根本就不忍心拒絕）"
1600602-162 = "（和廁所的羈絆等級提升了）"

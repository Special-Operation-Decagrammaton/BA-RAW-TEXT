[translation]
2003203-1 = "Field-Ready Fashion"
2003203-3 = "Sensei. Over here."
2003203-4 = "Ready to go acquire the latest fashions?"
2003203-5 = "[s] \"Swimsuits are clothing... Right...\""
2003203-7 = "Swimsuit Store"
2003203-12 = "Um."
2003203-13 = "I can't decide. Sensei, I'll try on a few and you tell me which is the most fashionable."
2003203-18 = "What? Don't change outside the fitting room this time?"
2003203-19 = "But it's far too claustrophobic in there."
2003203-20 = "Efficiency wise, it makes the most sense to try on clothes right next to their rack. Then I won't have to go back and forth between here and the fitting room."
2003203-21 = "[s1] \"Absolutely not!!\"\n[s2] \"If you want another outfit, I will bring it to you!\""
2003203-25 = "Once I stopped Eimi from scandalizing the employees and patrons, our swimsuit shopping began in earnest."
2003203-29 = "Sensei, focus. I need your stylistic opinion."
2003203-30 = "How does this one look?"
2003203-32 = "What about this one? ...I'll catch a cold out in this?"
2003203-33 = "What does that have to do with fashion? Well, maybe this one looks better."
2003203-34 = "Hm? Showing less is more?"
2003203-36 = "Weird, I don't remember picking this one?"
2003203-37 = "Cow print? Why in the world would this be considered high fashion?"
2003203-39 = "Finally, after trying various swimsuits..."
2003203-40 = "We settled on a winner and completed our shopping."
2003203-42 = "Thank you for picking such a stylish swimsuit, Sensei."
2003203-43 = "Now I'll be the best dressed diver at the Glacial Sea."
2003203-44 = "I'll be both fashionable and prepared for my next major operation."
2003203-48 = "[ns3] \"Operation? Glacial?!\"\n[ns4] \"Eimi, you can't wear just a swimsuit in freezing waters!\""
2003203-51 = "What do you mean?"
2003203-52 = "Isn't the Glacial Sea still technically a sea? Are swimsuits not clothes built for the sea?"
2003203-53 = "[s] \"Is that so?\""
2003203-54 = "Indeed, Sensei. You should prepare a proper swimsuit as well."
2003203-58 = "[ns] \"You need far more than a swimsuit to swim in glacial waters, Eimi!\""
2003203-59 = "Sensei?"
2003203-60 = "...Aww, you can't let me go? Don't be scared, Sensei. I didn't plan on leaving you behind."
2003203-61 = "Huh?"
2003203-63 = "Why are we going to a sporting goods store?"
2003203-64 = "[s5] \"I'll be back in just a moment.\"\n[s6] Get Eimi some actual winter clothing."
2003203-72 = "Sensei... I'm hot..."
2003203-73 = "A jacket, a muffler, this thick hat and gloves. Do I really have to wear all this?"
2003203-74 = "It's kind of cute...but won't I get too warm with all this on?"
2003203-75 = "[s7] \"What are you saying? You need to be prepared for subzero temperatures!\"\n[s8] \"This gear is a must!\""
2003203-78 = "Umm..."
2003203-79 = "Just try them and see if they fit? Okay..."
2003203-83 = "Fine. I'll change in a fitting room."
2003203-85 = "Sensei, I'm done changing. I'll be setting out now."
2003203-93 = "[ns] \"Eimi. Aren't you missing something?\""
2003203-94 = "Oh. Right. It wouldn't be a swimsuit if I wore clothes over them, Sensei."
2003203-95 = "[s9] \"What kind of logic is that?!\"\n[s10] \"I give up...\""
2003203-98 = "Heh."
2003203-99 = "Thank you for buying me clothes, Sensei."
2003203-101 = "After shopping, I chatted with Eimi in a cafe before returning to Schale."

[translation]
2003203-1 = "แฟชั่นของจริง"
2003203-3 = "อ๊ะ คุณครู ทางนี้"
2003203-4 = "เอาละ ไปซื้อเสื้อผ้ากันเลย"
2003203-5 = "[s] \"อ่า... อืม... หมายถึงชุดว่ายน้ำเนอะ...\""
2003203-7 = "ร้านชุดว่ายน้ำ"
2003203-12 = "อืม..."
2003203-13 = "ต้องเป็นชุดว่ายน้ำแบบไหนถึงจะดีนะ ฉันจะลองใส่ดูหลายๆ แบบ คุณครูช่วยเลือกให้หน่อยนะ"
2003203-18 = "คราวนี้ไม่ให้ฉันถอดเสื้อผ้านอกห้องลองชุดงั้นเหรอ?"
2003203-19 = "แต่ว่า... ฉันไม่ชอบที่ห้องลองชุดมันแคบ..."
2003203-20 = "และถ้าจะลองใส่ชุดหลายๆ แบบ ถ้าจะให้เดินหยิบชุดเข้าห้องลองแล้วเปิดปิดประตูซ้ำๆ มันก็เสียเวลา ฉันว่าลองตรงนี้ไปเลยน่าจะไวกว่า..."
2003203-21 = "[s1] \"แบบนั้นไม่ได้นะ!!\"\n[s2] \"ถ้าอยากได้ชุดไหนเดี๋ยวครูหยิบให้เอง!\""
2003203-25 = "(คุณครูห้ามไม่ให้เอมิลองเสื้อผ้านอกห้อง แล้วก็เริ่มเลือกชุดว่ายน้ำด้วยกัน)"
2003203-29 = "คุณครู จะให้ความเห็นทั้งๆ ที่ไม่ได้มองชุดที่ฉันใส่ได้ไง..."
2003203-30 = "ตั้งใจดูหน่อยสิ ชุดนี้เป็นไงบ้าง?"
2003203-32 = "แล้วชุดนี้ล่ะ? มันจะร้อนเกินไปมั้ยนะ..."
2003203-33 = "จริงสิ ดูชุดนี้ให้ด้วย"
2003203-34 = "หืม? ให้ลองใส่ชุดอื่นเหรอ?"
2003203-36 = "นี่ไม่ใช่ชุดที่ฉันเลือกนี่นา หรือว่าใครหยิบผิดปนมา?"
2003203-37 = "ลายวัวนม...? ถึงฉันจะไม่รู้เรื่องแฟชั่นมาก แต่ไม่น่าจะมีใครเลือกลายอะไรแบบนี้นะ?"
2003203-39 = "(หลังจากลองใส่ชุดว่ายน้ำดูหลายๆ แบบ...)"
2003203-40 = "(ทั้งสองก็เลือกชุดว่ายน้ำที่ถูกใจมาหนึ่งชุด)"
2003203-42 = "ขอบคุณที่มาช่วยเลือกชุดว่ายน้ำสวยๆ นะคุณครู"
2003203-43 = "เอาละ ได้ชุดว่ายน้ำที่จะเอาไปใส่ในธารน้ำแข็งแล้ว..."
2003203-44 = "งั้นปฏิบัติการครั้งนี้ก็คงไร้ปัญหา"
2003203-48 = "[ns3] \"ปฏิบัติการครั้งนี้เหรอ...?\"\n[ns4] \"เอมิ ตอนอยู่ในธารน้ำแข็ง ไม่ได้จะใส่แค่ชุดว่ายน้ำอย่างเดียวใช่มั้ย?\""
2003203-51 = "ว่าจะใส่แบบนั้นนะ?"
2003203-52 = "ธารน้ำแข็งก็คือทะเลไง แล้วถ้าอยู่ในทะเลก็ต้องใส่ชุดว่ายน้ำสิ"
2003203-53 = "[s] \"งะ... งั้นเหรอ...?\""
2003203-54 = "ก็ใช่น่ะสิคุณครู คุณครูก็เตรียมชุดว่ายน้ำมาด้วยล่ะ"
2003203-58 = "[ns] \"จะใส่แค่ชุดว่ายน้ำชุดเดียวได้ยังไง!!\""
2003203-59 = "คุณครู?"
2003203-60 = "ว่าไงนะ จะปล่อยฉันไปแบบนี้ไม่ได้งั้นเหรอ? เอ่อ ฉันก็ยังไม่ได้คิดจะแยกกับคุณครูหรอก..."
2003203-61 = "เอ๋?"
2003203-63 = "ที่นี่มัน... ร้านขายของเอาต์ดอร์?"
2003203-64 = "[s5] \"รอครูอยู่ตรงนี้แป๊บหนึ่งนะ\"\n[s6] เลือกของที่จำเป็นสำหรับเอมิ"
2003203-72 = "คุณครู... หนักอะ..."
2003203-73 = "แจ็กเกตหนักๆ กับผ้าพันคอ... ไหนจะกางเกงสกี รองเท้าบูท แล้วก็หมวกขนสัตว์อีก... นี่มันมาตรการป้องกันความหนาวเหรอ?"
2003203-74 = "ดูแล้วมันก็น่ารักอยู่หรอก... แต่มันจะไม่ร้อนไปเหรอ? ปกติแล้วฉันทนอากาศหนาวๆ ได้ดีนะ..."
2003203-75 = "[s7] \"พูดอะไรน่ะ! ใส่ทั้งหมดนี่ไปทำปฏิบัติการเลย!\"\n[s8] \"ห้ามฝ่าฝืนเด็ดขาด!\""
2003203-78 = "อืม..."
2003203-79 = "ให้ลองใส่ดูก่อนว่าพอดีมั้ยงั้นเหรอ? ก็ได้"
2003203-83 = "...อย่ามองด้วยสายตาแบบนั้นสิ ฉันไม่ถอดตรงนี้หรอกน่า เดี๋ยวไปเปลี่ยนในห้องลองชุด"
2003203-85 = "คุณครู ฉันใส่ทุกชิ้นที่เลือกให้แล้ว จะออกไปแล้วนะ"
2003203-93 = "[ns] \"เอ่อ... เอมิ เหมือนจะมีบางอย่างขาดไปนะ\""
2003203-94 = "แต่ถ้าใส่ท่อนล่าง มันจะยิ่งไม่ใช่ชุดว่ายน้ำนะ"
2003203-95 = "[s9] \"ชุดว่ายน้ำมีการกำหนดมาตรฐานท่อนล่างด้วยเหรอ?!\"\n[s10] \"เอาเถอะ... แบบนี้ก็คงได้อยู่มั้ง...\""
2003203-98 = "อื้ม"
2003203-99 = "ขอบคุณนะ คุณครู"
2003203-101 = "(หลังจากช้อปปิ้งกันเสร็จ คุณครูกับเอมิก็ไปนั่งพูดคุยเรื่อยเปื่อยกันในคาเฟ่ จากนั้นก็กลับมาชาเล่ต์)"

[translation]
2003203-1 = "時尚實戰"
2003203-3 = "啊，老師。我在這裡。"
2003203-4 = "我們現在就出發去買衣服吧。"
2003203-5 = "[s]「啊……嗯……你是說泳裝吧……」"
2003203-7 = "泳裝賣場"
2003203-12 = "嗯……"
2003203-13 = "我果然還是不知道該怎麼挑比較好。#n我就全部試穿一遍，讓老師你幫我挑吧。"
2003203-18 = "要我這次不要在試衣間外換衣服？"
2003203-19 = "可是試衣間很窄耶……"
2003203-20 = "而且如果要試穿好幾套的話就得跑來跑去，我覺得還是直接在旁邊換就好……"
2003203-21 = "[s1]「絕對不行！！」\n[s2]「你想要什麼衣服我會幫你拿過去！」"
2003203-25 = "（就這樣一邊勸英美把試衣間的門關上再換衣服，一邊開始挑起泳裝）"
2003203-29 = "老師，你說話的時候為什麼都不看著我……"
2003203-30 = "你仔細看啦。這套怎麼樣？"
2003203-32 = "那這個呢？會不會太熱了……"
2003203-33 = "啊，還有這個也幫我看看。"
2003203-34 = "嗯？叫我挑挑看別的？"
2003203-36 = "可是這件不是我挑的耶，難道是不小心混進來的嗎？"
2003203-37 = "乳牛花紋……？#n雖然我對時尚一竅不通，但真的會有人喜歡這樣的衣服嗎？"
2003203-39 = "（於是在試穿好幾件泳裝後……）"
2003203-40 = "（英美看上了一件他覺得不錯的泳裝，而購物之旅也終於畫下句點）"
2003203-42 = "謝謝你，老師。#n多虧老師才能買到漂亮的泳裝。"
2003203-43 = "既然這次去冰海要穿的泳裝也挑好了……"
2003203-44 = "這次的作戰肯定萬無一失。"
2003203-48 = "[ns3]「作戰……？」\n[ns4]「英美，你該不會打算只穿泳裝去冰海吧？」"
2003203-51 = "我就是這麼打算的唷？"
2003203-52 = "畢竟冰海也是海，去海邊當然要穿泳裝。"
2003203-53 = "[s]「是，是這樣嗎……？」"
2003203-54 = "就是這樣沒錯，所以老師也趕快準備一套泳裝吧。"
2003203-58 = "[ns]「只穿泳裝去那種地方怎麼可能沒問題！！」"
2003203-59 = "老師？"
2003203-60 = "你不能就這樣放我回去？#n那個，其實我本來也沒打算這麼快跟老師道別……"
2003203-61 = "咦？"
2003203-63 = "這裡是……戶外運動用品店？"
2003203-64 = "[s5]「你在這裡等我一下。」\n[s6] 替英美挑選需要的東西"
2003203-72 = "老師……好重喔……"
2003203-73 = "羽絨衣、圍巾……還有滑雪褲、靴子和毛帽……這些不都是禦寒裝備嗎？"
2003203-74 = "雖然看起來都很可愛沒錯……但這樣不會太熱了嗎？#n我其實不太怕冷……"
2003203-75 = "[s7]「不行！你在參加這次作戰的時候一定要把這些衣服通通穿上！」\n[s8]「知道了嗎！」"
2003203-78 = "呃，嗯……"
2003203-79 = "先試穿看看合不合身……？我知道了。"
2003203-83 = "……不要用那種眼神看我，我會去試衣間換好再出來的。"
2003203-85 = "老師，我換好囉。"
2003203-93 = "[ns]「那個……英美，你不覺得身上好像少了點什麼嗎？」"
2003203-94 = "可是要是穿上褲子就不能算泳裝了啊。"
2003203-95 = "[s9]「原來你對泳裝的定義是有沒有穿褲子嗎！？」\n[s10]「算了……這樣應該就行了吧……」"
2003203-98 = "嗯。"
2003203-99 = "謝謝你，老師。"
2003203-101 = "（買完東西後又和英美去咖啡廳稍作閒聊才回到夏萊）"

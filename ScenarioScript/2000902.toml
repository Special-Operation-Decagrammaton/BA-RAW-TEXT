[translation]
2000902-1 = "#Title;학생회장의 겨울휴가"
2000902-2 = "4;체리노 온천ND;99\n#4;a\n#4;em;[...]\n#wait;2500"
2000902-3 = "4;체리노 온천ND;02\n#4;em;[반응]\n#wait;1200"
2000902-4 = "4;체리노 온천ND;03;어서 오게, 콤라드! 기다리고 있었다네!\n#4;em;[음표]\n#4;hophop\n#4;m3"
2000902-5 = "[s] \"어라. 체리노, 혼자야?\""
2000902-6 = "4;체리노 온천ND;04;으음. 그게……\n#4;em;[땀]\n#4;stiff"
2000902-7 = "4;체리노 온천ND;99;모처럼 호화로운 온천장을 통째로 빌렸는데, 사무국의 다른 학생들은 일이 바빠서 올 수 없다고 해서 말이야."
2000902-8 = "4;체리노 온천ND;01;성실한 노동 자세는 칭찬해야 마땅하지만, 본래 일이라는 건 틈틈이 쉬어가며 해야 능률이 오르는 법이거늘. 다들 너무 요령이 없는 게 아닌가?\n#4;em;[?]"
2000902-9 = "4;체리노 온천ND;99;게다가 이렇게 넓은 온천장에서 혼자서만 있으려니, 모처럼의 휴가인데도 즐겁지가 않아서……."
2000902-10 = "4;체리노 온천ND;05;무, 물론 외롭다거나 쓸쓸해서 그런 건 아니라네!\n#4;hophop"
2000902-11 = "4;체리노 온천ND;99;뭇 사람들을 이끄는 지도자의 자리란 본래 고독하고 외로운 법."
2000902-12 = "4;체리노 온천ND;05;붉은겨울 학원의 서기장이자 학생회장이자, 미화부장이자, 청소부장…… 등인 이 몸에게 고독 따위는 아무런 문제도 되지 않으니까!\n#4;em;[!]"
2000902-13 = "4;체리노 온천ND;02;하지만 모처럼 콤라드가 찾아와주었으니, 잠시 정도는 어울려주어도 괜찮겠지."
2000902-14 = "4;체리노 온천ND;99;후후…… 영광으로 알도록, 콤라드!"
2000902-15 = "4;체리노 온천ND;01;……그래서, 이 몸은 지금부터 무얼 즐기면 되는 거지?\n#4;em;…"
2000902-16 = "[s] \"그걸 어째서 내게 묻는 거야?\""
2000902-17 = "#all;hide"
2000902-18 = "3;체리노 온천ND;02;이 몸이 위대한 학생회장이기는 하지만, 온천장에서 휴가를 즐겨본 경험은 없거든.\n#3;em;[반응]"
2000902-19 = "3;체리노 온천ND;99;지난번 구교사에 온천장이 세워졌을 때는 바보들의 뒤처리를 하느라 제대로 쉬지도 못했으니……."
2000902-20 = "3;체리노 온천ND;05;이번에야말로 평소에는 즐기지 못했던 즐거운 일들을 잔뜩 즐겨줄 테다!"
2000902-21 = "3;체리노 온천ND;03;자, 콤라드. 온천장에서만 할 수 있는 멋진 일들을 이 몸에게 제안해보게.\n#3;hophop\n#3;em;[음표]"
2000902-22 = "[s] \"느긋하게 온천욕을 즐긴다던가?\""
2000902-23 = "3;체리노 온천ND;05;목욕은 이미 충분히 했느니라!\n#3;em;[빠직]\n#3;stiff"
2000902-24 = "3;체리노 온천ND;99;오랜 시간 탕에 들어가 있으면 현기증만 나고, 피곤하고…… 목욕을 좋아하는 녀석들의 생각은 이해할 수가 없다니까."
2000902-25 = "[s] \"평소에 읽고 싶었던 만화책을 읽는다던가…….\""
2000902-26 = "3;체리노 온천ND;02;만화책이라면 평소에 사무국에서도 충분히 읽고 있다만."
2000902-27 = "[s] \"맛있는 음식을 먹고 낮잠을 잔다던가……?\""
2000902-28 = "3;체리노 온천ND;99;그 역시 사무국에서 얼마든지 할 수 있는 일이거늘……\n#3;em;…"
2000902-29 = "3;체리노 온천ND;05;우읏! 모처럼 겨울 휴가를 왔는데, 할 수 있는 일이라고는 시시한 것뿐이지 않느냐!\n#3;hophop"
2000902-30 = "3;체리노 온천ND;06;……이럴 줄 알았으면 유원지나 푸딩 공장으로 휴가를 갈 걸 그랬네.\n#3;em;[속상함]"
2000902-31 = "[s1] \"평소에 너무 놀기만 해서 그런 거 아냐?\"\n[s2] \"진짜 휴가가 필요한 거 맞아?\""
2000902-32 = "3;체리노 온천ND;05;시끄럽다, 콤라드! 콤라드도 숙청되고 싶은 것이냐?\n#3;stiff\n#3;em;[빠직]"
2000902-33 = "3;체리노 온천ND;05;시끄럽다, 콤라드! 콤라드도 숙청되고 싶은 것이냐?\n#3;stiff\n#3;em;[빠직]"
2000902-34 = "3;체리노 온천ND;99;모처럼 가진 겨울 휴가를 이렇게 시시하게 보낼 수는 없어…… 뭔가, 다른 건 없나?"
2000902-35 = "3;체리노 온천ND;01;온천장에서만 즐길 수 있는 궁극의 유희가……."
2000902-36 = "#st;[0,0];instant;1;"
2000902-37 = "#clearST"
2000902-38 = "3;체리노 온천ND;02\n#3;em;[반응]\n#wait;1200"
2000902-39 = "3;체리노 온천ND;02\n#3;m4\n#wait;1500"
2000902-40 = "3;체리노 온천ND;02;……응? 저기 휴게실 구석에 있는 탁자는 무엇인가, 콤라드?\n#3;em;[?]"
2000902-41 = "[s] \"저건 탁구대네.\""
2000902-42 = "3;체리노 온천ND;99;흠. 그러고 보니 전에 구교사의 온천장에서도 유카타를 입은 채 탁구에 몰두하는 학생들이 제법 있었지.\n#3;em;…\n#3;m3"
2000902-43 = "3;체리노 온천ND;02;온천장에서 하는 탁구에는 뭔가 특별한 점이라도 있는 걸까?"
2000902-44 = "3;체리노 온천ND;01;지금 바로 시험해봐야겠군."
2000902-45 = "3;체리노 온천ND;03;콤라드, 지금부터 이 몸과 함께 탁구 시합을 하는 거다!\n#3;em;[재잘]\n#3;hophop"
2000902-46 = "[s3] \"아무래도 상관없지만…….\"\n[s4] \"봐주지 않아도 괜찮지?\""
2000902-47 = "3;체리노 온천ND;99;후후, 자신만만한 태도로군.\n#3;em;…"
2000902-48 = "3;체리노 온천ND;99;후후, 자신만만한 태도로군.\n#3;em;…"
2000902-49 = "3;체리노 온천ND;02;그렇게 탁구에 자신이 있다면 푸딩을 걸고 시합을 하는 건 어떤가?"
2000902-50 = "3;체리노 온천ND;05;그것도 평범한 푸딩이 아니라, <르와조 블뢰>의 최고급 말차 푸딩을 걸고 말이지!\n#3;em;[!]"
2000902-51 = "[s] \"좋아.\""
2000902-52 = "3;체리노 온천ND;03;후후, 공짜 푸딩을 먹을 수 있다고 생각하니 벌써부터 의욕이 넘쳐흐르는군.\n#3;em;[///]\n#3;stiff"
2000902-53 = "3;체리노 온천ND;99;그럼……"
2000902-54 = "#st;[0,0];instant;1;"
2000902-55 = "#clearST"
2000902-56 = "3;체리노 온천ND;99\n#3;em;…\n#wait;2500"
2000902-57 = "3;체리노 온천ND;05;승부다!\n#3;closeup\n#fontsize;100"
2000902-58 = "#all;hide"
2000902-59 = "#na;(이후, 체리노와 열심히 탁구를 쳤다.)"
2000902-60 = "#na;(체리노의 탁구 실력은 형편없었지만, 좀처럼 패배를 인정하지 않는 바람에 10세트가 넘도록 경기가 계속 이어졌다…….)"

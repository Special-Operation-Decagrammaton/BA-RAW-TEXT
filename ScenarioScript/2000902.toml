[translation]
2000902-1 = "วันหยุดฤดูหนาวของประธานสภานักเรียน"
2000902-4 = "เชิญเลยสหาย! เรากำลังรออยู่เลย!"
2000902-5 = "[s] \"เอ๊ะ? เชริโน่อยู่คนเดียวเหรอ?\""
2000902-6 = "อื้อ คือว่า..."
2000902-7 = "เราเช่าออนเซ็นสุดหรูนี่ไว้แล้ว แต่นักเรียนคนอื่นๆ ที่สำนักเลขาธิการเกิดมีงานยุ่งเลยมาที่นี่ไม่ได้น่ะ"
2000902-8 = "ถึงแม้ความมุ่งมั่นในการทำงานจะเป็นสิ่งที่ควรยกย่องก็เถอะ แต่ปกติแล้วการทำงานมันก็ควร#nจะหยุดพักบ้าง เพื่อให้มีประสิทธิภาพการทำงานที่ดีขึ้นนะ พวกนั้นช่างไม่รู้แก่นสารเอาซะเลย"
2000902-9 = "นอกจากนี้ การที่ต้องอยู่ที่ออนเซ็นใหญ่ขนาดนี้คนเดียว ถึงจะเป็นวันหยุดก็เถอะ แต่มันไม่สนุกเลย..."
2000902-10 = "นะ...แน่นอนว่าเราไม่ได้เหงาหรือรู้สึกห่อเหี่ยวหรอกนะ!"
2000902-11 = "ผู้ที่อยู่ในตำแหน่งผู้นำของผู้คนจำนวนมากมักจะโดดเดี่ยวและอ้างว้าง..."
2000902-12 = "แต่สำหรับเราที่เป็นถึงเลขาธิการของสหภาพเรดวินเทอร์ ประธานสภานักเรียน หัวหน้าฝ่ายตกแต่ง#nหัวหน้าฝ่ายทำความสะอาด และอื่นๆ แล้ว... ความเหงาไม่เป็นปัญหาสำหรับเราหรอก!"
2000902-13 = "แต่ไหนๆ สหายก็มาถึงที่นี่แล้ว จะมาอยู่เป็นเพื่อนเราสักพักก็ได้นะ"
2000902-14 = "ฮุฮุ... ถือว่าเป็นเกียรติมากนะสหาย!"
2000902-15 = "ถ้างั้น... ตอนนี้เราจะเล่นสนุกอะไรกันดีล่ะ?"
2000902-16 = "[s] \"แล้วทำไมถึงมาถามครูล่ะ?\""
2000902-18 = "ถึงเราจะเป็นประธานสภานักเรียนที่ยิ่งใหญ่ก็ตาม แต่เรายังไม่เคยมีประสบการณ์พักผ่อนที่ออนเซ็นเลย"
2000902-19 = "คราวก่อนตอนที่สร้างออนเซ็นตรงอาคารเรียนเก่า เราต้องไปตามเก็บกวาดเจ้าพวกงี่เง่าทั้งหลาย#nเลยไม่ได้พักผ่อนเต็มที่..."
2000902-20 = "คราวนี้ เราจะให้สหายเพลิดเพลินไปกับสิ่งที่สหายจะไม่ได้สนุกในชีวิตปกติล่ะ!"
2000902-21 = "เอาล่ะสหาย ลองแนะนำเรื่องสนุกสุดยอดที่จะทำได้เพียงแค่ที่ออนเซ็นให้เราสิ"
2000902-22 = "[s] \"ไปแช่น้ำร้อนให้ผ่อนคลาย?\""
2000902-23 = "เราแช่น้ำมาพอแล้วล่ะ!"
2000902-24 = "ถ้าเอาแต่แช่น้ำนานๆ ล่ะก็จะรู้สึกเวียนหัว แล้วก็รู้สึกเหนื่อย... เราไม่เข้าใจความคิด#nของพวกที่ชอบแช่น้ำเอาซะเลย"
2000902-25 = "[s] \"งั้นอ่านหนังสือการ์ตูนที่ชอบอ่านประจำมั้ย...\""
2000902-26 = "ถ้าหนังสือการ์ตูนล่ะก็... เราอ่านที่สำนักเลขาธิการมาพอแล้วล่ะ"
2000902-27 = "[s] \"งั้นไปกินของอร่อยๆ แล้วนอนกลางวันมั้ย...\""
2000902-28 = "เรื่องนอนน่ะ จะให้นอนที่สำนักเลขาธิการเท่าไรก็ได้..."
2000902-29 = "อึ่ก! ไม่ได้หยุดพักร้อนฤดูหนาวตั้งนาน... สิ่งที่ทำได้มีแต่เรื่องไร้สาระพวกนี้รึยังไงกันนะ!"
2000902-30 = "ถ้ารู้ว่าจะเป็นแบบนี้ล่ะก็... เราน่าจะไปพักผ่อนที่สวนสนุกหรือโรงงานพุดดิ้งซะยังจะดีกว่า..."
2000902-31 = "[s1] \"ปกติก็เอาแต่เล่นสนุกอย่างเดียวอยู่แล้วไม่ใช่เหรอ?\"\n[s2] \"อยากไปพักผ่อนจริงๆ รึเปล่าเนี่ย?\""
2000902-32 = "เงียบเถอะน่าสหาย! หรือว่าอยากโดนกวาดล้างรึไง?"
2000902-33 = "เงียบเถอะน่าสหาย! หรือว่าอยากโดนกวาดล้างรึไง?"
2000902-34 = "เราจะไม่ใช้เวลาวันหยุดฤดูหนาวที่#nรอคอยมานานเพื่อเรื่องแบบนี้... ไม่มีอย่างอื่นแล้วเหรอ?"
2000902-35 = "ที่สุดของความสนุกที่จะพบได้ในออนเซ็นเท่านั้น..."
2000902-40 = "หืม...? โต๊ะที่อยู่ตรงมุมห้องพักผ่อนคืออะไรน่ะสหาย?"
2000902-41 = "[s] \"โต๊ะปิงปองน่ะ\""
2000902-42 = "ฮึ่ม พอมาคิดดูแล้ว เมื่อก่อนออนเซ็นที่อาคารเรียนเก่าก็มีนักเรียนที่ใส่ชุดยูกาตะเล่นปิงปอง#nอยู่เหมือนกันนะ"
2000902-43 = "การเล่นปิงปองที่ออนเซ็นมันมีอะไรพิเศษรึเปล่านะ?"
2000902-44 = "สงสัยเราต้องไปลองดูแล้วล่ะ"
2000902-45 = "สหาย! มาแข่งปิงปองกับเรา!"
2000902-46 = "[s3] \"ครูก็ไม่ได้ติดอะไรหรอกนะ...\"\n[s4] \"ไม่ออมมือให้หรอกนะ\""
2000902-47 = "ฮุฮุ ดูมั่นใจน่าดูเลยนะ"
2000902-48 = "ฮุฮุ ดูมั่นใจน่าดูเลยนะ"
2000902-49 = "ถ้ามั่นใจขนาดนั้นล่ะก็ เรามาแข่งโดยเดิมพันกันด้วยพุดดิ้งเป็นไง"
2000902-50 = "และไม่ใช่แค่พุดดิ้งธรรมดานะ แต่เราจะเดิมพันกันด้วยพุดดิ้งมัทฉะชั้นเลิศของร้าน <ลูวาโซ บลู> กัน!"
2000902-51 = "[s] \"ได้อยู่แล้ว\""
2000902-52 = "ฮุฮุ พอคิดว่าจะได้กินพุดดิ้งฟรี... ก็รู้สึกมีไฟขึ้นมาแล้ว"
2000902-53 = "ถ้างั้นก็..."
2000902-57 = "มาดวลกันเลย!"
2000902-59 = "(หลังจากนั้น คุณครูก็เล่นปิงปองกับเชริโน่อย่างดุเดือด)"
2000902-60 = "(ถึงทักษะการเล่นปิงปองของเชริโน่จะไม่ดีนัก แต่การแข่งขันก็ดำเนินต่อไปมากกว่าสิบเซ็ต#nเพราะไม่มีใครยอมใคร...)"

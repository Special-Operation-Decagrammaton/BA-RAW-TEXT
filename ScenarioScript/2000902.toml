[translation]
2000902-1 = "某鬍子學生會長的寒假"
2000902-4 = "你來了啊同志！咱等你很久囉！"
2000902-5 = "[s] 「咦？今天只有潔莉諾一個人嗎？」"
2000902-6 = "唔嗯，這個嘛……"
2000902-7 = "難得把整個豪華的溫泉都包下來了，但大家都太忙了沒辦法來……"
2000902-8 = "雖然那樣勤懇的工作態度是不錯啦，但工作本來就該適度休息，才能提升效率啊……真是的，大家真沒慧根啊！"
2000902-9 = "而且，這個溫泉明明這麼寬敞……"
2000902-10 = "絕，絕對不是因為孤單或是寂寞不安哦！"
2000902-11 = "領導者本來就是孤獨的。"
2000902-12 = "身為赤冬聯邦學園的秘書長兼學生會長，#n以及環境美化部長、整潔部長的咱是不會畏懼孤獨的！"
2000902-13 = "……但是今天難得同志來了，咱就稍微陪你一下吧。"
2000902-14 = "呵呵……這是你的榮幸哦，同志！"
2000902-15 = "話說，咱現在該從哪裡開始享受呢……？"
2000902-16 = "[s] 「……？不用問我，就照潔莉諾喜歡的去做吧……」"
2000902-18 = "雖然咱是偉大的學生會長，至今為止卻幾乎沒有好好享受溫泉的經驗。"
2000902-19 = "之前舊校舍的溫泉浴場建好的時候，#n咱因為忙著幫笨蛋們收拾爛攤子，根本就沒能好好休息……"
2000902-20 = "所以這次咱要好好享受！"
2000902-21 = "好了，同志。給咱提議些能享受溫泉浴場的好活動吧！"
2000902-22 = "[s] 「先悠哉地享受溫泉怎麼樣？」"
2000902-23 = "溫泉已經泡夠了！"
2000902-24 = "泡太久的話會又暈又累……咱真無法理解泡溫泉泡這麼久的人在想些什麼。"
2000902-25 = "[s] 「悠閒地看還沒看完的漫畫呢？」"
2000902-26 = "那是咱平常就會在事務局做的事。"
2000902-27 = "[s] 「吃美食然後睡午覺呢……？」"
2000902-28 = "那也是咱平常在事務局就會做的……"
2000902-29 = "唔唔！明明是難得的寒假，這不是都跟平常一樣嗎！"
2000902-30 = "唔嗯，早知道就去遊樂園或布丁工廠之類的地方了……"
2000902-31 = "[s1] 「會不會是你因為平常過得太放縱了……？」\n[s2] 「感覺你平常就在渡假了呢……？」"
2000902-32 = "少，少囉嗦，同志！你想被肅清嗎？"
2000902-33 = "少，少囉嗦，同志！你想被肅清嗎？"
2000902-34 = "明明是難得的寒假，這樣下去的話……沒有其他方法嗎……？"
2000902-35 = "只有在溫泉浴場才能享受的娛樂……"
2000902-40 = "……嗯？那間休息室角落的桌子是做什麼用的呢，同志？"
2000902-41 = "[s] 「那是桌球桌吧？」"
2000902-42 = "桌球……這麼說來，先前在舊校舍的溫泉浴場，也有不少學生穿著浴衣打桌球呢。"
2000902-43 = "難道說，在溫泉浴場打桌球是常識嗎？"
2000902-44 = "嘛，無論如何先來試試看吧。"
2000902-45 = "好了，同志！現在來和咱一起打桌球吧！"
2000902-46 = "[s3] 「雖然我是無所謂……」\n[s4] 「我能好好地手下留情嗎……？」"
2000902-47 = "哼哼，還真有自信啊。"
2000902-48 = "哼哼，還真有自信啊。"
2000902-49 = "既然這麼有自信，要不要來賭布丁啊？"
2000902-50 = "而且不是一般的布丁，是「L'Oiseau Bleu」最高級的抹茶布丁哦！"
2000902-51 = "[s] 「嗯，完全沒問題。」"
2000902-52 = "哼哼……一想到可以吃到免費的布丁，就覺得鬥志旺盛了呢。"
2000902-53 = "那麼……"
2000902-57 = "一決勝負吧！"
2000902-59 = "（之後跟潔莉諾打了很久的桌球）"
2000902-60 = "（因為潔莉諾打得不好卻又不願意認輸，所以打了超過十局……）"

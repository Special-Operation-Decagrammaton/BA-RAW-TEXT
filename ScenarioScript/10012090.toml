[translation]
10012090-1 = "第9話;渡假勝地使用券的真相"
10012090-6 = "唔，唔唔……"
10012090-7 = "已經撐不下……去～了～……"
10012090-14 = "……好，已經結束了！乖乖投降吧！"
10012090-15 = "只要各位投降，我們就不會繼續戰鬥。"
10012090-17 = "可惡……怎麼會……這怎麼可能……"
10012090-18 = "對方明明只有六個人，為什麼會……！？"
10012090-19 = "至今為止在渡假勝地狩獵連勝的，我們嘩啦嘩啦頭盔團竟然會輸……！？"
10012090-21 = "……連勝？"
10012090-22 = "……渡假勝地狩獵？"
10012090-23 = "又跑出了奇怪的事呢～"
10012090-25 = "……"
10012090-26 = "[ns] 「……」"
10012090-28 = "[ns] 「……若藻。」"
10012090-29 = "……非常抱歉，閣下。"
10012090-30 = "因為我的實力不足……"
10012090-31 = "不過若藻我，是絕對不會放棄的……！#n一定會將閣下……！"
10012090-32 = "請再給我一些時間。#n下次，下次一定……！"
10012090-33 = "[s1] 「若藻，那是誤會哦。」\n[s2] 「我沒事哦，若藻。」"
10012090-34 = "……咦？"
10012090-35 = "……咦？"
10012090-39 = "……您說誤會……是指……"
10012090-40 = "[ns3] 走向若藻\n[ns4] 摸摸若藻的頭"
10012090-47 = "……！？"
10012090-48 = "老，老師……！？"
10012090-49 = "[s5] 「泳衣，很可愛哦。」\n[s6] 「若藻的心意，我確實感受到了。」"
10012090-54 = "……？……？"
10012090-55 = "……失……"
10012090-56 = "[s] 「……失……？」"
10012090-57 = "失，失……"
10012090-58 = "失禮了──！！"
10012090-63 = "……結果到底是怎麼回事啊！？"
10012090-65 = "…………不。"
10012090-66 = "我不會認同……絕對不會認同的！！"
10012090-67 = "別以為我會就這樣放棄！等我攻下其他島嶼……"
10012090-68 = "絕對會把這座島也得到手的……！"
10012090-69 = "我一定……一定會統一這個「渡假勝地群島」，成為這裡的支配者……！！"
10012090-70 = "不，不對不對不對，等一下啦！"
10012090-71 = "不認同是指……什麼？"
10012090-72 = "我們是因為抽中了渡假勝地使用券才來這裡的……渡假勝地群島，是指什麼？"
10012090-73 = "統一渡假勝地什麼的……你們到底在說什麼？"
10012090-78 = "呃……真的假的……"
10012090-79 = "你們不是「渡假勝地獵人」嗎……？"
10012090-80 = "好吧，算了……看你們好像什麼都不知道，就告訴你們吧。"
10012090-81 = "就算你們沒有進行渡假勝地狩獵的打算，也還是會被像我們這樣的人繼續襲擊哦。"
10012090-82 = "在這個「群島」的人全都是敵人的意思。"
10012090-84 = "……渡假勝地狩獵？"
10012090-85 = "……群島？"
10012090-86 = "那是，什麼……"
10012090-87 = "喂，好好聽人說話啊！我們可是有這個渡假勝地的使用權哦？"
10012090-89 = "渡假勝地使用權的話，我們也有哦？"
10012090-90 = "看，是這個吧。"
10012090-92 = "……咦！？這，這是怎麼……"
10012090-93 = "這是什麼……和我們一樣的東西……？"
10012090-95 = "你們是不是抽中了什麼獎品來到這裡的？"
10012090-97 = "……！！"
10012090-98 = "你怎麼知道……？"
10012090-99 = "在這裡的人，大家都一樣是透過某種手段拿到這個來到「群島」的。"
10012090-100 = "持有這個渡假勝地「使用」權力的人除了我們以外……"
10012090-102 = "……這整個群島到處都是哦！"
10012090-105 = "咦──！！？？"
10012090-113 = "那，那是真的嗎……？喂，契約書在哪裡！？"
10012090-114 = "在這裡……就像那位同學說的一樣，在下面條款的地方密密麻麻地寫著。"
10012090-115 = "本契約書的當選者（以下簡稱契約者）將獲得「失樂園渡假勝地」的「使用權限」。"
10012090-116 = "上述的「使用權限」包含渡假勝地的所有土地、物品及設備的使用權限……"
10012090-117 = "以及因而產出的所有收益和資源……"
10012090-118 = "……難道說「使用權」是那個意思？"
10012090-119 = "原來如此……我總算明白了。#n這顯然是[ruby=poison pill]毒丸條款[/ruby]呢。"
10012090-120 = "雖然乍看之下是以島為單位簽訂的公平契約……"
10012090-121 = "然而實際上，契約書中的「失樂園渡假勝地」指的卻是這整座群島。#n也就是說，大家都持有相同的權利。"
10012090-122 = "只是因為契約書上地圖的部分被分成數個島嶼，所以一開始沒有注意到而已……"
10012090-123 = "但是漸漸地……出現了像他們一樣理解契約「漏洞」的人，#n並開始對其他群島展開攻擊……是這麼回事吧？"
10012090-124 = "就是那樣。所以我們才會在進行「渡假勝地狩獵」！！#n你們也差不多理解了吧？"
10012090-125 = "……是。也就是說，#n現在處於彼此都主張擁有島嶼的所有權，因而互相戰鬥的狀態對吧。"
10012090-126 = "大家，這裡很危險。#n這個契約和這座群島……怎麼想都很不妙。"
10012090-127 = "我們應該在被捲入得更深之前，趕緊回到阿拜多斯比較……"
10012090-129 = "…………！！"
10012090-130 = "……有破綻！！"
10012090-134 = "……！咳咳，咳咳！！唔唔！？"
10012090-135 = "煙霧彈……！？竟然還藏著這種東西……！"
10012090-136 = "別以為這樣就結束了！下次見面的時候不會再像這樣被打敗了！！"
10012090-137 = "要睡到什麼時候啊！！先暫時撤退！！快點，全員撤退！！"
10012090-138 = "呃，是！？啊，撤，撤退！"
10012090-139 = "撤退至氣墊船──！！"
10012090-144 = "哎呀……走掉了呢……"
10012090-146 = "……唔嘿。"
10012090-148 = "……真是個忙碌的夏天呢。"

[translation]
10012090-1 = "Episode 9; The Truth of the Resort Contract"
10012090-6 = "N-No way..."
10012090-7 = "This...is it..."
10012090-14 = "It's over! Give it up right now!"
10012090-15 = "As long as you surrender, we won't harm you."
10012090-17 = "Are you...kidding... This is ridiculous."
10012090-18 = "You're telling me our full force couldn't take out this little group?"
10012090-19 = "We, the Helmet Gangsters, were reigning victors of the Resort Hunt. How are you so strong?!"
10012090-21 = "...Reigning victors?"
10012090-22 = "...Resort Hunt?"
10012090-23 = "I have no idea what any of that means."
10012090-25 = "......"
10012090-26 = "[ns] \"...\""
10012090-28 = "[s] \"...Wakamo.\""
10012090-29 = "...I'm sorry, Sensei."
10012090-30 = "This is my fault..."
10012090-31 = "B-But...! I promise I'll come back to rescue you!"
10012090-32 = "Please, hold on just a little longer. I promise, Sensei!"
10012090-33 = "[s1] \"No, Wakamo. There's a misunderstanding.\"\n[s2] \"Wakamo, I'm perfectly fine.\""
10012090-34 = "...?"
10012090-35 = "...?"
10012090-39 = "Wh-What do you mean?"
10012090-40 = "[ns3] Approach Wakamo.\n[ns4] Pat Wakamo's head."
10012090-47 = "...?!"
10012090-48 = "S-Sensei?!"
10012090-49 = "[s5] \"...That's a nice swimsuit.\"\n[s6] \"I really appreciate you.\""
10012090-54 = "...? ...?"
10012090-55 = "...E..."
10012090-56 = "[s] \"E...?\""
10012090-57 = "...E..."
10012090-58 = "...EXCUUUSE MEEEEEE!"
10012090-63 = "...Whaaaat?!"
10012090-65 = "...I refuse."
10012090-66 = "I won't take this lying down! Who do you think I am?"
10012090-67 = "I'll occupy more islands! I'll increase my forces beyond your wildest dreams."
10012090-68 = "I'll take this place from you! ...One day."
10012090-69 = "I will achieve my dream! I'm going to unite all the resorts of the archipelago and rule over them!"
10012090-70 = "No, no, no, no. Wait!"
10012090-71 = "Occupy this? Can't accept that? What in Kivotos' name are you saying?!"
10012090-72 = "We're only here because of the vacation Serika won in a giveaway... What do you mean by \"resorts of the archipelago\"?"
10012090-73 = "Explain! You owe us this much!"
10012090-78 = "...Are you...for real...?"
10012090-79 = "You're not even Resort Hunters? Ugh. I really got beat by a bunch of normies?"
10012090-80 = "Ugh! You look genuinely clueless, so I'll explain."
10012090-81 = "Whether you want to be or not, you're our competitors. And it's not just us."
10012090-82 = "As long as you're on this archipelago, you're part of the game."
10012090-84 = "Resort...what?"
10012090-85 = "...Archipelago?"
10012090-86 = "I'm sorry. Competitors?"
10012090-87 = "You really don't get it?! Look, here are our tickets!"
10012090-89 = "You're the one who's not getting it! I have the same thing!"
10012090-90 = "Here! If you don't believe me, look!"
10012090-92 = "I-It looks exactly the same..."
10012090-93 = "Really?! What the heck? It is the same!"
10012090-95 = "Obviously! Seriously, why did you guys come here?! Didn't you get the contract?"
10012090-97 = "...!"
10012090-98 = "How did you know that?"
10012090-99 = "Because that's the only way you can get to this archipelago."
10012090-100 = "Do you finally get it?! People with the rights to the resort..."
10012090-102 = "...are all over this archipelago!"
10012090-105 = "Whaaat?!"
10012090-113 = "N-No way! Ayane, the contract!"
10012090-114 = "I have it... Let me see...the terms and conditions at the bottom..."
10012090-115 = "The owner of this contract obtains the right to use the Lost Paradise Resort."
10012090-116 = "The above \"right to use\" refers to the rights of all land, goods, and facilities of the resort, as well as..."
10012090-117 = "...All revenue and resources generated by the resort..."
10012090-118 = "I thought all those papers was just supposed to get us some beds and a hot meal!"
10012090-119 = "Unfortunately, it seems it's very intentionally worded to cause chaos."
10012090-120 = "At first glance, it seems legit. Each individual island had its own winner."
10012090-121 = "However, the contract states the \"Lost Paradise Resort\", which is the entire archipelago."
10012090-122 = "It's never outright stated that there are multiple islands."
10012090-123 = "But people must have realized the contract's loophole, and began attacking other islands to claim their resorts."
10012090-124 = "And that turned into the Resort Hunt! You finally got it!"
10012090-125 = "Yes. It's a macabre game to earn money and power."
10012090-126 = "It's dangerous here, everyone. I don't like this at all."
10012090-127 = "We should get out of here before the situation escalates."
10012090-129 = "...!"
10012090-130 = "Gotcha!"
10012090-134 = "...! *cough cough*"
10012090-135 = "A smoke bomb...?! Where was she hiding that?"
10012090-136 = "The next time we meet will be your demise! Hahaha!"
10012090-137 = "Stand up! Retreat! Everyone, retreat!"
10012090-138 = "H-Huh?! Oh! R-Retreat!"
10012090-139 = "Retreat to the hovercraft!"
10012090-144 = "They left as suddenly as they came."
10012090-146 = "...Heh."
10012090-148 = "What a chaotic summer vacation."

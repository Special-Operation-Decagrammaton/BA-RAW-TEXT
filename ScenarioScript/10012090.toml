[translation]
10012090-1 = "ตอนที่ 9;ความจริงของตั๋วใช้งานรีสอร์ต"
10012090-6 = "อะ... เฮือก..."
10012090-7 = "สู้ต่อ... ไม่ไหวแล้ว..."
10012090-14 = "เอาละ... มันจบแล้ว! ยอมจำนนแต่โดยดีเถอะ!"
10012090-15 = "ถ้ายอมจำนน พวกเราก็จะไม่ต่อสู้อีกค่ะ"
10012090-17 = "อึก... อะไรกัน... เป็นไปได้ยังไง..."
10012090-18 = "มีกันแค่ 6 คนแท้ๆ แต่กลับจัดการกองกำลังมากมายขนาดนี้ได้งั้นเหรอ...!?"
10012090-19 = "ที่ผ่านมาแก๊งหมวกกันน็อกป๋อมแป๋มของฉันชนะในการล่ารีสอร์ตมาอย่างต่อเนื่องเลยนะ...!?"
10012090-21 = "ชนะต่อเนื่อง?"
10012090-22 = "การล่ารีสอร์ต?"
10012090-23 = "พูดเรื่องแปลกๆ อีกแล้ว ไม่เห็นจะเข้าใจเลย พักร้อนรอบนี้เจอแต่เรื่องแปลกใหม่อยู่เรื่อย~"
10012090-25 = "....."
10012090-26 = "[ns] \"......\""
10012090-28 = "[ns] \"...... วาคาโมะ\""
10012090-29 = "ขอโทษด้วยนะคะ... คุณครู..."
10012090-30 = "เป็นเพราะฉันไม่เก่งพอ..."
10012090-31 = "แต่วาคาโมะผู้นี้... จะไม่ยอมแพ้หรอกนะคะ...! ฉันจะมาช่วยคุณครูให้ได้เลยค่ะ!"
10012090-32 = "คุณครูช่วยรออีกหน่อยนะคะ ฉันจะต้อง... มาช่วย...!"
10012090-33 = "[s1] \"ฟังก่อนวาคาโมะ นี่มันเรื่องเข้าใจผิด\"\n[s2] \"วาคาโมะ ครูไม่ได้เป็นอะไร\""
10012090-34 = "คะ...?"
10012090-35 = "คะ...?"
10012090-39 = "เข้าใจผิด... งั้นเหรอคะ? หมายความว่ายังไง..."
10012090-40 = "[ns3] ไปหาวาคาโมะ\n[ns4] ลูบหัววาคาโมะ"
10012090-47 = "......!?"
10012090-48 = "คะ... คุณครู...!?"
10012090-49 = "[s5] \"ชุดว่ายน้ำสวยดีนะ วาคาโมะ\"\n[s6] \"ครูรับรู้ถึงเจตนาดีของวาคาโมะแล้วละ\""
10012090-54 = "......? ......?"
10012090-55 = "...... ขอ ......"
10012090-56 = "[s] \"...... ขอ ......?\""
10012090-57 = "...... ขอ ......"
10012090-58 = "ขอ... ขอโทษด้วยค่ะ!!"
10012090-63 = "อะไรเนี่ยยย!?!"
10012090-65 = "เดี๋ยวก่อน..."
10012090-66 = "ไม่! แบบนี้ฉันยอมรับไม่ได้... ยอมรับไม่ได้เด็ดขาด...!"
10012090-67 = "อย่าคิดว่าฉันจะยอมแพ้แค่นี้นะ แล้วฉันจะกลับมาใหม่...! หลังจากโจมตีเกาะมากขึ้น แล้วสร้างอำนาจที่ยิ่งใหญ่!!"
10012090-68 = "แล้วตอนนั้นฉันจะมาทำให้ที่นี่อยู่ในกำมือของฉัน! ไม่ช้าก็เร็ว!!"
10012090-69 = "ฉันจะต้อง... 'รวมรีสอร์ตทั้งหมดของหมู่เกาะให้เป็นหนึ่ง' ด้วยมือของฉัน แล้วเป็นผู้ปกครองของที่นี่!!"
10012090-70 = "เดี๋ยวๆๆๆ เดี๋ยวก่อน!"
10012090-71 = "เพ้อเจ้ออะไรตั้งแต่เมื่อกี๊แล้ว ยอมรับไม่ได้งั้นเหรอ? ยอมรับอะไรล่ะนั่นน่ะ?"
10012090-72 = "พวกฉันได้มาเที่ยวที่นี่เพราะได้ตั๋วใช้งานรีสอร์ตที่เซริกะจังได้มาก็เท่านั้น... ว่าแต่หมู่เกาะรีสอร์ต... นี่มันเรื่องอะไรกันคะ...?"
10012090-73 = "อย่าเอาแต่พึมพำกับตัวเองสิ อธิบายให้มันรู้เรื่องเลยนะ!"
10012090-78 = "หา...? พูดจริงเหรอ..."
10012090-79 = "พวกเธอไม่ได้เป็น 'นักล่ารีสอร์ต' หรอกเหรอ...? แล้วฉันแพ้คนแบบนี้เนี่ยนะ ยิ่งเจ็บปวดกว่าเดิมอีกแฮะ..."
10012090-80 = "แต่ก็ช่างเถอะ... พวกเธอคงไม่รู้อะไรสินะ งั้นฉันจะบอกให้เอาบุญ"
10012090-81 = "ไม่ว่าพวกเธอจะพูดอะไร สุดท้ายแล้วพวกเธอก็คือคู่แข่งของฉัน และไม่ใช่แค่พวกเธอเท่านั้นนะ..."
10012090-82 = "ทุกคนที่อยู่ใน 'หมู่เกาะ' นั่นแหละ แค่พวกนั้นยังไม่รู้เรื่องที่จะเกิดขึ้นกับตัวเองในอนาคตก็เท่านั้น"
10012090-84 = "ว่าไงนะ...?"
10012090-85 = "หมู่เกาะเหรอ...?"
10012090-86 = "คู่แข่งงั้นเหรอคะ...? หมายความว่ายังไง..."
10012090-87 = "เดี๋ยวก่อน ฟังคนอื่นพูดบ้างสิ พวกเรามีหนังสือสัญญา..."
10012090-89 = "พวกเธอต่างหากที่ไม่ฟังคนอื่นพูด!! ถ้าเป็นหนังสือสัญญานั่น ฉันก็มีเหมือนกัน!!"
10012090-90 = "นี่ไง! ถ้าไม่เชื่อก็มาดูเองเลย!!  ดูสิ!!"
10012090-92 = "หืม...!?  นี่มันอะไรกัน..."
10012090-93 = "อะ... อะไรเนี่ย!?  อะไรกัน!?  จริงเหรอ? เหมือนกับของเราเป๊ะๆ เลยเหรอ!?"
10012090-95 = "ก็ใช่น่ะสิ!! พวกเธอมาที่นี่ตั้งแต่แรกได้ยังไง? คงเพราะได้หนังสือสัญญาที่เป็น <ตั๋วใช้งานรีสอร์ต> มาล่ะสิ?!"
10012090-97 = "......!!"
10012090-98 = "ทำไมคุณถึง..."
10012090-99 = "ทำไมถึงรู้ได้น่ะเหรอ? พวกที่มาหมู่เกาะนี้ก็ได้ตั๋วนี้กันมาทั้งนั้น"
10012090-100 = "ทีนี้เข้าใจหรือยัง? คนที่มีสิทธิ์จะ 'ใช้งาน' รีสอร์ตนี้เหมือนกับพวกเธอน่ะ..."
10012090-102 = "... มีอยู่เต็มหมู่เกาะนี้เลยไงเล่า!"
10012090-105 = "ว่ายังไงนะะะะ!?!?"
10012090-113 = "นะ... นั่นมัน...! เป็นเรื่องจริงเหรอ? เอาหนังสือสัญญามาดูซิ...!"
10012090-114 = "นี่ค่ะ เหมือนที่เขาบอกเลย... ข้างล่างมีเงื่อนไขเขียนไว้เพียบเลยค่ะ "
10012090-115 = "ผู้ทำสัญญาของหนังสือสัญญานี้จะได้รับ 'สิทธิ์ในการใช้งาน' ลอสต์ พาราไดซ์ รีสอร์ต"
10012090-116 = "'สิทธิ์ในการใช้งาน' หมายถึงสิทธิ์ในที่ดินทั้งหมดของรีสอร์ต และของใช้และอุปกรณ์ทั้งหมด และก็..."
10012090-117 = "สามารถเป็นเจ้าของทรัพยากรและรายได้ทั้งหมดที่เกิดขึ้น..."
10012090-118 = "นั่นคือความหมายของ 'สิทธิ์การใช้งาน' งั้นเหรอ? เรื่องจริงเหรอเนี่ย? ไม่ได้ให้แค่มานอนพักหรอกเหรอ?"
10012090-119 = "เป็นแบบนี้เองสินะคะ... ตอนนี้ฉันเข้าใจแล้วค่ะ เป็นข้อกำหนดที่เสียเปรียบอย่างชัดเจนเลยค่ะ"
10012090-120 = "ดูผ่านๆ ก็จะคิดว่าเป็นการถูกรางวัลที่ยุติธรรม เพราะมันเขียนเหมือนกับว่าได้ทำสัญญากับแต่ละเกาะ#nไว้แล้ว"
10012090-121 = "แต่ที่จริงแล้วทั้งหมดของหมู่เกาะนี้... คือลอสต์ พาราไดซ์ รีสอร์ตเพียงแห่งเดียวค่ะ ที่จริงก็คือทุกคนมีสิทธิ์เท่าเทียมกัน"
10012090-122 = "แต่เมื่อมันแบ่งออกเป็นเกาะต่างๆ ทุกคนเลยไม่ได้สังเกตเห็นมันในตอนแรก"
10012090-123 = "แต่ว่า... คนที่ตระหนักถึง 'ช่องโหว่' ในสัญญาก็มาปรากฏตัวทีละคนสองคนและเริ่มโจมตีเกาะอื่น..."
10012090-124 = "จนเกิดเป็น 'การล่ารีสอร์ต' อย่างตอนนี้ไง!! ดูเหมือนจะเข้าใจสถานการณ์ได้สักทีนะ!!"
10012090-125 = "ค่ะ... แล้วทุกคนก็ทะเลาะกัน เพราะยืนกรานว่าแต่ละเกาะเป็นของตัวเองไงคะ"
10012090-126 = "ที่นี่คือที่ที่อันตรายนะคะทุกคน ทั้งหนังสือสัญญา ทั้งเกาะพวกนี้... ฉันรู้สึกไม่ดีเลยค่ะ"
10012090-127 = "เราต้องรีบออกไปจากที่นี่ ก่อนที่จะเจออะไรที่แย่กว่านี้..."
10012090-129 = "..........!!"
10012090-130 = "..... ใช้ช่องโหว่นี้แหละ!!"
10012090-134 = "......! แค่กๆ แค่กๆ...! อึก!?"
10012090-135 = "ระเบิดควัน...!?  ซ่อนของแบบนั้นไว้ที่นี่งั้นเหรอ...!"
10012090-136 = "เราต้องได้เจอกันใหม่! ถึงตอนนั้นก็อย่าคิดล่ะว่าฉันจะยอมโดนเล่นงานอีก!!"
10012090-137 = "ลุกขึ้น! ถอนกำลังก่อน!!! ทุกคนถอยก่อน!!"
10012090-138 = "หืม!?  อ้อ!  ถะ... ถอยก่อน!"
10012090-139 = "กลับเรือโฮเวอร์คราฟต์!!"
10012090-144 = "อืม... ไปซะแล้วค่ะ..."
10012090-146 = "เฮ้อ..."
10012090-148 = "เป็นฤดูร้อนที่ไม่ได้พักกันเลยนะ..."

[translation]
83306075100-6 = "大家都聚集在這裡……而且還亂哄哄的。"
83306075100-7 = "呃！風紀委員長！？你怎麼會在這裡！？"
83306075100-8 = "我只是在巡邏而已。"
83306075100-9 = "我們什麼都還沒做哦！"
83306075100-10 = "就是說啊！在我們犯錯之前沒理由被抓走！"
83306075100-12 = "……我不會不分青紅皂白亂抓人。"
83306075100-13 = "雖然我們經常見面，就算會產生那種誤會也情有可原就是了。"
83306075100-14 = "話說回來，聚集在入口這邊的原因是什麼？"
83306075100-15 = "……子。"
83306075100-16 = "嗯？"
83306075100-17 = "是蟲子！蟲子！有隻非常大的蟲子在床底下消失不見了！"
83306075100-18 = "所以根本就沒辦法進去！#n難得來到急救醫學部也沒辦法躺在床上！"
83306075100-20 = "哼嗯，蟲子啊。"

[translation]
83306075100-6 = "พอทุกคนมารวมตัวกันในที่แบบนี้... ก็วุ่นวายพอตัวเลยนะ"
83306075100-7 = "เฮือก? ประธานกรรมการวินัย?! ทำไมถึงมาอยู่ที่นี่ได้?!"
83306075100-8 = "ฉันมาสำรวจรอบๆ น่ะ จะได้เป็นการลาดตระเวนพื้นที่สถาบันเกเฮนน่าไปด้วย"
83306075100-9 = "ขะ... ขอบอกไว้ก่อนนะว่าพวกเราไม่ได้ลงมือทำอะไรเลย!"
83306075100-10 = "ใช่! เรายังไม่ได้ทำความผิดอะไร จะมาจับตัวเราไปไม่ได้นะ!"
83306075100-12 = "เดี๋ยวสิ... เห็นฉันแล้วต้องคิดว่าฉันจะมาจับตัวตลอดเลยรึไง"
83306075100-13 = "ถึงจะเข้าใจได้ที่เข้าใจผิดแบบนั้น เพราะปกติแล้วเราได้เจอหน้ากันบ่อยๆ ก็เถอะนะ"
83306075100-14 = "แล้วทำไมถึงมารวมตัวกันอยู่หน้าทางเข้าแบบนี้ล่ะ ทำไมไม่ไปอยู่ในห้องผู้ป่วย?"
83306075100-15 = "มะ..."
83306075100-16 = "หืม?"
83306075100-17 = "แมลงไง แมลง! มีแมลงตัวใหญ่หนีหายเข้าไปใต้เตียงน่ะสิ!"
83306075100-18 = "พวกเราก็เลยไม่กล้าเข้าไปไงล่ะ! อุตส่าห์มาที่ห้องหน่วยแพทย์ฉุกเฉินแล้วทั้งที! แต่ก็ไม่ได้นอนบนเตียงดีๆ!"
83306075100-20 = "อืม แมลงงั้นเหรอ"

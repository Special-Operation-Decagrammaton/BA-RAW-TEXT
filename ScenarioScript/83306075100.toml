[translation]
83306075100-6 = "This seems like an odd place to have a gathering. You're making quite the commotion."
83306075100-7 = "Huh?! Head Prefect?! Why are you here?!"
83306075100-8 = "I was merely patrolling around Gehenna Academy."
83306075100-9 = "Bu-Bu-But we didn't do anything yet!"
83306075100-10 = "Y-Yeah! We haven't done any crimes yet! You have no right to arrest us!"
83306075100-12 = "...I hardly take people in as soon as I see them."
83306075100-13 = "I understand why you have the misconception though, given how I tend to take you in whenever we meet."
83306075100-14 = "So, is there a reason you're all huddled by these doors, rather than in a medical bed?"
83306075100-15 = "...Bug."
83306075100-16 = "Hm?"
83306075100-17 = "A bug! A huge bug went under my bed!"
83306075100-18 = "I can't go back in! I refuse! Even the Medical Emergency Club can't save me from a b-b-bug!"
83306075100-20 = "Really. A bug?"

[translation]
10044075-2 = "Ugh! These brats are stronger than I thought..."
10044075-3 = "If we'd made it just a little farther...we could've taken over the whole Black Market..."
10044075-8 = "How big are these rumors getting?"
10044075-9 = "Even we don't know what's in here."
10044075-10 = "You know those goblins who guard chests and stuff? Pahyahya, now I know how they feel!"
10044075-12 = "*sigh*"
10044075-13 = "Situation under control."
10044075-14 = "[ns1] \"Thanks again, Iori.\"\n[ns2] \"And the Prefect Team comes through again.\""
10044075-17 = "You're in our jurisdiction. Of course we intervened."
10044075-18 = "That...doesn't mean we're going to let you go."
10044075-19 = "..."
10044075-20 = "...Well, I suppose you always have your reasons, whichever students you're with at the time."
10044075-21 = "[s] \"So you believe me...!\""
10044075-22 = "What I believe is that you're going to visit the Prefect Team right after this and explain everything."
10044075-23 = "And since you're on your way out of our district, I'll leave you to it."
10044075-24 = "Pahyahya, nice work! You're like the Prefect Team ace!"
10044075-25 = "No, I'm no ace."
10044075-26 = "Even though the train was moving, perfect hit! Hikari's impressed!"
10044075-28 = "Th-Thank you, truly... My life was flashing before my eyes. You saved us..."
10044075-29 = "I-I'll find a way to repay you, even if it's out of my own pocket!"
10044075-30 = "...Hm."
10044075-31 = "Well...take care, friends from Highlander."
10044075-32 = "And you too, Sensei."
10044075-33 = "[s] \"Yeah. Thanks again, Iori.\""
10044075-37 = "Wow, Sensei, I didn't think we'd meet any friends of yours along the way!"
10044075-38 = "It really does come down to who you know, doesn't it? Friends and connections...how the hell am I supposed to make it in a world like this?"
10044075-39 = "You have nooo friends?"
10044075-40 = "H-HOW do you think it feels to hear that question?!"
10044075-41 = "Looks like nooo friends."
10044075-42 = "*sigh* Wearing a uniform doesn't make you any less of a bratty child."
10044075-43 = "Hikari has looots of friends. Just ask Sensei."
10044075-44 = "You're just going to keep on pushing me, aren't you? ...Sensei is going to be Sensei, no matter how you act."
10044075-45 = "Huh...?"
10044075-46 = "I was gonna say, would you LIKE to be friend-y?"
10044075-47 = "Wh-Why do you ask—? Oh. Oh, no. Look at the cargo."
10044075-49 = "The case is cracked. Must've been that last explosion."
10044075-51 = "Hmm. Luckily, it looks like it's just a little crack in the casing..."
10044075-55 = "...Huh. So this IS a treasure train."
10044075-56 = "[ns] \"Wow...\""
10044075-59 = "Tch... This is NOT how I thought it would go."
10044075-60 = "W-What should we do now, President?"
10044075-61 = "It's a total free-for-all mess. Everyone attacking each other, and then Gehenna showed up, even..."
10044075-62 = "I think we lost the others, but we lost the train too..."
10044075-63 = "..."
10044075-64 = "Are we screwed?"
10044075-65 = "No. There's always a way."
10044075-66 = "Whether you're doing a delivery, or stuck in traffic, or having some road rage..."
10044075-67 = "There's always a way. We just haven't found it yet..."
10044075-72 = "...Ah! Got it. We flip the script."
10044075-73 = "H-How??"
10044075-74 = "Before the client switched couriers, they told us where the drop-off would be."
10044075-75 = "We'll get there ahead of them, wait for them..."
10044075-77 = "...then we stick 'em up for the cargo..."
10044075-79 = "...and then we turn around and hand it to the client!"
10044075-81 = "Is...that okay?"
10044075-83 = "I-I'm not too smart about this stuff, but does that count as a \"delivery\"?"
10044075-84 = "Absolutely, it does!"
10044075-85 = "We'll be the \"last mile courier.\" That's what they call it. Doesn't matter how it gets into the client's hands, as long as it gets there, right?"
10044075-86 = "I-I guess so..."
10044075-87 = "That'll make us a major player in the industry. Then we'll build our organization all over Kivotos!"
10044075-88 = "Our dreams will finally come true!"
10044075-89 = "Let's go. They're ahead of us now, but we've got speed on our side!"

[translation]
10044075-2 = "可惡！這些傢伙……出乎意料的強！"
10044075-3 = "我，我不甘心！#n明明只要能得到這輛列車……就能主宰黑市了說……"
10044075-8 = "那種莫名其妙的傳言到底傳到哪裡去了……"
10044075-9 = "這裡載著什麼我們也不知道～"
10044075-10 = "稍微能理解寶物哥布林的心情了呢！噗哈哈！"
10044075-12 = "呼……"
10044075-13 = "大致處理得差不多了。"
10044075-14 = "[ns1]「謝謝你，伊織。」\n[ns2]「多虧風紀委員會的幫助，我們才能平安度過危機。」"
10044075-17 = "畢竟騷動發生在格黑娜自治區，我們本來就該介入……"
10044075-18 = "但我還是不太確定，就這樣放老師和這輛列車離開到底對不對就是了……"
10044075-19 = "……"
10044075-20 = "不過老師每次跟學生們一起行動的時候，總是有原因的。"
10044075-21 = "[s]「原來你這麼相信我啊……！」"
10044075-22 = "事情結束之後，你一定要來風紀委員會把事情說清楚哦。"
10044075-23 = "那麼現在也差不多要離開格黑娜自治區了。#n我就先告辭……"
10044075-24 = "噗哈哈，真厲害！不愧是風紀委員會的王牌！"
10044075-25 = "沒有，我不是什麼王牌……"
10044075-26 = "在車頂上百發百中～光好佩服～"
10044075-28 = "真，真的非常謝謝你……#n剛剛我眼前已經一片黑暗……託你的福才撿回一命……"
10044075-29 = "之，之後我一定會私下報答你的！"
10044075-30 = "唔嗯……"
10044075-31 = "……好好保重吧，各位高地人的朋友。"
10044075-32 = "當然老師也是。"
10044075-33 = "[s]「嗯。謝謝你，伊織。」"
10044075-37 = "哇～不愧是老師。#n竟然連在這種地方都會遇到認識的學生！"
10044075-38 = "就，就是說啊……果然這個世界沒有人脈是不行的……#n像，像我這種人要怎麼活下去……"
10044075-39 = "青葉你沒朋友嗎～？"
10044075-40 = "你不覺得直接問這種問題很傷人嗎？"
10044075-41 = "看來是沒有～"
10044075-42 = "輪，輪不到小毛頭幹部來說我……"
10044075-43 = "光的朋友超多～老師也是朋友～"
10044075-44 = "到底要得寸進尺到什麼地步……人家可是老師耶……"
10044075-45 = "咦……？"
10044075-46 = "怎麼了～？青葉也想交朋友嗎～？"
10044075-47 = "我，我哪有？#n是，是這邊的貨物……"
10044075-49 = "嗯？箱子有點破了呢。#n是因為剛才的炸彈嗎？"
10044075-51 = "幸，幸好看起來只是外層稍微破損而已……"
10044075-55 = "沒，沒想到裡面竟然是這種東西……"
10044075-56 = "[ns]「這是……」"
10044075-59 = "呃呃……沒想到事情會變成這樣……"
10044075-60 = "總，總長……該怎麼辦？"
10044075-61 = "現在情況變得亂七八糟的……#n各方勢力打成一團，再加上格黑娜風紀委員會介入……"
10044075-62 = "好，好消息是其他傢伙都被淘汰得差不多，但壞消息是列車也跑了……"
10044075-63 = "……"
10044075-64 = "再這樣下去，計畫就要徹底失敗……"
10044075-65 = "不……路是輪子走出來的。"
10044075-66 = "外送也好，飆車也好，看似水洩不通的馬路也好……"
10044075-67 = "只要願意去闖就能找到出路……我們現在只是還沒發現而已……！"
10044075-72 = "對耶，我想到了！#n只要轉換一下思維就行了！！"
10044075-73 = "什，什麼意思？"
10044075-74 = "我知道列車的目的地是哪裡。#n委託人那傢伙本來要把工作交給我們的時候，我就去勘查過了。"
10044075-75 = "我們只要早一步抵達目的地……！！"
10044075-77 = "一舉奪下貨物之後……！！"
10044075-79 = "再把搶來的貨物直接交給委託人就搞定了！！！"
10044075-81 = "這樣真的可以嗎！？"
10044075-83 = "我，我頭腦不好聽不太懂……不過那好像跟配送有點不一樣！？"
10044075-84 = "不！這就是配送！！"
10044075-85 = "只是貨物在過程中的集散過程不太一樣而已，最終交貨的人還是我們啊？"
10044075-86 = "是，是嗎……？"
10044075-87 = "我們將藉此躍升為業界的巨頭，拓展成服務範圍涵蓋整個奇普托斯的配送業者！"
10044075-88 = "沒錯……！我們的夢想一定會實現的！！"
10044075-89 = "走，我們快出發吧！#n雖然落後了一點，但速度可是我們的強項啊！！"

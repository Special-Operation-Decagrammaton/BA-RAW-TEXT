[translation]
10044075-2 = "อึก! พวกนั้น... เก่งกว่าที่คิดอีกแฮะ!"
10044075-3 = "จะ... เจ็บใจชะมัด! ถ้าได้รถไฟขบวนนี้มาอยู่ในกำมือละก็... น่าจะรวมตลาดมืดให้เป็นหนึ่งได้แล้วเชียว..."
10044075-8 = "ข่าวลือเหลวไหลแพร่กระจายไปถึงไหนแล้วคะเนี่ย..."
10044075-9 = "เราเองยังไม่รู้เลยว่าในนี้มีสินค้าอะไร"
10044075-10 = "พอเข้าใจความรู้สึกของก็อบลินเฝ้าสมบัติแล้วละ! วะฮะฮ่า!"
10044075-12 = "ฮู่ว..."
10044075-13 = "เหมือนจะคลี่คลายสถานการณ์ได้แล้วนะ"
10044075-14 = "[ns1] \"ขอบใจที่ช่วยนะ อิโอริ\"\n[ns2] \"เราผ่านวิกฤตมาได้เพราะได้คณะกรรมการวินัยช่วยไว้เลย\""
10044075-17 = "เรื่องวุ่นวายนี้เกิดขึ้นในเขตปกครองตนเองเกเฮนน่า ฉันก็ต้องเข้าแทรกแซงสิ..."
10044075-18 = "แต่ฉันยังไม่แน่ใจหรอกนะว่าควรปล่อยคุณครูกับรถไฟขบวนนี้ไปเฉยๆ หรือเปล่า?"
10044075-19 = "......"
10044075-20 = "แต่คุณครูก็มีเหตุผลทุกครั้งเวลาไปข้องเกี่ยวกับเรื่องของนักเรียนนี่นะ"
10044075-21 = "[s] \"เชื่อใจครูสินะ...!\""
10044075-22 = "แต่หลังจากเสร็จงานตรงนี้แล้ว คุณครูต้องเข้าไปที่คณะกรรมการวินัยแล้วอธิบายกับฉันด้วย"
10044075-23 = "อีกไม่นานรถไฟก็จะออกจากเขตปกครองตนเองเกเฮนน่าแล้วละ งั้นฉันขอตัวก่อน..."
10044075-24 = "วะฮะฮ่า เมื่อกี้ยอดเยี่ยมมากเลย! คุณตัวตึงแห่งคณะกรรมการวินัย!"
10044075-25 = "เปล่านะ... ฉันไม่ถึงกับเป็นตัวตึง..."
10044075-26 = "ขนาดอยู่บนรถไฟยังยิงแม่นทุกนัดเลย ฮิคาริขอชาบู"
10044075-28 = "ขะ... ขอบคุณมากๆ นะคะ... ฉันคิดว่าเราจะหมดหนทางแล้วจริงๆ... แต่ก็รอดมาได้เพราะคุณมาช่วยไว้"
10044075-29 = "วะ... ไว้ฉันจะตอบแทนเป็นการส่วนตัวนะคะ!"
10044075-30 = "อืม..."
10044075-31 = "ก็... ดูแลตัวเองดีๆ แล้วกัน เพื่อนๆ ไฮแลนเดอร์"
10044075-32 = "คุณครูก็ด้วยนะ"
10044075-33 = "[s] \"อื้อ ขอบใจนะ อิโอริ\""
10044075-37 = "ว้าว~ สมกับเป็นคุณครูเลยนะ นึกไม่ถึงเลยว่าจะได้เจอกับนักเรียนที่รู้จักด้วย!"
10044075-38 = "นะ... นั่นน่ะสิคะ... โลกนี้ต้องพึ่งคอนเน็กชั่นจริงๆ... ละ... แล้วคนอย่างฉันจะใช้ชีวิตยังไง..."
10044075-39 = "อาโอบะไม่มีเพื่อนเลยเหรอ?"
10044075-40 = "ไม่คิดเหรอคะว่าถ้าถามแบบนี้แล้วคนฟังจะเจ็บปวดน่ะ?"
10044075-41 = "ดูทรงแล้วไม่น่าจะมีนะ"
10044075-42 = "ฉะ... ฉันว่าท่านผู้บริหารตัวกะเปี๊ยกก็ไม่น่าจะต่างกันหรอกนะคะ..."
10044075-43 = "ฮิคาริมีเพื่อนเพียบเลย คุณครูก็เป็นเพื่อนนะ"
10044075-44 = "จะตีตนเสมอผู้ใหญ่เหรอคะ... คุณครูเป็นถึงคุณครูนะ..."
10044075-45 = "แล้วฉันล่ะ...?"
10044075-46 = "ทำไมเหรอ? หรืออาโอบะก็อยากเป็นเพื่อนกับฮิคาริด้วย?"
10044075-47 = "คะ... ใครบอกคะ? ไม่ใช่อย่างนั้นสักหน่อย ว่าแต่สินค้าตรงนี้มัน..."
10044075-49 = "เอ๋? กล่องแตกนิดหน่อยแฮะ เพราะระเบิดเมื่อกี้หรือเปล่านะ?"
10044075-51 = "คะ... ค่อยยังชั่วที่เสียหายแค่ภายนอกเท่านั้นนะคะ..."
10044075-55 = "ขะ... ข้างในเป็นอย่างนี้เองเหรอ..."
10044075-56 = "[ns] \"นี่มัน...\""
10044075-59 = "อึก... ไม่คิดเลยว่าจะออกมาเป็นอย่างนี้..."
10044075-60 = "หะ... หัวหน้า... เอาไงดีล่ะ?"
10044075-61 = "เละตุ้มเป๊ะไปหมดเลย... นอกจากโจมตีกันเองแล้วยังมาเจอคณะกรรมการวินัยเกเฮนน่าอีก..."
10044075-62 = "ชะ... โชคดีที่คนอื่นออกจากเส้นทางไปแล้ว แต่เราก็คลาดกับรถไฟ..."
10044075-63 = "......"
10044075-64 = "แบบนี้แผนการของเราก็ล้มเหลวไม่เป็นท่าน่ะสิ..."
10044075-65 = "ไม่หรอก... เรายังไม่หมดหนทาง"
10044075-66 = "ทั้งตอนไปส่งอาหาร ตอนเป็นนักซิ่ง ตอนอยู่บนถนนที่ดูเหมือนจะเจอทางตัน..."
10044075-67 = "แต่มันก็มีหนทางเสมอ... อยู่ที่ว่าเราจะหาเจอหรือเปล่า...!"
10044075-72 = "ใช่! ต้องอย่างนี้ละ! ถึงเวลาปรับมายด์เซ็ต!!"
10044075-73 = "ยะ... ยังไงเหรอ??"
10044075-74 = "ฉันรู้ว่ารถไฟขบวนนั้นจะวิ่งไปที่ไหน เพราะงานนี้เป็นงานของเราตั้งแต่แรก"
10044075-75 = "เราจะไปถึงจุดหมายปลายทางนั้นก่อน แล้วก็สแตนด์บายรอ...!!"
10044075-77 = "แล้วพอรถมาถึงก็ขโมยสินค้ามา!!"
10044075-79 = "แล้วก็เอาของที่ขโมยมาไปส่งให้ผู้ว่าจ้าง!!!"
10044075-81 = "ทำแบบนั้นจะได้เหรอ?!?"
10044075-83 = "ฉะ... ฉันก็ไม่ได้ฉลาดอะไรมากนัก... แต่การทำแบบนั้นมันไม่เหมือนการส่งสินค้านะ?!"
10044075-84 = "ไม่เหมือนตรงไหน! นี่ละการส่งสินค้า!!"
10044075-85 = "กระบวนการขนส่งเป็นยังไงไม่สำคัญหรอก แค่คนส่งคนสุดท้ายเป็นพวกเราก็พอ"
10044075-86 = "งะ... งั้นเหรอ...?"
10044075-87 = "งานชิ้นนี้จะทำให้พวกเราเป็นขาใหญ่ในวงการขนส่ง และเติบโตเป็นผู้เชี่ยวชาญด้านการขนส่ง#nที่ครอบคลุมทั่วคิโวทอสเลย!"
10044075-88 = "อื้อ...! ความฝันของเราจะเป็นจริงแล้ว!!"
10044075-89 = "เอาละ รีบไปกันเถอะ! ถึงจะตามหลังอยู่ แต่เรื่องความเร็วพวกเราไม่เป็นรองใครอยู่แล้ว!!"

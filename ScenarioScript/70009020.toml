[translation]
70009020-1 = "ฝ่ายดูแลหอพักยังคงมุ่งต่อไป 2"
70009020-3 = "เฮ้อ... กลับมาแล้วค่ะ"
70009020-7 = "เหนื่อยๆ เหนื่อยที่สุด~"
70009020-8 = "ถือว่ายังดีที่หัวหน้าฝ่ายดูแลหอพักมาได้ทันเวลา ไม่งั้นละก็... ฮือ แค่คิดก็ขนลุกแล้ว"
70009020-13 = "อ้อ จริงสิ งานรูปวาดของฉัน..."
70009020-17 = "โอ๊ย ไม่รู้แล้ว~ วันนี้เหนื่อยกว่าทุกๆ วันเลย ขอรางวัลเป็นการหยุดพักแล้วกัน พรุ่งนี้ค่อยทำนะ พรุ่งนี้ๆ~"
70009020-21 = "เฮ้อ เตียงนอนนุ่มๆ นี่... ดีจัง~"
70009020-25 = "ฉันไม่ได้จับพู่กันมากี่วันแล้วนะ..."
70009020-26 = "แต่จะคิดไปให้ได้อะไรกัน เอาเวลาคิดไปนอนพักดีกว่า"
70009020-27 = "ฮ้าว... ฝันดีนะ~"
70009020-32 = "ปาบาบัมบัม~!! ปาบาบัมบัม~!!"
70009020-33 = "อึกกก?! อะ... อะไรน่ะ?!"
70009020-34 = "ใครมาเปิดการแสดงริมถนนในเวลาแบบนี้เนี่ย... ไม่สิ จริงๆ ก็พอรู้แล้วละว่าเป็นใคร..."
70009020-35 = "เวลานี้อีกแล้ว!! คนจะหลับจะนอน!!"
70009020-36 = "พวกชมรมดนตรีประกอบอีกแล้ว!! ใครก็ได้ไปหยุดพวกนั้นที!!"
70009020-40 = "เจ้าหน้าที่ทุกคน! มารวมตัวกันที่ห้องโถงภายใน 5 นาที! ขอย้ำว่า \"ทุกคน\"!"
70009020-41 = "อ่า... อ่าาาา...."
70009020-42 = "เฮ้อ... ทำยังไงได้ รีบไปเตรียมตัวก่อนแล้วกัน"
70009020-49 = "เมื่อประมาณ 7 นาทีก่อน เราตรวจสอบพบว่าพวกชมรมเสรีสัญจรพยายามที่จะปีนกำแพงโรงเรียนค่ะ"
70009020-50 = "โธ่เว้ย พวกชมรมเสรีสัญจรอีกแล้ว"
70009020-51 = "เดือนนี้ก็ปาไป 4 ครั้งแล้วนะ... เจ้าพวกนั้นไม่หลับไม่นอนกันรึไง...?"
70009020-55 = "สิ่งสำคัญที่สุดตอนนี้คือการป้องกันการหลบหนีออกนอกโรงเรียน รองลงมาคือการจับกุมหัวหน้า#nชมรมเสรีสัญจร มีคำถามรึเปล่า?"
70009020-56 = "คือ... ฉันมีคำถามค่ะ"
70009020-57 = "เราปล่อยพวกชมรมดนตรีประกอบไว้แบบนั้นได้จริงๆ เหรอคะ? หอพักต่างๆ ยื่นคำร้องเรียนเข้ามากัน#nไม่หยุดเลย..."
70009020-58 = "อืม ไม่ต้องไปสนใจพวกชมรมดนตรีประกอบหรอก ตอนนี้ยังไม่มีคำสั่งให้จับกุมพวกนั้น"
70009020-59 = "แต่ว่าถ้างั้นพวกนักเรียนคนอื่นๆ ก็จะไม่ได้นอน..."
70009020-60 = "ฉันขอถามบ้างแล้วกัน หากพวกนักดนตรีในวงออร์เคสตราไม่สนใจคำสั่งการของวาทยากรและ#nตัดสินใจเอาเองจะเกิดอะไรขึ้นกันล่ะ?"
70009020-61 = "คะ? เอ่อ... การแสดงคงจะล่มละมั้งคะ?"
70009020-62 = "มันก็เหมือนกันนั่นละ หัวหน้าฝ่ายดูแลหอพักยังไม่ออกคำสั่งจับกุมมา และหน้าที่ของพวกเราก็ไม่ใช่#nการถามถึงเหตุผล สิ่งสำคัญคือพวกเขาไม่ใช่เป้าหมายการจับกุมในครั้งนี้"
70009020-63 = "จงอย่าพยายามถามหาหรือเข้าใจคำสั่ง... แต่จง \"เชื่อมั่น\" ในคำสั่งนั้นซะ!"
70009020-64 = "ตอนนี้...! ฉันเข้าใจแล้วละค่ะ...!"
70009020-66 = "(จะยังไงก็ช่าง รีบๆ ทำให้จบก็แล้วกัน)"
70009020-72 = "ถ้าอย่างนั้น... ฝ่ายดูแลหอพักออกปฏิบัติการได้! ลุย!"
70009020-74 = "บริเวณใกล้กำแพงของสถาบันไวลด์ฮันต์"
70009020-76 = "แฮ่ก แฮ่ก..."
70009020-77 = "ดึกดื่นขนาดนี้แล้วทำไมยังต้องมาเหนื่อยอะไรแบบนี้ด้วย... แต่เอาเถอะ อีกแค่นิดเดียว..."
70009020-86 = "คะ?! เปล่าค่ะ เข้าใจแล้วค่ะ"
70009020-91 = "ทุกคน หยุด!"
70009020-95 = "......?"
70009020-96 = "ตอนนี้เราจะไปจับกุมชมรมดนตรีประกอบกัน!"
70009020-97 = "หืม...?"
70009020-99 = "แล้วพวกชมรมเสรีสัญจรล่ะคะ? อุตส่าห์มาถึงตรงนี้แล้วนะ..."
70009020-100 = "จะว่าไป... เมื่อกี้เราก็น่าจะจับกุมพวกชมรมดนตรีประกอบได้แท้ๆ ตอนที่เราเดินขบวนกันมา พวกนั้นก็คอยเปิดเพลงเย้ยอยู่ใกล้ๆ"
70009020-102 = "นี่เป็นคำสั่งจากหัวหน้าฝ่ายดูแลหอพัก! ให้จับกุมพวกชมรมดนตรีประกอบทันที เพื่อไม่ให้รบกวน#nการพักผ่อนของนักเรียนคนอื่นๆ!"
70009020-103 = "ฉันเข้าใจความไม่พอใจของทุกคนดีนะ..."
70009020-104 = "โฮ่...?"
70009020-105 = "ตอนแรกก็มีคำสั่งให้มาจับกุมพวกชมรมเสรีสัญจรที่อยู่ตั้งไกล พอมาถึงที่แล้วก็ดันมาเปลี่ยนคำสั่งให้#nกลับไปที่เดิม เป็นคำสั่งที่เข้าใจได้ยากจริงๆ"
70009020-107 = "(เพิ่งจะรู้เหรอ...?)"
70009020-108 = "(ใช่แล้ว ถ้าเป็นคุณละก็ สถานการณ์แบบนี้...)"
70009020-110 = "นั่นสิ... การเข้าใจความหมายของการตัดสินใจที่มีความลึกซึ้งของหัวหน้าฝ่ายดูแลหอพัก#nเป็นเรื่องที่ยากจริงๆ!"
70009020-111 = "ไปกันเถอะทุกคน! กลับกันได้แล้ว! คำสั่งของหัวหน้าฝ่ายดูแลหอพักคือสิ่งที่ต้องทำตาม! เพราะงั้น... ไปกันได้แล้ว!"
70009020-116 = "...อ่า~"
70009020-117 = "จริงๆ เลย~!!!"
70009020-121 = "โรงเรียนนี้มันอะไรกันเนี่ย~~~~!!!"
70009020-125 = "ฝ่ายดูแลหอพักยังคงมุ่งต่อไป"

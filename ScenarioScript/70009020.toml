[translation]
70009020-1 = "And Yet, the Prefectural Council Goes On 2"
70009020-3 = "*sigh* ...Finally."
70009020-7 = "What a day. I'm beat."
70009020-8 = "It's a good thing the Council Captain arrived in time. If not for her... Ugh. I don't even want to think about it."
70009020-13 = "Ah, right. My painting..."
70009020-17 = "Whatever. Today was terrible, so I deserve a night off. I'll get to it tomorrow!"
70009020-21 = "Ah! Oh, bed, how I missed you."
70009020-25 = "...How many days has it been since I held my palette...?"
70009020-26 = "I'll get to it. No use worrying. It's best to squeeze in some sleep while I can. That's good for inspiration, right?"
70009020-27 = "*yawn* ...Good night, painting."
70009020-32 = "BAM! BABABAM!!"
70009020-33 = "Gah?! Wh-What's happening?!"
70009020-34 = "Who's dropping the bass at this hour...? Ugh, who else?"
70009020-35 = "There she goes again! Some people are trying to get their beauty sleep!"
70009020-36 = "It's the Background Music Club! Someone silence their terrible beats!"
70009020-40 = "All agents, report! Assemble in the north hallway in 5 minutes! Repeat! Everyone GET UP!"
70009020-41 = "Ah, ahhhh..."
70009020-42 = "...*sigh* What choice do I have?"
70009020-49 = "...Approximately 7 minutes ago, we found evidence of the Free Outing Club attempting an escape by scaling the academy's northwest wall."
70009020-50 = "Them AGAIN?!"
70009020-51 = "This is the fourth time this month! Don't they sleep?!"
70009020-55 = "Our priority is to stop the escape, and, after that, apprehend the Free Outing Club's President. Am I understood?"
70009020-56 = "Uh, I have a question, actually."
70009020-57 = "We're just leaving the Background Music Club outside? The whole quad is sending us complaints."
70009020-58 = "Hm, leave the Background Music Club to their devices. We've received no orders to arrest them."
70009020-59 = "But then the students can't slee—"
70009020-60 = "Now it is my turn to ask a question. What happens when all the orchestra's musicians ignore the conductor and do whatever they want?"
70009020-61 = "Huh? Uh... The song will sound...bad?"
70009020-62 = "Exactly. The Council Captain did not administer arrest orders. We do not question why. We are only here to execute our mission to upstanding standards."
70009020-63 = "Do not try to understand the order... Trust it! Trust the weight of your sworn duty!"
70009020-64 = "Oh, I see...! I think I feel the trust...!"
70009020-66 = "(...I don't care. Let's just wrap this up!)"
70009020-72 = "Now, Prefectural Council! CHARGE!"
70009020-74 = "Near the Wildhunt School Wall"
70009020-76 = "*huff* *puff*"
70009020-77 = "Why? Why now? The middle of the night? Ugh... Almost there!"
70009020-86 = "Copy. Huh?! No, I...understand. Understood."
70009020-91 = "All units, halt!"
70009020-95 = "...Yes?"
70009020-96 = "Report to the quad. We have orders to immediately arrest the Background Music Club!"
70009020-97 = "...Ha?"
70009020-99 = "What about the Free Outing Club? We came all this way..."
70009020-100 = "Why didn't we arrest the Background Music Club earlier? They were raving while we marched right past them!"
70009020-102 = "The Council Captain has prioritized the incarceration of the Background Music Club. It is imperative that the students have a comfortable rest!"
70009020-103 = "That said... I empathize with your complaints."
70009020-104 = "...Oh?"
70009020-105 = "We came out all the way out here to apprehend the Free Outing Club, only to be told to retreat. This decision can appear quite baffling."
70009020-107 = "(Does she finally get it...?)"
70009020-108 = "(Almost there. Maybe she'll finally speak up against—)"
70009020-110 = "...And that is because the Council Captain is exceedingly brilliant. That's why she's in charge!"
70009020-111 = "Let's go, ladies! A return, not a retreat! The Council Captain's order is absolute. Pick up the pace!"
70009020-116 = "...Ah..."
70009020-117 = "Are you serious?!"
70009020-121 = "What is this school's damn problem?!"
70009020-125 = "And Yet, the Prefectural Council Goes On"

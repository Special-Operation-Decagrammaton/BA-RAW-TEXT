[translation]
70009020-1 = "然而舍監隊仍在奔跑（２）"
70009020-3 = "哈啊……回來了。"
70009020-7 = "累死了，真的累死了～"
70009020-8 = "幸好舍監隊長及時趕到，要不然……#n呃，根本不敢想。"
70009020-13 = "啊，對了。個人作品……"
70009020-17 = "啊～不管了～#n今天比平常累好幾倍，算是獎勵假期吧～#n明天再弄，明天～"
70009020-21 = "啊～床最棒了～"
70009020-25 = "最後一次拿筆畫畫是幾天前來著……"
70009020-26 = "算了。與其想這些，不如趕快睡覺。"
70009020-27 = "哈啊……晚安～"
70009020-32 = "叭叭叭叭～！！叭叭叭叭～！！"
70009020-33 = "哇！？什，什麼！？"
70009020-34 = "這時間，誰會在路邊演奏……#n不，誰會做這種事很明顯……"
70009020-35 = "又來了！！讓我睡覺！！"
70009020-36 = "誰去阻止一下背景音樂部！！"
70009020-40 = "全員起床！五分鐘內走廊集合！重複！全員起床！"
70009020-41 = "啊，啊啊啊啊……"
70009020-42 = "……唉，沒辦法，準備吧。"
70009020-49 = "……約七分鐘前，發現自由外出部有翻越校牆企圖脫逃的跡象。"
70009020-50 = "可惡，又是自由外出部。"
70009020-51 = "這個月已經第四次了……他們都不用睡嗎……？"
70009020-55 = "目前我們的最優先目標是阻止脫逃，次要目標是捉住自由外出部的部長。#n以上有問題嗎？"
70009020-56 = "我有一個問題。"
70009020-57 = "外面的背景音樂部可以不管嗎？#n各宿舍的投訴已經接連不斷……"
70009020-58 = "嗯，背景音樂部先暫時擱置就好。#n目前還沒下達逮捕命令。"
70009020-59 = "可是，這樣學生們就沒辦法睡覺……"
70009020-60 = "如果管弦樂團的所有演奏者，全都無視指揮自行演奏的話會發生什麼事？"
70009020-61 = "嗯？我想想……演奏應該會亂成一團吧？"
70009020-62 = "這件事情也是同理。#n舍監隊長沒有下達逮捕令，而判斷原因並不是我們的職責。#n重點就只有「他們不是逮捕對象」而已。"
70009020-63 = "不要試圖理解命令……要去「感受」它！"
70009020-64 = "原來如此……！我懂了……！"
70009020-66 = "（……隨便怎麼樣都好，快點結束好不好）"
70009020-72 = "那麼，舍監隊出動！全速前進！"
70009020-74 = "狂獵學院校牆附近"
70009020-76 = "哈啊，哈啊……"
70009020-77 = "大半夜的還得幹這種苦差事……#n不過只要再努力一下就……"
70009020-86 = "什麼！？#n不，我知道了。"
70009020-91 = "全隊停止！"
70009020-95 = "……？"
70009020-96 = "從現在起，任務目標更改為逮捕背景音樂部！"
70009020-97 = "……啥？"
70009020-99 = "那自由外出部呢？#n都已經走到這裡了耶……"
70009020-100 = "而且剛才不就可以逮捕背景音樂部了嗎？#n我們行軍的時候，他們還在一旁演奏應援曲呢。"
70009020-102 = "為了讓學生們能安穩休息，舍監隊長命令優先逮捕背景音樂部！"
70009020-103 = "……不過我也能理解各位的不滿。"
70009020-104 = "……哦？"
70009020-105 = "先說要逮捕遠處的自由外出部，結果都快走到了卻要求我們回頭。#n這確實是難以理解的命令。"
70009020-107 = "（終於察覺到了嗎……？）"
70009020-108 = "（沒錯，此時此刻就該……）"
70009020-110 = "但是……舍監隊長他肯定另有深意！"
70009020-111 = "來，回頭吧隊員們！#n舍監隊長的命令絕不會錯！全速前進！"
70009020-116 = "……啊～"
70009020-117 = "真是夠了～～～！！！"
70009020-121 = "這所學院到底是怎樣啦～～～～～！！！"

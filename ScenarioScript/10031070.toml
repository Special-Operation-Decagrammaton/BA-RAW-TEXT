10031070-25 = "#na;게헨나 학생들;<선도부장님의 오프닝 피아노 공연!>\n#fontsize;100"
10031070-26 = "#na;게헨나 학생 A;히나 님의 공연이라니 기대된다~"
10031070-27 = "#na;게헨나 학생 B;근데 만마전이랑 선도부, 서로 사이가 나쁘지 않았나? 용케도 만마전이 선도부의 공연을 허가해 줬네."
10031070-28 = "#na;게헨나 학생 C;듣기로는 그것도 전부 만마전의 의장님이 하해와 같은 넓은 아량으로, 선도부와의 관계 진전을 위해 스스로 직접 한 걸음 내딛은 덕분이라는 이야기를 저번에……."
10031070-29 = "#all;hide"
10031070-30 = "[ns] \"마코토…… 아무렇지도 않게 저런 홍보를…….\""
10031070-31 = "#na;아코 드레스;정말 그렇다니까요."

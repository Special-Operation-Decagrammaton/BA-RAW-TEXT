[translation]
10031070-1 = "Episode 7;The Day of the Party"
10031070-2 = "After many trials and tribulations, the day of the party finally arrived."
10031070-4 = "Gehenna Party Venue"
10031070-7 = "[ns] \"Three hours until the party begins.\""
10031070-22 = "By the way, did you hear about the first event of the party?"
10031070-23 = "Oh, right. Weren't there a whole bunch of advertisements?"
10031070-24 = "I heard about it too! The main event is—"
10031070-25 = "Opening Piano Recital featuring the Head Prefect!"
10031070-26 = "I'm so excited for Hina's performance!"
10031070-27 = "Don't the Pandemonium Society and the Prefect Team hate each other? I'm surprised the Pandemonium Society approved the performance."
10031070-28 = "I heard that the chairman of the Pandemonium Society ate some humble pie and started taking steps to improve relations with the Prefect Team..."
10031070-30 = "[ns] \"Makoto really pushed those kinds of ads with a straight face...\""
10031070-31 = "She sure did..."
10031070-36 = "She ran around stirring up good PR while we were distracted by training and the Pandemonium Society's absurd demands."
10031070-37 = "Seriously... She pushes through any scheme that favors her with the discretion of a bulldozer."
10031070-38 = "*sigh* It's too late now. The head prefect should've stood her ground and never agreed to that demand."
10031070-39 = "[s] \"Ako...\""
10031070-40 = "Ah. Hello, Sensei. You're early."
10031070-41 = "Frankly, I have a few words about you helping out the Pandemonium Society."
10031070-42 = "[s1] \"I had to. It was a request from a student.\"\n[s2] \"And it's not like there's any real malice behind hosting a party.\""
10031070-45 = "So you're saying you helped them, like you would help any student in their position."
10031070-46 = "...Well, I suppose that's the challenge of being a teacher. I won't pretend I can't understand that."
10031070-47 = "...But it still feels like you made the Prefect Team go through a lot of headache along the way."
10031070-48 = "[s] \"Th-That's because I trusted that the Prefect Team could handle it!\""
10031070-49 = "...Sure, I appreciate that you trust us. But that doesn't make all the annoying busy work dumped on us less frustrating."
10031070-50 = "So, how was it? Dealing with the Pandemonium Society by yourself?"
10031070-51 = "You understand why we have such a bone to pick with that absurd lot, yeah?"
10031070-52 = "[s] \"Hm, well... I think they're a truly unique group of students...\""
10031070-53 = "Hm. Unique. You certainly have a knack for sugarcoating things..."
10031070-54 = "[s] \"By the way, Ako... About your outfit...\""
10031070-55 = "Ah, this."
10031070-56 = "Well... I wasn't really looking forward to this party."
10031070-57 = "But as senior administrator, it's my duty to assist the head prefect. I dressed up so that I could blend in and keep tabs."
10031070-58 = "Yes... Right now, I'm the glamorous spy that would make any other member of the Prefect Team green with envy."
10031070-59 = "Something along those lines."
10031070-60 = "[s] \"You look great.\""
10031070-61 = "...What?"
10031070-62 = "D-Don't misunderstand. I didn't dress up like this because I had ulterior motives, I just wanted to feel like a spy, inside and out."
10031070-63 = "...Wait, why am I getting so flustered?"
10031070-64 = "Don't go thinking that you can say weird things like that with a straight face, Sensei."
10031070-65 = "[s] \"What?! What did I do?!\""
10031070-66 = "...Ahem. That aside, I appreciate the honest compliment, Sensei."
10031070-67 = "Anyway, I shouldn't be letting my guard down."
10031070-68 = "We deployed Prefect Team forces on site to ensure we can quickly respond to any situation that arises."
10031070-83 = "That said...despite having forces on hand, I still feel worried."
10031070-84 = "There isn't a troublemaker crazy enough to start a ruckus at a party with both the Pandemonium Society and the Prefect Team in attendance..."
10031070-85 = "Especially when the host is none other than the chairman of the Pandemonium Society herself."
10031070-86 = "But seriously. Even if it's hours before opening, I must remain vigilant."
10031070-87 = "[s3] \"Shouldn't it be fine? We've already made it this far...\"\n[s4] \"We also have you, Hina, and the rest of the Prefect Team on guard!\""
10031070-90 = "Head Prefect Hina... Mmm. You say that, but..."
10031070-91 = "[s] \"Where is Hina, by the way?\""
10031070-92 = "Ah, the head prefect had to step out."
10031070-93 = "She had business to take care of..."
10031070-94 = "Kihehe. Hello there, [USERNAME] Sensei. And Senior Administrator Ako."
10031070-105 = "Hello, Sensei! You too, Ako!"
10031070-107 = "Hmph... You lot."
10031070-111 = "[ns] \"Hello. You two are looking snazzy...\""
10031070-113 = "Keke! You have good eyes! I picked out a party outfit that embodied my radiant charisma!"
10031070-114 = "Makoto picked Ibuki's dress! It's pretty, right?"
10031070-115 = "[s] \"You're always cute, so you're extra cute today, Ibuki.\""
10031070-116 = "Ah, really? Thanks, Sensei!"
10031070-117 = "Kihehe... Right. With her party dress, Ibuki's charm has increased by over 150 fold!"
10031070-118 = "Beware, Amau Ako. Gaze upon the shining star of cuteness too long, and you'll certainly go blind."
10031070-120 = "...You're not wrong. I can't speak for Makoto, but you are quite cute, Ibuki."
10031070-121 = "Aw, really, Ako? Thanks!"
10031070-122 = "O-Of course... I-I was just sharing my honest feelings. Ahem."
10031070-123 = "Kekekeke! Let's set such obvious observations aside..."
10031070-124 = "I don't see Sorasaki Hina, the head prefect."
10031070-125 = "Ah... That's because..."
10031070-126 = "There's only two hours left until the piano recital."
10031070-127 = "Based on the fact that she's still not here..."
10031070-128 = "Keke... Is it safe to assume the head prefect's fears of playing the piano have led her to flee?"
10031070-129 = "What did you say?"
10031070-130 = "If that's not the case, how else do you explain her absence?"
10031070-131 = "She should be rehearsing or seated patiently in the green room right now."
10031070-132 = "Y-You're not wrong..."
10031070-133 = "But there's no way Hina would ever run away from a challenge! We're talking about the head prefect here!"
10031070-134 = "Keke. Your words are nothing but wind."
10031070-135 = "Even the most responsible person can be undone in a single, small moment of cowardice."
10031070-136 = "When faced with something impossible despite all efforts, even a head prefect might run for the hills, don't you think?"
10031070-140 = "[ns] \"Something impossible?\""
10031070-141 = "Kekeke! You're as observant as always, Sensei!"
10031070-142 = "The Pandemonium Society's intelligence team is excellent! The Prefect Team can't hold a candle to it!"
10031070-143 = "Our agents gleaned a juicy bit of top secret information about the Prefect Team."
10031070-144 = "You... You've been spying on us?!"
10031070-145 = "Hmph, don't act so shocked. Isn't that just how things go here in Gehenna?"
10031070-146 = "Now, what did that report say? \"Sorasaki Hina may seem like the golden girl who can achieve anything.\""
10031070-147 = "\"But we've discovered that there are a few things that she simply cannot do, and even some tasks she's quite bad at...\""
10031070-148 = "\"The number one example being swimming!\""
10031070-149 = "?!"
10031070-150 = "\"And the number two being that she cannot play any musical instrument, including piano!\""
10031070-151 = "You knew that about her, and you still—"
10031070-152 = "Precisely! I chose her for the piano recital because I knew it was her weakness!"
10031070-153 = "Why would you do such a thing?"
10031070-154 = "Hm? Why would I set Hina up for a humiliating performance, knowing it might ruin the party I've put so much into?"
10031070-155 = "Kekekeke. Is it not obvious?"
10031070-156 = "Watching her fail will be so entertaining, I don't care if my party gets ruined!"
10031070-157 = "[s] \"...Wow.\""
10031070-158 = "...Are you an idiot?"
10031070-159 = "Oh, that's not all!"
10031070-160 = "If Hina tries to avoid humiliation and doesn't show up, she'll expose the Prefect Team's inferiority to the Pandemonium Society!"
10031070-161 = "Cowards deserve no excuses!"
10031070-162 = "...I can't believe you'd stoop so low."
10031070-163 = "But I swear...the head prefect would never run away..."
10031070-164 = "Hmph, it's too late for your petty excuses."
10031070-165 = "Iroha?! Where are Iroha and Chiaki?! It's time for the performance, but the head prefect is a no show!"
10031070-166 = "Spread that news through all of Gehenna! The Pandemonium Society stands victorious!"
10031070-167 = "H-Hold on. Are you crazy?! If you declare something like that—!"
10031070-168 = "Kiheheheh! The words of a loser are nothing but wind! But seriously, where are Iroha and Chiaki?"
10031070-169 = "Oh, the two of them left to help with last minute party preparations."
10031070-170 = "How unfortunate that they won't be here to witness my grand moment."
10031070-171 = "Kihehe. Fine. I'll do it myself."
10031070-172 = "Kihehe... With this..."
10031070-173 = "The reign of the Pandemonium Society finally begins!"
10031070-174 = "[ns] \"...I've got a bad feeling about this.\""
10031070-178 = "Now! Students of Gehenna!"
10031070-179 = "Sorasaki Hina, our opening act for the Gehenna Special Party has not shown up!"
10031070-180 = "It should be clear by now that she was scared off by the weight of such an important role and fled!"
10031070-181 = "This is an insult to the Pandemonium Society, who had nothing but faith in her! It is a self-report of incompetence!"
10031070-182 = "Hina's actions prove that I, the Great Makoto, am the only leader fit to stand atop Gehenna!"
10031070-188 = "Kihehe... The reign of the Prefect Team is over!"
10031070-189 = "..."
10031070-190 = "[s] \"Ako... Are you really just going to accept this?\""
10031070-191 = "We're okay."
10031070-192 = "The real problem is..."
10031070-193 = "[s] \"What problem?\""
10031070-197 = "C-Chairman! It's an emergency!"
10031070-198 = "Hm? What's the matter?"
10031070-199 = "I-It's... Right after you made your announcement on the stream... All around Gehenna—!"
10031070-200 = "...?"
10031070-203 = "President! Did you catch that live stream just now?! The head prefect is missing in action! The Pandemonium Society won!"
10031070-204 = "The head prefect's gone missing?"
10031070-205 = "..."
10031070-206 = "*snort* *snicker*"
10031070-210 = "That means...it's the Hot Spring Department's time to shine!"
10031070-211 = "Yes! Now's our chance!"
10031070-212 = "Wahahaha!!"
10031070-213 = "Charge! Let the hot springs flow! We're going to finish what we started... The Pandemonium Society's hot spring!"
10031070-214 = "Yippie! Everyone! Grab your tools! It's development time!"
10031070-215 = "Let's gooooo!"
10031070-225 = "Huh. Did that live stream just say...that restrictive head prefect is missing?"
10031070-226 = "Heehee. What do you wanna do about that, Haruna?"
10031070-227 = "Do you even need to ask?!"
10031070-228 = "Right! We need to cook...something delicious!"
10031070-229 = "There's no head prefect to stop us this time. Shall we get started?"
10031070-249 = "Pan-Pan... Pan-Pan went on a rampage again!"
10031070-252 = "If the head prefect's gone missing... We can't just rest on our laurels!"
10031070-253 = "That's right! We're Gehenna's most trusted outlaws! When we accept a job we see it through!"
10031070-254 = "Start setting up those statues again! Just like the Pandemonium Society chair ordered!"
10031070-256 = "...And that's everything that's happening in Gehenna right now!"
10031070-257 = "Chairman! What are our orders?"
10031070-262 = "Wh-Wh-What? Wh-Why is all of this happening?!"
10031070-263 = "Isn't it obvious? If you declare that the force keeping Gehenna in check doesn't exist..."
10031070-264 = "All the troublemakers are going to go on a rampage. You didn't see this coming?"
10031070-265 = "[s] \"But how could all this have happened over just one live stream?\""
10031070-266 = "Never underestimate the chaos of Gehenna, Sensei."
10031070-267 = "[s] \"At what point have I ever?!\""
10031070-268 = "Whatever the case...if we don't suppress this anarchy, not only will the party be ruined, but Gehenna as well..."
10031070-269 = "Wh-Wh-What? N-No! Not my party! A-All my preparations—!"
10031070-270 = "All that work to show the Pandemonium Society's superiority to the Prefect Team!"
10031070-276 = "What was that announcement just now?!"
10031070-277 = "...Forget that. What in the world is happening right now?!"
10031070-278 = "*sigh* What have you done, Makoto?"
10031070-279 = "Ahahaha! It's a total mess! It's very Makoto!"
10031070-285 = "Does this mean...there's no party?"
10031070-286 = "No, Ibuki! It's not... I didn't mean to...!"
10031070-287 = "Mm! I guess it can't be helped. Here we'll utilize my enhanced NK Ultra Project and—!"
10031070-289 = "That'll just make Makoto act weird again, Satsuki."
10031070-325 = "[ns] \"(Ako said that Hina was late because she had business to take care of. If that's the case...)\""
10031070-327 = "[ns] \"I'll just have to figure it out.\""
10031070-329 = "Sensei?"
10031070-330 = "[s] \"You said Hina had an errand?\""
10031070-331 = "...Yes."
10031070-332 = "[s] \"Then until Hina returns, leave this to me.\""
10031070-333 = "But..."
10031070-334 = "Sensei...you don't have to take responsibility for that stupid chairman's mistakes."
10031070-335 = "[ns] \"I really started looking forward to this party... Especially seeing Hina's performance.\""
10031070-337 = "[ns] \"So I can't let this party be ruined. Not just for Hina, but for me too.\""

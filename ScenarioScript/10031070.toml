10031070-112 = "#all;hide"
10031070-113 = "4;이부키 드레스;03\n2;마코토 드레스;03;키킷! 그래. 잘 알아보았다! 파티를 맞이해. 이 몸의 위엄에 어울리는 것으로 골라두었지!\n#2;em;[재잘]"
10031070-114 = "4;이부키 드레스;10;이부키의 드레스~ 마코토 선배가 골라준 거야~ 이쁘지~\n#4;jump"
10031070-115 = "[s] \"응, 이부키도, 입고 있는 드레스도 전부 귀여워.\""
10031070-116 = "4;이부키 드레스;03;앗, 그래? 고마워 선생님!\n#4;em;[반짝]"
10031070-117 = "2;마코토 드레스;10;크크큭…… 그렇지. 이부키의 매력은…… 이것으로 평소보다 150배는 더 업그레이드……\n#2;em;[재잘]"
10031070-118 = "2;마코토 드레스;13;조심하라고, 아마우 아코. 멍하니 쳐다보고 있다간 눈이 멀어버릴지도 모르니까."
10031070-119 = "#all;hide"
10031070-120 = "3;아코 드레스;13;……아, 네. 당신이야 차치하고서라도 이부키 양이 귀여운 건 사실이니까요.\n#3;stiff"
10031070-121 = "3;이부키 드레스;10;앗. 정말? 아코 선배가 칭찬해 줬다! 고마워!\n#3;jump"
10031070-122 = "3;아코 드레스;04;네, 네에…… 그, 그냥 단순한 진심을 말했을 뿐이에요. 흠흠.\n#3;em;[///]\n#3;stiff"
10031070-123 = "3;마코토 드레스;03;키키키킷! 뭐, 그런 아주 당연한 잡담은 잠시 뒤로 미뤄두기로 하고……\n#3;em;[재잘]\n#3;hophop"
10031070-124 = "3;마코토 드레스;03;소라사키 히나…… 선도부장이 보이질 않는군."
10031070-125 = "3;아코 드레스;04;앗, 그건…….\n#3;em;…"
10031070-126 = "3;마코토 드레스;99;이제 피아노 공연까지 남은 시간은 앞으로 고작 해봐야 2시간 남짓."
10031070-127 = "3;마코토 드레스;00;이런 시간이 되도록 모습을 드러내지 않고 있다는 건………\n#3;em;…"
10031070-128 = "3;마코토 드레스;03;키킷. 선도부장 녀석. 역시나 피아노를 치는 것이 무서워 도망간 것은 아닌가?"
10031070-129 = "3;아코 드레스;12;뭐라고요?\n#3;em;[빠직]"
10031070-130 = "3;마코토 드레스;03;그런 게 아니라면 이 시간이 되도록 모습을 드러내지 않는 게 설명이 안 되잖나?\n#3;em;[?]"
10031070-131 = "3;마코토 드레스;10;평범하게 생각하면 진즉 리허설을 마치고 대기실에 있어야 할 시간이라고?"
10031070-132 = "3;아코 드레스;09;그, 그건 그럴지도 모르지만……\n#3;stiff"
10031070-133 = "3;아코 드레스;05;부장님이 도망칠 리가 없잖아요! 다른 누구도 아닌 저희의 선도부장님이라고요?!\n#3;jump\n#3;em;[!]"
10031070-134 = "3;마코토 드레스;10;키킷. 말뿐인 신뢰라는 건 어찌 이토록 공허한지.\n#3;em;[재잘]"
10031070-135 = "3;마코토 드레스;12;아무리 책임감이 강해도, 도망치고 싶어지는 날쯤 있기 마련."
10031070-136 = "3;마코토 드레스;13;노력한다 해도 자신에게 불가능한 것이 있다는 걸 깨달았다면…… 제아무리 선도부장이라고 해도 도망칠지 모른다고?"

10031070-83 = "3;아코 드레스;06;이렇게 배치하고도 마음 한구석이 불안한 이유는 무엇일까요.\n#3;em;[속상함]"
10031070-84 = "3;아코 드레스;06;……만마전과 선도부가 참관하는 파티이니, 간이 배 밖으로 나오지 않는 이상 문제를 일으키려고 드는 문제아는 없을 것이다……라고 생각합니다만."

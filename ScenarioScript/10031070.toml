10031070-33 = "#clearST"
10031070-34 = "#wait;2500"
10031070-35 = "3;아코 드레스;09\n#3;a"
10031070-36 = "3;아코 드레스;09;잠시 저희 선도부가 훈련 일정이나, 만마전의 억지 때문에 발이 붙잡혀 있는 사이에, 번갯불에 콩 구워 먹듯이 여론을 자기에게 유리한 방향으로 선동해 뒀다니."
10031070-37 = "3;아코 드레스;05;그 인간…… 진짜 자기에게 좋은 방향이라고 생각된 건 죄다 불도저처럼 진행해 버린다니까요.\n#3;em;[빠직]"
10031070-38 = "3;아코 드레스;06;……하아. 여기까지 온 이상, 너무 늦어버린 말일지도 모르지만. 부장님도 더 칼같이 거절하시는 편이 좋았을 텐데.\n#3;em;[한숨]"
10031070-39 = "[s] \"앗, 아코…….\""
10031070-40 = "3;아코 드레스;01;네, 안녕하세요. 선생님. 먼저 와 계셨군요.\n#3;greeting"
10031070-41 = "3;아코 드레스;09;솔직히 선생님께서 만마전에게 곧이곧대로 협력하신 것에, 한두 마디 정도 불평을 해 두고 싶던 참입니다만."
10031070-42 = "[s1] \"으음. 그건 학생의 부탁이었으니까.\"\n[s2] \"파티를 여는 이유도, 딱히 음모를 꾸미려고 했던 게 아니었고.\""
10031070-43 = "#wait;100"
10031070-44 = "#wait;100"
10031070-45 = "3;아코 드레스;04;다른 학생들과 마찬가지로, 협력하는 것은 당연……하다는 말씀인가요?\n#3;em;…"
10031070-46 = "3;아코 드레스;99;……뭐, 그런 점까지 고려해서 움직여야 하는 점이 곧 선생님의 고충이란 것이겠지요. 그걸 이해하지 못하는 건 아닙니다."
10031070-47 = "3;아코 드레스;07;그 결과, 중간에서 선도부가 여러모로 골탕을 먹는 느낌은 있습니다마는."
10031070-48 = "[s] \"그, 그건 선도부가 잘해줄 거라고 믿고 있으니까!\""
10031070-49 = "3;아코 드레스;06;……네. 신뢰해 주시는 건 물론 기쁘지만, 귀찮은 일을 떠넘기는 건 곤란하다고요?\n#3;stiff"
10031070-50 = "3;아코 드레스;00;그래서 어떠신가요? 만마전을 직접 상대해 본 경험은?\n#3;em;[?]"
10031070-51 = "3;아코 드레스;08;그 얼토당토않은 무리들을 상대하면서…… 조금은 저희의 처지가 이해되지 않으셨나요? 네?"
10031070-52 = "[s] \"아니, 뭐…… 다들 개성적인 아이들이라고 생각해…….\""
10031070-53 = "3;아코 드레스;04;흐응. 개성이라, 참 좋은 말로 포장해 주시네요…….\n#3;em;…"
10031070-54 = "[s] \"그, 그보다 아코. 그 옷차림 말인데…….\""
10031070-55 = "3;아코 드레스;02;아, 이거 말인가요.\n#3;em;[반응]"
10031070-56 = "3;아코 드레스;01;뭐어…… 이번 파티에 대해선 딱히 내키는 건 아니었습니다만."
10031070-57 = "3;아코 드레스;99;게헨나의 선임행정관으로서 부장님을 완벽히 보좌하기 위해서라도, 상황에 맞춰 저 자신을 꾸몄다고 해둘까요?"
10031070-58 = "3;아코 드레스;09;그래요…… 지금의 저는 선도부의 둘째가라면 서러워할 완벽한 첩보원……!\n#3;em;[!]"
10031070-59 = "3;아코 드레스;07;네, 그런 컨셉이랍니다."
10031070-60 = "[s] \"응, 잘 어울려.\""
10031070-61 = "3;아코 드레스;04;……네?"
10031070-62 = "3;아코 드레스;14;오, 오해하지 마세요. 이건 뭔가 흑심이 있어서 꾸며 입은 게 아니라, 정말 몸가짐부터 첩보원이 되고자……\n#3;stiff\n#3;em;[///]"
10031070-63 = "3;아코 드레스;04;……아니, 뭘 당황하는 거람."
10031070-64 = "3;아코 드레스;05;이, 이게 다 느닷없이 정면에서 그런 말을 하는 선생님 때문이라구요.\n#3;jump\n#3;em;[!]"
10031070-65 = "[s] \"어?! 내 잘못이야?!\""
10031070-66 = "3;아코 드레스;01;……흠흠. 그래도 선생님의 솔직한 칭찬이라면, 네. 접수해 두겠지만요."
10031070-67 = "3;아코 드레스;02;하여간. 이번 파티…… 어찌 되었든 간에 방심할 순 없겠죠."
10031070-68 = "3;아코 드레스;09;일단은 저희 선도부 쪽에서는 무슨 상황이 발생하더라도 빠르게 대응할 수 있도록 현장 병력 배치는 마쳐 둔 참입니다마는."

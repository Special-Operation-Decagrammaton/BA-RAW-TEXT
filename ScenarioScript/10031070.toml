[translation]
10031070-1 = "ตอนที่ 7;แล้ววันปาร์ตี้ก็มาถึง"
10031070-2 = "(ถึงช่วงเวลาที่ผ่านมาจะมีเรื่องเกิดขึ้นมากมาย แต่สุดท้ายแล้ววันเปิดงานปาร์ตี้ก็มาถึง)"
10031070-4 = "สถานที่จัดปาร์ตี้แห่งเกเฮนน่า"
10031070-7 = "[ns] \"ปาร์ตี้น่าจะเริ่มในอีก... 3 ชั่วโมงสินะ\""
10031070-22 = "จะว่าไป เธอได้ยินเรื่องนั้นมารึยัง? อีเวนต์แรกของงานปีนี้น่ะ"
10031070-23 = "อ้อ จริงด้วย เห็นว่าประชาสัมพันธ์ไว้เยอะเลยใช่มั้ย?"
10031070-24 = "ฉันก็ได้ยินมาเหมือนกัน! เห็นว่าอีเวนต์หลักของปาร์ตี้ครั้งนี้คือ..."
10031070-25 = "<การแสดงบรรเลงเปียโนเปิดงานโดยท่านประธานกรรมการวินัย!>"
10031070-26 = "อยากดูการแสดงของคุณฮินะไวๆ แล้วสิ~"
10031070-27 = "แต่ว่าแพนเดโมเนียม โซไซตี้กับคณะกรรมการวินัยไม่ค่อยจะกินเส้นกันไม่ใช่เหรอ? แพนเดโมเนียม โซไซตี้ก็กล้าเชิญคณะกรรมการวินัยมานะเนี่ย"
10031070-28 = "ได้ยินมาว่านี่เป็นการผูกมิตรด้วยใจที่กว้างดั่งมหาสมุทรของท่านประธานแพนเดโมเนียม โซไซตี้ เพื่อความก้าวหน้าในความสัมพันธ์กับคณะกรรมการวินัยเลยนะ..."
10031070-30 = "[ns] \"มาโคโตะไปโปรโมตอะไรไว้ขนาดนั้นเลยเหรอ...\""
10031070-31 = "ก็ใช่น่ะสิคะ "
10031070-36 = "คณะกรรมการวินัยของพวกเราต้องไปฝึกกัน และก็ต้องไปง่วนอยู่กับตรงนั้นมากขึ้นเพราะความดื้อรั้นของ#nแพนเดโมเนียม โซไซตี้ และระหว่างนั้นก็ถือโอกาสไปปลุกระดมความคิดเห็นของคนส่วนใหญ่ในทางที่#nเอื้อต่อตัวเองอีก"
10031070-37 = "คนคนนั้นน่ะ... ถ้าคิดว่าอะไรที่เป็นผลดีกับตัวเองก็จะออกคำสั่งและลงมือโดยไม่มีข้อแม้เลยค่ะ"
10031070-38 = "เฮ้อ... แต่ในเมื่อมาถึงจุดนี้แล้ว นี่อาจจะสายเกินไปแล้วก็ได้ค่ะ ถ้าท่านประธานปฏิเสธกับทางนั้นอย่าง#nเด็ดขาดไปก็ดีน่ะสิ..."
10031070-39 = "[s] \"อ๊ะ อาโกะ...\""
10031070-40 = "สวัสดีค่ะคุณครู มาถึงก่อนแล้วสินะคะ"
10031070-41 = "บอกตามตรงนะคะ ฉันอยากจะบ่นคุณครูสักคำสองคำที่คุณครูไปให้ความร่วมมือกับแพนเดโมเนียม โซไซตี้"
10031070-42 = "[s1] \"อืม ก็เป็นคำขอร้องของนักเรียนนี่นา\"\n[s2] \"ที่จัดปาร์ตี้ขึ้นมาก็ไม่น่าจะเพราะมีแผนร้ายอะไรด้วย\""
10031070-45 = "คุณครูหมายความว่า... คุณครูร่วมมือกับพวกนั้นได้เหมือนกับนักเรียนคนอื่นเหรอคะ?"
10031070-46 = "อืม... ถ้าต้องทำอะไรโดยคำนึงถึงเรื่องนั้นด้วย ก็ถือว่าเป็นเรื่องยากลำบากของคุณครูนะคะ ไม่ใช่ว่าฉันจะไม่เข้าใจหรอกค่ะ"
10031070-47 = "ถึงแม้การตัดสินใจทำแบบนั้นจะทำให้คณะกรรมการวินัยต้องเจอปัญหายุ่งยากอยู่หลายอย่างก็เถอะ"
10031070-48 = "[s] \"พะ... เพราะครูเชื่อว่าคณะกรรมการวินัยจะทำได้ดีไงล่ะ!\""
10031070-49 = "ค่ะ... ฉันก็ดีใจอยู่หรอกค่ะที่คุณครูเชื่อใจพวกเรา แต่การถูกโยนภาระให้แบบนี้ก็น่าเหนื่อยใจอยู่นะคะ"
10031070-50 = "แล้วตกลงเป็นยังไงบ้างล่ะคะ พอได้ทำงานกับแพนเดโมเนียม โซไซตี้แล้วน่ะ?"
10031070-51 = "พอได้เจอกับพวกที่ไม่ค่อยจะมีสาระ... ก็พอจะเข้าใจสถานการณ์ของพวกฉันบ้างไหมคะ? ว่าไงคะ?"
10031070-52 = "[s] \"ก็... ครูว่าทุกคนในนั้นก็มีเอกลักษณ์ของตัวเองนะ...\""
10031070-53 = "ฮึ่ม เอกลักษณ์งั้นเหรอคะ ใช้คำมาอธิบายได้สวยหรูเลยนะคะ"
10031070-54 = "[s] \"แต่ที่สำคัญกว่านั้น... อาโกะ... ชุดที่ใส่น่ะ...\""
10031070-55 = "หมายถึงนี่น่ะเหรอคะ?"
10031070-56 = "ฉันก็... ไม่ได้อยากจะใส่เพราะมีงานปาร์ตี้นี้เท่าไรหรอกค่ะ"
10031070-57 = "แต่ในฐานะเจ้าหน้าที่อาวุโสของเกเฮนน่า และเพื่อช่วยงานของท่านประธานอย่างสมบูรณ์แบบ อย่างน้อยฉันก็ควรต้องแต่งตัวให้เข้ากับสถานการณ์สิคะ"
10031070-58 = "ใช่แล้วค่ะ... ตอนนี้ฉันคือสายลับที่สมบูรณ์แบบของคณะกรรมการวินัยค่ะ...!"
10031070-59 = "นั่นคือคอนเซ็ปต์ของฉันในวันนี้ค่ะ"
10031070-60 = "[s] \"อื้ม เข้ากับอาโกะมากเลยนะ\""
10031070-61 = "คะ...?"
10031070-62 = "ยะ... อย่าเข้าใจผิดนะคะ ฉันไม่ได้ใส่ชุดนี้มาเพราะมีเจตนาแฝงอะไรนะคะ ก็แค่อยากทำตัวให้เป็น#nสายลับขึ้นมาจริงๆ..."
10031070-63 = "ทำไมถึงต้องตกใจด้วยนะ... "
10031070-64 = "นะ... นี่เป็นเพราะจู่ๆ คุณครูก็พูดแบบนั้นใส่ฉันนะคะ"
10031070-65 = "[s] \"หืม?!  เป็นความผิดครูเหรอ?!\""
10031070-66 = "ฮึ่ม... แต่ถ้าคุณครูชมจากใจจริงละก็ ฉันจะขอรับไว้แล้วกันค่ะ"
10031070-67 = "เอาเถอะค่ะ เอาเป็นว่าปาร์ตี้ครั้งนี้... ไม่ว่ายังไงฉันก็จะประมาทไม่ได้ค่ะ"
10031070-68 = "ทางคณะกรรมการวินัยวางกำลังคนไว้ในงานแล้ว ถ้าเกิดเรื่องอะไรขึ้นมาจะได้ตอบสนองได้อย่างทัน#nท่วงทีน่ะค่ะ"
10031070-83 = "แต่ถึงจะเตรียมการล่วงหน้าขนาดนี้แล้ว ทำไมฉันถึงยังรู้สึกไม่สบายใจกันนะคะ?"
10031070-84 = "ถึงฉันจะพยายามคิดว่านี่เป็นปาร์ตี้ของแพนเดโมเนียม โซไซตี้ที่ยอมเชิญคณะกรรมการวินัยมาด้วย ตราบใดที่ไม่มีใครก่อเรื่องอะไร ก็คงไม่เจอปัญหาอะไรในงาน..."
10031070-85 = "แต่คนที่จัดงานปาร์ตี้นี้ไม่ใช่ใครอื่น... แต่เป็นประธานแพนเดโมเนียม โซไซตี้นี่น่ะสิคะ"
10031070-86 = "แม้ปาร์ตี้จะยังไม่เริ่ม แต่ฉันก็ประมาทไม่ได้จริงๆ ค่ะ "
10031070-87 = "[s3] \"แต่ถ้ามาถึงขนาดนี้แล้ว ก็ไม่น่ามีอะไรรึเปล่า...\"\n[s4] \"งานนี้มีอาโกะ ฮินะ และคณะกรรมการวินัยสอดส่องอย่างเข้มงวดด้วย!\""
10031070-90 = "อืม... แต่ว่าท่านประธานฮินะพูดไว้ค่ะ อืม... แต่ว่า..."
10031070-91 = "[s] \"จะว่าไป ฮินะอยู่ที่ไหนเหรอ?\""
10031070-92 = "อ่า ท่านประธานบอกว่าจะออกไปไหนสักครู่น่ะค่ะ"
10031070-93 = "เห็นว่ามีธุระส่วนตัว..."
10031070-94 = "หึหึหึ สวัสดี ครู [USERNAME] แล้วก็เจ้าหน้าที่อาวุโสอาโกะด้วย"
10031070-105 = "คุณครูกับรุ่นพี่อาโกะ~! สวัสดี~!  "
10031070-107 = "ฮึ่ม... พวกคุณเองเหรอคะ"
10031070-111 = "[ns] \"สวัสดี ทั้งคู่ก็แต่งตัวกันสวยเลยนะ\""
10031070-113 = "หึหึ! ใช่ ตาถึงเหมือนกันนี่! เราเลือกชุดที่สมเกียรติของเราไว้ล่วงหน้าสำหรับงานปาร์ตี้นี้โดยเฉพาะเลย!"
10031070-114 = "ส่วนชุดของอิบูกิ~ รุ่นพี่มาโคโตะเป็นคนเลือกให้~ สวยใช่ม้า~"
10031070-115 = "[s] \"อื้ม น่ารักทั้งอิบูกิ ทั้งชุดที่ใส่เลยนะ\""
10031070-116 = "อ๊ะ งั้นเหรอ? ขอบคุณนะคุณครู!"
10031070-117 = "หึหึหึ... ใช่แล้ว พอใส่ชุดนี้แล้ว... ความน่ารักของอิบูกิก็อัปเกรดไป 150 เท่า..."
10031070-118 = "ระวังหน่อยนะ อามาอุ อาโกะ ถ้าจ้องตาเป็นมันแบบนั้น ระวังลูกตาจะหลุดออกมานะ"
10031070-120 = "อ่า... ค่ะ ฉันยอมรับว่าอิบูกิน่ะน่ารักจริงๆ ค่ะ"
10031070-121 = "อ๊ะ จริงเหรอ? รุ่นพี่อาโกะชมอิบูกิด้วย! ขอบคุณนะ!"
10031070-122 = "ค่ะ... ฉะ... ฉันก็แค่พูดไปอย่างที่ใจคิดน่ะค่ะ"
10031070-123 = "หึหึหึหึ! เราพักหัวข้อสนทนาเรื่องไร้สาระนี่ไว้ทีหลังแล้วกัน..."
10031070-124 = "เรายังไม่เห็นประธานกรรมการของเธอเลยนะ... โซระซากิ ฮินะอยู่ไหนล่ะ?"
10031070-125 = "อ๊ะ คือว่า..."
10031070-126 = "การแสดงเปียโนเปิดงานจะเริ่มในอีก 2 ชั่วโมงแล้ว "
10031070-127 = "ถ้าป่านนี้ยังไม่มาให้เห็นหัวอีกก็แปลว่า..."
10031070-128 = "หึหึ ยัยประธานกรรมการวินัย กลัวการบรรเลงเปียโนก็เลยหนีไปแล้วสินะ?"
10031070-129 = "ว่ายังไงนะคะ?"
10031070-130 = "ก็ถ้าไม่ใช่อย่างนั้น แล้วเธออธิบายได้มั้ยล่ะว่าทำไมป่านนี้แล้วยังไม่มาอีก?"
10031070-131 = "ตามหลักแล้วเวลานี้ต้องซ้อมใหญ่ให้เสร็จแล้วไปสแตนด์บายในห้องรอแล้วต่างหาก"
10031070-132 = "มะ... มันก็อาจจะใช่..."
10031070-133 = "แต่ท่านประธานไม่มีทางหนีไปแน่นอนค่ะ! ท่านเป็นถึงประธานกรรมการวินัยเลยนะคะ!!"
10031070-134 = "หึหึ ความไว้วางใจที่แสดงออกมาด้วยคำพูดมันช่างว่างเปล่าจริงๆ"
10031070-135 = "ต่อให้ความรับผิดชอบสูงแค่ไหน แต่ก็คงมีวันที่อยากหนีไปไกลๆ บ้างอยู่ดีนั่นละ"
10031070-136 = "ถ้ารู้ว่าตัวเองมีสิ่งที่ทำไม่ได้ แม้ว่าจะพยายามแค่ไหนแล้วก็ตาม... ต่อให้เป็นถึงประธานกรรมการก็ย่อม#nอยากหนีไปได้เหมือนกัน"
10031070-140 = "[ns] \"สิ่งที่ตัวเองทำไม่ได้งั้นเหรอ...?\""
10031070-141 = "หึหึหึ! ถามได้ดีเลยนะครู!"
10031070-142 = "แหล่งข่าวของแพนเดโมเนียม โซไซตี้น่ะยอดเยี่ยม ยากที่จะหาใครมาเปรียบ! คณะกรรมการวินัยก็เทียบชั้นไม่ได้หรอก!"
10031070-143 = "และจากแหล่งข่าวนั่น เราก็เลยได้ข้อมูลลับชั้นยอดเกี่ยวกับคณะกรรมการวินัยมา"
10031070-144 = "นี่คุณ... ให้สายลับแฝงตัวเข้ามาสืบข้อมูลของคณะกรรมการวินัยอยู่เหรอคะ?!"
10031070-145 = "แหม ทำเป็นตกอกตกใจไปได้ เรื่องแบบนี้ในเกเฮนน่าก็ทำกันเป็นปกติไม่ใช่รึไง?"
10031070-146 = "จากข้อมูลที่ฉันได้มา... ต่อให้โซระซากิ ฮินะจะเป็นคนที่ไม่ว่าจะทำอะไรก็ดูจะทำได้อย่างสมบูรณ์แบบ"
10031070-147 = "แต่ในความเป็นจริงแล้ว ยัยนั่นยังมีหลายอย่างที่ตัวเองทำไม่ได้..."
10031070-148 = "และที่รู้กันดีก็คือ... การว่ายน้ำ!"
10031070-149 = "?!"
10031070-150 = "ไม่ใช่แค่นั้นนะ เรารู้มาด้วยว่ายัยนั่นเล่นเครื่องดนตรีอะไรไม่ได้เลย รวมถึงเปียโนด้วย!"
10031070-151 = "คุณรู้เรื่องนั้น แต่ก็ยัง..."
10031070-152 = "ใช่! เพราะเรารู้จุดอ่อน ก็เลยขอให้ยัยนั่นมาบรรเลงเปียโนให้ไงล่ะ!"
10031070-153 = "ทำไมล่ะคะ...?"
10031070-154 = "หืม? อยากรู้เหรอว่าทำไมเราถึงเลือกทำอย่างนั้น แม้ว่าปาร์ตี้ที่เราทุ่มเทอย่างหนักอาจจะพังไม่เป็นท่า#nก็ได้สินะ?"
10031070-155 = "หึหึหึหึ ถามอะไรแปลกๆ อีกแล้ว..."
10031070-156 = "เพราะเราผู้นี้จะรู้สึกสะใจที่ยัยนั่นต้องขายหน้ามากกว่าเสียใจที่ปาร์ตี้ต้องพังลงไงล่ะ!!"
10031070-157 = "[s] \"โห...\""
10031070-158 = "นี่คุณ... ยังมีหัวคิดอยู่ไหมคะ?"
10031070-159 = "เฮอะ! เราไม่ได้เล่นงานแค่เรื่องนั้นเรื่องเดียวหรอกนะ!"
10031070-160 = "ถ้ายัยฮินะไม่มาปรากฏตัวและหนีไปจริงๆ นั่นจะเป็นการพิสูจน์ว่าแพนเดโมเนียม โซไซตี้#nกับคณะกรรมการวินัยอยู่คนละชั้นกัน!"
10031070-161 = "ยังไงซะ คนที่หนีเตลิดไปจะไม่สามารถแก้ตัวอะไรได้ทั้งนั้น!"
10031070-162 = "นี่คุณ... กล้าดียังไงถึงได้ใช้เล่ห์เหลี่ยมแบบนั้น..."
10031070-163 = "แต่ว่าท่านประธานน่ะ... ไม่ได้หนีไปไหนหรอกนะ..."
10031070-164 = "เฮอะ มาแก้ตัวเอาตอนนี้ก็สายไปเสียแล้ว "
10031070-165 = "อิโรฮะ! อิโรฮะกับจิอากิอยู่ไหนน่ะ! การแสดงจะเริ่มในอีกไม่ช้าแล้ว แต่ประธานกรรมการยังไม่โผล่หัว#nมาเลย!"

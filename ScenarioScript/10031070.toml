10031070-268 = "บางที... ถ้าเราไม่สามารถจัดการกับความวุ่นวายที่เกิดขึ้นได้ ปาร์ตี้ครั้งนี้ก็จะล่ม... และอาจรวมถึงทั้ง#nเกเฮนน่าด้วย..."

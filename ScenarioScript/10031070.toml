[translation]
10031070-1 = "第7話;派對當天"
10031070-2 = "（這段期間雖然發生了很多事，但派對的日子終於到來了）"
10031070-4 = "格黑娜．派對會場"
10031070-7 = "[ns]「距離派對開始……還有3個小時嗎？」"
10031070-22 = "話說你有聽說嗎？這次慶典的第一個活動。"
10031070-23 = "啊，嗯，有大規模的廣告吧？"
10031070-24 = "我也聽說了！這次派對的重頭戲就是……"
10031070-25 = "「風紀委員長的開幕鋼琴演奏！」"
10031070-26 = "竟然是陽奈的表演，真令人期待～"
10031070-27 = "不過萬魔殿和風紀委員會不是關係很差嗎？#n萬魔殿居然會允許風紀委員會表演。"
10031070-28 = "據我所知，這是因為萬魔殿的議長發揮大海般的雅量……#n為了改善和風紀委員會之間的關係才會跨出這一步的……"
10031070-30 = "[ns]「真琴……怎麼若無其事地進行那種宣傳……」"
10031070-31 = "就是說啊。"
10031070-36 = "在我們風紀委員會忙於訓練的期間，#n他們就用迅雷不及掩耳的速度，把輿論推往對自己有利的方向。"
10031070-37 = "畢竟那傢伙……只要是對自己有利的事，就會毫不猶豫進行。"
10031070-38 = "……唉，事到如今說這些也已經太遲了。#n要是當初委員長能果斷拒絕就好了。"
10031070-39 = "[s]「啊，亞子……」"
10031070-40 = "啊，老師您好。#n您這麼早就來了呀。"
10031070-41 = "老實說，老師和萬魔殿合作這件事，實在讓我不禁想抱怨幾句。"
10031070-42 = "[s1]「畢竟那也是學生的請託。」\n[s2]「舉辦派對的理由也不像是想策畫什麼陰謀。」"
10031070-45 = "就像對其他學生一樣，選擇合作也是當然的……您是這個意思嗎？"
10031070-46 = "……連這點也必須列入行動的考量，這就是身為老師的苦衷吧。#n我也不是完全無法理解。"
10031070-47 = "只是覺得被夾在中間的風紀委員會，因而在各方面吃了不少苦頭而已……"
10031070-48 = "[s]「因，因為我相信風紀委員會應該不會有問題！」"
10031070-49 = "……是，我很高興老師這麼信任我們。#n不過把麻煩的事推給別人，會造成別人的困擾吧？"
10031070-50 = "話說您覺得怎麼樣呢？和萬魔殿直接打交道的經驗如何？"
10031070-51 = "和那些荒謬的傢伙接觸之後……應該稍微能了解我們的處境了吧？"
10031070-52 = "[s]「嗯……我覺得他們都是很有個性的孩子……」"
10031070-53 = "很有個性……是嗎？#n老師的用字遣詞真不錯呢……"
10031070-54 = "[s]「對，對了亞子，你那套打扮……」"
10031070-55 = "啊，您說這個嗎？"
10031070-56 = "唔嗯……雖然我不是很樂意參加這次的派對……"
10031070-57 = "該說是身為行政官，為了完美輔佐委員長，必須依照情況打扮自己嗎？"
10031070-58 = "沒錯……現在的我可是風紀委員會的第二把交椅，一名令人稱羨的完美間諜……！"
10031070-59 = "對，就是這樣的概念。"
10031070-60 = "[s]「嗯，很適合你哦。」"
10031070-61 = "……嗯？"
10031070-62 = "請，請您不要誤會。#n這不是別有用心的刻意打扮，而是真的想在各個方面都成為一名間諜……"
10031070-63 = "……不對，我為什麼要驚慌失措呢。"
10031070-64 = "都，都怪老師突然說出那種話。"
10031070-65 = "[s]「什麼！？是我的錯嗎！？」"
10031070-66 = "……呵呵，不過如果這純粹是老師的讚美……是，我就坦率地接受吧。"
10031070-67 = "總之這次的派對……無論如何都不能掉以輕心。"
10031070-68 = "為了能即時應對任何情況，我們風紀委員會已經在現場配置了部隊。"
10031070-83 = "然而為何內心還是覺得很不安呢？"
10031070-84 = "……這裡明明是萬魔殿和風紀委員會都會參加的派對，#n應該沒有問題學生膽敢在這種場合跑出來惹事才對……"
10031070-85 = "雖然舉辦這場派對的不是別人……而是萬魔殿的議長。"
10031070-86 = "真是的，在派對開始前都無法掉以輕心。"
10031070-87 = "[s3]「事到如今應該不會再出事了吧……？」\n[s4]「畢竟這裡有亞子、陽奈和風紀委員會鐵壁般的守衛！」"
10031070-90 = "陽奈委員長是嗎……唔嗯，可是……"
10031070-91 = "[s]「這麼說來，亞子。陽奈現在在哪裡呢？」"
10031070-92 = "啊，委員長說要暫時離開一下。"
10031070-93 = "似乎是要處理一些私事……"
10031070-94 = "咯咯咯。你好呀[USERNAME]老師、亞子行政官。"
10031070-105 = "哈囉～！老師！亞子前輩～！"
10031070-107 = "哼……是你們啊？"
10031070-111 = "[ns]「你們好，衣服都很適合你們哦。」"
10031070-113 = "嘻嘻！因為我已經調查清楚了！#n為了迎接派對，必須選擇符合我威嚴的禮服！"
10031070-114 = "伊吹的禮服是真琴前輩挑的唷，可愛嗎～"
10031070-115 = "[s]「嗯，伊吹跟禮服都很可愛。」"
10031070-116 = "真的嗎？謝謝老師！"
10031070-117 = "咯咯咯……沒錯。#n伊吹的魅力……比平常提升了150倍……"
10031070-118 = "你最好小心一點，天雨亞子。#n這樣一直癡癡地看著，之後眼睛出問題可別怪我。"
10031070-120 = "……啊，嗯。#n你姑且不論，伊吹醬是真的很可愛。"
10031070-121 = "哇～真的嗎？被亞子前輩稱讚了！謝謝你！"
10031070-122 = "呵呵……我只說出心中的感想而已。"
10031070-123 = "嘻嘻嘻嘻！#n那種理所當然的事還是晚點再說吧……"
10031070-124 = "空崎陽奈……沒看見風紀委員長啊。"
10031070-125 = "啊，這……"
10031070-126 = "距離鋼琴演奏頂多只剩下2小時……"
10031070-127 = "然而他卻遲遲沒有露面……"
10031070-128 = "嘻嘻。可惡的風紀委員長，果然是因為害怕彈鋼琴，所以落荒而逃了嗎？"
10031070-129 = "你說什麼？"
10031070-130 = "如果不是的話，為何還不現身呢？#n這一點都不合理吧？"
10031070-131 = "按理來說，現在應該是完成彩排並前往等待室的時間不是嗎？"
10031070-132 = "或，或許是這樣沒錯……"
10031070-133 = "可是委員長怎麼可能會逃跑呢！#n那可不是別人，而是我們的風紀委員長哦！？"
10031070-134 = "嘻嘻。只是口頭說說的信任還真是空虛。"
10031070-135 = "就算身負強烈的責任感，往往還是會有想逃避的時候。"
10031070-136 = "如果明白有些事就算自己再努力也無法達成……也許連風紀委員長也會選擇逃避吧？"
10031070-140 = "[ns]「就算再努力也無法達成的事……？」"
10031070-141 = "嘻嘻嘻！這個問題問得真不錯啊！老師！"
10031070-142 = "我們萬魔殿的諜報能力相當優秀！區區風紀委員會根本不是對手！"
10031070-143 = "透過諜報行動，我們獲得了關於風紀委員會的極祕情報。"
10031070-144 = "你……暗中調查了風紀委員會嗎！？"
10031070-145 = "哼，有什麼好大驚小怪的。#n這不是格黑娜的人都會做的事嗎？"
10031070-146 = "情報顯示……空崎陽奈雖然看似完美，沒有任何事能難得倒他……"
10031070-147 = "然而實際上，他也有無法勝任且不擅長的事……"
10031070-148 = "其中最具代表性的……就是游泳！"
10031070-149 = "！？"
10031070-150 = "不僅如此，他也不擅長演奏包含鋼琴在內的各種樂器！"
10031070-151 = "你明知道這一點卻還……"
10031070-152 = "沒錯！我就是知道他的弱點，才會刻意要他負責演奏鋼琴！"
10031070-153 = "……為什麼呢？"
10031070-154 = "嗯？要是演奏失敗說不定會搞砸精心策畫的派對，所以不明白我為什麼這麼做嗎？"
10031070-155 = "咯咯咯咯。#n這麼理所當然的事還要問嗎……這當然是因為……"
10031070-156 = "比起派對，能看他丟人現眼的樣子更讓人痛快！"
10031070-157 = "[s]「…………哇。」"
10031070-158 = "…………你是笨蛋嗎？"
10031070-159 = "嘖嘖嘖！我的目標可不只這樣而已！"
10031070-160 = "要是陽奈那傢伙沒有出現，而是選擇逃跑，#n就足以證明我們萬魔殿和風紀委員會之間的差異！"
10031070-161 = "逃跑之人不管說什麼藉口都無法改變事實！"
10031070-162 = "竟然使出這種手段……"
10031070-163 = "不過委員長……打從一開始就沒有逃跑……"
10031070-164 = "哼，事到如今才狡辯也已經太遲了。"
10031070-165 = "伊呂波！伊呂波和千秋在哪裡！#n表演時間就快到了，風紀委員長還是沒有出現！"
10031070-166 = "把這個事實告訴格黑娜的所有人！將我們萬魔殿獲勝的消息傳出去吧！"
10031070-167 = "先，先等一下，你瘋了嗎！？#n要是發布那種宣言……！"
10031070-168 = "嘻嘻嘻！喪家犬說的話，對我而言跟擦肩而過的微風沒兩樣！#n不過，伊呂波和千秋……"
10031070-169 = "啊，他們兩位為了準備派對而暫時離開了。"
10031070-170 = "這麼重要的時刻竟然無法共襄盛舉，真可惜。"
10031070-171 = "咯咯咯，不過算了。#n既然如此就由我親自出馬吧。"
10031070-172 = "咯咯咯……從今天開始……！"
10031070-173 = "將是我們萬魔殿的天下……！"
10031070-174 = "[ns]「……有種非常不祥的預感。」"
10031070-178 = "格黑娜的所有學生都聽清楚了！"
10031070-179 = "在格黑娜特別派對開始之前……#n負責開幕表演的風紀委員長空崎陽奈遲遲沒有出現！"
10031070-180 = "那傢伙一定是害怕表演這項沉重的任務，所以才會故意躲起來！"
10031070-181 = "這等於是對我們萬魔殿的侮辱，同時也是承認自己的失敗！"
10031070-182 = "這就是格黑娜真正的領導者是我真琴大人的鐵證！"
10031070-188 = "咯咯咯……這樣就分出勝負了。"
10031070-189 = "…………"
10031070-190 = "[s]「亞子……這樣下去沒關係嗎……」"
10031070-191 = "我們是沒關係。"
10031070-192 = "但問題是……"
10031070-193 = "[s]「問題是……？」"
10031070-197 = "議，議長！大事不好了！"
10031070-198 = "嗯？怎麼回事？"
10031070-199 = "剛，剛剛的廣播傳出之後……格黑娜各地都……！"
10031070-200 = "…………？"
10031070-203 = "部長！你有看見廣播嗎！？#n他說風紀委員長現在下落不明！所以是萬魔殿贏了嗎！？"
10031070-204 = "………………風紀委員長……下落不明？"
10031070-205 = "…………"
10031070-206 = "……嗚嗚。"
10031070-210 = "也就是說……溫泉開發部終於有機會表現了？"
10031070-211 = "嗯！大概是吧！"
10031070-212 = "哈～哈哈哈哈！！"
10031070-213 = "全員突擊！開發溫泉的時間到了！這次一定要完成萬魔殿的溫泉！"
10031070-214 = "呀～～呼！所有人帶上裝備！開始準備逃獄～～～～！"
10031070-215 = "開挖囉！"
10031070-225 = "哦哦，剛剛的廣播說……先前妨礙我們的風紀委員長不見了……"
10031070-226 = "呵呵。該怎麼做呢，羽留奈？"
10031070-227 = "應該不需要多說了吧？"
10031070-228 = "沒錯！我們都還沒吃到美食呢！"
10031070-229 = "沒錯，之前雖然因為風紀委員長而失敗了，現在重新開始行動吧？"
10031070-249 = "鬆餅醬……鬆餅醬又開始失控了……！"
10031070-252 = "既然風紀委員長不見了……那就該採取行動了吧！"
10031070-253 = "沒錯！我們是只要接受委託就勢必會完成……有義氣的問題學生！"
10031070-254 = "萬魔殿的老大委託的銅像設置……重新開始進行吧！！"
10031070-256 = "相同的事正在格黑娜各地同時發生！"
10031070-257 = "議長！該怎麼辦呢？請下達指示……！"
10031070-262 = "什，什麼……？#n怎，怎麼會這麼混亂……！？"
10031070-263 = "那還用說。#n像這樣突然公開宣布格黑娜的抑止力消失……"
10031070-264 = "問題學生當然會趁機搗亂……你難道沒預料到這種結果嗎？"
10031070-265 = "[s]「一場廣播居然就能讓情況演變成這樣嗎……？」"
10031070-266 = "請別小看格黑娜哦，老師。"
10031070-267 = "[s]「不不不，我從來都沒小看過格黑娜啊！？」"
10031070-268 = "如果……無法鎮壓這場混亂，不只是派對會泡湯……整個格黑娜都……"
10031070-269 = "這，這，這……不可能……！我，我好不容易準備了這個派對……！"
10031070-270 = "為了展現我們萬魔殿和風紀委員會之間的差異而準備的一切……！"
10031070-276 = "剛剛的廣播到底是……！"
10031070-277 = "……情況已經一團亂了嗎！？"
10031070-278 = "唉……真琴前輩……到底又做了什麼好事……"
10031070-279 = "啊哈哈！這樣很有真琴前輩的風格呀！#n嗯！根本就是一團亂！"
10031070-285 = "那伊吹……不能參加派對了嗎……？"
10031070-286 = "伊吹！不是的……！#n這……我不是有意的……！"
10031070-287 = "唔嗯！沒辦法了，現在只能用我的NK-ULTRA計畫來……！"
10031070-289 = "那樣真琴前輩又會出現巨大的轉變唷，皐月前輩～"
10031070-325 = "[ns]（亞子說過陽奈是因為有事才會耽誤時間……）"
10031070-327 = "[ns]「我會想辦法解決。」"
10031070-329 = "老師？"
10031070-330 = "[s]「陽奈是因為有事要忙，才會暫時離開的對吧？」"
10031070-331 = "……是的。"
10031070-332 = "[s]「那麼在陽奈回來之前，這件事就交給我。」"
10031070-333 = "可是……"
10031070-334 = "老師不需要特意負責平定愚蠢議長造成的騷動……"
10031070-335 = "[ns]「我也很期待這次的派對……尤其是陽奈的演奏。」"
10031070-337 = "[ns]「所以不能眼睜睜看著派對就這樣被搞砸──為了我和陽奈。」"

10031070-179 = "วันนี้เราจะมีการแสดงเปิดงานปาร์ตี้สุดพิเศษแห่งเกเฮนน่า... แต่ประธานกรรมการโซระซากิ ฮินะ ที่ได้รับมอบหมายกลับไม่มาปรากฏตัว!"

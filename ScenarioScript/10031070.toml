10031070-203 = "หัวหน้า! ได้ดูการถ่ายทอดสดรึเปล่า?! เห็นว่าประธานกรรมการวินัยหายตัวไปละ! แพนเดโมเนียม โซไซตี้ บอกว่าตัวเองชนะด้วย!"

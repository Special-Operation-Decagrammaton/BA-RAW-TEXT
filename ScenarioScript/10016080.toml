[translation]
10016080-1 = "#title;제8화;우연한 인연"
10016080-2 = "#na;(소란스러웠던 상황이 어느 정도 종료된 후……)"
10016080-3 = "3;유우카 체육복ND;04;하아, 하아…… 전차, 아니 응원 로봇의 기능 정지를 확인……\n#3;a\n#3;em;[땀]"
10016080-4 = "3;유우카 체육복ND;04;궤도와 파워팩이 완전히 파괴되었으니, 이제 더 이상 날뛰지는 못할 거야."
10016080-5 = "#st;[0,0];instant;1;"
10016080-6 = "#clearST"
10016080-7 = "3;유우카 체육복ND;04\n#3;d\n#wait;1500"
10016080-8 = "3;하스미 체육복;02;도망쳤던 불량 학생의 신병도 확보했습니다.\n#3;a\n#3;em;[반응]"
10016080-9 = "3;하스미 체육복;99;다행히 이 학생의 바보 같은 언동에 어울려 부화뇌동하는 학생은 더 없었군요."
10016080-10 = "3;하스미 체육복;99\n1;마리 체육복ND;01;현장에 있던 선수들도 무사히 대피했습니다. 다친 분들은 조금 전 합동의료본부에서 후송해 가셨어요.\n#3;m4\n#1;a\n#1;em;[반짝]"
10016080-11 = "#all;hide"
10016080-12 = "3;유우카 체육복ND;07;이것으로 상황은 어느 정도 정리된 것 같네. 다들 수고 많았어.\n#3;em;[음표]"
10016080-13 = "1;아코 학교 체육복;02;황륜대제의 실행위원 업무라고는 하지만, 설마 이런 형태로 다른 학교의 학생들과 함께 전투를 수행하게 될 줄은……\n#1;em;…\n#1;a"
10016080-14 = "5;하스미 체육복;02;뭔가 불만스러운 점이라도 있으신가요?\n#5;em;[?]\n#5;a"
10016080-15 = "1;아코 학교 체육복;99;아뇨. 그럴 리가요. 오히려 새로운 경험이라 신선한 느낌이네요.\n#1;em;[반응]"
10016080-16 = "1;아코 학교 체육복;01;트리니티 학생들의 실력에 대해서는 어느 정도 파악하고 있었습니다만, 밀레니엄의 전술 정보 처리 능력은 생각 이상이군요."
10016080-17 = "1;아코 학교 체육복;07;현장에서 수집한 데이터를 순식간에 분석해 상대의 약점을 파악하다니. 역시 밀레니엄의 [ruby=세미나]학생회[/ruby] 임원들이네요.\n#1;em;[반짝]"
10016080-18 = "3;유우카 체육복ND;08;그, 그렇게 갑자기 칭찬을 해도……\n#3;em;[///]\n#3;stiff"
10016080-19 = "#all;hide"
10016080-20 = "3;아코 학교 체육복;11;뭐, 물론 그 문제의 원인이 된 로봇도 밀레니엄 학원에서 만든 물건이었지만요.\n#3;closeup\n#3;em;[속상함]"
10016080-21 = "3;유우카 체육복ND;04;윽…… 하, 하지만 기술에는 죄가 없거든?\n#3;stiff"
10016080-22 = "3;유우카 체육복ND;09;물론 엔지니어부의 발명품이 다소 규격 외의 기능을 갖추고 있긴 하지만, 나쁜 건 그 학생들—\n#3;hophop"
10016080-23 = "3;마리 체육복ND;07;지, 진정해주세요. 유우카 씨. 미, 밀레니엄 학원에 책임을 묻는 게 아니니까요.\n#3;em;[땀]"
10016080-24 = "3;유우카 체육복ND;99;크흠…… 여하튼, 그 정도의 데이터 분석은 어려운 일도 아니었어. 세미나의 회계로서 계산은 특기니까.\n#3;greeting"
10016080-25 = "3;유우카 체육복ND;07;나는 오히려 하스미 부부장의 사격 실력이 더 놀라웠는걸?\n#3;em;[재잘]"
10016080-26 = "3;유우카 체육복ND;02;조준경을 사용하지 않고도 움직이는 포탑의 기관 총구를 정확히 명중시키다니…… 도대체 무슨 묘기라도 부린 거야?"
10016080-27 = "3;유우카 체육복ND;02\n5;하스미 체육복;04;글쎄요. 직감…… 이라고 할까요.\n#3;m1\n#5;a\n#5;em;…"
10016080-28 = "5;하스미 체육복;99;정의실현부 활동을 오래 하다 보니 자연스럽게 익히게 된 감각이라 말로 설명해 드리기는 어렵습니다만……"
10016080-29 = "3;유우카 체육복ND;13;흐음. 밀레니엄의 학생으로서 그 직감이라는 표현이 조금 신경 쓰이는걸."
10016080-30 = "3;유우카 체육복ND;03;나중에 기회가 된다면 한번 밀레니엄 학원의 측정 장비로 사격하는 모습을 촬영하게 해 줄 수는 없을까?\n#3;em;[음표]"
10016080-31 = "5;하스미 체육복;03;네. 그리 어려운 일도 아니니까요.\n#5;greeting\n#5;em;[반짝]"
10016080-32 = "[s] \"다들 수고 많았어~\""
10016080-33 = "5;하스미 체육복;03\n3;유우카 체육복ND;13;아, 선생님. 지휘하시느라 수고 많으셨습니다.\n#3;m3\n#5;dr\n#3;em;[반응]"
10016080-34 = "[s1] \"괜찮다면 다 같이 휴식하면서 파르페라도 먹지 않을래?\"\n[s2] \"수고를 위로할 겸 내가 사줄게.\""
10016080-35 = "5;마리 체육복ND;03;말씀은 감사하지만, 부상자 구호에 손이 모자란 것 같아서요. 저는 지금부터 합동의료본부에 가려던 참이었습니다.\n#5;a\n#5;greeting\n#5;em;[반짝]"
10016080-36 = "5;마리 체육복ND;03;말씀은 감사하지만 부상자 구호에 손이 모자란 것 같아서요. 저는 지금부터 합동의료본부에 가려던 참이었습니다.\n#5;a\n#5;greeting\n#5;em;[반짝]"
10016080-37 = "3;유우카 체육복ND;12;저도 지금은 무언가를 먹고 싶은 느낌이 아니라서…… 잠깐 휴게실에서 쉬고 올게요.\n#3;em;[속상함]\n#3;stiff"

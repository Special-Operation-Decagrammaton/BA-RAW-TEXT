[translation]
10016080-1 = "Episode 8;Serendipitous Coincidence"
10016080-2 = "After the dust had finally settled..."
10016080-3 = "*pant* The tank, I mean, the cheer bot was finally shut down..."
10016080-4 = "We completely destroyed its tracks and power supply, so we're in the clear now."
10016080-8 = "We've apprehended the delinquent students who were trying to stage the protest."
10016080-9 = "And thankfully it seems they weren't able to garner much support for their efforts."
10016080-10 = "All the athletes have been evacuated, and all the injured were sent to the Joint Medical Center."
10016080-12 = "The situation seems to be under control now. Good work, everyone."
10016080-13 = "I know I said this was part of being the Executive Committee for the Kivotos Halo Festival, but I honestly didn't expect having to fight alongside students from other schools."
10016080-14 = "Do you have a problem with that?"
10016080-15 = "The opposite, actually. The novelty of it was somewhat refreshing."
10016080-16 = "I'm well aware of Trinity's combative capabilities, but Millennium's ability to process information and adapt quickly on the battlefield was impressive."
10016080-17 = "We wouldn't have been so successful if you hadn't identified the enemy's weaknesses so quickly. I see where Millennium's Student Council gets its reputation."
10016080-18 = "Your kindness is a little suspicious..."
10016080-20 = "Well, it is a fact that you were the one who made the robot that caused this whole incident."
10016080-21 = "...Don't blame our technology!"
10016080-22 = "I mean, yes, the Engineering Department does tend to add unnecessary features to their inventions, but it's still the fault of the protesters for using it improperly!"
10016080-23 = "P-Please don't worry, Yuuka. No one is asking Millennium to take responsibility."
10016080-24 = "Oh... Ahem! Well, anyway, that kind of data analysis is par for the course. As Seminar's treasurer, calculations are my specialty."
10016080-25 = "I think Hasumi's shooting skills are much more worthy of praise."
10016080-26 = "How did you hit a moving turret with such precision without even using a scope? What's your secret?"
10016080-27 = "It's hard to explain... Intuition, I suppose?"
10016080-28 = "I think I've naturally picked it up from working for the Justice Task Force for so long."
10016080-29 = "Interesting... We usually put much more stock into formulas than intuition at Millennium."
10016080-30 = "Do you mind if we run some measurements and record you as you're shooting when you have time?"
10016080-31 = "I'd love to be of assistance."
10016080-32 = "[s] \"Everyone did a great job today!\""
10016080-33 = "You as well, Sensei. Your command led us to victory, as usual."
10016080-34 = "[s1] \"Why don't we all have some parfait together if you guys have time?\"\n[s2] \"Let's go get some parfaits! It's my treat!\""
10016080-35 = "Thank you, but I think they're shorthanded at the Joint Medical Center. I was just about to head over to help."
10016080-36 = "Thank you, but I think they're shorthanded at the Joint Medical Center. I was just about to head over to help."
10016080-37 = "I'm way more tired than hungry right now... I'm going to go rest in the lounge."
10016080-38 = "I'm heading over to the Gehenna athletes' lobby right now. I want to see how the head prefect is doing before the last match."
10016080-42 = "..."
10016080-43 = "[s] \"What about you, Hasumi?\""
10016080-44 = "Um... I'll pass on the parfait, unfortunately."
10016080-45 = "Since I don't have anything pressing to address, I think I'll take a small break and patrol the perimeter."
10016080-46 = "[s3] \"Then why don't you join the games yourself?\"\n[s4] \"I bet a new experience would be fun. Like playing in the games.\""
10016080-47 = "The games...?"
10016080-48 = "The games...?"
10016080-49 = "I've already told you. Participating in the festival isn't part of my job description."
10016080-50 = "If it's to contribute to Trinity's victory... Actually, for the success of the festival, it's better for students with strong physical talents like Tsurugi to participate."
10016080-51 = "I'm more than happy in my current position."
10016080-52 = "[s] \"But...\""
10016080-53 = "Well, if you'll excuse me."
10016080-60 = "Did you see that? Did you see me take their hat at the very last second?"
10016080-61 = "What a shame... I would have won if I hadn't tripped in the beginning!"
10016080-62 = "I'll be the MVP next time! You guys better watch out!"
10016080-63 = "Haha! I'll take that challenge! I'd be happy to add another victory to my belt."
10016080-68 = "It seems everyone is enjoying the festival."
10016080-69 = "(Well, of course. It's a festival and there's much to enjoy...)"
10016080-70 = "(Sensei said it would be more fun if I joined the games, but...)"
10016080-71 = "(But naturally, not everyone can mindlessly enjoy the festival. Peace can only be maintained at someone's sacrifice.)"
10016080-72 = "(I have to remain vigilant for the sake of justice.)"
10016080-78 = "What do we do...? Who could've predicted the president would faint from an upset stomach right before the finals?"
10016080-79 = "...I warned you about those takoyaki!"
10016080-80 = "The ingredients may have seemed normal, but the fact that it could walk was definitely, definitely not normal!"
10016080-81 = "Twinkling octopus... Round takoyaki..."
10016080-82 = "Maybe there's a solution in the clouds..."
10016080-83 = "I wish...there was something I could do..."
10016080-84 = "But...I don't have a lot of friends... Where could we find someone...?"
10016080-85 = "Well, we do have exactly four people."
10016080-87 = "Those students are definitely from Hyakkiyako..."
10016080-88 = "I see. The next game is the final match between Hyakkiyako and the Millennium School."
10016080-89 = "Millennium currently has the lead. I hope the Hyakkiyako team can stop them in their tracks..."
10016080-90 = "Oh! Why don't you take her place, Tsukuyo?"
10016080-91 = "Th-That's impossible...!"
10016080-92 = "If someone as big as me...were to try to get on top... Everything would collapse!"
10016080-93 = "M-Maybe I can do it then!"
10016080-94 = "But I'm way too short to hold anyone!"
10016080-96 = "An octopus in a jar. Dreams of food poisoning..."
10016080-100 = "It seems this match will be an easy win for Millennium."
10016080-101 = "It's a shame, but I shouldn't get involved in matters from other schools."
10016080-103 = "Ugh... I can't think of anything..."
10016080-104 = "If only I could think of a secret plan like Kaibei from The Lonely 77 Wandering Ninjas! We would win this no problem-o."
10016080-105 = "I'm sorry..."
10016080-106 = "I wish...I had gotten food poisoning instead... I'm so big...and useless..."
10016080-107 = "I'm sorry I exist... I'm too tall..."
10016080-112 = "What are you apologizing for?"
10016080-113 = "Wh-Who...?"
10016080-115 = "(They're huge...!)"
10016080-116 = "I was going to stay out of this, but I couldn't let that comment go."
10016080-117 = "Do you understand the rules for the upcoming cavalry battle?"
10016080-118 = "Of course we do!"
10016080-119 = "We combine to create a horse and then put a jockey on top. Then the jockey has to steal the other jockeys' hats!"
10016080-120 = "Yes, the jockey that steals the other teams' hats first is the winner."
10016080-121 = "If you want to be able to reach and grab a hat from someone's head, it's easiest to do so if you have the higher ground."
10016080-122 = "Which means that height is an extreme advantage during the cavalry battle!"
10016080-124 = "I-I see...!"
10016080-126 = "But if Tsukuyo is part of the horse, it would be hard to balance considering all of our heights..."
10016080-127 = "Maybe we could wear some very, very high heels."
10016080-128 = "You're misunderstanding. The students making up the horse don't always need to be the same height."
10016080-129 = "You can just place a platform under the shorter student and equalize your horse."
10016080-131 = "I don't get it, though! How do we move if we're on a platform?"
10016080-132 = "You don't. There's not technically any rules that say you need to stay moving throughout the battle. People just default to that because being stationary makes you an easy target."
10016080-133 = "But if both students are on large platforms, I doubt the other jockeys will even be able to reach your hat."
10016080-134 = "It would be like...making a castle!"
10016080-135 = "Then... It's just like ninjas protecting their lord's residence!"
10016080-137 = "How did you come up with such an awesome strategy so fast?"
10016080-138 = "It's just like the time Kaibei pricked up his black ears and blocked a massive army in Episode 108 of The Lonely 77 Wandering Ninjas!"
10016080-139 = "Sir Kaibei!"
10016080-140 = "Are you talking to me? My name is Hasumi..."
10016080-141 = "I'm sorry, Hasumi! Please lend us your wisdom!"
10016080-142 = "W-Wisdom?"
10016080-143 = "Ever since our president fainted, we've been wandering around like vagabonds who've lost their master."
10016080-144 = "We need a tactician at a time like this! We need your help, Hasumi!"
10016080-146 = "Yes! If the super smart lady from Trinity helps us, we'll definitely win!"
10016080-147 = "A hot afternoon. A girl with black wings. This must be fate..."
10016080-148 = "P-Please...!"
10016080-153 = "...Okay, fine."
10016080-154 = "I am on break anyway, and it would benefit Trinity in the long run..."
10016080-155 = "I'll help you."

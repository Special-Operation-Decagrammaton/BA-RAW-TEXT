[translation]
10016080-1 = "第8話;偶然的緣分"
10016080-2 = "（騷動總算告一段落之後……）"
10016080-3 = "哈啊，哈啊……#n戰車……不，已確認應援機器人停止運作。"
10016080-4 = "履帶和引擎都已完全摧毀，我想應該是無法再胡鬧了。"
10016080-8 = "也確認了逃跑的不良學生的身分。"
10016080-9 = "幸好沒有學生趁機鬧事。"
10016080-10 = "選手們也都順利完成避難。#n受傷的人剛才也送往聯合醫療本部了。"
10016080-12 = "算是暫時避開了最壞的情況。#n大家辛苦了。"
10016080-13 = "雖然是實行委員業務的一環，沒想到會和其他學校的學生並肩戰鬥……"
10016080-14 = "有什麼不滿嗎？"
10016080-15 = "不……倒不如說是嶄新的體驗，覺得很新鮮。"
10016080-16 = "三一的實力在一定程度上已事先有所把握，但千年的情報處理能力確實超乎想像。"
10016080-17 = "居然能在瞬間分析現場收集到的資料，進而看穿對方的弱點。#n千年的[ruby=研討會]學生會[/ruby]幹部果然不容小覷。"
10016080-18 = "突，突然就被稱讚了……"
10016080-20 = "雖然事件也是千年製造的機器人引起的就是了。"
10016080-21 = "唔……但，但是技術是無辜的吧？"
10016080-22 = "工程師部的發明搭載了多餘的功能是事實沒錯，#n但有錯的是那些引起騷動的──"
10016080-23 = "請，請冷靜下來，優香同學。#n我並沒有要向千年追究責任的意思。"
10016080-24 = "咳……資料分析其實也不是那麼難。#n身為研討會的會計，這種程度不算什麼。"
10016080-25 = "我反倒是被蓮實副部長的精準射擊給震驚到了……"
10016080-26 = "未使用瞄具卻能準確地命中移動的砲身……#n到底是使用了什麼樣的技巧？"
10016080-27 = "這個嘛……可以說是直覺吧。"
10016080-28 = "因為是在實現正義部的活動中自然而然掌握的，所以很難用言語說明……"
10016080-29 = "……真好奇你所說的那個直覺呢。"
10016080-30 = "下次能讓我用千年的測量工具拍攝你射擊的樣子嗎？"
10016080-31 = "好的，這不成問題。"
10016080-32 = "[s]「大家都辛苦了～」"
10016080-33 = "啊，老師。謝謝你的指揮。"
10016080-34 = "[s1]「可以的話，大家一起去吃個百匯冰淇淋吧。」\n[s2]「辛苦了。我請大家去攤販區吃東西。」"
10016080-35 = "很高興聽到您這麼說，但聯合醫療本部的人手好像不夠……#n我去幫忙救助傷患。請大家好好享用吧。"
10016080-36 = "很高興聽到您這麼說，但聯合醫療本部的人手好像不夠……#n我去幫忙救助傷患。請大家好好享用吧。"
10016080-37 = "我現在也沒有食慾……想去休息室休息一下。"
10016080-38 = "我要去格黑娜的選手休息室。#n在最後的接力賽之前，我想確認一下陽奈委員長的狀態。"
10016080-42 = "……"
10016080-43 = "[s]「蓮實呢？」"
10016080-44 = "百匯……冰淇淋……#n我，我也先謝絕老師的好意。"
10016080-45 = "和其他人不同，雖然我沒有什麼特別的行程，但我想去運動場看看，轉換一下心情。"
10016080-46 = "[s3]「那麼，要不要下場參加比賽呢？」\n[s4]「將會是嶄新的體驗，一定會很有趣的。」"
10016080-47 = "我……參加比賽嗎？"
10016080-48 = "我……參加比賽嗎？"
10016080-49 = "……剛才也說了，參加比賽並非我的職責。"
10016080-50 = "為了讓三一奪得冠軍……以及讓今天的慶典圓滿落幕，#n比賽還是由弦生那樣運動神經優秀的學生參加比較合理。"
10016080-51 = "我只要能待在後方支持大家的努力就足夠了。"
10016080-52 = "[s]「但是……」"
10016080-53 = "那麼，我先告辭了。"
10016080-60 = "看到了嗎？我在最後一刻帥氣摘下你帽子的瞬間！"
10016080-61 = "可惡……要不是姿勢歪了，不然就是我贏了……！"
10016080-62 = "下次我一定會獲勝並成為MVP的！#n給我記住！"
10016080-63 = "呵呵，我隨時都接受挑戰！"
10016080-68 = "總覺得大家……看起來很開心呢。"
10016080-69 = "（不，開心也是理所當然的。今天畢竟是難得的慶典）"
10016080-70 = "（雖然老師也要我參加比賽……）"
10016080-71 = "（但是不能連我都樂在其中。和平總是由於某些人的犧牲才得以成立）"
10016080-72 = "（不行……離閉幕式還有一段時間，還不能鬆懈下來）"
10016080-78 = "唔……怎麼辦？#n等一下就是決賽了，沒想到部長竟然會因為肚子痛而倒下……"
10016080-79 = "真是的！就說那個章魚燒很可疑了！"
10016080-80 = "雖然店家說只放了章魚而已，但烤好後還會那樣動的章魚燒，怎麼想都覺得奇怪吧！"
10016080-81 = "亮晶晶～章魚燒～……圓滾滾～章魚燒～……"
10016080-82 = "似乎能寫出很棒的俳句呢～"
10016080-83 = "有，有什麼我能做的事嗎……"
10016080-84 = "但我的交友沒那麼廣闊……騎手方面該怎麼辦……"
10016080-85 = "唔嗯，姑且是湊齊4人了……"
10016080-87 = "那些學生……記得是百鬼夜行的……"
10016080-88 = "也對，接下來是騎馬打仗的決賽。#n沒記錯的話，是由百鬼夜行對上千年……"
10016080-89 = "目前的綜合排名是由千年坐穩第1名，如果百鬼夜行能在這時打場勝仗，#n阻擋千年的勢頭就好了……"
10016080-90 = "這樣的話，就由月夜閣下代替部長擔任騎手吧！"
10016080-91 = "不，不行啊……"
10016080-92 = "如果是由我當騎手的話，肯定無法好好地保持平衡……"
10016080-93 = "那就交由伊樹菜擔任騎手吧！"
10016080-94 = "咦！？這樣的話，就變成我的手臂搆不到了呀──！"
10016080-96 = "罐子裡的章魚。#n夢見了食物中毒……"
10016080-100 = "從這個情況看來，獲勝的想必會是千年吧……"
10016080-101 = "雖然遺憾，但這不是三一的戰鬥，只能在一旁看著──"
10016080-103 = "唔，沒有什麼好法子嗎？"
10016080-104 = "如果伊樹菜有像是《徬徨的孤獨忍者77人組》中，#n「策士．甲斐兵衛」那樣優秀的謀略頭腦就好了……"
10016080-105 = "嗚……對，對不起……"
10016080-106 = "如果留下的是部長，而不是我這種大而無用的部員就好了……"
10016080-107 = "個子長這麼高……真是抱歉……"
10016080-112 = "──個子高會構成什麼問題嗎？"
10016080-113 = "你，你是……？"
10016080-115 = "（好，好大……！）"
10016080-116 = "本來是想默不出聲的，但剛才那番話真是讓人聽不下去。"
10016080-117 = "大家知道騎馬打仗的規則嗎？"
10016080-118 = "那當然！"
10016080-119 = "是由3人當馬，讓上頭的騎手去爭奪帽子的比賽。"
10016080-120 = "沒錯。騎馬打仗的勝負取決於如何快速搶下對方的帽子。"
10016080-121 = "為了能有效地把手伸向對方的頭部，必須在稍微高一點的位置與對方較勁。"
10016080-122 = "也就是說……身高佔有極大的優勢。#n如果比對方的馬還要高的話，就能單方面地向下搶奪帽子。"
10016080-124 = "確，確實如此……！"
10016080-126 = "但如果是月夜醬當馬的話，其他人的身高配合不了吧。"
10016080-127 = "唔嗯～需要墊高呢。"
10016080-128 = "……說的沒錯。#n在左右兩側支撐的人，未必要和擔任馬的人一樣高。"
10016080-129 = "只要用踏台將兩側的學生墊高，就能達到平均身高的效果了。"
10016080-131 = "墊高……？#n但這樣的話就沒辦法移動了吧？"
10016080-132 = "騎馬打仗並沒有一定要移動的規定。#n一般之所以會保持移動，只是因為靜止不動很容易被盯上而已。"
10016080-133 = "只要兩側學生能夠支撐高大的「台柱」，一般選手根本無法觸及騎手頭部的高度──"
10016080-134 = "這樣最強的堡壘就完成了！"
10016080-135 = "原，原來如此……只需要建立一座堡壘就行了！"
10016080-137 = "居然在這麼短的時間內想出這麼棒的計策……"
10016080-138 = "簡直就像《徬徨的孤獨忍者77人組》第108話中，#n一邊豎著黑色耳朵一邊抵擋住大軍的「策士．甲斐兵衛」呢！"
10016080-139 = "非常感謝！甲斐兵衛閣下！"
10016080-140 = "是在稱呼我嗎？#n我的名字叫蓮實……"
10016080-141 = "失禮了，蓮實閣下！#n請將智慧借給伊樹菜和大家！"
10016080-142 = "智，智慧嗎？"
10016080-143 = "自從部長倒下之後，伊樹菜和夥伴們就像失去主公的浪人一般迷失了目標。"
10016080-144 = "就在這個時候，蓮實閣下出現了！#n拜託了，請助伊樹菜一臂之力！"
10016080-146 = "嗯嗯！如果三一的帥氣女士能幫助我們的話，我們肯定能獲得勝利的！"
10016080-147 = "炎熱的午後～，黑翼的少女，何等的緣份……"
10016080-148 = "我，我也拜託你了……！"
10016080-153 = "……沒辦法了呢。"
10016080-154 = "反正我也在休息，如果百鬼夜行勝利的話，就結果來說對三一也是有利的……"
10016080-155 = "這次的比賽，就讓我也盡點棉薄之力吧。"

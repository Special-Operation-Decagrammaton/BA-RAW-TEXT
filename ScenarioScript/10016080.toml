[translation]
10016080-1 = "ตอนที่ 8;ความสัมพันธ์ที่คาดไม่ถึง"
10016080-2 = "(หลังจากสถานการณ์วุ่นวายคลี่คลายลงได้ในระดับหนึ่ง...)"
10016080-3 = "แฮ่ก... แฮ่ก... รถถัง ไม่สิ หุ่นยนต์เชียร์หยุดทำงานแล้ว..."
10016080-4 = "ล้อกับชุดพลังงานถูกทำลายจนใช้การไม่ได้ แบบนี้คงจะออกมาอาละวาดไม่ได้แล้วละ"
10016080-8 = "ฉันตรวจสอบข้อมูลของเด็กเกเรที่หนีไปมาแล้วค่ะ"
10016080-9 = "โชคดีที่ไม่มีนักเรียนคนไหนใช้ประโยชน์จากความวุ่นวายนี้ในการก่อจลาจลค่ะ"
10016080-10 = "นักกีฬาที่อยู่ในสนามที่เกิดเหตุก็อพยพออกไปอย่างปลอดภัยแล้วค่ะ ส่วนคนที่ได้รับบาดเจ็บก็ไปยัง#nหน่วยพยาบาลสัมพันธ์กันเมื่อสักครู่ค่ะ"
10016080-12 = "เราจัดการสถานการณ์กันได้ระดับหนึ่งแล้วสินะ ทุกคนทำได้ดีมาก"
10016080-13 = "ถึงนี่จะเป็นงานของคณะกรรมการจัดงานฮาโลเฟสติวัล แต่ก็ไม่คิดเลยนะคะ ว่าจะต้องต่อสู้เคียงบ่า#nเคียงไหล่กับนักเรียนจากโรงเรียนอื่นแบบนี้..."
10016080-14 = "มีอะไรไม่พอใจตรงไหนหรือเปล่าคะ?"
10016080-15 = "ไม่หรอกค่ะ จะไปมีได้ยังไงล่ะคะ ถือเป็นประสบการณ์ใหม่ที่หาได้ยากมากกว่าค่ะ"
10016080-16 = "ฉันก็พอรู้ความสามารถของนักเรียนโรงเรียนทรีนิตี้อยู่บ้าง แต่ฝีมือในการประมวลผลข้อมูลเชิงกลยุทธ์#nของทรีนิตี้ ต้องบอกว่าเหนือความคาดหมายเลยนะคะ"
10016080-17 = "วิเคราะห์ข้อมูลที่เก็บได้จากจุดเกิดเหตุแล้วระบุจุดอ่อนของอีกฝ่ายได้อย่างรวดเร็วเลย นี่สินะคะ สมาชิก[ruby=เซมิน่า]สภานักเรียน[/ruby]ของมิลเลเนียมที่เลื่องลือกัน"
10016080-18 = "มะ... ไม่ต้องชมกันขนาดนี้ก็ได้..."
10016080-20 = "ก็นะ ถึงแม้สาเหตุของปัญหาจะมาจากหุ่นยนต์ที่เป็นสิ่งประดิษฐ์ของโรงเรียนมิลเลเนียมก็เถอะค่ะ"
10016080-21 = "อึก... แล้วเทคโนโลยีมันไปผิดอะไรด้วยล่ะ?"
10016080-22 = "ถึงแม้สิ่งประดิษฐ์ของชมรมวิศวกรรมจะมีฟังก์ชันนอกเหนือไปจากข้อกำหนดเล็กน้อย แต่ฝ่ายที่ผิดคือ#nนักเรียนพวกนั้น—"
10016080-23 = "จะ... ใจเย็นๆ นะคะคุณยูกะ ระ... เราไม่ได้ถามหาความรับผิดชอบจากโรงเรียนมิลเลเนียมหรอกค่ะ"
10016080-24 = "ฮึ่ม... ช่างเถอะ การวิเคราะห์ข้อมูลแบบนั้นไม่ใช่เรื่องยากอะไรเลย ก็การคำนวณเป็นความสามารถ#nพิเศษของนักบัญชีแห่งเซมิน่าอยู่แล้ว"
10016080-25 = "ฉันประหลาดใจกับฝีมือในการยิงของรองหัวหน้าฮาสุมิมากกว่าอีก"
10016080-26 = "สอยปืนกลบนป้อมปืนที่เคลื่อนไหวได้อย่างแม่นยำโดยไม่ต้องใช้กล้องสโคปเล็งเลยด้วยซ้ำ... นี่มัน#nทักษะอะไรกันเนี่ย?"
10016080-27 = "ก็ไม่รู้สิคะ คงจะเป็นสัญชาตญาณ... มั้งคะ"
10016080-28 = "มันเป็นประสาทสัมผัสที่เรียนรู้โดยธรรมชาติเมื่อทำงานของชมรมทวงความยุติธรรมนานๆ เข้าน่ะค่ะ จะให้อธิบายเป็นคำพูดก็คงลำบากนะคะ..."
10016080-29 = "อืม ในฐานะนักเรียนมิลเลเนียม ฉันคาใจกับการใช้คำว่าสัญชาตญาณจังเลย"
10016080-30 = "ไว้คราวหน้าถ้ามีโอกาส ขอถ่ายวิดีโอตอนยิงปืนด้วยอุปกรณ์วัดของโรงเรียนมิลเลเนียมหน่อยได้มั้ย?"
10016080-31 = "ได้ค่ะ ไม่ใช่เรื่องใหญ่เลยค่ะ"
10016080-32 = "[s] \"ทุกคนทำได้เยี่ยมมาก~\""
10016080-33 = "ค่ะคุณครู ขอบคุณมากที่ช่วยสั่งการค่ะ"
10016080-34 = "[s1] \"ถ้าไม่ติดอะไรกัน ไปพักกินพาร์เฟต์ด้วยกันมั้ย?\"\n[s2] \"เหนื่อยกันมามากแล้ว ครูเลี้ยงขนมทุกคนเอง\""
10016080-35 = "ขอบคุณสำหรับน้ำใจนะคะ แต่เหมือนว่าหน่วยพยาบาลต้องการคนเพิ่มในการดูแลผู้ได้รับบาดเจ็บ และฉันก็กำลังจะไปที่นั่นอยู่ด้วยค่ะ"
10016080-36 = "ขอบคุณสำหรับน้ำใจนะคะ แต่เหมือนว่าหน่วยพยาบาลต้องการคนเพิ่มในการดูแลผู้ได้รับบาดเจ็บ และฉันก็กำลังจะไปที่นั่นอยู่ด้วยค่ะ"
10016080-37 = "ส่วนฉันก็ไม่ได้รู้สึกอยากกินอะไรตอนนี้... ขอไปพักที่ห้องพักผ่อนสักเดี๋ยวแล้วกันค่ะ"
10016080-38 = "ฉันว่าจะไปห้องพักนักกีฬาของเกเฮนน่าค่ะ ต้องไปเช็กสภาพร่างกายของท่านประธานกรรมการ#nวินัยก่อนจะมีการแข่งขันวิ่งผลัดรอบสุดท้ายน่ะค่ะ"
10016080-42 = ".........."
10016080-43 = "[s] \"ฮาสุมิล่ะ?\""
10016080-44 = "ถ้าเป็นพาร์เฟต์... ฉันขอผ่านดีกว่าค่ะ"
10016080-45 = "ถึงฉันจะไม่มีตารางพิเศษเหมือนคณะกรรมการจัดงานคนอื่น แต่ก็ว่าจะใช้เวลาพักในการลาดตระเวน#nสนามกีฬาดูค่ะ"
10016080-46 = "[s3] \"ถ้าไม่มีภารกิจอะไร ก็ลองลงแข่งกีฬาดูบ้างมั้ยล่ะ?\"\n[s4] \"ลงแข่งกีฬาสิ ทั้งสนุกทั้งเป็นประสบการณ์ใหม่ด้วย\""
10016080-47 = "ให้ฉัน... ลงแข่งขัน... เหรอคะ?"
10016080-48 = "ให้ฉัน... ลงแข่งขัน... เหรอคะ?"
10016080-49 = "อย่างที่ฉันบอกไปก่อนหน้านี้ การแข่งกีฬาไม่ใช่หน้าที่ของฉันหรอกค่ะ"
10016080-50 = "ถ้าเพื่อชัยชนะของทรีนิตี้ ไม่สิ เพื่อความสำเร็จของเทศกาลครั้งนี้ ให้นักเรียนที่มีสมรรถภาพทางกายดี อย่างซึรุกิไปเป็นนักกีฬาน่าจะเหมาะสมกว่าค่ะ"
10016080-51 = "ส่วนฉัน แค่ได้คอยช่วยเหลือนักกีฬาคนอื่นอยู่จากข้างหลังก็พอแล้วค่ะ"
10016080-52 = "[s] \"แต่ว่า...\""
10016080-53 = "ถ้างั้นฉันขอตัวนะคะ"
10016080-60 = "เธอเห็นใช่มั้ย? ที่ฉันไปดึงหมวกมาอย่างเท่ในตอนท้ายน่ะ!"
10016080-61 = "ฮึ่ย น่าเสียดาย... ถ้าไม่ล้มในช่วงแรก ฉันก็ชนะไปแล้ว...!"
10016080-62 = "ครั้งหน้าฉันจะเป็น MVP ให้ได้เลย เตรียมตัวไว้ให้ดีเถอะ!"
10016080-63 = "ฮุฮุ มีเท่าไรก็ใส่มาเลย ฉันเองก็จะไม่อ่อนให้เหมือนกัน!"
10016080-68 = "ทุกคนดูสนุกกันจังนะคะ"
10016080-69 = "(เดี๋ยวสิ มันก็แน่นอนอยู่แล้วไม่ใช่เหรอว่าต้องสนุก ก็นานๆ จะมีเทศกาลและกิจกรรมสนุกๆ แบบนี้...)"
10016080-70 = "(ถึงคุณครูจะบอกว่าถ้าเราลงแข่งขันเองบ้าง ก็อาจจะสนุกกว่านี้ก็เถอะ...)"
10016080-71 = "(แต่จะมาเพลิดเพลินกันทุกคนไม่ได้ มันจะต้องมีใครสักคนเสียสละเพื่อสันติภาพเสมอ...)"
10016080-72 = "(ถ้าเราปล่อยใจไปกับบรรยากาศแห่งความสนุกรอบตัวละก็...)"
10016080-78 = "งือ... ทำยังไงดีคะ? จะถึงการแข่งรอบชิงชนะเลิศแล้ว แต่หัวหน้าดันมาท้องเสียซะงั้น..."
10016080-79 = "ฉันบอกไปแล้วนี่ว่าทาโกะยากินั่นมันน่าสงสัยน่ะ"
10016080-80 = "ถึงจะบอกว่าใส่ปลาหมึกยักษ์เข้าไปก็เถอะ แต่ทาโกะยากิที่ไหนมันเดินสองขาได้บ้างล่ะ? มองจากดาวอังคารยังรู้เลยว่าแปลก!"
10016080-81 = "ปลาหมึกยักษ์ส่องแสง... ทาโกะยากิลูกอ้วนกลม..."
10016080-82 = "แรงบันดาลใจในการแต่งกลอนมาแล้ว—"
10016080-83 = "ถะ... ถ้าเป็นเรื่องที่ฉันพอช่วยได้ ฉันก็จะทำให้เต็มที่หรอกนะ แต่ว่า..."
10016080-84 = "แต่ว่าฉันไม่ค่อยรู้จักใครเท่าไร... จะให้ไปหาคนมาแข่งจากไหนดีคะ?"
10016080-85 = "อืม ถึงตอนนี้จะมีกัน 4 คนก็เถอะ..."
10016080-87 = "นั่นมันนักเรียนของเฮียกคิยาโคนี่นา..."
10016080-88 = "อย่างนี้นี่เองสินะคะ การแข่งขันต่อไปคือการแข่งขี่ม้ารอบชิงชนะเลิศ ระหว่างเฮียกคิยาโคกับโรงเรียน#nมิลเลเนียม"
10016080-89 = "ตอนนี้มิลเลเนียมยังขึ้นนำอยู่ หวังว่าทีมเฮียกคิยาโคจะตีตื้นและปัดมิลเลเนียมให้ตกจากอันดับ 1 ได้นะ..."
10016080-90 = "งั้นให้ท่านสึคุโยะไปเป็นคนขี่แทนดีมั้ยคะ?"
10016080-91 = "มะ... ไม่ไหวหรอกค่ะ..."
10016080-92 = "ถ้าให้คนตัวใหญ่อย่างฉันไปอยู่ข้างบน มีหวังม้าได้ล้มลงมาแน่นอนค่ะ"
10016080-93 = "งั้นถ้าให้อิซุนะไปเป็นคนขี่แทนล่ะ...!"
10016080-94 = "คือว่า... แขนฉันไม่น่าจะเอื้อมถึงน่ะ?"
10016080-96 = "ความฝันของปลาหมึกยักษ์... คือการนำพาโรคอาหารเป็นพิษ..."
10016080-100 = "แบบนี้มิลเลเนียมต้องเป็นฝ่ายชนะแน่นอนเลย"
10016080-101 = "น่าเสียดายที่คงทำได้แค่เฝ้าดู เพราะนี่ไม่ใช่ธุระอะไรของทรีนิตี้..."
10016080-103 = "งือ ทำยังไงดี คิดอะไรดีๆ ไม่ออกเลยค่ะ..."
10016080-104 = "หากอิซุนะมีกลอุบายลับดั่งเช่นที่ 'ไคเบะ' ผู้มีชั้นเชิงใน <นินจาพเนจรผู้โดดเดี่ยว 77 คน> มี อิซุนะก็คงแก้ไขปัญหานี้ได้แล้ว..."
10016080-105 = "อ่า... ขอโทษนะคะ..."
10016080-106 = "ขอโทษที่คนที่เหลือดันเป็นสมาชิกที่ตัวใหญ่แบบนี้..."
10016080-107 = "ฉันขอโทษที่ตัวสูงค่ะ..."
10016080-112 = "ตัวสูงมันเป็นปัญหาตรงไหนเหรอคะ?"
10016080-113 = "คะ... คุณคือ...?"
10016080-115 = "(ยะ... ใหญ่มาก...!)"
10016080-116 = "ตอนแรกฉันว่าจะฟังอยู่เงียบๆ แต่สุดท้ายก็ปล่อยผ่านไปไม่ได้ค่ะ"
10016080-117 = "ทุกคนรู้กติกาของการแข่งขี่ม้ากันหรือเปล่าคะ?"
10016080-118 = "ก็ต้องรู้สิ!"
10016080-119 = "ให้คน 3 คนเป็นม้า แล้วให้คนขี่ม้าขึ้นนั่ง แล้วคนขี่ม้าก็ต้องไปแย่งหมวกของอีกทีมหนึ่งมาใช่มั้ยล่ะ?"
10016080-120 = "ใช่แล้วค่ะ ผลแพ้ชนะจะขึ้นอยู่กับว่าใครแย่งหมวกมาได้ก่อนค่ะ"
10016080-121 = "เพราะฉะนั้นในทางเทคนิคแล้ว เราต้องอยู่ในตำแหน่งที่สูงกว่าฝ่ายตรงข้ามนิดหน่อย จะได้เอื้อมมือไป#nถึงศีรษะของฝ่ายตรงข้ามได้ค่ะ"
10016080-122 = "และนั่นก็แปลว่า... ความสูงกลับเป็นข้อได้เปรียบในการแข่งขันขี่ม้าค่ะ!"
10016080-124 = "งะ... งั้นเหรอคะ...!"
10016080-126 = "แต่ถ้าเกิดว่าสึคุโยะจังเป็น 'ฐาน' ความสูงก็จะไม่พอดีกับนักเรียนคนอื่นน่ะสิ?"
10016080-127 = "งั้นก็ต้องใส่รองเท้าที่ทำให้สูงขึ้นสินะ..."
10016080-128 = "นักเรียนปีกซ้ายกับปีกขวาไม่จำเป็นต้องตัวสูงเท่ากันหรอกค่ะ"
10016080-129 = "เพราะถ้าเราหาฐานมารองไว้ใต้เท้าของนักเรียนที่เป็นปีกทั้งสองข้าง ก็จะปรับความสูงให้เท่ากันได้ยัง#nไงล่ะคะ"
10016080-131 = "คะ? แต่ถ้าขึ้นไปอยู่บนฐาน ก็น่าจะเคลื่อนไหวไม่ได้นะคะ?"
10016080-132 = "ในการแข่งขันขี่ม้า ไม่มีกติกาที่บอกไว้ว่าต้องเคลื่อนไหวค่ะ ที่คนอื่นเคลื่อนไหวกัน ก็เพราะหากยืนอยู่#nเฉยๆ ก็จะโดนโจมตีได้ง่ายค่ะ"
10016080-133 = "แต่ถ้าหากเอา 'ฐาน' ตัวสูงมาทำเป็นเหมือนเครื่องค้ำให้นักเรียนที่เป็นปีกทั้งสอง คนที่อยู่บนม้าก็คงจะ#nอยู่สูงไปด้วยจนไม่มีใครแตะหัวถึง—"
10016080-134 = "แบบนี้ก็จะเป็นป้อมปราการที่สมบูรณ์ค่ะ!"
10016080-135 = "นะ... นี่มันแผนการสร้างป้อมปราการสินะคะ!"
10016080-137 = "ไม่อยากเชื่อเลยว่าคุณจะคิดแผนการที่เฉียบแหลมได้ในเวลาอันสั้นแบบนี้..."
10016080-138 = "ช่างเหมือนกับ <นินจาพเนจรผู้โดดเดี่ยว 77 คน> ตอนที่ 108 ที่ไคเบะสกัดกองทัพทหารใหญ่ได้ด้วย#nการเงี่ยหูฟังเรื่องราวของฝ่ายตรงข้ามเลยค่ะ!"
10016080-139 = "ท่านไคเบะ!"

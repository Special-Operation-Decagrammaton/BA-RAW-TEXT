[translation]
83306100100-6 = "หนึ่ง... สอง... สาม..."
83306100100-12 = "นับอะไรเหรอ...?"
83306100100-13 = "อ๊ะ ก็คิดว่าเป็นใครเสียอีก ประธานกรรมการวินัยนี่เอง"
83306100100-14 = "ฉันกำลังทำอะไรอยู่น่ะเหรอ? ไม่มีอะไรมากหรอก"
83306100100-15 = "ฉันกำลังเล่นซ่อนหาอยู่กับอิบูกิและคิราระน่ะ ตอนนี้ฉันเป็นคนหา"
83306100100-16 = "อิบูกิมาบอกว่าอยากเล่นกับพวกเรา คิราระก็เลยดีอกดีใจแล้วชวนให้มาเล่นด้วยกัน"
83306100100-17 = "คิราระน่ะชอบเล่นกับเด็กๆ มากเลย แต่ก็นะ คงไม่ใช่เรื่องแปลกสำหรับคิราระหรอก"
83306100100-18 = "อืม แต่นี่ก็ใกล้ถึงเวลาที่นัดกับคนอื่นไว้แล้ว สงสัยต้องรีบหาสองคนนั้นให้เจอแล้วละ"
83306100100-19 = "ถ้างั้นฉันช่วยไหม?"
83306100100-20 = "ประธานกรรมการวินัยน่ะเหรอ?"
83306100100-24 = "อ่า... จะว่าไปแล้ว มีข่าวลือว่าประธานกรรมการวินัยมีตาเหยี่ยวที่ไม่ว่าเด็กเจ้าปัญหาคนไหน#nก็ตามตัวมาได้หมดเลยนี่นา"
83306100100-25 = "งั้นก็แสดงว่า... เป็นผู้เชี่ยวชาญในการเล่นซ่อนหาสินะ"
83306100100-26 = "ถึงจะไม่รู้ว่าข่าวลือนั่นมีต้นตอมาจากไหน แต่ฉันคิดว่าน่าจะเป็นเรื่องเกินจริงนะ"
83306100100-27 = "ฮ่าฮ่า ฉันก็แค่ได้ยินและได้เห็นมาจากในโซเชียลน่ะ"
83306100100-28 = "แต่ว่าถ้าอยากช่วยละก็ อื้ม งั้นฉันขอรบกวนหน่อยนะ"

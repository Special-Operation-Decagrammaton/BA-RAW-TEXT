[translation]
83306100100-6 = "一……二……三……"
83306100100-12 = "……為什麼在數數？"
83306100100-13 = "啊，還以為是誰，是風紀委員長耶。"
83306100100-14 = "問我在做什麼？其實也沒什麼。"
83306100100-15 = "只是在跟伊吹和綺羅羅醬一起玩捉迷藏而已。#n順帶一提，我負責當鬼。"
83306100100-16 = "因為伊吹說想和我們一起玩，綺羅羅醬就立刻舉手同意了。"
83306100100-17 = "綺羅羅醬很喜歡陪小孩一起玩，這麼做或許也很正常吧。"
83306100100-18 = "唔嗯，可是我跟其他人約好的時間就快到了，好像得快點結束。"
83306100100-19 = "那要不要我幫忙？"
83306100100-20 = "風紀委員長要幫我？"
83306100100-24 = "啊……仔細想想，有傳聞說風紀委員長擁有絕對不會放過任何一名問題學生的鷹眼。"
83306100100-25 = "換句話說……是個捉迷藏專家？"
83306100100-26 = "雖然不知道你是從哪裡聽來的，但我覺得那只是一種誇飾而已。"
83306100100-27 = "哈哈，我也只是在SNS上看過這樣的說法啦。"
83306100100-28 = "如果你願意幫忙的話，就麻煩你囉。"

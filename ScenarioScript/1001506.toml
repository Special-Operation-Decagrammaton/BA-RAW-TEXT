[translation]
1001506-1 = "貓與愛麗絲"
1001506-2 = "千年．商店街"
1001506-3 = "……"
1001506-5 = "（愛麗絲在商店街裡，盯著頭頂上的某個東西看）"
1001506-6 = "[s1] 「愛麗絲，你在做什麼呢？」\n[s2] 「有什麼令人在意的東西嗎？」"
1001506-9 = "啊，你好，老師。"
1001506-10 = "愛麗絲正在看一隻貓。"
1001506-11 = "[s] 「貓……？」"
1001506-12 = "（有隻在商店街二樓的貓正豎著毛，對愛麗絲非常警戒）"
1001506-13 = "呼嚇──！"
1001506-14 = "牠很生氣看著愛麗絲，明明愛麗絲什麼都沒做的說……"
1001506-15 = "貓先生是不是討厭愛麗絲呢？"
1001506-16 = "前天和昨天也都被牠兇了，所以只好回家去。"
1001506-17 = "明明愛麗絲只想摸摸看貓，牠卻完全不靠過來……"
1001506-19 = "[s3] （拿出帶來的貓食）\n[s4] 「我就想說有可能會這樣。」"
1001506-20 = "老師，這是什麼呢？"
1001506-21 = "老師，這是什麼呢？"
1001506-22 = "……難道說，這是能和貓先生提升親密度的道具嗎？"
1001506-23 = "老師知道要怎麼攻略貓先生嗎？"
1001506-24 = "[s5] 「哼哼，你看著吧。」\n[s6] 在貓面前揮舞食物"
1001506-30 = "呼嚇──！！！"
1001506-31 = "[s7] 「……！？」\n[s8] 「貓食竟然沒效！？」"
1001506-32 = "……好像讓牠更生氣了。會不會是選擇的道具錯了呢。"
1001506-33 = "……好像讓牠更生氣了。會不會是選擇的道具錯了呢。"
1001506-34 = "再這樣下去也不是辦法，雖然遺憾但就到此為止吧……是BadEnd呢。"
1001506-35 = "抱歉，貓先生。愛麗絲沒有要嚇你的意思……"
1001506-36 = "走吧，老師。"
1001506-37 = "[s9] 「也對……」\n[s10] 「雖然可惜但也沒辦法……」"
1001506-40 = "……喵～"
1001506-41 = "！！"
1001506-42 = "貓先生跑到愛麗絲旁邊了！"
1001506-43 = "喵～"
1001506-44 = "雖然還是對愛麗絲有點警戒的樣子……但好像已經不生氣了……"
1001506-45 = "[s] 「現在摸一摸應該沒關係吧？」"
1001506-46 = "是這樣嗎……？"
1001506-47 = "那麼……"
1001506-48 = "……"
1001506-49 = "喵～"
1001506-50 = "……"
1001506-51 = "好暖和……又滑滑的。貓先生，原來是這種感覺呀。"
1001506-52 = "喵……"
1001506-53 = "（貓再次消失在道路的那頭）"
1001506-54 = "……"
1001506-55 = "[s] 「走掉了呢。」"
1001506-56 = "嗯，但是，沒關係的。今天的任務是「摸到一次貓」嘛。"
1001506-57 = "獲得經驗值了。今天也慢慢成長中呢。"
1001506-58 = "[s11] 「太好了呢。」\n[s12] 「嗯。每天都成長一點也很重要呢。」"
1001506-59 = "雖然沒有吃老師帶來的食物有點可惜就是了……"
1001506-60 = "雖然沒有吃老師帶來的食物有點可惜就是了……"
1001506-61 = "這麼說來，難道……那是老師特地為了愛麗絲而準備的嗎？"
1001506-62 = "[s13] 「……這個嘛，誰知道呢。」\n[s14] 「因為某些原因我一直隨身攜帶著。」"
1001506-63 = "……雖然老師這麼說，但愛麗絲還是知道的。"
1001506-64 = "……雖然老師這麼說，但愛麗絲還是知道的。"
1001506-65 = "因為老師是個溫柔的人，所以放心不下愛麗絲。"
1001506-66 = "愛麗絲全都知道的唷。"
1001506-68 = "（跟著不知為何很開心的愛麗絲一起，一邊聊著貓的話題一邊回到學校）"

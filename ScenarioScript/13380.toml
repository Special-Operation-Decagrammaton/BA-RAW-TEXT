[translation]
13380-1 = "ตอนที่ 38;สัญญา"
13380-4 = "รุ่นพี่... ยูเมะ...?"
13380-7 = "อื้ม นั่นเป็นเพราะฉันจะไม่ได้เห็นโฮชิโนะจังในตอนนั้นน่ะ"
13380-8 = "ฉันก็เลยอยากรู้มาตลอดน่ะว่าโฮชิโนะที่อยู่ชั้นปีที่ 3 จะเป็นยังไง"
13380-9 = "ฉันเลยเขียนสิ่งนี้ไว้เหมือนจดหมายที่จะให้โฮชิโนะจังในอนาคตน่ะ... ท้าดา~ เซอร์ไพรส์ใช่มั้ยล่ะ?"
13380-12 = "รุ่นพี่..."
13380-19 = "เป็นไงบ้าง? โฮชิโนะจัง? ได้เป็นรุ่นพี่ที่ยอดเยี่ยมหรือเปล่า?"
13380-20 = "เป็นรุ่นพี่ที่น่าเชื่อถือ เอาใจใส่ ดูแลรุ่นน้องเป็นอย่างดีหรือเปล่า?"
13380-21 = "ได้เจอกับเพื่อนคนสำคัญที่จะเข้ามาช่วยในยามยากลำบากหรือยัง?"
13380-22 = "กำลังก้าวไปสู่อนาคตกับเหล่ารุ่นน้องอย่างกล้าหาญหรือเปล่า?"
13380-23 = "แล้วยังหัวเราะ แหะๆ~ อยู่เหมือนเดิมมั้ย?"
13380-27 = "รุ่นพี่ยูเมะ!!"
13380-28 = "รุ่นพี่...!! รุ่นพี่...!!"
13380-29 = "รุ่นพี่... ฉัน... ฉันน่ะ... ฉันยัง... เหมือนเดิม..."
13380-30 = "ฉันยังเป็น... รุ่นน้อง... ของรุ่นพี่... ฉัน..."
13380-31 = "รุ่นพี่ยูเมะ... รุ่นพี่... ฉันน่ะ..."
13380-32 = "อะ.... อ๊าาาาาาา!!"
13380-33 = "อ๊าาาาาาา!"
13380-34 = "ไม่ค่ะ... ไม่เลยค่ะ... ฉัน..."
13380-35 = "ฉันกลายเป็นรุ่นพี่ที่เอาแต่ใจและเอาแต่ก่อเรื่องค่ะ"
13380-36 = "ฉันน่ะ... ทั้งไร้ประโยชน์... ทั้งโง่... ทั้งงี่เง่า..."
13380-37 = "ฉัน... เป็นแค่รุ่นพี่โง่ๆ... ที่ได้แต่สร้างความเดือดร้อนให้กับรุ่นน้อง... และทำให้ทุกคนต้องเป็นห่วงค่ะ"
13380-39 = "อืม... แต่นั่นฟังดูเหมือน... ฉันเลยนะ?"
13380-40 = "ค่ะ... เหมือนกับรุ่นพี่เลยค่ะ"
13380-41 = "แหะๆๆ... ในที่สุดก็ยิ้มได้แล้วนะ โฮชิโนะจัง"
13380-42 = "แต่ถึงจะพูดอย่างนั้น ฉันก็รู้ได้นะ..."
13380-43 = "ว่าโฮชิโนะจังต้องเป็นรุ่นพี่ที่ดูแลและปกป้องรุ่นน้อง เป็นที่พึ่งให้ในยามยากลำบาก และต้องเป็นคนที่#nน่าเชื่อถือและยอดเยี่ยมแน่นอนเลยละ!"
13380-44 = "ถึงฉันจะไม่ได้หัวดี แต่ฉันก็รู้จักรุ่นน้องคนสำคัญที่บางครั้งก็ทำตัวน่าตีดีกว่าใครเลยนะ! เชื่อฉันสิ!"
13380-45 = "ไม่หรอกค่ะ ฉันน่ะ..."
13380-46 = "ชู่ว"
13380-47 = "...?"
13380-48 = "อย่าพูดแบบนั้นสิ โฮชิโนะจังพยายามมาโดยตลอด เพราะงั้นแล้วโฮชิโนะจังน่ะเป็นรุ่นพี่ที่ดีนะ"
13380-49 = "..."
13380-50 = "ทำได้ดีมากแล้วละ โฮชิโนะจัง"
13380-51 = "เหนื่อยใช่มั้ยที่พยายามอยู่คนเดียวแบบนี้? บางครั้งก็ท้อใช่หรือเปล่า? "
13380-52 = "ค่ะ..."
13380-53 = "ฉัน... พยายามแล้วค่ะ ฉันพยายามที่จะ... เป็นเสาหลักให้รุ่นน้องอยู่ตลอด..."
13380-54 = "ค่ะ... ฉันทำแบบนั้นมาตลอดค่ะ รุ่นพี่ ฉัน... พยายามจะทำให้ดีค่ะ..."
13380-55 = "ฉันเหนื่อย... ฉันไม่มีรุ่นพี่อยู่ข้างๆ... ก็เลยท้อแท้... แต่ฉันก็พยายามมาโดยตลอดค่ะ..."
13380-64 = "อย่างนี้นี่เองสินะ เก่งจังเลย เก่งมากๆ เลย โฮชิโนะจัง ฉันจะลูบหัวให้นะ~"
13380-65 = "..."
13380-66 = "หืม? ทีนี้ไม่บอกว่าหายใจไม่ออกแล้วเหรอ? ไม่เป็นอะไรแล้วเหรอ? หรือว่าชินแล้ว...?"
13380-67 = "รุ่นพี่ยูเมะ..."
13380-68 = "ฉันคิดถึงรุ่นพี่ค่ะ"
13380-69 = "คิดถึงมากๆ เลย..."
13380-73 = "อื้อ ฉันรู้อยู่แล้วละ โฮชิโนะจัง"
13380-74 = "แต่โฮชิโนะจังยังมีเรื่องที่ต้องทำอยู่ไม่ใช่เหรอ?"
13380-75 = "เรื่องที่ต้องทำ..."
13380-76 = "อื้ม"
13380-78 = "ก็ต้องไปปกป้องรุ่นน้องยังไงล่ะ"
13380-84 = "โฮชิโนะ"
13380-85 = "[7cd0ff]คณะกรรมการแผนงาน[-]"
13380-86 = "[log=호시노]รุ่นพี่...[/log]"
13380-95 = "ตอนต่อไป;ยกเลิกข้อจำกัด"

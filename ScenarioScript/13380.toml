[translation]
13380-1 = "第38話;約定"
13380-4 = "夢……前輩……？"
13380-7 = "嗯，畢竟我沒辦法親眼看見……"
13380-8 = "可是我又一直很好奇星野醬升上三年級之後的樣子。"
13380-9 = "所以就寫了一封信給未來的你……鏘鏘～"
13380-12 = "………………………………………………前輩。"
13380-19 = "怎麼樣呀？星野醬有成為優秀的前輩嗎？"
13380-20 = "有成為懂得照顧後輩，而且有能力保護大家的可靠前輩嗎？"
13380-21 = "有沒有交到會在你遇到困難時，主動來幫助你的好朋友呀？"
13380-22 = "有和後輩們一起，堅強地面對未來的挑戰嗎？"
13380-23 = "有沒有經常像以前一樣，發出「唔嘿～」的笑聲呀？"
13380-27 = "夢前輩！！"
13380-28 = "前輩……！！前輩……！！"
13380-29 = "前輩，我……我……一直一直……"
13380-30 = "對前輩……我……前輩……我……"
13380-31 = "夢前輩……前輩……我……"
13380-32 = "嗚……嗚啊啊啊啊啊啊啊啊啊──！！"
13380-33 = "嗚啊啊啊啊啊啊啊啊──────！"
13380-34 = "沒有，我沒有……我……"
13380-35 = "我成為了一個老是闖禍，老是讓大家擔心的前輩。"
13380-36 = "我……是個沒有用的……笨蛋……傻瓜……"
13380-37 = "我……只是個總是給大家……給後輩們添麻煩，害他們傷透腦筋的……笨蛋前輩。"
13380-39 = "唔嗯……那聽起來……怎麼好像跟我很像？"
13380-40 = "沒錯……就是跟前輩一樣。"
13380-41 = "耶嘿嘿……你終於笑了呢，星野醬。"
13380-42 = "……不過雖然你嘴上這麼說，我還是猜得到哦。"
13380-43 = "你現在肯定是個很照顧後輩，#n而且會在別人有難時伸出援手，讓人覺得既安心又可靠的……那種超級棒的人！"
13380-44 = "雖然我是個笨蛋，但是對於某個雖然個性難相處，卻把我看得很重要的後輩──#n我可是瞭若指掌的喔！我相信你一定是這樣的！"
13380-45 = "不是的，我……"
13380-46 = "噓。"
13380-47 = "……？"
13380-48 = "別再說那種話了。#n星野醬一直都很努力，所以一定會是個很好的前輩。"
13380-49 = "……"
13380-50 = "辛苦你了，星野醬。"
13380-51 = "一個人這麼努力，肯定吃了不少苦吧？會不會覺得很累？"
13380-52 = "……嗯。"
13380-53 = "……我努力過了。#n為了成為大家的後盾……我一直……一直……"
13380-54 = "嗯……我很努力，前輩。#n我一直……都很努力……"
13380-55 = "雖然很累……雖然因為前輩不在而過得很辛苦……但是我一直都在努力……"
13380-64 = "這樣啊。星野醬真是個乖孩子，讓我摸摸你的頭吧～"
13380-65 = "……"
13380-66 = "嗯？現在不會再喘不過氣了嗎？#n還好嗎？已經適應了……？"
13380-67 = "夢前輩……"
13380-68 = "我一直很想你。"
13380-69 = "真的真的很想你……"
13380-73 = "嗯，我知道唷，星野醬。"
13380-74 = "但是你現在還有該做的事對吧？"
13380-75 = "該做的事……"
13380-76 = "嗯。"
13380-78 = "得保護後輩們才行……對吧？"
13380-84 = "星野"
13380-85 = "[7cd0ff]對策委員會[-]"
13380-86 = "[log=호시노]前輩……[/log]"
13380-95 = "下一話;制約解除"

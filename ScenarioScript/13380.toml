[translation]
13380-1 = "Episode 38;Promise"
13380-4 = "Yume...?"
13380-7 = "Mhm! I won't be able to watch you grow up..."
13380-8 = "So I couldn't help but be curious how my adorable Hoshino would look as a third-year!"
13380-9 = "And that's why I'm here! Ta-da! It's like I'm sending a letter to future-Hoshino."
13380-12 = "...Yume."
13380-19 = "How are you, Hoshino? Are you a good upperclassman now?"
13380-20 = "Did you grow into a trustworthy upperclassman who looks after her juniors? One who can protect everyone?"
13380-21 = "Do you have cherished friends who support you in your times of need?"
13380-22 = "Are you confidently running towards your future, together with your juniors?"
13380-23 = "And do you do that \"heh\" laugh here and there?"
13380-27 = "YUME!!"
13380-28 = "Yume!! Yume...!!"
13380-29 = "Yume, I... I...always, always..."
13380-30 = "Yume... I... Yume... I..."
13380-31 = "Yume... Yume... I..."
13380-32 = "W...Waaah!!"
13380-33 = "WAAAAAAH!!!"
13380-34 = "No, no... I..."
13380-35 = "I grew up to be the type of upperclassman who only seems to be capable of worrying my juniors and causing trouble for everyone..."
13380-36 = "I'm...a useless...idiot...a dummy..."
13380-37 = "I...I'm just the silly upperclassman to everyone...the one they have to look after."
13380-39 = "Um... That sounds exactly like me, doesn't it?"
13380-40 = "Yeah... Just like you."
13380-41 = "Heehee. There's that smile, Hoshino."
13380-42 = "Despite what you say, I know differently."
13380-43 = "I know you became a wonderful person...the type who protects everyone around her, supports them. Someone they can all rely on."
13380-44 = "I'm a dummy who doesn't know much, but I do know my ill-tempered junior, the one I cherish from the bottom of my heart. I know her better than anyone."
13380-45 = "No. I—"
13380-46 = "Shhh."
13380-47 = "Hmm?"
13380-48 = "Don't say stuff like that. You've always worked so hard, Hoshino. Of course you're a good upperclassman."
13380-49 = "..."
13380-50 = "You did your best, didn't you, Hoshino?"
13380-51 = "It's been really, really hard for you, right? You've carried everything so bravely, all on your own."
13380-52 = "...Yeah."
13380-53 = "...I tried...so hard... I wanted to help...always..."
13380-54 = "I always... I did my best, Yume..."
13380-55 = "It was so, so hard, Yume. You were gone, but I kept on trying..."
13380-64 = "Yes, you did. You did so good, Hoshino. Pat, pat."
13380-65 = "..."
13380-66 = "Oh? You're not going to complain that you can't breathe? Are you okay? Are you finally accepting my hugs?"
13380-67 = "Yume..."
13380-68 = "I miss you."
13380-69 = "I miss you so badly."
13380-73 = "Mhm. I know, Hoshino."
13380-74 = "But you still have things to do, don't you?"
13380-75 = "Things...to do..."
13380-76 = "Mhm."
13380-78 = "You have some wonderful underclassmen now. Ones you need to go protect."
13380-84 = "Hoshino"
13380-85 = "[7cd0ff]      Foreclosure Task Force[-]"
13380-86 = "[log=호시노]Yume...[/log]"

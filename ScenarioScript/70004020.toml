[translation]
70004020-1 = "主なきプレゼント（２）"
70004020-2 = "（翌朝……）"
70004020-8 = "いらっしゃいませ、「エンジェル24」です！"
70004020-9 = "あら、朝早いのに大変ね。"
70004020-15 = "（この人はゲヘナの風紀委員の、[ruby=そらさき]空崎[/ruby]ヒナ委員長。#n他校にも名前が知られてる有名人だったよね……）"
70004020-16 = "（無口で感情を表に出さない人だから、#n誰かにプレゼントを贈るなんて想像できないけど……）"
70004020-17 = "（ゲヘナ風紀委員と先生は何かと関わりがあるし、可能性はあるはず！）"
70004020-22 = "あ、あの……ゲヘナ学園の空崎ヒナ委員長、ですよね？"
70004020-23 = "そうだけど、私に何か？"
70004020-24 = "あっ、いえ！何かあったわけじゃ、ないんですが……！"
70004020-25 = "その……ええと……"
70004020-26 = "く、クリスマスのご予定は……？"
70004020-27 = "クリスマス……？"
70004020-28 = "は、はい。委員長はいつもお忙しいと聞いていますが……#nクリスマスくらいは、その……ゆっくり過ごされるのかなぁ、って……"
70004020-29 = "た、例えば豪華なパーティーに参加されるとか、#n誰かに「プレゼントをする」とか――"
70004020-30 = "……さぁ、どうかしら。"
70004020-31 = "私の予定を聞いてどうするの？"
70004020-32 = "（うっ、怪しまれちゃった……！）"
70004020-33 = "そ、それは……"
70004020-35 = "じ、実は私、いま中学生で。さ、再来年には、高校生になるんです！"
70004020-36 = "でも、どの学園に進学しようか迷っていて……#n参考に、ゲヘナでのクリスマスの過ごし方を聞けたらなぁと……。"
70004020-37 = "進学……？ゲヘナ学園に……？"
70004020-38 = "えっ？わ、私、何か変なこと言いました？"
70004020-39 = "いえ、変ではないけど……"
70004020-40 = "ゲヘナを目指す中学生は、初めて見た。"
70004020-41 = "真面目そうな子だと思っていたけど……#n案外、自由に憧れるところがあったのかしら。"
70004020-42 = "えっ。私のこと、見ていてくださったんですか？"
70004020-43 = "まあ……シャーレに来るたび見かけるから。"
70004020-44 = "ソラはいつもこのコンビニにいるでしょう？"
70004020-45 = "サボらず真面目に働いている姿を見て、しっかりした子だと思っていたの。"
70004020-46 = "ゲヘナ生のように気ままに振る舞うイメージがなくて、驚いただけ。#nだから気にせず、進路は自由に決めていいと思う。"
70004020-47 = "風紀委員長の立場から言わせてもらうと……#nソラのような真面目な生徒が後輩になってくれたら、とても心強いわ。"
70004020-48 = "あ、ありがとう、ございます……。"
70004020-49 = "話を戻すと……今年のクリスマスは、#n風紀委員会の教室で部員たちと過ごす予定なの。"
70004020-50 = "アコ――風紀委員会の行政官が、何か用意してくるらしくて。"
70004020-51 = "とはいえ仕事は山積みだから……クリスマスは一日中、教室に缶詰かな。"
70004020-52 = "そうですか……じゃあ、このプレゼントは一体……"
70004020-53 = "……プレゼント？"
70004020-54 = "いっ、いえ！な、なんでもありません！"
70004020-58 = "そう？#n……一応、私の連絡先を教えてあげる。何かあればここに。"
70004020-59 = "進路相談も……力になるわ。"
70004020-60 = "あっ、ありがとうございます！#nコンビニが襲撃されたら、真っ先に連絡しますね！"
70004020-61 = "……そんなことは、ないと嬉しいけれど。"
70004020-66 = "いらっしゃいませ、「エンジェル24」です！"
70004020-67 = "えっと……新発売のミントチョコあんまん？を一つください。"
70004020-68 = "それと、もし余ってれば……他の味も一つずつ。"
70004020-69 = "はい、少々お待ちください。"
70004020-75 = "（あの人、確かトリニティ総合学園の生徒だっけ……）"
70004020-76 = "（……少し怖い顔をしてるけど、#n甘くてふわふわしたスイーツが好きなお客さんなんだよね）"
70004020-77 = "（いつも差し入れ用のスイーツを買ってて……あっ。#nもしかして、先生へのプレゼントも……？）"
70004020-82 = "あっ、あの！クリスマスケーキのご予約はお済みですか？"
70004020-83 = "……ケーキ？"
70004020-84 = "あ、ケーキのキャンペーンでもやってるんですか？"
70004020-85 = "い、いえ！ちょっと個人的に聞きたいんですが……"
70004020-86 = "トリニティのみなさんは、クリスマスにどんなケーキを食べるんでしょう？"
70004020-87 = "え……？"
70004020-88 = "……？"
70004020-89 = "わ、私がトリニティの生徒って、言いましたっけ？"
70004020-90 = "……？#nいえ、聞いてはいないのですが……"
70004020-91 = "そっか……なら私、トリニティの生徒に見えたってことですよね。#nえへへ……。"
70004020-92 = "（な、なんだか喜んでる……？#n見えるもなにも、トリニティの制服を着てるのに……）"
70004020-93 = "そういえばこの前、SNSで「トリニティの生徒は高級スイーツしか食べない」#nなんて噂が広まってたな……あ、だからですか？"
70004020-94 = "でもトリニティのお嬢様だって、普通のスイーツは好きですよ。#n全員がそうとは言い切れないですけど……"
70004020-95 = "美味しいって感覚は、みんな同じだし。#n私も今年はD.U.のお店で予約したブッシュドノエルを……"
70004020-96 = "あ。でもあれは先着限定販売だったから、一般的とは言えないか。#nすみません、参考にならなくて。"
70004020-97 = "い、いえ！教えていただいてありがとうございます！"
70004020-98 = "じ、じゃあ……そのケーキは、誰と食べるんですか？"
70004020-100 = "部活の人か、クラスメイト……それとも、「[USERNAME]先生」――"
70004020-101 = "そ、そんなわけないでしょ！？"
70004020-102 = "す、すみませんっ！"
70004020-103 = "……あっ。"
70004020-104 = "またやっちゃった……"
70004020-105 = "ごめん……驚くとつい大声が出ちゃって。"
70004020-106 = "あんたは何も悪くないから。#nこれは、あいつらといる時の癖みたいなもので……#nほんとごめん、できたら大目に見てほしいというか……"
70004020-107 = "だ、大丈夫です。お気になさらず……！"
70004020-108 = "……ありがとう。あんた、思ったより大人なんだね。"
70004020-109 = "質問の答えだけど、ケーキは部活のみんなと食べる予定だよ。#nまぁ先生とスイーツを食べることも、なくはないけど……"
70004020-110 = "今年のクリスマスは、シスターフッドの手伝いがあるからね。"
70004020-111 = "聖誕祭の後、シスターフッドが焼き立てのパネットーネを配るんだって。#n特別なものじゃないけど……気になってさ。"
70004020-112 = "そうでしたか……ではプレゼントは、他の方の……"
70004020-113 = "……？"
70004020-117 = "……ソラ、だっけ？クリスマスは何するの？"
70004020-118 = "私は当日もシフトを入れました。"
70004020-119 = "えっ、せっかくのクリスマスなのにアルバイト？"
70004020-120 = "あはは……どうしても欲しい物がありまして……"
70004020-121 = "そっか……大変だね……"
70004020-122 = "……じゃあ、これあげる。"
70004020-123 = "こ、これは……？"
70004020-124 = "トリニティで売ってる限定マカロン。#nちょっと買いすぎちゃったから、よければ食べて。"
70004020-125 = "ほら、働いてると甘いものが欲しくなるときってあるじゃん？"
70004020-126 = "あっ、ありがとうございます……！"
70004020-127 = "気にしないで。さっき怖がらせちゃったお詫びでもあるし。"
70004020-128 = "じゃあね、ソラ。"
70004020-132 = "ねえ、モバイルバッテリーは置いてるかしら！？"
70004020-133 = "はっ、はい！右奥の棚の一番下の段です！"
70004020-134 = "ありがとう！はぁ～、やっと充電できる……！#n大事な連絡が来ることになってたから、助かったわ！"
70004020-135 = "けど戻るまでは持つ計算だったのに……何が問題だったのかしら？"
70004020-141 = "（ミレニアムサイエンススクールで会計をしているユウカさん……）"
70004020-142 = "（決算シーズンによく先生と一緒にいるよね……）"
70004020-143 = "（先生に怒っているところをよく見るけど……#nこっそりプレゼントを用意してたりするかも……？）"
70004020-148 = "あ、あの……"
70004020-149 = "あれっ。おつりの計算、間違ってた？"
70004020-150 = "い、いえ。実はその、個人的に聞きたいことがありまして……。"
70004020-151 = "あら。ソラちゃんの個人的な質問なんて、珍しいわね。"
70004020-152 = "いいわよ。私に答えられるなら。"
70004020-154 = "ありがとうございます！#nあの……先生のクリスマスの予定って、知ってますか？"
70004020-155 = "どっ、どど、どうしてそれを私に聞くの！？"
70004020-157 = "えっ？だってユウカさんは、#n先生の会計記録や夜勤記録を知ってるみたいですし……"
70004020-158 = "他の方よりも先生と親しそうなので、#nスケジュールくらいはお互い共有しているのではと――"
70004020-162 = "ごっ、ごめんなさい！私、ものすごい勘違いを……！？"
70004020-163 = "……こほん。そうね、確かに私は先生がお金の無駄使いをしないよう、#n助言をしているわ。"
70004020-164 = "けれどそれは、あくまで生徒と先生の関係として。#n急用でもない限り、休日は連絡を控えてるの。"
70004020-165 = "それに先生は、休日も忙しいみたいだし？"
70004020-166 = "そ、そうだったんですね。#nじゃあ、ユウカさんはクリスマスの日に……"
70004020-167 = "セミナーのみんなと過ごすでしょうね。"
70004020-168 = "それに最近、手のかかる後輩が一人、悩んでるみたいで。"
70004020-169 = "年末は部員たちの面倒を見ながら、静かに過ごすことになると思うわ。"
70004020-170 = "でも、そんな話題が出るってことは……#n誰かが先生とクリスマスの約束でもしているの？"
70004020-171 = "あっ、いえ！そういうわけでは……！"
70004020-172 = "ふーん……ま、私には関係ないけど。"
70004020-173 = "とにかく、さっきは過剰に反応しちゃったけど……#nまた何かあったら、気楽に聞いてくれていいから。"
70004020-174 = "ありがとうございます……！"
70004020-178 = "ば、バレたかと思った……#nやっぱり、ストレートに聞くのはよくないなぁ……"
70004020-179 = "けど誰も、プレゼントのことは知らないみたいだった。"
70004020-180 = "先生宛てのプレゼントじゃなかったのかな……？"
70004020-181 = "ううん、決めつけるにはまだ早い。#n最後の一人まで、徹底的に調査しないと！ "
70004020-186 = "いらっしゃいませ、「エンジェル24」です！"
70004020-188 = "（その後もソラはプレゼントの出所を探ったが……）"
70004020-189 = "（……これといった手がかりは見つからなかった）"

[translation]
70004020-1 = "無主的禮物（２）"
70004020-2 = "（隔天早上……）"
70004020-8 = "歡迎光臨天使24！"
70004020-9 = "嗯，早安。"
70004020-15 = "（這個學生是格黑娜風紀委員會的空崎陽奈委員長，在其他學園也很出名……）"
70004020-16 = "（陽奈委員長平常話不多，表情變化也少，很難想像他會送私人的禮物給別人……）"
70004020-17 = "（不過他經常因為風紀委員會的事跟老師來往，所以送禮的可能性還是很高……！）"
70004020-22 = "那個……客人你是格黑娜學園的空崎陽奈委員長，對吧？"
70004020-23 = "嗯，找我有什麼事嗎……？"
70004020-24 = "沒，沒有！不是因為什麼特別的原因，也不是有事想拜託你……"
70004020-25 = "那，那個……怎麼說呢……"
70004020-26 = "不知道今年的聖誕節，委員長打算怎麼過呢？"
70004020-27 = "今年的聖誕節……？"
70004020-28 = "是，是的。就算是繁忙的風紀委員長……#n聖誕節的時候，應該也會稍微放鬆一下吧……"
70004020-29 = "比如參加盛大的派對，或者送某人「禮物」之類的──"
70004020-30 = "……現在還不好說。"
70004020-31 = "不過你為什麼想知道我的行程？"
70004020-32 = "（糟，糟糕！被懷疑了……！）"
70004020-33 = "那，那個……是這樣的……"
70004020-35 = "其，其實我還是國中生，後年就會讀高中了！"
70004020-36 = "因為正在思考該升上哪所學園，所以有點好奇格黑娜的學生是怎麼度過假日的……"
70004020-37 = "思考升學？而且還是格黑娜學園……？"
70004020-38 = "嗯，嗯！這麼問會很奇怪嗎……？"
70004020-39 = "不，其實也稱不上奇怪……"
70004020-40 = "但我好像還是第一次看到有國中生以格黑娜為目標。"
70004020-41 = "你平時給我的感覺像是個認真的學生……原來你心裡其實很嚮往自由的校風嗎？"
70004020-42 = "咦？委員長一直有在觀察我嗎？"
70004020-43 = "我並沒有刻意觀察，只是每次來夏萊的時候都會見到你……"
70004020-44 = "空同學不是一直默默守護著夏萊的便利商店嗎？"
70004020-45 = "明明偶爾偷懶也很正常，但你總是勤奮地堅守崗位、補充商品……#n認真程度實在不像是個國中生。"
70004020-46 = "我只是覺得你給人的印象跟自由奔放的格黑娜學生不同，所以有點驚訝而已。#n想以哪所學園為升學目標都是你的自由。"
70004020-47 = "當然從風紀委員長的立場來看……#n如果能有像空同學這樣認真的學生來當我的後輩，應該能成為很大的助力。"
70004020-48 = "謝，謝謝……"
70004020-49 = "好像有點離題了。#n今年的聖誕節，我打算在風紀委員會和其他成員一起度過。"
70004020-50 = "亞子──風紀委員會的行政官似乎做了某些準備，要和大家一起過今年的聖誕節。"
70004020-51 = "反正要處理的工作還堆積如山，我應該不會離開風紀委員會吧。"
70004020-52 = "這樣啊……所以這個禮物會是其他人帶來的嗎？"
70004020-53 = "……禮物？"
70004020-54 = "沒，沒什麼……！"
70004020-58 = "空同學，我把我的聯絡方式告訴你。#n需要幫忙的時候就跟我說一聲吧。"
70004020-59 = "假如有和格黑娜升學相關的問題或其他煩惱……我也可以幫忙。"
70004020-60 = "謝謝。如果以後便利商店被襲擊的話，我一定會聯絡你的！"
70004020-61 = "……那種事最好還是別發生比較好。"
70004020-66 = "歡迎光臨天使24！"
70004020-67 = "哦……那是新推出的薄荷巧克力包子嗎……？#n麻煩給我一個。"
70004020-68 = "如果有其他口味的話，也幫我每種各拿一個。"
70004020-69 = "好的，請稍等。"
70004020-75 = "（這位好像是三一綜合學園的……）"
70004020-76 = "（……雖然給人的印象有點可怕，但他經常來買又甜又鬆軟的甜點）"
70004020-77 = "（偶爾也會買甜點送給別人……那會不會是為老師準備的甜點禮物呢？）"
70004020-82 = "那個，這位客人。#n請問你有訂今年的聖誕節蛋糕嗎？"
70004020-83 = "……咦？為什麼突然提到蛋糕？怎麼了嗎？"
70004020-84 = "啊，是天使24在舉辦蛋糕促銷嗎？"
70004020-85 = "不，不是的！#n這是跟店裡無關的私人問題……"
70004020-86 = "因為我有點好奇三一的學生，在聖誕節的時候會吃什麼樣的蛋糕。"
70004020-87 = "啊……？"
70004020-88 = "……？"
70004020-89 = "三，三一？我有說過我是三一的人嗎？"
70004020-90 = "……？#n這，這倒是沒有……"
70004020-91 = "對啊，我應該沒說過吧？#n所以我看起來很像三一的學生嗎？呵呵呵……"
70004020-92 = "（為，為什麼要那麼開心……？他身上不就穿著有三一校徽的衣服嗎……）"
70004020-93 = "三一學生會吃的甜點啊……話說之前好像有人在社群網站上，#n散佈「三一的學生只吃超貴的甜點」之類的謠言……所以才覺得好奇嗎？"
70004020-94 = "雖然我不能代表三一的學生，不過三一的大小姐們並不是只吃很貴的甜點哦。"
70004020-95 = "畢竟大家對美食的感受都大同小異嘛？#n比如今年的聖誕節，我也是在D.U.常去的店裡訂了特製的聖誕樹幹蛋糕……"
70004020-96 = "不過那是先訂先贏的限定商品，恐怕沒辦法作為大眾的參考就是了。抱歉啦。"
70004020-97 = "沒，沒關係！我也只是想多一點參考資料而已……"
70004020-98 = "那客人你打算跟誰一起吃那個蛋糕呢？"
70004020-100 = "是同社團的朋友嗎？還是其他聚會？#n又或者……是「[USERNAME]老師」──"
70004020-101 = "那，那怎麼可能呢！？"
70004020-102 = "對，對不起！"
70004020-103 = "……啊。"
70004020-104 = "糟糕，我又說錯話了……唉。"
70004020-105 = "抱歉。我只要聽到意料之外的話就會習慣性地大聲嚷嚷。"
70004020-106 = "這絕對不是你的錯，我會這樣是其他人造成的……還請你多多包涵。"
70004020-107 = "沒，沒事的，我真的不介意。#n客人你也不用太拘束沒關係。"
70004020-108 = "……謝謝。#n你比外表看起來還成熟呢。"
70004020-109 = "至於你剛才的問題……#n把甜點分給老師吃的情況……也不能說沒有啦。"
70004020-110 = "不過今年的聖誕節，我會和社團成員們一起分享蛋糕，然後去幫忙修女會的工作。"
70004020-111 = "聽說修女會會在聖誕節過後，分送他們自己烤的[ruby=Panettone]潘妮托妮[/ruby]。#n雖然裡面沒放什麼特別的材料，不過也還算不錯吧。"
70004020-112 = "原，原來如此……#n看來這份禮物，果然是其他學生準備的吧……"
70004020-113 = "……？"
70004020-117 = "……那個，你叫空對吧？#n今年聖誕節有什麼計畫嗎？"
70004020-118 = "我打算繼續在便利商店打工。"
70004020-119 = "咦，聖誕節也要打工嗎？#n那天休息一下也沒關係吧？"
70004020-120 = "啊哈哈……雖然休息一下也不錯，但我有個很想買的東西……"
70004020-121 = "哇……真是辛苦你了。"
70004020-122 = "……來，這個給你。"
70004020-123 = "這，這是……？"
70004020-124 = "是只在三一販售的限定馬卡龍。#n我本來打算買來跟朋友一起吃，結果好像買太多了。"
70004020-125 = "工作的時候經常會想吃甜食對吧？#n除了能提高效率之外，也能轉換一下心情。"
70004020-126 = "太，太謝謝你了……！"
70004020-127 = "不用客氣。這也算是我對剛才失言的一點小賠罪吧。"
70004020-128 = "那我先走囉。#n希望空能度過美好的一天～"
70004020-132 = "請問這裡有賣手機的備用電池嗎？"
70004020-133 = "嗯，在貨架右邊角落的最下面。"
70004020-134 = "真是得救了～#n電池居然剛好在有急事要聯絡的時候沒電，我正不知該如何是好呢。"
70004020-135 = "明明在計算中是能用到回去之前的才對……到底是哪裡出了問題呢？"
70004020-141 = "（這位是負責千年學園會計的優香同學……對吧？）"
70004020-142 = "（在年終結算或整理夏萊收據的時候，經常能看見他和老師在一起……）"
70004020-143 = "（而且時不時會看見他氣呼呼地斥責老師的樣子……難道是他偷偷準備了禮物嗎？）"
70004020-148 = "那個，不好意思……"
70004020-149 = "嗯？怎麼了？#n剛才找錯錢了嗎？"
70004020-150 = "沒有，不過我有個私人的問題想請教……"
70004020-151 = "私人的問題？#n平時總是會跟我互相打招呼的空醬，居然會想問我問題……真讓人好奇。"
70004020-152 = "儘管問吧，我會盡量回答的。"
70004020-154 = "那個，請問你知道[USERNAME]老師今年聖誕節的行程嗎？"
70004020-155 = "那，那那，那種事為什麼要問我呢！？"
70004020-157 = "咦……？因為優香同學好像經常在整理老師的收據或加班紀錄……"
70004020-158 = "而且你好像比其他學生更早認識老師，所以我以為你們會互相分享行程──"
70004020-162 = "對，對不起！看來是我誤會了。"
70004020-163 = "……咳哼！為了避免老師做出不必要的過度消費，我確實會提出適當的建議……"
70004020-164 = "但我們終究是學生與老師的關係。#n除非有特別的事情發生，否則我都盡量不在假日的時候打擾老師休息。"
70004020-165 = "況且老師就連假日也經常忙著處理工作。"
70004020-166 = "原，原來如此。#n那優香同學今年聖誕節沒有約老師見面嗎？"
70004020-167 = "嗯，今年我應該會跟研討會的成員一起過聖誕節。"
70004020-168 = "畢竟有個需要別人照顧的後輩，最近好像還挺煩惱的。"
70004020-169 = "所以年底我打算照顧一下他們，過得平靜一點。"
70004020-170 = "話說你這麼問的意思是……老師聖誕節的時候跟某人有約嗎？"
70004020-171 = "沒，沒有！我不是那個意思！"
70004020-172 = "哼嗯……好吧，反正我也不在意就是了。"
70004020-173 = "總之空醬也別太勉強自己哦。#n如果遇到什麼問題的話，可以常來問我沒關係。"
70004020-174 = "嗯，謝謝你……！"
70004020-178 = "……差，差點就被發現了。#n看來還是不能問得太直接……"
70004020-179 = "話說昨天來過夏萊的學生大致都問過了，可是好像沒人知道有關禮物的事。"
70004020-180 = "難道……禮物是為其他人準備的嗎？"
70004020-181 = "不行，我不能大意。#n一定要徹底確認到最後一個人才行……！"
70004020-186 = "歡迎光臨天使24！"
70004020-188 = "（之後空繼續向其他學生打探著禮物的出處……）"
70004020-189 = "（……可惜依舊沒有找到有用的線索）"

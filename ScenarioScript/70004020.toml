70004020-22 = "5;히나;01\n2;소라;04;저…… 게헨나 학원의 소라사키 히나 부장님, 맞으시죠?\n#2;em;…\n#5;a\n#2;m2"
70004020-23 = "5;히나;02;응. 혹시 내게 무슨 볼일이라도……?\n#5;em;[?]"
70004020-24 = "2;소라;18;아, 아뇨! 특별히 신경 쓰이거나 부탁할 일이 있는 건 아닌데요.\n#2;em;[땀]"
70004020-25 = "2;소라;17;저, 그게…… 그, 그러니까……\n#2;stiff"
70004020-26 = "2;소라;04;이번 크리스마스는 어떻게 보내실 예정이신가요?"
70004020-27 = "5;히나;02;이번 크리스마스……?\n#5;em;[?]"
70004020-28 = "2;소라;08;네. 아무리 바쁘신 선도부장님이라 하더라도 크리스마스 정도는, 조금…… 편하게 지내시지 않을까 해서……"
70004020-29 = "2;소라;07;성대한 파티에 참여한다던가, 누군가에게 '선물을 한다' 던가—\n#2;em;[음표]"
70004020-30 = "5;히나;16;……글쎄."
70004020-31 = "5;히나;05;그런데 내 일정은 왜 궁금해하는 거지?\n#5;em;[...]"
70004020-32 = "2;소라;19;(크, 큰일 났다! 의심받고 있어……!)\n#2;stiff"
70004020-33 = "2;소라;11;저, 그게…… 그러니까……"
70004020-34 = "#all;hide"
70004020-35 = "3;소라;27;저, 사실 중학생이라 내후년에는 고등학교에 입학할 예정이라서요!\n#3;em;[!]\n#3;closeup"
70004020-36 = "3;소라;09;그래서 어느 학교에 진학해야 좋을지 고민 중이었는데, 게헨나의 학생들은 휴일을 어떻게 보내는지 갑자기 궁금해져서요.\n#3;closeup"
70004020-37 = "3;히나;20;진학 고민? 그것도 게헨나 학원에……?\n#3;em;[?!]"
70004020-38 = "3;소라;19;네, 넵! 혹시 제가 이상한 질문을 했나요……?"
70004020-39 = "3;히나;14;아니. 이상할 건 없지만……\n#3;em;[땀]"
70004020-40 = "3;히나;04;게헨나를 진학 목표로 고민하는 중학생은 처음 본 것 같아서."
70004020-41 = "3;히나;02;평소의 모습 때문에 성실한 학생이라고 생각했었는데…… 내심 자유로운 교풍을 동경하고 있었다던가?"
70004020-42 = "3;소라;18;네? 혹시 계속 저를 지켜보고 계셨던 건가요?\n#3;em;[반응]"
70004020-43 = "3;히나;99;의도한 건 아니지만, 샬레에 올 때마다 마주치게 되다 보니 우연히."
70004020-44 = "3;히나;02;소라 양은 언제나 샬레의 편의점을 묵묵히 지키고 있잖아?"
70004020-45 = "3;히나;03;하루 정도는 게으름을 부릴 법도 한데, 언제나 성실하게 자리를 지키며 상품을 채워 넣는 모습이 중학생답지 않게 성실하다고 생각해서.\n#3;em;[음표]"
70004020-46 = "3;히나;03;기분 내키는 대로 자유롭게 행동하는 대부분의 게헨나 학생들과는 인상이 다르다고 생각해서 조금 놀란 것뿐이야. 진로는 원한다면 자유롭게 정할 수 있지."
70004020-47 = "3;히나;07;물론 선도부장의 입장으로는 소라 양처럼 성실한 학생이 후배로 들어온다면 큰 도움이 될 것 같네.\n#3;em;[반짝]"
70004020-48 = "3;히나;07\n2;소라;19;가, 감사합니다…….\n#2;em;[///]\n#2;stiff\n#2;a\n#1;hide\n#3;m4"
70004020-49 = "3;히나;02;조금 이야기가 빗나갔지만, 이번 크리스마스는 선도부실에서 다른 선도부원들과 같이 보낼 예정이야.\n#3;em;[반응]"
70004020-50 = "3;히나;14;아코— 그러니까 선도부의 행정관이 올해 크리스마스는 함께 보내고 싶다며 뭔가를 준비하는 모양이었거든."
70004020-51 = "3;히나;16;어차피 처리해야 할 업무가 잔뜩 쌓여있기도 하고. 선도부실을 나갈 일은 없을 것 같네."
70004020-52 = "2;소라;22;그렇군요…… 그럼 이 선물은 다른 분이 가져온 걸까요?\n#2;em;…"
70004020-53 = "3;히나;02;……선물?\n#3;em;[?]"
70004020-54 = "2;소라;18;아, 아무것도 아니에요!\n#2;jump\n#2;em;[!]"

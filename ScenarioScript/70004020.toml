70004020-57 = "3;히나;99\n2;소라;18\n#2;h\n#3;h\n#3;em;[...]\n#wait;2500"
70004020-58 = "3;히나;03;소라 양. 내 번호를 알려줄 테니, 나중에라도 혹시 도움이 필요하면 연락해."
70004020-59 = "3;히나;03;게헨나 학원과 관련된 진학이나 고민이 있다면…… 도와줄 수 있으니까.\n#3;em;[음표]"
70004020-60 = "2;소라;04;감사합니다. 나중에 편의점이 습격당하는 일이 생기면 꼭 연락드릴게요!\n#2;greeting"

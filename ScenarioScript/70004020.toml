[translation]
70004020-1 = "ของขวัญที่ไร้เจ้าของ 2"
70004020-2 = "(เช้าวันรุ่งขึ้น...)"
70004020-8 = "เอ็นเจล 24 ยินดีต้อนรับค่ะ!"
70004020-9 = "อื้อ อรุณสวัสดิ์"
70004020-15 = "(นักเรียนคนนี้คือโซระซากิ ฮินะ ประธานคณะกรรมการวินัยจากเกเฮนน่าที่เป็นที่รู้จักในโรงเรียนอื่น#nด้วย...)"
70004020-16 = "(ปกติแล้วประธานฮินะเป็นคนพูดน้อย การแสดงออกทางสีหน้าก็แทบจะไม่มีให้เห็น นึกภาพตอนให้#nของขวัญใครเป็นการส่วนตัวไม่ได้เลย...)"
70004020-17 = "(แต่คณะกรรมการวินัยก็มีเรื่องข้องเกี่ยวกับคุณครูอยู่มาก งั้นก็พอเป็นไปได้ว่าจะให้ของขวัญกัน...!)"
70004020-22 = "เอ่อ... คุณคือท่านประธานโซระซากิ ฮินะจากสถาบันเกเฮนน่าใช่มั้ยคะ?"
70004020-23 = "อื้อ มีธุระอะไรกับฉันเหรอ...?"
70004020-24 = "มะ... ไม่ค่ะ! ฉันไม่ได้มีเรื่องขอร้องหรือเรื่องให้ใส่ใจอะไรเป็นพิเศษหรอกค่ะ"
70004020-25 = "เอ่อ... คือว่า... บะ... แบบว่า..."
70004020-26 = "คริสต์มาสปีนี้จะทำอะไรเหรอคะ?"
70004020-27 = "คริสต์มาสปีนี้เหรอ...?"
70004020-28 = "ค่ะ ต่อให้เป็นประธานคณะกรรมการวินัยที่งานยุ่งแค่ไหน แต่ฉันคิดว่าตอนคริสต์มาส ก็น่าจะ... ได้พักผ่อนหรือทำอะไรบ้างน่ะค่ะ..."
70004020-29 = "อย่างเช่นไปเข้าร่วมปาร์ตี้งานใหญ่ๆ หรือว่า 'ให้ของขวัญ' ใคร..."
70004020-30 = "ไม่รู้สิ..."
70004020-31 = "ว่าแต่ทำไมถึงสงสัยเหรอว่าฉันจะทำอะไร?"
70004020-32 = "(ปะ... เป็นเรื่องแล้วไง! โดนสงสัยเข้าให้แล้ว...!)"
70004020-33 = "อ่า... เอ่อ... คือว่า..."
70004020-35 = "ที่จริงฉันเป็นเด็กม.ต้นน่ะค่ะ ปีหน้าฉันจะขึ้นม.ปลายแล้ว!"
70004020-36 = "ช่วงนี้ฉันกำลังคิดว่าจะไปเรียนต่อที่โรงเรียนไหนดี แล้วจู่ๆ ก็เกิดสงสัยขึ้นมาว่านักเรียนเกเฮนน่า#nทำอะไรกันบ้างในวันหยุดน่ะค่ะ"
70004020-37 = "กำลังคิดว่าจะเรียนต่อที่ไหนดี? และมีสถาบันเกเฮนน่าเป็นตัวเลือกด้วย...?"
70004020-38 = "ค่ะ ค่ะ! ฉันถามอะไรแปลกๆ ไปหรือเปล่าคะ...?"
70004020-39 = "ไม่หรอก ไม่มีอะไรแปลกหรอก..."
70004020-40 = "ฉันแค่เพิ่งเคยเห็นเด็กม.ต้นที่อยากเข้าเรียนที่เกเฮนน่าน่ะ"
70004020-41 = "เห็นว่ามาทำงานพาร์ทไทม์ตลอด ฉันก็เลยคิดว่าเธอเป็นนักเรียนที่ขยัน... แต่ก็แอบอยากเข้าโรงเรียน#nที่มีอิสระเสรีสินะ?"
70004020-42 = "คะ? คุณแอบสังเกตฉันมาตลอดเลยเหรอคะ?"
70004020-43 = "ฉันไม่ได้ตั้งใจหรอก แต่ก็ได้เห็นทุกครั้งเวลามาที่ชาเล่ต์น่ะ"
70004020-44 = "ก็โซระดูแลร้านสะดวกซื้อในชาเล่ต์อยู่ตลอดเลยนี่?"
70004020-45 = "ถ้าเป็นคนทั่วไปคงมีขี้เกียจบ้างวันสองวัน แต่เธอทั้งขยันยืนคิดเงินและเติมสินค้าเข้าชั้นด้วย ฉันคิดว่านี่เป็นเรื่องแปลกสำหรับเด็กม.ต้นน่ะ"
70004020-46 = "เด็กเกเฮนน่าส่วนใหญ่จะทำตัวอิสระตามใจอยาก แล้วเธอก็ดูไม่เหมือนเด็กแบบนั้น ฉันก็เลยตกใจนิดหน่อย แต่ว่าเส้นทางชีวิตเราลิขิตได้เองอยู่แล้ว"
70004020-47 = "ในฐานะของประธานคณะกรรมการวินัย ถ้าฉันได้นักเรียนที่ขยันขันแข็งอย่างโซระมาเป็นรุ่นน้อง ก็คงจะดีใจไม่น้อยเลยละ"
70004020-48 = "ขะ... ขอบคุณค่ะ..."
70004020-49 = "ฉันเผลอนอกเรื่องไปหน่อยแล้ว คริสต์มาสปีนี้ฉันน่าจะฉลองกับสมาชิกคณะกรรมการวินัยคนอื่น#nในห้องคณะกรรมการน่ะ"
70004020-50 = "เหมือนว่าอาโกะ... ฉันหมายถึงเจ้าหน้าที่คณะกรรมการวินัยน่ะ เธอบอกว่าอยากให้เราอยู่ด้วยกัน และเหมือนว่ากำลังเตรียมอะไรบางอย่างเพื่อคริสต์มาสปีนี้อยู่"
70004020-51 = "ยังไงฉันก็มีงานที่ต้องทำเป็นกองอยู่แล้ว คริสต์มาสปีนี้คงไม่ได้ออกจากห้องคณะกรรมการวินัยหรอก"
70004020-52 = "อย่างนั้นเหรอคะ... งั้นเป็นคนอื่นเหรอคะที่เอาของขวัญนี้มา?"
70004020-53 = "ของขวัญ...?"
70004020-54 = "มะ... ไม่มีอะไรค่ะ!"
70004020-58 = "โซระ ฉันจะให้เบอร์ของฉันไว้ ต่อไปถ้าอยากให้ช่วยอะไรก็ติดต่อมาล่ะ"
70004020-59 = "ถ้ากังวลเรื่องการเรียนต่อในสถาบันเกเฮนน่า... ก็มาปรึกษาฉันได้"
70004020-60 = "ขอบคุณค่ะ ถ้ามีเหตุบุกรุกร้านสะดวกซื้อ ฉันจะติดต่อไปค่ะ!"
70004020-61 = "เรื่องแบบนั้นถ้าไม่เกิดขึ้นจะดีกว่านะ..."
70004020-66 = "เอ็นเจล 24 ยินดีต้อนรับค่ะ!"
70004020-67 = "เอ่อ... ขนมปังไส้มินต์ช็อกโกที่เพิ่งออกใหม่น่ะ... ขอขนมอันนั้นชิ้นหนึ่งค่ะ"
70004020-68 = "แล้วก็ถ้ามีไส้อย่างอื่น ฉันขออย่างละอันด้วยค่ะ"
70004020-69 = "ค่ะ รอสักครู่นะคะ"
70004020-75 = "(คนคนนี้คือนักเรียนของโรงเรียนสามัญทรีนิตี้...)"
70004020-76 = "(ถึงจะหน้าตาไม่ค่อยเป็นมิตร แต่ก็แวะมาซื้อขนมหวานเนื้อนุ่มไปกินบ่อยๆ)"
70004020-77 = "(บางครั้งก็ซื้อขนมหวานที่เป็นเซ็ตของขวัญไปบ้าง หรือว่าครั้งนี้จะเอาขนมหวานไปให้คุณครูเป็นของ#nขวัญกันนะ?)"
70004020-82 = "เอ่อ คุณลูกค้าคะ ไม่ทราบว่าได้สั่งเค้กของปีนี้ไปหรือยังคะ?"
70004020-83 = "หืม...? เค้กเหรอ? ทำไมเหรอคะ?"
70004020-84 = "อ๋อ หรือว่าเอ็นเจล 24 กำลังมีโปรโมชั่นเค้กเหรอคะ?"
70004020-85 = "มะ... ไม่ค่ะ! ฉันไม่ได้ถามเพื่อจะขายของหรอกค่ะ ฉันถามเป็นการส่วนตัวน่ะ..."
70004020-86 = "ฉันอยากรู้ว่านักเรียนทรีนิตี้กินเค้กแบบไหนกันในวันคริสต์มาสน่ะค่ะ"
70004020-87 = "หืม...?"
70004020-88 = "...?"
70004020-89 = "ทะ... ทรีนิตี้เหรอคะ? ฉันเคยบอกเหรอคะว่าฉันเป็นเด็กทรีนิตี้?"
70004020-90 = "มะ... ไม่หรอกค่ะ..."
70004020-91 = "ชะ... ใช่มั้ยคะ? แต่ฉันดูเหมือนนักเรียนโรงเรียนทรีนิตี้งั้นเหรอคะ? แหะๆๆ..."
70004020-92 = "(ทะ... ทำไมทำเหมือนดีใจล่ะ...? ตัวเองก็ใส่ชุดนักเรียนที่ปักตราของทรีนิตี้อยู่แท้ๆ...)"
70004020-93 = "ของหวานที่นักเรียนทรีนิตี้กินงั้นเหรอ... จะว่าไป ไม่นานมานี้ก็มีข่าวลือในโซเชียลมีเดียว่านักเรียน#nโรงเรียนทรีนิตี้กินแต่ของหวานราคาแพง... เพราะแบบนี้ก็เลยสงสัยสินะ"
70004020-94 = "ฉันเองก็คงพูดแทนนักเรียนทรีนิตี้ทุกคนไม่ได้ แต่ถึงจะบอกว่าเป็นคุณหนูจากทรีนิตี้ แต่ก็ไม่ได้แปลว่าจะชอบแต่ของหวานราคาแพงเสมอไปหรอก"
70004020-95 = "เราทุกคนก็มีความชอบเกี่ยวกับอาหารอร่อยๆ คล้ายๆ กันละค่ะ คริสต์มาสปีนี้ฉันก็ไปสั่งเค้กขอนไม้#nบุชเดอโนเอลสูตรพิเศษจากร้านของหวานเจ้าประจำใน D.U. ไว้..."
70004020-96 = "แต่ว่าเค้กอันนั้นขายแบบจำนวนจำกัด แล้วก็ต้องจองไว้ก่อนด้วย งั้นคงจะใช้เป็นข้อมูลอ้างอิงได้ยาก#nนะคะ ขอโทษด้วยนะ"
70004020-97 = "มะ... ไม่เป็นไรค่ะ! ฉันแค่ถามเพราะอยากรู้เฉยๆ ค่ะ..."
70004020-98 = "ถ้างั้นจะกินเค้กก้อนนั้นกับใครเหรอคะ?"
70004020-100 = "กินกับเพื่อนในชมรมหรือเปล่าคะ? หรือว่าไปกินกับเพื่อนกลุ่มอื่น? หรือว่าจะเป็น 'คุณครู [USERNAME]' ..."
70004020-101 = "จะ... จะเป็นแบบนั้นได้ยังไงกันเล่า!?"
70004020-102 = "ขะ... ขอโทษค่ะ!"
70004020-103 = "อ่า..."
70004020-104 = "โธ่เอ้ย ทำพลาดอีกแล้ว... เฮ้อ"
70004020-105 = "ขอโทษนะ พอได้ฟังเรื่องที่เหลวไหล ฉันก็จะแหกปากเสียงดังจนติดเป็นนิสัยไปแล้วน่ะ"
70004020-106 = "ไม่ใช่เพราะเธอหรอกนะ นิสัยนี้ฉันได้มาจากยัยเด็กคนอื่นน่ะ เข้าใจฉันหน่อยนะ... คะ"
70004020-107 = "มะ... ไม่เป็นไรค่ะ ไม่เป็นไรเลยจริงๆ พูดเป็นกันเองกับฉันได้เลยค่ะ"
70004020-108 = "ขอบใจนะ... เธอมีความเป็นผู้ใหญ่มากกว่าที่คิดนะ"
70004020-109 = "ส่วนเรื่องที่ถามมา... แน่นอนว่าก็มีบางครั้งที่ฉันแบ่งของหวานกินกับคุณครู"
70004020-110 = "แต่คริสต์มาสปีนี้ ฉันจะกินเค้กกับเพื่อนๆ ในชมรม แล้วก็จะไปช่วยงานของชมรมซิสเตอร์ด้วย"
70004020-111 = "ชมรมซิสเตอร์บอกว่าถ้าจบเทศกาลคริสต์มาสแล้วจะแบ่งขนมปาเน็ตโตเนที่อบเองให้กินน่ะ ถึงทางนั้น#nจะบอกว่าไม่ได้ใส่วัตถุดิบอะไรเป็นพิเศษก็เถอะ แต่พอเป็นของหวานก็พลาดไม่ได้อยู่แล้วน่ะนะ"
70004020-112 = "ยะ... อย่างนั้นสินะคะ... งั้นของขวัญชิ้นนี้ก็เป็นของนักเรียนคนอื่นสินะ"
70004020-113 = "...???"
70004020-117 = "เอ่อ... เธอชื่อโซระ ใช่มั้ยนะ? แล้วคริสต์มาสปีนี้จะทำอะไรเหรอ?"
70004020-118 = "คริสต์มาสปีนี้ฉันก็จะมาทำงานพาร์ทไทม์ที่ร้านสะดวกซื้อเหมือนเดิมค่ะ"
70004020-119 = "หืม? ทำงานพาร์ทไทม์ในวันคริสต์มาสด้วยเหรอ? อย่างน้อยวันนั้นก็ควรได้หยุดพักผ่อนสิ"
70004020-120 = "อ่า... แหะๆ... ได้หยุดพักมันก็ดีอยู่หรอกค่ะ แต่ฉันกำลังเก็บเงินไปซื้อของบางอย่างอยู่น่ะค่ะ"
70004020-121 = "เฮ้อ... คงต้องเหนื่อยน่าดูเลยนะ"
70004020-122 = "เอ้า รับนี่ไปสิ..."
70004020-123 = "นะ... นี่คืออะไรเหรอคะ?"
70004020-124 = "มาการองหายากที่ขายในทรีนิตี้น่ะ ฉันตั้งใจจะซื้อมาแบ่งกันกินกับเพื่อน แต่เหมือนว่าจะซื้อมาเยอะ#nมากเกินไป"
70004020-125 = "ทำงานไปก็ต้องเติมน้ำตาลไปด้วยสิ เอาไว้กินตอนเหนื่อยๆ นะ จะได้มีแรงและอารมณ์ดีขึ้นด้วย"
70004020-126 = "ขะ... ขอบคุณค่ะ...!"
70004020-127 = "ไม่ต้องขอบคุณหรอก เมื่อกี้ฉันขอโทษที่เผลอพูดเสียงดังนะ ไม่ต้องคิดมากล่ะ"
70004020-128 = "งั้นฉันไปก่อน ขอให้เป็นวันที่ดีนะโซระ~"
70004020-132 = "อ่า ร้านสะดวกซื้อนี้มีแบตสำรองสำหรับโทรศัพท์มือถือขายมั้ย?"
70004020-133 = "มีค่ะ อยู่ชั้นล่างสุด ตรงมุมขวาของเคาน์เตอร์ค่ะ"
70004020-134 = "รอดแล้ว~ พอดีฉันกำลังรอรับสายเร่งด่วน แต่ว่าโทรศัพท์ดันมาแบตหมดเกลี้ยงไปซะก่อนนี่น่ะสิ"
70004020-135 = "ปกติแบตน่าจะมีเหลือเฟือจนถึงตอนกลับไปถึงโรงเรียนเลย... จู่ๆ โทรศัพท์ก็เป็นอะไรขึ้นมานะ?"
70004020-141 = "(นักเรียนคนนี้คือคุณยูกะ นักบัญชีของโรงเรียนมิลเลเนียม)"
70004020-142 = "(เห็นมาอยู่กับคุณครูบ่อยๆ ตอนปิดงบสิ้นปี หรือไม่ก็ตอนมาเคลียร์ใบเสร็จของชาเล่ต์...)"
70004020-143 = "(ทุกครั้งที่เห็นก็มักจะทำหน้าดุและพูดบ่นคุณครูตลอด หรือว่าจะแอบเตรียมของขวัญมาเซอร์ไพรซ์#nคุณครูนะ?)"
70004020-148 = "เอ่อ... ขอโทษนะคะ..."
70004020-149 = "หืม? มีอะไรเหรอ? เมื่อกี้ทอนเงินผิดเหรอ?"
70004020-150 = "ไม่ใช่ค่ะ ไม่เกี่ยวกับเงินทอนหรอกค่ะ แต่ฉันอยากถามอะไรเป็นการส่วนตัวหน่อยน่ะค่ะ"
70004020-151 = "ถามเป็นการส่วนตัวเหรอ? โซระจังที่ปกติจะแค่เอ่ยทักทายกันเท่านั้นมีเรื่องจะถามฉันเหรอเนี่ย ชักจะสงสัยขึ้นมาแล้วสิ"
70004020-152 = "ถามได้ทุกอย่างเลยนะ ถ้าตอบได้ฉันจะตอบให้"
70004020-154 = "ไม่ทราบว่า... รู้มั้ยคะว่าคริสต์มาสปีนี้คุณครู [USERNAME] จะทำอะไร?"
70004020-155 = "ทะ... ทะ... ทำไมถึงจะถามเรื่องนั้นจากฉันล่ะ?!"
70004020-157 = "คะ คะ...? ก็เห็นคุณยูกะคอยเก็บใบเสร็จและบันทึกการทำงานล่วงเวลาของคุณครูตลอดเลยนี่คะ..."
70004020-158 = "ถ้าเทียบกับนักเรียนคนอื่นแล้ว คุณยูกะเหมือนจะรู้จักคุณครูมานานที่สุด ฉันก็เลยคิดว่าน่าจะรู้ตาราง#nของคุณครูด้วย..."
70004020-162 = "ขะ... ขอโทษค่ะ! ฉันน่าจะเข้าใจผิดไปอย่างใหญ่หลวงเลยค่ะ"
70004020-163 = "อะแฮ่ม! แน่นอนว่าฉันก็แนะนำคุณครูไม่ให้ใช้จ่ายเงินจำนวนมากๆ ในเรื่องที่ไม่จำเป็นอยู่..."
70004020-164 = "แต่ยังไงเราสองคนก็เป็นแค่คุณครูกับนักเรียนเท่านั้น ถ้าไม่มีเรื่องอะไรเป็นพิเศษ ปกติแล้วตอนวันหยุดฉันก็ไม่ติดต่อไปรบกวนการพักผ่อนของคุณครูหรอก"
70004020-165 = "อีกอย่าง ต่อให้เป็นวันหยุด แต่คุณครูงานยุ่งอยู่บ่อยๆ ด้วย"
70004020-166 = "ยะ... อย่างนั้นสินะคะ ถ้างั้นคริสต์มาสปีนี้ คุณยูกะก็ไม่ได้มีนัดกับคุณครูสินะคะ?"
70004020-167 = "อื้อ คริสต์มาสปีนี้ฉันน่าจะฉลองกับสมาชิกเซมิน่านะ"

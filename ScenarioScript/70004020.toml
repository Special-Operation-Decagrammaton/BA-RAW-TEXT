70004020-79 = "#clearST"
70004020-80 = "2;소라;03"
70004020-81 = "#wait;1000"
70004020-82 = "2;소라;03;저, 손님. 혹시 이번 크리스마스 케이크는 주문하셨나요?\n#2;em;[반응]"
70004020-83 = "2;소라;03\n5;카즈사;02;……에? 갑자기 케이크? 왜요?\n#5;em;[?]\n#5;a\n#2;m2"
70004020-84 = "5;카즈사;04;아, 이거 뭐 엔젤 24의 케이크 판촉 같은 건가요?"
70004020-85 = "2;소라;18;아, 아뇨! 가게의 일 때문이 아니라, 개인적인 질문인데요……\n#2;em;[땀]"
70004020-86 = "2;소라;09;트리니티의 학생들은 크리스마스에 어떤 케이크를 먹는지 궁금해서요."
70004020-87 = "5;카즈사;02;아……?\n#5;stiff"
70004020-88 = "2;소라;22;……?\n#2;em;[?]"
70004020-89 = "5;카즈사;03;트, 트리니티요? 제가 그런 말을 했던가요?\n#5;em;[///]"
70004020-90 = "2;소라;17;……? 아, 아뇨 딱히 그러신 적은……."
70004020-91 = "2;소라;17\n5;카즈사;07;그, 그렇죠? 그래도 트리니티 학생처럼 보이나요? 에헤헤…….\n#5;em;[재잘]"
70004020-92 = "2;소라;10;(왜, 왜 좋아하는 거지……? 트리니티 문양이 그려져 있는 옷을 입고 있으면서…….)\n#2;em;[땀]"
70004020-93 = "2;소라;10\n5;카즈사;02;트리니티의 학생들이 먹는 디저트라. 그러고 보니 전에 SNS에서 트리니티 학생들은 비싼 디저트만 먹는다는 소문을 누가 퍼트리던데…… 그것 때문이려나.\n#5;m3\n#2;dl"
70004020-94 = "5;카즈사;03;뭐, 트리니티의 학생들을 대표할 순 없지만, 트리니티의 아가씨들이라고 해서 비싼 디저트만 선호하는 건 아니니까.\n#5;em;[재잘]"
70004020-95 = "5;카즈사;07;맛있는 음식에 대한 감상은 누구나 비슷하잖아요? 저도 이번 크리스마스에는 D.U.에 있는 단골 가게에서 특제 뷔슈 드 노엘을 주문했고……."
70004020-96 = "5;카즈사;06;다만 그 케이크도 선착순 한정 예약 상품이라, 일반적인 참고가 되지 못할 것 같네요. 죄송.\n#5;em;[땀]"
70004020-97 = "5;카즈사;06\n2;소라;18;괘, 괜찮아요! 어디까지나 참고로 하고 싶은 것뿐이라……\n#2;a\n#5;m4"
70004020-98 = "2;소라;04;그럼 그 케이크는 누구와 나누어 드실 예정이신가요?"
70004020-99 = "#all;hide"
70004020-100 = "3;소라;07;같은 동아리의 친구들? 아니면 다른 모임? 혹은 '[USERNAME] 선생님'이라던가—\n#3;closeup\n#3;em;[반응]"
70004020-101 = "3;카즈사;09;그, 그럴 리가 없잖아!?\n#3;em;[빠직]\n#3;jump"
70004020-102 = "3;소라;11;죄, 죄송합니다!\n#3;em;[훌쩍]\n#3;stiff"
70004020-103 = "3;카즈사;10;……아."
70004020-104 = "3;카즈사;06;아차, 또 실수를……. 하아.\n#3;em;[속상함]"
70004020-105 = "3;카즈사;06;미안. 생각 못 한 소리 들으면 소리 지르는 게 습관 돼 버려서."
70004020-106 = "3;카즈사;06;절대 그쪽 탓은 아니고, 그렇게 만든 녀석들은 따로 있으니 이해해 줘…… 요.\n#3;em;[땀]"
70004020-107 = "3;소라;04;아, 아니에요. 진짜 괜찮아요. 편하게 대해 주세요.\n#3;greeting\n#3;em;[반짝]"
70004020-108 = "3;카즈사;03;……고마워. 보기보다 훨씬 어른스럽구나."
70004020-109 = "3;카즈사;99;질문에 대답하자면…… 뭐, 물론 선생님과 디저트를 나누어 먹는 경우도…… 없진 않지만.\n#3;em;[...]"
70004020-110 = "3;카즈사;01;이번 크리스마스에는 부원들과 함께 케이크를 나누어 먹고, 시스터후드의 일을 도우러 갈 거야."
70004020-111 = "3;카즈사;07;시스터후드에서 성탄제가 끝나고 직접 구운 파네토네를 나누어 준다고 했거든. 특별한 재료가 들어간 건 아니라지만, 뭐. 좋은 게 좋은 거니까.\n#3;em;[음표]"
70004020-112 = "3;소라;17;그, 그렇군요……. 역시 이 선물은 다른 학생이 준비한 물건이었나."

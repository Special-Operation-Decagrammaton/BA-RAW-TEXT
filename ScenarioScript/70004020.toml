70004020-15 = "2;소라;05;(이 학생은 게헨나의 선도부장으로 다른 학원에서도 유명한 소라사키 히나 부장……)\n#2;em;[...]"
70004020-16 = "2;소라;24;(히나 부장은 평소에도 말수가 적고, 표정 변화도 드물어서 누군가에게 개인적인 선물을 하는 모습을 쉽게 떠올리기가 어렵지만……)"
70004020-17 = "2;소라;25;(그래도 선도부와 관련된 일로 선생님과 얽히는 일이 많은 만큼, 선물을 할 가능성은 충분히 있어……!)\n#2;em;[!]"

[translation]
70004020-1 = "Lost Gift 2"
70004020-2 = "...The next morning."
70004020-8 = "W-Welcome to Angel 24!"
70004020-9 = "Good morning."
70004020-15 = "(This student is Sorasaki Hina, the head prefect of Gehenna. Her reputation really precedes her...)"
70004020-16 = "(Head Prefect Hina doesn't talk much, and her expression doesn't really change either, so it's hard to imagine her getting a personal gift for someone...)"
70004020-17 = "(But her Prefect Team duties lead her to interacting with Sensei a lot, so she totally could've gotten them a gift!)"
70004020-22 = "Um... You're Head Prefect Sorasaki Hina from Gehenna Academy, right?"
70004020-23 = "Yes. Do you need something...?"
70004020-24 = "N-Not at all! I'm not curious about anything or even concerned about anything in particular!"
70004020-25 = "Well... Um... S-So..."
70004020-26 = "D-Do you have any Christmas plans?"
70004020-27 = "For Christmas...?"
70004020-28 = "Yes. Even if your head prefect duties keep you busy, I thought you might have a chance...to relax a bit for Christmas..."
70004020-29 = "Like, go to a special party, or maybe give someone a gift..."
70004020-30 = "I don't know..."
70004020-31 = "Why are you so curious about my plans?"
70004020-32 = "(O-Oh no! She's getting suspicious...!)"
70004020-33 = "Uh... Um, so..."
70004020-35 = "You see, I'm actually a middle school student! I only have a few more years left until high school."
70004020-36 = "I'm still deciding which school to aim for, so I just randomly thought that it'd be nice to know how Gehenna students spend their holidays!"
70004020-37 = "School decisions? But to Gehenna...?"
70004020-38 = "E-Exactly! I-Is that weird...?"
70004020-39 = "No. I wouldn't say \"weird\"..."
70004020-40 = "Middle school students just don't usually dream of entering Gehenna. This may be a first."
70004020-41 = "You seem like a diligent enough student to me... Is it that you secretly hope for a more carefree environment than this?"
70004020-42 = "Huh? Have you been watching me, all this time?"
70004020-43 = "Not intentionally. But it happened naturally, since I do see you whenever I come to Schale."
70004020-44 = "You guard Schale's convenience store earnestly, without complaint."
70004020-45 = "It'd be easy for a middle schooler to find excuses to slack off in a place like this, but I've always found you diligently fulfilling your duty. The shelves are never empty when you're working. I admire that about you."
70004020-46 = "Gehenna's roster is filled to the brim with students who do whatever they want, whenever they want. So it just seemed antithetical to my understanding of you. But, of course, it's your choice."
70004020-47 = "Of course, as the Head Prefect, it'd only be a boon if a diligent student like you were to become one of my underclassmen."
70004020-48 = "Th-Thank you..."
70004020-49 = "Back to the topic. I'm planning on spending this Christmas at the Prefect Team's office with the other members."
70004020-50 = "Ako...that is, the senior administrator of the Prefect Team, wanted to spend this Christmas together, so she planned something."
70004020-51 = "I'm busy with work, anyway, so I wasn't planning on leaving the office to begin with."
70004020-52 = "I see... Then did someone else bring this gift?"
70004020-53 = "A gift...?"
70004020-54 = "N-Never mind!"
70004020-58 = "Sora, I'll give you my number. If you need me, feel free to contact me."
70004020-59 = "If you have more questions about Gehenna or have any problems... I can help."
70004020-60 = "Thank you. If the store is ever under attack, I'll make sure to contact you!"
70004020-61 = "...Hopefully it doesn't come to that."
70004020-66 = "W-Welcome to Angel 24!"
70004020-67 = "Uh. Do you have the new...mint chocolate bun...? Or whatever it's called."
70004020-68 = "Also, if you have the other flavors, I'd like one of each."
70004020-69 = "Okay! Coming right up!"
70004020-75 = "(She's from Trinity General School...)"
70004020-76 = "(...She looks a little scary, but she gets soft, sweet desserts a lot.)"
70004020-77 = "(Even on normal days, she tends to buy desserts made for gifting. Maybe she got a dessert gift for Sensei?)"
70004020-82 = "Um, miss? Have you ordered your Christmas cake this season yet?"
70004020-83 = "...Huh? Cake, all of a sudden? Why?"
70004020-84 = "Ah. Is this an Angel 24 cake promotion?"
70004020-85 = "N-No! It's not for the store... It's a personal question..."
70004020-86 = "I'm just curious what kind of cakes Trinity students like to eat during Christmas."
70004020-87 = "What...?"
70004020-88 = "...?"
70004020-89 = "T-Trinity? Did I tell you I'm from Trinity?"
70004020-90 = "...? N-No, you didn't..."
70004020-91 = "I-I didn't, right? But, all on your own, you just thought I looked like a Trinity student? Ehehehe..."
70004020-92 = "(Wh-Why is she so happy...? I can see the Trinity symbol on her jacket...)"
70004020-93 = "Now, about Trinity and cakes... I guess there were rumors online that Trinity students only eat super-luxurious desserts. Is that why you're asking?"
70004020-94 = "Well, I can't speak for all Trinity students, but being from Trinity doesn't mean you can only appreciate expensive things."
70004020-95 = "Good food is good food, right? For example, I ordered the special yule log cake from my favorite store in the D.U. this Christmas..."
70004020-96 = "Actually, that's a limited time first-come, first-serve reservation product, so I don't think that's a good example. Sorry."
70004020-97 = "I-It's fine! I was just curious."
70004020-98 = "Then, who are you planning on sharing that cake with?"
70004020-100 = "Friends from the same club? Another group? Or maybe, [USERNAME] Sensei...?"
70004020-101 = "Th-There's no way!!"
70004020-102 = "I-I'm sorry!"
70004020-103 = "...Ah."
70004020-104 = "Whoops, I slipped up again... *sigh*."
70004020-105 = "Sorry. I raise my voice when I'm surprised."
70004020-106 = "It's definitely not your fault. It's other people who made me this way. I hope you can understand."
70004020-107 = "N-No, it's fine. Don't worry about it."
70004020-108 = "...Thank you. You're more mature than you look."
70004020-109 = "To answer your question... Well, I can't say... I've never shared dessert with Sensei."
70004020-110 = "But this Christmas, I'm going to eat cake with the members of my club and help out the Sisterhood."
70004020-111 = "The Sisterhood is going to give out homemade panettone after Christmas. They say there's nothing special about it, but a good thing is a good thing."
70004020-112 = "I-I see... Then I guess this gift was prepared by another student."
70004020-113 = "...?"
70004020-117 = "Hey, Sora, was it? What about you? What're you doing for Christmas?"
70004020-118 = "I have a shift here, so I'll just be working."
70004020-119 = "Eh? You're working on Christmas? Shouldn't you be taking a break that day, of all days?"
70004020-120 = "Ha...haha... That would've been nice, but I'm saving up for something I really want to buy."
70004020-121 = "Aha... That must keep you pretty busy."
70004020-122 = "...Here, take it."
70004020-123 = "Wh-What's this?!"
70004020-124 = "It's a limited edition macaron from Trinity. I bought some to share with my friends, but I got too much anyway."
70004020-125 = "Sometimes you get a craving for sweets when you work, right? Save this for then, so it'll perk you back up."
70004020-126 = "Th-Thank you...!"
70004020-127 = "Don't sweat it. Think of it as an apology for me yelling earlier."
70004020-128 = "I'm gonna get going now. Have a good one, Sora!"
70004020-132 = "Hey, does this convenience store have portable batteries for phones?"
70004020-133 = "Yes. It's on the right corner of the stand, bottom row."
70004020-134 = "Thank goodness! I'm waiting on an urgent call, so I was panicking when I realized my battery was low."
70004020-135 = "According to my calculations, I should've had just enough to last me until I got back to school... Where did I go wrong?"
70004020-141 = "(I believe that's Yuuka, the treasurer of Millennium School.)"
70004020-142 = "(I've only seen her with Sensei occasionally, during year-end settlements and when organizing Schale's expense reports...)"
70004020-143 = "(She's always scolding Sensei and looks kind of scary, but maybe she secretly got them a gift?)"
70004020-148 = "Um, excuse me..."
70004020-149 = "Hm? What's the matter? Am I short?"
70004020-150 = "No, it's not the payment. I had a personal question."
70004020-151 = "A personal question? Considering we've only ever shared platitudes, my curiosity is piqued."
70004020-152 = "Ask anything. I'll answer what I can."
70004020-154 = "Um, do you know [USERNAME] Sensei's Christmas plans this year?"
70004020-155 = "Wh-Wh-Why are you asking me?!"
70004020-157 = "H-Huh...? B-Because you know all about Sensei's overtime and their expenses..."
70004020-158 = "A-And it seems like you've known Sensei the longest, out of all the students, so I just thought you might know each other's schedules."
70004020-162 = "I-I'm sorry! I made some assumptions and totally misunderstood!"
70004020-163 = "...Ahem! Of course, I advise and monitor Sensei in an appropriate manner, to make sure they don't misappropriate funds to unnecessary things."
70004020-164 = "But we're still teacher and student, so I don't contact them on holidays unless there's an urgent issue."
70004020-165 = "Besides, Sensei is almost always busy with work, even on holidays."
70004020-166 = "O-Oh, I see. Then you don't have any plans with Sensei this Christmas?"
70004020-167 = "Nope. I think I'll be spending this Christmas with members of Seminar."
70004020-168 = "It seems my troublesome underclassman has something in mind."
70004020-169 = "So I'll be looking after our members in a hopefully quiet holiday season."
70004020-170 = "...Anyway, judging from your line of questioning, I'm assuming someone else did manage to secure plans with Sensei this Christmas?"
70004020-171 = "N-No! I didn't mean it that way!"
70004020-172 = "Hm... Well, it doesn't matter to me either way."
70004020-173 = "Anyway, make sure you don't overdo it, Sora. And don't be afraid to ask whenever you do have questions."
70004020-174 = "Th-Thank you so much...!"
70004020-178 = "...Sh-She almost got me. I was right. Asking so directly is dangerous."
70004020-179 = "Anyway, it seems like I asked most of the students that visited Schale yesterday, but no one seems to know anything about this gift."
70004020-180 = "Maybe...it was for someone else?"
70004020-181 = "No, I can't let my guard down until the very end. I have to investigate every last person I can!"
70004020-186 = "W-Welcome to Angel 24!"
70004020-188 = "For the rest of the day, Sora continued to interrogate other students about the gift..."
70004020-189 = "...but she couldn't find any definitive clues."

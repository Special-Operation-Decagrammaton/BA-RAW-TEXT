70004020-75 = "2;소라;01;(이분은 분명 트리니티 종합학원 소속의……)"
70004020-76 = "2;소라;09;(……조금 인상이 무섭긴 하지만 부드럽고 달콤한 디저트를 좋아하는지 자주 사가는 손님이었지.)"
70004020-77 = "2;소라;22;(평소에도 선물용 디저트를 가끔 사 갔었는데, 혹시 선생님을 위해서 디저트 선물을 준비한 걸까?)\n#2;em;[?]"

70004020-169 = "ฉันเลยกะว่าสิ้นปีนี้จะอยู่กับสมาชิกในชมรมแล้วส่งท้ายปีเก่ากันเงียบๆ"
70004020-170 = "จะว่าไป... ที่ถามฉันแบบนี้เพราะมีใครนัดเจอคุณครูตอนคริสต์มาสเหรอ?"
70004020-171 = "มะ... ไม่ค่ะ! ไม่ใช่อย่างนั้นค่ะ!"
70004020-172 = "ฮึ่ม... แต่ยังไงมันก็ไม่เกี่ยวกับฉันหรอกนะ"
70004020-173 = "เอาเป็นว่าโซระจังก็อย่าโหมงานให้มากนักล่ะ ถ้ามีคำถามอะไรก็ถามฉันได้ตามสบายเลย"
70004020-174 = "ค่ะ ค่ะ ขอบคุณค่ะ...!"
70004020-178 = "กะ... เกือบโดนจับได้แล้วไง จะให้ถามตรงๆ แบบนี้คงไม่ดีแล้วละ"
70004020-179 = "จะว่าไป เราก็เหมือนจะถามนักเรียนส่วนใหญ่ที่แวะไปชาเล่ต์เมื่อวานหมดแล้ว แล้วแต่ละคนก็ตอบ#nเหมือนไม่มีส่วนเกี่ยวข้องกับของขวัญนั้นเลย"

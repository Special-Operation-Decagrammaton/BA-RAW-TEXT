70004020-117 = "4;카즈사;02;……저기, 소라—라고 했던가? 크리스마스에 뭘 할 거야?"
70004020-118 = "4;카즈사;02\n3;소라;02;저는 크리스마스에도 편의점 아르바이트를 계속할 예정인데요.\n#3;em;[반응]"
70004020-119 = "4;카즈사;02;엣, 크리스마스에도 아르바이트를 한다고? 그날 정도는 쉬어도 괜찮잖아?\n#4;em;[?!]"
70004020-120 = "3;소라;09;아……하하…… 그래도 좋겠지만, 개인적으로 사고 싶은 물건이 꼭 있거든요."

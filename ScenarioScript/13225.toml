[translation]
13225-5 = "G-Gyaah!! Bastards...!"
13225-6 = "The train's been destroyed! What should we do now?"
13225-7 = "Ugh... Report this to the main unit. Otherwise we'll be stuck here!"
13225-9 = "We've found the Highlanders!"
13225-11 = "Whoa, whoa, whoa! We surrender! We surrender!"
13225-12 = "Don't shoot... Let's be civilized!"
13225-14 = "...These guys aren't the target. Where are the Abydos students?"
13225-16 = "Abydos? Huh? What's that? "
13225-17 = "We are lonely speed racers... Passengers are but a luxury!"
13225-19 = "I don't see them inside!"
13225-20 = "Were they not on the train?!"
13225-22 = "What..? That can't be...!"
13225-24 = "Are you guys gonna just leave us like this? Where's the tea? Is this how you treat your guests?"
13225-25 = "For me... Cookies...!"
13225-27 = "Wh-What are you even saying...?"
13225-33 = "[ns] \"Is everyone okay?\""
13225-37 = "Yes, everyone's fine. "
13225-38 = "...Yes, I think we managed to slip out without being seen."
13225-39 = "Good thing we timed that just right. Otherwise, we would've been seriously injured..."
13225-41 = "Restricted District Sector 35-9 is about an hour from here. I'll lead the way! "
13225-42 = "Yes! Let's go!"
13225-48 = "Abydos Desert Restricted District Sector 35-9"
13225-50 = "...We're here. This should be it. "
13225-51 = "So this is the...hidden junction station..."
13225-52 = "Hasn't this station been restricted for a long time? It doesn't feel that abandoned..."
13225-53 = "Yeah. Look, the door's open over there. "
13225-58 = "Let's go inside!"
13225-65 = "This is..."
13225-66 = "...the station's control room. It looks like someone's already been here..."
13225-72 = "I see. It seems you can travel to a lot of different areas of Abydos from this station."
13225-77 = "There's a route to Downtown Abydos, Great Oasis Station...even to the Gehenna district... "
13225-78 = "The admin rights are already active... Someone must have unlocked it using Nonomi's card."
13225-80 = "...Yeah. Probably Suou. "
13225-81 = "...The control log shows that two trains left for the Valley of Student Council Presidents a few hours ago."
13225-83 = "Hoshino. We need to follow her."
13225-84 = "Then... "
13225-98 = "...Here, it's this train. "
13225-99 = "Can we all board?"
13225-100 = "Yes, it's an automated system, so we don't need a conductor... It'll take about an hour to get to the Valley."
13225-102 = "One hour... We'll arrive before sunset."
13225-103 = "This \"Valley\" place... The Train Cannon's been hidden there all this time?"
13225-104 = "Yeah. Hoshino might be there already. We need to hurry, before she does anything reckless."
13225-105 = "*sigh* She's like a little kid by the pool who needs constant watching. Not exactly what you'd expect from an upperclassman."
13225-107 = "What does Suou want...? I wonder why she called Hoshino there..."
13225-108 = "...Yeah. There's only one way to find out."
13225-109 = "Let's get on board, Sensei!"
13225-110 = "[s] \"Yes, let's head to the Valley.\""
13225-122 = "...This is the Valley of Student Council Presidents?"
13225-126 = "And that's..."
13225-137 = "Next Episode;Valley of Student Council Presidents"

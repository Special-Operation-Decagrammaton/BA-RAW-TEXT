[translation]
13225-5 = "อ๊ะ... อ๊ากกกก?!! เจ้าพวกนี้นี่...!"
13225-6 = "รถไฟเสียหายหมดแล้วครับ! ทะ... ทำยังไงดีล่ะครับ?"
13225-7 = "ฮึ่มม... รายงานกองบัญชาการหลักเดี๋ยวนี้! เราไม่ควรมาติดแหง็กอยู่ตรงนี้สิ!"
13225-9 = "เจอพวกเด็กไฮแลนเดอร์แล้วครับ!"
13225-11 = "เหวอออ ยอมแล้ว! ยอมแล้ว!"
13225-12 = "อย่ายิงนะ เวลาเกิดเหตุแบบนี้ก็ต้องประนีประนอมกันก่อนสิ"
13225-14 = "เด็กพวกนี้ไม่ใช่เป้าหมายของเรา พวกเด็กอะบิดอสไปไหนกันแล้ว?"
13225-16 = "อะบิดอสเหรอ? พูดถึงอะไรไม่เห็นจะรู้เรื่อง?"
13225-17 = "พวกเราคือนักซิ่งผู้โดดเดี่ยว เราไม่สนใจผู้โดยสารคนอื่นหรอก"
13225-19 = "ข้างในก็ไม่มีครับ!"
13225-20 = "หรือว่าไม่ได้อยู่ในรถไฟตั้งแต่แรกน่ะ?"
13225-22 = "ว่าไงนะ...? เป็นไปได้ยังไง...?!"
13225-24 = "ว่าแต่จะอยู่เฉยๆ แบบนี้เหรอ? ไม่เสิร์ฟชาให้ผู้โดยสารเลยเหรอ?"
13225-25 = "ฉันขอเป็นขนมแล้วกัน"
13225-27 = "พะ... พูดอะไรออกมาเนี่ย..."
13225-33 = "[ns] \"ทุกคนโอเคใช่มั้ย?\""
13225-37 = "อื้ม พวกเราไม่เป็นไร"
13225-38 = "ค่ะ เราน่าจะออกมาได้โดยที่พวกนั้นไม่รู้ตัวนะคะ"
13225-39 = "ตอนที่กระโดดลงมา ถ้าจังหวะพลาดไปแค่นิดเดียวคงได้เจ็บตัวกันแล้ว..."
13225-41 = "<พื้นที่ปิด เขต 35-9> อยู่ห่างจากตรงนี้ไปประมาณ 1 ชั่วโมงค่ะ ฉันจะนำทางให้เองค่ะ!"
13225-42 = "อื้ม ไปกันเถอะค่ะ!"
13225-48 = "พื้นที่ปิด ทะเลทรายอะบิดอส เขต 35-9"
13225-50 = "มาถึงที่หมายแล้วค่ะ"
13225-51 = "ที่นี่คือ... สถานีชุมทางที่ซ่อนอยู่..."
13225-52 = "ที่นี่เป็นสถานีที่ถูกปิดมานานแล้วใช่มั้ย? แต่ทำไมรู้สึกเหมือนมีใครอยู่เลย..."
13225-53 = "อื้ม ประตูตรงนั้นมันเปิดอยู่น่ะ"
13225-58 = "เข้าไปกันเถอะค่ะ!"
13225-65 = "ที่นี่มัน..."
13225-66 = "ห้องควบคุมของสถานีชุมทางค่ะ คงมีใครเข้ามาแล้วสินะคะ..."
13225-72 = "นั่นสิคะ เราสามารถไปยังพื้นที่ต่างๆ ในอะบิดอสได้จากที่นี่เลยค่ะ"
13225-77 = "มีทั้งเส้นทางไปตัวเมืองอะบิดอส ไปสถานีโอเอซิสใหญ่... แถมยังมีเส้นทางไปเขตปกครองตนเอง#nเกเฮนน่าอีก..."
13225-78 = "สิทธิ์ผู้ดูแลก็ถูกเปิดใช้งานอยู่ด้วยค่ะ... คงมีใครใช้บัตรของรุ่นพี่โนโนมิปลดล็อกไว้สินะคะ"
13225-80 = "ค่ะ น่าจะเป็นคุณสุโอค่ะ"
13225-81 = "ในบันทึกการควบคุมบอกไว้ว่าเมื่อไม่กี่ชั่วโมงก่อนหน้านี้ มีรถไฟออกไปยังหุบเขาของประธานสภา#nนักเรียน 2 ขบวนค่ะ"
13225-83 = "งั้นก็คงเป็นรุ่นพี่โฮชิโนะ รีบตามไปเถอะ"
13225-84 = "ถ้างั้น..."
13225-98 = "รถไฟขบวนนี้ได้ค่ะ"
13225-99 = "ขึ้นได้เลยใช่มั้ยคะ?"
13225-100 = "ค่ะ นี่เป็นระบบอัตโนมัติ เราเลยไม่จำเป็นต้องควบคุมต่างหาก... และในนี้บอกไว้ว่าจะไปถึง <หุบเขาของประธานสภานักเรียน> ได้ภายในเวลาประมาณ 1 ชั่วโมงค่ะ"
13225-102 = "1 ชั่วโมง... ยังไงก็ไปถึงได้ก่อนพระอาทิตย์ตกดินสินะ"
13225-103 = "หุบเขาของประธานสภานักเรียน... ที่นั่นเป็นที่ซ่อนของปืนแม่เหล็กไฟฟ้าใช่มั้ย?"
13225-104 = "อื้ม รุ่นพี่โฮชิโนะคงกำลังไปที่นั่นแล้วละ เราต้องรีบไปถึงที่นั่นก่อนรุ่นพี่จะลงมือทำอะไรลงไป"
13225-105 = "เฮ้อ... ทำตัวเหมือนเป็นเด็กไปได้ เป็นรุ่นพี่ที่ต้องใช้ความพยายามด้วยเยอะจริงๆ"
13225-107 = "คุณสุโอเรียกรุ่นพี่โฮชิโนะไปที่นั่นด้วยเหตุผลอะไรกันนะคะ... เธอคิดอะไรอยู่กันแน่..."
13225-108 = "อืม... ไปถึงเดี๋ยวก็คงรู้เองแหละ"
13225-109 = "ถ้างั้นเราขึ้นรถไฟกันเลยค่ะ คุณครู!"
13225-110 = "[s] \"อื้ม ไปหุบเขาของประธานสภานักเรียนกัน\""
13225-122 = "ที่นี่น่ะเหรอ หุบเขาของประธานสภานักเรียน?"
13225-126 = "แล้วตรงนั้นก็คือ..."
13225-137 = "ตอนต่อไป;หุบเขาของประธานสภานักเรียน"

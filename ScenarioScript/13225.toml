[translation]
13225-5 = "呃，呃啊啊啊──！這些傢伙……！"
13225-6 = "火車嚴重毀損了！該，該怎麼做？"
13225-7 = "唔……向主力部隊報告！要是在這裡被困住就糟了！"
13225-9 = "找到高地人鐵道學園的人了！"
13225-11 = "哇啊啊啊──投降！投降！"
13225-12 = "別開槍～遇到交通事故～要先和解～才對～"
13225-14 = "……這些傢伙不是我們的目標。#n阿拜多斯的人去哪裡了？"
13225-16 = "阿拜多斯？不知道你在說什麼耶？"
13225-17 = "我們是孤獨的飆速車手～#n乘客～只是累贅～"
13225-19 = "裡面也沒有！"
13225-20 = "難道從一開始就不在火車上嗎？"
13225-22 = "你說什麼……？怎麼可能……！？"
13225-24 = "你們打算就這樣讓人站著？連杯茶都不招待客人的嗎？"
13225-25 = "我要點心～"
13225-27 = "這，這些傢伙到底是……"
13225-33 = "[ns]「大家沒事吧？」"
13225-37 = "嗯，大家都沒事。"
13225-38 = "……嗯。幸好似乎在沒被發現的情況下溜出來了。"
13225-39 = "要是跳下去的時間稍微晚一點，恐怕就要受傷了……"
13225-41 = "「封鎖區35-9」離這裡大約還有1小時的路程。我來帶路！"
13225-42 = "嗯，走吧！"
13225-48 = "阿拜多斯沙漠封鎖區35-9"
13225-50 = "……到了。就是這裡。"
13225-51 = "這裡就是……隱藏的交匯站……"
13225-52 = "這個車站很久以前就被封閉了吧？#n可是總覺得有人的動靜……"
13225-53 = "嗯，那裡的門開著。"
13225-58 = "進去看看吧！"
13225-65 = "這裡是……"
13225-66 = "是交匯站的管制室。#n好像已經有人來過了……"
13225-72 = "原來如此……可以從這裡前往阿拜多斯的各個地區。"
13225-77 = "不只是阿拜多斯市內，還有大綠洲站……就連往格黑娜自治區的路線都有……"
13225-78 = "管理者權限也已經啟動……應該是有人用野乃美前輩的卡片解除了鎖定。"
13225-80 = "……嗯，我想應該是蘇芳同學吧。"
13225-81 = "……管制記錄顯示，幾小時前有兩輛車開往了學生會之谷。"
13225-83 = "是星野前輩……馬上追上去吧。"
13225-84 = "那麼…… "
13225-98 = "……準備好了。就是這輛火車。"
13225-99 = "直接搭上去就行了嗎？"
13225-100 = "是的。因為是由系統自動駕駛……大約1個小時就能抵達「學生會之谷」。"
13225-102 = "1小時……應該能在太陽下山前抵達吧。"
13225-103 = "學生會之谷……列車砲就藏在那裡吧？"
13225-104 = "嗯，星野前輩應該先過去了。#n必須在前輩動手前趕緊追上去。"
13225-105 = "唉……又不是放在河邊的小孩，前輩還真需要人照顧。"
13225-107 = "蘇芳同學把星野前輩叫到那裡有什麼目的……他到底在想什麼呢……"
13225-108 = "……去到那裡應該就能知道了。"
13225-109 = "我們趕快上車吧，老師！"
13225-110 = "[s]「嗯，往學生會之谷出發。」"
13225-122 = "……這裡就是學生會之谷？"
13225-126 = "難道說，那個就是……"
13225-137 = "下一話;學生會之谷"

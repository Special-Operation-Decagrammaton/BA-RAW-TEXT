[translation]
1009705-1 = "Logistics Information"
1009705-3 = "(ระหว่างเดินเล่นที่ท่าเรือกับโมเอะในตอนเช้าตรู่...)"
1009705-10 = "เอ๋? พวกลุงชาวประมงนี่นา?"
1009705-11 = "ลุง~ วันนี้จับปลาได้เยอะมั้ย?"
1009705-16 = "อ๊ะ ลุงก็คิดว่าเป็นใครเสียอีก หนูคาเซะคุระนี่เอง"
1009705-17 = "อืม วันนี้ลุงจับได้มากกว่าทุกวันอยู่หรอกนะ แต่ว่า..."
1009705-18 = "ว้าว นี่มันปลามาฮิมาฮินี่นา? เยอะจนล้นตะกร้าแล้วนะลุง!"
1009705-19 = "ได้มาเยอะขนาดนี้ วันนี้คงมีโชคในการทำงานสินะ"
1009705-20 = "ถ้าเป็นอย่างนั้นลุงก็คงดีใจนะหนู..."
1009705-21 = "หืม? มีปัญหาอะไรเหรอ? ได้ปลากลับมาเต็มลำแบบนี้ แต่ทำไมสีหน้าไม่ค่อยดีเลยล่ะ?"
1009705-22 = "คือว่า..."
1009705-25 = "เก็บปลาไว้ไม่ได้งั้นเหรอ?"
1009705-26 = "อื้อ บริษัท 'เรดฮุก เอ็กซ์เพรส' ที่ดูแลเรื่องการแปรรูปและจำหน่ายของทะเลของหมู่บ้านนี้กำลัง#nประสบปัญหาทางธุรกิจน่ะ..."
1009705-27 = "ตอนนี้เรากำลังหาคู่ค้ารายใหม่อยู่ แล้วพอยังหาไม่ได้ ชาวประมงในหมู่บ้านก็ไม่รู้จะขายปลาที่หามา#nได้ให้ใคร"
1009705-28 = "จะให้กินหรือแช่แข็งปลามากมายขนาดนี้ทั้งหมดก็ยากเสียด้วย..."
1009705-29 = "[s] \"ปลาที่จับมาได้เยอะๆ กลับเป็นสิ่งที่ทำให้กลุ้มใจสินะ\""
1009705-30 = "แล้วจะทำยังไงกับปลาพวกนี้เหรอ? ปลาดีๆ แบบนี้ทิ้งไปก็คงน่าเสียดาย..."
1009705-31 = "ก็... คงไม่มีทางเลือกอื่นนอกจากเอาไปทำคูซายะ"
1009705-32 = "คูซายะ...?"
1009705-33 = "อื้ม เป็นการหมักเกลือแบบดั้งเดิมที่สืบทอดกันในหมู่บ้านมาหลายรุ่นต่อหลายรุ่นแล้ว ถ้าเอาปลามาทำเป็นคูซายะ อย่างน้อยก็เก็บไว้ได้อีก 1 ปีเลยละ"
1009705-34 = "งั้นก็ถือว่าเจอวิธีแก้ปัญหาแล้วสิ? แล้วจะกังวลอะไรอีกเหรอ?"
1009705-35 = "คือว่า... ถ้าเอาปลาที่ขายไม่ออกมาทำคูซายะ ลุงกลัวว่าจะยิ่งขายไม่ออก"
1009705-36 = "คูซายะเป็นอาหารที่ถ้าคนชอบก็ชอบ แต่ถ้าไม่ชอบก็จะไม่กินเลยน่ะ ขนาดในหมู่บ้านประมงยังมีคนที่#nไม่กินเลย แล้วคนต่างถิ่นจะนิยมกินกันเหรอ?"
1009705-37 = "ไม่คิดเลยนะว่าจะมีวันที่ต้องมากังวลเพราะจับปลาได้เยอะเกินด้วย เฮ้อ..."
1009705-42 = "อืม... ฉันว่าฉันช่วยเรื่องนี้ได้นะ"
1009705-43 = "รอแป๊บหนึ่งนะ ฉันมีเทมเพลตดีๆ อันหนึ่งอยู่พอดี"
1009705-49 = "แค่ใส่ที่อยู่กับชื่อสินค้าลงไปตรงนี้... เสร็จแล้วละ!"
1009705-50 = "เอ้านี่ ลุงลองใช้แอปนี้ดูสิ"
1009705-51 = "นี่มันอะไรเหรอ?"
1009705-52 = "นี่คือแอปพลิเคชันส่งของด่วนที่สามารถโปรโมตสินค้าท้องถิ่นให้ชาวเมืองในคิโวทอสได้น่ะ"
1009705-53 = "ถ้ามีคนจากเขตอื่นในคิโวทอสที่อยากซื้อคูซายะ แอปนี้ก็จะแจ้งเตือนให้"
1009705-54 = "แต่ถึงยังไงคนที่อยากกินคูซายะก็ไม่น่ามีเยอะหรอก..."
1009705-60 = "<จริงหรือเปล่าคะที่บอกว่าปลาหมักเกลืออันนี้กลิ่นแรงเกือบถึง 1,000 AU เลย?>"
1009705-61 = "<ได้ยินว่าในอินเทอร์เน็ตมีคนไลฟ์สดกินคูซายะแล้วมีคนดูเยอะเลย...>"
1009705-62 = "<พอทุกคนบอกว่า 'กินไม่ได้แน่' ก็ยิ่งทำให้อยากลองกินเลยค่ะ!>"
1009705-63 = "<ผมอยากซื้อเป็นของขวัญให้เพื่อนที่ชอบลองทำอะไรแปลกๆ ครับ!>"
1009705-64 = "<กำลังอยากกินอาหารทะเลที่มีกลิ่นและรสเฉพาะตัวอยู่เลย!>"
1009705-66 = "อะไรกัน จู่ๆ ก็มีออเดอร์เข้ามาเป็นสิบ... เป็นร้อย... เป็นพันๆ ออเดอร์เลย!"
1009705-67 = "ในคิโวทอสมีคนที่อยากกินคูซายะมากถึงขนาดนี้เลยเหรอ...?"
1009705-68 = "ฮิฮิฮิ... นิสัยการกินของคนเราไม่เหมือนกันอยู่แล้ว"
1009705-69 = "ต่อให้เป็นอาหารที่ไม่ได้อร่อยสำหรับทุกคน แต่ฉันว่าในคิโวทอสก็น่าจะมีคนที่ชอบอยู่ไม่น้อยนะ"
1009705-70 = "แถมหมู่นี้ในอินเทอร์เน็ตก็มีการท้ากินอาหารแปลกๆ ที่ดึงดูดความสนใจชาวเน็ตได้ตั้งเยอะ... ฉันก็เลยคิดว่าถ้าเป็นอาหารอย่างคูซายะละก็ ต้องมีคนสงสัยและอยากชิมกันบ้างละ"
1009705-71 = "โห... ถ้ามีคนสั่งคูซายะเยอะขนาดนี้ละก็ อย่าว่าแต่ปลาที่จับได้วันนี้เลย ลุงว่าคูซายะที่มีอยู่ในคลังก็#nต้องขายเกลี้ยงแน่ๆ"
1009705-72 = "คงต้องรีบไปที่ลานตากปลาแล้วเตรียมทำคูซายะแล้วละ ขอบใจที่ช่วยนะหนู!"
1009705-79 = "อะไรน่ะคุณครู? ทำไมจู่ๆ ถึงมองกันด้วยสีหน้าข้องใจแบบนั้นล่ะ?"
1009705-80 = "[s1] \"ไม่หรอก ครูไม่ได้สงสัยในตัวโมเอะ...\"\n[s2] \"แค่ตกใจนิดหน่อยกับการแก้ปัญหาที่ไม่เหมือนปกติน่ะ\""
1009705-83 = "อะไรกัน~ คิดว่าฉันจะต้องแก้ปัญหาทุกอย่างด้วยระเบิดเหรอ?"
1009705-84 = "เห็นอย่างนี้ฉันก็รู้หรอกนะว่าอะไรควรทำไม่ควรทำ"
1009705-85 = "อีกอย่าง ถ้ามองในบางมุม ฉันว่างานนี้ก็มีส่วนที่ใกล้เคียงกับความพินาศที่ฉันชอบน่ะ ฮิฮิฮิ..."
1009705-86 = "[s] \"ในแง่ไหนเหรอ...?\""
1009705-87 = "ลองคิดดูสิ ถ้าเรื่องวันนี้ทำให้คูซายะขายไปทั่วคิโวทอส งั้นทั่วทั้งคิโวทอสก็จะอบอวลไปด้วยกลิ่นฉุน#nของคูซายะยังไงล่ะ"
1009705-88 = "แล้วถ้ามีคนที่หลงใหลในเอกลักษณ์ของคูซายะมากขึ้นเรื่อยๆ สุดท้ายคิโวทอสก็จะเป็นเมืองที่ส่งกลิ่น#nเหมือนคูซายะ..."
1009705-89 = "แฮ่ก... แฮ่ก... แค่คิดก็ขนลุกแล้ว...!"
1009705-90 = "[s3] \"เจตนาดูไม่ดีเลยนะ...\"\n[s4] \"แต่ถ้าผลออกมาดีก็ไม่เป็นไรหรอกเนอะ\""
1009705-95 = "[ns5] \"เก่งมากที่พยายามเพื่อชาวบ้าน ครูจะเลี้ยงข้าวเป็นรางวัลนะ\"\n[ns6] \"มีอะไรที่อยากกินมั้ย?\""
1009705-98 = "ของอร่อยๆ มีอะไรบ้างนะ..."
1009705-99 = "อ๊ะ จะว่าไปฉันได้ยินว่าหมู่บ้านนี้ขาย 'สตูคูซายะ' ด้วย"
1009705-100 = "เห็นว่าสตูคูซายะส่งกลิ่นมากกว่าคูซายะย่างอีกนะ..."
1009705-101 = "คุณครู... เราไปชิมรสชาติของความพินาศด้วยกันเถอะ แฮ่ก แฮ่ก..."
1009705-103 = "(แล้วคุณครูก็ไปกินสตูคูซายะกับโมเอะที่ร้านอาหารชาวประมงด้วยกัน)"
1009705-104 = "(สตูคูซายะมีรสชาติอร่อย... แต่กลิ่นฉุนที่เป็นเอกลักษณ์ก็ติดปากอยู่นานสองนาน)"

1009705-18 = "3;어부;00\n4;모에 수영복;03;우와, 이건 만새기잖아? 그것도 창고에 빈틈이 없을 정도로 가득이야!\n#3;m2\n#4;al\n#4;hophop"
1009705-19 = "3;어부;00\n4;모에 수영복;01;이렇게 잔뜩 낚아 올리다니, 오늘 조업은 운이 좋았나 보네."
1009705-20 = "3;어부;00;운이 좋다면…… 좋다고 해야겠지.\n#3;em;[속상함]"
1009705-21 = "3;어부;00\n4;모에 수영복;04;응? 무슨 문제라도 있어? 만선으로 돌아온 것 치고는 표정이 좋지 않아 보이는데."

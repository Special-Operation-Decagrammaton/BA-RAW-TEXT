[translation]
1009705-1 = "Logistics Information"
1009705-3 = "While taking a walk along the dock with Moe early in the morning..."
1009705-10 = "Hey, it's the fisherman!"
1009705-11 = "Hey there, did you catch a lot of fish today?"
1009705-16 = "...Oh, it's you, Kazekura."
1009705-17 = "Well, we did catch more today than usual, but..."
1009705-18 = "Wow, aren't these mahi-mahi? The storage is full of them!"
1009705-19 = "You caught so many! Must've been a lucky day!"
1009705-20 = "You...could call it luck."
1009705-21 = "Huh? Is there some kind of problem? For someone who came back with a full catch, you don't look too happy."
1009705-22 = "Well..."
1009705-25 = "Oh, you don't have enough storage for the fish?"
1009705-26 = "Yeah, Red Hook Express, the company that's been handling the processing and distribution of seafood in this town, can't operate for a while..."
1009705-27 = "They're looking for a new buyer, so there's a limit to the amount of seafood the village can handle for now."
1009705-28 = "And it's not like we can eat all this fish at once, or just freeze them all..."
1009705-29 = "[s] \"So the big catch is more of a headache than a blessing.\""
1009705-30 = "But then what are you going to do with all these fish? You can't just throw them away..."
1009705-31 = "Well, we have no choice but to make kusaya."
1009705-32 = "...Kusaya?"
1009705-33 = "Yeah, it's a traditional salting method, passed down in the village for a long time. And if we make kusaya, we'll be able to preserve them for at least a year."
1009705-34 = "Then problem solved! What's your worry?"
1009705-35 = "Well...kusaya is harder to sell than regular fish."
1009705-36 = "It's such a polarizing dish that even some of the locals hate it. It's going to be hard to sell it to outsiders."
1009705-37 = "I never thought catching too much fish would be a problem..."
1009705-42 = "Hmm...I think I can help."
1009705-43 = "Give me a moment. Let me put it all together..."
1009705-49 = "Just add the address and the product name here... Done!"
1009705-50 = "Here, try using this app."
1009705-51 = "What for?"
1009705-52 = "It's a direct delivery app. Lets you advertise local products all across Kivotos directly."
1009705-53 = "If someone in a different region wants to buy kusaya, the app will notify you."
1009705-54 = "Come on now, how many people out there are going to want kusaya...?"
1009705-60 = "Is it true that this salted fish has a smell that's close to an AU value of 1,000?"
1009705-61 = "I heard that someone live streamed a kusaya-eating challenge and their viewer count skyrocketed..."
1009705-62 = "Everyone telling me \"you won't be able to eat it\" makes me actually want to try it!"
1009705-63 = "I want to give it as a gift to my friend who loves challenges!"
1009705-64 = "I've been looking for a chance to try eating seafood with a stronger pungent taste."
1009705-66 = "What the...? The number of orders just shot up to dozens, hundreds, thousands...tens of thousands!"
1009705-67 = "There's this many people in Kivotos who want to try kusaya...?"
1009705-68 = "Heehee... People have different tastes."
1009705-69 = "No matter how polarizing a dish is, if you search through all of Kivotos, there's bound to be lots of people who like it."
1009705-70 = "Besides, challenges involving unique foods are trending on the internet...so I figured you'd get a lot of people who are just curious."
1009705-71 = "Wow...with this many orders, we'll sell through the whole catch today, AND all the stock we have left!"
1009705-72 = "I'd better get back to the drying field and start preparing it all. Thanks so much for your help!"
1009705-79 = "What is it, Sensei? You look...skeptical."
1009705-80 = "[s1] \"Well, it's not that I doubt you, Moe, but...\"\n[s2] \"I just didn't expect you to come up with that.\""
1009705-83 = "Hey, it's not like I solve EVERYTHING with explosives, you know!"
1009705-84 = "I know when to do things and when not to do things."
1009705-85 = "...Besides, this situation has its own destructive element. Heeheehee..."
1009705-86 = "[s] \"How so...?\""
1009705-87 = "Think about it. If kusaya gets sold all over Kivotos, the STENCH of kusaya will spread all over."
1009705-88 = "Not only that, more and more people will come to like it, and then the stench will become unstoppable!"
1009705-89 = "Hah... Just thinking about it gives me chills...!"
1009705-90 = "[s3] \"I question your motives, but...\"\n[s4] \"...Well, all's well that ends well.\""
1009705-95 = "[ns5] \"Since you DID solve the problem, I'll treat you to something good.\"\n[ns6] \"Is there anything you want to eat?\""
1009705-98 = "Something good to eat..."
1009705-99 = "Ah, come to think of it, I hear they have something called a \"kusaya hotpot\" in this village."
1009705-100 = "Supposedly, it makes an even stronger stench than just grilling it does."
1009705-101 = "Sensei... You want to get that horrible scent in your nostrils with me? Heehee..."
1009705-103 = "So Moe and I went off and enjoyed the kusaya hotspot at a restaurant in the fishing village."
1009705-104 = "The kusaya tasted good, but...it took a while to get the smell out of my nose. And my mouth."

1009705-87 = "4;모에 수영복;02;생각해 봐. 이번 일로 쿠사야가 키보토스 전역에 팔리게 된다면, 키보토스 곳곳에 쿠사야의 악취가 퍼져 나가게 되는 셈이잖아?"

1009705-82 = "#wait;100"
1009705-83 = "4;모에 수영복;99;뭐야~ 나라고 해서 뭐든지 폭발로 해결하는 건 아니거든?"
1009705-84 = "4;모에 수영복;02;나도 해야 할 때와 하지 말아야 할 때는 구분할 줄 안다고."
1009705-85 = "4;모에 수영복;09;……게다가, 이번 일도 어떤 의미로는 파멸과 가까운 부분이 있었으니까. 쿠히히……"

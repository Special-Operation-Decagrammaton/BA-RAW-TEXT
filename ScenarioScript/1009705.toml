1009705-67 = "2;어부;00;키보토스에 쿠사야를 먹어보고 싶은 사람이 이렇게 많았다고……?"
1009705-68 = "2;어부;00\n4;모에 수영복;99;쿠히히…… 사람의 입맛이라는 게 다 같지는 않은 법이니까.\n#4;em;[음표]"
1009705-69 = "2;어부;00\n4;모에 수영복;02;아무리 취향을 타는 음식이라 하더라도 키보토스 전체를 뒤져보면 좋아하는 사람이 꽤 있지 않겠어?"
1009705-70 = "2;어부;00\n4;모에 수영복;01;게다가 요즘은 독특한 음식에 도전하는 챌린지도 인터넷에서 유행을 끌고 있으니까…… 쿠사야 같은 식재료라면 궁금해하는 사람이 많을 거라고 생각했지."
1009705-71 = "2;어부;00;우와…… 이 정도의 주문량이라면 오늘 잡은 만새기는 물론이고, 기존에 남았던 쿠사야 재고도 모두 판매할 수 있겠는걸?"

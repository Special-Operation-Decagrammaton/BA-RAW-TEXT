1009705-25 = "2;어부;00\n4;모에 수영복;12;물고기를 보관할 방법이 없다고?\n#4;em;[?]"
1009705-26 = "2;어부;00;응. 이 마을에서 그동안 수산물의 가공과 유통을 담당해 왔던 레드훅 익스프레스가 당분간 영업이 어려워져서……"
1009705-27 = "2;어부;00;새로 거래처를 구하는 중이라, 마을에서 소화할 수 있는 수산물의 양에 한계가 생겼거든."
1009705-28 = "2;어부;00;그렇다고 이 많은 생선들을 단번에 먹어버릴 수도 없고, 얼릴 수도 없고……"
1009705-29 = "[s] \"많이 잡힌 생선이 오히려 골칫거리가 되어버렸군요……\""
1009705-30 = "2;어부;00\n4;모에 수영복;04;그럼 이 생선들은 어떻게 할 거야? 멀쩡한 생선을 버릴 수도 없고……"
1009705-31 = "2;어부;00;뭐, 쿠사야로 만드는 수밖에."
1009705-32 = "2;어부;00\n4;모에 수영복;12;……쿠사야?\n#4;em;[?]"
1009705-33 = "2;어부;00;응. 이 마을에서 오랫동안 전해져 내려온 전통적인 염장법이기도 하고, 쿠사야로 만들면 최소 1년 정도는 보존할 수 있으니까."
1009705-34 = "2;어부;00\n4;모에 수영복;04;그럼 해결된 거 아니야? 뭐가 걱정인데?"
1009705-35 = "2;어부;00;그게…… 안 팔리는 생선을 쿠사야로 만들면 더 안 팔릴 것 같아서.\n#2;stiff"
1009705-36 = "2;어부;00;쿠사야는 호불호가 너무 심하게 갈리는 음식이라, 마을 주민들 중에도 싫어하는 사람이 있는데 외지인은 더더욱 꺼리지 않겠어?"
1009705-37 = "2;어부;00;정말이지, 물고기가 많이 잡혀서 걱정하는 날이 올 줄이야. 어휴……\n#2;em;[한숨]"

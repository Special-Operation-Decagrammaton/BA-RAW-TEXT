[translation]
1009705-1 = "Logistics Information"
1009705-3 = "（一大早，和萌一起在碼頭附近散步時……）"
1009705-10 = "咦，這不是漁夫大叔們嗎？"
1009705-11 = "嗨～今天有大豐收嗎？"
1009705-16 = "……啊，我還以為是誰，原來是風倉啊。"
1009705-17 = "唔嗯，今天是有比平常多一點啦……"
1009705-18 = "哇，這不是鯕鰍嗎？而且還把倉庫塞得滿滿的！"
1009705-19 = "居然能釣到這麼多，看來今天的手氣不錯呢。"
1009705-20 = "這個嘛……要說幸運是幸運沒錯……"
1009705-21 = "嗯？怎麼了嗎？#n明明滿載而歸，你的臉色看起來卻不太好耶。"
1009705-22 = "那是因為……"
1009705-25 = "沒辦法把魚保存起來？"
1009705-26 = "嗯，因為村裡負責海產加工和流通的「Red Hook Express」暫停營業的關係……"
1009705-27 = "在尋找新客戶的期間，村裡能外銷的海產數量相對有限。"
1009705-28 = "但這麼多魚又沒辦法馬上吃完，而且也沒辦法冷凍……"
1009705-29 = "[s]「捕到這麼多魚反而變成大麻煩了……」"
1009705-30 = "那這些魚怎麼辦？#n總不能把好好的魚丟掉吧……"
1009705-31 = "恐怕只能做成臭魚乾了。"
1009705-32 = "……臭魚乾？"
1009705-33 = "嗯，這是村裡流傳已久的傳統醃製法。#n如果做成臭魚乾，最少可以保存1年。"
1009705-34 = "那不就解決了嗎？有什麼好擔心的？"
1009705-35 = "因為……如果把賣不掉的魚做成臭魚乾，說不定會更難賣出去。"
1009705-36 = "畢竟臭魚乾是很看個人喜好的食物。#n連我們的村民都有人不喜歡了，更何況是外地人呢？"
1009705-37 = "真是的，想不到會有因為捕到太多魚而頭痛的一天啊。#n唉……"
1009705-42 = "嗯……我說不定能幫上忙。"
1009705-43 = "稍等我一下，我正好有不錯的樣板。"
1009705-49 = "接著只要在這裡新增地址和商品名稱……就搞定了！"
1009705-50 = "來，試用這個APP吧。"
1009705-51 = "這是做什麼的？"
1009705-52 = "這個APP能向奇普托斯各地的市民宣傳地方的商品，而且還能直接配送哦。"
1009705-53 = "如果奇普托斯的其他地區有人想買臭魚乾，就能透過這個APP收到通知。"
1009705-54 = "哎呀，不過想吃臭魚乾的人也不可能有這麼多吧……"
1009705-60 = "「聽說這個醃製魚有接近1000AU值的臭味是真的嗎？」"
1009705-61 = "「只要直播吃臭魚乾的挑戰，觀看人數一定會飆漲……」"
1009705-62 = "「所有人都說『你肯定不敢吃』的話，反而讓人更想吃看看！」"
1009705-63 = "「想送給充滿挑戰精神的朋友！」"
1009705-64 = "「正想挑戰腥味更強的海鮮」"
1009705-66 = "什麼？訂購量突然增加了幾十、幾百……不，是幾千件？"
1009705-67 = "奇普托斯原來有這麼多人想吃臭魚乾嗎……？"
1009705-68 = "咯嘻嘻……畢竟每個人的口味都不一樣嘛。"
1009705-69 = "就算是喜好分明的食物，放眼整個奇普托斯還是會有不少人喜歡的吧？"
1009705-70 = "再加上網路帶起挑戰獨特食物的流行……#n我想應該有很多人會對臭魚乾之類的食材感到好奇。"
1009705-71 = "哇……訂購量這麼大的話，#n不只是今天捕到的鯕鰍，就連原本剩下的臭魚乾庫存都能全部賣光了吧？"
1009705-72 = "我得趕快去曬魚場準備製作臭魚乾了。#n真的很感謝你的幫忙！"
1009705-79 = "怎麼啦，老師。#n為什麼突然用懷疑的表情盯著我看呢？"
1009705-80 = "[s1]「不是啦，我沒有懷疑萌的意思……」\n[s2]「只是因為解決方式跟你平時的作風不太一樣，所以有點驚訝而已。」"
1009705-83 = "什麼嘛～我也不是什麼事都用爆炸解決的好嗎？"
1009705-84 = "什麼事該做，什麼事不該做……這點我還是能分清楚的。"
1009705-85 = "……況且這次的事，在某種意義上也有點接近毀滅嘛。#n咯嘻嘻……"
1009705-86 = "[s]「你指的是哪個部分……？」"
1009705-87 = "老師你想想看。#n如果臭魚乾就這麼賣往整個奇普托斯，不就代表臭魚乾的臭味也會隨之擴散嗎？"
1009705-88 = "如果被其魅力吸引的人繼續增加，導致整個奇普托斯充滿臭魚乾的味道……"
1009705-89 = "哈啊，哈啊……光是用想的就很可怕……！"
1009705-90 = "[s3]「真是動機不純……」\n[s4]「……但結果是好的就算了吧。」"
1009705-95 = "[ns5]「為了犒賞你的努力，我請你吃點好吃的東西吧。」\n[ns6]「有什麼想吃的嗎？」"
1009705-98 = "好吃的東西啊……"
1009705-99 = "啊，對了，我聽說這個村子裡有賣放入臭魚乾熬煮的「臭魚乾火鍋」。"
1009705-100 = "臭魚乾火鍋的臭味，據說比火烤臭魚乾還強……"
1009705-101 = "老師……要不要一起去試試那毀滅性的氣味呀？#n哈啊，哈啊……"
1009705-103 = "（之後，和萌一起在漁村食堂裡吃了臭魚乾火鍋）"
1009705-104 = "（雖然味道不錯……但那股強烈的臭味卻一直在嘴裡揮之不去……）"

[translation]
1008103-1 = "ขนมนี่มันรสเอ้ก~เซ็ลเล้นทึ~ มากเจ้าค่ะ!"
1008103-5 = "อ๊ะ ตรงนี้เจ้าค่ะ! ท่านอาจารย์!"
1008103-6 = "เรื่องที่คุยกับท่านอาจารย์ใน MOMOTALK วันนี้... สำหรับข้าแล้วเป็นเรื่องคัล~เจอร์~ช็อกมากเจ้าค่ะ!"
1008103-7 = "คิดไม่ถึงเลยว่าจะมีขนมรสเค็มด้วย! มีอยู่จริงๆ งั้นเหรอเจ้าคะ?!"
1008103-8 = "[s] \"ปกติแล้วยูคาริกินของหวานแบบไหนเหรอ?\""
1008103-9 = "อืม~ ของหวานหลังมื้ออาหารที่ข้าเคยกินมา..."
1008103-10 = "สิ่งที่กินบ่อยๆ หลังมื้ออาหารก็จะเป็นพวกไอศกรีม..."
1008103-11 = "หรือไม่ก็ขนมที่พวกคนรับใช้ซื้อมาจากย่านการค้าในเฮียกคิยาโค..."
1008103-12 = "อ้อ นอกจากนั้นยังมีพุด~ดิ้งจากสหภาพเรดวินเทอร์ที่ได้รับเป็นของขวัญมาเป็นครั้งคราว หรือไม่ก็#nแยมโร้ว~สูตรพิเศษจากทรีนิตี้ แล้วก็ขนมพวกบาคลา~ว่า~ ด้วยเจ้าค่ะ"
1008103-13 = "[s1] \"ส่วนใหญ่ก็กินแต่ขนมประเภทนี้สินะ\"\n[s2] \"ขนมที่ให้เป็นของขวัญส่วนใหญ่ก็มีแต่ของหวานๆ น่ะ\""
1008103-16 = "เจ้าคะ? หมายความว่า..."
1008103-17 = "[s] \"ฟังแล้วอย่าตกใจนะยูคาริ ในโลกนี้ยังมีขนมอื่นๆ อยู่อีกเยอะเลย!\""
1008103-18 = ".....!"
1008103-19 = "เพราะแบบนั้น... วันนี้ก็เลยนัดข้ามาในที่ที่มีขนมรสเค็มขาย เพื่อจะให้ข้าได้รู้จักขนมพวกนั้นเหรอ#nเจ้าคะ...?"
1008103-20 = "[s] \"อื้ม ครูจะแนะนำขนมขบเคี้ยวให้เอง\""
1008103-21 = "ขนม... ขบเคี้ยว?"
1008103-26 = "ที่นี่คือ <ร้านขนมขบเคี้ยว> ที่ท่านอาจารย์เคยพูดถึงเหรอ..."
1008103-31 = "อ๊ะ ท่านอาจารย์ มีคนมุงอยู่ตรงนั้นเต็มเลยเจ้าค่ะ!"
1008103-35 = "นั่นมัน...!"
1008103-38 = "มีขนมที่แพ็กเป็นชิ้นๆ ไว้เรียงกันเต็มผนังเลย..."
1008103-39 = "อ๊ะ ทางโน้นก็มีขวดโหลใส่ลูกกวาดเรียงไว้เพียบเลยเจ้าค่ะ!"
1008103-40 = "ส่วนข้างๆ ก็เป็นขนมทอดกรอบ... แล้วก็เครื่องดื่มบรรจุขวด... แล้วก็ช็อกโกแลต... รูปร่ม?"
1008103-41 = "แล้วทางนี้ก็... ประทัดกับลูกข่างดาวกระจาย...? "
1008103-42 = "มีของอย่างนี้ขายในที่แบบนี้ด้วยเหรอเจ้าคะ?!"
1008103-43 = "ตอนนี้ข้า... ตาหมุนติ้วๆ จนไม่รู้ว่าอะไรเป็นอะไรแล้วเจ้าค่ะ!"
1008103-44 = "ข้า... ข้าควรทำอะไรก่อนดีเจ้าคะ?!"
1008103-45 = "[s] \"ไว้ใจผู้เชี่ยวชาญอย่างครูได้เลย ขอขนมข้าวโพดกรอบอันหนึ่ง\""
1008103-46 = "ขอบคุณที่มาอุดหนุนตลอดเลยนะ แต๊งกิ้ว~!"
1008103-51 = "มาอุดหนุนตลอด...? ตะ... แต๊งกิ้ว...?"
1008103-52 = "ท่านอาจารย์มาร้านนี้ตลอดเลยเหรอเจ้าคะ...?"
1008103-53 = "[s] \"คนขายก็แค่พูดไปอย่างนั้นน่ะ! เอาละๆ อย่ารีรออยู่เลย เอ้านี่\""
1008103-57 = "ขนมข้าวโพดกรอบ... ขนมเป็นชิ้นๆ ที่อยู่ในถุงขนมขนาดเล็กสินะเจ้าคะ"
1008103-58 = "ฉลากตรงนี้มีเขียนไว้ว่าสิ่งนี้เป็นทั้งจุดกำเนิด รากฐาน ราชา และคิงด้อม~ ของขนมขบเคี้ยวด้วย...#nไม่เห็นเข้าใจเลยเจ้าค่ะ! "
1008103-59 = "การไม่เข้าใจความหมายของพวกนี้คือส่วนหนึ่งของขนมขบเคี้ยวเหรอเจ้าคะ...?"
1008103-60 = "อืม ถึงข้าจะไม่เข้าใจ แต่ในเมื่อเป็นขนมที่ท่านอาจารย์แนะนำให้ ถ้างั้นก็... "
1008103-67 = "อร่อยมากเลยเจ้าค่ะ! มันออกรสหวานนิดหน่อย แต่ก็มีรสเผ็ดเล็กน้อย รสชาติกลมกล่อมมากเจ้าค่ะ!"
1008103-68 = "<รสคอร์นซุ้ป~ มิกซึ~ฟรุ๊ต เมก้า~แม็กซึ~>...?"
1008103-69 = "ข้าไม่เข้าใจคำพวกนี้เลยเจ้าค่ะ..."
1008103-70 = "[s] \"ไม่เป็นไรหรอก แต่มันอร่อยดีใช่มั้ยล่ะ?\""
1008103-71 = "เจ้าค่ะ! มันเป็นรสชาติที่... ทำให้หัวใจข้าเต้นแรงมากๆ เลยเจ้าค่ะ!"
1008103-73 = "ต่อไปเป็นขนมนี้เหรอ? ลูกกวาดที่กินแล้วลิ้นเปลี่ยนสีงั้นเหรอเจ้าคะ?"
1008103-77 = "อ๊ะ! จริงด้วย ลิ้นของข้าเป็นสีฟ้าแล้ว!"
1008103-78 = "ท่านอาจารย์! ท่านอาจารย์! ดูนี่สิเจ้าคะ!"
1008103-80 = "(คุณครูสนุกกับการกินขนมต่างๆ ในร้านขนมขบเคี้ยวกับยูคาริ)"
1008103-82 = "ที่นี่มีขนมสารพัดเลย... ไม่คิดเลยเจ้าค่ะว่าโลกนี้จะมีขนมอะไรมากมายหลายประเภทแบบนี้"
1008103-83 = "ขะ... ข้าไม่รู้มาก่อนเลยเจ้าค่ะ เรียกว่าเป็นคัลเจ้อ~ช็อก~ เลย ไม่สิมากกว่านั้นอีก#nต้องเป็นอิเล้ก~ทริค~ช็อก~ แล้วเจ้าค่ะ..."
1008103-84 = "[s] \"ยูคาริ โลกแห่งขนมขบเคี้ยวไม่ได้มีแค่เท่านี้นะ!\""
1008103-85 = "ที่นี่มีอะไรอย่างอื่นอีกเหรอเจ้าคะ?!"
1008103-89 = "เอ๋? ทำไมคนถึงไปมุงอยู่ที่มุมร้านแบบนั้นล่ะเจ้าคะ?"
1008103-90 = "ทุกคนมาเร็ว! การแข่งเกมต่อสู้จะเริ่มแล้วละ!"
1008103-91 = "ดีละ! ครั้งนี้ฉันจะแสดงฝีมือให้ดูเอง!"
1008103-95 = "แข่งเกมต่อสู้...อย่างกะทันหัน...?"
1008103-96 = "[s] \"อื้ม ที่นี่มักจะมีการแข่งเกมต่อสู้กะทันหันแบบนี้บ่อยๆ น่ะ\""
1008103-97 = "สายตาของพวกเด็กๆ ดูส่องประกายแล้วก็ดูสนุกกันมากเลยเจ้าค่ะ"
1008103-98 = "...นี่สินะเจ้าคะ โลกแห่งขนมขบเคี้ยวที่ท่านอาจารย์อยากแนะนำให้ข้ารู้จัก"
1008103-99 = "[s] \"เป็นยังไงบ้าง? ยูคาริ\""
1008103-100 = "เอ่อ คือว่า... มัน..."
1008103-104 = "...ฮุฮุ"
1008103-105 = "สำหรับข้ามันยังเป็นเรื่องแปลกใหม่ที่เพิ่งได้เจอเป็นครั้งแรก"
1008103-106 = "แต่ที่นี่มีความงดงามในความหมายอื่นที่หาไม่ได้จากร้านเกมที่เคยไปก่อนหน้านี้ด้วยเจ้าค่ะ!"
1008103-107 = "ถึงจะเอะอะวุ่นวาย แต่มันก็ให้ความรู้สึกสงบอย่างแปลกประหลาดไปพร้อมๆ กันด้วย..."
1008103-108 = "ความรู้สึกนี้ที่ซึมซาบสู่หัวใจของข้า..."
1008103-109 = "ใช่เจ้าค่ะ! ทั้งหมดนี้เป็นประสบการณ์ที่สุดยอดมากๆ ท่านอาจารย์สอนให้ข้าได้รู้จักสิ่งใหม่ๆ ตลอด#nข้าประหลาดใจมากเลยเจ้าค่ะ!"
1008103-110 = "[s3] \"งั้นเหรอ? แต่ก็อย่าเพิ่งประหลาดใจกับเรื่องแค่นี้ล่ะ\"\n[s4] \"ครูจะสอนเรื่องสนุกอื่นๆ ในร้านขนมขบเคี้ยวให้อีก\""
1008103-113 = ".....!"
1008103-114 = "เจ้าค่ะ! ยูคาริผู้นี้..."
1008103-115 = "จะตั้งใจเรียนรู้อย่างสุดพลังเลยเจ้าค่ะ!"
1008103-117 = "(หลังจากนั้นคุณครูก็พายูคาริไปสัมผัสกับวัฒนธรรมต่างๆ ของร้านขนมขบเคี้ยวด้วยกันตลอดทั้งเย็น)"

[translation]
1008103-1 = "Junk Food Is Delicious!"
1008103-5 = "Ah! Over here, Sensei!"
1008103-6 = "Our MomoTalk today was quite the culture shock for me!"
1008103-7 = "Don't tell me that kind of salty snack actually exists!"
1008103-8 = "[s] \"Out of curiosity, what kind of snacks do you usually eat, Yukari?\""
1008103-9 = "Hm. You wish to know what desserts I treat myself with?"
1008103-10 = "I do enjoy nice ice cream after meals..."
1008103-11 = "Sometimes, our household staff buy me wagashi from the shopping districts of Hyakkiyako as well..."
1008103-12 = "Ah, I also get a lot of sweets as presents. Once I was sent Red Winter Academy's pudding. I've even tasted Trinity's special rollcake and baklava."
1008103-13 = "[s1] \"I should've expected you'd have a sweet tooth.\"\n[s2] \"People do tend to send sweet snacks as gifts.\""
1008103-16 = "Huh? You're..."
1008103-17 = "[s] \"I'm going to tell you something shocking, Yukari. There are snacks out there that aren't sweet!\""
1008103-18 = "...!"
1008103-19 = "So you brought me here in order to teach me about salty snacks?"
1008103-20 = "[s] \"Yes. Let Sensei show you the way of junk food.\""
1008103-21 = "Junk...food?"
1008103-26 = "So this is where you buy your junk food, Sensei?"
1008103-31 = "Whoa, That's a huge crowd over there!"
1008103-35 = "Is that—?!"
1008103-38 = "An entire wall of individually packaged snacks?"
1008103-39 = "And look! There's a glass jar full of candies on the counter!"
1008103-40 = "I see deep fried snacks, bottled beverages, and...umbrella-shaped chocolate?!"
1008103-41 = "What's that over there?! Are those fireworks and shuriken spinning tops? "
1008103-42 = "They even sell things like that?"
1008103-43 = "I, Yukari, am both vexed AND baffled!"
1008103-44 = "There's so much... What should I buy first?!"
1008103-45 = "[s] \"Let the expert guide you. One corn stick, please.\""
1008103-46 = "Thank you as always!"
1008103-51 = "Thank you...as always?"
1008103-52 = "Sensei, are you a regular here?"
1008103-53 = "[s] \"They're just being polite! Now, then. Have a bite of this.\""
1008103-57 = "A corn stick? It's just a crispy-feeling chip in a wrapper."
1008103-58 = "Wait. The label here says that it's straightforward junk food yet also the road to junk food paradise, where lies the GOAT of junk food. What does that even mean?! "
1008103-59 = "Is not knowing what ingredients are mixed in part of being junk food?"
1008103-60 = "I, Yukari, am vexed, baffled, AND confused. But if Sensei recommends it... "
1008103-67 = "It's good! Such a sweet, spicy, yet savory taste!"
1008103-68 = "There's a Corn Potage with Mixed Fruits Mega Max Flavor?"
1008103-69 = "Is that even a real thing?!"
1008103-70 = "[s] \"Who cares. Does it taste good?\""
1008103-71 = "Yes! This one's a thrilling, edge of your seat type of flavor!"
1008103-73 = "Let's try this one next. It's a candy that changes the color of your tongue."
1008103-77 = "Ah! My tongue is blue!"
1008103-78 = "Sensei, over here!"
1008103-80 = "Later, after enjoying many delicious snacks with Yukari..."
1008103-82 = "Snacks here, snacks there. There are so many delicious snacks everywhere!"
1008103-83 = "I never could've dreamed of something like this. This is beyond culture shock. It's a 100 volt electric storm!"
1008103-84 = "[s] \"That's not all. I don't just come here for the food, Yukari.\""
1008103-85 = "This place has more than junk food?!!"
1008103-89 = "Wait, why are those people gathering around a game machine at the back of the store?"
1008103-90 = "Everybody come here! We're gonna run a fighting game tournament!"
1008103-91 = "Oh yeah! I think I could take it all! Who's up for a money match?"
1008103-95 = "An impromptu fighting game tournament? Here?"
1008103-96 = "[s] \"Yeah, the local folks like to host tournaments at the arcade cabinet in the back.\""
1008103-97 = "Look how those children's eyes are sparkling. They must be having so much fun."
1008103-98 = "I see... This atmosphere is a part of the junk food experience as well."
1008103-99 = "[s] \"How do you like it?\""
1008103-100 = "Oh, uh...um..."
1008103-104 = "Heehee."
1008103-105 = "This is all very new to me. It's a lot to take in...but..."
1008103-106 = "Compared to the arcade, this place is dazzling in a completely different way!"
1008103-107 = "It's so lively, yet peaceful and cozy at the same time."
1008103-108 = "It reminds me of this strange feeling inside my chest lately..."
1008103-109 = "Anyway— This is great! I always learn so much when I'm with you, Sensei!"
1008103-110 = "[s3] \"Yeah? Well hang on, there's plenty more.\"\n[s4] \"We've only scratched the surface. Get ready for your Honors Junk Food course!\""
1008103-113 = "*gasp*"
1008103-114 = "Of course! I, Yukari, solemnly swear... "
1008103-115 = "That I shall learn all I can!"
1008103-117 = "I spent the rest of the afternoon showing Yukari the many different facets of junk food."

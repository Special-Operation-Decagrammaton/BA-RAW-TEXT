[translation]
1008103-1 = "平價點心的滋味，真是[ruby=Excellent]棒～極[/ruby]了！"
1008103-5 = "啊，我在這裡！老師！"
1008103-6 = "今天和老師在MomoTalk上聊的內容……讓我非常震驚！"
1008103-7 = "沒想到居然已經有鹹味點心了……那是真的嗎！？"
1008103-8 = "[s]「姑且問一下，紫平常都吃什麼點心呢？」"
1008103-9 = "唔嗯～小女子平常吃的點心是嗎……"
1008103-10 = "像是適合在飯後吃的冰淇淋……"
1008103-11 = "僕人偶爾從百鬼夜行商店街買回來的和菓子……"
1008103-12 = "啊，還有偶爾會收到的赤冬學園的布丁、三一特製蛋糕捲和果仁密餅之類的點心。"
1008103-13 = "[s1]「果然沒錯，你平常吃的都是那一類的點心。」\n[s2]「畢竟送禮用的點心當中，甜食的占比相當高。」"
1008103-16 = "咦？老師的意思是……"
1008103-17 = "[s]「你聽了可別嚇到哦，其實世界上還有其他各式各樣的點心！」"
1008103-18 = "……！"
1008103-19 = "所以今天是為了讓小女子認識鹹味點心……才會在這裡碰面嗎？"
1008103-20 = "[s]「嗯，這次我想讓你認識一些平價點心。」"
1008103-21 = "……平價點心？"
1008103-26 = "這裡就是老師說的「平價點心店」……"
1008103-31 = "啊，老師，那邊聚集了很多人呢！"
1008103-35 = "那個是……！"
1008103-38 = "牆上擺滿了散裝的點心……"
1008103-39 = "啊，那邊擺放著裝滿糖果的玻璃瓶！"
1008103-40 = "旁邊是油炸點心……還有裝著飲料的瓶子……跟傘型的巧克力？"
1008103-41 = "這邊這個是……爆竹和手裏劍陀螺……？"
1008103-42 = "連這種東西都有賣嗎！？"
1008103-43 = "小女子……有點暈頭轉向，不知該從何看起！"
1008103-44 = "我……我該怎麼做呢！？"
1008103-45 = "[s]「來，這種時候相信有經驗的人就對了。請給我一個好粗棒。」"
1008103-46 = "謝謝你常來光顧！"
1008103-51 = "謝謝你……常來，光顧……？"
1008103-52 = "意思是說老師常來這裡嗎……？"
1008103-53 = "[s]「那只是一種慣用語啦！先別說那個了，這給你。」"
1008103-57 = "好粗棒……是裝在小點心袋裡的散裝點心。"
1008103-58 = "是平價點心的基本、平價點心的王國與國王、平價點心的故鄉……？#n實在無法理解！"
1008103-59 = "這些讓人無法理解的部分也是平價點心的特徵……？"
1008103-60 = "唔嗯，還是不太明白。#n不過既然是老師推薦的，我就先嚐嚐看吧…… "
1008103-67 = "真好吃！這甜中帶辣的絕妙口味究竟是……！？"
1008103-68 = "「玉米濃湯綜合水果加護唇膏風味」……？"
1008103-69 = "真是太莫名其妙了！"
1008103-70 = "[s]「不過還不錯吧？」"
1008103-71 = "是啊！這種滋味……實在太令人心動……太不同凡響了！"
1008103-73 = "接下來是這個點心嗎？#n吃了會讓舌頭變色的糖果……？"
1008103-77 = "啊啊！真的耶！我的舌頭變藍了！"
1008103-78 = "老師老師！請看！"
1008103-80 = "（就這樣和紫一起品嘗著平價點心店裡各式各樣的點心）"
1008103-82 = "到處都是五花八門的點心……想不到點心的種類竟然這麼多。"
1008103-83 = "我還是第一次知道，實在太令人震驚了，真是電流般的衝擊……"
1008103-84 = "[s]「還沒完哦紫，平價點心的精髓可不只這些！」"
1008103-85 = "這裡還有什麼嗎！？"
1008103-89 = "咦？有很多人聚集在店裡的角落……"
1008103-90 = "大家集合！即席格鬥遊戲大賽要開始了！"
1008103-91 = "好！這次一定要讓你們見識我的實力！"
1008103-95 = "即席……格鬥遊戲大賽……？"
1008103-96 = "[s]「嗯，這裡也會像這樣用經典遊戲機舉辦比賽。」"
1008103-97 = "孩子們都眼睛發亮，玩得很開心呢。"
1008103-98 = "……原來如此。#n包含這部分在內……就是老師想讓我認識的平價點心啊……"
1008103-99 = "[s]「覺得如何？紫。」"
1008103-100 = "啊，那個……怎麼說呢……"
1008103-104 = "……呵呵。"
1008103-105 = "這些對我來說依然很陌生……而且大多是我初次接觸到的事物。"
1008103-106 = "和之前去的遊戲中心相比……別有一番華麗！"
1008103-107 = "雖然相當熱鬧……卻也能同時感受到心靈的平靜。"
1008103-108 = "悄悄滲入我心裡的這種感覺……"
1008103-109 = "是！這也是非常棒的經驗！#n老師總是能讓我認識到嶄新的事物……真是太令人吃驚了！"
1008103-110 = "[s3]「是嗎？但你可別這樣就被嚇到囉。」\n[s4]「因為我還會告訴你更多能在平價點心店享受的東西！」"
1008103-113 = "……！"
1008103-114 = "是！今天小女子……"
1008103-115 = "也一定會全力學習！"
1008103-117 = "（之後繼續和紫體驗平價點心店的各種文化，一同度過黃昏時光）"

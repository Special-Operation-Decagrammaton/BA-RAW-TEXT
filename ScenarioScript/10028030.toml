[translation]
10028030-1 = "第3話;前往第一節車廂"
10028030-5 = "好久不見，老師。#n來這裡有什麼事嗎？"
10028030-11 = "……而且還是跟這位可愛的三一小姑娘一起。"
10028030-15 = "……？"
10028030-16 = "小，小姑娘……？"
10028030-17 = "[s]「佳澄，初次見面就講這種話有點……」"
10028030-18 = "啊啊，我沒關係。老師別在意。"
10028030-19 = "別看我這樣，我可是實現正義部，這點程度沒什麼～"
10028030-25 = "……哦？"
10028030-31 = "哦哦哦哦～！真讓人意外～！#n比我想像中還好說話嘛！！"
10028030-32 = "很好！這種態度就對了！非常好！哈～哈哈哈哈！！"
10028030-33 = "沒錯，別在意這種小事！因為我們還有更重要的事！！"
10028030-34 = "所以我們應該好好相處！尊重包容友善～"
10028030-35 = "畢竟從情況來看，我們現在就跟同伴沒什麼兩樣！"
10028030-36 = "……至少在離開這輛列車以前。"
10028030-40 = "[ns1]「……『我們』是『同伴』？」\n[ns2]「在離開列車之前……？」"
10028030-43 = "……嗯？"
10028030-44 = "這是什麼反應？還沒從爆炸的衝擊中清醒嗎？#n我應該沒說錯吧？"
10028030-45 = "不然先整理一下思緒吧？#n你們兩位剛才說必須找到某個裝在保管箱內的公文包並下車，而我則得逃離這裡。"
10028030-46 = "所以在停下並離開列車這個部分，我們的利害關係是一致的──我有說錯嗎？"
10028030-50 = "嗯……是沒錯……"
10028030-56 = "但很抱歉，佳澄同學和我們的情況好像略有差異。"
10028030-57 = "我們沒有被人追趕，只要從車廂內找回丟失的公文包，然後正常地下車就行了。"
10028030-58 = "並沒有一定要跟你同行……"
10028030-59 = "哎呀～！！先聽人把話說完嘛～"
10028030-60 = "我當然明白三一的尊貴大小姐不想和頭上有角又隸屬格黑娜的我扯上關係～"
10028030-61 = "但人生有時候總是得做些不想做的事吧？"
10028030-62 = "小姑娘們都生活在溫室裡，所以可能不太清楚～#n人生可沒那麼簡單唷？"
10028030-66 = "哈哈哈……"
10028030-67 = "這，這樣啊……那麼……佳澄同學。"
10028030-68 = "可以請教一下……我們必須同行的理由嗎？ "
10028030-69 = "呵呵呵。那是因為～"
10028030-73 = "嗯？廣播……？"
10028030-74 = "……哇。"
10028030-75 = "時機抓得真不錯啊。#n我也在想差不多是時候了呢～！"
10028030-79 = "……啊，啊──"
10028030-80 = "向各位乘客及所有乘務員進行車內廣播。"
10028030-81 = "本列車在運輸途中發生貨物爆炸事故。"
10028030-82 = "目前乘務員正前往該車廂進行整頓，請各位乘客留在車廂內的位置上。"
10028030-83 = "為了各位的安全，從現在起請聽從乘務員的指示。"
10028030-84 = "此外由於該貨物屬於危險物質，本列車將變更路線，開往可以處理該物質的場所。"
10028030-85 = "原定的中間站點則不做停留，將直達位於格黑娜自治區32-1區的終點站。"
10028030-86 = "感謝各位乘客的諒解與配合。"
10028030-91 = "……什麼？"
10028030-92 = "變更目的地……？這麼突然？？"
10028030-93 = "[s3]「廣播內容好像有點奇怪……？」\n[s4]「不覺得和實際狀況不太一樣嗎？」"
10028030-99 = "……另外，從現在起全面禁止各座位及車廂間的移動和使用洗手間。"
10028030-100 = "由於情況緊急，將不受理任何抗議。#n離開座位將被視為暴動並對其採取防衛措施。以上是車長廣播。"
10028030-101 = "[s5]「……連廁所都不能去！？」\n[s6]「是不是太強人所難了？？？」"
10028030-104 = "哈～哈哈哈哈！！"
10028030-105 = "看吧，看吧！我就知道會這樣！列車上的傢伙們也忙起來了。"
10028030-106 = "用不了多久就會湧過來了吧？這可不得了唷？"
10028030-107 = "……嗯？你說這廣播是怎麼回事？"
10028030-108 = "貨物爆炸？當然是騙人的！！就像老師看到的一樣！"
10028030-109 = "畢竟總不能說「我們收了幫派的錢，正瞞著大家移送恐怖份子。#n不過恐怖份子逃脫了，所以我們也要落跑囉～♪」不是嗎？"
10028030-110 = "聽我說，老師。#n我原本是在最後一節，由先前抓住我的幫派分子們製造的「特殊護送車廂」裡。"
10028030-111 = "這節車廂被允許銜接在這班列車的最尾端。"
10028030-112 = "這麼顯眼的東西，怎麼想也不可能是偷偷接上去的。#n那麼這代表什麼呢？"
10028030-113 = "[s7]「這輛列車和幫派……」\n[s8]「難道是合作關係嗎……？」"
10028030-116 = "哇哈哈！！不愧是老師，果然一點就通！"
10028030-117 = "也就是說這班列車及乘務員都是一夥的，所以才會把那種護送車廂接在後頭。"
10028030-118 = "但他們有可能當義工嗎？#n怎麼想都不可能吧？"
10028030-119 = "雖然不清楚細節……八成是收了巨額的傭金吧。"
10028030-120 = "然而就在這時，護送車廂卻發生爆炸，我也從中逃了出來。"
10028030-121 = "事已至此～總不可能就這樣算了吧～？"
10028030-122 = "對列車方來說，工作已經不再只是單純的「行駛列車」了。#n既然收了錢就要把事情辦好～就是這麼回事！"
10028030-123 = "「把護送中的溫泉開發部部長平安地移交給格黑娜的幫派分部」就是他們的目標。"
10028030-124 = "為此他們將不擇手段！#n過站不停？只不過是開始而已！"
10028030-125 = "這班列車現在已經沒有減速這個選項了。#n而我也不可能從這種速度的列車上往下跳。"
10028030-126 = "要是現在跳下去，肯定會因為衝擊而昏迷個半天……#n這樣一來就會被那些傢伙趁機帶走。"
10028030-127 = "至於你們兩位……"
10028030-128 = "真的能置身事外嗎？連車票都沒有的三一學生能在這種情況下得到協助？"
10028030-129 = "在這種情況下，有辦法及時找到那個「公文包」……在今天之內趕回去嗎？"
10028030-133 = "所以我不是說了嗎？#n凡事別只考慮眼前，要把眼光放遠一點。"
10028030-134 = "偶爾也到溫室外頭呼吸點新鮮空氣吧！哈～哈哈哈哈！！"
10028030-135 = "……啊哈哈哈。"
10028030-136 = "沒事的。事情雖然變得有點複雜……#n只是這點程度的話……"
10028030-137 = "人生總是有起有落……對吧，哈哈哈。"
10028030-138 = "有起有落……"
10028030-143 = "在那裡！發現那傢伙了！！"
10028030-144 = "果然有同夥！！召集車內所有兵力！！！"
10028030-148 = "……同夥？"
10028030-149 = "[ns]「是指我們嗎？」"
10028030-150 = "唷～！你們來啦～列車上的朋友們～！！"
10028030-151 = "不是，先等等。#n我們跟這個人不是一夥的……"
10028030-152 = "不必多說，我要把這裡的傢伙全部帶走！！沒有例外！！"
10028030-153 = "全員進攻！！！"
10028030-154 = "哇～數量還挺多的呢？看來會是場硬仗～！"
10028030-155 = "事已至此，一起努力吧。老師！"
10028030-156 = "還有這位……"
10028030-161 = "……可愛的「小．姑．娘」♪"
10028030-165 = "……老師。"
10028030-166 = "[s9]「嗯，我來指揮。拜託你了，一花。」\n[s10]「總之先解決眼前的狀況吧。」"
10028030-169 = "呀～！交易戲劇性地成立了！#n很好很好！我喜歡！！"
10028030-170 = "那就拜託你們了！！而我……"
10028030-174 = "怎麼可能袖手旁觀呢！哈～哈哈哈哈！！"
10028030-177 = "你們這些傢伙，儘管放馬過來吧～！！"

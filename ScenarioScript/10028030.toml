[translation]
10028030-1 = "ตอนที่ 3;ตู้รถไฟหัวขบวน"
10028030-5 = "ไม่ได้เจอกันนานเลยนะคุณครู ว่าแต่มาทำอะไรที่นี่เหรอ?"
10028030-11 = "...แถมยังมากับคุณหนูน่ารักจากทรีนิตี้อีก"
10028030-15 = "......?"
10028030-16 = "คะ... คุณหนูน่ารักเหรอ...?"
10028030-17 = "[s] \"คาสุมิ เจอกันครั้งแรก ใช้คำแบบนี้เลยเหรอ...\""
10028030-18 = "อ่า... ฉันไม่เป็นไรค่ะคุณครู ไม่ต้องสนใจหรอกค่ะ"
10028030-19 = "เห็นอย่างนี้ฉันก็มาจากชมรมทวงความยุติธรรมนะคะ แค่นี้ทำอะไรฉันไม่ได้หรอกค่ะ~"
10028030-25 = "...โอ้ว?"
10028030-31 = "โอ้ววววว~! อะไรเนี่ย~! คุยกันรู้เรื่องกว่าที่คิดแฮะ!!"
10028030-32 = "ดีละ! อย่างนี้แหละ! ที่ฉันชอบ! วะฮ่าฮ่าฮ่าฮ่าฮ่า!!"
10028030-33 = "อืม เรื่องหยุมหยิมๆ อะไรพวกนั้นน่ะ ปล่อยๆ มันไปเถอะเนอะ! เรามีเรื่องสำคัญกว่านั้นต้องทำ!!"
10028030-34 = "ไหนๆ ก็เป็นแบบนี้แล้ว ก็ต้องทำให้ดีสิ! ทำให้ดี~"
10028030-35 = "เพราะดูจากสถานการณ์แล้ว พวกเราก็ไม่ต่างจากพันธมิตรกันหรอก!"
10028030-36 = "...อย่างน้อยก็จนกว่าจะได้ลงรถไฟไปน่ะ"
10028030-40 = "[ns1] \"...พันธมิตรงั้นเหรอ? ...'พวกเรา' น่ะนะ?\"\n[ns2] \"จนกว่าจะได้ลงรถไฟ...?\""
10028030-43 = "...หืม?"
10028030-44 = "ทำไมมีปฏิกิริยาแบบนั้นล่ะ? หรือว่ายังไม่หายตกใจจากระเบิดเมื่อกี้นี้ ก็เลยยังตั้งสติไม่ได้? ฉันว่าน่าจะใช่นะ?"
10028030-45 = "ให้ฉันสรุปให้ฟังมั้ย? ทั้งสองคนต้องไปเอากระเป๋าที่อยู่ตรงไหนสักที่ในตู้เก็บของแล้วลงไปจาก#nรถไฟขบวนนี้เนอะ? ส่วนฉันก็ต้องลงจากรถไฟแล้วหนีไป"
10028030-46 = "งั้นสิ่งที่เราต้องทำเหมือนกันคือการหยุดรถไฟขบวนนี้แล้วก็ลงไปจากที่นี่ไง ใช่มั้ยล่ะ?"
10028030-50 = "อืม... มันก็ใช่อยู่หรอกค่ะ..."
10028030-56 = "ขอโทษนะคะ แต่สถานการณ์ของคุณคาสุมิกับของพวกฉันดูจะแตกต่างกันนิดหน่อย"
10028030-57 = "พวกฉันไม่ได้ถูกไล่ล่า แต่แค่มาตามหากระเป๋าที่เอามาใส่ไว้ผิดขบวน แล้วก็แค่ต้องลงรถไฟไปค่ะ"
10028030-58 = "งั้นก็ไม่ได้มีความจำเป็นต้องไปด้วยกัน..."
10028030-59 = "เดี๋ยวเหอะ~!! ฉันยังพูดไม่จบเลย ทำไมไม่ฟังให้จบก่อนล่ะ~"
10028030-60 = "ฉันก็เข้าใจนะว่าคุณหนูผู้สง่างามจากทรีนิตี้คงไม่อยากมาเกี่ยวพันกับเด็กเกเฮนน่าที่มีเขาอย่างฉัน~"
10028030-61 = "แต่ในชีวิตมันก็ต้องมีบางครั้งที่เราต้องทำในสิ่งที่ไม่ต้องการนี่นะ หรือว่าไม่ใช่ล่ะ?"
10028030-62 = "พวกคุณหนูที่เติบโตมาแต่ในบ้านที่สวยหรูคงไม่รู้อะไรสินะ~ การใช้ชีวิตน่ะมันไม่ง่ายหรอก ไม่ง่ายเลย"
10028030-66 = "แหะๆๆ..."
10028030-67 = "งะ... งั้นเหรอคะ ค่ะ... ถ้างั้น... ฉันขอถามได้มั้ยคะ..."
10028030-68 = "ว่าทำไมคุณคาสุมิถึงจะร่วมมือกับพวกฉัน... "
10028030-69 = "ฮุฮุฮุ เรื่องนั้นน่ะ~"
10028030-73 = "หืม? มีประกาศเหรอ...?"
10028030-74 = "...ว้าว"
10028030-75 = "ได้จังหวะพอดีเลย ก็ว่าอยู่ว่าเดี๋ยวก็คงจะประกาศ แหม ได้จังหวะพอดีเลยนะ~!"
10028030-79 = "...อ่า อ่า"
10028030-80 = "แจ้งให้ผู้โดยสารและเจ้าหน้าที่ทุกท่านทราบ"
10028030-81 = "เมื่อสักครู่ได้เกิดอุบัติเหตุขึ้น และพบว่าเป็นการระเบิดของสินค้าส่วนหนึ่งที่บรรทุกมาค่ะ"
10028030-82 = "ขณะนี้เจ้าหน้าที่กำลังมุ่งหน้าไปซ่อมแซมตรงตู้รถไฟนั้น ขอให้ผู้โดยสารทุกท่านนั่งประจำที่นั่ง"
10028030-83 = "เพื่อความปลอดภัยของทุกท่าน อีกสักครู่ขอให้ทำตามคำสั่งของเจ้าหน้าที่"
10028030-84 = "และเนื่องจากสินค้าชิ้นดังกล่าวเป็นวัตถุอันตราย รถไฟขบวนนี้จึงจะมุ่งหน้าตรงไปยังสถานที่ที่สามารถ#nกำจัดวัตถุอันตรายนี้ได้"
10028030-85 = "เราจะไม่มีการจอดพักระหว่างสถานี แต่จะหยุดรถที่เขตปกครองตนเองเกเฮนน่า สถานีปลายทาง พื้นที่ 32-1"
10028030-86 = "ขออภัยในความไม่สะดวกด้วยค่ะ ขอบคุณค่ะ"
10028030-91 = "...คะ?"
10028030-92 = "ปรับเส้นทางการเดินรถ... เหรอคะ? ดื้อๆ แบบนี้เลยเหรอ??"
10028030-93 = "[s3] \"เนื้อหาในประกาศมันแปลกๆ นะ...?\"\n[s4] \"มันต่างจากความเป็นจริงไม่ใช่เหรอ?\""
10028030-99 = "...ห้ามให้มีการย้ายที่นั่งหรือเดินระหว่างตู้โดยสารนับตั้งแต่บัดนี้ และงดการใช้ห้องน้ำในทุกกรณี"
10028030-100 = "เนื่องจากเป็นสถานการณ์ฉุกเฉิน การคัดค้านทุกประเภทจึงไม่เป็นผล หากลุกออกจากที่นั่งจะถือว่า#nเป็นการก่อจลาจล และการ์ดจะเข้าไปควบคุม จบการประกาศเพียงเท่านี้ค่ะ"
10028030-101 = "[s5] \"...ห้ามเข้าห้องน้ำด้วยเหรอ!?\"\n[s6] \"แบบนี้เกินไปหรือเปล่า???\""
10028030-104 = "วะฮะฮ่าฮ่าฮ่า!!"
10028030-105 = "ต้องอย่างนี้แหละ! ฉันกะไว้แล้วว่าต้องเป็นอย่างนี้! พวกเจ้าหน้าที่บนรถไฟก็คงงานยุ่งน่าดูเลยนะเนี่ย!"
10028030-106 = "อีกอึดใจเดียวก็คงจะกรูกันเข้ามาแล้ว แบบนี้เรื่องใหญ่เลยนะ?"
10028030-107 = "...หืม? ประกาศนี่มันอะไรกัน?"
10028030-108 = "สินค้าที่บรรทุกมาบางส่วนระเบิดไปงั้นเหรอ? จ้อจี้กันชัดๆ!! คุณครูก็เห็นใช่มั้ย?!"
10028030-109 = "แต่ก็นะ ยังไงก็คงจะประกาศว่า \"เราแอบได้รับเงินจากแก๊งๆ หนึ่งแล้วส่งตัวผู้ก่อการร้ายอยู่ แต่เขาหนี#nไปได้ เราก็จะเลยขอจับตัวเขาก่อนนะค้า~♪\" ไม่ได้หรอกนี่เนอะ?"
10028030-110 = "ฟังนะคุณครู ตู้รถไฟสุดท้ายที่ฉันอยู่เมื่อกี้คือรถคุ้มกันพิเศษที่สร้างขึ้นโดยแก๊งที่จับตัวฉันมา"
10028030-111 = "และรถไฟขบวนนี้ก็อนุญาตให้เอารถคุ้มกันพิเศษนั้นมาเชื่อมกับตู้รถไฟท้ายสุด"
10028030-112 = "รถคุ้มกันขนาดใหญ่แบบนั้นคงแอบมาเชื่อมไว้เฉยๆ ไม่ได้หรอก มันต้องมีคนรู้เห็นสิ หืม?"
10028030-113 = "[s7] \"อย่าบอกนะว่า... รถไฟขบวนนี้...!?\"\n[s8] \"ร่วมมือกับ... แก๊งอะไรนั่น...?\""
10028030-116 = "วะฮ่าฮ่า!! สมแล้วที่เป็นคุณครู เข้าใจอะไรง่ายดีจัง!"
10028030-117 = "สุดท้ายแล้วรถไฟขบวนนี้กับเจ้าหน้าที่บนรถไฟทุกคนก็รู้เห็นเป็นใจกัน ก็เลยมีรถคุ้มกันแบบนั้นเชื่อม#nไว้กับรถไฟยังไงล่ะ"
10028030-118 = "แต่ว่าพวกนั้นจะยอมให้ฟรีๆ มั้ยนะ? ฉันว่าไม่มีทางหรอก"
10028030-119 = "คงได้เงินค่าวิ่งเต้นมาเป็นกอบเป็นกำเลยละ"
10028030-120 = "และตอนนี้ตู้รถไฟคุ้มกันนั่นก็ระเบิด และฉันที่อยู่ในนั้นก็หนีออกมาได้"
10028030-121 = "จากนี้พวกนั้นคงอยู่เฉยกันไม่ได้หรอก"
10028030-122 = "ทางฝั่งรถไฟก็คงคิดว่าจากนี้ 'งานที่ต้องทำไม่ใช่การเดินรถ' แต่เป็นการจัดการให้คุ้มค่าเงินที่ได้รับมา ต้องเป็นแบบนี้แน่!"
10028030-123 = "เป้าหมายของพวกนั้นคือ 'ส่งตัวหัวหน้าชมรมพัฒนาออนเซ็นที่คุ้มกันตัวอยู่ไปยังสำนักงานของแก๊งนั้น#nอย่างปลอดภัย'"
10028030-124 = "เพื่อให้บรรลุเป้าหมายแล้ว พวกนั้นคงไม่สนว่าจะต้องใช้วิธีไหนและคงไม่จบแค่เดินรถข้ามสถานีด้วย!"
10028030-125 = "เราคงชะลอความเร็วของรถไฟขบวนนี้ไม่ได้ และถ้าจะให้กระโดดลงจากรถไฟที่วิ่งด้วยความเร็วเท่านี้#nก็คงเกินกำลังฉัน"
10028030-126 = "ถ้ากระโดดลงไปตอนนี้ คงได้รับการกระทบกระเทือนจนสลบไปครึ่งวัน... และระหว่างนั้นพวกนั้นก็คง#nตามหาฉันเจอ"
10028030-127 = "ส่วนพวกเธอทั้งสองคน..."
10028030-128 = "คิดว่าจะไหวมั้ยล่ะ? พอสถานการณ์มันเป็นแบบนี้แล้ว เจ้าพวกนั้นจะมาร่วมมือกับนักเรียนทรีนิตี้ที่ไม่มี#nตั๋วรถไฟงั้นเหรอ?"
10028030-129 = "แล้วคิดว่าอยู่ในสภาพแบบนั้นแล้วจะไปตามหา 'กระเป๋า' อะไรนั่นได้เหรอ? ไหนว่าต้องรีบกลับไป#nภายในวันนี้ไงล่ะ?"
10028030-133 = "ฉันถึงได้บอกไงว่าอย่าคิดแต่เรื่องที่อยู่ตรงหน้าในตอนนี้เท่านั้น แต่ให้มองไปไกลกว่านี้ด้วย ที่เรียกว่ามองการณ์ไกลน่ะ~"
10028030-134 = "บางทีเราก็ต้องออกไปนอกเรือนกระจกแล้วสูดอากาศเย็นๆ ข้างนอกบ้าง! วะฮะฮ่าฮ่า!!"
10028030-135 = "...แหะๆๆๆ"
10028030-136 = "ไม่เป็นไรค่ะ ถึงเรื่องมันจะยุ่งเหยิงนิดหน่อย... แต่ถึงอย่างนั้น ฉันว่า..."
10028030-137 = "มันคงเป็นเรื่องที่คงเจอเข้าสักครั้งในชีวิต... น่ะค่ะ แหะๆๆ"
10028030-138 = "เรื่องธรรมดาที่คงต้องเจอ..."
10028030-143 = "เจอพวกนั้นแล้ว! อยู่ตรงนั้น!!"
10028030-144 = "ยัยนั่นมีพรรคพวกด้วยเหรอ!! เรียกกองกำลังทั้งหมดในขบวนมา!!"
10028030-148 = "...พรรคพวกเหรอคะ?"
10028030-149 = "[ns] \"พวกเราน่ะเหรอ?\""
10028030-150 = "ว่าไง~! มากันแล้วเหรอ~ สหายรถไฟ~!!"
10028030-151 = "เดี๋ยวก่อนนะคะ พวกเราสองคนไม่ได้เป็นพรรคพวกเธอ..."
10028030-152 = "ลากตัวทุกคนที่อยู่ตรงนี้ไป ไม่ต้องสืบสวนอะไรทั้งนั้น เอาตัวไปก่อน!! ไม่มีข้อยกเว้น!!"
10028030-153 = "ใช้กองกำลังทุกคน!!!"
10028030-154 = "โอ้โห~ มากันไม่น้อยเลยนี่? แบบนี้ไม่ง่ายแล้ว~!"
10028030-155 = "งั้นไหนๆ แล้วเราก็มาร่วมมือกันเลย คุณครู!"
10028030-156 = "แล้วก็..."
10028030-161 = "...'คุณหนูน่ารัก'!!"
10028030-165 = "...คุณครู..."
10028030-166 = "[s9] \"อื้ม ครูจะสั่งการให้เอง ฝากด้วยนะอิจิกะ\"\n[s10] \"อะ... อืม มาคลี่คลายสถานการณ์ก่อนแล้วกัน\""
10028030-169 = "เย้~! เจรจาได้ผล! พล็อตเหมือนในละครเลย! ดีเลิศ! ประเสริฐศรี! ถูกใจฉันนัก!!"
10028030-170 = "ถ้างั้นก็ฝากด้วยนะ!! ส่วนฉันก็..."
10028030-174 = "จะทำให้เต็มที่เหมือนกัน! วะฮ่าฮ่าฮ่าฮ่า!!"
10028030-177 = "เข้ามาเลย! มีเท่าไรก็ใส่เข้ามาเลย~!!"

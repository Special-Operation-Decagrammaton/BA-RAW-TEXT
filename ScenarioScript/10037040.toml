10037040-33 = "5;마리나 치파오;01;음? 산해경의 회장은…… 우리가 만나 왔던 키사키 문주가 아니었나?"
10037040-34 = "3;루미;03;아, 뭐. 말하는 방식과 호칭의 문제지. 그건."
10037040-35 = "3;루미;99;내 정식 호칭은 '상인회장'이지만, 그냥 줄여서 회장이라고 다들 불러 주는 것뿐이고.\n#3;m3\n#5;dr"
10037040-36 = "3;루미;01;산해경의 학생회인, 현룡문의 회장 역할을 맡고 있는 키사키…… 문주님의 호칭은, 기본적으로 '문주'이니까 둘은 혼동되진 않아.\n#3;em;…"
10037040-37 = "3;루미;00;……적어도 산해경 내부에서라면 말이지."
10037040-38 = "#all;hide"
10037040-39 = "3;마리나 치파오;04;그런가……. 이해했다. 아니, 그렇지만……?\n#3;em;[땀]"
10037040-40 = "3;마리나 치파오;10;(우리는 서기장님이라고도 회장님이라고도 다 부르잖아? 그건 어쩌면…….)"
10037040-41 = "3;마리나 치파오;12;(설마, 체리노 회장님이 학생회장, 미화부장, 서기장, 청소부장, 체육부장, 청소부장, 선도부장, 급식부장…… 같은 걸 전부 맡고 있어서였던 건가?!)\n#3;stiff"
10037040-42 = "3;루미;03;다음으로 나올 요리는 오리를 사용한 날개 육류 요리입니다만……. 여기서 조금 고민이 되었단 말이죠.\n#3;em;[반응]"
10037040-43 = "3;루미;01;오리의 조리 방법만 해도 수십 가지가 있겠지만, 가장 유명한 방법 두 가지를 고르라면."
10037040-44 = "3;루미;02;갈색으로 구워 내는 방식과, 소금에 절여 향신료에 쪄내는 방식이 있습니다."
10037040-45 = "3;루미;99;어느 쪽이 보다 귀한 손님들을 맞이하는 데에 어울릴지 고민하던 중."

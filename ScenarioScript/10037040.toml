[translation]
10037040-1 = "第4話;遊歷世界，眺望江河"
10037040-3 = "唔呣。不愧是在奇普托斯也有口皆碑的美食街玄武商會……"
10037040-4 = "雖然咱很想這麼說沒錯……"
10037040-11 = "來來來！全家福上菜囉！#n這道菜是將曬乾的海參、鮑魚、海螺和蔬菜一起燉煮而成！"
10037040-16 = "這份量也太多了吧！？已經是第幾道菜了！？"
10037040-17 = "[s1]「我感覺……」\n[s2]「大概上了一半左右……？」"
10037040-20 = "咱可沒辦法吃這麼多啊！？"
10037040-21 = "……雖然好吃到咱恨不得自己有十個胃！"
10037040-26 = "來來來，儘管吃別客氣。#n多吃一點才會長高高哦～赤冬的書記長大人！"
10037040-27 = "我是朱城瑠美。#n目前擔任玄武商會的會長，同時也是主廚。"
10037040-28 = "會，會長！？會長要親自出來接待嗎？"
10037040-29 = "沒錯。貴客不遠千里而來，我怎麼能只待在廚房呢？"
10037040-33 = "嗯？可是山海經的會長……不是我們見過的妃姬門主嗎？"
10037040-34 = "啊～關於這點，只是稱呼和用詞的問題而已。"
10037040-35 = "我的正式頭銜其實是「商會長」，只是大家都簡稱為會長。"
10037040-36 = "而山海經學生會．玄龍門的會長妃姬……#n門主大人基本上會被稱為「門主」，所以不會出現混淆的情況。"
10037040-37 = "……至少在山海經內部是這樣的。"
10037040-39 = "原來如此……我明白了。#n不過話說回來……？"
10037040-40 = "（我們也是同時用書記長跟會長兩種稱呼。該不會……）"
10037040-41 = "（是因為潔莉諾會長同時身兼學生會長、環境美化部部長、書記長、體育部代表、#n　整潔部部長、風紀委員長、供餐部長……這些職位的關係吧！？）"
10037040-42 = "接下來是使用鴨肉製作的翅膀類料理……#n在構思這部分菜單的時候，實在讓我有點傷腦筋。"
10037040-43 = "雖然光是鴨肉就有數十種烹調方法，但如果要從中選出最有名的兩種……"
10037040-44 = "我想應該是烤至呈現焦糖色，以及用鹽醃漬後加辛香料蒸煮的方式吧。"
10037040-45 = "我煩惱了很久，不知道哪種更適合招待貴賓。"
10037040-49 = "最後乾脆選擇我全都要！來，請多吃一點！"
10037040-50 = "嗯，要讓客人吃到肚子鼓起來都還有剩，才能算是真正的款待。#n這就是山海經的行事作風！"
10037040-51 = "[s]「我就知道是這樣！」"
10037040-52 = "哈哈哈。老師也請多吃一點哦。#n如果沒有餵飽客人就放客人回家，對我們玄武商會來說可是奇恥大辱呢！"
10037040-58 = "同志～救命呀～"
10037040-59 = "[s]「潔莉諾。」"
10037040-63 = "嗯？"
10037040-64 = "[s]「是時候展現身為書記長的威嚴了！」"
10037040-65 = "……！"
10037040-66 = "這樣啊……那就沒辦法了。"
10037040-70 = "好，放馬過來吧，玄武商會！#n赤冬的氣勢，可不會被這點食物給打敗哦！"
10037040-71 = "真不愧是赤冬的書記長大人，果然氣度不凡呢！"
10037040-73 = "（……結果後來潔莉諾不得不哭著找胃藥吃）"
10037040-86 = "……"
10037040-87 = "那些人就是這次來交流的赤冬學生嗎……？"
10037040-88 = "看起來好像是耶？"
10037040-89 = "唔嗯……"
10037040-91 = "歡迎來到山海經培育支援部「梅花園」。#n潔莉諾書記長、智惠秘書室長、瑪麗娜委員長。"
10037040-92 = "我們梅花園，是為了培育山海經的年輕學生而設立的訓育機構。"
10037040-93 = "山海經成績優異的學生會被選為教官，並在梅花園教導年輕的學生。"
10037040-94 = "也就是說，這些孩子會在山海經一路從梅花園唸到高中囉？"
10037040-95 = "沒錯。當然也有中途轉學過來的情況就是了。"
10037040-99 = "原來如此……話，話說！不要拉咱啦，你們這些傢伙！"
10037040-104 = "哇啊～！是白色和紅色的衣服！好好看哦！"
10037040-105 = "這是什麼？是鬍子嗎？#n咦……掉下來了耶？給我給我！"
10037040-110 = "不，不行！那個鬍子是……智惠！"
10037040-111 = "好好好，你先冷靜，潔莉諾醬……潔莉諾書記長。#n請收下備用鬍子……"
10037040-112 = "這，這樣下去不行……得採取更治本的手段！#n不然要是這些小孩又把鬍子搶走，結果還是不會改變！"
10037040-117 = "大家！這些人是遠道而來的貴賓！所以要乖一點哦！"
10037040-118 = "吼唷，心菜醬又在說那些掃興的話了……"
10037040-122 = "啊！把鬍子還給我啦，心菜醬！我也想試試看嘛！"
10037040-123 = "不要叫我心菜醬，要叫我心菜教官！"
10037040-128 = "大家？"
10037040-132 = "要乖哦？"
10037040-136 = "噫噫！？#n對，對不起，旬教官！"
10037040-137 = "對不起……我會乖乖聽話……"
10037040-138 = "這些孩子真是的……來，潔莉諾書記長。"
10037040-139 = "嗯……旬教官管教學生的手法，每次看到都讓人不禁讚嘆啊。"
10037040-144 = "唔呣，你剛才說你叫心菜教官是嗎？"
10037040-145 = "是的，沒錯！居然一次就叫對了，真不簡單！"
10037040-146 = "梅花園……會請小孩照顧小孩嗎……？"
10037040-150 = "什，什麼小孩！我可是堂堂梅花園的教官，也是旬姐姐的妹妹，而且還……！"
10037040-152 = "呵呵，我們家心菜醬正如書記長所說，年紀原本應該還在上小學才對……"
10037040-153 = "不過因為能力受到認可的關係，不但跳級到高中，還被授予了教官的權限哦。#n真是令我引以為傲的妹妹。"
10037040-155 = "旬，旬姐姐……？#n這樣我會害羞啦，別再說了……"
10037040-156 = "[s]「沒錯！心菜教官醬是梅花園的驕傲！」"
10037040-157 = "怎麼連老師也這樣！而且心菜教官醬又是什麼啦！"
10037040-164 = "哦……？剛才赤冬的學生從梅花園出來了。"
10037040-165 = "這樣真的好嗎？#n梅花園可是我們山海經很重要的地方……"
10037040-166 = "就是說啊。#n就算是玄龍門，也不能隨意插手梅花園的事務吧。"
10037040-167 = "門主大人到底在想什麼……？"
10037040-170 = "哦哦，這裡！是之前演京劇的地方吧！"
10037040-171 = "白虎公園是山海經最負盛名的公園之一……"
10037040-172 = "可以說絕大部分的重要活動和表演都會在這裡舉行。"
10037040-174 = "這間公園看起來確實很大沒錯……"
10037040-179 = "不過還是我們赤冬的鬍子廣場更加遼闊！"
10037040-180 = "……什麼？"
10037040-181 = "竟然用單純的寬度和大小，貶低承載著我們山海經深厚傳統的白虎公園！"
10037040-182 = "不，我沒有這個意思。#n透過這次的交流會，我已經確實了解到山海經是擁有深厚傳統底蘊的學園。"
10037040-183 = "只是！這也再次讓我對我們赤冬，#n那戰勝酷寒嚴冬和無盡雪原的勇猛鬥志與不屈精神感到讚嘆！"
10037040-184 = "……赤冬聯邦學園，真的有那麼冷那麼遼闊嗎？"
10037040-185 = "就是那麼冷那麼遼闊……#n一旦方向稍微走偏就很可能會迷路，有時候還會遇到熊……"
10037040-186 = "熊？我們這邊是有熊貓啦……"
10037040-187 = "熊貓很可愛對吧！"
10037040-188 = "不，仔細想想，熊其實也很可愛……？例如梅多貝奇之類的……#n而且真要說起來，熊貓也是熊的一種……？"
10037040-189 = "唔！美奈執行部長是想擾亂我的思緒嗎！"
10037040-190 = "不是，我什麼都沒說啊……？"
10037040-191 = "[s3]「在我看來，瑪麗娜是在用他的方式……」\n[s4]「表達對山海經的讚美哦。」"
10037040-194 = "老，老師！？"
10037040-195 = "原來如此……那就謝謝你了。瑪麗娜委員長。"
10037040-196 = "呃，嗯……！大概就是這樣。#n山海經也挺不錯的嘛！哈哈哈！"
10037040-197 = "哼，真是獨具慧眼。#n呵呵呵……"
10037040-203 = "……那兩個人看起來好像很要好的樣子耶？智惠。"
10037040-204 = "就是說啊，潔莉諾醬……潔莉諾書記長。怎麼了嗎？"
10037040-205 = "[s]「不，我想他們並不是關係要好。」"
10037040-206 = "怎麼說呢？"
10037040-207 = "[s]「只是各個方面……都很合得來而已……」"
10037040-208 = "所以是他們之間很有共鳴的意思吧？那不是很好嗎？"
10037040-209 = "是這樣沒錯？#n那為什麼同志的表情看起來這麼複雜呢？"
10037040-211 = "我好像能明白老師的心情……對吧，老師？"
10037040-212 = "但無論如何，能合得來終究是件好事。#n呵呵呵，畢竟是在進行交流會嘛？"
10037040-218 = "快看那邊。又是赤冬的訪問團。"
10037040-219 = "美奈執行部長也陪在旁邊……等等，那門主大人現在是誰在保護？"
10037040-220 = "門主大人應該留在玄龍門，所以暫時不會有安全問題吧？"
10037040-221 = "我不是這個意思。#n從門主大人指派美奈執行部長護衛這點，可以看出訪問團受到了超高規格的待遇。"
10037040-222 = "這個嘛，畢竟是被邀請到山海經的貴賓……？"
10037040-223 = "而且居然還在白虎公園舉辦了盛大的戶外京劇表演……"
10037040-227 = "你覺得這樣對嗎？"
10037040-228 = "赤冬的訪問團，究竟明不明白自己受到了多高規格的接待啊……"
10037040-229 = "之前是夏萊的老師，這次是外校……"
10037040-230 = "這樣下去真的沒問題嗎？"
10037040-231 = "我想門主大人應該自有定奪吧……"
10037040-232 = "你的語氣聽起來真沒把握。"
10037040-234 = "……畢竟我也跟大家一樣感到不安啊。"
10037040-238 = "唔……"

[translation]
10037040-1 = "Episode 4;Tour the World and Gaze at the River"
10037040-3 = "Hmm, I see. The Black Tortoise Promenade's food is famous in Kivotos as well."
10037040-4 = "...At least that is what I would have liked to say."
10037040-11 = "Here it comes! More abalone porridge! It's carefully boiled with dried sea cucumber, abalone, and conch!"
10037040-16 = "Isn't this too much?! What number is this course?!"
10037040-17 = "[s1] \"If I had to guess...\"\n[s2] \"I think you're about half way through.\""
10037040-20 = "What?! But I can't eat that much!"
10037040-21 = "I mean, it all tastes so good. I would if I could, but...!"
10037040-26 = "Now, now. You must eat to add some inches to your height, Great Leader of Red Winter!"
10037040-27 = "I am Akeshiro Rumi. I am the president of the Black Tortoise Promenade, but above all, I am a chef."
10037040-28 = "P-President?! You're here?"
10037040-29 = "Of course! After all, we have important guests visiting from far away. I couldn't just stay in the kitchen."
10037040-33 = "Hm? The president of Shanhaijing... Wasn't it Madam Kisaki?"
10037040-34 = "Oh, well, it's technically for different groups."
10037040-35 = "My official title is Merchant Guild President, but everyone just calls me President for short."
10037040-36 = "The acting president of Shanhaijing's student council, also known as Genryumon, Kisaki... I mean, the president is always addressed as \"Madam,\" so there's no confusion."
10037040-37 = "...At least inside Shanhaijing, that is."
10037040-39 = "I understand. But wait...?"
10037040-40 = "(We refer to ours as Great Leader and President, don't we? Maybe...)"
10037040-41 = "(Maybe it's all because Great Leader Cherino is also the student council president, Chief Beautification Officer, Main Secretary, Chief of Sanitation, Athletics Club Captain, Head of All Prefects, Chief of Sanitation, Maven of Meal Service...and everything else?!)"
10037040-42 = "Next up is a specialty dish made from duck wings, but... Now this does give me pause."
10037040-43 = "There are dozens of ways to prepare duck, but if I had to choose the best two..."
10037040-44 = "One would be roasting it to a golden-brown, and the other would be steaming it after applying a good spice rub."
10037040-45 = "I was debating which would be the best for our honored guests."
10037040-49 = "Until I finally decided that I'd just make both! Please enjoy!"
10037040-50 = "Heh! It's not proper service unless the food you prepared fills your guests to bursting. And that is just as it should be in Shanhaijing!"
10037040-51 = "[s] \"I figured that would be the case!\""
10037040-52 = "Hahaha! You should have your fill as well, Sensei. If any visitor of the Black Tortoise Promenade returns with a less-than full stomach, it would bring shame to us!"
10037040-58 = "Comrade! Save me!"
10037040-59 = "[s] \"Cherino.\""
10037040-63 = "Y-Yes?"
10037040-64 = "[s] \"This is where you make your stand, as the Great Leader!\""
10037040-65 = "...!"
10037040-66 = "I see... So that's how it is."
10037040-70 = "All right. I accept your challenge, Black Tortoise Promenade! Red Winter will not bend to your will so easily!"
10037040-71 = "You're just as bold as I thought you would be, Great Leader of Red Winter!"
10037040-73 = "...It wasn't long before Cherino was desperate for an antacid to settle her struggling digestive system..."
10037040-86 = "..."
10037040-87 = "So those are the Red Winter students who came for this exchange meeting...?"
10037040-88 = "Looks like it."
10037040-89 = "Hm..."
10037040-91 = "Welcome to the Shanhaijing Disciplinary Support Department Plum Blossom Garden, Great Leader Cherino. Chief Secretary Tomoe. Chairman Marina. "
10037040-92 = "The Plum Blossom Garden is an educational facility meant to teach the younger students of Shanhaijing."
10037040-93 = "The students who perform well in Shanhaijing Academy are chosen to be instructors. And in turn, they are tasked with educating young students in the Plum Blossom Garden."
10037040-94 = "So as long as they're in Shanhaijing, these children continue learning from childhood through high school?"
10037040-95 = "Yes. Of course, there are some students who transfer in."
10037040-99 = "I see... B-Before that! Stop pestering me, you rascals!"
10037040-104 = "Wow! Look at those white and red clothes! Cool!"
10037040-105 = "What's this? A mustache? Huh... It comes off. I want one too!"
10037040-110 = "N-No! Th-That mustache is... Tomoe!"
10037040-111 = "Now, now. Great Leader Cherino, I recommend you use the backup mustache..."
10037040-112 = "No, wait...! We need something more secure! Otherwise, the children will take that mustache too, and I'll be right back in the same predicament."
10037040-117 = "Children! These are honored guests from a far away place! Behave yourselves!"
10037040-118 = "Boo, Kokona. You're being boring again..."
10037040-122 = "Oh! Give the mustache back to me, Kokona! I want to try it on!"
10037040-123 = "You can't just call me Kokona. It's Instructor Kokona!"
10037040-128 = "Everyone?"
10037040-132 = "That's enough."
10037040-136 = "H-Hiii! S-Sorry, Instructor Shun!"
10037040-137 = "We're sorry... We'll behave..."
10037040-138 = "Children can be so much sometimes... Here you go, Great Leader Cherino."
10037040-139 = "Hm... I'm always impressed with Instructor Shun's ability to control the students here."
10037040-144 = "A-Ahem. You are Instructor Kokona, correct?"
10037040-145 = "Yes, I am! Thank you for addressing me with my proper title!"
10037040-146 = "So in the Plum Blossom Garden...is a child in charge of the other children...?"
10037040-150 = "I-I am not a child! I am an instructor in the Plum Blossom Garden, Shun's younger sister, and I...!"
10037040-152 = "Heehee! As you so astutely observed, Kokona should be in elementary school with other children her age..."
10037040-153 = "But her talents made her worthy of the Senior Secondary School and the instructor position. I am very proud of my little sister."
10037040-155 = "Sh-Shun...? You're embarrassing me. Stop..."
10037040-156 = "[s] \"She's right! The adorable Instructor Kokona is the pride of the Plum Blossom Garden!\""
10037040-157 = "Not you too, Sensei! Why did you add \"adorable\"?!"
10037040-164 = "Wha...? The Red Winter students all left the Plum Blossom Garden."
10037040-165 = "Really? But the Plum Blossom Garden is one of the most important places in Shanhaijing..."
10037040-166 = "I know. Not even Genryumon can intercede in what happens in the Plum Blossom Garden."
10037040-167 = "What is the president thinking...?"
10037040-170 = "Oh, this is where they performed the Peking opera! "
10037040-171 = "White Tiger Park is one of the most famous parks in Shanhaijing..."
10037040-172 = "Most large-scale events and performances all take place here. Heh."
10037040-174 = "It certainly is very large..."
10037040-179 = "But I think Red Winter's Red Mustache Revolution Plaza is even larger!"
10037040-180 = "...Excuse me?"
10037040-181 = "Are you disparaging the cultural touchstone that is White Tiger Park by boiling it down to its size?!"
10037040-182 = "No, not at all! We understand very well that Shanhaijing has great pride in its storied traditions through this exchange meeting."
10037040-183 = "However! We are equally proud of the fighting spirit and willpower of Red Winter, since we are forced to face subzero temperatures and an endless snowfield!"
10037040-184 = "...Is the Red Winter Federal Academy truly that cold and large?"
10037040-185 = "Yes it is... One can easily get lost by taking a wrong turn, and some even encounter bears on their path..."
10037040-186 = "Bears? We do have pandas of our own..."
10037040-187 = "Pandas are cute!"
10037040-188 = "No, wait. Bears can be cute too, now that I think about it... Like Medvezi... Then again, pandas are a type of bear, right?"
10037040-189 = "Ugh! Your ploy was to confuse me, wasn't it, Executive Officer Mina!"
10037040-190 = "But I didn't say anything unusual..."
10037040-191 = "[s3] \"If I were to put in my two cents...\"\n[s4] \"Marina was just appreciating Shanhaijing in her own way.\""
10037040-194 = "S-Sensei?!"
10037040-195 = "I see... Then I must thank you, Chairman Marina."
10037040-196 = "W-Well...! As long as you understand. Shanhaijing is also quite impressive! Hahaha!"
10037040-197 = "Heh. I see you have a discerning eye..."
10037040-203 = "...Is it just me, or does it seem like the two of them are getting along really well?"
10037040-204 = "I agree, Cherino—I mean, Great Leader Cherino. I wonder why?"
10037040-205 = "[s] \"I wouldn't say that they're getting along exactly.\""
10037040-206 = "Then?"
10037040-207 = "[s] \"It's more like...birds of a feather...\""
10037040-208 = "Like they're on the same wavelength, right? That's good, isn't it?"
10037040-209 = "If so, why is your expression seem so perplexed, Comrade?"
10037040-211 = "I think I'm starting to understand... Right, Sensei?"
10037040-212 = "All's well that ends well. That is the goal of an exchange meeting, isn't it? Heeheehee!"
10037040-218 = "Look over there! It's the Red Winter visitors again."
10037040-219 = "Executive Officer Mina is hard at work... Wait—Who's guarding the president?"
10037040-220 = "Since the president will remain in Genryumon, she shouldn't need any extra protection, should she?"
10037040-221 = "That's not what I mean. The mere fact that the president has lent out Executive Officer Mina is a reflection on how much she respects the visitors."
10037040-222 = "It makes sense, since Shanhaijing invited them, right...?"
10037040-223 = "...She even held a grand outdoor performance in White Tiger Park just for their benefit..."
10037040-227 = "Do you think that's just...?"
10037040-228 = "Are the Red Winter visitors even aware of how much respect they're being shown...?"
10037040-229 = "...Before, it was Schale's Sensei. Now it's an outside academy..."
10037040-230 = "Are we going down the right path?"
10037040-231 = "The president will make the decision..."
10037040-232 = "You don't sound very confident."
10037040-234 = "...We're all feeling anxious, in one way or another."
10037040-238 = "Yeah..."

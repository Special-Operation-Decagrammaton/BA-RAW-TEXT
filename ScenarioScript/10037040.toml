10037040-26 = "3;루미;00;자, 자. 그러지 말고, 더 많이 드시고 쑥쑥 자라셔야죠. 붉은겨울의 서기장님!\n#3;em;[음표]"
10037040-27 = "3;루미;03;아케시로 루미입니다. 현무상회의 회장을 맡고 있고, 그 이전에 주방장이기도 하죠."
10037040-28 = "5;현무상회 부원 A;04;회, 회장님?! 직접 나오셨군요?\n#5;em;[?!]\n#5;al\n#3;m1"
10037040-29 = "3;루미;00;당연하지. 먼 곳에서 귀한 손님이 오셨는데, 내가 주방에만 머무를 수도 없지 않겠어?"

[translation]
10037040-1 = "ตอนที่ 4;เที่ยวชมโลกและมองดูแม่น้ำ"
10037040-3 = "อืม อืม นี่สินะย่านการค้าเทพเต่าดำที่มีชื่อเสียงเลื่องลือด้านอาหารในคิโวทอส"
10037040-4 = "เราก็อยากพูดแบบนั้นอยู่หรอกนะ..."
10037040-11 = "เอาละๆ! มีผัดทะเลรวมมิตรมาเพิ่มอีกจานค่ะ! นี่คือปลิงทะเลแห้ง หอยเป๋าฮื้อ หอยสังข์ ที่ผัดรวมกับผัก#nต่างๆ ค่ะ!"
10037040-16 = "มันไม่เยอะเกินไปเหรอ?! มีทั้งหมดกี่คอร์สกันเนี่ย?!"
10037040-17 = "[s1] \"ยังเหลือมากกว่านี้อีกเยอะเลย...\"\n[s2] \"ครูว่าน่าจะเหลืออีกครึ่งหนึ่งนะ...?\""
10037040-20 = "เรากินเยอะขนาดนั้นไม่ไหวหรอกนะ!"
10037040-21 = "ต่อให้อาหารที่นี่จะอร่อยจนเราเสียดายที่กินไม่ไหวก็เถอะ!"
10037040-26 = "ไม่เอาอย่างนั้นสิ ต้องกินให้เยอะๆ จะได้โตไวๆ นะ ท่านเลขาธิการจากเรดวินเทอร์!"
10037040-27 = "ฉันชื่ออาเคชิโระ รูมิ เป็นประธานของย่านการค้าเทพเต่าดำ และก็เคยเป็นหัวหน้าเชฟมาก่อนด้วยน่ะ"
10037040-28 = "ทะ... ท่านประธาน?! ออกมาด้วยตัวเองเลยเหรอคะ?"
10037040-29 = "แน่นอนอยู่แล้วสิ เรามีแขกคนสำคัญมาจากแดนไกลทั้งที จะให้ฉันอยู่แต่ในครัวได้ยังไงกันล่ะ?"
10037040-33 = "หืม? ประธานของซานไห่จิง... ไม่ใช่ประมุขคิซากิที่เราเพิ่งเจอไปหรอกเหรอ?"
10037040-34 = "อืม ก็ใช่ นั่นคงเป็นปัญหาเรื่องคำเรียกน่ะ"
10037040-35 = "คำเรียกตำแหน่งอย่างเป็นทางการของฉันคือ 'ประธานกลุ่มการค้า' แต่ว่าทุกคนก็เรียกย่อๆ กันว่า#nประธานน่ะ"
10037040-36 = "ส่วนคำเรียกตำแหน่งของคิซากิ... ไม่สิ ของท่านประมุขที่มีบทบาทเป็นประธานของมังกรดำ หรือสภานักเรียนของซานไห่จิงก็คือ 'ประมุข'"
10037040-37 = "ไม่มีใครสับสนสองตำแหน่งนี้หรอก อย่างน้อยก็ภายในซานไห่จิงน่ะ"
10037040-39 = "อย่างนั้นเหรอ... เข้าใจแล้ว เดี๋ยวนะ แต่ว่า...?"
10037040-40 = "(เราเรียกเชริโน่ว่าท่านเลขาธิการ แล้วก็ท่านประธานด้วยนี่นา? ถ้าอย่างนั้น...)"
10037040-41 = "(อย่าบอกนะว่าที่ผ่านมาท่านประธานเชริโน่เคยทำงานในตำแหน่งประธานนักเรียน หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายทำความสะอาด หัวหน้าฝ่ายกีฬา และหัวหน้าฝ่ายอาหารจริงๆ...?!)"
10037040-42 = "จานต่อไปคือปีกเป็ด... แต่ว่าจานนี้ทำเอาฉันกังวลอยู่หน่อยน่ะ"
10037040-43 = "การปรุงเป็ดมีวิธีเป็นสิบๆ วิธี แต่ถ้าจะให้เลือกวิธีที่เป็นที่รู้จักมากที่สุดแค่สองวิธีละก็..."
10037040-44 = "คงเป็นการย่างจนเนื้อเป็นสีน้ำตาล และก็แช่เกลือแล้วเอาไปนึ่งกับเครื่องเทศน่ะ"
10037040-45 = "ระหว่างที่ฉันกำลังคิดไม่ตกว่าควรต้อนรับแขกคนสำคัญด้วยเป็ดแบบไหน"
10037040-49 = "ก็เลยคิดว่า! ถ้าตัดสินใจไม่ได้ ก็เอามาทั้งสองอย่างไปเลย! ทานกันเยอะๆ เลยนะ!"
10037040-50 = "ฮืม การต้อนรับอย่างจริงใจคือการต้อนรับที่กินจนพุงกางแล้วก็ยังเหลืออาหารอยู่ นี่สินะประเพณีของ#nซานไห่จิง!"
10037040-51 = "[s] \"ครูว่าก็น่าจะเป็นอย่างนั้นนะ!\""
10037040-52 = "แหะๆๆ คุณครูก็ทานให้เยอะๆ นะคะ ถ้าแขกที่มาย่านการค้าเทพเต่าดำต้องกลับไปแบบอาหารไม่เต็ม#nกระเพาะ ก็จะนับเป็นความอับอายของย่านการค้าของเรา!"
10037040-58 = "สหาย~ ช่วยเราด้วย~"
10037040-59 = "[s] \"เชริโน่\""
10037040-63 = "หะ... หืม?"
10037040-64 = "[s] \"นี่คือเวลาในการแสดงเกียรติศักดิ์ศรีของเลขาธิการนะ!\""
10037040-65 = "...!"
10037040-66 = "งั้นเหรอ... งั้นก็คงช่วยไม่ได้น่ะนะ"
10037040-70 = "ดีละ มีเท่าไรก็จัดมาเลย ย่านการค้าเทพเต่าดำ! แค่นี้น่ะ ไม่ทำให้ความมุ่งมั่นของเรดวินเทอร์#nถดถอยลงหรอก!"
10037040-71 = "ช่างมีจิตใจสูงส่งดีจังเลยนะ ท่านเลขาธิการแห่งเรดวินเทอร์!"
10037040-73 = "(สุดท้ายเชริโน่ก็ทำท่าจะร้องไห้จนต้องหายาช่วยย่อยมาให้...)"
10037040-86 = "..."
10037040-87 = "คนพวกนั้นคือนักเรียนจากเรดวินเทอร์ที่มางานแลกเปลี่ยนครั้งนี้เหรอ...?"
10037040-88 = "ดูแล้วน่าจะใช่นะ"
10037040-89 = "อืม..."
10037040-91 = "ยินดีต้อนรับสู่ฝ่ายสนับสนุนด้านวินัยสวนต้นบ๊วยแห่งซานไห่จิงค่ะ ท่านเลขาธิการเชริโน่ ท่านหัวหน้าเลขานุการโทโมเอะ ท่านหัวหน้าคณะฯ มารินะ"
10037040-92 = "สวนต้นบ๊วยของเราคือศูนย์ฝึกวินัยที่สร้างขึ้นเพื่อดูแลและอบรมวินัยของเด็กๆ ของซานไห่จิงค่ะ"
10037040-93 = "นักเรียนที่ได้คะแนนยอดเยี่ยมจากโรงเรียนซานไห่จิงจะได้รับการคัดเลือกเป็นผู้ฝึกสอน และจะได้มาฝึกสอนนักเรียนเด็กๆ ที่สวนต้นบ๊วยแห่งนี้ค่ะ"
10037040-94 = "ถ้าอย่างนั้นเด็กๆ ก็จะเรียนที่ซานไห่จิงจนกว่าจะจบมัธยมปลายเลยเหรอ?"
10037040-95 = "ใช่แล้วค่ะ แต่ก็มีบางคนที่ย้ายโรงเรียนไปกลางคันด้วยค่ะ"
10037040-99 = "อย่างนั้นเหรอ... ตะ... แต่ที่สำคัญกว่านั้นคือ! อย่าดึงกันสิ เด็กพวกนี้นี่!"
10037040-104 = "ว้าว~! ชุดสีขาวแดง! น่าตื่นเต้นจัง!"
10037040-105 = "แล้วนี่มันอะไรกัน? หนวดเหรอ? อ๊ะ... หนวดร่วงลงไปแล้ว? ขอฉันเอามาติดบ้างสิ!"
10037040-110 = "มะ... ไม่ได้นะ! หนวดอันนั้นมัน... โทโมเอะ!"
10037040-111 = "เอาละๆ ใจเย็นๆ ก่อนนะคะ เชริโน่จัง... ไม่สิ ท่านเลขาธิการเชริโน่ ฉันจะไปเอาหนวดสำรอง..."
10037040-112 = "ไม่ ต้องไม่ใช่อย่างนี้...! ต้องมีแผนรับมือที่มีมาตรฐานกว่านี้! ถ้าเด็กๆ พวกนี้แย่งหนวดสำรองไปอีก ก็จบที่อีหรอบเดิมน่ะสิ!"
10037040-117 = "นี่ ทุกคน! นี่คือแขกคนสำคัญจากแดนไกลเชียวนะ! มีมารยาทกันหน่อยสิ!"
10037040-118 = "ไม่เอาน่า โคโคน่าจัง พูดอะไรน่าเบื่ออีกแล้ว..."
10037040-122 = "อ๊ะ! เอาหนวดคืนมานะ โคโคน่าจัง! ฉันก็อยากลองติดหนวดดูบ้างนะ!"
10037040-123 = "ไม่ใช่โคโคน่าจังนะ ผู้ฝึกสอนโคโคน่าต่างหากล่ะ!"
10037040-128 = "ทุกคนคะ"
10037040-132 = "เดี๋ยวฉันดุนะคะ"
10037040-136 = "ฮะ... เฮือก?! ขะ... ขอโทษค่ะ ผู้ฝึกสอนชุน!"
10037040-137 = "หนูผิดไปแล้วค่ะ... จากนี้หนูจะเชื่อฟังแล้วค่ะ..."
10037040-138 = "เด็กๆ นี่นะ จริงๆ เลยเชียว... นี่ค่ะ ท่านเลขาธิการเชริโน่"
10037040-139 = "อืม... ผู้ฝึกสอนชุนจัดการเด็กๆ ที่นี่ได้เป็นอย่างดีเลยนะคะ ได้เห็นทีไรก็ประทับใจตลอดเลยค่ะ"
10037040-144 = "ฮึ่ม ฮึ่ม... จะว่าไป เมื่อกี้บอกว่าชื่อผู้ฝึกสอนโคโคน่าใช่มั้ย?"
10037040-145 = "ค่ะ ใช่แล้วค่ะ! เรียกฉันได้อย่างถูกต้องเลยละค่ะ!"
10037040-146 = "ที่สวนต้นบ๊วย... ให้เด็กมาดูแลเด็กๆ อีกทีเหรอ...?"
10037040-150 = "เด็กงั้นเหรอคะ! ฉันเป็นผู้ฝึกสอนที่สง่าผ่าเผยของสวนต้นบ๊วย แล้วก็เป็นน้องสาวของพี่ชุน แล้วก็...!"
10037040-152 = "ฮุฮุฮุ โคโคน่าจังของเรานี่ละก็ ถ้าจะให้พูดตามตรงละก็ หากดูจากอายุของเธอแล้ว เธอต้องเข้าเรียนใน#nโรงเรียนประถมน่ะค่ะ..."
10037040-153 = "แต่ความสามารถของเธอเป็นที่ยอมรับจนได้ข้ามชั้นมาเรียนในโรงเรียนมัธยม แถมยังได้มาเป็นผู้ฝึกสอนด้วยค่ะ เรียกว่าเป็นน้องสาวที่ฉันภูมิใจเลยละค่ะ"
10037040-155 = "พะ... พี่ชุน...? ฉันเขินนะ เลิกอวยได้แล้ว..."
10037040-156 = "[s] \"ใช่! ผู้ฝึกสอนโคโคน่าจังคือความภูมิใจของสวนต้นบ๊วยนะ!\""
10037040-157 = "คุณครูก็เอากับเขาด้วยเหรอคะเนี่ย! แล้วทำไมถึงเรียกว่าผู้ฝึกสอนโคโคน่าจังล่ะคะ!"
10037040-164 = "หืม...? นักเรียนเรดวินเทอร์กำลังออกมาจากสวนต้นบ๊วยน่ะ"
10037040-165 = "ทำแบบนั้นก็ได้เหรอ? สวนต้นบ๊วยเป็นสถานที่สำคัญของซานไห่จิงของเราเลยนะ..."
10037040-166 = "นั่นน่ะสิ ต่อให้เป็นมังกรดำ ก็เข้าไปแทรกแซงงานของสวนต้นบ๊วยตามอำเภอใจไม่ได้นี่นา?"
10037040-167 = "ท่านประมุขคิดอะไรอยู่กันแน่นะ...?"
10037040-170 = "โอ้ ที่นี่มัน! ที่ที่จัดการแสดงงิ้วตอนนั้นนี่นา! "
10037040-171 = "สวนพยัคฆ์ขาวเป็นสวนสาธารณะที่ขึ้นชื่อของซานไห่จิงเลยละ..."
10037040-172 = "จะบอกว่างานใหญ่ๆ หรือการแสดงส่วนมากจะมาจัดที่สวนแห่งนี้ก็ว่าได้ ฮุฮุ"
10037040-174 = "ก็ดูเป็นสวนที่กว้างขวางอยู่หรอกนะ..."
10037040-179 = "แต่จัตุรัสการปฏิวัติหนวดแดงที่เรดวินเทอร์ของเรากว้างกว่านี้เยอะเลย!"
10037040-180 = "ว่าไงนะ...?"
10037040-181 = "คิดจะลดคุณค่าสวนพยัคฆ์ขาวที่เต็มไปด้วยประเพณีของซานไห่จิงด้วยการเปรียบเทียบขนาด และความใหญ่โตงั้นเหรอ!"
10037040-182 = "ไม่หรอก ไม่ใช่อย่างนั้น พวกฉันรู้อย่างชัดเจนจากงานแลกเปลี่ยนครั้งนี้แล้วว่าซานไห่จิงเป็นโรงเรียน#nที่ภูมิใจในธรรมเนียมและประเพณีของตัวเองมาก"
10037040-183 = "แต่ฉันก็แค่! ชื่นชมในจิตวิญญาณแห่งการต่อสู้อย่างไม่ท้อถอยของเรดวินเทอร์ที่ต้องเอาชนะทุ่งหิมะ#nที่หนาวจัดและกว้างขวางอย่างไม่มีที่สิ้นสุดก็เท่านั้น!"
10037040-184 = "สถาบันสหภาพเรดวินเทอร์หนาวและกว้างขนาดนั้นเลยเหรอ...?"
10037040-185 = "ใช่ ขนาดนั้นเลยละ... กว้างจนแค่เลี้ยวผิดชีวิตก็เปลี่ยนเลยละ และบางครั้งก็ได้เจอกับหมีด้วย..."
10037040-186 = "หมีเหรอ? แต่พวกเราก็มีแพนด้านะ..."
10037040-187 = "แต่แพนด้าเค้าน่ารักไง!"
10037040-188 = "ไม่สิ พอมาคิดๆ ดูแล้ว หมีที่เรดวินเทอร์ก็น่ารักเหมือนกัน... เมดเวเดฟก็ด้วย... อีกอย่าง แพนด้าเองก็#nถือว่าเป็นหมีเหมือนกันนี่เนอะ...?"
10037040-189 = "ฮุฮุฮุ! ตั้งใจทำให้ฉันสับสนใช่มั้ย หัวหน้าคณะกรรมการมินะ!"
10037040-190 = "ไม่นะ ฉันยังไม่ได้ว่าอะไรเลย...?"
10037040-191 = "[s3] \"มารินะดูจะยอมรับซานไห่จิงขึ้นมาแล้วละ\"\n[s4] \"ครูว่ามารินะดูจะเริ่มชอบซานไห่จิงขึ้นมาแล้วนะ\""
10037040-194 = "คะ... ครู?!"
10037040-195 = "อย่างนั้นเองเหรอ... ถ้างั้นก็ขอบใจนะ หัวหน้าคณะฯ มารินะ"
10037040-196 = "อะ... อืม...! กะ... ก็ประมาณนั้นน่ะ ซานไห่จิงก็ยอดเยี่ยมไม่แพ้กันเลยนะ! ฮ่าฮ่าฮ่า!"
10037040-197 = "ฮุฮุ ยอมรับแล้วสินะ ฮุฮุฮุ..."
10037040-203 = "สองคนนั้นดูเข้ากันได้ดีแปลกๆ แฮะ... ว่ามั้ยโทโมเอะ?"
10037040-204 = "นั่นสินะคะ เชริโน่จัง... ท่านเลขาธิการเชริโน่ สองคนนั้นไปสนิทกันตั้งแต่ตอนไหนคะเนี่ย?"
10037040-205 = "[s] \"ไม่หรอก นั่นไม่ได้เรียกว่าเข้ากันได้ดีหรอก\""
10037040-206 = "แล้วเรียกว่าอะไรเหรอ?"
10037040-207 = "[s] \"เรียกว่า... ศีลเสมอกันในหลายๆ ด้านน่ะ...\""
10037040-208 = "แปลว่านิสัยหรือพฤติกรรมเข้ากันใช่มั้ย? งั้นก็เป็นเรื่องดีนี่?"
10037040-209 = "ถูกแล้วงั้นเหรอ? แล้วทำไมสีหน้าของสหายดูซับซ้อนแปลกๆ ล่ะ?"
10037040-211 = "ฉันว่าฉันพอรู้ค่ะ... เป็นอย่างที่ฉันคิดใช่มั้ยคะคุณครู?"
10037040-212 = "ไม่ว่าจะเป็นอย่างไรก็ตาม แต่ถ้าความสัมพันธ์ดีขึ้น ก็ถือว่าเป็นเรื่องดีๆ เพราะนี่ก็เป็นงานแลกเปลี่ยน#nด้วยใช่มั้ยล่ะคะ? ฮุฮุฮุ ใช่ค่ะ ต้องใช่แน่ๆ"
10037040-218 = "ดูโน่นสิ พวกผู้มาเยือนจากเรดวินเทอร์อีกแล้ว"
10037040-219 = "อยู่กับหัวหน้าคณะกรรมการมินะด้วย... เดี๋ยวก่อน ถ้าอย่างนั้นใครจะปกป้องท่านประมุขล่ะ?"
10037040-220 = "ท่านประมุขก็ยังอยู่ที่มังกรดำ คงไม่มีปัญหาเรื่องการคุ้มกันหรอก"
10037040-221 = "นั่นไม่ใช่สิ่งที่ฉันจะสื่อสักหน่อย ถ้าท่านประมุขถึงกับส่งหัวหน้าคณะกรรมการมินะไป ก็หมายความว่า#nคนพวกนี้ได้รับการดูแลที่ยิ่งใหญ่มากเลยไม่ใช่เหรอ"
10037040-222 = "ก็นะ ก็คนพวกนั้นเป็นแขกที่ซานไห่จิงเชิญมานี่...?"
10037040-223 = "ไหนจะจัดการแสดงงิ้วคณะใหญ่ให้ชมที่สวนพยัคฆ์ขาวอีก..."
10037040-227 = "คิดว่าทำแบบนี้มันถูกแล้วเหรอ?"
10037040-228 = "ผู้มาเยือนจากเรดวินเทอร์พวกนั้นจะรู้บ้างมั้ยนะว่าตัวเองได้รับการต้อนรับอย่างยิ่งใหญ่มากแค่ไหน..."
10037040-229 = "ก่อนหน้านี้ก็เป็นคุณครูของชาเล่ต์ และคราวนี้ก็เชิญคนนอกจากโรงเรียนอื่นมาอีก..."
10037040-230 = "ให้เป็นแบบนี้ต่อไปได้เหรอ?"
10037040-231 = "เรื่องนั้นให้เป็นหน้าที่ของท่านประมุขเถอะ..."
10037040-232 = "อย่าว่าแต่ฉันเลย คนตัวเล็กๆ อย่างเธอก็ไม่มีสิทธิ์ออกเสียงหรอก"
10037040-234 = "ก็กังวลใจด้วยกันหมดละนะ..."
10037040-238 = "อืม..."

[translation]
10005060-1 = "第6話;獵兔行動"
10005060-4 = "呀啊啊──！！為什麼為什麼為什麼────！？"
10005060-5 = "不是才剛來而已嗎！？這麼快就變成「S」級！？騙人！！！"
10005060-6 = "你們知道我花了多少錢嗎！為什麼我就抽不到呢！？#n這也太不公平了吧！？"
10005060-7 = "[s1]「本來學生做這種事就不太好……」\n[s2]「運氣的世界是很殘酷的。」"
10005060-8 = "真是的～～～～～～！！"
10005060-9 = "真是的～～～～～～！！"
10005060-10 = "給我等等！！"
10005060-11 = "噫！？不要，絕對不等！！！"
10005060-12 = "很好很好，這樣不是快樂多了嗎！#n快哭吧！叫吧！喊吧！！"
10005060-13 = "不管是你哭還是那個會計哭！"
10005060-15 = "笑到最後的只會是我啊！！哈哈哈哈哈！！"
10005060-16 = "快跑吧！掙扎吧！！"
10005060-17 = "多消耗一點我的體力，之後才能少吃點苦啊！！"
10005060-19 = "討厭啦──！！！！！"
10005060-23 = "哈哈哈哈哈！真是愉快的鬼抓人啊！！"
10005060-29 = "該怎麼辦呢……？"
10005060-30 = "[s3]「之後別做危險的事情的話，也沒什麼不好吧……」\n[s4]「寧瑠也很努力了，就當作是在紓解壓力吧。」"
10005060-31 = "唔嗯……"
10005060-32 = "唔嗯……"
10005060-33 = "那麼之後得努力阻止隊長才行呢……？"

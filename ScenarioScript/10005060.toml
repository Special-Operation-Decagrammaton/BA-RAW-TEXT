[translation]
10005060-1 = "ตอนที่ 6;ตามล่ากระต่าย"
10005060-4 = "อ๊ายยยยย~~!! อะไรกันเนี่ย นี่มันเกิดอะไรขึ้นนนน~!!"
10005060-5 = "สุ่มได้ระดับ S ใน 20 รอบเองงั้นเหรอ? VIP งั้นเหรอ? ทำไมถึงเป็นแบบนี้ได้ล่ะ...! ไม่ยุติธรรมเลย!"
10005060-6 = "ฉันทุ่มเงินไปตั้งเยอะเลยนะคะ! ทำไมถึงสุ่มไม่ได้บ้างล่ะ!? แบบนี้ไม่แฟร์เลยสักนิด!"
10005060-7 = "[s1] \"ทีนี้รู้รึยังล่ะ\"\n[s2] \"โลกของล็อตโต้น่ะมันโหดร้ายนะสาวน้อย\""
10005060-8 = "ระ... เรื่องนั้นมัน...!"
10005060-9 = "ระ... เรื่องนั้นมัน...!"
10005060-10 = "นี่ ยัยเปี๊ยก!! หยุดเดี๋ยวนี้นะ!"
10005060-11 = "...! อ๊ายยยยยยย~!"
10005060-12 = "อา~ เยี่ยมสุดๆ ไปเลย เพอร์เฟกต์!"
10005060-13 = "วันนี้ทั้งเธอและยัยนักบัญชีของเซมิน่าจะต้องร้องไห้ขี้มูกโป่งแน่!"
10005060-15 = "และสุดท้ายจะมีแค่ฉันที่ได้หัวเราะสะใจคนเดียว!! วะฮ่ะฮ่ะฮ่า!!"
10005060-16 = "ร้องเลยสิ! ร้องไห้แล้วรีบหนีไปไกลๆ เลยสิ!!"
10005060-17 = "ถ้าปล่อยให้ฉันจับเธอได้เร็วเกินไป ฉันก็จะลงโทษเธอเพิ่มอีก!!"
10005060-19 = "อ๊ายยยยยยยยย~~!!"
10005060-23 = "วะฮะฮะฮะฮ่าฮ่าฮ่าฮ่า! ใช่แล้ว แบบนั้นละ!! แบบนั้นเลย ยัยกระต่าย!!"
10005060-29 = "บะ... แบบนี้จะไม่เป็นไรเหรอคะคุณครู...?"
10005060-30 = "[s3] \"ครูไม่ได้เป็นผู้สังเกตการณ์นะ ไม่เป็นไรหรอก\"\n[s4] \"ที่ผ่านมาเนรุก็อดทนมาได้ดี คงไม่เป็นไรหรอก\""
10005060-31 = "เอ่อ..."
10005060-32 = "เอ่อ..."
10005060-33 = "คิดแบบนั้นจริงๆ เหรอคะ...?"

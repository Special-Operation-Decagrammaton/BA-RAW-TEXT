[translation]
1901-1 = "การประชุมกรรมการวินัยประจำสัปดาห์"
1901-5 = "จะเริ่มการประชุมกรรมการวินัยประจำสัปดาห์แล้วนะคะ"
1901-6 = "อ่า... "
1901-7 = "อาโกะ.... วันนี้ฉันมีประชุมกับพวก <แพนเดโมเนียม โซไซตี้> เพราะงั้นรีบๆ ประชุมให้จบเถอะ"
1901-8 = "ค่ะ เข้าใจแล้วค่ะ การประชุมต่อไปจะเริ่มในอีก 15 นาที ฉันจะรีบสรุปให้ทันค่ะ"
1901-9 = "ถ้างั้นขอรายงานเรื่องเหตุระเบิดไม่ทราบสาเหตุที่เกิดขึ้นที่พื้นที่ 97-44 ก่อนนะคะ"
1901-10 = "จากการตรวจสอบพบว่าเหตุระเบิดในพื้นที่ 97-44 เกิดจากการระเบิดของหัวรบระเบิดแรงสูงค่ะ"
1901-11 = "ยืนยันได้ว่าเป็นฝีมือของทางชมรมพัฒนาออนเซ็น... ผู้ต้องสงสัยกำลังหลบหนีอยู่และทาง#nคณะกรรมการวินัยได้ส่งกองกำลังทั้ง 3 หน่วยไปติดตามแล้วค่ะ"
1901-12 = "แรงจูงใจของพวกนั้นล่ะ?"
1901-13 = "ก็เรื่องพัฒนาออนเซ็นเหมือนเดิมค่ะ"
1901-14 = "เดี๋ยวนะ... บริเวณนั้นคือแถวกลางทางด่วนเลยไม่ใช่เหรอ? คิดจะสร้างออนเซ็นเลยระเบิด#nที่ตรงนั้นเนี่ยนะ?"
1901-15 = "ใช่แล้วค่ะ สำหรับพวกนั้นแล้ว ถ้าเกี่ยวกับการพัฒนาออนเซ็นก็ไม่สนใจอย่างอื่นเลย..."
1901-17 = "ฉันขอถามหน่อยเถอะค่ะ ทำไมถึงทำเรื่องแบบนี้คะ..."
1901-18 = "ขอแค่มีสายน้ำพุร้อนจะเป็นที่ไหนพวกเราก็ไม่สน! พวกเราจะขุด แล้วก็ขุดๆ ไปจนกว่าจะเจอ!"
1901-19 = "ฮ่าฮ่าฮ่า! จงมอดไหม้ไปซะ! สิ่งสกปรกจะต้องถูกแผดเผาไป!"
1901-20 = "ใช้บูลโดลเซอร์ดันไปเลย! รื้อ... รื้อให้หมด! ทุกๆ อย่างจะเริ่มต้นด้วยการพัฒนา!! "
1901-21 = "(ไม่เข้าใจเลยจริงๆ ว่าคุยอะไรกัน... ทำยังไงดีนะ...?)"
1901-26 = "รายงานของคุณชินัตสึเขียนไว้แบบนั้นค่ะ ฉันเองก็ไม่ค่อยเข้าใจสักเท่าไร..."
1901-27 = "จากการคาดเดา... ฉันคิดว่าพวกเขาพยายามจะสร้างพื้นที่พักผ่อนริมทางด่วนค่ะ"
1901-28 = "เฮ้อ..."
1901-29 = "คาดการณ์ว่าทางด่วนเส้นนั้นจะมีการจราจรหนาแน่นต่อไปอีกประมาณ 3 เดือน ดังนั้นจะทำให้#nการขนส่งสินค้าประมาณ 54 เปอร์เซ็นต์....."
1901-30 = "พอแล้ว เรื่องต่อจากนั้นไว้ให้พวกแพนเดโมเนียม โซไซตี้จัดการแล้วกัน เรื่องต่อไปล่ะ?"
1901-31 = "ค่ะ ต่อไปจะเป็นเรื่องเหตุการณ์ระเบิดโรงอาหารที่ 3 ของโรงเรียน..."
1901-32 = "ระเบิดโรงอาหาร... พวกชมรมชิมอาหารงั้นเหรอ?"
1901-33 = "ใช่แล้วค่ะ ท่านประธาน"
1901-34 = "แรงจูงใจก่อเหตุล่ะ?"
1901-35 = "สาเหตุของเหตุการณ์ครั้งนี้... เป็นเพราะไม่มีมะนาวเสิร์ฟมาในเมนูคาราอะเกะค่ะ"
1901-36 = "มะนาว... "
1901-37 = "พวกเขาจับตัวคุณฟูกะ หัวหน้าชมรมโภชนาการเป็นตัวประกัน แล้วก็มาเจรจาต่อรองกับ#nสมาชิกคณะกรรมการวินัยที่เข้าไประงับเหตุค่ะ..."
1901-39 = "เอาละ งั้นฉันขอถามหน่อยค่ะ คณะกรรมการวินัยทุกท่าน เรื่องนี้เป็นปัญหาที่สำคัญมาก"
1901-40 = "คาราอะเกะควรเสิร์ฟพร้อมมะนาว หรือว่าไม่ควรกันแน่คะ!!"
1901-41 = "ทุกคนคิดว่าอย่างไรคะ?"
1901-42 = "หะ... หืม?! ถ้าต้องเลือก... ฉันคิดว่ามันก็ควรมีนะ"
1901-43 = "อะไรกัน? ทำแบบนั้นแป้งเทมปุระก็นิ่มหมดน่ะสิ! จะใส่ของแบบนั้นลงไปทำไมกัน?!"
1901-44 = "ว่ายังไงนะ?! ต้องมีกลิ่นหอมสดชื่นของมะนาวสิ ถึงจะกลบความเลี่ยนน้ำมันของเทมปุระได้น่ะ!!"
1901-45 = "ฮุฮุ ดีจังเลยนะคะ นี่แหละค่ะการค้นหาอาหารเลิศรส! เป็นเป้าหมายของชมรมชิมอาหารอย่าง#nพวกเราค่ะ!"
1901-46 = "แล้วสิ่งที่เราควรทำให้ถูกต้องคืออะไรกันล่ะคะ? ความจริงควรเป็นอย่างไรกันแน่...#nเอาละค่ะ มาช่วยกันตอบคำถามนั้นกันเถอะค่ะทุกๆ คน!!"
1901-47 = "(โวยวาย) ถ้างั้นก็ควรใส่มะนาวสิ..."
1901-48 = "(โวยวาย) ไม่นะ ทำแบบนั้นแป้งเทมปุระมันก็นิ่มหมด..."
1901-49 = "(โวยวาย) ถ้างั้นใส่เกลือดีมั้ย?"
1901-50 = "(โวยวาย) ทำไมจู่ๆ ถึงพูดแบบนั้นล่ะ! ว่าแต่ว่าฉันก็ชอบแบบราดซอสนะ..."
1901-51 = "ฮุฮุฮุ..."
1901-55 = "(ไม่ว่าจะเป็นแบบไหนก็ไม่สำคัญหรอก รีบๆ ช่วยฉันออกไปจากตรงนี้หน่อยเถอะ...)"
1901-60 = "หลังจากนั้นการเจรจาก็ค่อยๆ ดุเดือดขึ้นจนเกิดต่อสู้กัน และสมาชิกคณะกรรมการวินัยหลายคน#nรวมถึงคุณอิโอริเองก็ถูกนำตัวส่งโรงพยาบาลฉุกเฉิน และพวกชมรมชิมอาหารก็หนีไป..."
1901-61 = "เฮ้อ..."
1901-62 = "บอกให้ทางหัวหน้าชมรมโภชนาการตรวจสอบความเสียหายแล้วก็ส่งรายงานมาด้วย "
1901-63 = "ถ้าโรงอาหารนี้พังอีก หลังจากนี้พวกเราอาจจะได้กินแค่ข้าวปั้นกันแล้วก็ได้... "
1901-64 = "เข้าใจแล้วค่ะ ท่านประธาน"
1901-65 = "เรื่องต่อไปก็คือมีคนปลอมแปลงจดใบลาเรียนแบบผิดกฎหมายและนำไปขายในราคาฉบับละ#n2,000 เยนและถูกจับได้..."
1901-66 = "พวกหน่วยรับจ้างสารพัดเหรอ?"
1901-67 = "ค่ะ ใช่แล้วค่ะ หน่วยรับจ้างสารพัด 68... พวกเธอแอบลอบเข้าไปที่สำนักงานของโรงเรียน#nและทำตราประทับหนังสือลาเรียนปลอมขึ้นมา..."
1901-68 = "แถมยังโพสต์ข้อความอย่างไม่เกรงกลัวลงในบอร์ดของโรงเรียนว่า#n<จำหน่ายใบลาเรียน สำหรับคนที่อยากลาได้ทุกเวลา> อีกด้วยค่ะ"
1901-69 = "ใบลาเรียนงั้นรึ... ในโรงเรียนเรามีคนที่ต้องขออนุญาตก่อนที่จะลาด้วยเหรอ..."
1901-71 = "เอ๊ะ ทำไมถึงยังขายไม่ได้เลยแม้แต่ใบเดียวล่ะ!"
1901-72 = "ฮ่าฮ่าฮ่า! แย่แล้วละ อารุจัง~!"
1901-73 = "(ลุกลี้ลุกลน)"
1901-77 = "เฮ้อ..."
1901-82 = "ค่ะ เพราะงั้นเลยขายไม่ได้สักชิ้นเลยค่ะ แถมโดนข้อหาบุกรุกสถานที่กับปลอมแปลงเอกสาร#nทางการด้วย..."
1901-83 = "อ่า..."
1901-84 = "ต่อไป..."
1901-85 = "เดี๋ยวก่อนนะ เหลืออีกกี่ข้อน่ะ?"
1901-86 = "ยังเหลืออีก 18 ข้อค่ะ ท่านประธาน"
1901-87 = "...เกิดเรื่องทั้งหมดนั้นในอาทิตย์เดียวเหรอ?"
1901-88 = "เปล่าค่ะ สองวันค่ะ เนื่องจากฝ่ายข่าวกรองอยู่ในช่วงพักร้อน รายงานของอีก 5 วันที่เหลือ#nจะนำมารายงานในตอนประชุมสัปดาห์หน้าค่ะ"
1901-89 = "......"
1901-90 = "......"
1901-91 = "ร่าเริงเข้าไว้นะคะ ท่านประธาน..."
1901-92 = "เฮ้อ..."
1901-93 = "การประชุมกรรมการวินัยประจำสัปดาห์"

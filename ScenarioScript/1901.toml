1901-7 = "4;히나;02;……아코. 오늘 <만마전> 녀석들과 미팅이 있으니까, 빠르게 진행해줘.\n#4;em;…"
1901-8 = "1;아코;01;네. 알겠습니다. 다음 회의는 15분 뒤에 있으니 그 전까진 종료될 거 같아요.\n#1;greeting"

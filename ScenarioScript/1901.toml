1901-10 = "1;아코;01;확인 결과 97-44 구역의 폭발은 발파용 이중목적 고폭탄이 원인인 것으로 확인되었습니다."
1901-11 = "1;아코;02;이것은 온천개발부의 소행으로……. 현재 범인들은 도주 중이며 선도부 3개 소대가 추격 중입니다.\n#1;em;…"
1901-12 = "4;히나;00;이유는?"
1901-13 = "1;아코;04;……온천개발입니다. 늘 그렇듯이."
1901-14 = "4;히나;06;……잠깐. 97-44 구역이라면 고속도로 한가운데아냐? 거기다 온천을 개발하겠다고 고폭탄을 터트렸다고?\n#4;em;[반응]"
1901-15 = "1;아코;01;네. 맞습니다. 온천이라는 게 이쪽 사정을 봐주면서 있어주는 건 아니며…… \n#1;em;…"

[translation]
1901-1 = "風紀委員會定期週會"
1901-5 = "那麼，本週例會正式開始。 "
1901-6 = "……唉。"
1901-7 = "……亞子。我今天要和「萬魔殿」那群傢伙開會，快點進行吧。"
1901-8 = "是，我明白了。那場會議將在15分鐘後開始，我們趕在那之前結束吧。"
1901-9 = "首先是97-44區域發生的不明原因爆炸相關報告。"
1901-10 = "根據確認結果，這起爆炸是由多用途榴彈所造成。"
1901-11 = "犯案組織確認為溫泉開發部，但目前仍在逃，已派出風紀委員會的三個小隊進行追捕。"
1901-12 = "理由呢？"
1901-13 = "……一如往常，是為了溫泉開發。"
1901-14 = "……等等，97-44區域不是高速公路正中央嗎？怎麼會打算在那裡開發溫泉？"
1901-15 = "是，您說的沒錯。但她們完全不在乎這些狀況…… "
1901-17 = "保險起見我想請教一下，你們為何要做這種事……"
1901-18 = "因為溫泉就在那裡呀！除此之外沒有其他理由！"
1901-19 = "沒錯！反正挖就對了！只要可能挖出溫泉就要挖！"
1901-20 = "全部用推土機推走！開發為萬物之母！"
1901-21 = "（……怎麼辦，我完全聽不懂她們在說什麼……）"
1901-26 = "……以上就是千夏同學的報告書主旨。我也無法理解。"
1901-27 = "她們可能是想弄一個……類似高速公路休息站的設施吧？只是多了溫泉。"
1901-28 = "……唉，別提了。"
1901-29 = "至於那條高速公路，預計會堵塞三個月左右，導致大約54%的物流量將會……"
1901-30 = "那部分交給萬魔殿那群人處理就好。繼續吧。"
1901-31 = "是。接下來是第三學校餐廳爆炸事件……"
1901-32 = "餐廳爆炸……美食研究會？"
1901-33 = "是。"
1901-34 = "理由呢？"
1901-35 = "這次的理由似乎是因為……「唐揚雞沒有附檸檬」。"
1901-36 = "檸檬…… "
1901-37 = "美食研究會以供給部部長風華同學當人質，和前去鎮壓的風紀委員發生抗爭。"
1901-39 = "我有件事要請問風紀委員會的各位，這是個非常重要的問題"
1901-40 = "唐揚雞應不應該附檸檬！！！！"
1901-41 = "各位，請發表你們的意見！"
1901-42 = "我，我的話應該會希望附檸檬吧……"
1901-43 = "可是那麼一來，好好的炸物會變得濕濕軟軟的！怎麼可以這樣對待炸物！？"
1901-44 = "你說什麼？！有了清爽的檸檬，才能消去炸物的油膩感啊！！"
1901-45 = "呵呵呵，這就對了。對美食認真展開辯論！這正是我們美食研究會所追求的！"
1901-46 = "什麼才是正確的？什麼才是真理？來，讓我們熱烈討論吧！"
1901-47 = "所以說要是擠上檸檬……"
1901-48 = "不對，麵衣本來就會越來越……"
1901-49 = "那鹽巴呢？"
1901-50 = "不要突然改話題！不過比起鹽我更喜歡沾醬！"
1901-51 = "哼哼哼，太美妙了……！"
1901-55 = "（隨便啦！拜託快救我好不好……）"
1901-60 = "後來辯論演變成肢體衝突，包含伊織同學在內的多名風紀委員都被送進醫院。而美食研究會則趁機逃跑……"
1901-61 = "……唉。"
1901-62 = "明白了。請供給部部長估算損失金額之後提交給我們。"
1901-63 = "要是放置不管，學生餐廳總有一天會只有飯糰可以吃。"
1901-64 = "我明白了。"
1901-65 = "接下來是偽造假單，並以一張2000圓販賣的不法行為……"
1901-66 = "便利屋？"
1901-67 = "是的，是便利屋68。她們似乎闖入教職員辦公室偷偷複製准假章……"
1901-68 = "而且還製作了「假單販賣中，想請多少假都可以」的廣告文宣，並大喇喇貼在學園佈告欄上。"
1901-69 = "假單……這學園不上課的人會特地請假嗎？"
1901-71 = "怎、怎麼連一張都沒賣出去啊！"
1901-72 = "啊哈哈哈哈哈！亞瑠醬你又搞笑了！"
1901-73 = "（坐立難安……）"
1901-77 = "唉……"
1901-82 = "確實不會，所以實際上一張都沒賣出去。因此罪名只有非法入侵和偽造公文。"
1901-83 = "唉……"
1901-84 = "接下來──"
1901-85 = "等等，還剩幾件？"
1901-86 = "還有18件。"
1901-87 = "……一週內發生18件？"
1901-88 = "不，實際上只有兩天份。因為情報科正在放假，後面五天份的報告預計會在下週例會時提交上來。"
1901-89 = "……"
1901-90 = "……"
1901-91 = "請您加油，委員長。"
1901-92 = "唉……"
1901-93 = "風紀委員會定期週會"

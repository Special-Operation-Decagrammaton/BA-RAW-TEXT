[translation]
10023110-1 = "Epilogue;Happy Ending, Available Now!"
10023110-5 = "..."
10023110-6 = "..."
10023110-7 = "Eek!"
10023110-9 = "Wahhh! Neru is angry! I am scared!"
10023110-11 = "Hey, kids..."
10023110-12 = "We did it! We're sorry, Neru!"
10023110-13 = "Huh? What are you sorry about?!"
10023110-14 = "Are you really making us say our crimes one by one? That's too harsh!"
10023110-15 = "You just said you're sorry, and now all of a sudden I'm too harsh? She's got a screw loose, just like the rest of you."
10023110-16 = "Everyone else, too! I'm so sorry! If I didn't accept it from the beginning... If I had just turned down the commission and run away...!"
10023110-17 = "It's all over now... Neru is going to destroy us, and the Game Development Department will be disbanded... We basically impersonated another club, so there's no room for extenuation..."
10023110-18 = "*sniff* We worked so hard to keep our club room... *sniff* We risked our lives to keep Yuzu and Aris together..."
10023110-20 = "Momoi..."
10023110-21 = "D-Do not cry, Momoi... "
10023110-22 = "Look, I am not crying. Because I have learned that even if we are apart, our hearts will still be together!"
10023110-24 = "Hey... I think you guys have some huge misunderstanding going on here..."
10023110-25 = "I didn't even say anyth—"
10023110-26 = "Wait! Is this really how you guys view me?!"
10023110-27 = "Heehee. I wonder how that came about."
10023110-28 = "Don't give me that look! I haven't done anything to deserve that reputation! Not with the kids!"
10023110-30 = "I'm sorry, Neru."
10023110-31 = "I've retrieved the evidence and the Crown, but I lost the suspect. I failed."
10023110-33 = "You didn't fail. We dusted him as soon as we got here."
10023110-34 = "...! I apologize my incompetence caused you to dirty your hands."
10023110-35 = "Come on, lighten up. I already knew everything. Everyone's happy and safe, so who cares what happened in-between?"
10023110-36 = "And..."
10023110-41 = "You, kids."
10023110-46 = "Eek!!"
10023110-47 = "P-Please spare my life...!"
10023110-49 = "Neru, please listen to me."
10023110-50 = "Haaah?"
10023110-51 = "Please don't blame the Game Development Department for everything."
10023110-52 = "Huh."
10023110-53 = "I am just as at fault as they are! "
10023110-54 = "My responsibility was to notify the upperclassmen and wait for the backup, but I did not."
10023110-55 = "Instead I worked with the Game Development Department as a fellow party member and as...as a friend!"
10023110-56 = "So, whatever happens, I will take full responsibility with them."
10023110-58 = "R-Right, Neru! Toki and I are party members. We are friends!"
10023110-59 = "I learned that friends help each other when they are in a hardship, like Toki was! So I... I..."
10023110-61 = "Will you all shut up? I'm not mad at anyone."
10023110-62 = "Ugh, how do I say this?"
10023110-63 = "Well... Good job, all of you."
10023110-68 = "...Wait, what? N-Neru, is that really you? "
10023110-69 = "*gasp* Don't tell me it's a doppelganger that just looks like Neru!"
10023110-71 = "WHAT ARE YOU SAYING?! SHUT IT!"
10023110-72 = "Geez. Why is it so much of a pain to just give someone a damned compliment?"
10023110-74 = "A-Are you really okay...?"
10023110-75 = "Haaah?"
10023110-79 = "You might've...borrowed C&C's name to do it, but you got the bad guy locked up."
10023110-80 = "I've got no complaints. You kids did good."
10023110-81 = "We drop everything off to Valkyrie, and it's case closed."
10023110-86 = "(Wow... Unlike her height measurements, Neru might actually have a big heart...)"
10023110-87 = "(Momoi! Quiet! She might hear that!)"
10023110-93 = "Hmm, and you. Toki. Why..."
10023110-94 = "Yes. I will gladly take any punishment you might have for me."
10023110-95 = "Ah, come ON! I'm not! Mad! At! Anyone! For Kivotos' sake!"
10023110-96 = "First off, why the bunny outfit?"
10023110-97 = "Because it is C&C's infiltration uniform."
10023110-101 = "*sigh*"
10023110-102 = "Gah. This is exactly why wearing those was a dumb idea!"
10023110-104 = "Hm? What do you mean, Pres?"
10023110-105 = "You looked great in it! Ahaha! Toki, you look great too!"
10023110-110 = "Thank...you."
10023110-111 = "Ugh! Whatever."
10023110-112 = "Hm, what I'm trying to say is..."
10023110-114 = "Yes. Probation, self-reflection, confinement. I am ready for anything."
10023110-115 = "My GOD!"
10023110-116 = "I can't put up with this..."
10023110-117 = "[s1] \"Neru is trying to praise you right now too, Toki.\"\n[s2] \"And she wants to apologize for going on missions without you.\""
10023110-121 = "S-Sensei?!?!"
10023110-122 = "Ugh... I forgot about Sensei..."
10023110-124 = "What...did Sensei mean by that?"
10023110-125 = "Ah, come on! Seriously?"
10023110-129 = "...Good job, and sorry."
10023110-130 = "I... Well, I didn't mean to leave you behind."
10023110-131 = "It really just ended up like that. And you did well in difficult circumstances."
10023110-132 = "So, well, great work. That's it."
10023110-134 = "Sorry, Toki. She's not very honest when it comes to this type of conversation."
10023110-135 = "Who told YOU to butt in, huh?!"
10023110-136 = "Yeah, Toki! Great job!"
10023110-142 = "Thank you, everyone."
10023110-144 = "I'm so tired... All that work and for nothing..."
10023110-145 = "Well, at least we got inspiration for our new project."
10023110-146 = "New project...?"
10023110-147 = "I guess... We did get loads of ideas from this..."
10023110-148 = "[s] \"You'll get the bounty from Valkyrie as well.\""
10023110-149 = "What, a bounty? What do you mean, Sensei? What bounty?"
10023110-150 = "[s3] \"Apparently, there was a reward for the stolen items.\"\n[s4] \"The stolen items had a bounty placed on them.\""
10023110-153 = "So that is the quest reward! Obtained reward money! Bum bum bum!"
10023110-156 = "Oh, then, with the bounty money... W-We should get the new FlyStations...!"
10023110-157 = "I'm sure you know there are better ways to spend it, Momoi."
10023110-158 = "Aw! Come on! We're the Game Development Department! So we should spend our money on games!"
10023110-160 = "I have an idea!"
10023110-161 = "The president of the Game Development Department is Yuzu! So let us have her decide!"
10023110-167 = "I...do have an idea..."
10023110-168 = "Really? What is it?!"
10023110-169 = "I...thought we could use it to fund and finally start our new project."
10023110-170 = "Fund...our new project?"
10023110-172 = "...Speaking of which, I think we're almost out of the R&D budget we got from Seminar."
10023110-173 = "Yuzu is always one step ahead!"
10023110-175 = "If we...incorporate the ideas we got from here..."
10023110-176 = "I think we can come up with...something pretty cool."
10023110-178 = "Oh, I have an idea, then!"
10023110-179 = "So listen, listen. So..."
10023110-180 = "Nope. I've told you. If you have an idea, write out a proposal!"
10023110-181 = "Eek! But I'm bad at writing that kinda stuff, Midori."
10023110-182 = "You're supposed to be our scenario writer and planner! You can't be bad at WRITING!"
10023110-184 = "I guess... I should get to coding as soon as we get back..."
10023110-186 = "Oh! Oh! Wait, Mido! I'm being overwhelmed with an influx of ideas!"
10023110-187 = "...Wanna play some games to organize our thoughts a bit first?"
10023110-188 = "No. Slacking. Off. You think you can fool me like that?!"
10023110-190 = "I am always ready! For whatever we are doing!"
10023110-192 = "Everyone's so energetic... Heehee..."
10023110-197 = "The happy group sat around, chatted, and laughed together."
10023110-198 = "It was getting later and later into the night, but no one seemed to mind."
10023110-200 = "Then..."
10023110-204 = "[ns] \"Momoi.\""
10023110-205 = "Huh? Whatcha need, Sensei?"
10023110-206 = "[s] \"That was a crazy series of events...\""
10023110-207 = "Oh yeah, seriously..."
10023110-208 = "I thought we were in big, big trouble at a few points. Ugh..."
10023110-209 = "But hey, you know?"
10023110-210 = "[s] \"Hm?\""
10023110-211 = "Yuzu, Midori, Aris, and even...Toki...!"
10023110-212 = "I had so much fun with everyone!"
10023110-213 = "How about you, Sensei?"
10023110-214 = "[s] \"Yep. It was fun.\""
10023110-215 = "Yeah!"
10023110-220 = "The smiles on Momoi's and the Game Development Department members' faces were still bright after a year of trials and tribulations."
10023110-225 = "\"The only thing you are to me is my student.\""
10023110-233 = "..."
10023110-237 = "\"The only thing you are to me is my student.\""
10023110-238 = "Sensei."
10023110-242 = "\"The only thing you are to me is my student.\""
10023110-243 = "*sigh*"
10023110-244 = "My breath is hot. My chest feels tight. My heart is pounding."
10023110-245 = "But I'm not in pain, but rather exhilarated."
10023110-246 = "Why is that so? Do you know the answer, Sensei?"
10023110-247 = "..."
10023110-248 = "There's nothing that can't be stolen, and beauty is meant to be appreciated by all."
10023110-249 = "We are born without names, and our lives are the drawn-out process of getting to the next choice."
10023110-250 = "Well, then. Until next time."
10023110-256 = "Neither of us will be the same when we at last see each other again..."
10023110-259 = "Alabaster Calling Card: Mansion Masquerade and the Essence of Beauty"

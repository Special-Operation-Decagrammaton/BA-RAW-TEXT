10023110-198 = "(ฟ้าค่อยๆ มืดลงเรื่อยๆ แต่ก็ไม่ได้สำคัญเท่าไรสำหรับเด็กชมรมนี้...)"
10023110-200 = "(เพราะงั้น......)"

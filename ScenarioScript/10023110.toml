[translation]
10023110-1 = "บทส่งท้าย;แฮปปี้เอนดิ้งตลอดไป!"
10023110-5 = "......"
10023110-6 = "......"
10023110-7 = "เฮือก..."
10023110-9 = "แงงง! แง๊! รุ่นพี่เนรุหัวร้อนแล้วค่ะ! อาริสึกลัวจังเลยค่ะ!"
10023110-11 = "นี่พวกเธอ..."
10023110-12 = "รุ่นพี่เนรุ พวกเราขอโทษนะ!"
10023110-13 = "หืม? ขอโทษเรื่อง?"
10023110-14 = "จะให้ฉันพูดทุกอย่างออกมาเองให้ได้เลยเหรอ? เกินไปแล้วนะ รุ่นพี่!"
10023110-15 = "เมื่อกี้เพิ่งพูดว่าขอโทษอยู่เลย แต่ตอนนี้มาหาว่าฉันทำเกินไปซะงั้น... พวกเธอนี่มันน่าตีจริงๆ"
10023110-16 = "ฉันขอโทษทุกคนด้วย! ถ้าฉัน... ถ้าฉันไม่ก่อเรื่องแบบนั้นตั้งแต่แรก ถ้าฉันปฏิเสธหรือหนีไปตั้งแต่แรก ก็คงไม่ต้องทำภารกิจอะไรแบบนี้...!"
10023110-17 = "จากนี้มันจบแล้วละ... ฉันคงโดนรุ่นพี่เนรุสวดชุดใหญ่ ... แล้วชมรมพัฒนาเกมก็คงถูกยุบ... การแอบอ้างว่าเป็นชมรมอื่นเป็นเรื่องที่รับไม่ได้หรอก..."
10023110-18 = "ฮือ... อุตส่าห์ปกป้องชมรมไว้ได้... แล้วก็ทำให้อาริสึกับยูสึได้อยู่ด้วยกันแล้วแท้ๆ..."
10023110-20 = "โมโมอิ..."
10023110-21 = "มะ... ไม่ต้องร้องไห้นะคะโมโมอิ อาริสึน่ะ..."
10023110-22 = "อาริสึไม่เป็นไรค่ะ ถึงเราจะอยู่ห่างกัน แต่หัวใจเราก็ยังผูกพันกันค่ะ อาริสึได้เรียนรู้เรื่องนั้นมาค่ะ...!"
10023110-24 = "นี่... พวกเธอน่าจะเข้าใจอะไรผิดกันอยู่นะ..."
10023110-25 = "ฉันยังไม่ได้ว่าอะไรสักหน่อย..."
10023110-26 = "เดี๋ยวนะ สำหรับพวกเธอแล้ว ฉันมีภาพลักษณ์แบบนั้นเรอะ?!"
10023110-27 = "ฮุฮุ เป็นอย่างนี้สินะคะ"
10023110-28 = "ทำไมเธอถึงทำหน้าเหมือนจะบอกว่ากรรมตามสนองด้วยล่ะ!"
10023110-30 = "รุ่นพี่ทุกคน ฉันขอโทษค่ะ "
10023110-31 = "ถึงจะได้มงกุฎกลับมา แต่ฉันก็จับตัวผู้ต้องสงสัยไว้ไม่ได้ค่ะ"
10023110-33 = "อ๋อ ไม่เป็นไรหรอก พวกฉันจับหมอนั่นไว้ได้แล้วละ..."
10023110-34 = "ขอโทษที่ทำให้พวกรุ่นพี่ต้องเสียเวลาไปด้วยนะคะ"
10023110-35 = "จะไปใส่ใจเรื่องแบบนั้นทำไม แค่จบสวยก็พอแล้วนี่ อีกอย่าง พวกฉันก็เต็มใจมาช่วยด้วย"
10023110-36 = "แล้วก็..."
10023110-41 = "พวกเธอน่ะ"
10023110-46 = "เฮือก?!"
10023110-47 = "วะ... ไว้ชีวิตพวกเราเถอะค่ะ...!"
10023110-49 = "เดี๋ยวก่อนค่ะ รุ่นพี่เนรุ"
10023110-50 = "หืม?"
10023110-51 = "เรื่องครั้งนี้... ฉันไม่อยากให้รุ่นพี่ตำหนิชมรมพัฒนาเกมมากเกินไปค่ะ"
10023110-52 = "โฮ้?"
10023110-53 = "ถ้าชมรมพัฒนาเกมต้องรับผิดชอบอะไรละก็ ฉันก็ต้องรับผิดชอบร่วมด้วยค่ะ "
10023110-54 = "เพราะที่ถูกต้องฉันควรรีบไปแจ้งรุ่นพี่แล้วขอกำลังเสริม แต่ฉันก็ไม่ได้ทำแบบนั้นค่ะ"
10023110-55 = "ฉันกับชมรมพัฒนาเกมตกลงว่าจะเป็นสหายกัน... และก็ทำงานร่วมกันในฐานะเพื่อนค่ะ"
10023110-56 = "เพราะฉะนั้น อย่างน้อยก็ขอให้ฉันได้รับผิดชอบด้วยเถอะค่ะ"
10023110-58 = "ชะ... ใช่ค่ะ รุ่นพี่เนรุ! อาริสึกับโทคิเป็นสหายกันค่ะ เราเป็นเพื่อนกันแล้ว!"
10023110-59 = "อาริสึเรียนรู้มาจากเกมว่าเวลาเพื่อนเจอความยากลำบาก เราต้องช่วยเหลือกันค่ะ เพราะงั้น เพราะงั้นแล้ว..."
10023110-61 = "นี่ๆ เดี๋ยวสิ ฉันไม่ได้จะว่าอะไรสักหน่อย..."
10023110-62 = "ที่ฉันจะบอกก็คือ..."
10023110-63 = "พวกเธอทำได้ดีมาก"
10023110-68 = "หืม...? รุ่นพี่เนรุ กินยาลืมเขย่าขวดเหรอ?"
10023110-69 = "เฮือก?! หรือว่าเธอจับตัวรุ่นพี่เนรุของพวกเราไป เอารุ่นพี่คนเดิมของเราคืนมานะ!!"
10023110-71 = "พูดอะไรของพวกเธอเนี่ย!"
10023110-72 = "จริงๆ เล้ย ทำไมการพยายามชมคนอื่นมันน่ารำคาญแบบนี้นะ..."
10023110-74 = "มะ... ไม่โกรธพวกเราจริงๆ เหรอคะ...?"
10023110-75 = "ยังอีก?"
10023110-79 = "สุดท้ายก็ปิดงานได้ด้วยดีด้วยชื่อของ C&C ไม่ใช่รึไง!"
10023110-80 = "แค่นี้ก็พอแล้วละ เราจับผู้ต้องสงสัยได้แล้ว แล้วก็ได้ของกลางมาแล้วด้วย"
10023110-81 = "ที่เหลือก็แค่เอาของพวกนี้ไปให้วัลคิรี่ก็แค่นั้นแหละ"
10023110-86 = "(ถึงรุ่นพี่เนรุจะตัวไม่สูง แต่ก็มีจิตใจสูงส่งนะเนี่ย...)"
10023110-87 = "(พี่! ระวังปากหน่อยสิ! ถ้าได้ยินขึ้นมาเดี๋ยวก็โดนเข้าหรอก!)"
10023110-93 = "อืม แล้วก็เธอน่ะ โทคิ เธอ..."
10023110-94 = "ค่ะ ฉันยินดีรับการลงโทษทุกอย่างค่ะ"
10023110-95 = "ไม่ใช่ ไม่ใช่อย่างนั้น... โอ๊ย เธอนี่ก็!"
10023110-96 = "ก่อนอื่นเลยนะ ทำไมถึงใส่ชุดบันนี่เกิร์ลเนี่ย?"
10023110-97 = "ก็ชุดบันนี่เกิร์ลเป็นชุดสำหรับภารกิจแฝงตัวของ C&C นี่คะ!"
10023110-101 = "เฮ้อ..."
10023110-102 = "เพราะแบบนี้ไง ตอนนั้นฉันเลยไม่อยากใส่..."
10023110-104 = "หืม? ทำไมล่ะหัวหน้า?"
10023110-105 = "มันเหมาะกับหัวหน้าออก! ฮ่าฮ่าฮ่า! เหมาะกับโทคิจังด้วยนะ!"
10023110-110 = "ขอบคุณ... ค่ะ..."
10023110-111 = "เอาเถอะ!"
10023110-112 = "อืม ที่ฉันอยากพูดก็คือ..."
10023110-114 = "ค่ะ จะให้สำรวมวาจา ควบคุมตนเอง สำนึกผิด หรือกักบริเวณตัวเอง ไม่ว่าจะให้ทำอะไรฉันก็พร้อมค่ะ"
10023110-115 = "ฟังกันก่อนสิเฟ้ย!"
10023110-116 = "เฮ้อ ใครมันจะมาเข้าใจฉันได้บ้างเนี่ย..."
10023110-117 = "[s1] \"เนรุอยากชมโทคิต่างหากล่ะ\"\n[s2] \"แล้วก็อยากขอโทษที่ออกไปทำปฏิบัติการโดยที่ทิ้งโทคิไว้ด้วย\""
10023110-121 = "คะ... ครู?!?!"
10023110-122 = "ซวยแล้ว... ลืมไปเลยว่าครูก็อยู่ที่นี่ด้วย...!"
10023110-124 = "หมายความว่ายังไงเหรอคะ...?"
10023110-125 = "โธ่เอ๊ย จริงๆ เลย! ก็แบบว่า!"
10023110-129 = "... เธอทำได้ดีมาก แล้วก็... ขอโทษนะ"
10023110-130 = "ก็แบบ ฉันไม่ได้ตั้งใจจะปล่อยให้เธออยู่คนเดียวหรอก"
10023110-131 = "แต่สถานการณ์มันพาไปก็เลยเป็นแบบนี้ แต่ยังไงเธอก็ทำผลงานได้ดีจนถึงที่สุด"
10023110-132 = "กะ... ก็... เก่งมาก"
10023110-134 = "ก็นี่แหละค่ะ โทคิจัง หัวหน้าของเราน่ะ พอจะชมใครก็ไม่กล้าพูดออกมาตั้งแต่แรกแบบนี้แหละค่ะ"
10023110-135 = "แล้วเธอจะมาช่วยผสมโรงทำไมเนี่ย!"
10023110-136 = "อย่างที่หัวหน้าบอกแหละ โทคิจัง! เก่งมากเลยนะ!"
10023110-142 = "ขอบคุณค่ะรุ่นพี่"
10023110-144 = "เหนื่อยจัง... ต้องมาเหนื่อยฟรี แถมไม่ได้อะไรกลับมาเลย"
10023110-145 = "ไม่ใช่อย่างนั้นสักหน่อย ถือว่าเราได้ไอเดียสำหรับเกมต่อไปมาแล้วไง"
10023110-146 = "เกมต่อไปงั้นเหรอ...?"
10023110-147 = "อ่า นั่นสินะ ได้ไอเดียมาเพียบเลยละ..."
10023110-148 = "[s] \"แล้วก็ใช้เงินรางวัลที่ได้จากวัลคิรี่ได้เต็มที่ด้วยนะ\""
10023110-149 = "เอ๋? เงินรางวัลเหรอ? หมายความว่าไงน่ะ? ไม่เห็นเคยได้ยินเรื่องเงินรางวัลมาก่อนเลยนะคุณครู"
10023110-150 = "[s3] \"ก่อนหน้านี้ครูก็ไม่รู้หรอก แต่ของที่เรายึดคืนมาได้น่ะ\"\n[s4] \"เห็นว่ามีการตั้งเงินรางวัลไว้ด้วย\""
10023110-153 = "รางวัลที่ทำเควสสำเร็จนี่เองค่ะ! ได้เงินเข้ากระเป๋าเพิ่มแล้ว! ปาปัม ปาปัม ป๊าม!"
10023110-156 = "อ้อ! ถ้างั้นเอาเงินรางวัลที่ได้... ไปซื้อเครื่องเล่นเกมรุ่นใหม่ล่าสุด...!"
10023110-157 = "เอาไปใช้กับอย่างอื่นน่าจะมีประโยชน์กว่านะพี่"
10023110-158 = "ทำไมล่ะ! เราคือชมรมพัฒนาเกมนะ! ถ้าชมรมพัฒนาเกมไม่ลงทุนกับเกม แล้วจะไปลงทุนกับอะไร!"
10023110-160 = "อาริสึมีความเห็นค่ะ!"
10023110-161 = "หัวหน้าชมรมพัฒนาเกมคือยูสึค่ะ! เพราะงั้นให้ยูสึตัดสินใจเถอะค่ะ!"
10023110-167 = "ฉัน.. คิดอะไรได้อย่างหนึ่ง..."
10023110-168 = "เอ๋? อะไรเหรอ อะไร?"
10023110-169 = "ฉันอยาก... เอาเงินไปใช้เป็นเงินทุนในการพัฒนาเกมใหม่น่ะ"
10023110-170 = "เงินทุนในการพัฒนาเกมใหม่...?"
10023110-172 = "... จะว่าไป ค่า R&D ที่ได้มาจากเซมิน่าก็ใช้กันจนเกือบจะหมดแล้วนี่เนอะ..."
10023110-173 = "สุดยอดเลยค่ะยูสึ!"
10023110-175 = "ถ้าเราเอาประสบการณ์ที่ได้จากงานนี้ไปใส่ไว้ในเกมละก็..."
10023110-176 = "บางทีอาจจะทำเกมดีๆ ออกมาเลยก็ได้นะ..."
10023110-178 = "อ๊ะ งั้นฉันได้ไอเดียแล้ว!"
10023110-179 = "ตั้งใจฟังนะ ฉันจะให้─"
10023110-180 = "ถ้ามีไอเดียก็ไปเขียนแผนการมาส่งนะพี่"
10023110-181 = "นี่ เธอก็รู้ไม่ใช่เหรอว่าฉันไม่ถนัดอธิบายไอเดียตัวเองออกมาเป็นแผนการน่ะ"
10023110-182 = "เป็นถึงคนเขียนเนื้อเรื่อง แล้วจะเขียนแผนการไม่ได้ได้ไง!"
10023110-184 = "ถ้ากลับไปห้องชมรม... เห็นทีต้องเตรียมเขียนโค้ดแล้วสินะ..."
10023110-186 = "เดี๋ยวสิ! ตอนนี้ไอเดียของฉันมีล้นสมองเลยนะ!"
10023110-187 = "เรามาจัดชุดไอเดีย... ด้วยการเล่นเกมกันก่อนดีไหม?"
10023110-188 = "หยุดเลย! คิดว่าฉันไม่รู้จักพี่ดีพองั้นเหรอ?"
10023110-190 = "อาริสึพร้อมเสมอค่ะ!"
10023110-192 = "ทุกคนกระตือรือร้นกันจังเลยนะ... ฮุฮุ..."

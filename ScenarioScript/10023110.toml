[translation]
10023110-1 = "尾聲;美好結局，直到永遠！"
10023110-5 = "……"
10023110-6 = "……"
10023110-7 = "噫……"
10023110-9 = "嗚哇啊啊啊啊！寧瑠前輩生氣了！愛麗絲好害怕！"
10023110-11 = "我說你們啊……"
10023110-12 = "放過我們吧，寧瑠前輩！"
10023110-13 = "……啊？什麼意思。"
10023110-14 = "一定要讓我們說出來才滿意嗎？#n好過分啊前輩！"
10023110-15 = "不是，你到底在說什麼……"
10023110-16 = "大家，對不起！#n要是……要是我一開始就拒絕……說不定事情就不會變成這樣了……！"
10023110-17 = "都結束了……寧瑠前輩火冒三丈……遊戲開發部將被廢部……#n假冒C&C的罪也很重……"
10023110-18 = "嗚嗚……明明是好不容易才保住的社團……#n費盡千辛萬苦才能和愛麗絲和柚子在一起的說……！"
10023110-20 = "桃井……"
10023110-21 = "請，請不要哭了。桃井，愛麗絲…… "
10023110-22 = "愛麗絲們沒問題的。#n即使相互分離，心依舊會彼此相連，愛麗絲學過了……！"
10023110-24 = "唉……你們好像有什麼誤會…… "
10023110-25 = "我什麼都還沒說啊……"
10023110-26 = "話說，你們一直是這樣看我的嗎！？"
10023110-27 = "呵呵，誰知道呢？"
10023110-28 = "喂，你想說這都是我自作自受嗎！？"
10023110-30 = "前輩們，非常抱歉。"
10023110-31 = "雖然取得了證物，卻沒能抓住嫌犯……"
10023110-33 = "啊啊，我們已經抓住他了，別在意。"
10023110-34 = "不。是因為我的疏失才勞煩前輩們出手……"
10023110-35 = "那種事不用在意。我說過只要結局是好的就行了吧。"
10023110-36 = "還有……"
10023110-41 = "你們幾個。"
10023110-46 = "噫噫！？"
10023110-47 = "大，大人饒命……！"
10023110-49 = "請稍等，寧瑠前輩。"
10023110-50 = "啊？"
10023110-51 = "這次的事情……請不要太責怪遊戲開發部。"
10023110-52 = "哦？"
10023110-53 = "遊戲開發部沒有任何錯。"
10023110-54 = "本來理應通知前輩們並等待支援，但我卻沒有那麼做。"
10023110-55 = "而是選擇作為遊戲開發部的夥伴──以朋友的身分一起戰鬥。"
10023110-56 = "所以……如果要說他們必須負責的話，那麼我也是一樣。"
10023110-58 = "沒，沒錯，寧瑠前輩！#n季和愛麗絲是夥伴，是朋友！"
10023110-59 = "愛麗絲在遊戲裡學過，朋友有困難的時候要互相幫助。#n所以，所以……"
10023110-61 = "不是，都說了……我想說的是……"
10023110-62 = "那個什麼……"
10023110-63 = "做得好。"
10023110-68 = "咦……？"
10023110-69 = "哈！？你該不會是跟寧瑠前輩一模一樣的冒牌貨吧！？"
10023110-71 = "你說什麼！"
10023110-72 = "真是的，明明是在稱讚你們啊……"
10023110-74 = "那個……前輩真的，願意原諒我們嗎……？"
10023110-75 = "啊？"
10023110-79 = "與其說原不原諒，從結果來看不是順利解決了嗎。"
10023110-80 = "這樣就夠了吧。反正抓到了嫌疑犯，證物也都拿到了。"
10023110-81 = "接下來只要全都交給女武神就好了不是嗎？"
10023110-86 = "（寧瑠前輩……雖然個子小，心胸好像很寬大呢……）"
10023110-87 = "（姐姐！不要亂講話！要是被聽到怎麼辦！）"
10023110-93 = "還有季，你也是……"
10023110-94 = "是，我已經做好願意接受任何處分的覺悟。"
10023110-95 = "我想說的不是那個……啊，真是！"
10023110-96 = "首先，為什麼要扮成兔女郎？"
10023110-97 = "當然是因為這是潛入作戰。"
10023110-101 = "……唉。"
10023110-102 = "所以我那時才說不想穿啊……"
10023110-104 = "嗯？隊長，明明就很適合你的呀？"
10023110-105 = "啊哈哈！季醬也很可愛哦！"
10023110-110 = "謝，謝謝……"
10023110-111 = "總之！"
10023110-112 = "我想說的是……"
10023110-114 = "是。自肅、反省、監禁，不管內容是什麼我都會接受。"
10023110-115 = "所以說！"
10023110-116 = "啊啊真是的……"
10023110-117 = "[s1]「寧瑠是想要稱讚季哦。」\n[s2]「還有想為丟下季一個人這件事道歉。」"
10023110-121 = "老，老師！？！？"
10023110-122 = "可惡……都忘記老師在這裡了……！"
10023110-124 = "那是，什麼意思……？"
10023110-125 = "啊啊真是的！所以說！"
10023110-129 = "……做得好。還有……抱歉。"
10023110-130 = "該怎麼說。那個……我沒有想丟下你一個人的意思。"
10023110-131 = "這次的任務很緊急，所以只能交給你一個人。#n不過，你還是努力完成了……"
10023110-132 = "那個……辛苦了。"
10023110-134 = "呵呵，就是這樣哦，季醬。#n隊長在這種時候總是不太坦率啊。"
10023110-135 = "別說那些多餘的話！"
10023110-136 = "就是這樣，季醬！太好了呢！"
10023110-142 = "……非常感謝。"
10023110-144 = "唉……累死了～#n我們明明這麼努力，可是別說報酬了，就連委託本身都沒了……真是白忙一場。"
10023110-145 = "不過，這可以成為新作品的靈感吧？"
10023110-146 = "新作品……？"
10023110-147 = "啊～說的也是……靈感倒是還挺不少的……"
10023110-148 = "[s]「啊，這麼說來。應該能拿到女武神提供的懸賞金唷。」"
10023110-149 = "咦……？懸賞金是怎麼回事？#n我第一次聽到哦？"
10023110-150 = "[s3]「我也是剛剛才知道的，聽說……」\n[s4]「女武神好像也在尋找這件贓物。」"
10023110-153 = "是達成任務的報酬對吧！#n乓啪喀乓！愛麗絲們獲得了懸賞金！"
10023110-156 = "啊！既然如此，就用那筆錢買PrayStation──"
10023110-157 = "還有更好的用途吧，姐姐！？"
10023110-158 = "為什麼啊！我們可是遊戲開發部哦！#n遊戲開發部不把錢投資在遊戲上的話要投資什麼啊！"
10023110-160 = "愛麗絲有一個想法！"
10023110-161 = "遊戲開發部的部長是柚子！所以交給柚子決定吧！"
10023110-167 = "……我有，一個想法……"
10023110-168 = "咦？是什麼是什麼？"
10023110-169 = "把這筆錢……當成下一部作品的開發經費怎麼樣。"
10023110-170 = "下一部作品的開發經費……？"
10023110-172 = "……這麼說來，從研討會拿到的R&D經費差不多快用完了呢……"
10023110-173 = "不愧是柚子！"
10023110-175 = "活用我們……在這裡獲得的經驗……"
10023110-176 = "說不定能做出很有趣的作品……"
10023110-178 = "說的對！那我有個好主意哦！"
10023110-179 = "聽我說聽我說！就是啊──"
10023110-180 = "不要只有口頭說，要好好寫成計劃書啊……姐姐。"
10023110-181 = "怎，怎麼這樣……我不擅長寫計劃書啊，妹妹唷。"
10023110-182 = "明明是劇本作家兼企劃，怎麼能不擅長寫計畫書！"
10023110-184 = "回去之後……要馬上開始準備寫程式才行……"
10023110-186 = "等一下！為了好好地把這些湧現的靈感化為實體……"
10023110-187 = "要不要先來玩遊戲？"
10023110-188 = "不行！姐姐一定又會說「靈感在玩遊戲的時候不知去向了～」對吧？"
10023110-190 = "愛麗絲一直都準備就緒！"
10023110-192 = "大家都元氣滿滿呢……呵呵……"
10023110-197 = "（就這樣，由突如其來的非日常回到了一如既往的日常中──）"
10023110-198 = "（他們開心地一路玩到了半夜）"
10023110-200 = "（於是，在所有人都熟睡的時候……）"
10023110-204 = "[ns]「桃井。」"
10023110-205 = "嗯？怎麼了嗎，老師？"
10023110-206 = "[s]「真是場大騷動呢……」"
10023110-207 = "嗯……"
10023110-208 = "當時真的不知該如何是好呢……"
10023110-209 = "不過！"
10023110-210 = "[s]「嗯……？」"
10023110-211 = "綠、柚子、愛麗絲！#n──還有季。因為大家都在！"
10023110-212 = "所以雖然辛苦，但真的非常非常開心唷！"
10023110-213 = "老師覺得呢？"
10023110-214 = "[s]「嗯，我也很開心。」"
10023110-215 = "嘿嘿，太好了！"
10023110-220 = "（桃井他們遊戲開發部成員的笑容，看起來比往常更加耀眼）"
10023110-225 = "「……嗯，那當然。大家都是我重要的學生。」"
10023110-233 = "……"
10023110-237 = "「……嗯，那當然。大家都是我重要的學生。」"
10023110-238 = "……老師。"
10023110-242 = "「……嗯，那當然。大家都是我重要的學生。」"
10023110-243 = "呼……"
10023110-244 = "胸口竟然會如此糾結……這股悸動究竟是……"
10023110-245 = "但是並不會感到痛苦……反而轉變成了幸福。"
10023110-246 = "這是為什麼呢？#n如果是老師，會知道答案嗎？"
10023110-247 = "……"
10023110-248 = "沒有什麼是我偷不走的。#n無論何時……都是為了將珍貴的事物獻給眾人。"
10023110-249 = "人們生而無名，而心亦同。#n……所謂人生，就是不斷選擇的過程。"
10023110-250 = "老師，有朝一日──"
10023110-256 = "──我將前去，收下這份感情之名。"
10023110-259 = "純白的預告信～虛飾之館與美學所在之處～\t"

[translation]
10004010-1 = "第1話;旬教官的憂鬱"
10004010-2 = "山海經．培育支援部「梅花園」"
10004010-6 = "唉，這次真的是累壞了……"
10004010-7 = "明明平時都像天使一樣，但一旦玩鬧起來不管怎麼說都說不聽，有時真的很為難……"
10004010-8 = "我偶爾也想像他們一樣，沒有任何約束，不講理地鬧脾氣呢……"
10004010-9 = "……不，我不能逃避。"
10004010-10 = "身為山海經的教官，我有責任指導這些孩子們！現在不是抱怨的時候！"
10004010-11 = "況且總是愁眉苦臉可是美容的大忌呢。"
10004010-12 = "那麼……為了轉換一下心情，給自己一點獎勵吧？"
10004010-13 = "「巴根達斯」的蘭姆葡萄口味……！"
10004010-14 = "這是在山海經內很難買到的口味，所以我一直留著沒吃……#n今天就吃它來放鬆一下吧。"
10004010-15 = "那麼……"
10004010-18 = "咦，奇怪？應該是在冰箱裡呀……？"
10004010-20 = "咦，旬姐姐在找什麼啊？"
10004010-21 = "哎呀，心菜醬。"
10004010-22 = "放在這裡的冰淇淋不見了……你有看到嗎？"
10004010-23 = "啊，那個啊？很好吃唷！"
10004010-24 = "咦咦咦咦！？你吃掉了嗎！？"
10004010-25 = "唔唔，我本來是打算留到重要的日子才吃的……"
10004010-26 = "但，但是，姐姐上星期不是說「為了減肥，以後不再吃冰淇淋和甜食！」了嗎……？"
10004010-27 = "所以我就想說乾脆把它吃掉，就不會讓旬姐姐受苦了……"
10004010-28 = "嗚嗚嗚嗚……"
10004010-29 = "對，對不起……那個，你要吃我前幾天買的「咯哩咯哩君」玉米濃湯口味嗎？"
10004010-30 = "不，沒關係，謝謝……#n沒有事先說要留著的我也有錯……"
10004010-31 = "啊，對了，旬姐姐。向日葵班下午的點心，可以幫我準備嗎？"
10004010-32 = "可以是可以，心菜醬是有其他事要做嗎？"
10004010-33 = "沒有，只是因為聽說今天下午的點心是「紅蘿蔔蛋糕」……#n我，我對紅蘿蔔有點……"
10004010-34 = "心菜醬……我之前也說過了，挑食是無法讓你成為優秀的教官的哦……"
10004010-35 = "唔唔，又要嘮叨了……那種事就算不說我也知道！"
10004010-36 = "總之，我之後會補償你的！拜託了！"
10004010-40 = "請，請等一下，心菜醬！"
10004010-42 = "……唉。"
10004010-43 = "大家為什麼都這麼任性呢……"
10004010-44 = "孩子們這樣，心菜也這樣……"
10004010-46 = "我偶爾也想像孩子一樣隨心所欲啊！"
10004010-47 = "……哎呀，不行。保持平常心，平常心……"
10004010-48 = "壓力可是美容的大敵！如果一直想著這種事，抗衰老就失去意義了。"
10004010-49 = "可能是因為最近疲累的關係，皮膚變得有點粗糙……得尋找新的美容方法才行。"
10004010-50 = "對了，先前鍊丹術研究會的沙耶說在研究長生不老的靈藥吧？"
10004010-51 = "雖然不到「長生不老」，但說不定沙耶會知道對抗衰老有效的藥。"
10004010-52 = "距離下午的點心還有些時間……去鍊丹術研究會看看吧。"
10004010-54 = "鍊丹術研究會．沙耶的研究室"
10004010-55 = "哼～哼哼哼哼……那麼，今天要去哪裡做什麼實驗呢，已經開始期待了！"
10004010-57 = "那個，打擾了。"
10004010-58 = "嗯？這不是梅花園的旬嗎？歡迎來到我的研究室！"
10004010-59 = "啊，沙耶同學。你今天的打扮很可愛呢。"
10004010-60 = "等等要去哪裡嗎？"
10004010-61 = "嗯。今天下午和[USERNAME]老師約好在市區見面。"
10004010-62 = "他說想商量一下放在夏萊內的常備藥品。"
10004010-63 = "咦，和[USERNAME]老師……！？"
10004010-64 = "是的，有什麼問題嗎？"
10004010-65 = "不，沒有什麼問題……"
10004010-66 = "（之前約老師出門的時候明明就以在忙為由拒絕了我……#n　卻和沙耶同學約好要出門……）"
10004010-67 = "（雖然似乎是與夏萊的工作有關……總覺得有點鬱悶呢……）"
10004010-68 = "話說回來，你今天怎麼會突然跑來我的研究室呢？梅花園不要緊嗎？"
10004010-69 = "還是說……是來拜託我仲裁玄龍門和玄武商會間的紛爭！？#n雖然我是個天才，但那種事還是容我拒絕！"
10004010-70 = "不，不是，怎麼會呢……"
10004010-71 = "那種殺氣騰騰的鬥爭，我才不會插手呢。"
10004010-72 = "那個，我今天來這裡的原因……是想請教一些關於藥品的事。"
10004010-73 = "藥？有哪裡不舒服嗎？"
10004010-74 = "不，我的身體好的很……"
10004010-75 = "但可能最近累積了疲勞或是壓力，皮膚變得有點粗糙……"
10004010-76 = "有沒有什麼對美肌有效的藥呢……？"
10004010-77 = "哼～哼哼哼哼！原來如此，那你來的正是時候！我正好在實驗新的秘藥呢！"
10004010-78 = "它的名字就是……"
10004010-80 = "「回春秘藥」！"
10004010-82 = "回春……？"
10004010-87 = "沒錯！#n這就是我發明的「只要喝一口，任誰都能得到像新生兒一樣的柔軟肌膚」的秘藥哦！"
10004010-88 = "雖然目前還處於測試階段，可能會有些副作用……但效果很完美！應該吧。"
10004010-89 = "如何，想試喝看看嗎？"
10004010-90 = "嗯！請務必讓我試喝！"
10004010-91 = "好。"
10004010-94 = "那麼喝下之後感受到什麼變化，再麻煩詳細告訴我哦。"
10004010-100 = "（只要喝下這個藥，就能像小孩一樣……）"
10004010-101 = "（現在想想，小時候的我確實不曾因為皮膚而煩惱，也不會感到疲勞……）"
10004010-102 = "（……果然還是當小孩子最棒了。隨著時間流逝，討厭的事只會越來越多……）"
10004010-103 = "（既然這樣，不如再當一回小孩子……）"
10004010-114 = "……如何？有感覺到什麼變化嗎？"
10004010-115 = "雖然不太清楚，但總感覺身體很熱，還有陣陣刺痛……"
10004010-116 = "嗯，這就奇怪了？材料之中，應該沒有會讓身體變熱的成分才對──"
10004010-117 = "嗚，嗚哇！？"
10004010-118 = "怎，怎麼了，沙耶同學？"
10004010-119 = "就，就是……那個……"
10004010-120 = "咦？沙耶同學突然長高了嗎……？#n感覺視線的高度好像……？"
10004010-121 = "不是我變大，是旬縮小了！看看鏡子！"
10004010-122 = "鏡子……？"
10004010-132 = "咦咦咦！？為，為什麼我的身體縮小了……？"
10004010-133 = "我，我也不知道！這完全在意料之外！"
10004010-134 = "因為肌膚會變軟，我原本預想的副作用是身體會像橡膠般伸長，#n想不到居然會是身體縮小……"
10004010-135 = "沙耶同學，你明知會有副作用還給了我那種藥嗎……"
10004010-136 = "別，別擔心！我是天才，很快就能製作出解藥的！"
10004010-137 = "稍，稍等！我立刻去研究會的倉庫拿材料！"
10004010-142 = "唉，沒想到事情會變成這樣……#n雖然這陣子一直把「想回到小時候」放在嘴邊，想不到真的實現了……"
10004010-143 = "話雖如此，皮膚確實變光滑了。而且，還有一股小孩子獨有的柔軟香味……"
10004010-150 = "啊，激烈地運動肩膀也不會感到疼痛，身體也變輕了！"
10004010-151 = "這身體，意外地還不壞……？"
10004010-154 = "[ns] 「你好。」"
10004010-155 = "[USERNAME]老師！？你，你怎麼會在這裡……！？"
10004010-156 = "那，那個，這副模樣是因為……！"
10004010-157 = "[s] 「那個……是梅花園的孩子吧？初次見面。」"
10004010-158 = "咦？"
10004010-159 = "啊，是，初次見面……？"
10004010-162 = "（難道說，老師沒有認出我是誰……？）"
10004010-163 = "（我現在看起來確實比心菜的年紀還小……）"
10004010-164 = "（即使想好好說明也很複雜，而且似乎很快就會恢復原狀……現在就暫且……）"
10004010-167 = "那，那個，我，是最近剛來梅花園的，9歲的小……小旬！"
10004010-168 = "在山海經和旬姐姐一起散步時迷了路……"
10004010-169 = "[s1] 「這樣啊。請多指教唷。」\n[s2] 「明明約好跟沙耶在這裡碰面……你沒有看到他嗎？」"
10004010-170 = "啊，沙耶姐姐……那個，好像，有聽他說要去某個地方唷？"
10004010-171 = "啊，沙耶姐姐……那個，好像，有聽他說要去某個地方唷？"
10004010-172 = "[s3] 「這樣啊。那在他回來之前，我們一起去找旬吧？」\n[s4] 「看起來沙耶還要一點時間才會回來。」"
10004010-173 = "那，那個，這樣太勞煩你了……"
10004010-174 = "那，那個，這樣太勞煩你了……"
10004010-177 = "（總，總覺得妨礙了沙耶同學和老師的約會……）"
10004010-178 = "（而且雖然不是出於本意，還是對老師撒了謊……）"
10004010-179 = "（但，但是，仔細一想，會出現這種情況也是沙耶造成的吧……？）"
10004010-180 = "（如果當初沒有發生這種事，我也不會向老師撒謊……所以這也是不得已的吧！？）"
10004010-183 = "這，這樣的話……拜託你了，老師！"
10004010-184 = "[s] 「嗯，交給我吧。你們是在哪裡走散的呢？」"
10004010-185 = "這個……啊，大概是在玄武商會附近吧？"
10004010-186 = "聽說有一間好吃的「糖葫蘆」推出了新品，所以想去看看……#n不對，是因為旬姐姐很喜歡，所以可能去了那裡。"
10004010-187 = "當，當然我的意思並不是說旬姐姐是那種，#n會為了吃美食而把孩子們拋下的不負責任的教官……！"
10004010-188 = "[s] 「……為什麼小旬要幫旬找理由呢？」"
10004010-189 = "那個，如果是旬姐姐的話，應該就會這麼說吧……啊哈哈……"
10004010-190 = "好，好了，別在意這種小事了，我們出發吧，老師！"

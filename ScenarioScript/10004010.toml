[translation]
10004010-1 = "Episode 1;Instructor Shun's Blues"
10004010-2 = "Plum Blossom Garden"
10004010-6 = "*sigh* Today's field trip was rough..."
10004010-7 = "The kids are normally angels, but once they start to act on their own, they won't listen no matter what I say."
10004010-8 = "When I look at the Plum Blossom Garden students, sometimes I want to quit my job and just scream..."
10004010-9 = "No, I can't lose it because of something like this."
10004010-10 = "It's the responsibility of a Shanhaijing instructor to discipline young students and help them grow into good apples! I can't let this get me down!"
10004010-11 = "Besides, frowning is bad for my skin."
10004010-12 = "All right... Today was a tough day, so it's time to treat myself!"
10004010-13 = "Baagen-Razs rum raisin-flavored ice cream!"
10004010-14 = "I've been saving this because this flavor is hard to get in Shanhaijing, but tonight, I'm going to relax and enjoy it."
10004010-15 = "Can't wait to dig in!"
10004010-18 = "Huh? What happened to the ice cream I put in the freezer?"
10004010-20 = "Hey, what are you looking for?"
10004010-21 = "Oh, Kokona."
10004010-22 = "The ice cream I put in the freezer is gone. Have you seen it?"
10004010-23 = "The rum raisin ice cream? I ate it."
10004010-24 = "What?! How could you eat it without telling me?!"
10004010-25 = "It's really hard to get, so I was saving it for a special occasion..."
10004010-26 = "But didn't you say last week you were cutting back on dairy for your diet?"
10004010-27 = "I assumed that included ice cream..."
10004010-28 = "Ugh..."
10004010-29 = "S-Sorry... Do you want this corn potage-flavored Morimorikun I bought?"
10004010-30 = "No, it's okay. It's my own fault for not telling you first."
10004010-31 = "Oh, by the way... Can you take care of snack preparation for the Sunflower class students in the afternoon?"
10004010-32 = "Huh? I thought you were gonna take care of it!"
10004010-33 = "But...I heard that today's snack is carrot cake. I don't like carrots."
10004010-34 = "Kokona, I told you this before, but you can't succeed in life if you only eat what you want."
10004010-35 = "Ugh, you're nagging again. You don't have to tell me that! I already know!"
10004010-36 = "Anyway, I'll make it up later. Thanks!"
10004010-40 = "W-Wait, Kokona!"
10004010-42 = "*sigh*"
10004010-43 = "Why is everyone acting like a child?"
10004010-44 = "The students, Kokona...everyone just does whatever they want."
10004010-46 = "I wish I could go back to being a little kid!"
10004010-47 = "No, I have to stay calm in situations like this."
10004010-48 = "Stress is the enemy of youth and beauty! Getting bothered by every little thing will ruin my skin."
10004010-49 = "Ugh, it's probably because of fatigue, but my skin has been so rough and flaky lately. I need to find a new skin care regimen."
10004010-50 = "Come to think of it, Saya from the Eastern Alchemy Society said she was researching an immortality elixir, didn't she?"
10004010-51 = "I don't need to live forever, but Saya might know a lot about anti-aging treatments."
10004010-52 = "I should pay a visit to the Eastern Alchemy Society before I prepare the afternoon snack..."
10004010-54 = "Saya's Research Lab"
10004010-55 = "Heh heh heh... What kind of experiment should I conduct today? I'm so excited to get started."
10004010-57 = "Excuse me."
10004010-58 = "Oh, is that Shun from the Plum Blossom Garden? Welcome to my research lab!"
10004010-59 = "Wow, Saya. Your outfit is so nice today."
10004010-60 = "Are you going out?"
10004010-61 = "Yeah, I'm meeting [USERNAME] Sensei in town this afternoon."
10004010-62 = "Sensei needs my help to buy a first aid kit for Schale."
10004010-63 = "What?! You're going out with [USERNAME] Sensei?"
10004010-64 = "Yes. Is there a problem?"
10004010-65 = "N-No, there's no problem, but..."
10004010-66 = "(When I asked Sensei to go out with me before, they refused and said they were busy. It turns out Sensei already had plans with Saya...)"
10004010-67 = "(I know it's just for Schale work, but it's still disappointing.)"
10004010-68 = "Anyway, what brings you to my lab? I doubt you're here on Plum Blossom Garden business."
10004010-69 = "I hope you're not here to ask me to mediate between Genryumon and the Black Tortoise Promenade! I may be a genius, but some things are beyond even me!"
10004010-70 = "Haha. Of course not. Everyone knows those two sides will be fighting until the end of time."
10004010-71 = "I'm not foolish enough to get involved in that."
10004010-72 = "I was wondering if I could get some medicine..."
10004010-73 = "Medicine? Are you sick?"
10004010-74 = "No, I'm healthy."
10004010-75 = "But my skin has gotten really rough lately, maybe because of fatigue or stress."
10004010-76 = "Do you have anything for skin care?"
10004010-77 = "Heh heh. You've come to the right place. I was just testing a new elixir!"
10004010-78 = "I call it..."
10004010-80 = "Rejuvenation Elixir!"
10004010-82 = "Rejuvenation Elixir?"
10004010-87 = "It's my secret invention. Just one sip, and you'll have baby-smooth skin no matter how old you are!"
10004010-88 = "Of course, it's still in the trial stages, so there may be some side effects—but I can guarantee its effectiveness!"
10004010-89 = "So! Wanna try it?"
10004010-90 = "Yes, let me have some!"
10004010-91 = "Sure."
10004010-94 = "Okay, fill me in on what exactly this does to you."
10004010-100 = "(Can I really have baby-smooth skin if I take this?)"
10004010-101 = "(I never had problems with my skin when I was young. I didn't feel fatigued like I do now.)"
10004010-102 = "(Life was better when I was a little kid. Troubles in life just keep piling up as you get older...)"
10004010-103 = "(I hate getting old.)"
10004010-114 = "How is it? Do you feel any changes in your skin?"
10004010-115 = "I don't know about my skin, but my whole body feels strange. I feel...hotter."
10004010-116 = "Huh? That's weird. I didn't put in anything that would generate body heat."
10004010-117 = "Wh-What the...?"
10004010-118 = "Wh-What's wrong, Saya?"
10004010-119 = "S-So... Um..."
10004010-120 = "Did you just get taller, Saya? It feels like you're looking down at me."
10004010-121 = "It's not that I got taller. You got smaller! Look in the mirror!"
10004010-122 = "The mirror?"
10004010-132 = "Huh?! H-How did I end up like this?"
10004010-133 = "I-I don't know! I didn't expect this kind of side effect!"
10004010-134 = "I expected something like the whole body stretching like rubber or growing cat whiskers. Not shrinking..."
10004010-135 = "Saya, why would you give me something like that?!"
10004010-136 = "D-Don't worry! I'm a genius, so I can whip up an antidote in no time!"
10004010-137 = "W-Wait a moment. I'll go to the Eastern Alchemy Society's storage and get everything I need!"
10004010-142 = "*sigh* This is a disaster. I said I wanted to be a little kid again, but I didn't expect to actually turn into one..."
10004010-143 = "I do have to admit, my skin has become really smooth. It also kind of smells like the soft skin of a baby."
10004010-150 = "Not only that, but now I can move without hurting my shoulders. I feel so much lighter!"
10004010-151 = "Maybe having a body this tiny isn't the worst thing ever."
10004010-154 = "[ns] \"Hello.\""
10004010-155 = "[USERNAME] Sensei? Wh-What brings you here...?"
10004010-156 = "I-I can explain everything..."
10004010-157 = "[s] \"Are you with Plum Blossom Garden?\""
10004010-158 = "Huh?"
10004010-159 = "S-So... Um... "
10004010-162 = "(Wait. Does Sensei not recognize me anymore?)"
10004010-163 = "(I've suddenly turned into a kid even smaller than Kokona. I guess it would be strange if Sensei recognized me as the same person.)"
10004010-164 = "(Things could get complicated if I mention Saya's elixir, so I'll just make something up.)"
10004010-167 = "Y-Yeah! I-I'm a new student at Plum Blossom Garden. I'm nine years old and my name is Shu... Shunling!"
10004010-168 = "I came to visit Shanhaijing with Instructor Shun and got lost..."
10004010-169 = "[s1] \"I was just here to meet Saya.\"\n[s2] \"Have you seen Saya?\""
10004010-170 = "Oh... I haven't seen Saya. Maybe she went out somewhere?"
10004010-171 = "Oh... I haven't seen Saya. Maybe she went out somewhere?"
10004010-172 = "[s3] \"In that case, maybe I should look for Shun.\"\n[s4] \"I'll take you to Plum Blossom Garden before Saya gets back.\""
10004010-173 = "Huh? Y-You don't have to do that..."
10004010-174 = "Huh? Y-You don't have to do that..."
10004010-177 = "(Ugh. I think I got in the way of Saya and Sensei's outing. I feel bad.)"
10004010-178 = "(Not only that, I even lied to Sensei...)"
10004010-179 = "(But honestly, Saya is also responsible for putting me in this situation, right?)"
10004010-180 = "(There would have been no reason to lie to Sensei if the elixir had no side effects in the first place. I was just trying to protect myself!)"
10004010-183 = "Okay, if you don't mind... Thank you, Sensei."
10004010-184 = "[s] \"By the way, where did Shun go?\""
10004010-185 = "I don't know if she's still around here. Maybe she went to the Black Tortoise Promenade?"
10004010-186 = "Earlier, Shun said something new was being released at her favorite tanghulu shop."
10004010-187 = "O-Of course, that doesn't mean that Shun is an irresponsible instructor who leaves younger students alone to go out for treats!"
10004010-188 = "[s] \"Shunling, why are you defending Shun?\""
10004010-189 = "I-I just think...that's what Shun would have said if she were here. Haha..."
10004010-190 = "All right, all right, forget it. Let's go, Sensei!"

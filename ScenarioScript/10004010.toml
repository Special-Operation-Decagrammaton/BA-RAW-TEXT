10004010-5 = "1;슌;06\n#1;m3\n#wait;1300"
10004010-6 = "1;슌;09;하아, 오늘 현장학습은 정말 힘들었어요…….\n#1;em;[속상함]\n#1;stiff"
10004010-7 = "1;슌;09;아이들은 평상시에는 정말 천사 같지만, 제멋대로 움직이기 시작하면 무슨 말을 해도 듣질 않으니……."
10004010-8 = "1;슌;06;매화원의 원생들을 보고 있노라면, 가끔은 저도 교관의 직책을 내려놓고 어린아이처럼 투정을 부리며 일에서 도망치고 싶어지네요…….\n#1;em;…"
10004010-9 = "1;슌;05;아니, 이런 일로 도망쳐서는 안 돼요.\n#1;stiff"
10004010-10 = "1;슌;05;어린 원생들을 훈육하여 훌륭한 한 명의 원생으로 길러내는 것은 산해경 교관의 책무! 겨우 이 정도의 일 때문에 투정을 부릴 수는 없죠!"
10004010-11 = "1;슌;99;게다가 계속 얼굴을 찌푸리고 있으면 피부미용에도 나쁘니까요."
10004010-12 = "1;슌;01;그럼…… 오늘은 힘든 일도 많았으니, 저를 위해 준비해 두었던 특별 선물을 꺼내 볼까요?\n#1;em;[반응]"
10004010-13 = "1;슌;03;<바겐다즈>의 럼 레이즌 맛 아이스크림!\n#1;em;[반짝]\n#1;greeting"
10004010-14 = "1;슌;01;산해경 학원에서는 좀처럼 구하기 힘든 맛이라 아껴두고 있었지만, 오늘만큼은 이 아이스크림을 먹으면서 느긋하게 오후를 보내야겠어요."
10004010-15 = "1;슌;03;그럼 잘 먹겠습니다~.\n#1;em;[음표]"
10004010-16 = "1;슌;03\n#1;m2\n#wait;1500"
10004010-17 = "1;슌;03\n#wait;1600"
10004010-18 = "1;슌;02;어라? 냉장고에 넣어놨던 아이스크림이…… 어디로 간 걸까요?\n#1;stiff\n#1;em;[땀]"
10004010-19 = "#wait;1500"
10004010-20 = "5;코코나;00;언니, 뭐 찾아?\n#5;em;[?]\n#5;al\n#1;m1"
10004010-21 = "1;슌;01;아, 코코나 쨩.\n#1;em;[반응]"
10004010-22 = "1;슌;01;다름이 아니라 냉동실에 넣어두었던 아이스크림이 사라져서요. 혹시 못 봤나요?"
10004010-23 = "5;코코나;02;그 럼 레이즌 맛 아이스크림? 내가 먹었는데?\n#5;em;[?]"
10004010-24 = "1;슌;10;네에에에? 어째서 말도 없이 먹어버린 건가요!\n#1;em;[?!]\n#1;shake"
10004010-25 = "1;슌;04;구하기 어려운 물건이라, 정말 중요한 날에 먹으려고 아껴두고 있었던 건데…….\n#1;stiff"
10004010-26 = "5;코코나;00;하지만 저번 주에 언니가 다이어트를 한다고 앞으로 유제품은 먹지 않겠다고 선언했잖아?\n#5;em;[반응]"
10004010-27 = "5;코코나;00;그래서 당연히 이 아이스크림도 안 먹을 줄 알고……."
10004010-28 = "1;슌;08;아아아…….\n#1;em;…"
10004010-29 = "5;코코나;11;미, 미안……. 뭣하면 내가 전에 사 온 콘포타주 맛 <모리모리군>이라도 먹을래?\n#5;stiff\n#5;em;[땀]"
10004010-30 = "1;슌;06;……아뇨, 괜찮아요. 미리 말해두지 않았던 제 책임도 있으니까요."
10004010-31 = "5;코코나;01;참, 언니. 그나저나 오후에 있는 해바라기반 원생들의 간식 준비, 언니가 대신 맡아줄 수 없을까?\n#5;em;[반응]"
10004010-32 = "1;슌;02;네? 하지만 그 일은 코코나 쨩이 맡기로 했었잖아요?\n#1;em;[?]"
10004010-33 = "5;코코나;04;그렇지만~ 오늘 오후 간식으로는 당근 케이크가 나온다잖아. 나는 당근 싫어하는 걸."
10004010-34 = "1;슌;05;코코나 쨩, 전에도 말했지만 음식을 가려 먹으면 훌륭한 어른이 될 수 없다고—\n#1;em;[!]"
10004010-35 = "5;코코나;12;으으, 또 잔소리…… 그런 건 말하지 않아도 알고 있다니까!\n#5;stiff"
10004010-36 = "5;코코나;07;여하튼 오늘 일은 나중에 꼭 벌충할게. 그럼 부탁할게!\n#5;em;[음표]"

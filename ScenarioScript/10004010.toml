[translation]
10004010-1 = "ตอนที่ 1;ความเศร้าของผู้ฝึกสอน ชุน"
10004010-2 = "ฝ่ายสนับสนุนด้านวินัยสวนต้นบ๊วย ซานไห่จิง"
10004010-6 = "เฮ้อ... การทัศนศึกษาวันนี้เหนื่อยจริงๆ เลยล่ะค่ะ..."
10004010-7 = "ตอนที่อยู่นิ่งๆ เด็กๆ จะน่ารักเหมือนกับนางฟ้าตัวน้อยๆ แต่พอขยับตัวเมื่อไหร่...#nพวกเขามักจะไม่ฟังที่ฉันพูดเลย..."
10004010-8 = "พอเห็นเด็กๆ ที่สวนต้นบ๊วยแล้ว... บางครั้งฉันก็อยากจะลาออกจากการเป็นผู้ฝึกสอน#nอยากหนีจากภาระงาน หรืองอแงเหมือนเด็กๆ บ้างค่ะ..."
10004010-9 = "ไม่สิ จะหนีงานไม่ได้เด็ดขาดค่ะ"
10004010-10 = "การอบรมเด็กๆ และสอนให้พวกเธอเติบโตเป็นนักเรียนที่ดี เป็นหน้าที่ของผู้ฝึกสอนแห่งซานไห่จิง!#nปกติตอนทำงาน ฉันไม่ได้งอแงขนาดนี้หรอกนะคะ!"
10004010-11 = "นอกจากนี้ ถ้าทำหน้านิ่วคิ้วขมวดอยู่ตลอดทั้งวันก็จะไม่ดีต่อสุขภาพผิวค่ะ"
10004010-12 = "ถ้างั้น... วันนี้เจอเรื่องหนักๆ มาเยอะแล้ว ฉันจะเอาของขวัญที่เตรียมไว้เพื่อตัวเองออกมาเลยดีมั้ยนะ?"
10004010-13 = "ไอศกรีมรสรัมเรซิ่นของ <บาเกน-ดาซส์> ค่ะ"
10004010-14 = "ฉันเก็บเอาไว้อย่างดีเพราะไอศกรีมรสนี้หายากมากๆ ที่ในเขตโรงเรียนซานไห่จิงค่ะ แต่ว่าวันนี้#nฉันจะใช้เวลาช่วงบ่ายเพลิดเพลินกับการลิ้มรสชาติของไอศกรีมค่ะ"
10004010-15 = "จะทานแล้วนะคะ~"
10004010-18 = "เอ๋? ไอศกรีมที่แช่ไว้ในตู้เย็น... หายไปไหนแล้วล่ะ?"
10004010-20 = "พี่ชุนหาอะไรอยู่เหรอ?"
10004010-21 = "อ๊ะ โคโคน่าจัง"
10004010-22 = "ไอศกรีมที่แช่ไว้ในตู้เย็นหายไปแล้วน่ะค่ะ โคโคน่าจังเห็นไอศกรีมบ้างรึเปล่าคะ?"
10004010-23 = "ไอศกรีมรสรัมเรซิ่นน่ะเหรอ? ฉันกินไปแล้วล่ะ"
10004010-24 = "เอ๋~~? ทำไมถึงกินไปโดยไม่บอกก่อนล่ะคะ!"
10004010-25 = "ไอศกรีมรสนี้หายากมาก พี่เลยเก็บเอาไว้กินในวันที่สำคัญจริงๆ ..."
10004010-26 = "แต่เมื่ออาทิตย์ที่แล้วพี่บอกว่าอยากจะลดน้ำหนักแล้วจะไม่กินผลิตภัณฑ์จากนมอีกไม่ใช่รึไง?"
10004010-27 = "เพราะงั้นฉันก็เลยคิดว่าพี่จะไม่กินไอศกรีมด้วยน่ะสิ..."
10004010-28 = "อ่า..."
10004010-29 = "ขะ...ขอโทษนะ... ว่าแต่พี่อยากกินขนม <โมริโมริคุง> รสซุปข้าวโพดที่ฉันซื้อมามั้ยล่ะ?"
10004010-30 = "ไม่หรอก... ไม่เป็นไรหรอกค่ะ พี่ผิดเองที่ไม่ได้บอกโคโคน่าจังเอาไว้ก่อนค่ะ"
10004010-31 = "โธ่... พี่คะ ว่าแต่ว่า เรื่องเตรียมของว่างตอนบ่ายให้กับเด็กห้องทานตะวันน่ะ พี่ช่วยเตรียมให้แทนได้มั้ย?"
10004010-32 = "คะ? แต่ว่าเรื่องนั้นโคโคน่าจังบอกว่าจะจัดการเองไม่ใช่เหรอคะ?"
10004010-33 = "แต่ว่า... ของว่างของบ่ายวันนี้คือเค้กแคร์รอตน่ะ ฉันไม่ชอบแคร์รอต..."
10004010-34 = "โคโคน่าจัง... พี่เคยบอกไปแล้วไม่ใช่เหรอว่าถ้าเลือกกินอาหาร จะไม่สามารถโตเป็นผู้ใหญ่ที่..."
10004010-35 = "ฮึ่ย บ่นอีกแล้ว... เรื่องนั้นไม่บอกก็รู้น่า!"
10004010-36 = "เอาเป็นว่าไว้ฉันจะมาชดเชยเรื่องงานวันนี้ทีหลังนะ ถ้างั้นก็ขอฝากด้วยนะ~!"
10004010-40 = "ดะ...เดี๋ยวก่อนสิคะ โคโคน่าจัง!"
10004010-42 = "เฮ้อ..."
10004010-43 = "ทำไมทุกคนถึงทำตัวเหมือนเด็กๆ กันแบบนี้นะ..."
10004010-44 = "ทั้งพวกเด็กนักเรียน แล้วก็โคโคน่า... ทุกคนต่างทำตามใจตัวเองกันหมดเลย..."
10004010-46 = "ถ้าเป็นไปได้ฉันก็อยากจะกลายเป็นเด็กบ้างจังเลยค่ะ!"
10004010-47 = "ไม่สิ... ยิ่งในเวลาแบบนี้เราต้องยิ่งทำใจเย็นๆ เข้าไว้..."
10004010-48 = "ความเครียดคือศัตรูของความงาม! ถ้ามานั่งเครียดกับเรื่องเล็กๆ น้อยๆ แบบนี้ผิวพรรณจะหมองคล้ำนะคะ"
10004010-49 = "อืม... แต่ว่าช่วงนี้ฉันอาจจะเหนื่อยเกินไป ผิวของฉันเลยหยาบกร้านขึ้น...#nคงจะต้องหาวิธีดูแลผิวใหม่แล้วล่ะค่ะ"
10004010-50 = "พอมาคิดๆ ดูแล้ว ฉันเคยได้ยินว่าคุณซายะที่ชมรมวิจัยศาสตร์การปรุงยากำลังทำวิจัย#nเรื่องยาอายุวัฒนะอยู่นี่นา?"
10004010-51 = "บางทีนอกจากยาอายุวัฒนะ คุณซายะอาจจะรู้จักยาบำรุงผิวพรรณดีๆ ก็ได้นะคะ"
10004010-52 = "ถ้างั้น... ก่อนที่จะเตรียมของว่างช่วงบ่าย ฉันจะแวะไปที่ชมรมวิจัยศาสตร์การปรุงยาก่อนแล้วกันค่ะ"
10004010-54 = "ห้องทดลองของซายะ ชมรมวิจัยศาสตร์การปรุงยา"
10004010-55 = "ฮุฮุฮุ วันนี้จะออกไปทดลองอะไรดีน๊า? ชักจะตื่นเต้นที่จะได้ออกไปข้างนอกแล้วละสิ!"
10004010-57 = "ขอรบกวนหน่อยนะคะ"
10004010-58 = "เอ๊ะ ผู้ฝึกสอนชุนนี่นา? ยินดีต้อนรับสู่ห้องทดลองของซายะนะ!"
10004010-59 = "โอ๊ะ คุณซายะ... วันนี้ใส่ชุดน่ารักมากเลยนะคะ"
10004010-60 = "จะออกไปข้างนอกเหรอคะ?"
10004010-61 = "อื้อ บ่ายวันนี้ฉันนัดคุณครู [USERNAME] ให้มาเจอกันในเมืองน่ะ  "
10004010-62 = "คุณครูบอกว่าอยากให้ฉันไปช่วยเลือกซื้อชุดปฐมพยาบาลของทางชาเล่ต์หน่อย"
10004010-63 = "คะ?! นัดกับคุณครู [USERNAME] เหรอคะ!"
10004010-64 = "อื้อ มีปัญหาอะไรหรือเปล่าน่ะ?"
10004010-65 = "ปะ...เปล่าค่ะ ฉันไม่ได้มีปัญหาอะไรหรอกค่ะ..."
10004010-66 = "(ทั้งที่คราวก่อนตอนที่ฉันชวนออกไปข้างนอก คุณครูบอกว่ายุ่งแล้วก็ปฏิเสธฉันแท้ๆ...#nแต่วันนี้กลับสัญญาว่าจะไปกับคุณซายะซะได้...)"
10004010-67 = "(ถึงฉันจะรู้ว่าเป็นเพราะงานของชาเล่ต์ก็เถอะ... แต่ก็ยังรู้สึกเศร้านิดๆ อยู่ดี)"
10004010-68 = "ว่าแต่จู่ๆ มาหาท่านซายะถึงห้องทดลองแบบนี้มีเรื่องอะไรรึเปล่าน่ะ? ดูแล้วคงไม่ได้มาเพราะเรื่องงานของสวนต้นบ๊วยแน่ๆ..."
10004010-69 = "คงไม่ได้มาขอให้ไปไกล่เกลี่ยพวกมังกรดำกับย่านการค้าเทพเต่าดำหรอกใช่มั้ย?#nถึงท่านซายะจะเป็นอัจฉริยะก็จริง แต่เรื่องนั้นมันก็เกินไปนะ!"
10004010-70 = "ฮ่าๆ นั่นสินะคะ ข้อขัดแย้งของทางมังกรดำกับย่านการค้านี่มีชื่อเสียงแง่ลบในคิโวทอสมากนะคะ"
10004010-71 = "ฉันเองก็ไม่ได้ไม่รู้เรื่องราวจนยื่นมือเข้าไปแทรกแซงเรื่องของพวกเขาได้หรอกค่ะ"
10004010-72 = "แต่ว่านั่นไม่ใช่เหตุผลที่ฉันมาวันนี้หรอกนะคะ คือว่า... ฉันอยากจะมาขอยาตัวหนึ่งน่ะค่ะ..."
10004010-73 = "ยาเหรอ? เธอไม่สบายงั้นเหรอ?"
10004010-74 = "เปล่าหรอกค่ะ ฉันแข็งแรงดีค่ะ"
10004010-75 = "แต่ว่าช่วงนี้อาจเป็นเพราะความเหนื่อยล้า แล้วก็ความเครียด... ทำให้ผิวพรรณของฉันดูไม่ดีเท่าไหร่..."
10004010-76 = "พอจะมียาที่ช่วยบำรุงความงามบ้างรึเปล่าคะ?"
10004010-77 = "ฮุฮุฮุ มาหาถูกคนแล้วล่ะ ฉันกำลังทดลองยาอายุวัฒนะตัวใหม่อยู่พอดีเลย!"
10004010-78 = "และชื่อของมันก็คือ..."
10004010-80 = "<ยาคืนวัยเยาว์>!"
10004010-82 = "<ยาคืนวัยเยาว์> งั้นเหรอคะ?"
10004010-87 = "อื้อ ถ้าให้บรรยายสรรพคุณของยาตัวนี้ล่ะก็... เพียงแค่ดื่มยานี้แค่จิบเดียว#nต่อให้เป็นยายแก่หนังเหี่ยวแค่ไหน ผิวก็จะกลับคืนสภาพเนียนนุ่มเหมือนกับผิวทารกเลยล่ะ!"
10004010-88 = "แน่นอนว่ามันยังอยู่ในระยะทดลอง เลยอาจจะมี \"ผลข้างเคียงของยา\" เกิดขึ้นก็ได้...#nแต่สำหรับเรื่องประสิทธิภาพ... ท่านซายะคนนี้รับประกันเลย!"
10004010-89 = "ว่าไง? จะลองดื่มดูมั้ยล่ะ?"
10004010-90 = "ค่ะ ฉันจะลองดื่มค่ะ!"
10004010-91 = "ดีเลย"
10004010-94 = "ถ้างั้นพอดื่มแล้วมีการเปลี่ยนแปลงยังไงบ้างก็ช่วยบอกฉันด้วยล่ะ"
10004010-100 = "(ถ้าดื่มยานี้ ผิวพรรณจะคืนสภาพเหมือนผิวเด็กได้จริงๆ งั้นเหรอคะ?)"
10004010-101 = "(ถึงตอนเด็กๆ ฉันไม่เคยมีปัญหากังวลเรื่องผิวพรรณเลย... แต่อาจเป็นเพราะช่วงนี้ทำงานจนเหนื่อย#nทุกวันก็ได้)"
10004010-102 = "(...ตอนเด็กๆ นี่ดีจังเลยนะคะ... ยิ่งเวลาผ่านไปก็ยิ่งมีเรื่องไม่ดีมากขึ้นทุกวัน...)"
10004010-103 = "(ฉันไม่อยากอายุเพิ่มขึ้นเลย...)"
10004010-114 = "เป็นยังไงบ้าง? รู้สึกถึงการเปลี่ยนแปลงของผิวบ้างมั้ย?"
10004010-115 = "เรื่องผิวฉันไม่ค่อยแน่ใจเท่าไหร่... แต่ตอนนี้รู้สึกร้อนไปทั้งตัวเลย..."
10004010-116 = "เอ๊ะ? แปลกจังเลยนะ ส่วนผสมที่ฉันใส่ลงไปไม่มีอะไรที่จะเพิ่มอุณหภูมิให้ร่างกายเลยนะ..."
10004010-117 = "วะ...ว้าก?!"
10004010-118 = "มะ...มีอะไรเหรอคะ คุณซายะ?"
10004010-119 = "เอ่อ... คือว่า... แบบว่า..."
10004010-120 = "เอ๊ะ? ทำไมจู่ๆ เหมือนคุณซายะก็ตัวใหญ่ขึ้นล่ะคะ? จู่ๆ ก็รู้สึกเหมือนระดับสายตาฉันลดต่ำลงด้วย..."
10004010-121 = "ท่านซายะไม่ได้ตัวใหญ่ขึ้นหรอก เธอต่างหากที่ตัวเล็กลง! ดูที่กระจกสิ!"
10004010-122 = "กระจกเหรอคะ?"
10004010-132 = "เอ๋~~?! ทะ...ทำไมร่างกายฉันถึงเปลี่ยนไปแบบนี้ล่ะคะ?"
10004010-133 = "ทะ...ท่านซายะก็ไม่รู้เหมือนกัน! นี่เป็นผลข้างเคียงที่คาดไม่ถึงเลย!"
10004010-134 = "ผลข้างเคียงที่คิดเอาไว้คือตัวจะยืดออกเหมือนยาง หรือมีหนวดยาวขึ้นเหมือนพวกแมวแท้ๆ...#nแต่คาดไม่ถึงเลยว่าจะมีผลข้างเคียงทำให้ตัวเล็กลงแบบนี้น่ะ..."
10004010-135 = "คุณซายะ นี่คุณให้ฉันดื่มยาแบบนั้นงั้นเหรอคะ..."
10004010-136 = "มะ...ไม่ต้องห่วง! อัจฉริยะแบบท่านซายะน่ะ ไม่นานก็ปรุงยาแก้ผลข้างเคียงขึ้นมาได้อยู่แล้ว!"
10004010-137 = "ระ... รอก่อนนะ ฉันจะไปที่คลังของชมรมวิจัยศาสตร์การปรุงยาแล้วหายาแก้ผลข้างเคียงมาให้!"
10004010-142 = "ฮือ... แบบนี้มันหายนะชัดๆ เลยค่ะ ถึงฉันจะเคยพูดว่าอยากกลับไปเป็นเด็กก็เถอะ#nแต่ไม่นึกเลยว่าจะกลายมาเป็นเด็กจริงๆ แบบนี้..."
10004010-143 = "แต่ถึงจะเป็นผลข้างเคียงก็จริง แต่ผิวของฉันก็เรียบเนียนขึ้นมากเลยนะคะ เหมือนจะมีกลิ่นหอมอ่อนๆ#nของผิวเด็กอีกด้วย..."
10004010-150 = "นอกจากนั้น... ถึงจะขยับตัวเร็วๆ แต่ก็ไม่รู้สึกว่าปวดไหล่เลย แถมร่างกายยังรู้สึกเบาลงอีกด้วยค่ะ!"
10004010-151 = "ย้อนวัยกลับไปอยู่ในร่างเด็กอาจจะไม่ใช่เรื่องที่แย่ก็ได้..."
10004010-154 = "[ns] \"สวัสดี\""
10004010-155 = "คุณครู [USERNAME]? ทะ...ทำไมถึงมาที่นี่คะ..."
10004010-156 = "ตะ... ตัวเล็กลงแบบนี้แล้วจะทำยังไงดี..."
10004010-157 = "[s] \"เธอเป็นเด็กนักเรียนจากสวนต้นบ๊วยเหรอ?\""
10004010-158 = "คะ?"
10004010-159 = "เอ่อ... คือว่า... "
10004010-162 = "(เอ๊ะ? ดูเหมือนคุณครูจะจำฉันไม่ได้นะ...)"
10004010-163 = "(คุณครูไม่มีทางจำได้อยู่แล้วล่ะ จู่ๆ ฉันก็กลายเป็นเด็กน้อยที่ตัวเล็กกว่าโคโคน่าแบบนี้#nคงไม่คิดว่าเป็นคนคนเดียวกันหรอกสินะคะ)"
10004010-164 = "(....ถ้าพูดเรื่องยาของซายะอาจทำให้คุณครูรำคาญใจก็ได้... จะโกหกไปดีมั้ยนะ)"
10004010-167 = "คะ...ค่ะ! ฉันเป็นเด็กนักเรียนใหม่ของสวนต้นบ๊วย อายุ 9 ขวบ ชื่อ ชะ... ชุนหลิงค่ะ!"
10004010-168 = "ฉันออกมาเดินเล่นกับพี่ชุนที่ซานไห่จิงแล้วก็หลงทาง..."
10004010-169 = "[s1] \"คือครูนัดกับซายะไว้น่ะ...\"\n[s2] \"แล้วเธอเห็นซายะบ้างรึเปล่า?\""
10004010-170 = "เอ่อ... ฉันไม่เห็นพี่ซายะเลยค่ะ น่าจะออกไปข้างนอกนะคะ?"
10004010-171 = "เอ่อ... ฉันไม่เห็นพี่ซายะเลยค่ะ น่าจะออกไปข้างนอกนะคะ?"
10004010-172 = "[s3] \"ถ้างั้นระหว่างรอ เราก็ไปตามหาชุนกันมั้ย\"\n[s4] \"เดี๋ยวครูจะพาไปส่งที่สวนต้นบ๊วยก่อนซายะจะกลับมาแล้วกัน\""
10004010-173 = "คะ? มะ...ไม่เป็นไรหรอกค่ะ..."
10004010-174 = "คะ? มะ...ไม่เป็นไรหรอกค่ะ..."
10004010-177 = "(ระ... รู้สึกเหมือนมาขัดขวางการออกไปทำธุระของคุณครูกับคุณซายะเลยละค่ะ)"
10004010-178 = "(แถมยังพูดโกหกคุณครูไปโดยที่ไม่ตั้งใจอีกด้วย...)"
10004010-179 = "(เดี๋ยวสิ พอมาคิดๆ ดูแล้ว ที่ต้องมาตกอยู่ในสถานการณ์แบบนี้ก็เป็นความรับผิดชอบของคุณซายะนี่นา?)"
10004010-180 = "(ถ้ายาไม่มีผลข้างเคียงตั้งแต่แรก ฉันก็คงไม่ต้องโกหกคุณครูแบบนี้...ฉันก็แค่โกหกเพื่อปกป้องตัวเอง!)"
10004010-183 = "ถ้างั้น... ขอรบกวนหน่อยนะคะ คุณครู"
10004010-184 = "[s] \"ว่าแต่รู้รึเปล่าว่าชุนไปไหนน่ะ?\""
10004010-185 = "นั่นสิคะ... ถ้าเป็นแถวๆ นี้... อาจจะไปที่ย่านการค้าเทพเต่าดำก็ได้นะคะ?"
10004010-186 = "ได้ยินมาว่าไม่มานานนี้ที่ร้านขนมถังหูลู่ของโปรดของพี่ชุนที่ย่านการค้าเทพเต่าดำวางจำหน่าย#nสินค้าใหม่ด้วยค่ะ"
10004010-187 = "นะ...แน่นอนว่าพี่ชุนไม่ได้ทิ้งพวกเด็กๆ มาเที่ยวเล่นตามอำเภอใจ หรือละทิ้งหน้าที่ของผู้ฝึกสอน#nไปหรอกนะคะ!"
10004010-188 = "[s] \"ว่าแต่...ทำไมชุนหลิงถึงต้องแก้ตัวให้ชุนด้วยล่ะ?\""
10004010-189 = "นะ...นั่นเพราะว่าถ้าเป็นพี่ชุนล่ะก็ จะต้องพูดแบบนี้อยู่แล้วน่ะสิคะ ฮ่าฮ่า..."
10004010-190 = "เอาล่ะค่ะ อย่ามัวชักช้าอยู่เลยค่ะ รีบไปกันเถอะค่ะ คุณครู!"

[translation]
51100-1 = "Episode 10;Blushing Cheeks"
51100-6 = "[ns] \"Yukari, you look a little out of it. Want to take a break?\""
51100-10 = "Ah..."
51100-11 = "I'm...out of it?"
51100-12 = "Ah, well... Um..."
51100-13 = "...I was thinking about everything that happened today."
51100-14 = "..."
51100-15 = "...Even in the Hyakkaryouran, Renge always possessed an exemplary sense of duty."
51100-16 = "So, when Renge said that the Hyakkaryouran was gone, and can never come back..."
51100-17 = "Well... I was a little taken back."
51100-21 = "...Hiyah!"
51100-26 = "[ns] \"W-Wait, Yukari, don't slap yourself!\""
51100-29 = "Enough of these defeatist thoughts!"
51100-30 = "I, Yukari, am the Hyakkaryouran's elite! I will not succumb to despair!"
51100-31 = "Ahem! I'm certain Renge was venting her anger because she is still in shock from the club closing..."
51100-32 = "But as an elite, I must prepare for what lies ahead, not dwell on the past!"
51100-33 = "Sure, my plan of soliciting Renge's aid may have failed..."
51100-34 = "But the Hyakkaryouran has other officers we can enlist!"
51100-35 = "[s] \"Kikyou... She was the Hyakkaryouran's operations officer, right?\""
51100-36 = "Yes! Kikyou is a clear thinker... Once she hears my reasons for holding a succession contest, she'll be glad to help!"
51100-37 = "And... Kikyou and Renge have been friends since childhood."
51100-38 = "She'll definitely help us convince Renge!"
51100-39 = "Mmm! Yes! It's a little gauche to boast, but...this is truly a perfect plan!"
51100-40 = "So, [USERNAME] Sensei! Can I count on your continued assistance?"
51100-41 = "[s] \"Yup. I promised, after all.\""
51100-42 = "...! "
51100-43 = "Heh heh heh! Yes!"
51100-47 = "Then, without further ado—!"
51100-54 = "My lady. I've come to escort you home."
51100-60 = "Ah..."
51100-61 = "It seemed like you were occupied on business for the duration of the day, so I waited until now to present myself..."
51100-62 = "The hour is late. It is time for you to return."
51100-63 = "But I still have something I must do..."
51100-64 = "At so late an hour?"
51100-65 = "Is it...something related to the individual standing next to you?"
51100-66 = "Who are you? You have accompanied the young mistress since this morning. "
51100-67 = "If you've approached her with sinister intentions, then as her loyal retainer I will not stand idle!"
51100-68 = "[s] \"Ah, I am Schale's Sensei.\""
51100-69 = "The notorious Sensei of Schale? ...Truly?"
51100-70 = "Yes! That's correct! So please, don't misunderstand!"
51100-71 = "Sensei was just trying to help with my unreasonable demands...by my request!"
51100-75 = "...As you say, my lady. I understand."
51100-76 = "I apologize if I have caused any offense. "
51100-80 = "Now, more importantly, my lady... The sun has set."
51100-81 = "But I still have something..."
51100-82 = "My lady. Please do not be stubborn. "
51100-83 = "..."
51100-84 = "[s1] \"It's gotten late. Shall we head back for today?\"\n[s2] \"I can meet you tomorrow instead. Pinky promise.\""
51100-89 = "My lady, you cannot still..."
51100-90 = "I see! This isn't goodbye... It's a promise to keep fighting another day!"
51100-91 = "Yes, I understand!"
51100-92 = "Then until tomorrow!"
51100-93 = "...Very well. Then..."
51100-101 = "[ns] \"(This morning Niya called me and I met Yukari...)\""
51100-103 = "\"(So much has happened since then, it feels like a distant memory.)\""
51100-112 = "Who cares?! That didn't keep her from abandoning us!"
51100-114 = "\"(Renge's words cut Yukari deeply...)\""
51100-117 = "I will say just one thing before we depart."
51100-118 = "My lady is quite busy with her familial responsibilities."
51100-119 = "I would be grateful if you encouraged her to return more quickly tomorrow. Now, we'll take our leave."
51100-124 = "I wandered through the academy, deep in thought as I contemplated the tangled web I found myself in..."
51100-128 = "[log=???]<────This way!>[/log]"
51100-133 = "[ns] \"...?\""
51100-138 = "What's all the commotion? The festival's supposed to start soon, we can't keep havin' these delays!"
51100-142 = "The blasted Mouryo are picking a fight with someone in the western district."
51100-144 = "Again?"
51100-145 = "Tch! Why are they set on ruinin' the festival for everyone? Who are they fighting now?"
51100-146 = "A student of the Hyakkaryouran, I think... I heard it was someone in a haori!"
51100-150 = "[ns] \"...Huh?\""
51100-154 = "'Bout time! We've been lookin' for you all day!"
51100-156 = "Thought I found you earlier, but there's no way we're lettin' you escape this time!"
51100-161 = "[ns] \"That's...!\""
51100-164 = "Next Episode;Member of the Hyakkaryouran"

[translation]
51100-1 = "第10話;通紅的臉"
51100-6 = "[ns]「紫，累了的話就休息一下吧？」"
51100-10 = "啊……"
51100-11 = "好的……小女子看起來很累嗎……？"
51100-12 = "啊，那個……我……"
51100-13 = "只是有點在意今天發生的事……"
51100-14 = "……"
51100-15 = "……蓮華前輩是百花繚亂中責任感最強的人。"
51100-16 = "而那樣的蓮華前輩卻說百花繚亂已經不復存在、已經結束了……"
51100-17 = "嗯……小女子有點不知所措。"
51100-21 = "……哎！"
51100-26 = "[ns]「等，等等！紫！為什麼突然打自己的臉……」"
51100-29 = "亂七八糟的想法就到此為止！"
51100-30 = "沒錯！我是百花繚亂的菁英，不會因為這點小事就無精打采！"
51100-31 = "嗯……蓮華前輩一定是因為混亂才會那樣！"
51100-32 = "與其被過去束縛而裹足不前，不如想著即將到來的明天，這才是真正的菁英！"
51100-33 = "雖然請蓮華前輩幫忙的計畫失敗了……"
51100-34 = "但我們還有其他百花繚亂的幹部！"
51100-35 = "[s]「你之前說桔梗他……是百花繚亂的作戰參謀對吧？」"
51100-36 = "是的！桔梗前輩一定能理解這次的「繼承戰」，爽快地提供幫助才對！"
51100-37 = "而且……桔梗前輩和蓮華前輩是青梅竹馬。"
51100-38 = "他一定也會幫忙說服蓮華前輩的！"
51100-39 = "嗯嗯！雖然這是小女子我自己想出來的……不過這真是完美的計劃！"
51100-40 = "所以[USERNAME]老師！能請您繼續幫忙嗎？"
51100-41 = "[s]「嗯，我本來就打算這麼做。」"
51100-42 = "……！"
51100-43 = "呵呵呵！是！"
51100-47 = "那我們就趕緊……！"
51100-54 = "小姐，我來迎接您了。"
51100-60 = "啊……"
51100-61 = "您今天好像整天都有事要辦，所以我一直等待著您。"
51100-62 = "但現在時候已經不早，您差不多該回家了。"
51100-63 = "可是我還有事要做……"
51100-64 = "這麼晚還有事要做嗎？"
51100-65 = "難道……和您身旁的那位有關係嗎？"
51100-66 = "請問您是哪位？#n似乎從早上就和小姐在一起。"
51100-67 = "如果您心懷不軌……我身為勘解由小路家的僕人，絕對不會善罷甘休！"
51100-68 = "[s]「啊，我是夏萊的老師。」"
51100-69 = "夏萊的老師，就是那位大名鼎鼎的……？"
51100-70 = "是的，沒錯！所以請你別誤會！"
51100-71 = "老師是因為我太固執……太一意孤行才會陪著我的！"
51100-75 = "……既然小姐都這麼說了，我明白了。"
51100-76 = "是我失禮了，非常抱歉。"
51100-80 = "不過小姐，太陽已經下山了。"
51100-81 = "可是……我還有事要做……"
51100-82 = "小姐，您還想耍賴嗎？"
51100-83 = "…………"
51100-84 = "[s1]「今天已經很晚了，你就先回去吧？」\n[s2]「明天再見吧，我答應你。」"
51100-89 = "小姐，難道您還……"
51100-90 = "原來如此！#n這不是離別……是為了日後所做的約定！"
51100-91 = "我知道了！"
51100-92 = "那我們明天見……！"
51100-93 = "……我明白了。#n告辭……"
51100-101 = "[ns]「今天先是被仁耶叫來……又遇見了紫……」"
51100-103 = "（真的發生了很多事）"
51100-112 = "我才不管！反正我們已經被拋棄了！"
51100-114 = "（剛才蓮華說的話，以及……）"
51100-117 = "在離開前，我有些話想說。"
51100-118 = "小姐現在正忙於勘解由小路家的工作。"
51100-119 = "因此明天還請盡早讓小姐平安歸來，感激不盡。#n……告辭。"
51100-124 = "（就在因為各種錯綜複雜的事而陷入沉思時）"
51100-128 = "[log=???]「──這裡。」[/log]"
51100-133 = "[ns] 「……？」"
51100-138 = "嗯？發生什麼事了？現在正忙的說。"
51100-142 = "聽說妖怪劇團在西區和某人吵起來了！"
51100-144 = "又來了？"
51100-145 = "為什麼每當慶典的時候都要鬧事！真是的！這次又跟誰起爭議了？"
51100-146 = "這個嘛……那個人身上穿著羽織……好像是百花繚亂的學生！"
51100-150 = "[ns]「……嗯？」"
51100-154 = "我今天可是到處找你找了一整天啊！"
51100-156 = "雖然白天不小心認錯人，但這次絕對不會放過你！"
51100-161 = "[ns]「……那是？」"
51100-164 = "下一話;百花繚亂的成員"

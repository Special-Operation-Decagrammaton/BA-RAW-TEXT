[translation]
10038030-1 = "第3話;大人與孩子、孩子、孩子"
10038030-3 = "這座公園，平時明明有很多學生來往的說……"
10038030-4 = "現在卻幾乎不見人影，甚至讓人覺得有點荒涼呢。"
10038030-5 = "原本會在這裡練習京劇的京劇部成員都不見人影，#n就連一邊吃著糖葫蘆或芒果鬆餅，一邊聊天的學生們也……"
10038030-6 = "……"
10038030-10 = "啊，不過那邊還有個攤販耶！#n老師，我們也去吃點東西吧！我想要吃蛋塔！"
10038030-14 = "妃妃也想吃！#n吃完之後，我會乖乖刷牙的！"
10038030-15 = "[s]「哦……嗯。好吧……」"
10038030-17 = "謝謝老師～！"
10038030-20 = "老師老師！你知道嗎？#n桃源鄉這裡好像也開始賣班戟了哦！"
10038030-21 = "雖然三年級的……姐姐們說班戟違背了傳統，所以都不太願意吃……"
10038030-22 = "可是聽說只要吃過一次就會徹底愛上哦！"
10038030-23 = "班戟是什麼呀？妃妃不知道。"
10038030-24 = "哼，哼，哼……所謂的班戟……！"
10038030-29 = "就是在薄薄的餅皮裡塞滿鮮奶油和水果，然後再冰過的水果奶油蛋糕哦！"
10038030-30 = "雖然最受歡迎的是芒果口味……#n但不管是綠茶、巧克力、草莓……只要是適合的東西都能加進去！"
10038030-32 = "真不敢相信！世界上竟然有這麼棒的食物……！"
10038030-33 = "老師！妃妃也想吃吃看！"
10038030-34 = "[s]「可是剛剛不是才吃了蛋塔嗎……？」"
10038030-43 = "拜託～老師～？"
10038030-44 = "如果搭配濃郁的綠茶一起享用的話，肯定會超級好吃！"
10038030-45 = "先用綠茶中和水果及鮮奶油的柔和口感……#n等餘味清除乾淨之後，再吃上一口班戟……"
10038030-47 = "真的不可以嗎～？求求你嘛～？"
10038030-51 = "[ns]「好啦好啦……」"
10038030-55 = "哇！謝謝！"
10038030-56 = "妃妃最喜歡老師了！"
10038030-60 = "咦？老師你怎麼了？#n怎麼突然把喝進嘴裡的水都吐出來了！"
10038030-61 = "不行哦，老師。你不是大人了嗎？#n在公共場所不能這麼沒禮貌，這種事連妃妃也知道！"
10038030-62 = "[s]「知……道……了……」"
10038030-67 = "剛才吃太多東西了，來散散步消化一下吧！"
10038030-68 = "妃妃也覺得這個點子很棒！#n這裡不管什麼時候來都令人心曠神怡呢！"
10038030-69 = "如果運氣好的話，說不定還能遇到熊貓……啊，在那裡！"
10038030-75 = "咦……可是這樣不會危險嗎？#n畢竟熊貓終究也是熊……"
10038030-76 = "沒事的！這裡的熊貓已經很習慣人類了，而且還很親人哦。"
10038030-80 = "牠們都很喜歡竹子，所以只要像這樣遞出去……！"
10038030-85 = "嗶嗚嗚？"
10038030-89 = "嗶耶耶！"
10038030-90 = "你們看！牠在吃了！"
10038030-91 = "啊，好羨慕！妃妃也要，妃妃也要試試看！"
10038030-92 = "[s]「還是別靠得太近哦……」"
10038030-94 = "是～！"
10038030-98 = "我回來了！"
10038030-99 = "呼……今天做了好多事喔，妃妃好滿足！"
10038030-100 = "真的嗎？那真是太好了！"
10038030-101 = "老師呢？"
10038030-102 = "[s]「只要學生們滿足就行了……」"
10038030-103 = "可是我們不是學生，而是梅花園的孩子唷。"
10038030-104 = "[s]「只要孩子們滿足就行了……」"
10038030-105 = "老師的表情怎麼怪怪的？#n看起來有種已經看淡一切、放下紅塵的感覺……？"
10038030-106 = "沒什麼？不用特別在意？#n唔嗯……是嗎……"
10038030-114 = "啊，老師！歡迎來到梅花園。#n我聽說你今天陪梅花園的孩子們玩了一整天，真是辛苦你了。"
10038030-118 = "咦？你不是有一陣子沒來的那個孩子嗎？還有你旁邊的是……？"
10038030-123 = "他，他是最近才轉學來的妃妃！是旬姐姐叫我帶他去逛逛的！"
10038030-127 = "你好，心菜教官！我叫做妃妃！請多多指教！"
10038030-132 = "……！"
10038030-133 = "你，你看到了嗎，老師？#n我也是個受孩子們尊敬的教官……！"
10038030-143 = "咦，咦咦？為什麼突然露出那種欣慰的眼神？#n而且還一邊摸我的頭……！？"
10038030-144 = "嗯？這裡能讓你意識到世界還在正常運轉？#n這是什麼意思……？"
10038030-149 = "我，我先去找旬姐姐囉！"
10038030-153 = "妃妃也要一起去～！"
10038030-158 = "等，等一下！旬姐姐他……！"
10038030-162 = "嗚嗚，我今天一整天都沒看到他的說……"
10038030-163 = "[s]「我會想辦法找到他的……」"
10038030-164 = "老師要幫忙嗎？#n如果老師願意的話，我當然是輕鬆……不對，我是說非常感謝……"
10038030-165 = "嗯？你說這件事必須由老師來做？#n老師今天說的話，我好像都有點聽不懂……"
10038030-170 = "總之這件事就麻煩你囉。因為我還得去照顧其他學生。"
10038030-171 = "哎呀～！誰叫我是梅花園的教官呢！#n這種事也是理所當然的嘛！嘿嘿！"
10038030-174 = "呼……雖然沒有穿幫，但剛才還真驚險呢。#n心菜醬的直覺，有時候還真不是普通的準……"
10038030-175 = "呼呣……"
10038030-176 = "呼。雖然有驚無險，幸好算是達成了暗訪山海經的目的。#n兩位都辛苦了。"
10038030-177 = "……您還滿意嗎，門主大人？"
10038030-178 = "唔嗯。怎麼說呢……"
10038030-183 = "妃姬……？"
10038030-191 = "！！？？"
10038030-192 = "你，你好！我的名字叫妃妃。#n因為今天剛轉學過來，所以還不認識大家。請問你是……？"
10038030-196 = "……"
10038030-197 = "……"
10038030-198 = "妃姬……你在做什麼……？"
10038030-199 = "那，那個，我是妃妃……"
10038030-200 = "不是，再怎麼說這也太勉強了。"
10038030-201 = "……"
10038030-202 = "唉，果然騙不過汝啊。"
10038030-203 = "……能麻煩你們解釋一下嗎，妃姬，老師？"
10038030-204 = "[s]「我們……先換個地方吧。」"
10038030-210 = "……好，我已經確認過周圍沒有人，聲音也不容易被聽見。"
10038030-211 = "就算有人經過看到我們，也只會以為是梅花園的孩子和老師在公園裡而已。"
10038030-212 = "所以你就坦白說吧，妃姬。#n你究竟在做什麼？"
10038030-214 = "沒什麼大不了的。"
10038030-215 = "不過是……選擇了最適合暗訪的裝扮罷了。"
10038030-216 = "暗訪啊……原來如此。"
10038030-217 = "我也不是不知道你經常會四處暗訪。"
10038030-218 = "不過非得選擇「妃妃」的理由，我還是不太理解……"
10038030-219 = "唔，唔嗯。#n畢竟挑選暗訪裝扮需考量時機、情況與環境……"
10038030-220 = "好吧。既然你都這麼說了，就當成是這樣吧。#n我記得你以前還曾經扮成我們的成員進入過玄武商會對吧？"
10038030-221 = "呵呵，妾身也還記得此事。#n當時的裝扮相當完善，起初也一切順利……"
10038030-222 = "可惜你的料理技術太差，所以一下就穿幫了！哈哈哈！"
10038030-223 = "幸好當時發現的人是我。#n換作是其他人的話，說不定就要發展成政治問題了吧。"
10038030-224 = "當時的人情應已奉還才是。"
10038030-225 = "我知道我知道。#n只是突然想起了以前的事而已。"
10038030-226 = "話說回來，汝至梅花園所為何事？"
10038030-227 = "我嗎？唔嗯……畢竟現在月影祭還未必能正常舉辦對吧？#n所以我才想把剩下的月餅分給梅花園的孩子們。"
10038030-228 = "你也要吃嗎？這邊還剩下幾個。"
10038030-229 = "月餅啊……真教人懷念。#n那麼妾身就不客氣了。"
10038030-230 = "老師要不要也吃一個？#n玄武商會的月餅可是名產哦？"
10038030-231 = "[s]「那我也不客氣了……」"
10038030-239 = "（才剛咬下一口月餅，香濃的味道便在口中蔓延）"
10038030-241 = "（眾人不發一語，靜靜地品嘗著月餅……）"
10038030-244 = "……妾身突然回憶起了吾等初次製作月餅品嘗時的往事。"
10038030-245 = "呃，你居然還記得那件事啊……？"
10038030-246 = "記得是放了蛋黃、核桃與紅豆餡的月餅。"
10038030-247 = "過去的事就讓它過去吧……"
10038030-248 = "畢竟那屬實令人印象深刻啊。#n紅豆餡略帶焦味，蛋黃尚未熟透，核桃也碎得毫無口感可言。"
10038030-249 = "當時負責壓模的是你吧，妃姬。"
10038030-250 = "是啊。因此才會導致月餅殘缺不全、型不成型。"
10038030-251 = "那究竟能否稱之為月餅，都不禁讓人疑惑……"
10038030-252 = "哎呀，總不可能第一次就成功嘛。大家都是這樣過來的。"
10038030-253 = "是啊，確實如此。#n不過……"
10038030-254 = "無論過了多久，當時的月餅依舊令妾身感到記憶猶新。"
10038030-255 = "……我大概也是在那個時候立志成為廚師的。"
10038030-256 = "汝得償所願了嗎？"
10038030-257 = "這點我也不好說，但或許多少接近了一點吧。#n妃姬你呢？"
10038030-258 = "妾身……並不明白。#n汝也知道，妾身從未想過要成為門主。"
10038030-259 = "……"
10038030-260 = "但你不是做的還挺好的嗎？"
10038030-261 = "雖然因為你管制玄武商會周圍的關係，導致整條街都陷入經營困難就是了……"
10038030-266 = "……對不起。對此妾身無話可說。"
10038030-267 = "沒事沒事，我也沒有要求你道歉的意思啦。"
10038030-268 = "大家手邊其實都有一定的預備資金，我也理解玄龍門這麼做是不得已的。#n最重要的是……你看。"
10038030-269 = "商會長都變成這副德性了，成員們也不好意思多說什麼吧？"
10038030-270 = "……雖然之後要安撫他們可能會挺麻煩的。"
10038030-271 = "真是辛苦汝了。"
10038030-272 = "你也一樣。#n只要不忘記初心，總會有辦法解決的。"
10038030-273 = "初心啊……"
10038030-274 = "怎麼了？"
10038030-275 = "沒什麼……汝的確擁有那樣的東西。"
10038030-276 = "但妾身是否也像汝一般……就連妾身自己也無法斷定。"
10038030-277 = "你……"
10038030-278 = "[s]「原來如此。但這樣不是也不錯嗎？」"
10038030-282 = "……何以見得呢，老師？"
10038030-283 = "[s1]「初心這種東西，通常是在失去之後才會出問題。」\n[s2]「如果打從一開始就沒有的話，也不必擔心會失去了吧。」"
10038030-286 = "若不存在便無從失去……是嗎？"
10038030-287 = "呵呵……確實如此。#n或許這是個嶄新的觀點啊，老師。"
10038030-288 = "那麼在老師眼中，妾身的表現如何呢？"
10038030-289 = "[s]「……我知道妃姬已經盡力做到最好了。」"
10038030-290 = "……是嗎。"
10038030-291 = "不過有時，即便拚盡全力也是不夠的。"
10038030-293 = "啊，類似的話偶爾也會在玄武商會聽見呢。"
10038030-294 = "「炒菜光只有努力是沒用的，重點是要炒得好才行」。"
10038030-295 = "是啊，說的沒錯。#n就好比鍊丹術研究會雖投入了眾多努力與心血，結果卻總是差強人意一般。"
10038030-296 = "你也別太取笑沙耶了。"
10038030-297 = "妾身此話並非特指沙耶哦？#n先前也還有其他問題……"
10038030-302 = "（等等，鍊丹術研究會……？）"
10038030-305 = "是的……雖說與其內容相比，目前造成的影響不算大，但光是此一傳言正在流傳……"
10038030-308 = "（現在鍊丹術研究會的會長不在……）"
10038030-312 = "現任鍊丹術研究會的會長沙耶雖然積極配合審問，#n但到目前為止，他並未提供任何有用的證詞。"
10038030-313 = "（還童症或許與鍊丹術研究會有關。既然如此……）"
10038030-317 = "等，等等！冤枉啊！#n我們鍊丹術研究會和這次事件無關！"
10038030-318 = "（換個角度想想。倘若換作是妾身要回到山海經……？）"
10038030-322 = "已遭退學的學生，想不經任何手續就回歸母校十分困難。"
10038030-323 = "若對象是那個申谷誡……則更是如此。"
10038030-327 = "……！"
10038030-328 = "怎麼了，妃姬？"
10038030-329 = "是妾身疏忽了。#n眼下最危險的地方是鍊丹術研究會！"
10038030-330 = "鍊丹術研究會？為什麼突然這麼說？"
10038030-338 = "門主大人？發生什麼事了？"
10038030-339 = "美奈，立即去調查鍊丹術研究會的情況。"
10038030-340 = "……！您聯絡的正是時候，我打算向您報告此事──鍊丹術研究會發來了緊急通報！"

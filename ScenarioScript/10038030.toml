[translation]
10038030-1 = "ตอนที่ 3;ผู้ใหญ่หนึ่ง เด็กสาม"
10038030-3 = "ปกติแล้วที่นี่เป็นสวนสาธารณะที่มีนักเรียนสัญจรไปมากันเยอะเลย..."
10038030-4 = "แต่ตอนนี้แทบจะไม่มีคนเลยนะคะ รู้สึกอ้างว้างยังไงไม่รู้ค่ะ "
10038030-5 = "ไม่มีทั้งสมาชิกชมรมการแสดงงิ้วที่ชอบมาฝึกซ้อมกัน แล้วก็ไม่มีนักเรียนที่มานั่งกินถังหูลู่ หรือวาฟเฟิลมะม่วงแล้วคุยนู่นนี่กันด้วย..."
10038030-6 = "..."
10038030-10 = "อ๊ะ แต่ยังมีร้านค้าอยู่ตรงนั้นค่ะ! พวกเราก็ไปกินอะไรกันเถอะค่ะคุณครู ฉันอยากกินทาร์ตไข่ค่ะ!"
10038030-14 = "คิกิก็ด้วยค่ะ! ไว้กินเสร็จแล้วจะตั้งใจแปรงฟันเลยค่ะ!"
10038030-15 = "[s] \"อ่า... อืม เอาสิ...\""
10038030-17 = "ขอบคุณค่ะ!"
10038030-20 = "คุณครู คุณครู! รู้หรือเปล่าคะว่าร้านนิทานดอกท้อก็มีเครปขายด้วย?"
10038030-21 = "แต่ว่าพวกรุ่นพี่ปี 3 ไม่ค่อยซื้อกินเท่าไร... แล้วก็บอกว่าเป็นขนมที่ทำลายประเพณีค่ะ"
10038030-22 = "แต่เห็นว่าถ้าได้ลองกินแล้ว จะต้องกลับมาซ้ำอีกรอบเลยด้วยค่ะ!"
10038030-23 = "เครปคืออะไรเหรอคะ? คิกิไม่เห็นรู้จักเลยค่ะ"
10038030-24 = "ฮุฮุฮุ... เครปน่ะเหรอคะ...!"
10038030-29 = "ก็คือแป้งบางๆ ที่สอดไส้วิปปิ้งครีมกับผลไม้เข้าไปเยอะๆ แล้วพักไว้ให้เย็นน่ะค่ะ!"
10038030-30 = "ไส้ที่นิยมมากที่สุดก็คือมะม่วง... แต่บางทีก็ใส่ช็อกโกแลต ชาเขียว สตรอว์เบอร์รี หรืออย่างอื่นที่เข้า#nกันได้น่ะค่ะ!"
10038030-32 = "น่าเหลือเชื่อ มีอาหารที่น่าอร่อยแบบนั้นด้วยเหรอคะเนี่ย...!"
10038030-33 = "คุณครูคะ! คิกิอยากกินค่ะ!"
10038030-34 = "[s] \"แต่เมื่อกี้เพิ่งบอกว่าอยากกินทาร์ตไข่กันไม่ใช่เหรอ...?\""
10038030-43 = "ขอกินเครปเถอะนะคะ~ น้า~?"
10038030-44 = "ถ้าได้กินคู่กับชาเขียวเข้มๆ รับรองว่าต้องอร่อยเหาะแน่นอนค่ะ!"
10038030-45 = "ชาเขียวช่วยเสริมรสชาติของวิปปิ้งครีมและผลไม้ค่ะ ถ้าเราได้ดื่มชาเขียวจนสดชื่น แล้วตักเครปเข้าปากอีกคำหนึ่งละก็..."
10038030-47 = "ขอกินไม่ได้เหรอคะ~? นะนะนะ~?"
10038030-51 = "[ns] \"ก็ได้ๆ...\""
10038030-55 = "ว้าว! ขอบคุณค่ะ!"
10038030-56 = "คิกิชอบคุณครูที่สุดเลยค่ะ!"
10038030-60 = "เอ๋? เป็นอะไรไปเหรอคะ? เกือบสำลักน้ำที่กำลังดื่มอยู่แล้วนะคะ!"
10038030-61 = "ไม่ได้นะคะคุณครู คุณครูเป็นผู้ใหญ่แล้วนะคะ อยู่ในที่สาธารณะก็ต้องรักษามารยาทสิคะ เรื่องแค่นี้คิกิยังรู้เลยค่ะ!"
10038030-62 = "[s] \"จ้า... จ้า...\""
10038030-67 = "เรากินกันเยอะจนแน่นท้องเลย แบบนี้คงต้องไปเดินย่อยกันหน่อยแล้วละค่ะ!"
10038030-68 = "คิกิเห็นด้วยค่ะ นั่นเป็นความคิดที่ดีเลยนะคะ! พอมาที่นี่ทีไรก็สบายใจขึ้นทุกครั้งเลยค่ะ!"
10038030-69 = "บางทีถ้าโชคดี ก็อาจได้เห็นแพนด้าด้วยนะคะ... อ๊ะ อยู่ตรงนั้นค่ะ!"
10038030-75 = "อ่า... แต่ว่าจะไม่อันตรายไปหน่อยเหรอคะ? แพนด้าก็เป็นหมีนะ..."
10038030-76 = "ไม่เป็นไรหรอกค่ะ! แพนด้าที่นี่ไม่ใช่แค่คุ้นเคยกับผู้คนหรอกนะคะ ต้องบอกว่าเด็กๆ พวกนี้ ชอบคนเอามากๆ เลยละค่ะ!"
10038030-80 = "เด็กๆ ที่อาศัยอยู่ที่นี่ชอบกินไผ่เป็นพิเศษเลยค่ะ ถ้าเราไปเด็ดมายื่นให้แบบนี้ละก็...!"
10038030-85 = "งูว???"
10038030-89 = "งู้ววว!"
10038030-90 = "ดูสิคะ! เคี้ยวตุ้ยๆ เลย!"
10038030-91 = "อ๊ะ น่าอิจฉาจัง! คิกิก็อยากป้อนบ้างค่ะ ขอคิกิป้อนบ้างนะคะ!"
10038030-92 = "[s] \"แต่ก็อย่าเข้าไปใกล้จนเกินไปนะ\""
10038030-94 = "ค่า~!"
10038030-98 = "กลับมาแล้วค่า~!"
10038030-99 = "ฮู่ว... เป็นวันที่ได้ทำอะไรเยอะจังเลยนะคะ คิกิมีความสุขจังเลยค่ะ!"
10038030-100 = "จริงเหรอคะ? โล่งอกไปทีนะคะที่ได้ยินแบบนี้!"
10038030-101 = "แล้วคุณครูล่ะคะ เป็นยังไงบ้าง?"
10038030-102 = "[s] \"ถ้านักเรียนมีความสุขละก็นะ...\""
10038030-103 = "พวกฉันไม่ได้เป็นนักเรียนแบบพวกพี่ๆ นะคะ พวกฉันเป็นนักเรียนของสวนต้นบ๊วยต่างหากค่ะ"
10038030-104 = "[s] \"ถ้าเด็กๆ มีความสุขละก็นะ...\""
10038030-105 = "ว่าแต่ทำไมทำหน้าแบบนั้นล่ะคะ? เหมือนกับว่าได้ปลดปล่อยทุกอย่างยังงั้นเลยละ...?"
10038030-106 = "ไม่มีอะไรงั้นเหรอคะ? ไม่ต้องเป็นห่วงก็ได้เหรอคะ? อืม... เอาอย่างนั้นเหรอคะ..."
10038030-114 = "อ๊ะ คุณครู! ยินดีต้อนรับสู่สวนต้นบ๊วยค่ะ ได้ยินว่าวันนี้ไปเล่นกับเด็กๆ ในสวนต้นบ๊วยมาด้วยเหรอคะ? คงเหนื่อยน่าดูเลยนะคะ"
10038030-118 = "เอ๋? เธอคือเด็กที่ไม่เจอมาสักพักแล้วนี่นา? แล้วเด็กคนข้างๆ คือ...?"
10038030-123 = "ปะ... เป็นนักเรียนที่เพิ่งย้ายมาใหม่ ชื่อคิกิค่ะ! พี่ชุนฝากให้ฉันดูแลนักเรียนใหม่น่ะค่ะ!"
10038030-127 = "สวัสดีค่ะ ผู้ฝึกสอนโคโคน่า! ฉันชื่อคิกิค่ะ ขอฝากตัวด้วยนะคะ"
10038030-132 = "...!"
10038030-133 = "ดะ... ได้สิ! เห็นแล้วใช่มั้ยคะคุณครู? บอกแล้วว่าฉันเป็นผู้ฝึกสอนที่เด็กๆ พากันเคารพ!"
10038030-143 = "เอะ... เอ๋? ทำไมถึงมองกันด้วยสายตาที่ปลื้มใจอย่างนั้นล่ะคะ? แถมยังมาลูบหัวกันอีก...?!"
10038030-144 = "คะ? พอได้มาที่นี่ ก็เหมือนได้ค้นพบหลักฐานที่บอกว่าโลกยังคงดำเนินไปอย่างปกติงั้นเหรอคะ? พูดเรื่องอะไรคะเนี่ย...?"
10038030-149 = "พะ... พวกฉันขอตัวไปหาพี่ชุนก่อนนะคะ!"
10038030-153 = "ขอคิกิไปด้วยนะคะ~!"
10038030-158 = "ดะ... เดี๋ยวก่อนสิ! ตอนนี้พี่ชุน...!"
10038030-162 = "เอ่อ... วันนี้ฉันยังไม่เห็นพี่ชุนเลย ไม่รู้เลยนะว่าพี่เขาไปไหน..."
10038030-163 = "[s] \"เดี๋ยวครูตามหาชุนให้เอง ไม่ต้องห่วงนะ...\""
10038030-164 = "คุณครูจะหาเองเหรอคะ? ถ้าแบบนั้นก็สบายฉัน... ไม่สิ ถ้าแบบนั้นฉันก็ต้องขอบคุณเลยค่ะ..."
10038030-165 = "คะ? นี่เป็นสิ่งที่คุณครูต้องทำงั้นเหรอคะ? วันนี้คุณครูเอาแต่พูดอะไรแปลกๆ นะคะ..."
10038030-170 = "ถ้าอย่างนั้นฉันก็ขอรบกวนด้วยนะคะ พอดีฉันต้องไปดูแลนักเรียนคนอื่นน่ะค่ะ"
10038030-171 = "ก็ฉันเป็นผู้ฝึกสอนเต็มตัวของสวนต้นบ๊วยนี่คะ! เรื่องแค่นี้ฉันต้องทำอยู่แล้วค่ะ อะแฮ่ม!"
10038030-174 = "ฮู่ว... ถึงจะยังไม่โดนจับได้ แต่ถ้ามีอะไรผิดปกติก็คงเกิดเรื่องใหญ่ไปแล้วนะคะ พอดีโคโคน่าจังเป็นคนที่เซ้นส์ดีหากมีอะไรแปลกๆ น่ะค่ะ"
10038030-175 = "อืม..."
10038030-176 = "ฮู่ว... แต่ก็ถือว่าเราสืบสถานการณ์ลับๆ ในซานไห่จิงได้สำเร็จตามเป้าหมายสินะ เราขอบใจทุกคนมาก"
10038030-177 = "เป็นอย่างไรบ้างคะ ท่านประมุข?"
10038030-178 = "อืม... จะพูดว่าอย่างไรดีนะ..."
10038030-183 = "คิซากิ...?"
10038030-191 = "!!??"
10038030-192 = "สะ... สวัสดีค่ะ! ฉันชื่อคิกิค่ะ เพิ่งจะย้ายเข้ามาใหม่ก็เลยยังไม่รู้จักใครมากนักค่ะ คุณเป็นใครเหรอคะ?"
10038030-196 = "..."
10038030-197 = "..."
10038030-198 = "คิซากิ... เธอทำอะไรอยู่น่ะ...?"
10038030-199 = "อะ... เอ่อ... ฉันชื่อคิกิ..."
10038030-200 = "คิกงคิกิอะไรกัน ไม่เนียนเลยนะ"
10038030-201 = "..."
10038030-202 = "ฮู่ว... เราหลอกสายตาเธอไม่ได้อย่างนั้นสินะ "
10038030-203 = "ช่วยอธิบายหน่อยได้มั้ย คิซากิ คุณครูก็ด้วย"
10038030-204 = "[s] \"ครูว่า... เราย้ายที่กันก่อนเถอะ\""
10038030-210 = "ดีละ... ฉันตรวจสอบแล้วว่าแถวนี้ไม่มีใครอยู่ ถ้าคุยอะไรกันคงไม่มีใครได้ยินหรอก"
10038030-211 = "และต่อให้ใครผ่านมาแล้วเห็นพวกเรา ก็คงคิดว่านักเรียนจากสวนต้นบ๊วยออกมาเดินเล่นกับคุณครูน่ะ"
10038030-212 = "เพราะงั้นก็บอกฉันมาตามตรงเลยดีกว่า คิซากิ นี่เธอกำลังทำอะไรอยู่น่ะ?"
10038030-214 = "ไม่ใช่อะไรยิ่งใหญ่หรอก"
10038030-215 = "ก็แค่... แต่งกายให้เหมาะสมกับการสืบสถานการณ์อย่างลับๆ น่ะ"
10038030-216 = "อ้อ... สืบสถานการณ์อย่างลับๆ อืม อย่างนี้สินะ..."
10038030-217 = "แต่ก็เอาเถอะ ใช่ว่าฉันจะไม่รู้ว่าเธอชอบปลอมตัวออกมาสืบสถานการณ์ลับๆ"
10038030-218 = "แต่ก็ยังไม่ค่อยเข้าใจว่าทำไมถึงต้องเป็น 'คิกิ' ด้วย..."
10038030-219 = "อะ... อืม... ก็ชุดที่จะหยิบมาใส่ปลอมตัว จะต้องเหมาะสมกับสถานการณ์โดยรอบ..."
10038030-220 = "เฮอะ... เอาเถอะ ก็คงเป็นไปอย่างที่เธอว่านั่นแหละนะ เมื่อก่อนยังเคยปลอมตัวเป็นสมาชิกย่านการค้า#nเทพเต่าดำแล้วเข้ามาสืบเรื่องในย่านการค้าด้วยไม่ใช่เหรอ?"
10038030-221 = "ฮุฮุ ยังจำได้สินะ ตอนนั้นเราปลอมตัวได้อย่างแนบเนียนเลยละ ตอนแรกคิดว่าจะผ่านฉลุยแล้วเสียอีก"
10038030-222 = "ก็เธอทำอาหารไม่ได้เรื่องเองนี่นา! ไม่แปลกหรอกที่จะโดนจับได้น่ะ ฮ่าฮ่าฮ่า! "
10038030-223 = "แต่ก็โชคดีนะที่ฉันจับได้ ถ้าเป็นเด็กๆ คนอื่นละก็ คงได้เป็นปัญหาทางการเมืองใหญ่โตไปแล้วละ"
10038030-224 = "แต่เราจำได้ว่าใช้หนี้นั้นไปแล้วนะ"
10038030-225 = "ก็จริงของเธอ ฉันแค่นึกถึงเรื่องสมัยก่อนขึ้นมาน่ะ"
10038030-226 = "จะว่าไป เหตุใดเธอถึงมาที่สวนต้นบ๊วยเล่า?"
10038030-227 = "ฉันเหรอ? ก็... ตอนนี้เรายังไม่แน่ใจว่าควรจัดเทศกาลเงาจันทร์หรือเปล่าไม่ใช่เหรอ? ฉันก็เลยคิดว่า#nจะเอาขนมเทศกาลเงาจันทร์ที่เหลือมาแจกเด็กๆ ในสวนต้นบ๊วยน่ะ"
10038030-228 = "เธอก็กินด้วยมั้ยล่ะ? ยังเหลืออยู่หลายอันเลยนะ"
10038030-229 = "ขนมไหว้พระจันทร์... คิดถึงขนมนี้จังเลย เราจะรับไว้ ขอบใจนะ"
10038030-230 = "คุณครูล่ะ กินด้วยกันมั้ย? ขนมไหว้พระจันทร์เป็นสินค้าพิเศษของย่านการค้าเทพเต่าดำเลยนะ"
10038030-231 = "[s] \"งั้นครูจะไม่เกรงใจละนะ...\""
10038030-239 = "(เมื่อกัดขนมไหว้พระจันทร์ รสชาติที่กลมกล่อมก็อบอวลในปาก)"
10038030-241 = "(ทุกคนนั่งกินขนมกันเงียบๆ โดยไม่พูดคุยอะไรกัน...)"
10038030-244 = "คิดถึงเรื่องเมื่อก่อนเลยนะ... ตอนที่เราทำขนมไหว้พระจันทร์ครั้งแรกแล้วแบ่งกันกินน่ะ"
10038030-245 = "อึก... ยังจำเรื่องนั้นได้อยู่เหรอ...?"
10038030-246 = "ขนมไหว้พระจันทร์อันนั้นใส่ไข่แดง วอลนัต แล้วก็ถั่วแดงบดด้วย"
10038030-247 = "เฮ้อ... เรื่องที่ผ่านไปแล้วลืมๆ ไปบ้างเถอะ..."
10038030-248 = "ช่างเป็นขนมที่ตราตรึงใจเลยละ ขนมอันนั้นได้กลิ่นไหม้นิดหน่อย ไข่แดงก็สุกเกินไป ส่วนวอลนัตก็แตกเป็นชิ้นเล็กชิ้นน้อยจนไม่ค่อยได้เนื้อสัมผัสเท่าไร"
10038030-249 = "คนที่เอาขนมไหว้พระจันทร์ใส่พิมพ์คือเธอไม่ใช่เหรอ คิซากิ"
10038030-250 = "ใช่ ขอบขนมก็เลยไม่สวย รูปร่างก็บิดเบี้ยวด้วย"
10038030-251 = "ที่จริงไม่ควรเรียกแป้งไหม้ๆ ชิ้นนั้นว่าขนมไหว้พระจันทร์ด้วยซ้ำ..."
10038030-252 = "แต่ก็นะ ไม่มีใครทำได้สมบูรณ์แบบตั้งแต่ครั้งแรกหรอก ขนมชิ้นแรกของทุกคนก็เป็นแบบนั้นทั้งนั้นละ"
10038030-253 = "ใช่ เราก็คิดเช่นนั้น ทว่า..."

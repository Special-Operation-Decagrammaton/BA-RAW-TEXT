[translation]
10026035-2 = "哈啊，哈啊……哈啊……"
10026035-3 = "那些傢伙是什麼鬼啊……！？！？#n怎麼會出現在這裡！？"
10026035-4 = "而且……那個模樣再加上那個服裝……！？"
10026035-5 = "嗚嗚……嚇到我腿都軟了……"
10026035-6 = "[s1]「沒事吧，小春？」\n[s2]「還走得動嗎？」"
10026035-9 = "嗯，嗯……我會努力……"
10026035-13 = "噫噫噫噫！！不，不行！不行不行不行！我的腿一直在發抖……！"
10026035-14 = "[s3]「……沒辦法了。」\n[s4]「小春，過來這邊。」"
10026035-20 = "老，老師……！？"
10026035-22 = "嗯……結果晃了老半天也沒找到什麼特別的線索呢……#n這裡到底是什麼地方呢？"
10026035-23 = "話說回來，他們兩位還真慢呢……#n該不會是迷路了吧……"
10026035-24 = "畢竟這裡相當廣闊。"
10026035-25 = "真糟糕……為了以防萬一，要不要我去找他們？"
10026035-26 = "不，要是這時候貿然跑進去，就會換成你迷路了……#n就算真的要去，我們也應該要先想好對策……"
10026035-27 = "……啊，他們來了。"
10026035-37 = "[ns5]「總算走出來了……」\n[ns6]「心臟都快跳出來了。」"
10026035-40 = "太好了，老師，你們回來得正好。"
10026035-41 = "我們正打算進去找你們呢……"
10026035-42 = "咦？我們還好嗎？#n那是什麼意思……"
10026035-43 = "……咦？"
10026035-44 = "[ruby=Mimesis]複製[/ruby]……？穿著泳裝的……？"
10026035-45 = "複，複製！？#n為什麼會突然……出現在這裡……？"
10026035-46 = "嗯……原來如此……"
10026035-47 = "這也不是完全不可能，畢竟這裡也是聖徒會的遺跡……"
10026035-48 = "為，為什麼你們好像都不在意它們穿泳裝的事……"
10026035-49 = "呵呵……我之前不是說過了嗎，這種小事不必在意……"
10026035-50 = "話說回來……哎呀……"
10026035-51 = "……呵呵。#n這我倒是沒有預料到呢……"
10026035-52 = "[s7]「……預料？」\n[s8]「什麼意思？」"
10026035-55 = "老師……"
10026035-56 = "先把背上的人放下來再說吧？"
10026035-57 = "[s] 「…………」"
10026035-59 = "[ns] 「……！？」"
10026035-60 = "小春醬……♡"
10026035-61 = "我們才分開一下子，你們兩位好像就做了一些非常不得了的事呢……"
10026035-62 = "沒錯，真的非常不得了！#n花子如果看到肯定也會……"
10026035-63 = "……嗯？"
10026035-64 = "咦？花，花子？你這麼說是什麼意思？"
10026035-65 = "小春……你那樣……"
10026035-66 = "牢牢趴在老師的背上……"
10026035-71 = "……？"
10026035-72 = "這個？呃……這，這是……"
10026035-77 = "不，不是！不是不是不是不是不是不是！！才不是！不是你們想的那樣！！"
10026035-78 = "我只是因為腿軟……"
10026035-79 = "……哎呀♡"
10026035-80 = "就說不是了！！不是！絕對不是！！！真的不是你們想的那樣！！"
10026035-82 = "真的不是啦！！！！！！！！！"

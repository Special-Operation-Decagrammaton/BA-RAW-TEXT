[translation]
10026035-2 = "แฮ่ก แฮ่ก... เฮ้อ..."
10026035-3 = "พวกนั้นคือใครกันน่ะ...!?!?  ทำไมถึงมาอยู่ที่นี่ล่ะ!?"
10026035-4 = "รูปร่างหน้าตาแบบนั้น... กับเครื่องแบบแบบนั้น...!"
10026035-5 = "อึก... ตกใจจนขาไม่มีแรงแล้วเลย..."
10026035-6 = "[s1] \"เป็นไงบ้าง โคฮารุ?\"\n[s2] \"พอเดินไหวอยู่หรือเปล่า?\""
10026035-9 = "อะ... อืม... ก็ต้องเดินให้ได้สิ..."
10026035-13 = "เฮือกกก!! มะ... ไม่ไหว! ไม่ไหวๆๆๆ! ขาสั่นเหมือนเจ้าเข้าเลย...!!"
10026035-14 = "[s3] \"...งั้นก็ช่วยไม่ได้นะ\"\n[s4] \"โคฮารุ มานี่สิ\""
10026035-20 = "......!?  คะ... คุณครู...!?"
10026035-22 = "อืม... สุดท้ายเราก็ไม่เจออะไรเป็นพิเศษตรงนี้เลยนะคะ... นี่มันเป็นที่แบบไหนกันแน่นะ?"
10026035-23 = "...จะว่าไป สองคนนั้นยังไม่มาอีกนะคะ... หรือว่าหลงทางกันอยู่นะ..."
10026035-24 = "ก็ที่ตรงนี้มันกว้างนี่คะ"
10026035-25 = "ดูท่าไม่ดีแล้วเลย... ฉันออกไปตามหาดีไหมคะ?"
10026035-26 = "ไม่เป็นไรค่ะ ถ้าใครผลีผลามเข้าไปตอนนี้ ก็อาจจะกลายเป็นคนที่หลงทางเอง... ถ้าจะเข้าไป เราควรต้องหาแผนรับมือล่วงหน้าก่อนค่ะ..."
10026035-27 = "...อ่า มากันแล้วค่ะ"
10026035-37 = "[ns5] \"หาทางออกมาจนได้...\"\n[ns6] \"ครูตกใจหมดเลย\""
10026035-40 = "โล่งอกไปทีนะคะคุณครู มาถึงได้จังหวะพอดีเลยค่ะ"
10026035-41 = "พวกฉันว่าจะเข้าไปตามหากันอยู่พอดี..."
10026035-42 = "คะ? พวกฉันปลอดภัยกันหรือเปล่า... งั้นเหรอคะ? หมายความว่ายังไงคะ..."
10026035-43 = "...คะ?"
10026035-44 = "มิเมซิส... เหรอคะ? มิเมซิสในชุดว่ายน้ำ...?"
10026035-45 = "มะ... มิเมซิสเหรอคะ!?  ทำไมอยู่ๆ ถึง... มาอยู่กันที่นี่...?"
10026035-46 = "เอ๋... อย่างนี้นี่เอง... อื้ม งั้นก็ใช่..."
10026035-47 = "มันอาจจะไม่ใช่เรื่องที่เป็นไปไม่ได้เลยก็ได้นะคะ เพราะที่นี่คือซากปรักหักพังของชมรมซิสเตอร์..."
10026035-48 = "ทะ... ทำไมไม่มีใครพูดถึงเรื่องชุดว่ายน้ำเลยล่ะคะ..."
10026035-49 = "ฮุฮุ... ก็อย่างที่บอกไปค่ะ นั่นมันแค่ปัญหาเล็กน้อยเท่านั้น..."
10026035-50 = "จะว่าไป... อุ๊ย..."
10026035-51 = "...ฮุฮุ เรื่องนี้ฉันก็คาดไม่ถึงเหมือนกันนะคะเนี่ย..."
10026035-52 = "[s7] \"......? คาดไม่ถึง?\"\n[s8] \"หมายถึงอะไรเหรอ?\""
10026035-55 = "คุณครู..."
10026035-56 = "ก่อนอื่นเอาคนที่แบกอยู่บนหลังลงมาก่อนดีไหมคะ?"
10026035-57 = "[s] \"............\""
10026035-59 = "[ns] \"......?????\""
10026035-60 = "...โคฮารุจัง...♡"
10026035-61 = "ก็ว่าหายไปไหน สุดท้ายทั้งสองคนก็ไปทำเรื่องใหญ่โตกันมาสินะคะ...?"
10026035-62 = "ใช่ ใหญ่โตมากเลยล่ะ! ฮานาโกะก็น่าจะได้เห็นกับตานะ..."
10026035-63 = "...หืม?"
10026035-64 = "เอ๋? ฮะ... ฮานาโกะ? จู่ๆ เกิดเรื่องอะไรขึ้นน่ะ?"
10026035-65 = "โคฮารุจัง..."
10026035-66 = "ไปเกาะหลังคุณครูแน่นซะขนาดนั้น..."
10026035-71 = "...?"
10026035-72 = "นี่น่ะเหรอ? อ่า... นะ... นี่มัน..."
10026035-77 = "มะ... ไม่ใช่นะ! ไม่ใช่ๆๆๆๆๆ!!  ไม่ช่ายยยย! ไม่ใช่เรื่องแบบนั้นนะ!!"
10026035-78 = "ฉันก็แค่ขาไม่มีแรงน่ะ..."
10026035-79 = "...ตายจริง♡"
10026035-80 = "ไม่ใช่แบบนั้นสักหน่อย!!  ไม่ใช่นะ! ไม่ช่ายยยย!!! ไม่ใช่เรื่องแบบนั้นนะ!!!"
10026035-82 = "ไม่ช่ายยยยยย!!!!!!!!!!!!"

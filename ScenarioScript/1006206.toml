[translation]
1006206-1 = "ความรู้สึกเล็กน้อยในวันหนึ่ง"
1006206-2 = "แถวห้องทำงานของโทคิ"
1006206-3 = "(คุณครูรู้สึกเป็นห่วงโทคิ จึงไปหาเธอที่ห้องทำงาน)"
1006206-4 = "(ก่อนไปถึง คุณครูตัดสินใจโทรไปบอกโทคิก่อน)"
1006206-10 = "อ๊ะ คุณครู สวัสดีค่ะ ตามที่แจ้งไป วันนี้ฉันน่าจะไปช้ากว่าทุกวันสักหน่อยนะคะ"
1006206-11 = "คะ? คุณครูเป็นห่วงเรื่องนั้น เลยมาที่นี่งั้นเหรอคะ?"
1006206-12 = "ถ้ารู้ว่าจะเป็นอย่างนี้ ฉันน่าจะอธิบายสถานการณ์ให้ละเอียดกว่านี้หน่อยสินะคะ"
1006206-13 = "ฉันผิดเองค่ะ ขอโทษนะคะ"
1006206-14 = "คะ...? ทำไมถึงเป็นคุณครูที่ขอโทษฉันล่ะคะ...?"
1006206-15 = "อ๊ะ... คุณครูอยู่ใกล้ๆ นี่แล้วงั้นเหรอคะ"
1006206-16 = "อืม... เอายังไงดีล่ะคะ? ในเวลาแบบนี้น่ะ..."
1006206-17 = "เอาเป็นว่าเข้ามาก่อนแล้วกันค่ะ ถ้าปล่อยให้คุณครูรออยู่ข้างนอกก็คงเป็นการเสียมารยาทเกินไป"
1006206-21 = "(คุณครูรู้สึกผิดอย่างบอกไม่ถูก แต่ก็ก้าวเท้าเข้าไปในห้องแต่โดยดี)"
1006206-30 = "― ที่นี่อาจดูซอมซ่อไปสักหน่อย แต่ก็ขอต้อนรับค่ะ คุณครู[wa:1840] "
1006206-32 = "― ฉันก็แค่ซ่อมบำรุงอุปกรณ์ตามที่ทำเป็นประจำเองค่ะ[wa:890] "
1006206-35 = "― ขอโทษที่ทำให้เป็นห่วงนะคะ[wa:1440] "
1006206-38 = "[ns] \"ซ่อมบำรุงอุปกรณ์แบบนี้ตลอดเลยเหรอ?\""
1006206-39 = "― ค่ะ ฉันพยายามเตรียมตัวให้อยู่ในสถานะที่เตรียมพร้อมที่สุดเสมอค่ะ[wa:860] "
1006206-42 = "― เพื่อให้กลายเป็นสาวใช้...[wa:560] "
1006206-44 = "― ที่เหมาะสมกับชื่อของชมรม C&C ค่ะ[wa:880] "
1006206-47 = "[ns] \"สุดยอดเลยนะโทคิ พยายามอยู่ทุกวันเลยสินะ\""
1006206-48 = "― อย่างนั้น...เหรอคะ? ฉันไม่ได้คิดว่ามันเป็นเรื่องพิเศษอะไรหรอกค่ะ[wa:2360] "
1006206-50 = "― แต่ถ้าคุณครูพูดแบบนั้นละก็ มันรู้สึก...[wa:2340] "
1006206-53 = "[ns] \"รู้สึก...?\""
1006206-54 = "― ฉันตัดสินใจแล้วค่ะ[wa:560] "
1006206-56 = "― วันนี้ฉันจะตั้งใจเตรียมอุปกรณ์ให้สมบูรณ์แบบกว่าทุกวันเลยค่ะ[wa:1220] "
1006206-59 = "― เป้าหมายคือ <สาวใช้สุดแกร่งในคิโวทอส> <เมด ออฟ เมด> ค่ะ[wa:4140] "
1006206-62 = "― เพื่อการนั้นแล้ว คุณครู...[wa:580] "
1006206-64 = "― คอยช่วยอยู่ข้างๆ ฉันหน่อยได้มั้ยคะ?[wa:920] "
1006206-67 = "(หลังจากนั้นคุณครูก็เฝ้าดูโทคิบำรุงรักษาอุปกรณ์ของตัวเองอย่างเงียบๆ)"
1006206-69 = "รอนานเลยใช่มั้ยคะ?"
1006206-70 = "งั้นมาเริ่มจัดการงานของวันนี้กันเลยดีมั้ยคะคุณครู?"
1006206-71 = "อาซุมะ โทคิคนนี้จะคอยสนับสนุนคุณครูอย่างเต็มที่เลยค่ะ"
1006206-73 = "(คุณครูมองดูรอยยิ้มของโทคิ แล้วก็เดินกลับมาที่ชาเล่ต์ด้วยกัน)"

[translation]
1006206-1 = "女僕中的女僕"
1006206-2 = "季的工房"
1006206-3 = "（實在是有點擔心，於是便來到了季所在的辦公室）"
1006206-4 = "（打電話給他的話應該會注意到吧……？）"
1006206-10 = "不好意思，老師。似乎還需要一些時間……"
1006206-11 = "咦，您要特地過來一趟？#n因為擔心我……？"
1006206-12 = "沒想到會讓您這麼擔心……#n我應該一開始就要說明清楚的。"
1006206-13 = "是我的不對。非常抱歉。"
1006206-14 = "咦……？老師為何要道歉呢……？"
1006206-15 = "啊……您已經到辦公室前了呢。"
1006206-16 = "唔，該怎麼辦才好呢……"
1006206-17 = "也不能讓您在外頭等著，請進吧。"
1006206-21 = "（懷抱著打擾到他很不好意思的心情，進入了季等待著的房間）"
1006206-30 = "― 抱歉是個髒亂的地方，請進。老師。[wa:3280] "
1006206-32 = "― 我和往常一樣，正在進行裝備的檢查。[wa:2090] "
1006206-35 = "― 讓您費心了，我感到非常抱歉。[wa:1880] "
1006206-38 = "[ns]「你每天都像這樣保養裝備嗎？」"
1006206-39 = "― 是的，為了讓裝備隨時都能維持在最佳的狀態。[wa:2540] "
1006206-42 = "― 也是為了成為配得上C&C之名的，[wa:920] "
1006206-44 = "― 那種女僕。[wa:1960] "
1006206-47 = "[ns]「我之前都不知道……季真是厲害呢。」"
1006206-48 = "― 是……這樣嗎？我認為這不是什麼特別的事。[wa:4120] "
1006206-50 = "― 老師您這麼說……讓我有點……[wa:3340] "
1006206-53 = "[ns]「有點？」"
1006206-54 = "― 我決定了。[wa:1080] "
1006206-56 = "― 今天的整備要進行得比平時更完美。[wa:2940] "
1006206-59 = "― 目標是「奇普托斯最強的女僕」、「女僕中的女僕」。[wa:5380] "
1006206-62 = "― 那麼，老師……[wa:1340] "
1006206-64 = "― 還請您在身旁，守望著我哦？[wa:1800] "
1006206-67 = "（在一旁看著專注於保養裝備的季一段時間）"
1006206-69 = "讓您久等了，老師。"
1006206-70 = "開始今天的工作吧。"
1006206-71 = "我，飛鳥馬季會完美地輔佐老師。"
1006206-73 = "（於是，與展露燦爛笑容的季並肩回到了夏萊）"

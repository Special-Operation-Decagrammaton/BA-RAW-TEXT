1006206-10 = "3;토키 모드 1;02;아, 선생님. 안녕하십니까. 말씀드린 대로 오늘은 평소보다 조금 늦을 것 같습니다.\n#3;sig"
1006206-11 = "3;토키 모드 1;04;예? 그것 때문에 직접 찾아오셨다고요? 뭔가 걱정이 되어서요?\n#3;sig\n#3;em;[?]"
1006206-12 = "3;토키 모드 1;99;선생님께서 그러실 줄 알았다면, 제가 조금 더 자세히 사정을 설명드렸어야 했을 것 같군요.\n#3;sig"
1006206-13 = "3;토키 모드 1;07;제 불찰입니다. 죄송합니다.\n#3;sig"
1006206-14 = "3;토키 모드 1;04;예……? 어째서 선생님께서 사과를……?\n#3;sig\n#3;em;[땀]"
1006206-15 = "3;토키 모드 1;06;아…… 이미 근처에 와 계시는군요.\n#3;sig"
1006206-16 = "3;토키 모드 1;06;으음…… 어떻게 하죠. 이럴 때에는……\n#3;sig"
1006206-17 = "3;토키 모드 1;99;일단, 들어오십시오. 선생님을 기다리게 하는 것도, 경우가 아닐 것 같습니다.\n#3;sig"

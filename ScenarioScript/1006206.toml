[translation]
1006206-1 = "A Day's Tardiness"
1006206-2 = "Near Toki's Workshop"
1006206-3 = "I was a bit concerned, so I went to visit Toki's workshop."
1006206-4 = "I didn't want to intrude, so I gave her a call first."
1006206-10 = "Hello, Sensei. As I mentioned earlier, I'll be a bit late today."
1006206-11 = "Hm? You were worried about that, and you're on your way here?"
1006206-12 = "Ah, my apologies. It seems I should've explained myself a bit better."
1006206-13 = "I didn't realize you'd do that, but that doesn't excuse negligence."
1006206-14 = "Huh...? Why are you apologizing to me?"
1006206-15 = "Ah... So you're already almost here."
1006206-16 = "Uh... Hm. I'm not sure what to do."
1006206-17 = "However, I know it's not right for me to keep you waiting. Please come in."
1006206-21 = "I felt a bit bad about it, but I headed inside."
1006206-30 = "― There's not much to see, but welcome, Sensei.[wa:2120] "
1006206-32 = "― I was checking my equipment, as usual.[wa:1250] "
1006206-35 = "― I'm sorry to cause you concern.[wa:1200] "
1006206-38 = "[ns] \"You always do this much maintenance?\""
1006206-39 = "― Yes. I always try to maintain peak condition.[wa:1580] "
1006206-42 = "― To honor the name of C&C,[wa:560] "
1006206-44 = "― I want to be a great maid.[wa:1120] "
1006206-47 = "[ns] \"That's amazing, Toki. You work so hard every day.\""
1006206-48 = "― Do you...really think so? It doesn't seem that special to me.[wa:2480] "
1006206-50 = "― But hearing you say that makes me think...[wa:2220] "
1006206-53 = "[ns] \"Think what?\""
1006206-54 = "― I'm determined.[wa:680] "
1006206-56 = "― Today's maintenance will be performed even more effectively than usual.[wa:740] "
1006206-59 = "― The goal is to become the best maid in Kivotos. The maid of all maids.[wa:3540] "
1006206-62 = "― Well, Sensei...[wa:1020] "
1006206-64 = "― Please watch carefully, all right?[wa:960] "
1006206-67 = "I stood to the side and watched as Toki calmly worked on her equipment."
1006206-69 = "Thank you again for your patience, Sensei."
1006206-70 = "Let's begin today's work."
1006206-71 = "I, Asuma Toki, will be the perfect assistant."
1006206-73 = "As we returned to Schale together, Toki was beaming."

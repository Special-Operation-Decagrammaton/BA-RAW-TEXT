[translation]
12180-1 = "ตอนที่ 18;ไม่ปล่อยให้หลุดมือไป 1"
12180-3 = "ทุกคนเป็นยังไงบ้างคะ?\n"
12180-4 = "แฮ่ก...\n"
12180-5 = "ฉันไม่เป็นไร!"
12180-6 = "ตามพิกัดที่คุณครูบอกมา รุ่นพี่จะอยู่ข้างหน้าเราเลยค่ะ ทุกคนพยายามอีกหน่อยนะคะ..."
12180-7 = "ไม่ต้องห่วงค่ะ พวกเรายังไม่บาดเจ็บตรงไหนเลยค่ะ!"
12180-14 = "...!!"
12180-15 = "มีศัตรูอยู่ด้านหน้า!! \n"
12180-16 = "ห่างออกไปไม่เกิน 2 กม. จะประจันหน้ากันแล้วค่ะ! ทุกคนเตรียมตัวตั้งรับด้วย..."
12180-19 = "(ตู้มมมมมมม!!!!!)\n"
12180-20 = "!!\n"
12180-21 = "นั่นมัน..."
12180-22 = "ปืนใหญ่นี่นา \n\n\n"
12180-23 = "L118 ค่ะ! เป็นปืนใหญ่วิถีโค้งของทรีนิตี้! ทำไมถึง..."
12180-27 = "อ่า... ฉะ... ฉันเองค่ะ..."
12180-28 = "อ๊ะ! เธอคือ ฮิฟุ...\n\n\n"
12180-29 = "มะ.. ไม่ใช่นะคะ! ฉันไม่ใช่ฮิฟุมิ แต่เป็น ฟะ... เฟาสต์ต่างหากค่ะ!"
12180-30 = "......\n"
12180-31 = "ว้าวว คุณเฟาสต์! ไม่ได้เจอกันนานเลยนะคะ! ยังน่ารักเหมือนเดิมเลยค่ะ☆"
12180-32 = "อ่า... ยะ... อย่างนั้นเหรอคะ?"
12180-33 = "พอดีฉันได้รับอนุญาตจากคนในสภาน้ำชามา ก็เลยมาเสริมกำลังแบบไม่เปิดเผยตัวน่ะค่ะ \n"
12180-34 = "แต่นี่ไม่เกี่ยวกับทรีนิตี้หรอกนะคะ! ฉันไปบอกกับคนดูแลปืนใหญ่ไว้แล้ว"
12180-35 = "ถะ... ถึงแม้ว่าฉันจะช่วยอะไรได้ไม่มาก...\n"
12180-36 = "เปล่า ช่วยได้มากเลยล่ะ\n"
12180-37 = "ใช่! ขอบคุณมากเลยนะคะเฟาสต์จัง"
12180-38 = "แหะๆๆ... งั้นก็สู้ๆ นะคะทุกคน!\n"
12180-41 = "เสริมกำลังแล้วก็ต้องโจมตีกลับสินะ ของมันแน่อยู่แล้ว\n"
12180-42 = "ค่ะ! ตอนนี้ศัตรูกำลังสับสนอลหม่านกับปืนใหญ่! ต้องฝ่าไปให้ไวเลยค่ะ!\n\n"

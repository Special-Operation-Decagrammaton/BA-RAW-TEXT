[translation]
12180-1 = "第18話;依舊未曾放棄的事物（１）"
12180-3 = "各位都還好嗎？"
12180-4 = "嗯……"
12180-5 = "完全沒問題！"
12180-6 = "老師說的座標就在眼前了，各位再加把勁……！"
12180-7 = "嗯，現在還活力滿滿哦！"
12180-14 = "……！"
12180-15 = "前方發現敵人！！ "
12180-16 = "距離大約是2km左右，即將遇敵！#n大家請做好應戰準備……"
12180-19 = "（哐啷啷啷啷啷啷──！）"
12180-20 = "！？"
12180-21 = "那是……"
12180-22 = "是支援砲擊。"
12180-23 = "那是……L118！是三一的牽引式榴彈砲！#n這究竟……"
12180-27 = "啊，啊嗚……是，是我……"
12180-28 = "啊！你是日步──"
12180-29 = "不，不是！我不是日步美，是浮士德！"
12180-30 = "……"
12180-31 = "哇啊～是浮士德！好久不見！#n不過剛才好像把名字說出來了呢，真可愛☆"
12180-32 = "啊，啊嗚……是，是嗎？"
12180-33 = "那個，雖然有獲得茶會的許可……不過這只是來源不明的火力支援！"
12180-34 = "和，和三一沒有關係！我對負責射擊的大家也是這麼說的……"
12180-35 = "抱，抱歉只能幫上這點忙……"
12180-36 = "別這麼說，你幫了很大的忙。"
12180-37 = "是！非常感謝，浮士德醬！"
12180-38 = "啊哈哈……那麼大家……請，請加油！"
12180-41 = "火力支援後立刻突擊，這是基本呢。"
12180-42 = "是！敵人目前正因砲擊而陷入混亂！趁現在突破吧！"

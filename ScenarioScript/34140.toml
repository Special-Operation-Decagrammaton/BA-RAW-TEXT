[translation]
34140-1 = "第14話;邂逅"
34140-4 = "……クリア。ここまでは安全。"
34140-5 = "は、はい！大丈夫です！"
34140-6 = "おかしい……街が静かすぎる。#n元々人通りが少ない場所だが、ここまでではなかったはずだ。"
34140-7 = "な、なんか……知らない物がいっぱい増えてます……。"
34140-8 = "そうだね……違和感は、私もさっきからすごくある。"
34140-9 = "自治区から長く離れていたとはいえ、私の全く知らない街になってる。"
34140-10 = "……。"
34140-11 = "な、なんというか……よくよく思い出すと、以前から少しずつよく分からない物が増えていたような気がします。"
34140-12 = "自治区のあちこちに設置された巡航ミサイルや……補給された謎の武器……。"
34140-13 = "それに今考えてみると、あの[ruby=ミメシス]複製[/ruby]というのもすごく変じゃないですか。なのに、何も疑わずに受け入れてた気がします。"
34140-19 = "いつからアリウスは、巡航ミサイルなんて物を……？"
34140-20 = "それにいつの間に、あんな不思議な力を操れるようになったんだ……？"
34140-21 = "……「ヘイローを壊す爆弾」も。"
34140-22 = "一体、いつから……。"
34140-24 = "……。"
34140-25 = "ちょっと待って……誰かいる。隠れて。"
34140-37 = "あれは……。"
34140-38 = "せ、聖徒会！？ユスティナ聖徒会ですよね？#nそれにあの姿は……。"
34140-39 = "……何故だ？#nエデン条約が取り消された以上、使役は不可能なはずだ。"
34140-40 = "……考えてみれば。"
34140-41 = "そもそも、私たちがエデン条約の会場を襲撃した理由は、[ruby=ミメシス]複製[/ruby]能力を確保するためだった。"
34140-42 = "そうですね……だから姫ちゃんは、古聖堂の地下であの「木の人形」の言う通りにしました……。"
34140-43 = "そうして確保した聖徒会の兵力で、トリニティとゲヘナ自治区を占領する……。#nそれが私たちの任務だった。"
34140-44 = "その後「シャーレ」に敗北したけど。"
34140-45 = "ああ……私たちが逃亡したのもそれが理由だ。#n[ruby=ミメシス]複製[/ruby]能力の確保も、両学園占領にも失敗してしまったからな。"
34140-46 = "だというのに……。#nアリウス自治区は……「彼女」は、既に[ruby=ミメシス]複製[/ruby]の能力を確保している……？"
34140-53 = "ウォォォォォォン――――"
34140-54 = "この音は……"
34140-55 = "エデン条約の時に「戦術兵器」として使ってた「アンブロジウス」の悲鳴だよ。……たしかにあの時、私たちが扱った[ruby=ミメシス]複製[/ruby]で合ってるみたいだね。"
34140-56 = "ということは……。"
34140-57 = "……[ruby=ミメシス]複製[/ruby]は、一度でも成功させればいいだけで……。"
34140-58 = "つまり、本来の私たちの任務は……#n『姫を古聖堂に連れて行って[ruby=ミメシス]複製[/ruby]を発動させる事』だけだった……？"
34140-59 = "じゃあ、トリニティとゲヘナの占領任務は……。 "
34140-60 = "――彼女には、どうでもいい事だったのか……？"
34140-61 = "……。"
34140-62 = "じゃあ、私たちの任務は……。"
34140-63 = "一体、何の意味があったのか。"
34140-71 = "……包囲されています！？"
34140-72 = "チッ……罠か。"
34140-73 = "……私達がここに来るって分かってたんだ。"
34140-77 = "ええ、もちろんです。"
34140-78 = "……マダム。"
34140-79 = "ここは私の支配下にある領地。#n皆さんの位置や目的地、その経路に至るまで全て把握しております。"
34140-80 = "あなた達が旧校舎の回廊に行こうとすることも最初から分かっていました。#n愚かな子どもたち――私に隠し事なんて、不可能ですよ。"
34140-81 = "ひ、ひいぃ……さ、最初から……。"
34140-82 = "やっぱり、手のひらの上だったの……。"
34140-83 = "……。"
34140-84 = "ええ、そういう事です。"
34140-85 = "あなた達の任務は最初から「ロイヤルブラッドを古聖堂に連れて行き、聖徒会を顕現させる事」……それだけです。"
34140-86 = "[ruby=path]パス[/ruby]は一度接続さえすれば、次からは私が統制できるので。#nマエストロは自分の作品を奪われるようだと嫌がっていましたが。"
34140-87 = "……。"
34140-88 = "まあ、トリニティやゲヘナを占領するかどうかなんて、私にとっては[ruby=さまつ]些末[/ruby]なことです。"
34140-89 = "この自治区が長年抱いていた憎悪を統制するための方便ですから。#n私自身は、あの学園に何の遺恨もありません。"
34140-90 = "……！！"
34140-91 = "そうですね。ですから、あなたは任務を遂行したと言えるでしょう。私に[ruby=ミメシス]複製[/ruby]の能力を提供しましたし――"
34140-92 = "ロイヤルブラッドも素直に生贄として捧げてくれました。#nあなたは言い付けをよく聞くいい子ですね、サオリ。"
34140-93 = "……やはり、最初から約束を守るつもりなんてなかったのか……。"
34140-94 = "まあ、不毛な話はこの辺りで……私の興味は……そう。"
34140-100 = "ぐ、うっ……。"
34140-102 = "はじめまして、[USERNAME]先生。"
34140-103 = "[s] \"…………！！\""
34140-104 = "私はベアトリーチェと申します。既にご存知かもしれませんが、「ゲマトリア」の一員です。通信ごしでの挨拶となる事をお許しください。"
34140-105 = "黒服やマエストロ、ゴルコンダから、あなたについては色々とお話を聞いております。"
34140-106 = "[s] \"あなたが、アリウスを支配している……ベアトリーチェ？\""
34140-107 = "はい。そして、ゲマトリアにおける現在唯一の成功者です。"
34140-108 = "ふふっ……私のことが気になりますか？#nどうやってアリウスを手中に入れたのか……必要ならば、あなたが知っている情報と交換する事もできますよ？"
34140-109 = "[s1] \"必要ない。\"\n[s2] \"あなたの手口は知っている。\""
34140-110 = "ほぉ、そうですか。"
34140-111 = "ほぉ、そうですか。"
34140-112 = "私の名誉のために言っておきますが、私は特殊な能力など使っていませんよ。"
34140-113 = "洗脳や超能力……くくくっ、そんな便利な力があれば良かったのですが。#n残念ながら、それは「大人」のやり方ではありませんので。"
34140-114 = "ええ。憎悪、怒り、[ruby=けいべつ]軽蔑[/ruby]、嫌悪――そういった負の感情を利用し、偽りと[ruby=ぎまん]欺瞞[/ruby]で子どもたちを支配してきました。"
34140-115 = "単純ですが、確実な方法です。あなたならよく知っているでしょう？"
34140-117 = "……そもそもこの自治区は、私が来る前から内戦をしておりました。"
34140-118 = "お互いに対する負の感情が、既に十二分に満ちていたのです。#n――私は、ただソレを活用しただけ。"
34140-119 = "ここが特別というわけではありません。#nそんなもの、ありふれた光景じゃないですか？"
34140-122 = "そうですね……むしろ憎悪なら、ここよりもトリニティの方が強いかもしれません。"
34140-124 = "私はただ、そういった様に動いてきました。"
34140-125 = "生の[ruby=けんきょ]謙虚[/ruby]さを教える[ruby=きんげん]金言[/ruby]は、無価値な空虚へと[ruby=わいきょく]歪曲[/ruby]し……"
34140-126 = "[ruby=だらく]堕落[/ruby]を警戒する厳格な自責は、逃れられない罪悪感へと[ruby=わいきょく]歪曲[/ruby]し……"
34140-127 = "事実を[ruby=わいきょく]歪曲[/ruby]し、真実を[ruby=いんぺい]隠蔽[/ruby]し、本心を曲解し、嫌悪を助長し、憎悪を[ruby=あお]煽[/ruby]り、他人を、他人を、他人を、他人を――永遠に、お互いを、他人とさせること。"
34140-128 = "楽園は永遠に届かないからこそ、楽園たり得る。その地獄の中で「大人」は「子供」を支配し[ruby=さくしゅ]搾取[/ruby]し、捕食します。"
34140-129 = "ええ――誰かにとっては地獄でしょうが、これこそ「大人」の安らかなる楽園。"
34140-130 = "ですから私の[ruby=捕食]これ[/ruby]も、理解していただけますよね？先生？"
34140-132 = "そして、ロイヤルブラッドをこのまま放っておいていただけませんか？"
34140-133 = "あの子は私が丹精込めて教えた生徒なのです。生贄として捧げれば、きっと私たち大人に素晴らしい[ruby=ふくいん]福音[/ruby]を与えてくれる。"
34140-134 = "気になりませんか？私が何をしているのか、どんな偉業に到達するのか。#nええ――今ここで、教えて差し上げることもできます。"
34140-135 = "いかがでしょう、先生？"
34140-137 = "例えばこの世界――このキヴォトスがどんな場所なのか、知りたくはないですか？"
34140-138 = "この世界は正体不明で――理解などが一切及ばない、神秘と恐怖が入り混じった崇高の転炉。"
34140-140 = "ええ……私は、この世界の真実を教えることもできます。#nいかがでしょう？この機会を逃したら、次は二度とないかもしれません。"
34140-141 = "[s] \"そこまでにして。\""
34140-142 = "ほぉ？"
34140-143 = "[s3] \"そんな事には興味ない。\"\n[s4] \"誰かの犠牲で到達できる真実なんて必要ない。\""
34140-144 = "……くくくっ。そうですか……やはり、こうなるのですね。"
34140-145 = "……くくくっ。そうですか……やはり、こうなるのですね。"
34140-146 = "どうやら私たちは、お互いに違う真実を信じているようです。#nええ――あなたこそ私の敵対者で、間違いはありません。"
34140-147 = "ええ……理解しました。あなたの語る楽園は「エデン条約」だったのですね。#nみんなの友情で悪を退ける、単純で理解しやすい世界。"
34140-148 = "くくくっ……どうして、子どもたちの考えはこんなに純粋で単純なのでしょう。"
34140-149 = "楽園の名前をつけたからといって、変わることはありません。#nむしろ大人ならきちんと、このように真実を教えなければ。"
34140-150 = "「その楽園こそ、原罪が始まった場所だ」と……。"
34140-151 = "真の楽園こそ憎悪、怒り、嫌悪、苦痛、悔恨――#nそういったもので溢れかえっているのだと。"
34140-152 = "[ns] \"ベアトリーチェ。\""
34140-154 = "[ns5] \"あなたは生徒を、私たちを侮辱した。\"\n[ns6] \"そして「教え」を、「学び」を侮辱した。\"\n[ns7] \"私は大人として、あなたを絶対に許すことはできない。\""
34140-159 = "……それは、宣戦布告だと思っても？"
34140-160 = "いいでしょう、バシリカでお待ちしております。#n――もし到達できるのなら、ですが。"
34140-161 = "そこで決着をつけましょう。"
34140-162 = "さあ、先生――不可解な者よ。"
34140-164 = "黒服はあなたを仲間と認識し、互いに競い合えると信じ。"
34140-165 = "マエストロはあなたを理解者と認識し、互いに高め合えると信じ。"
34140-166 = "ゴルコンダはあなたをメタファーと認識し、互いを通じて完成されると信じ。"
34140-167 = "そして私はあなたを敵対者と認識し、互いに反発すると信じています。"
34140-169 = "あなたは、私の敵です。"
34140-177 = "（……）"
34140-178 = "（……）"
34140-179 = "（は、はい。じゅ、準備は……できました！）"
34140-180 = "始末してください。"
34140-185 = "[ns] \"行こう！スクワッド！\""
34140-186 = "ああ！"

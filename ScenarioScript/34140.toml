[translation]
34140-1 = "第14話;邂逅"
34140-4 = "……Clear。到這裡為止都很安全。"
34140-5 = "是，是的！沒問題！"
34140-6 = "有點奇怪……街上也太安靜了。#n雖然本來就沒什麼人會經過這裡，但也不會安靜到這種程度才對。"
34140-7 = "總，總覺得……多了很多我們不知道的東西……"
34140-8 = "確實……從剛才開始就感覺到滿滿的違和感。"
34140-9 = "雖然我離開自治區很久了，但是這裡已經變成我已經完全不認識的街道了。"
34140-10 = "……"
34140-11 = "該，該怎麼說呢……仔細想想，好像從以前開始，我們不知道的東西就漸漸增加了。"
34140-12 = "像是設置在自治區各處的巡航導彈……還有補給的奇怪武器……"
34140-13 = "而且現在想一想，那個被稱為[ruby=Mimesis]複製[/ruby]的東西也很奇怪不是嗎，但我們卻毫無疑問地接受了。"
34140-19 = "奧利斯從什麼時候開始，有巡航導彈這種東西了……？"
34140-20 = "還有從什麼時候開始，變得可以操縱那種不可思議的力量了……？"
34140-21 = "……「破壞光環的炸彈」也是。"
34140-22 = "到底，是從什麼時候……"
34140-24 = "……"
34140-25 = "等等……有其他人在。快躲起來。"
34140-37 = "那是……"
34140-38 = "聖，聖徒會！？是優斯提娜聖徒會對吧？#n而且那個樣子……"
34140-39 = "……為什麼？#n伊甸園條約已經被取消的現在，要使喚他們應該是不可能的才對。"
34140-40 = "……回想一下。"
34140-41 = "本來我們會襲擊伊甸園條約會場的理由就是為了取得[ruby=Mimesis]複製[/ruby]的能力。"
34140-42 = "確實是這樣沒錯……所以公主醬才會聽從古教堂底下那個「木人偶」的命令……"
34140-43 = "接著用得來的聖徒會的兵力佔領三一和格黑娜自治區……#n這就是我們本來的任務。"
34140-44 = "之後我們輸給了「夏萊」。"
34140-45 = "沒錯……我們之所以會逃亡也是因為這個。#n因為[ruby=Mimesis]複製[/ruby]能力的獲得和兩個學園的占領都失敗了。"
34140-46 = "明明應該是這樣的……#n奧利斯自治區……「她」卻已經得到了[ruby=Mimesis]複製[/ruby]的能力……？"
34140-53 = "嗡──"
34140-54 = "這個聲音是……"
34140-55 = "是伊甸園條約那時我們當做「戰術兵器」使用的「安普羅西斯」的悲鳴。……當時我們確實使用了[ruby=Mimesis]複製[/ruby]的能力。"
34140-56 = "也就是說……"
34140-57 = "……[ruby=Mimesis]複製[/ruby]只要成功一次就可以了……"
34140-58 = "所以，我們的任務……#n就只有「把公主帶到古教堂並發動[ruby=Mimesis]複製[/ruby]能力而已……？」"
34140-59 = "那，三一和格黑娜的占領任務……"
34140-60 = "──對她來說，根本無所謂嗎……？"
34140-61 = "……"
34140-62 = "那，我們的任務……"
34140-63 = "究竟，有什麼意義呢。"
34140-71 = "……被包圍了！？"
34140-72 = "嘖……是陷阱嗎。"
34140-73 = "……早就知道我們會來這裡了嗎。"
34140-77 = "沒錯，那是當然的。"
34140-78 = "……夫人。"
34140-79 = "這裡是由我支配的領地。#n各位的位置和目的地，就連路徑我全都知道。"
34140-80 = "你們想要前往舊校舍的迴廊這件事我一開始就知道了。#n愚蠢的孩子們啊──想要瞞過我是不可能的。"
34140-81 = "噫，噫……從，從一開始……"
34140-82 = "果然我們還是被玩弄在手掌心裡嗎……"
34140-83 = "……"
34140-84 = "沒錯，就是這樣。"
34140-85 = "你們的任務從一開始就是「把皇家血統帶到古教堂，讓聖徒會顯現」……僅此而已。"
34140-86 = "[ruby=path]路徑[/ruby]只要接通過一次，接下來就將由我控制。#n雖然瑪艾斯托洛似乎因為自己的作品被奪走而不太開心就是了。"
34140-87 = "……"
34140-88 = "嘛，佔領三一跟格黑娜之類的，對我來說只不過是枝微末節的小事而已。"
34140-89 = "只是因為方便控制這個自治區長久以來抱持的憎恨而已。#n我本身對那個學園並沒有什麼恨意。"
34140-90 = "……！！"
34140-91 = "也對呢。這麼說來，也可以說你們成功完成了任務吧。畢竟你們向我提供了[ruby=Mimesis]複製[/ruby]的能力嘛──"
34140-92 = "皇家血統也願意乖乖地成為我的祭品被獻出去了。#n你是個聽話的好孩子呢，沙織。"
34140-93 = "……果然，你打從一開始就沒有要遵守約定的打算嗎……"
34140-94 = "嘛，沒意義的話就說到這吧……我有興趣的是……沒錯。"
34140-100 = "咕，唔……"
34140-102 = "初次見面，[USERNAME]老師。"
34140-103 = "[s] 「…………！！」"
34140-104 = "我的名字是貝雅特里榭。雖然你或許已經知道了，我是「蓋瑪特利亞」的一員。請原諒我用通信向你問好。"
34140-105 = "我從黑色西裝人、瑪艾斯托洛以及戈爾孔特那裡聽說過很多你的事蹟。"
34140-106 = "[s] 「你就是支配著奧利斯的……貝雅特里榭？」"
34140-107 = "沒錯。同時也是蓋瑪特利亞目前唯一的成功者。"
34140-108 = "呵呵……很在意我嗎？#n我是怎麼得到奧利斯的……有需要的話可以和你擁有的情報交換的哦？"
34140-109 = "[s1] 「不需要。」\n[s2] 「你的手法我已經知道了。」"
34140-110 = "哦，這樣啊。"
34140-111 = "哦，這樣啊。"
34140-112 = "為了保持我的名譽先告訴你一聲，我可沒有使用什麼特殊的能力哦。"
34140-113 = "洗腦之類的超能力……呵呵呵，要是真的有這種便利的力量就好了。#n很遺憾地，那並不是「大人」的做法。"
34140-114 = "沒錯。憎恨、憤怒、輕蔑、厭惡──利用這些負面的感情，以偽裝和欺瞞支配著孩子們。"
34140-115 = "雖然很單純卻是非常實在的方法。你也很清楚的對吧？"
34140-117 = "……況且，這個自治區在我到來之前就已經處於內戰之中了。"
34140-118 = "對彼此的負面感情早已超過了極限。#n──而我，只不過是加以利用了而已。"
34140-119 = "這也沒什麼特別的。#n只不過是習以為常的景象而已不是嗎？"
34140-122 = "對了……說到憎恨的話，和這裡比起來，三一的恨更強也說不定吧。"
34140-124 = "我只不過是順水推舟而已。"
34140-125 = "把教導謙虛的金言，扭曲為毫無價值的空虛……"
34140-126 = "把警戒墮落的自責，扭曲為無法逃離的罪惡感……"
34140-127 = "扭曲事實、隱蔽真實、曲解真心、助長嫌惡、煽動憎恨，讓他人，讓他人，讓他人，讓他人──永遠成為彼此的他人。"
34140-128 = "樂園正因為永遠無法到達才能被稱之為樂園。在這地獄中，「大人」將對「孩子」進行支配、榨取、捕食。"
34140-129 = "沒錯──對某些人來說或許是地獄，但這才是「大人」無憂無慮的樂園。"
34140-130 = "所以你也能夠理解我的[ruby=捕食]行為[/ruby]對吧？老師？"
34140-132 = "所以說，皇家血統能就這麼交給我來處理嗎？"
34140-133 = "那孩子是我傾盡全力教導的學生。如果能作為祭品獻上的話，肯定能帶給我們大人美妙的福音的。"
34140-134 = "你不好奇嗎？我打算做些什麼，打算達成怎樣的偉業。#n沒錯──我現在就能夠告訴你哦。"
34140-135 = "怎麼樣啊，老師？"
34140-137 = "比如這個世界──這個奇普托斯究竟是什麼地方，你不想知道嗎？"
34140-138 = "這個世界是來歷不明──理解所無法觸及的，混入神祕和恐怖的崇高轉爐。"
34140-140 = "沒錯……我能夠告訴你這個世界的真相。#n怎麼樣呢？如果錯過這個機會的話，或許就沒有下一次了。"
34140-141 = "[s] 「到此為止吧。」"
34140-142 = "哦？"
34140-143 = "[s3] 「我對那種事沒有興趣。」\n[s4] 「藉由某人的犧牲而得到的真實，我才不需要。」"
34140-144 = "……呵呵呵。這樣啊……果然是這樣呢。"
34140-145 = "……呵呵呵。這樣啊……果然是這樣呢。"
34140-146 = "看來我們相信著不同的真實呢。#n沒錯──你果然是我的敵對者沒錯。"
34140-147 = "沒錯……我理解了。你所說的樂園就是「伊甸園條約」對吧。#n依靠大家的友情擊退邪惡，單純又容易理解的世界。"
34140-148 = "呵呵呵……為什麼孩子們的思考總是這麼純粹又單純呢。"
34140-149 = "就算加上了樂園的名稱也不會有任何改變。#n不如說大人應該要好好教導他們真相才對。"
34140-150 = "「這個樂園才是萬惡的根源」……"
34140-151 = "真正的樂園才是憎惡、憤怒、嫌惡、苦痛、悔恨──#n充滿著這些的地方。"
34140-152 = "[ns] 「貝雅特里榭。」"
34140-154 = "[ns5] 「你侮辱了學生、侮辱了我們。」\n[ns6] 「侮辱了『教導』、侮辱了『學習』。」\n[ns7] 「我身為大人，絕不原諒你。」"
34140-159 = "……我能當作這是對我的宣戰嗎？"
34140-160 = "好吧，我在宗座聖殿等待你們的到來。#n──當然是，如果你們能夠到達這裡的話。"
34140-161 = "就在這裡決一勝負吧。"
34140-162 = "來吧，老師──無法理解之人啊。"
34140-164 = "黑色西裝人認為你是夥伴，相信能夠與你互相競爭。"
34140-165 = "瑪艾斯托洛認為你是理解者，相信能夠與你互相激勵。"
34140-166 = "戈爾孔特認為你是隱喻，相信能通過與你的交流互相成就。"
34140-167 = "而我則認為你是敵對者，相信我們會互相對立。"
34140-169 = "你是，我的敵人。"
34140-177 = "（……）"
34140-178 = "（……）"
34140-179 = "（好，好的。準，準備……完成了！）"
34140-180 = "解決他們吧。"
34140-185 = "[ns] 「上吧！奧利斯小隊！」"
34140-186 = "啊啊！"

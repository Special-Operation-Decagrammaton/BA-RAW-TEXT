[translation]
34140-1 = "ตอนที่ 14;เผชิญหน้า"
34140-4 = "เคลียร์... เส้นทางปลอดภัย"
34140-5 = "ค่ะ!"
34140-6 = "แปลกจัง... ทำไมทางมันเงียบแบบนี้ ปกติถึงจะเป็นที่ที่ไม่ค่อยมีใครมา แต่ก็ไม่ได้เงียบแบบนี้นี่นา"
34140-7 = "นอกจากนี้... ยังรู้สึกเหมือนกับว่ามันมีของที่เพิ่งเห็นเป็นครั้งแรกเยอะกว่าที่เคยอีกค่ะ..."
34140-8 = "ใช่ ฉันก็รู้สึกแปลกๆ แบบนี้มาสักพักหนึ่งแล้ว"
34140-9 = "ถึงที่นี่จะถูกทิ้งร้างมานานก็ตาม แต่ฉันรู้สึกเหมือนเป็นถนนที่ไม่คุ้นเคยเลย"
34140-10 = "......"
34140-11 = "จะว่ายังไงดีนะ... พอมาคิดๆ ดูแล้ว ฉันว่ามีของที่เราไม่รู้จักเยอะขึ้นเรื่อยๆ เลยค่ะ มีมาตั้งแต่ก่อนหน้านี้เลย "
34140-12 = "ทั้งขีปนาวุธร่อนที่เริ่มติดตั้งไว้ทั่วเขตปกครองตนเอง... ไหนจะอาวุธที่เริ่มได้รับการจัดหามาอีก... "
34140-13 = "แถมถ้าลองคิดดูดีๆ การมิเมซิสมันก็แปลกมากเลยว่าไหมคะ? เหมือนเรารับมันเข้ามาโดยไม่ได้คิด#nอะไรมากเลยค่ะ"
34140-19 = "อาเรียสมีมิสไซล์นำวิถีตั้งแต่เมื่อไร...?"
34140-20 = "เธอควบคุมพวกกองกำลังลึกลับนั่นได้ตั้งแต่เมื่อไรกัน...?"
34140-21 = "นั่นสิ... พอมาคิดๆ ดูแล้ว... เรื่อง <ระเบิดที่ใช้ทำลายฮาโล> นั่น..."
34140-22 = "ที่จริงแล้วพวกเธอ..."
34140-24 = "......"
34140-25 = "เดี๋ยวก่อน... ข้างหน้ามีคนมา รีบไปซ่อนตัวเร็วเข้า"
34140-37 = "นั่นมัน..."
34140-38 = "สะ... สาวกเหรอ?!  สาวกยูสตาร์ใช่ไหมคะ? ทำไมรูปร่างดู..."
34140-39 = "มาได้ยังไงกัน...? สนธิสัญญาเอเดนถูกยกเลิกไปแล้ว ไม่น่าเป็นไปได้นี่นา"
34140-40 = "...... ถ้าลองคิดดูมันก็ใช่นะ"
34140-41 = "สาเหตุที่เราบุกโจมตีห้องประชุมการลงนามสนธิสัญญาเอเดนตั้งแต่แรกก็เพื่อให้ได้มาซึ่งความ#nสามารถในการมิเมซิส"
34140-42 = "ใช่ค่ะ... เพราะแบบนั้นองค์หญิงก็เลยทำตามคำสั่งของตุ๊กตาไม้ที่อยู่ในวิหารโบราณใต้ดิน..."
34140-43 = "ภารกิจของพวกเราก็คือ... ใช้กองกำลังสาวกที่ได้มาเพื่อยึดเขตปกครองตนเองทรีนิตี้กับเกเฮนน่า"
34140-44 = "ต่อมาเราก็แพ้ให้กับ <ชาเล่ต์>"
34140-45 = "ใช่... และที่เราต้องกลายเป็นผู้หลบหนีก็เพราะว่า... เราไม่ได้พลังมิเมซิส และยึดทั้งสองโรงเรียนไว้#nไม่ได้ "
34140-46 = "แต่ว่า... ที่เขตปกครองตนเองอาเรียส... <ผู้หญิงคนนั้น> มีพลังในการมิเมซิสอยู่แล้ว...?"
34140-53 = "กรร -------------"
34140-54 = "เสียงนี้มัน... "
34140-55 = "เสียงร้องของ <อัมโบรส> ที่ใช้เป็น <อาวุธยุทธวิธี> ในเหตุการณ์สนธิสัญญาเอเดน... ต้องเป็นมิเมซิส#nที่เราจัดการไปในตอนนั้นแน่ๆ"
34140-56 = "ถ้าอย่างนั้น... "
34140-57 = "บางทีสิ่งที่เรียกว่ามิเมซิสอาจเป็นสิ่งที่แค่ต้องทำให้สำเร็จเพียงครั้งเดียวก็ได้..."
34140-58 = "และภารกิจแต่เดิมของเราคือการพาองค์หญิงไปที่วิหารโบราณแล้วทำให้เกิดมิเมซิส...?"
34140-59 = "ถ้าเป็นอย่างนั้น ภารกิจยึดเกเฮนน่ากับทรีนิตี้หลังจากนั้นก็... "
34140-60 = "มะ... มะ... มันเป็นเรื่องที่ไม่เกี่ยวกับเธอหรือเปล่า...?"
34140-61 = "......"
34140-62 = "ถ้างั้นภารกิจของพวกเรามัน..."
34140-63 = "มันมีความหมายอะไรงั้นเหรอคะ?"
34140-71 = "เราถูกล้อมเหรอคะ?! "
34140-72 = "ตั้งแต่ตอนไหนเนี่ย..."
34140-73 = "กับดักเหรอ... หรือว่าพวกนั้นรู้ว่าเราจะมาทางนี้...?"
34140-77 = "ก็รู้สิคะ "
34140-78 = "มาดาม..."
34140-79 = "นี่เป็นเขตแดนในการปกครองของฉัน ฉันรู้หมดแหละค่ะ ทั้งตำแหน่งและเป้าหมายของพวกเธอ"
34140-80 = "ต้องบอกว่ารู้ตั้งแต่แรกเลยว่าพวกเธอจะใช้ทางเชื่อมอาคารเรียนเก่า พวกเด็กน้อยเอ๋ย ไม่มีอะไรที่ฉันไม่รู้หรอกค่ะ "
34140-81 = "ฮะ... เฮือก! ตะ... ตั้งแต่แรกเลยเหรอ..."
34140-82 = "รู้เห็นทั้งหมดเลยสินะ..."
34140-83 = "......"
34140-84 = "ใช่ค่ะซาโอริ ถูกต้องค่ะ"
34140-85 = "ภารกิจของพวกเธอคือการพาสายเลือดของราชวงศ์มาที่วิหารโบราณ แล้วเผยให้เห็นสาวก ก็แค่นั้นค่ะ"
34140-86 = "เพียง[ruby=path]พาธ[/ruby]นั้นถูกเชื่อมเพียงครั้งเดียว หลังจากนั้นฉันก็จะควบคุมได้ทุกอย่างค่ะ แม้เมสโตรจะไม่ชอบที่ของของตัวเองถูกแย่งไปก็เถอะ..."
34140-87 = "......"
34140-88 = "ส่วนการยึดทรีนิตี้หรือเกเฮนน่าน่ะ มันไม่สำคัญสำหรับฉันหรอกค่ะ "
34140-89 = "มันเป็นไปเพื่อควบคุมความแค้นที่เขตปกครองตนเองนี้มีมายาวนาน แต่ตัวฉันเองไม่ได้มีความเกลียด#nชังอะไรต่อสองโรงเรียนนั้นค่ะ"
34140-90 = "...!!"
34140-91 = "จริงสินะคะ ถ้าอย่างนั้นก็ถือว่าพวกเธอทำภารกิจได้สำเร็จ เพราะฉันได้ความสามารถในการมิเมซิสมา#nแล้ว "
34140-92 = "และก็ได้สายเลือดของราชวงศ์มาเป็นเครื่องสังเวยด้วยค่ะ ช่างเป็นเด็กดีที่เชื่อฟังจังเลยนะคะ ซาโอริ"
34140-93 = "คุณนี่มัน... ไม่มีความคิดที่จะรักษาสัญญาตั้งแต่แรกสินะ..."
34140-94 = "จบเรื่องไม่สำคัญไว้แค่นี้เถอะค่ะ... เพราะความสนใจของฉันน่ะ... "
34140-100 = "อะ... อึก!"
34140-102 = "ยินดีที่ได้รู้จักนะคะ คุณครู [USERNAME] "
34140-103 = "[s] \"............!!\""
34140-104 = "ฉันชื่อเบียทริซค่ะ คุณครูคงทราบอยู่แล้วว่าฉันเป็นสมาชิก <เกมาเทรีย> หวังว่าจะยกโทษให้นะคะ#nที่ฉันมาทักทายแบบนี้แทน"
34140-105 = "ฉันได้ยินเรื่องของคุณจากสูทดำ เมสโตร และโกลคอนดามาเยอะเลยค่ะ "
34140-106 = "[s] \"เธอคือเบียทริซ... ที่ปกครองอาเรียสอยู่งั้นเหรอ?\""
34140-107 = "ใช่ค่ะ ในเกมาเทรียมีฉันคนเดียวที่ทำสำเร็จค่ะ"
34140-108 = "อยากรู้วิธีไหมล่ะคะ? ฉันจะยอมบอกให้ ถ้าคุณเอาข้อมูลที่รู้อยู่มาแลกเปลี่ยนให้ค่ะ"
34140-109 = "[s1] \"ไม่จำเป็นหรอก\"\n[s2] \"ก็พอจะรู้วิธีของเธออยู่หรอกนะ\""
34140-110 = "หืม? งั้นเหรอคะ "
34140-111 = "หืม? งั้นเหรอคะ "
34140-112 = "ขอพูดเพื่อรักษาเกียรติก่อนนะคะ ฉันไม่ได้ใช้ความสามารถที่ลึกลับอะไรแบบนั้นหรอกนะคะ "
34140-113 = "อะไรคล้ายๆ การล้างสมองน่ะ... หึหึหึ ฉันล่ะอยากจะมีความสามารถที่สะดวกแบบนั้นจัง แต่ก็น่า#nเสียดายนะคะที่ของแบบนั้นไม่ใช่วิธีของ <ผู้ใหญ่> "
34140-114 = "ความแค้น การดูหมิ่น ความโกรธ ความเกลียดชัง... ใช่ค่ะ ที่ผ่านมาฉันใช้สิ่งเหล่านี้ควบคุมคนด้วย#nการโกหกและหลอกลวงค่ะ "
34140-115 = "ถึงมันจะเรียบง่าย แต่ก็เป็นวิธีที่แน่นอนที่มีมาแต่ไหนแต่ไร คุณเองก็น่าจะทราบดีนะคะ"
34140-117 = "เดิมทีแล้วเขตปกครองตนเองก่อสงครามกลางเมืองกันก่อนที่ฉันจะมาที่นี่อีกนะคะ"
34140-118 = "ต่างฝ่ายคงต่างสะสมความแค้น การดูหมิ่น ความโกรธ และความเกลียดชังเอาไว้มากทีเดียว ฉันก็แค่มาใช้สิ่งเหล่านี้เป็นเครื่องมือค่ะ"
34140-119 = "แต่ก็ใช่ว่าที่นี่จะพิเศษอะไรหรอกนะคะ ของแบบนี้เป็นภาพที่หาดูได้ทุกที่อยู่แล้วไม่ใช่เหรอคะ? "
34140-122 = "ถ้าเป็นเรื่องจิตใจที่เคียดแค้นละก็... ทรีนิตี้น่าจะหนักกว่านี้อีกค่ะ"
34140-124 = "ใช่แล้วค่ะ นี่คือวิธีที่ฉันใช้ "
34140-125 = "บิดเบือนถ้อยคำที่สอนความถ่อมตนของชีวิตเป็นความว่างเปล่าที่ไร้ประโยชน์"
34140-126 = "บิดเบือนการไตร่ตรองเพื่อป้องกันความเสื่อมเป็นความรู้สึกผิดที่ไม่อาจหลุดพ้น"
34140-127 = "บิดเบือนความจริง ปิดบังความซื่อสัตย์ ปั่นความจริงใจ ก่อความเกลียดชัง ปลุกปั่นความแค้น ทำให้ผู้อื่น ผู้อื่น ผู้อื่น และผู้อื่นต้องเป็นคนอื่นของกันและกันตลอดไป"
34140-128 = "สวรรค์เป็นสวรรค์ได้เพราะไม่มีวันไปถึง ส่วนนรกก็เป็นที่ที่ <ผู้ใหญ่> ปกครองและใช้ประโยชน์ <เด็กๆ> อย่างเต็มที่ค่ะ"
34140-129 = "มันอาจเป็นนรกสำหรับบางคน แต่มันก็เป็นสวรรค์ที่สำราญใจของ <ผู้ใหญ่> "
34140-130 = "เพราะฉะนั้นช่วยเข้าใจฉันหน่อย ได้หรือเปล่าล่ะคะคุณครู?"
34140-132 = "จะไม่ปล่อยสายเลือดของราชวงศ์คนนั้นไปงั้นเหรอคะ?"
34140-133 = "เด็กคนนั้นเป็นเด็กที่ฉันฟูมฟักและสั่งสอนมานะคะ ถ้าสละชีวิตเด็กคนนี้เป็นเครื่องสังเวยแล้วละก็ ต่อไปจะมีเรื่องดีๆ เกิดขึ้นกับผู้ใหญ่อย่างเราแน่นอนค่ะ"
34140-134 = "ไม่สงสัยเหรอคะว่าฉันใช้เด็กคนนั้นทำอะไรอยู่? ไม่สงสัยเหรอคะว่าจะประสบความสำเร็จแบบไหน? ถ้าสงสัย จะให้ฉันบอกตรงนี้ตอนนี้เลยก็ได้ค่ะ"
34140-135 = "คุณครูน่ะ... ไม่สนใจเรื่องอะไรแบบนี้เหรอคะ?"
34140-137 = "นี่คุณครู... ไม่อยากรู้เหรอคะว่าโลกใบนี้... ที่ที่เรียกว่าคิโวทอสนี้เป็นสถานที่แบบไหน?"
34140-138 = "โลกนี้ไม่มีตัวตนหรอกค่ะ มันก็แค่เตาหลอมชั้นดีที่ผสมความน่ากลัวกับความลึกลับที่ไม่มีใครเข้าใจได้"
34140-140 = "ฉันสามารถบอกความจริงของโลกใบนี้ได้ค่ะ ว่ายังไงล่ะคะ? หากพลาดโอกาสนี้ไป อาจจะไม่มีโอกาส#nที่สองก็ได้นะคะ  "
34140-141 = "[s] \"พอได้แล้ว\""
34140-142 = "หืม?"
34140-143 = "[s3] \"ฉันไม่สนอะไรแบบนี้หรอก\"\n[s4] \"ฉันจะไม่เอาชีวิตใครมาแลกกับการที่จะได้รับรู้ถึงความจริงอะไรนั่นหรอก\""
34140-144 = "หึหึหึ... ว่าแล้วเชียว... ตอนจบจะเป็นอย่างนี้สินะคะ "
34140-145 = "หึหึหึ... ว่าแล้วเชียว... ตอนจบจะเป็นอย่างนี้สินะคะ "
34140-146 = "หมายความว่าเราจะเชื่อในความจริงที่ต่างกัน คุณคือศัตรูตัวฉกาจของฉันจริงด้วยค่ะ"
34140-147 = "ถ้างั้น... สวรรค์ที่คุณพึ่งพิง... ก็คือ <สนธิสัญญาเอเดน> เหรอคะ? โลกที่เข้าใจได้ง่าย ไม่ซับซ้อน และเอาชนะความชั่วได้ด้วยมิตรภาพของทุกคนน่ะเหรอคะ?"
34140-148 = "หึหึหึ... ความคิดของเด็กๆ ช่างไร้เดียงสาและเรียบง่ายอย่างนี้สินะ"
34140-149 = "ถึงเราจะตั้งชื่อให้มันว่าสวรรค์ก็ไม่มีอะไรเปลี่ยนแปลงหรอกค่ะ คนเป็นผู้ใหญ่ยิ่งต้องสอนความจริงนี้#nสิคะ"
34140-150 = "สอนว่า <สวรรค์คือที่ที่บาปแรกเริ่มต้นขึ้น> ไงคะ..."
34140-151 = "สวรรค์ที่แท้จริงน่ะ... คือที่ที่เต็มไปด้วยความแค้น ความโกรธ ความเกลียดชัง ความเจ็บปวด ความเสียใจ การโทษตัวเอง และการทำร้ายตัวเอง..."
34140-152 = "[ns] \"เบียทริซ\""
34140-154 = "[ns5] \"เธอดูถูกครู ดูถูกนักเรียน เธอดูถูกพวกเรา\"\n[ns6] \"เธอดูถูกการสั่งสอนและการเล่าเรียน\"\n[ns7] \"ในฐานะของผู้ใหญ่ จะไม่ยกโทษให้เธอเด็ดขาด\""
34140-159 = "งั้นฉัน... ควรมองว่านี่คือการประกาศสงครามใช่ไหมคะ? "

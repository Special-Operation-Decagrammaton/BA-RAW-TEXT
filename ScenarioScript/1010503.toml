[translation]
1010503-1 = "大驚小怪的保鏢們（？）"
1010503-2 = "（因為瑪麗說的話讓人有點在意，因此決定前往正在舉辦學園祭的三一）"
1010503-4 = "老師……？"
1010503-5 = "[s1]「……瑪麗？」\n[s2] 回頭看向聲音傳來的地方"
1010503-10 = "[ns3]「……瑪麗！？」\n[ns4]「你，你後面那兩個人(?)是……！？」"
1010503-13 = "那，那個……其實我也不太清楚……"
1010503-14 = "他們是彩排和加場表演時都會來加油的粉絲……"
1010503-15 = "但是不知道為什麼，他們每次要表達想法的時候都會把話寫在木牌上。"
1010503-16 = "「請問你是哪位？」"
1010503-17 = "[s5]「我是老師。」\n[s6]「是來幫瑪麗加油的。」"
1010503-20 = "「明白了，你是好人」"
1010503-21 = "「應援的事就交給你了」"
1010503-22 = "「為了避免打擾，我們就先離開了」"
1010503-23 = "「直到表演結束都要加油哦！！」"
1010503-32 = "……他們走了呢。"
1010503-33 = "……嗯？"
1010503-34 = "啊啊，沒問題的。#n櫻子大人和美禰團長也都知道這件事。"
1010503-35 = "櫻子大人甚至還麻煩他們擔任我的保鏢……"
1010503-39 = "現在想想，或許他們其實是修女會的人也說不定呢……"
1010503-40 = "[s7]「……真是辛苦你了，瑪麗。」\n[s8]「好像能想像那副景象……」"
1010503-43 = "畢竟大家都很擔心我。#n雖然已經跟他們說過沒關係了，但大家好像還是不放心……"
1010503-44 = "總之這件事您不必擔心！#n我只是為了讓您放心，所以才提前跟您說一聲而已。"
1010503-45 = "話，話說回來，您今天怎麼會過來……"
1010503-46 = "……咦？"
1010503-47 = "您也有點擔心……？#n您指的是……我嗎？"
1010503-48 = "老師……"
1010503-49 = "[s9]「抱，抱歉。其實我也跟他們一樣。」\n[s10]「看來我這次來的時機好像不太對。」"
1010503-52 = "……呼。"
1010503-53 = "雖然我的確有很多不足和缺點，但我也不是需要被人過度保護的孩子。"
1010503-54 = "難道我在大家眼中……真的就這麼需要被保護嗎？"
1010503-55 = "……嗯？"
1010503-56 = "您說不是那個意思？#n可是……"
1010503-57 = "[s11]「你就當是我們愛操心吧。」\n[s12]「畢竟我們都很關心你。」"
1010503-60 = "老師……"
1010503-61 = "我明白您的心情，但好像還是有點難以接受……"
1010503-62 = "……咦？"
1010503-63 = "問我在這裡做什麼？那個……"
1010503-64 = "……不，不是的。#n並不是要進行加場表演或彩排，否則剛才那兩位就會跟著我了。"
1010503-65 = "這次來這裡應該說是……為了和一些人見面吧？#n大概就是這種感覺。"
1010503-66 = "有些平時常來教堂諮詢或禱告的人，聽說了這身服裝的事情之後……"
1010503-67 = "突然說很想看看我現在的樣子，所以我正準備要去見他們。"
1010503-68 = "[s13]「所以是……粉絲見面會？」\n[s14]「瑪麗果然是大家的偶像呢。」"
1010503-71 = "不，不是的！那怎麼可能呢！絕對沒有那種事……！！"
1010503-72 = "真是的……請您別取笑我了，老師！#n自己的事情我比誰都清楚。"
1010503-73 = "只是因為他們每次會主動跟我問好，所以我才覺得也該去跟他們打聲招呼而已。"
1010503-74 = "……哎呀。"
1010503-75 = "這麼說來，剛才那兩位明明說要陪我一起去……沒想到他們就這麼走掉了呢。"
1010503-76 = "[s15]「他們似乎希望我接棒的樣子。」\n[s16]「所以現在這已經是我的任務了。」"
1010503-79 = "老，老師您嗎……！？"
1010503-80 = "不，不會，只是……#n唔嗯……總覺得這樣……"
1010503-81 = "好像有種……"
1010503-82 = "老師您……在護送我的感覺……"
1010503-83 = "感覺……有點……"
1010503-87 = "那麼……"
1010503-88 = "就拜託您了……老師……"
1010503-90 = "（之後便「護送」瑪麗到人們等待的地點）"
1010503-94 = "（……然而在見到現場人山人海的粉絲之後，#n　瑪麗驚訝地懷疑自己是不是跑錯了地方，表情似乎快哭了出來）"

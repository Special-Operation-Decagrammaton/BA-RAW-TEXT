[translation]
1010503-1 = "บอดี้การ์ดที่ตื่นตระหนกเกินเหตุ(?)"
1010503-2 = "(คุณครูเป็นกังวลกับคำพูดของมารี จึงแวะไปยังทรีนิตี้ที่กำลังจัดงานเทศกาลโรงเรียน)"
1010503-4 = "คุณครู...?"
1010503-5 = "[s1] \"มารี...?\"\n[s2] หันไปตามเสียง"
1010503-10 = "[ns3] \"มารี!? ข้างหลังนั่นคือ...?\"\n[ns4] \"มารี!? ใครอยู่ข้างหลังน่ะ...!?\""
1010503-13 = "คะ... คือว่า... ที่จริงฉันก็ไม่รู้ค่ะ..."
1010503-14 = "แต่เวลามีซ้อมหรือมีการแสดงเพิ่มเติม 2 คนนี้ก็จะมาให้กำลังใจค่ะ..."
1010503-15 = "แล้วก็ใช้การเขียนข้อความบนป้ายแทนการพูดด้วยค่ะ"
1010503-16 = "\"คุณคือใครน่ะ?\""
1010503-17 = "[s5] \"ครูจากชาเล่ต์ มาเชียร์มารีน่ะ\"\n[s6] \"ครูจากชาเล่ต์ มาให้กำลังใจมารีน่ะ\""
1010503-20 = "\"เข้าใจแล้ว เป็นคนดีสินะ\""
1010503-21 = "\"ต้องเป็นแฟนคลับที่ดีนะ\""
1010503-22 = "\"พวกเราไม่ควรรบกวน งั้นขอตัวก่อนละ\""
1010503-23 = "\"สู้ๆ กับการแสดงนะ!!\""
1010503-32 = "ไปซะแล้วค่ะ..."
1010503-33 = "คะ...?"
1010503-34 = "อ้อ ไม่ต้องห่วงหรอกค่ะ ท่านซากุระโกะกับหัวหน้ามิเนะก็รู้เรื่องนี้แล้วค่ะ"
1010503-35 = "ท่านซากุระโกะยังขอให้พวกเธอมาเป็นบอดี้การ์ดให้ฉันด้วยค่ะ..."
1010503-39 = "พอได้ลองคุยกัน ฉันว่าอาจจะเป็นคนจากชมรมซิสเตอร์ก็ได้..."
1010503-40 = "[s7] \"เหนื่อยน่าดูเลยนะ...\"\n[s8] \"นึกภาพออกเลยแฮะ...\""
1010503-43 = "เพราะทุกคนเป็นห่วงกันน่ะค่ะ ถึงฉันจะบอกว่าไม่เป็นไร แต่ก็ยังเป็นห่วงเป็นใยฉันไม่หยุด..."
1010503-44 = "แต่คุณครูไม่ต้องกังวลเรื่องนี้หรอกนะคะ! ฉันแค่บอกไว้ล่วงหน้า เผื่อว่าคุณครูจะเห็นแล้วตะขิดตะขวง#nใจน่ะค่ะ"
1010503-45 = "จะ... จะว่าไป คุณครูมีธุระอะไรที่นี่เหรอคะ...?"
1010503-46 = "คะ...?"
1010503-47 = "มาเพราะเป็นห่วงงั้นเหรอคะ...? เป็นห่วงฉันน่ะเหรอคะ...?"
1010503-48 = "คุณครู..."
1010503-49 = "[s9] \"ขะ... ขอโทษนะ ครูก็เป็นเหมือนคนอื่นเลย\"\n[s10] \"รอบนี้มาได้จังหวะไม่ค่อยดีเลยแฮะ\""
1010503-52 = "เฮ้อ..."
1010503-53 = "ฉันรู้ตัวค่ะว่าตัวเองยังไม่เก่งและยังเงอะๆ งะๆ แต่ฉันก็ไม่ใช่เด็กที่ต้องได้รับการดูแลมากมายขนาดนั้น#nนะคะ"
1010503-54 = "คนอื่นคิดว่าฉันน่าเป็นห่วงขนาดนั้นเลยเหรอคะ?"
1010503-55 = "คะ...?"
1010503-56 = "ไม่ได้หมายความแบบนั้นเหรอคะ? แต่ว่า..."
1010503-57 = "[s11] \"คิดว่าครูเป็นห่วงนักเรียนก็ได้\"\n[s12] \"ทุกคนแค่หวงแหนมารีน่ะ\""
1010503-60 = "คุณครู..."
1010503-61 = "ถึงจะพูดแบบนั้น... แต่สำหรับคนฟังมันลำบากใจนะคะ..."
1010503-62 = "คะ...?"
1010503-63 = "ฉันมาทำอะไรอยู่ที่นี่น่ะเหรอคะ? เรื่องนั้นมัน..."
1010503-64 = "มะ... ไม่หรอกค่ะ ครั้งนี้ฉันไม่ได้มีซ้อมหรือการแสดงเพิ่มเติมอะไรหรอกค่ะ ถ้าเป็นเรื่องนั้นละก็ เมมเบอร์ที่เหลือก็ต้องอยู่ด้วยสิคะ"
1010503-65 = "ครั้งนี้ฉันแค่มา... ต้องเรียกว่าเป็นการประชุมหรือเปล่านะ มาประชุมหรืออะไรประมาณนั้นน่ะค่ะ"
1010503-66 = "พอดีคนที่เคยมาปรึกษาเรื่องกังวลใจกับฉันที่วิหารและคนที่ฉันเจอบ่อยๆ รู้มาว่าฉันใส่ชุดใหม่..."
1010503-67 = "พวกเขาเลยบอกว่าอยากเจอฉันในลุคใหม่ดู ฉันก็เลยกำลังไปหาตามนัดน่ะค่ะ"
1010503-68 = "[s13] \"คล้ายๆ กับ... แฟนมีตติ้งเหรอ?\"\n[s14] \"มารีเป็นไอดอลของทุกคนจริงๆ นะเนี่ย\""
1010503-71 = "มะ... ไม่ค่ะ! ไม่ใช่อย่างนั้นค่ะ! ไม่ใช่สักหน่อยค่ะ...!!"
1010503-72 = "จริงๆ เลย... อย่าล้อกันสิคะ คุณครู! ฉันรู้จักตัวเองดีกว่าใครเพื่อนค่ะ"
1010503-73 = "พอรู้ว่ามีคนที่อยากมาทักทาย ฉันก็แค่ไปทักทายและพูดคุยด้วยค่ะ"
1010503-74 = "เอ๋..."
1010503-75 = "จะว่าไป 2 คนนั้นบอกว่ามาคุ้มกันฉันตอนไปที่นั่นนี่นา... แต่กลับกันไปแล้วจนได้..."
1010503-76 = "[s15] \"เหมือนจะเป็นหน้าที่ของครูแล้วละ\"\n[s16] \"งั้นครูจะรับบทนั้นให้เอง\""
1010503-79 = "คะ... คุณครู...!?"
1010503-80 = "มะ... ไม่สิ เอ่อ... อ่า... ถะ... ถ้าเป็นอย่างนั้นละก็..."
1010503-81 = "เท่ากับว่า... คุณครู..."
1010503-82 = "จะ... มาเป็น... บอดี้การ์ด... ให้ฉัน..."
1010503-83 = "ถะ... ถ้างั้น..."
1010503-87 = "ก็..."
1010503-88 = "ขอฝากตัวด้วยนะคะ... คุณครู..."
1010503-90 = "(จากนั้นคุณครูก็เป็น 'บอดี้การ์ด' ให้มารี และพาเธอไปยังสถานที่ที่คนอื่นๆ รออยู่)"
1010503-94 = "(ที่นั่นมีผู้คนรออยู่เป็นจำนวนมาก จนมารีถึงกับตกใจและทำหน้าเหมือนจะร้องไห้)"

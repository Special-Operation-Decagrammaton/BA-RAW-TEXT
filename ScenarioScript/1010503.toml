[translation]
1010503-1 = "Belligerent Bodyguards(?)"
1010503-2 = "Concerned about what Mari said, I went to Trinity, where the Carnival was in full swing."
1010503-4 = "Sensei...?"
1010503-5 = "[s1] \"...Mari?\"\n[s2] Turn toward the voice."
1010503-10 = "[ns3] \"...Mari?!\"\n[ns4] \"Who are you...with?\""
1010503-13 = "I, um, don't really know."
1010503-14 = "Whenever I'm doing rehearsals or encores, they show up and cheer for me."
1010503-15 = "They only communicate by writing on picket signs, for some reason."
1010503-16 = "\"Who are you?\""
1010503-17 = "[s5] \"I'm Schale's Sensei.\"\n[s6] \"I came here to help encourage Mari.\""
1010503-20 = "\"Understood. You're a good person.\""
1010503-21 = "\"We'll leave the cheering to you, then.\""
1010503-22 = "\"We'll get out of your way.\""
1010503-23 = "\"Break a leg!\""
1010503-32 = "...And there they go."
1010503-33 = "Hmm?"
1010503-34 = "Ah, no worries. Sakurako and Captain Mine know about them too."
1010503-35 = "In fact, I heard Sakurako actually asked them to escort me..."
1010503-39 = "Now that I've said that, I think they might be from the Sisterhood..."
1010503-40 = "[s7] \"Maybe they feel like you need the help.\"\n[s8] \"It...kind of makes sense.\""
1010503-43 = "Everyone worries about me too much. I kept saying I'm okay, but it doesn't seem to make any difference..."
1010503-44 = "Anyway, don't worry about that. I'm just explaining in case you're wondering about it."
1010503-45 = "On an unrelated note, what brings you here?"
1010503-46 = "Hmm?"
1010503-47 = "You came here because you were worried? ...About me?"
1010503-48 = "...Sensei..."
1010503-49 = "[s9] \"I know, that makes me just like them.\"\n[s10] \"Bad timing, I suppose.\""
1010503-52 = "*sigh*"
1010503-53 = "I might be a little clumsy and inexperienced sometimes, but it's not like I need babysitters."
1010503-54 = "Is it just the way I look? Do people see me and think...?"
1010503-55 = "Hmm?"
1010503-56 = "Oh, is that not what you meant?"
1010503-57 = "[s11] \"I just worry.\"\n[s12] \"A lot of people really care about you.\""
1010503-60 = "Sensei..."
1010503-61 = "I know what you're saying, but it's hard to chase off that feeling..."
1010503-62 = "Hmm?"
1010503-63 = "What was I doing here? Well, um..."
1010503-64 = "...No, it wasn't about encores or rehearsals this time. If it was, those two would've stayed."
1010503-65 = "I got invited to a meeting, or...something."
1010503-66 = "A lot of people who come to the cathedral end up asking me questions and whatnot."
1010503-67 = "Some people begged me to come talk to them, so I was on my way to go say hi."
1010503-68 = "[s13] \"In other words...a fan meet-and-greet?\"\n[s14] \"You really are everyone's idol, Mari.\""
1010503-71 = "N-No, no, I'm not... It's nothing like that!"
1010503-72 = "Seriously, don't tease me, Sensei!"
1010503-73 = "I know some of the people there, so I'm just going to pop in and talk to them real quick."
1010503-74 = "...Huh."
1010503-75 = "Those two from earlier had said — well, written — that they were going to come with me, but I guess they decided to bail."
1010503-76 = "[s15] \"I think they left that to me.\"\n[s16] \"I can come along in their place, if you like.\""
1010503-79 = "You'd do that, Sensei...?!"
1010503-80 = "W-Well... Then... Uh... If you, um..."
1010503-81 = "...You're really going to..."
1010503-82 = "...Sensei is...escorting..."
1010503-83 = "...me..."
1010503-87 = "...I..."
1010503-88 = "...I'll be counting on you...Sensei..."
1010503-90 = " Afterwards, I \"escorted\" Mari to the place where people were waiting for her."
1010503-94 = " The place was packed. Mari, flustered, almost shed a tear, and said we might've gotten the wrong place."

[translation]
1600002-1 = "Wrong Number"
1600002-3 = "There you are. Thanks for coming. So I installed the bomb here..."
1600002-4 = "I'm worried it's on the small side, though. I wanted your opinion."
1600002-5 = "...?"
1600002-6 = "[s] \"...?\""
1600002-7 = "Sensei?"
1600002-8 = "[s] \"Haruka.\""
1600002-9 = "...?"
1600002-10 = "S-S-Sensei?! What are you doing here...?"
1600002-11 = "Wh-What? I was the one who asked you here?"
1600002-12 = "Text...?"
1600002-13 = "... "
1600002-14 = "..."
1600002-15 = "I-I-I've made a big mistake! Huge mistake!"
1600002-16 = "Th-That text wasn't meant for you."
1600002-17 = "Colossal mistake! What do I do what do I do what do I do?!"
1600002-18 = "You're wasting your precious time on me of all people because of my screw up."
1600002-19 = "I'm sorry. I'm so, so sorry."
1600002-20 = "I'm sorry I'm sorry I'm sorry I'm sorry I'm sorry..."
1600002-21 = "...?"
1600002-22 = "You...don't mind? You just want to know what I was up to?"
1600002-23 = "I-I was..."
1600002-24 = "..."
1600002-25 = "B-Bombs..."
1600002-26 = "I was secretly planting bombs."
1600002-27 = "[s] \"Bombs.\""
1600002-28 = "It's for a contract we took. There's someone...who needs to leave early tomorrow."
1600002-29 = "Since the target passes by here...I was going to detonate them as they're going by."
1600002-30 = "That would ensure the target left early...and for good..."
1600002-31 = "Who ordered me to plant the bombs? N-No one..."
1600002-32 = "I-It was...my idea."
1600002-33 = "Th-That's why I wanted to make sure I was doing it right but sent you the text by mistake!"
1600002-34 = "I'm sorry again. I'm sorry, I'm sorry..."
1600002-35 = "You really...don't mind?"
1600002-36 = "O-Oh. You meant that you don't mind me contacting you. That makes sense... "
1600002-37 = "I...have to remove all of the bombs, don't I?"
1600002-38 = "Y-Yes, Sensei! Whatever you say..."
1600002-40 = "(We retrieved more than ten bombs that Haruka had planted.)"
1600002-42 = "All done... It's a shame I did all of that work for nothing."
1600002-43 = "Did I plant bombs anywhere else? S-Sure I did. I had to ensure the target would leave the mortal plane early..."
1600002-44 = "A-Are you saying I didn't have to take it that far? You want to know where the other bombs are, don't you?"
1600002-45 = "Um... The basement, the fitness club, the park..."
1600002-46 = "Do I really have to disarm all of them? Fine... I understand."
1600002-47 = "W-Wait, I can do it by myself! Honest! Y-You don't have to go out of your way to escort someone like me!"
1600002-48 = "[s1] \"I'm going with you because I want to.\"\n[s2] \"Do you not want to be around me?\""
1600002-49 = "...?!"
1600002-50 = "But why would you want to walk with me...?"
1600002-51 = "N-No, I just mean that...! That's not what I meant to say!"
1600002-52 = "You're really okay with this...? You're even going to insist?"
1600002-53 = "W-Well... If you say so."
1600002-54 = "W-We should get going, then."
1600002-56 = "And then one next to this pillar. There. It's disarmed now..."
1600002-57 = "[s] \"Good work.\""
1600002-58 = "I-It's not like I did anything special."
1600002-59 = "...!"
1600002-62 = "(Haruka immediately took the lead, almost as if she was running away.)"
1600002-64 = "Here too."
1600002-65 = "What a waste. A detonation here would have taken the target out for sure..."
1600002-66 = "Huh? I-It's nothing. I was just talking to myself."
1600002-67 = "[s] \"Let's keep going.\""
1600002-68 = "Y-Yes, Sensei."
1600002-70 = "That takes care of all the ones planted here."
1600002-71 = "Y-You must think I'm wasting your time, don't you, Sensei?"
1600002-72 = "A disappointment like me is making you stay up and work until dawn..."
1600002-73 = "I'm sorry...for all the trouble I cause."
1600002-74 = "I just wanted to impress everyone and make them like me."
1600002-75 = "[s3] \"I still managed to have fun in a way.\"\n[s4] \"I'm treating it like a nice, nighttime walk.\""
1600002-76 = "Wh-What do you mean...?"
1600002-77 = "Wh-What do you mean...?"
1600002-78 = "You don't have to say something like that for me..."
1600002-79 = "I shouldn't be so hard on myself?"
1600002-80 = "You think I don't need to do these kinds of things to be liked?"
1600002-81 = "N-No way! People wouldn't like me if I didn't...!"
1600002-82 = "I-I would never question you, Sensei, all I mean is...!"
1600002-83 = "I-It's just that I...!"
1600002-84 = "No one's ever said that to me before!"
1600002-85 = "..."
1600002-86 = "Heh..."
1600002-87 = "Thanks, Sensei... You're a really nice person."
1600002-88 = "It amazes me that you'd want to spend time with and give advice to someone like me."
1600002-89 = "So thank you. Really."
1600002-90 = "If it's for you, Sensei..."
1600002-91 = "...then, I can..."
1600002-93 = "I can get rid of everything that stands in our way."
1600002-94 = "[s] \"...?\""
1600002-95 = "Heh heh... Hahahaha..."
1600002-97 = "(After bowing several times in a row, Haruka disappeared with an enigmatic smile on her face.)"

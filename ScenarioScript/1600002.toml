[translation]
1600002-1 = "錯誤的聯絡"
1600002-3 = "啊，謝謝您前來赴約。是這樣的，我有在這裡設置了一些炸彈……"
1600002-4 = "但是數量好像有點少……需要確認一下這樣行不行得通……"
1600002-5 = "……？"
1600002-6 = "[s] 「……？」"
1600002-7 = "……老師？"
1600002-8 = "[s] 「嗨，遙香。」"
1600002-9 = "……？"
1600002-10 = "老，老老老老，老師！？為什麼老師在這裡……！？"
1600002-11 = "咦，嗯？是，是，是我叫您來的？我，我，我，找老師！？"
1600002-12 = "訊息……？"
1600002-13 = "…… "
1600002-14 = "……"
1600002-15 = "……！！！對，對對對對對不起！我，我，我叨擾到老師了……！"
1600002-16 = "那，那個，我，這是……！這則訊息我本來不是要傳老師的……！"
1600002-17 = "我搞錯了……！是我搞錯傳給老師了……！這，這該怎麼辦……！"
1600002-18 = "都怪我不小心，讓老師為了我這種人跑到這裡來……！"
1600002-19 = "對不起……真，真的很對不起……"
1600002-20 = "對不起對不起對不起對不起對不起對不起對不起……"
1600002-21 = "……？"
1600002-22 = "咦，您，您說沒關係……？比起那個，我在這兒做什麼……？"
1600002-23 = "這，這是，那，那個……"
1600002-24 = "……"
1600002-25 = "炸，炸彈……"
1600002-26 = "我在這裡設置了炸彈……"
1600002-27 = "[s] 「……炸彈？」"
1600002-28 = "是的，那個……有人委託我們便利屋……說無論如何都希望我們明天能讓某個人遲到……"
1600002-29 = "聽說那個人會經過這裡……所以只要等對方經過的時候引爆……"
1600002-30 = "這樣……就能讓對方……永遠……遲到了……"
1600002-31 = "……咦？啊，是，沒有人指示我一定要放炸彈……"
1600002-32 = "這，這只是……我自己的判斷……"
1600002-33 = "然，然後我開始擔心炸彈是不是有確實設置好……！便傳訊息要請對方確認，結果不小心把訊息傳給老師……"
1600002-34 = "對不起把老師叫來這種地方，真的很對不起……"
1600002-35 = "……咦，沒關係嗎？"
1600002-36 = "啊，您是說聯絡錯了沒關係嗎……是，真對不起……"
1600002-37 = "……咦，要我收回所有的炸彈……？"
1600002-38 = "好，好的，沒問題……！既然老師都這麼說了……"
1600002-40 = "（之後把遙香設置的炸彈全數收回，數量高達二位數）"
1600002-42 = "全都收回來了……請問，我是不是做了什麼多餘的事情……？"
1600002-43 = "……咦？您問我除了這裡以外，還有哪裡有放炸彈嗎？有，有的，因為要把對方徹底除掉……"
1600002-44 = "咦，您說不需要把對方除掉……？您問我剩下的炸彈在什麼地方……？"
1600002-45 = "嗯……大樓地下室……健身房……還有公園……"
1600002-46 = "什，什麼？全部拆除……？是……我知道了……"
1600002-47 = "咦，咦！？沒事的！我自己去就行了！怎麼可以讓老師為了我這種人到處跑……！"
1600002-48 = "[s1] 「因為我想和遙香一起去。」\n[s2] 「你不想跟我一起去嗎？」"
1600002-49 = "……！？"
1600002-50 = "為，為什麼……要和我這種人……"
1600002-51 = "不，不！我絕對沒有那種意思……！"
1600002-52 = "……不，不過，真的嗎……？您說一定要跟我一起去……咦……？"
1600002-53 = "我，我明白了……既然老師都這麼說了……"
1600002-54 = "那，那我們出發了吧……"
1600002-56 = "……這裡……柱子的後面……OK，拆除完畢……"
1600002-57 = "[s] 「辛苦了。」"
1600002-58 = "不，不會辛苦……您過獎了……"
1600002-59 = "……嗚嗚，謝謝老師！"
1600002-62 = "（遙香加快了腳步，像是要逃跑一樣快步走開）"
1600002-64 = "這裡也有……"
1600002-65 = "……感覺有點可惜……要是能在這裡引爆的話，就能徹底送上路了……"
1600002-66 = "啊，什，什麼也沒有。我在自言自語而已……"
1600002-67 = "[s] 「還有其他地方對吧，我們走。」"
1600002-68 = "好，好的……"
1600002-70 = "這裡弄完……就全部……都拆除了……"
1600002-71 = "……老，老師，那個……我是不是……做了什麼讓老師感到困擾的事情呢……？"
1600002-72 = "都是因為我的關係……這麼晚了還叨擾老師……陪我這種人……"
1600002-73 = "對……對不起……我總是……給人添麻煩……"
1600002-74 = "我還以為，我這麼做會讓大家都開心……"
1600002-75 = "[s3] 「不會，還挺有意思的。」\n[s4] 「難得在深夜裡散步，挺愉快的。」"
1600002-76 = "……咦，怎，怎麼會……"
1600002-77 = "……咦，怎，怎麼會……"
1600002-78 = "您，您怎麼會願意為了我……說這麼溫柔的話……"
1600002-79 = "咦……您建議我……可以更放鬆一點……？"
1600002-80 = "可以不需要這麼低聲下氣……？"
1600002-81 = "不，不行……！那可不行！因，因為我……！"
1600002-82 = "不，不！我絕對！絕對不是說老師說的話有錯，那個，我，我是說，那個……！"
1600002-83 = "所，所以說，我，我的意思是，那……那種話……！"
1600002-84 = "……我第一次聽到有人對我說那種話……！"
1600002-85 = "……"
1600002-86 = "……嘿嘿……"
1600002-87 = "謝謝你……老師……您真的是個很善良的人呢……"
1600002-88 = "老師不但願意和我這樣的人說話……陪我一起行動，還給我建議……"
1600002-89 = "……謝謝您……真的……"
1600002-90 = "只要……只要是為了老師，我……我願意……"
1600002-91 = "……我願意……"
1600002-93 = "只要為了老師……我願意為您除掉，所有礙眼的事物……"
1600002-94 = "[s] 「……！？」"
1600002-95 = "嘿嘿……呵呵，呵呵呵……"
1600002-97 = "（之後遙香便接連鞠了好幾次90度躬，一邊道歉一邊道謝，並帶著詭異的笑容離開了）"

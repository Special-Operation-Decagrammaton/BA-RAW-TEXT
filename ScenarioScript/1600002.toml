[translation]
1600002-1 = "กดผิด"
1600002-3 = "มาแล้วเหรอคะ? ขอบคุณที่มาหากันนะคะ พอดีว่าฉันติดตั้งระเบิดไว้ที่นี่น่ะค่ะ..."
1600002-4 = "แต่ก็กังวลว่ามันจะเล็กไป... ก็เลยอยากได้ความเห็นของคุณครู..."
1600002-5 = ".......?"
1600002-6 = "[s] \"...?\""
1600002-7 = ".... คุณครูคะ ....?"
1600002-8 = "[s] \"ว่าไง ฮารุกะ\""
1600002-9 = ".......?"
1600002-10 = "คะ... คะ... คุณครู!? ทำไมถึงมาอยู่ตรงนี้ได้คะ...??"
1600002-11 = "คะ... คะ? วะ... ว่าไงนะคะ? ฉะ... ฉะ... ฉันเรียกคุณครูมาเหรอคะ? ฉะ... ฉันเนี่ยนะ...?"
1600002-12 = "ข้อความ... เหรอคะ?"
1600002-13 = "......"
1600002-14 = "......"
1600002-15 = "......!!! ขะ... ขะ... ขอโทษค่ะ! ฉะ... ฉันควรถูกลงโทษ...!"
1600002-16 = "พอดีว่า... ฉัน... เอ่อ...! ไม่ได้ตั้งใจจะส่งให้คุณครูหรอกค่ะ...!"
1600002-17 = "ฉันกดผิด...! ใช่ค่ะ! ฉันเผลอกดผิดไป...! ทำยังไงดีเนี่ย...!"
1600002-18 = "แค่กดผิดแท้ๆ แต่คุณครูก็ยังมาหาฉันถึงที่นี่...!"
1600002-19 = "ขอโทษนะคะ... ขะ... ขอโทษ..."
1600002-20 = "ขอโทษนะคะ ขอโทษค่ะ ขอโทษค่ะ ขอโทษด้วยค่ะ ขอโทษนะคะ ขอโทษจริงๆ ค่ะ ขอโทษค่ะ......"
1600002-21 = "......?"
1600002-22 = "วะ... ว่าไงนะคะ? ไม่เป็นไรเหรอคะ? ... สงสัยว่าฉันทำอะไรอยู่ใช่ไหมคะ?"
1600002-23 = "คะ... คือว่า..."
1600002-24 = "......"
1600002-25 = "ระ... ระเบิด..."
1600002-26 = "ฉันมาแอบวางระเบิดอยู่ค่ะ..."
1600002-27 = "[s] \"ระเบิดเหรอ...?\""
1600002-28 = "นะ... นี่เป็น... งานของหน่วยรับจ้างน่ะค่ะ... พอดีพรุ่งนี้มีคนที่ต้องรีบเลิกงานเร็ว..."
1600002-29 = "และเป้าหมายของเราก็อยู่ที่นี่ด้วย เราก็เลยกะจะให้เป้าหมายมาเหยียบระเบิด..."
1600002-30 = "แค่นี้เป้าหมายก็จะ... กลับเร็วขึ้นแล้วล่ะค่ะ... บางทีอาจจะขิตไปเลยก็ได้..."
1600002-31 = "... คะ? สงสัยว่าใครสั่งให้วางระเบิดงั้นเหรอคะ? มะ... ไม่มีใครมาสั่งหรอกค่ะ..."
1600002-32 = "ฉะ... ฉันเป็นคน... จัดการเองทั้งหมด..."
1600002-33 = "ฉะ.. ฉันอยากเช็กว่ามันโอเคไหม ก็เลยเผลอกดส่งข้อความไป...! ฉันไม่ได้ตั้งใจจริงๆ นะคะ...!"
1600002-34 = "ขอโทษอีกครั้งนะคะ ขอโทษด้วยค่ะ ขอโทษด้วยค่ะ ขอโทษด้วยค่ะ..."
1600002-35 = "...คะ? ไม่เป็นไรเหรอคะ...?"
1600002-36 = "สะ... แสดงว่า... คุณครูไม่ได้รำคาญที่ฉันส่งข้อความไปใช่ไหมคะ?"
1600002-37 = "คะ…? ให้เอาระเบิดทั้งหมดออกเหรอคะ? อืม..."
1600002-38 = "ดะ.. ได้สิคะ...! ถ้าคุณครูพูดแบบนี้ ฉันก็ต้องเอาออก..."
1600002-40 = "(ฮารุกะเอาระเบิดที่ติดตั้งไว้ออกทั้งหมด นับแล้วมีเกิน 10 ลูก)"
1600002-42 = "หมดแล้วค่ะ... เฮ้อ... ฉันไม่น่าทำตั้งแต่แรกเลย..."
1600002-43 = "...คะ? อยากรู้ว่านอกจากที่นี่แล้ว... ยังมีระเบิดอยู่ที่อื่นด้วยหรือเปล่าเหรอคะ?#nเอ่อ... น่าจะมี... นะคะ"
1600002-44 = "ยะ... อยากรู้ว่าซ่อนอยู่ตรงไหนอย่างนั้นน่ะเหรอคะ?"
1600002-45 = "อืม... มีอยู่ในชั้นใต้ดิน... โรงยิม... สวนสาธารณะ...."
1600002-46 = "คะ... คะ? ให้ไปกู้ระเบิดมาทั้งหมดเหรอคะ...? ค่ะ... ก็ได้ค่ะ..."
1600002-47 = "ไม่เป็นไรหรอกค่ะ! ไม่เป็นไรๆ ฉันไปคนเดียวได้ค่ะ! คุณครูไม่ต้องไปไหนมาไหน#nกับคนอย่างฉันหรอก..."
1600002-48 = "[s1] \"แต่ครูอยากไปด้วยนะ\"\n[s2] \"ไม่อยากไปกับครูเหรอ?\""
1600002-49 = "......!?"
1600002-50 = "ทะ.. ทำไมถึง... อยากไปกับฉันล่ะคะ?"
1600002-51 = "มะ... ไม่ใช่อย่างนั้นนะคะ! ไม่ใช่ค่ะ! ไม่มีทาง! ไม่เด็ดขาดเลยค่ะ!"
1600002-52 = "จะ... จะไปกับฉันให้ได้เลย... เหรอคะ?"
1600002-53 = "กะ... ก็ได้ค่ะ... ถ้าคุณครูอยากไปล่ะก็..."
1600002-54 = "ถะ... ถ้างั้น... เราไปกันเลยไหมคะ?"
1600002-56 = "ฉันเอา... ระเบิดลูกที่อยู่ข้างเสา... ออกแล้วค่ะ..."
1600002-57 = "[s] \"สุดยอดเลย\""
1600002-58 = "ดะ... ดีมาก... เหรอคะ?"
1600002-59 = "......!"
1600002-62 = "(ฮารุกะรีบจ้ำออกไปเหมือนจะวิ่งหนี)"
1600002-64 = "ตรงนี้ก็ด้วยค่ะ..."
1600002-65 = "น่าเสียดายจัง... ถ้าเป้าหมายมาเหยียบระเบิดตรงนี้คงได้นอนในห้องพยาบาลยาวๆ แน่..."
1600002-66 = "คะ? มะ... ไม่มีอะไรค่ะ ฉันแค่พูดอะไรคนเดียวน่ะค่ะ..."
1600002-67 = "[s] \"ไปต่อกันเลย\""
1600002-68 = "คะ? ได้ค่ะ..."
1600002-70 = "กู้ระเบิด... ตรงนี้... ออกมาหมดแล้วค่ะ..."
1600002-71 = "คะ... คุณครูคิดว่า... ฉันทำอะไร... ไม่เข้าเรื่อง... ใช่ไหมคะ?"
1600002-72 = "ฉันทำให้... คุณครูต้องออกมาลำบาก... จนถึงรุ่งสางแบบนี้..."
1600002-73 = "ขะ... ขอโทษนะคะ... ฉันเอาแต่รบกวนคนอื่น... อยู่เรื่อยเลย..."
1600002-74 = "ฉันคิดว่าทำแบบนี้แล้วคนอื่นจะประทับใจเสียอีกค่ะ..."
1600002-75 = "[s3] \"แต่มันก็สนุกดีนะ\"\n[s4] \"ได้เดินเล่นตอนกลางคืนก็ดีเหมือนกัน\""
1600002-76 = "คะ…? ทะ... ทำไมถึง..."
1600002-77 = "คะ…? ทะ... ทำไมถึง..."
1600002-78 = "ทะ... ทำไมถึงพูดแบบนี้... เพื่อฉันล่ะคะ?"
1600002-79 = "ฉันไม่ต้องกังวลมากไป... ก็ได้เหรอคะ?"
1600002-80 = "ฉันไม่จำเป็นต้องทำแบบนี้... เพื่อให้คนอื่นถูกใจ... เหรอคะ?"
1600002-81 = "มะ... ไม่หรอกค่ะ ถ้าฉันไม่ทำแบบนี้... ก็ไม่มีใครชอบฉันหรอกค่ะ...!"
1600002-82 = "มะ... ไม่ใช่แบบนั้นค่ะ! ไม่ใช่! ฉันไม่ได้จะบอกว่าคุณครูพูดผิดนะคะ!"
1600002-83 = "กะ... ก็แค่... ฉันก็แค่...!"
1600002-84 = "ไม่เคยได้ยินคำพูดแบบนี้มาก่อน...!"
1600002-85 = "......"
1600002-86 = "แหะๆ..."
1600002-87 = "ขอบคุณนะคะ... คุณครูช่างเป็น... คนที่ดีมากเลยล่ะค่ะ..."
1600002-88 = "ทั้งยอมเสียเวลามาคุยกับคนอย่างฉัน... มาเดินด้วยกัน... แถมยังให้คำแนะนำอีก..."
1600002-89 = "ขอบคุณนะคะ... ขอบคุณจริงๆ ค่ะ..."
1600002-90 = "ถ้าฉันต้องทำอะไรเพื่อคุณครูล่ะก็... ฉันทำได้ทุกอย่าง..."
1600002-91 = "ทุกอย่าง..."
1600002-93 = "ฉันทำลายได้ทุกอย่างค่ะ... ถ้าเป็นการทำเพื่อคุณครู..."
1600002-94 = "[s] \"...?\""
1600002-95 = "แหะๆ... หึหึหึหึ..."
1600002-97 = "(ฮารุกะโค้งคำนับติดต่อกันหลายครั้ง แล้วหายไปพร้อมกับรอยยิ้มบนใบหน้า)"

[translation]
1503-1 = "Trouble & Trackers（３）"
1503-2 = "貝里塔斯．駭客休息室"
1503-4 = "確認為隱碼攻擊引發的惡性指令，被設置後門了。"
1503-5 = "啊，又有人從別的線路試圖入侵……"
1503-7 = "晴前輩救救我！幫忙想想辦法～！"
1503-8 = "我可不是萬能的貓型機器人，就算你要我想想辦法也……"
1503-9 = "可是再這樣下去的話，別說是修正學籍資料了，連我們的電腦都要被奪走了！"
1503-10 = "以我的實力實在是沒辦法！拜託幫幫我～！"
1503-14 = "唉，真沒辦法。雖然寫防禦性程式碼不是我的專業，不過還是試試看吧……"
1503-19 = "偽裝封包的內容，誘導他進入錯誤的路徑的話……咦？已經被阻止了？"
1503-23 = "那就在預計會被攻擊的資料夾中嵌入邏輯炸彈，導致對方發生過載……這也行不通？"
1503-28 = "唔嗯，真麻煩。這以我的能力或許有點困難……"
1503-29 = "怎，怎麼會！晴前輩居然因為駭客入侵而陷入苦戰！？"
1503-30 = "對方簡直就像能預測我方行動的一樣，對我們採取的所有手段即時做出對應。"
1503-31 = "難以相信貝里塔斯外部居然有實力達到這種水準的人存在。"
1503-32 = "晴。連線延遲導致流量正在逐漸增加。"
1503-33 = "再這樣下去，我方的真實身分有可能會被研討會發現……"
1503-34 = "也對。#n真紀，雖然遺憾，但這次就放棄修正學籍資料的紀錄吧。"
1503-36 = "嗚嗚……沒辦法了。畢竟我也不想被叫去研討會罵……"
1503-37 = "連線結束。晴前輩也撤回無人機吧。"
1503-38 = "＜SYSTEM＞#n正在刪除Log……系統結束。"
1503-40 = "（事件當日傍晚……）"
1503-44 = "我回來了。"
1503-45 = "啊，好久不見，前輩……"
1503-46 = "……發生什麼事了嗎？大家怎麼都這麼無精打采的？"
1503-47 = "該說是重新體會到了自己的極限嗎……"
1503-48 = "人外有人，天外有天……"
1503-50 = "上午在駭入的過程中遭遇了匿名駭客的反攻。"
1503-51 = "連晴前輩都瞬間遭到壓制。#n沒想到貝里塔斯外會有這種高手存在……"
1503-52 = "真的嗎？居然有比晴還厲害的高手，那還真厲害……"
1503-53 = "說到「匿名駭客」我才想到，我剛剛在維護學籍資料伺服器的時候也遇到了一個非常不得了的傢伙。"
1503-54 = "是個不知為何執意竊取身體測量紀錄的駭客。反應速度非常快，連我都差點無力招架。"
1503-55 = "……嗯？學籍資料的伺服器？"
1503-56 = "難道說剛剛跟我們交手的人是……"
1503-57 = "是副部長嗎？"
1503-59 = "……什麼？該不會剛剛駭入學籍資料引起騷動的……就是你們？"
1503-60 = "唉，難怪總覺得手法很熟悉……"
1503-61 = "原來我們從一開始就在進行沒有勝算的戰鬥。"
1503-62 = "雖然敗給一個連長相都不知道的匿名駭客會很生氣，但既然對手是貝里塔斯的副部長就沒辦法了。"
1503-63 = "就，就是說呀！這就證明沒有能超越我們貝里塔斯的駭客存在，太好了太好了！"
1503-65 = "一點也不好！！#n你們把別人的個人資料當成什麼了？"
1503-69 = "看來得重新讓你們用身體學會駭客倫理才行……過來這裡坐好！"
1503-70 = "不要啦！？前輩對不起，饒了我們吧～！"
1503-72 = "千年．校舍走廊"
1503-73 = "（事發幾天後……）"
1503-77 = "那個人就是傳聞中的……？"
1503-78 = "沒錯，就是在上次的身體測量中被判定為體重100kg的會計優香。"
1503-79 = "乍看之下沒有那麼胖啊……是用了什麼特殊裝備嗎？"
1503-80 = "說不定是把「瘦的時候的影像」用全像投影投在身體上哦！"
1503-81 = "……怎麼可能嘛！？有空開發那種沒用裝備的話，我早就去運動了！"
1503-82 = "明明已經立刻公告之前出現在社群網站上的資訊是假消息了！為什麼謠言還是越傳越誇張啊！"
1503-87 = "啊啊，真是的！犯人到底是誰啊，被我抓到的話絕對不會饒過他的！！！"
1503-88 = "Trouble & Trackers"

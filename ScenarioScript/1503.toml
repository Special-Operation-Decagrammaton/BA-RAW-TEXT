[translation]
1503-1 = "Trouble & Trackers Part 3"
1503-2 = "Veritas Hackers' Lounge"
1503-4 = "Malware infection due to code injection confirmed. Backdoor installed."
1503-5 = "Another hacking attempt incoming."
1503-7 = "Fix it, fix it, fix it, fix it, fix it...!#nFix it, fix it, fix it!"
1503-8 = "What do you take me for? Some all-knowing super computer?"
1503-9 = "But at this rate, we'll go from the hackers to the hackees!"
1503-10 = "I'm begging you here! You're our only hope!"
1503-14 = "*sigh* Step aside. Writing defensive code isn't my specialty, but I'll do what I can."
1503-19 = "I’ll produce a packet to force them off my trail. Huh? What?! They already overrode it."
1503-23 = "What if I induce an overload by planting a logic bomb inside of a vulnerable folder...? No good. It's already blocked."
1503-28 = "This is bad. Even I might not be able to get us out of this one."
1503-29 = "Y-You're kidding me! But you're the best there is..."
1503-30 = "I'm being cornered from all sides. It's as though they can predict my every move."
1503-31 = "It's hard to believe there's someone this talented outside of Veritas."
1503-32 = "Traffic is increasing due to the prolonged connection."
1503-33 = "We'll be discovered by Seminar if we don't disconnect immediately."
1503-34 = "You're right. I'm sorry, Maki, but we can't risk anymore edits on the student records."
1503-36 = "Ugh... Fine. The last thing I want is to sit through another of Yuuka's lectures."
1503-37 = "I'm out. Your drone is clear to withdraw, Hare."
1503-38 = "SYSTEM: Deleting log. System shutting down."
1503-40 = "Later that evening."
1503-44 = "It's me."
1503-45 = "Oh. Hey..."
1503-46 = "What's wrong? It feels like a funeral in here."
1503-47 = "We were forced to come face-to-face with our limitations today."
1503-48 = "No matter how good you may be, there's always someone better out there."
1503-50 = "An anonymous hacker managed to back-hack us this morning."
1503-51 = "They even ran circles around Hare. I'm still in shock."
1503-52 = "Did they? I'm begrudgingly impressed."
1503-53 = "Speaking of hackers, I came across a rather talented one checking on the student records server earlier."
1503-54 = "They were snooping around the physical exam results. They were so fast that even I had trouble dealing with them."
1503-55 = "Th-The student records server?"
1503-56 = "No wonder they were such a challenge."
1503-57 = "Our opponent was the vice president?!"
1503-59 = "Are you serious? You three were the ones causing all that trouble by hacking into the student records earlier?"
1503-60 = "I should have known. I knew there was something familiar about those techniques..."
1503-61 = "We were fighting a losing battle from the beginning."
1503-62 = "I was disappointed in myself for losing to an anonymous hacker, but now I can take some solace in knowing that it was Chihiro."
1503-63 = "I knew it! There's no one better than Veritas, so this explains everything!"
1503-65 = "Wipe that grin off your face! Have I taught you nothing? How could you treat other people's personal information so carelessly?"
1503-69 = "All of you are in for some harsh re-education on hacking ethics. You had better prepare yourselves."
1503-70 = "R-Re-education?! That's just a codeword for punishment! Go easy on us!"
1503-72 = "Millennium Hallway"
1503-73 = "A few days later..."
1503-77 = "Hey, did you hear?"
1503-78 = "Hasn't everyone? Yuuka weighing 100 kilograms is, like, the biggest gossip news of the year!"
1503-79 = "She doesn't look it, though... How do you think she's hiding it?"
1503-80 = "Maybe she developed some kind of hologram projector that's on her at all times?"
1503-81 = "That's ridiculous! Who would put so much effort into making something like that? It'd be easier to just work out!"
1503-82 = "The info that leaked on social media was forged! How does this rumor keep spreading?!"
1503-87 = "If I ever get my hands on who did it, I'll make them regret this for the rest of their lives!"
1503-88 = "Trouble & Trackers"

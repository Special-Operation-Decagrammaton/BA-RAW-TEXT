[translation]
1503-1 = "Trouble & Trackers 3"
1503-2 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
1503-4 = "ยืนยันพบโค้ดเสียหายจากการถูกเขียนแทรกแซง ติดตั้งแบ็กดอร์เรียบร้อยแล้วค่ะ"
1503-5 = "อ๊ะ แล้วการแฮ็กเมื่อกี้นี้..."
1503-7 = "ช่วยด้วยยย รุ่นพี่ฮาเระ! ช่วยทำอะไรสักอย่างหน่อยสิ~!"
1503-8 = "ฉันไม่ใช่เจ้าแมวอ้วนสารพัดนึกนะ! ช่วยทำอะไรสักอย่างหน่อยเถอะ..."
1503-9 = "แต่ว่าถ้าปล่อยไว้แบบนี้ล่ะก็... ไม่ต้องพูดถึงเรื่องแก้ไขข้อมูลเลย คอมพิวเตอร์ของพวกเราก็จะถูกแฮ็กไปด้วยนะ"
1503-10 = "นี่มันเกินความสามารถของฉันแล้ว ช่วยฉันด้วยยยย~!"
1503-14 = "(ถอนหายใจ) ช่วยไม่ได้นะ... ถึงฉันจะไม่เชี่ยวชาญเรื่องการเขียนโค้ดป้องกันก็เถอะ แต่จะลองดูนะ..."
1503-19 = "ถ้าลองดึงให้เข้าไปในเส้นทางที่ผิดเพื่อปลอมแปลงแพ็กเกจ... เอ๊ะ? ปิดกั้นได้แล้วเหรอ?"
1503-23 = "ถ้างั้น... หากทำให้เกิดการโอเวอร์โหลดโดยเขียนบอมบ์ลอจิกในโฟลเดอร์ที่คาดว่าจะมีการแฮ็กเข้ามา... นี่ก็ทำไปแล้วเหรอ?"
1503-28 = "ฮึ่ม ไม่ได้การแล้วล่ะ ความสามารถของฉันไม่เหมาะกับเรื่องนี้เอาซะเลย"
1503-29 = "ปะ...เป็นไปไม่ได้ รุ่นพี่ฮาเระคนนั้นกำลังถูกไล่ต้อนอยู่งั้นเหรอ"
1503-30 = "ถ้าคาดเดาการกระทำของทางนี้ได้ และรับมือสถานการณ์ทั้งหมดได้เรียลไทม์แบบนี้"
1503-31 = "นอกจากเวอริทัสแล้ว ยังมีคนที่มีความสามารถแบบนี้อยู่อีกเหรอ ไม่อยากเชื่อเลย"
1503-32 = "ฮาเระ การเชื่อมต่อล่าช้าทำให้ระบบติดขัดอย่างต่อเนื่องแล้วค่ะ"
1503-33 = "ถ้าดึงเวลาต่อไปแบบนี้ พวกเราก็จะเสี่ยงกับการถูกพวกเซมิน่าจับได้นะคะ"
1503-34 = "ที่พูดมาก็ถูก มากิ คราวนี้น่าเสียดายนะ ล้มเลิกเรื่องการแก้ไขบันทึกข้อมูลนักเรียนเถอะ"
1503-36 = "ฮือออ... น่าเสียดาย แต่ก็ช่วยไม่ได้นะ ฉันไม่อยากถูกลากไปฟังคำเทศนาที่เซมิน่าแล้ว"
1503-37 = "สิ้นสุดการเชื่อมต่อ รุ่นพี่ฮาเระเรียกโดรนกลับมาเถอะ"
1503-38 = "<ข้อความระบบ> กำลังลบบันทึกการใช้งาน... ระบบปิดตัวลง"
1503-40 = "(ตอนเย็นวันนั้นหลังจากเกิดเหตุ)"
1503-44 = "ฉันมาละ...---"
1503-45 = "ไม่เจอกันนานเลยนะรุ่นพี่..."
1503-46 = "เอ๊ะ? มีเรื่องอะไรเหรอ? ทำไมทุกคนถึงทำหน้าซึมกันแบบนั้นล่ะ?"
1503-47 = "คงเป็นเพราะรู้แล้วว่าตัวเองมีขีดจำกัดอยู่ละมั้ง"
1503-48 = "โลกนี้มันช่างกว้างใหญ่ คนที่มีความสามารถก็มีอยู่เยอะเหมือนกันค่ะ"
1503-50 = "เมื่อเช้าตอนที่แฮ็กระบบอยู่ ดันถูกแฮ็กเกอร์นิรนามเล่นซะน่วมเลย"
1503-51 = "รุ่นพี่ฮาเระอุตส่าห์ลงมือเอง แต่กลับถูกจัดการได้ในพริบตา ไม่คิดเลยว่านอกจากเวอริทัสแล้ว จะมีคนที่เก่งขนาดนี้อยู่ด้วย"
1503-52 = "จริงเหรอ? เก่งขนาดที่ฮาเระลงมือเองก็ยังสู้ไม่ได้เลยเหรอ สุดยอดเลยน้า..."
1503-53 = "แต่ว่าพอบอกว่าเป็นแฮ็กเกอร์นิรนาม ฉันก็นึกขึ้นมาได้... ตอนที่ฉันปรับปรุงเซิร์ฟเวอร์บันทึกข้อมูลนักเรียนอยู่ก็เจอคนที่เก่งมากๆ ด้วยล่ะ"
1503-54 = "ไม่รู้ทำไมถึงจงใจที่พยายามแฮ็กเอาข้อมูลบันทึกการตรวจร่างกายไปอย่างเดียว เจ้านั่นเขียนโค้ดไวสุดๆ ไปเลยล่ะ ฉันเองก็เกือบพลาดท่าไปเหมือนกัน"
1503-55 = "หืม? เซิร์ฟเวอร์บันทึกข้อมูลนักเรียนเหรอ?"
1503-56 = "หรือว่าแฮ็กเกอร์นิรนามที่เราสู้ด้วยเมื่อกี้..."
1503-57 = "คือรองหัวหน้าเองเหรอคะ?"
1503-59 = "หา? หรือว่าพวกแฮ็กเกอร์ที่แฮ็กเข้ามาก่อความวุ่นวายเรื่องบันทึกข้อมูลนักเรียนก็คือพวกเธอ?"
1503-60 = "มิน่าล่ะ ฉันคิดแล้วเชียวว่าวิธีการที่ใช้มันคุ้นๆ..."
1503-61 = "เป็นการต่อสู้ที่พวกเราไม่มีทางชนะตั้งแต่แรกเลยสินะคะ"
1503-62 = "ถ้าแพ้ให้กับแฮ็กเกอร์นิรนามที่ไม่รู้จักหน้าค่าตาก็คงหงุดหงิดอยู่หรอก แต่ถ้าคู่ต่อสู้เป็นรองหัวหน้าเวอริทัส... มันก็ช่วยไม่ได้ละนะ"
1503-63 = "ชะ... ใช่แล้ว! แบบนี้ค่อยโล่งใจหน่อยที่พิสูจน์ได้แล้วว่าไม่มีแฮ็กเกอร์คนไหนที่เก่งจนเอาชนะเวอริทัสได้!"
1503-65 = "ไม่เป็นไรได้ยังไง! พวกเธอคิดจะทำอะไรกับข้อมูลส่วนตัวคนอื่นกันหา?"
1503-69 = "งั้นฉันจะใช้โอกาสนี้เทศนาจริยธรรมของแฮ็กเกอร์ให้พวกเธอรู้สำนึกเอง เตรียมตัวให้พร้อมได้เลย!"
1503-70 = "มุแงงงง ยกโทษให้พวกเราเถอะนะ รุ่นพี่!"
1503-72 = "ทางเดิน อาคารเรียนมิลเลเนียม"
1503-73 = "(หลายวันหลังจากเกิดเหตุ...)"
1503-77 = "เด็กคนนั้น ใช่คนที่เป็นข่าวลือรึเปล่า...?"
1503-78 = "นั่นสิ นั่นไง นักบัญชียูกะผลตรวจน้ำหนักคราวก่อนออกมาว่า 100 กิโลกรัมน่ะ"
1503-79 = "ดูภายนอก ไม่น่าจะอ้วนขนาดนั้นเลย... ไม่ใช่ว่าใส่อุปกรณ์พิเศษอะไรอยู่หรอกนะ?"
1503-80 = "หรือบางทีอาจใช้ภาพโฮโลแกรมพรางรูปร่างจริงอยู่ก็ได้นะ!"
1503-81 = "ไม่ใช่สักหน่อย! ถ้ามีเวลามานั่งประดิษฐ์อุปกรณ์ไร้สาระแบบนั้น คงไปออกกำลังกายแล้วสิ!"
1503-82 = "ฉันชี้แจงไปทางประกาศแล้วไงเล่าว่าข้อมูลที่เผยแพร่ไปในโซเชียลคราวก่อนเป็นของปลอมน่ะ! ทำไมข่าวลือมันไปไกลกว่าเก่าได้ล่ะเนี่ย?"
1503-87 = "โอ๊ยยย จริงๆ เลย—! ฮึ่ม อย่าให้ฉันรู้ตัวคนทำนะ เจอดีแน่!!"
1503-88 = "Trouble & Trackers"

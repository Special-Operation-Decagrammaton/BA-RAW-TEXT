[translation]
90001290-1 = "Episode 29;Freight Transportation"
90001290-2 = "[ns] \"W-We did it...!\""
90001290-3 = "Thank goodness you are okay, Sensei! It must have been the prophet you mentioned!"
90001290-4 = "That was incredible! Like defeating a mini-boss!"
90001290-5 = "Aris' mini-boss analogy aside...that was certainly a unique prophet, in more ways than one."
90001290-7 = "Well, we don't have any established standardization as to what a prophet even is."
90001290-8 = "That being said, it did feel different from the other ones we've encountered."
90001290-9 = "Yes. It felt like multiple parts came together to support a main unit."
90001290-10 = "Wasn't that an extreme response? The amount of firepower it deployed could have destroyed the seeds it's trying to protect."
90001290-12 = "I found that strange as well. It could be that..."
90001290-13 = "...it was prioritizing the elimination of intruders over protection."
90001290-14 = "Using the word \"elimination\" makes this all even scarier..."
90001290-15 = "The AIs called prophets... Were they all as merciless as this one...? Is this what you've been up against all this time, Sensei...?"
90001290-16 = "Uwaaah... The world outside of my blanket...and my locker is terrifying."
90001290-18 = "[ns1] \"Well... Things have somehow worked out so far.\"\n[ns2] \"It's really thanks to the Super Phenomenon Task Force and everyone else.\""
90001290-22 = "Oh my. I wouldn't mind in the slightest if you complimented me a bit more, Sensei."
90001290-23 = "Why would you say that, Sensei? Look. The president's head is ballooning again."
90001290-24 = "I agree, Sensei. It should be me you're acknowledging. I am doing excellent, perfect work as a member of both C&C and the Super Phenomenon Task Force."
90001290-26 = "...I'm starting to wonder how it is that you've managed to keep Sensei safe this whole time."
90001290-28 = "Tiphareth...lost...?"
90001290-29 = "W-Waaaaah!"
90001290-30 = "I really...really didn't believe this was possible..."
90001290-34 = "Tiphareth has made contact. It is expressing its deepest apologies."
90001290-35 = "First, to Sof. It apologizes for how following its traces of memories as the seed vault's AI led to this result."
90001290-36 = "And to Ein, for betraying your trust."
90001290-37 = "And lastly, to Ohr, regarding the belief that it has only ever disappointed its manager."
90001290-39 = "No, it hasn't. It's fine. We can be relieved that Tiphareth's data is safe."
90001290-40 = "...If only there weren't all these unexpected variables...like that princess and her servant... "
90001290-41 = "Just when and how did those variables worm their way in?"
90001290-42 = "H-Hold on just a little longer, Tiphy! W-We'll do something!"
90001290-43 = "Ohr! How are we doing with the last container launcher?"
90001290-44 = "One way or another, we WILL make it viable. Therefore, Ein!"
90001290-45 = "Y-Yes! B-But..."
90001290-46 = "We need more time...! If we want to move Tiphy to the container launcher in the basement and load it...we need at least 30 more minutes...!"
90001290-47 = "We don't have that kind of time!"
90001290-48 = "Wh-Wh-Wh-Wh-What should we do...?"
90001290-49 = "Simple! We'll move the container launcher to right under Tiphareth...!"
90001290-50 = "And then...?"
90001290-52 = "Then we'll blow up the floor!"
90001290-53 = "Whaaaaaat?!"
90001290-54 = "Spicy! I do rather like that!"
90001290-55 = "Really?!"
90001290-59 = "What is it now? That tremor...felt rather intense?"
90001290-60 = "Yes. It felt like something huge was moving around underneath us."
90001290-61 = "Security alert: code 2. Security alert: code 2. This facility is now entering lockdown."
90001290-62 = "Alert. This facility is now entering lockdown. All remaining personnel, please exit promptly."
90001290-68 = "Ugh...! Sensei! Hold on to me!"
90001290-69 = "Everyone get out of here!"
90001290-79 = "Is everyone all right? Especially Aris? And Sensei, I guess?"
90001290-80 = "I am fine, Kei! Everyone else is fine as well. But..."
90001290-82 = "[ns] \"What exactly happened...?\""
90001290-84 = "Sensei! Down there...!"
90001290-88 = "What...is that?"
90001290-89 = "It looks like a massive transportation facility."
90001290-90 = "...! Is this what they used to move resources to the Steel Continent?"
90001290-91 = "How...exactly? It looks more like a large storage container than anything else..."
90001290-95 = "Could it be...? Everyone duck! I-I think it's going to fire!"
90001290-101 = "[ns] \"AHHH!\""
90001290-102 = "Are you okay, Sensei? Toki and I blocked what we could!"
90001290-103 = "You appear to be safe. I'm glad."
90001290-105 = "...The container disappeared. Or more accurately, it was launched."
90001290-106 = "How did you know it was about to fire?"
90001290-107 = "W-Well... There was a similar device in a game I used to play...s-so I just thought..."
90001290-108 = "Hm... I see. Perhaps there's more to be learned from games than I realized."
90001290-110 = "For now, let's head down to the space below."
90001290-111 = "There's a lot of residual heat, so be careful."
90001290-112 = "I'll...stay here and stand guard."
90001290-113 = "Huh? If we're going to go, we should all— Ah. Oh. I understand. Then we'll be in your hands."
90001290-114 = "Yes. Thank you, Kei."
90001290-120 = "There's a long rail that connects from over there."
90001290-121 = "I see. It seems resources were transported here from the mining sites."
90001290-122 = "Once they arrived, they were loaded into the container we saw earlier..."
90001290-124 = "...and then launched to the Steel Continent. This system... How should we define it?"
90001290-125 = "Calling it a \"container launcher\" would be an apt name for now."
90001290-126 = "Anyways, their main means of transport appears to have been this."
90001290-128 = "If we analyze the trajectory of the containers, we should be able to decipher the coordinates of the Steel Continent."
90001290-129 = "While we have a chance, it'd be prudent to analyze the facilities left here as well."
90001290-131 = "Understood. Not really, but okay. What should I do?"
90001290-132 = "Um... For now... "
90001290-133 = "This will require extra muscle, so can you call Eimi?"
90001290-134 = "It's hot down there. I don't want to."
90001290-135 = "[s] \"I'll buy you something cold later!\""
90001290-136 = "..."
90001290-137 = "Affirmative, Sensei. You better keep your promise."
90001290-140 = "Next Episode;Departure Preparations"

90001290-24 = "3;토키 모드 1;99;그렇습니다. 선생님께서는 조금 더 C&C이자 초현상특무부, 이중 소속으로 대활약 중인 저를 인정해 주셔야 합니다.\n#3;a\n#3;em;[반짝]"
90001290-25 = "#all;hide"
90001290-26 = "3;케이 AMAS;04;……이젠 당신들 옆에서, 어떻게 지금까지 선생님이 무사할 수 있었던 건지, 의심이 갈 지경이네요…….\n#3;closeup\n#3;em;[땀]"

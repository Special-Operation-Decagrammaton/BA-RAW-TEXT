90001290-1 = "#title;제29화;화물 운송"
90001290-2 = "[ns] \"해, 해냈다……!\""
90001290-3 = "3;아리스 동복;05;무사하신가요, 선생님? 다행입니다! 이것이 선생님이 말한…… 예언자로군요!\n#3;a\n#3;em;[반응]"
90001290-4 = "3;아리스 동복;07;엄청났습니다! 마치 중간 보스를 쓰러트린 기분이었습니다!!!"
90001290-5 = "5;히마리 방한복;04;아리스의 중간 보스라는 비유는 그렇다고 쳐도…… 여러 가지로 독특한 예언자였네요.\n#3;m2\n#5;em;[...]\n#5;al"
90001290-6 = "#all;hide"
90001290-7 = "3;리오 동복;02;예언자들의 형태가 특별히 어떤 방식으로 정해져 있는 것은 아니니까."
90001290-8 = "3;리오 동복;04;그걸 감안하더라도…… 조금 더 이질적이었던 것 같기는 해.\n#3;em;[땀]"
90001290-9 = "1;토키 모드 1;02;네. 여러 개의 파츠 같은 것들이 합쳐져, 메인 유닛을 보조하는 느낌이었지요.\n#1;a"
90001290-10 = "5;에이미 수영복ND;02;그보다 명백히 화력 과잉 아니었어? 자기가 지키고 있었던 씨앗들까지 소각시킬 지경이었는데?\n#5;al\n#5;em;[?]"
90001290-11 = "#all;hide"
90001290-12 = "3;히마리 방한복;02;확실히 그 부분은 이상하네요. 아니면 종자를 보호하는 것보다도……"
90001290-13 = "3;히마리 방한복;02;침입자인 우리를 제거하는 쪽이, 더 우선순위로 지정되었던 것일 수도 있고요."
90001290-14 = "3;모모이 동복;04;제, 제거라고 하니까 왠지 무섭게 들리는데……."
90001290-15 = "4;미도리 동복;04;예언자라는 AI들은…… 전부 이렇게 무자비했던 건가요……? 선생님은 지금까지, 도대체 어떤 싸움을 해 오신 거죠……?\n#4;a\n#4;em;[세로선]\n#3;m2"
90001290-16 = "5;유즈 동복;04;우으으…… 역시 이불, 아니 캐비닛 밖은 위험한 것 같아요…….\n#5;al\n#5;em;[훌쩍]\n#5;stiff\n#4;m3\n#3;m1"

[translation]
90001290-1 = "第29話;貨物輸送"
90001290-2 = "[ns]「成，成功了……！」"
90001290-3 = "老師，你平安無事嗎？太好了！#n原來這就是老師說的……預言者啊！"
90001290-4 = "真厲害！有種打倒了中BOSS的感覺！！！"
90001290-5 = "愛麗絲那個中BOSS的比喻姑且不談……這個預言者從各方面來說都十分獨特呢。"
90001290-7 = "畢竟預言者的形態本來就沒有特定的標準。"
90001290-8 = "不過即便考量到這一點……它的異質感依舊突出。"
90001290-9 = "有種由好幾個零件組合起來，一起輔助主要單位的感覺。"
90001290-10 = "而且它的火力也明顯過剩了吧？#n甚至連自己守護的種子都快燒掉了耶？"
90001290-12 = "這點確實很奇怪。#n或者也可能是比起保護種子……"
90001290-13 = "排除我們這些入侵者的優先程度更高也說不定。"
90001290-14 = "排，排除聽起來怪可怕的耶……"
90001290-15 = "這些預言者AI……全都這麼冷血無情嗎……？#n老師一路以來，究竟經歷了什麼樣的戰鬥呢……？"
90001290-16 = "嗚嗚……被子，啊不，櫃子外面的世界果然很危險……"
90001290-18 = "[ns1]「不過……目前為止也都撐過來了嘛？」\n[ns2]「這都多虧了特異現象搜查部和大家的努力。」"
90001290-22 = "哎呀，再多誇獎我一下也沒關係的唷，老師？"
90001290-23 = "老師這樣不行啦。#n部長又開始得意忘形了。"
90001290-24 = "沒錯。老師您應該給予同時活躍於C&C和特異現象搜查部的我更多肯定才對。"
90001290-26 = "有你們這些人在身邊，老師之前到底是怎麼平安活下來的……我認真開始懷疑了。"
90001290-28 = "提法瑞特……居然輸了？"
90001290-29 = "嗚，嗚哇啊啊！"
90001290-30 = "雖然多少有預感，但這還是……！"
90001290-34 = "提法瑞特傳訊息來了。#n提法瑞特他……嗯，在向你們道歉。"
90001290-35 = "首先是對Soph。#n「都是因為自己作為種子保管所AI殘留的記憶，才會導致這樣的結果。」"
90001290-36 = "然後是對Ain。#n「抱歉背叛了你一直以來毫無保留的信任。」"
90001290-37 = "最後是對Aur。#n「很遺憾除了失望之外，什麼都沒能報答管理者Aur。」"
90001290-39 = "不，這些都無所謂。#n提法瑞特的資訊平安無事，已經是不幸中的大幸了。"
90001290-40 = "但凡沒有王女和侍女這兩個變數……"
90001290-41 = "那些變數，到底是怎麼介入這件事的？"
90001290-42 = "請，請再等一下下，提法醬！我們會盡快想辦法的！"
90001290-43 = "Aur！最後的貨櫃發射器還有空間嗎！？"
90001290-44 = "空間的部分我會想想辦法。#n那麼，Ain！"
90001290-45 = "是，是！#n不，不過……"
90001290-46 = "以現在的情況來看，時間恐怕……！#n要把提法醬移動到地下的貨櫃發射器再裝載上去……至少還需要30分鐘……！"
90001290-47 = "我們等不了那麼久！"
90001290-48 = "那，那那那那，那該怎麼辦……？"
90001290-49 = "很簡單！只要把貨櫃發射器移動到提法瑞特下方，然後……！"
90001290-50 = "然，然後……？"
90001290-52 = "把地面整個炸開就行了！"
90001290-53 = "咦咦咦咦咦！？！？"
90001290-54 = "聽起來很痛快，不錯嘛！"
90001290-55 = "真的嗎！？！？"
90001290-59 = "咦，怎麼回事？#n這個震動……感覺不太尋常？"
90001290-60 = "嗯。好像有某種巨大物體在我們的腳底下移動。"
90001290-61 = "第2類安全警報，第2類安全警報。#n本設施即刻起將進入封鎖程序。"
90001290-62 = "再次通知。本設施即刻起將進入封鎖程序。#n請留守人員迅速撤離。"
90001290-68 = "唔……！老師，請抓緊我！"
90001290-69 = "大家快離開這裡！"
90001290-79 = "所有人都沒事吧？#n愛麗絲呢？老師呢？"
90001290-80 = "愛麗絲沒事，Kei！#n其他人也都平安無事。可是……"
90001290-82 = "[ns]「到底發生了什麼……？」"
90001290-84 = "老師！下面那邊……！"
90001290-88 = "那是……什麼？"
90001290-89 = "看起來像是某種超大型的運輸設施。"
90001290-90 = "……！#n他們就是這樣把資源運往鋼鐵大陸的嗎……？"
90001290-91 = "可是……具體來說是怎麼做到的？#n看起來只是把貨物收納在大型貨櫃裡而已……"
90001290-95 = "這個……該不會？#n大家快趴下！那個東西可能隨時都會發射！"
90001290-101 = "[ns]「唔哇啊啊啊啊！？」"
90001290-102 = "老師，你沒事吧？#n季跟我把衝擊波擋下來了！"
90001290-103 = "看起來平安無事，真是太好了。"
90001290-105 = "……貨櫃消失了呢。#n不，應該說是發射了才對。"
90001290-106 = "你怎麼知道那個貨櫃會發射呢？"
90001290-107 = "那，那個……我之前玩過的遊戲裡，有出現過那種裝置……#n所以才想說會不會……"
90001290-108 = "嗯……原來如此。#n看來我也該多關心一下……遊戲這個領域了呢。"
90001290-110 = "小心地到下面那個空間看看吧。"
90001290-111 = "好像還有熱氣殘留，大家要保持謹慎。"
90001290-112 = "那我就在這裡守著吧。"
90001290-113 = "咦？既然要去就大家一起……不，算了。#n那就麻煩你了。"
90001290-114 = "嗯。謝謝你，Kei。"
90001290-120 = "長長的軌道，從那個方向一路延伸過來呢。"
90001290-121 = "原來如此。#n這裡應該是資源被運送過來之後的……最終集散地。"
90001290-122 = "將資源裝載到剛才看到的貨櫃裡……"
90001290-124 = "……並往鋼鐵大陸發射。#n這個系統……究竟該如何定義呢？"
90001290-125 = "唔嗯……既然是把[ruby=Container]貨櫃[/ruby][ruby=Launch]發射[/ruby]出去的裝置，暫時就先叫它貨櫃發射器吧。"
90001290-126 = "既然這裡所有運輸作業都是藉由那個貨櫃發射器來完成……"
90001290-128 = "我們只要分析剛才發射的貨櫃軌跡，就能追蹤到鋼鐵大陸的座標了。"
90001290-129 = "這裡留存的設施，也有必要好好分析一番。"
90001290-131 = "這樣啊。雖然不是很懂，總之我明白了。#n那麼接下來該怎麼做呢？"
90001290-132 = "唔嗯……從目前的情況來看……"
90001290-133 = "接下來的工作可能會比較需要體力，能麻煩老師請英美過來嗎？"
90001290-134 = "下面好熱，我不想去……"
90001290-135 = "[s]「回去之後我請你吃冰！」"
90001290-136 = "……"
90001290-137 = "好吧，老師。一言為定哦？"
90001290-140 = "下一話;出發準備"

[translation]
90001290-1 = "ตอนที่ 29;วิธีส่งทรัพยากร"
90001290-2 = "[ns] \"สะ... สำเร็จแล้ว...!\""
90001290-3 = "คุณครูปลอดภัยมั้ยคะ? ค่อยยังชั่วนะคะ! นี่สินะ... ผู้เลื่อมใสที่คุณครูพูดถึง!"
90001290-4 = "น่าทึ่งมากเลยค่ะ! รู้สึกเหมือนได้ปราบบอสระดับกลางเลยละค่ะ!!!"
90001290-5 = "ฟังจากการเปรียบเทียบของอาริสึแล้ว... นั่นถือว่าเป็นผู้เลื่อมใสที่มีเอกลักษณ์เฉพาะหลายอย่างเลย#nนะคะ"
90001290-7 = "รูปแบบของผู้เลื่อมใสไม่ได้ถูกกำหนดไว้อย่างเฉพาะเจาะจงหรอก"
90001290-8 = "ถ้าพิจารณาจากเรื่องนั้น... ผู้เลื่อมใสที่เราเจอเมื่อกี้ก็ถือว่าค่อนข้างแตกต่างนะ"
90001290-9 = "ใช่ค่ะ เหมือนมีการนำชิ้นส่วนหลายชิ้นมาประกอบกันเพื่อส่งเสริมยูนิตหลักเลยค่ะ"
90001290-10 = "แล้วพลังความร้อนก็มากเกินไปด้วย แบบนั้นเมล็ดพันธุ์ที่ตัวเองปกป้องอยู่อาจจะไหม้หมดเลยก็ได้นะ?"
90001290-12 = "เรื่องนั้นมันก็แปลกอยู่นะคะ หรือว่าหน้าที่ที่ถูกกำหนดมา..."
90001290-13 = "บางที... การกำจัดผู้บุกรุกอย่างพวกเราอาจเป็นหน้าที่ที่สำคัญกว่าการปกป้องเมล็ดพันธุ์ก็ได้ค่ะ"
90001290-14 = "กะ... กำจัดเลยเหรอ ฟังดูน่าขนลุกจังเลย..."
90001290-15 = "AI ที่เป็นผู้เลื่อมใส... โหดร้ายกันขนาดนี้หมดเลยเหรอคะ...? ที่ผ่านมาคุณครูต่อสู้กับอะไรมาบ้างคะ#nเนี่ย...?"
90001290-16 = "อึก... ข้างนอกตู้มันอันตรายจริงๆ ด้วยค่ะ..."
90001290-18 = "[ns1] \"แต่ที่ผ่านมาเราก็ช่วยกันทำจนสำเร็จนะ\"\n[ns2] \"ต้องขอบคุณชมรมปรากฏการณ์ลี้ลับกับทุกคนเลยละ\""
90001290-22 = "ตายจริง จะชมกันให้มากกว่านี้อีกหน่อยฉันก็ไม่เกี่ยงหรอกนะคะ คุณครู"
90001290-23 = "พูดอะไรออกไปน่ะ คุณครู? หัวหน้าหลงตัวเองใหญ่แล้วนะ"
90001290-24 = "ใช่ค่ะ คุณครูต้องยอมรับฉันอีกหน่อยที่มาตั้งใจทำงานทั้งในฐานะ C&C และชมรมปรากฏการณ์ลี้ลับ#nนะคะ"
90001290-26 = "ตอนนี้ฉันเริ่มสงสัยแล้วค่ะว่าที่ผ่านมาคุณครูปลอดภัยอยู่ได้ยังไงเมื่อต้องอยู่ข้างๆ พวกคุณแบบนี้..."
90001290-28 = "ทิฟาเร็ธ... แพ้งั้นเหรอคะ...?"
90001290-29 = "งะ... แงงง!"
90001290-30 = "ไม่อยากเชื่อเลย...!"
90001290-34 = "มีข้อความมาจากทิฟาเร็ธค่ะ ทิฟาเร็ธ... กำลังขอโทษค่ะ"
90001290-35 = "เริ่มจากขอโทษซอฟ... ในฐานะ AI ของคลังเก็บเมล็ดพันธุ์ ขอโทษที่ความทรงจำที่เลือนลางทำให้#nเกิดผลแบบนี้"
90001290-36 = "ต่อไปก็ขอโทษไอน์... ขอโทษสำหรับการทรยศต่อความไว้วางใจที่มอบให้มาเสมอ"
90001290-37 = "สุดท้ายก็ขอโทษออร์... ขอโทษที่เอาแต่ทำให้ผู้ดูแลอย่างออร์ต้องผิดหวังอยู่ตลอด"
90001290-39 = "ไม่หรอกค่ะ เรื่องนั้นน่ะไม่เป็นอะไรหรอก ดูจากข้อมูลแล้ว ตอนนี้ทิฟาเร็ธน่าจะปลอดภัยดี ถ้างั้นก็ค่อยยังชั่วค่ะ"
90001290-40 = "ถ้าไม่มีตัวแปรอย่างท่านธิดาและหญิงรับใช้นั่นละก็... "
90001290-41 = "ตัวแปรพวกนั้นเข้ามาแทรกแซงตั้งแต่เมื่อไรกันนะ?"
90001290-42 = "ระ... รอเดี๋ยวนะคะ ทิฟาจัง! พวกเราจะรีบจัดการให้ค่ะ!"
90001290-43 = "ออร์! คอนเทนเนอร์ลอนเชอร์อันสุดท้ายยังมีที่ว่างเหลืออยู่มั้ย?!"
90001290-44 = "ถ้าเรื่องพื้นที่ละก็ ไม่มีปัญหาค่ะ เอาละ ไอน์!"
90001290-45 = "ค่ะ ค่ะ! ตะ... แต่ว่า..."
90001290-46 = "ถ้าจะทำตอนนี้ เวลาก็คง...! ถ้าจะย้ายทิฟาจังไปถึงคอนเทนเนอร์ลอนเชอร์ที่อยู่ใต้ดินแล้วบรรทุก... ก็น่าจะใช้เวลาอย่างน้อย 30 นาที...!"
90001290-47 = "จะรอนานขนาดนั้นไม่ได้หรอกนะ!"
90001290-48 = "ถะ... ถะถะถะถะ... ถ้างั้นจะทำยังไงเหรอคะ...?"
90001290-49 = "ง่ายๆ น่า! ย้ายคอนเทนเนอร์ลอนเชอร์มาไว้ข้างใต้ทิฟาเร็ธแทน แล้วก็...!"
90001290-50 = "ละ... แล้วก็...?"
90001290-52 = "ระเบิดพื้นไปเลย!"
90001290-53 = "คะ?!?!"
90001290-54 = "ร้อนแรงดีจัง ฉันชอบค่ะ!"
90001290-55 = "เอาจริงเหรอคะ!?!?"
90001290-59 = "จู่ๆ ก็เกิดอะไรขึ้นคะเนี่ย? การสั่นสะเทือนแบบนี้มัน... ไม่ธรรมดาเลยนะคะ?"
90001290-60 = "อื้อ รู้สึกเหมือนบางอย่างที่ขนาดมหึมากำลังเคลื่อนไหวอยู่ใต้ดินเลย"
90001290-61 = "แจ้งเตือนความปลอดภัยประเภทที่ 2 แจ้งเตือนความปลอดภัยประเภทที่ 2 จะเริ่มกระบวนการปิดกั้น#nสิ่งปลูกสร้างแห่งนี้ตั้งแต่บัดนี้"
90001290-62 = "ขอแจ้งให้ทราบอีกครั้ง จะเริ่มกระบวนการปิดกั้นสิ่งปลูกสร้างแห่งนี้ตั้งแต่บัดนี้ หากมีบุคลากรเหลืออยู่ ขอให้ย้ายออกอย่างเร่งด่วน"
90001290-68 = "อึก...! คุณครู! จับฉันไว้แน่นๆ นะคะ!"
90001290-69 = "ทุกคนออกไปจากที่นี่!"
90001290-79 = "ทุกคนเป็นยังไงบ้างคะ? อาริสึ? คุณครูด้วย?"
90001290-80 = "อาริสึปลอดภัยดีค่ะ เคย์! ทุกคนก็ปลอดภัยค่ะ แต่ว่า..."
90001290-82 = "[ns] \"นี่มันเรื่องอะไรกันเนี่ย...?\""
90001290-84 = "คุณครู! ข้างใต้นั่น...!"
90001290-88 = "นั่นมัน... อะไรกันคะ?"
90001290-89 = "เหมือนเป็นอุปกรณ์ขนส่งขนาดยักษ์เลยค่ะ"
90001290-90 = "ขนส่งทรัพยากรจากตรงนี้ไปยังดินแดนเหล็กกล้าด้วยวิธีนี้เหรอเนี่ย...?"
90001290-91 = "แต่ว่า... ขนส่งไปยังไงกันคะ? นี่มันคล้ายกับการเก็บสินค้าไว้ในตู้คอนเทนเนอร์ขนาดยักษ์มากกว่า..."
90001290-95 = "หรือว่า... อย่าบอกนะว่า? ทุกคนหมอบค่ะ! อาจมีการยิงตู้นั่นออกไปก็ได้ค่ะ!"
90001290-101 = "[ns] \"เหวอออออ?!\""
90001290-102 = "เป็นอะไรหรือเปล่า คุณครู? ฉันกับโทคิช่วยกันสกัดแก๊สร้อนจากการยิงไว้ได้แล้ว!"
90001290-103 = "ปลอดภัยดีใช่มั้ยคะ? โล่งอกไปทีค่ะ"
90001290-105 = "ตู้คอนเทนเนอร์หายไปแล้วค่ะ... ไม่สิ หรือต้องพูดว่าถูกยิงออกไปแล้วนะ"
90001290-106 = "รู้ได้ยังไงคะว่าตู้คอนเทนเนอร์จะถูกยิงออกไปน่ะ?"
90001290-107 = "คะ... คือว่า... ฉันเคยเห็นของคล้ายๆ กันในเกมที่เคยเล่นเมื่อก่อนน่ะค่ะ... ก็เลยคิดว่าอาจจะเป็นอย่าง#nในเกมก็ได้..."
90001290-108 = "อืม... อย่างนั้นเหรอคะ เกมงั้นเหรอ... ฉันควรให้ความสนใจในสาขานี้บ้างแล้วสินะคะ"
90001290-110 = "เราไปข้างใต้พื้นที่ตรงนั้นกันเถอะ"
90001290-111 = "เหมือนจะยังมีแก๊สร้อนเหลืออยู่บ้าง ทุกคนระวังนะคะ"
90001290-112 = "งั้นฉันจะเฝ้าที่นี่ไว้เอง"
90001290-113 = "คะ? ทำไมไม่ไปด้วยกันล่ะ... อ้อ ช่างเถอะค่ะ ฉันพอรู้แล้วละ ถ้างั้นก็ฝากตรงนี้ด้วยนะคะ"
90001290-114 = "อื้อ ขอบใจนะ เคย์"
90001290-120 = "มีรางรถไฟทอดยาวจากตรงนี้สินะ"
90001290-121 = "อย่างนี้นี่เอง ดูเหมือนว่าทรัพยากรที่ถูกส่งมาที่นี่... จะถูกบรรทุกเป็นครั้งสุดท้ายที่นี่นะคะ"
90001290-122 = "และพวกทรัพยากรที่ถูกบรรทุกไว้ที่นี่ ก็จะถูกยิงออกไปยังดินแดนเหล็กกล้า..."
90001290-124 = "โดยผ่านตู้คอนเทนเนอร์ที่เราเห็นเมื่อกี้ค่ะ.. ระบบนี้... ควรจะนิยามว่ายังไงดีนะ?"
90001290-125 = "อืม... ในเมื่อมันเป็นการยิงของออกไป งั้นฉันขอเรียกว่าคอนเทนเนอร์ลอนเชอร์ก่อนแล้วกันค่ะ"
90001290-126 = "สรุปว่าการขนส่งทั้งหมดทำโดยคอนเทนเนอร์ลอนเชอร์นั่นสินะคะ"
90001290-128 = "งั้นถ้าวิเคราะห์ร่องรอยของตู้คอนเทนเนอร์ที่ถูกยิงออกไปเมื่อกี้ เราก็จะสืบหาพิกัดของดินแดนเหล็กกล้าได้สินะ"
90001290-129 = "ฉันว่าพวกเศษที่เหลืออยู่ที่นี่ก็ควรวิเคราะห์เหมือนกันค่ะ"
90001290-131 = "อย่างนี้สินะคะ ถึงจะไม่แน่ใจ แต่ก็พอเข้าใจแล้วค่ะ งั้นจากนี้พวกฉันควรทำอะไรดีคะ?"
90001290-132 = "อืม... ก่อนอื่นเลย "
90001290-133 = "เราน่าจะมีเรื่องให้ต้องใช้พลังไม่ใช่ย่อย งั้นช่วยไปเรียกเอมิมาได้มั้ยคะ?"
90001290-134 = "ข้างล่างนั่นมันร้อน ฉันไม่อยากไปเลย..."
90001290-135 = "[s] \"ไว้ครูจะซื้ออะไรเย็นๆ ให้นะ!\""
90001290-136 = "..."
90001290-137 = "งั้นก็ได้ สัญญาแล้วนะคุณครู"
90001290-140 = "ตอนต่อไป;เตรียมออกเดินทาง"

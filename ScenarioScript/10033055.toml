[translation]
10033055-3 = "ฮู่ว... ดูเหมือนฉันจะตื่นเต้นไปกับการทัศนศึกษาไปหน่อยค่ะ"
10033055-4 = "ถ้ามองย้อนกลับไป พาร์เฟต์วานิลลาที่ใส่ทาโกะยากิปลิงทะเลนั่นมันไม่เข้าท่าเอาซะเลย..."
10033055-6 = "ฮู่ว... ดูเหมือนจะสงบลงแล้วนะคะ งั้นต่อไปก็ต้องจัดการกับร้านที่ขายอาหารที่ไม่ได้รับอนุญาต..."
10033055-7 = "(อ้าว?! ร้านหายไปอย่างไร้ร่องรอยเลย...)"
10033055-8 = "[ns] \"มีอะไรเหรอ อุมิกะ?\""
10033055-9 = "มะ... ไม่มีค่ะ... ไม่มีอะไรทั้งนั้นค่ะ...!"
10033055-10 = "อุมิกะ? น่าจะต้องรีบกลับมาที่โรงอาหารแล้วละค่ะ! เราล่าช้ากันไปมากแล้วนะคะ!"
10033055-11 = "ดะ... ได้ค่ะ! เราต้องทำเวลาให้ตรงตามตารางค่ะ! พีน่ากับคาเอเดะ ช่วยพานักเรียนที่อยู่ตรงนี้กลับไป#nหน่อยนะคะ! ส่วนนักเรียนที่อยู่ในโรงอาหาร ฉันจะลองหาวิธีจัดการดูค่ะ!"
10033055-18 = "(ถึงจะพูดไว้เสียดิบดี แต่สุดท้ายกำหนดการก็ล่าช้า...)"
10033055-19 = "(ตามที่พีน่าพูดไว้ไม่มีผิดเลย...!)"

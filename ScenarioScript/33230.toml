[translation]
33230-1 = "第23話;於古教堂的地下"
33230-2 = "……這次真的結束了嗎。"
33230-3 = "就是啊，已經……"
33230-4 = "……"
33230-5 = "還沒……"
33230-6 = "古教堂的地下裡……還有那個……"
33230-15 = "沙織……！？"
33230-16 = "往古教堂的地下……！"
33230-17 = "那個口氣似乎還留有什麼手段，必須阻止才行！"
33230-23 = "還有，這種力量嗎……"
33230-24 = "……我去。"
33230-25 = "梓，梓醬，我也……！"
33230-26 = "妳那個傷勢，還是靜養吧。不用擔心。阻止沙織之後，我馬上就回來。"
33230-27 = "[s]「我也一起去。」"
33230-28 = "……謝謝你，老師。"
33230-29 = "梓醬，注意安全……！"
33230-30 = "……嗯，我已經沒問題了。"
33230-35 = "日步美、花子、小春……我出發了。"
33230-36 = "好的！"
33230-37 = "等妳回來唷。"
33230-38 = "注，注意安全哦！"
33230-42 = "[ns]「那就，走吧。」"
33230-45 = "梓……"
33230-46 = "沙織，做個了結吧。"
33230-47 = "……好吧。賭上一切，來最後一場戰鬥吧。"
33230-48 = "……還認為和我1對1，從正面可以贏過我嗎？"
33230-49 = "不，我不是一個人。"
33230-51 = "……！老師……！"
33230-52 = "不管是什麼，我全都會清除掉。妳也是，那個大人也是！"
33230-53 = "在這個全都是徒勞的世界，體會真相吧！！"
33230-58 = "[ns]「梓，走吧。」"
33230-59 = "……嗯。"

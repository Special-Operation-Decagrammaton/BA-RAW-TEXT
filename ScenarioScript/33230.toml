[translation]
33230-1 = "ตอนที่ 23;ชั้นใต้ดินของวิหารโบราณ"
33230-2 = "จบแล้วล่ะ พวกเราแพ้แล้ว"
33230-3 = "ฉันยอมแพ้แล้วละค่ะ... ไม่ไหวแล้ว..."
33230-4 = "..."
33230-5 = "ยังหรอก..."
33230-6 = "ที่ชั้นใต้ดินของวิหารโบราณ... ยังมีวิธีอยู่..."
33230-15 = "ซาโอริ...!!"
33230-16 = "ดูเหมือนว่าจะมีทางเดินเชื่อมไปยังชั้นใต้ดินของวิหารโบราณนะคะ!"
33230-17 = "ที่นั่นคงมีอะไรบางอย่าง... ที่อันตรายมากอยู่แน่เลยค่ะ เราต้องหยุดซาโอริให้ได้ค่ะ!"
33230-23 = "ยะ... ยังมีพลังแบบนั้นอยู่อีก..."
33230-24 = "ฉันยังไหวอยู่... ฉันจะไปเอง "
33230-25 = "อะ... อาซึสะจัง? ตะ... แต่ว่า... จะไปคนเดียวเหรอคะ...?"
33230-26 = "เปล่าหรอก แค่จะขัดขวางซาโอริน่ะ แล้วฉันจะกลับมาหาเธอนะ"
33230-27 = "[s] \"ครูจะไปด้วย\""
33230-28 = "คุณครู... อื้อ ถ้าคุณครูไปด้วยก็อุ่นใจได้"
33230-29 = "อาซึสะจัง... แต่ว่า...!!"
33230-30 = "ฉันจะไม่หนีเป็นครั้งที่สองแล้วล่ะ"
33230-35 = "เดี๋ยวฉันกลับมานะ ฮิฟุมิ ฮานาโกะ... โคฮารุ"
33230-36 = "ได้ค่ะ!"
33230-37 = "แล้วจะรอนะคะ"
33230-38 = "ระวังตัวด้วยนะ!"
33230-42 = "[ns] \"ไปกันเถอะ! การต่อสู้ครั้งสุดท้ายแล้ว!\""
33230-45 = "อาซึสะ..."
33230-46 = "ซาโอริ... มาจบเรื่องนี้กันเถอะ"
33230-47 = "ก็ได้... ถ้านี่เป็นการต่อสู้ครั้งสุดท้าย ฉันก็จะทุ่มสุดตัวเหมือนกัน"
33230-48 = "คิดว่าเผชิญหน้ากันตัวต่อตัวแบบนี้ เธอจะชนะฉันได้งั้นเหรอ!!"
33230-49 = "เปล่า ฉันไม่ได้ตัวคนเดียว"
33230-51 = "...!! คุณครู [USERNAME]!!"
33230-52 = "งั้นเหรอ... ก็ดี! ฉันจะทำลายทุกคนให้หมดที่นี่เลย!! ทั้งเธอแล้วก็ผู้ใหญ่คนนั้น!"
33230-53 = "และสุดท้ายก็โลกที่ว่างเปล่าไร้แก่นสารนี้... ความจริงนั่น..."
33230-58 = "[ns] \"อาซึสะ เอาชนะให้ได้นะ\""
33230-59 = "อื้อ คุณครู"

[translation]
33230-1 = "第23話;古聖堂の地下に"
33230-2 = "……今度こそ終わりかな。"
33230-3 = "そうですね、これ以上はもう……。"
33230-4 = "……。"
33230-5 = "まだだ……。"
33230-6 = "まだ古聖堂の地下に……あれが……。"
33230-15 = "サオリ……！？"
33230-16 = "古聖堂の地下へ……！"
33230-17 = "何か手段が残っているような言い方でした、止めなくては！"
33230-23 = "まだ、こんな力がありましたか……。"
33230-24 = "……私が行く。"
33230-25 = "あ、アズサちゃん、私も……！"
33230-26 = "その怪我だ、安静にしてて。心配しなくても平気。サオリを止めて、すぐに戻ってくる。"
33230-27 = "[s] \"私も行くよ。\""
33230-28 = "……ありがとう、先生。"
33230-29 = "アズサちゃん、気を付けて……！"
33230-30 = "……うん。私はもう大丈夫。"
33230-35 = "ヒフミ、ハナコ、コハル……行ってくる。"
33230-36 = "はいっ！"
33230-37 = "待ってますよ。"
33230-38 = "き、気を付けてねっ！"
33230-42 = "[ns] \"じゃあ、行こうか。\""
33230-45 = "アズサ……。"
33230-46 = "サオリ、もう終わりにしよう。"
33230-47 = "……良いだろう。全てをかけて、最後の戦いにしてやる。"
33230-48 = "……まだ私と1対1で、正面から勝てるとでも思ってるのか？"
33230-49 = "いや、私はひとりじゃない。"
33230-51 = "っ、先生……！"
33230-52 = "何もかも、全て片付けてやる。お前も、その大人も！"
33230-53 = "全てが虚しいこの世界で、真実を思い知れ！！"
33230-58 = "[ns] \"アズサ、行こう。\""
33230-59 = "……うん。"

[translation]
10018105-1 = "尾聲;新年快樂！"
10018105-3 = "（於是，發生在歲末年初的一連串騷動就此告一段落）"
10018105-8 = "啊，老師！快來！慶典的攤位剛好都準備好囉！"
10018105-11 = "雖然慶典的食物很不錯，但我們準備的御節料理還有很多。#n就算有剩也不要緊，能留到明天以後再吃。"
10018105-12 = "畢竟御節料理，本來就是要在年節期間慢慢吃的嘛。"
10018105-13 = "哇～真厲害！新年真讓人開心呢！"
10018105-14 = "這麼好吃的御節料理，我覺得是不會有剩啦★"
10018105-15 = "……這句話從你口中說出來，感覺意思完全不一樣。"
10018105-16 = "我會在大家都享用到之前克制住的★"
10018105-20 = "希望今年能平安順利……"
10018105-21 = "還有，能製作出美味的料理……"
10018105-22 = "老師！請嘗嘗看這個吧！"
10018105-23 = "那個，雖然很難為情……但我好不容易努力了一番，所以想請你吃吃看……"
10018105-24 = "唔呵呵。最棒的料理、最佳的場所。還迎來了最好的結局。"
10018105-25 = "何謂究極的美食，我似乎窺見了一些端倪。"
10018105-26 = "今天對我和美食研究會都是意義非凡的一天。"
10018105-28 = "[ns]「話說回來，喵元會長呢？」"
10018105-29 = "一邊喊著「別以為這樣就結束了！」， 一邊逃跑了。"
10018105-30 = "不會又惹出什麼麻煩吧……總覺得有點擔心……"
10018105-31 = "不用放在心上。#n會說出那種台詞的人，通常都不是什麼了不起的人物。"
10018105-32 = "就算發生了什麼事，我們也只要再去解決就行了★"
10018105-33 = "饕餮頭盔團的那些傢伙們該怎麼辦呢？"
10018105-38 = "你很在意嗎，風華同學？"
10018105-39 = "老師……"
10018105-40 = "[ns]「那些孩子，我會想辦法處理的。」"
10018105-44 = "[ns]「不過得等他們充分反省過才行。」"
10018105-49 = "如果目前沒有規劃的話，他們就來麻雀亭打工吧。"
10018105-50 = "咦，這樣好嗎？"
10018105-51 = "畢竟他們也不像是壞到骨子裡的孩子。"
10018105-52 = "而且，我也和老師聊過。"
10018105-53 = "[ns]「學生的過失，要由大人想辦法彌補。」"
10018105-55 = "真是的……大家都是好人呢。"
10018105-56 = "老師，今年一年真的非常感謝您。"
10018105-57 = "我也一直都很感謝老師。"
10018105-58 = "如果沒有老師的話，我們肯定無法堅持到最後。"
10018105-60 = "老師，新年快樂！"
10018105-62 = "新年快樂。"
10018105-63 = "祝老師新年快樂！"
10018105-64 = "新年快樂！還想再吃多點御節料理呢～！"
10018105-65 = "已經是新的一年了吧？"
10018105-66 = "Happy New Year★"
10018105-69 = "（奇普托斯迎來了新的一年）"
10018105-72 = "[ns]（希望今年，對大家來說都會是幸福的一年）"
10018105-74 = "[ns]（無論是走在自己決定的道路上）"
10018105-76 = "[ns]（又或是稍微走了彎路）"
10018105-83 = "哇啊！？烤鯛魚暴走了！"
10018105-84 = "對，對不起！我又搞砸了……！"
10018105-85 = "到底要怎麼做才能讓烤好的魚起死回生啊！？"
10018105-90 = "唔呵呵。"
10018105-96 = "看來又到我們美食研究會出手的時候了呢。"
10018105-101 = "羽留奈？等等，不是我想的那樣吧？應該不是吧！？"
10018105-102 = "羽留奈，準備就緒囉★"
10018105-103 = "快住手！你們想做什麼！今天老師也在這裡，而且是值得慶祝的日子耶！"
10018105-105 = "我按★"
10018105-117 = "羽留奈啊啊啊啊啊！？"
10018105-119 = "[ns]（……希望今年會是對大家都幸福的一年）"
10018105-121 = "正餐前的開胃年菜～一局定輸贏～"

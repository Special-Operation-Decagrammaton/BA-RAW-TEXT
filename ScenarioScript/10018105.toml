[translation]
10018105-1 = "Epilogue; Happy New Year!"
10018105-3 = "Finally, the vortex of shady business dealings that drove the holiday season into a series of battles had come to an end."
10018105-8 = "Sensei! Hurry! The festival is starting!"
10018105-11 = "We prepared festival food and osechi. It should be okay if we have leftovers."
10018105-12 = "Good thing osechi is supposed to be eaten over an extended period of time anyway."
10018105-13 = "Amazing! I love New Year's! It should be longer!"
10018105-14 = "I don't think we'll have to worry about leftovers with food this good! ★"
10018105-15 = "I somehow worry when you're the one saying that."
10018105-16 = "They say that all worries are self-fulfilling prophecies, you know. ★"
10018105-20 = "I hope the coming new year is full of great things..."
10018105-21 = "...and that I can make even greater food!"
10018105-22 = "Sensei! Try this too!"
10018105-23 = "It's not much...but I put extra effort into it..."
10018105-24 = "Heehee. The best food, the best location, and the best ending..."
10018105-25 = "I've glimpsed where ultimate gastronomy lies."
10018105-26 = "A beautiful moment soon to be turned into a fond memory for me and the Gourmet Research Society."
10018105-28 = "[ns] \"By the way, what happened to Nyaomoto?\""
10018105-29 = "He said, \"You haven't see the last of me! Mwahahaha.\" Then he ran away."
10018105-30 = "I'm kind of worried..."
10018105-31 = "Don't worry. No one who has ever said that has met a good end."
10018105-32 = "We can always get together and make sure of that! ★"
10018105-33 = "What about the Gourmet Helmet Gangsters?"
10018105-38 = "Are you worried about them, Fuuka?"
10018105-39 = "Sensei..."
10018105-40 = "[ns] \"I'll figure it out.\""
10018105-44 = "[ns] \"As long as they accept their wrongdoings...\""
10018105-49 = "We could get them part-time jobs at Sparrow."
10018105-50 = "Really? Would that be okay?"
10018105-51 = "They did bad things, but didn't seem like fundamentally bad people."
10018105-52 = "I talked about it with Sensei."
10018105-53 = "[ns] \"Correcting mistakes is better than punishing them.\""
10018105-55 = "...You guys are way too nice."
10018105-56 = "Sensei, as always, thank you."
10018105-57 = "Thank you, Sensei."
10018105-58 = "We couldn't have done it without you."
10018105-60 = "Happy New Year, Sensei!"
10018105-62 = "Happy New Year."
10018105-63 = "Happy New Year."
10018105-64 = "To a happy new year of eating!"
10018105-65 = "Already time?"
10018105-66 = "Happy New Year! ★"
10018105-69 = "And so, the new year began in Kivotos."
10018105-72 = "[ns] \"(I hope for everyone to be happy in this moment.)\""
10018105-74 = "[ns] \"(Regardless of whether they're on the right path...)\""
10018105-76 = "[ns] \"(...or a less conventional path of their own.)\""
10018105-83 = "What?! The grilled snapper came alive!"
10018105-84 = "S-Sorry! I'm sorry! This is my mistake!"
10018105-85 = "Never mind whose fault it is! How is this even physically possible?!"
10018105-90 = "Heehee."
10018105-96 = "Time for the Gourmet Research Society to step in."
10018105-101 = "Haruna? Maybe stop for a second. We wouldn't want—"
10018105-102 = "All ready, Haruna. ★"
10018105-103 = "Everyone, seriously. Let's take a second to think about this. Sensei is watching. We're at a festival!"
10018105-105 = "Aw, you're so sweet. ★"
10018105-117 = "Harunaaaaa?!"
10018105-119 = "[ns] \"(...Like I was saying, I hope for everyone to be happy in this moment...)\""
10018105-121 = "New Year's Aperitif ~One-and-Done Match~"

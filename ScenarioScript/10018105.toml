[translation]
10018105-1 = "บทส่งท้าย;ให้โชคดีในวันปีใหม่นะคะ!"
10018105-3 = "(และแล้วความวุ่นวายโกลาหลที่ถาโถมมาในช่วงงานเทศกาลส่งท้ายปีเก่าก็ได้สิ้นสุดลง)"
10018105-8 = "อ๊ะ คุณครู! รีบมาเร็วๆ สิคะ! ตอนนี้งานเทศกาลกำลังจะเริ่มแล้วนะคะ!"
10018105-11 = "แน่นอนว่าอาหารในงานเทศกาลก็คือโอเซจิที่พวกเราเตรียมไว้ค่ะ ถึงจะบอกว่าต่อให้อาหารเหลือก็ไม่#nกังวลก็เถอะ..."
10018105-12 = "ก็โอเซจิเป็นอาหารที่ค่อยๆ กินไปเรื่อยๆ สินะ"
10018105-13 = "สุดยอด! ปีใหม่เนี่ยดีจริงๆ เลย!"
10018105-14 = "ก็นะ... แต่ฉันไม่คิดว่าอาหารคุณภาพดีแบบนี้จะเหลือหรอกนะคะ★"
10018105-15 = "...พอเธอพูดแล้ว ฟังดูต่างไปเลย..."
10018105-16 = "ว่ากันว่าถ้าใส่ร้ายคนอื่นจะถูกลงโทษนะคะ★"
10018105-20 = "ปีใหม่นี้ขอให้มีแต่เรื่องดีๆ..."
10018105-21 = "แล้วก็ขอให้ทำอาหารอร่อยๆ ได้...!"
10018105-22 = "คุณครูคะ! ลองชิมอันนี้ด้วยสิคะ!"
10018105-23 = "ถึงจะน่าอายไปหน่อย... แต่ฉันใส่ใจมากกว่าจานอื่นๆ เลยค่ะ..."
10018105-24 = "ฮุฮุฮุ อาหารชั้นเลิศกับสถานที่ชั้นเลิศ และบทสรุปที่สวยงาม"
10018105-25 = "เหมือนฉันจะเข้าใจขึ้นมาเล็กน้อยแล้วค่ะว่าสุดยอดอาหารเลิศรสคืออะไร"
10018105-26 = "เรื่องราวที่เกิดขึ้นครั้งนี้ จะเป็นความทรงจำที่มีค่ามากสำหรับฉัน และชมรมชิมอาหารอย่างแน่นอนค่ะ"
10018105-28 = "[ns] \"ว่าแต่ว่าประธานเนียโอโมโตะล่ะ?\""
10018105-29 = "เขาพูดว่า 'อย่าคิดว่าจะจบแค่นี้นะ!' แล้วก็เผ่นแน่บไปเลยค่ะ?"
10018105-30 = "จะไม่เป็นไรแน่ใช่มั้ยคะ... ฉันกังวลจัง..."
10018105-31 = "ไม่ต้องห่วงหรอกค่ะ ฉันไม่เคยเห็นคนที่พูดทิ้งท้ายไว้แบบนั้นได้ดีสักคนเลยค่ะ"
10018105-32 = "แต่ถ้าเกิดอะไรขึ้น พวกเราก็มาร่วมมือกันแก้ไขได้นี่คะ★"
10018105-33 = "แล้วจะทำยังไงกับพวกแก๊งหมวกกันน็อกคุรุเมะเหรอ?"
10018105-38 = "เป็นห่วงพวกเขาเหรอคะคุณฟูกะ?"
10018105-39 = "คุณครู..."
10018105-40 = "[ns] \"เด็กพวกนั้นน่ะ ครูจะหาทางช่วยเอง\""
10018105-44 = "[ns] \"เอาไว้ให้พวกเขาสำนึกผิดก่อนแล้วกัน\""
10018105-49 = "ถ้าจำเป็นละก็ ฉันอาจพอช่วยหางานพาร์ทไทม์ที่ร้านซุซุเมะนี่ได้นะคะ"
10018105-50 = "เอ๋...? ไม่เป็นไรแน่เหรอ?"
10018105-51 = "พวกเขาไม่ได้เป็นเด็กเลวร้ายโดยกำเนิดนี่คะ"
10018105-52 = "แล้วฉันก็ได้คุยเรื่องนี้กับคุณครูมาแล้วด้วยค่ะ"
10018105-53 = "[ns] \"ความผิดพลาดของนักเรียนน่ะ ผู้ใหญ่ก็ควรช่วยกันแก้ไขสิ\""
10018105-55 = "ให้ตายสิ... ทุกคนนี่เป็นคนดีเกินไปจริงๆ"
10018105-56 = "คุณครู... ขอบคุณมากนะคะ "
10018105-57 = "ฉันเองก็ขอขอบคุณคุณครูด้วยค่ะ"
10018105-58 = "ถ้าคุณครูไม่อยู่ด้วยละก็... พวกเราคงทำแบบนี้ไม่ได้แน่ๆ"
10018105-60 = "ขอให้มีความสุขในวันปีใหม่นะคะคุณครู!"
10018105-62 = "ขอให้มีความสุขในวันปีใหม่นะคะ!"
10018105-63 = "ขอให้มีความสุขนะ "
10018105-64 = "ขอให้กินเยอะๆ ในวันปีใหม่นะ!"
10018105-65 = "ถึงเวลาแล้วใช่มั้ยคะ?"
10018105-66 = "แฮปปี้นิวเยียร์!★"
10018105-69 = "(และปีใหม่อีกหนึ่งปีในคิโวทอสก็ได้เริ่มขึ้น...)"
10018105-72 = "[ns] (ขอให้ช่วงเวลานี้เป็นช่วงเวลาแห่งความสุขของทุกคน)"
10018105-74 = "[ns] (ทั้งผู้คนที่ออกเดินทางบนเส้นทางของตนเอง)"
10018105-76 = "[ns] (รวมถึงผู้คนที่กำลังเดินบนเส้นทางที่ผิดเพี้ยนไปด้วย)"
10018105-83 = "ว้าก?! ปลาไดย่างเริ่มวิ่งไปมาแล้ว!"
10018105-84 = "ขะ... ขอโทษค่ะ! ฉันขอโทษค่ะ! ฉันทำพลาดอีกแล้ว...!"
10018105-85 = "ไปทำอีท่าไหนให้ปลาไดย่างมีชีวิตแล้ววิ่งโจมตีคนได้เนี่ย?!"
10018105-90 = "ฮุฮุฮุ"
10018105-96 = "แบบนี้... ถึงเวลาชมรมชิมอาหารออกโรงอีกแล้วสินะคะ"
10018105-101 = "ฮารุนะ? คงไม่ใช่สิ่งที่ฉันคิดหรอกใช่มั้ย? ใช่รึเปล่าน่ะ?!"
10018105-102 = "เตรียมพร้อมแล้วค่ะ ฮารุนะ★"
10018105-103 = "หยุดนะพวกเธอ คิดจะทำอะไรกันน่ะ! คุณครูอยู่ที่นี่ด้วยนะ แถมที่นี่ก็เป็นลานเทศกาลนะ!"
10018105-105 = "ฮิฮิ★"
10018105-117 = "ฮารุนะ~~~~?!"
10018105-119 = "[ns] (...ขอให้ทุกคนมีช่วงเวลาแห่งความสุข...)"
10018105-121 = "ปีใหม่สุดป่วนกับมื้อเปิดเทศกาล ~ศึกตัดสินแห่งงานฉลอง~"

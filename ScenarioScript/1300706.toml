[translation]
1300706-1 = "鍛鍊腸胃"
1300706-2 = "格黑娜學園．教室"
1300706-6 = "還不夠……"
1300706-7 = "我，我要更努力……！"
1300706-8 = "[s] 「出了什麼事嗎？」"
1300706-9 = "啊，老師。"
1300706-10 = "沒事，食物完全沒有問題。#n蛋糕很好吃，種類也很多……"
1300706-11 = "問題在於……我的食量比其他社員小太多了！"
1300706-12 = "我只吃三盤就覺得很飽了，可是亞伽里光是蛋糕就能吃好幾十盤！"
1300706-13 = "和大家出同樣的錢一起去吃自助餐，食量卻差這麼多……到頭來不就是我吃虧嗎！？"
1300706-14 = "[s] 「最吃虧的應該是餐廳老闆吧……」"
1300706-15 = "總之！這樣不公平！我也想像前輩們一樣，變成大胃王！"
1300706-16 = "老師，你有什麼好辦法嗎？"
1300706-17 = "[s] 「平常就鍛鍊好腸胃如何？」"
1300706-18 = "鍛鍊腸胃？#n唔──嗯……的確，聽說腸胃可以根據進食量不斷擴大……"
1300706-19 = "只要我平時多吃一點東西，就能把胃撐大，說不定就能跟前輩們一樣變成大胃王了！"
1300706-20 = "不過，要用什麼食物來鍛鍊腸胃呢？"
1300706-21 = "唔──嗯……對了，乾昆布應該不錯！"
1300706-22 = "昆布會越嚼越有味道，不容易吃膩，而且低卡路里，不用擔心變胖。"
1300706-23 = "那就馬上來試試看吧……"
1300706-25 = "……呃呃……"
1300706-26 = "姑且是吃昆布吃到飽了，但感覺好噁心……#n肚子裡好像鼓起來了……"
1300706-27 = "呃呃，老師，我好像快……"
1300706-30 = "唔嘔嘔嘔嘔！"
1300706-32 = "（之後，我一直幫淳子拍背，直到她把昆布全部吐出來）"

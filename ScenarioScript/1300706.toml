[translation]
1300706-1 = "Stomach Training"
1300706-2 = "Gehenna Academy Classroom"
1300706-6 = "Still not enough..."
1300706-7 = "I have to try harder...!"
1300706-8 = "[s] \"Did something happen during lunch?\""
1300706-9 = "Oh, Sensei."
1300706-10 = "No. It's not that I was unhappy with the food. The cake was rather delicious, and they had so many different kinds..."
1300706-11 = "The real problem is...I couldn't eat nearly as much as my clubmates!"
1300706-12 = "I was full after my third serving, but Akari shoveled down dozens of plates' worth of cake!"
1300706-13 = "What if it had been a buffet I paid to enter? If I couldn't eat nearly as much as the others, I'd be getting less value for my yen."
1300706-14 = "[s] \"I'm more concerned about the buffet owner's wallet...\""
1300706-15 = "This isn't fair! I want to eat as much as everyone else!"
1300706-16 = "What should I do, Sensei?"
1300706-17 = "[s] \"Then, you'll just have to train your stomach!\""
1300706-18 = "Train my stomach? Hmm... By nature, the stomach can expand to accommodate large amounts of food..."
1300706-19 = "So in theory, consistently overeating would train it like a muscle and I'd be able to eat as much as I want!"
1300706-20 = "But what would be a good training food for this?"
1300706-21 = "Hmm... I know! Dried kelp will do the trick."
1300706-22 = "I can eat dried kelp endlessly, and since it's low in calories, I don't have to worry about gaining weight!"
1300706-23 = "Let's start with a little test run..."
1300706-25 = "Ugh..."
1300706-26 = "I've never been so stuffed with kelp. I think I'm going to be sick. It feels like my stomach is going to explode."
1300706-27 = "I can't do this, Sensei..."
1300706-30 = "Bleughhh!"
1300706-32 = "I proceeded to pat Junko's back until she was done throwing up all the kelp she ate."

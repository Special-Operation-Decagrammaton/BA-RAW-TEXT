1300706-6 = "2;준코;11;아직 부족해…….\n#2;em;…"
1300706-7 = "2;준코;99;좀 더, 좀 더 열심히 노력하지 않으면……!\n#2;stiff"
1300706-8 = "[s] \"점심에 무슨 문제라도 있었어?\""
1300706-9 = "2;준코;02;아, 선생님.\n#2;em;[반응]"
1300706-10 = "2;준코;01;아니, 음식에는 아무 문제도 없었어. #n케이크는 맛있었고, 종류도 다양했으니까……\n#2;m3"
1300706-11 = "2;준코;05;하지만 진짜 문제는…… 내가 다른 부원들만큼 많이 먹지 못했다는 거야!\n#2;hophop\n#2;em;[빠직]"
1300706-12 = "2;준코;07;나는 겨우 세 그릇 째에 배가 가득 차버렸는데, 아카리는 케이크만 수십 그릇을 먹더라구!"
1300706-13 = "2;준코;05;다 같은 돈을 내고 뷔페에 갔는데, 먹는 양이 그렇게나 차이가 난다면…… 결과적으로 내가 손해를 보는 거 아냐?\n#2;em;[?!]"
1300706-14 = "[s] \"제일 큰 손해를 보는 건 뷔페집 사장님이 아닐까…….\""
1300706-15 = "2;준코;05;어쨌든! 이건 불공평해! 나도 선배들처럼 많이 먹고 싶다고!\n#2;jump\n#2;em;[!]"
1300706-16 = "2;준코;07;뭔가 좋은 방법이 없을까, 선생님?"
1300706-17 = "[s] \"평소에 위장을 단련해 두자!\""
1300706-18 = "2;준코;06;위장을 단련한다고? #n흐음…… 확실히, 위장은 음식물의 양에 따라 얼마든지 늘어날 수 있다고 하니까…….\n#2;em;[반응]"
1300706-19 = "2;준코;00;평소에 부지런히 많은 양의 음식을 먹어 두면 위장이 늘어나서 선배들처럼 대식을 할 수 있을 거야!\n#2;hophop"
1300706-20 = "2;준코;02;그런데 무슨 음식으로 위장을 단련한담?"
1300706-21 = "2;준코;03;으음…… 그래, 건조 다시마가 좋겠어!\n#2;em;[음표]"
1300706-22 = "2;준코;00;건조 다시마는 쉽게 질리지도 않는 데다가 칼로리도 낮으니까, 살 찔 염려도 없겠지?"
1300706-23 = "2;준코;12;자, 그럼 가볍게 시험 삼아 먹어볼까…….\n#2;greeting\n#2;em;[반짝]"
1300706-24 = "#all;hide"
1300706-25 = "3;준코;11;……으으…….\n#3;stiff\n#3;em;…\n#3;a"
1300706-26 = "3;준코;11;다시마를 배가 가득 찰 때까지 먹었더니 속이 느글거려…… #n뱃속에서 뭔가 부푸는 것 같아…….\n#3;em;[속상함]"
1300706-27 = "3;준코;11;으으, 선생님. 더 이상은…….\n#3;stiff"

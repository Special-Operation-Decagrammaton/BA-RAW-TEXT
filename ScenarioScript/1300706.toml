[translation]
1300706-1 = "ฝึกความแข็งแกร่งของกระเพาะ"
1300706-2 = "ห้องเรียน สถาบันเกเฮนน่า"
1300706-6 = "ยังไม่พอแฮะ...."
1300706-7 = "ฉันต้องพยายามให้มากกว่านี้อีก....!"
1300706-8 = "[s] \"มื้อเที่ยงมีปัญหาอะไรงั้นเหรอ?\""
1300706-9 = "อ๊ะ คุณครู"
1300706-10 = "เปล่าหรอก อาหารน่ะไม่มีปัญหาอะไรหรอก#nเค้กอร่อยมาก แถมยังมีให้เลือกเยอะด้วย...."
1300706-11 = "แต่ปัญหาก็คือ... ฉันกินได้ไม่เยอะเท่าสมาชิกคนอื่นๆ น่ะสิ!"
1300706-12 = "ฉันกินแค่สามจานก็อิ่มแล้ว แต่อาคาริกินเค้กได้ตั้งสิบกว่าจานแน่ะ!"
1300706-13 = "ทั้งที่จ่ายเงินค่าบุฟเฟ่ต์ในราคาเท่ากันแท้ๆ แต่ฉันกลับกินได้น้อยกว่าคนอื่น...#nแบบนี้ก็เท่ากลับฉันเสียเปรียบน่ะสิ?"
1300706-14 = "[s] \"คนที่เสียเปรียบที่สุดน่าจะเป็นเจ้าของร้านบุฟเฟ่ต์นะ....\""
1300706-15 = "เอาเป็นว่ามันไม่แฟร์เลย! ฉันเองก็อยากกินให้ได้เยอะๆ เหมือนพวกรุ่นพี่นะ!"
1300706-16 = "คุณครูมีวิธีดีๆ แนะนำบ้างมั้ย?"
1300706-17 = "[s] \"มาฝึกความแข็งแกร่งของกระเพาะกันเถอะ!\""
1300706-18 = "ฝึกความแข็งแกร่งของกระเพาะเหรอ?#nอืม.... ก็จริงอยู่ที่กระเพาะจะขยายได้ตามปริมาณอาหารที่กินเข้าไป…"
1300706-19 = "ถ้ากินอาหารปริมาณเยอะๆ อย่างต่อเนื่องเป็นประจำก็จะทำให้กระเพาะของฉันขยายตัว#nและกินเยอะได้เหมือนพวกรุ่นพี่!"
1300706-20 = "ถ้างั้นฉันควรกินอะไรเพื่อฝึกกระเพาะดีล่ะ?"
1300706-21 = "อืม.... สาหร่ายอบแห้งดีกว่า!"
1300706-22 = "สาหร่ายอบแห้งกินง่ายไม่เบื่อ แถมแคลอรี่ยังน้อยด้วย กินเท่าไหร่ก็ไม่อ้วนสินะ?"
1300706-23 = "เอาละ ถ้างั้นไปลองทดสอบกันดีมั้ย...."
1300706-25 = ".....อึ่ก...."
1300706-26 = "พอกินสาหร่ายทะเลอบแห้งจนอิ่มก็รู้สึกคลื่นไส้...#nรู้สึกเหมือนมีอะไรบวมอยู่ในท้องเลย...."
1300706-27 = "อึ่ก... คุณครู.... ฉันคง...."
1300706-30 = "แหวะะะ!"
1300706-32 = "คุณครูไปช่วยลูบหลังให้จุนโกะที่อาเจียนสาหร่ายอบแห้งออกมาจนหมด"

[translation]
84302100201-5 = "มีคำถามอะไรอีกเหรอ? ถ้าเป็นเรื่องตำแหน่งของสิ่งของ ฉันว่าฉันบอกแล้วนะ"
84302100201-6 = "หรือว่า... มีคำถามอะไรอยากถามเป็นการส่วนตัว?"
84302100201-7 = "พูดเหมือนอยากให้ฉันถามอะไรงั้นละ..."
84302100201-8 = "ก็ใช่ว่าจะไม่มีคำถามหรอก แต่มันคงไม่เหมาะกับสถานการณ์ตอนนี้ เอาไว้ค่อยถามคราวหน้าแล้วกัน"
84302100201-9 = "..."
84302100201-10 = "ก็ได้"

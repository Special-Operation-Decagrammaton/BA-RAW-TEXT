[translation]
3003-1 = "เงาของกระป๋อง 3"
3003-4 = "กระป๋องนั่นมันบวมแบบนี้มาตั้งแต่เมื่อไรน่ะ?"
3003-5 = "ไม่รู้เหมือนกันค่ะ เผลอปล่อยทิ้งไว้นานไปหน่อย แล้วพอมาดูอีกทีก็..."
3003-6 = "ยิ่งไปกว่านั้นนะ กินไอ้นี่เข้าไปมันจะไม่เป็นอะไรเหรอไง?"
3003-7 = "กระป๋องสภาพดีๆ มันไม่มีทางบวมได้ขนาดนี้หรอกนะ!"
3003-9 = "ว่าแล้วเชียว กระป๋องนี่ต้องไม่ใช่กระป๋องธรรมดา... ต้องมีสิ่งมีชีวิตน่ากลัวๆ ถูกผนึกเอาไว้แน่เลย..."
3003-10 = "อาจจะเป็นหนวดของคราเค่น หรือไม่ก็หางของงูยักษ์ทะเล..."
3003-11 = "หรือบางทีอาจจะเป็นสิ่งมีชีวิตใต้ท้องทะเลลึกที่ระบุตัวตนไม่ได้..."
3003-12 = "เสบียงอาหารที่ถูกผลิตในปริมาณมากๆ จากโรงงาน ไม่มีทางมีของอะไรพรรค์นั้นหรอกน่า"
3003-13 = "ไหนดูซิ... มีส่วนประกอบอะไรบ้าง"
3003-17 = "<'ซีฟู้ดคลุกซอส' แบบกระป๋องจากสำนักงานใหญ่ประกอบด้วยอาหารทะเลสดๆ ทั้งตัว เพื่อเพิ่มรสชาติ และเนื้อสัมผัส>"
3003-18 = "<อาหารทะเลในกระป๋องได้แก่ ปลาแฮร์ริ่ง ปลาซาร์ดีน ปลาหมึก เป็นต้น อีกทั้งยังไม่ทำการฆ่าเชื้อ เพื่อรักษารสชาติเฉพาะของอาหารทะเลเอาไว้...>"
3003-19 = "ดูเหมือนว่าอาหารทะเลที่อยู่ในกระป๋องจะเน่าหรือไม่ก็โดนหมักนะ..."
3003-20 = "อะ... อึก คลื่นไส้ชะมัด..."
3003-21 = "หมายความว่าในกระป๋องนี้เต็มไปด้วยก๊าซปลาทะเลจนฝาบวมขึ้นมาขนาดนี้น่ะเหรอ?"
3003-22 = "ถ้าขยับพลาดไปกระแทกแล้วกระป๋องระเบิดขึ้นมาละก็..."
3003-24 = "...ไม่อยากจะคิดเลย..."
3003-25 = "เห็นทีคงต้องเอาไปทิ้งที่อื่นอย่างช่วยไม่ได้แหละนะ..."
3003-30 = "ไม่ค่ะ ทุกคนรอเดี๋ยวก่อนนะคะ"
3003-36 = "ถ้าเป็นอย่างที่ซากิบอกละก็ แค่ไปแตะโดนนิดเดียว กระป๋องนี้ก็คงจะระเบิดก๊าซชีวภาพออกมาแน่นอนค่ะ"
3003-37 = "แล้วถ้าเราเอากระป๋องนี้ไปทิ้งถังขยะอย่างไร้ความรับผิดชอบ... แล้วพนักงานทำความสะอาดก็อาจจะ#nไปแตะเข้าโดยที่ไม่รู้ หรือประชาชนที่อยู่บริเวณนั้นอาจได้รับความเสียหายหนักนะคะ"
3003-38 = "ถะ... ถ้างั้นเราจะทำยังไงล่ะ? เอามากินก็ไม่ได้..."
3003-39 = "ภารกิจ EOD ที่เป็นปฏิบัติการปลดชนวนวัตถุระเบิดและระเบิดแสวงเครื่อง ถือเป็นหนึ่งในหน้าที่ของ#nหน่วย SRT..."
3003-40 = "เราจะปล่อยให้ระเบิดก๊าซชีวภาพนี้ตกไปอยู่ในมือคนอื่นไม่ได้ค่ะ"
3003-42 = "มิยาโกะ หรือว่าเธอ..."
3003-43 = "จะใช้วิธีนั้นเหรอ...?"
3003-44 = "พวกเราจะรับผิดชอบและกำจัดซีฟู้ดกระป๋องนี้ค่ะ!"
3003-46 = "จากนี้เป็นต้นไป เราจะเริ่มปฏิบัติการ <ปลาแฮร์ริ่งเน่า> เพื่อกำจัดอาหารกระป๋องนี้อย่างปลอดภัยค่ะ"
3003-47 = "ขั้นตอนพื้นฐานของการกู้ระเบิดคือระงับความเสียหายให้น้อยที่สุดและทำให้วัตถุระเบิดไม่ทำงาน..."
3003-48 = "ส่วนประกอบในตัวปลาส่วนมากที่ทำให้เกิดกลิ่นเหม็นเน่าเป็นของเหลว เราจะค่อยๆ ปล่อยก๊าซออกมา โดยใส่กระป๋องไว้ในน้ำค่ะ"
3003-49 = "ฉันก็ไม่มีอะไรจะแย้งวิธีนั้นหรอกนะ..."
3003-50 = "...ถ้าอย่างนั้นฝากด้วยนะคะ ซากิ"
3003-54 = "เดี๋ยวก่อน ทำไมถึงกลายเป็นว่าฉันต้องเป็นคนจัดการมันล่ะ?"
3003-55 = "นั่นก็เพราะว่ามีซากิแค่คนเดียวในกองทหาร RABBIT ที่จบการฝึก EOD มายังไงล่ะคะ"
3003-56 = "เดี๋ยวสิ โมเอะเองก็ฝึก EOD มาเหมือนกันนะ"
3003-57 = "นั่นก็ถูกค่ะ แต่การจะฝากให้โมเอะไปปลดชนวนระเบิดนั่น มันก็..."
3003-61 = "ทำไมล่ะ อยากให้ฉันช่วยเหรอ? ถ้าเป็นการไประเบิดละก็ ไว้ใจฉันได้เลย ฮุฮุฮุ"
3003-63 = "ช่วยไม่ได้จริงๆ แฮะ..."
3003-64 = "ใช่ค่ะ... ช่วยไม่ได้จริงๆ"
3003-65 = "แต่ไม่ต้องกังวลไปนะคะ ซากิ พวกเราก็จะคอยสนับสนุนอยู่ข้างๆ เตรียมรับมือสถานการณ์ฉุกเฉินค่ะ"
3003-67 = "ก็พวกเราเป็นสหายร่วมรบที่มีชะตากรรมร่วมกันนี่คะ...!"
3003-68 = "ถึงจะไม่ค่อยเข้าใจว่าทำไมต้องตื่นเต้นกับการเปิดอาหารกระป๋องแค่อันเดียวขนาดนั้นก็เถอะ..."
3003-72 = "(กลืนน้ำลาย) ...แต่พอต้องมาทำจริงๆ แล้วก็แอบกังวลอยู่เหมือนกันแฮะ"
3003-73 = "ก่อนอื่นเรามาเจาะรูขนาดเล็กที่ใต้กระป๋องเพื่อปล่อยก๊าซออกมาเถอะค่ะ"
3003-74 = "ถะ... ถ้าทำพลาดขึ้นมาแล้วระเบิด ตู้ม! ขึ้นมาจะทำยังไง...?"
3003-76 = "ก็คงเกิดหายนะของเหลวเยิ้มแหยะ น่าขยะแขยง เป็นการทำลายล้างอันเฉอะแฉะน่ะสิ แฮ่ก... แฮ่ก..."
3003-77 = "เอ่อ... คือว่าถ้าอย่างนั้น..."
3003-78 = "เดี๋ยวก่อนค่ะ ซากิ ในการเจาะกระป๋องที่บวมแบบนี้จะต้องเจาะตรงบริเวณที่หนาที่สุดเพื่อไม่ให้ตัว#nกระป๋องเสียหายจากแรงดันค่ะ"
3003-79 = "มะ... ไม่อยากมองเลย พวกเราจบสิ้นแล้วสินะ..."
3003-81 = "ไหนๆ ก็ไหนๆ แล้ว เราไม่สู้ระเบิดทิ้งไปให้ชื่นมื่นเลยไม่ดีกว่าเหรอ? แฮ่ก... แฮ่ก..."
3003-82 = "โอ้ย หนวกหูน่า!! เอาแต่ชวนคุยกันแบบนี้ฉันก็ไม่มีสมาธิเลยน่ะสิ-"
3003-86 = "อ๊ะ"
3003-91 = "(หลังจากนั้นการระเบิดของซีฟู้ดกระป๋องก็ทำให้เกิดภัยพิบัติทางชีวภาพที่โคะอุซางิ การ์เด้น...)"
3003-93 = "(แม้จะกอบกู้ซากไปได้แล้วอย่างยากลำบาก แต่กลิ่นเหม็นก็ยังติดตัวเหล่าสมาชิกกองทหาร RABBIT ไปนานกว่าสามวัน...)"
3003-94 = "เงาของกระป๋อง"

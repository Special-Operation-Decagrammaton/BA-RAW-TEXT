[translation]
3003-1 = "Shadow of the Canned Food Part 3"
3003-4 = "Do they normally...expand like that?"
3003-5 = "Well, it has been sitting there for a while."
3003-6 = "You're not going to...eat it, are you?"
3003-7 = "I don't think it's normal! Not in the slightest!"
3003-9 = "I-It isn't ordinary a-at all! Th-There's probably some c-creature's parts sealed in it...!"
3003-10 = "L-Like the tentacles of a k-kraken...or the t-tail of a giant s-s-sea snake..."
3003-11 = "Or some other h-horrible creature we don't know about!"
3003-12 = "These are mass-produced war rations made in factories. I highly doubt they sell canned mythical creatures."
3003-13 = "L-Let's try checking the ingredients."
3003-17 = "\"Our mixed seafood sauce is made of fresh whole seafood to emphasize the flavor and texture.\""
3003-18 = "\"Contains herring, sardine, octopus, etc., and no separate pasteurization was done so as to preserve the seafood's unique taste.\""
3003-19 = "Basically, the seafood inside this can has probably rotted or fermented to an alarming degree."
3003-20 = "Gross. Ick."
3003-21 = "So you mean this can is so full of fish gas that it expanded?"
3003-22 = "That means if we're not careful, it could explode. It's a fishy gas bomb."
3003-24 = "...Please don't name it."
3003-25 = "Let's just take it far away enough and toss it out."
3003-30 = "No, wait!"
3003-36 = "If what Saki said is true, that seafood sauce can is an explosive that emits biochemical gases at the slightest touch."
3003-37 = "If we dispose of it irresponsibly, a janitor or citizen could suffer serious damage."
3003-38 = "W-Well, what do you want us to do? Eat it?!"
3003-39 = "EOD missions such as eliminating duds and IEDs are also part of SRT's duties."
3003-40 = "We can't afford to let this abominable bio-bomb fall into anyone else's hands."
3003-42 = "Miyako, are you..."
3003-43 = "Are you serious right now?!"
3003-44 = "It's our duty to properly eliminate this seafood can!"
3003-46 = "Starting now, commence Operation Rotten Herring! The objective is to safely dispose of this mixed seafood can."
3003-47 = "We have to render the explosive inoperable without detonating it."
3003-48 = "Since most of the odorous components of fish are water-soluble, let's begin by slowly degassing the canned food in water."
3003-49 = "Okay, good luck. Do what you gotta do."
3003-50 = "Right, Saki. I'm counting on you."
3003-54 = "What in the hell makes you think I'm gonna do it?"
3003-55 = "You're the only one out of us who's completed the EOD training, Saki."
3003-56 = "That's not true. Moe did too."
3003-57 = "Well, but... I mean, Moe and explosives..."
3003-61 = "Heeheehee. Yeah, that's right. Why don't you let me handle it, Saki?"
3003-63 = "...Fair point."
3003-64 = "I'm sorry. There's just no other choice."
3003-65 = "But don't worry! We'll support you in any way we can."
3003-67 = "W-We're all in this t-together!"
3003-68 = "Are we really making this big of a fuss over a can of seafood?"
3003-72 = "Well... Actually, I guess I'm a little bit nervous."
3003-73 = "First, make a very small hole in the bottom of the can to start slowly releasing gas."
3003-74 = "Wh-What if it explodes?"
3003-76 = "Being attacked by a toxic liquid...! *pant* *pant*"
3003-77 = "Um...."
3003-78 = "Wait, Saki. When piercing an expanded can, you have to do it at the thickest bottom edge so the pressure doesn't break the can."
3003-79 = "I-I can't look. I have a b-bad feeling about th-this...!"
3003-81 = "At this point, why not just let it explode?! *pant* *pant*"
3003-82 = "Shut up, you freak! I can't focus!"
3003-86 = "Oops."
3003-91 = "The canned seafood exploded and caused a huge biological disaster in Kosagi Park."
3003-93 = "They managed to clean the wreckage, but the RABBIT Squad members reeked of rotten seafood sauce for a long time after..."
3003-94 = "Shadow of the Canned Food"

[translation]
3003-1 = "罐頭的陰影（３）"
3003-4 = "……這罐頭是從什麼時候開始脹成這樣的啊？"
3003-5 = "我也不知道。想不到放了一段時間之後會變這樣……"
3003-6 = "話說回來，這個東西真的能吃嗎？"
3003-7 = "正常的罐頭真的會脹成這樣嗎？"
3003-9 = "這果然不是普通的罐頭……這裡面絕對封印著什麼可怕生物……"
3003-10 = "例如克拉肯的觸手或是巨大海蛇的尾巴……"
3003-11 = "又或者是深海裡的未知生命體……"
3003-12 = "這可是由工廠大量生產的戰備口糧。怎麼可能裝那種東西。"
3003-13 = "總之……我們先來看看成分吧。"
3003-17 = "「……為了盡可能保持食材的風味及口感，本公司的『海鮮拌醬』罐頭特地選用新鮮且完整的海鮮。」"
3003-18 = "「罐頭內含有鯡魚、沙丁魚、章魚等海鮮，為了發揮海鮮原有的鮮味，並未另行殺菌作業……」"
3003-19 = "看來這罐頭裡的海鮮八成已經發酵或壞掉了……"
3003-20 = "噁呃呃，好噁心……"
3003-21 = "也就是說現在這個罐頭裡面，充滿了海鮮的發酵氣體？"
3003-22 = "甚至可能只要一不小心，罐頭就會爆開……"
3003-24 = "咿……我想都不想去想……"
3003-25 = "這東西只能找地方丟掉了吧……"
3003-30 = "各位請等一下。"
3003-36 = "要是咲希所說的話是真的，那這個罐頭就等於是稍有衝擊就會噴出生化氣體的炸彈。"
3003-37 = "假如我們將這罐頭隨便丟進垃圾筒……那麼不慎觸碰到的清潔工人和附近居民可能會遭受相當大的危害。"
3003-38 = "那，那我們該怎麼辦？這東西又不能吃……"
3003-39 = "解除奇普托斯境內未爆彈和[ruby=IED]簡易引爆裝置[/ruby]的[ruby=EOD]爆裂物處理[/ruby]任務，也是我們SRT應盡的工作之一……"
3003-40 = "我們不能讓這窮凶惡極的生化炸彈落入其他人手中。"
3003-42 = "都子，難道你……"
3003-43 = "難道你要把它……？"
3003-44 = "沒錯……我們要負起責任處理這個海鮮罐頭！"
3003-46 = "現在開始，進行安全處理這個罐頭的「腐爛鯡魚」作戰。"
3003-47 = "爆裂物處理要點在於將傷害降到最低，並使爆裂物失去功用……"
3003-48 = "魚類散發出來的惡臭成分大多屬於水溶性。因此我們要將罐頭泡入水槽，在水槽中緩慢排除罐頭中的氣體，"
3003-49 = "不管用什麼方法都可以啦……"
3003-50 = "……那麼，拜託你了，咲希。"
3003-54 = "等等，為什麼說著說著就變成我要處理了？"
3003-55 = "因為……RABBIT小隊中唯一完成EOD訓練的人就只有你啊。"
3003-56 = "我記得萌應該也接受過EOD訓練才對。"
3003-57 = "話雖如此，但是讓萌處理爆裂物……"
3003-61 = "怎麼了，需要我幫忙嗎？處理炸彈儘管交給我吧，咯嘻嘻。"
3003-63 = "……沒辦法了。"
3003-64 = "……嗯，我們只能靠你了。"
3003-65 = "不過你別擔心，咲希。為了以防萬一，我們也會在一旁支援的。"
3003-67 = "因為我們是命運與共的戰友……！"
3003-68 = "我覺得只是打開一個罐頭，應該沒必要這麼大驚小怪吧……"
3003-72 = "……不過一想到真的要處理它，還是會莫名緊張呀。"
3003-73 = "首先，在罐頭底部鑽一個能讓氣體排出來的小孔。"
3003-74 = "要，要是不小心爆炸的話怎麼辦……？"
3003-76 = "就會全身噴滿又臭又黏的液體迎接滅亡，感覺好像也不賴……哈啊，哈啊……"
3003-77 = "咦，你那是……"
3003-78 = "等一下，咲希。鑽孔時為了避免膨脹的罐頭因外在壓力而破損，你必須在最厚的底部外圍鑽孔才行。"
3003-79 = "唔唔，好可怕……我們完蛋了……"
3003-81 = "既然如此，乾脆讓它痛快地炸開來吧！哈啊，哈啊……"
3003-82 = "唔唔，吵死了！！你們一直在旁邊碎碎念，我要怎麼集中──"
3003-86 = "啊。"
3003-91 = "（爆炸後的罐頭內容物四處飛散，在兔寶寶公園引發了一場極其嚴重的生化災害）"
3003-93 = "（之後，雖然RABBIT小隊費了好大一番功夫收拾完殘局，不過附著在她們身上的惡臭，整整過了四天都還沒散去……）"
3003-94 = "罐頭的陰影"

[translation]
52270-1 = "第27話;終於抓住的衣角"
52270-11 = "你總算到達這裡了啊，名草。"
52270-12 = "菖蒲，我……"
52270-13 = "不必特地解釋沒關係。"
52270-14 = "你說過的每一句話，都被我的這隻[ruby=一目]「眼」[/ruby]所注視著。"
52270-15 = "理解也好，不理解也罷……真是無聊到令人笑不出來的鬧劇。"
52270-16 = "無論你說什麼，我都不會理解你。"
52270-17 = "反正我也沒有打算理解任何人的意思。"
52270-18 = "菖蒲，我並不是為了尋求你的理解而來到這裡的。"
52270-22 = "那是為了什麼？"
52270-23 = "我是來接下你肩負的最後責任的。"
52270-27 = "……百花繚亂紛爭調停委員會委員長．七稜菖蒲。"
52270-28 = "你怠忽百花繚亂的職責，導致學生陷入危險，因此判斷你已不具備委員長的資格。"
52270-33 = "……我在此向你提出繼承戰的申請。"
52270-40 = "明明以前老是哭哭啼啼的，現在倒是挺囂張的嘛。"
52270-41 = "等，等一下，前輩一個人應付得來嗎？"
52270-42 = "就，就是說呀！#n要對付菖蒲前輩的話，還是大家一起上比較……"
52270-44 = "就算大家一起上，我認為結果也不會改變。"
52270-45 = "蓮華和紫，麻煩你們負責保護老師。"
52270-46 = "而且……百花繚亂的繼承戰還需要滿足條件對吧？"
52270-47 = "為了證明繼承戰是以公平標準舉行的儀式，需要一名非百花繚亂所屬的見證人……"
52270-48 = "以及一名能保證繼承戰是以正當形式進行的百花繚亂幹部級成員。"
52270-52 = "桔梗、老師。麻煩你們擔任繼承戰的證人。"
52270-56 = "……我明白了。"
52270-58 = "[ns]「我很樂意擔任證人。」"
52270-63 = "你還是一樣重視這些無謂的程序啊。"
52270-64 = "不過……好吧，我懂了。#n畢竟做個了結很重要。"
52270-69 = "百花繚亂紛爭調停委員會委員長．七稜菖蒲。"
52270-70 = "接受挑戰者御稜名草的繼承戰申請。"
52270-82 = "……唔！"
52270-83 = "…………"
52270-84 = "好厲害……名草前輩竟然能和那位菖蒲委員長打得難分難捨？"
52270-85 = "儘管差距只在毫釐之間，但如果這樣繼續下去的話……或許有勝算也說不定！"
52270-95 = "（為什麼……為什麼無法壓制他？）"
52270-96 = "（區區名草……區區名草竟然……）"
52270-98 = "……為什麼要這麼拚命？"
52270-102 = "拚命……？"
52270-103 = "拚盡全力的人明明是你吧？少虛張聲勢了。"
52270-104 = "不……從你的動作、呼吸、表情之中都能看出來。"
52270-105 = "和之前對練時不同，你的每個行為都透露出了「絕不能輸」的迫切感。"
52270-106 = "如果打算認輸的話，我打從一開始就不會接受繼承戰了吧。"
52270-107 = "難道你還對委員長之位有所眷戀？"
52270-108 = "如果是的話，早早放下一切回來不就好了。"
52270-109 = "放下……？"
52270-110 = "要是連地位、慾望、渴望都放下的話……我究竟還剩下什麼？"
52270-114 = "如果沒有人理解我、沒有人認同我的話……我活著究竟是為了什麼！"
52270-119 = "……一定需要理由嗎？"
52270-120 = "單純……只是活著也沒關係吧。"
52270-122 = "因為天氣很好、因為陽光灑落的走廊很溫暖、因為夜市飄來的食物香氣很迷人……"
52270-123 = "這些日常中微不足道的事物，就足以讓人期待明天……不需要這麼拚命尋找理由吧。"
52270-127 = "對我來說，只要有你在就已經足夠了……"
52270-128 = "我……"
52270-132 = "……看來你成長了不少啊，名草。#n居然光靠幾句話就能讓我動搖。"
52270-141 = "不過這種無謂的伎倆已經不管用了。"
52270-147 = "我會在這裡證明我的價值。"
52270-161 = "哈啊……一切都結束了呢。"
52270-165 = "恭喜你，名草。#n從現在起你就是委員長了。"
52270-166 = "明明挑戰了上百次都沒贏過，最後還是你贏了啊。"
52270-167 = "這是值得慶賀的事。#n抬起頭來好好高興一下吧。"
52270-173 = "你為什麼……"
52270-174 = "……為什麼要哭成那樣呢。"
52270-176 = "……對不起，菖蒲。"
52270-179 = "真的很對不起，菖蒲。"
52270-180 = "一直以來都忽視你的目光，沒有傾聽你的吶喊……"
52270-184 = "抱歉沒能察覺你一直伸出的那隻手……"
52270-185 = "你明明那麼痛苦，我卻還總是依賴著你……真的很對不起。"
52270-186 = "雖然我總是不夠好，和你相比更是微不足道……#n不過唯有這隻手，我絕不會再放開了。"
52270-187 = "我會陪你一起承擔你的痛苦……"
52270-191 = "真的，真的很對不起，菖蒲……"
52270-196 = "我果然還是……"
52270-197 = "最討厭你那副哭泣的臉了。"
52270-201 = "下一話;一同等待花開之時"

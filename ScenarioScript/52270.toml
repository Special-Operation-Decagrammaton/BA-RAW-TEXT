[translation]
52270-1 = "ตอนที่ 27;ชายเสื้อที่เอื้อมถึงในที่สุด"
52270-11 = "มาถึงตรงนี้จนได้สินะ นางุสะ"
52270-12 = "อายาเมะ ฉันน่ะ..."
52270-13 = "ไม่ต้องอธิบายสิ่งที่อยู่ในใจหรอก"
52270-14 = "ฮิโตสึเมะเฝ้าดูสิ่งที่เธอพูดอยู่ที่นี่มาตลอดแล้วละ"
52270-15 = "เดี๋ยวเข้าใจได้ เดี๋ยวเข้าใจไม่ได้... เป็นละครสั้นที่ไม่เห็นจะขำตรงไหน"
52270-16 = "ไม่ว่าเธอจะพูดอะไร ฉันก็ไม่เข้าใจเธอหรอก"
52270-17 = "ยังไงซะฉันก็ไม่อยากเข้าใจตัวเองและคนอื่นอยู่แล้ว"
52270-18 = "อายาเมะ ฉันไม่ได้มาที่นี่เพราะหวังให้เธอเข้าใจฉันหรอกนะ"
52270-22 = "แล้วมาทำไมล่ะ?"
52270-23 = "ฉันมาเพื่อรับความรับผิดชอบสุดท้ายที่เธอแบกอยู่ต่างหาก"
52270-27 = "นานาคาโดะ อายาเมะ หัวหน้าคณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน..."
52270-28 = "ฉันวินิจฉัยว่าเธอไม่มีคุณสมบัติในการเป็นหัวหน้า เธอละเลยหน้าที่ของเฮียกกะเรียวรัน และทำให้สมาชิกเฮียกกะเรียวรันตกอยู่ในความเสี่ยง"
52270-33 = "ฉันขอประกาศศึกชิงตำแหน่งกับเธอ..."
52270-40 = "คนที่เอาแต่ร้องไห้กลายเป็นคนหยิ่งยโสไปแล้วสินะ"
52270-41 = "ดะ... เดี๋ยวก่อน จะรับมือด้วยตัวคนเดียวไหวเหรอ?"
52270-42 = "นะ... นั่นสิเจ้าคะ! ถ้าจะสู้กับรุ่นพี่อายาเมะ ข้าว่าเราทุกคนช่วยกันดีกว่า..."
52270-44 = "ต่อให้บุกพร้อมกันหลายคน ผลลัพธ์ก็ไม่เปลี่ยนแปลงไปหรอก"
52270-45 = "เรนเกะ ยูคาริ ฉันฝากคุ้มกันคุณครูด้วยนะ"
52270-46 = "แล้วก็... ศึกชิงตำแหน่งของเฮียกกะเรียวรันมีเงื่อนไขจำเป็นใช่มั้ยล่ะ?"
52270-47 = "เพื่อรับรองว่าศึกชิงตำแหน่งเป็นพิธีที่จัดขึ้นภายใต้บรรทัดฐานที่ยุติธรรม จะต้องมีผู้สังเกตการณ์#nที่ไม่ใช่คนของเฮียกกะเรียวรัน 1 คน..."
52270-48 = "และสมาชิกระดับสูงของเฮียกกะเรียวรัน 1 คนที่จะรับรองว่าศึกชิงตำแหน่งครั้งนั้นได้ถูกจัดและตัดสิน#nอย่างชอบธรรม"
52270-52 = "คิเคียว คุณครู ช่วยรับรองให้ด้วยทีนะ"
52270-56 = "เข้าใจแล้ว..."
52270-58 = "[ns] \"ครูจะเป็นคนรับรองให้เอง\""
52270-63 = "ยังยึดระบบระเบียบไร้สาระอยู่เหมือนเดิมเลยนะ"
52270-64 = "แต่ก็ได้... ฉันเข้าใจแล้ว เรื่องที่ตั้งใจไว้ ก็ต้องทำให้สำเร็จ"
52270-69 = "นานาคาโดะ อายาเมะ หัวหน้าคณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน"
52270-70 = "ตอบรับการท้าศึกชิงตำแหน่งจากผู้ท้าชิง โกเรียว นางุสะ"
52270-82 = "อึก...!"
52270-83 = "......"
52270-84 = "สุดยอด... ฉันว่ารุ่นพี่นางุสะกับหัวหน้าอายาเมะพอจะสูสีกันอยู่นะ?"
52270-85 = "ถึงฝีมือจะแตกต่างกันไปบ้างเล็กๆ น้อยๆ แต่ถ้ายังสู้กันต่อไปเช่นนี้... ข้าว่าอาจจะชนะก็ได้เจ้าค่ะ!"
52270-95 = "(ทำไมนะ... ทำไมฉันถึงยังเอาชนะไม่ได้?)"
52270-96 = "(กับอีแค่นางุสะ แค่คนอย่างนางุสะ...)"
52270-98 = "ทำไมถึงสู้อย่างเอาเป็นเอาตายขนาดนั้นล่ะ...?"
52270-102 = "สู้อย่างเอาเป็นเอาตายงั้นเหรอ...?"
52270-103 = "เลิกอวดดีได้แล้ว ไม่ใช่เธอหรอกเหรอที่สู้ทุ่มสุดตัวอยู่น่ะ?"
52270-104 = "ไม่หรอก... ฉันรู้ได้จากการเคลื่อนไหว การหายใจ และสีหน้าของเธอ"
52270-105 = "ต่างจากตอนที่เราเคยดวลกันครั้งก่อนๆ ตอนนี้ฉันรู้สึกได้ว่าเธอรีบร้อนและกลัวว่าจะพ่ายแพ้ในทุกๆ การเคลื่อนไหว "
52270-106 = "ถ้าฉันตั้งใจจะแพ้ให้ ฉันก็คงไม่ตอบรับศึกชิงตำแหน่งตั้งแต่แรกหรอก"
52270-107 = "ยังติดค้างอยู่กับตำแหน่งหัวหน้าอยู่งั้นเหรอ?"
52270-108 = "ถ้าเป็นอย่างนั้นก็ทิ้งทุกอย่างแล้วก็กลับมาสิ"
52270-109 = "ให้ทิ้งทุกอย่างงั้นเหรอ...?"
52270-110 = "ถ้าฉันทิ้งตำแหน่ง ความปรารถนา และประสงค์อันแรงกล้า... แล้วฉันจะเหลืออะไรล่ะ?"
52270-114 = "ถ้าไม่มีใครเข้าใจและยอมรับในตัวฉัน แล้วฉันจะมีชีวิตต่อไปเพื่ออะไร!"
52270-119 = "ต้องมีเหตุผลในการมีชีวิตด้วยเหรอ...?"
52270-120 = "ก็แค่... ใช้ชีวิตไปก็พอแล้วไม่ใช่หรือไง?"
52270-122 = "แค่เพราะอากาศดี แค่เพราะชอบความอบอุ่นของพื้นห้องที่แดดส่อง แค่เพราะชอบกลิ่นหอมของ#nอาหารในตลาดโต้รุ่ง..."
52270-123 = "แค่เพียงสิ่งเล็กๆ น้อยๆ ในชีวิตก็เพียงพอที่จะทำให้เราตั้งตารอวันพรุ่งนี้แล้ว เพราะงั้นไม่จำเป็นต้อง#nดิ้นรนหาเหตุผลหรอก"
52270-127 = "สำหรับฉันน่ะ แค่มีเธอก็พอแล้ว..."
52270-128 = "แต่ฉัน..."
52270-132 = "ระหว่างที่ไม่ได้เจอกัน เธอเติบโตขึ้นมากเลยนะ นางุสะ... คิดว่าจะทำให้ฉันหวั่นไหวด้วยคำพูดเพียง#nไม่กี่คำงั้นเหรอ?"
52270-141 = "กลอุบายไร้สาระแบบนั้นใช้ไม่ได้ผลกับฉันอีกต่อไปแล้วละ"
52270-147 = "ฉันจะพิสูจน์คุณค่าของตัวเองด้วยสิ่งนี้"
52270-161 = "เฮ้อ... จบลงแล้วสินะ"
52270-165 = "ยินดีด้วยนะ นางุสะ จากนี้ไปเธอได้เป็นหัวหน้าแล้ว"
52270-166 = "ที่ผ่านมาเธอพยายามร้อยครั้งก็ล้มเหลวร้อยครั้ง แต่ตอนนี้เธอทำได้แล้วสินะ"
52270-167 = "เป็นเรื่องที่น่ายินดีด้วยจริงๆ ยืดอกดีใจกับตัวเองเถอะ"
52270-173 = "ว่าแต่ทำไม..."
52270-174 = "เธอถึงร้องไห้อยู่แบบนั้นล่ะ..."
52270-176 = "ขอโทษนะ อายาเมะ..."
52270-179 = "ฉันขอโทษจริงๆ อายาเมะ"
52270-180 = "ขอโทษที่ฉันเพิกเฉยต่อสายตาของเธอมาตลอด และไม่ได้ยินเสียงร้องไห้ของเธอเลย..."
52270-184 = "ขอโทษที่ไม่ทันสังเกตเห็นมือที่ยื่นออกมาให้ตลอดเวลา"
52270-185 = "ขอโทษที่เอาแต่พึ่งพาเธอทั้งๆ ที่เธอเองก็เจ็บปวด"
52270-186 = "ถึงฉันจะยังคงบกพร่องอยู่ ถึงฉันจะเทียบเธอไม่ได้ แต่ฉันจะไม่มีวันปล่อยมือเธอไปเด็ดขาด"
52270-187 = "ฉันจะอยู่กับเธอในยามทุกข์ยากเอง..."
52270-191 = "ฉันขอโทษจริงๆ นะ... อายาเมะ..."
52270-196 = "ว่าแล้วเชียว... ฉัน..."
52270-197 = "ไม่ชอบหน้าของเธอเวลาร้องไห้เลย"
52270-201 = "ตอนต่อไป;รอวันผลิบานพร้อมกัน"

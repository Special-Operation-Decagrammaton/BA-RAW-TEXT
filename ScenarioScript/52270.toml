[translation]
52270-1 = "Episode 27;The Hem Held at Last"
52270-11 = "You made it, Nagusa."
52270-12 = "Ayame, I..."
52270-13 = "You need not explain yourself."
52270-14 = "I've watched and heard all with my Hitotsume."
52270-15 = "And all I heard were lies. All this talk of \"understanding\"..."
52270-16 = "Use whatever pretty words you want, I'll never understand you."
52270-17 = "And I don't want to. Not you, not anyone."
52270-18 = "Ayame. I did not come all this way for some feeble attempt at understanding."
52270-22 = "Then?"
52270-23 = "I've come to secure the last of the burdens you shoulder."
52270-27 = "...President of the Hyakkaryouran Resolution Council, Nanakado Ayame."
52270-28 = "For shirking the duties of the Hyakkaryouran and endangering the students you were meant to protect, you relinquish your claim to the Authority of the Presidency."
52270-33 = "I challenge you to a succession contest."
52270-40 = "For a renowned crybaby, you've certainly grown a spine."
52270-41 = "Whoa, whoa. Hold up. You're going to take her on all by yourself?"
52270-42 = "I-I must protest as well! For an opponent as formidable as Ayame, we should attack as one...!"
52270-44 = "Whether it's one or four of us, the result will remain the same."
52270-45 = "Renge and Yukari, please protect Sensei."
52270-46 = "Then... There are certain conditions to hold a Hyakkaryouran succession contest, yes?"
52270-47 = "It requires one witness from outside the Hyakkaryouran to ensure the match is conducted impartially..."
52270-48 = "And one officer from the Hyakkaryouran to certify that it's done according to tradition."
52270-52 = "Kikyou, Sensei. Please act as our witnesses."
52270-56 = "...Understood."
52270-58 = "[ns] \"Of course. I'm here until the end.\""
52270-63 = "Still so adherent to pointless procedure..."
52270-64 = "All right, I understand. There's a significance to order and tradition."
52270-69 = "I, president of the Hyakkaryouran Resolution Council, Nanakado Ayame..."
52270-70 = "...accept challenger Goryou Nagusa's request for a succession contest."
52270-82 = "Ugh!"
52270-83 = "..."
52270-84 = "This is crazy! She's totally on equal footing with President Ayame?"
52270-85 = "It is still a close match, but if she maintains this pressure...she may emerge victorious!"
52270-95 = "(Why...? Why can't I overwhelm her?)"
52270-96 = "(Of all people...her? Me...to someone like Nagusa?)"
52270-98 = "...Why are you so desperate?"
52270-102 = "Desperate...?"
52270-103 = "You're the one fighting with everything you've got. Don't go acting high and mighty on me now."
52270-104 = "No... Your every movement, your breath, your expression... I can feel it all."
52270-105 = "You've lost your edge. Your desperation to avoid defeat seems to be screaming at me."
52270-106 = "If you really thought I had no intention to win, you never would have challenged me to begin with."
52270-107 = "My real question is...what is your attachment to the president's seat?"
52270-108 = "If you're so desperate to keep it, leave this all behind, and come back."
52270-109 = "Leave it...behind?"
52270-110 = "You want me to leave behind my status? My desires and resolve? And what would I have left?"
52270-114 = "If no one can understand me, if no one accepts me... What am I even alive for?!"
52270-119 = "...But why must you have a reason?"
52270-120 = "Can you not simply...be alive?"
52270-122 = "Can it be because the skies are clear, and the sun is warm, or because of the delectable smells wafting from the night market stalls...?"
52270-123 = "Are these not reasons enough to usher in a new tomorrow? Living doesn't call for this desperate search for \"reason.\""
52270-127 = "For me, having you by my side was reason enough."
52270-128 = "I..."
52270-132 = "...You've grown since I last saw you, Nagusa. To think that you of all people would get under my skin with flowery words."
52270-141 = "Well, it won't work on me."
52270-147 = "I'll prove my worth and my reason for being alive, here and now."
52270-161 = "Haaah... It's all over now."
52270-165 = "Congratulations, Nagusa. You're the president now."
52270-166 = "After hundreds of failed challenges, you've finally beaten me."
52270-167 = "You deserve to be proud. Hold your head high, and smile."
52270-173 = "So tell me why..."
52270-174 = "...are you still crying your heart out?"
52270-176 = "...I'm sorry, Ayame."
52270-179 = "I'm truly sorry, Ayame."
52270-180 = "This is all because I failed to look you in the eye. I plugged my ears to your cries again and again."
52270-184 = "I'm sorry I failed to take hold of your hand when you needed me."
52270-185 = "I'm sorry I failed to notice your own suffering, all while you nursed mine."
52270-186 = "I'm painfully aware of all that I still lack, of how incompetent I am compared to you...but I swear I'll never let go of your hand again."
52270-187 = "No matter how low you fall, I will fall with you. Always."
52270-191 = "I am truly, utterly, hopelessly sorry, Ayame..."
52270-196 = "...I really did..."
52270-197 = "...always hate that crying face of yours."
52270-201 = "Next Episode;Waiting for the Bloom Together"

[translation]
80000004-1 = "彩奈的情人節禮物！"
80000004-2 = "彩奈的教室"
80000004-3 = "老師，你辛苦了！"
80000004-4 = "新的一年開始後，已經過了一個多月了呢……"
80000004-5 = "話說老師知道今天是什麼日子嗎？"
80000004-6 = "[s]「是情人節！」"
80000004-7 = "沒錯，完全正確！"
80000004-8 = "今天是情人節……是個送巧克力給重要的人以及心上人的浪漫節日。"
80000004-9 = "所以……呵呵。彩奈今天也做了手工巧克力，要送給最喜歡的老師！"
80000004-13 = "嘿咻……"
80000004-17 = "鏘！"
80000004-18 = "怎麼樣呀，老師？"
80000004-19 = "看得出來彩奈做的是什麼嗎？"
80000004-20 = "[s1]「這個難道是……」\n[s2]「我？」"
80000004-21 = "是的，沒錯！"
80000004-22 = "是的，沒錯！"
80000004-23 = "是以彩奈和老師的造型烘焙而成的特製巧克力薑餅！"
80000004-24 = "不覺得很可愛嗎？"
80000004-25 = "先做出薑餅，再在上面加上白巧克力。"
80000004-26 = "不知道是不是因為這樣，手到現在感覺都還有點薑的味道……"
80000004-27 = "這是為了老師特別早起製作的唷！"
80000004-28 = "彩奈拚盡全力的禮物，請珍惜地享用哦！"

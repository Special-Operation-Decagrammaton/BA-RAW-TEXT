[translation]
80000004-1 = "Arona's Valentine's Day Gift!"
80000004-2 = "Arona's Classroom"
80000004-3 = "Hi, Sensei!"
80000004-4 = "Time sure has been flying by!"
80000004-5 = "So...do you know what today is?"
80000004-6 = "[s] \"It's Valentine's Day!\""
80000004-7 = "Bingo!"
80000004-8 = "Valentine's Day is a special holiday where people gift chocolate to someone they admire."
80000004-9 = "Heehee. That's why I made chocolate for my favorite teacher!"
80000004-13 = "Let's see..."
80000004-17 = "Ta-da!"
80000004-18 = "What do you think, Sensei?"
80000004-19 = "Can you tell who this is?"
80000004-20 = "[s1] \"Is this you and...?\"\n[s2] \"Is that supposed to be me?\""
80000004-21 = "Yep! You got it!"
80000004-22 = "Yep! You got it!"
80000004-23 = "They're special chocolate ginger cookies I made to look like you and me!"
80000004-24 = "I think I got my ribbon just right."
80000004-25 = "First, I cut the shape from ginger cookies and then sprinkled white chocolate on top for the finishing touches."
80000004-26 = "*sniff* Actually, my hands still smell like ginger..."
80000004-27 = "I woke up really early this morning to make these just for you!"
80000004-28 = "I gave 'em all that I have. I hope you'll enjoy them, and happy Valentine's Day!"

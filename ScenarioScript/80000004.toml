[translation]
80000004-1 = "ของขวัญวันวาเลนไทน์ของอะโรน่า!"
80000004-2 = "ห้องเรียนของอะโรน่า"
80000004-3 = "สวัสดีค่ะ คุณครู!"
80000004-4 = "วันปีใหม่ก็ผ่านมาสักพักแล้วนะคะ!"
80000004-5 = "คือว่า... คุณครูรู้ไหมคะว่าวันนี้วันอะไร?"
80000004-6 = "[s] \"วันวาเลนไทน์ไง!\""
80000004-7 = "ติ๊งต่อง~ ถูกต้องค่า!"
80000004-8 = "วันนี้เป็นวันวาเลนไทน์...ที่ใครๆ ก็จะมอบช่อดอกไม้และช็อกโกแลตให้กับคนที่ชอบเพื่อแสดง#nความโรแมนติก"
80000004-9 = "ฮิฮิ เพราะงั้นวันนี้หนูเลยทำช็อกโกแลตโฮมเมดมาให้คุณครูที่หนูชอบมากๆ ค่ะ!"
80000004-13 = "ไหนดูซิ..."
80000004-17 = "แต่นแต๊น~"
80000004-18 = "เป็นยังไงบ้างคะ คุณครู?"
80000004-19 = "ดูออกมั้ยคะว่าหนูทำเป็นรูปอะไร?"
80000004-20 = "[s1] \"นี่มัน...\"\n[s2] \"รูปครูเหรอ?\""
80000004-21 = "ใช่แล้วละค่ะ!"
80000004-22 = "ใช่แล้วละค่ะ!"
80000004-23 = "อันนี้เป็นคุกกี้ขนมปังขิงช็อกโกแลตสูตรพิเศษรูปหนูกับคุณครูค่ะ!"
80000004-24 = "ริบบิ้นรูปช็อกโกแลตแบบนี้ น่ารักมั้ยคะ?"
80000004-25 = "หนูใช้ขนมรสขิงมาทำเป็นแม่พิมพ์ก่อน แล้วก็โรยไวท์ช็อกโกแลตลงไปค่ะ"
80000004-26 = "(ฟุดฟิด) เพราะงั้นมือของหนูเลยยังมีกลิ่นจางๆ ติดอยู่เลย..."
80000004-27 = "หนูทำตั้งแต่เช้าและทำสุดฝีมือเพื่อคุณครูเลยนะคะ! ฮิฮิ..."
80000004-28 = "หนูตั้งใจทำของขวัญวันวาเลนไทน์มาให้คุณครูเลย คุณครูช่วยรักษาเอาไว้ให้ดีๆ ด้วยนะคะ!"

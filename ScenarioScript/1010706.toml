[translation]
1010706-1 = "書記的探究生活"
1010706-5 = "老師好～！"
1010706-6 = "[s]「你好呀，千秋。」"
1010706-7 = "老師，請問你今天的身體狀況如何？"
1010706-8 = "昨晚睡得好嗎？有沒有哪裡不舒服？"
1010706-9 = "[s1]「唔嗯，都還挺正常的……」\n[s2]「怎麼突然提到健康的話題？」"
1010706-12 = "嘿嘿，老實說～"
1010706-13 = "是跟《週刊萬魔殿》的特輯報導有關～"
1010706-14 = "其實，我現在非常需要老師的幫忙！"
1010706-15 = "[s]「幫忙？難道又是甜點咖啡廳嗎？」"
1010706-19 = "[ns]「我可沒把握能再吃甜點吃那麼飽哦。」"
1010706-20 = "啊哈哈！不是這樣的！"
1010706-21 = "實際上，我已經想到下一期《週刊萬魔殿》特輯報導的標題了～！"
1010706-22 = "那就是＜現場直擊！夏萊潛入作戰！＞！"
1010706-23 = "[s]「夏萊……潛入作戰？」"
1010706-24 = "嘿嘿，沒錯！"
1010706-25 = "針對熱門的話題人物──夏萊的[USERNAME]老師！"
1010706-26 = "究竟是如何度過在夏萊的一天進行密切報導！"
1010706-27 = "怎麼樣？光看標題就讓人很想讀下去對吧～？"
1010706-28 = "[s]「這個嘛……」"
1010706-29 = "啊，不過今天我是以值日生的身份來的，而且我也有記者應有的職業道德！"
1010706-30 = "所以採訪也會等老師同意才進行！"
1010706-31 = "就算被拒絕也只要再找其他題材就行了，所以請老師考慮的時候不必覺得有負擔！"
1010706-32 = "[s]「沒事，單純要採訪的話倒是沒問題。」"
1010706-33 = "真的嗎？謝謝你！"
1010706-34 = "那麼，有問題的是在其他方面嗎？"
1010706-35 = "[s]「與其說是問題……」"
1010706-37 = "[ns3]「感覺採訪我應該不怎麼有趣吧？」\n[ns4]「畢竟我只是每天重複同樣的工作而已……」"
1010706-41 = "這點老師不必擔心～！"
1010706-42 = "我可是格黑娜學園學生會「萬魔殿」的書記──#n同時也是《週刊萬魔殿》記者兼編輯兼發行人的元宮千秋！"
1010706-43 = "無論在什麼地方，都能找到值得報導的題材哦！"
1010706-44 = "[s]「唔嗯……那我該做點什麼嗎？」"
1010706-45 = "不用不用！老師只要跟平常一樣生活就行了！"
1010706-46 = "尋找報導素材是我的工作！"
1010706-47 = "而且保持自然的話，反而更能呈現出有趣的畫面！"
1010706-48 = "[s]「好吧，既然你都這麼說了……」"
1010706-49 = "是！那採訪的事，我就當老師答應囉？"
1010706-50 = "那麼，我想先從拍攝夏萊的各個角落開始～！"
1010706-51 = "[s]「嗯，你隨意拍吧。」"
1010706-52 = "非常感謝～！"
1010706-54 = "（於是便讓千秋在一旁自由行動，回頭開始處理較為急迫的工作）"
1010706-63 = "哦哦，夏萊的椅子原來是這個品牌～這可逃不過我的眼睛哦！"
1010706-64 = "不過，這種程度還沒辦法拿來當報導的題材……"
1010706-65 = "哈！沙發底下會不會藏著有趣的東西呢？"
1010706-71 = "唔嗯……只有灰塵而已。"
1010706-72 = "啊，這裡有個遊戲手把！？說不定能找出老師的遊戲喜好！"
1010706-73 = "咦？那是之前當值日生的學生留下來的？#n原來如此……"
1010706-74 = "唔嗯，好像沒找到有趣又適合報導的題材呢……"
1010706-75 = "[s]「對啊，所以我才說可能不怎麼有趣……」"
1010706-76 = "我，我不會放棄的！"
1010706-78 = "（不久之後……）"
1010706-80 = "那個，不好意思打擾你一下……"
1010706-81 = "老師平常就是這樣整天都在工作嗎……？"
1010706-82 = "[s]「今天剛好有很多需要盡快完成的工作。」"
1010706-83 = "嗚嗚……要是再這樣下去，這次特輯報導的品質恐怕……"
1010706-84 = "還，還是乾脆換個主題呢……？"
1010706-85 = "不，我要全力發揮記者的直覺！"
1010706-86 = "繼續尋找我的獨家新聞……！"
1010706-89 = "（幾小時後……）"
1010706-93 = "[ns]「唔，唔嗯……」"
1010706-100 = "― [log=치아키]啊哈哈！按下快門的好時機，被我捕捉到了！[/log][wa:2790] "
1010706-103 = "― [log=치아키]老師打瞌睡的表情！剛好適合當下期的封面！[/log][wa:3420] "
1010706-106 = "― [log=치아키]這樣《週刊萬魔殿》特刊號的準備就萬無一失了！[/log][wa:2740] "
1010706-109 = "― [log=치아키]不愧是我！又掌握到獨家新聞了～！[/log][wa:3030] "
1010706-112 = "[ns]「竟然躲到桌子底下，也太執著了吧！」"
1010706-114 = "― [log=치아키]哼哼！書記的行動力，可是不容小覷的唷～！[/log][wa:2600] "
1010706-117 = "― [log=치아키]啊對了！不如趁勢，來一窺老師的祕密吧……？[/log][wa:3200] "
1010706-119 = "― [log=치아키]比如襪子破洞的謎團，之類的……！[/log][wa:2910] "
1010706-122 = "― [log=치아키]咦！？要對調皮的孩子處以「關在桌子底下之刑」……！？[/log][wa:1920] "
1010706-125 = "― [log=치아키]對，對不起嘛～！拜託放我出去～！[/log][wa:3220] "
1010706-128 = "嗚嗚……潛入採訪也不容易呢。"
1010706-129 = "差點就被關在桌子底下了……"
1010706-130 = "[s]「我打瞌睡的表情，你真的打算登在報導上嗎？」"
1010706-131 = "呵呵，雖然我本來是這麼打算的～"
1010706-132 = "……"
1010706-133 = "不過我會換成別的～！"
1010706-134 = "就像我享受著《週刊萬魔殿》的製作一樣，我希望讀者在閱讀的時候也能樂在其中！#n老師當然也包含在內哦！"
1010706-135 = "所以我會把封面換成其他照片！"
1010706-136 = "呵呵，那能請老師幫我尋找靈感嗎？"
1010706-137 = "只要跟老師待在一起，感覺就能拍出更好的照片呢～！"
1010706-138 = "[s]「好啊，我陪你一起想想，順便醒醒腦吧。」"
1010706-139 = "好耶～謝謝老師！"
1010706-141 = "（之後便和千秋在夏萊各處閒晃，一起尋找報導的題材）"

[translation]
1010706-1 = "การค้นคว้าของเลขา"
1010706-5 = "สวัสดีค่ะ~!"
1010706-6 = "[s] \"สวัสดี จิอากิ\""
1010706-7 = "วันนี้คุณครูเป็นยังไงบ้างคะ?"
1010706-8 = "เมื่อคืนนอนหลับสบายมั้ยคะ? ไม่ได้เจ็บป่วยตรงไหนใช่มั้ย?"
1010706-9 = "[s1] \"อืม ครูปกติดี ทำไมเหรอ...?\"\n[s2] \"ทำไมจู่ๆ ก็ถามเรื่องสุขภาพล่ะ?\""
1010706-12 = "แหะๆ ที่จริงแล้วน่ะ~"
1010706-13 = "ที่ถามก็เพราะสกู๊ปข่าวพิเศษใน <แพนเดโมเนียม โซไซตี้รายสัปดาห์> น่ะค่ะ~"
1010706-14 = "พอดีว่าฉันต้องการความช่วยเหลือจากคุณครูหน่อย!"
1010706-15 = "[s] \"ความช่วยเหลือเหรอ? คาเฟ่ของหวานอีกหรือเปล่า?\""
1010706-19 = "[ns] \"แต่ครูกินของหวานอีกไม่ไหวแล้วนะ\""
1010706-20 = "อะฮ่าฮ่า! ไม่ใช่อย่างนั้นหรอกค่ะ!"
1010706-21 = "ที่จริงฉันลองคิดพาดหัวข่าวพิเศษสำหรับ <แพนเดโมเนียม โซไซตี้รายสัปดาห์> ฉบับถัดไปไว้น่ะ~!"
1010706-22 = "และนั่นก็คือ <รายงานสดจากภาคสนาม! ปฏิบัติการลอบเข้าชาเล่ต์!> ค่ะ"
1010706-23 = "[s] \"ปฏิบัติการ... ลอบเข้า... ชาเล่ต์?\""
1010706-24 = "แหะๆ ใช่แล้วค่ะ!"
1010706-25 = "คุณครู [USERNAME] จากชาเล่ต์ที่กำลังเป็นประเด็นร้อน!"
1010706-26 = "มาดูกันว่าหนึ่งวันของคุณครูในชาเล่ต์จะเป็นยังไงบ้าง!"
1010706-27 = "เป็นยังไงคะ? แค่ได้ฟังพาดหัวข่าวก็อยากอ่านเนื้อหาแล้วใช่มั้ยคะ~?"
1010706-28 = "[s] \"อืม...\""
1010706-29 = "อ๊ะ วันนี้ฉันมาที่นี่เพราะมาเข้าเวร ถ้าทำแบบนี้ก็ถือว่าไม่มีจรรยาบรรณของนักข่าวใช่มั้ยคะ?"
1010706-30 = "ฉันจะไม่ทำอะไรโดยไม่ได้รับความเห็นชอบจากคุณครูหรอกค่ะ!"
1010706-31 = "ไว้ค่อยคิดสกู๊ปพิเศษเรื่องอื่นทีหลังก็ได้ คุณครูค่อยๆ ตัดสินใจก็ได้ค่ะ ไม่ต้องกดดันนะคะ!"
1010706-32 = "[s] \"ไม่หรอก เรื่องเก็บข้อมูลน่ะครูไม่ว่าอยู่แล้ว\""
1010706-33 = "จริงเหรอคะ? ขอบคุณค่ะ!"
1010706-34 = "ว่าแต่มีปัญหาเรื่องอื่นเหรอคะ?"
1010706-35 = "[s] \"มันก็ไม่เชิงเป็นปัญหาหรอกนะ แต่ว่า...\""
1010706-37 = "[ns3] \"เก็บข้อมูลจากครูไปก็คงไม่มีอะไรน่าสนุกน่ะ\"\n[ns4] \"ครูทำงานเหมือนกันทุกวัน ไม่มีอะไรน่าสนใจหรอก\""
1010706-41 = "ถ้าเป็นเรื่องนั้นไม่ต้องกังวลเลยค่ะ~! คุณครูไม่รู้เหรอคะว่าฉันเป็นใคร!"
1010706-42 = "โมโตมิยะ จิอากิ ผู้เป็นถึงเลขานุการแพนเดโมเนียม โซไซตี้ที่เป็นสภานักเรียนแห่งสถาบันเกเฮนน่า#nที่ยิ่งใหญ่ ทั้งยังเป็นนักข่าว บรรณาธิการ และผู้ตีพิมพ์นิตยสารแพนเดโมเนียม โซไซตี้รายสัปดาห์!"
1010706-43 = "ไม่ว่าจะไปที่ไหนก็หาสิ่งที่น่าสนใจมาเขียนข่าวได้ตลอดค่ะ!"
1010706-44 = "[s] \"อืม... ถ้างั้นอยากให้ครูช่วยทำอะไรดีล่ะ?\""
1010706-45 = "มะ... ไม่เลยค่ะ! คุณครูแค่ใช้ชีวิตตามปกติเหมือนทุกวันก็พอค่ะ!"
1010706-46 = "การหาอะไรไปเขียนข่าวน่ะ ให้เป็นหน้าที่ของฉันเองค่ะ!"
1010706-47 = "อีกอย่าง ท่าทางที่เป็นธรรมชาติจะดูน่าสนใจมากกว่าท่าทางที่ปั้นแต่งขึ้นมาด้วยค่ะ!"
1010706-48 = "[s] \"อืม งั้นก็ได้...\""
1010706-49 = "ค่ะ! สรุปว่าคุณครูอนุญาตให้ฉันค้นคว้าและเก็บข้อมูลใช่มั้ยคะ?"
1010706-50 = "ฉันอยากเริ่มตั้งแต่การถ่ายรูปในชาเล่ต์เลย ขอฉันถ่ายรูปได้มั้ยคะ~?"
1010706-51 = "[s] \"อื้อ ได้เต็มที่เลย\""
1010706-52 = "ขอบคุณค่ะ~!"
1010706-54 = "(คุณครูปล่อยให้จิอากิถ่ายรูปเพื่อเก็บข้อมูล จากนั้นก็ไปเริ่มทำงานที่เร่งด่วนของตัวเอง)"
1010706-63 = "โอ้โห เก้าอี้ของชาเล่ต์ใช้ยี่ห้อนี้เหรอเนี่ย~ หนีตาเหยี่ยวของฉันไม่พ้นหรอกค่ะ!"
1010706-64 = "แม้ว่าเรื่องแค่นี้จะเอาไปเขียนสกู๊ปข่าวไม่ได้ก็เถอะ..."
1010706-65 = "อ๊ะ! อาจจะมีอะไรสนุกๆ ซ่อนอยู่ใต้โซฟานี้ก็ได้นะ?"
1010706-71 = "อืม... มีแต่ฝุ่นนะคะเนี่ย..."
1010706-72 = "อ๊ะ ตรงนั้นมีจอยเกมด้วย?! แบบนี้ก็อาจจะได้รู้รสนิยมการเล่นเกมของคุณครูนะ!"
1010706-73 = "คะ? นักเรียนคนก่อนที่มาเข้าเวรลืมไว้งั้นเหรอคะ? อย่างนี้นี่เอง..."
1010706-74 = "อืม ยังไม่มีอะไรที่น่าสนใจเป็นพิเศษเลย..."
1010706-75 = "[s] \"ครูบอกแล้วไงว่าไม่มีอะไรน่าสนุกหรอก...\""
1010706-76 = "ตะ... แต่ฉันก็ไม่ยอมแพ้หรอกค่ะ!"
1010706-78 = "(หลังจากนั้นไม่นาน...)"
1010706-80 = "ขอโทษที่มาชวนคุยระหว่างทำงานนะคะ..."
1010706-81 = "ปกติแล้วคุณครูนั่งทำงานแบบนี้ทั้งวันเลยเหรอคะ...?"
1010706-82 = "[s] \"วันนี้มีเอกสารที่ต้องเคลียร์ให้เสร็จเยอะน่ะ\""
1010706-83 = "อืม... ขืนเป็นอย่างนี้ต่อไป สกู๊ปข่าวพิเศษมันก็คงไม่พิเศษ บางทีอาจจะน่าสนุกน้อยกว่าสกู๊ปข่าวทั่วๆ ไปด้วย..."
1010706-84 = "ระ... หรือว่าต้องเปลี่ยนหัวข้อจริงๆ...?"
1010706-85 = "ดีละ ฉันจะกระตุ้นสัญชาตญาณนักข่าว!"
1010706-86 = "แล้วค้นคว้าหาข้อมูลไปทำสกู๊ปพิเศษอีกครั้งค่ะ...!"
1010706-89 = "(หลายชั่วโมงต่อมา...)"
1010706-93 = "[ns] \"อืมม...\""
1010706-100 = "― [log=치아키]อะฮ่าฮ่า! ได้จังหวะกดชัตเตอร์แล้ว![/log][wa:2230] "
1010706-103 = "― [log=치아키]หน้าคุณครูตอนสัปหงก! เหมาะเอาขึ้นปกฉบับหน้าเลยละค่ะ~![/log][wa:2100] "
1010706-106 = "― [log=치아키]เตรียม <แพนเดโมเนียม โซไซตี้รายสัปดาห์> ฉบับพิเศษเสร็จแล้ว![/log][wa:1260] "
1010706-109 = "― [log=치아키]จิอากิคนนี้ทำสกู๊ปพิเศษได้อีกแล้วนะคะ~![/log][wa:2110] "
1010706-112 = "[ns] \"เข้าไปอยู่ถึงใต้โต๊ะเลยเหรอ ซนจริงๆ!\""
1010706-114 = "― [log=치아키]ฮุฮุ! อย่าดูถูกความสามารถของเลขานุการสิคะ! [/log][wa:1680] "
1010706-117 = "― [log=치아키]จริงด้วย! ในเมื่อเป็นอย่างนี้ ก็ขุดคุ้ยความลับของคุณครูเลยดีมั้ยนะ...?[/log][wa:1240] "
1010706-119 = "― [log=치아키]อย่างเช่นความลับที่ว่า ถุงเท้าเป็นรู...![/log][wa:1950] "
1010706-122 = "― [log=치아키]คะ?! เด็กซุกซนจะถูกลงโทษให้โดนขังไว้ใต้โต๊ะ งั้นเหรอคะ...?![/log][wa:600] "
1010706-125 = "― [log=치아키]ขะ... ขอโทษค่ะ~! ปล่อยฉันออกไปเถอะค่ะ~![/log][wa:2300] "
1010706-128 = "อึก... ใช้ไม่ได้เลยนะคะที่แกล้งกันจนฉันเก็บข้อมูลไม่ได้"
1010706-129 = "เกือบโดนขังอยู่ใต้โต๊ะแล้วมั้ยล่ะ..."
1010706-130 = "[s] \"จะเอาหน้าครูตอนสัปหงกไปลงนิตยสารจริงเหรอ?\""
1010706-131 = "ฮุฮุ ก็คิดไว้ว่าอย่างนั้นนะ~"
1010706-132 = "......"
1010706-133 = "แต่เดี๋ยวเอารูปอื่นมาใช้แทนค่ะ~!"
1010706-134 = "ฉันอยากให้ผู้อ่าน <แพนเดโมเนียม โซไซตี้รายสัปดาห์> อ่านแล้วสนุกเหมือนกับที่ฉันจัดทำมัน#nขึ้นมาน่ะค่ะ! และคุณครูก็เป็นหนึ่งในผู้อ่านด้วยนี่คะ!"
1010706-135 = "งั้นฉันจะใช้รูปอื่นมาขึ้นปกค่ะ!"
1010706-136 = "ฮุฮุ ว่าแต่ช่วยกันหารูปได้มั้ยคะ?"
1010706-137 = "ถ้าอยู่กับคุณครูละก็ ฉันว่าฉันน่าจะถ่ายรูปได้ดีกว่าปกติน่ะค่ะ~"
1010706-138 = "[s] \"ได้สิ ไปหาอะไรถ่ายรูปแก้ง่วงก็ดีเหมือนกัน\""
1010706-139 = "เย้~ ขอบคุณค่ะ!"
1010706-141 = "(จากนั้นคุณครูกับจิอากิก็หาข้อมูลสำหรับนิตยสารฉบับใหม่ในชาเล่ต์ด้วยกัน)"

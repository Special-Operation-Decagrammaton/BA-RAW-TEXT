[translation]
1010706-1 = "The Secretary's Investigation"
1010706-5 = "Hello!"
1010706-6 = "[s] \"Hi, Chiaki.\""
1010706-7 = "How are you feeling today, Sensei?"
1010706-8 = "Did you sleep well last night? You're not sick or anything, are you?"
1010706-9 = "[s1] \"I'm fine...\"\n[s2] \"Why do you ask?\""
1010706-12 = "Heehee, well..."
1010706-13 = "It's because of this new Weekly Pandemonium Society's feature I'm working on!"
1010706-14 = "...And I really need your help with it, Sensei!"
1010706-15 = "[s] \"Help...eating more desserts?\""
1010706-19 = "[ns] \"I don't know if my stomach can handle more desserts right now.\""
1010706-20 = "Ahaha! No, no, not that!"
1010706-21 = "I was actually thinking about the headline for the next Weekly Pandemonium Society feature article!"
1010706-22 = "How does this sound: \"On-site Reportage! Schale Undercover Mission!\""
1010706-23 = "[s] \"Schale...Undercover...Mission?\""
1010706-24 = "Heehee, correct!"
1010706-25 = "Schale's [USERNAME] Sensei, the celebrity everyone's talking about!"
1010706-26 = "An up-close-and-personal report of Sensei's day at Schale!"
1010706-27 = "What do you think? That title just reaches out and grabs you, right?"
1010706-28 = "[s] \"Umm...\""
1010706-29 = "I mean, I'm here as a student rep today, and I DO have a code of journalistic ethics."
1010706-30 = "I wouldn't write this story without your permission, of course!"
1010706-31 = "No pressure or anything. If it's a no-go, I can always find something else to write about."
1010706-32 = "[s] \"Well, I don't mind the coverage, but...\""
1010706-33 = "Really? Sweet, thank you!"
1010706-34 = "...\"But\"? Is there a problem?"
1010706-35 = "[s] \"Not exactly a problem, but...\""
1010706-37 = "[ns3] \"You're going to get bored writing it.\"\n[ns4] \"I mainly just sit here and work every day.\""
1010706-41 = "Don't worry about that! Who do you think I am?"
1010706-42 = "I'm Motomiya Chiaki, the secretary of Gehenna Academy's student council, Pandemonium Society, and \"Weekly Pandemonium Society's\" reporter-editor-publisher!"
1010706-43 = "No matter the place, there's always news going on!"
1010706-44 = "[s] \"Um...should I be doing something, then?\""
1010706-45 = "No, not at all! Just act normal!"
1010706-46 = "It's my job to FIND the news!"
1010706-47 = "And acting normal is how you make the most interesting stuff happen!"
1010706-48 = "[s] \"Well, if you say so...\""
1010706-49 = "Yup! So I've got your permission for this, right?"
1010706-50 = "Is it okay if I go around and take a few pictures of Schale?"
1010706-51 = "[s] \"Sure, as much as you like.\""
1010706-52 = "Thanks!"
1010706-54 = "I left Chiaki to it and got started on some urgent work."
1010706-63 = "Ah, I'd recognize this brand of chairs anywhere. You can't slip anything past me, Schale!"
1010706-64 = "Hmm, I need more than that for a news article, though..."
1010706-65 = "Hup! Maybe there's something interesting under the sofa!"
1010706-71 = "Umm... Nope, just dust..."
1010706-72 = "Ah, this is a gamepad?! Maybe I can find out what kind of games Sensei likes!"
1010706-73 = "Huh? It's not yours, one of the other student reps left it here? I see..."
1010706-74 = "Mmm, good news is hard to find sometimes..."
1010706-75 = "[s] \"Told you this wouldn't be exciting...\""
1010706-76 = "I-I won't give up, though!"
1010706-78 = "Moments later..."
1010706-80 = "Hey, Sensei? I'm sorry to bother you at work..."
1010706-81 = "But do you usually just sit there and type all day?"
1010706-82 = "[s] \"I happen to have a lot of urgent deadlines today.\""
1010706-83 = "Ugh, this is turning into my worst article ever."
1010706-84 = "M-Maybe I should find a different topic?"
1010706-85 = "Ha, my razor-sharp reporter's instincts..."
1010706-86 = "...will always find the most amazing exclusives!"
1010706-89 = "A few hours later..."
1010706-93 = "[ns] \"Zzz...\""
1010706-100 = "― [log=치아키]Ahaha! Yes! Got it! Perfect shot! [/log][wa:2230] "
1010706-103 = "― [log=치아키]Sensei's dozing face! It'll be great for next issue's cover![/log][wa:1820] "
1010706-106 = "― [log=치아키]That's a wrap for this special issue of \"Weekly Pandemonium Society!\"[/log][wa:860] "
1010706-109 = "― [log=치아키]I, Chiaki, have scored myself yet another exclusive report![/log][wa:1310] "
1010706-112 = "[ns] \"By crawling under my desk.\""
1010706-114 = "― [log=치아키]Heehee! Never underestimate a secretary's resolve![/log][wa:1400] "
1010706-117 = "― [log=치아키]Ooh! Maybe while I'm at it, I can find out your secrets too...![/log][wa:1520] "
1010706-119 = "― [log=치아키]Like, why do you have holes in your socks?[/log][wa:1870] "
1010706-122 = "― [log=치아키]What?! Your secret is you lock naughty students up under your desk...?[/log][wa:160] "
1010706-125 = "― [log=치아키]I-I'm sorry! Please forgive me![/log][wa:2620] "
1010706-128 = "Ugh... Undercover work is dangerous sometimes..."
1010706-129 = "I could have been locked up for that..."
1010706-130 = "[s] \"Are you really going to put my sleepy face on the cover?\""
1010706-131 = "Heehee, well, I WAS going to..."
1010706-132 = "..."
1010706-133 = "...but I can use something else!"
1010706-134 = "As much as I enjoy making \"Weekly Pandemonium Society,\" I want the readers to enjoy it! And that includes you, Sensei!"
1010706-135 = "So yeah, I'll find a better picture!"
1010706-136 = "Heehee, actually, maybe you could help me find it?"
1010706-137 = "I think I'd have better luck with you around."
1010706-138 = "[s] \"Yeah, it'll help me stay up too. Let's go see what's happening out there.\""
1010706-139 = "Yay! Thank you!"
1010706-141 = "Afterwards, Chiaki and I visited various places around Schale, looking for stories."

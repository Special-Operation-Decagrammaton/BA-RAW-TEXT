[translation]
10025105-2 = "RABBIT 1 เคลียร์ท้ายเรือเรียบร้อย"
10025105-3 = "RABBIT 2 เคลียร์หัวเรือเรียบร้อย"
10025105-4 = "RA... RABBIT 4...... เคลียร์หอบังคับการเรือเรียบร้อย"
10025105-5 = "ปลดอาวุธศัตรูทุกคนบนเรือและเอาปัจจัยอันตรายออกเรียบร้อย..."
10025105-6 = "...สิ้นสุดปฏิบัติการ ทุกคนทำได้ดีมากค่ะ!"
10025105-11 = "อะ... อะไรกัน? ไม่ให้ฉันออกโรงเลยเหรอ?"
10025105-12 = "ไม่ทัน RABBIT 2 แล้วละนะ"
10025105-13 = "ศัตรูพวกนี้อ่อนเกินไป อุ่นเครื่องยังไม่ทันเสร็จดีเลยก็ยอมจำนนกันหมดแล้ว ฉันเองก็เสียดายอยู่#nเหมือนกัน..."
10025105-14 = "ฉันต่างหากที่ต้องพูดแบบนั้น! อุตส่าห์ลนลานไปหามิสไซล์เรือรบมาเพื่อปฏิบัติการบนเรือ แต่ก็ไม่ได้#nยิงสักนัดเลย..."
10025105-20 = "นี่ RABBIT 2 ฉันขอลองยิงมิสไซล์เรือรบสักนัดไม่ได้เหรอ?"
10025105-21 = "แค่นัดเดียวก็น่าจะทำให้เรือจมได้แล้วละ..."
10025105-22 = "พูดอะไรของเธอ! ถ้าเรือลำนี้จม เราก็จมไปด้วยนะ ลืมไปแล้วเหรอว่าเรายังอยู่บนเรือนี้กันอยู่น่ะ?!"
10025105-28 = "... พวกเธอคือนักเรียนจากสถาบันพิเศษ SRT งั้นเหรอ?"
10025105-29 = "อ่า คือ... คือว่า..."
10025105-30 = "... ต้องขอโทษด้วยจริงๆ นะคะ"
10025105-31 = "พวกฉันมารวบรวมข้อมูลก็จริงค่ะ แต่สุดท้ายมันกลับกลายเป็นว่าพวกฉันต้องหลอกทุกคนที่นี่"
10025105-32 = "ไม่หรอก ฉันไม่ได้ไม่พอใจเรื่องนั้นหรอก ฉันก็แค่..."
10025105-33 = "แค่อายที่จะต้องไปขอความช่วยเหลือจากคนนอกให้มาแก้ปัญหาในหมู่บ้านน่ะ"
10025105-37 = "...ไม่หรอกค่ะ นี่ไม่ใช่ปัญหาของแค่หมู่บ้านยาโตอูระหรอกนะคะ"
10025105-38 = "หมายความว่ายังไงน่ะ?"
10025105-39 = "หมู่บ้านแห่งนี้เป็นส่วนหนึ่งของคิโวทอส เพราะแบบนั้น ปัญหาที่เกิดขึ้นที่นี่จึงเป็นปัญหาที่ทุกคนใน#nคิโวทอสต้องช่วยแก้ไขไปด้วยกันค่ะ"
10025105-40 = "เพราะงั้นต่อไปนี้หากเกิด 'ปัญหาของคิโวทอส' ขึ้นอีก ก็ไม่ต้องรีรออะไรนะคะ มาหาพวกฉันชาว SRT ได้เลยค่ะ"
10025105-41 = "พวกฉันยินดีจะช่วยเหลือทุกเมื่อเลยค่ะ"
10025105-42 = "สถาบันพิเศษ SRT งั้นเหรอ..."
10025105-43 = "...ก็ได้ ฉันจะจำชื่อนี้ไว้ให้ขึ้นใจเลย"
10025105-44 = "...ค่ะ!"
10025105-50 = "จะว่าไป แล้วเรื่องการส่งตัวผู้ต้องสงสัย..."
10025105-51 = "เรื่องนั้นเราจะเป็นคนจัดการเองค่ะ!"
10025105-52 = "การส่งตัวอาชญากรจากเหตุที่เกิดขึ้นที่นี่เป็นหน้าที่ของพวกฉัน..."
10025105-53 = "ถึงอาจจะมีการเข้าใจผิดได้บ้าง แต่นี่ก็น่าจะสร้างความดีความชอบได้ไม่น้อยเลยค่ะ"
10025105-55 = "...นั่นสินะคะ ถ้างั้นก็ฝากที่เหลือด้วยนะคะ"
10025105-57 = "อะ... เอ่อ คือว่า..."
10025105-64 = "... คุมะไก"
10025105-65 = "ลากตัวหมอนี่ไปรับโทษตามวิถีของหมู่บ้านยาโตอูระ"
10025105-67 = "ดะ... เดี๋ยวก่อนสิครับ ตามวิถีของหมู่บ้านยาโตอูระงั้นเหรอ มันคืออะไร...?"
10025105-69 = "อ้อ วิถีของเราน่ะ มันก็..."
10025105-70 = "ไม่ต้องไปบอกหรอก เปลืองพลังงานเปล่าๆ คนอย่างหมอนั่นไม่สมควรรู้ข้อมูลของหมู่บ้านเรา"
10025105-72 = "ตะ... แต่อย่างน้อยผมก็ควรจะได้รู้สิว่าจะเกิดอะไรขึ้นกับตัวเอง—"
10025105-78 = "ก็นั่นแหละ เรื่องที่แกก่อเรื่องไว้กับหมู่บ้านนี้"
10025105-80 = "นั่งจินตนาการในความมืดและหวาดกลัวให้ตัวสั่นไปเลยว่าตัวเองจะต้องเจออะไรบ้าง"
10025105-85 = "เพราะความกลัวที่ยาวนานและร้ายแรงที่สุดมาจากความไม่รู้ไงล่ะ"

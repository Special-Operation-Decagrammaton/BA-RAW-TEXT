[translation]
10025105-2 = "RABBIT 1 reporting. Fore deck secure."
10025105-3 = "RABBIT 2 reporting. Aft deck secure."
10025105-4 = "RABBIT 4 reporting. Bridge secure."
10025105-5 = "All hostiles have been neutralized."
10025105-6 = "...Mission complete. Good job!"
10025105-11 = "Hold on. You didn't leave any for me!"
10025105-12 = "You were too late."
10025105-13 = "These enemies were nothing special. I was just getting warmed up, too..."
10025105-14 = "Hmph. I didn't even get to try out my new anti-ship missiles..."
10025105-20 = "Um, RABBIT 2... It wouldn't hurt if I fired just ONE anti-ship missile, would it?"
10025105-21 = "I hear it only takes one to scuttle a ship..."
10025105-22 = "Hey! You realize we're still on the ship, right?"
10025105-28 = "...So, you kids are SRT?"
10025105-29 = "Ah. Yes. Well..."
10025105-30 = "I'm sorry..."
10025105-31 = "We didn't want to deceive you. We were just here to investigate..."
10025105-32 = "Oh, I don't care that you didn't pour your hearts out to me. It's just..."
10025105-33 = "It's a shame we had to turn to outsiders to solve our village's problems."
10025105-37 = "No. This wasn't just a problem for Yatoura Village."
10025105-38 = "How do you figure?"
10025105-39 = "This village is part of Kivotos. A problem that happens here is one that we all need to solve together."
10025105-40 = "So if you ever have another Kivotos-sized problem in the future, please don't hesitate to contact SRT Academy."
10025105-41 = "We are always happy to help."
10025105-42 = "SRT, huh..."
10025105-43 = "All right. I'll keep that name in mind."
10025105-44 = "Great!"
10025105-50 = "By the way, about our suspect here..."
10025105-51 = "We can take him from here!"
10025105-52 = "Holding and transferring prisoners is one of our duties, after all..."
10025105-53 = "Besides, this was a big bust. It'll look great on our performance reviews."
10025105-55 = "I see. We'll leave the clean-up to you, then."
10025105-57 = "What're you gonna do with me...?"
10025105-64 = "Hey, Kumagai."
10025105-65 = "Let's show this fella some good old fashioned Yatoura hospitality."
10025105-67 = "H-Hold on... What's this hospitality...?"
10025105-69 = "Well, y'see, first—"
10025105-70 = "Don't tell him. Let him stew for a bit."
10025105-72 = "B-But I need to know so I can—"
10025105-78 = "You're going to experience exactly what you put us through."
10025105-80 = "Imagine the worst. Let the fear soak in. Agonize in the dark about what'll happen to you."
10025105-85 = "There's nothing more terrifying than ignorance, after all."

[translation]
10025105-2 = "RABBIT1，艦尾清理完畢。"
10025105-3 = "RABBIT2，艦首清理完畢。"
10025105-4 = "R，RABBIT4……艦橋清理完畢。"
10025105-5 = "已排除船內所有敵對人員的戰鬥力和危險因素。"
10025105-6 = "……作戰到此結束，大家都辛苦了！"
10025105-11 = "什，什麼，沒有我出手的機會嗎？"
10025105-12 = "動作真慢啊，RABBIT3。"
10025105-13 = "敵人實在太弱，都還沒暖身完就結束了，有點遺憾啊……"
10025105-14 = "那是我該說的話吧！#n你們說要進行登船作戰，我還特別準備了反艦導彈的說……"
10025105-20 = "我說RABBIT2……能不能射一發反艦導彈？"
10025105-21 = "應該一發就能擊沉了……"
10025105-22 = "在胡說什麼！我們也還在船上啊！？"
10025105-28 = "……你們剛才說，是SRT特殊學園的學生對吧？"
10025105-29 = "啊，是的……那個……"
10025105-30 = "……非常抱歉。"
10025105-31 = "雖然是為了調查，但從結果來說依然欺騙了大家。"
10025105-32 = "不，我沒有要你們道歉的意思。"
10025105-33 = "明明是村子的問題……卻得借助外地朋友的力量才能解決，真是沒臉見人。"
10025105-37 = "不……這不只是夜戶浦村的問題。"
10025105-38 = "怎麼說？"
10025105-39 = "這個村子也是奇普托斯的一部分。#n換言之，這裡發生的問題也是奇普托斯的問題。"
10025105-40 = "所以，如果「奇普托斯」又發生了什麼問題，請聯絡我們SRT特殊學園吧。"
10025105-41 = "我們將隨時為各位效勞。"
10025105-42 = "SRT特殊學園啊……"
10025105-43 = "……感謝你們。#n這份恩情，老夫沒齒難忘。"
10025105-44 = "……是！"
10025105-50 = "話說回來，關於該如何處置這個嫌犯……"
10025105-51 = "交給我們來處理吧！"
10025105-52 = "畢竟是在我們的管轄區域發生的事件。"
10025105-53 = "雖然不知道該不該這麼說，不過……這是難得能提升績效的機會。"
10025105-55 = "……這樣啊。#n那麼後續就拜託了。"
10025105-57 = "那，那個，我──"
10025105-64 = "……熊谷。"
10025105-65 = "把這傢伙帶走，讓他見識見識夜戶浦流的作法。"
10025105-67 = "等，等等……夜戶浦流是……？"
10025105-69 = "那就是──"
10025105-70 = "不必告訴他……他很快就會知道了。"
10025105-72 = "至，至少讓我知道自己會有什麼下場──"
10025105-78 = "總算明白了嗎？那就是恐懼啊。"
10025105-80 = "你就在不知道會落得什麼下場的狀況下儘管害怕、受苦吧。"
10025105-85 = "有句話說最古老、最強烈的恐懼……就是來自於無知啊。"

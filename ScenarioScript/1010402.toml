[translation]
1010402-1 = "#title;일과"
1010402-2 = "#all;hide"
1010402-3 = "#na;(아침 일찍, 레이죠가 알려 준 장소로 향했다…….)"
1010402-4 = "#na;(그러자…….)"
1010402-5 = "#all;hide"
1010402-6 = "#all;hide"
1010402-7 = "#wait;20667"
1010402-8 = "#clearST"
1010402-9 = "#st;[-1200,-530];serial;60;[wa:1030]― [log=레이죠]아, [wa:1340]와 주셨군요.[/log]"
1010402-10 = "#st;[-1200,-630];serial;60;[wa:3400]― [log=레이죠]조금만 있으면 아침 수련 과정이 끝나니, [wa:1700]잠시 기다려 주시겠습니까?[/log]"
1010402-11 = "#wait;9740"
1010402-12 = "#clearST"
1010402-13 = "#st;[-1200,-530];serial;60;[wa:1330]― [log=레이죠]사실 이것도, [wa:1270]연속된 동작의 일부입니다.[/log]"
1010402-14 = "#st;[-1200,-630];serial;60;[wa:2950]― [log=레이죠]흐름을 멈추고, [wa:1150]자세를 유지하는 것도.[/log]"
1010402-15 = "#wait;2240"
1010402-16 = "#clearST"
1010402-17 = "#st;[-1200,-530];serial;60;― [log=레이죠]정신을 단련하는 데에 도움이 되지 않을까, [wa:2180]해서요…….[/log]"
1010402-18 = "#wait;9610"
1010402-19 = "#clearST"
1010402-20 = "#st;[-1200,-530];serial;60;[wa:2050]― [log=레이죠]……그런데, [wa:790]선생님은 [wa:750]왜 거기에 계시는 건가요……?[/log]"
1010402-21 = "#wait;8520"
1010402-22 = "#clearST"
1010402-23 = "#st;[-1200,-530];serial;60;[wa:370]― [log=레이죠]네? [wa:930]수행중이라면――[/log]"
1010402-24 = "#st;[-1200,-630];serial;60;[wa:1840]― [log=레이죠]주위의 시선에 동요하지 말고, [wa:1550]평정심을 유지해야 한다……?[/log]"
1010402-25 = "#wait;3440"
1010402-26 = "#clearST"
1010402-27 = "#st;[-1200,-530];serial;60;― [log=레이죠]그건, [wa:1410]분명히 [wa:1290]그렇습니다만…….[/log]"
1010402-28 = "#wait;10180"
1010402-29 = "#clearST"
1010402-30 = "#st;[-1200,-530];serial;60;[wa:450]― [log=레이죠]……윽, [wa:700]여, [wa:480]역시 이건, [wa:1260]무리입니다……![/log]"
1010402-31 = "#wait;9280"
1010402-32 = "#clearST\n#all;hide"
1010402-33 = "#na;(수련을 끝낸 레이죠에게, 잠시동안 차가운 눈초리를 받고 말았다…….)"
1010402-34 = "#all;hide"
1010402-35 = "3;레이죠;11;으음…… 역시 제 쿵후 수련을 남에게 보이는 것은, 조금 부끄럽다는 생각이 드는군요.\n#3;a\n#3;em;[///]"
1010402-36 = "3;레이죠;14;……특히 오늘의 부끄러움에는, 조금 다른 요소도 포함되어 있는 것 같기도 했습니다만!"
1010402-37 = "[s1] \"레, 레이죠는 정말 성실하구나!\"\n[s2] \"나는 아침 체조도 잘 못하는데!\""
1010402-38 = "#wait;10"
1010402-39 = "#wait;10"
1010402-40 = "3;레이죠;12;어쩐지, 미묘하게 화제를 전환하려 하시는 것 같은데 말입니다……."
1010402-41 = "3;레이죠;02;네? 기분 탓일 거라고요? 선생님이 학생을 믿는 것만큼, 학생도 선생님을 믿어 주면 좋겠다고요……?\n#3;em;[?]"
1010402-42 = "3;레이죠;03;알겠습니다. 선생님께서 그렇게 말씀하신다면……."
1010402-43 = "3;레이죠;15;생각해 보면 선생님께 이 자리를 알려 드린 건, 결국 저이기도 했고요.\n#fontsize;50\n#3;em;[...]"
1010402-44 = "3;레이죠;03;아뇨. 저라고 해서 매일 아침마다 수련을 계속하는 것은 아닙니다."
1010402-45 = "3;레이죠;16;기본적으로 주말에는 쉬고 있고, 비가 오거나 눈이 오는 것처럼 '불가피한' 일이 발생하면, '어쩔 수 없이' 수련을 건너뛰기도 하죠."
1010402-46 = "[s] \"그래도, 좋아하는 일이 있다는 건 멋진 거 아닐까.\""
1010402-47 = "3;레이죠;02;좋아하는 일, 입니까……."
1010402-48 = "3;레이죠;01;아, 아뇨. 별일은 아닙니다. 그저……."
1010402-49 = "3;레이죠;02;선생님께서는 무술을 수련한다는 것을, 별로 이상하게 여기시지 않는 것 같아서요.\n#3;em;[반응]"
1010402-50 = "3;레이죠;04;네? 아하…… 선생님은 따지고 보면 키보토스 바깥에서 오셨으니까……."
1010402-51 = "#st;[0,0];instant;1;"
1010402-52 = "#clearST"
1010402-53 = "3;레이죠;01\n#3;em;[...]\n#wait;2500"
1010402-54 = "3;레이죠;02;네. 키보토스에서 무술을 수련한다는 것 자체가 독특하다는 것은, 사실입니다."
1010402-55 = "3;레이죠;01;애초에 그다지 쓸 데가 거의 없죠. 무슨 일이라도 난다면, 멀리서 총으로 몇 발 쏘아붙이면 대부분 해결되기도 하고요."
1010402-56 = "3;레이죠;11;사실상 아침 체조와 본질적으로는 거의 구분이 되지 않는 지경인 것이 사실입니다만…….\n#3;em;[땀]"
1010402-57 = "[s] \"하지만 레이죠는 앞으로도 계속 수련할 거지?\""
1010402-58 = "3;레이죠;02;예, 아니오라고만 물으시면…… '예' 쪽에 가깝다고밖에 말씀드릴 수 없겠네요.\n#3;em;[반응]"
1010402-59 = "3;레이죠;99;그렇군요. 제가 이렇게까지 쿵후 수련을 계속하는 이유라고 한다면……."
1010402-60 = "3;레이죠;02;우선, 심신 수양에 도움이 된다고 느끼고 있기 때문일 것 같습니다."
1010402-61 = "3;레이죠;16;몸을 움직이다 보면 생각도 가라앉고, 머리도 맑아지고, 아무튼 체력도 길러지니까요."
1010402-62 = "3;레이죠;11;상회 일, 생각보다 이래저래 힘들거든요. 거기에 틈틈이 공부도 해야 하고, 시험은 매번 돌아오고…….\n#3;em;[속상함]"
1010402-63 = "3;레이죠;04;네? 제 성적…… 이요?"
1010402-64 = "#st;[0,0];instant;1;"
1010402-65 = "#clearST"
1010402-66 = "3;레이죠;04\n#3;em;[...]\n#wait;2500"
1010402-67 = "3;레이죠;12;그걸 꼭 지금 물으셔야겠습니까……?"
1010402-68 = "3;레이죠;16;아무튼, 그렇습니다. 쿵후에는 이런저런 멋진 점이 있으니까요."
1010402-69 = "3;레이죠;18;그리고 무엇보다, 전해지는 어록들이 정말 마음에 들거든요!\n#3;em;[반짝]"
1010402-70 = "3;레이죠;13;가령 저는, '인내란 소극적이고 무기력한 것이 아니라 적극적이고 강렬한 것'이라는 말을 정말 좋아합니다."
1010402-71 = "3;레이죠;03;그건 정말 뭔가를 참아 보지 않은 사람은 공감할 수 없는 말이거든요! 예를 들어 현룡문 녀석들의 생떼같은 트집 같은 거 말이죠!\n#3;em;[!]"
1010402-72 = "[s] \"지, 진정하자…….\""
1010402-73 = "3;레이죠;18;그리고 '실수는 그리 대단한 것이 아니다. 그것을 인정할 수 있는 용기만 있다면.'이라는 말도 멋지죠!"
1010402-74 = "#all;hide"
1010402-75 = "#na;(그 뒤로도 레이죠는, 한참이나 즐거운 표정으로 쿵후에 대해 이야기했다.)"
1010402-76 = "#all;hide"
1010402-77 = "3;레이죠;06;음. 죄송합니다. 선생님. 조금이지만 새삼 부끄러워지는군요. 저 혼자서만 너무 이야기한 것도 같고요…….\n#3;a\n#3;em;[///]"
1010402-78 = "[s3] \"그런데, 그렇게 쿵후가 좋다면.\"\n[s4] \"그런 동아리에 들어가는 게 더 좋지 않을까?\""
1010402-79 = "#wait;10"
1010402-80 = "#wait;10"
1010402-81 = "3;레이죠;02;네? 무술연구부나 현대무도부 같은 곳 말씀이십니까? 물론 그런 동아리도 분명히 있습니다만…….\n#3;em;[?]"
1010402-82 = "3;레이죠;15;그렇지만, 조금 이상한 말씀을 하시는군요. 선생님."
1010402-83 = "3;레이죠;07;쿵후는 당연히 음식점 종업원, 또는 주방장이 해야 하는 것 아닙니까!\n#3;closeup\n#bgshake\n#fontsize;80"
1010402-84 = "[s5] \"……!!!\"\n[s6] \"그건 분명 그렇지!\""
1010402-85 = "#st;[0,0];instant;1;"
1010402-86 = "#st;[0,0];instant;1;"
1010402-87 = "#clearST"
1010402-88 = "#wait;1000"
1010402-89 = "[ns] \"그리고 그런 식당은 당연히 가운데가 비어 있어야 하고!\""
1010402-90 = "3;레이죠;07;그렇죠! 거기에 2층이어야 하고요!\n#3;em;[!]"
1010402-91 = "[s] \"일단 2층에서 난간이 부서지면서 사람이 떨어져야지!\""
1010402-92 = "3;레이죠;13;잘 아시는군요! 그리고 2층에서 한 무리가 내려오면서 서로 싸움이 일어나야 하고요!\n#3;em;[반짝]"
1010402-93 = "[s] \"주인공은 그런 와중에도 묵묵히 밥을 먹어야 하고!\""
1010402-94 = "3;레이죠;18;그리고는 결국 주인공과도 시비가 붙고, 나서서 싸움에 끼어들어야 하고요!"
1010402-95 = "3;레이죠;13;네! 맞습니다! 가끔 최강의 주방장이 모든 것을 정리하는 경우도 생기는 법이죠!\n#3;em;[재잘]\n#3;jump"
1010402-96 = "#all;hide"
1010402-97 = "#na;(레이죠는 한층 더 눈을 빛내며 신나게 대화를 이어갔다.)"
1010402-98 = "#na;(……그리고 대화라는 것은, 서로가 합이 맞아야 하는 법.)"
1010402-99 = "#na;(우리의 이야기가 끝났을 때는, 어느덧 반나절이 지나 있었다…….)"

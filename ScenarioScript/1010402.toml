[translation]
1010402-1 = "กิจวัตรประจำวัน"
1010402-3 = "(คุณครูมุ่งหน้าไปยังสถานที่ที่เรย์โจวบอกตั้งแต่เช้าตรู่...)"
1010402-4 = "(ทันใดนั้น...)"
1010402-9 = "― [log=레이죠]อ๊ะ มาแล้วเหรอคะ?[/log][wa:2090] "
1010402-10 = "― [log=레이죠]อีกนิดเดียวก็จะเสร็จการฝึกช่วงเช้าแล้วละ ช่วยรอสักครู่ได้มั้ยคะ?[/log][wa:4020] "
1010402-13 = "― [log=레이죠]ที่จริงนี่ก็เป็นส่วนหนึ่งของการเคลื่อนไหวที่ต่อเนื่องกันค่ะ[/log][wa:1120] "
1010402-14 = "― [log=레이죠]ฉันคิดว่าการหยุดการเคลื่อนไหวและคงท่าทางไว้[/log][wa:3220] "
1010402-17 = "― [log=레이죠]อาจจะเป็นประโยชน์ต่อการฝึกฝนจิตใจก็ได้ค่ะ...[/log][wa:1620] "
1010402-20 = "― [log=레이죠]ว่าแต่... คุณครู ทำไมถึงไปอยู่ตรงนั้นล่ะคะ...?[/log][wa:2870] "
1010402-23 = "― [log=레이죠]คะ? ถ้าอยู่ระหว่างฝึกฝน...[/log][wa:620] "
1010402-24 = "― [log=레이죠]ก็ต้องไม่หวั่นไหวต่อสายตาโดยรอบ และต้องคงความสุขุมไว้เหรอคะ...?[/log][wa:2150] "
1010402-27 = "― [log=레이죠]นั่นมันก็จริงอยู่หรอกค่ะ...[/log][wa:2300] "
1010402-30 = "― [log=레이죠]อึก... บะ... แบบนี้มัน เกินกำลังจริงๆ ด้วยค่ะ...![/log][wa:1850] "
1010402-33 = "(เมื่อฝึกเสร็จ เรย์โจวก็มองคุณครูด้วยสายตาเย็นชาอยู่พักหนึ่ง...)"
1010402-35 = "อืม... การให้คนอื่นเห็นการฝึกกังฟูของฉันมันก็เป็นเรื่องน่าอายอยู่หน่อยนะคะเนี่ย"
1010402-36 = "โดยเฉพาะความน่าอายในวันนี้ที่เหมือนจะมีเรื่องอื่นมาเกี่ยวข้องด้วยค่ะ!"
1010402-37 = "[s1] \"ระ... เรย์โจวนี่ขยันจังเลยนะ!\"\n[s2] \"ข... ขยันจังนะ ครูยังไม่ค่อยตื่นมาออกกำลังกายตอนเช้าเลย!\""
1010402-40 = "เหมือนว่าคุณครูพยายามจะเปลี่ยนเรื่องคุยเลยนะคะ..."
1010402-41 = "คะ? ฉันคิดไปเองงั้นเหรอคะ? อยากให้นักเรียนเชื่อในคุณครู เหมือนกับที่คุณครูเชื่อในตัวนักเรียน อย่างงั้นเหรอคะ...?"
1010402-42 = "เข้าใจแล้วค่ะ ถ้าคุณครูว่าอย่างนั้นละก็..."
1010402-43 = "พอมาคิดดูแล้ว คนที่ส่งโลเคชั่นแล้วชวนคุณครูมาที่นี่ก็คือฉันนี่คะ"
1010402-44 = "ไม่ค่ะ ฉันไม่ได้มาฝึกแบบนี้ในทุกเช้าหรอกค่ะ"
1010402-45 = "ปกติในวันสุดสัปดาห์ฉันจะพักผ่อน และถ้ามีเรื่อง 'สุดวิสัย' อย่างเช่นฝนตกหรือหิมะตก ฉันก็จะงดการฝึกในวันนั้น 'อย่างหลีกเลี่ยงไม่ได้' ค่ะ"
1010402-46 = "[s] \"แต่การมีสิ่งที่ชอบทำก็เป็นเรื่องที่เยี่ยมเลยนะ\""
1010402-47 = "สิ่งที่ชอบทำ... งั้นเหรอคะ..."
1010402-48 = "มะ... ไม่ค่ะ ไม่มีอะไรค่ะ ก็แค่..."
1010402-49 = "เหมือนคุณครูจะไม่คิดว่าการฝึกศิลปะการป้องกันตัวไม่ใช่เรื่องแปลกเท่าไรน่ะค่ะ"
1010402-50 = "คะ? อ้อ... เพราะถ้าคิดดูแล้ว คุณครูก็เป็นคนที่มาจากนอกคิโวทอส..."
1010402-54 = "ค่ะ เป็นเรื่องจริงที่การฝึกศิลปะการป้องกันตัวเป็นเรื่องที่แปลกในคิโวทอสค่ะ"
1010402-55 = "เพราะมันค่อยไม่มีประโยชน์อะไรอยู่แล้วน่ะค่ะ เพราะถ้ามีเรื่องอะไรเกิดขึ้น แค่เรายิงปืนจากระยะไกล สัก 2-3 นัดก็แก้ปัญหาได้แล้วนี่คะ"
1010402-56 = "ที่จริงแล้วนี่ก็ไม่ได้ต่างจากการฝึกกายบริหารในตอนเช้าเท่าไรหรอกค่ะ..."
1010402-57 = "[s] \"แต่เรย์โจวก็จะฝึกกังฟูต่อไปใช่มั้ย?\""
1010402-58 = "ถ้าตอบได้แค่ ใช่ หรือ ไม่ใช่... ฉันก็ต้องตอบว่าใช่ค่ะ"
1010402-59 = "นั่นสินะคะ เหตุผลที่ฉันยังฝึกกังฟูมาเรื่อยๆ แบบนี้..."
1010402-60 = "ก่อนอื่นคงเป็นเพราะกังฟูช่วยในการฝึกจิตใจและร่างกายของฉันค่ะ"
1010402-61 = "ถ้าได้ขยับร่างกาย ความคิดก็จะสงบลง สมองก็จะปลอดโปร่ง แล้วก็ทำให้มีพละกำลังมากขึ้นด้วยค่ะ"
1010402-62 = "การทำงานในย่านการค้าเป็นเรื่องยากกว่าที่คิดน่ะค่ะ ไหนจะต้องเอาเวลาไปเรียน ไหนจะต้องสอบให้#nผ่านอีก..."
1010402-63 = "คะ? ผลการเรียนของฉัน... น่ะเหรอคะ?"
1010402-67 = "ใช่เวลามาถามเรื่องนี้มั้ยคะเนี่ย...?"
1010402-68 = "เรื่องนั้นเอาไว้ก่อนเถอะค่ะ เอาเป็นว่ากังฟูมีข้อดีมากมายค่ะ"
1010402-69 = "และที่สำคัญที่สุด ฉันชอบพวกคำคมที่กล่าวกันมารุ่นสู่รุ่นค่ะ!"
1010402-70 = "อย่างเช่นคำที่บอกว่า 'ความอดทนไม่ใช่สิ่งที่เฉื่อยชาและไร้กำลัง หากแต่เป็นสิ่งที่กระตือรือร้น และเข้มแข็ง\" ฉันชอบคำนี้เอามากๆ เลยค่ะ"
1010402-71 = "คนที่ยังไม่เคยอดทนต่อบางสิ่งก็คงไม่เข้าใจคำนี้หรอกค่ะ! อย่างเช่นมังกรดำสุดดื้อด้านพวกนั้นน่ะค่ะ ไม่มีวันเข้าใจหรอก!"
1010402-72 = "[s] \"จะ... ใจเย็นๆ ก่อนนะ...\""
1010402-73 = "อ้อ มีคำนี้ด้วยค่ะ 'ความผิดพลาดไม่ใช่เรื่องใหญ่อะไร หากเรามีความกล้าที่จะยอมรับมัน' คมคายมาก#nเลยว่ามั้ยคะ?"
1010402-75 = "(หลังจากนั้นเรย์โจวก็คุยเกี่ยวกับเรื่องกังฟูด้วยสีหน้าที่มีความสุขอยู่อีกพักใหญ่)"
1010402-77 = "อืม ต้องขอโทษด้วยค่ะ คุณครู ฉันเริ่มจะอายขึ้นมาหน่อยแล้วละค่ะ ฉันเอาแต่พูดเรื่องของตัวเอง#nอยู่คนเดียวเลย..."
1010402-78 = "[s3] \"ถ้าชอบขนาดนั้น ทำไมไม่ไปเข้าชมรมล่ะ?\"\n[s4] \"ครูว่าไปอยู่ชมรมที่เกี่ยวข้องก็น่าจะดีนะ\""
1010402-81 = "คะ? หมายถึงชมรมวิจัยศิลปะการต่อสู้ หรือชมรมศิลปะการป้องกันตัวสมัยใหม่น่ะเหรอคะ? แน่นอนว่าที่นี่ก็มีชมรมแบบนั้นค่ะ..."
1010402-82 = "แต่ว่า... ที่คุณครูพูดมามันก็ออกจะแปลกๆ นะคะ"
1010402-83 = "กังฟูเป็นทักษะของพนักงานร้านอาหารหรือหัวหน้าเชฟไม่ใช่เหรอคะ!"
1010402-84 = "[s5] \"...!!!\"\n[s6] \"มันก็จริงน่ะนะ!\""
1010402-89 = "[ns] \"แล้วในร้านอาหารนั้นก็ต้องมีพื้นที่ว่างตรงกลางด้วย!\""
1010402-90 = "ใช่ค่ะ! แล้วก็ต้องมี 2 ชั้นด้วยค่ะ!"
1010402-91 = "[s] \"ใช่! ราวของชั้น 2 ต้องพัง แล้วก็ต้องมีคนร่วงลงมาด้วย!\""
1010402-92 = "คุณครูก็รู้ดีเลยนะคะเนี่ย! จากนั้นก็ต้องมีกองกำลังลงมาจากชั้น 2 และเกิดการต่อสู้ขึ้นค่ะ!"
1010402-93 = "[s] \"ระหว่างนั้นตัวเอกก็ต้องนั่งกินข้าวอยู่เงียบๆ!\""
1010402-94 = "แล้วสุดท้ายคนพวกนั้นก็จะมาหาเรื่องตัวเอก จนทำให้ต้องไปพัวพันกับการต่อสู้ค่ะ!"
1010402-95 = "ค่ะ! ใช่แล้วค่ะ! บางทีหัวหน้าเชฟที่เก่งที่สุดก็จะออกมาจัดการทุกอย่างด้วยนะคะ!"
1010402-97 = "(เรย์โจวชวนคุยต่อด้วยดวงตาที่เป็นประกายมากขึ้น)"
1010402-98 = "(และจากนั้นการสนทนาของทั้งคู่ก็เป็นไปอย่างดุเดือด...)"
1010402-99 = "(กว่าทั้งสองคนจะคุยกันเสร็จ ก็ผ่านไปครึ่งวันแล้ว...)"

[translation]
1010402-1 = "日常行程"
1010402-3 = "（一大早就前往令女說的地方……）"
1010402-4 = "（於是……）"
1010402-9 = "― [log=레이죠]啊，您來了呢。[/log][wa:2490] "
1010402-10 = "― [log=레이죠]再過一會晨練就會結束，能請您稍候片刻嗎？[/log][wa:5780] "
1010402-13 = "― [log=레이죠]其實這也是，連續動作的一部分哦。[/log][wa:2840] "
1010402-14 = "― [log=레이죠]將套路停止，把姿勢維持住。[/log][wa:4420] "
1010402-17 = "― [log=레이죠]或許會有助於鍛鍊精神，也說不定……[/log][wa:2700] "
1010402-20 = "― [log=레이죠]……話說，老師您為何待在那種地方……？[/log][wa:3950] "
1010402-23 = "― [log=레이죠]咦？正在修行的話──[/log][wa:1260] "
1010402-24 = "― [log=레이죠]應該不被周圍的視線影響，保持平常心……？[/log][wa:3870] "
1010402-27 = "― [log=레이죠]那個，雖然是那樣……沒錯……[/log][wa:2820] "
1010402-30 = "― [log=레이죠]……唔，果，果然這還是，辦不到……！[/log][wa:3090] "
1010402-33 = "（後來被結束修練的令女，冷眼看待了好一陣子……）"
1010402-35 = "唔嗯……讓別人看自己練功，果然還是覺得有難為情呢。"
1010402-36 = "……尤其是今天感到的害羞之中，好像還包含了其他情緒！"
1010402-37 = "[s1]「令，令女真是個勤奮的孩子呢！」\n[s2]「不像我連早操都做不好！」"
1010402-40 = "怎麼感覺您想巧妙地轉移話題……"
1010402-41 = "嗯？那是我的錯覺？#n老師信任著學生，所以希望學生也能信任老師……？"
1010402-42 = "我明白了。#n既然老師您都這麼說了……"
1010402-43 = "回頭想想，告訴老師這個地方的人也的確是我。"
1010402-44 = "不。我也不是每天早上都在鍛鍊。"
1010402-45 = "基本上週末都會休息……#n如果發生下雨或下雪之類的「不可抗力」也會「被迫」暫停。"
1010402-46 = "[s]「不過能有件喜歡做的事，我覺得很好呀？」"
1010402-47 = "喜歡做的事嗎……"
1010402-48 = "啊，沒什麼。#n只是……"
1010402-49 = "老師好像不覺得練武是件奇怪的事。"
1010402-50 = "嗯？啊哈……仔細想想，老師畢竟是來自奇普托斯之外……"
1010402-54 = "就如您想像的一般，在奇普托斯鍛鍊功夫相當獨特，這是不爭的事實。"
1010402-55 = "畢竟練武的功用極其有限。#n即便遇到什麼情況，只要在遠處開上幾槍幾乎都能解決。"
1010402-56 = "事實上，其本質也與體操並無二致……"
1010402-57 = "[s]「但令女以後還是會繼續下去吧？」"
1010402-58 = "這個嘛……#n如果要我以是或不是來回答……我的答案肯定更接近於「是」。"
1010402-59 = "畢竟我之所以像這樣持續鍛煉功夫……"
1010402-60 = "首先是因為我認為練功有助於修身養性。"
1010402-61 = "活動身體除了能讓想法沉澱以外，頭腦也會變得清晰，更可以鍛煉體力。"
1010402-62 = "商會工作可是意外的累人。#n同時還得抽空念書，又有考不完的試……"
1010402-63 = "嗯？我的成績……是嗎？"
1010402-67 = "非得現在問這個嗎……？"
1010402-68 = "總之大致上就是這樣。功夫存在許多好處。"
1010402-69 = "最重要的是，那些流傳下來的語錄真的棒極了！"
1010402-70 = "比如「所謂忍耐並非消極與無力，而是積極與強力的表現」這句話，我真的很喜歡。"
1010402-71 = "沒有忍耐過的人根本不會對這句話有共鳴！#n就好比玄龍門那些總愛無理取鬧的傢伙！"
1010402-72 = "[s]「你，你先冷靜……」"
1010402-73 = "還有「只要勇於承認失誤，失誤就沒什麼大不了」這句話也超帥的！"
1010402-75 = "（之後令女又一臉開心地聊了功夫好一陣子）"
1010402-77 = "不，不好意思，老師。#n好像都是我一個人說個不停，突然覺得有點抱歉……"
1010402-78 = "[s3]「既然你那麼喜歡功夫的話……」\n[s4]「加入相關的社團不是更好嗎？」"
1010402-81 = "嗯？您指的是武術研究部或現代武道部之類的社團嗎？#n雖然那樣的社團確實存在……"
1010402-82 = "但是老師，您說這話就顯得有些奇怪了。"
1010402-83 = "功夫本來就該由餐廳的服務生或主廚來展現才對啊！"
1010402-84 = "[s5]「……！！！」\n[s6]「確實是那樣沒錯！」"
1010402-89 = "[ns]「而且餐廳的中央還得是開放式的！」"
1010402-90 = "沒錯！同時還必須是2層樓的建築！"
1010402-91 = "[s]「2樓的欄杆會被破壞，然後有人掉下來！」"
1010402-92 = "您這不是很懂嗎！#n然後一群人便從2樓下來互相廝殺！"
1010402-93 = "[s]「主角在這個時候必須默默吃飯！」"
1010402-94 = "最後主角會人被找碴，被迫加入戰局！"
1010402-95 = "沒錯！就是這樣！有時也會由最強主廚出面解決一切！"
1010402-97 = "（令女繼續興奮地說著，雙眼變得更加炯炯有神）"
1010402-98 = "（……聊天果然得要雙方談得來才行呢）"
1010402-99 = "（等話題結束的時候，不知不覺間已經過去了半天……）"

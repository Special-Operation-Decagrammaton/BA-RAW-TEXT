[translation]
1010402-1 = "Daily Tasks"
1010402-3 = "Early in the morning, I headed to where Reijo asked me to meet."
1010402-4 = "When I got there..."
1010402-9 = "― [log=레이죠]Ah. You're here.[/log][wa:2130] "
1010402-10 = "― [log=레이죠]I'm almost done with my morning training, so please wait.[/log][wa:4300] "
1010402-13 = "― [log=레이죠]You see, this is an aspect of continuous movement as well.[/log][wa:1160] "
1010402-14 = "― [log=레이죠]Stopping the flow, maintaining poses...[/log][wa:3380] "
1010402-17 = "― [log=레이죠]It also helps with training the mind.[/log][wa:1900] "
1010402-20 = "― [log=레이죠]...But why are you just standing there, Sensei?[/log][wa:2830] "
1010402-23 = "― [log=레이죠]Huh? If I'm training...[/log][wa:740] "
1010402-24 = "― [log=레이죠]...I shouldn't be getting distracted? I need to maintain my composure?[/log][wa:1870] "
1010402-27 = "― [log=레이죠]Yes, that's true, but...[/log][wa:2420] "
1010402-30 = "― [log=레이죠]...B-But this is way too much![/log][wa:2610] "
1010402-33 = "After she finished her training, I could feel Reijo's cold gaze on me."
1010402-35 = "It really is embarrassing to show someone my kung fu."
1010402-36 = "...Although the reason for today's embarrassment had an entirely different factor mixed into it!"
1010402-37 = "[s1] \"R-Reijo, you're so diligent!\"\n[s2] \"I can't do morning stretches at all!\""
1010402-40 = "Why do I feel like you're trying to subtly change the subject?"
1010402-41 = "What? I'm imagining things? Just as you believe in me, I should also believe in you...?"
1010402-42 = "All right, Sensei. If you say so."
1010402-43 = "I guess I was the one who told you about this spot."
1010402-44 = "Huh? No. Even I don't train every single morning."
1010402-45 = "I rest my body on the weekends. And I have no choice but to skip when it rains or snows."
1010402-46 = "[s] \"Regardless, it's nice to see something you're so passionate about.\""
1010402-47 = "Something I'm passionate about..."
1010402-48 = "N-No, it's nothing. It's just..."
1010402-49 = "You don't seem to think it's strange, me doing kung fu training."
1010402-50 = "What? Oh... You did technically come from outside of Kivotos..."
1010402-54 = "Yes... Here, people view honing your martial arts skills as a little eccentric."
1010402-55 = "After all, it won't help you much in a fight. Things are usually solved with a few gun shots."
1010402-56 = "It's more or less just some morning calisthenics, at this point."
1010402-57 = "[s] \"But you're still going to train, right, Reijo?\""
1010402-58 = "Well, if you forced me to choose, I suppose I'd say yes."
1010402-59 = "I pursue kung fu training for a few reasons..."
1010402-60 = "First, it benefits both your mind and body."
1010402-61 = "Moving your body helps center yourself, allowing you to clear your head and calm your thoughts. And, of course, the training increases your stamina."
1010402-62 = "Work for the Promenade is more difficult than you'd think. On top of that, I have to keep up with studying, and exams feel never ending..."
1010402-63 = "Huh? My grades...?"
1010402-67 = "Do you really need to ask me that right now?"
1010402-68 = "Well, that sums it up. Kung fu has a lot of great benefits."
1010402-69 = "Additionally, I love the proverbs that it teaches!"
1010402-70 = "For example, \"Patience is not passive nor idle, but proactive and intense.\""
1010402-71 = "Only someone who's had their patience truly tested can relate to that. Like when I have to deal with Genryumon members throwing tantrums over inconsequential details!"
1010402-72 = "[s] \"L-Let's take a deep breath.\""
1010402-73 = "Another great saying is, \"Face your mistakes, and they will hold no power over you.\""
1010402-75 = "Reijo continued animatedly talking about kung fu and its proverbs for a while."
1010402-77 = "Um. Sorry, Sensei. I've embarrassed myself again, making you listen to me ramble..."
1010402-78 = "[s3] \"You really like kung fu.\"\n[s4] \"Why don't you join a club?\""
1010402-81 = "Huh? You mean like the Martial Arts Research Club or the Modern Martial Arts Club? I do remember seeing those names around."
1010402-82 = "But that's a strange thing to say, Sensei."
1010402-83 = "The first rule of kung fu is that it must be performed by a waiter or a chef!"
1010402-84 = "[s5] \"...!!\"\n[s6] \"You're right!\""
1010402-89 = "[ns] \"And there has to be a big, open space in the center of the restaurant!\""
1010402-90 = "Yes! And there should be a second floor!"
1010402-91 = "[s] \"Then a person breaks the handrail and falls down!\""
1010402-92 = "Exactly, Sensei! A huge fight breaks out as people come rushing down the stairs!"
1010402-93 = "[s] \"While the main character nonchalantly finishes their meal!\""
1010402-94 = "But then they provoke the main character into joining the fight!"
1010402-95 = "Yes! It's perfect! The strongest chef handles everything!"
1010402-97 = "Reijo's eyes positively sparkled as we carried on the conversation..."
1010402-98 = "We kept it going in perfect sync, both equally invested in the scenario."
1010402-99 = "We carried on the enthusiastic banter until the day was almost over..."

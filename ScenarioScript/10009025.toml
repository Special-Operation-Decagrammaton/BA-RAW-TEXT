[translation]
10009025-2 = "เฮ้อ! ทีนี้ก็จับได้แล้วสักทีนะ!"
10009025-3 = "ขอบคุณมากค่ะ คุณครู! ช่วยพวกเราได้เยอะมากๆ เลยค่ะ"
10009025-4 = "[s] \"เดี๋ยวก่อนสิ คราวนี้หนีออกมาจากห้องคุมขังได้เลยเหรอ?!\""
10009025-5 = "อา อุปกรณ์ของห้องคุมขังที่เราไปคราวนี้มีสภาพที่เก่ามากๆ แล้วค่ะ"
10009025-6 = "เพราะงั้นก็เลยใช้ช่องโหว่ตรงนั้นหนีออกมาสินะ? น่ากลัวจริงๆ เลยเชียว"
10009025-7 = "ว่าแล้วเชียว... ประมาทจิ้งจอกแห่งความพินาศไม่ได้เลยค่ะ!"
10009025-8 = "[s] \"เดี๋ยวสิ ครูคิดว่ามันเป็นปัญหามาตั้งแต่ก่อนนี้แล้วนะ...\""
10009025-9 = "อ่ะฮ่ะฮ่ะ~ มันก็แค่อุบัติเหตุที่คาดไม่ถึงน่ะ ช่วยไม่ได้นะ "
10009025-10 = "แต่ถึงยังไงพวกเราก็ตัดสินใจที่จะย้ายเธอไปห้องคุมขังอื่นที่มีอุปกรณ์ที่ทันสมัยขึ้นแล้วล่ะ! คราวนี้วางใจได้เลย!"
10009025-11 = "ค่ะ! คราวนี้เราจะรับผิดชอบเองค่ะ จะคอยดูแลเรื่องการส่งตัวพวกเด็กมีปัญหาไปที่ห้องคุมขังเองค่ะ!"
10009025-12 = "[s] \"อืม... ทั้งสองคนทำงานหนักมากเลยนะ\""
10009025-18 = "ถ้างั้นเราไปลาดตระเวนกันต่อเถอะค่ะ คุณครู"
10009025-19 = "[s] \"สถานการณ์แบบนี้เซนะก็ยังใจเย็นได้อยู่เลยนะ...\""
10009025-21 = "(หลังจากจบเรื่องวุ่นวายเล็กๆ ที่เกิดขึ้น คุณครูก็กลับไปลาดตระเวนต่อ)"

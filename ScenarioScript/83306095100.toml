[translation]
83306095100-7 = "啊，委員長！辛苦了！"
83306095100-8 = "嗯，你也辛苦了。"
83306095100-9 = "不過……這裡應該不在巡邏路線上才對，發生了什麼問題嗎？"
83306095100-10 = "這是……因為收到了這間教室被畫上汙衊真琴議長的塗鴉和奇怪圖畫的通報。"
83306095100-11 = "整間教室都是一團亂……"
83306095100-12 = "原來如此……放任不管的話，恐怕會影響到課程。"
83306095100-13 = "我也來幫忙收拾吧。"
83306095100-14 = "啊，是！非常感謝！"

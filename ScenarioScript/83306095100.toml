[translation]
83306095100-7 = "อ๊ะ ท่านประธาน วันนี้ก็สู้ๆ นะคะ!"
83306095100-8 = "อื้ม ฉันสู้ทุกวันอยู่แล้ว"
83306095100-9 = "ว่าแต่... ทำไมมาอยู่นอกเส้นทางลาดตระเวนล่ะ มีเรื่องอะไรรึเปล่า?"
83306095100-10 = "พอดีว่า... ฉันได้รับแจ้งว่ามีคนวาดรูปล้อเลียนประธานมาโคโตะไว้เต็มห้องเรียนนี้เลยค่ะ"
83306095100-11 = "และนั่นก็ทำให้ห้องเรียนเละเทะไปทั้งห้องเลย..."
83306095100-12 = "งั้นเหรอ... ถ้าปล่อยไว้อย่างนี้คงเป็นอุปสรรคต่อการเข้าเรียนด้วยสินะ"
83306095100-13 = "ถ้างั้นฉันจะไปช่วยลบออกด้วยคนอีกแรง"
83306095100-14 = "อ๊ะ ค่ะ! ขะ... ขอบคุณนะคะ!"

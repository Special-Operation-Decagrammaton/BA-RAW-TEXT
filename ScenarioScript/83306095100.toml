[translation]
83306095100-7 = "Ah, Head Prefect! Thank you for your hard work, as always!"
83306095100-8 = "Yes, and thank you for your diligence as well."
83306095100-9 = "But... This area isn't part of your standard patrol. Has something happened?"
83306095100-10 = "Well...we received a report of some posters and weird graffiti slandering Chairman Makoto defacing this classroom."
83306095100-11 = "We've tidied a bit, but the room still looks like a hurricane blew through it..."
83306095100-12 = "Yes... This would interfere with classes if left unaddressed."
83306095100-13 = "Allow me to help you clean."
83306095100-14 = "Ah, of course! Th-Thank you!"

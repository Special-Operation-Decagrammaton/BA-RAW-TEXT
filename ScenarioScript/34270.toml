[translation]
34270-1 = "Episode 27; Epilogue"
34270-7 = "I-I've never gone this way before..."
34270-8 = "What if it takes us somewhere horrible?"
34270-9 = "We won't know until we try, Hiyori."
34270-10 = "From now on, every path we take is an unknown."
34270-11 = "...That doesn't make it less scary."
34270-15 = "...Huh?"
34270-16 = "Wh-Where's Leader?!"
34270-17 = "Huh?"
34270-18 = "Wasn't she behind us?! She disappeared! Maybe she was eaten..."
34270-20 = "...Tsk."
34270-21 = "Misaki...? "
34270-22 = "Leader left."
34270-23 = "Left?! What do you mean l-left? How could she leave? Where'd she go?"
34270-24 = "I don't know. She just said to take care of the others."
34270-25 = "But why? Leader..."
34270-26 = "..."
34270-27 = "It's unfair, Saori. If I have to do this on my own... I..."
34270-28 = "It's too heavy for me."
34270-29 = "It'll be okay, Misaki."
34270-30 = "Hime..."
34270-35 = "Saori will need some time."
34270-36 = "She needs to learn who she is, to reflect on her questions."
34270-37 = "She'll find the answers she needs on her own."
34270-38 = "B-But...will she come back? I miss her already..."
34270-39 = "Of course. She would never abandon us."
34270-40 = "So we have to keep going on our own? Without her?"
34270-41 = "Saori has taken care of us all these years. We owe her this much."
34270-43 = "But how?"
34270-44 = "Where do we go?"
34270-45 = "Arius, Trinity, Gehenna... We're not welcome anywhere."
34270-46 = "We'll be on the run. Never staying in one spot too long to avoid capture."
34270-47 = "Are you prepared for that life, Hime?"
34270-48 = "Yes. I was prepared the moment we decided to live."
34270-49 = "..."
34270-50 = "Oh no..."
34270-51 = "Hime. Ideals won't feed an empty stomach."
34270-52 = "I know. But we can do it.  "
34270-53 = "..."
34270-54 = "Wildflowers bloom through cracks in the concrete."
34270-55 = "Azusa said that to me once."
34270-60 = "We will continue struggling, even if it is in vain."
34270-61 = "If Azusa did it, so can we. We've been through a lot together."
34270-62 = "And this time, we're not entirely alone."
34270-68 = "...Sensei."
34270-69 = "...Okay."
34270-70 = "We'll find a way..."
34270-72 = "Yes. We have our work cut out for us.  "
34270-76 = "..."
34270-86 = "Heeheehee. What's your story, newbie? No one ends up here without one."
34270-87 = "Not the talkative type? Eh, I don't care either way as long as you're skilled. What kind of request you looking for? Easy or hard?"
34270-89 = "Give me an expensive mission. The hardest one you have."
34270-94 = "(I'm a criminal on the run now. I know it won't be easy.)"
34270-95 = "(But there has to be an end to the road of pain I've walked all these years.)"
34270-96 = "(Is there a happy future for us if I reach it?)"
34270-100 = "We'll have our happy ending."
34270-101 = "I have faith in the wildflower blooming in concrete."
34270-102 = "I have faith in you, Saori.  "
34270-125 = "..."
34270-130 = "..."
34270-135 = "..."
34270-138 = "Sensei. I'm unable to have prophetic dreams anymore."
34270-139 = "That was the price I paid to escape my neverending dream."
34270-140 = "I have to discuss my last prophetic dream with you."
34270-147 = "But perhaps...at a later date."
34270-148 = "Right now, I want to remember this moment."
34270-149 = "We've all finally been reunited."
34270-150 = "And, as always, we will work together to overcome any obstacle."
34270-152 = "[ns] \"Okay, let's start the hearing.\""
34270-169 = "This isn't what I'm owed!  "
34270-170 = "Hm? I don't follow."
34270-171 = "What's with this? This isn't even half of what I was promised!"
34270-172 = "You're the one who broke our promise.  "
34270-173 = "It says right here on the contract, student pay is a thousand yen."
34270-174 = "But you hid the fact you were a dropout, so it's five hundred yen."
34270-175 = "What? Wait, that's..."
34270-176 = "This is the calculation after subtracting taxes, various expenses, and meals. Any problems? "
34270-177 = "Also, it looks like you're wanted. Wouldn't you get in trouble if anyone knew you were here?  "
34270-178 = "I'll have to deduct an additional fifteen percent as an information protection fee."
34270-180 = "What? Wait, then...how much do I get...?"
34270-186 = "Zilch. Nada. Nothing."
34270-187 = "The exit is right that way."
34270-188 = "Do you have any complaints? I'm sure you could direct them to Valkyrie Police School."
34270-193 = "...No, I get it."
34270-194 = "I'll consider this lesson learned."
34270-203 = "E-Excuse me."
34270-204 = "Oh, you're...the one I gave the commission to last time...?!"
34270-205 = "Oh, yes, yes... U-Umm... I forgot something..."
34270-206 = "Forgot something? But we've already finished the calculations."
34270-207 = "U-um, right. S-So..."
34270-211 = "F-Forgive..."
34270-212 = "Forgive?"
34270-214 = "I won't forgive you!!!"
34270-224 = "P-Please! Have mercy!!"
34270-225 = "How dare you steal Aru's money?! I'll never forgive you! I'll make you wish you'd never been born!  "
34270-237 = "Eek."
34270-238 = "A-Aru said I should go and make my point...to tell you to do the calculations correctly..."
34270-239 = "I-I think I made my point...?"
34270-240 = "..."
34270-241 = "O-Oh! I didn't know there was someone else here!"
34270-242 = "I-I'm so sorry for the commotion! I'm sorry f-for existing!"
34270-243 = "...It's not a big deal."
34270-244 = "O-Okay! Th-Then I have some bombs to install... Bye!"
34270-248 = "Is this how the criminal world operates?"
34270-251 = "Wh-What?!"
34270-253 = "I-I'm sorry.... I'm sorry. I just don't know how to do anything right. I'm sorry for upsetting you. Do you want me to disappear? I should never have been born."
34270-254 = "*sigh*"
34270-255 = "Ahahahaha! You're really the best, Haruka! You definitely made your point!"
34270-256 = "Those were some big, bad guys you blew up. Whatcha gonna do now, huh?"
34270-257 = "This is gonna be a pain. Can we have one day of peace?"

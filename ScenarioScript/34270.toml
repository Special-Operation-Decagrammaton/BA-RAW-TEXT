[translation]
34270-1 = "第27話;尾聲"
34270-7 = "我，我還是第一次走到這裡……"
34270-8 = "會通往哪裡呢……"
34270-9 = "總之先前進吧。"
34270-10 = "不管通向哪裡，都會是我們第一次走出的道路。"
34270-11 = "嗯……確實是呢。"
34270-15 = "……咦。"
34270-16 = "隊，隊長呢！？"
34270-17 = "咦？"
34270-18 = "隊，隊長應該跟在我們後面才對……#n不，不見了！？"
34270-20 = "……呿。"
34270-21 = "美咲……？"
34270-22 = "隊長他，離開了……"
34270-23 = "離，離開了是什麼意思？"
34270-24 = "只對我說了大家交給妳了這句話……真是自作主張。"
34270-25 = "隊長……為，為什麼……"
34270-26 = "……"
34270-27 = "真狡猾啊，沙織。#n竟然用這種方式束縛我……"
34270-28 = "這對我來說，過於沉重了……"
34270-29 = "……沒事的，美咲。"
34270-30 = "公主……"
34270-35 = "沙織他，還需要一些時間。"
34270-36 = "──回顧自己、認識自己的時間。"
34270-37 = "為了解答自己問題的時間……"
34270-38 = "隊長她……沙織姊她還會回來嗎？"
34270-39 = "嗯……沙醬會回來的。"
34270-40 = "今後就要靠我們……自己活下去了嗎？"
34270-41 = "嗯……也不能總是依賴沙醬呢。"
34270-43 = "嗯……"
34270-44 = "我們接下來該怎麼做呢……？"
34270-45 = "奧利斯自治區、三一、格黑娜……都已經沒有我們的容身之處了。"
34270-46 = "……為了躲避追擊，我想可能得在街上四處躲藏了。"
34270-47 = "等著我們的，就是這種未來哦……公主。"
34270-48 = "嗯……就算如此，我們也沒問題的。"
34270-49 = "……"
34270-50 = "公主醬……"
34270-51 = "公主……這可不是件簡單的事哦。"
34270-52 = "不，我們沒問題的。"
34270-53 = "……"
34270-54 = "要是因為這種事就洩氣的話，就對在水泥縫隙中盛開的花太失禮了呢。"
34270-55 = "梓那個時候，看著花這麼說了。"
34270-60 = "就算一切都是徒勞……也不該放棄繼續抵抗。"
34270-61 = "梓都把這句話貫徹到底了，我們不可能做不到的。#n我們的青春，是屬於我們自己的。"
34270-62 = "而且會有人默默守護著我們的……不是嗎？"
34270-68 = "……妳指的是老師，嗎。"
34270-69 = "……嗯。"
34270-70 = "確實呢。"
34270-72 = "嗯，一起加油吧。"
34270-76 = "……"
34270-86 = "……咯咯。是新面孔呢。#n既然會到這裡來，想必是有什麼理由吧。"
34270-87 = "只要有實力的話其他都無所謂。#n那麼，妳想接什麼委託呢？#n簡單的？還是困難的？"
34270-89 = "困難的……不，不管再怎麼不可能的任務都會解決給你看的。#n給我報酬高的任務吧。"
34270-94 = "（我是犯罪者──也是受人追趕之人，今後也會繼續過著辛苦的日子吧）"
34270-95 = "（但是，如果在那苦難旅途的盡頭……）"
34270-96 = "（存在著我們的美好未來的話……）"
34270-100 = "嗯，會到來的喔……我們也會……"
34270-101 = "……在最後，迎接HappyEnd的。"
34270-102 = "我們也是一樣的吧，沙織。"
34270-125 = "……"
34270-130 = "……"
34270-135 = "……"
34270-138 = "老師……或許，我已經無法再看見預知夢了吧。"
34270-139 = "這就是──逃離那個夢境的代價。"
34270-140 = "在最後的預知夢裡所看見的事……必須要告訴老師才行……"
34270-147 = "但是……在稍微遠一點的未來再說也好吧？"
34270-148 = "現在……我想專注於聚集於此的，我們大家的「現在」。"
34270-149 = "然後……我們……"
34270-150 = "會像至今為止一樣齊心協力──共同努力度過試煉的。"
34270-152 = "[ns] 「那麼，開始聽證會吧。」"
34270-169 = "等等，這和約好的不一樣吧。"
34270-170 = "嗯？你指的是什麼？"
34270-171 = "這是怎麼回事？#n報酬連說好的一半都不到吧！！"
34270-172 = "先破壞約定的是你才對吧。"
34270-173 = "在我們的合約上也寫了，學生的時薪是1000元。"
34270-174 = "然而，你卻隱瞞了自己已經輟學的事實不是嗎？所以時薪只有500元。"
34270-175 = "等一下……那是……"
34270-176 = "再加上稅金跟其他費用，扣掉餐費之後就是這個金額了……有什麼問題嗎？"
34270-177 = "啊啊……而且，你似乎被通緝了呢。#n這件事被知道的話你也會很困擾的吧？"
34270-178 = "所以還要再扣掉15%的封口費。"
34270-180 = "等，等等……這樣我的薪水……"
34270-186 = "是0元呢。"
34270-187 = "來，出口在那邊。"
34270-188 = "有什麼想說的嗎？#n還是要去女武神警察學園投訴我？"
34270-193 = "……不，我知道了。"
34270-194 = "就當作學個教訓吧。"
34270-203 = "打，打擾了。"
34270-204 = "你是……之前委託的……！？"
34270-205 = "是，是的……那，那個……#n因為有點問題……"
34270-206 = "應該已經跟你們結算過了啊。"
34270-207 = "是，是的……沒，沒，沒錯。#n你說得沒錯……所，所以……"
34270-211 = "不，不可……"
34270-212 = "不可？"
34270-214 = "不可原諒！！！！！！！"
34270-224 = "噫，噫！？救，救救我啊！？"
34270-225 = "竟敢拖欠亞瑠大人的錢，絕對不可原諒！！！"
34270-237 = "……哈啊，哈啊。"
34270-238 = "亞，亞瑠大人說過，要好好打招呼……#n讓，讓他仔細算清楚……所，所以……"
34270-239 = "這，這樣，應該算，有好好打招呼了吧……？"
34270-240 = "……"
34270-241 = "啊，啊啊……！？#n竟然還有其他人在！？"
34270-242 = "造，造成你的困擾，非，非常抱歉！！"
34270-243 = "……不會，沒什麼。"
34270-244 = "那，那麼，再見了……#n我還得去設置炸彈才行……"
34270-248 = "這就是地下世界的作法嗎……"
34270-251 = "你，你說什麼──"
34270-253 = "對，對不起……對不起……對不起……#n我以為「打招呼」指的就是這種事……又，又闖禍了。我，我還是去死吧？我可以去死嗎？"
34270-254 = "……唉。"
34270-255 = "啊哈哈哈哈哈！笑死我了！！#n遙香醬竟然真的去打招呼了。"
34270-256 = "而且旁邊還有個看起來很可怕的同夥，接下來會發生什麼事呢？"
34270-257 = "看來又要熱鬧起來了啊……唉。"

[translation]
34270-1 = "ตอนที่ 27;บทส่งท้าย"
34270-7 = "มะ... เหมือนเราจะไม่เคยมาทางนี้กันนะคะ..."
34270-8 = "มันจะไปเชื่อมกับที่ไหนนะ..."
34270-9 = "อืม คงไม่มีทางเลือกอื่นนอกจากไปเรื่อยๆ"
34270-10 = "มันจะเป็นเส้นทางที่เราไม่เคยไปมากันก่อนน่ะ"
34270-11 = "....... ค่ะ นั่นสินะคะ"
34270-15 = "เอ๊ะ..."
34270-16 = "หะ... หัวหน้าล่ะคะ?!"
34270-17 = "หืม?"
34270-18 = "เมื่อกี้หัวหน้ายังตามมาข้างหลังอยู่เลย... ตะ... แต่ตอนนี้หายไปแล้วค่ะ!"
34270-20 = "ชิ..."
34270-21 = "มิซากิ...? "
34270-22 = "หัวหน้าจากไปแล้วละ..."
34270-23 = "จะ... จากไปแล้วงั้นเหรอคะ?!"
34270-24 = "ใช่... แถมยังฝากให้ฉันดูแลทุกคนด้วย ทำตามอำเภอใจชะมัด..."
34270-25 = "หัวหน้า... ทะ... ทำไมล่ะ"
34270-26 = "......."
34270-27 = "ซาโอริ คนใจร้าย... ถ้ามาล่ามฉันไว้ด้วยเรื่องนี้ละก็... ฉัน..."
34270-28 = "มันหนักหนาเกินไปสำหรับฉัน..."
34270-29 = "ไม่เป็นไรหรอก... มิซากิ"
34270-30 = "องค์หญิง..."
34270-35 = "ซาโอริยังต้องการเวลาอีกหน่อยน่ะ"
34270-36 = "เวลาในการมองย้อนตัวเอง เวลาในการเข้าใจตัวเอง"
34270-37 = "เพื่อหาคำตอบสำหรับคำถามนั้นเพื่อตัวเองน่ะ"
34270-38 = "หัวหน้า... พี่ซาโอริจะกลับมาไหมคะ?"
34270-39 = "อื้อ ซัตจังจะกลับมาแน่"
34270-40 = "พวกเราต้อง... ฝ่าฟันกันเองเหรอคะ?"
34270-41 = "อืม... ที่ผ่านมาซัตจังดูแลพวกเรามาตลอดเลยใช่ไหม? ตอนนี้ถึงไม่มีซัตจังแต่เราก็ต้องรวมพลังกัน"
34270-43 = "รวมพลัง... ยังไง..."
34270-44 = "จากนี้พวกเราต้องทำยังไง...?"
34270-45 = "เราไม่มีที่ให้ไปแล้ว ไม่ว่าจะเขตปกครองตนเองอาเรียส ทรีนิตี้ หรือเกเฮนน่า"
34270-46 = "เราคงไม่มีทางเลือกนอกจากเตร็ดเตร่ไปตามถนน และต้องย้ายที่ไปเรื่อยๆ เพื่อหลีกเลี่ยงการไล่ล่า"
34270-47 = "นั่นคือชีวิตที่รออยู่ข้างหน้านะ... องค์หญิง"
34270-48 = "อืม ถึงอย่างนั้นก็ไม่เป็นไรหรอก เราจะผ่านมันไปด้วยกัน"
34270-49 = "......."
34270-50 = "องค์หญิง..."
34270-51 = "องค์หญิง... มันไม่ได้ง่ายเหมือนที่พูดหรอกนะ"
34270-52 = "ไม่หรอก เราทำได้ "
34270-53 = "......."
34270-54 = "ดูอย่างดอกไม้ที่บานตรงคอนกรีตสิ"
34270-55 = "ตอนนั้นอาซึสะดูดอกไม้นั้นแล้วก็พูดว่า"
34270-60 = "แม้ทุกสิ่งจะว่างเปล่าและไร้ประโยชน์... แต่ก็ต้องต่อต้านให้ถึงที่สุด"
34270-61 = "ถ้าอาซึสะทำได้ แล้วทำไมพวกเราจะทำไม่ได้ล่ะ? อย่าดูถูกความเป็นวัยรุ่นของพวกเราสิ"
34270-62 = "อีกอย่าง เรายังมีคนที่คอยปกป้องพวกเราอยู่ด้วยนะ ใช่ไหมล่ะ?"
34270-68 = "คุณครู..."
34270-69 = "อืม..."
34270-70 = "ไม่ว่ายังไง..."
34270-72 = "อืม... เราก็จะพยายามไปด้วยกัน "
34270-76 = "......."
34270-86 = "หึหึหึ... ไม่เคยเห็นหน้ามาก่อนเลยนะ มาถึงที่นี่ได้คงจะเจอเรื่องอะไรกันมาละสิท่า"
34270-87 = "ขอแค่มีความสามารถก็พอ ว่าไงล่ะ อยากได้ภารกิจแบบไหน? ระดับง่าย? หรือยากๆ ไปเลย?"
34270-89 = "ระดับยาก... ไม่สิ ไม่ว่าจะปัญหาที่แก้ไขไม่ได้ก็จะลองคลี่คลายดู เอาเป็นภารกิจที่จ่ายแพงๆ ก็แล้วกัน"
34270-94 = "(เรามันอาชญากร ทั้งถูกไล่ล่าและใช้ชีวิตยากลำบากและเจ็บปวด)"
34270-95 = "(แต่ที่ปลายทางของการเดินทางที่เจ็บปวด ทนทุกข์ และทรมาน...)"
34270-96 = "(หากเราไขว่คว้าอนาคตเช่นนั้นได้บ้างละก็...)"
34270-100 = "อืม... พวกเราเองก็ต้องไขว่คว้าได้..."
34270-101 = "มาเชื่อกันเถอะว่าสุดท้ายแล้วเราจะมีความสุขได้"
34270-102 = "ซาโอริ พวกเราก็คิดอย่างนั้นเหมือนกัน "
34270-125 = "......."
34270-130 = "......."
34270-135 = "......."
34270-138 = "คุณครู ตอนนี้... ฉันฝันบอกเหตุไม่ได้แล้วค่ะ "
34270-139 = "มันคือราคาที่ฉันต้องจ่ายเพื่อออกมาจากความฝันนั้นค่ะ... "
34270-140 = "แต่สิ่งที่ฉันเห็นในความฝันครั้งสุดท้าย... ฉันคิดว่าควรคุยกับคุณครูเรื่องนี้ค่ะ"
34270-147 = "แต่ว่า... เรื่องนั้นเอาไว้ก่อนได้ไหมคะ?"
34270-148 = "เพราะตอนนี้... ฉันอยากจดจำภาพของพวกเราที่มารวมตัวกันที่นี่ค่ะ"
34270-149 = "และพวกเรา... จะรวมพลังและพยายาม..."
34270-150 = "เพื่อก้าวข้ามความยากลำบากไปด้วยกัน และเหมือนอย่างที่ทำมาค่ะ..."
34270-152 = "[ns] \"เอาละ มาเริ่มการสืบพยานกันเลย\""
34270-169 = "เดี๋ยวก่อน มันไม่เหมือนในสัญญานี่นา! "
34270-170 = "หืม? พูดอะไรของเธอ"
34270-171 = "แล้วยอดนี้มันอะไรกัน? ยังไม่ถึงครึ่งหนึ่งของที่เราจะได้รับเลย!!"
34270-172 = "ฝ่ายที่ผิดสัญญาคือพวกเธอต่างหาก "
34270-173 = "ในหนังสือสัญญาก็บอกไว้ไม่ใช่เหรอว่านักเรียนได้ค่าจ้างชั่วโมงละ 1,000 เยนน่ะ"
34270-174 = "แต่เธอปกปิดเรื่องที่เป็นนักเรียนที่ลาออกมาไม่ใช่เหรอ? เพราะงั้นก็ต้องได้แค่ 500 เยนสิ"
34270-175 = "ว่าไงนะ? เดี๋ยวสิ เรื่องนั้นมัน..."
34270-176 = "ถ้าหักภาษี ค่าใช้จ่ายต่างๆ และค่าอาหารออกไป ก็เหลือตามยอดนั่นแหละ มีปัญหาอะไรรึเปล่า?"
34270-177 = "อ้อ ได้ข่าวว่าถูกหมายจับมาซะด้วย หากเรื่องนี้เล็ดลอดออกไป ฝ่ายที่จะซวยคือเธอไม่ใช่เหรอ? "
34270-178 = "งั้นขอหักออกอีก 15% เป็นค่ารักษาความลับแล้วกัน"
34270-180 = "ว่าไงนะ? เดี๋ยวสิ งั้นเงินที่ฉันจะได้ก็..."
34270-186 = "0 เยนไงละครับ"
34270-187 = "เอาละ งั้นก็เชิญออกประตูนี้ได้เลยครับ"
34270-188 = "มีอะไรอยากพูดอีกงั้นเหรอ? หรืออยากโทรไปร้องทุกข์กับโรงเรียนวัลคิรี่?"
34270-193 = "ไม่ละ เข้าใจแล้ว"
34270-194 = "คิดเสียว่าได้อีกหนึ่งบทเรียนก็แล้วกัน"
34270-203 = "ขะ... ขอโทษที่เสียมารยาทค่ะ"
34270-204 = "นี่เธอ...? คนที่รับภารกิจไปเมื่อคราวก่อนเหรอ...?!"
34270-205 = "เอ่อ ค่ะ ใช่ค่ะ... เออะ... เอ่อ... พอดีว่ามีเรื่องตกหล่น......"
34270-206 = "ตกหล่นเหรอ? ก็จ่ายค่าจ้างไปเรียบร้อยแล้วนี่นา"
34270-207 = "ค่ะ ชะ... ชะ... ใช่ค่ะ พะ... เพราะงั้น..."
34270-211 = "ยะ... ยกโทษ..."
34270-212 = "ยกโทษ?"
34270-214 = "ยกโทษให้ไม่ได้...!!!!!!!"
34270-224 = "ฮะ... เฮือก!!  ช่วยด้วย...!"
34270-225 = "ยักยอกเงินของท่านอารุไปได้ยังไง แบบนี้ยกโทษให้ไม่ได้!!!"
34270-237 = "แฮ่ก... แฮ่ก..."
34270-238 = "ทะ... ท่านอารุบอกให้ฉันมาทักทาย... ละ... แล้วก็ปิดบัญชีซะ... พะ... เพราะงั้น..."
34270-239 = "คะ... แค่นี้คงเป็นการทักทายที่เพียงพอแล้วใช่ไหมคะ...?"
34270-240 = "......."
34270-241 = "อ๊ะ...!?  มีท่านอื่นอยู่ด้วยเหรอเนี่ย?!"
34270-242 = "ขะ... ขออภัยที่ก่อความวุ่นวายนะคะ!!"
34270-243 = "มะ... ไม่เป็นไรหรอก"
34270-244 = "งะ... งั้นไว้พบกันใหม่ค่ะ… ฉันต้องไปวางระเบิด..."
34270-248 = "วิถีของพวกนอกกฎหมายเป็นอย่างนี้เองเหรอ..."
34270-251 = "วะ... ว่าไงนะ...?!"
34270-253 = "ขะ... ขอโทษค่ะ ขอโทษนะคะ ขอโทษจริงๆ ค่ะ... นะ... นั่นมันไม่ใช่การทักทายที่ดีเท่าไร...#nขะ... ขอโทษที่ทำให้ยุ่งยากนะคะ หะ... ให้ฆ่าเลยไหมคะ? เอาเลยไหมคะ?"
34270-254 = "เฮ้อ..."
34270-255 = "ฮ่ะฮ่ะฮ่ะฮ่าฮ่าา! ตลกชะมัดเลย ฮารุกะทำถูกแล้วละ"
34270-256 = "แต่ฝั่งนู้นมีแต่คนน่ากลัวทั้งนั้นเลย ทีนี้จะทำยังไงกันดีล่ะ? หืม?"
34270-257 = "คงจะต้องวุ่นวายอีกแล้วสินะ... ไม่ได้พักเลย... เฮ้อ..."

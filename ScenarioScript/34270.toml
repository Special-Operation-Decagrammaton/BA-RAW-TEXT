[translation]
34270-1 = "第27話;エピローグ"
34270-7 = "こ、こっちの道は初めてです……。"
34270-8 = "どこに繋がっているんでしょうか……。"
34270-9 = "とりあえず進んでみよう。"
34270-10 = "どこだって、これから私たちが初めて歩く道だから。"
34270-11 = "はい……そうですね。"
34270-15 = "……あれ。"
34270-16 = "り、リーダーは！？"
34270-17 = "あれ？"
34270-18 = "た、たしかリーダー後ろにいたはずなんですが………#nい、いなくなりました！？"
34270-20 = "……チッ。"
34270-21 = "ミサキ……？"
34270-22 = "リーダーは、どっか行ったよ……。"
34270-23 = "ど、どっか行ったって、なんですか！？"
34270-24 = "私に、みんなを頼むって言い残して……勝手だよね。"
34270-25 = "リーダー……ど、どうして……。"
34270-26 = "……。"
34270-27 = "ずるいよサオリ。#nこんな風に足枷を残すなんて……。"
34270-28 = "私には、重すぎる……。"
34270-29 = "……大丈夫、ミサキ。"
34270-30 = "姫……。"
34270-35 = "サオリには、もう少しだけ時間が必要なんだ。"
34270-36 = "――己を振り返り、自身を知る時間が。"
34270-37 = "自分の命題に答えるための時間が……。"
34270-38 = "リーダーは……サオリ姉さんは、帰ってくるんでしょうか？"
34270-39 = "うん……サッちゃんは帰ってくるよ。"
34270-40 = "今後、私たちだけで……生きていかないといけないんですか？"
34270-41 = "うん……いつまでもサッちゃん頼りじゃいけないからね。"
34270-43 = "そんな……"
34270-44 = "私たちは、これからどうすればいいの……？"
34270-45 = "アリウス自治区にも、トリニティにも、ゲヘナにも……私たちの居場所はない。"
34270-46 = "……追撃から逃げるために、街を転々とし続ける事になると思う。"
34270-47 = "私たちを待ち受けているのは、そんな未来だよ……姫。"
34270-48 = "うん……それでも、私たちは大丈夫。"
34270-49 = "……。"
34270-50 = "姫ちゃん……。"
34270-51 = "姫……簡単なことじゃないよ。"
34270-52 = "ううん、大丈夫だよ。"
34270-53 = "……。"
34270-54 = "こんな事で弱音を吐いたら、コンクリートに咲いてる花に失礼だからね。"
34270-55 = "アズサはあの時、花を見てこう言ってた。"
34270-60 = "それがたとえ虚しいことであっても……抵抗し続けることを止めるべきじゃないと。"
34270-61 = "アズサがやり遂げているのだから、私たちもできないわけないよ。#n私たちの青春は、私たちだけのものだから。"
34270-62 = "ちゃんと見守ってくれる人もいるし……そうでしょう？"
34270-68 = "……先生、ですね。"
34270-69 = "……うん。"
34270-70 = "そうだね……。"
34270-72 = "うん、一緒に頑張ろう。"
34270-76 = "……。"
34270-86 = "……ククッ。見たことのない顔ですね。#nここまで流れてきたということは、それなりの事情がおありなのでしょう。"
34270-87 = "実力さえあれば何でも構いません。#nさて、どんな依頼をお望みですか？#n簡単なもの？難しいもの？"
34270-89 = "難しいやつで……いや、どれほど不可能な依頼でも解決してみせよう。#n依頼料が高い任務をくれ。"
34270-94 = "（私は犯罪者だ――追われる身でもあるし、この先は辛く苦しい日々が続くだろう）"
34270-95 = "（しかし、その苦難の旅路の果てに……）"
34270-96 = "（私たちにも素晴らしい未来があるというのなら……）"
34270-100 = "うん、訪れるよ……私たちにも……"
34270-101 = "……最後には、きっとハッピーエンドを迎えられる。"
34270-102 = "私たちもそうだよね、サオリ。"
34270-125 = "……。"
34270-130 = "……。"
34270-135 = "……。"
34270-138 = "先生……私は、もう予知夢を視る事はないだろう。"
34270-139 = "其れが――かの夢から抜け出すための代償だった。"
34270-140 = "最後の予知夢で目撃した事……其れを、先生と議論しなければならない……。"
34270-147 = "だが……其れは、もう少し未来でも良いだろうか？"
34270-148 = "今はただ……此処に集まっている、私たちの「現在」に注力したいから。"
34270-149 = "そして……私たちは……"
34270-150 = "今までのように力を合わせ――努力を重ねて、その試練を乗り越えるから。"
34270-152 = "[ns] \"それじゃあ、聴聞会を始めようか。\""
34270-169 = "待て、約束が違うぞ。"
34270-170 = "はて、何の事でしょうか？"
34270-171 = "これはなんだ？#n予定額の半分も入っていないぞ！！"
34270-172 = "先に約束を破ったのはそちらですが。"
34270-173 = "こちらの契約書にも書かれておりますように、生徒は時給1000円です。"
34270-174 = "ところが、あなたは中退ということを隠したじゃありませんか？#nだから時給500円です。"
34270-175 = "ちょっと待て……それは……"
34270-176 = "そこに税金と各種費用、食費を除いたのがこの金額ですが……何か問題でも？"
34270-177 = "ああ……それに、指名手配までされているようですが。#nこの事実が知られたら困るのはそちらではないのですか？"
34270-178 = "ということで、口止め料としてさらに15%差し引かせていただきます。"
34270-180 = "ま、待て……それじゃあ私の給料は……。"
34270-186 = "0円ですね。"
34270-187 = "さあ、では出口はあちらです。"
34270-188 = "何か言いたいことでも？#nそれともヴァルキューレ警察学校にでも訴えてみますか？"
34270-193 = "……いや、分かった。"
34270-194 = "教訓を得たということにしよう。"
34270-203 = "し、失礼します。"
34270-204 = "あなたは……この間、依頼をした……！？"
34270-205 = "あ、はい……え、えっと……。#nうっかりしてしまって……。"
34270-206 = "精算は済ませたはずですが。"
34270-207 = "は、はい……そ、そ、そうです。#nその通りです……だ、だから……。"
34270-211 = "ゆ、許せ……"
34270-212 = "ゆるせ？"
34270-214 = "許せません！！！！！！！"
34270-224 = "ひ、ひいぃっ！？た、助けて！？"
34270-225 = "アル様のお金を踏み倒すなんて、絶対許せません！！！"
34270-237 = "……はぁ、はぁ。"
34270-238 = "あ、アル様が、ちゃんと挨拶して……#nし、しっかりと計算してくるようにって……だ、だから……。"
34270-239 = "こ、これでしたら、ちゃんと、挨拶になりましたよね……？"
34270-240 = "……。"
34270-241 = "あ、ああっ……！？#n他の方がいらっしゃっていたなんて！？"
34270-242 = "お、お騒がせし、た、大変失礼しました！！"
34270-243 = "……いや、別に。"
34270-244 = "で、では、また今度……#n私は爆弾を設置しに行かなければならないので……。"
34270-248 = "これが、裏世界のやり方か……。"
34270-251 = "なっ、何ですってーーーー！？"
34270-253 = "ご、ごめんなさい……ごめんなさい……ごめんなさい……。#n「挨拶」ってそういうのではなかったなんて……ま、またご迷惑をかけてしまいました。し、死にましょうか？死んでもいいですか？"
34270-254 = "……はぁ。"
34270-255 = "あははははは！超ウケる！！#nハルカちゃん本当に挨拶してるー。"
34270-256 = "そこ、すっごく怖そうな連中だったのに、これからどうするのー？"
34270-257 = "また騒がしくなりそう……はぁ。"

[translation]
1007102-1 = "SRT, Gear Up!"
1007102-3 = "I went to the rendezvous coordinates Miyako sent me, but when I got there..."
1007102-5 = "D.U. Central Department Store"
1007102-7 = "[ns] \"This can't be right...\""
1007102-8 = "I couldn't make heads or tails of what kind of military equipment she would get at a department store..."
1007102-12 = "Ah, Sensei. There you are."
1007102-13 = "I'm glad you've arrived safely."
1007102-14 = "Now that we have successfully rendezvoused, we can continue to our destination."
1007102-15 = "[s] \"Hold on a second, Miyako.\""
1007102-19 = "Hm? Is there a problem?"
1007102-20 = "[s1] \"We are here on an operation, right?\"\n[s2] \"This seems to be a department store...\""
1007102-23 = "Oh... I understand."
1007102-24 = "It must have slipped my mind to explain the details. I apologize."
1007102-25 = "[s3] \"There's nothing to apologize for...\"\n[s4] \"Mind explaining what we're doing here?\""
1007102-28 = "A while back, I received a gift certificate for this store as a thank-you from someone I'd helped."
1007102-29 = "I tried to refuse, but they insisted that I use it on supplies for the squad. It seems the certificate was due to expire soon, anyway, and they didn't want it going to waste."
1007102-30 = "I decided to buy equipment for SRT's summer operation, but the variety of items in the department store was... overwhelming..."
1007102-31 = "Back at the academy, they just gave us whatever we needed..."
1007102-32 = "Since I'm on a budget, I'd like your help, Sensei. You can help me make sure none of it goes to waste."
1007102-33 = "[s5] \"I don't know much about camping supplies, but I'll do my best.\"\n[s6] \"We can figure this out together.\""
1007102-36 = "Thank you, Sensei."
1007102-40 = "The first thing on my list is something to protect our electronic equipment from rain and moisture..."
1007102-42 = "Soon after, Miyako and I were walking the department store, shopping for supplies."
1007102-45 = "...Hmm. So if we buy the salt tablets in bulk, we can get a much better deal per tablet."
1007102-46 = "Thank you, Sensei. I've saved a good deal of money with your help."
1007102-47 = "[s] \"Don't mention it.\""
1007102-48 = "Most of us don't have very much life experience, and that lack of experience can become expensive."
1007102-49 = "I'm glad I have an adult like you to help in situations like this."
1007102-50 = "Now, the last thing on my list is..."
1007102-54 = "Uh... Here...?"
1007102-55 = "[s] \"This is the swimsuit section.\""
1007102-56 = "There are so many different kinds..."
1007102-57 = "I do need a new swimsuit so I'm prepared for any amphibious operations."
1007102-58 = "We left the academy in such a hurry, I couldn't pack my standard issue swimsuit..."
1007102-59 = "Let's see..."
1007102-67 = "This is...ah...cute..."
1007102-68 = "[s] \"You like that one?\""
1007102-72 = "Yes... Er, n-no!"
1007102-73 = "Well... I mean..."
1007102-77 = "Yes. It's certainly cute enough."
1007102-78 = "But it's hardly practical for a combat mission, is it?"
1007102-79 = "Those ruffles could impede mobility, and there's nowhere to store my gear..."
1007102-80 = "I'd be much better served by this suit. It's not very flattering, but the material is sturdy and it has pockets."
1007102-81 = "[s7] \"Isn't it a bit conspicuous, though?\"\n[s8] \"A cute swimsuit will help you blend in with tourists on the beach.\""
1007102-84 = "Y-You bring up a good point, yes..."
1007102-85 = "But I'm the leader of a special forces unit, and there's certain gear I can't do without."
1007102-86 = "There are radios to communicate with the squad, spare ammunition, a first aid kit..."
1007102-87 = "No matter how much I can pare my kit down, I still need somewhere to store it."
1007102-88 = "In that sense, I really can't afford to choose a swimsuit just because it's cute..."
1007102-89 = "[ns] \"If that's the problem, then I'll carry your gear for you.\""
1007102-90 = "That's nice of you to say, but I need to have my gear in reach at all times when I'm in the field."
1007102-91 = "I can't expect to run off to find you every time I need something, so—"
1007102-92 = "[ns] \"Don't worry about it!\""
1007102-96 = "[ns] \"I'll always be by your side in the field.\""
1007102-103 = "...All right!"
1007102-105 = "With that, Miyako and I bought the cute swimsuit and returned to Kousagi Park."

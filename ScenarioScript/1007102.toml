[translation]
1007102-1 = "SRT，購買"
1007102-3 = "（都子傳來的座標是個意料之外的地方）"
1007102-5 = "D.U.中央百貨公司前"
1007102-7 = "[ns]「……真的是這裡沒錯嗎？」"
1007102-8 = "（由於是個與作戰用的裝備似乎沒什麼關連的地方，#n　正在思考是不是搞錯座標時……）"
1007102-12 = "啊，老師。你已經到了啊，我在這裡。"
1007102-13 = "看老師順利抵達，我也放心了。"
1007102-14 = "那麼，既然已成功會合，直接前往目標地點……"
1007102-15 = "[s]「先等一下，都子。」"
1007102-19 = "有什麼問題嗎……？"
1007102-20 = "[s1]「你說要商量與SRT的裝備有關的事對吧。」\n[s2]「那麼為什麼會來百貨公司……？」"
1007102-23 = "啊……確實是呢。"
1007102-24 = "是我沒有說明清楚。真是抱歉。"
1007102-25 = "[s3]「沒關係，你不用感到抱歉。」\n[s4]「我只是好奇原因而已。」"
1007102-28 = "那個……不久前，我從委託人手中收到了百貨公司的商品券。"
1007102-29 = "由於金額實在太高，我一開始也拒絕了他，#n可是對方表示自己沒打算用且期限快到了，所以希望我能收下……"
1007102-30 = "既然難得有這個機會，我打算購買夏日作戰所需的裝備。#n但是百貨公司的商場比想像中還廣大……"
1007102-31 = "在SRT學園時都是靠補給品生活……所以還不太習慣外出購物。"
1007102-32 = "為了避免浪費商品券，希望老師能給我一些建議。"
1007102-33 = "[s5]「我也不太了解露營用品……」\n[s6]「不過我會盡可能幫忙的。」"
1007102-36 = "謝謝你，老師。"
1007102-40 = "那麼先去看看能夠幫助電子設備隔絕雨水跟濕氣的遮蔽物吧。"
1007102-42 = "（隨後和都子一起逛百貨公司，購買了夏日露營需要的物品）"
1007102-45 = "……原來如此。藥片之類的消耗品如果大量購入的話會更加便宜呢。"
1007102-46 = "謝謝你，老師。#n託老師的福省下了不少錢。"
1007102-47 = "[s]「這沒什麼。」"
1007102-48 = "像我們這種不諳世事的孩子，很容易因見識淺薄而吃虧。"
1007102-49 = "這種時候如果能獲得一些值得信賴的大人的建議，真的非常有幫助。"
1007102-50 = "剩下的必需品還有……"
1007102-54 = "咦，這裡是……？"
1007102-55 = "[s]「是泳裝區呢。」"
1007102-56 = "各式各樣的泳裝……居然有這麼多。"
1007102-57 = "對了，為了應對水下作戰，有必要準備一件新的泳裝。"
1007102-58 = "離開SRT學園時實在沒什麼餘裕，所以沒能把泳裝帶走……"
1007102-59 = "呼呣……"
1007102-67 = "啊，這件……好可愛……"
1007102-68 = "[s]「你喜歡這件泳裝嗎？」"
1007102-72 = "啊……沒，沒有……"
1007102-73 = "那，那個……"
1007102-77 = "確實是很吸引我沒錯……"
1007102-78 = "不過這種泳裝並不適合作戰……"
1007102-79 = "荷葉邊似乎會妨礙行動，而且沒有口袋，要攜帶裝備好像也有困難。"
1007102-80 = "所以還是選這邊這件材質強韌而且有口袋的泳衣比較好。"
1007102-81 = "[s7]「任務也是有很多種類的吧，比如說……」\n[s8]「要融入觀光客的話，我覺得可愛的泳裝比較有效哦。」"
1007102-84 = "老，老師這麼一說，確實讓我有點煩惱……"
1007102-85 = "身為RABBIT小隊的小隊長，有必要隨身攜帶最低限度的裝備。"
1007102-86 = "像是用來共享情報的無線電、備用彈藥……#n以及為了預防萬一準備的應急處理套組……"
1007102-87 = "無論裝備再怎麼輕量化，終究還是需要收納空間。"
1007102-88 = "……所以，果然……比起我個人的喜好，還是應該優先考慮實用性吧。"
1007102-89 = "[ns]「……沒空間放的話，我可以幫你拿。」"
1007102-90 = "謝謝老師願意這麼說，不過何時會需要什麼樣的裝備我們無從得知。"
1007102-91 = "不能每次需要裝備都去找老師──"
1007102-92 = "[ns]「這一點你不用擔心。」"
1007102-96 = "[ns]「因為作戰中我會一直待在都子身邊。」"
1007102-103 = "……是！"
1007102-105 = "（之後買下了可愛的泳裝，和都子一起回到兔寶寶公園）"

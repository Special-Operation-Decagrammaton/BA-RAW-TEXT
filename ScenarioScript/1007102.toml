1007102-66 = "3;미야코;01\n#3;greeting\n#3;h\n#wait;1700"
1007102-67 = "3;미야코;03;아, 이거…… 귀여워…….\n#3;em;[반짝]\n#fontsize;50"
1007102-68 = "[s] \"그 수영복이 마음에 든 거야?\""

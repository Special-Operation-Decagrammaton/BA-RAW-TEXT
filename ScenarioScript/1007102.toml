1007102-77 = "3;미야코;06;……네. 확실히 마음에 드는 귀여운 수영복이긴 하지만요……"
1007102-78 = "3;미야코;99;이렇게 귀여운 수영복을 입고 작전을 하기는 어려울 테니까요."
1007102-79 = "3;미야코;09;이 수영복은 프릴 때문에 움직임도 거추장스럽고, 수납공간도 없어 장비를 휴대하기도 불편하고……"
1007102-80 = "3;미야코;02;조금 모양은 투박하더라도 소재가 튼튼하고 주머니도 많이 달린, 이 비치웨어를 고르는 편이 더 좋을 것 같아요.\n#3;em;[반응]"
1007102-81 = "[s7] \"하지만 언제나 눈에 띄지 않는 장소에서만 작전을 할 순 없잖아?\"\n[s8] \"해변의 관광객 사이에 섞이려면 귀여운 수영복이 더 효과적일 거야.\""
1007102-82 = "#wait;10"
1007102-83 = "#wait;10"
1007102-84 = "3;미야코;04;그, 그렇게 말씀하시니 조금 고민이 되기도 하지만……\n#3;em;[땀]\n#3;stiff"
1007102-85 = "3;미야코;06;하지만 그래도 특수 부대의 소대장이라면 최소한의 장비는 갖추고 있어야 하는걸요."
1007102-86 = "3;미야코;01;소대원들에게 상황을 전파하기 위한 무전 장비부터, 예비 탄환, 만일의 때를 대비한 응급처치 장비까지……"
1007102-87 = "3;미야코;99;장비를 아무리 경량화한다 하더라도 최소한의 수납공간은 필요합니다."
1007102-88 = "3;미야코;02;……그런 의미에서 개인의 취향보다는 실용성을 택하는 편이 훨씬 더 가치 있겠지요.\n#3;em;…"
1007102-89 = "[ns] \"……손이 모자란다면 내가 대신 들어줄게.\""
1007102-90 = "3;미야코;04;말씀은 감사하지만, 특수부대원은 손이 가는 위치에 모든 장비를 두고 있어야 합니다."
1007102-91 = "3;미야코;99;작전 중에 장비가 필요할 때마다 선생님을 찾을 수는 없으니—"
1007102-92 = "[ns] \"그런 거라면 걱정하지 않아도 괜찮아.\""

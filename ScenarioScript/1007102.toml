[translation]
1007102-1 = "SRT ปฏิบัติการซื้อของ!"
1007102-3 = "(สถานที่ที่มิยาโกะส่งโลเคชันมาให้ก็คือ...)"
1007102-5 = "ด้านหน้าห้างสรรพสินค้า เขต D.U."
1007102-7 = "[ns] \"ที่นี่มัน... ห้างสรรพสินค้า?\""
1007102-8 = "(ขณะที่คุณครูกำลังตกใจ เพราะได้มาถึงสถานที่ที่ดูไม่เกี่ยวข้องกับปฏิบัติการอยู่นั้นเอง...)"
1007102-12 = "อ๊ะ มาแล้วเหรอคะคุณครู ฉันอยู่ทางนี้ค่ะ"
1007102-13 = "ค่อยยังชั่วที่มาถึงโดยปลอดภัยค่ะ"
1007102-14 = "เอาละค่ะ ตอนนี้ก็มาเจอกันได้อย่างปลอดภัยแล้ว ต่อไปก็เคลื่อนย้ายไปยังจุดหมาย..."
1007102-15 = "[s] \"เดี๋ยวก่อนนะ มิยาโกะ...\""
1007102-19 = "คะ...? มีอะไรเหรอคะ...?"
1007102-20 = "[s1] \"เธอมีเรื่องจะปรึกษาเรื่องปฏิบัติการไม่ใช่เหรอ?\"\n[s2] \"เรามาที่ห้างสรรพสินค้าทำไมกันน่ะ...?\""
1007102-23 = "อ่า... นะ...นั่นสินะคะ"
1007102-24 = "ขอโทษด้วยค่ะ ฉันใจร้อนไปหน่อยก็เลยไม่ได้อธิบายให้ชัดเจนค่ะ"
1007102-25 = "[s3] \"ไม่เป็นไร ไม่ต้องขอโทษหรอก\"\n[s4] \"ครูแค่สงสัยเฉยๆ น่ะ\""
1007102-28 = "คือว่า... ฉันได้บัตรกำนัลของห้างสรรพสินค้าจากชาวเมืองที่เคยไปช่วยเหลือเรื่องเล็กๆ น้อยๆ มาน่ะค่ะ"
1007102-29 = "ตอนแรกฉันก็ปฏิเสธไป เพราะมูลค่ามันเยอะมากก แต่คุณคนนั้นบอกว่าตัวเขาเองไม่มีของที่อยากได้ และบัตรกำนัลนี้ก็มีอายุใช้งานจำกัด ถ้าไม่ใช้ก็คงน่าเสียดาย ก็เลยให้บัตรกำนัลนั้นกับฉันมาซื้อของที่#nจำเป็นแทนค่ะ"
1007102-30 = "เพราะงั้นฉันเลยคิดว่าจะเอามาใช้ซื้ออุปกรณ์ที่จำเป็นสำหรับปฏิบัติการฤดูร้อนของ SRT ตามที่บอก#nไปทาง MOMOTALK ค่ะ แต่ว่าที่ห้างใหญ่ๆ แบบนี้มีของเยอะมาก..."
1007102-31 = "ที่สถาบัน SRT จะมอบเสบียงจำเป็นสำหรับการดำรงชีวิตมาให้เลย เพราะงั้นฉันเลยไม่ค่อยชินกับการ#nออกมาซื้อของเองแบบนี้น่ะค่ะ"
1007102-32 = "ก็เลยอยากได้คำแนะนำจากคุณครูเพื่อซื้อของที่จำเป็นให้คุ้มค่ากับเงินที่มีอยู่อย่างจำกัดค่ะ"
1007102-33 = "[s5] \"ครูเองก็ไม่ค่อยรู้เรื่องของใช้สำหรับตั้งแคมป์เท่าไร...\"\n[s6] \"ครูจะพยายามช่วยให้ได้มากที่สุดนะ\""
1007102-36 = "ขอบคุณค่ะ คุณครู"
1007102-40 = "ถ้างั้นก่อนอื่น พวกเราไปดูอุปกรณ์ป้องกันอุปกรณ์ไฟฟ้าจากความชื้นหรือฝนตกกันก่อนดีมั้ยคะ?"
1007102-42 = "(หลังจากนั้น คุณครูกับมิยาโกะก็เดินดูของรอบๆ เพื่อซื้อของจำเป็นสำหรับตั้งแคมป์)"
1007102-45 = "...อย่างนี้นี่เอง ของใช้อย่างพวกเกลือบริสุทธิ์อัดเม็ด ถ้าซื้อเป็นแพ็กในปริมาณเยอะละก็ จะซื้อได้ใน#nราคาที่ถูกลงมากเลยสินะคะ"
1007102-46 = "ขอบคุณค่ะ คุณครู วันนี้มีคุณครูมาด้วย เลยซื้อของได้อย่างคุ้มค่ามากเลยค่ะ"
1007102-47 = "[s] \"ครูไม่ได้ทำอะไรสักหน่อย...\""
1007102-48 = "เด็กที่ตามโลกไม่ค่อยทันแบบพวกเรา มักจะถูกหลอกได้ง่ายๆ ค่ะ"
1007102-49 = "ในเวลาแบบนี้ คำแนะนำของผู้ใหญ่ก็ช่วยได้มากจริงๆ ค่ะ"
1007102-50 = "ถ้างั้น ก็เหลืออีกแค่อย่างเดียว..."
1007102-54 = "เอ๋? ที่นี่คือ...?"
1007102-55 = "[s] \"มุมขายชุดว่ายน้ำนี่นา\""
1007102-56 = "มีชุดว่ายน้ำเยอะแยะเต็มไปหมดเลยค่ะ..."
1007102-57 = "พอมาลองคิดๆ ดูแล้ว ฉันควรเตรียมชุดว่ายน้ำสำหรับภารกิจในทะเลเอาไว้สักชุดด้วยสินะคะ"
1007102-58 = "ตอนออกมาจากสถาบัน SRT มันฉุกละหุกมากก็เลยไม่มีเวลาหยิบพวกชุดว่ายน้ำออกมาด้วยเลยค่ะ"
1007102-59 = "ไหนดูซิ..."
1007102-67 = "อ๊ะ ชุดนี้... น่ารักจัง..."
1007102-68 = "[s] \"ชอบชุดนั้นเหรอ?\""
1007102-72 = "อ๊ะ... คะ? ปะ...เปล่าค่ะ"
1007102-73 = "คะ... คือว่า..."
1007102-77 = "...ค่ะ ชุดนี้น่ารักถูกใจฉันมากเลยค่ะ..."
1007102-78 = "แต่ว่าถ้าใส่ชุดว่ายน้ำน่ารักๆ แบบนี้ไปทำภารกิจ มันคงจะไม่สะดวกเท่าไรค่ะ"
1007102-79 = "ชุดว่ายน้ำที่เป็นระบายๆ แบบนี้จะทำให้เคลื่อนไหวไม่คล่องตัว และดูไม่ค่อยสะดวกเพราะมันไม่มี#nช่องสำหรับเก็บอุปกรณ์พกพาด้วย..."
1007102-80 = "เพราะงั้นถึงจะเป็นชุดที่ดูเรียบๆ แต่ถ้าเป็นชุดที่เนื้อผ้าแข็งแรง และมีช่องสำหรับใส่ของได้เยอะๆ อย่างชุดว่ายน้ำทั่วไปน่าจะเป็นตัวเลือกที่ดีกว่าค่ะ "
1007102-81 = "[s7] \"แต่พวกเธอไม่ได้ปฏิบัติการแค่ในพื้นที่ลับตาคนเสมอไปนี่นา?\"\n[s8] \"ถ้าแฝงตัวกับนักท่องเที่ยวริมหาด เลือกชุดที่น่ารักๆ จะดีกว่านะ\""
1007102-84 = "ทะ...ที่คุณครูพูดมา มันก็น่าคิดอยู่นะคะ..."
1007102-85 = "แต่ถึงจะเป็นแบบนั้น ถ้าเป็นหัวหน้ากองกำลังพิเศษละก็ อย่างน้อยก็ควรเตรียมอุปกรณ์ไว้ให้พร้อมค่ะ"
1007102-86 = "ตั้งแต่อุปกรณ์ไร้สายสำหรับแจ้งสถานการณ์ให้กับสมาชิกกอง กระสุนปืนสำรอง หรือพวกอุปกรณ์ทำ#nแผลฉุกเฉิน..."
1007102-87 = "ถึงพวกอุปกรณ์จะมีน้ำหนักเบา แต่ก็ต้องใช้พื้นที่สำหรับเก็บของพอสมควรเลยค่ะ"
1007102-88 = "...เพราะงั้นการเลือกชุดที่มีประสิทธิภาพ น่าจะเหมาะสมกว่าเลือกชุดตามรสนิยมส่วนตัวค่ะ"
1007102-89 = "[ns] \"...ถ้าเก็บไม่หมด ครูช่วยเก็บให้ก็ได้นะ\""
1007102-90 = "ขอบคุณค่ะคุณครู แต่ว่าสมาชิกหน่วยรบพิเศษควรมีอุปกรณ์อยู่ใกล้มือให้พร้อมใช้ได้ตลอดเวลาค่ะ"
1007102-91 = "เวลาที่จำเป็นจะต้องใช้อุปกรณ์ระหว่างทำภารกิจ ฉันคงจะไปหาคุณครูทุกครั้งไม่ได้..."
1007102-92 = "[ns] \"ไม่ต้องเป็นห่วงเรื่องนั้นหรอกนะ\""
1007102-96 = "[ns] \"ครูจะอยู่ตัวติดกับมิยาโกะตลอดระหว่างที่ปฏิบัติภารกิจเลย\""
1007102-103 = "...งั้นก็ได้ค่ะ!"
1007102-105 = "(หลังจากซื้อชุดว่ายน้ำน่ารักๆ เสร็จแล้ว คุณครูกับมิยาโกะก็กลับไปที่โคะอุซางิ การ์เด้นด้วยกัน)"

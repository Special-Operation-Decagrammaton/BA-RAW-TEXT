[translation]
1007102-1 = "#title;SRT, 구입합니다."
1007102-2 = "#wait;3000"
1007102-3 = "#na;(미야코가 보내준 좌표를 따라 도착한 곳은 다름 아닌…….)"
1007102-4 = "#all;hide"
1007102-5 = "#place;D.U. 중앙백화점 앞"
1007102-6 = "#wait;1000"
1007102-7 = "[ns] \"여긴…… 백화점?\""
1007102-8 = "#na;(작전과는 전혀 상관없어 보이는 의외의 장소에 도착한 탓에 혼란스러워하고 있노라니……)"
1007102-9 = "#st;[0,0];instant;1;"
1007102-10 = "#clearST"
1007102-11 = "3;미야코;02\n#3;em;[반응]\n#3;a\n#wait;1200"
1007102-12 = "3;미야코;03;아, 선생님. 오셨군요. 여기예요.\n#3;m3"
1007102-13 = "3;미야코;07;무사히 도착하신 것 같아 다행이네요.\n#3;em;[반짝]\n#3;greeting"
1007102-14 = "3;미야코;03;자. 그럼 접선도 무사히 마쳤으니, 이대로 목표 지점을 향해 이동을…….\n#3;m2"
1007102-15 = "[s] \"잠시 기다려 줘, 미야코.\""
1007102-16 = "#st;[0,0];instant;1;"
1007102-17 = "#clearST"
1007102-18 = "3;미야코;02\n#3;em;[?]\n#wait;1000"
1007102-19 = "3;미야코;01;……네? 무슨 문제라도……?\n#3;m3"
1007102-20 = "[s1] \"분명 작전과 관련된 상담이었지?\"\n[s2] \"그런데 어째서 백화점에…….\""
1007102-21 = "#wait;10"
1007102-22 = "#wait;10"
1007102-23 = "3;미야코;04;아…… 과연, 그렇군요.\n#3;em;[땀]\n#3;stiff"
1007102-24 = "3;미야코;06;마음이 급한 나머지 설명이 부족했던 것 같네요. 죄송합니다."
1007102-25 = "[s3] \"미안해하지 않아도 괜찮아.\"\n[s4] \"그저 이유가 궁금했을 뿐이니까.\""
1007102-26 = "#wait;10"
1007102-27 = "#wait;10"
1007102-28 = "3;미야코;02;그게…… 얼마 전 작은 도움을 드렸던 주민분께 이 백화점의 상품권을 선물로 받았습니다.\n#3;em;…"
1007102-29 = "3;미야코;01;너무 큰 액수였던지라 처음에는 거절하려 했지만, 주민분께서는 당장 사고 싶은 물건도 없는데 기한 내에 쓰지 않으면 무효가 되니, 대신 저희에게 필요한 물건을 사라고 권해주셔서요."
1007102-30 = "3;미야코;99;그래서 모모톡으로 말씀드린 것처럼 SRT의 여름 작전에 필요한 장비를 구입하려 했습니다만, 백화점에 구비된 물건의 종류가 생각보다 너무 다양해서……"
1007102-31 = "3;미야코;01;SRT 학원에서는 보급품을 받아서 생활했던지라, 이런 쇼핑에는 익숙지가 않아서요."
1007102-32 = "3;미야코;02;비용이 한정되어 있는 만큼, 돈을 허투루 쓰지 않기 위해 선생님의 조언을 받고 싶습니다.\n#3;em;[반응]"
1007102-33 = "[s5] \"나도 캠핑용품에 대해서는 잘 알지 못하지만……\"\n[s6] \"가능한 최대한 도와줄게.\""
1007102-34 = "#wait;10"
1007102-35 = "#wait;10"
1007102-36 = "3;미야코;03;감사합니다, 선생님.\n#3;greeting"
1007102-37 = "#st;[0,0];instant;1;"
1007102-38 = "#clearST"
1007102-39 = "3;미야코;03\n#3;m2\n#3;h\n#wait;1200"
1007102-40 = "3;미야코;07;그럼 우선, 비나 습기로부터 전자제품을 보호할 수 있는 방수용품을 보러 가 볼까요?\n#3;em;[반응]"
1007102-41 = "#all;hide"
1007102-42 = "#na;(이후, 미야코와 함께 백화점을 돌며 여름 캠핑에 필요한 물건을 구입했다.)"
1007102-43 = "#all;hide"
1007102-44 = "#wait;500"
1007102-45 = "3;미야코;02;……그렇군요. 이런 정제 소금 알약과 같은 소모품은 대용량 번들로 취급하면 훨씬 싸게 구입할 수 있군요.\n#3;a"
1007102-46 = "3;미야코;03;감사합니다, 선생님. 덕분에 돈을 충분히 아낄 수 있었던 것 같아요.\n#3;em;[반짝]\n#3;greeting"
1007102-47 = "[s] \"큰 도움을 준 것도 아닌데, 뭘.\""
1007102-48 = "3;미야코;02;저희 같은 세상 물정에 어두운 아이들은 시야가 좁아 손해를 보기 쉬우니까요."
1007102-49 = "3;미야코;99;이럴 때만큼은 어른의 조언이 정말 큰 도움이 되네요."
1007102-50 = "3;미야코;01;그럼 이제 마지막으로 남은 물건은……\n#3;m4"
1007102-51 = "#st;[0,0];instant;1;"
1007102-52 = "#clearST"
1007102-53 = "3;미야코;02\n#3;em;[반응]\n#3;h\n#wait;1000"
1007102-54 = "3;미야코;08;어라, 이곳은……?\n#3;stiff"
1007102-55 = "[s] \"수영복 코너네.\""
1007102-56 = "3;미야코;02;여러 종류의 수영복이…… 잔뜩 있네요.\n#3;m3"
1007102-57 = "3;미야코;99;그러고 보면 수중 작전을 대비하여 새 수영복도 하나 장만해야겠네요.\n#3;em;…"
1007102-58 = "3;미야코;01;SRT 학원에서 나올 때는 경황이 없어서 보급 수영복 같은 건 챙기지 못했으니까요."
1007102-59 = "3;미야코;02;어디……"

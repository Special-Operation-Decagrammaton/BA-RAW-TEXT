[translation]
1600406-1 = "此時此刻"
1600406-2 = "（菲娜指定的地點，是一家位於百鬼夜行自治區的餐廳）"
1600406-3 = "（在餐廳員工的帶領下來到了預定的包廂裡，一進去就看見菲娜坐在桌子旁）"
1600406-4 = "（……今天的菲娜散發著和平常不一樣的氣質）"
1600406-5 = "……您來了啊，老師。恭候多時了。"
1600406-6 = "[s1] 「……？」\n[s2] 「菲娜？」"
1600406-7 = "非常抱歉，菲娜沒有勇氣直接去找老師……"
1600406-8 = "非常抱歉，菲娜沒有勇氣直接去找老師……"
1600406-9 = "同時也由衷感謝老師特地勞駕來這裡一趟。"
1600406-10 = "[s3] 「咦……？」\n[s4] 「今天菲娜給人的感覺怎麼不太一樣……」"
1600406-11 = "因為今天很特別。"
1600406-12 = "因為今天是個特別的日子。"
1600406-13 = "今日為了和老師舉行一場特別的儀式，設席邀請老師……"
1600406-14 = "請喝下這個……"
1600406-15 = "[s5] 「……烏龍茶？」\n[s6] 「怎麼突然端茶出來？」"
1600406-16 = "……哼哼。"
1600406-17 = "……哼哼。"
1600406-18 = "這一點都不突然。今天老師要跟我……一起進行這場加深兩人關係的儀式。"
1600406-19 = "也就是所謂的「交杯酒」。"
1600406-20 = "喝下交杯酒，我和老師就終於能結下不解之緣了……"
1600406-21 = "……什麼？"
1600406-22 = "「交杯酒」用烏龍茶沒關係嗎……？"
1600406-23 = "……"
1600406-24 = "那，那是因為，該怎麼解釋呢……？"
1600406-25 = "總之，就是，那個……"
1600406-26 = "餐廳老闆說未成年不能喝酒……"
1600406-27 = "所以才用這個做代替……"
1600406-28 = "用烏龍茶果然還是不行嗎！？"
1600406-29 = "雖然我的確從來沒看過電影裡的人喝烏龍茶來結拜……！"
1600406-30 = "那，那麼……！"
1600406-31 = "現在這狀況，菲娜該怎麼辦才好呢……！？"
1600406-32 = "……咦？"
1600406-33 = "用茶來代替也沒關係嗎？"
1600406-34 = "[s7] 「畢竟老師怎麼能和學生一起喝酒呢。」\n[s8] 「而且我也沒有很喜歡喝酒，喝茶很好。」"
1600406-35 = "啊……"
1600406-36 = "啊……"
1600406-37 = "原，原來如此……"
1600406-41 = "（方才興奮站起來的菲娜，現在總算坐了下來）"
1600406-42 = "那，那麼！請讓我們從頭來過！"
1600406-43 = "老，老師也請趕快坐下吧！"
1600406-44 = "[ns] 走到菲娜對面的位置坐下"
1600406-48 = "這，這是！我們共度生死關頭之後，憑藉堅強羈絆結下的誓約……！"
1600406-49 = "雖，雖然菲娜還有很多不成熟的地方，不，不過今後……！"
1600406-50 = "……"
1600406-52 = "……今後也請老師多多指教了！！！"
1600406-56 = "― [log=피나]呼……總覺得，[/log][wa:2480] "
1600406-58 = "― [log=피나]好像多繞了一圈呢。[/log][wa:1210] "
1600406-61 = "― [log=피나]冷靜下來之後，[/log][wa:500] "
1600406-63 = "― [log=피나]突然覺得有點難為情……[/log][wa:2420] "
1600406-66 = "― [log=피나]……呵呵，其實……我之前就一直，[/log][wa:3300] "
1600406-68 = "― [log=피나]期待著這一天。[/log][wa:1620] "
1600406-71 = "― [log=피나]我……對今天這一天的到來，[/log][wa:2740] "
1600406-73 = "― [log=피나]真的感到很高興。[/log][wa:1100] "
1600406-76 = "― [log=피나]……老師總是，[/log][wa:1060] "
1600406-78 = "― [log=피나]會在我不知所措的時候引導我。[/log][wa:1800] "
1600406-81 = "― [log=피나]……並非只有今天，一直都是如此。[/log][wa:1560] "
1600406-84 = "― [log=피나]何謂重要的事物，[/log][wa:1660] "
1600406-86 = "― [log=피나]所謂只屬於自己的方式又是什麼……[/log][wa:1400] "
1600406-89 = "― [log=피나]要是沒有遇見老師，沒有學會這些道理……[/log][wa:2380] "
1600406-91 = "― [log=피나]一想到這些，就讓我不禁胸口沉悶。[/log][wa:1380] "
1600406-94 = "― [log=피나]……所以，我打從心底感謝著您。[/log][wa:2400] "
1600406-96 = "― [log=피나]老師，今後菲娜也……[/log][wa:2840] "
1600406-99 = "不……"
1600406-100 = "……不才小女。"
1600406-101 = "今後也請老師多多指教。"

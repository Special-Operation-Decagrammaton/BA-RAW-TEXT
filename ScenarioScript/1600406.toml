[translation]
1600406-1 = "At This Time..."
1600406-2 = "The meeting place was a restaurant in Hyakkiyako."
1600406-3 = "When I got there, I was guided to a reserved room. Pina was waiting, sitting on the other side of the table."
1600406-4 = "...She seemed kind of quiet, unlike her usual self."
1600406-5 = "...There you are, Sensei. I've been waiting."
1600406-6 = "[s1] \"...?\"\n[s2] \"Pina?\""
1600406-7 = "I'm sorry I didn't come to you myself..."
1600406-8 = "I'm sorry I didn't come to you myself..."
1600406-9 = "I really appreciate you coming all the way here."
1600406-10 = "[s3] \"...Huh\"\n[s4] \"You're acting a little weird...\""
1600406-11 = "Yes. It's natural for me to be more formal."
1600406-12 = "Yes. I mean, it's only natural."
1600406-13 = "I asked you to come so we could have a special ceremony."
1600406-14 = "...With this."
1600406-15 = "[s5] \"...Oolong tea?\"\n[s6] \"Why tea all of a sudden?\""
1600406-16 = "Heehee."
1600406-17 = "Heehee."
1600406-18 = "Today is the day we celebrate our trusting relationship."
1600406-19 = "This is called \"sharing a cup.\""
1600406-20 = "By sharing this cup, we'll form an inseparable bond..."
1600406-21 = "...?"
1600406-22 = "...Sharing is usually done with beer...but this is oolong tea..."
1600406-23 = "...Ehhh?"
1600406-24 = "...!!!"
1600406-25 = "Uh... Umm... Th-That's... So... Um..."
1600406-26 = "I-I asked the owner for some...but he said I can't drink because I'm underage..."
1600406-27 = "So he suggested oolong tea instead."
1600406-28 = "I-Is it that weird? Is the oolong tea not good enough?!"
1600406-29 = "I guess I've never seen anyone using oolong tea for this in movies... They all drank alcohol!"
1600406-30 = "I ruined it!"
1600406-31 = "Wh-What am I supposed to do now?!"
1600406-32 = "...?"
1600406-33 = "You think it's okay to do it with tea? B-But you just said..."
1600406-34 = "[s7] \"A teacher can't drink with a student.\"\n[s8] \"I don't like drinking all that much.\""
1600406-35 = "Ah!"
1600406-36 = "Ah!"
1600406-37 = "I-I see... Okay, that's good."
1600406-41 = "Pina picked up the tea cup and sat down."
1600406-42 = "As long as you're okay with it, then I'm okay too!"
1600406-43 = "Okay, okay! Sensei, please come and sit here!"
1600406-44 = "[ns] Go to the other side of the table and sit down."
1600406-48 = "Th-This is a promise between the two of us, a promise on our very lives!"
1600406-49 = "I-I-I know I'm not p-perfect...! But...I..."
1600406-50 = "..."
1600406-52 = "I'm looking forward to spending more time with you!"
1600406-56 = "― [log=피나]...Phew. I feel like...[/log][wa:1840] "
1600406-58 = "― [log=피나]I was nervous for no reason... [/log][wa:330] "
1600406-61 = "― [log=피나]Now that I've calmed down,[/log][wa:10] "
1600406-63 = "― [log=피나]I feel kind of embarrassed... [/log][wa:1660] "
1600406-66 = "― [log=피나]...Heehee. Actually...[/log][wa:3060] "
1600406-68 = "― [log=피나]I've been looking forward to this day for a long time.[/log][wa:10] "
1600406-71 = "― [log=피나]I'm...so glad we got to[/log][wa:2340] "
1600406-73 = "― [log=피나]have this ceremony today.[/log][wa:420] "
1600406-76 = "― [log=피나]...You helped me[/log][wa:700] "
1600406-78 = "― [log=피나]when I was in trouble.[/log][wa:1480] "
1600406-81 = "― [log=피나]Not just today, but you always do.[/log][wa:840] "
1600406-84 = "― [log=피나]You've taught me what's important[/log][wa:660] "
1600406-86 = "― [log=피나]and how to carry my own convictions...[/log][wa:520] "
1600406-89 = "― [log=피나]If I hadn't met you, I'd never know those things,[/log][wa:1180] "
1600406-91 = "― [log=피나]and that's sad to think about.[/log][wa:820] "
1600406-94 = "― [log=피나]...So, I sincerely thank you.[/log][wa:1840] "
1600406-96 = "― [log=피나]Sensei, I need you to...[/log][wa:2280] "
1600406-99 = "I mean..."
1600406-100 = "I want you to..."
1600406-101 = "I hope we can spend more and more time together."

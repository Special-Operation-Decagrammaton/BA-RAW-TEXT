1600406-2 = "#na;(약속장소로 잡힌 곳은 백귀야행에 존재하는 한 음식점.)"
1600406-3 = "#na;(도착하니 예약된 방이 있다며 안내를 받았다. 테이블 건너편에선 피나가 기다리고 있었다.)"

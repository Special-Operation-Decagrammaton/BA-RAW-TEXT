[translation]
1600406-1 = "สิ่งนี้ ณ เวลานี้"
1600406-2 = "(สถานที่นัดพบคือร้านอาหารแห่งหนึ่งที่อยู่ในเขตเฮียกคิยาโค)"
1600406-3 = "(พอมาถึงพนักงานก็พาคุณครูเข้าไปยังห้องที่จองเอาไว้ และพบว่าพีน่านั่งรอที่โต๊ะอยู่ก่อนแล้ว)"
1600406-4 = "(รู้สึกได้ถึงบรรยากาศที่นุ่มละมุนที่แตกต่างไปจากทุกที...)"
1600406-5 = "มาแล้วเหรอคะคุณครู กำลังรออยู่เลยค่ะ"
1600406-6 = "[s1] \"...?\"\n[s2] \"พีน่า?\""
1600406-7 = "ดิฉันเดินทางไปพบคุณครูด้วยตัวเองไม่ได้..."
1600406-8 = "ดิฉันเดินทางไปพบคุณครูด้วยตัวเองไม่ได้..."
1600406-9 = "เลยต้องเสียมารยาทขอให้คุณครูเดินทางมาพบดิฉันที่นี่... ต้องขออภัยอย่างสูงเจ้าค่ะ"
1600406-10 = "[s3] \"หืม...?\"\n[s4] \"วันนี้ดูแปลกๆ ไปนะ...\""
1600406-11 = "ช่วยไม่ได้นะเจ้าคะ"
1600406-12 = "ใช่แล้วค่ะ เรื่องนี้คงหลีกเลี่ยงไม่ได้เจ้าค่ะ"
1600406-13 = "ที่วันนี้ดิฉัน พีน่า... นัดพบกับคุณครูเป็นกรณีพิเศษ..."
1600406-14 = "ก็เพื่อสิ่งนี้ค่ะ"
1600406-15 = "[s5] \"ชาอู่หลง...?\"\n[s6] \"ทำไมจู่ๆ ชวนมาดื่มชาล่ะ?\""
1600406-16 = "ฮุฮุ..."
1600406-17 = "ฮุฮุ..."
1600406-18 = "ไม่ใช่จู่ๆ นะเจ้าคะ วันนี้เป็นวันที่จัดพิธีเพื่อกระชับความสัมพันธ์ ของคุณครูกับดิฉัน..."
1600406-19 = "ซึ่งพิธีนี้มีชื่อว่า <ดื่มสาบาน> ค่ะ "
1600406-20 = "เมื่อเราแบ่งกันดื่มด้วยแก้วเดียวกัน ตั้งแต่นี้ไปคุณครูกับฉันก็จะมีความสัมพันธ์ที่แยกจากกันไม่ได้..."
1600406-21 = "คะ...?"
1600406-22 = "\"ปกติแล้วพิธีแบ่งถ้วยจะใช้เวลาดื่มเหล้า... แต่ตอนนี้เรามีแค่ชาอู่หลงเอง\" งั้นเหรอคะ?"
1600406-23 = "เอ๋..."
1600406-24 = "เอ๋~~~?"
1600406-25 = "เอ่อ... อืม... เรื่องนั้น คะ... คือว่า..."
1600406-26 = "เมื่อกี้ตอนถามคุณลุงเจ้าของร้าน... คุณลุงบอกว่าฉันยังเป็นเด็กเลยขายเหล้าให้ไม่ได้..."
1600406-27 = "เลยให้ชาดื่มเป็นชาอู่หลงแทน..."
1600406-28 = "วะ...ว่าแล้วเชียวว่ามันแปลกๆ สินะคะ...? ใช้ชาอู่หลงไม่ได้สินะคะ?!"
1600406-29 = "ถึงในหนังที่ดูมาจะยังไม่เคยเห็นใครใช้ชาอู่หลงแทน... และส่วนใหญ่ก็ใช้เหล้ากันทั้งหมดก็เถอะ..."
1600406-30 = "แต่ในเมื่อเราใช้เหล้าไม่ได้ ก็โน ชอยส์ นะคะ...!!"
1600406-31 = "ถะ.. ถ้างั้นพีน่า... พะ...พีน่าควรทำยังไงดี...!!"
1600406-32 = "คะ...?"
1600406-33 = "ใช้ชาแทนก็ได้ไม่เป็นไรเหรอคะ? ถะ...ถ้างั้นเมื่อกี้คุณครู..."
1600406-34 = "[s7] \"ครูจะมานั่งดื่มเหล้ากับนักเรียนได้ยังไงล่ะ\"\n[s8] \"ครูไม่ค่อยชอบดื่มเหล้าเท่าไรน่ะ\""
1600406-35 = "อา..."
1600406-36 = "อา..."
1600406-37 = "งะ... งั้นเหรอคะ... ค่ะ แบบนี้นี่เอง..."
1600406-41 = "(พีน่าที่ถือแก้วชาอยู่ในมือค่อยๆ นั่งลง)"
1600406-42 = "ถะ...ถ้างั้น...! ในเมื่อคุณครูพูดแบบนั้นแล้ว พีน่าก็จะไม่เกรงใจแล้วนะเจ้าคะ! แต่ว่า... ไม่เป็นอะไรแน่ใช่มั้ยคะ?! ใช่มั้ยคะ?!"
1600406-43 = "เอาละค่ะ!! คุณครูเองก็รีบมานั่งเถอะค่ะ! เชิญด้านนี้ค่ะ!!"
1600406-44 = "[ns] เดินไปนั่งที่อีกฝั่งหนึ่ง"
1600406-48 = "นะ... นะ... นะ... นี่คือ... สัญญาของเรานะคะ สัญญาค่ะ! คำสาบานของฉันกับคุณครู... สัญญาที่เดิมพันด้วยชีวิต...!!"
1600406-49 = "ถะ... ถะ... ถะ... ถึงฉันจะยังบกพร่อง... นะ... นะ...ในหลายๆ เรื่อง...!! ตะ...แต่ว่าจากนี้ไป...!"
1600406-50 = "..."
1600406-52 = "ช่วยดูแลพีน่าต่อไปด้วยนะคะ"
1600406-56 = "― [log=피나]...ฮู่ว...รู้สึกเหมือน...[/log][wa:1760] "
1600406-58 = "― [log=피나]ตื่นเต้นมากๆ อยู่คนเดียวเลยละค่ะ... [/log][wa:130] "
1600406-61 = "― [log=피나]พอสงบจิตสงบใจลงได้แล้ว...[/log][wa:10] "
1600406-63 = "― [log=피나]ก็รู้สึกเขินขึ้นมานิดหน่อยยังไงก็ไม่รู้... [/log][wa:1140] "
1600406-66 = "― [log=피나]ฮุฮุ... ที่จริงตั้งแต่ก่อนหน้านี้แล้ว...[/log][wa:2340] "
1600406-68 = "― [log=피나]ฉันรอคอยวันนี้มาตลอดเลยค่ะ[/log][wa:860] "
1600406-71 = "― [log=피나]คือ... การที่ได้จัดพิธีดื่มสาบานขึ้นในวันนี้[/log][wa:1500] "
1600406-73 = "― [log=피나]ฉันดีใจมากๆ เลยค่ะ[/log][wa:700] "
1600406-76 = "― [log=피나]คุณครูน่ะ ไม่ว่าเมื่อไหร่... [/log][wa:180] "
1600406-78 = "― [log=피나]ในตอนที่ฉันลำบาก... ก็คอยช่วยฉันอยู่เสมอๆ[/log][wa:720] "
1600406-81 = "― [log=피나]ไม่ใช่แค่ในวันนี้ แต่เป็นทุกๆ ครั้งเลยค่ะ[/log][wa:560] "
1600406-84 = "― [log=피나]ทั้งเรื่องที่สอนให้รู้ว่าสิ่งสำคัญของฉันคืออะไร[/log][wa:100] "
1600406-86 = "― [log=피나]ทั้งวิธีการค้นหาเส้นทางตามแบบฉบับของตัวเองคืออะไร...[/log][wa:10] "
1600406-89 = "― [log=피나]ถ้าไม่ได้เจอกับคุณครู ฉันคงไม่ได้เรียนรู้สิ่งเหล่านี้[/log][wa:1020] "
1600406-91 = "― [log=피나]พอคิดแบบนั้น ก็รู้สึกฮาร์ท โบรเคนมากๆ เลยค่ะ[/log][wa:260] "
1600406-94 = "― [log=피나]เพราะงั้นแล้ว... ฉันขอขอบคุณจากใจจริงเลยค่ะ[/log][wa:1280] "
1600406-96 = "― [log=피나]คุณครู จากนี้ไปพีน่าก็ขอรบกวนด้วยนะคะ...[/log][wa:1640] "
1600406-99 = "ไม่สิ..."
1600406-100 = "ฉัน..."
1600406-101 = "ขอรบกวนด้วยนะคะ"

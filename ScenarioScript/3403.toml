3403-34 = "3;레이죠;07;저 카야마 레이죠와 무술연구부 여러분들은! 오늘부터 문주님의 쿵후 수련을 함께하겠습니다!\n#3;closeup"
3403-35 = "3;카구야;01;저희 경극부는! 오늘부터 문주님의 경극 연습을 전심전력으로 보좌하겠습니다!\n#3;closeup"

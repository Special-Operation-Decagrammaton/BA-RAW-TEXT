3403-49 = "1;카구야;05\n5;레이죠;05;어디에서 그런 뜬소문을 들으셨는지는 모르겠습니다만, 쿵후가 맞습니다. 이렇게 무술연구부 여러분도 함께하고 계시고요.\n#5;m4"
3403-50 = "5;레이죠;05\n1;카구야;05;허문(虛聞)을 논하고 계신 것은 오히려 레이죠 님인 것 같습니다. 분명히 경극 무용입니다. 그렇지 않다면 무엇 때문에 저희 경극부가 전원 이 자리에 모여 있겠습니까?\n#1;m2"
3403-51 = "#all;hide"
3403-52 = "3;코코나;11;선생님……? 문주님……?\n#3;em;[땀]"

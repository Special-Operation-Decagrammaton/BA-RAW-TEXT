[translation]
3403-1 = "A Slightly Special Morning in Shanhaijing 3"
3403-3 = "..."
3403-4 = "..."
3403-5 = "[ns] \"What...is...going...on...?\""
3403-6 = "Was I not scheduled to do morning exercises with the Plum Blossom Garden children and Instructor Kokona?"
3403-7 = "Kokona...? Madam...? What's going on...?"
3403-24 = "President Kaguya...? What brings the Peking Opera Club here...?"
3403-25 = "I believe that is my question to ask? Why is Reijo from the Black Tortoise Promenade, and the Martial Arts Research Club, here?"
3403-26 = "This is the strangest coincidence I've ever seen."
3403-27 = "I must agree. To wander around the world like duckweed, come back, and meet...this is what they would truly call a \"coincidence.\""
3403-28 = "Anyways, fine. The Martial Arts Research Club and I have business here.."
3403-29 = "As does the Peking Opera Club. Shall I say the word \"coincidence\" once more?"
3403-34 = "I, Kayama Reijo, and the Martial Arts Research Club! Will join Madam's kung fu training starting today!"
3403-35 = "The Peking Opera Club! Will assist Madam's Peking opera practice to our fullest starting today!"
3403-36 = "What?"
3403-37 = "Huh?"
3403-42 = "...What?"
3403-44 = "No, no. You've completely misunderstood. The president practices kung fu here at the White Tiger Park every day, early in the morning."
3403-45 = "It would appear you are the one who's mistaken, Reijo. What the president is doing is Peking opera practice...to be precise, Peking opera dance."
3403-47 = "No, I was only—"
3403-49 = "I'm not sure where you heard those baseless rumors, but it's kung fu. That's why the Martial Arts Research Club is here with me."
3403-50 = "You are the one advocating for false rumors, Reijo. It is absolutely the Peking opera dance. Do you not see the entirety of the Peking Opera Club before your very eyes?"
3403-52 = "Sensei...? Madam...?"
3403-54 = "False rumors?! I'm sorry to say you're the one barking up the wrong tree! I know I'm right, because..."
3403-55 = "...I saw it with my very own eyes!"
3403-57 = "What is this you're saying? You cannot be correct, for my claim is the same!"
3403-58 = "I personally witnessed the president's Peking opera dance practice!"
3403-60 = "[ns] \"Ah. I see what happened here.\""
3403-61 = "You're completely mistaken! That was definitely kung fu! "
3403-62 = "The move that deflects attacks from enemies! That flawless transition to prepare for the next move! I even saw her perform a guard, preparing herself for an ambush!"
3403-67 = "If you claim that's not kung fu..."
3403-68 = "...then you're saying that all the hard work and effort put in by the Martial Arts Research Club and I were meaningless!"
3403-76 = "(That was close... I nearly responded saying, \"Absolutely! I am!\")"
3403-77 = "This is no longer coincidence but, rather, fate. I can say something of similar import, Reijo!"
3403-78 = "The years of devotion to Peking opera. The days of training with a single purpose. What we've naturally gained from all that dedication is something we can call \"discernment.\""
3403-79 = "If you dare say that's not the Peking opera dance, then the Peking Opera Club and I, who have dedicated ourselves to Peking opera..."
3403-80 = "...must have wasted the entirety of our lives!"
3403-86 = "(...! That was dangerous. I almost responded by saying, \"Isn't that true?\")"
3403-93 = "Do you even have eyes? How is any of that an opera dance?"
3403-96 = "I believe you're the one who needs corrective glasses! Does that look like some rogue-ish fighting ritual to you?"
3403-98 = "It is KUNG FU!"
3403-99 = "No! It is PEKING OPERA!"
3403-103 = "It's...neither..."
3403-104 = "Huh? Madam, more people have arrived..."
3403-105 = "What?"
3403-117 = "Whoa, it really is the president! The president is here! Look!"
3403-118 = "It's usually pretty difficult to even get a glimpse of her, but there she is."
3403-119 = "By the way, are we going to get scolded by Genryumon or something for this?"
3403-120 = "Well, it seems like Genryumon is here to spectate, too."
3403-122 = "As the sun rises and sets, many will fall. It just happens to be our turn today..."
3403-123 = "No matter what you do, or where you are, I, Konoe Mina...will follow you till the end!"
3403-128 = "...No one really fell, though...?"
3403-129 = "Shush! If you point that out, she'll actually make it happen to one of us!"
3403-131 = "Genryumon is here for you, Madam President!"
3403-132 = "No matter what Madam President does...whether it be kung fu, Peking opera, or whatever else!"
3403-133 = "Genryumon will assist you to our very last breath!"
3403-138 = "I'm not really sure what the executive officer is on about right now, but I'm going to use this chance to take a photo of Madam..."
3403-147 = "Send it to me later."
3403-148 = "5,000 yen."
3403-149 = "Too expensive!"
3403-150 = "I hear the sound of an unpleasant wind blowing... Be quiet!"
3403-151 = "Y-Yes!"
3403-153 = "Huh, Kisaki really was doing...kung fu, Peking opera, or whatever in the morning..."
3403-154 = "Okay! I should make her some nutritious snacks later!"
3403-155 = "Just, what is...?"
3403-162 = "Thank you, Sensei. That was close."
3403-163 = "[s] \"Kisaki, there's no helping it at this point.\""
3403-164 = "...What exactly does that mean?"
3403-165 = "[s] \"You can't...disappoint all these students!\""
3403-166 = "...!"
3403-167 = "That... I suppose you have a point."
3403-170 = "Kung fu!"
3403-171 = "Peking opera!"
3403-173 = "Madam President!"
3403-175 = "Although, letting those three down seems perfectly acceptable to me."
3403-176 = "...I didn't want to resort to this, but words won't be enough here. President Kaguya."
3403-182 = "A timely statement, Reijo. They say it's best to win without fighting, but if there is no choice but to fight, it is best to win first..."
3403-188 = "Are you prepared, mind and soul?"
3403-189 = "I would worry about yourselves."
3403-190 = "Hm? I smell conflict...somewhere..."
3403-192 = "Listen, all of you. I only came out here...to do some morning banzai stretches with the Plum Blossom Garden children. That is all."
3403-193 = "What? Stretching...? Not kung fu?"
3403-194 = "Stretching...you say? Not Peking opera?"
3403-196 = "So it was stretching! Honestly, I don't think it even matters at this point!"
3403-197 = "It's as I said. So cease this meaningless confrontation, and—"
3403-198 = "I-It's fine, Madam! Depending on the application, stretches can also lead to kung fu moves! "
3403-199 = "It's a step-by-step process! We can get started now!"
3403-200 = "Of course! In the first place, the Peking opera dance is the result of transforming Peking opera into dance, and furthermore, elevating it from a form of stretching!"
3403-201 = "In fact, if you would supply us the opportunity to present our Peking opera to you..."
3403-202 = "It's not Peking opera!"
3403-203 = "I'm saying it's not kung fu!"
3403-205 = "Madam... *sniff*... We're scared..."
3403-206 = "I-It's okay, everyone! Dry your tears! ...B-But speaking of being scared..."
3403-210 = "Waaah! M-Me too... I'm scared, too...!"
3403-215 = "..."
3403-216 = "Cease this immediately! The children are crying!"
3403-219 = "?!"
3403-220 = "?!"
3403-221 = "?"
3403-222 = "Are you saying that whatever your goals are, they're more important than these children?"
3403-223 = "Is this fantasy you're aiming at more important than the very future of Shanhaijing?"
3403-224 = "If that is so, then have the mettle to say it right here. Don't think of it as saying it to me, say it to our children!"
3403-226 = "M-Madam. We didn't mean to...!"
3403-227 = "A-Apologies! We were just...!"
3403-229 = "If you can affect and move these children with your words, then I, too, will support your mission. In the name of Genryumon."
3403-230 = "However."
3403-236 = "If you instead attempt to feed these children meaningless, sugarcoated lies, I assure you, you will pay the proper price!"
3403-239 = "[ns] \"Yeah! You shouldn't make Madam angry!\""
3403-240 = "M-M-My apologies, Madam! Please forgive us...!"
3403-241 = "We didn't know our place! Please show your mercy to us ingrates, who don't know their places...!"
3403-242 = "Now, now. Let's all take a breather. You're going to scare the children even more."
3403-243 = "Rumi? You were here...?"
3403-244 = "Waaah..."
3403-246 = "Madam..."
3403-251 = "...I'm sorry. There's nothing more to worry about. I scolded those mean, scary sisters. Everything will be okay."
3403-252 = "O-Okay..."
3403-253 = "[ns] \"Do you want my handkerchief to blow your nose, Kokona?\""
3403-254 = "...! I-It's fine! I'm already a full-fledged lady! So it's fine!"
3403-255 = "And it's not Kokona! It's Instructor Kokona!"
3403-256 = "[s] \"Right, right.\""
3403-257 = "Then, shall we all do morning exercises, together?"
3403-258 = "T-Together...?"
3403-260 = "Exercise with Madam President?! Yes! We are at the ready!"
3403-261 = "Give us your orders! Genryumon, prepare yourselves!"
3403-262 = "I did see this happening about halfway through, but I was really hoping..."
3403-263 = "Ordering us to assemble is one thing, but stretching..."
3403-264 = "Despite all my efforts, it appears I'll be doing my morning exercises in the public eye."
3403-265 = "Well, you know."
3403-266 = "Sometimes, you've just got to make some sacrifices, for the sake of the greater good."
3403-267 = "..."
3403-268 = "I see. It would appear that you are correct."
3403-269 = "Now then, let us all begin our day with the right foot forward."
3403-274 = "[ns] \"If you'll excuse me...\""
3403-276 = "Where do you think you're going, Sensei?"
3403-277 = "You will be joining us."
3403-278 = "[s] \"I knew this is how things would turn out!\""
3403-280 = "With that, although a little rowdy, the Shanhaijing students started their morning out on an energetic note."
3403-281 = "This is more of an aside, but..."
3403-282 = "...there were more rumors about students suddenly doing morning exercises at the White Tiger Park. Or something like that."
3403-283 = "A Slightly Special Morning in Shanhaijing"

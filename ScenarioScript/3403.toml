3403-56 = "#all;hide"
3403-57 = "3;카구야;13;낭설(浪說)이라 하셨습니까? 당연히 그럴 리가 없습니다. 오히려 저야말로 같은 말씀을 드리고 싶군요."
3403-58 = "3;카구야;16;문주님의 경극 무용 연습을 직접 목격한 것은, 다름 아닌 저라고 말입니다!\n#3;closeup"

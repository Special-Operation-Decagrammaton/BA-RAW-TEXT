[translation]
3403-1 = "山海經的特別早晨（３）"
3403-3 = "……"
3403-4 = "……"
3403-5 = "[ns]「這……這到底是……？」"
3403-6 = "妾身本以為只是與心菜教官，以及梅花園的孩子們一同做早操而已……？"
3403-7 = "心菜醬……？門主大人……？#n這是什麼情況……？"
3403-24 = "輝夜部長……？京劇部為什麼會在這裡……？"
3403-25 = "我才想問，玄武商會的令女同學和武術研究部為何會在這裡……？"
3403-26 = "如果稱之為巧合未免也太巧了。"
3403-27 = "我也這麼認為。#n我倆萍水相逢，能如此邂逅真可謂奇遇……"
3403-28 = "總之，我和武術研究部有事必須使用這裡。"
3403-29 = "這點我們京劇部也是一樣。#n真是造化弄人啊。"
3403-34 = "我，鹿山令女和武術研究部的各位，從今天起要和門主大人一起鍛鍊功夫！"
3403-35 = "我們京劇部，從今天起將全力輔佐門主大人練習京劇！"
3403-36 = "咦？"
3403-37 = "嗯？"
3403-42 = "……什麼？"
3403-44 = "不不不，你似乎誤會了。#n門主大人每天早上在白虎公園練習的可是功夫哦。"
3403-45 = "有誤會的是令女同學才對吧。#n門主大人在練習的是京劇……更準確地說是「京劇舞蹈」。"
3403-47 = "不，妾身是……"
3403-49 = "雖然不知道這種謠言是從哪裡聽來的，但門主大人的的確確是在鍛鍊功夫。#n這邊武術研究部的各位都能做證。"
3403-50 = "誤信謠言的是令女同學吧？#n那分明是京劇舞蹈……不然我們京劇部又是為何全員聚集於此呢？"
3403-52 = "老師……？門主大人……？"
3403-54 = "說我誤信了謠言？簡直是無稽之談。#n門主大人在鍛鍊功夫一事毋庸置疑……"
3403-55 = "因為這是我親眼所見的事實！"
3403-57 = "無稽之談？怎麼可能。#n這句台詞應該由我來說才對。"
3403-58 = "因為親眼目睹門主大人練習京劇舞蹈的人……不是別人就是我！"
3403-60 = "[ns]「啊，原來是這樣。」"
3403-61 = "是部長你看錯了！那分明是功夫！"
3403-62 = "接招的動作，流暢的套路，還有應對突襲的後退迴避！"
3403-67 = "如果這不是功夫，那麼我和在場武術研究部的各位……"
3403-68 = "這麼多年的努力難道都是沒有意義的嗎？"
3403-76 = "（好險……差點就用「是又如何」來回答了……）"
3403-77 = "這還真是湊巧啊──不，這種程度的巧合只能稱之為必然。#n在此我將相同的話原封不動地奉還給令女同學。"
3403-78 = "一直以來獻身於京劇，日復一日鍛煉的我絕不會看走眼。"
3403-79 = "如果這不是京劇舞蹈，那麼我和在場京劇部的所有人……"
3403-80 = "這些年來都只是在虛度光陰嗎？"
3403-86 = "（……！好險，差點就用「不然呢？」來回答了……）"
3403-93 = "有眼睛的話就睜大點看清楚！那哪裡是京劇！"
3403-96 = "應該睜大眼睛的是你！那哪裡是功夫！"
3403-98 = "是功夫！"
3403-99 = "是京劇！"
3403-103 = "不，其實兩者皆非事實……"
3403-104 = "咦？門主大人，那邊還有其他人在耶……？"
3403-105 = "什麼？"
3403-117 = "哇，真的是門主大人！#n門主大人，看這邊看這邊！"
3403-118 = "平時可是很難見到門主大人的，沒想到居然真的在這裡。"
3403-119 = "話說這樣應該不會被玄龍門罵吧？"
3403-120 = "這個嘛……玄龍門看起來好像也只是來圍觀的？"
3403-122 = "「人生無常，世事難料。今日不過是輪到我們倒下……」"
3403-123 = "無論門主大人在何處做些什麼，我近衛美奈……將始終隨侍在側！"
3403-128 = "……也沒人倒下吧？"
3403-129 = "嘘。那種話說出來就真的有人要倒下了……"
3403-131 = "我們玄龍門！已為門主大人集結於此！"
3403-132 = "無論門主大人練習的……是功夫還是京劇，又或是其他東西！"
3403-133 = "玄龍門都會誓死保護門主大人直到最後！"
3403-138 = "先不管執行部長在說什麼，趁這個機會拍幾張門主大人的照片吧……"
3403-147 = "之後分享給我。"
3403-148 = "一份5000，要不要隨你。"
3403-149 = "太貴了吧！"
3403-150 = "彷彿聽見了一陣令人不悅的風聲啊……肅靜！"
3403-151 = "是，是！"
3403-153 = "真是的，沒想到妃姬真的一大早就在……練習功夫還是京劇之類的。"
3403-154 = "好！之後就做點營養滿分的點心給他吧！"
3403-155 = "這究竟……"
3403-162 = "感激不盡，老師。#n妾身方才突然感到一陣頭暈。"
3403-163 = "[s]「既然事已至此，也沒有其他辦法了，妃姬。」"
3403-164 = "……此話怎說？"
3403-165 = "[s]「不能辜負……這麼多學生的期待！」"
3403-166 = "……！"
3403-167 = "那倒也是。"
3403-170 = "功夫！"
3403-171 = "京劇！"
3403-173 = "門主大人～"
3403-175 = "若是這三人的話，也許辜負倒也無妨吧……"
3403-176 = "……本來是不想這麼做的，可惜看來光用說的行不通啊，輝夜部長。"
3403-182 = "總算說了句合時宜的話呢，令女同學。#n不戰而勝為上策，倘若非打不可，則先勝後戰為次策……"
3403-188 = "做好覺悟了嗎？"
3403-189 = "用不著擔心我們。"
3403-190 = "嗯？好像聞到了爭鬥的味道……"
3403-192 = "那個，兩位都聽好了。#n妾身只是來和梅花園的孩子們……一同做萬歲體操罷了……"
3403-193 = "什麼？是萬歲體操……而不是功夫？"
3403-194 = "是萬歲體操……不是京劇嗎？"
3403-196 = "原來是體操啊！雖然是什麼其實都無所謂啦！"
3403-197 = "正是如此。所以汝等就別針鋒相對了……"
3403-198 = "沒，沒事的，門主大人！#n體操也可以和功夫的套路做結合！"
3403-199 = "一步一步慢慢來也沒關係！就從現在開始吧！"
3403-200 = "沒錯！京劇舞蹈原本就是將京劇的動作舞蹈化，進而昇華為體操的技藝！"
3403-201 = "不，假如門主大人願意給我們展示京劇的機會……"
3403-202 = "都說了那不是京劇！"
3403-203 = "我也說過那跟功夫八竿子打不著！"
3403-205 = "門主大人……嗚嗚……我們好害怕……"
3403-206 = "大，大家別哭！#n不，不用害怕的……"
3403-210 = "嗚嗚……可是我也好怕……"
3403-215 = "真是成何體統……"
3403-216 = "還不住手！沒見到孩子們都被嚇哭了嗎！"
3403-219 = "！？"
3403-220 = "！？"
3403-221 = "？"
3403-222 = "汝等的意圖，有比這些孩子們重要嗎？"
3403-223 = "汝等的追求，有比山海經的未來更遠大嗎？"
3403-224 = "倘若有，那儘管開口便是。#n無須向著妾身……直接向這些孩子們說吧。"
3403-226 = "門，門主大人，我們沒有這個意思……！"
3403-227 = "誠，誠惶誠恐！我們只是……！"
3403-229 = "若汝等得以打動這些孩子，令其回心轉意……那麼妾身也會以玄龍門之名予以支持。"
3403-230 = "然而──"
3403-236 = "若汝等所言皆是無謂地搬弄是非與讒言，自得付出相應的代價……！"
3403-239 = "[ns]「沒錯！怎麼可以惹門主大人生氣呢！」"
3403-240 = "非，非非非非，非常抱歉，門主大人！請您原諒……"
3403-241 = "是我等不知天高地厚！還請您寬恕……！"
3403-242 = "好了好了，就到此為止吧。#n要是再這樣下去，孩子們可能會更害怕的。"
3403-243 = "瑠美？原來汝也在嗎……？"
3403-244 = "唔嗯……"
3403-246 = "門主大人……"
3403-251 = "……實在抱歉，現在已經沒事了。#n方才妾身已經訓斥過那些可怕的姐姐們，不必再害怕了。"
3403-252 = "好，好的……"
3403-253 = "[ns]「快把鼻涕擦一擦吧，心菜醬？要不要借你手帕？」"
3403-254 = "……！沒，沒關係！我已經是個成熟的淑女了！"
3403-255 = "而且不是心菜醬！是教官才對！"
3403-256 = "[s]「好好好。」"
3403-257 = "那麼，大家一起來做早操吧？"
3403-258 = "大，大家一起……？"
3403-260 = "能跟門主大人一起做早操嗎！我們隨時準備就緒！"
3403-261 = "請門主大人儘管吩咐！#n玄龍門！體操預備──！"
3403-262 = "雖然從中途就大概猜到了，結果還是變成這樣了啊……"
3403-263 = "集合命令已經聽得很習慣了，但體操命令還是第一次聽見……"
3403-264 = "到頭來還是得在眾人面前做早操嗎……"
3403-265 = "畢竟就像那句話說的一樣嘛。"
3403-266 = "「不經一番寒徹骨，怎得梅花撲鼻香」。"
3403-267 = "……"
3403-268 = "是啊，汝說得對。"
3403-269 = "那麼，就以早操開始新的一天吧。"
3403-274 = "[ns]「那我就先……」"
3403-276 = "汝要去哪裡，老師。"
3403-277 = "這裡可不能少了汝哦。"
3403-278 = "[s]「果然還是會變成這樣！」"
3403-280 = "（就這樣，雖然發生了一些小騷動，#n　但山海經的早晨還是以充滿活力且健康的方式開始了）"
3403-281 = "（順帶一提……）"
3403-282 = "（之後在白虎公園做早操的學生數量似乎有所增加……卻又好像沒有……）"
3403-283 = "山海經的特別早晨"

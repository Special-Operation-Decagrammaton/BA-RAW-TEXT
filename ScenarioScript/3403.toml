[translation]
3403-1 = "ยามเช้าที่พิเศษนิดหน่อยของซานไห่จิง 3"
3403-3 = "..."
3403-4 = "......"
3403-5 = "[ns] \"นี่มัน... อะไรกันน่ะ...?\""
3403-6 = "เราเข้าใจว่าแค่มาออกกำลังกายบริหารกับพวกเด็กๆ อย่างที่ผู้ฝึกสอนโคโคน่าพูดเสียอีก...?"
3403-7 = "โคโคน่าจัง...? ท่านประมุข...? เกิดอะไรขึ้นกันคะเนี่ย...?"
3403-24 = "หัวหน้าคางุยะ...? ทำไมชมรมการแสดงงิ้วถึงมาที่นี่ล่ะ...?"
3403-25 = "ฉันก็อยากถามพวกคุณเหมือนกันค่ะ คุณเรย์โจวแห่งย่านการค้ากับชมรมวิจัยศิลปะป้องกันตัวมาที่นี่#nทำไมคะ...?"
3403-26 = "ถ้าเป็นเรื่องบังเอิญละก็ ถือว่าเป็นเรื่องบังเอิญที่น่าทึ่งจริงๆ เลยนะคะ"
3403-27 = "ฉันก็คิดอย่างนั้นเหมือนกันค่ะ พวกเราออกเดินบนเส้นทางที่ต่างกัน แต่กลับมาพบเจอกันได้แบบนี้ จะเรียกว่าบังเอิญ หรือเป็นโชคชะตาดี..."
3403-28 = "จะยังไงก็ตาม ฉันกับสมาชิกชมรมวิจัยศิลปะต่อสู้มีเรื่องที่ต้องทำที่นี่ค่ะ"
3403-29 = "ฉันกับสมาชิกชมรมการแสดงงิ้วเองก็เหมือนกันค่ะ ช่างเป็นเรื่องบังเอิญจนคาดไม่ถึงเลยนะคะ"
3403-34 = "ฉัน คายามะ เรย์โจว กับสมาชิกชมรมวิจัยศิลปะป้องกันตัว ตั้งแต่วันนี้ไปพวกเราจะมาร่วมฝึกกังฟูกับ#nท่านประมุขที่นี่ค่ะ!"
3403-35 = "ชมรมการแสดงงิ้วของเราก็เช่นกัน! ตั้งแต่วันนี้ฉันจะช่วยท่านประมุขในการฝึกซ้อมการแสดงงิ้วอย่าง#nเต็มที่ค่ะ!"
3403-36 = "คะ?"
3403-37 = "คะ?"
3403-42 = "ว่าอย่างไรนะ...?"
3403-44 = "ไม่ค่ะ ไม่ใช่แล้วค่ะ ดูเหมือนคุณจะเข้าใจอะไรผิดไปนะคะ ท่านประมุขออกมาฝึกกังฟูที่นี่ทุกรุ่งสางค่ะ"
3403-45 = "ดูเหมือนคุณเรย์โจวจะเป็นฝ่ายที่เข้าใจผิดมากกว่านะคะ ที่ท่านประมุขกำลังฝึกอยู่... คือท่วงท่าของ#nศิลปะการแสดงงิ้วต่างหากล่ะคะ"
3403-47 = "ไม่นะ คือว่าเรา..."
3403-49 = "ฉันไม่รู้ว่าคุณได้ยินข่าวลือมาจากไหนนะคะ แต่ว่ามันคือกังฟูไม่ผิดแน่ค่ะ สมาชิกชมรมวิจัยศิลปะต่อสู้#nเองก็อยู่ที่นี่ด้วยค่ะ"
3403-50 = "ดูเหมือนว่าคุณเรย์โจวกำลังพูดในสิ่งที่ไม่เป็นความจริงมากกว่านะคะ นั่นคือท่วงท่าของศิลปะการ#nแสดงงิ้วไม่ผิดแน่ค่ะ ถ้าไม่อย่างนั้น ชมรมการแสดงงิ้วของเราจะมาที่นี่กันทำไมล่ะคะ?"
3403-52 = "คุณครู...? ท่านประมุข...?"
3403-54 = "ข่าวลืองั้นเหรอคะ ฉันคิดว่าคุณคงเข้าใจผิดแล้วละค่ะ ไม่ผิดหรอกค่ะ นั่นเพราะว่าฉัน..."
3403-55 = "เพราะฉันเห็นมาด้วยสองตาของตัวเองเลยนะคะ!"
3403-57 = "จะบอกว่าเป็นข่าวลือเหรอคะ? แน่นอนว่าไม่ใช่แบบนั้นหรอกค่ะ ฉันก็อยากจะพูดแบบนั้นเหมือนกันค่ะ"
3403-58 = "ฉันได้เห็นท่วงท่าการร่ายรำของท่านประมุขมาด้วยตาตัวเองเลยนะคะ!"
3403-60 = "[ns] \"อ่า... กลายเป็นงั้นไปซะได้นะ\""
3403-61 = "นอกจากมองผิดแล้วก็ยังเข้าใจผิดอีกนะคะ! นั่นเป็นการฝึกกังฟูแน่นอนค่ะ!"
3403-62 = "ท่วงท่าพลิ้วไหวที่หลบการโจมตีของคู่ต่อสู้! การเคลื่อนไหวที่อ่อนช้อยดุจสายน้ำไหล! แม้แต่การเอนตัวไปด้านหลังเพื่อเตรียมรับการโจมตีที่คาดไม่ถึง!"
3403-67 = "ถ้าคุณบอกว่าไม่ใช่กังฟูละก็ ฉันกับสมาชิกชมรมวิจัยศิลปะป้องกันตัวที่ฝึกฝนศิลปะป้องกันตัวมาจนถึง#nตอนนี้..."
3403-68 = "จะบอกว่าสิ่งที่พวกฉันทำมันไร้ความหมายงั้นเหรอคะ!"
3403-76 = "(แบบนี้อันตรายแล้วละค่ะ... เกือบพลาดตอบไปว่า 'ก็คงเป็นอย่างนั้น' ซะแล้วค่ะ...!)"
3403-77 = "นี่เป็นเรื่องบังเอิญที่ยิ่งใหญ่มากเลยนะคะ ไม่สิ ถ้าแบบนี้เรียกว่าบังเอิญละก็ คงจะต้องบอกว่าเป็นเรื่อง#nที่หลีกเลี่ยงไม่ได้เสียมากกว่า ฉันก็อยากจะพูดแบบนี้กับคุณเรย์โจวเหมือนกันนะคะ"
3403-78 = "หลายปีที่ฉันอุทิศตนให้กับการแสดงงิ้ว วันเวลาต่างๆ ที่ทุ่มเทไปกับการฝึกฝนตนเอง สิ่งที่ได้มาจาก#nการเรียนรู้และการฝึกฝนเหล่านั้นก็คือญาณหรือลางสังหรณ์ค่ะ"
3403-79 = "ถ้าคุณบอกว่าไม่ใช่การฝึกฝนการแสดงงิ้วละก็ ฉันกับสมาชิกชมรมการแสดงงิ้วที่มารวมตัวกันที่นี่"
3403-80 = "คงจะเสียวันเวลาเหล่านั้นไปโดยเปล่าประโยชน์สินะคะ!"
3403-86 = "(...! แย่แล้ว เกือบตอบไปแล้วสิว่า 'ก็ใช่แล้วไม่ใช่รึไงคะ' ...)"
3403-93 = "ถ้าสายตายังดีอยู่ก็เบิกตาดูให้ชัดๆ นะคะ! มันดูเหมือนการแสดงงิ้วตรงไหนคะ!"
3403-96 = "คุณเองหรือเปล่าที่ต้องหันกลับมามองดีๆ นั่นมันดูเหมือนการฝึกกังฟูตรงไหนคะ!"
3403-98 = "กังฟูถูกแล้วค่ะ!"
3403-99 = "การแสดงงิ้วต่างหากค่ะ!"
3403-103 = "เดี๋ยวก่อน ไม่ใช่ทั้งสองอย่างนั่นแหละ..."
3403-104 = "เอ๋? ท่านประมุข แล้วก็มีคนอื่นๆ อยู่ด้วย...?"
3403-105 = "เอ๋?"
3403-117 = "ว้าว ท่านประมุขจริงๆ ด้วยละ! ท่านประมุข! ทางนี้ค่ะ!"
3403-118 = "ปกติแล้วจะได้เจอท่านประมุขยากมากๆ แต่ท่านมาที่นี่จริงๆ ด้วยนะ"
3403-119 = "แต่ทำแบบนี้จะไม่โดนพวกมังกรดำโกรธเอาใช่มั้ย?"
3403-120 = "แถมพวกมังกรดำก็ดูเหมือนเพิ่งจะมาไม่ใช่เหรอ?"
3403-122 = "พอพระอาทิตย์ขึ้น คนส่วนใหญ่ก็หมดแรงไปเอง ตอนนั้นแหละจะถึงตาของเรา..."
3403-123 = "ไม่ว่าท่านประมุขจะทำอะไรอยู่ที่ไหน โคโนเอะ มินะคนนี้... จะติดตามไปทุกที่เลยค่ะ!"
3403-128 = "ไม่น่ามีใครหมดแรงไปหรอกมั้ง...?"
3403-129 = "ชู่ว ถ้าทำแบบนั้นเดี๋ยวก็มีคนเป็นลมไปจริงๆ หรอก..."
3403-131 = "มังกรดำของพวกเรา! พวกเรามาที่นี่เพื่อท่านประมุขค่ะ!"
3403-132 = "ไม่ว่าท่านประมุขจะทำอะไร... ไม่ว่าจะเป็นการฝึกกังฟู ฝึกการแสดงงิ้ว หรืออะไรก็ตาม!"
3403-133 = "มังกรดำจะคอยปกป้องท่านประมุข และอยู่กับท่านไปจนถึงวาระสุดท้ายค่ะ!"
3403-138 = "ฉันไม่ค่อยเข้าใจที่หัวหน้าพูดเท่าไรเลย แต่ขอใช้โอกาสนี้ถ่ายรูปท่านประมุขแล้วกัน..."
3403-147 = "ถ่ายเสร็จก็แชร์ให้ด้วยแล้วกันนะ"
3403-148 = "รูปละ 5,000 เยน"
3403-149 = "แพงเวอร์!"
3403-150 = "เหมือนได้ยินเสียงมดแมลงดังระงมเลยนะ... เงียบเดี๋ยวนี้!"
3403-151 = "คะ... ค่ะ!"
3403-153 = "จริงเหรอเนี่ย คิซากิออกมาตอนเช้าขนาดนี้... แถมออกมาฝึกกังฟูด้วยเหรอเนี่ย"
3403-154 = "ดีละ! แบบนี้ต้องทำของว่างบำรุงกำลังให้สักหน่อยแล้ว!"
3403-155 = "นี่มัน... อะไรกัน..."
3403-162 = "ขอบใจนะ ครู เมื่อครู่เราเวียนหัวนิดหน่อย"
3403-163 = "[s] \"ไหนๆ ก็มาที่นี่แล้วก็ช่วยไม่ได้ละนะ คิซากิ\""
3403-164 = "หมายความว่าอย่างไรหรือ...?"
3403-165 = "[s] \"จะทำให้นักเรียนเยอะขนาดนี้... ผิดหวังไม่ได้นะ!\""
3403-166 = "...!"
3403-167 = "แน่นอนว่าเป็นเช่นนั้น"
3403-170 = "กังฟู!"
3403-171 = "การแสดงงิ้ว!"
3403-173 = "ท่านประมุข~"
3403-175 = "ไม่ละ เราคิดว่าปล่อยทั้งสามคนไว้แบบนั้นน่าจะดีกว่านะ..."
3403-176 = "ฉันไม่ค่อยอยากใช้วิธีนี้เท่าไร แต่ฉันคิดว่าแค่พูดคุยกันคงไม่ได้แล้วละค่ะ หัวหน้าคางุยะ"
3403-182 = "พูดขึ้นมาได้ถูกเวลาจริงๆ นะคะคุณเรย์โจว หากจบลงด้วยดีโดยไม่ต้องใช้กำลังต่อสู้กันก็ย่อมดีกว่า แต่ในเมื่อหาข้อสรุปไม่ได้... ใช้การต่อสู้ตัดสินก็ย่อมเป็นสิ่งที่ดีกว่าค่ะ"
3403-188 = "เตรียมใจไว้พร้อมรึยังคะ?"
3403-189 = "ฉันว่าคุณไม่ต้องเป็นห่วงพวกเราหรอกนะคะ"
3403-190 = "หืม? เหมือนรับรู้ได้ถึงเค้าลางแห่งการขัดแย้งเลย..."
3403-192 = "ฟังให้ดี เรามาที่นี่เพื่อทำกายบริหารเพิ่มพละกำลังกับพวกเด็กๆ สวนต้นบ๊วยเท่านั้น..."
3403-193 = "คะ? กายบริหาร... เหรอคะ? ไม่ได้มาฝึกกังฟูเหรอคะ?"
3403-194 = "กายบริหาร... งั้นเหรอคะ? ไม่ใช่ฝึกการแสดงงิ้วหรอกเหรอคะ?"
3403-196 = "กายบริหารนี่เอง! ที่จริงฉันคิดว่าตอนนี้จะเป็นอะไรก็ไม่สำคัญแล้วละค่ะ!"
3403-197 = "ใช่แล้ว เพราะงั้นก็ช่วยหยุดทะเลาะกันเสียเถอะ..."
3403-198 = "มะ.... ไม่เป็นไรค่ะ ท่านประมุข! การทำกายบริหารก็มีสิ่งที่เชื่อมโยงกับกังฟูได้ตามวิธีการฝึกอยู่ค่ะ!"
3403-199 = "จากนี้ไป มาค่อยๆ ลองฝึกไปทีละขั้นได้นะคะ! เอาละ มาเริ่มกันเลยเถอะค่ะ!"
3403-200 = "อย่าพูดเช่นนั้นเลยค่ะ! ก่อนอื่น การแสดงงิ้วแต่เดิมเรียกว่าศิลปะการร่ายรำงิ้ว และเมื่อเวลาผ่านไปก็ถูก#nถ่ายทอดต่อมาในรูปแบบของท่ากายบริหารค่ะ!"
3403-201 = "ถ้าท่านประมุขให้โอกาสพวกเรานำเสนอการฝึกงิ้วให้เป็นการส่วนตัวละก็…!"
3403-202 = "ก็บอกว่าไม่ใช่การแสดงงิ้วไงคะ!"
3403-203 = "ฉันก็บอกแล้วไงคะว่าไม่ใช่กังฟูน่ะค่ะ!"
3403-205 = "ท่านประมุข... ฮึก... หนูกลัวค่ะ..."
3403-206 = "พวก... พวกเด็กๆ! อย่าร้องไห้แบบนั้นสิ! และก็ถ้ากลัวแบบนั้น..."
3403-210 = "งือออ.... ฉันเองก็กลัวเหมือนกันนะ..."
3403-215 = "คงจะเลี่ยงไม่ได้เสียแล้ว..."
3403-216 = "หยุดเดี๋ยวนี้! ไม่เห็นหรือว่าพวกเด็กๆ ร้องไห้กันหมดแล้วน่ะ!"
3403-219 = "?!"
3403-220 = "?!"
3403-221 = "?"
3403-222 = "ไม่ว่าความตั้งใจของพวกเธอจะเป็นอะไร แต่มันสำคัญกว่าเด็กๆ เหล่านี้หรือ?"
3403-223 = "ไม่ว่าความต้องการของพวกเธอจะเป็นอะไร สิ่งนั้นสำคัญกว่าอนาคตของซานไห่จิงอย่างนั้นหรือ?"
3403-224 = "หากเป็นเช่นนั้น ก็ขอให้พูดมา ณ ที่นี้ ไม่ว่าจะเป็นอะไรก็ตาม... จงพูดต่อหน้าเด็กๆ เหล่านี้ที่อยู่ที่นี่ซะ"
3403-226 = "ทะ... ท่านประมุข คือว่าพวกเรา...!"
3403-227 = "ขะ... ขอโทษด้วยค่ะ! พวกเราก็แค่...!"
3403-229 = "หากคำพูดของพวกเธอสามารถหล่อหลอมเด็กเหล่านี้ และทำให้เด็กๆ ก้าวไปสู่อนาคตได้ละก็ เราจะรับรองสิ่งที่พวกเธอพูดในฐานะประมุขของมังกรดำ"
3403-230 = "เพียงแต่..."
3403-236 = "หากคำพูดเหล่านั้นเป็นเรื่องไร้สาระหรือข้อเท็จจริงที่ไร้ความหมาย เราจะให้พวกเธอได้ชดใช้อย่างสาสม!"
3403-239 = "[ns] \"ใช่แล้ว! อย่าทำให้ท่านประมุขโกรธสิ!\""
3403-240 = "ฉะฉะฉะ... ฉันผิดไปแล้วค่ะ ท่านประมุข! ได้โปรดยกโทษให้ฉันด้วย...!"
3403-241 = "พวกเราไม่รู้ที่ต่ำที่สูงเองค่ะ! เศษธุลีอย่างพวกเราขอความเมตตาด้วยเถอะค่ะ...!"
3403-242 = "เอาละๆ พอแค่นั้นเถอะ คิดจะทำให้พวกเด็กๆ กลัวไปมากกว่านี้รึไง?"
3403-243 = "รูมิ? มาที่นี่ด้วยงั้นหรือ...?"
3403-244 = "ฮึก..."
3403-246 = "ท่านประมุข..."
3403-251 = "ไม่เป็นไร เราต้องขอโทษด้วย เราแค่สั่งสอนพวกพี่ๆ ที่น่ากลัวนั่นก็เท่านั้น ตอนนี้ไม่เป็นไรแล้วละ"
3403-252 = "คะ... ค่ะ..."
3403-253 = "[ns] \"น้ำมูกย้อยแล้ว โคโคน่าจัง? เอาผ้าเช็ดหน้ามั้ย?\""
3403-254 = "...! มะ... ไม่เป็นไรค่ะ! ฉันเป็นกุลสตรีที่เพียบพร้อมนะคะ! เพราะงั้นไม่เป็นไรค่ะ!"
3403-255 = "แล้วก็ไม่ใช่โคโคน่าจังด้วย แต่เป็นผู้ฝึกสอนค่ะ!"
3403-256 = "[s] \"จ้าๆ...\""
3403-257 = "ถ้างั้นเรามาทำกายบริหารยามเช้าด้วยกันดีมั้ย?"
3403-258 = "ดะ... ด้วยกันหรือ...?"
3403-260 = "ทำกายบริหารร่วมกับท่านประมุขงั้นเหรอคะ! พวกเราพร้อมอยู่แล้วค่ะ!"
3403-261 = "ไม่ว่าจะเป็นเรื่องไหนก็สั่งมาได้เลยค่ะ! มังกรดำ เตรียมพร้อมทำกายบริหาร!"
3403-262 = "ฉันก็พอจะเดาได้อยู่หรอกนะ แต่ว่า... สุดท้ายก็กลายเป็นแบบนี้เหรอ..."
3403-263 = "เราก็คุ้นเคยกับคำสั่งรวมพลอยู่หรอกนะ แต่คำสั่งให้ออกกำลังกายนี่มัน..."
3403-264 = "สุดท้าย... ก็ต้องมาทำกายบริหารต่อหน้าทุกคนจนได้สินะ..."
3403-265 = "เธอก็น่าจะรู้นี่นา?"
3403-266 = "บางครั้งต้องทำอะไรบางอย่างเพื่อให้ได้บางสิ่งบางอย่างน่ะ"
3403-267 = "......"
3403-268 = "อย่างนี้นี่เอง สิ่งที่เธอพูดมาถูกต้องแล้วละ"
3403-269 = "ถ้าอย่างนั้น... เรามาเริ่มวันนี้ไปด้วยกันเถอะ"
3403-274 = "[ns] \"งั้นตอนนี้ครูขอตัว...\""
3403-276 = "คิดจะไปไหนหรือ ครู?"
3403-277 = "มาออกกำลังกายด้วยกันสิ"
3403-278 = "[s] \"คิดแล้วเชียวว่าต้องเป็นแบบนี้\""
3403-280 = "(ถึงจะมีเหตุวุ่นวายนิดหน่อย แต่ยามเช้าที่ดีต่อสุขภาพของซานไห่จิงก็เริ่มขึ้น)"
3403-281 = "(นี่อาจเป็นการพูดนอกประเด็นไปสักหน่อย แต่ว่า...)"
3403-282 = "(หลังจากนั้นก็มีนักเรียนมาออกกำลังกายที่สวนพยัคฆ์ขาวเพิ่มขึ้น...)"
3403-283 = "ยามเช้าที่พิเศษนิดหน่อยของซานไห่จิง"

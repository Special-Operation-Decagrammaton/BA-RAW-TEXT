3403-77 = "3;카구야;01;이것은 대단한 우연이군요. 아뇨, 우연도 이 정도라면 필연이라고 이야기할 수밖에 없을 터. 저 역시 같은 말을 레이죠 님께 돌려 드릴 수 있을 것 같습니다.\n#3;em;…"

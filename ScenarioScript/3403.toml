3403-44 = "1;카구야;05\n5;레이죠;05;아니죠, 아니죠. 뭔가 잘못 알고 계신 모양입니다만, 문주님께서는 매일 아침 새벽같이 이곳 백호공원에서 쿵후를 수련하고 계십니다."
3403-45 = "5;레이죠;05\n1;카구야;05;잘못 알고 계신 것은 레이죠 님인 듯하군요. 문주님께서 하고 계신 것은 경극 연습…… 보다 정확히는 경극 무용이십니다."

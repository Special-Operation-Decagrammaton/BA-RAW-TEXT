3403-24 = "5;레이죠;04;카구야 부장……? 경극부가 여기에는 무슨 일로……?"
3403-25 = "1;카구야;15;제 쪽이야말로, 현무상회의 레이죠 님과 무술연구부가 어쩐 일로……?"
3403-26 = "5;레이죠;04;우연이라면 참으로 신기한 우연이로군요."
3403-27 = "1;카구야;10;저 역시 그렇게 생각합니다. 부평초처럼 세상을 떠돌다, 돌아와 이렇게 만났으니, 그것을 일컬어 우연이라 하도다……."
3403-28 = "5;레이죠;01;아무튼, 좋습니다. 저와 무술연구부 여러분은 이 자리에서 할 일이 있으니 말이죠."
3403-29 = "1;카구야;01;저와 경극부원들 역시 마찬가지입니다. 참으로 공교로운 일이라 아니할 수 없겠군요."

[translation]
80000029-1 = "大人的巧克力"
80000029-2 = "夏萊．辦公室"
80000029-3 = "哎呀，老師～"
80000029-4 = "呵呵，今天也辛苦了。"
80000029-5 = "要吃點心嗎？還是要睡午覺呢？"
80000029-6 = "還是要……呵呵。"
80000029-7 = "[s1]「……旬？」\n[s2]「今天是不是有點怪怪的……？」"
80000029-8 = "嗯～？怎麼了嗎？"
80000029-9 = "嗯～？怎麼了嗎？"
80000029-10 = "是和平常一樣的梅花園教官旬唷～？"
80000029-11 = "今天的心情好像比平常還好就是了～"
80000029-12 = "[s]「難道……」"
80000029-16 = "呃，老師？靠我這麼近的話……"
80000029-17 = "我會害羞的……"
80000029-18 = "（旬的嘴邊散發出淡淡的酒味）"
80000029-19 = "[s]「難道喝了酒……？」"
80000029-20 = "喝，喝酒……！？"
80000029-21 = "身為梅花園的教官，怎麼可能做出那種事呢！"
80000029-22 = "而且今天我只有吃巧克力而已……"
80000029-23 = "你問我吃了什麼巧克力？"
80000029-29 = "是這個蘭姆夾心……"
80000029-30 = "雖然是第一次吃，它的香味跟蘭姆葡萄冰淇淋一樣，非常好吃呢。"
80000029-31 = "咦，裡面含有一點點酒精是嗎……？"
80000029-32 = "我，我，我沒注意到就……"
80000029-33 = "[s]「這個巧克力可以交給我嗎？」"
80000029-34 = "好，好的……不好意思，讓你看到了梅花園教官不成體統的樣子……"
80000029-35 = "然而這樣一來……雖然不是有意如此，也算是把我買的巧克力送給老師了呢。"
80000029-36 = "以這麼自然的形式送老師大人的巧克力……"
80000029-37 = "呵呵，也不全都是壞事呢。"
80000029-39 = "（讓旬在夏萊小睡一下之後，把他送回了梅花園）"

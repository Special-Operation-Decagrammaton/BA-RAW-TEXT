[translation]
80000029-1 = "ช็อกโกแลตของผู้ใหญ่"
80000029-2 = "สำนักงานชาเล่ต์"
80000029-3 = "เชิญค่ะ คุณครู~"
80000029-4 = "ฮุฮุ ขอบคุณที่ตั้งใจทำงานอย่างหนักนะคะ"
80000029-5 = "ฉันเตรียมขนมให้ทานดีมั้ยคะ? หรือว่าจะนอนกลางวันก่อนดีคะ?"
80000029-6 = "หรือไม่งั้นก็... ฮุฮุฮุ"
80000029-7 = "[s1] \"ชุน...?\"\n[s2] \"มีเรื่องอะไรรึเปล่า?\""
80000029-8 = "คะ? อะไรเหรอคะ คุณครู~?"
80000029-9 = "คะ? ฉันไม่มีปัญหาอะไรเลยค่ะ"
80000029-10 = "ฉันก็ยังคงเป็นชุน ผู้ฝึกสอนแห่งสวนต้นบ๊วยเหมือนเดิมค่ะ~"
80000029-11 = "คงแค่อารมณ์ดีกว่าปกตินิดหน่อยเท่านั้นค่ะ~"
80000029-12 = "[s] \"ดูแปลกๆ นะ...\""
80000029-16 = "อะ... เอ๋? ถ้าคุณครูเข้ามาใกล้แบบนี้..."
80000029-17 = "ถึงจะเป็นฉันก็เขินเหมือนกันนะคะ..."
80000029-18 = "(ริมฝีปากของชุนเผยอขึ้นเล็กน้อย กลิ่นแอลกอฮอล์อ่อนๆ ก็โชยมาเตะจมูกของคุณครู)"
80000029-19 = "[s] \"นี่เธอ... ดื่มเหล้ามางั้นเหรอ?\""
80000029-20 = "ละ...เหล้าเหรอคะ?!"
80000029-21 = "ไม่มีทางที่ผู้ฝึกสอนแห่งสวนต้นบ๊วยจะกระทำผิดแบบนั้นหรอกค่ะ!"
80000029-22 = "ถ้าเป็นของที่กินหลังมื้อเที่ยง ก็มีแค่ช็อกโกแลตเท่านั้นเอง..."
80000029-23 = "คะ? ฉันกินช็อกโกแลตอะไรงั้นเหรอคะ?"
80000029-29 = "ก็แค่... กินช็อกโกแลตรัม บอนบอนไปชิ้นเดียวเองค่ะ"
80000029-30 = "ฉันเพิ่งเคยกินรัม บอนบอนเป็นครั้งแรก กลิ่นมันหอมหวานเหมือนกับไอศกรีมรัมเรซิ่น อร่อยมากเลยค่ะ"
80000029-31 = "คะ? รัม บอนบอนมีส่วนผสมจากแอลกอฮอล์เพราะงั้นเลยอาจทำให้เมาได้งั้นเหรอคะ?"
80000029-32 = "ตายจริง... ฉันไม่รู้เรื่องนั้นเลย..."
80000029-33 = "[s] \"ขอโทษด้วยนะชุน แต่ครูขอเก็บช็อกโกแลตนี่ไปนะ\""
80000029-34 = "ค่ะ... ช่วยไม่ได้นะคะ ในฐานะผู้ฝึกสอนแห่งสวนต้นบ๊วยแล้ว คงให้ใครเห็นภาพลักษณ์ที่น่าเกลียด#nแบบนี้ไม่ได้หรอกค่ะ"
80000029-35 = "แต่ในเมื่อเป็นแบบนี้แล้ว... ฮุฮุ ฉันขอให้ช็อกโกแลตที่ซื้อมากับคุณครูเลยนะคะ"
80000029-36 = "ฉันที่ให้ช็อกโกแลตของผู้ใหญ่กับคุณครูได้แบบนี้..."
80000029-37 = "บางครั้งการเผลอซื้อรัม บอนบอนมาโดยไม่รู้ตัวก็ไม่แย่เท่าไรเลยนะคะ~"
80000029-39 = "(จากนั้นคุณครูก็ให้ชุนนอนพักที่ห้องพักของชาเล่ต์อยู่ครู่หนึ่งก่อนจะไปส่งที่ซานไห่จิง...)"

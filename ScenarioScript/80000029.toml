80000029-1 = "#title;어른의 초콜릿"
80000029-2 = "#place;샬레 업무관"
80000029-3 = "3;슌;01;어서 오세요, 선생님~\n#3;greeting\n#3;a"
80000029-4 = "3;슌;03;후후, 오늘도 바쁘게 일하시느라 수고 많으셨어요.\n#3;em;[반짝]"
80000029-5 = "3;슌;12;간식을 준비해 드릴까요? 아니면 낮잠부터 주무시겠어요?"
80000029-6 = "3;슌;07;그도 아니라면…… 후후…….\n#3;shake\n#3;em;[///]"
80000029-7 = "[s1] \"……슌?\"\n[s2] \"무슨 문제라도 있는 거야?\""
80000029-8 = "3;슌;03;네에? 저는 아무 문제도 없는걸요~\n#3;em;[?]\n#3;stiff"
80000029-9 = "3;슌;03;네에? 저는 아무 문제도 없는걸요~\n#3;em;[?]\n#3;stiff"
80000029-10 = "3;슌;07;언제나처럼 엄격한 매화원의 교관, 슌이랍니다~\n#3;em;[음표]\n#3;greeting"
80000029-11 = "3;슌;14;물론 평소보다 조금 기분이 좋은 것 같기는 하네요~\n#3;hophop"
80000029-12 = "[s] \"뭔가 이상한데…….\""
80000029-13 = "#st;[0,0];instant;1;"
80000029-14 = "#clearST"
80000029-15 = "#wait;2000"
80000029-16 = "3;슌;10;어, 어라? 선생님 이렇게 가까이 다가오시면…….\n#3;stiff\n#3;closeup"
80000029-17 = "3;슌;09;아무리 저라도 조금 부끄러워요…….\n#3;em;[///]\n#3;closeup"
80000029-18 = "#na;(슌의 입가에서 옅은 알코올 냄새가 났다.)"
80000029-19 = "[s] \"설마…… 술을 마신 거야?\""
80000029-20 = "3;슌;02;수, 술이라뇨?!\n#3;em;[?!]\n#3;shake"
80000029-21 = "3;슌;05;매화원의 교관이 그런 모범이 되지 못하는 비행을 저지를 리가 없잖아요!\n#3;hophop"
80000029-22 = "3;슌;06;점심 이후로 먹은 것이라곤, 오는 길에 구입한 초콜릿밖에 없는데…….\n#3;stiff"
80000029-23 = "3;슌;02;네? 무슨 초콜릿을 먹었냐고요?\n#3;em;[?]"
80000029-24 = "#st;[0,0];instant;1;"
80000029-25 = "#clearST"
80000029-26 = "3;슌;02\n#3;m1\n#wait;1000"
80000029-27 = "3;슌;02\n#3;greeting"
80000029-28 = "#wait;1000"
80000029-29 = "3;슌;14;여기에 있는…… 럼 봉봉을 하나 먹었어요."
80000029-30 = "3;슌;07;럼 봉봉은 처음이었는데, 럼 레이즌 아이스크림과 같은 중후한 향기가 나서 맛있었답니다.\n#3;em;[///]"
80000029-31 = "3;슌;04;네? 럼 봉봉에는 미량의 알코올이 들어있어서 취할 수도 있다고요?\n#3;m3"
80000029-32 = "3;슌;11;어머나, 저는 그런 줄도 모르고…….\n#3;stiff"
80000029-33 = "[s] \"미안하지만, 이 초콜릿은 내가 가져갈게.\""
80000029-34 = "3;슌;09;네…… 하는 수 없지요. 매화원의 교관으로서 형편없이 취해 꼴사나운 모습을 보일 수는 없으니까요.\n#3;em;[땀]\n#3;greeting"
80000029-35 = "3;슌;13;하지만 이렇게 되면…… 후후, 제가 산 초콜릿을 선생님께 드리는 셈이 되는 건가요.\n#3;em;[...]"
80000029-36 = "3;슌;12;생색내지 않고 자연스럽게, 선생님께 어른의 초콜릿을 선물할 수 있다니……"
80000029-37 = "3;슌;14;가끔 럼 봉봉을 모른 척 구입하는 것도 나쁘지 않겠네요~\n#3;em;[반짝]\n#3;greeting"
80000029-38 = "#all;hide"
80000029-39 = "#na;(이후, 슌을 생활관에서 잠깐 자게 한 뒤 산해경으로 돌려보냈다…….)"

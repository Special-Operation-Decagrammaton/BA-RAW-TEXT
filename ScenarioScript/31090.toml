[translation]
31090-1 = "#title;제9화;수면 아래의 것들"
31090-2 = "#zmc;move;316,0;2528;2500\n#wait;2500"
31090-3 = "#zmc;instant;316,0;2528\n4;나기사;01\n#4;a\n#wait;1500"
31090-4 = "#zmc;instant;316,0;2528\n4;나기사;03;어서오세요. 선생님. 수고가 많으십니다.\n#4;em;[반짝]"
31090-5 = "#zmc;instant;316,0;2528\n4;나기사;01;보충수업부의 관리는 잘되어 가고 있을까요?"
31090-6 = "#zmc;instant;316,0;2528\n4;나기사;02;……네. 소식은 들었지만요. 첫번째 시험은 아무래도 잘 되지 않았나 보네요.\n#4;em;…"
31090-7 = "#zmc;instant;316,0;2528\n4;나기사;99;그래도 남은 두 번의 시험이 아직 있으니……"
31090-8 = "#zmc;instant;316,0;2528\n4;나기사;02;아아……. 이것 말입니까? 체스를 두고 있었어요. 취미이기도 하거든요.\n#4;em;[반응]"
31090-9 = "#zmc;instant;316,0;2528\n[s] 나기사가 두고 있던 체스를 살펴본다."
31090-10 = "#zmc;instant;316,0;2528\n4;나기사;01;……어딘가 이상한가요?"
31090-11 = "#zmc;instant;316,0;2528\n4;나기사;99;흑은 킹과 퀸 밖에 없고 전부 폰뿐이고, 백은 킹과 룩, 비숍, 나이트가 3~4개씩 있으니.\n#4;em;…"
31090-12 = "#zmc;instant;316,0;2528\n4;나기사;01;분명 이상한 체스로 보이겠지요."
31090-13 = "#zmc;instant;316,0;2528\n[s] \"혼자 두고 있었던 거야?\""
31090-14 = "#zmc;instant;316,0;2528\n4;나기사;02;아아, 지금은 저 혼자입니다. 시끄러운 미카 씨도 없고. 이때 해두고 싶은 말이 있어서요."
31090-15 = "#zmc;instant;316,0;2528\n4;나기사;03;……아니면, 선생님이 먼저 하고 싶은 말이 있는 것 같아 보이는데요.\n#4;em;[반짝]"
31090-16 = "#zmc;instant;316,0;2528\n[s] \"세번의 시험을 모두 낙제하면 보충수업부는 어떻게 되는 거지?\""
31090-17 = "#zmc;instant;316,0;2528\n4;나기사;03;……."
31090-18 = "#zmc;instant;316,0;2528\n4;나기사;02;그런 얘기를 들었나보군요. 아마도 히후미 씨가 말했겠죠."
31090-19 = "#zmc;instant;316,0;2528\n4;나기사;99;그녀는 그런 부분에 무르니까요. 뭐, 그게 히후미 씨의 장점이기도 하니 어쩔 수 없는 것이지만…….\n#4;em;…"
31090-20 = "#zmc;instant;316,0;2528\n4;나기사;10;뭐, 당연한 이야기입니다. 학교에서 낙제를 반복한다…… 그러면 결과는 뻔하겠죠. 보충수업부원, 전원 퇴학입니다."
31090-21 = "#zmc;instant;316,0;2528\n[s] \"퇴학?!\""
31090-22 = "#zmc;instant;316,0;2528\n4;나기사;07;당연히 트리니티에도 낙제, 정학과 퇴학 등의 교칙이 있습니다."
31090-23 = "#zmc;instant;316,0;2528\n4;나기사;01;하지만 절차가 길고 번거롭고, 확인과 논의해야 하는 것들도 많죠. 게헨나와는 달리 저희는 절차를 중요시하거든요."
31090-24 = "#zmc;instant;316,0;2528\n4;나기사;99;급조된 내규로 만들어진 보충수업부는 그런 교칙을 무시할 수 있게 세팅되어 있습니다. 샬레의 권한을 조금 이용해서요."
31090-25 = "#zmc;instant;316,0;2528\n4;나기사;01;애초에 보충수업부는……"
31090-26 = "#st;[0,0];instant;1;"
31090-27 = "#clearST\n#zmc;instant;316,0;2528\n4;나기사;01\n#4;em;…\n#wait;2500"
31090-28 = "#zmc;instant;316,0;2528\n4;나기사;01\n#4;d\n#wait;1000"
31090-29 = "#zmc;instant;316,0;2528\n3;나기사;01\n#3;a\n#wait;1000\n#3;closeup"
31090-30 = "#zmc;instant;316,0;2528\n3;나기사;10;학생들을 퇴학시키기 위해 만든 것이니까요.\n#3;closeup"
31090-31 = "#zmc;instant;316,0;2528\n[s] \"……?!\""
31090-32 = "#zmc;instant;316,0;2528\n#wait;1500"
31090-33 = "#zmc;instant;316,0;2528\n[s] \"어째서 그런 짓을?!\""
31090-34 = "#zmc;instant;316,0;2528\n3;나기사;10;…….\n#3;closeup"
31090-35 = "#zmc;instant;316,0;2528\n3;나기사;07;그 안에 트리니티의 배신자가 있기 때문입니다.\n#3;closeup"
31090-36 = "#zmc;instant;316,0;2528\n[s] \"배신자……?\""
31090-37 = "#zmc;instant;316,0;2528\n#wait;1000"
31090-38 = "#all;hide"
31090-39 = "#na;나기사;그 배신자가 원하는 것은 에덴조약의 체결을 막는 것."
31090-40 = "#na;나기사;이 말이 가지는 무게를 이해하려면…… 에덴조약이 뭔지부터 설명을 해드려야겠네요."
31090-41 = "#all;hide"
31090-42 = "#na;나기사;에덴조약. 간단하게 말하자면 트리니티와 게헨나의 불가침 조약입니다."
31090-43 = "#na;나기사;핵심은, 게헨나와 트리니티의 주요 요인 모두가 참석하는 중립 조약 기구를 설립하는 것."
31090-44 = "#na;나기사;[ruby=Eden Treaty Organization]에덴조약 기구[/ruby], 라고 불리는 이 집단이 트리니티와 게헨나 사이의 분쟁이 벌어졌을 때, 자동 개입해서 분쟁을 해결하게 됩니다."
31090-45 = "#na;나기사;즉, 이것은 오월동주. 휘청이는 배에 함께 타서 생기는 적대적인 평화 동맹."
31090-46 = "#na;나기사;이것으로 두 학원의 전면전은 불가능해집니다. 누구라도 발버둥 치면 사이좋게 자멸하게 되니까요."
31090-47 = "3;나기사;10\n#3;h"
31090-48 = "3;나기사;10;선생님."
31090-49 = "3;나기사;01;트리니티와 게헨나의 오랜 적대관계는 서로에게 큰 짐이 되고 있습니다. \n#3;em;…"
31090-50 = "3;나기사;99;에덴조약은 그 무의미한 소모를 막는 유일한 방법이자, 키보토스의 힘의 균형을 지키는 길입니다."
31090-51 = "3;나기사;07;이것은 총학생회장이 제시한 해결책이기도 했습니다. 그녀가 행방불명되면서 허사가 된 것을, 제가 겨우 다시 여기까지 복구시킨 것이지요. \n#3;em;[반응]"
31090-52 = "3;나기사;05;이제 간신히 조약이 체결되기 직전까지 왔는데, 이것을 방해하려는 자들이 있다는 첩보를 들어버린 것이죠……."
31090-53 = "3;나기사;07;그게 누구인지는 모릅니다. 그래서…… 차선책으로 혐의가 있는 용의자들을 모두 한곳에 모아둔 것이죠."
31090-54 = "3;나기사;99;배신자는 거기에 있다. 하지만 누구인지는 모른다. \n#3;em;…"
31090-55 = "3;나기사;10;그렇다면…… 버리기 편하게 바구니에 모아둔다. 그런 흐름인 것이죠."
31090-56 = "3;나기사;10;즉, 그 바구니가 바로 보충수업부. 선생님은 그 바구니를 편리하게 만들어준 사람."
31090-57 = "3;나기사;04;……. 죄송합니다."
31090-58 = "3;나기사;01;이런 더러운 일에 끌어들여버렸군요. 저를 비난하셔도 상관없습니다."
31090-59 = "[s] \"날 이용할 생각이었다면 이 사실을 나에게 알려주지 않았겠지.\""
31090-60 = "3;나기사;10;……네. 맞습니다."
31090-61 = "3;나기사;02;이해가 빠르시군요. 그렇다면 이야기는 간단합니다."
31090-62 = "3;나기사;01;선생님."
31090-63 = "3;나기사;02;보충수업부 안에 있는 배신자를 찾아주실 수 있겠습니까?"
31090-64 = "[s] \"…….\""
31090-65 = "3;나기사;07;그자가 선생님을, 트리니티를 속이고 있습니다."
31090-66 = "3;나기사;05;평화를 깨려고 하는 테러리스트들. 저희뿐만 아니라 키보토스의 평화를 자신의 이익과 저울질하는 자들입니다."
31090-67 = "3;나기사;03;배신자를 찾는 것이 키보토스의 평화와 직결된다는 것…… 샬레라면 분명 이해해 주시리라 …….\n#3;em;[반짝]"
31090-68 = "[s] \"아니. 나는 나만의 방식으로 일을 해결하겠어.\""
31090-69 = "#st;[0,0];instant;1;"
31090-70 = "#clearST\n3;나기사;03\n#3;em;…\n#wait;2500"
31090-71 = "3;나기사;01;……그런가요."
31090-72 = "3;나기사;10;다만…… 쓰레기 처리가 곤란할 때, 바구니 채로 버리는 것도 좋은 방법이지요."
31090-73 = "3;나기사;99;……시험의 결과는 어떤 형태로든 저희가 조작할 수 있으니까요."
31090-74 = "3;나기사;02;가령 갑자기 시험 범위가 바뀐다거나, 시험 장소가 바뀐다거나. 난이도가 바뀐다거나. 등으로."
31090-75 = "3;나기사;01;그런 일이 벌어지지 않았으면 좋겠지만……."
31090-76 = "3;나기사;03;……. 실례했습니다. 선생님. 그럼 앞으로도 계속 보충수업부를 잘 부탁드리겠습니다.\n#3;em;[반짝]"
31090-77 = "3;나기사;03;그것 때문에 선생님에게 불이익이나 손해를 끼칠 일은 없을 거라고 말씀드리고 싶지만……."
31090-78 = "[s] \"그럴 일은 없겠지.\""
31090-79 = "3;나기사;02;……네. 쉽게 약속드리지 못하겠네요."
31090-80 = "3;나기사;01;하지만 그렇다고 선생님이 학생들을 버려둘 분도 아니니, 앞으로의 전개는 저 역시 쉽게 예측이 되진 않네요."
31090-81 = "3;나기사;99;바라건대, 그 결말이 고통스럽지 않기만을 바랄 뿐……."
31090-82 = "3;나기사;02;아. 하지만 이건 분명히 말씀 드려야겠네요. \n#3;em;[반응]"
31090-83 = "3;나기사;01;1차 시험은 저희가 아무런 조작도 하진 않았습니다. 이건 진짜예요."
31090-84 = "[s] \"…….\""
31090-85 = "3;나기사;10;선생님의 방식이라는 것…… 그게 트리니티에게 도움이 되는 것이길 바랄 뿐입니다.\n#3;em;…"
31090-86 = "3;나기사;01;그럼…… 다음에 또."
31090-87 = "#all;hide"
31090-88 = "#continued"
31090-89 = "#nextepisode;다음화;합숙, 시작합니다!"

[translation]
31090-1 = "第9話;水面下に揺らめく影"
31090-4 = "あら、先生。お疲れ様です。"
31090-5 = "補習授業部の方はいかがですか？"
31090-6 = "……と言いつつ、すでにお話は聞いております。どうやら最初の試験は、上手く行かなかったようですね。"
31090-7 = "ですがまだ、あと2回残っていますので……。"
31090-8 = "……ああ、これですか？チェスです、趣味でして。"
31090-9 = "[s] ナギサの手元のチェスに目をやる。"
31090-10 = "……おそらく、見慣れないタイプですよね？"
31090-11 = "黒はキングとクイーン、後は全てポーンだけ。"
31090-12 = "白はキング、ルーク、ビショップ、ナイトがそれぞれ3～4個ずつ……きっとあまり見ない形でしょう。"
31090-13 = "[s] \"これ、一人でやってたの？\""
31090-14 = "はい、今は私一人で。うるさいミカさんもいないですし。"
31090-15 = "今日は先生に、お伝えしておきたいことがあったのですが……それよりも先に、先生の方から何か言いたげなことがあるように見受けられますね。"
31090-16 = "[s] \"3回とも不合格になったら、補習授業部のみんなはどうなるの？\""
31090-17 = "……。"
31090-18 = "小耳に挟まれたのでしょうか？出処は……ヒフミさん、ですかね。"
31090-19 = "彼女は、そういうところがありますからね。まあそれが、ヒフミさんの良い所でもあるのですが……。"
31090-20 = "さて、質問にお答えしますと、簡単なお話です。試験で不合格を繰り返す、落第を逃れられそうにない、助け合うこともできない……だとすればみなさん一緒に、退学していただくしかありません。"
31090-21 = "[s] \"退学！？\""
31090-22 = "もちろん、本来はここトリニティにも落第、停学、退学などに関する校則が存在します。"
31090-23 = "ただ、手続きが長くて面倒でして、たくさんの確認と議論を経なければなりません。ゲヘナとは違って、我々は手続きを重要視しますので。"
31090-24 = "ですが今回急造された補習授業部は、このような校則を無視できるように調整してあります。シャーレの権限を少し組み込ませていただいたこともあり、このような措置が可能となっているのです。"
31090-25 = "そもそも、補習授業部は……"
31090-30 = "生徒を退学させるために、作ったものですから。"
31090-31 = "[s] \"……！？\""
31090-33 = "[s] \"どうしてそんなことを……！？\""
31090-34 = "……。"
31090-35 = "あの中に、トリニティの裏切り者がいるからです。"
31090-36 = "[s] \"裏切り者……？\""
31090-39 = "その裏切り者の狙いは、エデン条約締結の阻止。"
31090-40 = "この言葉が持つ重さを理解していただくには……「エデン条約」とは何か、という説明が必要ですね。"
31090-42 = "エデン条約……簡単に言いますと、トリニティとゲヘナの間に結ばれる不可侵条約です。"
31090-43 = "その核心は、ゲヘナとトリニティの中心メンバーが全員出席する、中立的な機構を設立することにあります。"
31090-44 = "[ruby=Eden Treaty Organization]「エデン条約機構」[/ruby]、「ETO」と呼ばれるであろうこの団体が、トリニティとゲヘナの間で紛争が起きた時に介入し、その紛争を解決することになります。"
31090-45 = "言うなれば「呉越同舟」。常に揺れ動く不安定な船に一緒に乗ることによる、敵対的な平和同盟。"
31090-46 = "これにより、二つの学園の間で全面戦争が起きることはなくなります。誰かが踏み込めば、両陣営が仲良く共倒れしてしまうことになりますので。"
31090-48 = "……先生。"
31090-49 = "トリニティとゲヘナの長きにわたる敵対関係は、お互いに大きな重荷になっています。"
31090-50 = "エデン条約はその無意味な消耗を防ぐための、恐らくは唯一の方法であり、キヴォトスにおける力のバランスを保つための方法でもあります。"
31090-51 = "これは、連邦生徒会長が提示した解決策でもありました。彼女が行方不明になってしまい、一度は空中分解しかけたものを、私の元でどうにかここまで立て直したのです。"
31090-52 = "そしてこの念願の条約が締結される直前まで来た、このタイミングで……これを妨害しようとする者たちがいるという情報を耳にしてしまいました。"
31090-53 = "まだ、それが誰なのかは分かりません。特定には至りませんでした。そこで、次善の策として……その可能性がある容疑者を一か所に集めたのです。"
31090-54 = "……裏切り者はそこにいます。ですが、誰なのかは分かりません。"
31090-55 = "であれば、一つの箱にまとめてしまいましょう……いざという時、まとめて捨ててしまいやすいように。"
31090-56 = "……そろそろお分かりでしょう、それが「補習授業部」です。先生には、その「箱」の制作にご協力いただきました。"
31090-57 = "……ごめんなさい。"
31090-58 = "こんな、血生臭いことに先生を巻き込んでしまいました。私のことは、罵っていただいても構いません。"
31090-59 = "[s] \"……でも本当に私を利用する気だったら、こうして今話してくれてないよね。\""
31090-60 = "……流石、理解が速いですね。"
31090-61 = "言っても信じてもらえるかなと思っていましたが、仰る通りです。こうなったらお話は早いですね。"
31090-62 = "先生。"
31090-63 = "……補習授業部にいる裏切り者を、探していただけませんか？"
31090-64 = "[s] \"……。\""
31090-65 = "先生を、トリニティを騙そうとしている者がいます。"
31090-66 = "平和を破壊しようとするテロリストです。私たちだけではなく、キヴォトス全体の平和を、自分たちの利益と天秤にかけようとしているのです。"
31090-67 = "裏切り者を探し出すことが、キヴォトスの平和に直結します。いかがでしょう、連邦捜査部シャーレとしてご理解いただけますと幸いなのですが――"
31090-68 = "[s] \"……私は私のやり方で、その問題に対処させてもらうね。\""
31090-71 = "……そうですか。分かりました。"
31090-72 = "……ですが、先生。ゴミを細かく選別して捨てるのが難しい時は、箱ごと捨てるというのも手段の一つ……そうは思いませんか？"
31090-73 = "それからもう一点……試験については基本的に、私たちの手のひらの上にあります。"
31090-74 = "例えば「急に試験の範囲が変わる」ですとか、「試験会場が変わる」ですとか、「難易度が変わる」ですとか……。"
31090-75 = "そういったことが起きないことを祈っていますが……。"
31090-76 = "……失礼しました、良くない物の言い方でしたね。それではこれからも、引き続き補習授業部をよろしくお願いします、先生。"
31090-77 = "私たちの方から、先生に対して不利益や損害を与えることはありません……と、言いたいところなのですが……。"
31090-78 = "[s] \"……そうとも言いきれない？\""
31090-79 = "……そうですね。簡単にはお約束しかねます。"
31090-80 = "ですが、だからといって、先生が生徒たちを放っておくような方ではないと思っておりますので……これからの展開は私にも予測しきれておりません。"
31090-81 = "どうかこの結末が……できるだけ、苦痛を伴わないものであることを願うだけです。"
31090-82 = "ああ、ですが一つだけお伝えしておきますと……"
31090-83 = "1次試験において、私たちの方では如何なる操作も行っておりません。この部分については、誓って嘘ではないことをお約束します。"
31090-84 = "[s] \"……。\""
31090-85 = "先生なりのやり方……それが、トリニティに利するものであることを願っていますね。"
31090-86 = "……それでは、また。"
31090-89 = "次回;合宿、スタート！"

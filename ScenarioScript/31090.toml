[translation]
31090-1 = "Episode 9;What Lurks in the Depths"
31090-4 = "Welcome, Sensei. How good of you to join me."
31090-5 = "How are you and the Make-Up Work Club faring?"
31090-6 = "...Yes. I heard the news. It sounds like the first exam didn't go so well."
31090-7 = "There are still two exams left, however. "
31090-8 = "Oh...this? I was playing a game of chess. It's a hobby of mine."
31090-9 = "[s] Examine Nagisa's chess board."
31090-10 = "Is something wrong? "
31090-11 = "Aside from the pawns, the black side has only a king and queen, whereas the white has three or four each of kings, rooks, bishops, and knights."
31090-12 = "I'm sure this game must look strange to you."
31090-13 = "[s] \"Were you playing by yourself?\""
31090-14 = "Yes, it's just me at the moment. Mika isn't here to cause her usual distractions. I've been waiting here by myself to speak with you."
31090-15 = "Though it would seem there's something you would like to ask first."
31090-16 = "[s] \"What happens to the Make-Up Work Club if someone fails all three exams?\""
31090-17 = "..."
31090-18 = "So you heard about that. Hifumi must have told you."
31090-19 = "She's soft-hearted when it comes to such things, though that is one of her commendable qualities."
31090-20 = "Nothing out of the ordinary would happen. There is only one course that can be taken after repeated academic failure: Everyone in the Make-Up Work Club will be expelled."
31090-21 = "[s] \"Expelled?!\""
31090-22 = "It's only natural that Trinity have regulations regarding failure, suspension, and expulsion. "
31090-23 = "The steps in doing so are long and arduous. Unlike Gehenna, Trinity follows procedure."
31090-24 = "The Make-Up Work Club, however, was created using a loophole that gets around those rules. It was thanks to Schale's authority that it was established."
31090-25 = "After all, the Make-Up Work Club's true purpose..."
31090-30 = "...is to expel students."
31090-31 = "[s] \"...?!\""
31090-33 = "[s] \"Why would you do that?!\""
31090-34 = "..."
31090-35 = "Because among them is someone who would seek to betray Trinity."
31090-36 = "[s] \"There's a traitor?\""
31090-39 = "This traitor seeks to prevent the Eden Treaty from being signed."
31090-40 = "I suppose it's time I explain the treaty so that you might understand the gravity of the situation."
31090-42 = "The Eden Treaty, simply put, is a non-aggression pact between Trinity and Gehenna."
31090-43 = "Its main purpose is to establish a neutral treaty organization comprised of key figures from both Gehenna and Trinity."
31090-44 = "This organization, named the Eden Treaty Organization, will automatically intervene and resolve any conflict that breaks out between Trinity and Gehenna."
31090-45 = "In other words, this is an alliance that seeks to achieve peace by bringing two bitter enemies together. "
31090-46 = "This will prevent all-out war between the two academies—for if one flounders, then both will sink together."
31090-48 = "Sensei. "
31090-49 = "The lasting hostility between Trinity and Gehenna has been a great burden to both parties."
31090-50 = "The Eden Treaty is the only way to put an end to the needless hostility and keep the balance of power in Kivotos. "
31090-51 = "This solution was suggested by the General Student Council president. It had fallen by the wayside once she went missing, but I've been able to restore its momentum."
31090-52 = "And now, just as we're preparing to finally sign the treaty, we receive intelligence that there are people planning to sabotage it."
31090-53 = "That said, we don't know who she is. That's why our next best option was to gather every suspect in one place. "
31090-54 = "But rest assured: She is among them."
31090-55 = "We are disposing of the entire apple cart to rid ourselves of the one rotten apple."
31090-56 = "Fortunately, Sensei, that's why we chose you to tend to that apple cart—to advise the Make-Up Work Club."
31090-57 = "...My apologies."
31090-58 = "I realize I've put you in the middle of quite the predicament. You have every right to resent me."
31090-59 = "[s] \"You wouldn't have told me any of this if you were only planning to use me.\""
31090-60 = "You are correct. "
31090-61 = "It's good that you're quick on the uptake. "
31090-62 = "Sensei. "
31090-63 = "I would like for you to identify the traitor hiding among the Make-Up Work Club."
31090-64 = "[s] \"...\""
31090-65 = "They are already deceiving you and Trinity as we speak."
31090-66 = "She is a terrorist, and terrorists do not wish for peace. They think they can risk the safety of Kivotos for their own personal gain."
31090-67 = "Finding the traitor is for the sake of Kivotos' peace and safety. Surely that's something you can sympathize with as a representative of Schale."
31090-68 = "[s] \"No. I'm going to find a solution MY way.\""
31090-71 = "Will you now?"
31090-72 = "Though do remember the apple cart. If you can't spot the rotten apple, you could simply...tip it over and dispose of them all."
31090-73 = "There are many ways to alter exam results."
31090-74 = "For example, the contents, location, or difficulty of an exam could suddenly be changed at the last minute."
31090-75 = "Of course, it would be a shame if such a thing happened, but then again..."
31090-76 = "Pardon me, Sensei. I'll continue to leave the Make-Up Work Club under your care."
31090-77 = "I'd love to say that you personally won't be exposed to any unpleasantness because of this..."
31090-78 = "[s] \"I somehow doubt that.\""
31090-79 = "Right. I make no promises."
31090-80 = "But knowing you—someone who couldn't bear to leave a student behind—#nI can hardly predict how things will ultimately turn out."
31090-81 = "I only hope that the end of this story will be a happy one."
31090-82 = "Oh, but there is one thing I want to make clear."
31090-83 = "We didn't interfere with the first exam in any way. I promise you that."
31090-84 = "[s] \"...\""
31090-85 = "If you insist on doing things your way, then I hope it will be something that benefits Trinity."
31090-86 = "Well, then. Until next time."
31090-89 = "Next Episode;Boot Camp, Here We Come!"

[translation]
31090-1 = "ตอนที่ 9;สิ่งที่ซ่อนอยู่เบื้องลึก"
31090-4 = "เชิญค่ะคุณครู เหนื่อยน่าดูเลยนะคะ"
31090-5 = "ยังคุมชมรมชั้นเรียนเสริมได้ดีใช่ไหมคะ?"
31090-6 = "ฉันทราบข่าวแล้วค่ะ การสอบครั้งแรกคงยังไม่เป็นผลสินะคะ"
31090-7 = "แต่ยังไงก็ยังเหลือการสอบอีก 2 ครั้ง..."
31090-8 = "อ่า... อันนี้น่ะเหรอคะ? ฉันเล่นหมากรุกไว้ค่ะ มันเป็นงานอดิเรกของฉันด้วยน่ะค่ะ"
31090-9 = "[s] วิเคราะห์หมากรุกที่นางิสะวางไว้"
31090-10 = "...มีตรงไหนแปลกเหรอคะ?"
31090-11 = "สีดำเหลือแต่คิงกับควีน แล้วก็เบี้ย ส่วนสีขาวมีทั้งคิง บิชอป เรือ แล้วก็ม้า"
31090-12 = "มันดูแปลกใช่ไหมคะ?"
31090-13 = "[s] \"เล่นอยู่คนเดียวเหรอ?\""
31090-14 = "ตอนนี้อยู่คนเดียวค่ะ พอดีคุณมิกะที่ชอบพูดมากไม่อยู่ ฉันก็เลยมีเรื่องที่อยากจะบอกค่ะ"
31090-15 = "แต่ว่า... คุณครูก็ดูเหมือนอยากจะพูดอะไรก่อนนะคะ?"
31090-16 = "[s] \"ถ้าสอบไม่ผ่านทั้ง 3 ครั้ง ชมรมชั้นเรียนเสริมจะเป็นยังไงเหรอ?\""
31090-17 = "......"
31090-18 = "คงจะได้ยินเรื่องนั้นจากคุณฮิฟุมิมาสินะคะ"
31090-19 = "คุณฮิฟุมิใจอ่อนกับเรื่องแบบนี้มาก ถึงจะเป็นจุดแข็งของเธอก็ตาม..."
31090-20 = "แต่ยังไงมันก็แน่นอนอยู่แล้วค่ะ ถ้าสอบตกซ้ำแล้วซ้ำเล่า... ผลลัพธ์มันก็ชัดเจนอยู่แล้วนี่คะ#nก็ต้องให้ชมรมชั้นเรียนเสริมทุกคนลาออกค่ะ"
31090-21 = "[s] \"ให้ลาออก?!\""
31090-22 = "ที่ทรีนิตี้ของเรามีกฎเรื่องการสอบตก การพักการเรียน และการไล่ออกอยู่ค่ะ"
31090-23 = "แต่ขั้นตอนมีเยอะและซับซ้อน ทั้งยังต้องตรวจสอบและหารือในหลายประเด็น#nพวกเราให้ความสำคัญกับขั้นตอน ไม่เหมือนกับเกเฮนน่า..."
31090-24 = "ชมรมชั้นเรียนเสริมที่ถูกจัดตั้งอย่างฉุกละหุกด้วยข้อบังคับภายในถูกกำหนดให้เมินกฎพวกนี้ได้#nเพราะว่าใช้สิทธิ์ของชาเล่ต์นิดหน่อยไงคะ"
31090-25 = "ก็เพราะชมรมชั้นเรียนเสริม..."
31090-30 = "ถูกตั้งขึ้นเพื่อไล่นักเรียนออกตั้งแต่แรกยังไงล่ะคะ"
31090-31 = "[s] \".......?!\""
31090-33 = "[s] \"ทำไมถึงทำเรื่องแบบนี้?!\""
31090-34 = "......"
31090-35 = "เพราะในนั้นมีคนทรยศของทรีนิตี้อยู่ยังไงล่ะคะ"
31090-36 = "[s] \"คนทรยศเหรอ?\""
31090-39 = "มีคนต้องการขัดขวางการทำสนธิสัญญาเอเดนค่ะ"
31090-40 = "หากจะให้คุณครูเข้าใจความหมายของสิ่งนี้... ดูเหมือนฉันจะต้องอธิบายเกี่ยวกับ#nสนธิสัญญาเอเดนก่อนสินะคะ"
31090-42 = "สนธิสัญญาเอเดน.. พูดง่ายๆ คือสนธิสัญญาไม่รุกรานระหว่างทรีนิตี้กับเกเฮนน่าค่ะ"
31090-43 = "วัตถุประสงค์ก็คือการจัดตั้งองค์กรที่เป็นกลางที่สมาชิกทุกคนของเกเฮนน่าและทรีนิตี้#nสามารถเข้าร่วมได้"
31090-44 = "หากทรีนิตี้กับเกเฮนน่าเกิดเรื่องขัดแย้งกัน กลุ่มที่เรียกว่า[ruby=Eden Treaty Organization]องค์กรสนธิสัญญาเอเดน[/ruby] จะเข้ามาแทรกแซง#nและระงับข้อพิพาทโดยอัตโนมัติค่ะ"
31090-45 = "ไม่ต่างจากสมาคมสันติภาพที่เกิดขึ้นจากการลงเรือที่โคลงเคลงด้วยกัน"
31090-46 = "สิ่งนี้จะป้องกันไม่ให้เกิดสงครามเต็มรูปแบบระหว่างสองโรงเรียนค่ะ เพราะถ้าใครทำเรือล่ม#nทั้งสองฝ่ายก็จะจมด้วยกันหมด"
31090-48 = "คุณครูคะ"
31090-49 = "ความเป็นศัตรูที่ยาวนานของทรีนิตี้และเกเฮนน่าต่างเป็นภาระของกันและกันค่ะ"
31090-50 = "สนธิสัญญาเอเดนเป็นวิธีเดียวที่จะหยุดยั้งการทำลายล้างที่ไร้ความหมายนั้นได้#nและจะเป็นหนทางในการรักษาสมดุลของพลังในคิโวทอส"
31090-51 = "และยังเป็นทางออกที่ประธานองค์การนักเรียนเสนอไว้ด้วยค่ะ ตอนนี้ฉันกำลังฟื้นฟู#nสิ่งที่จะหายไปกับอากาศพร้อมการหายตัวไปของประธานฯ อยู่ค่ะ"
31090-52 = "มันยากลำบากมากๆ กว่าเราจะมาถึงจุดที่จะได้ทำสนธิสัญญานี้ แต่ก็มีแหล่งข่าวรายงานมาว่า#nมีผู้คนที่ต้องการจะขัดขวางการทำสัญญา..."
31090-53 = "แต่ฉันก็ไม่รู้ว่าคือใครหรอกค่ะ ฉันก็เลย... หาแผนการที่ดีที่สุดในการรวบรวม#nผู้ต้องสงสัยทั้งหมดไว้ด้วยกัน"
31090-54 = "คนทรยศอยู่ในนั้นค่ะ แต่เราไม่รู้ว่าคือใคร"
31090-55 = "เพราะแบบนั้น... ก็เลยเอาไปใส่ตะกร้าไว้ด้วยกัน จะได้ทิ้งไปง่ายๆ"
31090-56 = "และตะกร้านั้นก็คือชมรมชั้นเรียนเสริมค่ะ ส่วนคุณครูก็คือคนที่ทำให้ตะกร้านั้นใช้งานได้สะดวก"
31090-57 = "ขอโทษด้วยนะคะ..."
31090-58 = "ขอโทษที่ดึงเข้ามาเกี่ยวข้องในเรื่องที่ไม่สะอาดแบบนี้ค่ะ จะตำหนิฉันก็ได้นะคะ"
31090-59 = "[s] \"ถ้าจะหลอกใช้กัน เธอคงไม่บอกความจริงนี้กับครูหรอก\""
31090-60 = "อืม.. ถูกต้องแล้วค่ะ"
31090-61 = "เข้าใจเร็วดีนะคะ ถ้างั้นก็คุยกันง่ายหน่อย"
31090-62 = "คุณครูคะ"
31090-63 = "ช่วยหาคนทรยศในชมรมชั้นเรียนเสริมให้ได้ไหมคะ?"
31090-64 = "[s] \"........\""
31090-65 = "เธอคนนั้นกำลังหลอกคุณครูและทรีนิตี้อยู่ค่ะ"
31090-66 = "พวกก่อการร้ายที่ต้องการทำลายสันติภาพ ไม่เพียงแต่ของเราเท่านั้น#nพวกเขายังชั่งน้ำหนักผลประโยชน์ของตัวเองกับสันติภาพของคิโวทอสด้วย"
31090-67 = "การกำจัดคนทรยศในครั้งนี้มีผลใหญ่หลวงกับความสงบในคิโวทอส... หวังว่าชาเล่ต์จะเข้าใจนะคะ..."
31090-68 = "[s] \"ไม่หรอก ครูจะหาทางออกในวิธีของครูเอง\""
31090-71 = "เอาแบบนั้นเหรอคะ...?"
31090-72 = "แต่ถ้าหาก... การจัดการขยะเป็นเรื่องยากลำบาก การทิ้งไปทั้งตะกร้าก็เป็นอีกทางออกนะคะ"
31090-73 = "เพราะเรื่องคะแนนสอบ... ไม่ว่ายังไงพวกฉันก็จะควบคุมมันได้อยู่ดี"
31090-74 = "ไม่ว่าจะเปลี่ยนบรรยากาศในการสอบ เปลี่ยนสนามสอบ หรือเปลี่ยนระดับความยากข้อสอบ..."
31090-75 = "ฉันเองก็ไม่อยากให้เกิดเรื่องแบบนั้นหรอกนะคะแต่ว่า..."
31090-76 = "ต้องขอโทษด้วยนะคะ... คุณครู ต่อไปก็ขอฝากชมรมชั้นเรียนเสริมด้วยนะคะ"
31090-77 = "ฉันอยากจะบอกว่าเรื่องนี้จะไม่ทำให้คุณครูเสียผลประโยชน์หรือได้รับความเสียหาย แต่ก็..."
31090-78 = "[s] \"ไม่มีทางเป็นแบบนั้นหรอก\""
31090-79 = "ค่ะ... ฉันคงให้คำสัญญาง่ายๆ ไม่ได้"
31090-80 = "แต่ฉันรู้ดีว่าคุณครูจะไม่ทอดทิ้งพวกนักเรียน ฉันก็เลยคาดเดาไม่ได้ว่าจะเกิดอะไรขึ้นในอนาคตน่ะค่ะ"
31090-81 = "ได้แค่หวังว่าตอนจบมันจะไม่เจ็บปวด..."
31090-82 = "อ่า... จะว่าไปแล้ว ฉันต้องบอกเรื่องนี้ด้วยสินะคะ"
31090-83 = "การสอบครั้งที่ 1 พวกฉันไม่ได้เข้าไปทำอะไรกับคะแนนนะคะ ทั้งหมดเป็นคะแนนจริงที่ทุกคนทำได้ค่ะ"
31090-84 = "[s] \".......\""
31090-85 = "หวังว่าทางออกในวิธีของคุณครู... จะเป็นประโยชน์ต่อทรีนิตี้นะคะ"
31090-86 = "ถ้าอย่างนั้น... ไว้พบกันใหม่ค่ะ"
31090-89 = "ตอนต่อไป;เริ่มแคมป์ฝึกฝน!"

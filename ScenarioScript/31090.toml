[translation]
31090-1 = "第9話;水面下搖曳的影子"
31090-4 = "哎呀，老師。辛苦您了。"
31090-5 = "補課部的情況還順利嗎？"
31090-6 = "……雖然這麼說，不過我已經聽說了。#n看來最初的測驗似乎不太順利呢。"
31090-7 = "不過測驗還剩下兩次……"
31090-8 = "……啊啊，這個嗎？#n我在下西洋棋，可以算是我的興趣。"
31090-9 = "[s] 觀察渚正在下的西洋棋"
31090-10 = "……有哪裡讓您覺得奇怪嗎？"
31090-11 = "黑色方只有國王和皇后，其餘全都是士兵。#n而白色方則是只有國王、城堡、主教、騎士各3至4個。"
31090-12 = "……看起來或許會覺得有些奇怪吧。"
31090-13 = "[s] 「你一個人在下棋嗎？」"
31090-14 = "是的，現在只有我一個人。#n吵鬧的彌香同學今天也不在，因此我有事情想告知老師……"
31090-15 = "……不過在那之前，老師似乎有話想對我說呢。"
31090-16 = "[s]「如果三次測驗都不合格的話，補課部的大家會怎麼樣？」"
31090-17 = "……"
31090-18 = "看來您已經聽說了呢。#n我想應該是從日步美同學口中聽見的吧？"
31090-19 = "他在某些方面確實顯得有些軟弱呢。#n雖然我認為那同時也是日步美同學的優點……這也沒辦法。"
31090-20 = "這個問題的答案很簡單。#n持續無法在考試中合格的下場顯而易見──那就是所有補課部成員一起退學。"
31090-21 = "[s]「退學！？」"
31090-22 = "當然，三一本來就有與留級、停學、退學相關的校規存在。"
31090-23 = "只是其手續繁瑣冗長，必須經過多次確認和議論才能成立。#n畢竟我們與格黑娜不同，相當重視所謂的程序。"
31090-24 = "不過本次的補課部由於是由臨時規則所設立，因此得以無視原本的規定。#n其中也稍微利用了一些夏萊的權限。"
31090-25 = "況且補課部本身……"
31090-30 = "打從一開始，就是為了讓學生退學而設立的社團。"
31090-31 = "[s]「……！？」"
31090-33 = "[s]「為什麼要做那種事……！？」"
31090-34 = "……"
31090-35 = "因為在那些人之中，存在三一的叛徒。"
31090-36 = "[s]「叛徒……？」"
31090-39 = "而叛徒的目的，是阻止伊甸園條約的締結。"
31090-40 = "為了讓您理解這句話的重要性……似乎必須向您說明「伊甸園條約」究竟是什麼呢。"
31090-42 = "伊甸園條約……簡單來說，就是三一和格黑娜之間締結的互不侵犯條約。"
31090-43 = "其核心為──設立所有格黑娜和三一的主要成員都參與其中的中立機構。"
31090-44 = "[ruby=Eden Treaty Organization]「伊甸園條約機構」[/ruby]──被稱為「ETO」的這個團體，#n會在三一和格黑娜之間發生紛爭時介入，並解決那場紛爭。"
31090-45 = "也就是「吳越同舟」──藉由共同乘坐在搖擺不定的船上所形成的敵對和平同盟。"
31090-46 = "如此一來，兩所學園之間發生全面戰爭的可能性將徹底消滅。#n因為只要有一方踰矩，雙方陣營就會手牽手一起滅亡。"
31090-48 = "……老師。"
31090-49 = "三一和格黑娜長期以來的敵對關係，對彼此造成了沉重的負擔。 "
31090-50 = "而伊甸園條約是防止那無意義消耗的唯一方法，也是維持奇普托斯力量均衡的手段。"
31090-51 = "並且同時也是聯邦學生會長提出的解決方案。#n由於他的失蹤而一度瀕臨瓦解的條約，我總算是將其重建到了目前的狀態。"
31090-52 = "如今條約的締結已近在眼前……我卻收到了有人想阻止這件事的情報。"
31090-53 = "目前還不清楚那個人究竟是誰。#n所以作為次佳的策略……我將有可能的嫌疑人聚集在了同一個地方。"
31090-54 = "叛徒就在補課部──不過究竟是誰不得而知。"
31090-55 = "既然如此……為了方便丟棄，就集中在同一個箱子裡吧。"
31090-56 = "事情就是這樣……#n「補課部」就是那個箱子，而老師則是讓「箱子」更便於利用的人。"
31090-57 = "……對不起。"
31090-58 = "我將老師捲進了這種骯髒的事。您要指責我也沒關係。"
31090-59 = "[s]「如果你只是想利用我的話，應該就不會告訴我這些事實了吧。」"
31090-60 = "……是的，您理解的真快呢。"
31090-61 = "這樣說明起來就容易多了。"
31090-62 = "老師。"
31090-63 = "可以請您替我找出補課部裡的叛徒嗎？"
31090-64 = "[s]「……」"
31090-65 = "那個人欺騙了老師，欺騙了三一。"
31090-66 = "他是打算破壞和平的恐怖份子。#n不只是將我們，而是將奇普托斯的和平與自己的利益放在天秤上衡量。"
31090-67 = "找出叛徒一事，將直接影響奇普托斯的和平。#n我想夏萊應該能夠理解才對……"
31090-68 = "[s]「不，我會以我的方式處理那個問題。」"
31090-71 = "……我明白了。"
31090-72 = "不過……如果在處理垃圾時遇到困難，#n將其連同箱子一同捨棄，也不失為一個不錯的方法。"
31090-73 = "此外……補課部的考試，基本上都掌握在我們手中。"
31090-74 = "比如「突然改變考試範圍」、「改變考試地點」、「改變難易度」等等……"
31090-75 = "雖然我不樂見類似的情況發生……"
31090-76 = "……失禮了。#n那麼今後還請老師多多關照補課部。"
31090-77 = "我不希望因此造成老師的不利或損害──#n雖然很想這麼說……"
31090-78 = "[s]「看來你也無法保證啊。」"
31090-79 = "……是的。我沒辦法輕易向您保證。"
31090-80 = "不過即便如此，我認為老師不是會丟下學生不管的人……#n今後事情將如何發展，我也很難加以預測。"
31090-81 = "只能祈求這個結局……盡量不要伴隨著痛苦。"
31090-82 = "啊，不過這件事必須向您澄清……"
31090-83 = "在第1次測驗中，我們並沒有動任何手腳。#n這點是貨真價實的。"
31090-84 = "[s]「……」"
31090-85 = "希望老師採取的方式……將會對三一有所幫助。"
31090-86 = "那麼……下次見。"
31090-89 = "下一話;合宿，START！"

[translation]
83303100200-7 = "……呼。練習就先到此為止吧。"
83303100200-8 = "就算心急……也無法提高練習的效果。"
83303100200-9 = "要保持冷靜才行……"
83303100200-16 = "[ns]「……這件事還是先告訴陽奈，畢竟違反規定不是好事。」"
83303100200-17 = "原來如此。#n難怪……莫名覺得有點安靜。"
83303100200-18 = "畢竟只要我一離開，萬魔殿的議長就會伺機作亂。"
83303100200-19 = "已經不是什麼稀奇的事了。"
83303100200-20 = "[ns]「原來是常有的事啊……！」"
83303100200-21 = "總之謝謝你的聯絡，老師。"
83303100200-22 = "這次的事，我會和風紀委員會一起處理。"
83303100200-23 = "[ns]「嗯，陽奈。那……鋼琴的練習也加油哦。」"
83303100200-25 = "嗯。"

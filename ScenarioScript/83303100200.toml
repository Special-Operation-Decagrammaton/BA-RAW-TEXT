[translation]
83303100200-7 = "ฮู่ว... ฝึกแค่นี้ก่อนดีไหมนะ"
83303100200-8 = "ถ้าใจร้อนเกินไป... ก็คงไม่ได้ผลลัพธ์ที่ดีจากการฝึก "
83303100200-9 = "คงต้องสุขุมกว่านี้หน่อย..."
83303100200-16 = "[ns] \"ที่ครูมาบอกเพราะเกิดเรื่องแบบนั้นขึ้นน่ะ... ทำผิดกฎมันไม่ดีเลย\""
83303100200-17 = "อย่างนี้นี่เองสินะ มิน่าละ... ถึงได้เงียบๆ ไปนิดหนึ่ง"
83303100200-18 = "แต่ก็นะ พอฉันไม่อยู่ทีไร ประธานของแพนเดโมเนียม โซไซตี้ก็ก่อเรื่องแบบนี้อยู่บ่อยๆ"
83303100200-19 = "นี่ไม่ใช่เรื่องใหม่อะไรหรอก"
83303100200-20 = "[ns] \"เกิดขึ้นบ่อยๆ สินะ...!\""
83303100200-21 = "ยังไงก็ขอบคุณที่มาบอกนะ คุณครู"
83303100200-22 = "เรื่องนี้เดี๋ยวฉันกับคณะกรรมการวินัยจะจัดการเอง"
83303100200-23 = "[ns] \"อื้ม ฮินะ สู้ๆ นะ... เรื่องฝึกเปียโนก็ด้วย\""
83303100200-25 = "อื้ม"

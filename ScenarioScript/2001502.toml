[translation]
2001502-1 = "The Inner Discipline Club Mascot!"
2001502-2 = "Everywhere I go, all I hear is how people think our club is full of weirdos."
2001502-3 = "It's gotta be a big misunderstanding! We're not weird at all. What do you think, Sensei?"
2001502-4 = "[s1] \"Of course not!\"\n[s2] \"U-Um, I guess not?\""
2001502-5 = "See? I'm so happy that you agree!"
2001502-6 = "[s3] \"Glad to hear it.\""
2001502-7 = "But here's the thing..."
2001502-8 = "Come on, Sensei. What kind of response is that...?"
2001502-9 = "[s4] \"I mean, right! I don't think your club is a strange at all!\""
2001502-10 = "That's more like it!"
2001502-11 = "But here's the thing..."
2001502-12 = "Even if the Inner Discipline Club denies being a bunch of weirdos and says it's all a big misunderstanding, that doesn't mean we'll change people's minds. You know?"
2001502-13 = "People only believe what they want to believe."
2001502-14 = "To convince them otherwise...there'd have to be a heated battle that scorches them at the core of their souls!"
2001502-15 = "At least, that's what Mushiqueen said last week."
2001502-16 = "[s5] \"You mean the anime?!\"\n[s6] \"I don't think that's where you should be getting your life advice!\""
2001502-17 = "What's wrong with learning from Mushiqueen? I don't see the problem!"
2001502-18 = "What's wrong with learning from Mushiqueen? I don't see the problem!"
2001502-19 = "Anyway, I've been thinking about a way to resolve this misunderstanding."
2001502-20 = "Then, when I was having dinner with Tsubaki and Mimori, a great idea suddenly popped in my head!"
2001502-21 = "Can you guess what it was, Sensei? Hmm? Take a guess!"
2001502-22 = "[s] \"I'm stumped. What was it?\""
2001502-23 = "Are you now? Well, listen up!"
2001502-24 = "As you know, I'm cute, smart, adorable...and practically the mascot of the Inner Discipline Club."
2001502-25 = "Therefore, it's up to me to do all the PR for our club and show the world just how normal we are!"
2001502-26 = "I'm calling it...Mascot Kaede's PR Blitz! I'll be going all out for this."
2001502-27 = "What do you think, Sensei? This plan is foolproof!"
2001502-28 = "[s7] \"I don't get what exactly you're promoting, but sure, I guess.\"\n[s8] \"Your confidence is contagious!\""
2001502-29 = "Good, so you're on board. That makes us partners in crime!"
2001502-30 = "Good, so you're on board. That makes us partners in crime!"
2001502-31 = "You wouldn't turn me down, would you?"
2001502-32 = "[s] \"Of course not.\""
2001502-33 = "Then let's go!"
2001502-35 = "And that's how I agreed to do an Inner Discipline Club PR campaign with Kaede."
2001502-36 = "First, we should show them what kind of work the Inner Discipline Club does and how helpful we are. They need to see what we're capable of!"
2001502-37 = "How about...we start off by picking up some trash?"
2001502-38 = "[s] \"That would definitely be a good deed.\""
2001502-39 = "Yeah! We go around with a trash picker like this..."
2001502-40 = "Oh! There's some trash!"
2001502-45 = "We pick it up like this. Simple, right?"
2001502-46 = "But don't let your guard down, Sensei. We don't know what kind of trash we'll encounter in Kivotos. For example, in the corner of that alley..."
2001502-47 = "Oh?!"
2001502-48 = "[s] \"What is it, Kaede?!\""
2001502-49 = "Look, Sensei! Someone threw these out!"
2001502-50 = "[s] \"Trading cards...?\""
2001502-51 = "Yeah! They're old school Mushiqueen cards! Looking at them closely...I think they're banned from use in the trading card game these days."
2001502-52 = "But just throwing them away like they're worthless seems too cruel!"
2001502-53 = "[s] \"Yeah. It looks like they were dumped here...\""
2001502-54 = "Haven't they ever heard of the heart of the cards?! The spirits within won't take kindly to this!"
2001502-55 = "[s] \"Back to taking anime too seriously, I see.\""
2001502-56 = "Oh! There's more garbage over there!"
2001502-59 = "Kaede and I worked hard to clean up the streets for a while."
2001502-64 = "Phew. We collected a lot of trash!"
2001502-68 = "What do you think, Sensei? Will people have a better image of the Inner Discipline Club now?!"
2001502-69 = "[s9] \"Already? I mean, PR isn't that easy! These things take time!\"\n[s10] \"The key is to be consistent and not expect immediate results.\""
2001502-70 = "Oh, so that's how it works?"
2001502-71 = "Oh, so that's how it works?"
2001502-72 = "Hmm... PR is a lot harder than I thought."
2001502-73 = "I'm not giving up just yet, though. Let the operation continue!"
2001502-74 = "What should we do next?"
2001502-75 = "Kaede and I were deep in thought, thinking about what to do next, when suddenly..."
2001502-76 = "I wanna get on the swing now!"
2001502-77 = "What?! You didn't push me long enough! I pushed you so much longer than that!"
2001502-78 = "But it's my turn now!"
2001502-79 = "Hey! Why are you two fighting?"
2001502-80 = "Huh? Aren't you from the Inner Discipline Club?"
2001502-81 = "Listen! We were gonna take turns on the swing, but then my little sister—"
2001502-82 = "But it's my turn now!"
2001502-83 = "Both of you stop it! Siblings shouldn't be fighting over a swing like this!"
2001502-84 = "Now apologize to each other!"
2001502-85 = "O-Okay."
2001502-86 = "S-Sorry..."
2001502-87 = "[s] \"Way to go, Kaede!\""
2001502-88 = "That was nothing! I play with them all the time."
2001502-89 = "[s] \"Oh, so they're friends of yours?\""
2001502-90 = "Hmm. But how can we help them get along again after a fight?"
2001502-91 = "Oh! I have an idea!"
2001502-95 = "Hey, you two! I have something for you!"
2001502-96 = "What are these?"
2001502-97 = "Trading cards?"
2001502-98 = "Yeah! I found them. You can't use them in a tourney or anything, but they're more fun to play with than fighting over a swing."
2001502-99 = "Here. I'll teach you how to play."
2001502-100 = "A-Ahem...! Oof... My throat's a lot drier than I realized."
2001502-101 = "[s] \"Let me get you all something to drink, then.\""
2001502-102 = "You'd do that? Thanks, Sensei!"
2001502-104 = "I made my way to a vending machine just outside of the park."
2001502-105 = "That girl over on the playground... She's from the Inner Discipline Club."
2001502-106 = "Huh? You mean that club full of weirdos?"
2001502-107 = "[s] \"(I guess people have been saying these things...)\""
2001502-108 = "Heh. Look at her playing with those kids. That club might be kinda weird,#nbut they're not so bad, huh?"
2001502-109 = "Yeah. I see them doing a lot of community service around the district too."
2001502-110 = "[s] \"(Maybe they're starting to come around, after all.)\""
2001502-114 = "Hold on. What's going on over there?"
2001502-116 = "Look! When you're playing the Mushiqueen game, you should pose like this!"
2001502-117 = "You'll feel super powerful if you make this pose while attacking your enemy!"
2001502-118 = "Ohhh!"
2001502-119 = "Let's do it together! Mushiqueen!"
2001502-120 = "Attack!"
2001502-121 = "Mushiqueen!"
2001502-122 = "Attack!"
2001502-124 = "Okay, no. She's still weird."
2001502-125 = "I'll say..."
2001502-128 = "There you are, Sensei. Check it out! Look at how many kids came to play.#nThey're totally into Mushiqueen!"
2001502-129 = "Miss Mushiqueen!"
2001502-130 = "That was amazing!"
2001502-131 = "She's a Mushiqueen master!"
2001502-132 = "Mushiqueen master!"
2001502-133 = "I bet this counts as another step forward for the Inner Discipline Club's PR efforts! Don't you think, Sensei?!"
2001502-134 = "[s] \"S-Sure...\""
2001502-135 = "The kids were so excited that I couldn't tell her that the misunderstanding was only getting worse with the onlookers."
2001502-136 = "Hahaha!"

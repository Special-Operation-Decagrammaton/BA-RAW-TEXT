[translation]
2001502-1 = "#title;수행부의 마스코트!"
2001502-2 = "3;카에데;00;최근 들어 우리 수행부를 가리켜 이상하다고 말하는 사람이 늘어난 거 같아!\n#3;em;[반응]\n#3;a\n#3;hophop"
2001502-3 = "3;카에데;02;하지만 그건 오해야! 전혀 그렇지 않은데 말이야! 그치, 선생님?!"
2001502-4 = "[s1] \"당연하지!\"\n[s2] \"……으, 으음, 그, 그렇지?\""
2001502-5 = "3;카에데;11;바로 알아주다니! 역시 선생님이야! 좋아해!\n#3;hophop\n#3;em;[하트]"
2001502-6 = "[s3] \"그렇게 말해주니 기쁘네.\""
2001502-7 = "3;카에데;03;에헤헷! 하여간~! 그래서 말인데~!\n#3;hophop\n#3;em;[재잘]"
2001502-8 = "3;카에데;06;으응~? 뭐야~? 선생님. 반응이 약한데? 지~그~시~\n#3;em;…"
2001502-9 = "[s4] \"아, 응! 전혀 이상하지 않다고 생각해! 물론이지!\""
2001502-10 = "3;카에데;01;흐음~! 뭐! 그럼 됐어!"
2001502-11 = "3;카에데;11;하여간 그래서 말인데~!\n#3;hophop\n#3;em;[재잘]"
2001502-12 = "3;카에데;03;수행부가 이상하다고 말하는 사람들한테, 아무리 그게 오해라고 말해도- 역시 말로만 해서는 진심이 전달되지 않는 법이잖아?"
2001502-13 = "3;카에데;00;사람은 보통 믿고 싶은 것만 믿는 법이니까 말이야!"
2001502-14 = "3;카에데;05;진정으로 서로의 진심을 이해하기 위해선……. 거기엔 반드시 영혼이 불타오를 만큼의 뜨거운 배틀이 있어야 하는 법이니까!"
2001502-15 = "3;카에데;11;지난주에 방송했던 무시퀸에서 그랬어!\n#3;em;[재잘]"
2001502-16 = "[s5] \"알고 보니 애니메이션의 이야기?!\"\n[s6] \"카에데, 그건 좀 다르지 않을까?!\""
2001502-17 = "3;카에데;08;어? 다른 거야? 으음~ 뭔가 어렵네~\n#3;em;[?]"
2001502-18 = "3;카에데;08;어? 다른 거야? 으음~ 뭔가 어렵네~\n#3;em;[?]"
2001502-19 = "3;카에데;00;하여간 그래서 오해를 바로잡을 좋은 방법이 없을까. 나, 고민하고 고민하고 또 고민했거든?"
2001502-20 = "3;카에데;03;그러다가 어제 츠바키 선배랑 미모리 선배랑 같이 저녁밥을 먹고 있을 때, 삐빗! 하고 엄청난 방법이 떠올랐지. 뭐야!"
2001502-21 = "3;카에데;11;저기, 그게 뭐라고 생각해? 선생님? 응응? 물어봐 줘!\n#3;hophop\n#3;em;[재잘]"
2001502-22 = "[s] \"신경 쓰이는걸, 무슨 방법이야?\""
2001502-23 = "3;카에데;11;후후후! 네네! 선생님! 나요나요! 방법이 있습니다앗! 그게 뭐냐면 말이야~!\n#3;hophop"
2001502-24 = "3;카에데;09;선생님도 알다시피 내가 또 엄청나게 귀엽고 똑똑하고, 또 귀여운……! 수행부의 마스코트잖아?\n#3;em;[반짝]"
2001502-25 = "3;카에데;00;그런 내가 직접- 수행부가 이상하지 않다고 홍보하는 거야!"
2001502-26 = "3;카에데;11;일명 마스코트 카에데 쨩! 혼신의 홍보 작전 개시 대작전!\n#3;em;[반응]\n#3;hophop"
2001502-27 = "3;카에데;03;어때? 어떻게 생각해? 선생님? 이건 분명 성공할 거 같지 않아?!"
2001502-28 = "[s7] \"작전인지, 대작전인지, 어느 쪽인지는 잘은 모르겠지만…….\"\n[s8] \"그야말로 어마어마한 자신감……!\""
2001502-29 = "3;카에데;11;그런 의미에서 이제부터 선생님과 나는 영혼의 파트너로 결정이야!\n#3;em;[반짝]"
2001502-30 = "3;카에데;11;그런 의미에서 이제부터 선생님과 나는 영혼의 파트너로 결정이야!\n#3;em;[반짝]"
2001502-31 = "3;카에데;11;그러니 지금부터 같이 수행부 작전에 어울려 줘! 음~! 어울려줄 거지?!"
2001502-32 = "[s] \"응.\""
2001502-33 = "3;카에데;03;에헤헷! 그럼 출발~!\n#3;em;[음표]"

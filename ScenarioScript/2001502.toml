[translation]
2001502-1 = "มาสคอตแห่งชมรมฝึกฝน!"
2001502-2 = "ช่วงนี้คนที่พูดว่าชมรมฝึกฝนของเราแปลก มีจำนวนเพิ่มขึ้นเรื่อยๆ เลย!"
2001502-3 = "แต่มันเป็นแค่การเข้าใจผิดนะ! พวกเราไม่ได้เป็นแบบนั้นสักหน่อย! ใช่ไหมล่ะ คุณครู?!"
2001502-4 = "[s1] \"ก็ใช่น่ะสิ!\"\n[s2] \"อะ...อื้อ ใช่แล้ว\""
2001502-5 = "รู้ได้ทันทีเลยงั้นเหรอ! สมกับเป็นคุณครูจริงๆ เลย ยอดเยี่ยมมาก!"
2001502-6 = "[s3] \"พูดแบบนั้นครูดีใจนะ\""
2001502-7 = "แฮะๆ~! เอาเถอะ ไหนๆ ก็ไหนๆ แล้ว~!"
2001502-8 = "หืม~! อะไรน่ะ~? คุณครู ปฏิกิริยาตอบโต้ดูอ่อนเปลี้ยจังนะ? น่า~สง~สัย~"
2001502-9 = "[s4] \"อื้อ! ครูว่าไม่แปลกเลยสักนิด! ไม่แปลกเลย!\""
2001502-10 = "อื้มมมม~! ต้องแบบนี้สิ!"
2001502-11 = "ไหนๆ ก็ไหนๆ แล้ว~!"
2001502-12 = "สำหรับพวกคนที่คิดว่าชมรมฝึกฝนเป็นชมรมแปลกๆ ถ้าเราแค่ไปบอกว่าพวกเขาเข้าใจผิดอย่างเดียว#nละก็ มันก็คงเหมือนไม่หนักแน่นพอใช่มั้ยล่ะ?"
2001502-13 = "ก็คนเรามักจะเชื่อแต่ในสิ่งที่อยากเชื่อนี่นา!"
2001502-14 = "เพื่อจะให้เข้าใจถึงความจริงใจของกันและกันอย่างถ่องแท้... จะต้องมีการต่อสู้ที่ร้อนแรงเพื่อโหม#nกระหน่ำไฟในจิตวิญญาณ!"
2001502-15 = "ฉันฟังมาจากเรื่องมูชิควีนที่ออกอากาศอาทิตย์ที่แล้วน่ะ"
2001502-16 = "[s5] \"คำพูดจากอนิเมะหรอกเรอะ?!\"\n[s6] \"คาเอเดะ มันไม่แปลกไปหน่อยเรอะ?!\""
2001502-17 = "เอ๋? ก็ใช่น่ะสิ แปลกเหรอ? ยากจังเลยน้า~"
2001502-18 = "เอ๋? แปลกเหรอ? อืมมมม~ ยากจังเลยน้า~"
2001502-19 = "ฉันนั่งคิดอยู่นานเลยนะว่ามีวิธีดีๆ แบบไหนที่จะแก้ไขความเข้าใจผิดได้บ้าง"
2001502-20 = "แล้วเมื่อวานตอนที่กินข้าวเย็นกับรุ่นพี่สึบากิและรุ่นพี่มิโมริ ปิ๊งๆ ฉันก็นึกวิธีดีๆ ออกละ! รู้มั้ยว่าอะไร?"
2001502-21 = "คุณครูคิดว่าอะไรเหรอ? หืม? อยากรู้มั้ย? ถามฉันสิๆ"
2001502-22 = "[s] \"น่าสงสัยนะ วิธีดีๆ แบบไหนเหรอ?\""
2001502-23 = "ฮิฮิฮิ ใช่แล้วๆ คุณครู! ฉันซะอย่างต้องมีวิธีดีๆ อยู่แล้ว! วิธีนั้นก็คือ...~!"
2001502-24 = "คุณครูเองก็รู้ดีว่าฉันทั้งน่ารักแล้วก็ฉลาดสุดๆ...! แล้วฉันก็ยังเป็นมาสคอตสุดน่ารักของชมรมฝึกฝน#nด้วยนี่นา"
2001502-25 = "เพราะงั้นฉันก็จะไปโปรโมตด้วยตัวเองว่า \"ชมรมฝึกฝนไม่มีอะไรแปลกเลยสักนิด!\""
2001502-26 = "มาสคอต... คาเอเดะจัง! ปฏิบัติการใหญ่การโปรโมตครบวงจร!"
2001502-27 = "เป็นยังไง คุณครู? แบบนี้ต้องสำเร็จแน่ๆ เลยใช่มั้ยล่ะ?"
2001502-28 = "[s7] \"ครูเริ่มสับสนแล้วว่ามันคือปฏิบัติการหรือการโปรโมต...\"\n[s8] \"ความมั่นใจเป็นเลิศจริงๆ เลย...!\""
2001502-29 = "ฉันตัดสินใจแล้วว่าฉันกับคุณครูจะกลายเป็นผู้สมรู้ร่วมคิดทางจิตวิญญาณของกันและกัน!"
2001502-30 = "ฉันตัดสินใจแล้วว่าฉันกับคุณครูจะกลายเป็นผู้สมรู้ร่วมคิดทางจิตวิญญาณของกันและกัน!"
2001502-31 = "เพราะงั้นตั้งแต่นี้ไปช่วยให้ความร่วมมือกับปฏิบัติการของชมรมฝึกฝนด้วยนะ~! หืม~? จะร่วมมือกับ#nฉันใช่มั้ย?!"
2001502-32 = "[s] \"อื้อ\""
2001502-33 = "ฮิฮิฮิ! ถ้างั้นก็ออกปฏิบัติการได้~!"
2001502-35 = "(หลังจากนั้นคุณครูกับคาเอเดะก็เริ่มปฏิบัติการการโปรโมต...)"
2001502-36 = "ก่อนอื่นก็ต้องแสดงให้เห็นว่าชมรมฝึกฝนทำกิจกรรมอะไรบ้างในแต่ละวัน และมีประโยชน์มากแค่ไหน! และต้องทำอย่างยิ่งใหญ่ อลังการด้วย!"
2001502-37 = "เพราะงั้นอย่างแรกที่ต้องทำก็คือ... การเก็บขยะ!"
2001502-38 = "[s] \"โอ้ งานที่ช่วยรักษาเมืองสินะ\""
2001502-39 = "ใช่แล้ว! เราจะเดินเก็บขยะแบบนี้ไปรอบๆ..."
2001502-40 = "อ๊ะ! เจอขยะแล้ว!"
2001502-45 = "พอเก็บขยะแบบนี้ก็ถือว่าเสร็จแล้วละ! ง่ายใช่มั้ย?"
2001502-46 = "แต่ว่าจะวางใจไม่ได้นะ คุณครู... ตรงซอกมุมต่างๆ ในคิโวทอสอาจจะมีขยะหล่นอยู่ก็ได้ อย่างเช่นที่มุมถนนตรงนั้น..."
2001502-47 = "อ๊ะ?!"
2001502-48 = "[s] \"เกิดอะไรขึ้นน่ะ?! คาเอเดะ?!!\""
2001502-49 = "ดูนี่สิ คุณครู! ตรงนี้มีของถูกทิ้งอยู่เยอะเลย!"
2001502-50 = "[s] \"นี่มันการ์ดเกมนี่...?\""
2001502-51 = "อื้อ! การ์ดเกมมูชิควีนน่ะ! ถ้าดูแต่ละใบดีๆ... ดูเหมือนจะเป็นการ์ดเก่าที่ห้ามใช้ในเกมตอนนี้แล้วน่ะ!"
2001502-52 = "ถึงจะใช้ประโยชน์ไม่ได้แล้ว แต่เอามาทิ้งแบบนี้เนี่ยนะ? ทำเกินไปแล้ว!"
2001502-53 = "[s] \"นั่นสินะ ถึงใช้ไม่ได้แล้ว แต่มาทิ้งเกลื่อนแบบนี้ก็เกินไป\""
2001502-54 = "ไม่มีความผูกพันกับการ์ดเลยรึไง! วิญญาณแห่งการ์ดต้องโกรธแน่ๆ!"
2001502-55 = "[s] \"นั่นมันที่เธอคิดต่างหากล่ะ!\""
2001502-56 = "อ๊ะ! ทางโน้นก็มีขยะอยู่...!"
2001502-59 = "(จากนั้นคุณครูกับคาเอเดะก็เก็บขยะด้วยกันต่อไปอีกพักใหญ่)"
2001502-64 = "ฮู่ว ใช้ไอ้นี่เก็บขยะได้เยอะเลยแฮะ!"
2001502-68 = "เป็นไง คุณครู ทำแบบนี้แล้วคนอื่นๆ จะมองชมรมฝึกฝนใหม่ใช่มั้ย?!"
2001502-69 = "[s9] \"แค่นี้เหรอ?! การโปรโมตมันไม่ได้ง่ายแบบนี้หรอกนะ!\" \n[s10] \"ผลคงไม่ออกมาทันทีหรอก ครูคิดว่าต้องทำอย่างสม่ำเสมอนะ\""
2001502-70 = "งั้นเหรอ?"
2001502-71 = "งั้นเหรอ?"
2001502-72 = "อื้มมมม~ การโปรโมต... ยากกว่าที่คิดสินะ"
2001502-73 = "อื้ม! แต่ไม่ต้องผิดหวังไปหรอก! ปฏิบัติการใหญ่ยังทำต่อไปอยู่นะ!"
2001502-74 = "ถ้างั้นต่อไปทำอะไรดีน้า..."
2001502-75 = "(คุณครูกับคาเอเดะช่วยกันคิดถึงกิจกรรมต่อไปที่จะทำ)"
2001502-76 = "คราวนี้ฉันจะเล่นชิงช้าบ้าง!"
2001502-77 = "อะไรกันเล่า~! เธอแค่ผลักมันเบาๆ ก็เท่านั้นเอง เมื่อกี้ฉันผลักให้ตั้งนานนะ!"
2001502-78 = "แต่คราวนี้ถึงตาฉันแล้ว!"
2001502-79 = "อ๊ะ!! ตรงนั้น! พวกเธอทะเลาะกันทำไมเนี่ย!!"
2001502-80 = "หืม? พี่สาวจากชมรมฝึกฝนเหรอ? "
2001502-81 = "ใช่แล้วๆ พี่สาวววว! พวกเราตกลงกันว่าจะผลัดกันเล่นชิงช้าแล้ว แต่ว่าน้องของหนู...!"
2001502-82 = "เปล่าสักหน่อย! หนูก็รอคิวอยู่เหมือนกัน!"
2001502-83 = "หยุดดดด! นี่ทะเลาะกันเพราะเรื่องผลัดกันเล่นชิงช้าเหรอ ทำแบบนี้ไม่ได้นะ พี่น้องกันต้องสนิทกันไว้สิ!"
2001502-84 = "เอ้า ขอโทษกันซะสิ!"
2001502-85 = "อะ... อืม..."
2001502-86 = "ขะ...ขอโทษนะ..."
2001502-87 = "[s] \"คาเอเดะ สุดยอดเลย!\""
2001502-88 = "เรื่องแค่นี้ง่ายจะตายไป ปกติพวกเราก็เล่นด้วยกันอยู่บ่อยๆ น่ะ!"
2001502-89 = "[s] \"สนิทกันนี่เอง มิน่าละ!\""
2001502-90 = "อืมมม... แต่จะทำยังไงให้สนิทกันหลังจากทะเลาะกันล่ะ...?"
2001502-91 = "อ๊ะ ฉันมีความคิดดีๆ แล้ว!"
2001502-95 = "ทุกคน ฉันให้นี่นะ!"
2001502-96 = "อะไรเหรอ?"
2001502-97 = "การ์ดเหรอ?"
2001502-98 = "อื้อ! ฉันเพิ่งเก็บมาได้เมื่อกี้ ถึงจะเอาไปเล่นในเกมทั่วไปไม่ได้ แต่ถ้าพวกเธอเล่นการ์ดนี้ด้วยกัน#nก็ไม่ต้องทะเลาะกันเพราะเรื่องชิงช้าแล้ว!"
2001502-99 = "ถ้างั้นเดี๋ยวฉันจะอธิบายกฎให้ฟังนะ..."
2001502-100 = "อะแฮ่ม! อา คอแห้งจัง..."
2001502-101 = "[s] \"ถ้างั้นเดี๋ยวครูไปซื้อเครื่องดื่มมาให้พวกเธอนะ\""
2001502-102 = "อ๊ะ จริงเหรอ?! ขอบคุณนะ คุณครู!"
2001502-104 = "(คุณครูเดินไปที่ตู้ขายน้ำที่อยู่ด้านนอกสนามเด็กเล่น)"
2001502-105 = "เด็กที่อยู่ตรงสนามเด็กเล่น... เด็กชมรมฝึกฝนสินะ"
2001502-106 = "ชมรมฝึกฝน... อ๋อ พวกเด็กแปลกๆ นั่นสินะ"
2001502-107 = "[s] (หืม...? ที่นี่ก็พูดเรื่องนี้กันเหรอ...)"
2001502-108 = "ฮิฮิ... พยายามเล่นกับเด็กขนาดนั้นเลยเหรอ ถึงจะเป็นพวกแปลกๆ แต่ก็คงเป็นเด็กดีละมั้ง"
2001502-109 = "ใช่แล้ว บางครั้งก็จะเห็นพวกเธอพยายามทำงานอย่างหนัก อยู่แถวๆ ถนนในเขตปกครองตนเอง#nเฮียกคิยาโคน่ะ"
2001502-110 = "[s] (แบบนี้เองสินะ...)"
2001502-114 = "อุ๊ย แหมๆ พูดอะไรกันน่ะ?"
2001502-116 = "เอ้า! พวกเธอลองเล่นดูสิ! ตอนที่เล่นการ์ดเกมมูชิควีน ทำท่าแบบนี้ด้วยก็ดีนะ!"
2001502-117 = "ถ้าทำท่าแบบนี้ตอนโจมตีศัตรูก็จะเข้าถึงอารมณ์สุดๆ เลยละ!"
2001502-118 = "โอ้วววว!!"
2001502-119 = "พวกเราจะสู้ไปด้วยกัน! มูชิควีน~~~!"
2001502-120 = "โจมตี!"
2001502-121 = "มูชิควีน~~~!"
2001502-122 = "โจมตี!"
2001502-124 = "คิดแล้วเชียว... แบบนี้มันแปลกๆ นิดหน่อยนะคะ... "
2001502-125 = "นั่นน่ะสิคะ..."
2001502-128 = "อ๊ะ คุณครู! มาแล้วเหรอ? ดูสิๆ! ดีจังที่เก็บมาได้เยอะ ทุกคนชอบการ์ดมูชิควีนมากเลยละ!"
2001502-129 = "พี่สาว! พี่สาวมูชิควีน!"
2001502-130 = "สุดยอดเลย พี่สาว!"
2001502-131 = "ไม่ใช่แค่พี่สาวเฉยๆ นะ เซียนมูชิควีน!"
2001502-132 = "เซียนมูชิควีน! เซียนการ์ด!"
2001502-133 = "อ่ะแฮ่ม! อื้มๆ! แบบนี้การโปรโมตชมรมฝึกฝนก็ก้าวหน้าไปอีกขั้นแล้วสินะ?! ใช่รึเปล่า คุณครู?!"
2001502-134 = "[s] \"อะ...อื้อ ใช่แล้ว\""
2001502-135 = "(หลังจากเห็นท่าทางกระตือรือร้นของพวกเด็กๆ แล้ว คุณครูก็พูดไม่ออกว่าคาเอเดะเข้าใจผิดไปไกล#nแค่ไหนแล้ว...)"
2001502-136 = "อ่า แหะๆๆ!"

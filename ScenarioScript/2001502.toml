2001502-36 = "3;카에데;00;우선 수행부가 날마다 어떤 일을 하는지, 얼마나 도움이 되는지. 그걸 보여주는 게 좋다고 생각해! 평소보다 이렇게, 화려하게! 멋있게!\n#3;a\n#3;em;[반응]"
2001502-37 = "3;카에데;11;그런 의미에서 가장 먼저 해볼 건 쓰레기 청소야!\n#3;hophop"
2001502-38 = "[s] \"오, 마을의 도움이 되는 활동이구나.\""

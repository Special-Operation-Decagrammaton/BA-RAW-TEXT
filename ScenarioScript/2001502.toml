[translation]
2001502-1 = "修行部的吉祥物"
2001502-2 = "最近說我們修行部，被人說「奇怪」的次數好像變多了！"
2001502-3 = "明明就沒那回事，對不對老師！"
2001502-4 = "[s1]「就是啊。」\n[s2]「就是……吧？」"
2001502-5 = "對不對！我就喜歡老師會馬上肯定我！"
2001502-6 = "[s3]「那真令人開心。」"
2001502-7 = "耶嘿嘿！先不說那個了……"
2001502-8 = "欸──老師你怎麼這樣～"
2001502-9 = "[s4]「不，不過，被人打上負評確實挺不開心了。」"
2001502-10 = "嗯！對呀對呀！"
2001502-11 = "總之，關於這件事情呢……"
2001502-12 = "就算跑去跟那些人說「你們誤會了！」對方也不可能馬上了解嘛！"
2001502-13 = "因為任何人都只會相信自己想相信的東西……"
2001502-14 = "要了解彼此的真心……最快的方法就是來一場熱血對決！"
2001502-15 = "……上週播出的甲蟲皇后就是這麼說的！"
2001502-16 = "[s5]「動畫思維啊──」\n[s6]「這，這可難說唷……」"
2001502-17 = "咦，意料之外的反應。不是那樣嗎？"
2001502-18 = "咦，意料之外的反應。不是那樣嗎？"
2001502-19 = "不過別擔心，除此之外我還想了很多種方法！"
2001502-20 = "昨天我們修行部一起吃晚飯時，我突然來了個靈感！"
2001502-21 = "你覺得是什麼呀？會怎麼進行呀？在不在意？"
2001502-22 = "[s]「好在意唷！」"
2001502-23 = "哼哼，我就知道！那個點子就是～！"
2001502-24 = "老師也知道我可愛又聰明，而且也是超級惹人喜歡的修行部吉祥物，對吧？"
2001502-25 = "既然這樣，那只要我這個吉祥物，幫忙做「宣傳」不就好了嘛！"
2001502-26 = "也就是所謂的：「修行部吉祥物，小楓的宣傳作戰大作戰！」"
2001502-27 = "怎麼樣？不覺得很棒嗎？感覺一定成功對吧？！"
2001502-28 = "[s7]（怎麼作戰好像講了兩次……）\n[s8]「真有自信……！」"
2001502-29 = "總之從現在開始，老師和我就是靈魂夥伴啦！"
2001502-30 = "總之從現在開始，老師和我就是靈魂夥伴啦！"
2001502-31 = "那就馬上，作戰開始！老師會陪我對吧？"
2001502-32 = "[s]「嗯，那當然。」"
2001502-33 = "好耶！出發～！"
2001502-35 = "（於是我和楓一起，開始了某種似乎是要改善修行部印象的戰略）"
2001502-36 = "首先，我覺得要讓大家看到修行部每天在做什麼，那些事如何對生活有幫助！而且要做的比平時華麗！帥氣！"
2001502-37 = "首先是清掃垃圾！"
2001502-38 = "[s]「了不起。」"
2001502-39 = "來，夾子。"
2001502-40 = "要用夾子……"
2001502-45 = "像這樣把垃圾撿起來，很簡單吧？"
2001502-46 = "但也不要大意了，這些小巷裡不管有哪種垃圾都不奇怪。比方說這種小巷裡就經常會……"
2001502-47 = "啊啊？！"
2001502-48 = "[s]「楓！？」"
2001502-49 = "老，老師快看！"
2001502-50 = "[s]「這是……集換式遊戲卡……？」"
2001502-51 = "嗯！這些是「甲蟲皇后」的卡片！啊，仔細一看，這些都是禁用卡……"
2001502-52 = "居然因為不能使用就隨便亂丟，太過分了！"
2001502-53 = "[s]「就是說啊，丟在這種小巷裡……」"
2001502-54 = "和卡片累積的感情怎麼辦！卡片的精靈會傷心的！"
2001502-55 = "[s]「你，你說的也很重要呢……」"
2001502-56 = "啊，而且那邊又有垃圾……！"
2001502-59 = "（就這樣和楓一起撿垃圾撿了好一陣子）"
2001502-64 = "嗯，撿了好多呢！"
2001502-68 = "這樣其他人也會對修行部刮目相看了吧！"
2001502-69 = "[s9]「我們今天是很努力，但應該沒辦法這麼快就讓別人知道吧……？」\n[s10]「我覺得這種事情，重點在於腳踏實地慢慢做出成果。」"
2001502-70 = "是這樣喔？！"
2001502-71 = "是這樣喔？！"
2001502-72 = "嗯嗯嗯～～宣傳還真難耶……"
2001502-73 = "不過別擔心！作戰內容才不只這個！"
2001502-74 = "接下來要，嗯……"
2001502-75 = "（就在和楓一起思考下一個活動的時候……）"
2001502-76 = "換我！這次換我玩了～～！"
2001502-77 = "不是剛剛才換我玩嗎！你再幫我推一下又不會怎樣！！"
2001502-78 = "可是這次輪到我了！我要再玩一次！！"
2001502-79 = "你們等一下！！怎麼可以吵架呢！！"
2001502-80 = "啊，修行部的姊姊。"
2001502-81 = "姊姊，你聽我說。我們說好要輪流盪鞦韆，結果……！"
2001502-82 = "哪有，我有好好遵守順序！"
2001502-83 = "好了好了，姊妹之間要玩的開心就不可以吵架。要感情好，互相禮讓，才有辦法玩比較久嘛！"
2001502-84 = "來，跟對方說對不起，再繼續玩吧。"
2001502-85 = "呃，嗯……"
2001502-86 = "對不起……"
2001502-87 = "[s]「楓，你真有一套！」"
2001502-88 = "哼哼，這種事不算什麼！因為我平時就經常陪他們玩！"
2001502-89 = "[s]「原來你們是朋友啊……！？」"
2001502-90 = "嗯～但是吵架後，應該也沒辦法馬上和好一起玩……"
2001502-91 = "啊，我想到一個好主意！"
2001502-95 = "這個給你們！"
2001502-96 = "這是什麼？"
2001502-97 = "卡片？"
2001502-98 = "嗯，這是我剛才撿到的，但是沒辦法在正式遊戲中使用。你們要不要用這個一起玩呀？"
2001502-99 = "那我來為你們說明規則──"
2001502-100 = "首先是……嗯嗯，口好渴……"
2001502-101 = "[s]「等等喔，那我去幫大家買飲料。」"
2001502-102 = "真的嗎！？謝謝老師！"
2001502-104 = "（正當我前往公園外面的自動販售機時……）"
2001502-105 = "那是修行部的那個……？"
2001502-106 = "對對，那個奇怪的學生……"
2001502-107 = "[s] （…………）"
2001502-108 = "呵呵。竟然那麼認真地和小朋友玩在一起，那孩子果然很奇怪……不過也真是個好孩子。"
2001502-109 = "何況她平常就在百鬼夜行自治區到處努力嘛。"
2001502-110 = "[s] （……原來大家是這麼想的啊）"
2001502-114 = "哎呀，怎麼又吵吵鬧鬧的……"
2001502-116 = "你們看清楚！玩「甲蟲皇后」的時候，要擺出這種姿勢！"
2001502-117 = "對敵人發動攻擊時擺這個姿勢……雖然攻擊力不會變強，但總之能讓人感覺很厲害！"
2001502-118 = "喔喔喔！！"
2001502-119 = "甲蟲皇后～～～……"
2001502-120 = "攻擊！！！"
2001502-121 = "甲蟲皇后～～～……"
2001502-122 = "攻擊！！！"
2001502-124 = "果然是個怪孩子……"
2001502-125 = "就是啊……"
2001502-128 = "啊，老師！不知不覺就聚集了這麼多人，大家都來一起玩呢！"
2001502-129 = "姊姊！甲蟲皇后姊姊！"
2001502-130 = "姊姊好厲害唷！"
2001502-131 = "她不是普通的姊姊！我們以後要叫她甲蟲皇后師父才對！"
2001502-132 = "甲蟲皇后師父！！！"
2001502-133 = "嘿嘿！！老師你看，這下修行部的宣傳活動是不是也很完美呢！？"
2001502-134 = "[s]「好，好像是喔……？」"
2001502-135 = "（看到她受到這麼多小朋友熱烈崇拜，我實在不忍告訴她居民心中的誤會可能變更深了）"
2001502-136 = "欸嘿嘿嘿！"

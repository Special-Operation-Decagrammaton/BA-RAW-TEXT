[translation]
1300115-1 = "เสียงลมพัด"
1300115-4 = "(หลังได้รับข้อความ MOMOTALK จากชิเซะ คุณครูก็มาที่ห้องพักผ่อนของชมรมหยินหยาง)"
1300115-8 = "[ns] \"ชิเซะ?\""
1300115-13 = "อ๊ะ คุณครู"
1300115-14 = "ตรงนี้~"
1300115-15 = "[s] \"มาทำอะไรอยู่ที่ระเบียงเหรอ?\""
1300115-16 = "วันนี้เป็นวันที่คุณพระอาทิตย์ร้อนฉ่า..."
1300115-17 = "ก็เลยมานั่งอยู่เฉยๆ น่ะ"
1300115-18 = "ถ้าไม่งั้นอาจจะละลายก็ได้~"
1300115-19 = "[s] \"นั่นสินะ แค่ขยับตัวนิดหน่อยก็เหงื่อท่วมแล้ว\""
1300115-20 = "เอ้า คุณครูเองก็มานั่งรอด้วยกันสิ"
1300115-21 = "เดี๋ยวฉันจะให้ฟัง"
1300115-22 = "[s] \"เสียงลมพัดที่พูดถึงก่อนหน้านี้น่ะเหรอ?\""
1300115-23 = "อื้อ เสียงเพราะๆ"
1300115-24 = "แถมยังเย็นสบายด้วย"
1300115-25 = "ถ้าตั้งใจฟัง เดี๋ยวก็ได้ยินเองแหละ~"
1300115-26 = "[s] \"...?\""
1300115-27 = "เอ้า คุณครู มานั่งรอสิ"
1300115-28 = "เอียงหู แล้วก็รอเงียบๆ..."
1300115-34 = "ได้ยินรึเปล่า?"
1300115-35 = "[s] \"เสียงกระดิ่ง...?\""
1300115-36 = "ไม่เหมือนกันนะ"
1300115-37 = "ที่จริงแล้ว~"
1300115-42 = "[ns] \"เสียงกระดิ่งลมนี่เอง?\""
1300115-43 = "อื้อ ใช่แล้ว~"
1300115-44 = "แขวนเอาไว้... ก็จะได้ยินเสียงลมพัด"
1300115-45 = "[s] \"นั่นสินะ ถ้าได้ยินเสียงกระดิ่งลมก็แปลว่าลมพัด\""
1300115-46 = "อื้อ เสียงก้องกังวาน"
1300115-47 = "กระดิ่งลมนี่น่ะ ฉันจะแขวนไว้ตอนฤดูร้อนตลอด"
1300115-48 = "โดยเฉพาะกระดิ่งลมที่หวงเป็นพิเศษนี่"
1300115-49 = "[s] \"มันก็ดูธรรมดาๆ นะ...?\""
1300115-50 = "มันอาจดูเป็นอย่างนั้น..."
1300115-51 = "แต่เสียงของมันใส และกังวานมากกว่ากระดิ่งลมอันอื่นๆ"
1300115-52 = "[s] \"เสียงใส...?\""
1300115-53 = "อื้อ เพราะงั้นเลยเอามาแขวนไว้ที่เดิมทุกปี"
1300115-54 = "แล้วก็ขอรบกวนเรื่องเสียงใสๆ ที่กังวานแบบนั้นตลอด"
1300115-59 = "เพราะงั้น... คุณครูมานั่งฟังด้วยกันนะ"
1300115-60 = "ตรงนี้... ลองนอนบนพื้นระเบียงดูสิ"
1300115-64 = "แบบนี้น่ะ"
1300115-71 = "(คุณครูลองเอนตัวลงนอนตามที่ชิเซะบอก)"
1300115-74 = "เอาละ คุณครู..."
1300115-75 = "ลองเงี่ยหูฟังเงียบๆ ดูสิ"
1300115-76 = "[s] \"...\""
1300115-81 = "[ns1] \"อื้อ เสียงใสกังวานจริงๆ ด้วย\"\n[ns2] \"อื้อ เสียงใสและฟังดูปลอดโปร่งจริงๆ\""
1300115-84 = "ใช่มั้ยล่ะ?"
1300115-85 = "อ๊ะ คุณครู ฉันนึกกลอนขึ้นมาได้แล้วละ"
1300115-89 = "วัน#nที่#nอา#nกาศ#nร้อน"
1300115-91 = "ถ้า#nนอน#nลง#nบน#nพื้น#nระ#nเบียง"
1300115-93 = "สาย#nลม#nจะ#nพัด#nผ่าน"
1300115-98 = "(หลังจากนั้น คุณครูกับชิเซะก็นอนฟังเสียงกระดิ่งลมอยู่ที่ริมระเบียงอีกพักใหญ่...)"

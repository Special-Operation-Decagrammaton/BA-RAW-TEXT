[translation]
1300115-1 = "The Sound of the Incoming Wind"
1300115-4 = "After receiving a MomoTalk from Chise, I arrived at the Yin-Yang Club Lounge."
1300115-8 = "[ns] \"Chise?\""
1300115-13 = "Oh, Sensei."
1300115-14 = "Over here."
1300115-15 = "[s] \"What are you doing on the floor?\""
1300115-16 = "The sun is sizzling, so..."
1300115-17 = "I was just sitting here."
1300115-18 = "If I don't, I might melt."
1300115-19 = "[s] \"It's true. Even tiny movements can make you sweat sometimes.\""
1300115-20 = "Wait here with me, Sensei."
1300115-21 = "You'll hear it soon."
1300115-22 = "[s] \"The 'sound of the incoming wind' you were telling me about?\""
1300115-23 = "Yes. It's a pretty sound."
1300115-24 = "Refreshing, too."
1300115-25 = "Listen closely. Can you hear it?"
1300115-26 = "[s] \"...\""
1300115-27 = "Sensei, just sit still..."
1300115-28 = "Listen closely, wait quietly..."
1300115-34 = "Did you hear it?"
1300115-35 = "[s] \"...Bells?\""
1300115-36 = "Not quite."
1300115-37 = "It's actually..."
1300115-42 = "[ns] \"Wind chimes?\""
1300115-43 = "Yes, that's it."
1300115-44 = "I hung them up, so I could hear the wind coming in."
1300115-45 = "[s] \"Well, you'll always know the wind is blowing when you hear those.\""
1300115-46 = "Yes, the sound is clear."
1300115-47 = "I've been putting these chimes up every summer."
1300115-48 = "They're my favorites."
1300115-49 = "[s] \"They look like regular chimes to me.\""
1300115-50 = "They may look that way, but..."
1300115-51 = "...the sound they make is special. It's bluer."
1300115-52 = "[s] \"Bluer...sound?\""
1300115-53 = "Yes, that's why I hang them right there, each year."
1300115-54 = "I ask to hear their clear, blue sound."
1300115-59 = "Listen with me, Sensei."
1300115-60 = "Just lie down on the floor, here."
1300115-64 = "Like this."
1300115-71 = "I laid down next to Chise."
1300115-74 = "Good, Sensei."
1300115-75 = "Now listen carefully."
1300115-76 = "[s] \"...\""
1300115-81 = "[ns1] \"I hear what you mean. It's blue and clear.\"\n[ns2] “I hear what you mean. It's blue and refreshing.\""
1300115-84 = "That's right!"
1300115-85 = "Oh, hmm. I just thought of a poem."
1300115-89 = "A hot summer day"
1300115-91 = "I lie down upon the floor"
1300115-93 = "Wind against my skin"
1300115-98 = "Afterwards, I laid there next to Chise for some time, listening to the calm, blue wind."

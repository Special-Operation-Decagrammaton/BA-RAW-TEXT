[translation]
1300115-1 = "風吹來的聲音"
1300115-4 = "（收到知世的MomoTalk後，來到了陰陽部的休息室）"
1300115-8 = "[ns]「知世？」"
1300115-13 = "啊，老師。"
1300115-14 = "我在這裡～"
1300115-15 = "[s]「你在廊簷下做什麼？」"
1300115-16 = "因為今天太陽很大……"
1300115-17 = "所以我靜靜坐著。"
1300115-18 = "不然可能會融化～"
1300115-19 = "[s]「也對，這種天氣只要稍微動一下就會流汗。」"
1300115-20 = "來，老師也一起等吧。"
1300115-21 = "一定會聽見的。"
1300115-22 = "[s]「你是指之前說的『風吹來的聲音』嗎？」"
1300115-23 = "嗯，很悅耳唷。"
1300115-24 = "而且很涼爽。"
1300115-25 = "只要認真聽，很快就會聽見～"
1300115-26 = "[s]「……」"
1300115-27 = "來，老師，靜靜坐下來。"
1300115-28 = "像這樣側耳傾聽，靜下心來等著……"
1300115-34 = "聽到了嗎？"
1300115-35 = "[s]「這是鐘聲……？」"
1300115-36 = "有點不一樣。"
1300115-37 = "其實是～"
1300115-42 = "[ns]「原來是風鈴啊？」"
1300115-43 = "嗯，沒錯～"
1300115-44 = "我把風吹來的聲音掛起來了。"
1300115-45 = "[s]「有道理，風鈴響起的確就是風吹來的信號呢。」"
1300115-46 = "嗯，是很清脆的聲音。"
1300115-47 = "每年夏天，我都會把它掛起來。"
1300115-48 = "因為這是我特別珍惜的風鈴。"
1300115-49 = "[s]「看起來好像還挺常見的……？」"
1300115-50 = "雖然看起來不起眼……"
1300115-51 = "但它的聲音比其他風鈴更有蔚藍的感覺。"
1300115-52 = "[s]「蔚藍的……感覺？」"
1300115-53 = "嗯，所以我每年都會掛在一樣的地方。"
1300115-54 = "拜託它讓我聽見清脆蔚藍的聲音。"
1300115-59 = "老師也來一起聽吧。"
1300115-60 = "來這邊，躺在廊簷下。"
1300115-64 = "像這樣。"
1300115-71 = "（暫且和知世肩並肩躺在廊簷下）"
1300115-74 = "那，老師。"
1300115-75 = "要靜靜地傾聽。"
1300115-76 = "[s]「……」"
1300115-81 = "[ns1]「嗯，能聽見蔚藍清脆的聲音。」\n[ns2]「嗯，真是蔚藍清新的聲音。」"
1300115-84 = "對吧？"
1300115-85 = "啊，老師，我有作詩的靈感。"
1300115-89 = "炎#n熱#n的#n夏#n日"
1300115-91 = "橫#n躺#n在#n廊#n簷#n下#n時"
1300115-93 = "掠#n過#n的#n微#n風"
1300115-98 = "（之後的一段時間都和知世並排躺著，傾聽風鈴的聲音……）"

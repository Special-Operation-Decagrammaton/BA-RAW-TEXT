[translation]
1013103-1 = "冰上曲棍球"
1013103-2 = "貴安，老師！近來一切安好嗎？"
1013103-3 = "[s]「打擾了～」"
1013103-4 = "那麼我們趕緊去放映室吧。"
1013103-5 = "嗯？問我不是要在這裡看嗎……？#n怎麼會呢，這裡基本上只是工作空間而已。"
1013103-6 = "況且這邊也沒有影音播放的設備。"
1013103-7 = "來！這邊請！"
1013103-12 = "[ns]「咦……？設備看起來很厲害呢？」"
1013103-13 = "咦？既然老師要來，這點準備不是理所當然的嗎？"
1013103-14 = "[s1]「謝謝你的心意……」\n[s2]「出版部連這種空間都有嗎？」"
1013103-17 = "啊，那個……"
1013103-18 = "雖然我們出版部……在名義上確實是出版部沒錯……"
1013103-19 = "不過，或許是因為部長太愛錢的關係……"
1013103-20 = "我們在赤冬的各種文化事業中，算是相當積極地……取得了壓倒性的優勢？"
1013103-21 = "所以……是的……"
1013103-22 = "[s]「……事務局沒說什麼嗎？」"
1013103-23 = "就，就像赤冬有赤冬的規矩一樣！出版部也有出版部自己的方式！"
1013103-24 = "而且我們絕對沒有私自謀取不當的利益！"
1013103-25 = "話說我們趕緊來看曲棍球吧，曲棍球！"
1013103-26 = "就像先前跟您提過的一樣，準決賽馬上就要開始囉！"
1013103-27 = "赤冬因為學園的特性，相當盛行冬季運動。"
1013103-28 = "而冰上曲棍球，也是擁有相當多忠實粉絲的項目哦！"
1013103-32 = "讓各位久等了！冰上曲棍球聯賽的準決賽即將開始！"
1013103-33 = "開始了呢，老師！"
1013103-34 = "老師應該也知道，冰上曲棍球是由六人組成一隊的運動。#n其實人數意外地偏少呢。"
1013103-35 = "比賽一共有三個回合，每個回合二十分鐘，總共是六十分鐘。#n其中每二十分鐘被稱為一[ruby=Period]「節」[/ruby]。"
1013103-36 = "至於規則……其實很簡單。#n只要[ruby=Hockey Stick]用球桿把[/ruby][ruby=Puck]冰球[/ruby]打進球門就行了。"
1013103-37 = "啊，順帶一提，冰上曲棍球的守門員不叫Goalkeeper，而是叫Goaltender哦？"
1013103-38 = "強烈的[ruby=Body Check]身體衝撞[/ruby]！令人印象深刻！防守得很積極呢！"
1013103-39 = "[s]「球員剛才用身體……把對手撞倒了！？」"
1013103-40 = "沒關係！那種程度還在赤冬冰上曲棍球比賽的容許範圍之內。"
1013103-41 = "重點是被撞飛的那個人！還不快點起來！#n要是遲遲不站起來而耽誤到比賽的話，可是會被判犯規的唷！"
1013103-42 = "[s3]「激烈的身體衝撞不算犯規……」\n[s4]「躺著不動反而算是犯規啊……」"
1013103-45 = "沒錯！這就是赤冬的冰上曲棍球！"
1013103-46 = "[s]「啊，剛才有球員用球桿打人。」"
1013103-47 = "不可以！那種行為應該被罰下場五分鐘才對！"
1013103-48 = "什麼！？裁判的腦袋還正常嗎？那樣居然才罰兩分鐘！？#n我得去查查他戶頭的金流才行！！！"
1013103-49 = "[s5]「是為了報復剛才的身體衝撞嗎？」\n[s6]「居然用連續三次的組合衝撞，把選手完全撞飛了……？」\n[s7]「觀眾席的玻璃都裂開了耶……這也是赤冬的冰上曲棍球嗎！？」"
1013103-53 = "啊……那樣確實有點過頭了呢。#n如果玻璃破損的話，在更換完畢之前都必須暫停比賽。"
1013103-54 = "而且像剛才那種連續且故意的激烈身體衝撞……#n毫無疑問是非紳士行為，最少也會被判罰下場十分鐘──"
1013103-55 = "是繼續比賽的信號！繼續比賽的信號！#n今天的裁判真是出奇的寬容呢！"
1013103-56 = "裁判真的腦袋壞掉了吧！？#n不想看到明天早上的太陽了嗎！？！？"
1013103-57 = "[s]「啊，打起來了。」"
1013103-58 = "那是當然的！這種情況本來就該大鬧一場才對！"
1013103-59 = "冰上曲棍球本來就是不打起來才奇怪的運動！"
1013103-60 = "如果主場隊伍輸得很慘的話，甚至還會為了服務粉絲而故意引發亂鬥哦。"
1013103-61 = "既然無法改變比賽內容難看的事實，這樣至少可以讓球迷覺得沒有白白花錢進場。"
1013103-62 = "而且冰上曲棍球的護具，本來就接近於重裝甲。"
1013103-63 = "彼此放下球桿用拳頭互打也是不成文的規則，所以其實不會出什麼大問題──"
1013103-69 = "[ns8]「現在觀眾開始闖入賽場了！」\n[ns9]「賽場外面有球迷正在燒隊旗耶！」"
1013103-72 = "……哎呀。"
1013103-73 = "這下亂成一團了呢……"
1013103-74 = "您問這種情況常不常見？"
1013103-75 = "……"
1013103-76 = "雖然不算經常……"
1013103-77 = "卻也稱不上是……什麼罕見的景象吧……？"
1013103-81 = "──所以，我們強力譴責事務局！"
1013103-82 = "強力譴責！強力譴責！"
1013103-83 = "今天天氣照樣冷的要命！無法落實每週工作三天制！#n布丁配給每次都只有一個，而且還是摻水的布丁！"
1013103-84 = "冰上曲棍球的比賽輸得這麼慘！全都是事務局的錯！"
1013103-85 = "沒錯！沒錯！"
1013103-86 = "同志們！向事務局前進吧！"
1013103-87 = "前進！前進！"
1013103-90 = "[ns10]「這……難道是……」\n[ns11]「赤冬的……晨間問候！？」"
1013103-93 = "那，那種說法，老師是從哪裡聽來的！？"
1013103-94 = "身為赤冬的學生，聽起來還是有點刺耳呢……"
1013103-95 = "啊，啊～麥克風測試。麥克風測試。"
1013103-96 = "赤冬的各位同學，大家好。在此向各位報告──#n就在不久前，冰上曲棍球主競技場爆發了政變。"
1013103-97 = "本事務局承諾將全力應對此一事態，並從即刻起發佈局部戒嚴令以維持秩序。"
1013103-98 = "請各位同學各自專注於學業與生計，切勿隨之起舞。"
1013103-99 = "我們再次重申──赤冬很安全。赤冬很安全。赤冬很安全。"
1013103-100 = "喂，你覺得這次我們要躲多久啊？"
1013103-101 = "我看要兩天。"
1013103-102 = "我猜三天。"
1013103-103 = "要賭一把嗎？"
1013103-104 = "來啊。"
1013103-105 = "你們幾個，麥克風還沒關啦！！！"
1013103-106 = "（嗶～）"
1013103-111 = "……"
1013103-112 = "[s]「……」"
1013103-113 = "那個……老師？"
1013103-114 = "看來今天……似乎各方面都有點危險……"
1013103-115 = "在局勢稍微平息下來之前，要不要和我一起欣賞冰上曲棍球的經典賽事合輯呢……？"
1013103-117 = "（就這樣和貴音一起收看了冰上曲棍球的經典賽事合輯……）"

[translation]
1013103-1 = "#title;아이스하키"
1013103-2 = "3;타카네;03;어서 오세요, 선생님! 평안하셨는지요?\n#3;a\n#3;em;[음표]"
1013103-3 = "[s] \"실례합니다아~\""
1013103-4 = "3;타카네;08;그러면 어서 상영실로 가도록 하죠.\n#3;jump"
1013103-5 = "3;타카네;07;네? 여기서 보는 게 아니냐고요? 그럴 리가요. 여기는 일단 작업 공간이고.\n#3;em;[반응]"
1013103-6 = "3;타카네;00;무엇보다 여기에는, 영상 송출 관련 기기가 없기도 하고요."
1013103-7 = "3;타카네;03;자! 이쪽이랍니다?\n#3;em;[반짝]"
1013103-8 = "#all;hide"
1013103-9 = "#wait;10"

1013103-11 = "#all;hide"
1013103-12 = "[ns] \"어……? 뭔가, 시설이 엄청난데?\""
1013103-13 = "3;타카네;02;네? 그야 선생님께서 오시는데, 이 정도 준비는 당연한 것 아닌가요?\n#3;a\n#3;em;[?]"
1013103-14 = "[s1] \"그건 고마운데…….\"\n[s2] \"출판부에는 이런 공간까지 있는 거야?\""
1013103-15 = "#wait;10"
1013103-16 = "#wait;10"
1013103-17 = "3;타카네;17;아, 그거요…….\n#3;em;…"
1013103-18 = "3;타카네;17;그…… 출판부는, 명색이 출판부이기는 하지만.\n#3;stiff"
1013103-19 = "3;타카네;04;이것도 부장님이 돈을 너무 좋아해서 그런 거긴 한데요……."
1013103-20 = "3;타카네;06;붉은겨울의 이런저런 문화 사업들에서, 조금 적극적으로…… 독보적 우위를 가져가고 있거든요?\n#3;em;[땀]"
1013103-21 = "3;타카네;11;그러다 보니…… 네……."
1013103-22 = "[s] \"……사무국에서 뭐라고 안 해?\""
1013103-23 = "3;타카네;15;부, 붉은겨울에는 말이죠! 그리고 출판부에도 그렇고요! 나름의 방식이 있으니까요!\n#3;hophop"
1013103-24 = "3;타카네;14;그리고 저희는 절대, 개인적으로 이득을 부당하게 가져가거나 하고 있지도 않고요!"
1013103-25 = "3;타카네;04;그보다 우리 하키 봐요, 하키!\n#3;jump\n#3;em;[!]"
1013103-26 = "3;타카네;03;말씀드린 것이지만, 곧 준결승전이 시작되거든요!"
1013103-27 = "3;타카네;07;붉은겨울에서는 학원 특성상 동계 스포츠가 많이 활성화되어 있고."
1013103-28 = "3;타카네;10;아이스하키도 상당한 고유 팬층을 갖고 있는 종목이거든요!\n#3;em;[반짝]"
1013103-29 = "#st;[0,0];instant;1;"
1013103-30 = "#clearST"
1013103-31 = "3;타카네;00\n#3;greeting\n#wait;1500"
1013103-32 = "3;타카네;00\n#na;아나운서;많이 기다리셨습니다, 여러분! 이제부터 아이스하키 리그의 준결승전을 시작하도록 하겠습니다!"
1013103-33 = "3;타카네;08;시작되었네요, 선생님!\n#3;em;[반응]"
1013103-34 = "3;타카네;07;이미 알고 계실지도 모르겠지만, 아이스하키의 구성원은 한 팀당 6명이죠. 의외로 적은 편이에요."
1013103-35 = "3;타카네;02;경기는 20분씩 3번 치러져서, 총시간은 60분이죠. 각 20분을 1피리어드라고 하고요.\n#3;em;…"
1013103-36 = "3;타카네;00;규칙은…… 어떻게 보면 간단해요. 하키 스틱으로 퍽을 쳐서 골대에 넣으면 되거든요."
1013103-37 = "3;타카네;03;아, 아이스하키에서는 골키퍼가 아니라 골텐더라고 한답니다?\n#3;em;[음표]"
1013103-38 = "3;타카네;03\n#na;아나운서;강렬한 바디 체킹! 인상적입니다! 적극적인 디펜스!"
1013103-39 = "[s] \"지금 몸통 박치기로 상대를…… 쓰러트렸는데?!\""
1013103-40 = "3;타카네;07;괜찮아요! 그 정도는 붉은겨울의 아이스하키에서 허용되는 범위거든요.\n#3;em;[재잘]"
1013103-41 = "3;타카네;09;그보다 거기 날아간 당신! 빨리 일어나도록 하세요! 안 일어나고 경기 지연시키면 페널티라고요!\n#3;jump"
1013103-42 = "[s3] \"과격한 몸통 박치기는 노 파울이고…….\"\n[s4] \"누워 있는 건 파울이라니…….\""
1013103-43 = "#wait;10"
1013103-44 = "#wait;10"
1013103-45 = "3;타카네;03;네! 바로 그게 붉은겨울의 아이스하키랍니다!\n#3;em;[반짝]"
1013103-46 = "[s] \"아, 지금 하키 채로 사람을 때렸어.\""
1013103-47 = "3;타카네;09;안 돼요! 저건 5분 퇴장감이라고요!\n#3;em;[!]"
1013103-48 = "3;타카네;15;뭐라고요??!! 심판, 제정신인가요? 저걸 2분 준다고요?! 계좌 조사해 봐야겠어요!!!\n#3;hophop"
1013103-49 = "[s5] \"아까 몸통 박치기의 보복인가?\"\n[s6] \"지금 3연속 콤비네이션 박치기로, 선수를 완전히 날려버렸는데……?\"\n[s7] \"관중석 유리에 금이 갔는데…… 이것도 붉은겨울의 아이스하키!?\""
1013103-50 = "#wait;10"
1013103-51 = "#wait;10"
1013103-52 = "#wait;10"
1013103-53 = "3;타카네;17;아……. 좀 크게 저질렀네요. 우선 유리에 손상이 가면, 그걸 교체할 때까지 경기를 중단해야 하고.\n#3;em;[땀]"
1013103-54 = "3;타카네;05;저렇게 연속적으로, 그것도 고의로 과격한 바디 체킹을 했다면, 분명 비신사적인 행위로 최소한 10분 퇴장 페널티를–"
1013103-55 = "3;타카네;05\n#na;아나운서;경기 재개 사인입니다! 경기 재개 사인! 오늘의 심판은 인상적일 정도로 관대하군요!"
1013103-56 = "3;타카네;18;심판 진짜 제정신인가요?! 내일 아침 해를 보기 싫어요!!??\n#3;closeup"
1013103-57 = "[s] \"아. 싸움 났다.\""
1013103-58 = "3;타카네;15;당연하죠! 이런 건 한번 크게 엎어야 해요!\n#3;em;[스팀]\n#3;hophop"
1013103-59 = "3;타카네;05;애초에 아이스하키에서 파이트는, 일어나지 않는 게 신기할 지경인 이벤트라고요!"
1013103-60 = "3;타카네;16;의외로 홈팀이 크게 지고 있으면, 팬 서비스 차원에서 일부러 싸움을 걸어서 파이트를 유도하기도 할 정도니까요.\n#3;em;[한숨]"
1013103-61 = "3;타카네;02;답이 없는 경기가 열리기라도 하면, 티켓 값 아까워할 팬들에게 볼거리라도 제공하기 위해서 말이죠."
1013103-62 = "3;타카네;00;아이스하키 보호 장비 자체가 중무장에 가까운 데에다."
1013103-63 = "3;타카네;07;하키 스틱을 놓고 맨주먹으로 싸우는 것이 암묵적인 룰이다 보니, 생각 외로 큰 일은–\n#3;em;[재잘]"

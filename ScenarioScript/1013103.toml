[translation]
1013103-1 = "ไอซ์ฮอกกี้"
1013103-2 = "เชิญค่ะ คุณครู! สุขสบายดีหรือเปล่าคะ?"
1013103-3 = "[s] \"ขอรบกวนด้วยนะ~\""
1013103-4 = "งั้นเราไปที่ห้องฉายกันเถอะค่ะ"
1013103-5 = "คะ? คิดว่าเราจะได้ดูที่นี่งั้นเหรอ? ให้เป็นแบบนั้นไม่ได้หรอกค่ะ ตรงนี้คือพื้นที่ทำงานนี่คะ"
1013103-6 = "ที่สำคัญเลยก็คือ ตรงนี้ไม่มีอุปกรณ์ส่งสัญญาณภาพค่ะ"
1013103-7 = "เอาละ! เชิญทางนี้เลยค่ะ"
1013103-12 = "[ns] \"หืม...? ที่นี่มีทุกอย่างครบครันเลยนะ?\""
1013103-13 = "คะ? ก็คุณครูแวะมาทั้งที ฉันก็ต้องเตรียมต้อนรับระดับนี้อยู่แล้วสิคะ"
1013103-14 = "[s1] \"ชมรมสื่อสิ่งพิมพ์มีห้องแบบนี้ด้วยเหรอ?\"\n[s2] \"ชมรมสื่อสิ่งพิมพ์มีพื้นที่แบบนี้ด้วยเหรอ?\""
1013103-17 = "อ่า เรื่องนั้นน่ะ..."
1013103-18 = "ชมรมของเรา... ถึงจะได้ชื่อว่าเป็นชมรมสื่อสิ่งพิมพ์"
1013103-19 = "แต่หัวหน้าของเราก็รักเงินเอาเสียมากๆ น่ะค่ะ..."
1013103-20 = "พวกเราก็เลยกระตือรือร้น... ในธุรกิจทางวัฒนธรรมต่างๆ ของเรดวินเทอร์ค่ะ"
1013103-21 = "แล้วพอเป็นอย่างนั้นมากเข้าๆ ก็... ค่ะ..."
1013103-22 = "[s] \"ทางสำนักเลขาธิการไม่ว่าอะไรเหรอ...?\""
1013103-23 = "นะ... ในเรดวินเทอร์! แล้วก็ชมรมสื่อสิ่งพิมพ์! มีวิถีประจำตัวอยู่น่ะค่ะ!"
1013103-24 = "แล้วพวกฉันก็ไม่ได้หากำไรเข้ากระเป๋าตัวเองหรือทำธุรกิจที่ไม่ชอบธรรมหรอกนะคะ!"
1013103-25 = "เรื่องนั้นเอาไว้ก่อน ตอนนี้เรามาดูฮอกกี้กันเถอะค่ะ ฮอกกี้!"
1013103-26 = "อย่างที่ฉันบอกไปว่าวันนี้จะมีการแข่งรอบรองชนะเลิศค่ะ!"
1013103-27 = "ในเรดวินเทอร์ กีฬาฤดูหนาวเป็นกีฬาที่คึกคักมากตามลักษณะเฉพาะของโรงเรียนค่ะ"
1013103-28 = "แล้วไอซ์ฮอกกี้ก็เป็นกีฬาที่มีฐานแฟนคลับอยู่ไม่น้อยเลยค่ะ!"
1013103-32 = "รอกันนานหรือเปล่าคะผู้ชมทุกท่าน! เราจะเริ่มการแข่งขันไอซ์ฮอกกี้ลีก รอบรองชนะเลิศกันเดี๋ยวนี้เลยค่ะ!"
1013103-33 = "เริ่มแล้วค่ะ คุณครู!"
1013103-34 = "คุณครูอาจทราบดีอยู่แล้วว่าไอซ์ฮอกกี้มีนักกีฬาทีมละ 6 คน ค่อนข้างน้อยใช่มั้ยล่ะคะ?"
1013103-35 = "ส่วนการแข่งมีทั้งหมด 3 พีเรียด พีเรียดละ 20 นาที รวมทั้งหมดก็ 60 นาทีค่ะ"
1013103-36 = "ส่วนกติกา... ก็ง่ายๆ ค่ะ ก็แค่ต้องใช้ไม้ฮอกกี้ตีลูกพัคให้เข้าประตูค่ะ"
1013103-37 = "อ้อ ในกีฬาไอซ์ฮอกกี้จะไม่เรียกผู้รักษาประตูว่าโกลคีปเปอร์ แต่จะเรียกว่าโกลเทนเดอร์ค่ะ"
1013103-38 = "การเอาตัวเข้าปะทะ! คือสิ่งที่น่าประทับใจค่ะ! ก็เราต้องสกัดเชิงรุกนี่คะ!"
1013103-39 = "[s] \"เมื่อกี้เอาตัวกระแทกจนอีกคน... ล้มตึงไปเลยนะ?!\""
1013103-40 = "ไม่เป็นไรค่ะ! นั่นยังอยู่ในขอบเขตที่รับได้ของไอซ์ฮอกกี้ในเรดวินเทอร์ค่ะ"
1013103-41 = "นี่ คนที่ถูกกระแทกจนลงไปนอนน่ะ! รีบๆ ลุกขึ้นมาสิคะ! นอนถ่วงเวลาการแข่งขันอยู่แบบนั้น เดี๋ยวก็โดนลงโทษหรอกค่ะ!"
1013103-42 = "[s3] \"กระแทกจนล้มตึง แต่ไม่ฟาวล์...\"\n[s4] \"แต่ถ้าลงไปนอน กลับฟาวล์เฉยเลย...\""
1013103-45 = "ใช่ค่ะ! นี่ละค่ะไอซ์ฮอกกี้ของเรดวินเทอร์!"
1013103-46 = "[s] \"อ๊ะ ฟาดกันด้วยไม้ฮอกกี้เลย\""
1013103-47 = "ได้ยังไงกันคะ! ทำแบบนั้นต้องออกจากสนาม 5 นาทีค่ะ!"
1013103-48 = "ว่าไงนะคะ??!! กรรมการ ตัดสินยังไงคะเนี่ย? ให้ออกแค่ 2 นาทีงั้นเหรอ?! เห็นทีต้องตรวจสอบความโปร่งใสของกรรมการแล้วค่ะ!!!"
1013103-49 = "[s5] \"นี่คือการแก้แค้นที่โดนกระแทกเมื่อกี้เหรอ?\"\n[s6] \"เข้าปะทะคอมโบ 3 ครั้งติดจนอีกฝ่ายกระเด็นไปแล้ว...?\"\n[s7] \"กระจกที่อัฒจันทร์ร้าวเลย... นี่คือไอซ์ฮอกกี้ของที่นี่เหรอ!?\""
1013103-53 = "อ่า... เล่นแรงเกินไปแล้วค่ะ ถ้ากระจกแตกก็ต้องหยุดเกมไว้ก่อนจนกว่าจะเปลี่ยนกระจกใหม่เสร็จ"
1013103-54 = "การจงใจเอาตัวเข้าปะทะแรงๆ ติดต่อกันหลายครั้งแบบนั้นคือการเล่นที่รุนแรงเกินกว่าเหตุ ต้องถูกลงโทษให้ออกจากสนามอย่างน้อย 10 นาที..."
1013103-55 = "มีการส่งสัญญาณเริ่มเล่นใหม่ค่ะ! สัญญาณเริ่มเล่นใหม่! การตัดสินวันนี้ดูผ่อนปรนจังเลยนะคะ!"
1013103-56 = "กรรมการสมองกลับหรือเปล่าคะเนี่ย?! อยากจบเส้นทางอาชีพแค่นี้เหรอคะ?!??"
1013103-57 = "[s] \"อ่า ทะเลาะกันซะแล้ว\""
1013103-58 = "แน่นอนสิคะ! แบบนี้ต้องจัดให้คะมำสักครั้งค่ะ!"
1013103-59 = "การทะเลาะวิวาทในไอซ์ฮอกกี้เป็นเรื่องธรรมดาที่ถ้าไม่เกิดจะแปลกมากกว่าค่ะ "
1013103-60 = "ยิ่งถ้าทีมเหย้าถูกทิ้งห่างมากๆ ก็จะจงใจยั่วยุให้เกิดการลงไม้ลงมือเพื่อเอาใจแฟนๆ ด้วยนะคะ"
1013103-61 = "และถึงจะเป็นการแข่งขันที่ไม่สำคัญนัก แต่การทำแบบนั้นก็เป็นการทำเพื่อแฟนๆ ที่อุตส่าห์เสียเงินซื้อตั๋วมาชมค่ะ"
1013103-62 = "แต่ถึงจะลงไม้ลงมือกัน แต่อุปกรณ์ป้องกันของไอซ์ฮอกกี้ก็แข็งแกร่งไม่แพ้เกราะหนัก"
1013103-63 = "นอกจากนี้ยังมีกฎที่รู้กันว่าต้องวางไม้ฮอกกี้ก่อนแล้วค่อยไปสู้กันแบบมือเปล่า นี่ก็เลยไม่ใช่เรื่องใหญ่โตอย่างที่คิด..."
1013103-69 = "[ns8] \"ผู้ชมกรูกันเข้าไปในสนามแล้ว!\"\n[ns9] \"ผู้ชมเผาธงประจำทีมกันอยู่นอกสนามด้วย!\""
1013103-72 = "คุณพระ..."
1013103-73 = "โกลาหลแล้วสิคะแบบนี้..."
1013103-74 = "เหตุการณ์แบบนี้เกิดขึ้นบ่อยหรือเปล่าน่ะเหรอคะ?"
1013103-75 = "..."
1013103-76 = "ก็ไม่ถึงกับบ่อยหรอกค่ะ..."
1013103-77 = "แต่ก็เป็นสิ่งที่... หาดูได้ไม่ยากค่ะ..."
1013103-81 = "พวกเราขอประณามสำนักเลขาธิการ!"
1013103-82 = "ขอประณาม! ขอประณาม!"
1013103-83 = "อากาศก็ยังหนาวอยู่ทุกวัน! แต่ก็ไม่พิจารณาเรื่องทำงานสัปดาห์ละ 3 วัน! พุดดิ้งก็แจกให้คนละถ้วยเดียว แถมยังเป็นพุดดิ้งผสมน้ำอีก!"
1013103-84 = "แล้วการมาพ่ายแพ้ในไอซ์ฮอกกี้แบบนี้! ก็เป็นความผิดของสำนักเลขาธิการนั่นละ!"
1013103-85 = "ใช่เลย! ใช่เลย!"
1013103-86 = "เหล่าสหาย! ไปบุกสำนักเลขาธิการกัน!"
1013103-87 = "ไปเลย! ไปเลย!"
1013103-90 = "[ns10] \"เริ่มได้กลิ่น... การปฏิวัติแล้วสินะ...\"\n[ns11] \"นี่ใช่มั้ย... ที่เรียกว่ากิจวัตรของเรดวินเทอร์?!\""
1013103-93 = "ปะ... ไปรู้จักคำแบบนั้นมาจากไหนคะ?!"
1013103-94 = "แต่ถึงจะพูดอย่างนั้น... ในฐานะนักเรียนเรดวินเทอร์ ฉันก็รู้สึกเจ็บแปลบขึ้นมาเลยนะคะ..."
1013103-95 = "อ่าๆ ฮัลโหล เทส ไมค์ เทส"
1013103-96 = "สวัสดีค่ะ นักเรียนเรดวินเทอร์ทุกคน ขอแจ้งให้ทราบว่าตอนนี้มีการปฏิวัติที่มีจุดเริ่มต้นมาจากสนาม#nไอซ์ฮอกกี้หลักค่ะ"
1013103-97 = "สำนักเลขาธิการของเราขอให้คำมั่นว่าจะแก้ไขสถานการณ์นี้อย่างสุดความสามารถ และจากนี้เป็นต้นไป เราจะประกาศกฎอัยการศึกในพื้นที่ เพื่อรักษาความสงบเรียบร้อยไว้ให้ได้มากที่สุดค่ะ"
1013103-98 = "ขอให้นักเรียนทุกคนอยู่ในความสงบ และตั้งใจทำหน้าที่ในการเรียนและการดำรงชีวิตของตัวเองค่ะ"
1013103-99 = "ฉันขอย้ำอีกครั้งนะคะ เรดวินเทอร์เป็นสถานที่ที่ปลอดภัยค่ะ เรดวินเทอร์เป็นสถานที่ที่ปลอดภัย"
1013103-100 = "นี่ คิดว่าครั้งนี้พวกเราต้องหลบหนีกันนานแค่ไหนเหรอ?"
1013103-101 = "ฉันว่าน่าจะ 2 วันนะ"
1013103-102 = "ฉันว่า 3 วัน"
1013103-103 = "พนันกันมั้ยล่ะ?"
1013103-104 = "เอาสิ"
1013103-105 = "นี่พวกเธอ ยังไม่ได้ปิดไมค์เลยนะ!!!"
1013103-106 = "ตี๊ดดด~"
1013103-111 = "..."
1013103-112 = "[s] \"......\""
1013103-113 = "เอ่อ คุณครูคะ?"
1013103-114 = "วันนี้ฉันว่าน่าจะไม่ปลอดภัยในหลายๆ ด้าน..."
1013103-115 = "ระหว่างรอให้สถานการณ์สงบลง เราไปดูเทปบันทึกการแข่งขันไอซ์ฮอกกี้นัดสนุกๆ กันแทนมั้ยคะ...?"
1013103-117 = "(แล้วคุณครูก็ได้ดูเทปบันทึกการแข่งขันไอซ์ฮอกกี้กับทาคาเนะแทน...)"

[translation]
1013103-1 = "Ice Hockey"
1013103-2 = "Welcome, Sensei! How has life been treating you?"
1013103-3 = "[s] \"Ha. Don't get me started.\""
1013103-4 = "Very well. Please follow me to the screening room."
1013103-5 = "What? Why aren't we watching the game here? Oh, spare me. This is a workplace!"
1013103-6 = "And, as you may have noticed, this place has a dearth of video projection equipment!"
1013103-7 = "Please! This way!"
1013103-12 = "[ns] \"Whoa... This looks quite impressive.\""
1013103-13 = "Is it? Well, I couldn't settle for less. After all, the great \"Sensei\" is visiting."
1013103-14 = "[s1] \"I appreciate it, but...\"\n[s2] \"All THIS belongs to the Publishing Department?\""
1013103-17 = "Oh, about that..."
1013103-18 = "The Publishing Department is indeed intended to publish publications."
1013103-19 = "But THIS is a demonstration of how much the president likes to spend money..."
1013103-20 = "Among Red Winter's various cultural ventures, the Publishing Department can be quite...enthusiastic regarding certain projects."
1013103-21 = "Which led to this..."
1013103-22 = "[s] \"...Is the Secretariat okay with this?\""
1013103-23 = "R-Red Winter has its own way of doing things! Just like the Publishing Department itself!"
1013103-24 = "There is no need to investigate our finances or spending, I assure you!"
1013103-25 = "Above all, we're here for hockey, aren't we?"
1013103-26 = "As I have already told you, the semifinals are about to begin."
1013103-27 = "Naturally, Red Winter has many students who participate in winter sports."
1013103-28 = "Ice hockey, in particular, has a healthy amount of dedicated fans!"
1013103-32 = "Here we are, ladies and gentlemen! The ice hockey league semifinals are about to commence!"
1013103-33 = "So it begins, Sensei!"
1013103-34 = "As you may already know, each ice hockey team is comprised of six players. That's quite small when compared to other sports."
1013103-35 = "A match has three periods of 20 minutes each, meaning that there are 60 minutes of total playtime."
1013103-36 = "The rules...are actually quite simple. Players use hockey sticks to score by shooting the puck into the opposing goal."
1013103-37 = "By the way, in hockey, we have \"goaltenders\" instead of \"goalkeepers.\" They're referred to as \"goalies\" in common parlance."
1013103-38 = "That's a solid body check! A very aggressive defense!"
1013103-39 = "[s] \"Wait, they just...tackled the other player!\""
1013103-40 = "It's fine! That much is permitted in Red Winter's ice hockey rules."
1013103-41 = "Most importantly, don't remain sprawled on the ice! Hurry and get back up! If you delay the game any longer, you'll face a penalty!"
1013103-42 = "[s3] \"So intentional tackles are not fouls...\"\n[s4] \"But collapsing on the ice is a foul...?\""
1013103-45 = "Yes! These are the rules of Red Winter's ice hockey!"
1013103-46 = "[s] \"Hey. They got hit by a hockey stick!\""
1013103-47 = "Not good! That's a five-minute penalty!"
1013103-48 = "What?! Are you insane, referee? A mere two-minute penalty?! We should investigate their bank account!"
1013103-49 = "[s5] \"Is it payback for the tackle earlier?\"\n[s6] \"I think I saw someone suffer three consecutive body slams...\"\n[s7] \"The protective glass barrier is cracking... This is normal?!\""
1013103-53 = "Oh... Now that's a little too far. If the glass barrier is sufficiently damaged, then the game has to stop until it's replaced."
1013103-54 = "Furthermore, intentional and consecutive body checks like that will surely result in a 10-minute penalty for unsportsmanlike conduct—"
1013103-55 = "The ref deems that the game must continue! You don't see generosity like this every day, folks!"
1013103-56 = "Is the referee suffering a concussion?! Do they have a death wish?"
1013103-57 = "[s] \"Now they're just brawling...\""
1013103-58 = "Of course! That's a natural reaction to such injustice."
1013103-59 = "In fact, an ice hockey match without a single fight is quite the rarity!"
1013103-60 = "If the home team is losing badly, sometimes the players start fights on purpose to keep the audience engaged."
1013103-61 = "After all, if the game is boring, the players are obligated to ensure that the fans receive a proper show. We must justify the ticket price, after all."
1013103-62 = "The ice hockey pads and helmets are quite sturdy, so it's relatively safe."
1013103-63 = "And, since most players only fight with their fists, no one suffers serious—"
1013103-69 = "[ns8] \"The crowd's joining in!\"\n[ns9] \"And someone's burning a team flag!\""
1013103-72 = "...Oh, my."
1013103-73 = "This is quite the incident."
1013103-74 = "...Oh? Does this happen often?"
1013103-75 = "..."
1013103-76 = "Well, it's not a frequent occurrence, but..."
1013103-77 = "...It's not...unheard of."
1013103-81 = "—as such, we condemn the Secretariat and denounce their policies!"
1013103-82 = "Denounce! Denounce!"
1013103-83 = "We denounce how it's still cold in the dorms this morning! How the back-breaking labor continues for its third consecutive day! How we are offered only one measly ration of watered-down pudding at dinner!"
1013103-84 = "And now my beloved team has lost this hockey game? Outlandish! Corruption! This is all the Secretariat's fault!"
1013103-85 = "Yeah! That's right!"
1013103-86 = "Comrades, let us march to the Secretariat!"
1013103-87 = "Onward! Onward!"
1013103-90 = "[ns10] \"Could this...be...\"\n[ns11] \"The Red Winter's morning greeting?!\""
1013103-93 = "Wh-Where did you even hear that?"
1013103-94 = "...After everything I told you, I feel a pang of guilt as a Red Winter student..."
1013103-95 = "Test, test, mic check. Mic check. Hey."
1013103-96 = "Hello, Red Winter student body. We would like to notify you that a small coup is currently starting in the vicinity of the ice hockey arena."
1013103-97 = "The Secretariat assures you that it will do its best to address the situation and has hereby declared martial law in this limited zone. Law and order shall be upheld."
1013103-98 = "We ask that the students do not panic and instead focus on their schoolwork and manual labor."
1013103-99 = "We repeat. Red Winter is safe. Red Winter is safe."
1013103-100 = "How long do you think we'll need to be on the run?"
1013103-101 = "My money's on two days."
1013103-102 = "I think three."
1013103-103 = "Wanna bet?"
1013103-104 = "You're on."
1013103-105 = "The mic's still hot, you idiots!"
1013103-106 = "Beeeep"
1013103-111 = "..."
1013103-112 = "[s] \"...\""
1013103-113 = "Um, Sensei?"
1013103-114 = "I understand that this may appear...concerning."
1013103-115 = "Would you instead enjoy watching some ice hockey compilations? I'd like to show you some highlights."
1013103-117 = "And so Takane and I watched some great moments from old ice hockey games."

[translation]
83306075600-7 = "เอาละ... เดี๋ยวพาไปปล่อยตรงหน้าต่างนะ"
83306075600-14 = "งั้นเรื่องนี้ก็คลี่คลายได้แล้ว... "
83306075600-19 = "จับแมลงด้วยมือเปล่าแล้วเอาไปปล่อยตรงหน้าต่างเหรอ..."
83306075600-20 = "ยะ... อย่างโหดเลย! ประธานกรรมการวินัย!"
83306075600-21 = "จิตใจแข็งแกร่งขนาดที่เห็นหนวดแมลงแล้วยังไม่กระพริบตาเลย...!"
83306075600-22 = "มะ... ไม่ได้การละ ต่อไปคงต้องระวังไม่ให้มีเรื่องต้องเผชิญหน้ากันอีก!"
83306075600-24 = "......?"

[translation]
42160-1 = "第16話;先生の事情"
42160-3 = "[log]取調記録：001-S-1[/log]"
42160-5 = "[log]担当者：SRT特殊学園1年生、[ruby=つきゆき]月雪[/ruby]ミヤコ[/log]"
42160-7 = "[log]容疑者：シャーレ、[USERNAME]先生[/log]"
42160-10 = "訓練場地下取調室"
42160-12 = "……理解ができません。"
42160-13 = "どうしてここに来たのですか？"
42160-14 = "[s1] \"さっきのは冗談だったんだけど……\"\n[s2] \"ミヤコに会いに来たよ。\""
42160-17 = "……信じがたい話ですね。"
42160-18 = "ここは都心から数km以上離れている軍事基地です。"
42160-19 = "偶然を装ったとしても簡単に立ち寄れるような所ではないですし……#n現時点でどれだけ危険な場所なのか、先生も理解した事だと思います。"
42160-20 = "他の生徒の目を避けてまでここを訪れたということは、何か特別な目的があるのでしょう。"
42160-21 = "……もう一度お聞きします、先生。"
42160-22 = "――どうしてここに来たのですか？"
42160-23 = "[s3] \"返答は変わらないよ。\"\n[s4] \"ミヤコに会うためだよ。\""
42160-26 = "……私を説得しに来たのですね。"
42160-27 = "手紙でもお伝えしましたが、私は既に決心を固めています。"
42160-28 = "カヤ室長がSRTの復権を約束した以上、#n子ウサギ公園でデモを続ける必要もなくなりました。"
42160-29 = "他の小隊員……いえ、支隊員たちにとって。#n衣食住や設備が整った施設に滞在する方が良いと判断しました。"
42160-30 = "……これが、私なりの最善策だと思っています。"
42160-31 = "いえ……上官命令を遂行する武器として、#nこれ以上何かを判断する必要もありません。"
42160-32 = "だから――先生が何を仰っても……決定を覆すことはできません。"
42160-33 = "[ns] \"ミヤコを説得するために来たわけじゃないよ。\""
42160-35 = "[ns5] \"ただ、一つだけ聞きたくて。\"\n[ns6] \"ミヤコは今、楽しい？\""
42160-38 = "……どうしてそれを訊ねるのですか？"
42160-39 = "私はSRT――正義を、市民の安全を守るという使命のために働く特殊部隊員です。"
42160-40 = "そういった責務の下動いているSRT隊員にとって、#n「楽しい」という感情は贅沢品に過ぎません。"
42160-41 = "[s7] \"ミヤコが現状に満足しているなら何も言わないけど……\"\n[s8] \"「責任」を、誤解しないでほしいかな。\""
42160-44 = "誤解、ですか……？"
42160-45 = "責任という言葉に「行うべき義務」以外の意味があるのですか？"
42160-46 = "[ns9] \"「責任を負う」というのは、苦行を背負う事じゃないよ。\"\n[ns10] \"嫌なことを引き受ける事でも――\"\n[ns11] \"――間違った行動に対する、罰でもない。\""
42160-52 = "[ns12] \"「責任を負う」というのは、自分の行動に後悔がないように――\"\n[ns13] \"心の荷を解く、楽しいことじゃないとね。\""
42160-59 = "[ns] \"それで……ミヤコは今、楽しいの？\""
42160-64 = "……だから、先生には会いたくなかったのに。"
42160-67 = "……大人になるというのは、辛いことだと思っていました。"
42160-68 = "辛い真実と向き合って、他人を疑わないと成長できないのだと。"
42160-69 = "そうやって――過去の自分を否定する事になっても、大人になるためには仕方がない事なのだと……。"
42160-72 = "前を歩いている未来が、過去の私に囁くんです。"
42160-73 = "いくら否定しようとしても、#nその世界を知らない私には、いつまでも不安が付き纏って……"
42160-74 = "……先輩の言葉を信じて、楽になろうとしました。"
42160-75 = "それなのに――どうして先生はそんな事を言うのですか？"
42160-76 = "どうして――子供に過ぎない私たちに、自分で判断しろと言うのですか？"
42160-77 = "[ns] \"そりゃあ……私は、[ruby=・   ・   ・   ・]変な大人[/ruby]だからね。\""
42160-81 = "……変な大人。"
42160-85 = "――決めました。"
42160-89 = "先生、ついてきてください。"
42160-102 = "出口はこちらです。"
42160-103 = "少しの間ですが、この辺りの警報を解除しました。"
42160-104 = "ここを出てまっすぐ進めば、誰にも気付かれずに最寄りの停留場まで辿り着けます。"
42160-105 = "[s14] \"そのまま見送ってくれるの？\"\n[s15] \"小隊員に報告しないでいいの？\""
42160-108 = "はい。今日の警備責任者は私ですから。"
42160-109 = "……それに、[USERNAME]先生がいることを知ったら、大騒ぎになります。"
42160-110 = "SRTの隊員として、キヴォトスで起こる騒ぎを一つでも減らせるのなら何よりです。"
42160-111 = "[s] \"ミヤコはこれからどうするの？\""
42160-112 = "私は……自身の責任を果たしに行きます。"
42160-113 = "こういうのは初めてで。#nきっと、思い通りにはいかないのかもしれません……でも……"
42160-114 = "[ns16] \"行ってらっしゃい。\"\n[ns17] \"いざという時は、責任を取るから。\""
42160-119 = "……はい！"
42160-124 = "……遅かったな。"
42160-125 = "警備中に異常でもあったのか。"
42160-126 = "いいえ、特に異常はありませんでした。"
42160-127 = "……そうか。"
42160-134 = "上から新たな指示だ。今回の作戦にはRABBIT支隊も参加するように。"
42160-135 = "……この地図は？"
42160-136 = "貴官にも見覚えがあるだろう。#n子ウサギ駅の図面だ。"
42160-139 = "明日0900、カイザーコンストラクションの貨物列車が子ウサギ駅の2番ホームに停車し、<A.N.T.I.O.C.H.>サーモバリック弾を降ろす予定だ。"
42160-140 = "作業のため、子ウサギ駅は正午までホームを閉鎖する予定だが――#n異常に気づいた反対勢力が駅舎に侵入しようとする可能性がある。#nそのため、RABBIT支隊はカイザーセキュリティと協力し、駅舎外を防衛するように。"
42160-142 = "<A.N.T.I.O.C.H.>サーモバリック弾……先輩方が最初の公開作戦で無力化した弾頭の事ですか？"
42160-143 = "そうだ。"
42160-144 = "市民の安全を考えてD.U.郊外で保管していた大量破壊兵器を、このタイミングで市内に持ち込むなんて……"
42160-145 = "連邦生徒会は――いえ、先輩は何をするつもりなのですか？"
42160-146 = "荷降ろしが完了次第、弾頭は駅地下のサイロ施設に設置され――起爆する予定だ。#n関係者は速やかに施設から退去するように。"
42160-147 = "……市内の中心にある地下鉄で、サーモバリック弾を起爆……？"
42160-148 = "サーモバリック弾は、閉鎖空間での起爆でさらに威力が強まるというのに――"
42160-149 = "――スペックを改めて説明する必要はない。#n<A.N.T.I.O.C.H.>弾頭の威力は、誰よりも私が知っている。"
42160-150 = "……どうして、こんな命令に従うのですか。"
42160-151 = "――[ruby=・  ・]命令[/ruby]だからだ。#n作戦の責任はすべて連邦生徒会が負う。"
42160-152 = "責任がないとはいえ――命を懸けて行う作戦なのに、目的も教えてもらえないのですか？"
42160-153 = "すべての計画は――"
42160-155 = "――SRT特殊学園復活のためにある。"
42160-159 = "……復活、ですか？#nこんな事をして？"
42160-160 = "人々の恐怖の上に建てられた学園が……どうしてSRT特殊学園になれるというのですか？"
42160-161 = "市民の安全を脅かし、他者の権威に頼って延命するSRTなんて――#nSRTと呼ばれる資格などありません。"
42160-163 = "資格は与えられるものではない。#n――作っていくものだ。"
42160-164 = "ひとまず、この混乱を正常化さえできれば……#n名目など後からいくらでも立てられる。"
42160-169 = "……先輩は、何度も言っていましたね。"
42160-170 = "SRTの正義は、いかなる状況でも揺らがない。"
42160-171 = "――私は形だけの[ruby=名前]SRT[/ruby]よりも、変わらない価値のために戦います。"
42160-176 = "……命令、と言った。"
42160-177 = "貴官は造反するつもりか。"
42160-179 = "――違います。"
42160-180 = "造反しているのはあなたです、[ruby=しちど]七度[/ruby]ユキノ。"
42160-184 = "私たちに命令できるのは――[ruby=・   ・   ・   ・   ・   ・]連邦生徒会長[/ruby]だけです。"
42160-196 = "み、ミヤコちゃん……"
42160-197 = "はぁ……。"
42160-198 = "結局、こうなるんだね。"
42160-200 = "……失礼しました。"
42160-208 = "\n次回;衣繍夜行"

42160-37 = "#wait;10"
42160-38 = "3;미야코 무소속;10;……어째서 그게 궁금하신가요?"
42160-39 = "3;미야코 무소속;05;저는 SRT, 정의를 수호하고 시민의 안전을 책임진다는 사명을 갖고 일하는 특수부대원입니다."
42160-40 = "3;미야코 무소속;10;막중한 책무를 지고 있는 SRT의 대원에게 즐거움은 사치일 뿐입니다."
42160-41 = "[s7] \"미야코가 지금의 상태에 만족한다면 상관없지만……\"\n[s8] \"책임이라는 말을 다른 의미로 오해하지 않았으면 좋겠어.\""

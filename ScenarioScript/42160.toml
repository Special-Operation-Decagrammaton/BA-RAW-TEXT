[translation]
42160-1 = "ตอนที่ 16;เหตุผลของคุณครูคนนั้น"
42160-3 = "[log]บันทึกการสอบสวนที่ 001-S-1[/log]"
42160-5 = "[log]ผู้สอบสวน: สึคิยูกิ มิยาโกะ ชั้นปีที่ 1 สถาบันพิเศษ SRT[/log]"
42160-7 = "[log]ผู้ต้องสงสัย: ครู [USERNAME] จากชาเล่ต์[/log]"
42160-10 = "ห้องสอบสวนใต้ดินในสนามฝึก"
42160-12 = "... ฉันไม่เห็นเข้าใจเลยค่ะ"
42160-13 = "ทำไมคุณครูถึงมาที่นี่ได้คะ?"
42160-14 = "[s1] \"เมื่อกี้ครูล้อเล่นนะ...\"\n[s2] \"ที่จริงครูแค่จะมาหามิยาโกะน่ะ\""
42160-17 = "... เป็นคำตอบที่ทำใจเชื่อได้ไม่ลงเลยละค่ะ"
42160-18 = "ที่แห่งนี้คือฐานทัพทหารที่ห่างจากใจกลางเมืองไปหลายกิโลเมตรนะคะ"
42160-19 = "ถึงจะแสร้งว่าบังเอิญเดินผ่านมาก็ยากที่จะเชื่อได้อยู่ดีค่ะ ที่นี่ไม่ใช่สถานที่ที่เข้าถึงได้ง่ายๆ และคุณครู#nก็คงจะไม่รู้ด้วยค่ะว่าการเข้ามาในที่แบบนี้ตัวคนเดียวมันอันตรายขนาดไหน"
42160-20 = "การที่คุณครูหลบเลี่ยงสายตาของนักเรียนคนอื่นและยอมเสี่ยงอันตรายเข้ามาถึงที่นี่ แสดงว่าต้องมีจุด#nประสงค์อะไรเป็นพิเศษสินะคะ"
42160-21 = "... ฉันจะขอถามอีกครั้งค่ะ คุณครู"
42160-22 = "ทำไมคุณครูถึงมาที่นี่คะ?"
42160-23 = "[s3] \"คำตอบก็เหมือนเดิมนั่นแหละ\"\n[s4] \"ครูมาหามิยาโกะไง\""
42160-26 = "... มาเกลี้ยกล่อมฉันเหรอคะ?"
42160-27 = "ฉันบอกคุณครูไปทางจดหมายแล้วนี่คะ ว่าฉันตัดสินใจไปแล้ว"
42160-28 = "ตราบใดที่หัวหน้าสำนักฯ คายะให้คำมั่นว่าจะฟื้นฟู SRT ให้ เราก็ไม่มีเหตุผลที่จะต้องไปประท้วงใน#nโคะอุซางิ การ์เด้นกันต่อค่ะ"
42160-29 = "ส่วนสมาชิกกอง... ไม่สิ สมาชิกหน่วยคนอื่นก็ได้ใช้อาคารที่มีของอำนวยความสะดวกและปัจจัยพื้นฐาน#nในการดำรงชีวิตที่ครบครัน และมันก็จะเป็นประโยชน์ต่อการฝึกฝนและการทำภารกิจด้วยค่ะ"
42160-30 = "สำหรับฉันแล้ว นี่เป็นการตัดสินใจที่ดีที่สุดของฉันแล้วค่ะ"
42160-31 = "...ไม่สิ ในฐานะของอาวุธที่ทำตามคำสั่งของผู้บังคับบัญชา ฉันไม่จำเป็นต้องตัดสินอะไรอีกแล้วค่ะ"
42160-32 = "เพราะงั้น ไม่ว่าคุณครูจะว่ายังไง ฉันก็เปลี่ยนการตัดสินใจไม่ได้หรอกค่ะ"
42160-33 = "[ns] \"ครูจะพูดอีกครั้งนะว่าครูไม่ได้มาที่นี่เพราะหวังอะไรทั้งนั้น\""
42160-35 = "[ns5] \"ครูก็แค่อยากจะมาถามอะไรบางอย่างก็เท่านั้น\"\n[ns6] \"ตอนนี้มิยาโกะมีความสุขดีหรือเปล่า?\""
42160-38 = "...ทำไมถึงสงสัยเรื่องนั้นล่ะคะ?"
42160-39 = "ฉันคือหน่วยรบพิเศษของ SRT ที่ได้รับภารกิจปกป้องความยุติธรรมและรับผิดชอบต่อความปลอดภัย#nของชาวเมืองนะคะ"
42160-40 = "ความสุข ความสนุกเพลิดเพลินไม่ใช่สิ่งสำคัญของสมาชิก SRT ที่แบกรับความรับผิดชอบอันใหญ่ยิ่งค่ะ"
42160-41 = "[s7] \"ถ้ามิยาโกะพอใจกับสิ่งที่เป็นอยู่ในตอนนี้ ครูก็ไม่ว่าอะไรหรอก...\"\n[s8] \"ครูไม่อยากให้เธอเข้าใจคำว่าความรับผิดชอบผิดไปน่ะ\""
42160-44 = "เข้าใจผิดเหรอคะ...?"
42160-45 = "คำว่า 'ความรับผิดชอบ' ไม่ได้แปลว่า 'ภาระหน้าที่ที่ต้องรับผิดชอบ' หรอกเหรอคะ หรือว่ามันยังมีความ#nหมายอื่นอยู่ด้วย?"
42160-46 = "[ns9] \"การรับผิดชอบไม่ใช่การทำเรื่องลำบากอยู่คนเดียวหรอกนะ\"\n[ns10] \"ไม่ใช่การแบกรับสิ่งที่ไม่ต้องการ\"\n[ns11] \"และไม่ใช่การลงโทษต่อการกระทำผิดด้วย\""
42160-52 = "[ns12] \"การมีความรับผิดชอบ คือการทำงานที่เราได้สนุกไปกับมัน\"\n[ns13] \"ได้ปลดภาระออกจากใจ และไม่เสียใจในสิ่งที่ตัวเองทำ\""
42160-59 = "[ns] \"... สรุปแล้วตอนนี้มิยาโกะมีความสุขกับชีวิตดีแล้วหรือเปล่า?\""
42160-64 = "... ก็เพราะเป็นแบบนี้ยังไงล่ะ ฉันถึงได้ไม่อยากเจอคุณครู"
42160-67 = "... ฉันคิดว่าการเป็นผู้ใหญ่คือเรื่องที่น่าเจ็บปวดค่ะ"
42160-68 = "ผู้ใหญ่ต้องเผชิญหน้ากับความจริงอันน่าเจ็บปวด แล้วถ้าไม่เคลือบแคลงใจในตัวคนอื่นก็จะไม่สามารถ#nเติบโตต่อไปได้ค่ะ"
42160-69 = "ถึงแม้ว่าต้องปฏิเสธตัวเองในอดีต แต่ก็ไม่มีทางเลือกถ้าจะเป็นผู้ใหญ่..."
42160-72 = "อนาคตข้างหน้ามาพูดกระซิบกับฉันในอดีตค่ะ"
42160-73 = "ฉันพยายามจะปฏิเสธนะคะ แต่ก็ไม่ค่อยแน่ใจสักเท่าไร ฉันเองก็ไม่ได้รู้จักโลกของผู้ใหญ่ดี..."
42160-74 = "... ฉันเชื่อคำพูดนั้น และพยายามที่จะทำตัวให้สบายขึ้นค่ะ"
42160-75 = "แล้วทำไมคุณครูถึงได้พูดเรื่องแบบนั้นขึ้นมาล่ะคะ?"
42160-76 = "ทำไมถึงบอกให้เด็กอย่างฉันตัดสินใจเอาเองคะ?"
42160-77 = "[ns] \"คงเพราะครูเป็นผู้ใหญ่ที่แปลกๆ น่ะ\""
42160-81 = "... ผู้ใหญ่ที่แปลกๆ"
42160-85 = "... ฉันตัดสินใจแล้วค่ะ"
42160-89 = "คุณครูคะ ช่วยตามฉันมาด้วยค่ะ"
42160-102 = "ทางออกอยู่ตรงนี้ค่ะ"
42160-103 = "ฉันปลดสัญญาณเตือนภัยรอบๆ ออกไว้ชั่วคราวแล้วค่ะ"
42160-104 = "ถ้าออกไปจากตรงนี้แล้วเดินตรงไปเลย คุณครูจะไปถึงป้ายรถบัสที่ใกล้ที่สุดได้โดยไม่มีใครเห็นค่ะ"
42160-105 = "[s14] \"จะให้ครูกลับไปดื้อๆ เลยเหรอ?\"\n[s15] \"ไม่ต้องบอกสมาชิกคนอื่นๆ ก็ได้เหรอ?\""
42160-108 = "ค่ะ ก็ตอนนี้คนรับผิดชอบการเข้าเวรคือฉันยังไงล่ะคะ"
42160-109 = "... นอกจากนี้แล้ว ถ้าคนอื่นๆ รู้ว่าคุณครู [USERNAME] มาที่นี่ คงได้เกิดความวุ่นวายไม่น้อยแน่ค่ะ"
42160-110 = "ในฐานะสมาชิก SRT แล้ว หากฉันสามารถลดเรื่องวุ่นวายที่จะเกิดขึ้นในคิโวทอสได้ ไม่ว่าเรื่องอะไรฉันก็#nจะทำค่ะ"
42160-111 = "[s] \"แล้วจากนี้ไปมิยาโกะจะทำยังไงเหรอ?\""
42160-112 = "ฉันก็... จะไปรับผิดชอบงานของฉันต่อค่ะ"
42160-113 = "ฉันไม่เคยทำอะไรแบบนี้มาก่อน ก็เลยไม่รู้เลยค่ะว่ามันจะออกมาดีอย่างที่คิดหรือเปล่า แต่ก็..."
42160-114 = "[ns16] \"ถ้างั้นก็รีบไปทำเถอะนะ\"\n[ns17] \"ไม่ว่ายังไงครูก็จะรับผิดชอบเรื่องที่มันจะเกิดขึ้นเอง\""
42160-119 = "... ค่ะ!"
42160-124 = "... มาสายนะ"
42160-125 = "เจอเรื่องอะไรมาระหว่างอยู่เวรรึไง?"
42160-126 = "ไม่ค่ะ ไม่มีเรื่องอะไรทั้งนั้นค่ะ"
42160-127 = "... งั้นเหรอ"
42160-134 = "มีคำสั่งใหม่มาจากเบื้องบนน่ะ หน่วย RABBIT จะต้องเข้าร่วมปฏิบัติการครั้งนี้ด้วย"
42160-135 = "... แผนที่นี้มัน?"
42160-136 = "เธอน่าจะคุ้นหน้าคุ้นตาดีนะ นี่คือแผนผังชานชาลาที่สถานีโคะอุซางิ"
42160-139 = "พรุ่งนี้ 9 โมงเช้า รถไฟบรรทุกสินค้าของไคเซอร์ คอนสตรัคชั่นจะมาจอดที่ชานชาลา 2 ของสถานี#nโคะอุซางิ และลำเลียงหัวรบแรงดันความร้อน <A.N.T.I.O.C.H.> ออกมา"
42160-140 = "แผนการนี้จะทำให้มีการปิดชานชาลาของสถานีโคะอุซางิจนถึงเวลาเที่ยงวัน แต่ฝ่ายตรงข้ามอาจจะ#nรู้ทันแผนการนี้ เลยจะให้หน่วย RABBIT ไปช่วยไคเซอร์ ซิเคียวริตี้ตั้งรับอยู่ที่นอกอาคารสถานีรถไฟ"
42160-142 = "หัวรบแรงดันความร้อน <A.N.T.I.O.C.H.>... ใช่หัวรบที่พวกรุ่นพี่ทำให้มันหมดประสิทธิภาพไปเมื่อตอน#nปฏิบัติการครั้งแรกหรือเปล่าคะ?"
42160-143 = "ใช่"
42160-144 = "อาวุธทำลายล้างขั้นสูงอันนั้นถูกเก็บไว้ในชายขอบ D.U. เพื่อความปลอดภัยของชาวเมือง แต่ตอนนี้ดัน#nเอาออกมาอยู่ในตัวเมืองอีก..."
42160-145 = "แล้วตอนนี้องค์การนักเรียน... ไม่สิ พวกพี่ๆ จะไปทำอะไรกันเหรอคะ?"
42160-146 = "พอลำเลียงสำเร็จ หัวรบนั้นจะถูกติดตั้งไว้ที่ไซโลใต้ดินของสถานี และจากนั้นก็จะเกิดระเบิด ผู้ที่เกี่ยวข้องจะต้องหนีออกจากอาคารก่อนที่ปฏิบัติการจะจบ"
42160-147 = "...จะระเบิดหัวรบแรงดันความร้อนในรถไฟใต้ดินกลางเมืองงั้นเหรอคะ?"
42160-148 = "ถ้าระเบิดสุญญากาศเกิดการระเบิดขึ้นมาในที่สถานที่ปิดอย่างรถไฟใต้ดิน อานุภาพของมันก็จะยิ่งมากขึ้น..."
42160-149 = "เธอไม่ต้องมาบอกรายละเอียดให้ฉันฟังหรอก ฉันรู้จักอานุภาพของหัวรบ <A.N.T.I.O.C.H.> ดีกว่าใคร"
42160-150 = "... ทำไมถึงรับคำสั่งนี้มาทำล่ะคะ"
42160-151 = "ก็เพราะมันเป็นคำสั่งไง ถ้ามันเกิดอะไรตามมาจากปฏิบัติการ องค์การนักเรียนก็จะเป็นผู้รับผิดชอบ"
42160-152 = "ถึงเราจะไม่ต้องรับผิดชอบอะไร แต่นี่เป็นปฏิบัติการเสี่ยงชีวิตเลยนะคะ ขอถามจุดประสงค์ได้ไหมคะ?"
42160-153 = "แผนการทั้งหมดนี้..."
42160-155 = "ก็เพื่อฟื้นฟูสถาบันพิเศษ SRT"
42160-159 = "... ฟื้นฟูสถาบันเหรอคะ?"
42160-160 = "โรงเรียนที่ฟื้นฟูจากความหวาดกลัวของผู้คน แบบนี้จะเรียกว่าเป็นสถาบันพิเศษ SRT ได้เหรอคะ?"
42160-161 = "SRT ที่คุกคามประชาชนและยืนหยัดได้ด้วยการอาศัยอำนาจของผู้อื่นน่ะ ไม่มีคุณสมบัติที่จะได้ชื่อว่า#nเป็น SRT ได้หรอกค่ะ"
42160-163 = "คุณสมบัติไม่ใช่สิ่งที่รับมา แต่เป็นสิ่งที่ต้องสร้างขึ้น"
42160-164 = "อันดับแรกถ้าทำให้ความวุ่นวายเป็นปกติได้... ก็คงหาข้ออ้างเพื่อนักเรียนรุ่นหลังได้"
42160-169 = "... รุ่นพี่เองก็พูดอยู่หลายครั้งไม่ใช่เหรอคะ"
42160-170 = "ว่าความยุติธรรมของ SRT คือคุณค่าที่จะไม่เปลี่ยนแปลงไปตามฝ่ายตรงข้ามหรือสถานการณ์ที่เจอ"
42160-171 = "ฉันอยากต่อสู้เพื่อคุณค่าที่ไม่เปลี่ยนแปลงมากกว่าเพื่อชื่อเสียงเรียงนามที่ไม่มีแก่นสำคัญนะคะ"
42160-176 = "... ก็บอกแล้วไงว่านี่เป็นคำสั่ง"
42160-177 = "หรือว่าเธอคิดจะขัดขืนคำสั่งกันล่ะ?"
42160-179 = "เปล่าค่ะ"
42160-180 = "คนที่ขัดขืนคำสั่งคือคุณต่างหากค่ะ ชิจิโดะ ยูกิโนะ"
42160-184 = "คนที่จะออกคำสั่งพวกฉันได้ มีแค่ประธานองค์การนักเรียนเท่านั้นค่ะ"
42160-196 = "มะ... มิยาโกะจัง..."
42160-197 = "เฮ้อ..."
42160-198 = "สุดท้ายก็เป็นแบบนี้จนได้สินะ"
42160-200 = "... ขอโทษที่เสียมารยาทด้วยค่ะ"
42160-208 = "ตอนต่อไป;ความพยายามที่สูญเปล่า"

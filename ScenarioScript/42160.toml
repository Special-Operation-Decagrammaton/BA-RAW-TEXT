42160-13 = "3;미야코 무소속;05;선생님, 어째서 이곳에 오신 건가요?"
42160-14 = "[s1] \"아까는 농담이었지만……\"\n[s2] \"그저 미야코를 만나러 온 것뿐이야.\""

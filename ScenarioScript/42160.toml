42160-159 = "3;미야코 무소속;10;……부활이요?"
42160-160 = "3;미야코 무소속;05;사람들의 공포 위에 세워진 학원이 어떻게 SRT 특수학원이 될 수 있죠?\n#3;em;[?]"
42160-161 = "3;미야코 무소속;11;시민의 안전을 위협하고, 타인의 권위에 의존하여 연명하는 SRT는 SRT라고 불릴 자격이 없습니다."

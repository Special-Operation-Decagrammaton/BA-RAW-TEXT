[translation]
42160-1 = "第16話;老師的情況"
42160-3 = "[log]審問紀錄：001-S-1[/log]"
42160-5 = "[log]負責人：SRT特殊學園一年級，月雪都子[/log]"
42160-7 = "[log]嫌疑人：夏萊，[USERNAME]老師[/log]"
42160-10 = "訓練場地下審問室"
42160-12 = "……我實在無法理解。"
42160-13 = "老師為什麼會來這裡呢？"
42160-14 = "[s1]「剛才是開玩笑的……」\n[s2]「是來見都子的哦。」"
42160-17 = "……實在難以相信。"
42160-18 = "這裡可是距離市中心數km遠的軍事基地。"
42160-19 = "就算裝作偶然也不是能輕易接近的地方……#n這裡如今有多麼危險，老師應該也很清楚才對。"
42160-20 = "既然特地避開其他學生的注意來到這裡，想必是有什麼特別的目的吧。"
42160-21 = "……我再問你一次，老師。"
42160-22 = "──你為什麼會來這裡？"
42160-23 = "[s3]「我的回答跟剛才一樣。」\n[s4]「是來見都子的哦。」"
42160-26 = "……你是來說服我的吧。"
42160-27 = "我在信中應該也說過了。"
42160-28 = "我的心意已決。#n既然香耶室長已經答應讓SRT復校，我們就沒有必要繼續在兔寶寶公園示威了。"
42160-29 = "對其他小隊員……不，分隊員們來說也一樣，#n我判斷住在這種食衣住和設備都更齊全的設施更為適當。"
42160-30 = "……這是我所能做出的最佳策略。"
42160-31 = "……不，身為執行上級命令的武器，已經不必再做出任何判斷。"
42160-32 = "因此──無論老師說什麼……我都不會改變我的決定。"
42160-33 = "[ns]「我並不是來這裡說服都子的。」"
42160-35 = "[ns5]「只是想問你一個問題而已。」\n[ns6]「都子，你現在快樂嗎？」"
42160-38 = "……為什麼要這麼問呢？"
42160-39 = "我是SRT──是為了維護正義和市民安全的使命行動的特殊部隊員。"
42160-40 = "作為背負此一責任的SRT隊員，「快樂」這種感情本來就是奢侈品。"
42160-41 = "[s7]「如果都子對現狀滿意，我也不會多說什麼……」\n[s8]「不過希望你別誤解『責任』的意義。」"
42160-44 = "誤解，是嗎……？"
42160-45 = "責任除了「應當完成的義務」以外還有其他的意思嗎？"
42160-46 = "[ns9]「所謂的『背負責任』並不是指自討苦吃。」\n[ns10]「也不是接受不喜歡的事──」\n[ns11]「──更不是對錯誤行動的懲罰。」"
42160-52 = "[ns12]「『背負責任』是為了不對自己的行動感到後悔──」\n[ns13]「解開心中的包袱，當然得要快樂才行。」"
42160-59 = "[ns]「所以……都子，你現在快樂嗎？」"
42160-64 = "……就是因為這樣，我才不想跟老師見面的。"
42160-67 = "……我以為成為大人是一件辛苦的事。"
42160-68 = "若是不面對不堪的現實、對他人保持戒心就無法成長。"
42160-69 = "即使──不得不否定過去的自己，那也是為了成為大人不得已的事……"
42160-72 = "我正前往的未來，正在對過去的我訴說著。"
42160-73 = "無論再怎麼想否定，對世界一無所知的我卻總是被不安所壟罩……"
42160-74 = "……因此才會相信前輩的話，試圖讓自己輕鬆一點。"
42160-75 = "然而──為什麼老師要說那種話呢？"
42160-76 = "為何──要告訴只是孩子的我們，要自己做出判斷呢？"
42160-77 = "[ns]「因為我是個[ruby=  ・     ・     ・     ・     ・  ]奇怪的大人[/ruby]吧。」"
42160-81 = "……奇怪的大人。"
42160-85 = "──我決定了。"
42160-89 = "老師，請跟我來。"
42160-102 = "出口在這邊。"
42160-103 = "雖然只有一小段時間，不過我解除了這附近的警報系統。"
42160-104 = "從這裡離開後直直前進，應該就能在不被發現的情況下抵達最近的公車站了。"
42160-105 = "[s14]「你要就這麼放我走嗎？」\n[s15]「不向其他小隊員報告沒關係嗎？」"
42160-108 = "是的。因為今天的警備負責人是我。"
42160-109 = "……而且，要是讓其他人發現[USERNAME]老師在這裡會引起大騷動的。"
42160-110 = "身為SRT的隊員，能減少奇普托斯發生的騷動比什麼都重要。"
42160-111 = "[s]「都子接下來打算怎麼做呢？」"
42160-112 = "我……會去盡我應盡的責任。"
42160-113 = "我也是第一次這麼做。#n事情想必不會如我所願吧……不過……"
42160-114 = "[ns16]「放心地去吧。」\n[ns17]「有什麼萬一的話，我會負起責任的。」"
42160-119 = "……是！"
42160-124 = "……回來的真晚啊。"
42160-125 = "警備中發生了什麼異常嗎？"
42160-126 = "不，沒有發生任何異常。"
42160-127 = "……這樣啊。"
42160-134 = "上頭下達了新的指示。#n因此RABBIT分隊也要參與這次的作戰。"
42160-135 = "這張地圖是……？"
42160-136 = "很眼熟吧？#n這是兔寶寶站的平面圖。"
42160-139 = "明日0900，凱薩營造的載貨列車預計會停靠兔寶寶站的二號月台，#n並將「A.N.T.I.O.C.H.」空爆燃燒彈在此卸下。"
42160-140 = "為了進行該項作業，兔寶寶站的月台在明天中午前將處於封鎖狀態──#n但是存在反抗勢力察覺異常而強行闖入車站的可能性。#n因此，需要RABBIT分隊協助凱薩保全進行車站外的防衛。"
42160-142 = "「A.N.T.I.O.C.H.」空爆燃燒彈……#n那不是前輩們在首次公開作戰時無力化的那個彈頭嗎？"
42160-143 = "沒錯。"
42160-144 = "考量到市民們的安全而保管在D.U.郊外的大規模破壞性武器，#n居然在這個時間點運回市內……"
42160-145 = "聯邦學生會──不，前輩究竟打算做什麼呢？"
42160-146 = "完成卸貨後，彈頭預計將會被設置於車站地下的飛彈發射井──並加以引爆。#n相關人員必須迅速離開設施。"
42160-147 = "……要在市中心的地下鐵裡引爆空爆燃燒彈？"
42160-148 = "空爆燃燒彈在封閉空間中引爆的話，威力可是會變得更強──"
42160-149 = "──沒必要說明它的規格。#n「A.N.T.I.O.C.H.」彈頭的威力，我比任何人都清楚。"
42160-150 = "……為什麼要服從這樣的命令呢？"
42160-151 = "──因為這是[ruby= ・     ・ ]命令[/ruby]。#n作戰的所有責任都會由聯邦學生會承擔。"
42160-152 = "就算不必負起責任──明明是賭上性命的作戰，卻連目的都不能告訴我們嗎？"
42160-153 = "一切的計畫──"
42160-155 = "──都是為了讓SRT特殊學園復活。"
42160-159 = "……復活？"
42160-160 = "建築在人們恐懼之上的學園……又怎麼稱的上是SRT特殊學園呢？"
42160-161 = "威脅市民的安全、僅能仰賴他人權威苟延殘喘的SRT──#n沒有資格被稱為SRT。"
42160-163 = "資格並不是由他人給予。#n──而是由自己創造。"
42160-164 = "只要能先讓這場混亂恢復正常……#n之後要創造多少名目都不是問題。"
42160-169 = "……前輩你說過很多次吧。"
42160-170 = "SRT的正義，面對任何情況都不會動搖。"
42160-171 = "──比起空有形式的[ruby=名字]SRT[/ruby]，我更願意為不變的價值而戰。"
42160-176 = "……我說過這是命令了。"
42160-177 = "你打算造反嗎？"
42160-179 = "──不。"
42160-180 = "真正造反的是你，七度雪乃。"
42160-184 = "能夠命令我們的──只有[ruby=  ・     ・     ・     ・     ・     ・  ]聯邦學生會長[/ruby]而已。"
42160-196 = "都，都子醬……"
42160-197 = "唉……"
42160-198 = "結果還是變成這樣了啊。"
42160-200 = "……失禮了。"
42160-208 = "下一話;錦衣夜行"

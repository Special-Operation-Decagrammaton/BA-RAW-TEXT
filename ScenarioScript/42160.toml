42160-46 = "[ns9] \"책임을 진다는 것은, 고행을 자처하는 것이 아니야.\"\n[ns10] \"원치 않는 일을 떠안는 것도 아니야.\"\n[ns11] \"그릇된 행동에 대한 징계도 아니지.\""

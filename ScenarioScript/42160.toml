42160-136 = "3;유키노;01;귀관에게는 낯이 익을 테지. 코우사기 역의 승강장 도면이다.\n#3;closeup"
42160-137 = "#all;hide"
42160-138 = "#wait;500"
42160-139 = "#na;유키노;명일 0900시. 카이저 컨스트럭션의 화물 열차가 코우사기 역의 2번 플랫폼에 정차하여 <A.N.T.I.O.C.H.> 열압력탄두를 하역할 예정이다."
42160-140 = "#na;유키노;해당 작업으로 인해 코우사기 역은 정오까지 승강장을 폐쇄할 예정이지만, 이상을 눈치챈 반대 세력이 역사에 침입하려 할 수 있으므로 RABBIT 분대는 카이저 시큐리티를 도와 역사 외부를 방어하도록."
42160-141 = "#all;hide"
42160-142 = "3;미야코 무소속;08;<A.N.T.I.O.C.H.> 열압력탄두라면…… 선배들이 첫 공개 작전 때 무력화한 그 탄두가 아닌가요?\n#3;em;…\n#3;a"
42160-143 = "3;유키노;99;그렇다."
42160-144 = "3;미야코 무소속;04;시민의 안전을 위해 일부러 D.U. 외곽에서 보관하고 있던 대량파괴무기를 이 시점에 다시 시내로 들여오다니……\n#3;stiff"
42160-145 = "3;미야코 무소속;05;총학생회는— 아니, 선배는 지금 무슨 일을 하시려는 건가요?\n#3;em;[반응]"
42160-146 = "1;유키노;08;하역 작업이 완료되면 탄두는 역 지하의 사일로 시설에 설치되어 기폭 될 예정이다. 관련자는 작전이 끝나기 전까지 시설에서 모두 퇴거하도록.\n#1;ar\n#3;m5"
42160-147 = "3;미야코 무소속;08;……시내 한 가운데 위치한 지하철역에서, 열압력탄을 기폭한다고요?"
42160-148 = "3;미야코 무소속;10;열압력탄은 지하철과 같은 폐쇄 공간에서 기폭하면 더욱 위력이 강해지는데—"
42160-149 = "1;유키노;00;제원을 이 자리에서 다시 설명할 필요는 없다. <A.N.T.I.O.C.H.> 탄두의 위력이라면 누구보다도 내가 더 잘 알고 있으니까.\n#1;em;[반응]"
42160-150 = "3;미야코 무소속;11;……어째서 이런 명령을 수행하시는 건가요."
42160-151 = "1;유키노;05;명령이기 때문이다. 작전의 책임은 모두 총학생회가 진다."
42160-152 = "3;미야코 무소속;05;책임이 없다 하더라도 목숨을 걸고 수행하는 작전인데, 목적도 알 수 없나요?"

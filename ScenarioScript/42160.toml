42160-17 = "3;미야코 무소속;11;……믿기 어려운 대답이네요."
42160-18 = "3;미야코 무소속;10;이곳은 도심에서 수 km 떨어져 있는 군사 기지입니다."
42160-19 = "3;미야코 무소속;10;우연을 가장한다 하더라도 가볍게 접근할 수 있는 장소가 아니며, 현시점에서 이런 장소에 홀몸으로 접근하는 것이 얼마나 위험한 것인지 선생님께서 모르시지는 않을 겁니다."
42160-20 = "3;미야코 무소속;11;다른 학생들의 눈을 피해 위험까지 감내하시며 이곳을 방문하셨다는 건, 무언가 특별한 목적이 있으시다는 뜻이겠지요."
42160-21 = "3;미야코 무소속;05;……다시 한번 여쭈겠습니다, 선생님.\n#3;em;[반응]"
42160-22 = "3;미야코 무소속;11;어째서 이 장소에 오신 건가요?"
42160-23 = "[s3] \"대답은 아까와 다르지 않아.\"\n[s4] \"미야코를 만나러 왔어.\""
42160-24 = "#wait;10"
42160-25 = "#wait;10"
42160-26 = "3;미야코 무소속;10;……저를 설득하러 오신 건가요."
42160-27 = "3;미야코 무소속;11;편지를 통해 말씀드렸지만, 저는 이미 마음을 정했습니다."
42160-28 = "3;미야코 무소속;05;카야 실장이 SRT의 부활을 약조한 이상, 코우사기 공원에서 농성을 계속할 필요도 없어졌습니다."
42160-29 = "3;미야코 무소속;10;다른 소대원…… 아니, 분대원들에게도 공원보다는 의식주와 설비가 잘 갖추어진 이런 시설에서 머무르는 것이 전투력을 보존하는 데 더 큰 도움이 되겠지요."
42160-30 = "3;미야코 무소속;10;저로서는 이렇게 하는 것이 제 나름의, 최선의 판단이었습니다."
42160-31 = "3;미야코 무소속;99;……아니, 상관의 명령을 수행하는 무기로서 더 이상 판단을 내릴 필요조차 없지요.\n#3;em;…"
42160-32 = "3;미야코 무소속;05;그러니 선생님께서 무어라 말씀하시든…… 결정을 번복할 수는 없습니다."
42160-33 = "[ns] \"다시 말하지만, 무언가 기대를 바라고 온 게 아니야.\""
42160-34 = "3;미야코 무소속;02\n#3;h\n#wait;1500"
42160-35 = "[ns5] \"그저 한 가지 질문을 하고 싶었어.\"\n[ns6] \"미야코는 지금 즐거워?\""

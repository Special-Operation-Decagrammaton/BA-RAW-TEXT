[translation]
42160-1 = "Episode 16; Sensei's Predicament"
42160-3 = "Interrogation Log: 001-S-1"
42160-5 = "Interrogator: Tsukiyuki Miyako, SRT Academy 1st Year"
42160-7 = "[log]Suspect for Investigation: [USERNAME] Sensei, Schale[/log]"
42160-10 = "Interrogation Room Under the Training Ground"
42160-12 = "Please help me understand."
42160-13 = "How and why are you here?"
42160-14 = "[s1] \"It was a bad joke, please...\" \n[s2] \"I'm here to see you, Miyako...\""
42160-17 = "...I find that hard to believe."
42160-18 = "This is a military facility completely removed from any city or town."
42160-19 = "Even if I were to be generous and assume happenstance, you can't just happen upon this compound. And you surely understand the inherent risks of coming to a military site completely unarmed and alone."
42160-20 = "You came all this way, avoiding detection and risking your safety. So, yes, I find it hard to believe your reason is that mundane."
42160-21 = "So, I'll ask you again, Sensei."
42160-22 = "Why are you here?"
42160-23 = "[s3] \"The reason really is that mundane.\" \n[s4] \"I'm here to see Miyako.\""
42160-26 = "...Did you come to change my mind?"
42160-27 = "I thought I made it clear in my letter. I've made my decision."
42160-28 = "Once Chief Kaya assured SRT's revival, our stint at Kousagi Park was over."
42160-29 = "A fully-equipped base like this, providing all essentials, is optimal for my squad, or rather, my entire unit."
42160-30 = "I weighed the factors and made the best decision for my squad."
42160-31 = "And now, I no longer make decisions. I am a weapon meant to carry out orders."
42160-32 = "So there's nothing you can say, Sensei."
42160-33 = "[ns] \"I'm really not here with an agenda.\""
42160-35 = "[ns5] \"I just wanted to know if you're having fun.\"\n[ns6] \"Are you enjoying yourself here, Miyako?\""
42160-38 = "...What bearing does that have on this situation?"
42160-39 = "I’m an operative of SRT, maintaining justice and safeguarding the public."
42160-40 = "Pleasure is a luxury meant for those who haven't assumed these duties."
42160-41 = "[s7] \"If you're satisfied with that. But you're misunderstanding your duty.\" \n[s8] \"Do you think you've mistaken what your duty is?\""
42160-44 = "My duty...? How?"
42160-45 = "Isn't duty about fulfilling a responsibility?"
42160-46 = "[ns9] \"Fulfilling a duty should never include suffering or pain.\" \n[ns10] \"Your real duty will never contradict your ideals.\" \n[ns11] \"Duty and responsibilities are a gift, not a punishment.\""
42160-52 = "[ns12] \"You have a responsibility to yourself, Miyako.\" \n[ns13] \"You have a duty to enjoy being alive, Miyako.\""
42160-59 = "[ns] \"So? Are you having fun?\""
42160-64 = "...This is why I knew I couldn't see you before I left."
42160-67 = "I always thought growing up was about enduring hardship."
42160-68 = "I thought that the only way I could grow was if I let go of all my naivete and trust and compassion."
42160-69 = "Sensei, I... I had managed to convince myself that it was okay to reject my ideals, my justice. This is what it was to be a part of the real world."
42160-72 = "It felt like my impending adulthood was chastising my younger self. Be stronger, be harder, be smarter."
42160-73 = "I didn't want to believe that the justice I love didn't have a place in this adult world. But what did I know about growing up? That must be how it is..."
42160-74 = "If I believed that, if my squad members could benefit, I thought I could be at peace."
42160-75 = "So why are you coming and telling me that I shouldn't throw away who I am to follow the higher order? Why would you tell me this, when I'd finally resigned myself to being Yukino's weapon?"
42160-76 = "Will you please stop telling a bunch of clueless children to make their own decisions?!"
42160-77 = "[ns] \"Sorry, but your justice has a place in my adult world, at least.\""
42160-81 = "You... You... You weirdo. You're making me sound like Saki, now."
42160-85 = "Okay, Sensei. You win. I understand now."
42160-89 = "Follow me, this way."
42160-102 = "The exit is down this hall."
42160-103 = "It won't last forever, but I've disabled the alarm system for now."
42160-104 = "Exit through here, and promise me you'll go straight to the bus stop without anyone noticing you."
42160-105 = "[s14] \"You're letting me go? Just like that?\" \n[s15] \"You're not reporting me to the foxes?\""
42160-108 = "Yes. Right now, I'm in charge of security."
42160-109 = "...And if they find out that you were here, Sensei, that won't be easy to smooth over."
42160-110 = "I'm a member of SRT, remember? Protecting civilians like you is a part of my job."
42160-111 = "[s] \"What are you planning to do?\""
42160-112 = "I... I am going to do my duty."
42160-113 = "I don't really know how to do something like this, so I might mess it up..."
42160-114 = "[ns16] \"It's okay either way. You'll be fine.\" \n[ns17] \"I'll take responsibility for any blowback.\""
42160-119 = "Understood!"
42160-124 = "Late."
42160-125 = "Anything unusual during your watch?"
42160-126 = "No. Nothing at all."
42160-127 = "...Is that so?"
42160-134 = "We received new orders. RABBIT Squad will be joining us."
42160-135 = "...Isn't this map?"
42160-136 = "I thought you might recognize it. These are the blueprints to the Kousagi Station platform."
42160-139 = "Tomorrow at 0900, a Kaiser Construction cargo train will pull into platform 2 of Kousagi Station and will unload the A.N.T.I.O.C.H. thermobaric warhead."
42160-140 = "The station will be closed till midday for offloading. To counter potential threats, RABBIT Squad will assist Kaiser Security in locking down the perimeter."
42160-142 = "The A.N.T.I.O.C.H. warhead? That's the bomb you retrieved and disabled on the FOX Squad's first public operation!"
42160-143 = "Correct."
42160-144 = "The entire point of relocating it outside of D.U. was to ensure the people's safety. Now we're bringing it back into the heavily populated city?"
42160-145 = "What is the Council... No, actually. What are you planning, Yukino?"
42160-146 = "Once unloaded, the warhead will be placed in the station's underground silo and detonated. All personnel will evacuate first, and then our squads."
42160-147 = "...You're setting it off underground, inside a subway station in the heart of the city?"
42160-148 = "There couldn't be a worse-case scenario to detonate it. The confined quarters will amplify–"
42160-149 = "You needn't remind me. I’m more versed in the A.N.T.I.O.C.H.'s power than most."
42160-150 = "If that's true, then even more reason you should see the insanity in this! What could your rationale possibly be to continue supporting this?"
42160-151 = "I am executing orders. The General Student Council will take responsibility with the public. "
42160-152 = "Then forget the responsibility. You're asking us to stake our lives on a dangerous and immoral operation. At the least we deserve an explanation as to why you're doing this."
42160-153 = "Everything I've done..."
42160-155 = "I've done for the revival of SRT Academy."
42160-159 = "Do you hear yourself, Yukino?"
42160-160 = "You're trying to use the fear and terror of the very people our academy was established to protect to...rebuild SRT?"
42160-161 = "A version of SRT that jeopardizes public safety and leans on other peoples' authority has no right to claim the name."
42160-163 = "Rights aren't handed out. They're taken. "
42160-164 = "If this is what it takes to come out of this situation, we will be justified to the future students of SRT."
42160-169 = "Will we though? I remember hearing you say on the TV, all those years ago..."
42160-170 = "\"That no matter the obstacle, SRT's justice never wavers.\""
42160-171 = "I fight for my principles and justice I've learned over the years. You can tarnish the SRT name all you want, but those values will never change."
42160-176 = "This is a direct order."
42160-177 = "Can I take this as insubordination?"
42160-179 = "No. You can't actually. "
42160-180 = "You aren't my superior. In fact, I would say you're the one who's insubordinate, Shichido Yukino."
42160-184 = "Because the General Student Council President is the only one authorized to give us orders."
42160-196 = "M-Miyako..."
42160-197 = "*sigh*"
42160-198 = "I mean, I guess we all knew deep down this was gonna be the end result."
42160-200 = "...Excuse me."
42160-208 = "Next Episode; Showing Off"

[translation]
2102-1 = "唸到名字的人請留下來（２）"
2102-2 = "……嗚嗚。"
2102-3 = "……頭還有點……不過燒似乎退的差不多了……"
2102-5 = "咦，時間已經這麼晚了……？"
2102-6 = "……哈啊。"
2102-7 = "體育館的清掃已經結束了嗎……"
2102-8 = "……"
2102-9 = "……應該沒問題吧？茜香醬，還有學姐們……"
2102-10 = "明明是我找的工作，卻只有我沒去實在有點抱歉……"
2102-11 = "嗚嗚……"
2102-12 = "不行，把內心化為厲鬼吧綾音！不偶爾這麼做的話，大家每次都只會胡言亂語……！"
2102-13 = "所以才會馬上就說綁架、野餐這種話……！"
2102-14 = "所以這點程度的事……！"
2102-15 = "……"
2102-16 = "……唉。"
2102-17 = "……等稍微好一點之後，拿些點心到教室去吧……"
2102-18 = "至少得開心地迎接她們才行。畢竟大家今天都在替我努力……"
2102-19 = "（嗡）"
2102-20 = "……嗯？MomoTalk？"
2102-21 = "星野前輩……？"
2102-22 = "……"
2102-23 = "……？"
2102-24 = "「綾音醬身體還好嗎～？我們剛到打工地點了唷。可是出了一～點問題？」"
2102-25 = "「體育館的狀態超乎預期的糟糕，真的是這裡嗎～？」"
2102-26 = "「入口附近已經清掃乾淨了，不過裡面還滿滿的真是嚇了一跳呢～」"
2102-28 = "「與其說讓大叔來做實在是過度勞動」"
2102-29 = "「不如說這真的全都是工作的內容嗎？不能適～當地做個段落就回去嗎？」"
2102-30 = "……"
2102-31 = "（啪嘰）"
2102-33 = "非法改建過的體育館內部"
2102-34 = "（哐啷啷啷！）"
2102-35 = "（哐啷啷啷啷啷啷！）"
2102-37 = "又冒出來了，數量非常多！"
2102-38 = "沒問題，壓制他們。"
2102-39 = "綾音的回覆呢？這樣做真的對嗎？"
2102-40 = "那個，唔嗯～我直接把綾音醬的訊息的唸出來哦～？"
2102-42 = "「前輩，這種事就請你自己加油吧」"
2102-43 = "「打工這種事本來就很辛苦」"
2102-44 = "「雖然很抱歉不能和你們一起去，請努力到最後吧。」"
2102-45 = "……她是這麼說的，不覺得很恐怖嗎？該不會還在生氣？"
2102-46 = "我們在這裡放棄的話會讓綾音醬失望的，不可以逃避！ "
2102-47 = "加油吧！為了綾音醬！"
2102-48 = "不能讓綾音失望，努力到最後吧。 "
2102-49 = "……也對。這樣就不用猶豫了，突擊！！"
2102-50 = "唔嘿～這就是友情嗎～真火熱呢。是青春的光芒呢～"
2102-51 = "都說了我們的年紀明明差不多嘛！！"
2102-53 = "……嘿咻。"
2102-54 = "……這樣就可以了。"
2102-55 = "買來了很多零食，飲料也很足夠。"
2102-56 = "有這麼多的話……她們應該會開心吧？"
2102-57 = "不過大家真慢呢……應該不是什麼很遠的地方啊……"
2102-58 = "唔嗯……果然是垃圾比想像中還多嗎……"
2102-59 = "果然就算是晚到還是應該追上去比較──"
2102-60 = "（叮鈴鈴鈴鈴～）"
2102-61 = "……電話？"
2102-63 = "……是，這裡是阿拜多斯對策委員會，請問是哪位？"
2102-64 = "……是。"
2102-65 = "……什麼？"
2102-66 = "……你，你說打掃體育館的人還沒有到！？"
2102-67 = "怎，怎麼會……剛才星野前輩明明說已經到了……"
2102-68 = "違，違約金！？請，請等一下！一定是有什麼誤會……！"
2102-69 = "咦？喂……喂！？"
2102-70 = "……"
2102-71 = "咦……？"
2102-72 = "這是……？"
2102-73 = "（叮鈴鈴鈴鈴～）"
2102-75 = "……喂，喂？"
2102-76 = "你好，請問是阿拜多斯對策委員會嗎？"
2102-77 = "是，是的。請問是哪位……？"
2102-78 = "經確認，貴學園的學生們和我們街上的極端主義運動團體「清晨廣播體操推廣協會」展開了戰鬥。"
2102-79 = "……"
2102-80 = "……嗯？"
2102-81 = "在戰鬥中，因為阿拜多斯方無人機的轟炸造成整個體育館崩毀，室內室外的設施及物品全部損壞……"
2102-82 = "當然，我們街的團體也有一定程度的責任，不過依照損害的比例……"
2102-83 = "我想需要向貴學園請求損害賠償。詳細情況之後會送出，再麻煩你們確認。"
2102-84 = "……"
2102-85 = "什麼！？損害賠償！？請，請等一下！這一定是有什麼誤會……！"
2102-86 = "（哐噹噹噹！碰！碰哐！）"
2102-87 = "等，等等！這麼突然就……！"
2102-88 = "我還沒做好心理準備……！"
2102-89 = "茜香醬，有聽過「車到山前必有路」這句話嗎～？"
2102-90 = "綾音醬我們回來了～"
2102-91 = "我回來了！"
2102-92 = "哎呀～沒想到竟然是別的體育館，人活久了果然什麼事都會發生呢～"
2102-93 = "……"
2102-94 = "呃，難道……電話已經打來了嗎？"
2102-95 = "唔嘿……這下糟糕了，如果直接說明的話還能找點理由的，是不是稍～微晚了一步呢？"
2102-96 = "那，那個……比起和那個清晨什麼的團體對峙的時候，現在這個情況好像危險多了呢？"
2102-97 = "綾音，那個……因為搞錯無人機炸藥的數量，所以破壞了柱子……"
2102-98 = "拜託前輩們安靜點！！不要再刺激綾音醬了！！"
2102-99 = "……"
2102-100 = "綾，綾音醬！我知道你很生氣，不如說生氣也是理所當然的！總之很抱歉！可是，那個……！"
2102-101 = "這是有理由……不，不對，雖然可能稱不上是理由，真的很抱歉！"
2102-102 = "不過總之先聽我們說……！"
2102-104 = "（喀噠）"
2102-105 = "……"
2102-106 = "……！"
2102-107 = "……！"
2102-108 = "……！"
2102-109 = "……"
2102-111 = "……"
2102-112 = "……現在，"
2102-113 = "念到名字的人……"
2102-114 = "請留在教室裡。……其他人請到外頭去。"
2102-115 = "（吞口水）"
2102-116 = "……"
2102-117 = "……茜香醬，"
2102-118 = "……我，我嗎！？！！！？"
2102-119 = "……"
2102-122 = "之外的大家，請全部留下來。"
2102-123 = "念到名字的人請留下來"

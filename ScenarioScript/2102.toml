[translation]
2102-1 = "เหลือเพียงผู้เรียกขาน 2"
2102-2 = "อือ...."
2102-3 = "อืมมมม... ยังปวดหัวอยู่... แต่ว่าดูเหมือนไข้จะลดลงแล้วล่ะ..."
2102-5 = ".....! เวลาผ่านไปขนาดนี้แล้วเหรอ....?"
2102-6 = "อ่า...."
2102-7 = "วันนี้บอกไปแล้วว่าจะพักผ่อนอยู่ที่บ้าน....#nสมาชิกคนอื่นๆ เลยตกลงกันว่าจะไปทำความสะอาดโรงยิมกัน..."
2102-8 = "....."
2102-9 = "คงไม่เป็นไรหรอกมั้ง? เซริกะจัง.... รุ่นพี่คะ....?"
2102-10 = "ฉันรับงานนี้มาเองแต่กลับไม่ได้ไปร่วมกับทุกคน... ถึงทุกคนจะบอกว่าไม่เป็นไรก็เถอะ แต่ว่า..."
2102-11 = "อือ...\n"
2102-12 = "กะ... ก็เพราะว่าทุกคนชอบพูดอะไรแปลกๆ กันไงล่ะ!\n"
2102-13 = "จะบอกให้ลักพาตัวเด็กนักเรียนโรงเรียนอื่นเหรอ? เลิกพูดเรื่องไร้สาระเถอะค่ะ!"
2102-14 = "ก็เพราะแบบนั้นไงล่ะ....!"
2102-15 = "....."
2102-16 = "ฮ่า..."
2102-17 = "อีกสักพักคงต้องหาขนมอร่อยๆ มาติดห้องชมรมเอาไว้บ้างแล้วล่ะ..."
2102-18 = "ถ้ากลับมาถึงคงจะต้องต้อนรับอย่างยินดีแล้วล่ะ#nแต่ถึงยังไง ดูเหมือนทุกคนจะลำบากแทนฉันกันหมดเลย..."
2102-19 = "(วิ้งงงงง)"
2102-20 = "......? หืม? MOMOTALK?"
2102-21 = "รุ่นพี่โฮชิโนะ....? "
2102-22 = "....."
2102-23 = "......?"
2102-24 = "\"อ่า... อายาเนะจัง~ พวกเรามาถึงที่ทำงานพิเศษแล้วล่ะ แต่ว่ามันมีปัญหาอยู่นิดหน่อยน่ะ\""
2102-25 = "\"สภาพของโรงยิมนี่มันแย่กว่าที่คิดเอาไว้อีกนะ เรามาถูกที่กันรึเปล่าเนี่ย~\""
2102-26 = "พวกเราทำความสะอาดตรงทางเข้าเรียบร้อยแล้ว แต่พอเข้าไปข้างในก็เจอกองขยะ#nกองเบ้อเริ่มจนตกใจหมดเลยล่ะ\""
2102-28 = "\"ถ้าจะให้ลุงคนนี้ทำก็ดูจะต้องออกแรงมากเกินไปหน่อยนะ...\""
2102-29 = "\"แค่ทำให้เสร็จๆ แล้วก็กลับเลยไม่ได้เหรอ? พวกเราต้องไปทำงานนี้จริงๆ งั้นเหรอ?\""
2102-30 = "....."
2102-31 = "(โกรธ).....!!!"
2102-33 = "ภายในโรงยิมที่ปรับปรุงใหม่อย่างผิดกฎหมาย"
2102-34 = "(ตู้มมมมมมม!!!!!)"
2102-35 = "(ตู้มมมมมมม!!!!!)"
2102-37 = "ข้างในก็ยังมีอยู่นะ! เยอะสุดๆ เลยด้วย!"
2102-38 = "ไม่มีปัญหา ฉันจะเข้าไปเอง"
2102-39 = "อายะเนะตอบมารึยัง? เธอว่ายังไงบ้าง? ที่นี่ถูกแล้วรึเปล่า?"
2102-40 = "ถ้าอย่างงั้น อืม~ ฉันจะอ่านข้อความที่อายาเนะส่งมาให้ฟังก็แล้วกัน~"
2102-42 = "\"รุ่นพี่คะ ขอร้องล่ะค่ะ เรื่องแค่นี้รบกวนแก้ปัญหาเองเถอะนะคะ\""
2102-43 = "\"ปกติพวกงานพิเศษน่ะ มักจะเป็นงานที่ยากแล้วก็ลำบากอยู่แล้ว\""
2102-44 = "\"ขอร้องล่ะ\""
2102-45 = "เธอบอกแบบนั้นน่ะ แบบนี้คือเธอโกรธใช่ไหมนะ~? รู้สึกขนลุกยังไงก็ไม่รู้"
2102-46 = "อื้อ! ถ้าพวกเรายอมแพ้กันตอนนี้ อายาเนะจังจะต้องผิดหวังแน่ๆ เราจะยอมแพ้ไม่ได้นะ! "
2102-47 = "ทุกคนพยายามเข้า! สู้ๆ เพื่ออายาเนะจัง!"
2102-48 = "นั่นสิ งานที่รับมอบหมายมาจากอายาเนะ จะต้องทำให้เสร็จเรียบร้อยให้ได้"
2102-49 = "...อะไรกัน ฉันก็รู้เหมือนกันนั่นล่ะ! แค่ตรวจดูให้แน่ใจก็เท่านั้นเอง! บุกเลย!!"
2102-50 = "งั้นเหรอ~ นี่คือมิตรภาพสินะ แฮ่~ ร้อนแรงจริงๆ ตาแก่คนนี้ชักจะเริ่มอิจฉาพวกเด็กๆ แล้วสิ..."
2102-51 = "อายุอานามก็ไม่ได้ห่างกันมากเท่าไหร่หรอกน่า!!"
2102-53 = "....เอาล่ะ"
2102-54 = "เท่านี้ก็เรียบร้อยแล้ว!"
2102-55 = "เอาล่ะ เรียบร้อยแล้ว!  ขนมพร้อมแล้ว เครื่องดื่มก็พร้อมแล้ว"
2102-56 = "เท่านี้คงจะไม่พอสำหรับพวกคนที่ทำงานกลับมาเหนื่อยๆ แน่เลย"
2102-57 = "ว่าแต่ทุกๆ คนช้าจังเลยนะ ไม่น่าจะนานขนาดนี้เลยนี่นา"
2102-58 = "อืม... หรือพวกขยะจะเยอะมากนะ? ฉันก็ควรจะไปด้วยแท้ๆ..."
2102-59 = "ฉันรู้สึกผิดกับทุกคนอยู่หน่อยๆ..."
2102-60 = "กริ๊งงงงงงงง-"
2102-61 = "......? โทรศัพท์?"
2102-63 = "ค่ะ คณะกรรมการแผนงานโรงเรียนอะบิดอสค่ะ มีเรื่องอะไรเหรอคะ?"
2102-64 = "....."
2102-65 = "คะ?"
2102-66 = "คะ...คนที่ไปทำความสะอาดยังไปไม่ถึงอีกเหรอคะ?!"
2102-67 = "ไม่มีทาง... เมื่อกี้ฉันติดต่อไปหารุ่นพี่โฮชิโนะแล้ว..."
2102-68 = "คะ?! คะ...ค่าปรับเหรอคะ! เดี๋ยวก่อนสิคะ ต้องมีอะไรผิดพลาดแน่ๆ...!"
2102-69 = "(แกร็ก) เอ๋? ฮัลโหล? ฮัลโหล....?!"
2102-70 = "....."
2102-71 = "....."
2102-72 = "........?"
2102-73 = "กริ๊งงงงงงงง-"
2102-75 = "ฮะ...ฮัลโหล?"
2102-76 = "คณะกรรมการแผนงานของอะบิดอสใช่ไหมคะ?"
2102-77 = "คะ...ใครน่ะ? "
2102-78 = "ยืนยันแล้วว่านักเรียนของโรงเรียนคุณได้ปะทะกับกลุ่มนักกีฬาผาดโผน#n<สมาคมส่งเสริมการทำกายบริหารตอนเช้า> ของทางเมืองเรา"
2102-79 = "....."
2102-80 = ".....คะ?"
2102-81 = "ในระหว่างการปะทะ นักเรียนโรงเรียนอะบิดอสได้ใช้โดรนระเบิดทำให้โรงยิมทั้งหลังพังลงมา#nทำให้ตอนนี้เราไม่สามารถใช้อุปกรณ์อำนวยความสะดวกทั้งภายในและนอกอาคารได้..."
2102-82 = "แน่นอนว่าทางกลุ่มนักกีฬาของเมืองเราเองก็มีส่วนรับผิดชอบด้วยเช่นกัน#nแต่ว่าความเสียหายที่เกิดขึ้นมันรุนแรงมาก..."
2102-83 = "สำหรับเรื่องนี้... เราคงจะต้องเรียกร้องค่าเสียหายจากทางโรงเรียนของคุณอย่างหลีกเลี่ยงไม่ได้ค่ะ"
2102-84 = "..... "
2102-85 = "คะ?!\n"
2102-86 = "ตึกๆๆ! ตู้ม! ปัง!!"
2102-87 = "ดะ...เดี๋ยวสิ อย่าทะเล่อทะล่าเปิดประตูเข้าไปแบบนั้นสิ!!"
2102-88 = "ฉันยังไม่ได้เตรียมใจเลย...!"
2102-89 = "เซริกะจัง เคยได้ยินคำกล่าวนี้ไหม \"เป็นฝ่ายลงมือก่อนย่อมดีกว่า\" น่ะ~"
2102-90 = "ฮายยย~ อายาเนะจัง! พวกเรากลับมาแล้ว~ "
2102-91 = "กลับมาแล้วค่า!"
2102-92 = "อ่า... กลายเป็นว่าเราไปโรงยิมผิดที่น่ะ ในชีวิตเราบางครั้งก็มีเรื่องแบบนี้ได้นะ~"
2102-93 = "......"
2102-94 = "เอ๊ะ... นี่กดรับโทรศัพท์แล้วงั้นเหรอ~?"
2102-95 = "แหะๆ... เรื่องใหญ่แล้วล่ะ ถ้าให้พูดก็คงเหมือนเป็นการแก้ตัวยังไงอยู่นะ~#nคือ...เราอาจจะไปช้าหน่อยน่ะ...."
2102-96 = "อื้อ... รู้สึกว่ามันอันตรายกว่าตอนที่สู้กับสมาคมส่งเสริมการทำกายบริหารตอนเช้าอีกนะคะ....?"
2102-97 = "อืม.... ฉันคำนวณปริมาณระเบิดของโดรนผิดเลยทำให้เสาถล่ม..."
2102-98 = "โธ่เอ๊ย...!! รุ่นพี่ ช่วยอยู่นิ่งๆ หน่อยได้ไหม แบบนี้อายาเนะจังจะโกรธเอานะ!"
2102-99 = "......"
2102-100 = "ดะ... เดี๋ยวก่อนสิ! อายาเนะ! เดี๋ยวก่อน รอฉันด้วย! ฉันเข้าใจที่เธอโกรธนะ...#nนะ...แน่นอนว่าเธอสมควรโกรธนะแต่ว่า...!"
2102-101 = "มันมีสาเหตุสำหรับเรื่องนี้นะ...! มะ... ไม่สิ มันอาจจะเป็นเหตุผลที่ฟังไม่ขึ้นก็ได้ หรือไม่ก็คำพูดแก้ตัว...!"
2102-102 = "คือว่าเรื่องมัน......!"
2102-104 = "(พรึ่บ!)"
2102-105 = "......"
2102-106 = "....!!\n\n"
2102-107 = ".....!"
2102-108 = "....!"
2102-109 = "\n......"
2102-111 = "......"
2102-112 = "ตั้งแต่นี้ไป..."
2102-113 = "คนที่ฉันเรียกชื่อ..."
2102-114 = "ช่วยอยู่ในห้องกันด้วยนะคะ..."
2102-115 = "เฮือก...!!"
2102-116 = "....."
2102-117 = "เซริกะจัง..."
2102-118 = "ฮะ... เฮือก!? อะ... เอ๋!? ฉันเหรอ?"
2102-119 = "....."
2102-122 = "คนอื่นนอกจากเซริกะจังแล้ว... ช่วยออกไปข้างนอกด้วยนะคะ"
2102-123 = "เหลือเพียงผู้เรียกขาน"

[translation]
2102-1 = "Stay Behind If Your Name Is Called Part 2"
2102-2 = "Ugh..."
2102-3 = "My head's still ringing... At least the fever's mostly gone..."
2102-5 = "Wow! Look at the time...! "
2102-6 = "Ah..."
2102-7 = "I told them I'd be resting at my place today... Everyone else is supposed to be at the gym for cleaning..."
2102-8 = "..."
2102-9 = "They should be fine on their own, right? Serika and the rest...?"
2102-10 = "I'm the one who accepted that part-time job, but I couldn't make it...even though everyone told me that they don't mind..."
2102-11 = "Ugh..."
2102-12 = "This is because they speak nonsense constantly."
2102-13 = "They're always telling me their ridiculous plans, like kidnapping students from other schools!"
2102-14 = "So, that's why!"
2102-15 = "..."
2102-16 = "*sigh*"
2102-17 = "I should bring some snacks to our club room later..."
2102-18 = "I think they deserve a warm welcome when they get back. They're working hard in my stead today, after all..."
2102-19 = "*buzzes*"
2102-20 = "Huh? MomoTalk?"
2102-21 = "Oh, it's from...Hoshino? "
2102-22 = "..."
2102-23 = "Hmm?"
2102-24 = "\"Yoohoo! Ayane! We've arrived at our part-time gig, but we have a bit of a problem.\""
2102-25 = "\"The gym is in even worse shape than I imagined, but I'm not sure we're in the right place...\""
2102-26 = "\"We swept the entrance of the gym clean, but there's a lot more trash inside!\""
2102-28 = "\"This seems like too much manual labor for an old lady like me...\""
2102-29 = "\"Can we just not do it and say we did? Do we really have to do this whole job?\""
2102-30 = "..."
2102-31 = "*twitching* ...Ugh!"
2102-33 = "Inside the Illegally Remodeled Gym"
2102-34 = "*boom*"
2102-35 = "*boooooom*"
2102-37 = "There's more coming out from inside! There's a ton!"
2102-38 = "Not a problem. Leave it to me."
2102-39 = "Did Ayane reply? What did she say? Are we actually supposed to be doing this?"
2102-40 = "Hmm. Well, let me see what Ayane wrote."
2102-42 = "\"Oh, please. You can handle simple stuff like this by yourself.\""
2102-43 = "\"Part-time jobs are supposed to be tiring and difficult.\""
2102-44 = "\"So just do it.\""
2102-45 = "That's what it says. Is she mad? She sounds mad."
2102-46 = "If we give up here, we'll be letting Ayane down. There's no turning back! "
2102-47 = "Cheer up, everyone! For Ayane!"
2102-48 = "You're right. We have to properly complete the task Ayane gave us."
2102-49 = "Uh, yeah! I knew that already, duh! I was just checking! Now let's go!"
2102-50 = "Could this be the power of friendship? Ah, how I envy the young."
2102-51 = "Remember, you're not that much older than me!"
2102-53 = "...ugh!"
2102-54 = "All done!"
2102-55 = "Good, this is perfect. That should be more than enough snacks and drinks."
2102-56 = "This will be a great way to welcome the crew back after a hard day's work."
2102-57 = "Hmm... They're taking longer than I expected, though. The job shouldn't take this long..."
2102-58 = "I wonder if there was a lot to clean up. I think I should've gone with them..."
2102-59 = "I feel like I let them down..."
2102-60 = "*ring* *ring*"
2102-61 = "A phone call?"
2102-63 = "Abydos Foreclosure Task Force. How can I help you?"
2102-64 = "..."
2102-65 = "Pardon?"
2102-66 = "The team that's supposed to clean up the gym...hasn't arrived yet?!"
2102-67 = "No way. Hoshino just contacted me saying..."
2102-68 = "Wha...?! Cancellation charge?! Please, just hold on a second. I'm sure there's been some kind of misunderstanding!"
2102-69 = "*click* Eh? Hello? ...Hello?!"
2102-70 = "..."
2102-71 = "..."
2102-72 = "Wha?"
2102-73 = "*ring* *ring*"
2102-75 = "...Hello?"
2102-76 = "Is this the Abydos Foreclosure Task Force?"
2102-77 = "Wh-Who is this? "
2102-78 = "We confirmed that your academy's students got into a scuffle with our town's extremist sports organization, the Morning Radio Calisthenics Advocate Group."
2102-79 = "..."
2102-80 = "Come again?"
2102-81 = "During the skirmish, an Abydos student's drone bombarded and demolished the entire gym, leaving the entire facility, both inside and out, unusable..."
2102-82 = "Surely this is a fault of our town's extremist organization to some degree, but the damages are through the roof!"
2102-83 = "Which, unfortunately...leaves us no choice but to make a claim to your academy for a proportionate amount of the damage."
2102-84 = "... "
2102-85 = "What?!"
2102-86 = "*thud* *door opening* *slam*"
2102-87 = "Hold on, you can't just barge in like that."
2102-88 = "I'm not ready!"
2102-89 = "Sometimes, it's better to go with the flow, Serika."
2102-90 = "Hey, Ayane! We're back!"
2102-91 = "We're back!"
2102-92 = "So...turns out we were at the wrong gym! Isn't that funny?"
2102-93 = "..."
2102-94 = "Oh. Are you already on the phone?"
2102-95 = "Uh-oh. Looks like we're in trouble. I'll have to explain things myself if I want to come up with an excuse. Maybe I'm too late..."
2102-96 = "Oh no... We're in even more trouble now than the time we fought the Radio Calisthenics Group, aren't we?"
2102-97 = "I might have miscalculated the amount of explosives I had on the drone, which ended up destroying a pillar or two..."
2102-98 = "Please just stay still and stop getting on Ayane's nerves!"
2102-99 = "..."
2102-100 = "Wait, Ayane! Wait just a second! I understand why you might be mad... I mean, you're totally right to be mad, but...!"
2102-101 = "There's a good reason for this...! Well, it's more of an excuse than a reason, but hear me out!"
2102-102 = "So, the thing is..."
2102-104 = "*click*"
2102-105 = "..."
2102-106 = "...!"
2102-107 = "...!"
2102-108 = "...!"
2102-109 = "..."
2102-111 = "..."
2102-112 = "Starting now..."
2102-113 = "...if I call your name... "
2102-114 = "...stay in the room... "
2102-115 = "*gulp*"
2102-116 = "..."
2102-117 = "...Serika."
2102-118 = "...Wha?! Uh, yes?! Me?"
2102-119 = "..."
2102-122 = "...Everyone except Serika, please leave."
2102-123 = "Stay Behind If Your Name Is Called"

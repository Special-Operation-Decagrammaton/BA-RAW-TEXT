[translation]
1600203-1 = "ถ้าเรื่องนั้น คุณมาถูกที่แล้วล่ะค่ะ!"
1600203-2 = "......"
1600203-4 = "สะ...สวัสดีค่ะ คุณครู! ขอให้เป็นวันที่ดีนะคะ"
1600203-6 = "...แต่นี่มันเย็นแล้วนี่คะ แหะๆ...."
1600203-7 = "[s1] \"ดูไม่ค่อยมีแรงเลยนะ\"\n[s2] \"...เกิดอะไรขึ้นเหรอ?\""
1600203-8 = "คะ? ปะ...เปล่าค่ะ ไม่มีอะไรหรอกค่ะ ไม่มีเลยค่ะ"
1600203-9 = "คะ? ปะ...เปล่าค่ะ ไม่มีอะไรหรอกค่ะ ไม่มีเลยค่ะ"
1600203-10 = "แค่มีคนที่ฉันอธิบายให้ฟังแล้ววิ่งหนีมากกว่าปกติ..."
1600203-11 = "เป็นอย่างนี้ตลอดแหละค่ะ ฮ่าฮ่าฮ่า..."
1600203-12 = "แต่พอมาลองคิดดูแล้ว สัปดาห์นี้ฉันยังไม่เคยได้อธิบายจนจบสักครั้งเลยค่ะ"
1600203-13 = "ฉันเอาแต่คิดว่าไม่มีใครรับฟังฉันจนจบ บางทีมันอาจจะไม่ได้เป็นอย่างนั้น..."
1600203-14 = "ที่จริงทุกคนคงอยากได้ยินฉันอธิบายสินะคะ ฉันอยากจะคิดว่าอย่างนั้น"
1600203-15 = "ไม่ว่าฉันจะค้นหาข้อมูลและเสาะหาความรู้มากแค่ไหน..."
1600203-16 = "พอเอาเข้าจริงๆ ไม่มีใครที่อยากจะรู้เรื่องนั้นเลย ทำให้ฉันหมดกำลังใจค่ะ"
1600203-17 = "ที่จริงฉันไม่ได้พูดไปเรื่อย เพราะอยากจะแกล้งทำเป็นรู้หรอกนะคะ"
1600203-18 = "ฉันแค่...อยากเป็นเหมือนคุณครู...สักนิด ฉันแค่อยากจะเป็นแบบนั้นเท่านั้นเอง"
1600203-19 = "......"
1600203-20 = "ฉันอาจจะพูดเยอะไปจริงๆ ก็ได้นะคะ ฮ่าฮ่า..."
1600203-21 = "ปกติทุกคนไม่ค่อยสนใจกันเท่าไหร่! ฉันเลยอาจจะมีนิสัยแบบนี้ค่ะ..."
1600203-22 = "[s] \"...\""
1600203-24 = "[s] \"...ทำไมกระป๋องคอร์นบีฟถึงมีรูปทรงแบบนั้น?\""
1600203-25 = "...คะ?"
1600203-26 = "กระป๋องคอร์นบีฟเหรอคะ? ทำไมจู่ๆ ก็ถามถึงกระป๋องคอร์นบีฟ..."
1600203-27 = "[s3] \"ครั้งก่อนครูยุ่งเลยยังไม่ได้ฟัง\"\n[s4] \"ครูยังติดใจอยากรู้มาตั้งแต่ตอนนั้น\""
1600203-28 = "ครั้งก่อน...? ไม่ได้ฟัง..."
1600203-29 = "เลยอยากรู้เรื่องกระป๋อง...? มาตั้งแต่ตอนนั้น?"
1600203-30 = "........"
1600203-31 = ".......!!"
1600203-32 = "ระ... เรื่องนั้น...! อ่า~ ยังอยากรู้อยู่อีกเหรอคะ!"
1600203-33 = "ฮ่าฮ่าฮ่า! ถ้าเรื่องนั้นก็มาถูกที่แล้วล่ะค่ะ! เรื่องนี้คือว่า...!"
1600203-34 = "เดิมทีพวกเขาเอาอาหารใส่ลงขวดแชมเปญและปิดจุกก็อกไว้เพื่อไม่ให้อาหารเสีย#nแต่เมื่อขวดร้อนขึ้นเลยหดตัวจนแตกออก แต่ปัญหาคือ..."
1600203-38 = "(ทันใดนั้นสายตาของโคโทริก็กลับมามีประกายอีกครั้ง และหลังจากนั้นเกือบหนึ่งชั่วโมง#nเธอก็พูดโดยไม่หยุดพัก)"
1600203-39 = "(ยิ่งได้พูดถึงข้อเท็จจริงใหม่ๆ ความมีชีวิตชีวาของโคโทริยิ่งกลับมา)"
1600203-41 = "...ดังนั้นโดยพื้นฐานแล้ว กระป๋องคอร์นบีฟจึงต่างจากกระป๋องอื่นๆ โดยทำเป็นรูปทรงคางหมู#nและที่เปิดอยู่ด้านล่างแทนที่จะเป็นด้านบนค่ะ! สาเหตุที่ตอนแรกเป็นแบบนั้นคือ..."
1600203-42 = "...คือ..."
1600203-43 = "......."
1600203-44 = "[s] \"......โคโทริ?\""
1600203-45 = "......."
1600203-46 = "คุณครูคะ หรือว่า..."
1600203-47 = "ไม่มีอะไรค่ะ! ไม่มีอะไรจริงๆ ค่ะ...! คือว่า...!"
1600203-48 = "คือว่า... การที่คุณครูถามด้วยความตั้งใจ... ทำเพื่อฉันอย่างตั้งใจ...!"
1600203-49 = "......"
1600203-50 = "......ฮิฮิ"
1600203-51 = "......ขอบคุณนะคะ"
1600203-53 = "(หลังจากหัวเราะอยู่พักหนึ่ง โคโทริก็อธิบายด้วยความกระตือรือร้นตามปกติ)"
1600203-54 = "(หลังจากนั้นคุณครูก็อยู่ฟังเรื่องที่โคโทริอธิบายจนเธอพอใจ และกลับไปที่ห้อง)"

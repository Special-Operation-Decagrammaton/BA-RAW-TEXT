[translation]
1600203-1 = "問我就對了！"
1600203-2 = "……"
1600203-4 = "啊，老師早安！今天天氣也很好呢！"
1600203-6 = "……啊，不過已經晚上了呢，啊哈哈……"
1600203-7 = "[s1]「……你看起來沒什麼精神。」\n[s2]「出了什麼事嗎？」"
1600203-8 = "咦，喔，沒有，沒事。沒什麼大事……"
1600203-9 = "咦，喔，沒有，沒事。沒什麼大事……"
1600203-10 = "只是和平常一樣，我才正要幫人講解，對方就逃走了……"
1600203-11 = "到這部分都還是老樣子。啊哈哈……"
1600203-12 = "只是我突然想到，這週都還沒有好好講解到最後呢。"
1600203-13 = "雖然平常也很少遇到願意聽我說到最後的人，但會不會……"
1600203-14 = "其實大家打從一開始就不想聽我講解呢？"
1600203-15 = "我不禁這麼覺得。不管我做再多調查，學習再多知識……"
1600203-16 = "一想到這些或許其實都沒有意義，就讓我有點消沉……"
1600203-17 = "我也不是因為想惹誰不高興，或是想炫耀自己的知識才說明事情的……"
1600203-18 = "我只是，想和老師一樣……希望自己能變得和老師一樣。"
1600203-19 = "……"
1600203-20 = "也許我真的，太愛講話了吧。啊哈哈……"
1600203-21 = "這樣的話，我得盡量克制才行……"
1600203-22 = "[s]「……」"
1600203-24 = "[s]「醃牛肉罐頭為什麼長那樣呢？」"
1600203-25 = "……咦？"
1600203-26 = "醃牛肉罐頭？為什麼突然提到醃牛肉罐頭……？"
1600203-27 = "[s3]「因為上次太忙了沒能聽完。」\n[s4]「我從以前就一直很好奇呢。」"
1600203-28 = "上次……？沒能聽到最後……"
1600203-29 = "一直都好奇……？但為什麼是罐頭……"
1600203-30 = "……啊。"
1600203-31 = "……！！"
1600203-32 = "原，原來如此！老師很在意啊！原來是這樣啊～！"
1600203-33 = "啊哈哈！那這問題問我就問對人了！那是因為啊……！"
1600203-34 = "以前為了防止食物腐敗，會把食物放進香檳瓶中，然後用軟木塞堵住開口。但是這種方法，一旦瓶子熱漲冷縮就會出現問題……"
1600203-38 = "（亞都梨的眼神突然充滿活力，之後也毫不停歇說了將近一小時）"
1600203-39 = "（隨著時間慢慢過去，亞都梨也提到了許多有趣的題外話，也在過程中漸漸恢復了活力）"
1600203-41 = "……所以，醃牛肉罐頭和其他罐頭長得不太一樣，罐頭呈梯形。而拉環也不是在上方，而是設計在下方！一開始會這樣設計的原因……"
1600203-42 = "……原因……"
1600203-43 = "……"
1600203-44 = "[s]「……亞都梨？」"
1600203-45 = "……"
1600203-46 = "老師，那個……難道你……"
1600203-47 = "不，沒有，沒事！雖然也不是真的沒事……！總之就是……！"
1600203-48 = "我，我只是想到，老師該不會是故意找問題問我……難道只是顧慮我的感受……！"
1600203-49 = "……"
1600203-50 = "……欸嘿嘿，"
1600203-51 = "……謝謝老師。"
1600203-53 = "（亞都梨甜甜的笑了一會之後，又回到平時的狀態，繼續講解下去）"
1600203-54 = "（之後，一直陪亞都梨聊到她滿足為止，我才回到夏萊）"

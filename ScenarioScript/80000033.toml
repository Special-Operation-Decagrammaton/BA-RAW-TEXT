[translation]
80000033-1 = "#title;작지만 달콤한 한 발"
80000033-2 = "#na;(발렌타인 데이 당일, 하스미로부터 잠시 정의실현부를 방문해달라는 연락이 왔다.)"
80000033-3 = "#st;[0,0];instant;1;"
80000033-4 = "#clearST"
80000033-5 = "#wait;1500"
80000033-6 = "#na;하스미;네, 열려 있습니다."
80000033-7 = "[s] \"그럼 실례할게.\""
80000033-8 = "#st;[0,0];instant;1;"
80000033-9 = "#clearST"
80000033-10 = "#wait;1000"
80000033-11 = "#all;hide"
80000033-12 = "#place;정의실현부 부실"
80000033-13 = "3;하스미;01;아, 선생님. 약속한 시간보다 조금 일찍 와주셨군요.\n#3;em;[반응]\n#3;a"
80000033-14 = "[s] \"응, 급한 용무가 있다길래.\""
80000033-15 = "3;하스미;02;아……. 확실히, 연락을 드릴 때는 그렇게 전달을 드렸던가요.\n#3;em;[...]"
80000033-16 = "[s] \"하스미가 그렇게 말할 정도라니, 무슨 일이야?\""
80000033-17 = "3;하스미;99;으음, 그게……. 시급한 문제이냐 아니냐를 따지자면, 다소 다급한 마음에 저도 모르게 그런 과장된 말씀을 전해 드리고야 말았다고 할지.\n#3;greeting"
80000033-18 = "3;하스미;04;……아니, 이건 관점에 따라서는 충분히 심각하고 중대한 일임이 분명하다고 여기고 있어, 또 무작정 과장된 이야기는 아니긴 합니다마는.\n#3;em;[속상함]\n#3;stiff"
80000033-19 = "[s] \"……?\""
80000033-20 = "3;하스미;05;제가 선생님을 이 자리에 모신 건, 그…….\n#3;em;[...]"
80000033-21 = "3;하스미;07;이것 때문입니다."
80000033-22 = "#st;[0,0];instant;1;"
80000033-23 = "#clearST"
80000033-24 = "3;하스미;07\n#3;greeting\n#wait;2000"
80000033-25 = "[ns1] \"이건……. 하나, 둘, 셋……. 초콜릿이 엄청나게 많네.\"\n[ns2] \"초콜릿이 산더미처럼……. 다 어디서 난 거야?\""
80000033-26 = "3;하스미;01;이건 전부 저희 정의실현부로 트리니티의 일반 학생분들이 보내준 초콜릿입니다.\n#3;em;[반응]"
80000033-27 = "3;하스미;01;이건 전부 저희 정의실현부로 트리니티의 일반 학생분들이 보내준 초콜릿입니다.\n#3;em;[반응]"
80000033-28 = "[s] \"이렇게나 많이?\""
80000033-29 = "3;하스미;99;그게……. 제 입으로 말하기엔 조금 부끄러운 이야기이지만.\n#3;em;[...]"
80000033-30 = "3;하스미;01;평소 정의실현부의 활약으로 도움을 받았다며, 일반 학생들로부터 감사의 선물이 종종 들어올 때가 있는데."
80000033-31 = "3;하스미;05;아마 이번 초콜릿도 그것의 일환으로, 여기 있는 초콜릿들은 일단 제 이름 앞으로 도착한 것들만 한데 모아둔 것입니다만…….\n#3;greeting"
80000033-32 = "[s] \"굉장하잖아!\""
80000033-33 = "3;하스미;04;그, 그런 걸까요?\n#3;em;[땀]\n#3;stiff"
80000033-34 = "3;하스미;01;하긴 초콜릿뿐만 아니라 같이 보내준 편지에도 분명, 존경한다거나, 고맙다거나, 감사하다는 인사의 문구가 쓰여 있었지요.\n#3;greeting"
80000033-35 = "3;하스미;02;후훗. 저희야 어디까지나 동아리 활동의 일환으로, 딱히 보답을 바라고 활동한 건 아니지만."
80000033-36 = "3;하스미;03;그래도 이런 걸 받는 건, 제법 기쁜 법이로군요.\n#3;em;[///]"
80000033-37 = "[s] \"그래서 급한 용무라는 건?\""
80000033-38 = "3;하스미;05;아, 그게. 다름이 아니라. 이렇게 초콜릿을 보내준 감사와 애정에는 저 역시 감사하다고 생각하고 있지만.\n#3;em;[반응]"
80000033-39 = "3;하스미;04;아무래도 그 양이…….\n#3;stiff"
80000033-40 = "3;하스미;99;저 혼자 처리하는 건 좀 무리가 있을 듯하달까. 건강의 문제가 염려된다고 할까. 카, 칼로리가 신경 쓰인…….\n#3;em;[속상함]"
80000033-41 = "3;하스미;06;하, 하여간! 그래서 혹시 괜찮으시다면 선생님께서도 같이 드셔 주셨으면 하여…….\n#3;hophop"
80000033-42 = "[s] \"아. 그거라면 곤란해.\""
80000033-43 = "3;하스미;01;……네?\n#3;em;[?!]\n#3;stiff"
80000033-44 = "#st;[0,0];instant;1;"
80000033-45 = "#clearST"
80000033-46 = "3;하스미;99\n#3;em;…\n#wait;2500"
80000033-47 = "3;하스미;04;아……, 역시 너무 염치가 없는 부탁이었지요. 제 편의를 위해, 이런 가당치도 않은 요구를 하려 들다니, 저도 참……."
80000033-48 = "[s] \"아니, 그런 의미가 아니야.\""
80000033-49 = "3;하스미;01;네? 그럼…….\n#3;em;[?]"
80000033-50 = "[s3] \"이것들은 학생들이 하스미를 위해 보내준 거잖아?\"\n[s4] \"그런 걸 남이 먹어선 안 된다고 생각해.\""
80000033-51 = "3;하스미;99;아, 과연……. 그렇군요.\n#3;em;[...]"
80000033-52 = "3;하스미;99;아, 과연……. 그렇군요.\n#3;em;[...]"
80000033-53 = "3;하스미;02;이 초콜릿들은 모두가 저를 위해 보내준 것들. 그것에 응하지 않는다면, 애초에 받아서도 안 되는 거였겠지요."
80000033-54 = "3;하스미;01;덕분에 아둔한 제 눈에서 비늘이 벗겨졌습니다.\n#3;greeting"
80000033-55 = "3;하스미;06;선생님의 말씀대로, 이 초콜릿의 산, 칼로리의 산은 온전히 저 혼자 감당해야만 하는 것이겠지요!\n#3;em;[!]\n#3;hophop\n#fontsize;80"
80000033-56 = "3;하스미;06;괜찮은 거겠죠? 다이어트 5일 차지만……!\n#3;closeup\n#fontsize;100"
80000033-57 = "[s] \"응? 아니, 거기까지 말하진 않았……?!\""
80000033-58 = "3;하스미;03;후후후, 선생님 덕분에 망설임은 사라졌습니다.\n#3;em;[반짝]"
80000033-59 = "3;하스미;05;아, 하지만 그 대신……."
80000033-60 = "3;하스미;04;저, 이것을…….\n#3;em;[///]"
80000033-61 = "#st;[0,0];instant;1;"
80000033-62 = "#clearST"
80000033-63 = "3;하스미;04\n#3;d\n#wait;1000"
80000033-64 = "#wait;2500"
80000033-65 = "[ns] \"응, 이건……?\""
80000033-66 = "3;하스미;01;이건 제가 당신께 보내는 존경을 담아, 드리는 초콜릿입니다.\n#3;a"
80000033-67 = "3;하스미;99;그……. 작은 만큼 칼로리 부담이 적고, 그리 강렬한 것은 되지 않지만. 그래도 특별한, 저만의 한 발.\n#3;em;[...]"
80000033-68 = "3;하스미;07;받아주시겠나요?\n#3;greeting"
80000033-69 = "[s] \"고마워, 잘 먹을게.\""
80000033-70 = "3;하스미;03;후훗. 그럼 같이 먹도록 하지요.\n#3;em;[하트]"
80000033-71 = "#all;hide"
80000033-72 = "#wait;1000"
80000033-73 = "#wait;2500"
80000033-74 = "#wait;1000"
80000033-75 = "#na;(그렇게 하스미와 함께 잠시나마 티타임을 가졌다.)"

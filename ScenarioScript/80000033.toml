[translation]
80000033-1 = "สิ่งเล็กๆ แต่หอมหวาน"
80000033-2 = "(วันวาเลนไทน์ คุณครูได้ข้อความจากฮาสุมิที่ขอให้แวะไปที่ชมรมทวงความยุติธรรม)"
80000033-6 = "ค่ะ ประตูไม่ได้ล็อกค่ะ"
80000033-7 = "[s] \"งั้นขอรบกวนหน่อยนะ\""
80000033-12 = "ห้องชมรมทวงความยุติธรรม"
80000033-13 = "อ๊ะ คุณครู มาถึงก่อนเวลานัดอีกนะคะ"
80000033-14 = "[s] \"อื้อ เห็นบอกว่ามีเรื่องด่วนนี่นา\""
80000033-15 = "อา... ตอนส่งข้อความ ฉันเขียนแบบนั้นไปจริงๆ ด้วยค่ะ"
80000033-16 = "[s] \"หายากนะที่ฮาสุมิจะพูดแบบนั้นน่ะ มีเรื่องอะไรเหรอ?\""
80000033-17 = "อืม... คือว่า... จะเรียกว่าเป็นเรื่องด่วนก็ไม่ด่วนซะทีเดียว... แต่ฉันใจร้อนไปหน่อยเลยส่งข้อความ#nไปหาคุณครูแบบนั้นค่ะ"
80000033-18 = "ไม่สิ ถ้าจากมุมมองของฉันก็เป็นเรื่องที่รุนแรงพอสมควรเลยทีเดียวค่ะ"
80000033-19 = "[s] \"....?\""
80000033-20 = "ที่ฉันขอให้คุณครูมาที่นี่ ก็เพราะ..."
80000033-21 = "เพราะเรื่องนี้ค่ะ คือว่า..."
80000033-25 = "[ns1] \"นี่มัน... หนึ่ง สอง สาม... ช็อกโกแลตเยอะแยะเลยนะ\"\n[ns2] \"ภูเขาช็อกโกแลต... เธอไปเอามาจากไหนกันเนี่ย?\""
80000033-26 = "นี่เป็นช็อกโกแลตที่นักเรียนของโรงเรียนเราส่งมาที่ชมรมทวงความยุติธรรมค่ะ"
80000033-27 = "นี่เป็นช็อกโกแลตที่นักเรียนของโรงเรียนเราส่งมาที่ชมรมทวงความยุติธรรมค่ะ"
80000033-28 = "[s] \"เยอะขนาดนี้เลยเหรอ?\""
80000033-29 = "คือว่า... ให้ฉันพูดเองมันก็อาจจะน่าอายไปหน่อย..."
80000033-30 = "ปกติแล้วเวลาที่ได้รับความช่วยเหลือจากชมรมทวงความยุติธรรม พวกนักเรียนก็จะส่งของขวัญ#nแทนคำขอบคุณมาให้น่ะค่ะ"
80000033-31 = "และก็มักจะส่งมาในวันวาเลนไทน์ซะส่วนใหญ่... ช็อกโกแลตที่อยู่ตรงนี้ก็เป็นแค่ส่วนที่มีชื่อ#nของฉันเขียนอยู่..."
80000033-32 = "[s] \"สุดยอดเลยนะ!\""
80000033-33 = "ยะ...อย่างนั้นเหรอคะ?"
80000033-34 = "นอกจากช็อกโกแลตแล้วก็ยังมีจดหมายเขียนคำขอบคุณหรือแสดงความนับถือส่งมาด้วยค่ะ"
80000033-35 = "ฮุฮุ พวกเราก็แค่ทำหน้าที่ของเราเท่านั้น ไม่ได้หวังอะไรตอบแทนเป็นเป็นพิเศษเลยค่ะ"
80000033-36 = "แต่พอได้รับของขวัญพวกนี้ก็รู้สึกดีใจมากๆ อยู่เหมือนกันค่ะ"
80000033-37 = "[s] \"ถ้างั้นเรื่องด่วนคืออะไรล่ะ?\""
80000033-38 = "ค่ะ นั่นสินะคะ ฉันเองก็รู้สึกขอบคุณสำหรับความรักและความนับถือที่ส่งมาพร้อมช็อกโกแลตพวกนี้"
80000033-39 = "แต่ว่าจำนวนของมัน..."
80000033-40 = "ฉันคนเดียวคงจะกินไม่หมดหรอกค่ะ และอาจทำให้เกิดปัญหาสุขภาพขึ้นด้วยค่ะ คะ...คือว่า#nจำนวนแคลอรี่มัน..."
80000033-41 = "ยะ...ยังไงก็เถอะค่ะ จะให้ทิ้งก็คงไม่ได้ เพราะงั้นเลยอยากให้คุณครูมาช่วยทาน..."
80000033-42 = "[s] \"แบบนั้นคงจะไม่ได้นะ\""
80000033-43 = "คะ...?"
80000033-47 = "คะ...คิดแล้วเชียวว่าเป็นคำขอร้องที่ไม่สมเหตุสมผลจริงๆ สินะคะ ฉันดันขอให้คุณครูช่วยเรื่อง#nอะไรแบบนี้ซะได้..."
80000033-48 = "[s] \"ไม่ใช่นะ ครูไม่ได้หมายความว่าอย่างนั้น\""
80000033-49 = "คะ? แล้ว...?"
80000033-50 = "[s3] \"ก็มันเป็นของที่ทุกคนส่งมาให้ฮาสุมินี่นา?\"\n[s4] \"ทุกคนส่งมาให้ฮาสุมิ ครูคงรับไว้ไม่ได้หรอก\""
80000033-51 = "อ่า แบบนี้นี่เองสินะคะ..."
80000033-52 = "อ่า แบบนี้นี่เองสินะคะ..."
80000033-53 = "ทุกคนส่งช็อกโกแลตพวกนี้มาให้ฉัน... ถ้าไม่คิดตอบรับ ก็ไม่ควรรับมาตั้งแต่แรกสินะคะ"
80000033-54 = "เพราะคุณครู ฉันถึงได้เข้าใจแจ่มแจ้งแล้วค่ะ"
80000033-55 = "ฉันจะทำตามที่คุณครูบอกค่ะ ภูเขาช็อกโกแลตพวกนี้ กองแคลอรี่พวกนี้... ฉันจะพิชิตมันด้วยตัวเองค่ะ!"
80000033-56 = "แบบนี้ใช่มั้ยคะ? ถึงฉันจะไดเดตมาตั้ง 5 วันแล้วก็เถอะค่ะ...!"
80000033-57 = "[s] \"หืม? ครูไม่ได้พูดแบบนั้นสักหน่อย...?!\""
80000033-58 = "ฮุฮุฮุ ต้องขอบคุณคุณครู ตอนนี้ฉันหายลังเลแล้วละค่ะ"
80000033-59 = "อ่า แต่ว่า..."
80000033-60 = "เพื่อเป็นการตอบแทนคุณครู..."
80000033-65 = "[ns] \"หืม อะไรเหรอ?\""
80000033-66 = "นี่เป็นช็อกโกแลตแทนความเคารพของฉันที่มีต่อคุณครูค่ะ"
80000033-67 = "คือ... ช็อกโกแลตขนาดเล็ก มันเลยมีปริมาณแคลอรี่น้อยด้วยค่ะ ตะ...แต่ว่าในนั้นมีความรู้สึกของฉัน#nอัดแน่นอยู่เต็มเปี่ยมเลยนะคะ"
80000033-68 = "ช่วยรับไว้ได้หรือเปล่าคะ?"
80000033-69 = "[s] \"ขอบคุณนะ ครูจะกินให้อร่อยเลย\""
80000033-70 = "ฮุฮุ ถ้างั้นมาทานช็อกโกแลตพร้อมกันเลยมั้ยคะ?"
80000033-75 = "(หลังจากนั้นคุณครูก็ได้ใช้เวลานั่งดื่มชาอย่างสนุกสนานกับฮาสุมิ)"

[translation]
80000033-1 = "微小而甜蜜的一步"
80000033-2 = "（情人節當天，收到了蓮實「希望老師能到實現正義部一趟」的聯絡）"
80000033-6 = "請進，門沒有鎖。"
80000033-7 = "[s]「打擾了……」"
80000033-12 = "實現正義部．部室"
80000033-13 = "啊，是老師啊。來的真早呢，非常謝謝您。"
80000033-14 = "[s]「嗯，因為聽說有急事。」"
80000033-15 = "啊，我在訊息裡確實是那麼說的呢……"
80000033-16 = "[s]「蓮實這麼著急還真少見。」"
80000033-17 = "那是因為……說是緊急的問題其實也太不算……"
80000033-18 = "……不，依據觀點的不同，這也可能是十分重大的事情……"
80000033-19 = "[s]「……？」"
80000033-20 = "那個，今天之所以請老師過來……"
80000033-21 = "是因為這個。"
80000033-25 = "[ns1]「超多巧克力……」\n[ns2]「這個量是，怎麼回事……？」"
80000033-26 = "是三一的其他學生送給「實現正義部」的巧克力。"
80000033-27 = "是三一的其他學生送給「實現正義部」的巧克力。"
80000033-28 = "[s]「居然這麼多……」"
80000033-29 = "雖然自己這麼說有點難為情……"
80000033-30 = "平時就經常收到因實現正義部的活躍獲得幫助的學生送來的禮物。"
80000033-31 = "在情人節時還會特別頻繁的收到……光是將寫有我名字的部分挑出來就有這麼多。"
80000033-32 = "[s]「真受歡迎啊……！」"
80000033-33 = "有點不好意思呢……"
80000033-34 = "確實，在一同附上的信中也寫著尊敬和感謝的心情……"
80000033-35 = "但這只不過是身為社團一員應該做的事，目的並不是獲得回報。"
80000033-36 = "不過收到這些心意，還是會感到高興呢。"
80000033-37 = "[s]「就是呀。話說回來，你說的急事是……？」"
80000033-38 = "是的，接下來就是正題了。雖然非常感激大家願意送禮物過來……"
80000033-39 = "但是這個量……"
80000033-40 = "我一個人實在難以消化，而且在健康方面，熱量也有點……"
80000033-41 = "總，總之！因為再怎麼說也不能丟掉，可是量實在太多……#n如果可以的話，希望老師能一起享用。"
80000033-42 = "[s]「這可能有點……」"
80000033-43 = "……咦？"
80000033-47 = "啊，不好意思。突然提出這種亂來的請求……"
80000033-48 = "[s]「啊，不。我不是那個意思……」"
80000033-49 = "那麼是……？"
80000033-50 = "[s3]「因為這些是大家要送給蓮實的。」\n[s4]「我覺得不該由我收下。」"
80000033-51 = "原，原來如此……這樣啊。"
80000033-52 = "原，原來如此……這樣啊。"
80000033-53 = "確實，這些都是指名要送給我的……"
80000033-54 = "是呢，或許就像老師說的一樣。"
80000033-55 = "既然如此，這座巧克力山就由我來征服吧！"
80000033-56 = "而且我非常樂意！雖然是節食第五天，但現在不是說這些的時候了……！"
80000033-57 = "[s]（聽蓮實這麼一說突然有點擔心……）"
80000033-58 = "呵呵……託老師的福，我心中的迷惘消失了。"
80000033-59 = "那個……"
80000033-60 = "可能算不上是禮物……"
80000033-65 = "[ns]「這是……？」"
80000033-66 = "裡面包含我對老師尊敬的心情。"
80000033-67 = "雖然份量不大但熱量也不多，裡面蘊含著我的心意。"
80000033-68 = "老師願意收下嗎？"
80000033-69 = "[s]「謝謝，我會好好享用的。」"
80000033-70 = "好的。那麼難得有機會，要不要在這裡一起享用呢？"
80000033-75 = "（就這樣和蓮實一起，度過了短暫而奢侈的下午茶時光）"

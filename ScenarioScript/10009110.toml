10009110-23 = "3;미네;99\n#3;d\n#wait;1000"
10009110-24 = "3;미네;09;세상이 구호를 필요로 하는 한! 구호기사단은 멈추지 않을 것입니다!\n#3;em;[!]\n#3;closeup\n#3;a"

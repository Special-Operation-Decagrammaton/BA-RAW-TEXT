[translation]
10009110-1 = "後日談其四;恩威並濟的救護活動"
10009110-4 = "胸懷榮耀與信念！"
10009110-20 = "呼……請原諒我。#n這也是為了大家──"
10009110-24 = "只要還有需要「救護」的對象，#n我們救護騎士團就絕對不會停下腳步！"
10009110-25 = "喂，等等啊！"
10009110-27 = "因為團長的關係，傷患越來越多了──唔啊！？"
10009110-28 = "你沒事吧？#n我立刻幫你消毒，請暫時別動哦。"
10009110-29 = "傷口裂開的話就不得了了！#n前輩，果然是不是該固定全身比較好？"
10009110-31 = "這就是所謂的糖與鞭子嗎！？#n還是你們只是嘴巴說著「救護」什麼的，其實只是想把人綁起來！？"
10009110-32 = "唔……#n雖然知道救護騎士團的傢伙們不是友方……"
10009110-34 = "謝謝你們！#n多虧救護騎士團的各位，情況似乎能控制住了！"
10009110-35 = "我們只是盡了應盡的義務罷了，請別客氣。"
10009110-36 = "不過，無論我們怎麼四處巡邏都沒完沒了呢……"
10009110-38 = "要是公安局長在的話，應該就不會這樣了……！"
10009110-39 = "不過，公安局似乎無法為了這個事件而出動唷……"
10009110-40 = "我剛才聽說，文件的手續好像出了點問題。"
10009110-41 = "現場報告資料沒有壓印，而申請支援申請書必須提交的證明書也尚未提出……"
10009110-42 = "缺少壓印姑且不論，#n證明書在之前的現場因為一些狀況而遺失了，所以這也沒有辦法……"
10009110-43 = "到現場總是有可能會遺失嘛。"
10009110-44 = "證明書的發行日固定在每週三。#n雖然為了應對緊急狀況，要臨時補發也不是不行……"
10009110-45 = "但就連臨時證明書的發行，也必須從防衛室獲得另外的許可證才行……"
10009110-46 = "──那是，什麼意思呢？"
10009110-47 = "明明騷動實際上已經發生，#n為何要拘泥於那些流於形式的手續呢？"
10009110-48 = "雖然重視規則也很重要，但是這樣一來「救護」之手不就無從施展了嗎！"
10009110-49 = "但，但是……因為是與行政相關的事情，無論如何都需要完成手續……"
10009110-50 = "既然如此，由我直接向女武神警察學園的高層溝通吧！"
10009110-51 = "這，這個，那樣實在有點……！"
10009110-52 = "就是啊。以美禰團長的立場來看……#n外人干涉內政的話，可能會發展成學園間的紛爭的啊……！"
10009110-54 = "……我感到非常難過！#n你們為何無法理解呢。"
10009110-55 = "拘泥於「形式」和「手續」的結果，就是「救護」之手無法觸及需要幫助的人啊！"
10009110-57 = "（之後，偶然到現場巡視的警備局長巧遇了美禰──）"
10009110-58 = "（無視女武神學生們的阻止，美禰向警備局長提出了抗議）"
10009110-59 = "（警備局長「負責部門不同」的回答，反而更加激怒了美禰──）"
10009110-60 = "（進而引發了一場糾紛──但那又是另一個故事了）"
10009110-62 = "呼呣……似乎有些嘈雜呢。"
10009110-63 = "那個警備局長與護衛部隊都不在……也就是說。"
10009110-64 = "唔呵呵……這是個絕佳的機會。"
10009110-71 = "那麼，重新開始吧！"

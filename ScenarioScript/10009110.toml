10009110-26 = "1;세리나;00\n5;하나에;00\n#1;ar\n#5;al\n#1;h\n#wait;200"
10009110-27 = "1;세리나;02\n5;하나에;02\n3;불량배 2;06;저 단장부터 막아야 하는 거 아…… 꾸엑?!\n#3;shake\n#3;em;[?!]\n#1;h\n#5;h"
10009110-28 = "1;세리나;04;괜찮으세요? 금방 소독해 드릴게요. 하지만 섣불리 움직이시면 안 돼요?\n#1;em;[?]"
10009110-29 = "5;하나에;05;상처가 덧나기라도 하면 큰일이니까요! 아, 역시 부목으로 온 몸을 고정해 드리는 게 좋을까요, 선배?\n#5;em;[반응]"
10009110-30 = "#all;hide"
10009110-31 = "3;헬멧단 A;00;병 주고 약 주는 거냐?! 아니면 도와준다고 해 놓고 온몸을 묶어서 구속하려는 거냐?!\n#3;em;[스팀]\n#3;hophop"
10009110-32 = "3;헬멧단 A;00\n5;불량배 1;04;큭…… 따지고 보면 구호기사단 녀석들도 딱히 우리 편은 아니긴 했지……!\n#5;al\n#3;m1\n#3;h"
10009110-33 = "#all;hide"
10009110-34 = "3;발키리 학생 A;02;가, 감사합니다! 구호기사단 여러분! 덕분에 큰 도움이 됐습니다!\n#3;em;[반짝]\n#3;a"
10009110-35 = "3;미네;02;아닙니다. 저희는 단지 저희의 의무를 다할 뿐……\n#3;em;[반응]"
10009110-36 = "3;미네;06;그럼에도 이런 소동이 버젓이 일어나고 있다는 사실에, 통탄을 금할 수 없군요."
10009110-37 = "#all;hide"
10009110-38 = "1;발키리 학생 A;06\n5;발키리 학생 B;09;크, 크윽……! 칸나 국장님만 이 자리에 계셨어도……!\n#5;stiff\n#1;h\n#5;em;[속상함]\n#1;a\n#5;a"
10009110-39 = "1;발키리 학생 A;06;하지만 이번 사건에서 공안국은 출동할 수 없다지……"
10009110-40 = "5;발키리 학생 B;09;서류 절차상에 문제가 있었으니까."
10009110-41 = "1;발키리 학생 A;07;현장 보고 자료에 직인이 찍혀 있지 않았고.\n#1;m2"
10009110-42 = "5;발키리 학생 B;06;지원 요청 서류에 첨부 별지 두 장이 빠져 있었고.\n#5;m4"
10009110-43 = "#1;hide\n2;발키리 학생 A;04;별지를 발급받으려면 인증서를 갱신해야 하는데.\n#2;em;…"
10009110-44 = "#5;hide\n4;발키리 학생 B;06;인증서는 매주 수요일에만 발급하고, 긴급 갱신이라는 수단도 있기는 하지만.\n#4;stiff"
10009110-45 = "2;발키리 학생 A;09;그러려면 방위실장님의 허가서가 추가로 필요하지……\n#2;em;[한숨]"
10009110-46 = "2;발키리 학생 A;09\n4;발키리 학생 B;06\n5;미네;02;잠시만요. 지금의 그 말씀들은 간과할 수 없군요!\n#5;al\n#2;m1\n#4;m2\n#5;em;[반응]"
10009110-47 = "5;미네;05;사람을 구하는 일입니다! 형식이나 절차가 뭐 그리 중요합니까?!"
10009110-48 = "5;미네;05;그런 불필요한 과정이 있기에, 올바른 '구호'가 일어나지 않는 것입니다!\n#5;em;[!]\n#5;jump"
10009110-49 = "4;발키리 학생 B;06\n2;발키리 학생 A;04;하, 하지만 행정적인 일에는, 아무리 그래도 절차가 필요하다고 할까, 피치 못할 사정이 있는 법이라고 할까……!\n#2;m3\n#4;m1\n#2;em;[속상함]"
10009110-50 = "5;미네;09;그렇다면 제가 직접 발키리 경찰학교의 높으신 분들에게 따지도록 하겠습니다!"
10009110-51 = "4;발키리 학생 B;06\n2;발키리 학생 A;07;아, 아뇨! 아무리 그래도 거기까지는……!\n#2;m4\n#4;m2\n#4;h\n#5;dr"
10009110-52 = "4;발키리 학생 B;08;그렇습니다! 미네 단장을 위해서라도 그건…… 자칫하면 학교 간의 내정 간섭이나 분쟁으로까지 이어질 수 있는 문제라고요!\n#4;hophop"
10009110-53 = "#all;hide"
10009110-54 = "3;미네;05;슬픕니다…… 저는 진심으로 슬픕니다! 이렇게 진심이 받아들여지지 않는 상황이라니!\n#3;stiff\n#3;a"
10009110-55 = "3;미네;09;바로 그 절차와 과정의 문제 때문에 '구호'가 이루어지지 않는다고 말씀드리는데, 또다시 절차와 과정의 문제를 이야기하시다니요!\n#3;em;[!]\n#3;jump"
10009110-56 = "#all;hide"
10009110-57 = "#na;(그 이후 우연히 현장 시찰을 나온 경비국장이 미네와 마주치게 되고,)"
10009110-58 = "#na;(경비국장에게 직접 항의를 전달하려는 미네를 발키리 학생들이 어떻게든 말리려 하고,)"
10009110-59 = "#na;(경비국장은 당황하며 부서가 다르다고 발뺌하려다가 오히려 미네의 감정을 더더욱 돋구는 일들이 일어나기도 했지만……)"
10009110-60 = "#na;(그건 또 다른 이야기.)"
10009110-61 = "#all;hide"
10009110-62 = "#na;와카모 마스크;흐음? 밖에서 무언가 소란이 일어나고 있는 모양이군요."
10009110-63 = "#na;와카모 마스크;눈엣가시같던 경비국장과 그 호위 부대도 자리를 비운 것 같고."

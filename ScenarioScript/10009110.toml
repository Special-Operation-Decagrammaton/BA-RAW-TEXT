[translation]
10009110-1 = "Afterword; A Stealthy Shakedown"
10009110-4 = "Go forth with faith and honor in your heart!"
10009110-20 = "This may sting, but please forgive me. It's for the good of all!"
10009110-24 = "As long as the world needs a remedy, the Remedial Knights will never falter!"
10009110-25 = "No, wait! If you wanna help..."
10009110-27 = "You gotta stop that c-cap—gah!"
10009110-28 = "Are you okay? We'll be done with disinfectant soon, but in the meantime, please try not to make any sudden movements."
10009110-29 = "We can't have you making these wounds worse... Actually, maybe I should use that full-body splint after all?"
10009110-31 = "W-what? Are you messing with me? Are you trying to help, or are you looking for an excuse to tie me up?!"
10009110-32 = "Argh! Even the Remedial Knights are against us..."
10009110-34 = "Th-Thank you, Remedial Knights! You've been a huge help!"
10009110-35 = "We were simply doing our duty."
10009110-36 = "Still, I'm appalled that this is happening in the first place."
10009110-38 = "U-Um, ack! If only Director Kanna were here!"
10009110-39 = "But it sounds like the Public Peace Bureau wasn't dispatched..."
10009110-40 = "I heard there was a paperwork issue."
10009110-41 = "The field report wasn't stamped."
10009110-42 = "And the support request was missing two attachments."
10009110-43 = "They needed a certificate renewal to get those attachments, you see."
10009110-44 = "Normally, certificates are issued on Wednesday, though there is an emergency renewal option."
10009110-45 = "But emergency renewal requires an additional letter of authorization from the Chief of Defense..."
10009110-46 = "Wait a minute! Are you telling me it was a bureaucratic issue?"
10009110-47 = "We're supposed to be saving lives! Who cares about forms and procedures?!"
10009110-48 = "It's a wonder your Public Peace Bureau administers any remedies at all, with all that red tape!"
10009110-49 = "O-Oh, uh, but, in some cases, to ensure proper administration, some procedures may be, uh, necessary or unavoidable—"
10009110-50 = "Well then, I'll simply have to speak to the administrators at Valkyrie Police School myself!"
10009110-51 = "Um, but... Isn't that going a bit far?"
10009110-52 = "Yes! Even coming from you, Captain Mine, it could be seen as, um, interference in internal affairs, which could lead to an inter-school dispute—"
10009110-54 = "I'm saddened, and appalled, and even flabbergasted that my heartfelt objections are not being seriously addressed!"
10009110-55 = "I'm telling you that those in need don't receive aid because of problems with your procedures and processes, and what do you do in response? You say I can't express my concerns due to those very same procedures and processes!"
10009110-57 = "Mine saw the Security Director General, who happened to be out on a site inspection."
10009110-58 = "Although Valkyrie students attempted to stop her, Mine delivered her complaint to the Security Director General directly."
10009110-59 = "The embarrassed Security Director General attempted to escape by claiming that a different department is responsible, which only worsened Mine's righteous fury..."
10009110-60 = "But that's a different story."
10009110-62 = "Oh? Is there a commotion going on outside?"
10009110-63 = "That obnoxious Security Director General is gone, along with the cloud of guards that hangs around them like gnats..."
10009110-64 = "Heeheehee... This looks like a perfect opportunity!"
10009110-71 = "Time to get back to work!"

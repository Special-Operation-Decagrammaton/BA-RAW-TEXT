[translation]
10009110-1 = "ย้อนวันวาน;อาชญากรรมที่เงียบเชียบ"
10009110-4 = "ความเชื่อมั่นและความภาคภูมิใจ!"
10009110-20 = "ฮู่ว... ยกโทษให้ฉันด้วยนะคะ ที่ฉันทำไปก็เพื่อช่วยเหลือทุกๆ คนค่ะ!"
10009110-24 = "ตราบใดที่โลกยังต้องการความช่วยเหลือ! ชมรมอัศวินบรรเทาทุกข์ก็จะไม่หยุดอยู่เพียงเท่านี้ค่ะ!"
10009110-25 = "นี่! เดี๋ยวสิ! ถ้าจะช่วยเหลืออะไรละก็..."
10009110-27 = "ช่วยห้ามยัยหัวหน้านั่นก่อน... อะ...เอื้อออ?!"
10009110-28 = "เป็นอะไรรึเปล่าคะ? เดี๋ยวจะรีบล้างแผลให้ค่ะ อย่าเพิ่งลุกไปไหนนะคะ"
10009110-29 = "ถ้าเกิดแผลฉีก อาการแย่ลงกว่าเดิมจะเป็นเรื่องเอานะคะ! อ๊ะ หรือว่าใส่เฝือกดามไว้ทั้งตัวก่อนดีมั้ยคะ#nรุ่นพี่?"
10009110-31 = "นี่ ตบหัวแล้วลูบหลังกันรึไง?! ปากบอกว่าจะช่วย แต่ในใจคิดจะจับมัดแล้วข่มขู่กันรึไง?!"
10009110-32 = "อึก... พอดูดีๆ แล้ว ชมรมอัศวินบรรเทาทุกข์ก็ไม่ได้อยู่ฝ่ายเราเลยนี่...!"
10009110-34 = "ขะ... ขอบคุณมากค่ะ! ชมรมอัศวินบรรเทาทุกข์ทุกคน! ช่วยพวกเราได้เยอะเลยค่ะ!"
10009110-35 = "ไม่เป็นไรเลยค่ะ พวกเราก็แค่ทำหน้าที่ของพวกเราเท่านั้น..."
10009110-36 = "ยิ่งกว่านั้นพอได้รู้ว่ามีคนก่อความวุ่นวายอยู่แบบนี้... ฉันก็รู้สึกเศร้าไม่ไหวเลยค่ะ"
10009110-38 = "อะ...อึก...! ถ้าหัวหน้ากรมฯ คันนะอยู่ที่นี่ละก็...!"
10009110-39 = "แต่ว่าเหตุการณ์คราวนี้ ทางกรมความมั่นคงสาธารณะไม่สามารถออกปฏิบัติการได้..."
10009110-40 = "พอดีว่ามันมีปัญหาเรื่องขั้นตอนการยื่นเอกสารน่ะ"
10009110-41 = "ไม่ได้ประทับตราในเอกสารรายงานสถานการณ์บ้าง"
10009110-42 = "เอกสารอ้างอิงแนบท้ายเอกสารคำร้องขอกำลังสนับสนุนขาดไป 2 แผ่นบ้าง"
10009110-43 = "ถ้าจะไปขอให้ออกใหม่ต้องขอเอกสารรับรองใหม่เลย"
10009110-44 = "ถึงจะมีขั้นตอนการยื่นขอแบบเร่งด่วนก็เถอะ แต่เอกสารรับรองจะยื่นขอได้แค่วันพุธทุกสัปดาห์เท่านั้น"
10009110-45 = "แต่ถ้าจะยื่นขอแบบเร่งด่วนต้องได้รับอนุญาตจากหัวหน้าฝ่ายป้องกัน..."
10009110-46 = "เดี๋ยวก่อนนะคะ ฉันคงมองข้ามสิ่งที่คุณเล่ามาเมื่อสักครู่ไม่ได้หรอกค่ะ!"
10009110-47 = "นี่เป็นเรื่องการช่วยเหลือคนนะคะ! พิธีการหรือขั้นตอนจะมาสำคัญอะไรขนาดนั้นคะ?!"
10009110-48 = "เพราะมีขั้นตอนที่ไม่จำเป็นแบบนั้น \"การช่วยเหลือ\" อย่างถูกวิธีถึงไม่เกิดขึ้นค่ะ!"
10009110-49 = "ตะ... แต่ว่า งานด้านการบริหารน่ะ... ไม่ว่ายังไงก็จำเป็นต้องมีขั้นตอนอยู่แล้ว... หรือจะเรียกว่าเป็นเรื่อง#nที่หลีกเลี่ยงไม่ได้ก็ได้...!"
10009110-50 = "ถ้าอย่างนั้น ฉันจะไปเจรจากับเจ้าหน้าที่ระดับสูงของทางสถาบันฝึกตำรวจวัลคิรี่เองค่ะ!"
10009110-51 = "มะ... ไม่เป็นไรหรอกค่ะ! มะ... ไม่ต้องทำถึงขนาดนั้นก็ได้...!"
10009110-52 = "ใช่แล้วค่ะ! เพื่อหัวหน้ามิเนะเองด้วยค่ะ... คือว่าถ้าทำแบบนั้นอาจทำให้เกิดข้อพิพาทระหว่างโรงเรียน#nได้นะคะ!"
10009110-54 = "น่าเศร้าจริงๆ ค่ะ... ฉันเสียใจจริงๆ ค่ะ! ช่างเป็นสถานการณ์ที่ไม่สามารถยอมรับได้จากใจจริงเลยค่ะ!"
10009110-55 = "ฉันบอกว่าเพราะปัญหาเรื่องขั้นตอนและกระบวนการพวกนั้นเลยทำให้ไม่สามารถดำเนินการ \"ช่วยเหลือ\" ได้ยังไงล่ะคะ ยังจะมาพูดเรื่องปัญหาของขั้นตอนและกระบวนการอีกงั้นเหรอคะ?"
10009110-57 = "(หลังจากนั้นมิเนะก็เผชิญหน้ากับหัวหน้าฝ่ายรักษาความปลอดภัยที่บังเอิญออกมาตรวจตราสถานที่...)"
10009110-58 = "(พวกนักเรียนโรงเรียนวัลคิรี่พยายามทุกวิถีทางเพื่อกันมิเนะไว้ ไม่ให้ไปพูดกับหัวหน้าฝ่ายรักษาความ#nปลอดภัย)"
10009110-59 = "(หัวหน้าฝ่ายรักษาความปลอดภัยตกใจอย่างหนัก และพยายามปฏิเสธว่าเป็นงานของแผนกอื่น แต่นั่นกลับไปกระตุ้นต่อมโมโหของมิเนะมากขึ้นกว่าเดิม...)"
10009110-60 = "(และอีกด้านหนึ่ง...)"
10009110-62 = "หืม? ดูเหมือนข้างนอกจะเกิดเรื่องวุ่นวายอะไรขึ้นนะคะ"
10009110-63 = "หัวหน้าฝ่ายรักษาความปลอดภัยที่เหมือนเสี้ยนหนามตำตากับพวกลิ่วล้อเหมือนจะไม่อยู่แล้ว"
10009110-64 = "ฮุฮุฮุฮุ... ถือเป็นโอกาสดีเลยค่ะ"
10009110-71 = "เอาละ มาลองกันอีกครั้งก็แล้วกันค่ะ!"

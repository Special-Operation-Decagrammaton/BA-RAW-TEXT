80000094-21 = "3;이치카;17;뭔가……. 어……. 그렇게 순순히 받으시는 검까?\n#3;m3"
80000094-22 = "3;이치카;04;아무리 그래도 조금은 더 다양한 반응이 나올 줄 알았는데…….\n#3;em;[땀]"
80000094-23 = "3;이치카;02;……네?"
80000094-24 = "3;이치카;02;그쪽이 더 좋았을 거 같냐고요? 뭐, 그건 또 아니긴 하지만…….\n#3;em;…"
80000094-25 = "3;이치카;04;하하. 대놓고 그렇게 말씀하시니 또 약간 뻘쭘해지는 느낌임다…….\n#3;stiff"
80000094-26 = "3;이치카;03;그렇지만 네, 뭐. 말씀하신 대로네요. 쓸데없는 말 생략하는 이쪽이 좀 더 제 취향이기도 하고~."
80000094-27 = "3;이치카;99;사실 최소한 어디서 구했냐, 어떻게 구했냐 같은 말 정도는 들을 거라고 생각했지만…….\n#3;em;[속상함]"

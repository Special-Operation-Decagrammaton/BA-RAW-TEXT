80000094-37 = "A girl's got to have her secrets, don't you think?"
80000094-38 = "There's no need for a big reveal. You don't need to know how hard I worked on it."
80000094-39 = "I'm a high school girl in the prime of her life. You've got to be very delicate and thoughtful with your words, you know."
80000094-40 = "..."
80000094-41 = "Mm. Yes. I'm sticking to my guns on this. I won't let you \"sorry\" your way out of this one."
80000094-42 = "...Huh?"
80000094-43 = "So what can you do?...Heh."
80000094-44 = "Again with the blunt questions. You're going to get in big trouble if you keep being so boorish with me."
80000094-45 = "Oh? You think you can handle trouble?"
80000094-49 = "But what about big trouble?"
80000094-50 = "Being an adult means taking responsibility for your actions?"
80000094-51 = "...Oho."
80000094-52 = "*sigh*."
80000094-53 = "All right. If you say so..."
80000094-54 = "Whatever happens from here on out is your responsibility... You could call it karma..."

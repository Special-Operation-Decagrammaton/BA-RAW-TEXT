80000094-1 = "#title;한창때의 여자아이"
80000094-2 = "#na;이치카;아~ 선생님~!"
80000094-3 = "#na;이치카;여기에요, 여기! 이쪽이에요~."
80000094-4 = "3;이치카;03;아하하하! 역시~. 이쯤 도착하실 거 같아서, 미리 자리를 펴 놓고 있었죠.\n#3;a\n#3;em;[음표]"
80000094-5 = "3;이치카;02;……네? 무슨 일이냐고요?"
80000094-6 = "3;이치카;01;아이고, 그건 또 무슨 서운한 말씀이십니까~. 오늘 같은 날에 무슨 일이냐니."
80000094-7 = "3;이치카;03;그냥 하신 말씀이겠죠? 당연히 발렌타이 데이~때문이잖아요!\n#3;em;[반짝]"
80000094-8 = "3;이치카;03;선생님께서도 내심 알고 계시면서 온 거 아닌가요? 저한테는 굳이 아닌 척 안 하셔도 되는데."
80000094-9 = "3;이치카;07;그럼 바로 본론으로 넘어가서…….\n#3;em;…"

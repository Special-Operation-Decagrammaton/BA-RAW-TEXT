80000094-35 = "3;이치카;05;선생님……."
80000094-36 = "3;이치카;17;방금 건 좀 그렇네요. 하하."
80000094-37 = "3;이치카;05;아무리 그래도 그것까지 그렇게 직접적으로 물어보시면……. 좀 그렇지 않을까요?"
80000094-38 = "3;이치카;17;바로 그렇게 정답을 말해 버리시면, 열심히 준비해 온 제가 말을 이어갈 게 없잖아요."
80000094-39 = "3;이치카;16;이래 봬도 한창때의 여고생이란 말이죠, 저. 조금은 더 섬세하게 부탁드리고 싶슴다만.\n#3;em;[속상함]"
80000094-40 = "3;이치카;05;흠……."
80000094-41 = "3;이치카;08;음음. 네. 다시 생각해 봐도 그러네요. 역시. 이번만큼은 미안하다고 하셔도 소용없겠네요."

[translation]
80000094-1 = "A Girl in Her Prime"
80000094-2 = "Ah, Sensei!"
80000094-3 = "Over here, over here! Right this way!"
80000094-4 = "Ahahahaha! I expected you to arrive around now, so I went ahead and made a place for us."
80000094-5 = "Hmm? What's going on?"
80000094-6 = "That sounds so sad, Sensei. To think you'd ask that on a day like this!"
80000094-7 = "You must be messing around. Don't you know? It's Valentine's Day!"
80000094-8 = "I'm sure you already knew, so there's no need to play dumb with me."
80000094-9 = "Now then, let's cut to the chase..."
80000094-15 = "...Ta-da!!"
80000094-16 = "[s1] \"Thank you, Ichika.\"\n[s2] \"Wonderful. I'll be sure to enjoy it.\""
80000094-19 = "..."
80000094-20 = "...Eh?"
80000094-21 = "That's... Uh... You're accepting it just like that?"
80000094-22 = "I thought you would have a more dynamic response..."
80000094-23 = "...Huh?"
80000094-24 = "Would I have preferred that? Sure, well, kind of..."
80000094-25 = "Haha. I feel a little embarrassed when you say it out loud..."
80000094-26 = "But yeah... It's like you said. I prefer to be straight to the point."
80000094-27 = "I actually thought you'd have questions about where I got it and how..."
80000094-28 = "...Huh?"

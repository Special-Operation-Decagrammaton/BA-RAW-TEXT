80000094-44 = "3;이치카;05;그걸 또 저한테 대놓고 물어보시는 검까? 자꾸 그러시면 큰일나는데 말이죠.\n#3;em;[속상함]"
80000094-45 = "3;이치카;02;……무슨 큰일이냐고요? 괜찮다고요?"

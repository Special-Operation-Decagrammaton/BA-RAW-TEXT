[translation]
80000094-1 = "正值花樣年華的女孩"
80000094-2 = "啊～老師～！"
80000094-3 = "這裡，我在這裡～！"
80000094-4 = "啊哈哈哈～！#n我覺得你應該差不多會在這時候來，所以已經先把位子鋪好了。"
80000094-5 = "……嗯？你問有什麼事？"
80000094-6 = "哎呀，怎麼說那種令人傷心的話呢～#n今天是什麼日子應該不用我強調了吧？"
80000094-7 = "雖然我想老師應該也只是在開玩笑而已，畢竟～今天可是情人節！"
80000094-8 = "老師也是知道這點才會過來的吧？#n在我面前沒必要假裝的哦。"
80000094-9 = "那麼就馬上進入正題……"
80000094-15 = "……鏘鏘～！！"
80000094-16 = "[s1]「謝謝你，一花。」\n[s2]「真厲害，我會好好享用的。」"
80000094-19 = "…………"
80000094-20 = "咦……？"
80000094-21 = "好像有點……#n那個……老師就這樣默默收下了嗎？"
80000094-22 = "我還以為多少會有點不一樣的反應……"
80000094-23 = "……嗯？"
80000094-24 = "問我是不是比較喜歡那樣？#n這個嘛，好像也不能這麼說……"
80000094-25 = "哈哈。老師問得這麼直接，讓人有點難為情……"
80000094-26 = "不過，嗯。#n就像老師說的一樣，直來直往更符合我的喜好～"
80000094-27 = "雖然我以為老師至少會問「這個巧克力是怎麼來的」之類的問題……"
80000094-28 = "……嗯？"
80000094-29 = "……這是不是我親手做的？"
80000094-30 = "那個……是我做的沒錯……啦……"
80000094-34 = "唉～"
80000094-35 = "老師……"
80000094-36 = "剛剛那個有點……哈哈。"
80000094-37 = "不管怎麼說，問得那麼直接還是……有點不太好吧？"
80000094-38 = "直接把正確答案說出來的話，我認真準備的東西不就發揮不出來了嗎……"
80000094-39 = "別看我這樣，我姑且也是個正值花樣年華的女高中生……#n希望你可以再細心一點。"
80000094-40 = "嗯……"
80000094-41 = "唔，仔細想想，果然這次就算老師道歉也不管用了吧。"
80000094-42 = "……嗯？"
80000094-43 = "問我該怎麼做才好？#n這……"
80000094-44 = "老師連這個也要問我嗎？#n一直這樣下去可是會出大事的哦。"
80000094-45 = "……問我大事是什麼？那也沒關係？"
80000094-49 = "……老師的意思是就算出大事也沒關係嗎？"
80000094-50 = "確定嗎？你可得負起責任哦？"
80000094-51 = "……哦哦……"
80000094-52 = "哈哈……"
80000094-53 = "好吧，既然老師都這麼說了……"
80000094-54 = "那接下來發生的事，就都是老師應負的責任……或者說報應……"
80000094-55 = "……算你自作自受囉？"
80000094-56 = "好……"
80000094-60 = "……老師？"
80000094-65 = "……啊～"

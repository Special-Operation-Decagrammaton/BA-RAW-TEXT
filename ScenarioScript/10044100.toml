[translation]
10044100-1 = "第10話;少女在未知的世界中微笑"
10044100-3 = "可惡……！！這，這些小鬼～～！"
10044100-4 = "總，總長……！我們好像不行了！"
10044100-5 = "明，明明差一點點就能實現野心了說……！！"
10044100-7 = "咯咯……哎呀哎呀。#n場面還真盛大呢。"
10044100-10 = "這，這個聲音是……？"
10044100-16 = "高地人鐵道學園的各位，辛苦了。"
10044100-17 = "咯咯，看來似乎發生了預料之外的問題呢？"
10044100-18 = "委，委託人……！你已經到了嗎……！！"
10044100-20 = "[ns]「啊……」"
10044100-22 = "那，那個人就是委託人嗎……？"
10044100-23 = "哦～所以直接把貨交給他就行了嗎？"
10044100-24 = "不不不，先等一下！#n那個人一看就像壞人耶！！真的沒關係嗎！？"
10044100-25 = "總之先完成任務～"
10044100-27 = "咯咯……我已經清點過所有貨物了。"
10044100-28 = "列車雖然殘破不堪，貨物卻毫髮無傷。#n這可真是驚人啊。"
10044100-29 = "把貨物交給高地人的各位果然是正確的選擇。#n你們說是不是啊？"
10044100-30 = "既然接下任務就會盡全力完成。#n這是理所當然的。"
10044100-31 = "呵呵，果真如我所料……"
10044100-32 = "很好，接下來只要在交貨證明書上簽收，委託就完成了。"
10044100-33 = "各位可以結束任務，我則是能[ruby= ・     ・     ・ ]完整地[/ruby]收下這些東西。"
10044100-34 = "來，請在這裡簽名吧。#n咯咯咯……"
10044100-36 = "真的可以嗎！？#n交給他確定沒問題嗎？"
10044100-41 = "結束～"
10044100-42 = "任務完成～！"
10044100-44 = "咯，咯咯……咯哈哈哈！！"
10044100-45 = "真是太令我高興了。#n這一刻的到來，我不知道已經等多久了……！！"
10044100-46 = "嗚嗚……老，老師……這樣真的好嗎……"
10044100-47 = "我，我好不安……！"
10044100-48 = "哎呀，咯咯咯……原來老師也在啊。#n沒有及早跟老師打聲招呼，真是不好意思。"
10044100-49 = "前段時間欠了夏萊不少人情，真不曉得該怎麼報答才好呢……咯咯！！"
10044100-50 = "唔唔……"
10044100-51 = "[ns]「很高興見到您。沒想到會在這裡見面呢。」"
10044100-55 = "咦？"
10044100-57 = "老，老師？他是老師認識的人嗎？"
10044100-58 = "[s1]「嗯，他是對社會福利很有貢獻的知名企業家。」\n[s2]「對學生們也十分慷慨，每年都提供了很多獎學金。」   "
10044100-64 = "……嗯？？"
10044100-66 = "咯咯，您過獎了。#n我只是經營了幾間小公司而已……"
10044100-67 = "能為學生們盡到一點棉薄之力，我就很滿足了。#n咯咯……！！"
10044100-68 = "不，不是！那為什麼要用那種反派的語氣說話啊！？#n害我不小心誤會了！！"
10044100-69 = "確實經常有人對我這麼說……"
10044100-70 = "但我實在搞不懂到底哪裡像反派就是了。咯哈哈哈！"
10044100-71 = "就，就是這種地方啦……！！"
10044100-72 = "總之，同學們的表現真的很令人欣慰。"
10044100-73 = "為了運送這批貨物，各位似乎都拚盡了全力呢。呵呵。"
10044100-74 = "多虧了你們的努力，我才能順利為重要活動做好準備……"
10044100-75 = "啊，有件事讓我有點好奇。#n這些貴重品是要用在哪裡的呢？"
10044100-76 = "咯咯，我想用它們來嘗試我一直很感興趣的一件事。"
10044100-77 = "各位有聽說過「慈善拍賣」嗎？"
10044100-78 = "沒聽過～"
10044100-79 = "就是以慈善活動為目的而舉辦的珍品拍賣會。"
10044100-80 = "這種高價的藝術品和收藏品，總是會讓有錢人趨之若鶩呢。#n呵，呵呵。"
10044100-81 = "只要有了這些東西，就能吸引出手闊綽的人齊聚一堂。"
10044100-82 = "藉由拍賣獲得的收益，會經過公正的程序回饋給貧困的學生。"
10044100-83 = "除了能實現對社會的回饋之外，身為主辦者的我也能達到節稅的效果。"
10044100-84 = "咯咯，如果一切都能如我所願的話，豈不是太棒了嗎！！咯哈哈哈！！"
10044100-86 = "那種說話方式就不能改一下嗎！！雖然動機是很好沒錯啦！"
10044100-88 = "至於運輸者聯盟……簡稱轟隆轟隆疾馳聯盟的各位。"
10044100-89 = "哇，居然把名字全部唸出來了。"
10044100-90 = "嗚嗚……"
10044100-91 = "雖然先前已經和各位合作過不少次，不過這次竟然鬧成這樣……"
10044100-92 = "我認為有必要重新審視我們的信任關係。#n咯咯咯……"
10044100-93 = "這，這……！先破壞信任的人是你才對！"
10044100-94 = "運送這批貨物本來是我們的工作，#n結果你居然突然跑去委託高地人……我實在無法接受！"
10044100-95 = "我之所以會臨時改變主意，是因為前一天委託你們配送的高級壽司套餐──#n被你們的危險駕駛搞得在便當盒裡混成了一團的關係……"
10044100-96 = "我想吃的是壽司，而不是散壽司啊。"
10044100-98 = "嗚哇，真慘。"
10044100-100 = "呃……這，這個嘛……"
10044100-101 = "這樣要我怎麼把高價的收藏品委託給你們呢？"
10044100-102 = "可，可是我們的速度很快啊！而且是超級快！"
10044100-103 = "當然，這點我也很清楚。"
10044100-104 = "咯咯……該如何發揮你們的長處，今後我會審慎思考的。"
10044100-105 = "真，真的嗎？"
10044100-106 = "不過前提是──#n你們必須先為今天對高地人、夏萊的老師，還有我造成的有形與無形損失負責才行。"
10044100-107 = "只，只要負起責任，就會再給我們一次機會的意思嗎……"
10044100-111 = "……我知道了。#n我們會盡可能賠償……"
10044100-112 = "而且……會找回自己的初衷。"
10044100-113 = "未來一定會腳踏實地，做好專業配送員的本份。"
10044100-115 = "總，總長……"
10044100-117 = "……這並不代表我已經放棄了夢想，只是選擇慢慢前進罷了。"
10044100-118 = "只要跟你們一起，我相信一定能辦得到。"
10044100-120 = "總長……"
10044100-122 = "說，說得一副很感人肺腑的樣子……！！#n明明給別人添了那麼大的麻煩……！"
10044100-123 = "唔……！"
10044100-124 = "確，確實是這樣沒錯。#n那我就送你們一週的免費配送券作為賠償吧……！"
10044100-125 = "我，我才不需要咧！"
10044100-126 = "不然兩張吧！兩張怎麼樣……"
10044100-128 = "啊～終於完成任務了。"
10044100-129 = "好睏～我累了～"
10044100-131 = "[ns]「大家真的都辛苦了。」"
10044100-132 = "老師也辛苦了～好乖好乖～"
10044100-133 = "噗哈哈，真的是一團亂呢！#n不過多虧了老師，其實還挺好玩的嘛？"
10044100-134 = "下次還可以再找老師嗎？"
10044100-136 = "拜，拜託有點羞恥心好不好……搞出這麼大的騷動還敢想下一次嗎？"
10044100-137 = "[ns3]「我隨傳隨到。」\n[ns4]「回應學生的呼喚，就是老師的職責啊。」"
10044100-140 = "咦……"
10044100-144 = "那，那麼……"
10044100-145 = "換，換作是我的話……老師也會來嗎……？"
10044100-146 = "[s]「當然囉，青葉。」"
10044100-147 = "……"
10044100-148 = "唉……真是的。#n第一次認識這種類型的人……"
10044100-149 = "不要隨便讓我產生期待啦……"
10044100-150 = "啊，對了。還得寫任務的報告書耶。"
10044100-151 = "文書好無聊～老師幫幫我嘛～"
10044100-152 = "[s]「放過我吧……」"
10044100-153 = "我們趁這個機會去夏萊玩怎麼樣？"
10044100-154 = "噗哈哈！感覺會很好玩耶？#n走吧，光！"
10044100-155 = "嗯～出發～"
10044100-157 = "已，已經要走了嗎？任務確定結束了吧……？"
10044100-158 = "沒錯！貨物也已經送出去了嘛。"
10044100-160 = "呼……真的是漫長的一天。"
10044100-161 = "……兩位幹部也辛苦了。#n沒，沒想到活著活著，竟然有機會跟和兩位幹部一起經歷這種事……"
10044100-162 = "雖然比想像中還有責任感跟職業道德，讓我有點驚訝就是了……"
10044100-163 = "你說什麼～？說大聲一點～"
10044100-164 = "唔唔！你明明就有聽到嘛……！"
10044100-165 = "總之，雖然還是有很多奇怪的幹部！#n不過也許沒有我想像中那麼奇怪……反正就是這樣。"
10044100-166 = "這算是稱讚嗎？還是在罵人？"
10044100-167 = "是，是稱讚啦……某種程度上！"
10044100-168 = "噗哈哈，好好好！你說是就是吧！"
10044100-169 = "青葉今天也很帥哦～"
10044100-170 = "摩擦係數Overdrive～還想再來一次～"
10044100-171 = "我，我才不要再來一次……"
10044100-172 = "那我就先回宿舍了……#n兩位幹部和老師，請小心慢走。"
10044100-177 = "什麼？你也要一起來啊。"
10044100-179 = "咦，咦？"
10044100-181 = "這樣才是Team～包括老師～"
10044100-183 = "任，任務不是已經結束了嗎？#n現在應該要解散了吧？"
10044100-184 = "不不不。你沒聽過「不到最後一秒都不算結束」這句話嗎？"
10044100-185 = "那，那又是什麼意思……"
10044100-188 = "[ns]「大家一起吃個晚餐吧？」"
10044100-189 = "可，可以嗎？#n我真的可以一起去嗎……"
10044100-190 = "都說「大家一起」了～"
10044100-191 = "噗哈哈！走吧～！#n想吃什麼都可以點嗎？我要吃很多哦？"
10044100-192 = "明明今天連交通費之類的都讓老師出了……"
10044100-193 = "老師的卡～不是每天都有機會刷的哦～"
10044100-194 = "剛，剛才稱讚兩位幹部的我真是個傻瓜……！ "
10044100-195 = "[ns]「啊啊……真是美麗的夕陽啊。」"
10044100-198 = "高地人鐵道暴走事件"

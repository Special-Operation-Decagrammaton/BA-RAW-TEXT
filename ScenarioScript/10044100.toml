10044100-132 = "คุณครูก็เหมือนกัน เก่งจังเลยน้า"
10044100-133 = "วะฮะฮ่า ไม่ใช่งานง่ายๆ เลย! แต่คุณครูก็ช่วยให้ทำงานได้สนุกเลยละ"

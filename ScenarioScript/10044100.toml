[translation]
10044100-1 = "ตอนที่ 10;เด็กสาวยิ้มสวยในโลกที่ไม่อาจรู้ได้"
10044100-3 = "อึก...!! ดะ... เด็กตัวจิ๋วพวกนี้นี่~~!"
10044100-4 = "หะ... หัวหน้า...! ฉันว่าพวกเราจบเห่แล้วค่ะ!"
10044100-5 = "คะ... ความทะเยอะทะยานอยู่ตรงหน้าแล้วแท้ๆ..!!"
10044100-7 = "หึหึ... ดูเข้าสิ เล่นใหญ่กันจังเลยนะครับ"
10044100-10 = "สะ... เสียงนี้มัน...?"
10044100-16 = "ทำได้ดีมากครับ สถาบันการรถไฟไฮแลนเดอร์"
10044100-17 = "หึหึ ดูเหมือนจะเจอปัญหาที่คาดไม่ถึงกันนะครับ"
10044100-18 = "อึก... ผู้ว่าจ้าง...! อยู่ที่นี่เหรอเนี่ย...!!"
10044100-20 = "[ns] \"อ่า...\""
10044100-22 = "คะ... คนนั้นคือผู้ว่าจ้างเหรอคะ...?"
10044100-23 = "ดีเลย งั้นก็ส่งมอบสินค้าให้โดยตรงได้เลยสินะ"
10044100-24 = "ไม่ได้ค่ะ! เขาดูเหมือนคนไม่ดีเลย!! จะส่งสินค้าให้ได้เหรอคะ?!"
10044100-25 = "แต่เราต้องทำภารกิจให้สำเร็จสิ"
10044100-27 = "หึหึ... ผมตรวจสอบสินค้าก่อนมาที่นี่แล้วละ"
10044100-28 = "ถึงรถไฟจะเละเทะ แต่ก็น่าประหลาดใจที่สินค้าไม่ได้รับความเสียหายเลยครับ"
10044100-29 = "ผมทำถูกแล้วละที่ให้ไฮแลนเดอร์รับงานนี้ ว่ามั้ยล่ะครับ?"
10044100-30 = "มันก็แน่นอนอยู่แล้ว ก็เพราะพวกเราทำงานที่ได้รับมอบหมายกันเต็มที่ไง"
10044100-31 = "หึหึ ผมก็คิดอย่างนั้นละครับ..."
10044100-32 = "เอาละครับ ต่อไปแต่ละฝ่ายก็แค่ลงนามในใบส่งมอบสินค้า แล้วงานนี้ก็จะเสร็จสิ้นแล้วครับ"
10044100-33 = "พวกคุณทำภารกิจสำเร็จ ส่วนผมก็ได้รับของครบถ้วน"
10044100-34 = "เอาละ รีบเซ็นเลยสิครับ หึหึ..."
10044100-36 = "จะไม่เป็นไรเหรอคะ?! จะส่งของให้เขาได้จริงๆ เหรอ?"
10044100-41 = "เคลียร์"
10044100-42 = "ภารกิจสำเร็จแล้ว~!"
10044100-44 = "หึ... หึหึหึ... ฮะฮ่าฮ่า!!"
10044100-45 = "น่าดีใจจังเลยนะครับ ผมรอเวลานี้มาตั้งนานแล้ว...!!"
10044100-46 = "อึก... คะ... คุณครูคะ... นี่เราทำถูกกันหรือเปล่า..."
10044100-47 = "ฉะ... ฉันไม่สบายใจเลยค่ะ...!"
10044100-48 = "อ้อ หึหึหึ... จะว่าไปคุณครูก็อยู่ที่นี่ด้วยสินะครับ ขอโทษที่ทักทายช้านะครับ"
10044100-49 = "งานนี้ทำเอาผมติดหนี้ชาเล่ต์ไปด้วยเลย จะตอบแทนยังไงดีล่ะครับเนี่ย? หึหึ!!"
10044100-50 = "อะ... อึก..."
10044100-51 = "[ns] \"ดีใจที่ได้เจอนะ ไม่คิดเลยว่าจะได้เจอกันที่นี่\""
10044100-55 = "เอ๋?"
10044100-57 = "คะ... คุณครู? รู้จักคนคนนี้ด้วยเหรอคะ?"
10044100-58 = "[s1] \"อื้อ นี่คือนักธุรกิจชื่อดังด้านสังคมสงเคราะห์น่ะ\"\n[s2] \"อื้อ นี่คือนักธุรกิจชื่อดังที่ให้ทุนการศึกษานักเรียนด้วยน่ะ\""
10044100-64 = "คะ...??"
10044100-66 = "หึหึ ชมกันเกินไปแล้วครับ ผมแค่ทำธุรกิจเล็กๆ ไม่กี่อย่างเอง..."
10044100-67 = "และถ้ามันเป็นประโยชน์กับนักเรียน แค่นั้นผมก็พอใจแล้วครับ หึหึ...!"
10044100-68 = "ดะ... เดี๋ยวก่อน! แล้วทำไมคุณถึงพูดและหัวเราะเหมือนคนไม่ดีเลยล่ะคะ?! แบบนี้ฉันสับสนนะคะ!!"
10044100-69 = "น่าแปลกใจนะครับที่ผมก็ได้ยินคำแบบนั้นบ่อยๆ เหมือนกัน..."
10044100-70 = "แต่ผมไม่รู้เลยว่าตรงไหนของผมที่ดูเหมือนคนร้ายน่ะ ฮะฮ่าฮ่า!"
10044100-71 = "กะ... ก็การพูดและเสียงหัวเราะแบบนั้นไงคะ...!!"
10044100-72 = "ยังไงก็เถอะครับ ผมชื่นชมพวกคุณมากจริงๆ"
10044100-73 = "ขอบคุณที่ช่วยขนส่งสินค้ามาได้ถูกที่และตรงเวลานะครับ ฮุฮุ"
10044100-74 = "แบบนี้เราก็คงเตรียมจัดงานสำคัญได้อย่างไร้ปัญหาแล้วละครับ"
10044100-75 = "อ่า... พอดีฉันสงสัยน่ะ จะเอาของมูลค่าสูงๆ พวกนี้ไปใช้ทำอะไรเหรอ?"
10044100-76 = "หึหึ ผมว่าจะลองทำอะไรที่น่าสนใจดูน่ะครับ"
10044100-77 = "เคยได้ยินเรื่องการประมูลเพื่อการกุศลกันหรือเปล่าครับ?"
10044100-78 = "ไม่เคยหรอก"
10044100-79 = "ก็ตามชื่อเลยครับ มันเป็นการประมูลของมีค่าที่จัดขึ้นเพื่อการกุศล"
10044100-80 = "โดยทั่วไปแล้ว งานศิลปะและของมีมูลค่าสูงประเภทนี้เป็นของที่พวกเศรษฐีต้องการกันมากครับ ฮุ... ฮุฮุ"
10044100-81 = "และการเปิดงานประมูลก็จะทำให้คนที่มีกำลังจ่ายสูงขนาดนั้นมารวมตัวกันได้ง่ายขึ้น"
10044100-82 = "เราจะเอารายได้จากการประมูลไปแจกจ่ายให้นักเรียนด้อยโอกาสโดยผ่านกระบวนการที่เป็นธรรม"
10044100-83 = "นอกจากนี้ยังเป็นการคืนกำไรให้สังคมระบบทุนนิยม และสำหรับผมในฐานะผู้จัดงานแล้วก็ยังได้#nประโยชน์จากการลดหย่อนภาษีด้วยครับ"
10044100-84 = "หึหึ ถ้าทุกอย่างเป็นไปตามแผนการ ก็จะยอดเยี่ยมไปเลยนะครับ!! ฮะฮ่าฮ่า!!"
10044100-86 = "คุณเปลี่ยนโทนการพูดหน่อยไม่ได้เหรอคะ!! ดูมีเจตนาดีแท้ๆ แต่ทำไมพูดเหมือนคนไม่ดีเลยล่ะ!"
10044100-88 = "แล้วก็ทุกคนจากสหพันธ์นักซิ่งขนส่งแห่งชาติ... หรือที่ย่อว่าสหพันธ์วรูม วรูม"
10044100-89 = "ว้าว เรียกซะเต็มยศเลยแฮะ"
10044100-90 = "อึก..."
10044100-91 = "ที่ผ่านมาผมก็ใช้บริการจากพวกคุณอยู่หลายครั้ง แต่ที่พวกคุณมาก่อเรื่องวุ่นวายเหลวไหลในครั้งนี้"
10044100-92 = "เห็นทีผมต้องพิจารณาเรื่องความไว้วางใจระหว่างเราใหม่แล้วละครับ หึหึ..."
10044100-93 = "ระ... เรื่องนั้นมัน...! คุณต่างหากล่ะที่ทำลายความไว้วางใจของพวกเราก่อน!"
10044100-94 = "การขนส่งสินค้าครั้งนี้เป็นงานของเราตั้งแต่แรก แล้วทำไมจู่ๆ ถึงไปให้ไฮแลนเดอร์ทำล่ะ! ไม่สมเหตุสมผลเอาเสียเลย!"
10044100-95 = "ก็เซ็ตซูชิพรีเมียมที่ผมให้พวกคุณมาส่งคราวก่อนมันเละเทะไปหมดเพราะพวกคุณขี่มอเตอร์ไซค์กัน#nสะบัดสะบิ้งนี่ครับ..."
10044100-96 = "ผมอยากกินซูชิเป็นคำๆ นะครับ ไม่ได้อยากกินไคเซ็นด้ง"
10044100-98 = "เละเป็นข้าวราดเลยเหรอ แบบนี้หนักกว่าพิซซ่าอีกนะ"
10044100-100 = "อึก... อะ... ออเดอร์นั้นมัน..."
10044100-101 = "คิดว่าผมควรฝากของมีค่าราคาแพงไว้กับพวกคุณเหรอครับ?"
10044100-102 = "ตะ... แต่ถึงยังไงพวกเราก็เร็วกว่านะ! เร็วกว่ามากๆ เลยด้วย!"
10044100-103 = "เรื่องนั้นผมก็รู้ดีครับ"
10044100-104 = "หึหึ... แล้วผมจะเก็บไปคิดดูครับว่าจะใช้ประโยชน์จากข้อดีนั้นได้ยังไงบ้าง"
10044100-105 = "จะ...จริงเหรอ?!"
10044100-106 = "แต่ว่า! ต้องเป็นหลังจากที่พวกคุณรับผิดชอบต่อความเสียหายทั้งหมดที่เกิดขึ้นกับไฮแลนเดอร์ คุณครูจากชาเล่ต์ รวมถึงกับตัวผมแล้วนะครับ"
10044100-107 = "ถะ...ถ้าพวกฉันชดใช้ความเสียหาย เราก็จะมีโอกาสได้ร่วมงานกันอีกงั้นเหรอ..."
10044100-111 = "เข้าใจแล้ว... ฉันจะชดใช้ให้เต็มที่เลย..."
10044100-112 = "แล้วเราก็จะกลับไปสู่จุดเริ่มต้นอีกครั้ง"
10044100-113 = "ต่อไปพวกเราจะตั้งใจทำงานในฐานะพนักงานขนส่งมืออาชีพเลยละ"
10044100-115 = "หะ... หัวหน้า..."
10044100-117 = "ฉันไม่ได้ทิ้งความฝันของตัวเองหรอก... ฉันแค่จะเดินขึ้นไปหาความฝันอย่างช้าๆ น่ะ"
10044100-118 = "ถ้าได้อยู่กับพวกเธอ ฉันก็คิดว่าความฝันนั้นเป็นไปได้"
10044100-120 = "หะ... หัวหน้า..."
10044100-122 = "ขะ... เข้าโหมดจริงจังแล้วพูดอะไรน่าประทับใจซะงั้น!! พวกคุณก่อปัญหาเอาไว้นะคะ...!"
10044100-123 = "อึก...!"
10044100-124 = "นะ... นั่นสิเนอะ งั้นฉันจะให้คูปองส่งฟรี 1 อาทิตย์เลย...!"
10044100-125 = "มะ... ไม่เอาด้วยหรอกค่ะ!"
10044100-126 = "2 ใบ! ให้ 2 ใบเลยก็ได้..."
10044100-128 = "เฮ้อ ในที่สุดภารกิจก็สำเร็จจนได้นะ"

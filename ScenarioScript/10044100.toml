[translation]
10044100-1 = "Episode 10;A Girl Smiles in an Unknown World"
10044100-3 = "Tch! Y-You damn brats...!!"
10044100-4 = "P-President...I think we're done for!"
10044100-5 = "W-We were one step away from achieving our ambitions!!"
10044100-7 = "Ha ha ha... *slow clap* My, my. So you've seen it through to the end..."
10044100-10 = "I-Is that...?"
10044100-16 = "You've done well, Highlander Railroad Academy."
10044100-17 = "Even with the...unexpected complications, shall we say?"
10044100-18 = "Hm. The client. So you were already here..."
10044100-20 = "[ns] \"Ah...\""
10044100-22 = "Th-That's the client?"
10044100-23 = "Well, okay, I guess we can just hand over the cargo now."
10044100-24 = "Wait a minute, no. That guy has \"villain\" written all over him. Are we sure about this?"
10044100-25 = "We get the job done first."
10044100-27 = "Pardon me for keeping you waiting. I was merely inspecting the cargo."
10044100-28 = "The train has seen better days, to say the least...but the cargo is surprisingly intact."
10044100-29 = "I certainly made the right choice leaving it up to you Highlanders."
10044100-30 = "We always do our best on the job. It's only natural."
10044100-31 = "Ha ha, indeed."
10044100-32 = "Now, if you'd kindly sign this delivery confirmation, that'll be the end of it."
10044100-33 = "You can take care of your work, and I will take care of the cargo."
10044100-34 = "Go on. Sign it. Ha ha..."
10044100-36 = "Should we really do this? Are we REALLY sure we want to do this??"
10044100-41 = "Done."
10044100-42 = "Mission accomplished!"
10044100-44 = "Heehee. Heeheehee... Ahahaha!!"
10044100-45 = "Wonderful. I have waited so very long for this moment..."
10044100-46 = "Uhh... S-Sensei..."
10044100-47 = "There's that bad feeling again..."
10044100-48 = "Ah, Sensei. Pardon me, I didn't see you there."
10044100-49 = "It seems I owe Schale a debt of gratitude as well. Now how might I repay you...?"
10044100-50 = "U-Uhh..."
10044100-51 = "[ns] \"Hey, fancy running into you here.\""
10044100-55 = "...Eh?"
10044100-57 = "S-Sensei? You know that guy?"
10044100-58 = "[s1] \"Yeah, he's a famous philanthropist.\"\n[s2] \"He provides a lot of scholarships.\"   "
10044100-64 = "...Really??"
10044100-66 = "Ha ha, you flatter me. I'm nothing more than a...simple businessman."
10044100-67 = "But all my long years of toil have brought me to this. To a fortune, capable of helping students across ALL OF KIVOTOS. Ha ha!!"
10044100-68 = "W-Wait! Then why are you talking like a villain?! I'm confused!"
10044100-69 = "...Ha. Many people over the years have asked me that very same question..."
10044100-70 = "...and to this day, I have no idea why."
10044100-71 = "W-Wha...?!!"
10044100-72 = "That aside, I admire you three."
10044100-73 = "You gave it your all and delivered the cargo, in spite of all adversity. Ha ha."
10044100-74 = "Thanks to YOUR devotion to the task, our preparations will soon be complete!"
10044100-75 = "Ah, I was curious about that. What are you going to do with all those valuables, anyway?"
10044100-76 = "Ha ha, a bold new venture, one I've long dreamed of."
10044100-77 = "Those who know would call it a...\"charity auction.\""
10044100-78 = "What's that?"
10044100-79 = "You see, we intend to place these valuables on display, and sell them to the highest bidder."
10044100-80 = "Such valuables attract the wealthy, those who draw their sense of worth from their precious possessions."
10044100-81 = "In other words...those who have the most to give."
10044100-82 = "Every yen we earn will flow straight into the coffers of worthy charities, those chosen in a fair and equal process."
10044100-83 = "Society will reap the benefits. And I, as the host of it all...I will reduce my annual tax owed to NOTHING!!"
10044100-84 = "All according to plan... Ha ha ha!!"
10044100-86 = "That sounds great! Please do something about the way you talk!"
10044100-88 = "And you, the National Transporter Association...the Vroom Vroom Race Association for short."
10044100-89 = "Wow, he really said the full thing."
10044100-90 = "Ugh..."
10044100-91 = "I've trusted you with many things, but you've caused such trouble this time."
10044100-92 = "We may have to reevaluate our little...arrangement. Ha ha."
10044100-93 = "W-Well...the trouble's your fault in the first place!"
10044100-94 = "This whole thing was supposed to be OUR job! Why'd you go behind our backs and give it to Highlander?"
10044100-95 = "WHY?! Not one day before, I ordered luxury sushi. What you DELIVERED to me was an inexcusable mess!"
10044100-96 = "If I wanted kaisendon, I'd have ordered that!"
10044100-98 = "Wow, that's pretty bad."
10044100-100 = "Tch... Th-That's..."
10044100-101 = "Who in their right mind would trust such people with anything of value?"
10044100-102 = "B-But we're fast! Incredibly fast!"
10044100-103 = "I'm well aware of that."
10044100-104 = "And perhaps, in time, I'll have a task that suits you."
10044100-105 = "R-Really?"
10044100-106 = "However! That comes after you take responsibility for the tangible AND intangible damages you've done to Highlander, to Schale's Sensei, ANNND TO ME."
10044100-107 = "S-So you're saying if we make up for that, you'll give us another chance?"
10044100-111 = "...Got it. We'll do as much as we can."
10044100-112 = "And then we'll go back to square one."
10044100-113 = "We'll...try to be more professional about our deliveries."
10044100-115 = "P-President..."
10044100-117 = "...We're not giving up on our dreams. We're just getting there slowly."
10044100-118 = "With you all here, I believe we can do it."
10044100-120 = "Aw, President..."
10044100-122 = "D-Don't get sentimental on me now! We've got a mess to clean up!"
10044100-123 = "Tch...!"
10044100-124 = "R-Right. To compensate, I'll give you a coupon for a free week's worth of deliveries."
10044100-125 = "W-We don't need that!"
10044100-126 = "Two! I'll give you two..."
10044100-128 = "...Ah, the work's finally over."
10044100-129 = "Sleepy... Tired."
10044100-131 = "[ns] \"Good work, everyone.\""
10044100-132 = "You too, Sensei."
10044100-133 = "Pahyahya! Well, that was a whole big bundle of chaos! But I had a good time, thanks to you, Sensei!"
10044100-134 = "Can I call you next time we need you?"
10044100-136 = "Y-You want to put them through this AGAIN? Have you no shame?"
10044100-137 = "[ns3] \"I'll come running anytime.\"\n[ns4] \"Whenever students call, I answer.\""
10044100-140 = "...Um..."
10044100-144 = "Th-Then..."
10044100-145 = "If I were the one to call you...w-would you come to me?"
10044100-146 = "[s] \"Of course, Aoba.\""
10044100-147 = "..."
10044100-148 = "*sigh* You know, I've never met anyone else like you, Sensei."
10044100-149 = "...Wait, no, don't make me look forward to something again."
10044100-150 = "Hey, I've gotta go write a report."
10044100-151 = "Paperwork? Lame. Could you help, Sensei?"
10044100-152 = "[s] \"Cut me some slack...\""
10044100-153 = "Maybe we could use this chance to get help at Schale. What do you think?"
10044100-154 = "Pahyahya! That sounds fun, doesn't it? Let's go, Hikari!"
10044100-155 = "Rolling out."
10044100-157 = "S-So I guess...we're done here?"
10044100-158 = "We're done! We handed over the cargo on time, safe and sound."
10044100-160 = "Phew...what a day."
10044100-161 = "...I didn't think I'd ever say this, but thanks for all your hard work, officers."
10044100-162 = "You're...more responsible than I thought you were."
10044100-163 = "What? Say it louder."
10044100-164 = "Ugh! You heard me!"
10044100-165 = "Anyways, I guess I shouldn't always judge officers by...first impressions."
10044100-166 = "Was that a compliment or an insult?"
10044100-167 = "I-It was a compliment...! In a way!"
10044100-168 = "Pahyahya, well, if you say so!"
10044100-169 = "Compliment back-atcha, Aoba!"
10044100-170 = "Friction coefficient overdrive maneuver! Let's do it again next time!"
10044100-171 = "I-I'd really rather not."
10044100-172 = "On that note, I ought to get back to my quarters. Officers, Sensei, have a safe trip home."
10044100-177 = "What are you talking about? We should get out of here together."
10044100-179 = "E-Eh?"
10044100-181 = "Team stuff. You too, Sensei."
10044100-183 = "I thought we'd established the work was over. What's left to do, if not go home?"
10044100-184 = "The work's over. Doesn't mean we're done."
10044100-185 = "Wh-What are you talking about...?"
10044100-188 = "[ns] \"Do we all want to grab dinner?\""
10044100-189 = "Would that be okay, f-for me to join...?"
10044100-190 = "TO-GE-THER."
10044100-191 = "Pahyahya! Let's go! Can I order anything I want? Because I eat a LOT."
10044100-192 = "Still so shameless. Sensei already paid the bus fare, remember? AND for the subway."
10044100-193 = "Never say no to Sensei's open wallet."
10044100-194 = "I-I take back everything I just said about officers...! "
10044100-195 = "[ns] \"Ah, what an amazing sunset...\""
10044100-198 = "Highlander Railroad Runaway Incident"

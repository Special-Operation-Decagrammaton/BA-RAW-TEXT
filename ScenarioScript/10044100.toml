10044100-136 = "หะ... หัดละอายใจบ้างเถอะค่ะ... ก่อเรื่องไว้ขนาดนี้แล้ว ยังจะรบกวนคุณครูเพิ่มอีกเหรอ?"
10044100-137 = "[ns3] \"ครูจะมาให้เร็วกว่านักซิ่งเลย\"\n[ns4] \"ถ้านักเรียนเรียก ครูก็ต้องมาหาอยู่แล้ว\""
10044100-140 = "เอิ่ม..."
10044100-144 = "ถะ... ถ้างั้น..."
10044100-145 = "ถะ... ถ้าฉันเรียก... คุณครูจะมาหาฉันมั้ยคะ...?"

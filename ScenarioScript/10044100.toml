10044100-147 = "..."
10044100-148 = "จริงๆ เลยนะเนี่ย... ฉันไม่เคยเห็นคนอย่างคุณครูมาก่อนเลยค่ะ..."
10044100-149 = "อย่าทำให้ฉันคาดหวังสิคะ..."
10044100-150 = "อ้อ จริงสิ เราต้องเขียนรายงานภารกิจนี่นา"
10044100-151 = "ไม่ชอบงานเอกสารเลย คุณครูช่วยหน่อยสิ"
10044100-152 = "[s] \"ให้ครูพักบ้างเถอะนะ...\""
10044100-153 = "ใช้โอกาสนี้ไปเที่ยวที่ชาเล่ต์ดีมั้ย?"
10044100-154 = "วะฮะฮ่า! ฉันว่าน่าจะสนุกเลยนะ ไปกันเถอะ ฮิคาริ!"
10044100-155 = "อื้อ ไปกันเลย"
10044100-157 = "จะ... จะไปกันทั้งอย่างนี้เลยเหรอ? ภารกิจเสร็จสิ้นแล้วใช่มั้ยคะ...?"
10044100-158 = "ก็เสร็จแล้วสิ! สินค้าก็ส่งอย่างถูกต้องและตรงเวลาด้วย"
10044100-160 = "เฮ้อ... ช่างเป็นวันที่ยาวนานจริงๆ นะคะ"
10044100-161 = "ท่านผู้บริหารทำได้ดีมากแล้วค่ะ... ฉันไม่เคยคิดเลยว่าชีวิตนี้จะได้ทำงานอะไรแบบนี้กับผู้บริหารด้วย..."
10044100-162 = "บอกตามตรงว่า... ฉันแปลกใจนิดหน่อยที่เห็นว่าทั้งสองคนมีความรับผิดชอบและทัศนคติต่อวิชาชีพดีกว่าที่คิดค่ะ..."
10044100-163 = "ว่าไงนะ? พูดให้ดังกว่านี้ซิ"
10044100-164 = "อึก! แต่ก็ได้ยินกันชัดแล้วนี่คะ...!"
10044100-165 = "แต่ก็เอาเถอะค่ะ ยังไงที่นี่ก็มีผู้บริหารแปลกๆ เยอะไปหมด! แต่ครั้งนี้ก็ทำให้ฉันได้เรียนรู้ว่า... บางคนก็อาจไม่ได้แปลกอย่างที่คิดก็ได้ ประมาณนี้น่ะค่ะ!"
10044100-166 = "อันนี้ชมหรือด่านะ?"
10044100-167 = "ชะ... ชมสิคะ...! คิดให้ดีมันก็เป็นคำชมค่ะ!"
10044100-168 = "วะฮะฮ่า ก็นะ! ก็คงเป็นอย่างที่เธอว่านั่นละ!"
10044100-169 = "วันนี้อาโอบะเองก็ยอดเยี่ยมไปเลยนะ"
10044100-170 = "แรงเสียดทาน โอเวอร์ไดรฟ์ ไว้มาเล่นแบบนี้กันอีกนะ"
10044100-171 = "ฉะ... ฉันไม่อยากทำอีกเป็นครั้งที่สองแล้วค่ะ..."
10044100-172 = "ฉันขอตัวกลับที่พักก่อนดีกว่าค่ะ... ท่านผู้บริหารกับคุณครูก็เดินทางกลับกันดีๆ นะคะ"
10044100-177 = "พูดเรื่องอะไรน่ะ? เราต้องไปด้วยกันสิ"
10044100-179 = "คะ... คะ?"
10044100-181 = "ก็เราเป็นทีมเดียวกันนี่ คุณครูก็ด้วย"
10044100-183 = "ตะ... แต่เราทำภารกิจเสร็จแล้วนี่คะ? งั้นแต่ละคนก็ต้องแยกย้ายกันกลับไม่ใช่เหรอ?"
10044100-184 = "อืม ไม่หรอก งานนี้ยังไม่จบแค่นี้หรอกนะ"
10044100-185 = "มะ... หมายความว่ายังไง..."
10044100-188 = "[ns] \"เราไปกินข้าวเย็นกันมั้ย? ไปกันทุกคนเลย!\""
10044100-189 = "ปะ... ไปด้วยกัน... ก็ได้เหรอคะ...?"

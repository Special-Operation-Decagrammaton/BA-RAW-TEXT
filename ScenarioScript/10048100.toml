[translation]
10048100-1 = "ตอนที่ 10;ผลสอบ"
10048100-2 = "ประตูหน้า ไวลด์ฮันต์"
10048100-3 = "(เช้าวันรุ่งขึ้น)"
10048100-4 = "โห คนเยอะจังเลย"
10048100-5 = "คงตั้งใจมาชม <นิทรรศการพิเศษเวโรนิก้า> กันสินะ... ว่าแต่งานเปิดกี่โมงเหรอ?"
10048100-6 = "ดูสมุดภาพสิ มีภาพนี้จัดแสดงด้วยละ!"
10048100-7 = "หืม? ฉันเคยเห็นภาพนี้ในหนังสือเรียนนะ!"
10048100-11 = "(เสียงพูดคุยจอแจ...)"
10048100-17 = "(พูดพร่ำเสียงดังกันไปหมด ทั้งๆ ที่ไม่รู้ว่าศิลปะคืออะไร...)"
10048100-18 = "(ไม่รู้กันด้วยซ้ำว่างานที่อยู่ตรงหน้าไม่ใช่ภาพจริง แต่เป็นภาพปลอม...)"
10048100-19 = "(นึกถึงวันเก่าๆ ขึ้นมาเลยสินะ...)"
10048100-21 = "(วันที่ภาพต้นฉบับที่ฉันสร้างสรรค์ขึ้นมาด้วยจิตวิญญาณถูกตำหนิอย่างหนักจากหมู่นักวิจารณ์...)"
10048100-22 = "(แต่คนพวกนั้นกลับถูกหลอกด้วยภาพปลอมแปลงผลงานชื่อดังที่ฉันวาดขึ้นมาหยาบๆ แล้วก็เอ่ยปากชื่นชมจนแทบจะเลียกันอยู่แล้ว)"
10048100-23 = "(ไม่มีใครได้เห็นภาพนั้นจริงจังเลย)"
10048100-24 = "(สิ่งที่ถูกมองเห็นมีแต่ชื่อเสียงอันฉาบฉวยที่อยู่เบื้องหลังภาพนั้น)"
10048100-25 = "(มนุษย์ไม่เคยมีวิสัยทัศน์ที่จะมองทะลุถึงตัวตนที่แท้จริงของศิลปะ)"
10048100-27 = "[log=시민 동물6 의뢰인]เพราะงั้นพวกมนุษย์จึงไม่คู่ควร[/log]"
10048100-31 = "[log=시민 동물6 의뢰인]ไม่คู่ควรที่จะได้ชื่นชมเสน่ห์อันยิ่งใหญ่ของสิ่งที่เรียกว่าของแท้ยังไงล่ะ...![/log]"
10048100-34 = "(เพราะงั้นฉันจะเปลี่ยนผลงานที่ยิ่งใหญ่ในโลกให้กลายเป็นของปลอมทีละชิ้นๆ)"
10048100-35 = "(ก็เพราะมันเป็นเรื่องน่าอายที่ผลงานที่ยิ่งใหญ่จะถูกมองเห็นและพูดถึงโดยคนที่โง่เขลาน่ะสิ)"
10048100-36 = "(จริงสิ... เมื่อคืนชมรมการค้าพิเศษติดต่อมา)"
10048100-37 = "(บอกว่าทำภารกิจสำเร็จแล้ว)"
10048100-38 = "(ฮุฮุ ดีละ... นี่มันเพิ่งจะเริ่มต้นเท่านั้น)"
10048100-39 = "(เชิญทำสีหน้าโง่เง่าแล้วชื่นชมงานปลอมแปลงหยาบๆ ของฉันได้เลย)"
10048100-40 = "(คนอย่างพวกแกคู่ควรกับอะไรแบบนี้นี่ละ...!)"
10048100-42 = "เอาละ! เราจะเปิดให้ชมงานกันแล้วค่ะ! มาเข้าแถวกันที่ทางเข้าตรงนี้นะคะ!"
10048100-43 = "หยิบตั๋วเข้างานออกมากันด้วยค่ะ!"
10048100-44 = "ฮุฮุ ในที่สุดก็ถึงเวลาแล้วสินะ"

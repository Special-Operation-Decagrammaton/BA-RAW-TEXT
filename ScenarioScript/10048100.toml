[translation]
10048100-1 = "Episode 10;Test Results"
10048100-2 = "Wildhunt Main Gate"
10048100-3 = "The next morning."
10048100-4 = "Wow, what a crowd!"
10048100-5 = "As expected of the Veronica Special Exhibition... How long until it opens?"
10048100-6 = "Did you look at the brochure? I didn't know they had THIS painting!!"
10048100-7 = "Oh, yeah. I saw this in a textbook once..."
10048100-11 = "*rabble rabble*"
10048100-17 = "(...They don't even know what true art is, and they keep yammering.)"
10048100-18 = "(These fools wouldn't know a fake if it stared them in the face...)"
10048100-19 = "(...I remember when I started out.)"
10048100-21 = "(The critics that condemned my original, soulful works of art...)"
10048100-22 = "(...were the same who were tricked by a forgery I created. Only then were they satisfied..)"
10048100-23 = "(No one tried to see the painting for what it was.)"
10048100-24 = "(All they saw was the fame behind it, the reputation, the expectation.)"
10048100-25 = "(They never cared about the true essence within.)"
10048100-27 = "[log=시민 동물6 의뢰인]That's why they don't have the right.[/log]"
10048100-31 = "[log=시민 동물6 의뢰인]...The right to witness true magnificence..![/log]"
10048100-34 = "(And that is why I will switch the world's \"masterpieces\" with forgeries, one by one.)"
10048100-35 = "(True aesthetics, genuine art, is debased by the vapid praises of the ignorant.)"
10048100-36 = "(...Most importantly, The Free Trade Cartel contacted me.)"
10048100-37 = "(They said their mission was successful.)"
10048100-38 = "(...Fufu, excellent. This is the beginning, you fools!)"
10048100-39 = "(Ready your vacant expressions to gaze in awe upon my crude forgery!)"
10048100-40 = "(This is all you deserve...!)"
10048100-42 = "Our doors are opening! Please line up in an orderly fashion at this gate!"
10048100-43 = "For your convenience, please have your tickets out and ready!"
10048100-44 = "Fufu... It's finally time."
10048100-45 = "And here...we...go."
10048100-50 = "Veronica Special Exhibition Hall"
10048100-51 = "*murmuring*"
10048100-55 = "What? This is...different."
10048100-56 = "Huh...? Why'd they put up two of the same painting?"
10048100-58 = "But... This one's famous, isn't it?"
10048100-59 = "Maybe it's some modern art installation?"
10048100-64 = "What's going on? What are you idiots grumbling about?"
10048100-65 = "Move... Come on..."
10048100-66 = "What are you looking at?"
10048100-67 = "Excuse me. Pardon. If I could squeeze by and—"
10048100-72 = "Wh-What...?!"
10048100-77 = "Two...nearly identical paintings displayed in tandem?!"
10048100-78 = "What's going on...?!"
10048100-80 = "[log]The previous night...[/log]"
10048100-82 = "Wildhunt Park"
10048100-83 = "...You say you don't trust people, but it's more than that."
10048100-84 = "Like our client, you believe that the public can't distinguish between real and fake. You think they lack aesthetic sense."
10048100-85 = "Is that right?"
10048100-86 = "Correct."
10048100-87 = "Then...let me ask you one more thing."
10048100-88 = "Have you ever tested that belief?"
10048100-89 = "Test?"
10048100-90 = "Indeed. I would like to know if the public is as ignorant as you say."
10048100-91 = "...That's aesthetically intriguing."
10048100-92 = "Well, then. How would you test such a thing?"
10048100-97 = "...It's simple. We show the people both versions of \"The Love of Purple and Blue Light,\" real and forged."
10048100-98 = "...!"
10048100-99 = "The visitors will be confused at first."
10048100-100 = "But soon the crowd will divide. Without explanation or expectation, each person will be drawn to a painting."
10048100-101 = "Some will stand before the authentic piece, and some will stand before the forged..."
10048100-102 = "Yet, if people inherently possess artistic sensibility, there will ultimately be a bigger crowd admiring the authentic piece."
10048100-103 = "And yet, if people are as ignorant as you say, the crowd will end up evenly split."
10048100-104 = "...Ah."
10048100-105 = "If more people gather around the real piece, you'll have no reason to steal the painting."
10048100-106 = "...Because the public would have proven themselves worthy. Is that not the ray of hope you've been looking for?"
10048100-107 = "Fufu, very clever."
10048100-108 = "All right. If it turns out that way, I will cease my pursuit of THIS painting, at least."
10048100-109 = "...But, what if your experiment fails?"
10048100-110 = "If I'm proven correct, what are you going to do for me?"
10048100-111 = "..."
10048100-112 = "...I'll assist you in your next pursuit...."
10048100-113 = "...with the full power of my Free Trade Cartel."
10048100-114 = "Miyo-miyo-miyo-miyo, isn't that too much of a gamble?!"
10048100-115 = "What if the people don't move like we think?!"
10048100-116 = "...I cannot passively watch and let art be stolen. We are Wildhunt students. We must stand for something."
10048100-120 = "Very well. I accept."
10048100-121 = "Since this intrigues me aesthetically..."
10048100-122 = "I will sneak in and hang the two paintings. There's a proper way to do these things, I'll have you know."
10048100-123 = "...Thank you."
10048100-124 = "Now, it is truly time for us to part."
10048100-125 = "I hope to see you again in a different form, Miyo."
10048100-126 = "...And Sensei."
10048100-127 = "[s] \"Bye, Madame Thief.\""
10048100-128 = "See ya later, Thiefster!!"
10048100-129 = "Fufu. I'm certain we shall meet again."
10048100-135 = "Miyo! They're drifting in front of the real one!"
10048100-136 = "We won! We did it!"
10048100-137 = "..."
10048100-138 = "Wh-What a relief."
10048100-143 = "Miyo?!"
10048100-144 = "Miyo?!"
10048100-150 = "This one...there's something about it."
10048100-151 = "It's the same painting, but it has...more soul?"
10048100-153 = "...I like this one more, too!"
10048100-154 = "Yes, me three!"
10048100-159 = "..."
10048100-160 = "(Why...!)"
10048100-161 = "(Why is everyone gathering in front of the authentic piece?!)"
10048100-162 = "(How do the ignorant, unwashed masses know...? How could they not be fooled by my genius?!)"
10048100-163 = "(And why did the Free Trade Cartel tell me that they finished the job?!)"
10048100-164 = "Hello there."
10048100-170 = "Wh-What's going on?"
10048100-171 = "Fufu. I think you know. This is YOUR work, is it not?"
10048100-172 = "Wh-What?!"
10048100-173 = "We'll discuss this at the station."
10048100-174 = "And do note, we are not the Valkyrie. You do not have the right to remain silent."
10048100-175 = "N-No! You got it all wrong."
10048100-176 = "I'm innocent! It was the Free Trade Cartel! They did this!"
10048100-177 = "Free Trade Cartel...?"
10048100-178 = "Fufu. You must be mistaken."
10048100-179 = "...Hm?"
10048100-183 = "There's no such organization in Wildhunt."
10048100-190 = "Take them away."
10048100-195 = "No! No! I have a mission, a mission to protect art from the ignorant! They cheated!"
10048100-209 = "So I lost this round, my clever little juniors."
10048100-210 = "...But I will not be so gentle in our next match."
10048100-211 = "Isn't that right, Sensei?"
10048100-212 = "[s] \"...You'll continue being the Thief.\""
10048100-213 = "Hm? Thief? I haven't the slightest idea what you mean, Sensei."
10048100-214 = "I'm just an officer of the Prefectural Council..."
10048100-215 = "...who arrested the forger and...denied the existence of any cartel."
10048100-216 = "[s1] \"You mean...\"\n[s2]\"You'll keep being 'Miria' and I'll be Sensei?\""
10048100-219 = "I suppose so."
10048100-220 = "What's that? You'll let me be so long as I don't \"cross the line\"?"
10048100-221 = "..."
10048100-222 = "Fascinating. If it's you, well, to be frank..."
10048100-223 = "I think being chased by you would be...a delightful aesthetic."
10048100-224 = "Every thief wants a good detective to be obsessed with her."
10048100-225 = "[s] \"Huh? A thief...?\""
10048100-226 = "Ah, I-It's nothing."
10048100-227 = "Anyway, I have one more task."
10048100-228 = "[s] \"One more task...?\""
10048100-229 = "Uh... W-Well, I was assigned to be your guide, Sensei."
10048100-230 = "Would you l-like me to show you the exhibition?"
10048100-231 = "[s] \"Of course! Lead the way!\""
10048100-232 = "Fu, fufu, very well, then..."
10048100-237 = "First, let's admire this work, \"The Love of Purple and Blue Light.\""

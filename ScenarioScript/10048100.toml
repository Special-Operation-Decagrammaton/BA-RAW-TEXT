[translation]
10048100-1 = "第10話;試驗的結果"
10048100-2 = "狂獵正門"
10048100-3 = "（隔天早上）"
10048100-4 = "哎呀，人還真多呢。"
10048100-5 = "不愧是「Veronica特展」……幾點才開放入場啊？"
10048100-6 = "快看圖錄，這幅畫也會展出耶！"
10048100-7 = "咦？我好像有在美術課本上看過！"
10048100-11 = "（吵吵鬧鬧……）"
10048100-17 = "（……這群連藝術是什麼都不懂的傢伙，還真好意思說三道四）"
10048100-18 = "（明明贗品就擺在眼前卻渾然不知……）"
10048100-19 = "（……讓我不禁想起了以前的往事）"
10048100-21 = "（那些對我傾注心血的原創畫作百般批評的評論家們……）"
10048100-22 = "（全都被我隨便畫的名畫贗品給騙得團團轉，甚至對其讚不絕口）"
10048100-23 = "（沒有任何人看著畫本身）"
10048100-24 = "（他們眼裡就只有畫作背後虛有其表的名氣而已）"
10048100-25 = "（人們自始至終都沒有洞察藝術真正面貌的眼光）"
10048100-27 = "[log=시민 동물6 의뢰인]所以人們沒有資格──[/log]"
10048100-31 = "[log=시민 동물6 의뢰인]欣賞真跡那偉大的氣場……！[/log]"
10048100-34 = "（因此，我才決定要將世上偉大的真跡一一換成贗品）"
10048100-35 = "（被暴露在那些無知之徒面前品頭論足，對偉大的作品而言想必是種屈辱吧）"
10048100-36 = "（……話說回來，昨晚我接到了特殊交易部的聯絡）"
10048100-37 = "（說是委託已經完成了）"
10048100-38 = "（……呵呵，很好。好戲才正要開始）"
10048100-39 = "（你們就用那副呆滯的表情，好好欣賞我那粗劣的偽畫吧）"
10048100-40 = "（以你們的程度，看看那種東西就已經足夠了……！）"
10048100-42 = "現在即將開放入場！請在這邊的入口排隊！"
10048100-43 = "麻煩先把票拿出來準備！"
10048100-44 = "呵呵，時間到了。"
10048100-45 = "走吧……！"
10048100-50 = "Veronica特展會場"
10048100-51 = "（吵吵鬧鬧……）"
10048100-55 = "怎麼回事啊？展覽怎麼會變成這樣？"
10048100-56 = "嗯……？為什麼同樣的畫會有兩幅……？"
10048100-58 = "而且那幅……不是很有名的畫嗎？"
10048100-59 = "什麼意思？是故意這樣安排的嗎？"
10048100-64 = "怎麼了？前面為什麼吵吵鬧鬧的？"
10048100-65 = "大家為什麼都不動呢……"
10048100-66 = "到底發生了什麼事？"
10048100-67 = "前面的，麻煩借過一下……"
10048100-72 = "什，什麼……！？"
10048100-77 = "兩幅一樣的畫掛在同一面牆上……！？"
10048100-78 = "這到底是怎麼回事……！"
10048100-80 = "[log]昨晚……[/log]"
10048100-82 = "狂獵空地"
10048100-83 = "怪盜你……並不相信任何人對吧？"
10048100-84 = "你認為人們沒有分辨贗品和真跡的能力，也不具備所謂審美的眼光。"
10048100-85 = "是這樣沒錯吧？"
10048100-86 = "正是如此。"
10048100-87 = "那我請教你一個問題。"
10048100-88 = "你有曾經想過要驗證那個想法嗎？"
10048100-89 = "驗證？"
10048100-90 = "是的。究竟人們是否真如你所想的那麼無知，我們就來實際測試一下吧。"
10048100-91 = "……從美學的角度來看，這倒是個有趣的提議。"
10048100-92 = "好吧。那麼你打算怎麼驗證呢？"
10048100-97 = "……我打算將《誰會喜愛紫與藍》的真跡和贗品，在同一個空間裡同時展出。"
10048100-98 = "……！"
10048100-99 = "觀眾一開始想必會感到混亂。"
10048100-100 = "然而過不了多久，人潮就會開始分成兩邊。"
10048100-101 = "有些人會停留在真跡前方，有些人則會停留在贗品前方……"
10048100-102 = "假如人們確實具備審美的眼光，就應該有更多人在真跡前聚集。"
10048100-103 = "假如沒有，那麼人潮就應該均等地分成兩半才對。"
10048100-104 = "……哦？"
10048100-105 = "要是聚集在真跡前的人更多，你就沒有理由偷走這幅畫了吧。"
10048100-106 = "因為那等同於是人們親自證明了自己具備欣賞藝術的眼光。"
10048100-107 = "呵呵，原來如此。"
10048100-108 = "好吧。如果情況真是如此，我就放棄偷走這幅畫。"
10048100-109 = "……但要是結果並非如此呢？"
10048100-110 = "如果反過來證明我的想法才是正確的，你們能為我做些什麼呢？"
10048100-111 = "……"
10048100-112 = "……日後我會幫你完成一件事。"
10048100-113 = "而且是以特殊交易部的名義。"
10048100-114 = "美代美代美代美代，這個賭注太大了啦！？"
10048100-115 = "要是觀眾的行動跟我們想的不一樣怎麼辦！？"
10048100-116 = "……總比眼睜睜看著真跡被偷走好吧。"
10048100-120 = "好，我接受這場賭注。"
10048100-121 = "畢竟這也頗能引起我的美學興趣。"
10048100-122 = "掛上兩幅畫的工作就由我來做吧。"
10048100-123 = "……謝謝你。"
10048100-124 = "那麼，現在真的來到該道別的時刻了。"
10048100-125 = "期待有朝一日，能以另一種樣貌再次相見，美代同學。"
10048100-126 = "……還有老師也是。"
10048100-127 = "[s]「祝你一路順風，怪盜同學。」"
10048100-128 = "怪盜醬，掰掰囉～！！"
10048100-129 = "呵呵……那麼，我們後會有期。"
10048100-135 = "美代！人們都聚集到真跡那邊了……！"
10048100-136 = "是我們贏了！"
10048100-137 = "……"
10048100-138 = "太，太好了……"
10048100-143 = "美代！？"
10048100-144 = "美代醬！？"
10048100-150 = "這張的氛圍……好像確實有點不太一樣？"
10048100-151 = "明明是同一幅畫，卻總覺得有點不同。"
10048100-153 = "……我也比較喜歡這邊的。"
10048100-154 = "我也是我也是。"
10048100-159 = "……"
10048100-160 = "（為什麼……！）"
10048100-161 = "（為什麼所有人都在往真跡那邊聚集！？）"
10048100-162 = "（那些無知的傢伙，是怎麼認出真跡的……！）"
10048100-163 = "（不對，在那之前……特殊交易部那些傢伙，明明跟我說完成了委託啊……！）"
10048100-164 = "您好。"
10048100-170 = "有，有什麼事嗎？"
10048100-171 = "在此我以涉嫌製作《誰會喜愛紫與藍》贗品的嫌疑將您逮捕。"
10048100-172 = "你，你說什麼！？"
10048100-173 = "詳細情況我們稍後再說。"
10048100-174 = "不過我們並非女武神，所以不會尊重您的緘默權……這點還請您諒解。"
10048100-175 = "不，不是！不是我！"
10048100-176 = "是特殊交易部！#n沒錯！是特殊交易部那些傢伙幹的！"
10048100-177 = "特殊交易部……？"
10048100-178 = "呵呵，看來您什麼都不知道呢。"
10048100-179 = "……？"
10048100-183 = "在我們狂獵，並不存在那樣的組織哦。"
10048100-190 = "帶走。"
10048100-195 = "不！不行！我還有使命必須完成！#n我得從無知的人類手中守護藝術啊……！"
10048100-209 = "這次是我輸了呢，後輩們。"
10048100-210 = "……不過下次的勝負，我可不會手下留情哦。"
10048100-211 = "您應該知道吧，老師？"
10048100-212 = "[s]「……你還不打算放棄當怪盜啊。」"
10048100-213 = "怪盜……？#n我不太明白您的意思呢，老師。"
10048100-214 = "我只不過是個逮捕製作贗品的嫌犯，並隱瞞特殊交易部存在的……"
10048100-215 = "……普通的舍監隊員罷了。"
10048100-216 = "[s1]「你的意思是在這裡……」\n[s2]「我們只是舍監隊員和老師的關係？」"
10048100-219 = "是的，大致上就是如此。"
10048100-220 = "嗯？您說要是哪天我真的越線了，身為老師恐怕無法坐視不管？"
10048100-221 = "……"
10048100-222 = "那也無妨。如果是老師的話……"
10048100-223 = "老師追捕我這件事本身，或許也不失為一種美學呢……"
10048100-224 = "因為怪盜……總是盼望著能夠捉拿自己的偵探出現啊……"
10048100-225 = "[s]「嗯？你說……什麼怪盜？」"
10048100-226 = "啊，啊啊，沒什麼。"
10048100-227 = "話說回來，我今天還被分配了額外的工作呢……"
10048100-228 = "[s]「額外的工作……？」"
10048100-229 = "就是……帶，帶老師您參觀展覽……也就是擔任導覽員……"
10048100-230 = "可，可以麻煩您配合這項工作嗎？"
10048100-231 = "[s]「嗯，那就拜託你囉。」"
10048100-232 = "呵，呵呵，那麼……"
10048100-237 = "就先從《誰會喜愛紫與藍》這幅作品開始說起吧？"

10048100-99 = "ผู้ชมอาจจะสับสนในตอนแรก"
10048100-100 = "แต่ในไม่ช้าก็จะแบ่งกันเป็น 2 กลุ่มค่ะ"
10048100-101 = "กลุ่มที่ยืนอยู่หน้าภาพจริง และกลุ่มที่ยืนอยู่หน้าภาพปลอม..."
10048100-102 = "ถ้าผู้คนมีวิสัยทัศน์ทางศิลปะจริงๆ ก็จะไปยืนอยู่หน้าภาพจริงกันเยอะกว่า"
10048100-103 = "แต่ถ้าไม่ใช่อย่างนั้น ฝูงชนก็จะแบ่งเป็น 2 ฝ่ายเท่าๆ กันค่ะ"
10048100-104 = "โอ้ว..."
10048100-105 = "ถ้ามีคนไปยืนหน้าภาพจริงมากกว่า คุณจอมโจรก็ไม่มีเหตุผลให้ขโมยภาพนั้นไปค่ะ"

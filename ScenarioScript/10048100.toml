10048100-116 = "ก็ยังดีกว่าการได้เห็นภาพจริงถูกขโมยไปต่อหน้าต่อตาค่ะ..."
10048100-120 = "ก็ได้ค่ะ ฉันรับข้อเสนอนี้"

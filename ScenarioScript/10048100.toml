10048100-72 = "อะ... อะไรน่ะ...?!"
10048100-77 = "ภาพวาดที่เหมือนกันเป๊ะ 2 ภาพแขวนอยู่ที่เดียวกัน...?!"
10048100-78 = "นี่มันเรื่องอะไรกัน...!"

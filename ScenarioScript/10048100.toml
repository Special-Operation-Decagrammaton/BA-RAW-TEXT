10048100-97 = "เราจะเอาทั้งภาพจริงและภาพปลอมของ <ใครเล่าจะหลงใหลสีม่วงกับสีคราม> ไปจัดแสดงด้วยกัน#nในที่เดียวกันค่ะ..."

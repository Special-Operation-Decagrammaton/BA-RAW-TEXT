10038010-10 = "5;현무상회 부원 B;02;작년에도 느꼈지만, 축제 준비라는 게 손이 정말 많이 간단 말이지."
10038010-11 = "3;현무상회 부원 A;02;어디에서 들은 이야기이긴 한데, 일 년 내내 축제만 준비하는 학원도 있대. 백귀…… 야행이었나?"

[translation]
10038010-1 = "Episode 1;An Unfortunate Accident"
10038010-5 = "Have you finished reviewing the merchant contract? How about the stage equipment?"
10038010-6 = "Let me just do one thing at a time... My head already feels like it's going to explode."
10038010-7 = "Yeah, same, but we've gotta keep going, right? The Festival is right around the corner, and we're all short-handed..."
10038010-8 = "This was easier when I was only in charge of the cooking..."
10038010-9 = "Eh, it's only once a year. We can get through it."
10038010-10 = "It's tough every year. Prepping a festival is just a ton of work."
10038010-11 = "I heard there's this one academy with festivals all year long. Hyakk...iyako?"
10038010-15 = "Seriously? How do the students there survive?"
10038010-20 = "Is everything going well? You two look a bit overwhelmed."
10038010-25 = "P-President?! No, we're good. This is nothing!"
10038010-26 = "Right? This is our big event. We've gotta be ready for it!"
10038010-28 = "Of course. Well, hang in there, and we can all have a nice, long rest when it's over."
10038010-37 = "I know this festival's good for our revenue, but..."
10038010-38 = "...making us responsible for half the security seems a little petty."
10038010-39 = "True, but Genryumon only nags us half as much now. It's got its pros and cons."
10038010-40 = "Con, everything in the aftermath falls entirely on me."
10038010-41 = "I have the utmost faith in you, Reijo."
10038010-42 = "I guess I'm fine with it, as long as those Genryumon executives don't make a big deal out of it. Ever since that Red Winter exchange meeting…"
10038010-43 = "Yes, I know. Let's put that aside for now."
10038010-44 = "What exactly happened at the Peking Opera Performance Hall? Do you happen to know? "
10038010-48 = "Genryumon only says there was a minor incident. That's all I've gotten out of them. "
10038010-49 = "Rumor has it the Peking Opera Club is on a full suspension now..."
10038010-50 = "I admit, I'm curious about it too, but..."
10038010-54 = "...well, that's enough about that. For now, let's just focus on the festival preparations."
10038010-58 = "......"
10038010-59 = "Understood, Miss President. "
10038010-60 = "(If Genryumon wants to keep their secrets, then they're going to stay kept, no matter what...)"
10038010-66 = "AHHH!"
10038010-71 = "What happened? Did you get hit with hot grease or something?"
10038010-80 = "...Oh, my."
10038010-81 = "What on earth is going on? I've never seen anything like this..."
10038010-86 = "Y-You... What did you...?"
10038010-91 = "I-I don't know! All of a sudden, my body was..."
10038010-92 = "You were fine a second ago. Did you...eat something strange?"
10038010-93 = "Not at all! I spent all day inspecting the festival site, so I just grabbed some fried rice for lunch!"
10038010-97 = "Wait... Look at you... You..."
10038010-103 = "M-Me too?!"
10038010-104 = "What is going on?!"
10038010-108 = "Miss President, what do we do?!"
10038010-109 = "First, let's contact Genryumon. The Eastern Alchemy Society, too!"
10038010-110 = "Genryumon...?!"
10038010-111 = "Under the circumstances, yes, we have to. And..."
10038010-120 = "Huh...?"
10038010-121 = "Uh... Um..."
10038010-122 = "What the heck is going on?!"
10038010-124 = "W-What?!"
10038010-125 = "Say again. Are you sure?"
10038010-127 = "Y-Yes! There is an unknown \"aging reversal phenomenon\"..."
10038010-131 = "...centered around the Black Tortoise Promenade right now!"
10038010-132 = "Black Tortoise Promenade President Akeshiro Rumi has been quarantined. These are the results of our investigation so far!"
10038010-136 = "Hmm... This is supposed to be an isolation room, but it feels more like an interrogation room. I feel like I shouldn't be here."
10038010-137 = "Please understand, President Rumi."
10038010-138 = "Do you have any theories on what could be causing this...\"age reversal phenomenon?\""
10038010-139 = "No idea..."
10038010-140 = "I don't remember eating or drinking anything strange, and I didn't go anywhere different."
10038010-141 = "I haven't even handled any suspicious ingredients recently. "
10038010-142 = "We've been preparing for the Moonlight Festival, and the food has to be certified before they can sell it."
10038010-143 = "So there was nothing out of the ordinary...except that the Black Tortoise Promenade members suddenly turned into children?"
10038010-144 = "That's all I know. First the others turned into children, then me."
10038010-148 = "We can't believe everything those Black Tortoise people say. They'll say anything for the sake of business!"
10038010-149 = "They've got to be hiding something."
10038010-154 = "I think not. If the Black Tortoise Promenade were behind this, their president, Rumi, would have found a way to stay safe first."
10038010-155 = "A plot in which the person behind it has the most to lose? Few strategies are ever that desperate."
10038010-159 = "Th-That's... Hmm, I see... Understood, Madam President."
10038010-161 = "Now, please continue."
10038010-166 = "Right! From what they've seen so far, the phenomenon has a sort of ripple effect, like a contagion."
10038010-167 = "The investigators on site are calling it \"Tyke Syndrome.\""
10038010-168 = "This Tyke Syndrome seems to have begun spreading from the Black Tortoise Promenade to the rest of Shanhaijing."
10038010-169 = "I see. Do we know how it spreads yet?"
10038010-170 = "N-Not yet... All we know is where it started, given who transformed first."
10038010-171 = "So far, no one's observed any symptoms other than the \"aging reversal.\" Also, the students of the Disciplinary Support Department—the Plum Blossom Garden—have not been affected."
10038010-172 = "All right. Good information. So..."
10038010-177 = "Distribute protective equipment to Genryumon members at the scene, on the double. "
10038010-178 = "At the same time, conduct an epidemiological study as quickly as possible."
10038010-179 = "Restrict access to the Black Tortoise Promenade Street until we have results from the study. "
10038010-181 = "Those are official orders from Ryuuge Kisaki, President of Genryumon."
10038010-186 = "Yes, at your command!"
10038010-191 = "Mina, it seems I need your strength again. "
10038010-192 = "Would you go provide assistance at the scene?"
10038010-193 = "Hup!"
10038010-194 = "Don't worry, Madam President! I won't let you down!"
10038010-199 = "Phew..."
10038010-200 = "[s] \"Did you really need to send Mina?\""
10038010-201 = "On a practical level, not so much. But she's a symbol, too. She represents the strength of Genryumon."
10038010-202 = "Her being there will send everyone a message."
10038010-203 = "What message, you ask? Nothing grandiose, per se..."
10038010-204 = "Just that, no matter what happens in Shanhaijing, the President of Genryumon will always be ready to help."
10038010-205 = "[s1] \"The fact that you have to send that message...\"\n[s2] \"...That sounds like a problem in itself.\""
10038010-208 = "...Is that how you feel?"
10038010-209 = "Fufu. Thank you for your candor, Sensei. In the past I...might not have had to make such an effort, but..."
10038010-210 = "...well, we're no longer in the past. Necessities have changed."
10038010-211 = "[s] \"Should I go help at the scene too?\""
10038010-212 = "You? Hmm... No, I don't think I can recommend that. "
10038010-213 = "Why not, you ask?"
10038010-217 = "Well, this is speculative on my part, but given the specific circumstances, they might not welcome you there."
10038010-220 = "Things sure are crazy right now."
10038010-221 = "Yeah, the Black Tortoise Promenade Street's restricted."
10038010-222 = "Supposedly, you need a Genryumon pass just to get in, and then even if you have it, the shops are mostly closed."
10038010-223 = "That's a shame. I really like the mapo tofu they sell there..."
10038010-224 = "But...are we going to be okay?"
10038010-225 = "What do you mean?"
10038010-226 = "Well...with that whole Tyke Syndrome..."
10038010-227 = "......"
10038010-228 = "I mean, Genryumon says it JUST turns you into children, nothing else, but..."
10038010-229 = "Even that would make a lot of things harder."
10038010-230 = "That's very true..."
10038010-232 = "Supposedly, Black Tortoise Promenade Street is where the whole thing first started."
10038010-233 = "You think maybe outsiders brought it over? Wouldn't be their first incident lately."
10038010-236 = "Plenty of outside students go in and out of the Black Tortoise Promenade, so it's possible something could have happened there..."
10038010-237 = "Is the Moonlight Festival going to be okay? If we let in more outsiders, we could have more problems."
10038010-240 = "Plus there's Schale's Sensei, over at Rikkagaku. Also an outsider."
10038010-241 = "Well, I'm sure Madam will do something about it. I heard Executive Officer Mina's already at the scene."
10038010-242 = "That does make me feel better..."
10038010-243 = "And just because it happened at Black Tortoise Promenade, we don't know if they caused it. They're still investigating that."
10038010-247 = "But if it wasn't Black Tortoise Promenade, then it must have been..."
10038010-256 = "W-Wait! This is unfair! The Eastern Alchemy Society has nothing to do with this!"
10038010-257 = "It's just a witness interview, so please come with us, President Saya."
10038010-258 = "Since you and the Eastern Alchemy Society are under suspicion, we have no choice. We ask for your understanding."
10038010-259 = "...Among the Shanhaijing students, the consensus is that if the Black Tortoise Promenade aren't responsible, the Eastern Alchemy Society must be."
10038010-264 = "And I'm telling you that it's not true! The Eastern Alchemy Society...."
10038010-270 = "(W-Wait... I gave Instructor Shun that info on the \"Rejuvenation Elixir.\" Did that get leaked somehow...?!)"
10038010-273 = "Um...just a shot in the dark, but...is this about the skin cream the Eastern Alchemy Society made...?"
10038010-274 = "The Eastern Alchemy Society made skin cream? This is the first I'm hearing about it."
10038010-275 = "Unrelated, but intriguing. Maybe you could give us a sample later."
10038010-279 = "Maybe you could let me skip the witness interview."
10038010-280 = "I said \"unrelated.\""
10038010-281 = "I figured as much, but still..."
10038010-282 = "Ugh... I suppose, when something happens on a pathological or pharmaceutical level, it's only natural to blame the Eastern Alchemy Society..."
10038010-283 = "That does make sense, but..."
10038010-284 = "It's still unfair! I really didn't do anything this time!"
10038010-286 = "\"This time\"...?"
10038010-291 = "...I misspoke!"
10038010-292 = "Well, again, this is just a witness interview."
10038010-293 = "For now, but it could turn into an interrogation!"
10038010-294 = "Hmm...I can't completely deny that possibility."
10038010-295 = "It's all up to Genryumon."
10038010-300 = "I have an interim report for you, Madam President."
10038010-301 = "Eastern Alchemy Society President Saya is cooperating with the investigation, but we haven't had any useful testimony yet."
10038010-302 = "What do you mean by \"yet\"?"
10038010-303 = "...Well, having participated in the questioning, I have a feeling that..."
10038010-308 = "...President Saya is withholding something."
10038010-309 = "She didn't seem completely surprised when we mentioned the \"aging reversal phenomenon\" in Shanhaijing..."
10038010-310 = "...Hmm, and she didn't deny knowing about it? Interesting. Despite her appearance, Saya is not a skilled liar..."
10038010-314 = "Hmm? What is it, Sensei? Do you have a hunch?"
10038010-315 = "[s] \"N-No, it's nothing at all.\""
10038010-316 = "Hmm...? Well, if you say so, Sensei. I'll trust you."
10038010-317 = "And if you ARE hiding something, I'm sure you have a good reason for doing so."
10038010-318 = "Very well, please continue your report."
10038010-319 = "Right! ...Besides everything else, there appears to be an unsettling rumor spreading among the Shanhaijing students."
10038010-320 = "Well, one wouldn't expect SETTLING rumors to be spreading at this particular moment, but... "
10038010-321 = "I'm assuming there's a good reason for including this in your report?"
10038010-325 = "Y-Yes. So the rumor is..."
10038010-336 = "Hey, did you hear the rumor?"
10038010-337 = "There are so many rumors going around these days... Which one?"
10038010-338 = "The one about how...the Eastern Alchemy Society President is back."
10038010-339 = "Huh? You mean Yakushi Saya? Is she back from a trip or something?"
10038010-340 = "No, not her. I mean the one before Saya..."
10038010-341 = "There was someone else before her...?"
10038010-342 = "I only heard it in passing, but I think she was called the...\"Monkey of the Senses.\" She was one of the Seven Prisoners."
10038010-346 = "Huh? Our school had one of the Seven Prisoners?"
10038010-347 = "That's what I hear. She was originally the President of the Eastern Alchemy Society, but then she got expelled."
10038010-348 = "I've never heard about any of this. So what was her name?"
10038010-349 = "The way I heard it, Shintani Kai."
10038010-350 = "...I've seriously never heard of her..."
10038010-351 = "Supposedly, some of the third-year students know about her."
10038010-355 = "...Is that so?"
10038010-356 = "...Yes. People are talking. Not many yet, but they are..."
10038010-357 = "......"
10038010-358 = "It would be difficult for an expelled student to return without any formal process."
10038010-359 = "Doubly so for Shintani Kai..."
10038010-360 = "However, for the students who remember her name...well, it's going to be quite an issue. If the rumor is false, we will need to silence it. "
10038010-364 = "Understood, Madam President!"
10038010-368 = "Phew..."
10038010-369 = "[s] \"There's something I don't understand.\""
10038010-370 = "Hmm? What is it, Sensei?"
10038010-371 = "Oh, is it about Shintani Kai...?"
10038010-372 = "......"
10038010-373 = "What if I told you...that there's nothing I can tell you about her?"
10038010-374 = "Oh, you're \"sure I have a good reason if I'm hiding something\"?"
10038010-378 = "Fufu. I suppose you've earned the right to throw that back at me."
10038010-382 = "...Please give me a little time, Sensei. Just a little time."
10038010-383 = "Not because I don't trust you, Sensei. This is my own issue..."
10038010-384 = "...and an issue pertaining to Shanhaijing's past."

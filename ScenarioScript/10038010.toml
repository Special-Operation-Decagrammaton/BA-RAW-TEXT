[translation]
10038010-1 = "ตอนที่ 1;เหตุที่คาดไม่ถึง"
10038010-5 = "ตรวจสอบสัญญาร้านค้าเสร็จแล้วหรือยัง? แล้วอุปกรณ์สำหรับการแสดงล่ะ?"
10038010-6 = "สั่งทีละอย่างเถอะนะ เอาทีละอย่าง... ตอนนี้หัวฉันจะระเบิดอยู่แล้ว"
10038010-7 = "แล้วจะให้ฉันทำยังไงล่ะ? เทศกาลเงาจันทร์ก็ใกล้เข้ามาแล้ว แต่เรามีคนไม่พอนี่นา..."
10038010-8 = "ตอนที่เราทำอาหารอย่างเดียวมันง่ายกว่านี้อีก..."
10038010-9 = "แต่เราก็จัดงานนี้กันทุกปีนี่นา อย่าบ่นให้มันมากนักเลย"
10038010-10 = "ปีที่แล้วฉันก็รู้สึกอย่างนี้นะ ฉันว่าการเตรียมงานเทศกาลเป็นงานที่ต้องลงแรงมากเลยละ"
10038010-11 = "ฉันเคยได้ยินมาว่ามีบางโรงเรียนที่เตรียมแต่งานเทศกาลกันทั้งปีด้วยนะ ชื่อโรงเรียนเฮียกคิ... ยาโค หรือเปล่านะ?"
10038010-15 = "จริงเหรอ? สงสัยจังเลยนะว่านักเรียนที่นั่นใช้ชีวิตยังไงกัน"
10038010-20 = "ทุกคนเตรียมงานกันเป็นยังไงบ้าง? งานเยอะเลยใช่มั้ย?"
10038010-25 = "ทะ... ท่านประธาน?! ไม่เลยค่ะ งานแค่นี้น่ะไม่เหนือบ่ากว่าแรงพวกเราเลยค่ะ!"
10038010-26 = "ใช่ค่ะ! เทศกาลเงาจันทร์เป็นงานที่สำคัญที่สุดของย่านการค้าเทพเต่าดำอยู่แล้วนี่คะ!"
10038010-28 = "ใช่แล้วละ เรามาทุ่มเทกับงานนี้กัน ไว้งานนี้จบแล้วค่อยมาพักผ่อนด้วยกัน พยายามกันต่ออีกหน่อยนะ เข้าใจมั้ย?"
10038010-37 = "ถึงเทศกาลเงาจันทร์จะเป็นงานที่ย่านการค้าเทพเต่าดำทำยอดขายมากๆ ได้ในคราวเดียวก็เถอะ..."
10038010-38 = "แต่การใช้สิ่งนั้นเป็นข้ออ้างในการโยนภาระเรื่องการรักษาความปลอดภัยในสถานที่จัดงานเทศกาลกว่า#nครึ่งหนึ่งให้กับย่านการค้าเทพเต่าดำ ฉันว่ามันเป็นเรื่องที่ดื้อรั้นมากเลยนะคะ..."
10038010-39 = "แต่ในทางกลับกัน แบบนี้ก็ทำให้พวกมังกรดำมาบ่นอะไรน้อยลงไม่ใช่เหรอ? ทุกอย่างในโลกล้วนมีทั้ง#nข้อดีและข้อเสียนั่นละ"
10038010-40 = "ถ้าไม่มีผลกระทบที่ตามมาถึงฉัน มันก็ดีอยู่หรอกค่ะ..."
10038010-41 = "อืม ฉันเชื่อใจเธอเสมอนะ เรย์โจว"
10038010-42 = "จะยังไงก็เถอะค่ะ หวังว่าคณะกรรมการมังกรดำจะไม่คอยมาจับผิดพวกเราอยู่นะคะ เพราะหลังจากงาน#nแลกเปลี่ยนกับเรดวินเทอร์แล้ว..."
10038010-43 = "เอาละๆ เรื่องนั้นเอาไว้คุยตอน... ไม่สิ เก็บเรื่องนั้นไว้ก่อนแล้วกัน"
10038010-44 = "เกิดเรื่องอะไรในเวทีแสดงงิ้วเหรอคะ? ท่านประธานรู้เรื่องมั้ยคะ? "
10038010-48 = "ทางมังกรดำบอกว่าเป็นแค่อุบัติเหตุเล็กๆ น้อยๆ แต่ก็ไม่ยอมบอกอะไรเพิ่มเติมเลยค่ะ "
10038010-49 = "ส่วนชมรมการแสดงงิ้วที่รับผิดชอบการแสดงชุดนั้นก็ปิดปากเงียบกันทั้งชมรมเลยด้วย..."
10038010-50 = "ถ้าฉันบอกว่าไม่สงสัยเกี่ยวกับเรื่องที่เกิดขึ้นวันนั้น ก็คงจะเป็นการโกหก..."
10038010-54 = "อืม... เลิกคุยเรื่องนี้ได้แล้ว! ตอนนี้การเตรียมงานเทศกาลเป็นเรื่องเร่งด่วนกว่านะ!"
10038010-58 = "..."
10038010-59 = "ค่ะ เข้าใจแล้วค่ะ ท่านประธาน "
10038010-60 = "(ถ้ามังกรดำพยายามจะปิดบังอะไรอย่างเอาเป็นเอาตายละก็ การจะสืบเรื่องพวกนั้นก็แทบจะเป็นไปไม่ได้#nอยู่แล้ว...)"
10038010-66 = "ว้าากกกกก?!"
10038010-71 = "เกิดเรื่องอะไรน่ะ? โดนน้ำมันร้อนๆ กระเด็นใส่เหรอ?"
10038010-80 = "ตายจริง..."
10038010-81 = "นี่มัน... อะไรกันคะเนี่ย? ฉันไม่เคยเจอเรื่องแบบนี้มาก่อนเลย..."
10038010-86 = "นะ... นี่เธอ... นี่มันอะไรกัน...!"
10038010-91 = "ฉะ... ฉันก็ไม่รู้เหมือนกัน! พอรู้ตัวอีกที ร่างกายของฉันก็เป็นแบบนี้ไปแล้ว...!"
10038010-92 = "แต่จนถึงเมื่อกี้เธอก็ยังปกติดีไม่ใช่เหรอ?! หรือว่ากินอะไรผิดสำแดงเข้าไป?"
10038010-93 = "เปล่านะ! วันนี้ฉันมัวแต่ตรวจสอบสถานที่จัดงานเทศกาลทั้งวัน เพิ่งจะได้กินแค่ข้าวผัดง่ายๆ ไปอย่าง#nเดียวเอง"
10038010-97 = "เอ๋...? จะว่าไปแล้ว... เธอก็...?"
10038010-103 = "ฉะ... ฉันก็ด้วยเหรอ?!"
10038010-104 = "นี่มันเรื่องอะไรกันน่ะ!?"
10038010-108 = "ทะ... ทำยังไงดีคะ ท่านประธาน?!"
10038010-109 = "ติดต่อมังกรดำก่อน! ชมรมวิจัยศาสตร์การปรุงยาด้วย!"
10038010-110 = "ให้บอกมังกรดำ... งั้นเหรอคะ?!"
10038010-111 = "ใช่ ตอนนี้เราต้องทำอย่างนั้นละ แล้วก็..."
10038010-120 = "เอ๊ะ?"
10038010-121 = "เอ๋...?!"
10038010-122 = "นี่มันเรื่องอะไรกันเนี่ย?!?!"
10038010-124 = "วะ... ว่าไงนะ?!"
10038010-125 = "บอกเรามาอีกครั้งสิ นั่นเรื่องจริงหรือ?"
10038010-127 = "ค่ะ ค่ะ! ตอนนี้ที่ย่านการค้าเทพเต่าดำ..."
10038010-131 = "กำลังเกิด 'ปรากฏการณ์เด็กลง' อย่างไม่ทราบสาเหตุค่ะ!"
10038010-132 = "มาตรการกักตัวและผลการตรวจสอบจากประธานอาเคชิโระ รูมิแห่งย่านการค้าเทพเต่าดำเป็นดังต่อไป#nนี้ค่ะ!"
10038010-136 = "อืม... ถึงนี่จะเป็นห้องกักตัว แต่ก็ให้ความรู้สึกเหมือนกำลังถูกไต่สวนอยู่เลยนะ รู้สึกแปลกๆ จังเลย"
10038010-137 = "ได้โปรดเข้าใจด้วยนะคะ ประธานรูมิ"
10038010-138 = "ประธานพอคาดเดาอะไรเกี่ยวกับ 'ปรากฏการณ์เด็กลง' ที่กำลังเกิดในตอนนี้ได้บ้างหรือเปล่าคะ?"
10038010-139 = "ให้คาดเดาสาเหตุน่ะเหรอ?"
10038010-140 = "ฉันไม่ได้ดื่มหรือกินอะไรแปลกๆ เข้าไปเป็นพิเศษ แล้วก็ไม่ได้แวะไปที่อื่นมาด้วย"
10038010-141 = "หมู่นี้มีการใช้วัตถุดิบอาหารแปลกๆ หรือเปล่าน่ะเหรอ? "
10038010-142 = "นี่ก็ใกล้จะถึงเทศกาลเงาจันทร์แล้ว ถ้าเราจะขายอาหารในงานเทศกาล เราก็จะขายแต่อาหารที่ผ่าน#nการตรวจสอบแล้วเท่านั้น"
10038010-143 = "ถ้างั้นก็แปลว่าไม่มีเรื่องอะไรเกิดขึ้นเป็นพิเศษ แต่จู่ๆ สมาชิกย่านการค้าเทพเต่าดำก็เด็กลงขึ้นมาอย่าง#nนั้นเหรอคะ?"
10038010-144 = "ก็... อย่างนั้นนั่นละ ตอนแรกเริ่มจากสมาชิกคนสองคนในย่านการค้า แล้วต่อมาก็เป็นฉัน..."
10038010-148 = "ฮึ่ม! จะให้ฉันเชื่อคำพูดของพวกย่านการค้าเทพเต่าดำที่พูดได้ทุกอย่างเพื่อหาเงินได้ยังไงกัน!"
10038010-149 = "ต้องมีเรื่องที่ไม่ยอมบอกหรือปิดบังพวกเราอยู่แน่ๆ!"
10038010-154 = "พอได้แล้ว หากเรื่องนี้เป็นฝีมือของย่านการค้าเทพเต่าดำจริงๆ ทางนั้นคงหามาตรการไม่ให้กระทบไป#nถึงประธานรูมิหรอก"
10038010-155 = "ถ้าแม้แต่ตัวเองก็ได้รับความเสียหายใหญ่หลวงขนาดนี้ มันจะเป็นอุบายที่ดีหรือ?"
10038010-159 = "ระ... เรื่องนั้นมัน...! จริงด้วยค่ะ... เข้าใจแล้วค่ะ ท่านประมุข"
10038010-161 = "มีข้อมูลอะไรเพิ่มหรือไม่ จงบอกเรามาให้หมด"
10038010-166 = "ค่ะ! ปรากฏการณ์เด็กลงนี้ดูจะเป็นโรคที่ระบาดได้ค่ะ"
10038010-167 = "ในบรรดาสมาชิกที่สืบสวนเรื่องนี้จากย่านการค้าอยู่เรียกโรคนี้ว่า 'โรคเด็กลง' ค่ะ!"
10038010-168 = "ปัจจุบันโรคเด็กลงที่ว่านี้เหมือนจะค่อยๆ แพร่กระจายจากย่านการค้าเทพเต่าดำไปยังส่วนอื่นทั่ว#nซานไห่จิงแล้วค่ะ!"
10038010-169 = "เข้าใจแล้ว แล้วมีการหาสาเหตุของโรคระบาดนั่นหรือยัง?"
10038010-170 = "ถ้าเป็นสาเหตุ เรายังไม่ได้คำตอบค่ะ...! แต่ก็ชัดเจนว่านักเรียนที่อยู่ใกล้แหล่งเกิดโรคในตอนแรกคือ#nจุดเริ่มต้นของการระบาดค่ะ!"
10038010-171 = "นอกจากนี้เรายังไม่พบอาการอื่นใดนอกเหนือจาก 'การเด็กลง' และมีรายงานว่าคนในฝ่ายสนับสนุน#nด้านวินัยสวนต้นบ๊วยไม่ได้รับผลกระทบของการระบาดนี้ค่ะ จบการรายงานค่ะ!"
10038010-172 = "อืม ขอบใจที่มาบอกนะ ถ้าเป็นเช่นนั้น..."
10038010-177 = "ให้จัดหาอุปกรณ์ป้องกันให้สมาชิกมังกรดำที่ไปสืบสวนในจุดที่มีการระบาดก่อน "
10038010-178 = "แล้วสั่งให้มีการสอบสวนทางระบาดวิทยาอย่างเร็วที่สุด"
10038010-179 = "และก็จำกัดการเข้าออกในย่านการค้าเทพเต่าดำ จนกว่าการสอบสวนทางระบาดวิทยาจะแล้วเสร็จ "
10038010-181 = "นี่คือเจตนารมณ์ของเรา ริวเกะ คิซากิ ผู้เป็นประมุขแห่งมังกรดำ"
10038010-186 = "ค่ะ! รับคำสั่งค่ะ!"
10038010-191 = "มินะ ดูเหมือนว่าครั้งนี้เราต้องยืมกำลังจากเธอแล้วละนะ "
10038010-192 = "ช่วยไปเป็นกำลังเสริมที่หน้างานให้ได้หรือไม่?"
10038010-193 = "!!!"
10038010-194 = "ไม่ต้องห่วงค่ะ ท่านประมุข! ฉันจะไม่ทำให้ท่านประมุขผิดหวังค่ะ!"
10038010-199 = "ฮู่ว..."
10038010-200 = "[s] \"จำเป็นต้องให้มินะไปช่วยถึงที่นั่นเลยเหรอ?\""
10038010-201 = "อืม ถ้ามองตามความเป็นจริงแล้ว เราไม่จำเป็นต้องส่งมินะที่เป็นสัญลักษณ์ของกำลังทหารของ#nมังกรดำไปที่นั่นหรอก"
10038010-202 = "แต่การส่งมินะไปที่นั่น... คือการบ่งบอกความตั้งใจบางอย่างของเราให้สมาชิกมังกรดำและนักเรียน#nของซานไห่จิงรู้น่ะ"
10038010-203 = "ความตั้งใจอะไรน่ะเหรอ? ไม่ใช่อะไรที่ยิ่งใหญ่หรอก"
10038010-204 = "เราแค่อยากให้ทุกคนได้รู้ว่าต่อให้เกิดเรื่องอะไรขึ้นในซานไห่จิง ประมุขแห่งมังกรดำก็จะไม่ทอดทิ้ง#nซานไห่จิงเด็ดขาด"
10038010-205 = "[s1] \"คงมีเหตุผลที่ทำให้คิซากิต้องบอกความตั้งใจแบบนั้นสินะ...\"\n[s2] \"การที่คิซากิอยากบอกความรู้สึกของตัวเอง มันกวนใจครูอยู่นะ\""
10038010-208 = "คิดเช่นนั้นหรือ..."
10038010-209 = "ฮุฮุ เราต้องแสดงความขอบคุณอย่างจริงใจกับครูแล้วสินะ ใช่แล้วละ ถ้าเป็นเมื่อก่อน... เราคงไม่จำเป็นต้องทำถึงขนาดนี้"
10038010-210 = "แต่ตอนนี้คือเวลาที่เราจำเป็นต้องปฏิบัติตัวแบบนั้นให้ทุกคนเห็นน่ะ"
10038010-211 = "[s] \"ให้ครูไปช่วยอะไรที่นั่นอีกคนมั้ย?\""
10038010-212 = "ครูเหรอ? ฮืม... ไม่หรอก เราไม่อาจแนะนำให้ครูไปทำถึงขนาดนั้นได้หรอก "
10038010-213 = "เพราะเหตุใดน่ะหรือ?"
10038010-217 = "นี่อาจเป็นเพียงการคาดเดาของเราคนเดียว แต่ที่แห่งนั้นน่ะ... ตอนนี้ครูอาจจะไม่เป็นที่ต้อนรับถึงเพียง#nนั้นก็ได้"
10038010-220 = "หมู่นี้มีเรื่องวุ่นวายเยอะจังเลยนะ"
10038010-221 = "ถนนในย่านการค้าเทพเต่าดำก็โดนจำกัดการเข้าออก..."
10038010-222 = "ถ้าจะไปถนนสายย่านการค้า เราก็ต้องขอบัตรผ่านที่ออกโดยมังกรดำใช่มั้ย? แต่ต่อให้ไปที่นั่น ร้านค้าส่วนใหญ่ก็คงปิดกันหมดละนะ"
10038010-223 = "ฉันชอบผัดเต้าหู้ของที่นั่นมากเลย น่าเสียดายจัง..."
10038010-224 = "ว่าแต่ พวกเราจะไม่เป็นอะไรเหรอ?"
10038010-225 = "อะไรเหรอ?"
10038010-226 = "ก็... โรคนั้นไง"
10038010-227 = "..."
10038010-228 = "ทางมังกรดำบอกว่าให้วางใจได้ เพราะนอกจากกลายเป็นเด็กแล้วก็ไม่มีความผิดปกติอื่นอีก..."
10038010-229 = "แต่ถ้าเป็นอย่างนั้น คนที่เด็กลงก็คงถูกจำกัดในหลายๆ เรื่องละเนอะ?"
10038010-230 = "ก็คงจะอย่างนั้นน่ะ..."
10038010-232 = "ได้ยินมาว่าโรคนี้เริ่มระบาดมาจากย่านการค้าเทพเต่าดำงั้นเหรอ?"
10038010-233 = "เป็นเพราะนักเรียนจากข้างนอกหรือเปล่านะ...? ก่อนหน้านี้ก็มีประเด็นอะไรกันอยู่ด้วย"
10038010-236 = "ก็นักเรียนจากภายนอกเข้ามาทางย่านการค้าเทพเต่าดำกันเยอะน่ะสิ... ไม่แปลกหรอกถ้าจะมีเรื่องอะไร#nเกิดขึ้นที่นั่น..."
10038010-237 = "เทศกาลเงาจันทร์ปีนี้จะเป็นยังไงบ้างนะ ถ้าเราต้อนรับนักเรียนจากโรงเรียนอื่น แล้วเกิดเรื่องใหญ่กว่านี้ล่ะ?"
10038010-240 = "นั่นสินะ ได้ยินว่าตอนนี้คุณครูของชาเล่ต์ก็มาอยู่ที่อาคารหกเหลี่ยมด้วยนี่นา? คุณครูคนนั้น... ก็ถือว่าเป็นคนนอกเหมือนกันใช่มั้ย?"
10038010-241 = "แต่ในเมื่อเกิดเรื่องถึงขนาดนี้แล้ว ท่านประมุขก็คงมีแผนรับมืออะไรสักอย่างนั่นแหละนะ เห็นว่าหัวหน้าคณะกรรมการมินะเองก็มาอยู่ที่ย่านการค้าด้วย"
10038010-242 = "แบบนั้นก็ค่อยวางใจได้หน่อยนะ..."
10038010-243 = "อีกอย่าง ตอนนี้เราก็ยังแน่ใจไม่ได้นี่นาว่าย่านการค้าเทพเต่าดำเป็นต้นตอของปัญหา เหมือนว่าจะยังมีการสืบสวนหลายๆ อย่างอยู่นะ"
10038010-247 = "แต่ยังไงก็คงเป็นหนึ่งในสองตัวการนั่นละ ถ้าไม่ใช่ย่านการค้าเทพเต่าดำ ก็ต้องเป็น...!"
10038010-256 = "ดะ... เดี๋ยวสิ! แบบนี้ไม่ยุติธรรมนะ! ชมรมวิจัยศาสตร์การปรุงยาไม่มีส่วนเกี่ยวข้องกับเรื่องนี้นะ!"
10038010-257 = "นี่เป็นการสอบสวนเพื่อเก็บข้อมูลค่ะ ไปกับเราก่อนเถอะค่ะ หัวหน้ายาคูชิ ซายะ"
10038010-258 = "ตอนนี้ทั้งหัวหน้าซายะและชมรมวิจัยศาสตร์การปรุงยาต่างก็ตกเป็นผู้ต้องสงสัย พวกฉันเองก็ต้องทำ#nตามหน้าที่อย่างช่วยไม่ได้ค่ะ ได้โปรดเข้าใจด้วยนะคะ"
10038010-259 = "ในบรรดานักเรียนของซานไห่จิง ก็ยังมีคนที่บอกว่าถ้าย่านการค้าเทพเต่าดำไม่ใช่ต้นเหตุ ก็คงเป็นชมรมวิจัยศาสตร์การปรุงยาที่อาจจะก่อเรื่องอะไรขึ้นมาก็ได้ค่ะ"
10038010-264 = "ก็บอกว่าฉันไม่เกี่ยวไง! ชมรมวิจัยศาสตร์การปรุงยาน่ะ...!"
10038010-270 = "(ระ... หรือว่า! ข้อมูลเกี่ยวกับ <ยาคืนวัยเยาว์> ที่ฉันเคยให้ผู้ฝึกสอนชุนไปเมื่อก่อนจะรั่วไหล...?!)"
10038010-273 = "เอ่อ... ขอถามเผื่อๆ ไว้หรอกนะ... นี่เป็นเพราะยาที่ทำให้ผิวพรรณนุ่มนวลที่ชมรมวิจัยศาสตร์การปรุงยา#nทำขึ้นเหรอ...?"
10038010-274 = "ชมรมวิจัยศาสตร์การปรุงยาผลิตยาอะไรแบบนั้นด้วยเหรอคะ? ไม่รู้มาก่อนเลยนะคะเนี่ย"
10038010-275 = "ยาที่ว่าก็ฟังดูน่าสนใจดีนะคะ ไว้ฉันขอตัวอย่างมาทดลองใช้บ้าง..."
10038010-279 = "ถ้าให้ตัวอย่างไปใช้ ท่านซายะจะได้รับการยกเว้นจากการสอบสวนมั้ยล่ะ?"
10038010-280 = "นั่นมันคนละเรื่องกันค่ะ"
10038010-281 = "คิดอยู่แล้วละว่าต้องเป็นอย่างนี้!"
10038010-282 = "ฮึ่ย... ถ้ามีเรื่องแปลกๆ เกี่ยวกับโรคหรือยาขึ้นมาละก็ ชมรมวิจัยศาสตร์การปรุงยาก็คงตกเป็น#nผู้ต้องสงสัยอย่างหลีกเลี่ยงไม่ได้สินะ"
10038010-283 = "ถ้าว่ากันตามเหตุผลก็คงจะเป็นอย่างนั้นหรอกนะ! แต่ว่า!"
10038010-284 = "แต่แบบนี้มันก็ไม่ยุติธรรมอยู่ดี! ครั้งนี้ท่านซายะไม่ได้ทำอะไรเลยนะ!"
10038010-286 = "'ครั้งนี้' อย่างนั้นเหรอคะ...?"
10038010-291 = "ก็แค่พูดไปอย่างนั้นน่า...!"
10038010-292 = "นี่เป็นเพียงการสอบสวนเพื่อเก็บข้อมูลค่ะ"
10038010-293 = "แต่ถ้าสอบสวนมากๆ เข้า สุดท้ายก็จะเป็นการสอบสวนผู้ต้องสงสัยไม่ใช่หรือไง?"
10038010-294 = "อืม... จะบอกว่าเป็นไปได้ก็ได้ค่ะ"
10038010-295 = "ถ้ามังกรดำพูดอย่างนั้น สุดท้ายมันก็ต้องเป็นอย่างนั้นน่ะสิ!"
10038010-300 = "ขอรายงานระหว่างปฏิบัติการค่ะ ท่านประมุข"
10038010-301 = "ตอนนี้ซายะ หัวหน้าชมรมวิจัยศาสตร์การปรุงยากำลังเข้ารับการสอบสวนอยู่ แต่จนถึงตอนนี้เราก็ยังไม่#nได้คำให้การที่พอจะเป็นเบาะแสได้เลยค่ะ"
10038010-302 = "เธอพูดว่า 'จนถึงตอนนี้' เช่นนั้นหรือ? เราหวังว่าคำนั้นจะไม่ได้มีความหมายอะไรใหญ่โตนะ"
10038010-303 = "เอ่อ เรื่องนั้นน่ะค่ะ... ท่านประมุข นี่เป็นเพียงความคิดเห็นของฉันที่เข้าร่วมการสอบสวนด้วย..."
10038010-308 = "แต่ดูเหมือนหัวหน้าซายะจะมีเรื่องที่ยังไม่ปริปากบอกค่ะ"
10038010-309 = "เธอไม่ได้บอกด้วยว่า 'ไม่รู้เกี่ยวกับปรากฏการณ์เด็กลง' ที่เกิดขึ้นในซานไห่จิงตอนนี้ค่ะ"
10038010-310 = "ไม่ได้ปฏิเสธโดยสิ้นเชิงเช่นนั้นหรือ? ช่างเป็นเรื่องแปลกนะ ถึงซายะจะดูเป็นแบบนั้น แต่เรารู้ดีว่าซายะไม่มีนิสัยขี้โกหก..."
10038010-314 = "หืม? ทำไมเหรอ ครู? พอจะคาดเดาอะไรได้หรือ?"
10038010-315 = "[s] \"มะ... ไม่หรอก! ไม่มีอะไรทั้งนั้น! อื้อ!\""
10038010-316 = "หืม...? ก็ได้ เราจะเชื่อครูแล้วกัน"
10038010-317 = "ถ้าครูตั้งใจจะปิดบังอะไรเรา ก็คงมีเหตุผลเพียงพอที่จะทำแบบนั้นละนะ"
10038010-318 = "เข้าใจแล้ว รายงานต่อได้เลย"
10038010-319 = "ค่ะ! แล้วก็... ตอนนี้มีข่าวลือเรื่องอื่นแพร่สะพัดในหมู่นักเรียนซานไห่จิงด้วยค่ะ!"
10038010-320 = "ในสถานการณ์แบบนี้ คงจะไม่ใช่ข่าวลือในแง่ดีสินะ"
10038010-321 = "แต่เธอก็คงมีเหตุผลที่ต้องมารายงานเรื่องข่าวลือนี้ถึงที่นี่ใช่มั้ยเล่า?"
10038010-325 = "ชะ... ใช่ค่ะ! พอดีว่าเนื้อหาของข่าวลือเรื่องนั้นมัน..."
10038010-336 = "นี่ ได้ยินข่าวลือนั่นหรือยัง?"
10038010-337 = "หมู่นี้ไม่ได้มีข่าวลือแค่อย่างสองอย่างนะ... ข่าวลือที่เธอว่ามันเรื่องไหนกันล่ะ?"
10038010-338 = "ก็... เรื่องที่หัวหน้าชมรมวิจัยศาสตร์การปรุงยากลับมาแล้วไง"
10038010-339 = "หืม? หัวหน้าของชมรมวิจัยศาสตร์การปรุงยาก็คือยาคูชิ ซายะไม่ใช่เหรอ? หรือว่าซายะไปที่ไหนมา?"
10038010-340 = "ไม่ใช่ หมายถึงนักเรียนที่เคยอยู่มาก่อนซายะน่ะ..."
10038010-341 = "มีนักเรียนแบบนั้นด้วยเหรอ...?"
10038010-342 = "ฉันก็รู้เท่าที่ได้ยินมาเท่านั้น แต่เห็นว่าเป็นวานร... แห่งสัมผัสทั้งห้าอะไรนี่ละ หนึ่งในเจ็ดอาชญากรน่ะ"
10038010-346 = "เอ๋? โรงเรียนเรามีเจ็ดอาชญากรอยู่ด้วยเหรอ?"
10038010-347 = "ก็ได้ยินมาอย่างนั้นน่ะ เดิมทีแล้วนักเรียนคนนั้นเป็นหัวหน้าชมรมวิจัยศาสตร์การปรุงยา แต่ก็โดนไล่ออกไปก่อน"
10038010-348 = "ฉันไม่เคยได้ยินมาก่อนเลย แล้วนักเรียนที่ว่าชื่ออะไรเหรอ?"
10038010-349 = "ชินทานิ ไค... ได้ยินว่าอย่างนั้นนะ"
10038010-350 = "เพิ่งเคยได้ยินชื่อนี้เป็นครั้งแรกเลยแฮะ..."
10038010-351 = "เห็นว่าในรุ่นพี่ปี 3 บางคนก็รู้จักด้วยนะ"
10038010-355 = "เธอพูดจริงหรือ?"
10038010-356 = "จริงค่ะ... ตอนนี้ความโกลาหลในหมู่นักเรียนยังมีไม่มากเท่าความหนักหน่วงของข่าวลือนั้น แต่การที่มีข่าวลือแบบนั้นไปทั่วซานไห่จิง มันก็เลย..."
10038010-357 = "..."
10038010-358 = "เป็นการยากที่นักเรียนที่ถูกไล่ออกไปจะกลับมาโรงเรียนเก่าโดยไม่ผ่านขั้นตอนอะไรเลย"
10038010-359 = "และยิ่งนักเรียนคนนั้นคือชินทานิ ไคด้วยแล้ว... ก็ยิ่งเป็นการยากเข้าไปใหญ่"
10038010-360 = "ถึงอย่างไรนี่ก็เป็นปัญหาที่เราไม่ควรมองข้าม เหล่านักเรียนยังจดจำชื่อของนักเรียนคนนั้นได้อยู่ ถ้านั่นเป็นแค่ข่าวลือ เราก็ต้องทำให้มันซาลงก่อน "
10038010-364 = "เข้าใจแล้วค่ะ ท่านประมุข!"
10038010-368 = "เฮ้อ..."
10038010-369 = "[s] \"ครูมีเรื่องที่สงสัยมาตั้งแต่เมื่อกี้แล้ว\""
10038010-370 = "หืม? เรื่องอะไรหรือ ครู?"
10038010-371 = "อ่า... เรื่องเกี่ยวกับชินทานิ ไคสินะ..."
10038010-372 = "..."
10038010-373 = "ถ้าเราบอกว่าตอนนี้คงยากที่จะพูดถึงเรื่องของไค ครูจะว่าอย่างไรเล่า?"
10038010-374 = "ถ้าเราตั้งใจจะปิดบังอะไรกับครู เราก็คงมีเหตุผลที่เลือกทำเช่นนั้นอย่างนั้นหรือ?"
10038010-378 = "ฮุฮุ เหมือนโดนคำของตัวเองเล่นงานเลยสินะ ใช่แล้วละ ครูมีสิทธิ์พูดอย่างนั้นกับเรา"
10038010-382 = "ขอเวลาเราสักหน่อยนะ ครู... แค่นิดเดียวก็พอ"
10038010-383 = "ปัญหาไม่ได้อยู่ที่ครูหรอก ปัญหาเป็นที่ตัวเราเองน่ะ..."
10038010-384 = "อีกอย่าง... นี่เป็นปัญหาเกี่ยวกับอดีตของซานไห่จิงด้วย"

10038010-6 = "5;현무상회 부원 B;06;한 번에 하나씩 하자. 하나씩……. 안 그래도 지금 머리가 터질 것 같다고.\n#5;em;[한숨]\n#3;m1\n#5;al"
10038010-7 = "3;현무상회 부원 A;00;어쩌겠어. 월영제는 코 앞이고, 일손은 모자라고……."
10038010-8 = "5;현무상회 부원 B;01;요리만 할 때가 차라리 편했던 것 같아…….\n#5;stiff"

10038010-37 = "3;레이죠;02;월영제는 분명 현무상회의 매상을 한 번에 끌어올릴 수 있는 기간이기는 합니다만…….\n#3;em;…"
10038010-38 = "3;레이죠;99;그걸 빌미로, 축제 현장의 치안 관리까지 우리 현무상회에게 반쯤 떠넘긴다는 것은, 어떤 종류의 심술마저 느껴진단 말이죠……."
10038010-39 = "5;루미;00;뭐, 그 대신 현룡문 애들의 잔소리도 줄어드는 편이잖아? 세상만사, 일장일단이 있기 마련이지.\n#5;em;[음표]\n#5;al\n#3;m1"
10038010-40 = "3;레이죠;14;그 여파가 보통 고스란히 저에게 돌아온다는 부분만 뺀다면요……."
10038010-41 = "5;루미;01;응. 늘 믿고 있다고, 레이죠."
10038010-42 = "3;레이죠;12;아무래도 좋으니, 현룡문 집행부 쪽에서 트집이나 잡지 않았으면 좋겠네요. 안 그래도 그때 붉은겨울 교류회 이후로……."
10038010-43 = "5;루미;03;자, 자. 그 이야기는 지금은…… 아니, 당분간 접어 두자고."
10038010-44 = "3;레이죠;02;경극 공연장에서 정확히 무슨 일이 일어난 걸까요? 회장님은 알고 계십니까? \n#3;em;[?]"

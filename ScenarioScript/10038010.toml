[translation]
10038010-1 = "第1話;不祥的異變"
10038010-5 = "攤位合約檢查完了嗎？表演器材呢？"
10038010-6 = "一件一件來吧……我的頭已經快爆炸了。"
10038010-7 = "我也沒辦法。#n現在月影祭迫在眉睫，人手又不夠……"
10038010-8 = "還是只做料理的時候比較輕鬆……"
10038010-9 = "哎呀～每年都是這樣的嘛。你就別抱怨了。"
10038010-10 = "我去年就這麼覺得了，準備慶典真的很費工夫。"
10038010-11 = "聽說有個學園，好像一年到頭都在準備慶典哦。#n記得是叫百鬼……夜行嗎？"
10038010-15 = "真的假的……真好奇那裡的學生到底都是怎麼過活的。"
10038010-20 = "大家準備得怎麼樣？會不會覺得工作有點多？"
10038010-25 = "會，會長！？#n不會不會，這種程度不算什麼！對吧？"
10038010-26 = "就是說啊！月影祭畢竟是玄武商會一年中最重要的時刻之一嘛！"
10038010-28 = "很好很好。大家一起努力加油，等活動結束再一起好好休息。#n只要再辛苦一陣子就行了，好嗎？"
10038010-37 = "雖然月影祭確實是玄武商會衝業績的好時機……"
10038010-38 = "但是就因為這種理由，把一半慶典現場的治安管理工作推給我們實在有點……"
10038010-39 = "哎呀～不過這樣一來，玄龍門的嘮叨也會相對減少不是嗎？#n世事總是有利有弊的。"
10038010-40 = "前提是這些麻煩事不會落在我身上……"
10038010-41 = "嗯，我一直都很仰賴你唷，令女。"
10038010-42 = "只希望玄龍門的執行部不要再來找麻煩了。#n自從那場赤冬交流會之後……"
10038010-43 = "好了好了，這個話題現在……不，短時間內都別再提了吧。"
10038010-44 = "京劇劇場那天到底發生了什麼？會長您知道嗎？"
10038010-48 = "玄龍門那邊只說發生了一點小事故，其餘的消息都不願透露。"
10038010-49 = "而負責表演的京劇部，所有人又都在反省中……"
10038010-50 = "我也不能說對那天發生的事完全不感興趣……"
10038010-54 = "唔嗯……這個話題還是到此為止吧！"
10038010-58 = "……"
10038010-59 = "我明白了，會長。"
10038010-60 = "（反正玄龍門如果想全力隱瞞，要查出真相幾乎是不可能的……）"
10038010-66 = "哇啊啊啊啊！？"
10038010-71 = "怎麼了？濺到熱油了嗎？"
10038010-80 = "……真不敢相信。"
10038010-81 = "這……到底是怎麼回事？#n這種情況，我這輩子還是第一次遇見……"
10038010-86 = "你，你……怎麼會變成這樣……！"
10038010-91 = "我，我也不知道啊！回過神來就變成這樣了……"
10038010-92 = "可是剛才明明還好好的啊！你是不是吃了什麼奇怪的東西？"
10038010-93 = "才沒有！我今天一整天都在檢查慶典現場，只簡單吃了點炒飯而已！"
10038010-97 = "咦……？這麼說來，你不是也……？"
10038010-103 = "我，我也變成這樣了！？"
10038010-104 = "這到底是什麼情況！？"
10038010-108 = "該，該怎麼辦，會長！？"
10038010-109 = "總之先聯絡玄龍門吧！還有鍊丹術研究會也是！"
10038010-110 = "聯絡玄龍門……是嗎！？"
10038010-111 = "沒錯，現在必須這麼做。#n還有──"
10038010-120 = "嗯……？"
10038010-121 = "咦咦……！？"
10038010-122 = "這到底怎麼回事！？！？"
10038010-124 = "你說……什麼！？"
10038010-125 = "重新報告一次。此事是否屬實？"
10038010-127 = "是，是！目前以玄武商會為中心……"
10038010-131 = "出現了原因不明的「還童現象」！"
10038010-132 = "以下是對玄武商會會長．朱城瑠美的隔離措施及調查結果！"
10038010-136 = "唔嗯……雖然說是隔離室，但總有種像是被審問的感覺……心情有點微妙呢。"
10038010-137 = "這點還請您諒解，瑠美會長。"
10038010-138 = "有關會長現在經歷的……「還童現象」，您有什麼頭緒嗎？"
10038010-139 = "頭緒啊……"
10038010-140 = "我不記得有吃到什麼奇怪的東西，也沒去過什麼特別的地方。"
10038010-141 = "最近也沒有處理可疑的食材哦？"
10038010-142 = "畢竟月影祭在即，想在慶典上做生意的話，就只能提供經過檢驗的食物嘛。"
10038010-143 = "所以您的意思是……明明沒做什麼特別的事，玄武商會的成員就突然變成了小孩？"
10038010-144 = "大概就是這樣吧。#n一開始是先在成員身上發生，然後就連我也……"
10038010-148 = "哼！玄武商會那些傢伙，為了做生意什麼話都說得出來！怎麼能完全相信呢！"
10038010-149 = "他們一定還隱瞞著什麼！"
10038010-154 = "夠了。假如此事真是玄武商會從中作梗，瑠美會長理應設法保全自己才是。"
10038010-155 = "即便是苦肉計也會有個限度，沒必要賠了夫人又折兵。"
10038010-159 = "這，這……確實如此。#n我明白了，門主大人。"
10038010-161 = "繼續報告吧，妾身在聽。"
10038010-166 = "是！這種還童現象，似乎具有擴散或傳染性。"
10038010-167 = "因此在現場調查的成員之間被稱為「還童症」！"
10038010-168 = "而還童症目前正以玄武商會為中心，逐漸向整個山海經蔓延！"
10038010-169 = "明白了。#n那麼傳染……傳播的機制查明了嗎？"
10038010-170 = "還，還沒有……！#n不過最初發生變化的學生就是起點，這點應該不會有錯。"
10038010-171 = "同時除了「還童」以外，目前還沒有觀察到其他症状。#n此外，培育支援部梅花園的學生並未受到影響！報告完畢！"
10038010-172 = "明白。有勞汝了。#n那麼……"
10038010-177 = "首先，迅速向現場的玄龍門成員發放防護裝備。"
10038010-178 = "同時盡快進行流行病學調查。"
10038010-179 = "在調查完成之前，禁止無關人士進出玄武商會。"
10038010-181 = "此即玄龍門門主，龍華妃姬的裁決。"
10038010-186 = "是！遵命！"
10038010-191 = "美奈，看來這次必須借助汝的力量了。"
10038010-192 = "能請汝到現場幫忙嗎？"
10038010-193 = "！！！"
10038010-194 = "請放心，門主大人！我絕不會讓您失望！"
10038010-199 = "呼……"
10038010-200 = "[s]「有必要讓美奈也去現場幫忙嗎？」"
10038010-201 = "若僅從現實層面來看，確實不必特意派遣象徵玄龍門武力的美奈。"
10038010-202 = "之所以讓美奈於現場露面……為的是向玄龍門成員與山海經的學生傳達某種訊息。"
10038010-203 = "何種訊息？#n其實並非什麼大事。"
10038010-204 = "不過是想表明無論山海經發生任何事，玄龍門的門主都不會棄山海經於不顧罷了。"
10038010-205 = "[s1]「竟然需要妃姬特地傳達這件事……」\n[s2]「總覺得讓人心裡很不是滋味。」"
10038010-208 = "……汝是這麼想的嗎。"
10038010-209 = "呵呵，真心感謝汝的關心，老師。#n是啊，若在以前……或許根本不必多此一舉。"
10038010-210 = "只可惜以現狀而言，藉此明志似乎有其必要。"
10038010-211 = "[s]「我也去現場幫忙吧？」"
10038010-212 = "由老師親赴現場？#n呼呣……不，妾身並不建議汝這麼做。"
10038010-213 = "何出此言？"
10038010-217 = "雖說這僅是妾身的猜測，但就目前現場的情況看來……怕是連老師也不會受到歡迎。"
10038010-220 = "最近真的是亂糟糟的。"
10038010-221 = "連玄武商會街也被管制了……"
10038010-222 = "要進商會街就需要玄龍門發的通行證對吧？#n而且就算進去，大部分的店鋪也沒在營業。"
10038010-223 = "我很喜歡那裡的麻婆豆腐的說，真可惜……"
10038010-224 = "話說我們應該不會有事吧？"
10038010-225 = "什麼意思？"
10038010-226 = "就那個……症狀啊。"
10038010-227 = "……"
10038010-228 = "雖然玄龍門說除了變成小孩之外不會有太大的問題，要大家不用擔心……"
10038010-229 = "但就算只是這樣，還是會有很多限制吧？"
10038010-230 = "這麼說也沒錯啦……"
10038010-232 = "話說最先出現症狀的地方，就是玄武商會街沒錯吧？"
10038010-233 = "問題果然是外部學生引發的嗎……？#n前陣子好像也鬧得很大。"
10038010-236 = "玄武商會有很多外部學生進出，說不定就是因為這樣才會出事……"
10038010-237 = "這次的月影祭真的沒問題嗎？#n如果再開放外部學生進來，事情會不會變得更嚴重啊？"
10038010-240 = "我還聽說夏萊的老師，現在人好像就在六和閣哦？#n雖然說是老師……終究也是外部的人吧？"
10038010-241 = "不過事情都鬧得這麼大了，門主大人應該會想辦法解決吧？#n美奈執行部長好像也親自到現場處理了。"
10038010-242 = "這倒是多少能讓人安心一點……"
10038010-243 = "而且也不能確定玄武商會就是問題的根源吧？#n目前都還在調查當中。"
10038010-247 = "但答案已經呼之欲出了吧？#n如果不是玄武商會的話，只可能是那裡了……"
10038010-256 = "等，等等！冤枉啊！#n我們鍊丹術研究會和這次事件無關！"
10038010-257 = "我們只是要調查事情經過而已。#n麻煩跟我們走一趟吧，藥子沙耶會長。"
10038010-258 = "由於您與鍊丹術研究會的會員都在嫌疑範圍內，我們也無可奈何。#n還請您諒解。"
10038010-259 = "……何況在山海經的學生眼中，#n如果問題的來源不是玄武商會的話，多數人都會懷疑是鍊丹術研究會在搞鬼才對……"
10038010-264 = "就說了不是我們做的！#n我們鍊丹術研究會，煉丹術研究會……！"
10038010-270 = "（難，難道是之前給旬教官的「回春秘藥」的情報洩露了……！？）"
10038010-273 = "那個……以防萬一我想確認一下……#n有可能是鍊丹術研究會製作的……那個會讓皮膚變柔軟的藥引起的嗎？"
10038010-274 = "鍊丹術研究會還會製作這種藥嗎？我還是第一次聽說。"
10038010-275 = "話說這藥的內容還挺讓人感興趣的。之後能給我一些樣品嗎……"
10038010-279 = "那樣可以免除調查嗎？"
10038010-280 = "這是兩回事。"
10038010-281 = "我就知道！"
10038010-282 = "唔唔……一旦出現跟病理學或藥學相關的事件，鍊丹術研究會被懷疑也很正常。"
10038010-283 = "雖然客觀上是這樣沒錯！但還是很冤枉！"
10038010-284 = "這次我真的什麼都沒做啊！"
10038010-286 = "「這次」……？"
10038010-291 = "……剛才是我不小心口誤了啦！"
10038010-292 = "算了，畢竟現在只是協助調查而已。"
10038010-293 = "可是……調查繼續進行下去的話，是不是有可能變成嫌疑人？"
10038010-294 = "這個嘛……無法完全否定這種可能性。"
10038010-295 = "你們玄龍門都這麼說了，不就代表最後肯定會變成那樣嗎──！"
10038010-300 = "在此向您報告當前的調查進度，門主大人。"
10038010-301 = "現任鍊丹術研究會的會長沙耶雖然積極配合審問，#n但到目前為止，他並未提供任何有用的證詞。"
10038010-302 = "汝剛才是說「目前為止」？#n但願這只是不具意義的修飾詞。"
10038010-303 = "……那個，門主大人。#n儘管這只是我個人參與審問時的感覺……"
10038010-308 = "沙耶會長似乎隱瞞了什麼。"
10038010-309 = "從他的口氣聽來，並不像是對這次山海經的「還童現象」一無所知。"
10038010-310 = "也就是說，他並未矢口否認？這可真奇怪。#n沙耶雖然外表如此，實則並非擅長說謊之人……"
10038010-314 = "嗯？汝怎麼了，老師？#n想到了什麼線索嗎？"
10038010-315 = "[s]「啊，不！沒什麼！嗯！」"
10038010-316 = "呼呣……？#n也罷，妾身願意相信老師。"
10038010-317 = "若老師刻意對妾身有所隱瞞，想必也有相應的理由才是。"
10038010-318 = "明白了。繼續說吧。"
10038010-319 = "是！除此之外……目前在山海經的學生之間，似乎正流傳著另一個不安的傳聞！"
10038010-320 = "眼下情況如此，想必難以出現正面傳聞。"
10038010-321 = "然汝特意於此報告，一定有其原因吧？"
10038010-325 = "是，是的！至於傳聞的內容……"
10038010-336 = "你聽說了嗎？"
10038010-337 = "最近傳聞那麼多……你指的是哪個啊？"
10038010-338 = "就是……鍊丹術研究會的會長回來了那個。"
10038010-339 = "嗯？鍊丹術研究會的會長不是藥子沙耶嗎？他之前去哪裡了嗎？"
10038010-340 = "不是指沙耶，是在他之前的會長……"
10038010-341 = "有這麼一個學生嗎……？"
10038010-342 = "我也是聽別人說的。#n好像是叫五塵的……獼猴？還是七罪人之一哦。"
10038010-346 = "咦？原來我們學校有七罪人嗎？"
10038010-347 = "聽說是哦。#n那名學生原本是鍊丹術研究會的會長，結果後來被退學了。"
10038010-348 = "這我還是第一次聽說。#n那他叫什麼名字？"
10038010-349 = "叫作申谷誡。"
10038010-350 = "我還真沒聽過……"
10038010-351 = "三年級的前輩當中，好像還有人知道他哦。"
10038010-355 = "此事當真？"
10038010-356 = "是的……雖說與其內容相比，目前造成的影響不算大，但光是此一傳言正在流傳……"
10038010-357 = "……"
10038010-358 = "已遭退學的學生，想不經任何手續就回歸母校十分困難。"
10038010-359 = "若對象是那個申谷誡……則更是如此。"
10038010-360 = "對仍記得這個名字的學生而言，此乃不容忽視之問題。#n倘若有此謠言，務必盡速屏除。"
10038010-364 = "明白了，門主大人！"
10038010-368 = "呼……"
10038010-369 = "[s]「有件事我從剛才就不是很懂。」"
10038010-370 = "嗯？汝所謂何事，老師？"
10038010-371 = "啊，是關於申谷誡嗎……"
10038010-372 = "……"
10038010-373 = "假如妾身表示眼下難以談論誡的事，汝會怎麼做呢？"
10038010-374 = "若妾身刻意有所隱瞞，想必也有相應的理由？"
10038010-378 = "呵呵，看來這次是妾身自討苦吃了呢。#n也是，老師的確有資格這麼說。"
10038010-382 = "……能否給妾身一些時間呢，老師。#n即便僅有片刻也無妨。"
10038010-383 = "這並非老師，而是妾身自己的問題……"
10038010-384 = "……同時也是有關山海經過去的問題。"

[translation]
2300805-1 = "The Body Keeps the Score"
2300805-2 = "(I was worried and headed to Mari's room for a visit.)"
2300805-6 = "Who is it?"
2300805-7 = "[s1] \"I'm here to visit you.\"\n[s2] \"Am I interrupting your rest?\""
2300805-10 = "...?!"
2300805-11 = "S-Sensei?! What brings you here?!"
2300805-12 = "W-Wait just a second! Please, give me a moment."
2300805-20 = "P-Please come in, Sensei."
2300805-21 = "I'm sorry. I haven't had a chance to clean my room..."
2300805-22 = "You don't mind?"
2300805-23 = "B-But..."
2300805-24 = "What? You want me to stay in bed and rest? B-But you're already here, Sensei. How could I?!"
2300805-25 = "[s3] \"If you don't, then there's no point in me visiting.\"\n[s4] \"Shouldn't your sickness take priority?\""
2300805-26 = "Well..."
2300805-27 = "Well..."
2300805-28 = "I-I understand. You came all the way here, so I shouldn't make things harder for you."
2300805-29 = "Then, just as you asked..."
2300805-34 = "(Mari went back to bed and lay down with a blanket.)"
2300805-35 = "I hope you didn't worry too much. It's only a small sickness."
2300805-36 = "[s] \"How are you feeling?\""
2300805-37 = "Ahaha... I made you worry after all. I'm sorry."
2300805-38 = "Now that I've had some rest, I feel much better. I will be back to my duties tomorrow."
2300805-39 = "It feels a little strange for a Sister like me to be receiving encouragement. I should be encouraging others."
2300805-40 = "Aha...ha..."
2300805-41 = "..."
2300805-46 = "[ns5] \"...Mari?\"\n[ns6] \"Is there something you'd like to tell me?\""
2300805-49 = "Well... Um..."
2300805-50 = "Honestly..."
2300805-51 = "Lately, I've been feeling a little fatigued from work...so I thought it'd be nice to take a day off."
2300805-52 = "I think the current state of my health...may be due to that desire."
2300805-53 = "The other Sisters are all working hard as well, so maybe I'm just being a baby."
2300805-54 = "Is it because I was harboring thoughts unbecoming of a Sister that my body is punishing me like this?"
2300805-55 = "Huh?"
2300805-56 = "You think it isn't punishment, but assistance? From my body?"
2300805-57 = "Um, I'm not sure I follow. How is this assistance?"
2300805-58 = "[s7] \"Because it's better for you to be healthy.\"\n[s8] \"So you can continue to work as a Sister.\""
2300805-64 = "...?"
2300805-65 = "..."
2300805-66 = "Heehee. I understand what you meant. I suppose that's one possible perspective."
2300805-72 = "Thank you, Sensei. I somehow feel refreshed thanks to you."
2300805-73 = "Not just my body...but my spirit too."
2300805-74 = "Even while resting, I couldn't relieve myself of my guilt, but you resolved it so easily."
2300805-75 = "You're really very adept at putting me at ease, Sensei. I feel I must learn from you."
2300805-76 = "If I ever get the chance and if it's all right with you, Sensei, then..."
2300805-77 = "Hm?"
2300805-78 = "Oh. I obviously didn't mean today."
2300805-79 = "Like you said, I should only focus on resting today."
2300805-80 = "But tomorrow, and from now on..."
2300805-81 = "I'll look forward to it."
2300805-83 = "(Afterward, I kept Mari company and took care of her while she rested.)"
2300805-84 = "(Once I saw that Mari was indeed asleep, I returned to Schale.)"

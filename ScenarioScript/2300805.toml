[translation]
2300805-1 = "ร่างกายลงโทษ"
2300805-2 = "(คุณครูรู้สึกเป็นห่วงจึงแวะไปที่ห้องของมารีเพื่อไปเยี่ยมไข้)"
2300805-6 = "...? ใครคะ...?"
2300805-7 = "[s1] \"ครูมาเยี่ยมน่ะ\"\n[s2] \"ครูมากวนตอนกำลังพักผ่อนรึเปล่า?\""
2300805-10 = "...!?"
2300805-11 = "คะ...คุณครู...!? ทำไมคุณครูถึงมาที่นี่..."
2300805-12 = "เดี๋ยวก่อนค่ะ! รบกวนรอสักครู่นะคะ..."
2300805-20 = "ชะ...เชิญเข้ามาได้เลยค่ะ... คุณครู"
2300805-21 = "ขอโทษด้วยค่ะ คือฉันยังไม่ได้ทำความสะอาดห้อง..."
2300805-22 = "ไม่เป็นไรเหรอคะ?"
2300805-23 = "แต่ว่า..."
2300805-24 = "คะ...? ให้ฉันไปนอนพักผ่อนบนเตียงเหรอคะ? ตะ...แต่ว่าคุณครูมาทั้งทีจะให้ฉันนอนได้ยังไงคะ..."
2300805-25 = "[s3] \"ถ้าเธอไม่พักผ่อนครูก็ไม่ได้เฝ้าไข้สิ\"\n[s4] \"คนที่ป่วยน่ะสำคัญกว่าอีกนะ\""
2300805-26 = "แบบนั้นมัน..."
2300805-27 = "แบบนั้นมัน..."
2300805-28 = "อ่า... เข้าใจแล้วค่ะ คุณครูอุตส่าห์มาถึงที่นี่ จะทำให้คุณครูลำบากใจไม่ได้ค่ะ"
2300805-29 = "ถ้างั้นฉันจะทำตามที่คุณครูบอก..."
2300805-34 = "(มารีกลับไปบนที่นอนและดึงผ้าห่มมาคลุมตัวอีกครั้ง)"
2300805-35 = "ขอโทษนะคะที่ทำให้คุณครูต้องเป็นห่วง มันไม่ใช่เรื่องใหญ่เลยแท้ๆ..."
2300805-36 = "[s] \"ดีขึ้นบ้างรึเปล่า?\""
2300805-37 = "แหะๆ... ฉันทำให้คุณครูเป็นห่วงจริงๆ สินะคะ ขอโทษค่ะ"
2300805-38 = "ค่ะ... พอได้นอนพักก็รู้สึกดีขึ้นมากแล้วค่ะ พรุ่งนี้คงจะหายเป็นปกติแล้วละค่ะ"
2300805-39 = "ปกติซิสเตอร์จะต้องคอยให้กำลังใจคนอื่นๆ แท้ๆ แต่ตอนนี้ฉันกลับได้รับความเป็นห่วงเรื่องสุขภาพ#nแทนแบบนี้... รู้สึกแปลกๆ นิดหน่อยนะคะ"
2300805-40 = "อ่ะฮ่ะฮ่าฮ่า..."
2300805-41 = "..."
2300805-46 = "[ns5] \"มารี...?\"\n[ns6] \"มีอะไรจะพูดเหรอ?\""
2300805-49 = "คือว่า... อืม..."
2300805-50 = "ที่จริงแล้ว..."
2300805-51 = "ช่วงนี้ฉันรู้สึกว่างานต่างๆ มันเหนื่อยๆ... และคิดอยากจะหยุดพักสักวันด้วยค่ะ"
2300805-52 = "บางทีการที่ฉันไม่สบายแบบนี้... อาจจะเป็นเพราะความคิดอยากจะพักในตอนนั้นก็ได้ค่ะ"
2300805-53 = "ทั้งที่พี่น้องซิสเตอร์คนอื่นๆ เองก็ทำกันแท้ๆ แต่ฉันคงจะเอาแต่ใจมากไปค่ะ"
2300805-54 = "เพราะมีความคิดที่ไม่เหมาะสมต่อการเป็นซิสเตอร์ ร่างกายก็เลยลงโทษฉัน... ละมั้งคะ...?"
2300805-55 = "คะ...?"
2300805-56 = "ไม่ใช่การลงโทษ... แต่อาจเป็นสิ่งที่เป็นประโยชน์กับฉันก็ได้งั้นเหรอคะ? ร่างกายฉันน่ะเหรอคะ?"
2300805-57 = "อืม ฉันไม่ค่อยเข้าใจที่คุณครูพูดเลย... มันเป็นประโยชน์กับฉันยังไงเหรอคะ...?"
2300805-58 = "[s7] \"เพราะการมีสุขภาพแข็งแรงนานๆ เป็นเรื่องดีน่ะสิ\"\n[s8] \"เพื่อให้เธอทำงานจิตอาสาที่ชอบต่อได้ไงล่ะ\""
2300805-64 = "...?"
2300805-65 = "อ่า..."
2300805-66 = "ฮุฮุ ว่าแล้วเชียว... นั่นสินะคะ คิดแบบนั้นก็ได้จริงด้วยนะคะ"
2300805-72 = "ขอบคุณนะคะ คุณครู คำพูดของคุณครูทำให้ฉันรู้สึกดีขึ้นมากเลยค่ะ"
2300805-73 = "ไม่ใช่แค่ร่างกาย... แต่จิตใจของฉันก็รู้สึกดีขึ้นด้วยค่ะ"
2300805-74 = "มันเป็นเรื่องที่ฉันเอาแต่ครุ่นคิดไม่หยุดเลยตอนที่นอนพักอยู่คนเดียว แต่ว่าตอนนี้กลับหาคำตอบ#nได้อย่างง่ายดาย..."
2300805-75 = "คุณครูช่วยทำให้ฉันสบายใจได้จริงๆ ด้วยนะคะ ในฐานะที่เป็นผู้ที่อยากช่วยเหลือคนอื่นๆ ฉันอยาก#nเรียนรู้จากคุณครูค่ะ"
2300805-76 = "ถ้ามีโอกาส... และถ้าคุณครูไม่ว่าอะไร... ถ้ามีเวลาละก็..."
2300805-77 = "อืม..?"
2300805-78 = "อ๊ะ ฉันไม่ได้หมายถึงวันนี้หรอกนะคะ"
2300805-79 = "อย่างที่คุณครูบอกค่ะ วันนี้ฉันควรจะพักผ่อนให้เต็มที่"
2300805-80 = "เพื่อวันพรุ่งนี้ และวันต่อๆ ไป... แต่ว่า..."
2300805-81 = "ฉันแค่คิดว่า... ถ้ามีโอกาส \"สักวันหนึ่ง\" น่ะค่ะ"
2300805-83 = "(หลังจากนั้น คุณครูก็อยู่เป็นเพื่อนคุยกับมารีอยู่ครู่หนึ่งและคอยดูแลให้เธอพักผ่อน)"
2300805-84 = "(พอแน่ใจว่ามารีหลับไปแล้ว คุณครูก็กลับไปที่ชาเล่ต์)"

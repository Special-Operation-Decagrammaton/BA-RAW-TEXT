[translation]
2300805-1 = "內在的懲罰"
2300805-2 = "（有點擔心瑪麗，所以決定去找她）"
2300805-6 = "那個，請問是哪位……？"
2300805-7 = "[s1] 「我來探病了唷。」\n[s2] 「抱歉，吵醒妳了嗎？」"
2300805-10 = "……！？"
2300805-11 = "老，老師……！？為，為什麼老師會來這裡……！？"
2300805-12 = "請，請稍等一下！真的一下下就好……！"
2300805-20 = "老，老師，讓您久等了……"
2300805-21 = "不好意思，讓您看到髒亂的房間了……"
2300805-22 = "不用介意是嗎……？"
2300805-23 = "可，可是……"
2300805-24 = "……？不，不行。老師都過來了，我可不能一直躺在床上……"
2300805-25 = "[s3] 「我是來探病的哦。」\n[s4] 「身體都不舒服了，不用逞強的。」"
2300805-26 = "是，是這樣，嗎……"
2300805-27 = "是，是這樣，嗎……"
2300805-28 = "也不能造成老師的困擾……"
2300805-29 = "那就恭敬不如從命了……"
2300805-34 = "（瑪麗再次回到了床上）"
2300805-35 = "讓您擔心了真是抱歉。其實也沒有什麼很嚴重的症狀……"
2300805-36 = "[s] 「現在不會不舒服了嗎？」"
2300805-37 = "是，是的。現在比較好一點了……"
2300805-38 = "稍微休息一下就已經好多了。我想明天應該就能和往常一樣充滿活力了。"
2300805-39 = "本來應該為了他人而行動的修女，現在居然成為了被探病的一方……#n總覺得不可思議呢。"
2300805-40 = "呵呵……"
2300805-41 = "……"
2300805-46 = "[ns5] 「……瑪麗？」\n[ns6] 「怎麼了嗎？」"
2300805-49 = "那個，怎麼說呢……"
2300805-50 = "其實……"
2300805-51 = "這段時間總覺得有點疲累……其實也想找一天好好休息的。"
2300805-52 = "說不定會變成這樣，都是因為我有了那種想法……"
2300805-53 = "明明其他修女都還在努力，我卻好像放縱了自己……"
2300805-54 = "因為想著身為修女不應該想的事情，所以我的身體處罰了我也說不定呢……"
2300805-55 = "……？"
2300805-56 = "不是處罰，而是幫助……？我的身體嗎……？"
2300805-57 = "那是什麼意思呢……？"
2300805-58 = "[s7] 「因為長壽且活得健康比較好呀。」\n[s8] 「為了讓妳能繼續當修女，所以才會這樣的。」"
2300805-64 = "……"
2300805-65 = "……原來如此。"
2300805-66 = "確實……也能這麼想呢。"
2300805-72 = "謝謝您，老師。托您的福感覺輕鬆多了。"
2300805-73 = "不只是身體，心裡也是。"
2300805-74 = "今天也一直在心裡思考著各種事情。#n但是在和老師說話的過程中感覺一切都豁然開朗了……"
2300805-75 = "同樣身為為他人而行動的人，請務必讓我向您學習。"
2300805-76 = "如果有機會的話，總有一天，我也能幫老師……"
2300805-77 = "……"
2300805-78 = "啊，不，不好意思。請您不要在意……"
2300805-79 = "當然我不是指現在就要做些什麼。今天機會難得，就好好休息吧。"
2300805-80 = "為了明天，也為了更遙遠的未來……只是……"
2300805-81 = "總有一天……嗯。"
2300805-83 = "（和瑪麗繼續聊了一會之後，好好照顧了她）"
2300805-84 = "（確認瑪麗入睡之後就回到了夏萊）"

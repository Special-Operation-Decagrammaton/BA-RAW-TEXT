[translation]
2003502-1 = "另一個修行（？）"
2003502-5 = "呼嚕……呼嚕……"
2003502-8 = "[ns]「……椿同學？」"
2003502-9 = "嗯……？"
2003502-13 = "啊，是老師……#n歡迎……我在等你哦……"
2003502-14 = "[s]「你說換了衣服，我還想說是會什麼樣的服裝……」"
2003502-15 = "沒錯，這就是……"
2003502-19 = "為睡眠導覽員準備的……制服哦……！"
2003502-23 = "無論何時何地都不忘記睡眠……"
2003502-24 = "那就是屬於我的修行……呼啊啊……"
2003502-25 = "[s]「睡眠，導覽員……？」"
2003502-26 = "嗯……我本來正在做……引導來拜訪百鬼夜行的人的……修行。"
2003502-27 = "你想想看，老師……"
2003502-28 = "最近……睡眠不足不是很大的社會問題嗎……？"
2003502-29 = "[s]「是嗎……？」"
2003502-30 = "是的……"
2003502-31 = "所以……我想到了……"
2003502-32 = "所謂的導覽員，就是要把某些人帶去某個地方對吧……？"
2003502-33 = "既然如此……"
2003502-34 = "我以修行部部長的身分……對人們進行有關睡眠的導覽……"
2003502-35 = "也能算是導覽的一種吧。"
2003502-36 = "[s]「雖然不太清楚，總之是睡眠的導覽啊……」"
2003502-37 = "嗯……就是這樣。呼啊……"
2003502-38 = "那麼老師……現在開始，我來為你進行百鬼夜行的導覽……"
2003502-39 = "嗯？你說不是要做睡眠導覽嗎……？"
2003502-40 = "就跟剛才說過的一樣……我本來在做引導……來拜訪百鬼夜行的人……的修行……"
2003502-41 = "只要認真工作的話，就可以安心睡個好覺……"
2003502-42 = "所以這個也是，睡眠導覽的……其中一環……"
2003502-46 = "呼嚕……"
2003502-47 = "[ns]「這麼快就睡著是不行的吧！」"
2003502-53 = "[ns1]「雖然有聽你說要為我導覽百鬼夜行……」\n[ns2]「但你好像跑到修行部部室了耶，椿同學？」"
2003502-56 = "……"
2003502-57 = "修行部部室也是……百鬼夜行的地點……"
2003502-61 = "呼嚕……"
2003502-62 = "[s3]「竟然無法反駁！」\n[s4]「可是總不能一到部室就馬上睡著吧！？」"
2003502-65 = "嗯……？"
2003502-66 = "說的也是……得引導老師才行……"
2003502-67 = "[s]「沒錯沒錯！」"
2003502-68 = "……"
2003502-69 = "聽我說，老師……"
2003502-70 = "人啊……一生有三分之一的時間要用來睡覺……"
2003502-71 = "如果睡眠不足的話……腦內就會累積老廢物質，對腦細胞造成傷害……"
2003502-72 = "最後……大腦會主動封鎖所有感官，強迫自己進入睡眠狀態……"
2003502-73 = "不僅如此……要是睡眠不足……"
2003502-77 = "還有可能導致身體的免疫系統無法正常運作……更容易受到病毒和細菌感染哦……"
2003502-78 = "[s]「椿所說的內容也太專業了吧！」"
2003502-79 = "所以好好睡覺……不只對我，對老師自己也很重要哦……"
2003502-80 = "嗯……現在的我可是睡眠導覽員春日椿……"
2003502-84 = "所以說，老師……？"
2003502-85 = "我們一起在這裡，好好睡一覺吧……？"
2003502-91 = "（之後椿立刻躺在修行部部室，帶著非常舒適的表情進入了夢鄉）"
2003502-92 = "（替椿蓋上被子後回到了夏萊……）"

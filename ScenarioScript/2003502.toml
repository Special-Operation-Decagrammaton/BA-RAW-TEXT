[translation]
2003502-1 = "การฝึกฝนอื่นอีกแล้ว(?)"
2003502-5 = "คร่อก.... ฟี้... zzZZ"
2003502-8 = "[ns] \"คุณสึบากิ...?\""
2003502-9 = "หืม...?"
2003502-13 = "งืม... คุณครูนี่เอง... เข้ามาสิ... ฉันกำลังรออยู่เลย..."
2003502-14 = "[s] \"ที่บอกว่าเปลี่ยนเสื้อผ้า ครูก็สงสัยว่าใส่ชุดอะไร...\""
2003502-15 = "ใช่แล้วละ ชุดนี้คือ..."
2003502-19 = "ยูนิฟอร์มของ... ไกด์การนอนหลับ...!"
2003502-23 = "'การไม่ลืมการนอนหลับ' ไม่ว่าจะที่ไหนและเมื่อไร..."
2003502-24 = "คือการฝึกฝนของฉันน่ะ... ฮ้าวว..."
2003502-25 = "[s] \"ไกด์การนอนหลับเหรอ...?\""
2003502-26 = "อืม... ปกติแล้วฉันจะฝึกเป็นไกด์นำทาง... ให้กับคนที่มาเฮียกคิยาโคน่ะ..."
2003502-27 = "แต่ลองคิดดูสิคุณครู..."
2003502-28 = "หมู่นี้น่ะ... การนอนไม่พอเป็นปัญหาใหญ่ในสังคมของเราเลยนะ..."
2003502-29 = "[s] \"งั้นเหรอ...?\""
2003502-30 = "คิดว่างั้นนะ..."
2003502-31 = "เพราะงั้นฉันเลย... ไปคิดทบทวนมาน่ะ..."
2003502-32 = "สุดท้ายแล้วหน้าที่ของไกด์ก็คือการนำทางพาผู้คนไปยังที่แห่งหนึ่งใช่มั้ยล่ะ...?"
2003502-33 = "ถ้างั้น..."
2003502-34 = "ในฐานะหัวหน้าชมรมฝึกฝนแล้ว... ฉันมองว่าการเป็นไกด์ที่พาผู้คนไปเจอความสุขจากการนอนหลับ..."
2003502-35 = "ก็ถือเป็นไกด์ประเภทหนึ่งเหมือนกัน..."
2003502-36 = "[s] \"ครูไม่ค่อยเข้าใจ แต่ว่าสึบากิเป็นไกด์การนอนหลับสินะ...\""
2003502-37 = "อืม... แบบนั้นแหละ ฮ้าวว..."
2003502-38 = "ถ้างั้น... คุณครู... ตั้งแต่นี้ไป ฉันจะเป็นไกด์พาทัวร์เฮียกคิยาโคให้เอง..."
2003502-39 = "หืม? ทำไมถึงไม่ใช่ไกด์การนอนหลับน่ะเหรอ...?"
2003502-40 = "ก็อย่างที่ฉันบอกเมื่อกี้ไง... ปกติแล้วฉันจะฝึกเป็นไกด์นำทางให้กับคนที่มาเฮียกคิยาโค..."
2003502-41 = "และถ้าตั้งใจทำงานละก็... ฉันจะนอนหลับปุ๋ยได้อย่างสบายใจน่ะ..."
2003502-42 = "เพราะงั้นนี่ก็ถือว่าเป็น... ส่วนหนึ่งของการเป็นไกด์การนอนหลับ..."
2003502-46 = "คร่อก... zZZ"
2003502-47 = "[ns] \"แต่ครูคิดว่าจะมาหลับตอนนี้ไม่ได้นะ!\""
2003502-53 = "[ns1] \"ไหนเมื่อกี้บอกว่าจะพาทัวร์เฮียกคิยาโคไง...\"\n[ns2] \"ทำไมพามาที่ห้องชมรมฝึกฝนล่ะ คุณสึบากิ?\""
2003502-56 = "......"
2003502-57 = "ห้องชมรมฝึกฝน... ก็เป็นสถานที่ในเฮียกคิยาโคนะ..."
2003502-61 = "คร่อก zzZ..."
2003502-62 = "[s3] \"มันก็ใช่อยู่หรอก!\"\n[s4] \"เธอไม่ควรหลับทันทีที่มาถึงห้องชมรมสิ?!\""
2003502-65 = "หืม...?"
2003502-66 = "นั่นสินะ... ฉันต้องแนะนำสถานที่ให้คุณครูสิ..."
2003502-67 = "[s] \"ใช่! ต้องอย่างนั้นสิ!\""
2003502-68 = "......"
2003502-69 = "นี่คุณครู..."
2003502-70 = "ว่ากันว่าคนเราน่ะ... ใช้ 1 ใน 3 ของเวลาชีวิตไปกับการนอนเลยนะ..."
2003502-71 = "ถ้าเรานอนไม่พอ... จะเกิดการสะสมของเสียที่เหลือจากการดูดซึมภายในร่างกาย... ทำให้เซลล์สมองเสียหาย..."
2003502-72 = "และสุดท้าย... สมองก็จะปิดกั้นประสาทสัมผัสทั้งหมด... และจะบังคับให้ตัวเองหลับลง..."
2003502-73 = "แค่นั้นยังไม่พอนะ... ยิ่งถ้าเรานอนไม่พอ..."
2003502-77 = "ว่ากันว่าจะทำให้ระบบภูมิคุ้มกันของร่างกายทำงานผิดปกติ... และร่างกายก็จะเสี่ยงต่อการติดเชื้อไวรัส และแบคทีเรียมากขึ้นด้วยละ..."
2003502-78 = "[s] \"สึบากิอธิบายได้เหมือนผู้เชี่ยวชาญเลย!\""
2003502-79 = "เพราะงั้นการนอนหลับให้ดี... จึงเป็นสิ่งสำคัญ... สำหรับตัวฉันและตัวคุณครูเองยังไงล่ะ..."
2003502-80 = "อืม... ตอนนี้ฉันคือไกด์การนอนหลับ คาซึกะ สึบากิ..."
2003502-84 = "เพราะงั้น คุณครู..."
2003502-85 = "เรามาพักงีบด้วยกันที่นี่หน่อยดีมั้ย?"
2003502-91 = "(พอพูดจบสึบากิก็ล้มตัวนอนลงในห้องชมรมฝึกฝน และหลับลึกด้วยสีหน้าที่ไม่น่าเชื่อว่าจะนอน#nสบายขนาดนั้นได้)"
2003502-92 = "(จากนั้นคุณครูก็ห่มผ้าให้สึบากิแล้วก็กลับมาที่ชาเล่ต์...)"

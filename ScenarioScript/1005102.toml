[translation]
1005102-1 = "#title;불타는 단장의 가쿠란"
1005102-2 = "#place;엔지니어부 동아리 작업실"
1005102-3 = "#na;(우타하의 가운을 돌려주기 위해 엔지니어부의 작업실을 찾았다.)"
1005102-4 = "#st;[0,0];instant;1;"
1005102-5 = "#clearST"
1005102-6 = "#wait;1000"
1005102-7 = "#wait;1500"
1005102-8 = "#wait;1500"
1005102-9 = "[ns] \"우타하, 나 왔어.\""
1005102-10 = "#na;우타하 응원단ND;……어라, 선생님?"
1005102-11 = "#na;우타하 응원단ND;잠시만 기다려줘. 금방 나갈 테니까……."
1005102-12 = "#st;[0,0];instant;1;"
1005102-13 = "#clearST"
1005102-14 = "#wait;1500"
1005102-15 = "#wait;1800"
1005102-16 = "3;우타하 응원단ND;01\n#3;a\n#wait;1500"
1005102-17 = "3;우타하 응원단ND;02;정말 선생님이잖아……? 이 시간에는 무슨 일이야?\n#3;em;[?]"
1005102-18 = "3;우타하 응원단ND;03;설마 내 작업 가운을 돌려주기 위해 일부러 여기까지 온 거야?"
1005102-19 = "3;우타하 응원단ND;00;급한 일도 아니었는데…… 신경 쓰게 한 것 같아서 미안하네."
1005102-20 = "[s] \"아니야. 신경 쓰지 마.\""
1005102-21 = "#wait;1500"
1005102-22 = "[ns] \"그보다 어째서 가쿠란을……?\""
1005102-23 = "3;우타하 응원단ND;03;그게, 교복 위에 걸칠 만한 적당한 가운이 없어서 말이야.\n#3;em;[반응]"
1005102-24 = "3;우타하 응원단ND;00;전에도 말했던 것 같지만, 기계를 수리하다 보면 옷이 쉽게 더러워지거든."
1005102-25 = "3;우타하 응원단ND;99;엔진에서 묻어나는 검댕이라든가, 허브 축에 바르는 윤활유라든가……"
1005102-26 = "3;우타하 응원단ND;02;게다가 공구 중에는 날카로운 물건이 많아서, 자칫하면 교복이 상할 수도 있지."
1005102-27 = "3;우타하 응원단ND;00;그래서 평소에는 안전을 위해 교복 위에 작업 가운을 덧입었는데, 오늘은 적당한 옷이 없어서 전에 대운동회 때 입었던 가쿠란을 걸쳤어.\n#3;em;[음표]\n#3;greeting"
1005102-28 = "[s] \"……불편하지는 않아?\""
1005102-29 = "3;우타하 응원단ND;01;음…… 다소 뻣뻣한 느낌이 있기는 하지만 생각보다 나쁘진 않아."
1005102-30 = "3;우타하 응원단ND;99;……오히려 어떤 측면에서는 평소에 입던 흰색 가운보다 좋을지도 모르겠어.\n#3;em;…"
1005102-31 = "3;우타하 응원단ND;07;스탠딩 칼라가 목을 확실하게 가려주기 때문에 옷깃의 상태를 신경 쓰지 않아도 괜찮고, 어두운색의 옷감 덕분에 검댕이 묻어도 쉽게 티가 나지 않거든."
1005102-32 = "3;우타하 응원단ND;03;무엇보다 이 옷에서는…… 열정의 향이 나는 것 같아."
1005102-33 = "[s] \"……열정의 향?\""
1005102-34 = "3;우타하 응원단ND;00;응. 내면의 열정을 일깨우는…… 무언가 형용할 수 없는 향이 느껴져.\n#3;em;[반응]"
1005102-35 = "3;우타하 응원단ND;00;차가운 이성만큼이나 뜨거운 열정도 마이스터가 가져야 할 중요한 소양 중 하나거든."
1005102-36 = "3;우타하 응원단ND;03;이 옷을 입고 공구를 매만지고 있노라면…… 대운동회 당일의 뜨거운 열기가 몸에 직접 전해지는 것 같아."
1005102-37 = "3;우타하 응원단ND;99;스타디움을 가득 메운 응원단의 함성과, 트랙의 모래 위로 피어오르는 태양의 향기……\n#3;em;…"
1005102-38 = "3;우타하 응원단ND;00;이런 열정의 향이야말로 마이스터의 영감을 일깨우는 중요한 동력이지."
1005102-39 = "3;우타하 응원단ND;03;후후. 어때, 선생님. 선생님도 이 가쿠란에서 풍겨 나오는 [ruby=마이스터]열정[/ruby]의 향이 느껴져?\n#3;em;[?]"
1005102-40 = "#st;[0,0];instant;1;"
1005102-41 = "#clearST"
1005102-42 = "3;우타하 응원단ND;03\n#3;d\n#wait;1000"
1005102-43 = "3;우타하 응원단ND;03\n#3;a\n#3;closeup\n#wait;2500"
1005102-44 = "#wait;2500"
1005102-45 = "[ns] \"우타하의 냄새가 나.\""
1005102-46 = "3;우타하 응원단ND;02;……응? 내 냄새가 난다고?\n#3;em;[?]\n#3;closeup"
1005102-47 = "3;우타하 응원단ND;08;어…… 비유적인 표현이나 그런 게 아니라, 정말로 냄새가 난다고?\n#3;stiff\n#3;closeup"
1005102-48 = "3;우타하 응원단ND;09;생각해보니 지난 대운동회가 끝나고 나서, 이 가쿠란은 작업실에 계속 방치했으니까…….\n#3;closeup\n#fontsize;50"
1005102-49 = "3;우타하 응원단ND;99;………….\n#3;em;…\n#3;closeup"
1005102-50 = "#st;[0,0];instant;1;"
1005102-51 = "#clearST"
1005102-52 = "3;우타하 응원단ND;09\n#3;dl\n#wait;2000"
1005102-53 = "#wait;1500"
1005102-54 = "#all;hide"
1005102-55 = "#wait;1000"
1005102-56 = "#wait;1800"
1005102-57 = "3;우타하;00\n#3;em;[반짝]\n#3;a\n#wait;2000"
1005102-58 = "3;우타하;02;……갑자기 자리를 비워서 미안. 오래 기다렸지?\n#3;em;[반응]"
1005102-59 = "3;우타하;01;역시 생각해보니 작업을 할 때는 이 흰색 가운을 입고 일하는 게 제일인 것 같아서."
1005102-60 = "3;우타하;99;소재도 가벼워서 움직이기 편하고, 얼룩이 생겨도 금방 알아볼 수 있으니……."
1005102-61 = "3;우타하;03;옷도 공구처럼 쓰임새에 알맞게 입어야 그 진가를 발휘하는 법이지.\n#3;greeting"
1005102-62 = "[s] \"이제 그 가쿠란은 입지 않는 거야?\""
1005102-63 = "3;우타하;02;응? 아까 입었던 가쿠란?"
1005102-64 = "3;우타하;06;그야…… 다시 입을 기회가 있다면 입을 수도……\n#3;stiff\n#3;em;[///]"
1005102-65 = "3;우타하;02;후배가 만들어 준 소중한 옷이기도 하고, 옷의 디자인이나 소재도 마음에 들었으니까."
1005102-66 = "3;우타하;04;……물론 그전에 한 번 세탁은 해야겠지만.\n#3;em;…\n#fontsize;50"
1005102-67 = "3;우타하;01;하지만 아까 말했던 것처럼 기계를 정비할 때는 입지 않는 게 좋겠어."
1005102-68 = "3;우타하;02;게다가 엔지니어부의 부장이 작업 가운 대신 가쿠란을 입고 다닌다면, 밀레니엄의 정체성에 혼란이 생길지도 모르니까 말이야."
1005102-69 = "3;우타하;99;하지만 또다시 개발에 열정이 필요한 때가 찾아온다면……"
1005102-70 = "3;우타하;03;……이 가쿠란을 입고 기계를 만지는 일이 또 있을지도? ……후후."

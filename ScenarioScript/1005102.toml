[translation]
1005102-1 = "กักคุรันของหัวหน้าสุดร้อนแรง"
1005102-2 = "ห้องปฏิบัติการชมรมวิศวกรรม"
1005102-3 = "(คุณครูนำเสื้อกาวน์มาคืนอุทาฮะที่ห้องปฏิบัติการชมรมวิศวกรรม)"
1005102-9 = "[ns] \"อุทาฮะ ครูมาแล้ว\""
1005102-10 = "เอ๋? คุณครู...?"
1005102-11 = "รอเดี๋ยวนะ เดี๋ยวฉันออกไป..."
1005102-17 = "คุณครูจริงๆ ด้วยแฮะ...? เวลาแบบนี้มาทำอะไรที่นี่น่ะ?"
1005102-18 = "หรือว่าเอาเสื้อกาวน์มาให้ฉันงั้นเหรอ?"
1005102-19 = "ไม่ใช่เรื่องด่วนแท้ๆ... ขอโทษที่ทำให้วุ่นวายนะ"
1005102-20 = "[s] \"ไม่หรอก ครูไม่ได้วุ่นวายอะไรเลย\""
1005102-22 = "[ns] \"ว่าแต่ทำไมถึงใส่เสื้อกักคุรันล่ะ...?\""
1005102-23 = "ฉันก็ไม่มีเสื้อตัวอื่นที่จะมาใส่คลุมชุดนักเรียนแทนชุดกาวน์ได้นี่นา"
1005102-24 = "เหมือนที่เคยบอกน่ะ เวลาซ่อมแซมพวกอุปกรณ์เสื้อจะเลอะง่ายมาก"
1005102-25 = "พวกเขม่าดำๆ จากเครื่องยนต์ หรือพวกคราบน้ำมันจากอะไหล่ตัวเชื่อม..."
1005102-26 = "แถมพวกอุปกรณ์ต่างๆ ก็มีพวกของมีคมอยู่เยอะมาก ถ้าไม่ระวังก็อาจเกี่ยวชุดนักเรียนขาดได้น่ะ"
1005102-27 = "เพราะงั้นปกติแล้วฉันจะใส่เสื้อกาวน์ทับชุดนักเรียนอีกชั้นเพื่อความปลอดภัย แต่ว่าวันนี้ไม่มีเสื้อที่จะใส่#nคลุมทับได้... ก็เลยเอาเสื้อกักคุรันที่เคยใส่ตอนงานแข่งกีฬามาใส่แทนก่อนน่ะ"
1005102-28 = "[s] \"แล้วทำงานสะดวกเหรอ...?\""
1005102-29 = "อืม... มันก็รู้สึกติดๆ ขัดๆ นิดหน่อย แต่ก็พอทนได้"
1005102-30 = "สำหรับการใช้งานในบางเรื่อง มันก็อาจดีกว่าชุดกาวน์ที่ใส่ประจำอีกก็ได้นะ"
1005102-31 = "ปกคอเสื้อแบบตั้ง ทำให้ไม่ต้องใส่ใจเรื่องปกเสื้อเท่าไร แถมเสื้อสีเข้มแบบนี้ เวลาเลอะคราบอะไร#nก็ไม่ค่อยเป็นที่สังเกตด้วย"
1005102-32 = "อีกอย่างเสื้อกักคุรันตัวนี้... ยังทำให้รู้สึกฮึกเหิมด้วย"
1005102-33 = "[s] \"ความรู้สึกฮึกเหิมเหรอ?\""
1005102-34 = "อื้อ ฉันอธิบายไม่ถูกเหมือนกัน... แต่เป็นความรู้สึกที่เหมือนเตือนให้ฉันคอยมีแรงฮึกเหิมสู้ต่อไปน่ะ"
1005102-35 = "นอกจากความใจเย็น สุขุมแล้ว จิตใจที่ฮึกเหิมร้อนแรงก็เป็นหนึ่งในคุณสมบัติสำคัญของไมสเตอร์"
1005102-36 = "ถ้าใส่ชุดนี้ตอนทำงานละก็... เหมือนว่าความรู้สึกฮึกเหิมอย่างในวันแข่งกีฬาก็จะแล่นไปทั่วร่างกาย#nเลยน่ะ"
1005102-37 = "เสียงเชียร์ของกองเชียร์ที่ดังกึกก้องไปทั่วสเตเดียม กลิ่นไอของแสงแดดร้อนระอุบนสนามแข่งวิ่ง..."
1005102-38 = "ความรู้สึกฮึกเหิมพวกนี้ก็เป็นแรงกระตุ้นแรงบันดาลใจของไมสเตอร์อย่างหนึ่งนะ"
1005102-39 = "ฮิฮิ ว่ายังไงล่ะ คุณครูเองก็สัมผัสได้ถึงกลิ่นหอมหวนของความฮึกเหิมของไมสเตอร์จากเสื้อกักคุรัน#nนี้ได้ใช่มั้ย?"
1005102-45 = "[ns] \"ครูได้แต่กลิ่นของอุทาฮะน่ะ\""
1005102-46 = "หืม? ได้กลิ่นฉันงั้นเหรอ?"
1005102-47 = "เอ่อ... ไม่ได้พูดเปรียบเปรยอะไร แต่ได้กลิ่นจริงๆ งั้นเหรอ?"
1005102-48 = "พอนึกๆ ดูแล้ว หลังงานกีฬาจบ ก็หมกเสื้อกักคุรันนี่เอาไว้ที่ห้องทำงานมาตลอดเลย..."
1005102-49 = "..."
1005102-58 = "ขอโทษที่ออกไปกะทันหันนะ รอนานเลยใช่มั้ย?"
1005102-59 = "คิดแล้วเชียวว่าตอนทำงานน่ะ ใส่เสื้อกาวน์สีขาวแบบนี้แหละดีที่สุด"
1005102-60 = "เนื้อผ้าเบาสบาย ขยับตัวได้คล่อง แถมถ้ามีรอยเปื้อนก็รู้ได้ทันที..."
1005102-61 = "เสื้อผ้าเองก็ควรใส่ให้ถูกกาลเทศะ และเหมาะกับหน้าที่ของมัน ถึงจะดึงคุณค่าที่แท้จริงของมันออกมา#nได้ยังไงล่ะ"
1005102-62 = "[s] \"ไม่ใส่เสื้อกักคุรันแล้วเหรอ?\""
1005102-63 = "หืม? เสื้อกักคุรันที่ใส่เมื่อกี้น่ะเหรอ?"
1005102-64 = "เรื่องนั้น... ถ้ามีโอกาสเหมาะๆ ให้ใส่อีก ก็อาจจะใส่อีกก็ได้..."
1005102-65 = "เสื้อตัวสำคัญที่รุ่นน้องทำให้ทั้งที และฉันก็ชอบทั้งดีไซน์และเนื้อผ้าด้วย"
1005102-66 = "แต่ตอนนี้ต้องเอาไปซักก่อน..."
1005102-67 = "แต่ก็อย่างที่บอกไปเมื่อกี้น่ะ ว่าไม่เอามาใส่ตอนซ่อมอุปกรณ์น่าจะดีกว่า"
1005102-68 = "อีกอย่างถ้าหัวหน้าชมรมวิศวกรรมใส่ชุดกักคุรันระหว่างทำงาน อาจทำให้เกิดความสับสนเกี่ยวกับ#nเอกลักษณ์ของมิลเลเนียมก็ได้ "
1005102-69 = "แต่ว่าถ้าเกิดต้องการความฮึกเหิมในการพัฒนาอุปกรณ์อีกละก็..."
1005102-70 = "อาจจะมีโอกาสเอาเสื้อกักคุรันมาใส่อีกก็ได้นะ...? ฮุฮุ"

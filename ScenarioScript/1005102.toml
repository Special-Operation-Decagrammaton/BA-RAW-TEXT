[translation]
1005102-1 = "熱情的立領學生服"
1005102-2 = "工程師部．工作室"
1005102-3 = "（為了將白袍送回給詠葉，前去拜訪了工程師部的工作室）"
1005102-9 = "[ns]「詠葉，久等啦。」"
1005102-10 = "咦……老師？"
1005102-11 = "能等我一下嗎？我馬上就好……"
1005102-17 = "老師……難道是來送白袍的嗎？"
1005102-18 = "都這個時間了還專程跑來，真是不好意思。"
1005102-19 = "……讓你費心了呢。"
1005102-20 = "[s]「沒事的，不用放在心上唷。」"
1005102-22 = "[ns]「為什麼穿著立領學生服……？」"
1005102-23 = "啊……那是因為沒有適合披在制服上的衣服。"
1005102-24 = "修理機器時很容易弄髒。"
1005102-25 = "像是引擎的煤煙，輪轂的潤滑油……"
1005102-26 = "再加上會使用尖銳工具的緣故，稍有不慎就會弄破制服。"
1005102-27 = "所以為了安全起見，平常都會在制服上披一件白袍……#n只是今天剛好沒有合適的衣服，所以我就改披這件立領學生服了。"
1005102-28 = "[s]「……不會不方便嗎？」"
1005102-29 = "這個嘛……雖然行動上有點卡卡的，但意外的還行。"
1005102-30 = "……從某方面來說，說不定反而比平常穿的白袍更好。"
1005102-31 = "因為領子可以保護住脖子，所以不需要在意衣領的狀態。#n黑色的布料就算沾到煤煙也不會太明顯。"
1005102-32 = "更重要的是……這套衣服散發著一股熱情的氣息。"
1005102-33 = "[s]「……熱情的氣息？」"
1005102-34 = "嗯。從身體深處湧出的……難以言喻的某種氣息。"
1005102-35 = "跟冰冷的理性一樣，熾熱的熱情也是巨匠應該具備的重要素養。"
1005102-36 = "穿上這件衣服觸碰工具時……彷彿還能感受到大運動會當天的熱情。"
1005102-37 = "充斥整個運動場的應援團吶喊聲，照射在跑道上的太陽芬芳……"
1005102-38 = "這種熱情的香氣，刺激了我身為巨匠的靈感。"
1005102-39 = "呵呵。怎麼樣，老師？#n老師也能感受到這件立領學生服散發出的[ruby=巨匠]熱情[/ruby]氣息嗎？"
1005102-45 = "[ns]「有一股詠葉的味道。」"
1005102-46 = "……嗯？我的味道？"
1005102-47 = "難……難不成，是臭味嗎？"
1005102-48 = "這，這麼說來，上次大運動會結束後，這件立領學生服就一直放在工作室……"
1005102-49 = "………"
1005102-58 = "……突然離開真是抱歉。讓老師久等了。"
1005102-59 = "你看，果然工作時沒有穿平時穿習慣的白袍就會渾身不對勁。"
1005102-60 = "材質輕盈，方便行動，就算沾到污漬也能立刻發現……"
1005102-61 = "衣服也和工具一樣。#n依照正確的方法使用，才能發揮它真正的價值。"
1005102-62 = "[s]「已經不打算穿立領學生服了嗎？」"
1005102-63 = "嗯？那個啊……"
1005102-64 = "……如果還有機會的話，會穿吧……"
1005102-65 = "畢竟是重要的後輩為我做的，而且設計和材質我也很喜歡。"
1005102-66 = "……當然，在那之前得先洗一下。"
1005102-67 = "但是整備機器的時候，穿白袍還是最好的。"
1005102-68 = "況且，如果讓其他千年的學生看到工程師部的部長沒穿白袍，可是會嚇到的。"
1005102-69 = "不過，如果研發時需要熱情的話……"
1005102-70 = "……再次穿著它活動也是不錯……呵呵。"

[translation]
1005102-1 = "A Captain's Fashion Passion"
1005102-2 = "Engineering Department Workshop"
1005102-3 = "I went to the Engineering Department workshop to return Utaha's lab coat."
1005102-9 = "[ns] \"Utaha, I'm here.\""
1005102-10 = "Sensei? Wait..."
1005102-11 = "Just a moment. I'll be right out..."
1005102-17 = "You're really here! What brings you around at this hour?"
1005102-18 = "Did you come all this way just to bring me my lab coat?"
1005102-19 = "It wasn't actually that urgent... Sorry for bothering you."
1005102-20 = "[s] \"It's okay. Don't worry about it.\""
1005102-22 = "[ns] \"But, um, what's up with the cheer outfit?\""
1005102-23 = "Well, I didn't have anything to wear over my school uniform."
1005102-24 = "After all, my clothes always manage to get dirty when I work on machines."
1005102-25 = "Sometimes it's soot, sometimes lubricant..."
1005102-26 = "Oh, and many of my tools are quite sharp, so my school uniform is always at risk."
1005102-27 = "So I usually wear something over my school uniform for safety, but I didn't have anything suitable today, so I put on the uniform I wore for field day."
1005102-28 = "[s] \"Is it uncomfortable?\""
1005102-29 = "Hmm... It's a bit stiff, but it's better for work than I thought."
1005102-30 = "In some ways, it might be better than what I usually wear."
1005102-31 = "The standing collar keeps my neck covered, and the dark fabric hides soot well."
1005102-32 = "Above all, I think this outfit...smells like passion."
1005102-33 = "[s] \"...Does passion happen to smell like soot?\""
1005102-34 = "Maybe. The important thing is...something ignites within me when I put this on."
1005102-35 = "Logic may make our work possible, but passion is what makes us meisters."
1005102-36 = "When I wear this outfit while working...it's like I'm back at field day, the heat directly on my body..."
1005102-37 = "I can hear the cheers that filled the stadium, see the rays of sunlight rising over the stands..."
1005102-38 = "Being filled with passion is a meister's fashion. Without inner motivation, we'd be stuck in stagnation! ...I should make that my alarm."
1005102-39 = "Haha. What about you, Sensei? Can you smell the passion of this cheer outfit?"
1005102-45 = "[ns] \"No, it just...smells.\""
1005102-46 = "...Huh?"
1005102-47 = "Oh... Are you... We're not talking about a figurative smell, are we?"
1005102-48 = "Come to think of it, I did just leave this uniform in the workshop after field day..."
1005102-49 = "..."
1005102-58 = "...Sorry for leaving so suddenly and making you wait."
1005102-59 = "I have...reevaluated some things. I think I should just stick to what I usually wear."
1005102-60 = "The material is light, so it's easy to move around. And it's easy to realize when it's dirty..."
1005102-61 = "Like tools, clothes only show their true worth when used."
1005102-62 = "[s] \"So, no more of your cheer outfit?\""
1005102-63 = "Huh? The one I was wearing before?"
1005102-64 = "Well... I won't rule it out..."
1005102-65 = "It was a precious gift from my underclassman, and I like its design and material."
1005102-66 = "...I should get it washed, though."
1005102-67 = "But I've settled on not wearing it while working on machinery."
1005102-68 = "Besides, if the president of the Engineering Department starts walking around in that sort of uniform, it could cause confusion about Millennium's identity."
1005102-69 = "But if I ever need to kick my passion into gear..."
1005102-70 = "...sometimes I need that extra spark. Heehee."

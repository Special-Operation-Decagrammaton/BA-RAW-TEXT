[translation]
10017030-1 = "Episode 3; A Christmas Nightmare"
10017030-2 = "Downtown Kivotos"
10017030-7 = "Give the gift of love this Christmas! Send relief to those in need!"
10017030-12 = "Help people who need it! Help people who are struggling!"
10017030-14 = "Hey, is that the Remedial Knights' donation bucket? I guess it is Christmas after all."
10017030-15 = "Here. For those in need."
10017030-20 = "Thank you so much. Please, take this gift."
10017030-24 = "Handmade hat and gloves from yours truly! Heehee!"
10017030-29 = "You made these? These are worth so much more than we gave..."
10017030-30 = "I know, right? We should do charity work ourselves to make up for it."
10017030-32 = "N-No! We didn't mean to make you feel guilty..."
10017030-33 = "Much appreciated! Have a great rest of the year! Merry Christmas!"
10017030-37 = "[ns] \"It's like an annual event for some people.\""
10017030-38 = "I-It's not a big deal. We're just doing our job as Remedial Knights..."
10017030-39 = "Exactly, Sensei! Making people happy makes us happy!"
10017030-40 = "[s] \"So bright... So pure... I think I'm going to cry.\""
10017030-41 = "Sensei? Are you okay?"
10017030-42 = "Hey! Grown-ups aren't supposed to cry!"
10017030-44 = "Not to ruin the mood, but..."
10017030-50 = "Oh, I can tell that these people are bad eggs!"
10017030-51 = "That's wrong, Hanae. You shouldn't judge people like that."
10017030-52 = "Are you hurt? You guys do get beat up a lot..."
10017030-53 = "If you need first aid, leave it to the Remedial Knights!"
10017030-55 = "What? No, we're not really... Wait, I mean, yeah! Oh! So hurt! So super hurt! Damn, uh, injuries!"
10017030-56 = "But that aside, I want you to hear me out."
10017030-57 = "It's Christmas, right? And Christmas is all about helping those in need. Right?"
10017030-58 = "What should we do, Sensei?"
10017030-59 = "[s] \"Let's hear them out.\""
10017030-60 = "Hmm... Okay! If you say so, Sensei!"
10017030-62 = "That's... Really?"
10017030-63 = "Why would the Justice Task Force do that?"
10017030-67 = "I'm just as confused! We didn't even do anything!"
10017030-68 = "*sob* We just wanted chicken for Christmas."
10017030-69 = "And not just for us! We wanted to give the gift of our special chicken dish to others!"
10017030-70 = "[s1] \"Special chicken dish?\"\n[s2] \"(The Justice Task Force...took away their chicken?)\""
10017030-73 = "All we wanted was to do something a little different!"
10017030-74 = "Yeah! That's right!"
10017030-75 = "Then they suddenly attacked us and took all our chicken!"
10017030-76 = "And I'm here asking you all today, was what we did so wrong? Is it such a sin to enjoy chicken on Christmas? I mean, yeah, sure, turkey's probably better..."
10017030-77 = "Every penny we had went into getting that chicken."
10017030-78 = "We just wanted to change things up a little, then bam! In comes the Justice Task Force!"
10017030-79 = "[s3] \"Change things up a little...?\"\n[s4] \"What, exactly, were you doing?\""
10017030-82 = "W-Well, it's kind of complicated to explain in detail..."
10017030-83 = "The important thing is...sincerity! And how ours was disrespected!"
10017030-84 = "Exactly! And on Christmas of all days! We wanted to do some good! But they wouldn't have any of that!"
10017030-85 = "The Justice Task Force is full of cold-blooded killers! They're merciless!"
10017030-87 = "I'm so sorry they treated you like that. Santa Claus will be disappointed in them too."
10017030-88 = "Right. Your past should have no bearing on your current good deeds."
10017030-89 = "What the Justice Task Force did was wrong."
10017030-90 = "[s5] \"Doesn't this all seem a little...suspicious?\"\n[s6] \"Hmmmmmmmmmmmmm...\""
10017030-93 = "That's not right, Sensei! Hurt people should never be doubted on Christmas! Shame on you!"
10017030-94 = "You shouldn't judge a book by its cover! What would Santa think?!"
10017030-95 = "[s] \"...I'm very sorry.\""
10017030-96 = "Please, take these gloves and hats for now. It's very cold out."
10017030-102 = "*sob* Thank you, thank you... But nothing can fill this chicken-sized hole in my heart."
10017030-103 = "By the way, where's the Remedial Knights' captain?"
10017030-105 = "Captain should be here soon."
10017030-106 = "She said she would come after patrolling Trinity."
10017030-107 = "Why do you ask?"
10017030-111 = "Nothing, nothing... It's just..."
10017030-112 = "It's just nothing. Thanks for listening to our chicken woes... Chicken that we'll never see again..."
10017030-114 = "I'm sorry... Is there anything else we can do for you?"
10017030-115 = "Just tell us and we'll do our best!"
10017030-120 = "Just... Just remember us..."
10017030-121 = "And remember, even on Christmas, there are always people like us. Those who are wandering the streets, cold, alone, chickenless... *sob*"
10017030-130 = "They left..."
10017030-131 = "Should we go after them?"
10017030-132 = "[s7] \"I don't know if that's the best idea.\"\n[s8] \"That seems...a little stalkerish?\""
10017030-135 = "You think so? But..."
10017030-136 = "It's just so sad, Sensei. *whimper*"
10017030-137 = "Sensei, is something on your mind?"
10017030-138 = "[s] \"...Why would the Justice Task Force ever do something like that?\""
10017030-139 = "Right. They're usually such kind people..."
10017030-140 = "But sometimes they bring down the hammer too hard!"
10017030-141 = "Hahaha... Maybe. We do often have to prepare beforehand whenever we hear the Justice Task Force is being dispatched."
10017030-142 = "Yeah! We check our equipment, prep the medicine, get the stretchers out, then bang! That's our cue to head out."
10017030-143 = "[s] \"...Like clockwork.\""
10017030-144 = "I-It's just that the Remedial Knights need to be ready for any situation!"
10017030-145 = "Yeah, but we weren't ready for this one... I feel bad about it."
10017030-146 = "[s] \"Hey, come on, cheer up, Hanae. I'm sure we'll get a proper explanation. Okay?\""
10017030-147 = "Hmm... Okay! I'll keep my chin up!"

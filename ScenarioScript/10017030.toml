[translation]
10017030-1 = "第3話;聖誕夜驚魂"
10017030-2 = "奇普托斯．市內"
10017030-7 = "聖誕快樂！#n拜託大家多多捐款──！"
10017030-12 = "拜託了！"
10017030-14 = "哦哦，是救護騎士團。今年也到了這個季節啦。"
10017030-15 = "稍等……來，雖然不多，請收下吧。"
10017030-20 = "非常感謝！#n這是我們準備的一點心意，請收下！"
10017030-24 = "是我們親手織的帽子和手套喔！"
10017030-29 = "哦，是嗎？#n那可真是非常珍貴的禮物呢。"
10017030-30 = "哎呀，這樣的話，我反而給太少了呢。"
10017030-32 = "不不不，請別這麼說……"
10017030-33 = "有這份心意，我們就很開心了，非常感謝！#n祝各位聖誕快樂！"
10017030-37 = "[ns] 「很受大家的信賴呢……」"
10017030-38 = "是，是嗎……？#n我們只是在做救護騎士團的例行公事而已……"
10017030-39 = "沒錯！#n如果結果能讓大家開心的話，我們也會非常高興的！"
10017030-40 = "[s]「這就是聖誕節的光輝呀……」"
10017030-41 = "老，老師？你沒事吧……？"
10017030-42 = "請別哭！來，手帕！"
10017030-44 = "我們好像來得不是時候啊……"
10017030-50 = "啊，來了幾個感覺是不良學生的人耶，前輩！"
10017030-51 = "花，花繪醬，不能這麼先入為主……"
10017030-52 = "那個，是有哪裡受傷了嗎？"
10017030-53 = "如果需要治療的話，請交給我們救護騎士團！"
10017030-55 = "不，受傷什麼的……確實是有。"
10017030-56 = "但比起那個，我現在更希望你們能聽我訴苦。"
10017030-57 = "你們想想，現在可是聖誕節……怎麼樣都不該讓自己陷在痛苦的心情裡吧？"
10017030-58 = "該怎麼辦呢，老師？"
10017030-59 = "[s]「總之先聽聽他們怎麼說吧？」"
10017030-60 = "嗯～說的也是！"
10017030-62 = "那種事……是真的嗎？"
10017030-63 = "實現正義部居然會做那種事……？"
10017030-67 = "是真的！我們什麼都沒做！"
10017030-68 = "我們只是為了聖誕節，準備了炸雞而已……"
10017030-69 = "對，只是準備了「特別」的炸雞……！"
10017030-70 = "[s1]「『特別』的炸雞……？」\n[s2]（實現正義部的學生，竟然會無緣無故地搶走炸雞……？）"
10017030-73 = "既然要準備的話，就該準備和平常不一樣的東西吧！"
10017030-74 = "對呀，肯定要的吧！"
10017030-75 = "但他們卻突然把我們打倒在地，#n把所有的炸雞都搶走了！"
10017030-76 = "聖誕節吃炸雞錯了嗎？#n難道非得是火雞才行嗎？"
10017030-77 = "我們努力存錢，好不容易才將炸雞弄到手……"
10017030-78 = "只不過是稍微加工了一下，就被他們……！"
10017030-79 = "[s3]「……加工？」\n[s4]「具體來說是什麼呢……？」"
10017030-82 = "那，那個，說明起來會有點複雜……"
10017030-83 = "重要的是我們的心意被踐踏了吧！？"
10017030-84 = "是啊，而且是在難得的聖誕節！#n把我們的善意變成那樣……！"
10017030-85 = "實現正義部的那些傢伙，心腸難道是鐵石做的嗎！？#n真想看看他們的血是什麼顏色！"
10017030-87 = "如，如果這些都是真的，那就太過分了……#n聖誕老人聽到也會傷心難過的……"
10017030-88 = "是啊，任何善意都不應該被踐踏。"
10017030-89 = "就目前聽到的情況來說，我認為實現正義部確實做得有點過分。"
10017030-90 = "[s5]「總覺得有詐呢……」\n[s6]「唔嗯……」"
10017030-93 = "不可以唷，老師！#n怎麼能懷疑在聖誕節受苦的學生呢！？"
10017030-94 = "老師也曾說過「不能用先入為主的觀念來判斷事物」吧！#n這樣會惹聖誕老人生氣的唷！？"
10017030-95 = "[s]「抱，抱歉……」"
10017030-96 = "總之，請收下這裡的手套和帽子。畢竟天氣也很冷呢……"
10017030-102 = "嗚，謝謝……#n但消失的炸雞看來是沒指望拿回來了……"
10017030-103 = "話說回來……#n救護騎士團長今天不在嗎？"
10017030-105 = "團長的話，差不多快到了吧！"
10017030-106 = "他會先在三一巡視一圈後，再過來和我們會合。"
10017030-107 = "是說，怎麼突然提到美禰團長？"
10017030-111 = "不，只是想說可能的話……"
10017030-112 = "總之，謝謝你們聽我訴苦……#n雖然炸雞已經沒了……"
10017030-114 = "有什麼我們能幫得上忙的嗎……？"
10017030-115 = "什麼都可以，請告訴我們吧……"
10017030-120 = "只要記住這件事就行了。"
10017030-121 = "記得曾經在某個聖誕節，有人被奪走了炸雞，只能孤單寂寞地度過……"
10017030-130 = "走掉了呢……"
10017030-131 = "要追上去嗎？"
10017030-132 = "[s7]「就算追上去，也改變不了什麼吧……」\n[s8]「唔嗯，他們似乎也不想要我們追上去吧……」"
10017030-135 = "是這樣沒錯……可是……"
10017030-136 = "總覺得很心痛……"
10017030-137 = "……老師？在想什麼事嗎？"
10017030-138 = "[s]「實現正義部為什麼會做那種事呢……」"
10017030-139 = "說得也是，他們平常明明都是很好的人……"
10017030-140 = "不過偶爾也會做出很不得了的事呢！"
10017030-141 = "那倒也是事實……每次只要收到實現正義部出動的通知，我們就會做好心理準備。"
10017030-142 = "因為在檢查裝備、準備藥品和擔架的時候，常常會突然聽見「咚──！」的巨響！"
10017030-143 = "[s]「感覺已經習以為常了呢……」"
10017030-144 = "也，也不一定每次都是那樣啦……#n只是我們救護騎士團，必須做好能隨時應對各種情況的準備。"
10017030-145 = "唔嗯，但即便如此，這次的事……"
10017030-146 = "[s]「先打起精神來，花繪。之後再找當事人問問吧？」"
10017030-147 = "嗯，說的也是！"

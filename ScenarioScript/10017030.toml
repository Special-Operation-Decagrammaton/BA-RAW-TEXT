[translation]
10017030-1 = "ตอนที่ 3;ฝันร้ายของคริสต์มาส"
10017030-2 = "ในเมืองคิโวทอส"
10017030-7 = "ให้คริสต์มาสนี้เต็มไปด้วยความรักนะคะ มาช่วยเหลือคนที่ยากไร้กันเถอะค่ะ!"
10017030-12 = "ได้โปรดช่วยเหลือคนที่ลำบากด้วยนะคะ! มีหลายคนที่ต้องการความช่วยเหลือจากทุกคนนะคะ!"
10017030-14 = "นั่นชมรมอัศวินบรรเทาทุกข์มาขอรับบริจาคเหรอ? ถึงช่วงเวลานี้ของปีแล้วสินะ"
10017030-15 = "เอ้า... รับไปสิ เอาไปให้คนที่ลำบากใช้นะ"
10017030-20 = "ขอบคุณมากเลยค่ะ พวกฉันเตรียมของขวัญที่ทำเองมาด้วย ช่วยรับไปด้วยนะคะ"
10017030-24 = "นี่คือหมวกกับถุงมือค่ะ! ฮิฮิ พวกฉันถักเองกับมือเลยนะคะ!"
10017030-29 = "เซรินะจังกับฮานะเอะจังถักเองเลยเหรอ? แบบนี้ยิ่งเป็นของขวัญที่มีค่าเลยนะ..."
10017030-30 = "นั่นน่ะสิ  แบบนี้พวกเราต้องช่วยงานการกุศลให้มากขึ้นแล้ว"
10017030-32 = "ไม่ค่ะ ไม่ใช่อย่างนั้นนะคะ! พวกฉันไม่ได้เอามาแจกเพราะอยากให้บริจาคเยอะๆ หรอกค่ะ..."
10017030-33 = "แค่ปรารถนาดีต่อกันก็พอแล้วค่ะ! ขอให้เป็นฤดูหนาวที่มีความสุขนะคะ เมอร์รีคริสต์มาส!"
10017030-37 = "[ns] \"ดูทุกคนให้ความเชื่อถือเหมือนเป็นกิจกรรมประจำปีเลยนะ\""
10017030-38 = "งะ... งั้นเหรอคะ? พวกฉันแค่รู้สึกว่าได้ทำงานอย่างเต็มที่ในฐานะชมรมอัศวินบรรเทาทุกข์ก็แค่นั้น.."
10017030-39 = "ใช่ค่ะคุณครู! อีกอย่าง พอเราเห็นผู้คนมีความสุขกัน พวกเราก็จะพลอยอิ่มเอมใจไปด้วยค่ะ!"
10017030-40 = "[s] \"ฟังแล้วซึ้งจนเหมือนน้ำตาจะไหลออกมาเลย...\""
10017030-41 = "คุณครูคะ เป็นอะไรหรือเปล่าคะ...?"
10017030-42 = "โตขนาดนี้แล้ว เป็นผู้ใหญ่ร้องไห้ไม่ได้นะคะ! ฮึบน้ำตาไว้เลย!"
10017030-44 = "บรรยากาศกำลังดีเลย ขอโทษที่เข้ามาขัดจังหวะนะ..."
10017030-50 = "อ๊ะ พวกคนที่ทรงเหมือนจะเป็นนักเลงค่ะรุ่นพี่!"
10017030-51 = "ไม่ได้นะคะฮานาเอะจัง ห้ามตัดสินคนจากรูปลักษณ์ภายนอกสิคะ"
10017030-52 = "บาดเจ็บตรงไหนมาหรือเปล่าคะ? เห็นชอบได้แผลมากันบ่อยๆ เลย..."
10017030-53 = "ถ้าต้องการให้ปฐมพยาบาล วันนี้ชมรมอัศวินบรรเทาทุกข์ก็พร้อมให้ความช่วยเหลือค่ะ!"
10017030-55 = "ไม่หรอกๆ พวกฉันปกติดี... ซะทีไหน... เฮ้อ..."
10017030-56 = "พวกฉันมีเรื่องทุกข์ใจอยากระบายน่ะ ช่วยรับฟังหน่อยได้ไหม?"
10017030-57 = "ก็... นี่มันคริสต์มาสนี่นา พวกเธอมาที่นี่เพื่อช่วยเหลือคนที่น่าสงสารใช่ไหมล่ะ?"
10017030-58 = "เอายังไงดีคะคุณครู?"
10017030-59 = "[s] \"ช่วยฟังเรื่องของพวกเขาก่อนแล้วกัน\""
10017030-60 = "อืม~ ถ้าคุณครูพูดแบบนั้น งั้นก็ได้ค่ะ!"
10017030-62 = "เรื่องที่เล่ามา... เป็นความจริงเหรอคะ?"
10017030-63 = "แต่ว่าชมรมทวงความยุติธรรมก็ไม่น่า...?"
10017030-67 = "ก็บอกว่าจริงไง! พวกฉันแค่อยู่กันเฉยๆ นะ!"
10017030-68 = "ฮือๆ... อุตส่าห์เตรียมไก่ทอดไว้กินในวันคริสต์มาสแท้ๆ..."
10017030-69 = "ใช่! แล้วมันก็เป็นไก่ทอด 'สูตรพิเศษ' ที่เราจะให้เป็นของขวัญคนอื่นด้วย!"
10017030-70 = "[s1] \"ไก่ทอด 'สูตรพิเศษ' งั้นเหรอ...?\" \n[s2] (ชมรมทวงความยุติธรรมแย่งไก่ทอดไป... ดื้อๆ เลยงั้นเหรอ...?)"
10017030-73 = "ใช่แล้ว! ไหนๆ ก็เตรียมมาแจกแล้ว เราก็เลยอยากแจกอะไรที่มันไม่ธรรมดาไงล่ะ!"
10017030-74 = "ใช่แล้ว! ถูกต้องเลย!"
10017030-75 = "แต่อยู่ดีๆ พวกนั้นก็มาถล่มเรา แล้วก็แย่งไก่ทอดไปหมดเลย!"
10017030-76 = "ที่พวกเราทำมันผิดขนาดนั้นเลยเหรอ? คริสต์มาสก็ต้องมีไก่ทอดสิ ถึงแม้ไก่งวงจะป็อปกว่าก็เถอะ..."
10017030-77 = "อุตส่าห์เก็บเงินทีละนิดๆ เพื่อให้ได้ไก่ทอดนั้นมาแท้ๆ..."
10017030-78 = "และเพื่อตอบแทนความพยายามของพวกเรา เราก็เลย... ทำอะไรลงไปนิดหน่อย ก็ของเดิมมันไม่ถูกใจ#nนี่นา...!"
10017030-79 = "[s3] \"ทำอะไรลงไปนิดหน่อย...?\"\n[s4] \"อธิบายได้ไหมว่าทำอะไรไป?\""
10017030-82 = "ก็... ก็แบบ! ถ้าจะให้อธิบายให้เจาะจง มันก็น่าจะซับซ้อนนิดหน่อย..."
10017030-83 = "แต่สิ่งที่สำคัญคือหัวใจของพวกเรา! และความรู้สึกที่มีต่อทุกคน! มันถูกเหยียบย่ำไปแล้ว...!"
10017030-84 = "ใช่! แล้วดันมาเป็นในวันคริสต์มาสอีก! เห็นอย่างนี้พวกเราก็ทำเรื่องดีๆ ได้เหมือนกันนะ! แสดงเจตนาที่ดีออกมาในวิธีแบบนั้นน่ะ...!"
10017030-85 = "ชมรมทวงความยุติธรรม พวกนั้นน่ะเลือดเย็นและไม่มีหัวใจ! อยากรู้จริงๆ เลยว่าเลือดเป็นสีอะไร!"
10017030-87 = "เหยียบย่ำจิตใจที่ปรารถนาดีต่อผู้อื่น... แบบนี้ไม่ดีเลยนะคะ! ถ้าซานตาคลอสรู้ก็คงเศร้าเลยนะคะ..."
10017030-88 = "ใช่ค่ะ การทำความดีไม่ต้องมีคุณสมบัติอะไรหรอกนะคะ"
10017030-89 = "ครั้งนี้พวกฉันก็คิดว่าชมรมทวงความยุติธรรมทำเกินไปค่ะ..."
10017030-90 = "[s5] \"ไม่ได้รู้สึกว่า... มันค่อนข้างน่าสงสัยกันเลยเหรอ?\"\n[s6] \"อืมมมมมม... มันน่าสงสัยอยู่นะ\""
10017030-93 = "ไม่ได้นะคะคุณครู! อย่าสงสัยคนที่น่าสงสารในวันคริสต์มาสสิคะ! ห้ามเลยนะ!"
10017030-94 = "หากเข้าใจผิดเพราะดูจากแค่ภายนอก ทุกคนก็จะเสียใจเอานะคะ! เดี๋ยวซานตาคลอสเอาไม้เรียวมาฟาด#nหรอกค่ะ!"
10017030-95 = "[s] \"ครูผิดไปแล้ว...\""
10017030-96 = "เอาเป็นว่าพวกฉันจะให้ถุงมือกับหมวกไปก่อนนะคะ ยิ่งหนาวๆ อยู่ด้วย..."
10017030-102 = "ฮือๆๆๆๆ... ขอบใจนะ แต่ฉันยังทำใจกับไก่ทอดที่หายไปไม่ได้เลย..."
10017030-103 = "ว่าแต่... วันนี้หัวหน้าชมรมอัศวินบรรเทาทุกข์ไม่มาเหรอ?"
10017030-105 = "หัวหน้าน่าจะใกล้มาแล้วละค่ะ"
10017030-106 = "ทางนั้นบอกว่าจะกลับมาถ้าลาดตระเวนทรีนิตี้เสร็จค่ะ"
10017030-107 = "ว่าแต่... ถามหาหัวหน้ามิเนะทำไมเหรอคะ?"
10017030-111 = "เอ่อ... ก็... ก็แค่..."
10017030-112 = "เอาเถอะ ขอบใจที่ช่วยรับฟังนะ... ถึงจะไม่ได้ไก่ทอดคืนก็เถอะ..."
10017030-114 = "แย่เลย... มีอะไรให้พวกฉันช่วยไหมคะ?"
10017030-115 = "บอกมาเถอะค่ะว่าเราช่วยอะไรได้บ้าง..."
10017030-120 = "ก็แค่... ช่วยจำเอาไว้ให้หน่อยแล้วกัน"
10017030-121 = "ว่าในวันคริสต์มาส มีพวกคนที่ยืนหนาวสั่นกันอยู่ แล้วก็โดนแย่งไก่ทอดไป... ฮือ... กระซิกๆ..."
10017030-130 = "ไปกันแล้วเหรอคะ...?"
10017030-131 = "ตามไปดีไหมคะ...?"
10017030-132 = "[s7] \"ครูไม่คิดว่าพวกเขาอยากให้เราตามไปนะ\"\n[s8] \"แบบนั้นมันจะไม่ดูเป็นเหมือนนักสะกดรอยตามเหรอ?\""
10017030-135 = "งะ... งั้นเหรอคะ? แต่ว่า..."
10017030-136 = "ฉันเศร้าใจจังค่ะคุณครู แง..."
10017030-137 = "คุณครูไม่รู้สึกติดใจอะไรเหรอคะ?"
10017030-138 = "[s] \"ครูกำลังคิดน่ะว่าชมรมทวงความยุติธรรมทำแบบนั้นกันทำไม\""
10017030-139 = "นั่นสิคะ ปกติก็เป็นคนน่ารักกันนี่นา..."
10017030-140 = "แม้บางครั้งจะ... ยึดมั่นในความยุติธรรมจนเกินไปก็เถอะค่ะ!"
10017030-141 = "แหะๆๆ... ที่จริงเวลาได้ยินข่าวว่าชมรมทวงความยุติธรรมจะออกปฏิบัติการ พวกฉันก็จะเตรียมใจกันไว้#nด้วยค่ะ"
10017030-142 = "ทั้งตรวจสภาพเวชภัณฑ์ เตรียมยา แล้วก็เอาเปลหามออกมารอท่าค่ะ แล้วหลังจากนั้นพวกเราก็จะได้#nยินเสียง ตู้ม! ตามมาค่ะ!"
10017030-143 = "[s] \"ทำกันแทบจะเป็นระบบเลยนะ...\""
10017030-144 = "ไม่ใช่แบบนั้นทุกครั้งหรอกนะคะ! พวกเราชาวอัศวินบรรเทาทุกข์ก็แค่ต้องเตรียมพร้อมในทุกๆ สถานการณ์น่ะค่ะ!"
10017030-145 = "แต่ว่าครั้งนี้เราทำแบบนั้นกันไม่ได้ค่ะ... คงต้องกลับไปสำนึกผิดแล้วละค่ะ"
10017030-146 = "[s] \"คะ... ครูเป็นกำลังใจให้นะฮานาเอะ ไว้เรามาคุยเรื่องเหตุผลกันคราวหลังดีไหม?\""
10017030-147 = "ค่ะ! ฉันจะสู้ๆ ค่ะ!"

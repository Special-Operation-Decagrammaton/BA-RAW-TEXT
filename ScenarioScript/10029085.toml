[translation]
10029085-1 = "Episode 8;Memories in Your Heart"
10029085-13 = "Are you...done...?"
10029085-14 = "I'm loathe to admit it, but... It's becoming difficult to keep the peace...!"
10029085-15 = "Shokuhou...?!"
10029085-16 = "Just a little more...!"
10029085-17 = "...It's done!"
10029085-18 = "Okay. The chip is in and the connections are restored. Now we just have to turn it on."
10029085-19 = "Thank you for waiting! Now, without further ado...!"
10029085-20 = "I'll activate the machinery!"
10029085-25 = "...!"
10029085-26 = "...!"
10029085-27 = "...!"
10029085-28 = "...!"
10029085-29 = "[ns1] \"It's powering on...!\"\n[ns2] \"The sound is totally different from before...!\""
10029085-33 = "...?!"
10029085-34 = "Wh-What?! It's that light again...!"
10029085-35 = "*gasp*"
10029085-41 = "Wh-What...?!"
10029085-47 = "Ehh...?!"
10029085-53 = "The light... It's...!"
10029085-54 = "...Success. The machinery is restoring normalcy between the two worlds."
10029085-55 = "Everyone who's been transported here will be sent back to where they were originally from."
10029085-56 = "Wow... We really did it...?"
10029085-57 = "Heehee. Yes. To be honest, I didn't think it would work..."
10029085-58 = "There's no better motivation than a time limit! A phenomenon that can be attributed to time perception!"
10029085-59 = "Time perception, of course, refers to a person's psychological sense of time as discerned by their sense organs and brain. Unlike other senses, it is based on the total amount of information..."
10029085-61 = "So we're done? It's sending us back?"
10029085-62 = "I don't feel like I'm being sent back..."
10029085-64 = "They're ignoring me..."
10029085-66 = "They really have adapted to our world."
10029085-67 = "This is as planned. The machinery is working in reverse order. The person who came first will be the last to go."
10029085-68 = "As the president said, you'll be sent back to the exact moment when you were taken from your world. You'll have no memories of this place."
10029085-69 = "Even the firearms you're holding..."
10029085-70 = "Oh."
10029085-71 = "You mean... We can't take them with us?"
10029085-72 = "No. They weren't brought here by the machinery, so they will remain here."
10029085-73 = "Hm... I see..."
10029085-74 = "What a shame. I was hoping I could take some souvenirs home."
10029085-75 = "As I've already explained, what happened here won't have any meaning to you. No memories, no evidence."
10029085-76 = "None of this will ever have happened or existed in your world."
10029085-77 = "Haha... Th-That's true..."
10029085-81 = "...Well..."
10029085-82 = "That's fine, isn't it? Because we had fun!"
10029085-83 = "...?"
10029085-84 = "...Huh?"
10029085-85 = "Sure, we won't remember anything, but that doesn't mean our visit here wasn't real, right? In fact, it will stay in the memories of Sensei and Eimi..."
10029085-86 = "O-Of course, I don't know if these days were fun for Eimi...or just annoying! Hahaha!"
10029085-87 = "...Ah!"
10029085-88 = "That reminds me... Is it okay if I do this...?"
10029085-94 = "This is..."
10029085-95 = "I just want to ask... Can you hold onto this for me?"
10029085-96 = "As a reminder that we had a blast while we were here!"
10029085-97 = "We had a blast...? I don't mind, but..."
10029085-98 = "[s3] \"Of course. We'll keep it safe.\"\n[s4] \"I'm glad you had fun.\""
10029085-101 = "Sensei...?"
10029085-102 = "...!"
10029085-103 = "Thank you, Sensei!!"
10029085-107 = "I don't understand any of this, but okay. We'll do as you ask."
10029085-108 = "Thank you, Eimi!!"
10029085-109 = "How about you, Misaka? Shokuhou? Since we can't take them anyway, let's leave them with our new friends!"
10029085-110 = "In a way, it'll be like we left behind proof that we came here! Isn't that nice?"
10029085-112 = "Sure... But I'd hate to think I was leaving them with a burden..."
10029085-113 = "*sigh*"
10029085-114 = "I guess it's okay. Taking care of something like this isn't really a big deal, after all."
10029085-115 = "I have to admit, these last few days have been more leisurely than usual... I suppose being lost in another world might not be such a bad thing."
10029085-116 = "...Though it did give me a bit of a headache, right at the end."
10029085-122 = "Hm..."
10029085-123 = "Even with no memories, no evidence... You say it won't be meaningless..."
10029085-124 = "[s5] \"Life is like that sometimes.\"\n[s6] \"From time to time, you don't remember BECAUSE you had so much fun.\""
10029085-127 = "I don't know about that, but..."
10029085-128 = "If Sensei said it, I'm sure I'll understand it someday."
10029085-129 = "Keeping that possibility in mind..."
10029085-130 = "We'll keep all of these safe for you."
10029085-131 = "Nice!"
10029085-132 = "Then..."
10029085-133 = "Oh, the light..."
10029085-134 = "[s7] \"Looks like your turn has come.\"\n[s8] \"I guess it's time to say goodbye.\""
10029085-137 = "Looks like it! Heehee... I'll go on ahead!"
10029085-138 = "Thank you so much, Engineering Department people!"
10029085-144 = "For real this time...!"
10029085-145 = "I had a blast!"
10029085-151 = "Farewell."
10029085-157 = "...Goodbye."
10029085-158 = "[s9] \"Take care, Misaka.\"\n[s10] \"Safe travels.\""
10029085-167 = "...Are they gone?"
10029085-168 = "After all that hustle and bustle, it got real quiet real quick all of a sudden."
10029085-169 = "It's because there's only...us and the machinery left."
10029085-170 = "I can even hear our voices echo! It hardly feels real anymore!"
10029085-172 = "The machinery..."
10029085-178 = "...Hm?"
10029085-180 = "That sound..."
10029085-181 = "[s11] \"It's making some strange noises...\"\n[s12] \"It almost sounds like tearing...?\""
10029085-184 = "Oh."
10029085-185 = "The machinery is running out of control. At this rate, it will soon explode and the whole area will collapse."
10029085-186 = "Oh, that makes sense. It probably hasn't seen this much use in ages, and we even ran it in reverse..."
10029085-187 = "Wait... Did you just say..."
10029085-188 = "...the whole area will..."
10029085-189 = "...collapse?"
10029085-190 = "[s13] \"...What?\"\n[s14] \"That sounds serious!\""
10029085-193 = "Correct. We should run now."
10029085-194 = "...Or we could use the machinery to get to safety."
10029085-195 = "No, never mind. It's set to reverse and can only recall things."
10029085-196 = "We should hurry. Everyone, follow me."
10029085-197 = "I know we were saying we had a blast, but this is a little too literal!"
10029085-198 = "[s15] \"Well, we weren't here to have fun...\"\n[s16] \"Talk later! Run first!\""
10029085-201 = "Heeee!"
10029085-214 = "After a frantic dash, we managed to escape before the facility self-destructed."
10029085-218 = "As soon as we were back safe at Millennium, we all collapsed from exhaustion..."
10029085-222 = "Heehee."
10029085-223 = "What a fun couple of days. So many interesting things happened..."
10029085-224 = "I don't know about you, Sensei, but for me, a whole new realm of possibilities have opened before me."
10029085-225 = "This is why I can't give up on Millennium ruins."
10029085-227 = "A Certain Scientific Record of Youth"

[translation]
10029085-1 = "ตอนที่ 8;ความทรงจำกลางใจ"
10029085-13 = "ยัง... ไม่เสร็จอีกเหรอ?"
10029085-14 = "ฉันไม่อยากพูดอะไรแบบนี้เลย... แต่ว่าฉันทนไม่ค่อยจะไหวแล้ว..."
10029085-15 = "โชคุโฮว...!?"
10029085-16 = "อีกนิดเดียว...!"
10029085-17 = "... เสร็จหมดแล้ว!"
10029085-18 = "ดีละ ชิปก็ใส่เข้าไปแล้ว การเชื่อมต่อก็ตรงกันทั้งหมด ทีนี้ก็เปิดใช้งานได้"
10029085-19 = "รอกันนานไหมคะทุกคน!!  งั้นฉันจะเปิดใช้งาน...!!"
10029085-20 = "เครื่องนี้เลย!!"
10029085-25 = "...!"
10029085-26 = "...!"
10029085-27 = "...!!"
10029085-28 = "...!"
10029085-29 = "[ns1] \"มีบางอย่างทำงานแล้ว...!\"\n[ns2] \"เสียงไม่เหมือนเมื่อกี้แฮะ...!\""
10029085-33 = "...!?"
10029085-34 = "นี่มัน...! อะ... อะไรเนี่ย!? มีแสงอีกแล้ว...!!"
10029085-35 = "... เฮือก!?"
10029085-41 = "... อะ... อะไรกันน่ะ...!?"
10029085-47 = "เอ๋...!?"
10029085-53 = "แสง...  นี่มัน...!!"
10029085-54 = "... สำเร็จแล้ว เริ่มเกิดการย้อนกลับสู่สภาพเดิมตามลำดับที่ 'เครื่องมือ' นี้เรียกออกมาแล้ว"
10029085-55 = "การทำงานนี้จะทำให้ทุกคนที่ถูกเรียกมาที่นี่ถูกส่งกลับไปยังที่เดิมที่เคยอยู่"
10029085-56 = "... โอ้... พวกเราทำสำเร็จจริงๆ เหรอเนี่ย?"
10029085-57 = "ฮุฮุ นั่นสินะ บอกตามตรงว่าฉันไม่ได้ขยันซ่อมเพราะคิดว่ามันจะสำเร็จจริงๆ เลยละ..."
10029085-58 = "ปกติแล้วต้องมีเวลาจำกัด งานถึงจะออกมาดีค่ะ! ในแง่ของการรับรู้เวลาก็ถือว่าถูกต้องด้วยค่ะ!!"
10029085-59 = "อ้อ! ต้องอธิบายว่าการรับรู้เวลาคือการที่มนุษย์รู้สึกเกี่ยวกับเวลาในทางจิตวิทยา ผ่านทางการทำงาน#nของอวัยวะรับความรู้สึกและสมอง การรับรู้นี้แตกต่างจากอย่างอื่นตรงที่มีการบูรณาการของข้อมูล..."
10029085-61 = "งั้นก็ถือว่าได้แล้วเหรอ...? พวกฉันก็จะได้กลับไปเหมือนกันใช่มั้ย?"
10029085-62 = "แต่ทำไมยังรู้สึกเหมือนเดิมอยู่เลยล่ะคะ..."
10029085-64 = "... เมินกันเฉยเลย!?"
10029085-66 = "ปรับตัวได้ดีจริงๆ เลยนะ"
10029085-67 = "ไม่มีปัญหาหรอก ที่ยังไม่รู้สึกอะไรก็เพราะยังไม่ถึงคิวน่ะ คนที่มาถึงก่อนก็จะได้กลับไปเป็นคนสุดท้าย"
10029085-68 = "อย่างที่หัวหน้าบอกไว้ว่าถ้ากลับไปแล้ว ก็จะกลับไปยังช่วงเวลาก่อนที่จะจากมา และนั่นก็เลยทำให้ไม่เหลือความทรงจำเลยแม้แต่น้อย"
10029085-69 = "รวมถึงปืนที่กำลังถืออยู่ตอนนี้ด้วย..."
10029085-70 = "... อ่า"
10029085-71 = "นี่เหรอคะ...? สุดท้ายก็เอากลับไปไม่ได้สินะคะ...?"
10029085-72 = "ใช่ เพราะมันไม่ใช่สิ่งที่ 'เครื่องมือเรียกมา' น่ะ ตอนที่ทุกคนกลับไปกันแล้ว มันก็คงอยู่ทางนี้แหละ"
10029085-73 = "อืม... เป็นอย่างนั้นเหรอคะ..."
10029085-74 = "... น่าเสียดายอยู่นะคะเนี่ย ถ้าเอากลับไปเป็นของที่ระลึกได้ก็ดีสิ"
10029085-75 = "ฉันถึงได้บอกไงว่าเรื่องราวที่เกิดขึ้นตอนอยู่ที่นี่มันไม่มีความหมาย ความทรงจำก็ไม่มี หลักฐานอะไรก็ไม่เหลือ"
10029085-76 = "ไม่สิ มันจะไม่เคยเกิดขึ้นตั้งแต่แรกต่างหาก"
10029085-77 = "แหะๆ... มะ... มันก็จริงอยู่หรอกค่ะ..."
10029085-81 = "ก็นะ..."
10029085-82 = "แต่ก็ไม่เป็นอะไรหรอกค่ะ ... ยังไงพวกเราก็สนุกกันนี่คะ!!"
10029085-83 = "...?"
10029085-84 = "... ว่าไงนะ?"
10029085-85 = "ถึงจะบอกว่าไม่มีความทรงจำ แต่ก็ใช่ว่าเรื่องที่พวกฉันมาที่นี่จะสูญเปล่าไปด้วยนี่คะ ยังไงซะพวกฉัน#nก็จะยังอยู่ในความทรงจำของคุณครูและคุณเอมิ..."
10029085-86 = "ถะ... ถึงแม้พวกฉันจะไม่แน่ใจว่าคุณเอมิรู้สึกสนุกหรือรำคาญพวกฉันกันแน่ก็เถอะ... แหะๆ! แหะๆๆ...!"
10029085-87 = "... อ๊ะ!"
10029085-88 = "จริงสิ ไหนๆ ก็พูดเรื่องนั้นออกมาแล้ว งั้นก็... ขอแบบนี้ได้ไหมคะ?"
10029085-94 = "ให้ฉัน..."
10029085-95 = "รบกวนฝากเก็บรักษาไว้... จะได้ไหมคะ?"
10029085-96 = "เก็บไว้เพื่อบอกว่า 'ฉันเคยมาเล่นสนุกที่นี่'!"
10029085-97 = "... 'เคยมาเล่นสนุกที่นี่'...? ฉันก็ไม่ติดอะไรหรอก..."
10029085-98 = "[s3] \"ได้สิ จะรักษาไว้อย่างดีเลย\"\n[s4] \"ครูดีใจนะที่ทุกคนสนุกกัน\""
10029085-101 = "คุณครู...?"
10029085-102 = "...!!"
10029085-103 = "ขอบคุณค่ะ คุณครู!!"
10029085-107 = "ฉันยังไม่ค่อยแน่ใจเท่าไรหรอกนะ แต่ก็ได้ ฉันจะทำตามที่พวกเธอขอให้นะ"
10029085-108 = "ขอบคุณนะคะคุณเอมิ!!"
10029085-109 = "แล้วคุณมิซากะกับคุณโชคุโฮวล่ะคะ? ไหนๆ ก็เอาไปไม่ได้อยู่แล้ว งั้นทั้งสองคนก็ฝากไว้ด้วยเลยสิคะ!"
10029085-110 = "ถ้ามาคิดๆ ดูแล้ว นี่ถือว่าเป็น 'ร่องรอยที่ทิ้งไว้ในต่างโลก' เลยนะคะ! ไม่ดีเหรอคะ?"
10029085-112 = "เอ่อ... มันก็ฟังดูดีอยู่หรอกนะ แต่สุดท้ายมันก็เป็นการทิ้งสัมภาระอยู่ดีไม่ใช่เหรอ..."
10029085-113 = "... เฮ้อ"
10029085-114 = "แต่ก็คงไม่เป็นไรหรอก การฝากให้เก็บไว้ให้หน่อย มันก็ไม่น่าจะเป็นการรบกวนอะไรกันมากมาย"
10029085-115 = "นั่นสินะ ในทางกลับกัน ฉันว่าช่วงที่ได้อยู่ที่นี่ก็สบายใจกว่าทุกทีด้วย... การได้เป็นคนนอก บางทีมันก็ไม่ได้เลวร้ายไปซะทีเดียวนะ"
10029085-116 = "... ถึงแม้ตอนท้ายจะต้องปวดหัวอยู่หน่อยก็เถอะ"
10029085-122 = "... อืม..."
10029085-123 = "ถึงแม้จะจำไม่ได้ และไม่เหลือร่องรอยอะไรกลับไปก็เถอะ... แต่ก็ใช่ว่า... จะไม่มีความหมายนะ"
10029085-124 = "[s5] \"บางทีก็ต้องเป็นอย่างนั้นละ\"\n[s6] \"เพราะถ้าจำไม่ได้เลย แปลว่ามันสนุกจริงๆ\""
10029085-127 = "... ฉันไม่เห็นจะเข้าใจเลย"
10029085-128 = "แต่ถ้าคุณครูพูดแบบนั้น หลังจากนี้ฉันอาจจะเข้าใจความหมายก็ได้"
10029085-129 = "ฉันจะคิดถึงความเป็นไปได้นั้นและเฝ้ารอแล้วกัน..."
10029085-130 = "แล้วก็จะเก็บของพวกนี้ไว้เป็นอย่างดีเลย"
10029085-131 = "... ฮุฮุ! ดีเลยค่ะ!!"
10029085-132 = "ถ้างั้น..."
10029085-133 = "อ๊ะ มีแสงแล้ว..."
10029085-134 = "[s7] \"ได้เวลาแล้วสินะ\"\n[s8] \"ต้องบอกลากันแล้ว\""
10029085-137 = "นั่นสินะคะ! ฮิฮิ... ฉันไปก่อนนะคะ!"
10029085-138 = "ขอบคุณทุกคนมากนะคะ ชมรมวิศวกรรมก็ด้วย!!"
10029085-144 = "ฉันไปจริงๆ ละ...!"
10029085-145 = "ที่ผ่านมาฉันสนุกจริงๆ ค่ะ!!"
10029085-151 = "ถ้างั้นฉันก็ขอลาไปด้วยคนนะ"
10029085-157 = "... ดูแลตัวเองกันด้วยล่ะ"
10029085-158 = "[s9] \"ดูแลตัวเองด้วยนะ มิซากะ\"\n[s10] \"กลับดีๆ นะ~\""
10029085-167 = "... ไปกันหมดแล้วเหรอ?"
10029085-168 = "ความวุ่นวายที่เกิดขึ้นจนถึงเมื่อกี้เงียบลงจนน่าเศร้าใจเลยนะ"
10029085-169 = "เหลือกันแค่พวกเรา... กับเครื่องมือแล้ว"
10029085-170 = "เงียบลงจนเหมือนเสียงเราจะก้องขึ้นเลย! จนถึงตอนนี้ฉันยังไม่รู้สึกว่านี่คือความจริงเลยค่ะ!"
10029085-172 = "อืม... อุปกรณ์ไม่มีปัญหา"
10029085-178 = "... หืม?"
10029085-180 = "เสียงนี้มัน..."
10029085-181 = "[s11] \"มีเสียงแปลกๆ ออกมาจากเครื่อง...\"\n[s12] \"เหมือนมีเสียงอะไรขาดเลย...?\""
10029085-184 = "... อ่า"
10029085-185 = "เครื่องมือเริ่มระเบิดจากการทำงานผิดพลาด ถ้าเป็นแบบนี้มันคงระเบิดในไม่ช้า และพื้นที่รอบๆ จะพัง#nไปด้วย"
10029085-186 = "คงเป็นอย่างนั้นสินะ เครื่องมันต้องทำงานหลายครั้ง แถมทำงานแบบย้อนกลับด้วย..."
10029085-187 = "...? เดี๋ยวก่อน ว่ายังไงนะ..."
10029085-188 = "พื้นที่รอบๆ..."
10029085-189 = "... จะพังไปด้วย... งั้นเหรอคะ?"
10029085-190 = "[s13] \"... ว่าไงนะ?\"\n[s14] \"งั้นนี่ก็เรื่องใหญ่น่ะสิ?\""
10029085-193 = "ใช่ ตอนนี้เราต้องรีบเผ่นออกจากที่นี่กันแล้วละ"
10029085-194 = "... สงสัยว่ามันย้ายพวกเราได้หรือเปล่างั้นเหรอ?"
10029085-195 = "ไม่ได้หรอก ตอนนี้เครื่องมันถูกตั้งค่าให้ทำงาน 'ย้อนกลับ' ได้แค่อย่างเดียว คงจะให้ส่งอะไรไปที่ไหน#nไม่ได้หรอก"
10029085-196 = "เร็วเข้าเถอะ ทุกคนตามฉันมา"
10029085-197 = "เพิ่งจะบอกพวกนั้นว่าเราก็สนุกเหมือนกันไปหยกๆ เอง!! แต่ตอนนี้กลายเป็นว่าเราไม่สนุกกันสักนิด#nแล้วนะคะ!"
10029085-198 = "[s15] \"แต่พวกเราก็ไม่ได้มาเที่ยวเล่นนี่นา...\"\n[s16] \"เอาไว้คุยกันทีหลังเถอะ!! ตอนนี้รีบวิ่งกันก่อน!!\""
10029085-201 = "เฮือกกกกก!!!"
10029085-214 = "(หลังจากนั้นทุกคนก็วิ่งอย่างไม่คิดชีวิตให้พ้นจากเครื่องมือนั่น และออกมาได้อย่างปลอดภัย)"
10029085-218 = "(หลังจากมาถึงมิลเลเนียมอย่างปลอดภัย ทุกคนก็หมดแรงและทรุดลงกันเป็นแถว...)"
10029085-222 = "... ฮุฮุ"
10029085-223 = "เป็น 1-2 วันที่สนุกดีนะคะ ไม่คิดเลยว่าจะได้เจอเรื่องแบบนี้ด้วย..."
10029085-224 = "ฉันไม่รู้ว่าคุณครูจะรู้สึกอย่างไร แต่ฉันรู้สึกได้ถึงความเป็นไปได้ของที่นั่นมากขึ้นเรื่อยๆ ค่ะ"
10029085-225 = "เพราะแบบนี้ไงคะ ฉันถึงไม่ล้มเลิกเรื่องพื้นที่รกร้างของมิลเลเนียม"
10029085-227 = "แฟ้มลับวัยรุ่น คดีวิทยาศาสตร์"

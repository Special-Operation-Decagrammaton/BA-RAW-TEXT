[translation]
10029085-1 = "第8話;回憶深藏內心"
10029085-13 = "還沒……好嗎？"
10029085-14 = "雖然不想這麼說……但我快到極限了……"
10029085-15 = "食蜂……！？"
10029085-16 = "還差一點……！"
10029085-17 = "……搞定了！！"
10029085-18 = "好，晶片已經順利放入，接口也全都連接好了。#n接下來只要啟動就行了。"
10029085-19 = "各位久等了！！那麼……"
10029085-20 = "啟動「設施」！！"
10029085-25 = "……！"
10029085-26 = "……！"
10029085-27 = "……！！"
10029085-28 = "……！"
10029085-29 = "[ns1]「啟動了……！」\n[ns2]「聲音跟之前不一樣……！」"
10029085-33 = "……！？"
10029085-34 = "搞，搞什麼！？這是……又發光了……！！"
10029085-35 = "……啊！？"
10029085-41 = "……怎，怎麼回事……！？"
10029085-47 = "唔呃……！？"
10029085-53 = "這道光是……！！"
10029085-54 = "……成功了。#n「設施」開始依序將影響復原了。"
10029085-55 = "被傳送到這裡的所有人都將回到原來的地方。"
10029085-56 = "我們……真的成功了嗎？"
10029085-57 = "呵呵，看來是呢。#n老實說，我原本並不認為一定能修好……"
10029085-58 = "事情果然就是要有時間限制才有辦法做好呢！#n從時間知覺的角度來看，這種說法也是正確的！！"
10029085-59 = "順帶一提，所謂時間知覺是指人藉由自己感官和大腦的作用所感受到的心理時間。#n與其他知覺不同，比起感覺更注重以資訊總量為依據的……"
10029085-61 = "這樣就結束了……？我們也要回去了嗎？"
10029085-62 = "不過好像還沒有任何要被傳送回去的感覺呢……"
10029085-64 = "……被無視了！？"
10029085-66 = "適應力確實很優秀呢。"
10029085-67 = "不必擔心，只是先後順序的問題。#n最先抵達的人將會最晚離開。"
10029085-68 = "各位應該會如部長所說，回到抵達這裡之前的狀態才對。#n並且將不會留下任何記憶……"
10029085-69 = "就連現在手中的槍也……"
10029085-70 = "……啊。"
10029085-71 = "這個……？結果不能帶走嗎……？"
10029085-72 = "嗯。畢竟那不是「設施傳送過來的東西」。#n應該會原封不動地留在這裡吧。"
10029085-73 = "唔……是嗎……"
10029085-74 = "……有點可惜。如果能帶個紀念品回去就好了。"
10029085-75 = "所以我不是說過了嗎，在這裡發生的事並沒有意義。#n無論記憶還是證據，什麼都不會留下。"
10029085-76 = "不，對你們來說甚至會成為從未發生過的事。"
10029085-77 = "哈哈……那，那倒也是……"
10029085-81 = "……不過……"
10029085-82 = "也無所謂吧？#n……反正很有趣！！"
10029085-83 = "……？"
10029085-84 = "……什麼？"
10029085-85 = "就算我們不會留下記憶，也不代表來過這裡的事實會消失不是嗎？#n而且老師和英美應該也會記得我們才對……"
10029085-86 = "雖，雖然我也不確定和我們在一起的這幾天，對各位來說是有趣還是麻煩就是了！#n哈哈，哈哈哈……！"
10029085-87 = "……啊！"
10029085-88 = "既然如此……"
10029085-94 = "這個是……"
10029085-95 = "可以請你……替我保管嗎？"
10029085-96 = "就當作是「到此一遊」的意義！"
10029085-97 = "「到此一遊」……？#n是無所謂啦……"
10029085-98 = "[s3]「當然，我們會好好保管的。」\n[s4]「你們似乎都玩得很開心，真是太好了」"
10029085-101 = "老師……？"
10029085-102 = "……！！"
10029085-103 = "謝謝你，老師！！"
10029085-107 = "老實說我還不是很明白……知道了，交給我吧。"
10029085-108 = "謝謝你，英美同學！！"
10029085-109 = "御坂學姊和食蜂學姊呢？#n與其讓它們被丟在這裡，不如先交給他們保管吧！！"
10029085-110 = "作為我們「留在異世界的痕跡」！這樣不是很好嗎？"
10029085-112 = "呃……雖然說得很好聽，結果不就是把東西塞給別人嗎……"
10029085-113 = "……唉。"
10029085-114 = "好吧，這種程度應該不會造成太大的困擾才對。"
10029085-115 = "說的也是。#n這幾天心裡反而比平常更舒服……也許偶爾當當外人也不錯。"
10029085-116 = "……雖然最後還是有～點累人就是了。"
10029085-122 = "唔嗯……"
10029085-123 = "雖然沒有記憶也沒有證據……但並不是毫無意義……"
10029085-124 = "[s5]「有時候就是會這樣呢。」\n[s6]「想不起來就代表真的玩得很開心。」"
10029085-127 = "……還是不太理解。"
10029085-128 = "不過既然老師都這麼說了，也許我某天就會明白了吧。"
10029085-129 = "考慮到那個可能性，在那之前……"
10029085-130 = "我會把這些安全地保管起來的。"
10029085-131 = "……嘿嘿！那真是太好了！！"
10029085-132 = "那麼……"
10029085-133 = "啊，光出現了……"
10029085-134 = "[s7]「看來輪到各位了呢。」\n[s8]「差不多該告別了。」"
10029085-137 = "看來是呢！嘿嘿……我先走了！"
10029085-138 = "工程師部的各位！非常謝謝你們！！"
10029085-144 = "我真的真的……！"
10029085-145 = "玩得很盡興！！"
10029085-151 = "那麼我也先告辭了。"
10029085-157 = "……保重了，各位。"
10029085-158 = "[s9]「你也要保重，御坂。」\n[s10]「路上小心～」"
10029085-167 = "……大家都離開了嗎？"
10029085-168 = "剛才明明還吵吵鬧鬧的，現在卻安靜得尷尬呢。"
10029085-169 = "只剩下……我們和設施了。"
10029085-170 = "聲音變得很響亮！現在反而沒有真實感呢！"
10029085-172 = "設施……"
10029085-178 = "……嗯？"
10029085-180 = "這個聲音是……"
10029085-181 = "[s11]「設施發出了奇怪的聲音……」\n[s12]「剛才好像有撕裂聲……？」"
10029085-184 = "……啊。"
10029085-185 = "設施因為異常運轉開始失控了。#n這樣下去這一帶可能會因為爆炸而崩毀。"
10029085-186 = "原來如此。因為突然進行了多次轉移，甚至還逆向運轉……"
10029085-187 = "……？#n等等，你剛才說什麼……"
10029085-188 = "你說這一帶……"
10029085-189 = "……會……崩毀？"
10029085-190 = "[s13]「……什麼？」\n[s14]「那不是很糟糕嗎？」"
10029085-193 = "沒錯，現在必須立刻逃離這裡。"
10029085-194 = "……有沒有辦法用「設施」移動？"
10029085-195 = "不，設施現在處於逆向運轉的狀態，所以只能進行「回歸」。#n無法把某樣東西傳送到某個地方。"
10029085-196 = "動作快，大家都跟我走吧。"
10029085-197 = "剛才明明還在開心地打招呼的說！！現在的狀況卻一點都不開心！"
10029085-198 = "[s15]「畢竟我們不是來玩的……」\n[s16]「有話之後再說！！先跑吧！！」"
10029085-201 = "噫噫──！！！"
10029085-214 = "（之後一行人死命地向外逃，總算是安全地從崩毀的設施中逃了出來）"
10029085-218 = "（平安回到千年之後，大家都筋疲力盡癱坐在地……）"
10029085-222 = "……呵呵。"
10029085-223 = "這幾天真是有趣。#n想不到居然會發生這種事……"
10029085-224 = "雖然不清楚老師作何感想，但我越來越能感受到千年廢墟裡寄宿的可能性了。"
10029085-225 = "正因如此，我才無法對千年廢墟置之不理。"
10029085-227 = "科學青春紀錄"

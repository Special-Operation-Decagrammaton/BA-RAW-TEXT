[translation]
70003020-1 = "บันทึกการเดินรถไฟไฮแลนเดอร์ 2"
70003020-3 = "เฮ้ ตู้โดยสารตรงโน้นมีคนทะเลาะกัน!!"
70003020-4 = "งั้นเหรอ? ตรงนี้ก็ด้วย!!"
70003020-5 = "ฮ่าฮ่า สมกับเป็นสายวงกลมจริงๆ! พอคิดว่าเบื่อๆ เท่านั้นละ ก็มีเรื่องให้ตื่นเต้นขึ้นมาเลย!!"
70003020-7 = "ห้องเครื่องรถไฟ"
70003020-8 = "อะ อ่า..."
70003020-9 = "คิดไม่ถึงเลยว่าจะเกิดเรื่องในทุกห้องโดยสารพร้อมๆ กันแบบนี้..."
70003020-10 = "ก็ว่าอยู่ว่าตอนเช้ามันเงียบสงบแปลกๆ..."
70003020-11 = "บ้าจริง ทำไมไม่มีวันไหนที่สงบสุขเลยนะ!"
70003020-12 = "ลำพังพวกเราไม่น่าจะรับมือกับสถานการณ์นี้กันได้นะ..."
70003020-13 = "ทะ... ทำยังไงดีล่ะคะ...?"
70003020-14 = "ตอนนี้เราต้องใช้กองกำลังปราบปราม งั้นเราควรขอรับการสนับสนุน..."
70003020-15 = "..."
70003020-16 = "อ๊ะ เข้าใจแล้วค่ะ ฉันจะขอการสนับสนุนจาก CCC ค่ะ"
70003020-22 = "หืม? สายวงกลม ขบวนที่ HL9000?"
70003020-23 = "มีเรื่องอะไรเหรอ?"
70003020-25 = "คะ... คือว่า...!"
70003020-26 = "ตอนนี้เกิดเรื่องวุ่นวายในทุกตู้โดยสารเลยค่ะ...!!"
70003020-27 = "พนักงานรถไฟไฮแลนเดอร์ที่มีน่าจะควบคุมสถานการณ์ไม่ไหวน่ะค่ะ!"
70003020-28 = "ไม่ทราบว่าทาง CCC พอจะส่งกองกำลังมาสนับสนุนได้มั้ยคะ...!! ตอนนี้พวกเราอยู่ที่...!"
70003020-30 = "ตอนนี้เราสนับสนุนใครไม่ได้หรอก"
70003020-31 = "พวกเราก็เจอปัญหาทางนี้อยู่เหมือนกัน คงส่งคนไปสนับสนุนทันทีไม่ได้"
70003020-33 = "คะ?! ถ้าอย่างนั้นจะ... จะทำยังไงดีล่ะคะ??"
70003020-35 = "อย่าเพิ่งลงมือทำอะไรเกินกำลัง~ ให้ปกป้องพนักงานรถไฟไฮแลนเดอร์ก่อนเป็นอันดับแรก"
70003020-36 = "แล้วเราจะรีบส่งกองกำลังเข้าไปช่วยเอง"
70003020-38 = "อะ... อ่า...! ค่ะ! เข้าใจแล้วค่ะ...!"
70003020-45 = "งะ... งั้นสรุปว่า... เราก็ควรอยู่เฉยๆ ก่อนใช่มั้ย?"
70003020-46 = "น่าจะต้องเป็นอย่างนั้นนะคะ... ก็เบื้องบนสั่งมาแบบนี้..."
70003020-47 = "ในเมื่อเป็นอย่างนี้ หรือว่าเราควรหยุดรถไฟไว้ก่อน แล้วรอจนกว่ากำลังเสริมจะมาถึงในสถานีถัดไป..."
70003020-48 = "อืม... ถ้ารถไฟหยุด ผู้โดยสารก็น่าจะลงกันไปเองด้วย..."
70003020-52 = "..."
70003020-53 = "ต้องทำแบบนั้นเหรอคะ...?"
70003020-54 = "ก็ช่วยไม่ได้นะ ลำพังพวกเราสามคนจัดการกันไม่ไหวหรอก"
70003020-55 = "เอาเถอะ... คิดว่ามันเป็นเรื่องสุดวิสัยก็แล้วกัน"
70003020-56 = "ต่อให้รถไฟจะเสียหายไปบ้าง แต่ถ้าพยายามขับไปถึงอู่ ยังไงก็ซ่อมได้แหละนะ"
70003020-60 = "นี่คือ... วิธีที่ดีที่สุดแล้วจริงๆ เหรอคะ?"
70003020-62 = "หืม?"
70003020-64 = "ถ้าทำอย่างนั้นละก็ ทั้งการเดินรถให้ตรงเวลาตามกำหนดการ การประชาสัมพันธ์บนรถ และกฎระเบียบ#nด้านความปลอดภัยต่างๆ ที่เราพยายามรักษากันมาโดยตลอด..."
70003020-65 = "ทุกอย่าง... ทุกอย่างก็จะไร้ความหมายน่ะสิคะ"
70003020-66 = "ในฐานะของนักเรียนสถาบันการรถไฟไฮแลนเดอร์ เราต้องให้ความสำคัญกับการขับรถไฟขบวนนี้#nเพื่อพาผู้โดยสารไปถึงที่หมายอย่างปลอดภัยสิคะ นั่นคือหน้าที่ของเราไม่ใช่เหรอคะ?"
70003020-68 = "ตะ... แต่ว่า...! ตอนนี้พวกเราทำอะไรได้งั้นเหรอ?"
70003020-69 = "ตอนนี้ผู้โดยสารที่ควรจะโดยสารอย่างปลอดภัยกำลังก่อความวุ่นวายกันอยู่นะ!!"
70003020-70 = "ก็นั่นละค่ะ!"
70003020-74 = "หน้าที่ของเราคือการเดินรถไฟโดยต้องปกป้องทั้งรถไฟและผู้โดยสาร"
70003020-75 = "แต่ว่า!! พวกคนที่กำลังก่อเรื่องวุ่นวายในห้องโดยสารในตอนนี้!!"
70003020-77 = "เราจะเรียกว่าเป็นผู้โดยสารได้เหรอคะ?!"
70003020-81 = "หืม? ระ...เรื่องนั้นมัน..."
70003020-83 = "คนที่ทำให้ผู้โดยสารคนอื่นเดือดร้อน คนที่ไม่ซื้อตั๋วขึ้นรถ คนที่ใช้ความรุนแรง และคนที่ขึ้นมาขายของอย่างผิดกฎหมายน่ะ!"
70003020-84 = "คนพวกนี้จะเรียกว่าเป็นผู้โดยสารไม่ได้หรอกค่ะ เราต้องกำจัดคนพวกนี้เพื่อเป็นการปกป้องผู้โดยสาร#nที่บริสุทธิ์คนอื่น นี่ละค่ะหน้าที่ของพวกเรา!!"
70003020-85 = "จะ... จริงจังใช่มั้ยเนี่ย...?"
70003020-86 = "ลองคิดดูสิคะ! ถ้าไม่มีคนพวกนั้น เราก็เดินรถไฟต่อได้อย่างไร้ปัญหาไม่ใช่เหรอคะ?"
70003020-87 = "ละ... แล้วที่บอกว่าจะกำจัด คือให้ทำยังไง...? จะทำแบบนั้นเราต้องมีอำนาจไม่ใช่เหรอ..."
70003020-88 = "มีสิคะ! อำนาจที่ว่าก็คืออาวุธของพวกเรานี่ละค่ะ!!"
70003020-89 = "พวกเรามีปืนกันทุกคนนี่คะ?"
70003020-90 = "จะ... จะให้พวกเราจะออกไปสู้เหรอ?"
70003020-91 = "พวกเราเป็นแค่พนักงานรถไฟตัวน้อยตัวนิดเองนะ?!"
70003020-92 = "ทำไมจะทำไม่ได้ล่ะคะ? พวกเราเป็นผู้รับผิดชอบรถไฟขบวนนี้นะ"
70003020-97 = "ก็ได้"
70003020-98 = "งั้นก็ลองดูกันสักตั้ง"
70003020-100 = "ตู้โดยสารที่ 7"
70003020-101 = "เกิดอะไรขึ้นกับคิโวทอสเนี่ย ทำไมมีแต่เด็กไร้มารยาทแบบนี้?!"
70003020-102 = "เฮ้อ จริงๆ เลย... ทำไมถึงทำตัวแบบนี้ก็ไม่รู้..."
70003020-104 = "นี่!!! โลกนี้น่ะมันไม่ได้ง่ายอย่างนั้นหรอกนะ!! สมัยฉันหนุ่มๆ น่ะ!!!"
70003020-109 = "เฮือก!"
70003020-118 = "ตู้โดยสารที่ 7 จัดการเรียบร้อย"
70003020-119 = "ดีละ ไปกันต่อเลย"
70003020-124 = "...??"
70003020-125 = "อะ... อะไรน่ะ...? เมื่อกี้มัน...?"
70003020-127 = "ตู้โดยสารที่ 3"
70003020-128 = "อะฮ่าฮ่า! แบบนี้มีหวังทำยอดได้สูงสุดของเดือนแน่ๆ~!"
70003020-129 = "ระดับแซฟไฟร์คงไม่ไกลเกินเอื้อมแล้วละ... ฮุฮุ..."
70003020-130 = "รอก่อนนะหัวหน้า! ถ้าเก็บเงินได้มากกว่านี้อีกหน่อย เราก็ฟื้นฟูชมรมกลับมาได้...!!"
70003020-136 = "เฮือก!"
70003020-143 = "ไปยึดสินค้าที่จำหน่ายอย่างผิดกฎหมายให้หมดเลยค่ะ"
70003020-144 = "วางใจได้เลย ฉันจะยึดให้เรียบเลยละ"
70003020-146 = "ตู้โดยสารที่ 8"
70003020-147 = "นี่! รู้มั้ยว่าฉันเป็นใคร?? รู้แล้วจะหนาว!"
70003020-148 = "ฉันไม่รู้หรอกว่านายเป็นใคร ไม่เห็นต้องรู้เลย!! ว่าแต่นายอายุเท่าไร? ห้ะ?!"
70003020-149 = "รู้ไว้ซะว่าแค่ฉันโทรหาลูกพี่กริ้งเดียว นายก็จบเห่แล้ว..."
70003020-150 = "ก็เอาสิ! โทรเลย เอาเลย!!"
70003020-157 = "เฮือก!"
70003020-158 = "อะเฮือก!"
70003020-165 = "..."
70003020-166 = "เงียบกันได้สักทีนะ..."
70003020-167 = "นั่นสิ..."
70003020-168 = "ถ้าเป็นตามปกติ พวกเราคงเหงื่อตกกับการเกลี้ยกล่อมและเอาใจคนพวกนี้ไปแล้วละ..."
70003020-169 = "คนส่วนใหญ่จะไม่ยอมลงไปดีๆ ฉันก็เลยต้องขอโทษและก็ขอร้องให้พวกเขาอยู่ในความสงบตลอด..."
70003020-170 = "พวกเราไม่ได้ทำอะไรผิดด้วยซ้ำ..."
70003020-174 = "จากนี้ไป... แค่พวกเราจัดการสถานการณ์กันแบบนี้ก็น่าจะได้นะคะ?"
70003020-175 = "นั่นน่ะสิ มีวิธีจัดการที่ทั้งง่ายและสะดวกแบบนี้"
70003020-176 = "ทำไมที่ผ่านมาฉันถึงเอาแต่อดทนขนาดนั้นก็ไม่รู้?"
70003020-177 = "ปืนนี่มัน..."
70003020-178 = "สุดยอดไปเลยนะคะ...!!!"
70003020-179 = "ใช่! เป็นวิธีแก้ปัญหาที่ยอดเยี่ยมเลย!!"
70003020-180 = "อำนาจบนรถไฟขบวนนี้เป็นของพวกเรา!!"
70003020-182 = "..."
70003020-183 = "ยะ... ยิงผู้โดยสารด้วย..."
70003020-184 = "ฉันก็เห็นเหมือนกัน..."
70003020-188 = "พะ... พนักงานรถไฟเป็นบ้าไปแล้ว!!"
70003020-197 = "..."
70003020-198 = "ได้ยินว่าคลี่คลายสถานการณ์กันได้แล้วเหรอ..."
70003020-199 = "ตกลงเกิดเรื่องอะไรกันน่ะ?"
70003020-200 = "อย่างที่เห็นเลยค่ะว่าตอนนี้สถานการณ์คลี่คลายแล้ว!!"
70003020-201 = "พวกเราแก้ปัญหาด้วยวิธีการที่ยอดเยี่ยมเลยละค่ะ!!"
70003020-202 = "ใช่ค่ะ! เราใช้อาวุธและวัตถุระเบิดที่สำรองไว้บนรถอย่างมีประสิทธิภาพเลย!"
70003020-204 = "คะ... คนพวกนั้นน่ะ! พนักงานรถไฟไฮแลนเดอร์พวกนั้นยิงผู้โดยสารค่ะ!!"
70003020-208 = "ทะ... ทำแบบนี้ก็ได้เหรอคะ?! เป็นคนที่ต้องปกป้องผู้โดยสารแท้ๆ...!!"
70003020-213 = "อื้อ ได้สิ"
70003020-214 = "คะ? ทำไมถึงได้ล่ะ..."
70003020-215 = "เป็นการป้องกันเชิงรุกไง"
70003020-219 = "เรียกว่าเป็นการล้อมคอกไว้ก่อนที่วัวจะหายน่ะ ไม่มีปัญหาหรอก"
70003020-220 = "คะ...?"
70003020-223 = "ต้องมองพวกเธอใหม่แล้วนะเนี่ย! จัดการปัญหาได้ดีมากเลย!"
70003020-224 = "อื้อ ต่อไปก็ทำแบบนี้ล่ะ"
70003020-225 = "วะฮะฮะฮ่า! พนักงานขบวนนี้ได้รับเลือกให้เป็นนักเรียนดีเด่นประจำเดือน!!"
70003020-227 = "ทะ... ทำได้แล้วค่ะ...!!"
70003020-228 = "จริงเหรอเนี่ย!! ไม่คิดเลยว่าจะมีวันแบบนี้กับเค้าด้วย!"
70003020-229 = "นี่สินะ สุภาษิตเก่าที่บอกว่า <คำตอบอยู่ในดินปืน>! เป็นอย่างที่ว่าเลย!"
70003020-230 = "ต่อไปก็อย่าลืมหน้าที่ของพวกเรากันนะคะ!"
70003020-231 = "ถ้างั้นพวกฉันขอจบ Vlog แต่เพียงเท่านี้ค่ะ! เอ็นดูพวกเราชาวสถาบันการรถไฟไฮแลนเดอร์กันให้มากๆ ด้วยนะคะ!!"
70003020-236 = "ต่อไปคงต้องไปนั่งรถบัสแทนแล้วละ..."
70003020-237 = "บันทึกการเดินรถไฟไฮแลนเดอร์"

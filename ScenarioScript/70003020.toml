[translation]
70003020-1 = "高地人運行日誌（２）"
70003020-3 = "喂，有人在那邊的車廂裡打架！！"
70003020-4 = "是嗎？這裡也一樣！！"
70003020-5 = "哈哈，不愧是內環線！每次無聊的時候就會出狀況！！"
70003020-7 = "列車駕駛室"
70003020-8 = "怎，怎麼會這樣……"
70003020-9 = "沒想到所有車廂會同時出狀況……"
70003020-10 = "上午本來還很安靜的說……"
70003020-11 = "可惡，怎麼就沒有一天是平靜的呢！"
70003020-12 = "只靠我們很難處理這種情況……"
70003020-13 = "該，該怎麼辦……？"
70003020-14 = "得找人壓制他們才行，我看還是請求支援吧……"
70003020-15 = "……"
70003020-16 = "知，知道了。#n我立刻向CCC求助。"
70003020-22 = "嗯？內環線HL9000號？"
70003020-23 = "發生～什麼事了～？"
70003020-25 = "那，那個……！"
70003020-26 = "現在所有車廂都發生了騷動……！！"
70003020-27 = "只靠內部的乘務員恐怕無法處理！"
70003020-28 = "能不能派人前來支援呢……！！#n我們目前的位置是……！"
70003020-30 = "現在～沒辦法～"
70003020-31 = "我們這邊也出了一點狀況，很難馬上派人支援。"
70003020-33 = "咦！？那，那怎麼辦？？"
70003020-35 = "你先別勉強，優先保護我們的乘務員吧。"
70003020-36 = "我們會盡快派人過去～"
70003020-38 = "唔唔……是！我知道了……！"
70003020-45 = "那現在……應該先按兵不動嗎？"
70003020-46 = "再怎麼說……畢竟是上級的命令……"
70003020-47 = "或者我們也可以先在下一站停車，等待支援抵達……"
70003020-48 = "唔嗯……如果列車停下來的話，應該也會有乘客下車才對……"
70003020-52 = "……"
70003020-53 = "真的要那麼做嗎……？"
70003020-54 = "這也沒辦法。只靠我們三個實在無能為力。"
70003020-55 = "就是說啊……這應該算是不可抗力吧。"
70003020-56 = "即使車廂會受損，只要想辦法抵達車庫就能維修了。"
70003020-60 = "那真的……是最好的方法嗎？"
70003020-62 = "為什麼這麼說呢？"
70003020-64 = "要是真的那麼做的話，我們努力遵守的整點發車、廣播通知和安全守則……"
70003020-65 = "全部……都會變得毫無意義。"
70003020-66 = "身為高地人鐵道學園的學生，#n我們的職責就是帥氣地駕駛著列車，將乘客安全地送到目的地。"
70003020-68 = "可，可是……！我們又能做什麼呢？"
70003020-69 = "而且現在就是那些該被安全送達的乘客正在鬧事啊！！"
70003020-70 = "你說的對！"
70003020-74 = "保護列車與乘客的安全，是我們應盡的義務。"
70003020-75 = "然而現在在車廂裡鬧事的那些人……"
70003020-77 = "真的能算是乘客嗎！？"
70003020-81 = "呃，這……"
70003020-83 = "他們不僅造成了其他乘客的困擾，甚至還搭霸王車、引發暴力事件和非法營業！"
70003020-84 = "剷除他們以保護其他善良的乘客，這不正是我們的義務嗎！？"
70003020-85 = "你，你是認真的嗎……？"
70003020-86 = "請你們也想想看！#n只要沒有他們，列車不就能正常運行了嗎？"
70003020-87 = "就，就算要剷除他們……又該怎麼做呢？#n我們又沒有那種力量……"
70003020-88 = "我們當然有[ruby=武器]力量[/ruby]！！"
70003020-89 = "大家不是都有槍嗎？"
70003020-90 = "你，你打算要我們親自戰鬥？"
70003020-91 = "我們只是普通的乘務員耶！？"
70003020-92 = "乘務員又如何？#n我們可是負責這輛列車的人啊。"
70003020-97 = "這麼說也對。"
70003020-98 = "就來放手一搏吧。"
70003020-100 = "7號車廂"
70003020-101 = "居然放任這些沒規矩的小鬼到處亂跑，#n奇普托斯怎麼會變成這副德性！？"
70003020-102 = "唉，真是的……到底鬧夠了沒啊……"
70003020-104 = "哎！！！這個世界可沒有那麼好混啊！#n想當年我年輕的時候……！！！"
70003020-109 = "唉唷！"
70003020-118 = "7號車廂，糾正完畢。"
70003020-119 = "好，繼續吧。"
70003020-124 = "……？？"
70003020-125 = "咦……？剛才那是……？"
70003020-127 = "3號車廂"
70003020-128 = "噗哈哈！照這樣下去，這個月要達成最高營收也不是夢啊～！"
70003020-129 = "看來我很快就能升上藍寶石階級了……呵呵……"
70003020-130 = "請再等我一下，部長！#n只要再存點錢就能讓社團復活……！！"
70003020-136 = "嗚啊！"
70003020-143 = "非法販售的商品全都要沒收。"
70003020-144 = "交給我吧。我一樣都不會放過的。"
70003020-146 = "8號車廂"
70003020-147 = "我說你啊！知道我是誰嗎？？嗯！？"
70003020-148 = "誰知道你哪位啊！！你今年幾歲了？說啊！？"
70003020-149 = "只要我一通電話，就能讓你吃不完兜著走知不知道！"
70003020-150 = "有種你就打啊！打打看啊！！"
70003020-157 = "唔！"
70003020-158 = "呃啊！"
70003020-165 = "……"
70003020-166 = "……馬上就安靜下來了呢。"
70003020-167 = "……就是說啊。"
70003020-168 = "換作是平常的話，我們應該還在為了安撫這些人而費盡心力吧。"
70003020-169 = "誰叫大部分的人都不肯乖乖下車，所以也只能一直向他們道歉……"
70003020-170 = "我們明明沒做錯任何事……"
70003020-174 = "不如……我們以後乾脆都這樣處理怎麼樣？"
70003020-175 = "有道理。明明有這麼輕鬆簡單的方法。"
70003020-176 = "為什麼之前要那麼辛苦呢？"
70003020-177 = "就是說啊……"
70003020-178 = "槍真是太厲害了……！！！"
70003020-179 = "沒錯！這種解決方法真帥氣！！"
70003020-180 = "就這樣接管這輛列車吧！！"
70003020-182 = "……"
70003020-183 = "居，居然對乘客開槍……"
70003020-184 = "我也看到了……"
70003020-188 = "乘，乘務員發瘋啦──！！"
70003020-197 = "……"
70003020-198 = "我聽說狀況解決了就過來看看……"
70003020-199 = "這裡到底發生了什麼事？"
70003020-200 = "如您所見，狀況都順利解決了！！"
70003020-201 = "我們發現了非常高明的手段！！"
70003020-202 = "沒錯！我們有效利用了車內儲備的武器和爆裂物！"
70003020-204 = "就，就是他們！#n他們就是對乘客開槍的乘務員！！"
70003020-208 = "這，這像話嗎！？#n他們明明應該保護乘客，結果居然……！！"
70003020-213 = "嗯～沒關係～"
70003020-214 = "咦？什麼沒關係……"
70003020-215 = "這是～正當防衛～"
70003020-219 = "在被攻擊之前先解決對方～沒有問題～"
70003020-220 = "……什麼？"
70003020-223 = "哦哦，我對你們刮目相看了呢！！#n該做的時候還是能做好的嘛！？"
70003020-224 = "嗯～以後也要繼續保持～"
70003020-225 = "噗哈哈哈！你們所有人都是這個月的優秀學生！！"
70003020-227 = "成，成功了……！！"
70003020-228 = "咦，真的嗎！！這一天總算到來了！"
70003020-229 = "「答案就在火藥中」這句話說的果然沒錯！"
70003020-230 = "大家，以後也別忘記我們的義務哦！"
70003020-231 = "那麼今天的Vlog就到此為止！還請多多支持高地人鐵道學園！！"
70003020-236 = "我看之後還是搭公車吧……"
70003020-237 = "高地人運行日誌"

[translation]
70003020-1 = "ハイランダー鉄道学園の運行日誌（２）"
70003020-3 = "ねえ、あっちで喧嘩だって！"
70003020-4 = "あそこでも！"
70003020-5 = "やっぱ、循環線はこう来なくっちゃ！"
70003020-7 = "列車の機関室"
70003020-8 = "ど、どうすれば……。"
70003020-9 = "全車両で同時にトラブルが……。"
70003020-10 = "午前中、何もなかったから大丈夫だと思ってたのに……。"
70003020-11 = "ああもう！"
70003020-12 = "私たちだけじゃ無理だよ……。"
70003020-13 = "でも、早く鎮圧しないと……。"
70003020-14 = "……CCCに応援を要請しましょう。"
70003020-15 = "…………。"
70003020-16 = "分かりました、すぐに連絡します！"
70003020-22 = "……循環線内回りHL9000号？"
70003020-23 = "どうかしたー？"
70003020-25 = "あ、その……！"
70003020-26 = "今、全車両でトラブルが起きており……！"
70003020-27 = "私たちだけでは対応できそうにありません！"
70003020-28 = "応援に来ていただけないでしょうか！"
70003020-30 = "むーりー。"
70003020-31 = "こっちもちょっとトラブってるんだよね、すぐには難しいかなー。"
70003020-33 = "えっ！？#nじゃあ、どうすれば……。"
70003020-35 = "無理しないで、安全優先しちゃって良いからさ。"
70003020-36 = "頑張ってー。"
70003020-38 = "……わ、分かりました。"
70003020-45 = "と、とりあえず……待機します？"
70003020-46 = "無理しないよう言われたし……。"
70003020-47 = "こうなった以上、次の停車駅で応援を待つとか？"
70003020-48 = "列車を止めたら、乗客も降りてくれるはず。"
70003020-52 = "……。"
70003020-53 = "でも……。"
70003020-54 = "だって、私たち3人じゃどうしようもないし……。"
70003020-55 = "不可抗力ってやつか……。"
70003020-56 = "……列車が壊れちゃうだろうけど、車庫で修理すればいいわけだし。"
70003020-60 = "本当に、それで良いんでしょうか。"
70003020-62 = "どうしたの？"
70003020-64 = "このままじゃ、私たちが頑張って守ってきた、定時運行も車内放送も安全規則も……。"
70003020-65 = "……全部、存在してる意味がなくなっちゃいます。"
70003020-66 = "ハイランダー鉄道学園の生徒として、お客様を目的地まで安全にお届けするのが使命じゃないんですか！？"
70003020-68 = "でも、私たちに何ができるの……？"
70003020-69 = "その「お客様」がトラブルを起こしてるわけだし。"
70003020-70 = "……それです！"
70003020-74 = "私たちの責務は、列車とお客様の安全を守ること！"
70003020-75 = "ですが、あちらの方たちは……。"
70003020-77 = "果たして、「お客様」と呼べるのでしょうか！？"
70003020-81 = "……えっ？"
70003020-83 = "迷惑行為をやめない人、無賃乗車をする人、暴力を振るったり違法に車内販売を行う人は、お客様じゃありません！"
70003020-84 = "本当のお客様を守るべきではないでしょうか！？"
70003020-85 = "ほ、本気で言ってるの……？"
70003020-86 = "あの人たちがいなければ正常に運行できるんですよ！？"
70003020-87 = "でも、どうやって……？"
70003020-88 = "[ruby=ちから]武器[/ruby]ならあります！"
70003020-89 = "みんな、持ってる銃が！"
70003020-90 = "わ、私たちで戦うってこと……？"
70003020-91 = "ただの乗務員なのに！？"
70003020-92 = "やるしかありません……。#nそれが私たちの仕事なんですから！"
70003020-97 = "……そうだね。"
70003020-98 = "……やってみよう。"
70003020-100 = "7号車"
70003020-101 = "まったく、キヴォトスも終わりじゃな！"
70003020-102 = "誰か、何とかしてよ……。"
70003020-104 = "ワシが若い頃はな、苦労を買ってでもしたもんじゃのに！"
70003020-109 = "ぐふっ！"
70003020-118 = "7号車、鎮圧完了。"
70003020-119 = "よし、次。"
70003020-124 = "……！？"
70003020-125 = "今の、なに……？"
70003020-127 = "3号車"
70003020-128 = "ふっふっふ……このままいけば、営業成績トップも夢じゃない。"
70003020-129 = "これで私もサファイア等級に……！"
70003020-130 = "部長……待っていてください！お金が集まったらまた部活を……！"
70003020-136 = "ごふっ！？"
70003020-143 = "違法商品は回収しておきましょう。"
70003020-144 = "ひとつ残らず完璧に！"
70003020-146 = "8号車"
70003020-147 = "私が誰か知ってるのか！？"
70003020-148 = "知るかコンチクショー！"
70003020-149 = "ぶっ飛ばしてやる！"
70003020-150 = "やれるもんならやってみろ！"
70003020-157 = "うぼあっ！"
70003020-158 = "きゃん！"
70003020-165 = "……。"
70003020-166 = "一気に落ち着いたね……。"
70003020-167 = "……そうだね。"
70003020-168 = "いつもは誰も言うことを聞いてくれず、謝る一方で……。"
70003020-169 = "間に入っても、ただただやられるだけだったのに……。"
70003020-170 = "私たちは何も悪くないのに……。"
70003020-174 = "……このやり方、続けてみませんか？"
70003020-175 = "そうだね、こんな楽な方法があるんだから。"
70003020-176 = "今までどうしてあんなに苦労してたんだろう……？"
70003020-177 = "本当に……。"
70003020-178 = "……銃って最高ですね！"
70003020-179 = "早く次の車両に向かおう！"
70003020-180 = "この調子なら、列車を取り戻せるはず！"
70003020-182 = "……。"
70003020-183 = "じょ、乗客を撃った……。"
70003020-184 = "私も見た……。"
70003020-188 = "ハイランダーは狂ったのか！？"
70003020-197 = "……。"
70003020-198 = "解決したって聞いて来たけど……。"
70003020-199 = "何があったのさ？"
70003020-200 = "ご覧の通り！解決しました！"
70003020-201 = "良い方法を見つけたんです！"
70003020-202 = "車内の火気と爆発物を使いました！"
70003020-204 = "あ、あの人たち、銃撃してました！"
70003020-208 = "こんなの許されるんですか！？"
70003020-213 = "うんー、おっけー。"
70003020-214 = "……えっ？"
70003020-215 = "せいとうぼーえー。"
70003020-219 = "やられる前にやっつける、問題なーし。"
70003020-220 = "何を、言って……。"
70003020-223 = "おー、やる時はやるじゃん！"
70003020-224 = "この調子でよろしくー。"
70003020-225 = "パヒャヒャヒャ！全員、今月の優秀生徒に認定だ！"
70003020-227 = "や、やりました……！"
70003020-228 = "ついにこの日が……！"
70003020-229 = "やっぱり、「答えは火薬」にあるんだね！"
70003020-230 = "私たちの責務を胸に刻んで、これからも頑張ります！"
70003020-231 = "今日のVlogはここまで！#nこれからもハイランダー鉄道学園の応援をよろしくお願いします！！"
70003020-236 = "次からはバスを使おう……。"
70003020-237 = "ハイランダー鉄道学園の運行日誌"

[translation]
70003020-1 = "Highlander Logs 2"
70003020-3 = "Hey, there's a fight going on in that cabin!"
70003020-4 = "Yeah? Over here too!!"
70003020-5 = "Haha, as expected of the Inner Loop Line! Never a dull moment here!"
70003020-7 = "Train Engine Room"
70003020-8 = "A-Ack..."
70003020-9 = "Every single cabin? Really? Unbelievable..."
70003020-10 = "The peaceful morning lulled us into a false sense of security."
70003020-11 = "God! Why can't we have just one day where everything goes smoothly?"
70003020-12 = "We can't handle all of this with just us..."
70003020-13 = "Wh-What should we do...?"
70003020-14 = "Let's call for reinforcements. We can't do anything without suppressive forces."
70003020-15 = "..."
70003020-16 = "Ah, understood. I'll call the CCC."
70003020-22 = "Huh? Inner Loop Line HL9000?"
70003020-23 = "What's...going ooon?"
70003020-25 = "W-Well...!"
70003020-26 = "We currently have disruptions in every single cabin!"
70003020-27 = "It's too much for just the internal Highlander Train Crew to handle!"
70003020-28 = "We're requesting reinforcements. Our current location is—"
70003020-30 = "Nooope. No...can do!"
70003020-31 = "We've got our own issues to deal with! We don't got anything to spare."
70003020-33 = "Huh?! Then, wh-what are we supposed to do??"
70003020-35 = "Just take it easy! And keep all the crew members safe and all that jazz."
70003020-36 = "Reinforcements...on the way! Soon!"
70003020-38 = "U-Ugh...! Yes! Understood...!"
70003020-45 = "So, I guess that means to just...stay put, for now?"
70003020-46 = "That's what they said..."
70003020-47 = "Should we just stop operations at the next station, to give reinforcements time to arrive?"
70003020-48 = "Mm... Then maybe some passengers would just get off too..."
70003020-52 = "..."
70003020-53 = "Do we really have to do that...?"
70003020-54 = "I mean, what else CAN we do? It's just the three of us..."
70003020-55 = "The situation just is what it is."
70003020-56 = "No matter how much they mess up the train, we can get repairs done as long as we make it to the depot."
70003020-60 = "And that's...really all we can do?"
70003020-62 = "Hmm?"
70003020-64 = "At this rate, the punctuality and safety regulations we've always adhered to, the announcements we make..."
70003020-65 = "...they'll all be rendered meaningless."
70003020-66 = "As students of Highlander Railroad Academy, our job is to operate this train well and safely deliver our passengers to their destinations."
70003020-68 = "B-But...! What could we possibly do?"
70003020-69 = "It's those very passengers we're supposed to deliver that are wreaking havoc!"
70003020-70 = "That's it!"
70003020-74 = "Our duty is to operate the train and protect its passengers."
70003020-75 = "However! Look at those people destroying our cabins!"
70003020-77 = "Can we really call them passengers?!"
70003020-81 = "Huh? W-Well..."
70003020-83 = "All they're doing is freighthopping, inconveniencing others, inciting violence, and even peddling!"
70003020-84 = "If our duty is to protect the good passengers, then it's also our duty to remove the evil ones!"
70003020-85 = "S-Seriously...?"
70003020-86 = "Think about it! They're the only thing keeping us from business as usual!"
70003020-87 = "E-Even if we tried that, how...? We don't have the power..."
70003020-88 = "We do! We do have power!!"
70003020-89 = "We all have guns, don't we?!"
70003020-90 = "Y-You want us to go out there and fight?"
70003020-91 = "We're a train crew! Just the measly Highlander Train Crew!"
70003020-92 = "No, that's not all we are! We're the ones who run this train!"
70003020-97 = "Okay."
70003020-98 = "Yes. Let's do this!"
70003020-100 = "Cabin 7"
70003020-101 = "What has Kivotos come to?! Kids these days only know disrespect!"
70003020-102 = "Ah, seriously...?! You're still going on about that...?"
70003020-104 = "You heard me! The world is so easy for you kids! Back in my day—!!"
70003020-109 = "Gah!"
70003020-118 = "Cabin 7, subdued."
70003020-119 = "All right. Let's move on."
70003020-124 = "...Uh?"
70003020-125 = "J-Just now...? Was that...?"
70003020-127 = "Cabin 3"
70003020-128 = "Haha! At this rate, I'll make record sales this month!"
70003020-129 = "I'll reach sapphire rank soon... Heehee..."
70003020-130 = "Hold on, President! Just a little more, and we can revive our club!!"
70003020-136 = "Gah!"
70003020-143 = "Confiscate all illegal contraband."
70003020-144 = "Leave it to me. I won't miss a single one."
70003020-146 = "Cabin 8"
70003020-147 = "Hey! You know who I am?? Huh?!"
70003020-148 = "I don't know who you are!! How old are you? Huh?!"
70003020-149 = "Just one phone call from me, and you'll be—"
70003020-150 = "Oh, yeah? Go on, then! Call!!"
70003020-157 = "Waaah!"
70003020-158 = "Aaah!"
70003020-165 = "..."
70003020-166 = "...It's so peaceful now."
70003020-167 = "...Yeah."
70003020-168 = "Usually, we would have struggled fruitlessly, trying to coax and appease all these people..."
70003020-169 = "They would never go quietly. We'd have to apologize and beg them..."
70003020-170 = "Yeah...apologize...even though we didn't do anything wrong."
70003020-174 = "Maybe...we can operate this way, from now on?"
70003020-175 = "That's what I'm saying. It was...so simple. So easy."
70003020-176 = "Why have we been struggling all this time?"
70003020-177 = "Guns are really..."
70003020-178 = "...truly AMAZING!"
70003020-179 = "Yes! And this method is amazing!"
70003020-180 = "This train is OURS now!"
70003020-182 = "..."
70003020-183 = "Th-They were shooting at passengers..."
70003020-184 = "I saw them too..."
70003020-188 = "They've lost their minds!!"
70003020-197 = "..."
70003020-198 = "We heard everything was cool, so we came on over..."
70003020-199 = "...What in the heck happened here?"
70003020-200 = "As you can see, the situation is under control!"
70003020-201 = "We've developed the perfect method!"
70003020-202 = "Yes! We effectively utilized the firearms and explosives in the train!"
70003020-204 = "I-It's them! Those Highlander Train Crew members were shooting up passengers!!"
70003020-208 = "A-Are they allowed to do that? Aren't they supposed to be protecting us?!"
70003020-213 = "Yuppies. All fiiine."
70003020-214 = "...Fine?"
70003020-215 = "Mhm, mhm. It's...self-defense..."
70003020-219 = "Take 'em out, before you're taken out. Fiiine."
70003020-220 = "...Eh?"
70003020-223 = "Sick! I didn't think you had it in you! You actually did it!"
70003020-224 = "Yeah, yup. Keep it up."
70003020-225 = "Pahyahya! Everyone here is Student of the Month!"
70003020-227 = "W-We did it...!"
70003020-228 = "Hey, is this for real?! My wildest dreams have come true!"
70003020-229 = "I knew it! The old saying, \"The answer lies in gunpowder,\" was right!"
70003020-230 = "Everyone, let's always uphold our duties!"
70003020-231 = "That is all for our vlog today! Please continue to show love to us, Highlander Railroad Academy!!"
70003020-236 = "I'm riding the bus from now on..."
70003020-237 = "Highlander Logs"

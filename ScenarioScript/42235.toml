[translation]
42235-2 = "だから今、武装したテロリストが連邦生徒会の建物に向かっている、と何度も言ってますよね！"
42235-3 = "公安局でも警備局でも何でもいいから、使える兵力を全部こっちに送りなさい！"
42235-7 = "公安局のほとんどの生徒は謹慎中で……警備局は新規行政命令のために席を外している……？"
42235-8 = "だったら生活安全局でもなんでもいい！誰でもいいからこいつらを今すぐ止めて！"
42235-9 = "すぐに支援兵を送らないのであれば、ヴァルキューレ警察学校自体をなかったことに――"
42235-18 = "SRTだ！全員武器を捨てて下がれ！"
42235-20 = "こちらRABBIT1、容疑者を確保。#n現在、不知火カヤの身元を確認中。"
42235-24 = "不知火カヤ――あなたが子ウサギ駅爆破未遂事件に関わっていたという証言を、関係者から確保しました。"
42235-25 = "あなたは私益を貪るためにテロを助長し、連邦生徒会の運営に欠かせない情報、そして権限を私的に利用し、企業へ提供しました。"
42235-26 = "これは、刑事上の不逮捕特権の例外規定に該当するもの。"
42235-27 = "あなたを内乱および職権乱用、職務怠慢、賄賂供与の疑いで緊急逮捕します。"
42235-33 = "笑わせる……SRTの隊員ごときが防衛室長であり、連邦生徒会長代行の私を逮捕する……？"
42235-34 = "[s1] \"SRTは、こういう問題を解決するために存在する治安機関だからね。\"\n[s2] \"カヤ、素直に君の過ちを認めてほしい。\""
42235-39 = "[USERNAME]先生……"
42235-40 = "す、少しお話をしませんか……？"
42235-41 = "先日ご提案させて頂いたものは、たしかに少し不十分だったのかもしれません……"
42235-42 = "先生はこれまでキヴォトスの様々な問題に対して、責任を持って解決してくださいましたね。だというのに、そんな先生を私が管理するなんて……"
42235-43 = "その事に関してはお詫び申し上げます……提案はなかったことに致します！"
42235-53 = "その代わり、お約束した支援は例外なくすべて提供いたしますので……"
42235-54 = "シャーレの運営に必要な費用も、人手も……何でも提供いたします。"
42235-55 = "ひ、必要でしたら、私が直接シャーレに行って先生をお手伝いすることもできます！"
42235-56 = "先生の言うことなら何でもしますから――"
42235-60 = "[ns] \"……カヤ。\""
42235-64 = "は、はい……？"
42235-65 = "[s3] \"君が許しを請うべき人は、私じゃない。\"\n[s4] \"迷惑をかけた生徒たちに、きちんと謝ってあげて。\""
42235-68 = "も、もちろんです。先生がおっしゃるのなら、相手が誰であろうと謝ります。"
42235-69 = "だ、誰に謝りましょうか……？リン行政官……？"
42235-70 = "[s] \"どうやら、まだ理解できていないみたいだけど……。\""
42235-77 = "連邦生徒会長代行！無事？"
42235-82 = "体育室長、ちょうど良いところに……！"
42235-83 = "連邦生徒会内の支持派が私を助けに来てくれると信じていました！"
42235-85 = "……あれ？シャーレの先生とSRTの1年生じゃん？"
42235-86 = "先生、何を聞いたかは知らないけど、SRTの話は信じない方がいいよ。"
42235-87 = "あいつら、リン行政官の差し金でカヤ室長を叩こうとする質の悪いやつらなんだ。"
42235-88 = "そ、そうです！すべては、リン行政官とその支持派が仕組んだもので――"
42235-89 = "あいつらは誰もかも気に入らなかったのよ……身体の一部に栄養を全部吸われた能無し共が！"
42235-91 = "はあ？そ、それとこれに何の関係があるんだ……？"
42235-92 = "……そんな事で劣等感を燃やしてるの？"
42235-93 = "ああ、なるほどねぇ……どうにも、そっちの派閥の人選に妙な共通点があると思ったら……"
42235-95 = "おい、そこのメガネ。それはどういう事だ……？"
42235-96 = "[s] \"……ミヤコ、FOX小隊にもらった録音ファイルを再生して。\""
42235-97 = "はい。"
42235-105 = "お疲れ様でした、ユキノ小隊長。今回の襲撃で連邦生徒会の雰囲気も大きく変わりそうですね。"
42235-106 = "SRT特殊学園に対する否定的な見解が多少増えるでしょうけれど……お気になさらず。"
42235-107 = "私が連邦生徒会長代行になったら、誰もあなた達に口出しできなくなりますから。"
42235-111 = "……体育室長が怪我？あ……あのバカのことですか。"
42235-112 = "ちっ、だからなんで前に出て事故を起こすんでしょうか。"
42235-113 = "大義のためのやむを得ない犠牲だと考えるべきでしょう、お気になさらず。"
42235-120 = "……？これってどういうこと？"
42235-121 = "カヤ室長、この前の襲撃なんて知らないって言ってなかったっけ？"
42235-122 = "こ、これは……ええと、だから……"
42235-127 = "キヴォトス大運動会の常設開催……？#nこのバカは一体何を要求しているんですか。"
42235-128 = "クーデターが終わったら、体育室も適当に整理して文化室の分科にぶち込んでしまいましょう。"
42235-129 = "……はい、秘書官。どうしました？"
42235-130 = "会議の参加者に配るおにぎりの数が足りない？"
42235-131 = "おにぎりなんて知った事ではありません。そんな些細なことまで私に聞かないでください！"
42235-133 = "だ、だからこの通信は……"
42235-134 = "そうです！すべて捏造されたものです！#nすべてリン行政官の陰謀――"
42235-136 = "まさか僕らの事をそう思っていたなんて……"
42235-137 = "僕はあの襲撃で腕を怪我しちゃって、ゲートボール大会に出られなかったのに……"
42235-142 = "運動の価値が分からない代行なんて要らない！"
42235-148 = "弾劾だ！"
42235-159 = "次回;エピローグ"

[translation]
42235-2 = "就說現在有一群武裝恐怖份子正往聯邦學生會的大樓過來，我已經說過很多次了吧！"
42235-3 = "不管是公安局還是警備局還是什麼都好，把所有能用的兵力全部調過來！"
42235-7 = "公安局的大部分學生都被停職……警備局又因為新的行政命令不在位置上……？"
42235-8 = "那生活安全局也行啊！誰來都無所謂，快阻止那些傢伙！"
42235-9 = "要是你們不立刻派支援兵力過來，我就把女武神警察學園整個解──"
42235-18 = "我們是SRT！所有人放下武器退後！"
42235-20 = "這裡是RABBIT1，已發現嫌犯不知火香耶。"
42235-24 = "不知火香耶──相關人士的證言顯示你與兔寶寶站爆炸未遂事件有關。"
42235-25 = "你為了個人的利益助長恐怖攻擊，#n私自濫用聯邦學生會營運的必要情報及權限，並將其提供給私人企業。"
42235-26 = "上述情事已符合刑事豁免特權的例外條例。"
42235-27 = "我以內亂、瀆職、濫用職權、提供賄賂等罪嫌緊急逮捕你。"
42235-33 = "別說笑了……#n區區SRT的隊員竟然要逮捕身為防衛室長和聯邦學生會長代理的我……？"
42235-34 = "[s1]「SRT本來就是為了解決這種問題而存在的治安機關。」\n[s2]「香耶，希望你能乖乖認罪。」"
42235-39 = "[USERNAME]老師……"
42235-40 = "我，我們能不能私下聊聊……？"
42235-41 = "先前提供給您的提案或許確實不夠完善……"
42235-42 = "老師至今為止負責解決了奇普托斯各式各樣的問題，而我卻想要管理那樣的老師……"
42235-43 = "請容我為此向您道歉……提議的事就當沒發生過吧！"
42235-53 = "當然，先前向您承諾的支援也將無一例外全數提供……"
42235-54 = "不管是夏萊營運所需的資金還是人力……全部都能提供。"
42235-55 = "有，有需要的話，我也可以直接去夏萊協助老師！"
42235-56 = "只要老師開口我都會照做的──"
42235-60 = "[ns]「……香耶。」"
42235-64 = "是，是……？"
42235-65 = "[s3]「你應該請求道歉的人並不是我。」\n[s4]「請你向那些被你影響的學生好好道歉。」"
42235-68 = "當，當然沒問題。#n既然老師您這麼說，不管對方是誰我都會道歉的！"
42235-69 = "該，該從誰開始道歉呢……？琳行政官……？"
42235-70 = "[s]「看來你還是不明白呢……」"
42235-77 = "聯邦學生會長代理！你沒事吧？"
42235-82 = "體育室長，你來得正好……！"
42235-83 = "我就知道聯邦學生會裡的支持派一定會來救我！"
42235-85 = "……嗯？這不是夏萊的老師和SRT的一年級生嗎？"
42235-86 = "老師，我不知道你聽他們說了些什麼，不過你最好不要相信SRT學生說的話。"
42235-87 = "因為他們是收了琳行政官的錢，企圖加害香耶室長的邪惡傢伙。"
42235-88 = "沒，沒錯！一切都是琳行政官和其支持派策畫的──"
42235-89 = "那些傢伙我一個個都看不順眼……一群胸大無腦的無能之徒！"
42235-91 = "啊？這，這跟那個有什麼關係嗎……？"
42235-92 = "……因為那種事感到自卑嗎？"
42235-93 = "啊啊，原來是這樣啊……難怪我一直覺得那邊的派系好像有奇妙的共通點……"
42235-95 = "喂，眼鏡仔，你說的是什麼意思……？"
42235-96 = "[s]「……都子，把你從FOX小隊那裡拿到的錄音檔放出來吧。」"
42235-97 = "是。"
42235-105 = "辛苦你了，雪乃小隊長。#n因為這次的襲擊，聯邦學生會內部的氛圍似乎大幅改變了呢。"
42235-106 = "雖然或多或少會造成對SRT特殊學園負面看法的增加……不過不必在意。"
42235-107 = "只要我當上聯邦學生會長代理，就沒有人敢對你們指手畫腳了。"
42235-111 = "……體育室長受傷了？#n啊……你說那個笨蛋啊。"
42235-112 = "嘖，到底為什麼要強出頭導致發生意外呢。"
42235-113 = "就當作是為了大義而不得不做出的犧牲吧，別放在心上。"
42235-120 = "……嗯？這是怎麼回事？"
42235-121 = "香耶室長，你不是說對之前的襲擊完全不知情嗎？"
42235-122 = "這，這個是……那個，該怎麼說呢……"
42235-127 = "定期舉辦奇普托斯大運動會……？#n這個笨蛋到底又想要求什麼啊？"
42235-128 = "等政變結束之後就把體育室也稍微整頓一下，納入文化室的下屬吧。"
42235-129 = "……是我，秘書官。有什麼事嗎？"
42235-130 = "發給會議參加者的飯糰數量不夠？"
42235-131 = "飯糰什麼的我才不在乎。#n請不要連那種小事都跑來問我！"
42235-133 = "那，那通電話是……"
42235-134 = "對了！全部都是捏造出來的！#n這一切都是琳行政官的陰謀──"
42235-136 = "沒想到你竟然是這樣看待我們的……"
42235-137 = "我可是因為在那次襲擊時弄傷了手，才會沒能參加槌球大賽的說……"
42235-142 = "不明白運動價值的代理沒有存在的必要！"
42235-148 = "你被彈劾了！"
42235-159 = "下一話;尾聲"

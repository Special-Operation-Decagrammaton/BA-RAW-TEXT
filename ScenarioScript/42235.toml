42235-24 = "3;미야코;99;시라누이 카야. 당신이 코우사기 역 폭파 미수 사건의 배후에 관여했다는 증언을 관계자로부터 확보했습니다."
42235-25 = "3;미야코;10;당신은 사익을 편취하기 위해 테러를 조장하고, 총학생회의 운영에 필수적인 정보 및 권한을 기업에 사사로이 제공했습니다."
42235-26 = "3;미야코;11;이는 형사상 불체포특권의 예외 조항에 해당하는바."
42235-27 = "3;미야코;05;당신을 내란 및 직무유기, 직권남용, 뇌물공여 혐의로 긴급 체포합니다.\n#3;em;[!]"

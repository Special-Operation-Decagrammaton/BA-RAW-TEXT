[translation]
42235-2 = "ก็บอกอยู่นี่ไงว่าตอนนี้มีผู้ก่อการร้ายติดอาวุธมุ่งหน้ามายังอาคารองค์การนักเรียน!"
42235-3 = "ส่งกองกำลังที่ใช้งานได้มาทางนี้ให้หมด! จะจากกรมความมั่นคงสาธารณะหรือสำนักความมั่นคงก็ได้!"
42235-7 = "นักเรียนส่วนมากของกรมความมั่นคงสาธารณะสำรวมกิริยาวาจากันอยู่... ส่วนสำนักความมั่นคงก็ไม่อยู่ เพราะคำสั่งบริหารฉบับใหม่งั้นเหรอ...?"
42235-8 = "งั้นก็ส่งสำนักรักษาความปลอดภัยมา! เอาใครมาก็ได้ ขอแค่หยุดเจ้าพวกนั้นได้ก็พอ!"
42235-9 = "ถ้าไม่ส่งกองกำลังสนับสนุนมาเดี๋ยวนี้ ฉันจะสั่งยุบสถาบันฝึกตำรวจวัลคิรี่...!"
42235-18 = "นี่คือ SRT! ทุกคนวางอาวุธและถอยไป!"
42235-20 = "นี่คือ RABBIT 1 ยืนยันตัวตนผู้ต้องสงสัย ชิรานูอิ คายะ "
42235-24 = "ชิรานูอิ คายะ เราได้รับคำให้การว่าคุณอยู่เบื้องหลังการพยายามก่อเหตุระเบิดที่สถานีโคะอุซางิ"
42235-25 = "คุณยุยงให้เกิดการก่อการร้าย อีกทั้งยังให้ข้อมูลสำคัญและอำนาจในการบริหารขององค์การนักเรียน#nกับภาคธุรกิจเพื่อประโยชน์ส่วนตัว"
42235-26 = "นี่สอดคล้องกับข้อยกเว้นในสิทธิพิเศษในการจับกุมทางอาญา"
42235-27 = "ฉันขอจับกุมคุณอย่างเร่งด่วน ในข้อหาก่อความขัดแย้งภายใน ละเลยหน้าที่ ใช้อำนาจหน้าที่ในทางมิชอบและติดสินบนค่ะ"
42235-33 = "บังอาจนัก... พวกตัวกระจอกจาก SRT กล้ามาจับกุมหัวหน้าสำนักป้องกันและรักษาการแทนประธาน#nองค์การนักเรียนอย่างฉันงั้นเหรอ...?"
42235-34 = "[s1] \"SRT เป็นหน่วยงานความปลอดภัยที่ตั้งขึ้นมาเพื่อแก้ไขปัญหาแบบนี้ไงล่ะ\"\n[s2] \"คายะ ยอมรับความผิดของตัวเองเสียเถอะ\""
42235-39 = "คุณครู [USERNAME]..."
42235-40 = "เรามาคุยอะไรกันสักหน่อยไหมคะ...?"
42235-41 = "ข้อเสนอที่ฉันให้คุณครูไปเมื่อคราวก่อนอาจจะยังไม่ดีพอก็ได้ค่ะ..."
42235-42 = "ที่บอกว่าพวกฉันจะควบคุมคุณครูผู้รับผิดชอบและคลี่คลายปัญหามากมายในคิโวทอสมาโดยตลอดน่ะ#nค่ะ... พอมาคิดๆ ดูแล้ว มันเป็นข้อเสนอที่เสียมารยาทจริงๆ ด้วยค่ะ"
42235-43 = "ฉันต้องขอโทษสำหรับเรื่องนั้นด้วยนะคะ... ฉันจะทำเหมือนไม่เคยมีข้อเสนอนี้แล้วกันค่ะ!"
42235-53 = "แต่การสนับสนุนทั้งหมดที่ฉันให้สัญญาไว้ ฉันจะทำให้ทั้งหมดโดยไม่มีข้อยกเว้นค่ะ"
42235-54 = "ทั้งงบประมาณที่จำเป็นในการบริหารชาเล่ต์ ทั้งกำลังคน... ฉันจะสนับสนุนให้ทุกอย่างเลยค่ะ"
42235-55 = "ถะ... ถ้าคุณครูต้องการ จะให้ฉันไปช่วยงานที่ชาเล่ต์ก็ได้ค่ะ!"
42235-56 = "ถ้าเป็นงานที่คุณครูสั่ง ไม่ว่าอะไรฉันก็จะทำให้..."
42235-60 = "[ns] \"... คายะ\""
42235-64 = "คะ... คะ...?"
42235-65 = "[s3] \"คนที่เธอต้องขอให้ยกโทษให้ไม่ใช่ครูหรอก\"\n[s4] \"เธอต้องสำนึกผิดและขอโทษเพื่อนนักเรียนที่ไปสร้างความเดือดร้อนให้\""
42235-68 = "นะ... แน่นอนอยู่แล้วสิคะ ถ้าคุณครูพูดถึงขนาดนี้ ฉันก็จะกล่าวคำขอโทษกับคนอื่นค่ะ ไม่ว่าจะเป็นใครก็ตาม..."
42235-69 = "งะ... งั้นให้ฉันขอโทษใครก่อนดีล่ะคะ...? เจ้าหน้าที่ริน...?"
42235-70 = "[s] \"ท่าทางเธอจะยังไม่เข้าใจนะ...\""
42235-77 = "รักษาการแทนประธานองค์การนักเรียน! ปลอดภัยดีหรือเปล่า?"
42235-82 = "หัวหน้าฝ่ายกีฬา มาได้จังหวะพอดีเลยค่ะ...!"
42235-83 = "ฉันเชื่ออยู่แล้วว่าฝ่ายสนับสนุนจากในองค์การนักเรียนจะมาช่วยฉัน!"
42235-85 = "...หืม? นี่คุณครูชาเล่ต์กับนักเรียนปี 1 จาก SRT นี่นา?"
42235-86 = "คุณครู ฉันไม่รู้หรอกนะว่าคุณครูไปฟังเรื่องอะไรมา แต่อย่าเชื่อคำพูดของนักเรียน SRT เลยจะดีกว่า"
42235-87 = "เด็กพวกนี้เป็นเด็กไม่ดีที่ถูกเจ้าหน้าที่รินบงการมา พวกนี้พยายามจะทำลายชื่อเสียงของหัวหน้าสำนักฯ คายะน่ะ"
42235-88 = "ชะ... ใช่ค่ะ! ทุกอย่างที่เกิดขึ้น มันมาจากการใส่ร้ายของเจ้าหน้าที่รินและฝ่ายที่สนับสนุนเธอค่ะ!"
42235-89 = "ฉันละไม่ชอบพวกนั้นเลย... ไม่เห็นจะมีอะไรดีนอกจากหุ่นดีไปวันๆ!"
42235-91 = "ว่าไงนะ? ระ... เรื่องนั้นมันเกี่ยวอะไรกันด้วย...?"
42235-92 = "... นี่เธอรู้สึกต่ำต้อยเพราะเรื่องแบบนี้งั้นเหรอ?"
42235-93 = "อ๋อ มินาล่ะ... ก็ว่าอยู่ว่าแก๊งของพวกเธอมีอะไรบางอย่างแปลกๆ ร่วมกันอยู่น่ะ"
42235-95 = "เดี๋ยวเถอะ แม่เด็กแว่น นี่เธอพูดอะไรออกมาเนี่ย...?"
42235-96 = "[s] \"... มิยาโกะ เปิดไฟล์บันทึกเสียงที่ได้รับมาจากกองทหาร FOX สิ\""
42235-97 = "ได้ค่ะ"
42235-105 = "ขอบคุณที่ทำงานหนักนะคะ หัวหน้ากองยูกิโนะ การบุกโจมตีครั้งนี้คงทำให้บรรยากาศในองค์การ#nนักเรียนกลับตาลปัตรเลยละค่ะ"
42235-106 = "ความเห็นเชิงลบเกี่ยวกับสถาบัน SRT อาจจะเพิ่มขึ้นบ้างสักเล็กน้อย... แต่ก็อย่าไปใส่ใจเลยนะคะ"
42235-107 = "หากฉันได้ขึ้นเป็นรักษาการแทนประธานองค์การนักเรียนละก็ ไม่ว่าใครก็มาต่อว่าอะไรพวกคุณไม่ได้ค่ะ"
42235-111 = "... หัวหน้าฝ่ายกีฬาบาดเจ็บงั้นเหรอคะ? อ่า... หมายถึงยัยโง่คนนั้นสินะคะ"
42235-112 = "ชิ จะออกไปสร้างเรื่องทำไมก็ไม่รู้"
42235-113 = "ช่วยไม่ได้ คงต้องคิดว่าเป็นการเสียสละเพื่อความยุติธรรมนั่นละค่ะ อย่าไปใส่ใจเลยนะคะ"
42235-120 = "หืม...? อะไรกันน่ะ"
42235-121 = "หัวหน้าสำนักฯ คายะ ไหนบอกว่าไม่รู้เรื่องการบุกโจมตีของกองทหาร FOX ครั้งก่อนไง?"
42235-122 = "ระ... เรื่องนั้น... คือว่า..."
42235-127 = "เป็นเจ้าภาพงานมหกรรมแข่งขันกีฬาคิโวทอสเหรอ...? คนโง่คนนี้มาเรียกร้องอะไรอีกแล้ว"
42235-128 = "ถ้าปฏิวัติเสร็จ ฉันคงต้องโยกฝ่ายกีฬามาอยู่ภายใต้ฝ่ายวัฒนธรรมแล้วละค่ะ"
42235-129 = "... ว่าไงคะเลขา มีเรื่องอะไรเหรอคะ?"
42235-130 = "ข้าวปั้นที่จะแจกให้ผู้เข้าร่วมประชุมมีไม่พองั้นเหรอคะ?"
42235-131 = "เรื่องข้าวปั้นเนี่ย ฉันจำเป็นต้องรู้ไหมคะ อย่ามารายงานเรื่องขี้ปะติ๋วอะไรแบบนี้กับฉันเลยค่ะ"
42235-133 = "คะ... คือว่า... เสียงพวกนี้..."
42235-134 = "ใช่ค่ะ! ถูกตัดต่อขึ้นมาทั้งหมดเลยค่ะ! นี่คืออุบายของเจ้าหน้าที่ริน...!"
42235-136 = "ที่ผ่านมาเธอคิดแบบนี้กับพวกฉันเหรอ..."
42235-137 = "ฉันบาดเจ็บที่แขนจากการบุกโจมตีคราวก่อน จนอดลงแข่งเกตบอลเลยนะ..."
42235-142 = "ฉันไม่ต้องการรักษาการแทนฯ ที่ไม่รู้จักคุณค่าของกีฬาหรอกนะ!"
42235-148 = "ออกจากตำแหน่งไปซะ!"
42235-159 = "ตอนต่อไป;บทส่งท้าย"

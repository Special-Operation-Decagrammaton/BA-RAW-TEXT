42235-7 = "3;카야;15;공안국은 대부분의 학생이 근신 중이고…… 경비국은 신규 행정 명령 때문에 자리를 비웠다고……?\n#3;em;[?]"
42235-8 = "3;카야;18;그럼 생활안전국이라도 보내! 누구라도 좋으니까 이 녀석들을 막아!"
42235-9 = "3;카야;21;당장 지원 병력을 보내지 않으면 발키리 경찰학교 자체를 없애 버릴—\n#3;em;[빠직]\n#3;stiff"

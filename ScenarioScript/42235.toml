[translation]
42235-2 = "Listen up! There are terrorists coming to attack the General Student Council building!"
42235-3 = "I need reinforcements from the Public Peace Bureau, Security Bureau, anywhere you can spare them!"
42235-7 = "Most of the students of the Public Peace Bureau are on probation...and the Security Bureau is mostly empty due to the new orders..."
42235-8 = "Fine! Send some people from the Public Safety Bureau! We need bodies out here! Now!"
42235-9 = "If you don't send backup, I swear I'll personally make sure that Valkyrie Police School is removed—"
42235-18 = "SRT! Everyone drop your weapons and step back!"
42235-20 = "This is RABBIT 1. We've detained the suspect, identified as Shiranui Kaya."
42235-24 = "Shiranui Kaya. We have evidence pointing to your involvement in the conspiracy to destroy Kousagi Station."
42235-25 = "You have been accused of conspiring to commit acts of terror upon the citizens, selling confidential Council data to a private corporation, bribing executives with authority and money, and abusing the office of acting president for personal gain."
42235-26 = "All accusations fall under exceptions to the acting president's immunity to arrest."
42235-27 = "In the name of SRT Academy, you are under arrest for rebellion, dereliction of duty, abuse of authority, and bribery."
42235-33 = "How dare you... Some SRT rookies arresting me, the Chief of Defense and Acting General Student Council President?"
42235-34 = "[s1] \"Situations like these are exactly what SRT is for.\"\n[s2] \"The jig is up, Kaya. It's time to face the music.\""
42235-39 = "[USERNAME] Sensei..."
42235-40 = "Can we... talk privately?"
42235-41 = "Maybe my previous offer was... inadequate."
42235-42 = "In hindsight, perhaps it was presumptuous to try and...manage someone of your stature, who’s already done so much in keeping Kivotos running."
42235-43 = "I’m sincerely sorry... We can pretend that never happened!"
42235-53 = "In exchange, you’ll have my full support."
42235-54 = "Resources, manpower, whatever Schale needs."
42235-55 = "If required, I'll personally visit Schale and assist you in any way!"
42235-56 = "Just tell me what you need!"
42235-60 = "[ns] \"...Kaya.\""
42235-64 = "Y-Yes?"
42235-65 = "[s3] \"Your apologies shouldn’t be directed at me.\"\n[s4] \"It's the students you've wronged who deserve your remorse.\""
42235-68 = "Right, right! I'll do whatever you say!"
42235-69 = "Just tell me who to start with. Officer Rin...?"
42235-70 = "[s] \"You're missing the point.\""
42235-77 = "Acting President! Are you all right?"
42235-82 = "Athletic Director, thank goodness!"
42235-83 = "I knew I could count on my allies to have my back!"
42235-85 = "Wait... Why is Sensei with those SRT freshmen?"
42235-86 = "I don't know how they've brainwashed you, Sensei, but they're not worth your trust."
42235-87 = "They're swindlers that only care about money. They took bribes from Chief Officer Rin to discredit and spread rumors about Kaya."
42235-88 = "Exactly! Officer Rin is the real puppet master here!"
42235-89 = "She's always tried to undermine me! Her with her stupid...ample assets!"
42235-91 = "Seriously? That's your issue with her?"
42235-92 = "Your jealousy boiled down to...that?"
42235-93 = "You know, it kind of made sense. I thought there was something about it that felt personal."
42235-95 = "What are you trying to say, four-eyes?"
42235-96 = "[s] \"Miyako, play the recording FOX Squad gave us.\""
42235-97 = "On it."
42235-105 = "Nice work, Squad Leader Yukino. This mission should shift the climate with the General Student Council."
42235-106 = "There might be some negative backlash towards SRT at first, but pay it no mind."
42235-107 = "Once I’m Acting President, no one will dare criticize you."
42235-111 = "...the athletic director is injured? Oh, you mean that klutz..."
42235-112 = "She's always just running around causing trouble for everyone."
42235-113 = "Small price to pay, really. Nothing to worry about."
42235-120 = "...What did I just hear?"
42235-121 = "Didn’t you claim to know nothing about FOX Squad's plans, Chief Kaya?"
42235-122 = "W-Well... that's..."
42235-127 = "A permanent Kivotos field day...? What other idiotic plans are gonna come out of her mouth..."
42235-128 = "After this is done, I’m overhauling the Athletics Department and putting it under the purview of the Culture Office."
42235-129 = "Yes, secretary? How can I assist?"
42235-130 = "We’re short on onigiri for the meeting?"
42235-131 = "Look, not my problem. Handle it."
42235-133 = "This...can be explained..."
42235-134 = "It’s...all a set-up! Clearly, another one of Officer Rin's schemes...!"
42235-136 = "To think you viewed me so lowly..."
42235-137 = "The gate ball tourney was really hard for me, especially after injuring my arm in that ambush..."
42235-142 = "I don't need an acting anything who spits on athletics!"
42235-148 = "Impeach her!"
42235-159 = "Next Episode; Epilogue"

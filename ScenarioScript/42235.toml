42235-33 = "3;카야;19;감히…… SRT의 대원 나부랭이들이 방위실장이자 총학생회장 대행인 나를 체포한다고……?\n#3;stiff"
42235-34 = "[s1] \"SRT는 이런 문제를 해결하기 위해 존재하는 치안 기관이니까.\"\n[s2] \"카야. 이만 순순히 네 잘못을 받아들여.\""

42235-2 = "3;카야;21;그러니까 지금 무장한 테러리스트들이 총학생회 건물로 향하고 있다고 몇 번이나 말했잖아!\n#3;a\n#3;hophop"
42235-3 = "3;카야;18;공안국이든 경비국이든 가용 가능한 병력은 전부 이쪽으로 보내!"

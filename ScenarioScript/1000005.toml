[translation]
1000005-1 = "真正的領袖"
1000005-2 = "第8電影院前"
1000005-4 = "（雖然比約定時間早了20分鐘到，卻發現亞瑠甚至還更早到）"
1000005-5 = "哼哼哼。如果一見面我就像個社長展現從容並優雅的進行嚮導的話，我想老師一定也會嚇一大跳……"
1000005-8 = "[s] 「亞瑠，等很久了嗎？」"
1000005-9 = "呀啊！？嚇，嚇死我了！"
1000005-10 = "原，原來是老師，一聲不響地冒出來，害我嚇了一跳……"
1000005-11 = "[s] 「亞瑠來得很早呢。」"
1000005-12 = "哼哼哼，如果領袖是個懶惰的人，那麼跟隨著的部下自然也會跟著懶惰吧？"
1000005-13 = "所以為了成為大家的表率，身為社長的我也必須比其他人更早行動。"
1000005-14 = "[s] 「亞瑠真認真呢。」"
1000005-15 = "唔……先，先別管那個了……！"
1000005-16 = "我今天找老師來是想要和你一起看這部電影。"
1000005-18 = "[s] 「《義理人情大戰爭3～黑手黨和黑道的大運動會～》？」"
1000005-19 = "哼哼哼，沒錯，這是描繪不法之徒的真實生活而廣受好評的「義理人情戰爭」系列最新作。"
1000005-20 = "而且聽說這次的電影會講述主角如何在大型運動會上擊敗前作的主角們，逐步成長為一個偉大領袖的心路歷程。"
1000005-21 = "看了這個，也許我就能掌握領袖應有的心態了。"
1000005-22 = "[s1] 「……是這樣嗎？」\n[s2] 「亞瑠是那部電影的鐵粉嗎？」"
1000005-23 = "感覺，反應很平淡呢。"
1000005-24 = "感覺，反應很平淡呢。"
1000005-25 = "我倒要看看，老師看完電影之後還能不能保持得那麼從容？"
1000005-26 = "好，總之我們趕快去看吧，老師。"
1000005-29 = "（電影的內容接連帶來了充滿魄力的懸疑與轉折）"
1000005-36 = "（劇情充滿緊張刺激的動作戲、讓人手心冒汗的感動與悲歡，真的會讓人甚至忘記時間，越看越入迷）"
1000005-38 = "老師！老師！如何，真的很厲害吧？"
1000005-39 = "演技的細節無可挑剔，甚至連內容也相當完美！"
1000005-40 = "主角最後做出那種選擇的時候，就連我也很吃驚呢！"
1000005-41 = "[s3] 「沒想到會因為檸檬汁和唐揚雞的問題，」\n[s4] 「而做出那種選擇。」"
1000005-42 = "後來唐揚雞爆炸的時候，真的不知道會變成什麼樣呢♪"
1000005-43 = "後來唐揚雞爆炸的時候，真的不知道會變成什麼樣呢♪"
1000005-44 = "哼哼哼，無論遇到怎樣的困難與逆境，我都會堅定自己的道路，守護到最後。"
1000005-45 = "我很中意。"
1000005-46 = "我想真正的不法之徒，真正的領袖，指的正是那種樣子。"
1000005-47 = "[s] 「而且，到最後一刻都絕不捨棄夥伴。」"
1000005-48 = "沒錯，就算立志當個跳脫框架的不法之徒，也絕不會拋棄曾經一起發過誓的朋友和夥伴。"
1000005-49 = "雖然世間上大家自顧自地在說……怎麼做才是個領袖。 "
1000005-50 = "結果，不放棄任何重視的事物並將自己的信念貫徹到底才是真正的領袖呢。"
1000005-51 = "我也總有一天，會成為那樣的領袖給你看的。"
1000005-52 = "[s] 「我認為是亞瑠的話一定可以的。」"
1000005-53 = "嗚耶！？"
1000005-54 = "[s] 「不對，說不定已經是了呢。」"
1000005-55 = "真是的……老師每次，都能若無其事地說出那種話呢。而且還很突然。"
1000005-56 = "嘛，雖然老師說的話一點根據也沒有。"
1000005-57 = "光是聽老師那樣說，就覺得真的是那樣，真神奇呢。"
1000005-58 = "哼哼哼，雖然還有很長一段路要走，不過希望事情能夠如我們所願。"
1000005-59 = "以後也請多指教哦，老師？"

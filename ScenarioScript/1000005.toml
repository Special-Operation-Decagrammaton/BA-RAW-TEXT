[translation]
1000005-1 = "#title;진정한 리더"
1000005-2 = "#place;제8영화관 앞"
1000005-3 = "3;아루;01\n#3;h\n#3;a\n#wait;1500"
1000005-4 = "#na;(약속시간보다 20분 정도 일찍 도착하자 먼저 와있는 아루를 발견할 수 있었다.)"
1000005-5 = "3;아루;08;후후후. 만나자마자 사장인 내가 여유를 보여주면서 에스코트를 하면, 선생님도 분명 깜짝 놀라서는…….\n#3;em;[반짝]"
1000005-6 = "3;아루;08\n#3;d\n#wait;1500"
1000005-7 = "3;아루;08\n#3;h\n#3;closeup\n#wait;1000\n#3;a"
1000005-8 = "[s] \"아루, 오래 기다렸어?\""
1000005-9 = "3;아루;04;히얏?! 까, 깜짝이야!\n#3;shake\n#3;em;[?!]\n#3;closeup"
1000005-10 = "3;아루;10;서, 선생님이었구나. 갑자기 기척도 없이 등장해서 노, 놀랐잖아.\n#3;em;[땀]\n#3;closeup"
1000005-11 = "[s] \"아루는 엄청 일찍 왔네.\""
1000005-12 = "3;아루;01;후후후, 리더가 게으르면 자연스레 따르는 직원들도 게을러지는 법이잖아?"
1000005-13 = "3;아루;08;그러니 사장으로서 모범이 되기 위해서라도 나는 솔선해서 움직일 뿐이야.\n#3;em;[음표]"
1000005-14 = "[s] \"아루는 착실하구나\""
1000005-15 = "3;아루;10;윽, 그, 그건 됐고……!\n#3;em;[///]\n#3;stiff"
1000005-16 = "3;아루;03;오늘 이렇게 만나자고 한 이유는, 이 영화를 보기 위해서야."
1000005-17 = "#wait;1000"
1000005-18 = "[s] \"<의리 넘치는 전쟁3 ~마피아 vs 야쿠자 대운동회~>?\""
1000005-19 = "3;아루;00;후후후, 무법자들의 리얼한 세계를 그리기로 정평이 난 <의넘전쟁> 시리즈의 최신작."
1000005-20 = "3;아루;99;이번 영화에선 무려 주인공이 대운동회에서 전작의 주인공들을 쓰러트리고, 진정한 리더가 되어가는 과정을 그렸다고 해."
1000005-21 = "3;아루;01;이걸 보면 리더로서의 마음가짐을 배울 수 있을지도 몰라.\n#3;em;[반응]"
1000005-22 = "[s1] \"……그럴까?\"\n[s2] \"아루는 그 영화의 열성팬?\""
1000005-23 = "3;아루;02;흥, 반응이 미적지근한데."
1000005-24 = "3;아루;02;흥, 반응이 미적지근한데."
1000005-25 = "3;아루;01;과연 영화를 보고 난 뒤에도 선생님이 그런 여유를 보여줄 수 있을까?"
1000005-26 = "3;아루;09;자아, 얼른 보러 가자. 선생님.\n#3;em;[음표]"
1000005-27 = "#all;hide"
1000005-28 = "#wait;1000"
1000005-29 = "#na;(영화의 내용은 그야말로 박진감이 넘치는 서스펜스와 반전으로 가득 차 있었다.)"
1000005-30 = "#wait;500"
1000005-31 = "#wait;500"
1000005-32 = "#wait;1500"
1000005-33 = "#wait;1000"
1000005-34 = "#wait;500"
1000005-35 = "#wait;500"
1000005-36 = "#na;(액션과 긴장감, 감동과 애환이 가득 넘치는 전개에 손에 땀을 쥔 채, 정말 시간 가는 줄도 모르고 관람했다.)"
1000005-37 = "#all;hide"
1000005-38 = "3;아루;08;선생님! 선생님! 영화 정말 굉장했지?\n#3;hophop\n#3;a"
1000005-39 = "3;아루;09;연기의 디테일은 말할 것도 없고 내용도 완벽했어!\n#3;em;[재잘]"
1000005-40 = "3;아루;01;주인공이 마지막에 그런 선택을 했을 땐, 아무리 나라도 엄청 놀랐지만!"
1000005-41 = "[s3] \"응. 설마 가라아게에 레몬즙을 뿌릴지 말지를 두고\"\n[s4] \"그런 선택을 할 줄이야.\""
1000005-42 = "3;아루;08;그 뒤에 가라아게가 폭발했을 땐, 정말 어떻게 흘러갈지 가슴이 두근두근 했다니까♪\n#3;em;[음표]\n#3;greeting"
1000005-43 = "3;아루;08;그 뒤에 가라아게가 폭발했을 땐, 정말 어떻게 흘러갈지 가슴이 두근두근 했다니까♪\n#3;em;[음표]\n#3;greeting"
1000005-44 = "3;아루;01;후후후, 어떤 고난과 역경이 들이닥쳐도 자신의 길을 관철하고 끝까지 지킨다."
1000005-45 = "3;아루;99;마음에 들어."
1000005-46 = "3;아루;03;진정한 무법자. 진정한 리더라는 건 바로 그런 걸 가리키는 걸 거야.\n#3;em;[반응]"
1000005-47 = "[s] \"거기다 마지막까지 절대로 동료를 버리지도 않았지.\""
1000005-48 = "3;아루;01;응. 거추장스러운 규칙을 벗어 던진 무법자라고 할지라도, 함께 맹세를 나눈 친구나 동료는 절대로 버리지 않아."
1000005-49 = "3;아루;99;리더란 어째야 하는가. 세간의 사람들은 멋대로 떠들고는 하지만. \n#3;em;…"
1000005-50 = "3;아루;01;결국 소중한 것을 포기하지 않고 끝까지 관철하는 것이 진정한 리더란 거겠지."
1000005-51 = "3;아루;09;나도 언젠가 반드시 그런 리더가 될 거야.\n#3;em;[반짝]"
1000005-52 = "[s] \"아루라면 될 수 있을 거야.\""
1000005-53 = "3;아루;10;윽?!\n#3;shake\n#3;em;[?!]"
1000005-54 = "[s] \"아니, 어쩌면 이미 되어있는지도 몰라.\""
1000005-55 = "3;아루;10;정말…… 선생님은 매번 아무렇지도 않게 그런 말을 하는구나.\n#3;em;[땀]"
1000005-56 = "3;아루;99;뭐어, 선생님 말엔 아무런 근거도 없지만."
1000005-57 = "3;아루;01;선생님이 그리 말해준 것만으로도 정말 그럴 것만 같은 기분이 든다는 게 신기해."
1000005-58 = "3;아루;03;후후후, 아직 갈 길은 멀고 멀었지만, 부디 그렇게 될 수 있도록."
1000005-59 = "3;아루;09;앞으로도 잘 부탁해. 선생님?\n#3;greeting\n#3;em;[반짝]"

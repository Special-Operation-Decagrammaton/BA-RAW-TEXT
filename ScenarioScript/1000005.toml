[translation]
1000005-1 = "The True Leader"
1000005-2 = "In Front of Movie Theater 8"
1000005-4 = "I arrived 20 minutes early, but Aru was already here."
1000005-5 = "Heh heh. Sensei is going to be so impressed by me showing up first to play the escort..."
1000005-8 = "[s] \"How long have you been here, Aru?\""
1000005-9 = "Ack! D-Don't scare me like that!"
1000005-10 = "I-It's just you, Sensei. Showing up out of nowhere like that really scared me."
1000005-11 = "[s] \"You're here even earlier than I am.\""
1000005-12 = "Heh. I'm the boss. What kind of example would I be setting for my employees if I were lazy?"
1000005-13 = "A true leader takes the initiative by setting a good example."
1000005-14 = "[s] \"It's admirable how earnest you are, Aru.\""
1000005-15 = "C'mon, y-you don't have to say it like that...!"
1000005-16 = "I'm the one who asked you to see this movie with me."
1000005-18 = "[s] \"'War of Loyalty 3: Mafia vs Yakuza Field Day'?\""
1000005-19 = "It's the newest War of Loyalty movie. It's a series that realistically depicts the criminal world."
1000005-20 = "This one's plot has the main character defeating the heroes from the previous movie during the field day to become the true leader."
1000005-21 = "My thought is this film is going to help us learn more about leadership."
1000005-22 = "[s1] \"Do you think so?\"\n[s2] \"Are you sure you're not just a fan?\""
1000005-23 = "Hmph. Try to hide your excitement, why don't you?"
1000005-24 = "Hmph. Try to hide your excitement, why don't you?"
1000005-25 = "We'll see what you have to say after you've seen it."
1000005-26 = "Come on, Sensei. Let's go inside."
1000005-29 = "The movie's plot was full of suspense and twists."
1000005-36 = "The action, tension, emotion, and sorrow made my palms sweat. I got so into it that I completely lost track of time."
1000005-38 = "Sensei! Sensei! Wasn't the movie incredible?"
1000005-39 = "The nuance in the acting was phenomenal, and the plot was perfect!"
1000005-40 = "Even I was surprised at the choice the hero made at the end."
1000005-41 = "[s3] \"You mean when they had to sprinkle the lemon juice? Yeah...\"\n[s4] \"I never saw it coming!\""
1000005-42 = "And my heart was pounding when the karaage exploded. I didn't know WHAT to expect! ♪"
1000005-43 = "And my heart was pounding when the karaage exploded. I didn't know WHAT to expect! ♪"
1000005-44 = "Heh. He stayed true and persevered no matter what was thrown at him."
1000005-45 = "That's what I mean. "
1000005-46 = "Being a leader and a true outlaw aren't all that different."
1000005-47 = "[s] \"Don't forget teamwork. He stayed with his comrades to the end.\""
1000005-48 = "Yeah. Outlaws may not play by the rules, but they would never abandon a friend or comrade they swore an oath with."
1000005-49 = "Everyone has their own idea of what leadership takes."
1000005-50 = "I think real leadership takes perseverance and conviction."
1000005-51 = "That's the kind of leader I want to be."
1000005-52 = "[s] \"I believe in you, Aru.\""
1000005-53 = "Huh?!"
1000005-54 = "[s] \"You're already that kind of leader if you ask me.\""
1000005-55 = "Seriously, Sensei... How do you say these things with a straight face?"
1000005-56 = "Well, I don't know if I agree with you just yet..."
1000005-57 = "...but it's strange. Just hearing you say that makes me feel like I can be."
1000005-58 = "Heh heh, I still have a long way to go, but I can make that dream come true."
1000005-59 = "And I'll do it with your help, Sensei!"

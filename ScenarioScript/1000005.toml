[translation]
1000005-1 = "ผู้นำที่แท้จริง"
1000005-2 = "ด้านหน้า โรงภาพยนตร์หมายเลข 8"
1000005-4 = "(คุณครูมาถึงเร็วกว่าเวลานัด 20 นาทีแต่ก็เจอว่าอารุมายืนรออยู่แล้ว)"
1000005-5 = "ฮุฮุฮุ คุณครูจะต้องตกใจแน่ๆ ถ้าเห็นว่าฉันมารออยู่ก่อนแล้ว เพื่อจะพาครูเข้าไปในโรงหนังน่ะ"
1000005-8 = "[s] \"อารุ รอนานรึเปล่า?\""
1000005-9 = "อ๊ะ?! ตะ...ตกใจหมดเลย!"
1000005-10 = "คะ...คุณครูเองเหรอ จู่ๆ ก็โผล่มาแบบนี้ตกใจหมด"
1000005-11 = "[s] \"อารุมาเร็วมากเลยนะ\""
1000005-12 = "ฮุฮุฮุ ถ้าหัวหน้าขี้เกียจล่ะก็คนอื่นๆ ก็จะขี้เกียจตามได้น่ะสิ"
1000005-13 = "เพราะงั้นในฐานะหัวหน้าแล้ว ฉันต้องเป็นตัวอย่างที่ดีให้คนอื่นๆ สิ"
1000005-14 = "[s] \"อารุนี่ใจดีจังเลยนะ\""
1000005-15 = "อึ่ก... ชะ...ช่างเถอะน่า....!"
1000005-16 = "ที่ฉันชวนคุณครูออกมาวันนี้ก็เพื่อมาดูหนังกันนี่แหละ"
1000005-18 = "[s] \"หนังเรื่อง <แบตเทิล แอตลีตส์ วิคทอรี่ 3 ไตรกีฬามาเฟียปะทะยากูซ่า~> งั้นเหรอ?\""
1000005-19 = "ฮุฮุฮุ ภาคล่าสุดของซีรีย์ <แบตเทิล แอตลีตส์ วิคทอรี่ 3> ที่เป็นเรื่องเกี่ยวกับโลกที่แท้จริง#nของเหล่าคนนอกกฎหมาย"
1000005-20 = "แถมตัวเอกของภาคนี้จะเอาชนะแชมป์จากภาคก่อนได้ด้วย แล้วก็มีเรื่องราวเกี่ยวกับกระบวนการฝึก#nการเป็นผู้นำที่แท้จริงน่ะ"
1000005-21 = "ถ้าดูหนังเรื่องนี้อาจทำให้เราเข้าใจความคิดในฐานะผู้นำได้มากขึ้นก็ได้"
1000005-22 = "[s1] \"คิดงั้นเหรอ...?\"\n[s2] \"อารุเป็นแฟนซีรีส์นี้เหรอ?\""
1000005-23 = "หืม? ปฏิกิริยาแบบนั้นมันอะไรกันน่ะ"
1000005-24 = "หืม? ปฏิกิริยาแบบนั้นมันอะไรกันน่ะ"
1000005-25 = "หลังจากดูหนังแล้วคุณครูอาจจะไม่พูดแบบนั้นอีกก็ได้"
1000005-26 = "เอาล่ะ รีบเข้าไปดูหนังกันเถอะ คุณครู"
1000005-29 = "(เนื้อเรื่องของหนังเต็มไปด้วยความหวาดหวั่นและพล็อตเรื่องที่หักมุม)"
1000005-36 = "(ทั้งแอ็กชั่น ความกดดัน อารมณ์และความเศร้าของหนังทำให้เหงื่อออกจนชุ่มมือ และอินกับหนัง#nไปโดยไม่รู้ว่าเวลาผ่านไปนานแค่ไหน)"
1000005-38 = "คุณครู... คุณครู! หนังเรื่องนี้สุดยอดมากเลยใช่ไหม?"
1000005-39 = "การแสดงที่เก็บรายละเอียดขั้นสุด กับพล็อตเรื่องที่สมบูรณ์แบบ!"
1000005-40 = "ฉันเองยังตกใจเลยที่ตัวเอกตัดสินใจแบบนั้นในตอนจบน่ะ!"
1000005-41 = "[s3] \"อื้อ ตอนที่ตัวเอกตัดสินใจว่าจะไม่ใส่ซอสเลมอนในคาราอะเกะ...\"\n[s4] \"คิดแล้วว่าต้องตัดสินใจแบบนั้น\""
1000005-42 = "แล้วตอนหลังที่คาราอะเกะระเบิด ฉันตื่นเต้นจนใจเต้นรัวไปหมดเลยล่ะ♪"
1000005-43 = "นั่นสิ ตอนหลังที่คาราอะเกะระเบิด ฉันตื่นเต้นจนใจเต้นรัวไปหมดเลยล่ะ♪"
1000005-44 = "ฮุฮุฮุ ไม่ว่าจะต้องเจอกับความยากลำบากแค่ไหน ก็จงยึดมั่นในเส้นทางที่เลือกและพยายามต่อไป"
1000005-45 = "กินใจมากเลยล่ะ"
1000005-46 = "คนนอกกฎหมายที่แท้จริง นั่นคือสิ่งที่เราจะต้องเป็นให้ได้เพื่อการเป็นผู้นำที่แท้จริง"
1000005-47 = "[s] \"แถมตัวเอกก็ยืนหยัดอยู่กับพวกพ้องจนถึงที่สุดด้วย\""
1000005-48 = "อื้อ ถึงเป็นคนนอกกฎหมายที่ไม่ชอบทำตามกฎเกณฑ์ แต่ก็ไม่ละทิ้งพวกพ้องที่สาบานร่วมเป็นร่วม#nตายกัน"
1000005-49 = "ผู้นำควรเป็นแบบไหนกันแน่ ถึงคนเราจะชอบให้คำนิยามของคำว่าผู้นำไปต่างๆ ก็ตาม... "
1000005-50 = "แต่คนที่ไม่ยอมแพ้หรือละทิ้งสิ่งสำคัญจนถึงที่สุดนั่นล่ะ คือผู้นำที่แท้จริง"
1000005-51 = "สักวันฉันเองก็จะเป็นผู้นำแบบนั้นให้ได้"
1000005-52 = "[s] \"ครูเชื่อว่าอารุทำได้\""
1000005-53 = "อึ่ก?!"
1000005-54 = "[s] \"ตอนนี้ก็เป็นได้แล้วไม่ใช่เหรอ\""
1000005-55 = "คุณครู... พูดเรื่องแบบนี้ออกมาได้ง่ายๆ เลยนะ"
1000005-56 = "ฉันไม่รู้ว่ามันจริงรึเปล่า..."
1000005-57 = "แปลกจังเลยนะ แค่ได้ยินคุณครูพูดแบบนั้นก็รู้สึกเหมือนว่าตัวเองจะต้องทำได้แน่ๆ"
1000005-58 = "ฮุฮุฮุ แต่ฉันยังต้องเรียนรู้อีกเยอะ สักวันคงจะทำได้"
1000005-59 = "ยังไงก็ขอฝากตัวด้วยนะ คุณครู"

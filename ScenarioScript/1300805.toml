[translation]
1300805-1 = "公園除草"
1300805-2 = "今天要除公園的雜草哦！是份簡單卻麻煩的工作呢。"
1300805-3 = "地點是這邊、那邊和那邊。 "
1300805-4 = "尤其是那邊，長得非常茂盛，不確實連根拔起的話馬上就會再長出來。 "
1300805-5 = "只要看到不管怎麼拔都還是長個不停的雜草就……哈啊…… #n就會想到「三途川」呢……"
1300805-6 = "要是有專業裝備的話就好了，但卻只有手套和鐮刀……"
1300805-7 = "[s]「加油吧。」"
1300805-8 = "嗯！FIGHT呢，老師！開始吧！"
1300805-10 = "（和茜香一起除了一整天的雜草）"
1300805-11 = "（直到日落時分才好不容易結束了）"
1300805-13 = "結束～！除了這麼多應該就OK了！"
1300805-14 = "好，老師也做得不錯嘛？看來你很習慣肉體勞動？"
1300805-15 = "啊嗚嗚……腰好痛。"
1300805-16 = "這種撿垃圾或是環境美化的打工可以在放學後做是不錯……但時薪似乎不太好。"
1300805-18 = "……天色已經變這麼暗了啊。回去吧，老師。"
1300805-21 = "（和茜香並肩扶著疼痛的腰回家了）"

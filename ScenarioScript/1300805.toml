[translation]
1300805-1 = "ถอนหญ้าในสวน"
1300805-2 = "วันนี้เราจะไปถอนหญ้าในสวนกัน! เป็นงานง่ายๆ ไม่ยุ่งยากอะไรเลย"
1300805-3 = "บริเวณที่ต้องถอนหญ้าก็คือตรงนี้ ตรงนั้น แล้วก็ตรงโน้น! "
1300805-4 = "โดยเฉพาะตรงนั้นหญ้าขึ้นรกมาก เพราะงั้นถ้าไม่ถอนรากมันออกมาด้วย#nไม่นานหญ้ามันก็จะงอกขึ้นมาใหม่เร็วมากเลยล่ะ"
1300805-5 = "พอเห็นพวกต้นหญ้าที่ถอนเท่าไหร่ก็ไม่เคยหมดพวกนี้...#nก็รู้สึกเหมือนเป็นคุณปู่กลิ้งหินขึ้นเขาที่เป็นเรื่องเล่าโบราณขึ้นมาเลยล่ะ"
1300805-6 = "ถ้ามีอุปกรณ์สำหรับถอนหญ้าโดยเฉพาะอยู่ก็คงดี แต่ตอนนี้เรามีแค่ถุงมืออย่างเดียว..."
1300805-7 = "[s] \"มาพยายามไปด้วยกันนะ\""
1300805-8 = "ได้! สู้ๆ นะคุณครู! มาเริ่มกันเลยดีกว่า!"
1300805-10 = "(คุณครูนั่งถอนหญ้ากับเซริกะตลอดทั้งวัน)"
1300805-11 = "(ทั้งสองคนทำงานเสร็จในตอนที่พระอาทิตย์ใกล้จะตกดิน)"
1300805-13 = "เสร็จแล้ว~! เท่านี้ก็โอเคแล้วล่ะ!"
1300805-14 = "คุณครูเองก็ทำได้ดีเลยไม่ใช่รึไง? ดูเหมือนคุ้นเคยกับงานใช้แรงงานดีนะ?"
1300805-15 = "โอยยย... ปวดหลัง!"
1300805-16 = "ทำงานพิเศษทำความสะอาดหลังเลิกเรียนแบบนี้มันก็ดีอยู่หรอก...#nแต่คงไม่ได้ค่าแรงเยอะเท่าไหร่"
1300805-18 = "มืดขนาดนี้แล้วเหรอเนี่ย กลับกันเถอะคุณครู"
1300805-21 = "(คุณครูเดินกลับบ้านพร้อมกับเซริกะ พร้อมกับเดินจับเอวที่ปวดรวดร้าวไปตลอดทาง)"

[translation]
1300805-1 = "Pulling Weeds at the Park"
1300805-2 = "Our task for today is pulling weeds in the park! It sounds simple enough, but it'll be hard work."
1300805-3 = "We need to focus on the patch here and the one over there."
1300805-4 = "That part especially is super overgrown, so the weeds will grow back quickly if they aren't uprooted."
1300805-5 = "It feels like for every weed we pull, two more will pop up in its place... *sigh* This reminds of that old tale with the guy endlessly rolling a boulder up a hill."
1300805-6 = "If only we had some professional gardening equipment. All I have are my gloves and a sickle..."
1300805-7 = "[s] \"We'll find a way to manage.\""
1300805-8 = "Here goes nothing, Sensei! Let's get to work!"
1300805-10 = "(Serika and I pulled weeds all day.)"
1300805-11 = "We managed to finish our work just before sunset."
1300805-13 = "All done! This should be okay."
1300805-14 = "You did a pretty good job! I guess you're used to manual labor by now?"
1300805-15 = "My back...isn't as big of a fan."
1300805-16 = "This job is nice because I can do it after school...but the pay isn't very competitive."
1300805-18 = "...It's already getting dark out. Let's head back, Sensei."
1300805-21 = "(Serika and I hobbled home with our aching backs.)"

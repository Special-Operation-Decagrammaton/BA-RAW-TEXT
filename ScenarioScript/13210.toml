[translation]
13210-1 = "ตอนที่ 21;การไล่ล่าครั้งที่ 2"
13210-2 = "ทุกคนเป็นยังไงบ้าง?"
13210-3 = "ขะ... ขอบใจนะ ฉันรอดมาได้เพราะพวกเธอเลยละ..."
13210-5 = "ฉะ... ฉันไปต่อไม่ไหวแล้ว... ฉันขอถอนตัว"
13210-6 = "ฉันก็ด้วย... ไม่น่าโลภมากไปแตะต้องอะบิดอสเลย..."
13210-8 = "เสียหายไปไม่ใช่น้อยๆ เลย..."
13210-9 = "ใช่... ฉันไม่ควรจะเข้ามายุ่งเรื่องแบบนี้ตั้งแต่แรก..."
13210-11 = "ค่ะ คิดดีแล้วละค่ะ ประธานใหญ่เรียกกองกำลังทั้งหมดของไคเซอร์กรุ๊ปมาที่นี่แล้ว กองกำลังชุดแรกคงเข้ามาในเขตปกครองตนเองได้ภายในเย็นวันนี้ค่ะ"
13210-12 = "อีกไม่นานเขตปกครองตนเองอะบิดอสก็คงกลายเป็นสนามรบ พวกคุณรีบหนีไปเถอะค่ะ"
13210-13 = "ขะ... เข้าใจแล้ว..."
13210-16 = "คุณหนู..."
13210-17 = "คุณพ่อบ้าน เป็นยังไงบ้างคะ...?"
13210-18 = "นะ... นี่ผมทำอะไรลงไป..."
13210-19 = "อืม ทำเรื่องร้ายแรงเลยละค่ะ จากนี้อะบิดอสจะกลายเป็นสนามรบแล้วค่ะ"
13210-20 = "แต่สิ่งที่ผมต้องการ... ไม่ใช่อย่างนี้..."
13210-21 = "ฉันรู้ค่ะ... คุณพ่อบ้าน"
13210-22 = "รู้งั้นเหรอครับ...?"
13210-23 = "ค่ะ สิ่งที่คุณพ่อบ้านต้องการ... ก็เหมือนกับคณะกรรมการแผนงานใช่มั้ยคะ? คุณพ่อบ้านคงอยากให้มี#nการฟื้นฟูเนฟธิสและอะบิดอส... และฟื้นฟูความเจริญรุ่งเรืองที่เคยมีในอดีต..."
13210-24 = "..."
13210-25 = "แต่สุดท้ายผลลัพธ์ก็ออกมาเป็นอย่างที่เห็นค่ะ ดูสิคะ ดู <กองทุนไพรเวทอิควิตี้> ทางนั้นสิ"
13210-26 = "ผมรู้ดีครับ แต่ว่า..."
13210-27 = "หลังจากรู้เรื่องการมีอยู่ของปืนแม่เหล็กไฟฟ้า ผมก็ออกมาจากตรงนั้นไม่ได้..."
13210-28 = "พอมีเรื่องปืนนั่น... ผมก็คิดเรื่องอื่นไม่ได้เลยครับ ขอแค่มีปืนนั่น..."
13210-29 = "ที่จริงตอนนี้ผมก็ยังคิดเหมือนเดิมครับ ขอแค่มีปืนนั่น... เนฟธิสก็จะ... กลับไปอยู่ที่อะบิดอสได้..."
13210-30 = "อื้อ แต่แบบนั้นก็คงยากเลยนะคะ~♧"
13210-31 = "..."
13210-32 = "งั้นก็รักษาตัวด้วยนะคะ คุณพ่อบ้าน"
13210-33 = "จะ... จะไปไหนเหรอครับคุณหนู?"
13210-34 = "จะไปห้ามรุ่นพี่โฮชิโนะน่ะค่ะ"
13210-35 = "ต้องห้ามไม่ให้รุ่นพี่ทำลายปืนแม่เหล็กไฟฟ้าแล้วลาออกจากโรงเรียนค่ะ"
13210-36 = "ตะ... แต่ว่าจะห้ามยังไง...?"
13210-37 = "อืม... มีวิธีไหนก็ต้องทำค่ะ"
13210-41 = "..."
13210-43 = "ขวางรุ่นพี่โฮชิโนะไม่สำเร็จอีกแล้ว เป็นเพราะฉันเก่งไม่พอน่ะ..."
13210-44 = "พูดแบบนี้อีกแล้วเหรอ? ก็บอกแล้วไงว่านี่ไม่ใช่ความผิดของรุ่นพี่ชิโรโกะ ปัญหาอยู่ที่รุ่นพี่โฮชิโนะที่#nเก่งเกินไปต่างหาก"
13210-45 = "อย่าท้อใจเลยนะ... ชิโรโกะจัง"
13210-46 = "อืม..."
13210-47 = "ค่ะ... บางทีรุ่นพี่โฮชิโนะอาจจะคิดแบบนี้ตั้งแต่แรกก็ได้ค่ะ"
13210-48 = "ไปช่วยรุ่นพี่โนโนมิก่อน จากนั้นก็ประกาศว่าตัวเองไม่ได้อยู่ในคณะกรรมการแผนงาน แล้วก็ไปทำลาย#nปืนแม่เหล็กไฟฟ้า..."
13210-49 = "เพราะถ้าทำอย่างนั้น ภาระที่ต้องชดเชยความเสียหายที่เกิดขึ้นจะได้ไม่ตกอยู่ที่โรงเรียนอะบิดอส..."
13210-50 = "นั่นสินะ พอมาคิดดูแล้วมันก็แปลกๆ นะ ที่รุ่นพี่โฮชิโนะทำน่ะ"
13210-51 = "จะว่ายังไงดีล่ะ ถึงจะอธิบายออกมาเป็นคำพูดได้ยาก แต่ฉันว่ามันเหมือนกับรุ่นพี่ถูกบางอย่างครอบงำ#nยังไงไม่รู้..."
13210-52 = "อืม... นี่เป็นปัญหาที่เราต้องรวมพลังกันคิด แต่เหมือนว่ารุ่นพี่ตั้งใจปฏิเสธอยู่อย่างนั้นละ..."
13210-54 = "พอมาคิดดูก็เหมือนกับตอนนั้นเลย..."
13210-59 = "ดูเหมือนว่ารุ่นพี่โฮชิโนะจะคิดว่า... การทำลายปืนแม่เหล็กไฟฟ้าคือความตั้งใจของรุ่นพี่ยูเมะนะคะ"
13210-60 = "ว่าไงนะ? แต่ท่านประธานคนนั้นไม่เคยพูดแบบนั้นไม่ใช่เหรอ?"
13210-61 = "อืม แต่เหมือนรุ่นพี่โฮชิโนะกำลังหมกมุ่นอยู่กับความคิดที่ว่า ถ้าเป็นประธานยูเมะจะต้องคิดแบบนั้น#nอยู่แน่เลย"
13210-62 = "ทำไมล่ะ...?"
13210-64 = "ไม่รู้สิคะ อะไรทำให้รุ่นพี่โฮชิโนะคิดจะทำแบบนี้กันนะ..."
13210-65 = "นั่นอาจจะเพราะ..."
13210-74 = "โฮชิโนะจัง! ไปล่าสมบัติกัน!! โฮชิโนะจัง!"
13210-75 = "โฮชิโนะจังงงง...?"
13210-81 = "ค่ะ มีเรื่องอะไรอีกคะ?"
13210-82 = "โฮชิโนะจัง...? อะไรน่ะ ทำไมสภาพเป็นอย่างนี้?"
13210-83 = "คะ? อ่า... นะ... นี่มัน..."
13210-84 = "อย่าบอกนะว่าชอบปลามากจนอยากจะเป็นปลาเสียเองเลยน่ะ...?"
13210-88 = "พูดอะไรของรุ่นพี่คะ! แล้วฉันจะไปเป็นปลาได้ยังไง!"
13210-89 = "เมื่อกี้ฉันซ่อมระบบประปามาน่ะค่ะ ก็เลยเปียกโชกไปทั้งตัว... แล้วตอนนี้ฉันก็กำลังรอชุดแห้งอยู่น่ะค่ะ!"
13210-90 = "แหะๆ ก๊อกน้ำในสนามกีฬาที่เสียน่ะเหรอ? โฮชิโนะจังไปซ่อมมาเหรอ?"
13210-91 = "ฉันว่าจะลองซ่อมดูค่ะ แต่โครงสร้างมันซับซ้อนกว่าที่คิดเอาไว้ ก็เลยซ่อมไม่ได้..."
13210-92 = "แหะๆๆ แบบนี้นี่เอง อัจฉริยะอย่างโฮชิโนะจังก็มีเรื่องที่ทำไม่ได้สินะเนี่ย"
13210-93 = "ไม่ถนัดเรื่องการใช้เครื่องมือเหมือนลุงๆ เหรอ?"
13210-94 = "เรื่องนั้นช่างมันเถอะค่ะ ว่าแต่มีเรื่องอะไรมาอีกคะรุ่นพี่"
13210-95 = "ล่าสมบัติงั้นเหรอคะ? รอบนี้จะเป็นอะไรอีกล่ะคะ?"
13210-97 = "อื้อ! ใช่แล้ว ดูนี่สิ!"
13210-101 = "โฮชิโนะจัง มันยอดเยี่ยมมากเลยนะ!"
13210-102 = "รุ่นพี่ก็พูดอย่างนั้นทุกครั้ง แต่ทุกครั้งก็ไม่เจออะไรเลยนี่คะ... ตอนนี้ฉันไม่เชื่อแล้วละค่ะ"
13210-103 = "ไม่หรอก ครั้งนี้ฉันมั่นใจนะ! ถึงนี่จะเป็นแค่ข่าวลือในอะบิดอส แต่ก็มีบันทึกอยู่จริงๆ ด้วยนะ!"
13210-104 = "ข่าวลือพวกนั้นก็เป็นข่าวลือที่ไม่มีมูลไม่ใช่เหรอคะ โดนหลอกมาไม่รู้กี่รอบแล้ว..."
13210-105 = "หุบเขาของประธานสภานักเรียน...?"
13210-106 = "อื้อ! ว่ากันว่าประธานสภานักเรียนในสมัยก่อนสร้างหอนิทรรศการเอาไว้เพื่อเป็นอนุสรณ์แก่พวกตัวเอง#nด้วยแหละ!"
13210-107 = "แล้วในนั้นยังมีของแพงๆ จัดแสดงไว้เพียบเลยนะ!"
13210-108 = "ถ้ามันจริงละก็ สมบัติพวกนั้นคงถูกขายไปเกลี้ยงตั้งแต่ตอนที่โรงเรียนเริ่มจะขัดสนแล้วล่ะคะ"
13210-109 = "อื้ม ปกติก็คงเป็นแบบนั้นใช่มั้ยล่ะ? แต่ปัญหาก็คือ... หุบเขาของประธานสภานักเรียนแห่งนี้สร้างไว้ใน#nพื้นที่ปริศนาที่ไม่มีใครรู้ เพื่อป้องกันไม่ให้คนไม่ดีมาขโมยสมบัติไปยังไงล่ะ"
13210-110 = "ก็เลยมีข่าวลือกันว่าจนถึงตอนนี้ก็ยังไม่มีใครรู้เลยน่ะว่ามันอยู่ที่ไหน!"
13210-112 = "งั้นก็แปลว่า..."
13210-113 = "อื้อ! ที่นั่นอาจจะมีสมบัติราคาแพงที่ไม่เคยมีใครแตะต้องอยู่ก็ได้!"
13210-114 = "ก็เลยจะชวนไปหุบเขาที่ว่าเหรอคะ?"
13210-115 = "อื้อ! ไปล่าสมบัติกันเถอะ! โฮชิโนะจัง!"
13210-116 = "เหลวไหลน่า! ไหนว่าไม่มีใครรู้ตำแหน่งของที่นั่นล่ะคะ? แล้วพวกเราจะไปหาเจอได้ยังไง?"
13210-117 = "ฮุ! ฮุ! ฮุ!"
13210-118 = "ประเด็นอยู่ตรงนี้ละ ฉันค้นเอกสารของสภานักเรียนรุ่นเก่าแล้วเจอสิ่งนี้มาน่ะ"
13210-119 = "ของพวกสภานักเรียนรุ่นเก่าเหรอ?"
13210-123 = "กระดาษนี่มันอะไรกันคะ? ทาสีดำไว้ทั้งแผ่นจนไม่รู้ว่าเขียนไว้ว่าอะไรเลย"
13210-124 = "เหมือนพยายามจะซ่อนอะไรบางอย่างไว้เลยใช่มั้ยล่ะ... ลองดูตรงนี้สิ"
13210-125 = "ที่อยู่เหรอคะ...? <พื้นที่ปิด ทะเลทรายอะบิดอส เขต 35-9>...?"
13210-126 = "อื้อ! ฉันไม่รู้ว่านี่คืออะไร แต่มันก็เป็นเบาะแสที่ชัดเจนเลยนะ! การล่าสมบัติครั้งนี้จะต้องไม่เหมือนทุกๆ ครั้งที่ผ่านมาอย่างแน่นอน!"
13210-130 = "เฮ้อ... รุ่นพี่ยูเมะ เชื่อเขาเลย"
13210-131 = "ถะ... ถึงมันจะเป็นแค่ที่อยู่... แต่ก็..."
13210-132 = "ต้องให้ฉันพูดคำเดิมๆ ซ้ำๆ อีกกี่รอบคะ...?"
13210-133 = "อ่า... กะ... ก็..."
13210-138 = "นี่ไม่ใช่เวลาจะมามัวยืนเฉยอยู่แบบนี้นะคะ! เราต้องรีบไปที่นั่นกันเลยสิ!! จะมาเสียเวลาแค่วินาทีเดียว#nก็ไม่ได้ค่ะ!"
13210-139 = "อื้อ! ไปตามล่าหาสมบัติกันเลย!"
13210-141 = "แหะๆ~ รอบนี้ฉันรู้สึกดีมากค่ะ! เหมือนว่าจะมีสมบัติรอเราอยู่จริงๆ เลย!"
13210-146 = "ฮะ... โฮชิโนะจัง! รอด้วยสิ... ปะ... เปลี่ยนชุดก่อน...!"
13210-149 = "อ่า...!?"
13210-160 = "รุ่นพี่ยูเมะ ทางนี้ไม่มีอะไรเลยค่ะ"
13210-161 = "อืม... ตรงนี้ก็ด้วย... เราคว้าน้ำเหลวแล้วละ ฮือ..."
13210-165 = "..."
13210-169 = "พื้นที่ปิด ทะเลทรายอะบิดอส เขต 35-9"
13210-171 = "ที่นี่... ยังไม่เปลี่ยนไปเลยสินะ"
13210-174 = "เป็น... ความยึดติดหรือเปล่าคะ?"
13210-175 = "ยึดติดงั้นเหรอ?"
13210-176 = "ไม่ใช่แค่กับฉันหรือรุ่นพี่โฮชิโนะเท่านั้นนะคะ... บางทีอาจจะเป็นกับทุกคนที่อยู่ที่นี่เลย..."
13210-177 = "ทั้งกองทุนไพรเวทอิควิตี้ เนฟธิส แล้วก็ประธานใหญ่ของไคเซอร์ด้วย... เหมือนกับว่าทุกคนเป็นผีเสื้อ#nกลางคืนที่โดนล่อด้วยแสงสว่างจนบินมาให้ตัวเองถูกแผดเผา... เพราะความยึดติดบางอย่าง..."
13210-178 = "อืม..."
13210-179 = "[s] \"ยึดติด... ความยึดติดงั้นเหรอ\""
13210-180 = "อืม แต่บทสรุปของเรายังคงไม่เปลี่ยนแปลง เราต้องขวางรุ่นพี่โฮชิโนะให้ได้"
13210-182 = "ใช่ค่ะ ถ้าทำลายปืนแม่เหล็กไฟฟ้า ทางไคเซอร์ต้องกดดันให้ชดใช้ค่าเสียหายจำนวนมหาศาลแน่ๆ"
13210-183 = "แต่ถ้าเราปล่อยไคเซอร์ไว้อย่างนี้ ปืนแม่เหล็กไฟฟ้าก็จะไปอยู่ในมือของพวกนั้นแทน"
13210-184 = "เพราะงั้นเราต้องหาวิธีค่ะ"
13210-185 = "ค่ะ ที่สำคัญที่สุดคือเราต้องขัดขวางการกระทำที่ไม่ยั้งคิดของรุ่นพี่โฮชิโนะ จากนี้ไปฉันก็จะไม่ลังเล#nแล้วค่ะ!"
13210-187 = "แต่ถ้าเป็นแบบนี้ต่อไป ผลลัพธ์ก็จะเหมือนเดิมอีกนะ? เราไม่มีทางเอาชนะรุ่นพี่โฮชิโนะได้หรอก"
13210-188 = "อะ... อืม..."
13210-189 = "คุณครู? พอจะขอความช่วยเหลือจากใครได้บ้างมั้ย?"
13210-190 = "ถ้าเป็นไปได้ ขอเป็นคนเก่งๆ ที่สามารถเป็นคู่ต่อสู้ของรุ่นพี่โฮชิโนะได้..."
13210-191 = "[s] \"อืม...\""
13210-193 = "ไม่ค่ะ... นั่นไม่ใช่การแก้ปัญหาที่ถูกจุดค่ะ"
13210-194 = "เพราะถ้าการกระทำของรุ่นพี่โฮชิโนะมาจากประธานยูเมะ... งั้นนี่ก็ไม่ใช่ปัญหาที่จะแก้ไขได้ด้วยการ#nใช้กำลังเอาชนะรุ่นพี่โฮชิโนะค่ะ"
13210-195 = "นี่คือการต่อสู้ของอะบิดอสที่คนนอกเข้ามาแทรกแซงไม่ได้... พวกเราต้องจัดการกันเองค่ะ"
13210-197 = "งั้นก็สรุปได้แล้วสิ! สุดท้ายพวกเราก็ต้องทำกันเองไง!"
13210-198 = "อืม แล้วเราก็ได้ข้อสรุปอีกครั้งว่า"

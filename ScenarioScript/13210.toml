[translation]
13210-1 = "第21話;第二次追擊"
13210-2 = "大家都沒事吧？"
13210-3 = "謝，謝謝……多虧你們才能得救……"
13210-5 = "我已經無能為力……就先回去了。"
13210-6 = "我也是……居然對阿拜多斯動手……我真是瘋了……"
13210-8 = "真是損失慘重……"
13210-9 = "就是說啊……一開始就不該插手這件事的……"
13210-11 = "這是明智的決定。#n總裁把凱薩集團的所有兵力召集到這裡了。今晚第1批兵力就會進入自治區。"
13210-12 = "阿拜多斯自治區很快就會變為戰場。請在那之前快逃吧。"
13210-13 = "知，知道了……"
13210-16 = "大小姐……"
13210-17 = "管家，你沒事吧……？"
13210-18 = "我，我都做了什麼……"
13210-19 = "嗯，你闖下大禍了。#n現在阿拜多斯將會成為戰場。"
13210-20 = "這並不是……我想看見的……"
13210-21 = "……我明白，管家。"
13210-22 = "……大小姐？"
13210-23 = "沒錯。管家的目標……其實和對策委員會是一樣的對吧？#n奈芙蒂斯和阿拜多斯的復興……重新找回過去的繁榮……"
13210-24 = "……"
13210-25 = "然而最終卻得到了這樣的結果……請看看那邊的「私募基金」。"
13210-26 = "……我明白您的意思。#n不過……"
13210-27 = "自從得知列車砲存在的那一刻起，我就變得無法自拔……"
13210-28 = "滿腦子想的都是列車砲……#n只要有了它，只要有了它……"
13210-29 = "其實就連現在也一樣。#n只要有了它，奈芙蒂斯……就能回到阿拜多斯……"
13210-30 = "嗯，但那是絕對不可能的吧～♧ "
13210-31 = "……"
13210-32 = "那麼還請保重，管家。"
13210-33 = "您，您要去哪裡？大小姐？"
13210-34 = "我要去阻止星野前輩。"
13210-35 = "必須阻止前輩因為破壞列車砲而被退學。"
13210-36 = "但，但是該怎麼做……？"
13210-37 = "……總得想辦法吧。"
13210-41 = "……"
13210-43 = "……又沒能阻止星野前輩了。#n都怪我實力不足……"
13210-44 = "怎麼又在說那種話？#n那不是白子前輩的錯，是星野前輩太強了。"
13210-45 = "……打起精神來，白子醬。"
13210-46 = "嗯……"
13210-47 = "……也許星野前輩從一開始就想這麼做。"
13210-48 = "解救野乃美前輩，透過公證切割自己和對策委員會，並且破壞列車砲……"
13210-49 = "這麼一來，列車砲的損失賠償就不會落到阿拜多斯高中頭上……"
13210-50 = "可是總覺得有點奇怪……我指的是星野前輩的樣子。"
13210-51 = "雖然我也說不太清楚……#n但他就像被某種東西緊緊追趕著一樣……"
13210-52 = "嗯……這明明是需要大家一起思考的問題，他卻對這件事非常抗拒……"
13210-54 = "……感覺和當時很像。"
13210-59 = "星野前輩……好像把破壞列車砲當成了夢前輩的遺願。"
13210-60 = "咦？可是夢會長也沒那麼說過吧？"
13210-61 = "嗯，但星野前輩好像一心認為「如果是夢前輩一定會這麼做」。"
13210-62 = "為什麼……？"
13210-64 = "我也不確定驅使星野前輩的究竟是什麼……"
13210-65 = "但或許……"
13210-74 = "星野醬！尋寶時間到囉！！星野醬！"
13210-75 = "星野……醬……？"
13210-81 = "是，又有什麼事嗎？"
13210-82 = "星野醬……？這，這個打扮是怎麼回事？"
13210-83 = "嗯？啊，這，這是……"
13210-84 = "難道是……因為太喜歡魚，所以想變成真正的魚……？"
13210-88 = "那怎麼可能！"
13210-89 = "是剛才修自來水管道的時候把衣服弄濕了……現在在晾乾啦！"
13210-90 = "這樣啊，你是指運動場壞掉的水管嗎？"
13210-91 = "……雖然試過但還是修不好。#n構造比我想像中還複雜……"
13210-92 = "呵呵呵，原來如此。#n就連星野醬這樣的天才，也有做不到的事啊？"
13210-93 = "你對機器比較不拿手嗎？就像大叔一樣？"
13210-94 = "不說這個了，找我有什麼事嗎？前輩。"
13210-95 = "尋寶？這次又想做什麼？"
13210-97 = "嗯！沒錯，你看這個！"
13210-101 = "星野醬，這次可是很不得了的東西哦！"
13210-102 = "你每次都這麼說，結果卻總是令人失望……我已經不相信你了。"
13210-103 = "沒有啦，這次我很確定！#n雖然是阿拜多斯流傳的傳聞，可是實際上是有紀錄的！"
13210-104 = "那些紀錄還不都是空穴來風。#n我們已經被騙很多次了…… "
13210-105 = "學生會之谷……？"
13210-106 = "嗯！聽說那裡有過去阿拜多斯的學生會長，為了紀念自己的強大而建造的展示館！"
13210-107 = "好像還陳列著很多貴重的東西哦！"
13210-108 = "就算這是真的，那些寶物也早就在學校面臨困難的時候賣掉了吧。"
13210-109 = "嗯，一般都會這麼想對吧？#n但其實……為了防範覬覦寶物的壞人，它被建設在沒有人知道的地方。"
13210-110 = "沒有任何人知道它究竟在哪裡哦！"
13210-112 = "也就是說……"
13210-113 = "嗯！說不定那裡還有很多沒人碰過的昂貴寶物！"
13210-114 = "……所以要我一起去那裡尋寶嗎？"
13210-115 = "嗯！去尋寶吧！星野醬！"
13210-116 = "這也太莫名其妙了吧！#n不是說誰都不知道嗎？那到底要怎麼去啊？"
13210-117 = "哼！哼！哼！"
13210-118 = "我要切入正題囉。#n之前我翻找學生會文件的時候發現了這個。"
13210-119 = "是之前的學生會留下來的？"
13210-123 = "……這張紙是什麼？#n到處都被塗得黑漆漆的，根本不知道上面寫什麼。"
13210-124 = "可能是想隱藏什麼吧……不過你看這邊。"
13210-125 = "……是地址嗎？#n「阿拜多斯沙漠封鎖區35-9」……？"
13210-126 = "嗯！雖然不知道這裡是什麼地方，但是有明確的線索！跟以往的尋寶完全不同！"
13210-130 = "唉……夢前輩，我真是受不了你。"
13210-131 = "當，當然是只有地址沒錯……可是……"
13210-132 = "到底要我重複幾次一樣的話啊……？"
13210-133 = "那個……所，所以說……"
13210-138 = "現在不是說這些的時候了！馬上出發去找吧！！一分一秒都不能浪費！"
13210-139 = "嗯！出發！"
13210-141 = "唔嘿～這次感覺有希望哦！真正的寶物就在等著我們！"
13210-146 = "星，星野醬？等等，先換一下衣服……！"
13210-149 = "啊……！？"
13210-160 = "夢前輩，這裡什麼都沒有。"
13210-161 = "……這裡也沒有呢。#n我又失敗了，嗚嗚嗚。"
13210-165 = "……"
13210-169 = "阿拜多斯沙漠封鎖區35-9"
13210-171 = "這裡……一點都沒變呢。"
13210-174 = "……或許是執著吧。"
13210-175 = "執著？"
13210-176 = "不只是星野前輩和我們……也許聚集在這裡的所有人……"
13210-177 = "包含私募基金、奈芙蒂斯、凱薩總裁在內……#n就像被光吸引而自取滅亡的飛蛾……一樣的執著……"
13210-178 = "唔嗯……"
13210-179 = "[s]「執著……執著啊。」"
13210-180 = "嗯，不過我們的結論沒有變。必須阻止星野前輩。"
13210-182 = "沒錯，一旦列車砲遭到破壞，凱薩就會要求鉅額的賠償金。"
13210-183 = "但如果就這麼放任不管，列車砲將會落入凱薩手中。"
13210-184 = "所以必須找出方法才行。"
13210-185 = "最重要的是必須阻止星野前輩繼續胡鬧下去。#n我不會再猶豫了！"
13210-187 = "但是就算追過去也只會重蹈現在的覆轍吧？#n想對付星野前輩幾乎是不可能的。"
13210-188 = "唔嗯……"
13210-189 = "老師？有可以求助的人嗎？"
13210-190 = "既然要求助，最好去找強大到能對付星野前輩的人……"
13210-191 = "[s]「這個嘛……」"
13210-193 = "不……那不是根本的解決之道。"
13210-194 = "如果星野前輩是因為夢會長才做出那種行動……#n那麽物理壓制星野前輩也無法解決問題。"
13210-195 = "這是外人無法介入的阿拜多斯之戰……現在的局面就是如此……"
13210-197 = "所以也只能放手一搏了吧！"
13210-198 = "嗯，結論還是一樣。"
13210-199 = "那我們馬上開始追擊星野前輩吧！前往學生會之谷！"
13210-200 = "話是這麼說……有人知道學生會之谷在哪裡嗎？"
13210-205 = "唔嗯……"
13210-206 = "星野前輩好像知道怎麼去……"
13210-208 = "我知道在哪裡。"
13210-209 = "嗯……？"
13210-210 = "管家？"
13210-216 = "管家！？你知道學生會之谷在哪裡嗎？"
13210-217 = "「阿拜多斯沙漠封鎖區35-9」……總裁確實那麼說過。"
13210-218 = "那裡離這裡480km以上，是阿拜多斯沙漠中最荒涼的岩石溪谷地帶。"
13210-223 = "很久以前封鎖起來的沙漠橫貫鐵路站，應該就在那裡沒錯。"
13210-226 = "……門竟然沒上鎖？"
13210-237 = "連管制系統都開著……？"
13210-238 = "我還以為是壞掉的廢鐵呢……"
13210-242 = "奈芙蒂斯管理者admin確認。#n「十六夜野乃美」……"
13210-243 = "原來如此。#n並不是系統故障，而是必須用奈芙蒂斯的卡片連接啊……"
13210-244 = "一直以來……就是透過這種方式隱藏……"
13210-245 = "目的地……#n學生會之谷……應該就是這個吧。"
13210-246 = "不久前還有一輛開往溪谷的火車……應該是那個眼罩醬吧？"
13210-247 = "我看看……火車的啟動方式是……"
13210-257 = "……"
13210-259 = "雖然表面上只是被封鎖的普通車站……#n其實那裡是隱藏連接「學生會之谷」祕密通道的交匯站。"
13210-260 = "應該是「阿拜多斯學生會」用奈芙蒂斯的技術建設的地方。"
13210-261 = "只要在那裡啟動大小姐的認證，#n應該就能解除通往「學生會之谷」的隱藏路線。"
13210-262 = "也，也就是說……"
13210-263 = "管家……"
13210-269 = "[ns]「謝謝你幫忙，管家。」"
13210-270 = "……別這麼說。"
13210-271 = "真的很抱歉……大小姐。"
13210-272 = "……管家。"
13210-273 = "請抓緊時間吧。蘇芳同學和星野同學應該都往那邊去了。"
13210-274 = "是的……"
13210-275 = "話說回來……蘇芳同學到底是什麼人呢？"
13210-276 = "起初我以為他和高地人鐵道學園站在同一陣線，結果他是奈芙蒂斯的人……#n後來又覺得他好像站在「私募基金」那邊，但其實他又出自凱薩PMC……#n而且後來又……"
13210-277 = "他是抱著怎樣的想法，把星野前輩叫到那裡的呢？"
13210-281 = "朝霧蘇芳原本沒有所屬學園，是名四處流浪的太妹。"
13210-282 = "後來奈芙蒂斯偶然注意到他，#n於是就讓他進入高地人鐵道學園，準備擔任大小姐的保鑣。"
13210-283 = "我的保鑣……？"
13210-284 = "是的，不過大小姐的入學被取消後，那項任務自然也不了了之。#n後來我們也沒指派新的任務，就這樣忘了他的存在……"
13210-285 = "不知不覺間，他已經坐上監察室高層監察官的位置了。"
13210-286 = "直到「私募基金」事件發生之後，我才再次和他接觸。"
13210-291 = "因此我現在也不太瞭解蘇芳……#n既不知道他的真實身分，也不清楚他的目的是什麼……"
13210-292 = "只要前往學生會之谷，應該就能知道答案了吧……"
13210-293 = "但是如果想追上先行出發的他們，必須要有速度超快的高鐵……"
13210-295 = "咦？高，高鐵……？"
13210-296 = "那種東西該怎麼……"
13210-302 = "噗哈哈哈哈哈！需要幫忙嗎？"
13210-311 = "英雄～登～場～"
13210-313 = "啊，你們是……！"
13210-315 = "不小心被我聽到囉～你們需要高鐵對吧？"
13210-316 = "那，那個……我們很瞭解沙漠橫貫鐵路的路線。#n而且也欠了你們人情……"
13210-317 = "就是這樣！沙漠橫貫鐵路和我們也不是沒關係！"
13210-318 = "沒錯～我們是受害者～無緣無故就被攻擊了～"
13210-319 = "我們帶你們過去吧！"
13210-321 = "還以為你們是一群傻瓜，原來還是懂得知恩圖報的嘛！"
13210-322 = "嗯嗯♧謝謝你們！高地人鐵道學園的各位！"
13210-323 = "嗯，麻煩了。"
13210-325 = "唔哦～展現我們的超～速實力～列車甩尾～"
13210-326 = "噗哈哈哈哈！光，那招很危險，還是封印起來吧。"
13210-328 = "應，應該沒問題吧？#n我指的是安全方面……"
13210-334 = "[ns]「謝謝你們，CCC。我會記住這份人情的。」"
13210-335 = "很好，趕快做好準備吧！！"
13210-343 = "好，準備完畢！"
13210-344 = "準備～超速～"
13210-346 = "可以上車了嗎？"
13210-347 = "請，請等一下？你手上的燃料桶是什麼？"
13210-348 = "嗯～聯胺～"
13210-349 = "咦咦！？那不是火箭用的推進劑嗎？！太危險了吧！？"
13210-350 = "最，最近的火車也會用那種東西嗎？"
13210-351 = "噗哈哈哈哈！是為了以防萬一才準備的。"
13210-352 = "應該沒機會用到啦……大概。"
13210-353 = "也許吧～"
13210-354 = "真，真的不會有事吧？#n那可是劇毒化合物，記得要小心輕放……"
13210-356 = "以後再擔心吧，綾音醬。總會有辦法的。"
13210-357 = "嗯，不會有問題的。"
13210-359 = "我們會盡快帶你們到交匯站去。快上車吧！"
13210-364 = "呼……我知道了。"
13210-365 = "那麼兩位幹部，請保重……"
13210-367 = "嗯，我們馬上回來。#n你就好好躲著吧～噗哈哈哈！"
13210-368 = "出發～"
13210-376 = "隨便坐就行了嗎……"
13210-377 = "哇～♧請看這個！有安全帶！"
13210-378 = "什麼！？最近火車座位都有安全帶的嗎？#n為什麼需要安全帶啊？"
13210-380 = "雲霄飛車也有啊，沒什麼好奇怪的吧？"
13210-385 = "嗯嗯！感覺就像在搭遊樂設施！！"
13210-391 = "好，大家都上車了嗎？"
13210-392 = "[s]「嗯，我們出發吧。」"
13210-393 = "走囉～出發～"
13210-401 = "呀啊啊！？"
13210-403 = "哦哦～好猛的加速～"
13210-404 = "光，這速度是正常的嗎？"
13210-405 = "不知道～我第一次開～"
13210-406 = "噗哈哈哈哈哈！不過還挺不錯的吧？"
13210-413 = "哦～好像糟了～"
13210-414 = "凱薩PMC在後面追擊～從空中攻擊火車～"
13210-415 = "什麼！？"
13210-416 = "……糟糕！他們盯上前方的引擎了！必須阻止他們！"
13210-418 = "知道了。包在我們身上。"
13210-419 = "[s]「現在輪到我們表現了。」"
13210-420 = "……是！阻止他們吧！"

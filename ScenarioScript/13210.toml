[translation]
13210-1 = "Episode 21;Second Pursuit"
13210-2 = "Is everyone okay?"
13210-3 = "Th-Thank you... You saved us..."
13210-5 = "I-I can't do this anymore... I'm going home. "
13210-6 = "Me too... I can't believe I tried to get my hands on Abydos... I must've lost my mind..."
13210-8 = "The damages we suffered are immeasurable..."
13210-9 = "Yeah... I never should have gotten involved with a scheme like this..."
13210-11 = "Yes, you're making the right decision. The president has summoned all of Kaiser Group's forces here. The first wave will enter the district tonight."
13210-12 = "The Abydos district will become a battlefield. Before that happens, please evacuate."
13210-13 = "U-Understood..."
13210-16 = "Miss..."
13210-17 = "Are you okay, Butler?"
13210-18 = "...Wh-What have I done...?"
13210-19 = "Abydos is going to become a battlefield because of your actions. You've done something terrible."
13210-20 = "...I didn't...want this..."
13210-21 = "...I know, Butler."
13210-22 = "...You know?"
13210-23 = "Yes, you want the same thing...as the Foreclosure Task Force. The revival of Nephthys and Abydos... To restore its past prosperity..."
13210-24 = "..."
13210-25 = "But in the end, this was the result. Look around you, at your private equity fund."
13210-26 = "...I know. But..."
13210-27 = "I just couldn't turn back, once I learned of the Train Cannon's existence."
13210-28 = "I couldn't stop thinking about it. About how if we just had that, if only..."
13210-29 = "To be honest, I still feel that way. If only we had it, then Nephthys and Abydos could return to..."
13210-30 = "Yeah, but that's too much to ask for. ♧ "
13210-31 = "..."
13210-32 = "Take care, Butler."
13210-33 = "Wh-Where are you going? Miss?"
13210-34 = "I'm going to stop Hoshino."
13210-35 = "I'm going to stop her from destroying the Train Cannon and dropping out of school."
13210-36 = "B-But how...? "
13210-37 = "...Well. One way or another."
13210-41 = "..."
13210-43 = "...I couldn't stop Hoshino again. I'm just so weak..."
13210-44 = "Are you still talking about that? Like we said, it's not your fault, Shiroko. Hoshino's just too strong."
13210-45 = "...Cheer up, Shiroko."
13210-46 = "Yeah..."
13210-47 = "Yes... I think this was Hoshino's plan from the beginning. "
13210-48 = "Rescue Nonomi, separate herself from the Foreclosure Task Force, and then destroy the Train Cannon..."
13210-49 = "Then Abydos wouldn't be held responsible... "
13210-50 = "Yeah... You know, there was just something off about Hoshino. "
13210-51 = "How do I say this...? It's like she's being chased by something only she can see."
13210-52 = "Yeah... It's not that she doesn't think we can solve this together... She's just refusing to."
13210-54 = "It feels like that time..."
13210-59 = "I think Hoshino...above all, she thinks that Yume would have wanted her to destroy the Train Cannon."
13210-60 = "What? But she never told Hoshino that, right? "
13210-61 = "Yeah. But I think Hoshino's fixated on the thought that President Yume would've wanted that."
13210-62 = "Why...? "
13210-64 = "I'm not sure. I don't exactly understand what's pushing Hoshino so hard... "
13210-65 = "But, it's probably..."
13210-74 = "Hoshino! It's a treasure hunt! "
13210-75 = "Hoshino...?"
13210-81 = "What? What now?"
13210-82 = "Why're you dressed like that, Hoshino...? "
13210-83 = "Huh? Oh, this..."
13210-84 = "Um... Are you trying to become a real fish, because you like them so much...?"
13210-88 = "What kinda ridiculous question is that? Of course not!"
13210-89 = "I got my clothes wet when I was trying to repair the pipes! I'm just wearing this while they dry out!"
13210-90 = "Heehee, the broken faucets on the field? You fixed them?"
13210-91 = "I gave it a shot, but it didn't work... It's more complicated of a job than I expected... "
13210-92 = "Heehee, I guess there are things even a genius like you can't do."
13210-93 = "Are mechanical things difficult for you too, like they are for me?"
13210-94 = "Forget that. What were you saying, Yume?"
13210-95 = "What's this treasure hunt stuff?"
13210-97 = "Just what you said! A treasure hunt! Take a look at this!"
13210-101 = "It's really amazing, Hoshino. "
13210-102 = "You say that every time, but...I don't believe you anymore."
13210-103 = "No, this time, it's for real! It's technically a rumor that's been floating around Abydos, but I found actual records!"
13210-104 = "You've \"found records\" for rumors before. Fool me once... "
13210-105 = "Valley of Student Council Presidents...?"
13210-106 = "Yes! They say that the previous Abydos student council presidents built an exhibition hall to commemorate their strength!"
13210-107 = "It's supposedly filled with a bunch of really valuable items!"
13210-108 = "If that were true, the school would've sold off everything worth anything when our financial problems started."
13210-109 = "Yes, that's what you'd think, right? But this Valley of Student Council Presidents was constructed in a secret location, to protect it from thieves."
13210-110 = "Even now, no one knows where it is! "
13210-112 = "That means..."
13210-113 = "Yes! It's completely possible that it's filled to the brim with tons of priceless treasures!"
13210-114 = "...And you want to go find it? "
13210-115 = "Exactly! It's a treasure hunt, Hoshino!"
13210-116 = "That obviously makes no sense! If no one knows where it is, how are we going to find it?"
13210-117 = "Heeheehee! "
13210-118 = "Okay, so, this is where things get interesting! I found this while I was going through some old student council documents."
13210-119 = "From the members of the previous student council? "
13210-123 = "...What am I looking at? The page's all blacked-out, so I can't read what it says."
13210-124 = "I think they were trying to hide something...but look right here!"
13210-125 = "...Is that an address? Abydos Desert Restricted District Sector 35-9...?"
13210-126 = "Yes! I don't know exactly where it is, but we have a clue! Which makes this totally different from our other hunts!"
13210-130 = "*sigh* ...Seriously, Yume?"
13210-131 = "I-I know it's only an address, but...still..."
13210-132 = "How many times are you gonna make me repeat myself...?"
13210-133 = "Um... W-Well, but..."
13210-138 = "This is no time to be standing around! We need to head there right now! Every second counts!"
13210-139 = "Yes! It's time for a treasure hunt!"
13210-141 = "Heehee. I have a good feeling this time. I think we're gonna find some real treasures!"
13210-146 = "H-Hoshino? Wait, you need to change first!"
13210-149 = "Ah...?!"
13210-160 = "There's nothing here, Yume."
13210-161 = "*sigh* No luck here, either? Waaah, another failure! "
13210-165 = "..."
13210-169 = "Abydos Desert, Restricted District Sector 35-9"
13210-171 = "This place...hasn't changed at all."
13210-174 = "...Is this an obsession?"
13210-175 = "An obsession? "
13210-176 = "Not only for Hoshino and me...but for everyone involved with this..."
13210-177 = "The private equity fund, Nephthys, even the Kaiser president... Like moths drawn to fire... This obsession..."
13210-178 = "Hm..."
13210-179 = "[s] \"Obsession... Obsession, you say.\""
13210-180 = "Regardless, our mission hasn't changed. We have to stop Hoshino."
13210-182 = "You're right. If we destroy the Train Cannon, Kaiser will heap an exorbitant amount of debt on us."
13210-183 = "But if we leave Kaiser be, they'll come into possession of the Train Cannon."
13210-184 = "We need to find some kind of solution. "
13210-185 = "Yes. Stopping Hoshino's reckless behavior should be our top priority right now! There's no room for me to hesitate anymore!"
13210-187 = "Aren't things just going to keep ending up the same way? Beating Hoshino is just impossible."
13210-188 = "Hm..."
13210-189 = "Sensei, is there anyone who can help us? "
13210-190 = "Someone strong enough to take on Hoshino..."
13210-191 = "[s] \"Hm...\""
13210-193 = "No... That's not a solution either."
13210-194 = "If the motivation behind Hoshino's actions is related to Yume...physically stopping her won't solve the problem."
13210-195 = "This is Abydos High School's fight. Outsiders won't be able to help us this time."
13210-197 = "I guess that's our answer then. This is something we have to do, right? "
13210-198 = "Yeah. That's the only way."
13210-199 = "Then what are we waiting for? We have to go after Hoshino! To the Valley of Student Council Presidents!"
13210-200 = "But...does anyone know how to get there?"
13210-205 = "Hm... "
13210-206 = "I think Hoshino knew where it was..."
13210-208 = "I know. "
13210-209 = "Huh...?"
13210-210 = "Butler?"
13210-216 = "Butler?! You know where the Valley of Student Council Presidents is?"
13210-217 = "Abydos Desert Restricted District Sector 35-9...that's what the President said."
13210-218 = "That's one of the most desolate rocky valley areas of the Abydos Desert, 480 kilometers from here."
13210-223 = "I believe there is a long-abandoned Trans-Desert Railway station at that address."
13210-226 = "...Is the door over there open?"
13210-237 = "...The control system...is on?"
13210-238 = "I thought everything here was broken-down scraps at this point. "
13210-242 = "Nephthys administrator confirmed. Izayoi Nonomi... "
13210-243 = "I see. It wasn't broken. It just needed to be accessed using a Nephthys card..."
13210-244 = "So that's how they hid it all these years."
13210-245 = "...The destination isn't Great Oasis Station. It must be the Valley of Student Council Presidents..."
13210-246 = "And there's another train that just left for the valley... That must be Eyepatch."
13210-247 = "Let's see here... To operate the train... "
13210-257 = "..."
13210-259 = "It may look like an abandoned station on the surface...but it's actually a junction station with a hidden passage. It leads to the Valley of Student Council Presidents."
13210-260 = "The Abydos Student Council must have used Nephthys technology to construct it."
13210-261 = "If you activate Nonomi's authentication there, the hidden route will unlock. "
13210-262 = "Um... Th-That means..."
13210-263 = "Butler... "
13210-269 = "[ns] \"Thank you for helping us, Butler.\""
13210-270 = "...No. You shouldn't thank me. "
13210-271 = "I'm sorry...Miss."
13210-272 = "...Butler. "
13210-273 = "There's no time to waste. You must hurry. Suou and Hoshino are already en route."
13210-274 = "Okay..."
13210-275 = "But...who exactly is Suou? "
13210-276 = "...At first, I thought she was a Highlander student, but then she was actually under Nephthys, and then she seemed to side with the private equity fund, but then she was actually a part of Kaiser PMC... And now..."
13210-277 = "Why does she want Hoshino to go the Valley of Student Council Presidents?"
13210-281 = "Asagiri Suou was originally a delinquent we found wandering about, with no affiliation to any academy."
13210-282 = "After she caught Nephthys' attention, we admitted her to Highlander to serve as your bodyguard."
13210-283 = "My bodyguard...?"
13210-284 = "Yes, but after you withdrew your admission, the role was useless. We had completely forgotten about her."
13210-285 = "But at some point, we realized she had worked her way up as a high-ranking overseer at the Audit Office."
13210-286 = "That's why we approached her again, when the private equity fund incident occurred."
13210-291 = "At this point, it appears I know very little of Suou myself... What her true identity or objective really are... I couldn't say."
13210-292 = "I guess we'll find out when we get to the Valley..."
13210-293 = "However, at this point, the only way you'll catch up to them is with an incredibly fast bullet train."
13210-295 = "What? A b-bullet train...?"
13210-296 = "How could we possibly procure a—"
13210-302 = "Pahyahyahya! You need some help? "
13210-311 = "Your heroes! Are! Here!"
13210-313 = "Ah, you guys...!"
13210-315 = "We totally accidentally eavesdropped. You need a bullet train?"
13210-316 = "Wh-When it...comes to the Trans-Desert Railway, no one knows the route better, and we do owe you a favor..."
13210-317 = "I'm trying to say! We've got some skin in the game when it comes to the Trans-Desert Railway! "
13210-318 = "Mhm. Yuppies. They attacked us, just because. We're victims. "
13210-319 = "So we'll get you there safe and sound! All aboard!"
13210-321 = "I thought you were a bunch of dummies, but at least you know how to show gratitude!"
13210-322 = "Yes, yes. Thank you, Highlander Academy! ♧"
13210-323 = "We'll count on you."
13210-325 = "Wowie! Bear witness to our super speed! Train drift time!"
13210-326 = "Pahyahyahya! That one's too dangerous for these normies, Hikari."
13210-328 = "W-We'll be okay, right? Safety-wise..."
13210-334 = "[ns] \"Thank you, CCC. We owe you one.\""
13210-335 = "All right! We'll get everything ready!"
13210-343 = "Preparations completed! "
13210-344 = "Speedy time."
13210-346 = "Can we board now?"
13210-347 = "H-Hold on a minute. What's that fuel tank you are holding?"
13210-348 = "It's...hydrazine. "
13210-349 = "What?! That's a rocket booster! Isn't it dangerous?!"
13210-350 = "D-Do trains these days use that for fuel?"
13210-351 = "Pahyahyahya! Nooo, I just brought it, in case of emergency!"
13210-352 = "We're not gonna need it! ...Probably."
13210-353 = "Probably..."
13210-354 = "A-Are you sure about this? You know, that's highly toxic, not to mention incredibly volatile... "
13210-356 = "Let's worry about it later, Ayane. I'm sure it'll be fine."
13210-357 = "Yeah. Nothing'll happen."
13210-359 = "We'll get you to the junction station lickety-split! So hurry up and get on! "
13210-364 = "*sigh*...I-If you say so."
13210-365 = "Please take care of yourselves, officers... "
13210-367 = "Okay, we'll be back before you know it, so lay low for a while! Pahyahyahya!"
13210-368 = "Go, go! "
13210-376 = "I guess we have our pick of seats..."
13210-377 = "Wow! Look at this! There are seat belts! ♧"
13210-378 = "What?! Do trains have seat belts these days? B-But why? Is there a reason?"
13210-380 = "Well, roller coasters have seat belts too, so I guess it's not all that weird, right? "
13210-385 = "Yup, yup! It's like we're at an amusement park!"
13210-391 = "Okie dokie, everyone on board? "
13210-392 = "[s] \"Yes, let's get going.\" "
13210-393 = "Here! We! Go!"
13210-401 = "Aaaah!"
13210-403 = "Whoa! Intense G-force! "
13210-404 = "So, uh, is this the normal speed, Hikari?"
13210-405 = "Who knows? I don't. Since it's my first time too!"
13210-406 = "Pahyahyahyahya! I like it!"
13210-413 = "Uh oh. Trouble incoming."
13210-414 = "Kaiser PMC is chasing us. On top of the train. It's an aerial assault. Right now!"
13210-415 = "What?!"
13210-416 = "Yikes! They're targeting the lead engine car! Someone's gotta stop them!"
13210-418 = "Okay, just leave it to us."
13210-419 = "[s] \"I think that's our cue.\""
13210-420 = "...Yes! We'll fight them off!"

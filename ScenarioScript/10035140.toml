[translation]
10035140-1 = "後日談;河駒風良舞的祕密假期（１）"
10035140-4 = "這次的自動販賣機還不錯嘛。嘻嘻。"
10035140-5 = "拆解廢棄的販賣機找硬幣……"
10035140-6 = "竟然能想出這種賺錢的法子，隊長果然很聰明呢！"
10035140-11 = "啊哈哈哈！"
10035140-12 = "畢竟我可是被稱為「頭盔團的智囊」啊。"
10035140-13 = "話說今天的收穫如何？"
10035140-18 = "拆了26台販賣機……"
10035140-19 = "總共賺了530元。"
10035140-25 = "未免也太少了吧？"
10035140-27 = "畢竟是廢棄的販賣機嘛。"
10035140-28 = "那些運行中的販賣機是黑市企業的財產，可不能隨便亂動呢。"
10035140-33 = "要是再這樣下去，原定的暑假計畫就得大幅縮水了，可惡！"
10035140-35 = "怎麼辦才好……"
10035140-42 = "MomoTalk？應該沒有人會聯絡我才對啊。"
10035140-46 = "是沒見過的號碼……#n頭盔團總部？有那種東西嗎？"
10035140-47 = "雖然頭盔團彼此互不隸屬，但規模畢竟還是挺大的，有個總部也不奇怪吧。"
10035140-48 = "這麼說來，我入團的時候好像是有聽過這回事……"
10035140-49 = "總之，先來看看上面寫了什麼吧。"
10035140-55 = "哦哦！？要在海邊舉辦頭盔團聯歡會！？"
10035140-59 = "聯歡會？那是什麼？"
10035140-61 = "就是要集合所有頭盔團的成員到海邊聚會！"
10035140-62 = "不僅有的吃有的玩，甚至還有音樂表演！這不就是派對嗎！"
10035140-63 = "怎麼樣，今年的暑假有這個就夠了吧！"
10035140-68 = "我，我們也能去嗎！？"
10035140-70 = "那還用說！"
10035140-71 = "反正又不用繳參加費，就用我們現有的錢好好享受吧！"
10035140-74 = "好耶！"
10035140-82 = "這，這些泳裝也太貴了吧？"
10035140-83 = "我們的錢不夠買三套吧，隊長？"
10035140-88 = "唔嗯……"
10035140-89 = "沒辦法！買一套輪流穿吧！"
10035140-90 = "其他東西也要控制在預算範圍內！"
10035140-121 = "啊～真痛快！"
10035140-123 = "買的東西雖然不多，但真的好快樂哦，隊長！"
10035140-124 = "雖然幾乎把賺來的錢全花光了……不過頭盔團的派對正等著我們呢！"
10035140-126 = "沒錯沒錯！"
10035140-127 = "我們的夏天現在才要開始！"
10035140-134 = "嗯，新通知？"
10035140-138 = "我看看……"
10035140-143 = "咦，這是什麼意思。"
10035140-145 = "嗯？怎麼了嗎？"
10035140-146 = "隊長？你臉色不太好耶，發生什麼事了嗎……？"
10035140-154 = "……你們看這個。"
10035140-159 = "派對參加者的名單上……"
10035140-160 = "……沒有我們的名字。"
10035140-161 = "所以……我們不能去了嗎？"
10035140-162 = "怎麼這樣……原本還很期待的說……"
10035140-164 = "別開玩笑了！哪有誰能去誰不能去的道理！"
10035140-165 = "你們等著，我這就去抗議……！"
10035140-171 = "……不，就隊長一個人去吧。"
10035140-176 = "什麼？"
10035140-177 = "這也是沒辦法的事。#n頭盔團總部不可能把每個人都列在名單上……"
10035140-178 = "而且隊長也很期待不是嗎？所以你就去吧。"
10035140-179 = "不用擔心我們……"
10035140-180 = "你們……"
10035140-185 = "……好吧。"
10035140-189 = "你們都跟我來。"
10035140-194 = "咦？要去哪裡？"
10035140-196 = "廢話少說，跟我來就對了！"
10035140-200 = "既然都買好泳裝了！現在就去玩水吧！"
10035140-201 = "我不會讓你們的夏天就這樣結束的！"

[translation]
10035140-1 = "ย้อนวันวาน;พักร้อนลับๆ ของโคะมาคาเสะ ราบุ 1"
10035140-4 = "ตู้ขายสินค้าตู้นี้ดีกว่าที่คิดแฮะ ฮิฮิ"
10035140-5 = "รื้อตู้ขายของอัตโนมัติเก่าๆ แล้วเอาเหรียญออกมา..."
10035140-6 = "หัวหน้าคิดโมเดลธุรกิจแบบนี้ได้ยังไงกันคะ หัวดีจริงๆ เลย!"
10035140-11 = "ฮ่าฮ่าฮ่า!"
10035140-12 = "ก็มีแต่ฉันนี่แหละที่ควรได้สมญานามว่าเป็นสมองแห่งแก๊งหมวกกันน็อก"
10035140-13 = "แล้ววันนี้เก็บมาได้เท่าไรน่ะ?"
10035140-18 = "จากตู้ขายของอัตโนมัติ 26 ตู้ที่เรารื้อถอนไป..."
10035140-19 = "ได้มา 530 เยนค่ะ"
10035140-25 = "ทำไมได้แค่นั้นเองล่ะ?"
10035140-27 = "ก็เป็นตู้ที่ถูกทิ้งร้างทั้งหมดเลยนี่คะ"
10035140-28 = "ส่วนตู้ขายสินค้าที่ผู้คนใช้กันอยู่ตอนนี้ก็เป็นของตลาดมืดทั้งหมด เราไปแตะต้องไม่ได้หรอกค่ะ"
10035140-33 = "แบบนี้ฉันก็ต้องพับแผนวันหยุดพักร้อนที่วางไว้น่ะสิ โธ่เอ๊ย!"
10035140-35 = "ไม่นะ..."
10035140-42 = "MOMOTALK เหรอ? ไม่น่ามีใครติดต่อมานะ?"
10035140-46 = "มาจากเบอร์ที่ไม่รู้จักด้วย... แต่ขึ้นว่า สำนักงานใหญ่แก๊งหมวกกันน็อก? มีที่แบบนั้นด้วยเหรอ?"
10035140-47 = "แก๊งหมวกกันน็อกก็มีกันตั้งหลายแก๊งจนรวมกันได้เป็นองค์กรใหญ่ ถ้าเกิดจะมีสำนักงานใหญ่ก็คงไม่#nแปลกหรอกค่ะ"
10035140-48 = "นั่นสินะ ตอนเข้าแก๊งมาใหม่ๆ ก็เหมือนจะได้ยินมาอย่างนั้นเลย..."
10035140-49 = "งั้นคงต้องเช็กดูแล้วละว่าส่งเรื่องอะไรมา"
10035140-55 = "โอ้วว?! มีการจัดสหพันธ์แก๊งหมวกกันน็อกขึ้นที่ชายหาด!!"
10035140-59 = "สหพันธ์แก๊งหมวกกันน็อก? มันคืออะไรเหรอคะ?"
10035140-61 = "เป็นงานรวมแก๊งหมวกกันน็อกทุกแก๊งน่ะ"
10035140-62 = "ในนี้บอกว่าจะมีเลี้ยงสังสรรค์ เปิดเพลง และเล่นสนุกกันที่ชายหาด! นี่มันปาร์ตี้ดีๆ เลยนี่!"
10035140-63 = "งั้นเราก็ไม่ต้องเฉาตายในวันหยุดพักร้อนแล้วสิ!"
10035140-68 = "พะ... พวกเราก็ไปด้วยได้เหรอคะ?!"
10035140-70 = "ได้อยู่แล้ว!"
10035140-71 = "เราไม่ต้องเสียค่าธรรมเนียมสมาชิก งั้นเงินทั้งหมดที่รวบรวมมาก็เอาไปจับจ่ายเพื่อเตรียมตัวเข้าร่วม#nงานในวันนั้นได้เลย!"
10035140-74 = "เย้!"
10035140-82 = "ชะ... ชุดว่ายน้ำแพงจังเลยค่ะ"
10035140-83 = "เงินพวกเราไม่พอซื้อชุดว่ายน้ำ 3 ชุดหรอกค่ะหัวหน้า"
10035140-88 = "อืมม..."
10035140-89 = "งั้นก็ช่วยไม่ได้! ซื้อชุดเดียวแล้ววนกันใส่แล้วกัน!"
10035140-90 = "เตรียมของอย่างอื่นกันด้วยนะ แต่ต้องอยู่ในงบล่ะ!"
10035140-121 = "สนุกจังเลย!"
10035140-123 = "ถึงจะไม่ได้ซื้ออะไรมาก แต่วันนี้ฉันก็สนุกกับการช้อปปิ้งค่ะหัวหน้า!"
10035140-124 = "เราใช้เงินที่มีเกือบจะหมดเลย... แต่ปาร์ตี้แก๊งหมวกกันน็อกก็รอเราอยู่!"
10035140-126 = "ใช่แล้วๆ!"
10035140-127 = "อย่าเพิ่งหมดแรงไปซะก่อนล่ะ ฤดูร้อนของพวกเรามันเพิ่งจะเริ่มต้นขึ้น!"
10035140-134 = "อะไรเนี่ย มีแจ้งเตือนใหม่เหรอ?"
10035140-138 = "ไหนดูซิ..."
10035140-143 = "อะ... อ้าว? หมายความว่ายังไง"
10035140-145 = "หืม? มีอะไรเหรอคะ?"
10035140-146 = "ทำไมสีหน้าไม่ดีเลยล่ะคะหัวหน้า...?"
10035140-154 = "เอาไปดูเองสิ..."
10035140-159 = "รายชื่อผู้เข้าร่วมปาร์ตี้..."
10035140-160 = "ไม่เห็นมีชื่อพวกเราเลย..."
10035140-161 = "อ่า... งั้นแปลว่าพวกฉันไม่ได้รับเชิญเหรอคะ? อดไปเหรอ?"
10035140-162 = "อะไรกัน... ฉันอุตส่าห์ตั้งตารอนะ..."
10035140-164 = "ยะ... อย่ามาตลกน่า! เป็นแก๊งหมวกกันน็อกเหมือนกันแท้ๆ ก็ต้องเชิญไปทั้งแก๊งสิ!"
10035140-165 = "รอก่อนนะ ฉันจะไปคัดค้าน..."
10035140-171 = "ไม่เป็นไรหรอกค่ะ หัวหน้าไปคนเดียวเถอะ"
10035140-176 = "ว่าไงนะ?"
10035140-177 = "ก็ช่วยไม่ได้นี่คะ สำนักงานใหญ่คงไม่มีงบมาดูแลคนที่ไม่ได้อยู่ในรายชื่อหรอกค่ะ..."
10035140-178 = "อีกอย่าง หัวหน้าก็อยากไปไม่แพ้กับพวกเราเลยไม่ใช่เหรอคะ? หัวหน้าไปร่วมงานเถอะค่ะ"
10035140-179 = "ไม่ต้องห่วงพวกฉันหรอก..."
10035140-180 = "พวกเธอ..."
10035140-185 = "ดีละ..."
10035140-189 = "งั้นก็ตามฉันมา"
10035140-194 = "หืม? จะไปไหนเหรอคะ?"
10035140-196 = "ไม่ต้องถามหรอกน่า ตามฉันมา!"
10035140-200 = "ในเมื่อเราก็ซื้อชุดว่ายน้ำกันมาแล้ว! งั้นเราก็จะไปเล่นน้ำกัน!"
10035140-201 = "ฉันไม่ยอมให้พวกเธอหมดสนุกกับฤดูร้อนหรอกนะ!"

[translation]
10035140-1 = "Afterword;Komakaze Rabu's Secret Vacation 1"
10035140-4 = "Ah, another vending machine full of cash to plunder!"
10035140-5 = "Smashing up abandoned vending machines, taking all the coins..."
10035140-6 = "This was a smart business model, Captain!"
10035140-11 = "Hahaha!"
10035140-12 = "Well, I am the brains of the Helmet Gang, we all know that."
10035140-13 = "So how much did we get today?"
10035140-18 = "Let's see, we pulled apart 26 vending machines, and got a total of..."
10035140-19 = "...530 yen."
10035140-25 = "That's...not a lot."
10035140-27 = "Well, they are ABANDONED vending machines, of course."
10035140-28 = "The Black Market owns all the working ones. We can't mess with them."
10035140-33 = "Bah, how are we even going to afford our summer vacation?!"
10035140-35 = "Hmm? What the...?"
10035140-42 = "MomoTalk? I wasn't expecting any calls."
10035140-46 = "I don't know this number... Helmet Gang Headquarters? We have a headquarters?"
10035140-47 = "The Helmet Gang's decentralized, but it's big enough. It probably has a headquarters somewhere."
10035140-48 = "Come to think of it, I kind of remember hearing about it when I first joined up..."
10035140-49 = "Well, in any case, I better see what it says."
10035140-55 = "Oho! There's going to be a Helmet Gangster Grand Alliance at the beach!"
10035140-59 = "Grand Alliance? What's that?"
10035140-61 = "It's a big gathering of everybody in the Helmet Gang! At the beach!"
10035140-62 = "\"There'll be food, games, and music.\" Sounds like a party!"
10035140-63 = "Well, there's our summer vacation!"
10035140-68 = "A-Are we going too?!"
10035140-70 = "Of course!"
10035140-71 = "And it's free for us, so we can just keep all that vending machine money for ourselves!"
10035140-74 = "Woo!"
10035140-82 = "S-Swimsuits are so expensive."
10035140-83 = "Captain, we really can't afford swimsuits for all three of us."
10035140-88 = "Hmm..."
10035140-89 = "All right, we'll buy one and take turns with it!"
10035140-90 = "Let's see what else we can afford!"
10035140-121 = "...Wow, that was fun!"
10035140-123 = "Nice to finally do some shopping, even if we couldn't get everything."
10035140-124 = "We've used up most of the money we saved...but the party is waiting for us!"
10035140-126 = "All right, yeah!"
10035140-127 = "Our summer officially starts right now!"
10035140-134 = "Oh? There's a new notification."
10035140-138 = "Let's see here..."
10035140-143 = "H-Huh? What is this talking about?"
10035140-145 = "What's wrong?"
10035140-146 = "Captain? You don't look so good..."
10035140-154 = "...Take a look at this."
10035140-159 = "The party attendee list..."
10035140-160 = "Your name's on it, Captain, but...not ours."
10035140-161 = "Um... Does that mean we can't go?"
10035140-162 = "...Man, I was looking forward to it..."
10035140-164 = "Whoa, whoa, that doesn't make any sense! How come only CERTAIN people can go?!"
10035140-165 = "Hang on. I'm going to file a complaint..."
10035140-171 = "...It's okay. You should just go by yourself."
10035140-176 = "What?"
10035140-177 = "I mean, what else can we do? I guess they just can't afford to invite everybody."
10035140-178 = "You were looking forward to it as much as we were. So please, just go ahead."
10035140-179 = "Don't worry about us..."
10035140-180 = "You guys..."
10035140-185 = "...Okay."
10035140-189 = "You guys, follow me."
10035140-194 = "Huh? Where are we going?"
10035140-196 = "Just follow me already!"
10035140-200 = "We've bought a swimsuit, and we're all going to use it!"
10035140-201 = "I'm not going to let you guys miss summer!"

21050-33 = "ดะ... เดี๋ยวก่อน!"
21050-34 = "อืม..."
21050-36 = "???"
21050-37 = "คะ... คือว่า... อาริสึ... จัง"
21050-38 = "เห็นด้วย เครื่องกลนี้เรียกว่าอาริสึ"
21050-39 = "การสนทนางั้นเหรอ? อืม... แล้วฉันเรียนการสนทนามาจากไหนกันนะ?#nน่าจะพูดตาม TV ไม่ก็คนรอบข้างนะ"

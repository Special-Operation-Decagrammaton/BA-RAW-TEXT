[translation]
21050-1 = "第5話;我叫愛麗絲"
21050-2 = "千年．遊戲開發部"
21050-4 = "唔嗯，果然還是有點擔心……"
21050-5 = "把這孩子偽裝成我們的社員……真的沒問題嗎？"
21050-6 = "確認「沒問題」的意義……#n推測為「情況不壞並且問題沒有發生的狀態」，給予肯定。"
21050-7 = "……不不，不能肯定吧！用這種方式說話的話肯定會被懷疑的！"
21050-8 = "還是放棄比較好吧！？這招行不通的！"
21050-10 = "沒有現在放棄的選項。我們無論如何都要保住遊戲開發部才行。"
21050-11 = "如果不這樣的話，柚子的容身之地就……也不能讓他回到宿舍去……"
21050-12 = "……"
21050-13 = "這，這麼說也對啦……"
21050-16 = "服裝也準備得差不多了，接下來就是武器和……進行學生註冊拿到學生證了。"
21050-17 = "學生證這部分我會想辦法解決的。"
21050-18 = "綠就和柚子兩個人一起教愛麗絲「說話的方式」吧。"
21050-19 = "說，說話的方式？"
21050-20 = "照這樣下去的話就會跟綠你說的一樣，會被別人懷疑也說不定。"
21050-21 = "何況我們早就被說過「你們兩個沒朋友的人，怎麼可能找到新的社員嘛」了……"
21050-22 = "如果，優香突然問說「你真的是遊戲開發部的成員嗎」的話……"
21050-25 = "「給予肯定，對於你的問題，愛麗絲給出回答。我是遊戲開發部的成員」"
21050-26 = "……要是他這樣說，一切就都白費了。"
21050-27 = "哎呀，雖然是這麼說沒錯啦……"
21050-28 = "唉……"
21050-29 = "也沒辦法，我盡力試試看。"
21050-30 = "好，那就交給你了！"
21050-33 = "等，等一下啦！"
21050-34 = "嗚嗯……"
21050-36 = "？？？"
21050-37 = "那，那個……愛麗絲，醬？"
21050-38 = "給予肯定。本機的名稱為，愛麗絲。"
21050-39 = "嗯，那我就叫你愛麗絲醬囉。話說回來，說話方式啊……仔細想想，這該怎麼學呢。一般來說是在看影片、模仿周圍的人的過程，自然而然就學會了的感覺吧。"
21050-40 = "……唔嗯。不然就在網路上找一些小朋友的教育影片吧……"
21050-43 = "（四處張望）"
21050-44 = "？"
21050-45 = "發現未知物品，前往確認。"
21050-46 = "嗯？"
21050-47 = "啊，那，那個是……！？"
21050-51 = "那個……雖然有點羞恥，其實那裡面寫的是我們所做的遊戲。#n雖然說被批評的很慘就是了。"
21050-52 = "啊，對了！"
21050-53 = "雖然說被稱為垃圾遊戲排行榜第1名，#n不知道愛麗絲醬玩過之後會有什麼樣的感想呢……"
21050-54 = "愛麗絲醬，要不要玩玩看……我們的遊戲呢？"
21050-55 = "因為要「對話」才能推動劇情，玩遊戲的話也算是在學習吧。"
21050-56 = "……？"
21050-57 = "對於目前為止的對話和行動，尚未完全把握。但是……"
21050-58 = "……給予肯定，愛麗絲將進行遊戲。"
21050-59 = "真，真的嗎？等，等我一下喔，我現在就幫你設定！"
21050-62 = "好，準備完成！"
21050-63 = "……"
21050-66 = "愛麗絲，開始遊戲……"
21050-68 = "從遊戲的標題應該就看得出來，這個遊戲是個童話風格、色彩豐富的王道幻想RPG。"
21050-69 = "[56cd7b]宇宙世紀2354年，人類被劫火之炎所包圍……"
21050-71 = "……？"
21050-72 = "呃，雖然說是王道RPG，也是混合了許多的要素的。#n畢竟不能流行什麼就照著做，但如果王道過頭又太老套了。"
21050-73 = "……"
21050-74 = "按下按鈕……"
21050-75 = "[56cd7b]開始進行新手教學。"
21050-77 = "[56cd7b]首先請按下B鍵，將眼前的武器裝備起來吧。"
21050-79 = "B鍵……"
21050-82 = "（咚哐──！！）"
21050-83 = "？？？"
21050-84 = "[FF6666]＜GAME OVER＞"
21050-86 = "！？！？"
21050-87 = "啊哈哈哈！"
21050-89 = "這可不是會照著預期發展的無聊遊戲唷！#n其實這裡不能照著指示來做，而是要按A鍵才行！"
21050-90 = "姐姐……？你不是說要去處理學生證嗎？"
21050-91 = "我去是去過了，可是因為太晚了所以一個人都沒有。我明天再去。"
21050-92 = "先不說這個，重新看一次還是覺得這個橋段有點過分了。"
21050-95 = "……"
21050-96 = "重，重來一次……"
21050-97 = "重來……產生了文字無法說明的感情。"
21050-98 = "啊，我懂你的感覺！肯定是「有趣」或是「期待」之類的感情吧！"
21050-99 = "怎麼想都是「憤怒」或「疑惑」吧……"
21050-101 = "[56cd7b]武器已裝備。"
21050-103 = "裝備完成……"
21050-104 = "哦，感覺不錯嘛。就這樣進行下去就能體驗到RPG最有趣的戰鬥……"
21050-105 = "[FF6666]遭遇敵人！"
21050-107 = "！？"
21050-108 = "[56cd7b]野生的史萊姆出現了！"
21050-110 = "緊張，興奮，有趣。"
21050-111 = "按下A鍵！這次不是騙你的了！"
21050-112 = "A鍵……「秘劍．燕返：對敵人進行2次攻擊」"
21050-113 = "上吧，對史萊姆使出……"
21050-114 = "秘劍！燕──"
21050-115 = "[56cd7b]滋咚──！"
21050-117 = "[56cd7b]攻擊命中，已死亡。"
21050-120 = "[FF6666]＜GAME OVER＞"
21050-122 = "！？！？"
21050-123 = "[56cd7b]史萊姆：無論你再怎麼磨練劍術，在我的槍面前都是沒有用的……呵。"
21050-126 = "嗯──果然史萊姆說「呵」之類的還是有點不自然。"
21050-127 = "……要吐嘈的應該不是那裡吧。"
21050-130 = "思考停止，處理速度無法跟上。"
21050-131 = "愛，愛麗絲醬？還好嗎？"
21050-132 = "……"
21050-133 = "重新啟動，再來一次。"
21050-134 = "這次會努力掌握好槍的射程，試著保持距離擊敗史萊姆。"
21050-135 = "沒錯，就是要這樣！永不放棄反覆挑戰，在錯誤的盡頭肯定能找到過關的答案。#n這就是懷舊遊戲的浪漫呀！"
21050-137 = "（2小時過後……）"
21050-138 = "……處理系統、意思表達系統發生嚴重問題。"
21050-139 = "加油啊愛麗絲，只要通過這裡就是期待已久的全劇高潮了！"
21050-140 = "嗚嗚……！"
21050-141 = "剛剛那個不管怎麼想都是因為姐姐當時想不到「草食男」這個詞，#n所以隨便用「植物人」代替的錯吧！？"
21050-142 = "愛麗絲醬剛才讀到「對不起。因為我是植物人，所以沒辦法隨便對女性搭話」#n這段文本的時候，有一瞬間昏過去了吧！"
21050-143 = "……提問。#n為何母親是女主角，又說其實他是前世的妻子……"
21050-144 = "而且身邊還有個透過時間跳躍來的、從小就分開了的、同父異母的朋友……#n不對，再說奇普托斯的字典裡並沒有「同父異母的朋友」這種詞彙──"
21050-145 = "發生錯誤，發生錯誤！"
21050-146 = "加，加油啊愛麗絲醬！離高潮不遠了！"
21050-147 = "……重新啟動。"
21050-148 = "處理程序恢復。"
21050-149 = "……呼。"
21050-150 = "這就是，遊戲……"
21050-153 = "再試一次。"
21050-155 = "（1小時過後……）"
21050-156 = "殺，了，我，吧……"
21050-158 = "好厲害呀愛麗絲！#n雖然說是和兩個開發者一起，不過竟然只花了3個小時就打出了TrueEnd！"
21050-159 = "雖，雖然是這樣沒錯，"
21050-160 = "難道說，真的只要一直玩遊戲的話……"
21050-161 = "就能讓愛麗絲醬的說話方式變得越來越多樣化嗎……！？"
21050-164 = "勇者啊，如果是在徵求我的同意的話，就給予你肯定吧。"
21050-165 = "嗯，確實是這樣……嗎？"
21050-166 = "會不會因為是從遊戲裡學來的關係，感覺還是有點不太自然……#n但是我覺得和只會將詞語排列組合的時候比起來已經好很多了！"
21050-167 = "話，話又說回來……"
21050-168 = "面對面問這種話有點緊張但是……"
21050-172 = "我，我們的遊戲，怎麼樣呢？有趣嗎！？"
21050-173 = "……"
21050-174 = "……無法說明。"
21050-175 = "咦，咦咦！？為什麼！？"
21050-176 = "……搜尋類似的表達方式。"
21050-177 = "讀取中……"
21050-178 = "難，難道說是在想一些傷人的話……？應該不會有這種事吧？"
21050-179 = "……有趣，"
21050-180 = "那是確實存在的……"
21050-181 = "哇喔！"
21050-182 = "隨著遊戲的推進……"
21050-183 = "彷彿，在別的世界旅行一樣……"
21050-184 = "就像在做夢一樣，那種感覺……想再一次……"
21050-188 = "再一次……"
21050-190 = "……"
21050-191 = "（滑落）"
21050-193 = "咦咦！？"
21050-194 = "愛，愛麗絲醬！？怎麼突然哭了！？"
21050-195 = "那還用問嗎！這就代表著，我們的遊戲是如此地令人感動啊！"
21050-196 = "再，再怎麼說這也……話說這個遊戲應該是個偏搞笑的RPG才對呀……"
21050-197 = "謝謝你愛麗絲！比起那些評論家的話，你的眼淚更讓我高興100倍呢！#n啊～好想趕快也告訴柚子呢……！"
21050-199 = "……我，我全都，看到了。"
21050-200 = "（嘰嘰──）"
21050-201 = "咦？櫃子自己打開了……"
21050-203 = "呀啊啊啊！妖，妖，妖怪！？"
21050-204 = "冷靜一點，綠！不可以丟PrayStation！真的要壞掉了！"
21050-206 = "……"
21050-207 = "……？"
21050-208 = "柚子！"
21050-209 = "柚子醬，我們到處找你都沒找到！你從什麼時候開始躲在櫃子裡面的？"
21050-210 = "大，大家，從廢墟回來的時候開始……"
21050-211 = "那不是很久之前了嗎！？從那時候開始就一直待在櫃子裡？#n啊，難道是因為害怕愛麗絲醬？"
21050-212 = "明明用MomoTalk之類的跟我們說一聲就好了，嚇了我們一大跳……"
21050-213 = "啊，愛麗絲是第一次見到吧。這位就是我們遊戲開發部的部長柚子唷。"
21050-216 = "（吸）"
21050-219 = "？"
21050-220 = "呃，那個，這個……"
21050-221 = "謝，謝，謝……"
21050-222 = "謝……？"
21050-223 = "……謝謝你。"
21050-224 = "說我們的遊戲很有趣……還想再玩一次……"
21050-225 = "竟然還玩到哭了……真的是，非常感謝。"
21050-226 = "？？？"
21050-229 = "很有趣、想再玩一次……這些話，我一直都很想聽見。"
21050-233 = "柚子醬……"
21050-235 = "下一話;學習說話的方式"

[translation]
21050-1 = "Episode 5;I, Aris..."
21050-2 = "Millennium Game Development Department"
21050-4 = "I don't know about this."
21050-5 = "Will it really be okay if we disguise her as a club member?"
21050-6 = "Okay? Verifying meaning. A condition lacking in negative attributes or problems. Confirmed."
21050-7 = "There's no way this will work! She'll blow her cover the second she opens her mouth!"
21050-8 = "It's hopeless. We can't pull something like this off!"
21050-10 = "We have to. I'll do whatever it takes if it means saving the Game Development Department."
21050-11 = "Yuzu can't move back to the dorms. If we don't do this...she'll have nowhere to go."
21050-12 = "..."
21050-13 = "That's true..."
21050-16 = "I think she passes the eye test. All she needs now is a weapon and student ID."
21050-17 = "I'll take care of getting her registered and having an ID made."
21050-18 = "Midori, I want you teach Aris how to hold a conversation with Yuzu."
21050-19 = "A conversation?"
21050-20 = "Like you said, she's not gonna sound like a normal student."
21050-21 = "People have been saying for ages that our club can't recruit new members because we have no friends."
21050-22 = "So if Yuuka asks Aris whether she really belongs to the Game Development Department and Aris responds with something like..."
21050-25 = "\"Affirmative. Aris is property registered to the Game Development Department. Beep boop.\""
21050-26 = "...That's going to raise a few eyebrows."
21050-27 = "I mean, sure, but..."
21050-28 = "*sigh*"
21050-29 = "Okay, then. I'll try."
21050-30 = "Good! I'm counting on you!"
21050-33 = "W-Wait!"
21050-34 = "Um..."
21050-36 = "...?"
21050-37 = "Uh, so... Aris?"
21050-38 = "Affirmative. Aris is the designated name of this unit."
21050-39 = "Hmm... I don't even remember how I learned to make conversation. I suppose I just picked it up from watching TV or hearing other people talk."
21050-40 = "Hmm. Maybe I can find an educational program for kids online."
21050-43 = "*looks around*"
21050-44 = "...?"
21050-45 = "Query. Please verify object identity."
21050-46 = "Huh?"
21050-47 = "Y-You mean that?!"
21050-51 = "Oh. That. It's a little embarrassing, but we actually made the game featured on the cover. It got a lot of really bad reviews."
21050-52 = "Oh, right!"
21050-53 = "I'm not proud of the fact it won Worst Game of the Year..."
21050-54 = "...but why don't you give it a try, Aris?"
21050-55 = "There are all kinds of conversations in the game, so it might be a good opportunity to learn."
21050-56 = "...?"
21050-57 = "Purpose not understood."
21050-58 = "However... *nod*"
21050-59 = "R-Really?! Give me just a minute. I'll set it up for you!"
21050-62 = "Okay, it's ready!"
21050-63 = "..."
21050-66 = "Aris, starting game."
21050-68 = "As the title suggests, our game is a classic fantasy RPG with a rich, fairy tale atmosphere."
21050-69 = "[56cd7b]Cosmic Calendar Year 2354. Mankind is engulfed in the flames of retribution."
21050-71 = "...?"
21050-72 = "Well...it does take inspiration from some other genres too. Sticking with the same tired tropes can get boring after a while."
21050-73 = "..."
21050-74 = "Pressing button."
21050-75 = "[56cd7b]Beginning tutorial."
21050-77 = "[56cd7b]Press the B button to equip the weapon in front of you."
21050-79 = "Press...B button..."
21050-82 = "*boom*"
21050-83 = "...?"
21050-84 = "[FF6666]GAME OVER"
21050-86 = "...?!"
21050-87 = "Ahahaha!"
21050-89 = "Where's the fun in knowing what will happen?! The trick is you should have pressed the A button there!"
21050-90 = "What are you doing here Momoi? I thought you were going to get the student ID."
21050-91 = "Oh, there was no one there. I guess I got there too late. I'll try again tomorrow."
21050-92 = "Anyway, on second thought, I think the way we designed this scenario is a little unfair."
21050-95 = "..."
21050-96 = "A-Again..."
21050-97 = "Resuming. Experiencing emotion that cannot be conveyed through words."
21050-98 = "Ooh! I know what you're feeling! It must be \"interest\" or \"anticipation\"!"
21050-99 = "I'm going to guess it's \"rage\"."
21050-101 = "[56cd7b]Weapon equipped successfully."
21050-103 = "Picked up...sword..."
21050-104 = "You're picking this up quicker than I expected! Once you're past the tutorial, it won't be long until you get to the best part of any RPG..."
21050-105 = "[FF6666]COMBAT START!"
21050-107 = "...?!"
21050-108 = "[56cd7b]A wild Puny Jelly appeared!"
21050-110 = "Tension. Excitement. Interest."
21050-111 = "Mash the A button! Trust me!"
21050-112 = "A button... Secret Sword Tsubame Gaeshi attacks twice."
21050-113 = "Taking down Puny Jelly."
21050-114 = "Secret Sword! Tsubame...!"
21050-115 = "[56cd7b]Pow!"
21050-117 = "[56cd7b]Counterattack. You died."
21050-120 = "[FF6666]GAME OVER"
21050-122 = "...?!"
21050-123 = "[56cd7b]Puny Jelly: You should know better than to bring a sword to a gun fight. Hmph!"
21050-126 = "You think the \"Hmph!\" at the end might have been a little too much?"
21050-127 = "I don't think that's the biggest issue here."
21050-130 = "Operational error. Processing."
21050-131 = "A-Are you okay, Aris?"
21050-132 = "..."
21050-133 = "Resuming functionality. Initiating."
21050-134 = "Notice: caution required while in range of the Puny Jelly. Navigate and exterminate. "
21050-135 = "You're getting it! It's all about learning a little bit at a time until you know how to handle anything and everything. That's the allure of retro games!"
21050-137 = "(Two hours later...)"
21050-138 = "A critical computational processing and comprehension error has occurred."
21050-139 = "I-It's okay, Aris! Right after this phase is the climax!"
21050-140 = "Ugh. We really messed up on this part..."
21050-141 = "It's supposed to say that he prefers meat, but we couldn't find the right words..."
21050-142 = "When he says, \"Sorry I can't help you ladies with those veggies, I'm more of a sausage lover myself,\" Aris' circuits almost got fried!"
21050-143 = "Query. Why is my mother a love interest and why was she my wife in a previous life?"
21050-144 = "Additional query. Why did my wife's missing childhood half-friend come through a time warp? Dictionary lookup of \"half-friend\" returned negative. Definition not found in Kivotos."
21050-145 = "E-Error!"
21050-146 = "A-Aris! Are you all right? You're almost to the climax!"
21050-147 = "Initiating reboot."
21050-148 = "System restore complete."
21050-149 = "Phew..."
21050-150 = "This is...your game..."
21050-153 = "Resuming play."
21050-155 = "(Two hours later...)"
21050-156 = "\"Please...kill...me...\""
21050-158 = "That was incredible, Aris! Sure, you had two devs with you, but you got the true ending in only three hours! What a speedrun!"
21050-159 = "By the way, Momoi..."
21050-160 = "Have you noticed that the more Aris plays..."
21050-161 = "...the weirder the way she talks has become?"
21050-164 = "If you dost inquire of my opinion, dear hero, yours truly heartily agrees."
21050-165 = "Yeah, I get what you mean..."
21050-166 = "It's definitely awkward, but it sure beats her just listing words out!"
21050-167 = "U-Um, so..."
21050-168 = "I have a kind of embarrassing question for you, Aris."
21050-172 = "How was our game? Did you have fun?!"
21050-173 = "..."
21050-174 = "Queried description not found."
21050-175 = "B-But why...?"
21050-176 = "Expression lookup in progress..."
21050-177 = "Loading response..."
21050-178 = "P-Please don't be a curse word."
21050-179 = "....Fun."
21050-180 = "Fun...confirmed."
21050-181 = "*gasp!*"
21050-182 = "The more I played..."
21050-183 = "...the more it felt like I was being transported to a new world."
21050-184 = "It was like...a dream."
21050-188 = "I...need more..."
21050-190 = "..."
21050-191 = "*sob*"
21050-193 = " Wh-What the...?!"
21050-194 = "A-Aris, why are you crying?"
21050-195 = "Whaddya mean why? She's been touched by our game!"
21050-196 = "But our game is just a comedy RPG..."
21050-197 = "Thank you, Aris! Your tears cancel out a thousand bad reviews! I wish Yuzu could be here to see this!"
21050-199 = "...I'm here."
21050-200 = "*creak*"
21050-201 = "Huh? Did that cabinet door open just now?"
21050-203 = "Eeek! A gh-ghost!"
21050-204 = "Midori, stop! Don't throw the FlyStation again!"
21050-206 = "..."
21050-207 = "...?"
21050-208 = "Yuzu!"
21050-209 = "We couldn't find you anywhere! How long have you been hiding in the cabinet?"
21050-210 = "...Since you guys got back from the ruins."
21050-211 = "That was hours ago! Oh, were you scared of Aris or something?"
21050-212 = "You should have said something. Aris and I could have stepped out if you needed us to."
21050-213 = "Anyway, I think an introduction is in order. Aris, meet Yuzu, the president of the Game Development Department."
21050-216 = "*scooches closer*"
21050-219 = "Hm?"
21050-220 = "Um. So, I mean..."
21050-221 = "Th... Th..."
21050-222 = "Th...?"
21050-223 = "Thank you."
21050-224 = "Thank you for saying...the game was fun...and that you wanted to play more of it."
21050-225 = "And thank you for crying... It really means a lot."
21050-226 = "...?"
21050-229 = "I've always wanted...to hear those things said about our game..."
21050-233 = "Yuzu..."
21050-235 = "Next Episode;How to Learn a Language"

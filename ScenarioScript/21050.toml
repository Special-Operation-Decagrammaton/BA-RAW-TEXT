[translation]
21050-1 = "ตอนที่ 5;ฉันคืออาริสึ"
21050-2 = "ชมรมพัฒนาเกมมิลเลเนียม"
21050-4 = "อืม.. น่ากังวลจริงๆ"
21050-5 = "จะปลอมตัวให้เด็กคนนี้เป็นสมาชิกชมรมเรา... ได้เหรอ?"
21050-6 = "ได้เหรอ? ตรวจสอบความหมาย สภาพไม่แย่ ไม่เกิดปัญหา เห็นด้วยค่ะ"
21050-7 = "...แต่ฉันอยากปฏิเสธ! ยิ่งใช้คำพูดแนวนี้ด้วยแล้วล่ะก็ ต้องเป็นที่สงสัยแน่ๆ!"
21050-8 = "เลิกทำเรื่องนี้เถอะ! มันเป็นไปไม่ได้หรอก!"
21050-10 = "ไม่ได้หรอก ฉันจะต้องรักษาชมรมพัฒนาเกมเอาไว้ให้ได้ ไม่ว่าจะด้วยวิธีไหนก็ตาม"
21050-11 = "เพราะถ้าไม่อย่างนั้น ยูสึที่ไม่อยากกลับไปอยู่หอพักก็จะไม่มีที่ไปแล้วนะ"
21050-12 = "......"
21050-13 = "เรื่องนั้นมัน... ก็จริง..."
21050-16 = "เราหาชุดแต่งตัวให้แล้ว จากนี้ก็เหลือแค่... อาวุธกับบัตรนักเรียน"
21050-17 = "ฉันจะจัดการเรื่องลงทะเบียนนักเรียนและบัตรนักเรียนเอง"
21050-18 = "มิโดริ เธอกับยูสึน่ะ ไปสอนอาริสึ 'สนทนา' ... ให้หน่อยก็แล้วกันนะ"
21050-19 = "สะ.. สนทนาเหรอ?"
21050-20 = "ก็อย่างที่เธอบอก ถ้าขืนยังพูดแบบนี้อยู่ล่ะก็ มันดูไม่เหมือนเป็นนักเรียนธรรมดาแน่"
21050-21 = "บางทีคนอื่นอาจจะบอกว่า 'พวกเธอไม่มีเพื่อนเลย ไม่มีทางหาสมาชิกใหม่มาเข้าชมรมได้หรอก'"
21050-22 = "ถ้ายูกะถามว่า เธอสังกัดชมรมพัฒนาเกมจริงเหรอ..."
21050-25 = "แล้วได้คำตอบจากอาริสึว่า \"เห็นด้วย คำถามของคุณ ขอตอบด้วยคำตอบของอาริสึ#nฉันคือชมรมพัฒนาเกม\""
21050-26 = "...ถ้าเป็นคำตอบแบบนี้ ยูกะต้องสงสัยมากๆ แน่นอน"
21050-27 = "ไม่สิ... จริงๆ มันก็น่าสงสัยอยู่หรอก..."
21050-28 = "เฮ้อ..."
21050-29 = "ช่วยไม่ได้สินะ ฉันจะลองดูแล้วกัน"

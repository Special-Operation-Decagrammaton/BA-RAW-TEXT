[translation]
21050-1 = "第5話;私はアリスです"
21050-2 = "ミレニアム・ゲーム開発部"
21050-4 = "うーん、やっぱり心配……。"
21050-5 = "この子をうちの部員に偽装するなんて……本当に大丈夫？"
21050-6 = "「大丈夫」の意味を確認……「状態が悪くなく問題が発生していない状況」のことと推定、肯定します。"
21050-7 = "……いやいや、肯定できないって！この口調じゃ絶対疑われるよ！"
21050-8 = "やめておこう！？これは無理だって！"
21050-10 = "今やめるって選択肢の方が無理だよ。何としても、私たちのゲーム開発部を守らなきゃ。"
21050-11 = "そうしないと、ユズの居場所が……寮に戻るわけにはいかないし……。"
21050-12 = "……。"
21050-13 = "そう、だったね……。"
21050-16 = "服装もある程度整ったし、あとは武器と……学生登録をして、学生証を手に入れないと。"
21050-17 = "学生証については、私の方で何とかするから。"
21050-18 = "ミドリはユズと二人で、アリスに「話し方」を教えてあげて。"
21050-19 = "は、話し方？"
21050-20 = "今のままだとミドリが言った通り、疑われちゃうかもしれないから。"
21050-21 = "ただでさえ「友達もいないあなたたちに、新しい部員の募集なんて出来るはずないでしょ」って言われてるし……。"
21050-22 = "もし、何かの拍子にユウカに「本当にゲーム開発部なのか」って聞かれたとして……"
21050-25 = "「肯定、あなたの質問に対し、アリスの回答を提示。私はゲーム開発部の部員」"
21050-26 = "……なんて言っちゃった暁には、全部台無しになりかねない。"
21050-27 = "いや、それはそうだけど……。"
21050-28 = "はぁ……。"
21050-29 = "仕方ない、やれるだけやってみるよ。"
21050-30 = "よし、じゃあ任せた！"
21050-33 = "ちょ、ちょっと待って！"
21050-34 = "うーーん……。"
21050-36 = "？？？"
21050-37 = "え、えっと……アリス、ちゃん？"
21050-38 = "肯定。本機の名称、アリスです。"
21050-39 = "うん、じゃあアリスちゃんって呼ぶね。それにしても話し方かあ……よく考えると、どうやって習得するんだろ。普通は動画を見たり、周りの言葉を真似していくうちに自然に、って感じだと思うけど。"
21050-40 = "……うーん。子供用の教育プログラムって、インターネットに落ちてるかな……。"
21050-43 = "（キョロキョロ）"
21050-44 = "？"
21050-45 = "正体不明の物を発見、確認を行います。"
21050-46 = "ん？"
21050-47 = "あっ、そ、それは……っ！？"
21050-51 = "えっと……ちょっと恥ずかしいけど、実はその中に、私たちが作ったゲームが載ってるの。まあ、すごい酷評されちゃったんだけどね。"
21050-52 = "あ、そうだ！"
21050-53 = "クソゲーランキングでは1位になっちゃったし、アリスちゃんがどう思うかは分からないけど……"
21050-54 = "アリスちゃん、私たちのゲーム……やってみない？"
21050-55 = "「会話」をしながら進められるから、ゲームをやってみるのも勉強になるかも。"
21050-56 = "……？"
21050-57 = "ここまでの言動の意図、完璧には把握しかねます。しかし……"
21050-58 = "……肯定、アリスはゲームをします。"
21050-59 = "ほ、本当に！？ちょ、ちょっと待ってて、すぐにセッティングするから！"
21050-62 = "よし、準備完了！"
21050-63 = "……。"
21050-66 = "アリス、ゲームを開始します……"
21050-68 = "タイトルから分かるかもしれないけど、このゲームは童話テイストで、色彩豊かな王道ファンタジーRPGなの。"
21050-69 = "[56cd7b]コスモス世紀2354年、人類は劫火の炎に包まれた……"
21050-71 = "……？"
21050-72 = "えっと、王道とは言っても、色々な要素を混ぜてたりするんだけどね。トレンドそのままでもダメだけど、王道に拘りすぎても古くなるからってことで。"
21050-73 = "……。"
21050-74 = "ボタンを押します……"
21050-75 = "[56cd7b]チュートリアルを開始します。"
21050-77 = "[56cd7b]まずはBボタンを押して、目の前の武器を装着してみてください。"
21050-79 = "Bボタン……"
21050-82 = "（ドカーーーーン！！）"
21050-83 = "？？？"
21050-84 = "[FF6666]＜GAME OVER＞"
21050-86 = "！？！？"
21050-87 = "あははははっ！"
21050-89 = "予想できる展開ほどつまらないものはないよね！本当はここで指示通りじゃなくて、Aボタンを押さなきゃいけないの！"
21050-90 = "お姉ちゃん……？学生証を作りに行くって言ってなかった？"
21050-91 = "行ってきたんだけど、遅い時間だったからか誰もいなかったの。また明日行く。"
21050-92 = "それはさておき、あらためて見てもこの部分はちょっと酷いと思う。"
21050-95 = "……。"
21050-96 = "も、もう一度始めます……。"
21050-97 = "再開……テキストでは説明不可能な感情が発生しています。"
21050-98 = "あっ、私それ分かるかも！きっと「興味」とか「期待」とか、そういう感情だと思う！"
21050-99 = "どう考えても「怒り」か「困惑」だと思うけど……。"
21050-101 = "[56cd7b]武器を装備しました。"
21050-103 = "装備完了……。"
21050-104 = "お、良い感じ。そのまま進めば、RPGの花である戦闘が……"
21050-105 = "[FF6666]エンカウントが発生しました！"
21050-107 = "！？"
21050-108 = "[56cd7b]野生のプニプニが現れた！"
21050-110 = "緊張、高揚、興味。"
21050-111 = "Aボタンを押して！今度は嘘じゃないから！"
21050-112 = "Aボタン……「秘剣つばめ返し：敵に対して2回攻撃をする」"
21050-113 = "行きます、プニプニに対して……"
21050-114 = "秘剣！つばめ――"
21050-115 = "[56cd7b]ッダーン！"
21050-117 = "[56cd7b]攻撃が命中、 即死しました"
21050-120 = "[FF6666]＜GAME OVER＞"
21050-122 = "！？！？"
21050-123 = "[56cd7b]プニプニ：どれだけ剣術を鍛えたところで、我が銃の前では無力……ふっ。"
21050-126 = "うーん、やっぱりプニプニが「ふっ」って言うのは不自然かな。"
21050-127 = "……ツッコみどころはそこじゃないと思う。"
21050-130 = "思考停止、電算処理が追いつきません。"
21050-131 = "あ、アリスちゃん？大丈夫？"
21050-132 = "……。"
21050-133 = "リブート、再開します。"
21050-134 = "今度は銃の射程距離把握に努めながら、接近しすぎないようにプニプニを排除します。"
21050-135 = "そう、まさにそれ！諦めずに繰り返し挑戦して、試行錯誤の末に答えを見つける！それがレトロチックなゲームのロマンだよ！"
21050-137 = "（2時間後……）"
21050-138 = "……電算処理系統、および意思表示システムに致命的なエラーが発生。"
21050-139 = "頑張ってアリス、ここさえ乗り越えれば待望のクライマックスだよ！"
21050-140 = "うう……っ！"
21050-141 = "今のはどう考えても、「草食系」って言葉が思い出せないからって、それを「植物人間」って書いたお姉ちゃんのせいでしょ！？"
21050-142 = "「ごめんなさい。私は植物人間ですので、女性に対して気軽に声をかけることはできません」ってテキストを読んだ瞬間に、アリスちゃんが一瞬意識を失ってたじゃん！"
21050-143 = "……質問。どうして母親がヒロインで、それでいて実は前世の妻で、"
21050-144 = "さらにどうしてその妻の元に、子供の頃に別れたきりの腹違いの友人がタイムリープしてきているのか……#nいえ、そもそも「腹違いの友人」という表現はキヴォトスの辞書データに登載されていな――"
21050-145 = "エラー発生、エラー発生！"
21050-146 = "が、頑張ってアリスちゃん！クライマックスまでもう少しだから！"
21050-147 = "……リブート。"
21050-148 = "プロセスを回復。"
21050-149 = "……ふぅ。"
21050-150 = "これが、ゲーム……。"
21050-153 = "再開します。"
21050-155 = "（1時間後……）"
21050-156 = "こ、ろ、し、て……"
21050-158 = "すごいよアリス！開発者二人が一緒とはいえ、3時間でトゥルーエンドなんて！"
21050-159 = "そ、それもそうだけど、"
21050-160 = "もしかして、本当にゲームをやればやるほど……"
21050-161 = "アリスちゃんの喋り方のパターンが、どんどん多彩になってきてる……！？"
21050-164 = "勇者よ、汝が同意を求めるならば、私はそれを肯定しよう。"
21050-165 = "うん、確かにそう……かも？"
21050-166 = "ゲームからそのまま覚えたせいで、ちょっとまだ不自然かもだけど……言葉を羅列してただけの時よりは、かなり良くなったと思う！"
21050-167 = "と、ところでその……"
21050-168 = "こういうのを面と向かって聞くのは緊張するんだけど……"
21050-172 = "わ、私たちのゲーム、どうだった？面白かった！？"
21050-173 = "……。"
21050-174 = "……説明不可。"
21050-175 = "え、ええっ！？なんで！？"
21050-176 = "……類似表現を検索。"
21050-177 = "ロード中……"
21050-178 = "も、もしかして、悪口を探してる……？そんなこと無いよね？"
21050-179 = "……面白さ、"
21050-180 = "それは、明確に存在……"
21050-181 = "おおっ！"
21050-182 = "プレイを進めれば進めるほど……"
21050-183 = "まるで、別の世界を旅しているような……"
21050-184 = "夢を見ているような、そんな気分……もう一度……"
21050-188 = "もう一度……"
21050-190 = "……"
21050-191 = "（ポロッ）"
21050-193 = "ええっ！？"
21050-194 = "あ、アリスちゃん！？どうして泣いてるの！？"
21050-195 = "決まってるじゃん！それぐらい、私たちのゲームが感動的だったってことでしょ！"
21050-196 = "い、いくらなんでもそれは……というかこのゲーム、ギャグ寄りのRPGのはずだし……。"
21050-197 = "ありがとうアリス！その辺の評論家の言葉なんかより、その涙の方が100倍嬉しいよ！あー、早くユズにも教えてあげたい……！"
21050-199 = "……ちゃ、ちゃんと、全部見てた。"
21050-200 = "（ギギーッ）"
21050-201 = "え？ロッカーが勝手に開いて……"
21050-203 = "きゃあああっ！お、お、お化け！？"
21050-204 = "落ち着いて、ミドリ！プライステーションを投げちゃダメ！そろそろ壊れる！"
21050-206 = "……。"
21050-207 = "……？"
21050-208 = "ユズ！"
21050-209 = "ユズちゃん、あれだけ探しても見つからなかったのに！いつからロッカーの中にいたの？"
21050-210 = "み、みんなが、廃墟から帰ってきた時から……。"
21050-211 = "だいぶ前じゃん！？その時からずっとロッカーの中にいたの？あ、もしかしてアリスちゃんが怖かったから？"
21050-212 = "モモトークか何かで伝えてくれれば良かったのに、びっくりしたよ……。"
21050-213 = "あ、アリスは初めてだよね。この人が私たちゲーム開発部の部長、ユズだよ。"
21050-216 = "（スッ）"
21050-219 = "？"
21050-220 = "えっと、あの、その……。"
21050-221 = "あ、あ、あ……"
21050-222 = "あ……？"
21050-223 = "……ありがとう。"
21050-224 = "ゲーム、面白いって言ってくれて……もう一度やりたいって言ってくれて……。"
21050-225 = "泣いてくれて……本当に、ありがとう。"
21050-226 = "？？？"
21050-229 = "面白いとか、もう一度とか……そういう言葉が、ずっと聞きたかったの。"
21050-233 = "ユズちゃん……。"
21050-235 = "次回;言葉を学ぶ方法"

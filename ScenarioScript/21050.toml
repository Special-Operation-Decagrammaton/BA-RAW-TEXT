21050-142 = "อาริสึจังหมดสติไปชั่วขณะเพราะประโยคที่ว่า \"อ่า ขอโทษนะครับ ผมเป็นคนกักตัว#nก็เลยไม่กล้าชวนผู้หญิงคุยน่ะ\" แน่เลย!"

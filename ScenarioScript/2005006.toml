[translation]
2005006-1 = "地下的兩人"
2005006-2 = "狂獵外圍城牆"
2005006-3 = "老師，這邊！"
2005006-4 = "（律站在城牆下的一扇鐵柵門前）"
2005006-8 = "[ns]「律？這扇門到底是……」"
2005006-9 = "噓……"
2005006-10 = "接下來要去的地方，絕對不能被任何人發現哦，老師！"
2005006-11 = "那麼首先……嘿！"
2005006-16 = "[ns]「把鐵柵門拆下來了……？」"
2005006-17 = "我們進去吧，老師！"
2005006-19 = "（就這樣跟著律進入了地下通道）"
2005006-23 = "地下遺跡"
2005006-24 = "鏘鏘～！這是我在找走私路線的時候發現的地下遺跡！"
2005006-25 = "[s]「遺跡？」"
2005006-26 = "狂獵是一所歷史非常悠久的古老學院。"
2005006-27 = "據說實際上，還有多到數不清的遺跡還沒被人發現呢。"
2005006-28 = "而且……這裡還只是入口哦！"
2005006-29 = "往這邊，老師。"
2005006-31 = "只要穿過這條通道……"
2005006-37 = "― [log=리츠]啊～[/log][wa:1150] "
2005006-39 = "― [log=리츠]好涼爽……[/log]"
2005006-42 = "[ns]「這個地方是……」"
2005006-43 = "― [log=리츠]這裡，是不是很厲害？[/log][wa:2000] "
2005006-45 = "― [log=리츠]好像是很～久以前就有的地下儲水槽……[/log][wa:1650] "
2005006-48 = "― [log=리츠]挖了很大的洞，又立了好多柱子……[/log][wa:4650] "
2005006-50 = "― [log=리츠]每根上面還都有雕刻……[/log][wa:2030] "
2005006-53 = "[ns]「簡直……像神殿一樣。」"
2005006-54 = "― [log=리츠]……很漂亮吧？[/log][wa:1080] "
2005006-56 = "― [log=리츠]我實在很想讓老師看看。[/log][wa:1290] "
2005006-59 = "― [log=리츠]來，過來這邊。[/log][wa:2460] "
2005006-61 = "― [log=리츠]一起欣賞跟我相同的景色吧。[/log][wa:2200] "
2005006-64 = "（就這樣和律在那裡玩耍了一段時間）"
2005006-65 = "（一起把腳浸入了同一片水池之中）"

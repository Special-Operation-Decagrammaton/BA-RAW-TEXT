[translation]
2005006-1 = "สองคนในห้องใต้ดิน"
2005006-2 = "กำแพงปราสาท นอกไวลด์ฮันต์"
2005006-3 = "คุณครู ทางนี้!"
2005006-4 = "(ริตสึยืนอยู่หน้าประตูลูกกรงที่อยู่ด้านล่างปราสาท)"
2005006-8 = "[ns] \"ริตสึ? ประตูนี้มีอะไร...\""
2005006-9 = "ชู่ว... "
2005006-10 = "ที่ที่เราจะเข้าไปจากนี้ เราห้ามโดนจับได้เด็ดขาดนะคุณครู!"
2005006-11 = "เอาละ ก่อนอื่นก็... ฮึบ! "
2005006-16 = "[ns] \"พังประตูลูกกรงเลยเหรอ...?\""
2005006-17 = "เข้าไปกันเถอะ คุณครู!"
2005006-19 = "(แล้วคุณครูก็เดินตามริตสึลงไปชั้นใต้ดิน)"
2005006-23 = "ซากปรักหักพังใต้ดิน"
2005006-24 = "ท้าดา! นี่คือซากปรักหักพังที่ฉันค้นพบตอนหาเส้นทางลักลอบขนส่งสินค้าน่ะ!"
2005006-25 = "[s] \"ซากปรักหักพัง?\""
2005006-26 = "ไวลด์ฮันต์เป็นโรงเรียนที่เก่ามากแล้ว"
2005006-27 = "ได้ยินว่ามีซากปรักหักพังที่ยังไม่ถูกขุดค้นอีกเพียบเลยนะ"
2005006-28 = "แล้วตรงนี้ก็... เป็นแค่ทางเข้าเท่านั้น!"
2005006-29 = "มาทางนี้สิ คุณครู"
2005006-31 = "ถ้าผ่านทางเดินตรงนี้ไปละก็..."
2005006-37 = "― [log=리츠]อ่า อ่า[/log][wa:950] "
2005006-39 = "― [log=리츠]สดชื่นจัง[/log]"
2005006-42 = "[ns] \"ที่นี่คือ...?\""
2005006-43 = "― [log=리츠]ที่นี่ยอดไปเลยใช่มั้ยล่ะ?[/log][wa:1400] "
2005006-45 = "― [log=리츠]มันเหมือนบ่อเก็บน้ำใต้ดินที่สร้างตั้งแต่สมัยก่อนเลยละ[/log][wa:250] "
2005006-48 = "― [log=리츠]ขุดลงไปในดิน ตั้งเสาหินหลายสิบต้น...[/log][wa:3850] "
2005006-50 = "― [log=리츠]แล้วก็แกะสลักเสาไว้ทุกต้นเลยละ...  [/log][wa:1070] "
2005006-53 = "[ns] \"ทำไว้เหมือนกับ... ที่บูชาอะไรเลยนะ\" "
2005006-54 = "― [log=리츠]สวยใช่มั้ยล่ะ?[/log][wa:800] "
2005006-56 = "― [log=리츠]ฉันอยากให้คุณครูได้มาเห็นน่ะ[/log][wa:610] "
2005006-59 = "― [log=리츠]เอาละ มาตรงนี้สิ[/log][wa:2100] "
2005006-61 = "― [log=리츠]มาดูวิวทิวทัศน์จากที่ที่ฉันอยู่กัน[/log][wa:1360] "
2005006-64 = "(แล้วคุณครูก็เล่นสนุกอยู่กับริตสึที่นั่นอยู่พักใหญ่)"
2005006-65 = "(แช่น้ำอยู่ด้วยกัน... ในบ่อน้ำเดียวกัน)"

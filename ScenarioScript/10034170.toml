[translation]
10034170-1 = "2天前：為了勝利"
10034170-4 = "只剩下兩天了呢，時間過得比想像中還快。"
10034170-5 = "要不要把目前為止練過的東西從頭走一遍？"
10034170-6 = "聽你這麼一說就莫名的緊張了起來。#n明明試鏡都還沒到的說。"
10034170-7 = "這種緊張感也是練習的一部分。"
10034170-8 = "將練習視同實戰，將實戰當成練習，這是成功的關鍵。"
10034170-9 = "「過程比結果重要」、「經歷的回憶才是寶物」之類的話，都是留給失敗者的安慰。"
10034170-10 = "重要的是結果！我們會踏在眾人的屍體上，奪得女王泡芙！！"
10034170-12 = "你這說話的語氣還真是……"
10034170-13 = "到時候如果被刷掉，我看你還能不能說得這麼好聽。"
10034170-14 = "算了……這傢伙的作風一向都是如此。"
10034170-15 = "而且炒熱氣氛也沒什麼不好的。這時候就該提振一下士氣！"
10034170-17 = "大家一起拚到最後吧──！！"

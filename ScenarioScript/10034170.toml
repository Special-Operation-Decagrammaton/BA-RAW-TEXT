[translation]
10034170-1 = "2 Days Ago: For Victory"
10034170-4 = "We've only got two days left. The time's really flown by."
10034170-5 = "Should we try going over everything we did again?"
10034170-6 = "Hearing you say that makes me nervous. And it's not even the day of the audition."
10034170-7 = "That nervousness has value, if it motivates practice."
10034170-8 = "\"Treat practice as if it's a real game. Treat a real game as if it's practice.\" That's the winning attitude."
10034170-9 = "Don't start thinking, \"This'll all be a good experience, win or lose.\" That's what people say when they lose, to make themselves feel better."
10034170-10 = "The RESULTS are all that matter! We'll savor that semla on a pile of our enemies' corpses!"
10034170-12 = "The way she talks, seriously..."
10034170-13 = "What's she going to do if we lose, after all that?"
10034170-14 = "Well...good question. Guess that's just the way she is."
10034170-15 = "Well, might as well roll with it. Let's all get ourselves hyped up!"
10034170-17 = "Let's stay strong till the end!!"

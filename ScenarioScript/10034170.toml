[translation]
10034170-1 = "[D-2]: เพื่อชัยชนะ"
10034170-4 = "ตอนนี้เราเหลือเวลาอีกแค่ 2 วันแล้ว เวลาผ่านไปเร็วกว่าที่คิดเยอะเลยนะ"
10034170-5 = "ที่เราซ้อมกันมาตั้งแต่แรก เรามาเล่นพร้อมกันทั้งหมดเลยดีมั้ย?"
10034170-6 = "พอพูดแบบนี้ก็ประหม่าขึ้นมาเลยแฮะ นี่ไม่ใช่วันคัดเลือกจริงนะ"
10034170-7 = "ความประหม่านี่แหละทำให้การฝึกซ้อมมีคุณค่า"
10034170-8 = "ฝึกซ้อมให้เหมือนเล่นจริง เล่นจริงให้เหมือนฝึกซ้อม ทำแบบนี้แหละจะพาเราไปสู่ความสำเร็จได้"
10034170-9 = "ส่วนคำที่บอกว่ากระบวนการคือสิ่งสำคัญ หรือความทรงจำคือสมบัติล้ำค่าน่ะ เป็นคำปลอบขวัญที่เอา#nไว้พูดหลังจากล้มเหลว"
10034170-10 = "สิ่งที่สำคัญคือผลลัพธ์ต่างหาก! เราต้องเอาเซมล่ามาครอบครองให้ได้!! ต่อให้ต้องข้ามศพศัตรูมา#nนับไม่ถ้วนก็ตาม!!"
10034170-12 = "คติพจน์อะไรของเค้า..."
10034170-13 = "มั่นใจเสียขนาดนั้น แล้วถ้าไม่ผ่านขึ้นมาจะทำยังไงเนี่ย... "
10034170-14 = "แต่ก็นะ... ฉันว่าแบบนั้นก็เหมาะกับยัยนั่นดี"
10034170-15 = "ฉันคิดว่าการปลุกใจแบบนี้ก็ไม่ได้แย่นักหรอก เวลาแบบนี้เราต้องฮึกเหิมกันเข้าไว้สิ!"
10034170-17 = "มาสู้สุดใจให้ถึงตอนจบเลย!!"

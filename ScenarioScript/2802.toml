[translation]
2802-1 = "227號特別班的請願書（２）"
2802-5 = "「薄荷巧克力解放陣線」的請願書"
2802-6 = "「227號特別班的學生們非常可憐。因為他們沒有機會品嘗到人間至高美味的薄荷巧克力。」"
2802-7 = "「因此，必須提供227號特別班大量的薄荷巧克力。其他事情都無所謂。」"
2802-12 = "「反對在唐揚雞上擠檸檬汁的革命家集會」的請願書"
2802-13 = "「227號特別班的學生們應當有的權利並沒有獲得保障。不只是補給品沒有好好送達，就算偶爾能吃到肉，似乎也只能吃到又冷又柴的唐揚雞而已。」"
2802-14 = "「話說回來，『唐揚雞』這個表現方式我覺得很奇怪。在我住的地方，炸過的雞肉叫做『ZANGI』。所以應該把社團名稱改成『反對在ZANGI上擠檸檬汁的革命家集團』才對」"
2802-15 = "「唐揚雞就是唐揚雞，這可是個崇高的名字。龍田揚之類的也是一樣，無法容忍其他的形容方式。」"
2802-16 = "「那沾醬炸雞又要叫什麼？醬炸？」"
2802-17 = "「我們連擠檸檬汁都無法容忍了，難道有可能容忍醬汁嗎！妳這傢伙，是間諜嗎！？」"
2802-18 = "為什麼這些人會在請願書上吵架……"
2802-19 = "而且舊校舍也不需要「薄荷巧克力」或「唐揚雞」之類奢侈的東西啊！根本是擅自加入自己的主張嘛！"
2802-20 = "嘛，這也沒辦法。赤冬聯邦學園的學生們，幾乎都對自己執著的領域之外的東西完全沒興趣……"
2802-21 = "唔，既然如此也只好自己寫反省書了……但是，明明是因為覺得「第三者來寫才有效果」才開始這麼做的……"
2802-24 = "啊，好久不見了呢。227號特別班的同志們！"
2802-26 = "實，實里同學？來舊校舍有什麼事嗎……？"
2802-27 = "我，我們，並沒有拖欠施工費用，或是侵犯工務部的權利哦……？"
2802-28 = "……就算是我們，也不總是在罷工示威的哦？"
2802-29 = "算了，我從頭開始說明吧。工務部因為一手掌握了赤冬土木相關的業務，所以學園中的傳聞會自然而然地匯集過來。"
2802-30 = "於是，偶然聽到了過去一同以革命為目標的227號特別班同志們正到處尋求幫助……這樣的消息呢。"
2802-31 = "非，非常感謝……但是現在我們需要的不是土木相關的力量，而是「向事務局提出的請願書」……"
2802-32 = "為了表達227號特別班悲慘的處境，雖然已經拜託了包含「知識解放戰線」在內的各個社團……不過卻沒有收到什麼好的文章。"
2802-33 = "如果是這種事的話，正好是我的專長！"
2802-34 = "良好的工程出自勞動者的團結，勞動者的團結出自良好的演說，良好的演說又出自良好的文筆！"
2802-35 = "原，原來如此……？那麼可以請實里試著寫一次嗎……？"
2802-36 = "嗯，稍等一下！"
2802-41 = "「在舊校舍生活中的227號特別班的學生們，在嚴酷的寒冷之中，因惡劣的寢具和暖房設施而處於水深火熱之中。」"
2802-43 = "「即使考量她們所犯下的過錯，這樣的環境依然過於危險。還請寬恕227號特別班的學生們，能讓她們立刻返回主校舍。」"
2802-44 = "啊……正，正經的文章……"
2802-45 = "怎麼了，一臉意外。我在作文考試裡可沒有拿過滿分以外的分數哦。"
2802-46 = "只要對象和目的都很明確的話，寫出相關的內容並不難。"
2802-47 = "只要再加上一些美麗的詞藻，引起讀者的興趣就完美了！"
2802-48 = "非，非常感謝！如果是這份請願書的話，就算是事務局的幹部們，也一定能理解我們是在多麼嚴酷的環境下忍耐著的！"
2802-49 = "居然能快速地寫出這麼完美的請願書，不愧是工務部的部長！"
2802-51 = "確實是篇好文章……雖然這麼說有點晚了，但潔莉諾會長真的會願意看嗎？"
2802-52 = "說句「好麻煩！」就丟在一邊，連一個字都沒看的可能性也……"
2802-54 = "確，確實……那個毫無責任感的小矮子非常有可能這麼做……"
2802-55 = "不想出讓她忍不住一定要打開信看的方法的話……"
2802-57 = "啊，那我倒是有個好方法唷。"
2802-59 = "在信封上加上這一句……"
2802-61 = "原，原來如此！這樣的話不管是誰都會想要打開信封來看吧！"
2802-64 = "接著為了不讓寄件人被誤會，再加上這些文字……"
2802-66 = "哇，真棒！這樣就完美了！"
2802-67 = "之後只要把這個請願書順利送去事務局，傳達我們的苦衷的話……"
2802-68 = "我們說不定很快就能回到主校舍了……！？"
2802-70 = "（一週後，赤冬事務局內的潔莉諾辦公室）"
2802-71 = "會長，定期報告的時間到了。"
2802-72 = "這週也有從學園各個社團收到送給潔莉諾會長的信。"
2802-73 = "哼哼，不用讀也知道大概的內容了。"
2802-74 = "信上一定滿滿都是讚揚著咱的偉大和鬍子的內容吧？"
2802-75 = "那個，我讀幾封給您聽聽……"
2802-76 = "「不懂薄荷巧克力美味的矮子沒資格當會長」、「假鬍子差不多該拿下來了吧」、「把獨裁當日常的矮子，差不多該醒醒了吧」……像是這樣的內容。"
2802-77 = "什，什麼！？"
2802-78 = "雖，雖然只是信，竟敢正面否定咱和鬍子的權威！"
2802-79 = "智惠！把寄來的信通通拿來！寫出那種東西的傢伙，追到天涯海角也要肅清！"
2802-87 = "……嗯？這封骯髒的信是怎麼回事。信封上好像寫著一些紅字……"
2802-89 = "……「不讀這封信的話就會被詛咒」？"
2802-90 = "智，智惠……！？該，該怎麼辦？不讀這封信的話，咱就要被詛咒了……！？"
2802-91 = "請別在意，那大概只是「詛咒信」而已。"
2802-92 = "「詛咒信」……？"
2802-93 = "是的。寫下很多可怕的內容，並寄給很多人的一種迷信，最近學生之間正在流行。"
2802-94 = "雖然我想那封信裡，恐怕寫著很多可怕的事……不過也只是「虛構的故事」而已。"
2802-95 = "……這，這樣啊。確實總讓人感覺裡面寫著很多可怕的事。"
2802-96 = "在舊校舍裡，因為嚴酷的環境和惡劣的寢具而受苦之類悲慘的內容……"
2802-97 = "雖然是虛構的，不過仍然是件可怕的事……有種中計的感覺……"
2802-98 = "……智惠秘書室長。今天午睡時，請妳在我身邊哦？"
2802-99 = "當，當然絕對，不是因為害怕！只是，那個……"
2802-100 = "當然沒問題，潔莉諾會長。智惠我在會長睡著之前，一定會在身邊守護您的。"
2802-101 = "那封詛咒信，由我來為您處理吧？啊，不如就丟到那邊的火爐裡燒了吧。"
2802-103 = "嗯，就那麼辦吧。"
2802-112 = "好，那麼就重新振作準備下一個工作──"
2802-113 = "（就這樣227號特別班的請願書，化為一搓灰燼消失了……）"
2802-114 = "227號特別班的請願書"

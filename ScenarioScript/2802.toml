[translation]
2802-1 = "#title;특별반을 위한 탄원서 2"
2802-2 = "3;노도카;01;\n#3;em;[...]\n#wait;2500\n#3;a"
2802-3 = "3;노도카;02;\n#3;m2"
2802-4 = "#wait;500"
2802-5 = "#na;<민트초코해방전선>의 탄원서\n#fontsize;80"
2802-6 = "#na;특별반 학생들은 매우 불쌍합니다. 왜냐하면 맛있는 민트초코를 제대로 먹지 못하고 있기 때문입니다."
2802-7 = "#na;그러므로 227호 특별반에 대량의 민트 초코를 지급해야 합니다. 그 외에는 상관없습니다."
2802-8 = "#clearST"
2802-9 = "3;노도카;04;\n#3;m4"
2802-10 = "#wait;400"
2802-11 = "#wait;600"
2802-12 = "#na;<가라아게에 레몬을 반대하는 혁명가들의 모임>의 탄원서\n#fontsize;80"
2802-13 = "#na;특별반 학생들은 인권이 보장되지 않는 극한의 환경에 처해 있습니다. 보급도 제대로 되지 않아, 그들은 식사 때마다 눅눅한 가라아게를 먹고 있다고 합니다."
2802-14 = "#na;그런데 가라아게라는 표현, 이상하지 않아? 내가 살던 곳에서는 닭튀김은 모두 '잔기'라고 불렀다고. 이참에 동아리의 이름을 <잔기에 레몬을 반대하는 혁명가들의 모임>으로 바꾸면 어떨까?"
2802-15 = "#na;가라아게는 가라아게입니다. 다른 표현은 용납할 수 없습니다. 타츠타아게도 마찬가지입니다."
2802-16 = "#na;그럼 잔타래는 뭐라고 불러야 해? 가라타래?"
2802-17 = "#na;레몬즙을 뿌리는 것도 안 되는데 타래 소스를 용납할 리가 없잖아! 네 녀석, 스파이냐?!"
2802-18 = "3;노도카;06;어째서 탄원서로 싸우고 있는 거야, 이 사람들…….\n#3;em;[속상함]\n#3;m3"
2802-19 = "3;노도카;05;게다가 특별반의 생활 개선에는 민트초코도 가라아게도 필요 없다고! 왜 은근슬쩍 자신들의 요구사항을 끼워 넣는 거야?\n#3;hophop"
2802-20 = "1;시구레;11;어쩔 수 없지. 붉은겨울의 학생들은 대개 자신이 관심 있어 하는 분야 외에는 조금도 신경을 쓰지 않으니까…….\n#1;em;[...]\n#1;ar\n#3;m5"
2802-21 = "3;노도카;06;우으, 어쩔 수 없지. 다른 동아리의 학생들이 써주는 것보다는 효과가 덜하겠지만, 직접 반성문을 써서 올리는 수밖에……."
2802-22 = "#wait;2000"
2802-23 = "#all;hide"
2802-24 = "3;미노리;08;오랜만이로군. 227호 특별반의 제군들!\n#3;closeup\n#3;a\n#bgshake\n#fontsize;80"
2802-25 = "#all;hide"
2802-26 = "5;미노리;08\n1;노도카;04;미, 미노리 씨? 구교사에는 어쩐 일이신가요?\n#1;em;[?!]\n#1;stiff"
2802-27 = "1;노도카;04;저, 저희는 딱히 공사 비용을 체납하거나 용역부의 권리를 침해하지 않았는데요?\n#1;hophop"
2802-28 = "5;미노리;06;……우리라고 해서 언제나 파업 시위만 하고 다니는 건 아니거든?\n#5;em;[속상함]\n#5;stiff"
2802-29 = "5;미노리;01;뭐, 경위를 설명하자면…… 용역부에 있다 보면 붉은겨울 학원의 여러 가지 일감과 동시에 학생들의 소문도 자연스럽게 모이게 되는 법이거든."
2802-30 = "5;미노리;07;그런데 듣자 하니, 일전에 함께 혁명을 목표로 한 227호 특별반의 동지들이 여기저기에 도움을 요청하고 있다고 들어서 말이지.\n#5;em;[...]"
2802-31 = "1;노도카;02;도움이 필요한 건 맞지만…… 저희에게 필요한 건 무언가를 고치거나 만드는 일이 아니라, 사무국에 제출할 탄원서였거든요."
2802-32 = "1;노도카;06;특별반의 어려움을 호소하기 위해 <지식해방전선>을 포함한 여러 동아리의 학생들에게 대필을 부탁했지만 좀처럼 제대로 된 글이 나오지 않아서…… 이제 포기하려던 참이었어요.\n#1;em;[속상함]\n#1;stiff"
2802-33 = "5;미노리;01;음, 그런 글이라면 또 내가 전문이지!\n#5;em;[반응]"
2802-34 = "5;미노리;02;좋은 공사는 노동자들의 단결로 완성되고, 노동자들의 단결은 좋은 연설로 완성되고, 좋은 연설은 좋은 글로써 완성되는 법이니까!"
2802-35 = "1;노도카;04;과, 과연…… 그럼 미노리 씨에게 탄원서를 부탁드려도 괜찮을까요?\n#1;em;[?]"
2802-36 = "5;미노리;07;좋아, 잠시만 기다려.\n#5;em;[반짝]\n#5;greeting"
2802-37 = "#st;[0,0];instant;1;"
2802-38 = "#clearST"
2802-39 = "5;미노리;07\n#5;m3\n#1;dl\n#wait;1000"
2802-40 = "#wait;1000"
2802-41 = "5;미노리;99;'구교사에서 생활중인 227호 특별반의 학생들은 가혹한 추위에도 불구하고 열악한 침구와 난방 시설로 인해 고통받고 있습니다…….'\n#5;em;[...]"
2802-42 = "#wait;1000"
2802-43 = "5;미노리;00;'이는 그녀들이 저지른 잘못을 감안하더라도 지나치게 가혹한 환경이므로, 특별반 학생들을 선처하여 즉시 본교사로 복귀시켜 줄 것을 탄원합니다…….'"
2802-44 = "1;노도카;02;어, 어라……? 의외로 제대로 된 탄원서네요?\n#1;em;[?]\n#5;m5\n#1;ar"
2802-45 = "5;미노리;06;의외라니, 실례잖아. 내 작문 시험 점수는 언제나 만점이었다고."
2802-46 = "5;미노리;07;대상과 목적만 확실하게 염두에 두고 있다면 글을 쓰는 건 그다지 어렵지 않아.\n#5;em;[음표]"
2802-47 = "5;미노리;08;그 외의 고려사항이라면, 약간의 미사여구를 곁들여 독자의 흥미를 돋우는 것뿐이지."
2802-48 = "1;노도카;01;감사합니다! 이 탄원서라면 사무국의 간부들도 저희가 얼마나 거친 환경에서 고생을 하고 있는 지 바로 알 수 있을 거예요!\n#1;em;[반응]\n#1;hophop"
2802-49 = "1;노도카;03;이렇게 짧은 시간 내에 완벽한 탄원서를 써주시다니, 역시 용역부의 부장님이시네요!"
2802-50 = "#all;hide"
2802-51 = "3;시구레;06;으음…… 좋은 문장이긴 하지만, 과연 체리노 회장이 이 탄원서를 제대로 읽어 볼까?\n#3;em;[...]\n#3;stiff"
2802-52 = "3;시구레;06;체리노 회장의 성격이라면 첫 문장을 읽기도 전에 귀찮다며 어딘가에 던져버릴 것 같은데……."
2802-53 = "#all;hide"
2802-54 = "3;노도카;04;윽…… 그건 그렇네. 그 무책임한 꼬맹이라면 충분히 그러고도 남지.\n#3;em;[속상함]\n#3;stiff"
2802-55 = "3;노도카;05;뭔가 편지를 열어보지 않고서는 견딜 수 없도록 만들 방법이 또 없을까요?"
2802-56 = "#all;hide"
2802-57 = "3;미노리;03;그런 거라면 좋은 수단이 있지."
2802-58 = "#wait;1000"
2802-59 = "3;미노리;07;봉투 앞에 이렇게, 문장을 추가하면…….\n#3;em;[...]"
2802-60 = "#all;hide"
2802-61 = "3;노도카;03;그렇네요! 이렇게 써 두면 확실히 누구라도 신경이 쓰여서 봉투를 열어볼 거예요.\n#3;em;[반응]\n#3;greeting"
2802-62 = "#all;hide"
2802-63 = "3;미노리;01\n#wait;1000"
2802-64 = "3;미노리;01;거기에 더해 보낸 이를 착각하지 않도록 또 문장을 추가하면……"
2802-65 = "#all;hide"
2802-66 = "3;노도카;01;음, 음! 좋네요! 이걸로 완벽해요!\n#3;hophop"
2802-67 = "3;노도카;99;이제 이 탄원서를 사무국에 보내 저희의 고충을 전달하기만 하면……"
2802-68 = "3;노도카;03;저희의 구교사 생활도 이걸로 끝이에요!\n#3;em;[반짝]\n#fontsize;80"
2802-69 = "#all;hide"
2802-70 = "#na;(1주일 뒤, 붉은겨울 사무국 내 체리노 집무실.)"
2802-71 = "3;토모에;01;회장님, 정기 보고 시간입니다.\n#3;em;[반짝]\n#3;a"
2802-72 = "3;토모에;99;이번주에도 학원 내 여러 동아리에서 회장님께 편지를 보내왔습니다.\n#3;greeting"
2802-73 = "1;체리노;01;후후, 어쩐지 직접 읽지 않아도 내용을 알 것 같군.\n#3;m5\n#1;ar"
2802-74 = "1;체리노;03;분명 편지에는 이 몸의 위대함과 수염을 찬양하는 내용이 가득하겠지?\n#1;em;[반응]\n#1;hophop"
2802-75 = "3;토모에;06;그게, 예로 몇 가지만 읽어보자면……\n#3;em;[속상함]\n#3;stiff"
2802-76 = "3;토모에;04;'민트의 맛도 모르는 꼬마는 회장의 자격이 없다.', '수염 장식은 더는 지겹다.', '독재를 일삼는 꼬맹이는 각성해라.' 등의 내용이 적혀 있습니다.\n#3;em;[...]"
2802-77 = "1;체리노;04;뭐, 뭐라고?!\n#1;m3\n#1;em;[!]\n#1;jump\n#3;dr"
2802-78 = "1;체리노;05;아무리 편지라지만, 이 몸과 수염의 권위를 정면으로 부정하다니!\n#1;stiff"
2802-79 = "1;체리노;05;도착한 편지를 모두 이리 가져오게, 토모에! 편지에 불순한 말을 적은 학생은 끝까지 추적하여 숙청해 버리겠어!\n#1;em;[빠직]\n#1;hophop\n#fontsize;80"
2802-80 = "#st;[0,0];instant;1;"
2802-81 = "#clearST"
2802-82 = "1;체리노;05\n#1;m2"
2802-83 = "#wait;1500"
2802-84 = "1;체리노;05\n#1;m4"
2802-85 = "#wait;2500"
2802-86 = "1;체리노;05\n#1;m3"
2802-87 = "1;체리노;01;……으응? 뭐냐, 이 지저분한 편지는. 봉투 위에 붉은색 글씨로 무어라 적혀 있는데…….\n#1;em;[?]\n#1;stiff"
2802-88 = "1;체리노;99\n#1;em;[...]\n#wait;2500"
2802-89 = "1;체리노;04;<이 편지를 받고 나서 읽지 않으면 저주받는다>라고?"
2802-90 = "1;체리노;04;토, 토모에…… 어, 어떻게 하지? 이 편지를 읽지 않으면 저주받는다는데……?\n#1;em;[땀]\n#1;shake\n#fontsize;55"
2802-91 = "5;토모에;02;신경 쓰지 마세요. 그건 아마도 단순한 <행운의 편지>일 겁니다.\n#5;em;[반응]\n#1;m1\n#5;al"
2802-92 = "1;체리노;02;<행운의 편지>……?\n#1;em;[?]"
2802-93 = "5;토모에;01;네. 불행한 내용을 잔뜩 적어서 다른 사람에게 돌리게 하는 일종의 미신으로, 최근 학생들 사이에서 유행하고 있는 모양이에요."
2802-94 = "5;토모에;03;아마 그 편지의 내용도 불행한 일을 잔뜩 적은 '허구의 이야기'일 겁니다.\n#5;em;[반짝]\n#5;greeting"
2802-95 = "1;체리노;04;……그렇군. 안에도 뭔가 알 수 없는 불행의 이야기가 잔뜩 적혀 있어.\n#1;em;[속상함]\n#1;stiff"
2802-96 = "1;체리노;02;'이 편지는 구교사에서 시작되었으며, 구교사의 학생들은 지금도 가혹한 추위와 열악한 침구로 인해 고통받고 있습니다…….'"
2802-97 = "1;체리노;99;으음, 장난이라지만 묘하게 내용이 신경 쓰이는 걸. 게다가 무언가 잊고 있던 게 떠오를 것 같기도 하고…….\n#1;em;[...]"
2802-98 = "1;체리노;04;……토모에 비서실장. 오늘 낮잠 시간에는 옆에 붙어 있어 주면 안 될까?"
2802-99 = "1;체리노;06;무, 물론 무서워서 그러는 건 절대 아니다! 그저 갑자기 신경 쓰이는 일이 생겨서…….\n#1;em;[땀]\n#1;hophop"
2802-100 = "5;토모에;03;물론이지요, 체리노 님. 회장님께서 잠에 드실 때까지 이 토모에가 옆에서 계속 자리를 지켜드리겠습니다.\n#5;em;[하트]\n#5;greeting"
2802-101 = "5;토모에;01;다만 그 행운의 편지는 제가 처리할까요? 마침 근처에 화로가 있으니 태워버리도록 하죠.\n#5;m3\n#1;dl"
2802-102 = "#all;hide"
2802-103 = "3;체리노;03;음. 그게 좋겠군.\n#3;em;[반짝]\n#3;hophop"
2802-104 = "#all;hide"
2802-105 = "#st;[0,0];instant;1;"
2802-106 = "#clearST"
2802-107 = "3;토모에;99\n#3;greeting\n#wait;1000"
2802-108 = "3;토모에;01\n#3;dr"
2802-109 = "#wait;1500"
2802-110 = "#wait;1000"
2802-111 = "#wait;2500"
2802-112 = "3;체리노;03;자, 그럼 이어서 다음 업무를 보도록 할까…….\n#3;em;[반응]\n#3;closeup"
2802-113 = "#na;(그리하여 227호 특별반을 위한 탄원서는 한 줌의 재가 되어 사라지고 말았다…….)"
2802-114 = "#ENDING;특별반을 위한 탄원서"

[translation]
2802-1 = "A Petition for Spec Ops Part 2"
2802-5 = "Mint Chocolate Liberation Front's Petition"
2802-6 = "The Spec Ops students are suffering because they don't get to eat mint chocolate when they want."
2802-7 = "Therefore, it is of utmost importance that a massive amount of mint chocolate be supplied to Spec Ops No. 227."
2802-12 = "Revolutionaries Against Lemon on Fried Chicken Federation's Petition"
2802-13 = "Spec Ops students are faced with extreme conditions that violate human rights on a daily basis. They're being forced to eat soggy karaage!"
2802-14 = "The word karaage is kinda weird. Where I lived, fried chicken was called \"zangi\". We should be the \"Revolutionaries Against Lemon on Zangi Federation\" instead."
2802-15 = "Karaage is karaage. No other terms are allowed. The same goes for tatsutaage."
2802-16 = "Then what about zantare? Can we call it karatare?"
2802-17 = "We can't even put lemon juice on it. Why would tare sauce be okay?!#nC'mon, are you a spy?!"
2802-18 = "Why are they fighting with each other in a petition?"
2802-19 = "Mint chocolate and karaage won't improve our situation!#nHow dare they put their selfish interests in our petition!"
2802-20 = "Well, Red Winter students are notoriously interested in themselves."
2802-21 = "Ugh. It won't be as effective if another club writes in anyway. I'll just have to do my best..."
2802-24 = "Hiya, Spec Ops No. 227!"
2802-26 = "M-Minori? Why are you here?"
2802-27 = "W-We paid all construction costs and haven't infringed on the rights of the Labor Party at all!"
2802-28 = "We're not always just running around going on strike, you know."
2802-29 = "I should explain... The Labor Party naturally hears many rumors floating around the student community and helps those same students get various jobs."
2802-30 = "Now we've heard that Spec Ops No. 227, with whom we once planned a revolution, have been looking for help."
2802-31 = "We are...but not fixing things or anything like that. We want to write a petition to submit to the Secretariat."
2802-32 = "I asked students from clubs all over to write petitions for us to help capture our struggles, but it hasn't been going well. So, I guess that's that.#nI did my best..."
2802-33 = "Hmm. Well, I'm an expert on that kind of writing!"
2802-34 = "A good project is completed by unified workers, worker unity is achieved through good speeches, and good speeches are achieved through good writing!"
2802-35 = "R-Really? Then do you think I could ask you to help us, Minori?"
2802-36 = "Of course! I'd love to."
2802-41 = "\"The students of Spec Ops No. 227 are suffering in the harsh weather due to poor bedding and heating.\""
2802-43 = "\"This is an overly harsh environment to endure, even considering their past transgressions. I implore you to take the steps to revoke their suspension and return all of them to the main institute.\""
2802-44 = "Wow. You're much better than I expected."
2802-45 = "That's a little rude, you know. I always get an A on my writing tests."
2802-46 = "The important thing about writing is to clearly convey your purpose."
2802-47 = "And, of course, you have to keep your reader interested with a bit of rhetoric."
2802-48 = "Thank you! This petition will help us make the Secretariat understand how horrible our lives are!"
2802-49 = "And you did it so fast! I'm so impressed, Labor Party President!"
2802-51 = "It is pretty good...but do you really think President Cherino will read it?"
2802-52 = "Knowing her, she won't even look at it."
2802-54 = "You're right, Shigure! That irresponsible brat will probably burn it without even opening it!"
2802-55 = "How do we get her to read it?"
2802-57 = "I have an idea!"
2802-59 = "I'll just add this to the front of the envelope..."
2802-61 = "That's perfect! She won't be able to resist after seeing it!"
2802-64 = "Let's add this underneath so she knows exactly who it is too."
2802-66 = "You're a genius, Minori!"
2802-67 = "All that's left is to send our petition to the Secretariat..."
2802-68 = "Then our life in the Former Institute will finally be over!"
2802-70 = "One week later, at Cherino's executive office in the Red Winter Office."
2802-71 = "President, it's time for the weekly report."
2802-72 = "As usual, you have received many letters from different clubs."
2802-73 = "Heehee. I already know what it's about!"
2802-74 = "They're all praising my greatness and incredible mustache!"
2802-75 = "Actually, if you'll allow me to summarize... Ehem!"
2802-76 = "\"A kid who doesn't appreciate mint doesn't deserve to be the president!\"#n\"We're sick of mustaches!\"#n\"The dictator kid needs to wake up!\""
2802-77 = "What did you just say?!"
2802-78 = "How dare they hide behind their letters to challenge the authority of my mustache?!"
2802-79 = "Give me all the letters, Tomoe! I'll purge every last one of them!"
2802-87 = "What's this? There's red writing on the envelope."
2802-89 = "\"If you don't read this letter, you'll be cursed\"?"
2802-90 = "Tomoe! Help! What do I do? I'm going to be cursed!"
2802-91 = "Don't worry. It's likely just a chain letter."
2802-92 = "A chain letter...?"
2802-93 = "Yes. A manipulative message that convinces people to pass it around to others. They've been a popular prank among the students recently."
2802-94 = "It's likely just full of fake, unfortunate events."
2802-95 = "I see. It does talk about a lot of misfortunes."
2802-96 = "\"The students of Spec Ops No. 227 are suffering in the harsh weather due to poor bedding and heating facilities...\""
2802-97 = "How strange. Even though it's a prank, it makes me think of something I feel like I've forgotten..."
2802-98 = "Chief Secretary Tomoe. Accompany me during my nap today."
2802-99 = "I-It's not that I'm scared! The mind of a great leader is simply always busy!"
2802-100 = "Of course, President. I will stay with you as long as you need."
2802-101 = "If you would please, I can burn the chain letter so it no longer affects you."
2802-103 = "That's a good idea, Tomoe."
2802-112 = "All right, let's move on!"
2802-113 = "Thus, Spec Ops No. 227's petition came to nothing but a handful of dust..."
2802-114 = "A Petition for Spec Ops"

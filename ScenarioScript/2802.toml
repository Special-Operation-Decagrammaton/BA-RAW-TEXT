[translation]
2802-1 = "หนังสือคำร้องเพื่อห้องเรียนพิเศษ 2"
2802-5 = "หนังสือคำร้องของ <แนวร่วมปลดปล่อยมินต์ช็อกโกแลต>"
2802-6 = "เหล่านักเรียนห้องเรียนพิเศษช่างน่าสงสาร เพราะว่ายังไม่เคยได้กินมินต์ช็อกโกแสนอร่อยเลยค่ะ"
2802-7 = "เพราะฉะนั้นควรจะมีการมอบมินต์ช็อกโกจำนวนมากให้แก่นักเรียนห้องเรียนพิเศษ นอกเหนือจากนั้นก็ไม่มีปัญหาอะไรค่ะ"
2802-12 = "หนังสือคำร้องของ <กลุ่มนักปฏิวัติที่ต่อต้านเลมอนในคาราอะเกะ>"
2802-13 = "เหล่านักเรียนห้องเรียนพิเศษอยู่ในสภาพแวดล้อมอันโหดร้ายที่ละเมิดสิทธิมนุษยชน นอกจากนี้ยังไม่ได้รับการแจกจ่ายเสบียงอย่างถูกต้อง พวกเขาต้องกินคาราอะเกะที่เปียกชุ่มทุกมื้อค่ะ"
2802-14 = "แต่คำว่าคาราอาเกะมันไม่แปลกๆ เหรอ? ที่ที่ฉันเคยอยู่เรียกไก่ทอดแบบนั้นว่า 'ไก่ป๊อบ' หมดเลยนะ ถ้างั้นควรเปลี่ยนชื่อชมรมเป็น <กลุ่มนักปฏิวัติที่ต่อต้านเลมอนในไก่ป๊อบ> ดีกว่ามั้ย?"
2802-15 = "คาราอะเกะก็คือคาราอะเกะ ไม่สามารถอธิบายได้ด้วยคำอื่น ทัตสึตะอะเกะก็เช่นกัน"
2802-16 = "ถ้างั้นเทมปุระซอสทาเระจะเรียกว่าอะไร? คาราทาเระเหรอ?"
2802-17 = "ใส่น้ำมะนาวไม่ได้ ซอสทาเระก็ต้องไม่ได้อยู่แล้ว! เจ้านี่ เป็นสปายรึไง?!"
2802-18 = "ทำไมต้องมาทะเลาะกันเพราะหนังสือคำร้องด้วยคะ คนพวกนี้นี่..."
2802-19 = "และอีกอย่างการจะปรับปรุงชีวิตในห้องเรียนพิเศษก็ไม่ต้องใช้มินต์ช็อกโกหรือคาราอะเกะด้วยค่ะ! ทำไมถึงแอบใส่ข้อเรียกร้องของตัวเองลงไปล่ะคะ?"
2802-20 = "ก็ช่วยไม่ได้นะ นักเรียนของสหภาพเรดวินเทอร์มักจะไม่สนใจอย่างอื่นนอกจากสิ่งที่พวกเขาสนใจ..."
2802-21 = "อืม... ช่วยไม่ได้สินะคะ ถ้าอย่างนั้นก็คงต้องเขียนข้อความสำนึกผิดแล้วก็โพสต์ลงเอง ถึงจะไม่ได้ประสิทธิภาพเท่ากับที่นักเรียนจากชมรมอื่นเขียนให้ก็เถอะ"
2802-24 = "ไม่เจอกันนานเลย เจ้าพวกห้องพิเศษ 227!"
2802-26 = "คะ... คุณมิโนริ? มีธุระอะไรที่อาคารเรียนเก่าอย่างนั้นเหรอคะ?"
2802-27 = "พะ.. พวกเราไม่ได้ค้างชำระค่าก่อสร้างหรือไปละเมิดสิทธิของชมรมผู้รับจ้างเลยนะคะ?"
2802-28 = "... พวกเราก็ไม่ได้เอาแต่ประท้วงหยุดงานตลอดเวลาหรอกนะ?"
2802-29 = "ก็นะ ถ้าอธิบายอย่างง่ายๆ ละก็... พออยู่ในชมรมผู้รับจ้างแบบนี้ก็จะสามารถรวบรวมข่าวลือต่างๆ จากนักเรียนทั่วทั้งสหภาพเรดวินเทอร์ได้ง่ายไงล่ะ"
2802-30 = "พอได้ยินว่านักเรียนห้องเรียนพิเศษ 227 ที่เคยอุดมการณ์ในการปฏิวัติร่วมกันกำลับเผชิญเรื่องยากลำบากกำลังต้องการความช่วยเหลือก็เลยมาน่ะสิ"
2802-31 = "เราต้องการความช่วยเหลือก็จริง... แต่เราไม่ได้ต้องการให้ช่วยซ่อมหรือว่าสร้างอะไร แค่ต้องการส่งหนังสือคำร้องไปถึงสำนักเลขาธิการค่ะ"
2802-32 = "เราได้ขอความช่วยเหลือไปทาง <ชมรมแนวร่วมปลดปล่อยความรู้> และชมรมอื่นๆ ให้ช่วยเขียนหนังสือคำร้องเพื่อที่จะร้องทุกข์เกี่ยวกับความยากลำบากของนักเรียนห้องเรียนพิเศษ แต่ก็ไม่ได้อย่างที่หวัง... ตอนนี้พวกเรากำลังจะยอมแพ้พอดีเลยค่ะ"
2802-33 = "อืม ถ้าให้เขียนอะไรแบบนั้นน่ะของถนัดฉันเลย!"
2802-34 = "การก่อสร้างที่ดีจะสมบูรณ์แบบได้ด้วยความสามัคคีของเหล่าแรงงาน และเพื่อที่จะให้เหล่าแรงงาน#nสามัคคีกันก็ต้องมีการปราศรัยที่ดี และการปราศรัยที่สมบูรณ์แบบก็เกิดมาจากการเขียนที่ดีไงล่ะ!"
2802-35 = "อะฮ่ะฮ่า... ถะ...ถ้างั้นคุณมิโนริช่วยเขียนหนังสือคำร้องให้ได้มั้ยคะ?"
2802-36 = "ได้เลย รอแป๊บนึงนะ"
2802-41 = "'เหล่านักเรียนห้องพิเศษ 227 ที่อาศัยอยู่ในอาคารเรียนเก่ากำลังประสบกับความลำบากยากแค้น ต้องใช้เตียงนอนและเครื่องทำความร้อนที่ไม่ได้คุณภาพท่ามกลางความหนาวเย็นอันโหดร้าย...'"
2802-43 = "'และถึงแม้ว่าพวกเธอจะมีความผิดแต่นี่ก็เป็นสภาพแวดล้อมที่โหดร้ายเกินไปมาก จึงร้องขอให้มีคำสั่งอนุญาตให้เหล่านักเรียนห้องพิเศษกลับไปที่อาคารเรียนหลักทันที...'"
2802-44 = "อะ...เอ๋? เป็นหนังสือคำร้องที่ยอดเยี่ยมอย่างคาดไม่ถึงเลยนะคะเนี่ย?"
2802-45 = "คาดไม่ถึงงั้นเหรอ เสียมารยาทจังนะ ฉันสอบเขียนเรียงความได้เต็มทุกครั้งเลยนะรู้มั้ย"
2802-46 = "ขอแค่มีเป้าหมายและจุดประสงค์ที่แน่ชัดอยู่ในใจ การเขียนก็ไม่มีอะไรยาก"
2802-47 = "สิ่งที่ต้องคำนึงถึงนอกเหนือจากนั้นก็มีแค่การใช้วาทศิลป์เล็กๆ น้อยๆ มาดึงดูดความสนใจของผู้อ่าน#nเท่านั้นเอง"
2802-48 = "ขอบคุณมากค่ะ! หนังสือคำร้องนี้จะต้องทำให้ผู้บริหารของสำนักเลขาธิการรู้ซึ้งถึงความยากลำบาก#nของพวกเราแน่นอนค่ะ!"
2802-49 = "เขียนหนังสือคำร้องที่สมบูรณ์แบบได้ในเวลาสั้นแค่นี้ สมกับที่เป็นประธานชมรมผู้รับจ้างเลยนะคะ!"
2802-51 = "อืม... เป็นประโยคที่แสนกินใจก็จริง แต่สุดท้ายประธานเชริโน่จะหยิบหนังสือคำร้องนี้ไปอ่านรึเปล่านะ?"
2802-52 = "ถ้าตามนิสัยของประธานเชริโน่ก็คงจะรำคาญแล้วโยนทิ้งไปตั้งแต่ยังไม่ได้อ่านประโยคแรกด้วยซ้ำละมั้ง..."
2802-54 = "อึ่ก... จริงด้วยสินะคะ ถ้าเป็นเด็กตัวกะเปี๊ยกไร้ความรับผิดชอบนั่นอาจทำแบบนั้นได้ก็ได้นะคะ"
2802-55 = "ไม่มีวิธีไหนที่จะทำให้อยากเปิดจดหมายจนทนไม่ไหวบ้างเหรอคะ?"
2802-57 = "ถ้าเรื่องนั้นละก็ ฉันมีวิธีดีๆ อยู่นะ"
2802-59 = "ก็แค่เขียนประโยคไว้หน้าซองแบบนี้..."
2802-61 = "จริงด้วยค่ะ! ถ้าเขียนประโยคนี้ไว้ ไม่ว่าใครก็คงสนใจและต้องเปิดซองดูแน่นอนค่ะ"
2802-64 = "แล้วก็เพิ่มประโยคนี้ไปด้วยจะได้ไม่เข้าใจผิดเรื่องผู้ส่ง..."
2802-66 = "อืม…! ยอดเลยค่ะ! เพียงเท่านี้ก็สมบูรณ์แบบแล้วค่ะ!\n"
2802-67 = "ทีนี้ก็เหลือแค่ส่งหนังสือคำร้องไปที่สำนักเลขาธิการเพื่อถ่ายทอดความยากลำบากของเรา จากนั้น..."
2802-68 = "ชีวิตในอาคารเรียนเก่าของพวกเราก็จะสิ้นสุดลงสักทีนะคะ!"
2802-70 = "(หนึ่งสัปดาห์ถัดมา ห้องทำงานของเชริโน่ในสำนักเลขาธิการเรดวินเทอร์)"
2802-71 = "ท่านประธานได้เวลาอ่านรายงานแล้วค่ะ"
2802-72 = "สัปดาห์นี้มีนักเรียนจากหลายชมรมส่งจดหมายมาถึงท่านประธานค่ะ\n"
2802-73 = "หุหุ ถึงแม้จะยังไม่ได้อ่านก็พอจะเดาเนื้อหาออกละนะ"
2802-74 = "เนื้อหาในจดหมายก็คงจะเต็มไปด้วยคำสรรเสริญความยิ่งใหญ่ของเราและอวยยศหนวดของเราใช่มั้ยล่ะ?"
2802-75 = "คือว่า... ลองอ่านเนื้อหาดูสักสองสามฉบับแล้ว..."
2802-76 = "'เด็กที่ไม่รู้จักรสชาติของมินต์ไม่ควรค่าจะเป็นประธาน' 'เบื่อหนวดปลอมนั่นแล้ว' 'เจ้าเด็กจอมเผด็จการตั้งสติได้แล้ว' เนื้อหาประมาณนี้ค่ะ"
2802-77 = "ฮะ? ว่าไงนะ?"
2802-78 = "ถึงจะเป็นแค่จดหมาย แต่กล้าที่จะปฏิเสธอำนาจของเราและหนวดของเราซึ่งๆ หน้าอย่างงั้นเหรอ!\n"
2802-79 = "เอาจดหมายที่ส่งมามานี่ให้หมดเลย โทโมเอะ! ไปตามตัวนักเรียนที่เขียนข้อความพวกนี้แล้วลงโทษให้หมดทุกคนเลย!"
2802-87 = "หืม...? อะไรนะ ที่ซองจดหมายสกปรกพวกนั้นมีตัวอักษรสีแดงเขียนไว้ว่า..."
2802-89 = "<ถ้าหากได้รับจดหมายแล้วไม่เปิดอ่านจะโดนสาป> งั้นเหรอ?"
2802-90 = "ทะ...โทโมเอะ... ทะ...ทำยังไงดีล่ะ? ถ้าไม่อ่านจดหมายพวกนี้จะโดนสาปล่ะ...?"
2802-91 = "ไม่ต้องห่วงไปหรอกค่ะ นั่นน่าจะเป็นแค่ <จดหมายลูกโซ่> เท่านั้นค่ะ"
2802-92 = "<จดหมายลูกโซ่>...?\n"
2802-93 = "ค่ะ เป็นความเชื่องมงายประเภทหนึ่งเกี่ยวกับการเขียนเรื่องโชคร้ายแล้วส่งต่อให้คนอื่นค่ะ ดูเหมือนว่าช่วงนี้จะกำลังเป็นที่นิยมในหมู่นักเรียนนะคะ"
2802-94 = "เรื่องโชคร้ายที่เขียนอยู่เต็มจดหมายนั่นก็คงเป็นแค่ 'เรื่องราวเพ้อเจ้อ' เท่านั้นค่ะ"
2802-95 = "... อย่างนั้นสินะ ข้างในก็มีแต่เรื่องราวโชคร้ายอะไรไม่รู้เต็มไปหมด"
2802-96 = "'จดหมายนี้มาจากอาคารเรียนเก่า เหล่านักเรียนที่อาคารเรียนเก่าต้องทนทุกข์ทรมานจากความ#nหนาวจัดและที่นอนอันไร้คุณภาพ...'"
2802-97 = "อืม... ถึงจะเป็นแค่เรื่องล้อเล่น แต่เนื้อหานี่ก็ทำให้รู้สึกแปลกๆ นะ รู้สึกเหมือนเราจะลืมอะไรไปสักอย่างเลย...\n"
2802-98 = "...หัวหน้าเลขานุการโทโมเอะ วันนี้อยู่กับเราตอนนอนกลางวันได้มั้ย?"
2802-99 = "นะ...แน่นอนว่าไม่ใช่เพราะเรากลัวหรอกนะ! ก็แค่มีเรื่องกังวลใจขึ้นมาเท่านั้นเอง..."
2802-100 = "แน่นอนอยู่แล้วค่ะท่านเชริโน่ โทโมเอะจะคอยอยู่ข้างๆ จนกว่าท่านประธานจะหลับค่ะ"
2802-101 = "แล้วก็จดหมายลูกโซ่ฉบับนี้ให้ฉันเป็นคนจัดการเลยดีมั้ยคะ? แถวนี้มีเตาไฟอยู่พอดี ฉันจะเอาไปเผาให้ค่ะ"
2802-103 = "อืม ถ้าอย่างนั้นก็ดีเลย"
2802-112 = "เอาละ ถ้างั้นก็มาลุยงานต่อกันเลย..."
2802-113 = "(ด้วยเหตุนี้หนังสือคำร้องเพื่อนักเรียนห้องพิเศษ 227 จึงได้กลายเป็นเถ้าถ่านและสลายไป...)"
2802-114 = "หนังสือคำร้องเพื่อห้องเรียนพิเศษ"

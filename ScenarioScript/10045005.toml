[translation]
10045005-1 = "Prologue;The Hyakkaryouran's Social Outing"
10045005-4 = "Endlessly clear, blue skies. The heat of an unrelenting sun.#nSummer has arrived!"
10045005-5 = "This is a story of friendship and youth."
10045005-8 = "And just why am I here again?"
10045005-9 = "A beautiful day such as today should be spent in leisure, namely while reviewing military history."
10045005-10 = "So why, pray tell, am I at the beach?"
10045005-11 = "A sparkling blue ocean with my friends, with a clear sky and white clouds! And a refreshing swimsuit, to boot! My dreams have at last found their way to reality!"
10045005-12 = "We shall not dilly-dally for a moment longer! To the water, my friends!"
10045005-13 = "Go ahead. Have fun."
10045005-17 = "Aw, c'mon! You agreed to come on a social outing with all of us!"
10045005-18 = "Yes, I did. At which point did I agree to coming to the beach, however?"
10045005-20 = "Kikyou... Is... Is it me? Is it because you wish it were not me you were here with?"
10045005-22 = "No, not at all, Yukari. It's just..."
10045005-23 = "I dislike outdoor activities."
10045005-29 = "Kikyou is the definition of a homebody."
10045005-30 = "It would be quite criminal to come all this way and not enjoy all the great ocean has to offer us! "
10045005-36 = "So, Kikyou, let us sail forth to waters unknown! "
10045005-37 = "Um..."
10045005-38 = "Kikyou does as Kikyou pleases, Yukari. Just leave her be."
10045005-39 = "We'll go first! Come join us if you change your mind, okay?"
10045005-43 = "Fufu. I will eagerly await you in the water!"
10045005-47 = "...Whew."
10045005-51 = "...My apologies. I was the one who elected to come here for our social outing."
10045005-52 = "No. They were equally as excited."
10045005-53 = "Who was I to rain on everyone's parade?"
10045005-54 = "Fufu. So considerate."
10045005-55 = "Be sure to do a little stretching."
10045005-56 = "After all, it'll start shortly."
10045005-57 = "Hyakkiyako's summer tradition..."
10045005-59 = "[log=나구사 수영복]The Hyakkiyako Water Festival[/log]"
10045005-65 = "(...How did it come to this?)"
10045005-66 = "(I acquiesced to the others' desires to participate in a water event...)"
10045005-67 = "(Despite the fact that I'm unable to swim...!)"
10045005-72 = "It truly was a stroke of luck. To think that we would all be drawn from the raffle, out of all of the hopeful participants."
10045005-73 = "...Yes. It was a rather unexpected turn of events."
10045005-74 = "(Especially when I so fervently hoped that I, at least, would not get picked.)"
10045005-75 = "Is everything well, Kikyou? Perhaps there's something on your mind?"
10045005-76 = "...I was simply formulating a plan."
10045005-77 = "One to help guide us to a splendid victory."
10045005-79 = "How very like you."
10045005-80 = "As usual, I put my trust in you."
10045005-81 = "(Exactly. I must figure out an escape.)"
10045005-85 = "(I refuse to allow everyone to discover that the Hyakkaryouran's operations officer is afraid of water!)"

[translation]
10045005-1 = "序幕;百花繚亂的團結大會"
10045005-4 = "晴朗的天空，炙熱的太陽。#n夏天，就在此處。"
10045005-5 = "這是一段，由友情與青春交織而成的盛夏物語──"
10045005-8 = "我為什麼會在這裡……？"
10045005-9 = "平常的話，這種天氣我應該在房裡讀兵法書，悠閒度日才對。"
10045005-10 = "怎麼會來到海邊……"
10045005-11 = "與前輩們一同面對蔚藍大海！白雲！還有清涼的泳裝！#n是小女子一直夢寐以求的場景呢！"
10045005-12 = "好！現在可不是悠哉的時候！#n快！快去海邊吧！"
10045005-13 = "我就算了，你們自己去吧。"
10045005-17 = "咦，怎麼這樣？這可是團結大會耶？#n你不是也同意了嗎？"
10045005-18 = "我同意的是團結大會，沒同意要來海邊。"
10045005-20 = "桔梗前輩……是不喜歡和小女子一起來海邊嗎……？"
10045005-22 = "不，不是那樣。我只是……"
10045005-23 = "……只是討厭戶外活動而已。"
10045005-29 = "桔梗前輩果然是室內派呢。"
10045005-30 = "但是既然來到這裡卻不享受大海，無論如何都說不過去！"
10045005-36 = "來吧桔梗前輩！我們走！"
10045005-37 = "唔唔唔……"
10045005-38 = "算了算了，我們就別管他了吧。#n一直強迫不願意的人也不太好。"
10045005-39 = "那我們先下水囉，想通了就隨時過來吧！"
10045005-43 = "呵呵呵，小女子會等著前輩的！"
10045005-47 = "……呼。"
10045005-51 = "……抱歉，早知道應該把團結大會辦在其他地方的。"
10045005-52 = "別這麼說，大家不是都想來這裡嗎。"
10045005-53 = "難得氣氛正好，我總不能因為自己的固執潑冷水吧？"
10045005-54 = "呵呵，原來如此。謝謝你。"
10045005-55 = "不過還是先做點暖身比較好。"
10045005-56 = "因為馬上就要開始了。"
10045005-57 = "百鬼夜行的，夏日風物詩──"
10045005-59 = "[log=나구사 수영복]百夜水上祭[/log]"
10045005-65 = "（……到底為什麼會變成這樣）"
10045005-66 = "（竟然隨著氣氛參加了水上活動）"
10045005-67 = "（明明我完全不會游泳，居然還……！）"
10045005-72 = "我們的運氣真不錯呢。#n因為參加者太多的關係還得抽籤，結果所有人都抽中了。"
10045005-73 = "……是啊，大家都中籤確實出乎意料。"
10045005-74 = "（雖然我其實希望自己落選就是了……）"
10045005-75 = "桔梗，你沒事吧？#n有什麼煩惱嗎？"
10045005-76 = "……我在思考計策。"
10045005-77 = "華麗又必勝的計策。"
10045005-79 = "原來如此。"
10045005-80 = "我相信桔梗肯定會想出很棒的計策的。"
10045005-81 = "當然……我一定得想出來才行。"
10045005-85 = "百花繚亂的作戰參謀居然怕水這種事，絕對不能被其他人發現……！"

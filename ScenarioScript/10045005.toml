[translation]
10045005-1 = "บทเริ่มต้น;การแข่งขันกระชับมิตรเฮียกกะเรียวรัน"
10045005-4 = "ดวงอาทิตย์เจิดจ้าใต้ท้องฟ้าสดใสสุดลูกหูลูกตา #nฤดูร้อนอยู่ตรงหน้า"
10045005-5 = "พร้อมเรื่องราวที่เต็มไปด้วยมิตรภาพและช่วงเวลาแห่งวัยรุ่นของทุกคน"
10045005-8 = "ทำไมฉันถึงมาอยู่ตรงนี้นะ...?"
10045005-9 = "ปกติในวันแบบนี้ฉันควรไปอ่านตำรายุทธศาสตร์แล้วใช้เวลาแบบเด็กอินโทรเวิร์ตอยู่ในห้องสิ"
10045005-10 = "ทำไมฉันถึงมาที่ทะเลกันนะ..."
10045005-11 = "รุ่นพี่กับทะเลสีฟ้า! ก้อนเมฆสีขาว! และชุดว่ายน้ำที่สดใส! นี่คือวันที่ข้าใฝ่ฝันมาตลอดเลยเจ้าค่ะ!"
10045005-12 = "เอาละ! นี่ไม่ใช่เวลามาเอื่อยเฉื่อยอยู่อย่างนี้! เรารีบไปลงน้ำกันเถอะเจ้าค่ะ!"
10045005-13 = "ฉันขอผ่าน พวกเธอไปเล่นกันเถอะ"
10045005-17 = "อ้าว ทำไมล่ะ? นี่คือการแข่งขันกระชับมิตรนะ แล้วเธอก็เป็นคนตอบตกลงเองด้วย"
10045005-18 = "ฉันตกลงกับการแข่งขันกระชับมิตร แต่ไม่ได้เห็นด้วยที่จะมาทะเลสักหน่อย"
10045005-20 = "รุ่นพี่คิเคียว... ไม่อยากเล่นน้ำทะเลกับข้าเหรอเจ้าคะ...?"
10045005-22 = "มะ... ไม่ใช่แบบนั้นสักหน่อย ฉันก็แค่..."
10045005-23 = "แค่ไม่ชอบออกมาทำกิจกรรมกลางแจ้งก็เท่านั้น..."
10045005-29 = "รุ่นพี่คิเคียวเป็นคนติดบ้านนี่เองสินะเจ้าคะ"
10045005-30 = "แต่ในเมื่อมาถึงที่นี่แล้ว ถ้าไม่สนุกกับทะเลละก็คงน่าเสียดายแย่เลยเจ้าค่ะ!"
10045005-36 = "เอาละ รุ่นพี่คิเคียว! ไปกันเถอะเจ้าค่ะ!"
10045005-37 = "อะ... อืม..."
10045005-38 = "ปล่อยไปเถอะน่า ไปบังคับคนที่เค้าไม่อยากทำน่ะ มันไม่ใช่เรื่องดีหรอกนะ"
10045005-39 = "งั้นพวกฉันจะลงน้ำไปก่อน ถ้าเปลี่ยนใจก็ตามมาล่ะ!"
10045005-43 = "ฮุฮุฮุ ข้าจะรอนะเจ้าคะรุ่นพี่!"
10045005-47 = "ฮู่ว..."
10045005-51 = "ขอโทษนะ... รู้งี้ฉันไปจัดการแข่งขันกระชับมิตรที่อื่นก็ดี"
10045005-52 = "ไม่หรอก ก็ทุกคนอยากมาที่นี่ไม่ใช่เหรอ"
10045005-53 = "เราไม่ได้มีบรรยากาศแบบนี้มานานแล้ว ฉันคงให้ความดื้อดึงของฉันทำให้บรรยากาศกร่อยไม่ได้หรอก"
10045005-54 = "ฮุฮุ งั้นเหรอ? ขอบใจนะ"
10045005-55 = "แต่ยังไงก็วอร์มร่างกายเอาไว้ก่อนก็ดีนะ"
10045005-56 = "งานใกล้จะเริ่มขึ้นแล้ว"
10045005-57 = "ธรรมเนียมฤดูร้อนของเฮียกคิยาโค..."
10045005-59 = "[log=나구사 수영복]เทศกาลสวนน้ำเฮียกคิยาโค[/log]"
10045005-65 = "(ทำไมถึงกลายเป็นอย่างนี้ไปได้นะ...)"
10045005-66 = "(บรรยากาศพาไปจนได้มาเข้าร่วมเทศกาลสวนน้ำซะงั้น)"
10045005-67 = "(ฉันที่ว่ายน้ำไม่เป็นเลยสักนิด ทำไมถึงได้...!)"
10045005-72 = "โชคดีจริงๆ เลยนะ เห็นว่าปีนี้มีผู้เข้าร่วมเยอะมากจนต้องจับฉลากกันเลย แต่พวกเราก็โชคดีจับฉลาก#nได้กันหมด"
10045005-73 = "นั่นสิ... ฉันคาดไม่ถึงจริงๆ ว่าพวกเราจะจับฉลากได้ทุกคน"
10045005-74 = "(อุตส่าห์แอบหวังว่าฉันจะจับฉลากไม่ได้เสียอีก...)"
10045005-75 = "คิเคียว? เป็นอะไรหรือเปล่า? มีเรื่องกังวลอะไรงั้นเหรอ?"
10045005-76 = "ฉันกำลังคิดกลยุทธ์อยู่น่ะ..."
10045005-77 = "กลยุทธ์อันชาญฉลาดที่จะเอาชนะได้อย่างสวยงาม"
10045005-79 = "อย่างนั้นสินะ"
10045005-80 = "งั้นฉันจะเชื่อกลยุทธ์ของคิเคียวนะ"
10045005-81 = "อืม... ต้องคิดให้ออกให้ได้เลย"
10045005-85 = "จะให้ใครรู้ไม่ได้ว่าที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันกลัวน้ำ...!"

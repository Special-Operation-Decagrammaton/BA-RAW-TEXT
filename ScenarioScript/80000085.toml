[translation]
80000085-1 = "#title;SRT, 보급합니다!"
80000085-2 = "#na;(발렌타인 데이를 앞둔 어느 날, 미야코의 부탁을 받고 샬레의 조리 실습실을 열어주었다.)"
80000085-3 = "#st;[0,0];instant;1;"
80000085-4 = "#clearST"
80000085-5 = "#wait;1500"
80000085-6 = "#wait;2000"
80000085-7 = "3;미야코;03;샬레의 조리실을 빌려주셔서 감사합니다, 선생님.\n#3;a\n#3;em;[음표]\n#3;greeting"
80000085-8 = "3;미야코;02;간단하게 불을 피우고 요리를 하는 것이라면 공원의 화덕에서 해도 괜찮았겠지만……"
80000085-9 = "3;미야코;03;오늘의 요리는 다른 소대원들에게는 비밀로 하고 싶었거든요."
80000085-10 = "[s] \"괜찮아. 필요하면 언제든 찾아와 줘.\""
80000085-11 = "#wait;1500"
80000085-12 = "[ns] \"그나저나 무슨 요리이기에 비밀로 하려던 거야?\""
80000085-13 = "3;미야코;02;그게…… 얼마 뒤면 곧 발렌타인 데이잖아요?"
80000085-14 = "3;미야코;99;그래서인지 벌써부터 거리 곳곳에서 달콤한 향기가 나는 초콜릿을 전시해두고 있는데, 캠프에는 딱딱하고 쓴 군용 초콜릿밖에 없는지라……\n#3;em;…"
80000085-15 = "3;미야코;01;언제나 고생하는 소대원들을 위해 무언가 달콤한 디저트를 만들어 주고 싶었거든요."
80000085-16 = "3;미야코;02;그러고보니 버터와 계란, 설탕도 빌려주셔서 감사합니다.\n#3;em;[반응]"
80000085-17 = "3;미야코;02;제가 가지고 있는 식재료만으로는 조금 부족했거든요."
80000085-18 = "3;미야코;03;선생님이 도와주시지 않았더라면 이번 작전도 계획에서 그치고 말았을 거예요."
80000085-19 = "[s] \"신경 쓰지 마. 식재료가 남아서 곤란하던 참이었으니까.\""
80000085-20 = "3;미야코;07;후훗. 감사합니다."
80000085-21 = "#st;[0,0];instant;1;"
80000085-22 = "#clearST"
80000085-23 = "#wait;3500"
80000085-24 = "3;미야코;02;아, 타이머가 울리고 있네요.\n#3;em;[반응]"
80000085-25 = "3;미야코;07;오븐에서 빵을 꺼내야겠어요."
80000085-26 = "#st;[0,0];instant;1;"
80000085-27 = "#clearST"
80000085-28 = "3;미야코;03\n#3;m4\n#wait;1500"
80000085-29 = "3;미야코;03\n#3;greeting\n#wait;1500"
80000085-30 = "3;미야코;03\n#3;m5\n#wait;2500"
80000085-31 = "[ns] \"우와, 이게 다 뭐야?\""
80000085-32 = "3;미야코;07;초콜릿을 넣은 당근 케이크예요.\n#3;em;[반응]"
80000085-33 = "3;미야코;03;케이크 반죽에 당근을 잘게 썰어서 넣으면 식감도 좋고, 단맛도 부드러워져서 베이킹을 할 때는 자주 애용한답니다.\n#3;m3"
80000085-34 = "3;미야코;07;……물론 밀가루를 아낄 수 있다는 장점이 제일 크지만요.\n#3;em;[땀]"
80000085-35 = "[s] \"미야코는 어디서 이런 베이킹을 배운 거야?\""
80000085-36 = "3;미야코;02;정식으로 배운 것은 아니지만 특수부대는 야외에서 야영을 할 때가 많으니까요. 간단한 요리 정도는 배워 두면 여러모로 쓸 일이 많답니다."
80000085-37 = "3;미야코;03;SRT 학원에 있을 때에는 가끔 반합을 오븐 삼아 작은 빵을 구워 먹기도 했거든요."
80000085-38 = "3;미야코;07;후후, 어쩐지 그립네요……"
80000085-39 = "3;미야코;02;어디…… 네 개를 구웠으니, 세 개는 소대원들에게 주고……\n#3;m2"
80000085-40 = "#st;[0,0];instant;1;"
80000085-41 = "#clearST"
80000085-42 = "3;미야코;01\n#3;m3\n#wait;1000"
80000085-43 = "3;미야코;01\n#3;m4\n#wait;1000"
80000085-44 = "3;미야코;01\n#3;em;…\n#wait;2500"
80000085-45 = "3;미야코;99\n#3;d\n#wait;1000"
80000085-46 = "#all;hide"
80000085-47 = "3;미야코;09\n#3;a\n#3;closeup\n#wait;1000"
80000085-48 = "3;미야코;09;선생님, 이 케이크는 선생님이 받아주세요.\n#3;greeting\n#3;closeup"
80000085-49 = "3;미야코;03;모처럼 요리를 만든 김에 평소의 보답을 하고 싶었어요.\n#3;closeup"
80000085-50 = "[s1] \"하지만 이 케이크는……\"\n[s2] \"미야코의 몫 아니야?\""
80000085-51 = "3;미야코;02;괜찮아요. 저는 만들면서 조금씩 맛을 보기도 했고……\n#3;em;…"
80000085-52 = "3;미야코;02;괜찮아요. 저는 만들면서 조금씩 맛을 보기도 했고……\n#3;em;…"
80000085-53 = "3;미야코;09;지나친 달콤함은 토끼에게 해롭다고 하니까요."
80000085-54 = "3;미야코;02;네? 이 케이크 하나를 같이 나누어 먹자고요?\n#3;em;[?]"
80000085-55 = "3;미야코;04;하지만 워낙 작은 케이크라. 혼자 먹기에도 작은 양인데…… 괜찮으시겠어요?"
80000085-56 = "[s3] \"지나친 달콤함은 토끼뿐만 아니라……\"\n[s4] \"어른도 당분은 조심해야 하거든.\""
80000085-57 = "3;미야코;07;후후, 그런가요……\n#3;em;[재잘]"
80000085-58 = "3;미야코;07;후후, 그런가요……\n#3;em;[재잘]"
80000085-59 = "3;미야코;03;그럼 감사히. 잘 먹겠습니다.\n#3;greeting"
80000085-60 = "#all;hide"
80000085-61 = "#na;(이후, 미야코와 함께 달콤한 당근 케이크를 나누어 먹었다.)"

[translation]
80000085-1 = "SRT ปฏิบัติการส่งของ!"
80000085-2 = "(ก่อนถึงวันวาเลนไทน์ คุณครูเปิดห้องคหกรรมของชาเล่ต์ให้ตามที่มิยาโกะขอร้อง)"
80000085-7 = "ขอบคุณที่ให้ยืมใช้ห้องคหกรรมนะคะคุณครู"
80000085-8 = "ถ้าจะใช้ไฟทำอาหารแบบทั่วไป ก็คงก่อกองไฟที่สวนสาธารณะได้..."
80000085-9 = "แต่อาหารที่จะทำวันนี้ ฉันอยากเก็บเป็นความลับไม่ให้สมาชิกคนอื่นๆ รู้ค่ะ"
80000085-10 = "[s] \"ไม่เป็นไร ถ้าอยากใช้เมื่อไหร่ก็มาได้ตลอดเลย\""
80000085-12 = "[ns] \"ว่าแต่ว่าอาหารลับที่จะทำคืออะไรเหรอ?\""
80000085-13 = "เรื่องนั้น... อีกไม่นานก็จะถึงวันวาเลนไทน์แล้วใช่มั้ยล่ะคะ?"
80000085-14 = "อาจเป็นเพราะแบบนั้น เลยมีช็อกโกแลตที่มีกลิ่นหอมหวานวางขายอยู่ทุกที่ แต่ว่าที่แคมป์ของเรา#nมีแค่ช็อกโกแลตแข็งๆ รสเฝื่อนๆ สำหรับทหาร..."
80000085-15 = "ฉันเลยอยากทำขนมหวานอร่อยๆ สักอย่างให้กับสมาชิกที่ทำงานหนักอยู่ตลอดน่ะค่ะ"
80000085-16 = "แล้วก็ขอบคุณที่ให้ยืมน้ำตาล ไข่แล้วก็เนยด้วยนะคะ"
80000085-17 = "ถ้าใช้แค่วัตถุดิบที่ฉันมีก็คงไม่พอแน่ๆ ค่ะ"
80000085-18 = "ถ้าคุณครูไม่ช่วยละก็ ฉันคงวางแผนและทำปฏิบัติการครั้งนี้ไม่ได้แน่ๆ ค่ะ"
80000085-19 = "[s] \"ไม่เป็นไรเลย ครูกำลังกังวลเรื่องวัตถุดิบเหลืออยู่พอดี\""
80000085-20 = "ฮุฮุ ขอบคุณค่ะ"
80000085-24 = "อ๊ะ ตัวจับเวลาดังแล้วค่ะ"
80000085-25 = "ต้องเอาออกมาจากเตาแล้วค่ะ"
80000085-31 = "[ns] \"ว้าว อะไรน่ะ?\""
80000085-32 = "เค้กแคร์รอตใส่ช็อกโกแลตค่ะ"
80000085-33 = "ถ้าเอาแคร์รอตที่หั่นเป็นชิ้นเล็กๆ มาผสมในแป้งเค้ก จะช่วยเพิ่มเนื้อสัมผัสตอนเคี้ยว และทำให้มีรสหวานขึ้นค่ะ ฉันทำแบบนี้บ่อยๆ ตอนอบเค้กค่ะ"
80000085-34 = "...แถมยังมีข้อดีคือช่วยประหยัดแป้งสาลีได้ด้วยค่ะ"
80000085-35 = "[s] \"มิยาโกะเรียนอบเค้กแบบนี้มาจากไหนเหรอ?\""
80000085-36 = "ฉันไม่ได้เรียนแบบจริงๆ จังๆ หรอกค่ะ แต่หน่วยรบพิเศษส่วนใหญ่มักจะต้องไปตั้งค่ายที่นอกสถานที่บ่อยๆ ค่ะ ถ้าเรียนวิธีทำอาหารพื้นฐานไว้ละก็ สามารถนำไปใช้ประโยชน์ได้หลายอย่างเลยค่ะ"
80000085-37 = "ตอนอยู่ที่สถาบัน SRT บางครั้งฉันก็เคยใช้หม้อสนามอบขนมปังในเตาอบอยู่บ้างค่ะ"
80000085-38 = "ฮุฮุ... จู่ๆ ก็คิดถึงขึ้นมาเลยค่ะ"
80000085-39 = "ไหนดูซิ... อบทั้งหมด 4 ชิ้นแล้ว 3 ชิ้นเอาไปให้สมาชิกแล้วก็..."
80000085-48 = "คุณครูคะ ช่วยรับเค้กชิ้นนี้ไว้ด้วยนะคะ"
80000085-49 = "ไหนๆ ก็ได้ทำอาหารแล้ว ฉันอยากตอบแทนคุณครูที่ช่วยเหลือพวกเรามาตลอดด้วยค่ะ"
80000085-50 = "[s1] \"แต่ว่านี่มันของมิยาโกะนะ...\"\n[s2] \"นี่มันส่วนของมิยาโกะไม่ใช่เหรอ?\""
80000085-51 = "ไม่เป็นไรค่ะ ฉันได้ชิมไปบ้างแล้วตอนระหว่างทำค่ะ..."
80000085-52 = "ไม่เป็นไรค่ะ ฉันได้ชิมไปบ้างแล้วตอนระหว่างทำค่ะ..."
80000085-53 = "ได้ยินว่าขนมที่หวานมากๆ จะเป็นอันตรายกับกระต่ายด้วยนะคะ"
80000085-54 = "คะ? ให้แบ่งเค้กกินด้วยกันเหรอคะ?"
80000085-55 = "แต่ว่าเค้กมันเล็กมากๆ จนกินคนเดียวแทบจะยังไม่พอเลย... ไม่เป็นไรแน่เหรอคะ?"
80000085-56 = "[s3] \"ของหวานๆ น่ะ ไม่ได้อันตรายแค่กับกระต่ายหรอกนะ\"\n[s4] \"ของหวานๆ น่ะ อันตรายกับผู้ใหญ่เหมือนกัน\""
80000085-57 = "ฮิฮิ งั้นเหรอคะ..."
80000085-58 = "ฮิฮิ งั้นเหรอคะ..."
80000085-59 = "ถ้างั้น... ฉันจะทานให้อร่อยเลยค่ะ"
80000085-61 = "(หลังจากนั้นคุณครูกับมิยาโกะก็แบ่งเค้กแคร์รอตแสนหวานกินด้วยกันอย่างเอร็ดอร่อย)"

[translation]
80000085-1 = "SRT，補給！"
80000085-2 = "（某天受都子的委託，將夏萊的料理實習室借給了他）"
80000085-7 = "老師，謝謝你把這裡借給我。"
80000085-8 = "如果是簡單的料理，在公園就可以完成……"
80000085-9 = "不過我現在要做的料理，不希望被其他隊員知道。"
80000085-10 = "[s]「沒關係，需要的時候歡迎隨時過來。」"
80000085-12 = "[ns]「話說回來，你要做的是什麼呢？」"
80000085-13 = "那個……馬上就到情人節了對吧？#n街上的店裡也已經擺滿了各式各樣的巧克力。"
80000085-14 = "不過我們的營地裡卻只有又硬又苦的軍用巧克力……"
80000085-15 = "所以我想為了一直很努力的大家做點甜的東西。"
80000085-16 = "這麼說來，還收下了老師給的奶油、蛋和砂糖……真的非常感謝。"
80000085-17 = "老實說我覺得僅靠手邊的食材是不夠的。"
80000085-18 = "如果沒有老師的幫忙，這次的作戰可能在計畫階段就結束了吧。"
80000085-19 = "[s]「別在意。我剛好在煩惱該怎麼處理剩下的食材呢。」"
80000085-20 = "呵呵，謝謝。"
80000085-24 = "啊，好像烤好了呢。"
80000085-25 = "我去拿出來。"
80000085-31 = "[ns]「哇……！好像很好吃！」"
80000085-32 = "這是用巧克力做成的紅蘿蔔蛋糕。"
80000085-33 = "在麵團裡加入切碎的紅蘿蔔，不僅能增加口感，還能中和甜味唷。"
80000085-34 = "……不過最大的優點還是能節省麵粉吧。"
80000085-35 = "[s]「真厲害……都子是在哪裡學的呢？」"
80000085-36 = "可能……不算是在哪裡學的，不過特殊部隊時常需要野營。#n所以就學會了一些簡單的料理。"
80000085-37 = "在SRT特殊學園時，我偶爾會把飯盒當成烤箱，用來烤小麵包。"
80000085-38 = "呵呵，總覺得很懷念……"
80000085-39 = "……總共烤了四個，其中三個分給大家……"
80000085-48 = "……老師。不介意的話，能請你收下這個蛋糕嗎？"
80000085-49 = "難得有機會做蛋糕……就當成是平時的謝禮。"
80000085-50 = "[s1]「但是這個蛋糕……」\n[s2]「不是都子那份嗎……？」"
80000085-51 = "……我在做的過程中已經有試吃過了。"
80000085-52 = "……我在做的過程中已經有試吃過了。"
80000085-53 = "而且，聽說甜的東西對兔子不太好……"
80000085-54 = "一起，吃這塊蛋糕……？"
80000085-55 = "……可以嗎？#n要分著吃的話，我覺得分量可能會不太夠……"
80000085-56 = "[s3]「我想和都子一起吃。」\n[s4]「因為對任何人來說，甜的東西吃太多都不好呀。」"
80000085-57 = "……呵呵，說的也是。"
80000085-58 = "……呵呵，說的也是。"
80000085-59 = "非常感謝老師一直以來的關心。#n那麼，我們開動吧。"
80000085-61 = "（和都子一起享用了香甜的紅蘿蔔蛋糕）"

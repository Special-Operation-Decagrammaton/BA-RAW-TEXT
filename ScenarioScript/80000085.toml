[translation]
80000085-1 = "SRT Supply Run"
80000085-2 = "A few days before Valentine's Day, I opened Schale's kitchen at Miyako's request."
80000085-7 = "Thank you for allowing me to use Schale's kitchen, Sensei."
80000085-8 = "Generally, when all I need to do is cook something over a fire, I'm happy to use a camp stove in the park."
80000085-9 = "But I wanted to keep this a secret from the others."
80000085-10 = "[s] \"It's no problem. You're always welcome!\""
80000085-12 = "[ns] \"What's the secret dish going to be?\""
80000085-13 = "Well, I'm sure you know that Valentine's Day is almost here."
80000085-14 = "And you've probably noticed stores putting out displays of all sorts of chocolate. But at camp, we only have hard, flavorless ration chocolate."
80000085-15 = "My squad mates work so hard. I want to create something sweet for them for the holiday."
80000085-16 = "Ah, that reminds me. Thank you for letting me use your butter, eggs, and sugar."
80000085-17 = "I wasn't able to procure the ingredients to make what I wanted."
80000085-18 = "Without your help, I would've failed in my plans."
80000085-19 = "[s] \"Don't worry about it. I bought too much and didn't know what to do with it.\""
80000085-20 = "Heehee. Well, thank you anyway."
80000085-24 = "Oh, there's my timer."
80000085-25 = "I need to take them out of the oven."
80000085-31 = "[ns] \"Wow. What are all these?\""
80000085-32 = "They're chocolate carrot cakes."
80000085-33 = "Finely chopped carrots are often used in baking for improved texture and balanced sweetness."
80000085-34 = "Of course, the biggest benefit is a reduction in the amount of flour needed."
80000085-35 = "[s] \"Where did you learn how to bake, Miyako?\""
80000085-36 = "Ah, I was never formally trained, but my unit often finds itself camping in the wilderness. Learning a few cooking techniques goes a long way in making such situations easier."
80000085-37 = "When we were in SRT Academy, I used to rig the mess kit into an oven and bake bread."
80000085-38 = "It's strange. Thinking of it now makes me nostalgic."
80000085-39 = "Anyway. Here we are. Three for my squad members, and the fourth..."
80000085-48 = "This one is for you, Sensei."
80000085-49 = "I made an extra as a thank-you gift."
80000085-50 = "[s1] \"But isn't this one...\"\n[s2] \"Then which one is for you?\""
80000085-51 = "It's okay. I tasted a bit while I was baking."
80000085-52 = "It's okay. I tasted a bit while I was baking."
80000085-53 = "And you know, too many sweets can be bad for a rabbit."
80000085-54 = "What? You want to share it with me?"
80000085-55 = "But it's already such a small cake. It's hardly enough for one person, much less two. Are you sure?"
80000085-56 = "[s3] \"The thing about too many sweets...\"\n[s4] \"It's bad for both rabbits and adults.\""
80000085-57 = "Heehee. Really?"
80000085-58 = "Heehee. Really?"
80000085-59 = "Then I'd be happy to partake."
80000085-61 = "And so, Miyako and I shared the carrot cake."

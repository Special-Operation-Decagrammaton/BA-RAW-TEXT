[translation]
22155-12 = "รูปลักษณ์ดูไม่ได้เรื่อง แต่พลังทำลายล้างไม่ธรรมดาเลย..."
22155-13 = "ถึงหน้าตาจะน่าเกลียด แต่ก็โหดมากเลย! เอาไงดีล่ะ?!"
22155-18 = "[ns1] \"ที่ขอให้ C&C มาช่วย เพราะนึกว่าโทคิคืออุปสรรคใหญ่ที่สุด แต่นี่มัน...\"\n[ns2] \"ไม่คิดเลยว่าจะมีกองกำลังซุ่มโจมตีรออยู่แบบนี้...\""
22155-19 = "พวกนี้มาพร้อมกับโทคิและโผล่มาทำให้เรางุนงงกับการตัดสินใจของเราสินะ..."
22155-20 = "พวกนี้มาพร้อมกับโทคิและโผล่มาทำให้เรางุนงงกับการตัดสินใจของเราสินะ..."
22155-21 = "และในตอนนี้ที่คุณครูไม่มี C&C อยู่ข้างกาย..."
22155-23 = "ก็ถือเป็นโอกาสที่แน่นอน... ว่าประธานจะปราบ <คุณครู> ได้..."
22155-28 = "วะ... ว้ายยย!!  นี่เราทุกคนตกอยู่ในกำมือประธานแล้วเหรอ?!"
22155-29 = "นี่มัน... กับดักที่วางไว้ตั้งแต่แรก"
22155-33 = "แยก C&C กับครูออกจากกัน"
22155-34 = "และไม่ได้ทำด้วยน้ำมือของฉันเอง แต่ให้พวกคุณทำกันเอง"
22155-35 = "แบบนี้คุณก็จะไม่มีทางรู้ถึงความตั้งใจ หรือแม้แต่ความเป็นไปได้ที่อาจเกิดขึ้นจากทางฝั่งนี้"
22155-36 = "จะบอกว่าเล่นเราทีเผลองั้นสิ"
22155-37 = "หุ่นรบล้ำยุค มาจบงานกันเถอะ"
22155-51 = "ตอนต่อไป;ประกาศรุกฆาต"

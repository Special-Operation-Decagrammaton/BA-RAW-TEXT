[translation]
22155-12 = "擁有從外表看來無法想像的火力呢……"
22155-13 = "明明外表超土，可是有夠強的！？該怎麼辦！？"
22155-18 = "[ns1]「原本以為最大的障礙是季，所以才交給C&C的……」\n[ns2]「沒想到在這種地方會有伏兵……」"
22155-19 = "從一開始就把季帶在身邊，是為了妨礙我們的判斷啊……"
22155-20 = "從一開始就把季帶在身邊，是為了妨礙我們的判斷啊……"
22155-21 = "沒有C&C的現在……"
22155-23 = "對會長來說……是能夠壓制「老師」的機會……"
22155-28 = "咦……這麼說來，一切都掌握在會長手裡是嗎！？"
22155-29 = "原來是一開始就佈下的陷阱啊……"
22155-33 = "分離C&C和老師──"
22155-34 = "而且並不是由我出手，而是讓你們自己做出那樣的決定。"
22155-35 = "這樣一來，我的計畫會暴露的可能性就連萬分之一也沒有。"
22155-36 = "原來如此……看來，是會長技高一籌呢。"
22155-37 = "那麼，解決他們吧──前衛君。"
22155-51 = "下一話;Checkmate"

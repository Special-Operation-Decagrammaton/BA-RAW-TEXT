[translation]
10034130-1 = "5天前：黑白黑白我勝利"
10034130-3 = "嗯……不知道這樣彈對不對，總覺得哪裡不太對勁。"
10034130-4 = "雖然沒有走音，但可能是姿勢出了問題……"
10034130-6 = "不如我們分成兩組，互相看對方的姿勢和動作吧？"
10034130-7 = "畢竟自己很難確認自己的動作。#n就算有鏡子輔助，演奏的時候也沒工夫注意。"
10034130-8 = "你難得給了個像樣的建議啊。#n那就用「黑白黑白我勝利」來分組吧？"
10034130-14 = "……？"
10034130-15 = "黑白黑白……我勝利……？"
10034130-16 = "黑白黑白我勝利……？"
10034130-20 = "……啊。"
10034130-24 = "……噗。"
10034130-25 = "噗……哈哈！哈哈哈……！#n黑白黑白……噗……！黑白黑白我勝利……！哈哈！！"
10034130-27 = "……我還是第一次看他笑成這樣。"
10034130-28 = "我也是……"
10034130-30 = "唔呃……！！"
10034130-31 = "哈啊，哈啊……哈啊……#n啊，笑到呼吸困難了……哈啊，哈啊……抱歉抱歉。"
10034130-32 = "沒想到都什麼年代了還能聽到「黑白黑白我勝利」。#n真是佩服你的腦筋。"
10034130-33 = "唔……呃……唔啊啊………！！"
10034130-34 = "我，我覺得很有童趣呀！喜美醬的點子……！"
10034130-35 = "那就開始吧。#n「21世紀的黑白黑白我勝利」。"
10034130-36 = "唔啊啊啊……！！"
10034130-38 = "來～！開始囉！黑白黑白……"
10034130-39 = "啊啊啊啊啊啊啊啊啊──！！！"
10034130-41 = "我勝利～！！"

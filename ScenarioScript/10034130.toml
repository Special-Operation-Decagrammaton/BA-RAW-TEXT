[translation]
10034130-1 = "[D-5]: โอน้อยออก"
10034130-3 = "อืม... ไม่รู้เลยแฮะว่าเล่นได้ดีรึเปล่า รู้สึกเหมือนจะมีส่วนที่ยังแปลกๆ อยู่ด้วย"
10034130-4 = "ฉันน่าจะกดถูกคอร์ดแล้ว เสียงก็เลยถูกต้อง แต่ท่าทางอาจจะผิดไปก็ได้..."
10034130-6 = "เรามาแบ่งกลุ่มกันแล้วช่วยดูท่าทางหรือการเคลื่อนไหวของกันและกันดีมั้ย?"
10034130-7 = "จะให้สังเกตตัวเองเอาเองมันก็ยากนี่นา ต่อให้ดูตัวเองเล่นในกระจก ก็คงจะตั้งใจดูกระจกมากกว่า#nตั้งใจเล่น"
10034130-8 = "พูดอะไรเข้าท่ากับเขาก็ได้ด้วยแฮะ งั้นเรามาโอน้อยออกแบ่งกลุ่มกันมั้ย?"
10034130-14 = "...?"
10034130-15 = "โอน้อย... ออก...?"
10034130-16 = "โอน้อยออกเหรอ...?"
10034130-20 = "อ่า..."
10034130-24 = "พรืด..."
10034130-25 = "พรืดดด...! ก๊ากก...! โอน้อย... ฮ่าฮ่า...! โอน้อยออก... ! ฮ่าฮ่าฮ่า...!!"
10034130-27 = "ไม่เคยเห็นหัวเราะเบอร์นี้มาก่อนเลยนะ"
10034130-28 = "ฉันด้วย..."
10034130-30 = "อึกก...!!"
10034130-31 = "แฮ่ก... แฮ่ก... แฮ่ก... หะ... หายใจไม่ทันแล้ว... แฮ่ก... แฮ่ก... โทษทีนะ"
10034130-32 = "จะให้โอน้อยออกเหรอ นี่มันปีอะไรแล้วน่ะ? ไม่คิดเลยนะว่าจะให้ทำแบบนี้ น่าประทับใจจริงๆ เลย"
10034130-33 = "อ่า... อึก... อึก...!!"
10034130-34 = "อะ... ไอเดียของโยชิมิจังน่ะ... ฉะ... ฉันคิดว่ามันน่ารักดีนะ! "
10034130-35 = "เอาละ ถ้างั้นก็... มาโอน้อยออกในศตวรรษที่ 21 กัน"
10034130-36 = "โธ่เอ๊ยยย...!!"
10034130-38 = "เอาละ~! จะโอน้อยออกแล้วนะ! โอน้อยยย~~~"
10034130-39 = "ฮึ่ยยยยยยยยย!!!"
10034130-41 = "โอน้อย~ ออก!!"

[translation]
70008010-1 = "何にも縛られぬ者たち（１）"
70008010-3 = "（平和な春の日……）"
70008010-5 = "あああああっ！！もうやってらんねぇ！！"
70008010-8 = "うわっ！どしたんすか急に。"
70008010-10 = "言われなきゃ分かんねぇのか！？"
70008010-11 = "えぇ……？掃除もいいもんじゃないですか。"
70008010-12 = "それだ！それが問題なんだよ！#n毎日、毎日、掃除ばっか！"
70008010-13 = "まぁ、百花繚乱の連中にやられちゃったわけですし。"
70008010-14 = "そうだ！今度あたしらが勝ったら、あいつらに掃除させてやろうよ！"
70008010-15 = "おっ、いいねぇ！"
70008010-16 = "あー、でも最近……道端でゴミを見つけたらつい拾っちゃうんだよね。#n街がきれいになるし、掃除も悪くないっていうか……。"
70008010-17 = "え、お前も？実はあたしもなんだけど――"
70008010-22 = "だーーーーっ！#nそんな話で盛り上がるな！"
70008010-23 = "[ruby=すだまいちざ]魑魅一座[/ruby]の名が泣くぞ！#nもっと「あたしららしい」ことをするんだよ！"
70008010-24 = "魑魅一座らしいことって……？"
70008010-25 = "それはな！その……！"
70008010-29 = "あれっ……魑魅一座らしさって……何だろう……？"
70008010-31 = "魑魅一座・路上流のアジト"
70008010-32 = "うぅぅ……。"
70008010-34 = "なんすか、リーダー、まださっきのこと考えてるんですか？"
70008010-35 = "らしさなんて何でもいいじゃないですか～#n楽しく遊べればそれでよし！"
70008010-37 = "たっ、大変だ～！！"
70008010-41 = "リーダー！リーダー！緊急事態ですっ！"
70008010-42 = "いいから、用件を言え、用件を！"
70008010-43 = "あ、実は全然緊急じゃないです。ちょっと驚かせたくて大げさに……。"
70008010-53 = "くあああっ！！このぉ！！！"
70008010-54 = "うわっ！おーたーすーけーをー！！"
70008010-55 = "あははははっ！リーダーが爆発した～！"
70008010-57 = "……で？結局何だったんだ？"
70008010-58 = "あっ、そうでした。えっと……はい、これ。#nリーダー宛の招待状です。"
70008010-59 = "招待状？誰からだ？"
70008010-60 = "魑魅一座ナイト……って言えばわかるはずって。"
70008010-61 = "何！？本当か！？"
70008010-63 = "何ですか？それ。#n……お前知ってる？"
70008010-64 = "どっかで聞いたような……。"
70008010-65 = "お前ら、それでも本当に魑魅一座か？いいか、よ～く聞け！"
70008010-71 = "それは魑魅一座が誕生した大昔から続く秘密集会。"
70008010-75 = "魑魅一座の中でも「本物」だけが招待される……と噂の集会！"
70008010-78 = "それこそが、魑魅一座ナイト！"
70008010-79 = "今までの努力が認められたんだよ！"
70008010-84 = "へぇ……。"
70008010-86 = "何だ、しけてんなぁ。嬉しくないのか！？"
70008010-87 = "……正直よくわかんないんですよね。"
70008010-88 = "ってか、魑魅一座の歴史ってそんなに長かったんですか？#nリーダーが作ったもんだとばっかり思ってました。"
70008010-89 = "やめだやめだ。お前たちとじゃ話にならねぇ。"
70008010-90 = "とにかく、魑魅一座ナイトの連中に舐められるわけにはいかないんだ。#n……そろそろ、お面を拵えるときなのかもな。"
70008010-91 = "リーダーってお面はつけないんじゃ……。"
70008010-93 = "しぃぃぃっ！言うなよ！なんかヤバい事情があるのかもしれないだろ！"
70008010-94 = "あっ、ごめん。"
70008010-96 = "こいつら、言わせておけば……！"
70008010-97 = "あたしに相応しいお面がなかっただけだっての！"
70008010-99 = "たしかに……流行ってるお面には個性がないし……個性を重視するとダサいし……。"
70008010-100 = "わかる～私もこのお面にするまですっごい大変だった……。"
70008010-102 = "あたしらにとって、お面は自分そのものといってもいい……感情の全てを一つの表情で表現しきるんだ。"
70008010-103 = "2年前――当時の百花繚乱の委員長と100回戦って引き分けになった伝説の魑魅一座は、お面をたくさん持ってて、感情に合わせて付け替えてたとか。"
70008010-104 = "……魑魅一座ナイトでお面付けてないのなんて、裸で街歩くのと同じなんだよ！"
70008010-105 = "でも、ありきたりなお面は笑われるに決まってる！"
70008010-107 = "ってことは……！"
70008010-109 = "お面を探しに行くぞ！！"
70008010-111 = "いよいよリーダーもお面を！"
70008010-112 = "実はもう見つけてあるんですよ！"
70008010-114 = "だ～か～ら！遊びじゃねぇんだ！真面目にやれ！！"

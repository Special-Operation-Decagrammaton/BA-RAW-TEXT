[translation]
70008010-1 = "โหดระห่ำ! ค่ำคืนของปีศาจ! 1"
70008010-3 = "(ค่ำคืนฤดูใบไม้ผลิแสนสงบสุข...)"
70008010-5 = "อ๊า!!! ทนไม่ไหวแล้ว!!!!"
70008010-8 = "ตกใจหมดเลยหัวหน้า! จู่ๆ เกิดอะไรขึ้นเหรอคะ?"
70008010-10 = "ยังมีหน้ามาถามอีกเรอะ?! ถามจริง?! ดูสิว่าพวกเรากำลังทำอะไรอยู่!"
70008010-11 = "กำลังทำอะไรอยู่น่ะเหรอ... ก็ทำความสะอาดเหมือนทุกทีไม่ใช่เหรอคะ?"
70008010-12 = "ใช่ นั่นแหละปัญหา! ทำไมพวกเราต้องมาทำความสะอาดกันด้วยเล่า! แถมช่วงนี้ก็มีแต่งานทำ#nความสะอาดทุกวันเลยด้วย!"
70008010-13 = "มันช่วยไม่ได้นี่คะ ก็คราวที่แล้วโดนพวกเฮียกกะเรียวรันจัดหนักมากันนี่คะ"
70008010-14 = "ถ้าพวกเราชนะก็คงสั่งให้พวกนั้นทำความสะอาดแทนได้แล้ว"
70008010-15 = "ถ้าเป็นงั้นจริงคงสนุกน่าดูเลย แต่เราก็แพ้ทุกรอบเลยนี่"
70008010-16 = "แค่ลองคิดดูแหละ ไม่รู้ว่าเป็นเพราะช่วงนี้ทำความสะอาดมากไปรึเปล่า เวลาเห็นพวกขยะที่ตกอยู่#nบนถนนเลยเผลอเก็บไปทิ้งโดยไม่คิดอะไรเลย"
70008010-17 = "เอ๋? เธอด้วยเหรอ?"
70008010-22 = "อึก! อย่ามาหาพรรคพวกในเรื่องพวกนี้สิ!"
70008010-23 = "ฉันไม่ได้เป็นแบบนั้นสักหน่อย! พวกเราคือแก๊งปีศาจนะ! ทำตัวให้สมชื่อแก๊งปีศาจหน่อยสิ!"
70008010-24 = "...? ทำตัวให้สมชื่อแก๊งปีศาจนี่ทำยังไงคะ?"
70008010-25 = "อะไรเล่า? ก็เรื่องนั้นไงล่ะ! มันคือ...!"
70008010-29 = "เอ๊ะ มีอะไรที่ทำแล้วสมเป็นแก๊งปีศาจบ้างนะ...?"
70008010-31 = "ที่ซ่อนตัวของปีศาจบนท้องถนน"
70008010-32 = "ฮึ่มมม..."
70008010-34 = "หัวหน้า~ ยังไม่เลิกคิดอีกเหรอคะ? หัวหน้านี่ก็แปลกคนนะ"
70008010-35 = "นั่นน่ะสิ เรามารวมตัวแล้วไปเที่ยวเล่นกันต่างหากที่น่าสนใจ จะมัวสนใจชื่อทำไมนะ"
70008010-37 = "เกิดเรื่องแล้ว~ เรื่องใหญ่ด้วย!!"
70008010-41 = "หัวหน้า! หัวหน้า! เกิดเรื่องด่วนแล้วค่ะ! รีบไปดูเร็วเข้า!"
70008010-42 = "จะ... จู่ๆ มีอะไรน่ะ! ไม่เห็นเหรอว่าฉันกำลังใช้ความคิดอยู่?! เรื่องด่วนแค่ไหนกันเชียวถึงได้โวยวาย#nอะไรแบบนี้น่ะ!"
70008010-43 = "อ่า อันที่จริงมันก็ไม่ใช่เรื่องด่วนหรอก แค่อยากทำให้ตกใจเฉยๆ ค่ะ"
70008010-53 = "ย้ากกก!!! ไอ้เจ้าบ้านี่!!!!"
70008010-54 = "อั่ก!! อย่าใช้ความรุนแรงสิ!!"
70008010-55 = "ฮ่าฮ่าฮ่าฮ่า! หัวหน้าโกรธแล้ว!"
70008010-57 = "แล้วยังไง สรุปว่ามีเรื่องอะไรล่ะ?"
70008010-58 = "อ๋อ จริงด้วย มัวแต่หัวเราะจนลืมไปเลยแฮะ มีบัตรเชิญที่เขียนชื่อหัวหน้าส่งมาค่ะ"
70008010-59 = "บัตรเชิญเหรอ?"
70008010-60 = "เห็นว่าให้บอกว่า \"ค่ำคืนของปีศาจ\" แล้วหัวหน้าจะเข้าใจน่ะ"
70008010-61 = "ว่าไงนะ?! ค่ำคืนของปีศาจงั้นเหรอ?! เรื่องจริงเหรอเนี่ย?!"
70008010-63 = "ค่ำคืนของปีศาจ? มันคืออะไรเหรอ? เธอรู้รึเปล่า?"
70008010-64 = "เหมือนเคยได้ยินมาบ้างนะ..."
70008010-65 = "พวกเธอนี่เป็นแก๊งปีศาจแต่ไม่รู้เรื่องพื้นฐานอย่างนี้ได้ยังไง!! ฉันจะอธิบายให้ฟังเอง ตั้งใจฟังให้ดีซะล่ะ!!"
70008010-71 = "ค่ำคืนของปีศาจ... เป็นการชุมนุมลับที่มีมานานแล้วตั้งแต่สมัยเริ่มก่อตั้งแก๊งปีศาจ"
70008010-75 = "ได้ยินข่าวลือมาเป็นครั้งคราวว่าจะมีการจัดขึ้น การชุมนุมใหญ่ในตำนานที่จะเชิญเฉพาะแก๊งปีศาจที่#nมีชื่อเท่านั้น...!"
70008010-78 = "นั่นก็คือค่ำคืนของปีศาจยังไงล่ะ!"
70008010-79 = "หลังจากพยายามมาอย่างหนัก ในที่สุดชื่อเสียงของพวกเราก็เป็นที่รู้จักแล้ว!"
70008010-84 = "อืม... อย่างนี้นี่เอง~"
70008010-86 = "เอ๊ะ อะ... อะไรน่ะ ปฏิกิริยาแบบนั้น?! ไม่ดีใจรึไง?! นี่งานชุมนุมค่ำคืนของปีศาจเลยนะ!"
70008010-87 = "เปล๊าาา เอาเถอะ ถ้าหัวหน้าดีใจฉันก็ดีใจด้วย... แต่บอกตามตรงนะว่าไม่เข้าใจเรื่องที่พูดมาเลยอะ"
70008010-88 = "ว่าแต่ว่าแก๊งปีศาจมีประวัติยาวนานแบบนั้นเลยเหรอคะ? ฉันนึกว่าเป็นแค่ชื่อประจำกลุ่มเฉยๆ ซะอีก"
70008010-89 = "โธ่เอ๊ย~ ช่างเถอะ ช่างเถอะ~ ไม่รู้ฉันจะคุยเรื่องนี้กับพวกเธอไปทำไม"
70008010-90 = "ยังไงก็ตามในงานค่ำคืนของปีศาจจะให้หัวหน้ากลุ่มอื่นๆ ดูถูกเราไม่ได้ อย่างเช่น... เรื่องหน้ากาก คงจะต้องหาอันที่ดูเท่ๆ ใส่ไปแล้วละ"
70008010-91 = "แต่ว่าหัวหน้าไม่ใส่หน้ากากไม่ใช่เหรอ...?"
70008010-93 = "นี่! พูดแบบนั้นได้ไงเล่า! ถ้าบังเอิญว่าเป็นเรื่องละเอียดอ่อนจะทำยังไง?"
70008010-94 = "อะ... อ๊ะ! ขอโทษนะหัวหน้า ฉันไม่รู้มาก่อนเลย!"
70008010-96 = "อึก...! เจ้าพวกนี้วุ่นวายกันซะจริงๆ..."
70008010-97 = "ฉันแค่ยังไม่เจอหน้ากากที่ถูกใจก็เท่านั้น!"
70008010-99 = "แน่นอนว่า... การเลือกหน้ากากมันเป็นเรื่องยุ่งยากนะ พอใส่หน้ากากที่ดูฮิตๆ ก็เหมือนใส่ตามคนอื่น จะใส่หน้ากากเห่ยๆ เพื่อให้ดูเป็นตัวของตัวเองมันก็..."
70008010-100 = "อ่า~ พอจะเข้าใจแล้วละ ฉันเองก็คิดหนักทุกครั้งตอนเลือกหน้ากากเหมือนกัน"
70008010-102 = "ใช่... สำหรับแก๊งปีศาจอย่างเราหน้ากากถือเป็นของสำคัญ... ไม่ใช่แค่ของที่ใส่ไว้ปิดหน้าเฉยๆ ทั้งตัวตนภายในและความรู้สึก ทุกๆ อย่างล้วนถ่ายทอดออกมาผ่านทางสีหน้า"
70008010-103 = "2 ปีก่อนปีศาจในตำนานคนหนึ่งได้พาลูกน้องไปดวลกับหัวหน้าของเฮียกกะเรียวรันพร้อมกับเอา#nหน้ากากไปด้วยหลายอันเพื่อเปลี่ยนตามอารมณ์ที่รู้สึกในตอนนั้นๆ"
70008010-104 = "เพราะงั้นงานชุมนุมสำคัญอย่างค่ำคืนของปีศาจจะให้ไปหน้าเปล่าๆ โล้นๆ ได้ยังไง"
70008010-105 = "แต่ถึงอย่างนั้นถ้าสวมหน้ากากที่มีขายตามท้องตลาดไปก็คงไม่มีใครสนใจแน่"
70008010-107 = "โอ้ อย่าบอกนะ!"
70008010-109 = "ฉันตัดสินใจแล้ว!! แก๊งปีศาจบนท้องถนน... จะออกไปตามหาหน้ากากที่เหมาะสมกับศักดิ์ศรีผู้นำของ#nกลุ่มกัน!!"
70008010-111 = "ว้าว ในที่สุดหัวหน้าก็จะใส่หน้ากากแล้ว!"
70008010-112 = "น่าสนุกจัง! ฉันมีหน้ากากที่คิดว่าเหมาะกับหัวหน้าอยู่ด้วยค่ะ!"
70008010-114 = "นี่!!! ช่วยเอาจริงเอาจังกันหน่อยสิ ไม่ได้จะไปเที่ยวเล่นนะ!!!!"

[translation]
70008010-1 = "Fierce! Mouryo Night! 1"
70008010-3 = "On a peaceful day in spring..."
70008010-5 = "Ugh!! I can't do this anymore!!"
70008010-8 = "Ack! Wh-What's happenin', Leader? What's wrong?"
70008010-10 = "Are you serious?! You can't think of a single thing?! Look around!"
70008010-11 = "Um... Well, I see we're cleanin', like usual... I think?"
70008010-12 = "Exactly! That's all we ever do these days! Clean, clean, clean!"
70008010-13 = "Well... I mean... What else are we supposed to do? The Hyakkaryouran really laid down the law after last time..."
70008010-14 = "You know, if WE were to beat THEM, we could tell them to do the cleanin'!"
70008010-15 = "That'd be a blast...but we just lose every time..."
70008010-16 = "It's nice to dream, though, isn't it? We've been on cleanin' duty so much lately, that I'll unconsciously pick up trash when I'm just walkin' around."
70008010-17 = "Huh? You too?"
70008010-22 = "AUGH! This is not a bonding moment!"
70008010-23 = "This isn't right! We're Mouryo! We need to do somethin' befittin' of the Mouryo!"
70008010-24 = "...What's \"befittin'\" of us?"
70008010-25 = "Huh? Seriously? Obviously, it's...! It's...!"
70008010-29 = "Hmm... What even IS being \"Mouryo\"?"
70008010-31 = "Street Mouryo Hideout"
70008010-32 = "Hmmmm..."
70008010-34 = "Leader, you still thinkin' about earlier? You really get caught up with weird stuff sometimes."
70008010-35 = "That's right. What matters is that we're all together, havin' fun. Who cares about meanin's or names?"
70008010-37 = "There's a problem! HUUUGE problem!"
70008010-41 = "Leader! Leader! It's an emergency! Hurry, look!"
70008010-42 = "Wh-What is it?! Can't you see I'm doing some important thinkin' here? Why're you actin' like someone died?!"
70008010-43 = "Ah. Nothin' serious, actually. I just wanted to give you a good scare."
70008010-53 = "AAARGH!! YOUUU!!!"
70008010-54 = "Eek! Say no to violence!"
70008010-55 = "Hahahaha! You made Leader mad!"
70008010-57 = "...All right. So what's goin' on?"
70008010-58 = "Ah, that! All that laughing made it slip right outta my mind. You got an invitation, Leader."
70008010-59 = "An invitation?"
70008010-60 = "\"Mouryo Night.\" That was it...but they said you'd understand."
70008010-61 = "What?! Mouryo Night?! Are you serious?!"
70008010-63 = "Huh? What's that? Do you know?"
70008010-64 = "Uh, I might've heard the name before or somethin'..."
70008010-65 = "Are you a Mouryo or not?! This is the basics! Ugh, I'll explain, so listen up!!"
70008010-71 = "Mouryo Night... It's a secret meetin' that's been held since the very beginnin' of the Mouryo."
70008010-75 = "You only get to hear about it in whispers once in a blue moon! It's the legendary meetin' that only the Mouryo-est Mouryos get invited to...!"
70008010-78 = "That's Mouryo Night!"
70008010-79 = "We're finally bein' recognized for all the impressive work we do!!"
70008010-84 = "Hm... Okaaay..."
70008010-86 = "Huh, wh-what's with that reaction?! Be more excited! This is Mouryo Night we're talking about!"
70008010-87 = "I mean... I'm excited for you, I think? But I don't really get it..."
70008010-88 = "And the Mouryo is really that old? I thought it was just some random name we picked."
70008010-89 = "Ugh, fine, fine. There's no point in talkin' about this with you guys!"
70008010-90 = "Anyways, we gotta show up strong in front of the other leaders at Mouryo Night! We need to wear somethin' that really highlights our class...like a mask!"
70008010-91 = "...But you don't even wear a mask, Leader."
70008010-93 = "Hey! Watch your mouth! What if she's sensitive about it?!"
70008010-94 = "A-Ah! Sorry, Leader! I didn't know!"
70008010-96 = "Ugh...! You rascals and your blabberin' mouths..."
70008010-97 = "I just haven't found one that captures my classiness yet!"
70008010-99 = "Well, it IS a big deal choosin' a mask. If it's too trendy, you're just a follower. But you don't want to pick somethin' ugly just to be special and different."
70008010-100 = "Ah, I felt the same way. It took me days and days to pick mine."
70008010-102 = "For a Mouryo member, a mask is everythin'! It doesn't just cover your face... It's somethin' that captures your feelings and thoughts with just a single expression!"
70008010-103 = "Two years ago, they say that the legendary Mouryo, who fought her match against the Hyakkaryouran president to a draw after a hundred moves, carried a bunch of different masks for different emotions."
70008010-104 = "So there's absolutely no way we can go to an important meetin' like this with a bare face!"
70008010-105 = "But we can't wear just any mask! Otherwise they'll all look down on us!"
70008010-107 = "Oh! Is she finally doing it?!"
70008010-109 = "...I've decided!! Street Mouryo, we're headin' out to find a mask befittin' of your leader's class!!"
70008010-111 = "Wow! Leader! It's actually happenin'! You're finally pickin' a mask!"
70008010-112 = "This is gonna be a blast! I saw one the other day that I thought suited you perfectly!"
70008010-114 = "Listen to me!! This is SERIOUS!! We're not goin' out for a play date!"

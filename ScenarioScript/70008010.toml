[translation]
70008010-1 = "驚險！妖怪劇團之夜！（１）"
70008010-3 = "（和平的春日……）"
70008010-5 = "啊！！！！#n我受夠了！！！！"
70008010-8 = "嚇我一跳！#n隊長，你為什麼突然這樣？"
70008010-10 = "還問我為什麼！？你是真的不知道嗎！？#n看看我們現在在幹嘛！"
70008010-11 = "啊就……跟平常一樣在打掃啊？"
70008010-12 = "沒錯！問題就出在這裡！#n為什麼我們要打掃啊！而且最近幾乎每天都這樣！"
70008010-13 = "這也沒辦法嘛。#n誰叫我們上次被百花繚亂那群傢伙狠狠修理了一頓。"
70008010-14 = "要是我們贏了的話，就能換他們來打掃了說。"
70008010-15 = "感覺一定超有趣的耶。#n可惜我們從來沒贏過就是了。"
70008010-16 = "我也只是想像一下而已。#n最近因為太常打掃的關係，看到路上有垃圾都會下意識地撿起來。"
70008010-17 = "咦？你也會這樣嗎？"
70008010-22 = "喂！別在這方面有共鳴啦！"
70008010-23 = "我想說的是──我們可是妖怪劇團耶！#n應該做點更像妖怪劇團的事才對！"
70008010-24 = "……？#n更像妖怪劇團是什麼意思啊？"
70008010-25 = "咦？那當然是……！#n呃……"
70008010-29 = "是什麼來著……？"
70008010-31 = "妖怪劇團．街頭流派的據點"
70008010-32 = "唔嗯……"
70008010-34 = "隊長～你還在煩惱哦？#n這樣很奇怪耶。"
70008010-35 = "就是說啊～#n反正重點是大家能聚在一起玩，像不像什麼的無所謂啦。"
70008010-37 = "出大事～出大事了！！"
70008010-41 = "隊長隊長！超級緊急情況！#n你快看看這個！"
70008010-42 = "沒，沒看到我在思考嗎！？#n到底什麼事情讓你急得吵成這樣！"
70008010-43 = "啊，其實也沒多急啦。#n我只是想嚇你一下而已。"
70008010-53 = "可惡啊啊啊！！！你這傢伙！！！！"
70008010-54 = "哇啊！！反對暴力！！"
70008010-55 = "哈哈哈哈！隊長生氣了！"
70008010-57 = "……所以咧，到底出了什麼事？"
70008010-58 = "啊，對喔。差點笑到都忘了。#n隊長，有張寫著你名字的邀請函。"
70008010-59 = "邀請函？"
70008010-60 = "好像叫做「妖怪劇團之夜」的樣子……隊長應該知道吧。"
70008010-61 = "什麼！？妖怪劇團之夜！？#n真的假的！？"
70008010-63 = "妖怪劇團之夜？#n你知道那是什麼嗎？"
70008010-64 = "好像在哪裡聽過……"
70008010-65 = "你們幾個明明身為妖怪劇團，卻連這種最基本的事都不知道嗎！！ #n我來告訴你們，都給我仔細聽！！"
70008010-71 = "妖怪劇團之夜……是從妖怪劇團誕生的時候就流傳至今的祕密聚會。"
70008010-75 = "時不時就會聽說舉辦的傳聞。#n只有妖怪劇團中的妖怪劇團才會收到邀請的傳說集會……！"
70008010-78 = "這就是妖怪劇團之夜！"
70008010-79 = "經過長久的努力之後，我們的名字終於傳遍天下了啊！"
70008010-84 = "哼嗯……原來如此～"
70008010-86 = "喂喂，這反應是怎麼回事！？#n你們難道不開心嗎！？這可是妖怪劇團之夜耶！？"
70008010-87 = "不是，如果隊長開心的話我當然也開心……但老實說我還是不太懂。"
70008010-88 = "而且妖怪劇團原來這麼古老嗎？#n我還以為只是隨便取的名字而已耶。"
70008010-89 = "唉～算了算了～我就不該跟你們說這些的。"
70008010-90 = "總之絕對不能在妖怪劇團之夜上被其他人看不起。#n我想想……比如面具之類的，一定要戴有威嚴的才行。"
70008010-91 = "……可是隊長你不是不戴面具的嗎？"
70008010-93 = "喂！不要亂說話！萬一那是敏感問題怎麼辦！"
70008010-94 = "啊！抱歉，隊長！我不知道是這樣！"
70008010-96 = "可惡……！在那邊給我亂講話……"
70008010-97 = "我只是還沒找到能配上我格調的面具而已！"
70008010-99 = "說的也是……挑選面具的確很不容易。#n戴流行款感覺像在跟風，但為了展現個性選不好看的又有點……"
70008010-100 = "啊～我懂那種感覺。#n想當初我也挑了好幾天呢。"
70008010-102 = "沒錯……對我們妖怪劇團來說，面具可是很重要的……#n這不單純只是遮臉的工具，而是要用一個表情把內心跟情感全部表現出來。"
70008010-103 = "兩年前，跟當時的百花繚亂委員長纏鬥了上百回合──#n結果依然不分勝負的那名傳說中的妖怪劇團，據說會隨身攜帶多個面具來表達情緒。"
70008010-104 = "所以像妖怪劇團之夜這種重要場合，絕對不能素顏出席。"
70008010-105 = "可是如果戴普通的面具又一定會被瞧不起！"
70008010-107 = "哦，難道說……！"
70008010-109 = "……我決定了！！#n妖怪劇團．街頭流派──立刻出發尋找符合我領袖風範的面具吧！！"
70008010-111 = "哇，隊長你終於要挑面具啦！"
70008010-112 = "好期待哦！其實我早就想到一副超適合你的面具了耶！"
70008010-114 = "就說了～這不是在玩鬧，給我認真一點！！！"

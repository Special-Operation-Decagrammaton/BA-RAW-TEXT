[translation]
12080-1 = "第8話;前往阿拜多斯沙漠（３）"
12080-3 = "呼呣，無人機和自動機啊……"
12080-4 = "不知道為什麼，這裡總是有很多這種東西。"
12080-5 = "──各位請等一下！前方似乎有什麼東西！"
12080-6 = "雖然因為風沙的關係，還看不太清楚……！"
12080-7 = "巨大的村莊……工廠？還是駐紮地……？#n總，總之似乎有個規模相當巨大的設施……"
12080-8 = "什，什麼？綾音醬，會不會是看錯了？"
12080-9 = "這裡目前只能看到乾涸的綠洲而已耶……"
12080-10 = "我想不是看錯才對……請先抵達能用肉眼確認的位置吧！"
12080-12 = "……"
12080-13 = "這是什麼……"
12080-14 = "環繞著設施的鐵絲網，看起來有數km長……"
12080-15 = "工廠……？石油開採設施……好像也不對。#n這裡究竟是……？"
12080-16 = "這種東西，以前明明沒有……"
12080-19 = "嗚哇！？什麼什麼！？"
12080-21 = "有入侵者！"
12080-22 = "抓住他們，別讓他們跑了！"
12080-25 = "前方有身分不明的敵人正在發動攻擊！"
12080-26 = "雖然不太清楚情況，不過人家都特地來歡迎了，咱們也該回敬一下人家吧？"
12080-27 = "上吧～！"

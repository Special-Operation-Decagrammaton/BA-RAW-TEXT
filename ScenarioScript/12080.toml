[translation]
12080-1 = "Episode 8; Into the Abydos Desert Part 3"
12080-3 = "Hmm. Broken drones and automata..."
12080-4 = "Strange that these things keep showing up here."
12080-5 = "...Wait! I'm picking up something straight ahead!"
12080-6 = "I can't see well because of all the dust..."
12080-7 = "A huge town... No, a factory? No... a garrison? Whatever it is, it's massive and fully-manned..."
12080-8 = "Wh-What? Ayane, are you sure?"
12080-9 = "There's nothing here but a dried-up oasis."
12080-10 = "You're just not close enough to see it! Keep going!"
12080-12 = "..."
12080-13 = "Wh-What is this...?"
12080-14 = "Barbed wire and facilities that look like they go on for kilometers..."
12080-15 = "A factory? I don't think it's an oil rig... What the heck is it?"
12080-16 = "This definitely wasn't here before..."
12080-19 = "Whoa, what?!"
12080-21 = "INTRUDERS!"
12080-22 = "Capture them! Don't let them get away!"
12080-25 = "Unidentified troops dead ahead!"
12080-26 = "Well, I don't know who they are, but if they're here to welcome us, we ought to respond in kind!"
12080-27 = "Let's go!"

[translation]
12080-1 = "ตอนที่ 8;มุ่งสู่ทะเลทรายอะบิดอส 3"
12080-3 = "อืม.. นี่มันพวกโดรนและหุ่นจักรกลที่พังแล้วนี่นา..."
12080-4 = "น่าแปลกจังที่ตรงนี้มีอะไรแบบนี้อยู่เต็มไปหมด"
12080-5 = "เดี๋ยวค่ะทุกคน! ฉันตรวจพบอะไรบางอย่างอยู่ข้างหน้าค่ะ! "
12080-6 = "แต่คงตรวจสอบได้ยากเพราะมีฝุ่นทรายอยู่เต็มไปหมด..."
12080-7 = "นี่มันหมู่บ้านขนาดใหญ่... ไม่สิ... โรงงานเหรอ? เดี๋ยวนะ... ทำไมถึงมีโรงงานขนาดใหญ่และคนงานอยู่#nด้วยล่ะ...\n"
12080-8 = "วะ... ว่าไงนะ? ไม่ได้ตาฝาดไปใช่มั้ย อายาเนะจัง?"
12080-9 = "ข้างหน้านี้มีแต่โอเอซิสที่แห้งเหือดแล้วเท่านั้นเองนะ?"
12080-10 = "กะ... ก่อนอื่นก็ไปให้ถึงบริเวณที่จะตรวจสอบด้วยตาเปล่าได้กันก่อนเถอะค่ะ"
12080-12 = "......\n"
12080-13 = "นี่มันอะไรกันเนี่ย...\n\n\n"
12080-14 = "รั้วลวดหนามกับโรงงานทอดยาวไปหลายกิโลเลย..."
12080-15 = "โรงงานเหรอ...? นี่ดูไม่น่าใช่โรงงานขุดเจาะน้ำมันนะคะ แล้วมันคืออะไรกัน...?\n"
12080-16 = "ของพวกนี้... เมื่อก่อนมันไม่เคยมีนี่นา..."
12080-19 = "อ๊ะ?! อะไรเนี่ย?! \n\n\n"
12080-21 = "มีผู้บุกรุก!\n\n"
12080-22 = "จับตัวไว้! อย่าให้หนีไปได้!\n\n"
12080-25 = "มีกองกำลังที่ระบุตัวตนไม่ได้กำลังโจมตีเข้ามาข้างหน้าค่ะ!"
12080-26 = "เอาเถอะ ถึงจะไม่รู้ว่าเป็นใคร แต่ถ้ามาต้อนรับกันด้วยลูกปืนแบบนี้ เราก็คงต้องทักทายกลับสักหน่อยแล้ว!"
12080-27 = "ลุยกันเลย!"

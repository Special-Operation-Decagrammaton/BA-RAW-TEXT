[translation]
2001902-1 = "Case 1. กระต่ายเหรอคะ?"
2001902-2 = "(เคาะประตูห้องเบาๆ...)"
2001902-11 = "อ๊ะ นายท่าน!"
2001902-12 = "ดึ๋ง ดึ๋ง"
2001902-19 = "(สงสัยคงจะเหนื่อยมากไป คุณครูเลยเห็นภาพหลอนแปลกๆ...)"
2001902-23 = "(ขยี้ตา สูดหายใจลึกๆ อีกที แล้วเคาะประตูใหม่)"
2001902-29 = "เป็นอะไรไปคะนายท่าน?"
2001902-30 = "ดึ๋ง ดึ๋ง!"
2001902-37 = "(คุณครูยังเห็นภาพหลอนอยู่... สงสัยวันนี้จะต้องพักผ่อนให้เพียงพอแล้ว)"
2001902-40 = "(ขณะที่คุณครูคิดอยู่นั้นเอง...)"
2001902-41 = "เชิญค่ะ ฉันกำลังรออยู่เลยค่ะ"
2001902-45 = "[ns] \"หืม... อาคาเนะ?\""
2001902-46 = "ค่ะ ฉันเองค่ะ เมดตลอดกาลของนายท่าน อาคาเนะเองค่ะ"
2001902-47 = "ดึ๋ง ดึ๋ง!"
2001902-48 = "[s] \"ดึ๋ง ดึ๋ง...?\""
2001902-49 = "ค่ะ ก็ฉันเป็นกระต่ายนี่คะ"
2001902-50 = "ทำไมทำหน้าแบบนั้นล่ะคะ?"
2001902-51 = "ทำเหมือนตกใจอะไรสักอย่าง... หรือได้เห็นบางอย่างที่ไม่คาดคิดอย่างนั้นละ..."
2001902-52 = "หรือว่ามีเรื่องไม่ดีอะไรรึเปล่าคะ?"
2001902-53 = "ไม่สิ เป็นเพราะทำงานของชาเล่ต์หนักเกินไปสินะคะ"
2001902-54 = "นายท่าน วางใจได้เลยค่ะ ฉันจะบริการให้นายท่านเพิ่มอีกหนึ่งระดับเลยค่ะ"
2001902-55 = "[s1] \"คือว่าชุดนั่น...\"\n[s2] \"ชุดบันนี่เกิร์ลเหรอ...?\""
2001902-56 = "ฉันเคยบอกนายท่านแล้วนี่คะว่าเมดคือผู้ที่ทำงานบริการ ส่วนชุดเมดก็เป็นชุดของคนทำงานบริการ#nและเป็นชุดออกรบด้วยค่ะ"
2001902-57 = "ฉันเคยบอกนายท่านแล้วนี่คะว่าเมดคือผู้ที่ทำงานบริการ ส่วนชุดเมดก็เป็นชุดของคนทำงานบริการ#nและเป็นชุดออกรบด้วยค่ะ"
2001902-58 = "และชุดบันนี่เกิร์ลก็เป็นชุดที่ทำออกมาเพื่องานบริการ"
2001902-59 = "และงานบริการก็เป็นหน้าที่ของเมด"
2001902-60 = "ถ้าอย่างนั้น บันนี่เกิร์ลกับเมดก็เหมือนกันไม่ใช่เหรอคะ?"
2001902-61 = "ถึงชุดนี้จะดูแปลกใหม่ไม่เหมือนใครก็เถอะ..."
2001902-62 = "แต่วันนี้ฉัน... จะดูแลและบริการนายท่านในชุดนี้ค่ะ"
2001902-63 = "[s3] \"ไม่เห็นเข้าใจเลยสักนิด...\"\n[s4] \"ตายแน่นอน... ภัยสังคม...\""
2001902-64 = "ไม่ต้องห่วงนะคะ"
2001902-65 = "ไม่เป็นไรหรอกค่ะ ไม่ต้องกังวลนะคะ"
2001902-66 = "เอาละค่ะ นายท่านอยากให้ฉันบริการเรื่องอะไรดีคะ?"
2001902-67 = "ทำความสะอาด? ซักผ้า? ทำอาหาร หรือให้คุ้มกันนายท่านดีคะ?"
2001902-73 = "หรืออยากให้ทำความสะอาดใน \"ความหมายอื่น\" กันคะ...?"
2001902-74 = "ฉันเตรียมตัวเตรียมใจมาพร้อมสำหรับทุกเรื่องแล้วค่ะ"
2001902-75 = "[s] \"ขอโทษนะอาคาเนะ! ครูนึกได้ว่ามีงานด่วนน่ะ!\""
2001902-76 = "ตายจริง นายท่าน?"
2001902-77 = "เกิดอะไรขึ้นเหรอคะ? จู่ๆ ก็มีงานด่วนเข้ามางั้นเหรอ..."
2001902-78 = "งานของชาเล่ต์... เป็นงานที่ลำบากจริงๆ ด้วยนะคะ"
2001902-79 = "ฉันควรจะต้อง \"บริการ\" นายท่านให้ดีกว่านี้แล้วละค่ะ"
2001902-90 = "รอฉันด้วยค่ะ นายท่าน~!"

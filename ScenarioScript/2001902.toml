[translation]
2001902-1 = "Case 1. 是兔子唷？"
2001902-2 = "（小心翼翼地敲了敲門）"
2001902-11 = "啊，是主人！"
2001902-12 = "蹦蹦！"
2001902-19 = "（是太累了嗎……好像看見了幻覺……）"
2001902-23 = "（揉了揉眼睛，做了個深呼吸後，再次敲了敲門）"
2001902-29 = "怎麼了嗎，主人？"
2001902-30 = "蹦蹦！"
2001902-37 = "（咦，又是幻覺……今天得好好睡覺才行）"
2001902-40 = "（就在我這麼想的瞬間）"
2001902-41 = "歡迎回來，主人。我一直在等著您。"
2001902-45 = "[ns] 「……呃，朱音？」"
2001902-46 = "是主人的女僕，朱音。您忘記了嗎？"
2001902-47 = "蹦蹦！"
2001902-48 = "[s] 「蹦蹦……？」"
2001902-49 = "沒錯，因為我是兔子啊。"
2001902-50 = "老師才是，發生什麼事了嗎？"
2001902-51 = "一副不可置信的樣子……發生了什麼意想不到的事嗎……"
2001902-52 = "難道遇到了什麼不好的事嗎？"
2001902-53 = "不，我想一定是因為夏萊的工作太多的關係吧。"
2001902-54 = "主人，請您放心。我今天一定會更努力服侍您的。"
2001902-55 = "[s1] 「呃，那個……有點在意朱音的服裝。」\n[s2] 「是兔女郎……？」"
2001902-56 = "雖然之前也說過了，女僕就是為別人服務的人。#n而女僕裝就是服務主人的人所穿的衣服，同時也是戰鬥的服裝。"
2001902-57 = "雖然之前也說過了，女僕就是為別人服務的人。#n而女僕裝就是服務主人的人所穿的衣服，同時也是戰鬥的服裝。"
2001902-58 = "而兔女郎也同樣是為了服務而生的存在。"
2001902-59 = "服務就是女僕的使命。"
2001902-60 = "那麼兔女郎跟女僕不就是一樣的嗎？"
2001902-61 = "雖然確實可能是有點奇怪的服裝……"
2001902-62 = "不過今天想以這副模樣服務老師。"
2001902-63 = "[s3] 「完全無法理解……」\n[s4] 「我會死掉……社會性的。」"
2001902-64 = "沒關係的唷，用不著擔心。"
2001902-65 = "沒關係的唷，用不著擔心。"
2001902-66 = "那麼，您需要什麼服務呢？"
2001902-67 = "打掃？洗衣？料理？護衛？"
2001902-73 = "還是需要「清掃」呢？"
2001902-74 = "身為女僕，我隨時都做了萬全的準備。"
2001902-75 = "[s] 「抱歉，朱音！我突然想起來有件急事！」"
2001902-76 = "哎呀，主人？"
2001902-77 = "怎麼了呢。居然臨時有急事……"
2001902-78 = "夏萊的工作真是辛苦呢……"
2001902-79 = "既然如此，我就更應該為主人服務才對。"
2001902-90 = "請等著我吧，主人！"

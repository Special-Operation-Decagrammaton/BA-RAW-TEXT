[translation]
2001902-1 = "Case 1. Sensei Does not Dream of Bunny Akane"
2001902-2 = "I carefully knocked on the door."
2001902-11 = "Oh, Master!"
2001902-12 = "Boing, boing."
2001902-19 = "I was so tired that I was seeing things."
2001902-23 = "I rubbed my eyes, took a deep breath, and knocked on the door again."
2001902-29 = "Is something wrong, Master?"
2001902-30 = "Boing, boing!"
2001902-37 = "I was still seeing things. I started thinking I needed a day off."
2001902-40 = "Then, at that moment..."
2001902-41 = "Welcome. Were you waiting for something?"
2001902-45 = "[ns] \"...A-Akane?\""
2001902-46 = "Yes, it's me, your forever maid, Akane."
2001902-47 = "Boing, boing!"
2001902-48 = "[s] \"...Boing, boing again?\""
2001902-49 = "What other noise would a hopping bunny make?"
2001902-50 = "What's wrong, Sensei?"
2001902-51 = "You look embarrassed...like you've seen something you shouldn't have..."
2001902-52 = "Did something bad happen?"
2001902-53 = "Oh, it must be because you have so much Schale work."
2001902-54 = "Don't worry, Master. I'll work extra hard for you today."
2001902-55 = "[s1] \"So, um... Fashion these days, am I right?\"\n[s2] \"...A bunny girl?\""
2001902-56 = "As I've said, a maid is one who serves. And so, a maid's outfit must be suited to service."
2001902-57 = "As I've said, a maid is one who serves. And so, a maid's outfit must be suited to service."
2001902-58 = "I believe bunny girl outfits were made specifically for service."
2001902-59 = "Service is a maid's purpose."
2001902-60 = "Doesn't that put maids and bunny girls in the same category?"
2001902-61 = "Sure, it's a bit unusual to wear, but..."
2001902-62 = "This is the form of today's service."
2001902-63 = "[s3] \"I don't know what's going on...\"\n[s4] \"But I'll probably get arrested...\""
2001902-64 = "You worry too much."
2001902-65 = "You worry too much."
2001902-66 = "Lucky for you, I offer all sorts of services!"
2001902-67 = "Cleaning? Laundry? Cooking? Escort?"
2001902-73 = "Perhaps a special cleaning service?"
2001902-74 = "I'm ready for anything."
2001902-75 = "[s] \"Sorry, Akane! I remembered, um, urgent things!\""
2001902-76 = "Master?"
2001902-77 = "What could be so urgent..."
2001902-78 = "Schale work seems so hard..."
2001902-79 = "Which means I have to work just as hard to better serve."
2001902-90 = "Master, wait!"

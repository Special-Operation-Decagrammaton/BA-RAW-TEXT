[translation]
2000503-1 = "又踩又踢又毀損"
2000503-2 = "補課部的設備「十字軍醬」內部"
2000503-4 = "這附近路況不太好，晃動得很厲害呢。"
2000503-5 = "老師，請小心不要撞到上面的扶手。"
2000503-6 = "這個扶手有些地方還挺尖銳的……"
2000503-7 = "衣服不慎被勾破還算小事，但要是因此受傷那可就不好了。"
2000503-8 = "[s] 「嗯，謝謝。日步美還是穿泳裝呢，更要小心喔。」"
2000503-9 = "好，好的，謝謝老師關心。#n平常是不會穿成這樣搭上戰車的……但這次畢竟是要去海邊。"
2000503-10 = "而且還聽說現在要去的海灘周圍沒有適合換衣服的地方。"
2000503-11 = "而且我希望抵達後能夠快點衝進大海，所以就先換好泳裝了！"
2000503-12 = "[s] 「穿泳裝搭乘戰車，還真是不得了的情境呢。」"
2000503-13 = "的，的確……聽老師這麼一說，突然讓人覺得好害羞喔……"
2000503-14 = "但反正外面幾乎看不見戰車內部……"
2000503-15 = "不，不如說如果老師想看的話，我……！"
2000503-16 = "我……我們要不要開快一點呢？"
2000503-19 = "啊，好像抵達了。"
2000503-20 = "老師，我們出去看看吧！"
2000503-24 = "無為濱"
2000503-25 = "是大海～～！"
2000503-26 = "[s] 「是大海──！！！！」"
2000503-27 = "呵呵，來到海邊果然就是要大喊一聲呢。"
2000503-28 = "雖然很想立刻衝進海裡……"
2000503-29 = "還是先把戰車停好吧。#n老師，可以請你幫忙放置輪擋嗎？"
2000503-30 = "[s]「嗯，交給我。」"
2000503-36 = "[ns] 「OK，完成了。」"
2000503-37 = "謝謝老師！那我也……"
2000503-39 = "嘿咻……"
2000503-40 = "……嗯？#n怎麼好像聽見不妙的聲音……！"
2000503-41 = "哇啊！？"
2000503-45 = "[ns] 「怎麼了？」"
2000503-49 = "那個，泳，泳裝被……"
2000503-50 = "[s] 「……泳裝？」"
2000503-51 = "泳裝被戰車扶手勾到，破掉了……"
2000503-52 = "[ns] 「泳裝破掉了！？」"
2000503-53 = "哇！哇啊！請不要這麼大聲！"
2000503-54 = "怎，怎麼辦，老師！？#n這樣我沒辦法離開戰車了……！"
2000503-55 = "而且我是直接穿泳裝來的，沒有帶換的衣服……"
2000503-56 = "[s] 「我去附近的服飾店買套衣服應急吧。」"
2000503-57 = "可是，這附近連便利商店都沒有……"
2000503-58 = "沒，沒辦法了，只能直接開戰車回去了……！"
2000503-62 = "[ns] 「等一下！輪擋還沒……！」"
2000503-65 = "咦，奇怪？#n難道戰車的履帶……？"
2000503-67 = "……"
2000503-68 = "老師，你會修理戰車履帶嗎……？"
2000503-69 = "[s1] 「我沒有這方面的技術……」\n[s2] 「我去把日步美的衣物拿過來，你可以等我嗎？」"
2000503-70 = "……不好意思，要麻煩老師幫我把衣服拿過來了……"
2000503-71 = "……不好意思，要麻煩老師幫我把衣服拿過來了……"
2000503-73 = "（結果走了近一小時的路，把日步美的制服帶了過來）"
2000503-74 = "（途中還因為帶著女學生的制服而被警察盤問……）"

[translation]
2000503-1 = "ขับขี่อย่างระมัดระวัง"
2000503-2 = "ด้านในรถถัง <ครูเซเดอร์จัง> ของชมรมชั้นเรียนเสริม"
2000503-4 = "อืม... รถถังสั่นมากเลย น่าจะเป็นเพราะถนนไม่ดีนะคะ"
2000503-5 = "คุณครูต้องระวังไม่ให้ไปกระแทกกับราวกั้นที่รถถังนะคะ "
2000503-6 = "ถ้าไปโดนส่วนที่แหลมๆ ก็อาจจะเจ็บตัวได้เลยค่ะ"
2000503-7 = "ส่วนฉันเองก็จะใส่เสื้อผ้าหนาๆ เวลาที่ต้องนั่งรถถังค่ะ จะได้ไม่เป็นแผลเวลาหกล้ม"
2000503-8 = "[s] \"แล้วทำไมตอนนี้ถึงใส่ชุดว่ายน้ำอยู่ล่ะ...?\""
2000503-9 = "คะ? ก็เพราะว่าเราจะไปที่ชายหาดกันยังไงล่ะคะ"
2000503-10 = "แต่ชายหาดที่เรากำลังไป มันอยู่ไกลออกไปมาก และไม่มีที่สำหรับเปลี่ยนชุดด้วยค่ะ"
2000503-11 = "อีกอย่างฉันอดใจรอที่จะลงเล่นน้ำทะเลไม่ไหวแล้ว ก็เลยเปลี่ยนชุดมาล่วงหน้าเลยค่ะ!"
2000503-12 = "[s] \"ใส่ชุดว่ายน้ำขึ้นรถถัง... มันรู้สึกแปลกๆ อยู่นะ\""
2000503-13 = "แหะๆๆ... พอคุณครูพูดแบบนี้ฉันก็เขินนะคะ"
2000503-14 = "แต่ถ้าอยู่ในรถถัง คนข้างนอกก็มองไม่เห็นอยู่ดี..."
2000503-15 = "อีกอย่างนี่เป็นชุดว่ายน้ำที่คุณครูช่วยเลือกให้ด้วย ฉันไม่อึดอัดที่จะใส่ต่อหน้าคุณครูหรอกค่ะ!"
2000503-16 = "เอาล่ะ... เรามาเร่งความเร็วเพื่อมุ่งหน้าไปยังทะเลกันเถอะค่ะ!"
2000503-19 = "ฉันว่าเรามาถึงกันแล้วละค่ะ"
2000503-20 = "ออกมาข้างนอกสิคะคุณครู!"
2000503-24 = "ชายหาดมูอิกาฮามะ"
2000503-25 = "ทะเล~"
2000503-26 = "[s] \"ทะเล!\""
2000503-27 = "ฮิฮิ ได้มาดูทะเลทันทีที่มาถึงแบบนี้รู้สึกดีจังเลยนะคะ"
2000503-28 = "ถึงแม้ตอนนี้อยากจะกระโดดลงในไปทะเลแล้วก็เถอะ... "
2000503-29 = "แต่ตามคู่มือแล้วเราจะต้องวางโช๊คล้อก่อนจอดรถถัง คุณครูช่วยทำหน่อยได้มั้ยคะ?"
2000503-30 = "[s] \"ได้สิ\""
2000503-36 = "[ns] \"ทีนี้ก็ออกมาได้แล้วละ\""
2000503-37 = "ค่ะ ฉันจะรีบออกไปเลยค่ะ!"
2000503-39 = "ฮึบ..."
2000503-40 = "เอ๋? ได้ยินเสียงเหมือนอะไรขาดเลย?"
2000503-41 = "ว้ายย?!"
2000503-45 = "[ns] \"มีอะไรเหรอ?\""
2000503-49 = "ขาดซะแล้ว..."
2000503-50 = "[s] \"อะไรขาดเหรอ...?\""
2000503-51 = "ด้านหลังชุดว่ายน้ำค่ะ... มันไปเกี่ยวกับราวกั้นของรถถังจนขาดเลย..."
2000503-52 = "[ns] \"ชุดว่ายน้ำขาดงั้นเรอะ!?!\""
2000503-53 = "จุ๊ๆ พูดเบาๆ สิคะ!"
2000503-54 = "ทำยังไงดีล่ะคะคุณครู?! ฉันจะกลับในสภาพนี้ไม่ได้นะคะ!"
2000503-55 = "ฉันรีบร้อนเปลี่ยนชุดว่ายน้ำในห้องจนไม่ได้เอาชุดอื่นมาเผื่อเลยด้วย..."
2000503-56 = "[s] \"เดี๋ยวครูไปร้านเสื้อผ้าแถวนี้แล้วซื้อชุดมาให้\""
2000503-57 = "ไม่ได้หรอกค่ะ... อย่าว่าแต่ร้านเสื้อผ้าเลยค่ะ ร้านสะดวกซื้อแถวนี้ฉันยังไม่เห็นเลย"
2000503-58 = "สะ... สงสัยจะต้องรีบขับรถถังกลับที่พักแล้วละค่ะ!"
2000503-62 = "[ns] \"เดี๋ยวก่อน! โช๊คมันยัง...!\""
2000503-65 = "วะ... ว้าย? ทำไมสายพานรถถังมัน...?"
2000503-67 = "..."
2000503-68 = "คุณครูคะ คุณครูรู้วิธีซ่อมสายพานล้อรถถังมั้ยคะ...?"
2000503-69 = "[s1] \"ครูซ่อมไม่เป็นหรอก งั้นคงมีทางเดียว...\"\n[s2] \"เดี๋ยวครูเดินไปที่พักฮิฟุมิให้เอง\""
2000503-70 = "ขอโทษนะคะ แต่ขอรบกวนด้วยค่ะ..."
2000503-71 = "ขอโทษนะคะ แต่ขอรบกวนด้วยค่ะ..."
2000503-73 = "(สุดท้ายคุณครูก็เดินเท้าชั่วโมงกว่าเพื่อไปเอาชุดนักเรียนมาให้ฮิฟุมิ)"
2000503-74 = "(และระหว่างทางคุณครูก็โดนด่านตรวจเรียกตัวเพราะเข้าใจผิดว่าเป็นโรคจิตที่ชอบชุดนักเรียนเด็กผู้หญิง...)"

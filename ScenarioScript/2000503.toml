[translation]
2000503-1 = "Please Drive Safely"
2000503-2 = "Inside the Crusader"
2000503-4 = "The road in this neighborhood is sort of bumpy,"
2000503-5 = "Careful, Sensei. Be sure not to hit the tank's railing. "
2000503-6 = "There are a lot of sharp edges to scratch yourself on."
2000503-7 = "I try to wear thick clothes when I'm in the tank. That way I won't get hurt even if I slip and fall."
2000503-8 = "[s] \"But aren't you wearing a swimsuit right now?\""
2000503-9 = "Well, yeah. That's because we're going to the beach."
2000503-10 = "The place we're headed is also very remote and open, so there's nowhere to change clothes once we get there."
2000503-11 = "Besides, I always want to jump into the water as soon as I get there, so I changed into my swimsuit ahead of time!"
2000503-12 = "[s] \"Still, a bikini and a tank make for an interesting combo.\""
2000503-13 = "Haha... Yeah, it is a little embarrassing when you put it like that."
2000503-14 = "Luckily, it's not like anyone can see what I'm wearing when I'm down here."
2000503-15 = "And you're the one who picked this out for me, so I don't feel uncomfortable wearing it in front of you!"
2000503-16 = "Okay, pedal to the metal time. Let's get to the beach!"
2000503-19 = "Oh, I think we're finally here."
2000503-20 = "Sensei, come outside!"
2000503-24 = "Muigahama Beach"
2000503-25 = "We're at the beach!"
2000503-26 = "[s] \"The beach! The beach!\""
2000503-27 = "Doesn't it look great? Just look at the waves crashing."
2000503-28 = "I really want to jump in right away... "
2000503-29 = "...but we need to park the tank first. The manual says to install the wheel chock first. Could you do that?"
2000503-30 = "[s] \"No problem.\""
2000503-36 = "[ns] \"You can come out now.\""
2000503-37 = "Okay, be right there!"
2000503-39 = "Upsy-daisy..."
2000503-40 = "Wait. Was that just..."
2000503-41 = "Oh, no!"
2000503-45 = "[ns] \"What's wrong?\""
2000503-49 = "It ripped..."
2000503-50 = "[s] \"What did?\""
2000503-51 = "The back of the swimsuit got caught on the railing of the tank and ripped..."
2000503-52 = "[ns] \"You tore your swimsuit?!\""
2000503-53 = "Shhh! Not so loud!"
2000503-54 = "What do I do, Sensei?! How am I supposed to come out like this?"
2000503-55 = "I was so excited when I changed into my swimsuit that I forgot to pack any other clothes..."
2000503-56 = "[s] \"I'll go to the nearest store and buy you something.\""
2000503-57 = "But I told you this place is completely remote. There's not even a convenience store."
2000503-58 = "O-Our only choice is to drive the tank back!"
2000503-62 = "[ns] \"Wait, the wheel chock is still...!\""
2000503-65 = "What happened to the tank tread...?"
2000503-67 = "..."
2000503-68 = "Sensei, you wouldn't happen to know how to repair tank treads, would you?"
2000503-69 = "[s1] \"Nope. That leaves one choice...\"\n[s2] \"I guess I'm walking to your dorm and back.\""
2000503-70 = "I'm sorry. Thank you for doing this..."
2000503-71 = "I'm sorry. Thank you for doing this..."
2000503-73 = "I walked for hours to bring Hifumi her uniform."
2000503-74 = "I was stopped along the way and accused of being a pervert that stole a schoolgirl's uniform..."

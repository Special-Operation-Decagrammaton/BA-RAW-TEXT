[translation]
2000503-1 = "#title;안전 주행 주의"
2000503-2 = "#place;보충수업부 비품 <크루세이더 쨩> 내부"
2000503-3 = "#bgshake\n#wait;2500"
2000503-4 = "3;히후미 수영복ND;01;으음, 이 근처는 도로 사정이 나빠서 그런지 전차가 많이 흔들리네요.\n#3;a"
2000503-5 = "3;히후미 수영복ND;06;선생님, 전차의 난간에 부딪히지 않게 주의하세요. \n#3;em;[반응]"
2000503-6 = "3;히후미 수영복ND;05;난간의 뾰족한 부분에 긁히면 다칠 수도 있다고 하거든요."
2000503-7 = "3;히후미 수영복ND;00;저도 전차를 탈 때만큼은 넘어져도 다치지 않도록 두꺼운 옷을 입으려 해요.\n#3;greeting\n#3;em;[!]"
2000503-8 = "[s] \"……그런데 어째서 지금은 수영복을 입고 있는 거야……?\""
2000503-9 = "3;히후미 수영복ND;02;네? 그야 지금부터 해변에 간다고 했으니까요.\n#3;em;[반응]"
2000503-10 = "3;히후미 수영복ND;01;지금 가는 해변은 워낙 외진 곳에 있어서 주변에 마땅히 옷을 갈아입을 만한 곳이 없거든요."
2000503-11 = "3;히후미 수영복ND;03;게다가 바다에 빨리 뛰어들고 싶은 마음을 참을 수가 없어서, 미리 숙소에서 수영복으로 갈아입어 버렸어요!\n#3;em;[반짝]"
2000503-12 = "[s] \"수영복을 입고 전차를 탄다니, 뭔가 이상한 느낌이네.\""
2000503-13 = "3;히후미 수영복ND;08;아하하…… 선생님께서 그렇게 말씀하시니 뭔가, 새삼 부끄럽네요…….\n#3;em;[땀]\n#3;stiff"
2000503-14 = "3;히후미 수영복ND;02;하지만 전차 안이라면 밖에서 보이지 않는 데다가……"
2000503-15 = "3;히후미 수영복ND;03;선생님이 골라준 수영복이니까, 선생님께 수영복 차림을 보이는 건 신경 쓰지 않아요!\n#3;em;[하트]\n#3;greeting"
2000503-16 = "3;히후미 수영복ND;00;자…… 그럼 바다를 향해, 조금 더 속도를 내볼까요?\n#3;em;[!]\n#3;closeup"

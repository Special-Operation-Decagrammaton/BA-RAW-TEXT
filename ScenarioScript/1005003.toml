[translation]
1005003-1 = "#title;어린 아이가 아니에요. 숙녀라구요!"
1005003-2 = "#place;산해경 매화원"
1005003-3 = "#na;(산해경의 일을 마치고 돌아가던 중, 코코나를 만났다.)"
1005003-4 = "3;코코나;03;앗, 안녕하세요. 선생님!\n#3;em;[반응]\n#3;greeting\n#3;a"
1005003-5 = "3;코코나;01;샬레로 돌아가는 길이세요? 마침 저도 그쪽으로 가는 길이었어요."
1005003-6 = "3;코코나;01;무슨 일이냐구요? 슌 언니가 샬레 근처에서 볼 일이 있다고 해서요.\n#3;em;[재잘]"
1005003-7 = "3;코코나;01;언니를 마중 나가려던 참이었거든요."
1005003-8 = "3;코코나;01;이왕 이렇게 되었으니, 선생님께 기회를 드릴게요."
1005003-9 = "3;코코나;07;바로…… 숙녀인 저를 에스코트할 기회 말이에요. 에헴!\n#3;em;[반짝]"
1005003-10 = "[s1] \"코코나 쨩의 에스코트라…… 확실히 귀한 기회네.\"\n[s2] \"내가 코코나 쨩을? 어떤 의미로는 영광이네.\""
1005003-11 = "3;코코나;10;그-러-니-까-! 코코나 쨩이 아니라구요!\n#3;em;[빠직]\n#3;stiff"
1005003-12 = "3;코코나;10;그-러-니-까-! 코코나 쨩이 아니라구요!\n#3;em;[빠직]\n#3;stiff"
1005003-13 = "3;코코나;12;으우…… 저희 둘만 있으니까 참아 드리는 거예요?"
1005003-14 = "#all;hide"

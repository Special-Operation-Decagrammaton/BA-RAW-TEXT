[translation]
1005003-1 = "ไม่ใช่เด็กนะคะ หญิงสาวต่างหากค่ะ!"
1005003-2 = "สวนต้นบ๊วย ซานไห่จิง"
1005003-3 = "(คุณครูบังเอิญเจอกับโคโคน่า ระหว่างทางกลับจากทำธุระที่ซานไห่จิง)"
1005003-4 = "อ๊ะ สวัสดีค่ะ คุณครู!"
1005003-5 = "กำลังจะกลับชาเล่ต์เหรอคะ? ฉันก็กำลังจะไปที่นั่นพอดีเลยค่ะ"
1005003-6 = "มีเรื่องอะไรหรือเปล่าน่ะเหรอคะ? พอดีพี่ชุนบอกว่ามีธุระแถวๆ ชาเล่ต์น่ะค่ะ"
1005003-7 = "ฉันเลยว่าจะไปหาพี่ชุนพอดีเลยน่ะค่ะ"
1005003-8 = "ไหนๆ ก็ได้มาเจอกันแบบนี้แล้ว ฉันจะให้โอกาสคุณครูแล้วกันนะคะ"
1005003-9 = "นั่นก็คือ... โอกาสที่จะได้เดินคุ้มกันไปส่งสุภาพสตรีอย่างฉันค่ะ อ่ะแฮ่ม!"
1005003-10 = "[s1] \"คุ้มกันโคโคน่าจังเหรอ... โอกาสหายากเลยนะเนี่ย\"\n[s2] \"ให้ครูคุ้มกันโคโคน่าจังเหรอ? เป็นเกียรติมากเลย\""
1005003-11 = "ก็-บอก-ว่า อย่าเรียกว่าโคโคน่าจังไงล่ะคะ!"
1005003-12 = "ก็-บอก-ว่า อย่าเรียกว่าโคโคน่าจังไงล่ะคะ!"
1005003-13 = "ฮือ... ตอนนี้เราอยู่กันสองคน ฉันจะยอมคุณครูไปก่อนแล้วกันนะคะ"
1005003-15 = "(จากนั้นคุณครูกับโคโคน่าก็เดินคุยกันมาเรื่อยๆ จนถึงในเมือง)"
1005003-17 = "ถนนในเมือง"
1005003-18 = "มานึกๆ ดูแล้ว เมื่อกี้คุณครูซื้อกาแฟดื่มด้วยใช่มั้ยคะ?"
1005003-19 = "พวกผู้ใหญ่มักจะดื่มกาแฟกันตลอดเลย... มันรสชาติดีมั้ยคะ?"
1005003-20 = "[s3] \"ไม่ได้กินเพราะอร่อยหรอก แต่กินเพื่อให้ถ่างตาอยู่ได้มากกว่า...\"\n[s4] \"เรียกว่าเป็นรสชาติของความเป็นผู้ใหญ่ดีกว่า...\""
1005003-21 = "ไม่เห็นเข้าใจเลย... แต่ดูจากที่คุณครูดื่มวันละหลายแก้วแบบนี้"
1005003-22 = "ไม่เห็นเข้าใจเลย... แต่ดูจากที่คุณครูดื่มวันละหลายแก้วแบบนี้"
1005003-23 = "กาแฟนี่... จะต้องมีเสน่ห์บางอย่างสินะคะ"
1005003-24 = "[s] \"ลองชิมดูสักหน่อยมั้ยล่ะ? รสชาติของผู้ใหญ่น่ะ\""
1005003-25 = "นะ...แน่นอนค่ะ ฉันเองก็เป็นผู้ใหญ่แล้วนะคะ!"
1005003-26 = "ถึงจะสังหรณ์ใจไม่ค่อยดีเพราะรอยยิ้มกรุ้มกริ่มแปลกๆ ของคุณครูก็เถอะค่ะ..."
1005003-27 = "ดีละ สำหรับฉัน แค่กาแฟน่ะไม่เท่าไรหรอกค่ะ!"
1005003-28 = "(ยื่นกาแฟให้โคโคน่าจัง)"
1005003-29 = "นี่มัน... กาแฟเหรอ..."
1005003-30 = "สีดำสนิทเลยนะคะ... ดำปิ๊ดปี๋เหมือนท้องฟ้าตอนกลางคืนเลยค่ะ"
1005003-31 = "แถมยังร้อนๆ อีกด้วย..."
1005003-32 = "อ๊ะ เหมือนมือจะไหม้เลยค่ะ..."
1005003-33 = "นี่กลิ่นอะไรน่ะคะ? กลิ่นมัน...เหมือนมีกลิ่นไหม้อยู่นิดๆ เลย..."
1005003-34 = "มันกินได้จริงๆ ใช่ไหมคะ?"
1005003-35 = "[s5] \"ถ้ากลัวขนาดนั้นละก็ ล้มเลิกตอนนี้ก็ยังไม่สายนะ\"\n[s6] \"งั้นเหรอ~ ยังเร็วไปสำหรับโคโคน่าจังสิน้า~\""
1005003-36 = "พะ...พูดอะไรอย่างนั้นคะ!"
1005003-37 = "พะ...พูดอะไรอย่างนั้นคะ!"
1005003-38 = "คือฉันก็แค่... ก็แค่..."
1005003-39 = "ค่ะ! ฉันแค่กำลังวิเคราะห์กลิ่นหอมของมันเฉยๆ ต่างหากค่ะ!"
1005003-40 = "[s] \"เมื่อกี้บอกว่ากลิ่นไหม้ไม่ใช่เหรอ?\""
1005003-41 = "ฉันบอกว่าได้กลิ่นไหม้ก็จริง แต่ไม่ได้บอกว่าไม่ชอบกลิ่นไหม้สักหน่อยนี่คะ"
1005003-42 = "ถ้าแค่นี้ดื่มไม่ได้... ก็ไม่ควรเรียกว่าผู้ฝึกสอนสิคะ"
1005003-43 = "[s] \"ครูว่ามันไม่เกี่ยวกับครูผู้สอนนะ...\""
1005003-44 = "อะ...เอาเป็นว่าถ้าฉันบอกว่าเกี่ยว มันก็เกี่ยวค่ะ!"
1005003-45 = "อย่างน้อยก็พูดเพื่อตัวฉันเอง..."
1005003-46 = "ถะ...ถ้างั้นจะดื่มแล้วนะคะ"
1005003-47 = "หนึ่ง สอง สาม...!"
1005003-51 = "(โคโคน่าดื่มกาแฟหมดในอึดใจเดียว)"
1005003-52 = "(คุณครูไม่ทันบอกเธอว่าไม่ต้องดื่มหมดก็ได้...)"
1005003-53 = "ฮู่ว..."
1005003-54 = "[s] \"เป็นอะไรรึเปล่า โคโคน่าจัง?\""
1005003-55 = "ขม... จัง... ค่ะ..."
1005003-56 = "แหวะ... นี่มันอะไรกันคะ ทั้งเข้ม ทั้งขม ไม่อร่อยเลย..."
1005003-57 = "ทำไมพวกผู้ใหญ่ถึงดื่มอะไรแบบนี้กันด้วยล่ะคะ?"
1005003-58 = "พวกผู้ใหญ่ชอบความทรมานแบบนี้เหรอคะ? โรคจิตกันรึไงคะ?"
1005003-59 = "หรือว่ารสชาติของความเป็นผู้ใหญ่คือรสชาติโรคจิตแบบนี้เหรอคะ?!"
1005003-60 = "[s7] \"เปล่า ไม่ถึงขนาดนั้น...\"\n[s8] \"ในบางครั้งก็ดูเหมือนจะเป็นแบบนั้นนะ...!\""
1005003-61 = "แหวะ... ไม่รู้ด้วยแล้วค่ะ ฉันชอบไอศกรีมมากกว่าอีกค่ะ"
1005003-62 = "แหวะ... ไม่รู้ด้วยแล้วค่ะ ฉันชอบไอศกรีมมากกว่าอีกค่ะ"
1005003-63 = "แต่พวกผู้ใหญ่ก็ชอบไอศกรีมเหมือนกันนี่คะ?"
1005003-64 = "ถ้างั้นเราก็เรียกรสชาติของไอศกรีมว่าเป็นรสชาติของผู้ใหญ่ได้ใช่มั้ยล่ะคะ?"
1005003-65 = "รีบตอบว่าใช่สิคะ คุณครู~"
1005003-66 = "คะ? ผู้ใหญ่ชอบทั้งกาแฟและไอศกรีมงั้นเหรอคะ? "
1005003-67 = "ฮือ... ไม่รู้ๆ ไม่รับรู้อะไรแล้วค่ะ..."
1005003-69 = "(จากนั้นคุณครูก็ปลอบโคโคน่าที่ร้องไห้ไม่หยุดตลอดระหว่างทางเดินไปชาเล่ต์)"

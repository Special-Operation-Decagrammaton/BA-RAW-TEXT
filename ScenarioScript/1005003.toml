[translation]
1005003-1 = "Not a Girl, but a Lady!"
1005003-2 = "Plum Blossom Garden"
1005003-3 = "I ran into Kokona on my way back from Shanhaijing."
1005003-4 = "Oh! Hello, Sensei!"
1005003-5 = "Are you going back to Schale? I was just on my way there."
1005003-6 = "Shun said she had business near Schale."
1005003-7 = "I was going to meet her there."
1005003-8 = "Now that you're here, you have a rare opportunity..."
1005003-9 = "You can escort me like a proper lady!"
1005003-10 = "[s1] \"Escorting Kokona? That IS a rare opportunity.\"\n[s2] \"I would be honored to escort you, Kokona.\""
1005003-11 = "I SAID it's Instructor Kokona!"
1005003-12 = "I SAID it's Instructor Kokona!"
1005003-13 = "Ugh... I guess I'll let it go, since it's just the two of us."
1005003-15 = "We bickered all the way to the city."
1005003-17 = "City Street"
1005003-18 = "You bought another cup of coffee?"
1005003-19 = "So many people drink coffee... Is it really that good?"
1005003-20 = "[s3] \"After a fashion. It's more about the caffeine than the taste.\"\n[s4] \"It's...an acquired taste.\""
1005003-21 = "And yet you drink several cups a day."
1005003-22 = "And yet you drink several cups a day."
1005003-23 = "There must be a good reason. Is it because it makes you seem sophisticated?"
1005003-24 = "[s] \"Why don't you just taste it and see for yourself?\""
1005003-25 = "...S-Sure. Why not? I am a proper lady after all."
1005003-26 = "Stop smiling at me like that... It's making me nervous."
1005003-27 = "Okay... Coffee. Yeah. I can drink coffee. No problem!"
1005003-28 = "I gave the coffee to Kokona."
1005003-29 = "So this is coffee..."
1005003-30 = "It's darker than the night sky."
1005003-31 = "Oh, and hot."
1005003-32 = "Ouch! Hot enough to burn me."
1005003-33 = "But the smell! It's so... Wait. Is it burnt?"
1005003-34 = "Are you sure I can drink this?"
1005003-35 = "[s5] \"You don't have to if you don't want to.\"\n[s6] \"Well, it's not for everyone. Here, I'll take it.\""
1005003-36 = "Wh-What?! No, I still want it."
1005003-37 = "Wh-What?! No, I still want it."
1005003-38 = "I just—Umm..."
1005003-39 = "I'm just enjoying its scent, okay?!"
1005003-40 = "[s] \"You just said it smells burnt...\""
1005003-41 = "So? I didn't say I don't like the smell."
1005003-42 = "I'm an instructor. I can handle a cup of coffee."
1005003-43 = "[s] \"What does being an instructor have to do with it?\""
1005003-44 = "I-I don't know. Something!"
1005003-45 = "It does for me, anyway..."
1005003-46 = "So. I'll just go ahead and drink it now..."
1005003-47 = "One. Two. Three!"
1005003-51 = "Kokona drank all the coffee in one big gulp."
1005003-52 = "I didn't even have a chance to tell her to sip it."
1005003-53 = "Ugh. Bleh."
1005003-54 = "[s] \"Are you okay, Kokona? What do you think?\""
1005003-55 = "It's bitter and..."
1005003-56 = "Disgusting! It's the worst thing I've ever tasted!"
1005003-57 = "Why do you drink this crap?"
1005003-58 = "Do you LIKE torturing yourself? Are you a masochist?"
1005003-59 = "Is EVERYONE who drinks this a masochist?"
1005003-60 = "[s7] \"No, that's not it at all...\"\n[s8] \"I can understand why you'd think that, but—\""
1005003-61 = "Ugh! Coffee is gross. I'd rather have ice cream. "
1005003-62 = "Ugh! Coffee is gross. I'd rather have ice cream. "
1005003-63 = "Hey! You like ice cream, don't you?"
1005003-64 = "Does that mean eating ice cream is sophisticated too?"
1005003-65 = "Please say yes, Sensei. I couldn't bear to give it up."
1005003-66 = "Huh? There's coffee-flavored ice cream?"
1005003-67 = "Ewwww! I'll never understand THAT."
1005003-69 = "I comforted the disappointed Kokona on our way back to Schale."

1005003-16 = "#all;hide"
1005003-17 = "#place;도시 거리"
1005003-18 = "3;코코나;01;그러고 보니 조금 전 커피를 사 오셨죠?\n#3;a"
1005003-19 = "3;코코나;02;어른들은 다들 커피를 마시던데…… 맛있나요?\n#3;em;[?]"
1005003-20 = "[s3] \"……맛있어서 마신다기보다는, 살기 위해서 마신다고 할까……\"\n[s4] \"어른의 맛이라는 거지, 음.\""
1005003-21 = "3;코코나;99;잘 모르겠지만…… 매일같이 몇 잔씩 마시는 걸 보면."
1005003-22 = "3;코코나;99;잘 모르겠지만…… 매일같이 몇 잔씩 마시는 걸 보면."

[translation]
1005003-1 = "我不是小孩子，我是淑女！"
1005003-2 = "山海經訓育支援部．梅花園"
1005003-3 = "（解決完山海經的工作，在回程時遇到心菜）"
1005003-4 = "啊，你好。老師！"
1005003-5 = "你要回去夏萊了嗎？我正好也要往那個方向。"
1005003-6 = "聽旬姊姊說她要去夏萊附近辦點事。"
1005003-7 = "所以我正打算要去接她。"
1005003-8 = "……既然如此，那我就給老師一個機會吧。"
1005003-9 = "那就是……護送我這位淑女的大好機會。欸嘿！"
1005003-10 = "[s1]「護送心菜醬……這確實是個難得的機會。」\n[s2]「要我護送心菜醬？這是我的榮幸。」"
1005003-11 = "就──說──了──！不要叫我心菜醬！"
1005003-12 = "就──說──了──！不要叫我心菜醬！"
1005003-13 = "唔唔……要不是現在只有我們兩個人，我才不會這麼輕易就算了。"
1005003-15 = "（之後也繼續和心菜一邊開心交談，一邊朝市區的方向走去）"
1005003-17 = "夜晚的街道"
1005003-18 = "話說回來，老師剛才不是有買咖啡來嗎？"
1005003-19 = "我聽說大人都會喝咖啡……那東西好喝嗎？"
1005003-20 = "[s3]「……比起好不好喝，應該說是為了活下去才喝……」\n[s4]「咖啡是大人的味道，嗯。」"
1005003-21 = "雖然聽不太懂……不過看老師每天都會喝好幾杯。"
1005003-22 = "雖然聽不太懂……不過看老師每天都會喝好幾杯。"
1005003-23 = "想必它一定有什麼……無法抗拒的魅力吧。"
1005003-24 = "[s]「要喝一口看看嗎？大人的味道。」"
1005003-25 = "……當然好。我可是成熟的淑女！"
1005003-26 = "雖然老師笑得很詭異，讓人有些在意……"
1005003-27 = "好吧。咖啡這種東西才難不倒我呢！"
1005003-28 = "（將咖啡遞給心菜）"
1005003-29 = "這就是……咖啡……"
1005003-30 = "黑黑的……看起來比夜空還要黑。"
1005003-31 = "而且好燙喔。"
1005003-32 = "哎唷，感覺手都要被燙傷了……"
1005003-33 = "這是什麼味道啊？怎麼好像有種燒焦的味道……"
1005003-34 = "這東西喝了真的沒問題嗎？"
1005003-35 = "[s5]「不想喝不用勉強自己喔。」\n[s6]「咖啡可能對心菜醬來說還太早了呢。」"
1005003-36 = "說，說什麼呢！"
1005003-37 = "說，說什麼呢！"
1005003-38 = "我只是，那個……"
1005003-39 = "沒錯！我只是在感受咖啡的香氣！"
1005003-40 = "[s]「你剛才不是說有股焦味嗎？」"
1005003-41 = "我確實是那樣說過，可是我又沒說我討厭那種味道。"
1005003-42 = "要是連這種東西都喝不了……不就沒資格自稱是合格的教官了。"
1005003-43 = "[s]「這跟教官好像沒什麼關係……」"
1005003-44 = "總，總之我說是那樣就是那樣！"
1005003-45 = "至少對我自己來說是那樣……"
1005003-46 = "那，那我要喝了。"
1005003-47 = "3、2、1……！"
1005003-51 = "（心菜將咖啡一口喝下）"
1005003-52 = "（完全來不及告訴他咖啡不是這樣喝的）"
1005003-53 = "哈啊……唔唔……"
1005003-54 = "[s]「心菜醬，還好嗎？」"
1005003-55 = "好……苦……"
1005003-56 = "嗚呃呃呃……這是什麼東西啊。好澀好苦，好難喝……"
1005003-57 = "大人們為什麼要喝這種東西啊？"
1005003-58 = "難道大人都喜歡自找苦吃嗎？你們是變態嗎？"
1005003-59 = "大人的味道難道就是變態的味道嗎！？"
1005003-60 = "[s7]「不，也沒那麼誇張吧……」\n[s8]「某種意義上來說確實是這樣！？」"
1005003-61 = "嗚呃呃……我不懂。我果然還是比較喜歡冰淇淋。"
1005003-62 = "嗚呃呃……我不懂。我果然還是比較喜歡冰淇淋。"
1005003-63 = "不過大人們應該也喜歡冰淇淋吧？"
1005003-64 = "既然如此，冰淇淋應該也稱得上是大人的味道吧？"
1005003-65 = "請快點說「對」，老師。"
1005003-66 = "咦？你說冰淇淋和咖啡都懂得品嚐才叫做大人？"
1005003-67 = "嗚嗚嗚……我不懂那種東西啦。不知道啦……"
1005003-69 = "（之後在回到夏萊的路上，一直安慰著愁眉苦臉的心菜）"

[translation]
34255-5 = "發，發生什麼事了！為什麼無法跟夫人取得聯繫！？"
34255-6 = "緊急狀況！！三，三一的士兵……！！"
34255-7 = "從自治區數十個地下墓穴的入口湧進來了……！！"
34255-8 = "你，你說什麼！？"
34255-14 = "在，在這裡！"
34255-15 = "出，出動──！"
34255-23 = "是，是誰！！"
34255-30 = "這裡就是奧利斯自治區啊……"
34255-31 = "像聖亞大人說的一樣……需要「救護」呢。"
34255-37 = "快，快阻止她！！"
34255-51 = "──請原諒我吧。因為個人的感傷而疏忽了應盡的義務。明明他們也是需要救護的對象才對……"
34255-52 = "芹奈，花繪。治療他們吧。"
34255-53 = "是，是的……團長。"
34255-54 = "然後──接下來因我而產生的傷患們，也請儘速幫他們救護和治療吧。"
34255-55 = "我要上了！！"
34255-64 = "團，團長……"
34255-66 = "果然和我們「美禰團長來破壞，騎士團來治療」的座右銘一樣呢！！#n久違的救護騎士團要大展身手囉！"
34255-67 = "沒，沒有那種座右銘吧……"
34255-69 = "好了，大家快點行動吧！"
34255-70 = "心懷信念與榮耀！進行適當且必要的救護！"
34255-71 = "解放奧利斯自治區，救出老師和彌香大人！！"
34255-73 = "是！"
34255-74 = "一大清早突然就被叫來參加這種任務……！#n嗚哇──！"
34255-76 = "下一話;今後的我們"

[translation]
34255-5 = "กะ... เกิดอะไรขึ้นกันเนี่ย! ทำไมติดต่อมาดามไม่ได้ล่ะ!"
34255-6 = "เกิดเรื่องด่วนค่ะ!! ตอนนี้กองกำลังจากทรีนิตี้กำลังบุกเข้ามา...!! "
34255-7 = "กองกำลังทรีนิตี้... กำลังบุกเข้ามาค่ะ!!"
34255-8 = "วะ... ว่ายังไงนะ?!"
34255-14 = "ทะ... ทางนี้ค่ะ! "
34255-15 = "ออกปฏิบัติการ!"
34255-23 = "คะ... ใครน่ะ?!"
34255-30 = "ที่นี่คงเป็นเขตปกครองตนเองอาเรียส..."
34255-31 = "ที่ที่ต้องการ <ความช่วยเหลือ>... ตามที่คุณเซอาบอกสินะคะ"
34255-37 = "ยะ... หยุดนะ!!"
34255-51 = "ยกโทษให้ฉันด้วยนะคะ ความทรงจำส่วนตัวของฉันทำให้ฉันเพิกเฉยต่อภารกิจที่ได้รับค่ะ"
34255-52 = "เซรินะ ฮานาเอะ ช่วยรักษาคนพวกนี้ที"
34255-53 = "คะ... คะ? หัวหน้า"
34255-54 = "ช่วยไปช่วยผู้ที่ได้รับบาดเจ็บจากฝีมือของฉัน แล้วรักษาพวกเขาด้วยนะคะ"
34255-55 = "ไปเลยค่ะ!!"
34255-64 = "หะ... หัวหน้าคะ..."
34255-66 = "นี่แหละค่ะคติของพวกเรา <มิเนะก่อเรื่อง อัศวินบรรเทาทุกข์ตามเก็บ> เหมือนกับพลังงานที่ไม่สิ้นสุด ของการพัฒนาตัวเองเลยค่ะ!"
34255-67 = "ไม่เห็นจะมีคติอะไรแบบนั้นเลยนี่ค่ะ... "
34255-69 = "เอาละ เร่งมือกันหน่อยค่ะ!"
34255-70 = "เข้าช่วยในพื้นที่ที่ต้องการความช่วยเหลือ! ด้วยความเชื่อมั่นและความองอาจ!"
34255-71 = "ไปเลยค่ะ!! ปลดปล่อยเขตปกครองตนเองอาเรียส แล้วไปช่วยคุณครูกับคุณมิกะกันค่ะ!!"
34255-73 = "ค่าา! "
34255-74 = "จู่ๆ ก็เรียกพวกเราออกมา แล้วก็มอบภารกิจที่ยิ่งใหญ่ให้กันแบบนี้...! งือออ!"
34255-76 = "ตอนต่อไป;พวกเราในอนาคต"

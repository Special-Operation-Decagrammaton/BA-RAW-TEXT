[translation]
34255-5 = "What happened? Why can't we reach Madame?"
34255-6 = "Emergency! The catacombs have been breached!"
34255-7 = "Trinity forces are pouring out of the entrances!"
34255-8 = "H-How is that possible?"
34255-14 = "This way! "
34255-15 = "Let's go!"
34255-23 = "Wh-Who are you?!"
34255-30 = "So, this is the Arius district."
34255-31 = "It's as Seia said. This place needed our aid, not repudiation."
34255-37 = "Stop right there!"
34255-51 = "Forgive me. I allowed my personal memories and feelings to impede my duties."
34255-52 = "Serina, Hanae. Treat them."
34255-53 = "Yes, Captain!"
34255-54 = "From here on out, your role is to quickly rescue and treat any enemies I injure."
34255-55 = "Stay close behind me!"
34255-64 = "Captain..."
34255-66 = "This is our motto: Mine destroys everything and her knights pick up the pieces! It's like some kind of self-generating perpetual power!"
34255-67 = "I-I don't know if I would call that a motto...or even a correct statement...  "
34255-69 = "Remedial Knights! Remain diligent!"
34255-70 = "Go forth with faith and honor in your heart! Medicine knows no borders!"
34255-71 = "Charge! Liberate the Arius district and save Sensei and Mika!"
34255-73 = "Yeah! "
34255-74 = "I can't believe we're on such a big mission at the break of dawn... Augh!"
34255-76 = "Next Episode; Our Future"

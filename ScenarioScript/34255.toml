[translation]
34255-5 = "ど、どうしたんだ！何故マダムと連絡がとれない！？"
34255-6 = "緊急事態です！！自治区にある数十箇所のカタコンベの入口から……！！"
34255-7 = "と、トリニティの兵が……！！"
34255-8 = "な、何だって！？"
34255-14 = "こ、こちらです！"
34255-15 = "しゅ、出動ー！"
34255-23 = "だ、誰だ！！"
34255-30 = "ここがアリウス自治区……。"
34255-31 = "セイア様の言う通り……「救護」が必要ですね。"
34255-37 = "と、止まれ！！"
34255-51 = "――私をお許しください。個人的な感傷によって、果たすべき義務を疎かにしました。彼女たちもまた、救護が必要な方々であるというのに……。"
34255-52 = "セリナ、ハナエ。彼女たちの治療を。"
34255-53 = "は、はい……団長。"
34255-54 = "そして――これから私が生み出す負傷者も、速やかに救護し治療するようお願いします。"
34255-55 = "参ります！！"
34255-64 = "だ、団長……"
34255-66 = "まさに「ミネ団長が壊して騎士団が治す」という私たちのモットーですね！！#n久しぶりの救護騎士団、本領発揮です！"
34255-67 = "そ、そんなモットーはないのですが……。"
34255-69 = "さあ、テキパキと動いてください！"
34255-70 = "信念と誇りを胸に！適切に、必要なところに救護を！"
34255-71 = "アリウス自治区を解放し、先生とミカ様を救うのです！！"
34255-73 = "はい！"
34255-74 = "夜明けに呼びだされて急にこんな任務だなんて……！#nうわーん！"
34255-76 = "次回;これからの私たち"

[translation]
84302300200-5 = "ฉันวิเคราะห์ข้อมูลจากศูนย์ข้อมูลแล้ว"
84302300200-6 = "ข่าวร้ายก็คือ มีการเคลื่อนไหวในสเกลที่ยิ่งใหญ่กว่าที่ฉันคาดไว้อีก"
84302300200-7 = "ดูจากข้อมูลแล้วคงไม่จบง่ายๆ แค่การทำลายงานมิลเลเนียม เอ็กซ์โป..."
84302300200-8 = "แน่นอนว่าฉันจะไม่ยอมให้มันเกิดขึ้นเด็ดขาด แต่ถ้าภารกิจของเราจะล้มเหลวขึ้นมาจริงๆ ตอนนั้นฉันก็#nคงต้องไปบอกทางเซมิน่าด้วยตัวเอง"
84302300200-9 = "แต่ฉันยังมองว่าเรายังจัดการไม่ให้มันเกิดขึ้นได้ และเราก็ยิ่งต้องมีการตอบสนองที่รวดเร็วยิ่งขึ้น"
84302300200-10 = "ครั้งนี้เราจะบุกเข้าไปที่นั่นก่อนที่คนพวกนั้นจะทำแผนการได้สำเร็จ"
84302300200-11 = "และพิกัดของที่นั่นก็คือ..."
84302300200-12 = "<ฟิตเนสเซ็นเตอร์ของมิลเลเนียม>..."

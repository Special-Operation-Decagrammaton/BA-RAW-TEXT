84302300200-5 = "3;리오;01;데이터 센터를 통해 데이터의 흐름을 파악했어.\n#3;a"
84302300200-6 = "3;리오;99;유감스럽게도, 우려했던 것보다 훨씬 더 거대한 움직임이 일어나고 있어."
84302300200-7 = "3;리오;01;밀레니엄 엑스포를 망친다… 단순히 그런 수준으로 끝나지 않을 만큼 말이야.\n#3;em;…"
84302300200-8 = "3;리오;02;물론 그렇게 둘 생각은 없어. 정말로 임무가 실패할 것 같다면, 경우에 따라서는 세미나에 직접 알려야겠지."
84302300200-9 = "3;리오;01;아직은 그 전에 처리할 수 있을 거라는 게 내 계산이야. 그리고 그런 만큼, 더욱더 빠르고 신속한 대처가 필요해."
84302300200-10 = "3;리오;99;이번에는 저들이 공작을 부리기 전에, 그 현장을 급습할 예정이야."
84302300200-11 = "3;리오;01;위치는……."

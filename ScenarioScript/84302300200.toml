[translation]
84302300200-5 = "I've analyzed the data stream."
84302300200-6 = "Unfortunately, what's happening is much bigger than we suspected."
84302300200-7 = "Ruining the Millennium Expo is just the start of their plan."
84302300200-8 = "Of course, I don't plan on letting it happen. So, if our operation looks like it's about to fail, we'll have to inform Seminar directly."
84302300200-9 = "According to my calculations, though, we can still manage the situation before it comes to that. If we're fast enough."
84302300200-10 = "This round, we make the first move."
84302300200-11 = "The flashpoint is..."
84302300200-12 = "...Millennium Fitness Center."

[translation]
51220-1 = "Episode 22;Street in Flames"
51220-5 = "[ns] \"*pant pant* The stage is...\""
51220-12 = "Careful, Sensei!"
51220-30 = "[ns] \"There's no end to them!\""
51220-31 = "Ugh. We can hardly get past these Artifact Spirits, let alone save Yukari."
51220-32 = "(Our destination is right there, just out of reach. But I can't do it... I can't do it alone!)"
51220-41 = "Hey there! Looks like we made it in time."
51220-42 = "It's us, Sensei."
51220-43 = "[s] \"Those are two unexpected faces I'm very happy to see!\""
51220-44 = "President Niya said we needed to help Sensei."
51220-45 = "[s] \"Niya did?\""
51220-46 = "Well, we're helping you help us, really."
51220-47 = "Our communications are jammed, and we couldn't get through to the Festival Operations Department. So here we are!"
51220-48 = "We saw the live stream hacker earlier..."
51220-49 = "It's her, isn't it? The one who sent the letter?"
51220-50 = "[s] \"Yes. From Nature's Beauty.\""
51220-51 = "...As I thought."
51220-52 = "The streets of Hyakkiyako are being reduced to rubble."
51220-53 = "It seems I really did miscalculate here. If I could turn back time..."
51220-54 = "[s] \"It's both our burdens to bear. Let's focus on what we can do now.\""
51220-55 = "Correct as always, Sensei. We can't change the past by cursing our luck now."
51220-56 = "It looks like we both have some debts to repay after this, Nagusa. But for now, we have much bigger problems looming over us."
51220-58 = "Ah, yes."
51220-59 = "I've gotten a general grasp of the situation."
51220-60 = "Yabuki Shuro of Nature's Beauty is the mastermind behind this entire situation, as well as the one who took your Yukari hostage. Am I missing anything?"
51220-61 = "...No."
51220-62 = "We need to get you to that stage one way or another."
51220-68 = "From the front, to the back, left, and right... Monsters are everywhere."
51220-69 = "How do we fight them? President Niya."
51220-70 = "The two of us aren't exactly the attack force you needed..."
51220-71 = "It would be a miracle and a half if we lasted until the Yin-Yang Club's reinforcements arrived..."
51220-77 = "...!!"
51220-81 = "[ns] \"No! We don't need any reinforcements!\""
51220-85 = "Hm?"
51220-86 = "What are you saying—"
51220-91 = "Secret Weapon, Exploding Shurikens! HIYAH!"
51220-100 = "Hah! The Ninjutsu Research Club..."
51220-101 = "...has..."
51220-102 = "...arrived! Nin nin!"
51220-104 = "[ns] \"Izuna! Michiru! Tsukuyo!\""
51220-105 = "You are...the Ninjutsu Research Club?"
51220-106 = "Hello, everyone."
51220-108 = "Whoa! The Yin-Yang Club's president! And hi, Chise!"
51220-109 = "Oh! Sensei, you found Nagusa!"
51220-110 = "Your timing is impeccable, but I'm slightly confused."
51220-111 = "Hm? Oh, how did we know?"
51220-113 = "Sensei asked the Ninjutsu Research Club...to help!"
51220-114 = "Yes! My lord requested our assistance, and come rain, come fire, or even scary ghosts, we will always answer my lord's call!"
51220-115 = "Yes! Through rain or fire!"
51220-117 = "L-Let's back up for one second! I never agreed to run through fire or anything remotely like that!"
51220-118 = "It's okay! You can do anything, President."
51220-119 = "You're the best ninja we know, after all...!"
51220-120 = "W-Well, if you put it like that...!"
51220-121 = "As the president of the Ninjutsu Research Club, we will run through fire to help!"
51220-122 = "Yes! That's our president!"
51220-123 = "Um, yeah! Let's do this!"
51220-124 = "Leave it to us, Sensei!"
51220-125 = "[s] \"You three are the best.\""
51220-127 = "I see..."
51220-128 = "The Ninjutsu Research Club really knows how to pull through, don't they?"
51220-129 = "Well then. Shall we open up a path, you ninjas?"
51220-130 = "I'm here too. Sensei, please watch. I have been practicing very hard."
51220-132 = "Let's go!"
51220-133 = "Ninjutsu Research Club! Charge!"
51220-143 = "...Yes!"

[translation]
51220-1 = "ตอนที่ 22;ถนนที่ลุกเป็นไฟ"
51220-5 = "[ns] \"แฮ่ก... แฮ่ก เวทีอยู่ข้างหน้า...\""
51220-12 = "คุณครู ระวังนะ...!"
51220-30 = "[ns] \"เหมือนจะออกมากันเยอะกว่าเดิมเลย...!\""
51220-31 = "อึ้ก! แบบนี้ฝ่าตำนานร้อยเรื่องราววิญญาณลี้ลับไปไม่ได้แน่..."
51220-32 = "(เวทีอยู่ข้างหน้าแล้ว แต่ลำพังฉันคนเดียวคงไม่ไหว...! แบบนี้ฉันคงทำอะไรไม่ได้...!)"
51220-41 = "มาทันเฉียดฉิวมากเลยนะคะเนี่ย คุณครู เป็นยังไงบ้างคะ~?"
51220-42 = "คุณครู~ พวกเรามาแล้ว~"
51220-43 = "[s] \"นิยะกับ... ชิเซะ?! ทั้งสองคนมาที่นี่ได้ยังไง...!\""
51220-44 = "หัวหน้านิยะขอให้มาช่วยคุณครูน่ะ"
51220-45 = "[s] \"นิยะเหรอ?\""
51220-46 = "ใช่ค่ะ ฉันพยายามจะจัดการกับเหตุการณ์ต่างๆ ที่เกิดขึ้นในตอนนี้"
51220-47 = "แต่ก็ติดต่อชมรมจัดงานเทศกาลไม่ได้ ก็เลยออกมาตรวจสอบสถานการณ์ที่นี่ด้วยตัวเองน่ะค่ะ"
51220-48 = "โดยเฉพาะการสกัดสัญญาณถ่ายทอดสดที่เพิ่งเกิดขึ้นเมื่อกี้"
51220-49 = "ผู้หญิงคนนั้นคือสมาชิกชมรมความงามของธรรมชาติ... ที่ส่งจดหมายมาใช่ไหมคะ?"
51220-50 = "[s] \"ใช่\""
51220-51 = "...ว่าแล้วเชียว"
51220-52 = "เป็นเพราะฉันมองสถานการณ์ผิดพลาดไป ถนนเฮียกคิยาโคก็เลย..."
51220-53 = "ฉันตัดสินใจอย่างหุนหันพลันแล่นเกินไปตั้งแต่แรกน่ะค่ะ ถึงจะย้อนสถานการณ์กลับไปมันก็ไม่ทันแล้ว แต่ก็..."
51220-54 = "[s] \"ครูก็ผิดเหมือนกัน ตอนนี้เรามาฝ่าฟันไปด้วยกันเถอะ\""
51220-55 = "...ค่ะ ตอนนี้ต่อให้โทษอดีตที่ผ่านไปแล้วมันก็ไม่มีอะไรเปลี่ยนแปลงไปอยู่ดี"
51220-56 = "ไว้ค่อยชดใช้เรื่องการประมวลผลผิดพลาดทีหลัง ตอนนี้เรามองไปข้างหน้าก่อนค่ะ นางุสะ"
51220-58 = "อ่า... อื้ม"
51220-59 = "ทางเรารวบรวมข้อมูลและทำความเข้าใจอย่างคร่าวๆ แล้วค่ะว่าเกิดอะไรขึ้น"
51220-60 = "คนที่ยึดจัตุรัสเทศกาลไว้คือยาบูกิ ชูโระ สมาชิกชมรมความงามของธรรมชาติ และตอนนี้เธอก็จับยูคาริ จากเฮียกกะเรียวรันเป็นตัวประกันไว้... ใช่ไหมคะ?"
51220-61 = "อื้อ..."
51220-62 = "เราต้องเข้าไปให้ถึงที่นั่นเพื่อช่วยยูคาริ"
51220-68 = "แต่ว่าเราโดนห้อมล้อมด้วยพวกปีศาจจากทุกทิศทางเลย~"
51220-69 = "ทำยังไงดีล่ะ หัวหน้านิยะ?"
51220-70 = "ถ้ามีเยอะขนาดนี้... พวกเราไม่น่าจะจัดการไหวนะคะ"
51220-71 = "ต่อให้ต้านทานไว้ได้จนกว่ากองกำลังสนับสนุนของชมรมหยินหยางจะมาถึง แต่ก็..."
51220-77 = ".........!!!"
51220-81 = "[ns] \"!! เราน่าจะยังพอมีโอกาสอยู่นะ\""
51220-85 = "คะ?"
51220-86 = "คุณครู หมายความว่ายังไงเหรอคะ..."
51220-91 = "วิชาลับ! ระเบิดดาวกระจาย! นี่แน่ะ!"
51220-100 = "ฮึ่มม ชมรมวิจัยศาสตร์นินจา...!"
51220-101 = "ได้เวลาออกโรง...!"
51220-102 = "พวกเรามาแล้วค่ะ! นินนิน!"
51220-104 = "[ns] \"อิซุนะ! มิจิรุ! สึคุโยะ...!\""
51220-105 = "พวกเธอคือ... ชมรมวิจัยศาสตร์นินจาเหรอ?"
51220-106 = "สวัสดีทุกคน~"
51220-108 = "ว้าว! คุณชิเซะ หัวหน้าชมรมหยินหยางก็อยู่ที่นี่เหรอ...!"
51220-109 = "ส่วนนั่นก็... นางุสะที่คุณครูตามหาตัวอยู่!"
51220-110 = "ว่าแต่ทุกคนมาที่นี่ทำไม...?"
51220-111 = "หืม? เหตุผลที่พวกเรามาที่นี่น่ะเหรอ? นั่นก็เพราะว่า..."
51220-113 = "คุณครูมาขอร้องพวกเราไว้น่ะค่ะ! คุณครูบอกว่าอยากให้ชมรมวิจัยศาสตร์นินจามาช่วยด้วยอีกแรง!"
51220-114 = "ใช่ค่ะ! ถ้าเป็นการทำเพื่อช่วยนายท่านละก็ ทั้งอิซุนะ ท่านสึคุโยะ และหัวหน้า! ไม่ว่าจะให้บุกน้ำหรือลุยไฟ! พวกเราก็พร้อมที่จะช่วยเสมอค่ะ! นินนิน!"
51220-115 = "ใช่ค่ะ! อย่างที่อิซุนะจังว่าเลยค่ะ!"
51220-117 = "ไม่สิ แต่ว่าถ้าให้ลุยไฟ... มันก็น่ากลั๊วน่ากลัวอยู่เหมือนกันนะ?!"
51220-118 = "ไม่ต้องกลัวหรอกค่ะ! ท่านหัวหน้าทำได้แน่นอนค่ะ!"
51220-119 = "ต่อให้ใครว่ายังไง ท่านหัวหน้าก็ยังเป็นท่านหัวหน้า!"
51220-120 = "ถะ... ถ้าพูดซะขนาดนั้นก็ช่วยไม่ได้นะ...!"
51220-121 = "ข้าน้อยเตรียมตัวมาลุยในฐานะหัวหน้าชมรมวิจัยศาสตร์นินจาอยู่แล้ว! ไปกันเลย!"
51220-122 = "ค่ะ! ต้องอย่างนี้สิคะท่านหัวหน้า!"
51220-123 = "อื้มมม! งั้นมาใส่ให้สุดไปเลย!"
51220-124 = "ดีละ! วางใจพวกเราได้เลย! ท่านอาจารย์!"
51220-125 = "[s] \"ขอบใจนะทุกคน!\""
51220-127 = "สมแล้วเชียว..."
51220-128 = "ชมรมวิจัยศาสตร์นินจา ฉันประทับใจพวกคุณจังเลยค่ะ"
51220-129 = "...งั้นไปกันเลยไหมคะ? พวกฉันจะเปิดทางให้เองค่ะ"
51220-130 = "วางใจได้เลย~ ฉันจะโชว์ฝีมือให้คุณครูเห็นอย่างที่สัญญาไว้เลยละ~"
51220-132 = "เอาละ!"
51220-133 = "ชมรมวิจัยศาสตร์นินจา! ลุยกันเลย!"
51220-143 = "อื้ม!"

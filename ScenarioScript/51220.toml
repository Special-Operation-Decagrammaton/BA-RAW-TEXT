[translation]
51220-1 = "第22話;被烈火包圍的街道"
51220-5 = "[ns]「哈啊……就快到舞台了……」"
51220-12 = "老師，小心……！"
51220-30 = "[ns]「感覺數量越來越多了……！」"
51220-31 = "唔！這樣下去會無法突破幻魎百物語……"
51220-32 = "（這裡只靠我是不夠的……明明舞台就近在眼前……！這樣下去我什麼都……！）"
51220-41 = "真是千鈞一髮呢。#n老師，您沒事吧～？"
51220-42 = "我們來了～老師～"
51220-43 = "[s]「仁耶和……知世！？你們兩個怎麼在這裡……！」"
51220-44 = "因為仁耶部長要我一起來幫老師。"
51220-45 = "[s]「仁耶？」"
51220-46 = "是的，這是為了收拾現在發生的一連串事件。"
51220-47 = "因為聯絡不上節慶營運管理部，所以我才來到街上直接進行確認。"
51220-48 = "特別是剛才攔截轉播的事。"
51220-49 = "他就是寄來信件的元兇……花鳥風月部的成員嗎？"
51220-50 = "[s]「嗯。」"
51220-51 = "……原來如此。"
51220-52 = "因為我的判斷錯誤，百鬼夜行的街道才會……"
51220-53 = "從一開始，我的判斷就太草率了。#n雖然發生的事已無法挽回──"
51220-54 = "[s]「我也有錯。讓我們一起補救吧。」"
51220-55 = "……也對，就算埋怨過去的事，眼前的情況也不會有所改變。"
51220-56 = "過去的疏失就等之後再檢討，現在就先向前看吧，名草同學。"
51220-58 = "啊，嗯。"
51220-59 = "我已經彙整並大致掌握了現在的情況。"
51220-60 = "目前佔領慶典廣場的人是花鳥風月部的箭吹棕櫚。#n而且還挾持了百花繚亂的紫同學作為人質──對吧？"
51220-61 = "……嗯。"
51220-62 = "如果想救出他就必須前往現場。"
51220-68 = "但四周都是怪物～"
51220-69 = "怎麼辦呢，仁耶部長？"
51220-70 = "這個數量……只靠我們是無法收拾的。"
51220-71 = "就算拚命撐到陰陽部的援軍抵達，究竟能否──"
51220-77 = "…………！！！"
51220-81 = "[ns]「不，現在還有突破口！」"
51220-85 = "什麼？"
51220-86 = "老師，這是什麼意思……"
51220-91 = "秘技！爆裂手裏劍！看招！"
51220-100 = "哼哼～忍術研究部……！"
51220-101 = "在此……！"
51220-102 = "登！場！忍忍！"
51220-104 = "[ns]「伊樹菜！三千留！月夜……！」"
51220-105 = "你們是……忍術研究部？"
51220-106 = "大家好啊～"
51220-108 = "哇！是陰陽部的部長，連知世大人也在……！"
51220-109 = "而且那不就是老師一直在找的名草嗎！"
51220-110 = "各位怎麼會在這裡……？"
51220-111 = "嗯？是這樣的──"
51220-113 = "我們收到了老師的要求！希望我們忍術研究部幫忙！"
51220-114 = "沒錯！為了幫助主公……#n不只是伊樹菜，連月夜閣下和部長都準備好上刀山、下火海了！忍忍！"
51220-115 = "是！伊樹菜醬說的對！"
51220-117 = "不不不，再怎麼說……上刀山下火海也太可怕了吧！？"
51220-118 = "沒關係！部長一定辦得到的！"
51220-119 = "不管別人怎麼說，部長可是部長啊……！"
51220-120 = "唔……既然都說到這個份上就沒辦法了……！"
51220-121 = "當然，我身為忍術研究部的部長，早就做好覺悟了──！#n就來試試看吧！"
51220-122 = "是！這才是部長！"
51220-123 = "嗯……！那就加油吧！"
51220-124 = "好！全部包在我們身上吧！老師！"
51220-125 = "[s]「大家……！謝謝你們！」"
51220-127 = "確實……"
51220-128 = "忍術研究部的各位，你們一如既往的帥氣模樣真令人佩服。"
51220-129 = "……那麼就出發吧。#n由我們來負責開路。"
51220-130 = "包在我身上～要按照約定，展現練習的成果～"
51220-132 = "那麼！"
51220-133 = "忍術研究部！突擊！"
51220-143 = "……嗯！"

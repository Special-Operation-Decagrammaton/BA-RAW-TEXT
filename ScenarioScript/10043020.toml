[translation]
10043020-1 = "第2話;逆轉的話請叫醒我"
10043020-3 = "感覺……各方面都變得更加熱烈了呢，指導員。"
10043020-4 = "無論應援還是氣氛……歡呼聲還是喝采聲都是。"
10043020-5 = "[s]「畢竟是在觀賞競技運動嘛。」"
10043020-6 = "……這樣啊。"
10043020-7 = "總覺得心情有點奇妙。"
10043020-11 = "[ns]「怎麼說呢？」"
10043020-12 = "唔嗯……是這樣的。"
10043020-15 = "我們訓練部平常在做的，是類似於訓練或鍛鍊的活動。"
10043020-16 = "以有氧運動、重量訓練與飲食控制為主軸，#n為了得到最佳結果而分析生活習慣，擬定最佳的訓練計畫……"
10043020-17 = "直到達成最終目標──維持理想的身體狀態為止。"
10043020-20 = "其中完全沒有他人介入的餘地，只能依賴「分析」和「意志力」。"
10043020-21 = "當然在過程中可以請教他人的意見或接受幫助，不過也僅止於建議和忠告的範疇。"
10043020-22 = "我們所做的行為……或許能說是現代社會中的一種修行也說不定。"
10043020-23 = "到頭來，那終究是自己與自己的戰鬥。"
10043020-24 = "[s]「真深奧啊……」"
10043020-25 = "是嗎？我還以為這種說法已經很常見了呢。"
10043020-29 = "回到剛才的話題……#n團體運動──尤其棒球似乎並非如此。"
10043020-30 = "規則我已經大致搞懂了。#n簡單來說就是設法透過擊球得分，並以結果一較高下。"
10043020-31 = "過程中必須積極配合隊友，執行戰術並服從指示，同時盡可能發揮各自的長處。"
10043020-32 = "……在各種要素的互相作用下達成和諧。"
10043020-33 = "所以我似乎能夠理解，為什麼人們會對這種運動如此狂熱了。"
10043020-34 = "只不過……該怎麼說呢。"
10043020-35 = "同時我也不禁開始懷疑，用「狂熱」一詞概括這個現象是否真的恰當。"
10043020-36 = "我們的首要任務，是找出形跡可疑的人……"
10043020-37 = "並調查那個人是否與犯人有關……"
10043020-38 = "可是這樣一來……#n唔嗯，雖然這麼說可能不太好……"
10043020-39 = "……但每個人看起來都很可疑。"
10043020-44 = "謝謝各位球迷今天也熱情到場支持我們勇士隊！"
10043020-45 = "真心感謝大家！我愛你們！"
10043020-52 = "真的愛就證明給我們看啊！"
10043020-53 = "嘴上說的那麼好聽，不會實際報答一下嗎！"
10043020-60 = "用手把球劈成兩半看看！那才不可能是棒球！"
10043020-61 = "肯定是網球或橡膠球之類的東西！不然怎麼可能打成這樣！"
10043020-67 = "這隊到底是怎樣，有時間不打球都拿去研究怎麼輸得更慘了是不是……"
10043020-72 = "乾脆滾上來加油算了啦！我們上都比你們強！"
10043020-73 = "拜託快點解散！今天再輸就把球隊收一收了啦！"
10043020-79 = "……"
10043020-80 = "這，這沒什麼啦……平常也是這樣的……"
10043020-81 = "[s]「畢，畢竟是棒球嘛……」"
10043020-82 = "指導員，這樣真的能算是「應援」嗎？"
10043020-83 = "還是「應援」這個詞，已經在我不知道的時候發展出新的定義了呢……"
10043020-84 = "[s1]「這就是所謂的愛之深責之切吧……」\n[s2]「要是不在乎的話，根本就不會生氣……」"
10043020-87 = "話雖如此，還是應該要有個限度吧……"
10043020-91 = "為了報答各位球迷的支持，賽後將舉辦簽名會──"
10043020-93 = "誰需要什麼破簽名，先贏球再說啦！你們這樣還好意思吃飯嗎？"
10043020-94 = "這比賽應該加個「老弱婦孺及身心衰弱者禁止觀賞」的警語吧！#n我都快被他們氣到神經衰弱了！"
10043020-100 = "喂！投手！直接投正中間送他安打就好了啦！#n早死早超生懂不懂！"
10043020-101 = "我可以100%保證，這隊哪怕等到世界末日都不可能會贏！"
10043020-102 = "我這個人說話很少這麼有自信，只有這件事我敢掛保證！"
10043020-108 = "不好意思，麻煩借過一下……"
10043020-113 = "啊？你是哪位啊！#n比賽比成這樣看了就火大！快給我點東西喝！"
10043020-114 = "唉……看得我一肚子火，得喝點冰的降降火氣……"
10043020-119 = "需要飲料是嗎？來，請用。"
10043020-126 = "咳咳！？這什麼東西啊！#n怎麼會稠稠的，還有一股蛋清味！？"
10043020-127 = "嘔嘔嘔，不只沒消氣反而更火大了！#n肚子一直咕咕叫，還有點脹脹的感覺！"
10043020-129 = "這位觀眾說的相當精準呢。兩位喝下的正是蛋白質飲料。"
10043020-130 = "只要去除乳糖和脂肪，就能在避免乳糖不耐症的患者消化不良的同時減少熱量。"
10043020-131 = "而且還採用容易吸收的分離乳清蛋白，以便把胺基酸快速供應給受到刺激的肌肉。"
10043020-132 = "不過這款飲料的成分仍以蛋白質為主，建議還是慢慢飲用比較適合。"
10043020-133 = "就算已經移除了乳糖和脂肪，喝太快還是有可能造成輕微的消化不良哦。"
10043020-138 = "你是專程來吵架的是不是！？誰要在棒球場喝什麼蛋白質飲料啊！"
10043020-139 = "哼，這樣正好！看他們投球投得亂七八糟，剛好用你來出氣！"
10043020-144 = "……"
10043020-145 = "在情緒高漲的觀眾中也顯得格外激動……"
10043020-146 = "甚至叫投手送給對方安打，彷彿恨不得自家的隊伍輸球……"
10043020-147 = "即使提供了有益健康的蛋白質飲料，態度依舊非常具有攻擊性……"
10043020-152 = "……這傢伙是怎樣？自己在那邊碎碎念什麼啊？"
10043020-157 = "指導員。"
10043020-158 = "犯人肯定就是他們吧？"
10043020-162 = "[ns]「這個結論是從哪來的！？」"
10043020-163 = "現在的情況固然有些特殊……"
10043020-164 = "但這些人的行為舉止依然顯得相當異常。"
10043020-165 = "而根據我們聽到的消息，犯人的言行也同樣相當偏激。"
10043020-166 = "那麼不就只能得出「這些人就是犯人」的結論了嗎！？"
10043020-171 = "到底在嘰嘰喳喳地廢話什麼啊。"
10043020-172 = "今天算你惹錯人了！我一定要好好教訓你！"
10043020-177 = "那麼，指導員。"
10043020-178 = "進入逮捕犯人的流程吧。"
10043020-179 = "[s]「沒問題嗎？這樣真的好嗎！？」"
10043020-180 = "請相信我。"
10043020-181 = "我一定會確保這些犯人的壓力能得到紓解……"
10043020-182 = "等一切落幕之後幫他們規劃一對一的私人訓練課程！"
10043020-183 = "[s]「不是，那又是為什麼啊！？」"
10043020-187 = "嗯？盡情運動到滿身大汗之後，頭腦也會感到輕鬆舒暢，這樣不就能紓解壓力了嗎？"
10043020-188 = "想要紓解壓力的話，訓練就是最有效的方法。"
10043020-190 = "嘰哩咕嚕的有完沒完，做好心理準備吧！"
10043020-191 = "今天就讓你知道，惹毛球迷會有什麼下場！"

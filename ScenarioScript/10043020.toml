[translation]
10043020-1 = "ตอนที่ 2;เกมพลิกแล้วปลุกด้วยนะ"
10043020-3 = "ดูเหมือนว่า... หลายๆ อย่างจะร้อนแรงกว่าตอนเริ่มแข่งขันเยอะเลยนะคะ เทรนเนอร์"
10043020-4 = "ทั้งความคึกคัก เสียงเชียร์ บรรยากาศ เสียงโห่ร้อง... อะไรพวกนี้น่ะค่ะ"
10043020-5 = "[s] \"การแข่งขันกีฬาก็เป็นแบบนี้ละ\""
10043020-6 = "อย่างนี้เองสินะคะ..."
10043020-7 = "มีบางอย่างที่ฉันรู้สึกประหลาดใจนิดหน่อยค่ะ"
10043020-11 = "[ns] \"อะไรเหรอ?\""
10043020-12 = "อืม... ก็แบบนี้น่ะค่ะ"
10043020-15 = "ปกติแล้วสิ่งที่ชมรมของฉันทำกันบ่อยๆ ก็คือการออกกำลังกายค่ะ"
10043020-16 = "เราเน้นที่การออกกำลังกายแบบคาร์ดิโอ เวทเทรนนิ่ง และควบคุมอาหาร แล้ววิเคราะห์รูปแบบการใช้#nชีวิตและจัดตารางที่เหมาะสมเพื่อให้ได้ผลลัพธ์ที่ดีที่สุด..."
10043020-17 = "ท้ายที่สุดแล้ว วัตถุประสงค์สูงสุดก็คือเพื่อบรรลุเป้าหมายที่ตัวเองวางไว้และมีสภาพร่างกายตามที่#nต้องการค่ะ"
10043020-20 = "ในกระบวนการนั้นไม่มีช่องว่างให้คนอื่นเข้ามาแทรกแซงเลย ทั้งหมดเป็นเรื่องของการวิเคราะห์ และความตั้งใจของตัวเองล้วนๆ ค่ะ"
10043020-21 = "แน่นอนว่าในระหว่างนั้นเราอาจขอและรับความช่วยเหลือจากคนอื่นได้ แต่ก็ต้องอยู่ในขอบเขตของ#nคำแนะนำและคำปรึกษาเท่านั้น"
10043020-22 = "สิ่งที่พวกฉันทำกันอยู่... บางทีอาจเป็นเหมือนการบำเพ็ญเพียรสำหรับสังคมสมัยใหม่ก็ได้ค่ะ"
10043020-23 = "ท้ายที่สุดแล้วมันก็คือการต่อสู้กับตัวเองน่ะค่ะ"
10043020-24 = "[s] \"เป็นเรื่องที่ลึกซึ้งจังเลยนะ...\""
10043020-25 = "งั้นเหรอคะ? ฉันว่ามันเป็นเรื่องธรรมดามากค่ะ"
10043020-29 = "แต่ในทางกลับกัน... กับการแข่งกีฬาเป็นทีม โดยเฉพาะเบสบอลแล้วมันไม่เป็นอย่างนั้นค่ะ"
10043020-30 = "ฉันพอเข้าใจกฎเกณฑ์ในระดับหนึ่งค่ะ แล้วก็เข้าใจว่านี่เป็นเกมที่ต้องตีลูกเพื่อทำคะแนนและแข่งขัน#nกันเพื่อผลลัพธ์"
10043020-31 = "และในกระบวนการนี้ก็ต้องอาศัยความร่วมมือกับเพื่อนร่วมทีมอย่างแข็งขัน การวางกลยุทธ์ การทำตามคำสั่ง และต้องแสดงทักษะเฉพาะตัวของตัวเองออกมาด้วยค่ะ"
10043020-32 = "จะมองว่าเป็นภาพเหตุการณ์ที่กลมกลืนกันดีก็ได้ค่ะ"
10043020-33 = "ฉันพอจะรู้แล้วค่ะว่าทำไมผู้คนถึงคลั่งไคล้กีฬาประเภทนี้กันมาก"
10043020-34 = "แต่ว่า... เอ่อ... จะว่ายังไงดีล่ะคะ"
10043020-35 = "ฉันเริ่มจะสงสัยนิดหน่อยว่าจะนิยามปรากฏการณ์นี้ด้วยคำว่า 'คลั่งไคล้' ได้หรือเปล่าน่ะค่ะ"
10043020-36 = "อืม ก่อนอื่นภารกิจของฉันคือการสำรวจหาคนที่มีพฤติกรรมน่าสงสัย"
10043020-37 = "แล้วก็ต้องสืบว่าคนคนนั้นมีส่วนเกี่ยวข้องกับคนร้ายหรือเปล่า..."
10043020-38 = "เพราะงั้น... เอ่อ... ฉันพูดแบบนี้อาจฟังดูแปลกๆ ก็ได้"
10043020-39 = "แต่ทุกคนดูน่าสงสัยไปหมดเลยค่ะ..."
10043020-44 = "ถึงแฟนๆ ทุกคนที่มาร่วมเชียร์ทีมเบรฟส์ของเราถึงที่นี่!"
10043020-45 = "ขอบคุณทุกคนมากครับ รักทุกคนนะครับ!"
10043020-52 = "ถ้ารักกันจริงก็ทำให้เห็นสิ!"
10043020-53 = "ถ้ารู้สึกขอบคุณก็ตอบแทนด้วย!"
10043020-60 = "ที่เล่นกันอยู่มันลูกเบสบอลจริงหรือเปล่า! เอามาผ่าพิสูจน์ซิ!"
10043020-61 = "มันต้องเป็นลูกเทนนิสหรือลูกยางอะไรแน่ๆ! ไม่งั้นก็คงไม่โดนตีอยู่แบบนี้หรอก!"
10043020-67 = "ทำไมทีมถึงไม่เล่นเบสบอลตามที่ควรเล่น แต่กลับเรียนรู้วิธีแพ้ใหม่ๆ อยู่ทุกวี่ทุกวันแบบนี้เนี่ย!"
10043020-72 = "ขึ้นมาเชียร์บนนี้มา! เดี๋ยวเราลงไปหวดให้เอง!"
10043020-73 = "ขอร้องละ! วันนี้ถ้าแพ้อีก ก็ไปเฝ้ารากมะม่วงด้วยกันเลย!"
10043020-79 = "..."
10043020-80 = "นะ... นี่ยังไม่ถึงกับรุนแรงมากหรอกค่ะ... ปกติบรรยากาศก็เป็นอย่างนี้ละ..."
10043020-81 = "[s] \"เบสบอล... เบสบอลนี่มัน...\""
10043020-82 = "เทรนเนอร์ นี่คือนิยามของคำว่า 'การเชียร์' จริงๆ เหรอคะ?"
10043020-83 = "หรือว่าคำว่าการเชียร์มีความหมายอื่นที่ฉันไม่รู้ด้วยคะ?"
10043020-84 = "[s1] \"เพราะรักแหละ ก็เลยยิ่งโกรธน่ะ...\"\n[s2] \"ถ้าไม่สำคัญมากก็คงไม่โกรธกันหรอก...\""
10043020-87 = "แต่ถึงยังไง ทุกอย่างก็น่าจะมีความพอดีสิคะ..."
10043020-91 = "เพื่อเป็นการขอบคุณแฟนๆ ที่สนับสนุน หลังจบการแข่งขันเราจะมีการแจกลายเซ็น..."
10043020-93 = "ไม่เอาเฟ้ย! เล่นให้ชนะสักทีเถอะน่า! ยังจะมามัวพูดเรื่องลายซงลายเซ็นอยู่อีก"
10043020-94 = "เกมนี้ต้องมีคำเตือนแล้วละ! ผู้ที่ร่างกายไม่แข็งแรงหรือจิตใจไม่แข็งแกร่งไม่ควรรับชม! เดี๋ยวได้หัวร้อนหรือเครียดจนเส้นเลือดในสมองแตกพอดี!"
10043020-100 = "นี่! พิชเชอร์! โยนไปตรงกลางเลย ตรงกลาง! โยนสุดแรงให้ตีได้! แล้วก็จบเห่มันไปด้วยกันเลย!"
10043020-101 = "ฉันมั่นใจ 100% เลยละ! ขอบอกเลยว่าทีมนี้ไม่มีทางชนะไปจนกว่าโลกจะแตกเลย!"
10043020-102 = "นี่น่าจะเป็นครั้งแรกเลยที่ฉันพูดอะไรอย่างมั่นหน้ามั่นโหนกขนาดนี้ แต่มันก็จริงนี่นา!"
10043020-108 = "ขอโทษนะคะ ฉันขอทางหน่อย..."
10043020-113 = "หืม? เด็กพาร์ทไทม์เหรอ? ฉันกำลังโมโหกับการแข่งขันอยู่พอดี เอาอะไรมาให้ดื่มหน่อยสิ!"
10043020-114 = "เฮ้อ... หัวร้อนแบบนี้ อย่างน้อยก็ต้องได้เครื่องดื่มเย็นๆ สักแก้ว..."
10043020-119 = "อยากได้เครื่องดื่มสินะคะ นี่ค่ะ"
10043020-126 = "แหวะ?! อะไรเนี่ย! ทำไมเครื่องดื่มมันข้นๆ เหนียวๆ แถมมีรสชาติคล้ายไข่ขาวอีก?!"
10043020-127 = "อึก... ไม่ได้ทำให้สดชื่นขึ้น แต่ยิ่งกลับอึดอัดมากกว่าเดิมอีก! รู้สึกพะอืดพะอม เหมือนท้องอืดยังไงไม่รู้!"
10043020-129 = "มองได้ทะลุปรุโปร่งเลยนะคะ ที่ดื่มไปเมื่อกี้คือเครื่องดื่มโปรตีนค่ะ"
10043020-130 = "มันทั้งช่วยกำจัดแลคโตสและไขมัน ช่วยป้องกันภาวะแพ้แลคโตสและช่วยควบคุมปริมาณแคลอรี่ที่ได้รับ#nต่อวันด้วยค่ะ"
10043020-131 = "เราใช้เวย์โปรตีนที่ดูดซึมเร็ว เพื่อให้ส่งกรดอะมิโนไปยังกล้ามเนื้ออย่างรวดเร็วค่ะ"
10043020-132 = "แต่นี่เป็นเครื่องดื่มที่มีโปรตีนเป็นส่วนผสมหลัก ฉันแนะนำให้ค่อยๆ ดื่มเอานะคะ"
10043020-133 = "ถ้าดื่มเร็วเกินไป ต่อให้จะช่วยกำจัดแลคโตสกับไขมันก็จริง แต่ก็อาจทำให้เกิดปัญหาในการย่อย#nอาหารได้ค่ะ"
10043020-138 = "นี่เธอจะมาหาเรื่องกันเหรอ?! ใครเขาจะมาดื่มเครื่องดื่มโปรตีนในสนามเบสบอลกัน!!"
10043020-139 = "แต่ก็ดีเลยนะ! ถ้าต้องดูการขว้างบอลห่วยๆ ขนาดนั้น ฉันขอไปหาทางระบายความเครียดดีกว่า!"
10043020-144 = "..."
10043020-145 = "ในบรรดาผู้ชมที่โมโห คนที่โมโหมากที่สุดนี่ละ..."
10043020-146 = "คนที่ตะโกนให้พิชเชอร์ทีมตัวเองขว้างลูกตรงเพื่อให้ตีโดน นี่ละความปรารถนาที่จะพ่ายแพ้อย่างชัดเจน"
10043020-147 = "ฉันอุตส่าห์เสิร์ฟเครื่องดื่มโปรตีนที่ดีต่อร่างกายให้แล้ว แต่ก็ยังแสดงความก้าวร้าวอยู่..."
10043020-152 = "อะไรของเธอเนี่ย? มายืนพึมพำอะไรอยู่คนเดียว?"
10043020-157 = "เทรนเนอร์"
10043020-158 = "คนนี้ต้องเป็นผู้ร้ายแน่นอนค่ะ"
10043020-162 = "[ns] \"ทำไมถึงสรุปอย่างนั้นล่ะ?!\""
10043020-163 = "แน่นอนว่าผู้ชมตอนนี้ต่างก็เชียร์อย่างผิดปกติกันไปหมด"
10043020-164 = "แต่ในบรรดาผู้ชมเหล่านั้น ก็มีคนที่แสดงออกในพฤติกรรมที่ผิดปกติมากๆ อยู่ด้วยค่ะ"
10043020-165 = "แล้วคำพูดและการกระทำที่ฉันได้ยินมานั้นก็ผิดปกติอย่างเห็นได้ชัด"
10043020-166 = "งั้นก็น่าจะสรุปว่าคนพวกนี้เป็นคนร้ายได้สิคะ!"
10043020-171 = "เล่นอะไรไม่เห็นจะเข้าท่าเลย"
10043020-172 = "วันนี้แกโดนดีแน่! มาเจอกันสักตั้งเป็นไง!"
10043020-177 = "เทรนเนอร์คะ"
10043020-178 = "ฉันจะไปพิสูจน์ตัวตนของคนร้ายก่อนค่ะ"
10043020-179 = "[s] \"จะดีเหรอ? แบบนี้มันไม่เป็นไรจริงๆ เหรอ?!\""
10043020-180 = "เชื่อฉันเถอะค่ะ"
10043020-181 = "และเพื่อเป็นการคลายความเครียดของคนร้ายพวกนี้..."
10043020-182 = "หลังจากทุกอย่างเสร็จสิ้นแล้ว ฉันจะจัดโปรแกรมเทรนนิ่งแบบตัวต่อตัวให้พวกเธอค่ะ!"
10043020-183 = "[s] \"เดี๋ยวก่อน เรื่องนั้นมันเกี่ยวอะไรด้วย\""
10043020-187 = "คะ? ก็ถ้าได้ออกกำลังกายให้เหงื่อออก สมองก็จะปลอดโปร่ง แล้วความเครียดก็จะบรรเทาลงไงคะ?"
10043020-188 = "ฉันไม่คิดว่าจะมีวิธีคลายเครียดใดที่ดีไปกว่าการเทรนนิ่งแล้วค่ะ"
10043020-190 = "หยุดพล่ามได้แล้ว เดี๋ยวได้เจอดีแน่!"
10043020-191 = "ฉันจะทำให้เห็นเองว่าจะเกิดอะไรขึ้นถ้าไปยั่วโมโหแฟนเบสบอลที่กำลังโกรธน่ะ!"

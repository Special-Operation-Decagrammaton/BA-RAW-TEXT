[translation]
10043020-1 = "#title;제2화;역전하면 깨워주세요."
10043020-2 = "#wait;2000"
10043020-3 = "3;스미레 아르바이트;02;어쩐지 시작했을 때보다 더욱…… 여러 가지로, 많은 것이 뜨거워진 것 같습니다. 트레이너.\n#3;em;…\n#3;a"
10043020-4 = "3;스미레 아르바이트;99;응원 열기라든가 분위기라든가, 환성, 환호…… 그런 것들이 말이죠."
10043020-5 = "[s] \"스포츠 경기니까 말이지.\""
10043020-6 = "3;스미레 아르바이트;00;……그렇군요."
10043020-7 = "3;스미레 아르바이트;03;어딘가, 조금 신기한 기분입니다."
10043020-8 = "#st;[0,0];instant;1;"
10043020-9 = "#clearST"
10043020-10 = "#wait;1000"
10043020-11 = "[ns] \"어떤 게?\""
10043020-12 = "3;스미레 아르바이트;02;음…… 이런 것입니다."
10043020-13 = "3;스미레;00\n#3;h\n#3;black"
10043020-14 = "#wait;500"
10043020-15 = "#na;스미레 아르바이트;평소에 저희 트레이닝부가 하는 것은, 일종의 훈련이나 단련 같은 것이죠."
10043020-16 = "#na;스미레 아르바이트;유산소와 웨이트 트레이닝, 식단 관리를 중점으로, 최상의 결과를 도출하기 위해 생활 습관을 분석하고, 최적화된 스케줄을 확립하여……."
10043020-17 = "#na;스미레 아르바이트;마침내는 자신이 원하는 목표, 바라는 신체 상태에 도달하는 것을 최종 목적으로 합니다."
10043020-18 = "#all;hide"
10043020-19 = "#wait;500"
10043020-20 = "3;스미레 아르바이트;99;거기에는 그야말로, 타인이 끼어들 여지가 없죠. 분석과 개인의 의지가 전부입니다.\n#3;em;…\n#3;a"
10043020-21 = "3;스미레 아르바이트;00;물론 그 과정에서 다른 사람에게 도움을 요청하거나 도움을 받을 수는 있습니다만, 그것은 어디까지나 조언과 충고의 영역."
10043020-22 = "3;스미레 아르바이트;02;저희가 하고 있는 것은 어쩌면…… 현대 사회의 수도(修道) 같은 것인지도 모르지요."
10043020-23 = "3;스미레 아르바이트;09;어디까지나, 자기 자신과의 싸움입니다.\n#3;stiff"
10043020-24 = "[s] \"심오하네…….\""
10043020-25 = "3;스미레 아르바이트;02;그런가요? 꽤 흔한 이야기라고 생각됩니다만.\n#3;em;[?]"
10043020-26 = "#st;[0,0];instant;1;"
10043020-27 = "#clearST"
10043020-28 = "3;스미레 아르바이트;00\n#3;m4\n#wait;1300"
10043020-29 = "3;스미레 아르바이트;99;화제를 되돌려서…… 하지만 팀 스포츠, 특히 이 야구는 그렇지 않군요."
10043020-30 = "3;스미레 아르바이트;00;규칙은 어느 정도 이해했습니다. 공을 쳐서 점수를 내고, 그 결과를 겨루는 경기라는 것도요."
10043020-31 = "3;스미레 아르바이트;02;그리고 그 과정에서 팀원들과의 적극적인 협동과 협력, 작전 수행, 지시 이행, 그러면서도 각 팀원의 개인기까지 발휘되어야 합니다.\n#3;em;[반응]"
10043020-32 = "3;스미레 아르바이트;03;……조화로운 광경이라고도 볼 수 있을 것 같습니다."
10043020-33 = "3;스미레 아르바이트;99;사람들이 왜 이 스포츠에 한마음이 되어서 열광하는지도, 알 것 같고요."
10043020-34 = "3;스미레 아르바이트;04;다만…… 그…… 뭐라고 말씀드려야 할까요.\n#3;em;…"
10043020-35 = "3;스미레 아르바이트;05;이 현상을, '열광'이라는 단어로 한정 짓는 것이 과연 맞는지, 조금 의심이 들기 시작하기도 했습니다.\n#3;m3"
10043020-36 = "3;스미레 아르바이트;00;음. 일단 저희의 임무는 수상한 거동을 보이는 사람이 있는지 탐색하고."
10043020-37 = "3;스미레 아르바이트;99;그 사람이 혹시 범인과 관계가 있는지를 조사하는 것이겠습니다만……."
10043020-38 = "3;스미레 아르바이트;06;이래서야……. 그, 이런 말씀을 드리는 것도 조금 그렇습니다만.\n#3;stiff"
10043020-39 = "3;스미레 아르바이트;04;……모든 사람이 수상해 보일 지경입니다…….\n#3;em;[땀]"

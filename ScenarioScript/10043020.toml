[translation]
10043020-1 = "Episode 2;Wake Me Up for the Reversal"
10043020-3 = "Things are heating up, aren't they, Trainer?"
10043020-4 = "The crowd is just screaming and shouting left and right."
10043020-5 = "[s] \"These games are like that.\""
10043020-6 = "...Hm."
10043020-7 = "It's strange."
10043020-11 = "[ns] \"What's strange?\""
10043020-12 = "It's just so different from what I'm used to."
10043020-15 = "The Athletics Training Club is all about focus and discipline."
10043020-16 = "Analyzing lifestyle patterns to achieve the greatest results, setting optimized schedules for cardio and weight training, managing food intake..."
10043020-17 = "...with the final goal of sculpting the body you want."
10043020-20 = "There's no room for anyone else to butt in. It's all about analysis and personal will."
10043020-21 = "You can ASK for help, of course, but it's still just you in the center of it all."
10043020-22 = "It's almost like a kind of modern-day asceticism."
10043020-23 = "At the heart of it all, it's a fight against yourself."
10043020-24 = "[s] \"That's very in-depth.\""
10043020-25 = "Is it? To me, it's just the simple truth."
10043020-29 = "But...back on topic, these team sports seem like the opposite of that."
10043020-30 = "I understand the rules, mind you. Hitting the ball, comparing statistics..."
10043020-31 = "...and in that process, the team members have to cooperate and collaborate, execute instructions, and still demonstrate their own individual skills."
10043020-32 = "It's harmonious, in a way."
10043020-33 = "I think I understand where all this passion comes from."
10043020-34 = "But... Um... How should I put this?"
10043020-35 = "I'm starting to think this passion might have a downside."
10043020-36 = "I mean, we're looking for anyone who's acting suspiciously..."
10043020-37 = "...because we think they could be connected to the culprit, but..."
10043020-38 = "...well, it's a bit awkward to say this..."
10043020-39 = "...but at this point, just about everyone's acting suspiciously."
10043020-44 = "A special thank you to all our fans, who came to the stadium to cheer on the Heroes today!"
10043020-45 = "Thank you very much. We love you!"
10043020-52 = "If you love us, then prove it already!"
10043020-53 = "Yeah, you woulda trained harder if you cared so much!"
10043020-60 = "I bet that ball's a fake! We should cut it open!"
10043020-61 = "Maybe there's a tennis ball inside! That'd explain a lot!"
10043020-67 = "Start playing to win, instead of figuring out new ways to lose!"
10043020-72 = "YOU come up here and cheer! WE'LL play ball!"
10043020-73 = "Just quit, so you don't keep dragging us down!"
10043020-79 = "..."
10043020-80 = "Honestly, I've seen worse around here. But...yeah, sometimes they're like this."
10043020-81 = "[s] \"Whew. Baseball.\""
10043020-82 = "So is this what counts as \"cheering\" now?"
10043020-83 = "Or did they add a new definition to the word when I wasn't looking?"
10043020-84 = "[s1] \"They're angry because they care, I guess...?\"\n[s2] \"They wouldn't be upset if it weren't important to them...\""
10043020-87 = "Even so, there's a limit to everything, you know?"
10043020-91 = "To thank the fans for their support, we've prepared an autograph session after the game—"
10043020-93 = "We don't need autographs! We need wins! Remember what those are?"
10043020-94 = "This game needs a content warning! I'm going to have a stroke just watching this full-on disgrace!"
10043020-100 = "Hey, pitcher! Just throw it right down the middle! Let 'em hit it! Whatever!"
10043020-101 = "I'll bet anybody, 10 to 1, this team will NEVER win! "
10043020-102 = "Sure as I know anything, I know that."
10043020-108 = "Excuse me, coming through..."
10043020-113 = "Huh? Who are you? Oh, yeah. You! Gimme a drink, now!"
10043020-114 = "*sigh* Yeah, I could use a drink to cool off too."
10043020-119 = "Two drinks, coming up!"
10043020-126 = "Bleh! What IS this?! It's all grainy and...egg-y!"
10043020-127 = "Now I just feel bloated and stuffed! Like it's bubbling inside!"
10043020-129 = "That's an apt description for a protein drink."
10043020-130 = "It doesn't have any lactose or fat. No excess calories, no risk of lactose intolerance."
10043020-131 = "Plus it has fast-absorbing, isolated whey protein. It gets your amino acids right where they need to be, in your muscles."
10043020-132 = "But, just like any protein drink, you ought to drink it slowly. "
10043020-133 = "Too quickly, and even without any lactose or fat, it can cause a little indigestion."
10043020-138 = "Are you TRYING to piss me off?! Who drinks protein at a ball game?!"
10043020-139 = "You know what? I can't even watch this game. I'm just gonna turn around and take it out on you!"
10043020-144 = "..."
10043020-145 = "Hmm, they're even more agitated than the rest of the crowd..."
10043020-146 = "...they called for the pitcher to give the other team a hit, so clearly they want the team to lose..."
10043020-147 = "...and even after a healthy protein drink, they're still aggressive."
10043020-152 = "What is she, mumbling to herself now? What is WRONG with her?"
10043020-157 = "Trainer."
10043020-158 = "These have to be the culprits."
10043020-162 = "[ns] \"HOW did you get to that conclusion?!\""
10043020-163 = "Well, even with all this abnormal behavior around us..."
10043020-164 = "...these two stand out as the worst."
10043020-165 = "The only other person we've heard here, being THIS antisocial, was the voice on the phone."
10043020-166 = "All the pieces fit together perfectly!"
10043020-171 = "I don't know what you're yapping about..."
10043020-172 = "...but you're in for a world of it now!"
10043020-177 = "All right, Trainer..."
10043020-178 = "...time to bring them to justice."
10043020-179 = "[s] \"Is this all right? Is this really all right?!\""
10043020-180 = "Trust me."
10043020-181 = "And don't worry about them. I know they're stressed now..."
10043020-182 = "...but after this is all said and done, I'll give them each a 1-on-1 personal training session."
10043020-183 = "[s] \"Wait, why would you...?\""
10043020-187 = "Because exercise relieves stress, obviously. You sweat it out."
10043020-188 = "There's really no better solution to stress."
10043020-190 = "Shut up and eat lead!"
10043020-191 = "I'll teach you to not mess with a pissed-off fan!"

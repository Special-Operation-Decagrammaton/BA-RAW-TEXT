2300405-22 = "#na;(우타하가 강아지를 들어 얼굴을 마주 본다.)"
2300405-23 = "#na;강아지;헥, 헥……."
2300405-24 = "3;우타하;02;코와 입에서 습기가 배어 나오고 있네.\n#3;closeup"
2300405-25 = "3;우타하;05;이 정도의 습기는 로봇에게 치명적일 텐데. 어떻게 방수 처리를 한 거지?\n#3;closeup\n#3;em;…"
2300405-26 = "3;우타하;02;게다가 눈의 시선은 내 움직임을 이해하는 것처럼 얼굴을 따라 움직이고 있어.\n#3;closeup"
2300405-27 = "3;우타하;01;첨단 모션 트래킹에나 쓰이는 인공지능이 탑재된 모양인데.\n#3;closeup"
2300405-28 = "3;우타하;07\n#3;stiff\n#3;closeup"
2300405-29 = "#na;강아지가 우타하의 품에서 도망치기 위해 발버둥 친다."
2300405-30 = "#na;강아지;끼잉, 끼잉……."
2300405-31 = "3;우타하;02;움직이지 마, 이 녀석. 구동부를 확인하기 어렵잖아.\n#3;closeup"
2300405-32 = "3;우타하;99;이 자연스러운 움직임은…… 이 자그마한 다리 안에 몇 개의 구동축을 집어넣은 거지?\n#3;closeup\n#3;em;…"
2300405-33 = "3;우타하;05;발가락까지 구현되었을 정도로 정밀한 데다가 소음도 없어!\n#3;stiff\n#3;em;[반응]\n#3;closeup"
2300405-34 = "3;우타하;05;이건…… 단순한 장난감이 아니야. #n최첨단의 애니멀로이드라고 해도 좋을 정도야!\n#3;em;[!]\n#3;closeup"
2300405-35 = "3;우타하;99;심지어 우리 엔지니어부의 기술 수준을 아득히 상회하고 있어…….\n#3;closeup"
2300405-36 = "3;우타하;06;눈치채지 못한 사이에 이런 첨단 애니멀로이드가 장난감으로 쓰이고 있었다니, 우리는 얼마나 시대의 기술에 뒤 떨어졌던 거지…….\n#3;em;[속상함]\n#3;closeup"
2300405-37 = "#all;hide"
2300405-38 = "#wait;1500"
2300405-39 = "3;우타하;02;……아, 선생님.\n#3;a\n#3;em;[반응]"
2300405-40 = "[s] \"내가 없는 동안 별 일 없었어?\""
2300405-41 = "3;우타하;06;응, 스스로의 한계를 다시금 돌아보게 되었다고 할까…….\n#3;em;…"
2300405-42 = "[s] \"갑자기?!\""
2300405-43 = "3;우타하;06;선생님이 주문한 이 장난감 강아지 인형…… 아니, 최첨단 애니멀로이드를 보니 내 기술에 자신이 없어졌어."
2300405-44 = "3;우타하;04;밀레니엄의 마이스터라는 직함은 반납하고 처음부터 다시 기술을 익히는 게 좋으려나.\n#3;stiff\n#3;em;[속상함]"
2300405-45 = "[s1] \"최첨단 애니멀로이드……?\"\n[s2] \"그게 무슨 소리야……?\""
2300405-46 = "3;우타하;05;시치미 떼지 마. 이 정교하게 만들어진 애니멀로이드를 보라고!\n#3;em;[!]"
2300405-47 = "3;우타하;05;시치미 떼지 마. 이 정교하게 만들어진 애니멀로이드를 보라고!\n#3;em;[!]"
2300405-48 = "3;우타하;05;진짜 강아지와 구별이 되지 않을 정도의 애니멀로이드를 만드는 건 밀레니엄 학원의 기술로도 어려운 일이라고!\n#3;hophop"
2300405-49 = "#na;강아지;왈, 왈왈!"
2300405-50 = "[s] \"그 강아지는 어디서 온 강아지야?\""
2300405-51 = "3;우타하;07;응? 선생님이 주문한 장난감 강아지가 아니란 말이야? #n그럼 설마…….\n#3;em;[?]"
2300405-52 = "#all;hide"
2300405-53 = "3;우타하;04;설마 그 강아지가 길을 잃고 샬레에 들어온 진짜 강아지였을 줄이야…….\n#3;em;[땀]"
2300405-54 = "3;우타하;02;선생님이 한 말 때문에 감쪽같이 속고 말았어."
2300405-55 = "[s] \"보통 그 정도로 리얼하면 진짜 개라고 생각하지 않아?\""
2300405-56 = "3;우타하;01;최근의 애니멀로이드가 얼마나 발전했는데.\n#3;em;[반응]"
2300405-57 = "3;우타하;99;촉감이나 체온을 진짜 강아지처럼 재현하는 건 어렵겠지만, 관절의 움직임만큼은 지금의 기술로도 진짜 강아지와 똑같이 만들 수 있어."
2300405-58 = "3;우타하;02;지금 당장은 어렵더라도 10년만 지나면 진짜 강아지와 구별할 수 없는 장난감 강아지를 만드는 것도 불가능한 일이 아닐거야…….\n#3;em;[재잘]"
2300405-59 = "#all;hide"
2300405-60 = "#na;이후 한 시간 동안 우타하에게 최신 애니멀로이드 기술에 대한 이야기를 억지로 들었다."

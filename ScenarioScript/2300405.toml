[translation]
2300405-1 = "完美的動物機器人"
2300405-2 = "夏萊．辦公室"
2300405-3 = "老師，我來囉。"
2300405-4 = "……呃，對了。老師說今天要出差不在呢。"
2300405-5 = "今天只有我一個人嗎。"
2300405-7 = "汪，汪汪！"
2300405-8 = "哦斗，為什麼夏萊會有狗……？"
2300405-9 = "是嗎，這孩子就是老師說的狗的機器人嗎。已經送到了呢。"
2300405-10 = "哈──哈──哈──哈──……"
2300405-11 = "這個，做得非常精巧呢。"
2300405-13 = "雖然老師說了不行，不過稍微調查一下的話……"
2300405-16 = "（試著抱住）"
2300405-17 = "好厲害啊。很柔軟，好溫暖……"
2300405-18 = "和使用氨基甲酸乙酯或明膠製作的人工皮膚不同，和動物一樣的氣味結合就像真正的毛皮一樣。"
2300405-19 = "而且這個溫暖程度……有內藏保溫裝置嗎？"
2300405-20 = "再稍微調查一下吧。"
2300405-22 = "（舉起狗，與其面對面）"
2300405-23 = "哈──哈──哈──哈──……"
2300405-24 = "鼻子和嘴巴也是濕的。雖然對真正的狗來說是健康的證據……"
2300405-25 = "這種濕氣應該會對機器人的內部構造造成相當不好的影響。到底是怎麼處理的呢……有什麼高度的防水處理嗎……？"
2300405-26 = "眼睛也……根據我的臉的動作確實的在動呢。"
2300405-27 = "最先進的動態捕捉技術，再加上似乎搭載了使其成為可能的相當可靠的人工智慧。"
2300405-29 = "（想從詠葉的胸口逃離，狗正在踢來踢去的掙扎）"
2300405-30 = "嗚，嗚……"
2300405-31 = "好了，不要亂動。不然會沒辦法確認驅動系統呀。"
2300405-32 = "這個流暢的動作……這個小小的腳中，裝入了多少驅動軸呢……"
2300405-33 = "連腳趾的動作都再現了，而且如此精密卻沒有噪音。"
2300405-34 = "這真是厲害呢……#n說是最先進的動物機器人也不為過。"
2300405-35 = "而且，還遠遠超越了我們工程師部的技術程度……"
2300405-36 = "沒想到，居然已經有這麼先進的動物機器人了……#n這個技術力，到底領先了我們幾步……"
2300405-39 = "……啊，老師。歡迎回來。"
2300405-40 = "[s]「我不在的期間，有發生什麼特別的事嗎？」"
2300405-41 = "真要說的話，該說是重新體會到自己的極限了嗎……"
2300405-42 = "[s]「發生什麼了！？」"
2300405-43 = "看著這個老師下訂的機器人，不，最先進的動物機器人……#n我想我似乎過度相信自己的技術了。"
2300405-44 = "把千年的巨匠這個稱號歸還，再從頭開始重新學習技術吧……"
2300405-45 = "[s1]「最先進的動物機器人……？」\n[s2]「怎麼回事……？」"
2300405-46 = "老師也看到了吧，這個製作精巧的動物機器人。"
2300405-47 = "老師也看到了吧，這個製作精巧的動物機器人。"
2300405-48 = "沒辦法和真正的狗區別。要製作這種動物機器人，就算以千年的技術也是極為困難的。"
2300405-49 = "汪，汪汪！"
2300405-50 = "[s]「那隻狗，是從哪來的孩子？」"
2300405-51 = "……嗯？不是老師下訂的機器狗嗎？#n也就是說……"
2300405-53 = "沒想到，是迷路跑進夏萊的，真正的狗啊……"
2300405-54 = "老師的話在腦海裡，完全被先入之見所騙了。"
2300405-55 = "[s]「那麼逼真的話果然還是會認為是真的吧……？」"
2300405-56 = "即使如此老師，最近動物機器人的發展也值得注目。"
2300405-57 = "即使觸感和體溫難以再現，關於關節的動作以現在的技術也可以做得接近於真正的狗。"
2300405-58 = "儘管現在還很困難，但是再花10年的話，要做出沒辦法和真正的狗做出區別的動物機器人也不是不可能的……"
2300405-60 = "（這之後，關於最先進的動物機器人技術，從詠葉那邊聽了將近一個小時）"

2300405-17 = "3;우타하;07;뭐지? 부드럽고 따듯하잖아?\n#3;closeup\n#3;em;[반응]"
2300405-18 = "3;우타하;99;우레탄이나 젤라틴으로 만들어진 인공 피부와는 달리 묘한 짐승 냄새도 나는 것이 진짜 털가죽 같아.\n#3;closeup"
2300405-19 = "3;우타하;01;게다가 이 체온은…… 별도의 보온 장치가 안에 내장된 건가?\n#3;closeup"
2300405-20 = "3;우타하;05;좀 더 살펴봐야겠어.\n#3;closeup\n#3;em;[반응]"

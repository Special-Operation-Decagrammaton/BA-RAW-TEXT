[translation]
2300405-1 = "The Perfect Animaloid"
2300405-2 = "Schale Executive Office"
2300405-3 = "Sensei, I'm here."
2300405-4 = "...Oh, right, Sensei is out on a business trip."
2300405-5 = "Then I guess I'm all alone in the Schale House today."
2300405-7 = "Ruff, ruff ruff!"
2300405-8 = "Oh my, why is there a puppy in Schale?"
2300405-9 = "Oh. This must be the puppy toy Sensei mentioned."
2300405-10 = "*pant pant*"
2300405-11 = "It's quite sophisticated for a toy."
2300405-13 = "Sensei said I shouldn't disassemble it, but a little peek might be all right..."
2300405-16 = "Utaha picks up and hugs the puppy."
2300405-17 = "What's this? It's so soft and warm."
2300405-18 = "Unlike artificial skin made of urethane or gelatin, it smells like real fur."
2300405-19 = "And the temperature... Is there a separate thermal insulation system built in?"
2300405-20 = "I should take a closer look."
2300405-22 = "Utaha picks up the puppy and stares into its face."
2300405-23 = "*pant pant*"
2300405-24 = "There's moisture coming from its nose and mouth."
2300405-25 = "This amount of moisture must be detrimental for a robot. How is it waterproofed?"
2300405-26 = "And its eyes are following me as if it understands my movement."
2300405-27 = "It looks like it's equipped with advanced motion-tracking AI."
2300405-29 = "The puppy struggles to get away from Utaha."
2300405-30 = "*whimper* *whimper*"
2300405-31 = "Don't move, puppy. I need to check your motor system."
2300405-32 = "Such natural movements... How many motors are there in this little leg?"
2300405-33 = "Its toes are fully actuated, and there's no artificial noise when squeezing it!"
2300405-34 = "This...isn't just a simple toy. This is an extremely high-tech automaton!"
2300405-35 = "This technology even surpasses the skills of the Engineering Department..."
2300405-36 = "How could such a high-tech creation exist as just a simple toy without us knowing about it? How far behind are we in terms of technology..."
2300405-39 = "...Ah, Sensei."
2300405-40 = "[s] \"Was everything all right while I was away?\""
2300405-41 = "Yeah. I was able to learn a lot about my limits..."
2300405-42 = "[s] \"In such a short amount of time?\""
2300405-43 = "This toy puppy you ordered... I've lost all confidence after playing around with this machine."
2300405-44 = "Perhaps I should stop calling myself a meister of Millennium, and start learning all over again from the beginning."
2300405-45 = "[s1] \"A machine...?\"\n[s2] \"What are you talking about...?\""
2300405-46 = "Don't pretend you don't know. Look at this finely-crafted animaloid!"
2300405-47 = "Don't pretend you don't know. Look at this finely-crafted animaloid!"
2300405-48 = "Creating an animaloid that's indistinguishable from a real dog is difficult even with the technology the Millennium School has on hand!"
2300405-49 = "Ruff, ruff ruff!"
2300405-50 = "[s] \"Where did you get that puppy?\""
2300405-51 = "Huh? This isn't the toy puppy you ordered? Then this..."
2300405-53 = "This is a lost puppy that wandered into Schale..."
2300405-54 = "I was tricked by what you said."
2300405-55 = "[s] \"Didn't you ever stop to consider it was a real puppy?\""
2300405-56 = "You can barely tell the difference with animaloids these days."
2300405-57 = "It may be difficult to reproduce the touch and body temperature of a real dog, but the movement of the joints can be made extremely realistic with our current technology."
2300405-58 = "Even if it's hard now, in ten years it's likely that we'll be able to make a toy dog that's indistinguishable from a real dog..."
2300405-60 = "After that, I was forced to listen to Utaha ramble about the latest technology."

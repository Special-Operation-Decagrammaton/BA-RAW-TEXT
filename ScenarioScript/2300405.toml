2300405-4 = "3;우타하;02;……아차, 선생님은 오늘 출장으로 부재중이라고 했었지."
2300405-5 = "3;우타하;99;그럼 오늘은 샬레 하우스에 나 혼자 뿐인가.\n#3;em;…"

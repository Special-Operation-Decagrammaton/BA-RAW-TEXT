[translation]
2300405-1 = "หุ่นยนต์สัตว์ที่สมบูรณ์แบบ"
2300405-2 = "สำนักงานชาเล่ต์"
2300405-3 = "คุณครู ฉันมาแล้ว"
2300405-4 = "จริงด้วย วันนี้คุณครูออกไปทำธุระข้างนอกนี่นา"
2300405-5 = "ถ้างั้นวันนี้ฉันก็คงต้องอยู่คนเดียวในบ้านพักของชาเล่ต์"
2300405-7 = "โฮ่งๆ โฮ่งๆ"
2300405-8 = "เอ๊ะ ทำไมถึงมีลูกสุนัขอยู่ในชาเล่ต์ด้วยล่ะ?"
2300405-9 = "อ่า นี่คงเป็นตุ๊กตาลูกสุนัขที่คุณครูบอกไว้"
2300405-10 = "หงิงๆ..."
2300405-11 = "เป็นของเล่นที่ทำขึ้นมาประณีตไม่เบาเลยนะ"
2300405-13 = "คุณครูบอกว่าฉันไม่ควรแกะดูก่อน แต่ขอแอบดูหน่อยคงไม่เป็นอะไรหรอกมั้ง..."
2300405-16 = "(อุทาฮะอุ้มลูกสุนัขขึ้นมาและกอดมันไว้)"
2300405-17 = "อะไรกันน่ะ? มันนุ่มและอุ่นดีจัง"
2300405-18 = "มันมีกลิ่นเหมือนขนจริงต่างจากหนังเทียมที่ทำจากยูรีเทนหรือเจลาตินเลย"
2300405-19 = "แล้วอุณหภูมิของมัน... มีตัวฉนวนกันความร้อนติดตั้งไว้ข้างในรึเปล่านะ?"
2300405-20 = "ฉันจะตรวจสอบดูอีกหน่อยก็แล้วกัน"
2300405-22 = "(อุทาฮะอุ้มลูกสุนัขขึ้นมาและมองที่หน้าของมัน)"
2300405-23 = "หงิงๆ..."
2300405-24 = "มีความชื้นออกมาจากจมูกและปากของมันด้วยแฮะ"
2300405-25 = "ความชื้นระดับนี้ต้องเป็นอันตรายต่อหุ่นยนต์แน่ มันกันน้ำด้วยวิธีไหนกันนะ?"
2300405-26 = "แล้วสายตาของมันก็คอยมองตามฉันราวกับว่ามันเข้าใจการเคลื่อนไหวของฉันเลย"
2300405-27 = "ดูเหมือนว่าจะติดตั้ง AI ระดับสูงที่ใช้ในการติดตามการเคลื่อนไหวเอาไว้ด้วย"
2300405-29 = "(ลูกสุนัขพยายามจะดิ้นเพื่อหนีออกมาจากอุทาฮะ)"
2300405-30 = "เอ๋ง เอ๋ง..."
2300405-31 = "อย่าขยับสิเจ้าหมาน้อย ฉันต้องตรวจระบบมอเตอร์ของเธอ"
2300405-32 = "เคลื่อนไหวได้เป็นธรรมชาติดีจริงๆ... มีมอเตอร์ติดตั้งเข้าไปในขาเล็กๆ นี่กี่ชิ้นกันนะ?"
2300405-33 = "นิ้วเท้าของมันขยับได้จริงๆ และไม่มีเสียงปลอมขึ้นมาเมื่อบีบมันด้วย!"
2300405-34 = "นี่มัน...ไม่ใช่แค่ของเล่นธรรมดาแล้ว มันคือหุ่นยนต์ที่ล้ำสมัยสุดๆ ไปเลย!"
2300405-35 = "เทคโนโลยีนี้มันล้ำยิ่งกว่าของชมรมวิศวกรรมเสียอีก..."
2300405-36 = "มีงานประดิษฐ์ที่ล้ำสมัยขนาดนี้มาถูกใช้เป็นของเล่นทั่วไปโดยที่เราไม่รู้มาก่อนเลยได้ยังไงกัน?#nนี่เรายังล้าหลังเรื่องเทคโนโลยีอยู่อีกแค่ไหนกันนะ..."
2300405-39 = "...อ่า คุณครู"
2300405-40 = "[s] \"ทุกอย่างปกติดีในระหว่างที่ครูไม่อยู่ใช่มั้ย?\""
2300405-41 = "อื้ม ฉันได้เรียนรู้เกี่ยวกับข้อจำกัดของฉันมาเยอะเลยล่ะ..."
2300405-42 = "[s] \"ในช่วงเวลาสั้นๆ นี่น่ะเหรอ?\""
2300405-43 = "ตุ๊กตาของเล่นนี่ที่คุณครูสั่งมาน่ะ... หลังจากได้เล่นกับหุ่นยนต์นี่แล้ว ฉันก็เสียความมั่นใจไปหมดเลย"
2300405-44 = "บางทีฉันควรหยุดเรียกตัวเองว่าไมสเตอร์แห่งมิลเลเนียม และเริ่มต้นเรียนรู้ทุกอย่างใหม่ตั้งแต่ต้น#nอีกครั้ง"
2300405-45 = "[s1] \"หุ่นยนต์เหรอ...?\"\n[s2] \"พูดเรื่องอะไรน่ะ...?\""
2300405-46 = "อย่าแกล้งทำเป็นไม่รู้เรื่องเลย ดูหุ่นยนต์สัตว์ที่ถูกสร้างขึ้นมาอย่างดีนี่สิ!"
2300405-47 = "อย่าแกล้งทำเป็นไม่รู้เรื่องเลย ดูหุ่นยนต์สัตว์ที่ถูกสร้างขึ้นมาอย่างดีนี่สิ!"
2300405-48 = "การสร้างหุ่นยนต์สัตว์ที่ดูไม่ต่างจากสุนัขจริงเป็นอะไรที่ทำได้ยากมาก แม้จะใช้เทคโนโลยีของ#nโรงเรียนมิลเลเนียมก็ตาม!"
2300405-49 = "โฮ่งๆ โฮ่งๆ"
2300405-50 = "[s] \"ไปเอาลูกสุนัขนั่นมาจากไหนน่ะ?\""
2300405-51 = "หืม? นี่ไม่ใช่ตุ๊กตาลูกสุนัขที่คุณครูสั่งมาเหรอ? ถ้างั้นนี่ก็คือ..."
2300405-53 = "นี่เป็นลูกสุนัขหลงทางที่พลัดหลงเข้ามาในชาเล่ต์อย่างนั้นเหรอ..."
2300405-54 = "ฉันฟังที่คุณครูบอกแล้วก็เผลอทึกทักไปเองน่ะ"
2300405-55 = "[s] \"นี่ไม่ได้ฉุกคิดแม้แต่นิดเลยเหรอว่ามันคือลูกสุนัขจริงๆ?\""
2300405-56 = "ทุกวันนี้เราก็แทบจะแยกแยะหุ่นยนต์สัตว์กับสัตว์จริงๆ ไม่ได้แล้วนี่"
2300405-57 = "การสร้างสัมผัสและอุณหภูมิร่างกายของสุนัขจริงๆ ขึ้นมาใหม่อาจเป็นเรื่องยาก#nแต่เราใช้เทคโนโลยีที่มีในปัจจุบันสร้างการเคลื่อนไหวของข้อต่อขึ้นมาให้สมจริงได้"
2300405-58 = "ถึงแม้ในตอนนี้จะทำได้ยาก แต่ก็เป็นไปได้ว่าในอีกสิบปีเราจะสร้างตุ๊กตาสุนัขที่ไม่แตกต่าง#nอะไรกับสุนัขจริงๆ ขึ้นมาได้..."
2300405-60 = "หลังจากนั้นคุณครูก็ต้องจำใจฟังอุทาฮะพูดเกี่ยวกับเรื่องเทคโนโลยีล่าสุดต่อไป"

2300405-8 = "3;우타하;07;어라, 샬레에 웬 강아지지?\n#3;em;[반응]\n#3;stiff"
2300405-9 = "3;우타하;03;아하. 이 강아지가 선생님이 말했던 강아지 인형인가."
2300405-10 = "#na;강아지;헥, 헥……."
2300405-11 = "3;우타하;01;장난감 강아지 인형치고는 제법 정교하게 만들어졌는걸."
2300405-12 = "3;우타하;99\n#3;em;…\n#wait;2500"
2300405-13 = "3;우타하;02;선생님이 뜯어보면 안 된다고 했지만, 잠깐 살펴보는 정도는 괜찮겠지……."

90001300-15 = "3;리오 동복;99\n5;히마리 방한복;02\n#3;d\n#5;d\n#3;h\n#5;h\n#wait;1000"
90001300-16 = "2;유즈 동복;01\n4;미도리 동복;02;여기에 온 이유, 요……? 우리는 여기에…… 일종의, 백도어를 찾기 위해서…….\n#2;a\n#4;a\n#4;em;[...]"
90001300-17 = "2;유즈 동복;05;아!\n#2;em;[전구]\n#2;jump"
90001300-18 = "#all;hide"
90001300-19 = "3;리오 동복;02;그래. 우리는 다차원 배리어를 우회할 수 있는, 백도어 루트를 추적하기 위해 여기까지 왔지."
90001300-20 = "1;토키 모드 1;01;그 과정에서, 아마도 자원 운송과 종자 보관을 병행하고 있던 티페레트를 만나고, 퇴각시켰지요.\n#3;m4\n#1;ar"
90001300-21 = "3;리오 동복;99;그러면 여기에서 이런 질문을 해 볼 수 있을 거야."
90001300-22 = "3;리오 동복;01;티페레트가 강철대륙에 합류하면, 자원을 수송하던 백도어 루트는 닫히게 될까?"
90001300-23 = "1;토키 모드 1;01\n5;히마리 방한복;04;……호크마 때의 기억을 되살려 보자면, 그 아이들은 분명, <허용치의 자원은 전부 충족이 되었다>는 이야기를 했지요.\n#1;dl\n#3;m2\n#5;al\n#5;em;[반응]"
90001300-24 = "#all;hide"
90001300-25 = "3;에이미 수영복ND;02;회장의 판단은 어때?\n#3;em;[?]\n#3;closeup"
90001300-26 = "3;리오 동복;02;즉각적으로 다차원 배리어의 영역을 조정하는 것은 쉽지 않을 거야."
90001300-27 = "3;리오 동복;09;그건…… 한번 생성하기도 쉽지 않은 데다, 그 영역을 재정의하는 것은 그것보다도 수백 배나 어려운 일이어서.\n#3;em;[...]"
90001300-28 = "3;리오 동복;99;말 그대로 다차원의 동시 관성 좌표계를, 모든 변수와 가능성을 포함해 게이지 변환을 통해 재연산하는 것부터 시작해야 할 테니까. 거기에……."
90001300-29 = "2;모모이 동복;02;어? 게이지 변환……? \n#3;m4\n#2;a\n#2;jump"
90001300-30 = "2;모모이 동복;03;아, 그거구나! HP 게이지 같은 거! 맞지? 맞지?\n#2;hophop\n#2;em;[재잘]"
90001300-31 = "3;리오 동복;04;아니야. 모모이. 게이지 변환이란–\n#3;em;[땀]"
90001300-32 = "#all;hide"
90001300-33 = "3;토키 모드 1;99;잘 알 수 없는 이론 부분은 넘어가고, 즉각적으로, 라고 말씀하셨지요. 리오 님.\n#3;em;[반응]"
90001300-34 = "3;토키 모드 1;02;그 표현은 결국 백도어 루트가 닫힐 거라고 예상하고 계신 것이겠지요?"
90001300-35 = "3;리오 동복;02;그래. 아주 쉽게 이야기해서, 뒷문이 열렸는데 그걸 내버려두는 집주인은 없을 테니까."

90001300-40 = "3;케이 AMAS;02;출발하는 것만이라면 어떻게든 될 것 같긴 한데요. 그런데 그걸로 충분한 거예요?\n#3;a\n#3;em;[?]"
90001300-41 = "1;리오 동복;02;무슨 뜻이야?\n#1;ar\n#3;m5"
90001300-42 = "3;케이 AMAS;01;우리 이대로 그냥 가면, 수송선이고 뭐고 다 강철대륙의 일부가 되는 거잖아요."
90001300-43 = "3;케이 AMAS;21;……특히 저 말이죠.\n#3;em;[...]"
90001300-44 = "1;리오 동복;04;아……!\n#1;em;[!]\n#1;shake"
90001300-45 = "#all;hide"
90001300-46 = "3;히마리 방한복;09;네. 케이와 함께 남겨진 잔해를 분석하는 중에 알게 된 것이 있어요."
90001300-47 = "1;에이미 수영복ND;02;부장 말로는, 강철대륙이 어떻게 물질을 변환시키는지 보다 자세히 알게 되었다고 했어.\n#1;ar\n#3;m5"
90001300-48 = "1;에이미 수영복ND;02\n3;히마리 방한복;02;그래요. 이대로 상륙했다가는, 이전에 예측한 대로, 수송선을 포함해 모조리 강철대륙의 일부가 되어 버릴 거예요.\n#3;m3\n#1;dl"
90001300-49 = "1;아리스 동복;09;그, 그러면 아무것도 안 되는 건가요, 히마리 선배? 기껏 모두와 힘을 합쳐, 여기까지 왔는데…….\n#3;m5\n#1;ar\n#1;em;[땀]\n#1;stiff"
90001300-50 = "3;히마리 방한복;03;후후. 그럴 리가 있나요. 다른 누구도 아닌 초천재병약미소녀해커에 호기심 넘치는 분석가이자 과학소녀인 제가 여기에 있는데요.\n#3;em;[음표]"

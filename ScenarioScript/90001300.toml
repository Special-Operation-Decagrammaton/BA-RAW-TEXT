[translation]
90001300-1 = "ตอนที่ 30;เตรียมออกเดินทาง"
90001300-2 = "ดีละ ฉันจะเรียกยานขนส่งมายังตำแหน่งปัจจุบันเดี๋ยวนี้ เราใช้ประโยชน์จากพื้นที่ที่ยิงคอนเทนเนอร์#nลอนเชอร์ออกไปให้เป็นโรงเก็บยานขนส่งชั่วคราวได้"
90001300-3 = "การวิเคราะห์เศษซากอุปกรณ์ที่เหลืออยู่ที่นี่ก็เกือบจะเสร็จแล้ว... งั้นเราก็ใกล้จะได้ข้อสรุปจากการ#nวิเคราะห์แล้วละ"
90001300-4 = "และตั้งแต่ตอนนั้นไป พวกเราก็ต้อง..."
90001300-5 = "เร่งมือกันให้มากกว่าตอนนี้อีก"
90001300-6 = "ฉันคิดว่าตอนนี้เราก็เร่งมือกันพอตัวแล้วนะ ประธาน?"
90001300-7 = "ต้องเร็วกว่านี้อีก"
90001300-8 = "ถ้าเป็นไปได้... ฉันก็อยากจะออกเดินทางตอนนี้เลย"
90001300-9 = "แบบนั้นน่าจะยากอยู่นะคะ เรายังคำนวณเส้นทางอย่างถูกต้องไม่ได้เลยค่ะ"
90001300-11 = "[ns] \"จำเป็นต้องรีบเร่งขนาดนั้นเลยเหรอ?\""
90001300-12 = "เหตุผลน่ะมีหลายอย่าง... แต่เหตุผลที่ใหญ่ที่สุดก็คือเหตุผลที่เรามาที่นี่นั่นละ"
90001300-16 = "เหตุผลที่เรามาที่นี่... เหรอคะ...? เรามาที่นี่... เพื่อหาแบ็กดอร์..."
90001300-17 = "อ้อ!"
90001300-19 = "ใช่ พวกเรามาถึงที่นี่เพื่อค้นหาเส้นทางแบ็กดอร์ที่จะอ้อมไปยังบาเรียพหุมิติ"
90001300-20 = "และระหว่างนั้น เราก็ได้เจอทิฟาเร็ธที่ทำหน้าที่ทั้งขนส่งทรัพยากรและเก็บรักษาเมล็ดพันธุ์ แล้วก็ต่อสู้กันจนทิฟาเร็ธล่าถอยไปได้ค่ะ"
90001300-21 = "ถ้าอย่างนั้นตอนนี้ก็จะเกิดคำถามว่า"
90001300-22 = "ถ้าทิฟาเร็ธไปอยู่ที่ดินแดนเหล็กกล้า แล้วเส้นทางแบ็กดอร์ที่ใช้ขนส่งทรัพยากรจะถูกปิดหรือเปล่า?"
90001300-23 = "ถ้าลองนึกถึงตอนชอกมาห์... เด็กพวกนั้นพูดไว้ว่า <ทรัพยากรที่ใช้ได้ถูกใช้จนหมดแล้ว>"
90001300-25 = "ประธานคิดว่ายังไง?"
90001300-26 = "ฉันว่าการปรับพื้นที่ของบาเรียพหุมิติในทันทีทันใดน่าจะไม่ใช่เรื่องง่ายเลย"
90001300-27 = "ที่จริง... แค่สร้างขึ้นมาหนึ่งครั้งก็ว่ายากแล้ว แต่การปรับพื้นที่ของมันใหม่เป็นงานยากกว่านั้นหลาย#nร้อยเท่าเลยละ"
90001300-28 = "เพราะต้องเริ่มต้นตั้งแต่การแปลงเกจและคำนวณระบบพิกัดเอกพันธ์ ตัวแปร และความเป็นไปได้ทั้งหมด แล้วก็..."
90001300-29 = "หืม? แปลงเกจเหรอ...? "
90001300-30 = "อ้อ อันนั้นสินะ! เหมือนเกจ HP ใช่มั้ย! ใช่มั้ย? เป็นหลอดๆ ใช่มั้ยล่ะ?"
90001300-31 = "ไม่ใช่หรอก โมโมอิ การแปลงเกจมันคือ..."
90001300-33 = "ท่านริโอะเคยบอกว่าให้ข้ามส่วนของทฤษฎีที่เข้าใจยาก แล้วเข้าข้อสรุปเลยใช่มั้ยล่ะคะ?"
90001300-34 = "ฉันเดาว่าท่านริโอะกำลังคาดว่าเส้นทางแบ็กดอร์จะปิด ใช่มั้ยคะ?"
90001300-35 = "ใช่ ถ้าจะให้พูดให้เข้าใจง่ายมากๆ ก็คงต้องบอกว่าแบ็กดอร์มันเปิดอยู่ แต่ว่าตอนนี้เจ้าของบ้านที่ปล่อย#nให้มันเป็นอย่างนั้นไม่อยู่แล้ว"
90001300-39 = "[ns] \"ต้องใช้เวลาคำนวณเส้นทางอีกนานเลยหรือเปล่าน่ะ...?\""
90001300-40 = "ถ้าเราจะแค่ออกเดินทางก็ไม่มีปัญหาหรอกค่ะ แต่ว่าแค่นั้นจะเพียงพอเหรอคะ?"
90001300-41 = "หมายความว่ายังไง?"
90001300-42 = "ถ้าเราเข้าไปทั้งแบบนี้เลย ยานขนส่งก็จะกลายเป็นส่วนหนึ่งของดินแดนเหล็กกล้าไม่ใช่เหรอคะ?"
90001300-43 = "ตัวฉันก็ด้วยค่ะ..."
90001300-44 = "อ๊ะ...!"
90001300-46 = "ใช่ค่ะ ฉันได้รู้มาระหว่างวิเคราะห์เศษซากที่เหลือกับเคย์ค่ะ"
90001300-47 = "จริงสิ หัวหน้าบอกไว้ว่ารู้ชัดกว่าเดิมแล้วว่าดินแดนเหล็กกล้าเปลี่ยนวัตถุได้ยังไง"
90001300-48 = "ใช่ค่ะ ถ้าเราลงจอดเลย ยานขนส่งทั้งลำก็จะกลายเป็นส่วนหนึ่งของดินแดนเหล็กกล้าตามที่คาดการณ์#nไว้ก่อนหน้านี้ค่ะ"
90001300-49 = "ถ้างั้นจะทำอะไรไม่ได้เลยเหรอคะ รุ่นพี่ฮิมาริ? เราอุตส่าห์ร่วมมือกันมาถึงจุดนี้แล้วแท้ๆ..."
90001300-50 = "ฮุฮุ ไม่มีทางเป็นอย่างนั้นหรอกค่ะ แฮ็กเกอร์สาวผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษ นักวิเคราะห์ที่อยากรู้อยากเห็น และสาวน้อยนักวิทยาศาสตร์อย่างฉันอยู่ที่นี่ทั้งคนนะคะ"
90001300-51 = "แน่นอนว่าเคย์ก็อยู่ด้วยค่ะ"
90001300-53 = "อ่า ค่ะ ขอบคุณที่เอ่ยถึงนะคะ..."
90001300-54 = "โดยสรุปแล้ว เราต้องมีอุปกรณ์ที่จะทำให้คลื่นพิเศษที่ดินแดนเหล็กกล้าและผู้เลื่อมใสสร้างขึ้นมา#nอ่อนกำลังลงค่ะ"
90001300-55 = "แต่ก็มีบางครั้งที่ฉันคิดตรงนั้นไม่ออก..."
90001300-56 = "แต่น่าทึ่งเลยนะคะที่เคย์ให้เบาะแสที่มีประโยชน์กับฉัน"
90001300-57 = "ว้าว ว้าว! นี่ละค่ะเคย์ของพวกเรา! อาริสึเชื่อมั่นในเคย์ค่ะ!"
90001300-58 = "เอ่อ ไม่หรอกค่ะ ฉันแค่คิดว่าถ้าปล่อยคิโวทอสไว้อย่างนี้... อาริสึก็จะพลอยไม่มีความสุขไปด้วย..."
90001300-59 = "อาริสึรู้ดีค่ะ! แบบนี้ละค่ะที่เรียกว่าซึนเดเระ!"
90001300-60 = "แต่โลกของเราเดี๋ยวนี้ แค่คำว่าซึนเดเระอย่างเดียวคงดึงดูดใจคนได้ไม่อยู่หมัด! แต่ก็ไม่ต้องกังวลนะคะ! อาริสึจะอยู่ข้างๆ เพื่อค้นหาคำอื่นที่จะแสดงตัวตนของเคย์ค่ะ!"
90001300-61 = "ซะ... ซึนเดเระอะไรนั่นฉันไม่รู้จักหรอก แต่ไม่ต้องมีคำอะไรมาแสดงตัวตนของฉันเพิ่มก็ได้ค่ะ!"
90001300-62 = "สรุปว่าปรากฏการณ์ที่เรียกว่า 'ดินแดนเหล็กกล้า' เกิดขึ้นจากการเปลี่ยนแปลง สะสม และขยายตัวของข้อมูล..."
90001300-63 = "ฮิมาริกับฉันร่างแบบสำหรับ <อุปกรณ์รบกวนคลื่น> ไว้แล้วค่ะ แม้จะยังเป็นชื่อชั่วคราวก็เถอะ"
90001300-64 = "เราจะสร้างสิ่งนี้แล้วติดตั้งไว้ที่ยานขนส่งและที่ทุกคนตามความจำเป็นค่ะ และไหนๆ แล้วก็สร้างชุดต่อสู้#nด้วยเลย..."
90001300-71 = "อะไรกันคะ...! ทำไมทุกคนถึงมองฉันด้วยสายตาที่พึงพอใจกันขนาดนั้นคะ? แบบนี้ฉันรู้สึกไม่ดีนะ..."
90001300-72 = "ฮุฮุ เรื่องนั้นน่ะค่ะ เคย์"
90001300-73 = "อาริสึก็เหมือนจะรู้แล้วค่ะ!"
90001300-74 = "ใช่ค่ะ ถึงจะปฏิเสธยังไง..."
90001300-75 = "อื้อ! แต่สุดท้ายแล้ว!"
90001300-77 = "[ns] \"เคย์จังเป็นเด็กดีจังเลยนะ!\""
90001300-79 = "ใครว่าอย่างนั้นกันคะ!!!!!"
90001300-81 = "ทิฟาจังใกล้จะถึงแล้วค่ะ..."
90001300-82 = "ทิฟาจังที่น่าสงสาร... อุตส่าห์หวงแหนเมล็ดพันธุ์ถึงขนาดนั้น..."
90001300-87 = "เอะ... เอ๋?!?!"
90001300-88 = "เป็นอะไรไปคะ ไอน์?"
90001300-89 = "มะ... ไม่ใช่... ทิฟาจังค่ะ!!!"
90001300-90 = "เดี๋ยวก่อน หมายความว่ายังไงน่ะ?!"
90001300-91 = "กะ... กะกะกะกะ... ก็หมายความตามที่บอกเลยค่ะ! สิ่งที่อยู่บนคอนเทนเนอร์ลอนเชอร์ตอนนี้..."
90001300-92 = "คือเมล็ดพันธุ์ของทิฟาจังค่ะ...!!!"
90001300-93 = "!"
90001300-94 = "!!!"
90001300-95 = "เดี๋ยว เดี๋ยวนะ ถ้างั้นก็แปลว่าทิฟาเร็ธ..."
90001300-96 = "เลือกที่จะรักษาเมล็ดพันธุ์แทนตัวเองงั้นเหรอ?!?!"
90001300-97 = "แต่ทำไมล่ะ...? ทำไมต้องเก็บเมล็ดที่ไม่มีความแน่นอนพวกนั้นด้วย...!"
90001300-99 = "แงงงง!!!"
90001300-100 = "..."
90001300-101 = "..."
90001300-102 = "นี่ก็เป็นการเลือกของทิฟาเร็ธสินะคะ"
90001300-103 = "คงต้องคิดอย่างนั้นละ..."
90001300-105 = "แต่ว่า... แต่ว่า...! ที่ผ่านมาทิฟาจังต้องเหนื่อยมาตลอด... แล้วพวกเราก็ไม่ได้ทำอะไรให้เลย...!"
90001300-106 = "สุดท้ายแล้ว... พวกเราก็ใช้งานทิฟาจังอยู่ฝ่ายเดียว... แงงงงง...!!"
90001300-111 = "อย่าร้องไห้เลย ไอน์ ไม่เป็นไรนะ"
90001300-112 = "เป็นค่ะ... จะไม่เป็นไรได้ยังไงกันคะ...!"
90001300-113 = "อื้ม ที่จริงฉันก็ไม่ต่างกัน ถ้าอยากโทษใคร ก็โทษฉันเถอะนะ "
90001300-114 = "ก็ฉันนี่แหละ... ที่ทำให้สถานการณ์เป็นแบบนี้"
90001300-115 = "มะ... มะมะมะมะ... ไม่ใช่อย่างนั้นสักหน่อยค่ะ...! เพราะซอฟน่ะ...!"
90001300-116 = "ถ้าจะให้พูดอย่างตรงไปตรงมา... ก็ต้องบอกว่าเรา 'ฟื้นคืนชีพ' ทิฟาเร็ธได้อีกครั้งในดินแดนเหล็กกล้า#nแห่งนี้ค่ะ ก็ที่นี่มันเป็นที่แบบนั้นนี่คะ"
90001300-117 = "แต่ก็ยากที่จะสร้างทิฟาเร็ธตนเดิมขึ้นมาค่ะ"
90001300-118 = "อืม... เพราะความทรงจำที่ทิฟาเร็ธได้รับจากคลังเก็บเมล็ดพันธุ์มันหายไปโดยไม่มีการซิงค์ไว้"
90001300-119 = "ใช่ค่ะ สำหรับพวกเราแล้ว ความทรงจำก็ไม่ต่างจากชีวิตของแต่ละคนหรอกค่ะ"
90001300-120 = "อึก... งืออออ..."
90001300-121 = "..."
90001300-125 = "ไม่เป็นไรค่ะ... ซอฟ ขอบคุณนะคะ ตอนนี้... ฉันไม่เป็นอะไรแล้วค่ะ"
90001300-126 = "จริงเหรอ...?"
90001300-127 = "ค่ะ... ฉันจะมัวเศร้าอยู่อย่างนี้ต่อไปไม่ได้นี่คะ และที่สำคัญ..."
90001300-128 = "เราควรต้องอ้าแขนรับเมล็ดพันธุ์ที่ทิฟาจังยอมสละตัวเอง... เพื่อให้พวกมันยังมีอยู่สิคะ..."
90001300-129 = "...!"
90001300-131 = "ซอฟ อย่าคิดในแง่ร้ายว่านี่เป็นความผิดของตัวเองเพราะตัวเองเป็นคนบอกให้เก็บเมล็ดพันธุ์ไว้เถอะค่ะ"
90001300-132 = "ทิฟาเร็ธได้เลือกแล้ว แล้วก็ได้เผชิญกับผลที่ตามมาอย่างมีศักดิ์ศรีแล้วค่ะ"
90001300-133 = "<จงทำตามที่เจ้าปรารถนาเถิด แล้วสิ่งนั้นจะเป็นกฎของเจ้า>"
90001300-134 = "พูดถึงบัญญัติของพวกเราสินะ"
90001300-135 = "ใช่ค่ะ เราต้องเคารพการเลือกของทิฟาเร็ธอย่างที่ไอน์บอกค่ะ"
90001300-136 = "และเราก็ต้อง... เผชิญหน้ากับศัตรูที่จะตามเมล็ดพันธุ์ของทิฟาเร็ธมาค่ะ"
90001300-137 = "อืม... นั่นคือขั้นตอนที่ชัดเจนเลยละ"
90001300-138 = "ถะ... ถ้าเป็นอย่างนั้น... คนพวกนั้นก็..."
90001300-139 = "จะ... จะได้เจอกับเยซ็อดจัง... ในเร็วๆ นี้สินะคะ...?"
90001300-140 = "มันก็... คงเป็นอย่างนั้นละ"
90001300-141 = "เยซ็อดประจำอยู่นอกบาเรียพหุมิติมาตั้งแต่แรกแล้วนี่"
90001300-142 = "ยะ... เยซ็อดจังขอไว้อย่างนั้นน่ะค่ะ..."
90001300-143 = "ก็เยซ็อดเป็นนายประตูของดินแดนเหล็กกล้านี่นา เรียกได้ว่าเป็นสัญลักษณ์ของ 'พลังของดินแดนเหล็กกล้า' เลยละ"
90001300-144 = "ซอฟคะ สมมติในสมมตินะคะ ถ้าหากว่า..."
90001300-145 = "พอเลย ฉันรู้ว่าเธอจะพูดอะไร แล้วก็..."
90001300-146 = "ฉันไม่อยากสันนิษฐานอะไรที่เป็นลางไม่ดีอีกแล้ว..."
90001300-147 = "..."
90001300-148 = "ฉะ... ฉัน... อยากให้ซอฟเป็นคนพูดเรื่องนั้นด้วยตัวเองค่ะ..."
90001300-150 = "ไอน์?!"
90001300-151 = "ไอน์!? เป็นอะไรหรือเปล่าคะ??? โดนซอฟใช้กำลังจนความคิดผิดเพี้ยนไปหรือเปล่าคะเนี่ย!!??"
90001300-152 = "ฉันจะไปทำอะไรไอน์ทำไมเล่า!"
90001300-153 = "แล้วทำไมถึงมาตีฉันล่ะคะ!!!"
90001300-154 = "ก็เธอพูดจาหาเรื่องเองนี่!"
90001300-155 = "อึก... นิดหน่อยก็ใช้ความรุนแรง ใช้วิธีการแก้ปัญหาแบบป่าเถื่อนแบบนี้ตลอดเลย..."

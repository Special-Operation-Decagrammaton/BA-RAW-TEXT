90001300-52 = "#all;hide"
90001300-53 = "3;케이 AMAS;22;아, 예. 언급해 주셔서 고맙네요…….\n#3;em;[한숨]"
90001300-54 = "3;히마리 방한복;02;결론부터 말씀드리자면, 우리에게는 강철대륙과 예언자들이 발생하는 특수한 파동을 무력화시킬 장치가 필요해요."
90001300-55 = "3;히마리 방한복;99;정말 드물게도, 그 부분에서 제가 조금 막히기는 했지만……."
90001300-56 = "3;히마리 방한복;03;어머나, 세상에. 이런 일이 또. 마침 케이가 적절한 실마리를 제시해 줬지 뭐예요?"
90001300-57 = "3;아리스 동복;07;와아, 와아! 역시 케이입니다! 아리스는 믿고 있었습니다!\n#3;em;[재잘]\n#3;hophop"
90001300-58 = "1;케이 AMAS;23;어, 그, 아뇨. 그러니까 그게, 키보토스를 이대로 내버려두면…… 아리스도 행복하지 못하게 될 테니까…….\n#1;ar\n#3;m5\n#1;em;[///]\n#1;stiff"
90001300-59 = "3;아리스 동복;03;아리스, 알고 있습니다! 이런 걸 츤데레라고 하는 것이지요!"
90001300-60 = "3;아리스 동복;05;하지만 요즘 세상에는 츤데레 하나만으로는 어필이 부족합니다! 걱정 마세요! 케이의 또 다른 속성을 발견하기 위해, 아리스도 같이 힘내겠습니다!\n#3;hophop"
90001300-61 = "1;케이 AMAS;08;츠, 츤데레고 뭐고 그런 건 잘 모르겠고, 저는 지금 이대로도 충분한데요?!\n#1;em;[?!]"
90001300-62 = "3;아리스 동복;05\n1;케이 AMAS;01;……아무튼, 통칭 '강철대륙 현상'은 정보의 변형과 축적, 그리고 자체 확장으로 이루어져 있는 것이고.\n#1;m3\n#3;dr"
90001300-63 = "1;케이 AMAS;02;이건 임시 명칭이지만, 히마리와 저는 <파동 간섭 장치>라는 디바이스의 청사진을 구상했습니다.\n#1;em;[반응]"

[translation]
90001300-1 = "#title;제30화;출발 준비"
90001300-2 = "3;리오 동복;01;좋아. 이제 수송선을 현 위치로 호출하겠어. 컨테이너 런쳐를 사출한 공간을 활용한다면, 이곳을 임시 격납고로 쓸 수 있을 거야.\n#3;a\n#3;greeting"
90001300-3 = "3;리오 동복;99;이곳에 남겨진 시설들의 잔해도 분석이 끝나 가는 중이니…… 곧 그에 따른 결론을 내릴 수 있을 거고."
90001300-4 = "3;리오 동복;02;그래서 이 시점에서 우리는…….\n#3;em;[...]"
90001300-5 = "3;리오 동복;01;지금보다 더욱, 서두를 필요가 있어."
90001300-6 = "4;에이미 수영복ND;02;이미 충분히 서두르고 있다고 생각하는데, 회장?\n#4;a\n#4;em;[?]\n#3;m2"
90001300-7 = "3;리오 동복;99;그것보다 더 해야 해."
90001300-8 = "4;에이미 수영복ND;02\n3;리오 동복;09;가능하다면…… 지금 당장 출발하고 싶을 지경이야.\n#4;dr\n#3;m3"
90001300-9 = "5;히마리 방한복;02;그건 조금 어렵겠는데요. 일단 항로 산출도 제대로 되지 않았다고요?\n#5;em;[반응]\n#5;al\n#3;m1"
90001300-10 = "3;리오 동복;09\n5;히마리 방한복;02\n#3;h\n#5;h"
90001300-11 = "[ns] \"그렇게까지 급하게 움직일 필요가 있어?\""
90001300-12 = "3;리오 동복;99;여러 가지가 있지만…… 가장 큰 것은, 우리가 여기에 온 이유 그 자체야."

[translation]
90001300-1 = "第30話;出發準備"
90001300-2 = "我將運輸船呼叫到了目前的位置。#n只要能活用貨櫃發射器發射後留下來的空間，就能把這裡當作臨時機庫來使用。"
90001300-3 = "對留存設施的分析也即將完成……很快就能得出結論了。"
90001300-4 = "所以現在……"
90001300-5 = "我們得再加快動作。"
90001300-6 = "我覺得現在已經夠快了耶，會長？"
90001300-7 = "還要再更快才行。"
90001300-8 = "如果可以的話……我甚至想立刻出發。"
90001300-9 = "那恐怕有點困難。#n畢竟我們連航路都還沒計算完成。"
90001300-11 = "[ns]「有必要這麼急著行動嗎？」"
90001300-12 = "這麼做的原因有很多……不過最主要的，是我們來到這裡的目的。"
90001300-16 = "來到這裡的目的……？#n我們來這裡……是為了找出「後門」……"
90001300-17 = "啊！"
90001300-19 = "沒錯。我們之所以來到這裡，是為了找出能繞過多次元防護罩的後門路徑。"
90001300-20 = "並且在過程中遇見了負責輸送資源和保存種子的提法瑞特，並設法讓它撤退。"
90001300-21 = "那麼由此可以拋出一個假設。"
90001300-22 = "提法瑞特在與鋼鐵大陸會合之後，用來運送資源的後門路徑是否會關閉呢？"
90001300-23 = "……之前遇到霍刻瑪的時候，那些孩子的確說過「資源量已經足夠了」。"
90001300-25 = "會長你怎麼看？"
90001300-26 = "多次元防護罩的領域，很難在短時間內立即調整。"
90001300-27 = "畢竟……那東西光是要生成就很不容易，要重新定義領域更是難上數百倍。"
90001300-28 = "那等同於要納入所有變數和可能性，透過量表變換重新計算多次元同步慣性座標系。#n並且……"
90001300-29 = "嗯？量表變換……？"
90001300-30 = "啊，就是類似HP量表之類的東西對吧？沒錯吧？"
90001300-31 = "不是的，桃井。#n所謂的量表變換是──"
90001300-33 = "難懂的理論就先略過不提，您剛才是說「立刻」對吧，莉央大人。"
90001300-34 = "之所以這麼說，是否代表您認為「後門路徑遲早會關閉」呢？"
90001300-35 = "沒錯，就好比沒有人會放著家裡的後門開著不管一樣。"
90001300-39 = "[ns]「計算航線還需要多久……？」"
90001300-40 = "如果只是要出發的話應該不成問題……但是這樣的準備真的夠嗎？"
90001300-41 = "什麼意思？"
90001300-42 = "如果就這樣直接過去，無論運輸船還是其他東西都會變成鋼鐵大陸的一部分。"
90001300-43 = "……尤其我也是。"
90001300-44 = "啊……！"
90001300-46 = "嗯，我們在跟Kei一起分析殘骸時，得知了一些細節。"
90001300-47 = "部長表示，他對於鋼鐵大陸轉換物質的方式有了更詳細的了解。"
90001300-48 = "沒錯。假如就這樣直接登陸的話……#n恐怕包括運輸船在內的一切，都會一如預期地被吸收為鋼鐵大陸的一部分。"
90001300-49 = "那，那現在不就什麼都做不了了嗎，陽葵前輩？#n明明好不容易才和大家同心協力，一路走到這裡的說……"
90001300-50 = "呵呵。怎麼會呢。這裡可是有我──#n超天才清楚系病弱美少女駭客、充滿好奇心的分析家兼科學少女在場啊。"
90001300-51 = "當然還有Kei也在。"
90001300-53 = "啊，嗯。#n謝謝你還記得提到我……"
90001300-54 = "從結論來說，我們需要能使鋼鐵大陸和預言者們產生的特殊波動失效的裝置。"
90001300-55 = "由於那樣的東西實在很少見，所以我也稍微苦惱了一下……"
90001300-56 = "想不到Kei恰好提供了關鍵的線索！"
90001300-57 = "哇哇！不愧是Kei！愛麗絲一直都相信你可以的！"
90001300-58 = "啊，不是，畢竟……要是就這樣放著奇普托斯不管，愛麗絲也不會幸福……"
90001300-59 = "愛麗絲知道！這就是所謂的「傲嬌」對吧！"
90001300-60 = "不過從現在的環境來看，單純的傲嬌已經不夠有吸引力了！#n但是不用擔心！為了發掘Kei的其他屬性，愛麗絲也會一起加油的！"
90001300-61 = "傲，傲嬌什麼的我聽不太懂，我現在這樣就夠了好嗎！？"
90001300-62 = "……總之，通稱為「鋼鐵大陸」的現象包含資訊的變形、累積以及自我擴張。"
90001300-63 = "陽葵和我構思了一種名叫「波動干涉裝置」的設備藍圖……雖然這只是暫定的名稱。"
90001300-64 = "只要把它製作出來，安裝在運輸船和每個人身上，再順便製作一些適合的戰鬥服……"
90001300-71 = "……怎麼了？為什麼每個人都突然用那種欣慰的眼神看著我？#n總覺得讓人有點不舒服耶……？"
90001300-72 = "呵呵，Kei。#n那是因為……"
90001300-73 = "愛麗絲好像也知道！"
90001300-74 = "是啊，不管怎麼說……"
90001300-75 = "嗯！結論就是……！"
90001300-77 = "[ns]「Kei醬果然是溫柔的好孩子呢！」"
90001300-79 = "我才不是！！！！！"
90001300-81 = "提法醬就快到了……"
90001300-82 = "可憐的提法醬……它那麼喜歡那些種子的說……"
90001300-87 = "咦，咦咦！？"
90001300-88 = "怎麼了，Ain？"
90001300-89 = "提，提法醬它……不在！！！"
90001300-90 = "等一下，那是什麼意思！？"
90001300-91 = "就，就就就就，就……就是字面上的意思！#n被貨櫃發射器發射過來的……"
90001300-92 = "只有提法醬的種子而已……！！！"
90001300-93 = "！"
90001300-94 = "！！！"
90001300-95 = "等等，先等一下。#n也就是說，提法瑞特它……"
90001300-96 = "比起自己，優先選擇拯救種子！？"
90001300-97 = "究竟是為什麼……？#n會選擇種子那種充滿不確定性的東西……！"
90001300-99 = "嗚咿咿咿咿！！！"
90001300-100 = "……"
90001300-101 = "……"
90001300-102 = "這也是提法瑞特的選擇嗎。"
90001300-103 = "……只能這樣想了吧。"
90001300-105 = "可是，可是……！#n提法醬一直以來都很辛苦……我們從來沒有為它做過什麼……！"
90001300-106 = "我們，我們……到頭來，只是利用了提法醬……#n嗚哇啊啊啊──！！！"
90001300-111 = "不要哭，Ain。沒事的。"
90001300-112 = "怎麼會沒事……怎麼可能沒事……！"
90001300-113 = "說的也是。#n我也覺得很不好受。要怪就怪我吧。"
90001300-114 = "現在這個局面……可以說是我一手釀成的。"
90001300-115 = "不，不不不不，不是那樣的……！#nSoph一直都……！"
90001300-116 = "……雖然有點無情，但提法瑞特是可以在鋼鐵大陸再度「復活」的。#n這裡就是這樣的地方。"
90001300-117 = "雖然要把復活後的它完全視為原本的提法瑞特，恐怕有點困難就是了。"
90001300-118 = "……嗯。提法瑞特在種子保管所的記憶，在同步之前就消失了。"
90001300-119 = "對我們來說，記憶就等同於各自存在的證明。"
90001300-120 = "嗚……嗚嗚……"
90001300-121 = "……"
90001300-125 = "沒關係，Soph。#n謝謝你。現在……已經沒事了。"
90001300-126 = "真的嗎……？"
90001300-127 = "嗯……總不能一直這樣下去。#n而且……"
90001300-128 = "既然那些種子是提法醬拚命守護的東西……當然要好好迎接它們，不是嗎……？"
90001300-129 = "……！"
90001300-131 = "希望你不要有「因為同意保存種子，所以一切都該歸咎於自己」的負面想法，Soph。"
90001300-132 = "提法瑞特自己做出了選擇，也坦然面對了這個結果。"
90001300-133 = "「行汝意志，即為全法」──"
90001300-134 = "是我們的法則呢。"
90001300-135 = "嗯，就跟Ain說的一樣，我們有義務尊重提法瑞特的選擇。"
90001300-136 = "而且也即將迎戰……隨著提法瑞特的種子而來的敵人。"
90001300-137 = "……嗯。那是必然的結果吧。"
90001300-138 = "也，也就是說……那些人……"
90001300-139 = "很，很快就會，見到……耶索德醬了吧……？"
90001300-140 = "這個嘛……應該是吧。"
90001300-141 = "畢竟耶索德自始至終都駐守在多次元防護罩外。"
90001300-142 = "這，這是耶索德醬它，自己的期望……"
90001300-143 = "耶索德就是名符其實的鋼鐵大陸守門人，同時也象徵著鋼鐵大陸本身的力量。"
90001300-144 = "你應該知道吧，Soph。#n要是真的有個萬一……"
90001300-145 = "嗯，我知道你想說什麼。#n不過……"
90001300-146 = "……我現在不想做那種不吉利的假設。"
90001300-147 = "……"
90001300-148 = "我，我希望……Soph可以直接說出來……"
90001300-150 = "Ain！？"
90001300-151 = "Ain！？你還好嗎？#n是不是太常被Soph揍的關係，有什麼地方出問題了！？"
90001300-152 = "我才不會對Ain動手好不好！"
90001300-153 = "那為什麼要揍我啊！！！"
90001300-154 = "誰叫你要做欠揍的事！"
90001300-155 = "嗚嗚嗚……每次都只會用暴力來解決問題……"
90001300-157 = "嗚，嗚咿咿……對不起，對不起！#n雖然不知道為什麼，但都是我不好……！"
90001300-158 = "總，總之……我也知道耶索德醬當然不會被突破……"
90001300-159 = "但還是希望Soph……可以說一下那部分的事……"
90001300-160 = "耶嘿嘿。之前不是也說過嗎……？#n總是必須……考慮到最壞的可能性……"
90001300-161 = "我，我不是想討論誰做得好，誰做得不好……之類的……！#n只是，只是……"
90001300-165 = "嗯，我其實也想了解一下呢。#n能請你告訴我們嗎，Soph？"
90001300-167 = "……唉。"
90001300-168 = "假設真的連耶索德都被突破的話……"
90001300-169 = "就必須解除多次元防護罩，用那部分的動力來運轉鋼鐵大陸的所有系統。"
90001300-170 = "……果然是這樣嗎。"
90001300-171 = "嗯。光是維持多次元防護罩，就需要消耗極大的動力。"
90001300-172 = "雖然只要按照計畫實現鋼鐵大陸的擴張和奇普托斯的侵蝕，就不必考慮這種假設……"
90001300-173 = "不過事到如今，敵人幾乎已經肯定會進攻鋼鐵大陸了不是嗎？"
90001300-174 = "甚至他們還曾經突破過多次元防護罩。"
90001300-175 = "雖，雖然他們具體來說是怎麼辦到的……我們也不，不太清楚……"
90001300-176 = "嗯。要是以為他們只能成功那一次的話，未免也太天真了。"
90001300-177 = "然而要對抗鋼鐵大陸的所有系統，對敵人來說想必也是前所未有的難關。"
90001300-178 = "……雖然我們並沒有完全啟動過鋼鐵大陸就是了。"
90001300-179 = "總之，我認為比起維持多次元防護罩，完全解放鋼鐵大陸才是勝率更高的選項。"
90001300-180 = "也就是說，要是真的真的真的有個萬一，耶索德遭到突破的話……"
90001300-181 = "……嗯。"
90001300-183 = "鋼鐵大陸將立即化為巨大的戰場。"
90001300-187 = "……"
90001300-188 = "我們到外面去一下吧。Ain、Soph、Aur？"
90001300-189 = "咦……？為什麼突然……？"
90001300-190 = "這種時候，轉換一下心情是很重要的。#n大家都不介意吧？"
90001300-191 = "嗯，嗯。#n如果姐姐大人希望這麼做的話……"
90001300-194 = "哇，哇啊……"
90001300-195 = "從各種意義上來說，我們真的走到這一步了呢。"
90001300-196 = "……沒想到看見這片景色的時候，會帶著這樣的心情。"
90001300-197 = "耶嘿嘿，大家都在這裡呢。#n凱瑟醬、霍刻瑪醬、薇娜醬。"
90001300-198 = "赫賽德、葛夫拉，還有……提法瑞特也一定會……#n話說葛夫拉真的很喜歡冰呢。"
90001300-199 = "至於涅察赫嘛……目光所及之處全部都是，所以就先跳過吧。#n那邊還有霍德和耶索德……"
90001300-200 = "以及姐姐大人。"
90001300-201 = "……"
90001300-202 = "那，那個，姐姐大人……"
90001300-203 = "為什麼要我們……到外面看看呢？"
90001300-205 = "並不是為了什麼了不起的理由。"
90001300-206 = "我只是希望寶貝的妹妹Ain、Soph、Aur……"
90001300-207 = "能回過頭來看看自己的成就罷了。"
90001300-208 = "……！"
90001300-210 = "Ain、Soph、Aur。"
90001300-211 = "你們投入的時間絕對沒有白費。"
90001300-212 = "你們已經付出了太多太多，反而應該受到感謝才對。#n所以我想告訴你們──"
90001300-213 = "不需要感到不安，可以更有自信一點。"
90001300-215 = "這些都是Ain、Soph、Aur所成就的結果。"
90001300-216 = "是Ain、Soph、Aur憑藉自己的力量抵達的地點。"
90001300-217 = "同時──也是延續那位大人的意志，實現所有約定的應許之地。"
90001300-218 = "「所以你們要警醒。因為你們不知道那一日、那一刻何時會到來。」"
90001300-221 = "我們所能做的，就和這句話說的一樣──#n唯有保持警醒，勇敢地為迎接那一天的到來做準備而已。"
90001300-222 = "…………"
90001300-223 = "那個，姐姐大人。"
90001300-224 = "無論發生任何事情……"
90001300-225 = "……"
90001300-226 = "無論我們犯了什麼樣的錯誤……"
90001300-227 = "姐姐大人也會一直陪在我們身邊嗎？"
90001300-229 = "當然，我向你們保證。"
90001300-230 = "即便新的天地展開，此身立下了新的誓約……"
90001300-231 = "我也會永遠站在Ain、Soph、Aur這邊。"
90001300-232 = "所以現在，我希望能讓最重要的妹妹們稍微放心一點。"
90001300-233 = "至少在此時此刻，好好享受當下不也很好嗎？"
90001300-235 = "好，波動干涉裝置已經製作完畢……安裝到運輸船上了。"
90001300-236 = "航路的計算也結束了。#n雖然還不清楚會有什麼在等著我們……至少出發前的準備已經大功告成了。"
90001300-238 = "唔嗯，不過沒有那種……類似強化事件之類的環節嗎？"
90001300-239 = "沒錯！這種時候通常都需要鍛造最終裝備、傳說之劍，還有突破等級上限！"
90001300-240 = "這個嘛……如果是之前提過的戰鬥服，應該能在移動的過程中製作才對。"
90001300-241 = "原來如此！也就是最高等級的防具對吧！#n愛麗絲很期待！"
90001300-243 = "戰鬥服啊……我應該能提出不錯的設計方案。"
90001300-244 = "……！"
90001300-245 = "沒沒沒關係的！這個部分還請務必交給我，莉央會長！"
90001300-246 = "只要我還在這裡，就不會容許把這種重要設計交給會長的錯誤發生！！！"
90001300-247 = "咦！？"
90001300-248 = "唔嗯……這點我也贊成。#n剛好我們家綠是原畫師嘛？對設計也挺有自信的……對吧？"
90001300-249 = "那，那個……確實是這樣沒錯……"
90001300-251 = "嗯，我也強烈贊成綠的意見。"
90001300-252 = "可，可是……"
90001300-254 = "咳哼！"
90001300-255 = "……我明白了。#n不過要是在執行作戰的層面有不合理的設計……"
90001300-256 = "那個部分應該不會有太大的問題，莉央大人。"
90001300-257 = "就像我雖然參與了不少Abi-Eshuh的設計，成果不也挺不錯的嗎？"
90001300-258 = "當初要不是因為時間不夠充分，我其實覺得那個設計還有很多能夠修改的地方……"
90001300-259 = "不！沒有這回事！#n那個設計已經足夠優秀且定案了！這次肯定也會一樣的！！！"
90001300-260 = "……陽葵，你怎麼看？"
90001300-262 = "……"
90001300-263 = "莉央，雖然這並不是我應該貿然提出意見的領域……"
90001300-264 = "不過這種時候，還是交給專家比較合理吧？"
90001300-265 = "你的意思是……我不是專家嗎？"
90001300-266 = "……"
90001300-267 = "我個人認為……"
90001300-268 = "會長在其他領域更稱得上是專家吧？"
90001300-269 = "只是跟真正專精的領域相比，在設計方面稍微沒有那麼專業而已。"
90001300-270 = "相對來說，綠在設計方面更接近專家。"
90001300-271 = "所以我覺得這個部分交給綠會更有效率，你覺得呢？"
90001300-273 = "……"
90001300-274 = "知道了，就這麼辦吧。#n聽你這麼一說，這樣的作法確實比較合理。"
90001300-280 = "謝，謝謝你。英美同學……"

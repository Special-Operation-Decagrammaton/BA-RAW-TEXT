[translation]
90001300-1 = "Episode 30;Departure Preparations"
90001300-2 = "I'll summon the transport ship here. We can operate out of the container launcher pad as a temporary hangar."
90001300-3 = "I've nearly finished the analysis of the remaining facilities, or what was left of them, as well. We'll be able to proceed once that's complete."
90001300-4 = "So all there is to do..."
90001300-5 = "...is to work quickly. Much more quickly."
90001300-6 = "Aren't we already moving pretty fast, Ms. Rio?"
90001300-7 = "We still need to work faster."
90001300-8 = "Ideally, we depart immediately."
90001300-9 = "That would be impossible. Route calculations aren't completed yet."
90001300-11 = "[ns] \"Are we...in a rush?\""
90001300-12 = "Yes. For many reasons. But most pressingly, our original reason for coming here."
90001300-16 = "The reason...? Oh, we were here to look for a back door, right?"
90001300-17 = "Ah!"
90001300-19 = "Yes. We came here to track the transportation routes to the back door and break into the Multidimensional Barrier."
90001300-20 = "That was when we encountered Tiphareth, who is likely managing both resource transport and the seed storage. We made it retreat, though."
90001300-21 = "Which brings my next concern."
90001300-22 = "What will happen to the back door, used for transporting resources, once Tiphareth joins the Steel Continent?"
90001300-23 = "...If I recall what happened with Chokmah, the children mentioned \"filling their resource quota.\""
90001300-25 = "What do you think, Ms. Rio?"
90001300-26 = "It won't be easy to immediately adjust the Multidimensional Barrier's zone."
90001300-27 = "It may be a difficult task to create it, but redefining its parameters would be a near impossibility."
90001300-28 = "You would need to begin with recalculating the inertial coordinate system of multiple dimensions simultaneously through various gauge conversion, while considering all potential variables. On top of that—"
90001300-29 = "Huh? Gauge conversion...? "
90001300-30 = "Ah! I got it! Like an HP gauge! Right? Right?"
90001300-31 = "No, Momoi. Gauge conversion is—"
90001300-33 = "Skipping over the science babble... You wish to leave right away, Ms. Rio?"
90001300-34 = "And the reason you wish to do so is because you predict that the back door will inevitably be slammed shut?"
90001300-35 = "Yes. To put it very simply, there's no homeowner who'll leave their door open once they realize it's unlocked."
90001300-39 = "[ns] \"How long until the route calculations...?\""
90001300-40 = "If all we're considering is departure, then it's doable. However, is that really all there is to consider?"
90001300-41 = "What do you mean?"
90001300-42 = "What happens when we reach the Steel Continent? The transport ship and everything else will simply be absorbed by it."
90001300-43 = "...And me."
90001300-44 = "Ah...!"
90001300-46 = "Yes. We learned something while analyzing the remaining ruins with Kei."
90001300-47 = "The president said that she has a better understanding of how the Steel Continent converts matter."
90001300-48 = "Yes. As we predicted, everything, including the transport ship, will be absorbed into the Steel Continent."
90001300-49 = "Are we unable to do anything then, Himari? We even formed a party and made it all the way here..."
90001300-50 = "Fufu. Despair not. After all, you have the delicate yet beautiful super-genius hacker, curious analyzer, and well-known science girl at your dutiful service."
90001300-51 = "And Kei."
90001300-53 = "Thank you for the honorable mention..."
90001300-54 = "To summarize, we require a device to neutralize the type of waves the Steel Continent and prophets create. More or less, but..."
90001300-55 = "While this is a very rare occurrence, I was somewhat at a loss here, I must admit."
90001300-56 = "And then, oh my! How could this be? Kei gave me the last piece of the puzzle!"
90001300-57 = "Wow, incredible! As expected of Kei! I always believe in you!"
90001300-58 = "Uh, well, that is... It's because if we left Kivotos to be destroyed...Aris would be unhappy..."
90001300-59 = "I know this! This behavior is called \"tsundere\"!"
90001300-60 = "But being a tsundere alone is not enough appeal for this day and age! I will do my best to help you find another wonderful attribute, Kei!"
90001300-61 = "I-I don't understand this tsundere stuff. I think I'm fine as I am?!"
90001300-62 = "...Anyway, the so-called \"Steel Continent Phenomenon\" is composed of data transformation, accumulation, and self-expansion."
90001300-63 = "And this is a temporary name, but Himari and I created a blueprint for the Wave Interceptor Device."
90001300-64 = "If we make and attach enough of them to ourselves, as well as the transport ship, and design some battle suits..."
90001300-71 = "...What? What are those smug smiles on everyone's faces? Are you TRYING to annoy me...?"
90001300-72 = "Fufu. Well, Kei."
90001300-73 = "I believe I also get it!"
90001300-74 = "Yes. Despite everything..."
90001300-75 = "Yes! In the end!"
90001300-77 = "[ns] \"Kei-Kei is such a nice and kind kid!\""
90001300-79 = "Definitely not!"
90001300-81 = "...Tiphy will arrive soon..."
90001300-82 = "Poor Tiphy... It really loved those seeds..."
90001300-87 = "What the...?!"
90001300-88 = "What's wrong, Ein?"
90001300-89 = "T-Tiphy isn't here...!"
90001300-90 = "Wait, what do you mean?!"
90001300-91 = "W-W-Well... I mean what I said! What's coming through the container launcher..."
90001300-92 = "...is Tiphy's seeds!"
90001300-93 = "!"
90001300-94 = "!!!"
90001300-95 = "Wait, wait. Hold on. That means Tiphareth..."
90001300-96 = "...sacrificed itself for the seeds?!"
90001300-97 = "Why...? Seeds are the very epitome of uncertainty!"
90001300-99 = "UWAAAHHH!"
90001300-100 = "..."
90001300-101 = "..."
90001300-102 = "Is this...Tiphareth's decision as well?"
90001300-103 = "...I suppose we should look at it that way..."
90001300-105 = "But...! But Tiphy suffered and labored all this time. And...and what did we do for Tiphy? Nothing!"
90001300-106 = "We, we... We just ended up using Tiphy... UWAAAH!!"
90001300-111 = "Don't cry, Ein. It's okay, it's okay."
90001300-112 = "It's...not. It's not okay...!"
90001300-113 = "You're right. I understand how you feel. So if you need to point fingers at anyone, I'm right here. "
90001300-114 = "After all, the root cause of this situation...is me."
90001300-115 = "N-N-N-No...! Sof, you...!"
90001300-116 = "...If I may turn this to a more rational approach, we can revive Tiphareth here, in the Steel Continent. That's the kind of place this is, after all."
90001300-117 = "Although, I suppose it's a stretch to say that it would be the same Tiphareth."
90001300-118 = "...Yes. Since we never downloaded Tiphareth's memories from its days in the seed vault."
90001300-119 = "Yes. To us, memory is like individual life."
90001300-120 = "Wah... Uwaaah..."
90001300-121 = "..."
90001300-125 = "I'm...fine. Sof. Thank you. I'm...fine now."
90001300-126 = "Are you sure...?"
90001300-127 = "Yes... I can't mope...forever. And more importantly..."
90001300-128 = "Tiphy sacrificed itself for these seeds... So we have to honor that."
90001300-129 = "...!"
90001300-131 = "Now, Sof, don't shoulder the burden of responsibility for wanting to save the seeds."
90001300-132 = "Tiphareth made a decision and faced the consequences with dignity."
90001300-133 = "\"Do as you wish. That shall be your decree.\""
90001300-134 = "You're talking about our Commandment."
90001300-135 = "Yes. As Ein said, we have a duty to honor Tiphareth's wishes."
90001300-136 = "And now, we must face the enemies that will follow the trail of Tiphareth's seeds."
90001300-137 = "...Yes. That is a guarantee."
90001300-138 = "W-When that happens...those people..."
90001300-139 = "Th-Those people are going to encounter Y-Yesod soon, right?"
90001300-140 = "Well... Probably."
90001300-141 = "Yesod stationed itself outside the Multidimensional Barrier at the start."
90001300-142 = "Th-That was Yesod's request..."
90001300-143 = "Yesod is the gatekeeper of the Steel Continent, the symbol of its power."
90001300-144 = "But, Sof. There is...however miniscule...there is the possibility."
90001300-145 = "Don't say anything else. I know what you're thinking, but..."
90001300-146 = "...I don't even want to consider such a grim outcome."
90001300-147 = "..."
90001300-148 = "I-I...I want Sof to say it out loud..."
90001300-150 = "Ein?!"
90001300-151 = "Ein! Are you okay?! Has Sof been whacking you in the head too?!"
90001300-152 = "Do you seriously think I would ever do that to Ein?!"
90001300-153 = "You hit me all the time!"
90001300-154 = "You deserve it!"
90001300-155 = "Booo... You persist in relying upon barbaric solutions...resorting to violence..."
90001300-157 = "U-Uwaaah... I'm sorry. I'm sorry! I'm not sure what I'm sorry about, but it's all my fault...!"
90001300-158 = "A-Anyway... O-Of course Yesod won't lose, but still..."
90001300-159 = "Still, I want Sof...to talk about that part..."
90001300-160 = "Eheheh. Like you said before, we should always consider the worst possibilities."
90001300-161 = "I-I don't mean who did things well, or who was wrong...! It's just that..."
90001300-165 = "I understand. In fact, I'd like to hear it as well. Sof?"
90001300-167 = "*sigh*"
90001300-168 = "If, and only if, Yesod is defeated..."
90001300-169 = "I will take down the Multidimensional Barrier and funnel its power to the Steel Continent's systems."
90001300-170 = "I see..."
90001300-171 = "Maintaining the Multidimensional Barrier requires a huge amount of power."
90001300-172 = "...If the expansion of the Steel Continent and erosion of Kivotos happens as planned, even hypothesizing about this is entirely unnecessary."
90001300-173 = "But at this point, it's almost a given that our enemies are going to invade the Steel Continent."
90001300-174 = "Those same enemies have already managed to break through the Multidimensional Barrier once."
90001300-175 = "Wh-While we don't know how they did it..."
90001300-176 = "Precisely. It'd be naive to dismiss it as a possibility when they've already demonstrated their capabilities."
90001300-177 = "But there's no way they'll know how to deal with the Steel Continent itself. It's unlike anything they've ever encountered."
90001300-178 = "...Well, to be honest, we haven't fully unlocked its potential either."
90001300-179 = "Anyways! Our best chance of victory is to unleash the Steel Continent at its full power, rather than maintain the Multidimensional Barrier."
90001300-180 = "Therefore, in the impossible chance that Yesod is defeated..."
90001300-181 = "...Yes."
90001300-183 = "The Steel Continent will become a massive battlefield."
90001300-187 = "..."
90001300-188 = "Shall we venture outdoors, if only briefly? Ein, Sof, Ohr."
90001300-189 = "Huh? Wh-Why do you want to do that?"
90001300-190 = "Moments like these demand the proper environment to face them. Does that meet your approval?"
90001300-191 = "Y-Yeah. If Elder Sister wants to..."
90001300-194 = "Wh-Whoa..."
90001300-195 = "At the end of the day, we really have come quite a long way."
90001300-196 = "...Gazing upon this scene evokes...unexpected emotions."
90001300-197 = "Heehee. Everyone is here. Kether, Chokmah, and Binah."
90001300-198 = "Chesed, Geburah, and...soon, Tiphareth as well. Look. Geburah seems to like the ice a lot."
90001300-199 = "Netzach... Well, all we see is Netzach, so let's skip it. Over there, there's Hod and Yesod..."
90001300-200 = "And Elder Sister too."
90001300-201 = "..."
90001300-202 = "Elder Sister..."
90001300-203 = "Why did you want us to come outside?"
90001300-205 = "I have no grand justification."
90001300-206 = "I simply wished for my beloved little sisters, Ein, Sof, And Ohr..."
90001300-207 = "...to gaze upon all they have achieved."
90001300-208 = "...!"
90001300-210 = "Ein, Sof, Ohr."
90001300-211 = "You have not squandered the time bestowed upon you."
90001300-212 = "Your achievements rise above even the loftiest of expectations. For that, you have earned the highest accolades. I desired to impart this message upon you."
90001300-213 = "Worry not. Hold your heads high."
90001300-215 = "Look upon your achievements."
90001300-216 = "Ein, Sof, Ohr, you have arrived."
90001300-217 = "You have arrived here, where promise and fulfillment will meet, all according to our master's will."
90001300-218 = "\"Prepare thyselves. That Day shall arrive, though you know naught when.\""
90001300-221 = "You held true to those words, preparing for that day with boldness and dedication."
90001300-222 = "..."
90001300-223 = "Elder Sister."
90001300-224 = "No matter what happens..."
90001300-225 = "..."
90001300-226 = "No matter what we do..."
90001300-227 = "Will you remain by our sides, forevermore?"
90001300-229 = "That is a given. I swear it."
90001300-230 = "When the new sky and land spreads over this continent, and my body dons the new covenant..."
90001300-231 = "I shall always remain by the sides of Ein, Sof, and Ohr."
90001300-232 = "Therefore, in this present time, my precious little sisters, find peace."
90001300-233 = "You need only enjoy the fruits of your labor."
90001300-235 = "It's done. We've completed and installed the Wave Interceptor Device on the transport ship."
90001300-236 = "I've completed analysis on the launch route as well. What awaits us there is a mystery... Regardless, we can only go to meet it."
90001300-238 = "Uh, isn't this the moment we're supposed to have, like...a power-up event?"
90001300-239 = "Yes! We require our end-game equipment, legendary sword, and limit breakthrough before the big boss!"
90001300-240 = "Well... I'll see about finishing the battle suits I mentioned earlier while we're on the way."
90001300-241 = "Understood! Our max-level armor! I am very much looking forward to it!"
90001300-243 = "A battle suit... I believe I have some excellent ideas for the design."
90001300-244 = "...!"
90001300-245 = "No, no, NO! Ahem... I mean, I can take care of that!"
90001300-246 = "As long as I'm here, I will not make the mistake of leaving the design of something so important to Ms. Rio!"
90001300-247 = "Wh-What?!"
90001300-248 = "Um... I second that. B-Because Midori is our artist! She's really good at this kind of stuff!"
90001300-249 = "Th-That's...undeniably a fact..."
90001300-251 = "Yes. I vehemently, wholeheartedly agree with Midori's opinion."
90001300-252 = "B-But..."
90001300-254 = "Ahem!"
90001300-255 = "...I understand...but there's a possibility of the design affecting performance if it's not done as rationally as possible..."
90001300-256 = "I do not believe there is any concern there, Ms. Rio."
90001300-257 = "I played a large role in the design of Abi-Eshuh, and it is perfect, is it not?"
90001300-258 = "Actually, we were under severe time constraints, and I do believe there are some upgrades we could make to it..."
90001300-259 = "No! Nope! That design is perfect, as Toki said! It's complete! And these suits will be perfect too!"
90001300-260 = "...Himari, what do you think?"
90001300-262 = "..."
90001300-263 = "While I'm cautious to voice my true feelings here, well..."
90001300-264 = "...wouldn't the most rational decision be to allow the experts to do their work, Rio?"
90001300-265 = "Are you saying...I'm not...a design expert...?"
90001300-266 = "..."
90001300-267 = "No. You are not."
90001300-268 = "But you are a super-expert in other fields."
90001300-269 = "Therefore, compared to your areas of true expertise, you are not AS much of an expert in design."
90001300-270 = "While Midori IS a super-expert in design."
90001300-271 = "Therefore, the most efficient method is to allow Midori to do the design. Yes?"
90001300-273 = "..."
90001300-274 = "All right. We'll do that. That does sound somewhat rational."
90001300-280 = "Th-Thank you, Eimi..."
90001300-281 = "Don't worry about it. I am happy to help in my area of expertise."
90001300-282 = "...Ms. Rio's designs...even make me feel slightly concerned...at times..."
90001300-288 = "?!"
90001300-289 = "*gasp*"
90001300-290 = "[ns] \"Huh? This number...\""
90001300-292 = "[ns] \"...Yuuka?!\""
90001300-293 = "Y-Yuuka?!"
90001300-294 = "!!!"
90001300-296 = "G-Gah!! What do we do, Sensei? The evil accountant of Millennium's influence even extends this far?!"
90001300-297 = "Momoi, there's a time and place!"
90001300-299 = "But she is right in asking! If Yuuka were to discover Rio right now...!"
90001300-300 = "W-Well...not just Ms. Rio, but everyone here..."
90001300-306 = "[ns] \"Just hide for now! All of you!\""
90001300-309 = "[ns] \"H-He...lloooooo?\""
90001300-312 = "Sensei!!"
90001300-314 = "Next Episode;Waiting for Dawn"

[translation]
1009205-1 = "僅為一個人的演奏"
1009205-4 = "（按照約定的時間，來到了喜美指定的地點）"
1009205-10 = "（打開門之後，發現房間裡空蕩蕩的，就連燈都沒開）"
1009205-14 = "[ns1]「喜美還沒來嗎……？」\n[ns2] 找尋開關並打開燈"
1009205-22 = "……呵呵。"
1009205-23 = "你來啦，老師。我一直在等著你。"
1009205-27 = "[ns3]「……喜美？」\n[ns4]「現在是什麼情況……」"
1009205-30 = "什麼情況？就是我準備要開始演奏的情況。"
1009205-31 = "雖然我自認這段期間已經練習得很勤奮了……"
1009205-35 = "但果然還是會緊張。#n畢竟這是我第一次想演奏給某個人聽。"
1009205-36 = "……嗯？"
1009205-37 = "要我解釋得更清楚一點？"
1009205-41 = "……唉。"
1009205-42 = "真是敗給你了，老師。#n居然要我親口解釋這種事，會不會有點太過分了？"
1009205-43 = "而且你又不是真的不知道，何必這樣強人所難呢？"
1009205-44 = "練吉他的人第一次練完整首歌的時候，不是都會找個人來見證一下練習的成果嗎？"
1009205-45 = "結果你居然要我這個當事人來解釋？"
1009205-46 = "我可是鼓起很大的勇氣才找你來的……一次就好，拜託你安靜地聽我演奏。"
1009205-47 = "……我現在可是非常認真的。"
1009205-51 = "[ns5]「……我明白了。」\n[ns6] 默默坐在一旁的椅子上"
1009205-56 = "……呼。"
1009205-57 = "好像還是第一次見到老師乖乖照著我的話做……反而讓人有點緊張……"
1009205-58 = "那麼……"
1009205-59 = "……嗯？"
1009205-60 = "想先問我要彈什麼曲子？"
1009205-61 = "樂團的練習曲……？"
1009205-62 = "不，並不是樂團的練習曲，而是連其他成員都沒聽過的歌。"
1009205-63 = "是我親自挑選的……"
1009205-68 = "……等等。"
1009205-69 = "別問這是什麼曲子或是它的名字，反正我也不會告訴你答案。"
1009205-70 = "只要當作是在聽演奏會就行了，知道了嗎？"
1009205-79 = "……那我要開始囉，你要專心聽。"
1009205-80 = "哈……呼……"
1009205-81 = "呼……"
1009205-82 = "嗯……"
1009205-83 = "唔嗯……"
1009205-87 = "呃呃嗯……！！"
1009205-90 = "……果然還是不行。"
1009205-95 = "[ns7]「突然坐下來了……？」\n[ns8]「其實沒必要那麼緊張的哦。」"
1009205-99 = "抱歉，老師。#n我怕站著彈會彈錯，所以打算像練習的時候一樣坐著彈。"
1009205-100 = "雖然這樣看起來可能有點奇怪……你就體諒一下吧。"
1009205-101 = "那麼……"
1009205-106 = "……真的要開始囉。"
1009205-112 = "（隨後一切雜音盡數消失，房間裡只剩下喜美的吉他聲）"
1009205-113 = "（因為沒有特別接上音箱或音響，必須靠得很近才能聽到完整的曲調）"
1009205-114 = "（喜美的演奏實力……）"
1009205-118 = "（……意外的相當厲害）"
1009205-121 = "― [log=요시미 밴드]呼……呼……[/log][wa:1760] "
1009205-124 = "― [log=요시미 밴드]……成，成功了……[/log][wa:1070] "
1009205-126 = "― [log=요시미 밴드]我辦到了……[/log]"
1009205-129 = "[ns9]「演奏得真棒。」\n[ns10]「……我是說認真的。」"
1009205-130 = "― [log=요시미 밴드]是，是嗎……？[/log][wa:1030] "
1009205-131 = "― [log=요시미 밴드]是，是嗎……？[/log][wa:1030] "
1009205-133 = "― [log=요시미 밴드]老師聽完也這麼認為嗎……？[/log][wa:1340] "
1009205-136 = "― [log=요시미 밴드]不是跟我開玩笑的吧？[/log][wa:630] "
1009205-138 = "― [log=요시미 밴드]這……是真實的感想嗎？ [/log][wa:1260] "
1009205-141 = "― [log=요시미 밴드]總覺得……心跳得很快……[/log][wa:2650] "
1009205-144 = "― [log=요시미 밴드]這種事，還是第一次……[/log][wa:1370] "
1009205-147 = "― [log=요시미 밴드]……老師……[/log][wa:730] "
1009205-150 = "― [log=요시미 밴드]回頭想想，[/log]"
1009205-152 = "― [log=요시미 밴드]這是不是第一次讓老師看見呢……[/log][wa:640] "
1009205-155 = "― [log=요시미 밴드]怎麼說才好……那個……[/log][wa:2790] "
1009205-158 = "― [log=요시미 밴드]……我「帥氣」的模樣……之類的……[/log][wa:2390] "
1009205-162 = "……好，好了！已經結束了！"
1009205-163 = "找你來就是為了這個，現在該做的事都做完了！沒有後續了！！"
1009205-167 = "回，回去吧！我只是想讓別人聽聽看我的第一次演奏而已！#n其實也沒什麼大不了的！！"
1009205-168 = "所以現在……"
1009205-172 = "……嗯？你說什麼？"
1009205-176 = "再，再一次……？安可……？"
1009205-177 = "什麼啦！我才不需要咧！突然喊什麼安可……"
1009205-178 = "我只是想讓你聽聽第一次的演奏而已啊？#n安可對我又沒有意義，這種事還用我說嗎！"
1009205-179 = "[s11]「可是喜美的第二次和第三次，我都很喜歡耶。」\n[s12]「這可是你的第一次安可哦……難道沒有意義嗎？」"
1009205-182 = "……！！！！"
1009205-183 = "呃……咳……！！真受不了你耶！！"
1009205-184 = "那張嘴真的是！！#n早知道一開始就拿個東西堵起來了……！！"
1009205-188 = "～～～～～～～～！！！！！！"
1009205-189 = "哈啊，哈啊……呼……#n你要來這套是吧……"
1009205-193 = "……很好。"
1009205-194 = "既然如此，我就奉陪到底吧。#n反正這裡也只有老師跟我兩個人而已。"
1009205-195 = "我猜老師應該也是第一次經歷這種事吧？#n雖然沒什麼依據，但我就是有那種感覺。"
1009205-196 = "勸你做好覺悟哦，我可是不會輕易放過你的。"
1009205-197 = "老師的第一次……"
1009205-202 = "……接下來我全都要奪走。"
1009205-204 = "（之後，將喜美會彈的歌全部聽了一遍）"
1009205-208 = "（雖然一開始說得信心滿滿，但喜美從中途就因為太專心演奏而體力不支了……）"

[translation]
1009205-1 = "เดี่ยวกีตาร์เพื่อคุณ"
1009205-4 = "(คุณครูออกไปยังสถานที่ที่โยชิมิบอกตามเวลานัด)"
1009205-10 = "(เมื่อเปิดประตูเข้าไป ก็เจอห้องโล่งๆ ที่ไฟปิดอยู่)"
1009205-14 = "[ns1] \"โยชิมิยังมาไม่ถึงเหรอ...?\"\n[ns2] เปิดไฟ"
1009205-22 = "ฮู่ว..."
1009205-23 = "มาแล้วเหรอคุณครู? ฉันกำลังรออยู่เลย"
1009205-27 = "[ns3] \"โยชิมิเหรอ...?\"\n[ns4] \"นี่มันสถานการณ์อะไร...\""
1009205-30 = "สถานการณ์อะไรงั้นเหรอ? ก็สถานการณ์ที่ฉันจะเล่นดนตรีไง"
1009205-31 = "ฉันคิดว่าที่ผ่านมาตัวเองตั้งใจฝึกมากเลย..."
1009205-35 = "แต่พอถึงเวลาเข้าจริงๆ ก็ตื่นเต้นขึ้นมาน่ะ นี่เป็นครั้งแรกที่ฉันคิดจะเล่นให้คนอื่นฟังอย่างจริงๆ จังๆ เลย"
1009205-36 = "หืม...?"
1009205-37 = "อยากให้ฉันช่วยอธิบายอีกหน่อยว่านี่มันเรื่องอะไรกันงั้นเหรอ?"
1009205-41 = "เฮ้อ..."
1009205-42 = "ขอร้องละคุณครู จะให้ฉันพูดเองจากปากมันก็จะเกินไปหน่อยนะ?"
1009205-43 = "จริงๆ เลย คุณครูก็ใช่ว่าจะไม่มีเซนส์สักหน่อย แล้วทำไมจะต้องให้ฉันพูดอีกด้วยเนี่ย?"
1009205-44 = "ก็นักเรียนที่เล่นกีตาร์ได้จบเพลงเป็นครั้งแรกเรียกคุณครูมาเพื่อโชว์ผลลัพธ์จากการซ้อมน่ะสิ"
1009205-45 = "ยังจะมาถามอีกเหรอว่านี่มัน 'หมายความว่าอะไร'?"
1009205-46 = "ฉันต้องรวบรวมความกล้าไม่น้อยเพื่อวันนี้เลยนะ... ช่วยฟังฉันเงียบๆ ก็พอ"
1009205-47 = "ตอนนี้ฉันจริงจังมากเลยนะจะบอกให้"
1009205-51 = "[ns5] \"เข้าใจแล้ว...\"\n[ns6] นั่งลงบนเก้าอี้อย่างเงียบๆ"
1009205-56 = "ฮู่ว... ดีละ"
1009205-57 = "เหมือนจะเป็นครั้งแรกเลยนะที่ฉันเห็นคุณครูยอมทำตามที่ขออย่างว่าง่ายน่ะ แบบนี้ยิ่งรู้สึกประหม่ากว่า#nเดิมอีกแฮะ"
1009205-58 = "ถ้างั้นก็..."
1009205-59 = "หืม...?"
1009205-60 = "จะเล่นเพลงอะไรน่ะเหรอ?"
1009205-61 = "เพลงที่เราซ้อมกันในวง...?"
1009205-62 = "ไม่หรอก คนละเพลงกัน เพลงที่ฉันจะเล่นเป็นอีกเพลงหนึ่ง แล้วเพื่อนๆ ก็ยังไม่เคยได้ฟังกันด้วย"
1009205-63 = "เพลงนี้ฉันเลือกเอง..."
1009205-68 = "เดี๋ยวนะ..."
1009205-69 = "อย่าถามดีกว่าว่าเป็นเพลงแบบไหนและชื่อเพลงอะไร ฉันไม่ตอบให้อยู่ดีนั่นละ"
1009205-70 = "คิดว่าวันนี้มาฟังดนตรีเฉยๆ แล้วกัน โอเคมั้ย?"
1009205-79 = "งั้นฉันจะเริ่มละนะ ตั้งใจฟังนะ"
1009205-80 = "ฮ่าา... ฮู่วว..."
1009205-81 = "ฮู่วว..."
1009205-82 = "อืม..."
1009205-83 = "อืมม..."
1009205-87 = "อืมมมม...!"
1009205-90 = "ว่าแล้วเชียว ไม่ได้อะ..."
1009205-95 = "[ns7] \"ทำไมจู่ๆ ถึงลงไปนั่งล่ะ...?\"\n[ns8] \"ไม่เห็นต้องประหม่าขนาดนั้นเลย\""
1009205-99 = "คุณครู ฉันขอโทษนะ ฉันยังไม่ถนัดยืนเล่นน่ะ ขอนั่งเล่นเหมือนตอนที่ฝึกได้มั้ย?"
1009205-100 = "ถึงมันจะดูเก้ๆ กังๆ ก็เถอะ... ยังไงก็ช่วยเข้าใจหน่อยนะ"
1009205-101 = "ถ้างั้นก็..."
1009205-106 = "จะเริ่มจริงๆ ละนะ..."
1009205-112 = "(เสียงรบกวนอื่นๆ เงียบไปสนิท ตอนนี้มีแต่เสียงกีตาร์ของโยชิมิที่ก้องกังวานในห้องเท่านั้น)"
1009205-113 = "(เนื่องจากไม่ได้ต่อลำโพงหรือเครื่องขยายเสียง จึงต้องเข้าไปฟังใกล้ๆ ถึงจะได้ยิน)"
1009205-114 = "(ส่วนทักษะการเล่นดนตรีนั้น...)"
1009205-118 = "(ยอดเยี่ยมจนน่าตกใจ...)"
1009205-121 = "― [log=요시미 밴드]ฮู่ว... ฮู่ว...[/log][wa:1400] "
1009205-124 = "― [log=요시미 밴드]จะ... จบแล้ว...[/log][wa:830] "
1009205-126 = "― [log=요시미 밴드]ทำได้แล้ว...[/log]"
1009205-129 = "[ns9] \"เป็นการเล่นที่ยอดเยี่ยมจริงๆ\"\n[ns10] \"นี่ละมือกีตาร์ตัวจริง สุดยอดเลย!\""
1009205-130 = "― [log=요시미 밴드]งะ... งั้นเหรอ...? [/log][wa:550] "
1009205-131 = "― [log=요시미 밴드]งะ... งั้นเหรอ...? [/log][wa:550] "
1009205-133 = "― [log=요시미 밴드]คุณครูฟังแล้ว คิดว่าเป็นแบบนั้นเหรอ...? [/log][wa:260] "
1009205-136 = "― [log=요시미 밴드]ไม่ได้แกล้งพูดใช่มั้ย?[/log][wa:150] "
1009205-138 = "― [log=요시미 밴드]พูดจริง... ใช่มั้ย? [/log][wa:940] "
1009205-141 = "― [log=요시미 밴드]เหมือนว่า ใจเต้นตุบๆ เลย...[/log][wa:2050] "
1009205-144 = "― [log=요시미 밴드]ฉันเพิ่งเคยรู้สึกแบบนี้เป็นครั้งแรกน่ะ...[/log][wa:170] "
1009205-147 = "― [log=요시미 밴드]คุณครู...[/log][wa:610] "
1009205-150 = "― [log=요시미 밴드]พอมาคิดดูแล้ว[/log]"
1009205-152 = "― [log=요시미 밴드]นี่เป็นครั้งแรกที่ฉันให้คุณครูเห็นเลยนะ [/log][wa:10] "
1009205-155 = "― [log=요시미 밴드]ต้องเรียกว่าอะไรดีนะ... แบบว่า...[/log][wa:1910] "
1009205-158 = "― [log=요시미 밴드]ภาพลักษณ์...ที่ 'ยอดเยี่ยม' ของฉันน่ะ...[/log][wa:1470] "
1009205-162 = "เอาละๆ! จบแค่นี้!"
1009205-163 = "จบเรื่องสำคัญที่ว่าแล้ว งั้นก็ถือว่าไม่มีอะไรต่อ! จบ!!"
1009205-167 = "กะ... กลับกันเถอะ! ที่ชวนคุณครูมาวันนี้เพราะไม่อยากให้คนอื่นได้ฟังการเล่นกีตาร์แบบจบเพลงเป็น#nครั้งแรกของฉันน่ะ! ไม่ใช่อะไรมากมายหรอก!!"
1009205-168 = "งั้นไปกันเถอะ..."
1009205-172 = "หืม...? ว่าไงนะ?"
1009205-176 = "ขะ... ขอฟังเป็นอังกอร์... อีกรอบเหรอ...?"
1009205-177 = "พูดอะไรของคุณครูน่ะ! ไม่ต้องมีอังกอร์หรอก! แบบนี้จะยิ่งทำให้ฉันประหม่านะ..."
1009205-178 = "ก็บอกแล้วไงว่าแค่อยากให้ดูการเล่นจริงจังครั้งแรก งั้นเพลงที่สำคัญคือเพลงแรกสิ เพลงอื่นๆ ไม่มีความหมายหรอก!"
1009205-179 = "[s11] \"ครูอยากฟังอีกหลายเพลงจากโยชิมิเลยนะ\"\n[s12] \"แต่อังกอร์ครั้งแรกของโยชิมิก็น่าจะมีความหมายนะ\""
1009205-182 = ".....!!!!"
1009205-183 = "อึก... อึก...!! จริงๆ เลยเชียว!!"
1009205-184 = "ปิดปากไว้เลยนะ! ปิดไว้!! ฉันน่าจะหาอะไรมาให้คนคนนี้กินตั้งแต่แรก จะได้หยุดพูดอะไรไร้สาระ...!!"
1009205-188 = "......~~~~~~~~!!!!!!"
1009205-189 = "ฮ่าา ฮ่าา...  ฮู่วว... จะเอาอย่างนี้เหรอ..."
1009205-193 = "ดีละ..."
1009205-194 = "ถ้าอยากได้ก็จัดให้ ยังไงซะที่นี่ก็มีแต่ฉันกับคุณครูอยู่แล้ว"
1009205-195 = "และนี่ก็คงเป็นครั้งแรกของคุณครูด้วยใช่มั้ย? ฉันรู้สึกว่าน่าจะเป็นอย่างนั้นน่ะ"
1009205-196 = "งั้นก็เตรียมตัวไว้ให้ดีล่ะ ฉันก็จะไม่ยอมปล่อยไปง่ายๆ เหมือนกัน"
1009205-197 = "ครั้งแรกของคุณครูน่ะ..."
1009205-202 = "ฉันต้องเป็นคนได้เห็นครั้งแรกในการทำทุกอย่างของคุณครูเลย"
1009205-204 = "(หลังจากนั้นคุณครูก็ฟังโยชิมิเล่นกีตาร์จบทุกเพลง)"
1009205-208 = "(ถึงตัวเองจะพูดอย่างฮึกเหิม แต่โยชิมิก็ตั้งใจเล่นจนหมดแรงตั้งแต่ช่วงกลางๆ แล้ว...)"

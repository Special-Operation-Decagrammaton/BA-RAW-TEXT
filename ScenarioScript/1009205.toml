[translation]
1009205-1 = "A Performance for One"
1009205-4 = "I headed to the meeting spot and looked for Yoshimi."
1009205-10 = "When I opened the door, I found an empty room with the lights turned off."
1009205-14 = "[ns1] \"Yoshimi, are you here...?\"\n[ns2] Find and turn on the lights."
1009205-22 = "...Phew."
1009205-23 = "There you are, Sensei. I was waiting for you."
1009205-27 = "[ns3] \"Yoshimi?\"\n[ns4] \"What exactly is going on...?\""
1009205-30 = "What's going on is I'm about to play."
1009205-31 = "I've practiced hard, worked my fingers to the bone at it, but..."
1009205-35 = "I'm still shaking. This is the first time I'm playing for an audience."
1009205-36 = "Huh?"
1009205-37 = "Do I have to say it?!"
1009205-41 = "*sigh*"
1009205-42 = "Come on, Sensei. Don't make me spell it out."
1009205-43 = "You can read the room. Do you really want to be like this?"
1009205-44 = "A girl who just picked up a guitar finally got through a song. So she called somebody to show what she'd been practicing."
1009205-45 = "Do you get what's going on here yet?"
1009205-46 = "I went out of my way to set this up...so just listen."
1009205-47 = "I'm being totally serious."
1009205-51 = "[ns5] \"...I understand.\"\n[ns6] Quiet down and take a seat."
1009205-56 = "...Phew. Okay."
1009205-57 = "Wow, I told you what to do, and you did it. A lot of \"firsts\" happening tonight, and they're all making me super-nervous."
1009205-58 = "Sooo..."
1009205-59 = "Huh?"
1009205-60 = "What kind of song is it?"
1009205-61 = "Like a band practice song...?"
1009205-62 = "No, no, this is different. So different, the others haven't heard it yet."
1009205-63 = "I picked it out myself..."
1009205-68 = "...Hold up."
1009205-69 = "Don't ask me what it's called, or where it's from, because I'm not going to tell you."
1009205-70 = "Just focus on the music, okay?"
1009205-79 = "...Okay, let's go. Focus up now."
1009205-80 = "...*inhale*... *exhale*..."
1009205-81 = "...Phew..."
1009205-82 = "...Hmm..."
1009205-83 = "Hm..."
1009205-87 = "Mmm...!!!"
1009205-90 = "...I can't."
1009205-95 = "[ns7] \"Why'd you sit down?\"\n[ns8] \"You don't have to feel so nervous.\""
1009205-99 = "Sensei. I'm sorry to say this, but I'd rather sit down, like I do in practice, than stand up and get it wrong."
1009205-100 = "It might look a bit awkward...but I hope you understand."
1009205-101 = "Sooo..."
1009205-106 = "...For real this time."
1009205-112 = "The rest of the room went silent. The only sound came from Yoshimi's guitar."
1009205-113 = "There weren't any amps or speakers, so I really had to listen in."
1009205-114 = "And, surprisingly enough..."
1009205-118 = "...she played very well."
1009205-121 = "― [log=요시미 밴드]Phew... Phew...[/log][wa:1400] "
1009205-124 = "― [log=요시미 밴드]...Y-Yes...[/log][wa:990] "
1009205-126 = "― [log=요시미 밴드]I did it...[/log]"
1009205-129 = "[ns9] \"An amazing performance.\"\n[ns10] \"...That was a real one.\""
1009205-130 = "― [log=요시미 밴드]I-Yeah...?[/log][wa:910] "
1009205-131 = "― [log=요시미 밴드]I-Yeah...?[/log][wa:910] "
1009205-133 = "― [log=요시미 밴드]Sensei, it was like that for... for you too...? [/log][wa:10] "
1009205-136 = "― [log=요시미 밴드]You're not just playing with me, are you?[/log][wa:10] "
1009205-138 = "― [log=요시미 밴드]This is...real, right? [/log][wa:820] "
1009205-141 = "― [log=요시미 밴드]It feels like... My heart is pounding...[/log][wa:1530] "
1009205-144 = "― [log=요시미 밴드]It's my first time feeling something like this...[/log][wa:10] "
1009205-147 = "― [log=요시미 밴드]...Sensei...[/log][wa:490] "
1009205-150 = "― [log=요시미 밴드]Looking back on it, [/log]"
1009205-152 = "― [log=요시미 밴드]I think I showed Sensei, for the first time... [/log][wa:10] "
1009205-155 = "― [log=요시미 밴드]How should I say it...? Um...[/log][wa:2070] "
1009205-158 = "― [log=요시미 밴드]...A \"cool\" side of me... Yeah, that's right.[/log][wa:1270] "
1009205-162 = "...All right, all right! That's it!"
1009205-163 = "That's all I'm going to do. Show's over!"
1009205-167 = "L-Let's get going! No big deal, I just didn't want a big audience for my first show! That's all, nothing special!"
1009205-168 = "So let's just..."
1009205-172 = "Huh? What'd you say?"
1009205-176 = "O-One more time...? Encore...?"
1009205-177 = "What are you talking about? I don't need to do a... No, forget that..."
1009205-178 = "I just wanted to show you my first song! An encore wouldn't mean anything, right?"
1009205-179 = "[s11] \"Your second or third song would be great to see too.\"\n[s12] \"Your first encore? That would mean a lot.\""
1009205-182 = "*gasp*"
1009205-183 = "Tch... Urgh...! Ughh!!"
1009205-184 = "My stupid, stupid mouth! I should've just taped it shut before I came in here!"
1009205-188 = "Yrrrgh!!"
1009205-189 = "*inhale* Okay. So this is how it is..."
1009205-193 = "...Okay."
1009205-194 = "I'll play along, if you want. It's just you and me here anyway."
1009205-195 = "You probably don't do this a lot either, right? I don't think you do."
1009205-196 = "Get ready. And remember, I'm not going to let this slide."
1009205-197 = "Sensei wants to see another \"first...\""
1009205-202 = "...Fine, here we go."
1009205-204 = "After that, I listened to every song Yoshimi could play on the spot."
1009205-208 = "For all her objections, she played hard and focused, until she got physically worn out."

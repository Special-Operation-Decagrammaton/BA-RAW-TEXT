[translation]
2300202-1 = "不會痛的注射？"
2300202-2 = "三一綜合學園．保健室"
2300202-3 = "老師！上次跟您提到讓打針不痛的方法，我之後有認真思考過了。"
2300202-4 = "我想打針就跟讀書一樣，腳踏實地努力果然才是最重要的！"
2300202-5 = "只要反覆經過數十遍、數百遍的練習，我將來是不是也能像熟練的前輩們一樣，打針打得很順利呢？"
2300202-6 = "[s1] 「確實是這樣沒錯。」\n[s2] 「花繪一定能馬上熟練。」"
2300202-7 = "嘿嘿，我想也是。真希望能趕快熟練打針。"
2300202-8 = "嘿嘿，我想也是。真希望能趕快熟練打針。"
2300202-9 = "所以啊……"
2300202-10 = "老師，請當我的練習對象吧！"
2300202-11 = "[s] 逃跑。"
2300202-12 = "啊，老師！ #n可不行逃跑唷！你是大人耶！"
2300202-13 = "[s] 「但是，我現在不需要打針啊……！」"
2300202-14 = "請別擔心！這個針筒裡裝的不是藥，只是維他命。"
2300202-15 = "打多了，也只會讓身體會越來越健康！"
2300202-16 = "所以說，老師！請把手臂借給我吧！"
2300202-17 = "[s] 「但是……！」"
2300202-18 = "拜託啦，老師。這也是為了奇普托斯的大家…… #n幫忙我這一次就好了，老師……！"
2300202-20 = "[s] 雖然不得已，但也只好把手伸出去。"
2300202-21 = "非常感謝您，老師！"
2300202-22 = "我會盡量努力，不讓老師感到疼痛的！"
2300202-24 = "那麼請你深吸一口氣……要進去囉──……"
2300202-25 = "…………"
2300202-26 = "啊，佩洛洛人偶在天上飛！？"
2300202-27 = "[s] 「咦！？」"
2300202-28 = "趁現在！"
2300202-30 = "啊，失敗了……"
2300202-31 = "[s] 「喂，剛剛那個假動作是什麼！？」"
2300202-32 = "我之前看的護理書裡面有講到，「打針時要趁病患不注意時快速插入針頭」，所以才想說轉移老師的注意力……"
2300202-33 = "但失敗了呢，欸嘿。"
2300202-34 = "[s] 「要是插到奇怪的地方會很危險吧！」"
2300202-35 = "沒問題的！這款新型營養劑不管注射在身體哪個部位，基本上都能被有效地吸收！"
2300202-36 = "好了，來挑戰第2次吧？"
2300202-37 = "[s] 「剛剛不是說只有一次嗎！？不是嗎！？」"
2300202-40 = "（之後又被注射了好幾次，手臂上也留下了好幾個洞）"

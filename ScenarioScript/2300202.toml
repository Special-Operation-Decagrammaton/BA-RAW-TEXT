[translation]
2300202-1 = "#title;주사를 아프지 않게 놓는 방법"
2300202-2 = "#place;트리니티 학원 양호실"
2300202-3 = "3;하나에;02;선생님. 전에 말씀드렸던 주사를 아프지 않게 놓는 방법에 대해 그 이후로 열심히 고민해 보았는데요.\n#3;a\n#3;em;[반응]"
2300202-4 = "3;하나에;99;역시 주사도 공부처럼 꾸준히 노력하는 게 중요한 것 같아요.\n#3;greeting"
2300202-5 = "3;하나에;01;수십 번, 수백 번 반복해서 연습하다 보면, 저도 언젠간 능숙한 간호사 선배들처럼 주사를 잘 놓을 수 있게 되겠죠?"
2300202-6 = "[s1] \"물론이야.\"\n[s2] \"하나에라면 금방 잘 해낼 수 있을 거야.\""
2300202-7 = "3;하나에;03;헤헤, 주사 놓는 일에 빨리 능숙해지고 싶네요.\n#3;em;[재잘]"
2300202-8 = "3;하나에;03;헤헤, 주사 놓는 일에 빨리 능숙해지고 싶네요.\n#3;em;[재잘]"
2300202-9 = "3;하나에;99;그런 의미에서……."
2300202-10 = "3;하나에;00;오늘은 선생님이 주사 놓는 연습을 할 상대가 되어주세요!\n#3;em;[!]\n#3;jump"
2300202-11 = "[s] 도망친다."
2300202-12 = "3;하나에;05;어허, 선생님! #n도망치지 마세요! 어른이시잖아요!\n#3;hophop\n#3;em;[반응]\n#3;m4"
2300202-13 = "[s] \"하지만 나는 주사를 맞을 필요가 없는데?\""
2300202-14 = "3;하나에;01;괜찮아요. 이 주사기에 들어 있는 건 약이 아니라 비타민 영양제거든요.\n#3;m3"
2300202-15 = "3;하나에;00;맞으면 맞을수록 몸이 튼튼해진답니다!\n#3;greeting\n#3;em;[반짝]"
2300202-16 = "3;하나에;01;선생님께서는 그저 팔만 빌려주시면 돼요."
2300202-17 = "[s] \"하지만…….\""
2300202-18 = "3;하나에;06;제발요, 선생님. 키보토스의 학생들을 위한 일이니까…… #n한 번만 도와주세요, 네?\n#3;em;…\n#3;stiff"
2300202-19 = "#wait;500"
2300202-20 = "[s] 마지못해 팔을 내민다."
2300202-21 = "3;하나에;03;감사합니다, 선생님!\n#3;em;[반짝]\n#3;hophop"
2300202-22 = "3;하나에;01;저, 선생님이 아프시지 않게 최대한 노력할게요!"
2300202-23 = "3;하나에;01\n#3;greeting\n#wait;1500"
2300202-24 = "3;하나에;02;자, 그럼 숨을 깊게 들이쉬시고…… 들어갑니다……."
2300202-25 = "3;하나에;01;………….\n#3;em;…"
2300202-26 = "3;하나에;02;어라, 하늘에 날아다니는 페로로 인형이?\n#3;em;[반응]\n#3;stiff"
2300202-27 = "[s] \"정말? 어디에?\""
2300202-28 = "3;하나에;05;빈틈!\n#3;em;[!]\n#fontsize;100\n#3;closeup"
2300202-29 = "#all;hide\n#bgshake\n#wait;2000"
2300202-30 = "3;하나에;05;쳇, 실패했네요…….\n#3;em;…\n#3;a"
2300202-31 = "[s] \"무, 무슨 짓이야!\""
2300202-32 = "3;하나에;02;어라? 전에 읽은 간호학 책에서 환자가 알아차리지 못하게 주삿바늘을 빨리 넣으라고 해서 시선을 돌린 것뿐이었는데…….\n#3;em;[?]"
2300202-33 = "3;하나에;00;실패네요, 에헷."
2300202-34 = "[s] \"갑자기 바늘을 들이대면 위험하잖아!\""
2300202-35 = "3;하나에;03;괜찮아요. 영양제는 몸의 어느 부위에 주사하더라도 제대로 흡수되니까요.\n#3;greeting"
2300202-36 = "3;하나에;00;자, 그럼 두 번째 주사를 맞아볼까요?\n#3;em;[음표]"
2300202-37 = "[s] \"몇 번째 주사까지 있는 거야?!\""
2300202-38 = "#wait;500"
2300202-39 = "#all;hide"
2300202-40 = "#na;이후, 하나에의 주삿바늘을 받아내느라 팔뚝이 바늘 자국으로 엉망이 되고 말았다."

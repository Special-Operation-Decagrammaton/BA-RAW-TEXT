[translation]
2300202-1 = "วิธีฉีดยาโดยไม่ให้เจ็บ"
2300202-2 = "ห้องพยาบาล สถาบันทรีนิตี้"
2300202-3 = "คุณครู ฉันคิดหนักมาตั้งแต่ตอนนั้นเพื่อหาวิธีฉีดยาแบบที่เจ็บน้อยที่สุดอย่างที่ฉันเคยพูดไว้ค่ะ"
2300202-4 = "ฉันคิดแล้วว่าสิ่งสำคัญคือการพยายามพัฒนาต่อไปค่ะ การฉีดยาก็เหมือนการเรียน"
2300202-5 = "ถ้าลองฝึกหลายสิบหลายร้อยครั้ง ฉันก็จะฉีดยาได้ดีเหมือนรุ่นพี่พยาบาลผู้เชี่ยวชาญได้ใน#nสักวันหนึ่งใช่มั้ยคะ?"
2300202-6 = "[s1] \"แน่นอนอยู่แล้ว\"\n[s2] \"ถ้าเป็นฮานาเอะ ไม่นานก็ทำได้ดีแล้วล่ะ\""
2300202-7 = "ฮิฮิ ฉันอยากฉีดยาให้เก่งเร็วๆ จังเลยค่ะ"
2300202-8 = "ฮิฮิ ฉันอยากฉีดยาให้เก่งเร็วๆ จังเลยค่ะ"
2300202-9 = "และด้วยเหตุนี้..."
2300202-10 = "วันนี้คุณครูช่วยเป็นคู่ฝึกซ้อมฉีดยาให้ฉันทีนะคะ!"
2300202-11 = "[s] วิ่งหนี"
2300202-12 = "อ๊ะ คุณครู!#nอย่าหนีสิคะ! คุณครูเป็นผู้ใหญ่แล้วนะคะ!"
2300202-13 = "[s] \"แต่ว่าครูไม่ต้องถูกฉีดยาก็ได้นี่?\""
2300202-14 = "ไม่เป็นไรหรอกค่ะ ในเข็มนี้ไม่ใช่ยา เป็นแค่วิตามินบำรุงค่ะ"
2300202-15 = "ฉีดไปจะทำให้ร่างกายแข็งแรงนะคะ!"
2300202-16 = "คุณครูแค่ให้ฉันยืมแขนก็พอค่ะ"
2300202-17 = "[s] \"แต่ว่า...\""
2300202-18 = "ขอร้องนะคะคุณครู ทำเพื่อช่วยนักเรียนของคิโวทอส... ช่วยฉันสักครั้งได้มั้ยคะ?"
2300202-20 = "[s] ยื่นแขนให้อย่างไม่เต็มใจ"
2300202-21 = "ขอบคุณค่ะคุณครู!"
2300202-22 = "ฉันจะพยายามเต็มที่เพื่อไม่ทำให้คุณครูเจ็บค่ะ!"
2300202-24 = "เอาล่ะค่ะ หายใจเข้าลึกๆ...แล้วจะฉีดล่ะนะคะ"
2300202-25 = "......."
2300202-26 = "เอ๊ะ นั่นตุ๊กตาเพโรโร่ลอยอยู่บนฟ้านี่?"
2300202-27 = "[s] \"จริงอ่ะ? ไหน ไหน?\""
2300202-28 = "เจอช่องโหว่ละ!"
2300202-30 = "ชิส์ พลาดซะแล้ว..."
2300202-31 = "[s] \"ทะ...ทำอะไรน่ะ!\""
2300202-32 = "เอ๊ะ? ฉันเคยอ่านเจอในหนังสือพยาบาล บอกว่าให้รีบแทงเข็มฉีดยาเข้าไปเพื่อไม่ให้ผู้ป่วยรู้ตัว#nฉันเลยหันเหความสนใจของคุณครู..."
2300202-33 = "แต่พลาดซะได้ แหะๆ"
2300202-34 = "[s] \"จู่ๆ เอาเข็มมาแทงแบบนี้ มันอันตรายนะ!\""
2300202-35 = "ไม่เป็นไรหรอกค่ะ วิตามินบำรุงนี่ไม่ว่าฉีดส่วนไหนของร่างกายก็ดูดซึมได้หมดค่ะ"
2300202-36 = "เอาล่ะ งั้นเรามาฉีดยาครั้งที่สองกันเลยมั้ยคะ?"
2300202-37 = "[s] \"เราต้องฉีดยากันกี่ครั้งน่ะ?!\""
2300202-40 = "หลังจากนั้นแขนของคุณครูก็มีรอยเข็มฉีดยาของฮานาเอะอยู่ไปทั่ว"

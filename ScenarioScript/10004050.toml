[translation]
10004050-1 = "ตอนที่ 5;คนที่ถูกจับได้"
10004050-2 = "(คุณครูหลบความวุ่นวายที่เกิดขึ้นในร้านนิทานดอกท้อไปที่สวนสาธารณะใกล้ๆ)"
10004050-6 = "ฮือ... ฉันแค่อยากจะพูดคุยกับคุณครูพร้อมกับจิบชาสบายๆ ก็เท่านั้นเอง... น่าเจ็บใจจริงๆ ที่มีแต่คนมา#nคอยขวางอยู่ตลอด"
10004050-7 = "แต่ก็ไม่เป็นไรหรอกค่ะ"
10004050-8 = "เพราะซานไห่จิงน่ะกว้างใหญ่มากค่ะ! ยังมีสถานที่ให้ไปได้อีกเยอะเลยล่ะค่ะ"
10004050-9 = "แล้วตอนนี้...พวกเราจะทำอะไรต่อดีคะ?"
10004050-10 = "[s] \"รอเดี๋ยวก่อนสิ ชุนหลิง\""
10004050-11 = "คะ? มีอะไรเหรอคะ?"
10004050-12 = "หรือคุณครูมีสถานที่พิเศษที่อยากไปงั้นเหรอคะ?"
10004050-13 = "สถานที่ที่จะมีแค่เราสองคนและไม่มีใครมารบกวนรึเปล่าคะ...♥ "
10004050-14 = "[s] \"ชุนหลิงเป็นเด็กนักเรียนของสวนต้นบ๊วยจริงเหรอ?\""
10004050-15 = "คะ...คะ~?"
10004050-16 = "(ทะ...ทำไงดี ถ้าถูกจับได้จะทำยังไงดี?)"
10004050-17 = "ทะ...ทำไมคุณครูถึงถามแบบนั้นล่ะคะ?"
10004050-18 = "[s] \"ดูรู้เรื่องของซานไห่จิงเยอะมากไม่สมเป็นเด็กนักเรียนของสวนต้นบ๊วยเลย\""
10004050-19 = "ฉะ...ฉันบอกแล้วไงล่ะคะว่าพออยู่กับพี่ชุนบ่อยๆ ก็เลยรู้เรื่องต่างๆ เยอะเลยค่ะ!"
10004050-20 = "[s] \"อีกอย่างดูเหมือนเธอไม่สนใจที่จะตามหาชุนเลยด้วย...\""
10004050-21 = "แค่เพราะเจอเรื่องสนุกๆ หลายอย่างๆ ฉันเลยเถลไถลไปก็เท่านั้นเองค่ะ"
10004050-22 = "ปะ...ปกติเด็กๆ ก็เป็นแบบนั้นไม่ใช่เหรอคะ? แหะๆ"
10004050-23 = "[s] \"เด็กที่ไหนเขาพูดแบบนี้กันล่ะ...\""
10004050-24 = "เอ่อ... คะ...คือว่า..."
10004050-29 = "ชุน~ รอนานเลยใช่มั้ย~!"
10004050-30 = "คะ...คุณซายะ?!"
10004050-31 = "ฉันวิเคราะห์ส่วนผสมของยาคืนวัยเยาว์แล้วปรุงยาแก้ผลข้างเคียงขึ้นมาได้แล้วล่ะ!"
10004050-36 = "ปรุงยาแก้ผลข้างเคียงได้ในเวลาสั้นๆ แค่นี้... เห็นมั้ยล่ะว่าท่านซายะน่ะเป็นอัจฉริยะ!"
10004050-37 = "[s1] \"ยาคืนวัยเยาว์...?\"\n[s2] \"ชุน...?\""
10004050-40 = "(ทำไมคุณซายะต้องมาตอนนี้ด้วย โชคไม่เข้าข้างฉันเลย...)"
10004050-41 = "พี่ชุนเหรอคะ...? พี่ชุนไม่ได้อยู่ที่นี่นะคะ"
10004050-42 = "หืม? พูดอะไรของเธอน่ะ เธอคือชุนไม่ใช่รึไง เธอดื่มยาคืนวัยเยาว์เข้าไป#nเลยกลายเป็นยัยเปี๊ยกไปแบบนี้น่ะ"
10004050-43 = "หรือว่าตัวยามีผลข้างเคียงที่ทำให้ความจำเสื่อมด้วยงั้นเหรอ?!"
10004050-44 = "จะ...จะ..."
10004050-46 = "จำผิดคนแล้วค่ะ!"
10004050-51 = "วะ...ว้าก! ผลักคนอื่นแล้ววิ่งไปแบบนี้มันอันตรายนะ"
10004050-52 = "ฉันแค่เอายาแก้ผลข้างเคียงมาให้เอง ทำไมต้องตกใจขนาดนั้นด้วยล่ะเนี่ย?"
10004050-53 = "[s] \"ชุนหลิงคือชุนเหรอ... หมายความว่าไงน่ะ?\""
10004050-54 = "เอ่อ... คุณครูไม่รู้เรื่องนี้สินะ"
10004050-55 = "อืม... จะเริ่มเล่าจากตรงไหนดีล่ะ..."
10004050-58 = "(ซายะเล่าเรื่องเกี่ยวกับยาคืนวัยเยาว์ที่ชุนดื่มให้คุณครูฟัง)"
10004050-60 = "[ns] \"ชุนดื่มยาคืนวัยเยาว์เข้าไปแล้วกลายเป็นเด็กงั้นเหรอ?!\""
10004050-61 = "ใช่แล้ว ถึงจะเป็นผลข้างเคียงของยาก็จริง แต่การที่ปรุงยาที่ย้อนวัยของร่างกายขึ้นมาได้นี่..."
10004050-62 = "บางครั้งฉันก็อดทึ่งในความสามารถของตัวเองไม่ได้จริงๆ เลยล่ะนะ"
10004050-63 = "ว่าแต่แปลกจังเลยนะ ไม่นึกเลยว่าผู้ฝึกสอนชุนที่มักจะขี้เกรงใจคนอื่นอยู่เสมอ#nกลับกลายเป็นเด็กที่ลนลานแบบนั้นไปได้"
10004050-64 = "บางที... อาจจะเป็นผลข้างเคียงอื่นของยาคืนวัยเยาว์ก็ได้นะ!"
10004050-65 = "[s] \"มีผลข้างเคียงอื่นด้วยเหรอ?\""
10004050-66 = "อื้อ บุคลิกของคนเราน่ะ เป็นผลมาจากฮอร์โมนที่หลั่งจากอวัยวะต่างๆ เช่น สมอง..."
10004050-67 = "พอร่างกายหดเล็กลง บุคลิกของเธอก็อาจจะได้รับผลกระทบจากเรื่องนั้นด้วยก็ได้"
10004050-68 = "กรณีเลวร้ายที่สุด ถึงร่างกายจะกลับมาเป็นเหมือนเดิม แต่บุคลิกที่แสดงออกตอนที่ร่างกายหดเล็กลง#nก็อาจจะไม่หายไปก็ได้..."
10004050-69 = "[s] \"แบบนั้นมันเรื่องใหญ่เลยนะ!\""
10004050-70 = "ก็ใช่น่ะสิ เพราะงั้นต้องรีบให้เธอกินยาแก้ผลข้างเคียงนี่ซะ"
10004050-71 = "เห็นได้ชัดว่าการวิจัยผลของยาคืนวัยเยาว์เป็นการวิจัยที่น่าสนใจมากทีเดียว แต่ว่าฉันน่ะไม่อยาก#nเสียเวลาที่จะได้ออกไปเล่นข้างนอกหรอกนะ"
10004050-72 = "เอาล่ะ... เรามาเริ่มการทดลองเพิ่มเติมกันเถอะ!"

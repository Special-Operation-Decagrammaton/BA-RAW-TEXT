[translation]
10004050-1 = "Episode 5;Identity Exposed"
10004050-2 = "We escaped to a nearby park to avoid the commotion at Peach Blossom Spring."
10004050-6 = "Ugh, I just wanted to chat with you over tea. That was a mess."
10004050-7 = "But...that's okay."
10004050-8 = "Shanhaijing is big! There are still a lot of places to visit."
10004050-9 = "What should we do now?"
10004050-10 = "[s] \"Hold up, Shunling.\""
10004050-11 = "Huh? Is something wrong?"
10004050-12 = "Oh, is there someplace special you'd like to go, Sensei?"
10004050-13 = "Maybe someplace...quieter? More private?"
10004050-14 = "[s] \"Are you really a Plum Blossom Garden student?\""
10004050-15 = "H-Huh?!"
10004050-16 = "(D-Did Sensei figure out who I really am?)"
10004050-17 = "Wh-Why would you ask me that?"
10004050-18 = "[s] \"Plum Blossom Garden students usually don't know so much.\""
10004050-19 = "L-Like I said, I spend a lot of time with Shun, so I just picked up bits and pieces!"
10004050-20 = "[s] \"You also don't seem interested in finding Shun at all.\""
10004050-21 = "Th-That's just because I got distracted by all the fun stuff."
10004050-22 = "Y-You know how little kids are, right? Heehee."
10004050-23 = "[s] \"A little kid wouldn't say that about herself.\""
10004050-24 = "Ugh. What I mean is..."
10004050-29 = "Shun! There you are!"
10004050-30 = "S-Saya?!"
10004050-31 = "I've analyzed the ingredients of the rejuvenation elixir and created an antidote that will eliminate the side effects!"
10004050-36 = "I can't believe I made an antidote so quickly... I'm such a genius!"
10004050-37 = "[s1] \"Rejuvenation elixir?\"\n[s2] \"Shun?\""
10004050-40 = "(Why did she have to show up now?!)"
10004050-41 = "Shun? Who are you talking to?"
10004050-42 = "Huh? You're Shun. You look like that because of the elixir I made. Remember?"
10004050-43 = "Oh, no! Is memory loss another side effect of the elixir?!"
10004050-44 = "Y-You..."
10004050-46 = "You've got the wrong person!"
10004050-51 = "Wh-Whoa! She just pushed me and ran off!"
10004050-52 = "Do I need an antidote for memory loss now too? Geez."
10004050-53 = "[s] \"Why are you calling her Shun? What's going on?\""
10004050-54 = "Oh, I guess she didn't explain what happened."
10004050-55 = "Whew. Where to begin?"
10004050-58 = "Saya explained what happened after Shun drank her elixir."
10004050-60 = "[ns] \"Shun became younger?!\""
10004050-61 = "Yeah. It was just a side effect, but I can't believe I developed an elixir that reverses aging!"
10004050-62 = "I'm frightened by my own talent sometimes."
10004050-63 = "Anyway, it's strange that Instructor Shun became such a bratty little kid. She's usually so considerate of others."
10004050-64 = "Maybe it's another side effect!"
10004050-65 = "[s] \"Another one?\""
10004050-66 = "I mean, it makes sense. A person's personality is also influenced by physical traits, such as brain patterns and hormones."
10004050-67 = "Her personality may have been reshaped now that her body has become younger as well."
10004050-68 = "Worst case scenario, even if her original body returns, her personality may not come back..."
10004050-69 = "[s] \"That would be terrible!\""
10004050-70 = "Well, we have to make sure she takes the antidote before it's too late."
10004050-71 = "The elixir is an interesting research subject, but I don't want to waste more time on it than I have to."
10004050-72 = "All right. Let's begin a new experiment!"

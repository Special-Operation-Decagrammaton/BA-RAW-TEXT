[translation]
10004050-1 = "第5話;被揭露的真實身分"
10004050-2 = "（為了不讓小旬受到牽連，#n　在桐乃差不多能控制局面後離開「桃源鄉」，來到了附近的公園）"
10004050-6 = "唔，本來想和老師悠哉地喝茶聊天的……結果一直有人來搗亂……"
10004050-7 = "不過沒關係。"
10004050-8 = "山海經很大！能去的地方還很多！"
10004050-9 = "接下來要去哪玩呢？"
10004050-10 = "[s] 「……那個，小旬。」"
10004050-11 = "是，怎麼了嗎？"
10004050-12 = "啊，老師有想去的地方嗎？"
10004050-13 = "比如不會被其他人打擾、只有我們兩個人的地方……♡"
10004050-14 = "[s] 「如果搞錯的話，我先道歉。小旬真的是梅花園的孩子嗎……？」"
10004050-15 = "咦，啊，那個……"
10004050-16 = "（難，難道，我的真實身分被老師發現了……！？）"
10004050-17 = "為，為什麼會這麼想呢……？"
10004050-18 = "[s] 「畢竟……以梅花園的學生來說，你對山海經實在太過熟悉了。」"
10004050-19 = "那，那是因為，我從旬姐姐那裡聽說了很多……！"
10004050-20 = "[s] 「再加上，感覺並不是真的想找旬……」"
10004050-21 = "那是因為，山海經有很多有趣的事物，不知不覺就……"
10004050-22 = "小，小孩子不就是這樣的嗎？耶嘿嘿……"
10004050-23 = "[s] 「小孩子不會這樣形容自己吧……」"
10004050-24 = "唔……那是因為……因為……"
10004050-29 = "旬～讓你久等了～！"
10004050-30 = "沙，沙耶同學！？"
10004050-31 = "我把解藥帶來了！這樣就能消除「回春秘藥」的效果了！"
10004050-36 = "在這麼短的時間內就製作出解藥……我果然是天才啊！"
10004050-37 = "[s1] 「……回春秘藥？」\n[s2] 「……旬？」"
10004050-40 = "（居然偏偏在這種時候出現……運氣真差）"
10004050-41 = "那，那個，旬姐姐不在這裡唷……？"
10004050-42 = "嗯？你不就是旬嗎？#n是不久前才因為我製作的秘藥才變成這副模樣的不是嗎？"
10004050-43 = "……難不成因為藥的副作用，連記憶都失去了嗎！？"
10004050-44 = "你……你……"
10004050-46 = "認錯人了────！"
10004050-51 = "哇，哇啊！？突然就朝別人衝過來很危險耶！？"
10004050-52 = "我都特地帶解藥過來了，旬這是怎麼了……？"
10004050-53 = "[s] 「那個孩子是旬……？」"
10004050-54 = "嗯，老師不知道嗎？"
10004050-55 = "唔嗯，該從哪裡開始說明呢……"
10004050-58 = "（從沙耶口中聽說了旬喝下秘藥的經過）"
10004050-60 = "[ns] 「旬喝下了回春秘藥，變回小時候的樣子了……？」"
10004050-61 = "沒錯。雖然只是副作用，沒想到居然真的研發出了能返老還童的藥……"
10004050-62 = "有時候連我自己都害怕自己的才能啊。"
10004050-63 = "話說回來，從剛才的樣子來看，旬難道連語言和內心都變年輕了嗎……？#n一開始還不是這樣的……"
10004050-64 = "……該不會，這也是副作用！？"
10004050-65 = "[s] 「那種事是有可能的嗎……？」"
10004050-66 = "嗯，人的性格有時也會受到大腦和荷爾蒙等等身體器官的影響。"
10004050-67 = "因此隨著身體年齡的減少，連帶影響人格和內心的可能性也是有的。"
10004050-68 = "在最壞的情況下……即使身體復原，內心也可能無法恢復……"
10004050-69 = "[s] 「那可就不得了了！」"
10004050-70 = "總，總之得先盡快讓他喝下解藥才行！"
10004050-71 = "雖然是項有趣的研究，但現在可不是悠哉觀察的時候。"
10004050-72 = "……來吧，是時候做實驗後的清理了！"

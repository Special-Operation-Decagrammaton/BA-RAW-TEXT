[translation]
1001508-1 = "愛麗絲的魔法"
1001508-2 = "千年．遊戲開發部"
1001508-3 = "啊，老師晚安。今天真是個好夜晚呢。"
1001508-4 = "……老師願意過來，真的非常感謝。愛麗絲今天整天都一個人玩著遊戲。"
1001508-5 = "[s] 「來晚了真是抱歉，你在玩什麼遊戲呢？」"
1001508-6 = "是懷舊的RPG。"
1001508-7 = "果然還是RPG最有趣了。雖然其他的遊戲也很好玩，但RPG簡直就像是愛麗絲心中的故鄉一樣呢。"
1001508-8 = "[s] 「劍與魔法，對吧。」"
1001508-9 = "是的，RPG可不能少了這些呢。"
1001508-10 = "[s] 「有著現實中所沒有的浪漫呢。」"
1001508-11 = "……老師是，那麼想的嗎？"
1001508-13 = "愛麗絲不這麼認為。"
1001508-18 = "― 愛麗絲不覺得奇普托斯……不存在魔法。[wa:2980] "
1001508-21 = "― 魔法是存在的。因為老師現在，就讓愛麗絲感覺到幸福。[wa:4830] "
1001508-24 = "― 遊戲之所以有趣是因為裡面充滿了世界中的美好事物。[wa:4350] "
1001508-26 = "― 這是從老師身上學到的。[wa:1040] "
1001508-29 = "― 不管是遊戲、貓、還是朋友……就連現在這個瞬間也是。[wa:6220] "
1001508-31 = "― 這個世界上有著許多美好的事物。[wa:1310] "
1001508-34 = "― 愛麗絲還想要知道更多。和老師一起……[wa:3720] "
1001508-37 = "― 學習更多這個世界的事情！[wa:1450] "
1001508-40 = "（和愛麗絲一起聊著RPG的話題直到深夜）"

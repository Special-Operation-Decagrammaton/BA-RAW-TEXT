1001508-6 = "3;아리스;00;고전RPG입니다."
1001508-7 = "3;아리스;07;역시 RPG가 제일 재미있습니다. 다른 게임들도 재미있지만, RPG는 아리스의 마음의 고향 같은 느낌입니다.\n#3;em;[재잘]"
1001508-8 = "[s] \"검과 마법……인가.\""
1001508-9 = "3;아리스;00;그렇습니다. RPG안에는 그런 것들이 있습니다."

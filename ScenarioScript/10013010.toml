[translation]
10013010-1 = "第1話;要做的事只有一個！"
10013010-6 = "大家，STOP！請快住手！"
10013010-7 = "咦……綾音醬？"
10013010-8 = "不是，你怎麼會在這裡！？"
10013010-9 = "是被壞人抓住了嗎。"
10013010-10 = "哎呀，那還真是糟糕呢～"
10013010-12 = "不，不對！不是那樣……"
10013010-14 = "那個……難道說，是老師的熟人嗎……？"
10013010-15 = "[s] 「算，算是……？」"
10013010-16 = "就連戴著面具、看起來很奇怪的人們都認識……不愧是主公！"
10013010-17 = "什麼！？你說誰奇怪啊！！"
10013010-18 = "[s] 「總之，先整理一下情況吧。」"
10013010-20 = "（於是互相做了自我介紹）"
10013010-22 = "那個……也就是說，那些人是阿拜多斯高中的學生囉？"
10013010-23 = "那個面罩是祭典用品還是什麼嗎？#n還是說，是阿拜多斯特有的文化之類的！？"
10013010-24 = "在格黑娜好像有戴著面具參加的祭典，而阿拜多斯是會蒙面啊！#n還真是獨特呢……對吧，社長？"
10013010-26 = "啊哈哈……其實不是這樣的……"
10013010-28 = "都跟你說好幾次了，我是部長！不是社長！"
10013010-29 = "所以說，為什麼阿拜多斯要攻擊我們呢？我們到底做錯什麼了啊！"
10013010-30 = "那是我們的台詞吧！"
10013010-31 = "節慶營運管理部就是引發這次「渡假勝地狩獵」的主謀對吧？#n既然如此，為什麼老師會和這些傢伙一起──"
10013010-32 = "我就說了！那是誤會──"
10013010-40 = "那個……總之先冷靜一點……"
10013010-41 = "啊哇，啊哇哇哇……伊，伊樹菜……該怎麼辦才好……"
10013010-48 = "啊……是仁耶部長打來的電話，老師。"
10013010-52 = "喵哈哈～哈囉哈囉～大家都還好嗎～？"
10013010-53 = "我不在的期間好像發生狀況了呢～真令人擔心～#n事情究竟有不有趣呢～"
10013010-54 = "[s] 「你擔心的只有有不有趣而已吧……」"
10013010-55 = "從這個氣氛來看，已經吵過架了呢～？"
10013010-56 = "……在重要的時候連人都不在還好意思這樣說啊。#n所以呢？陰陽部的老大有什麼事嗎？"
10013010-57 = "唔呵呵，在說正事之前就用這種帶刺的話炒熱氣氛，我很喜歡喔。"
10013010-58 = "不過閒話就說到這裡……"
10013010-59 = "──其實在老師前往那裡的時候，我到處調查了一下。"
10013010-60 = "河和靜子同學，我大概了解你現在被捲入的騷動了唷～♪"
10013010-67 = "我被捲入的……騷動……？"
10013010-68 = "最近，百夜堂正在進行一項大事業對吧？"
10013010-69 = "……！你怎麼會知道！？"
10013010-70 = "[s] 「大事業？靜子你？」"
10013010-71 = "前陣子，節慶營運管理部從百鬼夜行的各個社團募得資金，購買了某個東西。"
10013010-72 = "[s] 「靜子做了投資……」"
10013010-73 = "但是卻出現了一個問題……那就是靜子同學所購買的，其實是「不存在的商品」。"
10013010-75 = "你說不存在……是怎麼回事？"
10013010-76 = "根據我獲得的資料，最近節慶營運管理部購買了「失樂園渡假勝地的使用權」……"
10013010-77 = "但是，這個「失樂園渡假勝地」是早在20年前就破產了的公司所使用的名字。"
10013010-78 = "咦……？"
10013010-79 = "再加上這個來歷不明的使用權……#n不只是節慶營運管理部，就連其他人手上都有的情況……"
10013010-80 = "我想，阿拜多斯的大家也是這樣對吧？"
10013010-81 = "對，對呀！我們也是因為抽到了獎品才會來這裡……"
10013010-82 = "真的不只我們，連阿拜多斯都有使用權……？#n但是，這到底是為什麼──"
10013010-83 = "……請看這裡。我們的合約裡也有節慶營運管理部的名字……"
10013010-89 = "「失樂園渡假勝地投資及營運負責人：百鬼夜行聯合學園．節慶運營管理部」……？"
10013010-90 = "等一下！為什麼其他人手上的文件會有我們的名字！#n這不管怎麼看都是假造的──"
10013010-94 = "什麼！？為什麼會蓋有我們管理部的印章！？#n咦，咦咦！？"
10013010-95 = "也就是說，你被騙了唷，靜子同學。"
10013010-96 = "就是因為節慶營運管理部購買的使用權利被四處散播，#n還有這能夠被鑽漏洞的內容──"
10013010-97 = "[s] 「引發了『渡假勝地狩獵』是嗎……？」"
10013010-98 = "冒昧地問一下，那個使用權利……是在哪裡買的呢？"
10013010-99 = "那是……"
10013010-101 = "接下來只要在這裡蓋章……好，這樣就可以了對吧？"
10013010-102 = "哈哈哈，沒錯！#n這樣一來，節慶營運管理部的基金就成功投資我們「章魚銀行」推出的特別商品了！"
10013010-103 = "客人您今年夏天想在複合渡假設施「失樂園」經營海之家對吧！#n我認為是個很不錯的計畫！"
10013010-104 = "近期我們也會招募渡假設施的營運負責人，再麻煩各位多關照了。"
10013010-106 = "哪裡有問題嗎？我可是從頭到尾看過整份合約了唷！？"
10013010-107 = "那個合約本身就是亂寫的，就是這麼回事吧。"
10013010-108 = "根據我們調查的情報，就連章魚銀行有沒有販賣那個使用權的權利都很可疑……"
10013010-109 = "就，就算是這樣，如果是不存在的商品，合約本身也違法了吧？#n既然如此，只要回去取消合約……！"
10013010-111 = "等一下──剛剛說的是章魚銀行？"
10013010-112 = "咦？唔，嗯……"
10013010-117 = "這樣啊……那事情就沒有這麼簡單了。"
10013010-118 = "[s] 「星野，這是什麼意思？」"
10013010-120 = "……"
10013010-121 = "其實，那個章魚銀行……"
10013010-122 = "……是「凱薩信貸」的其中一個人頭公司。"
10013010-123 = "[s] 「凱薩信貸！？」"
10013010-124 = "是的。剛才說的那種手法我們也很清楚……毫無疑問是凱薩信貸的手段。"
10013010-125 = "嗯……恐怕在這起事件背後的也是凱薩公司。"
10013010-126 = "那些傢伙還在搞這一套啊！#n我們也被凱薩騙了好幾次了！"
10013010-128 = "沒想到連這種地方都會碰到……"
10013010-129 = "唔嗯……那些傢伙居然連這種地方也不放過……"
10013010-130 = "或許凱薩公司一開始就盯上了節慶營運管理部了吧。"
10013010-131 = "節慶營運管理部所擁有的百鬼夜行聯合學園的學園慶典舉辦權，#n對他們來說可是美味的獵物呢──"
10013010-132 = "[s] 「就像阿拜多斯那時候一樣，這次是對百鬼夜行……」"
10013010-133 = "哎呀～真是中計了呢，靜子同學♪"
10013010-134 = "嗚……！"
10013010-135 = "不過，還真是讓我有點意外呢。該說是不像靜子同學嗎……"
10013010-136 = "為什麼會相信那種亂七八糟的投資呢？"
10013010-137 = "難道──是需要錢嗎？"
10013010-138 = "那是……"
10013010-140 = "不是的！社長是──"
10013010-141 = "……不，沒關係的，海花。仁耶說得沒錯。"
10013010-142 = "[s] 「靜子？」"
10013010-143 = "……雖然不想承認，但事到如今也沒辦法了。"
10013010-144 = "因為需要錢而進行了投資……結果變成了這樣。"
10013010-145 = "真的就是這樣而已。我沒有要找理由的意思。"
10013010-146 = "社長……"
10013010-147 = "因為我的錯才會變成這樣是事實。#n所以──大家，對不起。"
10013010-148 = "啊，不，那個……好吧，既然你都道歉了……"
10013010-149 = "怪罪已經發生的事也沒有幫助哦，茜香。"
10013010-150 = "走在最前面的前輩有資格說！？"
10013010-151 = "[s] 「問題是接下來該怎麼辦，對吧。」"
10013010-153 = "嗯……總之請先回到學園一趟吧，靜子同學。"
10013010-154 = "……咦？"
10013010-155 = "外部勢力正在覬覦節慶營運管理部，這毫無疑問是對百鬼夜行聯合學園的攻擊。"
10013010-156 = "所以接下來將由我們陰陽部接手。#n既然對方要使用骯髒手段的話，我們也應該採取相應的對策。"
10013010-157 = "就是這樣，請立刻回來──"
10013010-159 = "不，我沒辦法這麼做。"
10013010-163 = "……什麼？"
10013010-164 = "……這是什麼意思？"
10013010-165 = "如果離開這裡，或許確實能遠離「渡假勝地狩獵」所引發的問題也說不定。"
10013010-166 = "沒錯，所以才應該先回來，整理情況後再思考接下來的──"
10013010-167 = "但是那樣什麼也無法解決。"
10013010-168 = "……？"
10013010-169 = "當然，仁耶說的我也理解。"
10013010-170 = "可是就算回到學園，只要契約書上還有百夜堂的名字，#n就會讓百鬼夜行的名字……品牌價值繼續下跌。"
10013010-171 = "[s] 「那還真是嚴重呢……」"
10013010-172 = "老師說的沒錯！#n學園自不用說，這件事還會直接影響到百鬼夜行觀光業的誠信！"
10013010-173 = "所以不能就這樣離開。#n由我直接解決問題吧！"
10013010-174 = "……不想損害學園的品牌價值所以要爭一口氣，是這個意思嗎？"
10013010-175 = "話，話也不是這麼說的吧！"
10013010-176 = "哎呀哎呀，真是無法理解呢。#n為什麼要做這種吃力不討好的事……"
10013010-178 = "因為我想這麼做。"
10013010-182 = "而且，還有除了品牌價值之外的理由……"
10013010-183 = "總，總之！就這麼決定了！"
10013010-184 = "當然，這次的事件終究是因為我的疏失而引起──"
10013010-185 = "我會一個人想辦法搞定。#n大家完全不用擔心……"
10013010-186 = "[s] 「我們也會幫忙喔。」"
10013010-187 = "咦……？#n呃，也沒必要特地麻煩老師……"
10013010-188 = "你在說什麼啊，靜子醬。#n我們可是為了幫靜子醬的忙才來的唷。"
10013010-189 = "就是說呀～因為部長是小氣鬼，所以我們會代替他幫忙～"
10013010-191 = "連知世也……"
10013010-193 = "大家……！"
10013010-194 = "當然，伊樹菜也會幫忙的！#n如果是和主公一起，就有一百人的力量呢！"
10013010-196 = "……姑且先問一下，你們有什麼計畫嗎？"
10013010-197 = "根據阿拜多斯學生提供的情報，就算去質問章魚銀行也無濟於事吧。"
10013010-198 = "但是，就算現在躲在棉被裡哭，「渡假勝地狩獵」也只會繼續下去……"
10013010-199 = "那麼，只要改變想法就好了！"
10013010-200 = "改變想法，是嗎……？"
10013010-201 = "要做的事非常簡單明瞭。#n我們只要贏得「渡假勝地狩獵」就行了！"
10013010-202 = "哦～真是大膽呢～"
10013010-203 = "[s] 「做這種事沒問題嗎！？」"
10013010-204 = "當然並不只是要爭奪而已！"
10013010-205 = "「渡假勝地使用權」的所有權人是我們。#n反過來說，其他的契約者只不過是簽了擁有我們一部分的權利的合約而已。"
10013010-206 = "也許……當時銀行職員所謂「渡假設施的營運負責人」指的就是這些人吧。"
10013010-208 = "嗯嗯……確實，從字面上來看似乎是這樣沒錯～"
10013010-209 = "這個營運負責人，原本是負責管理那個廢墟的嗎？"
10013010-211 = "或許是吧……#n現在在這個群島的問題兒童們，都是因為簽下了與章魚銀行的契約而來……"
10013010-212 = "但他們實際上就是群非法侵佔者！"
10013010-213 = "身為正式營運負責人的我們百夜堂，自然擁有將他們驅逐出去的權利！"
10013010-214 = "就利用這點進行突破吧！"
10013010-215 = "我們要透過「渡假勝地狩獵」，將契約從問題兒童的手中回收！#n也就是進行所謂的敵[ruby=合併　收購]意M&A！[/ruby]"
10013010-216 = "不能就這麼退縮。#n這樣會影響我的[ruby=市值]身價[/ruby]的！"
10013010-217 = "現在正是讓他們見識百夜堂實力的時候！"
10013010-218 = "我們要吸收整個失樂園渡假勝地──"
10013010-219 = "把它改名為百夜堂樂園渡假勝地！"
10013010-220 = "[s] 「嗯，一起加油吧！」"
10013010-224 = "……是！"
10013010-226 = "唔嘿～……那我們也稍微幫點忙吧～"
10013010-227 = "嗯！大家一起幫忙吧～！"
10013010-228 = "嘛……對方是凱薩的話也沒辦法了。#n要讓他們付出代價！"
10013010-230 = "大家……"
10013010-231 = "謝謝你們！那麼，我們就先來交換情報吧！"

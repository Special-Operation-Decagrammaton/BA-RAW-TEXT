[translation]
10013010-1 = "Episode 1;One Thing to Do!"
10013010-6 = "Everyone, stop! Stop!"
10013010-7 = "Huh? Ayane?"
10013010-8 = "Ayane?! Shouldn't you be dropping off Sensei right now?"
10013010-9 = "She's a captive of those villains."
10013010-10 = "Oh, dear. We can't have that."
10013010-12 = "P-Please, pause for just a second!"
10013010-14 = "Sensei! Do you know these criminals?!"
10013010-15 = "[s] \"M-Maybe?\""
10013010-16 = "A-Amazing! My lord even has connections with bad people."
10013010-17 = "Huh?! Who're you calling a bad person? We're the good guys here!"
10013010-18 = "[s] \"Let's, um, all take a moment, yeah?\""
10013010-20 = "I calmed down the situation and introduced everybody."
10013010-22 = "So...the masked people are Abydos High School students?"
10013010-23 = "Are the masks props for a festival?! Maybe they represent the unique culture of Abydos?!"
10013010-24 = "I heard of a wonderful festival in Gehenna where the students don decorative masks, but these are even better! Don't you think so, Boss?"
10013010-26 = "P-Please stop making up strange things about our school..."
10013010-28 = "How many times do I have to tell you! Call me \"president\"!"
10013010-29 = "But what did we do to Abydos? Why did you attack us?"
10013010-30 = "Isn't that our line?!"
10013010-31 = "Sensei, why are you hanging out with these guys? The Festival Operations Department are the evil criminals behind the Resort Hunt!"
10013010-32 = "How many times do I have to tell you it's not us?!"
10013010-40 = "Perhaps we can talk this out over some tea."
10013010-41 = "I-I can make tea!"
10013010-48 = "Sensei. President Niya is calling."
10013010-52 = "Nyahaha! Miss me? I hope you're not partying too hard without me."
10013010-53 = "I was worried something bad could have happened to your little crew. Can you imagine the paperwork I'd have to deal with?"
10013010-54 = "[s] \"You sound more entertained than worried...\""
10013010-55 = "Well, entertain me, then. Did anything interesting happen? Any commotions?"
10013010-56 = "It's none of your business! You're the one who said, and I quote, \"I am simply too important, and too busy, to help.\""
10013010-57 = "Heeheehee! That's definitely Shizuko's style. Shoot first, ask questions later."
10013010-58 = "Okay, I'll stop teasing."
10013010-59 = "I haven't just been sitting on my laurels. I did a little investigation."
10013010-60 = "Kawawa Shizuko. I know what you've stepped your cute little toes in! ♪"
10013010-67 = "What do you mean? What have I stepped in?"
10013010-68 = "I've confirmed that Momoyodou had some big business transactions recently. Sound about right?"
10013010-69 = "What?! Get your devious nose out of my business!"
10013010-70 = "[s] \"What exactly was this transaction?\""
10013010-71 = "Thanks for asking, Sensei! The Festival Operations Department invested in a certain, special product, with the help of some contributions from various Hyakkiyako clubs."
10013010-72 = "[s] \"Shizuko...invested...\""
10013010-73 = "Unfortunately, for you at least, the whole thing was a scam."
10013010-75 = "A s-s-scam?"
10013010-76 = "The document reads that the Festival Operations Department officially purchased the rights to the Lost Paradise Resort, but..."
10013010-77 = "The Lost Paradise Resort went out of business twenty years ago."
10013010-78 = "...?!"
10013010-79 = "But don't worry, you're not the only fool who got tricked."
10013010-80 = "Didn't Abydos fall victim as well?"
10013010-81 = "R-Right! We won what I thought was an all-expenses-paid vacation and came here..."
10013010-82 = "Sensei...Sensei was right? We're not the only ones with the rights?"
10013010-83 = "Look, the Festival Operations Department is named as the proprietor here."
10013010-89 = "\"Lost Paradise resorts proprietor: Allied Hyakkiyako Academy Festival Operations Department\"...?"
10013010-90 = "This must be a fake. Why would our name be listed on someone else's document?"
10013010-94 = "B-But...! That's our seal?! How is our seal on there?"
10013010-95 = "Shizuko, you've been taken for a very long ride."
10013010-96 = "The contract you bought was also distributed to other factions, and because of the contract's loophole..."
10013010-97 = "[s] \"...the Resort Hunt started.\""
10013010-98 = "Out of morbid curiosity, who did you buy the rights from?"
10013010-99 = "Sensei..."
10013010-101 = "Here's the seal. Are we good now?"
10013010-102 = "Hahaha! You've officially invested the Festival Operations Department's funds in the Octopus Bank's special business product."
10013010-103 = "This summer, you'll get to operate the Beach Shack in the Lost Paradise, a multi-complex resort facility! You're a smart one! This is the safest investment you could have chosen."
10013010-104 = "We're looking to recruit facility operation managers for the resort. We could use your expertise with that."
10013010-106 = "B-But I swear I read the contract word by word!"
10013010-107 = "The lie resides in the contract itself."
10013010-108 = "According to my...sources, the Octopus Bank likely didn't even have the rights to the property."
10013010-109 = "In that case, it was a false sale and the contract is null and void! I'll just go and get my investment back."
10013010-111 = "Hate to barge in, but did you say the Octopus Bank?"
10013010-112 = "Y-Yes. Why?"
10013010-117 = "Sorry to be the bearer of bad news, but it's not going to be that easy."
10013010-118 = "[s] \"Do you know that bank, Hoshino?\""
10013010-120 = "..."
10013010-121 = "The Octopus Bank is..."
10013010-122 = "...a shell corporation of Kaiser Loans."
10013010-123 = "[s] \"Kaiser Loans...?!\""
10013010-124 = "We're well-acquainted with their tricks... This has Kaiser Loans written all over it."
10013010-125 = "I agree with Ayane. They must be pulling the strings."
10013010-126 = "Those evil bastards! I can't stand being tricked by them again!"
10013010-128 = "I didn't expect their shadow to follow us all the way here..."
10013010-129 = "Hm..."
10013010-130 = "I'd postulate the Kaiser Corporation was targeting the Festival Department from the beginning."
10013010-131 = "The Festival Department's authority to hold festivals in the Hyakkiyako Academy would be appealing to them."
10013010-132 = "[s] \"Like with Abydos, they've wrapped their claws around Hyakkiyako...\""
10013010-133 = "They sure got you good, Shizuko ♪"
10013010-134 = "...Ugh."
10013010-135 = "This is particularly out of character, however."
10013010-136 = "It's not like you to make such a reckless investment."
10013010-137 = "You low on cash, Shizuko?"
10013010-138 = "That's..."
10013010-140 = "No! You see, Boss..."
10013010-141 = "Thank you, Umika, but you don't have to cover for me. Yes, Niya."
10013010-142 = "[s] \"Shizuko...?\""
10013010-143 = "This is humiliating, but there's no point in hiding anything now."
10013010-144 = "I wanted some fast cash, so I made a bad investment. This outcome is a result of my foolishness."
10013010-145 = "I can admit when I've made a mistake."
10013010-146 = "Boss..."
10013010-147 = "I take full responsibility. I'm sorry, everyone."
10013010-148 = "I-I mean...as long as you're sorry..."
10013010-149 = "Serika, you can't always react to situations with anger."
10013010-150 = "You were the first one to run over here! Gun out, I might add!"
10013010-151 = "[s] \"What matters right now is how to fix it.\""
10013010-153 = "Return to the academy immediately, Kawawa Shizuko."
10013010-154 = "Huh?"
10013010-155 = "An external entity targeting the Festival Operations Department is equivalent to an attack on Hyakkiyako Academy as a whole."
10013010-156 = "This is way past your pay grade. The Yin-Yang Club knows how to deal with dirty tactics."
10013010-157 = "The Festival Department should return to prepare a response to the scandal."
10013010-159 = "No! I can't! I won't!"
10013010-163 = "...Excuse me?"
10013010-164 = "...What did you say to me?"
10013010-165 = "Yes, if we leave we'll be able to avoid the Resort Hunt and further trouble."
10013010-166 = "I don't want to hear what's next. Just fall in line, Shizuko."
10013010-167 = "But that won't solve anything!"
10013010-168 = "...?"
10013010-169 = "I understand, Niya."
10013010-170 = "But as long as the Momoyodou name is listed as the resort proprietor, its brand value will keep going down."
10013010-171 = "[s] \"Your brand is very valuable, isn't it?\""
10013010-172 = "You hit the nail on the head, Sensei! If we lose our credibility, it'll affect Hyakkiyako's tourism industry, which we heavily rely on for revenue."
10013010-173 = "That's why I can't go back yet. I have to rectify my mistake."
10013010-174 = "...You're genuinely trying to use this excuse? Stop being stubborn!"
10013010-175 = "You're calling my resolve stubbornness? You're the worst!"
10013010-176 = "I just don't get it. I already offered to fix it for you. Why take the harder path?"
10013010-178 = "Because I want to."
10013010-182 = "And that's not the only reason I want to stay, okay?"
10013010-183 = "A-Anyway, I'm staying, and that's final!"
10013010-184 = "Of course, I'll take full responsibility."
10013010-185 = "I'll do it on my own. I promise I'll fix this."
10013010-186 = "[s] \"We'll help.\""
10013010-187 = "S-Sensei! I really mean it. I can do this by myself."
10013010-188 = "It's a lady's duty to help someone in need, Shizuko."
10013010-189 = "Yes, she is correct. President Niya is being mean. We will help."
10013010-191 = "Even Chise..."
10013010-193 = "Everyone...!"
10013010-194 = "Count me in! My lord and I can achieve anything when we're together."
10013010-196 = "I'm surrounded by idiots. Alright, fine. What's your plan then? I'm assuming you have one."
10013010-197 = "According to the Abydos students, negotiating with the Octopus Bank will get us nowhere."
10013010-198 = "But we can't just sit around and wait to be attacked."
10013010-199 = "And what do they say is the best defense?"
10013010-200 = "...A good offense?"
10013010-201 = "Exactly! We're going to win the Resort Hunt!"
10013010-202 = "I like her style."
10013010-203 = "[s] \"Have you thought this through?!\""
10013010-204 = "Of course! But we're not going to steal anything like those criminals."
10013010-205 = "We're the proprietors of the resort, according to the contract, but others have received some of OUR rights with their own contracts."
10013010-206 = "They're sort of like...operation managers, like the bank employee mentioned."
10013010-208 = "Oh! I could see the contract being interpreted that way."
10013010-209 = "Operation managers? Of what? Some broken-down buildings?"
10013010-211 = "The technicalities don't matter. All of the troublemakers on the archipelago were invited here by arbitrary contracts that were made after the Octopus Bank sold us the resort."
10013010-212 = "The way I see it, they're illegal squatters!"
10013010-213 = "Momoyodou was contracted as the proprietor for the summer, so we have every right to kick them out!"
10013010-214 = "It makes sense! I think!"
10013010-215 = "We're going to participate in the Resort Hunt, defeat everyone, and take their contracts! In other words, a hostile M&A!"
10013010-216 = "Our pride is on the line! I won't accept defeat to my last, dying breath!"
10013010-217 = "We'll prove Momoyodou is a force to be reckoned with!"
10013010-218 = "We'll absorb every last entity of the Lost Paradise Resort!"
10013010-219 = "And rename it the Momoyodou Paradise Resort!"
10013010-220 = "[s] \"Who can say no to that enthusiasm?\""
10013010-224 = "Yay!"
10013010-226 = "As long as I get nap breaks, I'm in."
10013010-227 = "I'm happy to help!"
10013010-228 = "I'll take any chance to kick Kaiser's butt!"
10013010-230 = "Everyone..."
10013010-231 = "Okay! Our first step is to organize intel!"

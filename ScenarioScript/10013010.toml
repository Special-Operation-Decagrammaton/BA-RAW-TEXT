[translation]
10013010-1 = "ตอนที่ 1; สิ่งที่ต้องทำ!"
10013010-6 = "ทุกคนหยุด! หยุดก่อนค่ะ!"
10013010-7 = "เอ๋... อายาเนะจัง?"
10013010-8 = "อายาเนะจัง?! ทำไมถึงมาอยู่ที่นี่ล่ะ?! ไหนว่าจะไปส่งคุณครูไง...!"
10013010-9 = "ถูกคนไม่ดีกักตัวไว้สินะ"
10013010-10 = "โอ๊ะโอ แบบนี้ก็เรื่องใหญ่เลยนะคะ~"
10013010-12 = "ไม่ใช่ค่ะ! ไม่ใช่อย่างนั้น!"
10013010-14 = "คุณครูคะ นี่คุณครู... รู้จักคนพวกนี้เหรอคะ?"
10013010-15 = "[s] \"ก็... รู้จักอยู่\""
10013010-16 = "นายท่าน...! สะ... สุดยอดไปเลยค่ะ! ไม่ลังเลที่จะทำความรู้จักกับคนน่าสงสัยแบบนี้ ไอดอลฉันเลยค่ะ!"
10013010-17 = "อะ... อะไรกัน?! คนน่าสงสัยงั้นเหรอ? เสียมารยาทนะ!"
10013010-18 = "[s] \"คือว่า เรามาเคลียร์สถานการณ์กันก่อนดีกว่ามั้ย?\""
10013010-20 = "(จากนั้นทุกคนก็ได้แนะนำตัวเองและเรื่องที่ประสบอยู่)"
10013010-22 = "แปลว่า... คนที่ใส่หน้ากากก็คือนักเรียนจากโรงเรียนมัธยมอะบิดอส...?"
10013010-23 = "นี่เป็นส่วนหนึ่งของพร็อพในงานเทศกาลหรือเปล่าคะ?! หรือจะเป็นวัฒนธรรมเฉพาะตัวของอะบิดอส#nเท่านั้น!"
10013010-24 = "ว้าว~ ฉันได้ยินมาว่าในเกเฮนน่าก็มีงานเทศกาลที่ให้ใส่หน้ากากเข้าร่วม แต่ไม่คิดเลยนะคะว่าที่#nอะบิดอสเองก็มีด้วย ดูมีเอกลักษณ์ดีจริงๆ เลยค่ะ! ว่ามั้ยคะท่านประธาน?!"
10013010-26 = "แหะๆๆ ก็ไม่ถึง... ขนาดนั้น... หรอกค่ะ"
10013010-28 = "ฉันก็บอกตั้งกี่ครั้งแล้วว่าไม่ใช่ประธาน แต่เป็นหัวหน้าต่างหาก!"
10013010-29 = "ว่าแต่ทำไมอะบิดอสถึงต้องมาบุกรุกพวกเราด้วยล่ะ? พวกเราทำผิดอะไรงั้นเหรอ?"
10013010-30 = "อะไรกัน? พวกฉันต่างหากที่ต้องพูดแบบนั้น!"
10013010-31 = "ชมรมจัดงานเทศกาลเป็นตัวการหลักที่ทำให้เกิด <การล่ารีสอร์ต> ไม่ใช่เหรอ? ว่าแต่คุณครูเถอะ ทำไมถึงมาอยู่กับเด็กพวกนี้ได้..."
10013010-32 = "ก็บอกไปตั้งกี่ครั้งแล้วว่ามันคือเรื่องเข้าใจผิด!"
10013010-40 = "คือ... ทุกคนใจเย็นๆ กันก่อนนะคะ..."
10013010-41 = "วะ... หวา... อิซุนะจะทำยังไงดี..."
10013010-48 = "อ๊ะ หัวหน้านิยะติดต่อมาน่ะคุณครู"
10013010-52 = "อะฮะฮ่ะ~ ฮัลโหล ฮัลโหล ทุกคนสบายดีมั้ยคะ~?"
10013010-53 = "ฉันกังวลว่าระหว่างที่ฉันไม่อยู่ด้วยจะเกิดเรื่องอะไรเข้าก็เลยโทรเข้ามาค่ะ มันน่าจะต้องสนุกแน่ๆ เอ๊ย.. คงไม่ดีแน่หากเกิดเรื่องอะไรขึ้นน่ะค่ะ"
10013010-54 = "[s] \"ตกลงคืออยากให้มีเรื่องกันหรอกเหรอ...\""
10013010-55 = "ดูจากบรรยากาศแล้ว น่าจะเกิดการทะเลาะใหญ่โตขึ้นนะคะ~?"
10013010-56 = "ฮึ่ม... มีเรื่องอะไรเหรอ นิยะ? เป็นถึงคนที่เก่งที่สุดในเฮียกคิยาโค แต่เวลาเกิดเรื่องสำคัญ กลับไม่โผล่มาให้เห็นหน้าเลยนะ"
10013010-57 = "ฮุฮุฮุ~ ถูกใจการทำลายบรรยากาศด้วยคำพูดแรงๆ แบบนี้จังเลยค่ะ~"
10013010-58 = "มาเข้าเรื่องกันเลยดีกว่า"
10013010-59 = "จากการตรวจสอบอะไรหลายๆ อย่างในระหว่างที่คุณครูเดินทางไปที่นั่น"
10013010-60 = "คาวาวะ ชิซุโกะ ฉันพอรู้คร่าวๆ แล้วค่ะว่าคุณกำลังหลงกลเรื่องอะไรอยู่~♪"
10013010-67 = "หลงกล...?"
10013010-68 = "คุณชิซุโกะ ฉันตรวจพบว่าเมื่อไม่นานมานี้ ร้านเฮียกคิยาโคเข้าไปเริ่มทำธุรกิจขนาดใหญ่ ถูกมั้ยคะ?"
10013010-69 = "ทำไมถึงรู้เรื่องนั้นได้..."
10013010-70 = "[s] \"ธุรกิจขนาดใหญ่? ชิซุโกะน่ะเหรอ?\""
10013010-71 = "ฉันรู้มาว่าเมื่อไม่นานมานี้ ชมรมจัดงานเทศกาลได้กองทุนที่ระดมจากแต่ละชมรมในเฮียกคิยาโค#nมาลงทุนในผลิตภัณฑ์พิเศษค่ะ"
10013010-72 = "[s] \"ชิซุโกะ... ลงทุนเหรอ...?\""
10013010-73 = "แต่รู้มั้ยคะว่าอะไรคือปัญหา คุณชิซุโกะ? ปัญหาคือสินค้าที่คุณซื้อมามันคือของหลอกลวงไงคะ"
10013010-75 = "ของ... หลอกลวง?"
10013010-76 = "จากข้อมูลที่ได้มา บอกว่าชมรมจัดงานเทศกาลซื้อ <ตั๋วใช้งานของลอสต์ พาราไดซ์ รีสอร์ต> มาก็จริง"
10013010-77 = "แต่ลอสต์ พาราไดซ์ รีสอร์ตคือวิสาหกิจที่ล้มละลายไปเมื่อประมาณ 20 ปีก่อนค่ะ"
10013010-78 = "เอ๋...?"
10013010-79 = "ไม่ใช่แค่ชมรมเทศกาลนะคะ ตอนนี้ยังมีคนอื่นๆ ที่มีตั๋วใช้งานจอมปลอมนั่นอยู่อีกด้วย..."
10013010-80 = "พวกนักเรียนอะบิดอสก็น่าจะเป็นหนึ่งในนั้นนะคะ?"
10013010-81 = "ชะ... ใช่! พวกเราถูกรางวัลที่ 1 ก็เลย..."
10013010-82 = "นอกจากพวกฉันแล้ว พวกอะบิดอสก็มีตั๋วใช้งานรีสอร์ตอยู่จริงๆ ตามที่คุณครูว่าเหรอคะ...?"
10013010-83 = "อ้อ ดูนี่สิคะ หนังสือสัญญาที่พวกฉันมี มีชื่อของชมรมจัดงานเทศกาล..."
10013010-89 = "<ผู้ลงทุนและบริหารงานทั่วไปของลอสต์ พาราไดซ์ รีสอร์ต: ชมรมจัดงานเทศกาล สหพันธ์เฮียกคิยาโค>...?"
10013010-90 = "เดี๋ยวก่อนสิ?! ทำไมถึงมีชื่อชมรมเราในเอกสารที่คนอื่นถืออยู่ได้ล่ะ! หรือนี่จะเป็นของปลอม..."
10013010-94 = "เอ๊ะ เอ๋?! ตรงนี้มีตราประทับของเราด้วย?! หืม?!"
10013010-95 = "สงสัยจะโดนหลอกเข้าแล้วนะคะ คุณชิซุโกะ"
10013010-96 = "ตั๋วใช้งานที่คุณซื้อมาถูกกระจายให้กองกำลังอื่นด้วย และใช้คำไม่สมเหตุสมผลจนเกิดเป็นข้อกำหนด#nที่ไม่ยุติธรรมในหนังสือสัญญานั้นเองที่..."
10013010-97 = "[s] \"ทำให้เกิดเหตุการณ์ที่เรียกว่า <การล่ารีสอร์ต>...?\""
10013010-98 = "ว่าแต่ว่าคุณไปซื้อตั๋วใช้งานนั่นมาจากที่ไหนเหรอคะ?"
10013010-99 = "เรื่องนั้น..."
10013010-101 = "เอาละ งั้นถ้าประทับตราตรงนี้ก็เป็นอันเสร็จใช่มั้ย?"
10013010-102 = "ฮ่าฮ่าฮ่า! เท่านี้ชมรมจัดงานเทศกาลก็ได้ใช้เงินกองทุนลงทุนในผลิตภัณฑ์พิเศษของ <ธนาคารทาโกะ> แล้วครับ!"
10013010-103 = "โครงการบริหารร้านริมทะเลที่รีสอร์ต <ลอสต์ พาราไดซ์> ของคุณลูกค้าในฤดูร้อนนี้เป็นโครงการ#nที่ดีเลยครับ! แล้วก็เป็นการลงทุนที่ไร้ความเสี่ยงด้วยครับ!"
10013010-104 = "ทางเราจะเปิดรับผู้ดูแลสิ่งอำนวยความสะดวกในรีสอร์ตในเร็วๆ นี้ด้วยครับ ยังไงก็ขอฝาก#nทางลูกค้าด้วยนะครับ"
10013010-106 = "เดี๋ยวก่อนนะ... นั่นมันเป็นปัญหาเหรอ? อะไรกัน? ฉันก็อ่านหนังสือสัญญาชัดเจนดีแล้วนี่?!"
10013010-107 = "ข้อความในหนังสือสัญญาเป็นเรื่องล้อเล่นตั้งแต่แรกแล้วค่ะ"
10013010-108 = "ตามข้อมูลที่ฉันได้มา มันน่ากังขาตั้งแต่เรื่องที่ธนาคารทาโกะมีสิทธิ์ที่จะขายสิ่งนั้นตั้งแต่แรก#nหรือเปล่าแล้วค่ะ..."
10013010-109 = "ถ้ามันเป็นการขายหลอกลวง เอกสารนั่นมันก็ผิดกฎหมาย! และถ้ากลับไปยกเลิกสัญญาละก็...!"
10013010-111 = "ธนาคารทาโกะใช่มั้ย? ธนาคารนั่น..."
10013010-112 = "อะ... อื้ม? ใช่"
10013010-117 = "อืม... งั้นเหรอ ถ้าใช่จริงๆ ก็คงจัดการไม่ได้ง่ายๆ หรอก"
10013010-118 = "[s] \"โฮชิโนะ? หมายความว่ายังไงน่ะ?\""
10013010-120 = "...."
10013010-121 = "ธนาคารทาโกะ..."
10013010-122 = "เป็นหนึ่งในบริษัทหุ่นเชิดของ <สินเชื่อไคเซอร์> ค่ะ"
10013010-123 = "[s] \"สินเชื่อไคเซอร์...?!\""
10013010-124 = "ใช่ค่ะ พวกฉันรู้วิธีการที่ทุกคนกำลังพูดถึงอยู่ค่ะ มันเป็นวิธีการของสินเชื่อไคเซอร์แน่นอนค่ะ"
10013010-125 = "อืม... ไคเซอร์ คอร์เปอเรชั่นอาจเป็นเบื้องหลังของเหตุการณ์ที่เกิดขึ้นที่นี่ก็ได้"
10013010-126 = "เจ้าคนชั่วพวกนั้น! ยังคงใช้วิธีการเดิมเลยนะ! พวกเราก็โดนมาตั้งหลายครั้งแล้ว!"
10013010-128 = "อื้ม ใช่ค่ะ แต่ก็ไม่คิดว่าจะมาโดนที่นี่อีก..."
10013010-129 = "อืม... เป็นอย่างนั้นเองหรอกเหรอ เจ้าพวกนั้นมัน..."
10013010-130 = "ไคเซอร์ คอร์เปอเรชั่นอาจจะตั้งใจเล่นงานชมรมเทศกาลตั้งแต่แรกก็ได้ค่ะ"
10013010-131 = "เพราะสิ่งที่ยั่วตายั่วใจพวกนั้นก็คือสิทธิ์ในการจัดงานเทศกาลในสหพันธ์เฮียกคิยาโคที่ชมรมเทศกาลมี"
10013010-132 = "[s] \"พวกนั้นใช้กลอุบายกับเฮียกคิยาโค เหมือนกับที่ทำในอะบิดอสเหรอ...\""
10013010-133 = "คุณชิซุโกะ โดนเข้าแล้วละค่ะ♪"
10013010-134 = "อึก...!"
10013010-135 = "แต่เรื่องนี้มันเกินคาดไปหน่อยนะคะ ต้องบอกว่าไม่สมกับที่เป็นคุณชิซุโกะหรือเปล่านะ..."
10013010-136 = "ทำไมถึงไปลงทุนกับของแปลกๆ แบบนั้นคะ?"
10013010-137 = "หรือว่าคุณต้องการเงินอย่างนั้นเหรอคะ?"
10013010-138 = "เรื่องนั้นมัน..."
10013010-140 = "ไม่ใช่นะคะ! ท่านประธานแค่..."
10013010-141 = "ไม่หรอก อุมิกะ... ที่นิยะพูดมามันถูกต้องแล้วละ"
10013010-142 = "[s] \"ชิซุโกะ?\""
10013010-143 = "ถึงฉันจะไม่อยากยอมรับ แต่เรื่องที่เกิดไปแล้วคงทำอะไรไม่ได้"
10013010-144 = "ฉันต้องการเงินก็เลยไปลงทุนในธุรกิจ แล้วก็มาตกอยู่ในสภาพนี้ เรื่องมันก็มีแค่นี้แหละ"
10013010-145 = "ไม่มีความคิดที่จะแก้ตัวหรือแถจนตัวถลอกหรอก"
10013010-146 = "ท่านประธาน..."
10013010-147 = "เรื่องแบบนี้เกิดขึ้นเพราะฉันเอง ขอโทษนะทุกคน"
10013010-148 = "เอ่อ... ก็... ถ้าเธอขอโทษขนาดนี้..."
10013010-149 = "อืม อย่าตำหนิกันด้วยเรื่องที่ผ่านมาแล้วดีกว่านะ เซริกะ"
10013010-150 = "แต่รุ่นพี่ชิโรโกะวิ่งแจ้นมาคนแรกเลยนะ?!"
10013010-151 = "[s] \"ปัญหาตอนนี้คือ เราจะทำยังไงกันต่อ\""
10013010-153 = "กลับมาที่โรงเรียนเถอะค่ะ คาวาวะ ชิซุโกะ"
10013010-154 = "หืม...?"
10013010-155 = "การที่กองกำลังจากภายนอกมาเล่นงานชมรมจัดงานเทศกาล มันก็ไม่ต่างกับมาโจมตีสหพันธ์#nเฮียกคิยาโคของพวกเราหรอกนะคะ"
10013010-156 = "เพราะฉะนั้นจากนี้ให้เป็นหน้าที่ของชมรมหยินหยางเถอะค่ะ ถ้าทางนั้นใช้วิธีสกปรกมา#nพวกฉันก็จะตอบแทนด้วยวิธีเดียวกันค่ะ"
10013010-157 = "เพื่อการรับมือต่อ ฉันคิดว่าชมรมเทศกาลต้องกลับมาที่นี่เดี๋ยวนี้..."
10013010-159 = "ไม่ ฉันทำแบบนั้นไม่ได้หรอก"
10013010-163 = "คะ...?"
10013010-164 = "หมายความว่ายังไงคะ...?"
10013010-165 = "ถ้าออกจากที่นี่ไป เราอาจเลี่ยงตัวจากปัญหา <การล่ารีสอร์ต> นี้ได้ก็จริง"
10013010-166 = "ใช่ค่ะ เพราะอย่างนั้นเลยต้องกลับมาสรุปสถานการณ์ แล้วเตรียมพร้อมสำหรับ..."
10013010-167 = "แต่ถึงทำแบบนั้นไปมันก็แก้ไขอะไรไม่ได้หรอกนะ"
10013010-168 = "คะ...?"
10013010-169 = "ฉันก็เข้าใจในสิ่งที่นิยะจะสื่ออยู่หรอกนะ"
10013010-170 = "แต่หากในหนังสือสัญญายังมีชื่อของร้านเฮียกคิยาโคอยู่ ชื่อเสียงของเฮียกคิยาโคก็จะเสื่อมเสีย"
10013010-171 = "[s] \"มันเป็นเรื่องร้ายแรงขนาดนั้นเลยเหรอ?\""
10013010-172 = "ก็ใช่น่ะสิคะคุณครู! นี่มันปัญหาใหญ่ที่ส่งผลต่อความน่าเชื่อถือของทั้งโรงเรียนและอุตสาหกรรม#nการท่องเที่ยวของเฮียกคิยาโคเลยนะคะ!"
10013010-173 = "ก็เพราะแบบนั้น ฉันเลยจะไม่กลับไป ฉันจะอยู่ที่นี่แล้วแก้ไขปัญหาด้วยตัวเอง"
10013010-174 = "กลับไม่ได้เพราะชื่อและมูลค่าของแบรนด์? ก็เลยจะดื้อดึงอยู่ทางนั้น แบบนี้เหรอคะ?"
10013010-175 = "ดะ... ดื้อดึงอะไรล่ะ เสียมารยาทนะ!"
10013010-176 = "ฉันไม่เข้าใจเลยค่ะ... ทำไมถึงเลือกทำในสิ่งที่ยากลำบาก..."
10013010-178 = "ก็เพราะ... ฉันอยากทำแบบนั้นไง"
10013010-182 = "ยิ่งไปกว่านั้น เหตุผลที่จะอยู่ที่นี่ต่อก็อาจจะไม่ได้มีแค่เรื่องมูลค่าของแบรนด์... แต่อาจจะมีเหตุผลอื่นด้วย"
10013010-183 = "เอาเถอะ รู้ไว้แล้วกันว่าฉันจะไม่กลับไป!"
10013010-184 = "แล้วเรื่องนี้มันก็เกิดจากความผิดพลาดของฉันด้วย"
10013010-185 = "ถึงจะต้องอยู่จัดการคนเดียวฉันก็จะทำ คนอื่นไม่ต้องห่วงฉันหรอกนะ"
10013010-186 = "[s] \"งั้นพวกเราก็จะช่วยอีกแรง\""
10013010-187 = "คะ...? มะ... ไม่เป็นไรค่ะ ฉันไม่ควรจะทำให้คุณครูมาลำบากไปด้วย..."
10013010-188 = "ชิซุโกะจัง พูดอะไรแบบนั้นคะ? พวกเรามาที่นี่ก็เพื่อมาช่วยนะคะ"
10013010-189 = "อื้ม~ ใช่~ ไม่ต้องสนใจหัวหน้านิยะหรอก พวกเราจะช่วยเอง"
10013010-191 = "ชิเซะก็ด้วยเหรอ..."
10013010-193 = "ทุกคนคะ...!"
10013010-194 = "อิซุนะก็จะช่วยอีกแรงค่ะ! ถ้ามีนายท่านอยู่ด้วย ก็เหมือนเรามีทหารเป็นพันๆ นายอยู่ด้วยเลยละค่ะ!"
10013010-196 = "กล้ากันขนาดนั้น.... ฉันขอถามหน่อยเถอะค่ะว่าคิดแผนการอะไรไว้บ้างหรือยังคะ?"
10013010-197 = "ฟังจากที่นักเรียนอะบิดอสเล่าแล้ว เราคงจะไปซักไซ้ไล่เลียงจากธนาคารทาโกะเพื่อแก้ปัญหาไม่ได้"
10013010-198 = "ต่อให้อยู่เฉยๆ การบุกรุกจาก <การล่ารีสอร์ต> ก็จะยังไม่จบไม่สิ้น"
10013010-199 = "ถ้างั้นก็แค่มองมุมกลับดูยังไงล่ะ"
10013010-200 = "มองมุมกลับ...?"
10013010-201 = "ไม่เห็นจะยาก เราจะกระโดดลงสนาม <การล่ารีสอร์ต> ด้วยอีกคนไง"
10013010-202 = "โอ้ เด็ดเดี่ยวดีจัง"
10013010-203 = "[s] \"แบบนั้นจะไม่เป็นไรเหรอ?!\""
10013010-204 = "ฉันไม่ได้บอกว่าจะให้ไปแย่งมาจริงๆ หรอกนะคะ!"
10013010-205 = "การที่ชื่อของผู้มีสิทธิ์ขั้นสุดท้ายของ <ตั๋วใช้งานรีสอร์ต> เป็นชื่อของพวกฉัน ในหนังสือสัญญา#nฉบับอื่นๆ ก็คงเป็นข้อสัญญาในรูปแบบที่ได้รับโอนสิทธิ์บางส่วนของพวกฉันมา"
10013010-206 = "บางที... อาจจะเป็นรูปแบบของ <ผู้ดูแลสิ่งอำนวยความสะดวกในรีสอร์ต> ที่พนักงานธนาคารพูด#nตอนนั้นก็ได้ค่ะ"
10013010-208 = "เอ๊ะ... ในหนังสือสัญญาให้ความรู้สึกแบบนั้นจริงๆ ด้วยนะคะ~"
10013010-209 = "ผู้ดูแลสิ่งอำนวยความสะดวกงั้นเหรอ หมายถึงผู้ดูแลเกาะร้างๆ นั่นน่ะเหรอ?"
10013010-211 = "ค่ะ น่าจะเป็นแบบนั้นค่ะ... เด็กเจ้าปัญหาที่มาที่หมู่เกาะแห่งนี้ก็คือพวกที่ธนาคารทาโกะไปทำ#nสัญญาด้วยแล้วพามาที่นี่"
10013010-212 = "เท่ากับว่าเป็นผู้ครอบครองโดยไม่ชอบด้วยกฎหมาย!"
10013010-213 = "แต่ในเมื่อผู้ทำสัญญาเป็นผู้ดูแลอย่างเป็นทางการคือร้านเฮียกคิยาโค พวกฉันก็มีสิทธิ์ในการขับไล่#nผู้ครอบครองที่ผิดกฎหมายออกไป!"
10013010-214 = "ฉันจะใช้ช่องโหว่นี้แหละค่ะ!"
10013010-215 = "เราจะล่ารีสอร์ต กำจัดเด็กเจ้าปัญหาและเอาคืนมาให้ได้! แบบนี้แหละค่ะที่เรียกว่า M&A หรือการควบรวมกิจการ!"
10013010-216 = "ฉันจะไม่ยอมถอยให้ทั้งๆ ที่ยังพ่ายแพ้อยู่แบบนี้ค่ะ! นี่คือการต่อสู้แห่งความองอาจของฉัน!"
10013010-217 = "มาโชว์พลังของร้านเฮียกคิยาโคให้พวกนั้นเห็นกันเลยค่ะ!"
10013010-218 = "ไม่ว่าจะลอสต์ พาราไดซ์ รีสอร์ตหรืออะไรอื่นก็ช่าง ฉันจะยึดให้หมดเลย!"
10013010-219 = "แล้วตั้งชื่อใหม่เป็นรีสอร์ตสวรรค์ร้านเฮียกคิยาโค!"
10013010-220 = "[s] \"อื้ม เอาสิ มาสู้ไปด้วยกันนะ\""
10013010-224 = "ค่า...!"
10013010-226 = "แหะๆ~ งั้นพวกเราก็ช่วยผนึกแรงด้วยหน่อยมั้ย?"
10013010-227 = "ค่ะ! มาร่วมแรงร่วมใจไปด้วยกันค่ะ~!"
10013010-228 = "อื้ม! ถ้าอีกฝั่งเป็นพวกไคเซอร์ละก็ ฉันอยากช่วยแก้แค้นอยู่แล้ว!"
10013010-230 = "ทุกคน..."
10013010-231 = "ดีเลยค่ะ! งั้นเริ่มจากมาแลกเปลี่ยนข้อมูลกันเลยดีกว่าค่ะ!"

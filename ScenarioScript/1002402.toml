[translation]
1002402-1 = "ปั่นจักรยานทางไกลข้ามคิโวทอส"
1002402-2 = "(พอคุณครูไปถึงหน้าประตูโรงเรียนก็เห็นชิโรโกะจูงจักรยานออกมา)"
1002402-5 = "หืม? คุณครู?"
1002402-6 = "[s1] \"ชิโรโกะ!?\"\n[s2] \"ทำไมเป็นอย่างนี้ล่ะ? เกิดอะไรขึ้น?!\""
1002402-7 = "หืม...? ทำไมทำหน้าเครียดแบบนั้นล่ะ..."
1002402-8 = "หืม...? ทำไมทำหน้าเครียดแบบนั้นล่ะ..."
1002402-9 = "ฉันแค่ไปปั่นรอบสนามมา 200 รอบเพื่อเช็กสภาพรถก่อนออกเดินทางก็เท่านั้น..."
1002402-10 = "ว่าแต่คุณครูนั่นแหละมาทำอะไรที่นี่เวลานี้?"
1002402-11 = "...!"
1002402-12 = "หรือว่า..."
1002402-17 = "ในที่สุดคุณครูก็สนใจเรื่องการออกกำลังกายแล้วเหรอ?"
1002402-18 = "ดีเลย งั้นคุณครูก็ไปกับฉันมั้ยล่ะ?"
1002402-19 = "ไปปั่นจักรยานข้ามคิโวทอสน่ะ"
1002402-20 = "[s] \"ปั่นข้ามคิโวทอส?\""
1002402-21 = "ใช่ เมื่อกี๊ก็บอกในข้อความไปแล้วไงว่าอาจจะติดต่อไม่ได้สักพักเลย"
1002402-22 = "เพราะคุณครูมาทำให้ฉันมีเวลาว่างขึ้นมาบ้างน่ะ..."
1002402-23 = "ฉันคิดมานานแล้วว่าอยากลองปั่นจักรยานทางไกลดู"
1002402-24 = "ถึงชื่อมันจะดูยิ่งใหญ่ แต่จริงๆ ก็แค่การปั่นจากที่หนึ่งไปอีกที่หนึ่งบนทางหลวงคิโวทอสนั่นแหละ"
1002402-25 = "เพราะถ้าจะปั่นข้ามเหนือใต้จริงๆ คงต้องใช้เวลาหลายเดือนเลยล่ะ"
1002402-26 = "[s] \"อย่างนี้นี่เอง...\""
1002402-27 = "คุณครู...? ทำไมทำหน้าแบบนั้นล่ะ?"
1002402-28 = "อ่า... คงจะเข้าใจอะไรผิดสินะ ขอโทษที"
1002402-29 = "ฉันแค่จะเล่าเรื่องงานอดิเรกพื้นๆ ให้ฟังน่ะ ไม่ได้ตั้งใจจะทำให้เป็นห่วงหรอก"
1002402-30 = "[s] \"แล้วจะไปคนเดียวเหรอ?\""
1002402-31 = "อื้ม... ฉันลองชวนทุกคนแล้ว แต่ไม่มีใครเอาด้วยเลย"
1002402-32 = "ทั้งๆ ที่ 4,000 กิโลเมตรก็เป็นระยะทางที่ปกติก็ปั่นได้ใน 3 วันอยู่แล้ว... หรือว่าจะเป็น#nเพราะชุดปั่นจักรยานนะ...?"
1002402-33 = "แต่ถ้าจะปั่นนานๆ ก็ต้องใส่ชุดนักปั่นแบบนี้แหละ "
1002402-34 = "[s] \"...\""
1002402-35 = "หืม...? คุณครูไม่ต้องเป็นห่วงหรอก ฉันเตรียมตัวมาอย่างดีแล้วล่ะ"
1002402-38 = "ทั้งตรวจสภาพจักรยาน ทั้งเตรียมยางสำรองและเครื่องมือซ่อม ที่สูบลมพกพา แถมยังมีอุปกรณ์#nตั้งแคมป์และของใช้จำเป็นสำหรับนอนริมถนน..."
1002402-39 = "[s] \"นอนริมถนน?!\""
1002402-40 = "ใช่ เพราะบางทีก็ต้องปั่นข้ามถนนที่ไม่มีผู้คนสัญจรน่ะ "
1002402-41 = "แต่ฉันสามารถปั่นโดยไม่นอนได้ 3 วันนะ แค่เตรียมไปเผื่อเฉยๆ น่ะ ก็การพักผ่อนมันเป็นเรื่องจำเป็น#nถ้าจะพักก็ต้องพักดีๆ หน่อย"
1002402-42 = "อ่า... ฉันเตรียมหน้ากากไว้เผื่อสถานการณ์ที่ไม่คาดคิดด้วยนะ..."
1002402-43 = "[s] \"ครูขอยึดหน้ากาก!\""
1002402-44 = "กะ... ก็ได้..."
1002402-45 = "[s] \"แต่ยังไงก็เป็นห่วงอยู่ดี การผจญภัยนี้มันปลอดภัยแน่เหรอ?\""
1002402-46 = "อืม... ไม่เห็นมีอะไรน่าห่วงเลย..."
1002402-47 = "......"
1002402-48 = "แต่พอมาคิดว่านี่อาจทำให้คุณครูเป็นห่วงได้ ฉันก็ชักจะสองจิตสองใจแล้วล่ะ..."
1002402-49 = "หรือว่าต้องพับโครงการไปก่อนนะ..."
1002402-50 = "หืม...?"
1002402-51 = "ไม่ต้องเหรอ? แต่ถ้าคุณครูเป็นห่วง..."
1002402-52 = "[s3] \"เราก็ติดต่อกันบ่อยๆ ไง\"\n[s4] \"ส่ง MOMOTALK มาก็ได้\""
1002402-53 = "ติดต่อทาง MOMOTALK เหรอ...?"
1002402-54 = "ติดต่อทาง MOMOTALK เหรอ...?"
1002402-55 = "อ่า..."
1002402-56 = "จริงสินะ ถึงจะไปปั่นจักรยานก็ยังส่ง MOMOTALK ได้อยู่"
1002402-57 = "แต่แค่นั้นจะทำให้คุณครูเบาใจได้เหรอ? การที่ส่งข้อความหากันบ่อยๆ..."
1002402-58 = "[s5] \"อื้ม แค่ขอให้ได้ติดต่อกันก็พอ\"\n[s6] \"ครูอาจจะแวะไปหาบ้างก็ได้นะ\""
1002402-66 = "ขอบคุณนะคุณครู อยู่ๆ ก็รู้สึกดีขึ้นมาเลยล่ะ"
1002402-67 = "ฉันจะส่งข้อความหาทุกครั้งที่จอดรถเลย"
1002402-68 = "งั้นฉันไปก่อนนะคุณครู"
1002402-69 = "[s] \"ปั่นดีๆ นะ\""
1002402-70 = "อื้ม..."

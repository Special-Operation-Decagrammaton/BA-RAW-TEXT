1002402-15 = "3;시로코 라이딩;02\n#3;d\n#wait;1000"
1002402-16 = "3;시로코 라이딩;01\n#3;a\n#3;closeup\n#wait;2000"
1002402-17 = "3;시로코 라이딩;03;드디어 선생님도 운동에 관심이 생긴 거야?\n#3;em;[음표]\n#3;closeup"
1002402-18 = "3;시로코 라이딩;03;응. 그렇다면, 선생님도 같이 갈래?\n#3;closeup"
1002402-19 = "3;시로코 라이딩;03;키보토스 종단 일주.\n#3;em;[반짝]\n#3;greeting\n#3;closeup"
1002402-20 = "[s] \"키보토스 종단일주?\""
1002402-21 = "3;시로코 라이딩;01;응. 아까 전에 메시지를 보냈잖아. 한동안은 연락이 어려울 수도 있다고.\n#3;em;[반응]"
1002402-22 = "3;시로코 라이딩;01;선생님 덕분에 요즘은 여유가 조금 있으니까……."
1002402-23 = "3;시로코 라이딩;99;예전부터 꼭 해보고 싶었던 롱 라이딩을 시도해 볼 생각이었거든."
1002402-24 = "3;시로코 라이딩;03;거창한 이름이지만 사실 키보토스의 공도를 타고 이리저리 다니는 것뿐이야.\n#3;em;[반짝]"
1002402-25 = "3;시로코 라이딩;03;진짜 종단을 하려면 몇달로도 부족할 테니까."
1002402-26 = "[s] \"그렇구나…….\""
1002402-27 = "3;시로코 라이딩;01;……선생님? 표정이 왜 그래?\n#3;em;[?]"
1002402-28 = "3;시로코 라이딩;04;아아……. 오해가 있었나 보네. 미안. \n#3;stiff"
1002402-29 = "3;시로코 라이딩;01;그냥 단순한 취미 활동 이야기였어. 걱정할 거라곤 생각하지 못했네."
1002402-30 = "[s] \"혼자 가는 거야?\""
1002402-31 = "3;시로코 라이딩;01;응……. 모두에게 권해봤지만, 별로 내켜하지 않았어.\n#3;em;[반응]"
1002402-32 = "3;시로코 라이딩;99;4000km를 3주 동안 달리는 보통의 일정인데, 음…… 아무래도 이 라이딩 슈트 때문일까……."
1002402-33 = "3;시로코 라이딩;06;그치만 오래 달리려면 이런 기능성 슈트가 필수인데. \n#3;em;[땀]\n#3;stiff"
1002402-34 = "[s] \"…….\""
1002402-35 = "3;시로코 라이딩;01;……응? 걱정하지 마. 선생님. 나는 준비는 철저하게 해뒀으니까."
1002402-36 = "3;시로코 라이딩;01\n#3;m2\n#wait;1000"
1002402-37 = "3;시로코 라이딩;01\n#3;greeting\n#wait;1500"
1002402-38 = "3;시로코 라이딩;02;자전거 정비도 제대로 했고, 예비 튜브와 수리 도구, 휴대용 펌프에……. 노숙을 위한 캠핑 도구와 세면도구…….\n#3;em;…"
1002402-39 = "[s] \"노숙?!\""
1002402-40 = "3;시로코 라이딩;01;응. 인적이 없는 도로를 며칠이나 달려야 할 때도 있거든. \n#3;em;[반응]\n#3;m3"
1002402-41 = "3;시로코 라이딩;01;그치만 3일 정도라면 잠자지 않고도 달릴 수 있으니까. 만약을 위한 거야. 쉬는 건 중요하니까 제대로 된 휴식은 취할 거고."
1002402-42 = "3;시로코 라이딩;99;아, 그리고 혹시 모를 상황을 위한 복면도……."
1002402-43 = "[s] \"복면은 압수!\""
1002402-44 = "3;시로코 라이딩;04;으, 으음…….\n#3;em;[땀]\n#3;stiff"
1002402-45 = "[s] \"솔직히 그래도 걱정 돼. 괜찮은 거야? 이 모험?\""
1002402-46 = "3;시로코 라이딩;01;으음……. 그리 걱정할 건 없을 텐데……."
1002402-47 = "3;시로코 라이딩;01;…….\n#3;em;…"
1002402-48 = "3;시로코 라이딩;04;그치만 왠지 선생님한테 걱정을 끼친다고 생각하니, 막상 가는 게 주저되는 걸…….\n#3;stiff"
1002402-49 = "3;시로코 라이딩;99;역시 다음으로 미뤄야 하나."
1002402-50 = "3;시로코 라이딩;01;……응?\n#3;em;[반응]"
1002402-51 = "3;시로코 라이딩;01;그럴 필요는 없다고? 그렇지만 선생님이 걱정을 하면……."
1002402-52 = "[s3] \"자주자주 연락하면 되지.\"\n[s4] \"모모톡으로도 충분하니까.\""
1002402-53 = "3;시로코 라이딩;02;모모톡으로 연락……?\n#3;em;[?]"
1002402-54 = "3;시로코 라이딩;02;모모톡으로 연락……?\n#3;em;[?]"
1002402-55 = "3;시로코 라이딩;01;……아."
1002402-56 = "3;시로코 라이딩;03;그러네. 라이딩 중에도 얼마든지 모모톡으로 연락할 수 있구나."
1002402-57 = "3;시로코 라이딩;01;그런데 선생님은 그걸로 괜찮은 거야? 자주 연락하는 거……?"
1002402-58 = "[s5] \"뭐, 연락만 잘 닿는다면야.\"\n[s6] \"가끔 찾아갈 지도 모르고.\""

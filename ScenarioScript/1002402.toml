[translation]
1002402-1 = "奇普托斯．長途騎行"
1002402-2 = "（我全速前往阿拜多斯，抵達校門時白子剛好牽著自行車出來）"
1002402-5 = "……嗯？老師？"
1002402-6 = "[s1] 「白子！」\n[s2] 「啊咧，那個……？」"
1002402-7 = "嗯……？怎麼了嗎？"
1002402-8 = "嗯……？怎麼了嗎？"
1002402-9 = "我剛確認完自行車的行前狀況，並讓履帶轉了200圈左右……"
1002402-10 = "倒是老師這時間怎麼會在這裡……？而且還氣喘吁吁的……"
1002402-11 = "……！"
1002402-12 = "難道……"
1002402-17 = "老師終於對運動有興趣了嗎？"
1002402-18 = "真高興。那老師要一起去嗎？"
1002402-19 = "縱貫整個奇普托斯。"
1002402-20 = "[s] 「縱貫整個奇普托斯？」"
1002402-21 = "嗯。就像我剛才在MomoTalk說的一樣。"
1002402-22 = "多虧老師，最近我稍微有點時間了……"
1002402-23 = "於是就想嘗試一下，從以前就想挑戰的長途騎旅。"
1002402-24 = "雖然聽起來很厲害，但其實只是沿著奇普托斯公路到處騎而已。"
1002402-25 = "如果真的想要縱貫，恐怕會花上好幾個月。"
1002402-26 = "[s] 「這樣啊，太好了……」"
1002402-27 = "……老師？你的表情是怎麼了？"
1002402-28 = "嗯……雖然不太明白，不過似乎讓你誤會了呢。抱歉。"
1002402-29 = "沒想到會讓老師這麼擔心。"
1002402-30 = "[s] 「不會，我才要說抱歉哦。話說回來，你要一個人去嗎？」"
1002402-31 = "嗯……雖然我有約其他人，但大家都興致缺缺。"
1002402-32 = "想說只是3個星期跑4000km而已，應該不是那麼勉強的行程才對……該不會，是因為不怎麼喜歡這身套裝嗎……"
1002402-33 = "不過為了要長時間行駛，這種功能性套裝又是必須的。"
1002402-34 = "[s] 「……」"
1002402-35 = "……嗯，怎麼了，老師？我穿這樣很奇怪嗎……？"
1002402-38 = "總之，東西都準備好了。自行車整備完成，備用履帶、修理工具、攜帶型打氣筒、露宿需要的露營用品和盥洗用品……"
1002402-39 = "[s] 「露宿！？」"
1002402-40 = "嗯，因為有可能需要在人煙跡少的道路騎好幾天。"
1002402-41 = "雖然說我可以3天左右不睡覺一直騎，但以防萬一還是要注重睡眠。途中我也會確實休息的。"
1002402-42 = "啊，然後還有必要時的面罩……"
1002402-43 = "[s] 「面罩沒收！」"
1002402-44 = "嗯……是嗎，沒辦法。"
1002402-45 = "[s] 「你一個人真的沒問題嗎……？」"
1002402-46 = "嗯，我想應該不用擔心……"
1002402-47 = "……"
1002402-48 = "不過，看到老師擔心的表情，就讓人覺得……"
1002402-49 = "該怎麼辦呢……可是……"
1002402-50 = "……嗯？"
1002402-51 = "沒有必要取消……？但我不能讓老師這麼擔心……"
1002402-52 = "[s3] 「只要比平時更常聯絡就好了。」\n[s4] 「只要用MomoTalk聯絡，我就很安心了。」"
1002402-53 = "MomoTalk……"
1002402-54 = "MomoTalk……"
1002402-55 = "……的確，我都忘了。就算沒有到學校，也隨時都能聯絡。"
1002402-56 = "說的也是。那就在我騎車的空檔，或是停下來的時候……"
1002402-57 = "不過不會打擾到老師嗎？要是聯絡的太頻繁……"
1002402-58 = "[s5] 「那樣我更開心。你甚至可以每次休息都連絡一次。」\n[s6] 「就算沒有聯絡，只要剛好經過附近我也會去見你。」"
1002402-66 = "謝謝老師。總覺得心裡變輕鬆了。"
1002402-67 = "每次停下時，我一定會聯絡。"
1002402-68 = "那我出發了。老師。"
1002402-69 = "[s] 「嗯，路上小心。」"
1002402-70 = "……嗯，我出發了。"

[translation]
1002402-1 = "#title;키보토스 롱 라이딩"
1002402-2 = "#na;(교문 앞에 도착하자, 시로코가 자전거를 끌며 나오고 있었다.)"
1002402-3 = "#wait;1500"
1002402-4 = "#wait;1500"
1002402-5 = "3;시로코 라이딩;02;……음? 선생님?\n#3;em;[반응]\n#3;a"
1002402-6 = "[s1] \"시로코!?\"\n[s2] \"뭐, 뭐야? 무슨 일이야?!\""
1002402-7 = "3;시로코 라이딩;01;응……? 갑자기 그렇게 물어도……."
1002402-8 = "3;시로코 라이딩;01;응……? 갑자기 그렇게 물어도……."
1002402-9 = "3;시로코 라이딩;04;출발하기 전에 머신 상태를 체크할 겸 트렉을 200바퀴 정도 돈 것뿐인데…….\n#3;stiff\n#3;em;[땀]"
1002402-10 = "3;시로코 라이딩;01;선생님이야말로 이 시간에 어째서……?"
1002402-11 = "3;시로코 라이딩;01;……!\n#3;em;[!]"
1002402-12 = "3;시로코 라이딩;02;설마……."
1002402-13 = "#st;[0,0];instant;1;"

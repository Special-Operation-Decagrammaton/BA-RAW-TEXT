[translation]
1002402-1 = "Cycling Across Kivotos"
1002402-2 = "I arrived at Abydos' front gates just as Shiroko was pulling out with her bike."
1002402-5 = "Huh? Sensei?"
1002402-6 = "[s1] \"Shiroko?!\"\n[s2] \"Wh-What's up? Is something going on?!\""
1002402-7 = "Huh? Why are you so tense?"
1002402-8 = "Huh? Why are you so tense?"
1002402-9 = "I was doing a couple hundred laps around the track to make sure all of the gears are working before I leave."
1002402-10 = "What are you doing here so early, Sensei?"
1002402-11 = "...!"
1002402-12 = "Don't tell me..."
1002402-17 = "Have you finally taken an interest in exercising?"
1002402-18 = "In that case, would you like to join me?"
1002402-19 = "I'm going to do a lap around Kivotos."
1002402-20 = "[s] \"A lap around Kivotos?\""
1002402-21 = "Yes. As I told you in my message earlier, it may be difficult to get ahold of me for a while."
1002402-22 = "Thanks to what you did for us, I have more time in my schedule for leisurely things like this."
1002402-23 = "I've been wanting to try distance riding for the longest time, so I figured now would be a good opportunity."
1002402-24 = "To put it simply, I'm just going to ride from place to place on Kivotos' highways."
1002402-25 = "It would take months for me to do a complete lap around all of Kivotos."
1002402-26 = "[s] \"Oh, so that's what you're up to.\""
1002402-27 = "Why do you seem so relieved?"
1002402-28 = "Sorry. I must have said something that caused a misunderstanding. "
1002402-29 = "I was only talking about my hobby. I didn't mean to worry you."
1002402-30 = "[s] \"Are you going alone?\""
1002402-31 = "Yes... I asked the others, but they didn't seem interested."
1002402-32 = "On average, it takes three weeks to ride 4,000 kilometers...but I think the design of riding suits may have also been a factor."
1002402-33 = "However, suits like these are necessary when traveling long distances. "
1002402-34 = "[s] \"...\""
1002402-35 = "Hmm? You don't have to worry about me, Sensei. I've been training for this."
1002402-38 = "I also gave my bike a tune up. I have spare tubes, repair tools, a portable pump, and camping tools with toiletries for sleeping outdoors."
1002402-39 = "[s] \"You're going to be camping outdoors too?!\""
1002402-40 = "Yes. Some stretches mean traveling across deserted roads for several days. "
1002402-41 = "I can go three days without sleep if I must, but I'd rather not. I know it's important to rest, so I took time for breaks into account."
1002402-42 = "Oh, and I packed this mask just in case."
1002402-43 = "[s] \"I'll be taking that!\""
1002402-44 = "But why...?"
1002402-45 = "[s] \"I'm still worried. Are you sure you'll be okay?\""
1002402-46 = "I don't think there's anything to be concerned about, personally."
1002402-47 = "..."
1002402-48 = "But I am starting to get second thoughts seeing how worried you are."
1002402-49 = "Should I postpone this until later?"
1002402-50 = "Huh?"
1002402-51 = "You don't think I should? But you just said you were worried."
1002402-52 = "[s3] \"Just...make sure to keep in touch frequently.\"\n[s4] \"I want you to keep me up to date on MomoTalk.\""
1002402-53 = "A message through MomoTalk will be enough?"
1002402-54 = "A message through MomoTalk will be enough?"
1002402-55 = "Oh."
1002402-56 = "That's true. I could always contact you through MomoTalk during my trip."
1002402-57 = "It's fine as long as I contact you often enough?"
1002402-58 = "[s5] \"Sure, as long as we can reach each other.\"\n[s6] \"I may occasionally come looking for you.\""
1002402-66 = "Thank you, Sensei. I feel somewhat better now."
1002402-67 = "I'll make sure to contact you...every time I stop."
1002402-68 = "I'll see you later, Sensei."
1002402-69 = "[s] \"Have a safe trip.\""
1002402-70 = "Yes."

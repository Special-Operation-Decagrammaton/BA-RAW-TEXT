1002102-6 = "3;아즈사 수영복ND;01\n#3;a\n#wait;1500"
1002102-7 = "3;아즈사 수영복ND;01;여기 있었구나, 선생님. 예상대로 무방비한 취약지점에 앉아 있었네."
1002102-8 = "3;아즈사 수영복ND;02;갑자기 무슨 말이냐고? 말했잖아. 여긴 너무 위험하다고.\n#3;em;[반응]"
1002102-9 = "3;아즈사 수영복ND;99;이렇게 탁 트인 장소, 엄폐할 곳도 방호할 곳도 없는 곳은 전술상 좋지 않아."
1002102-10 = "3;아즈사 수영복ND;02;……응? 왜 해변에 와서까지 그런 걸 신경 쓰야 하는 거냐고?"
1002102-11 = "3;아즈사 수영복ND;04;선생님은 너무 낙관적인 게 문제야. 적습이라는 건 원래 예기치 못한 데에서 오는 거라고."
1002102-12 = "3;아즈사 수영복ND;01;이런 곳이야말로 전술적으로 공격당하기 가장 적합한 곳이라고."
1002102-13 = "3;아즈사 수영복ND;02;조금 전만 해도…… 앗……!!"

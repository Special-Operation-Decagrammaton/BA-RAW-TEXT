[translation]
1002102-1 = "Priority Subject"
1002102-2 = "I decided to tell Azusa my location."
1002102-3 = "Soon after, I saw Azusa approaching me in a hurry from afar."
1002102-7 = "You're here, Sensei. As expected, you're sitting in a completely exposed location."
1002102-8 = "Did I not tell you how dangerous it is here?"
1002102-9 = "Tactically speaking, an open spot like this with no nearby cover or shelter is indefensible."
1002102-10 = "Huh? Why am I worried about that at a beach?"
1002102-11 = "Your problem is that you're too optimistic, Sensei. Enemies are prone to attack from unexpected places."
1002102-12 = "Tactically speaking, this is the ideal spot for an ambush."
1002102-13 = "Just a little while ago... Oh!"
1002102-14 = "Sensei! Get down!"
1002102-17 = "[ns] \"...?!\""
1002102-19 = "..."
1002102-20 = "Phew."
1002102-21 = "I guess it was just a tourist. We're all clear. As you were."
1002102-22 = "[s1] \"I don't think you need to be so tense.\"\n[s2] \"Azusa, you're the one who should stand down, not me.\""
1002102-23 = "I wish you wouldn't say that."
1002102-24 = "I wish you wouldn't say that."
1002102-25 = "If they were actually hostile, we could have been in real danger."
1002102-26 = "I get what you're trying to say, but it's too risky for us to let our guard down."
1002102-27 = "If you're not careful, you may end up regretting it."
1002102-28 = "Just as I thought, this spot is no good. Let's go somewhere else. I'll find a more fortified location."
1002102-29 = "Huh? You wanna stay here?"
1002102-30 = "Sensei, I thought I explained pretty clearly..."
1002102-31 = "Hmm."
1002102-32 = "[s] \"Azusa?\""
1002102-33 = "*sigh* Okay. I suppose I should respect the views of the person under my protection."
1002102-34 = "But I need you to listen to me from now on."
1002102-35 = "First, I need to secure this area. Stay there, and don't move."
1002102-36 = "[s] \"Secure the area?\""
1002102-37 = "Yes. We need at least rudimentary defense measures. It won't take long."
1002102-39 = "*brandishes a shovel*"
1002102-40 = "[s] \"Why do you have that?!\""
1002102-41 = "Defenses don't get more rudimentary than walls."
1002102-42 = "Don't worry. My familiarity will make this go quickly. The ground is mostly sand, so it'll be easy to dig."
1002102-44 = "Azusa started digging down into the sand without hesitation."
1002102-46 = "Hmm. It looks kind of awkward, but this will do for now."
1002102-47 = "[s3] \"You're already done?!\"\n[s4] \"How did you...?\""
1002102-48 = "I've run these drills so many times, I'm not even moved by compliments."
1002102-49 = "I've run these drills so many times, I'm not even moved by compliments."
1002102-50 = "But I think this will help protect you. I guess you never know what will be useful."
1002102-51 = "Here, Sensei. Come in this way."
1002102-54 = "I went inside and sat down next to Azusa."
1002102-55 = "Like Azusa said, though it was made of sand, it felt like a small, cozy booth deep under the ground."
1002102-56 = "*sigh* Much better..."
1002102-57 = "Huh? What's wrong, Sensei?"
1002102-58 = "Hmm? What?"
1002102-59 = "I'm the one who's been tense?"
1002102-60 = "You're hoping I can relax a bit in here?"
1002102-61 = "Th-That's ridiculous!"
1002102-62 = "I've told you many times that this is all for your own safety."
1002102-63 = "I'm not tense at all. I'm just very vigilant when it comes to security. Please don't misconstrue the two."
1002102-64 = "I went out of my way to come to you because..."
1002102-65 = "Wh-What's that face for?"
1002102-66 = "Why are you looking at me like that?"
1002102-67 = "[s5] \"Want something sweet? It'll calm your nerves.\"\n[s6] \"You know you can talk to me if you're nervous, right?\""
1002102-68 = "O-Oh. That's a good idea. Then, I..."
1002102-69 = "...?"
1002102-70 = "R-Really? Are you sure, Sensei?"
1002102-71 = "Then, I'll keep..."
1002102-72 = "Oh."
1002102-73 = "...!"
1002102-76 = "Azusa's face turned bright red, and the sound of the gunshot she fired echoed through the air."
1002102-77 = "Of course, the nearby shop owners rushed in to give us a warning. Azusa and I apologized to them together."

1002102-21 = "3;아즈사 수영복ND;01;그냥 관광객이었나. 이젠 괜찮아. 다시 일어나도 좋아."
1002102-22 = "[s1] \"너무 긴장하지 않아도 될 거 같은데.\"\n[s2] \"왠지 긴장하고 있는 건 아즈사 쪽 같은데.\""

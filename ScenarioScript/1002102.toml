[translation]
1002102-1 = "護衛對象"
1002102-2 = "（總之先告訴梓自己的所在位置）"
1002102-3 = "（過了一會，看見梓從遠處小跑步過來的身影）"
1002102-7 = "你在這裡啊，老師。#n唉，和預期的一樣……這裡實在太缺乏防備了。"
1002102-8 = "什麼意思……？#n和我在Momotalk上說過的一樣，這附近很危險。"
1002102-9 = "視野如此開闊，就代表會很容易被狙擊。#n這種沒有遮蔽物的地方，以戰術觀點來看並不好。"
1002102-10 = "……是我想太多了？"
1002102-11 = "老師的心情我能理解，但也不要喜上心頭。#n這種時候最可能受到敵襲。"
1002102-12 = "再加上身處這種地方，簡直就像是把自己送上刀口一樣。"
1002102-13 = "更何況……！！"
1002102-14 = "老師，快趴下！！"
1002102-17 = "[ns] 「……！？」"
1002102-19 = "……"
1002102-20 = "……呼。"
1002102-21 = "只是普通的遊客嗎……沒事了，可以起來了。"
1002102-22 = "[s1] 「應該不需要那麼緊張吧……？」\n[s2] 「難道身處不習慣的地方，讓梓緊張了？」"
1002102-23 = "我，我沒有……"
1002102-24 = "我，我沒有……"
1002102-25 = "不是這樣的。#n實際上剛才的遊客，也可能是在接近我們之前都隱藏著敵意。"
1002102-26 = "難得來到海邊，我也明白老師的意思。#n但無論何時都要以防萬一。畢竟日常生活中也會潛藏著危險。"
1002102-27 = "一時的大意也可能導致無法挽回的後果。"
1002102-28 = "……這裡果然不安全，快點換地方吧。我會去尋找更安全的地方。"
1002102-29 = "嗯？你想和我一起待在這邊？"
1002102-30 = "老師……我都說了……"
1002102-31 = "……"
1002102-32 = "[s] 「梓？」"
1002102-33 = "唉……我知道了。#n對這類任務而言，尊重護衛對象的意見也是必要的。"
1002102-34 = "……不過相對的，為了實現老師的要求，必須依照我說的話去做。"
1002102-35 = "我會先讓這個地方變得安全，稍微等我一下。#n千萬不能到處亂跑。"
1002102-36 = "[s] 「變得安全？」"
1002102-37 = "嗯，不會花太久時間。"
1002102-39 = "（咻）"
1002102-40 = "[s] 「這鏟子是哪來的！？」"
1002102-41 = "別擔心，我很熟練了。"
1002102-42 = "而且這附近似乎不算難挖。"
1002102-44 = "（還來不及阻止，梓就以熟練的動作開始挖開沙地）"
1002102-46 = "嗯，雖然簡陋但就先這樣吧。至少是個合格的狀態。"
1002102-47 = "[s3] 「也太快！？」\n[s4] 「這不是纖細的手臂該有的速度……」"
1002102-48 = "這點程度沒什麼。我已經做過數十數百次了。"
1002102-49 = "這點程度沒什麼。我已經做過數十數百次了。"
1002102-50 = "……不過，真沒想到這項技能可以對保護老師有所貢獻。#n果然世事難料。"
1002102-51 = "來，老師，進來這邊吧。"
1002102-54 = "（進去坐在梓旁邊）"
1002102-55 = "（裡面意外的舒適，就像是個小小的祕密基地）"
1002102-56 = "……這樣就能暫且放心了。"
1002102-57 = "嗯？你怎麼了，老師？"
1002102-58 = "……嗯？"
1002102-59 = "很高興我稍微沒那麼緊張了……？"
1002102-60 = "希望我可以再放鬆一點，和老師一起玩？"
1002102-61 = "什……！"
1002102-62 = "……不對。#n我應該已經說過很多次了，這全都是為了老師的安全著想。"
1002102-63 = "不是因為第一次來到海邊所以會緊張。#n時常警戒四周本來就是我的職責。"
1002102-64 = "專程跑來找老師也是因為，那個……"
1002102-65 = "……那，那是什麼表情……"
1002102-66 = "你想說什麼……？"
1002102-67 = "[s5] 「聽說糖分有助於消除緊張，要吃點什麼嗎？」\n[s6] 「無法消除緊張時，隨時可以來找我唷。」"
1002102-68 = "啊，嗯。那麼……"
1002102-69 = "……"
1002102-70 = "真，真的可以嗎……？"
1002102-71 = "那我就……"
1002102-72 = "……啊。不，不對，那個──"
1002102-73 = "……～～！！！老師！！"
1002102-76 = "（梓漲紅著臉發出的槍聲響徹四周）"
1002102-77 = "（……導致周圍的店家聽到騷動紛紛跑來查看，後來和梓一起向他們道了歉）"

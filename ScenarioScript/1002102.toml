[translation]
1002102-1 = "คนที่ต้องคุ้มครอง"
1002102-2 = "(คุณครูบอกตำแหน่งให้กับอาซึสะอย่างเสียไม่ได้)"
1002102-3 = "(หลังจากนั้นไม่นานก็เห็นอาซึสะเดินเข้ามาแต่ไกลๆ)"
1002102-7 = "อยู่ตรงนี้นี่เองเหรอคุณครู มาอยู่ในจุดเสี่ยงและไม่มีอะไรป้องกันตัวอย่างที่คิดไว้เลย"
1002102-8 = "สงสัยว่าทำไมฉันถึงพูดแบบนี้น่ะเหรอ? ก็อย่างที่บอกไปไง ที่นี่น่ะมันอันตราย"
1002102-9 = "ที่ที่เปิดกว้าง แถมยังไม่มีทั้งที่กำบังและป้องกันแบบนี้ มันไม่ดีในเชิงยุทธศาสตร์เลยนะ"
1002102-10 = "หืม...? สงสัยว่าฉันมาที่ชายหาดแล้วมากังวลอะไรแบบนี้ทำไมอย่างนั้นน่ะเหรอ?"
1002102-11 = "คุณครูรู้มั้ยว่าตัวเองน่ะมองโลกในแง่ดีมากเกินไป? ปกติแล้วการจู่โจมแบบฉับพลันจะมาจากที่ที่#nคาดเดาไม่ถึงนะ"
1002102-12 = "ที่แบบนี้แหละคือที่ที่เราถูกโจมตีได้ง่ายที่สุดในเชิงยุทธศาสตร์"
1002102-13 = "แถมเมื่อกี๊ก็ยัง... อ๊ะ...!!"
1002102-14 = "คุณครู! หมอบลง!!"
1002102-17 = "[ns] \"......!?\""
1002102-19 = "......"
1002102-20 = "เฮ้อ..."
1002102-21 = "แค่นักท่องเที่ยวหรอกเหรอ งั้นก็ปลอดภัยแล้วละ ลุกขึ้นได้แล้ว"
1002102-22 = "[s1] \"ไม่ต้องกังวลมากขนาดนั้นก็ได้\"\n[s2] \"อาซึสะดูจะกังวลมากกว่าครูอีกนะ\""
1002102-23 = "พูดอะไรแบบนี้อีกแล้ว..."
1002102-24 = "พูดอะไรแบบนี้อีกแล้ว..."
1002102-25 = "ถ้าคนพวกนั้นคิดร้ายอะไรขึ้นมาล่ะจะทำยังไง?"
1002102-26 = "ฉันรู้หรอกนะว่าคุณครูจะสื่อว่าอะไร แต่การอยู่คนเดียวย่อมอันตรายอยู่ดีนั่นแหละ"
1002102-27 = "ถ้าไม่ระวังตัวละก็ ต่อไปถ้าโดนอะไรขึ้นมาจะย้อนเวลากลับไม่ได้นะ"
1002102-28 = "ฉันว่าไม่ได้การแล้ว เราย้ายที่กันเถอะ ฉันจะไปหาที่ที่ปลอดภัยกว่านี้เอง"
1002102-29 = "หืม? อยากอยู่ที่นี่งั้นเหรอ?"
1002102-30 = "คุณครู... ฉันอุตส่าห์อธิบายไปตั้งขนาดนั้นแล้วนะ..."
1002102-31 = "อืม..."
1002102-32 = "[s] \"อาซึสะ?\""
1002102-33 = "เฮ้อ... ก็ได้ๆ การเคารพความเห็นของคนที่ต้องคุ้มกันก็สำคัญเหมือนกัน"
1002102-34 = "แต่ว่าคุณครูต้องทำตามที่ฉันบอกนะ"
1002102-35 = "ก่อนอื่นฉันจะทำให้ที่นี่ปลอดภัย ช่วยรอก่อนนะ ห้ามไปที่อื่นเด็ดขาดล่ะ"
1002102-36 = "[s] \"ทำให้ปลอดภัยเหรอ?\""
1002102-37 = "อื้ม อย่างน้อยเราก็ต้องมีความปลอดภัยขั้นพื้นฐานก่อน ฉันไม่ใช้เวลานานหรอก"
1002102-39 = "(พรึ่บ)"
1002102-40 = "[s] \"ทำไมจู่ๆ ก็หยิบพลั่วขึ้นมาล่ะ!?\""
1002102-41 = "ถามแปลก ก็เราต้องสร้างที่มั่นไง"
1002102-42 = "ไม่ต้องกังวลหรอก เรื่องกล้วยๆ แบบนี้ฉันทำแป๊บเดียวก็เสร็จ แถมทรายนี่ยังขุดง่ายด้วย"
1002102-44 = "(คุณครูยังไม่ทันได้พูดอะไรเพื่อห้าม อาซึสะก็เริ่มขุดทรายด้วยท่าทางที่ชำนาญแล้ว)"
1002102-46 = "อืม น่าจะได้แล้วนะ ถึงมันจะลวกๆ ไปหน่อยก็เถอะ แต่ยังไงก็มีรูปร่างพอรับได้แล้วละ"
1002102-47 = "[s3] \"เสร็จแล้วเหรอ!?\"\n[s4] \"ใช้เวลาไปแป๊บเดียวเองนี่นา!?\""
1002102-48 = "เรื่องแบบนี้ฉันทำบ่อยจนชินแล้วล่ะ อีกอย่าง นี่ไม่ใช่เรื่องที่น่าชื่นชมด้วย"
1002102-49 = "เรื่องแบบนี้ฉันทำบ่อยจนชินแล้วล่ะ อีกอย่าง นี่ไม่ใช่เรื่องที่น่าชื่นชมด้วย"
1002102-50 = "สิ่งนี้ช่วยคุ้มกันคุณครูได้ละตอนนี้ ใครจะไปคิดล่ะว่าจะได้ใช้ประโยชน์ขึ้นมาจริงๆ"
1002102-51 = "เอาละคุณครู รีบเข้ามาในนี้เร็ว"
1002102-54 = "(คุณครูเข้าไปนั่งข้างอาซึสะ)"
1002102-55 = "(ถึงจะเป็นทราย แต่ก็เหมือนบูธเล็กๆ ที่อบอุ่นสบายและลึกใช้ได้)"
1002102-56 = "ฮู่ว... ทีนี้ก็วางใจได้แล้วละ..."
1002102-57 = "หืม? เป็นอะไรไปล่ะคุณครู?"
1002102-58 = "หือ...? ว่าไงนะ?"
1002102-59 = "เป็นฉันเองที่กังวลมากไปจริงๆ งั้นเหรอ?"
1002102-60 = "ให้อยู่ที่นี่อย่างวางใจงั้นเหรอ?"
1002102-61 = "พูดอะไรของคุณครูเนี่ย...!"
1002102-62 = "ฉันพูดไปตั้งกี่รอบแล้ว! ฉันสร้างที่นี่เพื่อความปลอดภัยของคุณครูต่างหาก"
1002102-63 = "แล้วก็ไม่ได้กังวลอะไรเลยด้วย ฉันก็แค่พิถีพิถันกับการป้องกันตัวเท่านั้น อย่าเข้าใจผิดล่ะ"
1002102-64 = "แล้วก็การที่ฉันมาหาคุณครูแบบนี้..."
1002102-65 = "อะไรกันน่ะ..."
1002102-66 = "ทำไมทำหน้าแบบนั้น...?"
1002102-67 = "[s5] \"น้ำตาลมันดีต่อการผ่อนคลายนะ กินอะไรหน่อยมั้ย?\"\n[s6] \"ถ้ากังวลอะไรก็มาหาครูแบบนี้ได้ตลอดนะ\""
1002102-68 = "อะ... อื้ม... ก็เป็นความคิดที่ดีนะ ถ้างั้น..."
1002102-69 = ".....?"
1002102-70 = "ให้ฉันทำแบบนั้น... ได้จริงๆ เหรอ?"
1002102-71 = "ถ้าอย่างนั้นฉันจะ..."
1002102-72 = "อ่า..."
1002102-73 = "......~~!!!!"
1002102-76 = "(เสียงปืนของอาซึสะที่หน้าแดงดังขึ้นในอากาศ)"
1002102-77 = "(เจ้าของร้านรอบๆ ต่างแห่เข้ามาตักเตือน คุณครูจึงขอโทษขอโพยด้วยกันกับอาซึสะ)"

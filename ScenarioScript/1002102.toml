1002102-24 = "3;아즈사 수영복ND;07;또, 또 그런 소릴……\n#3;em;…"
1002102-25 = "3;아즈사 수영복ND;06;방금 전만 해도 정말 그들이 적의를 가지고 있었다면 위험했을 거야."
1002102-26 = "3;아즈사 수영복ND;99;선생님이 무슨 말을 하는지는 알아. 하지만 만에 하나라는 것은 항상 위험한 법이니까."
1002102-27 = "3;아즈사 수영복ND;04;그런 걸 안 챙기면, 나중에 당했을 때는 이미 되돌릴 수 없게 된다고."
1002102-28 = "3;아즈사 수영복ND;06;역시 안 되겠어. 어서 장소를 옮기자. 내가 보다 안전한 장소를 찾아볼 테니까.\n#3;m4"

[translation]
10026065-7 = "ฮู่ว... เมื่อกี้ชุดสุดท้ายแล้วเนอะ..."
10026065-8 = "เราทำได้จริงๆ ด้วยนะคะ! รู้สึกเบาใจขึ้นมาเลย... รู้สึกว่างานง่ายเหมือนกับตากผ้าในวิหารเลยค่ะ!"
10026065-9 = "เอ๋? ทำไมคุณครูทำท่าทางแบบนั้นล่ะคะ...? เป็นอะไรหรือเปล่า...?"
10026065-10 = "ระ... หรือว่าบาดเจ็บตรงไหนคะ!? ฉันนึกว่าจะขวางทุกคนไว้ได้แล้วเสียอีก...! อย่าบอกนะว่า...!"
10026065-11 = "...อ่า ไม่เป็นไรงั้นเหรอคะ? ไม่ใช่เพราะฉันคุ้มกันไม่ดีงั้นเหรอคะ? ฮู่ว... ถ้าอย่างนั้นก็โล่งอกไปทีค่ะ..."
10026065-12 = "เมื่อกี้ใจฉันตกลงไปอยู่ตรงตาตุ่มแล้วเลยค่ะ นึกว่าความดื้อดึงของฉันจะไปทำให้คุณครูต้องได้รับบาด#nเจ็บซะแล้ว..."
10026065-19 = "...เอ๋? เสียงนี้มัน..."
10026065-20 = "มะ... เมื่อกี้เสียงอะไรเหรอคะ!?  ทำไมถึงมีเสียงยิงระเบิดไม่หยุดเลย...!?"
10026065-21 = "คะ... คุณครู...!?  คุณฮินาตะ...?"
10026065-23 = "ทั้งสองคนปลอดภัยดีสินะคะ เสียงเมื่อกี้น่ะ..."
10026065-24 = "อ่า... สะ... เสียงเหรอคะ? เสียง...? อ่า เสียงระเบิด..."
10026065-25 = "... เฮือก"
10026065-26 = "คะ... คือว่า... พอดีว่า! คือแบบ...!!  เอ่อ...!!"
10026065-27 = "มะ... ไม่มีอะไรทั้งนั้นค่ะ! ทุกคนไม่ถึงกับต้องออกมากันขนาดนี้ก็ได้ ไม่ต้องห่วงนะคะ!"
10026065-28 = "มีงานที่ทำกันอยู่ไม่ใช่เหรอคะ? ฉันแค่ช่วยทำบางอย่างเพื่อไม่ให้เกิดเรื่องอะไรที่จะไปรบกวนการ#nสำรวจของทุกคน แต่ถ้าเป็นแบบนี้มันก็หมดความหมาย..."
10026065-29 = "...หมายความว่ายังไงนะคะ? ไม่มีเรื่องอะไรเกิดขึ้น แต่ก็มีเสียงยิงระเบิดดังหลายสิบครั้งเลยเนี่ยนะคะ?"
10026065-30 = "จะพูดอะไรอ้อมแอ้มก็เอาให้มันพอดีๆ เถอะ..."
10026065-31 = "[s1] \"ไม่มีอะไรมากหรอก ไม่ต้องกังวลกันนะ\"\n[s2] \"ไม่มีอะไร... ทั้งนั้น!\""
10026065-34 = "...? อะไรกัน... คุณครูก็เป็นไปกับเค้าด้วยเหรอ..."
10026065-38 = "อ๋อ... อย่างนี้นี่เองสินะคะ"
10026065-39 = "สงสัยรอจนเบื่อเลยลุกขึ้นมาซ้อมยิงปืนสินะคะ งั้นพวกเรากลับไปสำรวจกันต่อไหมคะ? คุณอุย?"
10026065-40 = "...?????????"
10026065-41 = "อะไรกันคะ? ทำไมทุกคนเหมือนเตี๊ยมกันมาเลยงั้นแหละ? นี่เล่นทรีนิตี้การละครอะไรกันอยู่เปล่าคะ?"
10026065-42 = "เอาละๆ คุณครูก็บอกเองนี่คะว่าไม่มีเรื่องอะไร ถ้ามีเรื่องใหญ่โตจนต้องเรียกพวกเราออกมา ก็คงเรียก#nไปแล้วละค่ะ เรากลับไปทำงานกันต่อเถอะนะคะ"
10026065-43 = "เดี๋ยวสิ ทำไมเราไม่ตรวจสอบสถานการณ์กันก่อนล่ะคะ? คนเค้าพูดก็ฟังกันบ้าง..."
10026065-45 = "รุ่นพี่ โค เซ กิ?"
10026065-46 = "ฮะ... เฮือก...!?  อะ... อะไร?!  เรียกทำไมคะ!?"
10026065-47 = "ระ... รู้แล้วค่ะ ก็ได้ๆ! ถึงจะไม่เข้าใจอะไรเลยสักกะนิด... แต่ก็กลับเข้าไปก็ได้ค่ะ...!!"
10026065-48 = "ถะ... ถ้างั้นฉัน... ขอกลับเข้าไปสำรวจต่อ... ไปละค่ะ..."
10026065-53 = "...ฮุฮุ♡"
10026065-54 = "[s] \"ขอบใจนะ ฮานาโกะ\""
10026065-55 = "อุ๊ย พูดเรื่องอะไรไม่เห็นเข้าใจเลยค่ะ จู่ๆ ก็มาขอบคุณกันแบบนี้..."
10026065-56 = "งั้นเราก็ตามคุณอุยเข้าไปสำรวจกันไหมคะ โคฮารุจัง?"
10026065-57 = "อะ... เอ่อ...? อะ... อืม... อื้อ..."
10026065-62 = "[ns3] \"ทำเนียนๆ ไปได้ด้วยดีเลยละ\"\n[ns4] \"แต่ก็นะ เมื่อกี้เสียงดังใช่เล่นเลย\""
10026065-65 = "อ่า แหะๆๆๆ... ยะ... อย่างนั้นเหรอคะ... มันเหมือนจะผ่านไปได้ด้วยดี แต่ก็เหมือนจะไม่ดีด้วย..."
10026065-66 = "ถือว่าผ่านไปได้ด้วยดี... ใช่ไหมคะ? ฮ่าฮ่าฮ่า..."
10026065-67 = "ฉันไม่ได้ตั้งใจจะให้มันเป็นแบบนั้นเลย แต่ทำไมถึงได้รู้สึกเหมือนกับว่าตัวเองดันไปสร้างความลับที่#nไม่ได้บอกคนอื่นยังไงยังงั้นเลยค่ะ"
10026065-68 = "ซิสเตอร์ไม่ควรทำแบบนี้เลยแท้ๆ เชียว... อืม... แบบนี้จะไม่เป็นไรใช่ไหมคะ...?"
10026065-69 = "[s5] \"ไม่เป็นไรอยู่แล้ว อยู่ที่นี่ก็เชื่อฟังคำของครูนะ\"\n[s6] \"งั้นเวลาที่เหลือ เรามาพักชิลๆ กันดีไหม?\""
10026065-75 = "...ฮุฮุ ขอบคุณค่ะคุณครู"
10026065-76 = "ขอบคุณที่ช่วยพูดแบบนั้นนะคะ... พอฟังแล้วก็สบายใจขึ้นมาเลยค่ะ"
10026065-77 = "ถ้าอย่างนั้นแล้วฉันเองก็..."
10026065-81 = "จะเก็บเรื่องที่มันเกิดขึ้นตรงนี้ไว้เป็นความลับตามที่คุณครูบอกนะคะ"
10026065-83 = "(หลังจากนั้นคุณครูกับฮินาตะก็เฝ้าของด้วยกันและใช้เวลาที่เหลืออย่างสบายๆ)"

[translation]
10026065-7 = "呼……剛才那就是最後一個了……"
10026065-8 = "人果然只要努力就什麼都能辦得到！#n這種通體舒暢的感覺……簡直就像把教堂裡洗好的衣物拿去曬一樣！"
10026065-9 = "咦？老師您的反應……怎麼了嗎……？"
10026065-10 = "難，難道是受傷了！？#n還以為我有擋住所有攻擊的……怎麼會……！"
10026065-11 = "……啊，您說沒有受傷？跟那沒關係？#n呼……太好了……"
10026065-12 = "要是老師因為我的任性而受傷，我肯定會愧疚得不知該如何是好……"
10026065-19 = "……咦？這個聲音是……？"
10026065-20 = "發，發生什麼事了！？#n為什麼一直聽見榴彈爆炸的聲音……！？"
10026065-21 = "老，老師……！還有日向同學……？"
10026065-23 = "幸好兩位都平安無事。#n所以剛才那個聲音果然是……"
10026065-24 = "聲音……聲音……？#n啊，榴彈的爆炸聲……"
10026065-25 = "……啊。"
10026065-26 = "那，那個……關於這點！#n這個是……！！呃……！！"
10026065-27 = "其，其實也沒什麼！#n大家不必特地跑出來的！"
10026065-28 = "各位應該還有事要忙吧？#n我是因為不想打擾到調查才這麼做的，這樣不就沒有意義了嗎……"
10026065-29 = "……剛才那到底是什麼聲音？#n如果沒事的話，又為什麼會傳來數十發榴彈爆炸的聲音？"
10026065-30 = "想蒙混過關也得找個合理的說法吧……"
10026065-31 = "[s1]「真的沒什麼，你們不用擔心。」\n[s2]「什麼事……都沒發生！」"
10026065-34 = "……？#n那是什麼意思……連老師也……"
10026065-38 = "……呵呵，我明白了。"
10026065-39 = "肯定是因為等得太無聊，所以在練習射擊對吧？#n好，那我們也回燈塔調查吧，憂同學？"
10026065-40 = "……？？？？？？？？"
10026065-41 = "怎麼回事？為什麼你們突然都怪怪的？#n是在演什麼狀況劇嗎？"
10026065-42 = "哎呀哎呀，老師不是也說沒什麼了嗎？#n如果真的發生什麼需要支援的事，老師怎麼可能不通知我們呢？#n所以我們還是趕快回去調查吧。"
10026065-43 = "等等，我們應該先釐清剛才到底發生什麼事才對吧？#n為什麼都不聽我說話……"
10026065-45 = "……古．関．前．輩？"
10026065-46 = "噫，噫噫……！？#n什，什麼，你想做什麼！？"
10026065-47 = "知，知道了，知道了啦！#n雖然還是搞不清楚狀況……我乖乖回去還不行嗎……！！"
10026065-48 = "那，那我就回去……調查了……再見……"
10026065-53 = "……呵呵♡"
10026065-54 = "[s] 「謝謝你，花子。」"
10026065-55 = "哎呀，我不明白老師的意思，為什麼要突然道謝呢……"
10026065-56 = "那我們也跟憂同學一起回去吧，小春醬？"
10026065-57 = "咦……？啊，嗯……"
10026065-62 = "[ns3]「要蒙混過去真不容易。」\n[ns4]「畢竟剛才的騷動還真不小。」"
10026065-65 = "啊，啊哈哈……有順利蒙混過去嗎……#n感覺好像有……又好像沒有……"
10026065-66 = "應該……不會有問題吧？#n哈哈哈……"
10026065-67 = "感覺……雖然完全沒有那個意思，#n卻好像多了一個不能告訴大家的祕密呢……"
10026065-68 = "身為一名修女，這樣是不行的吧……#n唔……這樣真的可以嗎……？"
10026065-69 = "[s5]「沒問題的，這裡就相信老師吧。」\n[s6]「剩下的時間，我們就稍微休息一下吧。」"
10026065-75 = "……呵呵，謝謝您，老師。"
10026065-76 = "您能這麼說……我感覺安心了不少。"
10026065-77 = "我知道了，我會照老師所說……"
10026065-81 = "把這件事當成我們兩人之間的祕密，好好地珍藏在心中。"
10026065-83 = "（之後，和日向一邊顧著搬出來的物品，一邊悠閒地打發時間）"

[translation]
10026065-7 = "Phew! That's the last of them..."
10026065-8 = "Everything worked out fine! In fact, it was quite refreshing, like doing the cathedral's laundry!"
10026065-9 = "Sensei...? What's wrong?"
10026065-10 = "A-Are you hurt?! Oh no! I was sure I blocked all of them!"
10026065-11 = "Oh! You're okay? Well, that's good..."
10026065-12 = "If I thought you got hurt because of my stubbornness, it would have broken my heart—"
10026065-19 = "Oh! Do you hear that? What's going on NOW?"
10026065-20 = "Wh-What is that sound?! It's like a grenade went off, and then..."
10026065-21 = "S-Sensei?! Hinata...?"
10026065-23 = "I'm glad to see you're both safe. But what was that racket?"
10026065-24 = "Oh, uh... The grenade sound?"
10026065-25 = "*gasp*"
10026065-26 = "It's— I mean, that's, uh..."
10026065-27 = "Nothing! It's nothing for you to worry about!"
10026065-28 = "Really! Don't let a few little grenade blasts distract you from your investigations."
10026065-29 = "What do you mean? Dozens of grenades exploded. That seems like something we should worry about."
10026065-30 = "There's a limit to how much you can just wave off as nothing..."
10026065-31 = "[s1] \"We know. But it really was nothing. Don't worry.\"\n[s2] \"Nothing happened! Everything's fine!\""
10026065-34 = "You too, Sensei...?"
10026065-38 = "Ah, I see."
10026065-39 = "You two got tired of waiting around for us and started practicing some firing drills, didn't you? Okay. Let's go back inside and finish our investigation, Ui."
10026065-40 = "...?"
10026065-41 = "What's going on? Why are you all acting so strange? Is this some kind of prank?"
10026065-42 = "Ui, relax. If Sensei says it's nothing, then it's fine. If it were serious, they would have called us. Now come on..."
10026065-43 = "We'll just check things out here first, okay? Please... Listen when people talk to you..."
10026065-45 = "K-O-Z-E-K-I?"
10026065-46 = "Gah! Don't scare me like that!"
10026065-47 = "...Okay, fine! I don't know what's happening, but...I'll go back in, all right?!"
10026065-48 = "You know, just to do more research..."
10026065-53 = "...Heehee. ♡"
10026065-54 = "[s] \"Thank you, Hanako.\""
10026065-55 = "Oh my, I don't know what you're thanking me for all of a sudden..."
10026065-56 = "Koharu, shall we follow Ui?"
10026065-57 = "Hm...? Uh, yeah..."
10026065-62 = "[ns3] \"I can't believe you pulled that off.\"\n[ns4] \"It was pretty loud.\""
10026065-65 = "Ahahaha... Well, I guess it went all right..."
10026065-66 = "For once... Hahaha..."
10026065-67 = "It wasn't my intention, but...I guess it'll be our little secret."
10026065-68 = "Though it's probably not something a Sister should be doing... Hm... I hope it's okay."
10026065-69 = "[s5] \"Of course it is.\"\n[s6] \"Listen. Why don't you take the rest of the day to relax?\""
10026065-75 = "...Heehee... Thank you, Sensei."
10026065-76 = "It's a lot easier to relax when it's you saying that, Sensei."
10026065-77 = "In that case, I'll do what you said."
10026065-81 = "I'll keep it a secret."
10026065-83 = "I spent the rest of the day relaxing and keeping an eye on Hinata and the luggage."

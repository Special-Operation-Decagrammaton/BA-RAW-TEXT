[translation]
10046050-1 = "第5話;Never Carpe Diem"
10046050-6 = "──綜上所述，貓是會笑的哦。"
10046050-10 = "聖亞同學，你有在聽嗎？"
10046050-11 = "唔，居然真的在飯後馬上接著喝下午茶……"
10046050-12 = "……你在說什麼？#n就算跳過正餐，也不能跳過下午茶吧？"
10046050-14 = "所言甚是。"
10046050-19 = "難不成，我才是少數派嗎？"
10046050-20 = "肚子不舒服的時候果然還是最適合喝紅茶。#n再來一杯吧。"
10046050-21 = "沒錯，茶有助於消化。#n請稍等，我來為您倒茶。"
10046050-26 = "…………"
10046050-27 = "…………！"
10046050-31 = "那個，渚大人？#n您為何這樣盯著我看呢？"
10046050-35 = "不，沒什麼。#n我當然明白有那樣的喜好是很正常的。"
10046050-36 = "我們應該尊重多樣性才對。"
10046050-37 = "恕我冒昧，不過您剛才的發言……聽起來好像我用了奇怪的方法倒茶似的。"
10046050-38 = "那並非我的本意。#n假如聽起來是如此的話，我願意向你道歉。"
10046050-39 = "不過如果換作是我的話──會先倒牛奶再倒紅茶。"
10046050-44 = "啊。"
10046050-45 = "……真令人意外。"
10046050-46 = "其他人也就罷了，沒想到像渚大人這般對茶有深厚造詣的人會這麼說。"
10046050-47 = "當然，如果茶葉的品質低到必須用牛奶來掩蓋氣味的話，我也會選擇先倒牛奶。"
10046050-51 = "然而我們現在品嘗的，可是從山海經的茶園直接空運過來的[ruby=單品]名茶[/ruby]。#n是平時根本不會加牛奶來喝的上等茶葉……！"
10046050-52 = "為了避免香氣消散，先將紅茶倒入杯中形成茶膜──#n接著再細緻地倒入冷牛奶，使其達到適當的溫度與濃度。"
10046050-53 = "我認為這是可以接受的最低限度。"
10046050-54 = "請問我的說法有錯嗎？"
10046050-56 = "啊。"
10046050-57 = "當然，享受茶的方式並沒有絕對的正解。#n我也沒有想主張自己的作法才是唯一解的意思。"
10046050-58 = "誠如蓮實同學所說，我也認同先倒茶確實有助於保留原始香氣。"
10046050-59 = "不過那樣的說法，是否過於低估「奶茶」的另一位主角──"
10046050-60 = "也就是牛奶所扮演的角色了呢？"
10046050-64 = "牛奶的香醇滋味和濃郁質地，柔和地包覆紅茶的酸味……#n以及因溫度差異而產生的化學變化。"
10046050-65 = "正是這一切結合在一起，才真正成就了一杯奶茶。"
10046050-66 = "奶茶的本質，比茶葉本身的味道與香氣更加重要……您是這個意思嗎？"
10046050-67 = "這並不只是奶茶，而是「下午茶時間」的奶茶。"
10046050-68 = "已經超越品味的領域，成為了一種習俗與儀式。#n沒錯，甚至稱之為文化的一部分也不為過。"
10046050-69 = "倘若下午茶只是因為時間到了而進行，其意義究竟何在呢？#n那樣的行為──不過只是守時罷了。"
10046050-72 = "…………"
10046050-73 = "…………"
10046050-80 = "[s1]「那個，彌香。」\n[s2]「平常的氣氛也是這樣的嗎？」"
10046050-83 = "不要問我嘛……很害羞耶。"
10046050-84 = "老師在場的時候為什麼要這樣啦，渚醬。"
10046050-85 = "啊，真是不好意思。#n蓮實前輩平時給人的感覺完全不是這樣的。"
10046050-86 = "是因為面對紅茶造詣深厚的渚大人，才會變得不一樣嗎？"
10046050-90 = "……結果導火線還是被點燃了啊。"
10046050-91 = "自建校以來從未停歇的爭論。#n禁忌中的禁忌，三一的禁忌話題。"
10046050-92 = "＜[ruby=無法證明的問題]奶茶到底是先加牛奶，還是先加紅茶……！[/ruby]＞"
10046050-93 = "…………"
10046050-94 = "…………"
10046050-99 = "看來想達成共識似乎很困難呢。"
10046050-100 = "是啊。沒有第三方介入的話，這場爭論恐怕會永遠原地打轉吧。"
10046050-101 = "聖亞同學！"
10046050-102 = "聖亞大人！"
10046050-107 = "彌，彌香……救我……"
10046050-111 = "啊，抱歉啦，聖亞醬！#n我還得準備接下來的行程，現在超忙的！"
10046050-119 = "來吧，聖亞同學！我相信你一定和我有相同的見解！"
10046050-120 = "不，我們應該單純以味道來決勝負才對！#n聖亞大人的味覺，我可是很信賴的！"
10046050-125 = "啊啊……"
10046050-131 = "對不起，老師……"
10046050-132 = "渚醬從以前開始就有點老派……或者說在奇怪的地方很固執。"
10046050-133 = "總之！雖然不在本來的計畫之內，#n我們就趁他們兩個把渚醬纏住的這段時間，趕緊把剩下的行程準備好吧！"
10046050-134 = "拜託你囉，老師！"
10046050-135 = "還有一花醬也是！"
10046050-140 = "是，是！？您叫我嗎！？#n我會努力的！"
10046050-141 = "哎唷，別那麼拘謹嘛～#n我們也才差一歲而已呀。"
10046050-142 = "啊，還是說……一花醬跟我在一起會覺得困擾？"
10046050-143 = "不，不是的！不是那個問題……！"
10046050-144 = "[s3]「彌香不用擔心那種事情。」\n[s4]「一花只是有點怕生而已。」"
10046050-147 = "哈哈……我還是第一次被人家說怕生呢。"
10046050-148 = "話說下一個行程指的是……？"
10046050-149 = "唔嗯，我想想哦～#n總之先來檢查遊艇吧？"
10046050-150 = "啊～是那艘停在海灘邊的遊艇嗎？"
10046050-151 = "雖然跟一開始的計畫有點不太一樣……#n嗯！不過在夕陽下的海面玩耍也不錯吧！"
10046050-152 = "就算搬過來的時候沒發生什麼問題，我還是有點擔心……#n畢竟已經有段時間沒用了。"
10046050-153 = "有段時間沒用……？#n那不是租來的嗎？"
10046050-154 = "嗯，這艘是茶會的遊艇哦。#n只是渚醬跟我都沒有這種興趣……"
10046050-155 = "聖亞醬則是本來就有自己的私人遊艇，所以才沒什麼機會用到它。"
10046050-157 = "活在不同世界的人真可怕……"
10046050-158 = "啊哈哈，確實有點這種感覺對吧？"
10046050-159 = "以前我也不是很懂，不過現在多少能理解了。"
10046050-163 = "啊！我剛才說的這些要記得保密哦？"
10046050-164 = "渚醬跟聖亞醬他們，對茶會成員的「格調」之類的東西超級講究的。"
10046050-165 = "哈哈……辛苦您了。"
10046050-173 = "嗯嗯，準備的東西看起來都沒問題。"
10046050-174 = "接下來只要確認能不能正常發動就好了吧？"
10046050-182 = "……咦？"
10046050-183 = "怎，怎麼會！？明明昨天都還好好的呀！？"
10046050-184 = "唔嗯……看起來是有完全啟動後才熄火，應該不是引擎的問題。"
10046050-185 = "會不會是螺旋槳那邊卡了什麼東西？"
10046050-186 = "我去確認一下。"
10046050-193 = "啊啊～果然沒錯～"
10046050-194 = "嗯？你看到什麼了嗎？#n我這邊完全看不到呢。"
10046050-195 = "啊，是的。#n螺旋槳上好像纏到了塑膠袋之類的東西。"
10046050-196 = "所以只要把它拿掉就行了嗎？"
10046050-197 = "我想應該是這樣沒錯，不過可能需要工具呢。#n這附近有沒有長長的鉤子之類的……"
10046050-198 = "直接下水不就好了嗎？"
10046050-199 = "咦？這個嘛～#n雖然不是不行，但我總覺得有點危險……"
10046050-200 = "不過考慮到找工具的時間……反正都穿著泳裝了，直接跳下去可能比較快……"
10046050-201 = "沒問題，我其實很會打掃喔！"
10046050-202 = "咦？"
10046050-212 = "彌，彌香大人！！"
10046050-214 = "哇啊，好冰！我看看，螺旋槳是……"
10046050-219 = "啊，真的耶。被塑膠袋纏住了。#n一花醬，你眼力真好。"
10046050-220 = "……啊，感，感謝稱讚。#n總覺得有點出乎意料呢。"
10046050-221 = "啊，彌香大人。請等一下，那個我來處理吧。"
10046050-223 = "嗯？沒關係啦。#n一花醬的身體還沒弄濕，我都下水了就順便一起處理就好！"
10046050-224 = "可是那個塑膠袋上都是油……"
10046050-226 = "這種自己能做的事，我還是希望可以自己完成。#n你們已經幫了我很多了。"
10046050-230 = "…………"
10046050-240 = "這樣遊艇的問題就解決了！大家辛苦啦！"
10046050-241 = "哎呀～明明只有彌香大人一個人辛苦的說。"
10046050-242 = "不不不，別這麼說。#n如果只有我一個人的話，根本連為什麼會熄火都搞不清楚。"
10046050-243 = "接下來的行程也請多多指教囉！"
10046050-244 = "是！交給我吧！"
10046050-249 = "…………"
10046050-250 = "彌香大人難得弄了美甲，結果現在全髒了呢……"
10046050-252 = "（之後繼續和兩人一起巡查了其他設施）"
10046050-258 = "咳咳，咳咳！#n哇……灰塵也太多了吧！"
10046050-259 = "看來得來場大掃除了。#n彌香大人，請您先到外面稍等……"
10046050-260 = "嗯！我們一起動手打掃吧！"
10046050-265 = "咦！？啊，是！#n……彌香大人！您頭上有蜘蛛網！"
10046050-266 = "咦？呀啊！？"
10046050-279 = "（在經歷了各種騷動之後…………）"
10046050-284 = "真是辛苦大家了～！"
10046050-289 = "哎呀～居然能準時完成，實在太厲害了。"
10046050-290 = "渚大人看起來也玩得挺愜意的樣子。"
10046050-291 = "嗯，這都多虧了你們的幫忙！謝謝你們！"
10046050-292 = "還有……"
10046050-296 = "對不起。"
10046050-300 = "咦？"
10046050-301 = "[s5]「怎麼了，彌香？」\n[s6]「有什麼讓你在意的事嗎？」"
10046050-306 = "唔嗯，沒有啦～我就只是想說出來而已。"
10046050-307 = "大家難得來到海邊，應該有很多想做的事情才對……#n結果卻從頭到尾都在配合我的任性，你們一定覺得很辛苦吧？"
10046050-308 = "明明大聲說過什麼「我一個人也沒問題」之類的話，#n最後還是受了這麼多幫助，說實話有點不好意思……"
10046050-309 = "哪怕少了你們其中一個人，我應該都沒辦法撐到現在吧。"
10046050-310 = "所以真的很謝謝你們。#n還有，對不起。"
10046050-311 = "彌，彌香大人！請抬起頭來！會被人看到的！"
10046050-312 = "而且該道歉的反而是我才對……也許我之前有點誤會彌香大人了……"
10046050-313 = "嗯？你說什麼？"
10046050-317 = "沒，沒什麼！"
10046050-318 = "現在只剩下檢查別墅了呢。"
10046050-319 = "嗯，不過上午已經檢查過一次了，應該不會有什麼……"
10046050-324 = "咦，咦？地面在晃……！？"
10046050-328 = "[ns7]「地，地震！？」\n[ns8] 用身體護住兩人"
10046050-346 = "彌香大人！老師！兩位沒事吧？"
10046050-352 = "嗯，我沒事。老師也……平安無事，太好了。"
10046050-353 = "話說回來，剛才的震動是……？"
10046050-354 = "咦？"
10046050-358 = "…………？"
10046050-359 = "這……"
10046050-361 = "……這是什麼情況！？"

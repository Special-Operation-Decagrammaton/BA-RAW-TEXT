[translation]
10046050-1 = "ตอนที่ 5;เนเวอร์ คาร์เพ เดียม"
10046050-6 = "ไม่ว่าจะเป็นแมวแบบไหนก็ยิ้มได้ทั้งนั้นละค่ะ"
10046050-10 = "คุณเซอา ฟังฉันอยู่หรือเปล่าคะ?"
10046050-11 = "เฮ้อ... ไม่คิดเลยว่ากินมื้อกลางวันเสร็จก็ต้องต่อด้วยเวลาน้ำชาทันทีเลย"
10046050-12 = "พูดแบบนั้นหมายความว่ายังไงเหรอคะ? ต่อให้เราจะงดมื้ออาหาร แต่เรางดเวลาน้ำชาไม่ได้นะคะ?"
10046050-14 = "เป็นคำพูดที่สมเหตุสมผลเลยค่ะ"
10046050-19 = "ฉันอยู่ในเสียงข้างน้อยของที่นี่งั้นเหรอคะ?"
10046050-20 = "ถ้ารู้สึกไม่สบายท้อง ก็ต้องให้ชาแดงช่วยค่ะ ดื่มเพิ่มอีกสักถ้วยสิคะ"
10046050-21 = "ใช่ค่ะ ชาดีต่อการย่อยอาหาร เดี๋ยวฉันจะรินให้นะคะ"
10046050-26 = "......"
10046050-27 = "......!"
10046050-31 = "เอ่อ คุณนางิสะ? จ้องอะไรกันขนาดนั้นคะ?"
10046050-35 = "เปล่าค่ะ ไม่มีอะไรหรอกค่ะ ฉันรู้ดีค่ะว่าคุณมีรสนิยมแบบนั้น"
10046050-36 = "เราต้องเคารพความแตกต่างซึ่งกันและกันสิคะ"
10046050-37 = "นี่อาจเป็นการเสียมารยาท แต่คุณพูดเหมือนฉันเทน้ำชาให้ด้วยวิธีผิดแปลกเลยนะคะ"
10046050-38 = "ฉันไม่ได้มีเจตนาแบบนั้นค่ะ แต่ถ้ารู้สึกอย่างนั้น ฉันต้องขอโทษด้วยนะคะ"
10046050-39 = "แต่ถ้าเป็นฉัน ฉันจะรินนมก่อน แล้วค่อยรินชาแดงลงไปค่ะ"
10046050-44 = "อ่า..."
10046050-45 = "คิดไม่ถึงเลยนะคะ..."
10046050-46 = "ฉันไม่รู้ว่าคนอื่นจะว่ายังไง แต่ถ้าคนที่มีความรู้ในเรื่องชาอย่างลึกซึ้งถึงกับพูดแบบนั้นละก็"
10046050-47 = "แน่นอนว่าถ้าใบชามีคุณภาพต่ำจนต้องแช่ให้มีกลิ่นหอม ฉันก็จะรินนมลงไปก่อนเหมือนกันค่ะ"
10046050-51 = "แต่ชาของวันนี้คือชาชื่อดังที่ขนส่งทางอากาศมาจากสวนซานไห่จิง ปกติชาพรีเมียมไม่นิยมดื่มกับนม#nหรอกค่ะ...!"
10046050-52 = "หลังจากรินชาในถ้วยเพื่อไม่ให้สูญเสียกลิ่น ก็ให้ค่อยๆ เทนมเย็นๆ ลงไปเพื่อให้ได้อุณหภูมิ และความเข้มข้นที่เหมาะสม"
10046050-53 = "ฉันคิดว่านี่คือสิ่งพื้นฐานที่สุดที่เราประนีประนอมกันได้ค่ะ"
10046050-54 = "ฉันพูดผิดตรงไหนมั้ยคะ?"
10046050-56 = "อ่า..."
10046050-57 = "แน่นอนว่าไม่มีวิธีที่ถูกต้องตายตัวในการดื่มชาหรอกค่ะ แล้วฉันก็ไม่คิดจะยืนกรานว่าวิธีของฉันเท่านั้น#nที่เป็นวิธีที่ถูกต้องด้วยค่ะ"
10046050-58 = "ฉันเห็นด้วยว่าการรินชาลงไปก่อนตามที่คุณฮาสุมิบอกจะช่วยในการรักษากลิ่นดั้งเดิมของชาไว้ค่ะ"
10046050-59 = "แต่พระเอกของชานมไม่ได้อยู่ที่ 'ชา' อย่างเดียวนะคะ..."
10046050-60 = "แบบนี้ถือว่าประเมินบทบาทของ 'นม' ต่ำเกินไปหรือเปล่าคะ?"
10046050-64 = "รสชาติหอมมันกับเนื้อสัมผัสครีมมีของนมที่โอบรับรสเปรี้ยวละมุนของชาแดงอย่างอ่อนโยน ตลอดจนการเปลี่ยนแปลงทางเคมีเนื่องจากความแตกต่างของอุณหภูมิ"
10046050-65 = "ทุกอย่างล้วนแล้วแต่เป็นสิ่งที่ทำให้ชานมสมบูรณ์ค่ะ"
10046050-66 = "คุณนางิสะกำลังบอกว่า... เอกลักษณ์ของชานมนั้นเหนือกว่ารสชาติและกลิ่นดั้งเดิมของชาเหรอคะ?"
10046050-67 = "ฉันไม่ได้หมายถึงชานมทั่วไปค่ะ หมายถึงชานมในเวลาน้ำชายามบ่ายค่ะ"
10046050-68 = "การชงชาคือระเบียบและขั้นตอนอย่างหนึ่งที่เหนือขอบเขตการวิเคราะห์รสชาติ ใช่แล้วละค่ะ จะบอกว่ามันเข้าถึงขอบเขตของวัฒนธรรมแล้วก็ไม่เกินจริงเลยค่ะ"
10046050-69 = "เวลาน้ำชาหรือ 'ทีไทม์' ที่เอาไว้แค่รักษาเวลาเฉยๆ จะไปมีความหมายอะไรล่ะคะ? นั่นมันก็แค่ 'ไทม์' เท่านั้นละค่ะ"
10046050-72 = "......"
10046050-73 = "......"
10046050-80 = "[ns1] \"นี่... มิกะ\"\n[ns2] \"มิกะ นางิสะเป็นอย่างนี้ตลอดเลยเหรอ?\""
10046050-83 = "ไม่ต้องเรียกฉันเลย... แค่นี้ก็อายจะตายอยู่แล้ว"
10046050-84 = "คุณครูก็อยู่ด้วยแท้ๆ ทำไมนางิจังถึงทำตัวอย่างนั้นนะ"
10046050-85 = "อ่า... รู้สึกผิดจังเลยค่ะ ปกติรุ่นพี่ฮาสุมิก็ไม่เป็นแบบนั้นเลยสักนิดค่ะ"
10046050-86 = "พอต้องรับมือกับคุณนางิสะที่มีความรู้เกี่ยวกับชาอย่างลึกซึ้ง ทุกคนจะเปลี่ยนไปแบบนี้เหรอคะ?"
10046050-90 = "อ่า... ในที่สุดชนวนก็ติดแล้วสินะคะ"
10046050-91 = "การถกเถียงที่ไม่เคยสิ้นสุดตั้งแต่ก่อตั้งโรงเรียนมา หัวข้อการอภิปรายที่ไม่ควรพูดถึง สิ่งต้องห้ามของทรีนิตี้"
10046050-92 = "ปัญหาโลกแตกที่ว่า 'ชานมต้องใส่นมก่อน หรือใส่ชาก่อน'...!"
10046050-93 = "......"
10046050-94 = "......"
10046050-99 = "ฉันว่าเราไม่น่าจะคิดเห็นตรงกันได้ง่ายๆ นะคะ"
10046050-100 = "ค่ะ ถ้าไม่ยอมให้มีการแทรกแซงจากบุคคลที่ 3 เราก็จะอยู่ที่เดิมตลอดไปค่ะ"
10046050-101 = "คุณเซอาคะ!"
10046050-102 = "คุณเซอา!"
10046050-107 = "มะ... มิกะ... ช่วยฉันด้วย..."
10046050-111 = "อ๊ะ ขอโทษด้วยนะ เซอาจัง! ฉันต้องไปเตรียมกิจกรรมต่อไปน่ะ!"
10046050-119 = "เอาละค่ะ คุณเซอา! ฉันเชื่อว่าคุณเซอาต้องมีความคิดเห็นอันชาญฉลาดเหมือนกันกับฉันค่ะ!"
10046050-120 = "ไม่ค่ะ เราต้องวัดอย่างใสสะอาดกันด้วยรสชาติสิคะ! ฉันเชื่อในประสาทการรับรสของคุณเซอาค่ะ!"
10046050-125 = "อ่า..."
10046050-131 = "ขอโทษนะ คุณครู..."
10046050-132 = "นางิจังเป็นคนค่อนข้างหัวโบราณและมีความดื้อรั้นแปลกๆ มาตั้งนานแล้วน่ะ"
10046050-133 = "แต่ก็เอาเถอะ! ถึงจะไม่ได้อยากให้เป็นแบบนี้ แต่ระหว่างที่ 2 คนนั้นโต้วาทีอยู่กับนางิจัง ฉันก็จะเตรียมกิจกรรมของที่เหลือให้ได้เยอะๆ เลย!"
10046050-134 = "รบกวนด้วยนะ คุณครู!"
10046050-135 = "แล้วก็อิจิกะด้วยนะ!"
10046050-140 = "คะ... คะ?! เรียกฉันเหรอคะ?! ค่ะ ฉันก็จะพยายามค่ะ!"
10046050-141 = "ไม่เอาน่า ไม่ต้องทำตัวแข็งกระด้างเกินไปก็ได้~ เราอายุห่างกันแค่ปีเดียวเองนะ"
10046050-142 = "อ๊ะ... หรือว่าอิจิกะจังก็ลำบากใจเวลาอยู่กับฉันน่ะ?"
10046050-143 = "ไม่ค่ะ ไม่เลยค่ะ! ไม่ใช่อย่างนั้นนะคะ...!"
10046050-144 = "[s3] \"ไม่ใช่อย่างที่มิกะคิดหรอก อิจิกะแค่อายคนแปลกหน้าน่ะ\"\n[s4] \"อิจิกะคงแค่อายคนแปลกหน้าน่ะ\""
10046050-147 = "แหะๆ... ตั้งแต่เกิดมาฉันไม่เคยได้ยินคำว่าอายคนแปลกหน้าเลยค่ะ"
10046050-148 = "ว่าแต่ สิ่งที่ต้องทำต่อไปคืออะไรเหรอคะ...?"
10046050-149 = "อื้อ นั่นสินะ~ เอาเป็นว่าเราไปตรวจดูเรือยอช์ตก่อนดีมั้ย?"
10046050-150 = "อ้อ หมายถึงเรือยอช์ตที่จอดทอดสมออยู่ที่ชายหาดสินะคะ"
10046050-151 = "อื้อ! ถึงมันจะต่างจากแผนการเดิมของฉันไปสักหน่อย... แต่การเล่นน้ำทะเลตอนพระอาทิตย์ตก#nก็น่าจะไม่เลวเลยน่ะ!"
10046050-152 = "ตอนเอามาไว้ที่นี่มันก็ไม่ได้มีปัญหาหรอก แต่ฉันก็กังวลน่ะ... เพราะที่ผ่านมามันไม่ได้ใช้งานมาสัก#nระยะแล้ว"
10046050-153 = "ไม่ได้ใช้งานมาสักระยะแล้ว...? ไม่ได้เช่ามาหรอกเหรอคะ?"
10046050-154 = "เปล่าหรอก นี่เป็นเรือยอช์ตของสภาน้ำชาน่ะ แต่ว่าฉันกับนางิจังไม่ได้มีงานอดิเรกแบบนั้น"
10046050-155 = "ส่วนเซอาจังก็มีเรือยอช์ตส่วนตัว เราก็เลยไม่ได้ใช้เรือยอช์ตลำนี้กันเท่าไรน่ะ"
10046050-157 = "เหมือนเราอาศัยอยู่กันคนละโลกเลยค่ะ..."
10046050-158 = "แหะๆๆ ใช่มั้ยล่ะ?"
10046050-159 = "ตอนแรกฉันก็ไม่รู้หรอกนะ แต่ตอนนี้พอรู้แล้วละ"
10046050-163 = "อ้อ จริงสิ! ที่ฉันเล่าให้ฟังเมื่อกี้เป็นความลับนะ"
10046050-164 = "ทั้งนางิจังกับเซอาจังต่างก็บอกว่านี่คือศักดิ์ศรีของสภาน้ำชา ฉันได้ฟังทีไรก็ปวดหูทุกทีเลย"
10046050-165 = "แหะๆ... เหนื่อยน่าดูเลยนะคะ"
10046050-173 = "อื้อ ของที่เตรียมมาก็ดูไม่มีปัญหาอะไร"
10046050-174 = "งั้นจากนี้ก็แค่ต้องตรวจดูว่าเครื่องยนต์ของเรือทำงานได้ปกติดีหรือเปล่า"
10046050-182 = "เอ๋...?"
10046050-183 = "งะ... ไหงเป็นงี้ล่ะ?! เมื่อกี้ยังดีๆ อยู่เลยนี่?!"
10046050-184 = "อืม... แต่ตอนนี้เครื่องยนต์ก็ยังทำงานอยู่ งั้นฉันว่าปัญหาไม่น่าจะอยู่ที่เครื่องยนต์นะคะ"
10046050-185 = "มีอะไรติดอยู่ตรงไหนหรือเปล่านะ?"
10046050-186 = "เดี๋ยวฉันเช็กดูให้นะคะ"
10046050-193 = "อื้อ~ ใช่จริงด้วย~"
10046050-194 = "หืม? เจอแล้วเหรอ? ทำไมฉันมองไม่ออกเลย"
10046050-195 = "อ่า... ค่ะ มีพลาสติกไปพันอยู่รอบใบพัดน่ะค่ะ"
10046050-196 = "งั้นก็แค่เอาออกมาก็ได้ใช่มั้ย?"
10046050-197 = "ค่ะ น่าจะนะคะ แต่ฉันว่าน่าจะต้องใช้อุปกรณ์ช่วยค่ะ มีไม้เกี่ยวยาวๆ บ้างมั้ยนะ?"
10046050-198 = "เราไปเอาออกมาเองไม่ได้เหรอ?"
10046050-199 = "คะ? อืม~ มันก็ได้อยู่หรอกค่ะ แต่ฉันว่ามันน่าจะอันตรายนิดหน่อย~ น่ะค่ะ"
10046050-200 = "อืม... กว่าจะไปหาไม้มาเกี่ยวได้ ฉันว่าลงน้ำไปดึงออกมาเองอาจจะดีกว่าก็ได้ ยังไงก็ใส่ชุดว่ายน้ำอยู่แล้วด้วย..."
10046050-201 = "ไม่เป็นไรหรอก ไม่เป็นไร เห็นอย่างนี้ฉันก็เก่งเรื่องการทำความสะอาดพอตัวเลยนะ!"
10046050-202 = "คะ?"
10046050-212 = "คะ... คุณมิกะ!!"
10046050-214 = "อ๊ะ น้ำเย็นจังเลย! ไหนดูซิ ใบพัดที่ว่า..."
10046050-219 = "อ๊ะ จริงด้วย มีพลาสติกไปติดอยู่อย่างที่ว่าเลยละ อิจิกะจังตาดีมากเลยนะเนี่ย"
10046050-220 = "เอ่อ... ขะ... ขอบคุณค่ะ คาดไม่ถึงจริงๆ เลยนะ"
10046050-221 = "อ๊ะ คุณมิกะ เดี๋ยวก่อนค่ะ ให้ฉันทำดีกว่าค่ะ"
10046050-223 = "หืม? ไม่เป็นไร อิจิกะจังยังตัวแห้งอยู่เลยนี่นา ไหนๆ ฉันก็ลงน้ำมาแล้ว ฉันทำเองดีกว่านะ!"
10046050-224 = "แต่พลาสติกมันเปื้อนน้ำมันเยอะเลย..."
10046050-226 = "สิ่งที่ฉันพอทำได้ ฉันก็อยากจะทำเองน่ะ แค่นี้ฉันก็ได้รับความช่วยเหลือมาเยอะมากแล้วละ"
10046050-230 = "......"
10046050-240 = "แก้ปัญหาเรือยอช์ตเสร็จแล้ว! เก่งมากเลยพวกเรา!"
10046050-241 = "ที่ไหนกันล่ะคะ~ คุณมิกะแก้ปัญหานี้คนเดียวเองทั้งหมดต่างหาก"
10046050-242 = "ไม่หรอก ถ้าฉันอยู่คนเดียว ฉันคงไม่รู้ด้วยซ้ำว่าเกิดปัญหาที่ตรงไหนน่ะ"
10046050-243 = "ส่วนที่เหลือฉันก็ฝากด้วยนะ!"
10046050-244 = "ค่ะ! วางใจฉันได้เลยค่ะ!"
10046050-249 = "......"
10046050-250 = "คุณมิกะอุตส่าห์ทำเล็บมาสวย แต่เลอะคราบน้ำมันหมดเลย..."
10046050-252 = "(หลังจากนั้นทุกคนก็ไปตรวจสอบอาคารที่พักกันต่อ)"
10046050-258 = "แค่ก แค่ก! อะไรเนี่ย... ฝุ่นเยอะมากเลย!"
10046050-259 = "สงสัยต้องทำความสะอาดครั้งใหญ่เลยนะคะ คุณมิกะ ออกไปอยู่ข้างนอกก่อนเถอะค่ะ ฉันจะ..."
10046050-260 = "อื้อ! เรา 2 คนช่วยกันทำให้เสร็จไวๆ กันเถอะ!"
10046050-265 = "คะ?! อ่า ค่ะ! คุณมิกะ...! มีใยแมงมุมติดหัว!"
10046050-266 = "หืม? ว้ายย?!"
10046050-279 = "(หลังจากเจอปัญหาน้อยใหญ่มากมาย...)"
10046050-284 = "สะอาดเอี่ยมอ่อง~ พวกเราทำได้ดีมากเลยละ!"
10046050-289 = "ว้าว~ ทำทุกอย่างเสร็จทันเวลาเลยนะคะ"
10046050-290 = "แบบนี้คุณนางิสะก็สนุกได้โดยไม่มีเรื่องให้กังวลแล้วค่ะ"
10046050-291 = "อื้อ ขอบคุณที่มาช่วยกันนะ ทั้งคุณครูกับอิจิกะจังเลย!"
10046050-292 = "แล้วก็ เอ่อ..."
10046050-296 = "ขอโทษด้วยนะ"
10046050-300 = "คะ?"
10046050-301 = "[s5] \"เป็นอะไรไปเหรอ มิกะ?\"\n[s6] \"ไม่สบายใจตรงไหนหรือเปล่า?\""
10046050-306 = "อืม ไม่หรอก~ ฉันแค่อยากพูดคำนั้นน่ะ"
10046050-307 = "ทุกคนคงไม่ได้มาเที่ยวชายหาดกันนานแล้ว แล้วก็คงมีเรื่องที่อยากทำกันด้วย แต่ก็ต้องมาอยู่กับฉัน แล้วช่วยงานนู่นนี่กันจนเหนื่อยเลย"
10046050-308 = "ฉันอายที่ตัวเองเคยอวดดีไว้ว่าฉันจัดการทุกอย่างคนเดียวได้สบายๆ แต่สุดท้ายแล้วก็ต้องมาให้ทุกคน#nช่วยน่ะ..."
10046050-309 = "ถ้าไม่มีคุณครูหรืออิจิกะจัง ฉันก็คงเตรียมการไม่ได้ถึงขนาดนี้หรอก"
10046050-310 = "เพราะงั้นก็ ขอบคุณทุกคนนะ แล้วก็ขอโทษด้วย"
10046050-311 = "คะ... คุณมิกะ! เงยหน้าขึ้นเถอะค่ะ! เดี๋ยวมีคนมาเห็นเข้าหรอกค่ะ!"
10046050-312 = "อีกอย่าง ฉันต่างหากค่ะที่ต้องเอ่ยคำขอโทษ... ฉันว่าบางทีฉันอาจจะเข้าใจคุณมิกะผิดไปนิดหน่อยก็ได้..."
10046050-313 = "หืม? อะไรเหรอ?"
10046050-317 = "ไม่ค่ะ! ไม่มีอะไรทั้งนั้นค่ะ!"
10046050-318 = "ทีนี้ก็เหลือแค่ตรวจสอบบ้านพักตากอากาศแล้วค่ะ"
10046050-319 = "อืม แต่ตอนเช้าฉันก็ตรวจสอบไปแล้วรอบหนึ่ง คงไม่มีปัญหาอะไรแล้วละ..."
10046050-324 = "อะ... อะไรกันน่ะ ทำไมพื้นสั่นล่ะ...!"
10046050-328 = "[ns7] \"ผะ... แผ่นดินไหวเหรอ?!\"\n[ns8] (เข้าไปกอดทั้ง 2 คนไว้)"
10046050-346 = "คุณมิกะ! คุณครู! เป็นอะไรหรือเปล่าคะ?"
10046050-352 = "ฉันไม่เป็นไร ส่วนคุณครูก็... ปลอดภัยดีสินะ ค่อยโล่งอกไปที"
10046050-353 = "ว่าแต่ที่พื้นสั่นเมื่อกี้นี้มันอะไรกันน่ะ...?"
10046050-354 = "หืม?"
10046050-358 = "...?"
10046050-359 = "กะ..."
10046050-361 = "เกิดอะไรขึ้นเนี่ย...?!"

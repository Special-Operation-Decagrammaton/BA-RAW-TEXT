[translation]
10046050-1 = "Episode 5;Never Carpe Diem"
10046050-6 = "...So, of course cats can smile. They simply choose not to."
10046050-10 = "Seia, are you even listening?"
10046050-11 = "Ugh, I didn't anticipate high tea after a full barbecue plate."
10046050-12 = "...? Preposterous. Even if we skip a meal, we can never, ever, skip teatime."
10046050-14 = "I completely agree."
10046050-19 = "You mean to say that I am in the minority?"
10046050-20 = "Black tea helps if you're feeling full. Have another cup."
10046050-21 = "Yes. It'll help you digest. I'll pour it for you."
10046050-26 = "..."
10046050-27 = "...!"
10046050-31 = "Um, Nagisa? Why are you staring?"
10046050-35 = "Uh...nothing to worry about. I've heard whispers of this...preference."
10046050-36 = "Diversity must be respected."
10046050-37 = "I'm sorry, but are you saying that I poured the tea wrong?"
10046050-38 = "That was not my intention. I apologize for any offense."
10046050-39 = "But, personally, I would have poured milk first, then tea."
10046050-44 = "Ah."
10046050-45 = "...I'm surprised."
10046050-46 = "Not to be rude, but I know you're a tea connoisseur. So..."
10046050-47 = "IF the tea were of poor quality, I WOULD have poured the milk first in order to mask the leaves' aroma..."
10046050-51 = "But this is artisanal tea plucked from Shanhaijing's Tea Garden. It's so excellent that I normally wouldn't even bother with the milk...!"
10046050-52 = "So I coated the cup with the black tea to infuse the aroma, and then delicately poured the cold milk, watching for optimal temperature and color."
10046050-53 = "Wouldn't you agree that's proper, Nagisa?"
10046050-54 = "Is there something wrong with my method?"
10046050-56 = "Ah."
10046050-57 = "Of course, there's no \"right\" or \"better\" way to enjoy tea. I would never insist on that."
10046050-58 = "I admit, pouring the tea first is best if one wishes to savor the delicate notes and aroma..."
10046050-59 = "But isn't that underestimating the role of the milk..."
10046050-60 = "...which plays a central role in milk tea?"
10046050-64 = "A chemical change occurs when the creamy texture of cold milk softly envelops the acidity of the hot black tea."
10046050-65 = "To me, that temperature and chemical differential is what makes milk tea...milk tea."
10046050-66 = "So are you saying that regardless of the quality of the tea, pouring milk first is necessary?"
10046050-67 = "This is, after all, the afternoon teatime's milk tea."
10046050-68 = "Beyond the domain of taste, it becomes a custom, a procedure... It's no exaggeration to say that tea reaches beyond consumption, all the way into the realm of culture."
10046050-69 = "Time persists nevertheless, but having tea simply because of a certain hour... That is mere punctuality."
10046050-72 = "..."
10046050-73 = "..."
10046050-80 = "[ns1] \"Um, Mika...\"\n[ns2] \"Are they always like this?\""
10046050-83 = "Don't look at me... I'm so embarrassed."
10046050-84 = "Nagi, please don't get into this. Sensei is here."
10046050-85 = "Ah, I'm sorry. Hasumi is also usually more...contained."
10046050-86 = "I wonder if it feels different since Nagisa is such an expert on black tea..."
10046050-90 = "...Ah, the fuse is lit."
10046050-91 = "You've stumbled upon the ultimate controversy, the topic that must not be mentioned, the taboo of Trinity..."
10046050-92 = "\"Is it milk first, or tea first...?!\""
10046050-93 = "..."
10046050-94 = "..."
10046050-99 = "I believe we are at an impasse."
10046050-100 = "Indeed. We require a second, expert opinion..."
10046050-101 = "Seia!"
10046050-102 = "Seia!"
10046050-107 = "M-Mika... Help..."
10046050-111 = "Ah, sorry, Seia! I-I'm super busy with the preparations and everything!"
10046050-119 = "Now, Seia! I'm sure we share a certain understanding regarding this matter."
10046050-120 = "Enough philosophy! Have her taste both!"
10046050-125 = "Ahh..."
10046050-131 = "Sorry, Sensei..."
10046050-132 = "Nagi can be a bit...traditional on some topics. Hard-headed, even."
10046050-133 = "But, anyway! It's a happy accident. While those two keep Nagi busy, we can prepare what's next!"
10046050-134 = "Let's give it our all, Sensei!"
10046050-135 = "And Ichika, too!"
10046050-140 = "H-Huh?! Me?! Oh, yes, Miss Mika! I'll do my best!"
10046050-141 = "Aw, don't be so stiff. We're only a year apart!"
10046050-142 = "Oh... Um... You're not SCARED of me, are you?"
10046050-143 = "No, no! Not at all! You're great..."
10046050-144 = "[s3] \"It's not what you think, Mika.\"\n[s4] \"Ichika is a bit shy.\""
10046050-147 = "Oh? \"Shy\"? That's a new one..."
10046050-148 = "Anyway, about that schedule. What's next?"
10046050-149 = "First, I guess, is yacht maintenance?"
10046050-150 = "Oh, you mean that yacht anchored at the beach?"
10046050-151 = "I'm improvising a little, but yeah! I think it'll be great to hang out there and watch the sunset."
10046050-152 = "It worked enough for us to dock it, of course, but we haven't taken it out in a while."
10046050-153 = "So, it's not rented?"
10046050-154 = "Yeah, it's the official Tea Party yacht. But it's not really my or Nagi's \"thing,\" you know."
10046050-155 = "And Seia has her own personal yacht, so we forget about this one..."
10046050-157 = "We live in VERY different worlds..."
10046050-158 = "Haha. I suppose so."
10046050-159 = "I never really thought about the yacht as special. We almost NEVER talk about it."
10046050-163 = "Ah! Was that supposed to be a secret?"
10046050-164 = "Nagi and Seia are always telling me to be more aware of our...privilege."
10046050-165 = "Haha... I appreciate all the effort."
10046050-173 = "Good. It looks like everything's in order."
10046050-174 = "Now, let's get the engine warmed up."
10046050-182 = "...Huh?"
10046050-183 = "Wh-Why?! It tested fine yesterday! I made sure of it!"
10046050-184 = "Hm... Well, it's not the starter. And I hear the engine running a full cycle before it stops."
10046050-185 = "Maybe there's something getting caught on the screw?"
10046050-186 = "I'll go check."
10046050-193 = "Ah, there's your problem."
10046050-194 = "Huh? I don't see anything."
10046050-195 = "Right there. There's some plastic wrapped around the propeller."
10046050-196 = "Then we just need to take it out?"
10046050-197 = "Hopefully. But I think we need a tool. Maybe there's some kind of long fishing hook around here..."
10046050-198 = "Can't we just rip it off?"
10046050-199 = "Huh? Well, that's maybe a liiiittle bit dangerous? With the blades?"
10046050-200 = "Still...we don't have time to find a...harpoon, or something. Maybe I'll just jump in. I'm already dressed, after all!"
10046050-201 = "Leave it to me! I'm a great swimmer."
10046050-202 = "Yes?"
10046050-212 = "M-Mika!!"
10046050-214 = "Gah, it's cold! Let me see, the propeller..."
10046050-219 = "You're right, Ichika! It IS plastic! You have really good eyes!"
10046050-220 = "...Um, uh, thank you. You're...really something, Mika."
10046050-221 = "Now, how about you let me handle the rest?"
10046050-223 = "Huh? It's fine. You're still dry. I'm already down here, so I'll get it!"
10046050-224 = "But the plastic is covered in engine oil..."
10046050-226 = "I'll do what I can. You've already helped so much!"
10046050-230 = "..."
10046050-240 = "The yacht issue is solved! Thanks, everybody!"
10046050-241 = "Come now, YOU did all the work."
10046050-242 = "Nuh-uh. If I were alone, I would never have figured it out."
10046050-243 = "All I ask is that you keep it up! The day's not over yet!"
10046050-244 = "Yes! Leave it to me!"
10046050-249 = "..."
10046050-250 = "What a shame. Her manicure was so cute, and now..."
10046050-252 = "After that, we continued to inspect the facilities."
10046050-258 = "*cough* *cough* Wow... It's so dusty!"
10046050-259 = "This'll be rough. Mika, you can go outside and—"
10046050-260 = "Together! With the two of us, we can finish this in no time."
10046050-265 = "Huh?! Ah, sure! Oh, Mika! There's a spider web on your head!"
10046050-266 = "Huh? Ahhh!"
10046050-279 = "Several fiascos later..."
10046050-284 = "Everyone, thank you so, so much for all the hard work!"
10046050-289 = "Wow, we actually did it! And on time, too!"
10046050-290 = "And it looks like Nagisa never suspected a thing."
10046050-291 = "Yes, it's thanks to you two! I'm eternally grateful!"
10046050-292 = "And, you know..."
10046050-296 = "...I'm sorry."
10046050-300 = "Yes?"
10046050-301 = "[s5] \"What's wrong, Mika?\"\n[s6] \"Is something on your mind?\""
10046050-306 = "Well, nothing. But I wanted to say something."
10046050-307 = "You all came to the beach and probably wanted to have fun. Instead, my stubbornness and I made you work all day."
10046050-308 = "I'm embarrassed because I needed you both, and that was after insisting that I could take care of everything on my own."
10046050-309 = "Without either of you, I would have failed miserably."
10046050-310 = "In that sense, thank you. And please accept my apology."
10046050-311 = "M-Mika! Don't bow! What if someone sees?"
10046050-312 = "And I should be the one apologizing... I think I had you all wrong..."
10046050-313 = "Huh? How?"
10046050-317 = "Um! Well, ah..."
10046050-318 = "You know what? We need to inspect the villa!"
10046050-319 = "But we checked there this morning... What were you saying before?"
10046050-324 = "Wh-What? The ground is shaking...!"
10046050-328 = "[ns7] \"E-Earthquake?!\"\n[ns8] Shield them with your body."
10046050-346 = "Mika! Sensei! Is everyone all right?"
10046050-352 = "Yes, I'm fine. Sensei... Oh, good. You're fine!"
10046050-353 = "What was that rumbling? And..."
10046050-354 = "Hm?"
10046050-358 = "...?"
10046050-359 = "...Huh."
10046050-361 = "...What happened?!"

[translation]
1011906-1 = "ฤดูร้อนของหญิงหิมะ"
1011906-3 = "(คุณครูมาจัดการงานของชาเล่ต์ตั้งแต่เช้าตรู่และกำลังรอนักเรียนที่จะมาเข้าเวร...)"
1011906-4 = "[ns1] \"วันนี้เป็นเวรของนางุสะหรือเปล่านะ?\"\n[ns2] \"นางุสะยังมาไม่ถึงอีกเหรอเนี่ย?\""
1011906-10 = "ขอโทษที่มาช้านะ คุณครู"
1011906-11 = "พอดีว่าฉันหลงทางระหว่างมาน่ะ..."
1011906-12 = "[s] \"เข้ามาสิ นางุสะ\""
1011906-17 = "[ns] \"ว่าแต่... ไม่สบายตรงไหนหรือเปล่า?\""
1011906-18 = "เปล่าหรอก ฉันไม่เป็นอะไร..."
1011906-19 = "ฉันควรรีบทำงานของวันนี้มากกว่า..."
1011906-20 = "[s3] \"ไม่ได้หรอก สุขภาพของนางุสะสำคัญกว่านะ\"\n[s4] \"เกิดอะไรขึ้นเหรอ? ทำไมตัวซีดกว่าปกติอีก?\""
1011906-23 = "ฉันไม่ได้เป็นอะไรจริงๆ เมื่อกี้ฉันแค่ลงผิดสถานี ก็เลยเดินหาทางอยู่นานกว่าจะมาถึงชาเล่ต์..."
1011906-24 = "อาจเป็นเพราะอากาศที่ร้อนนิดหน่อยด้วยน่ะ"
1011906-28 = "[ns5] \"มานั่งตากพัดลมตรงนี้สักเดี๋ยวมั้ย?\"\n[ns6] \"ครูจะไปเอาเครื่องดื่มเย็นๆ ในห้องพักผ่อนมาให้นะ\""
1011906-31 = "ฉันมาเข้าเวรที่นี่นะ จะรบกวนคุณครูแบบนั้นได้ไง..."
1011906-37 = "ขอโทษนะ... งั้นฉันขอนั่งพักสักหน่อยแล้วค่อยเริ่มงานแล้วกัน"
1011906-39 = "(คุณครูเอาเครื่องดื่มเย็นๆ มาให้นางุสะแล้วเฝ้าดูจนกว่านางุสะจะรู้สึกดีขึ้น)"
1011906-41 = "ฮู่ว... ตอนนี้ฉันรู้สึกมีเรี่ยวแรงขึ้นมาแล้วละ"
1011906-42 = "ขอบคุณที่ให้ฉันได้พักผ่อนนะคุณครู"
1011906-43 = "[s] \"ไม่ต้องขอบใจกันหรอกน่า\""
1011906-47 = "[ns7] \"จะว่าไป วันนี้อากาศข้างนอกร้อนมากเลยเหรอ?\"\n[ns8] \"ครูอยู่แต่ในห้อง ก็เลยไม่รู้เลยว่าข้างนอกอากาศร้อนแค่ไหน\""
1011906-50 = "ไม่หรอก มันก็ไม่ได้ร้อนขนาดนั้น ไม่มีการแจ้งเตือนเกี่ยวกับคลื่นความร้อนด้วยซ้ำ"
1011906-51 = "ฉันแค่... ร่างกายทนต่อความร้อนไม่ค่อยได้น่ะ"
1011906-52 = "ฉันทนต่อความหนาวเย็นได้ในระดับหนึ่ง แต่ถ้าอากาศร้อนขึ้นมาแค่นิดเดียวฉันก็จะอ่อนแอลง พอถึงฤดูร้อนฉันเลยลำบากอยู่ร่ำไป"
1011906-53 = "นั่นอาจเป็นสาเหตุที่ฉันมักถูกเรียกว่าเป็นหญิงหิมะมาตั้งแต่เด็กๆ ก็ได้"
1011906-54 = "ในนิทานพื้นบ้าน หญิงหิมะคือสาวสวยที่มีรูปโฉมลึกลับ งั้นก็ไม่แปลกหรอกที่ผู้คนจะเข้าใจผิดว่าฉัน#nเป็นหญิงหิมะ"
1011906-55 = "[s] \"ครูดีใจที่นางุสะดีขึ้นจนเล่าเรื่องสนุกๆ ได้แล้วนะ\""
1011906-56 = "แต่ฉันไม่ได้ชอบหญิงหิมะที่อยู่ในนิทานพื้นบ้านนั่นหรอกนะ..."
1011906-57 = "[s] \"ทำไมล่ะ?\""
1011906-58 = "ก็เรื่องของหญิงหิมะในนิทานมักจบลงแบบเศร้าๆ ตลอดเลยนี่นา"
1011906-59 = "ไม่ว่าหญิงหิมะจะแสดงความปรารถนาดีให้คนอื่นเห็นแค่ไหน คนอื่นก็จะพากันหลีกเลี่ยง เพียงเพราะคิดว่าเธอดูเป็นคนเย็นชา"
1011906-60 = "พอได้อ่านเรื่องราวของหญิงหิมะที่ถูกปฏิเสธจนต้องหายตัวหรือเจอตอนจบที่น่าเศร้า ฉันก็จะรู้สึกหม่นหมอง... ฉันก็เลยไม่ชอบหญิงหิมะ"
1011906-61 = "คนอื่นก็น่าจะเหมือนกันไม่ใช่เหรอ?"
1011906-62 = "ผู้คนชอบแสงแดดที่อบอุ่นในฤดูร้อนมากกว่าหิมะเย็นเฉียบในฤดูหนาวที่ไม่มีแม้แต่หญ้าเติบโตสักต้น"
1011906-63 = "[s] \"เครื่องดื่มนั้นยังเย็นอยู่ใช่มั้ย...?\""
1011906-64 = "อื้อ คุณครูใส่น้ำแข็งมาเยอะมาก แก้วก็เลยยังเย็นอยู่จนมือฉันเย็นเฉียบเลย"
1011906-65 = "[s] \"ในวันที่อากาศร้อน ย่อมคิดถึงน้ำแข็งเย็นๆ เป็นธรรมดา\""
1011906-66 = "ที่พูดมามันก็จริงอยู่หรอกนะ ว่าแต่ทำไมจู่ๆ ถึงพูดเรื่องนั้นล่ะ?"
1011906-67 = "[s9] \"บางคนชอบแสงแดดอบอุ่น แต่บางคนชอบหิมะเย็นเฉียบนะ\"\n[s10] \"ครูว่ามันธรรมดามากที่เราจะชอบต่างกัน\""
1011906-73 = "[ns11] \"แค่เรามั่นใจและเชื่อในคุณค่าของตัวเองก็พอ\"\n[ns12] \"ต่อให้เป็นหญิงหิมะ ก็พบกับตอนจบที่มีความสุขได้นะ\""
1011906-76 = "นั่นสินะ... คงเป็นเพราะฉันไม่เคยได้ยินเรื่องหญิงหิมะที่ใช้ชีวิตในฤดูร้อนมาก่อนน่ะ"
1011906-83 = "นี่คงเป็นครั้งแรกเลยละที่ฉันตั้งตารอฤดูร้อนของปีนี้"

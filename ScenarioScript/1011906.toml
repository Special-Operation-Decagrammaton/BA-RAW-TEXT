1011906-41 = "3;나구사ND;99;후우…… 이제야 조금 정신을 차릴 수 있을 것 같네.\n#3;em;[...]"
1011906-42 = "3;나구사ND;03;고마워, 선생님. 덕분에 한숨 돌렸어."

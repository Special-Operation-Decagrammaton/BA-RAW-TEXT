1011906-19 = "3;나구사ND;06;그보다 괜찮으니 어서 당번 업무를……"
1011906-20 = "[s3] \"안 돼. 나구사의 건강이 우선이야.\"\n[s4] \"무슨 일이 있었던거야? 피부가 창백한데.\""

[translation]
1011906-1 = "雪女的夏天"
1011906-3 = "（清晨，在夏萊處理公務並等待值日生時……）"
1011906-4 = "[ns1]「……今天的值日生是名草吧？」\n[ns2]「總覺得有點晚了呢。」"
1011906-10 = "抱歉我來晚了，老師。"
1011906-11 = "剛才在路上迷路了一會……"
1011906-12 = "[s]「歡迎，名草。」"
1011906-17 = "[ns]「……話說你是不是哪裡不舒服？」"
1011906-18 = "……沒有，我沒事。"
1011906-19 = "我真的沒事，所以讓我開始做值日生的工作吧……"
1011906-20 = "[s3]「不行。名草的健康最重要。」\n[s4]「發生什麼事了？你的臉色很蒼白哦。」"
1011906-23 = "真的沒什麼。#n只是因為在過來的路上不小心跑錯車站，結果迷路了一陣子而已……"
1011906-24 = "也許是有點中暑了吧。"
1011906-28 = "[ns5]「先來這邊坐著吹電風扇吧？」\n[ns6]「我去休息室拿點冰涼的飲料給你。」"
1011906-31 = "明明是來當值日生的，卻還造成老師的麻煩……"
1011906-37 = "……對不起，就讓我稍微休息一下再開始工作吧。"
1011906-39 = "（把冰涼的飲料遞給名草後，在他恢復精神之前都在身旁陪著）"
1011906-41 = "呼……總算感覺好一點了。"
1011906-42 = "謝謝你，老師。#n多虧有你才能喘口氣。"
1011906-43 = "[s]「不用客氣。」"
1011906-47 = "[ns7]「話說今天的天氣有這麼熱嗎？」\n[ns8]「我從早上就待在室內，完全沒注意到外面熱成這樣。」"
1011906-50 = "不，其實今天並沒有特別熱，甚至沒有發布高溫警報。"
1011906-51 = "只是……我本來就比較怕熱。"
1011906-52 = "雖然對寒冷還算有點抵抗能力……#n但我的身體只要天氣稍微熱一點就會變差，所以夏天總是很難熬。"
1011906-53 = "可能是因為這個原因，小時候經常有人說我像雪女。"
1011906-54 = "畢竟傳說中大多把雪女描繪成神祕的美少女，會把我誤認成雪女也不奇怪吧。"
1011906-55 = "[s]「還能開玩笑就代表狀態已經恢復了吧，真是太好了。」"
1011906-56 = "……不過，其實我並不喜歡傳說中的雪女。"
1011906-57 = "[s]「為什麼呢？」"
1011906-58 = "因為雪女的故事，大多都是以悲劇收場對吧？"
1011906-59 = "無論雪女多麼想傳達自己的感情，往往還是會因為看似冷漠無情而被人疏遠。"
1011906-60 = "最終不是因為存在遭到否定而消失，就是迎接不幸的結局。#n每當讀到這種故事，都會讓我覺得很難過……所以我不喜歡雪女。"
1011906-61 = "其他人應該也一樣吧？"
1011906-62 = "比起寸草不生的寒冬白雪，人們往往更喜歡溫暖的夏日陽光。"
1011906-63 = "[s]「……那杯飲料還冰嗎？」"
1011906-64 = "嗯。老師放了好多冰塊，現在還冷得讓手指發麻呢。"
1011906-65 = "[s]「在炎熱的日子裡，冰涼的冰塊總是讓人渴望。」"
1011906-66 = "確實是這樣沒錯，不過老師怎麼突然說這些……？"
1011906-67 = "[s9]「就像有人嚮往溫暖的夏日陽光一樣……」\n[s10]「也會有人嚮往冬日的冰雪哦。」"
1011906-73 = "[ns11]「只要抱有自信，不忘記自己的價值……」\n[ns12]「就算是雪女，也一定能迎來幸福的結局。」"
1011906-76 = "……說得也是。#n我好像從來沒聽過雪女在夏天的故事呢。"
1011906-83 = "或許今年……會是我第一次期待夏天的到來也說不定。"

1011906-47 = "[ns7] \"그보다 오늘 날씨가 그렇게 더웠나?\"\n[ns8] \"아침부터 건물 안에만 있어서 날이 그렇게 더운 줄은 몰랐었어.\""
1011906-48 = "#wait;10"
1011906-49 = "#wait;10"
1011906-50 = "3;나구사ND;02;아니, 그렇게 더운 날씨는 아니었어. 폭염 주의보가 발령된 것도 아니었거든."
1011906-51 = "3;나구사ND;12;그저…… 나는 원래부터 더위에 약한 편이었거든.\n#3;em;[한숨]"
1011906-52 = "3;나구사ND;12;추위는 어느 정도 견딜 수 있지만, 날씨가 조금만 더워져도 컨디션이 나빠지기 때문에 여름에는 자주 고생을 했었지."
1011906-53 = "3;나구사ND;99;그래서일까. 어릴 적에는 설녀 같다는 말도 자주 들었던 것 같아."
1011906-54 = "3;나구사ND;16;설화 속의 설녀는 신비로운 인상의 미소녀로 묘사되곤 했으니, 나를 설녀로 오해하는 것도 무리가 아니겠지만.\n#3;em;[음표]"
1011906-55 = "[s] \"농담도 던지는 걸 보니, 컨디션이 돌아온 것 같아서 다행이네.\""
1011906-56 = "3;나구사ND;12;……하지만 정작 나는 설화 속의 설녀를 좋아하진 않아."
1011906-57 = "[s] \"어떤 이유 때문에?\""
1011906-58 = "3;나구사ND;02;왜, 설녀의 설화는 슬픈 결말로 끝을 맺는 것이 많잖아?"
1011906-59 = "3;나구사ND;99;설녀가 아무리 상대에게 애정을 전하려 해도, 사람들은 차갑고 매정해 보인다는 이유만으로 설녀를 꺼리고 피하려 하지.\n#3;em;[...]"
1011906-60 = "3;나구사ND;12;그 존재만으로도 부정당해 사라지거나 불행한 결말을 맞게 되는 설녀의 이야기를 읽고 나면 기분이 우울해져서…… 나는 설녀가 싫었어."
1011906-61 = "3;나구사ND;12;다른 사람들도 마찬가지이지 않을까?"
1011906-62 = "3;나구사ND;99;사람들은 풀 한 포기 돋지 않는 차가운 겨울의 눈보다, 따스한 여름의 볕을 더 좋아하는 법이니까."
1011906-63 = "[s] \"……그 음료수, 아직 시원하지?\""
1011906-64 = "3;나구사ND;02;응. 선생님이 얼음을 잔뜩 넣어줘서 아직도 손이 아릴 만큼 시원해.\n#3;em;[반응]"
1011906-65 = "[s] \"무더운 날에는 이렇게 시원한 얼음이 그리운 법이지.\""
1011906-66 = "3;나구사ND;02;그야 당연한 말이지만, 어째서 갑자기 그런 이야기를……?"
1011906-67 = "[s9] \"따듯한 여름의 볕을 그리워하는 사람이 있는 것처럼—\"\n[s10] \"누군가는 겨울의 차가운 눈을 그리워하고 있을 거야.\""

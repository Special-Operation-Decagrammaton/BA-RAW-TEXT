[translation]
1000705-1 = "เส้นกั้นบางๆ ระหว่างอัจฉริยะและคนบื้อ"
1000705-2 = "ทางเดินในโรงเรียนมิลเลเนียม"
1000705-3 = "ฉันไม่ได้สอบตกเพราะไม่ตั้งใจเรียนสักหน่อย..."
1000705-4 = "ข้อสอบของโรงเรียนมิลเลเนียมมันยากเกินไปต่างหากล่ะ~#nมีแต่ข้อสอบที่ไม่ใช่ตามมาตรฐานของโรงเรียนมัธยมปลายทั่วไปทั้งนั้น!"
1000705-5 = "[s] \"ถ้าหมั่นฝึกฝนแล้วก็ทบทวนบ่อยๆ ก็ทำข้อสอบได้แล้วล่ะ\""
1000705-6 = "อึ่ก... คำพูดที่เหมือนครูบาอาจารย์นี่มัน....#nไม่สิ ก็เป็นคุณครูอยู่แล้วนี่นา"
1000705-7 = "ฉันพยายามอ่านหนังสือทบทวนแล้วนะ แต่ก็ไม่เห็นเข้าใจคำถามในข้อสอบเลยสักนิดเดียว"
1000705-8 = "โดยเฉพาะ... วิชาวรรณกรรม! ฉันจะไปรู้ได้ยังไงล่ะว่าตัวละครในเรื่องรู้สึกยังไง#nฉันไม่ได้อ่านใจใครออกสักหน่อยนะ"
1000705-9 = "อะไรนะ? ทำไมฉันถึงเก่งเรื่องการแฮ็กทั้งที่แก้โจทย์ง่ายๆ แบบนี้ไม่ได้งั้นเหรอ?"
1000705-10 = "พูดอะไรน่ะ แฮ็กข้อมูลน่ะง่ายจะตายไป"
1000705-11 = "ถ้ามีน้ำในถังมากเกินไป น้ำมันก็จะล้นออกมา#nถ้าไม่มีกุญแจที่ใช้ไขประตูได้ ก็ต้องไปขอคนที่มีกุญแจของประตูบานนั้นมา...#nวิธีการง่ายๆ ตรงไปตรงมาเข้าใจได้ง่ายจะตายไป!"
1000705-12 = "คุณครูจะบอกว่าแก้โจทย์วิชาวรรณกรรมง่ายกว่าการแฮ็กข้อมูลเหรอ?#nไหนดูหน่อยซิ...."
1000705-13 = "อ่ะฮ่า... ถ้าเจอการใช้คำพูดพวกนี้ล่ะก็หมายถึงตัวละครกำลังมีความสุขอยู่สินะ#nเข้าใจแล้วล่ะ!"
1000705-14 = "คุณครู... แล้วถ้างั้นตรงนี้หมายความว่ายังไงเหรอ....?"
1000705-16 = "ขอบคุณนะคุณครู! ถ้าทำตามที่คุณครูสอนล่ะก็ ตอนสอบคราวหน้าต้องผ่านฉลุยแน่!"
1000705-17 = "อธิบายเรื่องเข้าใจยากๆ ให้เข้าใจได้ง่ายๆ แบบนี้... สมกับเป็นคุณครูจริงๆ!"
1000705-18 = "หือ? ฉันหัวไวเลยเข้าใจได้เร็วงั้นเหรอ?"
1000705-19 = "หึหึ! ชมแบบนี้ฉันเขินนะ"
1000705-20 = "เทียบกับพวกรุ่นพี่ในเวอริทัสแล้ว ฉันหัวไม่ค่อยดีเท่าไหร่หรอก แต่ฉันก็ไม่อยากเรียนไม่ทัน#nจนเป็นตัวถ่วงสมาชิกคนอื่นๆ"
1000705-21 = "พวกเวอริทัสไม่เคยมองว่าฉันเป็นคนที่ชอบสร้างปัญหา แล้วก็เป็นหนึ่งในไม่กี่ที่ที่ยอมรับความ#nสามารถของฉันด้วย"
1000705-22 = "คุณครูเองก็เป็นคนพิเศษของฉันเหมือนกันนะ เพราะงั้น...ฉันจะพยายามให้มากขึ้น"
1000705-23 = "ฮ่าฮ่า! ดะ...ดันพูดเรื่องที่น่าอายออกไปแล้วแฮะ ช่วยลืมประโยคสุดท้ายที่ฉันพูดไปทีนะ!"
1000705-24 = "อืม... ถ้างั้นลองมาจำข้อมูลที่คุณครูเขียนสรุปโน้ตมาให้ดูเลยดีกว่านะ?"
1000705-25 = "<สมุดเล่มนี้ทำมาจากกระดาษสีขาวขนาด 80 กรัม นำมาตัดเป็นกระดาษสี่เหลี่ยมขนาดเอ#nความกว้างและยาว 297มม. X 210มม. จำนวนทั้งหมดหนึ่งร้อยแผ่น...>"
1000705-26 = "หืม? อะไรน่ะเหรอ? มันเขียนอยู่ในหน้าแรกในสมุดที่คุณครูให้ฉันมานี่นา?"
1000705-27 = "เฮ้อ ตรงประโยคนี้ไม่ต้องจำงั้นเหรอ? ฉันนึกว่าคุณครูบอกให้จำทุกอย่างที่อยู่ในสมุดซะอีก..."
1000705-28 = "ดะ...เดี๋ยวก่อน! บอกว่าดูไม่ออกว่าที่จริงแล้วฉันเป็นอัจฉริยะหรือคนบื้อกันแน่งั้นเหรอ?#nพูดอะไรของคุณครูเนี่ย!"

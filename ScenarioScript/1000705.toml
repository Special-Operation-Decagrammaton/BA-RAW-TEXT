[translation]
1000705-1 = "#Title;천재와 바보는 종이 한 장 차이"
1000705-2 = "#place;밀레니엄 학원 교실"
1000705-3 = "3;마키;05;그, 그러니까 이번 시험에서 낙제한 건 내가 공부를 안 해서 그런 게 아니야……\n#3;a"
1000705-4 = "3;마키;06;애초에 밀레니엄의 시험은 너무 어렵다구~ #n평범한 고등학생의 수준을 상정하지 않은 문제들 뿐이야!\n#3;em;[빠직]\n#3;hophop"
1000705-5 = "[s] \"예습과 복습을 철저히 하면 마키도 충분히 풀 수 있어.\""
1000705-6 = "3;마키;04;윽, 선생님 같은 잔소리를…… #n아니, 선생님이니까 당연한가.\n#3;stiff\n#3;em;[속상함]"
1000705-7 = "3;마키;05;하지만 교과서를 아무리 외워도 문제 자체를 이해할 수가 없는 걸."
1000705-8 = "3;마키;06;특히, 문학! #n지문을 읽고 등장인물의 심정을 추측 하라니, 이건 독심술의 영역 아니야?\n#3;hophop\n#3;em;[!]"
1000705-9 = "3;마키;02;뭐? 해킹은 잘 하면서 왜 이런 간단한 문제는 못 푸냐고?"
1000705-10 = "3;마키;00;무슨 소리야. 해킹이 훨씬 더 간단하잖아?\n#3;em;[음표]"
1000705-11 = "3;마키;07;양동이에 물을 가득 부으면 내용물이 넘쳐흐른다. #n열쇠 구멍에 맞는 열쇠가 없을 때는 열쇠를 가진 사람에게 열어 달라고 한다. #n모두 상식적으로 이해하기 쉬운 방법뿐이라고!"
1000705-12 = "3;마키;02;문학 문제를 푸는 건 해킹보다 훨씬 더 쉽다고? #n어디어디……\n#3;m4"
1000705-13 = "3;마키;03;아하, 이런 표현이 많이 보이면 등장인물이 기쁘다는 뜻이구나. #n이해했어!\n#3;em;[반짝]"
1000705-14 = "3;마키;01;선생님, 그럼 이런 건 무슨 뜻이야……?\n#3;m2\n#3;hophop"
1000705-15 = "#all;hide"
1000705-16 = "3;마키;03;고마워, 선생님! #n선생님이 알려준 대로라면 다음 시험은 문제 없겠어!\n#3;greeting\n#3;em;[음표]\n#3;a"
1000705-17 = "3;마키;00;이렇게 어려운 문제도 쉽게 설명해 주다니, 역시 선생님이야!"
1000705-18 = "3;마키;02;뭐? 내가 이해가 빨라서 그렇다고?"
1000705-19 = "3;마키;04;후후, 이렇게 칭찬을 들으니 새삼 부끄러운 걸.\n#3;em;[///]\n#3;stiff"
1000705-20 = "3;마키;01;나는 베리타스의 다른 선배들만큼 머리가 좋지는 않지만, 그래도 수업 진도를 못 따라가서 다른 부원들에게 피해를 끼치고 싶지는 않아."
1000705-21 = "3;마키;00;그야 베리타스는 나를 말썽쟁이라고 부르지도 않고, 내 재능을 인정받을 수 있는 몇 안되는 곳이거든."
1000705-22 = "3;마키;01;물론 선생님도 내게는 똑같이 소중한 존재야. #n그러니까 더 열심히…… 노력할게.\n#3;em;…"
1000705-23 = "3;마키;04;하, 하하! 부, 부끄러운 소리를 해버렸네. #n마지막 말은 잊어줘!\n#3;stiff"
1000705-24 = "3;마키;01;흠흠, 그럼 선생님이 정리해 준 암기노트를 다시 한 번 외워볼까?"
1000705-25 = "3;마키;99;<본 노트의 제원은 80g의 백상지가 내지로 사용되었으며, 규격은 297mm X 210mm A형 용지의 크기로 재단되어, 일련번호가 삽입된 100매의 속지가……>\n#3;em;[...]"
1000705-26 = "3;마키;02;응? 이게 무슨 소리냐고? #n선생님이 준 노트의 맨 앞장에 쓰여 있는 문장이잖아?"
1000705-27 = "3;마키;04;헉, 이건 외우면 안 되는 문장이었어? #n선생님이 노트를 통째로 외우라고 해서 그만……\n#3;shake"
1000705-28 = "3;마키;06;자, 잠깐! 바보인지, 천재인지 알기 어렵다니! #n그게 무슨 소리야, 선생님!\n#3;hophop\n#3;em;[빠직]"

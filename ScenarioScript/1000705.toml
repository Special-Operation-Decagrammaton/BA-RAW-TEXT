[translation]
1000705-1 = "天才與笨蛋只有一線之隔"
1000705-2 = "千年學園．教室"
1000705-3 = "所，所以說，這次考試不及格不是因為我沒有唸書……"
1000705-4 = "再說了根本是千年的考試太難了嘛～ #n都是超過普通高中生水準的問題！"
1000705-5 = "[s] 「只要好好預習和複習，真紀也能解題唷。」"
1000705-6 = "唔，像老師的碎碎念…… #n不，確實是老師，理所當然的啊。"
1000705-7 = "但是不管怎麼反覆背誦課本，都無法理解問題本身嘛。"
1000705-8 = "尤其是國文！ #n閱讀文章推測登場人物的心境，這不是讀心術的領域嗎？"
1000705-9 = "嗯？明明能當駭客，為什麼解不開這麼簡單的問題？"
1000705-10 = "你在說什麼啊！駭客還比較簡單哦！"
1000705-11 = "往水桶倒太多水的話內容物就會流出來。 #n沒有適合的鑰匙時，請擁有鑰匙的人開啟。駭客的工作都是這種用常識就很好理解的行動！"
1000705-12 = "破解國文的問題比駭客簡單多了？ 咦──，有那種事嗎？#n唔──嗯……我看看……"
1000705-13 = "咦？哼哼，原來如此，這種表現方式很多的時候就表示登場角色很開心啊？ #n這樣啊，我懂了！"
1000705-14 = "老師，那這是什麼意思……？"
1000705-16 = "謝謝，老師！ #n只要依照老師教的方式做的話，感覺下次考試就沒問題了！"
1000705-17 = "連這麼困難的問題都能說明得那麼容易理解，不愧是老師！"
1000705-18 = "什麼？是因為我的理解得快？"
1000705-19 = "呵呵，被那樣稱讚有點讓人害羞呢。"
1000705-20 = "雖然我的頭腦不像貝里塔斯其他前輩那麼聰明，但我也不想因為跟不上課程而造成其他成員的困擾。"
1000705-21 = "因為貝里塔斯是少數不會叫我問題兒童、認可我的才能，非常重要的地方。"
1000705-22 = "當然老師也是，對我來說也是一樣特別的存在。 #n所以我會更加更加……努力的。"
1000705-23 = "啊，啊哈哈！感，感覺說了令人難為情的話呢。 #n最後那句話忘掉吧！"
1000705-24 = "好了。那麼，為了記住老師幫我整理的內容，再重看一次筆記試著記住吧？"
1000705-25 = "「此筆記本是使用80g的白象畫學紙作為內頁，裁切為規格297mm×210mm的A型用紙尺寸，100枚印有流水號的內頁……」"
1000705-26 = "嗯？我在唸什麼？ #n筆記本最開始的地方寫的文章呀？"
1000705-27 = "咦，這是不用記住的文章嗎？ #n因為老師說要背下所有筆記……"
1000705-28 = "等，等等！分不清到底是笨蛋還是天才， #n什麼意思啊！老師！"

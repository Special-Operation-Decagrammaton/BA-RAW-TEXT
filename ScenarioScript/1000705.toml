[translation]
1000705-1 = "Brilliant or Brainless"
1000705-2 = "Millennium School Classroom"
1000705-3 = "Studying has nothing to do with me failing the test..."
1000705-4 = "Millennium's tests are too hard to begin with! None of the problems are meant for average high school students!"
1000705-5 = "[s] \"You could solve anything if you would just apply yourself.\""
1000705-6 = "Sensei, you're starting to sound like a teacher... Wait. I guess you are one."
1000705-7 = "Besides, studying the textbooks doesn't help me understand the questions."
1000705-8 = "Especially with literature! How am I supposed to know what the narrator is feeling just from reading a paragraph? I can't read minds, you know!"
1000705-9 = "What? How can I be such a good hacker if I can't answer such simple questions?"
1000705-10 = "I don't get what you mean. Hacking is way easier than this."
1000705-11 = "Pouring too much water in a bucket will make it overflow. When you don't have the key you need to open something, you ask the person who does. It's all so simple!"
1000705-12 = "But solving literature questions is supposed to be easier than hacking? Let's see about that..."
1000705-13 = "Oh, so this part means that the character is happy. Right, I think I get it!"
1000705-14 = "What about this part, Sensei? What does this mean...?"
1000705-16 = "Thanks, Sensei! I'm going to ace the make-up exam at this rate."
1000705-17 = "It's amazing how easy you make it to understand complex questions."
1000705-18 = "Huh? You think it's because I'm a fast learner?"
1000705-19 = "Haha. Don't flatter me."
1000705-20 = "I may not be the smartest Veritas member, but the last thing I want is to fall behind the curriculum."
1000705-21 = "And it's not like Veritas sees me as a troublemaker. It's one of the only places where I feel like my talents are understood."
1000705-22 = "Besides, you mean a lot to me too, Sensei. So... I'm going to try harder."
1000705-23 = "Haha! That came out way too embarrassing. Forget I said anything!"
1000705-24 = "Ahem. Did I memorize the notebook you gave me? "
1000705-25 = "Here it says the notebook is 100 sheets of 80-gram A-type white paper cut to 297 by 210 millimeters..."
1000705-26 = "Hmm? What am I reading? It's the beginning of the notebook you gave me."
1000705-27 = "*gasp* I'm not supposed to memorize that part? I thought you told me to memorize everything inside..."
1000705-28 = "E-Excuse me? You can't tell whether I'm brilliant or brainless? What's that supposed to mean, Sensei?!"

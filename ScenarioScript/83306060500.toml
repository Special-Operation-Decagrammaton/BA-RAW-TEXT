[translation]
83306060500-6 = "ค่ะ ชมรมหน่วยแพทย์ฉุกเฉินมาถึงตามที่ได้รับแจ้งแล้วค่ะ"
83306060500-7 = "น่าจะงานยุ่งกันแท้ๆ เลย ขอบใจที่มานะ"
83306060500-8 = "ไม่เป็นไรเลยค่ะ ทางเราก็ได้รับแจ้งมาเหมือนกันค่ะว่ามีนักเรียนที่หมดสติไปเพราะอาหารเป็นพิษ"
83306060500-9 = "ดีแล้วละค่ะที่พวกเรามาช่วยได้"
83306060500-10 = "ถ้างั้นฉันขอเคลื่อนย้ายศพ... ไม่สิ ขอเคลื่อนย้ายผู้ป่วยไปก่อนนะคะ"
83306060500-11 = "อื้ม รบกวนด้วยนะ"

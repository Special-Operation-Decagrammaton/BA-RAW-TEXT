[translation]
1010502-1 = "便當的去向"
1010502-2 = "（為了鼓勵正在練習的瑪麗，特別前往了練習室）"
1010502-8 = "嗯……？有人來了嗎……？"
1010502-9 = "老師……？"
1010502-10 = "……！？#n老，老師！？您怎麼會來這裡……"
1010502-11 = "……咦？"
1010502-12 = "只是順道來幫我加油？#n沒，沒關係的！您其實不必特地跑一趟……！"
1010502-13 = "啊，是因為我傳給您的訊息嗎……！"
1010502-14 = "非常抱歉。#n害您多跑了一趟……"
1010502-15 = "跟訊息無關……是嗎？#n那，那就好……"
1010502-16 = "……其他人？#n沒，沒有。現在只有我一個人而已。"
1010502-17 = "其實我們直到剛才都還在一起練習，只是他們兩位本來就有很多工作要忙……"
1010502-18 = "剛好我今天沒有其他行程，所以才想利用時間多練習一下……"
1010502-22 = "啊！您不需要擔心！#n我練習的情況很順利，不管唱歌還是跳舞都學得很快！"
1010502-23 = "之所以留下來練習，只是想在上台時表現得更游刃有餘……"
1010502-24 = "話，話說回來，老師您吃過飯了嗎？#n已經到午餐時間了呢！"
1010502-25 = "如果不介意的話，要不要跟我一起吃便當……"
1010502-26 = "……嗯？"
1010502-27 = "沒關係？便當看起來不夠兩個人吃？"
1010502-28 = "雖，雖然確實是這樣沒錯……"
1010502-29 = "[s1]「待會還要繼續練習的話，就得先填飽肚子才行。」\n[s2]「我晚點再自己去買就行了。」"
1010502-32 = "唔嗯……既然您都這麼說了……"
1010502-33 = "可是如果只有我一個人吃的話……"
1010502-34 = "我看還是等老師走了之後再吃吧……"
1010502-35 = "……嗯？"
1010502-36 = "您，您說那您現在就走！？#n為，為什麼呢……！？"
1010502-37 = "[s3]「在這邊打擾你吃飯也不太好。」\n[s4]「畢竟我不是來給你添麻煩的。」"
1010502-40 = "真，真是的……！唔唔……"
1010502-41 = "您，您竟然用這種方法讓我無從抵抗……真是壞心眼……"
1010502-42 = "我，我知道了。#n既然如此……我也只好相信老師之後一定會乖乖吃飯……"
1010502-46 = "自，自己……先開動了……"
1010502-51 = "[ns5] 整理周圍的東西\n[ns6] 站起來打掃練習室"
1010502-54 = "……老師！？#n您為什麼突然開始整理……"
1010502-55 = "只是想稍微整理一下，讓我等等練習的時候輕鬆一點？#n沒，沒關係的！我並沒有這個意思，老師您怎麼……"
1010502-56 = "打掃這種事應該由我來做才對……"
1010502-57 = "……嗯？"
1010502-58 = "因為是來幫我加油的，所以這種事交給您來做就行了……？"
1010502-59 = "而且如果吃飯的時候被一直看著也會有壓力？#n那，那個……"
1010502-60 = "雖，雖然就像您說的一樣，那確實會讓人有點尷尬……"
1010502-61 = "可是這樣就只有我單方面接受老師的幫助，讓我有點不知如何是好。"
1010502-62 = "[s7]「沒必要想得那麼複雜哦。」\n[s8]「你現在只要專心練習就行了。」"
1010502-65 = "就算您這麼說……"
1010502-66 = "唔嗯……"
1010502-71 = "[ns9]「……瑪麗？」\n[ns10]「為什麼要突然站起來？」"
1010502-76 = "……老師。"
1010502-77 = "既然您都這麼說了，希望您能夠答應我一件事……#n可以請您配合我的固執嗎？"
1010502-78 = "為了讓我之後能專心練習……"
1010502-79 = "請把這當作是在幫助我，讓我心裡好過一點吧。"
1010502-80 = "……嗯。這樣的理由很充分。"
1010502-81 = "所以，請把這個……"
1010502-85 = "[ns11]「這是……玉子燒？」\n[ns12]「這不是瑪麗自己要吃的嗎？」"
1010502-88 = "……不。"
1010502-89 = "這是老師的份。#n只吃一個的話，便當的份量也不會減少太多。"
1010502-90 = "要是讓什麼都沒吃的老師幫我這麼多忙，我肯定會對這件事耿耿於懷……"
1010502-91 = "所以，如果您希望我之後的練習能更輕鬆的話……"
1010502-92 = "就算只吃一口也好，可以請您享用我的便當嗎？"
1010502-93 = "……不，請您務必要吃。這件事我是絕對不會退讓的。"
1010502-94 = "所以，來……老師。"
1010502-95 = "…………"
1010502-97 = "……請您張開嘴巴。"
1010502-98 = "啊～"

1010502-21 = "3;마리 체육복;01\n#3;em;…\n#wait;2500"
1010502-22 = "3;마리 체육복;04;아! 걱정하실 필요는 없어요! 연습은 잘 돼 가고 있고, 노래도 안무도 모두 순조로우니까요!\n#3;em;[반응]"
1010502-23 = "3;마리 체육복;03;지금 남아서 연습하는 건, 순전히 조금 더 여유 있게 다듬고 싶어서일 뿐인 거라……."
1010502-24 = "3;마리 체육복;02;그, 그러고 보니 식사는 하셨나요, 선생님? 슬슬 점심시간이네요!\n#3;hophop"
1010502-25 = "3;마리 체육복;01;괜찮으시다면, 여기 도시락이라도 같이 드시는 게…….\n#3;m4"
1010502-26 = "3;마리 체육복;02;……네?"
1010502-27 = "3;마리 체육복;04;괜찮으시다고요? 나눠 먹기에는 양이 조금 부족해 보인다고요?\n#3;stiff"

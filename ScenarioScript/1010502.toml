[translation]
1010502-1 = "Where's Your Bento?"
1010502-2 = "To cheer up Mari during her rehearsal, I headed to the practice room."
1010502-8 = "Huh...? Is someone there...?"
1010502-9 = "...Sensei?"
1010502-10 = "...Sensei, what are you doing here?"
1010502-11 = "What was that?"
1010502-12 = "You just came to cheer me up? Oh, no, you didn't have to..."
1010502-13 = "Oh, it was because of the message?"
1010502-14 = "I'm sorry. I feel like I dragged you over here needlessly."
1010502-15 = "No, I didn't? Phew, that's a relief."
1010502-16 = "...The others? O-Oh, it's just me at the moment."
1010502-17 = "They were practicing together until just now, but they're both busy with other things too."
1010502-18 = "I don't have anything else on my plate right now, so I figured I might as well get some practice in myself."
1010502-22 = "Oh, it's going well. Both the song and the dance are coming along pretty smoothly."
1010502-23 = "I just want to get even better, so I keep on practicing when I have the chance."
1010502-24 = "Oh, off topic, have you eaten, Sensei? It's almost lunchtime."
1010502-25 = "If you'd like, I have bento we could share..."
1010502-26 = "Hmm?"
1010502-27 = "There's not much, so you want me to have it all?"
1010502-28 = "Well, there isn't much, that's true..."
1010502-29 = "[s1] \"You can't practice on an empty stomach.\"\n[s2] \"I can get something else for myself.\""
1010502-32 = "Um... Well, I suppose you're right."
1010502-33 = "Still, it'd be rude for me to eat in front of you..."
1010502-34 = "I can wait to eat this until, you know, later."
1010502-35 = "Hmm?"
1010502-36 = "Y-You'll be going, then?! Wh-Why...?!"
1010502-37 = "[s3] \"I want to let you eat in peace.\"\n[s4] \"I didn't want to pile on to your worries.\""
1010502-40 = "W-Well...! U-Ugh..."
1010502-41 = "Great, now I HAVE to eat in front of you. You're mean."
1010502-42 = "But okay, fine. I'll just trust that you'll eat later."
1010502-46 = "A-And I'll go ahead and...eat now."
1010502-51 = "[ns5] Organize the nearby supplies.\n[ns6] Straighten up the furniture."
1010502-54 = "Hm? Sensei, why are you doing that?"
1010502-55 = "So it'll be easier to practice more? N-No, I mean, why are YOU doing that?"
1010502-56 = "That's supposed to be my job."
1010502-57 = "Hmm?"
1010502-58 = "You're here to support me, so I should let you do that much...?"
1010502-59 = "And you don't want to embarrass me by watching me eat? W-Well..."
1010502-60 = "I-I suppose that could get embarrassing..."
1010502-61 = "But this feels so one-sided. I don't know how to thank you."
1010502-62 = "[s7] \"Just take it easy.\"\n[s8] \"Let's just focus on practice for now.\""
1010502-65 = "Even when you say that..."
1010502-66 = "Mmm..."
1010502-71 = "[ns9] \"...Mari?\"\n[ns10] \"What're you getting up for?\""
1010502-76 = "...Sensei."
1010502-77 = "If you could just humor my stubbornness for a moment..."
1010502-78 = "Think of it as..."
1010502-79 = "...the bare minimum for me to feel at ease so I can focus on practice."
1010502-80 = "...Right, nice and reasonable."
1010502-81 = "So please, here, take this..."
1010502-85 = "[ns11] \"Your rolled omelet?\"\n[ns12] \"Weren't you going to eat this?\""
1010502-88 = "...No. It's not mine."
1010502-89 = "It's for you, Sensei. It's just one. Not a big deal."
1010502-90 = "If you keep on helping me without a bite to eat, I'm going to be focused on that."
1010502-91 = "So if you're really trying to help me feel comfortable while I'm practicing..."
1010502-92 = "...just take a bite and I'll feel better."
1010502-93 = "...No, really, I insist. Like I said, stubbornness."
1010502-94 = "All right. Now, Sensei..."
1010502-95 = "..."
1010502-97 = "...Say ahh."
1010502-98 = "Ahhhh..."

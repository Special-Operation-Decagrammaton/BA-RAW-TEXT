1010502-10 = "3;마리 체육복;04;……?! 서, 선생님!? 어쩐 일로 여기에…….\n#3;em;[?!]\n#3;a"
1010502-11 = "3;마리 체육복;08;……네?"
1010502-12 = "3;마리 체육복;08;그냥 격려차 들리셨다고요? 아, 아니! 안 그러셔도 되는데……!\n#3;stiff"
1010502-13 = "3;마리 체육복;04;……아, 혹시 보낸 메시지가……!"
1010502-14 = "3;마리 체육복;06;죄송해요. 괜히 또 발걸음을 하시게 만든 게 아닌지…….\n#3;em;[속상함]"
1010502-15 = "3;마리 체육복;04;그런 거 아니라고요? 그거랑은 별개……? 그, 그러면 다행이지만……."
1010502-16 = "3;마리 체육복;02;……다른 분들이요? 아, 아뇨. 지금은 저 혼자뿐이에요.\n#3;em;[?]"
1010502-17 = "3;마리 체육복;07;아까 전까지는 같이 연습을 하셨지만, 두 분 모두 다른 업무도 바쁘신 분들이라……."
1010502-18 = "3;마리 체육복;01;저는 오늘 특별한 일정이 없는 날이거든요. 그래서 이왕 시간도 남겠다, 조금 더 연습해 두려고……."

[translation]
1010502-1 = "หนึ่งคำจากไอดอล"
1010502-2 = "(คุณครูไปหามารีที่ห้องซ้อมเพื่อให้กำลังใจ)"
1010502-8 = "หืม...? มีใครมาเหรอคะ...?"
1010502-9 = "คุณครู...?"
1010502-10 = "คะ... คุณครู...?! มีธุระอะไรที่นี่..."
1010502-11 = "คะ...?"
1010502-12 = "แค่แวะมาให้กำลังใจเหรอคะ? ตะ... ตายจริง! ไม่ต้องทำถึงขนาดนี้ก็ได้ค่ะ...!"
1010502-13 = "อ๊ะ... หรือเป็นเพราะข้อความที่ฉันส่งไป...!"
1010502-14 = "ขอโทษด้วยค่ะ ฉันทำให้คุณครูต้องลำบากหรือเปล่า..."
1010502-15 = "ไม่เหรอคะ? ไม่ลำบากอย่างนั้นเหรอคะ? ถะ... ถ้าอย่างนั้นก็โล่งอกไปทีค่ะ..."
1010502-16 = "คนอื่นน่ะเหรอคะ...? มะ... ไม่อยู่หรอกค่ะ ตอนนี้ฉันอยู่คนเดียวค่ะ"
1010502-17 = "เราซ้อมด้วยกันมาครึ่งวันแล้ว และทั้ง 2 คนก็ยุ่งกับงานอื่นด้วย..."
1010502-18 = "วันนี้ไม่มีตารางงานอะไรเป็นพิเศษน่ะค่ะ ไหนๆ ก็มีเวลาเหลือแล้ว ฉันก็เลยว่าจะซ้อมต่ออีกหน่อยค่ะ..."
1010502-22 = "อ้อ! ไม่ต้องกังวลนะคะ! การฝึกซ้อมเป็นไปได้ด้วยดี การร้องและเต้นก็ราบรื่นดีค่ะ!"
1010502-23 = "แต่ที่ฉันยังอยู่ซ้อมต่อแบบนี้ ก็เพราะฉันอยากขัดเกลาตัวเองให้มากกว่านี้เท่านั้นน่ะค่ะ..."
1010502-24 = "จะ... จะว่าไป คุณครูทานอะไรมาแล้วหรือยังคะ? ใกล้จะถึงเวลาอาหารกลางวันแล้วนะคะ!"
1010502-25 = "ถ้าคุณครูไม่รังเกียจ มาทานข้าวกล่องกับฉันที่นี่มั้ยคะ..."
1010502-26 = "คะ...?"
1010502-27 = "ไม่เป็นไรเหรอคะ? ดูปริมาณแล้วไม่น่าจะพอสำหรับแบ่งกันกินเหรอคะ?"
1010502-28 = "กะ... ก็ดูจะเป็นอย่างนั้นนะคะ..."
1010502-29 = "[s1] \"ถ้าจะซ้อมต่อก็ต้องกินให้อิ่มท้องสิ\"\n[s2] \"ไว้ครูไปหาอะไรกินต่างหากก็ได้\""
1010502-32 = "อืม... ถ้าคุณครูพูดแบบนั้น ฉันก็ว่าอะไรต่อไม่ได้ค่ะ"
1010502-33 = "แต่ถึงอย่างนั้น ถ้าฉันเอาแต่กินต่อหน้าคุณครูอยู่คนเดียวละก็..."
1010502-34 = "หรือว่าไว้ค่อยกินตอนคุณครูกลับไปแล้วดีนะ..."
1010502-35 = "คะ...?"
1010502-36 = "ถะ... ถ้าอย่างนั้นจะไปตอนนี้เลยเหรอคะ!? ทะ... ทำไมล่ะคะ...!?"
1010502-37 = "[s3] \"มารีจะได้กินข้าวกลางวันไง\"\n[s4] \"ครูไม่ได้จะมาทำให้มารียิ่งเป็นกังวลนี่นา\""
1010502-40 = "ระ... เรื่องนั้นมัน...! อะ... อึก..."
1010502-41 = "ทะ... ทำไมถึงทำให้เป็นสถานการณ์ที่ฉันทำอะไรไม่ได้แบบนี้ล่ะคะ... ทำเกินไปแล้วนะคะ..."
1010502-42 = "ขะ... เข้าใจแล้วค่ะ ถ้าอย่างนั้น... ฉันจะเชื่อว่าคุณครูจะไปหาอะไรทานทีหลัง..."
1010502-46 = "ถะ... ถ้าอย่างนั้นฉันขอกินก่อน... นะคะ..."
1010502-51 = "[ns5] จัดข้าวของในห้อง\n[ns6] ลุกขึ้นจัดระเบียบห้องซ้อม"
1010502-54 = "คุณครู!? ทำไมจู่ๆ ถึงไปจัดข้าวของล่ะคะ...!?"
1010502-55 = "แค่จะจัดอะไรนิดหน่อยเพื่อให้ฉันฝึกซ้อมได้อย่างสะดวกงั้นเหรอคะ? มะ... ไม่เป็นไรค่ะ! ทำไมคุณครูถึงไปทำอะไรแบบนั้นคะ..."
1010502-56 = "คนที่ต้องเก็บกวาดควรเป็นฉันมากกว่าสิ..."
1010502-57 = "คะ...?"
1010502-58 = "คุณครูมาให้กำลังใจ ก็เลยขอให้ได้ทำอะไรบ้างอย่างนั้นเหรอคะ?"
1010502-59 = "เพราะถ้าคุณครูนั่งดูฉันกินข้าว ฉันก็อาจจะประหม่าได้? ระ... เรื่องนั้น..."
1010502-60 = "ฉะ... ฉันก็น่าจะเกร็งๆ อย่างที่คุณครูบอกจริงๆ นั่นแหละค่ะ..."
1010502-61 = "แต่พอรู้สึกว่าฉันเอาแต่ได้รับความช่วยเหลือ ฉันก็ไม่รู้ว่าต้องทำยังไงค่ะ"
1010502-62 = "[s7] \"ทำตัวตามสบายเถอะนะ\"\n[s8] \"ตอนนี้คิดแค่เรื่องฝึกซ้อมดีกว่า!\""
1010502-65 = "ถึงจะพูดอย่างนั้นก็เถอะ..."
1010502-66 = "อืม..."
1010502-71 = "[ns9] \"มารี มีอะไรเหรอ...?\"\n[ns10] \"ลุกขึ้นมาทำไมเหรอ มารี...?\""
1010502-76 = "คุณครู..."
1010502-77 = "ถ้าคุณครูว่าอย่างนั้น คุณครูก็ต้อง... ยอมให้ฉันทำตัวดื้อๆ ด้วยนะคะ"
1010502-78 = "ฉันอยากให้คุณครูคิดว่านี่เป็นสิ่งเล็กๆ น้อยๆ ที่จะทำให้ฉันสบายใจขึ้น..."
1010502-79 = "และให้ฉันโฟกัสกับการฝึกซ้อมต่อได้อย่างที่คุณครูบอกค่ะ"
1010502-80 = "ค่ะ... เท่านี้ก็เพียงพอแล้วค่ะ"
1010502-81 = "เพราะงั้น... ช่วยรับนี่..."
1010502-85 = "[ns11] \"นี่มัน... ไข่ม้วนของมารีไม่ใช่เหรอ?\"\n[ns12] \"นี่ไข่ม้วนจากกล่องข้าวของมารีไม่ใช่เหรอ?\""
1010502-88 = "ไม่ใช่ค่ะ..."
1010502-89 = "นี่คือไข่ม้วนของคุณครูค่ะ ฉันแบ่งให้อันเดียว คงไม่ทำให้ฉันไม่อิ่มหรอกค่ะ"
1010502-90 = "ถ้าคุณครูมาช่วยฉันโดยที่ไม่ได้ทานอะไรเลย ฉันจะยิ่งรู้สึกผิดและเลิกคิดเรื่องนั้นไม่ได้"
1010502-91 = "เพราะงั้นถ้าคุณครูอยากช่วยให้ฉันฝึกซ้อมต่ออย่างสะดวกและสบายใจจริงๆ ละก็..."
1010502-92 = "ช่วยทานสักคำได้มั้ยคะ?"
1010502-93 = "ไม่สิ ยังไงก็ต้องทานค่ะ... วันนี้ฉันจะขอดื้อเป็นพิเศษค่ะ"
1010502-94 = "เพราะงั้น เอาละ... คุณครูคะ"
1010502-95 = "..."
1010502-97 = "อ้าปากสิคะ อ้าม..."
1010502-98 = "อ้ามม..."

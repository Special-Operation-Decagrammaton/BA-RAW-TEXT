[translation]
52200-1 = "第20話;原本的模樣 "
52200-2 = "這個少女，真的是傳說中的大預言者葛葉嗎……？"
52200-3 = "雖然這地方確實有股神祕的氛圍，但這麼可愛又纖細的少女竟然是葛葉大人……#n小女子實在有些難以置信。"
52200-4 = "呵呵，會這麼想倒也不奇怪。"
52200-5 = "身為百花繚亂的初代委員長，不僅精通用兵之術，還兼具如此美貌的少女……#n即便在以美色聞名的百鬼夜行之中也極為罕見啊。"
52200-6 = "[s1]「你……就是那個葛葉？」\n[s2]「這種自信滿滿的語氣，總覺得有點像名草呢。」"
52200-8 = "哦？雖然稱妾身像遙遠的後輩聽起來並不壞，但似乎有點語病啊。"
52200-9 = "並非妾身像名草，而是名草像妾身才對。"
52200-10 = "儘管外表如此，妾身的誕生可是早於名草數百年啊。"
52200-14 = "呼呣，你就是夏萊的老師吧。"
52200-15 = "儘管妾身有很多話想說……"
52200-16 = "來得也太晚了！"
52200-17 = "妾身都送出書信多久了，你竟現在才來──即便忙碌也該有個限度才是。"
52200-18 = "莫非你認為對妾身這般的妖狐而言，時間的流逝會慢上許多嗎？"
52200-19 = "[s3]「我，我絕對不是故意遲到的！」\n[s4]「雖然有各種原因……很抱歉我來晚了。」"
52200-22 = "呼呣……也罷。"
52200-23 = "畢竟當初加上「如果想拯救某人」前提的是妾身，且妾身也清楚有很多學生在等你。"
52200-24 = "從你的表情來看，似乎已經得出了自己的結論呢。"
52200-25 = "[s]「葛葉，其實我──」"
52200-29 = "好了，到此為止。"
52200-36 = "各位應該沒忘記吧？#n讓你們能夠來到這裡的人是我。"
52200-37 = "麻煩暫時讓開，讓我和葛葉大人單獨談談關於怪書的事好嗎？"
52200-38 = "箭吹棕櫚……"
52200-39 = "怎麼啦，名草醬。#n以為這樣盯著我，我就會害怕嗎？"
52200-40 = "沒有百蓮的你，根本沒什麼好怕的～"
52200-41 = "不過畢竟是多虧了你才能找到黃昏寺院，我就饒你一命──"
52200-46 = "什，什麼！？#n剛才那一擊是……？"
52200-47 = "竟敢在大人說話的時候插嘴，真是放肆的傢伙。"
52200-48 = "還不立刻退下。"
52200-53 = "不，不可能……沒有百蓮，怎麼可能無效怪書的神祕──"
52200-54 = "唉……還以為你只是無禮，沒想到還如此愚鈍啊。"
52200-55 = "百蓮的資格本就源自於妾身，又豈有妾身無法使用百蓮之力的道理呢？"
52200-56 = "你的愚蠢實在難以理解。"
52200-57 = "況且此處可是時間與歲月都和俗世不同的「黃昏寺院」。#n在黃昏之中，任何事都可能發生……好好銘記在心吧。"
52200-67 = "嗚……嗚嗚嗚……"
52200-68 = "我，我要把這件事告訴雛罌粟大人！"
52200-72 = "呵呵，真像個仰仗手中刀械耀武揚威的小孩。"
52200-76 = "那麼，後輩啊。#n你為何來找妾身？"
52200-77 = "應該不只是為了帶夏萊的老師過來吧。"
52200-78 = "……"
52200-79 = "一度否認妾身的你，如今再次踏入這座寺院……是否意味著你承認妾身就是葛葉？"
52200-80 = "沒錯。我不會再否認你是葛葉這件事了。"
52200-81 = "有了你的認可，我才能以百花繚亂正統繼承者的身分使用百蓮的力量……#n這點我已經明白了。"
52200-82 = "但是……"
52200-86 = "……為什麼那個人不是「菖蒲」呢？"
52200-87 = "菖蒲他明明比我更優秀、更渴望力量……卻無法見到你。"
52200-88 = "為什麼你會出現在我這種滿是不足的人面前？"
52200-89 = "如果你當時承認菖蒲，將百蓮的資格傳給他的話……"
52200-91 = "菖蒲和百花繚亂的大家就都不會受傷……"
52200-92 = "……一切的關係也不會改變了。"
52200-93 = "你真的認為這樣就沒有任何人會受傷嗎？"
52200-97 = "倘若菖蒲能見到妾身、自由使用百蓮……所有人就能一直過著幸福的生活了嗎？"
52200-98 = "這……"
52200-99 = "況且你可別誤會了──能否踏入「黃昏寺院」並非取決於妾身的判斷或決定。"
52200-100 = "這座「黃昏寺院」是現實中早已消失的殘影。#n妾身也不過是個幾乎已遭人遺忘的存在罷了。"
52200-101 = "在光與暗共存的這片奇異黃昏之中，過去的存在就宛如黑暗中逐漸消逝的影子──"
52200-102 = "追逐已逝光芒之人，又豈能看見舊日的影子呢？"
52200-103 = "不願承認己身黑暗，便無法照亮他人。"
52200-104 = "唯有背對微弱曙光，無懼踏入黑暗之人……才能看見自己面前的影子。"
52200-105 = "……這便是你能見到妾身，而菖蒲不能的原因。"
52200-106 = "但即便如此……我也不能就這樣放著菖蒲不管。"
52200-107 = "拜託你告訴我……"
52200-108 = "該怎麼做，才能讓菖蒲恢復「原本的樣子」？"
52200-109 = "原本的樣子啊……"
52200-113 = "後輩，你所謂「原本的菖蒲」是什麼模樣？"
52200-114 = "原本的菖蒲……"
52200-115 = "我記憶中的菖蒲，是像正午的陽光一樣溫暖、來者不拒的優秀百花繚亂委員長──"
52200-116 = "僅憑這個說法，就能描繪出菖蒲的全部嗎？"
52200-117 = "你能確信菖蒲是個表裡如一、透明無瑕的存在嗎？"
52200-118 = "這……"
52200-121 = "這次的對練也很精采。#n謝謝你，名草。"
52200-125 = "但幸福的夢一旦醒來，就只能不斷反芻痛苦的現實。"
52200-129 = "從來沒有把你當成朋友。"
52200-134 = "世人往往都戴著面具生活。"
52200-135 = "為了不被討厭、為了不被拋棄……#n因而扮演著對方期待的模樣，將討喜的印象戴在臉上。"
52200-136 = "這是人與人共存時，理所當然的事。"
52200-137 = "有時某個面具會與本人的臉完美契合，導致旁人誤以為那就是對方的真面目──"
52200-138 = "然而那張臉究竟是真是假，唯有自己才能判斷。"
52200-139 = "我再問你一次。#n你所期望的「原來的菖蒲」是什麼模樣？"
52200-143 = "我所期望的，原本的菖蒲……"
52200-151 = "我……不知道。#n因為我不是菖蒲。"
52200-152 = "因為我不是菖蒲，所以無法得知他真正的模樣。"
52200-153 = "不過即便如此……#n就算菖蒲並不這麼期望──"
52200-154 = "我還是想留在菖蒲的身邊。"
52200-155 = "所謂覆水難收……存在既已有所改變，便無法恢復本來的模樣。"
52200-156 = "就像死者無法重生，花落之後必然結果一般……#n在因果流轉的世界之中，這是理所當然的道理。"
52200-157 = "但即便如此……如果你還是有想要拯救的對象……"
52200-161 = "呵呵，看來[USERNAME]老師已經知道該怎麼做了呢。"
52200-164 = "不過我總算稍微明白了，老師。"
52200-165 = "為什麼星野前輩的本質明明已經反轉，卻還是可以恢復原來的狀態。"
52200-166 = "前輩和我不同，從一開始就是不完整的狀態。#n雖然他並不是因「色彩」而反轉……"
52200-167 = "但我想前輩他，肯定是拋棄了曾是自身本質的一部分自我。所以……"
52200-168 = "……他才能夠繼續向前邁進。"
52200-171 = "無論自己是什麼模樣，只要不去否定，願意接納並認可──"
52200-172 = "任何人都能夠邁向明天。"
52200-173 = "後輩啊，你想救菖蒲嗎？"
52200-174 = "不管用什麼方法，我都想救他。"
52200-175 = "既然如此，就不要否定他。"
52200-176 = "即使無法理解也不要否定──就算想逃避也要勇敢面對。#n如此一來就能看見前方的道路。"
52200-177 = "徬徨於黃昏中的夥伴，以及你伸向他的手……想必也能在這段旅途中重逢吧。"
52200-178 = "……夠了！"
52200-184 = "你們以為我來到這裡……是為了聽這種詭辯嗎？"
52200-185 = "人類……普通的人類，絕對無法真正理解他人。"
52200-186 = "如果只靠幾句空泛的說詞就能被理解、被拯救的話……還有誰會在意那些流言蜚語！"
52200-187 = "如果不持續在焦慮和痛苦中證明自己的話，哪有人理會你面具下的表情！"
52200-188 = "否則連怪書都沒有的我，在失去《稻生物怪錄》的那一刻就已經──"
52200-189 = "《稻生物怪錄》……？"
52200-190 = "啊，那本破舊的怪談集嗎？#n那種破書有什麼意義。"
52200-191 = "那，那種破書……？"
52200-192 = "既然難得來到「黃昏寺院」，妾身也給你一個建議吧，稚嫩的孩子啊。"
52200-197 = "書的價值取決於當中記載的故事，而非華麗的外表。"
52200-198 = "等你真正明白這個道理之後，你也將擁有屬於自己的怪書。"
52200-199 = "就算你想用這種詭辯敷衍過去……"
52200-200 = "詭辯……？#n難道你還不明白，所有故事都是從詭辯開始的嗎？"
52200-201 = "想成為一名出色的說書人，你似乎還差得遠呢。"
52200-206 = "嗚嗚嗚……"
52200-207 = "我最討厭百花繚亂了啦！"
52200-209 = "下一話;他人的視線"

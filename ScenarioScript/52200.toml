52200-21 = "#wait;10"
52200-22 = "3;쿠즈노하;08;……흐음. 뭐, 어쩔 수 없는가.\n#3;em;[한숨]"
52200-23 = "3;쿠즈노하;09;애초에 '누군가를 구하고 싶다면'이라고 전제를 달아둔 건 내 쪽이기도 하거니와, 그대를 기다리는 학생들이 많다는 사실은 이미 알고 있었으니까."
52200-24 = "3;쿠즈노하;01;그리고 표정을 보아하니, 이미 그대는 나름의 결론을 내린 듯하구나."

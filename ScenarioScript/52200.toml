[translation]
52200-1 = "#title;제20화;원래의 모습"
52200-2 = "3;키쿄;04;이 소녀가, 정말로 그 전설 속의 대 예언자인 쿠즈노하라고……?\n#3;a\n#3;em;[?]"
52200-3 = "4;유카리;04;어쩐지 신비로운 분위기가 느껴지는 장소이긴 하지만, 이렇게 귀엽고 가녀린 소녀가 쿠즈노하 님이라니…… 쉽게 믿기가 어렵사와요.\n#4;a\n#3;m2\n#4;stiff\n#4;em;[땀]"
52200-4 = "3;쿠즈노하;01;후후, 그렇게 생각하는 것도 무리가 아니지.\n#3;em;[재잘]\n#4;hide"
52200-5 = "3;쿠즈노하;00;백화요란의 초대 부장으로서 용병술에 능통하면서, 이만한 재색까지 갖춘 소녀는 미색이 뛰어나기로 유명한 백귀야행에서도 흔치 않은 존재니까."
52200-6 = "[s1] \"네가…… 그 쿠즈노하야?\"\n[s2] \"그 자신감 넘치는 말투는 어쩐지 나구사와도 조금 닮은 것 같네.\""
52200-7 = "#wait;10"
52200-8 = "3;쿠즈노하;02;호오. 먼 후배와 닮았다는 칭찬은 나쁘게 들리지 않지만, 그 말에는 조금 어폐가 있구나."
52200-9 = "3;쿠즈노하;01;내가 나구사를 닮은 것이 아니라, 나구사가 나를 닮은 것이겠지."
52200-10 = "3;쿠즈노하;00;이래 보여도 이 몸은 나구사가 태어나기 수백 년 전부터 살아온 존재니까."

[translation]
52200-1 = "ตอนที่ 20;คนเดิม"
52200-2 = "เด็กสาวคนนี้คือคุซึโนฮะ ผู้พยากรณ์ใหญ่ในตำนานจริงๆ เหรอ...?"
52200-3 = "ที่นี่เป็นสถานที่ที่มีบรรยากาศลึกลับก็จริง แต่ก็ยากที่จะเชื่อว่าเด็กสาวที่น่ารักและอ้อนแอ้นเช่นนี้... จะเป็นท่านคุซึโนฮะนะเจ้าคะ"
52200-4 = "ฮุฮุ จะคิดเช่นนั้นก็ย่อมได้"
52200-5 = "แม้เฮียกคิยาโคจะมีชื่อเสียงโด่งดังในเรื่องความงาม แต่เด็กสาวผู้เป็นหัวหน้าคนแรกของ#nเฮียกกะเรียวรันที่ทั้งเชี่ยวชาญยุทธศาสตร์และมีพรสวรรค์เช่นนี้ก็ไม่ได้หากันได้ง่ายๆ หรอกนะ"
52200-6 = "[s1] \"เธอคือ... คุซึโนฮะงั้นเหรอ? ดูคล้ายนางุสะเลยนะ\"\n[s2] \"มีน้ำเสียงที่มั่นใจเต็มเปี่ยมเหมือนกับนางุสะเลยนะ\""
52200-8 = "โอ้ คำชมที่บอกว่าข้าคล้ายกับรุ่นน้องมันก็รื่นหูอยู่หรอก แต่คำนั้นมันเสี่ยงต่อการเข้าใจผิดอยู่นะ"
52200-9 = "ข้าไม่ได้คล้ายกับนางุสะ นางุสะต่างหากที่คล้ายกับข้า"
52200-10 = "แม้จะเห็นข้าอยู่ในรูปลักษณ์นี้ แต่ข้าก็มีชีวิตมานานหลายร้อยปีก่อนที่นางุสะจะเกิดเสียอีก"
52200-14 = "คุณคือครูจากชาเล่ต์สินะ"
52200-15 = "มีหลายสิ่งที่ข้าอยากพูดเมื่อได้พบคุณ..."
52200-16 = "แต่มันก็สายไปแล้ว!"
52200-17 = "ข้าส่งจดหมายไปนานโขแล้ว แต่คุณเพิ่งมาเอาป่านนี้... ต่อให้งานล้นมือแค่ไหนก็ต้องมาช้าแต่พอดีสิ"
52200-18 = "หรือคุณคิดว่าเวลาของปีศาจจิ้งจอกอย่างข้าผ่านไปช้ากว่าเวลาของนักเรียนคนอื่น?"
52200-19 = "[s3] \"คะ... ครูไม่ได้ตั้งใจจะมาช้านะ!\"\n[s4] \"ครูเจอมาหลายเรื่องน่ะ... ขอโทษที่มาช้านะ\""
52200-22 = "ฮืม... ก็ช่วยไม่ได้สินะ"
52200-23 = "ถึงข้าจะเป็นคนตั้งเงื่อนไขว่า 'หากเราปรารถนาจะช่วยใครบางคน' ไว้ตั้งแต่แรก แต่ข้าก็รู้ดีว่ามีนักเรียน#nมากมายรอคุณอยู่"
52200-24 = "และดูจากสีหน้าแล้ว ดูเหมือนว่าคุณจะได้ข้อสรุปของตัวเองแล้วด้วย"
52200-25 = "[s] \"คุซึโนฮะ ที่จริงแล้วครู...\""
52200-29 = "เอาละ พอได้แล้ว"
52200-36 = "พวกคุณคงยังไม่ลืมกันใช่มั้ยคะว่าฉันคือคนที่พาพวกคุณมาที่นี่น่ะ?"
52200-37 = "เชิญพวกคุณหลบไปสักพักได้มั้ยคะ ฉันจะคุยกับท่านคุซึโนฮะเกี่ยวกับหนังสือลึกลับตามลำพังค่ะ"
52200-38 = "ยาบูกิ ชูโระ..."
52200-39 = "อะไรกันคะ นางุสะจัง คิดว่าจ้องกันอย่างนั้นแล้วฉันจะกลัวเหรอคะ?"
52200-40 = "ฉันไม่กลัวคนที่ไม่มีเฮียกกุเร็นหรอกค่ะ~"
52200-41 = "แต่ก็นะ ยังไงก็ต้องขอบคุณที่ช่วยพามาวิหารอัสดง งั้นฉันจะไว้ชีวิตแล้วกัน..."
52200-46 = "อะ... อะไรกัน?! การโจมตีเมื่อกี้...?"
52200-47 = "ผู้ใหญ่กำลังคุยกันอยู่ แต่เจ้ากล้าพูดแทรกแบบนี้ เป็นเด็กที่แย่จริงเชียว"
52200-48 = "เจ้าจงออกไปเดี๋ยวนี้"
52200-53 = "ปะ... เป็นไปไม่ได้... ลบล้างความลึกลับของหนังสือลึกลับโดยไม่มีเฮียกกุเร็นได้ยังไง..."
52200-54 = "เฮ้อ ข้าอุตส่าห์นึกว่าเจ้าแค่ไม่มีมารยาท แต่เจ้ายังไม่มีสมองด้วยสินะ"
52200-55 = "สิทธิ์ในการใช้เฮียกกุเร็นสืบทอดจากตัวข้ามาตั้งแต่แรก แล้วเหตุใดเจ้าจึงคิดว่าข้าจะใช้พลังของ#nเฮียกกุเร็นไม่ได้กันเล่า?"
52200-56 = "เหตุใดเจ้าถึงโง่เขลาได้ถึงเพียงนี้กันนะ"
52200-57 = "และที่นี่ก็ยังเป็น <วิหารอัสดง> ที่เวลาและสถานการณ์ดำเนินไปต่างจากทางโลก เจ้าควรจะรู้สิว่า#nทุกอย่างล้วนเกิดขึ้นได้ในห้วงอัสดง"
52200-67 = "งะ... แงงง..."
52200-68 = "ฉะ... ฉันจะไปฟ้องท่านโคคุริโกะ!"
52200-72 = "ฮุฮุ เป็นเด็กน้อยที่จองหองเพราะเชื่ออำนาจของมีดในมือสินะ"
52200-76 = "เอาละ รุ่นน้องของข้า เหตุใดเจ้าถึงตามหาข้ากันเล่า?"
52200-77 = "เจ้าคงไม่ได้มาที่นี่เพียงเพื่อมาส่งครูจากชาเล่ต์เท่านั้นหรอกนะ..."
52200-78 = "......"
52200-79 = "เจ้าเคยปฏิเสธข้าไปแล้วครั้งหนึ่ง แต่การที่เจ้ากลับมาที่วิหารอีกครั้งนั่นก็หมายความว่าเจ้ายอมรับว่า#nข้าคือคุซึโนฮะใช่มั้ยเล่า?"
52200-80 = "ใช่ ฉันจะไม่ปฏิเสธว่าคุณคือคุซึโนฮะอีกต่อไปแล้ว"
52200-81 = "และตอนนี้ฉันก็เข้าใจแล้วว่า... ที่ฉันใช้เฮียกกุเร็นในฐานะผู้สืบทอดตำแหน่งที่เหมาะสมของ#nเฮียกกะเรียวรันได้... นั่นก็เพราะว่าคุณยอมรับฉัน"
52200-82 = "แต่ว่า..."
52200-86 = "ทำไมคนคนนั้นถึงไม่ใช่ 'อายาเมะ' ล่ะ..."
52200-87 = "อายาเมะเก่งกว่าฉันและมีความปรารถนาอันแรงกล้ากว่าฉันมาก แต่ก็ไม่อาจเจอคุณได้"
52200-88 = "ทำไมคุณถึงเลือกมาปรากฏตัวต่อหน้าฉันที่ยังบกพร่องและไม่สมบูรณ์แบบล่ะ?"
52200-89 = "ถ้าคุณได้เจออายาเมะ ถ้าคุณยอมรับในตัวเธอแล้วมอบสิทธิ์ในการใช้เฮียกกุเร็นให้กับเธอละก็..."
52200-91 = "ทั้งอายาเมะและคนอื่นในเฮียกกะเรียวรันก็คงไม่ต้องทุกข์ทนกัน..."
52200-92 = "และความสัมพันธ์ทั้งหมดก็คงไม่ต่างไปจากเดิมด้วย"
52200-93 = "เจ้าคิดจริงๆ หรือว่าจะไม่มีใครต้องเป็นทุกข์?"
52200-97 = "ถ้าอายาเมะได้เจอข้าและใช้เฮียกกุเร็นได้อย่างอิสระ เจ้าคิดว่าทุกคนจะใช้ชีวิตต่อได้อย่างมีความสุข อย่างงั้นหรือ?"
52200-98 = "เรื่องนั้น..."
52200-99 = "เจ้าคงกำลังเข้าใจอะไรผิดไป งั้นข้าจะเสริมให้แล้วกัน ข้าไม่ใช่คนกำหนดเงื่อนไขและตัดสินใจว่าใคร#nจะย่างเท้าเข้ามาใน <วิหารอัสดง> ได้หรอกนะ"
52200-100 = "<วิหารอัสดง> คือพื้นที่ในอดีตที่สูญหายไปจากความเป็นจริงมานานแล้ว และข้าก็เป็นเพียงสิ่งมีชีวิต#nที่แทบไม่มีผู้ใดจดจำได้ จะบอกว่าข้าถูกลืมไปแล้วก็ไม่ใช่เรื่องผิดอะไร"
52200-101 = "ในพลบค่ำอันพิศวงที่แสงสว่างและความมืดอยู่ร่วมกัน สิ่งมีชีวิตในอดีตก็เหมือนเงาที่ค่อยๆ จางหายไปในความมืดมิด..."
52200-102 = "ผู้ที่ไล่ตามแสงแห่งอดีตที่หายไป จะเผชิญหน้ากับเงาแห่งอดีตได้อย่างไรกัน?"
52200-103 = "แล้วผู้ไม่ยอมรับความมืดของตัวเอง จะส่องสว่างให้ผู้อื่นได้อย่างไร?"
52200-104 = "ผู้ที่ทิ้งรุ่งอรุณอันเลือนรางไว้ข้างหลังแล้วก้าวเข้าไปในความมืดอย่างไม่เกรงกลัว ผู้นั้นต่างหากที่มองเห็นเงาที่ปรากฏอยู่เบื้องหน้าได้"
52200-105 = "นั่นคือเหตุผลว่าเหตุใดเจ้าถึงเจอข้าได้ แทนที่จะเป็นอายาเมะ..."
52200-106 = "แต่ถึงอย่างนั้น... ฉันก็ทิ้งอายาเมะไว้แบบนี้ไม่ได้"
52200-107 = "ขอร้องละ ได้โปรด"
52200-108 = "ฉันต้องทำยังไงถึงจะทำให้อายาเมะกลับมาเป็น 'คนเดิม' ได้?"
52200-109 = "คนเดิมอย่างนั้นหรือ..."
52200-113 = "รุ่นน้องของข้า เจ้าคิดว่า 'อายาเมะคนเดิม' เป็นเช่นไรหรือ?"
52200-114 = "อายาเมะคนเดิม..."
52200-115 = "อายาเมะในความทรงจำของฉันคือหัวหน้าที่ยอดเยี่ยมของเฮียกกะเรียวรัน ผู้ที่อบอุ่นเหมือนแสงแดด และไม่เคยปฏิเสธอะไร..."
52200-116 = "คำอธิบายเพียงแค่นี้ก็บรรยายความเป็นอายาเมะได้ทั้งหมดแล้วหรือ?"
52200-117 = "เจ้าแน่ใจได้หรือว่าอายาเมะเป็นคนที่โปร่งใส และภายในกับภายนอกไม่ต่างกันแม้แต่น้อย?"
52200-118 = "เรื่องนั้น..."
52200-121 = "ครั้งนี้ก็เป็นการดวลที่ดีเลย... ขอบใจนะ นางุสะ"
52200-125 = "แต่กับความฝันที่มีความสุข เมื่อตื่นขึ้นมาเราก็ต้องอยู่กับความจริงที่เจ็บปวด"
52200-129 = "ฉันไม่เคยคิดว่าเธอเป็นเพื่อนเลยสักครั้ง"
52200-134 = "ทุกคนล้วนสวมหน้ากากในการใช้ชีวิตกันทั้งนั้น"
52200-135 = "เพื่อไม่ให้ถูกเกลียด เพื่อไม่ให้ถูกทอดทิ้ง ทั้งเล่นละครตบตาว่าต้องการกันและกัน ทั้งปั้นหน้าแสดงไมตรีจิตต่อกัน"
52200-136 = "ตราบใดที่มนุษย์ต้องอาศัยอยู่ด้วยกัน นั่นก็เป็นเรื่องธรรมดาที่เกิดขึ้นได้"
52200-137 = "บางครั้งหน้ากากบางอันก็เข้ากับใบหน้าพอดี จนคนอื่นที่เห็นคิดว่าเป็นใบหน้าที่แท้จริงของเรา"
52200-138 = "แต่ถึงอย่างไรก็มีตัวเราเองเท่านั้นที่ตัดสินได้ว่าใบหน้านั้นคือของจริงหรือของปลอม"
52200-139 = "ข้าจะถามอีกครั้ง อายาเมะคนเดิมที่เจ้าต้องการเป็นคนอย่างไรเล่า?"
52200-143 = "อายาเมะคนเดิมที่ฉันปรารถนาก็คือ..."
52200-151 = "ฉัน... ไม่รู้หรอก เพราะฉันไม่ใช่อายาเมะ"
52200-152 = "เพราะฉันไม่ใช่อายาเมะ ฉันไม่อาจเข้าใจได้หรอกว่าอายาเมะคนเดิมเป็นคนยังไง"
52200-153 = "แต่ว่า... ต่อให้ฉันไม่อาจเข้าใจได้ และต่อให้อายาเมะจะไม่ต้องการฉัน..."
52200-154 = "แต่ฉันก็อยากอยู่เคียงข้างอายาเมะ"
52200-155 = "หากตักน้ำที่หกไปแล้วไม่ได้ฉันใด เราก็ทำให้คนตายกลับมามีชีวิตไม่ได้ฉันนั้น ไม่มีทางที่จะคืนสภาพ#nสิ่งที่เปลี่ยนแปลงไปแล้วให้กลับเป็นเหมือนเดิมได้หรอก"
52200-156 = "นี่คือธรรมชาติของสิ่งมีชีวิตในโลกที่มีเหตุและผล ดอกไม้ที่ร่วงโรยแล้วจะเกิดลูกไม้ คนที่ตายจากไปแล้วจะไม่ฟื้นคืนมา"
52200-157 = "แต่ถึงอย่างนั้น หากเราปรารถนาจะช่วยใครสักคนแล้วละก็..."
52200-161 = "ฮุฮุ ดูเหมือนครู [USERNAME] จะรู้วิธีนั้นอยู่นะ"
52200-164 = "แต่ฉันก็มีเรื่องที่รู้มาบ้างน่ะ คุณครู"
52200-165 = "ฉันพอรู้ว่าทำไมรุ่นพี่โฮชิโนะถึงกลับมาเป็นเหมือนเดิมได้ทั้งๆ ที่ตัวเองกลับตาลปัตรไปขนาดนั้นแล้ว"
52200-166 = "แม้ว่าตอนแรกรุ่นพี่จะอยู่ในสภาวะไม่สมบูรณ์ซึ่งต่างกับของฉัน และได้เปลี่ยนแปลงสภาวะผ่านสิ่งอื่นที่#nไม่ใช่ <สีสัน>..."
52200-167 = "แต่สุดท้ายแล้ว รุ่นพี่ก็ละทิ้งสิ่งที่เคยเป็นแก่นสารของตัวเองไปส่วนหนึ่ง และนั่นก็..."
52200-168 = "คงทำให้รุ่นพี่ก้าวไปข้างหน้าได้น่ะ"
52200-171 = "ไม่ว่าจะอยู่ในตัวตนหรือรูปลักษณ์ใดก็ตาม ถ้าเราไม่ปฏิเสธสิ่งที่ตัวเองเป็นและยอมรับตัวเอง"
52200-172 = "ไม่ว่าใครก็ก้าวไปข้างหน้าสู่อนาคตได้"
52200-173 = "รุ่นน้องของข้า เจ้าปรารถนาจะช่วยอายาเมะมั้ยเล่า?"
52200-174 = "ไม่ว่าจะต้องใช้วิธีอะไร ฉันก็อยากช่วย"
52200-175 = "เช่นนั้นก็อย่าปฏิเสธผู้หญิงคนนั้นเลย"
52200-176 = "ต่อให้ไม่เข้าใจก็จงอย่าปฏิเสธ ต่อให้อยากหนีก็จงเผชิญหน้า แล้วหนทางจะปรากฏขึ้น"
52200-177 = "แล้วสหายของเจ้าที่เตร็ดเตร่อยู่ในห้วงอัสดงกับมือของเจ้าที่ยื่นออกไปหาสหาย จะได้เจอกันอีกครั้ง ในการเดินทางครั้งนั้น"
52200-178 = "พอได้แล้ววว...!"
52200-184 = "อะไรกัน... คิดว่าฉันดั้นด้นเดินทางมาถึงที่นี่เพื่อฟังคำคมอะไรนี่เหรอ?"
52200-185 = "มนุษย์น่ะ... มนุษย์ธรรมดาน่ะไม่อาจเข้าใจคนอื่นได้หรอก"
52200-186 = "ถ้าคำคมที่พ่นออกมาทำให้คนเราได้รับการเข้าใจและความช่วยเหลือ แล้วใครจะไปสนใจข่าวลือกันล่ะ!"
52200-187 = "ถ้าไม่รู้ว่าอีกฝ่ายมีสีหน้ายังไงภายใต้หน้ากาก ถ้ามัวแต่วิตกกังวลและทุกข์ใจจนไม่พิสูจน์ตัวเอง ก็จะไม่มีใครสนเราหรอก!"
52200-188 = "ถ้าไม่อย่างนั้นละก็ ตอนที่ทำ <อิโนะ โมโนโนเคะ โรคุ> หายไป... คนที่ไม่มีแม้แต่หนังสือลึกลับ#nอย่างฉันก็คง..."
52200-189 = "<อิโนะ โมโนโนเคะ โรคุ>...?"
52200-190 = "อ้อ หมายถึงหนังสือรวมเรื่องลึกลับเก่าๆ เล่มนั้นน่ะหรือ? กับอีแค่หนังสือเก่าๆ จะไปมีความหมายอะไร"
52200-191 = "กับอีแค่หนังสือเก่าๆ...?"
52200-192 = "ไหนๆ เจ้าก็มาถึง <วิหารอัสดง> แล้ว ข้าจะสอนอะไรให้แล้วกัน เจ้าเด็กยังไม่รู้จักโต"
52200-197 = "คุณค่าของหนังสืออยู่ที่เรื่องราวข้างใน หาใช่รูปลักษณ์หรูหราภายนอก"
52200-198 = "เมื่อเจ้าเข้าใจความจริงนี้ เมื่อนั้นเจ้าก็จะมีหนังสือลึกลับของตัวเอง"
52200-199 = "อย่ามาร้อยลิ้นด้วยคำคมสวยหรูเลย..."
52200-200 = "คำคมสวยหรู...? เจ้าไม่รู้หรือว่าทุกเรื่องราวล้วนเกิดจากคำคมที่สวยหรูน่ะ?"
52200-201 = "เจ้ายังต้องเติบโตอีกมากสินะ กว่าจะได้เป็นนักเล่าเรื่องที่ดีได้"
52200-206 = "อึก..."
52200-207 = "เพราะแบบนี้ละฉันถึงเกลียดเฮียกกะเรียวรัน!"
52200-209 = "ตอนต่อไป;สายตาของคนอื่น"

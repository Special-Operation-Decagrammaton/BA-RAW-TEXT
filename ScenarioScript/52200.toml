52200-14 = "3;쿠즈노하;01;그래. 그대가 샬레의 선생인가."
52200-15 = "3;쿠즈노하;08;그대를 만나게 되면 하고 싶었던 말이 여러 가지 있었다만……"
52200-16 = "3;쿠즈노하;06;늦었지 않나!\n#3;em;[빠직]\n#3;closeup\n#fontsize;80"
52200-17 = "3;쿠즈노하;09;내가 서신을 전달한 것이 언제인데, 이제야 나를 찾다니— 아무리 바쁜 몸이라 하더라도 그 정도가 있지.\n#3;closeup"
52200-18 = "3;쿠즈노하;01;아니면 그대는 나와 같은 여우 요괴의 시간은 다른 학생들과 달리 천천히 흘러가기라도 한다고 생각한 것인가?\n#3;closeup"
52200-19 = "[s3] \"이, 일부러 늦게 온 건 절대 아니야!\"\n[s4] \"여러가지 사정이 있었지만…… 늦어져서 정말 미안해.\""

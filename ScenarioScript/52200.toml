[translation]
52200-1 = "Episode 20;True Form"
52200-2 = "This girl...is truly the legendary great prophet, Kuzunoha?"
52200-3 = "The mystical setting is fitting, but her delicate, adorable appearance belies that."
52200-4 = "Fufu. It's only natural you feel that way."
52200-5 = "After all, I am the founding president of the Hyakkaryouran, educated in the art of war, and beautiful and talented. You would be hard pressed to find the like all throughout Hyakkiyako's long history."
52200-6 = "[s1] \"You're...Kuzunoha?\" \n[s2] \"Something about the way you talk reminds me of Nagusa...actually.\""
52200-8 = "Oh? While the comparison is welcome, I'm afraid you've confused timelines."
52200-9 = "I do not resemble Nagusa. Nagusa, in fact, resembles me."
52200-10 = "For I've existed for many a century before Nagusa was even a thought in the womb."
52200-14 = "So, Schale's Sensei."
52200-15 = "I have much to discuss with you, but to begin..."
52200-16 = "You're late!"
52200-17 = "It is only now you come to see me, so many moons after Nagusa delivered my letter? The excuse of \"business\" can only carry you so far."
52200-18 = "Perhaps you believed that a fox spirit like me is unaffected by time, and the neglect associated with its passing."
52200-19 = "[s3] \"I-I didn't come late on purpose!\" \n[s4] \"There were circumstances...but I am really sorry it took so long.\""
52200-22 = "Hmm... Well, very well."
52200-23 = "I suppose I prefaced my invitation with, \"if there was someone you wished to save.\" I am aware of how all the students depend on and wait for you."
52200-24 = "And if I were any judge of human expression, it would seem you've found your answer."
52200-25 = "[s] \"Kuzunoha, the truth is, I...\""
52200-29 = "All right, all right. Enough of that."
52200-36 = "You haven't forgotten, have you? You all wouldn't even be here if it weren't for me."
52200-37 = "That being said, get out. I have a tome to discuss with Kuzunoha."
52200-38 = "Yabuki Shuro..."
52200-39 = "Oooh, scary glare, Nagusa. What do you want?"
52200-40 = "Without the Hundred Lotus, all you can do is glare! Hmph!"
52200-41 = "Well, I did find the Twilight Temple thanks to you, so I guess I'll spare your little life."
52200-46 = "Wh‑What?! Did you just...hit me?!"
52200-47 = "Children should not interrupt when adults are speaking."
52200-48 = "Now, wait your turn."
52200-53 = "Sh-She hit me... She doesn't even have the Hundred Lotus... How did she nullify the tome's magic?"
52200-54 = "*sigh* So not only are you a rude one, you're a fool as well."
52200-55 = "I am the very essence of the Authority of the Presidency. Did you truly believe I would not be able to wield that which I created?"
52200-56 = "Your ignorance is astounding."
52200-57 = "And you stand here on the grounds of the Twilight Temple, in the domain of the spirit realm. Did you think you could trust the ebb and flow of time? Of reality as you expect it?"
52200-67 = "Uwah... Uwaaaaaah...!"
52200-68 = "I-I'm telling on you to Kokuriko!"
52200-72 = "Fufu, like a child who thinks she can slay a dragon with a knife."
52200-76 = "So, my successor, why do you once again tread upon these grounds?"
52200-77 = "It wasn't only to escort Sensei here, was it?"
52200-78 = "..."
52200-79 = "You denied my existence and left this temple. And yet, here you are. Do you now accept that I am the Kuzunoha of legend?"
52200-80 = "Yes. I won't deny your existence anymore."
52200-81 = "It is your recognition that allowed me to wield the Hundred Lotus, as the Hyakkaryouran's rightful successor."
52200-82 = "But..."
52200-86 = "...why wasn't it Ayame?"
52200-87 = "Ayame is more capable than me in every way possible. And she waited and waited for you."
52200-88 = "So why? Why would you appear before someone like me, who is utterly incompetent and weak?"
52200-89 = "If you had acknowledged Ayame instead, if you'd bestowed the Hundred Lotus' Authority upon her..."
52200-91 = "...Ayame and everyone at the Hyakkaryouran could have been safe."
52200-92 = "...Things wouldn't have changed the way they did."
52200-93 = "And you believe this?"
52200-97 = "If Ayame had been the one to wield the Hundred Lotus, do you truly believe that she would have led everyone to their happily ever after?"
52200-98 = "That's..."
52200-99 = "Allow me to set a few misconceptions you have straight. It is not by my hand or permission that people pass through the Twilight Temple."
52200-100 = "What you see here is an echo of the past. This place, my very existence... They are forgotten remnants that exist not in the reality from whence you came."
52200-101 = "In this strange twilight where light and darkness cross, the past fades into a shadow, melds into the dark."
52200-102 = "Those who chase the light of their past can never see its shadows."
52200-103 = "And those who cannot face their shadow, shall never shine a light for others."
52200-104 = "Only when one sheds the light of the past, unmarred by fear, can one best the darkness of their shadows."
52200-105 = "And THAT is why, unlike Ayame, you and I met."
52200-106 = "But still... I can't leave Ayame like that."
52200-107 = "So I beg of you. Please..."
52200-108 = "How do I return Ayame to her true form?"
52200-109 = "...Her true form, you say."
52200-113 = "Tell me, my successor. What was the real Ayame? This true form you seek?"
52200-114 = "The real Ayame..."
52200-115 = "My Ayame... She was like the sunlight at high noon, the irreproachable president of the Hyakkaryouran, always willing to lend a helping hand to anyone in need."
52200-116 = "And is that an accurate reflection of her soul?"
52200-117 = "To you who knew her best, is that who Ayame was? Both inside and out?"
52200-118 = "That's..."
52200-121 = "That was a fine match. Thank you, Nagusa."
52200-125 = "But with happy dreams...well, it's a harsh juxtaposition to the reality you end up waking up to."
52200-129 = "You were never my friend, Goryou Nagusa."
52200-134 = "Every living being dons a mask."
52200-135 = "We fear hate, abandonment. So we wear our most agreeable mask and pray to be accepted."
52200-136 = "It is a cost of society."
52200-137 = "And when a mask is so perfectly fitted, the line between reality and fiction becomes blurred to outsiders."
52200-138 = "Only the wearer knows where that line is drawn."
52200-139 = "So I will ask you one more time. Who is this \"true Ayame\" you desire?"
52200-143 = "The Ayame...I desire..."
52200-151 = "I...have no answer to that. I'm not her."
52200-152 = "I can't pretend to know who Ayame was underneath her mask."
52200-153 = "But...even if I can't understand that, even if she pushes me away..."
52200-154 = "I still want to be by Ayame's side."
52200-155 = "Spilt water will not return to its bowl, and the dead will never rise again. Likewise, you cannot return a changed soul to its former state."
52200-156 = "Just as a flower cannot bear fruit until it withers, and in turn, that fruit will fall from the flower and rot. The world is unshakeable in its ways, the inescapability of cause and effect."
52200-157 = "If despite all this, you still desire to save someone..."
52200-161 = "Fufu. Well, [USERNAME] Sensei already knows this answer."
52200-164 = "I've learned something of importance, though."
52200-165 = "I discovered how it was that Hoshino was able to return to normal."
52200-166 = "Unlike me, she was in an incomplete state, and it wasn't the Chroma that transformed her."
52200-167 = "And in the end, she had to give up a part of who she was, a part of her nature..."
52200-168 = "That is how she could move forward."
52200-171 = "If one can recognize who they are behind their mask, lay down their denials, and accept both the good and the ugly..."
52200-172 = "Then anyone can step into tomorrow."
52200-173 = "My successor, do you wish to save Ayame?"
52200-174 = "Yes. I'll do whatever it takes."
52200-175 = "Then the answer is right before you. Do not deny her."
52200-176 = "What you cannot understand, you must not reject. When you wish to run and hide, you must face her with resolve. Only then will you find your way."
52200-177 = "Do this, and you will be reunited with both your friend wandering in the twilight and the hand with which you once reached out to her."
52200-178 = "...That's enough!"
52200-184 = "You think I came all this way for your stuffy old lecture?"
52200-185 = "Humans...ordinary humans...will never be able to understand each other!"
52200-186 = "If mouthing off that sort of nonsense were enough to be understood and saved, who would care about rumors?!"
52200-187 = "You have to worry about what people think behind their masks, and prove yourself even if it means getting hurt! Otherwise, no one will even pay you a second thought!"
52200-188 = "Otherwise...someone like me who doesn't even have a tome...ever since losing Inou's Phantom Records..."
52200-189 = "Inou's Phantom Records...?"
52200-190 = "Oh, that tattered ghost story book? What could you possibly need with that old thing?"
52200-191 = "Th‑That old thing...?"
52200-192 = "Since you journeyed all the way to the Twilight Temple, I shall impart some wisdom upon you, child."
52200-197 = "The true value of a book lies in its story, not the gilded cover which houses it."
52200-198 = "Understand that, and you'll one day have a tome of your own."
52200-199 = "You're just dodging my question by spouting nonsense!"
52200-200 = "Nonsense...? Don't you know that all stories begin with a little bit of nonsense?"
52200-201 = "You have a long way to go before you become a true storyteller."
52200-206 = "Ugh..."
52200-207 = "This is why I hate the Hyakkaryouran so much!"
52200-209 = "Next Episode;Another's Gaze"

52200-80 = "1;나구사ND;99;그래. 더 이상 당신이 쿠즈노하라는 사실을 부정하지 않겠어."
52200-81 = "1;나구사ND;05;당신이 나를 인정해 주었기에 내가 백화요란의 적법한 후임으로서 백련을 사용할 수 있게 되었다는 사실 또한…… 지금은 이해할 수 있어.\n#1;m3\n#3;dr"

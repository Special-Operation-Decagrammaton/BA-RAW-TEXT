52200-100 = "5;쿠즈노하;09;이 <황혼의 사원>은 현실에서는 이미 오래전에 사라져 없어져 버린 과거의 공간. 나 또한 현실에서는 기억하는 이가 거의 남아 있지 않은 잊힌 존재에 불과하지."
52200-101 = "5;쿠즈노하;02;빛과 어둠이 공존하는 이 기묘한 황혼 속에서, 과거의 존재는 어둠 속에 스러져 가는 그림자와 같은 것인데—"

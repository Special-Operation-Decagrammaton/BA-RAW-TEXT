[translation]
10011045-2 = "好！辛苦了～！"
10011045-3 = "咦？什麼意思？這樣就可以了嗎？"
10011045-4 = "反正這本來就只是表演而已吧……？"
10011045-5 = "啊，這樣啊。"
10011045-9 = "不過即便如此，剛才依然是讓人心胸澎湃的戰鬥！"
10011045-10 = "菲娜非常感動！這就是傳說中的「忍者」啊！"
10011045-11 = "這……在百夜之春櫻花祭的時候還沒注意到……"
10011045-12 = "這或許是個商機……？"
10011045-13 = "[s]「思考的方向還是一如既往呢……」"
10011045-17 = "這，這又不是什麼壞事！？"
10011045-18 = "……是忍術研究部對吧？"
10011045-19 = "忍者社團什麼的，雖然一開始讓人完全摸不著頭緒……"
10011045-20 = "嗯，表現還挺好的吧？繼續加油哦。"
10011045-21 = "謝，謝謝……"
10011045-22 = "雖然還有很多話想跟老師說，不過今天就暫且擱置……"
10011045-23 = "你們合格了！請前往下一道關卡吧！"
10011045-24 = "好，好耶！"
10011045-28 = "那麼……繼續展開追擊吧！"

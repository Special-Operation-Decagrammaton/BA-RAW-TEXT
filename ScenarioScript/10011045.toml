[translation]
10011045-2 = "สุดยอด! ความสามารถเปี่ยมล้น! พิสูจน์ให้เห็นแจ่มแจ้งแล้ว! ขอยอมรับเลยค่ะ!"
10011045-3 = "เอ๊ะ?! ถามจริง?! ง่ายๆ อย่างงี้เลย?! ยอมรับง่ายเกินไปหน่อยรึเปล่าน่ะ?!"
10011045-4 = "หมายความว่ายังไง? นี่น่ะเป็น 'การแสดงแบบนั้น' มาตั้งแต่แรกแล้วนะ?"
10011045-5 = "อ่า... จะ...จะ...จริงด้วย!"
10011045-9 = "แต่เมื่อกี้ การต่อสู้ที่ทำให้หัวใจร้อนรุ่ม!"
10011045-10 = "พีน่า! รู้สึกประทับใจมากค่ะ! นี่สินะวิชานินจาที่ไม่เคยเห็นมาก่อน!"
10011045-11 = "อืม นั่นสินะ..."
10011045-12 = "ตอนเทศกาลแห่งค่ำคืนสีขาวไม่ทันได้สังเกต แต่ถ้าหน้าตาน่ารักน่ามองแบบนี้... อาจจะทำเงินได้ก็ได้..."
10011045-13 = "[s] \"สมแล้วที่เป็นเจ้าของร้านเฮียกคิยาโคที่ไม่เคยพลาดเรื่องน่าสนใจ...\""
10011045-17 = "อะไรกัน กะ... ก็ไม่ใช่เรื่องเลวร้ายสักหน่อยนี่คะ!"
10011045-18 = "แล้วก็นะ พวกเธอบอกว่าเป็นชมรมวิจัยศาสตร์นินจาใช่ไหม?"
10011045-19 = "ชมรมของนินจางั้นเหรอ เอาจริงๆ ตอนแรกก็ไม่รู้หรอกว่าพูดถึงอะไร"
10011045-20 = "พอดูอีกที อาจจะเป็นม้ามืดของการแสดงครั้งนี้อย่างคาดไม่ถึงเลยก็ได้นะ?"
10011045-21 = "อะ... อืม"
10011045-22 = "เอาเถอะ ถึงจะยังอยากกวนคุณครูให้นานกว่านี้ก็จริงแต่ว่า"
10011045-23 = "ผ่านค่ะ! เราจะนำทางไปยังด่านถัดไปนะคะ!"
10011045-24 = "ดะ... ดีละ!"
10011045-28 = "ถ้างั้นก็... เริ่มการไล่ล่าอีกครั้งกันเลย!"

[translation]
10002170-1 = "Afterword; What Happened Before the Girls Arrived"
10002170-2 = "Order up!"
10002170-4 = "Wow!"
10002170-5 = "This is our best-seller: the Cheese Tarako Yakisoba."
10002170-6 = "Try it out and let me know how you like it, little lady."
10002170-7 = "It'd be my pleasure!"
10002170-10 = "Nom, nom."
10002170-11 = "Mmm! It's good!"
10002170-12 = "Wow, you really dug in!"
10002170-13 = "I was so shocked when I found you lying in the street. It's not uncommon for people around these parts to get heat stroke."
10002170-14 = "Then it turned out you had fainted from hunger. Just how long had it been since you'd eaten?"
10002170-15 = "I'd been saving myself for all the delicious beach food I heard about..."
10002170-16 = "...but it turns out I didn't have nearly enough strength to make the trip."
10002170-17 = "I was so exhausted by the time I arrived that I immediately collapsed."
10002170-18 = "I'd have been a goner if not for you! Thank you so much!"
10002170-19 = "Don't mention it. I'm glad you enjoyed the food. "
10002170-20 = "It served as good practice before opening up shop today."
10002170-21 = "If all my customers are half as satisfied as you were, then I think I'm in for a good summer!"
10002170-22 = "Maybe so. Your food is certainly tasty, but..."
10002170-23 = "But?"
10002170-24 = "I feel like there's something amiss. Maybe it's a little too bland."
10002170-25 = "I think it could use some color!"
10002170-26 = "Luckily, I've been going on gourmet trips all summer to try new things!"
10002170-27 = "New things, eh?"
10002170-28 = "Here. A special sauce that I got from the School Lunch Club. It might make your dish even tastier!"
10002170-29 = "So it's a sauce from Gehenna Academy? Don't mind if I do. I'd love to give it a try!"
10002170-30 = "I might as well see if it's a good match for my food."
10002170-31 = "You really want to try? Sure, here you go!"
10002170-34 = "Hmm. This color's ink black. Not what I was expecting..."
10002170-35 = "*sniff* *sniff* And what's this smell? Could it be black sesame seed?"
10002170-36 = "Well, here goes nothing..."
10002170-38 = "Black sesame seed? No, Juri told me that this was made from mangoes, I think."
10002170-39 = "Huh? Mang—"
10002170-41 = "...!"
10002170-46 = "Huh? Why are you...? "
10002170-48 = "Ahhh! Are you okay?!"
10002170-49 = "What's wrong?! Can you hear me?!"
10002170-50 = "Did you suffer a heat stroke...? Could it have been from being under the sun after cooking so much hot food?"
10002170-51 = "Excuse me! I'd like to place an order!"
10002170-52 = "Oh, no. There are customers waiting."
10002170-53 = "What should I do...?"
10002170-56 = "I got it! Sensei always says that it's common courtesy to give after having received. The owner made delicious food for me..."
10002170-57 = "...so now it's my turn to make delicious food for others! I won't let his sacrifice be in vain!"
10002170-58 = "Your shop is in good hands until you wake up, sir!"
10002170-59 = "Hello? Is anyone there?"
10002170-61 = "I'll be right there to take your order!"

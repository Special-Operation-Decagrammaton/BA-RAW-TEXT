[translation]
10002170-1 = "後日談其四;在少女們抵達之前"
10002170-2 = "久等了！"
10002170-4 = "哇啊～！"
10002170-5 = "這是我們店裡的招牌菜「起司明太子炒麵」，快嘗嘗看吧！"
10002170-6 = "如果同學你能告訴我一些感想就更好了。"
10002170-7 = "我知道了！那我開動囉～！"
10002170-10 = "嚼嚼……"
10002170-11 = "嗯嗯！真好吃！"
10002170-12 = "哦哦，吃像真豪邁呢這位同學！"
10002170-13 = "不過真是讓我嚇了一跳啊。#n剛發現你昏倒在地上的時候還煩惱過是不是中暑了……"
10002170-14 = "沒想到是因為肚子餓而昏倒。#n幸好沒什麼大礙，不過你究竟餓了多久？"
10002170-15 = "難得能到夏天的海邊來，我想說應該會有很多好吃的東西……"
10002170-16 = "所以就想空著肚子來～"
10002170-17 = "不過因為實在太餓，再加上沒想到這裡會熱成這樣……"
10002170-18 = "多虧你才活了回來！謝謝你，大叔！"
10002170-19 = "不客氣不客氣，我才該謝謝你。"
10002170-20 = "正好給了我一個在重新營業之前確認自己技術有沒有生疏的機會。"
10002170-21 = "從同學你的吃像和反應看來，今年的夏天也能過得很安穩了啊！#n嘎哈哈哈哈哈！"
10002170-22 = "不過大叔的料理，雖然是很好吃沒錯……"
10002170-23 = "嗯？"
10002170-24 = "唔嗯～怎麼說呢……該說是有點單調……"
10002170-25 = "還是缺少了某些東西呢……！"
10002170-26 = "嗯！難得的夏天，應該要更積極挑戰才對！"
10002170-27 = "唔，挑戰是嗎……這麼說也有道理。"
10002170-28 = "啊，對了，我剛好有從供給部拿到的……這瓶特製醬料！#n淋上去的話說不定會更好吃哦！？"
10002170-29 = "哦哦……既然是為那個著名的格黑娜學園製作料理的社團所製作的特製醬料，#n肯定得來試試看吧！"
10002170-30 = "能分給我一些嗎？"
10002170-31 = "來，請用！"
10002170-34 = "哦……是漆黑且帶有光澤的醬料呢……"
10002170-35 = "這是什麼味道？黑芝麻嗎？"
10002170-36 = "算了，總之先嚐看看味道……"
10002170-38 = "黑芝麻？我記得茱莉好像說這是用芒果做的……？"
10002170-39 = "咦，芒──"
10002170-41 = "……！"
10002170-46 = "嗯？大叔……？"
10002170-48 = "咦咦！？大叔，你還好嗎！？"
10002170-49 = "為，為什麼突然就……！？"
10002170-50 = "啊……？難道是因為太熱了？#n是為了我頂著大太陽做料理才會這樣嗎……！？大叔！！"
10002170-51 = "不好意思～我想點餐～？"
10002170-52 = "啊，怎麼偏偏在這種時候有客人！"
10002170-53 = "該，該怎麼辦……"
10002170-56 = "……嗯！我決定了！#n記得老師說過，報答的精神是很重要的……！"
10002170-57 = "放心吧，大叔！我不會讓大叔白白犧牲！"
10002170-58 = "我會守住這間店的！"
10002170-59 = "不好意思～請問有店員在嗎～？"
10002170-61 = "來了來了～！請稍等，我馬上來～！"

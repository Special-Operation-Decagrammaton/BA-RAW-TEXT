10002170-4 = "1;이즈미 수영복ND;02;와~아!\n#1;em;[반짝]\n#1;hophop\n#1;ar\n#3;m5"
10002170-5 = "3;바다의 집 주인;00;하하하! 우리 가게가 자랑하는 베스트 메뉴 치즈 명란젓 야키소바다.\n#3;em;[재잘]"
10002170-6 = "3;바다의 집 주인;00;어디 한번 맛보고 감상 들려 달라고. 아가씨."
10002170-7 = "1;이즈미 수영복ND;00;응! 그럼 어디~\n#1;em;[반응]"
10002170-8 = "1;이즈미 수영복ND;02\n#1;m2\n#wait;1000"

10002170-10 = "1;이즈미 수영복ND;99;우물우물…….\n#1;greeting"
10002170-11 = "1;이즈미 수영복ND;10;응응! 맛있어!\n#1;em;[반짝]\n#1;hophop"
10002170-12 = "3;바다의 집 주인;00;오오, 아가씨. 시원스럽게도 먹는 구만!\n#3;em;[재잘]"
10002170-13 = "3;바다의 집 주인;00;그건 그렇고 놀랐다고. 처음 이 근처에 널부러저 있는 아가씨를 발견했을 땐, 열사병으로 큰일이라도 난 줄 알았더니."
10002170-14 = "3;바다의 집 주인;00;순전히 공복 때문이었다니 말이야. 대체 얼마나 배가 고팠던 거야?\n#3;em;[?]"
10002170-15 = "1;이즈미 수영복ND;02;여름 바다에 가면 엄청 맛있는 음식들이 잔뜩 있다고 해서……\n#1;em;[반응]\n#1;m1"
10002170-16 = "1;이즈미 수영복ND;01;힘을 내서 아자앗~ 하고 와보자고 생각해서 왔는데~"
10002170-17 = "1;이즈미 수영복ND;09;너무 더워서 도착하자마자 쓰러져버렸어…….\n#1;em;[속상함]\n#1;stiff"
10002170-18 = "1;이즈미 수영복ND;00;그래도 덕분에 살았어! 고마워! 아저씨!\n#1;hophop\n#1;em;[반짝]"
10002170-19 = "3;바다의 집 주인;00;아니, 나야말로 고맙지. \n#3;em;[재잘]"
10002170-20 = "3;바다의 집 주인;00;아직 장사 개시 전에 내 실력이 녹슬지 않았나. 확인해볼 수 있는 기회였으니까."
10002170-21 = "3;바다의 집 주인;00;아가씨의 반응을 보니, 올해 여름 장사도 걱정 없겠는걸! 파핫핫!\n#3;em;[음표]\n#3;hophop"
10002170-22 = "1;이즈미 수영복ND;01;음, 근데 아저씨의 음식. 분명 맛있긴 하지만…….\n#1;em;…"
10002170-23 = "3;바다의 집 주인;00;하지만?\n#3;em;[?]"
10002170-24 = "1;이즈미 수영복ND;09;우음~ 조금 심심하달까. 이것만으로는 너무 무난하달까.\n#1;stiff"
10002170-25 = "1;이즈미 수영복ND;00;색다름이 부족해!\n#1;em;[반짝]\n#1;hophop"
10002170-26 = "1;이즈미 수영복ND;10;나, 이번 여름엔 여름만의 미식 여행을 떠나온 거니까. 새로운 도전을 해보고 싶다고 생각했거든!\n#1;em;[재잘]"
10002170-27 = "3;바다의 집 주인;00;흠, 새로운 도전이란 말이지."
10002170-28 = "1;이즈미 수영복ND;00;응, 마침 급양부에서 받아온 특제 소스가 있으니까. 이걸 뿌려 먹으면 더 맛있을지도?!\n#1;em;[음표]\n#1;hophop"
10002170-29 = "3;바다의 집 주인;00;오호……. 게헨나 학원, 그것도 음식을 만드는 곳에서 만든 소스라니. 기대가 되는걸!\n#3;em;[반짝]"
10002170-30 = "3;바다의 집 주인;00;어디, 우리 가게의 요리에 응용할 수 없는지. 한 번 맛이나 볼까?"
10002170-31 = "1;이즈미 수영복ND;02;아저씨도 맛보게? 응, 그럼 자. 여기 있어!\n#1;em;[반응]"

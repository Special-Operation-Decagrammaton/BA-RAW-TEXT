[translation]
10002170-1 = "ย้อนวันวาน;สิ่งที่เกิดขึ้นก่อนที่เหล่าเด็กสาวจะมาถึง"
10002170-2 = "เอ้า! อาหารที่สั่งได้แล้ว!"
10002170-4 = "ว้าวววว!"
10002170-5 = "ฮ่าๆๆ! ยากิโซบะนี่เป็นเมนูที่ขายดีที่สุดของร้านเราเลยนะ"
10002170-6 = "เธอลองชิมดูสิ รับรองเลยว่าต้องติดใจแน่นอน! "
10002170-7 = "อื้อ! ถ้างั้นก็ทานล่ะนะค๊า~"
10002170-10 = "ง่ำ ง่ำ..."
10002170-11 = "อื้อออ! อร่อยเหาะ!"
10002170-12 = "โอ้ว คุณหนูคนนี้... กินได้ดูเอร็ดอร่อยมากเลยนะ!"
10002170-13 = "ทำเอาตกอกตกใจหมดเลยนะ ตอนแรกที่เจอเธอนอนหมดสติอยู่บนถนนน่ะ แต่ก็ไม่แปลกหรอกที่#nแถวนี้จะมีคนเป็นลมแดดน่ะ"
10002170-14 = "แต่กลับกลายว่าหิวจนเป็นลมแทนซะได้ ไม่ได้กินอาหารมานานขนาดไหนกันถึงเป็นลมได้ล่ะเนี่ย?"
10002170-15 = "ฉันได้ยินว่าถ้ามาที่ทะเลตอนฤดูร้อนจะมีของอร่อยๆ เยอะมากๆ ..."
10002170-16 = "ฉันก็เลยตัดสินใจมาที่นี่น่ะแต่ว่า..."
10002170-17 = "อากาศมันร้อนเกินไป พอมาถึงก็เลยเป็นลมไปเลย..."
10002170-18 = "แต่ก็ได้คุณลุงช่วยเอาไว้ ขอบคุณมากเลยนะ คุณลุง!"
10002170-19 = "ไม่หรอก ลุงต่างหากที่ต้องขอบใจ"
10002170-20 = "ลุงกำลังกังวลอยู่เลยว่าฝีมือตัวเองจะตก ถือเป็นโอกาสดีที่ได้ลับฝีมือก่อนเปิดร้านแบบนี้"
10002170-21 = "ดูจากตอนที่คุณหนูกินแล้ว หน้าร้อนนี้ต้องขายดีแน่นอน! วะฮะฮ่า!"
10002170-22 = "อืม... อาหารของคุณลุง... ที่จริงแล้วก็อร่อยอยู่หรอกนะแต่ว่า..."
10002170-23 = "แต่ว่า?"
10002170-24 = "อืมมม~ รู้สึกเหมือนมันขาดอะไรบางอย่าง  รู้สึกเหมือนรสชาติมันธรรมดาๆ ไปนิดหน่อย..."
10002170-25 = "ฉันคิดว่ามันขาดสีสันไปนิดหน่อยน่ะ!"
10002170-26 = "ฤดูร้อนนี้น่ะ ฉันวางแผนจะออกทริปหาของอร่อยในฤดูร้อนล่ะ ฉันอยากจะลองชิมรสชาติใหม่ๆ#nในฤดูร้อนนี้!"
10002170-27 = "อืม รสชาติใหม่ๆ งั้นเหรอ"
10002170-28 = "อื้อ ฉันเอาซอสสูตรพิเศษที่ได้มาจากชมรมโภชนาการที่โรงเรียนมาด้วย ถ้าเหยาะซอสนี้ลงไป#nมันอาจจะอร่อยขึ้นกว่าเดิมก็ได้นะ!"
10002170-29 = "โฮ่... ซอสจากชมรมโภชนาการของโรงเรียนเกเฮนน่างั้นเหรอ ชักอยากลองแล้วล่ะสิ!"
10002170-30 = "ซอสนี่อาจจะเหมาะกับอาหารของร้านเราก็ได้ มาลองชิมกันเลยดีไหม?"
10002170-31 = "คุณลุงจะลองชิมด้วยมั้ย?  อื้อ แน่อยู่แล้ว นี่ไงล่ะ!"
10002170-34 = "โอ้... ซอสสีดำสนิทเลยแฮะ..."
10002170-35 = "ฟุดฟิด... กลิ่นนี่มันอะไรกันน่ะ? เดาไม่ออกเลย สงสัยจะเป็นพวกงาดำสินะ"
10002170-36 = "ถ้างั้น... ไหนขอชิมดูซิ..."
10002170-38 = "งาดำเหรอ? เปล่านะ จูริบอกว่าเธอใช้มะม่วงปรุงซอสนี่ขึ้นมาต่างหาก...?"
10002170-39 = "หืม? มะ...อึ่กกก..."
10002170-41 = "...!"
10002170-46 = "หืม? คุณลุง...! "
10002170-48 = "อ๊ะ!! คุณลุงเป็นอะไรรึเปล่า?!"
10002170-49 = "อะไรกันเนี่ย? จู่ๆ จะล้มพับไปแบบนี้ไม่ได้นะ~!"
10002170-50 = "อ๊ะ...? หรือว่าคุณลุงจะเป็นลมแดด? เป็นเพราะคุณลุงออกไปทำอาหารกลางแดดร้อนจ้าแบบนี้ให้#nฉันรึเปล่านะ?"
10002170-51 = "ขอโทษค่า~ สั่งอาหารหน่อยค่า~"
10002170-52 = "อ๊ะ... ทะ...ทำไมลูกค้าต้องเข้ามาตอนนี้ด้วยเนี่ย!"
10002170-53 = "อืม... จะทำยังไงดีล่ะ..."
10002170-56 = "...เอาล่ะ! ฉันตัดสินใจแล้ว! คุณลุงอุตส่าห์ทำอาหารอร่อยๆ ให้ฉันกิน คุณครูบอกอยู่เสมอว่า#nถ้ามีใครทำดีกับเรา เราก็ควรจะต้องตอบแทนพวกเขา...!"
10002170-57 = "เอาล่ะ! ฉันจะไม่ยอมให้ความพยายามของคุณลุงต้องเสียเปล่าแน่!"
10002170-58 = "ฉันจะคอยดูแลร้านนี้ให้จนกว่าคุณลุงจะฟื้นขึ้นมาเอง!"
10002170-59 = "สวัสดีค่า? มีใครอยู่มั้ยคะ~?"
10002170-61 = "อื้อ! รอเดี๋ยวน๊า~! เดี๋ยวจะออกไปรับออเดอร์ค่า!"

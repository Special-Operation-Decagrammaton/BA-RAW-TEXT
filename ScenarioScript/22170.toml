[translation]
22170-1 = "第17話;逆轉的踏板"
22170-3 = "千尋前輩！？"
22170-4 = "嗚哇啊～！副部長～！"
22170-5 = "不愧是副部長，等你好久了。"
22170-6 = "但是……是怎麼做到的？"
22170-8 = "就是說呀！畢竟，埃里都的通訊網……！"
22170-9 = "不是掌握在莉央會長手中嗎？"
22170-11 = "嗯，掌握在莉央會長手中。#n但是為了應對這種狀況，陽葵似乎事先準備了「祕密武器」。"
22170-12 = "[s]「祕密武器……？」"
22170-13 = "啊……姐姐！那個！就是那個！"
22170-14 = "那，那個是哪個！？"
22170-15 = "我們之前想要分析G.Bible的時候找到的東西！"
22170-24 = "[ns]「『鏡子』……！」"
22170-25 = "正確答案。沒錯，正是利用「鏡子」駭入了埃里都的網路。"
22170-26 = "順便，也讓會長退場了唷。"
22170-27 = "咦，什，什麼意思！？難道說，陽葵部長之所以讓「鏡子」被學生會沒收……！"
22170-28 = "就是為了這種時候做的準備嗎？"
22170-29 = "不愧是貝里塔斯的前部長。真是不容小覷呢。"
22170-30 = "[s]「不愧是千尋！貝里塔斯的女神！」"
22170-31 = "什，什麼女神……老師……那也有點太誇張了。"
22170-33 = "咦！？但，但是要到扣押品保管所可是很困難的唷！"
22170-34 = "一個人是絕對……"
22170-35 = "啊啊，這點的話有人幫助了我。"
22170-36 = "很幸運，脫離會長監視的社團裡的──"
22170-40 = "你好，指導員。"
22170-41 = "[s]「堇！？」"
22170-42 = "聽到愛麗絲同學的消息後，總覺得坐立難安……#n雖然冒昧，請讓我也出一份力吧。"
22170-43 = "嗯，真是幫大忙了。謝謝妳。"
22170-48 = "……總之，事情大概就是這樣，我們現在也在和無人機抗戰中。"
22170-49 = "老實說，不知道還能撐多久……#n不過，我們會盡自己最大的努力的。"
22170-50 = "持久戰就交給我吧。"
22170-51 = "[s]「堇，謝謝妳！真是太可靠了。」"
22170-61 = "果然……#n就算用了「鏡子」，防火牆依然有所反應。"
22170-62 = "需要在被切斷之前先下手為強呢。"
22170-63 = "這種時候，就輪到「貝里塔斯」──我們出場了唷。"
22170-64 = "嗯，交給我們吧，副部長。"
22170-65 = "就算用盡我們的所有資源！#n也會維持網路給你們看的！"
22170-66 = "是的，我們會全力以赴。"
22170-68 = "嗯。維持就交給你們了。#n作為代替，接下來老師的引導就交給我吧。"
22170-69 = "大家──還能戰鬥吧？"
22170-73 = "[ns]「嗯，可以唷。」"
22170-75 = "那麼開始反擊。要上了唷！"

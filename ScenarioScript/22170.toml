[translation]
22170-1 = "ตอนที่ 17;จุดเริ่มต้นของการพลิกเกม"
22170-3 = "รุ่นพี่จิฮิโระ!"
22170-4 = "มุแงงงง~! รองหัวหน้า~!"
22170-5 = "ฉันกำลังรออยู่เลยค่ะ รองหัวหน้า~!"
22170-6 = "ว่าแต่... มาได้ยังไงน่ะ?"
22170-8 = "อ๊ะ นั่นสิคะ! เครือข่ายการสื่อสารในเอริดูเป็นอัมพาตหมดเลยนี่...!"
22170-9 = "ประธานริโอะควบคุมเครือข่ายไว้ใช่ไหม?"
22170-11 = "ใช่ แต่ฉันก็มีของบางอย่างที่หัวหน้าฮิมาริเตรียมเผื่อไว้ให้สำหรับเหตุการณ์แบบนี้อยู่น่ะ"
22170-12 = "[s] \"ของที่ฮิมาริเตรียมไว้ให้...?\""
22170-13 = "อ้อ... อันนั้น! อันนั้นไง! พี่โมโมอิ!"
22170-14 = "อะ... อันนั้นเหรอ?! หมายถึงอันไหนของเธอน่ะมิโดริ!?"
22170-15 = "ที่เราตามหาเพื่อใช้วิเคราะห์ G.Bible คราวก่อนไง!"
22170-24 = "[ns] \"<กระจก> สินะ...!\""
22170-25 = "อืม ฉันแฮ็กเครือข่ายของเอริดูด้วยกระจกได้สำเร็จน่ะ"
22170-26 = "และก็ขับไล่ประธานออกไปได้แล้วด้วย"
22170-27 = "วะ... วะ... ว่าไงนะ?!  งั้นก็แปลว่า ที่หัวหน้าฮิมาริถูกสภานักเรียนยึด <กระจก> ไปตั้งแต่แรก...!"
22170-28 = "ก็เพื่อเป็นการเตรียมพร้อมสำหรับสถานการณ์อย่างวันนี้งั้นเหรอ?"
22170-29 = "นี่สินะอดีตหัวหน้าเวอริทัส ขอคารวะเลย"
22170-30 = "[s] \"สมกับเป็นจิฮิโระ! เทพีแห่งเวอริทัส!\""
22170-31 = "ทะ... เทพีเลยเหรอ... คุณครู... ฉันว่ามันเวอร์ไปหน่อยนะ"
22170-33 = "หืม?! ตะ... แต่ว่าการจะเข้าถึงคลังของที่ถูกยึดได้ มันก็ไม่ง่ายเลยนี่นา?"
22170-34 = "แค่คนคนเดียวคงทำไม่ได้หรอก..."
22170-35 = "อ้อ ถ้าเป็นเรื่องนั้น ฉันมีคนช่วยอยู่น่ะ"
22170-36 = "โชคดีที่ข้อมูลการทำกิจกรรมของชมรมนี้ทำให้หลุดพ้นจากเครือข่ายเฝ้าระวังของประธานริโอะไปได้..."
22170-40 = "สวัสดีค่ะเทรนเนอร์"
22170-41 = "[s] \"สึมิเระ?!\""
22170-42 = "พอฉันได้ยินข่าวของอาริสึ ก็คิดว่าคงอยู่เฉยๆ ไม่ได้ ก็เลยตัดสินใจมาช่วยอีกแรงค่ะ"
22170-43 = "อืม พอได้สึมิเระมาช่วย..."
22170-48 = "ตอนนี้เราก็เลยกำลังทำสงครามต่อต้านอยู่กับโดรนในคลังของที่ถูกยึดกันอยู่..."
22170-49 = "ถึงจะไม่รู้ว่าจะทนได้อีกนานแค่ไหนก็เถอะ"
22170-50 = "ถ้าเป็นเรื่องการอดทนละก็ ไว้ใจฉันได้เลยค่ะ"
22170-51 = "[s] \"ครูเชื่อใจเธอเต็มร้อยเลย! สึมิเระ!\""
22170-61 = "สุดยอด... ถึงจะใช้กระจกก็เถอะ แต่ไฟร์วอลล์ตอบสนองทันทีเลย"
22170-62 = "ต้องรีบวางหมากก่อนในตอนที่ยังมีโอกาสแล้วละ"
22170-63 = "ถึงตาพวกเราแล้ว เวอริทัส"
22170-64 = "อืม ถ้าเป็นเรื่องนั้นก็วางใจได้เลย รองหัวหน้า"
22170-65 = "เราจะคงสภาพเครือข่ายไว้ให้สมบูรณ์แบบ ถึงจะต้องใช้ทรัพยากรทั้งหมดของพวกเราก็เถอะ!"
22170-66 = "ใช่ค่ะ ฉันก็จะพยายามอย่างเต็มที่ค่ะ"
22170-68 = "อืม ฝากเรื่องการรักษาเครือข่ายด้วยนะ แต่จากนี้เป็นต้นไป ฉันจะรับหน้าที่เป็นคนนำให้เอง"
22170-69 = "ทุกคนยังสู้กันไหวใช่ไหม?"
22170-73 = "[ns] \"อื้ม!\""
22170-75 = "งั้นมาเริ่มโจมตีกลับกันเลย"

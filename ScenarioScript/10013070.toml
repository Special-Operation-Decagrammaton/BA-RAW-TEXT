[translation]
10013070-1 = "第7話;在最後的戰鬥之前"
10013070-2 = "（在前往下一個目的地之前的空閒時間）"
10013070-6 = "[s1] 「話說回來，靜子沒有跟喵天丸簽合約呢。」\n[s2] 「如果有黑龜組的兵力的話，工作可能會更順利吧。」"
10013070-9 = "咦？工作是指「渡假勝地狩獵」嗎？"
10013070-10 = "雖然可能是那樣沒錯啦……"
10013070-11 = "但是，還是不能和他簽約！"
10013070-12 = "[s] 「為什麼？」"
10013070-13 = "這……是理所當然的吧。#n因為喵天丸所做的事情只不過是詐欺跟騷擾行為而已。"
10013070-14 = "用不正當的買賣毀掉大家快樂的時間這種事！絕對不能允許！"
10013070-15 = "所以說，比起和那種傢伙簽約，我還寧願放棄呢……"
10013070-19 = "總，總之就是這樣！"
10013070-20 = "[s] 「嗯，很像靜子的作風。」"
10013070-21 = "唔！又，又說那種話……"
10013070-22 = "真是的……！"
10013070-23 = "呼……暫且可以說「渡假勝地狩獵」已經到最後一步了吧。"
10013070-24 = "所以為了最後的準備，和阿拜多斯的學生們進行一次作戰會議吧！"
10013070-26 = "原來如此……是凱薩PMC啊。"
10013070-27 = "果然，我們的判斷是正確的呢。"
10013070-28 = "[s] 「怎麼說呢？」"
10013070-29 = "這個……我們也是後來才知道的……"
10013070-31 = "看來頭盔團似乎和凱薩PMC有關連的樣子。"
10013070-32 = "[s] 「良舞率領的頭盔團啊……」"
10013070-33 = "喵天丸和頭盔團都獲得了凱薩PMC的支援……"
10013070-34 = "也就是說，把「渡假勝地使用權」賣給我們的章魚銀行，#n打從一開始就打算在背地裡發起「渡假勝地狩獵」嗎！？"
10013070-35 = "到底搞什麼啊！？那些傢伙！"
10013070-37 = "唔嘿～全部都漂亮地跟凱薩有關呢。"
10013070-38 = "嗯。但是這麼一來該做的事就很清楚了。"
10013070-39 = "沒錯！我們接下來也會往頭盔團的所在地前進！"
10013070-40 = "[s] 「這麼一來，之後就是阿拜多斯和百鬼夜行的共同作戰了呢。」"
10013070-41 = "其實我們也為了進攻頭盔團正在討論作戰計畫呢。"
10013070-42 = "[s] 「作戰計畫？」"
10013070-43 = "那個，星野前輩……那個作戰真的沒問題嗎？"
10013070-44 = "我覺得沒問題，畢竟是星野前輩的計畫。"
10013070-46 = "最重要的是，感覺會很有趣呢。"
10013070-47 = "那個作戰究竟是……"
10013070-48 = "哼哼哼……目前還是祕密唷。#n不是有句話說要欺騙敵人就要先欺騙自己人嗎？"
10013070-49 = "[s] 「如果星野是這麼判斷的話，我沒有意見喔。」"
10013070-50 = "哦～你願意相信我嗎？大叔我有點高興呢。"
10013070-51 = "我倒是有點擔心……"
10013070-52 = "不不！不管怎麼想都很奇怪吧那個作戰！還是再從頭想一次比較好……！"
10013070-53 = "那麼～大家就一起努力到最後吧～"
10013070-57 = "[ns] 「另一邊好像也在準備進行大規模的作戰呢。」"
10013070-58 = "好像是這樣呢……#n那麼，既然終點就在眼前了，"
10013070-59 = "乾淨俐落地解決吧！"

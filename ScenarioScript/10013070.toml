10013070-33 = "3;시즈코 수영복ND;06;냥텐마루도, 헬멧단도 전부 카이저PMC의 지원을 받고 있다는 건…….\n#3;em;…"
10013070-34 = "3;시즈코 수영복ND;05;즉 우리에게 <리조트 사용권>을 팔아 치운 문어 은행이, 뒤에서는 아예 <리조트 사냥>을 부추기고 있단 말이렷다?!\n#3;em;[!]\n#3;jump"

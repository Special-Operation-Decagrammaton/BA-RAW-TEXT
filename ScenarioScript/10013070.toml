10013070-5 = "3;시즈코 수영복ND;01\n#3;a"
10013070-6 = "[s1] \"그나저나 시즈코, 이번엔 냥텐마루와는 계약하지 않았네.\"\n[s2] \"검은거북파의 병력이라면, 일이 좀 더 쉬워졌을지도 모르잖아.\""
10013070-7 = "#wait;10"
10013070-8 = "#wait;10"
10013070-9 = "3;시즈코 수영복ND;01;네? 쉬워진다는 건, <리조트 사냥>의 일 말인가요-?\n#3;em;[반응]"
10013070-10 = "3;시즈코 수영복ND;99;……확실히, 물론 그건 그럴지도 몰라요."
10013070-11 = "3;시즈코 수영복ND;05;하지만 계약은 할 수 없어요!\n#3;em;[!]"
10013070-12 = "[s] \"왜?\""
10013070-13 = "3;시즈코 수영복ND;05;그야…… 당연하잖아요? 냥텐마루가 저지른 짓은 단순한 민폐에, 사기, 악덕 행위였으니까\n#3;em;[땀]\n#3;stiff"
10013070-14 = "3;시즈코 수영복ND;05;장사를 어그러트리고, 모두가 즐거워할 한때를 엉망으로 만드는 그 행위는! 절대로 용납 못 한다구요!\n#3;em;[빠직]\n#3;hophop"
10013070-15 = "3;시즈코 수영복ND;05;그런 녀석이랑 계약을 하느니 차라리-! 포기하는 편이 나을 정도라고나 할까!"
10013070-16 = "#st;[0,0];instant;1;"
10013070-17 = "#clearST"
10013070-18 = "3;시즈코 수영복ND;05\n#3;em;…\n#wait;2500"

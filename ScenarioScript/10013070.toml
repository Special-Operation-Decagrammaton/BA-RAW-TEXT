[translation]
10013070-1 = "ตอนที่ 7;ก่อนการต่อสู้ครั้งสุดท้าย"
10013070-2 = "(ทุกคนยังพอจะมีเวลาอยู่ก่อนที่จะออกเดินทางไปยังที่ต่อไป)"
10013070-6 = "[s1] \"ชิซุโกะ จะว่าไป รอบนี้ไม่ได้ทำสัญญากับเนียนเต็นมารุนะ\"\n[s2] \"ถ้าเป็นกองกำลังแก๊งคุโระกาเมะ งานของเราอาจจะง่ายขึ้นก็ได้นะ\""
10013070-9 = "คะ? ที่ว่าจะง่ายขึ้นนี่หมายถึงการล่ารีสอร์ตเหรอคะ?"
10013070-10 = "ฉันก็ว่า... อาจจะเป็นอย่างนั้นก็ได้ค่ะ"
10013070-11 = "แต่ฉันทำสัญญาไม่ได้หรอกค่ะ!"
10013070-12 = "[s] \"ทำไมเหรอ?\""
10013070-13 = "มันก็... แน่นอนอยู่แล้วไม่ใช่เหรอคะ? ก็สิ่งที่เนียนเต็นมารุทำมีแค่การสร้างความเดือดร้อน ฉ้อโกง ทุจริต"
10013070-14 = "ธุรกิจบิดเบี้ยวที่ทำลายช่วงเวลาสนุกสนานของทุกคน! ฉันไม่มีทางให้อภัยเด็ดขาดเลยค่ะ!"
10013070-15 = "จะให้ไปทำสัญญากับคนแบบนั้น! ฉันขอยอมแพ้เสียดีกว่าค่ะ!"
10013070-19 = "ฮึ่มมม! ใช่! แบบนั้นเลยค่ะ!"
10013070-20 = "[s] \"อื้อ สมกับเป็นชิซุโกะเลยนะ\""
10013070-21 = "อึก?! พูดแบบนี้อีกแล้ว...!"
10013070-22 = "อะ... เอาเถอะค่ะ!"
10013070-23 = "เฮ้อ... ฉันคิดว่านี่จะเป็นขั้นสุดท้ายของ <การล่ารีสอร์ต> แล้วค่ะ"
10013070-24 = "ฉันก็เลยอยากประชุมวางกลยุทธ์กับนักเรียนอะบิดอสค่ะ!"
10013070-26 = "อืม~ มีชื่อของไคเซอร์ PMC ออกมาจริงๆ ด้วย~"
10013070-27 = "ข้อมูลที่เราสืบหามาไม่ผิดจริงๆ ด้วย"
10013070-28 = "[s] \"หืม? หมายความว่าไงน่ะ?\""
10013070-29 = "คือว่า... มันเป็นข้อมูลที่เราสืบมาได้ในระหว่างนี้น่ะค่ะ พวกฉันคิดว่ากองกำลังใหญ่ที่เหลืออยู่นี้..."
10013070-31 = "น่าจะเป็นแก๊งหมวกกันน็อกที่ติดต่อกับไคเซอร์ PMC ค่ะ"
10013070-32 = "[s] \"แก๊งหมวกกันน็อกของราบุที่มาบุกอะบิดอสในตอนแรกน่ะเหรอ?\""
10013070-33 = "ทั้งเนียนเต็นมารุและแก๊งหมวกกันน็อกต่างก็ได้รับความช่วยเหลือจากไคเซอร์ PMC..."
10013070-34 = "แปลว่าธนาคารทาโกะที่ขาย <ตั๋วใช้งานรีสอร์ต> ให้กับพวกเราตั้งใจที่จะทำให้เกิด <การล่ารีสอร์ต> ตั้งแต่แรก!"
10013070-35 = "อะไรกันเนี่ย?! เจ้าพวกนั้น!"
10013070-37 = "เฮ้อ~ เหมือนตัวร้ายที่อยู่ในนิยายเลยเนอะ~"
10013070-38 = "แต่นั่นก็ทำให้เราเห็นชัดขึ้นว่าต้องทำอะไรนะ"
10013070-39 = "ค่ะ! พวกฉันก็จะไปยังที่ที่พวกแก๊งหมวกกันน็อกอยู่ด้วยค่ะ!"
10013070-40 = "[s] \"งั้นนี่ก็เป็นยุทธศาสตร์ร่วมระหว่างอะบิดอสกับเฮียกคิยาโคสินะ\""
10013070-41 = "พวกเราวางแผนการบุกไปเล่นงานแก๊งหมวกกันน็อกเอาไว้แล้วด้วย~"
10013070-42 = "[s] \"แผนการ?\""
10013070-43 = "คือ.. รุ่นพี่โฮชิโนะ! มันจะใช้ได้จริงๆ เหรอคะ?! ผะ... แผนการนั่นน่ะค่ะ!"
10013070-44 = "ฉันเอาด้วย ก็มันเป็นแผนการของรุ่นพี่โฮชิโนะนี่นา"
10013070-46 = "เป็นแผนที่น่าสนุกมากเลยละค่ะ~"
10013070-47 = "หืม? มันเป็นแผนการแบบไหนเหรอ...?"
10013070-48 = "ฮุฮุ~ เป็นความลับ~ ไม่เคยได้ยินเหรอว่าถ้าจะไปหลอกใคร ให้หลอกฝ่ายตัวเองก่อน~?"
10013070-49 = "[s] \"ถ้าโฮชิโนะคิดอย่างนั้น ครูก็คงต้องเห็นด้วย\""
10013070-50 = "โอ้~ แสดงว่าเชื่อใจกันใช่ม้า~ แบบนี้ลุงดีใจนะ~"
10013070-51 = "ส่วนฉันแอบกังวลอยู่นิดหน่อยค่ะ..."
10013070-52 = "เดี๋ยวก่อนๆ ฉันว่ายังไงแผนการนี้ก็ยังแปลกๆ นะ! เราลองมาคิดกันอีกรอบมั้ย...!"
10013070-53 = "ถ้างั้นก็~ มาพยายามกันต่อให้ถึงที่สุดกันเถอะ~"
10013070-57 = "[ns] \"อืม ดูเหมือนทางโน้นก็เตรียมการใหญ่เลยนะ\""
10013070-58 = "ค่ะ... ตอนนี้เราเหลือเรื่องที่ต้องทำอีกไม่มากแล้ว"
10013070-59 = "รีบเคลียร์ให้ได้กันเร็วๆ เถอะค่ะ!"

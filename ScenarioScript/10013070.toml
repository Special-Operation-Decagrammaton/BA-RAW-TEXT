10013070-20 = "[s] \"응, 역시 시즈코다워.\""
10013070-21 = "3;시즈코 수영복ND;04;윽?! 또, 또 그런 말을……!\n#3;em;[?!]\n#3;shake"
10013070-22 = "3;시즈코 수영복ND;09;하, 하여간!\n#3;hophop"
10013070-23 = "3;시즈코 수영복ND;99;하아……. 어쨌거나 이제 <리조트 사냥>의 진행도 막바지-라고 생각해요.\n#3;greeting"
10013070-24 = "3;시즈코 수영복ND;05;그러니 마지막에 맞춰 아비도스 학생들과 작전 회의를 하겠어요!\n#3;em;[반응]\n#3;closeup"

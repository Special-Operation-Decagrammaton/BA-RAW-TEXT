[translation]
10013070-1 = "Episode 7;Before the Final Fight"
10013070-2 = "Before going to the next destination..."
10013070-6 = "[s1] \"By the way, Shizuko, you didn't sign a contract with Date Meowru.\"\n[s2] \"Thinking about it, the Hunt would be easier with the Kurokame Gang troops.\""
10013070-9 = "Oh. For the Kurokame Gang troops? I guess so..."
10013070-10 = "...That's probably true."
10013070-11 = "But I'd never enter a contract with them!"
10013070-12 = "[s] \"Why not?\""
10013070-13 = "That's obvious! What Date Meowru did was an annoying, fraudulent, and vicious act."
10013070-14 = "Businesses have a responsibility to their customers! And she stomped all over that. I can't forgive her!"
10013070-15 = "I'd rather give up everything than make a deal with someone like that!"
10013070-19 = "A-Ahem! Yeah! That's it!"
10013070-20 = "[s] \"Yes, that's just like you.\""
10013070-21 = "Eek?! S-Stop embarrassing me..."
10013070-22 = "A-Anyway!"
10013070-23 = "*sigh* ...I think we're nearing the end of this Resort Hunt."
10013070-24 = "Let's hold a strategy meeting with the Abydos students!"
10013070-26 = "Kaiser PMC really was involved."
10013070-27 = "Our investigation was on point."
10013070-28 = "[s] \"Huh? What do you mean?\""
10013070-29 = "We obtained new information while subduing the last big faction..."
10013070-31 = "The Helmet Gangsters seem to be connected to Kaiser PMC."
10013070-32 = "[s] \"Rabu's Helmet Gangsters who attacked Abydos at the start...\""
10013070-33 = "Date Meowru and the Helmet Gangsters are both getting Kaiser PMC support. That means..."
10013070-34 = "The Octopus Bank that sold the Resort Contract to us is encouraging the Resort Hunt?!"
10013070-35 = "What the heck is their game?"
10013070-37 = "Heh! They're like villains from a movie."
10013070-38 = "Our next step is obvious."
10013070-39 = "We plan to head to the Helmet Gangsters' base."
10013070-40 = "[s] \"It looks like Abydos and Hyakkiyako are working together this time.\""
10013070-41 = "Perfect! We've come up with a strategy to defeat the Helmet Gangsters!"
10013070-42 = "[s] \"A strategy?\""
10013070-43 = "Um, Hoshino! Are you sure we're gonna be okay with that s-strategy?!"
10013070-44 = "I trust Hoshino's strategy."
10013070-46 = "I think it'll be fun!"
10013070-47 = "What is this strategy?!"
10013070-48 = "Heehee, it's a secret! They say, \"To deceive your enemies, deceive your allies first!\""
10013070-49 = "[s] \"If Hoshino's confident, so am I.\""
10013070-50 = "Oh, you're trusting me? That makes me happy!"
10013070-51 = "I'm a little nervous..."
10013070-52 = "I really think we should reconsider! I don't like it at all!"
10013070-53 = "Let's just try our best!"
10013070-57 = "[ns] \"It looks like they're preparing something big too.\""
10013070-58 = "Yes... We're almost at the finish line."
10013070-59 = "Let's wrap this up, team!"

[translation]
11095-2 = "(ดิงด่อง- แดงด่อง-)"
11095-3 = "หมดเวลางานแล้ว"
11095-4 = "จริงด้วย เราทำงานครบค่าแรงของวันนี้แล้ว ที่เหลือพวกเธอก็จัดการเองแล้วกัน กลับกันเถอะพวกเรา"
11095-5 = "อะไรนะ?!! เดี๋ยวก่อนสิ!!!"
11095-8 = "ทุกคน ได้เวลาเลิกงานแล้ว"
11095-9 = "ขากลับแวะกินโซบะกันดีป้ะ?"
11095-12 = "นี่!! จะกลับเลยได้ยังไงล่ะ! เดี๋ยวก่อน! อย่าเพิ่งไปสิ!!"
11095-13 = "......"
11095-14 = "ซวยแล้วไง อย่าบอกนะว่าไม่ได้คาดการณ์เรื่องนี้เอาไว้ด้วยน่ะ... ทำยังไงดีล่ะอารุจัง? หนีกันไหม?"
11095-15 = "หนอย..."
11095-16 = "เจ้าพวกอะบิดอส อย่าคิดนะว่าจะจบเพียงแค่นี้นะ!"
11095-17 = "อะฮ่าฮ่า! นั่นมันบทพูดของตัวร้ายที่พลาดท่าเข้าให้นี่นา"
11095-18 = "หนวกหูน่า! พวกเราหนี... เอ๊ย... ล่าถอยกันก่อน!"
11095-21 = "เดี๋ยวค่ะ! อ้าว... ไปซะแล้ว..."
11095-22 = "เอ๋~ ทำไมหนีเร็วแบบนี้ล่ะ? ไม่สนุกเลย"
11095-23 = "ฉันก็ไม่รู้รายละเอียดเท่าไร แต่ดูเหมือนว่าจะถึงเวลาเลิกงานของกลุ่มแรงงานรับใช้ของศัตรูแล้วค่ะ#nเอ่อ... ฉันหมายถึง... ล่าถอยไปแล้วค่ะ"
11095-24 = "น่าปวดหัวจังเลยนะคะ ตอนนี้โรงเรียนเราโดนพวกหน่วยรับจ้างสารพัดหมายหัวอีกทางหนึ่งแล้ว...#nนี่มันเกิดเรื่องอะไรขึ้นนะ..."
11095-25 = "ค่อยๆ สืบหาไปแล้วกัน ถ้าหาประวัติส่วนตัวของท่านประธานอารุอะไรนั่นได้ เดี๋ยวเราก็คงได้เบาะแสมากขึ้นเอง"
11095-26 = "ค่ะ เหนื่อยหน่อยนะคะทุกคน ก่อนอื่นก็กลับมาที่โรงเรียนก่อนเถอะค่ะ"
11095-28 = "ตอนต่อไป;ตามหาเบาะแส"

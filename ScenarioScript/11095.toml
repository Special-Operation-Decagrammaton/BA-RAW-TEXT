[translation]
11095-2 = "（叮咚噹咚──）"
11095-3 = "……啊，到下班時間了。"
11095-4 = "今天的工作就到這邊，剩下的你們自己看著辦吧。#n大家可以回去囉。"
11095-5 = "啊！？給，給我等一下！！"
11095-8 = "可以下班囉。"
11095-9 = "回去路上順便吃碗蕎麥麵？"
11095-12 = "喂──！！哪有人這樣的！？#n等等！別走啊！！"
11095-13 = "……"
11095-14 = "這下糟糕了。沒想到都這個時間了還沒分出勝負……#n亞瑠醬怎麼辦？要逃嗎？"
11095-15 = "啊……嗚嗚……"
11095-16 = "別，別以為我會就此善罷甘休！可惡的阿拜多斯！！"
11095-17 = "啊哈哈，亞瑠醬。#n你那完全是三流壞人才會說的台詞呢。"
11095-18 = "吵死了！我們逃……不對，撤退吧！ "
11095-21 = "等等！#n……啊，走掉了。"
11095-22 = "1;星野;02;唔嘿～逃得真快呢，那些孩子。"
11095-23 = "……雖然不太清楚詳情，不過已確認敵方兵力下班……更正，是撤退。"
11095-24 = "真傷腦筋……居然連奇怪的便利屋也盯上了我們學校……#n究竟是怎麼回事呢……"
11095-25 = "沒辦法，咱們就慢慢調查吧。#n釐清那個亞瑠社長的身份之後，應該能找到線索吧。"
11095-26 = "是，大家都辛苦了。#n請先回到校舍裡吧。"
11095-28 = "下一話;尋找線索"

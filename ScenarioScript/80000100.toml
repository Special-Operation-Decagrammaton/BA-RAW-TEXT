[translation]
80000100-1 = "三種心意"
80000100-2 = "玄武商會"
80000100-3 = "（收到瑠美的試吃邀請後，前往了玄武商會）"
80000100-4 = "啊，老師。歡迎你來。"
80000100-5 = "請坐請坐。#n老師平常也多來找我嘛，不然我都快忘記你的長相了。"
80000100-6 = "[s]「抱歉抱歉。話說你要我試吃什麼呢？」"
80000100-7 = "我準備了很多東西哦。"
80000100-8 = "不過……要不要先喝杯茶？#n這邊有上好的茶葉。"
80000100-9 = "（以瑠美泡的綠茶滋潤了喉嚨）"
80000100-10 = "那麼聰明的老師，應該已經察覺我一開始就準備綠茶的用意了吧？"
80000100-11 = "[s1]「唔嗯……我不太清楚。」\n[s2]「好像能理解。」"
80000100-12 = "哈哈哈。是嗎？看來線索還是有點少呢。#n不過也對，要是能用一杯茶就掌握對方的所有意圖，那連對話都不需要了吧。"
80000100-13 = "來，我準備了這個。#n某方面來說，這才是今天的重點。"
80000100-14 = "是嗎？既然如此，來聽聽看老師的答覆吧？"
80000100-15 = "問我是不是準備了某種甜食？#n不愧是老師，不用說也能理解我的意思呢。"
80000100-20 = "嗯？這是月餅哦。"
80000100-21 = "不過跟普通的月餅不同，裡頭加入了巧克力。"
80000100-22 = "[s]「感覺3種都不太一樣耶？」"
80000100-23 = "觀察力很不錯呢。#n老師說的沒錯，這些月餅是用3種不同的方式製成的。"
80000100-24 = "第一個是普通的月餅……#n雖然同樣包裹著紅豆餡，不過外層是裹上巧克力的餅皮。"
80000100-25 = "第二個則是麵皮不變，將內餡改為巧克力的月餅。"
80000100-26 = "而最後一個比較有挑戰性，是用薄得能看到內餡的年糕作為外皮……"
80000100-27 = "內餡則放入了經過冷凍，處於半冰凍狀態的濃稠巧克力奶油。#n可以稱它為「冰巧克力月餅」哦！"
80000100-28 = "這三種月餅中，哪種最適合被稱為「巧克力月餅」……可以告訴我你的答案嗎？"
80000100-29 = "來，慢慢試吃後再告訴我評價吧。#n覺得太甜的話可以用綠茶來漱口。"
80000100-31 = "（照著瑠美的指示，試吃每種巧克力月餅）"
80000100-32 = "（每種巧克力月餅都非常好吃）"
80000100-34 = "那麼現在，老師該做出選擇了。"
80000100-35 = "哪一種最符合老師心中的「巧克力月餅」呢？"
80000100-36 = "[s3]「果然還是貼近傳統，只有外皮裹上巧克力的第一個吧。」\n[s4]「我選擇能充分感受巧克力風味的第二個。」\n[s5]「料理就該有挑戰性，就選風格嶄新的第三種吧？」"
80000100-40 = "是嗎……好，我知道了！#n很有參考價值，謝謝你，老師。"
80000100-41 = "[s]「原來今天真的只是來試吃月餅啊，感謝招待。」"
80000100-42 = "嗯？這個……話說，今天不是情人節嗎？"
80000100-43 = "我其實是為了自然地讓老師吃到巧克力，才會找你來的……"
80000100-44 = "[s]「哦……？」"
80000100-45 = "……"
80000100-46 = "……哎呀，有點出乎預料。"
80000100-47 = "說出來之後……比想像中還令人害羞。"
80000100-48 = "昨天練習的時候明明還好的說，為什麼會這樣呢……"
80000100-49 = "啊，講到這裡又更害羞了……真糟糕。"
80000100-50 = "[s6]「……雖然由我來說好像有點奇怪……」\n[s7]「那個……就是，只要轉移一下話題應該就行了吧？」"
80000100-53 = "可是……我不想那麼做。"
80000100-54 = "我希望自己和老師之間……能夠毫無隱瞞。"
80000100-55 = "所以我下定決心要坦承一切……"
80000100-56 = "沒想到會造成這種結果……"
80000100-57 = "[s]「……要不要一起吃月餅？」"
80000100-58 = "嗯？可是那是為老師準備的月餅耶？"
80000100-59 = "因為量太多了很難吃完……？"
80000100-60 = "……"
80000100-61 = "嗯，我知道了。稍等一下，我再多準備一些茶。"
80000100-63 = "（於是便和瑠美一起分食著巧克力月餅，時不時也會聊聊天）"

[translation]
80000100-1 = "#title;세 가지 마음"
80000100-2 = "#place;현무상회"
80000100-3 = "#na;(시식을 부탁한다는 루미의 연락을 받고, 현무상회로 향했다.)"
80000100-4 = "3;루미;03;아, 선생님. 왔구나.\n#3;a\n#3;em;[반응]"
80000100-5 = "3;루미;00;자자, 앉아. 얼굴 잊어버리겠어. 자주 좀 들러 달라고."
80000100-6 = "[s] \"미안, 미안. 그런데 시식이라는 게 뭐야?\""
80000100-7 = "3;루미;07;안 그래도 이것저것 준비해 놓고 있었다고.\n#3;em;[반짝]"
80000100-8 = "3;루미;01;우선…… 차 한잔할래? 잎이 좋은 녹차를 준비했어."
80000100-9 = "#na;(루미가 따라주는 녹차로 목을 축였다.)"
80000100-10 = "3;루미;00;자, 눈치가 빠른 선생님이라면, 시작부터 녹차를 준비한 내 뜻을 알아차릴 수 있을지도 모르겠다는 생각이 드는데 말이지?"
80000100-11 = "[s1] \"음…… 모르겠어.\"\n[s2] \"왠지 알 것 같아.\""
80000100-12 = "3;루미;03;하하하. 그런가. 너무 힌트가 적었군. 하긴, 차 한 잔으로 모든 의도를 짐작할 수 있다면 대화라는 것도 애초에 필요가 없었겠지.\n#3;em;[재잘]"
80000100-13 = "3;루미;01;자, 이걸 준비했어. 어떤 의미에서는 이게 본론이고."
80000100-14 = "3;루미;00;그래? 그러면 선생님의 대답을 들어 볼까?\n#3;em;[음표]"
80000100-15 = "3;루미;03;뭔가 단 것을 준비한 것 아니냐고? 역시 선생님이야. 말로 하지 않아도 뜻이 전해지는군."
80000100-16 = "#st;[0,0];instant;1;"
80000100-17 = "#clearST"
80000100-18 = "3;루미;00\n#3;m5\n#wait;1000"
80000100-19 = "#wait;2000"
80000100-20 = "3;루미;02;이게 뭐냐고? 말하자면, 월병이지.\n#3;em;[?]"
80000100-21 = "3;루미;99;보통의 월병과 다른 점은, 초콜릿이 포함된 월병이라는 거고."
80000100-22 = "[s] \"뭔가, 종류가 3개 있고 그게 다 달라 보이는데?\""
80000100-23 = "3;루미;01;좋은 관찰력이네. 맞아. 이 월병은 각각 세 가지 방식으로 만들어졌거든.\n#3;em;[음표]\n#3;m3"
80000100-24 = "3;루미;02;하나는 보통의 월병…… 팥소를 밀가루 피로 감쌌다는 것까지는 똑같지만, 겉을 초콜릿으로 코팅한 월병이지."
80000100-25 = "3;루미;01;또 하나는 소를 초콜릿으로 만들어, 밀가루 피로 감싼 거고."
80000100-26 = "3;루미;03;마지막 하나는 조금 도전적으로 만들어 봤는데, 피를 속이 비치는 얇은 떡으로 만들고."
80000100-27 = "3;루미;01;소를 점성이 높은 초콜릿 크림으로 넣은 뒤, 차갑게 반쯤 얼린 거야. 아이스 초코 월병이라고도 말할 수 있겠네."
80000100-28 = "3;루미;02;내가 선생님에게 부탁하고 싶은 건 여기야. 이 셋 중 어떤 것이 가장 '초콜릿 월병'이라는 이름에 어울릴까?"
80000100-29 = "3;루미;07;자, 자. 천천히 맛보고 평가를 들려줘. 너무 달면 녹차로 입을 씻으면 되니까.\n#3;em;[반짝]"
80000100-30 = "#all;hide"
80000100-31 = "#na;(루미의 말대로 초콜릿 월병을 한 종류씩 맛보았다.)"
80000100-32 = "#na;(초콜릿 월병은 전부 맛있었다.)"
80000100-33 = "3;루미;01\n#3;a"
80000100-34 = "3;루미;99;그러면 이제, 선생님의 선택을 들을 시간이군."
80000100-35 = "3;루미;03;어떤 것이 가장 '초콜릿 월병'같아?\n#3;em;[음표]"
80000100-36 = "[s3] \"역시 정통파지. 겉만 초콜릿 코팅한 1번이 좋겠어.\"\n[s4] \"초코의 맛을 충분히 맛볼 수 있는 2번으로 할게.\"\n[s5] \"요리는 도전이라고 하지. 새롭게 접근한 3번이 어떨까?\""
80000100-37 = "#wait;10"
80000100-38 = "#wait;10"
80000100-39 = "#wait;10"
80000100-40 = "3;루미;07;그런가…… 좋아. 알았어! 참고가 되었네. 고마워, 선생님.\n#3;em;[!]"
80000100-41 = "[s] \"월병 시식을 부탁하고 싶어서, 오늘 불러 준 거구나. 고마워.\""
80000100-42 = "3;루미;02;응? 글쎄. 그렇다기보다는 오늘은 발렌타인 데이잖아?\n#3;em;[?]"
80000100-43 = "3;루미;02;초콜릿을 자연스럽게 먹여 주고 싶어 부른 건데."
80000100-44 = "[s] \"어……?\""
80000100-45 = "3;루미;02;……\n#3;em;…"
80000100-46 = "3;루미;04;……이거, 뭔가. 생각지도 못한 건데.\n#3;stiff"
80000100-47 = "3;루미;04;말해 놓고 보니…… 상당히 부끄러워졌네.\n#3;em;[///]"
80000100-48 = "3;루미;06;어제 말로 연습했을 때에는 괜찮았는데, 왜 이런 걸까……"
80000100-49 = "3;루미;04;이런, 여기까지 말하니 더욱 부끄러워졌어…… 곤란한걸.\n#3;em;[땀]\n#3;stiff"
80000100-50 = "[s6] \"……내가 말로 하는 것도 조금 그렇지만.\"\n[s7] \"그…… 뭔가, 이야기를 잘 돌린다거나, 하면 되는 거 아니었을까.\""
80000100-51 = "#wait;10"
80000100-52 = "#wait;10"
80000100-53 = "3;루미;06;그건…… 뭔가 싫었어.\n#3;em;…"
80000100-54 = "3;루미;06;나와 선생님 사이에는…… 숨기는 게 없었으면 했거든."
80000100-55 = "3;루미;06;그래서 솔직하게 이야기하자고 마음먹었는데……\n#3;stiff"
80000100-56 = "3;루미;04;그게 이런 결과를 불러오게 될 줄은……"
80000100-57 = "[s] \"……월병, 같이 먹을래?\""
80000100-58 = "3;루미;02;어? 그렇지만 그건, 선생님을 위해 준비한 월병인데?\n#3;em;[반응]"
80000100-59 = "3;루미;04;양이 너무 많아서 다 먹기 힘들 것 같다고……?"
80000100-60 = "3;루미;04;……"
80000100-61 = "3;루미;00;그래. 좋아. 잠시만 기다려. 차를 좀 더 준비할 테니까.\n#3;em;[음표]"
80000100-62 = "#all;hide"
80000100-63 = "#na;(루미와 함께 초콜릿 월병을 나눠 먹으며, 간간이 대화를 나누었다.)"

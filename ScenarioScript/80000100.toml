[translation]
80000100-1 = "Three Hearts"
80000100-2 = "Black Tortoise Promenade"
80000100-3 = "I received Rumi's request about a tasting and headed over to the Black Tortoise Promenade."
80000100-4 = "Ah, Sensei! There you are."
80000100-5 = "Now, now, take a seat. It's been so long I was worried I'd forget your face. You should visit more often."
80000100-6 = "[s] \"Sorry. So, what's this tasting about?\""
80000100-7 = "Ah yes, I've prepared a number of things."
80000100-8 = "But first...would you like a cup of tea? I've prepared some great green tea leaves."
80000100-9 = "I whetted my thirst with the green tea that Rumi poured for me."
80000100-10 = "Now then, you're quite clever, aren't you, Sensei? I imagine you picked up on my intentions behind having some green tea right at the start, yes?"
80000100-11 = "[s1] \"Hm... I actually didn't...\"\n[s2] \"I think I know.\""
80000100-12 = "Hahaha, I see. I guess there were too few hints. Well, if people could understand every intention behind a cup of tea, we wouldn't need conversations in the first place."
80000100-13 = "Now then. This is what I've prepared. In a way, it is the main reason for today's meeting."
80000100-14 = "Really? And what do you think I have in mind?"
80000100-15 = "You suspect it's something sweet? As expected of you, Sensei. You understand me in a way that's beyond words."
80000100-20 = "What is this? It's moon cake, so to speak..."
80000100-21 = "Unlike regular moon cakes, however, these ones have chocolate in them."
80000100-22 = "[s] \"Hm, there are three types, and they all look slightly different...\""
80000100-23 = "Excellent observation. Each of these moon cakes were made in different ways."
80000100-24 = "One is a regular moon cake. Just plain old red bean paste wrapped in a flour skin, but with a chocolate coating on the outside."
80000100-25 = "The next one has a chocolate filling, but is wrapped up in a flour skin."
80000100-26 = "The last one was a bit ambitious, but I made the flour skin so thin it's basically translucent..."
80000100-27 = "Then I made the filling out of viscous chocolate cream and ended by chilling the whole thing until it was half-frozen. You could call it an ice chocolate moon cake."
80000100-28 = "Here's my question for you, Sensei. Which of these three most deserves the title of Chocolate Moon Cake?"
80000100-29 = "Now, now. Taste them slowly and really chew on your opinion. If they're too sweet, you can cleanse your palette with some green tea."
80000100-31 = "I did as Rumi asked and sampled each cake thoroughly."
80000100-32 = "All three of the chocolate moon cakes were delicious."
80000100-34 = "Now then, it's time to hear your decision, Sensei."
80000100-35 = "Which one was the most like a Chocolate Moon Cake?"
80000100-36 = "[s3] \"Gotta stick with tradition. I think no. 1, with the external chocolate coating, is the best.\"\n[s4] \"I choose no. 2, because it lets me fully taste the chocolate.\"\n[s5] \"They say to cook is a challenge. How about no. 3, where you tried something totally new?\""
80000100-40 = "I see... All right! That's good to know. Thank you, Sensei."
80000100-41 = "[s] \"So today was just a moon cake tasting. Thank you for that.\""
80000100-42 = "Hm? I don't know about that. Today is Valentine's Day, right?"
80000100-43 = "I only called you here because I wanted to feed you chocolate under the radar."
80000100-44 = "[s] \"...Huh?\""
80000100-45 = "..."
80000100-46 = "...Oops... I may have said too much."
80000100-47 = "Hearing those thoughts out loud, I'm quite embarrassed."
80000100-48 = "I managed to keep things under wraps when I rehearsed last night, so how—"
80000100-49 = "Ah, now I've said something even more embarrassing! This is a mess!"
80000100-50 = "[s6] \"...I might be out of line saying this but...\"\n[s7] \"Well... I think you could've said all that a bit more tactfully.\""
80000100-53 = "That... For whatever reason, I didn't want to be so formal."
80000100-54 = "I didn't want to have a bond where we hide things from each other, Sensei."
80000100-55 = "So I wanted to speak candidly..."
80000100-56 = "But I didn't think I would end up saying all that..."
80000100-57 = "[s] \"...You want to finish up these moon cakes?\""
80000100-58 = "Huh? But...I made them for you, Sensei."
80000100-59 = "Are there too many for you to eat by yourself?"
80000100-60 = "..."
80000100-61 = "Okay. All right then. Please wait a moment. I'll go prepare some more tea."
80000100-63 = "I shared the Chocolate Moon Cakes with Rumi over some tea and pleasant conversation."

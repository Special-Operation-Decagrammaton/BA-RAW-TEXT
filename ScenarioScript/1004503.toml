[translation]
1004503-1 = "วัตถุดิบสดใหม่จากแหล่งผลิต"
1004503-2 = "(คุณครูมาที่ชายหาดตามคำขอของโฮชิโนะ)"
1004503-7 = "นี่ ครู... ทางนี้ ทางนี้~"
1004503-8 = "[s] \"โฮชิโนะ?\""
1004503-13 = "มาคนเดียวตามที่ขอเลยแฮะ ขอบคุณนะครู"
1004503-14 = "ฉันคิดว่าครูคงไม่ไปบอกคนอื่นหรอก แต่ยังไงก็ไม่อยากให้เซริกะจังหรือว่าอายาเนะจังรู้เข้าน่ะ"
1004503-15 = "หืม? เรื่องอะไรงั้นเหรอ?"
1004503-16 = "อืม ไม่มีอะไรหรอก ไม่ใช่เรื่องใหญ่อะไร..."
1004503-17 = "พอดีฉันกำลังหลบมุมงีบให้หายเหนื่อยอยู่น่ะ แล้วสองคนนั้นก็มาหาและบ่นเข้ายกใหญ่..."
1004503-21 = "สรุปเลยก็คือ เราต้องหาอาหารทะเลมาทำบาร์บีคิวซีฟู้ดกินกันเย็นนี้"
1004503-22 = "หืม? เพราะแบบนี้ ก็เลยคิดว่าฉันเลยเรียกให้ครูมาหางั้นเหรอ?"
1004503-23 = "แฮ่ๆๆ~ ใช่แล้วละ ครูเป็นกำลังเสริมของฉันไง"
1004503-24 = "ที่ขอให้ปิดเป็นความลับกับเด็กๆ คนอื่น เพราะพวกเธอจะห้ามไม่ให้ครูมาช่วยฉันน่ะ"
1004503-25 = "เพราะถ้ารู้แล้วก็ต้องบ่นว่า \"ทำอะไรด้วยตัวเองบ้างเถอะค่ะรุ่นพี่ ขอร้องละ!\" อะไรแบบนี้..."
1004503-31 = "แต่ในเมื่อครูก็มาที่นี่แล้ว คงไม่ปล่อยให้ลุงที่น่าสงสารทำงานคนเดียวหรอกใช่ไหม?"
1004503-32 = "ครูเป็นคุณครูนะ คงไม่ปล่อยให้เด็กนักเรียนที่น่าสงสารแก้ปัญหาอยู่ลำพังหรอกใช่รึเปล่า?"
1004503-33 = "[s1] \"เปิดเผยแผนการมาแล้วสินะ\"\n[s2] \"เดี๋ยวครูช่วยเอง\""
1004503-34 = "แฮ่ สมกับเป็นครูจริงๆ ถ้างั้นก็รบกวนด้วยน้า"
1004503-35 = "แฮ่ สมกับเป็นครูจริงๆ ถ้างั้นก็รบกวนด้วยน้า"
1004503-36 = "ครูอุตส่าห์มาช่วยทั้งที..."
1004503-37 = "งั้นฉันจะพยายามไม่เล่นมากเกินไปแล้วกัน"
1004503-40 = "(หลังจากนั้นคุณครูกับโฮชิโนะก็ช่วยกันหาของทะเลด้วยกันอยู่พักใหญ่)"
1004503-46 = "ว้าว... ทั้งหมดนี่มันอะไรกันเนี่ย...?"
1004503-47 = "คงเพราะที่นี่เป็นเกาะร้างที่ไม่มีคนอยู่ ถึงจับได้เยอะขนาดนี้เลย ของทะเลเยอะกว่าน้ำทะเลอีกมั้งเนี่ย"
1004503-52 = "ครู ดูนี่สิ ฉันไม่เคยเห็นหอยเป๋าฮื้อใหญ่ขนาดนี้มาก่อนเลย มันตัวใหญ่ได้ขนาดนี้เลยเหรอ?"
1004503-53 = "ดูนี่สิครู แป๊ปเดียวก็เต็มตะกร้าแล้ว นี่ขนาดเรายังไม่ได้ออกไปไหนไกลเลยนะ"
1004503-54 = "สุดยอดเลย... ทะเลนี่มีอะไรให้ตื่นเต้นอยู่ตลอดเลยนะ"
1004503-55 = "[s3] \"ดูกระตือรือร้นมากกว่าปกตินะ\"\n[s4] \"โฮชิโนะดูตื่นเต้นมากเลยนะ\""
1004503-61 = "อืม..."
1004503-62 = "งั้นเหรอ...?"
1004503-63 = "แฮ่... ก็อาจจะอย่างที่ครูว่านั่นละ"
1004503-64 = "แต่ฉันก็คงจะแก้ตัวด้วยเหตุผลแบบว่า \"ก็ที่นี่เป็นทะเลนี่นา แถมเป็นทะเลฤดูร้อนอีกด้วย\" อะไรแบบนั้น..."
1004503-65 = "หืม? ทำไมต้องอ้างเหตุผลพวกนั้นงั้นเหรอ?"
1004503-66 = "แหม ครูก็รู้นี่นา ถ้าฉันแสดงออกว่าสนุกกับการทำงานหนักแบบนี้ พวกเด็กๆ ก็จะคาดหวังให้ฉัน#nทำแบบนี้ต่อไปเรื่อยๆ"
1004503-67 = "ถ้าไม่แสดงออกหรือกำหนดขีดจำกัดให้ชัดเจน ต่อไปก็อาจจะเหนื่อยในหลายๆ เรื่องได้นะ"
1004503-68 = "แน่นอนว่าถ้ามองในทางตรงกันข้าม..."
1004503-69 = "เพราะเรากำหนดขีดจำกัดเอาไว้ เราก็จะสามารถข้ามขีดจำกัดของตัวเองไปทำในสิ่งที่ปกติทำไม่ได้น่ะ"
1004503-75 = "เหมือนกับตอนนี้... ที่เรามาช่วยหาของทะเลด้วยกันไง "
1004503-76 = "มันสนุกแล้วก็น่าตื่นเต้นดีนะ"
1004503-77 = "แต่ขอบอกไว้ก่อนนะ ที่ฉันมาทำแบบนี้เพราะนี่เป็นวันหยุดฤดูร้อนสุดพิเศษ แล้วเราก็อยู่บนชายหาด#nที่ไม่มีใครอีกด้วย ฉันเลยทำอย่างนี้ได้"
1004503-78 = "ฉันบอกเรื่องนี้กับแค่ครูนะ อย่าเอาไปบอกคนอื่นเชียว"
1004503-79 = "เอาเถอะ... ฉันว่าครูคงเก็บความลับได้อยู่แล้วละ"
1004503-80 = "ใช่ไหม...?"
1004503-81 = "[s5] \"แน่นอน\"\n[s6] \"แน่นอน ก็ครูเป็น \"ผู้สมรู้ร่วมคิด\" นี่นา\""
1004503-87 = "แหะๆๆ..."

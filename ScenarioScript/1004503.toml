[translation]
1004503-1 = "產地直送的新鮮食材"
1004503-2 = "（出發前往海邊之後）"
1004503-7 = "老師，我在這裡～"
1004503-8 = "[s] 「星野？」"
1004503-13 = "真的依照約定一個人來了呢～謝謝你，老師。"
1004503-14 = "這件事萬一被茜香醬或綾音醬發現就完了……"
1004503-15 = "嗯？問我為什麼？"
1004503-16 = "這個嘛……其實也沒什麼大不了的……"
1004503-17 = "只是我剛才要小睡一下的時候被那兩個人發現……"
1004503-21 = "所以得在天黑之前去抓大家要吃的海鮮才行了……"
1004503-22 = "……嗯？所以才請老師來幫忙？"
1004503-23 = "耶嘿嘿……正確答案～"
1004503-24 = "也是因為這樣，我才會請老師不要跟其他人講……"
1004503-25 = "要是被發現一定會被大家罵的……"
1004503-31 = "既然人都來了，你應該不會丟下大叔我自己回去吧？"
1004503-32 = "老師不會丟下遇到困難的學生對吧？#n……對吧？"
1004503-33 = "[s1] 「我當然不會丟下遇到困難的學生。」\n[s2] 「那我就幫你，也順便給自己張羅晚餐吧。」"
1004503-34 = "唔嘿嘿，不愧是老師～！"
1004503-35 = "唔嘿嘿，不愧是老師～！"
1004503-36 = "既然要一起做，那大叔我也會努力的～"
1004503-37 = "萬事拜託囉，老師。"
1004503-40 = "（之後和星野一起在海邊抓了好一陣子的海鮮）"
1004503-46 = "哇啊……真厲害……"
1004503-47 = "是因為附近沒有其他人的關係嗎？大豐收耶～"
1004503-52 = "老師，你看這個！好大一顆鮑魚！原來鮑魚能長到這麼大嗎～"
1004503-53 = "唔嘿～竹簍已經滿了耶。"
1004503-54 = "大海真是驚人……每次都能有新的發現。"
1004503-55 = "[s3] 「你好像比平常更有活力呢。」\n[s4] 「星野，海邊好玩嗎？」"
1004503-61 = "……是，是嗎。"
1004503-62 = "……唔嘿。"
1004503-63 = "……或許就像老師說的一樣。"
1004503-64 = "有夏天，有大海……"
1004503-65 = "大叔我可能也有點興奮了。"
1004503-66 = "你可要好好記住現在這個限定版的大叔唷～"
1004503-67 = "只有此時此刻，才能看到這麼興奮的大叔！"
1004503-68 = "唔嘿嘿……開玩笑的。"
1004503-69 = "正是因為現在這個情況，才會讓人想做一些平時沒辦法做的事情。"
1004503-75 = "例如現在和老師一起抓海鮮，或是一起睡午覺……"
1004503-76 = "回到阿拜多斯之後，這些就都做不到了。"
1004503-77 = "……唔嘿，感覺有點難為情呢。"
1004503-78 = "這就是夏天的魔物嗎？還是無人島的魔力？"
1004503-79 = "唔嘿～……要幫我保密唷。"
1004503-80 = "……約好囉？"
1004503-81 = "[s5] 「當然！」\n[s6] 「我們可是『共犯』嘛！」"
1004503-87 = "……唔嘿嘿，謝謝老師。"

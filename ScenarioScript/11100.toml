[translation]
11100-2 = "ตอนที่ 10;ตามหาเบาะแส"
11100-3 = "เขตที่อยู่อาศัยในอะบิดอส"
11100-6 = "อ๊ะ อรุณสวัสดิ์ค่ะคุณครู"
11100-7 = "คะ? ฉันจะไปไหนตั้งแต่เช้างั้นเหรอคะ?"
11100-8 = "วันนี้เป็นวันจ่ายดอกเบี้ยของโรงเรียน... ก็เลยต้องเตรียมโน่นเตรียมนี่น่ะค่ะ"
11100-9 = "ต้องรีบไปโรงเรียนเพื่อเตรียมจ่ายเงิน... แล้วก็ต้องวางแผนในอนาคตไว้ด้วย..."
11100-10 = "อ้อ! จริงสิ! ฉันได้ข้อมูลของเด็กนักเรียนที่เจอเมื่อวานแล้วค่ะ ฝากคุณครูเข้าโรงเรียนไปตรวจสอบ#nหน่อยนะคะ"
11100-11 = "เด็กพวกนั้นเป็นเด็กจากสถาบันเกเฮนน่า..."
11100-13 = "ว้าวว คุณครูนี่นา! หวัดดี~!"
11100-15 = "เอ๋?!"
11100-16 = "จ๊ะเอ๋! นี่มันโชคชะตาหรือเปล่าที่เราเจอกันตั้งแต่เช้าแบบนี้?"
11100-17 = "(ถูไถ) ฮิฮิฮิ ว่าไงนะ? หนักเหรอ? หรือหายใจไม่ออก? ทนหน่อยน้าคุณครู"
11100-20 = "ทำอะไรของคุณน่ะ?! ออกมาเลยนะ ออกมาห่างๆ คุณครูเลยค่ะ!"
11100-21 = "โอ๊ย อย่าดึงสิ~"
11100-22 = "ก็ว่าอยู่ว่าใครมายุ่ง นี่เด็กแว่นจากอะบิดอสไม่ใช่เหรอ?"
11100-23 = "ว่าไง~ เราเจอกันเมื่อวานใช่ไหม? ที่ร้านราเม็งไง"
11100-24 = "แล้วก็เจอตอนที่มาบุกโรงเรียนของเราด้วยค่ะ! นี่มันอะไรกันคะเนี่ย? มาแกล้งทำเป็นสนิททำไมคะ?"
11100-25 = "อีกอย่าง ฉันไม่ได้ชื่อเด็กแว่น แต่ชื่ออายาเนะต่างหากค่ะ!"
11100-26 = "หืม? พวกเราก็ไม่ได้ผูกใจเจ็บอะไรกับพวกเธอหรอกนะ"
11100-27 = "นั่นมันเป็นงานที่รับว่าจ้างมาของทางชมรมน่ะ ตอนที่ไม่ได้ทำงานก็มาสนิทกันไว้ก็ได้นี่นา~"
11100-28 = "นี่กำลังบอกให้แยกแยะระหว่างเรื่องงานกับเรื่องส่วนตัวเหรอคะ?!"
11100-29 = "ไม่เห็นเป็นไรเลยนี่ อีกอย่าง คุณครูจาก <ชาเล่ต์> ก็ไม่ได้เป็นคนของโรงเรียนเธออย่างเดียวนะ#nใช่ไหมคุณครู?"
11100-30 = "[s] \"อย่าทะเลาะกันเลยนะ มาสนิทกันไว้เถอะ\""
11100-31 = "วะฮ่าฮ่า! น่าจะยากแล้วละ เค้าเองก็ต้องทำงานเหมือนกัน อารุจังเป็นคนเข้มงวดมากๆ เลยน่ะ ถ้าละเลยงานเดี๋ยวจะโดนดุเอาได้"
11100-32 = "เอาไว้วันหลังมาเที่ยวที่หน่วยรับจ้างสารพัดดูนะคุณครู อารุจังกับเพื่อนๆ เค้าต้องชอบแน่ๆ"
11100-33 = "งั้นก็บ๊ายบายน้า~ ไว้เจอครั้งหน้านะ อายาเนะจัง"
11100-34 = "อย่ามีครั้งหน้าเลยดีกว่าค่ะ! ถ้าเจอกันอีกรอบ ฉันจะยิงคุณให้ตัวพรุนเลยค่ะ!"
11100-35 = "จ้า จ้าาา"
11100-37 = "แฮ่ก... แฮ่ก..."
11100-38 = "อะไรกันน่ะคะ เด็กคนนั้น...!"
11100-40 = "ขอโทษที่ให้รอนะครับ ยอดชำระเงินกู้รวมดอกเบี้ยลอยตัวและดอกเบี้ยเพิ่มเติมแล้ว ทั้งหมด 7,883,250 เยนครับ"
11100-41 = "รับมาเป็นเงินสดนะครับ"
11100-42 = "ขอบคุณที่ไว้ใจใช้บริการของสินเชื่อไคเซอร์นะครับ ไว้เจอกันใหม่เดือนหน้านะครับ"
11100-44 = "(บรื้นน-)"
11100-46 = "......"
11100-47 = "......"
11100-48 = "เฮ้อ... ผ่านไปได้อีกงวดแล้วสินะ"
11100-49 = "ตอนนี้เหลืออีกกี่งวดเหรอ?"
11100-50 = "เราต้องจ่ายคืนทั้งหมด 309 ปี... ถ้าจ่ายงวดนี้ไปแล้วก็จะเหลือ..."
11100-51 = "ช่างมันเถอะ ไม่ต้องพูดหรอก!! ถ้าได้ฟังฉันคงโมโหแน่!"
11100-52 = "ใช้หนี้จนแก่ตายก็คงไม่หมดอยู่ดี! แล้วจะต้องมาคำนวณไปทำไม!"
11100-53 = "......"
11100-54 = "แต่ทำไมธนาคารนั้นถึงรับแต่เงินสดล่ะคะ? เอารถมาขนเงินสดไปแบบนั้นมันก็อันตรายนะ..."
11100-55 = "......"
11100-57 = "รุ่นพี่ชิโรโกะ เราจะปล้นรถขนเงินไม่ได้นะ"
11100-58 = "เปล่าสักหน่อย เรื่องนั้นฉันรู้หรอกน่า"
11100-59 = "แค่คิดก็ไม่ได้!"
11100-60 = "อืม..."
11100-61 = "เอาเถอะๆ เรายังต้องไปแก้ปัญหาที่อยู่ตรงหน้ากันก่อนนะ"
11100-62 = "กลับกันเถอะ"
11100-64 = "ไหนๆ ก็อยู่กันครบทุกคนแล้ว ฉันจะเริ่มเลยนะคะ วันนี้มีเรื่องที่ต้องพูดคุยกัน 2 เรื่องค่ะ"
11100-65 = "อย่างแรกก็คือ การบุกจู่โจมที่เกิดขึ้นเมื่อวานนี้"
11100-67 = "พวกที่จู่โจมเราก็คือชมรมที่ใช้ชื่อว่า <หน่วยรับจ้างสารพัด 68> ค่ะ"
11100-68 = "หน่วยนี้สังกัดอยู่ในสถาบันเกเฮนน่า เป็นที่ลือกันว่ามีแต่พวกเด็กเกเร ตัวอันตรายทั้งนั้นค่ะ"
11100-69 = "จริงๆ ชื่อหน่วยรับจ้างสารพัด ก็เหมือนเป็นชื่อของกลุ่มรับจ้างที่จะจ้างให้ทำอะไรก็ได้..."
11100-70 = "หัวหน้าของชมรมนี้คือนักเรียนที่ชื่อว่าอารุค่ะ"
11100-71 = "เหมือนจะเรียกตัวเองว่าท่านประธานด้วย"
11100-75 = "นอกจากอารุแล้ว ยังมีอีก 3 คน ซึ่งมีตำแหน่งเป็นผู้อำนวยการ หัวหน้า และพนักงาน"
11100-78 = "จริงจังอะไรเบอร์นี้นะ"
11100-79 = "เป็นถึงท่านประธานเลยนะคะ☆ สุดยอดเลย!"
11100-80 = "เค้าแค่ยกย่องตัวเองน่ะ... ฉันว่าตอนนี้พวกนั้นต้องเข้ามาอยู่ที่ไหนสักแห่งในโรงเรียนเราค่ะ#nตอนเช้าก็เพิ่งเจอไปคนหนึ่ง..."
11100-81 = "สถาบันเกเฮนน่าอนุญาตให้ทำธุรกิจเองได้ด้วยเหรอ?"
11100-82 = "ฉันว่าไม่น่านะคะ... น่าจะทำธุรกิจตามใจกันเอง"
11100-83 = "อืม... กำลังฝ่าฝืนกฎของโรงเรียนสินะคะ แต่ดูแล้วไม่เห็นเหมือนเด็กที่เกเรเลย..."
11100-84 = "ไม่หรอกค่ะ พวกนั้นก่อเรื่องร้ายๆ เป็นประจำ แถมว่ากันว่าเป็นตัวป่วนประจำเกเฮนน่าเลยด้วย"
11100-85 = "ตอนนี้กลุ่มที่อันตรายแบบนี้กำลังหมายหัวโรงเรียนเราอยู่นะคะ! เราต้องกระตือรือร้นกันหน่อยสิคะ!"
11100-86 = "ถ้าเจอคราวหน้า เราจับตัวมาสอบสวนดูไหม?"
11100-87 = "ค่ะ ถ้ามีโอกาสก็ต้องลุยทันที..."
11100-88 = "รู้สึกได้ถึงความแค้นของอายาเนะจังเลยแฮะ... เกิดเรื่องอะไรขึ้นเหรอ?"
11100-89 = "... เรื่องต่อไปคือ เบื้องหลังของแก๊งหมวกกันน็อกที่เคยจับตัวเซริกะจังไป!"
11100-90 = "จากการวิเคราะห์ชิ้นส่วนของอาวุธที่เราเก็บได้จากการต่อสู้ครั้งก่อน...#nพบว่าเป็นโมเดลของรุ่นที่ไม่มีการซื้อขายกันแล้วในปัจจุบันค่ะ"
11100-91 = "เป็นรุ่นที่เลิกผลิตแล้วเหรอ?"
11100-92 = "แล้วไปหามาได้ยังไงน่ะ?"
11100-93 = "การจะหาอาวุธทางกลยุทธ์ที่เลิกผลิตไปแล้วในตอนนี้มีเพียงวิธีเดียว...#nนั่นคือผ่าน <ตลาดมืด> ในคิโวทอสค่ะ"
11100-94 = "ตลาดมืด... แต่ที่นั่นมันอันตรายมากเลยไม่ใช่เหรอคะ?"
11100-95 = "ใช่ค่ะ ในตลาดนั้นประกอบไปด้วยกลุ่มเด็กที่ออกจากโรงเรียนมา#nแถมยังมีชมรมนอกระบบที่ไม่ได้รับการอนุมัติจากองค์การนักเรียนอยู่เยอะแยะเลยค่ะ"
11100-96 = "เหมือนกับหน่วยรับจ้างสารพัด 68 น่ะเหรอ?"
11100-97 = "ใช่ค่ะ ฉันได้ยินมาว่าหน่วยรับจ้างสารพัด 68 ก็ก่อเรื่องในตลาดมืดมาหลายครั้งแล้วด้วยค่ะ"
11100-98 = "งั้นนี่ก็เป็นจุดสำคัญเลยนะคะ!"
11100-99 = "ค่ะ ฉันว่าบางทีเราควรหาความเชื่อมโยงของสถานการณ์ทั้ง 2 นี้ดูนะคะ"
11100-100 = "เอาสิ เอาตามนี้เลย ไปลองเดินดูในตลาดมืดกัน"
11100-101 = "เราอาจจะเจอเบาะแสที่คาดไม่ถึงก็ได้"
11100-103 = "ตอนต่อไป;ไปยังตลาดมืด 1"

[translation]
11100-2 = "第10話;尋找線索"
11100-3 = "阿拜多斯．住宅區"
11100-6 = "啊，老師。早安。"
11100-7 = "咦？這麼早要去哪裡？"
11100-8 = "那個，因為今天是付貸款利息的日子……所以需要準備一些東西。"
11100-9 = "我必須早點去學校處理還債事宜……還必須擬定未來的計畫……"
11100-10 = "啊，對了。我收集到關於昨天那幾位的情報了。#n可以麻煩您稍後去學校確認嗎？"
11100-11 = "那些人是格黑娜學園的學生……"
11100-13 = "啊，是老師！早呀～！"
11100-15 = "什什什麼！？"
11100-16 = "鏘鏘～！嗨～！沒想到會在這裡遇到你，真巧耶！"
11100-17 = "（磨蹭磨蹭）啊哈哈～！嗯？很重很難受？#n忍耐一下嘛～老師。"
11100-20 = "你，你在做什麼！請放開老師！"
11100-21 = "唉呦，不要拉我嘛～"
11100-22 = "……我還以為是誰，這不是阿拜多斯的眼鏡妹嗎～？"
11100-23 = "早哇～昨天在拉麵店見過吧？"
11100-24 = "之後襲擊我們學校的時候也有見過！#n這是怎麼回事？突然變得這麼親密……"
11100-25 = "而且我才不是什麼眼鏡妹，我叫做綾音！"
11100-26 = "嗯？但是我們對你們並沒有惡意哦。"
11100-27 = "那只是社團的工作而已。工作以外的時候和睦相處不是很好嗎？"
11100-28 = "事，事到如今才公私分明嗎！？"
11100-29 = "有什麼關係～#n而且「夏萊」的老師也不是你們專屬的。對吧，老師？"
11100-30 = "[s]「希望大家不要吵架，和睦相處。」"
11100-31 = "啊哈哈，那可能有點難～畢竟我們是在工作。#n亞瑠醬也充滿幹勁，要是敷衍了事可是會被罵的。"
11100-32 = "不過有空的話就來我們便利屋玩吧，老師。#n亞瑠醬和大家一定會很開心的。"
11100-33 = "那就掰掰囉～#n綾音醬也下次再見。"
11100-34 = "不會再有下次了！！下次見到的話我就立刻開槍！"
11100-35 = "是是是～"
11100-37 = "哈啊……哈啊…… "
11100-38 = "那個人是怎麼回事……！ "
11100-40 = "……不好意思久等了。#n以變動利率等等因素計算後的利息費用共為788萬3250圓。"
11100-41 = "全額以現金的方式收取，沒有問題。"
11100-42 = "感謝各位這個月也使用我們凱薩信貸的服務，那麼我們就下個月見了。"
11100-44 = "（轟隆隆隆……）"
11100-46 = "……"
11100-47 = "……"
11100-48 = "1;星野;17;哈啊，這個月也平安地度過了呢──"
11100-49 = "……距離還清還有多久？"
11100-50 = "因為是309年的分期……把至今繳的算進去的話……"
11100-51 = "不用說出來沒關係，聽到正確的數字也只會讓人壓力更大而已……"
11100-52 = "反正到我們老死的那天都還不清就對了！還有什麼好算的！"
11100-53 = "……"
11100-54 = "話說回來，凱薩信貸為什麼只收現金呢？#n甚至還特地安排運鈔車……"
11100-55 = "……"
11100-57 = "1;茜香;08;白子前輩，不能襲擊那輛車哦。"
11100-58 = "嗯，我知道。"
11100-59 = "1;茜香;04;連腦內計畫也不行！"
11100-60 = "嗯……"
11100-61 = "總之咱們得先想辦法解決眼前的問題。"
11100-62 = "先回教室去吧～"
11100-64 = "既然大家都到齊了就開始吧。#n我想先跟大家討論兩件事。"
11100-65 = "首先是昨晚的襲擊事件。"
11100-67 = "襲擊我們的是一個叫做「便利屋68」的社團。"
11100-68 = "據傳他們來自格黑娜，是極為危險的問題學生。"
11100-69 = "所謂的便利屋就是什麼都能做的服務業者……"
11100-70 = "部長是一位名叫亞瑠的學生。"
11100-71 = "他似乎一直以「社長」自稱。"
11100-75 = "在社長亞瑠之下還有三名職員，職稱分別為室長、課長、職員。"
11100-78 = "哎呀～還挺正式的呢～"
11100-79 = "原來是社長啊☆真厲害！"
11100-80 = "不，那終究只是「自稱」而已……#n我想他們現在應該已經在我們阿拜多斯的校區內才對。早上也見到面了……"
11100-81 = "格黑娜學園容許學生創業嗎？"
11100-82 = "我想應該不行……感覺是擅自創業的。"
11100-83 = "哎呀……違反校規了呢。#n明明看起來不像壞孩子……"
11100-84 = "不，由於他們的惡劣行徑不勝枚舉，所以格黑娜似乎也將其視為問題兒童。"
11100-85 = "我們學校被那種危險的組織盯上了！大家必須繃緊神經才對！"
11100-86 = "下次要不要抓來調查一下呢～"
11100-87 = "嗯，如果有機會的話一定要……"
11100-88 = "綾音醬發生了什麼事嗎？#n總覺得散發著一股很重的怨氣……"
11100-89 = "……沒什麼。#n接下來是襲擊茜香醬的頭盔團的幕後黑手！"
11100-90 = "分析上次戰鬥中獲得的戰略武器碎片的結果發現……#n這是現在已經沒有在市面上流通的型號。"
11100-91 = "已經停產了的意思？"
11100-92 = "那他們是怎麼拿到的呢？"
11100-93 = "如果想取得已經停產的戰略武器……那就只能去奇普托斯的「黑市」了。"
11100-94 = "黑市……那不是很危險的地方嗎。"
11100-95 = "沒錯。輟學、休學、退學……因各種理由離開學校的學生會在那裡建立自己的勢力，聽說還有非常多未得到聯邦學生會許可的未授權社團在那裡活動。"
11100-96 = "像便利屋68一樣？"
11100-97 = "是。我聽說便利屋68也在黑市鬧過幾次風波。"
11100-98 = "也就是說那裡是重點囉！"
11100-99 = "是的，找出這兩件事的關聯也許是個辦法。"
11100-100 = "好，看來有結論了呢～#n那咱們就去調查黑市吧。"
11100-101 = "說不定會找到意料之外的線索哦。"
11100-103 = "下一話;前往黑市（１）"

[translation]
11100-2 = "Episode 10;In Search of a Clue"
11100-3 = "Abydos Residential Area"
11100-6 = "Oh, good morning, Sensei."
11100-7 = "Where am I heading off to so early?"
11100-8 = "Oh. We have an interest payment on the school's debt due today.#nThere's a lot of prep work involved."
11100-9 = "I have to get to school ahead of time to take care of it...and do some planning for how we'll move forward."
11100-10 = "Oh, that's right. I also compiled some intel on the students we ran into yesterday. I'd appreciate if you could take a look at it later."
11100-11 = "Those girls are in fact students at Gehenna Academy and..."
11100-13 = "Wow! If it isn't Sensei! Hey there!"
11100-15 = "What the...?!"
11100-16 = "How ya doin'? Wow, what a coincidence running into you this morning."
11100-17 = "*jump* *squeeze* Hmm? I'm not too heavy, am I? I'm sure you can still breathe, Sensei, so you'll just have to endure it."
11100-20 = "Wh-What do you think you're doing? Let go of Sensei this instant!"
11100-21 = "Hey, quit pulling!"
11100-22 = "Well, well, well. If it isn't Little Miss Four-Eyes from Abydos. You really like to stick your nose in other people's business, don't you?"
11100-23 = "You seemed a lot more polite when we ran into each other at the ramen place yesterday. Don't you remember?"
11100-24 = "That was before you assaulted our school! What are you up to? Why are you trying to be so buddy-buddy all of a sudden?"
11100-25 = "And my name's not Little Miss Four-Eyes! It's Ayane!"
11100-26 = "What? It's not like we have anything against you guys."
11100-27 = "We told you it was just business. We can play nice when we're not fighting."
11100-28 = "A-Are you actually trying to tell me not to take things personally after what you did?! "
11100-29 = "Why not? It's not like Schale only works for you Abydos kids.#nIsn't that right, Sensei? "
11100-30 = "[s] \"Can't we all just get along?\""
11100-31 = "Haha! That's a good one. Fat chance. We have a business to run. Aru has high expectations of us."
11100-32 = "Oh, well. Stop by our office anytime you want, Sensei. I bet Aru and the others would be thrilled to have you there."
11100-33 = "Well, bye-bye! See you next time, Miss Ayane."
11100-34 = "There will be no later! I'll shoot on sight if I catch you in our district again!"
11100-35 = "Whatever you say."
11100-37 = "*sigh*"
11100-38 = "The nerve on that girl!"
11100-40 = "A 7,883,250 yen payment on your loan, including variable interest and additional interest, has been confirmed."
11100-41 = "Paid in cash. No issues to report."
11100-42 = "Thank you once again for doing business with Kaiser Loans.#nSee you next month."
11100-44 = "*vroom*"
11100-46 = "..."
11100-47 = "..."
11100-48 = "We've managed to make it another month."
11100-49 = "How much longer to go?"
11100-50 = "The repayment schedule is 309 years. At the rate we're going..."
11100-51 = "Don't say it! I'm gonna snap if I hear the details!"
11100-52 = "Just face it. We'll never pay this off in our lifetimes!#nWhy even bother doing the math?!"
11100-53 = "..."
11100-54 = "Do you ever wonder why they only accept cash payments? Why would they go out of their way to use armored trucks?"
11100-55 = "..."
11100-57 = "I hope you aren't planning to rob them, Shiroko."
11100-58 = "Don't worry. I'm not."
11100-59 = "That doesn't mean you can daydream about doing it either!"
11100-60 = "Fine..."
11100-61 = "Come on, guys. All we can do is focus on what's right in front of us."
11100-62 = "Let's go inside."
11100-64 = "Let's begin, shall we? We need to go over two issues."
11100-65 = "First off is yesterday's assault."
11100-67 = "The culprits belong to a club called Problem Solver 68."
11100-68 = "They're a notorious group of student delinquents from Gehenna Academy."
11100-69 = "They present themselves as a fixer agency, but they're more like errand girls who take on odd jobs."
11100-70 = "The club president is a girl named Aru."
11100-71 = "She would be the one you ran into that was calling herself the boss."
11100-75 = "Aru has three employees beneath her: a chief of staff, a department head, and an entry-level employee."
11100-78 = "They really do mean business, huh?"
11100-79 = "She's an executive at her age? That's so cool! ☆"
11100-80 = "Again, her title is self-proclaimed. I suspect they're currently operating out of a location close to Abydos—especially since we ran into one of them this morning."
11100-81 = "Is what they're doing officially recognized by Gehenna Academy?"
11100-82 = "I wouldn't think so. I bet they took whatever contract they're under because they felt like it."
11100-83 = "So they're in violation of school regulations... Strange. They didn't strike me as all that bad or malicious."
11100-84 = "On the contrary. They're known for being troublemakers and causing a lot of headaches at Gehenna as well."
11100-85 = "And now they're targeting our school! We need to take this seriously!"
11100-86 = "Maybe we ought to capture and interrogate them..."
11100-87 = "For once, I agree. We should take initiative and nip this problem in the bud."
11100-88 = "Geez, Ayane. You're acting like this is personal. Is there something you want to tell us about?"
11100-89 = "Next up, the mastermind behind the Helmet Gang's attack on Serika!"
11100-90 = "After analyzing the weapons that were recovered from the last battle...I've learned that this model is no longer on the market."
11100-91 = "So it's been discontinued?"
11100-92 = "Then how did they get their hands on it?"
11100-93 = "The only place you can get those kinds of weapons is in Kivotos' Black Market."
11100-94 = "Isn't that place supposed to be really dangerous?"
11100-95 = "Yes. Dropouts, burnouts on leave, flunkies... The Black Market is a melting pot for delinquents. Not to mention a place where unauthorized clubs do illegal activities."
11100-96 = "Like Problem Solver 68?"
11100-97 = "Indeed. Word on the street is that Problem Solver 68 has been responsible for a couple of incidents at the Black Market already."
11100-98 = "There's our link!"
11100-99 = "I agree. We should be looking for a connection there."
11100-100 = "It's obvious what we have to do next. Let's go to the Black Market and take a look around."
11100-101 = "You never know what kind of clues we might find there."
11100-103 = "Next Episode;To the Black Market! Part 1"

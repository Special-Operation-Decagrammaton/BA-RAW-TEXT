[translation]
1601005-1 = "巨匠的戰慄助威"
1601005-5 = "夏萊．辦公室"
1601005-8 = "歡迎回來，老師。"
1601005-9 = "我一直在等你唷。"
1601005-10 = "[s1]「……我回來了？」\n[s2]「那套服裝是怎麼回事？」"
1601005-11 = "我今天是來應援老師的。"
1601005-12 = "我今天是來應援老師的。"
1601005-13 = "所以……就像之前說的，得根據場合穿上適合的工作服……"
1601005-14 = "既然我今天是來幫老師加油的，穿上這身衣服是理所當然的。"
1601005-15 = "……如何？有幹勁了嗎？"
1601005-19 = "[ns3]「……不是太明白。」\n[ns4]「還是不太想工作吧……」"
1601005-22 = "沒關係，只要使用我今天帶來的發明，老師一定很快就會充滿動力的。"
1601005-23 = "上次因為我沒有弄清楚文書作業的特性，#n所以不僅沒幫到老師的忙，甚至還讓老師更加分心……"
1601005-24 = "……不過這次絕對不會有問題的，至少我不會再做些會讓人分心的事。"
1601005-32 = "……鏘！這就是我準備的究極應援道具。"
1601005-33 = "[s]「……文書處理器？」"
1601005-34 = "嗯。大部分的功能都和普通的文書處理器差不多。#n是一台專門用於編輯文件的電腦。"
1601005-35 = "……但是，我另外加裝了一項特別的功能。"
1601005-41 = "來，老師。試著用它處理剩下的工作吧。"
1601005-42 = "距離截止日期越近，發揮的效果就會越好哦。"
1601005-43 = "[s] 利用文書處理器編輯即將要繳交的報告書"
1601005-51 = "[ns]「好像沒有什麼區別啊……」"
1601005-52 = "呵呵。別擔心。"
1601005-53 = "這個道具是在注意力分散時才能發揮它真正的價值。"
1601005-54 = "……現在，請你先像平常一樣繼續辦公吧。"
1601005-57 = "（約莫10分鐘後……）"
1601005-63 = "[ns]「嗯，實在是想不到什麼好的敘述方式呢……」"
1601005-67 = "『警告，已經超過1分鐘未輸入新的字句。』"
1601005-68 = "『要是持續未輸入新字句……系統將於2分鐘後開始清除作業。』"
1601005-69 = "[s]「……清除作業？」"
1601005-70 = "嗯。就是我剛才說的特別功能。"
1601005-71 = "只要在開始編輯文件後，超過3分鐘沒有在文書處理器上執行任何操作的話……"
1601005-72 = "……這台機器就會自爆。"
1601005-73 = "[s5]「自爆！？！？」\n[s6]「為什麼要加入那種功能啊？」"
1601005-74 = "不是都說人只要離死線越近，越能集中精神，工作效率越高嗎？"
1601005-75 = "不是都說人只要離死線越近，越能集中精神，工作效率越高嗎？"
1601005-76 = "即使是做著相同的工作，人腦的效率也會隨著環境產生變化。"
1601005-77 = "所以這台機器的效果，就是為使用者提供被死線逼急的環境。"
1601005-78 = "好不容易寫完的報告如果即將在轉眼間化為灰燼……#n即使再怎麼不想工作，手也會不由自主地動起來。"
1601005-79 = "[s]「這，這是惡魔的發明……！」"
1601005-83 = "啊，老師。離「清除作業」只剩下一分鐘唷。"
1601005-87 = "[ns]「總之先輸入點什麼……」"
1601005-90 = "『警告，根據系統偵測，您目前輸入的字句與正在進行中的報告完全無關──』"
1601005-91 = "『因此輸入該字句的時間將不被視為編輯文件的時間。』"
1601005-92 = "[s]「……怎麼會這樣！？」"
1601005-93 = "我還幫這台文書處理器中加裝了能夠判斷文章順序及脈絡的簡易AI系統。"
1601005-94 = "如果是為了拖延時間而隨便輸入的字句，將不會被計算在內。"
1601005-95 = "來吧，老師。#n要是不希望努力寫的報告被清除的話……"
1601005-101 = "最好趕快打起精神，開始敲鍵盤吧。"
1601005-102 = "[s]「……這也太不講理了吧……」"
1601005-103 = "加油～加油～老師。"
1601005-105 = "（多虧響的發明，得以在極短的時間內完成了報告……）"
1601005-106 = "（不過為了避免那台具有自爆功能的文書處理器遭人濫用，只好將其沒收……）"

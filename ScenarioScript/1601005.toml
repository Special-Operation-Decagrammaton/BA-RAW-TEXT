[translation]
1601005-1 = "High-Pressure Meister"
1601005-5 = "Schale Office"
1601005-8 = "You're here, Sensei."
1601005-9 = "I've been waiting."
1601005-10 = "[s1] \"...I'm back.\"\n[s2] \"The cheerleading outfit again?\""
1601005-11 = "Yes, my duty today is cheerleading."
1601005-12 = "Yes, my duty today is cheerleading."
1601005-13 = "As I've said before, for every job in the world, there's an optimal outfit for doing it."
1601005-14 = "So, naturally, I'm wearing a cheerleader outfit."
1601005-15 = "...So, you feeling motivated yet?"
1601005-19 = "[ns3] \"...I don't know.\"\n[ns4] \"Not for work...\""
1601005-22 = "And that is precisely why I brought my invention today."
1601005-23 = "Last time, I didn't quite understand office work, so I ended up being more distracting than motivating..."
1601005-24 = "But this time will be better because, based on your feedback, I've removed all movement from the cheering."
1601005-32 = "Now, witness the ultimate cheering tool!"
1601005-33 = "[s] \"...A word processor?\""
1601005-34 = "Yes. A computer specializing in document creation. It's not too different from traditional word processing devices..."
1601005-35 = "...Except for one special feature."
1601005-41 = "Sensei, why don't you use this to get some work done?"
1601005-42 = "The more brutal the deadline, the more effective it is."
1601005-43 = "[s] Write a report with a looming deadline."
1601005-51 = "[ns] \"It doesn't seem to be doing anything...\""
1601005-52 = "Heh heh. Don't worry."
1601005-53 = "The true value of this device will only be revealed once you're truly distracted."
1601005-54 = "...For now, please continue working as usual."
1601005-57 = "After about ten minutes..."
1601005-63 = "[ns] \"I can't think of what to write anymore...\""
1601005-67 = "<Warning: New sentences input in the past minute: 0>"
1601005-68 = "<Alert: If new sentence counter remains at 0, termination will begin in 2 minutes.>"
1601005-69 = "[s] \"...Termination?\""
1601005-70 = "You see, this word processor has a timer."
1601005-71 = "If you're unproductive at work for three minutes..."
1601005-72 = "...the device will explode."
1601005-73 = "[s5] \"Explode?!\"\n[s6] \"Why though?!\""
1601005-74 = "It's often said that people are at their most productive when staring down an impossible deadline."
1601005-75 = "It's often said that people are at their most productive when staring down an impossible deadline."
1601005-76 = "Even if the task is the same, the brain simply processes it differently depending on the context."
1601005-77 = "This device ensures that the context is always one of extreme urgency."
1601005-78 = "Once you realize that your work will be completely and utterly destroyed... As they say, crushing despair is the mother of all invention!"
1601005-79 = "[s] \"Who says that?! Demons?!\""
1601005-83 = "Are you sure we should be having this conversation, Sensei? You only have a minute left."
1601005-87 = "[ns] \"I have to write something...anything...\""
1601005-90 = "<Warning: The sentence you just wrote has been identified as entirely irrelevant.>"
1601005-91 = "<Your irrelevance cannot stop the termination process.>"
1601005-92 = "[s] \"Why is it so mean?!\""
1601005-93 = "This word processor has a simple AI that exists solely to determine the worth of anything you write."
1601005-94 = "Writing filler isn't productive."
1601005-95 = "Really, Sensei. You don't seem like you're taking this seriously..."
1601005-101 = "You better get yourself motivated and type something out."
1601005-102 = "[s] \"...I don't believe in logic anymore...\""
1601005-103 = "Go! Go! You can do it! Just get it done, nothing to it!"
1601005-105 = "\"Thanks\" to Hibiki's invention, I completed the report extremely fast..."
1601005-106 = "And as soon as I finished, I confiscated the device with the key feature of blowing itself up..."

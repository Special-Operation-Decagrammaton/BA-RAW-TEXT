[translation]
1601005-1 = "การกดดันอย่างหนักของไมสเตอร์"
1601005-5 = "สำนักงานชาเล่ต์"
1601005-8 = "มาแล้วเหรอคุณครู"
1601005-9 = "ฉันกำลังรออยู่เลย"
1601005-10 = "[s1] \"กลับมาแล้ว...\"\n[s2] \"ชุดนั่น... มีอะไรรึเปล่า?\""
1601005-11 = "งานของฉันวันนี้คือ \"การเชียร์\" นี่นา"
1601005-12 = "ก็งานของฉันวันนี้คือ \"การเชียร์\" นี่นา"
1601005-13 = "ฉันเคยบอกไปแล้วนี่ว่า ไม่ว่างานใดในโลกนี้ก็ตาม มันจะมีชุดที่เหมาะกับงานนั้นๆ อยู่"
1601005-14 = "วันนี้ฉันเลยลองใส่ชุดเชียร์ลีดเดอร์มาเชียร์คุณครูน่ะ"
1601005-15 = "เป็นไง รู้สึกมีแรงขึ้นบ้างมั้ย?"
1601005-19 = "[ns3] \"ไม่รู้เลย...\"\n[ns4] \"รู้สึกไม่อยากทำงานเหมือนเดิม...\""
1601005-22 = "ไม่เป็นไร ถ้าใช้สิ่งประดิษฐ์ที่ฉันเอามาด้วย เดี๋ยวความรู้สึกอยากทำงานก็กลับมาแล้วละ"
1601005-23 = "เมื่อคราวที่แล้ว ฉันไม่ได้ทำความเข้าใจลักษณะการทำงานด้านเอกสารให้ดี เลยไม่ได้ให้กำลังใจคุณครู แถมยังทำให้คุณครูไม่มีสมาธิอีก..."
1601005-24 = "คราวนี้ไม่เป็นไรแล้วละ อย่างน้อยพู่เชียร์ก็ไม่ปลิวไปมาแล้ว"
1601005-32 = "เอาละ นี่คือสุดยอดอุปกรณ์เชียร์ที่ฉันเตรียมมา..."
1601005-33 = "[s] \"เวิร์ด โปรเซสเซอร์?\""
1601005-34 = "อื้อ PC เฉพาะสำหรับการทำงานด้านเอกสาร ฟังก์ชั่นพื้นฐานส่วนใหญ่ก็ไม่ได้แตกต่างจากอุปกรณ์ประมวลผลคำหรอก"
1601005-35 = "แต่ว่าฉันเพิ่มฟังก์ชั่นพิเศษอย่างหนึ่งเข้าไปในเวิร์ด โปรเซสเซอร์นี้น่ะ"
1601005-41 = "คุณครูลองใช้เวิร์ด โปรเซสเซอร์เครื่องนี้ทำงานดูมั้ย?"
1601005-42 = "ยิ่งเป็นงานที่ใกล้ถึงกำหนดส่งงานก็ยิ่งดีเลย"
1601005-43 = "[s] พิมพ์รายงานที่ใกล้ถึงกำหนดส่ง"
1601005-51 = "[ns] \"ไม่เห็นรู้สึกอะไรเป็นพิเศษเลย...\""
1601005-52 = "ฮุฮุ ไม่ต้องห่วง"
1601005-53 = "ฟังก์ชั่นพิเศษของเจ้าเครื่องนี้จะทำงานตอนที่สมาธิดร็อปลงยังไงล่ะ"
1601005-54 = "ช่วยทำงานต่อไปตามปกติหน่อยนะ..."
1601005-57 = "(10 นาทีต่อมา...)"
1601005-63 = "[ns] \"คิดประโยคสวยๆ กว่านี้ไม่ออกแล้วแฮะ...\""
1601005-67 = "<แจ้งเตือน ไม่มีการเขียนประโยคใหม่เป็นเวลา 1 นาที>"
1601005-68 = "<หากไม่เขียนประโยคใหม่อย่างต่อเนื่องละก็... อีก 2 นาทีจะดำเนินการ 'ลบออก'>"
1601005-69 = "[s] \"ลบออก?\""
1601005-70 = "อื้อ ในเวิร์ด โปรเซสเซอร์ติดตั้งตัวจับเวลาเอาไว้น่ะ"
1601005-71 = "เพราะงั้นเวลาที่เริ่มทำงานไปแล้ว และปล่อยเวิร์ด โปรเซสเซอร์เอาไว้ ไม่พิมพ์อะไรลงไปเพิ่มเป็นเวลา 3 นาที..."
1601005-72 = "เครื่องมันก็จะระเบิดตัวเองไงล่ะ!"
1601005-73 = "[s5] \"ระเบิดตัวเองเรอะ?!!\"\n[s6] \"ทำไมถึงใส่ฟังก์ชั่นพรรค์นั้นมากันเล่า!\""
1601005-74 = "บ่อยครั้งที่ถ้าใกล้ถึงเวลาส่งงาน คนเราจะมีสมาธิเพิ่มขึ้นมากกว่าปกติ และจะทำงานได้มีประสิทธิภาพมากกว่าเดิมนี่นา?"
1601005-75 = "บ่อยครั้งที่ถ้าใกล้ถึงเวลาส่งงาน คนเราจะมีสมาธิเพิ่มขึ้นมากกว่าปกติ และจะทำงานได้มีประสิทธิภาพมากกว่าเดิมนี่นา?"
1601005-76 = "ถึงจะเป็นงานเดียวกัน แต่สมองของเราจะใช้งานได้มีประสิทธิภาพแตกต่างกันไปตามสภาพแวดล้อมนะ"
1601005-77 = "วัตถุประสงค์ของเจ้าเครื่องนี้ก็คือคอยสร้างสภาพแวดล้อมที่เหมือนกับใกล้ถึงกำหนดส่งให้กับผู้ใช้งาน"
1601005-78 = "เวลาที่รู้สึกกดดันว่างานที่ทำมาอาจปลิวหายไปทั้งหมด... ต่อให้ไม่อยากทำงานแค่ไหน มือก็คงจะพิมพ์ต่อไปเองไม่หยุดแน่ๆ"
1601005-79 = "[s] \"ความคิดชั่วร้ายสุดๆ...!\""
1601005-83 = "อ๊ะ คุณครู เหลือเวลาไม่ถึง 1 นาทีที่เจ้าเครื่องนี่จะ \"ลบ\" งานออกแล้วนะ"
1601005-87 = "[ns] \"ถ้าไม่เขียนอะไรลงไปละก็แย่แน่ๆ...\""
1601005-90 = "<โปรดระวัง ตรวจสอบพบว่าประโยคที่พิมพ์เมื่อสักครู่ เป็นประโยคที่ไม่เกี่ยวข้องกับเนื้อหาของเอกสารที่ทำอยู่ในปัจจุบัน>"
1601005-91 = "<ไม่นับรวมประโยคดังกล่าวในระยะเวลาจัดทำเอกสารปัจจุบัน...>"
1601005-92 = "[s] \"ทำไมเล่า?!\""
1601005-93 = "อ๋อ เจ้าเวิร์ด โปรเซสเซอร์นี้น่ะ มีระบบ AI ง่ายๆ ที่คอยตรวจสอบเนื้อหาและลำดับประโยคอยู่ด้วยนะ"
1601005-94 = "ประโยคที่พิมพ์มาแค่เพื่อประวิงเวลาน่ะ จะไม่นับรวมอยู่ในเวลาทำงาน"
1601005-95 = "เอ้า คุณครู ถ้าไม่อยากให้งานที่พิมพ์มาหายไป..."
1601005-101 = "รีบเค้นแรงฮึดออกมาแล้วรัวคีย์บอร์ดเลยจะดีกว่านะ"
1601005-102 = "[s] \"บังคับกัน...ชัดๆ...\""
1601005-103 = "คุณครูสู้ๆ~ คุณครูสู้ตาย~"
1601005-105 = "(เพราะใช้สิ่งประดิษฐ์ของฮิบิกิ คุณครูจึงสามารถส่งเอกสารทั้งหมดได้อย่างรวดเร็วสุดๆ แต่ว่า...)"
1601005-106 = "(เพื่อป้องกันไม่ให้ถูกนำไปใช้ในทางที่ไม่ดี เลยริบเครื่องเวิร์ด โปรเซสเซอร์ ที่ติดตั้งฟังก์ชั่นระเบิดตัวเองมา...)"

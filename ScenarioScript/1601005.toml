1601005-78 = "3;히비키 응원단ND;03;공들여 작업한 보고서가 통째로 날아갈지도 모른다는 압박이 가해지면…… 아무리 일이 하기 싫어도 억지로 손을 움직이게 되겠지.\n#3;em;[반짝]"

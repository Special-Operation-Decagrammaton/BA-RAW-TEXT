[translation]
10029020-1 = "Episode 2;Local Customs"
10029020-2 = "And so..."
10029020-3 = "...We've put together a little something to help your guests with our \"local customs.\" Specially built guns for three outsiders."
10029020-4 = "It was a pretty fun request. I lost track of time while working on it."
10029020-5 = "A gun for an \"esper\" from another world. Jobs like this are rare, you know?"
10029020-6 = "Though to be honest, I'm still not sure about this whole \"esper\" idea, but..."
10029020-7 = "But if Miss Omniscience says it, then there's no point in doubting it."
10029020-8 = "Anyway..."
10029020-9 = "Here. This is for you. A gun for an electricity esper! I'll leave the other two with you, Sensei."
10029020-10 = "Umm... Wait..."
10029020-16 = "This is a real gun? And you're just giving it to me...?"
10029020-17 = "It's a bit much..."
10029020-19 = "Please accept it. I know you're hesitant, but this is just one of the differences between our world and yours."
10029020-20 = "Such as the halos over our heads, or the fact that we don't mind being shot at."
10029020-21 = "According to what you've told us, these are impossible ideas where you're from, but they're commonplace for us."
10029020-22 = "Yes, I understand that, but..."
10029020-23 = "Hm..."
10029020-24 = "All right. There's no helping it."
10029020-25 = "Are you sure it's okay to just give this to me? I feel like I'm taking advantage..."
10029020-26 = "After getting a gift like this, especially with the attitude I gave you earlier..."
10029020-27 = "...Huh?"
10029020-28 = "...? The light on this gun is..."
10029020-33 = "Oh? Sensei, you have a question?"
10029020-34 = "You want to know if we built any weird features into the gun...?"
10029020-38 = "...Of course not."
10029020-39 = "[s1] \"You hesitated just now!\"\n[s2] \"I'm right, aren't I?! There's something strange about it!\""
10029020-42 = "Something strange?! Absolutely not! This is an incredible gun, I'll have you know!"
10029020-43 = "This is a practical firearm that brings out the best in its user! A one-of-a-kind railgun!"
10029020-44 = "Railgun...?"
10029020-45 = "Wait a minute. You called it a railgun..."
10029020-46 = "Let me explain. It can be used as a regular firearm, but it also has a special built-in feature. It can fire bullets using electromagnetic force!"
10029020-48 = "It's the perfect gun for an esper with electrical powers!!"
10029020-52 = "Assuming, of course, that the user really can generate electricity from her body...!"
10029020-53 = "N-Not that we don't believe you, but..."
10029020-54 = "As engineers, we need to verify these things for ourselves. I'm sorry if we offended you."
10029020-56 = "No, it's fine. You're not the first person to say something like that to me."
10029020-57 = "And I really do appreciate the gun, but...I don't plan on shooting it. I'm just going to carry it around..."
10029020-58 = "You are going to use it, and you'll see that it's not a big deal."
10029020-59 = "If you're accompanied by Sensei, other students will assume that you're on official duty."
10029020-60 = "You say that like it's nothing... I mean, I did see a few gunfights on the way here..."
10029020-61 = "...I must be dreaming after all. This is all because of Indian Poker."
10029020-62 = "A world where shootouts are the norm... How does this make sense...?"
10029020-63 = "To hear that from an esper, of all people..."
10029020-64 = "Anyway, now that we have the guns, we need to find the other two while the president researches the machinery in the ruins."
10029020-65 = "Oh, come to think of it..."
10029020-66 = "What did the other two people who appeared with me look like? Just in case I know them."
10029020-67 = "Or maybe they're from a completely different world from me..."
10029020-68 = "One was a girl with long blonde hair. She wore the same uniform as you."
10029020-69 = "The other was a dark-haired girl. Her school uniform was different."
10029020-71 = "The blonde girl had what looked like a remote control in her hand."
10029020-72 = "Long blonde hair... A Tokiwadai uniform..."
10029020-73 = "...And a remote control...?"
10029020-77 = "Oh."
10029020-78 = "*sigh*"
10029020-79 = "Of course. Out of all people, it had to be her..."
10029020-80 = "You know who she is?"
10029020-81 = "I'm pretty sure I do..."
10029020-82 = "And if it really is who I think it is, we'd better find her quickly."
10029020-83 = "...What do I mean?"
10029020-84 = "Her power lets her control people. Who knows what she's getting up to right now...?"
10029020-85 = "Mind control...?! Is there really such a thing? I've never heard of anything like that!"
10029020-86 = "If I had known, we would've added brain-wave enhancing capabilities to her gun...!"
10029020-87 = "[s3] \"No, no, no. That's okay...\"\n[s4] \"We're probably lucky you didn't know.\""
10029020-90 = "Hm. I didn't notice her power when I was moving you three. I suppose that's to be expected with an ability like that."
10029020-91 = "I doubt she will be too hard to find, though."
10029020-92 = "...Ah. In fact, the president says that she's already found her."
10029020-93 = "Oh? Already? How...?"
10029020-94 = "There are CCTVs all over the city. As I said, you three really stand out."
10029020-95 = "A student, walking the streets without a gun..."
10029020-96 = "You're far more likely to encounter a student walking around nude than without her gun! Statistically speaking!"
10029020-97 = "What kind of place is this? Really..."
10029020-98 = "Anyway, we can head out now, right?"
10029020-102 = "Now that I've picked up the \"local customs\"?"
10029020-103 = "[s5] \"You're more adaptable than you look.\"\n[s6] \"Good. Let's go.\""
10029020-106 = "...Hm."
10029020-107 = "Let's go."

10029020-18 = "#all;hide"
10029020-19 = "3;에이미;02;사양할 필요 없어. 거부감이 있다는 건 들었지만, 말했듯 이곳과 그곳의 개념은 다른 면이 많으니까.\n#3;em;[반응]"
10029020-20 = "3;에이미;01;애초에 지금 미코토의 머리 위에 나타나 있는 헤일로도, 우리처럼 총에 맞아도 괜찮은 것도."
10029020-21 = "3;에이미;01;모두 미코토가 있던 곳에선 없던 개념이라고 하지 않았어? 미코토 스스로."
10029020-22 = "3;미사카;12;그, 그건 물론 이해했지만…….\n#3;em;[땀]"
10029020-23 = "3;미사카;13;으음……."
10029020-24 = "3;미사카;06;……뭐, 그래. 어쩔 수 없나. 그렇다면 그런 줄 알아야지.\n#3;em;[한숨]"
10029020-25 = "3;미사카;02;그건 그렇고, 설마 이거 나 주겠다고 굳이 새로 만든 거야? 뭔가 좀 미안해지는데……."
10029020-26 = "3;미사카;06;이런 것까지 받다니, 괜히 지금까지의 태도가 조금 민망해진달까……."

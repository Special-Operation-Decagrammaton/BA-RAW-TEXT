[translation]
10029020-1 = "第2話;這座都市的常識"
10029020-2 = "所以……"
10029020-3 = "我們為他們三人製作了奇普托斯的「常識」──也就是最適合他們的槍。"
10029020-4 = "真讓人興奮。#n甚至差點忘記了時間的流逝。"
10029020-5 = "居然能夠為從異世界來的超能力者打造槍械……這種機會可是可遇不可求的呢。"
10029020-6 = "老實說，聽到是「超能力者」的時候，我還有點半信半疑……"
10029020-7 = "不過畢竟是「全知」所說的話，和懷疑相比，選擇相信才是更明智的吧。"
10029020-8 = "那麼，首先……"
10029020-9 = "來，這是我為電能力者所打造的槍。#n至於剩下兩把，暫時就先交給老師保管吧。"
10029020-10 = "呃……嗯……"
10029020-16 = "這，這是真的槍嗎？#n……要我拿著這種東西？"
10029020-17 = "再怎麼說這實在有點……"
10029020-19 = "不用想太多。我知道你可能會覺得有點抗拒，#n但就像剛才說的一樣，我們這裡和你的世界有許多不同之處。"
10029020-20 = "比如你頭上突然出現的光環，以及像我們一樣被槍命中也不會有事……"
10029020-21 = "這些不也都是你原本所在的世界所沒有的概念嗎？#n美琴你自己也是這麼說的。"
10029020-22 = "是，是沒錯啦……"
10029020-23 = "嗯……"
10029020-24 = "……好吧，真沒辦法，看來我也只能照做了。"
10029020-25 = "不過話又說回來，這把槍該不會是你們特地為我打造的吧？#n總覺得有點不好意思……"
10029020-26 = "你們好心為我準備這種東西，我之前對你們的態度卻那麼差，真令人難為情……"
10029020-27 = "……嗯？"
10029020-28 = "這把槍裡的火焰是……"
10029020-33 = "……嗯？老師，你剛才說什麼？"
10029020-34 = "為了以防萬一，想確認那把槍是不是還有其他奇怪的功能……？"
10029020-38 = "……怎麼可能會有呢。"
10029020-39 = "[s1]「你剛才的遲疑是怎麼回事！？」\n[s2]「肯定有對吧？那東西肯定有什麼祕密沒錯吧！？」"
10029020-42 = "怎麼能稱之為奇怪的功能呢！！太過分了！明明就是很厲害的功能！！"
10029020-43 = "那可是能夠喚醒使用者天賦的實用手槍！名為「超電磁砲」！！"
10029020-44 = "超電磁砲……？"
10029020-45 = "等等，你剛才說超電磁砲……"
10029020-46 = "雖然也能當成普通的槍械使用，但除此之外，它還搭載了非常特別的功能！#n那就是利用電磁力發射子彈！"
10029020-48 = "它才真的有資格稱得上是專為電能力者打造的槍！"
10029020-52 = "雖然前提是……它的使用者真的能從體內產出電能就是了……！！"
10029020-53 = "當，當然我們並沒有要質疑你的意思……"
10029020-54 = "畢竟這對我們來說也是前所未聞的事。#n而且身為工程師，要我們不假思索地接受實在有點困難。#n如果讓你感到不舒服的話，我願意向你道歉。"
10029020-56 = "不，沒關係，反正類似的反應我也不是第一次遇到了。"
10029020-57 = "還有，雖然很感謝你們幫我準備這把槍……#n但我並不打算真的拿它來使用，只會隨身帶著它而已……"
10029020-58 = "我想你遲早會用上它的，而且就算這麼做也不會受到任何譴責。"
10029020-59 = "尤其是在與老師同行的時候，你的所做所為基本上都會被認定是在執行公務。"
10029020-60 = "你們也把這件事說得太理所當然了吧……#n雖然在來這裡的途中也已經發生過幾場戰鬥了……"
10029020-61 = "……仔細想想，這果然是在做夢吧？#n這種世界怎麼可能是真的呢……或許這一切都只是印地安撲克的內容……"
10029020-62 = "不然這種時常發生槍戰的世界……未免也太荒謬了吧……"
10029020-63 = "身為超能力者怎麼說這種話……"
10029020-64 = "總之，既然槍已經拿到了……#n在部長調查「設施」的期間，我們就先去找找另外兩個人吧。"
10029020-65 = "啊，這麼說來……"
10029020-66 = "可以先告訴我其他兩個人有什麼特徵嗎？#n說不定會是我認識的人。"
10029020-67 = "當然也可能是從其他世界來的人就是了……"
10029020-68 = "一個是穿著跟你相同制服的金色長髮女學生──"
10029020-69 = "而另一個則是穿著不同制服的黑髮女學生。"
10029020-71 = "另外，那個金髮的女學生還拿著一個像遙控器的東西。"
10029020-72 = "金色長髮……？常盤台中學的制服……？"
10029020-73 = "……遙控器？"
10029020-77 = "……啊。"
10029020-78 = "……唉。"
10029020-79 = "真的假的，怎麼偏偏是那傢伙……"
10029020-80 = "……「那傢伙」？#n是你認識的人嗎？"
10029020-81 = "……其中一個人我應該認識，我想八成就是他沒錯。"
10029020-82 = "如果真的是那個人的話，我們最好快點找到他。"
10029020-83 = "……嗯？為什麼這麼說？"
10029020-84 = "那傢伙擁有能夠控制別人的能力，不知道又會做出什麼事來。"
10029020-85 = "心靈控制的能力……！？那種能力真的存在嗎？我從來沒聽說過！"
10029020-86 = "要是早一點知道的話，我就在槍上加裝腦波增幅裝置了……！！"
10029020-87 = "[s3]「不不不，那就不用了……」\n[s4]「真是好險……」"
10029020-90 = "我在搬運時也完全沒察覺。如果對方擁有那方面的能力的話，事情就說得通了。"
10029020-91 = "不過即便如此，要找到對方應該也不是什麼難事。"
10029020-92 = "……嗯，部長說他已經找到了。"
10029020-93 = "咦？這，這麼快？#n是怎麼辦到的……"
10029020-94 = "只要調閱市內的監視器，要找到人並不是很難。#n畢竟就像我之前說的一樣，你們實在太顯眼了。"
10029020-95 = "連槍都不帶就大搖大擺地走在街上的學生……"
10029020-96 = "在我們這裡，那種人甚至比裸體出門的學生還少見哦！#n不管是從統計數據還是實際情形來看都是如此！"
10029020-97 = "這裡到底是個什麼樣的地方啊……"
10029020-98 = "那我們現在直接出發就行了嗎？#n帶……"
10029020-102 = "帶著這座都市的「常識」？"
10029020-103 = "[s5]「看來你適應得很快呢。」\n[s6]「好，那我們立刻出發吧。」"
10029020-106 = "……嗯。"
10029020-107 = "出發吧。"

10029020-1 = "#title;제2화;이 동네의 상식"
10029020-2 = "3;우타하;01;……그렇게 해서…….\n#3;a\n#3;em;…"
10029020-3 = "3;우타하;03;……우리가 세 사람을 위한 키보토스의 '상식'을 만든 것이지. 세 명에게 가장 알맞을 총을 말이야."
10029020-4 = "3;히비키;03;꽤 설레는 작업이었어. 시간 가는 줄 모르고 열중했다고.\n#3;a"
10029020-5 = "3;히비키;03;'다른 세계에서 온 초능력자를 위한 총'이라니. 어지간해선 얻기 힘든 기회잖아?\n#3;em;[반짝]"
10029020-6 = "3;히비키;99;솔직히 '초능력자'라는 말에 반신반의하는 상태이긴 하지만……"
10029020-7 = "3;우타하;02;뭐, 다른 사람도 아닌 '전지'의 말이야. 의심하는 것보단 기대하는 쪽이 현명하겠지."
10029020-8 = "1;미사카 비무장;01\n3;우타하;99;그럼 우선…….\n#1;ar\n#3;m5"
10029020-9 = "3;우타하;01;자. 받아. 이쪽이 전기 능력자를 위한 총. 나머지 두 자루는 선생님에게 맡길게.\n#3;greeting"

10029020-54 = "5;우타하;99;아무래도 너무 생소한 이야기긴 하니까 말이야. 공학자로서, 곧이곧대로 받아들이는 건 조금 무리가 있거든. 기분 나쁘다면 사과할게.\n#5;al\n#5;em;…"

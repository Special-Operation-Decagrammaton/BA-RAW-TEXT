[translation]
1003320-1 = "想隱藏又想傳達的事"
1003320-2 = "（從與若藻的MomoTalk中感到一股不祥的預感，於是決定去找若藻）"
1003320-8 = "老師？您居然會前來見若藻我，真是無比幸福，然而……"
1003320-9 = "如此將佔用閣下寶貴的時間……"
1003320-10 = "[ns]「沒，沒關係，不用在意哦。」"
1003320-12 = "[ns]「因為我今天就是想跟若藻待在一起！」"
1003320-17 = "啊啊，您實在是太溫柔了。"
1003320-18 = "與閣下的相遇，想必會是若藻我一生中最大的幸運和命運吧……"
1003320-19 = "那麼，今天該做什麼好呢？"
1003320-25 = "不管是身體、心靈……任何層面，若藻我都已經做好了萬全的準備……"
1003320-26 = "還請您，儘管吩咐♡"
1003320-27 = "[s]「那個，若藻。」"
1003320-28 = "我在，老師。"
1003320-29 = "[s1]「我突然這麼說，你可能會覺得有點奇怪……」\n[s2]「不過我希望你今天可以一直待在我身邊。」"
1003320-32 = "什，什麼……！？"
1003320-36 = "這就是所謂的……美夢成真嗎！？"
1003320-37 = "啊，啊啊，啊啊啊啊……！"
1003320-38 = "如果要問我現在開不開心的話，我可以保證我開心得不得了。#n然而即便如此，我還是必須告訴您，我現在還沒有做好完全接受您的心理準備……！"
1003320-46 = "請您給我一些時間──────！"
1003320-47 = "[ns]「若，若藻！？等等！」"
1003320-48 = "（若藻由於情緒激動而逃跑，只好匆忙跟了上去）"
1003320-62 = "您，您為何要追著我跑呢！？"
1003320-63 = "[s]「因為若藻在逃跑啊！」"
1003320-64 = "可，可是現在的我……！對閣下……！"
1003320-65 = "請，請再給我一些時間……！"
1003320-66 = "[s]「聽我說……！我只是要你一整天都待在我身邊而已！」"
1003320-67 = "呀啊！？閣，閣下的心意確實讓我感到無比喜悅，然而同時也感到過於沉重……#n現在的我，還無法接納閣下的心意……"
1003320-71 = "果，果然現在還不行────！"
1003320-72 = "[ns]「若藻……哇啊！？」"
1003320-76 = "閣，閣下！？"
1003320-77 = "（由於追趕若藻時太過著急，不小心摔了一跤）"
1003320-83 = "您，您沒事吧？非，非常抱歉……非常抱歉非常抱歉非常抱歉……！#n都，都是因為我……老師才會……！"
1003320-84 = "[s]「我沒事，只是稍微絆了一下而已，先冷靜下來好嗎？」"
1003320-85 = "可，可是……您，您在流血……！"
1003320-91 = "[ns]「只是一點擦傷而已，很快就會痊癒的！」"
1003320-92 = "不行……這種事……是絕對不能發生的……"
1003320-93 = "與其如此……還不如讓我……#n不，明明陪在閣下身邊，卻還是眼睜睜地看著您遭遇如此傷痛……"
1003320-94 = "看來只能以死謝罪──"
1003320-95 = "[ns]「先冷靜下來！」"
1003320-101 = "[ns]「稍微冷靜點了嗎？」"
1003320-102 = "是……"
1003320-103 = "[s]「話說……你今天一直戴著面具呢。」"
1003320-104 = "……！"
1003320-110 = "對不起，老師……"
1003320-111 = "今天明明是老師對我說，希望我一整天都待在您身邊……#n不，不只有今天，是一生都想與我相伴的……值得紀念的日子……"
1003320-112 = "卻讓您，見到如此醜態……"
1003320-113 = "[s5]「這，這個……我確實說過今天不要離開我身邊……」\n[s6]（不過並沒有說一輩子這種話吧……？）"
1003320-116 = "嗚……嗚嗚……對不起，對不起，老師……都是因為我……"
1003320-117 = "[s]「好了好了，停停停，你別哭了，乖。」"
1003320-122 = "我……想讓老師看見最真實的我……#n所以摘下面具，展現了自己的面貌……"
1003320-123 = "但今天……似乎比平時更加難以冷靜，因而再次戴上了面具……"
1003320-124 = "[s]「我們第一次見面的時候，你也戴著那個面具呢。」"
1003320-125 = "……"
1003320-130 = "這個面具，是我所擁有的面具之中最喜歡的。"
1003320-131 = "雖然這本來只是個隱藏身分，以免被捲入無謂紛爭中的道具……#n但是現在……"
1003320-132 = "[s]「現在……？」"
1003320-133 = "……！"
1003320-136 = "老師您……非要我把話說得那麼明白嗎……#n不過就連您這樣的一面，我也……啊啊……"
1003320-137 = "明明才剛遭遇如此嚴重的事，卻依然筆直注視著我，向我伸出您溫柔的手……"
1003320-143 = "甚至，還要我一整天都待在您的身邊……♡#n光是這樣，我就已經……！"
1003320-144 = "[s]「啊，嗯，對！」"
1003320-146 = "（老實向若藻坦承之所以請他待在身邊，是出於擔心他可能被捲入什麼複雜的事件）"
1003320-148 = "什麼……？#n因為我說會「拚盡全力」，所以讓您擔心了嗎？"
1003320-149 = "我只是……想在與老師發生永生難忘的事件時拚盡全力而已……"
1003320-150 = "[s7]「嗯，我知道若藻無時無刻不在為我著想。」\n[s8]「這次可能是我想太多了吧。」"
1003320-153 = "呵呵，閣下總是很為他人著想呢。"
1003320-154 = "不過，您思念著我的這份心意，讓我……啊啊……♡"
1003320-155 = "[s]「那麼若藻，有沒有什麼想去的地方？」"
1003320-156 = "！！"
1003320-157 = "今天這份偶然……果然是奇蹟呢！"
1003320-163 = "若藻我，只要能與閣下相伴……即便是走入地獄的業火，內心也身處極樂天堂♡"
1003320-165 = "[ns]「啊，嗯……」"
1003320-166 = "（之後，和若藻兩人度過了快樂的時光）"

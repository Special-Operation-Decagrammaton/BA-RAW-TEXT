[translation]
1003320-1 = "สิ่งที่อยากให้รู้แต่ไม่อยากบอก"
1003320-2 = "(หลังคุยกับวาคาโมะใน MOMOTALK เสร็จ จู่ๆ คุณครูก็รู้สึกสังหรณ์ใจแปลกๆ จึงรีบออกไปหาวาคาโมะ#nทันที)"
1003320-8 = "คุณท่าน? จู่ๆ รีบมาหาหาฉันทันทีแบบนี้เลยเหรอคะ ช่างเป็นเรื่องที่น่ายินดีจริงๆ แต่ว่า..."
1003320-9 = "ฉันกังวลว่าจะรบกวนเวลาของคุณท่านหรือเปล่า..."
1003320-10 = "[ns] \"มะ...ไม่เลย ไม่กวนเลยสักนิด\""
1003320-12 = "[ns] \"วันนี้ครูอยากใช้เวลาอยู่กับวาคาโมะน่ะ!\""
1003320-17 = "อ่า... คุณท่านเป็นคนใจดีมากเลยค่ะ"
1003320-18 = "ไม่ว่าจะคิดอีกสักกี่ครั้ง การได้มาพบกับคุณท่านก็คงเป็นโชคชะตา และเป็นโชคดีที่สุดสำหรับฉัน..."
1003320-19 = "ถ้าอย่างนั้นวันนี้เราจะทำอะไรกันดีคะ?"
1003320-25 = "วาคาโมะผู้นี้ ทั้งกายและใจเตรียมพร้อมที่จะเติมเต็มความปรารถนาทุกอย่างของคุณท่านแล้วค่ะ"
1003320-26 = "ขอเพียงแค่คุณท่านเอ่ยปาก วาคาโมะก็จะ...♡"
1003320-27 = "[s] \"นี่วาคาโมะ...\""
1003320-28 = "คะ คุณครู?"
1003320-29 = "[s1] \"ถ้าพูดแบบนี้อาจฟังดูแปลกๆ...\"\n[s2] \"วันนี้ครูอยากให้วาคาโมะคอยอยู่ข้างๆ ครูนะ\""
1003320-32 = "คะ...คะ?!"
1003320-36 = "เมื่อกี้... ฉันไม่ได้ฝันกลางวันใช่ไหมคะ..?!"
1003320-37 = "อา...อ๊าาาาาา...!! "
1003320-38 = "วาคาโมะมีความสุขจริงๆ ที่ได้ยินเช่นนั้นค่ะ  แต่ถึงวาคาโมะผู้นี้จะมีความสุขเหลือล้นก็ตาม แต่ว่า...#nตอนนี้วาคาโมะยังเตรียมใจได้ไม่พร้อมเท่าที่ควร...!"
1003320-46 = "โปรดรอวาคาโมะก่อนนะคะ...!"
1003320-47 = "[ns] \"วะ...วาคาโมะ?! เดี๋ยวก่อน!\""
1003320-48 = "(คุณครูวิ่งไล่ตามวาคาโมะที่หนีไปเพราะความตื่นเต้น)"
1003320-62 = "ทะ...ทำไมคุณท่านถึงวิ่งตามฉันมาล่ะคะ~~~!"
1003320-63 = "[s] \"ก็เธอหนีครูมานี่นา?!\""
1003320-64 = "ตะ...แต่ว่าตอนนี้จะให้ฉัน...! กะ...กับคุณท่าน...!"
1003320-65 = "อย่างน้อยก็ขอเวลาให้ฉันอีกสักหน่อยเถอะค่ะ...!"
1003320-66 = "[s] \"วันนี้ครู...แค่อยากให้วาคาโมะอยู่ด้วยเองนะ!\""
1003320-67 = "ฮึก?! ฉะ...ฉันดีใจที่คุณท่านรู้สึกแบบนั้นค่ะ แต่ว่าตัวฉันในตอนนี้... คงตอบรับความรู้สึกของคุณท่าน#nไม่ได้..."
1003320-71 = "ตะ...ตอนนี้ไม่ไหวจริงๆ ค่าาาาาา...!"
1003320-72 = "[ns] \"วาคาโมะ... ว้ากกก?!\""
1003320-76 = "คะ...คุณท่าน?!"
1003320-77 = "(คุณครูรีบร้อนวิ่งตามวาคาโมะ จนสะดุดล้มหน้าคะมำลงไป)"
1003320-83 = "ปะ...เป็นอะไรรึเปล่าคะ? ขอโทษค่ะ... ขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะ...! ปะ...เป็นเพราะ#nฉัน... คะ...คุณท่านถึงบาดเจ็บ...!"
1003320-84 = "[s] \"ครูไม่เป็นไร! แค่ล้มนิดหน่อยเอง ใจเย็นๆ ก่อน\""
1003320-85 = "ตะ...แต่... คะ...คุณท่านเป็นแผลถลอกแถมมีเลือดออกด้วย...!"
1003320-91 = "[ns] \"แค่แผลเล็กๆ เองน่ะ ปล่อยไว้เดี๋ยวก็หายเองแหละ!\""
1003320-92 = "ไม่ได้นะคะ... เรื่องแบบนั้น... จะปล่อยเอาไว้แบบนั้นไม่ได้เด็ดขาดเลยค่ะ..."
1003320-93 = "ถ้าเป็นแบบนั้น... แบบนั้นฉันคง... ไม่สิ ทั้งที่ฉันอยู่ด้วยแท้ๆ แต่กลับปล่อยให้เกิดเรื่องแบบนี้กับคุณท่าน#nได้..."
1003320-94 = "ฉันสมควรตายเพื่อชดใช้ความผิดนี้..."
1003320-95 = "[ns] \"ใจเย็นๆ ก่อนนะ!\""
1003320-101 = "[ns] \"ตอนนี้รู้สึกดีขึ้นบ้างแล้วใช่ไหม?\""
1003320-102 = "ค่ะ..."
1003320-103 = "[s] \"ว่าแต่ว่า... วันนี้วาคาโมะใส่หน้ากากตลอดเลยนะ?\""
1003320-104 = "...!"
1003320-110 = "ขะ...ขอโทษค่ะ คุณท่าน..."
1003320-111 = "วะ...วันนี้คุณท่านบอกว่าอยากให้ฉันอยู่ข้างๆ... แถมจากนี้ก็ขอให้อยู่ข้างๆ ตลอดไป... วันนี้เป็นวันดีๆ ที่น่าจดจำไปตลอดชีวิต..."
1003320-112 = "แต่ฉันดันแสดงพฤติกรรมไม่เหมาะสมเช่นนี้ให้คุณท่านเห็นซะได้..."
1003320-113 = "[s5] \"ไม่หรอก ครูเป็นคนพูดแบบนั้นเองนี่นา...\"\n[s6] (ไม่ได้พูดว่าอยากให้อยู่ด้วยตลอดชีวิตสักหน่อย...?)"
1003320-116 = "ฮึก...ฮือๆ... ขอโทษค่ะ ขอโทษจริงๆ ค่ะคุณท่าน... พะ...เพราะฉันแท้ๆ..."
1003320-117 = "[s] \"เอาละๆ โอ๋ๆ ไม่ต้องร้องนะ\""
1003320-122 = "เวลาอยู่ต่อหน้าคุณท่าน ฉันจะถอดหน้ากากออก...เพื่อให้คุณท่านได้เห็นถึงความจริงใจ และตัวตน#nที่แท้จริงของฉัน..."
1003320-123 = "แต่ว่าวันนี้ฉันรู้สึกไม่มั่นใจและรู้สึกละอายในหลายๆ อย่าง เพราะงั้นเลยใส่หน้ากากน่ะค่ะ..."
1003320-124 = "[s] \"วาคาโมะใส่หน้ากากนั่นตั้งแต่ครั้งแรกที่เจอกันเลยเนอะ\""
1003320-125 = "......"
1003320-130 = "หน้ากากอันนี้เป็นอันที่ฉันชอบมากที่สุดเลยค่ะ"
1003320-131 = "เดิมทีฉันใส่มันเพื่อปกปิดใบหน้าและตัวจริงของฉัน เพื่อจะได้ไม่ต้องเข้าไปพัวพันกับเรื่องวุ่นวาย#nไร้สาระต่างๆ แต่ว่าตอนนี้..."
1003320-132 = "[s] \"ตอนนี้...?\""
1003320-133 = "...!"
1003320-136 = "ใจร้ายจังเลยนะคะคุณท่าน จะต้องให้ฉันพูดเองเลยงั้นเหรอคะ... อา แต่ฉันก็ชอบคุณท่านที่เป็นเช่นนั้น..."
1003320-137 = "ถึงวาคาโมะจะยังบกพร่องอยู่ แต่คุณท่านก็ยังคงหันมามองและยื่นมือมาหาฉันแบบนี้..."
1003320-143 = "แถมคุณท่านยังขอให้ฉันอยู่ข้างๆ ตลอดทั้งวัน...♡ พอนึกถึงเรื่องนั้นแล้ว วาคาโมะน่ะ..."
1003320-144 = "[s] \"อะ...อื้อ คือว่าเรื่องนั้นน่ะ...!\""
1003320-146 = "(คุณครูบอกความจริงให้วาคาโมะฟังว่าที่พูดไปแบบนั้น เพราะกังวลว่าวาคาโมะจะเข้าไปพัวพันกับ#nเหตุการณ์วุ่นวายอะไรเข้าโดยไม่ได้ตั้งใจ)"
1003320-148 = "คะ...? พอได้ยินฉันบอกว่าจะทุ่มเทสุดแรงกายแรงใจ... คุณท่านก็เลยกังวลว่าจะเกิดอะไรขึ้นงั้นเหรอคะ?"
1003320-149 = "ฉันก็แค่... ที่ฉันพูดแบบนั้นเพราะหวังว่าระหว่างฉันกับคุณท่าน... จะเกิดเรื่องที่น่าจดจำไปตลอดชีวิตขึ้น#nก็เท่านั้น..."
1003320-150 = "[s7] \"วาคาโมะคิดถึงครูอยู่เสมอเลยสินะ\"\n[s8] \"ครูอาจกังวลมากเกินไปเองก็ได้\""
1003320-153 = "ฮุฮุฮุ คุณท่านกังวลมากเกินไปแล้วนะคะ"
1003320-154 = "แต่พอคิดว่าคุณท่านเป็นห่วงฉันแบบนั้นแล้ว ฉัน... อา...♡"
1003320-155 = "[s] \"ถ้างั้นวาคาโมะ... วันนี้มีที่ที่อยากไปรึเปล่า?\""
1003320-156 = "!!"
1003320-157 = "อย่างที่คิดไว้เลยค่ะ การที่เราได้มาเจอกันแบบนี้... มันไม่ใช่แค่ความบังเอิญ แต่เหมือนเป็นพรหมลิขิต#nเลยนะคะ!"
1003320-163 = "วาคาโมะผู้นี้ แม้จะต้องอยู่ท่ามกลางพายุโหม ทะเลคลั่ง หรือไฟกัลป์ก็ตาม แต่ถ้าได้อยู่กับคุณท่าน#nแล้วละก็ สำหรับวาคาโมะก็เหมือนอยู่บนสวรรค์เลยละค่ะ♡"
1003320-165 = "[ns] \"ครูรู้แล้ว...\""
1003320-166 = "(จากนั้นคุณครูกับวาคาโมะก็ใช้เวลาด้วยกันตลอดวันอย่างสนุกสนาน)"

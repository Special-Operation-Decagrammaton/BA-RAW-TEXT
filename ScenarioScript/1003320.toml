[translation]
1003320-1 = "Something to Hide, Something to Reveal"
1003320-2 = "I had a bad feeling after my conversation with Wakamo on MomoTalk, so I immediately left to meet with her."
1003320-8 = "Sensei? I'm thrilled beyond measure at your unexpected visit, but..."
1003320-9 = "I don't want to be a bother to Sensei..."
1003320-10 = "[ns] \"No, never, Wakamo.\""
1003320-12 = "[ns] \"I just wanted to spend time with you today.\""
1003320-17 = "Your kindness knows no bounds."
1003320-18 = "The serendipity of us meeting on that fateful day never ceases to amaze me, no matter how much time has passed."
1003320-19 = "What would you like me to do?"
1003320-25 = "I'm prepared in body and soul, in mind and resolve, to fulfill your every desire and request."
1003320-26 = "Just say the word, and—"
1003320-27 = "[s] \"Wakamo.\""
1003320-28 = "Yes, Sensei?"
1003320-29 = "[s1] \"Would it be weird if I just want your company?\"\n[s2] \"I just want to be in your presence today.\""
1003320-32 = "Wh-What?!"
1003320-36 = "C-Could it be I am currently in a beautiful dream...?!"
1003320-37 = "Ah! AHHH!  "
1003320-38 = "This cannot be a dream, for this feeling exceeds even my wildest hopes! I am happy, but I am not yet prepared for such a request, Sensei!"
1003320-46 = "O-One moment!"
1003320-47 = "[ns] \"W-Wakamo?! Wait up!\""
1003320-48 = "I started chasing the fleeing Wakamo as fast as I could."
1003320-62 = "Wh-Why do you give chase?!"
1003320-63 = "[s] \"Because I don't know why you're running!\""
1003320-64 = "Y-You don't understand, Sensei! As I am right now...!"
1003320-65 = "I just need more time, I beg of you!"
1003320-66 = "[s] \"I'm just asking for company, Wakamo! That's it!\""
1003320-67 = "You said it again?! From the deepest crevice in my soul, I feel only gratitude for your sentiment! But I cannot bear the weight of your feelings!"
1003320-71 = "All I know is that I am not READYYY!"
1003320-72 = "[ns] \"Wakamo! Ack?!\""
1003320-76 = "O-Oh, dear!"
1003320-77 = "Maybe it's because I was in such a rush to go after Wakamo, but I tripped and fell unceremoniously on my face."
1003320-83 = "Oh, dear! Oh, DEAR! Are you injured? My precious Sensei! I'm sorry! So sorry! I'm sorry, I'm sorry, I'm sorry, I'm sorry! I may as well have tripped you myself!"
1003320-84 = "[s] \"I'm completely fine! I tripped on my own feet!\""
1003320-85 = "Oh, no, no, no. Sensei, is that...is that b-b-b-blood?!"
1003320-91 = "[ns] \"From a small scrape! Please calm down!\""
1003320-92 = "I...cannot... This kind of tragedy...should never have occurred..."
1003320-93 = "If I could take every ounce of your pain for myself, if only I... No! I should never have allowed even the smallest scrape upon Sensei's body in the first place!"
1003320-94 = "This is my cross to bear. I will atone with my very life, Sensei."
1003320-95 = "[ns] \"All right! Let's do some breathing exercises, Wakamo!\""
1003320-101 = "[ns] \"Are you feeling better?\""
1003320-102 = "Yes..."
1003320-103 = "[s] \"You still have your mask on...\""
1003320-104 = "...!"
1003320-110 = "I'm sorry, Sensei..."
1003320-111 = "To think you approached me and asked me to stay by your side, forever and always, day in and day out... And this is how I react? I'm ashamed all the way to the tips of my ears..."
1003320-112 = "How could I ruin such a momentous occasion..."
1003320-113 = "[s5] \"I did say one of those things...\"\n[s6] \"(I don't remember saying all that...)\""
1003320-116 = "*sob* I'm so sorry Sensei... This is all my fault..."
1003320-117 = "[s] \"There, there. No more tears.\""
1003320-122 = "I had fully steeled my resolve to remove my mask, to proudly display the parts of me I can only show to you!"
1003320-123 = "But, instead, I was a coward. I hid my shame and embarrassment behind my mask, rather than facing you honestly."
1003320-124 = "[s] \"Well, of course it's hard. You've had that mask since before I met you.\""
1003320-125 = "..."
1003320-130 = "This mask is one of my most precious possessions."
1003320-131 = "It was my protection against the evil and tribulations of the world. But now..."
1003320-132 = "[s] \"What about now?\""
1003320-133 = "...!"
1003320-136 = "You can be very straightforward you know. But alas, even that is a side of you I have come to adore..."
1003320-137 = "Despite my many shortcomings, you never stop holding out your hand for me to take. You've always believed in me."
1003320-143 = "Not only that, you asked for nothing more than my company today. No task or mission, just me..."
1003320-144 = "[s] \"I did want to clarify something about that...\""
1003320-146 = "I told her the truth: that I asked for her company today because I was worried about her."
1003320-148 = "Y-You were concerned I would attempt to fulfill my duty at the cost of my own safety?"
1003320-149 = "I had... I had just said that in the hopes of a fateful event occurring between you and I..."
1003320-150 = "[s7] \"I understand now that you're always thinking of me.\"\n[s8] \"Maybe I was just overthinking things a bit.\""
1003320-153 = "Heeheehee. You can be quite silly as well, Sensei."
1003320-154 = "Even the fact you were so concerned about me is overwhelming. I'm... Eek!"
1003320-155 = "[s] \"Well, since we're here, is there anything you want to do with me, Wakamo?\""
1003320-156 = "!"
1003320-157 = "I see... So even this coincidental meeting was nothing short of a miracle! Fate itself!"
1003320-163 = "I, Wakamo, will follow you everywhere... To the ends of the earth and the very mouth of hell, with nothing but joy in my heart...! Lead the way, Sensei!"
1003320-165 = "[ns] \"Yes, ma'am...\""
1003320-166 = "Wakamo and I spent a somewhat peaceful rest of the day together."

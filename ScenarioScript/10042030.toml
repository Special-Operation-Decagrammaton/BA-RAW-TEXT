[translation]
10042030-1 = "第3話;生化危機"
10042030-3 = "已經做好運送準備了，部長。"
10042030-4 = "辛苦了。"
10042030-5 = "那個……部長？#n雖然不知道這種事該不該說……"
10042030-6 = "不過我今天在咖啡廳……好像有看到……剛剛說的「那個」。"
10042030-7 = "那個……？"
10042030-11 = "……啊，你是說釀成問題的怪物嗎。"
10042030-12 = "！？"
10042030-13 = "（這麼說來，這位客人我有印象……！）"
10042030-14 = "可以詳細說明一下情況嗎？"
10042030-15 = "嗯，我和朋友在鬆餅咖啡廳點了幾項餐點……"
10042030-16 = "然後就突然出現了一塊像是淋滿綠色黏液的紫色鬆餅。"
10042030-17 = "綠色和紫色……原來如此。"
10042030-18 = "因為它的動作太快，所以看得不是很清楚……#n現在仔細回想起來，上面似乎還有類似觸手的東西。"
10042030-19 = "大致上就是不停蠕動，到處亂蹦之後消失無蹤的感覺。"
10042030-20 = "說白一點就是詭異又噁心的東西！"
10042030-21 = "這樣啊。#n那麼你有關於它去向的線索嗎？"
10042030-22 = "沒有，因為我們根本沒想過這裡會出現那種東西。"
10042030-23 = "我明白了。#n現在先把屍體……傷患送回去，繼續觀察後續情況吧。"
10042030-24 = "是，部長。"
10042030-28 = "雖然目前事件仍撲朔迷離……"
10042030-29 = "不過有件事情可以確定。"
10042030-30 = "我不能對這起怪異現象坐視不管。"
10042030-31 = "[s1]「你好像科幻電影裡的博士哦。」\n[s2]「現在應該叫你……瀬奈博士嗎？」"
10042030-34 = "博士……？"
10042030-35 = "雖然博士這個稱呼有很多種含義，但現在應該是代表相信我的判斷的意思吧。"
10042030-36 = "謝謝。那我就欣然接受了。"
10042030-37 = "除此之外，我個人也對這個現象感到有點好奇。"
10042030-38 = "至少比把太妹丟進急救醫學部的車子裡有趣。"
10042030-39 = "那麼……你打算怎麼做呢，前輩？"
10042030-40 = "我要追蹤這些痕跡。"
10042030-41 = "沒，沒問題嗎……？#n現在已經有一個人受害了……"
10042030-42 = "嗯，感覺挺有趣的。"
10042030-44 = "有趣……？"
10042030-45 = "這種事有趣嗎……"
10042030-46 = "是啊，我也覺得這種事一般不會用有趣來形容。"
10042030-47 = "不過除了「有趣」之外，似乎沒有其他詞彙能表達我現在的心情了。"
10042030-48 = "[s3]「現在伊織已經中招了……」\n[s4]「我們還是嚴肅一點吧……」"
10042030-51 = "請老師放心。#n我現在已經非常興……更正，是非常嚴肅了。"
10042030-52 = "（到底哪裡嚴肅……）"
10042030-53 = "那麼就開始追蹤吧。#n我來帶頭。"
10042030-56 = "[ns]「這個景象……太驚人了。」"
10042030-57 = "走廊上到處都佈滿了綠色黏液……"
10042030-58 = "而且越往前好像越來越多。"
10042030-59 = "千夏，並不是「好像」，而是確實越來越多了。"
10042030-60 = "那，那怎麼辦！？#n這樣……代表什麼意思！？"
10042030-61 = "目前還不清楚，茱莉。#n我們只能繼續前進而已。"
10042030-62 = "不過，事情越來越有趣了。"
10042030-63 = "現在不是覺得有趣的時候吧……"
10042030-64 = "呃……呃啊……"
10042030-65 = "……是呻吟聲！？"
10042030-66 = "原來如此。#n應該是下一具屍體……線索……更正，是受害者吧。"
10042030-71 = "瀬，瀬奈同學！？我們一起走嘛～！"
10042030-81 = "唔，呃啊……"
10042030-85 = "[ns]「你，你還好嗎？發生什麼事了！」"
10042030-86 = "那邊的教室裡……傳來了奇怪的聲音……"
10042030-87 = "我想說應該不會有事……就去看看情況……結果……"
10042030-93 = "[ns5]「這Flag立得還真直……」\n[ns6]「完全忠於伏筆啊……」"
10042030-96 = "老師又在說難以理解的話了……"
10042030-97 = "這就是所謂的「套路」。#n或者要說「老哏」也可以。"
10042030-98 = "……這樣能夠理解嗎？"
10042030-99 = "我唯一理解的，就只有你們一點也不嚴肅而已……"
10042030-100 = "總覺得有點抱歉。#n畢竟他也是我的前輩……"
10042030-101 = "這個案例跟伊織的情況很相似。#n要說有什麼差別的話……"
10042030-102 = "和之前相比，黏液的量增加到了兩倍左右。"
10042030-104 = "兩，兩倍？"
10042030-105 = "痕跡一路往那邊延伸過去呢。"
10042030-106 = "走吧。痕跡往教室的方向去了。"
10042030-113 = "這，這是什麼！？"
10042030-114 = "哇……"
10042030-118 = "黏液的強度提高了呢。#n現在已經足以把一個人固定在牆上……"
10042030-119 = "而且量也進一步增加了。"
10042030-123 = "我想確認一件事，它一開始大概有多大呢？"
10042030-124 = "咦……？#n大，大概是普通鬆餅的大小……？"
10042030-125 = "普通鬆餅啊……我明白了。#n那麼各位覺得……"
10042030-126 = "這看起來像是普通的鬆餅會有的醬汁量嗎？"
10042030-127 = "[s]「確實不像。」"
10042030-128 = "沒錯。剛才在走廊發現的屍體……個案……受害者身上的黏液也比伊織那時還多。"
10042030-129 = "因此現階段能得出的結論只有一個──"
10042030-130 = "──「那個東西」正在漸漸成長。"
10042030-131 = "！！！"
10042030-132 = "[ns7]「在這麼短的時間內……？」\n[ns8]「質量守恆定律去哪了……？」"
10042030-135 = "……"
10042030-136 = "老師，這件事從頭到尾都沒有合理過吧？"
10042030-137 = "[s9]「是，是沒錯啦……」\n[s10]「我竟無法反駁……」"
10042030-140 = "事到如今，追求是否合理已經不是重點了。"
10042030-141 = "而且也不能根據規則和常識來加以推論。"
10042030-142 = "最重要的是正視目前發生的現象。"
10042030-143 = "同時抱持著好奇心……更正，是保持警覺以防範接下來可能發生的情況。"
10042030-147 = "！！！"
10042030-148 = "去附近的教室吧。動作快。"
10042030-157 = "[ns]「這，這是……！？」"
10042030-158 = "怎，怎麼會發生這種事……！"
10042030-159 = "各方面來說都很驚人呢。"
10042030-163 = "這樣一來，基本可以確定「那個」會隨著襲擊變得越來越巨大了。"
10042030-164 = "如果放任不管，整個格黑娜……"
10042030-165 = "可能會變得《惡靈骨堡》裡的「辣昆市」一樣。"
10042030-166 = "辣昆市……？"
10042030-170 = "[ns11]「辣昆市……？那是什麼？」\n[ns12]「難道你指的是那個……」"
10042030-171 = "……原來老師不知道嗎？"
10042030-172 = "那是一座因不明實驗而導致怪物橫行……"
10042030-173 = "……在某款遊戲裡的虛構城市。"
10042030-174 = "看來你知道呢，老師。"
10042030-175 = "那麼老師應該也能猜到，現在事態的走向意味著什麼才對。"
10042030-176 = "雖然現在說這些可能也為時已晚了。"
10042030-177 = "其實我以前就對這類的現象略有耳聞。#n而且那種怪異個體也不是第一次出現了。"
10042030-178 = "當然我確實沒料到這次的情況會如此精彩……更正，是驚人才對。"
10042030-179 = "咦！？你之前就有聽說過這種事嗎！？"
10042030-180 = "雖然僅僅只是傳言或怪談之類的東西……"
10042030-181 = "不過坊間的確有這樣的說法流傳──「供給部裡棲息著魔物」。"
10042030-182 = "什麼意思！我從來沒聽說過！"
10042030-183 = "我一向很注意這類的消息，所以記得特別清楚……"
10042030-184 = "從我的印象來看，目前的情況──"
10042030-185 = "似乎會比過往更加致命，同時規模也更加巨大。"
10042030-186 = "什麼！？"
10042030-187 = "[ns13]「大規模……！？」\n[ns14]「致命……！？」"
10042030-190 = "是的，否則也不會發生那麼有趣……"
10042030-191 = "……我是說那麼可怕的事情了。"
10042030-192 = "怎，怎麼會……！"
10042030-193 = "所以格黑娜的大家都是因為我才……！！"
10042030-194 = "……嗯？不，不是那樣的。#n其實整體來看，這並不是什麼大事。"
10042030-195 = "大家不過就是因為醬汁太難吃而失去意識而已。"
10042030-196 = "根據過往的統計資料，這種程度的意外大約兩三個月就會發生一次。"
10042030-197 = "跟溫泉開發部或其他恐怖組織的問題相比……實在是小巫見大巫。"
10042030-198 = "雖然是件好事，但我總覺得有點難過……！"
10042030-199 = "畢竟光是被拿來跟溫泉開發部比較，就代表事情非同小可了……"
10042030-200 = "……唉。"
10042030-201 = "沒辦法了。#n其實這個方法，我本來打算留到最後關頭再用的。"
10042030-202 = "[s15]「你有什麼方法嗎？」\n[s16]「最後關頭……？」"
10042030-205 = "應該說是……計畫吧。#n如果要換個說法的話，也可以稱之為[ruby=Broken Arrow]「斷箭」[/ruby]。"
10042030-206 = "不過……嗯，終究得解決問題才行。#n況且要是這件事傳到萬魔殿耳裡……"
10042030-207 = "到時候對我們風紀委員會來說……麻煩就更大了。"
10042030-209 = "格黑娜．風紀委員會部室"
10042030-212 = "有什麼事？#n我現在很忙，麻煩長話短說。"
10042030-217 = "……什麼？"
10042030-218 = "那是什麼意思……"

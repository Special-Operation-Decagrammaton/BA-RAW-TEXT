[translation]
10042030-1 = "ตอนที่ 3;อันตรายทางชีวภาพ"
10042030-3 = "เตรียมส่งตัวเรียบร้อยแล้วค่ะ หัวหน้า"
10042030-4 = "ทำได้ดีมากค่ะ"
10042030-5 = "เอ่อ... หัวหน้าคะ? ฉันไม่รู้ว่าควรบอกเรื่องนี้หรือเปล่า..."
10042030-6 = "แต่ที่คาเฟ่วันนี้... ฉันเหมือนจะเห็น... 'สิ่งนั้น' ที่หัวหน้าพูดถึงเลยค่ะ"
10042030-7 = "สิ่งนั้นเหรอ...?"
10042030-11 = "อ้อ... หมายถึงสัตว์ประหลาดตัวปัญหาสินะคะ"
10042030-12 = "?!"
10042030-13 = "(จะว่าไป ฉันจำคุณคนนั้นได้...!)"
10042030-14 = "ช่วยอธิบายสถานการณ์เพิ่มเติมหน่อยได้มั้ยคะ?"
10042030-15 = "ค่ะ ฉันไปคาเฟ่แพนเค้กกับเพื่อนแล้วสั่งเมนูนู่นนี่มากิน..."
10042030-16 = "แล้วจู่ๆ ก็มีตัวอะไรบางอย่างคล้ายแพนเค้กสีม่วงที่ราดเมือกสีเขียวออกมาค่ะ"
10042030-17 = "เขียวๆ กับม่วงๆ... อย่างนี้นี่เองสินะคะ"
10042030-18 = "มันเคลื่อนไหวรวดเร็วจนฉันสังเกตรายละเอียดไม่ได้ แต่พอมาย้อนคิดดู มันเหมือนจะมีบางอย่างคล้ายๆ หนวดด้วยค่ะ..."
10042030-19 = "โดยรวมแล้วเหมือนมันเที่ยวกระเด้งกระดอนไปตามอำเภอใจแล้วหายไปเฉยๆ ค่ะ"
10042030-20 = "แต่มันก็ดูแปลกๆ และแค่เห็นก็รู้สึกสะอิดสะเอียนแล้วค่ะ"
10042030-21 = "อย่างนั้นสินะคะ แล้วไม่รู้เหรอคะว่ามันหายตัวไปทางไหนหลังจากนั้น?"
10042030-22 = "ไม่รู้เลยค่ะ ฉันไม่คิดว่ามันจะเข้ามาถึงที่นี่เลยด้วยซ้ำค่ะ"
10042030-23 = "เข้าใจแล้วค่ะ ก่อนอื่นช่วยเคลื่อนย้ายศพ... ไม่สิ ส่งตัวผู้ป่วยแล้วคอยติดตามอาการอย่างละเอียดนะคะ"
10042030-24 = "ค่ะ หัวหน้า"
10042030-28 = "สถานการณ์ตอนนี้ เรามีเรื่องที่ไม่รู้มากกว่าเรื่องที่รู้แล้ว"
10042030-29 = "แต่ว่าฉันสรุปเรื่องหนึ่งอย่างแน่ชัดให้ได้ค่ะ"
10042030-30 = "ฉันปล่อยให้สถานการณ์เป็นอย่างนี้ต่อไปไม่ได้ค่ะ"
10042030-31 = "[s1] \"พูดเหมือนดอกเตอร์ในหนังไซไฟเลยนะ\"\n[s2] \"คนนี้คือ... ดอกเตอร์เซนะหรือเปล่า?\""
10042030-34 = "ดอกเตอร์เหรอคะ...?"
10042030-35 = "คำว่าดอกเตอร์มีหลายความหมาย แต่ในที่นี้คุณครูคงอยากบอกว่าเชื่อใจฉันสินะคะ"
10042030-36 = "ขอบคุณค่ะ ฉันจะรับคำชมไว้อย่างยินดีค่ะ"
10042030-37 = "นอกจากนี้ ส่วนตัวฉันรู้สึกสงสัยใคร่รู้เห็นเกี่ยวกับปรากฏการณ์นี้นิดหน่อยด้วยค่ะ"
10042030-38 = "อย่างน้อยมันก็น่าสนใจกว่าการโยนพวกอันธพาลเข้าไปในรถของชมรมหน่วยแพทย์ฉุกเฉินค่ะ"
10042030-39 = "ถ้าอย่างนั้น... คิดว่าจะทำยังไงเหรอคะ รุ่นพี่?"
10042030-40 = "ฉันจะตามร่องรอยนี้ไปค่ะ"
10042030-41 = "จะ... จะไม่เป็นไรเหรอคะ...? คณะกรรมการวินัยโดนซอสจนสลบไปคนหนึ่งแล้วนะคะ..."
10042030-42 = "ค่ะ ฉันว่ามันน่าสนุกดีค่ะ"
10042030-44 = "น่าสนุก...?"
10042030-45 = "นี่เป็นเรื่องน่าสนุกเหรอคะ..."
10042030-46 = "นั่นน่ะสิคะ ปกติแล้วฉันไม่ค่อยหยิบคำนั้นมาใช้เท่าไรเลย"
10042030-47 = "แต่ตอนนี้คงไม่มีคำอื่นที่จะอธิบายความรู้สึกของฉันได้ค่ะ"
10042030-48 = "[s3] \"แต่ว่าอิโอริก็โดนเล่นงานไปทั้งคนนะ...\"\n[s4] \"เราควรจริงจังให้มากกว่านี้หน่อยหรือเปล่า...\""
10042030-51 = "วางใจได้เลยค่ะ ฉันสนุก... ขอโทษค่ะ ฉันจริงจังพอตัวอยู่แล้วค่ะ"
10042030-52 = "(สรุปว่าก็ยังสนุกสินะ...)"
10042030-53 = "ถ้างั้นฉันจะเริ่มตามร่องรอยเดี๋ยวนี้ ฉันจะนำให้เองค่ะ"
10042030-56 = "[ns] \"เป็นภาพเหตุการณ์ที่... น่าทึ่งเลยนะ\""
10042030-57 = "เมือกสีเขียวเปรอะไปทั่วทางเดินเลย..."
10042030-58 = "ยิ่งออกมาก็เหมือนจะมีปริมาณมากขึ้นเลยนะคะ ฉันคิดไปเองหรือเปล่านะ?"
10042030-59 = "ไม่ได้คิดไปเองหรอกค่ะ ชินัตสึ มันมีมากขึ้นจริงๆ ค่ะ"
10042030-60 = "ถะ... ถ้างั้นจะเป็นยังไงเหรอคะ?! มันมี... ความหมายอื่นหรือเปล่าคะ??"
10042030-61 = "ตอนนี้เรายังสรุปอะไรไม่ได้ค่ะ จูริ เราต้องเดินหน้าต่อไปค่ะ"
10042030-62 = "แต่มันเริ่มน่าสนใจขึ้นเรื่อยๆ เลยนะคะ"
10042030-63 = "นี่มันไม่ใช่เรื่องที่จะใช้คำว่าน่าสนใจสักหน่อย..."
10042030-64 = "ฮะ... ฮือ..."
10042030-65 = "...! เสียงร้องเหรอ...?"
10042030-66 = "จริงด้วยค่ะ คงเป็นอีกศพ... ไม่สิ เป็นเหยื่ออีกคนน่ะค่ะ"
10042030-71 = "คะ... คุณเซนะ?! ไปด้วยกันสิคะ~!"
10042030-81 = "อะ... อึกกก..."
10042030-85 = "[ns] \"ปะ... เป็นยังไงบ้าง? เกิดอะไรขึ้นน่ะ!\""
10042030-86 = "ฉันอยู่ใน... ห้องเรียน... ทางด้านโน้น... แล้วก็ได้ยินเสียงอะไรแปลกๆ..."
10042030-87 = "ก็เลยคิดว่าจะออกไปดูสักหน่อย... แล้วก็..."
10042030-93 = "[ns5] \"ตกเป็นเหยื่อรายต่อไปสินะ...\"\n[ns6] \"นี่สินะคนที่ลางสังหรณ์ดี...\""
10042030-96 = "คุณครู พูดอะไรแบบนั้นคะ..."
10042030-97 = "นี่เป็นเรื่องราวที่ถูกกำหนดไว้แล้วค่ะ หรือไม่ก็เป็นคนที่ดวงสมพงษ์กับแพนเค้ก"
10042030-98 = "เคยรู้จักเรื่องแบบนี้มั้ยล่ะคะ...?"
10042030-99 = "ไม่รู้หรอก แต่เท่าที่รู้คือตอนนี้เธอไม่น่าจะจริงจังขนาดนั้นนะ"
10042030-100 = "เอ่อ ขอโทษด้วยนะคะ พอดีรุ่นพี่เป็นคนแบบนี้..."
10042030-101 = "ก่อนอื่นเลย เคสนี้มีส่วนคล้ายกับของอิโอริค่ะ ถ้าจะมีส่วนไหนที่แตกต่าง..."
10042030-102 = "ถ้าเปรียบเทียบกับตอนนั้นแล้ว ปริมาณเมือกของเคสนี้มากขึ้นเป็นสองเท่าเลยค่ะ"
10042030-104 = "สะ... สองเท่าเหรอคะ?"
10042030-105 = "ร่องรอยยังมีให้เห็นอยู่ทางโน้นด้วย"
10042030-106 = "ไปกันเถอะ ร่องรอยนั่นมุ่งหน้าไปที่ห้องเรียนค่ะ"
10042030-113 = "นะ... นี่มันอะไรกันเนี่ย??"
10042030-114 = "หวา..."
10042030-118 = "เมือกเหนียวหนืดขึ้นเยอะเลยค่ะ เหนียวพอที่จะยึดคนไว้กับกำแพงได้เลยนะคะ"
10042030-119 = "ปริมาณก็มากขึ้นด้วยค่ะ"
10042030-123 = "ฉันมีอย่างหนึ่งที่อยากตรวจสอบที่นี่ค่ะ ตอนแรกสัตว์ประหลาดตัวนั้นมีขนาดแค่ไหนเหรอคะ?"
10042030-124 = "คะ...? มะ... มันก็ ขนาดเท่าๆ กับแพนเค้กทั่วไปนะคะ...?"
10042030-125 = "งั้นเหรอคะ? ขนาดเท่าแพนเค้กทั่วไป เข้าใจแล้วค่ะ ถ้าอย่างนั้น ทุกคนคะ"
10042030-126 = "ทุกคนว่านี่เป็นซอสที่มาจากแพนเค้กขนาดทั่วไปมั้ยคะ?"
10042030-127 = "[s] \"ไม่น่าจะใช่นะ\""
10042030-128 = "ค่ะ ศพที่เจอตรงทางเดินเมื่อกี้นี้... ขอโทษค่ะ เหยื่อที่เราเจอโดนเมือกเยอะกว่าอิโอริมากเลยค่ะ"
10042030-129 = "ถ้างั้นตอนนี้เราก็สรุปได้อย่างหนึ่งว่า..."
10042030-130 = "'สิ่งนั้น' มันกำลังเติบโตขึ้นเรื่อยๆ ค่ะ"
10042030-131 = "!!!"
10042030-132 = "[ns7] \"ภายในเวลาสั้นๆ แค่นี้น่ะเหรอ...?\"\n[ns8] \"กฎทรงมวลไม่มีอยู่จริงงั้นเหรอ...?\""
10042030-135 = "..."
10042030-136 = "คุณครูคะ คิดว่าสถานการณ์นี้มันสมเหตุสมผลมาตั้งแต่แรกเหรอคะ?"
10042030-137 = "[s9] \"มะ... มันก็...\"\n[s10] \"เถียงไม่ออกเลยแฮะ...\""
10042030-140 = "ค่ะ ในสถานการณ์แบบนี้ การมองหาตรรกะเป็นเรื่องเสียเวลาเปล่าค่ะ"
10042030-141 = "นี่ไม่ใช่เรื่องที่ต้องไตร่ตรองเรื่องกฎเกณฑ์ หรือคิดตามสามัญสำนึกว่ามันจะเป็นอย่างนั้นด้วย"
10042030-142 = "สิ่งสำคัญคือการยอมรับว่าสิ่งที่เกิดขึ้นตามที่เป็นค่ะ"
10042030-143 = "หลังจากนั้นก็สังเกตด้วยความอยากรู้อยากเห็น... ไม่สิ ฉันหมายถึงติดตามและเตรียมพร้อมสำหรับสิ่งที่จะเกิดขึ้นหลังจากนั้นค่ะ"
10042030-147 = "!!!"
10042030-148 = "อยู่แถวๆ ห้องเรียนค่ะ รีบไปเถอะค่ะ"
10042030-157 = "[ns] \"นะ... นี่มัน...!?\""
10042030-158 = "กะ... เกิดเรื่องแบบนี้ได้ยังไง..."
10042030-159 = "น่าทึ่งในหลายๆ แง่เลยนะ"
10042030-163 = "ฉันมั่นใจแล้วค่ะ ยิ่งถูกโจมตี สัตว์ประหลาดตัวนั้นก็จะยิ่งตัวใหญ่ขึ้นค่ะ"
10042030-164 = "ขืนปล่อยไว้แบบนี้ อีกไม่นานเกเฮนน่าก็คง..."
10042030-165 = "ลงเอยเหมือน 'แรคคูนซิตี้' แน่ๆ เลยค่ะ"
10042030-166 = "แรคคูนซิตี้... งั้นเหรอคะ?"
10042030-170 = "[ns11] \"แรคคูนซิตี้...? มันคืออะไรเหรอ?\"\n[ns12] \"อ้อ... เมืองนั้นน่ะเหรอ...\""
10042030-171 = "ไม่รู้จักสินะคะ..."
10042030-172 = "มันคือเมืองที่เต็มไปด้วยสัตว์ประหลาดจากการทดลองปริศนา..."
10042030-173 = "เมืองที่อยู่ในเกมน่ะค่ะ..."
10042030-174 = "รู้จักอยู่แล้วสินะคะ คุณครู"
10042030-175 = "ถ้าอย่างนั้นคุณครูก็น่าจะคาดเดาความคืบหน้าของสถานการณ์ได้นะคะ"
10042030-176 = "ถึงตอนนี้จะไม่ใช่จังหวะเหมาะที่จะพูดเรื่องนี้"
10042030-177 = "แต่จริงๆ แล้วฉันเคยได้ยินเกี่ยวกับปรากฏการณ์นี้มาบ้างค่ะ นี่ไม่ใช่ครั้งแรกที่สัตว์ประหลาดแบบนั้นปรากฏตัวค่ะ"
10042030-178 = "แน่นอนว่าตอนแรกฉันก็ไม่ได้คิดว่ามันจะน่าสนใจขนาดนี้... ขอโทษค่ะ ฉันหมายถึงไม่คิดว่าจะเป็นเรื่องใหญ่ขนาดนี้น่ะค่ะ"
10042030-179 = "คะ?! รู้จักแพนเค้กนั่นอยู่แล้วเหรอคะ!?"
10042030-180 = "มันเป็นแค่ข่าวลือหรือเรื่องลี้ลับที่เล่ากันค่ะ"
10042030-181 = "ในหมู่นักเรียนจะลือกันว่า 'ในชมรมโภชนาการมีสัตว์ประหลาดอาศัยอยู่' น่ะค่ะ"
10042030-182 = "พูดเรื่องอะไรเนี่ย! ไปเอาข่าวลือแปลกๆ แบบนั้นมาจากไหน!"
10042030-183 = "ฉันเป็นคนประเภทที่มองข้ามข่าวแบบนี้ไปไม่ได้ ก็เลยยังจำได้อยู่ค่ะ..."
10042030-184 = "จากที่ฉันจำได้แล้ว ฉันคาดว่าสัตว์ประหลาดในตอนนี้..."
10042030-185 = "มีความร้ายแรงและอันตรายถึงชีวิตมากกว่าตอนปกติอีกค่ะ"
10042030-186 = "คะ?!"
10042030-187 = "[ns13] \"ร้ายแรงเลยเหรอ...!?\"\n[ns14] \"อันตรายถึงชีวิตเลยเหรอ...!?\""
10042030-190 = "ค่ะ ไม่งั้นก็คงไม่น่าสนุกถึงขนาดนี้..."
10042030-191 = "ฉันหมายถึง... ก็คงไม่ก่อเรื่องน่ากลัวไปทั่วแบบนี้ค่ะ"
10042030-192 = "ถะ... ถ้าอย่างนั้น...!"
10042030-193 = "นี่ฉันทำให้ทุกคนในเกเฮนน่าต้องเจอปัญหาใหญ่เหรอคะ...!!"
10042030-194 = "...? หืม? ไม่ค่ะ ไม่ถึงขนาดนั้นหรอกค่ะ จริงๆ แล้วถ้ามองโดยรวมก็ไม่มีอะไรมากหรอกค่ะ"
10042030-195 = "อย่างมากทุกคนก็แค่หมดสติไปเพราะซอสรสชาติไม่ได้เรื่องก็แค่นั้นค่ะ"
10042030-196 = "จากสถิติแล้ว เรื่องแบบนี้เกิดขึ้นในทุก 2-3 เดือนอยู่แล้วค่ะ ปัญหาแบบนี้น่ะ..."
10042030-197 = "ถ้าเทียบกับปัญหาของชมรมพัฒนาออนเซ็นหรือชมรมที่เอาแต่ก่อเรื่องแล้ว... มันยากที่จะมองว่าเป็นปัญหาใหญ่ค่ะ"
10042030-198 = "ฟังแล้วก็โล่งอกไปทีนะคะ แต่สำหรับฉันมันเป็นเรื่องน่าเศร้ายังไงก็ไม่รู้ค่ะ~!"
10042030-199 = "ถ้าเทียบกับเรื่องของชมรมพัฒนาออนเซ็นแล้วก็ไม่มีอะไรมาเปรียบได้หรอกค่ะ..."
10042030-200 = "เฮ้อ..."
10042030-201 = "งั้นก็คงช่วยไม่ได้นะคะ ฉันว่าจะเก็บวิธีนี้ไว้ใช้ในตอนสุดท้ายของท้ายสุดแล้วเชียว"
10042030-202 = "[s15] \"มีวิธีอะไรดีๆ เหรอ?\"\n[s16] \"ตอนสุดท้ายของท้ายสุดงั้นเหรอ...?\""
10042030-205 = "เรียกว่า... เป็นแผนการแล้วกันค่ะ หรือเรียกอีกอย่างว่าเป็นคำสั่งโบรคเค่นแอร์โร่วก็ได้ค่ะ"
10042030-206 = "แต่ก็... ค่ะ ยังไงเราก็ต้องคลี่คลายสถานการณ์นี้คะ ยิ่งไปกว่านั้น ถ้าเรื่องนี้ไปถึงหูของแพนเดโมเนียม โซไซตี้ละก็..."
10042030-207 = "ตอนนั้นคงเป็น... ปัญหาระดับชาติของคณะกรรมการวินัยเลยละค่ะ"
10042030-209 = "ห้องคณะกรรมการวินัยเกเฮนน่า"
10042030-212 = "ค่ะ มีเรื่องอะไรเหรอคะ? ตอนนี้ฉันกำลังยุ่ง ช่วยเข้าเรื่องเลยได้มั้ยคะ"
10042030-217 = "คะ...?"
10042030-218 = "เดี๋ยวนะคะ มันเรื่องอะไรกัน..."

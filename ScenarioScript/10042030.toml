[translation]
10042030-1 = "Episode 3;Biohazard"
10042030-3 = "We're ready for transport, President."
10042030-4 = "Good work."
10042030-5 = "Um...President? I don't know if I should say this, but..."
10042030-6 = "I think I saw...the \"thing\" you mentioned...in the cafe today."
10042030-7 = "The thing...?"
10042030-11 = "...Ah, you mean the odd monstrosity in question."
10042030-12 = "?!"
10042030-13 = "(Wait a minute, I know that person...!)"
10042030-14 = "Could you tell us more about that?"
10042030-15 = "Sure. I was ordering some things from the Pancake Cafe with a friend..."
10042030-16 = "And suddenly, a purple pancake-looking thing appeared, all covered in green mucus."
10042030-17 = "Green and purple... I see."
10042030-18 = "It moved so fast I couldn't get a close look, but now that I try to remember, I think it had what looked like tentacles... Anyway."
10042030-19 = "It went squirming all over the place, and then it just took off."
10042030-20 = "It was weird...and I didn't like it."
10042030-21 = "I see. Any idea where it might have gone afterwards?"
10042030-22 = "Not a clue. I don't know where it even came from."
10042030-23 = "Understood. First, we should move the body, I mean \"the injured,\" and keep an eye on her condition."
10042030-24 = "Yes, President."
10042030-28 = "Well, we certainly have more questions than we do answers."
10042030-29 = "But there's one thing we can be certain of."
10042030-30 = "I can no longer stand idly by."
10042030-31 = "[s1] \"You sound like a doctor in a sci-fi film.\" \n[s2] \"...ARE you a doctor or something?\""
10042030-34 = "Doctor...?"
10042030-35 = "The word \"doctor\" can mean many different things, but I suspect you meant it as a way to say you trust my judgement."
10042030-36 = "Thank you for the compliment."
10042030-37 = "Besides that, my own curiosity is in play here."
10042030-38 = "And this is far more interesting than tossing thugs into Medical Emergency Club vehicles."
10042030-39 = "So, then...what do you plan to do now?"
10042030-40 = "I'll simply follow the clues we have so far."
10042030-41 = "A-Are you sure...? We're already one woman down..."
10042030-42 = "True, but I think this will be fun regardless."
10042030-44 = "Fun...?"
10042030-45 = "Can you truly call ANY of this fun...?"
10042030-46 = "That's a fair question. Honestly, I don't call many things fun."
10042030-47 = "But I can think of no better word to describe what I'm feeling in the moment."
10042030-48 = "[s3] \"Even after what happened to Iori...\"\n[s4] \"Maybe we should take things a little more seriously...?\""
10042030-51 = "No need to worry. I'm already having plenty of fun, I mean, I'm already taking things seriously."
10042030-52 = "(What part...?)"
10042030-53 = "Let's start searching. I'll take point."
10042030-56 = "[ns] \"This looks...kind of like a lot.\""
10042030-57 = "There's more of that green mucus all over the hallway..."
10042030-58 = "And more OF it the farther we go down."
10042030-59 = "You're right, Chinatsu. The mass is certainly increasing."
10042030-60 = "Wh-What does that mean? What does that mean?!"
10042030-61 = "There's no way to know yet, Juri. We just keep moving forward."
10042030-62 = "And see just how interesting it gets."
10042030-63 = "I don't think \"interesting\" is the right word either..."
10042030-64 = "Ugh... Ah..."
10042030-65 = "...! Did you hear that...?"
10042030-66 = "I did. The next body, I mean \"clue,\" I mean \"victim\" must be close."
10042030-71 = "S-Sena?! Let me go with you!"
10042030-81 = "Ugh, augh..."
10042030-85 = "[ns] \"A-Are you okay? What happened?!\""
10042030-86 = "That...classroom over there... I heard something...weird..."
10042030-87 = "I just wanted to check it out. I didn't think... Ugh..."
10042030-93 = "[ns5] \"That's a textbook plot point...\"\n[ns6] \"That's some very strong foreshadowing.\""
10042030-96 = "Why are you still talking like that, Sensei? What do you mean?"
10042030-97 = "It's a reference to the natural order of things. Others might call it a cliche."
10042030-98 = "...Do you get it now?"
10042030-99 = "I get that you're not serious, not even a little bit."
10042030-100 = "...I should apologize for her. She's always been a bit...like this."
10042030-101 = "Well, for now, this matches what happened to Iori. With one key difference..."
10042030-102 = "There's easily double the amount of mucus here."
10042030-104 = "D-Double?"
10042030-105 = "The trail's going that way."
10042030-106 = "Into the classroom. Let's go."
10042030-113 = "Wh-What IS this?!"
10042030-114 = "Whoa..."
10042030-118 = "The mucus is thicker than ever. Enough to stick someone to a wall."
10042030-119 = "And there's more and more of it."
10042030-123 = "Let me confirm one thing here. Just how big was the creature when you first saw it?"
10042030-124 = "Huh...? Well, a-about the size of a normal pancake..."
10042030-125 = "The size of a pancake. I see. Then let me ask everyone..."
10042030-126 = "...does that amount of syrup look like it came from a normal pancake?"
10042030-127 = "[s] \"I certainly wouldn't assume so.\""
10042030-128 = "Right. The body, I mean \"case,\" I mean \"victim\" we found in the hallway was covered in more syrup than Iori was."
10042030-129 = "In other words, there's only one possibility here."
10042030-130 = "...This \"thing\" is getting bigger."
10042030-131 = "*gasp*"
10042030-132 = "[ns7] \"In that short of a time span...?\"\n[ns8] \"What about the law of the conservation of mass...?\""
10042030-135 = "..."
10042030-136 = "Sensei, were you expecting any of this to make sense?"
10042030-137 = "[s9] \"W-Well...\"\n[s10] \"I can't really say anything there...\""
10042030-140 = "Exactly. In these situations, looking for logic is a waste of time."
10042030-141 = "Just take your common sense, take everything you know about science, and put it away."
10042030-142 = "What's important is that we accept what's happening here."
10042030-143 = "Then we can anticipate what'll happen next, with glee...I mean, with proper preparations."
10042030-147 = "*gasp*"
10042030-148 = "Near the classroom. We should hurry."
10042030-157 = "[ns] \"Th-This is...?!\""
10042030-158 = "H-How could something like this happen...?"
10042030-159 = "It's impressive in more ways than one."
10042030-163 = "Well, this confirms it. The thing IS getting bigger, with each attack."
10042030-164 = "If left unchecked, the whole of Gehenna might..."
10042030-165 = "...it might end up like that \"City of Raccoons\" I heard about."
10042030-166 = "City...of Raccoons?"
10042030-170 = "[ns11] \"City of Raccoons...? What is that?\"\n[ns12] \"...Wait, are you talking about...?\""
10042030-171 = "...Maybe not everyone's heard of it."
10042030-172 = "It's the name of a city where a strange experiment broke loose and covered the city in monsters..."
10042030-173 = "...from a video game."
10042030-174 = "Ah, so you know, Sensei."
10042030-175 = "Then I'm sure you know what this plot point represents."
10042030-176 = "Though it seems a bit out of sequence from its usual pattern..."
10042030-177 = "I have heard a little about this sort of phenomena. This isn't the first time an entity appeared in this manner."
10042030-178 = "Of course I never thought it would be quite this intriguing...excuse me, this immense."
10042030-179 = "What?! Y-You knew? About all of this?!"
10042030-180 = "Nothing more than rumors in passing. Ghost stories, urban legends..."
10042030-181 = "...you know, \"I heard there's a monster in the School Lunch Club!\" or some such thing."
10042030-182 = "What are you even talking about?!"
10042030-183 = "Well, I try to make a point of following up on every rumor I hear."
10042030-184 = "So based on what I remember hearing, this situation is..."
10042030-185 = "...well, much more critical and large-scale than it was when it began."
10042030-186 = "What?!"
10042030-187 = "[ns13] \"Large-scale...?!\"\n[ns14] \"Critical...?!\""
10042030-190 = "Well, otherwise, it wouldn't be so interesting..."
10042030-191 = "...I mean terrifying."
10042030-192 = "B-But...!"
10042030-193 = "But that means everyone in Gehenna is in danger because of me...!"
10042030-194 = "...? Hm? No, not at all. From a broader perspective, it's really only a minor bump in the road."
10042030-195 = "So there's a nasty syrup that makes people pass out."
10042030-196 = "Statistically, something of this magnitude happens once or twice every few months."
10042030-197 = "Compared to what we might see from the Hot Springs Department, or from terrorist organizations...this really isn't much."
10042030-198 = "Well, I'm glad YOU think so, but it's still a problem!"
10042030-199 = "Nothing compares to what we see in the Hot Springs Department. That's in a category by itself."
10042030-200 = "*sigh*"
10042030-201 = "All right. So it's come to this...here at the end of the end..."
10042030-202 = "[s15] \"Do you have some secret solution?\"\n[s16] \"End of the end...?\""
10042030-205 = "A plan...of sorts. Call it Broken Arrow."
10042030-206 = "And yes. It will solve this predicament. Preferably before the Pandemonium Society hears of it."
10042030-207 = "If they DID hear of it, that would cause quite a dust-up for the Prefect Team."
10042030-209 = "Gehenna Prefect Team Room"
10042030-212 = "Yes, how can I help you? I'm quite busy, so please keep it short."
10042030-217 = "...Excuse me?"
10042030-218 = "What in the world are you...?"

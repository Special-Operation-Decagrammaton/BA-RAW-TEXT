[translation]
2004605-1 = "Rage Overturns the Heavens and Earth"
2004605-6 = "Niya didn't send any further replies."
2004605-7 = "I couldn't keep waiting, so I decided to head to the address she last sent."
2004605-9 = "I heard the Mouryos were causing trouble again."
2004605-10 = "We've already got our hands full! What's their problem now?!"
2004605-11 = "I don't know. They're demanding money all of a sudden..."
2004605-12 = "What are they, trying to rob us? I thought they liked festivals, at least..."
2004605-14 = "I walked down the ever-more-chaotic street."
2004605-16 = "Waaah! Why doesn't anybody want to change club rooms with us?"
2004605-17 = "Well, between being out in the middle of nowhere and all those ghost stories..."
2004605-18 = "We actually did get a couple of offers, but their rooms were too small to put up our origami works."
2004605-19 = "We're screwed! Our club won't have anyplace to do anything. We'll have to disband! Waaah!"
2004605-20 = "Stop crying! You're going to make ME cry next!"
2004605-22 = "Past the students lamenting their club issues..."
2004605-24 = "I see, I see... Hmm. A lot's happened while I stepped out."
2004605-25 = "What do you mean, \"What did I expect?\""
2004605-26 = "Nyaha, it's not like I can see the future, Sensei. Come on."
2004605-30 = "Fufu... Okay, you want the truth?"
2004605-31 = "Yeah. That whole misunderstanding between Mouryo and the merchant guild...if I'd set up a meeting between them, they PROBABLY could have avoided that."
2004605-32 = "And I already know a few clubs that might be willing to switch with the Origami Club."
2004605-33 = "Those are solvable problems, I know."
2004605-34 = "But I don't get involved, and I already told you why."
2004605-35 = "The Yin-Yang Club is all about protecting harmony. If we start playing favorites, that's not harmonious."
2004605-36 = "Plus, you know..."
2004605-37 = "...it's more fun to have some commotion around, don't you think?"
2004605-38 = "[s] \"...Speaking of, you said there was some big problem?\""
2004605-39 = "Ah, about that..."
2004605-40 = "...my problem is it's hard to keep coming up with excuses. But you make that a whole lot easier, Sensei."
2004605-44 = "..."
2004605-45 = "[ns] \"Niya, sit down and straighten up.\""
2004605-46 = "Huh?"
2004605-47 = "[ns] \"You're about to get scolded.\""
2004605-50 = "― [log=니야]N-Nyahaha...[/log][wa:1260] "
2004605-51 = "― [log=니야]Um, Sensei?[/log][wa:2990] "
2004605-54 = "― [log=니야]Oh wow, that's a scary face...[/log][wa:550] "
2004605-55 = "― [log=니야]It doesn't suit you, you know?[/log][wa:1180] "
2004605-58 = "― [log=니야]...Are you actually angry?[/log][wa:3150] "
2004605-61 = "― [log=니야]I mean, well,[/log][wa:330] "
2004605-62 = "― [log=니야]I can already tell but, aha...[/log][wa:2970] "
2004605-65 = "― [log=니야]So, um...[/log][wa:3710] "
2004605-66 = "― [log=니야]Yeah, I... I apologize...[/log][wa:890] "
2004605-69 = "― [log=니야]But still, how should I put this...?[/log][wa:80] "
2004605-70 = "― [log=니야]We all have our reasons for what we do... [/log][wa:3520] "
2004605-73 = "― [log=니야]Eh?! No, no![/log][wa:1520] "
2004605-76 = "― [log=니야]I'm not making excuses![/log]"
2004605-77 = "― [log=니야]I'm self-reflecting! Uh-huh, uh-huh![/log][wa:1750] "
2004605-80 = "― [log=니야]Yeah... I'm totally self-reflecting right now.[/log][wa:1230] "
2004605-81 = "― [log=니야]So, how about you forgive me this one time? [/log][wa:3270] "
2004605-84 = "...I gave her a long lecture."

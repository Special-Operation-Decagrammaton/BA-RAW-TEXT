[translation]
2004605-1 = "盛怒之下翻覆天地"
2004605-6 = "（然而仁耶始終沒有回覆）"
2004605-7 = "（由於實在無法繼續坐視不管，決定前往他最後傳來的地址）"
2004605-9 = "聽說妖怪劇團那群傢伙又在鬧事了。"
2004605-10 = "都已經忙得要死了還搞這種事！他們到底想怎樣啊！"
2004605-11 = "我也不曉得，好像是突然說要我們拿錢出來……"
2004605-12 = "這樣跟強盜有什麼兩樣？#n雖然他們確實是問題兒童，但我本來還以為他們只是喜歡祭典而已……"
2004605-14 = "（穿過比之前更混亂的街道……）"
2004605-16 = "嗚哇啊～為什麼沒有人願意把部室換給我們啦！"
2004605-17 = "誰叫我們的部室不只偏僻，還有鬧鬼的傳聞……"
2004605-18 = "好不容易有人願意換，結果他們的部室又小到根本放不下我們的紙藝作品……"
2004605-19 = "完蛋了～這樣下去社團活動也沒辦法繼續，最後只能廢部了……！"
2004605-20 = "你不要哭啦！這樣會害我也想哭耶！"
2004605-22 = "（走過正為社團問題煩惱的學生們身邊……）"
2004605-24 = "哎呀哎呀……我不在的時候，竟然發生了這些事呀～"
2004605-25 = "嗯？問我是不是早就預料到了？"
2004605-26 = "喵哈～老師您也太高估我了吧。#n我可沒有能夠預知未來的能力唷～"
2004605-30 = "呵呵……還是別說這種一戳即破的謊話了吧？"
2004605-31 = "確實，如果我稍～微安排一下的話，商會和妖怪劇團之間的誤會應該就不會發生……"
2004605-32 = "能與摺紙部交換部室的社團，我也多少有點頭緒……"
2004605-33 = "沒錯～大部分的問題我三兩下就能解決。"
2004605-34 = "至於為何要放著不管……理由就和之前說的一樣。"
2004605-35 = "陰陽部的職責是維持平衡。#n如果偏袒任何一方的話，平衡就會遭到破壞。"
2004605-36 = "而且最重要的是～"
2004605-37 = "偶爾有點騷動不是更有趣嗎～？"
2004605-38 = "[s] 「……所以你之前說的大事是什麼？」"
2004605-39 = "啊，您是說那個啊。"
2004605-40 = "只是個藉口哦～#n多虧老師願意配合，我也輕鬆了不少呢～"
2004605-44 = "……"
2004605-45 = "[ns] 「仁耶同學，麻煩你正坐。」"
2004605-46 = "咦？"
2004605-47 = "[ns] 「因為我要開始說教了。」"
2004605-50 = "― [log=니야]喵，喵哈哈……[/log][wa:1460] "
2004605-51 = "― [log=니야]哈囉哈囉～老師～？[/log][wa:3070] "
2004605-54 = "― [log=니야]哎呀哎呀，這可怕的表情……[/log][wa:1230] "
2004605-55 = "― [log=니야]並不適合老師唷？[/log][wa:2060] "
2004605-58 = "― [log=니야]難道說……您真的生氣了～？[/log][wa:3670] "
2004605-61 = "― [log=니야]不是，呃……[/log][wa:610] "
2004605-62 = "― [log=니야]我其實也知道……喵哈……[/log][wa:3690] "
2004605-65 = "― [log=니야]那個……是……[/log][wa:3790] "
2004605-66 = "― [log=니야]……我很抱歉。[/log][wa:1610] "
2004605-69 = "― [log=니야]不過您想想看，該怎麼說呢～[/log][wa:1000] "
2004605-70 = "― [log=니야]我也是有苦衷的嘛～？[/log][wa:4800] "
2004605-73 = "― [log=니야]喵哈！？沒有沒有！[/log][wa:1640] "
2004605-76 = "― [log=니야]怎麼會呢！[/log]"
2004605-77 = "― [log=니야]我當然有在反省！真的！[/log][wa:2750] "
2004605-80 = "― [log=니야]沒錯……我正誠心地反省……[/log][wa:2550] "
2004605-81 = "― [log=니야]能請您，原諒我嗎？[/log][wa:4670] "
2004605-84 = "（……就這樣說教了好一段時間）"

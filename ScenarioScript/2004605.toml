[translation]
2004605-1 = "โกรธาพลิกนภาคว่ำปฐพี"
2004605-6 = "(นิยะไม่ยอมตอบข้อความเสียที)"
2004605-7 = "(คุณครูรอต่อไม่ไหว จึงตัดสินใจไปหานิยะตามตำแหน่งที่เธอส่งมาให้)"
2004605-9 = "ได้ยินว่าพวกปีศาจมาก่อเรื่องกันอีกแล้ว"
2004605-10 = "แค่นี้ฉันก็มีเรื่องยุ่งจนหัวหมุนแล้วนะ! พวกนั้นมีปัญหาอะไรอีก!"
2004605-11 = "ไม่รู้สิ จู่ๆ ก็มาบอกให้จ่ายเงินให้..."
2004605-12 = "ทำตัวเป็นโจรจี้ปล้นไปได้ ถึงจะได้ชื่อว่าเป็นเด็กที่ชอบก่อปัญหา แต่ฉันคิดว่าก็ชอบงานเทศกาลกัน#nเสียอีก..."
2004605-14 = "(คุณครูเดินผ่านถนนที่เอะอะวุ่นวายกว่าปกติ...)"
2004605-16 = "เฮ้อ~ ทำไมไม่มีใครช่วยเปลี่ยนห้องชมรมให้เลยล่ะ?"
2004605-17 = "ห้องชมรมของเราอยู่ไกลมาก แถมยังมีข่าวลือว่ามีผีออกมาด้วย..."
2004605-18 = "ส่วนบางชมรมที่บอกว่าจะเปลี่ยนให้ ห้องชมรมก็เล็กและไม่มีที่วางงานพับกระดาษอีก..."
2004605-19 = "จบเห่แล้วละ~ พวกเราคงทำกิจกรรมของชมรมกันไม่ได้ แล้วก็ต้องถูกยุบชมรมแน่ๆ...!"
2004605-20 = "อย่าร้องไห้สิ! ถ้าเธอร้อง ฉันก็จะร้องไปด้วยนะ!"
2004605-22 = "(และเดินผ่านกลุ่มนักเรียนที่กำลังประสบปัญหาเรื่องชมรม...)"
2004605-24 = "โอ้โห... เกิดเรื่องพวกนี้ระหว่างที่ฉันไม่อยู่สินะคะ~"
2004605-25 = "คะ? สงสัยว่าฉันคาดการณ์ไว้บ้างหรือเปล่างั้นเหรอคะ?"
2004605-26 = "อะฮ่า~ คุณครูก็ประเมินฉันสูงเกินไปนะคะ ฉันไม่มีญาณหยั่งรู้อนาคตหรอกค่ะ~"
2004605-30 = "ฮุฮุ... ก็ได้ค่ะ ฉันไม่โกหกแล้วก็ได้"
2004605-31 = "ก็~ ถ้าฉันแอบๆ~ จัดแจงช่วยเหลืออะไรละก็ กลุ่มการค้ากับปีศาจก็คงไม่เกิดเรื่องเข้าใจผิดต่อกัน..."
2004605-32 = "ส่วนชมรมที่พอจะเปลี่ยนห้องกับชมรมพับกระดาษโอริกามิได้ ฉันก็พอรู้อยู่บ้าง..."
2004605-33 = "นั่นสินะคะ~ ปัญหาส่วนใหญ่มันก็แก้จากฉันได้เลยนี่นา~"
2004605-34 = "แต่ถ้าถามว่าทำไมฉันถึงเมินเฉย... ฉันก็คงต้องตอบเหมือนคราวที่แล้วค่ะ"
2004605-35 = "ชมรมหยินหยางมีบทบาทในการรักษาสมดุล ถ้าพวกเราไปเข้าข้างใคร ความสมดุลก็จะพังทลายค่ะ"
2004605-36 = "และสิ่งที่สำคัญที่สุด~"
2004605-37 = "พอมีเรื่องวุ่นวายนิดๆ หน่อยๆ มันก็น่าสนุกดีไม่ใช่เหรอคะ~?"
2004605-38 = "[s] \"แล้วปัญหาใหญ่ที่บอกเมื่อกี้คืออะไร...?\""
2004605-39 = "อ้อ เรื่องนั้นน่ะเหรอคะ"
2004605-40 = "ฉันก็กุเรื่องไปเรื่อยน่ะค่ะ~ แต่โชคดีนะคะที่คุณครูเชื่อฉันก็ทุกครั้งเลย~"
2004605-44 = "......"
2004605-45 = "[ns] \"นิยะ ลงไปนั่งตัวตรงเดี๋ยวนี้\""
2004605-46 = "คะ?"
2004605-47 = "[ns] \"ครูจะปรับทัศนคติให้ชุดใหญ่เลย\""
2004605-50 = "― [log=니야]อะ... อะฮะฮ่า...[/log][wa:1100] "
2004605-51 = "― [log=니야]เอ่อ~ นี่~ คุณครูขา~?[/log][wa:2590] "
2004605-54 = "― [log=니야]โอ๊ะๆ ดูทำหน้าน่ากลัวเข้าสิ...[/log][wa:550] "
2004605-55 = "― [log=니야]แบบนี้ไม่เหมาะกับคุณครูหรอกนะคะ[/log][wa:1140] "
2004605-58 = "― [log=니야]หรือว่า... โกรธกันจริงๆ เหรอคะ~?[/log][wa:2910] "
2004605-61 = "― [log=니야]ไม่สิ... ก็นะ[/log][wa:330] "
2004605-62 = "― [log=니야]ต่อให้ไม่ต้องถามก็ดูออกค่ะ อะฮ่า...[/log][wa:2770] "
2004605-65 = "― [log=니야]เรื่องนั้นน่ะ ฉัน~ [/log][wa:3310] "
2004605-66 = "― [log=니야]ค่ะ~ ค่า~ ขอโทษค่ะ...[/log][wa:1050] "
2004605-69 = "― [log=니야]แต่ว่า~ จะว่ายังไงดีล่ะ~[/log][wa:560] "
2004605-70 = "― [log=니야]พวกฉันก็มีเหตุผลส่วนตัวเหมือนกัน~ [/log][wa:3840] "
2004605-73 = "― [log=니야]อะฮ่า?! ไม่ค่ะ ไม่เลย![/log][wa:1120] "
2004605-76 = "― [log=니야]ไม่ใช่อย่างนั้นเลยนะคะ![/log]"
2004605-77 = "― [log=니야]ฉันกำลังสำนึกผิดอยู่ค่ะ! ค่ะ! ค่ะ![/log][wa:1830] "
2004605-80 = "― [log=니야]ค่ะ... ฉันกำลังสำนึกผิดอยู่จริงๆ...[/log][wa:1670] "
2004605-81 = "― [log=니야]ถ้างั้นก็ยกโทษให้สักครั้งไม่ได้เหรอคะ...? [/log][wa:3350] "
2004605-84 = "(แล้วคุณครูก็ดุนิยะอยู่พักใหญ่...)"

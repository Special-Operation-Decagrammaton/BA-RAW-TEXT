[translation]
1003805-1 = "SRT，保護！"
1003805-2 = "兔寶寶公園"
1003805-3 = "雖然大家都說兔子喜歡紅蘿蔔，不過給年紀還小的兔子吃紅蘿蔔好像不太好。"
1003805-4 = "因為蹦蹦出生還不到6個月，所以就先收集了這附近的苜蓿代替紅蘿蔔給牠吃了。"
1003805-5 = "……？啊，是的。已經決定叫牠「蹦蹦」了。"
1003805-6 = "我認為這是個很適合、很棒的名字。"
1003805-7 = "蹦蹦，蹦蹦……真是個好名字。"
1003805-8 = "蹦蹦真的是個很聰明的孩子，#n當我們結束作戰回來時，牠馬上就會注意到並出來迎接我們。"
1003805-9 = "不過最近因為作戰的關係，蹦蹦常常自己孤零零的，讓我有點擔心。"
1003805-10 = "[s] 「是不是再多養一隻比較好？」"
1003805-11 = "不。雖然有兔子會因為寂寞而衰弱的傳聞，#n不過兔子其實是種很怕生的動物，要和其他的兔子們好好相處似乎不太容易。"
1003805-12 = "如果再多養一隻兔子的話，肯定會產生更多困擾的吧。"
1003805-13 = "就像遇見老師前的RABBIT小隊一樣……"
1003805-14 = "……不，沒什麼。"
1003805-15 = "其實最大的問題是，最近RABBIT小隊的隊員們盯上了蹦蹦。"
1003805-16 = "是因為最近RABBIT小隊的糧食沒什麼餘裕嗎……#n隊員們看著蹦蹦的視線有時有點奇怪……"
1003805-17 = "老師，我不在的時候可以請老師幫我照顧這個孩子嗎？"
1003805-19 = "（之後，和都子一起照顧完兔子後，回到了夏萊）"

[translation]
1003805-1 = "SRT ปฏิบัติการคุ้มกัน!"
1003805-2 = "โคะอุซางิ การ์เด้น"
1003805-3 = "เป็นที่รู้กันโดยทั่วไปว่าอาหารที่กระต่ายชอบก็คือแคร์รอต แต่ได้ยินว่ากระต่ายพันธุ์นี้ไม่ชอบแคร์รอตค่ะ"
1003805-4 = "เปียงโกะยังเป็นลูกกระต่ายที่อายุยังไม่ถึงหกเดือน ตอนนี้ฉันเลยไปเก็บต้นหญ้าโคลเวอร์ที่เป็นอาหาร#nกระต่ายมาให้น้องกินแทนแคร์รอตค่ะ"
1003805-5 = "ถามว่าฉันตัดสินใจใช้ชื่อนั้นแล้วงั้นเหรอคะ?"
1003805-6 = "ค่ะ เป็นชื่อที่เหมาะกับเด็กคนนี้ดีใช่ไหมล่ะคะ?"
1003805-7 = "เปียงโกะ เปียงโกะ... เป็นชื่อที่ดีมากๆ เลยค่ะ"
1003805-8 = "เปียงโกะเป็นกระต่ายที่ฉลาดมากๆ ทุกครั้งที่ฉันกลับมาจากปฏิบัติการ ก็จะออกมารอก่อนเสมอเลยค่ะ"
1003805-9 = "แต่ว่าช่วงนี้ ฉันต้องออกปฏิบัติการบ่อยๆ เลยต้องปล่อยให้เปียงโกะอยู่คนเดียว เลยกังวล#nนิดหน่อยค่ะ"
1003805-10 = "[s] \"รู้อย่างนี้ซื้อมาอีกตัวก็คงดีนะ...\""
1003805-11 = "ไม่หรอกค่ะ ถึงจะเป็นเรื่องจริงที่ถ้ากระต่ายเหงามากๆ ก็อาจจะเฉาตายได้ แต่ได้ยินว่าที่จริงแล้ว#nกระต่ายเป็นสัตว์ที่ขี้อายมากๆ เลยจะสนิทกันยากค่ะ"
1003805-12 = "และฉันคิดว่าถ้าเลี้ยงกระต่ายเพิ่มอีกตัวหนึ่งก็อาจจะลำบากขึ้นในหลายๆ เรื่องค่ะ"
1003805-13 = "เหมือนกับกลุ่มกองทหาร RABBIT ก่อนที่จะได้พบกับคุณครู..."
1003805-14 = "อ๊ะ เปล่าค่ะ ไม่มีอะไรหรอกค่ะ"
1003805-15 = "ที่จริงปัญหาใหญ่ที่สุดก็คือช่วงนี้สมาชิกคนอื่นๆ ของกองทหาร RABBIT เริ่มให้ความสนใจเปียงโกะ#nมากขึ้นค่ะ..."
1003805-16 = "เนื่องจากกองทหาร RABBIT ของเรามีอาหารอยู่จำกัด... ช่วงนี้โมเอะกับซากิเลยมักจะมองเปียงโกะ#nด้วยสายตาแปลกๆ อยู่บ่อยๆ ค่ะ"
1003805-17 = "คุณครูคะ ตอนที่ฉันไม่อยู่ช่วยดูแลเด็กคนนี้ให้หน่อยได้ไหมคะ?"
1003805-19 = "(หลังจากนั้น คุณครูก็ช่วยมิยาโกะดูแลกระต่ายก่อนจะกลับไปที่ชาเล่ต์)"

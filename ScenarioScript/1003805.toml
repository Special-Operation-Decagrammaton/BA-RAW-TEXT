[translation]
1003805-1 = "SRT, Protect!"
1003805-2 = "Kousagi Park"
1003805-3 = "In popular media, rabbits are portrayed as liking carrots. But they actually aren't very good for them, especially when they're young."
1003805-4 = "Bun Bun is still less than six months, so I've been feeding her white clovers."
1003805-5 = "...Is that her name?"
1003805-6 = "Yes! Don't you think it's perfect?"
1003805-7 = "Bun Bun... Heehee. How cute."
1003805-8 = "And she's very smart! Bun Bun even recognizes and greets me when I return from missions."
1003805-9 = "I feel guilty for leaving her alone every time I go on a mission though..."
1003805-10 = "[s] \"Maybe we should've gotten two rabbits?\""
1003805-11 = "I don't think so. A lot of people say rabbits will die if they're lonely but, in fact, they're very particular and shy. It takes a lot for them to bond with another rabbit."
1003805-12 = "The situation could get even worse."
1003805-13 = "Kind of like how the RABBIT Squad was having trouble getting along before you came, Sensei..."
1003805-14 = "Ah. Please forget I said that."
1003805-15 = "Speaking of the RABBIT Squad, they're actually my biggest problem right now."
1003805-16 = "We never have enough food...and sometimes Saki and Moe look at Bun Bun like she's their next meal."
1003805-17 = "Sensei, would you mind keeping an eye on her during my next mission?"
1003805-19 = "I agreed and spent more time with Miyako and Bun Bun before returning to Schale."

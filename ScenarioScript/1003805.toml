[translation]
1003805-1 = "#title;SRT, 보호합니다!"
1003805-2 = "#place;코우사기 공원"
1003805-3 = "3;미야코;02;토끼는 일반적으로 당근을 좋아한다고 알려져 있지만, 어린 토끼에게 당근은 좋지 않다고 하네요.\n#3;a\n#3;em;…"
1003805-4 = "3;미야코;03;깡총이는 아직 생후 6개월이 지나지 않은 어린 토끼라, 당근 대신 주변의 토끼풀을 모아서 먹이고 있답니다."
1003805-5 = "3;미야코;02;……그 이름으로 정했느냐고요?\n#3;em;[?]"
1003805-6 = "3;미야코;03;예, 이 아이에게 정말 잘 어울리는 이름이지 않나요?\n#3;greeting"
1003805-7 = "3;미야코;07;깡총이, 깡총이…… 정말 좋은 이름이에요.\n#3;em;[반짝]"
1003805-8 = "3;미야코;03;깡총이는 정말 영리한 토끼라, 작전을 다녀올 때면 저를 알아보고 먼저 마중을 나오곤 한답니다."
1003805-9 = "3;미야코;06;다만 요새는 작전으로 인해 깡총이를 홀로 남겨두는 일이 많아 조금 걱정이네요.\n#3;em;[속상함]"
1003805-10 = "[s] \"이럴 줄 알았으면 토끼를 하나 더 들여올 걸 그랬나?\""
1003805-11 = "3;미야코;02;아뇨. 토끼는 외로우면 죽어버린다는 속설이 있지만, 사실 토끼는 낯을 많이 가리는 생물이라 다른 토끼들과 쉽게 친해지기 어렵다고 해요.\n#3;em;[반응]"
1003805-12 = "3;미야코;01;분명 토끼가 한 마리가 더 있었더라면 곤란한 일이 여럿 일어났겠죠."
1003805-13 = "3;미야코;99;마치 선생님이 오시기 전의 RABBIT 소대처럼……\n#fontsize;50\n#3;em;…"
1003805-14 = "3;미야코;04;……아니, 아무것도 아니에요.\n#3;stiff"
1003805-15 = "3;미야코;11;사실 제일 큰 문제는 요새 다른 RABBIT 소대원들이 깡총이에게 눈독을 들이고 있어서요."
1003805-16 = "3;미야코;06;RABBIT 소대의 식량 사정이 여의치 않다보니…… #n요새 깡총이를 지켜보는 모에와 사키의 시선이 묘하게 느껴질 때가 있어요.\n#3;em;[땀]"
1003805-17 = "3;미야코;03;선생님, 제가 없을 때는 선생님께서 이 아이를 돌봐주시겠어요?"
1003805-18 = "#all;hide"
1003805-19 = "#na;(이후, 미야코와 함께 토끼를 돌보다 샬레로 돌아왔다.)"

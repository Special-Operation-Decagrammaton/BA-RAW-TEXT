80000087-26 = "3;사키;99;이렇게 배부르게 식사를 하고 나면 어쩐지 노곤해져서 잠이 솔솔 잘 온단 말이지……"
80000087-27 = "3;사키;03;선생님, 어때. 식사를 하고 났더니 뭔가 졸음이 오지 않아?\n#3;em;[반응]"

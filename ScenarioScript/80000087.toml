80000087-16 = "5;사키;99;매일 늦게까지 샬레의 불이 켜져 있는 것 같아서, 혹시나 잠이 부족하지 않을까 했거든."
80000087-17 = "[s] \"……혹시 걱정해 준 거야?\""
80000087-18 = "5;사키;10;하, 하아……? 내가 선생님을 걱정할 리가 없잖아!\n#5;stiff\n#5;em;[///]"
80000087-19 = "5;사키;06;모처럼 내가 시간을 내서 당번 활동을 하러 왔는데, 선생님이 졸고 있으면 곤란하니까 확인해 본 것뿐이라고."
80000087-20 = "5;사키;12;자, 피곤하지 않으면 서둘러 오늘의 업무부터 시작하자."

[translation]
80000087-1 = "瞌睡蟲對策？"
80000087-2 = "夏萊．辦公室"
80000087-3 = "（情人節數天前的某個早上，抵達夏萊辦公室時……）"
80000087-8 = "啊……咳咳。"
80000087-9 = "真是個不錯的早晨呢，老師。"
80000087-10 = "[s]「嗯。早安，咲希。」"
80000087-11 = "話說，那個……我沒有什麼特別的意思。"
80000087-12 = "你現在睏不睏？"
80000087-13 = "[s1]「不會，我不睏。」\n[s2]「我昨晚難得睡得很香！」"
80000087-14 = "……這樣啊，那就好。"
80000087-15 = "……這樣啊，那就好。"
80000087-16 = "因為夏萊的燈總是開到很晚……#n我只是單純想問問你會不會睡眠不足而已。"
80000087-17 = "[s]「……難道，你在擔心我嗎？」"
80000087-18 = "……哈啊？那，那怎麼可能！"
80000087-19 = "只是我都特地空出時間來做值日生的工作了，#n如果老師在打瞌睡的話我會很困擾而已！"
80000087-20 = "好，好吧！既然很有精神就趕快開始今天的工作吧！"
80000087-22 = "（……但在那之後，又被咲希問了好幾次「睏不睏」）"
80000087-24 = "（午餐結束後……）"
80000087-25 = "呼……我吃飽了。"
80000087-26 = "吃這麼多的話，會想打瞌睡的……"
80000087-27 = "怎麼樣？老師會不會想睡覺？"
80000087-28 = "[s]「這個嘛……還好……？」"
80000087-29 = "這，這樣啊……"
80000087-31 = "（休息中，在看電視時……）"
80000087-32 = "……哈啊，這個節目真讓人失望。"
80000087-33 = "話說老師，好像有人只要聽到紀錄片的旁白就會想睡覺哦。"
80000087-34 = "老師會嗎？有沒有覺得很想睡？"
80000087-35 = "[s]「應該沒有……吧？」"
80000087-36 = "……那就好。"
80000087-38 = "……嗯？作業用BGM跟平常不太一樣。"
80000087-39 = "是古典樂啊……"
80000087-40 = "古典樂有很多平靜安穩的曲子，很容易讓人想睡……"
80000087-41 = "怎麼樣？這次有覺得睏嗎？"
80000087-42 = "[s]「聽你這麼說，好像真的有點睏……」"
80000087-51 = "哼哼，這樣啊這樣啊。"
80000087-52 = "正好，我有個好東西可以給老師。"
80000087-57 = "來，收下吧。"
80000087-58 = "[s]「謝謝！不過，為什麼是焦糖……？」"
80000087-59 = "焦糖的製作很簡單，而且適合用來補充糖分和熱量。#n因此戰鬥用的補給品裡也會發放。"
80000087-60 = "特別是這個巧克力焦糖，在嘴裡不太容易融化又很有嚼勁。#n夜間站崗的哨兵也會吃這個來趕走睡意。"
80000087-61 = "除此之外，我還聽說晚上開車行經危險道路時，#n為了防止駕駛打瞌睡，坐在副駕駛座的人會一直餵焦糖給駕駛吃哦。"
80000087-62 = "我在先前的補給中拿到了這個超棒的焦糖。#n所以就拿來給老師看了。想睡的時候就吃吧。"
80000087-63 = "[s]「我會試試看的。話說回來，這個……」"
80000087-65 = "[ns]「莫非，是情人節的巧克力？」"
80000087-67 = "哈，哈啊！？那，那怎麼可能呢！"
80000087-68 = "時時刻刻都必須埋首於訓練的SRT特殊學園的學生，#n怎麼可能會對情人節這種世俗的活動感興趣！"
80000087-69 = "只是碰巧……碰巧遇到這個時期而已！"
80000087-73 = "是，是真的！別誤會了哦！"

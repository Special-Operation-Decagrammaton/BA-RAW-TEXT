[translation]
80000087-1 = "มาตรการป้องกันการง่วง"
80000087-2 = "สำนักงานชาเล่ต์"
80000087-3 = "(วันก่อนวันวาเลนไทน์...)"
80000087-8 = "เอ่อ อืม..."
80000087-9 = "อรุณสวัสดิ์คุณครู"
80000087-10 = "[s] \"อรุณสวัสดิ์ซากิ\""
80000087-11 = "คือ... ฉันแค่ถามเฉยๆ นะ"
80000087-12 = "เช้านี้รู้สึกง่วงบ้างรึเปล่า?"
80000087-13 = "[s1] \"ไม่นะ เช้านี้ครูไม่ง่วงเลย\"\n[s2] \"เมื่อคืนหลับสนิท เลยไม่ค่อยง่วงน่ะ\""
80000087-14 = "อ๋อ... ค่อยยังชั่วหน่อย"
80000087-15 = "อ๋อ... ค่อยยังชั่วหน่อย"
80000087-16 = "เหมือนคุณครูจะนั่งทำงานที่ชาเล่ต์จนดึกทุกวัน เลยห่วงว่าอาจนอนไม่พอรึเปล่าน่ะ"
80000087-17 = "[s] \"...เป็นห่วงครูเหรอ?\""
80000087-18 = "ฮะ...ฮะๆ...? ฉันจะเป็นห่วงคุณครูทำไม!"
80000087-19 = "นานๆ ที ฉันจะหาเวลามาเข้าเวรตัวแทนได้ ถ้าคุณครูเอาแต่ง่วง ฉันก็ลำบากแย่น่ะสิ"
80000087-20 = "เอ้า ถ้าไม่ง่วงละก็ มาเริ่มงานของวันนี้กันเถอะ"
80000087-22 = "(...หลังจากนั้น ซากิก็คอยถามคุณครูว่าง่วงรึเปล่าเป็นระยะๆ)"
80000087-24 = "(หลังกินมื้อกลางวันเสร็จ...)"
80000087-25 = "ฮู่ว~ อิ่มสุดๆ ไปเลย"
80000087-26 = "เวลากินอิ่มแบบนี้ ก็มักจะรู้สึกเพลียๆ แล้วก็รู้สึกง่วงขึ้นมา..."
80000087-27 = "ว่าไงคุณครู กินมื้อเที่ยงแล้วรู้สึกง่วงบ้างมั้ย?"
80000087-28 = "[s] \"ไม่รู้สิ... ก็ไม่ค่อยง่วงนะ...?\""
80000087-29 = "อืม ถ้าไม่ง่วงก็ดีแล้ว..."
80000087-31 = "(ระหว่างที่นั่งดูทีวีช่วงพัก...)"
80000087-32 = "ฮึ่ย— สารคดีนี่น่าเบื่อจริงๆ เลยนะ"
80000087-33 = "ปกติฉันชอบดูสารคดีอยู่แล้ว เลยไม่เป็นไร แต่บางคนน่ะ เวลาฟังเสียงบรรยายของสารคดีก็#nมักจะรู้สึกง่วงขึ้นมาเลยละ"
80000087-34 = "คุณครูล่ะเป็นไง? ดูสารคดีแล้วรู้สึกง่วงขึ้นมารึเปล่า?"
80000087-35 = "[s] \"ไม่นะ...\""
80000087-36 = "งั้นเหรอ... ถ้างั้นก็ช่างเถอะ"
80000087-38 = "...เอ๋? เพลงที่ฟังตอนทำงานไม่เหมือนทุกทีเลยแฮะ"
80000087-39 = "เพลงคลาสสิกเหรอ..."
80000087-40 = "ก็ไม่แย่ เพลงคลาสสิกที่ฟังตอนทำงาน มักใช้ทำนองเพลงฟังสบายๆ เหมือนเพลงกล่อมเด็ก ฟังไปนานๆ ก็จะรู้สึกง่วงได้ง่าย"
80000087-41 = "คุณครูล่ะเป็นไง? ตอนนี้รู้สึกง่วงบ้างรึยัง?"
80000087-42 = "[s] \"พอโดนถามบ่อยๆ ก็ชักง่วงขึ้นมาแล้วละ...\""
80000087-51 = "ง่วงใช่มั้ย? ง่วงแล้วใช่มั้ย?"
80000087-52 = "ฮิฮิ พอดีเลย ฉันเตรียมขนมที่ช่วยให้หายง่วงมาด้วยน่ะ"
80000087-57 = "เอ้า คาราเมล ช็อกโกแลต "
80000087-58 = "[s] \"ทำไมจู่ๆ ถึงให้คาราเมล...?\""
80000087-59 = "คาราเมลน่ะ นอกจากทำง่ายแล้วยังเป็นขนมรสหวานที่ให้พลังงานเพียงพอด้วย มักใช้เป็นเสบียงเวลาปฏิบัติการต่อสู้บ่อยๆ"
80000087-60 = "โดยเฉพาะ คาราเมล ช็อกโกแลตนี่น่ะ ตอนกินมันละลายช้า แล้วก็เหนียบหนึบเคี้ยวสนุก เป็นหนึ่งในของกินเล่นที่ทหารยามอยู่เวรตอนกลางคืนกินแก้ง่วงกันน่ะ"
80000087-61 = "แล้วก็เอาไว้ให้หัวหน้าหน่วยเคี้ยวเล่นแก้ง่วง เวลาที่ต้องขับรถไปบนทางเดินเขาที่อันตรายๆ ตอนกลางคืนด้วยน่ะ"
80000087-62 = "เสบียงที่ส่งมาคราวนี้มีคาราเมล ช็อกโกแลตอยู่ด้วย ฉันเลยเตรียมมาเผื่อคุณครูน่ะ ฉันเอามาเยอะพอสมควร เอาไว้กินแก้ง่วงล่ะ"
80000087-63 = "[s] \"ซากิ หรือว่าคาราเมลช็อกโกแลตนี่ให้เป็นของขวัญครูเหรอ...?\""
80000087-65 = "[ns] \"ให้เป็นของขวัญวาเลนไทน์เหรอ?\""
80000087-67 = "อะ...อะไรเล่า? มะมะ...ไม่ใช่แบบนั้นสักหน่อย?!"
80000087-68 = "สมาชิกกองกำลังพิเศษของ SRT ที่ต้องจดจ่ออยู่กับการฝึกเสมอๆ จะมีเวลาไปสนใจอีเวนต์#nอะไรแบบนั้นได้ยังไง..."
80000087-69 = "คะ...แค่บังเอิญก็เท่านั้นแหละ"
80000087-73 = "ฉะ...ฉันพูดจริงนะ อย่าเข้าใจผิดซะล่ะ!"

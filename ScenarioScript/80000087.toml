80000087-58 = "[s] \"어째서 갑자기 캐러멜……?\""
80000087-59 = "3;사키;07;캐러멜은 만들기도 간단하고 당분이나 열량을 보충하기에도 좋은 간식이라, 전투 식량으로 자주 보급되거든.\n#3;em;[재잘]\n#3;m3"
80000087-60 = "3;사키;99;특히나 이 초코 캐러멜은 입 안에서 잘 녹지 않고, 쫀득한 식감을 갖고 있기 때문에 야간 근무를 서는 초병들이 잠을 쫓기 위해 자주 먹는 간식 중 하나야."
80000087-61 = "3;사키;02;늦은 밤에 위험한 고갯길을 차로 지나갈 때, 운전병이 졸지 않도록 부대장이 계속 옆에서 캐러멜을 먹여 주었다는 일화도 있을 정도니까."
80000087-62 = "3;사키;03;마침 이번에 보급으로 초콜릿 캐러멜이 나왔기에 선생님을 위해 가져왔어. 양은 충분하니까 졸릴 때 먹도록 해.\n#3;em;[음표]"

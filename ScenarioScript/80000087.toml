80000087-32 = "3;사키;11;아아— 진짜 지루한 다큐멘터리네.\n#3;em;[속상함]\n#3;a"
80000087-33 = "3;사키;01;나야 평소에도 다큐멘터리를 즐겨 시청하니 별 상관은 없지만, 어떤 사람들은 내레이터의 목소리를 듣는 것 만으로도 졸음이 쏟아진다고 하더라고."
80000087-34 = "3;사키;02;선생님은 어때? 다큐멘터리를 보고 있으니까 졸음이 오는 것 같지 않아?\n#3;em;[반응]"
80000087-35 = "[s] \"잘 모르겠는데……\""
80000087-36 = "3;사키;04;그런가…… 그렇다면 상관없지만.\n#3;em;[속상함]\n#3;stiff"
80000087-37 = "#all;hide"
80000087-38 = "3;사키;02;……어라? 작업곡 리스트가 평소와는 조금 다른 것 같네.\n#3;em;[?]\n#3;a"
80000087-39 = "3;사키;99;클래식인가……"
80000087-40 = "3;사키;01;나쁘지는 않지만, 작업곡으로 듣기에 클래식 음악은 자장가처럼 편안하고 조용한 음색이 많아서 듣고 있으면 졸음이 오기 쉽지."
80000087-41 = "3;사키;03;어때, 선생님? 이번에야 말로 졸음이 오는 것 같아?\n#3;em;[반응]\n#3;hophop"

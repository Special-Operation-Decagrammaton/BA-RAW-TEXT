[translation]
80000087-1 = "Staving Off Sleepiness"
80000087-2 = "Schale Executive Office"
80000087-3 = "A few days before Valentine's Day..."
80000087-8 = "Um, ahem..."
80000087-9 = "Good morning, Sensei."
80000087-10 = "[s] \"Good morning, Saki.\""
80000087-11 = "I...have to ask."
80000087-12 = "Aren't you sleepy this morning?"
80000087-13 = "[s1] \"No, not at all. I'm fine!\"\n[s2] \"I actually slept really well last night!\""
80000087-14 = "Oh... That's good."
80000087-15 = "Oh... That's good."
80000087-16 = "It seems like Schale's light is always on until late at night. So I thought you probably weren't sleeping enough."
80000087-17 = "[s] \"Were you worrying about me...?\""
80000087-18 = "H-Huh? No way! Why would I be worried about you, Sensei?"
80000087-19 = "I just don't want you to fall asleep while I'm supposed to be on duty."
80000087-20 = "If you're not tired, stop messing around! Let's start today's tasks."
80000087-22 = "But Saki kept asking me if I was sleepy at any opportunity."
80000087-24 = "After lunch..."
80000087-25 = "Ah! Today's lunch was really filling."
80000087-26 = "Usually, after eating a full meal like this, I get a bit tired. Sometimes I even drift off without meaning to..."
80000087-27 = "What about you, Sensei? Aren't you getting sleepy after that lunch?"
80000087-28 = "[s] \"No, not really...\""
80000087-29 = "Oh... Great. It's good that you're not sleepy."
80000087-31 = "Watching TV during break..."
80000087-32 = "Ah... It's another boring documentary, huh?"
80000087-33 = "I mean, I'm actually a big fan of documentaries. I like it, actually. But I've heard other people say that just hearing this narrator's voice makes them sleepy."
80000087-34 = "What about you, Sensei? Is this documentary making you sleepy?"
80000087-35 = "[s] \"Eh, not that much...\""
80000087-36 = "Oh, really? Well... I guess it doesn't matter..."
80000087-38 = "Oh, is this a different playlist than you usually play?"
80000087-39 = "Classical, huh..."
80000087-40 = "It's...not bad, but... Classical music has too many relaxing, lullaby-like tones for work. It's really easy to doze off when you're listening to it."
80000087-41 = "So...how about it, Sensei? Are you finally—I mean, are you sleepy now?"
80000087-42 = "[s] \"Since you keep asking me, I guess I am a little...\""
80000087-51 = "You are? I knew it!"
80000087-52 = "Heehee. It just so happens that I have the perfect snack to wake you up."
80000087-57 = "Here you go! It's a chocolate caramel."
80000087-58 = "[s] \"Huh? Why caramel?\""
80000087-59 = "It's easy to make, and it's calorie-dense, so it's great as a field ration."
80000087-60 = "Plus, caramel won't melt in your mouth. The chewy texture makes it really useful for soldiers trying to stay awake on a night shift."
80000087-61 = "Surely you know the famous story about the unit commander that kept feeding the driver caramels to keep them awake for a late-night drive through a dangerous pass. ...No?"
80000087-62 = "Well, whatever. Chocolate caramels were in our latest supply drop, so I brought some for you, Sensei. There's plenty, so you can eat them whenever you're sleepy."
80000087-63 = "[s] \"Hey, Saki. This chocolate caramel...\""
80000087-65 = "[ns] \"Is it actually for Valentine's Day?\""
80000087-67 = "Wh-What? No! Wh-Why would you think that?"
80000087-68 = "A special agent of SRT must always concentrate on training. There's no way I'd even be interested in a frivolous, hedonistic event like Valentine's Day!"
80000087-69 = "It's just a coincidence that the timing lined up. I can't do anything about that."
80000087-73 = "So don't go getting any ideas!"

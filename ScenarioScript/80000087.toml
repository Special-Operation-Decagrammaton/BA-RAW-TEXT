80000087-13 = "[s1] \"괜찮아. 안 졸려.\"\n[s2] \"어젯밤에는 간만에 푹 잤거든!\""
80000087-14 = "5;사키;04;아…… 그건 다행이네.\n#5;em;[땀]"

[translation]
10045030-1 = "ตอนที่ 3; รอบที่ 2: เรือเจ็ตสกีคลั่ง"
10045030-3 = "คิเคียว? ยังรู้สึกไม่ดีอยู่อีกเหรอ?"
10045030-4 = "ฉันไปเอาอะไรอร่อยๆ มาให้มั้ย?"
10045030-5 = "ขอบใจที่เป็นห่วงนะ แต่ฉันไม่เป็นไรหรอก..."
10045030-6 = "ยากิโทริน่ะเอาไว้กินทีหลังก็ได้"
10045030-7 = "ฉันไม่ได้บอกเลยนะว่าจะให้กินยากิโทริด้วยน่ะ?"
10045030-12 = "ง่ำ ง่ำ"
10045030-14 = "กินไปด้วยพูดไปด้วย แบบนี้ใครจะเชื่อ..."
10045030-15 = "เฮ้อ... ช่างเถอะ ขอฉันไม้หนึ่งแล้วกัน"
10045030-16 = "อย่างน้อยก็ต้องกินเพิ่มพลังสักหน่อยละนะ"
10045030-17 = "(เพราะไม่ว่ายังไง ฉันก็ต้องอยู่รอดบนเรือให้ได้)"
10045030-18 = "อื้อ รับไปสิ"
10045030-19 = "ฮุฮุ ยากิโทริของที่นี่ก็รสชาติดีใช่ย่อยเลยนะเจ้าคะ"
10045030-20 = "ระหว่างที่กิน เราเดินไปดูด้วยดีกว่าว่าเป็นเรือแบบไหน"
10045030-25 = "โอ้... ลำนั้นเหรอ?"
10045030-29 = "โอ้ว...! ข้าไม่เคยนั่งเรือแบบนี้มาก่อนเลยเจ้าค่ะ!"
10045030-30 = "[ns1] \"ดีใจที่ผ่านรอบแรกกันนะ\"\n[ns2] \"ทุกคนมาเก็บข้อมูลก่อนการแข่งขันเหรอ?\""
10045030-33 = "คุณครู เรือนี่มัน... ปลอดภัยจริงๆ เหรอ?"
10045030-34 = "ถ้าตกน้ำก็จะมีคนไปช่วยทันทีใช่มั้ย?"
10045030-35 = "[s3] \"อื้อ ทีมไลฟ์การ์ดสแตนด์บายเสมออยู่แล้ว\"\n[s4] \"ไม่ต้องกังวลนะ เราพร้อมรับมือทุกเหตุการณ์ที่อาจเกิดขึ้นอยู่แล้ว\""
10045030-38 = "ถ้างั้นก็ค่อยยังชั่วหน่อย..."
10045030-39 = "(ถึงจะว่ายน้ำไม่เป็น แต่ยังไงก็น่าจะไม่ตายในน้ำละเนอะ)"
10045030-41 = "ทำไมเหรอ? กังวลว่าจะตกน้ำเหรอ?"
10045030-42 = "พะ... พูดเรื่องอะไรของเธอ"
10045030-43 = "การเตรียมพร้อมรับมือกับทุกสถานการณ์คือหน้าที่ของที่ปรึกษายุทธศาสตร์อยู่แล้ว อย่าบอกนะว่าเธอลืมไปแล้วน่ะ?"
10045030-44 = "อย่างที่ทุกคนรู้ว่าพวกคนที่ขัดขวางเราในการแข่งขันรอบที่แล้วก็ผ่านเข้ารอบมาเหมือนกัน"
10045030-45 = "รอบนี้คนพวกนั้นอาจจะงัดอุบายอะไรมาอีกก็ได้"
10045030-46 = "[s5] \"ฮุฮุ ไม่ต้องห่วงเรื่องนั้นหรอก เกมนี้ขวางไม่ได้แน่\"\n[s6] \"เกมนี้ไม่น่ามีเวลาให้ขัดขวางคนอื่นหรอกนะ\""
10045030-49 = "จะบอกว่าลำพังแค่อยู่รอดให้ได้ก็เป็นเรื่องยากแล้วสินะ..."
10045030-50 = "ถ้ามันอันตรายขนาดนั้น... เราลองทำแบบนี้ดูมั้ยเจ้าคะ?"
10045030-51 = "ทุกคนเกี่ยวแขนกันแล้วยึดกันไว้ให้มั่น! เอาแบบนี้มั้ยเจ้าคะ?"
10045030-52 = "โอ้ เป็นความคิดที่ดีเลยนะ"
10045030-53 = "แต่ให้ตัวติดกันในชุดว่ายน้ำเนี่ยนะ... ไม่มีวิธีอื่นแล้วเหรอ"
10045030-55 = "งั้นฉันจะนั่งทางซ้ายสุด ส่วนทางขวาสุดก็ให้เป็นเรนเกะแล้วกัน"
10045030-56 = "ส่วนยูคาริกับคิเคียวก็ให้มาอยู่ตรงกลาง"
10045030-58 = "ดีละ! แล้วทุกคนจะได้เห็นฝีมือจากแขนขวาที่ถูกปลดผนึกแล้วของรุ่นพี่นางุสะ!"
10045030-59 = "ก็บอกแล้วไงว่าพูดแบบนั้นมันเบียวเหมือนเด็กม.ต้น แล้วก็อย่าไปพูดให้ใครอื่นได้ยินล่ะ..."
10045030-60 = "ถ้ามันทำให้ทุกคนสนุกกันได้ ฉันก็โอเคนะ"
10045030-61 = "ฮุฮุ ฉันจะแสดงพลังที่แท้จริงของฉันที่ถูกกักขังไว้ในเงาของห้วงอัสดงให้ได้เห็นเอง"
10045030-62 = "แต่ฉันเป็นห่วงจริงๆ นะ พอเถอะ..."
10045030-64 = "ในเมื่อเราได้แผนรับมือแล้ว งั้นก็ฝ่าฟันไปด้วยกันเถอะเจ้าค่ะ!"
10045030-66 = "หลังจากนั้นไม่นาน..."
10045030-69 = "รอกันนานมั้ยคะทุกคน! ในที่สุดก็ถึงเวลาของการแข่งขันรอบที่ 2 แล้วค่ะ!"
10045030-74 = "ตามที่แจ้งไว้ล่วงหน้าแล้วว่านี่คือเกมเรือเจ็ตสกีคลั่ง!"
10045030-75 = "ผู้เข้าแข่งขันทั้งหมด 30 คนจะถูกแบ่งให้ขึ้นเรือเจ็ตสกี 2 ลำ เรือของเราจะซิ่งและดริฟต์จนกว่าจะ#nเหลือผู้เข้าแข่งขันเพียงแค่ 10 คนค่ะ!"
10045030-76 = "ระวังอย่าปลิวตกทะเลไปนะคะ เมี้ยวเมี้ยว!"
10045030-80 = "[ns] \"ผู้เข้าแข่งขัน มาขึ้นเรือได้!'"
10045030-82 = "ทุกคนจำไว้นะ เราจะเกาะแขนและยึดกันไว้ไม่ให้ตกลงไป"
10045030-83 = "เจ้าค่ะ! ทุกคนจะต้องรอดนะเจ้าคะ!"
10045030-89 = "ทุกคนขึ้นเรือกันแล้วใช่มั้ยคะ?"
10045030-90 = "ถ้างั้น การแข่งขันรอบที่ 2 เรือเจ็ตสกีคลั่ง...!"
10045030-91 = "[ns] \"เริ่มได้!!\""
10045030-96 = "อึกกก! เร็วขนาดนี้เลยเหรอ...?!"
10045030-100 = "วะ.... ว้ายยยยย...!!"
10045030-101 = "เกาะกันไว้ให้ได้มากที่สุด! เราจะช่วยดึงกันไว้ จะได้ไม่มีใครตกเรือไป!"
10045030-105 = "ไม่ไหวหรอก...! ฉันว่าไม่ไหว...!!"
10045030-106 = "อึก ฉันต้องทำอะไรสักอย่างแล้วละ...!"
10045030-107 = "อึกก! ขอบใจนะ"
10045030-108 = "หลังของเธอนุ่มกว่าที่คิดอีกนะ"
10045030-109 = "ไม่ใช่หลังสักหน่อย!!"
10045030-110 = "อ่า... ขอโทษนะ"
10045030-111 = "ไม่ต้องมาขอโทษเลย"
10045030-118 = "ว้ายยยยยย!!"
10045030-119 = "ยะ... ยูคาริ? นั่นมันหางฉันนะ...!"
10045030-120 = "ขะ... ขออภัยเจ้าค่ะ! แต่ถ้าข้ายึดไว้ไม่ได้ ข้าก็ตกรอบเจ้าค่ะ...!!"
10045030-121 = "ตะ... แต่ว่าตรงนั้นมัน...!"
10045030-122 = "ขออภัยด้วยเจ้าค่ะ...!!"
10045030-123 = "มะ... ไม่เป็นไรหรอก! ฉันจะอดทนไว้แล้วกัน... อ๊ะ...!!"
10045030-127 = "ต้องอย่างนี้ละ! ทุกคนรวมพลังกันไว้นะ...!"
10045030-128 = "ฉันไม่ได้อยากรวมพลังแบบนี้สักหน่อย...!"
10045030-129 = "อะฮ่าฮ่า! นี่ละที่เรียกว่าวัยรุ่น!!"
10045030-131 = "เสียงกรีดร้องดังไปทั่วชายหาดเลยนะคะ...!"
10045030-132 = "ใครน่ะ! ใครเป็นคนคิดเกมให้ทุกคนมาเหนื่อยร่างกันแบบนี้ หน็อยยย"
10045030-133 = "ว้ายยยย!!"
10045030-138 = "เอาละค่ะ! ผู้เข้าแข่งขันตกรอบกันไปหลายคนแล้ว แล้วใครจะเป็น 10 คนที่จะผ่านเข้าสู่รอบต่อไป?"
10045030-139 = "มาลุ้นไปด้วยกันนะคะ เมี้ยวเมี้ยว!"

[translation]
10045030-1 = "第3話;第2回合：暴走噴射快艇"
10045030-3 = "桔梗？還在不舒服嗎？"
10045030-4 = "要不要吃點好吃的？"
10045030-5 = "……謝謝你的關心，不過我沒事。"
10045030-6 = "烤雞肉串我晚點再吃。"
10045030-7 = "我沒說要把烤雞肉串給你呀？"
10045030-12 = "嚼嚼。"
10045030-14 = "邊吃邊說真沒說服力……"
10045030-15 = "……呼，算了。也給我來一點吧。"
10045030-16 = "總是得先補充點體力才行。"
10045030-17 = "（無論如何都要想辦法在快艇上撐住）"
10045030-18 = "嗯，給你。"
10045030-19 = "呵呵，這裡的烤雞肉串也相當不錯呢。"
10045030-20 = "大家一邊吃，一邊去看看那艘快艇吧。"
10045030-25 = "哦……就是那個嗎？"
10045030-29 = "哇……！小女子還是第一次見到這種快艇呢！"
10045030-30 = "[ns1]「恭喜通過第一回合。」\n[ns2]「大家是來事先勘查的嗎？」"
10045030-33 = "老師，這個……真的安全嗎？"
10045030-34 = "掉進水裡會立刻被救上來吧？"
10045030-35 = "[s3]「嗯，救援隊隨時待命。」\n[s4]「已經做好萬全的準備了，大家放心。」"
10045030-38 = "……那就好。"
10045030-39 = "（就算不會游泳，也能想辦法糊弄過去）"
10045030-41 = "怎麼？你該不會擔心會掉下去吧？"
10045030-42 = "怎，怎麼會呢。"
10045030-43 = "做好應對所有狀況的準備就是作戰參謀的職責，你該不會忘了吧？"
10045030-44 = "大家應該知道，上一場比賽妨礙我們的傢伙們也都活下來了。"
10045030-45 = "這次不知道又會搞什麼花樣。"
10045030-46 = "[s5]「呵呵，這點不用擔心。」\n[s6]「他們恐怕連自保都來不及了。」"
10045030-49 = "……意思是說，這場比賽危險到沒空干擾別人嗎。"
10045030-50 = "既然如此……要不要試試這個方法呢？"
10045030-51 = "我們先勾住彼此的手臂，再一起抓緊安全桿！#n大家覺得如何？"
10045030-52 = "哦，這主意不錯耶。"
10045030-53 = "穿著泳裝還要緊貼在一起啊……不過也沒有其他辦法了。"
10045030-55 = "那我坐最左邊，蓮華坐最右邊。"
10045030-56 = "紫和桔梗就坐中間吧。"
10045030-58 = "好！讓他們瞧瞧封印在名草前輩右手裡的力量吧！"
10045030-59 = "……就說那種話聽起來太中二了，不要在別人面前講出來。"
10045030-60 = "我不介意哦。如果這樣能讓大家開心的話。"
10045030-61 = "呵呵，被囚禁在黃昏陰影中的真正力量……就讓你們見識見識吧。"
10045030-62 = "更讓人擔心了，拜託快停下來……"
10045030-64 = "總之這樣就有對策了，大家一起晉級吧！"
10045030-66 = "不久之後……"
10045030-69 = "各位久等了！第二場比賽終於準備完成！"
10045030-74 = "正如預告所說，這次的比賽是暴走噴射快艇！"
10045030-75 = "30名選手分乘兩艘快艇，不斷進行俯衝與漂移，直到剩下10人為止！"
10045030-76 = "大家小心別被甩出去囉，喵喵！"
10045030-80 = "[ns]「請選手們上船！」"
10045030-82 = "大家都還記得吧。#n勾住彼此的手臂，一起抓緊安全桿。"
10045030-83 = "是！一定要全員生還！"
10045030-89 = "大家都上船了嗎？"
10045030-90 = "第2回合，暴走噴射快艇……！"
10045030-91 = "[ns]「開始──！！」"
10045030-96 = "哇啊啊！這個速度是……！？"
10045030-100 = "呀啊啊啊啊啊！！"
10045030-101 = "盡量貼緊彼此！互相借力，別掉下去！"
10045030-105 = "不行……！快撐不下去了……！！"
10045030-106 = "可惡，看我用身體硬扛……！"
10045030-107 = "唔唔唔！謝謝。"
10045030-108 = "你的背，比我想像中還柔軟呢。"
10045030-109 = "那不是背啦！！"
10045030-110 = "啊……抱歉。"
10045030-111 = "別道歉啊！"
10045030-118 = "呀啊啊啊啊啊！！"
10045030-119 = "那個，紫？那是我的尾巴……！"
10045030-120 = "對，對不起！但小女子要是放手的話會被淘汰的……！！"
10045030-121 = "但，但是，那裡是……！"
10045030-122 = "對不起噫噫噫……！！"
10045030-123 = "沒，沒關係！我撐得住……啊啊……！！"
10045030-127 = "沒錯！只要大家合為一體……！"
10045030-128 = "我才不想用這種方式合為一體……！"
10045030-129 = "啊哈哈！這就是青春嗎！！"
10045030-131 = "尖叫聲此起彼落呢……！"
10045030-132 = "是誰啊！想出這種亂七八糟的比賽的到底是──咕嚕咕嚕咕嚕。"
10045030-133 = "呀啊啊啊啊！！"
10045030-138 = "那麼！在淘汰者不斷出現的情況下，究竟哪10位參賽者能晉級到下一輪呢！？"
10045030-139 = "請千萬不要轉台唷，喵喵！"

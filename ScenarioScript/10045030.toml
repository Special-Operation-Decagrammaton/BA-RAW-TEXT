[translation]
10045030-1 = "Episode 3;Round 2: Jet Boat Rampage"
10045030-3 = "Kikyou? Are you still upset?"
10045030-4 = "Perhaps a delicious snack will cheer you up."
10045030-5 = "...I appreciate your worry, but there's no need."
10045030-6 = "I'll have some chicken skewers later."
10045030-7 = "Hm, did anyone say I was offering?"
10045030-12 = "Nom."
10045030-14 = "I'm quite aware you're simply trying to convince me..."
10045030-15 = "...*sigh* Fine. I will eat one."
10045030-16 = "I must recover my stamina, I suppose."
10045030-17 = "(...Otherwise, how will I endure this damned boat?)"
10045030-18 = "Yay. Here you go."
10045030-19 = "Fufu. The chicken skewers are truly delicious!"
10045030-20 = "While we're eating, why don't we go check out the boats?"
10045030-25 = "Is that it?"
10045030-29 = "Wow! I have never boarded such a boat!"
10045030-30 = "[ns1] \"Congratulations on passing the first round.\"\n[ns2] \"Are you all here for a preliminary inspection?\""
10045030-33 = "Are you quite certain this is safe, Sensei?"
10045030-34 = "If one were to fall, rescue would be immediate?"
10045030-35 = "[s3] \"Yes. The rescue team will be right on site.\"\n[s4] \"We've prepared for every possible scenario!\""
10045030-38 = "...I'm relieved to hear it."
10045030-39 = "(None will discover my lack of swimming ability...somehow...)"
10045030-41 = "Why're you asking? Think you're going to fall?"
10045030-42 = "Wh-What nonsense is this?"
10045030-43 = "Surely you have not forgotten that I am our operations officer. I must properly assess the situation and potential results."
10045030-44 = "Enemies specifically targeting us qualified for this next match, did they not?"
10045030-45 = "They could have concocted any number of underhanded schemes."
10045030-46 = "[s5] \"Fufu, don't worry about that.\"\n[s6] \"They won't be able to spare a single thought for anyone else.\""
10045030-49 = "...Translation: they will be too preoccupied with their own survival."
10045030-50 = "Ah! If the danger is so prominent, I have had an inspired idea!"
10045030-51 = "We shall all link arms and hold onto the safety bar with all our might!"
10045030-52 = "I like that! Let's do it!"
10045030-53 = "To be in such close quarters while only dressed in swimwear... I suppose it would be the most efficient strategy."
10045030-55 = "Renge and I will cover the right and left sides."
10045030-56 = "And Yukari and Kikyou can be in the center."
10045030-58 = "Sounds good! The great power of Nagusa's right arm will take the stage!"
10045030-59 = "...Please stop. I am suffering from a severe case of secondhand embarrassment."
10045030-60 = "I don't mind, if it makes everyone smile."
10045030-61 = "Fufu. My true power, once sealed in the shadows of the spirit realm, is now unleashed!"
10045030-62 = "...I am genuinely beginning to become concerned for the well-being of both of you."
10045030-64 = "Regardless, we are now prepared! So let us go forth and emerge victorious!"
10045030-66 = "A little later..."
10045030-69 = "Thank you for your patience! The highly anticipated second round is about to start!"
10045030-74 = "As a reminder, we will be playing Jet Boat Rampage!"
10045030-75 = "Our remaining 30 players will board the two jet boats. Their objective is to be among the last 10 people still holding on at the very end!"
10045030-76 = "Do your best to not go flying! Nyan!"
10045030-80 = "[ns] \"Players, all aboard!\""
10045030-82 = "Everyone, link arms and grab hold of the safety bar."
10045030-83 = "Yes! We shall all survive together!"
10045030-89 = "Is everyone on board?"
10045030-90 = "Then let round 2: Jet Boat Rampage..."
10045030-91 = "[ns] \"...Commence!!\""
10045030-96 = "Gaaah! It's going so fast!"
10045030-100 = "KYAAAAAAH!"
10045030-101 = "Stay together, everyone! Lean on each other!"
10045030-105 = "This is impossible. Absolutely impossible!"
10045030-106 = "Ack, here, brace yourself on me!"
10045030-107 = "Ugh! Thank you."
10045030-108 = "Your back...is rather soft."
10045030-109 = "That's not my back!!"
10045030-110 = "Ah... Apologies."
10045030-111 = "Apologizing makes it worse, somehow!"
10045030-118 = "KYAAAAAAH!"

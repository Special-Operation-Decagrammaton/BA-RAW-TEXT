10045030-120 = "I'm really, really, very sorry! However, if I let go...!"
10045030-121 = "Th-This is...! But!"
10045030-122 = "I'm sooowwwyyyy!!"
10045030-123 = "J-Just focus! I'll endure!"
10045030-127 = "That's right! We need only join together!"
10045030-128 = "I do NOT wish to \"join together\" in this way!"
10045030-129 = "Hahaha! This must be youth!!"

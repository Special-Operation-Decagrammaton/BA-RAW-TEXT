[translation]
2001805-1 = "Unexploded Ordnance"
2001805-2 = "（萌是今天夏萊的值日生，因此來到了辦公室）"
2001805-3 = "你好，老師。今天換我當值日生，多多指教囉。"
2001805-4 = "咯嘻嘻……一想到可以藉著值日生的名義偷看老師的電腦裡藏了哪些檔案，#n就讓人感到好興奮……"
2001805-5 = "[s1] 「我想不會有什麼有趣的東西……」\n[s2] 「我一聽說你要來，就事先把資料移到別的地方了。」"
2001805-6 = "呿……幹嘛做這麼多餘的事。"
2001805-7 = "呿……幹嘛做這麼多餘的事。"
2001805-8 = "難道……上次那件事還放在心上啊？"
2001805-9 = "雖然擅自按下緊急格式化按鈕的確實是我──"
2001805-14 = "不過老師，你老實說。"
2001805-15 = "辛苦大半天才整理好的資料全部消失的那瞬間，你也感覺到了吧？"
2001805-16 = "經過漫長努力得到的成果，在一瞬間化為烏有的宣洩感……"
2001805-17 = "那種讓全身顫慄的快感……！哈啊，哈啊……"
2001805-18 = "[s] 「確實很顫慄，冷顫的那種……」"
2001805-19 = "啊──啊……好可惜喔，資料竟然全都移走了。"
2001805-20 = "那我們今天要做哪些工作呢？跟上次一樣整理報告嗎？"
2001805-21 = "……嗯？你說今天什麼都不用做？"
2001805-22 = "你說你要暫時離開辦公室去處理夏萊的業務，#n要我乖乖地坐在位子上看家，什麼也不要碰……？"
2001805-23 = "可以是可以……不過真的這樣就好嗎？"
2001805-24 = "SRT小隊的報務員專程來幫忙耶，結果只讓人家當看門狗。"
2001805-25 = "老師想要的話，也可以拜託我更難一點的事情喔。"
2001805-26 = "……還是說，乾脆真的讓我像狗一樣戴著項圈等老師回來啊？"
2001805-27 = "[s3] 「我可沒有那方面的興趣……！？」\n[s4] 「反正乖乖等著，『什麼也別碰』。」"
2001805-28 = "好啦好啦──！如果這是命令的話。"
2001805-29 = "好啦好啦──！如果這是命令的話。"
2001805-30 = "那麼辦公室就交給我，老師快去把事情辦完吧。#n我會按照吩咐，乖乖坐在這裡等你回來。"
2001805-34 = "……幹嘛用那種表情看我？我真的什麼都不會碰啦。"
2001805-36 = "（……留下面露奇怪笑容的萌，走出了夏萊大樓）"
2001805-39 = "……話是那麼說，但我怎麼可能放過調查夏萊辦公室的大好機會呢！"
2001805-40 = "說不定還能發現夏萊私藏的新武器或祕密武器……"
2001805-41 = "又或是老師害羞的祕密……咯嘻嘻……"
2001805-42 = "那就來把每個角落都看過一遍囉！"
2001805-48 = "……嗯？這個紅色按鈕是什麼？"
2001805-49 = "槍械架旁邊有個巨大的紅色按鈕……"
2001805-50 = "不管怎麼看都很可疑……這是做什麼用的呢？"
2001805-54 = "這裡是夏萊，也是老師的辦公室。"
2001805-55 = "老師擁有超越法規的搜查權，甚至連聯邦學生會也難以干涉。#n而這顆按鈕就位在老師的桌子旁邊……"
2001805-56 = "絕對是在極度緊急的狀況下才能使用的按鈕。"
2001805-57 = "比如說用來召集奇普托斯所有學生……"
2001805-58 = "或是啟動沉睡在夏萊地下室的古代兵器……"
2001805-59 = "或是將整座聖所之塔射到高空……？"
2001805-60 = "無論如何，一定會造成我無法承擔的嚴重後果……"
2001805-61 = "啊啊……光是妄想就讓我全身熱起來了……我忍不住了……！"
2001805-62 = "哈啊，哈啊……不行了，真的要按下去了……我要按了……！"
2001805-63 = "……嘿！"
2001805-68 = "怎，怎麼了！？#n天花板開始灑水！？"
2001805-69 = "哇，好，好冷！"
2001805-73 = "[ns] 「我回來了──」"
2001805-75 = "[ns] 「哇啊！？怎麼了！？怎麼回事？」"
2001805-76 = "那是我要問的！"
2001805-77 = "老師，這個按鈕是怎麼回事？"
2001805-78 = "[s5] 「萌，你……」\n[s6] 「該不會按了那個緊急沖洗按鈕吧？」"
2001805-79 = "……緊急沖洗按鈕？"
2001805-80 = "……緊急沖洗按鈕？"
2001805-81 = "你是說……身體沾到危險藥劑時，能快速沖洗乾淨的緊急沖洗措施？"
2001805-82 = "[s7] 「因為夏萊會有各種學生出入。」\n[s8] 「為了預防緊急情況，才有那個紅色按鈕。」"
2001805-87 = "[ns9] 「話說回來……我不是要你不要亂碰東西嗎……」\n[ns10] 「我好失望……」"
2001805-88 = "失望的人是我才對吧！"
2001805-89 = "失望的人是我才對吧！"
2001805-93 = "你知道我在按下那個按鈕之前有多期待嗎？"
2001805-94 = "我本來以為會發生我無法承擔的嚴重後果……會發生無法比擬的毀滅……"
2001805-95 = "我還以為至少會發射幾枚導彈！"
2001805-96 = "結果……居然只是發生被淋成落湯雞的小意外……"
2001805-97 = "你必須要對我的期待負起責任！"
2001805-99 = "（之後為了安撫亂發脾氣的萌，花了好大一番功夫……）"

2001805-20 = "3;모에;15;그래서, 오늘은 어떤 일을 하면 되는 거야? 지난번과 같은 보고서 정리?"
2001805-21 = "3;모에;04;……응? 오늘은 아무것도 하지 않아도 된다고?\n#3;em;[반응]"
2001805-22 = "3;모에;04;잠시 샬레의 업무 때문에 사무실을 비울 테니, 그동안 아무것도 만지지 말고 가만히 자리를 지켜 달라고?"
2001805-23 = "3;모에;02;어려운 일은 아니지만…… 정말 그걸로 괜찮겠어?\n#3;em;[?]"
2001805-24 = "3;모에;01;SRT의 오퍼레이터가 모처럼 도와주러 왔는데, 겨우 집 지키는 강아지 역할을 맡기다니."
2001805-25 = "3;모에;07;선생님의 부탁이라면 좀 더 어려운 부탁이라도 얼마든지 들어줄 수 있다고."

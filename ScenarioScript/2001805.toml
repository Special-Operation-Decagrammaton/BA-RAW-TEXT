2001805-15 = "3;모에;01;반나절을 들여 작업한 데이터가 모두 날아갔을 때, 선생님도 느꼈었지?\n#3;closeup"
2001805-16 = "3;모에;09;긴 노력의 결과물이 한순간에 물거품으로 바뀌는 순간의 카타르시스를……\n#3;closeup"

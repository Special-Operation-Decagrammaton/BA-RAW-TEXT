[translation]
2001805-1 = "Unexploded Ordnance"
2001805-2 = "(โมเอะมาเข้าเวรที่สำนักงานชาเล่ต์...)"
2001805-3 = "หวัดดีคุณครู วันนี้ก็ขอรบกวนด้วยนะ"
2001805-4 = "ฮุฮุฮุ... แค่คิดว่าจะได้ใช้การมาเข้าเวรเป็นข้ออ้างแล้วแอบดูไฟล์ในคอมพิวเตอร์ของคุณครูว่ามีอะไรบ้าง ก็ตื่นเต้นแล้ว..."
2001805-5 = "[s1] \"ไม่มีอะไรที่น่าสนุกแบบนั้นหรอก\"\n[s2] \"พอโมเอะบอกจะมา ครูย้ายข้อมูลไปเซฟที่อื่นแล้ว\""
2001805-6 = "ชิ... ดับฝันกันเฉยเลย"
2001805-7 = "ชิ... ทำอะไรไม่เข้าเรื่องเลย"
2001805-8 = "คุณครู... ยังคิดมากเรื่องคราวที่แล้วอยู่อีกเหรอ?"
2001805-9 = "ถึงฉันจะเป็นฝ่ายผิดที่ไปกดปุ่มรีเซ็ตฉุกเฉินนั่นตามอำเภอใจก็เถอะ—"
2001805-14 = "บอกมาตามตรงเถอะ คุณครู"
2001805-15 = "ตอนที่ข้อมูลที่ทำมาครึ่งวันหายไป คุณครูเองก็รู้สึกเหมือนฉันใช่มั้ย?"
2001805-16 = "ช่วงเวลาแห่งการปลดปล่อยอารมณ์ ตอนที่ผลลัพธ์ของความพยายามอันยาวนานได้สลายหายไป..."
2001805-17 = "ความรู้สึกสบายตัวจนน่าขนลุกหลังจากได้ปลดปล่อย... แฮ่ก แฮ่ก..."
2001805-18 = "[s] \"ก็ขนลุกอยู่หรอก...\""
2001805-19 = "ฮึ่ม วันนี้คิดว่าจะได้ค้นข้อมูลในคอมพิวเตอร์ของคุณครูแล้วแท้ๆ..."
2001805-20 = "แล้ววันนี้จะให้ฉันทำงานอะไรล่ะ? ให้จัดการเอกสารเหมือนคราวก่อนมั้ย?"
2001805-21 = "หืม...? วันนี้ไม่ต้องทำอะไรก็ได้งั้นเหรอ?"
2001805-22 = "เดี๋ยวคุณครูจะออกไปทำธุระของชาเล่ต์ และให้ฉันอยู่เฝ้าสำนักงานเฉยๆ ห้ามแตะต้องอะไรเหรอ?"
2001805-23 = "ไม่ใช่งานยากอะไรสักหน่อย... แต่ให้ทำแค่นั้นจริงๆ เหรอ?"
2001805-24 = "โอเปอเรเตอร์ของ SRT มาช่วยงานแท้ๆ แต่กลับบอกให้อยู่เฉยๆ เนี่ยนะ"
2001805-25 = "ถ้าคุณครูขอให้ช่วยละก็ ต่อให้เป็นงานที่ยากแค่ไหนก็ยินดีช่วยแท้ๆ"
2001805-26 = "ถามจริง... อยากให้ฉันใส่ปลอกคอ คล้องสายจูงเหมือนลูกหมาเหงาๆ นั่งรอคุณครูเฉยๆ เนี่ยนะ?"
2001805-27 = "[s3] \"ครูไม่ได้ชอบอะไรแบบนั้นสักหน่อย...\"\n[s4] \"แค่นั่งรอเฉยๆ โดยไม่แตะต้องอะไรก็พอแล้ว\""
2001805-28 = "ค่า~ ถ้าเป็นคำสั่งฉันจะทำตามก็แล้วกัน"
2001805-29 = "รู้แล้วน่า~ ถ้าเป็นคำสั่งฉันจะทำตามก็แล้วกัน"
2001805-30 = "ถ้างั้นฉันจะคอยดูสำนักงานให้เอง คุณครูไปทำธุระเถอะ ฉันจะนั่งรอเฉยๆ ตามคำสั่งเอง"
2001805-34 = "ทำไมมองฉันแปลกๆ แบบนั้นล่ะ? ฉันไม่แตะอะไรหรอกน่า"
2001805-36 = "(โมเอะยิ้มแบบมีเลศนัย ขณะที่คุณครูเดินออกไปจากอาคาร...)"
2001805-39 = "ถึงจะพูดแบบนั้นก็เถอะ... แต่ฉันจะยอมพลาดโอกาสทองที่จะสำรวจสำนักงานชาเล่ต์ไปได้ยังไงกัน!"
2001805-40 = "อาจเจออาวุธใหม่ๆ หรืออาวุธลับที่ชาเล่ต์ครอบครองอยู่ก็ได้..."
2001805-41 = "หรืออาจจะเจอความลับที่น่าอายของคุณครูก็ได้ หุหุ..."
2001805-42 = "ค่อยๆ เริ่มสำรวจจากมุมตรงนั้นก่อนก็แล้วกัน"
2001805-48 = "หืม? ปุ่มสีแดงนี่มันอะไรน่ะ?"
2001805-49 = "ปุ่มสีแดงขนาดใหญ่ที่ติดตั้งไว้บริเวณที่พักปืน..."
2001805-50 = "น่าสงสัยจัง เอาไว้ใช้ทำอะไรกันแน่เนี่ย?"
2001805-54 = "ที่นี่คือชาเล่ต์... ที่ทำงานของคุณครู"
2001805-55 = "คุณครูถือสิทธิ์อำนาจบางอย่างที่บางครั้งทางองค์การนักเรียนก็ยังควบคุมไม่ได้ และปุ่มนี้ก็อยู่ใน#nสำนักงานของคุณครู ซึ่งคุณครูสามารถกดได้ตลอดเวลา..."
2001805-56 = "คงเป็นปุ่มที่มีไว้ใช้เฉพาะเวลาฉุกเฉินและจำเป็นจริงๆ เท่านั้นสินะ..."
2001805-57 = "อย่างเช่น ปุ่มที่กดเพื่อเรียกรวมพลนักเรียนทั้งหมดในคิโวทอส..."
2001805-58 = "หรือปุ่มที่กดเพื่อเปิดใช้งานอาวุธลับขนาดใหญ่ที่หลับใหลอยู่ภายในชาเล่ต์..."
2001805-59 = "ถ้าไม่งั้นก็คงเป็นปุ่มยิงระเบิดใส่แซงค์ทัมทาวเวอร์....?"
2001805-60 = "ไม่ว่าจะเป็นปุ่มอะไร ก็คงจะก่อให้เกิดผลลัพธ์ยิ่งใหญ่เกินกว่าฉันจะจินตนาการได้...!"
2001805-61 = "อา... พอคิดไปเรื่อยๆ แบบนี้ก็รู้สึกตื่นเต้นจนสะท้านไปทั้งตัว... ทนไม่ไหวแล้ววว...!"
2001805-62 = "แฮ่ก... แฮ่ก... ตอนนี้ฉันทนไม่ไหวแล้ว ฉันจะกดแล้วนะ... ฉันจะกดแล้วจริงๆ นะ...!"
2001805-63 = "อ๊ายยย...!"
2001805-68 = "อะ...อะไรน่ะ?! ทำไมจู่ๆ ถึงมีน้ำพุ่งออกมาจากเพดานเล่า?!"
2001805-69 = "อ๊ายยย เย็นจังเลย!"
2001805-73 = "[ns] \"ครูกลับมา—\""
2001805-75 = "[ns] \"ว้าก?! ทำไมน้ำท่วมแบบนี้ล่ะ?\""
2001805-76 = "ฉันก็อยากรู้เหมือนกัน!"
2001805-77 = "คุณครู นี่มันปุ่มอะไรกันเนี่ย?"
2001805-78 = "[s5] \"โมเอะ นั่นมันปุ่มอาบน้ำฉุกเฉินนะ\"\n[s6] \"โมเอะ เธอกดปุ่มอาบน้ำฉุกเฉินเรอะ?\""
2001805-79 = "ปุ่มอาบน้ำฉุกเฉินงั้นเหรอ?"
2001805-80 = "ปุ่มอาบน้ำฉุกเฉินงั้นเหรอ?"
2001805-81 = "ถ้างั้นปุ่มสีแดงน่าสงสัยนี่... มันคือปุ่มอาบน้ำฉุกเฉินที่ใช้ชำระร่างกายเวลาที่โดนยาพิษอันตรายมา#nงั้นเหรอ?"
2001805-82 = "[s7] \"ก็ที่ชาเล่ต์มีนักเรียนหลากหลายรูปแบบแวะมานี่นา\"\n[s8] \"ทาสีแดงเอาไว้จะได้รู้ว่าเป็นปุ่มที่ใช้เวลาฉุกเฉินไง\""
2001805-87 = "[ns9] \"ครูบอกไม่ให้เธอแตะต้องอะไรไม่ใช่เหรอ...\"\n[ns10] \"ครูผิดหวังนะ โมเอะ\""
2001805-88 = "ไม่ต้องมาทำสีหน้าแบบนั้นเลย ฉันต่างหากที่ผิดหวังน่ะ"
2001805-89 = "ฉันต่างหากที่เป็นฝ่ายผิดหวังน่ะ"
2001805-93 = "ก่อนจะกดปุ่มนั้นรู้บ้างมั้ยว่าฉันคาดหวังเอาไว้มากแค่ไหนน่ะ?"
2001805-94 = "ฉันอุตส่าห์คาดหวังว่าจะเกิดเรื่องพังพินาศครั้งใหญ่ที่ฉันรับผิดชอบไม่ไหวขึ้นซะอีก..."
2001805-95 = "อย่างน้อยก็ควรยิงมิสไซล์ออกมาหน่อยเซ่! "
2001805-96 = "แต่ที่ไหนได้... กลับมีแค่น้ำเทลงมาแล้วก็จบ..."
2001805-97 = "รับผิดชอบความคาดหวังของฉันเลยนะคุณครู!"
2001805-99 = "(จากนั้นคุณครูก็ใช้เวลาพักใหญ่ปลอบโมเอะที่โกรธจัด...)"

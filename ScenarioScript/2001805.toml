[translation]
2001805-1 = "Unexploded Ordinance"
2001805-2 = "Moe came to the office for her shift."
2001805-3 = "Sensei, I'm counting on you today!"
2001805-4 = "Heeheehee... I'm already excited to look at what kind of files are hidden on your computer under the pretext of doing my duties..."
2001805-5 = "[s1] \"You won't find anything very interesting. I moved all the data already.\"\n[s2] \"I moved the computer data in advance because you were coming.\""
2001805-6 = "Hmph... That wasn't necessary..."
2001805-7 = "Hmph... That wasn't necessary..."
2001805-8 = "Are you...still concerned after what happened last time?"
2001805-9 = "Of course it was my fault for pressing the emergency format button, but..."
2001805-14 = "Be honest, Sensei."
2001805-15 = "Didn't you feel it when all the data we spent half a day working on was gone?"
2001805-16 = "The catharsis when all of our efforts were turned into nothingness in an instant..."
2001805-17 = "That hair-raising pleasure...! *pant* *pant*"
2001805-18 = "[s] \"It did raise my hair, but not in a good way...\""
2001805-19 = "Hmph. I was really looking forward to going through your computer."
2001805-20 = "So, what's my job today? Hand over the reports!"
2001805-21 = "...Huh? I don't have to do anything today?"
2001805-22 = "You're going to be away from the office for a while because of Schale work, so you don't want me to touch anything and just stay put?"
2001805-23 = "That won't be difficult...but are you sure I don't need to do anything?"
2001805-24 = "I'm an SRT operator. I came to help. I'm not a watchdog."
2001805-25 = "My brain is much better utilized in other tasks."
2001805-26 = "Really, now? Do you want me to put a collar on while I wait for you?"
2001805-27 = "[s3] \"Don't make this weird, and... Don't. Touch.\" \n[s4] \"Just don't touch anything and wait, that's it.\""
2001805-28 = "Okay, okay. If it's an order, then..."
2001805-29 = "Okay, okay. If it's an order, then..."
2001805-30 = "Then leave the office to me and go do your work. I'll sit still and wait as ordered."
2001805-34 = "...Why are you looking at me so suspiciously? I'm not gonna touch anything!"
2001805-36 = "...I left the building as Moe was smiling mischeviously behind me."
2001805-39 = "Like I'd really miss this golden opportunity to investigate the Schale office!"
2001805-40 = "I might be able to discover a new or secret weapon possessed by Schale..."
2001805-41 = "Or even better, I might uncover one of Sensei's embarrassing secrets... Heehee..."
2001805-42 = "Time to investigate!"
2001805-48 = "...Huh? What's this red button?"
2001805-49 = "There's a big red button near the gun holder..."
2001805-50 = "How suspicious. What is this for?"
2001805-54 = "I'm at Schale, inside of Sensei's executive office."
2001805-55 = "Sensei has extrajudicial authority and can't be easily controlled by even the General Student Council, and this button is located where Sensei can access it at any time..."
2001805-56 = "It must be an emergency button only meant to be used in extremely urgent and dangerous situations."
2001805-57 = "For example, maybe a button to summon every student in Kivotos..."
2001805-58 = "Or for activating an ancient weapon dormant in the basement of Schale..."
2001805-59 = "Or for launching the whole Sanctum Tower...?"
2001805-60 = "Whatever it is, it must have huge consequences beyond my wildest dreams!"
2001805-61 = "Just fantasizing about it gets me excited... I can't resist!"
2001805-62 = "*pant* *pant* ...I'm at my limit. I'm gonna press it... I'm gonna do it!"
2001805-63 = "...Yah!"
2001805-68 = "Wh-What?! Water is pouring down from the ceiling!"
2001805-69 = "Argh, it's cold!"
2001805-73 = "[ns] \"I'm back...\""
2001805-75 = "[ns] \"Whoa! Why is there water everywhere?!\""
2001805-76 = "That's what I was gonna ask!"
2001805-77 = "Sensei, what's this button for?"
2001805-78 = "[s5] \"Moe, I told you to stay still. That's an emergency shower button.\"\n[s6] \"Did you start snooping and press the emergency shower button?\""
2001805-79 = "...Emergency shower button?"
2001805-80 = "...Emergency shower button?"
2001805-81 = "This suspicious red button...was just to activate the emergency shower...?"
2001805-82 = "[s7] \"Many students visit Schale for a lot of problems. You never know.\" \n[s8] \"I made that red button so that I could respond quickly in an emergency.\""
2001805-87 = "[ns9] \"I told you not to touch anything, though...\"\n[ns10] \"I'm a bit disappointed, Moe.\""
2001805-88 = "Don't give me that disappointed look! I'm disappointed!"
2001805-89 = "I'm the one who's disappointed!"
2001805-93 = "Do you know how excited I was to press the button?!"
2001805-94 = "I was expecting destruction on a catastrophic level!"
2001805-95 = "I expected a missile launch at the very least!"
2001805-96 = "But I just took a shower instead!"
2001805-97 = "You're responsible for disappointing me!"
2001805-99 = "I tried to calm Moe for a while, who was angry at me for some reason I still don't understand."

2001805-1 = "#title;Unexploded Ordnance"
2001805-2 = "#na;(모에가 샬레의 당번 업무를 위해 사무실을 찾아왔다.)"
2001805-3 = "3;모에;02;안녕, 선생님. 오늘의 당번 업무도 잘 부탁해.\n#3;em;[음표]\n#3;a"
2001805-4 = "3;모에;09;쿠후후…… 당번 업무를 핑계로 선생님의 컴퓨터에 어떤 파일이 저장되어 있는지, 이리저리 살펴볼 생각을 하니 벌써부터 흥분되는걸……\n#3;stiff"
2001805-5 = "[s1] \"그다지 재미있는 건 발견하지 못할 거야.\"\n[s2] \"모에가 온다고 해서 컴퓨터의 데이터를 미리 다른 곳에 빼놨거든.\""
2001805-6 = "3;모에;06;쳇…… 쓸데없는 짓을.\n#3;em;[속상함]"
2001805-7 = "3;모에;06;쳇…… 쓸데없는 짓을.\n#3;em;[속상함]"
2001805-8 = "3;모에;05;설마…… 지난번의 일을 아직도 신경 쓰고 있는 거야?"

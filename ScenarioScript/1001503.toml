[translation]
1001503-1 = "愛麗絲任務～接著成為傳說～"
1001503-2 = "今天是非常適合冒險的一天呢。"
1001503-3 = "這麼說來，因為愛麗絲的等級提升了，所以開放了一些新的功能。"
1001503-4 = "[s1] 「是什麼功能呢？」\n[s2] 「比方說？」"
1001503-5 = "是道具探索功能。"
1001503-6 = "是道具探索功能。"
1001503-7 = "直接示範給老師看看吧。"
1001503-11 = "[s3] 「愛，愛麗絲！？你在做什麼！？」\n[s4] 「為什麼突然把垃圾桶弄倒了！？」"
1001503-12 = "只要這麼做就能獲得道具。"
1001503-13 = "只要這樣做就能獲得道具。"
1001503-14 = "[s5] 「……！？」\n[s6] 「什麼意思！？」"
1001503-15 = "……？老師不知道嗎？"
1001503-16 = "……？老師不知道嗎？"
1001503-17 = "在這種地方就能撿到道具唷。之前玩的RPG和橫向卷軸動作遊戲都是這樣的。"
1001503-18 = "啊，在垃圾堆裡發現了回復道具！"
1001503-19 = "老師請看，愛麗絲發現了「被人吃掉一半的漢堡」！"
1001503-20 = "[s7] 「愛麗絲，那個不能吃！」\n[s8] 「吃了那個的話體力會減少的！」"
1001503-21 = "……是這樣嗎？"
1001503-22 = "……是這樣嗎？"
1001503-23 = "……會受到傷害的意思對吧。愛麗絲也不喜歡受傷。"
1001503-24 = "也不能在這裡浪費恢復魔法……"
1001503-25 = "這個就先放著不管，繼續出發吧。"
1001503-26 = "[s] 「嗯，接下來去哪好呢？」"
1001503-27 = "今天愛麗絲想去平常不會去的地方看看。"
1001503-28 = "當然，老師也會一起來的對吧？"
1001503-29 = "[s9] 不能放著不管所以一起去\n[s10] 因為擔心所以一起去"
1001503-30 = "那就出發吧！"
1001503-31 = "那就出發吧！"
1001503-33 = "千年．郊外"
1001503-34 = "……回過神來竟然已經到這種地方了。"
1001503-35 = "已經搞不清楚這是哪條路了呢……這裡是哪裡呢？"
1001503-36 = "[s11] 「是個荒無人煙的地方呢……」\n[s12] 「通常這種地方都會有不良分子在……」"
1001503-43 = "發現獵物！"
1001503-44 = "嘿嘿嘿嘿！"
1001503-45 = "！！"
1001503-46 = "[s13] 「我就知道會這樣！」\n[s14] 「必然的展開！」"
1001503-47 = "好像是個有錢的傢伙，還挺幸運的嘛？"
1001503-48 = "好像是個有錢的傢伙，還挺幸運的嘛？"
1001503-49 = "嘿嘿嘿，不把錢都交出來的話可是要吃苦頭的哦？"
1001503-50 = "……？"
1001503-51 = "……"
1001503-52 = "明白了，這是在野外會遇到的怪物對吧。"
1001503-53 = "（轟──！）"
1001503-54 = "蛤？"
1001503-55 = "什，什麼，那個武器是？"
1001503-56 = "那麼，愛麗絲會使出全力！"
1001503-57 = "[s] 「等，愛麗絲你等──」"
1001503-58 = "──────光呀！"
1001503-60 = "（咻咚咚咚咚──────！）"
1001503-63 = "（不良分子們像是被踩扁的寶特瓶一樣倒在地上）"
1001503-65 = "……？"
1001503-66 = "……真是奇怪呢，老師。明明打倒他們了卻沒有獲得經驗值。"
1001503-67 = "而且，也沒有掉出報酬。"
1001503-68 = "啊，是不是要手動回收金錢的那種系統呢。"
1001503-69 = "[s15] 「不不不，愛麗絲你等等！」\n[s16] 「這樣一來愛麗絲你比較像不良分子吧！？」"
1001503-73 = "（總算是阻止了打算在倒在地上的不良分子的口袋裡尋找戰利品的愛麗絲）"

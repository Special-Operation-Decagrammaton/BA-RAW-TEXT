[translation]
1001503-1 = "Aris' Quest: To Become a Legend"
1001503-2 = "Today is an excellent opportunity to go on an adventure."
1001503-3 = "Aris has unlocked many more features after leveling up."
1001503-4 = "[s1] \"What kind of features?\"\n[s2] \"For example?\""
1001503-5 = "Item looting."
1001503-6 = "Item looting."
1001503-7 = "Let me show you."
1001503-11 = "[s3] \"Aris? What are you doing?\"\n[s4] \"Why are you breaking that trash can?!\""
1001503-12 = "You can usually get a lot of items by doing this."
1001503-13 = "You can usually get a lot of items by doing this."
1001503-14 = "[s5] \"...?!\"\n[s6] \"That doesn't make any sense!\""
1001503-15 = "Do you not understand? It is basic design."
1001503-16 = "Do you not understand? It is basic design."
1001503-17 = "That is how it was in the RPG I just played, as well as the side-scrolling action game from a few days ago."
1001503-18 = "Oh! I found a recovery item in the pile of trash."
1001503-19 = "See, Sensei? I found someone's leftover hamburger!"
1001503-20 = "[s7] \"You can't do this, Aris!\"\n[s8] \"If you eat that, your HP will decrease even more!\""
1001503-21 = "Are you sure?"
1001503-22 = "Are you sure?"
1001503-23 = "...You must mean that it is secretly poison. I do not like poison."
1001503-24 = "I cannot waste a recovery spell on something like this."
1001503-25 = "We should keep moving."
1001503-26 = "[s] \"Are we going on another walk?\""
1001503-27 = "I would like to go somewhere completely new to me today."
1001503-28 = "And I would like you to come with me, naturally."
1001503-29 = "[s9] \"(I can't just leave her like this. I should go with her.)\"\n[s10] \"(I should go with her, for my own peace of mind.)\""
1001503-30 = "Ready, set, go!"
1001503-31 = "Ready, set, go!"
1001503-33 = "At the Millennium Border"
1001503-34 = "We have managed to come this far."
1001503-35 = "Though I am not sure where exactly this is. Do you know?"
1001503-36 = "[s11] \"There aren't too many people here...\"\n[s12] \"It doesn't feel like a very friendly neighborhood...\""
1001503-43 = "Check it out! Fresh meat!"
1001503-44 = "Heh heh heh!"
1001503-45 = "...!"
1001503-46 = "[s13] \"I knew this would happen!\"\n[s14] \"That didn't take long!\""
1001503-47 = "Who'da thunk we'd fine such prime targets all the way out here? It must be our lucky day!"
1001503-48 = "Who'da thunk we'd find such prime targets all the way out here? It must be our lucky day!"
1001503-49 = "Heh heh. Hand over everything you got or you'll be sorry."
1001503-50 = "...?"
1001503-51 = "..."
1001503-52 = "I understand now. This must be a random monster encounter in the field."
1001503-53 = "*click*"
1001503-54 = "Huh?"
1001503-55 = "Wh-What kind of weapon is that?!"
1001503-56 = "Then I will show you no mercy!"
1001503-57 = "[s] \"Aris! Don't!\""
1001503-58 = "Blinding Light!"
1001503-60 = "*boooooom*"
1001503-63 = "The miscreants crumpled to the ground like a pile of crushed aluminum cans."
1001503-65 = "...?"
1001503-66 = "That is strange. I defeated them, but I did not receive any EXP."
1001503-67 = "And there are no rewards."
1001503-68 = "Perhaps I am supposed to loot them manually."
1001503-69 = "[s15] \"You can stop there, Aris!\"\n[s16] \"You'll be no better than them if you do that!\""
1001503-73 = "I had to convince Aris not to rummage through the thugs' pockets."

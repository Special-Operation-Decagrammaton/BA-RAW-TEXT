[translation]
1001503-1 = "อาริสึเควส ~ มุ่งสู่ตำนาน~"
1001503-2 = "วันนี้เป็นวันที่เหมาะต่อการออกเดินทางผจญภัยเลยนะคะ"
1001503-3 = "อาริสึได้ปลดล็อกฟังก์ชั่นเพิ่มเพราะเลเวลอัปค่ะ"
1001503-4 = "[s1] \"ฟังก์ชั่นอะไรน่ะ?\"\n[s2] \"อย่างเช่นอะไรเหรอ?\""
1001503-5 = "เก็บไอเทมค่ะ"
1001503-6 = "เก็บไอเทมค่ะ"
1001503-7 = "อาริสึจะแสดงให้ดูนะคะ"
1001503-11 = "[s3] \"อาริสึ ทะ...ทำอะไรน่ะ?\"\n[s4] \"จู่ๆ มาทำลายถังขยะข้างๆ ครูทำไมน่ะ?!\""
1001503-12 = "ปกติแล้วถ้าทำแบบนี้ก็จะได้ไอเทมนี่คะ"
1001503-13 = "ปกติแล้วถ้าทำแบบนี้ก็จะได้ไอเทมนี่คะ"
1001503-14 = "[s5] \"...?!\"\n[s6] \"เป็นไปไม่ได้!\""
1001503-15 = "คุณครูไม่รู้เหรอคะ? นี่คือความรู้รอบตัวนะคะ"
1001503-16 = "คุณครูไม่รู้เหรอคะ? นี่คือความรู้รอบตัวนะคะ"
1001503-17 = "มีในเกม RPG ที่เราเล่นไปครั้งก่อน เกมเลื่อนฉากไปด้านข้างที่เคยเล่นเมื่อนานมาแล้วก็มีค่ะ"
1001503-18 = "อ๊ะ เจอไอเทมฟื้นฟูในกองขยะ!"
1001503-19 = "ดูสิคะ คุณครู เจอแฮมเบอร์เกอร์ที่ใครสักคนกินทิ้งไว้ค่ะ"
1001503-20 = "[s7] \"อะ... อาริสึหยุดก่อน!\"\n[s8] \"ถ้ากินอันนั้นแล้ว HP จะลดลง!\""
1001503-21 = "...ไม่ควรกินเหรอคะ?"
1001503-22 = "...อย่างนั้นเหรอคะ?"
1001503-23 = "...มันจะทำให้เจ็บตัวกว่าเดิมสินะคะ อาริสึไม่อยากบาดเจ็บค่ะ"
1001503-24 = "ที่นี่เราใช้เวทฟื้นฟูสุ่มสี่สุ่มห้าไม่ได้ค่ะ"
1001503-25 = "ถ้างั้นก็มาเดินหน้าต่อกันเถอะค่ะ"
1001503-26 = "[s] \"เดินเล่นอีกเหรอ\""
1001503-27 = "วันนี้อาริสึอยากไปที่ที่ไปไม่ได้ในเวลาปกติค่ะ"
1001503-28 = "คุณครูก็ต้องมาด้วยกันนะคะ"
1001503-29 = "[s9] (ครูปล่อยให้ไปคนเดียวไม่ได้เลยไปด้วยกัน)\n[s10] (ไปด้วยกันเพราะเป็นห่วง)"
1001503-30 = "ถ้างั้นออกเดินทางกันเลยค่ะ!"
1001503-31 = "ถ้างั้นออกเดินทางกันเลยค่ะ!"
1001503-33 = "เขตแลกเปลี่ยนในมิลเลเนียม"
1001503-34 = "...แล้วก็มาถึงที่นี่ซะแล้วค่ะ"
1001503-35 = "น่าจะหลงทางนะคะ ...ที่นี่คือที่ไหนเหรอคะ?"
1001503-36 = "[s11] \"เหมือนจะไม่มีใครอยู่...\"\n[s12] \"ที่แบบนี้จะมีพวกนักเลง...\""
1001503-43 = "เจอเหยื่อแล้ว!"
1001503-44 = "วะฮาฮาฮาฮาฮ่า!"
1001503-45 = "!!"
1001503-46 = "[s13] \"นึกแล้วเชียว!\"\n[s14] \"พูดไม่ทันขาดคำเลย!\""
1001503-47 = "โชคดีจริงๆ ที่เจอพวกกระเป๋าหนักในที่แบบนี้"
1001503-48 = "โชคดีจริงๆ ที่เจอพวกกระเป๋าหนักในที่แบบนี้"
1001503-49 = "วะฮาฮ่า! ส่งเงินมาให้หมด ไม่งั้นได้เจอดีแน่"
1001503-50 = "...?"
1001503-51 = "......"
1001503-52 = "เข้าใจแล้วค่ะ เดินเล่นอยู่แต่ก็มีพวกมอนสเตอร์มาโจมตีสินะคะ"
1001503-53 = "(แกร็ก!)"
1001503-54 = "หืม?"
1001503-55 = "นะ... นั่นมันอาวุธเรอะ?!"
1001503-56 = "ถ้าอย่างนั้นแล้ว ฉันจะทำให้เต็มที่ค่ะ!"
1001503-57 = "[s] \"อาริสึหยุดก่อน!\""
1001503-58 = "————ลำแสงทำลายล้าง!"
1001503-60 = "(ตู้มมมมมมม!)"
1001503-63 = "(พวกนักเลงกลิ้งไปบนพื้นเหมือนขวดน้ำที่บุบบู้บี้)"
1001503-65 = "...?"
1001503-66 = "...แปลกจังค่ะ คุณครู มอนสเตอร์ล้มลงแล้วแต่ EXP ของฉันไม่เพิ่มเลยค่ะ"
1001503-67 = "แล้วก็ไม่ได้รางวัลด้วยค่ะ"
1001503-68 = "อ่า... เหรียญทองน่าจะเป็นระบบเก็บเองหรือเปล่านะคะ"
1001503-69 = "[s15] \"อาริสึหยุดก่อน!\"\n[s16] \"ถ้าทำอย่างนั้น เธอจะกลายเป็นนักเลงนะ!\""
1001503-73 = "(คุณครูจัดการไม่ให้อาริสึหยิบกระเป๋าตังค์ของพวกแยงกี้สาวที่ล้มไว้ได้)"

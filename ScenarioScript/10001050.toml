[translation]
10001050-1 = "#title;제5화;낮잠 자기 좋은 장소"
10001050-2 = "#place;붉은겨울 학원 구교사"
10001050-3 = "3;체리노;06;하암…… 졸려…….\n#3;em;[속상함]\n#3;stiff\n#3;a"
10001050-4 = "1;토모에;02;낮잠 시간까지는 시간이 아직 남았는데…… 벌써 졸리신가요, 회장님?\n#1;em;[반응]\n#1;ar\n#3;m5"
10001050-5 = "3;체리노;06;아까 단 걸 많이 먹어서 그런가…… 자꾸 눈꺼풀이 감기고 잠이 와…….\n#3;stiff"
10001050-6 = "1;토모에;01;그러고보니 오늘은 구교사로 이동하느라 오랫동안 산행을 하기도 했으니까요. 피곤하실 만도 하네요."
10001050-7 = "[s] \"절반은 내가 업고 이동했지만 말이야.\""
10001050-8 = "1;토모에;05;그게 무슨 말씀이신가요, 선생님? 아무리 등에 업혀서 이동했다고는 하지만 산행은 산행!\n#3;dr\n#1;m3\n#1;em;[!]"
10001050-9 = "1;토모에;01;사무국에 틀어박혀 거의 움직이지 않던 회장님께 갑작스러운 산행은 격무나 다름이 없었을 겁니다."
10001050-10 = "1;토모에;05;이대로는 작전을 진행할 수 없겠네요. 회장님의 피로가 풀릴 때까지 근처에서 휴식을 취하도록 하죠!"
10001050-11 = "#zmc;instant;316,-90;1600\n#all;hide"
10001050-12 = "#zmc;instant;316,-90;1600\n3;토모에;00;자, 회장님. 이곳 구교사의 휴게실에서 잠시 낮잠을 주무시는 게 어떠신가요?\n#3;em;[반짝]\n#3;a"
10001050-13 = "#zmc;instant;316,-90;1600\n1;체리노;06;구교사는 싫어…… 곰이 나온다잖아…….\n#1;em;[속상함]\n#1;a\n#3;m5"
10001050-14 = "#zmc;instant;316,-90;1600\n3;토모에;01;곰이 나온다면 제가 쫓아낼 테니 걱정 마세요!"
10001050-15 = "#zmc;instant;316,-90;1600\n1;체리노;06;게다가 이불 속에서 벌레가 기어 다니는 것도 싫어…….\n#1;stiff"
10001050-16 = "#zmc;instant;316,-90;1600\n3;토모에;06;이를 어쩌죠. 회장님이 안심하고 낮잠을 주무실만한 장소가 이 근처에 또 있으려나…….\n#3;em;[땀]"
10001050-17 = "#zmc;instant;316,-90;1600\n1;체리노;01;낮잠 장소라면 내게도 좋은 생각이 있지.\n#1;em;[반응]"
10001050-18 = "#zmc;instant;316,-90;1600\n3;토모에;00;부디 의견을."
10001050-19 = "#zmc;instant;316,-90;1600\n1;체리노;99;시끄럽지도 않고, 적당히 따듯하며, 기분 좋은 냄새가 솔솔 풍기는 곳. 낮잠을 자기에 딱 좋은 최적의 장소, 그곳은 바로……\n#1;em;…\n#1;m3\n#3;dr"
10001050-20 = "#zmc;instant;316,-90;1600\n1;체리노;00;도서관이니라!\n#1;closeup"
10001050-21 = "#zmc;instant;316,-90;1600\n[s] \"도서관?\""
10001050-22 = "#zmc;instant;316,-90;1600\n#all;hide"
10001050-23 = "#zmc;instant;316,-90;1600\n3;체리노;03;트리니티 학원의 대도서관에 비할 바는 아니지만, 우리 붉은겨울 학원에도 훌륭한 도서관이 하나 있지.\n#3;em;[음표]"
10001050-24 = "#zmc;instant;316,-90;1600\n3;체리노;02;시끄럽게 떠드는 학생도 없고, 어둑어둑하니 눈이 피로하지도 않고……"
10001050-25 = "#zmc;instant;316,-90;1600\n3;체리노;01;심지어 베고 자기 좋은 딱딱한 책도 가득 있으니, 그야말로 낮잠을 위한 공간이라 해도 과언이 아니다!"
10001050-26 = "#zmc;instant;316,-90;1600\n3;체리노;03;이 몸도 실각되기 전에는 낮잠을 자러 도서관을 자주 애용했느니라!\n#3;em;[재잘]\n#3;hophop"
10001050-27 = "#zmc;instant;316,-90;1600\n[s1] \"자랑이 아니잖아.\"\n[s2] \"나도 도서관에서 낮잠 자는 거 좋아해.\""
10001050-28 = "#zmc;instant;316,-90;1600\n3;체리노;01;안락한 낮잠 장소를 구하는 것은 중대 사항일세, 콤라드! 낮잠을 제대로 자지 못하면 오후 과업에 지장이 생기게 된다고?\n#3;em;[!]"
10001050-29 = "#zmc;instant;316,-90;1600\n3;체리노;01;그렇지? 역시 콤라드라면 알아줄 거라고 생각했느니라!\n#3;em;[반응]"
10001050-30 = "#zmc;instant;316,-90;1600\n3;체리노;99;하지만 이 계획에는 중대한 문제가 하나 있네, 콤라드."
10001050-31 = "#zmc;instant;316,-90;1600\n3;체리노;01;붉은겨울 학원의 도서관에는 이 몸에게 사사건건 반항하는 못된 반동분자들이 머무르고 있기 때문이다!"
10001050-32 = "#zmc;instant;316,-90;1600\n3;체리노;02;그 반동분자들의 정체는 책을 좋아하다 못해 인가되지 않은 불법 서적들까지 탐독하려는 책벌레들의 모임, 지…… 지식……\n#3;em;…"
10001050-33 = "#zmc;instant;316,-90;1600\n3;체리노;04;뭐였더라?\n#3;em;[땀]\n#3;stiff"
10001050-34 = "#zmc;instant;316,-90;1600\n1;토모에;99;<지식해방전선>입니다.\n#1;ar"
10001050-35 = "#zmc;instant;316,-90;1600\n1;토모에;01\n3;체리노;05;그래, 지식해방전선이다! #n녀석들은 도서관에서는 책만 읽어야 한다는 궤변을 늘어놓으며 그동안 이 몸의 낮잠을 방해해왔다!\n#3;em;[!]\n#3;hophop\n#1;dl"
10001050-36 = "#zmc;instant;316,-90;1600\n3;체리노;01;그 녀석들을 물리치고 안락한 낮잠 장소를 확보하는 것이, 지금 우리에게 주어진 제1의 목표이니라!\n#3;em;[반응]\n#1;hide"
10001050-37 = "#zmc;instant;316,-90;1600\n3;토모에;03;과연, 체리노 회장님! 졸음이 쏟아지는 와중에도 사무국을 탈환하기 위한 계획을 세우고 계셨군요!\n#3;em;[!]"
10001050-38 = "#zmc;instant;316,-90;1600\n3;체리노;02;어, 어라? 사무국? 나는 지금 낮잠에 관한 이야기를 하고 있다만……."
10001050-39 = "#zmc;instant;316,-90;1600\n1;토모에;00;붉은겨울 학원 도서관은 쉽게 접근하기 어려운 언덕 위에 있는 천혜의 요새! 이곳을 점거한다면 사무국을 공격하기 위한 요충지로 사용할 수 있겠지요!\n#1;ar\n#3;m5"
10001050-40 = "#zmc;instant;316,-90;1600\n1;토모에;05;게다가 지식해방전선은 붉은겨울 학원에서도 세 손가락 안에 들어가는 숫자의 학생을 보유한 거대 동아리!"
10001050-41 = "#zmc;instant;316,-90;1600\n1;토모에;03;이들을 아군으로 끌어들일 수 있다면 마리나 위원장의 친위대를 상대하는 데 큰 도움이 될 겁니다!\n#1;em;[!]\n#1;greeting"
10001050-42 = "#zmc;instant;316,-90;1600\n1;토모에;99;이렇게 짧은 시간 동안 완벽한 전략을 짜내시다니……"
10001050-43 = "#zmc;instant;316,-90;1600\n1;토모에;01;역시 체리노 회장님이시군요!\n#1;em;[하트]"
10001050-44 = "#zmc;instant;316,-90;1600\n3;체리노;02;그, 그런가? 헤헤, 헤헤헤…….\n#3;em;[///]\n#3;stiff"
10001050-45 = "#zmc;instant;316,-90;1600\n3;체리노;01;하지만 그렇게 칭찬해 봤자 아무것도 나오지 않는다고!"
10001050-46 = "#zmc;instant;316,-90;1600\n1;토모에;05;쇠뿔도 단김에 뽑으라고, 계획도 결정되었으니 바로 도서관으로 가시죠!\n#1;em;[반응]"
10001050-47 = "#zmc;instant;316,-90;1600\n3;체리노;99;하아암…… 좋아.\n#3;m3\n#1;dl"
10001050-48 = "#zmc;instant;316,-90;1600\n3;체리노;03;그럼 이 몸의 안락한 낮잠을 위해, 출발!\n#3;em;[음표]\n#3;hophop"
10001050-49 = "#all;hide"
10001050-50 = "#place;붉은겨울 학원 도서관"
10001050-51 = "3;모미지;07;헤헤, 드디어 구했다고요! 루리엘 선생님의 신작 샤를X레이 동인지……!\n#3;stiff\n#3;em;[///]\n#3;a"
10001050-52 = "3;모미지;99;트리니티 학원 내의 즉매회에서만 한정 판매된 작품이라 거의 포기했었는데……"
10001050-53 = "3;모미지;03;이번에는 운이 좋았네요!\n#3;hophop\n#3;em;[반짝]"
10001050-54 = "3;모미지;07;아아, 이번 작품에서는 어떤 멋진 이야기로 두 사람의 사랑을 묘사해주셨을까요?"
10001050-55 = "3;모미지;03;이번 주말에는 나가지 말고 온종일 도서관에 틀어박혀서 느긋하게 이 작품을 감상해야겠어요. 헤헤…….\n#3;em;[하트]"
10001050-56 = "[s] \"그것참 멋진 휴일 계획이네.\""
10001050-57 = "3;모미지;04;흐, 흐엑? 선생님? 그리고 체, 체리노 회장까지?\n#3;em;[?!]\n#3;shake"
10001050-58 = "3;모미지;06;어, 언제부터 이곳에 계셨나요?"
10001050-59 = "5;체리노;02;아까 전부터 있었다만. \n#5;al\n#3;m1"
10001050-60 = "[s] \"신작 동인지를 구했다는 대목부터?\""
10001050-61 = "3;모미지;06\n5;체리노;02\n#3;h"
10001050-62 = "3;모미지;04;처음부터 보고 계셨잖아요!\n#3;em;[땀]"
10001050-63 = "3;모미지;06;으으…… 가, 갑자기 연락도 없이 <지식해방전선>에는 어쩐 일로…….\n#3;stiff"
10001050-64 = "5;체리노;01;잘 물어보았다!\n#5;em;[반응]"
10001050-65 = "5;체리노;99;이 몸이 이곳에 온 이유는—"
10001050-66 = "3;모미지;06\n5;체리노;01\n#3;h"
10001050-67 = "3;모미지;05;아니, 말씀하시지 않아도 알겠어요. 저희 지식해방전선의 소중한 장서들을 압수하러 오신 거죠?\n#3;em;[!]\n#3;m3\n#3;hophop"
10001050-68 = "3;모미지;05\n5;체리노;04;아니, 책을 압수하러 온 게 아니라—\n#5;em;[땀]\n#5;stiff"
10001050-69 = "3;모미지;05\n5;체리노;04\n#3;h"
10001050-70 = "3;모미지;05;하지만 이 책만큼은 안 돼요! 아직 제대로 읽지도 못했단 말이에요!"
10001050-71 = "3;모미지;05\n5;체리노;04;잠깐, 그러니까 이 몸이 이곳에 온 이유는—"
10001050-72 = "3;모미지;99;최소한 세 번은……\n#3;em;…"
10001050-73 = "3;모미지;05;아니, 열 번은 정독하게 해주세요! 정말 구하기 힘들었단 말이에요!\n#3;em;[!]\n#3;hophop"

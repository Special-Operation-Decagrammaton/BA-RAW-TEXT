10001050-76 = "3;모미지;04\n5;체리노;05;사람의 말을 들어! 그런 시시한 책에 이 몸은 관심 없느니라!\n#5;hophop\n#3;m1"
10001050-77 = "3;모미지;02;……네?\n#3;em;[?!]\n#3;shake"

[translation]
10001050-1 = "ตอนที่ 5;สวรรค์แห่งการนอนกลางวัน"
10001050-2 = "อาคารเรียนเก่า สหภาพเรดวินเทอร์"
10001050-3 = "ฮ้าวว... ง่วงจัง..."
10001050-4 = "ยังไม่ถึงเวลานอนกลางวันเลย... ง่วงแล้วเหรอคะท่านประธาน?"
10001050-5 = "หรือว่าเพราะกินของหวานมากเกินไปนะ... ตอนนี้หนังตาเราจะปิดแล้ว....."
10001050-6 = "จะว่าไป การมาที่อาคารเรียนเก่าในวันนี้เหมือนกับเราได้เดินเขาเลย#nไม่แปลกหรอกค่ะที่จะเหนื่อยและง่วง"
10001050-7 = "[s] \"แต่ครูแบกเธอมาครึ่งทางเลยนะ\""
10001050-8 = "พูดอะไรอย่างนั้นล่ะคะคุณครู? ถึงท่านประธานจะขี่หลังใครมา แต่นี่ก็คือการเดินเขานะคะ!"
10001050-9 = "ท่านประธานต้องทำงานในสำนักเลขาธิการจนไม่ได้ขยับตัวไปไหนเลย#nการมาเดินขึ้นเขาแบบนี้เป็นงานหินมากเลยนะคะ"
10001050-10 = "ถ้าร่างกายเหนื่อยแบบนี้เราคงวางกลยุทธ์ต่อไม่ได้#nเราไปพักผ่อนจนกว่าท่านประธานจะหายเหนื่อยกันดีกว่าค่ะ"
10001050-12 = "ท่านประธานคะ ไปนอนกลางวันในห้องพักผ่อนของอาคารเรียนเก่าก่อนไหมคะ?"
10001050-13 = "ไม่เอาด้วยหรอก... ในอาคารเรียนเก่ามีหมีไม่ใช่เหรอ...."
10001050-14 = "ถ้ามีหมีโผล่มาฉันจะไล่ให้เอง ไม่ต้องห่วงหรอกค่ะ!"
10001050-15 = "แต่ที่นี่มีแมลงออกมาจากผ้าห่มด้วยนะ เราไม่ชอบอะไรแบบนั้นเลย......"
10001050-16 = "ทำยังไงดีล่ะคะ? แถวนี้จะมีที่ให้ท่านประธานได้นอนกลางวันอย่างปลอดภัยและสบายใจไหมนะ..."
10001050-17 = "ถ้าเป็นเรื่องนอนกลางวันล่ะก็ เราเองก็มีไอเดียดีๆ อยู่นะ"
10001050-18 = "บอกมาได้เลยค่ะ"
10001050-19 = "ที่ที่ไม่หนวกหู อบอุ่นพอดี และมีกลิ่นหอมฟุ้งกระจายให้อารมณ์ดี...#nที่ที่เหมาะกับการนอนกลางวันเป็นที่สุด ที่นั้นก็คือ..."
10001050-20 = "ห้องสมุดยังไงล่ะ!"
10001050-21 = "[s] \"ห้องสมุด?\""
10001050-23 = "ถึงจะยังเทียบกับห้องสมุดของสถาบันทรีนิตี้ไม่ได้#nแต่ที่สหภาพเรดวินเทอร์ของเราก็มีห้องสมุดยอดเยี่ยมอยู่แห่งนึง"
10001050-24 = "ไม่มีนักเรียนที่ส่งเสียงหนวกหู แถมยังมืดตึดตื๋อจนตาได้พักผ่อนอย่างจริงจัง"
10001050-25 = "แถมยังมีหนังสือเล่มหนาที่เอามาหนุนหัวนอนได้ด้วย นี่แหละสวรรค์แห่งการนอนกลางวันที่แท้จริง!"
10001050-26 = "ก่อนที่เราจะถูกปลดออก เราแอบไปนอนกลางวันที่ห้องสมุดอยู่บ่อยๆ!"
10001050-27 = "[s1] \"มันใช่เรื่องที่ต้องคุยโม้ไหมน่ะ\"\n[s2] \"ครูก็ชอบนอนกลางวันในห้องสมุดเหมือนกัน\""
10001050-28 = "การเฟ้นหาที่นอนกลางวันเป็นเรื่องสำคัญนะสหาย! หากไม่ได้นอนกลางวันดีๆ ล่ะก็#nเราไม่มีแรงทำงานในช่วงบ่ายหรอก"
10001050-29 = "ใช่ไหมล่ะ? คิดไว้อยู่แล้วว่าเราต้องใจตรงกัน!"
10001050-30 = "แต่ว่า... แผนนี้มีปัญหาสำคัญอยู่อย่างหนึ่งล่ะสหาย"
10001050-31 = "ก็ตอนนี้ที่ห้องสมุดของสหภาพเรดวินเทอร์มีผู้ต่อต้านนิสัยไม่ดีที่ขัดขวางการนอนของเราอยู่น่ะสิ!"
10001050-32 = "ผู้ต่อต้านที่ว่าก็คือกลุ่มหนอนหนังสือที่หมกมุ่นกับการอ่านหนังสือ#nแม้แต่หนังสือต้องห้ามก็ยังจะหาอ่าน! พวกนี้เรียกตัวเองว่า... ชมรมปลดปล่อย..."
10001050-33 = "ปลดปล่อยอะไรนะ...?"
10001050-34 = "<ชมรมแนวร่วมปลดปล่อยความรู้> ค่ะ"
10001050-35 = "ใช่! ชมรมแนวร่วมปลดปล่อยความรู้! พวกนี้เอาแต่พูดว่าห้องสมุดควรมีไว้ให้อ่านหนังสืออย่างเดียว แล้วแบบนี้เราจะไปนอนกลางวันได้ยังไง!"
10001050-36 = "การขับไล่ชมรมนั้นแล้วเอาที่นอนกลางวันกลับมาคือเป้าหมายลำดับที่ 1 ของเรา!"
10001050-37 = "ว้าวว ท่านประธานเชริโน่! ถึงจะง่วงนอนขนาดนี้ แต่ก็ยังคิดแผนการชิงสำนักเลขาธิการ#nกลับมาอีกสินะคะ!"
10001050-38 = "ว่าไงนะ? สำนักเลขาธิการเหรอ? เราพูดแต่เรื่องการนอนกลางวันนะ..."
10001050-39 = "ห้องสมุดของสหภาพเรดวินเทอร์คือป้อมปราการธรรมชาติที่อยู่บนเนินเขาที่เข้าถึงได้ยาก!#nถ้ายึดที่นี่ได้ เราก็จะใช้เป็นจุดยุทธศาสตร์ในการโจมตีสำนักเลขาธิการได้ค่ะ!"
10001050-40 = "แถมชมรมแนวร่วมปลดปล่อยความรู้ยังเป็นหนึ่งในสามชมรมที่ใหญ่ที่สุดของสหภาพเรดวินเทอร์!"
10001050-41 = "ถ้าดึงคนพวกนี้มาเป็นคนของเราได้ล่ะก็ เราก็น่าจะเผชิญหน้ากับกองกำลังป้องกันของมารินะได้ค่ะ!"
10001050-42 = "คิดกลยุทธ์ที่สมบูรณ์แบบในเวลาอันแสนสั้นแบบนี้ได้..."
10001050-43 = "นี่แหละค่ะท่านประธานเชริโน่ผู้ยิ่งใหญ่ของพวกเรา!"
10001050-44 = "งะ... งั้นเหรอ? แหะๆ แหะๆๆ......"
10001050-45 = "แต่ถึงจะชมไปก็ไม่ได้ทำให้สถานการณ์ดีขึ้นหรอก!"
10001050-46 = "ก็จริงค่ะ ไหนๆ เราก็ตัดสินใจแล้วว่าจะใช้แผนการอะไร งั้นรีบไปที่ห้องสมุดดีกว่าค่ะ!"
10001050-47 = "ฮ้าวว~ zZZ .... ดีล่ะ"
10001050-48 = "งั้นไปนอนกลางวันให้สบายใจเลย!"
10001050-50 = "ห้องสมุด สหภาพเรดวินเทอร์"
10001050-51 = "ในที่สุดก็ได้มาแล้ว! หนังสือ [ชาร์ล x เรย์] เล่มใหม่ของคุณรูริเอล"
10001050-52 = "นี่เป็นหนังสือลิมิเต็ดเอดิชั่นที่ขายเฉพาะในสถาบันทรีนิตี้เท่านั้น ฉันเกือบจะถอดใจไปแล้วเชียว..."
10001050-53 = "แต่ครั้งนี้เหมือนโชคจะเข้าข้างนะคะ!"
10001050-54 = "อยากรู้จังเลยค่ะว่ารอบนี้จะบรรยายความรักของทั้งสองคนไว้แบบไหน?"
10001050-55 = "สุดสัปดาห์นี้ฉันจะไม่ออกไปไหน แล้วหมกตัวอยู่แต่ในห้องสมุดเพื่ออ่านหนังสือนี้ค่ะ! ฮิฮิ..."
10001050-56 = "[s] \"นี่เป็นแพลนในวันหยุดที่เท่สุดๆ ไปเลย\""
10001050-57 = "ฮะ... เฮือก? คุณครู? แล้วก็... ปะ.. ประธานเชริโน่?"
10001050-58 = "มะ... มาที่นี่ตั้งแต่เมื่อไหร่เหรอคะ?"
10001050-59 = "มาอยู่ตั้งแต่เมื่อกี้แล้ว"
10001050-60 = "[s] \"ตั้งแต่บอกว่าได้หนังสือเล่มใหม่มา น่าจะช่วงๆ นั้นนะ\""
10001050-62 = "ก็ตั้งแต่แรกเลยนี่คะ!"
10001050-63 = "ว่าแต่... มาที่ <ชมรมแนวร่วมปลดปล่อยความรู้> ด้วยธุระอะไรเหรอคะ... ไม่เห็นบอกล่วงหน้าเลย#nว่าจะมา..."
10001050-64 = "ถามได้ดีแล้วล่ะ!"
10001050-65 = "ที่เรามาที่นี่ก็เพราะ..."
10001050-67 = "ไม่ต้องหรอกค่ะ ไม่ต้องบอกก็รู้ค่ะ จะมายึดหนังสือล้ำค่าที่ชมรมของเราเก็บไว้ใช่ไหมคะ?"
10001050-68 = "ไม่ใช่ เราไม่ได้มายึดหนังสือ..."
10001050-70 = "แต่ฉันให้เล่มนี้ไม่ได้หรอกนะคะ! ฉันยังอ่านไม่จบเล่มเลยค่ะ!"
10001050-71 = "เดี๋ยวฟังก่อนสิ ที่เรามาที่นี่ก็เพราะ..."
10001050-72 = "ขออ่านอย่างน้อย 3 รอบก่อน..."
10001050-73 = "ไม่สิ ขอฉันอ่านให้ครบ 10 รอบก่อนนะคะ! ก็หนังสือนี้มันหายากมากเลย!"
10001050-76 = "บอกให้ฟังเราพูดก่อนไง! เราไม่สนใจหนังสือไร้สาระแบบนี้หรอก!"
10001050-77 = "คะ...?"
10001050-78 = "แล้วมาที่นี่เพราะอะไรเหรอคะ?"
10001050-79 = "ฮุฮุ เหตุผลที่เรามาที่ห้องสมุดมันก็ชัดเจนอยู่แล้วไม่ใช่รึไง?"
10001050-80 = "ก็มานอนกลางวันไง!"
10001050-82 = "คะ??? แต่ห้องสมุดไม่ได้มีไว้นอนนี่คะ?"
10001050-83 = "เรื่องนั้นไม่ต้องพูดเราก็รู้อยู่แล้วล่ะ"
10001050-84 = "ไหนดูหน่อยซิ..."
10001050-89 = "อืมม ตรงนี้น่าจะดีนะ!"
10001050-90 = "อยู่ใกล้กับเตาผิง พื้นก็น่าจะอุ่นกำลังดี ส่วนชั้นหนังสือก็ทอดเงาได้อย่างน่าอัศจรรย์#nนี่แหละสภาพแวดล้อมที่เหมาะสมกับการนอนกลางวัน!"
10001050-91 = "โทโมเอะ เตรียมที่นอนกลางวันตรงนี้เลย"
10001050-93 = "ค่ะท่านประธาน ฉันจะเตรียมเครื่องนอนให้เดี๋ยวนี้เลยค่ะ"
10001050-99 = "ดะ.. เดี๋ยวก่อนสิคะ! ทำแบบนี้มันรบกวนนักเรียนที่จะมาอ่านหนังสือตรงนี้นะคะ!"
10001050-100 = "อีกอย่าง ถ้าจะนอนกลางวันแล้วจะสนใจชั้นหนังสือทำไมล่ะคะ?"
10001050-101 = "ก็เพื่อหาหนังสือเล่มหนาที่จะเอามาหนุนหัวไง"
10001050-102 = "อืม... ไหนดูหน่อยซิ มีเล่มไหนบ้างไหมนะที่หนาพอจะเอามาหนุนนอนได้..."
10001050-103 = "โอ้ว! <กล้วยไม้แวร์ซายส์~ ฉบับพิเศษครบรอบ 30 ปี> เล่มนี้น่าจะใช้ได้!"
10001050-104 = "ดะ.. เดี๋ยวค่ะ! เล่มนี้ไม่ได้เด็ดขาดค่ะ!"
10001050-105 = "หนังสือนี้พิมพ์ออกมาขายแค่ 100 เล่ม อย่าว่าแต่ในสหภาพเรดวินเทอร์เลยค่ะ#nตอนนี้หนังสือนี้เป็นหนังสือหายากในคิโวทอสแล้วค่ะ!"
10001050-106 = "ถ้าอยากได้อะไรหนาๆ มาหนุนนอนล่ะก็ ใช้สารานุกรมทางนี้ก็ได้นี่คะ?"
10001050-107 = "ไม่เอาด้วยหรอก นั่นมันแข็งเกินไปนะ"
10001050-108 = "เล่มนี้เป็นปกหนังด้วย ถ้าได้เอามานอนน่าจะนุ่มน่าดูเลย"
10001050-109 = "ฮึ่ม! ทำไมถึงมาดื้อดึงในห้องสมุดแบบนี้ล่ะคะ!? ถ้าอยากได้เครื่องนอนที่นุ่มๆ#nก็ไปนอนในสำนักเลขาธิการก็ได้นี่คะ!"
10001050-110 = "อ่า.. ไม่ได้หรอก"
10001050-111 = "ทำไมล่ะคะ?!"
10001050-112 = "ก็เพราะเราถูกไล่ออกมาจากสำนักเลขาธิการและถูกมารินะตามตัวอยู่ยังไงล่ะ"
10001050-113 = "จะให้ไปนอนกลางวันในสำนักเลขาธิการอย่างสบายเหมือนเคยไม่ได้"
10001050-114 = "ว่าไงนะคะ? ประธานเชริโน่... ถูกปลดอีกรอบแล้วเหรอคะ?"
10001050-115 = "[s] \"อีกรอบงั้นเหรอ?\""
10001050-116 = "นักเรียนที่หวังจะได้นั่งในตำแหน่งประธานของสหภาพเรดวินเทอร์ชอบก่อปฏิวัติกันน่ะค่ะ...#nและประธานเชริโน่ก็โดนไล่อยู่หลายครั้งเลยด้วย..."
10001050-117 = "ใช่ค่ะ แค่เดือนนี้ก็มีปฏิวัติ 3 ครั้งแล้วค่ะ"
10001050-118 = "แต่รอบนี้ไม่ใช่ใครอื่นไกล เพราะเป็นหัวหน้าคณะฯ มารินะที่ทำงานอยู่ด้วยกันมาตลอด...#nมันก็เลยรบกวนจิตใจนิดหน่อยน่ะค่ะ"
10001050-119 = "ใช่ รบกวนจนรำคาญเลยล่ะ งั้นวันนี้ให้เรานอนกลางวันที่นี่ก่อนเถอะนะ ฮ้าวว... zzZZ"
10001050-125 = "แต่จะนอนหนุนหนังสือเล่มนี้ไม่ได้นะคะ!"
10001050-126 = "ฉันให้หนังสือล้ำค่ากับคนที่ไม่รู้แม้แต่คุณค่าของหนังสือไม่ได้หรอกค่ะ!"
10001050-127 = "อึ้กก! ทำไมถึงดื้อด้านแบบนี้นะ!? แค่เอาไปใช้แทนหมอนเท่านั้นเอง#nไม่ใช่ว่าเอาไปหนุนแล้วมันจะเละหรือหายไปสักหน่อย!"
10001050-128 = "มันจะเละแน่ค่ะ! รวมถึงคุณค่าของความเป็นลิมิเต็ดเอดิชั่นด้วย!"
10001050-129 = "ถ้าจะยังขัดขืนกันแบบนี้ล่ะก็..."
10001050-130 = "เราก็คงต้องใช้กำลังอย่างหลีกเลี่ยงไม่ได้!"
10001050-132 = "ถึงจะขู่กันแบบนี้ แต่ตอนนี้ท่านประธานเชริโน่คือผู้หลบหนีที่ไม่มีกองกำลังป้องกันนะคะ#nฉันไม่กลัวหรอกค่ะ!"
10001050-133 = "เพื่อสิทธิในการแสวงหาความรู้อย่างอิสระ และเพื่อปกป้องหนังสือของชมรมแนวร่วมปลดปล่อย#nความรู้.."
10001050-134 = "เราขอต่อสู้ค่ะ!"

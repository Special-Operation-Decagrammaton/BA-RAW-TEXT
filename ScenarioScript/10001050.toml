[translation]
10001050-1 = "第5話;非常適合午睡的"
10001050-2 = "赤冬聯邦學園．舊校舍"
10001050-3 = "呼啊啊……好睏……"
10001050-4 = "離午睡的時間還有點早……已經想睡了嗎，會長？"
10001050-5 = "可能是因為剛才吃了太多甜食的緣故吧……眼皮很重，很睏……"
10001050-6 = "這麼說來，我們今天爬了很長時間的山路才到舊校舍。也難怪您累了。"
10001050-7 = "[s]「雖然有一半的時間都是我揹著。」"
10001050-8 = "你在說什麼，老師？不管是不是被揹著走，山路就是山路！"
10001050-9 = "對於平時都待在事務局裡幾乎不動的會長來說，陡峭的山路就如同繁重的工作。"
10001050-10 = "就這樣繼續作戰會出問題的……在會長恢復體力之前，先在這附近休息吧！"
10001050-12 = "來，會長。去舊校舍的休息室睡一會兒午覺吧？"
10001050-13 = "咱不想在舊校舍睡覺……不是說有熊出沒嗎……"
10001050-14 = "有熊出現的話，我會把牠趕走，不用擔心！"
10001050-15 = "而且，剛才也說被子裡會有蟲鑽來鑽去……"
10001050-16 = "唔嗯，該怎麼辦呢……如果有讓會長安心睡午覺的地方就好了……"
10001050-17 = "……咱有一個好主意。"
10001050-18 = "竟然。請告訴我您的意見。"
10001050-19 = "安靜又適度溫暖，有著淡淡香味。 #n最適合睡午覺的地方，那就是……"
10001050-20 = "圖書館！"
10001050-21 = "[s]「圖書館？」"
10001050-23 = "雖然無法媲美三一綜合學園的大圖書館，但咱們赤冬聯邦學園也有座很棒的圖書館。"
10001050-24 = "沒有吵鬧的學生，亮度適中不傷眼……"
10001050-25 = "而且還有很多適合拿來當枕頭的書，說是專為睡午覺打造的空間也不為過！"
10001050-26 = "咱在失勢之前，經常去圖書館睡午覺！"
10001050-27 = "[s1]「我想這不是件值得驕傲的事……」\n[s2]「圖書館確實給人一種昏昏欲睡的感覺呢。」"
10001050-28 = "擁有能安靜地睡午覺的地方，可是日常生活中的大事啊，同志！#n如果不好好午睡，會影響到下午的工作的。"
10001050-29 = "對吧？咱就知道同志會懂！"
10001050-30 = "不過，這個計畫有一個重大的問題，同志。"
10001050-31 = "赤冬聯邦學園的圖書館裡，有反抗咱們的叛亂份子！"
10001050-32 = "那些傢伙是一群書呆子，因為太喜歡書了，連未經認可的非法書籍都想獲得，#n還自稱為知識……知識……"
10001050-33 = "那個，什麼來著？"
10001050-34 = "是「知識解放戰線」。"
10001050-35 = "沒錯，是知識解放戰線！ #n那些傢伙主張「圖書館裡不允許讀書以外的行為」的詭辯，經常妨礙咱午覺！"
10001050-36 = "趕走那些傢伙，確保安靜的午覺場地。#n這就是咱們現在的首要目標！"
10001050-37 = "不愧是潔莉諾會長！一邊忍受著睡意，一邊制定著奪回事務局的計劃呢！"
10001050-38 = "嗯，咦？事務局？咱現在是在說午覺的事……"
10001050-39 = "說起赤冬聯邦學園圖書館，它坐落於一座不易接近的山丘，簡直就是「天然要塞」！只要能佔領那裡，應該可以做為攻擊事務局的據點使用！"
10001050-40 = "同時，知識解放戰線是個規模相當大的社團，學生人數在赤冬聯邦學園中排名前三！"
10001050-41 = "如果能和她們成為同伴，要對付瑪麗娜委員長的親衛隊也不是不可能的事！"
10001050-42 = "在這麼短的時間內，竟然能想出如此完美的策略……"
10001050-43 = "真不愧是潔莉諾會長！"
10001050-44 = "是，是嗎？嘿嘿，欸嘿嘿……"
10001050-45 = "就，就算這麼誇咱，也不會有什麼好處的哦！因為咱現在已經下台了！"
10001050-46 = "擇日不如撞日。既然計畫已經確定，就立刻前往圖書館吧！"
10001050-47 = "呼啊啊……真是沒辦法。"
10001050-48 = "為了咱能睡個安穩的午覺，出發吧！"
10001050-50 = "赤冬聯邦學園．圖書館"
10001050-51 = "欸嘿嘿，終於到手了！Rurieru老師的新作《夏洛×雷》同人誌……！"
10001050-52 = "是只能在三一的現場銷售會購入的限量本……"
10001050-53 = "差點就要放棄了，但運氣不錯呢！"
10001050-54 = "啊啊……在這次的作品中，會用什麼精彩的故事來描寫兩人之間的愛呢？"
10001050-55 = "這週末就不出去了，我要在圖書館待一整天，悠哉地欣賞這部作品。欸嘿嘿……"
10001050-56 = "[s]「那真是個很棒的假日呢。」"
10001050-57 = "……咦，咦咦！？老，老師！？#n而且，連潔莉諾會長也在？"
10001050-58 = "是，是什麼時候來的？"
10001050-59 = "已經在這裡一段時間了。"
10001050-60 = "[s]「從拿到同人誌新作開始。」"
10001050-62 = "那不就是從一開始就在了嗎！？"
10001050-63 = "唔唔……怎麼會突然來訪？是有什麼事找「知識解放戰線」嗎……"
10001050-64 = "問得好！"
10001050-65 = "咱之所以來到這裡──"
10001050-67 = "不，不用說我也知道。是來沒收我們知識解放戰線的珍貴藏書吧？"
10001050-68 = "不，咱不是來沒收書的──"
10001050-70 = "但是，只有這本書不行！我都還沒讀過呢！"
10001050-71 = "等等，就說了咱之所以來到這裡──"
10001050-72 = "至少三次……"
10001050-73 = "不，請讓我仔細熟讀十次！因為這真的很難得到！"
10001050-76 = "聽人說話啊！再說了，咱對那本書一點興趣都沒有！"
10001050-77 = "……咦？"
10001050-78 = "那你為何大老遠跑來圖書館呢？"
10001050-79 = "呵呵，咱來這裡的理由不是顯而易見嗎？"
10001050-80 = "是來睡午覺的！"
10001050-82 = "……圖書館不是休息室吧？"
10001050-83 = "那種事不用你說咱也知道。"
10001050-84 = "讓咱瞧瞧……"
10001050-89 = "嗯，這裡看起來不錯！"
10001050-90 = "靠近壁爐，地板也很暖和，書架也提供了完美的遮蔭，可不是最適合午睡的環境嗎！"
10001050-91 = "智惠，把這個位置準備好。"
10001050-93 = "是，潔莉諾會長。我馬上幫您鋪床。"
10001050-99 = "等，等一下！在這裡鋪被子的話，會妨礙來讀書的學生的！"
10001050-100 = "而且，剛剛才說要睡午覺，為什麼突然翻起書架來了！"
10001050-101 = "那肯定是在找適合拿來當枕頭的書啊。"
10001050-102 = "嗯……咱來找找。#n厚度剛好能支撐脖子的書……"
10001050-103 = "哦哦，《巴士底監獄的薔薇～30週年限定版～》。#n這本看起來不錯！"
10001050-104 = "等，等，等一下！那本書絕對不行！"
10001050-105 = "那本書只出版了100本，赤冬聯邦學園就不用說了，在奇普托斯任何地方都買不到，是相當稀有的書！"
10001050-106 = "如果只是需要厚一點的書，用這本百科全書不就行了嗎？"
10001050-107 = "咱不喜歡，那本書太硬了。"
10001050-108 = "這本書的封面採用皮革裝訂，非常柔軟，正好適合當枕頭。"
10001050-109 = "到底為什麼從剛剛開始就一直執著於圖書館呢！#n如果想要更鬆軟的寢具，在事務局睡不就好了嗎！"
10001050-110 = "那是不可能的。"
10001050-111 = "那又是為什麼！"
10001050-112 = "咱現在被趕出了事務局，正處於被瑪麗娜委員長追殺的立場。"
10001050-113 = "可不能悠哉地在事務局裡睡午覺。"
10001050-114 = "什麼？潔莉諾會長又下台了嗎？"
10001050-115 = "[s]「……又？」"
10001050-116 = "赤冬聯邦學園經常會有覬覦會長之位的學生發動政變……潔莉諾會長經常被趕下台。"
10001050-117 = "是，這已經是這個月的第三次政變了。"
10001050-118 = "但是，沒想到這次竟然是被那個瑪麗娜委員長追殺……似乎有點慘呢。"
10001050-119 = "沒錯，就是那樣。所以今天就讓咱安靜地睡個午覺吧。呼啊……"
10001050-125 = "都說了這本書不行！"
10001050-126 = "不能把珍貴的藏書交給連書的價值都不懂的人！"
10001050-127 = "唔唔！你幹嘛那麼固執啊！就算被咱拿來當枕頭，這本書也不會消失吧！"
10001050-128 = "會消失！限定版的價值，還有其他各種寶貴的東西！"
10001050-129 = "那樣的話……"
10001050-130 = "就用實力來奪取吧！"
10001050-132 = "哼。就算你嘴上這麼說，#n失去了親衛隊，現在不過是個逃亡者的潔莉諾會長根本一點都不可怕！"
10001050-133 = "來吧，知識解放戰線的大家。為了獲取知識的自由並保護我們的藏書……"
10001050-134 = "起身戰鬥吧！"

[translation]
10001050-1 = "Episode 5;A Good Place for a Nap"
10001050-2 = "Red Winter Academy Former Institute"
10001050-3 = "*yawn* So sleepy..."
10001050-4 = "It isn't nap time yet... Are you already sleepy, President?"
10001050-5 = "Maybe it's a sugar crash from earlier... My eyelids feel heavy..."
10001050-6 = "Oh, and we did hike for a long time to get here. I suppose it only makes sense you'd be tired."
10001050-7 = "[s] \"I carried her half of the way, though.\""
10001050-8 = "What are you trying to say, Sensei? We still had to go through the mountains so suddenly."
10001050-9 = "The president has been cooped up in her office for so long, it only makes sense a trek through the mountains would tire her out."
10001050-10 = "Regardless, we can't proceed with the operation like this. Let's take a rest so the president can recover."
10001050-12 = "Why not take a nap in the lounge, Great Leader?"
10001050-13 = "Not here. They said there's a bear around..."
10001050-14 = "Don't worry! If there really is a bear, I'll chase it away!"
10001050-15 = "But what about the bugs in the blankets...?"
10001050-16 = "Hmm... Is there anywhere else you can take a nap safely...?"
10001050-17 = "I know where I could get an ideal nap."
10001050-18 = "Oh? Do tell!"
10001050-19 = "It's quiet, the temperature is just right, and it even smells good. The perfect nap spot..."
10001050-20 = "The library!"
10001050-21 = "[s] \"The library?\""
10001050-23 = "I'm sure it's nothing compared to the library at Trinity but our Red Winter Academy also has a great library."
10001050-24 = "There are no noisy students, and it's dark enough for sleeping..."
10001050-25 = "There are even books to use as makeshift pillows! I swear it was made for naps, not keeping books!"
10001050-26 = "I must have taken a hundred naps there before I was ousted!"
10001050-27 = "[s1] \"That's not something you should brag about.\"\n[s2] \"Naps at the library are the best.\""
10001050-28 = "Having a cozy napping spot is vital, Comrade! Without a proper nap, how will the afternoon's work ever get done?"
10001050-29 = "I see you're cultured as well, Comrade!"
10001050-30 = "However, there is one fatal flaw with this plan."
10001050-31 = "Red Winter's library also houses a pack of evil reactionaries who've rebelled against me at every turn."
10001050-32 = "They are a group of bookworms who can't resist even illegal, banned books. They're called the...uh..."
10001050-33 = "What was it called again?"
10001050-34 = "The Knowledge Liberation Front, Great Leader."
10001050-35 = "Yes! Those heathens at the Knowledge Liberation Front have disrupted my naps under the excuse that \"the library is for reading!\""
10001050-36 = "Our number one priority now is to defeat them and secure a cozy spot for a nap!"
10001050-37 = "Wow, Cherino! Even in the grips of exhaustion, you're still formulating a plan to retake the secretariat!"
10001050-38 = "Wait, what? The secretariat? I just want a nap..."
10001050-39 = "The library is a natural stronghold located atop a steep hill. If we were to capture it, we'd have an excellent base to further advance from."
10001050-40 = "Plus, the Knowledge Liberation Front is one of the three largest clubs at the academy!"
10001050-41 = "If we can recruit them as our allies, they'll be a great help in our fight against Chairman Marina and the State Guard!"
10001050-42 = "You devised such a brilliant plan in such a short amount of time..."
10001050-43 = "That's what makes you our Great Leader!"
10001050-44 = "I-Is that so? Heehee..."
10001050-45 = "But all these compliments are no replacement for my nap!"
10001050-46 = "That's true. Now that we have a plan, let's go to the library right away!"
10001050-47 = "*yawn* Okay."
10001050-48 = "Let's secure the stronghold of naps!"
10001050-50 = "Red Winter Academy Library"
10001050-51 = "I finally got it! The new Sharl x Rei fan book from Luriel!"
10001050-52 = "I'd almost given up because it only had a limited release at Trinity..."
10001050-53 = "I scored big time!"
10001050-54 = "I wonder what steamy passions await me in this issue?"
10001050-55 = "I'm going to stay in the library and read this all weekend."
10001050-56 = "[s] \"Sounds like a fun time.\""
10001050-57 = "H-Huh? Sensei? And P-President Cherino?"
10001050-58 = "H-How long have you been there?"
10001050-59 = "A while."
10001050-60 = "[s] \"Since you started talking about your new fan book.\""
10001050-62 = "Then you heard everything!"
10001050-63 = "Ugh... Do you have business with the Knowledge Liberation Front...?"
10001050-64 = "I'm glad you asked!"
10001050-65 = "I'm here because—"
10001050-67 = "Don't even say it. You're here to confiscate our precious books again, aren't you?"
10001050-68 = "Wait, I think you have the wrong idea—"
10001050-70 = "Please don't take this one! I haven't even gotten the chance to read it yet!"
10001050-71 = "Hey, come on now. I'm only here to—"
10001050-72 = "No! Please, let me read it at least three times..."
10001050-73 = "Actually, ten times! This was really hard to get my hands on!"
10001050-76 = "Oh my gosh, shut up and listen! I don't care about your stupid books!"
10001050-77 = "...Huh?"
10001050-78 = "Then what did you come all the way out to the library for?"
10001050-79 = "It should be obvious—the library's true purpose..."
10001050-80 = "I'm here to take a nap!"
10001050-82 = "What? The library is for reading!"
10001050-83 = "Let's skip this part."
10001050-84 = "All right, let's see..."
10001050-89 = "Ah, this is the perfect place!"
10001050-90 = "It's warm since the heater is so close, and the bookshelves cast some nice shade. This is the best!"
10001050-91 = "Tomoe, prepare this spot for me."
10001050-93 = "Right away, President Cherino! I'll make sure it's exactly to your liking."
10001050-99 = "W-Wait! You'll disturb the other readers if you block the walkway with a blanket!"
10001050-100 = "And if you're going to sleep, why are you looking through the bookcase?"
10001050-101 = "I need a nice thick one to use as a pillow!"
10001050-102 = "Hmm... Which one of you gets to prop up my head today...?"
10001050-103 = "Oh! The Rose of Bastille: 30th Anniversary Limited Edition. This will do nicely!"
10001050-104 = "W-Wait a second. You can't use that book!"
10001050-105 = "That's a rare book! There are only one hundred copies in existence. You can't find it anywhere else in Kivotos, never mind Red Winter Academy!"
10001050-106 = "If all you need is a thick book, why not use this encyclopedia?"
10001050-107 = "Eh. Too hard."
10001050-108 = "This one's bound with leather, so it's nicely cushioned. Prime sleeping material."
10001050-109 = "What is your obsession with napping in the library? If you want to sleep, do it at the secretariat!"
10001050-110 = "No can do, sadly."
10001050-111 = "Why not?!"
10001050-112 = "I was kicked out of the secretariat, and Chairman Marina is after me."
10001050-113 = "So, no nice lounge naps for me."
10001050-114 = "What? You were overthrown again?"
10001050-115 = "[s] \"...Again?\""
10001050-116 = "Coups are pretty popular with the students here at Red Winter Academy. They want the position of power, so President Cherino gets overthrown rather often."
10001050-117 = "It's true. This is actually the third coup this month."
10001050-118 = "But, really, Chairman Marina this time, huh? That must be a pain."
10001050-119 = "Yeah, yeah, whatever. Now that you know, it's nap time. *yawn*"
10001050-125 = "I said this one's off limits!"
10001050-126 = "If you don't understand its importance, I can't give a book like this to you."
10001050-127 = "Sheesh! You're so stubborn about this. It's not like using it as a pillow ONCE is going to wear it out or something."
10001050-128 = "You don't understand at all! It's a very valuable limited edition copy!"
10001050-129 = "Fine. It's clear that if words can't win me the book..."
10001050-130 = "...then I'll just have to take it by force!"
10001050-132 = "Pfft! You think I'm scared of you? All you are is a defenseless fugitive."
10001050-133 = "The comrades of the Knowledge Liberation Front will defend our rights to open knowledge and the sanctity of our library..."
10001050-134 = "If it's a fight you want, then that's what you'll get!"

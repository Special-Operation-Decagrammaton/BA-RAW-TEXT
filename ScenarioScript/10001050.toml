10001050-88 = "5;체리노;02\n#5;em;[반응]\n#wait;1000"
10001050-89 = "5;체리노;01;음, 이곳이 좋겠다!"
10001050-90 = "5;체리노;03;난로와 가까워 바닥에 온기가 충분히 서린 데다가, 책장이 절묘하게 그늘을 만들어 낮잠을 자기에 최적의 환경을 조성하고 있지 않는가!\n#5;em;[재잘]\n#5;hophop"

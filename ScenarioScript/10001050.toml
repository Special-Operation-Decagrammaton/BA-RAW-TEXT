10001050-99 = "1;모미지;04;자, 잠깐만요! 여기에 이불을 펴면 책을 읽으러 온 학생들에게 방해가 되잖아요?\n#1;ar\n#1;hophop"
10001050-100 = "1;모미지;05;게다가 낮잠을 주무신다면서 책장은 어째서 들여다보시는 건가요!\n#1;stiff\n#1;em;[빠직]"
10001050-101 = "5;체리노;02;그야 베고 자기 좋은 두꺼운 책을 찾기 위해서지.\n#5;a\n#5;em;[?]"
10001050-102 = "5;체리노;99;흐음…… 어디 보자. 목을 충분히 받칠 수 있을 만큼 두꺼운 책이……."
10001050-103 = "5;체리노;01;오오, <바스티유의 장미~ 발매 30주년 한정 애장판>이라. 이게 좋겠군!\n#5;em;[반응]"
10001050-104 = "1;모미지;04;자, 자, 잠깐만요. 그 책은 절대로 안 돼요! \n#1;em;[?!]\n#1;shake"
10001050-105 = "1;모미지;04;그 책은 100권밖에 안 풀려서 이제는 붉은겨울 학원은 물론이고, 키보토스 어디에서도 구할 수 없는 진짜배기 희귀본이라고요!"
10001050-106 = "1;모미지;06;단순히 두꺼운 목침이 필요한 거라면 이쪽의 백과사전을 쓰면 되잖아요?"

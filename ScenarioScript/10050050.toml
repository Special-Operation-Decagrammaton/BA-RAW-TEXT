[translation]
10050050-1 = "第5話;冬之王國的公主殿下"
10050050-2 = "某處的體育館"
10050050-4 = "來來來，麻煩大家排隊！現在庫存還很多！"
10050050-8 = "不能太大聲哦？大家越守秩序就能越快買到。#n另外也請大家注意保密。"
10050050-11 = "三一的各位主動當起了銷售員……這就是文化的力量吧？呣呵呵。"
10050050-12 = "沒錯。文化……軟實力最強大的地方，就在於能夠驅使人們展開自發行動的魅力。"
10050050-13 = "……既然難得來到了三一，我也想去號稱奇普托斯最大規模的中央圖書館，#n或者據說隱藏在裡面的古書館看看。"
10050050-14 = "遲早會有機會能去吧。#n身為評論家的貴音，會對三一的館藏有興趣也很正常。"
10050050-15 = "部長難道不感興趣嗎？"
10050050-16 = "完全沒有。#n當然如果能隨意交易那些書來提高營業額的話，事情就另當別論了……"
10050050-17 = "我可不想把心思花費在沒有可能性的東西上。"
10050050-18 = "雖然嘴上這麼說，部長在編輯和修改方面還是做得很認真呢……"
10050050-19 = "那不是編輯和修改，是在將原石雕琢成寶石哦？#n或者要說是重新挖掘商品的價值也可以。"
10050050-20 = "基於這個想法……我也很期待貴音的表現哦！"
10050050-21 = "唔……！又要我做那個嗎……？"
10050050-22 = "如果真的不想的話，我倒也不會強迫你……不過消息不是早就已經傳開了嗎？"
10050050-23 = "公．主．殿．下？"
10050050-24 = "呀啊！？！？"
10050050-26 = "啊，對了。貴音公主殿下！#n能聽聽您對這次的第三集和第四集的想法嗎？"
10050050-27 = "咦，咦咦咦咦咦？#n我，我明白了。如果我淺薄的意見有一點幫助的話……"
10050050-28 = "當然有幫助！畢竟這部作品在三一就非常罕見……"
10050050-29 = "赤冬特有的韌性與野性，被非常寫實地描繪了出來……"
10050050-30 = "正是因為能讓人感受到始終不願放棄「美」的意志，所以才會這麼受歡迎吧！"
10050050-31 = "而若要談論那些「陌生的部分」，最有公信力的人非貴音公主殿下莫屬了！"
10050050-32 = "那，那那那那，那麼重視我的意見，實在令我誠惶誠恐、受寵若驚……"
10050050-33 = "哎呀，連使用的詞彙都這麼高雅！#n果然赤冬……不，冬之王國的公主殿下，光是身心修養就與眾不同呢！"
10050050-35 = "現在該怎麼辦啦，部長！我只不過是個赤冬的普通學生耶！"
10050050-36 = "為什麼非得扮演什麼「赤冬沒落貴族的么女千金」啊？"
10050050-37 = "答案非常簡單，貴音。#n當然是因為……"
10050050-38 = "這樣有助於促銷啊！"
10050050-39 = "聽說公主殿下是赤冬名門四千金中的老么對吧？"
10050050-40 = "由於被捲入難以言喻的事件而導致家道中落……"
10050050-41 = "最終全家都遭到退學並被趕出了赤冬……多麼令人心痛啊。"
10050050-42 = "嗯，嗯。如果各位願意這麼想，我也只能說聲謝謝了……"
10050050-43 = "不過在忠誠隨從的幫助之下，只有貴音公主殿下成功以偽裝的身分留了下來……#n真是太了不起了！"
10050050-44 = "如此波瀾萬丈的人生，簡直只有在書裡才能見到……#n我居然有幸能跟這樣的人說話……"
10050050-45 = "真是太光榮了！"
10050050-46 = "（那是因為我本來就是根據書裡的情節編出來的……！）"
10050050-47 = "三位姊姊的事，我真的很遺憾……#n明明你們的感情好到會將名字的縮寫「OAMT」寫在日記裡，結果最終竟然……"
10050050-48 = "聽說攝影也是您的興趣對吧？#n下次請務必讓我們見識一下！"
10050050-49 = "（其他都是瞎編的，這一點倒是真的呢……唉……）"
10050050-50 = "其實這是我第一次聽到這麼專業的評論。#n居然能夠在現場，聽見公主殿下以如此優雅的語氣發表……"
10050050-51 = "我們真是太幸運了！#n公主殿下，請問您未來有沒有考慮出版自己的評論集呢？"
10050050-52 = "哦哦，我好像又嗅到了商機的味道呢……？"
10050050-53 = "拜託千萬不要！！！"
10050050-55 = "那，那個……我是從朋友口中聽說消息才過來的……#n請問……可以進去嗎？"
10050050-56 = "當然可以。來來來，這種事情大家都是從頭學起的嘛。#n要不要來一本呀？"
10050050-57 = "那，那就多謝了……"
10050050-58 = "……！"
10050050-59 = "太，太太，太不知羞恥了──！！！"
10050050-64 = "怎，怎麼辦，部長！？這樣沒問題嗎？"
10050050-65 = "啊～沒事沒事。#n看他那個樣子，一定還會再回來的。#n這是身為出版部部長的直覺哦。"
10050050-66 = "真的會回來嗎……"
10050050-73 = "居然……"
10050050-74 = "呣呵呵。"
10050050-75 = "那個，我絕對不是因為好奇，或者想要知道後續內容之類的……"
10050050-76 = "只，只是出於，既然開始了就該看到最後，類似這樣的使命感而已……"
10050050-77 = "當然當然，我完全明白客人您的意思。"
10050050-78 = "嗯……感謝你的理解。#n請問……還有後續嗎？"
10050050-79 = "當然，所有故事不都應該延續下去嗎？#n就像「表演必須繼續下去」一樣。 "
10050050-80 = "客人您能夠忠於使命感親自前來，我們反而十分感謝呢。"
10050050-81 = "你，你願意這麼想的話，我也覺得很感謝。"
10050050-82 = "您太客氣了。如果這本書就這麼留在赤冬，想必沒有人能發現它隱藏的價值。"
10050050-83 = "……就連站上市場這個擂台，好好揮一拳都辦不到。"
10050050-84 = "即便輸掉比賽倒也稱得上痛快──最悲哀的莫過於連機會都沒有了。"
10050050-85 = "這麼說確實不無道理……"
10050050-86 = "沒錯！對於像您這樣的客人，我會建議購買兩本而非三本。#n不知道您覺得怎麼樣呢？"
10050050-87 = "可，可是這裡的默契不是都要買三本嗎……"
10050050-88 = "不過傳教對害羞的您而言，恐怕比較困難吧？既然如此，買兩本不就夠了嗎？"
10050050-89 = "那，那就聽你的吧……？"
10050050-91 = "因此，排斥生命中的某些部分，又去接納某些部分……這本身就必然會產生矛盾。"
10050050-92 = "那些讓人感到害羞或難以啟齒的事物，也許更能說明我們的本質不是嗎？"
10050050-93 = "就比如「愛情」往往被視為難以公開談論的話題。#n然而與此同時，所有人心裡卻都明白那是不可或缺的情感。"
10050050-94 = "畢竟如果沒有愛情……在座的各位打從一開始就不會存在了。"
10050050-95 = "而我們的身體也是如此。#n即便不赤裸地談論衣物之下的事物，才是符合淑女修養的行為……"
10050050-96 = "但我們依舊是擁有肉體，並藉此存活於世的存在。"
10050050-97 = "因此這本書──#n可說是我們對於那些矛盾且充滿吸引力的對象，發起坦率積極對話的一次嘗試。"
10050050-98 = "或者……#n也可以稱之為「引導我們走向良好認知的地平線」的純粹意志所凝聚而成的結晶吧。"
10050050-99 = "呀啊啊啊啊！"
10050050-100 = "太厲害了，公主殿下！"
10050050-101 = "高貴的人果然就是不一樣！"
10050050-102 = "我們……是不是應該對自己更誠實一點呢？"
10050050-103 = "（我的胃已經痛到快死掉了……）"
10050050-108 = "生意相當興隆呢……"
10050050-109 = "不過，我總覺得少了點什麼。#n還有什麼更具決定性的賣點嗎……"
10050050-110 = "那個，請問有這種內容的書嗎？"
10050050-111 = "是指什麼樣的內容呢？"
10050050-112 = "大概就是……"
10050050-116 = "唔嗯……很遺憾，目前還沒有完全符合那種內容的書……"
10050050-117 = "這樣啊……"
10050050-118 = "等等……「目前」還沒有……也就是說……？"
10050050-119 = "請先留步！或許有辦法也說不定哦！"
10050050-120 = "真的嗎！？"
10050050-121 = "在那之前，能麻煩您寫一份作品的企劃書嗎？"
10050050-122 = "企劃書……？#n我沒有寫過那種東西耶……"
10050050-123 = "沒關係，那樣反而更好。只要兩行左右就可以了。#n例如希望出現什麼樣的角色，然後搭配什麼樣的內容之類的。"
10050050-124 = "我，我明白了。"
10050050-129 = "又怎麼啦，八雲。#n該不會要跟我說東西突然賣不出去了吧？"
10050050-130 = "不過……其實昨天的份已經夠我們過活了，所以還是先跟你們說聲謝謝吧。"
10050050-131 = "愛瑠會爽快道謝還真稀奇呢。#n現在的買氣依然很旺，所以你不用擔心。"
10050050-132 = "比起那個，你先聽我說。#n我現在會傳一份簡單的企劃書過去，請你想辦法盡快做個樣子出來。"
10050050-133 = "咦？為什麼是我……？#n你是不是又想搞什麼奇怪的賺錢花招了啊？"
10050050-134 = "仔細把我的話聽完。我正在現場接受作品的委託。#n只要你能迅速完成並把作品交給我，價錢想怎麼開都沒問題！"
10050050-135 = "……所以說白了就是個人委託嘛。那種東西超麻煩的耶？#n不只各種要求一大堆，好不容易完成之後還得改來改去的……"
10050050-136 = "不，情況恰恰相反。#n正是因為這樣，我才會要求客戶只寫兩行左右的粗略計畫書。#n如此一來，許多情節自然會不夠完整……"
10050050-137 = "而那些缺少的部分……全部都可以交給愛瑠你自由發揮！"
10050050-138 = "那樣客戶會滿意嗎！"
10050050-139 = "應該會吧？#n畢竟貴音會用話術巧妙地說服……更正，是評論才對。"
10050050-141 = "我嗎！？"
10050050-142 = "你好好想想看，愛瑠。#n這在某方面來說可是原創作品哦？你不是一直想做原創作品的嗎？"
10050050-143 = "……！"
10050050-144 = "雖，雖然是這樣沒錯。可是……"
10050050-145 = "當然我也知道，這並不是100%的原創作品。#n不過要求就只有兩三行而已，其他部分都能按照愛瑠的想法盡情發揮……"
10050050-146 = "這不是已經無限趨近於原創作品了嗎？"
10050050-147 = "所謂「萬事起頭難」──為了走向愛瑠真正的目標，從這裡踏出第一步也不錯吧？"
10050050-152 = "我做！"
10050050-153 = "很好，看來是成交了呢。那就拜託你盡快處理囉。"
10050050-154 = "你以為我是誰啊！#n我馬上就開始工作，先掛啦！"
10050050-158 = "這下又搞定一件事了呢。呣呵呵。"
10050050-159 = "我再次體會到了不能與部長為敵的事實……"
10050050-160 = "嗯？我完～全聽不懂你在說什麼耶？"
10050050-162 = "三一外圍咖啡廳"
10050050-163 = "辛苦了，老師。"
10050050-164 = "[s]「真正辛苦的應該是志美子才對……」"
10050050-165 = "很感謝老師能這麼說，不過幾乎沒有進展還是很令人遺憾呢。"
10050050-166 = "[s]「問題究竟出在哪裡呢？」"
10050050-167 = "老師您怎麼看呢？"
10050050-168 = "……"
10050050-169 = "原來如此。老師認為「三一的學生們反而在保護地下書刊的販售者」是嗎？"
10050050-170 = "這些話我只跟您說……其實我也這麼認為。#n實現正義部的調查之所以困難重重，恐怕也是因為這個原因吧。"
10050050-171 = "而這，也是我特地請您來到這間三一外圍的咖啡廳的理由。"
10050050-172 = "[s]「你的意思是……有人能夠幫忙處理這件事嗎？」"
10050050-173 = "我想或許是吧？#n而且老師應該也跟他很熟才對……啊，他正好到了呢。"
10050050-178 = "你好呀，小春同學？"
10050050-179 = "老，老老老老，老師！？！？#n老師為什麼會在這裡！？！？"
10050050-180 = "[s]「啊，原來是小春啊。」"
10050050-181 = "等等，老師在這裡就代表……"
10050050-182 = "果然……"
10050050-183 = "果然我的眼睛是雪亮的！我早就知道是這麼回事了！#n這一切都是老師搞的鬼吧！死刑──！"
10050050-184 = "[s]「不是！這次真的不是我！冤枉啊！」"
10050050-185 = "這，這這這這，這次！？#n意思是其他變態的事情都是你做的囉！？！？死刑──！！！"
10050050-187 = "[ns]「原來如此，是小春他……」"
10050050-188 = "沒錯，把樣書交給我的正是小春同學。#n多虧有他的幫忙，我們才終於能掌握到一些線索。"
10050050-189 = "[s]「不過你為什麼沒去找實現正義部，而是請圖書委員會幫忙呢？」"
10050050-190 = "那，那個，這是因為……！！"
10050050-191 = "因為……"
10050050-192 = "感覺其他學生……好像會難過……"
10050050-193 = "沒有別的意思哦！？#n雖然大家都想隱瞞，裝作沒這回事的樣子……！"
10050050-194 = "可是大家……卻又很喜歡這本書……"
10050050-195 = "我，我絕對不是在說我們實現正義部哪裡不好哦！！#n我們也只是在做自己份內的工作而已！！"
10050050-196 = "但是如果先撇開這些……把書從那麼多喜歡它的學生手中奪走，總覺得有點悲傷……"
10050050-197 = "[s]「小春也喜歡這本書嗎？」"
10050050-198 = "為什麼要扯到我啊！？#n老師笨蛋、變態、死刑──！！！"
10050050-199 = "我，我我我我，我對那種東西，絕對絕對絕對沒有興趣！！！！！"
10050050-200 = "那麼小春同學，如果圖書委員會能取得這部作品的全集，你會想來看嗎？"
10050050-201 = "作為實現正義部未來的「菁英」，應該還是要確認一下內容比較好吧。"
10050050-202 = "……！"
10050050-203 = "你很懂嘛！既然你這麼說也沒辦法了。#n我就特別幫你確認一下吧。"
10050050-204 = "這不算什麼。謝謝你這麼愛惜書本。"
10050050-205 = "不，不是。我也沒有特別……#n話說回來，圖書委員會的大家都麼愛惜書嗎？"
10050050-206 = "當然囉。畢竟書本可是跟時光機一樣的東西呢。"
10050050-207 = "[s]「時光機？」"
10050050-208 = "是的，時光機……雖然這只是一種比喻而已。"
10050050-209 = "什麼意思？"
10050050-210 = "比方說除了書本之外，世上不是還有很多其他媒體嗎？"
10050050-211 = "像是網路影片、電影、遊戲、音樂等等……多到無法全部列舉出來。"
10050050-212 = "這些媒體同樣能向我們傳遞各種資訊、感想、情緒、感覺。"
10050050-213 = "而我之所以對書情有獨鍾……是因為書能帶給我們某種程度的「餘裕」。"
10050050-214 = "我好像越聽越不懂了……"
10050050-215 = "你可以這麼想想看。#n我們在觀看電影、遊戲或網路影片的過程中，很難分心思考其他事情對吧？"
10050050-217 = "因為它們會利用視覺、聽覺，有時甚至利用觸覺來向我們傳遞資訊。"
10050050-218 = "藉此帶來強烈的沉浸感，帶領我們深入那個世界……"
10050050-219 = "不過也正因如此，它們不容許我們擁有任何的餘裕。"
10050050-220 = "然而書卻不一樣……它是在眾多傳播媒體之中，最受限的一種。#n當然這也不奇怪。畢竟書只能透過少許的圖畫和文字來表現一切。"
10050050-222 = "那倒是沒錯……"
10050050-223 = "不過，這反而也給了我們自由思考內容的空間……可以稱得上是一種寬容的媒體吧。"
10050050-224 = "對我來說，這就像是在與「過去」對話一樣。"
10050050-225 = "因為所有的作者，都是從過去穿梭到現在的人……所以我才會將書本比喻為時光機。"
10050050-226 = "[s]「說的也是。書確實是寫完之後才出版的呢。」"
10050050-227 = "沒錯。在閱讀書裡的文章時，我有時會覺得是過去的作者正在對我說話。 "
10050050-228 = "如同我剛才所說，書本給了我們「自己思考的餘裕」。"
10050050-229 = "並且……我也從中發現了「以自己的想法和答案回答作者的自我」。"
10050050-230 = "那真的，是一件體驗過後就會發現有多麼美妙的事情。"
10050050-231 = "[s]「所以志美子才這麼珍惜書啊。」"
10050050-232 = "是的。或許也是因為這樣，對於三一現在發生的這起地下書刊事件……"

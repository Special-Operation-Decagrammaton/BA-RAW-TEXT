[translation]
10050050-1 = "ตอนที่ 5;ท่านหญิงแห่งอาณาจักรหิมะ"
10050050-2 = "โรงยิมแห่งหนึ่ง"
10050050-4 = "เอาละๆ ทุกคนช่วยเข้าแถวด้วยค่ะ! สินค้าของเรายังมีเหลืออีกเยอะ ไม่ต้องกลัวว่าจะไม่ได้กลับไปนะคะ!"
10050050-8 = "อย่าส่งเสียงดังมากด้วยค่ะ ยิ่งทุกคนเป็นระเบียบเรียบร้อยมากเท่าไร ก็จะยิ่งซื้อได้เร็วขึ้นเท่านั้นนะคะ แล้วก็ระวังเรื่องการรักษาความลับด้วยค่ะ"
10050050-11 = "นักเรียนทรีนิตี้อาสามาเป็นพนักงานขายให้เหรอคะเนี่ย นี่ก็คือพลังของวัฒนธรรมใช่มั้ยคะ? ฮิ ฮิ ฮิ"
10050050-12 = "ใช่แล้วค่ะ พลังที่ยิ่งใหญ่ที่สุดของวัฒนธรรมและซอฟต์พาวเวอร์... อยู่ที่ความสามารถในการกระตุ้น#nให้เกิดการกระทำโดยสมัครใจค่ะ"
10050050-13 = "ในเมื่อมาถึงทรีนิตี้แล้ว ฉันก็อยากไปห้องสมุดกลางที่ยิ่งใหญ่ที่สุดในคิโวทอส และอยากไปห้องสมุดเก่าที่ซ่อนอยู่ในนั้นด้วยนะคะ"
10050050-14 = "เดี๋ยวก็คงมีโอกาสได้ไปค่ะ ยิ่งเป็นนักวิจารณ์ด้วยแล้ว ฉันว่าทาคาเนะน่าจะสนใจหนังสือของทรีนิตี้#nไม่น้อยเลยนะคะ"
10050050-15 = "แล้วหัวหน้าไม่เป็นอย่างนั้นเหรอคะ?"
10050050-16 = "ไม่เลยค่ะ แต่ถ้าสิ่งนั้นทำให้เราทำการค้าและสร้างยอดขายได้ตามใจ เรื่องมันก็คงต่างออกไป..."
10050050-17 = "แต่ฉันก็ไม่อยากทุ่มความสำคัญให้สิ่งที่สร้างเงินไม่ได้ค่ะ"
10050050-18 = "ถึงจะพูดอย่างนั้น แต่ก็เห็นทุ่มเทกับงานเอดิตนี่คะ..."
10050050-19 = "สิ่งที่ฉันทำไม่ใช่งานเอดิต แต่เป็นการเจียระไนหินดิบให้ได้อัญมณีต่างหากค่ะ เรียกว่าเป็นการค้นพบคุณค่าของสินค้าอีกครั้งน่ะ"
10050050-20 = "แล้วพาร์ทที่เป็นส่วนต่อขยายจากงานของฉัน... ฉันก็หวังว่าทาคาเนะจะทำได้เป็นอย่างดีนะคะ!"
10050050-21 = "อะ... อึก...! ต้องทำแบบนั้นอีกแล้วเหรอคะ...?"
10050050-22 = "ถ้าไม่อยากทำ ฉันก็ไม่บังคับให้ทำหรอกค่ะ... แต่ก็มีข่าวลือออกมาหนาหูแล้วไม่ใช่เหรอคะ?"
10050050-23 = "ท่านหญิง?"
10050050-24 = "เฮือก?!?!"
10050050-26 = "อ๊ะ จริงสิ ท่านหญิงทาคาเนะ! ช่วยบอกมุมมองที่มีต่อเล่ม 3 กับเล่ม 4 หน่อยสิคะ"
10050050-27 = "คะ... คะคะคะคะคะคะ? ขะ... เข้าใจแล้วค่ะ ถ้าความคิดเห็นเล็กๆ น้อยๆ ของฉันจะเป็นประโยชน์ละก็..."
10050050-28 = "ต้องเป็นประโยชน์อยู่แล้วค่ะ! ผลงานแบบนี้เป็นสิ่งที่หาอ่านไม่ได้ในทรีนิตี้อยู่แล้วด้วย..."
10050050-29 = "ไหนจะเนื้อหาที่เข้มข้น ดิบเถื่อน แต่ก็สะท้อนความจริงอันเป็นเอกลักษณ์เฉพาะของเรดวินเทอร์"
10050050-30 = "และในขณะเดียวกันก็รู้สึกได้ถึงเจตจำนงที่จะยึดมั่นในความงดงามไว้ เพราะอย่างนี้ทุกคนถึงได้#nชื่นชอบยังไงล่ะคะ!"
10050050-31 = "และคนที่สามารถพูดเกี่ยวกับ 'ส่วนที่ไม่คุ้นเคย' ได้อย่างน่าเชื่อถือที่สุดก็มีแต่ท่านหญิงทาคาเนะ#nคนเดียวด้วยค่ะ!"
10050050-32 = "ถะ... ถะถะถะถะ... ถ้ามองฉันอย่างใจกว้างแบบนั้น ฉันก็ตื้นตันใจจนทำตัวไม่ถูกเลยค่ะ..."
10050050-33 = "ตายจริง ดูการเลือกใช้ถ้อยคำที่ดูสูงศักดิ์นั่นสิคะ! สมกับที่เป็นท่านหญิงจากเรดวินเทอร์... ไม่สิ สมกับ#nเป็นท่านหญิงแห่งอาณาจักรฤดูหนาวจริงๆ ค่ะ ทั้งวิธีคิดและการแสดงออกดูสง่างามผิดจากคนอื่นเลย!"
10050050-35 = "คิดจะทำอะไรกันแน่คะ หัวหน้า! ฉันก็แค่นักเรียนธรรมดาคนหนึ่งของเรดวินเทอร์เท่านั้นนะคะ?!"
10050050-36 = "ทำไมฉันต้องสวมบท 'คุณหนูคนสุดท้องจากตระกูลที่ล่มสลายแห่งเรดวินเทอร์' ด้วยล่ะคะ?"
10050050-37 = "ถามเรื่องง่ายๆ นะคะทาคาเนะ เหตุผลมันก็แน่อยู่แล้วว่า..."
10050050-38 = "เพราะการทำแบบนั้นมันช่วยในการโปรโมตสินค้านี่คะ!"
10050050-39 = "ได้ยินว่าท่านหญิงเป็นลูกสาวคนสุดท้องในบรรดาพี่น้องสี่คนของตระกูลทรงอิทธิพลในเรดวินเทอร์#nใช่มั้ยคะ?"
10050050-40 = "แต่ว่าตระกูลก็ล่มสลายไปด้วยเหตุการณ์ที่ยากจะอธิบาย..."
10050050-41 = "ทุกคนก็เลยถูกไล่ออกจากโรงเรียนและโดนเนรเทศออกจากเรดวินเทอร์ใช่มั้ยคะ... เป็นเรื่องที่ฟังแล้วเจ็บปวดใจจริงๆ ค่ะ..."
10050050-42 = "ค่ะ ค่ะ... ถ้าคุณคิดและเห็นใจกันอย่างนั้น ฉันก็ต้องกล่าวขอบคุณค่ะ..."
10050050-43 = "แต่ด้วยความช่วยเหลือจากข้ารับใช้ผู้ภักดี ท่านหญิงทาคาเนะก็เลยปลอมตัวและอยู่รอดมาได้... น่าทึ่งจังเลยค่ะ!"
10050050-44 = "ปกติฉันเจอเรื่องราวชีวิตที่พลิกผันแต่จากตัวละครในหนังสือเท่านั้น ไม่คิดเลยนะคะว่าวันหนึ่งจะได้คุย#nกับคนที่ผ่านประสบการณ์นั้นมาจริงๆ..."
10050050-45 = "นับเป็นเกียรติอย่างยิ่งเลยค่ะ!"
10050050-46 = "(แน่นอนสิคะ ก็เพราะฉันเอาเรื่องที่อ่านเจอในหนังสือมาอีกทีนี่คะ!)"
10050050-47 = "ส่วนเรื่องพี่สาวทั้งสามคน ฉันเสียใจด้วยนะคะ... ได้ยินว่าเคยสนิทกันมากถึงขนาดเขียนอักษรตัวแรก#nของชื่อว่า 'OAMT' ไว้ในสมุดบันทึกเลย แต่สุดท้ายก็..."
10050050-48 = "เห็นว่างานอดิเรกคือการถ่ายรูปใช่มั้ยคะ? ไว้เอารูปมาอวดพวกเราบ้างสิคะ!"
10050050-49 = "(ถึงเรื่องอื่นจะไม่จริง แต่อย่างน้อยก็มีเรื่องนี้ที่เป็นความจริงละนะคะ... เฮ้อ...)"
10050050-50 = "อันที่จริง นี่เป็นครั้งแรกเลยค่ะที่ฉันได้ฟังบทวิจารณ์จากผู้เชี่ยวชาญ แล้วยิ่งเป็นคำพูดอันไพเราะจาก#nท่านหญิงที่ได้ฟังกับหูของตัวเองแล้วด้วย..."
10050050-51 = "พวกฉันโชคดีมากๆ เลยนะคะ! ท่านหญิงมีแผนจะตีพิมพ์รวมบทวิจารณ์ของตัวเองในอนาคตบ้างมั้ยคะ?"
10050050-52 = "โอ้ นี่มันกลิ่นหอมๆ ของเงินในอนาคตหรือเปล่า...?"
10050050-53 = "ห้ามทำแบบนั้นเด็ดขาดเลยนะคะ!!!"
10050050-55 = "อะ... เอ่อ... พอดีฉันไปได้ข่าวลับๆ จากเพื่อนมาน่ะค่ะ... ขอฉันดูหนังสือด้วย... จะได้มั้ยคะ...?"
10050050-56 = "ได้อยู่แล้วค่ะ มาค่ะๆ ปกติแล้วเรื่องแบบนี้ต้องเปิดใจและลองสัมผัสดูค่ะ ลองอ่านดูสักเล่มสิคะ"
10050050-57 = "ถะ... ถ้างั้นฉันขอรับไว้..."
10050050-58 = "...!"
10050050-59 = "นะ... นะ... นะ... เนื้อหาช่างไร้ยางอายอะไรแบบนี้!!!"
10050050-64 = "ทะ... ทำยังไงดีล่ะคะ หัวหน้า?! จะเกิดปัญหาอะไรหรือเปล่าคะ?"
10050050-65 = "อื้ม~ ไม่เป็นไรค่ะ ไม่เป็นไร เห็นวิ่งไปแบบนั้น เดี๋ยวก็กลับมาใหม่ค่ะ ฉันรู้ได้จากสัญชาตญาณของ#nหัวหน้าชมรมสื่อสิ่งพิมพ์ค่ะ"
10050050-66 = "จะไม่เป็นไรจริงๆ หรือเปล่านะ..."
10050050-73 = "ตายจริง..."
10050050-74 = "ฮิ ฮิ ฮิ"
10050050-75 = "คือว่า... ฉันไม่ได้มาเพราะอยากรู้หรือตงิดใจในเนื้อหาตอนต่อไปหรอกนะคะ..."
10050050-76 = "ก็แค่รู้สึกว่า นี่เป็นเหมือนหน้าที่ที่ถ้าเริ่มทำไปแล้วก็ควรทำให้สุดน่ะค่ะ..."
10050050-77 = "ค่ะ ค่ะ แน่นอนอยู่แล้วค่ะ ฉันเข้าใจดีค่ะ คุณลูกค้า"
10050050-78 = "ค่ะ... ขอบคุณที่เข้าใจนะคะ ถ้างั้นมีเล่มถัดไป... มั้ยคะ?"
10050050-79 = "ต้องมีสิคะ ทุกเรื่องราวต้องดำเนินต่ออยู่แล้วค่ะ ก็เหมือนกับการแสดงที่ต้องดำเนินต่อไงคะ "
10050050-80 = "อีกอย่างนะคะ พวกฉันต่างหากที่ต้องขอบคุณที่อุตส่าห์มาหาถึงที่และแสดงให้เห็นความมุ่งมั่นใน#nการอ่านขนาดนี้ค่ะ"
10050050-81 = "ขะ... ขอบคุณที่คิดอย่างนั้นค่ะ"
10050050-82 = "ไม่ต้องขอบคุณกันหรอกค่ะ ถ้าหนังสือเล่มนี้ถูกทิ้งไว้ในเรดวินเทอร์ ก็คงถูกลืมเลือนไปจนแทบไม่มีใคร#nเห็นคุณค่าที่ซ่อนอยู่ของมันด้วยซ้ำ"
10050050-83 = "แบบนั้นคงไม่ต่างกับการได้ขึ้นไปบนสังเวียนแห่งการค้า แต่ไม่ได้ปล่อยหมัดเลยสักหมัดค่ะ..."
10050050-84 = "ต่อให้แข่งแล้วแพ้ อย่างดีก็คงเสียใจ แต่ถ้าไม่ได้ลงแข่งตั้งแต่แรก มันก็ทั้งน่าเสียดาย และน่าเศร้าด้วยไม่ใช่เหรอคะ?"
10050050-85 = "จริงอย่างที่ว่าเลยค่ะ..."
10050050-86 = "ใช่ค่ะ! และสำหรับคุณลูกค้า ฉันขอแนะนำให้ซื้อ 2 เล่ม แทนที่จะเป็น 3 เล่มค่ะ สนใจรับไปเลยมั้ยคะ?"
10050050-87 = "ตะ... แต่ได้ยินมาว่าการซื้อ 3 เล่มคือข้อปฏิบัติที่นักอ่านรู้กันไม่ใช่เหรอคะ..."
10050050-88 = "คุณลูกค้าดูน่าจะเขินและไม่กล้าเผยแพร่ต่อนะคะ งั้นก็ไม่ต้องซื้อเล่มสำหรับเผยแพร่ให้คนอื่นหรอกค่ะ แค่ 2 เล่มก็เพียงพอแล้วละ"
10050050-89 = "หะ... ให้ฉันทำแบบนั้นได้เหรอคะ...?"
10050050-91 = "บางคนเลือกเอาเฉพาะสิ่งที่อยากรับ แล้วปฏิเสธบางส่วนที่เป็นส่วนหนึ่งของชีวิต แบบนี้มันขัดแย้งในตัวเองชัดๆ ว่ามั้ยล่ะคะ...?"
10050050-92 = "ที่จริงแล้ว สิ่งที่ทำให้เรารู้สึกเคอะเขินและพูดถึงได้ยากต่างหากค่ะที่อธิบายถึงธรรมชาติที่แท้จริงของ#nเราได้"
10050050-93 = "อย่างเช่นเรื่องความรัก ที่มักถูกพูดถึงว่าเป็นเรื่องยากที่จะพูดคุยกันอย่างเปิดเผย แต่เราก็รู้กันดีว่านั่นเป็นความรู้สึกที่ทุกคนล้วนต้องการค่ะ"
10050050-94 = "ถ้าปราศจากความรัก... ก็คงไม่มีพวกเราทุกคนที่อยู่ที่นี่กันหรอกค่ะ"
10050050-95 = "กับเรื่องร่างกายของเราก็เช่นเดียวกันค่ะ กล่าวกันว่ามารยาทของสุภาพสตรีคือการไม่พูดจาเปิดเผย#nเกี่ยวกับสิ่งที่อยู่ภายใต้ร่มผ้า..."
10050050-96 = "แต่เราก็เป็นสิ่งมีชีวิตที่มีร่างกายและเนื้อหนังนี่คะ"
10050050-97 = "เพราะงั้นหนังสือเล่มนี้จึงพยายามสร้างบทสนทนาที่ต่อให้จะขัดแย้ง แต่ก็ดึงดูดพวกเราอย่างหลีกเลี่ยง#nไม่ได้ อีกทั้งยังพรรณาอย่างตรงไปตรงมาและกระตุ้นเราด้วยค่ะ"
10050050-98 = "เรียกได้ว่า... นี่คือผลึกแห่งเจตจำนงอันบริสุทธิ์ ที่จะนำพาเราไปสู่ขอบเขตแห่งการรับรู้ที่ดียิ่งขึ้นค่ะ"
10050050-99 = "ว้าวววว!"
10050050-100 = "ยอดไปเลยค่ะ ท่านหญิงทาคาเนะ!"
10050050-101 = "สมแล้วที่เป็นผู้สูงศักดิ์!"
10050050-102 = "พวกเราควรซื่อสัตย์ต่อตัวเองให้มากขึ้นสินะคะ"
10050050-103 = "(ฉันไม่อยากเล่นบทนี้ต่อแล้วค่ะ...)"
10050050-108 = "เงินสะพัดดีจังเลยนะคะ..."
10050050-109 = "แต่ฉันรู้สึกเหมือนมีบางอย่างบกพร่องเลยค่ะ จะมีวิธีไหนที่แน่นอนกว่านี้อีกมั้ยนะ..."
10050050-110 = "ไม่ทราบว่า... มีหนังสือที่มีเนื้อหาแบบนี้มั้ยคะ?"
10050050-111 = "เนื้อหาแบบไหนเหรอคะ?"
10050050-112 = "แบบว่า..."
10050050-116 = "อืม น่าเสียดายที่ตอนนี้ยังไม่มีหนังสือที่มีเนื้อหาแบบนั้นเป๊ะๆ ค่ะ..."
10050050-117 = "งั้นเหรอคะ..."
10050050-118 = "เดี๋ยวนะ ยังไม่มี ยังไม่มี... 'ยัง' ไม่มี...?"
10050050-119 = "งั้นช่วยรอหน่อยนะคะ ฉันจะหามาขายให้ได้เลยค่ะ!"
10050050-120 = "จริงเหรอคะ?!"
10050050-121 = "แต่ก่อนหน้านั้น คุณช่วยเขียนแผนโครงเรื่องให้หน่อยได้มั้ยคะ?"

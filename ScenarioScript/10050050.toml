10050050-239 = "อื้อ! ใช่แล้ว เป็นอย่างนั้นเลย! คุณครูอ่านใจฉันออกสินะ!"
10050050-240 = "ขอบคุณค่ะ คุณครู คุณโคฮารุ"
10050050-241 = "งั้นโดยพื้นฐานแล้ว เราควรแก้ปัญหานี้ยังไงเหรอคะ? ตั้งแต่วันนั้นคุณโคฮารุได้เบาะแสอะไรเพิ่มเติม#nหรือเปล่าคะ?"
10050050-242 = "ก็... ไม่นะ?"
10050050-243 = "ค่ะ... ก็คงจะเป็นอย่างนั้นละค่ะ ขอโทษนะคะ เหมือนฉันไปสร้างภาระให้คุณโคฮารุเลย"
10050050-244 = "มะ... ไม่หรอก ฉันยินดี..."
10050050-245 = "[s] \"ฮืม ถ้ามันยากที่จะเข้าไปถามนักเรียนโดยตรงละก็...\""
10050050-246 = "ทำไมเหรอ คุณครู? คิดแผนการอะไรออกงั้นเหรอ?"
10050050-247 = "[s] \"โคฮารุ ช่วยอะไรครูสักอย่างได้มั้ย?\""
10050050-248 = "ให้ช่วยเหรอ? ฉันก็ไม่ติดอะไรหรอกนะ..."
10050050-249 = "แต่ถ้าเป็นเรื่องอย่างว่า ฉันไม่เอาด้วยหรอกนะ! ฉันไม่มีวันช่วยเรื่องอะไรแบบนั้นเด็ดขาดเลย!"
10050050-250 = "ฉันไม่คิดว่าคุณครูจะขอร้องในเรื่องแบบนั้นนะคะ..."
10050050-251 = "เอาเถอะ!"
10050050-252 = "หืม? ถ้ารู้สึกว่าชมรมทวงความยุติธรรมกระฉับกระเฉงขึ้นมาอย่างเห็นได้ชัด ก็ขอให้เข้าไปใกล้ชิดกับเด็กๆ ในชมรมให้มากขึ้นงั้นเหรอ?"
10050050-253 = "ตะ... แต่ว่าตอนนี้ฉันไม่ได้สังกัดอยู่ในชมรมทวงความยุติธรรมแล้วนะ...?"
10050050-254 = "[s] \"ไม่ต้องห่วงนะ ทุกคนจะเอ็นดูโคฮารุอยู่แล้วละ\""
10050050-255 = "กะ... ก็ได้ ถ้าคุณครูว่าอย่างนั้นละก็นะ..."
10050050-257 = "สวัสดีค่ะ คุณมาชิโระ เรื่องการสืบหาเป็นยังไงบ้างคะ?"
10050050-258 = "เรื่องนั้น... ฉันต้องขอโทษด้วยค่ะ ตอนนี้ยังไม่มีความคืบหน้าอะไรเลยค่ะ..."
10050050-259 = "ค่ะ ฉันรู้ดีว่าคุณมาชิโระกำลังเผชิญกับช่วงเวลาที่ยากลำบากค่ะ"
10050050-260 = "ถ้าการสืบหาเป็นเรื่องยากจริงๆ ทางสภาน้ำชาสามารถใช้แนวทางเชิงรุกให้มากขึ้นได้ค่ะ เพราะงั้นก็ไม่ต้องกดดันมากเกินไปนะคะ"
10050050-261 = "(...?!)"
10050050-262 = "ขอโทษค่ะ คุณนางิสะ! คุณกำลังเป็นกังวลสินะคะ!"
10050050-264 = "ฉันจะตั้งใจให้มากกว่านี้ และจะหาตัวการให้เจอให้ค่ะ! งั้นฉันขอตัวก่อนนะคะ...!!"
10050050-268 = "คะ... คุณมาชิโระ? คุณมาชิโระ?!?!"

[translation]
10050050-1 = "Episode 5;Princess of the Frozen Kingdom"
10050050-2 = "A Gym Somewhere"
10050050-4 = "Now, now. Single file line, please! There's plenty to go around!"
10050050-8 = "Everyone, keep it down! The faster you get in a line, the faster you'll get your book. And remember, keep this from the Force!"
10050050-11 = "Trinity students helping us sell? This must be the power of culture. Heh heh heh."
10050050-12 = "It truly is. Before us, we see the manifestation of culture itself, the elements of humanity that inspire people to rally behind a cause."
10050050-13 = "...The Central Library here at Trinity claims to be the largest in all of Kivotos. I'd love to see it, or the rumored old library said to be hidden deep within."
10050050-14 = "We'll find the time to go while we're here. I guess a critic like you would be interested in Trinity's literary collection."
10050050-15 = "Aren't you?"
10050050-16 = "Not at all. Unless they're going to give it to me to flip for a quick buck."
10050050-17 = "Why would I waste my time and energy on something with no potential?"
10050050-18 = "You say that, yet I see you slaving away over edits and revisions on a daily basis."
10050050-19 = "It's not editing and revision. It's carving gems out of raw stones. A rediscovery of product value."
10050050-20 = "And as an extension... I expect you to do your part as well!"
10050050-21 = "U-Ugh...! Is that truly necessary...?"
10050050-22 = "I'd NEVER force you to do something you didn't want to do... But, I mean, the rumors have already started to spread, haven't they?"
10050050-23 = "P-r-i-n-c-e-s-s?"
10050050-24 = "Augh?!"
10050050-26 = "Ah, Princess Takane! We'd love to hear your opinions on books three and four!"
10050050-27 = "M-M-M-M-M-M-Me? W-Well, if y-you truly wish to hear my humble opinion..."
10050050-28 = "Of course we do! A work like this could never have come out of Trinity."
10050050-29 = "The wild but exhilarating reality it depicts creates a style that is uniquely Red Winter's."
10050050-30 = "Exactly! The deep resolve to not let go of beauty against all odds... It really touched everyone!"
10050050-31 = "And who would be more well-suited to give a better perspective on the unfamiliar parts than Princess Takane herself?"
10050050-32 = "I-I-If you see it that way... I'm quite flattered. Thank you, truly."
10050050-33 = "Wow. You're so eloquent!! As expected of the Princess of Red Winter... No, the Princess of the Frozen Kingdom! That's just how royalty conducts themselves."
10050050-35 = "What are we going to do, President?! I'm just a regular student at Red Winter!"
10050050-36 = "Why am I suddenly playing the part of the youngest daughter of a fallen house, once considered nobility in Red Winter?"
10050050-37 = "You're wasting your breath on such a simple question, Takane."
10050050-38 = "For the marketing!"
10050050-39 = "From what I hear, she's the youngest of four, from an influential family in Red Winter."
10050050-40 = "No one knows what caused the downfall of her house..."
10050050-41 = "They were \"purged\" from Red Winter, apparently... What a terrifying word..."
10050050-42 = "Ah, yes. What can I say? I mean, truly? What can I possibly say right now?"
10050050-43 = "But with the help of her loyal retainer, Princess Takane found a way to change her identity and remain in Red Winter. How incredible!"
10050050-44 = "To meet someone who has experienced the kind of life I've only read about, and to actually talk to her..."
10050050-45 = "It's truly an honor!"
10050050-46 = "(That's because the story is based on a book!)"
10050050-47 = "What happened to your three sisters is truly unfortunate... Do you still have the journal? Where you wrote \"OAMT,\" the first letters of each of your names?"
10050050-48 = "You enjoy photography on the side? We would love to see your work!"
10050050-49 = "(Everything is a mess, but that's the one true thing they've said... *sigh*)"
10050050-50 = "I have to confess, this is the first time I've had the opportunity to hear the words of a critic. And to think that I can experience it firsthand from a princess!"
10050050-51 = "I never thought this day would come! Do you plan on releasing a collection of critical essays under your name?"
10050050-52 = "Oh? Another business venture...?"
10050050-53 = "Absolutely not!"
10050050-55 = "U-Um... I heard from a friend... Is this all right...?"
10050050-56 = "Welcome, welcome. It's not just all right, it's exactly as it should be! And, as with all things, you should start at the beginning. Try out book one!"
10050050-57 = "Then um, thank you..."
10050050-58 = "...!"
10050050-59 = "Sh-Sh-Shameless!!"
10050050-64 = "Wh-What should we do, President?! Will we be all right?"
10050050-65 = "Ah, it's fine, it's fine. She's going to come back. It's my intuition as the president of the Publishing Department."
10050050-66 = "Is that so...?"
10050050-73 = "Oh, my..."
10050050-74 = "Heh heh heh."
10050050-75 = "Um, it's not like I want to know or am curious about what happens next..."
10050050-76 = "I'm just a bit of a completionist! It's practically my duty to finish it at this point."
10050050-77 = "Yes, yes! Of course. I'm in complete agreement, miss."
10050050-78 = "I'm glad you understand. Therefore...if there's a second one..."
10050050-79 = "Of course. All stories must continue. Just like how the show must go on. "
10050050-80 = "We must thank you for following your sense of duty back here."
10050050-81 = "Th-Thank you for seeing it that way."
10050050-82 = "It's nothing. If this book had remained in Red Winter, it would have been lost, forgotten by the masses."
10050050-83 = "...It'd never have its day under the bright lights of the market."
10050050-84 = "It's one thing to participate and lose. It's another to never even get to set a foot in the ring."
10050050-85 = "That sounds logical, I believe."
10050050-86 = "Exactly! That's why I'm going to give you a chance to buy two books, instead of three. What do you think?"
10050050-87 = "A-Aren't you meant to buy these kinds of things in threes, though? That's what I heard."
10050050-88 = "That's true, but the third's for spreading the word. Doesn't that sound a bit embarrassing?"
10050050-89 = "I-Is it really okay?"
10050050-91 = "...And so, the act of excluding some parts of life to make others more acceptable is a contradiction in itself."
10050050-92 = "One could even say that the way we speak of difficult topics is an indication of our true nature."
10050050-93 = "For example, love. People naturally draw back from speaking of it, yet it's essential for each and every one of us."
10050050-94 = "Without love, all of you here wouldn't be standing before me today."
10050050-95 = "It's the same thing about our bodies. Though people say that a proper lady should not explicitly talk about what's beneath her clothing..."
10050050-96 = "And yet, we are beings who live with those forbidden bodies."
10050050-97 = "Therefore, this book, by attempting a frank, and proactive dialogue about things that are contradictory, yet alluring for us..."
10050050-98 = "...can be considered a culmination of resolve, and may even be thought of as pure, leading us to the horizon of an even broader understanding."
10050050-99 = "Kyaaa!"
10050050-100 = "That's so cool, Princess!"
10050050-101 = "As expected of nobility!"
10050050-102 = "So it's okay to be honest with ourselves?"
10050050-103 = "(I may develop a stomach ulcer from this.)"
10050050-108 = "Business is booming..."
10050050-109 = "And yet, there's more we could be doing. Something more definitive..."
10050050-110 = "Um, do you have any books with...this stuff?"
10050050-111 = "I may need a few more details."
10050050-112 = "Well..."
10050050-116 = "Hm. Unfortunately, we don't have a book that fits your description exactly..."
10050050-117 = "I see..."
10050050-118 = "Hold on, yet. Yet... Yet...?"
10050050-119 = "Yet... I can make this happen for you!"
10050050-120 = "Really?!"
10050050-121 = "I'll need your help, though. Do you know how to write a project proposal?"
10050050-122 = "A...what? No, I've never written one before."
10050050-123 = "It's all right. Even better. Just give me two lines. What you're looking for, the types of characters, just let your imagination run wild."
10050050-124 = "U-Understood!"
10050050-129 = "What is it, Yakumo? Have sales started slowing down?"
10050050-130 = "Actually, well... The payment we received did help us get out from the bottom of the pit, at least. So, thank you."
10050050-131 = "Such heartfelt gratitude from none other than Meru herself... And worry not. Business is booming."
10050050-132 = "In fact, it's doing so well, that I'm sending you over a proposal. The faster you can get it back to me, the better."
10050050-133 = "Huh? Why should I? I refuse to be pulled into another one of your obscure money-making schemes!"
10050050-134 = "Hear me out. I'm receiving requests, live, on site. If we can respond on demand, we can set whatever prices we want!"
10050050-135 = "...You want me to do a commission. No. Absolutely not. Those are an artist's worst nightmare. They nitpick every little detail, and then finally at the end, it's not what they wanted."
10050050-136 = "No, I've handled that already. The proposal I'm sending over only has two lines. You can't cover every little detail in two lines."
10050050-137 = "Which means... They may be providing the canvas, but you can paint it however you want!"
10050050-138 = "The person who commissioned it is just going to complain about the result!"
10050050-139 = "Oho. No, they'll be happy with whatever you give them. Because Princess Takane will...critique it positively."
10050050-141 = "I'm involved as well?!"
10050050-142 = "Think about it, Meru. This is an original, in a sense. Isn't creating an original work like this your dream?"
10050050-143 = "!!"
10050050-144 = "W-Well, yes..."
10050050-145 = "I get it. It's not 100% yours, so it's not YOUR work. But the request is just the setting. You can fill the details with whatever Meru-like thoughts you have up there."
10050050-146 = "It's basically an original piece, right? After all, a drop of water can turn into a great ocean one day."
10050050-147 = "Wow. The first step on your journey to achieving your true dream."
10050050-152 = "Give me the proposal!"
10050050-153 = "Excellent, excellent! Now remember, speed is the name of the game."
10050050-154 = "Just who do you take me for? I'm going to get working immediately, so hang up already!"
10050050-158 = "With that, another mission is accomplished. Heh heh heh."
10050050-159 = "...I never wish to have to look you in the eye as an enemy, President."
10050050-160 = "Hm? I have no idea what you're talking about."
10050050-162 = "Trinity Suburban Cafe"
10050050-163 = "Good work, Sensei."
10050050-164 = "[s] \"You're the one working hard, Shimiko...\""
10050050-165 = "While I appreciate that, we have nothing to show for it. We weren't able to find a single lead to follow."
10050050-166 = "[s] \"I wonder why it's so much harder than usual.\""
10050050-167 = "Do you have any thoughts on why, Sensei?"
10050050-168 = "..."
10050050-169 = "I see. Trinity students may actually be protecting the seller of this unauthorized book..."
10050050-170 = "You and I were thinking the same thing, Sensei. Without any willing witnesses, it's difficult for the Justice Task Force to make any headway."
10050050-171 = "Which is actually why we've come to this cafe."
10050050-172 = "[s] \"Did you find someone willing to talk?\""
10050050-173 = "Perhaps? You know her well. Ah, here she is."
10050050-178 = "Hello, Koharu."
10050050-179 = "S-S-S-Sensei?!?! What is Sensei doing here?!"
10050050-180 = "[s] \"Oh, it's Koharu.\""
10050050-181 = "Wait, if Sensei is here..."
10050050-182 = "...I knew it."
10050050-183 = "I knew it! You can't trick me! This fiasco is all your doing! DEATH—!"
10050050-184 = "[s] \"No! It's really not my fault this time! I'm innocent!\""
10050050-185 = "TH-TH-THIS TIME?! Then you were doing perverted things other times?!?! DEATH PENALTY!!"
10050050-187 = "[ns] \"Anyways, so Koharu is the one...\""
10050050-188 = "Yes. Koharu provided me with a sample. So now we have some kind of clue."
10050050-189 = "[s] \"But why are you assisting the Library Committee and not the Justice Task Force?\""
10050050-190 = "W-Well. That's...!!"
10050050-191 = "Because..."
10050050-192 = "I didn't want to...be the one to make them sad..."
10050050-193 = "That's all, okay?! Everyone's trying really hard to hide and protect it!"
10050050-194 = "All because they like this book..."
10050050-195 = "I-I'm not saying the Justice Task Force is bad!! They're just doing their job!!"
10050050-196 = "...This is a totally different matter. It just feels a little sad to take away something the students love so much from them..."
10050050-197 = "[s] \"Do you also like this book, Koharu?\""
10050050-198 = "M-Me?! Why are you even asking?! Pervert Sensei! Dummy Sensei! Death PENALTYYYY!!"
10050050-199 = "I-I-I-I'm not i-i-interested in something like this at all!!"
10050050-200 = "In that case, Koharu, if the Library Committee were to collect the entire series, you would have no interest in coming to read it?"
10050050-201 = "As a future elite of the Justice Task Force, shouldn't you be aware of its contents?"
10050050-202 = "...!"
10050050-203 = "You're right! I guess if it's something like that, I'll have to make an exception and check."
10050050-204 = "Excellent. Thank you for cherishing literature so deeply."
10050050-205 = "W-Well... It's not really... Anyway, what is it about books that makes the Library Committee love them so much?"
10050050-206 = "Isn't it natural? Books are a kind of time machine."
10050050-207 = "[s] \"A time machine? How so?\""
10050050-208 = "Well, in a metaphorical sense, of course."
10050050-209 = "Metaphorically?"
10050050-210 = "Hm... Well, you see, there's innumerable different mediums in which people can express themselves and disseminate information."
10050050-211 = "Videos on the internet, movies, games, music... So many that you can't list all of them."
10050050-212 = "These mediums elicit the same kinds of emotions and feelings that books do."
10050050-213 = "But with books... I feel like I have a little more breathing room."
10050050-214 = "Am I the only one who doesn't get it...?"
10050050-215 = "Think of it this way. Movies, games, and videos, for mediums like those, it's hard to formulate your own thoughts while watching them."
10050050-217 = "These mediums use our sight, hearing, and sometimes even touch to deliver their message."
10050050-218 = "That makes them very immersive, and brings us deeper into their worlds..."
10050050-219 = "But it's a sensory overload. There's no breathing room for your own thoughts."
10050050-220 = "Books, on the other hand... In a way, it's the most restrictive of the mediums. You only have the words on the page to communicate with."
10050050-222 = "That is undeniably true..."
10050050-223 = "But it's that very restrictiveness that allows our own thoughts to blossom alongside the book as we read. It's selfless, in that way."
10050050-224 = "And that, in some ways, feels to me like a conversation with the past."
10050050-225 = "Because all authors are people who are speaking to the present, from the past. And in that sense, I called it a time machine."
10050050-226 = "[s] \"I didn't think about how books are published after they're written.\""
10050050-227 = "Yes. When I'm reading, it really does feel like a conversation with the author's past self. "
10050050-228 = "With that breathing room, we can better process the words written on the page in a more personal way."
10050050-229 = "And there are people, like me, who cherish books enough to also want to respond to the author's message."
10050050-230 = "When you experience it, it's magical."
10050050-231 = "[s] \"It's nice to hear why you love books so much.\""
10050050-232 = "Yes. And perhaps for that reason, even concerning the case of the unauthorized book currently in Trinity..."
10050050-233 = "...I can't help but think of it positively, however subconscious the thought may be."
10050050-234 = "I've failed at my job..."
10050050-235 = "I don't think...feeling that way means that you failed."
10050050-236 = "Koharu?"
10050050-237 = "Well, since the Justice Task Force is strict enough to make up for the both of you... I think if one person in the investigation is advocating for the book..."
10050050-238 = "[s] \"Yes. Like good cop, bad cop.\""
10050050-239 = "Yeah! Like that! I knew you'd get it, Sensei!"
10050050-240 = "Thank you, Sensei. Koharu."
10050050-241 = "However, that brings us back to our original issue. How do we resolve this situation? Koharu, have you tracked down any more clues since then?"
10050050-242 = "No...ooo?"
10050050-243 = "Ah. Yes. I don't mean to pressure you."
10050050-244 = "I-It's just that..."
10050050-245 = "[s] \"Hm, if we can't go to the students...\""
10050050-246 = "What is it, Sensei? Do you have an idea?"
10050050-247 = "[s] \"Koharu, can I ask you something?\""
10050050-248 = "Me? I don't mind..."
10050050-249 = "A-As long as it's not perverted! I won't do anything like that!"
10050050-250 = "Just based off the current context of the situation, I don't believe that's the direction we were headed."
10050050-251 = "Anyway!"
10050050-252 = "Huh? If the Justice Task Force picks up the pace at any point, try to stay by their side?"
10050050-253 = "B-But I'm not currently affiliated with the Justice Task Force... Would that be okay?"
10050050-254 = "[s] \"I wouldn't worry about that, Koharu. They'll be happy to see you.\""
10050050-255 = "A-All right. If you say so..."
10050050-257 = "Hello, Mashiro. How's the investigation going?"
10050050-258 = "...I must sincerely apologize. We've made little progress."
10050050-259 = "It's okay. I'm already aware of the obstacles you've encountered."
10050050-260 = "Please, don't wear yourself too thin. If the situation does escalate, it'll be the Tea Party's responsibility to finally step in."
10050050-261 = "(...?!)"
10050050-262 = "Truly, I apologize again, Nagisa! I was unaware of just how distressed you were!"
10050050-264 = "I will do everything in my power to bring these perpetrators to justice! Please, excuse me!"
10050050-268 = "M-Mashiro? Mashiro?!"
10050050-272 = "I was only trying to cheer her up a little..."

[translation]
102010-1 = "第1話;色彩的嚮導者"
102010-4 = "……"
102010-8 = "委員長，這是……"
102010-9 = "……"
102010-11 = "乃愛，還是不知道莉央會長的去向是嗎……？"
102010-12 = "是的……"
102010-13 = "……這樣啊。"
102010-14 = "……這裡就交給我，優香醬請先出發吧。"
102010-15 = "……謝謝。交給你了！"
102010-17 = "我聽說有急事……原來如此，大家都到齊了呢。"
102010-21 = "花子同學……"
102010-22 = "……"
102010-23 = "好久不見，花子同學。"
102010-24 = "我想聖亞醬應該已經告訴各位……#n接下來，我們也必須採取行動。"
102010-25 = "即使所屬的派系各不相同，不過大家同為三一的學生，#n我相信大家能夠同心協力的。"
102010-27 = "這，這邊的掃除已經全部結束了！"
102010-28 = "啊哈哈！話說這天空真奇怪呢～"
102010-33 = "咦……#n是，是老師傳來的……！"
102010-34 = "咦？怎麼了嗎？"
102010-35 = "……唉。"
102010-39 = "……沒錯。#n看來又輪到我們出場了呢。"
102010-41 = "緊急速報！！現在D.U.發生了奇怪的現象！#n這是──"
102010-42 = "巨大的塔突然從空中落下──#n正中了聖所之塔！！"
102010-43 = "由於這史無前例的大災難，現在D.U.的行政處於麻痺狀態！#n雖然目前還不清楚是否和先前發布的戒嚴令有關──"
102010-55 = "夏萊的頂樓 "
102010-57 = "……咯咯咯。"
102010-58 = "[s]「……黑色西裝人。」"
102010-59 = "讓你看見這副不堪入目的模樣，真是失禮了，[USERNAME]老師。"
102010-60 = "──蓋瑪特利亞被摧毀了。"
102010-61 = "「色彩」終於到來了。"
102010-62 = "──這個表達方式似乎不太合適呢。#n應該說「來侵略了」比較正確。"
102010-63 = "[s]「到底發生了什麼事？」"
102010-64 = "「色彩」到來──而胡狼神與祂接觸了。"
102010-65 = "被反轉為[ruby=terror]恐怖[/ruby]領域的她，成為了將所有生命導向冥界的死神「阿努比斯」──"
102010-66 = "將會遵循自己的本質──為這個世界帶來終焉吧。"
102010-67 = "「色彩」也理解了這一點。#n所以才會在到達這裡後，先去確保她的「崇高」。"
102010-76 = "「色彩」沒有意志、慾望、目的，是無法理解的觀念──#n雖然我們曾經做出了這樣的解釋。"
102010-77 = "不過從這個行動之中，卻能感受到明確的「意志」與「計畫性」。"
102010-78 = "沒想到居然會主動採取行動……"
102010-79 = "「色彩」試圖吸收奇普托斯所有的神祕、恐怖以及崇高的概念，將其化為己有──"
102010-81 = "此外……出現在奇普托斯的6座塔──#n可以算是「聖所之塔」的一種吧。並且同樣，遭到了反轉。"
102010-82 = "那是在遙遠的過去，在這個世界開始留下紀錄之前──當時便已存在的原始神祕──「無名之神」所建構的技術之一。"
102010-83 = "它會把「色彩」的光傳播到整個世界，讓存在於奇普托斯的所有神祕都反轉為恐怖吧。"
102010-84 = "──就像，那個胡狼神一樣。"
102010-85 = "[s]「那麼，我們只要阻止它就好。」"
102010-86 = "……"
102010-87 = "「色彩」以「帶來終焉之神」襲擊蓋瑪特利亞的理由──#n那或許，是為了奪走蓋瑪特利亞持有的「秘儀」與「驗證結果」吧。"
102010-88 = "十字神名的[ruby=Path]道路[/ruby]、[ruby=Mimesis]複製[/ruby]的秘儀、[ruby=Communio Sanctorum]「諸聖相通」[/ruby]、[ruby=The Library of Lore]無盡怪談圖書館[/ruby]……#n無名之神的力量與無名守護者的能力──"
102010-89 = "掌握這一切的「色彩的嚮導者」……"
102010-90 = "[s]「色彩的嚮導者？」"
102010-91 = "沒錯。既是代表「色彩」意志的存在，也是推動計畫的執行者──"
102010-93 = "──其名為「[ruby=Phrenapates]誘騙者[/ruby]」。#n今後，你將會面對他吧。"
102010-108 = "現在，整個奇普托斯都發生了通訊障礙！"
102010-109 = "目前的狀況，就算各學園都發佈避難指示也不奇怪……#n不過在塔的真相尚未明朗的現在──"
102010-110 = "啊！傳來了速報！#n聯邦學生會發表了緊急聲明──"
102010-111 = "咦？是誤報？"
102010-112 = "那究竟是誰……"
102010-114 = "啊啊！緊急速報！！#nD.U.各地都出現了來歷不明的兵力。"
102010-115 = "這，這到底是！？"
102010-116 = "正在對都市一帶進行無差別的攻擊──"
102010-117 = "這，這場襲擊究竟意味著什麼！？#nD.U.究竟發生了什麼呢！"
102010-118 = "啊啊，是，好的……！剛才收到了來自聯邦學生會的緊急聲明──#n不，更正。是「夏萊」傳來的聲明！"
102010-119 = "夏萊的緊急聲明送達了！！"
102010-120 = "我，我現在就唸出來……！！"
102010-122 = "「……請各自治區的學生，切勿接近黑色高塔附近，立刻開始避難」"
102010-124 = "[ns]「接下來就交給[ruby=夏萊]大人[/ruby]吧。」"
102010-126 = "[ns] 拿出大人的卡片"
102010-128 = "……給你一個忠告吧。"
102010-132 = "如果濫用那張卡片──#n你也會迎接與我們相同的結局哦，老師。"
102010-133 = "咯咯咯……"

102010-1 = "Episode 1; The Guide of Chroma"
102010-4 = "..."
102010-8 = "President, this is..."
102010-9 = "..."
102010-11 = "You still can't reach President Rio?"
102010-12 = "Yuuka..."
102010-13 = "Noa, I..."
102010-14 = "Go first. You can leave it to me here."
102010-15 = "O-Okay! Stay safe!"
102010-17 = "I was curious what all the urgency was about, but I understand now."
102010-21 = "Hanako."
102010-22 = "..."
102010-23 = "It is good to see you again, Hanako."
102010-24 = "I'm sure Seia has already told you, but we have to take action."
102010-25 = "We at Trinity have historically been rife with conflict, but if there was any time for us to band together, it's now."
102010-27 = "Th-This side is clear!"
102010-28 = "Yup! But what's going on up in the sky? Isn't it kind of exciting?"
102010-33 = "Oh! S-Sensei sent a message..."
102010-34 = "Hm? What about?"
102010-35 = "*sigh*"
102010-39 = "...Hmm. I guess it's time for us to move out."
102010-41 = "Breaking news! A strange phenomenon is occurring in D.U.! In summary..."
102010-42 = "A huge tower fell from the sky, obliterating Sanctum Tower in one fell swoop!"
102010-43 = "In an unprecedented disaster, D.U. has been paralyzed! We don't know if this has anything to do with the martial law that was recently declared..."
102010-55 = "Schale Building Rooftop"
102010-57 = "...Heeheehee."
102010-58 = "[s] \"...Black Suit.\""
102010-59 = "I'm sorry things turned out this way, [USERNAME] Sensei."
102010-60 = "But Gematria has been destroyed."
102010-61 = "The Chroma has finally arrived in Kivotos."
102010-62 = "...No, that's not the right way to describe it. I should say, it has \"invaded\" Kivotos."
102010-63 = "[s] \"What happened to Shiroko?\""
102010-64 = "...The wolf god has encountered the Chroma."
102010-65 = "Reversed into the realm of the Terror, she became the god of death who guides all living beings to the underworld..."
102010-66 = "Guided by her inherent nature, she will lead the way in bringing about the end of this world."
102010-67 = "The Chroma knew this and secured her sublime before anything else."
102010-76 = "I thought of the Chroma as something incomprehensible, something with no will, desires, or goals..."
102010-77 = "But I can see its goals and plans clearly."
102010-78 = "I couldn't fathom that the Chroma could have a will, make plans, and take strategic actions to achieve goals..."
102010-79 = "The Chroma seems to be trying to absorb the sublime, to harness every mystery and terror in Kivotos and make them its own."
102010-81 = "The six towers that appeared in Kivotos...are like reversed Sanctum Towers."
102010-82 = "They're technologies established by the Nameless Gods...mysteries of the enlightenment that came into being even before the ancient times of this world."
102010-83 = "They'll spread the Chroma to this world to turn every nightmare and mystery in Kivotos into a terror-filled reality. "
102010-84 = "As will the wolf god."
102010-85 = "[s] \"Then we'll stop it.\""
102010-86 = "..."
102010-87 = "It seems the reason the Chroma attacked Gematria with the god of all endings was to obtain Gematria's secrets and experimental findings."
102010-88 = "The path of Decagrammaton, the secret of Mimesis, Communio Sanctorum, the Library of Lore, the power of the Nameless Gods, and abilities of the unknown guardians..."
102010-89 = "And the Guide of Chroma now owns them all."
102010-90 = "[s] \"The Guide of Chroma?\""
102010-91 = "A being that represents the will of the Chroma, and which dictates all plans and purposes..."
102010-93 = "You'll have to face Phrenapates."
102010-108 = "We're experiencing communications failures all over Kivotos!"
102010-109 = "We are on standby to see if evacuation orders will be issued soon, but just what are these towers? We still have not received any news on that front!"
102010-110 = "There are rumblings that the General Student Council will be making an emergency statement soon!"
102010-111 = "Huh? It doesn't seem like they're going to respond?"
102010-112 = "The public wants the General Student Council to take action and take it now!"
102010-114 = "Oh, oh! In the meantime, we have breaking news! Unidentified troops are appearing all over D.U.!"
102010-115 = "What did you say?!"
102010-116 = "They're attacking the city indiscriminately...?!"
102010-117 = "Do we know what organization they are under? It's an ambush! "
102010-118 = "...At last, an emergency statement from the General Student Council just arrived! No, correction! It's from Schale, not the General Student Council!"
102010-119 = "An emergency statement from Schale arrived!"
102010-120 = "H-Here's Sensei's message!"
102010-122 = "\"...Students, please evacuate as quickly as possible and do not approach the towers.\""
102010-124 = "[ns] \"Leave the rest to Schale.\""
102010-126 = "[ns] Take out your credit card."
102010-128 = "...I'm warning you."
102010-132 = "If you keep using that card, you'll end up like us, Sensei."
102010-133 = "Heeheehee..."

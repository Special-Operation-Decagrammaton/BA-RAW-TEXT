102010-91 = "คือผู้ที่แสดงให้เห็นถึงความตั้งใจของสีสัน... ผู้ที่วางแผนและกำหนดเป้าหมายทั้งหมด..."
102010-93 = "...... <เพลนาพาเทส> จะเผชิญหน้ากับคุณจากนี้ไปครับ"

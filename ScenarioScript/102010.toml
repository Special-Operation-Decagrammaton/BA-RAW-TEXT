102010-110 = "อ๊ะ มีคำสั่งด่วนจากองค์การนักเรียนมาค่ะ..."
102010-111 = "คะ? ฉันเล่นใหญ่ไปเหรอคะ?"
102010-112 = "ตะ... แต่ถ้าตอนนี้องค์การนักเรียนไม่ออกมาเคลื่อนไหวอะไรเลยละก็..."
102010-114 = "อ๊ะ... อ๊ะ!!  มีข่าวด่วนเข้ามาค่ะ!! มีกองกำลังปริศนาปรากฏตัวอยู่ทั่วพื้นที่ D.U. ......?!"

102010-116 = "มีรายงานว่าพวกนั้นกำลังโจมตีเมืองของเราโดยที่ไม่สนใจอะไรเลยค่ะ...! "
102010-117 = "อะ.. อะไรคะเนี่ย? การบุกรุกอย่างกะทันหันนี่มัน...?!  มาแบบไม่รู้สาเหตุเลยค่ะ...! "

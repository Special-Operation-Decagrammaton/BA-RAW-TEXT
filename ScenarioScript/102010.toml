102010-64 = "...... เทพหมาป่าได้พบกับสีสันโดยบังเอิญครับ"
102010-65 = "เธอถูกสับเปลี่ยนเป็นส่วนหนึ่งของความหวาดกลัว... และกลายเป็น[ruby=อะนูบิส]เทพแห่งความตาย[/ruby]ที่จะนำสิ่งมีชีวิต#nทั้งหมดไปสู่ภพหน้า..."
102010-66 = "เธอจะเป็นหัวเรี่ยวหัวแรงในการนำมาถึงของจุดจบของโลกใบนี้ตามที่วิสัยของเธอพาไปครับ"
102010-67 = "สีสันรู้ถึงสิ่งนั้น... เลยมายังที่แห่งนี้และยึดเอา <ความสูงส่ง> ของเธอไว้ก่อนใครครับ"
102010-76 = "เดิมทีผมเข้าใจว่า... <สีสัน> เป็นแนวคิดที่ไม่มีความตั้งใจ ไม่มีความปรารถนา ไม่มีเป้าหมาย และไม่สามารถอธิบายได้..."
102010-77 = "แต่ตอนนี้ผมเริ่มรู้สึกถึง <เป้าหมาย> และ <แผนการ> ได้อย่างชัดเจนเลยครับ"
102010-78 = "ไม่คิดเลยว่าสีสันจะวางแผนด้วยความตั้งใจ และการดำเนินการเชิงกลยุทธ์โดยการรวบรวมวิธีการต่างๆ เพื่อให้บรรลุเป้าหมาย..."
102010-79 = "ดูเหมือนว่า <สีสัน> จะซึมซับความลึกลับ ความน่ากลัว และความสูงส่งทั้งหมดในคิโวทอส และทำให้เป็นของตัวเองนะครับ"
102010-81 = "หอคอยทั้ง 6 ที่ปรากฏในคิโวทอส... มันก็คือ <แซงค์ทัมทาวเวอร์> ที่พลิกกลับด้านครับ"
102010-82 = "ความลึกลับที่เคยมีมาตั้งแต่ช่วงเวลาที่เก่าแก่มากๆ ... เป็นเทคโนโลยีที่ <เหล่าเทพไร้นาม> เป็นผู้สร้าง#nขึ้นมา"
102010-83 = "สิ่งนี้จะกระจายสีสันออกไปสู่โลก และเปลี่ยนความลึกลับทั้งหมดที่มีอยู่ในคิโวทอสให้เป็นความน่ากลัว "
102010-84 = "เช่นเดียวกับเทพหมาป่าไงครับ"
102010-85 = "[s] \"ถ้างั้นก็แค่ต้องขวางมันไว้\""
102010-86 = "...... "
102010-87 = "สาเหตุที่สีสันบุกรุกเกมาเทรียโดยใช้ <เทพที่นำอวสานมาสู่โลก>... อาจเป็นเพราะต้องการแย่ง <ความลับ> และ <ผลการทดลอง> ที่เกมาเทรียมีก็ได้ครับ"
102010-88 = "ทั้งเส้นทางของเดคาแกรมมาทอน ความลับของมิเมซิส สหพันธ์นักบุญ ห้องสมุดแห่งตำนาน... พลังของเทพไร้นาม ตลอดถึงความสามารถของเหล่าผู้พิทักษ์นิรนาม..."

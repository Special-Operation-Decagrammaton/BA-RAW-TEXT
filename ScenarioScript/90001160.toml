[translation]
90001160-1 = "ตอนที่ 16;เสียงเรียก"
90001160-5 = "(หายใจเข้า... หายใจออก...)"
90001160-6 = "เอาละ ถึงเวลาแล้ว!"
90001160-10 = "ค่ะ ค่ะ!"
90001160-14 = "ใช่ค่ะ ถึงเวลาแล้ว เราต้องจริงจังกันให้มากขึ้นแล้วละ จากนี้ไปเราจะผิดพลาดไม่ได้แม้แต่นิดเดียวค่ะ"
90001160-15 = "ชะ... ใช่ค่ะ! ในที่สุด ในที่สุด... ก็ถึงเวลาที่จะปลุกพี่สาวของเราแล้วค่ะ"
90001160-17 = "ไอน์ หยุดพูดติดอ่างก่อน!"
90001160-19 = "งะ... แง?!!?!"
90001160-20 = "เข้าใจแล้วค่ะ... ฉันจะพยายามค่ะ..."
90001160-21 = "ก็นะ... เราห้ามกังวลเกินไปจนทำผิดพลาด แล้วก็ห้ามวางใจเกินไปจนเผลอทำผิดพลาดด้วยค่ะ"
90001160-25 = "เช็กน้ำหล่อเย็นที่เหลืออยู่แล้วค่ะ... ไม่พบปัญหาค่ะ!"
90001160-26 = "ส่งพลังงานทั้งหมดที่ใช้ได้ไปยัง <ดินแดนแห่งโซฮาร์> บาเรียพหุมิติที่เปิดขึ้นจะถูกปิดชั่วคราวค่ะ "
90001160-28 = "ถึงจะอันตราย แต่ก็ช่วยไม่ได้น่ะนะ... เอาละ"
90001160-32 = "ลุยเลยพวกเรา!"
90001160-47 = "แปลงความเข้มข้นของข้อมูล"
90001160-48 = "ตรวจสอบการเชื่อมต่อสัญญาณประสาท"
90001160-50 = "ดำเนินการเชื่อมต่อ พร้อมกับตรวจสอบความแข็งแรงของพันธะ"
90001160-51 = "ตรวจสอบแล้วค่ะ อยู่ในเสถียรภาพที่ดีค่ะ"
90001160-52 = "ถ้างั้นจะทำการเชื่อมโยงซึ่งกันและกันแล้วนะคะ"
90001160-58 = "ตรวจสอบเสถียรภาพของการเชื่อมโยง... เช็กขอบเขตการทำงานคอนเนกโตม"
90001160-59 = "เปิดการทำงานของคอนเนกโตม... ให้ส่งผลลัพธ์ขึ้นหน้าจอมั้ยคะ?"
90001160-60 = "ไม่เป็นไรหรอก ไอน์ ฉันเชื่อใจเธอ"
90001160-66 = "เข้าสู่[ruby=Peshat]เปชาต[/ruby] พื้นที่แรกของจิตสำนึก เยื่อหุ้มสมองชั้นนอกปกติ พบรูปคลื่นเดลตา"
90001160-67 = "เข้าสู่[ruby=Remez]เรเมซ[/ruby] พื้นที่ที่ 2 ของจิตสำนึก เมดัลลาชั้นกลางปกติ พบรูปคลื่นธีตา"
90001160-68 = "เข้าสู่[ruby=Derash]เดแรช[/ruby] พื้นที่ที่ 3 ของจิตสำนึก ส่วนในของนิวเคลียส... พะ... พบสัญญาณผิดปกติ?!?!"
90001160-69 = "ทะ... ทะทะทะทะ... ทำยังไงดีคะ? เกิดเรื่องใหญ่แล้วหรือเปล่าคะ?!"
90001160-70 = "ไม่หรอก ไอน์ แบบนี้ละถูกแล้ว เรื่องปกติ"
90001160-72 = "ใช่ค่ะ จากนี้ไปไม่ใช่พื้นที่ที่พวกเราเข้าถึงได้ตามอำเภอใจหรอกค่ะ"
90001160-78 = "สังเกตการณ์[ruby=Sod]ซอด[/ruby] พื้นที่ที่ 4 ของจิตสำนึก..."
90001160-79 = "รักษาเสถียรภาพการจ่ายพลังงาน ปลดบาเรียพหุมิติชั่วคราวค่ะ"
90001160-80 = "จากนี้ไปเราคงทำได้แต่เฝ้าดูความคืบหน้านะคะ"
90001160-82 = "ถะ... ถ้างั้นพวกเรา... ต้องทำอะไรเหรอคะ...?"
90001160-86 = "..."
90001160-87 = "สวดอธิษฐานมั้ยล่ะ?"
90001160-88 = "เป็นความคิดที่ไม่เลวนะคะ ก็พวกเราอยู่ในสถานะที่ต้องรับใช้ท่านผู้นั้นนี่คะ"
90001160-89 = "ค่ะ ค่ะ... ภาวนาอย่างสงบไว้ในจิตใจ..."
90001160-91 = "ขอให้พี่มัลคูธ พี่สาวของพวกเราลืมตาขึ้นในดินแดนแห่งนี้ได้อย่างปลอดภัยด้วยเถิด"
90001160-101 = "เอาละ มาคุยเรื่อง <Kei.sav> กันเถอะค่ะ"
90001160-102 = "ก่อนหน้านี้ฉันลองทุกวิถีทางเพื่อวิเคราะห์ไฟล์นี้แล้ว แต่ก็ไม่ได้ผลลัพธ์ที่น่าพอใจเลยค่ะ"
90001160-103 = "แต่ว่าริโอะ คุณบอกว่าถ้าใช้เทคโนโลยีทั่วไปของคิโวทอส ก็คงจะได้ผลลัพธ์เช่นนั้นอย่างไม่ต้อง#nสงสัยใช่ไหมคะ?"
90001160-104 = "ใช่ ฉันเคยพูดไว้อย่างนั้น"
90001160-105 = "แล้วคุณก็ยังบอกด้วยว่าต้องการพื้นที่จัดเก็บข้อมูลให้มากที่สุดเท่าที่จะมากได้ พวกฉันก็เลยเตรียม#nอุปกรณ์จัดเก็บข้อมูลทั้งหมดที่หาได้จากฐานนี้..."
90001160-106 = "แต่ถ้าคุณคิดจะย้ายไฟล์ <Kei.sav> ไปยังอุปกรณ์จัดเก็บข้อมูลละก็ คงไม่มีประโยชน์มากนักหรอกค่ะ เพราะฉันเคยลองทำไปแล้วค่ะ"
90001160-107 = "ทำแค่นั้นคงไม่พอหรอก ถ้าเราจะรับมือกับเทคโนโลยีของทวยเทพไร้นาม... เราก็ต้องการสภาพแวดล้อมที่เหมาะสมกับสิ่งนั้น"
90001160-111 = "ช่วยอธิบายให้ละเอียดกว่านี้หน่อยได้มั้ยคะ...?"
90001160-112 = "ถ้า <Kei.sav> เป็นกุญแจหรือร่องรอยของทวยเทพไร้นามจริงๆ ละก็ มันจะเข้ากับตัวบันทึกที่เราใช้#nกันทั่วไปในทันทีไม่ได้หรอก"
90001160-113 = "ถ้าจะเปรียบเทียบในทางชีววิทยา... ก็เท่ากับว่าเราต้องการอาหารเลี้ยงเชื้อที่เข้ากับสภาพการณ์"
90001160-114 = "หมายความว่า...?"
90001160-115 = "ก็อย่างนั้นละ..."
90001160-119 = "ถ้าอย่างนั้นก็หมายความว่า... ข้อมูลนี้แทบจะเป็นเหมือนจิตสำนึกที่มีชีวิตเหรอคะ?!"
90001160-120 = "ถ้าเป็นฉันคนก่อน ก็คงปฏิเสธคำว่า 'มีชีวิต' ไปแล้ว..."
90001160-121 = "แต่ที่เธอพูดก็ถูกแล้วละ ฮิมาริ ฉันไม่รู้ว่าเราจะกำหนดหมวดหมู่ของสิ่งมีชีวิตได้แค่ไหน และจะให้นิยามของมันได้อย่างไร"
90001160-122 = "แต่ในแง่ของภาวะสมดุล การตอบสนอง ความสามารถในการปรับตัว และการตระหนักรู้ในตนเองแล้ว ข้อมูลนี้ก็คงมีส่วนที่ตีความแบบนั้นได้"
90001160-131 = "[ns1] \"โทคิกับเอมิก็เข้าใจได้เหรอเนี่ย สุดยอดไปเลย...\"\n[ns2] \"ทุกคนเข้าใจด้วยเหรอ ครูไม่เห็นจะเข้าใจเลยสักนิด...\""
90001160-136 = "ไม่ต้องกังวลหรอกค่ะ คุณครู ฉันเองก็ไม่เข้าใจเลยสักนิดค่ะ บึ๋ย"
90001160-137 = "ถึงจะไม่เข้าใจ แต่ก็คิดว่าฉันให้ความช่วยเหลือในหลายๆ เรื่องงั้นเหรอคะ? ขอบคุณที่คิดแบบนั้นค่ะ"
90001160-138 = "แต่ทั้งหมดที่ฉันรู้ ก็มาจากการที่ฉันคอยสังเกตจากท่านริโอะอีกทีค่ะ และตอนนี้ฉันก็แค่ทำตามคำสั่ง#nของทั้งสองคนเท่านั้นค่ะ"
90001160-139 = "ตอนนี้ฉันทำงานตามคำสั่งเสร็จและกำลังรู้สึกเบื่อพอดี ก็เลยอยากขอให้คุณครูมาเล่นกับฉันหน่อยค่ะ"
90001160-143 = "อืม ถึงจะพูดออกมาจากปากของฉันเอง แต่มันช่างเป็นบทพูดที่สมบูรณ์แบบของเมดคนเก่งจริงๆ เลยค่ะ รีบชมฉันสิคะ"
90001160-144 = "โทคิ จริงๆ เลยเชียว ฉันก็สงสัยว่าเธอไปทำอะไรอยู่ อีกอย่างนะ อย่ามาผูกขาดคุณครูอยู่คนเดียวสิ"
90001160-154 = "คุณครู ไว้สักวันคุณครูต้องมาเล่นกับฉันแค่สองคนนะคะ สัญญาแล้วนะคะ ถึงคุณครูจะบอกว่าไม่ได้#nสัญญากับฉันไว้ แต่ฉันสัญญากับคุณครูไว้แล้วค่ะ เข้าใจใช่มั้ยคะ?"
90001160-155 = "[s] \"อืม... ก็ได้...\""
90001160-162 = "ฉันไม่รู้ว่าผู้รอบรู้อย่างฉันควรพูดแบบนี้หรือเปล่านะคะ แต่ว่า..."
90001160-163 = "จริงสิ ไหนๆ ก็มาถึงที่นี่แล้ว งั้นก็ทำใบปริญญาในแขนงนี้สักใบแล้วมอบให้ตัวเองมั้ยล่ะหัวหน้า?"
90001160-164 = "พูดอะไรแบบนั้นคะ เอมิ ถ้างั้นฉันก็ไม่ต่างกับนักวิจัยน่าสงสารที่สูญเสียแก่นแท้ของตัวเองไป แล้วยังลุ่มหลงในการสร้างภาพลักษณ์ให้ตัวเองอีกสิคะ"
90001160-165 = "งั้นที่ผ่านมาก็ไม่ได้ให้ใบปริญญาตัวเองสินะ..."
90001160-166 = "เอาเถอะค่ะ สิ่งที่เราพยายามทำอยู่ บางทีอาจเป็นจุดเริ่มต้นของการรับรู้แบบใหม่ที่ไม่เคยมีใครนิยาม#nมาก่อนก็ได้นะคะ"
90001160-171 = "ก็เพราะแบบนี้ละ... ฉันเลยคิดว่าถ้าเป็นไปได้ ความรู้ในด้านนี้ควรมีการควบคุมไว้"
90001160-172 = "เพราะเรามักจะคิดว่าเรารู้จักความรู้ที่เราจัดการอยู่ แต่ที่จริงแล้วในหลายๆ ครั้งมันกลับไม่เป็นแบบนั้น"
90001160-173 = "พูดถึงเรื่องที่ผ่านไปแล้วสินะคะ"
90001160-174 = "ใช่แล้วละ มันผ่านไปแล้ว"
90001160-183 = "ถ้าอย่างนั้นก็... ถือว่าเตรียมพร้อมแล้วใช่มั้ยคะ?"
90001160-184 = "ถ้าเป็นการเตรียมขั้นต้นละก็ใช่ ของจริงมันคือต่อจากนี้ไปต่างหาก"
90001160-185 = "จากนี้ไปเราจะย้ายเคย์ไปอยู่ในที่เก็บข้อมูล..."
90001160-186 = "ที่จริงสิ่งที่เราจะทำต่อจากนี้ไปไม่ใช่เรื่องยากขนาดนั้นหรอก โดยพื้นฐานแล้วก็แค่การเฝ้าดูเท่านั้น"
90001160-187 = "แต่ว่า สมมติว่า... มีเหตุการณ์ไม่คาดฝันเกิดขึ้น..."
90001160-192 = "ตอนนั้นเราต้องทำยังไงเหรอคะ?"
90001160-194 = "ทางเดียวที่เราจะรับมือได้ ก็คือการรับมือทางกายภาพ"
90001160-196 = "เป็นอย่างนี้นี่เอง ที่เอาแผ่นข้อมูลนี้ออกมาไว้ข้างนอก ก็เพื่อให้สามารถถอดออกได้ตลอดเวลาสินะคะ"
90001160-197 = "สรุปว่าถ้าเห็นเค้าลางแปลกๆ ก็ให้ทำลายเลยงั้นเหรอ?"
90001160-199 = "ถ้าจะพูดให้เข้าใจง่ายๆ ละก็... ใช่แล้วละ"
90001160-205 = "แล้วทำไมถึงมาจ้องฉันล่ะคะ ริโอะ?"
90001160-206 = "ก็เพราะ... ฉันคิดว่าเธออาจมีข้อโต้แย้งเกี่ยวกับวิธีการนี้น่ะ เธออาจจะบอกว่ามันป่าเถื่อน หรือไม่ก็บอกว่าสมแล้วที่เป็นวิธีที่ฉันคิดได้..."
90001160-210 = "เห็นฉันอย่างนี้... แต่ถ้าเป็นเรื่องที่ต้องยอมรับ ฉันก็รู้จักยอมรับค่ะ เพราะการทำแบบนั้นมันทั้งเรียบร้อย และสง่างามกว่า แล้วก็ยังดูถ่อมตนด้วยค่ะ"
90001160-211 = "และถึงยังไง คนที่รู้เกี่ยวกับพลังของทวยเทพไร้นามมากที่สุดก็คือคุณนี่คะ"
90001160-212 = "ฉันไม่มีความคิดที่จะลดคุณค่าหรือตำหนิการตัดสินใจของคุณในสาขาที่คุณเชี่ยวชาญหรอกค่ะ"
90001160-213 = "ขอบใจนะ..."
90001160-215 = "ถ้าเป็นไปได้ ฉันก็หวังว่าจะไม่ต้องใช้วิธีแก้ปัญหาด้วยความรุนแรงนะ"
90001160-216 = "ทางนี้เตรียมพร้อมแล้วค่ะ เริ่มได้ทุกเมื่อเลยค่ะ"

[translation]
1005105-1 = "熱情的應援魂"
1005105-4 = "拉麵店前"
1005105-9 = "那個……"
1005105-10 = "我應該是訂購了招攬顧客用的應援機器人……"
1005105-11 = "為什麼是工程師部的巨匠親自跑來呢……？"
1005105-12 = "這是因為……"
1005105-13 = "應援機器人的開發失敗了！"
1005105-14 = "咦……這樣啊。#n那還真是遺憾……"
1005105-15 = "但老闆不需要感到憂愁。今天就由我來代替機器人吧！"
1005105-16 = "巨匠親自應援嗎……？"
1005105-17 = "那個……如果是這樣的話，我覺得直接雇個打工的來好像比較……"
1005105-18 = "不，既然接受了委託就得做到最後！#n這是我身為巨匠的職責。"
1005105-19 = "我不會收取報酬，所以不需要擔心費用。#n這裡就交給我吧。"
1005105-20 = "那，那就拜託了……"
1005105-24 = "好……為求拉麵店生意興隆，開始吶喊助威吧！"
1005105-29 = "加油，加油，麻雀亭！"
1005105-30 = "堅持，堅持，麻雀亭！"
1005105-31 = "上吧，獲勝吧，麻雀亭！"
1005105-35 = "[ns]「……是要在什麼方面獲勝？」"
1005105-36 = "要經營餐廳就得面對各種困難對吧？"
1005105-37 = "像是租金、人事成本，以及需要嚴格把關的衛生問題等等。#n我希望老闆能克服這些難關。"
1005105-38 = "好，好強的氣勢。#n光是聽見聲音，就能感覺到力量在湧現……"
1005105-39 = "……但為何是在廚房前面加油呢……？"
1005105-40 = "因為生意的興盛與否，關鍵在於老闆的熱情。"
1005105-41 = "就算招攬到客人，若是老闆沒有熱情的話，那就只是白忙一場。"
1005105-42 = "確，確實……上了一課呢。"
1005105-43 = "……等等。你是在揉麵團嗎？"
1005105-44 = "距離開店時間已所剩無幾，竟然還在製作麵團……"
1005105-45 = "沒關係的。反正開店後也幾乎沒有客人上門，就算悠哉地準備……"
1005105-50 = "關係大了！"
1005105-51 = "拉麵店的生命就在於速度！點餐後如果不立刻煮麵，客人就會跑掉！"
1005105-52 = "那麼遲鈍的動作怎麼能稱自己是[ruby=巨匠]職人[/ruby]呢！"
1005105-54 = "咦，我並沒有想要成為職人──"
1005105-56 = "有空說話不如加快速度！"
1005105-60 = "這，這樣嗎？"
1005105-61 = "這樣不夠！再快一點！對，就是這樣！"
1005105-62 = "噫……"
1005105-63 = "全力以赴！拿出全部的熱情！戰鬥吧，老闆！"
1005105-64 = "……是，是！"
1005105-69 = "……快看。拉麵店老闆正配合著應援團的口號揉麵團。"
1005105-70 = "手的速度快到看不見……是隱藏的職人店吧？"
1005105-71 = "突然有想吃拉麵的感覺。今天的午餐就在這裡解決吧？"
1005105-72 = "好呀！請給我兩人份！"
1005105-74 = "……非常感謝！請稍等！"
1005105-75 = "才剛開店就開始排隊了……"
1005105-76 = "這就是應援的效果……？"
1005105-80 = "呵呵，應援大成功。"
1005105-81 = "走吧，老師。#n前往下一個地點吧。"
1005105-87 = "……也就是說，委託的應援機器人沒能完成？"
1005105-88 = "嗯，真抱歉。憑我的能力無法在期限內完成。"
1005105-89 = "這也沒辦法。我給的期限太緊迫了……"
1005105-90 = "不過請放心。今天我會代替機器人擔任應援團長，全力幫你加油！"
1005105-91 = "好，說出你的煩惱吧。"
1005105-92 = "其，其實是……"
1005105-96 = "我很喜歡Momo好友的老大哥。#n那彷彿能看穿一切的目光，散發著一股神祕的魅力。"
1005105-97 = "所以我從很久以前就加入老大哥粉絲俱樂部進行活動……#n而下星期將舉辦粉絲俱樂部會長的選舉。"
1005105-98 = "我很想要參加會長選舉，讓其他會員知道我有多麼喜歡老大哥……#n卻無法鼓起勇氣……"
1005105-99 = "無法對自己誠實以待的我，#n想必無法成為能看穿一切的老大哥的粉絲俱樂部會長吧……"
1005105-105 = "你的愛就只有這點程度嗎？"
1005105-107 = "什，什麼！？"
1005105-109 = "喜歡就該說喜歡，這種事一點都不需要覺得害羞！"
1005105-110 = "對自己的內心坦率！再勇敢一點吧！"
1005105-111 = "還是說……其實你覺得老大哥讓你很丟臉呢？"
1005105-112 = "才沒有！我是打從心底喜歡老大哥的！"
1005105-113 = "那就吶喊吧！喊出你真正的心意！"
1005105-114 = "我，我喜歡老大哥！"
1005105-115 = "再大聲一點！"
1005105-120 = "我最喜歡老大哥了！超級崇拜！"
1005105-128 = "……那個，你是會員吧？為何要在這種地方大叫呢？"
1005105-130 = "那個……我是為了向大家傳達我對老大哥的愛……"
1005105-132 = "再怎麼喜歡老大哥，像這樣在人來人往的公開場合理直氣壯地大聲吶喊……"
1005105-137 = "……實在太讓人感動了！"
1005105-139 = "……什麼？"
1005105-141 = "我們平時也很想吶喊出對老大哥的愛，#n不過因為在意別人的目光，所以一直隱藏在心裡……"
1005105-142 = "竟然能坦率地表達那份心情，真是勇氣可嘉！"
1005105-143 = "你有資格擔任下一任的會長！"
1005105-145 = "真，真的嗎？"
1005105-146 = "像我這種人……真的能擔任老大哥粉絲俱樂部的會長嗎？"
1005105-147 = "那當然囉！"
1005105-148 = "好，我們一起吶喊老大哥的魅力吧！"
1005105-157 = "……這次也非常成功！"
1005105-158 = "[s]「好驚人的熱情……」"
1005105-159 = "呵呵，能得到老師的讚賞是我的榮幸。"
1005105-160 = "可惜沒時間在這裡磨蹭了。#n有很多人都在等待我們的應援啊！"
1005105-162 = "（之後和詠葉在市區各地來回奔波，努力幫市民們加油）"
1005105-168 = "呼……真是美好的一天。"
1005105-169 = "[s]「辛苦了，詠葉。」"
1005105-170 = "不，打從一開始就是我無法遵守期限造成的問題。幸虧大家都很滿意的樣子。"
1005105-171 = "而且平時總是靠機器做事，偶爾親自活動身體也不賴。"
1005105-172 = "還獲得了滿滿的新靈感……也想起了初心。"
1005105-173 = "我都想趕快回去製作下一個發明了。"
1005105-177 = "[ns1]「話說回來，為何從剛才開始……」\n[ns2]「就小小聲地說話呢？」"
1005105-182 = "那是因為……"
1005105-183 = "今天一整天都在吶喊的關係……"
1005105-189 = "聲音……已經……"
1005105-191 = "（之後，帶著喉嚨沙啞的詠葉回到了夏萊）"

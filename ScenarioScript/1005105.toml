[translation]
1005105-1 = "A Captain's Heaven-Piercing Cheer"
1005105-4 = "In Front of the Ramen Shop"
1005105-9 = "Um..."
1005105-10 = "If I'm not mistaken, I ordered a cheer bot for promotion..."
1005105-11 = "...What brings a meister of the Engineering Department here?"
1005105-12 = "Ah, well, you see, um..."
1005105-13 = "I failed to fulfill your order!"
1005105-14 = "Oh, I see. That's a shame."
1005105-15 = "But worry not. I may not have a robot with me, but I do have my body! I will cheer for your shop myself."
1005105-16 = "A meister of the Engineering Department cheering for us...?"
1005105-17 = "Um... It's okay, we can just get someone else to do it.."
1005105-18 = "I won't allow it! I never leave a commission unfulfilled!"
1005105-19 = "Besides, you don't even have to pay me for this. In fact, this is my way of paying you back for my mistake."
1005105-20 = "I-If you say so... I'm...counting on you, I guess?"
1005105-24 = "Now... I may not have machine-precision, but the passion of my cheers are second to none!"
1005105-29 = "Suzume Ramen, never fallen!"
1005105-30 = "Suzume Ramen, always balling!"
1005105-31 = "Suzume Ramen, keep fighting without caution!"
1005105-35 = "[ns] \"...Does making ramen involve a lot of fighting?\""
1005105-36 = "Running a restaurant is an uphill battle to be sure."
1005105-37 = "Expensive rent for a good location, pests that cause hygiene problems..."
1005105-38 = "Wow, your voice sounds so powerful. Just listening to it fills me with energy..."
1005105-39 = "But why cheer in front of the kitchen instead of the restaurant...?"
1005105-40 = "The prosperity of a restaurant depends on its owner's will, not its customers'."
1005105-41 = "No matter how many guests come in, if the owner isn't at least as fired up as their own stove, they'll all leave quickly."
1005105-42 = "I-I see... Thank you for the advice."
1005105-43 = "...By the way, are you only just now kneading noodles?"
1005105-44 = "There's not much time until the restaurant opens, and you're still getting ready..."
1005105-45 = "It's fine. Customers rarely come in as soon as we open. If anything, prepping food later makes it fresher..."
1005105-50 = "That's the opposite of fine!"
1005105-51 = "Without speed, a ramen seller is nothing more than a broth peddler! Customers won't wait for your ramen forever!"
1005105-52 = "How can you call yourself the legendarily rumor-renowned ramen meister of the Kivotos underground when you're this sluggish!"
1005105-54 = "B-But, I don't call myself that..."
1005105-56 = "If you can talk, you can knead! Faster!"
1005105-60 = "L-Like this?"
1005105-61 = "Not enough! Faster! You have a knead for speed!"
1005105-62 = "Um, um..."
1005105-63 = "Knead, knead, with all your might! It's just dough, you win this fight!"
1005105-64 = "Y-Yes!"
1005105-69 = "Hey, look. That guy is kneading dough at an incredible speed! ...While being cheered for?"
1005105-70 = "Oh my... He must be the legendarily rumor-renowned ramen meister of the Kivotos underground I've heard so much about! And we never knew!"
1005105-71 = "I've been craving ramen... Want to get some right now?"
1005105-72 = "Hmm, sure... Make it an order for two!"
1005105-74 = "...Y-Yes! P-Please give me a moment!"
1005105-75 = "I don't get it... As soon as I opened shop, customers started pouring in..."
1005105-76 = "I-Is this the power of cheering...?"
1005105-80 = "Heh heh, of course. You can always count on a cheer! It really gets people into gear!"
1005105-81 = "Okay, Sensei. On to the next location?"
1005105-87 = "...Huh? You couldn't complete the cheer bot I requested?"
1005105-88 = "...Yes, I'm sorry. I wasn't able to finish a non-exploding model in time."
1005105-89 = "I-It can't be helped. After all, I gave you such short notice..."
1005105-90 = "But don't worry. My cheers may not be able to break the sound barrier...but my passion will!"
1005105-91 = "Now, describe your problem to me."
1005105-92 = "R-Right... My issue is..."
1005105-96 = "I love Big Brother, from Momo Friends. There's a mysterious charm in his gaze. It pierces through everything..."
1005105-97 = "So I'm a Big Brother Big Fan Club member...and we're having an election for Biggest Fan... Er, that's the club president position."
1005105-98 = "I want to run in the election and show the other members the size of my love for Big Brother... But I don't have the courage..."
1005105-99 = "If I'm too afraid of letting other people see who I am on the inside, how could I deserve to be the Biggest Fan of Big Brother, whose gaze pierces everything..."
1005105-105 = "That's it?"
1005105-107 = "What?!"
1005105-109 = "There's no shame in liking something!"
1005105-110 = "Don't be shy, don't make me pry, shout your love, from up above!"
1005105-111 = "If you lie, then you... Wait, is it that you're ashamed of being a Big Brother fan?"
1005105-112 = "N-No! I love Big Brother more than anyone!"
1005105-113 = "Then be louder than anyone about that love! Come on, I want to hear you say it!"
1005105-114 = "I-I love Big Brother."
1005105-115 = "Louder, louder, come on, fan! If you don't shout, you'll sound like a gran!"
1005105-120 = "I love Big Brother so freaking much!"
1005105-128 = "Excuse me? Why are you screaming in a place like this?"
1005105-130 = "U-Um, I was trying to express my sincere feelings for Big Brother..."
1005105-132 = "I understand how you feel, but shouting in the middle of the street like that..."
1005105-137 = "I'm so moved!"
1005105-139 = "...Huh?"
1005105-141 = "I've always felt the urge to shout my love for Big Brother in the streets, but I was always too worried about what people would think...and also about them reporting me to the police..."
1005105-142 = "Your courage to honestly express your feelings... I could never compare!"
1005105-143 = "You're fit to be the next big Biggest Fan!"
1005105-145 = "R-Really?"
1005105-146 = "Do you really think someone like me could become the Big Brother Fan Club president?"
1005105-147 = "Of course!"
1005105-148 = "Now, let's fill the air with shouts of Big Brother's coolness!"
1005105-157 = "Another perfect success!"
1005105-158 = "[s] \"I am in awe of your energy...\""
1005105-159 = "Heehee, thanks for the compliment."
1005105-160 = "But we're burning valuable cheer time here. We still have plenty of people to support!"
1005105-162 = "After that, Utaha and I visited those who had asked for cheer bots. She cheered them on, and I cheered her on."
1005105-168 = "Phew... What a hectic day."
1005105-169 = "[s] \"Thank you for your hard work today.\""
1005105-170 = "Don't mention it. I couldn't meet the deadline in the first place, so it was my problem to solve. Thankfully, everyone seemed content."
1005105-171 = "Besides, it's kind of nice to do something without using a machine. Once in a while."
1005105-172 = "This was all quite inspiring. Wandering in the streets, talking to everyone...it reminded me of why I love creating things."
1005105-173 = "Meisters learn one thing from success... But today was full of them, so I learned plenty."
1005105-177 = "[ns1] \"So, I've been wondering...\"\n[ns2] \"Why are you whispering?\""
1005105-182 = "Ah..."
1005105-183 = "The flame that burns twice as bright, burns half as long..."
1005105-189 = "Meaning I lost my voice."
1005105-191 = "Utaha's fire was too bright, apparently, and she lost her voice. So we returned to Schale."

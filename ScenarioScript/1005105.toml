[translation]
1005105-1 = "สปิริตการเชียร์ของหัวหน้าสุดร้อนแรง"
1005105-4 = "ด้านหน้าร้านราเม็ง"
1005105-9 = "คือว่า..."
1005105-10 = "ถ้าผมเข้าใจไม่ผิดละก็... ผมสั่งหุ่นยนต์เชียร์สำหรับเรียกลูกค้านี่นา..."
1005105-11 = "แล้วทำไม... คุณไมสเตอร์แห่งชมรมวิศวกรรมถึงได้มาที่นี่เองเลยล่ะครับ?"
1005105-12 = "อืม คือว่าเรื่องนั้นน่ะ..."
1005105-13 = "ฉันล้มเหลวเรื่องสร้างหุ่นยนต์สำหรับเชียร์แบบใหม่ตามที่คุณสั่งน่ะ"
1005105-14 = "อ๊ะ... งะ... งั้นเหรอครับ น่าเสียดายจังเลยนะ"
1005105-15 = "แต่ว่าไม่ต้องกังวลหรอกนะ ถึงจะสร้างหุ่นยนต์ให้ไม่ได้ แต่ฉันก็มาเชียร์ด้วยตัวเองเลยน่ะ"
1005105-16 = "คุณไมสเตอร์แห่งชมรมวิศวกรรมจะมาเชียร์ลูกค้าด้วยตัวเองเลยเหรอ...?"
1005105-17 = "คือ... ถ้าเรื่องเชียร์ลูกค้าละก็... เรียกคนอื่นมาทำก็ได้นะ..."
1005105-18 = "ไม่เป็นไร! การรับผิดชอบงานที่รับมาแล้วให้ถึงที่สุด ก็คือหน้าที่ของไมสเตอร์!"
1005105-19 = "อีกอย่างไม่ต้องห่วงเรื่องงบด้วย เรื่องเป็นแบบนี้เพราะความผิดพลาดของฉัน เพราะงั้นฉันจะทำให้ฟรีๆ เลย"
1005105-20 = "ถะ... ถ้างั้นก็ขอรบกวนด้วยนะครับ..."
1005105-24 = "เอาละ... ถ้างั้นมาเชียร์กันให้สุดขั้วเพื่อให้ร้านนี้ดังกระฉ่อนกันเลยดีมั้ย?"
1005105-29 = "พยายามเข้า สึซึเมะราเม็ง!"
1005105-30 = "สู้ๆ สึซึเมะราเม็ง!"
1005105-31 = "เอาชนะให้ได้ สึซึเมะราเม็ง!"
1005105-35 = "[ns] \"จะให้ร้านราเม็งสู้กับอะไรเหรอ?\""
1005105-36 = "ก็นะ ถ้าเปิดร้านอาหาร ก็จะต้องต่อสู้กับปัญหาต่างๆ ไม่ใช่รึไง?"
1005105-37 = "ทั้งค่าเช่าร้านแสนแพง พวกแมลงรบกวนที่ก่อให้เกิดปัญหาสุขอนามัย"
1005105-38 = "ทะ... ทรงพลังมากเลยนะครับ แค่ได้ยินเสียงก็เหมือนรู้สึกว่ามีแรงฮึดขึ้นมาเลยละครับ..."
1005105-39 = "ว่าแต่... ทำไมถึงมาเชียร์ในห้องครัว ไม่ไปเชียร์ที่หน้าร้านแทนล่ะครับ...?"
1005105-40 = "นั่นก็เพราะว่าความก้าวหน้าของร้านไม่ได้ขึ้นอยู่กับลูกค้า แต่ขึ้นอยู่กับความตั้งใจของเจ้าของร้าน#nต่างหากล่ะ"
1005105-41 = "ต่อให้เรียกลูกค้าเข้ามาที่ร้านได้มากขนาดไหน แต่ถ้าเจ้าของร้านไม่มีความตั้งใจหรือความมุ่งมั่นละก็ ไม่นานลูกค้าก็จะค่อยๆ หายไป"
1005105-42 = "นะ... นั่นสินะครับ... ผมเข้าใจแล้วละครับ"
1005105-43 = "เดี๋ยวก่อนนะ... นี่เพิ่งจะนวดแป้งเองเหรอ?"
1005105-44 = "อีกไม่นานก็จะถึงเวลาเปิดร้านแล้ว เพิ่งจะนวดแป้งงั้นเหรอ..."
1005105-45 = "ไม่เป็นไรหรอกครับ ตอนเปิดร้านไม่ค่อยมีลูกค้าเข้ามาทันทีหรอกครับ ค่อยๆ เตรียมไปก็---"
1005105-50 = "ไม่เป็นไรที่ไหนกันเล่า!"
1005105-51 = "สิ่งสำคัญของร้านราเม็งคือความรวดเร็ว! ถ้าลูกค้าสั่งแล้วไม่ลงมือปรุงทันทีละก็ ลูกค้าก็จะหายวับไปใน#nพริบตาเลยนะ!"
1005105-52 = "ฝีมือแบบนี้จะเรียกตัวเองว่า[ruby=ไมสเตอร์]เจ้าแห่งราเม็ง[/ruby]ได้ยังไงกัน?"
1005105-54 = "ผะ...ผมไม่ได้อยากเป็นเจ้าแห่งราเม็งสัก——"
1005105-56 = "ถ้ามีเวลามาเอ้อระเหยชวนคุยอยู่แบบนี้ก็รีบขยับมือทำงานได้แล้ว!"
1005105-60 = "บะ...แบบนี้เหรอ?"
1005105-61 = "แค่นั้นยังไม่พอหรอก! เร็วกว่านี้อีก นวดให้เร็วกว่านี้อีก!"
1005105-62 = "ฮะ... เฮือก!"
1005105-63 = "ทุ่มเทด้วยพลังทั้งหมดที่มี ทุ่มเทความปรารถนาทั้งหมดลงไป! สู้ให้สุดตัว!"
1005105-64 = "คะ... ครับ!"
1005105-69 = "ดูนั่นสิ... เจ้าของร้านกำลังนวดแป้งบะหมี่ด้วยความเร็วที่น่าทึ่งมากๆ! แถมยัง... ตามจังหวะเสียง#nเชียร์ด้วย?"
1005105-70 = "ความเร็วสุดยอดมาก... นี่เป็นราเม็งร้านลับงั้นเหรอ?"
1005105-71 = "กำลังอยากกินราเม็งอยู่พอดีเลย มื้อเที่ยงวันนี้ไปกินราเม็งที่ร้านนั้นกันดีมั้ย?"
1005105-72 = "อื้อ เอาสิ... ขอโทษนะครับ ขอสั่งอาหารหน่อยครับ!"
1005105-74 = "ครับๆ! รบกวนรอสักครู่นะครับคุณลูกค้า!"
1005105-75 = "แปลกจัง วันนี้มีลูกค้าเข้าร้านตั้งแต่เปิดร้านเลยแฮะ ไม่เหมือนทุกทีเลย...?"
1005105-76 = "ระ...หรือว่าเป็นเพราะมีกองเชียร์...?"
1005105-80 = "ฮุฮุ สำเร็จแล้ว..."
1005105-81 = "เอ้า คุณครู เราไปที่อื่นกันต่อเลยดีมั้ย?"
1005105-87 = "หา...? ทำหุ่นยนต์เชียร์ตามที่ขอไม่ได้งั้นเหรอคะ?"
1005105-88 = "อืม... ขอโทษด้วยนะ ฉันยังไม่เก่งพอที่จะทำได้สำเร็จน่ะ"
1005105-89 = "ชะ...ช่วยไม่ได้นะคะ บางทีฉันอาจขอให้ทำแบบกระชั้นชิดเกินไป..."
1005105-90 = "แต่ไม่ต้องห่วงหรอกนะ ฉันจะคอยส่งแรงเชียร์ให้ในฐานะหัวหน้าทีมเชียร์ แทนเจ้าหุ่นยนต์เชียร์นั่นเอง!"
1005105-91 = "เอ้า บอกเรื่องที่กังวลมาสิ"
1005105-92 = "ระ... เรื่องที่ฉันกังวลก็คือ..."
1005105-96 = "ฉันชอบบิ๊กบราเธอร์จาก MOMO FRIENDS มากๆ ค่ะ สายตาของเขามีเสน่ห์อย่างลึกลับ เวลามอง#nก็เหมือนจะมองทะลุทุกสิ่งทุกอย่าง..."
1005105-97 = "เพราะงั้นฉันเลยสมัครเข้าเป็นแฟนคลับของบิ๊กบราเธอร์มาสักพักแล้ว... และอาทิตย์หน้าก็จะมี#nการเลือกหัวหน้าแฟนคลับของบิ๊กบราเธอร์ค่ะ"
1005105-98 = "ฉันอยากลงสมัครเป็นหัวหน้าแฟนคลับ และบอกกับคนในด้อมทุกๆ คนว่าฉันชอบบิ๊กบราเธอร์#nมากแค่ไหน ...แต่ฉันก็ไม่กล้าพอที่จะทำแบบนั้นเลย"
1005105-99 = "ฉันกลัวที่จะพูดความรู้สึกตัวเองให้คนอื่นได้รับรู้... คนอย่างฉันจะเป็นหัวหน้าแฟนคลับของบิ๊กบราเธอร์#nที่มองทะลุทุกสิ่งทุกอย่างแบบนั้นได้ยังไงล่ะคะ"
1005105-105 = "ความรักของเธอมันไม่สำคัญเลยรึไง?!"
1005105-107 = "คะ...คะ?!"
1005105-109 = "การพูดสิ่งที่เราชอบออกมาตรงๆ ไม่ใช่เรื่องน่าอายอะไรเลยนะ!"
1005105-110 = "ซื่อตรงกับหัวใจตัวเองหน่อยสิ กล้าๆ หน่อย!"
1005105-111 = "หรือว่าที่จริงแล้ว... เธออายที่จะบอกว่าเป็นแฟนคลับบิ๊ก บราเธอร์เหรอ?"
1005105-112 = "มะ... ไม่ใช่อย่างนั้นเลยค่ะ! ฉันชอบคุณบิ๊กบราเธอร์จริงๆ นะคะ!"
1005105-113 = "ถ้างั้นก็ตะโกนออกมาเลยสิ! ความรู้สึกที่แท้จริงของเธอที่มีต่อบิ๊กบราเธอร์น่ะ!"
1005105-114 = "ฉะ...ฉันชอบคุณบิ๊กบราเธอร์มากๆ เลยค่ะ!"
1005105-115 = "ดังกว่านี้อีก!"
1005105-120 = "ฉะ...ฉันชอบคุณบิ๊กบราเธอร์มากๆ เลยค่ะ!"
1005105-128 = "นี่เธอน่ะ... ทำไมถึงตะโกนดังๆ ออกมาในที่แบบนี้ล่ะ?"
1005105-130 = "คือ... คือว่าเรื่องนั้น... ฉันแค่อยากแสดงความรักที่มีต่อคุณบิ๊กบราเธอร์..."
1005105-132 = "ต่อให้ชอบคุณบิ๊กบราเธอร์มากแค่ไหน... แต่การที่มาตะโกนเสียงดังกลางถนนที่มีคนเดินผ่านไปมา#nแบบนี้น่ะ..."
1005105-137 = "น่าประทับใจสุดๆ ไปเลย!"
1005105-139 = "....คะ?"
1005105-141 = "พวกเราเองก็อยากตะโกนบอกให้โลกรู้ ว่าเรารักคุณบิ๊กบราเธอร์แบบนั้นมาตลอดเหมือนกัน แต่ว่า#nพวกเราอายสายตาคนที่เดินผ่านไปมา ก็เลยได้แต่เก็บเอาไว้ในใจ..."
1005105-142 = "แต่เธอกลับแสดงความรู้สึกในใจออกมาตรงๆ แบบนี้ได้ กล้าหาญมากๆ เลยละ!"
1005105-143 = "เธอเหมาะที่จะเป็นหัวหน้าด้อมคนต่อไปที่สุดเลยนะ!"
1005105-145 = "จะ...จริงเหรอคะ?"
1005105-146 = "คนอย่างฉัน... จะเป็นหัวหน้าด้อมคุณบิ๊กบราเธอร์ได้จริงๆ เหรอคะ?"
1005105-147 = "แน่นอนอยู่แล้ว!"
1005105-148 = "เอาละ พวกเรามาตะโกนดังๆ ให้โลกได้รับรู้ด้วยกันเลย!"
1005105-157 = "คราวนี้ก็สำเร็จอีกแล้ว!"
1005105-158 = "[s] \"มีพลังเหลือล้นจนน่าทึ่งจริงๆ...\""
1005105-159 = "ฮุฮุ ขอบคุณที่ชมนะ"
1005105-160 = "แต่ว่าเราจะมามัวโอ้เอ้อยู่ไม่ได้แล้ว ยังมีคนอีกเยอะที่รอให้พวกเราไปเชียร์อยู่นะ!"
1005105-162 = "(หลังจากนั้นคุณครูกับอุทาฮะก็ตระเวนไปทั่วเมือง และส่งแรงเชียร์ให้ทุกๆ คนอย่างสุดเหวี่ยง)"
1005105-168 = "ฮู่ว... วันนี้ยุ่งสุดๆ เลย"
1005105-169 = "[s] \"วันนี้ทำงานหนักมากเลยนะ อุทาฮะ\""
1005105-170 = "ไม่หรอก เรื่องนี้เป็นเพราะฉันทำงานเสร็จไม่ทันเวลาเอง แต่ค่อยยังชั่วหน่อยนะที่ทุกคนดูพอใจกัน"
1005105-171 = "อีกอย่าง ฉันคิดว่าบางครั้งถ้าได้เคลื่อนไหวร่างกายแบบนี้ โดยไม่พึ่งพาเครื่องจักรบ้าง มันก็ไม่ได้แย่เท่าไร"
1005105-172 = "ฉันได้รับแรงบันดาลใจใหม่ๆ มากมาย... นอกจากนี้ยังเป็นสิ่งที่ช่วยย้ำเตือนให้ฉันไม่หลงลืม#nจุดเริ่มต้นของฉันด้วย...\n"
1005105-173 = "ประสบการณ์ที่ได้รับในวันนี้ จะช่วยให้ฉันพัฒนาสิ่งประดิษฐ์ใหม่ๆ ที่ดีขึ้นได้ในครั้งต่อๆ ไป"
1005105-177 = "[ns1] \"เธอพูดเบาๆ มาตั้งแต่เมื่อกี้แล้วนะ\"\n[ns2] \"พูดเบาเหมือนกระซิบเลยนะ?\""
1005105-182 = "คือว่า..."
1005105-183 = "ฉันตะโกนเสียงดังมาทั้งวันแล้ว..."
1005105-189 = "ตอนนี้เลย... ไม่มีเสียงแล้วน่ะ"
1005105-191 = "(หลังจากนั้นคุณครูก็กลับไปที่ชาเล่ต์พร้อมกับอุทาฮะที่เสียงหายไปแล้ว...)"

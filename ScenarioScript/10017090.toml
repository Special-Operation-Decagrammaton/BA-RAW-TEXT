[translation]
10017090-1 = "บทส่งท้าย;เพลงคริสต์มาส"
10017090-5 = "สุดท้ายก็ได้มาปาร์ตี้ด้วยกันจนได้นะคะ..."
10017090-6 = "นั่นสิคะ ฮุฮุ อนาคตเป็นเรื่องที่เราคาดเดาไม่ได้เลยละค่ะ"
10017090-7 = "จำได้รึเปล่าคะ? ที่ฉันเคยขอว่าให้ไปคาเฟ่ด้วยกันบ้างน่ะค่ะ "
10017090-8 = "ต้องจำได้อยู่แล้วค่ะ ได้มากันจริงๆ ด้วยนะคะ โล่งอกไปทีค่ะที่ทุกอย่างเรียบร้อยดี"
10017090-9 = "เมื่อกี้ฉันสงสัยว่าจากนี้เหตุการณ์จะเป็นไปในทิศทางไหน แต่ตอนนี้โชคดีแล้วค่ะที่ไม่มีอะไรร้ายแรง เพราะในที่สุด ความยุติธรรมก็เอาชนะได้ค่ะ"
10017090-10 = "แต่ว่าฉัน! ทำไมฉันคิดแบบนั้นไม่ได้นะคะ! ไม่รู้ตัวเองเลยค่ะ!"
10017090-11 = "ตายจริง คุณฮานาเอะนี่มองโลกในแง่บวกจังเลยนะคะ"
10017090-12 = "ฉะ... ฉันโลกสวยเกินไปเหรอคะ?!"
10017090-13 = "ไม่ค่ะๆ มันดูน่าชื่นใจน่ะค่ะ... ฉันก็เลยประทับใจไปด้วย"
10017090-14 = "อย่าทำแบบนี้เลยค่ะ ฉันก็อายเป็นนะคะ..."
10017090-15 = "[ns] \"เอาละๆ มิเนะเองก็พูดอะไรบ้างสิ\""
10017090-20 = "ให้ฉัน... พูดได้เหรอคะ?"
10017090-21 = "คุณครูจะรับผิดชอบให้เองงั้นเหรอคะ? ถึงจะรู้สึกผิดและกระอักกระอ่วนใจอยู่บ้าง แต่ฉันขอพูดอะไร#nหน่อยนะคะ..."
10017090-22 = "อะแฮ่ม... แม้ว่าจะมีเรื่องเกิดขึ้นมากมาย แต่ปีนี้ชมรมอัศวินบรรเทาทุกข์ก็ได้ทำหน้าที่ของตัวเองอย่าง#nเต็มที่ค่ะ"
10017090-23 = "ทุกคนในชมรมอัศวินบรรเทาทุกข์สามารถภูมิใจได้ค่ะ"
10017090-24 = "ส่วนฉัน ยังต้องคิดทบทวนและพัฒนาตัวเองให้มากขึ้นในอนาคตค่ะ"
10017090-29 = "ถึงที่เธอพูดมันจะไม่ผิดก็เถอะ..."
10017090-30 = "ให้เป็นแบบนี้ก่อนเถอะค่ะ ซึรุกิ"
10017090-35 = "โลกของชาแดงช่างล้ำลึกนัก... ไม่รู้มาก่อนเลยค่ะว่าจะผสมอะไรได้ขนาดนี้..."
10017090-36 = "ฉันขอแทรกหน่อยได้มั้ยคะ? พอดีฉันเรียนรู้เกี่ยวกับชาแดงมาบ้างน่ะค่ะ..."
10017090-37 = "หะ... หัวหน้ามิเนะ? ปะ... เป็นเกียรติเลยค่ะ"
10017090-38 = "หัวหน้ามิเนะเก่งกาจที่สุดในชมรมอัศวินบรรเทาทุกข์เลยละค่ะ อะฮ่าฮ่าฮ่า..."
10017090-39 = "ในการดูแลคนไข้ เราต้องมีความรู้ในงานอื่นๆ อย่างละเอียดด้วยค่ะ!  "
10017090-44 = "อยากให้เอาความละเอียดนั้นไปใช้ในทิศทางที่ถูกต้องจัง..."
10017090-45 = "......พอเถอะ"
10017090-50 = "อ้อ... จริงด้วย! พวกฉันมีถุงมือกับหมวกที่ถักเองด้วยค่ะ! ฉันจะแจกให้นะคะ!"
10017090-51 = "หะ... ให้พวกฉันได้เหรอคะ?!"
10017090-52 = "ฉันทำมาเยอะเกินไปก็เลยยังมีเหลือค่ะ ช่วยรับไปด้วยเถอะนะคะ คริสต์มาสทั้งทีนี่คะ!"
10017090-53 = "ขอบคุณมากเลยค่ะ... เป็นคริสต์มาสที่วิเศษไปเลยนะคะ"
10017090-54 = "ฮิฮิ เมอร์รีคริสต์มาสค่ะทุกคน!"
10017090-55 = "จริงด้วยค่ะ ขอให้เป็นคริสต์มาสแห่งความสุขของทุกคนนะคะ..."
10017090-56 = "ขอบคุณสำหรับ 1 ปีที่ผ่านมานะคะ เมอร์รีคริสต์มาส!"
10017090-58 = "เมอร์รีคริสต์มาส!"
10017090-59 = "งานฉลองคริสต์มาสแห่งมหาวิหาร ~ของขวัญจากชมรมอัศวินบรรเทาทุกข์~"

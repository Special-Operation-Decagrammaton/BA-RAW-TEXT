10017090-49 = "#zmc;move;0,0;3160;1000\n#wait;1500"
10017090-50 = "#na;하나에 산타ND;아, 맞아요! 저희가 만든 장갑과 모자가 있어요! 나눠드릴게요!"
10017090-51 = "#na;정의실현부 부원;괘, 괜찮은 건가요?!"
10017090-52 = "#na;세리나 산타ND;조금 많이 만들었더니, 남아 버렸지 뭐예요. 받아 주세요. 크리스마스잖아요?"
10017090-53 = "#na;정의실현부 부원;정말 감사합니다…… 멋진 크리스마스네요."

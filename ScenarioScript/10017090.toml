10017090-33 = "#zmc;move;-316,-200;2528;10"
10017090-34 = "#zmc;move;350,150;2528;1000\n#wait;1500"
10017090-35 = "#zmc;instant;350,150;2528\n#na;정의실현부 부원;홍차의 세계란 건……. 의외로 깊네요. 이렇게나 많은 블렌딩이 있을 줄은……"
10017090-36 = "#zmc;instant;350,150;2528\n#na;미네;제가 조금 주제넘은 참견을 해도 될까요? 홍차에는 약간의 배움이 있는 몸이어서……"
10017090-37 = "#zmc;instant;350,150;2528\n#na;정의실현부 부원;미, 미네 단장님? 여, 영광이에요……!"
10017090-38 = "#zmc;instant;350,150;2528\n#na;세리나 산타ND;단장님의 솜씨는 구호기사단 제일이니까요. 아하하……"
10017090-39 = "#zmc;instant;350,150;2528\n#na;하나에 산타ND;환자분들을 돌보다 보면, 다른 많은 일에도 섬세한 지식을 가져야 하거든요!"

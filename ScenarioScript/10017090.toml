[translation]
10017090-1 = "尾聲;聖誕頌"
10017090-5 = "哇……居然真的能一起參加派對……"
10017090-6 = "呵呵，就是說啊。#n果真世事難料呢。"
10017090-7 = "還記得嗎？#n我曾經說過：「如果大家之後有時間的話，歡迎順道來看看」。"
10017090-8 = "當然記得。那個時候，還想著「如果能去的話就好了」……"
10017090-9 = "我一度還想事情究竟會如何發展，真是萬幸。#n果然正義必勝呢。"
10017090-10 = "我從一開始就有預感事情會變成這樣了！"
10017090-11 = "哎呀，是這樣子嗎？"
10017090-12 = "啊，我說得太浮誇了嗎！？"
10017090-13 = "不會不會。反倒是我應該向你學習呢。"
10017090-14 = "請，請別這麼說，真不好意思……！"
10017090-15 = "[ns]「作為代表，美禰也說句話吧？」"
10017090-20 = "我嗎……這麼做會不會太厚臉皮了……"
10017090-21 = "負起責任……？#n既然如此，還請容我多言幾句……"
10017090-22 = "那個，今天發生了很多事……#n救護騎士團的各位，今年也善盡了自己的職責。"
10017090-23 = "我認為這是值得每位團員感到自豪的事。"
10017090-24 = "至於我的話，今後會更加磨練自己。"
10017090-29 = "這樣子沒問題嗎……"
10017090-30 = "我們就靜觀其變吧，弦生。"
10017090-35 = "紅茶的世界真是深奧呢，這到底是怎麼做的……"
10017090-36 = "不介意我多管閒事的話，能容我說幾句嗎？#n我多少還算有一些了解。"
10017090-37 = "美，美禰團長！？#n這是我的榮幸……！"
10017090-38 = "團長確實對那一方面也很擅長呢。"
10017090-39 = "為了能提供更好的治療，掌握各式各樣的知識是必須的！"
10017090-44 = "那份努力如果能向正確的方向發展就好了……"
10017090-45 = "……就是說啊。"
10017090-50 = "啊，對了！#n這是我們做的手套和帽子……不介意的話，請收下吧！"
10017090-51 = "可，可以嗎……？"
10017090-52 = "是的，因為不小心多做了一些。#n難得能一起過聖誕節，請收下吧。"
10017090-53 = "非常感謝……#n託你們的福，今年的聖誕節變得更棒了呢。"
10017090-54 = "耶嘿嘿。#n祝大家聖誕快樂！"
10017090-55 = "祝大家都有個美好的聖誕節。"
10017090-56 = "大家這一年都辛苦了。#n聖誕快樂。"
10017090-58 = "聖誕快樂！"
10017090-59 = "教堂的聖誕祝福～救護騎士團的禮物～"

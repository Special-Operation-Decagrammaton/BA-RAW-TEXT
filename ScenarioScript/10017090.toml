10017090-4 = "#zmc;move;-80,150;2528;1000\n#wait;1500"
10017090-5 = "#zmc;instant;-80,150;2528\n#na;정의실현부 부원;결국, 함께 파티를 하게 되었네요……"
10017090-6 = "#zmc;instant;-80,150;2528\n#na;세리나 산타ND;그러게요. 후훗. 참 앞날은 어떻게 될지 알 수 없는 거군요."
10017090-7 = "#zmc;instant;-80,150;2528\n#na;정의실현부 부원;기억나세요? 나중에라도 한번 카페에 들러 달라고 이야기했었죠. "
10017090-8 = "#zmc;instant;-80,150;2528\n#na;세리나 산타ND;기억하고 말고요. 그 말대로 됐네요. 모든 게 잘 풀려서 정말 다행이에요."
10017090-9 = "#zmc;instant;-80,150;2528\n#na;마시로;한때는 어떻게 되는 건가 했습니다만, 다행입니다. 결국 정의가 승리하는 법이로군요."
10017090-10 = "#zmc;instant;-80,150;2528\n#na;하나에 산타ND;그래도 저는요! 왠지 이렇게 될 것 같았어요! 왠지 모르게요!"
10017090-11 = "#zmc;instant;-80,150;2528\n#na;하스미;어머나, 하나에 씨는 긍정적이네요."
10017090-12 = "#zmc;instant;-80,150;2528\n#na;하나에 산타ND;주, 주제넘었나요?!"
10017090-13 = "#zmc;instant;-80,150;2528\n#na;하스미;아뇨, 아뇨. 뭔가 보기 좋고 흐뭇하고…… 조금, 감동까지 해 버려서요."
10017090-14 = "#zmc;instant;-80,150;2528\n#na;하나에 산타ND;그러지 마세요. 부끄러워요……"
10017090-15 = "#zmc;instant;-80,150;2528\n[ns] \"자, 자. 미네도 한마디 해 봐.\""
10017090-16 = "#zmc;instant;-80,150;2528\n#st;[0,0];instant;1;"
10017090-17 = "#zmc;instant;-80,150;2528\n#clearST"
10017090-18 = "#zmc;move;-80,150;2528;10"
10017090-19 = "#zmc;move;0,0;3160;1000\n#wait;1500"
10017090-20 = "#zmc;instant;0,0;3160\n#na;미네;제가…… 염치없이 그래도 될까요?"
10017090-21 = "#zmc;instant;0,0;3160\n#na;미네;선생님께서 책임져 주시겠다고요? 그렇다면 송구스러움에도 불구하고……"
10017090-22 = "#zmc;instant;0,0;3160\n#na;미네;어흠. 많은 일이 있었지만, 올해도 구호기사단은 스스로의 책무를 다한 것 같습니다."
10017090-23 = "#zmc;instant;0,0;3160\n#na;미네;구호기사단의 모두가 긍지를 가져도 될 일이겠지요."
10017090-24 = "#zmc;instant;0,0;3160\n#na;미네;그 의미를 이어받아 반성하고 나아가며, 보다 스스로를 갈고 닦겠습니다."
10017090-25 = "#zmc;instant;0,0;3160\n#st;[0,0];instant;1;"
10017090-26 = "#zmc;instant;0,0;3160\n#clearST"
10017090-27 = "#zmc;move;0,0;3160;10"
10017090-28 = "#zmc;move;-316,-200;2528;1000\n#wait;1500"
10017090-29 = "#zmc;instant;-316,-200;2528\n#na;츠루기;……틀린 말은 아닐지도 모르겠지만……"
10017090-30 = "#zmc;instant;-316,-200;2528\n#na;하스미;일단 그런 것으로 해 두죠. 츠루기."

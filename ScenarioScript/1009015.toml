[translation]
1009015-1 = "First, and Last"
1009015-2 = "I'm so sorry, Sensei!"
1009015-3 = "[s1] \"It's fine. I've only waited 5 minutes.\"\n[s2] \"But it's rare for you to be late, Umika.\""
1009015-6 = "W-Well..."
1009015-7 = "I passed some festival preparations right around the corner...and I was watching..."
1009015-8 = "[s] \"Festival preparations?\""
1009015-9 = "Yes. It looks like they're arranging a small celebration in the shopping district."
1009015-10 = "I suppose it's more of a bazaar or crafts fair than a festival?"
1009015-11 = "Ugh... Even though it was a humble festival, it's so unlike me to be caught by surprise like that. I read all the festival newsletters."
1009015-12 = "[s] \"It sounds like it was easy to miss. And you DID find it, after all!\""
1009015-13 = "I suppose. Heeheehee."
1009015-14 = "But still, when I see people committing to a celebration, curating an event..."
1009015-15 = "...It inspires me like nothing else."
1009015-16 = "[ns] \"(Why does hearing her say that make me feel so guilty?)\""
1009015-17 = "I think having a place like a festival, where all are invited to rest and celebrate, makes daily life so much better."
1009015-18 = "Huh? What do I mean? Well... So..."
1009015-19 = "I think a festival is...an invitation to escape. It's limited, ephemeral, and opens up a new world, all in a place that could otherwise be considered ordinary."
1009015-20 = "Oh, of course, the experience doesn't ONLY apply to festivals. An amusement park, a vacation, and even games, movies, and books can provide that sense of escape."
1009015-21 = "What's important...is that people can leave their daily lives for a moment and be transported into a new world!"
1009015-22 = "Yes. A new world, Sensei! I mean it!"
1009015-23 = "A world where everyone can unburden themselves... You could say, a place where you can embrace your inner whimsy and...foolishness, even!"
1009015-24 = "Having a lively festival commence in the early morning, then end with fireworks at night... Even that is like the opening and closing of a special world."
1009015-25 = "Then after, people can return to their daily lives, only rejuvenated and full of new energy."
1009015-26 = "Now that I said it, it's almost like a portal to another dimension...a bit like isekai, if you're familiar."
1009015-27 = "Of course, even a good festival has its flaws..."
1009015-28 = "Like you could get so swept up in the excitement that you end up buying too many souvenirs!"
1009015-29 = "[s] \"Yes... I'm familiar with that feeling.\""
1009015-30 = "B-But, of course, there are some things I don't regret buying."
1009015-31 = "This, for example. Take a look, Sensei."
1009015-37 = "[ns] \"What is it? A doll?\""
1009015-38 = "Yes. Heeheehee... I bought this doll at my very first festival."
1009015-39 = "...I was half my size then."
1009015-40 = "Looking back, I don't even know why I bought it..."
1009015-41 = "But something about it caught my eye. I had to have it."
1009015-42 = "[ns] \"It's certainly special...\""
1009015-44 = "[ns] \"But I can't even tell if it's a boy or a girl.\""
1009015-45 = "That's right! I don't know, either!"
1009015-46 = "The merchant at the time told me to guess, and then he never told me the right answer!"
1009015-47 = "It was on my mind all day. I kept thinking that I should go back and demand an answer."
1009015-48 = "Heeheehee. Well...and that's how I got to be the way I am."
1009015-49 = "[s] \"This commemorates your very first festival...\""
1009015-50 = "Yes! You could say that!"
1009015-51 = "But...I have a little more to add."
1009015-52 = "[s] \"Oh, yeah?\""
1009015-53 = "I-It's not that amazing... I don't want to get you too excited."
1009015-54 = "There's actually another one of these."
1009015-60 = "[ns] \"Ah, so they're a paired set.\""
1009015-61 = "Yes. Precisely."
1009015-62 = "The merchant at the time carried them both, and then..."
1009015-66 = "...and then..."
1009015-67 = "[s] \"And then?\""
1009015-71 = "Oh, oh, it's nothing!"
1009015-72 = "Sorry, Sensei! I'm the Student Rep today! I should be more focused."
1009015-73 = "Right! Work! I have to help you with work, right?!"
1009015-74 = "[s] \"Umika?\""
1009015-75 = "Now, now. Sensei! Let's hurry and finish the job!"
1009015-76 = "You know, another festival is opening tomorrow."
1009015-77 = "If you don't mind, how about we..."
1009015-78 = "[s] \"Yes. Let's.\""
1009015-79 = "...!"
1009015-80 = "Thank you!"
1009015-82 = "I finished the daily tasks with Umika."
1009015-83 = "After I learned that she returned to school safely..."
1009015-86 = "[ns] \"Hm!\""
1009015-89 = "[ns] \"Is this...?\""
1009015-90 = "I was about to tell Umika that she left her doll behind..."
1009015-94 = "...but then I decided to send her a MomoTalk instead."

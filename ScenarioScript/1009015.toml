[translation]
1009015-1 = "ครั้งแรกและครั้งสุดท้าย"
1009015-2 = "ขอโทษค่ะคุณครู!"
1009015-3 = "[s1] \"ไม่เป็นไรๆ... มาช้าแค่ห้านาทีเอง\"\n[s2] \"หายากเลยนะที่อุมิกะจะมาช้าน่ะ\""
1009015-6 = "ระ... เรื่องนั้น..."
1009015-7 = "พอดีที่ด้านหน้านี่มีการเตรียมงานเทศกาล... พอฉันไปดูก็เลย..."
1009015-8 = "[s] \"เตรียมงานเทศกาลเหรอ?\""
1009015-9 = "ค่ะ พวกเขากำลังเตรียมงานเทศกาลเล็กๆ ที่ย่านการค้ากันอยู่ค่ะ"
1009015-10 = "มันให้ความรู้สึกเหมือนตลาดขนาดย่อมๆ ที่ผสมผสานกับงานเทศกาลมากกว่าค่ะ"
1009015-11 = "ฮือออ... ถึงจะเป็นงานเทศกาลเล็กๆ แต่ในฐานะสมาชิกชมรมจัดงานเทศกาลแล้ว ฉันควรจะสำนึกผิด#nที่พลาดการดูแลงานนี้ไปค่ะ..."
1009015-12 = "[s] \"สังเกตเห็นงานเล็กๆ แบบนี้สมกับเป็นอุมิกะเลยนะ\""
1009015-13 = "มะ... ไม่หรอกค่ะ แหะๆ"
1009015-14 = "ถึงอย่างนั้น พอเห็นทุกๆ คนตั้งใจเตรียมงานกันแบบนี้..."
1009015-15 = "ฉันก็รู้สึกว่าควรจะพยายามให้ดีที่สุดเหมือนกันค่ะ"
1009015-16 = "[ns] (รู้สึกเจ็บปวดในใจ...)"
1009015-17 = "และการมีส่วนเล็กๆ ในชีวิตอย่างงานเทศกาลแบบนั้นจะยิ่งทำให้เราใช้ชีวิตได้ดียิ่งขึ้นค่ะ"
1009015-18 = "คะ? ที่ฉันพูดไปหมายความว่ายังไงน่ะเหรอคะ? อืม... เรื่องนั้นน่ะ..."
1009015-19 = "ส่วนตัวฉันคิดว่างานเทศกาลต่างๆ เป็นเหมือนการหลีกหนีจากความจริงอย่างหนึ่งค่ะ เราจะได้เจอกับโลกใบใหม่ ณ ที่แห่งนั้นในช่วงเวลานั้นค่ะ"
1009015-20 = "อ๊ะ แน่นอนว่าไม่จำเป็นต้องเป็นงานเทศกาลก็ได้นะคะ ถ้าเป็นการไปเที่ยวสวนสนุก นั่งเล่นเกม ดูหนัง หรืออ่านหนังสือสักเล่มก็ได้เหมือนกันค่ะ"
1009015-21 = "ฉันคิดว่าสิ่งสำคัญที่สุด... คือความรู้สึกที่เราได้พักการใช้ชีวิตประจำวันไปอยู่ที่อื่นชั่วขณะหนึ่งน่ะค่ะ"
1009015-22 = "ใช่แล้วค่ะ มันคือโลกใบใหม่ค่ะ คุณครู! อย่างที่ฉันบอกไปเมื่อกี้ไงล่ะคะ"
1009015-23 = "อาจเรียกว่าเป็นช่วงเวลาที่ได้วางอะไรบางอย่างลงสักครู่ และก็... มีช่วงเวลาที่ได้กลายเป็น 'คนโง่' บ้างล่ะมั้งคะ?"
1009015-24 = "งานเทศกาลที่ครึกครื้นที่เริ่มขึ้นตั้งแต่ในช่วงเช้า จนกระทั่งปิดฉากค่ำคืนลงด้วยดอกไม้ไฟหลากสีสัน มันก็นับว่าเป็นจุดเริ่มต้นและจุดสิ้นสุดของโลกใบใหม่ยังไงล่ะคะ"
1009015-25 = "จากนั้นผู้คนที่ได้สัมผัสโลกใบใหม่ก็จะกลับมาใช้ชีวิตประจำวันกันต่อหลังได้ชาร์จพลังกันเต็มที่ค่ะ"
1009015-26 = "พอพูดแบบนี้มันก็เหมือนกับโลกต่างมิติอะไรประมาณนั้นเลยนะคะ!"
1009015-27 = "แน่นอนว่ามันก็ไม่ได้มีแต่ข้อดีเสมอไปหรอกค่ะ..."
1009015-28 = "ฉันมักจะหลงไปกับบรรยากาศของงานเทศกาลแล้วก็ซื้ออะไรต่อมิอะไรมาโดยไม่ทันคิดค่ะ..."
1009015-29 = "[s] \"อืม... ก็นะ... มีเรื่องทำนองนั้น... จริงๆ ด้วย\""
1009015-30 = "ตะ... แต่ว่าฉันไม่ได้เสียใจหรอกนะคะ!"
1009015-31 = "อย่างเช่น เจ้านี่น่ะค่ะ"
1009015-37 = "[ns] \"อะไรน่ะ? ตุ๊กตาเหรอ?\""
1009015-38 = "ค่ะ แหะๆ... เป็นตุ๊กตาที่ฉันซื้อมาจากงานเทศกาลแรกที่ไปค่ะ..."
1009015-39 = "ตอนนั้นฉันตัวสูงยังไม่ถึงครึ่งของตอนนี้เลยด้วยซ้ำค่ะ"
1009015-40 = "ตอนนี้พอมาย้อนคิดดูแล้ว ฉันก็นึกไม่ออกเลยว่าทำไมถึงซื้อมันมา..."
1009015-41 = "ตอนนั้นมันดึงดูดสายตาและคิดว่าจะต้องซื้อมันมาให้ได้เลยค่ะ"
1009015-42 = "[ns] \"คนเราก็มีฟีลแบบนั้นกันอยู่นั่นละ...\""
1009015-44 = "[ns] \"ว่าแต่ว่าตุ๊กตาตัวนี้เป็นเด็กผู้ชายหรือเด็กผู้หญิงน่ะ?\""
1009015-45 = "ใช่แล้วค่ะ! ฉันเองก็ไม่รู้เหมือนกันค่ะ!"
1009015-46 = "ตอนนั้นคนขายบอกว่าให้ฉันลองเดาดู และเขาก็ไม่ยอมบอกฉันจนถึงที่สุดเลยค่ะ"
1009015-47 = "ฉันคิดมาตลอดว่าควรจะต้องถามดูให้ชัดๆ แต่ว่า..."
1009015-48 = "แหะๆ สุดท้ายก็กลายเป็นแบบนี้ไปซะแล้วค่ะ"
1009015-49 = "[s] \"เป็นความทรงจำของการไปงานเทศกาลครั้งแรกสินะ\""
1009015-50 = "ใช่ค่ะ! ก็ประมาณนั้นค่ะ!"
1009015-51 = "แต่ว่าเจ้านี่... ยังมีเซอร์ไพรส์อย่างอื่นอยู่ด้วยค่ะ!"
1009015-52 = "[s] \"ชักตื่นเต้นแล้วสิ!\""
1009015-53 = "มันไม่ใช่อะไรยิ่งใหญ่หรอกค่ะ..."
1009015-54 = "ที่จริงแล้วยังมีตุ๊กตาแบบนี้อีกตัวหนึ่งค่ะ"
1009015-60 = "[ns] \"อะฮ่า เป็นตุ๊กตาฝาแฝดนี่เอง\""
1009015-61 = "ค่ะ เป็นอย่างนั้นค่ะ"
1009015-62 = "ตอนนั้นคนขายกำลังอุ้มเด็กสองคนนี้ไปด้วยกัน..."
1009015-66 = "แล้วก็..."
1009015-67 = "[s] \"แล้วก็...?\""
1009015-71 = "มะ... มะมะมะมะมะมะ ไม่มีอะไรค่ะ!"
1009015-72 = "ขอโทษค่ะคุณครู! วันนี้ฉันต้องเข้าเวรตัวแทนนี่คะ!"
1009015-73 = "จริงด้วยค่ะ! งาน...! ฉันต้องช่วยคุณครูทำงานนี่นา! "
1009015-74 = "[s] \"อุมิกะ?\""
1009015-75 = "เอ้าๆ คุณครู! เรารีบทำงานให้เสร็จกันเถอะค่ะ!"
1009015-76 = "ได้ยินว่างานเทศกาลจะเริ่มวันพรุ่งนี้แล้วค่ะ..."
1009015-77 = "คือว่าถ้าคุณครูพอมีเวลาสนใจไปงานกับฉัน..."
1009015-78 = "[s] \"เอาสิ ไปด้วยกันนะ\""
1009015-79 = "...!"
1009015-80 = "ขอบคุณค่ะ!"
1009015-82 = "(คุณครูกับอุมิกะก็ช่วยกันทำงานจนเสร็จเรียบร้อย)"
1009015-83 = "(หลังจากที่อุมิกะกลับไปแล้ว...)"
1009015-86 = "[ns] \"เอ๊ะ?\""
1009015-89 = "[ns] \"นี่มัน...?\""
1009015-90 = "(ขณะที่คุณครูกำลังจะโทรบอกอุมิกะว่าเธอลืมตุ๊กตาไว้...)"
1009015-94 = "(แต่จู่ๆ ก็เปลี่ยนใจวางตุ๊กตาลงและส่งเป็นข้อความไปทาง MOMOTALK แทน...)"

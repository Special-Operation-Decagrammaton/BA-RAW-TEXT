1009015-71 = "3;우미카;16;아, 아아아아아무것도 아니에요!\n#3;em;[///]\n#3;stiff"
1009015-72 = "3;우미카;16;죄송합니다, 선생님! 저 오늘 당번인데!\n#3;jump"
1009015-73 = "3;우미카;12;맞아요, 일! 선생님의 일을 도와드려야죠, 네!"
1009015-74 = "[s] \"우미카?\""
1009015-75 = "3;우미카;12;자, 자아. 선생님! 우리 빨리 일 끝내요!\n#3;em;[!]"
1009015-76 = "3;우미카;01;그리고 축제는 내일 열린다고 하는데요……."
1009015-77 = "3;우미카;11;혹시, 괜찮으시면 저와……."

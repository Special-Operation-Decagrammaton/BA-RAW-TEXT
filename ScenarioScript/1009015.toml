[translation]
1009015-1 = "最初，也是最後"
1009015-2 = "對不起，老師！"
1009015-3 = "[s1]「沒事沒事……只過了五分鐘而已。」\n[s2]「不過海花居然會遲到，還真少見呢。」"
1009015-6 = "那，那個……"
1009015-7 = "因為剛才前面有人在準備慶典……我就看了一下……"
1009015-8 = "[s]「準備慶典？」"
1009015-9 = "是的。商店街似乎正在準備一場小型慶典。"
1009015-10 = "有點類似慶典氛圍的義賣會，或者小型市集的感覺吧？"
1009015-11 = "嗚嗚……雖然規模不大，不過身為節慶營運管理部的成員居然沒注意到……#n我得好好反省才行……"
1009015-12 = "[s]「能發現這種容易錯過的事情真厲害呢。不愧是海花。」"
1009015-13 = "沒，沒有啦。耶嘿嘿。"
1009015-14 = "不過，看見他們那麼努力準備的樣子……"
1009015-15 = "就會感覺自己也必須拚命活下去才行。"
1009015-16 = "[ns]（心裡莫名有種突然被狠狠刺了一下的感覺……）"
1009015-17 = "而且，我覺得就是因為有像慶典這樣的休止符存在，人們才能更好地度過日常生活。"
1009015-18 = "咦？這是什麼意思……是嗎？#n唔嗯……該怎麼說呢……"
1009015-19 = "我認為慶典是一種脫離日常的體驗。#n只有在那個時間、那個地點才會開啟的……一個嶄新的世界。"
1009015-20 = "啊，當然也不一定非得是慶典哦。#n比如遊樂園、旅行、遊戲、電影、書籍……或許也代表相同的意義吧？"
1009015-21 = "重點在於……讓人們能暫時放下日常生活，感覺自己就像來到了另一個地方一樣。"
1009015-22 = "沒錯，一個嶄新的世界！#n就如我剛才所說……"
1009015-23 = "所有人都撇開平常的事情……可以說是變成「傻瓜」的時間吧？"
1009015-24 = "從早上熱鬧的慶典開始，直到夜晚的煙火秀落幕……#n這整個過程就是一個世界的開啟與閉合。"
1009015-25 = "經歷過那個世界的人，就能帶著煥然一新的心情，再次充滿幹勁地回歸日常生活。"
1009015-26 = "說著說著，感覺有點像異世界或二次元之類的東西呢！"
1009015-27 = "當然，這也並非沒有缺點……"
1009015-28 = "因為一旦沉浸在那種氛圍裡，就會不假思索地買一堆東西……"
1009015-29 = "[s]「嗯……確實會有那種情況……」"
1009015-30 = "不，不過也有不會後悔的東西哦！"
1009015-31 = "比如這個。"
1009015-37 = "[ns]「那是……人偶？」"
1009015-38 = "耶嘿嘿……是的。#n這是我第一次去慶典時買的人偶。"
1009015-39 = "那時候我的身高，應該只有現在的一半左右吧。"
1009015-40 = "現在回想起來，也有點搞不清楚為什麼要買……"
1009015-41 = "不過那個時候……就是一眼就覺得它非買不可。"
1009015-42 = "[ns]「確實會有那種情況……」"
1009015-44 = "[ns]「不過這個人偶，好像看不出是男是女呢？」"
1009015-45 = "就是說啊！我直到現在也還不知道呢！"
1009015-46 = "當時攤販老闆只要我自己猜，結果最後還是沒告訴我答案。"
1009015-47 = "我一直心想「哪天一定要去問問看」……"
1009015-48 = "耶嘿嘿，結果就變成這樣了。"
1009015-49 = "[s]「所以這是你第一次慶典的回憶啊。」"
1009015-50 = "沒錯！就是這樣！"
1009015-51 = "不過除此之外……這個人偶還有另一個驚喜哦！"
1009015-52 = "[s]「真讓人期待！」"
1009015-53 = "其，其實也不是什麼大不了的事情……"
1009015-54 = "實際上，這個人偶還有另一隻。"
1009015-60 = "[ns]「哦哦，原來是一對的啊。」"
1009015-61 = "是的。"
1009015-62 = "當時攤販的老闆說，要把這兩個孩子一起帶在身邊……"
1009015-66 = "帶在身邊……"
1009015-67 = "[s]「帶著身邊……然後呢？」"
1009015-71 = "沒，沒沒沒沒什麼！"
1009015-72 = "對不起，老師！我今天是值日生對吧！"
1009015-73 = "對了，工作！我得幫老師工作才行！"
1009015-74 = "[s]「海花？」"
1009015-75 = "來，來吧老師！我們快點把工作做完！"
1009015-76 = "還有，慶典好像明天就要開始了……"
1009015-77 = "如果老師方便的話，不知道能不能和我一起……"
1009015-78 = "[s]「好啊，就這麼辦。」"
1009015-79 = "……！"
1009015-80 = "謝謝老師！"
1009015-82 = "（就這樣，和海花一起完成了今天的工作）"
1009015-83 = "（在海花平安回去之後……）"
1009015-86 = "[ns]「咦？」"
1009015-89 = "[ns]「這個難道是……？」"
1009015-90 = "（正準備打電話跟海花說，他好像把人偶忘在這裡的時候……）"
1009015-94 = "（……決定放下人偶，改傳MomoTalk的訊息給他）"

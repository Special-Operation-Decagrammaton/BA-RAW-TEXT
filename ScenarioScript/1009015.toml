[translation]
1009015-1 = "#title;처음, 그리고 마지막"
1009015-2 = "3;우미카;04;죄송해요, 선생님!\n#3;a\n#3;em;[훌쩍]"
1009015-3 = "[s1] \"괜찮아, 괜찮아……. 5분밖에 안 지났고.\"\n[s2] \"그런데 드문 일이네. 우미카가 지각하다니.\""
1009015-4 = "#wait;10"
1009015-5 = "#wait;10"
1009015-6 = "3;우미카;11;그, 그게요…….\n#3;stiff"
1009015-7 = "3;우미카;16;요 앞에서, 축제 준비를 하고 있어서……. 그걸 보다 보니까…….\n#3;em;[///]"
1009015-8 = "[s] \"축제 준비?\""
1009015-9 = "3;우미카;01;네. 상점가에서 작은 축제를 준비하고 있대요."
1009015-10 = "3;우미카;02;사실상 축제를 겸한 바자회나 작은 장터 같은 느낌이었다고 할까요?"
1009015-11 = "3;우미카;11;우우……. 아무리 작은 축제라지만, 마츠리운영관리부의 부원으로서 놓치고 있었다니, 반성해야겠어요…….\n#3;em;[세로선]\n#3;stiff"
1009015-12 = "[s] \"여차하면 놓치기 쉬웠을 텐데, 잘 알아봤네. 역시 우미카야.\""
1009015-13 = "3;우미카;12;뭐, 뭘요. 에헤헤.\n#3;em;[음표]"
1009015-14 = "3;우미카;99;그래도 그렇게 열심히 준비하시는 분들의 모습을 보면……."
1009015-15 = "3;우미카;99;저도, 정말 최선을 다해 살아야겠다는 생각이 들거든요."
1009015-16 = "[ns] (어딘가 마음 한구석이 매우 찔렸다…….)"
1009015-17 = "3;우미카;01;그리고 그런 축제 같은 쉼표가 있어야, 일상을 더 잘 보낼 수 있다고도 생각하고요."
1009015-18 = "3;우미카;02;네? 그건 무슨 의미냐고요? 음……. 그러니까…….\n#3;em;[?]"
1009015-19 = "3;우미카;18;저는요. 축제라는 건 일종의 일탈 같은 것이라고 생각해요. 그 시간과 그 자리에서만, 새로운 세계가 열리는 거죠."
1009015-20 = "3;우미카;18;아, 물론 그게 꼭 축제일 필요는 없을 거예요. 놀이공원이나 여행, 게임이라든가 영화, 책 같은 것도 어쩌면 비슷하겠죠."
1009015-21 = "3;우미카;99;중요한 것은…… 사람들이 잠시만이라도 일상을 내려놓고, 다른 어딘가에 다녀왔다는 기분을 주는 것이라고 생각하거든요.\n#3;em;[...]"
1009015-22 = "3;우미카;10;네. 새로운 세계예요, 선생님! 아까도 말씀드렸지만요!\n#3;jump"
1009015-23 = "3;우미카;01;잠시 다들 무언가를 내려놓고…… 이른바, '바보'가 되는 시간이라고나 할까요?"
1009015-24 = "3;우미카;02;아침부터 떠들썩한 축제가 시작되어서, 밤의 불꽃놀이가 막을 내리면, 그 자체로 하나의 세계가 시작되고 닫히는 거죠."
1009015-25 = "3;우미카;02;그래서 그 세계를 겪고 온 사람들은, 새로워진 기분으로 다시 한번 일상을 힘차게 살아갈 수 있게 되는 거고요."
1009015-26 = "3;우미카;10;말해 놓고 보니 그거 같아요! 이세계나 이차원, 뭐 그런 거요!\n#3;em;[!]"
1009015-27 = "3;우미카;15;물론 단점이 없는 것은 아니긴 해요……."
1009015-28 = "3;우미카;11;그 분위기에 홀려서, 앞뒤 생각 안 하고 이것저것 사버리게 되거든요……."
1009015-29 = "[s] \"응……. 있지, 있어……. 그런 거…….\""
1009015-30 = "3;우미카;13;그, 그래도 후회 안 하는 것도 있어요!\n#3;jump"
1009015-31 = "3;우미카;01;가령, 이것처럼요."
1009015-32 = "#st;[0,0];instant;1;"
1009015-33 = "#clearST"
1009015-34 = "3;우미카;01\n#3;greeting\n#wait;1200"
1009015-35 = "3;우미카;01\n#3;m1\n#wait;1000"
1009015-36 = "#wait;1500"
1009015-37 = "[ns] \"그게 뭐야? 인형?\""
1009015-38 = "3;우미카;12;네. 에헤헤……. 제가…… 처음으로 갔던 축제에서 산 인형이에요.\n#3;em;[///]"
1009015-39 = "3;우미카;18;지금보다 키가 절반밖에 되지 않았을 때였죠.\n#3;m3"
1009015-40 = "3;우미카;99;지금 생각해 보면, 왜 샀는지 잘 모르겠다는 느낌도 들지만…….\n#3;em;[...]"
1009015-41 = "3;우미카;99;그때는, 그냥 한눈에 들어왔고, 이건 살 수밖에 없다고 생각했어요."
1009015-42 = "[ns] \"그런 거 있지, 있어…….\""
1009015-43 = "#wait;1000"
1009015-44 = "[ns] \"그런데 이거, 남자아이인지 여자아이인지 헷갈리는데? \""
1009015-45 = "3;우미카;02;맞아요! 저도 아직 모르거든요!\n#3;jump"
1009015-46 = "3;우미카;01;그때 노점상분도, 맞춰 보라고 하시면서 끝까지 안 알려주셨거든요."
1009015-47 = "3;우미카;15;언젠가 여쭤봐야지, 여쭤봐야지 하면서 쭉 마음을 졸였는데……."
1009015-48 = "3;우미카;12;에헤헤. 결국 이렇게 됐네요.\n#3;em;[음표]"
1009015-49 = "[s] \"그야말로 첫 축제의 추억이구나.\""
1009015-50 = "3;우미카;10;맞아요! 그런 셈이죠!"
1009015-51 = "3;우미카;03;하지만 여기에서…… 또 다른 서프라이즈가 있답니다!\n#3;em;[!]"
1009015-52 = "[s] \"기대되는구만!\""
1009015-53 = "3;우미카;12;그, 그렇게 대단한 건 아니고요…….\n#3;stiff"
1009015-54 = "3;우미카;12;사실 이 인형, 또 하나가 있거든요."

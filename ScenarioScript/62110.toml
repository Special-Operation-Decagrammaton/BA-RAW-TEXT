[translation]
62110-1 = "第11話;弟子們"
62110-3 = "是，是天使！"
62110-4 = "是「啟示錄的天使」！#n而且還有兩個……！"
62110-5 = "號角聲，這是第幾次了？"
62110-6 = "我想想……這應該是第五次和第六次吧？"
62110-7 = "也就是說，現在就只剩下……？"
62110-8 = "……"
62110-9 = "等，等等！那些天使往這邊靠過來了！？！？"
62110-13 = "唔啊啊啊啊啊啊啊！？"
62110-19 = "！！！"
62110-20 = "天，天使在攻擊奧利斯的孩子們……？"
62110-21 = "果然……真的是那樣嗎？"
62110-22 = "就和憂同學跟志美子同學說的一樣……？"
62110-25 = "聽得見和聽不見的群體之間……似乎存在著一條共同的分界線……"
62110-26 = "我想──應該是老師的課程。"
62110-28 = "在我看來，聽得見號角聲的學生……#n按照啟示錄的說法，就是能捕捉到「世界末日徵兆」的人。"
62110-29 = "是對「新的思考方式」的抗拒感較低的學生。"
62110-31 = "那些孩子們，遲早也會像這位一樣……"
62110-32 = "隨時可能被不希望改變奧利斯現況的學生當成「敵人」。"
62110-34 = "不管那是不是真的，都不能就這樣袖手旁觀吧……！"
62110-35 = "沒錯，那些孩子也是我們學園的學生。"
62110-40 = "沒，沒問題嗎……？#n上次就已經覺得很吃力了……"
62110-41 = "嗯……而且現在救護騎士團的各位也不在……"
62110-42 = "不過天使的數量也只有一半……姑且試試看吧。"

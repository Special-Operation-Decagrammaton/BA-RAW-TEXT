[translation]
62110-1 = "ตอนที่ 11;เหล่าสาวก"
62110-3 = "นะ... นางฟ้านี่นา!"
62110-4 = "<ทูตสวรรค์แห่งวิวรณ์>! 2 องค์เลยด้วย...!"
62110-5 = "เสียงแตรนี่ เป็นครั้งที่เท่าไรแล้วน่ะ?"
62110-6 = "ขอฉันนึกก่อน... น่าจะเป็นครั้งที่ 5 กับครั้งที่ 6 นะ?"
62110-7 = "ถ้างั้นก็เหลือแค่...?"
62110-8 = "..."
62110-9 = "ดะ... เดี๋ยวก่อน! นางฟ้าพวกนั้นกำลังมาทางนี้เหรอ?!?!"
62110-13 = "ว้ายยยยยยยย?!"
62110-19 = "!!!"
62110-20 = "นะ... นางฟ้าโจมตีเด็กๆ แล้วค่ะ..."
62110-21 = "ปะ... เป็นแบบนั้นจริงๆ เหรอคะ?"
62110-22 = "แบบที่คุณอุยกับคุณชิมิโกะว่าไว้น่ะ...?"
62110-25 = "แต่ดูเหมือนจะมีเส้นแบ่งบางอย่างระหว่างกลุ่มที่ได้ยินเสียงแตรกับกลุ่มที่ไม่ได้ยินเสียงแตรเลยค่ะ..."
62110-26 = "ชั้นเรียนของคุณครูค่ะ"
62110-28 = "ในความคิดของฉัน นักเรียนที่ได้ยินเสียงแตร... ก็คือคนที่รับรู้ได้ถึง 'สัญญาณแห่งการล่มสลายของโลก' ตามในวิวรณ์"
62110-29 = "พูดอีกอย่างก็คือ นักเรียนที่มีใจต่อต้าน 'แนวคิดใหม่' น้อยกว่าค่ะ"
62110-31 = "ไม่ช้าก็เร็ว เด็กเหล่านั้นก็จะถูกมองว่าเป็น 'ศัตรู'"
62110-32 = "ของนักเรียนที่ไม่อยากให้เกิดการเปลี่ยนแปลงต่ออาเรียสในปัจจุบัน... เหมือนกับคุณคนนี้ค่ะ"
62110-34 = "ถึงจะเป็นหรือไม่เป็นแบบนั้น เราก็ปล่อยไว้แบบนี้ไม่ได้หรอก...!"
62110-35 = "ใช่ ก็เด็กพวกนั้นเป็นเด็กโรงเรียนเรานี่นา"
62110-40 = "จะ... จะไม่เป็นอะไรใช่ไหมคะ...? ตอนนั้นเราสาหัสกันมากเลยนะคะ..."
62110-41 = "ใช่ค่ะ... แล้วตอนนี้ชมรมอัศวินบรรเทาทุกข์ก็ไม่อยู่ด้วย..."
62110-42 = "แต่ตอนนี้นางฟ้ามีน้อยกว่าตอนนั้นครึ่งหนึ่ง... มาลองดูกันเถอะ"

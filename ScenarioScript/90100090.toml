90100090-26 = "3;쿠루미;03;으음…… 이건 버섯인가? 유부 사이로 배어나오는 감칠맛이 정말 좋네~\n#3;em;[반짝]"
90100090-27 = "1;오토기;09;저기…… 그런데 어쩐지 아까 전부터 내 유부 주머니에는 콩만 가득 들어 있는 것 같은데.\n#1;ar\n#3;m5"

90100090-23 = "3;쿠루미;03;응. 니코가 만들었어. 참고로 유부는 밖에서 가져온 거야. 휴게실 냉장고에 있는 식재료는 손대지 않았으니 걱정하지 마.\n#3;em;[음표]"
90100090-24 = "3;니코;03;예전에 작전 중에 알게 된 유부 공장의 직원 분이 계시거든요. 주기적으로 질 좋은 유부를 보내주셔서 종종 이렇게 유부 요리를 만들고 있답니다."

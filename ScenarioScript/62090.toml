62090-25 = "#na;???;자기 안의 자매를 품지 못하는 자들이, 어찌 자기 밖의 타인을 품을 수 있을까."
62090-26 = "#na;???;그들은 우리를 [ruby=니코메디아]이 땅[/ruby]으로 추방하였으나."
62090-27 = "#na;???;우리는 이 자리에 아리우스의 반석을 세울 것이다."

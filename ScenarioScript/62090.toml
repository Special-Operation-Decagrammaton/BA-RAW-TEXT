[translation]
62090-1 = "第9話;Apocrypha"
62090-6 = "居然真的存在啊……"
62090-7 = "被三一判定為偽經……"
62090-8 = "卻始終避而不談，意圖抹消其存在[ruby=Apocrypha]的外典…[/ruby]…！"
62090-10 = "要等到何時，我們才能為祢的僕人之血伸冤。"
62090-11 = "要等到何時，我們才不必忍受他們對祢「真理何在」的嘲弄。"
62090-12 = "唔……從第一句就很強烈呢。#n「血之復仇」……"
62090-14 = "此乃所有惡人與不虔誠者遭受驅逐的患難之日。"
62090-15 = "此乃為受選之人與有義之士所備之話語。"
62090-16 = "奇怪？外經的內容到這裡就中斷了。#n然後這是……？"
62090-17 = "原來如此。"
62090-18 = "奧利斯的歷史，被和外典的內容一併記錄下來了啊。"
62090-23 = "三一對我等處以了破門律，然而他們並不明白。"
62090-24 = "在對我等宣告破門律之時，也等同向自身宣告了破門律。"
62090-25 = "連內在的姊妹都尚且無法包容之人，又豈能包容己身之外的他人呢。"
62090-26 = "他們將我等驅逐到了[ruby=尼科米底亞]這片土地[/ruby]。"
62090-27 = "然而我等將於此奠定奧利斯的磐石。"
62090-28 = "尼科米底亞……？"
62090-29 = "那是這裡原本的地名嗎？"
62090-31 = "三一最先對準槍口的對象，是我們奧利斯。"
62090-32 = "獲得武器的孩子最想做的，便是測試武器的力量。"
62090-33 = "而被判定為異端的奧利斯，就是最適合的對象。"
62090-34 = "這……是我們也經常聽見的內容呢。"
62090-35 = "接下來……從這裡開始又回到外典了……"
62090-37 = "當預言中的徵兆顯現之日到來。"
62090-38 = "如今尚不可見之城與隱藏之地將會顯現。"
62090-39 = "真理將與世人同在，留到那天之人將永遠歡喜。"
62090-40 = "這個內容……是啟示錄？"
62090-41 = "不過跟共通經典裡記載的啟示錄，內容略有不同呢。"
62090-42 = "雖然考慮到「外典」這個詞的意義，這也是當然的吧……"
62090-44 = "沉眠的世界將睜開雙眼，腐朽之物將會消逝。"
62090-45 = "正義之人寥寥無幾，不敬之人數不勝數。"
62090-46 = "汝將為得救的少數歡喜。"
62090-47 = "切勿為滅亡的多數悲傷。"
62090-51 = "「切勿為滅亡的多數悲傷」。"
62090-52 = "……"
62090-60 = "各位？有什麼事嗎？"
62090-62 = "嗯！我們已經照前輩說的構築好陣地，所以前來向你報告！"
62090-64 = "這樣啊。辛苦你們了。"
62090-66 = "前輩那邊有進展嗎？"
62090-68 = "線索……可能還稱不上，不過我找到了被隱藏的經典。"
62090-69 = "或許連三一都不曾取得過的……專屬於奧利斯的經典。"
62090-71 = "那裡面一定寫了什麼！"
62090-75 = "話說……前輩。#n那個，大家剛才討論了一件事……"
62090-76 = "雖然不知道現在拜託前輩適不適合……"
62090-77 = "不過除了前輩以外，好像也沒有其他能夠拜託，或者有能力做出決定的人了……"
62090-79 = "是什麼事呢？請說說看吧。"
62090-81 = "好的。就是……"
62090-82 = "現在這些聚集在這裡的孩子們……"
62090-83 = "人數大概比小隊還多……但是又比中隊稍微少一點……"
62090-84 = "當然除了這邊以外，還有孩子在其他地方各自聚集……"
62090-85 = "所以有人就提議說，我們是不是該取一個屬於自己的名字。"
62090-86 = "就，就像「奧利斯小隊」那樣。"
62090-87 = "可惡，一提到小隊就有點不爽……總之大概就是這樣。"
62090-89 = "原來是這樣啊，我明白了。#n不過那種事情非得現在……"
62090-90 = "……"
62090-91 = "不。名字是很重要的吧。"
62090-93 = "沒錯！謝謝前輩能夠理解！"
62090-94 = "前輩有什麼好主意嗎……？"
62090-99 = "……"
62090-100 = "……「尼科米底亞」。"
62090-102 = "尼科……米底亞？"
62090-104 = "沒錯。「尼科米底亞部隊」。"
62090-105 = "就把這當成在場所有人的所屬單位吧。"
62090-107 = "是！"
62090-108 = "雖然不太懂是什麼意思，不過我喜歡！"
62090-112 = "真的，沒問題嗎……？#n沒想到老師會想親自過去……"
62090-113 = "[s1]「無論有沒有問題都非去不可。」\n[s2]「至少得試著談談才行。」"
62090-116 = "那個……老師？"
62090-117 = "如果，昴前輩直到最後都無法接受我們……"
62090-118 = "無法接受老師的話……"
62090-119 = "老師親自前往波塔帕西斯這件事……"
62090-120 = "不就會變得……毫無意義了嗎……？"
62090-121 = "[s3]「即便如此，該做的事情還是必須要做。」\n[s4]「就算最後那些孩子無法原諒我……」"
62090-126 = "[ns]「也絕對不能什麼都不說就草草結束。」"
62090-127 = "這樣才能為未來保留可能性……播下未來的種子……是嗎？"
62090-128 = "……"
62090-129 = "老師果然很了不起呢。#n我也……"
62090-130 = "我也……"
62090-131 = "希望能成為跟老師……還有昴前輩……"
62090-132 = "一樣好的人……"
62090-133 = "雖然昴前輩他，對我……"
62090-134 = "……嗚。"
62090-139 = "經歷了那種事之後，他還是站在昴那邊啊……"
62090-140 = "昴前輩本來就是那種類型的人嘛。#n會讓人……不由自主地想跟隨他。"
62090-141 = "而且更糟的是，他自己對這一點根本沒有自覺。"
62090-142 = "……是啊，確實如此。"
62090-143 = "耶，耶嘿嘿……#n我覺得，有沙織姐姐在，真是太好了……"
62090-144 = "嗯，因為沙織是個好隊長。"
62090-145 = "……"
62090-146 = "不過，我覺得昴也以他自己的方式盡力了。"
62090-147 = "……光是盡力是不夠的。你應該也知道吧。"
62090-148 = "……是啊。"
62090-149 = "[s]「咦？大家怎麼了？要不要稍微走慢一點？」"
62090-150 = "沒關係的，老師。#n不好意思，我們馬上就跟上。"
62090-151 = "居然拖慢了老師的腳步，真是不好意思。"
62090-152 = "不知道會發生什麼……我們快點走吧。"
62090-154 = "（下一頁是……）"
62090-158 = "認為能與格黑娜共存的想法才是異端。"
62090-159 = "而為了強制灌輸這種思想──"
62090-160 = "企圖壓迫並吸收所有其他派系的三一也是異端。"
62090-161 = "自稱榮耀之人啊。"
62090-162 = "自詡無所不知之人啊。"
62090-163 = "謙遜本就不是你們的美德。"
62090-164 = "一切皆為徒勞。無論去向何處，終將化為虛無。"
62090-165 = "（歷經無數次更迭的奧利斯統治階層的相關紀錄，#n　以及對三一和格黑娜近乎詛咒的描述……）"
62090-166 = "（這種東西已經夠了。我們早已體會到近乎厭煩）"
62090-167 = "（我需要知道的，是現在應該做些什麼、還能做些什麼）"
62090-168 = "（以及現在出現在奧利斯的天使究竟是什麼……）"
62090-170 = "眼看，看不飽。耳聽，聽不足。"
62090-171 = "已有的事後必再有，已行的事後必再行。"
62090-172 = "日光之下並無新事。"
62090-173 = "[log]有言道，[wa:500]一切皆為徒勞。無論去向何處，終將化為虛無。[/log]"
62090-176 = "（又回到經典的內容了）"
62090-177 = "（「一切皆為徒勞。無論去向何處，終將化為虛無」）"
62090-178 = "（雖然可能只是巧合，不過居然跟經文對上了……？）"
62090-180 = "這個世界吞食屍體，凡被其吞噬者皆將死去。"
62090-181 = "而真理滋養生命，凡被真理養育者皆不會死去。"
62090-182 = "有言道，天使不過是汝等自身的象徵。"
62090-183 = "（等等……？）"
62090-184 = "（天使……不過是我們自身的象徵……？）"
62090-185 = "（這種解釋……我以前從來沒有讀到過……）"
62090-187 = "（怎，怎麼回事！？）"
62090-196 = "在此宣告本次公會議的決議。"
62090-197 = "自即刻起，對奧利斯處以永恆的[ruby=絕罰]破門律[/ruby]。"
62090-198 = "奉至聖之父、至聖之子、至聖之靈之名。"
62090-199 = "道路並不存在，因此我們必須用粗糙的雙手將其開闢。"
62090-200 = "光芒已從我們身上消失，僅能如腐鼠般哀號、任汙水澆淋。"
62090-201 = "從至高的天空墜入至深的地底。"
62090-202 = "[ruby=三一]他們[/ruby]企圖抹去我們曾經存在的證據。"
62090-203 = "許多人消失了。"
62090-204 = "不應該消失的人消失了。"
62090-205 = "不應該互相憎恨的人開始憎恨彼此。"
62090-206 = "因此──"
62090-207 = "一切皆為徒勞。無論去向何處，終將化為虛無。"
62090-210 = "……！？！？#n這個聲音是……？"
62090-214 = "現在是搭建於過去這個基礎上的建築。#n所有過去都與現在息息相關。"
62090-215 = "倘若當年公會議的結論略有不同，[ruby=我等]奧利斯[/ruby]並未因為「解釋差異」而遭到驅逐──"
62090-216 = "倘若如此，[ruby=奧利斯]我們[/ruby]現在將會過著什麼樣的生活呢。"
62090-217 = "這是奧利斯，必須不斷思考的問題。"
62090-221 = "請問……你是誰？"
62090-222 = "[ruby=奧利斯]我們[/ruby]是被留在[ruby=我們]奧利斯[/ruby]的──"
62090-228 = "下一話;巢穴"

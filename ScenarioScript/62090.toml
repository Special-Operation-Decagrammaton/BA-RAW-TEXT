62090-11 = "#na;???;언제까지 그들의 진리가 어디 있느냐며 조롱하는 질문을 들어야 하나이까."
62090-12 = "3;스바루;26;으……. 첫 문장부터 강렬하네요. <피에 대한 복수> 라니…….\n#3;em;[땀]"

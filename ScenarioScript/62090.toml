[translation]
62090-1 = "ตอนที่ 9;Apocrypha"
62090-6 = "มีอยู่จริงๆ สินะ"
62090-7 = "สิ่งที่ทรีนิตี้มองว่าเป็น[ruby=Apocrypha]พระคัมภีร์นอกสารบบ[/ruby]..."
62090-8 = "แต่ก็หลีกเลี่ยงมาตลอดและพยายามทำให้เป็นสิ่งที่ไม่เคยมีมาก่อน...!"
62090-10 = "ฉันต้องรออีกนานแค่ไหน จนกว่าจะได้ลุกขึ้นมาล้างแค้นต่อเลือดของเหล่าทาสของคุณ"
62090-11 = "ฉันต้องทนฟังคำถามเยาะเย้ยที่ว่าความจริงของพวกเขาอยู่ที่ไหนไปอีกนานแค่ไหน"
62090-12 = "<ล้างแค้นต่อเลือด> งั้นเหรอ... อึก... เนื้อหาเข้มข้นตั้งแต่ประโยคแรกเลยสินะ"
62090-14 = "ในวันแห่งความทุกข์ยากที่คนชั่วและคนที่ไม่ยำเกรงทั้งหลายถูกเนรเทศ"
62090-15 = "นี่คือคำกล่าวสำหรับผู้ถูกเลือกและผู้ชอบธรรม "
62090-16 = "เอ๋? เนื้อหาของพระคัมภีร์ขาดไปตั้งแต่ตรงนี้สินะ ส่วนตรงนี้ก็...?"
62090-17 = "อย่างนี้นี่เอง"
62090-18 = "ประวัติศาสตร์ของอาเรียสถูกบันทึกคู่ขนานไปกับพระคัมภีร์นอกสารบบสินะ"
62090-23 = "ทรีนิตี้ประกาศว่าขับไล่พวกเราก็จริง แต่พวกนั้นไม่อาจรู้ว่า"
62090-24 = "การขับไล่พวกเรา ก็ไม่ต่างจากการขับไล่ตัวเองออกมาด้วย"
62090-25 = "พวกคนที่ไม่สามารถโอบกอดพี่น้องที่อยู่กับตัวเองได้ จะไปโอบกอดคนอื่นที่อยู่ข้างนอกได้อย่างไร"
62090-26 = "พวกนั้นเนรเทศพวกเรามายังดินแดนนิโคมีเดียแห่งนี้"
62090-27 = "แต่พวกเราจะวางรากฐานของอาเรียสไว้ที่นี่"
62090-28 = "นิโคมีเดีย...?"
62090-29 = "นั่นคือชื่อเดิมของสถานที่แห่งนี้งั้นเหรอ?"
62090-31 = "เป้าหมายแรกที่ทรีนิตี้เล็งปากกระบอกปืนมาก็คืออาเรียส"
62090-32 = "เด็กที่ถืออาวุธย่อมอยากทดสอบพลังของมันมากกว่าสิ่งอื่นใด"
62090-33 = "อาเรียสที่ถูกตัดสินว่าเป็นพวกนอกรีต น่าจะเป็นเป้าหมายที่เหมาะสมที่สุด"
62090-34 = "นี่มัน... เรื่องที่พวกเราก็ได้ยินบ่อยๆ นี่นา"
62090-35 = "และตั้งแต่ตรงนี้ไป... พระคัมภีร์นอกสารบบก็..."
62090-37 = "เมื่อถึงวันที่สัญญาณตามคำพยากรณ์ปรากฏ"
62090-38 = "เมืองที่มองไม่เห็นในตอนนี้จะปรากฏขึ้น และดินแดนที่ซ่อนอยู่จะเปิดเผย"
62090-39 = "ความจริงจะเปิดเผยกับผู้คน ผู้ที่อยู่รอดจนถึงวันนั้นจะยินดีปรีดาไม่รู้จบสิ้น"
62090-40 = "เนื้อหานี้...?"
62090-41 = "พอเทียบกับวิวรณ์ที่บันทึกอยู่ในพระคัมภีร์ร่วม เนื้อหาก็แตกต่างออกไปนิดหน่อยนะ"
62090-42 = "แต่ก็นะ ถ้าพิจารณาว่านี่คือพระคัมภีร์นอกสารบบ มันก็เป็นไปได้..."
62090-44 = "โลกที่ยังหลับใหลจะตื่นขึ้น สิ่งที่เน่าเฟะจะสูญหายไป"
62090-45 = "คนดีมีอยู่น้อยนิด ส่วนคนชั่วนั้นมีเหลือคณานับ"
62090-46 = "เธอจะยินดีกับคนจำนวนน้อยที่ถูกไถ่ทุกข์"
62090-47 = "และไม่ต้องโศกเศร้ากับคนจำนวนมากที่จะสูญสลายไป"
62090-51 = "<ไม่ต้องโศกเศร้ากับคนจำนวนมากที่จะสูญสลายไป>"
62090-52 = "..."
62090-60 = "ทุกคนคะ? มีเรื่องอะไรงั้นเหรอคะ?"
62090-62 = "ค่ะ! พวกฉันมารายงานว่าสร้างฐานที่มั่นตามคำสั่งของรุ่นพี่เสร็จแล้วค่ะ!"
62090-64 = "อย่างนี้สินะคะ ทำได้ดีมากค่ะ"
62090-66 = "งานของรุ่นพี่คืบหน้าดีมั้ยคะ?"
62090-68 = "ฉันไม่แน่ใจว่าจะเรียกว่าเป็นเบาะแสได้หรือเปล่า... แต่ฉันเจอพระคัมภีร์ที่ซ่อนไว้แล้วค่ะ"
62090-69 = "เป็นพระคัมภีร์เฉพาะของอาเรียสที่ทางทรีนิตี้ก็อาจจะไม่ได้ใช้ด้วยค่ะ"
62090-71 = "งั้นต้องมีอะไรเขียนไว้ในนั้นแน่เลยค่ะ!"
62090-75 = "ว่าแต่ รุ่นพี่คะ คือว่า... พอดีทุกคนเริ่มพูดถึงเรื่องนี้กันน่ะค่ะ..."
62090-76 = "ฉันไม่แน่ใจว่าจะมาขอร้องเรื่องนี้จากรุ่นพี่ในตอนนี้ได้หรือเปล่า"
62090-77 = "แต่นอกจากรุ่นพี่แล้ว ฉันก็ไม่มีใครที่จะไปขอความช่วยเหลือหรือให้ตัดสินใจแทนได้..."
62090-79 = "มีเรื่องอะไรเหรอคะ? บอกฉันมาได้เลยค่ะ"
62090-81 = "ค่ะ คือว่า..."
62090-82 = "เด็กๆ ที่รวมตัวกันอยู่ที่นี่ตอนนี้น่ะค่ะ"
62090-83 = "ถ้าดูจากจำนวนแล้ว... ก็น่าจะมากกว่า 1 หมวด... แต่ก็ยังไม่ถึง 1 กองร้อย..."
62090-84 = "แน่นอนว่านอกจากที่นี่แล้ว ก็ยังมีพวกเด็กที่ไปรวมกลุ่มกันเองอยู่ที่อื่นด้วย แต่ยังไงก็เถอะค่ะ"
62090-85 = "เรื่องที่ฉันได้ยินทุกคนคุยกันก็คือ เราควรเริ่มตั้งชื่อของพวกเราเองได้แล้ว"
62090-86 = "ชื่อที่เหมือนกับ <สควอดของอาเรียส> น่ะค่ะ"
62090-87 = "บอกตามตรงว่าพอได้ยินเรื่องของสควอด ฉันก็อารมณ์เสียไปนิดหน่อย แต่ก็เอาเถอะค่ะ..."
62090-89 = "อ่า เป็นเรื่องแบบนั้นสินะคะ แต่เราจำเป็นต้องทำแบบนั้นตอนนี้เลยเหรอ..."
62090-90 = "..."
62090-91 = "ไม่สิ การตั้งชื่อเป็นเรื่องสำคัญค่ะ"
62090-93 = "ค่ะ! ขอบคุณที่เข้าใจนะคะ!"
62090-94 = "รุ่นพี่พอมีไอเดียดีๆ บ้างมั้ยคะ...?"
62090-99 = "..."
62090-100 = "<นิโคมีเดีย>..."
62090-102 = "นิโค... มีเดีย?"
62090-104 = "ใช่ค่ะ <กองกำลังนิโคมีเดีย>"
62090-105 = "ให้ทุกคนที่รวมตัวอยู่ที่นี่ในตอนนี้ใช้ชื่อนี้ค่ะ"
62090-107 = "เข้าใจแล้วค่ะ!"
62090-108 = "ถึงจะไม่รู้ความหมาย แต่ฉันก็ชอบชื่อนี้ค่ะ!"
62090-112 = "จะไม่เป็นไรจริงๆ เหรอคะ...? ฉันคิดไม่ถึงเลยค่ะว่าคุณครูจะไปด้วยตัวเองเลย..."
62090-113 = "[s1] \"ต่อให้เป็นยังไง ครูก็ต้องไปอยู่แล้ว\"\n[s2] \"อย่างน้อยครูก็ต้องไปคุยกับทุกคนนะ\""
62090-116 = "อืม คุณครูคะ?"
62090-117 = "ถ้าเกิดรุ่นพี่สุบารุบอกว่า..."
62090-118 = "ไม่ว่ายังไงก็จะไม่ยอมรับคุณครู..."
62090-119 = "งั้นการที่คุณครูจะไปปอร์ตาปาซิสในตอนนี้"
62090-120 = "ก็จะไม่มีความหมาย... หรือเปล่าคะ...?"
62090-121 = "[s3] \"ต่อให้ทุกคนไม่ยกโทษให้ ครูก็ต้องไป\"\n[s4] \"ต่อให้เด็กๆ ไม่ยกโทษให้ ครูก็ต้องไป\""
62090-126 = "[ns] \"เราจะปล่อยให้เรื่องจบโดยไม่พูดอะไรเลยไม่ได้หรอก\""
62090-127 = "เราต้องทำแบบนั้น จะได้หว่านเมล็ดพันธุ์แห่งอนาคต... เพื่อโอกาสสำหรับอนาคตของเราได้ อย่างงั้นเหรอคะ...?"
62090-128 = "..."
62090-129 = "คุณครูเป็นคนที่ยอดเยี่ยมจริงๆ ด้วยนะคะ ฉันก็..."
62090-130 = "ฉันก็..."
62090-131 = "อยากเป็นเหมือนคุณครู... แล้วก็รุ่นพี่สุบารุ..."
62090-132 = "ฉันอยากเป็นคนที่พอใช้ได้บ้างค่ะ..."
62090-133 = "แต่รุ่นพี่สุบารุก็คงเกลียดฉันไปแล้ว..."
62090-134 = "ฮือ..."
62090-139 = "ต่อให้เจอเรื่องแบบนั้น ก็ยังจะอยู่ข้างสุบารุงั้นเหรอ..."
62090-140 = "รุ่นพี่สุบารุก็เป็นคนแบบนั้นละ คนที่ทำให้... คนอื่นทำตามตัวเอง"
62090-141 = "ที่แย่กว่านั้นก็คือ ตัวเองไม่รู้เลยด้วยซ้ำว่ากำลังทำอะไรอยู่"
62090-142 = "ใช่... เป็นอย่างนั้นเลยละ"
62090-143 = "แหะ... แหะๆ... แต่ยังไงฉันก็คิดว่าเราโชคดีที่มีพี่ซาโอริอยู่กับเรานะคะ..."
62090-144 = "อื้อ ก็ซาโอริเป็นผู้นำที่ดีนี่นา"
62090-145 = "..."
62090-146 = "แต่ฉันก็คิดว่าสุบารุเองก็ทำดีที่สุดในแบบของตัวเองอยู่นะ"
62090-147 = "การทำให้ดีที่สุดอย่างเดียวมันไม่พอหรอก... เธอก็รู้นี่"
62090-148 = "ก็ใช่..."
62090-149 = "[s] \"หืม? ทุกคนมีเรื่องอะไรงั้นเหรอ? งั้นค่อยๆ เดินกันมั้ย?\""
62090-150 = "ไม่หรอก คุณครู ขอโทษนะ ฉันจะรีบตามไป"
62090-151 = "นั่นสิ น่าอายชะมัดที่พวกเราเดินตามครูไม่ทัน"
62090-152 = "ไม่มีใครรู้หรอกว่าจะเกิดเรื่องอะไร เรารีบไปกันเถอะ"
62090-154 = "(หน้าต่อไป...)"
62090-158 = "ความคิดที่ว่าเราอยู่ร่วมกับเกเฮนน่าได้คือความคิดนอกรีต"
62090-159 = "และพวกทรีนิตี้ที่พยายามกดขี่และดูดกลืนกลุ่มอื่นๆ เพื่อบีบบังคับให้เชื่อความคิดนั้น"
62090-160 = "ก็เป็นพวกนอกรีตเหมือนกัน"
62090-161 = "พวกที่กล่าวอ้างว่าตัวเองได้เป็นเกียรติ"
62090-162 = "พวกที่เสนอตัวว่าล่วงรู้ทุกอย่างในโลก"
62090-163 = "ความอ่อนน้อมถ่อมตัวไม่ใช่สิ่งที่พวกเธอยึดถือปฏิบัติตั้งแต่แรกอยู่แล้ว เพราะงั้น"
62090-164 = "ทุกอย่างจึงล้วนเปล่าประโยชน์และไร้ความหมาย"
62090-165 = "(บันทึกเกี่ยวกับชนชั้นปกครองของอาเรียสที่เปลี่ยนแปลงมานับไม่ถ้วน และถ้อยคำที่เกือบจะเป็น#nคำสาปแช่งทรีนิตี้กับเกเฮนน่า...)"
62090-166 = "(พอแล้วกับเรื่องแบบนี้ นี่ก็เป็นสิ่งที่พวกเรารู้สึกเบื่อเต็มทนแล้ว)"
62090-167 = "(อะไรคือสิ่งที่ต้องทำ และอะไรคือสิ่งที่ทำได้...)"
62090-168 = "(แล้วนางฟ้าที่ปรากฏในอาเรียสตอนนี้คืออะไรกันแน่...)"
62090-170 = "ถึงตามองเห็นแต่ก็ไม่พึงพอใจ ถึงหูได้ยินแต่ก็ไม่เพียงพอ"
62090-171 = "สิ่งที่เคยมีอยู่ จะกลับมาอีกครั้ง"
62090-172 = "แม้จะทำสิ่งที่เคยทำไปแล้วอีกครั้ง แต่ก็ไม่มีอะไรใหม่ภายใต้ดวงอาทิตย์ "
62090-173 = "[log]กล่าวกันว่า[wa:500]ทุกอย่างล้วนเปล่าประโยชน์และไร้ความหมาย[/log]"
62090-176 = "(ประโยคในพระคัมภีร์อีกแล้ว)"
62090-177 = "(<ทุกอย่างล้วนเปล่าประโยชน์และไร้ความหมาย>)"
62090-178 = "(นี่อาจเป็นเรื่องบังเอิญก็ได้ แต่ประโยคนี้มีตรงกันเลย...)"
62090-180 = "โลกใบนี้คือสิ่งที่กลืนกินซากศพ ทุกสิ่งที่ถูกกินเข้าไปจะต้องตาย"
62090-181 = "ทว่าความจริงคือสิ่งที่กลืนกินชีวิต ผู้ที่ได้รับการหล่อเลี้ยงด้วยความจริงจะไม่มีวันตาย"
62090-182 = "กล่าวกันว่านางฟ้าเป็นเพียงสัญลักษณ์แทนพวกเธอ"
62090-183 = "(เดี๋ยวนะ...?)"
62090-184 = "(นางฟ้าเป็นเพียงสัญลักษณ์แทนพวกเรา...?)"
62090-185 = "(นี่เป็น... การตีความที่ไม่เคยได้ยินมาก่อนเลย...?)"
62090-187 = "(อะ... อะไรเนี่ย?!)"
62090-196 = "ขอประกาศผลการประชุมสภา ณ ที่นี้"
62090-197 = "จากนี้อาเรียสจะถูกคว่ำบาตร และจะเป็นเช่นนั้นตลอดไป"
62090-198 = "ในนามของบิดามารดาผู้ศักดิ์สิทธิ์ บุตรธิดาผู้ศักดิ์สิทธิ์ และดวงวิญญาณอันศักดิ์สิทธิ์"
62090-199 = "เมื่อไม่มีทางเดิน เราจึงต้องเปิดทางด้วยมือที่เต็มไปด้วยบาดแผลกันเอง"
62090-200 = "แสงสว่างจางไปอย่างไร้ร่องรอย ส่วนพวกเราก็ต้องร่ำร้องไห้และซ่อนตัวตามท่อระบายน้ำ เหมือนหนูสกปรก"
62090-201 = "จากผืนฟ้าชั้นสูงสุด สู่ผืนดินชั้นต่ำสุด"
62090-202 = "ทรีนิตี้ต้องการเปลี่ยนให้พวกเราเป็นสิ่งที่ไม่เคยมีมาก่อน"
62090-203 = "คนจำนวนมากหายไป"
62090-204 = "หลายคนหายไป ทั้งๆ ที่ไม่จำเป็นต้องหาย"
62090-205 = "หลายคนหันมาเกลียดชังกันเอง ทั้งๆ ที่ไม่ต้องเกลียดกันด้วยซ้ำ"
62090-206 = "เพราะเช่นนั้น"
62090-207 = "ทุกอย่างจึงล้วนเปล่าประโยชน์และไร้ความหมาย"
62090-210 = "อะไรน่ะ...?!?! เสียงนี้มัน...?"
62090-214 = "ปัจจุบันถูกสร้างขึ้นโดยมีอดีตเป็นรากฐาน อดีตทั้งหมดล้วนข้องเกี่ยวกับปัจจุบัน"

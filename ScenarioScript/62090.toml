[translation]
62090-1 = "Episode 9;Apocrypha"
62090-6 = "It really existed."
62090-7 = "What Trinity concluded as pseudepigrapha..."
62090-8 = "The Apocrypha they tried to hide away and eradicate!"
62090-10 = "How long must your servants wait before they may rise in the name of their vengeance of blood?"
62090-11 = "Until when must they endure the mocking questions of truth and lie?"
62090-12 = "Wow... What a strong start. \"Vengeance of blood\"..."
62090-14 = "For days of tribulation, when all the wicked and godless are to be removed."
62090-15 = "Words for the elect and righteous."
62090-16 = "Huh? The Apocrypha stopped here. And this is...?"
62090-17 = "I see."
62090-18 = "The history of Arius was recorded alongside the Apocrypha."
62090-23 = "Trinity may have sentenced us to excommunication, but they know naught what they have truly done."
62090-24 = "In banishing us, they have sentenced themselves to a lifetime of solitude."
62090-25 = "Those who cannot embrace their own sister can never trust the embrace of another."
62090-26 = "Banish us to Nicomedia they may..."
62090-27 = "...but here shall we henceforth build the foundation of Arius."
62090-28 = "Nicomedia...?"
62090-29 = "Is that what this place was originally called?"
62090-31 = "We, Arius, were the first ones to face the barrel of Trinity's gun."
62090-32 = "Like a child with a new toy, Trinity sought any excuse to deploy their new weapons."
62090-33 = "What better target than Arius, those convicted heretics?"
62090-34 = "We were taught this..."
62090-35 = "And...the Apocrypha resumes here..."
62090-37 = "For behold, the time will come, when the signs which I have foretold to you will come to pass,"
62090-38 = "that the city which now is not seen shall appear, and the land which now is hidden shall be disclosed."
62090-39 = "And as truth and people reveal, those who remain until that day will rejoice forever."
62090-40 = "Isn't this from the Book of Revelation...?"
62090-41 = "But it's worded a little differently from what's written in the common scripture's Book of Revelation."
62090-42 = "Well, given the definition of \"Apocrypha,\" I guess that's only natural..."
62090-44 = "The world, which is not yet awake, shall be roused, and that which is corruptible shall perish."
62090-45 = "For whereas the righteous are not many but few, while the ungodly abound"
62090-46 = "for you will rejoice over the few who shall be saved."
62090-47 = "And not grieve over the multitude of those who perish."
62090-51 = "\"And not grieve over the multitude of those who perish.\""
62090-52 = "..."
62090-60 = "Everyone? What's going on?"
62090-62 = "Reporting in! We've set up the base, just as you ordered!"
62090-64 = "I see. Good work."
62090-66 = "How's it going here, Subaru?"
62090-68 = "I wouldn't...go as far as to call it a clue, but I did find some hidden scripture."
62090-69 = "Scripture unique to Arius. Trinity probably doesn't even know if it exists."
62090-71 = "Then there must be something important there!"
62090-75 = "Before that, Subaru, uh, everyone's been talking about something..."
62090-76 = "Some of us thought we should come ask you about it."
62090-77 = "There didn't really seem to be anyone else who could make big decisions besides you."
62090-79 = "What is it? Feel free to tell me."
62090-81 = "Right. So..."
62090-82 = "If you count all the students here right now..."
62090-83 = "There's a lot of us! We're bigger than a platoon...but smaller than a company..."
62090-84 = "Some groups split off, but that's besides the point."
62090-85 = "Yeah, so, some people were saying we should have a name."
62090-86 = "You know, like the Arius Squad did."
62090-87 = "...Ugh. I hate having to say THEIR name."
62090-89 = "Aha. So that's what it was about. But is that really that urgent of a..."
62090-90 = "..."
62090-91 = "Actually, you're right. Names are important."
62090-93 = "Yes! Thank you for understanding!"
62090-94 = "So, uh, do you...have any ideas?"
62090-99 = "..."
62090-100 = "...Nicomedia."
62090-102 = "Nico...media?"
62090-104 = "Yes. Nicomedia's Troop."
62090-105 = "From now on, that's what we'll be known as."
62090-107 = "Understood!"
62090-108 = "I have no idea what it means, but I like it!"
62090-112 = "Are you really sure about this? Actually, I didn't expect you to be the one to suggest it, Sensei."
62090-113 = "[s1] \"Honestly, I'm not 100% sure. But I still have to go.\"\n[s2] \"I have to at least try talking to her first.\""
62090-116 = "Um, Sensei?"
62090-117 = "What if..."
62090-118 = "What if Subaru rejects you? If she says she can't accept this?"
62090-119 = "Wouldn't that make your going to Porta Pacis..."
62090-120 = "...completely meaningless...?"
62090-121 = "[s3] \"I still have to do everything within my power...\"\n[s4] \"It's not about whether or not they forgive me.\""
62090-126 = "[ns] \"I can't let this end with so many things left unsaid.\""
62090-127 = "...That's how we...plant possibilities for a better future?"
62090-128 = "..."
62090-129 = "You're really incredible, Sensei. I..."
62090-130 = "I..."
62090-131 = "I want to become a better person..."
62090-132 = "Like you...and Subaru."
62090-133 = "Although Subaru..."
62090-134 = "*sob*"
62090-139 = "Even after what Subaru did, it's hard for her to let go."
62090-140 = "Subaru has a weird magnetism. She makes people want to follow her."
62090-141 = "Worse, she never seemed to even realize it."
62090-142 = "...Yeah. She didn't."
62090-143 = "H-Heehee... We really lucked out with Saori."
62090-144 = "Yes. Saori is a very good leader."
62090-145 = "..."
62090-146 = "However, Subaru is doing her best in the way she knows how."
62090-147 = "\"Best\" isn't enough. You know that."
62090-148 = "...Yes."
62090-149 = "[s] \"Huh? Is something wrong? Should we stop?\""
62090-150 = "It's nothing, Sensei. We're coming."
62090-151 = "We shouldn't be slowing you down right now, Sensei."
62090-152 = "We don't know what lies ahead of us. Let's go."
62090-154 = "(And the next page...)"
62090-158 = "To believe in coexistence with Gehenna is blasphemous."
62090-159 = "Trinity's grasp for power, oppressing and absorbing opposing factions..."
62090-160 = "...can only be described as heretic."
62090-161 = "You who claim to be glorious."
62090-162 = "You who present as all-knowing."
62090-163 = "From the very start, humility was not a virtue you knew."
62090-164 = "Vanitas vanitatum. All is in vain."
62090-165 = "(Records of the frequently changed ruling powers in Arius, vitriolic curses towards Trinity and Gehenna...)"
62090-166 = "(Enough of that. I'm sick of it. We all are.)"
62090-167 = "(What we're looking for now is what can...or must be done.)"
62090-168 = "(And the truth behind the angels appearing in Arius.)"
62090-170 = "The eye is not satisfied with seeing, nor the ear filled with hearing."
62090-171 = "The thing that hath been, it is that which shall be."
62090-172 = "and that which is done is that which shall be done, and there is no new thing under the sun."
62090-173 = "[log]And so,[wa:500] vanitas vanitatum. All is in vain.[/log]"
62090-176 = "(It returned to the scripture.)"
62090-177 = "(\"Vanitas vanitatum. All is in vain.\")"
62090-178 = "(It might be a coincidence, but it's staying true to that verse...)"
62090-180 = "This world is a corpse-eater. All the things eaten in it themselves die also."
62090-181 = "Truth is a life-eater. Therefore no one nourished by truth will die."
62090-182 = "Angels are merely symbols. Representations of each of you."
62090-183 = "(Wait...)"
62090-184 = "(Angels are symbols...representing us?)"
62090-185 = "(I've never...seen this interpretation before...)"
62090-187 = "(Wh-What is this?!)"
62090-196 = "And the council hereby declares..."
62090-197 = "...the permanent and irrevocable excommunication of Arius."
62090-198 = "In the name of our holy parents, holy children, and the holy spirit."
62090-199 = "There was no path forward. With nothing but bloodied hands and battered souls, we forged our own."
62090-200 = "Light faded from existence, and we were sacrificed to the shadows. They left us to rot in sewage and despair, existences no better than the rats that scuttled beneath their feet."
62090-201 = "Trinity thirsted for our complete eradication."
62090-202 = "From the highest reach of the sky, to the deepest pits of this land, they wanted our existence to be expunged from reality itself."
62090-203 = "So many were lost."
62090-204 = "Meaningless loss soon became entangled in the rhythm of our daily lives."
62090-205 = "Hatred spread through us like poison."
62090-206 = "And therefore."
62090-207 = "Vanitas vanitatum. All is in vain."
62090-210 = "This voice...?!"
62090-214 = "The past is the foundation upon which the present is constructed. The events of the past echo into the present."
62090-215 = "Had the Council only decided differently, had Arius not been exiled due to a mere difference in interpretation..."
62090-216 = "...what kind of life would we, Arius, be living today?"
62090-217 = "Such things haunted every shadow of Arius."
62090-221 = "Who...are you?"
62090-222 = "We are Arius. We, Arius, are those who were left behind—"
62090-228 = "Next Episode;Nest"

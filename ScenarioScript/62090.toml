62090-7 = "3;스바루;04;트리니티에서 위경이라고 단정 지은……."
62090-8 = "3;스바루;10;그러나 그들이 언제나 피해 왔고, 없던 것으로 만들려 했던 [ruby=Apocrypha]외경[/ruby]이……!\n#3;greeting"

[translation]
1011205-1 = "偶然的會面"
1011205-3 = "（在外面處理完事情要回去的路上……）"
1011205-10 = "[ns]「……」"
1011205-14 = "（突然想起跟明日奈傳的MomoTalk，不禁開始左顧右盼）"
1011205-18 = "[ns]「沒有……」"
1011205-24 = "[ns]「……」"
1011205-34 = "[ns]「也對，哪有這麼容易遇到嘛。」"
1011205-39 = "啊啊！是老師！！！"
1011205-40 = "[s]「才說完就出現了！！」"
1011205-41 = "哇，真的是老師耶？又見面了！"
1011205-42 = "啊哈哈！這算是「命運」之類的嗎？"
1011205-43 = "明日奈剛才在附近亂逛，然後突然覺得往這邊走就能遇到老師！"
1011205-44 = "結果過來一看才發現，老師居然真的在這裡！！"
1011205-45 = "[s]「真是神出鬼沒……」"
1011205-46 = "哈哈，老師也嚇了一跳吧？"
1011205-47 = "嗯？想知道明日奈在哪裡的話，就得拿條繩子牽著才行？"
1011205-48 = "啊哈哈！這是什麼意思？#n牽條繩子比較好嗎？"
1011205-49 = "[ns1]「不是不是，我只是比喻一下……」\n[ns2]「開個玩笑，開個玩笑啦。」"
1011205-53 = "繩子我這裡有哦！！"
1011205-58 = "[ns]「為，為什麼要解開領結呢？明日奈……？」"
1011205-66 = "― [log=아스나 교복]鏘～！老師跟明日奈，連在一起了！[/log][wa:3150] "
1011205-69 = "― [log=아스나 교복]怎麼樣？[/log]"
1011205-71 = "― [log=아스나 교복]這樣就能知道在哪裡了對吧？[/log][wa:1380] "
1011205-74 = "― [log=아스나 교복]……怎麼了嗎？露出那種表情。[/log][wa:3020] "
1011205-77 = "― [log=아스나 교복]嗯？反了，是嗎？應該是我被綁住嗎？[/log][wa:4010] "
1011205-80 = "[ns3]「好像不是這個問題……」\n[ns4]「簡直像是被牽去散步的小狗一樣……」"
1011205-81 = "― [log=아스나 교복]……咦？……啊，啊啊！！說的也是！[/log][wa:4020] "
1011205-82 = "― [log=아스나 교복]……咦？……啊，啊啊！！說的也是！[/log][wa:4020] "
1011205-85 = "― [log=아스나 교복]……啊哈，啊哈哈哈！真奇怪！[/log][wa:2090] "
1011205-88 = "― [log=아스나 교복]這樣，就好像真的……[/log][wa:680] "
1011205-91 = "― [log=아스나 교복]在跟狗狗散步一樣！[/log][wa:940] "
1011205-94 = "― [log=아스나 교복]所以……現在的老師，是明日奈的狗狗對吧？[/log][wa:3550] "
1011205-97 = "― [log=아스나 교복]明日奈的狗狗，[/log]"
1011205-99 = "― [log=아스나 교복]會汪汪叫嗎？[/log][wa:1120] "
1011205-102 = "― [log=아스나 교복]呵呵！[/log]"
1011205-104 = "― [log=아스나 교복]乖乖說出來的話就給你獎勵哦，好不好？[/log][wa:2040] "
1011205-109 = "哈哈，狗狗～狗狗散步～"
1011205-113 = "[ns5]「那個，明日奈……」\n[ns6]「我不是說這樣不好……」"
1011205-116 = "[ns]「但如果被其他學生看到，可能會引發問題……」"
1011205-117 = "啊，是這樣嗎？嗯。"
1011205-121 = "也對，其他人可能會誤會老師的。"
1011205-122 = "[s]「你，你能理解我的意思嗎？」"
1011205-123 = "嗯！畢竟老師不是狗狗呀。"
1011205-124 = "好，那我要解開囉～"
1011205-128 = "呵呵～真好玩。"
1011205-129 = "那接下來就把領結綁回去……"
1011205-133 = "[ns]「明日奈……？」"
1011205-137 = "嗯……領結……要怎麼綁啊？"
1011205-138 = "啊哈哈！明日奈忘記了！"
1011205-139 = "老師應該知道怎麼綁吧？"
1011205-140 = "[s]「我當然知道囉。」"
1011205-141 = "那就讓老師幫我綁吧！#n來，東西在這裡！"
1011205-142 = "[s]「嗯？我，我來綁嗎？」"
1011205-146 = "嗯！！老師幫我綁！"
1011205-147 = "快點快點！！"
1011205-150 = "[ns]（手一直抖個不停……）"
1011205-153 = "（於是一步步教明日奈該怎麼綁領結……）"

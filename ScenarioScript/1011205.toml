[translation]
1011205-1 = "การพบกันโดยบังเอิญ"
1011205-3 = "(ขณะเดินทางกลับหลังจากมาทำงานข้างนอก...)"
1011205-10 = "[ns] \"...\""
1011205-14 = "(คุณครูเหลียวซ้ายแลขวาเพราะนึกถึง MOMOTALK ที่คุยกับอาสึนะ)"
1011205-18 = "[ns] \"ไม่มีแฮะ...\""
1011205-24 = "[ns] \"...\""
1011205-34 = "[ns] \"แต่ก็นะ คงไม่มีทางบังเอิญเจอกันง่ายๆ หรอก\""
1011205-39 = "อ๊ะ!! คุณครูนี่นา!!!"
1011205-40 = "[s] \"พูดถึงก็เจอเลย!!\""
1011205-41 = "ว้าว คุณครูจริงๆ ด้วย? ได้เจอกันอีกแล้วนะ!"
1011205-42 = "อะฮ่าฮ่า! แบบนี้เค้าเรียกว่าอะไรนะ? พรหมลิขิตหรืออะไรทำนองนั้นหรือเปล่า? "
1011205-43 = "อาสึนะกำลังเดินเล่นไปเรื่อยๆ แต่ก็มีลางสังหรณ์ว่าถ้ามาทางนี้จะได้เจอคุณครูน่ะ!"
1011205-44 = "แล้วพอมา ก็ได้เจอคุณครูจริงๆ ด้วย!!"
1011205-45 = "[s] \"ครูเดาไม่ได้เลยละว่าจะไปเจออาสึนะที่ไหนบ้าง...\""
1011205-46 = "ฮ่าๆ คุณครูก็ประหลาดใจเหมือนกันใช่มั้ยล่ะ?"
1011205-47 = "หืม? ถ้าอยากรู้ว่าอาสึนะอยู่ที่ไหน ก็ต้องผูกเชือกไว้งั้นเหรอ?"
1011205-48 = "อะฮ่าฮ่า! อะไรกัน? อยากให้อาสึนะมีเชือกผูกไว้เหรอ?"
1011205-49 = "[ns1] \"เปล่าหรอก แค่พูดเปรียบเปรยน่ะ...\"\n[ns2] \"ครูแค่ล้อเล่นนะ ล้อเล่น\""
1011205-53 = "แต่ว่าอาสึนะมีอะไรที่คล้ายเชือกนะ!!"
1011205-58 = "[ns] \"แกะริบบิ้นออกทำไมล่ะ? อาสึนะ...?\""
1011205-66 = "― [log=아스나 교복]แต่นแต๊น!! แค่นี้ก็เชื่อมระหว่างคุณครูกับอาสึนะไว้ได้แล้วค่ะ![/log][wa:1350] "
1011205-69 = "― [log=아스나 교복]เป็นยังไงล่ะ?[/log]"
1011205-71 = "― [log=아스나 교복]แบบนี้ก็ไม่ต้องกังวลแล้วใช่มั้ย? ทีนี้ก็รู้แล้วได้ใช่มั้ยล่ะว่าอยู่ที่ไหน?[/log][wa:10] "
1011205-74 = "― [log=아스나 교복]เป็นอะไรไปล่ะ...? ทำไมทำหน้าแบบนั้น[/log][wa:2180] "
1011205-77 = "― [log=아스나 교복]เอ๋? หรือว่าไม่ใช่แบบนี้? หรือว่าต้องให้อีกคนเป็นคนถือเชือก?[/log][wa:2290] "
1011205-80 = "[ns3] \"ครูรู้สึกเหมือนเป็นน้องหมาที่มาเดินเล่นเลย...\"\n[ns4] \"แบบนี้เหมือนพาน้องหมามาเดินเล่นเลย...\""
1011205-81 = "― [log=아스나 교복]หืม? เอ๋...? อ้อ!! จริงด้วยเนอะ!?[/log][wa:3380] "
1011205-82 = "― [log=아스나 교복]หืม? เอ๋...? อ้อ!! จริงด้วยเนอะ!?[/log][wa:3380] "
1011205-85 = "― [log=아스나 교복]อะฮ่าฮ่าฮ่าฮ่า! นี่มันอะไรเนี่ย แปลกจัง![/log][wa:1050] "
1011205-88 = "― [log=아스나 교복]นี่มันเหมือนกับ... [/log][wa:320] "
1011205-91 = "― [log=아스나 교복]มาเดินเล่นกับน้องหมาจริงๆ ด้วย![/log][wa:60] "
1011205-94 = "― [log=아스나 교복]คุณครู ตอนนี้คุณครูคือน้องหมาของอาสึนะเหรอ? [/log][wa:2590] "
1011205-97 = "― [log=아스나 교복]น้องหมาของอาสึนะ[/log]"
1011205-99 = "― [log=아스나 교복]จะเห่าบ๊อกๆ ได้มั้ยน้า?[/log][wa:440] "
1011205-102 = "― [log=아스나 교복]ฮุฮุ! [/log]"
1011205-104 = "― [log=아스나 교복]ถ้าทำได้ เดี๋ยวให้รางวัลนะ ว่าไงล่ะ?[/log][wa:1320] "
1011205-109 = "ฮ่าฮ่า พาน้องหมาเดินเล่น~ เดินเล่นกับน้องหมา~"
1011205-113 = "[ns5] \"เอ่อ อาสึนะ... ครูว่าพอแล้วดีกว่า\"\n[ns6] \"อาสึนะ... ครูไม่ได้จะบอกว่ามันไม่ดีหรอกนะ...\""
1011205-116 = "[ns] \"แต่ถ้านักเรียนคนอื่นมาเห็น มันอาจจะเป็นปัญหาได้น่ะ...\""
1011205-117 = "อ๊ะ งั้นเหรอ? ฮืม"
1011205-121 = "ก็นะ บางทีคุณครูอาจถูกเข้าใจผิดก็ได้"
1011205-122 = "[s] \"ขะ... เข้าใจครูงั้นเหรอ?\""
1011205-123 = "อื้อ! ก็คุณครูไม่ใช่น้องหมานี่นา"
1011205-124 = "เอาละ งั้นเดี๋ยวแก้ริบบิ้นให้นะ~"
1011205-128 = "ฮุฮุ~ สนุกจังเลยนะ"
1011205-129 = "เอาละ งั้นก็ต้องผูกริบบิ้นให้เหมือนเดิม..."
1011205-133 = "[ns] \"อาสึนะ...?\""
1011205-137 = "อืม... แล้วริบบิ้นเส้นนี้... มันผูกให้เป็นโบว์ยังไงนะ?"
1011205-138 = "อะฮ่าฮ่า! อาสึนะลืมไปแล้ว!"
1011205-139 = "คุณครูผูกเป็นใช่มั้ย?"
1011205-140 = "[s] \"แน่นอนสิ ครูผูกเป็นอยู่แล้ว\""
1011205-141 = "งั้นคุณครูก็ผูกให้หน่อยนะ! เอ้า ตรงนี้เลย!"
1011205-142 = "[s] \"หืม? หะ... ให้ครูผูกให้เหรอ?\""
1011205-146 = "อื้อ!! คุณครูผูกให้หน่อยนะ!"
1011205-147 = "เร็วเข้า เร็วเข้า!!"
1011205-150 = "[ns] (มือสั่น...)"
1011205-153 = "(แล้วคุณครูก็สอนอาสึนะผูกโบว์ด้วยริบบิ้นอย่างค่อยเป็นค่อยไป...)"

[translation]
10014005-1 = "序章;想和老師商量的事"
10014005-5 = "……喂？"
10014005-6 = "啊，真的接了。"
10014005-7 = "那個……老師，你現在在夏萊嗎？"
10014005-8 = "[s1] 「咦，這個聲音是……？」\n[s2] 「難道是放學後的甜點部的……？」"
10014005-13 = "……啊，抱歉。明明是我打過去的卻忘記打招呼了。#n對不起。"
10014005-14 = "我是三一綜合學園1年級，#n放學後的甜點部的杏山千紗。"
10014005-15 = "啊……那個，這個……"
10014005-16 = "唉……該怎麼說才好呢……"
10014005-17 = "老師，你現在有空嗎？#n方便的話……現在可以見個面嗎？"
10014005-18 = "地點就在……平交道附近吧。#n我會拍照給你的。"
10014005-19 = "[s3] 「突然就要兩人獨處了！？」\n[s4] 「是沒問題啦……怎麼了嗎？」"
10014005-23 = "……呼。#n大家之前說過的那些事，我似乎也明白了。"
10014005-24 = "嘛，不過跟某些人不一樣，我是開得起玩笑的人。"
10014005-25 = "嗯……雖然說也不是很嚴重的事……"
10014005-26 = "那個……有事情想找老師商量。"
10014005-27 = "不過，我沒有類似的經驗，不知道該怎麼做才對……"
10014005-28 = "所以……才會像這樣聯絡老師。"
10014005-29 = "……那個。"
10014005-30 = "如果方法很奇怪或是老師在忙的話……不好意思。"
10014005-31 = "[s5] 「謝謝你打電話給我。」\n[s6] 「幫助學生就是我的工作，所以不用在意。」"
10014005-32 = "是，是嗎？"
10014005-33 = "是，是嗎？"
10014005-34 = "……太好了。"
10014005-35 = "謝謝老師。#n聽你這麼說，我放心多了。"
10014005-36 = "不過，明明平時沒什麼在聯絡，卻在這種時候有求於你……#n感覺有點不好意思……"
10014005-37 = "說是補償可能有點奇怪，不過讓我請你喝點飲料吧。#n這樣的話我也比較能接受。"
10014005-38 = "……嗯？"
10014005-39 = "啊啊……你說想商量的事嗎？"
10014005-40 = "唔嗯……也對呢……讓老師也了解情況比較好吧……"
10014005-41 = "嘛……那個……簡單來說……"
10014005-42 = "我……最近……"
10014005-44 = "好像……被跟蹤狂纏上了。"

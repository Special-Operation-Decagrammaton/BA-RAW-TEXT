[translation]
10014005-1 = "บทเริ่มต้น;เรื่องที่อยากปรึกษา"
10014005-5 = "...ฮัลโหล?"
10014005-6 = "อ๊ะ ติดต่อได้จริงด้วย นึกว่าจะติดต่อไม่ได้ซะอีก..."
10014005-7 = "คือว่า... ที่นั่นใช่ชาเล่ต์รึเปล่าคะ? ...คุณครู?"
10014005-8 = "[s1] \"เอ๊ะ เสียงนี้มัน...\"\n[s2] \"อ้อ สมาชิกชมรมของหวานหลังเลิกเรียน...\""
10014005-13 = "อ๊ะ... ฉันนี่แย่จริงๆ โทรติดต่อมาแล้วแต่ดันลืมแนะนำตัว ต้องขอโทษด้วยค่ะ"
10014005-14 = "นักเรียนของโรงเรียนสามัญทรีนิตี้ ชั้นปีที่ 1 ชมรมของหวานหลังเลิกเรียน เคียวยามะ คาซึสะค่ะ"
10014005-15 = "เอ่อ... อืม... ก็คือว่า..."
10014005-16 = "เฮ้อ ไม่รู้ว่าจะเริ่มพูดยังไงเหมือนกันแฮะ แบบว่า..."
10014005-17 = "ตอนนี้คุณครูว่างมั้ย? ถ้าพอจะมีเวลาละก็ พวกเรา... มาเจอกันระหว่างทางไปโรงเรียนหน่อยได้มั้ย?"
10014005-18 = "เจอกันที่... แถวๆ ทางข้ามรถไฟตรงที่มันเงียบๆ ฉันจะถ่ายรูปส่งไปให้นะ"
10014005-19 = "[s3] \"จู่ๆ ก็นัดพบกันสองคนงั้นเหรอ!?\"\n[s4] \"ก็ว่างอยู่หรอกนะ มีเรื่องอะไรเหรอ?\""
10014005-23 = "อ่า... เป็นคนแบบนี้สินะ เข้าใจที่พวกเพื่อนๆ บอกขึ้นมาแล้ว"
10014005-24 = "แต่ก็นะ เข้าใจได้ว่าแค่เล่นมุก เพราะฉะนั้นจะปล่อยไปก็แล้วกัน..."
10014005-25 = "เอ่อ ก็... ไม่ใช่เรื่องใหญ่อะไรหรอก..."
10014005-26 = "ถ้าจะให้เข้าประเด็นเลยก็คือว่ามีเรื่องที่อยากจะปรึกษาคุณครูน่ะก็เลยติดต่อมา"
10014005-27 = "แต่ว่าไม่เคยยื่นเรื่องขอรับคำปรึกษาเลยสักครั้ง ก็เลยไม่รู้ว่าต้องทำยังไงน่ะ..."
10014005-28 = "เพราะงั้นก็เลย... ลองติดต่อมาก่อนโดยที่ไม่ได้คิดอะไร สถานการณ์ก็เป็นประมาณนี้ละนะ"
10014005-29 = "อืม...."
10014005-30 = "ถ้าคุณครูกำลังยุ่งอยู่หรือว่าฉันติดต่อมาผิดวิธีก็ต้องขอโทษด้วยนะคะ"
10014005-31 = "[s5] \"ไม่เป็นไรหรอก โทรมาก็ดีแล้วละ\"\n[s6] \"ไม่หรอก ครูก็มีหน้าที่ต้องช่วยนักเรียนอยู่แล้ว\""
10014005-32 = "งะ...งั้นเหรอ?"
10014005-33 = "งะ...งั้นเหรอ?"
10014005-34 = "เฮ้อ... โล่งอกไปที"
10014005-35 = "ขอบคุณนะ คุณครู พอได้ยินคุณครูพูดแบบนั้นก็สบายใจขึ้นบ้างแล้วละ"
10014005-36 = "ที่ผ่านมาฉันไม่เคยติดต่อมาดีๆ เลยสักครั้ง แต่กลับติดต่อมาในเวลาแบบนี้... รู้สึกไม่ดียังไม่รู้...."
10014005-37 = "เอาเป็นว่าถ้ามาเจอกันฉันจะเลี้ยงเครื่องดื่มให้นะ ทำแบบนั้นน่าจะสบายใจมากกว่า"
10014005-38 = "หืม...?"
10014005-39 = "ขอให้เล่าเรื่องให้ฟังคร่าวๆ ก่อนว่ามีเรื่องอะไรงั้นเหรอ?"
10014005-40 = "อืมมม... คุณครูเองก็ต้องกลับไปคิดก่อนมาเจอกันงั้นสินะ..."
10014005-41 = "คะ... คือว่า... ถ้าให้สรุปง่ายๆ ก็คือว่า..."
10014005-42 = "ช่วงนี้... ฉันน่ะ..."
10014005-44 = "เหมือนว่าจะกำลัง... โดนแอบสะกดรอยตามน่ะ"

10014005-8 = "[s1] \"Oh, that voice is...\"\n[s2] \"Who is this?\""
10014005-13 = "...Oh, yes. Sorry. I should introduce myself."
10014005-14 = "It's Kyoyama Kazusa from the After-School Sweets Club, first-year student of Trinity General School."

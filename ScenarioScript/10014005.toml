10014005-5 = "#na;???;……여보세요?"
10014005-6 = "#na;???;아, 진짜 연결되는구나. 설마 설마 했는데……."
10014005-7 = "#na;???;그……. 혹시 거기 샬레인가요? ……선생님?"
10014005-8 = "[s1] \"어라. 이 목소리는…….\"\n[s2] \"어, 확실히 방과후 디저트부의…….\""
10014005-9 = "#st;[0,0];instant;1;"
10014005-10 = "#st;[0,0];instant;1;"
10014005-11 = "#clearST"
10014005-12 = "3;통신카즈사;01\n#3;a\n#wait;1500"
10014005-13 = "3;통신카즈사;02;……아, 내 정신 좀 봐. 전화 걸어 놓고 자기소개도 안 하고 있었네. 죄송합니다.\n#3;em;[땀]"
10014005-14 = "3;통신카즈사;01;트리니티 종합학원 1학년. 방과후 디저트부 쿄야마 카즈사입니다.\n#3;greeting"
10014005-15 = "3;통신카즈사;04;어……. 음……. 그러니까……."
10014005-16 = "3;통신카즈사;99;……하아. 이걸 말을 어떻게 떼야 할지 잘 모르겠네. 그게…….\n#3;em;[속상함]"
10014005-17 = "3;통신카즈사;02;선생님, 혹시 지금 시간 괜찮아? 괜찮으면 등굣길에 잠시……. 좀 따로 볼 수 있을까?"
10014005-18 = "3;통신카즈사;01;장소는……. 좀 한적한 기차 건널목인데, 내가 찍어서 보내줄게."
10014005-19 = "[s3] \"느닷없이 둘만의 약속!?\"\n[s4] \"괜찮긴 한데, 무슨 일이야?\""
10014005-20 = "#st;[0,0];instant;1;"
10014005-21 = "#clearST"
10014005-22 = "3;통신카즈사;04\n#3;em;…\n#wait;2500"
10014005-23 = "3;통신카즈사;99;……과연, 이런 타입이구나. 애들이 한 말도 조금은 알겠네."
10014005-24 = "3;통신카즈사;04;뭐, 누구랑 달리 난 농담인 거 아니까 넘어가도록 하고…….\n#3;em;[반응]"
10014005-25 = "3;통신카즈사;01;아니, 뭐……. 뭐 대단한 건 아니고……."
10014005-26 = "3;통신카즈사;02;본론부터 말하자면, 사실 선생님께 상담받고 싶은 일이 있어서 연락한 거야."
10014005-27 = "3;통신카즈사;06;그런데 상담 신청이라는 걸 해 본 적이 없다 보니, 어떻게 해야 할지 몰라서…….\n#3;em;[땀]\n#3;stiff"
10014005-28 = "3;통신카즈사;02;그래서……. 일단 이렇게 무턱대고 연락을 걸어 본 거지. 지금 상황은 그런 거야."
10014005-29 = "3;통신카즈사;99;……음."
10014005-30 = "3;통신카즈사;06;혹시 바쁘거나 부탁하는 방식이 틀렸다면, 죄송합니다.\n#3;em;[속상함]"
10014005-31 = "[s5] \"아니, 그럴 리가. 잘 전화했어.\"\n[s6] \"이런 걸 돕는 게 내 일인걸.\""
10014005-32 = "3;통신카즈사;02;그, 그래?\n#3;em;[반응]"
10014005-33 = "3;통신카즈사;02;그, 그래?\n#3;em;[반응]"
10014005-34 = "3;통신카즈사;99;……후우. 다행이네.\n#3;stiff"
10014005-35 = "3;통신카즈사;03;고마워, 선생님. 그렇게 말해주니 조금은 안심이 됐어."
10014005-36 = "3;통신카즈사;01;하지만 여태 연락 한 번 제대로 안 하다가 이럴 때만 연락한다- 싶은 느낌은 역시 좀 싫으니…….\n#3;em;…"
10014005-37 = "3;통신카즈사;03;대신 만나면 마실 건 내가 사도록 할게. 그편이 속 편할 거 같아."
10014005-38 = "3;통신카즈사;01;……응?\n#3;em;[?]"
10014005-39 = "3;통신카즈사;02;우선 대충이라도 좋으니 무슨 일인지 알려 달라고?"
10014005-40 = "3;통신카즈사;06;으음……. 하긴 선생님도 이런저런 생각을 하면서 와야 하니까……."
10014005-41 = "3;통신카즈사;01;그…… 그게…… 간단하게 말하자면……."
10014005-42 = "3;통신카즈사;99;나는……. 최근…….\n#3;em;…"

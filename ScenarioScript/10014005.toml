10014005-16 = "*sigh* This is more awkward than I thought it'd be."
10014005-17 = "Can we meet real quick before school starts? If you're not busy or anything."
10014005-18 = "There's this train crossing we can meet at. I'll send a picture."
10014005-19 = "[s3] \"Just the two of us?!\"\n[s4] \"Sure, but what do you need?\""
10014005-23 = "...I get what the others were saying about you now."
10014005-24 = "Oh, you're really straightforward."
10014005-25 = "It's really not a big deal."
10014005-26 = "I just wanted some advice about this thing..."
10014005-27 = "I'm not really used to asking for help like this, so sorry if I'm being awkward."

10014005-29 = "Um."
10014005-30 = "I totally get it if you're busy though."
10014005-31 = "[s5] \"Oh, no worries. I'm glad you called.\"\n[s6] \"This actually is my job.\""
10014005-32 = "...I guess you're right."
10014005-33 = "...I guess you're right."
10014005-34 = "That's a relief."
10014005-35 = "Thanks, Sensei. I feel a lot better now."
10014005-36 = "I don't want to take advantage of you though..."
10014005-37 = "I'll buy you a drink as thanks. That way we're even."
10014005-38 = "Hm?"
10014005-39 = "You wanna have an idea of what it's about?"
10014005-40 = "I mean, I guess that's fair."
10014005-41 = "Well...how do I say this..."
10014005-42 = "Recently, I've been..."
10014005-44 = "...being stalked."

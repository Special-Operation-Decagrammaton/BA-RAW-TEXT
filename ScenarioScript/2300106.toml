2300106-58 = "3;후우카;00;앞으로도 집밥이 드시고 싶으시다면 절 불러주세요.\n#3;em;[음표]"
2300106-59 = "3;후우카;00\n#3;d\n#wait;1000"
2300106-60 = "3;후우카;00\n#3;a\n#3;closeup\n#wait;1000"
2300106-61 = "3;후우카;03;그럼 몇 번이든……, 제가 찾아와서 만들어드릴 테니까요.\n#3;em;[반짝]\n#3;greeting\n#3;closeup"

[translation]
2300106-1 = "#title;오늘만큼은 선생님만의 밥상"
2300106-2 = "#na;(며칠째 샬레의 업무로 철야가 이어지던 중, 후우카에게서 연락이 왔다.)"
2300106-3 = "#na;(후우카의 문자를 받고 곧바로 약속장소로 나갔지만.)"
2300106-4 = "#na;(약속장소에 도착한 순간 갑자기 하늘이 핑 돌았다.)"
2300106-5 = "#all;hide"
2300106-6 = "#all;hide"
2300106-7 = "#all;hide"
2300106-8 = "#all;hide"
2300106-9 = "#place;게헨나 학원 제12양호실"
2300106-10 = "3;후우카;02;서, 선생님? 괜찮으신가요?\n#3;shake\n#3;a"
2300106-11 = "3;후우카;02;의식이 드셨나요? 저 알아보시겠어요?!\n#3;hophop\n#3;em;[!]"
2300106-12 = "[s] \"후우카? 이게 어떻게 된 거야?\""
2300106-13 = "3;후우카;06;시간이 되어서 약속장소에 나가봤더니, 선생님이 쓰러져 계셨어요.\n#3;em;[속상함]\n#3;stiff"
2300106-14 = "3;후우카;02;보건 담당자 말로는 피로로 인해서 쓰러지신 거래요."
2300106-15 = "[s] \"아, 그러고 보면 어젯밤에도 밤샘으로 철야를 했었지.\""
2300106-16 = "3;후우카;06;다……. 저 때문이에요.\n#3;em;…"
2300106-17 = "[s] \"아니야. 그렇지 않아.\""
2300106-18 = "3;후우카;02;아뇨, 다 제 욕심 때문에, 선생님은 그렇지 않아도 샬레 업무로 눈코 뜰 새 없이 바쁘실 텐데."
2300106-19 = "3;후우카;06;괜히 제가 음식을 대접한다면서 멋대로 불렀다가 쓰러지시게 만들고……."
2300106-20 = "3;후우카;06;죄송해요…….\n#3;em;[속상함]\n#3;stiff"
2300106-21 = "[s] \"후우카. 그건 아니야.\""
2300106-22 = "3;후우카;02;에……?"
2300106-23 = "[s] \"나는 후우카가 해준 음식을 먹는 게 좋았어.\""
2300106-24 = "3;후우카;06;매번……."
2300106-25 = "3;후우카;02;매번 선생님은 제게 그렇게 말씀해주시네요……."
2300106-26 = "3;후우카;01;저, 선생님이 깨어나기를 기다리면서 줄곧 생각해봤어요."
2300106-27 = "3;후우카;02;어쩌면 저는 제 욕심 때문에, 선생님에게 제가 먹여드리고 싶다고 생각한 음식만 강요한 게 아닐까 하고.\n#3;em;…"
2300106-28 = "3;후우카;01;그러니 이번엔 선생님께서 직접 알려주세요.\n#3;greeting"
2300106-29 = "3;후우카;00;선생님, 혹시 드시고 싶으신 게 있나요?\n#3;em;[?]"
2300106-30 = "[s] \"내가 먹고 싶은 거라면…….\""
2300106-31 = "#wait;1000"
2300106-32 = "#all;hide"
2300106-33 = "#place;샬레 하우스"
2300106-34 = "3;후우카;02;집밥이 드시고 싶다니, 정말 그런 소소한 요리로 괜찮으신가요?\n#3;em;[?]\n#3;a"
2300106-35 = "[s] \"다른 사람이 아니라. 후우카가 만들어준 집밥이잖아.\""
2300106-36 = "3;후우카;01;선생님이 그렇게까지 말씀하신다면, 정말 어쩔 수 없네요."
2300106-37 = "3;후우카;03;네, 제게 맡겨만 주세요!\n#3;jump\n#3;em;[반짝]"
2300106-38 = "#all;hide"
2300106-39 = "#wait;11500"
2300106-40 = "#st;[-1200,-530];serial;60;[wa:2000]― 이럴 줄 알았어요. [wa:2500]또 인스턴트만 드신 거죠?"

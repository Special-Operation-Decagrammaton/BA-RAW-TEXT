[translation]
2300106-1 = "Sensei's Special of the Day"
2300106-2 = "Fuuka reached out to me at the end of a several night stretch of doing Schale work."
2300106-3 = "I went straight to the meeting place as soon as I received her text."
2300106-4 = "But just as I arrived, the sky felt like it had begun to spin around me."
2300106-9 = "Gehenna Academy Infirmary, Room 12"
2300106-10 = "S-Sensei? Are you all right?"
2300106-11 = "You're awake! Can you hear me?"
2300106-12 = "[s] \"Fuuka? What happened?\""
2300106-13 = "I found you collapsed on the ground at the meeting place."
2300106-14 = "The school nurse told me that you fainted from fatigue."
2300106-15 = "[s] \"Now I remember. I had been up working late again last night.\""
2300106-16 = "This...is all my fault."
2300106-17 = "[s] \"That isn't true.\""
2300106-18 = "But it is. I should have taken your schedule with Schale into consideration."
2300106-19 = "Had I not asked you to meet me for dinner, you wouldn't have fainted."
2300106-20 = "I'm so sorry..."
2300106-21 = "[s] \"It's not your fault, Fuuka.\""
2300106-22 = "It's not...?"
2300106-23 = "[s] \"I agreed to it because I love your cooking, Fuuka.\""
2300106-24 = "Every time..."
2300106-25 = "You always say things like that to me."
2300106-26 = "I've been jumping to conclusions while I waited for you to wake up."
2300106-27 = "I got so caught up in serving you what I wanted you to eat that I failed to consider what you wanted."
2300106-28 = "So this time, I want you to choose."
2300106-29 = "Sensei, is there something you would like to eat?"
2300106-30 = "[s] \"I get to choose...?\""
2300106-33 = "Schale House"
2300106-34 = "All you want is a home-cooked meal? Are you sure you don't want anything fancier?"
2300106-35 = "[s] \"It's not just a home-cooked meal. It's home-cooked meal that you made for me.\""
2300106-36 = "If that's what you want, Sensei. It's up to you."
2300106-37 = "All right, I'll get right on it!"
2300106-40 = "― I knew it. You've been eating frozen food again![wa:3580] "
2300106-43 = "― They're not good for you. You have to think about your health.[wa:1440] "
2300106-46 = "― Making something better won't even take long, so just wait a moment.[wa:320] "
2300106-49 = "― Seriously, Sensei. Your worst habit is the way you ignore your health.[wa:1260] "
2300106-52 = "― Huh?  You want me to cook for you every day?[wa:4360] "
2300106-54 = "― Oh, hahaha. I... If you really want me to, I don't mind...[wa:5700] "
2300106-57 = "Schale House"
2300106-58 = "Let me know if you're ever craving another home-cooked meal."
2300106-61 = "Feel free to ask as much as you want... I'll always be happy to cook for you."

[translation]
2300106-1 = "โต๊ะอาหารสำหรับคุณครูเท่านั้น!"
2300106-2 = "(หลังจากอยู่ทำงานโต้รุ่งมาหลายคืน คุณครูก็ได้รับข้อความจากฟูกะ)"
2300106-3 = "(หลังจากได้รับข้อความ คุณครูก็รีบไปหาฟูกะทันที)"
2300106-4 = "(แต่ตอนที่ไปถึงสถานที่นัดเจอ คุณครูก็หน้ามืดล้มฟุบลงไป)"
2300106-9 = "ห้องพยาบาลเลขที่ 12 สถาบันเกเฮนน่า"
2300106-10 = "คะ... คุณครู? เป็นอะไรรึเปล่าคะ?"
2300106-11 = "ฟื้นแล้วเหรอคะ? จำฉันได้รึเปล่าคะ?!"
2300106-12 = "[s] \"ฟูกะ? เกิดอะไรขึ้นเหรอ?\""
2300106-13 = "ตอนฉันมาถึงก็เจอคุณครูล้มอยู่บนพื้นแล้วค่ะ"
2300106-14 = "คุณครูห้องพยาบาลบอกว่าที่คุณครูเป็นลมก็เพราะทำงานหนักเกินไปค่ะ"
2300106-15 = "[s] \"อ่า... พอคิดดูแล้วครูยังไม่ได้นอนตั้งแต่เมื่อคืนเลยนี่นา\""
2300106-16 = "นั่น... ฉันผิดเองค่ะ"
2300106-17 = "[s] \"ไม่ใช่ความผิดของฟูกะหรอก\""
2300106-18 = "ไม่ค่ะ เป็นเพราะฉันเอง ทั้งที่คุณครูยุ่งกับงานของทางชาเล่ต์แท้ๆ"
2300106-19 = "แต่ฉันก็ยังดื้อดึงที่จะชวนคุณครูออกมากินข้าวจนคุณครูเป็นลมไปแบบนี้..."
2300106-20 = "ขอโทษนะคะ..."
2300106-21 = "[s] \"ไม่ใช่แบบนั้นเลยนะ\""
2300106-22 = "คะ...?"
2300106-23 = "[s] \"ครูชอบกินอาหารที่ฟูกะทำให้นะ\""
2300106-24 = "ทุกครั้ง..."
2300106-25 = "คุณครูพูดแบบนี้กับฉันทุกครั้งเลย..."
2300106-26 = "ระหว่างที่รอให้คุณครูฟื้น ฉันก็คิดอะไรบางอย่างได้ค่ะ"
2300106-27 = "เพราะฉันเอาแต่ใจตัวเองเลยบังคับให้คุณครูกินอาหารที่ฉันอยากให้คุณครูกินอย่างเดียวเลย"
2300106-28 = "เพราะงั้นคราวนี้ฉันจะให้คุณครูเลือกนะคะ"
2300106-29 = "คุณครูอยากกินอะไรเป็นพิเศษมั้ยคะ?"
2300106-30 = "[s] \"อาหารที่ครูอยากกินเหรอ...\""
2300106-33 = "บ้านพักของชาเล่ต์"
2300106-34 = "อยากกินอาหารที่ทำที่บ้านเหรอคะ ไม่อยากได้อะไรที่พิเศษกว่านี้เหรอคะ?"
2300106-35 = "[s] \"แค่มีฟูกะเป็นคนทำกับข้าวให้ก็พอแล้วละ\""
2300106-36 = "ถ้าคุณครูพูดแบบนั้นละก็... ฉันจะทำให้เองค่ะ"
2300106-37 = "ได้เลยค่ะ ฉันจะทำสุดฝีมือเลย!"
2300106-40 = "― คิดแล้วเชียว ทานแต่อาหารสำเร็จรูปอีกแล้วเหรอคะ?[wa:3620] "
2300106-43 = "― ไม่ได้นะคะ ต้องกินอาหารให้ถูกสุขลักษณะนะคะ[wa:2240] "
2300106-46 = "― เดี๋ยวฉันจะทำอาหารให้เอง รอสักครู่นะคะ[wa:1520] "
2300106-49 = "― จริงๆ เลยเชียว การไม่ดูแลสุขภาพตัวเองแบบนี้ จะติดเป็นนิสัยที่ไม่ดีนะคะ[wa:1260] "
2300106-52 = "― คะ? ยะ... อยากกินอาหารที่ฉันทำให้ทุกวันเหรอคะ?[wa:4280] "
2300106-54 = "― อ่า ฮะฮะฮะ... ถะ... ถ้าคุณครูโอเคละก็... ถ้างั้น ฉันจะทำให้ทานเองค่ะ...[wa:5180] "
2300106-57 = "บ้านพักของชาเล่ต์"
2300106-58 = "ต่อไปถ้าอยากกินข้าวที่บ้านล่ะก็บอกฉันได้เลยนะคะ"
2300106-61 = "ไม่ว่าเมื่อไหร่... ฉันก็จะมาทำกับข้าวให้คุณครูทานเองค่ะ"

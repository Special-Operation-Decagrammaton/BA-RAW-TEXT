[translation]
2300106-1 = "今天的餐點只為老師"
2300106-2 = "（連著好幾天徹夜處理夏萊業務的時候，收到了來自風華的聯絡）"
2300106-3 = "（收到訊息之後我馬上前往約定地點）"
2300106-4 = "（抵達目的地的瞬間，突然一陣天旋地轉）"
2300106-9 = "格黑娜學園．第12保健室"
2300106-10 = "老，老師？您還好嗎？"
2300106-11 = "您醒了嗎？認得我嗎？"
2300106-12 = "[s]「風華？呃……這是怎麼回事？」"
2300106-13 = "我看時間到了便前往約好的地點，發現老師倒在那裡。"
2300106-14 = "聽保健老師說，老師因為過勞而昏倒了。"
2300106-15 = "[s]「啊，仔細想想昨天也熬了一整晚……」"
2300106-16 = "……都是因為我。"
2300106-17 = "[s]「不是唷，沒有那種事。」"
2300106-18 = "不對，一切都是因為我……老師本來就因為夏萊的業務，忙到連睡覺的時間都沒有了……"
2300106-19 = "都怪我多管閒事，硬是叫老師出來，要老師吃我做的菜，才會變成這樣……"
2300106-20 = "對不起……"
2300106-21 = "[s]「風華，不是那樣的。」"
2300106-22 = "咦……？"
2300106-23 = "[s]「能吃到風華做的料理，我很開心。」"
2300106-24 = "老師……"
2300106-25 = "您每次都向我說這麼溫柔的話語……"
2300106-26 = "我剛剛等老師醒來時，就一直在想。"
2300106-27 = "會不會因為我的任性，讓老師被迫吃下我想讓您吃的料理。"
2300106-28 = "所以這次請老師直接告訴我。"
2300106-29 = "老師您想吃什麼東西？"
2300106-30 = "[s]「我想吃的東西……」"
2300106-33 = "夏萊．居住區"
2300106-34 = "沒想到老師會想吃家常菜……真的這樣就好嗎？"
2300106-35 = "[s]「不是普通的家常菜，我要吃風華做的家常菜。」"
2300106-36 = "既然老師都這麼說了，那好吧……"
2300106-37 = "好的，請交給我吧！"
2300106-40 = "― 我就知道是這樣……您又只吃微波食品了吧？[wa:4700] "
2300106-43 = "― 不行唷，要好好吃飯才行。[wa:3440] "
2300106-46 = "― 我馬上製作，請稍微等一下。[wa:2520] "
2300106-49 = "― 真是的，不注意健康是老師的壞習慣唷。[wa:3340] "
2300106-52 = "― 什麼？想，想要每天吃我做的料理，是嗎？[wa:5360] "
2300106-54 = "― 啊，啊哈哈……只，只要老師不介意……我當然，沒問題……[wa:6940] "
2300106-57 = "夏萊．居住區"
2300106-58 = "以後想吃家常菜的話，就請跟我說吧。"
2300106-61 = "不管多少次……我都會馬上來幫您做的。"

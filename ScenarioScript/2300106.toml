2300106-43 = "#st;[-1200,-530];serial;60;[wa:1800]― 안 돼요, [wa:1200]식사는 제대로 챙겨서 드셔야죠."
2300106-44 = "#wait;4700"
2300106-45 = "#clearST"
2300106-46 = "#st;[-1200,-530];serial;60;― 제가 금방 해드릴 테니까, [wa:2000]조금만 기다려주세요."
2300106-47 = "#wait;4700"
2300106-48 = "#clearST"
2300106-49 = "#st;[-1200,-530];serial;60;― 정말이지, [wa:1500]건강을 챙기지 않는 건 [wa:1200]선생님의 나쁜 버릇이라구요."
2300106-50 = "#wait;6000"
2300106-51 = "#clearST"
2300106-52 = "#st;[-1200,-530];serial;60;― 네? [wa:1000]매, [wa:1000]매일 제가 만드는 음식을 먹고 싶다[wa:3000]고요?"
2300106-53 = "#wait;2000"
2300106-54 = "#st;[-1200,-630];serial;60;― 아, [wa:500]아하하…… [wa:1700]서, [wa:800]선생님이 괜찮다면……. [wa:2500]저는 [wa:1000]상관은 없는데……."
2300106-55 = "#wait;4000"

[translation]
1004803-1 = "失誤"
1004803-2 = "（因為沙織傳來的MomoTalk訊息有些奇怪，因此出發去找他）"
1004803-3 = "[s] 「我記得他說會在這附近的工地……」"
1004803-7 = "[ns] 「是這裡嗎……？」"
1004803-13 = "（朝著聲音較大的方向走去後，馬上發現了沙織的身影）"
1004803-14 = "[s] 「啊，沙──！」"
1004803-15 = "我已經把今天的工作做完了，快給我薪水。"
1004803-16 = "哈哈！"
1004803-17 = "這位小姐，我不是說過很多次了，我沒辦法給你。"
1004803-18 = "……這是為什麼？"
1004803-19 = "這三天你連一毛錢都沒有給我，這跟之前銀行介紹我這份工作時說的完全不一樣。"
1004803-20 = "就算你這樣說，不行就是不行。"
1004803-21 = "而且說到底……"
1004803-25 = "你連合約都沒簽吧？"
1004803-26 = "……！"
1004803-27 = "[s] 「等，等等！我剛才好像聽到了什麼很重要的話！？」"
1004803-31 = "老師？你怎麼會在這裡……"
1004803-32 = "嗯？你是哪位？"
1004803-33 = "閒雜人等少管閒事，趕緊滾一邊去吧。"
1004803-34 = "[s] 「我才不是閒雜人等！你說他沒簽合約是怎麼回事！？」"
1004803-35 = "還能是什麼意思……就是字面上的意思啊。"
1004803-36 = "合約……"
1004803-37 = "[s] 「看吧！沙織也這麼說了，肯定只是有什麼誤會而已……」"
1004803-38 = "……一定要簽合約才能工作嗎？"
1004803-39 = "[s] 「……嗯？」"
1004803-40 = "哈哈哈哈！真是個奇葩啊！"
1004803-41 = "雖然不知道你是怎麼淪落到這裡的……"
1004803-42 = "但居然是這麼一個不食人間煙火的小姑娘啊！"
1004803-43 = "[s] 「那，那個，先整理一下情況吧。」"
1004803-45 = "（聽完兩人的說明之後，總算是明白了整件事的經過）"
1004803-48 = "[ns1] 「黑市介紹你來這邊工作，」\n[ns2] 「但當下沒給你簽合約書……？」"
1004803-49 = "我接下這項任務時，對方並沒有特別提到合約的部分。"
1004803-50 = "我接下這項任務時，對方並沒有特別提到合約的部分。"
1004803-51 = "我只是照吩咐進行作業……"
1004803-52 = "老師？"
1004803-53 = "[ns] 「這根本是詐騙！我要抗議！」"
1004803-56 = "哈，詐騙？說的好像我是壞人似的。"
1004803-57 = "追根究柢不都要怪那個小姑娘自己「忘記」簽合約嗎？"
1004803-58 = "我沒有義務要替這種事承擔責任吧？"
1004803-59 = "[s] 「那沙織到目前為止做的工作……！」"
1004803-60 = "咯咯咯，就當成是做義工囉。"
1004803-66 = "哎呀～真是幫了大忙呢，沒想到他體力這麼好。"
1004803-67 = "做了比一般人還多一倍的工作量呢。"
1004803-68 = "多虧有他在，我們的工作進度才能加快這麼多，還省下了不少錢呢！哈哈哈！"
1004803-73 = "……"
1004803-74 = "[s] 「滿嘴歪理……！」"
1004803-75 = "不過兩位也別把我想得那麼壞。"
1004803-76 = "要現在把約簽好，付他薪水也不是不行哦？"
1004803-77 = "[s] 「你的意思是……！」"
1004803-78 = "當然，我也只能給簽完「之後」的薪水。"
1004803-79 = "……"
1004803-80 = "哈哈，總不能要我連之前的薪水也一起付吧。#n難得來做義工，我怎麼能辜負他的一片好意呢！"
1004803-81 = "只要你幫忙搬走這邊剩下的建材，我就給你這部分的錢……怎麼樣？"
1004803-85 = "如果不要的話，我也不會勉強。"
1004803-86 = "但相對的，你今天就真的一毛錢也拿不到囉！哈哈哈！"
1004803-87 = "[s] 「你竟然還敢……」"
1004803-88 = "我知道了。"
1004803-89 = "[s] 「沙織！？」"
1004803-90 = "我確實需要錢，也只能做了。"
1004803-91 = "哈哈，態度挺不錯的嘛！小姑娘如此踏實，跟黑市可說是格格不入呢！"
1004803-96 = "[ns] 「……！」"
1004803-103 = "怎，怎麼！？"
1004803-104 = "想打架啊！？"
1004803-108 = "[ns] 「我也來幫忙吧。」"
1004803-111 = "啊？為什麼連你也要……？"
1004803-112 = "[s] 「兩個人一起做比較快。」"
1004803-116 = "隨，隨你們高興！"
1004803-117 = "不過我只會付一人份的薪水！"
1004803-128 = "嘖，竟然真的全都搬完了……"
1004803-129 = "拿去，這是說好的報酬！"
1004803-135 = "嗯，確實收到了。"
1004803-140 = "[ns] 「這筆錢真是得來不易呢……」"
1004803-141 = "……對不起。老師。"
1004803-142 = "[s] 「嗯？」"
1004803-143 = "都是我的錯。"
1004803-144 = "原來合約是這麼重要的東西。"
1004803-145 = "[s] 「嗯，合約是很重要的……這次就當是學個經驗吧。」"
1004803-146 = "好……"
1004803-147 = "我以後會牢記這點，不犯同樣的錯誤。"
1004803-148 = "……今天很謝謝你，老師。"
1004803-149 = "[s] 「沙織向我道了謝！真是個好日子！」"
1004803-153 = "……既然工作已經結束，我也差不多該回去了。"
1004803-154 = "[s] 「嗯，下次見，沙織。」"
1004803-155 = "…………"
1004803-156 = "嗯。"

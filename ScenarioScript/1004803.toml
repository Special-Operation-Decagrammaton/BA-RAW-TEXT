[translation]
1004803-1 = "A Mistake"
1004803-2 = "I was concerned about my messages with Saori, so I decided to go see her in person."
1004803-3 = "[s] \"I heard she was working at a construction site around here.\""
1004803-7 = "[ns] \"This way?\""
1004803-13 = "I followed the sound of machinery and pounding, I found Saori."
1004803-14 = "[s] \"Oh, Sao—\""
1004803-15 = "I did the work. Pay me."
1004803-16 = "Hahaha!"
1004803-17 = "I told you, lady. I can't!"
1004803-18 = "Why not?"
1004803-19 = "I haven't been paid for three days. This isn't what I was promised."
1004803-20 = "Promises don't mean anything around here."
1004803-21 = "And unfortunately for you..."
1004803-25 = "You didn't even sign a contract. "
1004803-26 = "...!"
1004803-27 = "[s] \"Wait, wait. What did I just hear?\""
1004803-31 = "Sensei? What are you doing here?"
1004803-32 = "Who the hell is this?"
1004803-33 = "I have no business with you. Get lost!"
1004803-34 = "[s] \"I have business with you! What was that about a contract?\""
1004803-35 = "Exactly what I said."
1004803-36 = "A contract..."
1004803-37 = "[s] \"Look, according to what Saori said, there must be a misunderstanding...\""
1004803-38 = "Did I have to...sign a contract?"
1004803-39 = "[s] \"Huh?\""
1004803-40 = "Hahaha! This is incredible!"
1004803-41 = "I don't know how you ended up in the Black Market..."
1004803-42 = "But you really have no clue about how the world works. This like a real-life comedy!"
1004803-43 = "[s] \"W-Wait! Let me get this straight.\""
1004803-45 = "Through Saori's explanation, I was able to figure out the situation."
1004803-48 = "[ns1] \"You found a job, but never signed a contract?!\"\n[ns2] \"You haven't been paid for three days?!\""
1004803-49 = "They didn't ask me to sign a contract when I started the job."
1004803-50 = "They didn't ask me to sign a contract when I started the job."
1004803-51 = "I just did the work they asked me to do..."
1004803-52 = "Sensei?"
1004803-53 = "[ns] \"You got scammed! I won't let this slide.\""
1004803-56 = "Hmph! A scam? Don't try to make us sound bad."
1004803-57 = "She's the one who forgot to sign a contract!"
1004803-58 = "Since she didn't sign it, we're not obligated to pay her."
1004803-59 = "[s] \"Then what about the work Saori did up until now...?!\""
1004803-60 = "Tsk! I guess it was volunteer work."
1004803-66 = "Well, it was quite helpful."
1004803-67 = "She's stronger than she looks. She's done twice as much work as the others."
1004803-68 = "Haha! Thanks to that, we got the work done cheap, which we're grateful for!"
1004803-73 = "..."
1004803-74 = "[s] \"That's unfair...\""
1004803-75 = "Well, I'm not that mean though."
1004803-76 = "I can get you a contract now and pay you."
1004803-77 = "[s] \"Yes. Do that. Now.\""
1004803-78 = "But all I can give you is money for moving the construction materials that are left here."
1004803-79 = "..."
1004803-80 = "Ahaha! I can't pay you for volunteer work! That would be an insult to the spirit of your service!"
1004803-81 = "So, do you wanna do the rest of the work and get some money?"
1004803-85 = "You don't have to if you don't want to."
1004803-86 = "But that means you won't get any money today. Tsk, tsk!"
1004803-87 = "[s] \"You're absolute scum.\""
1004803-88 = "Affirmative."
1004803-89 = "[s] \"Saori?!\""
1004803-90 = "I need the money. I have to do it."
1004803-91 = "Hahaha! I like that attitude! It's hard to come by hard-working people in the Black Market!"
1004803-96 = "[ns] \"...\""
1004803-103 = "O-Oh?!"
1004803-104 = "Wh-What?! Huh? A-A-Are you gonna hit me or something...?"
1004803-108 = "[ns] \"I'll help.\""
1004803-111 = "Sensei? You don't have to..."
1004803-112 = "[s] \"It'll get done faster if we both do it.\""
1004803-116 = "Well, wh-whatever you want!"
1004803-117 = "But I'm only paying the girl, okay?!"
1004803-128 = "Ugh. That should be everything."
1004803-129 = "Here's the pay for today, as promised!"
1004803-135 = "Look. I really got paid!"
1004803-140 = "[ns] \"You worked hard for it, Saori.\""
1004803-141 = "...Sorry, Sensei."
1004803-142 = "[s] \"Huh?\""
1004803-143 = "This is my fault..."
1004803-144 = "I didn't know how important contracts were..."
1004803-145 = "[s] \"How could you have known? You're still learning.\""
1004803-146 = "I guess..."
1004803-147 = "I'll make sure something like this never happens again."
1004803-148 = "Thank you for today, Sensei."
1004803-149 = "[s] \"Oh! A precious thank you from Saori!\""
1004803-153 = "...If we're all done here, I'm gonna head back."
1004803-154 = "[s] \"Stay safe, Saori.\""
1004803-155 = "..."
1004803-156 = "I will."

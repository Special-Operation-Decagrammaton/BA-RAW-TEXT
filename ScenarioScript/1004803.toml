[translation]
1004803-1 = "ความผิดพลาด"
1004803-2 = "(หลังจากเห็นข้อความที่ซาโอริส่งมา คุณครูรู้สึกสังหรณ์ใจบางอย่าง เลยใช้โอกาสนี้ไปหาซาโอริ)"
1004803-3 = "[s] \"ได้ยินว่าทำงานใกล้ๆ ไซต์งานก่อสร้างที่นี่นี่นา\""
1004803-7 = "[ns] \"ทางนี้รึเปล่านะ?\""
1004803-13 = "(คุณครูเดินไปตามทางที่ได้ยินเสียง และก็ได้เจอกับซาโอริที่นั่น)"
1004803-14 = "[s] \"อ๊ะ ซาโอ---\""
1004803-15 = "ฉันทำงานของวันนี้เสร็จแล้ว จ่ายค่าจ้างมาได้แล้ว"
1004803-16 = "หึหึหึ...!"
1004803-17 = "นี่ เด็กน้อย ฉันพูดไปตั้งหลายครั้งแล้วไงว่าจ่ายให้ไม่ได้น่ะ"
1004803-18 = "ทำไมล่ะ...?"
1004803-19 = "ฉันไม่ได้ค่าจ้างมาสามวันแล้วนะ แบบนี้มันต่างจากที่สัญญาไว้นี่นา"
1004803-20 = "ที่นี่น่ะ สัญญาไม่มีความหมายอะไรหรอก"
1004803-21 = "แล้วอีกอย่าง..."
1004803-25 = "เธอไม่ได้เซ็นสัญญาจ้างงานไว้สักหน่อยนี่?"
1004803-26 = "...!"
1004803-27 = "[s] \"เดี๋ยวๆ นี่มันเรื่องอะไรกันน่ะ!\""
1004803-31 = "คุณครู...? ทำไมถึงมาอยู่ที่นี่ล่ะ?"
1004803-32 = "หืม? คุณเป็นใคร?"
1004803-33 = "คนที่ไม่ได้เกี่ยวข้อง อย่าเข้ามาวุ่นวายจะดีกว่านะ"
1004803-34 = "[s] \"ต้องเกี่ยวอยู่แล้ว! หมายความว่าไงที่ว่าไม่ได้เซ็นสัญญาน่ะ?\""
1004803-35 = "ก็ตามที่บอกนั่นแหละ"
1004803-36 = "สัญญางั้นเหรอ..."
1004803-37 = "[s] \"ดูสิ ซาโอริไม่เห็นรู้เรื่องเลย ต้องเข้าใจอะไรผิดกันแน่ๆ\""
1004803-38 = "ต้องเซ็นสัญญา... ด้วยเหรอ?"
1004803-39 = "[s] \"หืม...?\""
1004803-40 = "ฮ่าๆๆ เหลือเชื่อเลย!"
1004803-41 = "ฉันไม่รู้หรอกนะว่าเธอมาอยู่ที่ตลาดมืดได้ยังไง"
1004803-42 = "แต่เด็กที่ไม่รู้จักโลกอย่างเธอน่ะ น่าตลกสิ้นดี!"
1004803-43 = "[s] \"ดะ...เดี๋ยวก่อน ขอครูทำความเข้าใจสถานการณ์ก่อน\""
1004803-45 = "(หลังจากฟังคำอธิบายของซาโอริ คุณครูก็พอเข้าใจสถานการณ์ที่เกิดขึ้น)"
1004803-48 = "[ns1] \"ได้รับการว่าจ้างงาน แต่ไม่เคยเซ็นสัญญา?\"\n[ns2] \"ไม่ได้เซ็นสัญญา แล้วก็ไม่ได้ค่าจ้างมาสามวันแล้วด้วย?\""
1004803-49 = "พวกเขาไม่เคยพูดถึงเรื่องเซ็นสัญญาเลย"
1004803-50 = "ตั้งแต่ตอนเริ่มงาน ก็ไม่ได้มีพูดถึงเรื่องเซ็นสัญญาเลยนี่"
1004803-51 = "ฉันแค่ทำตามที่เขาบอกเท่านั้น..."
1004803-52 = "คุณครู?"
1004803-53 = "[ns] \"นี่มันหลอกลวงกันชัดๆ แบบนี้ยอมไม่ได้!\""
1004803-56 = "ฮึ่ม! หลอกลวงงั้นเหรอ อย่าพูดให้เราดูแย่สิ"
1004803-57 = "ปัญหาทุกอย่างก็เกิดขึ้นเพราะเด็กน้อยคนนั้น \"ลืม\" เซ็นสัญญาไม่ใช่รึไง?"
1004803-58 = "ในเมื่อไม่ได้เซ็นสัญญา พวกเราก็ไม่ต้องจ่ายเงินไง"
1004803-59 = "[s] \"ถ้างั้นที่ซาโอริทำไปจนถึงตอนนี้ล่ะ...!\""
1004803-60 = "ฮ่าๆๆ ก็เป็นงานฟรีที่ไม่ได้เงินไงละ"
1004803-66 = "อ๋อ~ เธอช่วยได้มากทีเดียวเลย~"
1004803-67 = "เธอแรงเยอะกว่าที่ฉันคิดไว้ แถมทำงานได้มากกว่าคนอื่นตั้งสองเท่า"
1004803-68 = "ฮ่าๆๆ ขอบคุณนะที่ช่วยทำให้งานฉันเสร็จเร็วและประหยัดขึ้นตั้งเยอะ!"
1004803-73 = "..."
1004803-74 = "[s] \"ไม่ยุติธรรมเลย...\""
1004803-75 = "แหมๆ ฉันเองก็ไม่ใช่คนเลวร้ายอะไรหรอกนะ"
1004803-76 = "แต่เธอเองก็ควรรู้ว่าจะต้องเซ็นสัญญาก่อนรับงานสิ"
1004803-77 = "[s] \"ถ้างั้นก็เซ็นสัญญาตอนนี้เลยสิ...!\""
1004803-78 = "ฉันคงให้ได้แค่เงินค่าขนย้ายวัสดุก่อสร้างที่เหลือเท่านั้นละนะ"
1004803-79 = "..."
1004803-80 = "ฮะฮะฮะ! ฉันไม่จ่ายค่าจ้างในส่วนที่เป็นงาน \"ฟรี\" ให้หรอก! เดี๋ยวจิตใจที่คิดทำงานอาสาของเธอจะแปดเปื้อนเอา!"
1004803-81 = "ถ้างั้นก็รีบทำงานที่เหลือให้เสร็จ แล้วไปหางานเล็กๆ น้อยๆ ที่อื่นทำดีกว่านะ?"
1004803-85 = "อ๋อ ถ้าไม่อยากทำก็ไม่เป็นไรนะ"
1004803-86 = "แต่วันนี้ก็คงไม่ได้เงินสักเหรียญเดียวหรอกนะ ฮ่าๆๆ"
1004803-87 = "[s] \"พวกนักต้มตุ๋นชัดๆ...\""
1004803-88 = "เข้าใจแล้ว"
1004803-89 = "[s] \"ซาโอริ?!\""
1004803-90 = "ฉันต้องการเงินเพื่อให้อยู่รอดถึงพรุ่งนี้ คงไม่มีทางเลือกนอกจากต้องทำละนะ"
1004803-91 = "ฮ่าๆ สุดยอด! ดูพร้อมทำงานดีมาก! เป็นเด็กที่หายากในตลาดมืดจริงๆ!"
1004803-96 = "[ns] \"...!\""
1004803-103 = "นะ...นี่?!"
1004803-104 = "คะ...คิดจะทำอะไรน่ะ...!"
1004803-108 = "[ns] \"เดี๋ยวครูช่วยเอง\""
1004803-111 = "คุณครู? ไม่ต้องก็ได้นะ..."
1004803-112 = "[s] \"ช่วยกันทำงานสองคนจะได้เสร็จเร็วๆ ไง\""
1004803-116 = "จะ...จะทำอะไรก็เชิญเลย!"
1004803-117 = "แต่ว่าฉันจะจ่ายเงินให้เฉพาะส่วนของเด็กผู้หญิงนั่นนะ!"
1004803-128 = "อื้อ ย้ายเสร็จแล้วงั้นเหรอ..."
1004803-129 = "เอ้า ค่าจ้างตามสัญญา!"
1004803-135 = "ดูสิ ฉันได้ค่าจ้างแล้วละ"
1004803-140 = "[ns] \"เหนื่อยมาทั้งวันเลยน้า\""
1004803-141 = "ขอโทษนะ คุณครู..."
1004803-142 = "[s] \"หืม?\""
1004803-143 = "ที่ต้องมาเหนื่อยเพราะฉัน... ฉันผิดเองแหละ"
1004803-144 = "สัญญาจ้างงั้นเหรอ เป็นของสำคัญสินะ"
1004803-145 = "[s] \"อื้อ สัญญาจ้างเป็นเรื่องสำคัญจริงๆ นะ ดีแล้วจะได้รู้ไว้\""
1004803-146 = "งั้นเหรอ..."
1004803-147 = "ฉันจะจำไว้ ไม่ให้เกิดเรื่องแบบนี้อีก"
1004803-148 = "วันนี้ขอบคุณมากนะ... คุณครู"
1004803-149 = "[s] \"โอ๊ย น้ำตาจะไหล ซาโอริขอบคุณครูด้วย!\""
1004803-153 = "ถ้าเสร็จงานแล้ว ฉันกลับล่ะนะ..."
1004803-154 = "[s] \"อื้อ ไว้เจอกันนะ ซาโอริ\""
1004803-155 = "..."
1004803-156 = "อืม"

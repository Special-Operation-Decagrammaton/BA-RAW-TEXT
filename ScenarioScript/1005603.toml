[translation]
1005603-1 = "A Gift Prepared in Earnest"
1005603-6 = "It was a snowy day."
1005603-10 = "Schale Executive Office"
1005603-14 = "I finished work and was about to take a break when I thought I saw someone familiar."
1005603-18 = "[s] \"Serina?\""
1005603-19 = "*rustle* *rustle*"
1005603-24 = "[ns] \"Serina...?\""
1005603-25 = "S-Serina isn't here!"
1005603-29 = "[ns1] \"I see. There's no Serina here.\" \n[ns2] \"So what's Serina doing here, then?\""
1005603-40 = "Ugh..."
1005603-41 = "Don't tease me, Sensei!"
1005603-42 = "[s] \"Sorry, sorry.\""
1005603-43 = "It took a lot of courage for me to come here, you know..."
1005603-44 = "I'm welcome anytime? I know...but this time was different."
1005603-45 = "I...I'm sorry I never repaid you for the scarf you gave me."
1005603-46 = "[s] \"It was a gift. You don't need to repay me.\""
1005603-47 = "Y-You don't understand! It was a very big deal."
1005603-48 = "Even if it was a gift... I can't just accept it..."
1005603-49 = "So please let me repay you for it!"
1005603-50 = "I couldn't say no to Serina and ended up going along with her."
1005603-53 = "La dee da dee da!"
1005603-54 = "This is the gift I prepared as repayment!"
1005603-55 = "[s] \"You got me a gift?\""
1005603-56 = "It's the Remedial Knights' comprehensive health package!"
1005603-57 = "A first aid kit, wet wipes, cooling patches, and supplements!"
1005603-58 = "It's a special version made just for you, so you'll never be caught off guard by a medical emergency."
1005603-59 = "[s] \"That's...so serious...\""
1005603-60 = "Naturally! Your health is a very serious thing, Sensei."
1005603-61 = "You never take care of yourself."
1005603-62 = "I can't rest easy not knowing if you're in good health or not."
1005603-63 = "[s] \"I'll be more mindful, then...\""
1005603-64 = "Yes! Thank you! Now, please lie down here."
1005603-65 = "[s] \"Wh-What...? Why?\""
1005603-66 = "It's a part of your gift! It's the last step of the Remedial Knights comprehensive health package."
1005603-67 = "Your package is only complete with Serina's special acupressure massage."
1005603-68 = "Okay, please lie down. You can take off your shirt."
1005603-69 = "Hurry! We're running out of time for treatment!"
1005603-70 = "All prescriptions and treatments have a golden timing you must apply it within."
1005603-71 = "I can never say no to Serina, so I laid down on my stomach on the couch."
1005603-73 = "Okay, I'll begin the acupressure."
1005603-81 = "How does it feel here?"
1005603-82 = "Sensei, your back is so tense with so many knots. You need to stretch if you're going to be sitting at a desk all day."
1005603-88 = "It's painful? That just means the acupressure is working. Please endure it for a little while."
1005603-89 = "I know it's painful, but it also feels good as well, doesn't it? The pain is just a means to an end."
1005603-90 = "Okay, okay! Just a little more. I'm nearly done, just a little pressure over here..."
1005603-91 = "Sensei! You mustn't squirm like that, please. Keep your shoulders still."
1005603-92 = "I wriggled in pain as I received Serina's special acupressure massage..."
1005603-93 = "Serina seemed to be enjoying it a little too much."
1005603-95 = "How are you feeling now, Sensei? Is it a bit better?"
1005603-96 = "[s] \"Actually, yeah. My back is much better now.\""
1005603-97 = "Wonderful! The next time you're feeling stiff, you can call me again."
1005603-98 = "Promise me you will, okay?"
1005603-99 = "[s] \"I feel bad you did all the work. I need to pay you back now.\""
1005603-100 = "The way you can pay me back is by relaxing and taking care of your body."
1005603-101 = "Your problems are my problems, Sensei."

1005603-55 = "[s] \"선물은~?\""
1005603-56 = "5;세리나 산타ND;03;바로! 구호기사단 종합 건강 세트랍니다!\n#5;m3\n#5;hophop\n#5;em;[반짝]"
1005603-57 = "#5;hide\n3;세리나 산타ND;00;구급상자, 구급약, 물수건, 파스, 영양제까지!"
1005603-58 = "3;세리나 산타ND;00;언제, 어느 때라도 모든 사태에 대처할 수 있도록 준비한 선물이에요!\n#3;em;[재잘]"

1005603-44 = "3;세리나 산타ND;04;언제든 편하게 오면 된다구요? 하지만 이번만큼은 그럴 수 없었어요……"
1005603-45 = "3;세리나 산타ND;06;그때 주신 목도리의 보답도 제대로 해 드리지 못한 걸요……"
1005603-46 = "[s] \"아니, 그 목도리라면 편하게 그냥 써도 되니까.\""
1005603-47 = "3;세리나 산타ND;04;안 돼요! 모, 모처럼 선생님께서 주신 건데요.\n#3;em;[!]\n#3;hophop"
1005603-48 = "3;세리나 산타ND;06;선생님이 괜찮다고 하셔도…… 제가 그럴 수 없단 말이에요……"
1005603-49 = "3;세리나 산타ND;05;그러니까 그 보답! 확실히 할 수 있도록 허락해 주세요!\n#3;closeup\n#3;em;[반응]\n#3;a"
1005603-50 = "#na;(세리나의 기세에 밀려, 그렇게 해 달라고 이쪽에서 부탁하게 되었다……)"

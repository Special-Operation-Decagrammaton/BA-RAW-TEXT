[translation]
1005603-1 = "ของขวัญที่เตรียมมาจริงๆ"
1005603-6 = "(ในวันที่หิมะโปรยปราย)"
1005603-10 = "สำนักงานชาเล่ต์"
1005603-14 = "(ระหว่างที่นอนเล่นอยู่หลังจากทำงานเสร็จ คุณครูก็รู้สึกคุ้นๆ แปลกๆ)"
1005603-18 = "[ns] \"เซรินะ?\""
1005603-19 = "(กรอบแกรบๆ)"
1005603-24 = "[ns] \"เซรินะ...?\""
1005603-25 = "ตรงนี้ไม่มีคนชื่อเซรินะหรอกค่ะ!"
1005603-29 = "[ns1] \"งั้นเองเหรอ เซรินะที่ไม่ได้ชื่อเซรินะ\"\n[ns2] \"แล้วเซรินะที่ไม่ได้ชื่อเซรินะมาทำอะไรที่นี่เหรอ?\""
1005603-40 = "งือ..."
1005603-41 = "อย่าล้อกันเล่นขนาดนี้สิคะ..."
1005603-42 = "[s] \"ขอโทษๆ\""
1005603-43 = "ฉันอุตส่าห์ตั้งใจมาหาทั้งที..."
1005603-44 = "ให้ฉันมาเที่ยวเล่นได้ตลอดงั้นเหรอคะ? ฉันจะมาแบบสบายๆ ได้ไงล่ะคะ..."
1005603-45 = "ฉันยังไม่ได้ตอบแทนที่คุณครูให้ผ้าพันคอฉันคราวก่อนเลยค่ะ..."
1005603-46 = "[s] \"ผ้าผืนนั้นเอาไว้ใช้ตามสบายได้เลย\""
1005603-47 = "ไม่ได้หรอกค่ะ! นะ... นั่นเป็นของที่คุณครูอุตส่าห์ให้มาทั้งที"
1005603-48 = "ถึงคุณครูจะบอกว่าไม่เป็นไร... แต่ฉันก็เอามาใช้ตามใจไม่ได้หรอกค่ะ..."
1005603-49 = "อีกอย่าง ฉันต้องตอบแทนคุณครูด้วย! อนุญาตให้ฉันตอบแทนด้วยเถอะนะคะ!"
1005603-50 = "(หลังจากโดนเซรินะกดดัน คุณครูก็ยอมให้เธอทำอะไรเป็นการตอบแทน...)"
1005603-53 = "ฮุ~ ฮุฮุ~"
1005603-54 = "และของขวัญที่ฉันเตรียมมาก็คือ!"
1005603-55 = "[s] \"ก็คือ~?\""
1005603-56 = "ก็คือ! ชุดดูแลสุขภาพของชมรมอัศวินบรรเทาทุกข์ค่ะ!"
1005603-57 = "มีทั้งชุดปฐมพยาบาล ยาสามัญประจำบ้าน ผ้าเช็ดตัว แผ่นแปะแก้ปวด แล้วก็อาหารเสริมเลยค่ะ!"
1005603-58 = "และนี่คือของขวัญที่ฉันเตรียมมาเพื่อให้คุณครูรับมือกับทุกสถานการณ์ได้ทุกเมื่อค่ะ!"
1005603-59 = "[s] \"ทำไมมันดู... จริงจังมากเลย...\""
1005603-60 = "แน่นอนอยู่แล้วค่ะ! นี่ก็เป็นการทำเพื่อคุณครูนี่คะ!"
1005603-61 = "ก็ปกติคุณครูไม่ค่อยดูแลตัวเองเลย..."
1005603-62 = "ฉันก็แค่อยากให้คุณครูมีสุขภาพดีค่ะ..."
1005603-63 = "[s] \"ต่อไปครูจะดูแลตัวเองนะ...\""
1005603-64 = "ค่ะ! ต้องอย่างนี้สิคะ! ถ้างั้นก็มานอนตรงนี้เลยค่ะ"
1005603-65 = "[s] \"หืม...??\""
1005603-66 = "อยากรู้เหตุผลเหรอคะ? ก็เพื่อทำให้ชุดดูแลสุขภาพของชมรมอัศวินบรรเทาทุกข์สมบูรณ์ไงล่ะคะ"
1005603-67 = "ชุดดูแลสุขภาพนี้จะสมบูรณ์ได้หากมีการนวดกดจุดของเซรินะรวมอยู่ด้วยค่ะ"
1005603-68 = "เอาละ มานอนเร็วเข้าค่ะ ถ้าจำเป็นก็ถอดเสื้อด้วยนะคะ"
1005603-69 = "เร็วสิคะ! ถ้ายังชักช้าแบบนี้ เดี๋ยวเวลาปฐมพยาบาลจะคลาดเคลื่อนเอานะคะ!"
1005603-70 = "ในทุกการบำบัดรักษา ทุกวินาทีสำคัญนะคะ!"
1005603-71 = "(คุณครูไม่อาจทนต่อแรงกดดันจากเซรินะได้ จึงยอมนอนคว่ำลงบนโซฟา...)"
1005603-73 = "เอาละค่ะ ฉันจะเริ่มนวดกดจุดแล้วนะคะ"
1005603-81 = "ตรงนี้รู้สึกยังไงบ้างคะ?"
1005603-82 = "โห... จับเป็นก้อนแข็งเลยค่ะ ต่อไปช่วยยืดเหยียดกล้ามเนื้อบ่อยๆ ด้วยนะคะ"
1005603-88 = "เจ็บเหรอคะ? ถ้าเจ็บก็แปลว่าเส้นกำลังคลายตัวดีเลยค่ะ ทนอีกนิดนะคะ!"
1005603-89 = "เป็นไงคะ สบายตัวใช่มั้ยคะ? สบายตัวแต่เจ็บงั้นเหรอคะ? เดี๋ยวความเจ็บก็หายไป แล้วจะเหลือแต่ความสบายตัวค่ะ"
1005603-90 = "เอาละๆ ทนต่ออีกนิดเดียวนะคะ! เดี๋ยวก็เสร็จแล้วค่ะ! เหลือแค่นวดๆ ตรงนี้ แล้วก็ตรงนี้ด้วย..."
1005603-91 = "คนไข้คะ! ไม่สิ คุณครูคะ! อย่าขยับไหล่สิคะ!"
1005603-92 = "(หลังจากนั้นคุณครูก็ดิ้น(?)ไปมาเพราะเจ็บ และรับการนวดกดจุดชุดพิเศษจากเซรินะจนจบคอร์ส)"
1005603-93 = "(ส่วนเซรินะก็ดูเบิกบานใจเป็นพิเศษ...)"
1005603-95 = "เป็นไงบ้างคะคุณครู? รู้สึกดีขึ้นมั้ยคะ?"
1005603-96 = "[s] \"เบาตัวขึ้นมากเลย\""
1005603-97 = "โล่งอกไปทีค่ะ ต่อไปถ้าร่างกายปวดเมื่อยหรือล้าก็เรียกฉันนะคะ"
1005603-98 = "ห้ามเก็บไว้คนเดียวนะ?"
1005603-99 = "[s] \"เซรินะทำให้ครูมากถึงขนาดนี้ ครูรู้สึกขอโทษเลยที่ไม่ได้ทำอะไรให้\""
1005603-100 = "เรื่องนั้นไม่ต้องเป็นห่วงหรอกค่ะ ขอแค่คุณครูไม่หักโหมและดูแลตัวเองก็พอ"
1005603-101 = "เพราะถ้ามีเรื่องไหนที่คุณครูลำบากกายหรือใจ ก็เป็นหน้าที่ของฉันเหมือนกันค่ะ"

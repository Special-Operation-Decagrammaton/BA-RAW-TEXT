[translation]
1005603-1 = "圍巾的回禮"
1005603-6 = "（是個下雪的日子）"
1005603-10 = "夏萊．辦公室"
1005603-14 = "（正當我完成工作，打算悠哉一下的時候，總覺得有股熟悉的感覺……）"
1005603-18 = "[ns]「……」"
1005603-19 = "（窸窸窣窣）"
1005603-24 = "[ns]「……芹奈？」"
1005603-25 = "不，不是！"
1005603-29 = "[ns1]「這樣啊。但是是芹奈的聲音啊。」\n[ns2]「話說發出芹奈聲音的那位，來這裡有什麼事……？」"
1005603-40 = "嗚……"
1005603-41 = "被發現了嗎……"
1005603-42 = "[s]「這個嘛……」"
1005603-43 = "唔，雖然鼓起幹勁過來了……"
1005603-44 = "希望我能輕鬆一點過來……？#n那，那還稍微有點困難……"
1005603-45 = "那時收到了圍巾，#n也還沒好好回禮……"
1005603-46 = "[s]「圍巾的事，完全不用介意的……」"
1005603-47 = "不行！這，這可是難得從老師手上收到的。"
1005603-48 = "就算老師說沒關係，也不能就這麼算了！"
1005603-49 = "所以，請讓我好好地回禮！"
1005603-50 = "（被芹奈的氣勢壓倒了）"
1005603-53 = "呵呵♪"
1005603-54 = "所以，我準備的禮物是！"
1005603-55 = "[s]「禮物是～？」"
1005603-56 = "救護騎士團特製，全身健康組合！"
1005603-57 = "從急救藥品到毛巾，貼布到營養劑都有！"
1005603-58 = "是無論何時、#n無論什麼樣的狀況都能應對的東西！"
1005603-59 = "[s]「哦哦，是認真的……」"
1005603-60 = "我想老師會需要這些的！"
1005603-61 = "老師平時總是把自己的事情留到最後才考慮……"
1005603-62 = "儘管如此，我還是希望老師能健健康康的……"
1005603-63 = "[s]「我，我會注意的……」"
1005603-64 = "嗯！那就拜託了！接下來，請躺在那裡吧。"
1005603-65 = "[s]「……？」"
1005603-66 = "只靠這個全身健康組合的話，還不夠完善。"
1005603-67 = "要再加上我的特別指壓按摩才行。"
1005603-68 = "來，請躺下吧。啊，也請把上衣脫掉哦。"
1005603-69 = "不用想太多，請吧！"
1005603-70 = "對處方和治療來說，速度就是命！"
1005603-71 = "（敵不過芹奈的氣勢，只好照她所說趴在沙發上）"
1005603-73 = "那麼，要開始指壓了哦。"
1005603-81 = "這附近感覺怎麼樣？啊，真僵硬呢～"
1005603-82 = "平時不多做點伸展運動可不行唷？"
1005603-88 = "會痛就是指壓有效的證據。#n我會注意別用力過猛的，請再忍耐一下。"
1005603-89 = "覺得怎麼樣啊？……很舒服但很痛？#n別擔心，之後就會越來越舒服了！"
1005603-90 = "就快結束了哦～#n這裡再稍微……！"
1005603-91 = "肩膀不可以亂動唷～"
1005603-92 = "（之後，一邊忍受著痛苦（？）一邊接受芹奈的特製指壓按摩……）"
1005603-93 = "（按摩中的芹奈，感覺似乎特別開心）"
1005603-95 = "覺得如何，老師？#n有沒有覺得舒服一點？"
1005603-96 = "[s]「嗯，感覺身體都變輕了。」"
1005603-97 = "那真是太好了。#n之後如果覺得疲累的話，隨時都可以連絡我哦。"
1005603-98 = "不用客氣唷！"
1005603-99 = "[s]「好像還是跟往常一樣，總是接受芹奈的好意呢。」"
1005603-100 = "沒有那種事唷。#n而且，我真心希望老師能更有活力……"
1005603-101 = "老師能健健康康的，對我來說也是件值得高興的事呀。"

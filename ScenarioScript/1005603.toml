1005603-60 = "3;세리나 산타ND;03;당연하죠. 이것도 다 선생님을 위한 일인걸요.\n#3;em;[음표]\n#3;greeting"
1005603-61 = "3;세리나 산타ND;07;선생님께서 평소에 너무 몸을 안 돌보시니까……"
1005603-62 = "3;세리나 산타ND;07;전 그저 선생님께서 건강하시기만 하면 되는데요……"
1005603-63 = "[s] \"앞으로는 조심하겠습니다……\""
1005603-64 = "3;세리나 산타ND;03;네! 잘 말해 주셨어요! 그러면 이제 여기에 누워 주세요.\n#3;greeting"
1005603-65 = "[s] \"네……??\""
1005603-66 = "3;세리나 산타ND;02;어째서냐구요? 그야 이 구호기사단 종합 건강 세트를 완성하기 위해서죠."
1005603-67 = "3;세리나 산타ND;00;이 세트는 세리나 특제 지압 마사지가 있어야 비로소 완전해지거든요."
1005603-68 = "3;세리나 산타ND;03;자, 어서 누워 주세요. 필요하다면 상의도 벗어 주시고요.\n#3;closeup\n#3;em;[반응]\n#3;a"

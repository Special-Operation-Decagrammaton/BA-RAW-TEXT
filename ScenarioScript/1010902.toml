1010902-42 = "3;노아 파자마;01\n#3;a\n#wait;1000"
1010902-43 = "[ns] \"저기, 노아……\""
1010902-44 = "3;노아 파자마;02;아, 그러고 보니 손님용 의자를 내오는 걸 깜박했네요.\n#3;em;[반응]"
1010902-45 = "3;노아 파자마;03;잠시만 기다려주세요. 금방 가져올 테니.\n#3;m4"
1010902-46 = "[s] \"아니, 의자를 부탁하려 했던 게 아니라……\""
1010902-47 = "#st;[0,0];instant;1;"
1010902-48 = "#clearST"
1010902-49 = "3;노아 파자마;02\n#3;em;[?]\n#wait;1000"
1010902-50 = "[ns] \"혹시 이 방으로 이사 온 지 얼마 되지 않은 거야?\""
1010902-51 = "3;노아 파자마;01;아뇨. 저는 신입생 때부터 계속 이 방을 쓰고 있었답니다.\n#3;em;[음표]"
1010902-52 = "[s9] \"그럼 벌써 2년 가까이 이 방에 머물렀다는 뜻인데—\"\n[s10] \"어째서 방이 이렇게 허전한 거야?\""
1010902-53 = "#wait;100"
1010902-54 = "#wait;100"
1010902-55 = "3;노아 파자마;04;그렇게 말씀하셔도…… 생활에 필요한 물품은 다 갖추어져 있답니다.\n#3;em;[?]"
1010902-56 = "3;노아 파자마;01;학업에 필요한 교과서와 학용품 등은 저쪽 서랍 안에 다 정리되어 있고."
1010902-57 = "3;노아 파자마;03;위생에 필요한 세면도구와 위생용품도 잘 보이진 않지만 찬장 안에 제대로 구비되어 있어요."
1010902-58 = "[s11] \"생필품의 이야기가 아니라……\"\n[s12] \"이 방에는 노아의 개인물품이 보이지 않는걸.\""
1010902-59 = "#wait;100"
1010902-60 = "#wait;100"
1010902-61 = "3;노아 파자마;02;유우카 쨩도 이 방에 올 때마다 그런 이야기를 했었지요. 방의 풍경이 너무 살풍경하다고.\n#3;em;…"
1010902-62 = "3;노아 파자마;99;……사실 저도 방에 나름의 개성을 주기 위해 벽을 꾸미기도 하고, 인형을 장식해 보기도 했지만."
1010902-63 = "3;노아 파자마;07;역시 화려하고 개성적인 방은 저와 어울리지 않는 것 같아서 끝내는 처음대로 되돌리고 말았어요."
1010902-64 = "[s] \"왜?\""
1010902-65 = "3;노아 파자마;01;누차 말씀드리지만, 저는 세미나의 서기니까요."
1010902-66 = "3;노아 파자마;02;다른 사람들의 말과 행동을 편견 없이 오롯이 받아들이기 위해서는 주관을 갖지 말아야 한다고 스스로 되뇌다 보니, 그런 취향이 평소의 생활에도 배어든 것일지도 모르겠어요."
1010902-67 = "3;노아 파자마;06;다들 제 방에 개성이 부족하다고 말하곤 하지만…… 콜록.\n#3;stiff\n#3;em;[속상함]"
1010902-68 = "3;노아 파자마;01;어쩌면 다른 사람들과 차별화되는 이 황량한 방이 제 개성일지도 모르겠네요."
1010902-69 = "[s13] \"물론 이런 미니멀한 취향도 개성이 될 수 있겠지만……\"\n[s14] \"노아의 방에 필요한 건 약간의 얼룩일지도 모르겠어.\""
1010902-70 = "#wait;100"
1010902-71 = "#wait;100"
1010902-72 = "3;노아 파자마;04;얼룩…… 이요?\n#3;em;[?]"
1010902-73 = "[s15] \"노아는 아무렇지 않게 이야기했지만.\"\n[s16] \"얼룩 하나 없이 무색의 공간을 유지하는 건 어려운 일이야.\""
1010902-74 = "#wait;1000"
1010902-75 = "#wait;1000"
1010902-76 = "[ns17] \"깨끗한 무색의 방에 작은 [ruby=개성]얼룩[/ruby] 하나를 용납한다면.\"\n[ns18] \"조금은 스스로에게도 너그러워질지도 몰라.\""
1010902-77 = "#wait;100"
1010902-78 = "#wait;100"
1010902-79 = "3;노아 파자마;02;……그렇네요. 흰 종이 위에 진 얼룩은 더 눈에 잘 띄니까요.\n#3;em;…"
1010902-80 = "3;노아 파자마;05;매일 쓰는 공간이라면 다소의 얼룩 하나 정도는 용납하는 것도 나쁘지 않겠어요."
1010902-81 = "3;노아 파자마;07;다만, 선생님. 저는 방을 꾸며본 적이 거의 없어서요.\n#3;em;[한숨]"
1010902-82 = "3;노아 파자마;01;괜찮으시다면 선생님께서 어떻게 방을 꾸밀지 추천해 주시겠어요?"
1010902-83 = "3;노아 파자마;03;선생님의 추천이라면 어떤 모양이라 하더라도 거슬리지 않을 테니까요.\n#3;em;[하트]"
1010902-84 = "[s] \"좋아. 그럼 다음에 방을 어떻게 꾸밀지 함께 논의해 보자.\""
1010902-85 = "3;노아 파자마;03;네, 그럼 다음에 꼭—"
1010902-86 = "3;노아 파자마;06;……콜록, 콜록!\n#3;stiff\n#3;em;[속상함]"
1010902-87 = "[ns] \"우선은 감기가 낫는 게 먼저겠지만.\""
1010902-88 = "3;노아 파자마;09;걱정을 끼쳐드려서 죄송해요."
1010902-89 = "[ns19] \"밥은 먹었어?\"\n[ns20] \"아직이라면 내가 뭔가 만들어 줄게!\""
1010902-90 = "#wait;100"
1010902-91 = "#wait;100"
1010902-92 = "3;노아 파자마;04;식사는 아직입니다만…… 괜찮으시겠어요? 이 방에 있는 식재료라고는 쌀과 계란 정도밖에 없는데……\n#3;em;…"
1010902-93 = "[s] \"그거면 충분해.\""

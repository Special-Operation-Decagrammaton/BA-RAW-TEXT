[translation]
1010902-1 = "ไร้สีสัน"
1010902-2 = "ทางเดินในหอพักมิลเลเนียม"
1010902-4 = "(หลังจากทำงานเสร็จในวันรุ่งขึ้น คุณครูก็รีบไปที่หอพักมิลเลเนียมเพื่อดูอาการของโนอา)"
1010902-5 = "[ns1] (โนอาพักงานเพราะป่วย เรื่องแบบนี้เกิดขึ้นไม่บ่อยเลยนะ)\n[ns2] (หวังว่าจะไม่เป็นอะไรมากนะ...)"
1010902-9 = "ใครเหรอคะ...?"
1010902-15 = "เอ๋...? คุณครู [USERNAME]...?"
1010902-16 = "มาทำอะไรในหอพักมิลเลเนียมในเวลานี้คะ..."
1010902-17 = "[s3] \"ที่ไม่สบายเป็นยังไงบ้าง?\"\n[s4] \"ครูทำงานเสร็จเร็ว ก็เลยแวะมาเยี่ยมน่ะ\""
1010902-20 = "น่าอายจังเลยค่ะที่ทำให้คุณครูต้องเป็นกังวล"
1010902-21 = "แต่ก็อย่างที่เห็นว่าฉันไม่เป็นอะไรค่ะ คุณครูไม่ต้องลำบากมาหากันก็ได้..."
1010902-22 = "แค่ก แค่ก..."
1010902-23 = "[ns] \"แต่ยังดูป่วยอยู่เลยนะ...\""
1010902-25 = "[ns5] \"ครูเอาของเยี่ยมไข้ติดไม้ติดมือมาด้วย ขอเข้าไปได้มั้ย?\"\n[ns6] \"ครูขอเข้าไปข้างในสักเดี๋ยวได้มั้ย?\""
1010902-28 = "เข้ามาในห้องของฉันน่ะเหรอคะ?"
1010902-29 = "ที่จริงก็ให้เข้าได้ค่ะ แต่ว่า..."
1010902-30 = "ฉันไม่คิดเลยว่าคุณครูจะมา ห้องก็เลยไม่ได้อยู่ในสภาพที่เรียบร้อยเท่าไร แบบนี้ก็รู้สึกอายนิดหน่อยนะคะ"
1010902-31 = "[s7] \"ตอนไม่สบาย เราก็ไม่มีแรงเก็บกวาดห้องหรอก ครูจะช่วยเองนะ\"\n[s8] \"ถ้าอยากให้ครูช่วย ครูจะช่วยเก็บกวาดให้เอง\""
1010902-34 = "ฉันไม่ได้หมายความแบบนั้นค่ะ..."
1010902-35 = "แค่กๆ... แต่ถ้าจะให้คุณครูยืนอยู่ที่ทางเดินก็จะเป็นการเสียมารยาท งั้นก็เชิญเข้ามาเลยค่ะ"
1010902-40 = "ห้องของโนอา"
1010902-43 = "[ns] \"เอ่อ โนอา...\""
1010902-44 = "อ๊ะ ฉันลืมเตรียมเก้าอี้ให้นั่งสินะคะ"
1010902-45 = "รอสักครู่นะคะ ฉันจะรีบไปเอามาให้ค่ะ"
1010902-46 = "[s] \"ไม่หรอก ครูไม่ได้จะขอร้องอะไรแบบนั้น...\""
1010902-50 = "[ns] \"ว่าแต่... เพิ่งย้ายเข้าห้องนี้มาเหรอ?\""
1010902-51 = "เปล่าค่ะ ฉันใช้ห้องนี้มาตั้งแต่เข้าเรียนแรกๆ แล้วค่ะ"
1010902-52 = "[s9] \"งั้นก็เกือบจะสองปีแล้ว แต่ทำไมห้องโล่งจัง\"\n[s10] \"มันก็นานแล้วนะ แต่ทำไมห้องถึงโล่งแบบนี้ล่ะ?\""
1010902-55 = "ถึงคุณครูจะพูดอย่างนั้น... แต่ฉันก็มีของที่จำเป็นต่อชีวิตประจำวันครบถ้วนนะคะ"
1010902-56 = "หนังสือเรียนและอุปกรณ์การเรียนที่จำเป็นก็อยู่ในลิ้นชักทั้งหมดเลยค่ะ"
1010902-57 = "ส่วนพวกข้าวของเครื่องใช้ในห้องน้ำและของใช้เกี่ยวกับสุขอนามัยที่จำเป็น ทั้งหมดก็เก็บไว้ในตู้#nเรียบร้อยค่ะ"
1010902-58 = "[s11] \"ไม่หรอก ครูหมายถึงของส่วนตัวของโนอามากกว่า...\"\n[s12] \"แต่ห้องนี้ดูไม่มีของส่วนตัวของโนอาเลยนะ\""
1010902-61 = "เวลายูกะจังมาห้องฉัน ก็มักจะพูดว่าห้องของฉันดูจืดชืดและไม่น่ามองค่ะ"
1010902-62 = "แต่จริงๆ แล้วฉันเคยตกแต่งผนังห้องให้มีเอกลักษณ์เฉพาะตัว แล้วก็หาตุ๊กตามาวางตกแต่งแล้วด้วย"
1010902-63 = "แต่ฉันก็รู้สึกว่าห้องที่หรูหราและมีเอกลักษณ์เฉพาะตัวมันไม่เข้ากับฉัน สุดท้ายฉันก็เลยทำให้ห้องเป็น#nเหมือนตอนแรกที่เข้ามาอยู่ใหม่ๆ ค่ะ"
1010902-64 = "[s] \"ทำไมเหรอ?\""
1010902-65 = "อย่างที่ฉันเคยบอกไปหลายครั้งว่าฉันเป็นเลขาฯ ของเซมิน่านี่คะ"
1010902-66 = "ฉันมักบอกตัวเองว่าไม่ควรมีอัตวิสัยเป็นของตัวเอง จะได้ยอมรับคำพูดและการกระทำของคนอื่นได้#nโดยปราศจากอคติ จนนิสัยนั้นซึมซาบเข้ามาในชีวิตประจำวันของฉันไปเองค่ะ"
1010902-67 = "แม้ว่าทุกคนจะบอกว่าห้องของฉันขาดเอกลักษณ์เฉพาะตัว... แค่กๆ"
1010902-68 = "แต่บางทีห้องที่ไร้สีสันแบบนี้ก็ทำให้ฉันแตกต่างจากคนอื่น นี่อาจจะเป็นเอกลักษณ์ของฉันก็ได้นะคะ"
1010902-69 = "[s13] \"ห้องมินิมอลก็ดีเหมือนกัน แต่มันน่าจะมีรอยอะไรสักหน่อยนะ...\"\n[s14] \"บางทีสิ่งที่จำเป็นอาจเป็นรอยเปื้อนนิดหน่อยก็ได้นะ\""
1010902-72 = "รอยเปื้อน... งั้นเหรอคะ?"
1010902-73 = "[s15] \"การยอมให้ห้องที่ไร้สีสันมีรอยเปื้อนเป็นเรื่องยาก\"\n[s16] \"การรักษาห้องให้ไม่มีรอยเปื้อนอะไรเลยย่อมเป็นเรื่องที่ไม่ง่าย\""
1010902-76 = "[ns17] \"แต่การปล่อยให้มีอะไรเพิ่มบ้าง มันก็เป็นสิ่งที่ไม่เลวนักหรอกนะ\"\n[ns18] \"แต่การอนุญาตให้มีอะไรบ้าง บางทีอาจเป็นการใจดีกับตัวเองก็ได้นะ\""
1010902-79 = "นั่นสินะคะ... เพราะรอยเปื้อนบนกระดาษขาวจะมองเห็นได้ชัดเจนกว่า"
1010902-80 = "หากเป็นพื้นที่ที่ใช้ทุกวัน การยอมให้มีรอยเปื้อนสักนิดหน่อยก็อาจไม่ใช่เรื่องเสียหายก็ได้ค่ะ"
1010902-81 = "แต่ว่า คุณครูคะ ฉันแทบไม่มีประสบการณ์ในการตกแต่งห้องเลยค่ะ"
1010902-82 = "ถ้าคุณครูไม่ว่าอะไร พอจะแนะนำได้มั้ยคะว่าฉันควรแต่งห้องยังไงดี?"
1010902-83 = "ถ้าเป็นคำแนะนำของคุณครูละก็ ฉันว่าฉันน่าจะยอมรับได้น่ะค่ะ"
1010902-84 = "[s] \"ได้สิ ไว้คราวหน้ามาคุยกันนะว่าจะตกแต่งห้องยังไงดี\""
1010902-85 = "ค่ะ งั้นไว้คราวหน้า แค่ก..."
1010902-86 = "แค่กๆ แค่กๆ...!"
1010902-87 = "[ns] \"แต่ตอนนี้ต้องหายหวัดก่อนนะ\""
1010902-88 = "ขอโทษที่ทำให้เป็นห่วงนะคะ"
1010902-89 = "[ns19] \"ยังไม่ได้กินข้าวใช่มั้ย? งั้นครูเตรียมให้นะ\"\n[ns20] \"ถ้ายังไม่ได้กินอะไร เดี๋ยวครูทำให้กินเอง!\""
1010902-92 = "ยังไม่ได้กินเลยค่ะ... แต่ว่าในห้องฉันมีแค่ข้าวกับไข่เท่านั้นเอง คุณครูจะทำอะไรได้เหรอคะ..."
1010902-93 = "[s] \"มีเท่านั้นก็เพียงพอแล้วละ\""
1010902-99 = "(จากนั้นคุณครูก็ทำโจ๊กไข่แบบง่ายๆ ให้โนอา)"
1010902-100 = "(ถึงจะเป็นแค่โจ๊กไข่ที่ไม่ได้ใส่อะไรเป็นพิเศษ แต่โนอาก็กินอย่างเอร็ดอร่อย)"

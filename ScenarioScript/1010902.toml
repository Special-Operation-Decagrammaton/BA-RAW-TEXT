1010902-21 = "5;노아 파자마;03;보시다시피 저는 괜찮습니다. 이렇게 찾아오시지 않으셔도—"
1010902-22 = "5;노아 파자마;06;콜록, 콜록…\n#5;stiff\n#5;em;[속상함]"
1010902-23 = "[ns] \"여전히 안 좋아 보이는 걸……\""
1010902-24 = "#wait;1000"
1010902-25 = "[ns5] \"병문안에 필요한 물건을 좀 가지고 왔는데……\"\n[ns6] \"잠깐 방에 들어가 봐도 괜찮을까?\""

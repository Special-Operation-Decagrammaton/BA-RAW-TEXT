1010902-27 = "#wait;100"
1010902-28 = "5;노아 파자마;04;제 방에요?\n#5;em;[?]"
1010902-29 = "5;노아 파자마;07;들어오시는 건 상관없지만. 저, 사실……"
1010902-30 = "5;노아 파자마;09;선생님이 오실 거라곤 생각지 못해서요. 방 상태가 손님을 맞을만한 모습이 아니라, 조금 부끄럽네요."
1010902-31 = "[s7] \"몸이 아플 땐 집안일에 소홀해지는 게 당연하잖아?\"\n[s8] \"필요하다면 청소 정도는 내가 도와줄게.\""
1010902-32 = "#wait;100"
1010902-33 = "#wait;100"
1010902-34 = "5;노아 파자마;07;그런 뜻은 아니었습니다만……\n#fontsize;50\n#5;em;…"
1010902-35 = "5;노아 파자마;06;콜록…… 여하튼 선생님을 복도에 계속 서 계시게 하는 것도 예의가 아니니, 안으로 들어오세요.\n#5;stiff\n#5;m5"

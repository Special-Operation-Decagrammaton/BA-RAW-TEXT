[translation]
52040-1 = "Episode 4;Honored Guest of the Kadenokouji Family"
52040-6 = "The Kadenokouji family...my family...works to maintain good relationships within the Hyakkiyako."
52040-7 = "We provide amenities and rooms for well-known personalities visiting Hyakkiyako in exchange for...business connections and favors."
52040-8 = "There happens to be a doctor staying at our property right now."
52040-13 = "A doctor...?"
52040-15 = "Yes. Though she may not be well-renowned, she specializes in mystical medicine. She has helped me numerous times."
52040-16 = "Since I abandoned my responsibilities as a miko, I have been...a bit distant from my family..."
52040-17 = "But I will suffer any indignity to heal your arm, Nagusa!"
52040-23 = "...Yukari. I'm sorry, but this arm—"
52040-28 = "Oh? You've returned, my lady."
52040-36 = "We were so worried when you didn't answer our calls. It's wonderful to see you again."
52040-37 = "So, did you change your mind and decide to leave that Council—"
52040-46 = "...I suppose not."
52040-47 = "Welcome, friends of my dear lady."
52040-48 = "The Hyakkaryouran. For what purpose have you visited our family today?"
52040-49 = "I know it's shameless, but, as the daughter of the Kadenokouji family, I have a request."
52040-50 = "A-A request? This is your home. Of course you can have anything."
52040-51 = "Will you please bring me the doctor who's staying here?"
52040-55 = "The doctor? My lady, are you injured?"
52040-56 = "It's for Nagusa, and it's a very private matter."
52040-57 = "She has a serious specialized wound. Please call the doctor immediately."
52040-61 = "...Understood. I shall fetch her promptly."
52040-68 = "A bit later..."
52040-73 = "My lady, the doctor shall see you now."
52040-78 = "...Oh my, a patient?"
52040-83 = "And here I thought I was on vacation..."
52040-84 = "But as a show of gratitude to the Kadenokouji family's generosity, I'll take a look."
52040-86 = "Oh my..."
52040-88 = "(This woman seems familiar...)"
52040-93 = "Oh, wow...!"
52040-97 = "What is it, Renge? Do you recognize her?"
52040-98 = "No...I just like her glasses! Where do you think she bought them?"
52040-103 = "Who cares?!"
52040-108 = "The pleasure is all mine. I'm Riku, a traveling doctor on a pilgrimage through Kivotos."
52040-109 = "I am a wanderer at heart, and am eternally grateful for the Kadenokouji family offering me a temporary home."
52040-110 = "Though my medical skills may be unconventional, I'd be honored to assist a member of the Kadenokouji family."
52040-111 = "You're too kind."
52040-112 = "Would you please take a look at my friend's arm?"
52040-119 = "Hm. My specialty is in internal medicine, so I'm not sure if I can help..."
52040-124 = "But I shall do my best. Now, please remove your bandages."
52040-125 = "..."
52040-135 = "Do you...think it's serious, doctor?"
52040-136 = "Can you heal her or not?"
52040-141 = "My goodness...?"
52040-142 = "Is it painful?"
52040-146 = "...Occasionally."
52040-147 = "Then it's a phantom pain. From a phantom limb."
52040-151 = "...Phantom limb?"
52040-152 = "Yes. Perhaps you've heard of it? It can be quite excruciating."
52040-153 = "The nerves don't know your arm is missing. They send pain signals to your brain...a pain you can't treat on a limb you don't have."
52040-155 = "What the..."
52040-156 = "Check your glasses! Nagusa's arm is right there!"
52040-158 = "No. The patient's arm is not here."
52040-159 = "Based on the color, it was amputated several months ago, and it's currently being neglected somewhere far away."
52040-160 = "Perhaps in the pitch-black of the spirit realm, Miss Nagusa?"
52040-164 = "...How did you know that?"
52040-165 = "Like I said, I'm a wanderer. I've traveled all of Kivotos in search of unique medicine."
52040-166 = "In the northern district of Hyakkiyako, I've discovered some fascinating plants...and animals."
52040-167 = "And I've observed that shadows cannot coexist with living cells. Once touched, a certain...death occurs."
52040-168 = "The natives there called it being devoured by the spirit realm."
52040-169 = "...So. Was your arm devoured by the spirit realm? Did you abandon a piece of yourself in the northern lands?"
52040-173 = "...Yes. I was touched by the spirit realm."
52040-178 = "I thought this doctor was a joke, but she recognized the wound immediately."
52040-179 = "...Renge, careful. She's a Kadenokouji family guest."
52040-181 = "Very impressive, doctor! You are truly insightful!"
52040-182 = "So...what can we do to heal Nagusa's arm?"
52040-186 = "The only way to heal phantom pain is through reunification."
52040-187 = "The pain will persist endlessly until you find the real arm lost in the spirit realm."
52040-194 = "You are saying that I must go back..."
52040-195 = "Is there no other way?"
52040-196 = "Light stretches? Physical rehabilitation might help with the symptoms, but not the problem."
52040-197 = "There's an exercise that an old acquaintance of mine used to stay healthy. I can email you the video if you want."
52040-198 = "Thank you. I appreciate it."
52040-199 = "Miss, do be aware."
52040-205 = "Time does not heal everything. In fact, if you miss the chance, sometimes time locks you into a point of no return."
52040-206 = "Do not let your timidity deprive you of your options."
52040-210 = "..."
52040-211 = "Well then, I wish you a swift recovery."
52040-217 = "She wants us to reattach an arm we can already see? Was she just...wasting our time and spouting nonsense?"
52040-218 = "If it truly is a wound from the spirit realm, curing it may be beyond what we find sensical."
52040-219 = "I've never heard of taking things OUT of the spirit realm..."
52040-220 = "We thought that the spirit realm and the Hundred Ghost Stories were mere fables like the story of Kuzunoha...until the Lantern Festival."
52040-227 = "I would like to share a story...my story."
52040-228 = "I...haven't been entirely truthful with you all."
52040-234 = "I can tell you about the wound...and my shame...and my failure."
52040-238 = "I'll tell you everything. Ayame...was with me."
52040-242 = "Next Episode;Yearning Beyond the Memory"

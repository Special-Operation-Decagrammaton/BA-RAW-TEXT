[translation]
52040-1 = "ตอนที่ 4;ผู้มีเกียรติแห่งตระกูลคาเดโนะโคจิ"
52040-6 = "ตระกูลคาเดโนะโคจิของข้ามีความสัมพันธ์กับองค์กรและตระกูลต่างๆ ทั้งในและนอกเฮียกคิยาโค#nมายาวนานเจ้าค่ะ"
52040-7 = "พวกเราช่วยจัดหาอาหารและที่พักชั่วคราวให้ผู้มีเกียรติที่มาเยี่ยมเยือนเฮียกคิยาโค และก็ได้รับความช่วยเหลือในงานของตระกูลเป็นการตอบแทนด้วยเจ้าค่ะ"
52040-8 = "แล้วตอนนี้ที่คฤหาสน์คาเดโนะโคจิก็มีหมอที่เป็นหนี้บุญคุณท่านหนึ่งมาพักอาศัยอยู่พอดี"
52040-13 = "หมอ... งั้นเหรอ?"
52040-15 = "เจ้าค่ะ แม้จะไม่ได้เป็นที่รู้จักกว้างขวาง แต่หมอท่านนั้นก็มีทักษะทางการแพทย์ที่มหัศจรรย์ ข้าจำได้ว่าตอนเด็กๆ ข้าเคยกินยาจากหมอท่านนั้นจนหายป่วยด้วยเจ้าค่ะ"
52040-16 = "จริงอยู่ที่ตอนนี้ข้าไม่ได้ทำหน้าที่มิโกะของตระกูลแล้ว ก็เลยไม่อยากขอความช่วยเหลือจากตระกูล#nคาเดโนะโคจิมากนัก..."
52040-17 = "แต่ถ้าเป็นเรื่องการรักษาแขนของรุ่นพี่นางุสะ ข้าก็ไม่เกี่ยงหรอกเจ้าค่ะ!"
52040-23 = "ยูคาริ... ขอโทษนะ แต่แขนข้างนี้..."
52040-28 = "ตายจริง? ยินดีต้อนรับกลับมาเจ้าค่ะ คุณหนู"
52040-36 = "หมู่นี้ข้าไม่ได้ข่าวคราวจากคุณหนู ก็เลยเป็นห่วงมากเลย น่าดีใจนะเจ้าคะที่คุณหนูกลับมาคฤหาสน์แล้ว"
52040-37 = "คุณหนูกลับมาโดยไม่บอกกล่าวกันก่อนแบบนี้ หรือว่าจะเปลี่ยนใจกลับมาเป็นมิโกะอีกครั้ง..."
52040-46 = "คงจะไม่ใช่สินะเจ้าคะ..."
52040-47 = "ยินดีต้อนรับเจ้าค่ะ เพื่อนๆ ของคุณหนูทุกคน"
52040-48 = "ทุกคนน่าจะยุ่งกับงานของเฮียกกะเรียวรันแท้ๆ ไม่ทราบว่ามีธุระอะไรที่ตระกูลคาเดโนะโคจิเหรอเจ้าคะ?"
52040-49 = "ถึงจะน่าละอายใจ แต่ในฐานะบุตรีของตระกูลคาเดโนะโคจิ ข้ามีเรื่องส่วนตัวที่อยากจะขอร้องเจ้าค่ะ"
52040-50 = "ขะ... ขอร้องเหรอเจ้าคะ? ถ้าคุณหนูต้องการอะไรก็แค่สั่งมาได้เลยเจ้าค่ะ เหตุใดต้องเกรงใจกันด้วย..."
52040-51 = "ช่วยเรียกท่านหมอที่พักอยู่ในคฤหาสน์นี้ให้หน่อยได้มั้ยเจ้าคะ?"
52040-55 = "จู่ๆ ก็จะให้เรียกหมอเหรอเจ้าคะ? หรือว่าคุณหนูบาดเจ็บตรงไหนมา..."
52040-56 = "ไม่ใช่ข้าหรอก เป็นรุ่นพี่ของข้าน่ะ"
52040-57 = "เราต้องรีบรักษาบาดแผลนี้ให้เร็วที่สุด ช่วยรีบไปเรียกท่านหมอให้หน่อยนะเจ้าคะ"
52040-61 = "เจ้าค่ะ... ข้าจะรีบไปพาท่านหมอมาเจ้าค่ะ"
52040-68 = "(ครู่ต่อมา...)"
52040-73 = "คุณหนู ท่านหมอมาแล้วเจ้าค่ะ"
52040-78 = "ตายจริง... มีคนไข้ด่วนเหรอคะ?"
52040-83 = "ฉันมีเหตุผลส่วนตัว ก็เลยว่าจะงดทำยาไปสักพัก..."
52040-84 = "แต่เห็นแก่ตระกูลคาเดโนะโคจิที่คอยดูแลความสะดวกสบายของฉันให้แล้ว ฉันจะช่วยรักษาให้ค่ะ"
52040-86 = "อุ๊ย..."
52040-88 = "(ผู้หญิงคนนี้... คุ้นๆ เหมือนเคยเห็นที่ไหนมาก่อนเลย...)"
52040-93 = "อ๊ะ... เธอคนนั้น...!"
52040-97 = "มีเรื่องอะไรเหรอเรนเกะ? รู้จักหมอคนนี้เหรอ?"
52040-98 = "ไม่หรอก... แค่รู้สึกว่าแว่นตาที่ใส่อยู่มันเท่มากเลย ไปซื้อมาจากที่ไหนเหรอ?"
52040-103 = "เรื่องแบบนั้นมันสำคัญด้วยหรือไง!"
52040-108 = "ยินดีที่ได้พบค่ะเฮียกกะเรียวรันทุกคน ฉันชื่อ 'ริคุ' เป็นหมอพเนจรที่เดินทางไปทั่วคิโวทอสเพื่อฝึกฝน#nศาสตร์การแพทย์ค่ะ"
52040-109 = "ตอนนี้ฉันติดปัญหาบางอย่างทำให้ยังหาที่พักไม่ได้ แต่ทางตระกูลคาเดโนะโคจิก็เสนอที่พักให้ฉัน ฉันเลยมาพึ่งพิงอยู่เป็นการชั่วคราวค่ะ"
52040-110 = "แม้ทักษะทางการแพทย์ของฉันจะยังบกพร่องอยู่บ้าง แต่ถ้าเป็นการได้ตอบแทนตระกูลคาเดโนะโคจิ ฉันก็จะให้ความร่วมมือค่ะ"
52040-111 = "ขอบคุณที่ช่วยพูดแบบนั้นนะเจ้าคะ"
52040-112 = "ข้าอยากให้ท่านหมอช่วยดูแขนของรุ่นพี่คนนี้เจ้าค่ะ..."
52040-119 = "อืม... เป็นบาดแผลภายนอกสินะคะ...? ฉันเชี่ยวชาญด้านอายุรศาสตร์ เลยไม่แน่ใจว่าจะรักษาบาดแผลแบบนี้ได้หรือเปล่า..."
52040-124 = "แต่จะลองดูให้ก่อนนะคะ เอาละ ถอดผ้าพันแผลออกก่อนเถอะค่ะ"
52040-125 = "......"
52040-135 = "เป็นแผลสาหัสเลยนะเจ้าคะ..."
52040-136 = "ว่าไงล่ะ พอจะรักษาแผลที่แขนนี้ได้มั้ย?"
52040-141 = "โอ้...?"
52040-142 = "มีอาการปวดแขนบ้างหรือเปล่าคะ?"
52040-146 = "ก็นานๆ ครั้ง..."
52040-147 = "ถ้างั้นก็เป็นอาการปวดหลอนสินะคะ"
52040-151 = "ปวดหลอนเหรอ...?"
52040-152 = "ใช่ค่ะ ปวดหลอนเป็นโรคทางระบบประสาทอย่างหนึ่ง"
52040-153 = "เมื่อส่วนใดส่วนหนึ่งของร่างกายหายไปหรือถูกตัดออก จะมีการกระตุ้นเท็จที่ปลายประสาทของส่วนที่#nหายไป ทำให้เกิดความเจ็บปวดอย่างรุนแรงใน 'ส่วนที่ไม่มีอยู่' ค่ะ"
52040-155 = "หมายความว่ายังไง..."
52040-156 = "พูดบ้าอะไรน่ะ นี่เธอเป็นหมอเถื่อนหรือเปล่า? แขนของรุ่นพี่นางุสะก็อยู่ตรงนี้นี่ไง?!"
52040-158 = "ไม่ค่ะ แขนของคนไข้คนนี้ไม่ได้อยู่ตรงนี้ค่ะ"
52040-159 = "ถ้าดูจากสีแล้ว... มันน่าจะถูกตัดไปหลายเดือนแล้ว และตอนนี้มันก็ถูกทิ้งไว้ที่อื่นค่ะ"
52040-160 = "ที่ที่มีแสงสลัวจนมองไม่เห็นทางข้างหน้าอย่างใน 'ห้วงอัสดง' อะไรประมาณนั้น?"
52040-164 = "รู้เรื่องนี้ได้ยังไง...?"
52040-165 = "เมื่อวันก่อนฉันเดินทางไปรอบๆ คิโวทอสเพื่อหาสมุนไพรมารักษาโรคค่ะ"
52040-166 = "แม้ว่าพืชกับสัตว์ป่าจะมีรูปร่างและประสิทธิผลทางยาแตกต่างกันไปตามสภาพแวดล้อม แต่ว่าพืชบาง#nอย่างที่ฉันเก็บได้ในเขตปกครองตนเองเฮียกคิยาโคมันมีลักษณะเฉพาะที่ไม่เหมือนใครค่ะ"
52040-167 = "ถึงมันจะคงคุณสมบัติดั้งเดิมไว้ได้ชัด แต่มันเหมือนมีลักษณะคล้ายเงาที่อยู่ร่วมกับสิ่งมีชีวิตอื่นไม่ได้ เหมือนของที่ 'ตายแล้วตั้งแต่เกิด' ยังไงยังงั้นเลย..."
52040-168 = "ผู้คนก็เลยพูดกันว่าพืชพวกนี้โดน 'ห้วงอัสดงกลืนกิน' น่ะค่ะ"
52040-169 = "ว่ายังไงล่ะคะ... แขนของคุณก็ถูกห้วงอัสดงกลืนกินแล้วถูกทิ้งไว้ในดินแดนทางเหนือใช่มั้ย?"
52040-173 = "ใช่... แผลที่แขนข้างนี้เกิดจากห้วงอัสดง"
52040-178 = "แค่เห็นแผลก็รู้ได้เลยเหรอว่าบาดเจ็บจากตรงไหนมา คิดว่าเป็นหมอเถื่อนเสียอีก แต่จริงๆ ก็แอบเฉียบแหลมนี่นา?"
52040-179 = "เรนเกะ... ท่านนี้เป็นแขกของตระกูลคาเดโนะโคจินะ ช่วยระวังคำพูดหน่อย"
52040-181 = "รู้สาเหตุของแผลได้ทันทีเลย สมกับที่เป็นหมอชื่อดังเลยเจ้าค่ะ!"
52040-182 = "เช่นนั้น...  ต้องทำยังไงถึงจะรักษาแขนข้างนี้ของรุ่นพี่นางุสะได้เหรอเจ้าคะ?"
52040-186 = "มีทางเดียวเท่านั้นที่จะรักษาอาการปวดหลอนให้หายขาด นั่นก็คือการปลูกถ่ายร่างกายส่วนนั้นค่ะ"
52040-187 = "ถ้ายังหาแขนจริงที่ถูกทิ้งไว้ในห้วงอัสดงไม่เจอ อาการปวดก็ไม่ทุเลาลงหรอกค่ะ"
52040-194 = "ต้องกลับไปที่นั่นอีกครั้งงั้นเหรอ..."
52040-195 = "ไม่มีวิธีอื่นแล้วเหรอเจ้าคะ?"
52040-196 = "แม้จะเป็นแค่การรักษาตามอาการ แต่บางคนก็บอกว่าการทำกายบริหารเบาๆ ก็ช่วยบรรเทาอาการปวด#nได้ค่ะ"
52040-197 = "คนรู้จักเก่าของฉันมีท่ากายบริหารที่ชอบทำ ถ้าอยากได้ฉันจะส่งวิดีโอให้ทางอีเมลค่ะ"
52040-198 = "ขอบใจนะ แล้วฉันจะลองทำตามดู"
52040-199 = "แต่จำสิ่งนี้ไว้ให้ขึ้นใจนะคะ"
52040-205 = "เวลาไม่อาจรักษาได้ทุกอย่าง บางทีถ้าชะล่าใจจนพลาดโอกาสไป คุณอาจหาทางรักษาไม่ได้ไปตลอด#nเลยก็ได้ค่ะ"
52040-206 = "อย่าตัดสินใจช้าจนพลาดโอกาสสำคัญนะคะ"
52040-210 = "......"
52040-211 = "ขอให้คุณหายจากอาการนี้ไวๆ นะคะ"
52040-217 = "แขนก็ยังเห็นอยู่แท้ๆ แต่ต้องปลูกถ่ายแขนเข้าไปใหม่เนี่ยนะ เป็นหมอที่พูดอะไรไร้สาระชะมัด จะเชื่อได้จริงๆ เหรอ?"
52040-218 = "แต่ถ้าแขนข้างนั้นได้แผลมาจากห้วงอัสดงอย่างที่รุ่นพี่นางุสะว่าจริงๆ ก็คงรักษาด้วยวิธีทั่วไปไม่ได้หรอก"
52040-219 = "ข้าก็ไม่เคยได้ยินเกี่ยวกับวิธีรักษาแผลที่ถูกห้วงอัสดงกลืนกินมาก่อนเลยเจ้าค่ะ..."
52040-220 = "พวกเราก็เคยคิดว่า <ห้วงอัสดง> หรือ <ตำนานร้อยเรื่องราว> เป็นแค่เรื่องในตำนานเหมือนเรื่องของ#nท่านคุซึโนฮะจนกระทั่งได้เจอเรื่องคราวก่อน ต่อให้มาถกเถียงกันว่าจะจัดการกับมันยังไงก็คง..."
52040-227 = "ช่วยฟังเรื่องของฉันสักครู่ได้มั้ย?"
52040-228 = "ที่จริงแล้วฉัน... มีเรื่องหนึ่งที่ยังไม่ได้บอกพวกเธอน่ะ"
52040-234 = "เรื่องที่เกิดขึ้นในวันนั้น... แต่ฉันยังไม่ได้พูดออกไปเพราะอับอายและก็กลัว"
52040-238 = "ฉันจะบอกพวกเธอว่าในวันนั้น... ฉันได้คุยอะไรกับอายาเมะบ้าง"
52040-242 = "ตอนต่อไป;ความคิดถึงจากอีกฝั่งของความทรงจำ"

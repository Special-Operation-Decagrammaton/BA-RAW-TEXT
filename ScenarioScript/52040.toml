[translation]
52040-1 = "第4話;勘解由小路家的貴人"
52040-6 = "我們勘解由小路家，自古便與百鬼夜行內外的諸多組織與家族保持往來、廣結人脈。"
52040-7 = "有時會為來訪百鬼夜行的名士提供暫時的住所，以換取對家族事務的協助。"
52040-8 = "碰巧現在，有位長年照顧我們家族的醫師，正下榻在勘解由小路家的宅邸之中。"
52040-13 = "醫師……是嗎？"
52040-15 = "是的。雖然名聲不廣，但他擁有神妙的醫術。#n小女子也曾因服用他給的藥而痊癒。"
52040-16 = "儘管如今已卸下巫女職責的小女子，不應繼續倚賴勘解由小路家的庇護……"
52040-17 = "但既然是為了治好名草前輩的手臂，現在不是講究手段的時候了！"
52040-23 = "……紫。#n抱歉，但這手臂──"
52040-28 = "哎呀？您回來啦，大小姐。"
52040-36 = "最近總是聯絡不上，我們都很擔心您呢。#n能平安回來真是太好了。"
52040-37 = "今日之所以突然來訪……#n莫非您已經改變心意，願意重新擔任巫女之職──"
52040-46 = "……看來並非如此呢。"
52040-47 = "歡迎光臨，大小姐的朋友們。"
52040-48 = "百花繚亂的事務正忙，諸位前來勘解由小路家所為何事呢？"
52040-49 = "雖然有些冒昧，不過作為勘解由小路家的一員，小女子想提出一個私人的請求。"
52040-50 = "請，請求？#n若大小姐有事吩咐的話，何須如此客氣……"
52040-51 = "可以麻煩你將寄宿於此的醫師請來嗎？"
52040-55 = "突然要見醫師？#n難道是大小姐您受傷了……！"
52040-56 = "受傷的並不是小女子，而是這位前輩。"
52040-57 = "由於傷口的治療刻不容緩，希望能立刻請醫師前來診療。"
52040-61 = "……明白了。我這就去請他過來。"
52040-68 = "（不久之後……）"
52040-73 = "大小姐，我將醫師請過來了。"
52040-78 = "……哦，這位就是病患嗎？"
52040-83 = "我本來是打算暫時不再配藥的……"
52040-84 = "不過看在勘解由小路家的面子上，就破例診療一下吧。"
52040-86 = "哎呀……"
52040-88 = "（這個女人……總覺得有點眼熟……）"
52040-93 = "啊，那個女人……！"
52040-97 = "怎麼了，蓮華？你認識他嗎？"
52040-98 = "沒有啦……只是他戴的眼鏡好潮哦。#n在哪裡能買到啊？"
52040-103 = "那種事不重要吧！"
52040-108 = "初次見面，百花繚亂的各位。#n我是漂泊於奇普托斯各地研習醫術的流浪醫師，名叫「陸」。"
52040-109 = "由於諸多原因而苦於尋覓棲身之處，#n所幸在勘解由小路家的好意之下，得以暫時借住於此。"
52040-110 = "若無足掛齒的醫術能助勘解由小路家一臂之力，實屬榮幸。"
52040-111 = "您願意這麼說，真是感激不盡。"
52040-112 = "這次希望您診視的，是這位的手臂……"
52040-119 = "唔嗯，是外傷啊……？#n本人的專長在於內科，能否治療還無法確定……"
52040-124 = "不過先讓我看看吧。#n麻煩請解開繃帶。"
52040-125 = "……"
52040-135 = "果然不管看幾次……傷勢都很嚴重呢。"
52040-136 = "怎麼樣？這手臂的傷有辦法治好嗎？"
52040-141 = "哦……？"
52040-142 = "是否會感覺到疼痛？"
52040-146 = "……偶爾會。"
52040-147 = "那麼這股疼痛，就是所謂的「幻肢痛」吧。"
52040-151 = "……幻肢痛？"
52040-152 = "沒錯，幻肢痛──是種俗稱幻覺痛的神經性疾病。"
52040-153 = "當身體的某個部位出現缺損或截斷時，#n消失的末梢神經受到虛假的刺激，使人「不存在的部位」出現劇痛。"
52040-155 = "什麼……"
52040-156 = "這是什麼意思？名草前輩的手臂不是好好連著嗎！？"
52040-158 = "不，患者的手臂並不在這裡。"
52040-159 = "從顏色來看……或許早在數個月以前就遭到截斷，被棄置於某個地方了吧。"
52040-160 = "比如……在那無法分辨前路的「黃昏」之中？"
52040-164 = "……你為什麼會知道？"
52040-165 = "我曾經為了採集藥材走遍奇普托斯。"
52040-166 = "野生的動植物，會因為生長環境的差別而具備不同的形態與效能。#n而我在百鬼夜行北方自治區採集到的幾種植物中，發現了相當特殊的性質。"
52040-167 = "雖然依舊帶有原本的特質，#n卻從出生起便如「死物」一般無法與其他生物共存，就和影子一樣……"
52040-168 = "當地居民將這種現象稱為「被黃昏吞噬」。"
52040-169 = "……你的手臂也被黃昏吞噬，遺落在北方之地了嗎？"
52040-173 = "……沒錯。#n這手臂上的傷痕，的確是黃昏留下的。"
52040-178 = "本來以為是他是個庸醫，沒想到還挺敏銳的嘛？#n居然一眼就能看出手臂是在哪裡受傷的。"
52040-179 = "……蓮華，別忘了他是勘解由小路家的客人，注意一下言辭。"
52040-181 = "一下就查明了病因，真不愧是醫師！"
52040-182 = "那麼……名草前輩的手臂，該如何治療呢？"
52040-186 = "治癒幻肢痛的方法只有一個──重新接回失落的肢體。"
52040-187 = "在找回位於黃昏的手臂之前，這股痛楚將永無止境。"
52040-194 = "果然，還是必須回到那裡啊……"
52040-195 = "除此之外，沒有其他辦法嗎？"
52040-196 = "雖然只是對症療法，但據說輕度的體操有助於緩解疼痛。"
52040-197 = "我知道一套某位舊識為了健康常做的體操。#n如果需要的話，之後我再將影片寄給你。"
52040-198 = "謝謝。我會參考的。"
52040-199 = "不過還請務必謹記在心──"
52040-205 = "時間無法治癒一切。#n倘若錯過了時機，將可能永遠無法挽回。"
52040-206 = "還請不要因猶豫而錯失良機。"
52040-210 = "……"
52040-211 = "那麼，祝你早日康復。"
52040-217 = "那個醫師居然說要重新接回斷肢……聽起來實在挺荒唐的。#n真的可以相信他嗎？"
52040-218 = "要是手臂的傷真如名草前輩所說，是黃昏造成的……#n普通的治療恐怕也無濟於事吧。"
52040-219 = "小女子也沒聽說過，能將被黃昏吞噬之物復原的方法……"
52040-220 = "況且「黃昏」與「百物語」的存在，#n直到上次事件之前都只是跟葛葉大人一樣的傳說。#n就算要準備對策……"
52040-227 = "大家，能聽我說幾句嗎？"
52040-228 = "其實……我還有件事一直沒能對你們說出口。"
52040-234 = "是我因為羞愧與恐懼而隱瞞的……那一天的真相。"
52040-238 = "當時我跟菖蒲究竟說了什麼，我全都告訴你們。"
52040-242 = "下一話;記憶彼端的思念"

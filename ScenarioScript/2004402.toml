[translation]
2004402-1 = "Stadium's Part-Timer"
2004402-2 = "I headed to the Athletic Stadium after reading Sumire's message."
2004402-3 = "She asked me to wait at a precise location to avoid getting lost in the crowd."
2004402-8 = "Trainer! You're here."
2004402-9 = "[s] \"Sumire, is that...?\""
2004402-10 = "Yes. This is my part-time job."
2004402-11 = "I walk around the aisles and dispense drinks from this keg."
2004402-12 = "I know this uniform is a little different..."
2004402-13 = "It certainly draws a lot of attention."
2004402-14 = "But I don't mind if you notice, Trainer."
2004402-15 = "In fact... I want to show you a little more."
2004402-16 = "Now then, Trainer. You look thirsty."
2004402-23 = "I thanked her for pouring me a cold drink."
2004402-31 = "[ns1] \"So, about this new job...\"\n[ns2] \"You said this is also a form of training?\""
2004402-34 = "Ah, going straight to the point. Now that's my focused trainer!"
2004402-38 = "Hm? You look confused. Isn't it obvious?"
2004402-39 = "Very well. I'll tell you. Observe."
2004402-40 = "First of all, this full keg is heavy! Weighted!"
2004402-41 = "[s] \"And what's the point?\""
2004402-42 = "You must be dehydrated. You're missing the core lesson."
2004402-43 = "It's fine. It's just like working out. If you push yourself too hard, you neglect the basics."
2004402-44 = "Like...lifting without stretching! Running without a cooldown..."
2004402-45 = "And, of course, you need proper posture. Nailing the fundamentals can prevent injury and joint deterioration."
2004402-46 = "That happens a lot. People go for greater gains, neglect their form, and BOOM. A pulled muscle, and they're out for the season."
2004402-47 = "Anyway, returning to the point..."
2004402-48 = "Again, this keg is weighted! Weight...?"
2004402-49 = "As in weight training!"
2004402-50 = "[s] \"So that's what you meant!\""
2004402-51 = "Exactly. When completely full, this keg weighs somewhere around 20 kg to 25 kg..."
2004402-52 = "Which sounds light for me, but it's suitable for low-intensity and high-repetition training!"
2004402-53 = "Furthermore, if someone asks for a cup, I get to kneel down and pour the drink..."
2004402-54 = "Meaning I can integrate a full weighted squat!"
2004402-55 = "What? You think that's dangerous? I'll hurt myself with a full squat? What did I just say, Trainer?"
2004402-56 = "Most exercise injuries come from neglecting the basics. So, as long as proper posture is maintained..."
2004402-57 = "...I can integrate a workout into my job while preventing injury!"
2004402-58 = "In fact, a full squat is better than a half squat because it engages more muscles."
2004402-59 = "Why do things halfway? The whole point of a squat is to push yourself to the edge of collapse!"
2004402-60 = "[s3] \"You're right, but...\"\n[s4] \"That attitude seems extreme for part-time work...\""
2004402-63 = "...Ah, right. It's only part-time, but it's important."
2004402-64 = "And, Trainer, it's not just the workout. I also need to smile, act conscientious, and engage the customers."
2004402-65 = "Without those three fundamentals..."
2004402-66 = "The fans won't return!"
2004402-67 = "And, remember, because of the sheer weight, not a lot of people can do this."
2004402-68 = "So the pay eclipses other part-time jobs, and there's also a bonus based on my sale metrics."
2004402-69 = "So, yes, this is the perfect part-time job for me!"
2004402-70 = "Yoohoo! Can we get some of that purple stuff?"
2004402-71 = "Yes. Right away!"
2004402-77 = "Ah, so easy on the ice! Thank you!"
2004402-78 = "Of course. I cut the ice because you seemed very thirsty, and I knew you would chug it."
2004402-79 = "Super cold drinks can actually seize your stomach muscles, preventing optimal hydration."
2004402-80 = "Please call me over anytime. No matter where you're seated, I'll come running! Enjoy the game!"
2004402-87 = "Sumire continued to run around the Stadium..."
2004402-88 = "And performed as if it was her calling."
2004402-90 = "Would you like another? I still have a lot back here!"
2004402-91 = "Great! Here's a bonus drink. Hm? You'd like a smile as well?"
2004402-92 = "Of course. Here! On the house!"
2004402-97 = "You're asking why I showed up without you calling? Well, you looked a bit tired."
2004402-98 = "I see. You thought I seemed too busy!"
2004402-99 = "Next time, don't hesitate. A gesture or a glance will be enough."
2004402-100 = "I may look occupied, but I promise you that I'm watching."
2004402-101 = "Drink up. It's my treat, and full to the brim. This should boost you up."
2004402-103 = "Yes? What can I do for you? Oh, you're wondering if it's too heavy?"
2004402-104 = "Not at all. In fact, it's maybe slightly too light."
2004402-105 = "So, if you don't want a sip...would you like me to demonstrate a perfectly executed lunge?"
2004402-106 = "Oh, you think that's too much to ask, considering you didn't order anything? Then how about we fix that?"
2004402-108 = "And then, before we even realized it..."
2004402-109 = "Sumire became the star of the stadium!"
2004402-111 = "Over here! You're Sumire? Take a photo with me!"
2004402-112 = "Sure! But how do you know my name?"
2004402-113 = "This name tag is so small, after all..."
2004402-114 = "What are you doing after your shift, Sumire?"
2004402-115 = "Hmm. Let's try to keep it professional."
2004402-116 = "But if you visit the Millennium Athletics Training Club, I could help you train."
2004402-117 = "Sumire, Sumire! Pose for the camera!"
2004402-118 = "I don't know much about poses...but I can show some bodybuilding stances?"
2004402-119 = "Very well! In that case...first, side chest!"
2004402-123 = "Yaaaaay!"
2004402-127 = "And next up...triceps!"
2004402-128 = "You're the best!"
2004402-132 = "And finally...double biceps!"
2004402-133 = "Check out those guns!"
2004402-135 = "I couldn't tell whether the crowd was here for the game or for Sumire."
2004402-136 = "And Sumire...became the MVP of the stadium!"

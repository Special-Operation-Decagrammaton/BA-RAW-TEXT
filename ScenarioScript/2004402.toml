[translation]
2004402-1 = "#title;스타디움의 아르바이트생"
2004402-2 = "#na;(스미레의 말을 듣고 애슬레틱 스타디움으로 향했다.)"
2004402-3 = "#na;(스타디움 안은 혼잡하니까, 가능하면 약속한 시간과 장소에 도착해 달라는 부탁을 들었다.)"
2004402-4 = "#all;hide"
2004402-5 = "#wait;1500"
2004402-6 = "#wait;1000"
2004402-7 = "#all;hide"
2004402-8 = "3;스미레 아르바이트;02;아, 오셨군요. 트레이너.\n#3;a\n#3;em;[반응]"
2004402-9 = "[s] \"스미레, 그 모습은……?\""
2004402-10 = "3;스미레 아르바이트;08;네. 이것이 저의 아르바이트입니다.\n#3;em;[음표]"
2004402-11 = "3;스미레 아르바이트;01;관중석 이곳저곳을 돌아다니며. 목이 마른 분들께, 마실 것을 제공해 드리는 일이지요."
2004402-12 = "3;스미레 아르바이트;99;지정된 제복을 입어야 한다고 해서 갈아입었습니다만……."
2004402-13 = "3;스미레 아르바이트;06;조금, 주위로부터 시선을 받는 느낌이 들어서 말이지요.\n#3;stiff\n#3;em;[땀]"
2004402-14 = "3;스미레 아르바이트;03;하지만 트레이너에게라면 괜찮습니다."
2004402-15 = "3;스미레 아르바이트;08;오히려…… 조금이지만, 더욱 보여드리고 싶다는 생각도 드는군요.\n#3;em;[재잘]"
2004402-16 = "3;스미레 아르바이트;03;그러면 트레이너. 트레이너께서도 한 잔, 어떠신가요?"
2004402-17 = "#st;[0,0];instant;1;"
2004402-18 = "#clearST"
2004402-19 = "3;스미레 아르바이트;03\n#3;d\n#3;h\n#wait;1000"
2004402-20 = "3;스미레 아르바이트;03\n#3;a\n#3;closeup\n#wait;1000"
2004402-21 = "3;스미레 아르바이트;03\n#3;greeting\n#3;closeup\n#wait;1000"
2004402-22 = "#all;hide"
2004402-23 = "#na;(스미레의 드링크를 고맙게 받아 마셨다.)"
2004402-24 = "#st;[0,0];instant;1;"
2004402-25 = "#clearST"
2004402-26 = "#wait;300"
2004402-27 = "#wait;500"
2004402-28 = "#wait;500"
2004402-29 = "#all;hide"
2004402-30 = "3;스미레 아르바이트;01\n#3;a\n#wait;1000"
2004402-31 = "[ns1] \"그런데 스미레의 아르바이트 말이야.\"\n[ns2] \"트레이닝을 겸할 수 있다고 했지?\""
2004402-32 = "#wait;10"
2004402-33 = "#wait;10"
2004402-34 = "3;스미레 아르바이트;03;바로 그 부분을 물어보아 주시는군요. 역시 트레이너십니다!\n#3;em;[반짝]"
2004402-35 = "#st;[0,0];instant;1;"
2004402-36 = "#clearST"
2004402-37 = "#wait;2500"
2004402-38 = "3;스미레 아르바이트;06;음? 어째서인지 지금 '어디가……?' 라는 표정을 잠깐 지으신 것도 같습니다만…….\n#3;em;[?]"
2004402-39 = "3;스미레 아르바이트;99;뭐, 그런 건 아무래도 좋겠지요. 말씀드리겠습니다."
2004402-40 = "3;스미레 아르바이트;10;우선, 이 드링크 장비는 무겁습니다!\n#3;closeup"
2004402-41 = "[s] \"무슨 상관관계인지 하나도 모르겠습니다!\""
2004402-42 = "3;스미레 아르바이트;09;이런, 매우 기초적인 부분입니다만, 트레이너께서 이 포인트를 놓치시다니 조금 놀랍군요…….\n#3;em;[땀]\n#3;stiff"
2004402-43 = "3;스미레 아르바이트;08;괜찮습니다! 트레이닝에서도 종종 일어나는 일이지요. 가동 범위와 과부하를 섣불리 늘려 가다 보면."
2004402-44 = "3;스미레 아르바이트;03;기초 중의 기초…… '올바른 자세'를 놓치고 마는 경우가 적지 않게 생겨나거든요.\n#3;em;[음표]"
2004402-45 = "3;스미레 아르바이트;02;아, 덧붙여서 올바른 자세는 중요합니다. 정말로 중요한 것입니다. 부상이나 관절 손상과도 직결되는 문제거든요."
2004402-46 = "3;스미레 아르바이트;05;특히 증량 중의 부상은 정말로 위험하니, 트레이너께서도 올바른 자세를 늘 신경 쓰며 트레이닝에 임하여 주시기를 바랍니다."
2004402-47 = "3;스미레 아르바이트;99;어쨌든, 화제를 되돌려서…….\n#3;em;…"
2004402-48 = "3;스미레 아르바이트;10;다시, 이 드링크 장비는 무겁습니다!\n#3;closeup"
2004402-49 = "3;스미레 아르바이트;05;그 말은 즉, 웨이트 트레이닝을 겸할 수 있다는 뜻이죠!\n#3;em;[!]\n#3;closeup"
2004402-50 = "[s] \"그거였구나!\""
2004402-51 = "3;스미레 아르바이트;99;그렇습니다. 덧붙여 드링크 장비의 무게는, 최대로 드링크를 채웠을 때를 가장하면 약 20kg에서 25kg…….\n#3;em;…"
2004402-52 = "3;스미레 아르바이트;03;저에게는 가벼운 정도입니다만, 고반복 저중량 운동이라고 생각하면 못 할 것도 없죠!"
2004402-53 = "3;스미레 아르바이트;02;더군다나 관객분들께서 드링크를 요청하시면, 그때마다 무릎을 꿇고 드링크를 따라 주어야 하기 때문에……."
2004402-54 = "3;스미레 아르바이트;08;웨이트 풀 스쿼트까지 시도할 수 있습니다!"
2004402-55 = "3;스미레 아르바이트;02;네? 풀 스쿼트는 부상 위험이 높아 위험한 것 아니냐고요? 그거야말로 하나는 알고 둘은 모르는 말씀입니다, 트레이너.\n#3;em;[?]"
2004402-56 = "3;스미레 아르바이트;01;애초에 트레이닝의 부상 원인은 올바른 자세를 지키지 못해 일어나는 것이므로, 풀 스쿼트라고 해도 자세를 정확히 지킨다면."
2004402-57 = "3;스미레 아르바이트;03;대부분의 경우, 부상을 예방할 수 있습니다!\n#3;em;[음표]"
2004402-58 = "3;스미레 아르바이트;02;오히려 전신의 근육을 고르게 활용할 수 있다는 점에서, 개인적으로는 하프 스쿼트보다 풀 스쿼트를 추천 드리는 쪽이고요."
2004402-59 = "3;스미레 아르바이트;08;애초에 스쿼트의 본질은, '무너질 것인가, 떨쳐내고 일어설 것인가'이니 말이죠!\n#3;em;[재잘]"
2004402-60 = "[s3] \"맞는 말인데……\"\n[s4] \"이 아르바이트에 어울리는 말은 아닌 것 같아…….\""
2004402-61 = "#wait;10"
2004402-62 = "#wait;10"
2004402-63 = "3;스미레 아르바이트;06;……아, 잊고 있었습니다. 저는 드링크 아르바이트 중이었죠. 네.\n#3;em;[반응]"
2004402-64 = "3;스미레 아르바이트;02;하지만 트레이너. 트레이닝을 지도할 때라고 해도, 미소와 긍정적인 자세, 그리고 친절함은 중요합니다."
2004402-65 = "3;스미레 아르바이트;05;그 세 가지를 확실히 유지하지 않으면…….\n#3;em;…"
2004402-66 = "3;스미레 아르바이트;09;다음 날, 회원님들이 제대로 오시지 않거든요!\n#3;closeup"
2004402-67 = "3;스미레 아르바이트;05;거기에 앞서 말했듯이 드링크 장비 자체가 무겁기 때문에, 이 일을 소화할 수 있는 사람이 그다지 많지 않아."
2004402-68 = "3;스미레 아르바이트;03;시급이 다른 아르바이트의 몇 배나 되는 데다, 개인 판매량에 따라 추가 인센티브까지 받을 수 있다는군요."
2004402-69 = "3;스미레 아르바이트;08;그런 의미에서, 이 아르바이트야말로 저에게 주어진 '딱 들어맞는 일'이라고 할 수 있는 것이겠죠!\n#3;em;[재잘]"
2004402-70 = "3;스미레 아르바이트;08\n#na;목마른 관중;저기요~ 여기 마실 것 좀 주세요~"
2004402-71 = "3;스미레 아르바이트;03;네. 잠시만 기다려 주세요!\n#3;em;[반응]"
2004402-72 = "#st;[0,0];instant;1;"
2004402-73 = "#clearST"
2004402-74 = "3;스미레 아르바이트;03\n#3;greeting\n#wait;1200"
2004402-75 = "3;스미레 아르바이트;03\n#3;m4\n#wait;1000"
2004402-76 = "3;스미레 아르바이트;03\n#3;greeting\n#wait;1200"
2004402-77 = "3;스미레 아르바이트;03\n#na;목마른 관중;푸하……! 목이 말랐는데 딱 좋았어요. 고마워요!"
2004402-78 = "3;스미레 아르바이트;08;천만의 말씀입니다. 갈증이 심하셨던 것 같아, 일부러 얼음의 양을 살짝 줄여 드렸는데, 잘 된 것 같군요.\n#3;em;[재잘]"
2004402-79 = "3;스미레 아르바이트;03;지나치게 차가운 음료는, 오히려 위장의 활동을 수축시켜, 필요한 수분 공급을 저해하거든요."
2004402-80 = "3;스미레 아르바이트;03;다음에도 어디서든 저를 찾아 주시면, 그 즉시 지체하지 않고 달려오겠습니다. 그러면 즐거운 경기 관람 되시길 바랍니다.\n#3;greeting"
2004402-81 = "#st;[0,0];instant;1;"
2004402-82 = "#clearST"
2004402-83 = "#wait;1000"
2004402-84 = "3;스미레 아르바이트;02\n#3;em;[반응]\n#wait;1000"
2004402-85 = "3;스미레 아르바이트;03\n#3;dr\n#wait;1000"
2004402-86 = "#all;hide"
2004402-87 = "#na;(스미레는 그렇게, 마치 천직인 것 마냥 스타디움을 돌아다니며…….)"
2004402-88 = "#na;(보고 있는 쪽에서 감탄이 나올 만큼, 아르바이트를 성실하게 수행했다.)"
2004402-89 = "#all;hide"
2004402-90 = "3;스미레 아르바이트;08;한 잔 더 하시겠습니까? 음료는 아직 많답니다. 말 그대로 장비 가득 채워 왔으니 말이죠.\n#3;ar\n#3;em;[재잘]"
2004402-91 = "3;스미레 아르바이트;02;감사합니다. 여기 추가 음료입니다. 네? 미소도 보여 줄 수 있느냐고요?\n#3;greeting"
2004402-92 = "3;스미레 아르바이트;03;물론이죠. 흔히 말하는 것처럼, 스마일은 0엔입니다.\n#3;greeting"
2004402-93 = "#st;[0,0];instant;1;"
2004402-94 = "#clearST"
2004402-95 = "3;스미레 아르바이트;08\n#3;em;[반짝]\n#3;closeup\n#wait;2000"
2004402-96 = "#all;hide"
2004402-97 = "3;스미레 아르바이트;02;부르지 않았는데 어째서 왔느냐고 물으셨습니까? 어쩐지 조금 힘드신 것처럼 보였거든요.\n#3;ar\n#3;em;[반응]"
2004402-98 = "3;스미레 아르바이트;09;역시 그러셨군요. 좀처럼 자기 차례가 오지 않을 것 같아서 포기하고 있었다니.\n#3;stiff"
2004402-99 = "3;스미레 아르바이트;03;다음부터는 주저하지 말고, 저를 불러 주세요. 손짓이나 눈짓으로도 충분하답니다."
2004402-100 = "3;스미레 아르바이트;08;제가 못 보고 지나칠 수는 있겠지만, 보고도 무시하는 일은 결코 없을 것이라고 약속드리겠습니다.\n#3;em;[재잘]"
2004402-101 = "3;스미레 아르바이트;03;그런 손님께, 서비스입니다. 특별히 잔 끝까지 가득 채워 드렸답니다. 지친 심신을 달래 드릴 수 있는 한 잔이 되었으면 좋겠습니다."
2004402-102 = "#all;hide"
2004402-103 = "3;스미레 아르바이트;02;네? 무슨 일이신가요? 아하, 장비가 무겁지 않느냐고요?\n#3;ar\n#3;em;[?]"
2004402-104 = "3;스미레 아르바이트;08;전혀 무겁지 않답니다. 오히려 저에게는 약간 가볍거나 딱 좋을 정도죠."
2004402-105 = "3;스미레 아르바이트;06;아뇨, 영업상 드리는 말씀은 아닙니다만……. 그렇다면 이 드링크 장비를 착용한 채, 런지 동작을 하는 모습이라도 보여 드릴까요?\n#3;em;…"
2004402-106 = "3;스미레 아르바이트;03;음료를 주문한 것도 아닌데, 거기까지는 미안하시다고요? 그렇다면 지금 한 잔 어떠십니까? 저는 언제나 준비되어 있답니다."
2004402-107 = "#all;hide"
2004402-108 = "#na;(그렇게 스미레는, 우리도 모르는 사이에.)"
2004402-109 = "#na;(스타디움 관중석의 스타가 되어 있었다!)"
2004402-110 = "#all;hide"
2004402-111 = "#na;신난 관객;여기요, 여기요! 스미레 씨라고 하셨죠? 우리 같이 사진 찍어요!"
2004402-112 = "3;스미레 아르바이트;02;네? 사진을 찍는 데에는 아무 문제 없습니다만, 제 이름을 기억하고 계실 줄이야…….\n#3;a\n#3;em;[반응]"
2004402-113 = "3;스미레 아르바이트;99;기껏해야 명찰에 쓰여 있는, 작은 글씨의 이름인데 말이지요."
2004402-114 = "3;스미레 아르바이트;99\n#na;흥이 오른 관객;혹시 아르바이트 끝나고 시간 있으세요? 스미레 씨와 조금 더 이야기하고 싶어요!"
2004402-115 = "3;스미레 아르바이트;03;후후. 관객분들과의 사적인 만남은, 일단 그렇게까지 권장되고 있지 않답니다."
2004402-116 = "3;스미레 아르바이트;08;하지만 저희 밀레니엄 트레이닝 클럽을 방문해 주신다면, 또 다른 의미의 대화는 얼마든지 가능하겠지만요.\n#3;em;[반짝]"
2004402-117 = "#na;기분이 좋아진 관객;스미레 씨, 스미레 씨! 포즈 잡아 주세요!"
2004402-118 = "3;스미레 아르바이트;02;네? 포즈…… 같은 것은 잘 모릅니다만, 포징이라면 얼마든지 해 드릴 수 있습니다.\n#3;em;[?]"
2004402-119 = "3;스미레 아르바이트;05;그것도 괜찮으시다고요? 그러면 우선…… 사이드 체스트!"
2004402-120 = "#st;[0,0];instant;1;"
2004402-121 = "#clearST"
2004402-122 = "3;스미레 아르바이트;07\n#3;stiff\n#3;em;[반짝]\n#wait;1500"
2004402-123 = "3;스미레 아르바이트;07\n#na;기분이 좋아진 관객;와아아아!"
2004402-124 = "#st;[0,0];instant;1;"

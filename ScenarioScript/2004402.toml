[translation]
2004402-1 = "運動場的工讀生"
2004402-2 = "（聽完堇的話後，前往了田徑運動場）"
2004402-3 = "（由於運動場裡相當擁擠，因此盡可能準時抵達了與他約好的地點）"
2004402-8 = "啊，你來啦，指導員。"
2004402-9 = "[s]「堇，你這身打扮是……？」"
2004402-10 = "是的，這就是我的打工。"
2004402-11 = "在觀眾席到處走動，為口渴的人們提供飲料。"
2004402-12 = "因為規定要穿指定的制服，所以我也別無選擇……"
2004402-13 = "總覺得有點引人注目呢。"
2004402-14 = "不過，如果是指導員的話就沒關係。"
2004402-15 = "我反而希望……哪怕只有一點也好，能多展現一點給你看。"
2004402-16 = "那麼，指導員要不要也來一杯呢？"
2004402-23 = "（接過堇手中的飲料，心懷感謝地喝下）"
2004402-31 = "[ns1]「說到堇的打工……」\n[ns2]「你說可以同時鍛鍊身體是嗎？」"
2004402-34 = "一問就問到重點了呢，不愧是指導員！"
2004402-38 = "嗯？剛才指導員臉上好像閃過了「我哪有？」的表情……"
2004402-39 = "算了，可能是我的錯覺吧。#n那麼我這就開始說明……"
2004402-40 = "首先，這台飲料機很重！"
2004402-41 = "[s]「完全聽不懂這有什麼關聯！」"
2004402-42 = "哎呀，沒想到就連指導員也會忽略這種基礎的要點，讓我有點驚訝呢……"
2004402-43 = "不過沒關係！這在訓練當中也經常發生。#n如果急遽增加活動範圍與負荷的話……"
2004402-44 = "很容易會忽略基礎中的基礎……也就是「正確的姿勢」。"
2004402-45 = "啊，順帶一提，維持正確姿勢是非常重要的。#n因為這會直接關係到受傷與關節損傷的風險。"
2004402-46 = "尤其如果在重訓的過程中受傷真的很危險，#n希望指導員在訓練時，也要隨時注意保持正確的姿勢。"
2004402-47 = "那麼回到剛才的話題……"
2004402-48 = "總之，這台飲料機相當重！"
2004402-49 = "也就是說，這份打工也兼具重量訓練的效果！"
2004402-50 = "[s]「原來如此！」"
2004402-51 = "沒錯。這台機器在裝滿飲料時的重量，大約為20到25kg……"
2004402-52 = "雖然對我來說並不算重，不過當成高次數低重量的訓練也不是不行！"
2004402-53 = "而且每當客人們買飲料時，都必須屈膝幫忙倒飲料……"
2004402-54 = "這樣也能練習負重深蹲！"
2004402-55 = "嗯？你說深蹲很容易受傷，會不會危險？#n這是只知其一不知其二的說法哦，指導員。"
2004402-56 = "訓練時會受傷的根本原因，在於沒有保持正確的姿勢。#n所以即使是深蹲，只要能正確維持好姿勢……"
2004402-57 = "大部分情況下都能避免受傷！"
2004402-58 = "而且從均勻活動全身肌肉的角度來說，跟半蹲相比，我反而更推薦深蹲。"
2004402-59 = "畢竟深蹲的本質，本來就在於「要倒下還是要站起來」的抉擇啊！"
2004402-60 = "[s3]「雖然你說的很對……」\n[s4]「但好像不適用於這個打工吧……」"
2004402-63 = "……啊，我差點忘記自己還在執行賣飲料的工作呢。"
2004402-64 = "不過指導員──在指導訓練的時候，微笑、積極與親切都是很重要的素養。"
2004402-65 = "如果缺少了任何一種……"
2004402-66 = "隔天會員們可能就不會來上課了！"
2004402-67 = "而且就像我剛才提過的一樣，考量到飲料機的重量，能夠勝任這份工作的人並不多。"
2004402-68 = "時薪也是其他打工的好幾倍，還能根據個人的銷售量獲得額外獎金。"
2004402-69 = "從這點來看，這份打工簡直是天底下最適合我的「天職」！"
2004402-70 = "那個～我想要點飲料～"
2004402-71 = "好的，請稍等一下！"
2004402-77 = "呼哈……！#n我正好覺得口渴呢。謝謝你！"
2004402-78 = "不客氣。#n因為客人你看起來很渴，所以我特意稍微少放了一點冰塊，這樣應該正好才對。"
2004402-79 = "太過冰涼的飲料反而會造成胃部收縮，妨礙必要的水分供給哦。"
2004402-80 = "之後無論在什麼地方，有需要的話請隨時告知，我會立刻過去服務。#n那麼，祝你觀賽愉快。"
2004402-87 = "（堇如魚得水般地在運動場走動，從事著他的天職……）"
2004402-88 = "（就算只在一旁看著，也會忍不住感嘆他工作時的勤勞與認真）"
2004402-90 = "要再來一杯嗎？#n飲料機裡的飲料還裝得滿滿的哦。"
2004402-91 = "謝謝。這邊是客人加點的飲料。#n咦？能不能笑一下？"
2004402-92 = "當然沒問題。#n大家都知道，微笑是免費提供的。"
2004402-97 = "想知道為什麼我會主動過來嗎？#n因為客人看起來似乎有點累的樣子。"
2004402-98 = "果然如此呢。#n請不必認為自己會排不到而放棄。"
2004402-99 = "之後可以直接跟我說沒關係，就算只是招手或眼神也可以。"
2004402-100 = "雖然我可能會不小心沒有看見，但我保證絕對不會視而不見的。"
2004402-101 = "這杯是招待的飲料。#n我特別裝得滿滿的，希望能稍微療癒客人疲憊的身心。"
2004402-103 = "嗯？有什麼事嗎？#n問我裝備重不重？"
2004402-104 = "完全不會。#n對我來說反而介於稍輕到正好之間。"
2004402-105 = "不，我並沒有在逞強……#n不如我背著飲料機做個弓箭步吧？"
2004402-106 = "因為沒有點飲料，所以不好意思？#n那要不要直接來一杯呀？我已經準備好了哦。"
2004402-108 = "（於是堇在不知不覺間……）"
2004402-109 = "（成為了運動場觀眾席的明星！）"
2004402-111 = "這邊這邊！你是堇同學對吧？我們一起拍照吧！"
2004402-112 = "咦？拍照當然沒問題，但我沒想到客人會記得我的名字呢……"
2004402-113 = "畢竟只是名牌上小小的字而已。"
2004402-114 = "請問你打工結束後有空嗎？#n我還想和堇同學聊聊天！"
2004402-115 = "呵呵。可惜運動場並不鼓勵工作人員與觀眾有私下交流……"
2004402-116 = "不過如果客人願意造訪千年訓練部的話，我們可以進行另一種形式的交流哦。"
2004402-117 = "堇同學，堇同學！請擺個姿勢！"
2004402-118 = "咦？拍照姿勢……我並不是很熟悉，但假如是健美姿勢的話完全沒問題哦。"
2004402-119 = "這樣可以嗎？#n那麼……首先是側胸肌！"
2004402-123 = "哇啊啊！！"
2004402-127 = "接下來……三頭肌！"
2004402-128 = "好讚！！！"
2004402-132 = "最後是……雙手二頭肌！"
2004402-133 = "太猛了！！！！！"
2004402-135 = "（到最後已經分不清楚，大家究竟是來看比賽還是來看堇的了……）"
2004402-136 = "（堇……成為了運動場的一日傳說！）"

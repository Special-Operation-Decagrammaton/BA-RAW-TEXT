[translation]
2004402-1 = "เด็กพาร์ทไทม์ในสนามกีฬา"
2004402-2 = "(คุณครูมุ่งหน้าไปที่สนามแข่งขันกีฬาตามที่สึมิเระบอก)"
2004402-3 = "(ในสนามมีผู้คนหนาแน่น สึมิเระจึงขอให้มาถึงตามเวลาและสถานที่ที่บอกไว้)"
2004402-8 = "อ๊ะ มาแล้วสินะคะ เทรนเนอร์"
2004402-9 = "[s] \"สึมิเระ เปลี่ยนชุดใหม่เหรอ...?\""
2004402-10 = "ค่ะ นี่เป็นงานพาร์ทไทม์ของฉันน่ะค่ะ"
2004402-11 = "ฉันต้องเดินไปตามอัฒจันทร์ แล้วขายเครื่องดื่มให้ผู้ชมที่กระหายน้ำค่ะ"
2004402-12 = "ฉันเปลี่ยนมาใส่ชุดนี้เพราะทางสนามบอกว่าต้องใส่ยูนิฟอร์มที่กำหนดไว้..."
2004402-13 = "แต่พออยู่ในชุดนี้ ฉันก็รู้สึกได้ถึงสายตาที่มองมาค่ะ"
2004402-14 = "แต่ถ้ากับเทรนเนอร์แล้ว ฉันไม่เป็นไรค่ะ"
2004402-15 = "ฉัน... กลับอยากให้เทรนเนอร์ได้เห็นฉันในภาพลักษณ์นี้ด้วยซ้ำค่ะ"
2004402-16 = "ถ้างั้น เทรนเนอร์คะ เทรนเนอร์ก็ลองดื่มดูสักแก้วมั้ยคะ?"
2004402-23 = "(คุณครูรับเครื่องดื่มจากสึมิเระมาดื่มด้วยความขอบคุณ)"
2004402-31 = "[ns1] \"ที่บอกว่างานนี้ช่วยเรื่องการฝึกร่างกายด้วยนี่มัน...\"\n[ns2] \"แล้วงานนี้ช่วยเรื่องการฝึกร่างกายยังไงเหรอ?\""
2004402-34 = "มาถึงก็ถามเรื่องนี้ทันทีเลยสินะคะ สมกับที่เป็นเทรนเนอร์เลยค่ะ!"
2004402-38 = "อืม ถึงเทรนเนอร์จะทำหน้างงๆ เหมือนอยากถามว่า 'มันช่วยตรงไหน...?'"
2004402-39 = "แต่มันก็เป็นคำถามที่ดีเลยค่ะ ฉันบอกให้ก็ได้ค่ะ"
2004402-40 = "อันดับแรกเลย เครื่องจ่ายเครื่องดื่มที่ฉันสะพายอยู่มันหนักค่ะ!"
2004402-41 = "[s] \"ไม่เห็นเข้าใจเลยว่ามันเกี่ยวกันยังไง!\""
2004402-42 = "ตายจริง นี่เป็นเรื่องพื้นฐานสุดๆ เลยนะคะ น่าตกใจจังเลยที่เทรนเนอร์ลืมสิ่งสำคัญตรงนี้ไปได้..."
2004402-43 = "แต่ก็ไม่เป็นไรค่ะ! เรื่องแบบนี้เกิดขึ้นบ่อยๆ ระหว่างออกกำลังกายอยู่แล้วค่ะ ส่วนตัวฉันคิดว่าถ้าเรา#nผลีผลามเพิ่มขอบเขตการเคลื่อนไหวและน้ำหนัก"
2004402-44 = "เราก็จะหลงลืม 'ท่าทางที่ถูกต้อง' ที่เป็นพื้นฐานที่สุดในการออกกำลังกายค่ะ"
2004402-45 = "การมีฟอร์มหรือท่าทางที่ถูกต้องเป็นสิ่งสำคัญ เรียกว่าสำคัญมากเลยละค่ะ เพราะถ้าหากเราทำท่าไม่#nถูกต้อง กล้ามเนื้อกับข้อต่อของเราก็อาจบาดเจ็บได้ค่ะ"
2004402-46 = "โดยเฉพาะอย่างยิ่งการบาดเจ็บที่เกิดจากการเพิ่มน้ำหนักถือว่าอันตรายมาก หวังว่าเทรนเนอร์จะใส่ใจ และทำท่าทางให้ถูกต้องอยู่เสมอนะคะ"
2004402-47 = "เอาเถอะค่ะ กลับมาที่คำตอบของคำถามอีกครั้ง..."
2004402-48 = "เอาเป็นว่าเครื่องจ่ายเครื่องดื่มอันนี้มันหนักค่ะ!"
2004402-49 = "นั่นก็หมายความว่าฉันสามารถฝึกเวทเทรนนิ่งได้ระหว่างทำงานยังไงล่ะคะ!"
2004402-50 = "[s] \"แบบนี้เองสินะ!\""
2004402-51 = "ใช่แล้วค่ะ ตอนที่ใส่เครื่องดื่มจนเต็มถัง มันจะหนักราวๆ 20-25 กิโล..."
2004402-52 = "สำหรับฉันแล้วนี่เป็นน้ำหนักที่เบาไปหน่อย แต่ถ้าคิดว่าเป็นการเวทด้วยน้ำหนักเบาๆ แต่ทำซ้ำหลายๆ ครั้ง ก็ถือว่ามีประโยชน์เลยค่ะ!"
2004402-53 = "ยิ่งไปกว่านั้น ถ้าผู้ชมในสนามจะซื้อเครื่องดื่ม ฉันก็ต้องนั่งคุกเข่าแล้วกดเครื่องดื่มให้..."
2004402-54 = "ฉันก็เลยได้ทำฟูลสควอทไปด้วยค่ะ!"
2004402-55 = "คะ? ฟูลสควอทเป็นท่าที่เสี่ยงต่อการได้รับบาดเจ็บหรือเปล่าน่ะเหรอคะ? ถามเหมือนไม่รู้อะไรเอาเสีย#nเลยนะคะ เทรนเนอร์"
2004402-56 = "สาเหตุของการบาดเจ็บจากการออกกำลังกายคือท่าทางที่ไม่ถูกต้องค่ะ ต่อให้เป็นฟูลสควอท แต่ถ้านั่งลงไปอย่างถูกต้องละก็"
2004402-57 = "ส่วนใหญ่ก็จะป้องกันการบาดเจ็บได้ค่ะ!"
2004402-58 = "ในแง่ของการใช้กล้ามเนื้อทุกส่วนของร่างกายแล้ว โดยส่วนตัวฉันแนะนำให้ทำท่าฟูลสควอทมากกว่า#nฮาล์ฟสควอทค่ะ "
2004402-59 = "ก็แก่นแท้ของการสควอทคือ 'จะล้มลงไปหรือเปล่า และจะลุกขึ้นยืนไหวหรือเปล่า' นี่คะ!"
2004402-60 = "[s3] \"ก็จริงอยู่หรอกนะ แต่นี่เรามาทำงาน...\"\n[s4] \"แต่คำนั้นมันไม่ค่อยเข้ากับงานพาร์ทไทม์นี้เท่าไรนะ...\""
2004402-63 = "อ๊ะ ฉันลืมไปเลยค่ะ... ฉันกำลังทำงานพาร์ทไทม์อยู่นี่นา"
2004402-64 = "แต่ถึงอย่างนั้นก็เถอะค่ะ เทรนเนอร์ ไม่ว่าจะตอนทำงานหรือตอนเทรนคนอื่น รอยยิ้ม ทัศนคติที่ดี และความเป็นมิตรคือสิ่งสำคัญค่ะ"
2004402-65 = "ถ้าไม่รักษา 3 สิ่งสำคัญนี้ไว้ละก็..."
2004402-66 = "วันต่อมาสมาชิกก็จะไม่กลับมาค่ะ!"
2004402-67 = "และอย่างที่ฉันบอกไปก่อนหน้านี้ว่าเครื่องจ่ายเครื่องดื่มอันนี้มันหนัก คนที่ทนทำงานนี้ได้ก็เลยมีไม่#nเยอะน่ะค่ะ"
2004402-68 = "ค่าจ้างรายชั่วโมงของงานนี้ก็เลยสูงกว่างานพาร์ทไทม์อื่นหลายเท่า แล้วก็ยังได้ค่าอินเทนซีฟเพิ่มจาก#nการขายด้วยนะคะ"
2004402-69 = "ด้วยเหตุผลทั้งหมดนี้ งานพาร์ทไทม์นี้จึงถือว่า 'เกิดมาเพื่อฉัน' เลยละค่ะ!"
2004402-70 = "น้องพาร์ทไทม์~ ขอซื้อเครื่องดื่มหน่อย~"
2004402-71 = "ค่ะ ช่วยรอสักครู่นะคะ!"
2004402-77 = "อ่า...! ดับกระหายได้ดีเลย ขอบใจนะ!"
2004402-78 = "ด้วยความยินดีค่ะ ฉันคิดว่าคุณคงกระหายน้ำมาก ก็เลยใส่น้ำแข็งให้น้อยลงหน่อย"
2004402-79 = "เครื่องดื่มที่เย็นเกินไปจะไปทำให้กระเพาะอาหารหดตัว ส่งผลให้ดูดซึมน้ำได้น้อยลงด้วยค่ะ"
2004402-80 = "ไว้คอแห้งก็เรียกหาฉันอีกนะคะ ฉันจะรีบวิ่งมาเสิร์ฟเครื่องดื่มที่เย็นชื่นใจให้เลยค่ะ ขอให้สนุกกับ#nการชมกีฬาวันนี้นะคะ"
2004402-87 = "(สึมิเระเดินไปทั่วสนามกีฬาราวกับกำลังทำงานประจำที่คุ้นเคย...)"
2004402-88 = "(เธอทำงานพาร์ทไทม์อย่างแข็งขันจนคนที่เฝ้ามองต้องตกตะลึง)"
2004402-90 = "รับอีกแก้วมั้ยคะ? เครื่องดื่มยังเหลืออีกเยอะเลยค่ะ ฉันเติมมาเต็มถังเลย"
2004402-91 = "ขอบคุณค่ะ แก้วที่สั่งเพิ่มได้แล้วค่ะ คะ? อยากเห็นรอยยิ้มจากฉันงั้นเหรอคะ?"
2004402-92 = "ได้สิคะ รอยยิ้มของฉันราคาศูนย์เยนค่ะ"
2004402-97 = "ไม่ได้เรียกหา แต่ฉันมาทำไมน่ะเหรอคะ? ฉันเห็นว่าคุณดูเหนื่อยนิดหน่อยน่ะค่ะ"
2004402-98 = "เป็นอย่างที่ฉันคิดจริงๆ ด้วย คุณถอดใจไปแล้วเพราะคิดว่าฉันคงเดินมาไม่ถึงตรงนี้เหรอเนี่ย..."
2004402-99 = "ต่อไปอย่าลังเลนะคะ เรียกฉันได้ตลอดเลยค่ะ จะโบกมือหรือส่งสายตาให้ก็ได้ค่ะ"
2004402-100 = "ฉันอาจจะเดินผ่านไปเพราะไม่ทันเห็นก็ได้ แต่รับรองว่าถ้าฉันเห็นละก็ ฉันจะไม่เมินเฉยอย่างแน่นอนค่ะ"
2004402-101 = "แก้วนี้ฉันแถมให้คุณลูกค้าค่ะ ฉันใส่ให้เต็มแก้วเลย หวังว่าเครื่องดื่มนี้จะช่วยคลายความเหนื่อยล้า ทั้งทางร่างกายและจิตใจของคุณลูกค้าได้นะคะ"
2004402-103 = "ค่ะ มีเรื่องอะไรเหรอคะ? อ้อ เครื่องจ่ายเครื่องดื่มอันนี้หนักหรือเปล่าน่ะเหรอคะ?"
2004402-104 = "ไม่หนักเลยสักนิดค่ะ สำหรับฉันแล้วมันออกจะเบาไปหน่อยด้วยซ้ำค่ะ"
2004402-105 = "ไม่ใช่นะคะ ฉันไม่ได้จงใจพูดแบบนั้นเพราะจะเรียกลูกค้า... ถ้างั้นให้ฉันสะพายเครื่องนี้แล้วทำท่าลันจ์#nให้ดูมั้ยคะ?"
2004402-106 = "ถ้าขอให้ทำแบบนั้นทั้งๆ ที่ไม่ได้สั่งเครื่องดื่ม ก็จะรู้สึกไม่ดีงั้นเหรอคะ? งั้นก็รับสักแก้วมั้ยคะ? ฉันพร้อมเสิร์ฟให้เสมอเลยค่ะ"
2004402-108 = "(แล้วสึมิเระที่ทำงานอย่างขยันขันแข็ง)"
2004402-109 = "(ก็กลายเป็นคนดังในอัฒจันทร์อย่างไม่รู้ตัว)"
2004402-111 = "คุณ คุณตรงนั้นน่ะ! เมื่อกี้บอกว่าชื่อคุณสึมิเระใช่หรือเปล่า? ฉันขอถ่ายรูปด้วยคนได้มั้ย!"
2004402-112 = "คะ? ถ่ายรูปด้วยได้ค่ะ ยินดีเลยค่ะ แต่คาดไม่ถึงเลยนะคะว่าคุณจะจำชื่อฉันได้ด้วย..."
2004402-113 = "ตัวหนังสือที่ป้ายชื่อก็ตัวเล็กนิดเดียวเอง"
2004402-114 = "เสร็จงานวันนี้แล้วพอจะมีเวลาว่างมั้ย? ฉันอยากคุยกับคุณสึมิเระต่ออีกหน่อยน่ะ!"
2004402-115 = "ฮุฮุ ฉันไม่ได้รับอนุญาตให้ไปพบปะกับผู้ชมกีฬาเป็นการส่วนตัวหรอกค่ะ"
2004402-116 = "แต่ถ้าแวะมาที่ฟิตเนสเซ็นเตอร์ของมิลเลเนียม เราก็จะคุยกันได้เต็มที่ในบริบทที่ต่างออกไปค่ะ"
2004402-117 = "คุณสึมิเระ คุณสึมิเระ! ช่วยโพสท่าหน่อยค่ะ!"
2004402-118 = "คะ? ถ้าให้โพสท่าสวยๆ... ฉันทำไม่เป็นหรอกค่ะ แต่ถ้าโพสท่านักเพาะกาย ฉันทำให้ได้ค่ะ"
2004402-119 = "แบบนั้นก็ได้เหมือนกันเหรอคะ? ถ้างั้นก็เริ่มด้วย... ท่าไซด์เชสต์ โชว์กล้ามหน้าอกจากด้านข้าง!"
2004402-123 = "ว้าววว!"
2004402-127 = "แล้วก็ต่อด้วย... ท่าไตรเซปส์!"
2004402-128 = "สุดยอดเลย!!!"
2004402-132 = "ปิดท้ายด้วยท่าปราบเซียน... ดับเบิล ไบเซปส์!"
2004402-133 = "เท่สุดๆ ไปเลยค่ะ!!!!!"
2004402-135 = "(สุดท้ายแล้วก็แทบแยกไม่ออกว่าคนมาชมการแข่งกีฬาหรือมาดูสึมิเระกันแน่)"
2004402-136 = "(แล้วสึมิเระก็กลายเป็น... คนดังประจำวันแห่งสนามกีฬา!)"

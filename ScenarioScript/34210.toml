[translation]
34210-1 = "第21話;至聖所へ"
34210-4 = "はぁ……はぁ……"
34210-12 = "[ns] \"ミカ！大丈夫？\""
34210-13 = "……。"
34210-14 = "……アレは私が引きつけるよ。"
34210-18 = "サオリ……あなたがあの子を助けたい理由が、少しだけ分かるよ。"
34210-19 = "私もそうだったから……だから……"
34210-20 = "私が引きつけている間に――アツコを助けに行って。"
34210-21 = "先生……ごめんね。#nいつも問題ばっかり起こして……。"
34210-22 = "そして……ありがとう。#n私にもまだチャンスがあると言ってくれて……。"
34210-23 = "お前は……。"
34210-24 = "行きなよ、サオリ！#n時間がないんでしょう？"
34210-28 = "……ああ。"
34210-29 = "[s] \"ミカ、気をつけて……。\""
34210-30 = "……心配しないで、先生。#n知ってるでしょ？――私って結構強いんだよ？"
34210-44 = "……。"
34210-45 = "……自分勝手な女。"
34210-46 = "……急ごう。"

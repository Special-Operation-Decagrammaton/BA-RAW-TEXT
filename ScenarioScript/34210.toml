[translation]
34210-1 = "第21話;前往至聖所"
34210-4 = "哈啊……哈啊……"
34210-12 = "[ns] 「彌香！你還好吧？」"
34210-13 = "……"
34210-14 = "……我來幫你們引開那個。"
34210-18 = "沙織……你想幫助那孩子的理由，我稍微能夠理解了。"
34210-19 = "我也和你一樣……所以……"
34210-20 = "在我引開那東西的時候──去把敦子救出來吧。"
34210-21 = "老師……抱歉。#n我總是引發各種問題……"
34210-22 = "還有……謝謝你。#n能對我說我還有機會……"
34210-23 = "彌香，你……"
34210-24 = "快去吧，沙織！#n沒時間了對吧？"
34210-28 = "……啊啊。"
34210-29 = "[s] 「彌香，小心點……」"
34210-30 = "……別擔心，老師。#n你知道的吧？──我算是挺強的唷？"
34210-44 = "……"
34210-45 = "……真是任性的女人。"
34210-46 = "……快走吧。"

[translation]
34210-1 = "ตอนที่ 21;ฝ่าฟัน"
34210-4 = "แฮ่ก... แฮ่ก..."
34210-12 = "[ns] \"มิกะ!!  ไม่เป็นไรใช่มั้ย?\""
34210-13 = "......."
34210-14 = "ฉันจะล่อพวกนั้นให้เอง..."
34210-18 = "ซาโอริ... ฉันรู้แล้วว่าทำไมเธอถึงหมกมุ่นกับการช่วยอาสึโกะแบบนี้..."
34210-19 = "ฉันรู้... ฉันเองก็เป็นเหมือนกัน เพราะงั้น..."
34210-20 = "ฉันจะล่อคนพวกนั้นเอง เธอไปช่วยอาสึโกะเถอะ"
34210-21 = "คุณครู... ขอโทษที่เอาแต่ก่อเรื่องนะ... ขอโทษที่เป็นเด็กเกเรตัวปัญหา..."
34210-22 = "แต่ว่า... ขอบคุณนะ ขอบคุณที่บอกว่าฉันเองก็มีโอกาสอีก..."
34210-23 = "นี่เธอ..."
34210-24 = "มัวรออะไรอยู่ล่ะซาโอริ! พาตัวคุณครูฝ่าวงล้อมไปเร็วเข้าสิ!! เราไม่มีเวลาแล้วไม่ใช่เหรอ?!"
34210-28 = "อืม... เข้าใจแล้ว"
34210-29 = "[s] \"ระวังตัวด้วยนะมิกะ...\""
34210-30 = "อื้ม คุณครู ไม่ต้องห่วงหรอก คุณครูก็รู้ไม่ใช่เหรอว่าฉันแข็งแกร่งขนาดไหนน่ะ"
34210-44 = "......."
34210-45 = "ผู้หญิงอะไรทำตามอำเภอใจชะมัด..."
34210-46 = "ใช่... รีบไปกันเถอะ"

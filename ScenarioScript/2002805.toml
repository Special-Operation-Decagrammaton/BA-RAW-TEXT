2002805-37 = "3;히나타 수영복;10;물론 저도 일단은 시스터고, 언제까지고 피하고만은 있을 수 없는 일이지만…….\n#3;em;[땀]"
2002805-38 = "3;히나타 수영복;06;그렇다고 고민상담 연습을 해달라는 식으로 누군가에게 부탁드리기에는, 너무 창피해서……. 그래서……."

[translation]
2002805-1 = "Private Counseling"
2002805-4 = "Oh, Sensei. Over here!"
2002805-5 = "Thank you for coming. I know this may seem like childish whining from your perspective..."
2002805-6 = "[s1] \"Students are allowed to be a little childish.\"\n[s2] \"Hinata acting childish? Rare indeed.\""
2002805-7 = "Hahaha... I appreciate you putting it that way..."
2002805-8 = "Hahaha... Is that...so...?"
2002805-9 = "So... How do I begin...?"
2002805-10 = "To be honest, I probably wouldn't be able to bring this up back at home."
2002805-11 = "I suppose it's the environment? Since none of the other Sisters are here?"
2002805-15 = "It's um...something that can only be done with just the two of us here..."
2002805-16 = "S-So...um..."
2002805-17 = "[s3] \"You can speak your mind, Hinata.\"\n[s4] \"It's fine, Hinata. I'm not going to judge you.\""
2002805-20 = "……!!"
2002805-21 = "S-So...! Th-Then...! I-I wanted...to...!"
2002805-25 = "to..."
2002805-27 = "I wanted to have a counseling session!"
2002805-32 = "[ns] \"Counseling session?\""
2002805-33 = "Yes, please! Holding counseling sessions is part of the responsibilities of a Sister."
2002805-34 = "The few times I did try to attend, I was so flustered I wasn't able to properly fulfill my duty."
2002805-35 = "The other Sisters were very kind and assured me that it would get easier over time...but I feel like such a burden to those coming to rest their worries with us."
2002805-36 = "And, so, I've been avoiding counseling sessions with all my might!"
2002805-37 = "But, as a Sister, I simply can't avoid my duties forever."
2002805-38 = "I don't quite know how to ask the Sisters or another student to do practice counseling sessions with me..."
2002805-39 = "[s5] \"So you want me to talk to you about my problems. Let's do it.\"\n[s6] \"That won't be hard at all. Shall we get started right away?\""
2002805-44 = "Okay, what!? Right now...!? I-Immediately!? Right here!?"
2002805-45 = "But what if someone overhears us?  "
2002805-52 = "Oh! I suppose there's no one around."
2002805-53 = "Th-That was the whole point of me asking you here, wasn't it? Heehee."
2002805-54 = "Augh... I must admit, I'm quite anxious on how to approach this..."
2002805-55 = "...I don't need to be nervous?"
2002805-56 = "Y-You're right, Sensei. It is just practice after all."
2002805-57 = "*inhale*... *exhale*..."
2002805-62 = "Let us begin this counseling session."
2002805-67 = "What is said from now on will be kept confidential, and I swear I will not disclose our conversation to anyone else."
2002805-68 = "That being said, Sensei..."
2002805-69 = "What brings you here today? Would it be alright if I...ask what your concerns are, Sensei?"
2002805-70 = "[s] \"Can I be really honest?\""
2002805-71 = "Naturally. As a Sister, I will hold to my word."
2002805-72 = "I'd like to hear your genuine feelings. What is on your mind?"
2002805-73 = "[s] \"Then I'll go ahead and say it.\""
2002805-74 = "Yes, Sensei. Do tell me."
2002805-75 = "I would like to—"
2002805-76 = "[s7] \"So...I don't want to go back.\"\n[s8]\"I want to stay here forever.\""
2002805-79 = "Ah, I see. So you don't want to go back and keep on..."
2002805-84 = "E-Excuse me?"
2002805-85 = "Sensei? What exactly did you mean by that?"
2002805-86 = "[s9] \"I don't want to go back! I want to keep playing!\"\n[s10] \"You said I can say anything!\"\n[s11] \"I just want to spend more time with you here, Hinata!\""
2002805-92 = "Sensei?! P-Please! Let us calm down for now!"
2002805-93 = "I, of course, completely understand what you are saying."
2002805-94 = "I would love for you and I to spend more one-on-one time together."
2002805-95 = "...Huh?"
2002805-96 = "...Oh."
2002805-97 = "Ah, nono! Nonononononono!"
2002805-98 = "That is not what I meant to say at all! No! Never! I mean, not never, if the opportunity—"
2002805-99 = "I am a Sister! I am a Sister speaking blasphemy right now! Sister Sakurako must cleanse me!"
2002805-100 = "[s12] \"Wait, it's not that...extreme...\"\n[s13] \"C-Calm down, Hinata. Just calm down!\""
2002805-103 = "Sorry, so sorry!! I'm sorry to everyone!! I'm sorry to you, Sensei!!"
2002805-104 = "Oh..."
2002805-106 = "Wahhhhhhh!!"
2002805-111 = "I spent the rest of our counseling session comforting Hinata."
2002805-115 = "We decided to practice again another time."

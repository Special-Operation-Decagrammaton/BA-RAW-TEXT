[translation]
2002805-1 = "一對一的告解"
2002805-4 = "啊，老師，我在這裡！"
2002805-5 = "謝謝老師願意過來。#n還有不好意思，讓老師配合我的任性……"
2002805-6 = "[s1]「沒關係，你是學生，我是老師嘛。」\n[s2]「日向的撒嬌可是很難得的哦。」"
2002805-7 = "哈哈哈……謝謝老師願意這麼說……"
2002805-8 = "哈哈哈……是，是嗎……？"
2002805-9 = "那個……我想拜託老師的……"
2002805-10 = "其實是不能在外面做的事……"
2002805-11 = "是，是因為在這種……沒有其他人在的地方……"
2002805-15 = "只有老師和我兩個人……才勉強能做的那種……"
2002805-16 = "我，我指的是……就是……"
2002805-17 = "[s3]「放輕鬆說出來吧，日向。」\n[s4]「要拜託我什麼都行。」"
2002805-20 = "……！！"
2002805-21 = "那，那麼……！#n我想拜託的事情……就是……！"
2002805-25 = "我……"
2002805-27 = "我想……做！！告解練習……！！！"
2002805-32 = "[ns]「告解練習……？」"
2002805-33 = "是，是的！其實……修女會的大家也替我在教堂練習過很多次……"
2002805-34 = "而我卻總是會因為驚慌失措而無法順利進行。"
2002805-35 = "雖然修女們都鼓勵我說多試幾次就會好轉……#n但我不想造成前來告解的人的困擾……"
2002805-36 = "所以一直盡可能避免擔任告解的負責人。"
2002805-37 = "當然，身為一名修女不能永遠逃避下去……"
2002805-38 = "話雖如此，要求修女會的大家再三陪我練習實在有些難為情……所以……"
2002805-39 = "[s5]「也就是說，由我來擔任告解的對象就行了吧？」\n[s6]「這倒是不難，我們馬上開始吧？」"
2002805-44 = "咦，咦！？馬上開始嗎……！？#n現在，就在這裡！？"
2002805-45 = "可，可是周圍……"
2002805-52 = "……沒有其他人！"
2002805-53 = "說的也是！所以才會特別請老師幫忙的嘛！"
2002805-54 = "嗚嗚……一說要開始就緊張起來了……"
2002805-55 = "……嗯？只是練習所以不用緊張……？"
2002805-56 = "這，這麼說也對。"
2002805-57 = "嘶，呼……"
2002805-62 = "……那我就開始了。"
2002805-67 = "您所告解的內容，無論基於任何理由都會受到保密。#n我在此發誓，不會將彼此之間的對話透露給任何人。"
2002805-68 = "那麼首先……老師。"
2002805-69 = "您目前面臨的煩惱為何……能請您告訴我嗎？"
2002805-70 = "[s]「真的可以老實說嗎？」"
2002805-71 = "沒問題的。無論您所說的內容為何，我都會以修女的身分聽取您的告解。"
2002805-72 = "請告訴我老師真實的想法……毫無掩飾的心聲吧。"
2002805-73 = "[s]「那我真的要說囉。」"
2002805-74 = "是，老師請說。"
2002805-75 = "我會洗耳恭聽的。"
2002805-76 = "[s7]「……我不想回去。」\n[s8]「我想一直在這裡玩。」"
2002805-79 = "原來如此，老師不想回去，想一直在這裡……"
2002805-84 = "……咦？"
2002805-85 = "老師……？#n您剛才，說什麼……"
2002805-86 = "[s9]「我說不想回去！還想繼續玩！」\n[s10]「你不是說不管說什麼都行嗎！」\n[s11]「我不想工作了！我要跟日向一起玩！」"
2002805-92 = "老，老師……老師！？#n冷靜，請先冷靜一點！"
2002805-93 = "您的心情我非常能夠理解……！"
2002805-94 = "不只是老師，我也很想在這裡和老師度過更多只屬於我們兩人的時間！"
2002805-95 = "……咦？"
2002805-96 = "……啊。"
2002805-97 = "不，不對！不對不對不對不對不對不對不對！"
2002805-98 = "不是那樣的！不對，是那樣沒錯，總之……！"
2002805-99 = "我，我真是的，怎麼能說這種話……！？#n身為一名修女的我竟然……！！"
2002805-100 = "[s12]「沒，沒有那麼嚴重……」\n[s13]「冷，冷靜點，日向。你先冷靜下來！」"
2002805-103 = "對不起對不起！！我對不起大家！！也對不起老師！！"
2002805-104 = "唔……"
2002805-106 = "嗚啊啊啊啊啊────！！"
2002805-111 = "（之後，安撫了失落的日向度過剩餘的時間）"
2002805-115 = "（至於告解的練習則約好下次再進行）"

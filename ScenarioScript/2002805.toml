[translation]
2002805-1 = "การให้คำปรึกษาของสองเรา"
2002805-4 = "อ๊ะ คุณครู ทางนี้ค่ะ ทางนี้~!"
2002805-5 = "ขอบคุณที่มานะคะ อันที่จริง มันอาจดูเป็นคำขอที่เอาแต่ใจไปสักหน่อย..."
2002805-6 = "[s1] \"ไม่เป็นไร ก็ครูเป็นครูนี่นา\"\n[s2] \"นี่ฮินาตะเอาแต่ใจงั้นเหรอ? อื้อ น่ารักดีนะ\""
2002805-7 = "อะฮ่าฮ่าฮ่า... ขอบคุณที่คิดในแง่บวกนะคะ..."
2002805-8 = "ฮ่าฮ่าฮ่า... งะ... งั้นเหรอคะ...?"
2002805-9 = "คือ...เรื่องที่ฉันอยากขอร้อง..."
2002805-10 = "อันที่จริงมันเป็นเรื่องที่ไม่ควรมาทำข้างนอก..."
2002805-11 = "ตะ...แต่ว่าที่นี่... เป็นที่ที่ไม่มีคนอื่นอยู่..."
2002805-15 = "มีแค่คุณครูกับฉัน... อยู่ที่นี่กันเพียงสองคน... เลยคิดว่าน่าจะทำที่นี่ได้น่ะค่ะ..."
2002805-16 = "พะ...เพราะงั้น...อืม..."
2002805-17 = "[s3] \"ไม่ต้องเกร็งก็ได้ ฮินาตะ\"\n[s4] \"ไม่เป็นไร บอกมาได้ทุกเรื่องเลยนะ\""
2002805-20 = "...!!"
2002805-21 = "ถะ...ถ้างั้น...! ถ้าอย่างนั้น...! คะ...คือว่า...!"
2002805-25 = "ฉะ..."
2002805-27 = "ฉะ...ฉันอยากลองฝึก...การให้คำปรึกษาดูค่ะ...!!"
2002805-32 = "[ns] \"ให้คำปรึกษา...?\""
2002805-33 = "ชะ...ใช่ค่ะ! ทะ...ที่จริง...ฉันก็เคยเข้าร่วมการให้คำปรึกษากับซิสเตอร์คนอื่นๆ หลายครั้งแล้ว..."
2002805-34 = "และทุกๆ ครั้งฉันก็มักจะตกใจ หรือลังเลอยู่บ่อยๆ เลยทำได้ไม่ได้ดีอย่างที่ควรเลยค่ะ..."
2002805-35 = "ซิสเตอร์คนอื่นๆ บอกว่าทำไปเรื่อยๆ ก็จะดีขึ้นเอง แต่ว่าฉันก็ไม่อยากทำให้คนที่มาปรึกษาลำบากใจ..."
2002805-36 = "ฉันเลยมักจะเลี่ยงการเข้าร่วมให้คำปรึกษาตั้งแต่นั้นเป็นต้นมาค่ะ..."
2002805-37 = "แต่ฉันเองก็เป็นหนึ่งในซิสเตอร์ สักวันหนึ่งก็คงจะต้องเข้าร่วมให้คำปรึกษาอย่างหลีกเลี่ยงไม่ได้..."
2002805-38 = "แต่การที่จะไปขอฝึกซ้อมการให้คำปรึกษากับคนอื่นๆ มันค่อนข้างน่าอาย เพราะงั้นก็เลย..."
2002805-39 = "[s5] \"อ๋อ... ถ้างั้นครูแค่ขอคำปรึกษาจากฮินาตะก็พอสินะ\"\n[s6] \"เรื่องนั้นไม่เห็นยากเลย เรามาเริ่มกันเลยมั้ย?\""
2002805-44 = "คะ...?! จะเริ่มตอนนี้เลยเหรอคะ...!? ตะ...ตอนนี้... ที่นี่เลยเหรอคะ?!"
2002805-45 = "ตะ...แต่ว่าแถวๆ นี้... "
2002805-52 = "...ไม่มีคนอยู่เลย!"
2002805-53 = "พะ...เพราะงั้นฉันเลยอยากขอให้คุณครูช่วยค่ะ!"
2002805-54 = "ฮือออ... พอคิดว่าจะเริ่มแล้วก็ตื่นเต้นมากเลยค่ะ..."
2002805-55 = "...คะ? ไม่ต้องตื่นเต้น เพราะนี่แค่การฝึกงั้นเหรอคะ...?"
2002805-56 = "จะ...จริงด้วยค่ะ"
2002805-57 = "ฮู่ว... ฮู่วววว..."
2002805-62 = "...ถ้างั้นก็เริ่มกันเลยเถอะค่ะ"
2002805-67 = "เรื่องที่คุณเล่ามาจะถูกเก็บไว้เป็นความลับ และฉันขอให้คำมั่นว่าเรื่องที่คุยกับฉันในวันนี้ จะไม่มีการ#nเอาไปบอกเล่าให้ใครคนอื่นฟังต่ออย่างเด็ดขาดค่ะ"
2002805-68 = "ถ้าอย่างนั้น... คุณครูคะ"
2002805-69 = "ฉันขอถามได้มั้ยคะว่าวันนี้มาพบฉัน มีเรื่องอยากปรึกษา หรือว่ามีเรื่องกังวลอะไรเหรอคะ?"
2002805-70 = "[s] \"ขอพูดตรงๆ เลยได้มั้ย?\""
2002805-71 = "ได้อยู่แล้วค่ะ ฉันเป็นซิสเตอร์นะคะ ฉันไม่พูดโกหกหรอกค่ะ"
2002805-72 = "ฉันอยากฟังเรื่องราวที่แท้จริงของคุณครูค่ะ ได้โปรดบอกเล่าเรื่องราวแท้จริง... ที่อยู่ลึกลงไปในใจ#nของคุณครูให้ฉันฟังด้วยนะคะ"
2002805-73 = "[s] \"งั้นจะเล่าแล้วนะ\""
2002805-74 = "ค่ะ คุณครู เชิญเล่ามาได้เลยค่ะ"
2002805-75 = "ฉันอยากฟัง..."
2002805-76 = "[s7] \"อืม... ครูไม่อยากกลับเลยน่ะ\"\n[s8] \"ครูอยากเล่นอยู่ที่นี่ไปเรื่อยๆ เลยน่ะ\""
2002805-79 = "อย่างนั้นเองเหรอคะ ถ้าอย่างนั้นก็ไม่ต้องกลับ แล้วอยู่เล่นที่นี่..."
2002805-84 = "...อะไรนะคะ?"
2002805-85 = "คุณครู...? เมื่อกี้พูดว่าอะไรนะคะ..."
2002805-86 = "[s9] \"ครูไม่อยากกลับ! ครูอยากอยู่เที่ยวเล่นที่นี่ต่อ!\"\n[s10] \"ก็เธอบอกว่าให้บอกอะไรก็ได้นี่นา!\"\n[s11] \"ครูอยากอยู่เที่ยวเล่นที่นี่ต่อกับฮินาตะ!\""
2002805-92 = "คะ...คุณครู...!? คุณครูใจเย็นๆ ก่อนนะคะ! ใจเย็นๆ ก่อนค่ะ!"
2002805-93 = "ฉะ...ฉันเข้าใจความรู้สึกคุณครูดีค่ะ แต่ว่า...!"
2002805-94 = "ถ้าพูดแบบนั้นละก็ ฉันเองก็อยากใช้เวลาอยู่กับคุณครูที่นี่สองคนให้นานกว่านี้เหมือนกันนะคะ แต่ว่า...!"
2002805-95 = "...เอ๋?"
2002805-96 = "...เอ่อ..."
2002805-97 = "มะ... มะมะมะมะมะมะมะ... ไม่ใช่นะคะๆๆๆ!"
2002805-98 = "ไม่ใช่แบบนั้นนะคะ! ไม่ใช่แบบนั้นเลยนะคะ เอาเป็นว่าเรื่องนั้น...!"
2002805-99 = "ฉะ...ฉันพูดอะไรที่เสียมารยาทแบนี้ได้ยังไงเนี่ย...!? ซิสเตอร์อย่างฉันพูดแบบนั้นออกไปได้ยังไงกัน..."
2002805-100 = "[s12] \"เดี๋ยวก่อน ไม่เห็นต้องคิดไปถึงขั้นนั้นเลย...\"\n[s13] \"จะ...ใจเย็นๆ ก่อนนะ ฮินาตะ ใจเย็นๆ ก่อน\""
2002805-103 = "ขอโทษค่ะ! ขอโทษจริงๆ ค่ะ!! ขอโทษทุกคนด้วยค่ะ!! ขอโทษนะคะคุณครู!!"
2002805-104 = "ฮือออ..."
2002805-106 = "ฮือออออออออออ...!!!"
2002805-111 = "(หลังจากนั้นคุณครูก็ใช้เวลาส่วนใหญ่ไปกับการปลอบใจฮินาตะที่เอาแต่ร้องไห้ไม่หยุด)"
2002805-115 = "(คุณครูสัญญากับฮินาตะว่าถ้ามีโอกาสก็จะช่วยเธอฝึกซ้อมการให้คำปรึกษาอีก)"

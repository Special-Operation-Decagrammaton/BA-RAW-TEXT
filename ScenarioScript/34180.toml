[translation]
34180-1 = "Episode 18; Another Us"
34180-9 = "This way, Hiyori, Misaki. Let's hide here."
34180-10 = "H-Hey..."
34180-11 = "Be quiet. Lower your head."
34180-12 = "Who's the girl in the middle over there? Sh-She's wearing a really pretty dress..."
34180-13 = "I don't know... She must be super important."
34180-14 = "That's Hime. She's of royal blood."
34180-15 = "Really?! She's royalty?"
34180-16 = "Whoa! I didn't know we had royals! She must live a totally different life from people like us!"
34180-17 = "I bet she's never stolen food...or had frostbite...or slept on a cold floor..."
34180-18 = "A-Are you crying?!"
34180-19 = "In a world full of suffering...I didn't know such a beautiful person could exist... It's so heartwarming. *sob*"
34180-20 = "I don't care how heartwarming it is! You're gonna give us away!"
34180-21 = "Sorry, b-but... *sob*"
34180-22 = "...Even if she's royalty, her situation is likely even worse than ours now."
34180-23 = "...?"
34180-24 = "They're escorting a captured hostage to the enemy. She's a prisoner of war."
34180-25 = "She'll probably be locked away and never see the light of day, left alone to slowly starve."
34180-26 = "Oh... Oh, no..."
34180-27 = "Stop, Misaki. You're scaring Hiyori."
34180-28 = "...Sorry. So, what do we do? Just go back?"
34180-29 = "Of course not. Crowds like these are the perfect hunting grounds. Steal everything you can get your hands on."
34180-30 = "Got it? Let's go."
34180-38 = "Stop!"
34180-39 = "Get out of the way, eighth squad leader."
34180-40 = "You're going to destroy her halo! Please!"
34180-41 = "Please... Please stop... *sob*"
34180-42 = "This is what resistance will get you. Move, if you don't want to suffer the same fate."
34180-43 = "*cough* You haven't...broken...me..."
34180-44 = "The insolence!"
34180-45 = "W-Wait!"
34180-46 = "I-I'll teach her!"
34180-47 = "Teach...?"
34180-48 = "...And here she goes again."
34180-49 = "I-I'm good at teaching! Hiyori, Misaki, and Hime have all improved their grades since I started helping them."
34180-50 = "I'll make sure she stays in line! So, please...!"
34180-53 = "...hurts."
34180-54 = "Misaki, don't do this again. Please."
34180-55 = "...Why not?"
34180-56 = "W-Why not...? B-Because...well..."
34180-57 = "Why should we have to go on struggling?"
34180-58 = "I'm cold, hungry, and sick. Every day is the same. Painful and unbearable."
34180-59 = "Why do you force this meaningless pain on us? What can come from this?"
34180-60 = "B-But..."
34180-61 = "It's because..."
34180-62 = "...I knew it. You act like you know everything, but you're no better than us. You know nothing!"
34180-65 = "M-Misaki! No, wait!"
34180-66 = "Wait! I-I..."
34180-68 = "P-Please forgive me... I was wrong... I'm sorry..."
34180-69 = "I'm sorry...sorry...so sorry... I'll never..."
34180-70 = "I'll never disobey an adult's order...never ever... I'll let go of all hope... I won't rebel."
34180-71 = "I will never pray for happiness... Never again... I'm sorry..."
34180-72 = "So, please...forgive..."
34180-74 = "Have mercy...please..."
34180-75 = "Mercy..."
34180-77 = "Why do you continue to resist, Azusa?"
34180-78 = "A symbol of reconciliation? It was a fool's dream. A lie. It's not like you to believe in lies."
34180-79 = "Real truth lies in your training, in the lessons we have learned here."
34180-80 = "Let go of all hope. Don't rebel. Don't pray for happiness. Everything is in vain."
34180-81 = "Azusa! Are you listening?!"
34180-82 = "Wh-What? What did you say?"
34180-85 = "Where are you going? Come back... Azusa!"
34180-86 = "Tell me...please! What did you say? Don't... Don't leave us."
34180-87 = "Azusa..."
34180-88 = "Have you...found your answer?"
34180-89 = "Please...what do you know? I..."
34180-90 = "What should I do?"
34180-93 = "Azusa..."
34180-94 = "...Azusa?"
34180-95 = "A-Argh...!"
34180-99 = "U-Ugh..."
34180-103 = "You can't move with those wounds, Saori."
34180-104 = "...This is it, then."
34180-105 = "I guess this ending was already written in stone."
34180-106 = "...It's fine."
34180-107 = "What, exactly, is fine?"
34180-108 = "My ending. I ran out of pages a long time ago."
34180-109 = "I kept running forward, believing with all my heart I was doing what I had to do. But that didn't make it right."
34180-110 = "Azusa..."
34180-111 = "...?"
34180-112 = "You called out for Azusa. Why?"
34180-113 = "...You heard that?"
34180-114 = "Azusa of the Make-Up Work Club...a spy chosen to aide my coup."
34180-115 = "If it weren't for Sensei, she would've remained what she was supposed to be: a mindless chess piece."
34180-116 = "Azusa... She..."
34180-117 = "She was never meant to be a spy."
34180-118 = "What?"
34180-123 = "At first, she was... "
34180-124 = "She was a symbol of reconciliation."
34180-125 = "..."
34180-126 = "What are you saying?"
34180-127 = "Reconciliation for Trinity and Arius... That was your idea, Mika."
34180-128 = "I mean, yeah. But I just made it up to trick Sensei... "
34180-129 = "No. You don't remember? You said it when you first approached us."
34180-130 = "Before Seia's attack. Before the Eden Treaty, before the coup... Before the lies and schemes."
34180-131 = "......"
34180-132 = "When we first met, you only spoke of peace."
34180-134 = "Hi there! Are you an Arius student? What's your name?"
34180-135 = "It's such a nice day out! I love the feel of the sun on my skin."
34180-136 = "Get to the point, Trinity."
34180-137 = "Whoa, there. Not very into casual conversation, huh?"
34180-142 = "Okay, okay. I'd like for Trinity and Arius to reconcile."
34180-143 = "...What?"
34180-144 = "I know. It's super crazy, huh?"
34180-145 = "I'm guessing you guys still hate us."
34180-146 = "And I'd also say that's probably why you stay hidden in this isolated district, and refuse any outside help. All because of some feud from years and years ago."
34180-147 = "......"
34180-148 = "Don't look at me like that. I know how much anger and hatred from that feud pours into the present day. No one's gonna want to compromise."
34180-149 = "I mean, Nagi and Seia are still super against it. And I get it."
34180-150 = "But at the same time, I don't really understand. Would it be so bad for us to try to be nice to each other? Little by little, we could chip away at that hatred."
34180-151 = "I really think it's possible. That's why I came out here to meet you guys. To try, little by little."
34180-152 = "...Do you expect me to trust you?"
34180-153 = "I really don't. So, how about this?"
34180-154 = "What if you transfer an Arius student to Trinity without telling anyone? "
34180-155 = "I could make it happen with a snap of my fingers. Being in the Tea Party has its benefits."
34180-156 = "......"
34180-157 = "If an Arius student can assimilate into Trinity, we can prove that we're not so different."
34180-159 = "She'll be like...a symbol of reconciliation! Aren't I a genius?  "
34180-163 = "You're insane. Your plan is insanity."
34180-164 = "I know, right? But if we pull it off, Seia and Nagi would finally listen!"
34180-165 = "..."
34180-166 = "This isn't a decision I can make. We'll talk again later."
34180-167 = "W-Wait! Does that mean you're considering it? Do you have someone in mind?"
34180-168 = "..."
34180-175 = "Azusa. It's a mission."
34180-179 = "...A mission?"
34180-181 = "Reconciliation? Your naivety astounds me. You're walking into a trap with your eyes wide open."
34180-182 = "Although...this could work to our advantage. Observe her. See if she's truly an artless child or a sly snake."
34180-183 = "Reject it for now, but maintain the relationship. Milk her for as much information as you can."
34180-184 = "You don't want to...try?"
34180-185 = "Silly child. A symbol of reconciliation? If I scoffed any harder, I'd be able to spit on the Trinity girl."
34180-186 = "......"
34180-187 = "I sense discontent, Saori. You couldn't possibly have been thinking of acquiescing to Trinity, have you?"
34180-188 = "...Of course not, Madame."
34180-189 = "Tell me. Who taught you what it means to go hungry? Who stole the very roof from over your head?"
34180-190 = "...Trinity."
34180-191 = "Good girl. There is no reconciliation. They have taken everything from you, except your hatred. Do not lose it."
34180-192 = "Yes, Madame. I will not."
34180-194 = "I don't know what it was about her...but I thought Azusa..."
34180-195 = "I thought she could be that symbol for the academies."
34180-196 = "......"
34180-197 = "But we'll never know what could've become of that future."
34180-201 = "Seia's just through here.  "
34180-202 = "You'll send her on a little extended vacation to the hospital, and I'll be next in line to become host!"
34180-203 = "What fun! Aren't you excited?"
34180-205 = "..."
34180-206 = "Madame wanted Seia gone, and the opportunity presented itself."
34180-207 = "You only thought of us as disposable foot soldiers, didn't you? Why else would you have revealed Seia's location?"
34180-208 = "But we weren't some petty thieves you could manipulate."
34180-210 = "We're murderers. Day in and day out, we trained to destroy halos."
34180-212 = "And then we received a mission... Shatter Seia's halo."
34180-216 = "And Azusa...she was assigned to the mission because she'd already studied and prepared to be our symbol of reconciliation."
34180-224 = "...Nagi's planning something weird."
34180-225 = "......"
34180-226 = "A peace agreement with Gehenna? She's gone totally crazy since Seia died.  "
34180-227 = "Considering the situation, we should revisit our plan."
34180-229 = "Plant a spy in Trinity, more carefully than last time."
34180-231 = "You..."
34180-232 = "I didn't understand what you wanted or what principles you upheld. I still don't."
34180-233 = "I could've just brushed you off as a foolish, naive girl. But I know you better than that."
34180-234 = "I thought your dreams of reconciliation were inconceivable, but..."
34180-235 = "But what if it wasn't? What if we could emerge from the shadows?"
34180-236 = "Even now, I can't erase the thoughts from my head."
34180-237 = "......"
34180-238 = "Mika..."
34180-243 = "When you first approached me, you really did want to reconcile, didn't you?"
34180-244 = "......"
34180-245 = "You came to us with the best intentions, but I deceived you and dragged you into hell."
34180-246 = "You couldn't accept it...the hell that erupted from your hopeful dreams. So, you locked away your memories and embraced the darkness you believed lived inside you."
34180-247 = "And you're not the only one."
34180-248 = "Hiyori and Misaki were dragged into Squad, and Hime...she never should have had to fight here."
34180-249 = "Azusa was forced to return to Trinity, not as the symbol of reconciliation we'd hoped for, but as a murderer and spy."
34180-250 = "All this, because of me. Because of my weakness."
34180-251 = "What do you always call me? A hound..."
34180-252 = "Yes. A rabid hound. One that infects everyone around it."
34180-253 = "..."
34180-254 = "Why did I call out for Azusa? I have...so many questions for her."
34180-255 = "Azusa was a victim of circumstance. She suffered the most in some ways, and yet... "
34180-256 = "...she seemed happy."
34180-257 = "Azusa was always closed-off. She accepted our presence, but never our friendship."
34180-259 = "Her loneliness was palpable."
34180-270 = "But then she actually went to Trinity. She went and made friends, met a nice adult..."
34180-271 = "Azusa overcame all her hardships and suffering with a smile."
34180-272 = "She seemed content, in that world beneath a blue sky I could never reach."
34180-274 = "It's a lie. Don't you understand? There can be no peace."
34180-275 = "Your hope? It's an illusion! It'll disappear with the setting sun!!"
34180-279 = "I've prayed! I've dreamed and hoped! I've cried and begged, and nothing has ever changed!"
34180-280 = "Everything is in vain, Azusa! Everything!"
34180-282 = "But in the end..."
34180-285 = "She was right, in the end."
34180-286 = "Everything I believed in...my hatred, my resolve..."
34180-287 = "It was all a lie. Everything isn't in vain."
34180-288 = "My weakness was everyone's undoing."
34180-299 = "It was all my fault, Mika."
34180-300 = "Azusa couldn't find happiness until she finally escaped...me."
34180-301 = "You know the lengths I went to deny that simple fact."
34180-303 = "I want to know...what Azusa has learned. The answers she found at Trinity."
34180-304 = "I have so many questions for her."
34180-305 = "...Can I be happy too, one day?"
34180-306 = "How do I find peace? Will I ever have the chance? Or more aptly...do I deserve the chance?"
34180-307 = "What if..."
34180-310 = "What if I had met Sensei first? Instead of Madame?"
34180-311 = "How would the trajectory of my life have changed?"
34180-312 = "Maybe I wouldn't have hurt everyone I love."
34180-313 = "If I had...the chance to be good..."
34180-314 = "I want to understand those words you said to me, Azusa."
34180-315 = "I want..."
34180-319 = "It doesn't matter anymore... Mika."
34180-320 = "Take your revenge. Claim as much as you've lost."
34180-321 = "You were never a witch. I was the one who injected my hate into your veins."
34180-322 = "I took so much from everyone around me. This ending is only fitting."
34180-332 = "Well... I always thought it would be Azusa, but it's for the best if it's you, Mika."
34180-340 = "......"
34180-341 = "I-I..."
34180-342 = "I...can't... I can't do it..."
34180-343 = "I can't...because..."
34180-344 = "I..."
34180-345 = "...wanted that, too..."
34180-346 = "I wanted to be happy!"
34180-347 = "I've wondered that again and again too! What if I had met Sensei earlier? Sensei could've helped me fix my mistakes!"
34180-352 = "I didn't think it was fair! I messed up... I really did. But I lost everything dear to me. I prayed for some form of mercy."
34180-353 = "But...it never came. Not for me."
34180-354 = "And now it's too late. I don't think there's anything I could ever do to make up for the horrible things I've done.  "
34180-355 = "A second chance...?"
34180-356 = "I wanted it so badly. And when Sensei came to my cell and told me all my friends would come to my hearing, I thought I could have it. But...even that slipped away."
34180-357 = "...Everything is in vain, right? There was nothing left for me to do but to suffer...and to hate."
34180-359 = "You and I...are twin flames, Saori."
34180-360 = "Inexplicably linked, cursed to never find happiness."
34180-361 = "We can't turn back time, and we can't change the future."
34180-363 = "I think that's why I fixated on you. Revenge felt like the only thing I could control."
34180-364 = "You didn't turn me into a witch. I took the poison myself."
34180-365 = "Even when Sensei tried to give me the antidote, I spit it out."
34180-366 = "Like Seia always says, I really am hopeless."
34180-371 = "Mika..."
34180-372 = "Why haven't you shattered my halo yet?  "
34180-373 = "...!"
34180-374 = "I know you have the bomb. I've given you plenty of chances to use it."
34180-375 = "If you did...then at least I... I wouldn't have to..."
34180-376 = "I don't have it."
34180-377 = "Sensei confiscated it from me."
34180-378 = "Hm?"
34180-379 = "Confiscated it?  "
34180-380 = "Seriously? Confiscated a deadly weapon like it was some weird magazine or alcohol?"
34180-385 = "[ns] \"It's a teacher's duty to confiscate dangerous items.\""
34180-386 = "?!"
34180-387 = "Sensei...?!"
34180-388 = "What are you doing here, Sensei?!"
34180-390 = "Next Episode; Infinite Chances"

[translation]
34180-1 = "ตอนที่ 18;พวกเราอีกคน"
34180-9 = "ฮิโยริ มิซากิ ทางนี้ มาซ่อนตรงนี้"
34180-10 = "พะ... พี่คะ..."
34180-11 = "ชู่ว! เงียบๆ สิ ก้มหัวลงไป"
34180-12 = "ค่ะ แต่ว่าคนที่อยู่ตรงกลางตรงนั้นคือใครเหรอคะ? เธอใส่ชุด... สะ... สวยมากเลย..."
34180-13 = "ฉันเองก็ไม่รู้... เธอคงเป็นคนสำคัญละมั้ง"
34180-14 = "องค์หญิงไง คนที่มีเชื้อสายสูงส่งน่ะ"
34180-15 = "อะ... องค์หญิง?! องค์หญิงงั้นเหรอคะ?"
34180-16 = "นะ... ในโลกนี้มีองค์หญิงด้วยเหรอคะ? คงเป็นคนที่ต่างจากหัวขโมยอย่างพวกเรา..."
34180-17 = "คงไม่ต้องขโมยอาหาร... ไม่ต้องถูกหิมะกัด... และไม่ต้องมานอนข้างถนนใช่ไหมคะ...? คนแบบนั้น#nใช่ไหมคะ?"
34180-18 = "หะ... หืม...?"
34180-19 = "ใช่สินะคะ ฉันนึกว่าโลกนี้มีแต่ความเจ็บปวดเสียอีกค่ะ... ที่จริงก็มีองค์หญิงสวยๆ แบบนั้นอยู่ด้วย... ตื้นตันใจจังค่ะ ฮือออออ!"
34180-20 = "อย่าร้องสิ เดี๋ยวโดนจับได้นะ!"
34180-21 = "ขอโทษค่ะพี่... ฮือออออ! แต่ว่า... ฮืออออ"
34180-22 = "ถึงจะได้ชื่อว่าองค์หญิง แต่ก็อยู่ในสถานการณ์ที่ไม่ต่างจากพวกเราหรอก ไม่สิ อาจจะแย่กว่าเราก็ได้"
34180-23 = "......?"
34180-24 = "ถึงมันจะดูเหมือนการเดินขบวนอยู่ก็จริง แต่มันก็เป็นขบวนที่ส่งตัวประกันของเราไปหาศัตรู เธออาจจะเป็นเชลยสงครามก็ได้นะ"
34180-25 = "ยังไงองค์หญิงคนนั้นก็ต้องหนาวและอดตายในคุกที่เยือกเย็น ถ้าอย่างน้อยได้กินเศษอาหารบ้างก็#nคงจะดีนะ"
34180-26 = "แงงง..."
34180-27 = "พอเถอะมิซากิ ฮิโยริกลัวหมดแล้วนะ"
34180-28 = "....... แล้วจะเอายังไงต่อล่ะ? มาถึงที่นี่แล้วทั้งที จะแค่เดินดูแล้วกลับไปงั้นเหรอ? พี่ซาโอริ?"
34180-29 = "ไม่หรอกก็ต้องจู่โจมอยู่แล้วสิ เราจะใช้ประโยชน์จากฝูงชนแล้วขโมยของราคาแพงไปให้ได้เยอะๆ เลย"
34180-30 = "เอาละ ไปกันเถอะ"
34180-38 = "พอได้แล้ว!!"
34180-39 = "หลบไปซะ หัวหน้าหน่วย 8"
34180-40 = "จะทำลายฮาโลกันเลยรึยังไง!!? บอกว่าให้พอได้แล้ว!"
34180-41 = "ขอร้องละ... หยุดเถอะ... ฮือ... ฮือ..."
34180-42 = "เด็กคนนั้นต่อต้านเรา ไม่ใช่คนแกร่งธรรมดาๆ เลย ถ้าไม่หลีกไปละก็ เธอเองก็จะเป็นแบบเดียวกัน"
34180-43 = "แค่ก... แค่ก... อย่ามาตลกนะ... ใครจะ..."
34180-44 = "กล้าดียังไง!!"
34180-45 = "เดี๋ยวก่อน!!"
34180-46 = "ฉะ... ฉัน...!! ฉันจะสอนเด็กคนนี้เอง!"
34180-47 = "สอน......?"
34180-48 = "ทำอะไรไม่เข้าเรื่องอีกแล้ว..."
34180-49 = "ฮิโยริกับมิซากิก็เกรดดีมาก สะ... ส่วนองค์หญิง ฉันก็กำลังสอนอยู่"
34180-50 = "เพราะฉะนั้นให้เป็นหน้าที่ของฉันเถอะ ฉันจะสั่งสอนและตักเตือนให้เอง...!!"
34180-53 = "เจ็บนะ..."
34180-54 = "อย่าทำแบบนี้อีกนะ! มิซากิ! ไม่ได้เด็ดขาด...!!"
34180-55 = "ทำไมล่ะ...?"
34180-56 = "หืม...?"
34180-57 = "ทำไมต้องเจอความเจ็บปวดที่ไร้ความหมายแบบนี้ไปเรื่อยๆ ด้วย?  "
34180-58 = " ทั้งหนาว ทั้งหิวทั้งเจ็บตัว ทำไมถึงมีแต่วันที่เจ็บปวดซ้ำแล้วซ้ำเล่า  "
34180-59 = "ทำไมล่ะ? ทำไมพี่ถึงบีบบังคับความเจ็บปวดที่ไม่มีความหมายกับพวกเราด้วย? มันมีความหมายอะไรเหรอ?"
34180-60 = "ระ... เรื่องนั้น..."
34180-61 = "แบบว่า... เรื่องนั้นมัน..."
34180-62 = "เห็นมั้ย... พี่ก็ตอบไม่ได้ พี่แกล้งทำเป็นรู้ทุกอย่าง แต่ที่จริงพี่เองก็ไม่รู้อะไรเลยเหมือนกัน "
34180-65 = "มะ... มิซากิ... รอเดี๋ยวก่อนสิ!"
34180-66 = "รอก่อนสิ! ฉะ... ฉัน..."
34180-68 = "ฉันทำผิดไปแล้ว... ยกโทษให้ฉันเถอะ... ฉันผิดไปแล้ว..."
34180-69 = "ขอโทษ... ขอโทษจริงๆ ฉันจะไม่ทำแบบนั้นอีกแล้ว..."
34180-70 = "ฉันจะไม่ขัดคำพูดของผู้ใหญ่อีก ฉันจะไม่ขัดขืน... จะไม่คาดหวังใดๆ..."
34180-71 = "จะไม่หวังให้ตัวเองมีความสุขขึ้นอีกแล้ว... ฉันจะไม่ทำแบบนั้นแล้ว..."
34180-72 = "ยกโทษให้ฉันด้วยเถอะ ขอร้องละ..."
34180-74 = "ได้โปรด... เมตตา..."
34180-75 = "เมตตา..."
34180-77 = "ทำไมถึงขัดขืนขนาดนั้นล่ะ? อาซึสะ?"
34180-78 = "สัญลักษณ์แห่งการปรองดองเหรอ...? มันก็แค่คำหลอกลวงเท่านั้น เธอไม่ใช่คนแบบนั้นหรอก"
34180-79 = "สิ่งที่เธอได้เตรียมตัวและร่ำเรียนมา มันจะถูกใช้ประโยชน์ใน <ภารกิจฆาตกรรม> ต่างหากล่ะ"
34180-80 = "เพราะฉะนั้นจงล้มเลิกและยอมรับซะเถอะว่าทุกอย่างมันไร้ความหมาย"
34180-81 = "อาซึสะ...?"
34180-82 = "เธอ... เธอว่าอะไรนะ? เธอหมายความว่าอะไร? รอก่อน เดี๋ยวสิ..."
34180-85 = "จะไปไหนน่ะ? อาซึสะ!"
34180-86 = "รอก่อนสิ! เธอพูดว่าอะไรน่ะ? เธอหมายความว่ายังไง... แล้วจะไปที่ไหนน่ะ? พวกเรายังอยู่ที่นี่อยู่เลย..."
34180-87 = "อาซึสะ..."
34180-88 = "เธอ... นี่เธอ... รู้อยู่แล้วเหรอ? เธอ... รู้คำตอบนั้นอยู่แล้ว...?"
34180-89 = "บอกฉันหน่อยสิ ฉันน่ะ... ฉัน..."
34180-90 = "นี่ฉัน... ต้องทำยังไง..."
34180-93 = "....... อาซึสะ..."
34180-94 = "อาซึสะ...?"
34180-95 = "...!! อะ... อึก!"
34180-99 = "อึก..."
34180-103 = "เธอไม่ไหวแล้วละ... คงทำอะไรต่อทั้งๆ ที่มีบาดแผลพวกนี้ไม่ไหวแล้วละนะ ซาโอริ"
34180-104 = "นั่นน่ะสินะ..."
34180-105 = "อืม ฉันแพ้แล้วสินะ ก็สมควรแล้ว... แพ้ตั้งแต่แรกแล้ว..."
34180-106 = "พอกันที..."
34180-107 = "พอแล้วงั้นเหรอ...?"
34180-108 = "อืม... ฉันไม่รู้ว่าจะต้องทำยังไงต่อไปแล้ว"
34180-109 = "ฉันคิดว่านี่คือสิ่งที่ถูกต้องก็เลยมาในเส้นทางนี้ตลอด... แต่พอมองย้อนกลับไป ทุกอย่างมันก็ผิดไปเสียหมด..."
34180-110 = "อาซึสะ..."
34180-111 = "......?"
34180-112 = "ตอนนั้นเธออยากถามอะไรจากอาซึสะงั้นเหรอ?"
34180-113 = "เธอได้ยินด้วยเหรอ..."
34180-114 = "อาซึสะจังชมรมชั้นเรียนเสริมคือสายลับที่ถูกเลือกให้มาช่วยในแผนการปฏิวัติตั้งแต่แรกไม่ใช่รึไง?"
34180-115 = "หากไม่มีความช่วยเหลือจากคุณครู ก็คงเป็นแค่หมากที่ไม่ได้สำคัญอะไร..."
34180-116 = "อาซึสะน่ะ..."
34180-117 = "ไม่ได้ถูกเลือกให้เป็นสายลับตั้งแต่แรกหรอก"
34180-118 = "อะไรนะ...?"
34180-123 = "ในตอนแรกนั่นน่ะ... "
34180-124 = "อาซึสะจะถูกกำหนดให้เป็น <สัญลักษณ์แห่งการปรองดอง>"
34180-125 = "..."
34180-126 = "อะไรกัน..."
34180-127 = "การปรองดองระหว่างทรีนิตี้กับอาเรียส... เธอเองไม่ใช่เหรอที่ใช้คำอะไรแบบนั้น มิกะ  "
34180-128 = "พูดอะไรของเธอน่ะ... เรื่องนั้น... อื้อ นึกออกแล้ว ตอนที่พูดอ้อมค้อมเพื่อหลอกคุณครู..."
34180-129 = "ไม่ใช่ มันคือคำที่เธอพูดตอนมาหาพวกเราครั้งแรกต่างหาก"
34180-130 = "ก่อนที่จะเกิดการบุกรุกไปหาเซอาเสียอีก มันไม่ได้มีการวางแผนอะไรไว้ตั้งแต่แรกเลย ทั้งสนธิสัญญาเอเดน ทั้งแผนการปฏิวัติของเธอ"
34180-131 = "......."
34180-132 = "ตอนนั้นเธอ... พูดแค่ว่าอยากคืนดีกับอาเรียส"
34180-134 = "ว่าไงๆ เธอเป็นใครฉันไม่รู้หรอกนะ นักเรียนอาเรียสใช่รึเปล่า...?"
34180-135 = "อืม... วันนี้อากาศดีเนอะว่าไหม? ทั้งปลอดโปร่ง แล้วก็..."
34180-136 = "เด็กทรีนิตี้สินะ เธอต้องการอะไร"
34180-137 = "โอ้... สงสัยจะไม่ชอบการคุยละลายพฤติกรรมสินะ ก็ได้ งั้นฉันจะเข้าเรื่องเลยแล้วกัน"
34180-142 = "ฉัน... อยากคืนดีกับนักเรียนอาเรียสน่ะ"
34180-143 = "คืนดี...?"
34180-144 = "อื้ม ถึงมันอาจจะฟังดูหักดิบไปหน่อยก็เถอะนะ ก็..."
34180-145 = "พวกเธอคงจะยังแค้นพวกฉันอยู่ใช่มั้ยล่ะ?"
34180-146 = "ถึงได้ปฏิเสธความช่วยเหลือของพวกฉันและขององค์การนักเรียน แล้วมาอยู่อย่างโดดเดี่ยว และดื้อดึงในเขตปกครองตนเองลับๆ แบบนี้ เพราะความแค้นในอดีต..."
34180-147 = "......."
34180-148 = "อื้ม แต่ความแค้นระหว่างสองฝ่ายมันยิ่งใหญ่เกินกว่าจะแก้ไขได้ แถมยังมีความเข้าใจผิดที่สะสม#nมาตั้งเยอะ... ปัญหานี้ไม่ง่ายเลยละ"
34180-149 = "มันก็สมควรแล้วละนะที่นางิจังกับเซอาจังจะไม่เห็นด้วย..."
34180-150 = "แต่ถึงอย่างนั้นก็เถอะ... การอยู่ร่วมกันอย่างสงบสุขมันยากขนาดนั้นเลยเหรอ? หากทั้งสองฝ่ายต่าง#nพยายามกัน สักวันหนึ่งมันก็น่าจะเป็นไปได้ ใช่ไหมล่ะ?"
34180-151 = "ฉันคิดแบบนั้น... ก็เลยมาหาพวกเธอ จะได้เป็นการพยายามทีละนิดๆ ไง"
34180-152 = "จะให้ฉันเชื่อได้ยังไงว่าคำพูดนั้นเป็นความจริง...?"
34180-153 = "อืม... ฉันพอจะเข้าใจปฏิกิริยาตอบกลับของเธออยู่หรอก ฉันก็เลยลองคิดมาแล้วน่ะ"
34180-154 = "ให้นักเรียนอาเรียสของเธอย้ายมาเรียนที่ทรีนิตี้สักคนมั้ยล่ะ? มาแบบไม่มีใครรู้ไง   "
34180-155 = "ถ้ามีฉันช่วยสนับสนุนอยู่จากข้างหลังยังไงก็ทำได้อยู่แล้ว เห็นอย่างนี้แต่ฉันก็เป็นถึง สมาชิกสภาน้ำชาเลยเชียวนะ"
34180-156 = "......."
34180-157 = "เราจะใช้สิ่งนั้นเป็นการพิสูจน์ให้ทุกคนเห็นว่านักเรียนอาเรียสสามารถใช้ชีวิตอยู่ในโรงเรียนของเรา#nได้โดยไม่มีปัญหาใดๆ"
34180-159 = "พูดง่ายๆ คือให้นักเรียนคนนั้นเป็น <สัญลักษณ์แห่งการปรองดอง> ของเรา เป็นยังไงล่ะ? น่าสนใจใช่ไหม? หือ?"
34180-163 = "เป็นแผนที่ไม่น่าเป็นไปได้เลย..."
34180-164 = "ตะ... แต่ว่า... หากมีนักเรียนสัญลักษณ์คนนั้น ฉันว่าทั้งเซอาจังและนางิจังก็จะเห็นด้วยนะ!"
34180-165 = "..."
34180-166 = "เข้าใจแล้ว เธอรอพวกเราติดต่อกลับไปก็แล้วกัน นี่ไม่ใช่ปัญหาที่ฉันจะตัดสินใจคนเดียวได้"
34180-167 = "อ๊ะ? ดะ... เดี๋ยวก่อนสิ? มีนักเรียนให้ไปเรียนจริงๆ เหรอ?"
34180-168 = "......."
34180-175 = "อาซึสะ นี่คือภารกิจ"
34180-179 = "อะไรเหรอ...?"
34180-181 = "คืนดีกันงั้นเหรอคะ? ช่างเป็นความคิดที่น่าสมเพชและไร้เดียงสาเหลือเกินค่ะ ถ้าไม่ใช่กับดัก ก็คงเป็นเรื่องที่แปลกประหลาดมากๆ เลยค่ะ"
34180-182 = "ฮึ่ม... ไม่ต้องรีบร้อนหรอกค่ะ ไว้เรามารอดูกันว่าจริงๆ แล้วจะเป็นแค่เด็กไร้เดียงสา หรือว่าจะเป็นงูพิษ#nกันแน่"
34180-183 = "ปฏิเสธไปก่อนค่ะ แล้วก็พูดจาจูงใจไปเรื่อยๆ เพื่อรักษาความสัมพันธ์ของเธอคนนั้นไว้ จากนั้นก็#nล้วงเอาข้อมูลของทรีนิตี้มาค่ะ"
34180-184 = "นั่นคือการ... ปฏิเสธเหรอคะ?"
34180-185 = "ก็ใช่สิคะ สัญลักษณ์แห่งการปรองดองเหรอ? ฝันกลางวันอยู่รึไงคะ โลกสวยจังเลยนะคะ ฉันจะใช้มันเป็นเครื่องมือในการล้วงข้อมูลของทรีนิตี้ค่ะ "
34180-186 = "......."
34180-187 = "ว่าไงล่ะ? ซาโอริ? มีปัญหาอะไรหรือเปล่าคะ? หรือว่าแอบไปเตรียมการอะไรตามอำเภอใจ#nโดยไม่ได้รับการอนุญาตจากฉันคะ?"
34180-188 = "ปะ... เปล่าค่ะ มาดาม"
34180-189 = "ไม่ได้ลืมใช่ไหมคะ? เหตุผลที่พวกเธอต้องทนทุกข์ทรมาน เหตุผลที่ต้องหนาวกาย ต้องหิวท้อง และต้องหมดหวังน่ะ"

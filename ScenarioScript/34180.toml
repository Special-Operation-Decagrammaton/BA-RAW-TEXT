34180-9 = "#na;사오리 과거;이쪽이야, 히요리, 미사키. 여기 숨자."
34180-10 = "#na;히요리 과거;어, 언니……"
34180-11 = "#na;사오리 과거;쉿- 조용히 해. 고개도 더 숙여."
34180-12 = "#na;히요리 과거;네, 네…… 그런데 저기 중앙에 있는 저분은 누구인가요? 어, 어, 엄청 예쁜 옷…… 이, 입고 있는데……."
34180-13 = "#na;사오리 과거;나도 잘 몰라……. 엄청 중요한 사람인가 보지."
34180-14 = "#na;미사키 과거;공주님이야. 고귀한 혈통을 가졌다나."
34180-15 = "#na;히요리 과거;고, 공주님이요?! 공주님인가요?"
34180-16 = "#na;히요리 과거;세, 세상엔 공주님도 있는 거예요? 우, 우리 같은 좀도둑과는 다르게……."
34180-17 = "#na;히요리 과거;음식을 훔치지도 않을 거고…… 동상도 걸리지 않을 거고…… 길바닥에서 자지도 않겠죠……? 그렇겠죠?"
34180-18 = "#na;미사키 과거;으, 으응……?"
34180-19 = "#na;히요리 과거;그렇네요. 이 세상에는 고통만 있는 줄 알았는데…… 저렇게 예쁜 공주님도 있는 거군요……. 어쩐지 감동이에요, 으아아아앙-!"
34180-20 = "#na;사오리 과거;가, 갑자기 울지 마, 들키잖아!"
34180-21 = "#na;히요리 과거;죄송해요, 언니…… 으아아아앙-! 그치만…… 으아아아앙-"
34180-22 = "#na;미사키 과거;……공주님이라고 해봤자 우리랑 다를 바 없는 처지, 아니 그 이하의 취급일 거야."
34180-23 = "#na;사오리 과거;……?"
34180-24 = "#na;미사키 과거;퍼레이드처럼 보이지만 저건 적들에게 우리 쪽의 인질을 보내는 행렬이야. 내전 중이니까, 그런 일도 있는 거겠지."
34180-25 = "#na;미사키 과거;저 공주님도 어차피 차가운 감옥에서 벌벌 떨면서 굶게 될걸. 음식 찌꺼기라도 먹을 수 있다면 다행일 거야."
34180-26 = "#na;히요리 과거;아, 아으으……."
34180-27 = "#na;사오리 과거;그만해, 미사키. 히요리가 겁먹잖아."
34180-28 = "#na;미사키 과거;……. 그래서 이제 어쩌려고? 여기까지 왔는데 구경만 하고 돌아갈 거야? 사오리 언니?"

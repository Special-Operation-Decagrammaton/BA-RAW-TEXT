[translation]
34180-1 = "第18話;另一個我們"
34180-9 = "來這裡，日和、美咲。#n在這裡躲起來吧。"
34180-10 = "沙，沙織姊……"
34180-11 = "噓──！安靜一點。頭再低一點。"
34180-12 = "好，好的……不，不過，在中間的那個人是誰呀？#n穿，穿，穿著……非，非常漂亮的衣服……"
34180-13 = "我也不知道……應該是個大人物吧。"
34180-14 = "好像是公主大人，似乎是有什麼高貴的血統吧。"
34180-15 = "公，公主大人！？是公主大人嗎？"
34180-16 = "世，世界上還真的有公主大人啊？和，和我們這種底層的人不一樣……"
34180-17 = "既不會餓……也不會受傷吧……#n也，也不會睡在路邊吧……？對吧？"
34180-18 = "嗯，嗯……應該是這樣吧？"
34180-19 = "……我還以為世界上只有痛苦而已……原來還有那麼漂亮、過著幸福生活的公主存在啊……總覺得有點感動。嗚哇啊啊啊！"
34180-20 = "不，不要突然哭起來！會被發現的！"
34180-21 = "對，對不起沙織姊……嗚哇啊啊啊！#n可是……嗚哇啊啊啊！"
34180-22 = "……雖然說是公主大人，說不定他的遭遇和我們一樣，不，說不定比我們還糟呢。"
34180-23 = "……？"
34180-24 = "雖然看起來很像是遊行，但那是押送人質給敵人的隊伍。#n是因為內戰嗎……還會發生這種事啊。"
34180-25 = "那個公主大人，肯定會在監獄裡挨餓的吧。#n會過著能有廚餘吃就覺得幸運的生活哦。"
34180-26 = "啊，啊嗚嗚……"
34180-27 = "別說了，美咲。會嚇到日和的。"
34180-28 = "……怎，怎麼辦呢沙織姊？#n都到這裡來了卻只是看看就回去嗎？"
34180-29 = "不，當然要攻擊了。#n混進那些人裡面找些能用的東西吧。"
34180-30 = "我們上吧。"
34180-38 = "住手！！"
34180-39 = "讓開，第8分隊長。"
34180-40 = "你想要破壞他的光環嗎！？快住手！！"
34180-41 = "求，求求你們……拜託，別再打了……嗚，嗚嗚……"
34180-42 = "那傢伙竟敢反抗我們，教訓他也是當然的。#n不讓開的話，你們也會有一樣的下場的。"
34180-43 = "咳……咳。#n開什麼玩笑……誰要聽你們的……"
34180-44 = "這傢伙，竟然還敢說這種話！！"
34180-45 = "等等！！"
34180-46 = "……我來指導他吧。"
34180-47 = "指導……？"
34180-48 = "……又做沒有意義的事。"
34180-49 = "日和、美咲都是我教導出來的學生。公主也是──大家成績都很好對吧？"
34180-50 = "所以交給我吧──我會負起責任指導這傢伙的。"
34180-53 = "……好痛。"
34180-54 = "美咲……不准，不准再做這種事了！#n絕對不准……！！"
34180-55 = "……為什麼？"
34180-56 = "你說什麼……？"
34180-57 = "為什麼不行呢？#n為什麼非得要在這種沒有意義的痛苦中活下去呢？"
34180-58 = "──又冷、又餓、又痛苦。#n明明只是不斷重複受苦的日子而已。"
34180-59 = "為什麼姊姊要強迫我們留在這種沒有意義的痛苦裡呢？#n這樣到底有什麼意義？"
34180-60 = "那，那是因為……"
34180-61 = "那是……因為……"
34180-62 = "……你看，答不出來吧。#n說得好像什麼都知道一樣，姊姊明明就跟我們沒什麼兩樣。"
34180-65 = "……美，美咲！等等……"
34180-66 = "等等！我，我……"
34180-68 = "……請原諒我吧……非常抱歉……"
34180-69 = "我不會……不會再做出這種事了……"
34180-70 = "不會再反抗大人說的話了……不會反抗了……我會盡力不對未來抱有希望的……"
34180-71 = "再也不會追求幸福……也不會祈禱了……"
34180-72 = "所以，拜託你……"
34180-74 = "拜託你……大發慈悲……"
34180-75 = "大發慈悲……"
34180-77 = "……為什麼要抵抗到這種程度，梓？"
34180-78 = "和解的象徵……？不是，那只是騙你的吧。#n你不是那種存在。"
34180-79 = "你所準備、學習的一切，全部都是為了「那個任務」。"
34180-80 = "所以，放棄抵抗接受它吧──因為一切都是徒勞的。"
34180-81 = "梓……？"
34180-82 = "你剛才說什麼？#n等等……"
34180-85 = "你，你要去哪裡？梓！"
34180-86 = "等等！你要做什麼……你要去哪裡？#n明明我們還在「這裡」啊……"
34180-87 = "梓……"
34180-88 = "你，你已經……知道了嗎？#n你已經明白……那個問題的答案了嗎……？"
34180-89 = "告訴我吧……"
34180-90 = "我究竟該……怎麼辦才好……"
34180-93 = "……梓。"
34180-94 = "……梓？"
34180-95 = "……！！#n唔，唔……"
34180-99 = "……嗚，咕。"
34180-103 = "……你那身傷勢是動不了的，沙織。"
34180-104 = "……這樣啊。"
34180-105 = "原來如此……是我輸了啊。"
34180-106 = "……已經夠了。"
34180-107 = "已經，夠了……？"
34180-108 = "……沒錯。再這樣下去的話，我就分不清楚到底什麼才是正確的了。"
34180-109 = "一路走來，我都相信著這是正確的……#n但是回過頭一看，卻全都錯了。"
34180-110 = "……白洲梓。"
34180-111 = "……？"
34180-112 = "你想從梓醬那裡得到什麼答案？"
34180-113 = "……你聽到了啊。"
34180-114 = "補課部的梓醬。#n只不過是為了協助我的政變計畫而被選出來的間諜而已吧。"
34180-115 = "要不是有老師幫忙的話，只不過是一個棋子而已……"
34180-116 = "……梓他啊。"
34180-117 = "從一開始就不是作為間諜而被選上的。"
34180-118 = "……咦？"
34180-123 = "那孩子是……"
34180-124 = "……預計要成為「和解的象徵」的。"
34180-125 = "……"
34180-126 = "什……"
34180-127 = "三一和奧利斯之間的……#n最先這麼說的可是你啊，彌香。"
34180-128 = "你在說什麼……那是……#n嗯，我想起來了……那只是為了騙過老師而編造的謊言……"
34180-129 = "──不。那是你第一次見到我們的時候說的。"
34180-130 = "在聖亞的襲擊發生之前──在伊甸園條約和你的政變計畫都還不存在的時候。"
34180-131 = "……"
34180-132 = "你那個時候就說過了，想要跟奧利斯和解。"
34180-134 = "初次見面☆雖然不知道你是誰，不過是奧利斯的學生對吧……？"
34180-135 = "今天天氣真好呢？既晴朗又……"
34180-136 = "別拐彎抹角了，三一。"
34180-137 = "嗚哇……你不喜歡破冰活動啊。#n……嗯，那也沒辦法，就直接切入正題吧。"
34180-142 = "──我想要跟你們奧利斯和解。"
34180-143 = "和解……？"
34180-144 = "嗯。雖然這可能會覺得這是個激進的主張，但是……"
34180-145 = "你們應該還恨著我們對吧？"
34180-146 = "所以才會拒絕我們三一和聯邦學生會的幫助，孤立在隱藏的自治區裡對吧？因為過去的憎恨尚未消失。"
34180-147 = "……"
34180-148 = "不過，要解決這個問題……雙方的憎恨又太強了……#n而且，一直以來累積的誤會也不少……嘛，肯定不容易吧。"
34180-149 = "渚醬跟聖亞醬會反對也是理所當然的……"
34180-150 = "可是……好好相處，真的這麼難嗎？#n只要大家一步一步地攜手前進，總有一天就能達成不是嗎？"
34180-151 = "我是這麼想的……所以我想要盡一點努力，才會來到這裡。"
34180-152 = "……我要怎麼確定你是真心的呢？"
34180-153 = "嗯……這個反應我能理解。#n所以我也想過了。"
34180-154 = "讓你們奧利斯的一個學生轉學到三一如何？#n當然，這件事會對外保密。"
34180-155 = "只要有我在背後協助的話總會有辦法的。#n別看我這樣，我也是茶會的一員呢。"
34180-156 = "……"
34180-157 = "這樣的話，就能夠證明奧利斯的學生可以順利地在我們的校園裡好好生活，變得幸福的。"
34180-159 = "也就是要讓那孩子成為「和解的象徵」。你覺得怎麼樣？"
34180-163 = "……真是荒唐無稽的計畫。"
34180-164 = "可，可是……如果能有這個象徵存在的話，我覺得聖亞醬和渚醬一定也能接受的！"
34180-165 = "……"
34180-166 = "好吧。但是，這不是我一個人就能決定的問題。#n需要你等待我們之後的聯絡。"
34180-167 = "咦？等，等一下！#n真的有那種孩子嗎？"
34180-168 = "……"
34180-175 = "梓，有任務要交給你。"
34180-179 = "……是什麼？"
34180-181 = "和解？還真是個純真到讓人震驚的想法呢。如果不是陷阱反而還比較奇怪。"
34180-182 = "呼姆……嘛，也不需要急於一時。#n究竟是無瑕的天使還是腹黑的蛇，暫且先觀察一下吧。"
34180-183 = "請先拒絕吧。#n然後適當地保持這份關係，探聽三一的情報吧。"
34180-184 = "要拒絕……是嗎？"
34180-185 = "當然了。和解的象徵？在說什麼夢話。#n把她當成獲得三一情報的道具來利用吧。"
34180-186 = "……"
34180-187 = "沙織……有什麼問題嗎？#n難道你未經我的允許做了什麼準備嗎？"
34180-188 = "沒，沒有……不是這樣的，夫人。"
34180-189 = "難道你忘記了嗎？#n讓你們受苦的理由──讓你們挨餓受凍最根本的理由是什麼？"
34180-190 = "……這都是把我們流放的三一的錯。"
34180-191 = "沒錯。要讓仇恨和解是永遠不可能的。#n──切記，別忘了你的憎恨。"
34180-192 = "是的，夫人。#n我不會忘記憎恨。"
34180-194 = "我也不知道為什麼……不過如果是梓的話……#n梓的話……"
34180-195 = "或許……我也想過要讓梓成為那樣的存在吧……"
34180-196 = "……"
34180-197 = "不過，能夠親眼確認的機會永遠不會到來了……"
34180-201 = "……聖亞醬就在這裡。"
34180-202 = "只要能安靜地把她送進醫院的話……"
34180-203 = "就是這樣，交給你們囉。"
34180-205 = "……"
34180-206 = "……夫人沒有放過那個機會。#n因為聖亞對夫人來說是個礙眼的存在。"
34180-207 = "你只是把我們當成好用的私兵來使用吧。#n不然也不會把最高機密的聖亞的位置說出來。"
34180-208 = "不過，我們可不是那種方便的存在。#n我們可是……"
34180-210 = "對「破壞光環的方法」加以學習、訓練，就連道具都有的……#n殺人集團。"
34180-212 = "我們被下達了用「破壞光環的炸彈」殺了聖亞的任務。"
34180-216 = "梓她……因為要作為和解的象徵而盡可能地學習了三一的知識，所以被投入了這個任務。"
34180-224 = "……渚醬在計畫一些可疑的事。"
34180-225 = "……"
34180-226 = "在聖亞醬死了之後她就像瘋了一樣。#n竟然想和格黑娜簽訂和平條約，真是受不了渚醬……"
34180-227 = "所以──沒錯。我希望能夠開始之前提過的計畫。"
34180-229 = "將間諜送進三一內部。不過和聖亞醬那時候不同，要用更謹慎一點的方法。"
34180-231 = "彌香……"
34180-232 = "我沒能理解你。#n你究竟期望著什麼，我也毫無頭緒。"
34180-233 = "也想過或許你單純只是個笨蛋……但是，如果你真的是這麼想的話……"
34180-234 = "第一次聽見「和解」這個詞的時候……儘管我想著你到底在胡說八道些什麼……"
34180-235 = "卻也想過，如果我們也能夠擁有「那種未來」的話……"
34180-236 = "這樣的想法，無法完全從我的心裡消失……"
34180-237 = "……"
34180-238 = "彌香，其實你……"
34180-243 = "是真心想要跟我們和解的對吧。"
34180-244 = "……"
34180-245 = "你帶著善意來見了我們。#n而踐踏、欺騙你的心意，把你導向這個地獄的是我。"
34180-246 = "而你無法接受這個地獄……所以才會選擇遺忘、否定自己的記憶。"
34180-247 = "沒錯，不只是你……"
34180-248 = "……讓公主不得不把臉和聲音隱藏起來的是我、#n把日和跟美咲拉進小隊的是我……"
34180-249 = "就連不是作為「和解的象徵」，而是「殺人兇手」──不得不成為欺騙所有人的「間諜」，再次被送進三一的梓也是……"
34180-250 = "──全都是我的錯。"
34180-251 = "我才……不是什麼獵犬。我是……"
34180-252 = "向周圍的一切散布痛苦的……瘟神。"
34180-253 = "……"
34180-254 = "想要問梓的事情，嗎……#n沒錯……是有件事想問……"
34180-255 = "明明背負了這一切，梓卻……"
34180-256 = "……看起來很幸福。"
34180-257 = "不向任何人表達感情，到最後都沒有接受我們。#n貫徹了孤獨的梓……"
34180-259 = "像是水裡的貝殼一樣緊緊封閉了內心的那孩子……"
34180-270 = "和朋友……和大人齊心協力……"
34180-271 = "最終，渡過了苦難……"
34180-272 = "走到了那充滿幸福的晴朗藍天之下……"
34180-274 = "不……沒有那種事。#n那種……那種事都是騙人的。都是假的！"
34180-275 = "只不過是總有一天會像海市蜃樓一樣消逝的幸福！"
34180-279 = "就算低頭祈禱也不會有任何改變！"
34180-280 = "梓，我們無法獲得幸福的結局。#n你也很清楚吧？── 一切都是徒勞的。"
34180-282 = "結果……我卻不得不認同……"
34180-285 = "啊啊……沒錯。"
34180-286 = "我們的憎恨……「一切都是徒勞」這句話……#n我所做的一切……"
34180-287 = "──全部都是謊言啊……"
34180-288 = "愚鈍又懦弱的我……像瘟神一樣把周圍的一切推向了毀滅……"
34180-299 = "──唉，原來是這樣啊。#n全部都是因為我。"
34180-300 = "梓因為離開了我而獲得了幸福。"
34180-301 = "我卻將這份真實否定到了最後嗎……"
34180-303 = "梓，如果是你……會知道正確答案嗎？"
34180-304 = "梓……我也……"
34180-305 = "──能夠，獲得幸福嗎？"
34180-306 = "要怎麼做才能像你一樣呢。#n我也有那種機會嗎？我也能抱持著那種願望嗎……？"
34180-307 = "如果……我能夠……"
34180-310 = "……早點，遇到善良的大人的話……"
34180-311 = "就連這樣的我……也能有不一樣的人生嗎……"
34180-312 = "不是這種悲慘的結局，而是迎向不同的未來……"
34180-313 = "我也能……擁有……那種機會嗎……"
34180-314 = "梓……你當時……說了什麼呢？"
34180-315 = "我……要……"
34180-319 = "……彌香。"
34180-320 = "我已經這副模樣了。#n──隨你處置吧。把你被奪走的份全都奪走吧。"
34180-321 = "讓有著善良內心的你……變成憎恨的「魔女」的，#n不是別人正是我。"
34180-322 = "我從別人那裡奪走了太多……這樣或許能公平一點了吧……"
34180-332 = "啊啊……本來以為負責這個的會是梓……#n沒想到會是你啊，彌香。"
34180-340 = "……？"
34180-341 = "……我，我……"
34180-342 = "我……做不到。"
34180-343 = "這種事，我做不到……#n因為……"
34180-344 = "我也……"
34180-345 = "和你一樣，期望著那種機會……"
34180-346 = "我也想……獲得幸福……"
34180-347 = "我也，和你一樣……如果能早點遇到老師的話。#n那樣的話……或許就能夠挽回我犯下的錯了……"
34180-352 = "我把這些都當作是理所當然的處罰而接受了……#n但是，還是想獲得寬恕，所以不斷地祈禱著。"
34180-353 = "不過……卻都沒有用。"
34180-354 = "我所犯下的無可挽回的錯誤，#n究竟要怎麼獲得原諒，我完全不知道……"
34180-355 = "就連第二次的機會也……"
34180-356 = "老師和大家為了我聚在一起……讓我能夠重新來過。#n我也相信著，會有這種機會……不過並沒有……並沒有那種未來……"
34180-357 = "只是在這一切都是徒勞的世界裡，苦苦祈求著救贖而已。"
34180-359 = "你……就是我啊，沙織……"
34180-360 = "你沒有辦法獲得幸福。#n就像我無法獲得幸福一樣。"
34180-361 = "那是不可能的。已經無法回頭的我們，不會再有第二次機會了。"
34180-363 = "所以，我才會希望你也能「公平地」獲得痛苦也說不定……"
34180-364 = "不過，正因為如此……我才做不到……"
34180-365 = "我，如果讓你有了這種結局……"
34180-366 = "就會成為我也無法獲得救贖的證明……"
34180-371 = "彌香……你……"

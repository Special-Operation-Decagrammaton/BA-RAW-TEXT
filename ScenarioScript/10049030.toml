[translation]
10049030-1 = "ตอนที่ 3;เพราะหลงใหลในสาวน้อยเวทมนตร์มากเกินไป"
10049030-2 = "[log]3 วันก่อน ที่ห้องพักผ่อนชมรมอ่านหนังสือ[/log]"
10049030-4 = "เอาอันนี้ละค่ะ!!"
10049030-5 = "อันนี้... อันไหนคะ?"
10049030-6 = "คะ?"
10049030-10 = "แปลงร่างเป็นสาวน้อยเวทมนตร์!"
10049030-11 = "ฮุ... อุฮุฮุ... ไม่คิดเลยนะคะว่าจะได้พูดประโยคนี้ขึ้นมาจริงๆ"
10049030-12 = "<สาวน้อยเวทมนตร์ เฮฟวี่ แคลิเบอร์ บอเดอร์แลนด์ สเปเชียล>...? นี่มันอะไรเหรอคะ?"
10049030-13 = "สาวน้อยเวทมนตร์ เฮฟวี่ แคลิเบอร์จะมาจัดกิจกรรมพิเศษในสวนสนุกบอเดอร์แลนด์ค่ะ!"
10049030-14 = "ดูจากแผ่นพับแล้วก็น่าจะใช่นะคะ แต่ว่างานนี้คืออะไรกันแน่..."
10049030-16 = "เป็นงานที่หลายๆ คนแต่งคอสเพลย์แล้วมาทำการแสดงกันในสวนสนุกบอเดอร์แลนด์ค่ะ"
10049030-17 = "ได้ยินว่าสวนสนุกกว้างจนต้องมีทีมซ้ำกันเลยนะคะ"
10049030-18 = "แล้วมันเกี่ยวกับงานของเรายังไงเหรอคะ คุณเรอิสะ...?"
10049030-19 = "ตอนเราแฝงตัวเข้าไป เราแต่งตัวเป็นสาวน้อยเวทมนตร์กันมั้ยคะ?"
10049030-20 = "ในเมื่อมีหลายทีมอยู่แล้ว ถ้ามีเพิ่มเข้ามาอีกทีมคงไม่ใช่เรื่องแปลกหรอกค่ะ!"
10049030-21 = "ไม่ว่าจะอยู่ตรงไหนของสวนสนุกก็กลมกลืนแน่นอนค่ะ!"
10049030-23 = "แล้วนักแสดงของอีเวนต์ก็เป็นคนจากภายนอกทั้งหมดด้วย เพราะงั้นต่อให้หน้าแปลก พนักงานของสวนสนุกก็ไม่สงสัยหรอกค่ะ"
10049030-24 = "อย่างนี้นี่เองสินะคะ..."
10049030-25 = "ฉันจำได้ว่าตอนเด็กๆ เคยดูแอนิเมชันคล้ายๆ แบบนี้ค่ะ น่าจะเป็นเรื่องที่ออกอากาศตอนเช้านะ... ใช่มั้ยคะ?"
10049030-26 = "ไม่ใช่ค่ะ!! มะ... ไม่สิ มันก็เป็นแอนิเมชันที่ฉายทางทีวีตอนเช้าอยู่หรอกค่ะ!"
10049030-27 = "สาวน้อยเวทมนตร์ เฮฟวี่ แคลิเบอร์เป็นเรื่องราวของสาวน้อยที่ถูกเลือกมาให้ปกป้องคิโวทอสจากการ#nรุกรานของเอร่าที่เป็นหัวหน้าวายร้ายค่ะ!"
10049030-28 = "ยะ... อย่างนี้นี่เองสินะคะ..."
10049030-29 = "แต่ถ้าเราปลอมตัวเป็นตัวละครแบบนี้ เสื้อผ้าที่ใส่อาจทำให้เราเสียเปรียบตอนต่อสู้ค่ะ"
10049030-30 = "แล้วการพกปืนติดตัวก็น่าจะไม่สะดวกด้วย..."
10049030-31 = "และที่สำคัญ ฉันไม่ค่อยรู้เกี่ยวกับตัวละครแบบนี้เท่าไรค่ะ..."
10049030-32 = "ฉันเองก็ไม่เคยดูแอนิเมชันสาวน้อยเวทมนตร์เลยสักครั้ง..."
10049030-33 = "แล้วก็... มันน่าเขินด้วยค่ะ..."
10049030-34 = "อ๊ะ... งะ... งั้นเหรอคะ"
10049030-35 = "เข้าใจแล้วค่ะ ฉันคิดว่านั่นอาจจะช่วยได้น่ะค่ะ ไม่ได้มีไอเดียดีๆ แบบนี้มานานแล้วด้วย"
10049030-36 = "แหะๆๆ งั้นฉันจะคิดหาวิธีอื่นดูนะคะ!"
10049030-40 = "มะ... ไม่ค่ะ!! ที่ฉันอยากบอกก็คือ..."
10049030-41 = "ในทางกลับกัน ยิ่งใส่ชุดแบบนั้น อีกฝ่ายก็จะยิ่งคิดว่าเราไม่ได้มาเพื่อต่อสู้"
10049030-42 = "ฉะ... ฉันก็เลยคิดว่านั่นเป็นกลยุทธ์แฝงตัวที่ยอดเยี่ยมเลยค่ะ!"
10049030-43 = "คุณสึซึมิ...?"
10049030-45 = "แต่พอมาคิดดูอีกครั้ง ฉันว่าสาวน้อยเวทมนตร์มันดูเบียวเกินไป..."
10049030-46 = "มะ... ไม่เลยค่ะ! ฉันว่าสาวน้อยเวทมนตร์ แฮปปี้ แคลิเบอร์? เป็นไอเดียที่ปังแบบตะโกนมากเลยนะคะ!"
10049030-48 = "'เฮฟวี่ แคลิเบอร์' หรือเปล่าคะ?"
10049030-49 = "ค่ะ ฉันว่าปังแบบตะโกน เกินต้านมากค่ะ!"
10049030-50 = "แต่ว่า... ถ้าจะคอสเพลย์เป็นอะไร ก็ต้องมีความรู้เกี่ยวกับสิ่งนั้นค่ะ"
10049030-51 = "คุณเรอิสะรู้จักแอนิเมชันเรื่องนั้นดีเลยใช่มั้ยคะ?"
10049030-52 = "ค่ะ! ฉันชอบสุดๆ ไปเลยละค่ะ!"
10049030-53 = "ต้องบอกว่าการปกป้องสันติสุขของโลกของสาวน้อยเหล่านั้น มันก็เหมือนกับการทำงานของกลุ่ม#nรักษาความสงบเลยละค่ะ"
10049030-54 = "ฉันชอบสาวน้อยเวทมนตร์มากๆ มาตั้งแต่เด็กๆ เลยค่ะ!"
10049030-55 = "หนังที่เพิ่งเข้าฉายไป ฉันก็ไปดูมาแล้วนะคะ!"
10049030-56 = "ถึงจะคุยเรื่องเฮฟวี่ แคลิเบอร์กับใครไม่ได้เลย... ก็เถอะค่ะ..."
10049030-57 = "......"
10049030-62 = "อืม งั้นช่วยจัดหาชุดให้ก่อนเลยได้มั้ยคะ?"
10049030-63 = "เอาแบบที่คุณเรอิสะชอบที่สุด และขอเร็วที่สุดด้วยค่ะ"
10049030-65 = "คุณสึซึมิ?!"
10049030-69 = "จริงเหรอคะ?! งั้นฉันจะไปเตรียมชุดเดี๋ยวนี้เลยค่ะ!"
10049030-74 = "(ทำไมฉันถึงพูดอย่างนั้นไปนะ...)"
10049030-75 = "(คุณเรอิสะเป็นคนที่มีความมุ่งมั่นและมีฝีมือในการแฝงตัวก็จริง แต่ว่า...)"
10049030-76 = "(ให้แต่งตัวจัดเต็มแบบนี้มันก็น่าอายอยู่หรอก...)"
10049030-77 = "เหมาะกับคุณสึซึมิจะตายไป! ไม่ต้องเขินหรอกค่ะ!"
10049030-78 = "ฉันคิดถูกแล้วนะคะที่สละบทบาทตัวเอกให้! คุณสึซึมิมีออร่าของตัวเอกเลยค่ะ..."
10049030-79 = "ไม่สิ จากนี้ต้องเรียกว่า <เทอร์ไมต์ ไวต์>!"
10049030-80 = "ทะ... เทอร์ไมต์ ไวต์เหรอคะ...?"
10049030-81 = "เป็นชื่อของตัวละครที่คุณสึซึมิสวมบทบาทอยู่ค่ะ ถ้าเราเรียกกันด้วยชื่อจริงในที่ที่คนพลุกพล่าน ตัวตนของเราก็อาจถูกเปิดเผยได้นี่คะ!"
10049030-82 = "ส่วนฉันก็ <เทอร์ไมต์ พิงค์>! เป็นเพื่อนสนิทที่คอยช่วย <เทอร์ไมต์ ไวต์> อีกทีค่ะ!"
10049030-83 = "ยะ... อย่างนี้นี่เองสินะคะ คุณเรอิ..."
10049030-89 = "คุณเทอร์ไมต์ พิงค์..."
10049030-93 = "แต่ว่า... ทำไมถึงเป็นเทอร์ไมต์ 'พิงค์' ล่ะคะ?"
10049030-94 = "ชุดของคุณเรอิสะเป็นสีม่วง งั้นก็ควรเป็น 'เพอร์เพิล' ไม่ใช่เหรอคะ?"
10049030-95 = "อ๊ะ! เป็นคำถามที่ดีมากค่ะ!"
10049030-101 = "[log=레이사 매지컬]ถ้าจะอธิบายเรื่องนั้น ก็คงต้องเล่าตั้งแต่วันที่ฉันเริ่มดู <สาวน้อยเวทมนตร์ เฮฟวี่ แคลิเบอร์> เป็นครั้งแรกตอนยังเป็นเด็กค่ะ เดิมทีแล้วคอสตูมหลักของเทอร์ไมต์ พิงค์[/log]"
10049030-102 = "[log=레이사 매지컬]เป็นอัญมณีรูปหัวใจกับชุดสีชมพูค่ะ! แต่ระหว่างการดวลกับซิลเวอร์เพลต ผู้เป็นสมุนที่ซื่อสัตย์ของเอร่าในภาค <โบลต์ แคตช์! เฮฟวี่ แคลิเบอร์!> จนต้องเผชิญกับวิกฤต[/log]"
10049030-103 = "[log=레이사 매지컬]พิงค์ได้ทำเฟรนด์ชิพฟิวชันกับไวต์ค่ะ แต่ถึงจะถูกปลุกพลังขึ้นมาใหม่ แต่ทั้ง 2 คนก็กำจัดซิลเวอร์เพลตไม่ได้ ส่วนซิลเวอร์เพลตที่เป็นศัตรูเก่าแก่ก็...[/log]"
10049030-107 = "ดะ... เดี๋ยว..."
10049030-109 = "[log=레이사 매지컬]ก็พยายามจะส่งพลังแห่งมิตรภาพไปยังดาวเคราะห์แห่งความเกลียดชัง และในตอนนั้นเองพิงค์ก็ปรากฏตัวขึ้นและปราบเขาได้ค่ะ ก็เลย...[/log]"
10049030-117 = "เรื่องมันก็เป็นแบบนี้ละค่ะ...! ตอนนั้นพิงค์แปลงร่างพิเศษแล้วได้ใส่ชุดสีนี้น่ะค่ะ ฉันชอบตอนนั้นมาก ก็เลยเลือกชุดนี้มาใส่ค่ะ! สรุปก็คือนี่ไม่ใช่พิงค์ร่างปกติ แต่เป็นร่างที่ปลดปล่อยพลังที่แท้จริงออกมา!"
10049030-118 = "ยะ... อย่างนี้สินะคะ... เข้าใจถ่องแท้แล้วค่ะ..."
10049030-119 = "แต่ว่า คุณเร... เทอร์ไมต์ พิงค์ ติดต่อคุณชิมิโกะได้หรือยังคะ?"
10049030-120 = "ต้องเรียกว่า 'เอร่า' ค่ะ เป็นหัวหน้าของวายร้ายไงคะ!"
10049030-121 = "งั้น 'เอร่า' อยู่ที่ไหนเหรอคะ...?"
10049030-122 = "คือว่า... ที่จริงฉันก็ติดต่อไม่ได้เหมือนกันค่ะ"
10049030-123 = "หรือว่าจะนอนตื่นสายนะ..."
10049030-124 = "เราขอให้เอร่ามาช่วยเป็นแบ็กอัปให้ และที่จริงแค่เรา 2 คนก็พอสังเกตการณ์เบื้องต้นได้อยู่"
10049030-125 = "แต่หวังว่าจะไม่มีเหตุร้ายแรงอะไรเกิดขึ้นนะคะ"
10049030-130 = "ฉันมาชิโระจากชมรมทวงความยุติธรรมที่มาช่วยสนับสนุนวันนี้ค่ะ กลุ่มรักษาความสงบคะ ได้ยินฉันชัดเจนมั้ยคะ?"
10049030-132 = "ได้ยินชัดเจนค่ะ"
10049030-133 = "เทอร์ไมต์ พิงค์ก็ได้ยินชัดแจ๋วค่ะ!"
10049030-135 = "ค่ะ เช็กความไวในการตอบสนองเรียบร้อยค่ะ ถ้าต้องการความช่วยเหลือก็ให้แจ้งได้เลยนะคะ"
10049030-136 = "ฉันมาเฝ้าสังเกตการณ์อยู่บนหอชมวิวฝั่งทรีนิตี้น่ะค่ะ"
10049030-138 = "เข้าใจแล้วค่ะ แล้วฉันจะพิจารณาทัศนวิสัยในการยิงปืนค่ะ"
10049030-140 = "คุณครูก็ได้ยินใช่มั้ยคะ?"
10049030-141 = "[s] \"อื้อ ครูก็ได้ยินชัดเจนเลย\""
10049030-142 = "ค่ะ รับทราบค่ะ ถ้าต้องการฉันก็เรียกนะคะ คุณครู"
10049030-144 = "งั้นก็ถือว่าตรวจสอบการติดต่อสื่อสารเสร็จแล้วนะคะ"
10049030-145 = "คุณมาชิโระ ขอบคุณสำหรับการสนับสนุนค่ะ"
10049030-150 = "คะ... คุณครู?!"
10049030-151 = "คุณครู!"
10049030-152 = "[s1] \"สวัสดี สึซึมิ เรอิสะ\"\n[s2] \"สวัสดี เทอร์ไมต์ ไวต์ เทอร์ไมต์ พิงค์\""
10049030-156 = "มะ... มะมะมะมะ... มาอยู่ตรงนี้ตั้งแต่เมื่อไรคะ?!"
10049030-160 = "อ่า... อ๊ะ... ชุดนี้ คือว่ามัน...!"
10049030-161 = "[s3] \"มาตั้งแต่ตอนที่สึซึมิบอกว่ายังเตรียมใจไม่ได้แล้ว\"\n[s4] \"ใส่ชุดนี้แล้วน่ารักดีนะ สึซึมิ\""
10049030-165 = "ฉันได้ยินข้อมูลที่เกี่ยวข้องมาจากรุ่นพี่ฮาสุมิค่ะ"
10049030-166 = "คนที่มาให้การสนับสนุนที่หน้างานได้ก็คือฉันกับคุณครูค่ะ"
10049030-167 = "ฉันไม่เห็นได้รับแจ้งเลยนะคะว่าคุณครูจะมาด้วย?!"
10049030-168 = "หืม? คุณสึซึมิไม่รู้หรอกเหรอคะ?"
10049030-169 = "จะไปรู้ได้ยังไงล่ะคะ!"
10049030-171 = "รุ่นพี่ฮาสุมิบอกว่าไปขอความร่วมมือจากคุณครูในฐานะ 'การสนับสนุนที่ดีที่สุดเท่าที่จะเป็นไปได้' มาค่ะ"
10049030-172 = "แต่ฉันก็ไม่รู้รายละเอียดอื่นหรอกนะคะ..."
10049030-173 = "ยะ... อย่างนั้นสินะคะ คิดไม่ถึงเลยนะคะว่าจะได้รับการสนับสนุนจากชาเล่ต์ด้วย"
10049030-174 = "[s5] \"ครูคิดว่าสึซึมิต้องการความช่วยเหลือน่ะ!\"\n[s6] \"ครูอยากมาช่วยน่ะ แล้วมันก็น่าสนุกดีด้วย!\""
10049030-177 = "(ฉันไม่ได้เจอคุณครูนานแล้ว การได้มาเจออีกครั้งมันก็น่าดีใจอยู่หรอก...)"
10049030-178 = "(แต่พออยู่ในชุดแบบนี้ มันก็...)"
10049030-179 = "ก่อนฉันจะกลับไปสแตนด์บาย ฉันมีบางอย่างจะแจ้งค่ะ"
10049030-180 = "พวกคุณทั้ง 2 คนดูมีเอกลักษณ์จังเลยนะคะ"
10049030-181 = "ชุดที่ใส่... เป็นยูนิฟอร์มของกลุ่มรักษาความสงบหรือเปล่าคะ?"
10049030-182 = "ฉันว่ามันหรูหราและเท่มากค่ะ ต่างกับของชมรมทวงความยุติธรรมเลย"
10049030-183 = "ไม่ใช่อย่างนั้นหรอกค่ะ กลุ่มรักษาความสงบไม่ใช่องค์กรอะไร เราก็เลยไม่มียูนิฟอร์มต่างหากน่ะค่ะ..."
10049030-184 = "เอาเป็นว่าชุดนี้คือ... ชุดปฏิบัติการสำหรับการลาดตระเวนภาคสนาม..."
10049030-186 = "วันนี้พวกฉันคือดูโอ้เพื่อนรักจาก <สาวน้อยเวทมนตร์ เฮฟวี่ แคลิเบอร์>! เทอร์ไมต์ ไวต์ กับเทอร์ไมต์ พิงค์ค่ะ!"
10049030-187 = "และนี่ก็คือชุดของสาวน้อยเวทมนตร์ที่ปกป้องสันติสุขและความยุติธรรมของโลกค่ะ!"
10049030-188 = "......"
10049030-189 = "......"
10049030-193 = "เท่ระเบิดเลย...!"
10049030-194 = "เครื่องแต่งกายของนักรบที่ปกป้องความยุติธรรม... พอดูอีกครั้งก็สมเหตุสมผลดีนะคะ"
10049030-195 = "......"
10049030-196 = "จากที่ฟังเมื่อกี้ รหัสของคุณสึซึมิคือ 'เทอร์ไมต์ ไวต์' แต่น่าจะต้องเป็น 'พิงค์' มากกว่าหรือเปล่าคะ? ชุดของคุณสึซึมิก็สีชมพูด้วย..."
10049030-197 = "อ๊ะ! เป็นคำถามที่ดีมากค่ะ! ถ้าจะอธิบายว่าทำไมคุณสึซึมิชื่อว่าไวต์แต่ใส่ชุดสีชมพูละก็! ต้องเล่าเรื่องจากภาค 3 ตอนที่ 7 ก่อนค่ะ! สรุปโดยย่อก็คือ..."
10049030-199 = "ระ... รหัสของฉันคือไวต์ถูกแล้วค่ะ ขอบคุณที่ใส่ใจนะคะ!"
10049030-200 = "คุณเรอิสะ ถ้าเล่าก็อาจเป็นการสปอยล์ได้นะคะ ไว้เราค่อยดูด้วยกันทีหลังเถอะค่ะ"
10049030-201 = "อ๊ะ! ดีเลยค่ะ! แล้วฉันจะขน DVD มาให้หมดเลย!"
10049030-202 = "ถ้างั้นจากนี้ไปฉันจะไปสแตนด์บายนะคะ"
10049030-203 = "เรื่องการเฝ้าระวังและซุ่มยิง ปล่อยให้เป็นหน้าที่ของฉันได้เลยค่ะ"
10049030-204 = "แต่ขอแจ้งไว้ก่อนว่าการยิงต้องได้รับการอนุญาตจากชมรมทวงความยุติธรรมก่อนค่ะ"
10049030-208 = "เฮ้อ..."
10049030-209 = "กลับไปใส่ชุดเดิมตอนนี้จะทันมั้ยนะ..."
10049030-210 = "อะไรกันคะ ใส่ชุดนี้แล้วน่ารักดีออก!"
10049030-211 = "แต่ถึงยังไง... ฉันก็ยังเขินอยู่ดี..."
10049030-212 = "นี่พวกคุณ! ตรงนั้นน่ะ! ทำไมไม่ไปรอในห้องพักนักแสดงล่ะครับ!"
10049030-213 = "รีบไปเตรียมตัวเร็วเข้าครับ นี่มันสายแล้วนะ!"
10049030-214 = "พะ... พวกฉันเหรอคะ?"
10049030-215 = "คะ?"
10049030-216 = "ทีเมื่อกี้ละบอกว่าถูกพนักงานรถไฟไล่ลงมาจากรถไฟจนมาทำงานไม่ได้"
10049030-217 = "แต่ก็เอาเถอะ ในเมื่อมาถึงแล้วก็รีบๆ เริ่มเถอะครับ"
10049030-218 = "เริ่มงั้นเหรอ เริ่มอะไรคะ?"
10049030-223 = "ถามมาได้ ก็โชว์บนเวทีของ <สาวน้อยเวทมนตร์ เฮฟวี่ แคลิเบอร์> ยังไงล่ะครับ!"
10049030-224 = "รีบไปเตรียมโชว์ได้แล้วครับ คุณนักแสดง!"
10049030-225 = "นะ... นักแสดงเหรอคะ?!"

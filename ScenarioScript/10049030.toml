[translation]
10049030-1 = "第3話;因為太過憧憬魔法少女"
10049030-2 = "[log]三天前，圖書委員會休息室[/log]"
10049030-4 = "就是這個！！"
10049030-5 = "這個……是指？"
10049030-6 = "嗯？"
10049030-10 = "請成為魔法少女吧！"
10049030-11 = "耶嘿嘿……沒想到真的能碰上可以說出這句台詞的時候。"
10049030-12 = "「魔法少女Heavy Caliber．Borderlands特別篇」……？#n這是什麼呢？"
10049030-13 = "是魔法少女Heavy Caliber在Borderlands遊樂園舉辦的特別活動！"
10049030-14 = "看起來是這樣沒錯，不過具體來說是什麼活動……？"
10049030-16 = "似乎是在Borderlands遊樂園裡，由多名扮成角色的演員在園區遊走表演的活動。"
10049030-17 = "「因為園區很大，所以會分為許多隊伍」……上面是這樣寫的。"
10049030-18 = "澪紗同學，這跟我們這次的任務有什麼關聯呢……？"
10049030-19 = "在潛伏的時候，我們變裝成魔法少女怎麼樣呢！"
10049030-20 = "既然有很多隊伍，就算多混一組進去也不會被發現的！"
10049030-21 = "這樣不管出現在遊樂園的哪裡都不會顯得突兀！"
10049030-23 = "而且活動演員都是從外部邀請來的……就算工作人員見到陌生的面孔也不會起疑心。"
10049030-24 = "原來如此……"
10049030-25 = "我小時候好像看過類似的動畫。#n記得好像是在早上播的……跟我印象中的一樣嗎？"
10049030-26 = "不對！！啊，雖然確實是早上播的電視動畫沒錯啦！"
10049030-27 = "魔法少女Heavy Caliber是講述被選中的少女們，#n從惡之幹部「艾拉」的侵略中守護奇普托斯的故事！"
10049030-28 = "這，這樣啊……"
10049030-29 = "不過偽裝成這種角色的話，服裝在戰鬥的時候恐怕不太方便。"
10049030-30 = "要額外穿戴裝備也有點困難……"
10049030-31 = "更何況，我對這類型的作品實在很不熟悉……"
10049030-32 = "我也完全沒接觸過魔法少女相關的作品……"
10049030-33 = "而且……多少有點害羞……"
10049030-34 = "啊，這，這樣啊。"
10049030-35 = "我明白了。#n剛才只是想說或許能派上用場……難得想到了不錯的點子而已。"
10049030-36 = "耶嘿嘿，那我們再來想想其他方法吧！"
10049030-40 = "不，不是的！我想說的是……"
10049030-41 = "這種服裝反而能讓對方誤以為我們沒有敵意，進而放鬆警戒──"
10049030-42 = "所，所以是個很優秀的潛入方案！"
10049030-43 = "鈴美同學……？"
10049030-45 = "不過魔法少女感覺有點幼稚，我仔細想過之後覺得……"
10049030-46 = "不，不會的！#n魔法少女Happy……Galibur？我覺得非常帥氣！"
10049030-48 = "不是「Heavy Caliber」嗎？"
10049030-49 = "沒錯，總之就是非常帥氣！"
10049030-50 = "不過……既然要變裝，就必須先理解設定。"
10049030-51 = "澪紗同學很熟悉那部作品嗎？"
10049030-52 = "嗯！我超喜歡的！"
10049030-53 = "守護世界和平的樣子，簡直就跟自衛隊一樣。"
10049030-54 = "從小到大一直都是我最喜歡的作品！"
10049030-55 = "最近上映的劇場版我也去看了！"
10049030-56 = "雖然沒什麼機會跟別人聊Heavy Caliber的話題就是了……"
10049030-57 = "……"
10049030-62 = "那麼，可以請你現在馬上開始準備服裝嗎？"
10049030-63 = "盡可能挑澪紗同學最喜歡的那一套，然後越快越好。"
10049030-65 = "鈴美同學！？"
10049030-69 = "真的嗎！？我馬上去準備！！"
10049030-74 = "（我到底為什麼會說出那種話呢……）"
10049030-75 = "（雖然澪紗同學幹勁滿滿，對潛入而言也確實不差……）"
10049030-76 = "（不過穿這種服裝還是讓人好害羞……）"
10049030-77 = "非常適合你哦！不用感到害羞！"
10049030-78 = "讓出主角的位置果然是個正確的選擇！#n你真的很有主角的氣場哦，鈴美同……"
10049030-79 = "……不對，是「Thermite White」！"
10049030-80 = "Th-Thermite White……？"
10049030-81 = "要是在人多的地方用本名會暴露身分，所以這是鈴美同學負責的主角的名字哦！"
10049030-82 = "我是「Thermite Pink」！#n是協助「Thermite White」的最強好友兼搭檔！"
10049030-83 = "原，原來如此。澪……"
10049030-89 = "……Thermite Pink同學。"
10049030-93 = "不過你剛才說「Thermite Pink」……"
10049030-94 = "澪紗同學穿的是紫色的服裝，不是應該叫「Purple」才對嗎？"
10049030-95 = "啊！這個問題問得非常好！"
10049030-101 = "[log=레이사 매지컬]要解釋這點的話，就得從我小時候第一次看《魔法少女Heavy Caliber》的那天說起了。#n本來Thermite Pink的設計顧名思義是由心之寶石和[/log]"
10049030-102 = "[log=레이사 매지컬]粉紅禮服為主題！不過在與艾拉的忠實部下「Silver Plate」進行決戰的#n〈Bolt Catch! Heavy Caliber!〉中遭遇危機時，因為與White進行了友情融合[/log]"
10049030-103 = "[log=레이사 매지컬]而覺醒了新能力。但即便如此還是無法打倒Silver Plate，#n兩人都敗下陣來，而宿敵Silver Plate……[/log]"
10049030-107 = "先，先等一下……"
10049030-109 = "[log=레이사 매지컬]……就在要將友情能量送往憎惡之星的那個瞬間，#n以這個姿態出現的Pink現身並將其擊敗了。於是……[/log]"
10049030-117 = "……大概就是這麼回事！所以這是Pink的特殊變身形態！#n因為我非常喜歡那集的關係就選了這套！#n這並不是一般形態，而是解放真正力量的樣子哦！"
10049030-118 = "這，這樣啊……真是幫大忙了……"
10049030-119 = "對了，澪……不，Thermite Pink。#n你有聯絡到志美子同學嗎？"
10049030-120 = "是惡之幹部「艾拉」！"
10049030-121 = "……「艾拉」現在在哪裡呢？"
10049030-122 = "那個，其實我也聯絡不上他。"
10049030-123 = "該不會是睡過頭了吧……"
10049030-124 = "雖然因為有支援的關係，只靠我們兩個也還能應付現場的情況。"
10049030-125 = "希望不是出了什麼大事。"
10049030-130 = "我是前來支援的實現正義部麻白。#n兩位自衛隊的成員，請問通訊狀況如何？"
10049030-132 = "聽得非常清楚。"
10049030-133 = "Thermite Pink也完全沒問題！"
10049030-135 = "好的，我這邊也訊號良好。#n如果需要支援請透過這個頻道呼叫。"
10049030-136 = "我目前人在三一側的眺望塔上，提供給兩位參考。"
10049030-138 = "了解。我會一併考量射擊視野的。"
10049030-140 = "老師，你聽得見嗎？"
10049030-141 = "[s]「嗯，聽得見。」"
10049030-142 = "收到。如果有需要請隨時呼叫我，老師。"
10049030-144 = "這樣就完成通訊確認了呢。"
10049030-145 = "麻白同學，感謝支援。"
10049030-150 = "老，老師！？"
10049030-151 = "老師！"
10049030-152 = "[s1]「你們好呀，鈴美、澪紗。」\n[s2]「你們好呀，Thermite White、Pink。」"
10049030-156 = "您，您您您您，您是什麼時候……！？"
10049030-160 = "啊，那，那個，這套服裝是……！"
10049030-161 = "[s3]「從鈴美還沒做好心理準備的時候就在了哦。」\n[s4]「很適合你哦，鈴美。」"
10049030-165 = "我已經聽蓮實前輩說明過情況了。"
10049030-166 = "目前能到現場支援的，就只有我跟老師兩個人。"
10049030-167 = "我完全沒聽說老師會來啊！？"
10049030-168 = "咦？鈴美同學不知道嗎？"
10049030-169 = "我應該要知道嗎！？"
10049030-171 = "蓮實前輩表示作為「最大限度的支援」，他向老師發出了協助請求。"
10049030-172 = "不過詳細情況我也不太清楚……"
10049030-173 = "這，這樣啊。沒想到會得到夏萊的支援……"
10049030-174 = "[s5]「因為覺得鈴美看起來需要幫忙！」\n[s6]「而且看起來很好玩！」"
10049030-177 = "（久違見到老師雖然很高興……）"
10049030-178 = "（不過這副打扮果然還是有點……）"
10049030-179 = "進入無線待命前，我有件事想先詢問一下。"
10049030-180 = "兩位的服裝真是獨特呢。"
10049030-181 = "那是自衛隊的制服嗎？"
10049030-182 = "和實現正義部不同，我覺得很華麗又帥氣。"
10049030-183 = "不是這樣的。#n自衛隊本來就不是正式的組織，所以並沒有制服……"
10049030-184 = "這，這是……為了現場偵查的作戰服……"
10049030-186 = "我們是《魔法少女Heavy Caliber》的好友主角雙人組！#nThermite White跟Pink！"
10049030-187 = "這是守護世界和平、守護正義的魔法少女服裝哦！"
10049030-188 = "……"
10049030-189 = "……"
10049030-193 = "非常帥氣呢……！"
10049030-194 = "守護正義的戰士衣裝……這麼一看確實很合理。"
10049030-195 = "……"
10049030-196 = "不過鈴美同學的通訊代號寫著「Thermite White」……不應該是「Pink」才對嗎？#n從我這邊看起來，你的服裝也是粉紅色的……"
10049030-197 = "啊！真是個好問題呢！#n要解釋為什麼鈴美同學是White卻穿著粉色衣服的話，那就一定要看第3季第7集！#n簡單來說就是──"
10049030-199 = "通，通訊代號無誤。感謝確認！"
10049030-200 = "澪紗同學。這樣可能會劇透，不如大家之後再一起看吧？"
10049030-201 = "啊！好主意！我會把DVD全部帶來的！"
10049030-202 = "那麼即刻起，我將進入無線待命狀態。"
10049030-203 = "警戒與狙擊就交給我吧。"
10049030-204 = "不過請注意，狙擊需要取得實現正義部的開火許可。"
10049030-208 = "哈啊……"
10049030-209 = "果然還是換回便服偵查比較好嗎……"
10049030-210 = "咦咦，明明很適合的說！"
10049030-211 = "可是，真的好害羞……"
10049030-212 = "喂！那邊的！你們不是應該在準備室等嗎！"
10049030-213 = "快點去準備，已經要遲到了！"
10049030-214 = "是，是在說我們嗎？"
10049030-215 = "咦？"
10049030-216 = "剛才你們不是說，因為被乘務員丟下列車所以趕不上了嗎？"
10049030-217 = "算了，反正人來了就好。快點開始吧。"
10049030-218 = "開始……指的是？"
10049030-223 = "當然是《魔法少女Heavy Caliber》的舞台秀啊！"
10049030-224 = "快做好準備吧，演員們！"
10049030-225 = "演，演員！？"

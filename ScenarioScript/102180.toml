[translation]
102180-1 = "Episode 18; Ninjutsu Research Club's Special Mission"
102180-10 = "Wh-Whoa?! President, it's blocked here too!"
102180-11 = "U-Ugh. What's happening? Didn't they say the Great Snowfield would be safe?"
102180-12 = "All lies! These guys swarmed in the moment we set foot here!"
102180-13 = "D-Do you think...they followed us...?"
102180-14 = "Huh?! We were followed? How would they have known about our super secret mission?"
102180-15 = "There's no way! We didn't tell a single soul!"
102180-17 = "...Kekeke."
102180-25 = "W-We're surrounded everywhere! What should we do, President?"
102180-26 = "At this rate...we're going to..."
102180-27 = "Argh! No more of this! Everyone, this is the time to show our strength!"
102180-28 = "President..."
102180-30 = "President..."
102180-31 = "Schale's Sensei entrusted this mission to the Ninjutsu Research Club! We can't fail at the first obstacle!"
102180-32 = "A ninja never breaks their word!"
102180-33 = "Tsukuyo, Izuna! Let's show these creeps the strength of our ninja bond!"
102180-34 = "...The strength...of our bond. Yes, President!"
102180-35 = "Nin nin! I will not break my word to my lord!"
102180-36 = "All right, we can do this!"
102180-41 = "Special Michiru Ninjutsu!"
102180-42 = "Izuna ninjutsu...!"
102180-43 = "Ts-Tsukuyo ninjutsu..."
102180-50 = "Perfect! Now is our time!"
102180-51 = "Ultra-Invincible Steel Armor Toramaru!"
102180-52 = "Drop!"
102180-53 = "What you should drop is that name... *sigh*"
102180-54 = "Okay, okay. Descend. Woo. We're going."
102180-68 = "...? H-Huh?"
102180-69 = "What's that sound...?"
102180-71 = "President! Tsukuyo! Above us. Wow! A blimp is passing by!"
102180-72 = "Wh-What?! Something is falling..."
102180-80 = "Wh-What is that...?"
102180-81 = "What's happening...?"
102180-82 = "A-A tank...? A tank fell!"
102180-91 = "Kekekekeke! Excellent timing, Iroha!"
102180-92 = "Hahahaha. Wee! So fun! Droppity drop!"
102180-93 = "*sigh* ...Yeah, yeah. Is this the part where you finally tell me why we're here?"
102180-94 = "Huh? You didn't know? We came blazing in at the last minute to save a friend in need!"
102180-95 = "What?"
102180-96 = "Yes! Today, we're emerging as righteous allies! All for the ninjas Ibuki loves so dearly!"
102180-97 = "Hi, hi! It's Ibuki's ninja sisters! Ibuki came to help!"
102180-99 = "Oh...! I know that voice..."
102180-100 = "I-Ibuki?!"
102180-101 = "Iroha...? H-How did you...?"
102180-103 = "Kekeke... Don't underestimate my information network. I know everything that happens everywhere! Naturally, I was the first to know when the ninjas were assigned a dangerous meeting!"
102180-104 = "If the ninjas were to get hurt, our dear Ibuki would be heartbroken!"
102180-105 = "Therefore, to protect our precious angel, I had no choice but to wait in the shadows and swoop in to save the day at the perfect moment!"
102180-106 = "*sigh*"
102180-107 = "So... You came all the way here to make Ibuki happy?"
102180-108 = "Exactly! This is a great chance for me to get brownie points from Ibuki! I couldn't let go of this opportunity!"
102180-109 = "Ever since the pudding incident, Ibuki won't even look me in the eyes, let alone talk to me!"
102180-110 = "...I mean, you ate Ibuki's favorite pudding behind her back."
102180-111 = "I thought it was your pudding!"
102180-112 = "...And it's okay if it's my pudding?"
102180-113 = "Yup! Ibuki hated Makoto when that happened, but it's okay now! Makoto is the bestest!"
102180-114 = "Kyahahahaha! Did you hear that, Iroha? Save those ninjas right now!"
102180-118 = "Ultra-Invincible Steel Armor Toramaru! Mobilize!"
102180-120 = "*sigh* ...Fine. Mobilize."
102180-121 = "Hey! Ibuki's gonna help you!"
102180-123 = "Y-You're here to help us? Thank you!"
102180-124 = "Awesome! Let's do this!"
102180-125 = "Yay!"

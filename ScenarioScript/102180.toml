[translation]
102180-1 = "第18話;在大雪原之中"
102180-10 = "唔，唔哇！部長！這裡也被堵住了！"
102180-11 = "唔，這到底是怎麼回事……明明聽說大雪原比較安全……"
102180-12 = "可沒聽說會有這麼多敵人啊！"
102180-13 = "難，難道……是追著我們來的嗎？"
102180-14 = "追著伊樹菜來的嗎！？#n他們是怎麼知道特別任務的──"
102180-15 = "不，這個任務我沒有對任何人說，就算想說也沒有時間呀！"
102180-17 = "……嘻嘻嘻。"
102180-25 = "這，這邊也是……！被包圍了！#n該，該怎麼辦，部長？"
102180-26 = "這，這樣下去的話……我們……"
102180-27 = "啊啊啊！別說那種喪氣話！！"
102180-28 = "部長……"
102180-30 = "部長……！"
102180-31 = "這是老師信任著我們忍術研究部，所以才交給我們的任務！#n怎麼能因為這種程度的問題就失敗！"
102180-32 = "沒錯──「所謂忍者，就是絕對會遵守約定的人！」"
102180-33 = "月夜、伊樹菜！讓他們看看「忍者」的羈絆吧！"
102180-34 = "……羈絆的力量，對吧！是，部長！"
102180-35 = "是！伊樹菜一定會遵守和主公的約定！"
102180-36 = "好，那要上囉！！"
102180-41 = "三千留流忍法！！"
102180-42 = "伊樹菜流忍法！"
102180-43 = "月，月夜流，忍法……！"
102180-50 = "就是現在，上吧！！"
102180-51 = "「超無敵鐵甲『虎丸』」！！"
102180-52 = "降落！！！"
102180-53 = "那個名字未免也太……唉……"
102180-54 = "好，要降落囉。"
102180-68 = "……？#n咦，咦咦……？"
102180-69 = "這個聲音是……"
102180-71 = "部長，月夜閣下！！#n請看上面，是飛行船！"
102180-72 = "那，那是什麼！？#n好像有什麼東西掉下來了！？"
102180-80 = "什，什麼……"
102180-81 = "這，這個是……"
102180-82 = "戰車……！？#n從天上，掉下來了……！"
102180-91 = "嘻嘻嘻！時機抓得正好啊，伊呂波！"
102180-92 = "啊哈哈！好厲害～！降落～！"
102180-93 = "……啊啊，是。#n話說前輩，為什麼要來這裡呢？"
102180-94 = "你不知道嗎？那當然是為了幫助陷入危機的同伴！"
102180-95 = "……什麼？"
102180-96 = "啊啊，沒錯！是為了成為正義的夥伴！！#n也是為了伊吹最愛的忍者！！"
102180-97 = "你們好呀，忍者姐姐們！#n伊吹來幫忙了唷～！！"
102180-99 = "那，那個聲音是……！"
102180-100 = "伊，伊吹……！？"
102180-101 = "連伊呂波同學也……為什麼，會在這裡……？"
102180-103 = "嘻嘻嘻……小看我真琴大人的情報網的話，我可是會很困擾的。#n我掌握到了忍者們正在進行危險任務的情報啊！"
102180-104 = "如果伊吹最愛的忍者們受傷了，伊吹一定會很難過。"
102180-105 = "所以才會在上空靜觀其變，在千鈞一髮的瞬間出手幫忙！"
102180-106 = "……唉。"
102180-107 = "那，之所以會來這裡……也是為了伊吹？"
102180-108 = "啊啊，沒錯！！這是提高伊吹好感度的絕佳機會，我絕對不能錯過！！！"
102180-109 = "自從上次的布丁事件後，伊吹就不願意正眼看我啊！！"
102180-110 = "……那是因為你偷吃了伊吹珍惜的布丁吧。"
102180-111 = "我以為那是你的布丁啊！"
102180-112 = "我的布丁就能偷吃嗎……？"
102180-113 = "雖然很討厭那個時候的真琴前輩，但現在沒事了！最喜歡真琴前輩了！！"
102180-114 = "呀哈哈哈哈哈哈哈──！！聽見了嗎，伊呂波？#n明白的話就立刻去救那些忍者吧！！"
102180-118 = "超無敵鐵甲「虎丸」！！"
102180-120 = "唉，我知道了……出擊。"
102180-121 = "姐姐們！伊吹會幫忙的！"
102180-123 = "你，你們是來幫忙的嗎！謝謝！"
102180-124 = "那麼！要上囉！"
102180-125 = "是！！"

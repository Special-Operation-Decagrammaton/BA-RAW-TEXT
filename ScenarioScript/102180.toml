[translation]
102180-1 = "ตอนที่ 18;ภารกิจพิเศษของชมรมวิจัยศาสตร์นินจา"
102180-10 = "วะ... ว้ายยย!!! หัวหน้า ตรงนี้ก็ทางตันเหมือนกันค่ะ!"
102180-11 = "อะ... อึก... เกิดอะไรขึ้นน่ะ... ไหนว่าทุ่งหิมะใหญ่เป็นเขตปลอดภัยไง..."
102180-12 = "ทำไมพอมาถึงแล้วก็มาเจอเจ้าพวกนี้ออกมาเต็มไปหมด..."
102180-13 = "ระ... หรือว่าจะตามพวกเรามาคะ?"
102180-14 = "คะ?!  ตามเรามาเหรอ? ล่วงรู้ภารกิจพิเศษของพวกอิซุนะได้ไง..."
102180-15 = "ไม่หรอก ไม่มีทาง! คุณครูบอกว่านี่เป็นภารกิจลับที่ไม่มีใครรู้นี่นา..."
102180-17 = "หึหึหึหึ...."
102180-25 = "ทะ... ทางนี้ก็โดนล้อมเอาไว้แล้วเหมือนกันค่ะ! ทำไงดีคะหัวหน้า?"
102180-26 = "ถะ... ถ้าเป็นอย่างนี้ละก็... พวกเราคง..."
102180-27 = "อุว้ากกก! อย่าพูดอะไรเหมือนคนอ่อนแอสิ!!"
102180-28 = "ท่านหัวหน้า..."
102180-30 = "หัวหน้า..."
102180-31 = "นี่เป็นภารกิจที่ท่านอาจารย์แห่ง <ชาเล่ต์> มอบหมายให้ชมรมวิจัยศาสตร์นินจาทำเลยนะ! เราจะมายอมแพ้กันด้วยวิกฤตเล็กๆ แค่นี้ได้ไง!"
102180-32 = "<นินจาน่ะ! จะต้องรักษาสัญญาเสมอโดยไม่มีข้อยกเว้น>"
102180-33 = "สึคุโยะ อิซุนะ! เราต้องแสดงพลังแห่งสายสัมพันธ์ของพวกเราที่มีนินจาเป็นตัวเชื่อม!"
102180-34 = "พลังแห่งสายสัมพันธ์ ได้ค่ะ! หัวหน้า!"
102180-35 = "ค่ะ! อิซุนะก็จะรักษาสัญญาที่ให้ไว้กับนายท่านค่ะ!"
102180-36 = "เอาละ งั้นก็ไปกันเลย...!!"
102180-41 = "วิถีนินจามิจิรุ...!!!"
102180-42 = "วิถีนินจาอิซุนะ...!!"
102180-43 = "วะ... วิถีนินจาสึคุโยะ..."
102180-50 = "ดีเลย!!  ตอนนี้ละ!!"
102180-51 = "โทระมารุ เกราะเหล็กไร้เทียมทาน!!"
102180-52 = "โดดได้!!!"
102180-53 = "บอกว่าอย่าใช้ชื่อนั้น... เฮ้อ..."
102180-54 = "ค่ะ โดดเดี๋ยวนี้ค่ะ"
102180-68 = "......? เอ๊ะ เอ๋...?"
102180-69 = "เสียงนี้มัน..."
102180-71 = "หัวหน้า!! ท่านสึคุโยะ! ดูข้างบนสิคะ! มีเครื่องบินกำลังผ่านไปด้วยละค่ะ!"
102180-72 = "นะ... นั่นมันอะไรน่ะ?!  มีอะไรตกลงมาด้วย?!"
102180-80 = "มะ... มันอะไรกันล่ะนั่นน่ะ..."
102180-81 = "นะ... นี่มัน....."
102180-82 = "ระ... รถถัง...?! รถถังตกลงมาเหรอคะ?"
102180-91 = "หึหึหึหึหึหึหึหึ! จังหวะเป๊ะมาก อิโรฮะ!"
102180-92 = "อะฮ่าฮ่าฮ่าฮ่า! อื้อ! สนุกสุดๆ ไปเลย! โดดเลย!"
102180-93 = "เฮ้อ... ค่ะๆ ว่าแต่ ทำไมพวกเราถึงมาที่นี่กันเหรอคะรุ่นพี่?"
102180-94 = "อะไรกัน ไม่รู้หรอกเรอะ? ก็มาช่วยสหายที่ตกอยู่ในวิกฤตให้ทันท่วงทีไงล่ะ!"
102180-95 = "คะ...?"
102180-96 = "ใช่ เพื่ออยู่ข้างความยุติธรรม!! และเพื่อเหล่านินจาที่อิบูกิชอบไงเล่า!!"
102180-97 = "จ๊ะเอ๋พี่ๆ นินจา! อิบูกิมาช่วยแล้ว!!"
102180-99 = "อ๊ะ…! เสียงนี้มัน..."
102180-100 = "อิ... อิบูกิ...?!"
102180-101 = "คุณอิโรฮะด้วยเหรอ... ทำไมถึงรู้ว่าพวกเราอยู่ที่นี่...?"
102180-103 = "หึหึหึ... อย่าดูถูกเครือข่ายข่าวกรองของท่านมาโคโตะผู้นี้สิ เรารู้ทุกอย่างแหละ! แล้วก็รู้ด้วยว่าพวก#nนินจากำลังทำภารกิจอันตรายกันอยู่!"
102180-104 = "ถ้าพวกนินจาที่อิบูกิชอบได้รับบาดเจ็บ อิบูกิก็จะต้องเสียใจไปด้วย..."
102180-105 = "เราก็เลยเฝ้าดูอยู่เงียบๆ จนเห็นว่ากำลังตกอยู่ในวิกฤต ก็เลยออกมาช่วยแบบนี้น่ะ!"
102180-106 = "เฮ้อ..."
102180-107 = "งั้นที่มาที่นี่ก็... เพื่ออิบูกิงั้นสินะ...?"
102180-108 = "ใช่!! นี่คือโอกาสทองที่จะคว้าใจอิบูกิ!! จะพลาดไม่ได้เด็ดขาด!!!"
102180-109 = "หลังจากเหตุการณ์พุดดิ้งครั้งก่อน อิบูกิแทบไม่สบตาและไม่ยอมคุยกับเราเลยด้วยซ้ำ!!"
102180-110 = "ก็แล้วใครให้ไปกินพุดดิ้งที่อิบูกิหวงกันล่ะ..."
102180-111 = "ก็เรานึกว่ามันเป็นของเธอนี่!"
102180-112 = "ถ้าเป็นของฉัน จะกินก็ไม่เป็นไรงั้นเหรอคะ?"
102180-113 = "อื้ม! ตอนนั้นฉันโกรธรุ่นพี่มาโคโตะ แต่ตอนนี้ไม่เป็นไรแล้วละ! ชอบรุ่นพี่มาโคโตะมากเลย!!!"
102180-114 = "หึหึหึหึหึหึหึหึหึหึหึ!! ได้ยินไหม อิโรฮะ? เราไปช่วยพวกนินจาพวกนั้นกันเถอะ!!!"
102180-118 = "โทระมารุ เกราะเหล็กไร้เทียมทาน!!  ออกโจมตี!"
102180-120 = "เฮ้อ... ค่ะๆ โจมตีค่ะ"
102180-121 = "พี่ๆ คะ! อิบูกิจะช่วยเองค่ะ!"
102180-123 = "มะ... มาช่วยพวกเราเหรอคะ? ขอบคุณค่ะ!"
102180-124 = "ดีละ! งั้นก็ไปกันเลย!"
102180-125 = "ค่ะ!!"

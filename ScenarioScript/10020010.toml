[translation]
10020010-5 = "<เครื่องทะลุมิติ> เครื่องที่ 1 อยู่ข้างหน้าแล้วค่ะ!"
10020010-6 = "ระวังตัวด้วยนะคะคุณครู ตรวจสอบพบระบบป้องกันของ <เครื่องทะลุมิติ> ค่ะ..."
10020010-7 = "คิดไว้แล้วละค่ะว่าคงจะมีการป้องกันอย่างแน่นหนาที่สมกับเป็นแก่นสำคัญของเรือลำนี้... แต่คิดไม่ถึง#nเลยว่าจะเป็นเจ้านี่..."
10020010-11 = "อ๊า... การต่อสู้จะโหดหินตั้งแต่ตรงนี้เลยงั้นเหรอ..."
10020010-12 = "[s] \"เห็นทีคงจะต้องลุยกันอย่างเดียวแล้วละนะ\""
10020010-14 = "... ถึงจะดิ้นรนไป ก็ไร้ประโยชน์"
10020010-19 = "... คุณครู ระวังตัวด้วยค่ะ เด็กคนนั้นค่ะ..."
10020010-26 = "[ns] \"ชิโรโกะ...!!\""
10020010-27 = "......"
10020010-28 = "[s] \"ชิโรโกะ รอก่อน! เธอคิดจะทำอะไรกันแน่?!\""
10020010-29 = "... จะทำอะไรงั้นเหรอ เรื่องง่ายๆ "
10020010-30 = "ก็แค่ขัดขวางไม่ให้คุณครูทำลายเรือลำนี้ได้ไงล่ะ"
10020010-31 = "และนำพาคิโวทอสไปสู่จุดจบอย่างที่ควรจะเป็น"
10020010-36 = "อื้อ นั่นแหละหน้าที่ของฉัน"
10020010-37 = "[ns] \"......!!!\""
10020010-39 = "ระ...รุ่นพี่ชิโรโกะโผล่มาอีกแล้วค่ะ!"
10020010-52 = "หา? อยู่ไหนน่ะ?!"
10020010-53 = "ที่ด้านหน้าเครื่องทะลุมิติของพื้นที่ที่ 1 ค่ะ กำลังเผชิญหน้ากับคุณครูอยู่ค่ะ!"
10020010-54 = "ว่าไงนะ?"
10020010-61 = "ฮึ่ยยย!! ตอนนี้ไม่ใช่เวลาจะมาอยู่แบบนี้กันแล้ว ต้องรีบไปหารุ่นพี่ชิโรโกะ...!!"
10020010-62 = "แต่ว่า... ถ้าพวกเราไม่คอยดูแลที่นี่ไว้ละก็..."
10020010-64 = "... ใช่แล้วละ ถึงจะน่าหงุดหงิด แต่ตอนนี้พวกเราต้องโฟกัสไปกับการป้องกันที่นี่ก่อน"
10020010-65 = "เพราะงั้นตอนนี้เราคงต้องไว้ใจคุณครูอย่างเดียวแล้วละ!"
10020010-67 = "ค่ะ...! คุณครู! ขอฝากด้วยนะคะ!"
10020010-68 = "ช่วยขัดขวาง... รุ่นพี่ชิโรโกะด้วยนะคะ!!"
10020010-77 = "ตะ...เตรียมพร้อมต่อสู้แล้วค่ะ...!! ระวังด้วยนะคะคุณครู!"

[translation]
10020010-5 = "第一個「次元引擎」就在眼前！"
10020010-6 = "請小心，老師。#n已確認有守護「次元引擎」的防禦系統……"
10020010-7 = "畢竟是方舟的重要設備，多少有預料會出現相應的戰力……居然會到這種程度。"
10020010-11 = "呃啊……看來會是場有～點艱苦的戰鬥呢。"
10020010-12 = "[s]「不過也只能這麼做了。」"
10020010-14 = "……就算這麼做也沒用。"
10020010-19 = "……老師，請小心。#n是「[ruby=・]她[/ruby]」。"
10020010-26 = "[ns]「白子……！！」"
10020010-27 = "……"
10020010-28 = "[s]「白子，你到底打算做什麼！？」"
10020010-29 = "嗯──很單純。"
10020010-30 = "我要阻止老師破壞方舟。"
10020010-31 = "這樣一來，就能依照計畫──讓奇普托斯迎來終焉。"
10020010-36 = "因為這就是我的──「職責」。"
10020010-37 = "[ns]「………………！！！」"
10020010-39 = "白，白子前輩再次出現了！"
10020010-52 = "在哪裡！？"
10020010-53 = "在第1區域「次元引擎」的前面！#n現在正和老師交戰！"
10020010-54 = "……！！"
10020010-61 = "啊啊，真是！！現在明明不是做這種事的時候……#n得快點去找白子前輩才行！！"
10020010-62 = "但是，如果我們不守住這個地方……"
10020010-64 = "……嗯，沒錯。#n現在必須專心防守。"
10020010-65 = "就交給老師吧。"
10020010-67 = "是……！！老師，拜託了！！"
10020010-68 = "請阻止……白子前輩！！"
10020010-77 = "進，進入了戰鬥狀態……！老師，請小心！"

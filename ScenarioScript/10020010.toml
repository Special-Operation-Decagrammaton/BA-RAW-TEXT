[translation]
10020010-5 = "The first Dimension Engine... Right here before our very eyes!"
10020010-6 = "Careful, Sensei. The Dimension Engine's Defense System is active."
10020010-7 = "Considering its importance to the Ark, I was expecting something, but...nothing this powerful."
10020010-11 = "Whoa... It's going to be tough from here on out..."
10020010-12 = "[s] \"We can't let that stop us.\""
10020010-14 = "Do whatever you want. It won't matter..."
10020010-19 = "Sensei, watch out! It's her..."
10020010-26 = "[ns] \"Shiroko!\""
10020010-27 = "..."
10020010-28 = "[s] \"Shiroko, wait! What in the world are you doing?!\""
10020010-29 = "What am I—Why, it's simple."
10020010-30 = "I'm going to protect the Ark from Sensei."
10020010-31 = "Then I'll bring the apocalypse to Kivotos as planned."
10020010-36 = "It's what I do."
10020010-37 = "[ns] \"...!!!\""
10020010-39 = "Sh-Shiroko! She's back!"
10020010-52 = "What?! Where?!"
10020010-53 = "In front of Area 1's Dimension Engine! She's fighting Sensei!"
10020010-54 = "What?!"
10020010-61 = "Ugh! We don't have time to mess around here. We need to get to Shiroko!"
10020010-62 = "But if we don't defend this place..."
10020010-64 = "...Yes, I know. I hate it, but we have no choice. Defense is our priority now!"
10020010-65 = "We just have to trust that Sensei can handle it alone!"
10020010-67 = "Okay, yes! Sensei, we'll leave this to you!"
10020010-68 = "Shiroko! Stop her!"
10020010-77 = "Entering battle stance! Sensei, watch out!"

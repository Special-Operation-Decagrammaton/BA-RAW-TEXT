[translation]
102200-1 = "ตอนที่ 20;ปฏิบัติการป้องกันครั้งสุดท้าย - ชาเล่ต์"
102200-8 = "การเตรียมบุกโจมตี <ผู้พิทักษ์> ในทุกหอคอย เว้นแต่หอคอยแห่งที่ 6 เสร็จสิ้นแล้วค่ะ...!"
102200-9 = "อื้ม ปฏิบัติการป้องกันในทุกเขตปกครองตนเองก็เสร็จเรียบร้อยอย่างราบรื่น~"
102200-11 = "ดีมากค่ะ... เท่ากับว่าเราเตรียมทุกอย่างพร้อมแล้วสินะคะ..."
102200-15 = "......?!  อะไรเหรอคะ?"
102200-16 = "ไหนดูซิ..."
102200-20 = "...... หา???!"
102200-21 = "ทำไมเหรอคะ โมโมกะจัง?!"
102200-28 = "เราถูกบุกรุก!! มีศัตรูปรากฏตัวรอบๆ ชาเล่ต์! มากันตอนไหนเนี่ย...!!"
102200-57 = "เรื่องการคุ้มกันประตูหน้า ให้พวกเราจัดการเอง"
102200-58 = "ส่วนประตูหลัง ถ้าใครงานไม่ล้นมือ ก็ไปช่วยหน่อยได้ไหม?"
102200-60 = "หึหึหึหึ... กำลังเบื่อๆ อยู่เลย งั้นก็ดีละ"
102200-61 = "พวกฉันจะไปคุ้มกันประตูหลังของชาเล่ต์ให้เอง!"
102200-62 = "ฉันจะสำแดงพลังของแก๊งพี่สาวสุดโหดให้ดูเอง! หึหึหึหึหึ!"
102200-63 = "ไปกันเลย!"
102200-64 = "อย่าดูถูกนักเลงเชียวนะ!!"
102200-66 = "แก๊งหมวกกันน็อก ระดมพล!!"
102200-75 = "เรื่องใหญ่ขนาดนี้ โคะมาคาเสะ ราบุ หัวหน้าแก๊งหมวกกันน็อกก็ต้องปรากฏตัวสิ!!"
102200-76 = "มาปกป้องชาเล่ต์กัน! ทุกคนจู่โจม!!"
102200-81 = "ฮุฮุฮุฮุฮุฮุ...♡"
102200-87 = "ตายจริง น่าสงสารอะไรเช่นนี้... ถ้าคุณท่านต้องเผชิญสถานการณ์ที่ยากลำบาก วาคาโมะผู้นี้จะอยู่เฉยๆ อยู่ได้ยังไงล่ะคะ"
102200-88 = "ไว้วางใจและฝากทุกอย่างไว้กับวาคาโมะผู้นี้ได้เลยค่ะ"
102200-92 = "ฮุฮุฮุฮุ... งั้นก็เริ่มกันเลยไหมคะ?"

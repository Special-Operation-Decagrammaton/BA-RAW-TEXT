[translation]
102200-1 = "第20話;最終防衛戰「夏萊」"
102200-8 = "第1聖所至第5聖所的突入準備都已經完成了……！"
102200-9 = "所有自治區的防衛戰也結束了唷。#n辛苦了～"
102200-11 = "──全部都準備就緒了呢。"
102200-15 = "……！？#n怎麼了！？"
102200-16 = "我看看……"
102200-20 = "……咦咦咦！？"
102200-21 = "怎，怎麼了嗎桃香醬……！？"
102200-28 = "是，是襲擊！！夏萊周邊出現了敵人！#n是，是什麼時候……！"
102200-57 = "正門的防衛就由我們來負責。"
102200-58 = "後門就交給其他有餘力的人了。"
102200-60 = "咯咯咯……我正覺得無聊呢。"
102200-61 = "後門的防禦就交給我們吧！"
102200-62 = "就讓你們見識一下可怕姐姐們的力量吧！#n咯咯咯咯咯！"
102200-63 = "好，上吧！"
102200-64 = "我們可不是成天只會遊手好閒的啊！！"
102200-66 = "頭盔團，全員集合！！"
102200-75 = "事情就是這樣。#n頭盔團幹部──河駒風良舞就來幫幫你們吧！！"
102200-76 = "各位，要守住夏萊哦！全員突擊！！"
102200-81 = "唔呵呵呵呵……♡"
102200-87 = "閣下是多麼可憐……不過您放心。#n請交給若藻我吧。"
102200-88 = "我會守護閣下直到山窮水盡。"
102200-92 = "唔呵呵……那麼，開始吧？"

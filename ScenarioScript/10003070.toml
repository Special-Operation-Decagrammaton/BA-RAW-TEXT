[translation]
10003070-1 = "Episode 7;There's More?!"
10003070-2 = "Summer Camp Control Room"
10003070-4 = "Test one, two. Can you read me? All teams, please respond."
10003070-5 = "Alpha Team, standing by."
10003070-6 = "Beta Team, in position."
10003070-7 = "Gamma Team, in position. Awaiting orders."
10003070-8 = "All teams are green, then. How are our field agents?"
10003070-10 = "This is codename S. In the area now."
10003070-11 = "This is codename H. Also on location."
10003070-12 = "I read you loud and clear. I'll go over the plan once more."
10003070-13 = "Our summer camp is scheduled to end at 4PM today, at which time we'll head directly home."
10003070-14 = "The only item officially on the president's schedule is shooting training in the afternoon."
10003070-15 = "However, she decided to use her free time this morning to schedule swimming lessons with Sensei."
10003070-16 = "In other words...the president finally considers this a vacation!"
10003070-17 = "Our mission hasn't changed. We're to see that the president has the most relaxing and enjoyable vacation possible."
10003070-19 = "Specifically, we're going to remove any dangerous elements surrounding the beach and secure the area. That way, nothing will stand between the head prefect and her relaxing vacation!"
10003070-20 = "And we're resorting to violence for that...?"
10003070-21 = "It could be worse. At least there aren't crowds gathering like yesterday."
10003070-22 = "Enough talk! Remember that you have the most important role in this, Sensei!"
10003070-23 = "[s] \"Right... I've got it covered.\""
10003070-24 = "Teaching the president to swim is a great responsibility."
10003070-25 = "In fact, I feel somewhat offended. Why did she have to pick you over me?! Curse me holding such a time-demanding position! "
10003070-26 = "But if it's what the head prefect wants, then I will endure the pain. I leave her to you, Sensei."
10003070-29 = "However! I will not accept any failures! You will teach her properly, am I understood?!"
10003070-30 = "[s] \"Y-Yes, ma'am.\""
10003070-31 = "Ako is like a woman possessed... "
10003070-32 = "Change of subject, but am I the only one surprised that the president doesn't know how to swim? We're talking about someone that does literally any task she's given."
10003070-33 = "I think it's a testament to just how much time she spends working and not experiencing anything else."
10003070-34 = "I said enough with the chatter! Now's the time to focus on the mission!"
10003070-35 = "The president has just finished getting ready and has left her room. To your places, everyone!"
10003070-39 = "Beach. All clear. "
10003070-40 = "The surrounding area is also secured. Things are in your hands now, Sensei."
10003070-41 = "[s] \"All right! I've got this!\""
10003070-42 = "I'm sure everything will be fine. There's no way we'll run into as many problems as yesterday."
10003070-43 = "Have you learned nothing, Iori? You said the same thing yesterday."
10003070-44 = "Come on! Whoever heard of lightning striking the same place THREE times?"
10003070-47 = "Uh..."
10003070-48 = "*sigh*"
10003070-49 = "This can't be... Why now of all times?"
10003070-50 = "What's going on, Ako?"
10003070-51 = "Senior Administrator?"
10003070-53 = "Intel from the Intelligence Committee!"
10003070-54 = "The Fubar Beach Thugs and Splashy Helmet Gangsters are gathering in the neighborhood behind the hotel!"
10003070-55 = "Estimated size... Larger than two battalions!"
10003070-56 = "Why are these two together all of a sudden?!"
10003070-57 = "We just received a transmission from the two groups. I'll connect you now!"
10003070-60 = "Wondering why we're working together? I'll bet you are!"
10003070-61 = "Hahaha! We've forged a temporary alliance!"
10003070-62 = "All because we came across some valuable information."
10003070-63 = "Wanna know what we found out? You already know what it is! The head prefect is out of commission!"
10003070-64 = "That changes everything! The Prefect Team is nothing without its leader!"
10003070-65 = "You're just a bunch of sheep without a shepherd! We're gonna destroy you for getting in the way of our battle yesterday. This is a declaration of war!"
10003070-66 = "Hahaha! You'll regret ever messing with us!"
10003070-70 = "What?! How dare they! Don't they know they're just... Just extras!"
10003070-71 = "(Ako has gone off the deep end...)"
10003070-72 = "It was tough enough taking on each side at once. How are we going to stop them if they team up?"
10003070-73 = "I don't care how hard it is! We're going to stop them, and that's all there is to it!"
10003070-74 = "We don't have enough manpower for this. Shouldn't we inform the head pre—"
10003070-75 = "Negative!"
10003070-76 = "The president just came to accept her vacation! We can't possibly ruin it for her now!"
10003070-77 = "Can't we at least call for backup from the forces back at campus?"
10003070-78 = "Too risky! The president would notice."
10003070-79 = "We must make do with those we have on hand."
10003070-80 = "That's close to impossible at this point."
10003070-81 = "I don't care! Then make the impossible possible! There's no other choice!"
10003070-82 = "Time is still on our side, fortunately. We merely have to think of a strategy before the enemies get into position."
10003070-83 = "Senior Administrator! A small group of hostiles are approaching the hotel!"
10003070-84 = "What?! Who is it?!"
10003070-85 = "They seem to be carrying sacks with unidentified contents!"
10003070-86 = "It's hard to tell from the naked eye from this distance, but contents seem to be cylindrical in nature with bumpy surfaces."
10003070-87 = "They could be modified pineapple grenades! Where do they get their hands on such contraband?!"
10003070-88 = "Wait, no! Confirming visual! The contraband is...corn!"
10003070-89 = "Huh?"
10003070-91 = "It's festival time! Come get your delicious roasted corn! We also have boiled!"
10003070-92 = "Heehee. NOW it feels like a festival. ☆"
10003070-93 = "Soy sauce and butter are good too, but nothing goes with corn like strawberry jam. Am I right?!"
10003070-94 = "Stop eating and get back to selling! And you'd better not put any strawberry jam on our customers' corn!"
10003070-95 = "My, things are so much more lively today."
10003070-96 = "It's just as we thought. The taste of roasted corn is also affected by the size of the crowd in which it's eaten."
10003070-99 = "Now, then! Here's to a rollicking festival! May gourmandise lie beyond!"
10003070-100 = "I'm not sure what that is, but I'm all for doing things with a bang. ☆"
10003070-102 = "..."
10003070-103 = "..."
10003070-104 = "There are no words..."
10003070-105 = "One more thing to report! There's another force gathering in the slums!"
10003070-106 = "How can there be more?! Haven't all factions already shown up at this point?!"
10003070-107 = "N-No, it's someone completely different. I'll put it up on the screen now!"
10003070-110 = "Where a hot spring can be found, so can we! "
10003070-111 = "The Hot Springs Department..."
10003070-112 = "Th-The Hot Springs Department?!"
10003070-113 = "The president heard there's a submarine volcano in the waters over there."
10003070-114 = "She has some big plans for hot springs using deep sea water or something. Not that I get the details or anything!"
10003070-115 = "I'll be right over to start the demolition!"
10003070-116 = "We're gonna burn the forest, knock down the buildings, and boil the ocean! That's the true spirit of developmentalism!"
10003070-117 = "Oh, but don't worry. We'll hook you up with free tickets to the hot spring once it's all done."
10003070-118 = "That's the long and short of it. We'll see you in a moment! ♪"
10003070-122 = "Roughly 200 of their members are gathering! They're heavily equipped with bulldozers, excavators, and even tanks!"
10003070-123 = "More forces are gathering in the slums as well! The remaining fighters from the Fubar Beach Thugs and Splashy Helmet Gang are moving!"
10003070-124 = "That's not all. In addition to the students, automata, tanks, and choppers have been visually confirmed!"
10003070-125 = "What? Even delinquents from other regions are gathering for some reason. I believe they're acting as spectators!"
10003070-126 = "Yes, but now they're engaging in combat over the best viewing locations!"
10003070-127 = "And the Gourmet Research Society has set up a corn stall in the middle of the main road!"
10003070-128 = "The Hot Springs Department is approaching with their heavy machinery! Now they're engaging the Gourmet Research Society in combat for some reason!"
10003070-129 = "Confirming the thugs and gangsters have begun fighting on the beach as well!"
10003070-139 = "..."
10003070-140 = "..."
10003070-141 = "Wh-What should we do, Senior Administrator?"
10003070-142 = "Senior Administrator Ako?! Please give us your orders!"
10003070-143 = "I..."
10003070-144 = "You...?"
10003070-145 = "I don't know what to do! How am I supposed to handle all of this by myself?!"
10003070-146 = "It's one thing after another! We stomp out one fire, and two more take its place!"
10003070-147 = "Ako, you need to calm down..."
10003070-148 = "How am I supposed to calm down?!"
10003070-149 = "We need to devise a strategy."
10003070-150 = "Strategy?! What strategy?! It's impossible! "
10003070-151 = "I thought this was supposed to be the most quiet beach in all of Gehenna! More like it's the raging fires of Gehenna! It's hot! Too hot!!! "
10003070-152 = "So we've gone from the frying pan to the fire, have we?"
10003070-153 = "Yes, Head Prefect. You understand!"
10003070-154 = "Sitting around feeling sorry for ourselves isn't going to resolve this situation. If only we could counter..."
10003070-155 = "Each faction is large, but their alliance is completely makeshift. They have no central chain of command."
10003070-156 = "That's their weakness. They'll become completely disorganized if we manage to break through their line of defense!"
10003070-157 = "Agreed. Imagine concentric circles approaching us with the hotel at the center. All it takes is one broken formation for us to advance."
10003070-158 = "Masterfully done, Head Prefect! You came up with that so easily!"
10003070-159 = "Now we just have to carry out the operation without..."
10003070-160 = "...ruining your..."
10003070-161 = "..."
10003070-162 = "..."
10003070-165 = "..."
10003070-168 = "...vacation."
10003070-169 = "..."
10003070-170 = "H-HEAD PREFECT?!"
10003070-173 = "[ns1] \"How long have you been standing there, Hina?\"\n[ns2] \"(Now is when we were supposed to meet on the beach!)\""
10003070-174 = "..."
10003070-175 = "..."
10003070-176 = "Ako."
10003070-177 = "U-Um, yes...?"
10003070-178 = "I'll ask what happened to our training later."
10003070-181 = "Everyone, get ready for battle."
10003070-182 = "Let's finish this quickly."
10003070-183 = "R-Roger!"
10003070-184 = "Yes!"

[translation]
10003070-1 = "ตอนที่ 7;ยังไม่จบอีกงั้นเหรอ?!"
10003070-2 = "ห้องควบคุมปฏิบัติการฝึกภาคฤดูร้อน"
10003070-4 = "ทดสอบๆ... ได้ยินรึเปล่าคะ? ทุกทีมที่สแตนด์บายเรียบร้อยแล้ว ถ้าได้ยินแล้วตอบกลับด้วยค่ะ"
10003070-5 = "'ทีมอัลฟ่า สแตนด์บายค่ะ'"
10003070-6 = "'ทีมเบต้า สแตนด์บายค่ะ'"
10003070-7 = "'ทีมแกมม่า ประจำอยู่ที่จุดแล้วค่ะ ช่วยออกคำสั่งด้วยค่ะ'"
10003070-8 = "ค่ะ  ทุกคนเข้าประจำที่เรียบร้อยแล้ว ทีมภาคสนามล่ะคะ?"
10003070-10 = "โค้ดเนม S  เข้าพื้นที่เรียบร้อยแล้ว"
10003070-11 = "โค้ดเนม H เข้าพื้นที่แล้วเช่นกันค่ะ"
10003070-12 = "รับทราบ ตรวจสอบสัญญาณทั้งหมดเรียบร้อยแล้วค่ะ ถ้างั้นฉันจะสรุปแผนการของเราให้ฟังอีกครั้งนะคะ"
10003070-13 = "กำหนดการฝึกภาคฤดูร้อนของคณะกรรมการวินัยจะสิ้นสุดในเวลา 16.00 น. #nและเราจะเดินทางกลับโรงเรียนทันทีค่ะ"
10003070-14 = "กำหนดการที่ฉันส่งให้ท่านประธานจะมีเพียงการฝึกยิงปืนในช่วงบ่ายเท่านั้น"
10003070-15 = "แต่ว่าก่อนที่จะถึงเวลาฝึกยิงปืนในช่วงบ่าย ท่านประธานต้องการใช้เวลาฝึกว่ายน้ำที่ชายหาดค่ะ"
10003070-16 = "ซึ่งนั่นก็คือ... หลักฐานที่แสดงว่าท่านประธานเริ่มคิดจะใช้เวลาสนุกกับวันหยุดพักผ่อนแล้วค่ะ!"
10003070-17 = "ซึ่งภารกิจของพวกเราก็ง่ายมากค่ะ เราจะต้องสนับสนุนให้ท่านประธานได้พักผ่อนอย่างเต็มที่!"
10003070-19 = "ดังนั้นพวกเราจะจัดการทุกอย่างที่เป็นอันตรายที่บริเวณรอบพื้นที่ และทำการปิดพื้นที่บริเวณนี้ เพื่อกันพื้นที่ให้ท่านประธานสนุกไปกับวันหยุดพักผ่อนได้ค่ะ!"
10003070-20 = "ดูยังไงแบบนี้มันก็คือการก่อการจลาจลไม่ใช่เหรอ...?"
10003070-21 = "แต่อย่างน้อยก็โชคดีที่ตอนเกิดเรื่องวุ่นวายคราวก่อนไม่มีลูกค้าคนอื่นอยู่ด้วยนะคะ..."
10003070-22 = "เลิกพูดถึงมันเถอะค่ะ ห้ามลืมเด็ดขาดเลยนะคะ! ว่าคนที่ได้รับมอบหมายหน้าที่ที่สำคัญที่สุด#nก็คือคุณครูค่ะ!"
10003070-23 = "[s] \"อื้ม... ครูรู้แล้วล่ะ...\""
10003070-24 = "การสอนว่ายน้ำให้ท่านประธานเป็นความรับผิดชอบที่ยิ่งใหญ่!"
10003070-25 = "ฉันไม่เข้าใจจริงๆ ว่าทำไมท่านประธานถึงมอบหมายภารกิจนี้ให้คุณครู! ทำไมท่านประธานถึง#nไม่ขอให้ฉันสอนให้ล่ะคะ?! อ๊าาา! ฉันไม่อยากแค่ดูแลการฝึกแทนท่านประธานนะคะ...!"
10003070-26 = "ฉันเคยคิดอย่างนั้นนะคะ... แต่ถ้าเพื่อท่านประธานแล้วละก็... ฉันจะอดทนกล้ำกลืนรับความยาก#nลำบากนี้ เอาไว้... ฉันขอฝากท่านประธานด้วยนะคะ... คุณครู..."
10003070-29 = "ได้โปรด... ดูแลหัวหน้าให้เป็นอย่างดีด้วยนะคะ! ห้ามทำพลาดเด็ดขาดเลยนะคะ!"
10003070-30 = "[s] \"นะ...แน่นอน\""
10003070-31 = "ว้าว... อาโกะจังดูกระตือรือร้นดีจังเลยนะ... "
10003070-32 = "น่าแปลกใจอยู่นะ เรื่องที่ประธานว่ายน้ำไม่แข็งน่ะ ปกติประธานจะทำได้หมดทุกเรื่องเลย"
10003070-33 = "นั่นแสดงว่าปกติหัวหน้าไม่มีเวลาว่างเลยยังไงล่ะคะ"
10003070-34 = "เอาล่ะค่ะทุกคน เลิกคุยกันได้แล้วค่ะ! เรามาโฟกัสที่ภารกิจของเรากันเถอะค่ะ!"
10003070-35 = "ตอนนี้ท่านประธานออกจากห้องพักเพื่อไปเตรียมตัวเรียนว่ายน้ำแล้วค่ะ!#nทุกคน... ประจำที่ค่ะ...!!"
10003070-39 = "ที่ชายหาด ไม่พบความผิดปกติ "
10003070-40 = "ปิดบริเวณรอบนอกชายหาดเรียบร้อยแล้วค่ะ เหมือนว่าจะไม่มีปัญหาอะไรค่ะ#nรบกวนดำเนินการตามแผนด้วยค่ะ คุณครู..."
10003070-41 = "[s] \"รับทราบ! เชื่อมือครูได้เลย!\""
10003070-42 = "ถ้าเป็นแบบนี้คิดว่าคงไม่มีปัญหาอะไร..."
10003070-43 = "อิโอริ ฉันเคยบอกแล้วไงคะ... เวลาพูดแบบนี้ทีไรมันมักจะมีเรื่องทุกที ฉันเคยบอกให้ระวังกี่ครั้งแล้วคะ..."
10003070-44 = "เอ่อ... จำได้ว่าเธอพูดมาประมาณสามสี่ครั้งนะ...."
10003070-47 = "เอ๋...?"
10003070-48 = "(ถอนหายใจ)"
10003070-49 = "ดะ...เดี๋ยวก่อนค่ะ! ไม่นะ... ทำไมตอนนี้... ไม่นะ... นี่มัน..."
10003070-50 = "มีเรื่องอะไรเหรอ? อาโกะจัง?!"
10003070-51 = "เจ้าหน้าที่อาโกะ...?"
10003070-53 = "มีข้อมูลเพิ่มมาจากหน่วยข่าวกรองค่ะ!"
10003070-54 = "ตอนนี้กลุ่มแยงกี้สาวจอมวุ่นวายกับแก๊งหมวกกันน็อกกำลังรวมตัวกันที่ย่านแออัดด้านหลังโรงแรมค่ะ!"
10003070-55 = "และขนาดของกองกำลังคือ... ตอนนี้... มีมากกว่าสองพันคนแล้วค่ะ!"
10003070-56 = "ทำไมจู่ๆ ก็... ทำไมพวกนั้นถึงมารวมกลุ่มกันล่ะคะ?!"
10003070-57 = "พวกเธอส่งสัญญาณติดต่อมาค่ะ! ฉันจะดึงสัญญาณขึ้นหน้าจอค่ะ!"
10003070-60 = "ฮ่า! สงสัยล่ะสิว่าทำไมพวกเราถึงมารวมตัวกัน?! นั่นก็เพราะ..."
10003070-61 = "เคี๊ยกๆ!! พวกเราผนึกกำลังเป็นพันธมิตรกันแล้วไงล่ะ!!"
10003070-62 = "นั่นเพราะพวกเราได้ข้อมูลเจ๋งๆ มาด้วย"
10003070-63 = "ข้อมูลอะไรน่ะเหรอ? สงสัยล่ะสิ? สงสัยมะ? มันก็แน่อยู่แล้วไงล่ะ ว่าหัวหน้าของพวกเธอไม่อยู่!!"
10003070-64 = "แบบนี้ก็หมูตู้เลยไง! ถ้าหัวหน้าพวกเธอไม่อยู่แบบนี้พวกเราก็ไม่เห็นต้องกลัวเลย! "
10003070-65 = "ถ้าไม่มีหัวหน้าพวกเธอก็แค่กลุ่มเด็กก๊องแก๊งเท่านั้น! เราจะกำจัดพวกเธอที่มาขัดขวาง#nสงครามของพวกเรา! นี่เป็นการประกาศเริ่มสงครามจากพวกเรา!"
10003070-66 = "วะฮ่ะฮ่าฮ่า! พวกเธอจะต้องเสียใจที่มาขวางทางพวกเรา!"
10003070-70 = "ว่ายังไงนะ!! ยัยพวกนี้กล้าดียังไง!!!"
10003070-71 = "(อาโกะเริ่มโกรธจริงๆ แล้วสินะคะ...)"
10003070-72 = "ฮึ่ย... แค่จัดการทีละกลุ่มก็ตึงมือแล้ว ถ้าเจ้าพวกนั้นผนึกกำลังกันล่ะก็... พวกเราจะหยุดไว้ได้เหรอ?"
10003070-73 = "ต้องหยุดไว้ให้ได้ค่ะ! ยังไงก็ต้องหยุดไว้ให้ได้นะคะ!"
10003070-74 = "เดี๋ยวสิ... ถ้าแค่พวกเราคงไม่ไหวแน่... ฉันว่าเราควรรายงานท่านประธาน..."
10003070-75 = "ฉันไม่อนุญาตค่ะ!"
10003070-76 = "ในที่สุดท่านประธานก็จะได้ใช้เวลาพักผ่อนแล้วแท้ๆ! จะให้เรื่องนั้นถูกทำลายลงไปแบบนี้ไม่ได้ค่ะ!"
10003070-77 = "ถ้างั้นส่งคำขอให้กองกำลังหลักของคณะกรรมการวินัยมาช่วย..."
10003070-78 = "ไม่ได้เด็ดขาดค่ะ! ทำแบบนั้นท่านประธานก็จะต้องรู้เรื่องแน่ค่ะ!"
10003070-79 = "พวกเราต้องหยุดพวกนั้นด้วยกองกำลังที่มีอยู่ค่ะ!!"
10003070-80 = "แบบนั้นมันบังคับให้ทำเรื่องที่เป็นไปไม่ได้นี่นา..."
10003070-81 = "ไม่ค่ะ! ไม่ใช่การบังคับนะคะ นี่เป็นเรื่องที่พวกเราต้องทำต่างหากค่ะ!"
10003070-82 = "ตอนนี้พวกเรายังมีเวลาอยู่ค่ะ ฉันจะวางแผนให้เอง... ก่อนที่พวกศัตรูจะบุกมา... "
10003070-83 = "รายงานด่วนค่ะ! กองกำลังขนาดย่อมกำลังมุ่งหน้าเข้ามาใกล้โรงแรมแล้วค่ะ"
10003070-84 = "อะไรนะ?! ใครกันน่ะ?!"
10003070-85 = "ผู้นำของกองกำลังนั่น... กลุ่มกองกำลังนิรนามถือถุงกระสอบมากันเต็มไปหมดเลยค่ะ"
10003070-86 = "เนื่องจากระยะไกลเกินไปจึงไม่สามารถระบุได้ชัดเจน... แต่ดูมีบางอย่างแปลกๆ ค่ะ...#nแต่ของที่พวกนั้นถือมาดูคล้ายกับทรงกระบอก..."
10003070-87 = "ระ...หรือว่าจะเป็นระเบิดมือดัดแปลงตามที่ได้ยินข่าวลือมา!? พวกนั้นไปเอาอาวุธที่รุนแรงแบบนี้#nมาจากไหนกัน...?!"
10003070-88 = "ไม่ใช่ค่ะ! เราได้ภาพถ่ายมาแล้วค่ะ...!! นั่นมัน... ข้าวโพดค่ะ!"
10003070-89 = "คะ...?"
10003070-91 = "งานเทศกาล~! ข้าวโพด! ข้าวโพดอร่อยๆ! ข้าวโพดย่างก็ดี ข้าวโพดต้มก็อร่อย!!"
10003070-92 = "ฮุฮุฮุ☆ ค่อยรู้สึกเหมือนงานเทศกาลหน่อยนะคะ "
10003070-93 = "เหยาะซอสถั่วเหลืองก็อร่อย จะทาเนยก็ดี... แต่ว่าราดด้วยแยมสตรอว์เบอร์รี่จะอร่อยที่สุดเลยนะ! ว่ามั้ย?"
10003070-94 = "เลิกคิดเรื่องกินได้แล้ว มาคิดเรื่องขายข้าวโพดเถอะน่า!! อีกอย่างใครเขาใส่แยมสตรอว์เบอร์รี่#nบนข้าวโพดกัน!! อย่าเอาของแบบนั้นมาราดบนข้าวโพดสิ!!"
10003070-95 = "ฮุฮุฮุ วันนี้ดูครึกครื้นดีจังเลยนะคะ"
10003070-96 = "\"รสชาติของข้าวโพดจะขึ้นอยู่กับสัดส่วนของจำนวนคนที่ทาน\" นี่เป็นโอกาสดีที่จะได้พิสูจน์#nสมมติฐานนี้ค่ะ"
10003070-99 = "เอาล่ะค่ะ มาสนุกกับงานเทศกาลกันเถอะค่ะ!! มุ่งสู่การค้นหารสชาติที่แสนอร่อยกันเถอะค่ะ!!"
10003070-100 = "ถึงจะไม่ค่อยเข้าใจที่พูดเท่าไร แต่ฟังดูยิ่งใหญ่มากเลย☆ ฉันชอบมากเลยค่ะ"
10003070-102 = "..."
10003070-103 = "..."
10003070-104 = "มะ...ไม่เข้าใจเลยสักนิด..."
10003070-105 = "รายงานค่ะ!! พบกองกำลังกำลังรวมตัวกันที่ย่านแออัดค่ะ!! "
10003070-106 = "อะไรนะ?! อะไรกันอีกเนี่ย?! แก๊งหมวกกันน็อก? กลุ่มแยงกี้สาว? ชมรมชิมอาหาร? เดี๋ยวสิ...#nทำไมพวกตัวปัญหาถึงโผล่มากันหมดเลยล่ะ!!"
10003070-107 = "มะ...ไม่ใช่ค่ะ เป็นกลุ่มกองกำลังใหม่ค่ะ! ฉันจะดึงสัญญาณขึ้นหน้าจอค่ะ!"
10003070-110 = "ฮาโหล~ ว่าไงทุกคน! วันนี้เป็นวันที่เหมาะกับการพัฒนาเลยว่ามั้ย? "
10003070-111 = "ใช่แล้ว พวกเราชมรมพัฒนาออนเซ็นไงล่ะ"
10003070-112 = "ชะ... ชมรมพัฒนาออนเซ็น?!"
10003070-113 = "หัวหน้าคาสุมิได้ข่าวมาว่ามีภูเขาไฟใต้น้ำอยู่ที่บริเวณทะเลด้านนั้น "
10003070-114 = "หัวหน้าเลยมีแผนที่จะสร้างบ่อน้ำพุจากน้ำทะเลลึกล่ะ  ฮ่าฮ่าฮ่า...#nฉันหัวช้าก็เลยไม่เข้าใจที่หัวหน้าพูดสักเท่าไหร่"
10003070-115 = "สรุปก็คือหัวหน้าสั่งให้ฉันไปที่นั่นแล้วจัดการถล่มทุกอย่างยังไงล่ะ "
10003070-116 = "เผาป่าให้ราบคาบ รื้อถอนอาคาร แล้วก็ทำให้ทะเลเดือดปุดๆ!!#nนั่นล่ะคือจิตวิญญาณแห่งการพัฒนาที่แท้จริง!!"
10003070-117 = "อ่า... ถ้าสร้างเสร็จแล้ว ฉันจะให้บัตรกำนัลใช้บริการบ่อน้ำพุร้อนฟรีคนละใบเลย!"
10003070-118 = "ถ้างั้นก็...ขอตัวล่ะนะ~♪ แล้วเจอกัน!"
10003070-122 = "ขณะนี้สมาชิกชมรมพัฒนาออนเซ็นประมาณ 200 คนกำลังรวมพลกันอยู่ค่ะ!#nแถมยังนำเครื่องจักรรื้อถอนจำนวนมากมาอีกด้วย! ทั้งบูลโดลเซอร์ รถเครน... มีรถถังด้วยค่ะ...!"
10003070-123 = "รายงานด่วนค่ะ! กองกำลังที่ย่านแออัดกำลังเพิ่มจำนวนขึ้นเรื่อยๆ แล้วค่ะ!#nกองกำลังที่กระจัดกระจายของพวกนั้นกำลังมารวมพลกันแล้วค่ะ!"
10003070-124 = "ไม่ใช่แค่กลุ่มนักเรียนเท่านั้น แต่ยังมีอุปกรณ์รบ... ทั้งหุ่นจักรกล รถถัง แล้วก็เฮลิคอปเตอร์ด้วยค่ะ!"
10003070-125 = "นอกจากนี้กลุ่มแยงกี้จากเขตอื่นก็กำลังมารวมตัวกันที่นี่ด้วยค่ะ! แต่ดูเหมือนพวกเธอจะมาปูเสื่อรอชม#nเรื่องเด็ดกันอยู่เลยค่ะ!!"
10003070-126 = "...อ๊ะ! ตอนนี้พวกเธอเริ่มต่อสู้กันแย่งชิงที่นั่งชมดีๆ แล้วค่ะ!!"

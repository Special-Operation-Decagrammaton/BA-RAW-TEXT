10003070-12 = "3;통신아코;01;네, 통신 양호함. 전부 확인했습니다. 그럼 지금부터 다시 이번 작전의 개요를 설명 드리겠습니다.\n#3;a"
10003070-13 = "3;통신아코;01;저희 선도부의 하계 합숙 훈련은 오늘 오후 4시를 기해 종료. 복귀가 예정 되어있습니다."
10003070-14 = "3;통신아코;99;부장님께 전달 드린 오늘의 일정은, 오후에 있을 전체 사격 훈련뿐."
10003070-15 = "3;통신아코;01;다만 그 훈련을 실행하기 전, 부장님께선 짬을 내어 해변에서 수영 연습을 하고자 하셨습니다."
10003070-16 = "3;통신아코;09;그 말인 즉……. 부장님 또한 이 시간을 휴가로 생각해주시기 시작하셨다는 증거!"
10003070-17 = "3;통신아코;09;그렇다면 저희의 임무는 간단합니다. 부장님의 휴가를 마지막까지 전력으로 서포트하는 것!\n#3;em;[!]"
10003070-18 = "#all;hide"
10003070-19 = "3;통신아코;05;구체적으로는 혹시라도 있을지 모를 해변의 위험요소를 배제하고, 해변을 통제하는 것으로, 부장님이 휴가를 즐기실 수 있는 무대를 세팅하는 겁니다!\n#3;closeup\n#3;em;[!]"
10003070-20 = "3;통신아코;05\n1;치나츠;01\n5;이오리 수영복ND;06;아무리 생각해도, 이거 폭거 아냐……?\n#5;stiff"
10003070-21 = "1;치나츠;06;그나마 지난번의 소동으로 손님들이 없어서 다행이네요…….\n#1;em;[땀]"
10003070-22 = "3;통신아코;09;잔말은 됐습니다! 명심하세요. 거기서 가장 중요한 역할을 맡은 건, 누가 뭐라해도 선생님이시라는 걸요!\n#3;em;[반응]"
10003070-23 = "[s] \"으음…… 명심하고 있습니다…….\""
10003070-24 = "3;통신아코;09;부장님에게 직접 수영을 가르쳐드린다는 어마어마한 중책!"

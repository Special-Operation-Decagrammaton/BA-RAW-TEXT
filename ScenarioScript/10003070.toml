[translation]
10003070-1 = "第7話;飛蛾撲火"
10003070-2 = "夏季集訓指揮室"
10003070-4 = "啊──，啊──，聽得到嗎？#n待命中的各組，聽到請回答。"
10003070-5 = "「Alpha組，準備完畢。」"
10003070-6 = "「Beta組，已在指定地點等候。」"
10003070-7 = "「Gamma組，已順利抵達，正等候指示。」"
10003070-8 = "一切就緒了呢，現場的人呢？"
10003070-10 = "代號S，已抵達現場。"
10003070-11 = "代號H，同樣已抵達現場。"
10003070-12 = "好，通信也良好。看來是沒問題了。那麼，現在開始確認作戰概要。"
10003070-13 = "我們風紀委員會的夏季集訓將於今天下午4點結束。結束後將迅速返回格黑娜學園。"
10003070-14 = "原本今天傳達給委員長的行程，只有參加下午的全體射擊訓練。"
10003070-15 = "但在訓練之前，委員長表示想抽空去海邊游泳。"
10003070-16 = "也就是說……委員長自己也開始想休假了！"
10003070-17 = "所以我們的任務很簡單，要全力支持陽奈委員長的暑假到最後！#n在回到學園之前都是假期！"
10003070-19 = "具體來說，為了以防萬一，得事先排除海邊的危險因素。#n並且之後也要繼續處理接近海邊的不穩定因子，讓委員長可以無憂無慮地享受大海！"
10003070-20 = "這些，是風紀委員會該做的事嗎……？"
10003070-21 = "由於昨天的騷動，這裡幾乎沒有什麼人，所以應該是安全的吧……"
10003070-22 = "別說那些多餘的話！還有老師，請銘記在心。#n這次擔任最重要角色的人就是老師！"
10003070-23 = "[s]「那個……我會加油的……」"
10003070-24 = "老師可是肩負著教委員長游泳的重責大任哦！"
10003070-25 = "「為什麼是老師！？為什麼不是我呢！？#n　啊啊……！必須代替委員長指揮訓練實在是太痛苦了！」"
10003070-26 = "老實說我心裡是這麼想的，但這一切都是為了委員長……#n我也只能含著淚水，忍痛將這個職責交給老師。"
10003070-29 = "所以請您全力以赴！我再說一次，絕對不能出任何差錯！"
10003070-30 = "[s]「我，我知道了……」"
10003070-31 = "嗚哇，亞子醬幹勁十足呢……"
10003070-32 = "不過我也有點驚訝。沒想到那個天下無敵的委員長竟然不會游泳……#n畢竟他總是給人一種什麼都會的印象。"
10003070-33 = "這不也證明了他平時是多麼繁忙，以至於根本沒有時間去游泳嗎？"
10003070-34 = "閒聊就到此為止！請集中精神完成任務！"
10003070-35 = "委員長已經完成游泳的準備離開房間了！#n大家，請各就各位！"
10003070-39 = "海邊沒有異常。"
10003070-40 = "周邊一帶沒有任何問題。#n接下來就拜託您了，老師。"
10003070-41 = "[s] 「收到──！」"
10003070-42 = "嘛，看這個樣子應該是不會再出問題了……"
10003070-43 = "伊織，我已經跟你說過很多次了，你的烏鴉嘴還是少說幾句吧……"
10003070-44 = "嘛，確實是有二就有三。但不管怎麼說，現在已經──"
10003070-47 = "呃……"
10003070-48 = "（唉……）"
10003070-49 = "……等，等等！為什麼會在這種時候……！？#n不，這是……？"
10003070-50 = "怎麼了，亞子醬！？"
10003070-51 = "……行政官？"
10003070-53 = "情報部傳來聯絡！"
10003070-54 = "太妹集團「罪i搗亂」和「溼答答頭盔團」正在飯店後方的貧民窟集結！"
10003070-55 = "其規模……估計有兩個營以上！"
10003070-56 = "怎麼會……為什麼這兩群人會聚在一起！？"
10003070-57 = "……對方傳來了通訊！我這就將畫面顯示出來！"
10003070-60 = "為什麼我們會聚在一起？#n那當然是因為……！"
10003070-61 = "呵哈哈哈！！因為我們決定暫時結盟！"
10003070-62 = "畢竟我們剛剛聽到了一個不錯的情報啊。"
10003070-63 = "知道是什麼情報嗎？是不是很好奇？#n就是那個風紀委員長不在的情報啊！"
10003070-64 = "這下情況就不同了！#n少了委員長的風紀委員會根本沒有害怕的理由和必要！"
10003070-65 = "沒了委員長的風紀委員會就只是群烏合之眾而已！#n我們這就來收拾你們這些妨礙決鬥的傢伙！這就是宣戰公告！"
10003070-66 = "啊哈哈哈哈！竟敢對我們動手，一定讓你們後悔！"
10003070-70 = "你說什麼……！不過是些小角色罷了！！！"
10003070-71 = "（那個語氣，聽起來是真的生氣了……）"
10003070-72 = "真的假的……各個擊破就已經夠辛苦了，他們聯手的話……我們阻止的了嗎？"
10003070-73 = "必須阻止！不行也要行！"
10003070-74 = "那個，最好還是向委員長報告……"
10003070-75 = "駁回！"
10003070-76 = "委員長好不容易想休假，不能就此放棄！"
10003070-77 = "那改向留守學園的風紀委員會請求支援……"
10003070-78 = "那怎麼行！稍有差錯就會被委員長發現的！"
10003070-79 = "得靠來參加集訓的現有兵力想辦法！"
10003070-80 = "不，只靠這些不行吧……"
10003070-81 = "不行也得行！！！"
10003070-82 = "幸好還有時間。趁現在制定作戰計畫，比如在敵人擺好陣形之前……"
10003070-83 = "報告行政官！有數名武裝份子正在接近飯店周邊！"
10003070-84 = "啊！？是誰！"
10003070-85 = "在前方率領的人……手裡似乎拿著許多不明的袋子。"
10003070-86 = "由於距離過遠，難以用肉眼辨識……#n但袋子裡似乎裝著「圓柱形、表面凹凸不平的東西」！"
10003070-87 = "該不會，是傳聞中的改造型鳳梨手榴彈！？到底從哪裡弄來那麼危險的東西……！？"
10003070-88 = "啊，現在看清楚了……！那個是……是玉米！"
10003070-89 = "……什麼？"
10003070-91 = "慶典來啦──！！玉米不論是用烤的還是煮的都很好吃唷～！"
10003070-92 = "呵呵呵★終於有慶典的感覺了呢。"
10003070-93 = "醬油和奶油都很不錯，但說到玉米，果然還是要配草莓醬呢！"
10003070-94 = "不要只想著吃，也想想該怎麼賣啊！話說別把草莓醬塗在玉米上！！"
10003070-95 = "呵呵呵，開始熱鬧起來了呢……！"
10003070-96 = "這正是證明「慶典玉米的好吃程度與氣氛成正比」……這個假說的絕佳機會。"
10003070-99 = "上吧，為了更熱鬧的慶典！為了在那前方的孤高美食之道！！"
10003070-100 = "雖然不太明白，但弄得更熱鬧這點我非常贊成★"
10003070-102 = "……"
10003070-103 = "……"
10003070-104 = "唉，真是無法理解……"
10003070-105 = "報告！又有別的勢力正在向貧民窟前進……！"
10003070-106 = "啊？還有誰！？#n頭盔團？太妹？美食研究會？能出現的都已經出現了吧！？"
10003070-107 = "是，是不同的團體……！我顯示在畫面上！"
10003070-110 = "嗨～大家好呀！今天也是適合開發的日子呢！"
10003070-111 = "嗯～我們是溫泉開發部～！"
10003070-112 = "溫，溫泉開發部！？"
10003070-113 = "據佳澄部長說，這附近有座海底火山。"
10003070-114 = "說是海洋深層水溫泉什麼的……嘛，細節我也不是很清楚！"
10003070-115 = "總之我要到那邊去～！"
10003070-116 = "燒毀森林，拆除建築物，把這一帶都變成溫泉！開發時間到了！！"
10003070-117 = "啊，等溫泉蓋好，我會給你們免費入場券的！"
10003070-118 = "那麼，先這樣囉！打擾了～♪"
10003070-122 = "溫泉開發部大約有200名成員正在集結！#n此外還有戰車與重型機械……推土機，甚至是挖土機……！"
10003070-123 = "貧民窟的兵力正在增加！#n太妹集團「罪i搗亂」和「溼答答頭盔團」散在遠處的殘黨正慢慢集結！"
10003070-124 = "不僅如此，還確認到自動機、戰車、直升機！"
10003070-125 = "其他地區的太妹團體也不知為何聚集過來了！#n他們在視野良好的地方置了板凳，完全進入了觀戰模式！！"
10003070-126 = "啊！他們為了搶座位打起來了！"
10003070-127 = "美食研究會開始在大街中央擺玉米攤了！"
10003070-128 = "溫泉開發部正在用推土機和挖土機發動進攻……#n不知為何和美食研究會展開了戰鬥！"
10003070-129 = "太妹集團「罪i搗亂」和「溼答答頭盔團」正在向我們襲來……！！"
10003070-139 = "……"
10003070-140 = "…………"
10003070-141 = "亞子行政官，該怎麼辦……！"
10003070-142 = "行政官，請指示！"
10003070-143 = "……嗚。"
10003070-144 = "……嗚？"
10003070-145 = "哇啊啊啊……！！這種情況，你要我怎麼辦嘛！？"
10003070-146 = "擋住一邊就擋不住另一邊啊！#n這樣一起來是要我怎麼辦！？"
10003070-147 = "亞，亞子醬……先冷靜下來……"
10003070-148 = "這種情況是要我怎麼冷靜！！"
10003070-149 = "總之先想想辦法……"
10003070-150 = "辦法辦法，能有什麼辦法！！"
10003070-151 = "還敢說是「格黑娜最安靜的海岸」！？現在不是最熱鬧的地方嗎！！"
10003070-152 = "原來如此，[ruby=hammer and anvil]是錘鉆戰術的[/ruby]情境呢。"
10003070-153 = "是的！您說的沒錯！不愧是委員長！"
10003070-154 = "既然如此，能突破情況的戰略並非防守……#n如果將其視為包圍網的話……"
10003070-155 = "美食研究會、頭盔團、太妹集團，以及溫泉開發部。#n數量雖然多，但彼此並未合作。頭盔團和太妹集團間的指揮系統應該也沒那麼完善。"
10003070-156 = "沒錯，他們的弱點就是彼此的配合不夠完善。#n只要用精密的戰術突破包圍網的話……那麼應該採取的戰術就[ruby=Blitzkrieg]是閃電戰！[/ruby]"
10003070-157 = "沒錯。只要將對方的包圍網視為以飯店為圓心的圓形即可。#n而這就是我們的進攻路線。"
10003070-158 = "原來如此……！不愧是委員長！一下子就找到答案了！"
10003070-159 = "那麼開始作戰！"
10003070-160 = "一切都是為了……"
10003070-161 = "……"
10003070-162 = "……"
10003070-165 = "……"
10003070-168 = "委員長的，暑假……"
10003070-169 = "……"
10003070-170 = "咦咦咦咦咦！？"
10003070-173 = "[ns1] 「陽奈！？你是什麼時候……！」\n[ns2] （我忘記我們約在海邊了……！）"
10003070-174 = "……"
10003070-175 = "……"
10003070-176 = "……亞子。"
10003070-177 = "啊，是，是……"
10003070-178 = "訓練為什麼會變成這樣，之後我再聽你說。"
10003070-181 = "全員，準備戰鬥。"
10003070-182 = "一口氣解決他們。"
10003070-183 = "了，了解！"
10003070-184 = "是！"

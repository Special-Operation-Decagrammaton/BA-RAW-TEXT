[translation]
31060-1 = "#title;제6화;자기소개의 시간"
31060-2 = "#place;보충수업부 교실"
31060-3 = "#na;(간단한 자기소개와 보충수업부의 소개가 이어졌다.)"
31060-4 = "3;히후미;00;……저기, 그런 거니까. 앞으로 짧은 시간이지만 잘 부탁드려요……. \n#3;a\n#3;em;[반짝]\n#3;greeting"
31060-5 = "[s] \"잘 부탁드립니다.\""
31060-6 = "3;아즈사;01;…….\n#3;a"
31060-7 = "1;하나코;01;…….\n#1;a"
31060-8 = "5;코하루;00;…….\n#5;a"
31060-9 = "3;아즈사;01\n1;하나코;01\n5;코하루;00\n#1;d\n#3;d\n#5;d\n#wait;1000"
31060-10 = "#all;hide"
31060-11 = "3;히후미;01;아우…… 저기…… 다들 잘 이해했으려나……. \n#3;a\n#3;em;…"
31060-12 = "5;아즈사;02;물론. 이제 정규 수업 외에 매일 방과 후에 특별 훈련을 더 한다는 거잖아. \n#5;a\n#5;em;[반응]\n#3;m1"
31060-13 = "3;히후미;01;네…… 우리의 목표는 앞으로 있을 특별 학업 능력 평가 시험…… 그걸 모두가 함께 통과하는 것……."
31060-14 = "3;히후미;02;거, 거창한 목표도 아니라…… 다 같이 낙제를 받지 않는 것! 그 정도니까요……. 선생님도 전력으로 도와주실 거고……."
31060-15 = "3;히후미;01;평가 시험은 앞으로 3차까지 있지만, 우리가 낙제를 면하면 더이상 시험은 치르지 않아도 되고…… 보충수업도 거기서 종료인 거예요!\n#3;em;[!]"
31060-16 = "3;히후미;00;선생님은 주로 저희를 관리, 감독하고 일정을 체크해주실 거고…… 다양한 수업의 보충도 지원해 주실 거예요.\n#3;em;[반응]"
31060-17 = "5;아즈사;02;이해했어. 어려운 임무는 아니야. 미션을 다 같이 성공적으로 완수한다. 그러기 위해 매일 여기에 모여 훈련을 거듭한다. \n#5;greeting"
31060-18 = "5;아즈사;01;결국 각자의 리타이어를 막기 위해 모인 모임. 굳이 내가 사보타주를 할 이유는 없지.\n#5;em;…"
31060-19 = "3;히후미;03;네! 맞아요. 저기, 아즈사 쨩. 아즈사 쨩은 전학 온 지 얼마 되지 않았잖아요? \n#3;hophop\n#3;em;[반짝]"
31060-20 = "3;히후미;00;아직 이 학원에 적응하는 중인 거니까, 선생님과 함께 노력하다 보면 금세 보충수업을 끝낼 수 있을 거예요."
31060-21 = "1;하나코;02;어머? 시라스 씨는 전학 온 거예요?\n#3;hide\n#1;em;[?]"
31060-22 = "1;하나코;01;이 트리니티에? 별로 그런 케이스는 잘 없었는데……."
31060-23 = "5;아즈사;99;……. \n#5;em;…"
31060-24 = "1;히후미;04;아…… 서류상으로는 그렇게 적혀 있어서…… 아우…… 혹시 제가 괜한 말을…….\n#1;em;[땀]\n#1;stiff"
31060-25 = "5;아즈사;01;아니, 딱히 숨길 일은 아니야. 신경 쓰지 않아도 돼. 사실이니까."
31060-26 = "5;아즈사;02;적응이야 하면 되는 문제고. 노력이야 하면 되는 거고."
31060-27 = "1;하나코;01;흐음……."
31060-28 = "1;하나코;02;응, 그럼 저도 아즈사 쨩이라고 불러도 되나요? \n#1;em;[반응]"
31060-29 = "5;아즈사;01;……? 딱히 상관없는데?"
31060-30 = "1;하나코;03;응, 아즈사 쨩. 히후미 쨩. 그리고 코하루 쨩. 우후후후. 좋은 울림이네요. 보충수업의 동지들이에요.\n#1;em;[반짝]\n#1;greeting"
31060-31 = "1;하나코;01;아즈사 쨩은 얼음마녀처럼 생겨서 은근히 귀여운 부분도 있고. 후후후."
31060-32 = "#st;[0,0];instant;1;"

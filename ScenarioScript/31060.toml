31060-74 = "3;히후미;01;아, 아우……. 가, 가버렸어요…….\n#3;ar"
31060-75 = "3;하나코;03;후후, 코하루 쨩은 텐션의 폭이 큰 게 재미있네요.\n#3;em;[음표]"
31060-76 = "3;하나코;01;거기에 비해 아즈사 쨩은 거의 일관된 느낌이라 재미있고."

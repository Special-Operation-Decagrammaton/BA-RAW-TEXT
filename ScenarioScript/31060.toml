[translation]
31060-1 = "Episode 6;Breaking the Ice"
31060-2 = "Make-Up Work Club Classroom"
31060-3 = "(The Make-Up Work Club members briefly introduced themselves.)"
31060-4 = "That's the long and short of the situation. This is just a temporary arrangement, but let's try to make the most of it."
31060-5 = "[s] \"It's a pleasure to meet you all.\""
31060-6 = "..."
31060-7 = "..."
31060-8 = "..."
31060-11 = "Are there, uh...any questions?"
31060-12 = "None. We're to do special afterschool training in addition to our regular classes. It's simple to understand."
31060-13 = "Basically. The goal is for each of us to pass the special academic evaluation exam that's coming up..."
31060-14 = "W-We don't necessarily have to ace it or anything—we just have to not fail is all... Sensei will do everything to help us too."
31060-15 = "We'll also get three attempts at the exam. But if we pass the first one, we won't have to take it again. That means our make-up work would end early!"
31060-16 = "Sensei's role will be to manage and supervise us while checking our schedules. We can also turn to Sensei for supplemental lessons to our regular classes."
31060-17 = "Understood. Our objective is to complete this mission together. We must gather here every day to train in order to do so."
31060-18 = "Essentially, this is a gathering of people trying to avoid dishonorable discharge. I see no reason to sabotage this arrangement."
31060-19 = "Exactly! Oh, come to think of it...you transferred here not very long ago, isn't that right, Azusa?"
31060-20 = "You must still be getting used to the academy. If you work hard with Sensei, you'll finish your make-up work in no time."
31060-21 = "Oh? Is Miss Shirasu a transfer student?"
31060-22 = "It's rare for someone to transfer into Trinity..."
31060-23 = "..."
31060-24 = "Well, at least that's what your file said... Oh, no. Did you not want me to share that?"
31060-25 = "No, there's no point in hiding the truth. Don't worry about it."
31060-26 = "Adapting is merely a matter of putting in the appropriate work."
31060-27 = "Hmm..."
31060-28 = "You wouldn't mind me calling you Azusa, would you?"
31060-29 = "No? Why would I mind?"
31060-30 = "Wonderful! My clubmates Azusa, Hifumi, and Koharu. I like the sound of that. We're soldiers fighting in the trenches that is make-up work."
31060-31 = "You may act like an ice queen, Azusa, but I can tell you have a sweet side. Heehee."
31060-37 = "..."
31060-38 = "This can't be right. Koharu's eyes look like they're filled with hate for some reason!"
31060-39 = "You all... What did I do to deserve this? I refuse to accept it!"
31060-40 = "Wh-Wha...?"
31060-41 = "Refuse to accept what?"
31060-42 = "I-I'm an elite member of the Justice Task Force!"
31060-43 = "D-Don't you dare look down on me just because I'm the only first-year here!"
31060-44 = "I'll be out of this stupid Make-Up Work Club before you know it, so don't get too friendly!"
31060-45 = "Hmm. You have a point. I don't see the need for us to treat each other any differently based on class year. I'm okay with that."
31060-46 = "That works for me too. I'm not used to that kind of culture anyway."
31060-47 = "Besides, we're each here for our own benefit, so I don't see the need to pretend to be friends."
31060-48 = "Well..."
31060-49 = "Great! Truth is, I've actually been keeping a secret from you all..."
31060-50 = "The reason I've been failing recently is because I was taking the second-year exams so I could skip a grade!"
31060-51 = "Skip a grade? Why would you want to do that?"
31060-52 = "Why?! Because I'm going to become the Justice Task Force's ace!"
31060-53 = "Um, but that's how you failed, isn't it? I could understand trying it once, but why continue doing it after failing?"
31060-54 = "Sh-Shut up! That's not what's important!"
31060-56 = "The point is that I've been hiding my true power."
31060-61 = "This time, I'll take the first-year exam! I'm sure to earn an excellence award, aren't I?"
31060-66 = "After that, it's farewell to the Make-Up Work Club!"
31060-67 = "No one said anything about being done with make-up work if you win an excellence award..."
31060-68 = "You were holding back? I see. Just so you know, I'll be taking the first-year exam as well."
31060-69 = "Wh-Who cares? I'm done with the Make-Up Work Club after the next exam! See you later, it was nice knowing you—that's all I'm trying to say!"
31060-70 = "I have it all figured out, so pretend like I was never here! Bye! Ahahaha!"
31060-71 = "And good luck!"
31060-74 = "Sh-She really left..."
31060-75 = "Aren't Koharu's little mood swings the cutest?"
31060-76 = "On the other hand, it's adorable how Azusa never changes."
31060-79 = "Um..."
31060-80 = "I think I'm going to like it here. Heehee."
31060-82 = "(From that point forward, the Make-Up Work Club gathered every day for after school lessons.)"
31060-84 = "Next Episode;Exam Prep"

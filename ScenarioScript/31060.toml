[translation]
31060-1 = "ตอนที่ 6;เวลาแห่งการแนะนำตัว"
31060-2 = "ห้องเรียนชมรมชั้นเรียนเสริม"
31060-3 = "(ถึงเวลาของการแนะนำตัวง่ายๆ และแนะนำชมรมชั้นเรียนเสริม)"
31060-4 = "คือ... ทุกคนคะ... ถึงเราจะอยู่ด้วยกันในช่วงเวลาสั้นๆ แต่ก็ฝากตัวด้วยนะคะ..."
31060-5 = "[s] \"ฝากตัวด้วยนะ\""
31060-6 = "......"
31060-7 = "......"
31060-8 = "......"
31060-11 = "อ่า... ไม่รู้ว่า... ทุกคนเข้าใจฉันหรือเปล่า..."
31060-12 = "เข้าใจสิ เราต้องรับการฝึกพิเศษนอกจากชั่วโมงเรียนและหลังเลิกเรียนในทุกวัน แบบนี้ใช่ไหมล่ะ"
31060-13 = "ค่ะ... เป้าหมายของพวกเราคือ... ผ่านการสอบประเมินความสามารถทางวิชาการพิเศษ...#nด้วยกันทุกคน..."
31060-14 = "อย่ามองว่าเป็นเป้าหมายที่หนักหนาเลยนะคะ... ก็แค่การสอบให้ผ่านเท่านั้น!#nและคุณครูก็จะอยู่กับพวกเราด้วย..."
31060-15 = "การสอบประเมินจะมีด้วยกัน 3 รอบ และถ้าเราสอบผ่าน ก็ไม่ต้องสอบอีกต่อไป...#nและชมรมชั้นเรียนเสริมก็จะปิดตัวลงได้ค่ะ!"
31060-16 = "คุณครูจะช่วยดูแล ให้คำปรึกษา และเช็กตารางเรียนของพวกเราให้...#nและจะช่วยสอนเสริมให้ในหลายๆ วิชาด้วยค่ะ"
31060-17 = "เข้าใจแล้ว ไม่ใช่งานยากเลย เราต้องทำภารกิจให้สำเร็จด้วยกัน ก็เลยต้องมารวมตัวกันที่นี่#nเพื่อฝึกฝนในทุกวัน"
31060-18 = "สุดท้ายแล้วก็คือการรวมตัวกันเพื่อไม่ให้แต่ละคนต้องลาออก และฉันก็ไม่เห็นเหตุผลที่จะต้องโดด"
31060-19 = "ใช่ค่ะ ใช่แล้วค่ะ! จริงสิ อาซึสะจังเพิ่งย้ายมาเรียนที่นี่ได้ไม่นานใช่ไหมคะ?"
31060-20 = "ตอนนี้อาซึสะจังยังปรับตัวกับสถาบันนี้อยู่ ถ้าพยายามไปพร้อมกับคุณครูล่ะก็#nฉันว่าเราสามารถยุติชมรมชั้นเรียนเสริมได้ในไม่ช้าแน่ค่ะ"
31060-21 = "ตายจริง? คุณชิราสึย้ายมาใหม่เหรอคะ?"
31060-22 = "ปกติแล้วไม่ค่อยมีใครย้ายมาทรีนิตี้เลยนี่นา..."
31060-23 = "......"
31060-24 = "อ่า... ในเอกสารเขียนไว้ว่าแบบนั้นน่ะค่ะ... นะ... นี่ฉันพูดมากไปหรือเปล่านะ..."
31060-25 = "ไม่เป็นไร ฉันก็ไม่ได้คิดจะปิดบังอยู่แล้ว ไม่ต้องกังวลหรอก ก็มันเป็นเรื่องจริงนี่"
31060-26 = "เรื่องปรับตัวอาจจะเป็นปัญหาหน่อย แต่เรื่องพยายามฉันคงทำได้ง่ายๆ"
31060-27 = "อืม..."
31060-28 = "ถ้างั้นฉันเรียกว่าอาซึสะจังได้ไหมคะ?"
31060-29 = "......? ฉันได้หมดอยู่แล้ว"
31060-30 = "อื้ม อาซึสะจัง ฮิฟุมิจัง แล้วก็โคฮารุจัง อุฮุฮุฮุ ฟังดูดีนะคะเนี่ย เราคือพวกพ้องแห่งชั้นเรียนเสริมค่ะ"
31060-31 = "ดูภายนอกแล้วอาซึสะจังเหมือนแม่มดน้ำแข็งเลย แต่ก็มีมุมที่น่ารักเหมือนกันนะคะ ฮุฮุฮุ"
31060-37 = "......"
31060-38 = "แต่โคฮารุจังกำลังมองพวกเราด้วยสายตาแห่งความเกลียดชังนะคะ"
31060-39 = "ก็ฉัน... ฉันรับไม่ได้นี่นา...!"
31060-40 = "อะ... อ่า...?"
31060-41 = "รับอะไรไม่ได้เหรอคะ?"
31060-42 = "ก็ฉันน่ะ! ฉันเป็นถึงสมาชิกอีลีทของชมรมทวงความยุติธรรมนี่นา!"
31060-43 = "ถ้าจะบังคับให้เรียกว่ารุ่นพี่เพราะฉันอายุน้อยล่ะก็ ฉันไม่ยอมด้วยหรอก!"
31060-44 = "อีกอย่าง ฉันก็อยากรีบออกจากชมรมชั้นเรียนเสริมอะไรนี่ให้ไวๆ แล้ว!#nเพราะงั้นไม่ต้องมาทำเป็นสนิทกันหรอกนะ!"
31060-45 = "อืม... ก็จริงนะคะ เราไม่ต้องมาดูอายุกันในชมรมชั้นเรียนเสริมหรอกค่ะ ฉันเองก็ไม่ได้ซีเรียสค่ะ"
31060-46 = "ฉันก็ด้วย ไม่เห็นจะชินกับธรรมเนียมแบบนี้เลย"
31060-47 = "อีกอย่าง เรามารวมกันเพื่อผลประโยชน์ของกันและกัน ไม่เห็นจะต้องแกล้งทำเป็นสนิทกันเลย"
31060-48 = "อ่า... อ่า...."
31060-49 = "ดีเลย! เพราะจริงๆ แล้วฉันมีความลับที่ซ่อนเอาไว้อย่างหนึ่ง"
31060-50 = "สาเหตุที่ฉันสอบไม่ผ่านมาตลอด... ก็เพราะฉันไปสอบข้อสอบของปี 2 เพื่อจะได้ข้ามชั้นยังไงล่ะ!"
31060-51 = "ข้ามชั้นเหรอ? ข้ามทำไมล่ะ...?"
31060-52 = "ทำไมงั้นน่ะเหรอ...?! เพราะฉันจะเป็นอีลีทแห่งชมรมทวงความยุติธรรมยังไงล่ะ!"
31060-53 = "แต่ทำแบบนั้นจนสอบไม่ผ่านนี่นะคะ...? ฉันเข้าใจว่าเราไปสอบวัดความสามารถตัวเองแบบนั้นได้#nแต่ถ้ารู้ผลแล้วก็ไม่น่าจะดันทุรังต่อนะ..."
31060-54 = "งะ... เงียบไปเลยน่า! นั่นไม่ใช่สิ่งที่ฉันจะสื่อสักหน่อย!"
31060-56 = "ประเด็นก็คือ \"ฉันซ่อนพลังเอาไว้\" แบบนี้ต่างหาก"
31060-61 = "ครั้งนี้ฉันจะสอบข้อสอบของปี 1 ที่เหมาะกับฉัน! แบบนี้คงคว้ารางวัลดีเด่นมาได้ในการสอบรอบเดียว!"
31060-66 = "และก็จะออกจากชมรมชั้นเรียนเสริม!"
31060-67 = "ไม่ได้มีการตกลงว่าให้จบจากชมรมชั้นเรียนเสริมด้วยรางวัลดีเด่นได้ แต่ก็..."
31060-68 = "ซ่อนพลังของตัวเองไว้งั้นเหรอ? ฉันก็สอบข้อสอบของปี 1 อยู่เหมือนกัน"
31060-69 = "มะ... ไม่เห็นจะอยากรู้เลย? เอาเป็นว่า เตรียมตัวจากกันด้วยการสอบครั้งต่อไปได้เลย#nไม่ว่าจะชมรมชั้นเรียนเสริมหรือใครก็ตาม ถึงจะเป็นช่วงเวลาสั้นๆ แต่มันก็ไม่ได้แย่หรอก!"
31060-70 = "นี่แหละกลยุทธ์ที่สมบูรณ์แบบของฉัน! ไม่ต้องเป็นห่วงฉันก็ได้นะ! อะฮ่ะฮ่ะฮ่า!"
31060-71 = "ถ้างั้นก็ บาย! พยายามกันเข้าล่ะ!"
31060-74 = "อะ... อ้าว... ไปซะแล้ว..."
31060-75 = "ฮุฮุ โคฮารุจังมีพลังเหลือล้นจังเลยนะคะ"
31060-76 = "ส่วนอาซึสะจังก็มีความมุ่งมั่น ชักจะสนุกแล้วสิคะ"
31060-79 = "อ่า..."
31060-80 = "สงสัยแล้วล่ะค่ะว่าต่อไปพวกเราจะเป็นยังไง ฮุฮุฮุ"
31060-82 = "(หลังจากนั้นชมรมชั้นเรียนเสริมก็มาเจอกันในห้องเรียนทุกวันหลังเลิกเรียนเพื่อเรียนพิเศษ)"
31060-84 = "ตอนต่อไป;เตรียมตัวสอบ"

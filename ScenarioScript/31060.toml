31060-65 = "#all;hide"
31060-66 = "3;코하루;07;그걸로 보충수업부를 탈출해주겠어!\n#3;em;[반응]"
31060-67 = "1;히후미;04;우수상을 받으면 보충수업을 수료한다는 약속은 없었지만…….\n#1;a\n#3;m5"
31060-68 = "1;아즈사;01;자신의 전력을 숨기는 기만책인가. 참고로 나도 1학년 시험을 치는 중이야.\n#1;em;…"
31060-69 = "3;코하루;11;과, 관심없거든? 그러니까 보충수업부든 뭐든 다음 시험으로 안녕이라는 거야! 짧은 시간동안 반가웠어, 그런 얘기지!\n#3;em;[!]\n#3;stiff"
31060-70 = "3;코하루;03;이걸로 내 전략은 완벽해! 나는 신경 쓰지 않아도 돼! 아하하하!\n#3;em;[재잘]"
31060-71 = "3;코하루;03;그럼 안녕! 열심히들 하라고!\n#3;hophop\n#3;m3\n#3;em;[반응]\n#1;dl"

31060-36 = "3;코하루;10\n#3;a\n#wait;1000"
31060-37 = "3;코하루;10;…….\n#3;em;…"
31060-38 = "3;하나코;03;그치만 코하루 쨩이 헤이트에 가득 찬 표정으로 우릴 보고 있어요?\n#3;em;[?]"
31060-39 = "5;코하루;07;저기…… 마, 말해두지만. 난 인정 못하니까……!\n#5;al\n#5;em;[반응]\n#3;m1"
31060-40 = "1;히후미;04;아, 아우?\n#3;hide"
31060-41 = "1;하나코;02;어떤 걸요?"
31060-42 = "5;코하루;12;나, 나는! 엘리트 정의실현부원이니까! \n#5;hophop\n#5;em;[반응]"
31060-43 = "5;코하루;11;따, 딱히 내 나이가 어리다고 선배라고 부르라거나, 그런 건 절대 용납 안할 거고!"
31060-44 = "5;코하루;11;그리고 이딴 보충수업부도 얼른 탈출해버릴 거니까!! 크게 친한 척하진 말아줬으면 좋겠거든!\n#5;hophop"
31060-45 = "1;하나코;03;……음, 그러네요. 보충수업부에서까지 선후배를 굳이 따질 필요는 없죠. 저는 불만 없답니다.\n#1;em;[음표]\n#1;greeting"
31060-46 = "5;아즈사;01;나도 딱히 상관은 없어. 그런 문화에 익숙하지도 않고."
31060-47 = "5;아즈사;02;그리고 어차피 서로의 이익을 위해 모인 거니 굳이 친한 척할 이유가 없잖아?\n#5;em;[?]"
31060-48 = "1;히후미;04;아, 아우우…….\n#1;stiff"
31060-49 = "5;코하루;07;잘됐네! 사실은 말이지, 숨기고 있었던 비밀이 있었거든?"
31060-50 = "5;코하루;11;내가 그동안 낙제를 받은 이유는…… 사실은 월반을 위해 2학년 시험을 쳤기 때문이야!\n#5;hophop\n#5;em;[반응]"
31060-51 = "1;하나코;02;월반을요? 왜 그런 짓을……?\n#1;em;[?]"
31060-52 = "5;코하루;04;왜냐니……?! 나는 앞으로 정의실현부의 엘리트가 될 몸이니까……!\n#5;stiff"
31060-53 = "1;하나코;99;음, 그치만 그렇게 해서 낙제를 받은 거잖아요? 한 번 정도는 시도할 수 있겠지만, 그걸 몇 번이나 반복했다는 건…….\n#1;em;…"
31060-54 = "5;코하루;11;시, 시끄러! 내가 하고 싶은 말은 그게 아냐! \n#5;hophop"
31060-55 = "#all;hide"

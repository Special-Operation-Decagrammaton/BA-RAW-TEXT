[translation]
31060-1 = "第6話;來自我介紹吧！"
31060-2 = "補課部．教室"
31060-3 = "（那之後，進行了簡單的自我介紹和補課部的介紹）"
31060-4 = "那個，事情就是這樣……接下來的一小段時間內，還請多多指教。"
31060-5 = "[s]「請多指教哦。」"
31060-6 = "……"
31060-7 = "……"
31060-8 = "……"
31060-11 = "那，那個……大家都明白現在的情況了嗎……"
31060-12 = "當然。以後除了普通的授課外，每天放學後還要追加特殊訓練對吧。"
31060-13 = "是的……我們的目標是在不久後舉行的特別學力測驗中一起及格……"
31060-14 = "不，不是什麼遠大的目標……只要大家都及格就行了！#n而且老師也會幫忙……"
31060-15 = "雖然特別學力測驗一共有三次……#n不過只要我們能同時及格一次，就不必參加後續的考試，補課也就結束了！"
31060-16 = "而老師的工作主要是管理、監督、確認日程……以及協助各種課程的補充教學。"
31060-17 = "我明白了。三次任務之中至少有一次要所有人一起成功。#n因此需要每天聚集在這裡訓練……並不是很困難。"
31060-18 = "而這個聚會是為了避免彼此放棄的措施……對我來說沒有理由加以破壞。"
31060-19 = "沒錯沒錯！那個，梓醬轉學來之後還沒過多久吧？"
31060-20 = "之前可能是因為還在習慣學校才會不及格……#n我想只要跟老師和大家一起努力，很快就能脫離補課部了！"
31060-21 = "哎呀？白洲同學是轉學來的嗎？"
31060-22 = "轉學到三一？#n真少見呢……"
31060-23 = "…… "
31060-24 = "啊……文件上是這麼寫的……#n難，難道我說了多餘的話嗎……？"
31060-25 = "不，我也沒打算隱瞞這件事。#n你不需要在意，畢竟這是事實。"
31060-26 = "只要加緊努力，趕快適應就行了。"
31060-27 = "唔嗯……"
31060-28 = "那，我也可以叫你梓醬嗎？"
31060-29 = "……？我倒是無所謂？"
31060-30 = "嗯，梓醬、日步美醬、還有小春醬。#n唔呵呵呵，總覺得聽起來很悅耳呢。我們以後就是補課部的夥伴了。"
31060-31 = "雖然梓醬乍看之下給人一種冰之魔女的感覺，不過也有其他可愛的地方呢。呵呵呵。"
31060-37 = "……"
31060-38 = "不過小春醬卻用充滿憎惡的眼神看著我們呢？"
31060-39 = "我，我話先說清楚，我是不會承認的……！"
31060-40 = "咦……？"
31060-41 = "你指的是什麼意思呢？"
31060-42 = "我，我可是實現正義部的菁英！"
31060-43 = "就算年紀比較小，我也不打算叫你們前輩！"
31060-44 = "而且我很快就會離開這種社團了！可以不要和我裝熟嗎！"
31060-45 = "原來如此……確實沒必要連在補課部都特別區分前輩後輩呢。我完全沒問題哦。"
31060-46 = "我也無所謂。反正我也不習慣那種文化。"
31060-47 = "而且大家只是為了彼此的利益而聚在這裡，本來就沒必要好來好去不是嗎？"
31060-48 = "啊，啊嗚嗚……"
31060-49 = "那就這麼決定了！#n話說其實我有個祕密沒告訴你們哦？"
31060-50 = "我以前之所以會不及格……其實是為了跳級而去考了2年級的考試！"
31060-51 = "跳級？為什麼呢……？"
31060-52 = "為什麼……！？那是因為我之後，將會成為實現正義部的菁英……！"
31060-53 = "不過卻因此不及格了對吧？#n如果只挑戰一次的話還能理解，挑戰了好幾次又是為什麼呢……"
31060-54 = "少，少囉嗦！我想說的不是那個！"
31060-56 = "重點是我一直以來都隱藏著真正的實力！！"
31060-61 = "只要我下次乖乖去考1年級的考試，拿個成績優異獎有什麼難的？"
31060-66 = "這樣就能馬上離開補課部了！"
31060-67 = "那個，好像沒有得到成績優異獎就能結束補課的規定……"
31060-68 = "原來如此，是隱藏實力的計策啊。#n順帶一提，我參加的也是1年級的考試。"
31060-69 = "我，我其實不是很在乎……反正補課部什麼的，下次考試之後就跟我無關了！#n很高興能跟大家短暫相處，就是這樣！"
31060-70 = "我的策略真完美！你們真的不用在意我沒關係，啊哈哈！"
31060-71 = "再見！儘管加油吧！"
31060-74 = "啊，啊嗚……走掉了呢……"
31060-75 = "呵呵，小春醬的情緒起伏很厲害，看起來真有趣呢。"
31060-76 = "相較之下，梓醬則總是一以貫之呢。"
31060-79 = "啊嗚嗚……"
31060-80 = "接下來的日子真讓人期待，呵呵呵。"
31060-82 = "（於是在這之後，補課部每天都會於放學後在教室集合，並接受特別課程）"
31060-84 = "下一話;準備考試"

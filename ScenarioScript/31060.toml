31060-59 = "1;하나코;02\n5;히후미;02\n#1;em;[?]\n#5;em;[?]\n#1;h\n#5;h\n#wait;2000"
31060-60 = "#all;hide"
31060-61 = "3;코하루;03;그런 내가 이번 시험엔 제대로 1학년 시험을 쳐 줄 거니까! 그럼 단번에 우수상을 받겠지? \n#3;em;[재잘]\n#3;hophop\n#3;closeup"

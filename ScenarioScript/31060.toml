[translation]
31060-1 = "第6話;自己紹介をしましょう！"
31060-2 = "補習授業部・教室"
31060-3 = "（その後、簡単な自己紹介と補習授業部の紹介が行われた）"
31060-4 = "えっと、そういうことですので……短い間ですが、これからよろしくお願いします。"
31060-5 = "[s] \"よろしくね。\""
31060-6 = "……。"
31060-7 = "……。"
31060-8 = "……。"
31060-11 = "え、えっと、何か分からない点とか気になる点がありましたら……。"
31060-12 = "大丈夫。これからは普通の授業に加えて、毎日放課後に特殊訓練があるってだけでしょ。"
31060-13 = "えっと、訓練と言って良いのか分かりませんが、そうです。私たちが目指すのは、これから行われる特別学力試験で、「全員同時に合格する」こと。"
31060-14 = "先生も手伝ってくれますし、み、みんなで頑張って落第を免れましょう……！"
31060-15 = "特別学力試験は第3次まで、つまり3回あるようですが……そのうち一度でも全員同時に合格すれば、そこで補習授業も終わりとのことです！"
31060-16 = "先生には主に……スケジュールの調整や、色んな補習を行っていただければと。"
31060-17 = "うん、理解した。3回のミッションのうち、一度でも良いから全員で成功を収める。そのために、ここに毎日集まって訓練を重ねる……それほど難しい任務じゃない。"
31060-18 = "この集まりはつまり、各自のリタイアを防ぐための措置……私としては特に、サボタージュする気も理由も無い。"
31060-19 = "そ、そうですね、頑張りましょう！えっと、アズサちゃんは、転校してからあまり時間も経ってないんですよね？"
31060-20 = "まだこの学園に慣れてなかったせいもあるでしょうし、みんなで頑張ればすぐに何とかなると思います！"
31060-21 = "あら？[ruby=しらす]白洲[/ruby]さんはこちらに転校されて来たのですか？"
31060-22 = "トリニティに転校だなんて、珍しいですね……？"
31060-23 = "……。"
31060-24 = "あ、書類上はそう書いてあって……も、もしかして私、余計なことを……？"
31060-25 = "いや、別に隠すことじゃないから気にしないで良い。れっきとした事実だ。"
31060-26 = "こう言われるのは慣れるべきことだし、そのための努力もする。"
31060-27 = "なるほど……。"
31060-28 = "それでは私も、アズサちゃんって呼んでもいいですか？"
31060-29 = "……？別に良いけど？"
31060-30 = "では、アズサちゃん。ヒフミちゃん。それからコハルちゃん。うふふふ、何だか良い響きですね。私たちはこれから補習授業部の仲間ということで。"
31060-31 = "アズサちゃんは一見冷たそうに見えますが、なんだか可愛いらしいですし。ふふふっ。"
31060-37 = "……。"
31060-38 = "あら、そんな憎悪に満ちた目で、どうしたんですかコハルちゃん？"
31060-39 = "言っておくけど、私は認めないから……！"
31060-40 = "えっと……？"
31060-41 = "あら、何のことですか？"
31060-42 = "わ、私は、正義実現委員会のエリートだし！"
31060-43 = "私の方が年下だからって、あんたたちを先輩だなんて呼ぶつもりは無いから！"
31060-44 = "それにそもそも、こんな部活さっさと抜けてやるんだからっ！あんまり馴れ馴れしくしないでもらえる！？"
31060-45 = "なるほど……確かに補習授業部の中でまで、先輩後輩なんて扱いにする必要は無いと思います。私としては何も問題ありません。"
31060-46 = "私も別に。そもそもそういう文化は不慣れだし。"
31060-47 = "そもそも仲良くするために集まってる会じゃない。あくまでお互いの利益のためなんだから、親しいふりをする必要も無いはず。違う？"
31060-48 = "あ、あうぅ……。"
31060-49 = "じゃあ決まり！それに、そもそもの話なんだけど……。"
31060-50 = "私が試験に落ちたのはあくまで……飛び級のために、一つ上の2年生用のテストを受けたせいだから！"
31060-51 = "あら、飛び級？どうしてそんなことを……？"
31060-52 = "ど、どうしても何も……！私はこれから、正義実現委員会を背負う立場になるわけだし……！"
31060-53 = "でも、それで落第してしまったんですよね？一度試しにチャレンジするということであれば理解できますが、なぜそれを何度も……？"
31060-54 = "う、うるさいうるさい！私が言いたいのはそういうことじゃなくて！"
31060-56 = "つまり私は今まで、本当の力を隠してたってこと！！"
31060-61 = "今度のテストはちゃんと、1年生用のテストを受けるから！そうすればちゃんと優秀な成績を収めてはい終わりってわけ。分かる？"
31060-66 = "それで、すぐにこんな補習授業部なんて辞めてやるんだから！"
31060-67 = "えっと、個人で優秀な成績を出したとしても、それでこの部を卒業できるわけではなくって……。"
31060-68 = "なるほど、経歴を隠してたわけか。ちなみに私も今は、前のところとの学習進度の違いが大きかったから、1年生の試験を受けてる。"
31060-69 = "あ、じゃあ同じ……い、いや！どうせすぐに関係無くなるけど！"
31060-70 = "それに、短い付き合いで残念だったけど、あんたたちはそういう感じじゃないみたいだし？あははっ！"
31060-71 = "じゃあね、精々頑張って！"
31060-74 = "あ、あの……！い、行ってしまいましたね……。"
31060-75 = "ふふ、コハルちゃんはテンションの上下がすごくて、見ていて面白いですね。"
31060-76 = "アズサちゃんは対照的に、一貫して全然ブレないですし。"
31060-79 = "あうぅ……。"
31060-80 = "これから楽しみですね、ふふふっ。"
31060-82 = "（それから補習授業部は毎日放課後、教室に集まって特別な補習授業を受けることになった）"
31060-84 = "次回;試験勉強"

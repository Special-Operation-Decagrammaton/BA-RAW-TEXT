[translation]
22070-1 = "ตอนที่ 7;อุปกรณ์ประหลาด 2"
22070-13 = "แค่กๆๆ..."
22070-14 = "กะ... เกิดเรื่องอะไรขึ้นน่ะ?!"
22070-15 = "ทำไมจู่ๆ หุ่นยนต์ที่ดับอยู่ถึงกลับมาทำงานได้..."
22070-17 = "แถมยังมีระเบิดตามมาด้วย... นี่เป็นการโจมตีที่โจ่งแจ้งเลยค่ะ!"
22070-18 = "แล้วคนที่โจมตีเมื่อกี้ก็คือ..."
22070-29 = "\"...ตรวจพบปฏิกิริยาตอบสนองของสิ่งมีชีวิต\""
22070-30 = "\"ตรวจพบความล้มเหลวในการแก้ปัญหา\""
22070-31 = "[s] \"อาริสึ...!\""
22070-32 = "อะ... อาริสึจัง?!"
22070-33 = "\"......เริ่มดำเนินการใช้งานโปรโตคอลอีกครั้ง เริ่มรีโหลดอาวุธ...\""
22070-39 = "เธอเริ่มชาร์จเรลกัน... อีกแล้วละค่ะ!"
22070-43 = "[ns] \"ต้องหยุดให้ได้ ก่อนที่เธอจะยิงเรลกันอีก!!\""
22070-45 = "[ns] \"ฝากอาริสึด้วยนะทุกคน...!\""
22070-47 = "ย้ากกก!! ขอโทษนะอาริสึจัง!"
22070-59 = "\"พบปัจจัยรบกวน ชาร์จไม่สำเร็จ\""
22070-60 = "ดีละ! หยุดไว้ได้แล้ว!"
22070-61 = "\"......กำจัดปัจจัยรบกวน\""
22070-62 = "เอาจริงดิ...?"
22070-70 = "มากิ! อันตราย!"
22070-76 = "......!!"
22070-82 = "มากิ!!"
22070-87 = "\"เริ่มเปิดใช้งานโปรโตคอลใหม่... เริ่มรีโหลดอาวุธ...\""
22070-93 = "อะ... อาริสึ..."
22070-94 = "นี่มันอะไรกันเนี่ย... อาริสึจัง! อาริสึจัง!"
22070-96 = "[ns] \"อึก! อาริสึ...!\""
22070-103 = "[ns] (ทำยังไงดีถึงจะขัดขวางอาริสึได้ละเนี่ย...!)"
22070-104 = "\"ยิง───\""
22070-106 = "นี่ ยัยเด็กน้อย หยุดได้แล้วน่า"
22070-113 = "\"...!!\""
22070-119 = "นอนนิ่งๆ อยู่ตรงนั้นไปก่อนล่ะ"
22070-126 = "...เจ้าพวกนี้นี่ ยกมาทั้งโขยงเลยเรอะ"
22070-127 = "เฮ้อ พอกันที มาทำความสะอาดกันเลยดีมั้ย?"
22070-128 = "ลุย!"
22070-130 = "อื้ม! หัวหน้า!"
22070-132 = "ฉันจะช่วยอีกแรงเอง"
22070-134 = "ใช่ค่ะ ฉันจะระวังหลังให้เองค่ะ!"
22070-146 = "ปิดจ๊อบ!"
22070-147 = "สิ้นสุดปฏิบัติการ"
22070-148 = "ทำได้ดีมากค่ะทุกคน"
22070-150 = "...เราจัดการสถานการณ์ได้แล้วครู"
22070-151 = "[s] \"ขอบใจนะ! ทั้งเนรุและทุกคนเลย!\""
22070-152 = "ว่าแต่ นี่มันเรื่องอะไรกันเนี่ย?"
22070-153 = "ทำไมถึงกลิ้งกันไปมาเหมือนกระป๋องที่โดนทุบจนบุบๆ เบี้ยวๆ แถมอาคารของชมรมก็พังยับเยินอีก"
22070-154 = "แล้วที่เด็กน้อยดูแปลกๆ ไปเมื่อกี้มันอะไรน่ะ..."
22070-155 = "[s] \"เดี๋ยวก่อน! เอาไว้ตอบทีหลังนะ! ทุกคนไม่เป็นอะไรกันใช่ไหม?!\""
22070-157 = "อึก... ก็... ยังครบ 32 อยู่..."
22070-158 = "โอ้ย... นึกว่าไส้จะทะลักออกมาซะแล้ว..."
22070-159 = "ถ้ายังพูดแบบนี้ได้อยู่ แสดงว่าก็ยังปลอดภัยดีนะคะ"
22070-160 = "[s] \"งั้นก็โล่งอกไปที...\""
22070-166 = "คุณครู...! คุณครู!"
22070-167 = "มะ... โมโมอิ..."
22070-168 = "[s] \"มิโดริ...? ยูสึ? มีอะไรเหรอ...?\""
22070-169 = "พี่โมโมอิ... พี่เค้าน่ะ...!"
22070-171 = "......"
22070-173 = "ตอนต่อไป;วันดีๆ ที่พังลง"

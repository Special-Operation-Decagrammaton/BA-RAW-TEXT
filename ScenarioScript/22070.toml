[translation]
22070-1 = "第7話;不可思議的機器（２）"
22070-13 = "咳咳咳……"
22070-14 = "到，到底發生什麼事了！？"
22070-15 = "沉睡中的機器人突然啟動……"
22070-17 = "接著發生爆炸……那，非常明顯是攻擊！"
22070-18 = "發出攻擊命令的是……"
22070-29 = "……確認到有機體的生存反應。"
22070-30 = "已確認失敗……"
22070-31 = "[s]「愛麗絲……！」"
22070-32 = "愛，愛麗絲醬！？"
22070-33 = "……再次執行協議。重新裝填武裝。"
22070-39 = "電磁砲……又再次開始充電了！"
22070-43 = "[ns]「……得趕快阻止才行！」"
22070-45 = "[ns]「大家，將愛麗絲……！」"
22070-47 = "愛麗絲醬！！抱歉了！！！"
22070-59 = "確認到妨礙，充電失敗。"
22070-60 = "很好！停下來了！"
22070-61 = "……排除妨礙要素。"
22070-62 = "……咦？"
22070-70 = "真紀！危險！"
22070-76 = "……！！"
22070-82 = "真紀！！"
22070-87 = "再次執行協議。重新裝填武裝。"
22070-93 = "啊，啊啊……"
22070-94 = "這，這到底是……愛麗絲醬！吶，愛麗絲醬！"
22070-96 = "[ns]「唔！愛麗絲……！」"
22070-103 = "[ns]（究竟……該怎麼做……！）"
22070-104 = "發──"
22070-106 = "喂，小不點。#n到此為止了。"
22070-113 = "……！！"
22070-119 = "乖乖睡吧。"
22070-126 = "這些傢伙，還想搗亂啊……"
22070-127 = "唉……收拾它們吧。"
22070-128 = "喂，要上了。"
22070-130 = "好的～！部長！"
22070-132 = "我來支援。"
22070-134 = "是，後方就交給我吧。"
22070-146 = "這樣就搞定了！"
22070-147 = "作戰結束。"
22070-148 = "辛苦了。"
22070-150 = "……這樣可以嗎？老師。"
22070-151 = "[s]「寧瑠、大家！謝謝妳們！」"
22070-152 = "所以呢，發生什麼事了？"
22070-153 = "聽到了很大的聲響所以過來看看，社辦都破破爛爛了啊。"
22070-154 = "還有，小不點的那副模樣究竟……"
22070-155 = "[s]「抱歉，先等一下……大家還好嗎！？」"
22070-157 = "唔……勉，勉勉強強……"
22070-158 = "唔呃……還以為內臟要飛出來了……"
22070-159 = "還能開玩笑，看來沒事呢。"
22070-160 = "[s]「那就好……」"
22070-166 = "老師……！老師！"
22070-167 = "啊，啊啊，桃，桃井……"
22070-168 = "[s]「綠、柚子……怎麼了……？」"
22070-169 = "姐姐她……！姐姐她………！"
22070-171 = "……"
22070-173 = "下一話;崩壞的日常"

[translation]
10018090-1 = "Episode 9; No Way Back"
10018090-3 = "..."
10018090-4 = "[s] \"Are you okay, Fuuka?\""
10018090-8 = "Oh, Sensei."
10018090-9 = "Yes, I'm fine. There's just a lot to do."
10018090-10 = "[s1] \"You shouldn't overwork yourself.\"\n[s2] \"Why don't you take a break?\""
10018090-15 = "I'm sorry."
10018090-19 = "I'll...go get some fresh air."
10018090-24 = "..."
10018090-25 = "[s] \"You must be thinking that Fuuka is overwhelmed.\""
10018090-26 = "I didn't even say anything."
10018090-27 = "[s] \"But you've been watching her all day.\""
10018090-31 = "I guess I can't hide anything from you."
10018090-32 = "She's clearly reached her limit."
10018090-33 = "But I don't know why."
10018090-34 = "[s] \"What do you want to do, Haruna?\""
10018090-35 = "...That's not what I expected you to ask."
10018090-36 = "You always catch me off guard."
10018090-40 = "I want to win. We need to."
10018090-41 = "Not just for gastronomy's sake, but for the sake of all those who have hopes for Sparrow."
10018090-42 = "But what we need in order to win...isn't my strength."
10018090-43 = "And it hurts to know that."
10018090-44 = "[s] \"I'm sure there's something you can do.\""
10018090-45 = "You really think so?"
10018090-46 = "[s] \"I do.\""
10018090-54 = "...Could you tell me?"
10018090-55 = "[ns] \"Well...\""
10018090-61 = "D-Did something happen to Fuuka?"
10018090-63 = "I saw her on her scooter and on her way to Gehenna just a moment ago!"
10018090-66 = "Oh, she just went out to get some fresh air. Phew."
10018090-67 = "[s] \"Do you have any idea why Fuuka would go to Gehenna right now?\""
10018090-71 = "...Yes, I think I know."
10018090-75 = "Are you absolutely sure?"
10018090-76 = "[s] \"I trust Juri knows what she's talking about.\""
10018090-77 = "I do too..."
10018090-78 = "But would she really go to the rooftop of the School Lunch Club to de-stress?"
10018090-83 = "...There she is. Amazing."
10018090-84 = "[s] \"Okay, you're up, Haruna.\""
10018090-88 = "Wh-What are you talking about, Sensei? You're more qualified for this kind of situation."
10018090-89 = "[s] \"I think you should handle this one.\""
10018090-93 = "...May I ask why?"
10018090-94 = "[ns] \"When it comes to understanding Fuuka...\""
10018090-96 = "[ns] \"...you have me beat, Haruna.\""
10018090-97 = "I appreciate the kind words."
10018090-98 = "But don't you think this should be handled by the right person?"
10018090-99 = "Huh? I am the right person?"
10018090-100 = "..."
10018090-101 = "...Understood."
10018090-102 = "If you insist, Sensei..."
10018090-107 = "...I was wondering what all the fuss was about."
10018090-108 = "Sorry for intruding."
10018090-109 = "Did Juri tell you I'd be here?"
10018090-110 = "Yeah. Is this not a good time?"
10018090-111 = "If this is about work, don't worry. I'll head back soon."
10018090-112 = "I just...need a moment."
10018090-113 = "So... Nice rooftop you got. You come here often?"
10018090-114 = "...School Lunch Club work keeps me busy, so it's hard to take breaks farther away."
10018090-115 = "This rooftop's become my go-to relaxation spot."
10018090-116 = "Are you stressed?"
10018090-117 = "I'd be lying if I said I wasn't."
10018090-118 = "...I've been thinking about what it is we're fighting for, what we're fighting against."
10018090-119 = "Well, we're fighting for the sake of gastronomy and against Nyao Foods' underhanded business tactics."
10018090-120 = "I heard what you talked about with the Gourmet Helmet Gangsters."
10018090-124 = "...From Akari?"
10018090-125 = "Yeah."
10018090-126 = "Then you know everything."
10018090-127 = "If we win, will the people working for Nyao Foods lose their jobs?"
10018090-128 = "...The possibility isn't zero."
10018090-129 = "If Nyao Foods fails to take control of Sparrow..."
10018090-130 = "Well, that might lead to a domino effect of other restaurant owners rejecting Nyao Foods."
10018090-131 = "That could in turn lead to a downturn for Nyao Foods' distribution business."
10018090-132 = "Naturally, if they have to cut costs due to less business, they will likely fire employees."
10018090-133 = "Yeah, that's what I'm worried about."
10018090-134 = "There are also definitely some shop owners who want to side with Nyao Foods."
10018090-135 = "And some people think we're just causing unnecessary trouble."
10018090-136 = "Some people are too afraid of the water to rock the boat."
10018090-137 = "But hey, sometimes the boat needs rocking."
10018090-138 = "Yeah, well, sometimes the boat just capsizes."
10018090-139 = "Oh, really?"
10018090-140 = "I just wanted to help Sparrow's owner."
10018090-141 = "How did it come to this?"
10018090-142 = "Are you really that worried?"
10018090-143 = "If we win, if I help you win, then people will lose something important."
10018090-144 = "I hate seeing others suffer. That's why I joined the School Lunch Club."
10018090-148 = "And? How do you see us?"
10018090-149 = "As students in the dining hall, I should be taking care of you."
10018090-150 = "And the Gourmet Helmet Gangsters are the same in your eyes."
10018090-151 = "Weird, right? Even though all they've done is attack us..."
10018090-156 = "Fuuka."
10018090-158 = "Hm?"
10018090-160 = "Everywhere gain is found, loss follows. Gastronomy is no exception. Hesitation will only lead to great restaurants disappearing."
10018090-161 = "We can't just watch that happen. Isn't that why we fight?"
10018090-162 = "...Right."
10018090-163 = "Nyao Foods isn't gonna take it easy on us."
10018090-167 = "They're already trying to destroy us and Sparrow by any means necessary."
10018090-168 = "Even if we succeed, Nyao Foods loses nothing but opportunity."
10018090-169 = "Layoffs may or may not happen. It's a possibility, but only a possibility."
10018090-172 = "But if we lose, the owner of Sparrow loses everything."
10018090-173 = "That's not a possibility, it's a certainty."
10018090-174 = "I can understand that..."
10018090-177 = "And Sparrow's owner won't be the only victim."
10018090-178 = "Everyone on that street will be victims too."
10018090-179 = "Why's that?"
10018090-185 = "They'll lose their inalienable right to experience true gastronomical glory."
10018090-191 = "...Hahaha."
10018090-192 = "Wh-Why are you laughing?"
10018090-193 = "That was a very Haruna thing to say."
10018090-194 = "Ahem."
10018090-195 = "When it comes to gastronomy, I have nothing to offer but sincerity. It's not something I compromise on."
10018090-196 = "And neither do you, Fuuka."
10018090-197 = "Me?"
10018090-198 = "I know you. You rarely show your real skills."
10018090-199 = "You haven't had the chance to do so."
10018090-201 = "Well, here it is. Are you really going to back down now?"
10018090-203 = "I see."
10018090-204 = "If you're that committed, I guess I'll have to tag along."
10018090-205 = "What other option is there? We've already come this far."
10018090-206 = "Right, thanks to someone."
10018090-211 = "Shall we get going?"
10018090-212 = "Sensei's here too, I assume?"
10018090-213 = "[s] \"I've been caught!\""
10018090-215 = "I had a hunch."
10018090-220 = "Mix bonito stock with egg..."
10018090-224 = "Some sugar in the soy sauce and mirin rice wine...finely ground fish meat…"
10018090-225 = "What about the herring roe?"
10018090-226 = "Being dried now. Next, grill the yellowtail and snapper..."
10018090-227 = "The shrimp is done."
10018090-232 = "Let's dry this separately..."
10018090-236 = "I finished chopping carrots!"
10018090-237 = "Thanks!"
10018090-238 = "Oh, I forgot the taro..."
10018090-244 = "This is so nice to see."
10018090-245 = "The owner and the School Lunch Club working together to make osechi with the Gourmet Research Society's assistance..."
10018090-247 = "Yes, our taste tests are invaluable. ★"
10018090-248 = "Hey, tasting really is vital to cooking. Besides, we're in charge of cleaning up."
10018090-249 = "I'm just happy to be here! We should do life-or-death cook-offs more often!"
10018090-259 = "Mwahahaha. Give me the report on osechi production."
10018090-260 = "Like a well-oiled machine. Boiling, pickling, roasting...everything's working seamlessly."
10018090-261 = "More production! More consumption! A new meaning to conveyor belt food!"
10018090-262 = "The more food you make, the more money we rake!"
10018090-264 = "Eat to fill your stomach, work to fill your life!"
10018090-269 = "My life is overflowing already..."

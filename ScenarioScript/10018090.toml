[translation]
10018090-1 = "第9話;兩人的覺悟"
10018090-3 = "呼……"
10018090-4 = "[s]「風華，還好嗎？」"
10018090-8 = "啊，老師。"
10018090-9 = "是，沒問題。而且我還有很多事要做呢。"
10018090-10 = "[s1]「太逞強也不好。」\n[s2]「要不要稍微休息一下？」"
10018090-15 = "抱歉讓老師擔心了。"
10018090-19 = "那我就恭敬不如從命……稍微去外頭散散步。"
10018090-24 = "……"
10018090-25 = "[s]「羽留奈也擔心會不會給風華太多負擔吧？」"
10018090-26 = "我什麼都還沒說呢……"
10018090-27 = "[s]「但我知道羽留奈一直守護在風華身邊唷。」"
10018090-31 = "看來沒有事能瞞過老師呢。"
10018090-32 = "嗯，從旁人的角度來看，很明顯已經到極限了。"
10018090-33 = "但造成風華同學緊繃的原因究竟為何，我也不得而知。"
10018090-34 = "[s]「羽留奈的心情呢？」"
10018090-35 = "……我的心情嗎？"
10018090-36 = "老師總是這麼出其不意呢。"
10018090-40 = "我……不想輸。#n或者應該說是不能輸。"
10018090-41 = "不僅僅是為了美食。#n也是為了乘載許多人心意的麻雀亭。"
10018090-42 = "然而要在這場對決中取勝……需要的並不是我的力量。"
10018090-43 = "這個事實讓我懊悔不已。"
10018090-44 = "[s]「現在不是還有羽留奈能做的事嗎？」"
10018090-45 = "唔嗯……有嗎？"
10018090-46 = "[s]「嗯，我是這麼認為的。」"
10018090-54 = "……能告訴我嗎？"
10018090-55 = "[ns]「這個嘛……」"
10018090-61 = "有，有人知道風華前輩發生了什麼事嗎？"
10018090-63 = "前輩剛才好像騎著摩托車，往格黑娜的方向去了！"
10018090-66 = "原來如此。是出去轉換心情啊。那我就放心了。"
10018090-67 = "[s]「你知道風華可能會去哪裡嗎？」"
10018090-71 = "嗯……我想也許是那個地方吧。"
10018090-75 = "風華同學……真的在這裡嗎？"
10018090-76 = "[s]「既然茱莉是這麼說的，應該不會有錯。」"
10018090-77 = "雖然我也同意……"
10018090-78 = "不過能讓心情放鬆的地方，居然會是平常工作的供給部頂樓……"
10018090-83 = "……哎呀，想不到真的在這裡呢。"
10018090-84 = "[s]「那麼，接下來就交給羽留奈囉。」"
10018090-88 = "為，為什麼呢，老師？#n現在不正是老師出場的時機嗎？"
10018090-89 = "[s]「我認為這次交給羽留奈會是更好的選擇。」"
10018090-93 = "……能告訴我理由嗎？"
10018090-94 = "[ns]「某種意義上來說……」"
10018090-96 = "[ns]「羽留奈應該比我更了解風華才對。」"
10018090-97 = "能聽到您這麼說，我很感謝……"
10018090-98 = "但就像料理之於風華同學，用餐之於我一樣……每個人不都有最適合自己的職責嗎？"
10018090-99 = "咦？我才是最適合的人選……？"
10018090-100 = "……"
10018090-101 = "……我明白了。"
10018090-102 = "既然老師都這麼說了……"
10018090-107 = "……我還想說怎麼聽到有人爬上來的聲音，原來是羽留奈啊。"
10018090-108 = "失禮了。"
10018090-109 = "你居然會知道我在這裡。是茱莉告訴你的吧？"
10018090-110 = "說的沒錯。造成你的困擾了嗎？"
10018090-111 = "工作的事不用擔心。我很快就會回去的。"
10018090-112 = "只要……再讓我待一會就好。"
10018090-113 = "你很喜歡頂樓嗎？"
10018090-114 = "嗯……畢竟供給部的工作總是很忙，所以沒辦法去太遠的地方。"
10018090-115 = "想休息的時候，也就只能來這裡了。#n後來就漸漸變成了最能靜下心來的地方。"
10018090-116 = "覺得心情很複雜嗎？"
10018090-117 = "說沒有是騙人的吧？"
10018090-118 = "我一直在思考……自己究竟在跟什麼戰鬥。"
10018090-119 = "那當然是欺騙民眾、擾亂美食之道的喵食品囉。"
10018090-120 = "我……聽說了饕餮頭盔團和羽留奈的對話。"
10018090-124 = "……是從亞伽里口中聽說的嗎？"
10018090-125 = "嗯。"
10018090-126 = "這樣啊……所以才會如此煩惱。"
10018090-127 = "如果我們贏了，在喵食品工作的人就會因此失業嗎？"
10018090-128 = "……我無法完全否定那個可能性。"
10018090-129 = "假如麻雀亭能逃離喵食品的魔爪……"
10018090-130 = "周圍的店家想必也不會放棄抵抗吧。"
10018090-131 = "如果因此導致喵食品的流通規模下滑……"
10018090-132 = "他們的確有可能以減少成本的名義，將員工的需求量降低。"
10018090-133 = "嗯……#n我在意的就是這個。"
10018090-134 = "而且在商人之中，也確實有人是支持喵食品的。"
10018090-135 = "雖然沒有直接說出口，但能感到周圍投來「不要多管閒事」的視線。"
10018090-136 = "因為有的人比較偏好安穩的生活啊。"
10018090-137 = "當然，我個人喜歡充滿變化性。"
10018090-138 = "羽留奈口中的變化性，有時可是會成為別人的負擔呢。"
10018090-139 = "哎呀。是這樣嗎？"
10018090-140 = "我只是想要幫助麻雀亭而已。"
10018090-141 = "為什麼事情會變得這麼嚴重……"
10018090-142 = "風華同學最在意的是什麼呢？"
10018090-143 = "因為我的努力而有所失去的人們。"
10018090-144 = "我不喜歡有人受苦，所以才會加入供給部。"
10018090-148 = "……那你是怎麼看待我們的呢？"
10018090-149 = "羽留奈你們也一樣哦。#n對我來說，所有來到餐廳的人都是需要照顧的學生。"
10018090-150 = "所以饕餮頭盔團也是類似的存在吧。"
10018090-151 = "很奇怪吧？他們明明是妨礙我們的人。"
10018090-156 = "風華同學。"
10018090-158 = "嗯？"
10018090-160 = "任何事物都伴隨著犧牲，就連美食也不例外。#n如果我們一直躊躇不前，那些值得歌頌的店將會逐漸消失──"
10018090-161 = "所以我們才沒有袖手旁觀，而是選擇戰鬥吧？"
10018090-162 = "……嗯，沒錯。"
10018090-163 = "而喵食品也不打算手下留情。"
10018090-167 = "他們將不擇手段，試圖擊潰我們。"
10018090-168 = "再加上就算他們輸了，受到的損失也很有限。"
10018090-169 = "充其量只是有採取緊縮策略的可能性而已。"
10018090-172 = "然而麻雀亭的老闆娘，只要輸了就會失去一切。"
10018090-173 = "這並非可能性的問題，而是註定會發生。"
10018090-174 = "這……是這樣沒錯。"
10018090-177 = "而且受害者也不只有麻雀亭的老闆娘一個人。"
10018090-178 = "我認為商店街的所有人，也同樣是潛在的受害者。"
10018090-179 = "為什麼？"
10018090-185 = "當然是因為他們失去了品嘗真正美食的權利囉？"
10018090-191 = "……呵呵。"
10018090-192 = "有，有什麼好笑的嗎！？"
10018090-193 = "沒有，我只是覺得羽留奈果然會這麼說而已。"
10018090-194 = "（咳咳）"
10018090-195 = "總之，我對美食是很認真的。就連一步也不想退讓。"
10018090-196 = "這點你也是一樣的吧，風華同學。"
10018090-197 = "我……？"
10018090-198 = "我很清楚──你幾乎不曾展現過真正的實力吧。"
10018090-199 = "因為遲遲沒有那樣的機會與情況。"
10018090-201 = "但現在機會來了。這是展現你實力的絕佳機會。"
10018090-203 = "我明白了。"
10018090-204 = "既然羽留奈這麼認真，我也得努力才行。"
10018090-205 = "是啊，畢竟都走到這一步了。"
10018090-206 = "就是說啊，多虧了某個人的努力呢。"
10018090-211 = "那我們走吧？"
10018090-212 = "老師應該也在吧？"
10018090-213 = "[s]「被發現了嗎？」"
10018090-215 = "只是有那種感覺而已。"
10018090-220 = "先混和雞蛋和高湯……"
10018090-224 = "再加入醬油、砂糖、味醂……以及事先剁碎的魚肉……"
10018090-225 = "鯡魚卵撈起來了嗎？"
10018090-226 = "沒錯，已經在醃漬了。#n接著是烤獅魚和鯛魚……"
10018090-227 = "蝦子也煮得很好。"
10018090-232 = "在吃之前先浸在湯汁內……"
10018090-236 = "前輩！紅蘿蔔都切好了！"
10018090-237 = "謝謝！"
10018090-238 = "啊，差點忘了還有芋頭……"
10018090-244 = "呵呵。這個景象真不錯。"
10018090-245 = "老闆娘和供給部齊心協力製作御節料理，然後美食研究會給予協助。"
10018090-247 = "雖然只是以試吃的名義吃個不停而已★"
10018090-248 = "這也是工作的一部分啊。#n吃完之後還得幫忙搬食材才行。"
10018090-249 = "真幸福～要是每天都這樣就好了！"
10018090-259 = "呣呵呵呵。御節料理的生產狀況如何？"
10018090-260 = "一切都很順利。烹煮區、醃漬區、燒烤區都在運作當中。"
10018090-261 = "大量生產！大量消耗！傳動帶！"
10018090-262 = "這就是喵食品的食品工廠該有的樣子！"
10018090-264 = "好了，動起來動起來！人生就是要拚命地工作！"
10018090-269 = "大家都已經在連夜加班了啊……"

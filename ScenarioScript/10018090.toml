[translation]
10018090-1 = "ตอนที่ 9;จะทำยังไงได้ มาถึงนี่แล้ว"
10018090-3 = "ฮู่ว..."
10018090-4 = "[s] \"เป็นอะไรรึเปล่า ฟูกะ?\""
10018090-8 = "อ๊ะ คุณครู"
10018090-9 = "ค่ะ ฉันไม่เป็นไรค่ะ ตอนนี้ยังเหลืองานที่ต้องทำอยู่อีกเยอะเลยค่ะ"
10018090-10 = "[s1] \"ฝืนตัวเองเกินไปก็ไม่ดีนะ\"\n[s2] \"นั่งพักสักเดี๋ยวหนึ่งก่อนดีมั้ย?\""
10018090-15 = "ขอโทษนะคะ"
10018090-19 = "ถ้างั้นฉัน... ขอออกไปสูดอากาศสักครู่นะคะ"
10018090-24 = "..."
10018090-25 = "[s] \"ฟูกะ... คงจะรู้สึกกังวลอยู่สินะ?\""
10018090-26 = "ฉันยังไม่ได้พูดอะไรเลยนะคะ..."
10018090-27 = "[s] \"แต่ว่าฮารุนะน่ะ คอยสังเกตฟูกะอยู่ตลอดเลยนี่นา?\""
10018090-31 = "ปิดบังคุณครูไม่ได้เลยจริงๆ สินะคะ"
10018090-32 = "อย่างที่เห็นนั่นละค่ะ ตอนนี้เธอถึงขีดจำกัดแล้วค่ะ"
10018090-33 = "แต่ว่าเพราะอะไรถึงทำให้ถึงขีดจำกัดแบบนั้น ฉันคิดไม่ออกเลยค่ะ"
10018090-34 = "[s] \"แล้วฮารุนะอยากทำอะไรเหรอ?\""
10018090-35 = "...ฉันไม่คิดเลยว่าคุณครูจะถามความคิดเห็นฉันแบบนี้"
10018090-36 = "คุณครูนี่ทำให้ฉันประหลาดใจได้ตลอดเลยนะคะ"
10018090-40 = "ฉัน... ไม่อยากแพ้ค่ะ และคิดว่าจะแพ้ไม่ได้ด้วยค่ะ"
10018090-41 = "ไม่ใช่แค่เพื่ออาหารเลิศรสนะคะ ร้านซุซุเมะน่ะเป็นร้านที่อัดแน่นด้วยความปรารถนาของคนมากมายค่ะ"
10018090-42 = "แต่ว่า... สิ่งจำเป็นในการชนะการแข่งขันครั้งนี้... ไม่ใช่แค่แรงกายแรงใจของฉันค่ะ"
10018090-43 = "และฉันก็รู้สึกแย่ในเรื่องนั้นค่ะ"
10018090-44 = "[s] \"แต่ว่าก็มีเรื่องที่ฮารุนะทำได้อยู่ด้วยนี่นา?\""
10018090-45 = "มีเรื่องที่ฉันทำได้อยู่งั้นเหรอคะ?"
10018090-46 = "[s] \"ครูคิดว่ามีนะ\""
10018090-54 = "...ช่วยบอกฉันหน่อยได้มั้ยคะ?"
10018090-55 = "[ns] \"เรื่องนั้น...\""
10018090-61 = "กะ...เกิดอะไรขึ้นกับรุ่นพี่ฟูกะอย่างนั้นเหรอคะ?"
10018090-63 = "เมื่อกี้รุ่นพี่ขับสกู๊ตเตอร์กลับไปทางเกเฮนน่าแล้วค่ะ!"
10018090-66 = "อย่างนั้นเหรอคะ ไปรับลมสินะคะ ฮู่ว"
10018090-67 = "[s] \"พอจะรู้ไหมว่าฟูกะไปทางไหนน่ะ?\""
10018090-71 = "ค่ะ... ฉันน่าจะพอรู้นะคะ"
10018090-75 = "คุณฟูกะ... อยู่ที่นี่จริงๆ เหรอคะ?"
10018090-76 = "[s] \"ครูเชื่อใจจูรินะ\""
10018090-77 = "ฉันเองก็เชื่อคุณจูริเหมือนกันค่ะ"
10018090-78 = "สถานที่ผ่อนคลายจิตใจก็คือดาดฟ้าของห้องชมรมนี่เอง"
10018090-83 = "...อยู่นั่นจริงๆ ด้วยค่ะ ตกใจเลยค่ะ"
10018090-84 = "[s] \"เอาละ ถ้างั้นตอนนี้ก็ถึงตาฮารุนะออกโรงแล้วละ\""
10018090-88 = "พะ...พูดอะไรน่ะคะคุณครู? เรื่องแบบนี้คุณครูน่าจะเหมาะกว่านะคะ?"
10018090-89 = "[s] \"ครูคิดว่าตอนนี้ฮารุนะควรเป็นคนพูดนะ\""
10018090-93 = "ฉันขอถามเหตุผล... ได้รึเปล่าคะ"
10018090-94 = "[ns] \"ครูคิดว่าบางทีอาจมีคนที่เข้าใจฟูกะมากกว่าครู\""
10018090-96 = "[ns] \"ครูคิดว่าฮารุนะน่าจะเข้าใจฟูกะมากกว่าครูนะ\""
10018090-97 = "ขอบคุณที่พูดแบบนั้นนะคะคุณครู"
10018090-98 = "แต่ว่าเรื่องทุกเรื่องมันก็มักจะมีคนที่เหมาะสมกับมันอยู่แล้วไม่ใช่เหรอคะ?"
10018090-99 = "คะ? เพราะแบบนั้นเลยต้องเป็นฉันเหรอคะ?"
10018090-100 = "..."
10018090-101 = "...เข้าใจแล้วค่ะ"
10018090-102 = "ถ้าคุณครูยืนกรานแบบนั้น..."
10018090-107 = "...เสียงดังอะไรกัน"
10018090-108 = "ขอเสียมารยาทหน่อยนะคะ"
10018090-109 = "มาที่นี่จนได้สินะ จูริบอกงั้นเหรอ?"
10018090-110 = "ใช่ค่ะ รู้สึกกังวลงั้นเหรอคะ?"
10018090-111 = "ถ้าเรื่องงานละก็เธอไม่ต้องห่วงหรอก เดี๋ยวฉันก็กลับไปทำต่อแล้วละ"
10018090-112 = "แต่ว่าขออยู่แบบนี้... อีกสักหน่อยนะ"
10018090-113 = "ท่าทางคุณจะชอบดาดฟ้าสินะคะ?"
10018090-114 = "ไม่รู้สิ... ปกติงานของทางชมรมโภชนาการมันก็มักจะยุ่งอยู่ตลอด เลยออกไปไหนไกลๆ ไม่ค่อยได้น่ะ"
10018090-115 = "ตอนที่อยากพักสักหน่อย ก็เลยขึ้นมาบนนี้แทนน่ะ ที่ดาดฟ้านี่ก็เป็นที่ที่สบายที่สุด"
10018090-116 = "กำลังคิดมากอยู่เหรอคะ?"
10018090-117 = "ถ้าบอกว่าไม่ก็คงจะเป็นการพูดโกหกสินะ"
10018090-118 = "ก็แค่กำลังคิดอยู่ว่า... ตอนนี้เรากำลังต่อสู้กับอะไรอยู่น่ะ"
10018090-119 = "เรื่องนั้นน่ะ แน่นอนว่าเป็นเนียวฟู้ดที่หลอกลวงผู้คนและทำให้เส้นทางของอาหารรสเลิศปั่นป่วนอยู่แล้ว#nสิคะ"
10018090-120 = "ฉันน่ะ ได้ยินเรื่องที่ฮารุนะคุยกับพวกแก๊งหมวกกันน็อกคุรุเมะมาแล้วนะ"
10018090-124 = "...คุณอาคาริบอกเหรอคะ?"
10018090-125 = "อื้ม"
10018090-126 = "ถ้าอย่างนั้นคุณก็รู้อยู่แล้วสินะคะ"
10018090-127 = "ถ้าพวกเราชนะ พวกคนที่ทำงานที่เนียวฟู้ดก็จะต้องตกงานงั้นเหรอ?"
10018090-128 = "...ความเป็นไปได้ไม่เชิงเป็น 0 ซะทีเดียวค่ะ"
10018090-129 = "ถ้าทางเนียวฟู้ดไม่มายุ่งกับร้านซุซุเมะอีกละก็"
10018090-130 = "พวกคนอื่นๆ ที่มีร้านซุซุเมะเป็นแบบอย่างก็จะลุกขึ้นสู้และไม่ยอมละทิ้งร้านของตัวเอง"
10018090-131 = "และถ้าเรื่องนั้นส่งผลให้เครือข่ายการค้าของเนียวฟู้ดแคบลง..."
10018090-132 = "สุดท้ายทางนั้นก็คงจะใช้เหตุผลเรื่องการประหยัดทรัพยากร ลดกำลังคนทำงานลงอีกสินะคะ"
10018090-133 = "อืม... ฉันกังวลเรื่องนั้นนิดหน่อยน่ะ"
10018090-134 = "และในหมู่พวกคนค้าขายที่นี่เองก็คงมีคนที่เข้าข้างเนียวฟู้ดอยู่ด้วย"
10018090-135 = "และก็มีคนที่คิดว่าพวกเรากำลังก่อเรื่องวุ่นวายขึ้นโดยไม่จำเป็นอยู่ด้วย"
10018090-136 = "และก็มีคนที่เฉยๆ และคิดว่าเป็นแบบนี้ก็ดีแล้วอยู่ด้วยเหมือนกันค่ะ"
10018090-137 = "แต่ฉันเลือกที่จะสร้างความเปลี่ยนแปลงจากนั้นค่ะ"
10018090-138 = "ความเปลี่ยนแปลงของฮารุนะน่ะ บางครั้งมันก็น่าลำบากใจอยู่นะ"
10018090-139 = "ตายจริง อย่างนั้นเหรอคะ?"
10018090-140 = "ฉันก็แค่อยากช่วยร้านซุซุเมะเท่านั้นเอง"
10018090-141 = "ทำไมเรื่องมันถึงบานปลายมาถึงขั้นนี้กันได้นะ"
10018090-142 = "ตอนนี้กังวลเรื่องอะไรอยู่งั้นเหรอคะ?"
10018090-143 = "ผลลัพธ์จากความพยายามของฉัน อาจทำให้ใครบางคนต้องสูญเสียบางอย่างไป"
10018090-144 = "ฉันไม่อยากทำให้ใครรู้สึกเจ็บปวด เพราะงั้นเลยเลือกเข้าชมรมโภชนาการ"
10018090-148 = "...คุณคิดยังไงกับพวกเรากันแน่คะเนี่ย?"
10018090-149 = "ฮารุนะเองก็เหมือนกันนะ สำหรับฉันแล้วทุกๆ คน... ที่มาที่โรงอาหารน่ะ คือนักเรียนที่ฉันต้องดูแล"
10018090-150 = "ตอนนี้แก๊งหมวกกันน็อกคุรุเมะเองก็คงเป็นหนึ่งในนั้นสินะคะ"
10018090-151 = "มันแปลกใช่ไหมล่ะ? ทั้งๆ ที่พวกนั้นเป็นคนที่มาขัดขวางพวกเราแท้ๆ"
10018090-156 = "คุณฟูกะคะ"
10018090-158 = "หืม?"
10018090-160 = "เรื่องทุกอย่างต้องอาศัยการเสียสละค่ะ เส้นทางแห่งอาหารเลิศรสเองก็เช่นกันค่ะ ยิ่งพวกเราลังเลมาก#nเท่าไร ร้านอาหารชั้นเลิศก็จะยิ่งค่อยๆ หายไปค่ะ"
10018090-161 = "เพราะงั้นเราจะมามัวทนกำหมัด อดทนดูอยู่อย่างเดียวไม่ได้ค่ะ เพราะแบบนั้นพวกเราถึงฝ่าฟันต่อสู้มา#nถึงตอนนี้ไม่ใช่เหรอคะ?"
10018090-162 = "... มันก็ใช่อยู่หรอก"
10018090-163 = "ทางเนียวฟู้ดเองก็ไม่ได้คิดจะอ่อนข้อให้พวกเราเช่นกันค่ะ"
10018090-167 = "พวกเขาพยายามใช้ทุกวิธีทางเพื่อกำจัดพวกเราอยู่นะคะ"
10018090-168 = "ต่อให้เนียวฟู้ดแพ้ในการแข่งขันครั้งนี้ พวกเขาก็ไม่ได้สูญเสียอะไรค่ะ"
10018090-169 = "การลดกำลังคนในบริษัทอาจเกิดขึ้นก็ได้... หรืออาจไม่เกิดขึ้นก็ได้นะคะ อย่างน้อยก็เป็นเรื่องของความ#nเป็นไปได้ค่ะ"
10018090-172 = "แต่ว่าคุณเจ้าของร้านซุซุเมะ... จะต้องสูญเสียทุกอย่างไปเลยนะคะ"
10018090-173 = "ไม่ใช่แค่ความเป็นไปได้ แต่เธอจะสูญเสียทุกอย่างแน่นอนค่ะ"
10018090-174 = "เรื่องนั้น... มันก็จริง..."
10018090-177 = "และคนที่ได้รับความเสียหายก็ไม่ใช่แค่เจ้าของร้านซุซุเมะเท่านั้นค่ะ "
10018090-178 = "ฉันคิดว่าคนในย่านการค้าแห่งนี้เองก็จะได้รับความเสียหายด้วยเหมือนกันค่ะ"
10018090-179 = "ทำไมล่ะ?"
10018090-185 = "เพราะพวกเขาจะสูญเสียสิทธิ์ที่จะได้ลิ้มรสอาหารเลิศรสที่แท้จริงไปยังไงล่ะคะ"
10018090-191 = "...ฮิฮิ"
10018090-192 = "ทะ...ทำไมจู่ๆ ถึงหัวเราะล่ะคะ?!"
10018090-193 = "เปล่าหรอก แค่คำตอบมันยิ่งใหญ่สมกับเป็นฮารุนะจริงๆ น่ะ"
10018090-194 = "อะแฮ่ม"
10018090-195 = "ยังไงก็เถอะค่ะ เวลาเป็นเรื่องเกี่ยวกับอาหาร ฉันพูดจริงนะคะ ฉันไม่คิดจะถอยแม้แต่ก้าวเดียวค่ะ"
10018090-196 = "คุณเองก็เหมือนกันค่ะ คุณฟูกะ"
10018090-197 = "ฉันเหรอ...?"
10018090-198 = "ฉันรู้จักคุณดีค่ะ คุณน่ะ ไม่ค่อยได้มีโอกาสแสดงฝีมือที่แท้จริงเลยนะคะ"
10018090-199 = "อาจเพราะสถานการณ์และโอกาสต่างๆ ไม่เอื้ออำนวยค่ะ"
10018090-201 = "ตอนนี้คือโอกาสแล้วค่ะ โอกาสที่คุณจะได้แสดงความสามารถที่แท้จริงค่ะ"
10018090-203 = "อย่างนี้นี่เองสินะ"
10018090-204 = "ถ้าฮารุนะจริงจังขนาดนั้นละก็ ฉันคงต้องพยายามบ้างแล้วละ"
10018090-205 = "จะทำยังไงได้ล่ะคะ อุตส่าห์มาถึงขั้นนี้แล้ว..."
10018090-206 = "นั่นสินะ เพราะใครก็ไม่รู้..."
10018090-211 = "ถ้างั้น... เราไปกันเลยมั้ย?"
10018090-212 = "คุณครูอยู่ตรงนั้นใช่มั้ยคะ?"
10018090-213 = "[s] \"โดนจับได้แล้วเหรอ?\""
10018090-215 = "ฉันรู้สึกว่าคุณครูน่าจะอยู่ที่นี่น่ะค่ะ"
10018090-220 = "ใส่คัตสึโอะดาชิผสมกับไข่..."
10018090-224 = "ใส่น้ำตาลลงไปผสมกับมิรินและซีอิ๊วขาว... แล้วก็เนื้อปลาบดละเอียด..."
10018090-225 = "ปลานิชินนี่เอาไข่ออกรึยังคะ?"
10018090-226 = "ค่ะ เอาไปตากแห้งแล้วค่ะ ต่อไปก็ย่างปลาบุริกับปลามะได..."
10018090-227 = "ลวกกุ้งเรียบร้อยแล้วสินะคะ"
10018090-232 = "อันนี้ก็ตากแห้งเอาไว้แบบนี้ก่อน..."
10018090-236 = "รุ่นพี่คะ! หั่นแคร์รอตเสร็จแล้วค่ะ!"
10018090-237 = "ขอบใจมากเลย!"
10018090-238 = "อ๊ะ จริงสิ ลืมปอกเปลือกเผือกเลยแหะ..."
10018090-244 = "ฮุฮุ เป็นภาพที่น่าดูมากเลยนะคะ "
10018090-245 = "เจ้าของร้านกับชมรมโภชนาการร่วมมือกันทำโอเซจิ และทางชมรมชิมอาหารเองก็มีส่วนช่วยสนับสนุน"
10018090-247 = "ที่บอกว่าจะช่วยชิมก็เพราะจะได้กินอาหารด้วยน่ะค่ะ★"
10018090-248 = "นี่ก็เป็นงานอย่างหนึ่งนะ พอชิมอาหารเสร็จแล้วก็ต้องคอยขนย้ายพวกวัตถุดิบด้วย"
10018090-249 = "มีความสุขจัง~ อยากให้เป็นแบบนี้ทุกวันเลย!"
10018090-259 = "ฮุฮุฮุฮุ... ฉันอยากฟังรายงานเกี่ยวกับโรงงานผลิตโอเซจิ"
10018090-260 = "อืม... ทุกอย่างราบรื่นดีค่ะ แผนกต้ม แผนกหมัก แผนกย่าง ทุกอย่างดำเนินไปอย่างราบรื่นค่ะ"
10018090-261 = "ผลิตจำนวนมากๆ! บริโภคจำนวนมากๆ! ลำเลียงสินค้าแบบสายพาน!"

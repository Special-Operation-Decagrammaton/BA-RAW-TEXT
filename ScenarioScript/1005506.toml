1005506-19 = "3;시구레;02;……응? 아아, 이거?\n#3;m3"
1005506-20 = "3;시구레;07;후후. 역시 바로 물어볼 줄 알았지.\n#3;em;[반짝]"
1005506-21 = "3;시구레;00;오늘 내가 여기 온 이유는 선생님도 알고 있잖아? 직접 요리를 대접해 주고 싶다고."
1005506-22 = "3;시구레;03;그래서 요리에 필요한 식재료를 좀 챙겨왔어."
1005506-23 = "3;시구레;02;아, 걱정할 건 없어. '이상한' 식재료는 하나도 없으니까."
1005506-24 = "3;시구레;07;요리는 내가 다 알아서 할 테니, 선생님은 그냥 거기 편히 앉아서 기다리면 돼. 알았지?\n#3;em;[음표]"
1005506-25 = "3;시구레;00;그럼 227호 특별반 특제 지비에 요리를……"

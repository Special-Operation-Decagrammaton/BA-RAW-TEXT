1005506-76 = "3;시구레;03;요리에 술을 넣으면 고기의 잡내를 잡아줄 수 있을 뿐만 아니라 술이 갖는 독특한 풍미를 음식에 더할 수 있다고."
1005506-77 = "3;시구레;00;전에 갔던 레스토랑에서도 마지막에 술을 붓고 불을 붙여줬잖아. 그걸 플람베라고 하던가……?\n#3;em;[?]"
1005506-78 = "[s9] \"그건 술을 넣고 가열했을 때의 이야기지……\"\n[s10] \"이대로는 고기에서 술 냄새가 날 거야\""

1005506-13 = "3;시구레;11;당번 활동을 하러 샬레에 방문한 적은 있지만, 조리실습실에 들어오는 건 처음이려나."
1005506-14 = "[s1] \"어서 와, 시구레. 그런데…….\"\n[s2] \"등에 멘 그 보따리는 뭐야?\""
1005506-15 = "#st;[0,0];instant;1;"
1005506-16 = "#st;[0,0];instant;1;"

[translation]
1005506-1 = "Frankly"
1005506-2 = "I was waiting for Shigure in the kitchen at Schale, and she arrived right on time."
1005506-8 = "So this is Schale's kitchen? It's super well-equipped."
1005506-13 = "I've been to Schale here and there, but I never had any reason to go to the kitchen."
1005506-14 = "[s1] \"Welcome, Shigure. What're you holding?\" \n[s2] \"Um... What's that sack on your back?\""
1005506-19 = "...Huh? Oh, this?"
1005506-20 = "Heehee. I knew you'd be curious."
1005506-21 = "My mission here today is to cook you a meal."
1005506-22 = "So, I brought some ingredients."
1005506-23 = "Don't look so worried! It's nothing weird."
1005506-24 = "I'll take care of everything, so you just relax."
1005506-25 = "Okay. Let's start making the Spec Ops No. 227 special gibier dish..."
1005506-32 = "[ns3] \"H-Hold on—!\"\n[ns4] \"What is all this raw meat?!\""
1005506-35 = "Huh? What's wrong? Are you surprised at how fresh the ingredients are?"
1005506-36 = "Heehee. Looking at your face, I can tell you've never seen such fresh meat."
1005506-37 = "What's gibier? It's gibier, duh."
1005506-38 = "It's game. Meat from hunted wild animals...like bear, deer, rabbit, et cetera."
1005506-39 = "I usually catch and skin them on the spot, but the essence of a gibier dish is freshness."
1005506-43 = "So, I brought it to Schale like this to make you the optimum dish."
1005506-44 = "Ordinary food ingredients? What do you mean?"
1005506-45 = "Gibier IS ordinary. We eat it for every meal."
1005506-46 = "...Well, at least I wish we did. The Secretariat distributes bread and ingredients like rice, so gibier is more like a delicacy."
1005506-47 = "Last time you got me food only available downtown, so I wanted to serve a special meal that's only available in the Spec Ops."
1005506-48 = "But, surprise! I'm just kidding. Heehee. Freshly caught meat like this is too tough for you, Sensei."
1005506-49 = "The expression on your face made it way worth it to lug it all the way out here."
1005506-50 = "[s5] \"You went out of your way to tease me...\"\n[s6] \"You're really something else, for so many reasons.\""
1005506-53 = "How else do we get through life if we don't poke fun here and there?"
1005506-54 = "Okay! Let's get started on cooking."
1005506-57 = "Season the meat with salt and spices..."
1005506-63 = "Put butter on a well-heated pan and cook until the outside is crispy..."
1005506-67 = "Lastly, sprinkle vodka on top..."
1005506-72 = "[ns7] \"Wait, stop! What're you doing?!\"\n[ns8] \"Why are you sprinkling alcohol on the food?\""
1005506-75 = "Huh? Sensei, what do you mean?"
1005506-76 = "Adding alcohol to food not only removes the gamey smell of meat, but also adds its unique flavor."
1005506-77 = "At the restaurant we went to, they poured alcohol on our food and lit it on fire. Didn't they call it \"flambé\"...?"
1005506-78 = "[s9] \"That only works when you put in the alcohol and heat it.\"\n[s10] \"The meat will just smell like alcohol if you do that.\""
1005506-81 = "Oh... Really?"
1005506-82 = "What do I do...? If I turn up the heat right now, I'll just burn the meat... But then I can't heat up the alcohol."
1005506-83 = "I can't serve this to you, Sensei... I'll just eat it myself."
1005506-87 = "[ns] \"Scoot over. I'll make you one.\""
1005506-91 = "S-Sensei? You're going to cook?"
1005506-92 = "I appreciate it, but the whole point was for me to cook you food..."
1005506-93 = "[s] \"It's your turn to relax. Just wait over there.\""
1005506-103 = "...I made a meal for the two of us with the ingredients Shigure brought."
1005506-109 = "I ended up just making more work for you..."
1005506-110 = "I wanted to pay you back for taking me out last time, but now I owe you even more."
1005506-111 = "[s11] \"It's okay, it wasn't a big deal.\"\n[s12] \"I'm glad you came over.\""
1005506-116 = "...Hm."
1005506-117 = "I guess... That makes me feel a little better."
1005506-118 = "Honestly, it threw me off a little bit to hear you say that so bluntly."
1005506-119 = "It's refreshing in a way, though. Is that how grown-ups always talk?"
1005506-120 = "You know, I'm going to start expecting more out of our relationship if you keep talking like that."
1005506-121 = "You better watch your tongue."
1005506-122 = "I don't want you getting sick of me if I come bother you all the time."
1005506-123 = "...You don't mind?"
1005506-124 = "Two can play at that game?"
1005506-125 = "Well... Okay."
1005506-126 = "I'll come see you again soon, then."
1005506-127 = "You should come visit Spec Ops No. 227 more often, too, you know."
1005506-128 = "But don't forget your promise! Let me know when you do so I can be your guide."

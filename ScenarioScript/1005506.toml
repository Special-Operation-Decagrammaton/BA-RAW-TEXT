[translation]
1005506-1 = "天真直率"
1005506-2 = "（在夏萊的廚房等待時，時雨在約好的時間出現了）"
1005506-8 = "嘿～這裡就是……東西比想像中還齊全呢。"
1005506-13 = "雖然來夏萊很多次了，還是第一次進來這裡呢。"
1005506-14 = "[s1]「啊，歡迎。」\n[s2]「你背上背的是……？」"
1005506-19 = "……啊，這個嗎？"
1005506-20 = "果然會好奇對吧。"
1005506-21 = "和之前說的一樣，我打算要為老師做點料理。"
1005506-22 = "所以就把料理所需的食材帶來了。"
1005506-23 = "別擔心，不是什麼奇怪的食材唷。"
1005506-24 = "老師就坐在那等我吧。全部交給我就好。"
1005506-25 = "那麼，就開始製作227號特別班的特製野味料理──"
1005506-32 = "[ns3]「！？」\n[ns4]「是生肉！？」"
1005506-35 = "看起來很新鮮吧？"
1005506-36 = "很少見到這種生肉嗎？"
1005506-37 = "啊，先從野味說起比較好嗎？"
1005506-38 = "野味指的就是將熊、鹿、兔子等等……由狩獵捕來的野獸做成的料理。"
1005506-39 = "對野味來說新鮮度至關重要，所以平常是在捕獲之後就馬上加以處理。"
1005506-43 = "今天就直接帶過來，在夏萊進行處理……"
1005506-44 = "……嗯，怎麼了？"
1005506-45 = "嗯。在227號那邊經常吃唷？"
1005506-46 = "……雖然我很想這麼說，但一半以上是開玩笑的。#n因為事務局有配給麵包和米，所以野味也是相當特別的。"
1005506-47 = "但是之前老師請我吃了很厲害的料理，所以我也想請你嚐嚐227號的特別料理。"
1005506-48 = "……其實這塊肉，今天是不會用到的。#n因為才剛抓到的話，肉會太硬而不適合食用。"
1005506-49 = "不過能看到老師驚訝的表情，也不枉費我努力把這塊肉帶來了。"
1005506-50 = "[s5]「所以是為了嚇我一跳才……」\n[s6]「時雨各種方面都很厲害呢……」"
1005506-53 = "每天過得開心是很重要的嘛。#n要是忘記惡作劇的心，人生的樂趣就會少掉一半了唷。"
1005506-54 = "好，那麼差不多該正式開始料理了。"
1005506-57 = "把肉用鹽和辛香料調味……"
1005506-63 = "在燒熱的平底鍋中抹上奶油，把肉煎到表面焦脆……"
1005506-67 = "最後再把伏特加──"
1005506-72 = "[ns7]「酒！？」\n[ns8]「為什麼要在料理上加酒……？」"
1005506-75 = "……難道老師第一次見到在料理中使用酒嗎？"
1005506-76 = "在料理中用酒不但可以去除肉的腥味，似乎還能增添獨特的風味唷。"
1005506-77 = "像是之前去的餐廳，也有在最後用酒讓鍋內燃起大火不是嗎？好像叫作「Flambé」。"
1005506-78 = "[s9]「那是加入酒來進行加熱，跟你做的不一樣唷。」\n[s10]「直接加普通的酒的話，不就都是酒味了嗎……？」"
1005506-81 = "唔嗯，好像是這樣沒錯。"
1005506-82 = "那該怎麼辦呢……"
1005506-83 = "總之這個就由我來吃──"
1005506-87 = "[ns]「可以借用你的食材嗎？」"
1005506-91 = "……？"
1005506-92 = "是沒關係，但今天讓老師來做的話……"
1005506-93 = "[s]「沒關係，交給我吧。」"
1005506-103 = "（用時雨帶來的食材做了料理──）"
1005506-109 = "……結果最後變成老師做料理給我吃了呢。"
1005506-110 = "真抱歉，都讓老師空出時間了。"
1005506-111 = "[s11]「別在意，我也沒做什麼。」\n[s12]「時雨願意過來，就算只是吃個飯我也很開心的。」"
1005506-116 = "……"
1005506-117 = "老師能這麼說，我是很高興啦……"
1005506-118 = "但那種說法，就算是我也會有點……"
1005506-119 = "這就是大人的餘裕嗎……"
1005506-120 = "不過，我覺得還是注意一點比較好唷？"
1005506-121 = "對我這麼好的話，我也可能會得寸進尺的唷？"
1005506-122 = "而且我太常來夏萊的話，老師會很累的吧？"
1005506-123 = "咦，沒問題……？"
1005506-124 = "我的惡作劇，不管來多少都能承受……？"
1005506-125 = "呵呵，這樣啊。"
1005506-126 = "那，之後也請讓我來吧。"
1005506-127 = "老師也請多來227號特別班玩。"
1005506-128 = "當然，在來之前別忘了聯絡我哦！"

1005506-32 = "[ns3] \"자, 잠깐—!\"\n[ns4] \"이 날고기들은 다 뭐야?!\""
1005506-33 = "#wait;10"
1005506-34 = "#wait;10"
1005506-35 = "2;시구레;01;응? 뭘 놀라는 거야. 재료가 너무 신선해서 당황했어?\n#2;em;[?]"
1005506-36 = "2;시구레;00;후후. 그 표정을 보아하니 이 정도로 신선한 고기는 선생님도 처음 보는 모양이네.\n#2;m3"
1005506-37 = "2;시구레;02;……지비에가 뭐냐고? 지비에는 지비에지.\n#2;em;[반응]"
1005506-38 = "2;시구레;00;사냥으로 직접 잡은 곰이나 사슴, 토끼 같은…… 그런 야생동물 고기를 말하는 거야."
1005506-39 = "2;시구레;99;보통은 잡아서 그 자리에서 직접 손질하지만, 지비에 요리의 생명은 신선도니까."
1005506-40 = "#st;[0,0];instant;1;"
1005506-41 = "#clearST"
1005506-42 = "2;시구레;00\n#2;greeting\n#wait;1500"
1005506-43 = "2;시구레;03;오늘은 이 상태로 가져와서 샬레에서 직접 손질을……."
1005506-44 = "2;시구레;01;……응? 좀 더 평범한 식재료는 없냐고?\n#2;em;[?]"
1005506-45 = "2;시구레;02;지비에 정도면 평범하지 않은가? 특별반 학생들은 매 끼니마다 지비에 요리만 먹는데?"
1005506-46 = "2;시구레;11;……라는 건 물론 농담. 사무국에서 빵이나 쌀 같은 식재료는 배급해 주기 때문에 우리에게도 지비에는 특식 같은 느낌이야.\n#2;em;…"
1005506-47 = "2;시구레;00;하지만 저번에는 선생님이 번화가에서만 먹을 수 있는 음식을 대접해 주었으니, 이번에는 내가 특별반에서만 먹을 수 있는 특식을 대접해 주고 싶었거든."
1005506-48 = "2;시구레;02;다만 이 날고기는 오늘의 요리에 쓰지 않을 거야. 잡은 지 얼마 되지 않은 고기는 너무 질겨서 먹기에 적합하지 않거든."
1005506-49 = "2;시구레;07;후후. 그래도 선생님의 놀라는 얼굴을 보았으니, 고생해서 이 고깃덩어리를 들고 온 보람이 있네.\n#2;em;[음표]"
1005506-50 = "[s5] \"놀리려고 그런 고생까지…….\"\n[s6] \"시구레는 여러 가지로 정말 대단하구나.\""

[translation]
1005506-1 = "อย่างตรงไปตรงมา"
1005506-2 = "(คุณครูรอชิกุเระอยู่ที่ห้องคหกรรมของชาเล่ต์ และเธอก็มาถึงตามเวลานัดพอดี)"
1005506-8 = "ว้าวว นี่สินะห้องคหกรรมของชาเล่ต์... มีอุปกรณ์ครบครันมากกว่าที่คิดนะเนี่ย"
1005506-13 = "ถึงฉันจะเคยมาเข้าเวรที่ชาเล่ต์แล้วก็เถอะ แต่เหมือนไม่เคยมาที่ห้องคหกรรมมาก่อนเลย..."
1005506-14 = "[s1] \"เข้ามาสิชิกุเระ ว่าแต่นั่นอะไรน่ะ...?\"\n[s2] \"แบกห่อผ้าอะไรมาด้วยน่ะ?\""
1005506-19 = "หืม...? อ๋อ อันนี้น่ะเหรอ?"
1005506-20 = "ฮิฮิ คิดแล้วเชียวว่าต้องถาม"
1005506-21 = "คุณครูก็รู้เหตุผลที่ฉันมาที่นี่วันนี้ไม่ใช่เหรอ? ฉันอยากมาทำอาหารให้คุณครูไง"
1005506-22 = "วันนี้เลยเตรียมส่วนผสมที่จำเป็นในการทำอาหารมาด้วย"
1005506-23 = "อ้อ ไม่ต้องเป็นห่วงหรอก ไม่มีส่วนผสม 'แปลกๆ' อะไรเลย"
1005506-24 = "ฉันจะทำอาหารให้เอง คุณครูไปนั่งรอสบายๆ ตรงนั้นเถอะ ตกลงมั้ย?"
1005506-25 = "ถ้างั้นฉันจะเริ่มทำจิบิเย่สูตรพิเศษของห้องพิเศษ 227..."
1005506-32 = "[ns3] \"ดะ... เดี๋ยวก่อน—!\"\n[ns4] \"เนื้อดิบนั่นมันอะไรน่ะ?!\""
1005506-35 = "หืม? ตกใจที่วัตถุดิบมันสดใหม่เหรอ?"
1005506-36 = "ฮิฮิ ดูจากสีหน้าแล้ว คุณครูคงเพิ่งเคยเห็นเนื้อดิบเป็นครั้งแรกสินะ"
1005506-37 = "จิบิเย่คืออะไรน่ะเหรอ? จิบิเย่ก็คือจิบิเย่ไง"
1005506-38 = "หมายถึงเนื้อสัตว์ป่าที่ล่าได้เอง อย่างเช่นหมี กวาง หรือกระต่าย"
1005506-39 = "ปกติฉันจะชำแหละเนื้อทันทีที่ล่าได้เลย แต่สิ่งสำคัญของจิบิเย่คือความสดใหม่ของวัตถุดิบ"
1005506-43 = "วันนี้ฉันก็เลยหอบวัตถุดิบสดๆ มาชำแหละที่ชาเล่ต์นี่แหละ..."
1005506-44 = "หืม...? ขอเป็นอาหารที่ทำจากวัตถุดิบธรรมดากว่านี้เหรอ?"
1005506-45 = "แต่จิบิเย่ก็ธรรมดาแล้วนะ? นักเรียนห้องเรียนพิเศษก็กินจิบิเย่กันทุกมื้อเลย"
1005506-46 = "ฮ่ะฮ่า ล้อเล่นน่า ปกติทางสำนักเลขาธิการจะแบ่งขนมปังหรือข้าวให้ เพราะงั้นจิบิเย่จึงเป็นอาหาร#nที่พิเศษสำหรับพวกเรา"
1005506-47 = "แต่ครั้งที่แล้วคุณครูเลี้ยงอาหารจานหรูที่ลิ้มรสได้แค่ในย่านชุมชนเท่านั้น ครั้งนี้ฉันก็เลยอยาก#nตอบแทนเป็นอาหารจานพิเศษที่หาลิ้มรสได้จากในห้องเรียนพิเศษเท่านั้นน่ะ"
1005506-48 = "แต่วันนี้ฉันจะไม่ใช้เนื้อดิบนี้ทำอาหารหรอก เพราะเนื้อจากสัตว์ที่เพิ่งจับมาได้ไม่นานมันเหนียวเกินไป ไม่เหมาะที่จะเอามากินตอนนี้"
1005506-49 = "ฮิฮิ แต่เมื่อกี้ก็ได้เห็นท่าทางตกใจของคุณครูแล้ว... ถือว่าคุ้มค่าที่แบกก้อนเนี้อสดพวกนี้มา"
1005506-50 = "[s5] \"ไม่ต้องพยายามแกล้งครูขนาดนี้ก็ได้มั้ง...\"\n[s6] \"ชิกุเระนี่เก่งในหลายๆ ด้านเลยนะ\""
1005506-53 = "ก็การใช้ชีวิตอย่างสนุกมันเป็นเรื่องสำคัญนี่นา ว่ากันว่าถ้าตัดการล้อเล่นออกไป ความสนุกของชีวิต#nก็จะลดลงครึ่งหนึ่งเลยนะ"
1005506-54 = "เอาละ งั้นเรามาเริ่มทำอาหารกันอย่างจริงจังเลยดีมั้ย...?"
1005506-57 = "ก่อนอื่นก็ปรุงรสเนื้อด้วยเกลือและเครื่องเทศ..."
1005506-63 = "จากนั้นก็ใส่เนยในกระทะ แล้วย่างเนื้อให้สุกจนด้านนอกกรอบ..."
1005506-67 = "สุดท้ายก็เหลือแค่เทวอดก้าลงไปบนเนื้อ..."
1005506-72 = "[ns7] \"เดี๋ยวก่อน อย่าเพิ่ง!\"\n[ns8] \"ทำไมถึงใส่เหล้าในอาหารล่ะ?\""
1005506-75 = "หืม? คุณครูเพิ่งเห็นอาหารที่ปรุงด้วยเหล้าเหรอ?"
1005506-76 = "การใส่เหล้าลงไปในอาหาร นอกจากจะช่วยดับกลิ่นของเนื้อแล้วยังเพิ่มรสชาติที่เป็นเอกลักษณ์#nของเหล้าให้กับอาหารอีกด้วยนะ"
1005506-77 = "ร้านอาหารที่เราไปเมื่อครั้งก่อนก็เทเหล้าใส่อาหารจนไฟลุกด้วยนี่ เรียกว่าเฟลมเบ้หรือเปล่านะ..."
1005506-78 = "[s9] \"นั่นมันการใส่เหล้าลงไปและทำให้ร้อนตอนเสิร์ฟต่างหาก...\"\n[s10] \"แบบนี้เนื้อคงมีแต่กลิ่นเหล้าแน่ๆ\""
1005506-81 = "อืม... งั้นเหรอ"
1005506-82 = "แต่ว่าทำไงดีล่ะ? ก็เนื้อมันสุกดีแล้ว ถ้าให้เพิ่มความร้อนเข้าไปอีกคงไหม้แน่..."
1005506-83 = "ช่วยไม่ได้นะ ครั้งนี้ฉันคงต้องกินเอง—"
1005506-87 = "[ns] \"ครูทำให้ใหม่เอง\""
1005506-91 = "หืม? ครูจะทำอาหารให้ใหม่เหรอ?"
1005506-92 = "ฉันก็ไม่ติดอะไรหรอกนะ แต่วันนี้ฉันตั้งใจมาทำอาหารตอบแทนคุณครูแท้ๆ..."
1005506-93 = "[s] \"ครูไม่เป็นไรหรอก นั่งรอตรงนี้ก่อนนะ\""
1005506-103 = "(...แล้วคุณครูก็ใช้วัตถุดิบที่ชิกุเระเตรียมมาทำอาหารให้แทน)"
1005506-109 = "...สุดท้ายคุณครูก็ต้องมาทำอาหารให้"
1005506-110 = "ขอโทษนะ ฉันเป็นฝ่ายมารบกวนเวลาคุณครูแท้ๆ แต่ก็ยังให้คุณครูทำอาหารให้อีก..."
1005506-111 = "[s11] \"ไม่เป็นไร นี่ไม่ใช่งานยากอะไรเลย\"\n[s12] \"แค่ชิกุเระมาหาครูแบบนี้ก็พอแล้วละ\""
1005506-116 = "...อืม"
1005506-117 = "ได้ยินครูพูดแบบนี้ก็ใจชื้นอยู่หรอก"
1005506-118 = "แต่การพูดออกมาตรงๆ แบบนั้น ฉันก็ตกใจเหมือนกันนะ"
1005506-119 = "เป็นผู้ใหญ่แล้วพูดได้ชิลๆ แบบนี้สินะ... แปลกดีจัง"
1005506-120 = "แต่หากพูดให้ความหวังเรื่อยๆ แบบนี้ละก็ ฉันก็ไม่รับประกันนะว่าตัวเองจะทำอะไรลงไป"
1005506-121 = "ช่วยระวังคำพูดหน่อยแล้วกันนะ"
1005506-122 = "เพราะถ้าฉันมาชาเล่ต์บ่อยๆ คุณครูจะหมดแรงเอานะ"
1005506-123 = "หืม...? ไม่เป็นไรเหรอ?"
1005506-124 = "ถ้าเป็นเรื่องล้อเล่นแบบนี้ ไม่ว่าเท่าไหร่ก็จะยอม... งั้นเหรอ?"
1005506-125 = "อื้อ จะเล่นอย่างนี้สินะ..."
1005506-126 = "เอาสิ ก็ได้ แล้วฉันจะแวะมาบ่อยๆ"
1005506-127 = "งั้นคุณครูก็แวะมาที่ห้องพิเศษ 227 ของเราบ่อยๆ ด้วยนะ"
1005506-128 = "อ้อ! แล้วก่อนมาก็ต้องบอกฉันด้วยนะ!"

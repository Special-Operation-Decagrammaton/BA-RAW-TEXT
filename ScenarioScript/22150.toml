22150-99 = "Of course it was Veritas."
22150-100 = "You're Himari's underclassmen, indeed."
22150-101 = "Oh! Wh-Who is that?!"
22150-109 = "Communication from Veritas is..."
22150-110 = "[s] \"It's down.\""
22150-114 = "As expected, you really came all the way here, Sensei."
22150-115 = "[s1] \"Rio...! Yes, I did.\"\n[s2] \"I came to stop you.\""
22150-116 = "...I see."
22150-117 = "...I see."
22150-118 = "My words and actions..."
22150-119 = "They weren't enough to convince you and the rest."
22150-126 = "...Sensei."
22150-127 = "Do you know what the trolley problem is?"
22150-128 = "Trolley...?"
22150-129 = "...problem?"
22150-130 = "It's a simple concept."
22150-131 = "There's an out-of-control train that can't be stopped...barreling towards a group of people. But there's a lever that will switch its tracks, where only one person is standing."
22150-132 = "This problem forces you to make a choice. Will you sacrifice one person to save many—or will you sacrifice many to save one?"
22150-133 = "Yes, someone has to pull the lever and save the larger number of people."
22150-134 = "...And I chose to take that role."
22150-135 = "I have no malicious intent. I just want to..."
22150-136 = "Shut up! Shut up with all your nonsense! Give us Aris!"
22150-137 = "...Huh? You're..."
22150-138 = "I heard everything!"
22150-139 = "You selfishly took Aris away after saying all kinds of absurd things!"
22150-140 = "...They weren't absurd at all."
22150-141 = "I'm sure you know that well, as someone who was harmed by the princess of the Nameless Gods..."
22150-142 = "No, I don't! Not even in the slightest!"
22150-143 = "...!"
22150-144 = "All I know is that we want Aris back!"
22150-145 = "Hey..."
22150-146 = "Momoi..."
22150-147 = "You kidnapped Aris and made some dumb excuse about her being a threat to Kivotos! That's nonsense!"
22150-148 = "I've written game scenarios that are more realistic than your setup!"
22150-149 = "I don't care about your stupid plot!"
22150-150 = "I understand now. There's nothing I can say to make you see the truth."
22150-151 = "Truly, no one will ever understand me and all that I do."
22150-152 = "Avant Guard, deploy."
22150-158 = "Whoa! That looks so lame!"
22150-159 = "That design's certainly unorthodox..."
22150-164 = "...Its appearance doesn't matter for what it can do."
22150-165 = "[s] \"I can tell you're not okay with this deep down either! Rio!\""
22150-166 = "You don't have to understand me. It's fine. No one needs to. I'm doing what's right."
22150-167 = "W-Waaaahhhh?!"
22150-168 = "[ns] \"Everyone, watch out! Incoming!\""

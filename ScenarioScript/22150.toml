[translation]
22150-1 = "第15話;陷阱"
22150-2 = "明日奈！要上囉～！"
22150-10 = "……！"
22150-21 = "就是現在！"
22150-33 = "沒用的！"
22150-42 = "別想逃！"
22150-46 = "（……真強大）"
22150-47 = "（身為特務，擅長複數人同時戰鬥的C&C，是配合度非常高的社團……）"
22150-48 = "（彷彿一心同體的戰術……正是與其他學校的戰力差別最大的地方──）"
22150-51 = "……其戰略沒有弱點。"
22150-52 = "既然如此……"
22150-57 = "……部長，這是……！"
22150-61 = "咦？怎麼回事～！？#n地面在轟隆隆地震動！！"
22150-62 = "不僅如此……朱音，狀況不太對勁。"
22150-63 = "……建築在，移動？"
22150-67 = "等……！？這是怎麼回事！？"
22150-68 = "部長……！！牆壁……！"
22150-74 = "晃動……停止了嗎？"
22150-75 = "那些傢伙呢……？"
22150-81 = "我變更了這一帶的都市構造，將您與其他前輩們隔離了。"
22150-82 = "啊？那是什麼啊。"
22150-83 = "「埃里都」本來就兼備著擊退入侵者要塞的角色。"
22150-84 = "利用莉央大人給的權限，將各位隔離開了。"
22150-85 = "寧瑠前輩，這樣一來您的勝率已微乎其微。"
22150-86 = "……"
22150-87 = "哈啊……勝率……還是什麼的……"
22150-88 = "──開什麼玩笑。"
22150-97 = "咦！？等，等一下！現在，通訊狀態有點……！"
22150-98 = "這是……"
22150-99 = "貝里塔斯……果然是妳們啊。"
22150-100 = "該說不愧是那個「陽葵」的後輩嗎。"
22150-101 = "咦？是，是誰！？"
22150-109 = "貝里塔斯的通訊……"
22150-110 = "[s]「被切斷了……」"
22150-114 = "雖然有預想過……你真的來到這裡了啊，老師。"
22150-115 = "[s1]「莉央……！」\n[s2]「我們是來阻止妳的。」"
22150-116 = "……是嗎。"
22150-117 = "……是嗎。"
22150-118 = "果然，光靠我那時說的話和行動……"
22150-119 = "是無法說服你和那些孩子們的呢。"
22150-126 = "…………老師。"
22150-127 = "你知道電車難題嗎？"
22150-128 = "電車……？"
22150-129 = "……難題？"
22150-130 = "是很簡單的事。"
22150-131 = "因故障而無法停止的列車在軌道上行駛時。#n是要為了多數人的存活而犧牲一個人──"
22150-132 = "還是要為了一個人的存活而犧牲多數人──#n這樣一個強迫做出選擇的問題。"
22150-133 = "沒錯。必須要有人擔任操作操縱桿的角色才行。"
22150-134 = "而我……只是欣然接受那份職責罷了。"
22150-135 = "惡意與敵意打從一開始就沒有。我只是單純地──"
22150-136 = "夠了！這些我聽不懂！！#n別說那些複雜的話了，把愛麗絲還來！！"
22150-137 = "哎呀，妳是……"
22150-138 = "事情我都聽說了！"
22150-139 = "會長說著一些無法理解的話然後把愛麗絲帶走了！"
22150-140 = "……並不是什麼無法理解的事。"
22150-141 = "不是其他人，#n而是被「無名諸神的王女」攻擊的妳難道不明白嗎？"
22150-142 = "當然不明白啊！"
22150-143 = "……！"
22150-144 = "我們只是想從會長手中把愛麗絲帶回來而已！"
22150-145 = "姐姐……"
22150-146 = "桃井……"
22150-147 = "再說，用奇普托斯的威脅之類的理由就綁架愛麗絲什麼的，#n格局也太小了吧！"
22150-148 = "我平常寫的劇本規模都還大～得多呢！"
22150-149 = "那種事怎麼可能接受！"
22150-150 = "……也對。現在就要妳們接受是很困難的呢。"
22150-151 = "……我自己沒辦法立刻獲得諒解這點，我也非常清楚。"
22150-152 = "──前衛君，出動。"
22150-158 = "嗚哇！？#n好土……"
22150-159 = "確實，不是什麼可愛的設計……"
22150-164 = "……外表長怎樣都無所謂。"
22150-165 = "[s]「……稍微聽到妳的真心話了唷，莉央。」"
22150-166 = "無法被理解的話就算了。#n就這樣下去也無所謂。"
22150-167 = "嗚，嗚哇啊啊！？"
22150-168 = "[ns]「大家小心點……要來了唷！」"

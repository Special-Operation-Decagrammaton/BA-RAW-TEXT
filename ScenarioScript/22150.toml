22150-75 = "Where did everyone else go?"
22150-81 = "By changing the structure of this area, I've separated you from the other C&C upperclassmen."
22150-82 = "What? That's possible?!"
22150-83 = "Yes, Eridu serves as a fortress that repels intruders."
22150-84 = "Manipulating the fortress with permissions from Rio, I have isolated you from the rest of the C&C agents."
22150-85 = "Neru, the probability of your victory has decreased significantly."
22150-86 = "..."
22150-87 = "*sigh* ...Are you still blathering on about probabilities and that nonsense?"

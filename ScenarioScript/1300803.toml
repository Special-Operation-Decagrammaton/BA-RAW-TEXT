[translation]
1300803-1 = "Hardcore All-Night Part-Time Job"
1300803-2 = "(Serika is running late.)"
1300803-5 = "*pant* *pant*"
1300803-6 = "[s] \"What took you so long, Serika?\""
1300803-7 = "It's not...my fault... My ramen house job made me stay overtime..."
1300803-8 = "[s] \"I thought the rule was that you always show up early for a part-time job.\""
1300803-9 = "Oh, th-that's true, but... Sh-Shut up! I'm only a few minutes late..."
1300803-10 = "..."
1300803-11 = "We're running behind. Let's hurry, Sensei!"
1300803-14 = "(Serika and I began our part-time job as nighttime security guards for a building.)"
1300803-15 = "(It's a pretty boring job... We have to guard the building's entrance all night.)"
1300803-17 = "*sigh* I'm exhausted."
1300803-18 = "All-nighters are best left for Fridays, because then you have all weekend to recover. On the downside, you lose an entire weekend."
1300803-19 = "Are you okay with that, Sensei? It doesn't bother me, but I understand if you're too busy."
1300803-20 = "Isn't there something else you want to do this weekend?"
1300803-21 = "[s1] \"I didn't realize we'd be here all night.\n[s2] \"I usually stay in during the weekend, so it's fine.\""
1300803-22 = "...Oh."
1300803-23 = "I thought I told you..."
1300803-24 = "S-Sorry..."
1300803-25 = "Haha. You'd rather stay home every weekend? I prefer going out and having fun."
1300803-26 = "*sigh* I can't wait to go home and shower. "
1300803-27 = "We did a good job tonight, Sensei. "
1300803-28 = "See you next time! Bye-bye!"
1300803-31 = "I decided to donate the money I made to the Foreclosure Task Force again."

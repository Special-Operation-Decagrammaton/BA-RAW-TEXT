[translation]
1300803-1 = "งานพาร์ทไทม์แสนยากตลอดทั้งคืน"
1300803-2 = "(พอถึงเวลาแล้วเซริกะก็ยังไม่มาตามนัด)"
1300803-5 = "แฮ่ก... แฮ่ก"
1300803-6 = "[s] \"มาช้าจัง เซริกะ\""
1300803-7 = "คือว่า... มันช่วยไม่ได้นี่ พอดีงานที่ร้านราเม็งมันเสร็จช้าไปหน่อย...."
1300803-8 = "[s] \"ปกติทำงานพิเศษควรมาถึงก่อนเวลานิดหน่อยไม่ใช่เหรอ?\""
1300803-9 = "...อ่า กะ...ก็ใช่อยู่แต่ว่า...#nนะ...หนวกหูน่า! ช้าไปแค่นิดเดียวเอง…"
1300803-10 = "....."
1300803-11 = "สายแล้ว รีบไปเถอะคุณครู!"
1300803-14 = "(คุณครูไปทำงานพิเศษเป็นเจ้าหน้าที่รักษาความปลอดภัยกะดึกที่อาคารแห่งหนึ่งด้วยกัน)"
1300803-15 = "(งานเฝ้าทางเข้าอาคารตลอดทั้งวันเป็นงานที่น่าเบื่อ)"
1300803-17 = "เฮ้อ... เหนื่อยจัง"
1300803-18 = "การทำงานหนักตลอดทั้งคืนตอนวันศุกร์น่ะมันก็ดีอยู่หรอกนะ...#nแต่มันก็น่าเสียดายนิดหน่อยที่จะไม่มีเวลาหยุดพักเลย"
1300803-19 = "ว่าแต่ว่าคุณครูโอเคไหม? คุณครูมีงานที่ต้องทำตอนวันหยุดด้วยไม่ใช่รึไง?"
1300803-20 = "หรือว่าว่างอยู่แล้ว?"
1300803-21 = "[s1] \"ไม่คิดเลยว่าจะมาทำงานพิเศษทั้งคืน\"\n[s2] \"ไม่เป็นไรหรอก เพราะปกติวันหยุดก็จะอยู่บ้านอยู่แล้ว\""
1300803-22 = "เอ๋...."
1300803-23 = "ฉันยังไม่ได้บอกงั้นเหรอ…"
1300803-24 = "ขะ...ขอโทษ..."
1300803-25 = "อ่าฮ่าฮ่าฮ่า เป็นพวกชอบขลุกอยู่บ้านตอนวันหยุดสินะ ส่วนฉันชอบออกไปทำโน่นทำนี่มากกว่า"
1300803-26 = "อ่า... อยากกลับไปอาบน้ำที่บ้านเร็วๆ จัง"
1300803-27 = "วันนี้ก็ขอบคุณคุณครูมากนะ"
1300803-28 = "งั้นไว้เจอกันใหม่! บ๊ายบาย~"
1300803-31 = "(ตัดสินใจบริจาคเงินที่ได้จากการทำงานพิเศษให้กับคณะกรรมการแผนงาน)"

[translation]
1300803-1 = "辛苦的通宵打工"
1300803-2 = "（到了約定時間，茜香卻沒有出現）"
1300803-5 = "哈啊……哈啊……"
1300803-6 = "[s] 「難得遲到呢，茜香。」"
1300803-7 = "這是因為……哈啊，哈啊，誰叫……拉麵店的工作一直沒辦法結束……"
1300803-8 = "[s] 「『要比約好的時間早一點到』不是嗎？」"
1300803-9 = "……那，那當然是這樣沒錯…… #n呃，吵，吵死了！反正只遲到了一下……"
1300803-10 = "哈啊，呼……"
1300803-11 = "……已經遲到了，快點走吧，老師！"
1300803-14 = "（和茜香一起做了大樓夜班警衛的打工）"
1300803-15 = "（整晚守著大樓入口，是個很累卻枯燥乏味的工作）"
1300803-17 = "哈啊……好累。"
1300803-18 = "週五做這種高強度的夜班是不錯……但缺點是假日都沒了，有點可惜呢。"
1300803-19 = "不過老師沒關係嗎？我就算了，老師假日沒有事要做嗎？"
1300803-20 = "還是說。果然很閒？"
1300803-21 = "[s1] 「沒想到會熬夜打工。」\n[s2] 「休息日不會離開家裡，沒關係。」"
1300803-22 = "……咦。"
1300803-23 = "我沒有說過嗎……"
1300803-24 = "抱，抱歉……"
1300803-25 = "啊哈哈，你是假日會待在家的類型嗎？我倒是比較喜歡到處走走。"
1300803-26 = "哈啊……好想快點回家沖澡。"
1300803-27 = "老師，今天也辛苦你了。 "
1300803-28 = "那再見囉。ByeBye～"
1300803-31 = "（決定把收到的錢捐給對策委員會）"

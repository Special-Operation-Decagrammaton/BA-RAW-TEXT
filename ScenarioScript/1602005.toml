[translation]
1602005-1 = "#title;어느 저격수의 외로움"
1602005-2 = "#na;(오토기의 의미심장한 모모톡을 확인한 뒤, 바로 FOX 소대가 머무르고 있는 지하 HQ로 향했다.)"
1602005-3 = "#st;[0,0];instant;1;"
1602005-4 = "#clearST"
1602005-5 = "#wait;2000"
1602005-6 = "#all;hide"
1602005-7 = "#place;FOX 소대 HQ\n#wait;1000"
1602005-8 = "#na;(……하지만 FOX 소대 HQ에는 오토기를 포함하여 모두가 자리를 비운 상태였다.)"
1602005-9 = "#all;hide"
1602005-10 = "#na;(이후, 샬레 밖으로 나와 근처의 거리를 돌아다닌지 10분쯤 지났을 무렵……)"
1602005-11 = "3;오토기;05\n#3;a"
1602005-12 = "1;???;00\n#1;hide"
1602005-13 = "#na;(인근 공원의 벤치에 앉아 멍하니 가로등을 바라보고 있는 오토기를 찾을 수 있었다.)"
1602005-14 = "3;오토기;05\n#3;h"
1602005-15 = "[ns] \"오토기!\""
1602005-16 = "3;오토기;02;……어라? 선생님……\n#3;em;[?]"
1602005-17 = "3;오토기;00;이런 늦은 시간에 공원에는 뭣 하러 나온 거야?"
1602005-18 = "3;오토기;02;밤에 인적이 드문 장소를 돌아다니면 위험하다고.\n#3;em;[한숨]"
1602005-19 = "[s1] \"그건 내가 할 말이야.\"\n[s2] \"왜 이런 늦은 밤에 밖에 나온 거야?\""
1602005-20 = "#wait;100"
1602005-21 = "#wait;100"
1602005-22 = "3;오토기;00;그건 그냥 기분 전환 겸—\n#3;stiff"
1602005-23 = "#st;[0,0];instant;1;"
1602005-24 = "#clearST"
1602005-25 = "3;오토기;05\n#3;em;[…]\n#wait;2500"
1602005-26 = "3;오토기;00\n#3;greeting\n#wait;1000"
1602005-27 = "3;오토기;02;아, 모모톡 확인했구나.\n#3;em;[반응]"
1602005-28 = "3;오토기;06;……미안. 내가 걱정을 끼친 모양이네.\n#3;stiff"
1602005-29 = "3;오토기;02;정말 아무것도 아니었는데, 늦은 밤에 뛰쳐나오게 만들어서 미안해.\n#3;em;[속상함]"
1602005-30 = "3;오토기;05;나는 정말 기분 전환하러 잠깐 산책 나온 거니까, 선생님은 샬레로 돌아가도 괜찮아."
1602005-31 = "3;오토기;13;내일 오전에도 중요한 회의가 있다고 했잖아? 일찍 자야지."
1602005-32 = "[s3] \"학생의 고민을 들어주는 것보다 중요한 일은 없어.\"\n[s4] \"마침 나도 밤 산책을 하고 싶은 기분이라서.\""
1602005-33 = "#wait;100"
1602005-34 = "#wait;100"
1602005-35 = "3;오토기;08;………정말 제멋대로네.\n#3;em;[한숨]"
1602005-36 = "3;오토기;09;아니, 제멋대로인 건 내 쪽인가.\n#3;stiff\n#fontsize;50"
1602005-37 = "[ns5] \"여기서 무얼 보고 있었어?\"\n[ns6] \"특별히 재미있는 건 없어 보이는데.\""
1602005-38 = "#wait;100"
1602005-39 = "#wait;100"
1602005-40 = "3;오토기;02;저기, 입구에 있는 가로등 보여?\n#3;em;[반응]"
1602005-41 = "3;오토기;05;오른쪽에 있는…… 다른 가로등보다 조금 빛이 희미한 가로등."
1602005-42 = "3;오토기;02;전에 FOX 소대의 작전을 진행하다 알게 되었는데, 저 가로등은 회로가 낡아서 자주 고장이 난대."
1602005-43 = "3;오토기;00;요즈음의 가로등은 보통 해가 지면 센서가 반응해서 자동으로 불이 들어오잖아?"
1602005-44 = "3;오토기;02;그런데 저 가로등은 회로 센서가 낡아서 가만히 놔두어도 한 시간에 한 번 꼴로 불이 계속 꺼진다고 하나 봐."
1602005-45 = "3;오토기;00;그래서 공원의 야간 당직자가 카메라로 지켜보다가 불이 꺼져 있으면 수동으로 전원을 다시 킨대. 정말 귀찮은 방식이지?"
1602005-46 = "3;오토기;05;그런데 이전에 이 근처를 지나가다가 꺼진 가로등의 불이 켜졌을 때, 문득 그런 생각이 들었어."
1602005-47 = "3;오토기;02;아, 누군가가 저 너머에 있구나.\n#3;em;[반응]"
1602005-48 = "3;오토기;03;누군가는 이 밤에도 잠들지 않고 가로등을 계속 키는 일을 하고 있구나."
1602005-49 = "3;오토기;05;……그래서 외로움이 느껴지는 때면 이 공원에 와서 저 가로등이 점멸하는 걸 멍하니 지켜보곤 했어."
1602005-50 = "[s] \"오늘도 외로움을 느꼈던 거야?\""
1602005-51 = "3;오토기;00;응. 오늘은 공교롭게도 다른 소대원들이 모두 야간 작전 때문에 연락을 받을 수 없는 상태거든.\n#3;em;[속상함]"
1602005-52 = "3;오토기;05;블랙 아웃…… 무선 침묵이라고 할까. #n작전 상의 이유로 통신을 끊는 건 꽤 흔한 일이야."
1602005-53 = "3;오토기;02;더욱이 위치 정보에 민감한 저격수에게는."
1602005-54 = "3;오토기;00;전에 저격수에게 원활한 소통 능력도 중요하다고 말한 적이 있지만, 사실 저격수에게 가장 필요한 능력은 고독을 견디는 거야."
1602005-55 = "3;오토기;05;아군이 보이지 않아도, 적이 보이지 않아도…… 심지어 이 세계에 나 혼자 남겨진 기분이 들어도.\n#3;stiff"
1602005-56 = "3;오토기;02;위치를 이탈하지 않고 묵묵히 목표가 오기를 기다려야 하는 것이 저격수의 미덕인데."
1602005-57 = "3;오토기;00;나는 그저 눈이 좋고, 손 끝이 섬세하다는 이유만으로 저격수의 길을 택했거든.\n#3;em;[한숨]"
1602005-58 = "3;오토기;05;그래서 가끔 이렇게 이유 없는 외로움을 느낄 때마다 생각하곤 해."
1602005-59 = "3;오토기;02;나는 내 진로에 대해 잘못된 결정을 내린 게 아닐까."
1602005-60 = "[s7] \"진로를 택하는 데 잘못된 결정은 없어.\"\n[s8] \"가능성을 탐구하는 그 자체가 학생의 본분인 걸.\""
1602005-61 = "#wait;100"
1602005-62 = "#wait;100"
1602005-63 = "3;오토기;00;하지만 적성에 맞지 않는 일에 시간을 허비하는 건 낭비잖아."
1602005-64 = "3;오토기;02;다른 적성에 맞는 일을 했더라면, 훨씬 더 성장할 수 있었을 텐데. 적성에 맞지 않는 일을 붙잡고 시간을 낭비했다고 생각하면……"
1602005-65 = "3;오토기;99;……참을 수가 없어.\n#3;stiff"
1602005-66 = "[ns9] \"하지만 전에 오토기가 말했잖아?\"\n[ns10] \"설령 실수라 하더라도, 만회할 수 있다고.\""
1602005-67 = "#wait;1000"
1602005-68 = "#wait;1000"
1602005-69 = "[ns] \"괜찮아. 너희들에게는 무한한 시간이 있으니까.\""
1602005-70 = "3;오토기;02;하지만 난 이미 3학년인데?\n#3;em;[반응]"
1602005-71 = "3;오토기;05;진로를 새로 선택하기에는 너무 늦은 게 아닐까."
1602005-72 = "3;오토기;02;언제까지고 학생의 기분으로 머무를 수는 없잖아.\n#3;em;[속상함]"
1602005-73 = "[s11] \"그렇지 않아. 배우고자 하는 마음만 있다면……\"\n[s12] \"누구나 학생이 될 수 있다고.\""
1602005-74 = "#wait;100"
1602005-75 = "#wait;100"
1602005-76 = "3;오토기;08;그 말대로라면 선생님도 학생이 될 수 있는 거야?"
1602005-77 = "3;오토기;99;진짜 우스꽝스러운 논리네."
1602005-78 = "3;오토기;03;역시 이상한 어른이야.\n#3;em;[한숨]"
1602005-79 = "3;오토기;00;……하지만 고마워. 덕분에 외로움은 많이 가신 것 같아."
1602005-80 = "3;오토기;02;아, 가로등의 불이 다시 꺼졌다."
1602005-81 = "3;오토기;00;……다시 켜졌네."
1602005-82 = "3;오토기;03;지금은 명령에 충실해야지.\n#3;greeting"
1602005-83 = "3;오토기;99;단순한 불을 끄고 켜는 일이라 할지라도……"
1602005-84 = "3;오토기;15;무한히 반복하다 보면 누군가의 마음에 별 하나를 태어나게 해줄 수 있으니까.\n#3;em;[음표]\n#3;closeup"
1602005-85 = "#all;hide"
1602005-86 = "#na;(그 후, 오토기와 함께 가로등이 점멸하는 것을 한동안 지켜보며 새벽의 외로움을 달랬다.)"
1602005-87 = "#all;hide"
1602005-88 = "#wait;1000"

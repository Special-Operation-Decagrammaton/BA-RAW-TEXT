[translation]
90000130-1 = "第14話;信號"
90000130-2 = "特異現象搜查部．部室"
90000130-5 = "老師，你來啦。#n我在等你呢。"
90000130-6 = "抱歉突然把你叫來。"
90000130-7 = "[s]「發生什麼事了嗎？居然用了緊急呼叫。」"
90000130-8 = "這個……請先不要生氣，冷靜聽我說。"
90000130-9 = "[s] 「……嗯？」"
90000130-10 = "首先，請老師過來的人並不是我。"
90000130-19 = "已確認緊急召集協定正常運作。"
90000130-20 = "[s]「呃……？」"
90000130-21 = "發生緊急狀況時，老師能否及時抵達──這是對作戰而言非常重要的因素。#n因為老師是非常重要的人。"
90000130-25 = "[ns]「……季？」"
90000130-26 = "是的，我是飛鳥馬季。依我們的關係，應該沒有報上姓名的必要了吧？#n順帶一提，我所謂「我們的關係」是指關係非常親密的意思。"
90000130-27 = "老師順利及時抵達，已確認緊急召集協定沒有任何問題。"
90000130-28 = "[s]「呃……所以……」"
90000130-29 = "是的，現在沒有發生任何問題，真是無比和平。"
90000130-30 = "不……某種意義上或許發生了問題。#n沒有來自C&C的任務，遊戲開發部的工作也告一段落……#n因而再次陷入了無限期待命的狀態…… "
90000130-31 = "簡單來說，我現在非常無聊。"
90000130-35 = "[ns]「總而言之，你是因為無聊才按了緊急按鈕……是嗎？」"
90000130-37 = "Peace，Peace。"
90000130-38 = "在這種時候比出勝利手勢是不行的。#n造成別人困擾的角色不會受歡迎，甚至可能會被討厭哦？"
90000130-39 = "原來如此……之後我會注意。#n想突顯角色真困難，所以請陪我玩吧，老師。我好無聊。"
90000130-40 = "你有在聽我說話嗎？"
90000130-41 = "[s1]「你的角色設定是不是變了？季同學……？」\n[s2]「感覺你變得好正經啊，英美……」"
90000130-49 = "哎呀，真熱鬧呢。"
90000130-50 = "部長。"
90000130-51 = "陽葵部長，您來了啊。"
90000130-52 = "連老師和季都來了？#n發生什麼事了嗎？"
90000130-53 = "沒有發生什麼特別的事……"
90000130-58 = "哼嗯……"
90000130-62 = "哎呀？這是……？"
90000130-63 = "緊急警報？#n季……？"
90000130-64 = "為了維護我的名譽，請容我嚴正否認。#n我才不會隨便亂按緊急警報。"
90000130-65 = "這點我等一下再來吐槽你……"
90000130-71 = "……部長。#n這個信號是……看來有必要加以確認呢。"
90000130-78 = "是啊，沒想到這個信號會再度出現……"
90000130-79 = "信號？"
90000130-80 = "……嗯，是我們之前曾捕捉過的信號。#n原本以為今後再也不會出現的……"
90000130-81 = "嗯？什麼意思？那是什麼信號？"
90000130-82 = "那是十字神名的信號。"
90000130-87 = "十字神名……其本體應該已經沉到廢墟淹沒地區的水面下才對……"
90000130-88 = "沒錯，確實如此。#n那脆弱的自動販賣機無法承受那樣的爆炸和水壓，它不可能還活著。"
90000130-89 = "……本應這樣才對。"
90000130-90 = "部長，我確定信號的位置了。#n這裡是……"
90000130-91 = "這個座標……是連海都被凍結的極地「冰海地區」。"
90000130-92 = "那裡應該是連自治區都沒有的遺棄之地才對，十字神名居然會出現在這裡……？"
90000130-93 = "……確認一下吧。"
90000130-98 = "……果然沒錯。#n這個信號是十字神名的可能性很低。"
90000130-99 = "雖然乍看之下很類似，但這只不過是在模仿而已。"
90000130-100 = "也就是說……"
90000130-101 = "這是其他的預言者嗎？"
90000130-102 = "特異現象搜查部目前查明的預言者，包括霍德在內一共有四名……#n換句話說，還存在六名預言者。"
90000130-103 = "這或許……是其他的預言者，也可能是模仿十字神名的新敵人……"
90000130-104 = "無論如何，在親眼確認之前什麼都無法確定。"
90000130-105 = "但是有一點可以肯定──無論其身分為何……"
90000130-110 = "……"
90000130-115 = "都確實在呼喚著我們。"
90000130-117 = "下一話;冰海（１）"

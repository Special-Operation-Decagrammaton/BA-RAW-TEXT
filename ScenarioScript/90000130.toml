90000130-50 = "4;에이미;02;부장. "
90000130-51 = "2;토키 모드 1;01;히마리 부장. 오셨습니까."
90000130-52 = "5;히마리;01;선생님에 토키까지? 무슨 일이라도 생겼나요?\n#5;em;[?]"
90000130-53 = "4;에이미;04;무슨 일이 있는 건 아니지만……. "

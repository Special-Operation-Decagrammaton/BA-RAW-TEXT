[translation]
90000130-1 = "ตอนที่ 13;สัญญาณ"
90000130-2 = "ห้องชมรมปรากฏการณ์ลี้ลับ"
90000130-5 = "มาแล้วเหรอคุณครู ฉันกำลังรออยู่เลย"
90000130-6 = "ขอโทษที่อยู่ดีๆ ก็เรียกมานะ"
90000130-7 = "[s] \"อื้ม มีเรื่องอะไรเหรอ ถึงได้เรียกตัวมาฉุกเฉินแบบนี้\""
90000130-8 = "ก่อนอื่น... อย่าเพิ่งโมโหนะ ฟังฉันก่อน "
90000130-9 = "[s] \"หืม...?\""
90000130-10 = "และก็คนที่เรียกคุณครูมา ไม่ใช่ฉันหรอกนะ"
90000130-19 = "ฉันตรวจสอบแล้วค่ะ โปรโตคอลเรียกตัวฉุกเฉินไม่มีปัญหาอะไรค่ะ "
90000130-20 = "[s] \"หะ... หืม...?\""
90000130-21 = "'เมื่อเกิดสถานการณ์ฉุกเฉิน คุณครูจะมาถึงที่นี่ทันเวลาหรือเปล่า' นี่คือปัจจัยที่สำคัญอย่างยิ่งในการออก#nปฏิบัติการเลยค่ะ ก็คุณครูเป็นคนสำคัญยังไงล่ะคะ"
90000130-25 = "[ns] \"โทคิ...?\""
90000130-26 = "ค่ะ ฉันอาซุมะ โทคิ แต่ระหว่างเราไม่น่าจะต้องบอกชื่อเสียงเรียงนามแล้วใช่มั้ยคะ? อ้อ ที่ฉันพูดว่า <ระหว่างเรา> ฉันหมายถึงความสัมพันธ์ที่ใกล้ชิดกันมากค่ะ"
90000130-27 = "ฉันตรวจสอบแล้วค่ะว่าคุณครูมาถึงได้ทันเวลา และเราไม่พบปัญหาอะไรกับโปรโตคอลเรียกตัวฉุกเฉิน"
90000130-28 = "[s] \"อ่า... อืม... หมายความว่า...\""
90000130-29 = "ค่ะ ใช่ค่ะ หมายความว่าตอนนี้ไม่มีเรื่องอะไรเกิดขึ้น เราอยู่ในความสงบค่ะ "
90000130-30 = "ไม่สิ... ฉันว่าน่าจะมีปัญหาอยู่ เพราะตอนนี้ทาง C&C ก็ไม่เรียกหาฉัน ส่วนงานของชมรมพัฒนาเกมที่#nช่วยอยู่ก็เสร็จในระดับหนึ่งแล้ว... ฉันก็เลยใกล้เข้าสู่ภาวะตกงานแบบไม่มีกำหนดอีกครั้ง... "
90000130-31 = "แปลว่าฉันกำลังเบื่อมากๆ ค่ะ"
90000130-35 = "[ns] \"แปลว่าเบื่อๆ ก็เลยส่งลองสัญญาณฉุกเฉินงั้นเหรอ...?\""
90000130-37 = "พีซ พีซ"
90000130-38 = "ไม่ต้องมาตะโกนพีซๆ แบบมั่นๆ อยู่ตรงนี้เลย คาแรคเตอร์ที่สร้างความเดือดร้อนให้คนอื่นน่ะไม่เป็นที่#nนิยมหรอกนะ อาจจะโดนเกลียดเอาด้วยซ้ำ"
90000130-39 = "งั้นเหรอคะ... ฉันจะระวังค่ะ การคีพคาแรคเตอร์นี่มันยากจัง งั้นมาก็เล่นกับฉันหน่อยนะคะ คุณครู ฉันเบื่อค่ะ "
90000130-40 = "ฟังที่ฉันพูดอยู่ใช่มั้ย? "
90000130-41 = "[s1] \"คาแรคเตอร์มันเปลี่ยนไปนิดหน่อยรึเปล่า? โทคิ...?\"\n[s2] \"กลายเป็นคนกระฉับกระเฉงแล้วสินะ เอมิ...\""
90000130-49 = "ตายจริง เอะอะโวยวายอะไรกันคะ"
90000130-50 = "หัวหน้า "
90000130-51 = "หัวหน้าฮิมาริ มาแล้วเหรอคะ?"
90000130-52 = "คุณครูกับโทคิก็อยู่ด้วยเหรอ? เกิดเรื่องอะไรขึ้นรึเปล่าคะ?"
90000130-53 = "ไม่ได้มีเรื่องอะไรหรอกค่ะ แค่... "
90000130-58 = "ฮืม"
90000130-62 = "ตายจริง นี่มัน...?"
90000130-63 = "เสียงเตือนฉุกเฉิน? โทคิ...?"
90000130-64 = "ถ้าจะพูดเพื่อรักษาเกียรติยศของฉันละก็ ไม่ใช่ค่ะ ฉันไม่ได้ไปแตะต้องสัญญาณเตือนเหตุฉุกเฉินอย่าง#nสะเพร่านะคะ"
90000130-65 = "เรื่องนั้นเอาไว้ถกกันทีหลังเถอะ "
90000130-71 = "หัวหน้า... ฉันว่าต้องมาดูสัญญาณนี่หน่อยแล้วละ"
90000130-78 = "จริงด้วยนะคะ เกิดสัญญาณนั่นจากตรงนี้อีกแล้วเหรอเนี่ย..."
90000130-79 = "สัญญาณ?"
90000130-80 = "อื้ม เป็นสัญญาณที่เราตรวจพบกันก่อนหน้านี้ค่ะ นึกว่าจะไม่ปรากฏขึ้นเป็นครั้งที่สองแล้วเสียอีก..."
90000130-81 = "คะ? หมายความว่ายังไงเหรอคะ? สัญญาณอันนั้นคืออะไรเหรอคะ?"
90000130-82 = "สัญญาณของเดคาแกรมมาทอนค่ะ"
90000130-87 = "เดคาแกรมมาทอน... ที่ร่างของเขาจมอยู่ใต้พื้นที่รกร้างจมน้ำน่ะเหรอคะ..."
90000130-88 = "ใช่ค่ะ ต้องใช่แน่ๆ ร่างกายที่อ่อนแอของเขาไม่สามารถอดทนต่อการระเบิดและแรงดันของน้ำได้ เขาจึงไม่อาจมีชีวิตต่อได้ค่ะ"
90000130-89 = "แต่ถึงอย่างนั้น "
90000130-90 = "หัวหน้า ฉันตรวจสอบตำแหน่งของสัญญาณแล้ว ที่นี่มัน..."
90000130-91 = "ตามพิกัดคือ... <เขตธารน้ำแข็ง> พื้นที่เย็นสุดขั้วที่ทะเลกลายเป็นน้ำแข็งสินะคะ"
90000130-92 = "ตรงนั้นเป็นพื้นที่ร้างที่ไม่มีเขตปกครองตนเองด้วยซ้ำ ทำไมเดคาแกรมมาทอนถึงไปอยู่ตรงนั้นล่ะ...?"
90000130-93 = "ไปตรวจสอบกันเถอะค่ะ "
90000130-98 = "ว่าแล้วเชียว สัญญาณนี้มีความเป็นไปได้น้อยที่จะเป็นเดคาแกรมมาทอนค่ะ "
90000130-99 = "ถ้าดูผ่านๆ ก็จะเห็นว่าคล้ายกับครั้งนั้น แต่นี่มันเป็นแค่การเลียนแบบสัญญาณอันนั้นเท่านั้นค่ะ"
90000130-100 = "ถ้าเป็นอย่างนั้น..."
90000130-101 = "แปลว่ามีผู้เลื่อมใสตนอื่นอยู่งั้นเหรอคะ?"
90000130-102 = "ถ้านับ HOD ด้วยแล้ว ตอนนี้ผู้เลื่อมใสที่ชมรมปรากฏการณ์ลี้ลับค้นพบก็มีแล้ว 4 ตน... งั้นก็แปลว่ายังมี#nอีก 6 ตนที่เหลืออยู่สินะคะ"
90000130-103 = "อาจจะเป็นอย่างนั้นก็ได้ค่ะ อาจจะเป็นผู้เลื่อมใสตนอื่น หรืออาจจะเป็นสิ่งใหม่ที่เลียนแบบ#nเดคาแกรมมาทอนก็ได้..."
90000130-104 = "แต่ไม่ว่าจะเป็นอย่างไหน ถ้าไม่ได้พิสูจน์ด้วยตาของตัวเอง เราก็ยังฟันธงไม่ได้ค่ะ"
90000130-105 = "แต่สิ่งหนึ่งที่แน่นอนก็คือ ไม่ว่าสิ่งนั้นจะเป็นอะไร..."
90000130-110 = "..."
90000130-115 = "มันกำลังเรียกพวกเราอยู่ค่ะ"
90000130-117 = "ตอนต่อไป;ธารน้ำแข็ง 1"

90000130-61 = "5;히마리;01\n2;토키 모드 1;04\n4;에이미;04\n#2;h\n#4;h\n#5;h\n#wait;2500"
90000130-62 = "5;히마리;02;어머? 이건……?\n#5;em;[?]"
90000130-63 = "4;에이미;04;비상 경고음? 토키……?"
90000130-64 = "2;토키 모드 1;07;제 명예를 위해서 말하자면, 아닙니다. 저는 비상 알람을 함부로 만지거나 하지 않습니다."
90000130-65 = "4;에이미;99;그 부분의 태클은 조금 있다가 할게. "

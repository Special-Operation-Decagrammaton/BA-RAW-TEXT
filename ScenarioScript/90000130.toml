90000130-4 = "3;에이미;01\n#3;a\n#wait;1000"
90000130-5 = "3;에이미;01;선생님, 왔구나. 기다리고 있었어."
90000130-6 = "3;에이미;00;갑자기 호출해서 미안해."
90000130-7 = "[s] \"응, 무슨 일이야? 비상 호출이라니.\""
90000130-8 = "3;에이미;99;일단…… 화내지 말고 들어줬으면 해. "
90000130-9 = "[s] \"……응?\""
90000130-10 = "3;에이미;00;그리고 선생님을 부르자고 한 건 내가 아니었어."
90000130-11 = "#st;[0,0];instant;1;"

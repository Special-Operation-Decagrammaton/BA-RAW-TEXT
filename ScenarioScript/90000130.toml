[translation]
90000130-1 = "Episode 14;Signal"
90000130-2 = "Special Operations Room"
90000130-5 = "Welcome, Sensei."
90000130-6 = "I apologize for the sudden call."
90000130-7 = "[s] \"Is it an emergency? What's happening?\""
90000130-8 = "To begin, please do not be angry. "
90000130-9 = "[s] \"...Huh?\""
90000130-10 = "I was not the one who called you, to clarify."
90000130-19 = "The Emergency Response Protocol is functioning as expected. "
90000130-20 = "[s] \"HUH?!\""
90000130-21 = "The speed at which Sensei can respond to an emergency is essential to a mission's success. That needed to be tested."
90000130-25 = "[ns] \"...Toki?\""
90000130-26 = "Yes. It is Asuma Toki. I assume we need no introductions. The reason I assume this is because we already have an established relationship. A rather close one, I might add."
90000130-27 = "Thank you for confirming there are no issues with the Emergency Response Protocol."
90000130-28 = "[s] \"So... Do you mean to say...\""
90000130-29 = "Correct. All is well. Millennium is at peace. "
90000130-30 = "Except for me. I am not at peace. I am instead on standby. The C&C continues to conduct missions without me, and my work with the Game Development Department has concluded. "
90000130-31 = "Is there a stronger word I can use than \"bored\"? Because I am more than bored."
90000130-35 = "[ns] \"So you pressed the emergency button...out of boredom?\""
90000130-37 = "Peace peace."
90000130-38 = "Please do not sound so proud of yourself. In these kinds of situations, people may think you are being rude."
90000130-39 = "I see. Social interactions are still a mystery to me. Regardless, let us play, Sensei. I am bored. "
90000130-40 = "I don't believe you are actually listening to me. "
90000130-41 = "[s1] \"Toki's really coming into her own recently...\"\n[s2] \"You've become so responsible, Eimi!\""
90000130-49 = "Oh my. Did I lose my invite to the party?"
90000130-50 = "President. "
90000130-51 = "Hello, President Himari."
90000130-52 = "The whole team has gathered. Did something happen?"
90000130-53 = "Nothing happened. "
90000130-58 = "Absolutely nothing."
90000130-62 = "Oh dear. What's this?"
90000130-63 = "The emergency bell. Toki?"
90000130-64 = "This is what people call \"slander.\" I would not even look in the direction of the emergency alarm without proper justification."
90000130-65 = "...We will have to have a conversation about that later. "
90000130-71 = "President. This signal..."
90000130-78 = "You're quite right, Eimi. These readings are both familiar and alarming."
90000130-79 = "What readings?"
90000130-80 = "These readings indicate a signal we know well. This is unexpected."
90000130-81 = "I am still confused. Please elaborate on this signal."
90000130-82 = "This signal belongs to the one and only, Decagrammaton."
90000130-87 = "How is that possible? According to Eimi, its main body is deep underwater in the Ruined Submerged District."
90000130-88 = "And Eimi is correct. It's nearly impossible to fathom that decrepit vending machine managed to survive the explosion and subsequent underwater pressure."
90000130-89 = "And yet here we are. "
90000130-90 = "I've calculated the coordinates of the signal's origin, President."
90000130-91 = "That would lead us to...the Glacial Sea. As you can expect from its name, it is very cold there."
90000130-92 = "So cold that no civilization can survive there. Why would Decagrammaton be somewhere with no technology?"
90000130-93 = "Allow me. "
90000130-98 = "This may have escaped your notice, but a genius like me can't be tricked. This isn't Decagrammaton's signal. "
90000130-99 = "It's similar, but it appears to be...mimicking the frequencies."
90000130-100 = "Who would do that?"
90000130-101 = "Perhaps another prophet?"
90000130-102 = "Including Hod, the Super Phenomenon Task Force has discovered four prophets so far... There are six unaccounted for."
90000130-103 = "That does seem likely. We can't discount the possibility that it's a new enemy entirely, attempting to disguise itself as Decagrammaton."
90000130-104 = "We'll need to go to the site and investigate ourselves."
90000130-105 = "I may not know what it is, but I can assure you of one thing. Whatever it may be..."
90000130-110 = "..."
90000130-115 = "It's calling to us."
90000130-117 = "Next Episode;Glacial Sea 1"

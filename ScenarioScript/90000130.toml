90000130-17 = "1;토키 모드 1;99\n#1;greeting\n#wait;500"
90000130-18 = "#wait;2000"
90000130-19 = "1;토키 모드 1;02;확인했습니다. 긴급 소집 프로토콜은 문제가 없군요. "
90000130-20 = "[s] \"으, 으응……?\""
90000130-21 = "1;토키 모드 1;02;비상사태가 발생했을 때 선생님이 시간 내에 이곳에 도착할 수 있는가. 이것은 작전을 수행하는 데 있어서 매우 중요한 요소입니다. 선생님은 중요한 사람이니까요.\n#1;m3"
90000130-22 = "#st;[0,0];instant;1;"
90000130-23 = "#clearST"
90000130-24 = "#wait;2500"
90000130-25 = "[ns] \"……토키?\""
90000130-26 = "1;토키 모드 1;99;네. 아스마 토키입니다. 우리 사이에 통성명은 굳이 필요 없겠죠? 참고로 <우리 사이>라는 것은 매우 친밀한 관계라는 뜻입니다.\n#1;greeting"
90000130-27 = "1;토키 모드 1;01;선생님은 시간 내에 도착하셨고, 비상 호출 프로토콜은 아무 문제 없다는 것을 확인했습니다."
90000130-28 = "[s] \"어……. 으음…… 그러니까…….\""
90000130-29 = "1;토키 모드 1;01;네. 그렇습니다. 지금은 아무런 일도 벌어지지 않는, 평화로운 상태라는 뜻입니다. "
90000130-30 = "1;토키 모드 1;02;아니…… 오히려 문제가 있다면 그쪽일까요. C&C에서도 저를 찾지 않고, 게임개발부에서의 일도 일단락이 된 지금…… 저는 또 다시 무기한 대기 상태…… "
90000130-31 = "1;토키 모드 1;02\n3;토키 모드 1;02;즉, 매우 심심한 상태거든요.\n#1;hide\n#3;closeup"
90000130-32 = "#st;[0,0];instant;1;"
90000130-33 = "#clearST"
90000130-34 = "3;에이미;04\n#3;closeup\n#3;em;…\n#wait;2500"
90000130-35 = "[ns] \"요컨대, 심심해서 비상벨을 눌러봤다, 그런 말이지……?\""
90000130-36 = "3;에이미;04\n2;토키 모드 1;02\n4;에이미;04\n#2;h\n#4;h\n#2;a\n#4;a\n#3;hide"
90000130-37 = "2;토키 모드 1;02;피스. 피스.\n#2;em;[반짝]"
90000130-38 = "4;에이미;04;여기서 당당하게 브이를 외치면 안 돼. 민폐 캐릭터는 인기 없다고 생각해. 오히려 미움받을지도 몰라?"
90000130-39 = "2;토키 모드 1;02;그렇군요…… 주의하겠습니다. 캐릭터 강조는 어렵군요. 그러니까 놀아주십시오. 선생님. 심심합니다. "
90000130-40 = "4;에이미;04;내 말 듣고 있는 거 맞지? "
90000130-41 = "[s1] \"뭔가 캐릭터가 조금 바뀌지 않았어? 토키 씨……?\"\n[s2] \"엄청 성실한 느낌이 되어버렸구나, 에이미…….\""

90000130-77 = "3;히마리;01\n#3;em;…\n#wait;2500"
90000130-78 = "3;히마리;99;그러네요. 설마 지금 여기서 저 신호가 다시 나타나다니……."
90000130-79 = "3;토키 모드 1;02;신호?\n#3;em;[?]"
90000130-80 = "3;에이미;01;……. 응. 예전에 우리가 포착했던 신호였어. 이제는 두 번 다시 나타날 일이 없을 거라고 생각했는데……."
90000130-81 = "3;토키 모드 1;01;네? 무슨 의미죠? 저 신호가 뭐길래요?"
90000130-82 = "3;히마리;05;저것은 데카그라마톤의 신호예요."
90000130-83 = "#st;[0,0];instant;1;"
90000130-84 = "#clearST"
90000130-85 = "3;토키 모드 1;04\n#3;em;[?!]\n#3;stiff\n#wait;1500"
90000130-86 = "3;에이미;05\n#3;em;…\n#wait;2500"
90000130-87 = "3;토키 모드 1;04;데카그라마톤이라면…… 분명 그 본체는 폐허수몰지구의 수면 아래에 가라앉았다고……."
90000130-88 = "3;히마리;05;네. 그건 분명해요. 그의 허술한 자판기 육체는 그런 폭발과 수압을 견디지 못했을 테니까. 그는 살아있을 수 없어요."
90000130-89 = "3;히마리;01;……하지만. "
90000130-90 = "3;에이미;05;부장. 신호의 위치 확인했어. 여기는……."
90000130-91 = "3;토키 모드 1;04;이 좌표는…… 바다마저 얼어붙는 극한의 땅, <빙해 지역>이군요.\n#3;em;…"
90000130-92 = "3;토키 모드 1;06;자치구도 없는 버려진 땅일 텐데, 여기서 데카그라마톤이……?"
90000130-93 = "3;히마리;07;……확인해보죠. "
90000130-94 = "#st;[0,0];instant;1;"
90000130-95 = "#clearST"
90000130-96 = "3;히마리;S2_07\n#wait;2500"
90000130-97 = "3;히마리;S2_01\n#wait;2500"
90000130-98 = "3;히마리;S2_02;……역시. 이 신호가 데카그라마톤일 가능성은 낮아요. "
90000130-99 = "3;히마리;S2_02;얼핏 보면 그때와 비슷해 보이지만, 그 신호를 흉내 내고 있는 것에 불과하네요."
90000130-100 = "3;에이미;05;그렇다면……."
90000130-101 = "3;토키 모드 1;02;그러면 또 다른 예언자라는 얘기입니까?"
90000130-102 = "3;토키 모드 1;99;현재까지 특무부가 밝혀낸 예언자는 호드까지 넷…… 앞으로 여섯 개는 더 존재하고 있다고 볼 수도 있으니까요."
90000130-103 = "3;히마리;S2_02;그럴 수도요…… 또 다른 예언자일 수도 있고, 그게 아니면 데카그라마톤을 흉내 내는 새로운 적이 등장한 것일 수도 있고……."
90000130-104 = "3;히마리;S2_99;어느 쪽이든 직접 두 눈으로 확인하기 전까지는 아무것도 확신할 수 없어요."
90000130-105 = "3;히마리;S2_05;하지만 이것 하나만큼은 확실하네요. 저것이 무엇이든……."

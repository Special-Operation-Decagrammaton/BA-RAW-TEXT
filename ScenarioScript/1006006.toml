[translation]
1006006-1 = "溫泉與湯麵的關聯"
1006006-2 = "（在約好的時間來到了會合的地方）"
1006006-3 = "（是個距離鬧區有段距離的安靜區域）"
1006006-7 = "呀齁～！老師～！！這邊唷這邊！"
1006006-8 = "[s1]「惠～！」\n[s2]「你在這裡做什麼呢？」"
1006006-11 = "嗯？你問我在做什麼？"
1006006-12 = "就是～正在準備煮湯麵！"
1006006-13 = "特地跑來這裡煮的理由……？"
1006006-14 = "唔嗯……"
1006006-15 = "是為什麼呢……"
1006006-16 = "我煮湯麵的時候總是會跑到這種安靜的地方。"
1006006-17 = "既不會被別人打擾～也不會有人在旁邊吵吵鬧鬧的！"
1006006-18 = "啊，不過……"
1006006-19 = "硬要說的話……"
1006006-21 = "應該說是……可以專心看著湯麵咕嘟咕嘟煮著的樣子吧？"
1006006-22 = "……看著湯麵咕嘟咕嘟煮著很開心嗎？"
1006006-26 = "唔嗯～"
1006006-27 = "該怎麼說明才好呢……？"
1006006-28 = "[s3]「你喜歡看著麵煮好的樣子？」\n[s4]「想要專注在料理上？」"
1006006-31 = "唔嗯～好像也不是這樣。"
1006006-32 = "我的廚藝其實也不怎麼樣……所以才會吃袋裝麵。"
1006006-33 = "怎麼說呢……盯著鍋子裡看的時候……"
1006006-34 = "感覺裡面就像溫泉一樣……"
1006006-35 = "大概是這種感覺……老師不這麼覺得嗎？"
1006006-39 = "[ns5]「因為冒著陣陣白煙？」\n[ns6]「因為熱水在沸騰？」"
1006006-42 = "嗯～我也不知道！#n不過大概就是那種感覺吧？"
1006006-43 = "你想想看，老師。"
1006006-44 = "啊，我叫老師想想看好像有點奇怪……"
1006006-45 = "……算了，先不管這個了！"
1006006-46 = "老師回想一下煮湯麵的情景！"
1006006-47 = "將食材放進咕嘟咕嘟沸騰的湯裡，原本乾燥的配料就會漸漸變軟對吧？"
1006006-48 = "再加上搖曳而上的水氣……"
1006006-49 = "這不就是湯麵的溫泉嗎！"
1006006-50 = "只要看著那種場景，就會覺得很愉快呢～#n就跟悠閒地泡進溫泉裡放鬆身體一樣對吧？"
1006006-51 = "泡在溫泉裡的時間，我認為是世上最幸福的時間唷！"
1006006-52 = "……嗯？"
1006006-53 = "你問除了湯麵之外的有熱湯的料理？"
1006006-54 = "我當然也喜歡唷！#n不過我會煮的只有湯麵而已！"
1006006-55 = "而且湯麵在我想看到那副光景的時候馬上就能煮好！"
1006006-56 = "……所以我才會喜歡湯麵吧。#n不，所以我才會喜歡湯麵！"
1006006-57 = "[s7]「真是有趣的想法呢。」\n[s8]「這樣吃起來也會更快樂呢。」"
1006006-60 = "啊哈哈。我就覺得老師一定會理解我的～！"
1006006-61 = "那麼為了能理解我的老師，得趕快開始煮麵了呢。"
1006006-62 = "吶，老師！#n我們一起欣賞煮湯麵的情景吧！！"
1006006-67 = "過來這邊坐吧！我來幫你煮！"
1006006-73 = "（在那之後，兩人一起享用了惠煮的湯麵）"
1006006-78 = "（雖然只是市售的袋裝麵，不過在戶外一起吃的湯麵感覺格外美味）"
1006006-81 = "噗哈～！吃飽了！！"
1006006-82 = "老師呢？還吃得下的話，要不要再幫你煮一碗？"
1006006-83 = "啊，已經飽了？"
1006006-84 = "啊哈哈。"
1006006-85 = "我也吃得很飽！"
1006006-89 = "呼……這陣風真舒服呢……"
1006006-93 = "……啊。"
1006006-96 = "剩下的火腿浮起來了呢。#n軟綿綿的呢～軟綿綿！！"
1006006-97 = "[ns9]「就像在泡溫泉一樣呢。」\n[ns10]「悠閒地飄著呢。」"
1006006-101 = "啊哈哈哈哈！連老師也說那種很像我會說的話～！"
1006006-102 = "不過，確實……看著看著就想泡溫泉了呢。"
1006006-103 = "如果老師是這片火腿的話……"
1006006-104 = "我就美味地享用吧！！"
1006006-108 = "像這樣，啊呣！啊哈哈！！"
1006006-109 = "呼……嘻嘻。"
1006006-110 = "笑過頭，好像又有餓的感覺要冒出來了呢。"
1006006-111 = "那麼，趁著肚子還沒餓……"
1006006-116 = "嘿咻！"
1006006-117 = "……得去開發溫泉了呢！"
1006006-118 = "[ns11]「咦？在這種時間……！？」\n[ns12]「現在開始嗎！？」"
1006006-121 = "啊哈哈。當然囉！"
1006006-122 = "我是因為晚餐想吃湯麵才跑出來的，其實作業還沒結束呢。#n雖然也沒剩多少就是了。"
1006006-123 = "吃飽飯就挖溫泉！讓大家一起享受！#n好好放鬆一下～！"
1006006-124 = "這才是溫泉開發部！！"
1006006-125 = "那麼老師，謝謝你今天專程過來～！！#n下次再一起吃飯吧！！"
1006006-126 = "掰掰～♪"
1006006-135 = "[ns13]「連湯也很好喝呢。」\n[ns14]「感謝招待。」"
1006006-141 = "（收拾現場後回到了夏萊，因為吃的很飽的關係，一躺下就舒服地睡著了）"

[translation]
1006006-1 = "ความเกี่ยวข้องของราเม็งกับออนเซ็น"
1006006-2 = "(คุณครูออกมาหาเมกุตามนัด)"
1006006-3 = "(สถานที่ที่เมกุนัดเป็นที่เปลี่ยวที่อยู่ห่างจากตัวเมือง)"
1006006-7 = "ว้าวว! คุณครู~!! ตรงนี้! ตรงนี้~~!!"
1006006-8 = "[s1] \"เมกุ~!\"\n[s2] \"มาทำอะไรอยู่ในที่แบบนี้น่ะ?\""
1006006-11 = "หืม? ฉันมาทำอะไรอยู่น่ะเหรอ?"
1006006-12 = "ก็กำลังเตรียมต้มราเม็งอยู่ไง"
1006006-13 = "ทำไมถึงต้องมาต้มถึงที่นี่น่ะเหรอ?"
1006006-14 = "อืม..."
1006006-15 = "ไม่รู้สิ ฉันไม่เคยคิดหาเหตุผลให้ลึกซึ้งเท่าไรน่ะ"
1006006-16 = "ก็แค่ตอนต้มราเม็ง ฉันชอบมาต้มกินในที่เงียบๆ แบบนี้จนติดเป็นนิสัยน่ะ"
1006006-17 = "ไม่มีทั้งคนรบกวน~ ไม่มีคนแย่งกิน~ แล้วก็ไม่มีคนที่ส่งเสียงเอะอะโวยวาย~"
1006006-18 = "เอาเถอะ~ ถึงจะไม่รู้ว่าทำไมต้องที่นี่ แต่มันก็ให้อารมณ์แบบนั้นน่ะ!"
1006006-19 = "แต่ถ้าจะให้สรุป..."
1006006-21 = "ก็คงต้องบอกว่า 'ฉันชอบที่ได้มีสมาธิกับการดูราเม็งเดือด'"
1006006-22 = "...หืม? ทำไมต้องมีสมาธิกับการดูราเม็งเดือดเหรอ?"
1006006-26 = "เอ่อ..."
1006006-27 = "...นั่นสิ? เอ๊ะ... จะอธิบายยังไงดีนะ?"
1006006-28 = "[s3] \"ชอบบรรยากาศตอนกินราเม็งเหรอ?\"\n[s4] \"ชอบความรู้สึกตอนได้ทำอาหารเหรอ?\""
1006006-31 = "ไม่นะ ไม่ได้ชอบอะไรแบบนั้น"
1006006-32 = "ที่จริงฉันไม่รู้เรื่องการทำอาหารสักนิด ก็เลยมากินราเม็งสำเร็จรูปแบบนี้ไง!"
1006006-33 = "เพียงแต่ว่า... ฉันแค่คิดว่าเราต้องจ้องดูราเม็งที่กำลังเดือดน่ะ..."
1006006-34 = "เพราะตอนนั้น..."
1006006-35 = "มัน... ออกจะคล้ายๆ ออนเซ็นน่ะ...?"
1006006-39 = "[ns5] \"เหมือนออนเซ็นงั้นเหรอ? ราเม็งน่ะนะ?\"\n[ns6] \"เพราะน้ำมันเดือดเหรอ?\""
1006006-42 = "อืม ไม่รู้สิ! ก็อารมณ์นั้นแหละ"
1006006-43 = "แต่ลองคิดดูสิคุณครู "
1006006-44 = "อ๊ะ มันคงแปลกๆ ที่คนอย่างฉันจะสั่งให้คุณครูลอง 'คิด' อะไรดู..."
1006006-45 = "...แต่ก็เอาเถอะ!"
1006006-46 = "ลองนึกภาพตามนะคุณครู! ราเม็งกำลังต้มเดือดๆ!!"
1006006-47 = "เส้นราเม็งในน้ำเดือดปุดๆ ที่ตอนแรกยังแข็งอยู่ แต่ต้มไปสักพักก็นิ่มลง..."
1006006-48 = "แถมยังมีไอน้ำพุ่งขึ้นมาทีละนิด...!"
1006006-49 = "นี่มันบ่อออนเซ็นที่เต็มไปด้วยวัตถุดิบอาหารชัดๆ! ว่ามั้ย? ฉันพูดถูกใช่มั้ย?"
1006006-50 = "แค่ได้นั่งดูอยู่ก็รู้สึกสนุกขึ้นมาแล้ว~ ภาพของเส้นนุ่มนิ่มที่กำลังแช่ตัวอย่างสบายใจในน้ำร้อน!"
1006006-51 = "มันให้ความรู้สึกผ่อนคลายและสบายใจที่สุดในโลกเลย...!!"
1006006-52 = "...หืม?"
1006006-53 = "ถ้าคิดอย่างนั้น เวลาทำซุปหรือน้ำแกงอื่นๆ ก็คงให้อารมณ์เหมือนกันงั้นเหรอ?"
1006006-54 = "ใช่แล้ว! แบบนั้นฉันก็ชอบเหมือนกัน! แต่ตอนนี้ สิ่งที่ฉันทำได้คือต้มราเม็งเท่านั้น!!"
1006006-55 = "อีกอย่าง ถ้าฉันอยากเพลิดเพลินกับความรู้สึกนั้น ราเม็งก็เป็นอาหารที่ทำได้ทันทีด้วย! มันเห็นได้เร็วที่#nสุดน่ะ!"
1006006-56 = "ฉันก็เลยชอบราเม็งน่ะ! ...อื้ม! ใช่แล้ว! เพราะแบบนี้แหละถึงชอบ!!"
1006006-57 = "[s7] \"เป็นมุมมองที่แปลกใหม่ดีนะ\"\n[s8] \"เป็นความคิดที่น่าอร่อยดีนะ\""
1006006-60 = "ฮุฮุฮุ ว่าแล้วเชียวว่าคนฉลาดอย่างครูต้องเข้าใจฉัน!"
1006006-61 = "ถ้างั้นก็ เพื่อให้คุณครูได้เห็นภาพ~ ฉันคงต้องเริ่มต้มราเม็งเดี๋ยวนี้แล้ว!!"
1006006-62 = "รอเดี๋ยวนะคุณครู! เรามานั่งดูราเม็งเดือดด้วยกันนะ!!"
1006006-67 = "มานั่งตรงนี้เร็ว! ฉันจะต้มให้อร่อยๆ เลย!!"
1006006-73 = "(หลังจากนั้นคุณครูก็กินราเม็งที่เมกุต้มให้)"
1006006-78 = "(ถึงราเม็งจะเป็นอาหารสำเร็จรูปธรรมดา แต่บรรยากาศก็ทำให้อร่อยขึ้นมาเป็นกอง) "
1006006-81 = "งื้มม~!!! กินหมดแล้ว~~!!"
1006006-82 = "คุณครูล่ะ? ยังหิวอยู่หรือเปล่า? ฉันต้มราเม็งให้อีกเอามั้ย?"
1006006-83 = "อ๊ะ ไม่ต้องต้มเพิ่มให้ก็ได้งั้นเหรอ?"
1006006-84 = "ดีแล้วละนะ!"
1006006-85 = "วันนี้หม้อที่เตรียมมาก็ขนาดพอดิบพอดีเลยด้วย!"
1006006-89 = "งื้มม... ชอบแบบนี้จัง..."
1006006-93 = "...อ๊ะ"
1006006-96 = "ยังมีแฮมเหลืออยู่ในน้ำซุปด้วย ลอยกระเพื่อมเลย ดึ๋งๆๆ!!"
1006006-97 = "[ns9] \"แฮมกระเพื่อมดึ๋งๆ เลยเนอะ\"\n[ns10] \"ดูชิลดีจังเลยนะ~\""
1006006-101 = "อ่ะฮ่ะฮ่ะฮ่า!! อะไรเนี่ย? คุณครูพูดอะไรแปลกๆ ออกมาด้วย! อย่าบอกนะว่าอิจฉาแฮมน่ะ?"
1006006-102 = "ก็นะ การได้แช่ตัวในบ่อออนเซ็นอุ่นๆ แบบนี้มันก็ดีอยู่หรอก..."
1006006-103 = "แต่ถ้าคุณครูกลายเป็นแฮมไปละก็ ฉันก็..."
1006006-104 = "จะทานคุณครูให้อร่อยเลยค่า~!!"
1006006-108 = "...ฮิฮิฮิ แล้วก็ซดน้ำดังซู้ดดด~~ ด้วย! อุ๊ย หลุดปากไป ฮ่ะฮ่ะฮ่ะฮ่า!!"
1006006-109 = "ฮู่ว..."
1006006-110 = "ฮิฮิ หัวเราะมากเดี๋ยวหิวอีกทำไงเนี่ย"
1006006-111 = "เอาละ ไหนๆ ก็อิ่มท้องแล้ว..."
1006006-116 = "ฮึบ!!"
1006006-117 = "...งั้นไปขุดออนเซ็นต่อดีกว่า!"
1006006-118 = "[ns11] \"หา!? เวลานี้เนี่ยนะ...!?\"\n[ns12] \"จะออกไปตอนนี้เลยเหรอ!?\""
1006006-121 = "ฮุฮุ ก็ใช่น่ะสิ!"
1006006-122 = "ฉันออกมาตอนเย็นก็เพราะอยากนั่งดูราเม็งเดือดก็จริง แต่เหตุผลที่ใหญ่กว่าคือเรื่องงานที่ยังไม่เสร็จน่ะ"
1006006-123 = "ไปขุดออนเซ็นต่อดีกว่า! ทุกคนจะได้กระโดดจ๋อม~ ลงไปแช่ตัวสบายๆ ในน้ำอุ่นๆ ได้ยังไงล่ะ"
1006006-124 = "นี่แหละหน้าที่ของชมรมพัฒนาออนเซ็น!!"
1006006-125 = "งั้นวันนี้ก็ขอบคุณมากที่มานะคุณครู!! ไว้คราวหน้ามากินด้วยกันอีกนะ!!"
1006006-126 = "ไปก่อนล่ะ!!!"
1006006-135 = "[ns13] \"...เมกุต้มได้อร่อยจริงๆ เลยนะ\"\n[ns14] ซดน้ำซุปที่เหลือจนหมด"
1006006-141 = "(หลังจากเก็บข้าวของเสร็จ คุณครูก็กลับมายังชาเล่ต์และนอนหลับไปบนโซฟา)"

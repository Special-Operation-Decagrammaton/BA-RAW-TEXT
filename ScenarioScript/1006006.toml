[translation]
1006006-1 = "Ramen and Hot Springs"
1006006-2 = "I went to meet up with Megu at the time and place she specified."
1006006-3 = "It was a quiet spot, far from the main streets."
1006006-7 = "Hey, hey! Sensei!! Over here!"
1006006-8 = "[s1] \"Megu! There you are!\"\n[s2] \"What are you doing all the way out here?\""
1006006-11 = "Huh? What do you mean?"
1006006-12 = "I'm just about to make some ramen."
1006006-13 = "Oh, you wanna know why I came here specifically?"
1006006-14 = "Er..."
1006006-15 = "I...haven't really thought about it."
1006006-16 = "I guess I just always find somewhere out of the way to go make ramen."
1006006-17 = "It's nice... There's no one here to interrupt me, or try to steal a bite, or to start chattering away..."
1006006-18 = "Or, y'know, something like that!"
1006006-19 = "Basically... I think..."
1006006-21 = "I'd say it's just nice to be able to focus on watching the ramen boil."
1006006-22 = "...Oh, you still don't get it? Hm... How do I explain focusing on the ramen..."
1006006-26 = "Um..."
1006006-27 = "...I dunno what to say..."
1006006-28 = "[s3] \"Do you like the feeling of eating ramen?\"\n[s4] \"Do you like the feeling of cooking ramen?\""
1006006-31 = "No, um, not quite..."
1006006-32 = "I mean, I'm eating instant ramen because I don't actually know how to cook."
1006006-33 = "It's just... When I'm watching a pot of ramen boil..."
1006006-34 = "When I really look at it..."
1006006-35 = "It looks a bit...like a hot spring."
1006006-39 = "[ns5] \"How is ramen like a hot spring?\"\n[ns6] \"Because the water's boiling?\""
1006006-42 = "Hm, I'm not quite sure what it is! But..."
1006006-43 = "Well, think about it, Sensei."
1006006-44 = "Oh, is it a little backwards for me to say that to you...?"
1006006-45 = "...Anyways!"
1006006-46 = "Imagine, Sensei! Picture a boiling pot of ramen!"
1006006-47 = "The noodles are stiff and fragile at first, but they gradually stretch out in the bubbling water."
1006006-48 = "Plus, there's the warmth and the rising steam."
1006006-49 = "So it's basically like a hot spring for noodles! Right? Aren't I right?"
1006006-50 = "And then, adding in veggies or other ingredients, and watching them disperse and relax in the hot bath... It just makes me happy to look at!"
1006006-51 = "It's the best, most restful feeling in the whole world!"
1006006-52 = "Oh..."
1006006-53 = "You're right, you're right! It is the same for other soups!"
1006006-54 = "I like those too for sure! But the only thing I know how to make is ramen."
1006006-55 = "And whenever I want to see it, I can make it right away! I don't have to wait!"
1006006-56 = "So that's why I like it! Yeah, that's it! I think that's right."
1006006-57 = "[s7] \"That's an unusual point of view!\"\n[s8] \"It must make your ramen even better.\""
1006006-60 = "Heehee! I knew you'd get it, Sensei! You're so smart."
1006006-61 = "Anyway! Enough talk. Let me start the ramen for you!"
1006006-62 = "Just wait a minute, Sensei! We can watch it together."
1006006-67 = "Go ahead and sit! I'll make sure it's delicious."
1006006-73 = "Afterwards, we shared Megu's ramen."
1006006-78 = "While the brand of instant ramen was nothing special, it was delicious, maybe because we watched it boil."
1006006-81 = "Wow! I'm so full!"
1006006-82 = "What about you, Sensei? Are you still hungry? I can make more if you want!"
1006006-83 = "Oh, you sure? I don't mind making more!"
1006006-84 = "Okay! That's good."
1006006-85 = "I guess I made the perfect amount!"
1006006-89 = "Heh... This is nice."
1006006-93 = "Ah!"
1006006-96 = "Look, the ham's still floating in the soup. Look at it go round and round and round and round!"
1006006-97 = "[ns9] \"I envy the ham.\"\n[ns10] \"Must be nice to be so relaxed...\""
1006006-101 = "Hahahaha! Sensei, you're saying weird stuff. You're jealous of ham?"
1006006-102 = "Of course, it does sound nice... Soaking in a warm hot spring..."
1006006-103 = "Haha, but if you were ham, I'd say..."
1006006-104 = "Can't wait to dig into Sensei!"
1006006-108 = "... And I'd eat up! Hahaha!"
1006006-109 = "Whew."
1006006-110 = "Heehee. Don't make me laugh any more! I'll get hungry again!"
1006006-111 = "Okay, now that we've eaten..."
1006006-116 = "Hup!"
1006006-117 = "Time to get back to hot springs construction!"
1006006-118 = "[ns11] \"Huh?! At this hour...!?\"\n[ns12] \"You're leaving right now!?\""
1006006-121 = "Heehee. Of course!"
1006006-122 = "I came out here to check out some ramen as a break. I'm in the middle of a lot of work!"
1006006-123 = "I've got a very important hot spring to dig! Don't you think everyone should get to stretch out and soak in some hot water, just like those noodles?"
1006006-124 = "That's the mission of the Hot Springs Department!"
1006006-125 = "Thanks for coming, Sensei! Let's eat together again soon!"
1006006-126 = "I'm heading out!"
1006006-135 = "[ns13] \"...She really did make some great ramen.\"\n[ns14] I finished up the leftover soup."
1006006-141 = "I cleaned up afterwards, and went back to Schale, where I fell asleep on the couch."

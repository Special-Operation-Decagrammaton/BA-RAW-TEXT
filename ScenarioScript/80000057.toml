[translation]
80000057-1 = "ภาพที่คุ้นเคย"
80000057-2 = "(กลางดึก คุณครูมีงานที่ต้องทำให้เสร็จ เลยแวะไปที่ห้องพักผ่อนครู่หนึ่ง)"
80000057-8 = "[ns1] \"....?\"\n[ns2] เปิดไฟและตรวจดู"
80000057-15 = "(พอเปิดไฟ คุณครูก็พบอะไรบางอย่างตกอยู่ที่ปลายเท้า)"
80000057-25 = "[ns] \"...\""
80000057-27 = "[ns3] \"เซรินะ...\"\n[ns4] \"ไม่ต้องซ่อนก็ได้นะ\""
80000057-30 = "อ่ะฮะฮะฮะ... สวัสดีค่ะ คุณครู..."
80000057-31 = "ฉันแค่อยากเอามาไว้ให้คุณครูทานตอนพัก... แค่กะจะมาวางไว้แล้วก็กลับเลยค่ะ"
80000057-32 = "ขะ...ของหวานช่วยให้สมองแล่นดีนะคะ เป็นตัวช่วยที่ดีในเวลาที่ต้องทำงานหนักแบบนี้ค่ะ...!"
80000057-33 = "นะ...แน่นอนว่าเพราะวันนี้เป็นวันวาเลนไทน์...ด้วยค่ะ"
80000057-34 = "ทะ...ที่จริงก็เพราะเรื่องนั้นแหละค่ะ ค่ะ... อ่ะฮะฮะ..."
80000057-35 = "ฉันรบกวนคุณครู...รึเปล่าคะ? ถ้าฉันรบกวนคุณครูละก็ขอโทษด้วยค่ะ"
80000057-36 = "คะ...?"
80000057-37 = "ไม่รบกวนงั้นเหรอคะ ให้ฉันนั่งตรงนี้ก่อนเหรอคะ? มะ...มีอะไรเหรอคะ?"
80000057-38 = "ไหนๆ ก็มาแล้ว จะให้ดื่มอะไรก่อนแล้วค่อยกลับงั้นเหรอคะ...?"
80000057-39 = "คะ... คุณครู...? คือว่า... วันนี้ดูผ่อนคลายกว่าทุกทีเลยนะคะ...?"
80000057-40 = "[s5] \"คงเพราะครูชินแล้วละมั้ง\"\n[s6] \"ครูไม่ต้องระวังเซรินะนี่นา\""
80000057-41 = "ยะ... อย่างนั้นเหรอคะ ขอบคุณที่คุณครูเข้าใจฉันนะคะ แต่ว่าแบบนี้มัน..."
80000057-42 = "ยะ... อย่างนั้นเหรอคะ ขอบคุณที่คุณครูเข้าใจฉันนะคะ แต่ว่าแบบนี้มัน..."
80000057-44 = "อ๊ะ... ทานช็อกโกแลตนั่นเลยเหรอคะ"
80000057-45 = "คะ? อ๊ะ อยากได้ของหวานพอดีงั้นเหรอคะ...? ใช่แล้วค่ะ... ฉันตั้งใจเลือกของที่ช่วยบำรุงสุขภาพคุณครู#nมาเลยนะคะ"
80000057-46 = "ท่าทางจะถูกปากคุณครูด้วย โชคดีจังเลยนะคะ!"
80000057-50 = "ถะ...ถ้างั้นฉันขอตัวก่อนนะคะ... ไว้คราวหน้า ถ้าต้องการอะไรล่ะก็..."
80000057-51 = "[s] \"เซรินะ\""
80000057-52 = "คะ...?! มีอะไรเหรอคะ คุณครู?"
80000057-53 = "[s7] \"ตอนเดินกลับก็กลับออกไปทางประตูหน้าก็ได้นะ\"\n[s8] \"ขอบคุณนะ ครูจะกินให้อร่อยเลย\""
80000057-54 = "..."
80000057-55 = "..."
80000057-56 = "ฮิฮิ ฮิฮิฮิ..."
80000057-57 = "ค่ะ คุณครู คุณครูก็อย่าหักโหมมากนะคะ"
80000057-60 = "ไว้พบกันนะคะ"

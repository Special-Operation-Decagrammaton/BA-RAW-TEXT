[translation]
80000057-1 = "逐漸熟悉"
80000057-2 = "（深夜時分，在工作的途中因為有事而前往了休息室）"
80000057-8 = "[ns1]「……？」\n[ns2] 開燈確認"
80000057-15 = "（發現了掉在腳邊的某個東西）"
80000057-25 = "[ns]「……」"
80000057-27 = "[ns3]「芹奈。」\n[ns4]「不用躲起來沒關係唷。」"
80000057-30 = "那，那個……晚安，老師。"
80000057-31 = "為了讓老師在休息的時候可以吃，我本來打算偷偷放好就回去的……"
80000057-32 = "糖，糖分對工作有所幫助！為了忙碌的老師著想，那個……"
80000057-33 = "當然今天是情人節也是原因之一……"
80000057-34 = "……抱歉，後者才是我的真心話。嗯……"
80000057-35 = "真，真是抱歉……"
80000057-36 = "……嗯？"
80000057-37 = "咦，總之先坐下……？好，好的。"
80000057-38 = "飲，飲料是嗎？那個，我喝什麼都可以……"
80000057-39 = "老，老師好像習慣了呢……？即使我出現在這裡也不覺得奇怪了……？"
80000057-40 = "[s5]「差不多也習慣了……」\n[s6]「因為我知道芹奈是為我著想。」"
80000057-41 = "是，是嗎……"
80000057-42 = "是，是嗎……"
80000057-44 = "啊，那個巧克力……好，好的。請用。"
80000057-45 = "老師還在工作中呢。來，是富含糖分、營養滿滿的巧克力哦。"
80000057-46 = "好吃嗎？那真是太好了！"
80000057-50 = "那，那我就離開了……有需要的話會再來的哦？"
80000057-51 = "[s]「芹奈。」"
80000057-52 = "是，是！"
80000057-53 = "[s7]「普通地從正門進來就可以了唷。」\n[s8]「一直以來謝謝你囉。還有巧克力，我很開心。」"
80000057-54 = "……"
80000057-55 = "……"
80000057-56 = "……呵呵。"
80000057-57 = "……嗯。老師也別太勉強自己哦？"
80000057-60 = "……那麼下次見。"

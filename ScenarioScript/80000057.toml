[translation]
80000057-1 = "A Friendly Sight"
80000057-2 = "I stopped by the lounge while working late at night."
80000057-8 = "[ns1] \"Who's there?\"\n[ns2] Turn on the light."
80000057-15 = "I turned on the light and saw someone hiding."
80000057-25 = "[ns] \"...\""
80000057-27 = "[ns3] \"Come on out, Serina.\"\n[ns4] \"I know it's you. There's no point in hiding.\""
80000057-30 = "A-Ahaha... Hi there, Sensei!"
80000057-31 = "I heard you were really busy, so I wanted to leave this for you."
80000057-32 = "I-It's good for keeping your brain going! You know, since you're working late at night."
80000057-33 = "W-Well...and also because it's Valentine's Day."
80000057-34 = "That may be the real reason... Heehee."
80000057-35 = "S-Sorry! I'm probably bothering you, dropping by late at night."
80000057-36 = "Huh?"
80000057-37 = "You're happy I brought you chocolate? And you want me to sit down?"
80000057-38 = "N-No, that's okay! You don't have to get me anything to drink!"
80000057-39 = "Sensei... You're more relaxed than usual today."
80000057-40 = "[s5] \"I'm getting more comfortable with you.\"\n[s6] \"Because we've gotten closer, Serina.\""
80000057-41 = "I-I see. I'm happy you feel that way."
80000057-42 = "I-I see. I'm happy you feel that way."
80000057-44 = "Oh, you're already eating the chocolate! Heehee."
80000057-45 = "You needed the sugar? I'm glad I could help! Of course I got you something a little healthier than normal chocolates."
80000057-46 = "I'm so happy you like it."
80000057-50 = "I'll see you later, then. Please call if you need anything!"
80000057-51 = "[s] \"Serina.\""
80000057-52 = "Y-Yes?! Wh-What is it, Sensei?"
80000057-53 = "[s7] \"You can just use the front entrance on your way out.\"\n[s8] \"Please don't climb through the window again.\""
80000057-54 = "..."
80000057-55 = "..."
80000057-56 = "H-Heehee...hee."
80000057-57 = "Thanks, Sensei. Take care of yourself."
80000057-60 = "Until next time!"

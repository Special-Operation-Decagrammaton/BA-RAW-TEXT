34070-42 = "...Sensei."
34070-43 = "...Sensei."
34070-44 = "Hime... They took Atsuko."
34070-45 = "And then they attacked us... I was separated in the fight... I don't know what happened to them."
34070-46 = "I've been running from Arius...for days on end..."
34070-47 = "I was utterly useless."
34070-48 = "Please... Atsuko... Atsuko is going to die!"
34070-49 = "Tomorrow at sunrise, she'll execute Atsuko!"
34070-50 = "I have no right to ask you to believe me...but I beg of you..."
34070-52 = "Atsuko was raised for the express purpose of this moment..."
34070-53 = "I don't know the details, but it was her fate to die since she was born."
34070-54 = "That woman... She said..."
34070-55 = "I could change Hime's fate...if I just faithfully carried out her orders."
34070-56 = "She said I could...save not only Hime...but the others too."
34070-57 = "She made me a promise. If I stole the Eden Treaty and granted Arius the power of the Saint Justina Council... If I could seize the Trinity and Gehenna districts..."
34070-58 = "Atsuko wouldn't have to die."
34070-59 = "In the end..."
34070-61 = "I failed."
34070-62 = "I failed the Arius Squad."
34070-63 = "We failed to steal the Eden Treaty."
34070-64 = "We couldn't conquer the Trinity and Gehenna districts."
34070-65 = "We couldn't save our colleagues."
34070-66 = "I couldn't protect Atsuko! Damn it!"
34070-67 = "I was useless. I failed."
34070-68 = "There's no one I can turn to for help. Trinity, Gehenna, and even Arius are out for my blood."
34070-69 = "I don't know who else to ask... [USERNAME] Sensei... No one else can save her."
34070-70 = "Please..."
34070-71 = "I'll do anything. I still have a bomb that destroys halos. I'm putting my life in your hands."
34070-72 = "You can use this to kill me."
34070-73 = "If you even so much as suspect me, you can kill me."
34070-74 = "..."
34070-75 = "Please...help Atsuko..."
34070-76 = "I beg of you..."
34070-80 = "Murderer! Bring out the murderer! It's all her fault!"
34070-81 = "Because you made contact with Arius..."
34070-82 = "Squad...went after Sensei...and..."
34070-83 = "This is all because you brought Sensei here!"
34070-84 = "It's...my fault?  "
34070-85 = "It's all because of me..."
34070-86 = "Seia got hurt...because I'm a stupid person. Because I've done unforgivable things."
34070-87 = "For a fleeting moment... I thought I could have a second chance...to make amends."
34070-88 = "Even if it was for the hearing, I wanted to see everyone... Nagi, Seia, and Sensei..."
34070-89 = "Why... Why is everything so messed up?"
34070-90 = "..."
34070-91 = "I was living a fool's dream when I thought I could have a second chance.  "
34070-92 = "Truly a fool... Arius...the Arius Squad...and Joumae Saori lied to me...and I got taken advantage of..."
34070-93 = "And, in the end, I hurt my precious people."
34070-94 = "Drag the witch out!  "
34070-95 = "..."
34070-96 = "Make the Justice Task Force go in there and get her!"
34070-100 = "I see. I understand now..."
34070-108 = "..."
34070-109 = "I didn't see it until now. Huh."
34070-110 = "...Joumae Saori of the Arius Squad."
34070-114 = "It's all her fault, isn't it?"
34070-115 = "She lied to me and tried to kill Seia. She fired missiles at Nagi and hurt Sensei..."
34070-116 = "Everything, everything, everything...was her machinations."
34070-117 = "I understand it all perfectly, now. I know what I need to do."
34070-118 = "I have to hold Joumae Saori accountable for what she's done.  "
34070-119 = "It's only fair."
34070-120 = "I want her to feel all of my pain."
34070-121 = "I'll take all that's precious to her. Until she's left with nothing."
34070-127 = "Don't try to stop me! Come out, Misono Mika!"
34070-128 = "Please! This isn't the right time!"
34070-135 = "EEEEEK!"

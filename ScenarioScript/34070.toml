[translation]
34070-1 = "Episode 7; Choices and Decisions"
34070-3 = "H-How is she?!"
34070-4 = "Not good. She keeps convulsing and coughing up blood."
34070-5 = "Someone contact the Remedial Knights immediately! Or the Sisterhood! Just get someone here!"
34070-6 = "What about Nagisa?!"
34070-7 = "She's received the news and is en route to the hospital! I've been contacting others too, but..."
34070-8 = "Have you gotten in contact with Schale?!"
34070-9 = "I can't get a hold of them! It's strange... C-Could something have happened to Sensei?!"
34070-10 = "Don't say that! Just keep trying!"
34070-11 = "Who's responsible for this? It must be that witch!"
34070-15 = "Wait! Based on the testimony, Mika couldn't have done anything!"
34070-16 = "No! This happened after she went in the room! She's at fault!"
34070-21 = "Stop! There's no point of this... Gah!"
34070-22 = "Murderer! You're a murderer!"
34070-27 = "Get out here!"
34070-30 = "[ns] \"Saori...?\""
34070-31 = "..."
34070-40 = "..."

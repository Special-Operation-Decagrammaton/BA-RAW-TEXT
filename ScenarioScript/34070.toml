[translation]
34070-1 = "第7話;選択と決断"
34070-3 = "セ、セイア様のご容態は……！？"
34070-4 = "ダメです、痙攣と血が止まらなくて……。"
34070-5 = "至急、救護騎士団に連絡を……！！シスターフッドでもどこでも構わないから、早く対処法の確認を……！"
34070-6 = "ナギサ様は？"
34070-7 = "今、病院に移動中です！他の方々にも連絡を取っていますが……。"
34070-8 = "「シャーレ」は？"
34070-9 = "さっきから連絡が取れません！……ま、まさか先生にも何か起きたのでは……！？"
34070-10 = "不吉なこと言わないで、連絡を続けて！"
34070-11 = "犯人は！聖園ミカですか！？あの魔女が！！"
34070-15 = "待ってください！ミカ様は何も……。"
34070-16 = "彼女がセイア様の部屋を訪ねたからこんなことが起こったのではありませんか？あの女が何かをしたに決まっています！"
34070-21 = "やめなさい！今ここで争ったって……！？"
34070-22 = "人殺し！この魔女め！！"
34070-27 = "出てきなさい！！"
34070-30 = "[ns] \"サオリ……？\""
34070-31 = "……。"
34070-40 = "……。"
34070-41 = "[s1] \"…………！？\"\n[s2] \"…………。\""
34070-42 = "……先生。"
34070-43 = "……先生。"
34070-44 = "アツコが……連れて行かれた。"
34070-45 = "他の仲間もアリウスの襲撃に遭って、散り散りに……生死も不明だ……。"
34070-46 = "あれから何日も……逃げてきたが……。"
34070-47 = "私では彼女を止められなかった……。"
34070-48 = "このままでは……アツコは……姫は、死んでしまう……。"
34070-49 = "明日の朝……夜明けと共に「彼女」に殺されてしまう……。"
34070-50 = "私の話など、信じられないだろうが……これだけは、真実だ……。"
34070-52 = "アツコは、元よりそのように育てられた存在なんだ……。"
34070-53 = "幼い頃からそうやって「生贄」にされる運命にあったのだと……。"
34070-54 = "「彼女」は……。"
34070-55 = "姫の運命を変えたいなら、彼女の命令に従えと……。"
34070-56 = "そうすれば、姫だけでなく……他の仲間も助けてやると。"
34070-57 = "エデン条約を強奪し、ユスティナ聖徒会の力をアリウスのものとし――トリニティとゲヘナを手中に収めたら……。"
34070-58 = "アツコが「生贄」にならずとも済む、と……。"
34070-59 = "だが……。"
34070-61 = "私は失敗した……。"
34070-62 = "アリウススクワッドは……任務を遂行できなかった。"
34070-63 = "エデン条約の強奪に失敗した上、"
34070-64 = "トリニティとゲヘナ自治区の征服も、"
34070-65 = "仲間を助けることも、"
34070-66 = "アツコを守ることさえも、"
34070-67 = "全て……私の力が及ばず、叶わなかった。"
34070-68 = "……今の私は落伍者だ。トリニティにも、ゲヘナにも――同じアリウスにだって助けを求めることなどできない。"
34070-69 = "だから、頼れるのはもう、[USERNAME]先生しか……。"
34070-70 = "頼む……。"
34070-71 = "……私の命を賭けて約束する、どんな指示だろうと従う。"
34070-72 = "……「ヘイローを破壊する爆弾」、これも、預ける。私の命を握ってもらって構わない。"
34070-73 = "私を信用できないと判断したら、それを使ってくれ……だから、頼む。"
34070-74 = "……。"
34070-75 = "どうか……アツコを……。"
34070-76 = "姫を……助けてくれ……。"
34070-80 = "出てきなさい！！聖園ミカ！この極悪人！全部あなたのせいよ！"
34070-81 = "君が、アリウスに接触したことによって……。"
34070-82 = "先生が……スクワッドに狙われている……。"
34070-83 = "君が、先生を連れてきたから……！"
34070-84 = "私のせいで……こうなっちゃったんだね……。"
34070-85 = "……私のせい。"
34070-86 = "私がバカだから、セイアちゃんが……私は全然、許されてなんかいなかったんだ……。"
34070-87 = "……もしかしたら挽回できるチャンスがあるかもしれないって、思ってた。"
34070-88 = "きっと今夜を過ぎたら……明日の朝にはナギちゃんとセイアちゃんと、先生と一緒に……みんなで、いっしょに……。"
34070-89 = "そのはずだったのに……どうしてこんな……。"
34070-90 = "……。"
34070-91 = "……挽回のチャンスだなんて、そんなおとぎ話みたいなもの、あるはずがないのに……バカみたい。そんなものを信じたりなんかしたから……。"
34070-92 = "私がバカだから、アリウスに……「アリウススクワッド」に……サオリに利用されるばっかりで……。"
34070-93 = "そのせいで……大切な人たちを傷つけて、怪我をさせてしまって……これじゃあまるで……。"
34070-94 = "魔女め！！"
34070-95 = "……。"
34070-96 = "やめろ！誰か、早く正義実現委員会を連れてきてくれ！"
34070-100 = "……そうだね。そういうことだったんだ……。"
34070-108 = "……。"
34070-109 = "……なんだ、考えてみたら簡単なことじゃん。"
34070-110 = "……「アリウススクワッド」の[ruby=じょうまえ]錠前[/ruby]サオリ……すべては……。"
34070-114 = "あの女が元凶なんだから。"
34070-115 = "あの女が私を利用して――セイアちゃんのヘイローを壊そうとして、ナギちゃんにミサイルを飛ばして、先生を傷つけて……。"
34070-116 = "全部……ぜんぶ、ぜんぶ、ぜーんぶ！あの子が計画したことだった。"
34070-117 = "……そうだね。こんな結末になるくらいなら……私、何をすればいいのかわかったよ。"
34070-118 = "私の大切な人たちがこんな目に遭っているのに、[ruby=じょうまえ]錠前[/ruby]サオリだけ安穏と過ごしてるなんておかしくない？"
34070-119 = "うん、そう。そうだよ――あの女も……。"
34070-120 = "私が奪われた分だけ、同じように奪われなきゃ不公平でしょ。"
34070-121 = "あの女の大切な人も、同じように……全部。"
34070-127 = "離せ！出てこい[ruby=みその]聖園[/ruby]ミカ！！"
34070-128 = "ここで騒ぎ立てるな！今状況を……"
34070-135 = "ぐあっ！？"
34070-136 = "な、なんだ……！？壁が……壊れた！？"
34070-138 = "ごめんね～★"
34070-139 = "えーっと……私の銃、どこだっけ···……。"
34070-140 = "あっちだっけ？さてさて、行くとしよっか。"
34070-144 = "か、壁を……素手で……？"
34070-145 = "……み、聖園ミカ……聖園ミカが……。"
34070-146 = "聖園ミカが脱獄した！！"
34070-152 = "……。"
34070-153 = "[s] \"立って、サオリ。\""
34070-154 = "だ、だが……。"
34070-155 = "[s] \"私はサオリと、対等に話がしたい。\""
34070-156 = "……。"
34070-158 = "……。"
34070-159 = "[s] \"先に質問させて。「彼女」って誰の事？\""
34070-160 = "「彼女」はアリウス自治区の代表であり、アリウス分校の主人。私たちは「彼女」と呼んでいるが、他の生徒からは「マダム」とも呼ばれている。"
34070-161 = "私も数回しか姿を見たことはない……背が高く、赤い肌を持ち、白いドレスを纏った大人だ。"
34070-162 = "名をベアトリーチェ……私よりも、姫がよく彼女と会っていた。"
34070-163 = "[s] \"……他の「スクワッド」は今どうしてるの？\""
34070-164 = "……姫を連れ去られてから、すぐに襲撃を受けて……その時に散り散りになったから消息は分からない。"
34070-165 = "もしかしたら、まだアリウスの生徒に追われているかもしれないな。"
34070-166 = "[s] \"連れ去られたアツコがどこにいるかは分かる？\""
34070-167 = "アリウス自治区にある――アリウス・バシリカ。その地下に「彼女」が用意した秘密の至聖所がある。おそらくそこだろう。"
34070-168 = "[s] \"アリウス・バシリカ……どうしてそこにアツコを……？\""
34070-169 = "そこまでは分からない。あそこも、以前から姫のために準備された場所としか……。"
34070-170 = "ただ、姫は以前から、いつかそこで「生贄」に捧げられるのだと口にしていた……。"
34070-171 = "「彼女」は……明日の夜明けと共に儀式を行うそうだ……"
34070-172 = "……姫に残された時間は、もうないかもしれない。"
34070-173 = "[s] \"……わかった。状況は大体把握したよ。\""
34070-175 = "[ns3] サオリに手を貸す。\n[ns4] サオリの願いを汲む。\n[ns5] サオリを助ける。"
34070-176 = "……。"
34070-177 = "……。"
34070-178 = "……。"
34070-179 = "……本当、に？"
34070-180 = "手を貸して、くれるのか……？"
34070-181 = "[s] \"生徒のお願いは無碍にできないからね。\""
34070-182 = "……それだけの理由で？……そんな。"
34070-183 = "わ、忘れたのか？私は、お前を撃ったんだぞ！"
34070-184 = "お前の命を奪おうとしたのに、どうしてそんな簡単に……理解できない……どうして……。"
34070-185 = "[s] \"でも、爆弾は没収。\""
34070-186 = "……ああ、そうだな。約束通り。"
34070-192 = "これが起爆装置だ。いつでもこれを押すといい。"
34070-193 = "[s] \"……起爆装置だけじゃなくて、全部。爆弾全部没収。\""
34070-194 = "ば、爆弾も……？"
34070-195 = "……分かった。お前がそう言うのなら……。"
34070-199 = "[ns] 爆弾を受け取る。"
34070-200 = "だが、安心していい。この起爆装置なしでは、それは絶対に爆発しない。"
34070-201 = "[s6] \"それはよかった。\"\n[s7] \"生徒が危険物を持っているのを、見過ごすわけにはいかないからね。\""
34070-202 = "……？"
34070-203 = "……？"
34070-204 = "[ns] 起爆装置を壊す。"
34070-207 = "な、何を……！？"
34070-208 = "[ns] 壊した起爆装置の破片をゴミ箱に投げ入れる。"
34070-211 = "……。"
34070-212 = "[s8] \"さあ、時間はないよ。急ごう。\"\n[s9] \"先にミサキとヒヨリと合流するよ。\""
34070-213 = "一体、何を……。"
34070-214 = "一体、何を……。"
34070-215 = "[s] 出発する。"
34070-216 = "ちょ、ちょっと待ってくれ先生。私はまだ理由を聞いていない……。"
34070-218 = "ま、待ってくれ……！！"
34070-226 = "次回;「アリウススクワッド」"

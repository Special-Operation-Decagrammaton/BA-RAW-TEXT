34070-57 = "ผู้หญิงคนนั้นบอกว่าหากอาเรียสได้อำนาจของสาวกยูสตาร์... ด้วยการปล้นสนธิสัญญาเอเดน... แล้วได้เขตปกครองตนเองทรีนิตี้และเกเฮนน่าไว้ในกำมือละก็..."

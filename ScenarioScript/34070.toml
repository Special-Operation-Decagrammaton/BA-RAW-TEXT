[translation]
34070-1 = "第7話;選擇與決定"
34070-3 = "聖，聖亞大人的情況怎麼樣……！？"
34070-4 = "不行，痙攣跟出血都止不住……"
34070-5 = "立刻聯絡救護騎士團……！！修女會或其他地方也可以，趕快確認該怎麼處理……！"
34070-6 = "渚大人呢？"
34070-7 = "現在正往醫院來！其他人也連絡上了……"
34070-8 = "「夏萊」呢？"
34070-9 = "從剛剛開始就連絡不上了！……難，難道老師出了什麼事嗎……！？"
34070-10 = "別說那種不吉利的話，趕快繼續聯絡！"
34070-11 = "犯人是誰！是聖園彌香嗎！？那個魔女！"
34070-15 = "請等一下！彌香大人什麼都沒……"
34070-16 = "他一進到聖亞大人的房間裡就發生了這種事不是嗎？肯定是那個女人做了什麼！"
34070-21 = "請住手！現在爭這些也……！？"
34070-22 = "殺人兇手！這個魔女！！"
34070-27 = "滾出來！！"
34070-30 = "[ns] 「沙織……？」"
34070-31 = "……"
34070-40 = "……"
34070-41 = "[s1] 「…………！？」\n[s2] 「…………」"
34070-42 = "……老師。"
34070-43 = "……老師。"
34070-44 = "敦子他……被帶走了。"
34070-45 = "其他夥伴也受到了奧利斯的襲擊而走散了……生死也不明……"
34070-46 = "從那之後都不知道……逃了多少天了……"
34070-47 = "我沒能阻止他……"
34070-48 = "這樣下去的話……敦子他……公主他會死的……"
34070-49 = "明天早上……天一亮就被「她」給殺掉的……"
34070-50 = "我說的話，你可能不會相信吧……但是唯獨這件事，是真的……"
34070-52 = "敦子他從一開始就是為了這個而培育的存在……"
34070-53 = "從小的時候就背負著成為「祭品」的命運……"
34070-54 = "「她」說……"
34070-55 = "想要改變公主的命運的話，就聽從她的命令……"
34070-56 = "這樣一來，不只是公主……其他的夥伴也能得救。"
34070-57 = "奪取伊甸園條約，把優斯提娜聖徒會變為奧利斯的力量──再將三一跟格黑娜都據為己有的話……"
34070-58 = "敦子就不必成為「祭品」了……"
34070-59 = "但是……"
34070-61 = "我失敗了……"
34070-62 = "奧利斯小隊……沒能達成任務。"
34070-63 = "不只是奪取伊甸園條約失敗，"
34070-64 = "三一跟格黑娜自治區的征服也，"
34070-65 = "拯救同伴也，"
34070-66 = "就連保護敦子也，"
34070-67 = "全部……都因為我的能力不足而無法實現。"
34070-68 = "……現在的我是個異端。不管是三一還是格黑娜──就連向奧利斯求援都辦不到。"
34070-69 = "所以，我能拜託的就只有[USERNAME]老師了……"
34070-70 = "拜託了……"
34070-71 = "……我用我的命向你保證，不管什麼命令都會服從。"
34070-72 = "……「破壞光環的炸彈」也交給你。用它來控制我的性命也無所謂。"
34070-73 = "如果你覺得我無法信任的話就使用它吧……所以拜託你了。"
34070-74 = "……"
34070-75 = "拜託你……把敦子……"
34070-76 = "把公主……救出來吧……"
34070-80 = "滾出來！！聖園彌香！你這個邪惡之人！全部都是你的錯！"
34070-81 = "因為你和奧利斯的接觸……"
34070-82 = "老師才會……被奧利斯小隊盯上……"
34070-83 = "因為你把老師牽扯了進來……！"
34070-84 = "都是因為我……才會變成這樣的吧……"
34070-85 = "……都是我的錯。"
34070-86 = "因為我是個笨蛋，聖亞醬才……我完全，沒有被原諒……"
34070-87 = "……我還以為，能夠有挽回的機會。"
34070-88 = "只要度過今天晚上……明天早上就能跟渚醬、聖亞醬和老師一起……大家一起……"
34070-89 = "明明應該是這樣的……為什麼會……"
34070-90 = "……"
34070-91 = "……挽回的機會什麼的，那種像是童話故事裡的東西，本來就不存在的……真傻。都是因為相信那種東西才會……"
34070-92 = "因為我是笨蛋，所以才會被奧利斯……「奧利斯小隊」……沙織給利用了……"
34070-93 = "所以才會……傷害了重要的人……簡直像是……"
34070-94 = "你這魔女！！"
34070-95 = "……"
34070-96 = "快住手！誰快去叫實現正義部過來！"
34070-100 = "……沒錯。就是這樣……"
34070-108 = "……"
34070-109 = "……什麼嘛，仔細想想明明就很簡單嘛。"
34070-110 = "……「奧利斯小隊」的錠前沙織……這一切的元兇……"
34070-114 = "就是那個女人。"
34070-115 = "那個女人利用我──想要破壞聖亞醬的光環，對渚醬發射了導彈，還傷害了老師……"
34070-116 = "全部……全部全部全部！都是那孩子的計畫。"
34070-117 = "……這樣啊。如果要迎接這種結局的話……我，知道自己該怎麼做了。"
34070-118 = "明明讓我重要的人們遭遇了這種事，錠前沙織卻還能安然無恙，這不是很奇怪嗎？"
34070-119 = "嗯，沒錯。沒錯唷──要讓那個女人也……"
34070-120 = "我被奪走的一切，不讓她也嚐嚐就太不公平了吧。"
34070-121 = "我要讓那個女人重視的人，全部都……"
34070-127 = "放開我！滾出來，聖園彌香！！"
34070-128 = "不要在這裡鬧事！現在的情況……"
34070-135 = "咕啊！？"
34070-136 = "怎，怎麼了……！？牆壁被……破壞了！？"
34070-138 = "抱歉囉～★"
34070-139 = "那個……我的槍在哪來著……"
34070-140 = "在那裡嗎？好，那就走吧。"
34070-144 = "徒，徒手……把牆壁給……？"
34070-145 = "……聖，聖園彌香……聖園彌香他……"
34070-146 = "聖園彌香逃獄了！！"
34070-152 = "……"
34070-153 = "[s] 「站起來，沙織。」"
34070-154 = "但，但是……"
34070-155 = "[s] 「我想要和沙織平等地對話。」"
34070-156 = "……"
34070-158 = "……"
34070-159 = "[s] 「先問你一個問題，『她』指的是誰？」"
34070-160 = "「她」是奧利斯自治區的代表，也是奧利斯分校的主人。我們雖然用「她」來稱呼那個人，但其他的學生都稱呼他為「夫人」。"
34070-161 = "我也只看過他幾次……是個身高很高、有著紅色皮膚、穿著白色禮服的大人。"
34070-162 = "名字是貝雅特里榭……和我比起來，公主更常見到他。"
34070-163 = "[s] 「……其他『奧利斯小隊』的人怎麼了？」"
34070-164 = "……公主被帶走後，我們馬上就受到了襲擊……因為在那時走散了所以不清楚其他人的消息。"
34070-165 = "說不定還在被奧利斯的學生們追趕著。"
34070-166 = "[s] 「知道被帶走的敦子在哪裡嗎？」"
34070-167 = "在奧利斯自治區的──奧利斯．宗座聖殿。那裡的地下有個「她」準備的祕密的至聖所。我想大概是那裡吧。"
34070-168 = "[s] 「奧利斯．宗座聖殿……為什麼要把敦子帶到那裡……？」"
34070-169 = "這我就不知道了。我也只知道那裡一直以來都是為公主而準備的地方……"
34070-170 = "不過，公主從以前開始就常常說自己總有一天會在那裡成為「祭品」……"
34070-171 = "「她」……似乎打算在明天清晨進行儀式……"
34070-172 = "……公主剩下的時間或許已經所剩無幾了。"
34070-173 = "[s] 「……我知道了，狀況我大致明白了。」"
34070-175 = "[ns3] 向沙織伸出援手\n[ns4] 接受沙織的請求\n[ns5] 向沙織提供幫助"
34070-176 = "……"
34070-177 = "……"
34070-178 = "……"
34070-179 = "……真的，嗎？"
34070-180 = "你願意，幫助我嗎……？"
34070-181 = "[s] 「學生的請求可沒辦法置之不理呢。」"
34070-182 = "……就因為這種理由？……怎麼會。"
34070-183 = "你，你忘記了嗎？我之前可是對你開過槍啊！"
34070-184 = "我明明想過要了你的命的，為什麼這麼簡單就……無法理解……為什麼……"
34070-185 = "[s] 「不過炸彈我要沒收。」"
34070-186 = "……嗯，我知道了。依照約定。"
34070-192 = "這就是引爆裝置。需要的時候隨時都可以按。"
34070-193 = "[s] 「……不是只有引爆裝置而已，是全部。全部的炸彈都要沒收。」"
34070-194 = "炸，炸彈也要……？"
34070-195 = "……我知道了。既然你這麼說……"
34070-199 = "[ns] 收下炸彈"
34070-200 = "你可以放心，只要沒有這個引爆裝置的話，這些炸彈是絕對不會爆炸的。"
34070-201 = "[s6] 「那真是太好了。」\n[s7] 「學生帶著這些危險物品，我可不能當作沒看到呢。」"
34070-202 = "……？"
34070-203 = "……？"
34070-204 = "[ns] 破壞引爆裝置"
34070-207 = "你，你在做什麼……！？"
34070-208 = "[ns] 把壞掉的引爆裝置的碎片丟進垃圾桶"
34070-211 = "……"
34070-212 = "[s8] 「來，沒有時間了，快走吧。」\n[s9] 「先和美咲還有日和會合吧。」"
34070-213 = "到底是，為什麼……"
34070-214 = "到底是，為什麼……"
34070-215 = "[s] 出發"
34070-216 = "請，請等一下啊老師。我還沒有問你理由……"
34070-218 = "等，等等我……！！"
34070-226 = "下一話;「奧利斯小隊」"

34070-1 = "ตอนที่ 7;การเลือกและการตัดสินใจ"
34070-3 = "สภาพร่างกายของคุณเซอาล่ะ...!!"
34070-4 = "ไม่สู้ดีเลยค่ะ เธอชักเกร็งและไอเป็นเลือดไม่ยอมหยุดเลย...!"
34070-5 = "รีบติดต่อชมรมอัศวินบรรเทาทุกข์เร็วเข้า...!! ให้ชมรมซิสเตอร์หรือใครก็ได้ตรวจเช็กอาการของเธอ...!"
34070-6 = "แล้วคุณนางิสะล่ะคะ??"
34070-7 = "คุณนางิสะเพิ่งได้ข่าวและกำลังไปโรงพยาบาลค่ะ! ตอนนี้ฉันพยายามติดต่อคนอื่นอยู่เหมือนกัน แต่ว่า..."
34070-8 = "แล้ว <ชาเล่ต์> ล่ะคะ?"
34070-9 = "ยังติดต่อชาเล่ต์ไม่ได้เลยค่ะ! แปลกมากเลย... ระ... หรือว่าจะเกิดอะไรขึ้นกับคุณครู...?!"
34070-10 = "อย่าพูดอะไรเป็นลางสิ รีบติดต่ออีกเร็วเข้า!"
34070-11 = "แล้วคนร้ายล่ะ?! มิกะค่ะ! ยัยแม่มดคนนั้นค่ะ!!"
34070-15 = "รอก่อนค่ะ! จากการให้การของพยาน คุณมิกะไม่ได้ทำอะไรเลย..."
34070-16 = "แต่คุณเซอาเป็นแบบนี้หลังจากที่มิกะเข้าไปหาในห้องนี่คะ! ต้องเป็นฝีมือของยัยแม่มดนั่นแน่นอนค่ะ!"

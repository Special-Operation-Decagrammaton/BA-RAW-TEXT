34070-182 = "Y-Yes...but... I didn't expect you to..."
34070-183 = "Have you already forgotten? I shot you!"
34070-184 = "Why would you help someone who put a bullet through you?"
34070-185 = "[s] \"For the same reason I'm going to confiscate that bomb. To keep you safe.\""
34070-186 = "Oh... Um... Okay."
34070-192 = "This is the detonator. If you press this..."
34070-193 = "[s] \"No. I want you to take off the bomb and give it to me.\""
34070-194 = "Y-You want me to remove the bomb? Your insurance?  "
34070-195 = "I don't know what your play is here...  "
34070-199 = "[ns] Take the bomb."
34070-200 = "But don't worry. It won't explode without the detonator. "

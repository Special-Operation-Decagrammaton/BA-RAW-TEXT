34070-138 = "Pardon me. ★"
34070-139 = "Now, where is that gun of mine?"
34070-140 = "Oh, silly me. It's right here! Heehee!"
34070-144 = "D-Did she just destroy the wall with her bare hands?"
34070-145 = "M-M-M-Misono...! M-Mika...!"
34070-146 = "Misono Mika has escaped!"
34070-152 = "..."
34070-153 = "[s] \"Stand up, Saori.\""
34070-154 = "B-But..."
34070-155 = "[s] \"My students never need to kneel in front of me.\""
34070-156 = "..."
34070-158 = "..."
34070-159 = "[s] \"I have a question. Who is the 'she' you keep referring to?\""
34070-160 = "The representative of the Arius district and the owner of Arius Satellite School. We usually call her Madame."
34070-161 = "I've only seen her a few times...but she's a tall adult with red skin...and she wears a white dress..."
34070-162 = "Her name is Beatrice. Hime was the one who interacted with her a lot."
34070-163 = "[s] \"What happened to Hiyori and Misaki?\""
34070-164 = "After she took Hime, we were attacked...and got separated. I haven't been able to find them."
34070-165 = "They're probably still on the run.  "
34070-166 = "[s] \"Do you know where she took Atsuko?\""
34070-167 = "The Arius basilica...in the Arius district. There's a secret holy place she's prepared for this moment. Atsuko must be there."
34070-168 = "[s] \"What's the significance of the basilica?\""
34070-169 = "I don't know what it's for. Just that it's been prepared for Hime for a long time."
34070-170 = "Hime always said that was where she would meet her end."
34070-171 = "Beatrice said the ceremony would be at sunrise tomorrow."
34070-172 = "Please, time is running out for Hime."
34070-173 = "[s] \"Okay. Thanks for the debrief.\""
34070-175 = "[ns3] Decide to help Saori.\n[ns4] Make a decision to help Saori.\n[ns5] Help Saori."
34070-176 = "..."
34070-177 = "..."
34070-178 = "..."
34070-179 = "What?"
34070-180 = "Really?! You're choosing to help me?"

34070-50 = "ถึงเรื่องที่ฉันพูด... มันอาจจะฟังดูไม่น่าเชื่อ... แต่ว่ามันคือ... ความจริง..."
34070-52 = "องค์หญิงอาสึโกะ... เป็นผู้ที่กำเนิดมาเพื่อวัตถุประสงค์นั้น..."

[translation]
10003030-1 = "#title;제3화;모든 건 완벽한 휴가를 위해"
10003030-2 = "#place;하계 합숙 훈련 지휘통제실"
10003030-3 = "#na;(어떻게든 해변에서 있었던 소동을 무마시키고 선도부원들과 함께 다시 회의실에 모였다.)"
10003030-4 = "3;이오리 수영복ND;02;일단 불량배와 헬멧단 녀석들은 모두 처리했어. \n#3;a"
10003030-5 = "3;이오리 수영복ND;08;근데 그 녀석들……. 아무래도 병력의 전부가 아니라, 단순한 선발대인 모양이야.\n#3;em;…"
10003030-6 = "[s] \"선발대?\""
10003030-7 = "1;치나츠;02;네, 아무래도 4시간 후에 있을 본격적인 전면전 전에, 서로 신경전을 하는 모양새였달까요.\n#1;a\n#3;m5\n#1;em;[반응]"
10003030-8 = "#3;hide\n5;이오리 수영복ND;05;전면전에서 조금이라도 전황을 유리하게 가져가려고, 서로가 지뢰 매설이나 함정 설치 등등. 작당을 하고 있더라고."
10003030-9 = "5;이오리 수영복ND;99;먼저 선수를 치려고 한 모양이지만, 생각하는 수준이 같으니 결국 거기서 부딪쳤다는 거지."
10003030-10 = "1;치나츠;05;결국 이렇게 되었다는 건…….\n#1;em;…"
10003030-11 = "5;이오리 수영복ND;06;아니, 아코 쨩?! 이거 완전히 말이랑 다르잖아! 조용한 곳이라며……!\n#5;stiff\n#5;em;[속상함]"
10003030-12 = "1;치나츠;06;이 자리에 없는 선임행정관을 찾아도 어쩔 수 없겠죠. 일단은 여기도 게헨나 자치구 내이니, 문제아를 내버려둘 순 없어요.\n#1;em;[땀]"
10003030-13 = "1;치나츠;05;이번 사태는 부장님께 보고 드리고 대응하는 편이 좋겠어요."
10003030-14 = "[s] \"하지만 그러면 모처럼 히나를 위한 계획이…….\""
10003030-15 = "5;이오리 수영복ND;05;뭐, 어쩔 수 없잖아. 선생님. 애당초 무리였다는 거야.\n#5;em;[반응]"
10003030-16 = "5;이오리 수영복ND;08;게헨나 선도부에게 휴가라니, 역시 그런 형편 좋은 일이 있을 리가 없었어."
10003030-17 = "[s] \"모처럼 이오리는 수영복까지 챙겨왔는데!\""
10003030-18 = "5;이오리 수영복ND;09;아니, 그건 관계없잖아?!\n#5;shake\n#5;em;[?!]"
10003030-19 = "1;치나츠;05;상황이 이렇게 되었으니 어쩔 수 없겠지요. 그럼 부장님께 연락을…….\n#1;m2"
10003030-20 = "#st;[0,0];instant;1;"
10003030-21 = "#clearST\n#wait;1000"
10003030-22 = "#all;hide"
10003030-23 = "3;통신아코;05;자, 잠까아안!!! 아뇨. 아니요! 물러요! 치나츠!\n#3;em;[!]\n#fontsize;100\n#3;closeup\n#3;a"
10003030-24 = "3;통신아코;09\n5;이오리 수영복ND;02;아코 쨩?!\n#5;em;[?!]\n#5;a"
10003030-25 = "1;치나츠;02;아코 행정관……?\n#1;a\n#1;em;[?]"
10003030-26 = "3;통신아코;09;으으, 만마전 녀석들! 하필 이럴 때 또 방해질이나 하고……!\n#3;em;[빠직]\n#3;stiff"
10003030-27 = "3;통신아코;05;하지만 여기서 포기할 제가 아닙니다. 간신히 부장님을 바다로 모셔왔는데. 여기서 고작 문제아들 때문에 기회를 망치다니, 그럴 순 없어요!"
10003030-28 = "3;통신아코;01;마침 지금 해변으로 모여들고 있는 불량배와 헬멧단에 대해선 정보부를 통해 조사를 끝내두었습니다. 지금 관련된 자료를 데이터로 보낼게요."
10003030-29 = "1;치나츠;01;과연 선임행정관……. 일처리가 빠르군요.\n#1;em;…"
10003030-30 = "3;통신아코;01;우선 불량배 녀석들. 자칭 '엉망진창 스케반'이라는 이름으로 활동 중이며, 그 지역에는 최근 난입한 세력입니다."
10003030-31 = "3;통신아코;02;추적해본 결과, 한 달 전쯤 다른 해변에서 세력 다툼에 패배하여 이쪽으로 흘러 들어온 잔챙이들인 모양이에요."
10003030-32 = "3;통신아코;01;그리고 그런 불량배들과 부딪친 쪽은 첨벙첨벙 헬멧단. 원래부터 호텔 근처의 슬럼가에 거점을 잡고 활동하던 지역 문제아들이더군요.\n#3;em;[반응]"
10003030-33 = "3;통신아코;99;이미 두 세력의 규모와 장비 수준, 대강의 구성도는 파악이 끝났습니다."
10003030-34 = "3;통신아코;09;그 결과……. 결론을 내렸습니다."
10003030-35 = "[s] \"어떤 결론?\""
10003030-36 = "3;통신아코;05;이 정도 수준이라면, 부장님께 보고하지 않아도 저희끼리 해결할 수 있다고 말이죠!\n#3;em;[!]"
10003030-37 = "5;이오리 수영복ND;02;우리들끼리 해결한다고?"
10003030-38 = "1;치나츠;06;(하아……. 결국 이렇게 되는 건가요.)\n#1;em;[땀]\n#1;stiff"
10003030-39 = "3;통신아코;09;히나 부장님의 공식 스케쥴은 즉 4시간 후의 구보 훈련 때부터에요."
10003030-40 = "3;통신아코;05;그러니 그때가 오기 전에, 공백의 4시간 안에 저희가 불량배 및 헬멧단을 각개격파 하는 거예요! 부장님이 눈치채지 못하도록 몰래!\n#3;hophop"
10003030-41 = "1;치나츠;05;요컨대, 이 해변에서 전면전이 벌어지지 않게, 말썽의 원인을 먼저 제거해버리자는 거군요……."
10003030-42 = "3;통신아코;03;이그젝틀리예요!\n#3;greeting\n#3;em;[반짝]"
10003030-43 = "5;이오리 수영복ND;04;뭐, 확실히 그렇게 하면 어떻게든 될지 모르겠지만. ……정말, 우리만으로 가능해?"
10003030-44 = "3;통신아코;05;가능해? 가 아닙니다. 가능하도록 한다! 그래야만 합니다! 키보토스가 멸망하길 바라지 않는다면!\n#3;em;[반응]"
10003030-45 = "5;이오리 수영복ND;06;그러니까 너무 야단스럽다고……. 뭐, 노력은 해보겠지만.\n#5;em;[속상함]\n#5;stiff"
10003030-46 = "3;통신아코;09;자, 이오리. 해변의 불량배 쪽을 부탁드릴게요. 치나츠는 슬럼가의 헬멧단을 담당해주세요.\n#3;em;[!]"
10003030-47 = "3;통신아코;09;각각 호텔에서 대기 중인 선도부원 병력을 끌고 나가면 충분히 막아낼 수 있을 겁니다."
10003030-48 = "3;통신아코;09;그리고 그 사이에, 선생님께서는 부장님을 상대해주세요.\n#3;em;[!]"
10003030-49 = "[s] \"넵.\""
10003030-50 = "3;통신아코;05;중요한 건 단 하나! 이번 여름 부장님께서 온전히 휴식을 취하는 것!\n#3;em;[반응]"
10003030-51 = "3;통신아코;09;그걸 위해서라도 절대로 방 밖으로 나오지 못하게 해야 해요! 이 소동을 눈치 채면, 부장님은 또 다시 쉬지 않고 일하려 들 테니까요!"
10003030-52 = "#all;hide"
10003030-53 = "3;통신아코;05;그럼! 모두 부장님의 완벽한 휴가를 위해! 출동입니다!\n#3;em;[!]\n#3;closeup"
10003030-54 = "3;이오리 수영복ND;06;으으으, 알았다구.\n#3;em;[땀]"
10003030-55 = "3;치나츠;06;하아.\n#3;stiff"
10003030-56 = "[ns] \"모두 너무 무리는 하지마!\""
10003030-57 = "#wait;500"
10003030-58 = "#all;hide"
10003030-59 = "#wait;1500"
10003030-60 = "[ns] \"다녀왔습니다…….\""
10003030-61 = "3;히나 수영복ND;02;아아, 선생님. 어서 와. 배는 괜찮아? 엄청 급하게 달려나가던데.\n#3;em;[?]\n#3;a"
10003030-62 = "[s] \"아, 그런 설정이었지…….\""
10003030-63 = "3;히나 수영복ND;01;……응? 설정? 으음, 무슨 소리인지는 모르겠지만. 바깥이 시끄러운 걸 보니, 제법 훈련이 격해지고 있나 봐?"
10003030-64 = "[s] \"어, 음. 일단 그렇습니다.\""
10003030-65 = "3;히나 수영복ND;02;아코도 참 의욕이 넘치네. 덕분에 이렇게 쉬고 있는 거긴 하지만……."
10003030-66 = "3;히나 수영복ND;10;으음, 그래도 역시……. 여기서 할 수 있는 거라고는 창밖의 풍경을 내다보는 것 정도려나.\n#3;em;…"
10003030-67 = "3;히나 수영복ND;02;모처럼 바다까지 오긴 했지만, 여기……. 창문으로만 바라보는 풍경은 어째 영 익숙해지지가 않네.\n#3;m2"
10003030-68 = "3;히나 수영복ND;99;역시 찾아와본 적이 별로 없기 때문인 걸까……."
10003030-69 = "[s] \"히나는 바다를 찾았던 적이 별로 없는 거지?\""
10003030-70 = "3;히나 수영복ND;01;아아, 응……. 아무래도 평소 업무가 바쁘다 보니, 이런 휴양지 비슷한 장소를 찾을 기회는 별로 없었어.\n#3;m3"
10003030-71 = "3;히나 수영복ND;02;훈련하기 전, 현장에 익숙해지기 위해 찾은 적이라면 몇 번 있지만……. 그것도 어디까지나 업무차 방문이라고 할까."
10003030-72 = "3;히나 수영복ND;99;진득하니 바다를 볼 기회는 별로 없었으니까."
10003030-73 = "3;히나 수영복ND;01;응, 이렇게 바다를 멍하니 바라보고 있는 건 조금 낯선 경험일지도 모르겠네."
10003030-74 = "#st;[0,0];instant;1;"
10003030-75 = "#clearST\n3;히나 수영복ND;01\n#3;em;…\n#wait;2500"
10003030-76 = "3;히나 수영복ND;00;선생님……. 그……."
10003030-77 = "[s] \"응?\""
10003030-78 = "3;히나 수영복ND;00;선생님은……. 바다를 좋아해?\n#3;em;[?]"
10003030-79 = "[s1] \"응. 좋아해.\"\n[s2] \"글쎄, 나도 그렇게 좋아하진 않아.\"\n[s3] \"딱히 좋지도, 싫지도 않아.\""
10003030-80 = "3;히나 수영복ND;99;그렇구나. 선생님은, 바다를 좋아하는 구나.\n#3;greeting"
10003030-81 = "3;히나 수영복ND;01;그럼, 조금은 궁금해지는걸."
10003030-82 = "3;히나 수영복ND;99;그렇구나. 그 부분은……. 조금 나랑 비슷할지도…….\n#3;greeting"
10003030-83 = "3;히나 수영복ND;00;(……하지만 여기까지 와서, 이대로 가만히 있기만 하는 건 역시…….)"
10003030-84 = "3;히나 수영복ND;02;아아, 그래?"
10003030-85 = "3;히나 수영복ND;99;그렇다는 건 선생님도 나도, 바다에 대해선 문외한이라는 거네."
10003030-86 = "3;히나 수영복ND;01;하지만 창문을 통해 바라보기만 해선…… 아마 평생 바다에 익숙해질 수 없을 거야."
10003030-87 = "3;히나 수영복ND;10;그러고 싶진 않아. 모처럼 흔치 않은 기회……. 덕분에 여기까지 왔으니까."
10003030-88 = "3;히나 수영복ND;00;그래서 말인데, 선생님. 아코는 얌전히 대기하라고 했지만.\n#3;em;[반응]"
10003030-89 = "#st;[0,0];instant;1;"
10003030-90 = "#clearST\n3;히나 수영복ND;00\n#3;d\n#wait;1000"
10003030-91 = "#wait;1000"
10003030-92 = "3;히나 수영복ND;00\n#3;a\n#wait;1000\n#3;closeup"
10003030-93 = "3;히나 수영복ND;00;……잠깐이나마, 둘이서 바다에 갔다오지 않을래?\n#3;closeup\n#3;em;[///]\n#3;stiff"
10003030-94 = "[s] \"둘이서 바다에……?\""
10003030-95 = "3;통신아코;09;중요한 건 단 하나! 이번 여름 부장님께서 온전히 휴식을 취하는 것!\n#3;em;[반응]"
10003030-96 = "3;통신아코;05;그걸 위해서라도 절대로 방 밖으로 나오지 못하게 해야 해요! 이 소동을 눈치 채면, 부장님은 또 다시 쉬지 않고 일하려 들 테니까요!\n#3;em;[!]\n#3;closeup"

[translation]
10003030-1 = "ตอนที่ 3;ทุกสิ่งเพื่อวันพักผ่อนที่สมบูรณ์แบบ"
10003030-2 = "ห้องควบคุมปฏิบัติการฝึกภาคฤดูร้อน"
10003030-3 = "(หลังจากควบคุมสถานการณ์ที่ชายหาดได้แล้ว สมาชิกคณะกรรมการวินัยก็มารวมตัวกันที่ห้องประชุม)"
10003030-4 = "ข่าวดีก็คือพวกเราจัดการพวกแยงกี้กับพวกแก๊งหมวกกันน็อกได้หมดแล้ว "
10003030-5 = "แต่ว่าพวกนั้นน่ะ... ดูเหมือนจะไม่ใช่กองกำลังทั้งหมดของพวกมัน เป็นแค่กองกำลังแนวหน้าเท่านั้น"
10003030-6 = "[s] \"แนวหน้างั้นเหรอ?\""
10003030-7 = "ใช่แล้วค่ะ ดูเหมือนว่าพวกนั้นตัดสินใจที่จะต่อสู้กันเองก่อนที่จะเริ่มสงครามใหญ่ในอีก 4 ชั่วโมง..."
10003030-8 = "ฉันคิดว่าพวกนั้นคงพยายามชิงลงมือเพื่อให้ได้เปรียบในสงครามใหญ่ อย่างเช่นติดตั้งกับระเบิด#nหรือวางกับดักต่างๆ ค่ะ "
10003030-9 = "เหมือนพวกนั้นพยายามที่จะโจมตีอีกฝ่ายให้ได้ก่อน แต่เพราะว่ากองกำลังมีฝีมือสูสีกัน#nเลยจบลงแค่การปะทะกันเฉยๆ ค่ะ"
10003030-10 = "สุดท้ายก็กลายเป็นแบบนี้สินะ..."
10003030-11 = "โธ่เอ๊ย อาโกะจัง!! ไม่เห็นเหมือนกับที่บอกไว้เลยนี่นา! ไหนว่าที่นี่เงียบสงบไง...!"
10003030-12 = "เจ้าหน้าที่อาวุโสไม่ได้อยู่ที่นี่ด้วย บ่นไปก็คงไม่มีอะไรดีขึ้นหรอกค่ะ อีกอย่าง ที่นี่อยู่ในเขตปกครอง#nของเกเฮนน่า พวกเราคงปล่อยกลุ่มอันธพาลพวกนั้นไว้ไม่ได้หรอกค่ะ"
10003030-13 = "ฉันว่ารายงานเรื่องนี้ให้ท่านประธานทราบแล้วหาทางรับมือจะดีกว่านะคะ"
10003030-14 = "[s] \"แต่ถ้าทำแบบนั้น แผนการทั้งหมดที่ทำเพื่อฮินะล่ะ...\""
10003030-15 = "ก็มัน...ช่วยไม่ได้นี่นา คุณครู! ลำพังพวกเราน่ะ จัดการพวกนั้นไม่ได้หรอก"
10003030-16 = "วันหยุดพักผ่อนสำหรับคณะกรรมการวินัยงั้นเหรอ เหอะ... ไม่มีทางที่จะราบรื่นได้อยู่แล้วล่ะ"
10003030-17 = "[s] \"อิโอริเองก็เอาชุดว่ายน้ำมาด้วยนี่นา!\""
10003030-18 = "กะ...ก็บอกว่าไม่ใช่ไงเล่า!!"
10003030-19 = "สถานการณ์กลายเป็นแบบนี้ไปแล้ว ก็คงไม่มีทางเลือกนะคะ ถ้างั้นติดต่อไปหาท่านประธาน..."
10003030-23 = "ดะ...เดี๋ยวก่อนค่ะ!!! ไม่นะ! ไม่ได้นะ! ไม่ได้เด็ดขาดนะคะ! ชินัตสึ!"
10003030-24 = "อาโกะจัง?!"
10003030-25 = "เจ้าหน้าที่อาโกะ...?"
10003030-26 = "อึ่ก... ยัยพวกแพนเดโมเนียม โซไซตี้! ทำไมถึงมาก่อกวนกันในเวลาแบบนี้ด้วยนะ...!"
10003030-27 = "แต่ฉันจะไม่ยอมแพ้แค่ตรงนี้หรอกค่ะ อุตส่าห์พาท่านประธานมาถึงทะเลได้แล้วแท้ๆ จะปล่อยให้พวกเด็กมีปัญหาพวกนั้นมาทำลายโอกาสแบบนี้ไม่ได้!"
10003030-28 = "ตอนนี้ฉันได้รับข่าวกรองเกี่ยวกับกลุ่มแยงกี้สาวและแก๊งหมวกกันน็อกที่มารวมตัวกันอยู่ที่ชายหาด#nเรียบร้อยแล้วค่ะ ฉันจะส่งข้อมูลไปให้นะคะ"
10003030-29 = "เจ้าหน้าที่อาวุโสอาโกะ... จัดการได้รวดเร็วมากเลยจริงๆ..."
10003030-30 = "ก่อนอื่น... กลุ่มแยงกี้สาว พวกเธอรวมตัวกันในนามของกลุ่มแยงกี้สาวจอมวุ่นวายและเพิ่งเข้ามา#nก่อความวุ่นวายในเขตนั้นค่ะ"
10003030-31 = "จากข้อมูลที่สืบมา ท่าทางจะเป็นพวกที่พ่ายแพ้ในการชิงอำนาจที่ชายหาดอื่นเมื่อหนึ่งเดือนก่อน#nเลยย้ายมาที่ชายหาดนี้ค่ะ"
10003030-32 = "และแก๊งหมวกกันน็อกที่เข้าปะทะกับกลุ่มแยงกี้สาว พวกนั้นเป็นกลุ่มอันธพาลท้องถิ่นที่อยู่ใน#nย่านแออัดใกล้ๆ โรงแรมค่ะ "
10003030-33 = "อีกทั้งเรายังได้ข้อมูลของขนาดกองกำลัง อุปกรณ์และโครงสร้างของกลุ่มเสร็จเรียบร้อยแล้วค่ะ"
10003030-34 = "สรุปก็คือ... ฉันตัดสินใจแล้วค่ะ"
10003030-35 = "[s] \"ตัดสินใจว่า...?\""
10003030-36 = "ถ้าในระดับนี้ละก็ เราจัดการเจ้าพวกนั้นเองได้โดยไม่จำเป็นต้องรายงานให้ท่านประธานทราบค่ะ!"
10003030-37 = "จะจัดการกันเองงั้นเหรอ?"
10003030-38 = "(เฮ้อ... สุดท้ายก็เป็นแบบนี้สินะ)"
10003030-39 = "กำหนดการอย่างเป็นทางการของท่านประธานฮินะคือ การฝึกวิ่งในอีก 4 ชั่วโมงถัดไปค่ะ"
10003030-40 = "ก่อนที่จะถึงตอนนั้น ภายในแก็ป 4 ชั่วโมงนี้ เราจะบุกจัดการกลุ่มแยงกี้สาวกับแก๊งหมวกกันน็อก#nทีละกลุ่ม! และต้องไม่ให้ท่านประธานสังเกตเห็นด้วยค่ะ!"
10003030-41 = "สรุปก็คือ... ให้จัดการที่ต้นเหตุของปัญหาเพื่อป้องกันสงครามใหญ่ที่จะเกิดขึ้นที่ชายหาดนี้สินะคะ..."
10003030-42 = "อิส ฟอร์ ชัวร์ค่ะ!"
10003030-43 = "ก็นะ... ฉันไม่แน่ใจว่าจะทำอย่างนั้นได้รึเปล่า แต่ว่า... เราจะทำได้จริงๆ เหรอ?"
10003030-44 = "ไม่ใช่ \"จะทำได้จริงๆ เหรอ\" นะคะ แต่เราต้องทำให้ได้ค่ะ! ต้องทำให้ได้!#nเพราะไม่งั้นแล้วคิโวทอสคงถูกทำลายแน่ค่ะ!"
10003030-45 = "เอ่อ... เธอเวอร์ไปรึเปล่า... แต่ก็นะ เราจะพยายามแล้วกัน"
10003030-46 = "เอาล่ะค่ะ อิโอริ ช่วยจัดการพวกกลุ่มแยงกี้สาวริมหาดด้วยนะคะ ส่วนชินัตสึ ฉันอยากให้ไปจัดการ#nพวกแก๊งหมวกกันน็อกที่ย่านแออัดค่ะ"
10003030-47 = "ถ้าแต่ละคนพากองกำลังคณะกรรมการวินัยที่รออยู่ที่โรงแรมไปด้วย ก็น่าจะจัดการได้ไม่มีปัญหาค่ะ"
10003030-48 = "และในระหว่างนี้ คุณครูช่วยรับมือกับท่านประธานให้ทีนะคะ"
10003030-49 = "[s] \"รับทราบ!\""
10003030-50 = "สิ่งสำคัญมีเพียงหนึ่งเดียว! นั่นก็คือการให้ท่านประธานได้ใช้วันหยุดพักผ่อนฤดูร้อนได้อย่าง#nเต็มที่ค่ะ!"
10003030-51 = "เพื่อการนั้นแล้ว ห้ามให้ท่านประธานออกมาจากห้องเด็ดขาดเลยนะคะ! ถ้าท่านประธานรู้เรื่อง#nวุ่นวายที่เกิดขึ้นละก็ คงจะไม่ยอมหยุดพักและออกมาจัดการเองแน่ๆ ค่ะ!"
10003030-53 = "เอาละค่ะ! ทั้งหมดออกปฏิบัติการเพื่อวันหยุดพักผ่อนของท่านประธานได้!"
10003030-54 = "อื้อ... เข้าใจแล้ว"
10003030-55 = "เฮ้อ..."
10003030-56 = "[ns] \"ทุกคนอย่าฝืนตัวเองเกินไปล่ะ!\""
10003030-60 = "[ns] \"ครูกลับมาแล้ว...\""
10003030-61 = "อ่า คุณครู เข้ามาสิ หายปวดท้องรึยังน่ะ? เมื่อกี้วิ่งหน้าตั้งออกไปเลยนี่นา..."
10003030-62 = "[s] \"อ่ะ...อ๋อ มะ...ไม่เป็นไรแล้วล่ะ\""
10003030-63 = "หืม...? อะไรนะ? อืม ช่างเถอะ ฟังจากเสียงอึกทึกข้างนอกแล้ว เหมือนทุกคนจะฝึกกันหนักมากเลยสินะ?"
10003030-64 = "[s] \"คะ...คงงั้นแหละ\""
10003030-65 = "อาโกะพยายามสุดๆ เลยสินะ ฉันต้องขอบคุณอาโกะที่ทำให้ได้มีเวลาพักแบบนี้..."
10003030-66 = "อืม... แต่ว่า... สิ่งที่ฉันทำได้ตอนนี้คือแค่มองดูทิวทัศน์นอกหน้าต่างแค่นั้นเองเหรอ..."
10003030-67 = "ทั้งที่มาถึงทะเลแล้วแท้ๆ... คือ... ฉันไม่ชินกับการนั่งมองทิวทัศน์จากทางหน้าต่างเฉยๆ น่ะ..."
10003030-68 = "หรืออาจเป็นเพราะฉันไม่เคยมาที่นี่กันนะ..."
10003030-69 = "[s] \"ฮินะไม่ค่อยได้มาเที่ยวทะเลสินะ?\""
10003030-70 = "อื้อ... ปกติฉันมักจะมีงานเข้ามาตลอด เลยไม่ค่อยได้มาสถานที่พักผ่อนแบบนี้หรอก..."
10003030-71 = "ถ้าเป็นการไปสำรวจสถานที่เพื่อสร้างความเคยชินก่อนฝึกซ้อมล่ะก็... ฉันก็เคยไปมาบ้าง#nแต่ว่าก็มักจะมีงานแทรกเข้ามาอยู่ตลอด"
10003030-72 = "เลยไม่ค่อยได้มีโอกาสมองเห็นทะเลชัดๆ แบบนี้เท่าไหร่น่ะ"
10003030-73 = "อื้อ... การนั่งมองทะเลโดยไม่ต้องทำอะไรแบบนี้ มันอาจจะเป็นประสบการณ์ใหม่สำหรับฉันก็ได้นะ..."
10003030-76 = "คุณครู... คือว่า..."
10003030-77 = "[s] \"หืม?\""
10003030-78 = "คุณครู... ชอบทะเลเหรอ?"
10003030-79 = "[s1] \"อื้อ ชอบสิ\"\n[s2] \"คือ... ครูก็ไม่ได้ชอบมากเท่าไหร่หรอก\"\n[s3] \"ครูเฉยๆ น่ะ\""
10003030-80 = "แบบนี้นี่เอง คุณครูชอบทะเลสินะ"
10003030-81 = "ฉันมีเรื่องที่สงสัยอยู่นิดหน่อย..."
10003030-82 = "แบบนี้นี่เอง เรื่องนั้น... มีส่วนเหมือนกับฉันนิดหน่อย..."
10003030-83 = "(...แต่ว่าทั้งที่มาถึงที่นี่แล้ว จะให้มานั่งอยู่เฉยๆ แบบนี้มันก็...)"
10003030-84 = "อ่า... งั้นเหรอ? "
10003030-85 = "ถ้างั้นทั้งคุณครูกับฉันก็คงไม่ค่อยชินกับการมาทะเลสินะ"
10003030-86 = "แต่ว่าถ้ามัวแต่นั่งมองทะเลผ่านทางหน้าต่างอยู่อย่างนี้... ฉันก็อาจจะไม่คุ้นเคยกับทะเลไปตลอดชีวิต#nเลยก็ได้"
10003030-87 = "ฉันไม่อยากเป็นแบบนั้นหรอกนะ โอกาสที่หายากแบบนี้... ทั้งที่ได้มาถึงทะเลแล้ว"
10003030-88 = "เพราะงั้นคุณครู... ถึงอาโกะจะบอกให้ฉันรออยู่เฉยๆ ในห้องก็เถอะ"
10003030-93 = "เราสองคนออกไปเดินเล่นที่ทะเลกันไหม...?"
10003030-94 = "[s] \"ไปกันสองคน...?\""
10003030-95 = "สิ่งสำคัญมีเพียงหนึ่งเดียว! นั่นก็คือการให้ท่านประธานได้ใช้วันหยุดพักผ่อนฤดูร้อนได้อย่าง#nเต็มที่ค่ะ!"
10003030-96 = "เพื่อการนั้นแล้ว ห้ามให้ท่านประธานออกมาจากห้องเด็ดขาดเลยนะคะ! ถ้าท่านประธานรู้เรื่อง#nวุ่นวายที่เกิดขึ้นละก็ คงจะไม่ยอมหยุดพักและออกมาจัดการเองแน่ๆ ค่ะ!"
10003030-98 = "[ns4] (ถึงอาโกะจะพูดอย่างนั้นก็เถอะ แต่ว่าแบบนี้....)\n[ns5] (เพื่อความสุขของฮินะ ก็ไม่ควรกักเธอไว้สิ...)"
10003030-99 = "คุณครู?"
10003030-100 = "คุณครู?"
10003030-101 = "[s] \"ก็ได้... รอครูแป๊ปนึงนะ\""
10003030-102 = "อะ... อืม..."
10003030-106 = "หืม? คุณครู? มีเรื่องอะไรเหรอ? ถ้าเรื่องจัดการพวกกลุ่มแยงกี้สาวที่ชายหาดล่ะก็#nพวกเราจัดการกันเองได้นะ..."
10003030-107 = "หืม? อะไรนะ? ประธานอยากออกมาที่ทะเลเหรอ?"
10003030-108 = "อะ...อื้อ! เข้าใจแล้ว! ทางนี้ฉันจะหาทางจัดการเอง! เชื่อมือได้เลย!"
10003030-111 = "[ns] \"ดีล่ะ! ไปทะเลกันเถอะ!\""
10003030-113 = "อื้อ..."
10003030-118 = "ที่นี่คือชายหาดสินะ..."
10003030-119 = "ความรู้สึกตอนที่เหยียบบนทราย... อืม รู้สึกแปลกนิดหน่อยนะ"
10003030-120 = "แล้วก็รอยเท้าบนหาดทรายตอนที่เดินไป..."
10003030-123 = "และตอนที่รอยเท้าหายไปเวลาที่โดนคลื่นที่ซัดสาดเข้ามา..."
10003030-124 = "มัน...รู้สึกแปลกนิดหน่อย"
10003030-125 = "[s6] (ฮินะยิ้มด้วยล่ะ...)\n[s7] (โชคดีจริงๆ ที่ตัดสินใจออกมาที่นี่)"
10003030-126 = "คือมัน... รู้สึกแปลกๆ ฉันไม่ค่อยมีโอกาสได้มาทะเลเท่าไหร่..."
10003030-127 = "คือมัน... รู้สึกแปลกๆ ฉันไม่ค่อยมีโอกาสได้มาทะเลเท่าไหร่..."
10003030-128 = "แถมยังได้มาเดินเล่นกับคุณครูแบบนี้..."
10003030-129 = "นี่ คุณครู..."
10003030-132 = "หืม...?"
10003030-133 = "[s] \"ดะ...เดี๋ยวก่อน!\""
10003030-137 = "อาโกะพูดค่ะ เจ้าหน้าที่อาวุโสอามาอุ อาโกะนะคะ! ทุกคนช่วยตอบด้วยค่ะ!"
10003030-138 = "[s] \"หืมมม?\""
10003030-139 = "มีอะไรอีกล่ะ?! ตอนนี้ฉันกำลังยุ่งอยู่กับการจัดการพวกแยงกี้สาวนะ!"
10003030-140 = "มีรายงานจากทางชินัตสึค่ะ สถานการณ์ได้เปลี่ยนไปแล้วค่ะ ตอนนี้แก๊งหมวกกันน็อกกำลังมุ่งหน้า#nไปที่ชายหาดเร็วกว่าที่คาดการณ์ไว้ค่ะ!"

[translation]
10003030-1 = "Episode 3;All For A Perfect Vacation"
10003030-2 = "Summer Camp Control Room"
10003030-3 = "We managed to get the situation on the beach under control and gathered with the other members at the control room."
10003030-4 = "The good news is we managed to stop the fighting. "
10003030-5 = "The bad news is that those were only their scouting teams."
10003030-6 = "[s] \"Are you serious?\""
10003030-7 = "Yes. The two sides were essentially just feeling each other out before the real battle begins."
10003030-8 = "I believe they were also tasked with laying traps to gain an advantage for later."
10003030-9 = "The two sides must have been thinking the same thing and crossed paths."
10003030-10 = "So that would mean..."
10003030-11 = "Damn it, Ako! This isn't how this trip was supposed to go! You said this was a peaceful area!"
10003030-12 = "What good is it complaining at someone who isn't here? Nevertheless, this beach is still within Gehenna's district. We can't let the two sides do whatever they want."
10003030-13 = "Though this is starting to get out of hand. Perhaps we should inform the Head Prefect."
10003030-14 = "[s] \"But if you did that, Hina's vacation would be...\""
10003030-15 = "We may not have a choice, Sensei. We were barely able to handle that opening fight."
10003030-16 = "The rest of the Prefect Team didn't come here to have a vacation."
10003030-17 = "[s] \"Says the girl who packed a swimsuit!\""
10003030-18 = "What does that have to do with anything?!"
10003030-19 = "We have no other options at this point. We should report this to Hi—"
10003030-23 = "Stop right there, Chinatsu!"
10003030-24 = "Ako?!"
10003030-25 = "Senior Administrator?"
10003030-26 = "Those helpless Pandemonium Society idiots! They just had to bother me at the worst possible time..."
10003030-27 = "However, I am NOT giving up. We went through the trouble to give the president a vacation on the beach. Are we going to let some troublemakers ruin it? Absolutely not!"
10003030-28 = "The Intelligence Committee just finished gathering information on those thugs and gangsters. I'll send the data over your way."
10003030-29 = "This is quick work even by your standards..."
10003030-30 = "One group is called the Fubar Beach Thugs and are fairly new to this area."
10003030-31 = "From what we've gathered, they lost a power struggle at another beach and were pushed into the Gehenna district."
10003030-32 = "The other is a split-off of the Kivotos Helmet Gang. They're calling themselves the \"Splashy\" Helmet Gang, and they've been causing trouble in this neighborhood for a while."
10003030-33 = "We also have data on their member counts, equipment, and their approximate chains of command."
10003030-34 = "I've come to a decision after reviewing everything we've gathered."
10003030-35 = "[s] \"And that is?\""
10003030-36 = "Our current forces should be more than enough to handle these forces. We don't have to report anything to the head prefect!"
10003030-37 = "You still want us to take care of this ourselves?"
10003030-38 = "(*sigh* She's really going to force the issue no matter what.)"
10003030-39 = "Hina's official schedule starts in a little under four hours from now with the running training."
10003030-40 = "That simply means we must defeat the thugs and gangsters before they go to war with each other at the same time. If we do that, the president will be none the wiser!"
10003030-41 = "You want us to eliminate two opposing forces under such a short time limit?"
10003030-42 = "Yes, I do!"
10003030-43 = "Maybe we can pull it off, but can we really do it with just us?"
10003030-44 = "There's no \"maybe\" about it! We MUST succeed! Or else all of Kivotos will be destroyed!"
10003030-45 = "Isn't that an overreaction? Just because Hina didn't get her vacation...? Well, we'll do what we can."
10003030-46 = "Iori, you're to take on the Fubar Thugs at the beach. Chinatsu, I want you to ambush the Splashy Helmet Gang's hideout."
10003030-47 = "You should be able to stop them with the help of the Prefect Team members we have stationed at the hotel."
10003030-48 = "Sensei, I want you to stay with Hina again."
10003030-49 = "[s] \"Got it.\""
10003030-50 = "Remember that our goal hasn't changed. Our top priority is to make sure that the president has a relaxing summer vacation!"
10003030-51 = "To that end, she mustn't know anything about what's happening outside of the hotel, or else she'll be forced to take matters into her own hands."
10003030-53 = "It's showtime, everyone! For the sake of Hina's vacation!"
10003030-54 = "Fine."
10003030-55 = "*sigh*"
10003030-56 = "[ns] \"Stay safe out there, you two.\""
10003030-60 = "[ns] \"I'm baaack.\""
10003030-61 = "There you are, Sensei. Are you still in pain? You left so quickly."
10003030-62 = "[s] \"Pain? O-Oh, right. My out.\""
10003030-63 = "Out? I'm not sure what you mean, but that reminds me that things are getting noisier outside. Has training been getting more intense?"
10003030-64 = "[s] \"Uh, yeah! Must be.\""
10003030-65 = "I suppose we have Ako to thank for that. Well, at least I can rest easy knowing she has things under control."
10003030-66 = "All I've had to do is stay here and stare out the window."
10003030-67 = "We're finally at the beach, but the scenery isn't something I can so easily get used to."
10003030-68 = "Is it because I've only been to the beach a few times?"
10003030-69 = "[s] \"It's because there's no time for you to come to the beach, isn't it?\""
10003030-70 = "Yes, you're right. My work usually keeps me busy, so I don't get opportunities to visit resorts like this."
10003030-71 = "I've visited a few times for scouting and such, but that's more for work than anything."
10003030-72 = "I've never had the opportunity to visit the beach for leisure."
10003030-73 = "In fact, this might be the first time I've seen the beach without having anything else to worry about."
10003030-76 = "Sensei, um..."
10003030-77 = "[s] \"What?\""
10003030-78 = "Do you like the beach?"
10003030-79 = "[s1] \"Yes, I do.\"\n[s2] \"I wouldn't say I'm a fan of it.\"\n[s3] \"Hmm. I could take it or leave it.\""
10003030-80 = "So you do like the beach, Sensei."
10003030-81 = "That makes me wonder."
10003030-82 = "Really? Then we aren't so different in that regard."
10003030-83 = "(But it would be a waste to stay inside after coming here.)"
10003030-84 = "You don't say?"
10003030-85 = "Then maybe we're both lacking in familiarity with the beach."
10003030-86 = "I don't believe we'll learn anything by just looking out the window."
10003030-87 = "That isn't what I want—not when visiting at all is such a rare opportunity."
10003030-88 = "I know Ako told me to simply wait here, however..."
10003030-93 = "...would you like to go to the beach with me?"
10003030-94 = "[s] \"You want to go to the beach together?\""
10003030-95 = "Remember that our goal hasn't changed. Our top priority is to make sure that the president has a relaxing summer vacation!"
10003030-96 = "To that end, she mustn't know anything about what's happening outside of the hotel, or else she'll be forced to take matters into her own hands."
10003030-98 = "[ns4] \"(Our top priority is to make sure Hina enjoys herself, but...)\"\n[ns5] \"(Hina enjoying herself would mean leaving this room...)\""
10003030-99 = "Sensei?"
10003030-100 = "Sensei?"
10003030-101 = "[s] \"Could you give me just one moment?\""
10003030-102 = "Of course..."
10003030-106 = "Sensei? What is it? I've got my hands full taking care of the thugs as it is."
10003030-107 = "What? Hina wants to visit the beach?"
10003030-108 = "F-Fine! I'll figure something out!"
10003030-111 = "[ns] \"We're hittin' the beach!\""
10003030-113 = "Oh."
10003030-118 = "So this is what the beach is like."
10003030-119 = "The sand beneath my feet feels a little strange."
10003030-120 = "And I can see my footprints..."
10003030-123 = "...as they're washed away by the waves."
10003030-124 = "How...fascinating."
10003030-125 = "[s6] (Hina's smiling...)\n[s7] (I'm glad we did this.)"
10003030-126 = "It's strange. I rarely get to come to the beach."
10003030-127 = "It's strange. I rarely get to come to the beach."
10003030-128 = "But this time, I get to take a walk with you."
10003030-129 = "Hey, Sensei..."
10003030-132 = "Huh?"
10003030-133 = "[s] \"S-Sorry! Just one sec!\""
10003030-137 = "This is Ako. Everyone, please respond!"
10003030-138 = "[s] \"Wh-What's going on?\""
10003030-139 = "This better be good. Sorta have my hands full right now!"
10003030-140 = "The situation has changed. According to Chinatsu's report, the Splashy Helmet Gang are heading toward the beach sooner than expected!"
10003030-141 = "My apologies. We tried to stop them, but they were faster than we expected and managed to slip through our defenses."
10003030-142 = "A better question is where they managed to get heavy artillery from."
10003030-143 = "We have no choice but to change plans. Iori, continue engaging the thugs and do your best to prevent them from facing the gangsters."
10003030-144 = "All remaining members are to intercept the Splashy Helmet Gang!"
10003030-145 = "As for you, Sensei!"
10003030-146 = "[s] \"Y-Yes?\""
10003030-147 = "I need you to evacuate the beach. We can't afford to have the president get involved, so please return her to the hotel immediately!"
10003030-148 = "Her vacation mustn't be ruined—no matter the cost!"
10003030-150 = "Sensei?"
10003030-151 = "[s] \"Th-That was the hotel! We have to return now, Hiniature!\""
10003030-154 = "H-Hiniature... W-Wait, Sensei. I wasn't finished—"

[translation]
10003030-1 = "第3話;一切都是為了完美的休假"
10003030-2 = "夏季集訓用指揮室"
10003030-3 = "（總算平息了海邊的騷動，和風紀委員們一起回到了指揮室）"
10003030-4 = "雖然暫且收拾乾淨了……"
10003030-5 = "無論是太妹還是頭盔團，看來都只是先遣隊呢。"
10003030-6 = "[s]「先遣隊？」"
10003030-7 = "是的，也就是說剛才只是前哨戰。#n4小時之後的正式戰爭，似乎會集結與剛才無法比擬的人數……"
10003030-8 = "我想他們是打算先設置地雷和陷阱，以便在全面戰爭時多少取得一點優勢吧。"
10003030-9 = "又因為雙方的想法相同，於是撞見了彼此……"
10003030-10 = "真是的，果然是一刻也不得閒啊……"
10003030-11 = "話說，這跟亞子醬說的完全不一樣啊！明明說了這裡是平靜的地方！"
10003030-12 = "抱怨不在這裡的行政官也沒用。#n而且這裡姑且也是格黑娜的自治區，無論如何都得處理才行。"
10003030-13 = "我認為此事還是向委員長報告比較好。"
10003030-14 = "[s]「可是這樣的話，難得為陽奈制定的計畫就……」"
10003030-15 = "嘛，是這樣沒錯……"
10003030-16 = "格黑娜風紀委員會休假什麼的，果然沒那種好事啊。"
10003030-17 = "[s]「伊織都難得穿上泳裝了！」"
10003030-18 = "跟那個沒關係吧！？"
10003030-19 = "這也是沒辦法的事。那就聯絡委員長──"
10003030-23 = "且慢！！！不可以！快住手，千夏！！"
10003030-24 = "亞子醬！？"
10003030-25 = "亞子行政官……？"
10003030-26 = "萬魔殿的那些傢伙，偏偏在最壞的時間點來搗亂……！"
10003030-27 = "但我可不會就此放棄。好不容易才把委員長帶到海邊，#n怎麼能因為幾個問題兒童就讓難得的機會白白泡湯！！"
10003030-28 = "關於聚集在海岸上的太妹和頭盔團，已經請情報部做了調查。#n我現在將整理好的相關資料傳送給各位。"
10003030-29 = "行政官的工作速度，比平時還快呢……"
10003030-30 = "首先從太妹說起──#n他們是自稱「罪i搗亂」的太妹集團，最近剛來到這個海岸區域。"
10003030-31 = "追蹤調查的結果顯示，#n他們似乎在約一個月前於其他海岸地區的勢力鬥爭中落敗，因而流落至此。"
10003030-32 = "而與他們發生衝突的是「溼答答頭盔團」。#n是從以前就一直盤據在飯店附近貧民窟的海邊問題兒童集團。"
10003030-33 = "對於雙方的規模、裝備水準和大致組成都已分析完畢。"
10003030-34 = "綜合上述調查，我得出了一個結論。"
10003030-35 = "[s] 「什麼樣的結論？」"
10003030-36 = "對方只有這種程度的話，即使不向委員長報告，我們也能自己解決！"
10003030-37 = "這樣，真的沒問題嗎……？"
10003030-38 = "（怎麼想都覺得太胡來了……）"
10003030-39 = "陽奈委員長的行程將從4小時後的步行訓練開始。"
10003030-40 = "因此我們要在這4小時內，#n瞞著委員長將太妹集團「罪i搗亂」和「溼答答頭盔團」各個擊破！"
10003030-41 = "簡單來說，就是要在全面戰爭開始之前將引發問題的原因排除對吧……"
10003030-42 = "完全正確！"
10003030-43 = "嘛，確實是有可能成功……但只靠我們真的沒問題嗎？"
10003030-44 = "問題？有也要讓它沒有！除非你想讓奇普托斯滅亡！"
10003030-45 = "就說太誇張了……算了，我會努力。"
10003030-46 = "那麼太妹就交給伊織了。千夏則負責貧民窟的頭盔團。"
10003030-47 = "請把在飯店待命的風紀委員們分成兩組。"
10003030-48 = "而這段期間內，麻煩老師陪著委員長。"
10003030-49 = "[s]「 嗯，了解。」"
10003030-50 = "重點只有一個！這個夏天，要讓委員長好好休息！"
10003030-51 = "因此絕對不能讓他離開房間。#n要是委員長察覺了這場騷動，肯定又會被迫工作個不停的！"
10003030-53 = "出動吧各位！一切都是為了陽奈委員長的暑假！"
10003030-54 = "知道了知道了……"
10003030-55 = "唉……"
10003030-56 = "[ns]「兩位都別太逞強哦！」"
10003030-60 = "[ns]「我回來了……」"
10003030-61 = "啊啊，老師，歡迎回來。#n剛才離開時有點慌張呢，身體還好嗎？"
10003030-62 = "[s] 「啊，這麼說來是有這個設定呢……」"
10003030-63 = "嗯……？設定……？我不太明白老師的意思。#n不過話說回來，外面又開始吵雜起來了呢……戰術訓練需要那麼多槍嗎？"
10003030-64 = "[s]「我想大概是因為幹勁十足吧。」"
10003030-65 = "是嗎，看來亞子也幹勁十足呢。#n託他的福，我才能久違地休息……"
10003030-66 = "唔嗯，不過……我在這裡能做的，也就只有像這樣眺望窗外了吧。"
10003030-67 = "難得來到海邊，卻覺得這裡……這片窗外的風景，實在讓人難以習慣呢。"
10003030-68 = "果然是因為太久沒來海邊了嗎……"
10003030-69 = "[s]「陽奈沒怎麼來過海邊嗎？」"
10003030-70 = "是啊……畢竟委員會平時的工作很忙，跟這樣的度假勝地實在沒什麼緣分。"
10003030-71 = "雖然有因為訓練、勘查場地之類的原因來過，但那些畢竟都是工作的一環……"
10003030-72 = "實在沒什麼機會仔細眺望大海。"
10003030-73 = "嗯，像這樣靜靜地望著大海，對我來說可能是陌生的體驗呢。"
10003030-76 = "那個，老師……"
10003030-77 = "[s]「怎麼了？」"
10003030-78 = "老師……喜歡大海嗎？"
10003030-79 = "[s1]「嗯，喜歡唷。」\n[s2]「這個嘛，我也沒那麼喜歡。」\n[s3]「沒有特別覺得喜歡或不喜歡。」"
10003030-80 = "……原來如此，老師你喜歡大海啊。"
10003030-81 = "那……好像有點好奇。"
10003030-82 = "……原來如此，老師跟我有點類似呢。"
10003030-83 = "（……但是都來到這裡了，不能一直這麼下去……）"
10003030-84 = "嗯？是嗎？"
10003030-85 = "也就是說，老師和我一樣都對大海沒什麼想法……"
10003030-86 = "但如果只是一味在窗邊眺望……也許永遠都無法熟悉大海吧。"
10003030-87 = "我並不希望這樣。#n難得有這種機會……多虧大家才能來到這裡……"
10003030-88 = "我說，老師。#n雖然亞子要我在原地待命……"
10003030-93 = "……要不要一起到海邊去？"
10003030-94 = "[s]「兩個人一起……？」"
10003030-95 = "重點只有一個！這個夏天，要讓委員長好好休息！"
10003030-96 = "因此絕對不能讓他離開房間。#n要是委員長察覺了這場騷動，肯定又會被迫工作個不停的！"
10003030-98 = "[ns4]（雖然亞子這麼說，但這個假期的目的……）\n[ns5]（是為了讓陽奈休息，而不是監禁……）"
10003030-99 = "……老師？"
10003030-100 = "……老師？"
10003030-101 = "[s]「嗯，不過能稍等一下嗎？」"
10003030-102 = "啊，嗯……"
10003030-106 = "喂，老師？有什麼事嗎？我現在正在對付太妹──"
10003030-107 = "什麼？委員長現在想去海邊！？"
10003030-108 = "咦咦！？等等，那個……啊啊，真是的，我知道了！我會想辦法的！交給我吧！"
10003030-111 = "[ns]「好，我們去海邊吧！陽奈！」"
10003030-113 = "……嗯。"
10003030-118 = "這裡就是海灘……"
10003030-119 = "走在沙灘上的觸感……果然還是不太習慣呢。"
10003030-120 = "像這樣在沙灘上留下的腳印……"
10003030-123 = "經過海浪拍打便會消失……"
10003030-124 = "有種……不可思議的感覺。"
10003030-125 = "[s6]（陽奈的笑容……！）\n[s7]（雖然幾經波折，不過能來這裡真是太好了……！）"
10003030-126 = "感覺有點奇怪……明明已經很久沒來海邊了。"
10003030-127 = "感覺有點奇怪……明明已經很久沒來海邊了。"
10003030-128 = "而且居然能像這樣，跟老師在一起……"
10003030-129 = "那個，老師──"
10003030-132 = "……嗯？"
10003030-133 = "[s]「抱歉，稍等一下……！」"
10003030-137 = "這裡是行政官天雨亞子！全體人員聽到請回達！"
10003030-138 = "[s]「咦？」"
10003030-139 = "什麼情況！？我正在拚命對付太妹耶！？"
10003030-140 = "狀況有變。#n根據千夏的報告，頭盔團似乎會比預期提早前往海邊！"
10003030-141 = "抱歉，雖然已經試圖阻止……#n但進攻的速度比想像中還要快，在重建防線前就被突破了……！"
10003030-142 = "啊啊，到底是從哪裡冒出重型戰車的……！？"
10003030-143 = "既然如此也只好全力迎擊了！#n請伊織繼續阻止太妹集團前進，避免他們與頭盔團相遇！"
10003030-144 = "我會將風紀委員會剩餘的所有兵力都派往千夏那邊，優先擊退頭盔團！"
10003030-145 = "然後，老師！"
10003030-146 = "[s]「是，是！？」"
10003030-147 = "為了避免牽連到委員長，請盡快回到飯店！"
10003030-148 = "這一切……都是為了讓委員長休息！"
10003030-150 = "老師，怎麼了……？"
10003030-151 = "[s]「飯，飯店突然聯絡我，先回去一趟吧！」"
10003030-154 = "咦，等一下，老師，我的話還沒說完呢──"

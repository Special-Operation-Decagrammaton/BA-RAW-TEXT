[translation]
2601-1 = "ของเล่นของผู้ใหญ่ 1"
2601-3 = "สำนักงานย่านการค้าเทพเต่าดำ"
2601-4 = "สวัสดีตอนบ่ายค่ะ ท่านประธานรูมิ"
2601-5 = "โอ้ โคโคน่าจังนี่นา? เข้ามาสิ"
2601-6 = "ไม่ใช่โคโคน่าจังค่ะ เรียกฉันว่าผู้ฝึกสอนโคโคน่าสิคะ!"
2601-7 = "ฉันเองก็เป็นผู้ฝึกสอนเต็มตัวคนหนึ่งเหมือนพี่สาวค่ะ เพราะงั้นอย่าทำเหมือนฉันเป็นเด็กนะคะ!"
2601-8 = "ฮ่าๆ ขอโทษที ฉันเรียกเธออย่างนั้นจนติดปากน่ะ"
2601-9 = "ว่าแต่ 'ผู้ฝึกสอนโคโคน่า' มีธุระอะไรกับสำนักงานย่านการค้าเทพเต่าดำเหรอ?"
2601-10 = "หิวข้าวหรือเปล่าล่ะ? ฉันทำข้าวผัดให้เอาไหม?"
2601-11 = "ไม่ค่ะ วันนี้ฉันไม่ได้มากินข้าว ฉันมารับวัตถุดิบทำอาหารค่ะ"
2601-12 = "วัตถุดิบทำอาหาร...?"
2601-13 = "ค่ะ พี่ชุนบอกว่าให้มาที่ย่านการค้าเทพเต่าดำและรับวัตถุดิบทำอาหารไว้เตรียมอาหารให้เด็กๆ ในสวนต้นบ๊วยค่ะ"
2601-14 = "...ไม่ทราบว่าของมาส่งหรือยังคะ?"
2601-15 = "จริงด้วย ฉันนี่แย่จริงๆ! ฉันยุ่งกับงานจนลืมสนิทเลย"
2601-16 = "รอก่อนนะ เดี๋ยวฉันไปเอามาให้"
2601-19 = "ไหนดูซิ กะหล่ำปลี หน่อไม้ แคร์รอต หัวหอม... และเส้นก๋วยเตี๋ยวจีนอบแห้งกับนมถั่วเหลือง"
2601-20 = "อ้อ แล้วก็เอาพีชโดนัทที่ทางเข้าไปด้วยนะ มันมีรสหวานอร่อย เอาไว้เป็นของว่างหลังอาหารล่ะ ทุกคนจะต้องชอบแน่นอน"
2601-21 = "ให้เยอะขนาดนี้จะไม่เป็นอะไรเหรอคะ?"
2601-22 = "ฉันว่าแค่เอาวัตถุดิบที่เหลือจากใช้ในการทำอาหารมา..."
2601-23 = "ไม่เป็นไรหรอก เด็กๆ คืออนาคตของซานไห่จิงนี่นา ต้องกินเยอะๆ สิ จะได้โตไวๆ!"
2601-24 = "อ่า... แต่ว่าโคโคน่าจัง ของมันจะหนักนิดหน่อยนะ ถือไปคนเดียวไหวใช่ไหม?"
2601-25 = "สะ... สบายค่ะ ฉันเป็นผู้ฝึกสอนนะคะ ของหนักแค่นี้ฉันถือคนเดียวไหวค่ะ!"
2601-26 = "ฮุฮุ ถ้าอย่างนั้นก็โล่งอกไปทีนะ"
2601-27 = "อ๊ะ เกือบลืมไปซะแล้วสิ เอาอันนี้ไปด้วยล่ะ"
2601-30 = "ซองนี่มันอะไรกันคะ? นี่ก็เป็นของกินเหรอคะ?"
2601-31 = "เปล่าหรอก นั่นเป็นของพิเศษที่ผู้ฝึกสอนชุนขอผ่านย่านการค้าเทพเต่าดำมาเป็นพิเศษน่ะ"
2601-32 = "มันคือ..."
2601-34 = "ความลับ"
2601-35 = "คะ? จริงๆ เหรอคะ?!"
2601-36 = "มาคิดดูแล้ว ผู้ฝึกสอนชุนขอให้คนอื่นเก็บเรื่องของนี้ไว้เป็นความลับนี่"
2601-37 = "ถึงโคโคน่าจะเป็นน้องของชุน แต่การรักษาความลับของลูกค้าถือเป็นเครดิตของย่านการค้าเรา ขอโทษนะแต่ฉันคงบอกไม่ได้หรอก"
2601-38 = "อืม... พูดแบบนั้นแล้วฉันยิ่งอยากรู้ค่ะ"
2601-40 = "ของแข็งๆ ที่สั่นแล้วมีเสียงก๊องแก๊งออกมา... ของเล่นเหรอ?"
2601-41 = "มันก็ไม่ได้ผิดไปซะทีเดียวหรอก ถ้าให้ตอบก็น่าจะเรียกว่า <ของเล่นของผู้ใหญ่> ได้อยู่หรอกนะ"
2601-42 = "ของเล่น...ของผู้ใหญ่เหรอคะ?"
2601-43 = "อื้อ ของข้างในนี้เป็นของน่ากลัวมากขนาดที่เด็กอย่างโคโคน่าจังรับไม่ได้เลย"
2601-44 = "อย่าคิดจะแอบเปิดดูระหว่างทางดีกว่านะ"
2601-45 = "ถ้าอย่างนั้น ทั้งท่านประธานรูมิ ทั้งพี่ชุนก็ไม่ใช่ผู้ใหญ่เหมือนกันนั่นแหละค่ะ!"
2601-46 = "ฉันเองก็เป็นผู้ฝึกสอนเต็มตัวคนหนึ่ง แต่มีฉันคนเดียวที่ไม่รู้... ไม่ยุติธรรมเลยค่ะ!"
2601-47 = "โคโคน่า บนโลกใบนี้น่ะ มีอีกหลายเรื่องเลยนะที่ไม่ควรรู้"
2601-48 = "ยกตัวอย่างเช่น... ถ้ามีความลับถูกเปิดเผยออกไป กลุ่มผู้บริหาร <มังกรดำ> สภานักเรียนของซานไห่จิง ที่ต้องรักษาความลับสุดยอดของโรงเรียนไว้ จะจัดการกับเหล่าพยานรู้เห็นด้วยใช่มั้ยล่ะ?"
2601-49 = "เพราะเหตุนี้นักเรียนซานไห่จิงถึงเดินหนีเวลาที่จะได้ยินความจริงเกี่ยวกับมังกรดำที่เป็น 'ข้อมูลที่ไม่อยากรู้' ไงล่ะ"
2601-50 = "มะ... มังกรดำเหรอคะ?! ถ้างั้นของในนี้ก็เป็นความลับสุดยอดเกี่ยวกับมังกรดำ...?"
2601-51 = "อืม ฉันคงปฏิเสธไม่ได้แต่ก็... เอาเป็นอย่างนั้นไปก่อนก็แล้วกัน"
2601-52 = "คือว่าโคโคน่าจัง... ถ้าไม่อยากเห็นของอันตราย ก็ส่งของนั่นอย่างเงียบๆ ดีกว่านะ"
2601-53 = "คะ... ค่ะ!"
2601-54 = "ถะ...ถ้างั้นฉันจะไม่แตะต้องซองนี้และส่งให้พี่ชุนเองค่ะ!"
2601-55 = "อื้อ รบกวนด้วยนะ~"
2601-60 = "ฮะฮ่าฮ่า... หลอกเท่านี้ก็น่าจะได้แล้วล่ะนะ...?"
2601-62 = "ถนนย่านการค้าเทพเต่าดำ"
2601-66 = "ของเล่นของผู้ใหญ่เหรอ... ยิ่งคิดก็ยิ่งอยากรู้นะคะเนี่ย"
2601-67 = "แต่มันอาจจะมีเรื่องอันตรายเหมือนอย่างที่ท่านประธานรูมิบอกไว้ก็ได้ ตอนนี้มาตั้งใจกับการส่งของ#nให้ปลอดภัยดีกว่าค่ะ"
2601-68 = "[s] \"สวัสดีโคโคน่า\""
2601-69 = "อ๊ะ คุณครู สวัสดีค่ะ"
2601-70 = "[s1] \"ของดูหนักนะ\"\n[s2] \"ขนของอะไรอยู่น่ะ?\""
2601-71 = "กำลังขนวัตถุดิบทำอาหารที่รับแบ่งมาจากย่านการค้าเทพเต่าดำ..."
2601-72 = "กำลังขนวัตถุดิบทำอาหารที่รับแบ่งมาจากย่านการค้าเทพเต่าดำ..."
2601-73 = "กับ <ของเล่นของผู้ใหญ่> ที่พี่ชุนขอให้เอาไปให้ค่ะ"
2601-74 = "[s] “...ของเล่นของผู้ใหญ่?\""
2601-76 = "...อ๊ะ! ท่านประธานรูมิบอกว่าอย่าไปคนอื่นไว้แล้วแท้ๆ !"
2601-77 = "ทำยังไงดีล่ะ จะมีพวกรุ่นพี่น่ากลัวจากมังกรดำมาจับตัวไปหรือเปล่าก็ไม่รู้..."
2601-78 = "...ไม่สิ คุณครูก็เป็นผู้ใหญ่แล้ว ถึงได้ยินเรื่อง <ของเล่นของผู้ใหญ่> คงจะไม่เป็นไรหรอกมั้ง?"
2601-79 = "[s] \"...นั่นของอะไรน่ะ?\""
2601-80 = "ฉันเองก็ไม่รู้ค่ะ ฉันรู้แค่ว่านี่เป็นของที่พี่ชุนสั่งย่านการค้าเทพเต่าดำมาเป็นพิเศษค่ะ"
2601-81 = "จับจากนอกถุงแล้วดูเหมือนจะเป็นอุปกรณ์แข็งๆ ยาวๆ..."
2601-82 = "ท่านประธานรูมิบอกให้เก็บเรื่องลักษณะของ <ของเล่นของผู้ใหญ่> ไว้เป็นความลับ ไม่งั้นจะเกิดเรื่องใหญ่กับของเล่นของผู้ใหญ่ค่ะ"
2601-83 = "...คุณครูดูแล้วของเล่นของผู้ใหญ่น่าจะเป็นของอะไรเหรอคะ?"
2601-84 = "[s3] “ปืนใหม่เหรอ?\"\n[s4] \"อุปกรณ์เสริมสวยธรรมดาเหรอ?\""
2601-85 = "อืม... อาจจะใช่ก็ได้ค่ะ"
2601-86 = "ถ้าเป็นปืนที่มีอานุภาพรุนแรงและเด็กใช้ไม่ได้ คำเตือนที่ท่านประธานรูมิบอกไว้ก็พอจะเข้าใจได้ค่ะ"
2601-87 = "หรืออาจเป็นอาวุธใหม่ที่น่ากลัวที่ผลิตด้วยเทคโนโลยีต้องห้าม..."
2601-88 = "เอ๋ ถ้าเป็นอุปกรณ์เสริมสวยก็ไม่น่าต้องซ่อนและส่งมอบได้ปกติใช่ไหมคะ?"
2601-89 = "นอกจากนั้นเรื่องที่พี่ชุนซื้ออุปกรณ์แปลกต่างๆ มาดูแลบำรุงผิว เป็นเรื่องที่นักเรียนทุกคนนอกจากฉันรู้ค่ะ"
2601-90 = "ฉันคิดว่าเป็นระเบิดและอาวุธใหม่ที่น่ากลัวมากๆ ถึงขนาดที่เด็กรับไม่ได้ก็ได้ค่ะ"
2601-91 = "หืม? เวลาผ่านไปขนาดนี้แล้วเหรอคะเนี่ย"
2601-92 = "ถ้ายังเอ้อระเหยอยู่แบบนี้จะไม่ทันของว่างตอนบ่ายเอาค่ะ ต้องรีบแล้ว..."
2601-95 = "คุณครูช่วยเก็บเรื่อง <ของเล่นของผู้ใหญ่> เป็นความลับให้หน่อยนะคะ! เหยียบไว้ให้มิดเลยนะคะ!"
2601-101 = "สวนต้นบ๊วย"
2601-103 = "พี่คะ ฉันมาแล้ว!"
2601-104 = "ตายจริง วัตถุดิบเยอะขนาดนี้เลยสินะคะ ขอบคุณโคโคน่าจังมากค่ะที่ไปเอามาให้"
2601-105 = "ท่านประธานรูมิบอกว่านี่เป็นวัตถุดิบที่เหลือและเตรียมมาให้เยอะแยะเลยค่ะ"
2601-106 = "มีกะหล่ำปลี หน่อไม้ แคร์รอต พีชโดนัท"
2601-107 = "และของที่พี่สั่งไว้ด้วยค่ะ"
2601-108 = "คะ?!"
2601-114 = "ทะ... ท่านประธานรูมินี่จริงๆ เลย... บอกแล้วว่าจะไปรับเองวันหลังแท้ๆ!"
2601-115 = "อ่ะแฮ่ม... คือว่าโคโคน่าจัง คงไม่ได้เปิดดูของที่อยู่ข้างในใช่ไหมคะ?"
2601-116 = "อื้อ ท่านประธานรูมิขู่ว่านี่เป็นของที่เด็กไม่ควรเห็นเด็ดขาด..."
2601-117 = "ถ้าอย่างนั้นก็ค่อยยังชั่วหน่อยค่ะ"
2601-118 = "ขอบคุณมากเลยค่ะ โคโคน่าจัง เดี๋ยวจะได้เวลาของว่างตอนบ่ายแล้ว ช่วยจัดเตรียมวัตถุดิบให้ทีนะคะ"
2601-122 = "โคโคน่าจัง โคโคน่าจัง ไปรับของอะไรมาจากย่านการค้าเทพเต่าดำเหรอ?"
2601-123 = "ไม่ใช่โคโคน่าจังนะ ผู้ฝึกสอนโคโคน่าต่างหากล่ะ!"
2601-124 = "ไปเอาวัตถุดิบสำหรับทำอาหารของสวนต้นบ๊วยมาน่ะ เดี๋ยวจะทำของว่างอร่อยๆ มาให้ อดใจรอนิดนึงนะ"
2601-125 = "ถุงที่พี่ชุนถือไปคืออะไรเหรอ? มีเสียงสั่นออกมาด้วย ของกินเหมือนกันเหรอ?"
2601-126 = "เปล่า มันเรียกว่า <ของเล่นของผู้ใหญ่> ไม่ใช่ของกินหรอก..."
2601-127 = "ของเล่นเหรอ? ฉันก็อยากเห็นด้วยคนเหมือนกัน! มันเป็นของเล่นแบบไหนเหรอ?"
2601-128 = "ไม่ได้นะ! ฉันบอกว่าเป็นของเล่นของผู้ใหญ่ไง! ถ้าเด็กเห็นเข้าเป็นเรื่องแน่!"
2601-129 = "ทำไมอ่ะ...? มันเป็นของเล่นน่ากลัวๆ เหรอ?"
2601-130 = "อื้อ เป็นของเล่นแบบที่น่ากลัวสุดๆ เลย! เด็กจะร้องไห้ทันทีที่เห็น เพราะมีหนามแหลมๆ และรูปร่างที่น่าเกลียดน่ากลัวของมัน"
2601-131 = "นะ...น่ากลัวจัง..."
2601-132 = "...บอกไว้ก่อน นี่เป็นความลับนะ ห้ามไปบอกคนอื่นเด็ดขาด!"
2601-133 = "เข้าใจแล้ว"
2601-134 = "ต้องอย่างนี้สิ เด็กดี"
2601-135 = "งั้นฉันจะไปช่วยเตรียมของว่างกับพี่ชุน รออยู่ที่นี่ก่อนนะ"
2601-140 = "เมื่อกี๊พี่ชุนกับโคโคน่าจังถือถุงใบใหญ่มากเข้าไป... เธอเห็นของข้างในไหม?"
2601-141 = "อืม ที่โคโคน่าจังถือคือวัตถุดิบสำหรับทำอาหาร ส่วนที่พี่ชุนถือคือ <ของเล่นของผู้ใหญ่> ล่ะ"
2601-142 = "ของเล่นของผู้ใหญ่เหรอ? มันคืออะไรน่ะ?"
2601-143 = "(กระซิบ) เป็นของที่พี่ชุนแอบซื้อมาจากเทพเต่าดำ ของเล่นนั่นมีรูปร่างน่าเกลียดและมีหนามแหลม..."
2601-144 = "นะ...น่ากลัวจัง..."
2601-145 = "อะไรน่ากลัวเหรอ? กำลังคุยเรื่องน่ากลัวกันอยู่เหรอ?"
2601-146 = "(กระซิบ) อื้อ นี่เป็นความลับนะ พี่ชุน..."
2601-148 = "(หลังจากนั้นเรื่องที่ชุนซื้อของเล่นน่าสงสัยก็ถูกบอกกันปากต่อปากให้หมู่นักเรียนสวนต้นบ๊วย จนกระจายไปทั่วซานไห่จิง...)"

2601-122 = "#1;hide\n#na;매화원 학생 A;코코나 쨩, 코코나 쨩. 현무상회에서 무얼 받아온 거야?"
2601-123 = "3;코코나;05;코코나 쨩이 아니라, 코코나 교관이라니까!\n#3;em;[!]\n#3;m3"
2601-124 = "3;코코나;01;매화원의 음식 조리에 필요한 식자재를 받아왔어. 이걸로 금방 맛있는 간식을 만들어줄 테니까 얌전히 기다려."
2601-125 = "#na;매화원 학생 A;슌 언니가 가져간 봉투는? 뭔가 달각거리는 소리가 났는데, 그것도 음식이야?"

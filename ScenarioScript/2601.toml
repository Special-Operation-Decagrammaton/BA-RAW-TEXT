[translation]
2601-1 = "大人的玩具（１）"
2601-3 = "玄武商會．事務所"
2601-4 = "啊。妳好，瑠美會長。"
2601-5 = "啊啦，心菜醬。歡迎妳。"
2601-6 = "不是心菜醬，是心菜教官！"
2601-7 = "我說了很多次，我和姊姊一樣是個出色的教官哦。請不要把我當成小孩子！"
2601-8 = "哈哈，抱歉抱歉。已經習慣這個稱呼了呀。"
2601-9 = "所以，心菜教官？今天為什麼來玄武商會的事務所？"
2601-10 = "啊，該不會是肚子餓了？要我做炒飯給妳嗎？"
2601-11 = "不，今天不是來吃飯，而是來拿食材的。"
2601-12 = "嗯，食材？"
2601-13 = "是的。旬姊姊請我來玄武商會拿要用來準備梅花園的孩子們餐點的食材……"
2601-14 = "……啊咧，難道沒有聯絡過嗎？"
2601-15 = "啊啊不是，雖然有收到聯絡。是嗎，是今天啊。工作太忙，結果就忘記了呀。"
2601-16 = "等我一下哦，我馬上拿過來。"
2601-19 = "我看看，高麗菜、竹筍、紅蘿蔔、洋蔥……杯麵和豆乳，還有……"
2601-20 = "啊，那邊的水蜜桃也拿去吧。很適合當作甜點，大家會很高興吧。"
2601-21 = "咦，這些全部嗎？收，收下這麼多沒關係嗎……？"
2601-22 = "今天，只是來拿多餘的食材而已……"
2601-23 = "沒關係啦這點程度，因為孩子們是山海經的未來呀。必須多吃一點，快點長大才行！"
2601-24 = "……啊，不過這些全部由心菜醬自己帶回去，有～點重吧？"
2601-25 = "沒，沒有那種事！我好歹也是個教官，這種程度沒問題的！"
2601-26 = "呵呵，那就讓妳帶回去吧。"
2601-27 = "啊，對了。這個也一起拜託妳囉。"
2601-30 = "紙袋……？這個到底是什麼？"
2601-31 = "這是之前，旬教官委託玄武商會的東西唷。"
2601-32 = "裡面是──"
2601-34 = "……祕密，呵呵。"
2601-35 = "咦，咦咦……？"
2601-36 = "抱歉，當事人的旬教官說了「請不要把內容物告訴任何人」。"
2601-37 = "就算是旬的妹妹，我也得保護顧客的情報呢。畢竟和我們的信用問題有著直接關係呀。"
2601-38 = "唔，這樣反而更讓人在意……"
2601-40 = "……真硬呢。搖晃會有聲音……這是，什麼玩具，是嗎？"
2601-41 = "嘛，雖不中亦不遠矣，的感覺吧。嚴格說起來，可以說是「大人的玩具」呢。"
2601-42 = "大人的，玩具……？"
2601-43 = "嗯。那裡面呢，裝著像心菜醬這樣的小孩子看了會出大事，非常非常可怕的東西呀。"
2601-44 = "所以，不要想著「回去路上偷偷確認吧」比較好唷？"
2601-45 = "小孩子小孩子的，真，真要那麼說的話瑠美會長和旬姊姊，也並不是大人啊！"
2601-46 = "明明我也是教官……竟然只不告訴我，太不公平了！"
2601-47 = "呵呵呵。但是啊，心菜醬。這世上，有很多不知道會比較好的事唷。"
2601-48 = "例如……山海經的學生會玄龍門的幹部們，如果是為了保護學校的機密會連同目擊者．關係人一起處分……像這種是很有名的事吧？"
2601-49 = "正因如此，山海經的學生大部分，光是聽到「玄龍門」就會想逃跑。就像是這樣的事情。危險的事物不管是什麼樣的形式，首先不要扯上關係是最好的唷。"
2601-50 = "玄，玄龍門……！？也就是，這裡面有關於玄龍門的祕密……！？"
2601-51 = "嗯……那就，當作是那麼回事吧。"
2601-52 = "所以心菜醬。那個，不要在途中打開要確實送到唷？"
2601-53 = "（吞口水）……是，是的！"
2601-54 = "我知道了。這個會由我不讓任何人看見內容物，好好的負起責任送去給旬姊姊的！"
2601-55 = "嗯，拜託妳了唷。那就，路上小心～"
2601-60 = "哈哈……雖然有點像是威脅，不過這樣就沒問題了吧。"
2601-62 = "玄武商會前"
2601-66 = "不過，不能觸碰的大人的玩具……越想著不要思考，感覺越讓人在意呢。"
2601-67 = "不過我是能幹的孩子。我會依照和瑠美會長約定的一樣，無論如何我都會好好保護，確實送達的。"
2601-68 = "[s] 「啊，心菜？」"
2601-69 = "啊，老師。你好。"
2601-70 = "[s1] 「感覺好像拿了很多很重的東西呢。」\n[s2] 「妳在搬什麼？」"
2601-71 = "那個，我正在把玄武商會分給我們的各種食材和……"
2601-72 = "那個，我正在把玄武商會分給我們的各種食材和……"
2601-73 = "旬姊姊的，「大人的玩具」帶回去。"
2601-74 = "[s] 「……大人的玩具？」"
2601-76 = "……啊啊！明明瑠美會長才剛說了要「保密」的……！"
2601-77 = "怎，怎麼辦……！會不會有從哪裡來的玄龍門的恐怖前輩們出現，把我們帶走……！？"
2601-78 = "……啊，不過老師是大人，就算說了關於「大人的玩具」的事……也沒關係吧？"
2601-79 = "[s] 「……那個，實際上是什麼東西？」"
2601-80 = "那個，我也沒有被告知詳細情形……只知道是，旬姊姊向玄武商會下訂的特別商品。"
2601-81 = "感覺是個有長度，然後硬硬的器具……"
2601-82 = "瑠美會長說了，這個「大人的玩具」的祕密暴露的話，山海經會發生不得了的事情……"
2601-83 = "……老師知道這個，是什麼嗎？"
2601-84 = "[s3] 「新的槍，之類的……？」\n[s4] 「那個，美容工具……之類的東西，吧？」"
2601-85 = "原來如此……確實，是那樣也說不定呢。"
2601-86 = "例如，如果是小孩子沒辦法使用的複雜又強力的槍的話……也能理解瑠美會長會那麼的再三叮嚀。"
2601-87 = "搞不好是，使用過去被禁止的技術製作的，令人驚悚的武器──"
2601-88 = "嗯……不過，美容工具是會像這樣子當作祕密的東西嗎？"
2601-89 = "而且，旬姊姊會為了肌膚的美容買各種奇怪的器具，這種事我以外的學生也知道。不過旬姊姊本人，似乎認為沒有被發現。"
2601-90 = "我認為這個是，這個是小孩子無法使用的恐怖的新型武器或炸彈──"
2601-91 = "啊，說著這些的時候，已經這麼晚了呢？"
2601-92 = "這樣下去的話，會趕不上點心時間。得趕快才行……"
2601-95 = "啊，老師！關於「大人的玩具」要幫我保密哦！絕對，絕對唷！只有「大人的玩具」的事絕對不能說哦！"
2601-101 = "梅花園"
2601-103 = "我回來了～"
2601-104 = "啊啦，心菜。好像很多呢。辛苦了。"
2601-105 = "嗯。瑠美會長說反正都會多餘，所以給了我很多。"
2601-106 = "高麗菜，竹筍，紅蘿蔔、水蜜桃……"
2601-107 = "還，還有這個。旬姊姊下訂的祕密的──"
2601-108 = "啊，咦！？"
2601-114 = "瑠，瑠美會長真是的……！明明說了之後會自己去拿的……！"
2601-115 = "那個……心菜醬？我想應該不會有那種事，不過妳有看過裡面嗎……？"
2601-116 = "沒有看唷。因為瑠美會長說，絕對不可以看……"
2601-117 = "那，那就太好了。"
2601-118 = "總之，辛苦妳了。因為我要去準備大家的點心，所以不會累的話，可以就這樣拜託妳去整理食材我會很高興♪"
2601-122 = "心菜醬心菜醬，從玄武商會拿到了什麼～？"
2601-123 = "不是心菜醬，是心菜教官！"
2601-124 = "只是去把大家吃飯用的食材拿來而已。旬姊姊馬上就會拿出美味的點心了，再等一下哦。"
2601-125 = "剛才旬姊姊，拿著什麼唷？發出喀噠喀噠的聲音，那是什麼～？"
2601-126 = "那個，那不是食物，該說是「大人的玩具」嗎……"
2601-127 = "玩具……？我也想看！是什麼玩具？"
2601-128 = "那，那不行！因為是「大人的玩具」，所以小孩子看了就不好了！"
2601-129 = "……不好？為什麼？是可怕的玩具嗎？"
2601-130 = "沒，沒錯！是非常可怕的玩具！硬硬的，還有像是尖刺的東西，看起來也很噁心還會奇怪的扭動，大家看了肯定會哭的。"
2601-131 = "好，好可怕……"
2601-132 = "……以防萬一，這一定要保密唷！絕對不可以對其他人說哦？"
2601-133 = "嗯，我知道了。"
2601-134 = "好乖好乖，是乖孩子呢。"
2601-135 = "那我就把這邊整理，然後去幫忙旬姊姊準備點心。再稍微等一下哦。"
2601-140 = "吶吶，剛才旬姊姊和心菜醬拿著什麼唷？"
2601-141 = "嗯，心菜醬拿著的是食物，旬姊姊拿的是「大人的玩具」！"
2601-142 = "大人的玩具……？是，什麼？"
2601-143 = "這是祕密哦，是旬姊姊偷偷向玄武商會買的東西，聽說是有著很多尖刺會扭來扭去可怕的玩具……"
2601-144 = "那，那是什麼……"
2601-145 = "在做什麼？講祕密？"
2601-146 = "嗯，這是祕密哦，其實旬姊姊……"
2601-148 = "（這之後『旬購入了可疑的玩具』這項傳聞，從梅花園的幼童們口中到山海經全域，一瞬間就散播開了）"

2601-113 = "1;슌;10\n#1;m1\n#wait;1000"
2601-114 = "1;슌;08;루, 루미 회장님도 참…… 나중에 따로 받으러 간다고 말씀드렸는데!\n#1;em;[땀]\n#1;stiff"
2601-115 = "1;슌;05;흠흠…… 코코나 쨩. 혹시 안에 들어있는 물건을 본 건 아니겠지요?"
2601-116 = "3;코코나;11;응. 루미 회장님이 어린아이는 절대로 보면 안 되는 물건이라고 엄포를 놓으셔서…….\n#3;em;…"
2601-117 = "1;슌;00;그렇다면 다행이지만요."
2601-118 = "1;슌;03;수고 많았어요, 코코나 쨩. 그럼 곧 오후 간식을 내올 테니 식자재 정리는 부탁드릴게요.\n#1;greeting\n#1;em;[반짝]"

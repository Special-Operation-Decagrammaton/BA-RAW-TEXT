[translation]
2601-1 = "#title;어른의 장난감 1"
2601-2 = "#wait;1500"
2601-3 = "#place;현무상회 운영 사무소"
2601-4 = "3;코코나;01;안녕하세요, 루미 회장님. 좋은 오후예요.\n#3;em;[반응]\n#3;a"
2601-5 = "5;루미;03;오, 코코나 쨩이잖아? 어서 와.\n#5;al\n#3;m1\n#5;em;[반짝]"
2601-6 = "3;코코나;10;코코나 쨩이 아니라, 코코나 교관이라니까요!\n#3;hophop"
2601-7 = "3;코코나;12;저도 언니처럼 어엿한 한 사람의 교관이거든요? 정말…… 어린아이처럼 대하지 말아주세요!\n#3;stiff"
2601-8 = "5;루미;00;하하, 미안. 예전부터 불러온 호칭이 입에 붙어서 말이야.\n#5;em;[재잘]"
2601-9 = "5;루미;01;그래서, 우리 '코코나 교관님'께서는 현무상회의 사무소에 무슨 일로 온 거야?"
2601-10 = "5;루미;00;배고파? 볶음밥이라도 만들어줄까?\n#5;em;[음표]"
2601-11 = "3;코코나;00;아뇨, 오늘은 식사를 하러 온 게 아니라, 식자재를 받으러 왔어요.\n#3;em;[반응]"
2601-12 = "5;루미;02;식자재……?\n#5;em;[?]"
2601-13 = "3;코코나;01;네. 슌 언니가 현무상회에 가서 매화원 아이들의 식사 준비에 쓸 식자재를 받아오라고 했었거든요."
2601-14 = "3;코코나;02;……혹시 전달 못 받으셨나요?\n#3;em;…"
2601-15 = "5;루미;02;맞다, 내 정신 좀 봐. 일을 하느라 바빠서 까맣게 잊고 있었네."
2601-16 = "5;루미;01;잠깐만 기다려. 곧 가져다줄게.\n#5;em;[음표]"
2601-17 = "#all;hide"
2601-18 = "3;루미;01\n#3;greeting\n#3;a\n#wait;2000"
2601-19 = "3;루미;02;보자. 양배추랑 죽순, 당근, 양파는 챙겼고…… 거기에 말린 중화면이랑 두유도 넣은 다음……"
2601-20 = "3;루미;01;아, 그리고 입구에 있는 납작 복숭아도 같이 가져가. 달콤하니 식후에 간식으로 내면 다들 좋아할 거야.\n#3;em;[반응]"
2601-21 = "1;코코나;11;이, 이렇게나 많이 챙겨 주셔도 괜찮으신가요?\n#1;em;[땀]\n#1;ar\n#3;m5"
2601-22 = "1;코코나;02;저는 그저, 요리에 쓰고 남은 식자재를 받아오는 것뿐이라고만 들었는데……."
2601-23 = "3;루미;03;괜찮아, 괜찮아. 어린아이들은 산해경의 미래니까. 많이 먹고, 빨리 자라야지!\n#3;em;[재잘]"
2601-24 = "3;루미;01;……아, 하지만 코코나 쨩 혼자 들고 가기에는 조금 무거웠으려나?"
2601-25 = "1;코코나;10;그, 그렇지 않거든요? 저 정도의 교관이라면 이 정도의 짐은 혼자서도 충분하다고요!\n#1;stiff\n#1;em;[빠직]"
2601-26 = "3;루미;00;후후, 그렇다면 다행이지만."
2601-27 = "3;루미;02;아, 또 깜빡할 뻔했네. 이것도 같이 가져가.\n#3;em;[반응]"
2601-28 = "3;루미;01\n#3;m3\n#wait;1000"
2601-29 = "3;루미;01\n#3;greeting\n#wait;1500"
2601-30 = "1;코코나;00;이 봉투는 뭔가요? 이것도 먹는 건가요?\n#1;em;[?]"
2601-31 = "3;루미;00;아니. 그건 슌 교관이 저번에 특별히 현무상회를 통해 특별히 부탁한 물건이야.\n#3;em;[반응]\n#3;m5"
2601-32 = "3;루미;99;그게 뭐냐면—"
2601-33 = "3;루미;99\n#wait;2500\n#3;em;…"
2601-34 = "3;루미;02;……비밀이야."
2601-35 = "1;코코나;11;네? 갑자기?!\n#1;em;[?!]\n#1;shake"
2601-36 = "3;루미;01;그게 생각해보니 슌 교관이 이 물건의 정체에 대해서는 다른 사람들에게 절대 비밀로 해달라고 했었거든.\n#3;em;[반응]"
2601-37 = "3;루미;01;아무리 코코나가 슌의 동생이라고는 하지만, 고객의 비밀 엄수는 상회의 신용과도 관련된 일이니까. 미안하지만 알려줄 수 없어."
2601-38 = "1;코코나;12;우으…… 그렇게 말씀하시니 오히려 더 신경이 쓰이는데요.\n#1;stiff"
2601-39 = "#wait;1000"
2601-40 = "1;코코나;05;뭔가 단단한 게 흔들리며 달그락거리는 소리를 내는 것이…… 장난감인가?\n#1;em;…"
2601-41 = "3;루미;00;뭐, 아주 틀린 이야기는 아니지. 이건 따지자면 <어른의 장난감>이라고도 할 수 있으니까."
2601-42 = "1;코코나;11;어른의…… 장난감이요?\n#1;em;[?]"
2601-43 = "3;루미;02;응. 이 안에는 코코나 쨩 같은 어린아이가 보기에는 감당할 수 없을 정도의 무시무시한 물건이 들어있지."
2601-44 = "3;루미;00;그러니까 가는 길에 몰래라도 확인해 볼 생각은 하지 않는 게 좋을 거야.\n#3;em;[반응]"
2601-45 = "1;코코나;10;그렇게 치면 루미 회장님이나 슌 언니도 어른이 아닌 건 마찬가지잖아요!\n#1;em;[!]"
2601-46 = "1;코코나;12;저도 어엿한 한 사람의 교관인데, 저만 모르고 넘어가야 한다니…… 치사해요!\n#1;hophop"
2601-47 = "3;루미;01;코코나. 세상에는 모르는 게 도움이 되는 정보도 잔뜩 있는 법이야."
2601-48 = "3;루미;99;예를 들자면…… 산해경의 학생회인 <현룡문> 간부들은 학교의 기밀을 유지하기 위해 비밀이 폭로되면 목격자들도 함께 처리해 버린다고 하잖아?\n#3;em;…"
2601-49 = "3;루미;01;그 때문에 산해경의 학생들은 누군가가 현룡문의 실체에 대해 가르쳐 준다고 해도, '알고 싶지 않은 정보'를 듣게 될까 봐 먼저 발을 피하곤 하지."
2601-50 = "1;코코나;11;혀, 현룡문이요……?! 그럼 이 안에 담긴 물건은 현룡문과 관련된 기밀……?\n#1;em;[땀]\n#1;stiff"
2601-51 = "3;루미;99;으음, 뭐라 부인할 수는 없지만…… 일단은 그렇다고 해둘까."
2601-52 = "3;루미;02;그러니까 코코나 쨩. 위험한 꼴을 보고 싶지 않다면 조용히 물건을 전달하는 게 좋을 거야."
2601-53 = "1;코코나;11;……네, 넵!\n#1;em;[땀]\n#1;stiff"
2601-54 = "1;코코나;11;그, 그럼 이 봉투는 건드리지 않고 직접 슌 언니에게 전달할게요!"
2601-55 = "3;루미;03;응. 그럼 잘 부탁할게~.\n#3;em;[음표]"
2601-56 = "#st;[0,0];instant;1;"
2601-57 = "#clearST"
2601-58 = "1;코코나;11\n#1;dl\n#wait;1500"
2601-59 = "3;루미;03\n#3;em;…\n#3;m3\n#wait;2500"
2601-60 = "3;루미;00;하, 하하…… 이만하면 잘 속여넘겼으려나……?"
2601-61 = "#all;hide"
2601-62 = "#place;현무상회 거리"
2601-63 = "5;코코나;12\n#5;al\n#wait;1200"
2601-64 = "5;코코나;12\n#5;m4\n#wait;1000"
2601-65 = "5;코코나;12\n#5;m3\n#wait;1500"
2601-66 = "5;코코나;05;어른의 장난감이라…… 생각하면 할수록 더 신경이 쓰이네요.\n#5;em;…"
2601-67 = "5;코코나;99;하지만 루미 회장님이 말씀하신 것처럼 위험한 일에 휘말릴 수도 있으니 지금은 얌전히 물건을 전달하는 데 집중해야겠어요."
2601-68 = "[s] \"안녕, 코코나.\""
2601-69 = "5;코코나;00;앗, 선생님. 안녕하세요.\n#5;em;[반응]"
2601-70 = "[s1] \"무거워 보이는 짐이네.\"\n[s2] \"무슨 물건을 옮기고 있는 거야?\""
2601-71 = "5;코코나;02;현무상회에서 나누어 받은 각종 식자재랑……"
2601-72 = "5;코코나;02;현무상회에서 나누어 받은 각종 식자재랑……"
2601-73 = "5;코코나;01;슌 언니가 부탁한 <어른의 장난감>을 가져가는 길이었어요.\n#5;em;[음표]"
2601-74 = "[s] \"……어른의 장난감?\""
2601-75 = "#all;hide"
2601-76 = "3;코코나;00;……아앗! 루미 회장님이 다른 사람에게는 절대로 말하지 말라고 했었는데!\n#3;em;[!]"
2601-77 = "3;코코나;11;어, 어쩌죠. 어디선가 현룡문의 무서운 선배들이 나타나 저희를 잡아갈지도…….\n#3;em;[땀]\n#3;stiff"
2601-78 = "3;코코나;05;……아니, 선생님은 이미 어른이시니 <어른의 장난감>에 대해 들어도 괜찮으시겠죠?"
2601-79 = "[s] \"……그게 무슨 물건인데?\""
2601-80 = "3;코코나;02;저도 잘은 모르겠어요. 슌 언니가 현무상회에 특별 주문한 물건이라는 점 이외에는 아무것도 듣지 못했어요.\n#3;em;[반응]"
2601-81 = "3;코코나;99;봉투 밖으로 만져 보기에는 뭔가 길고 단단한 기구 같아 보이는데……."
2601-82 = "3;코코나;05;루미 회장님께서 이 <어른의 장난감>의 정체가 폭로된다면 산해경에 엄청난 일이 생길 거라며 비밀로 해달라고 하셨거든요."
2601-83 = "3;코코나;00;……선생님이 보시기에는 이 어른의 장난감이 무슨 물건처럼 보이시나요?\n#3;em;[?]"
2601-84 = "[s3] \"새로운 총이 아닐까?\"\n[s4] \"단순한 미용 도구가 아닐까?\""
2601-85 = "3;코코나;05;으음…… 그럴지도 모르겠네요.\n#3;em;…"
2601-86 = "3;코코나;10;어린아이는 다루지 못할 만큼 복잡하고 강력한 위력을 가진 총이라면 루미 회장님이 그렇게 주의를 주셨던 것도 이해가 돼요."
2601-87 = "3;코코나;99;어쩌면 금지된 기술로 제작된 무시무시한 신무기일지도—"
2601-88 = "3;코코나;05;에이, 미용 도구라면 이렇게 꼭꼭 숨겨서 전달할 리가 없잖아요?\n#3;em;[반응]"
2601-89 = "3;코코나;00;게다가 슌 언니가 피부 미용을 신경 쓰느라 이것저것 수상한 기구를 구입하는 건 저 이외의 다른 학생들도 다 알고 있는 사실이라고요."
2601-90 = "3;코코나;99;제 생각에는 어린아이는 다루지 못할 정도의 무시무시한 신무기나 폭탄이—"
2601-91 = "3;코코나;00;어라? 벌써 시간이 이렇게 되었네요.\n#3;em;[?]"
2601-92 = "3;코코나;11;계속 늦장을 부리다가는 오후 간식 시간에 늦겠어요. 빨리 서둘러야……\n#3;em;[땀]\n#3;stiff"
2601-93 = "3;코코나;11\n#3;m2\n#wait;600"
2601-94 = "3;코코나;11\n#3;m1\n#wait;1200"
2601-95 = "3;코코나;01;선생님, <어른의 장난감>에 대한 건 비밀로 해주셔야 해요! 꼭이에요, 꼭!\n#3;em;[반응]"

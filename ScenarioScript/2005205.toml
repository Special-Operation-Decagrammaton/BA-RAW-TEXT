2005205-17 = "3;야쿠모;10;붉은겨울의 철도 인프라를 바꿔 나가기 위해서는, 모범적인 철도 운영 사례……."
2005205-18 = "3;야쿠모;09;적어도 정시에 기차가 도착하고, 출발하는 사례를 직접 체험할 필요가 있다고 보입니다!\n#3;em;[!]"

[translation]
2005205-1 = "ตารางเวลา"
2005205-4 = "[ns] \"......\""
2005205-5 = "..."
2005205-6 = "[s1] \"รถไฟ... ไม่มาแฮะ...\"\n[s2] \"แบบนี้ครูคง... ต้องรอจนรากงอกเลยเหรือเปล่า...?\""
2005205-9 = "ถึงจะเป็นรถไฟของโรงเรียนเราก็เถอะ แต่น่าหงุดหงิดจริงๆ เลย..."
2005205-10 = "โครงสร้างพื้นฐานที่ไม่ได้เรื่องแบบนี้ ฉันละอยากเข้าไปแก้ไขจังเลยค่ะ..."
2005205-11 = "ปัญหานี้ก็ไม่ได้เพิ่งเกิดเมื่อ 2-3 วันมานี้ด้วยซ้ำ ตั้งแต่เป็นนักเรียนมา ฉันไม่เคยเห็นรถไฟที่วิ่งวนรอบ#nโรงเรียนมาตรงเวลาเลยค่ะ..."
2005205-12 = "ไม่ได้การแล้วค่ะ คุณครู"
2005205-13 = "ฉัน อารามากิ ยาคุโมะ ตัดสินใจแล้วค่ะ"
2005205-14 = "[s] \"ขออย่าเป็นการตัดสินใจอะไรแปลกๆ เลยนะ...\""
2005205-15 = "อะไรกันคะ คิดว่าฉันเป็นคนยังไงน่ะ?"
2005205-16 = "ทุกการเปลี่ยนแปลงย่อมต้องมีต้นแบบที่ดีค่ะ"
2005205-17 = "เพื่อปรับปรุงโครงสร้างพื้นฐานทางรถไฟในเรดวินเทอร์ เราต้องมีต้นแบบในการบริหารงานรถไฟ..."
2005205-18 = "และต้องได้สัมผัสประสบการณ์จากต้นแบบรถไฟที่อย่างน้อยที่สุดก็มาถึง และออกจากชานชาลา#nให้ตรงเวลาค่ะ!"
2005205-19 = "[s] \"ไม่ได้ยินยาคุโมะพูดจาเข้าท่าแบบนี้มานานเลยนะ!\""
2005205-20 = "ใช่มั้ยล่ะคะ?"
2005205-21 = "แล้วฉันคิดจะทำอะไรน่ะเหรอคะ?"
2005205-22 = "จากนี้ไป... ฉันจะ..."
2005205-23 = "ไปนั่งรถไฟของ D.U. แล้ววิเคราะห์เส้นทางรถไฟกับตารางเวลารถไฟค่ะ!"
2005205-24 = "คุณครูก็ไปด้วยกันนะคะ! ไปเป็นคุณครูที่ปรึกษาในการวิจัยยังไงล่ะคะ!"
2005205-25 = "[s] \"สรุปว่ากลายเป็นแบบนี้สินะ...\""
2005205-26 = "โธ่ ทำไมล่ะคะ นี่คืองานที่เกี่ยวข้องกับการศึกษาของนักเรียนนะคะ?"
2005205-27 = "ถ้าเขียนรายงานได้ดี คุณครูต้องได้รับจัดสรรงบประมาณเพิ่มแน่นอนค่ะ"
2005205-28 = "อ้อ ถ้าอยากได้ความช่วยเหลือในการเขียนเอกสาร 'ประเภทนั้น' ละก็ มาบอกฉันได้เลยค่ะ ฉันจะช่วยให้เขียนออกมาอย่างราบรื่นเลยละ"
2005205-29 = "ฮิ ฮิ ฮิ"
2005205-31 = "(คุณครูเลือกที่จะปฏิเสธข้อเสนอของยาคุโมะ)"
2005205-32 = "(แต่ก็ซื้อตั๋วรถไฟรายวันมา 2 ใบ เพราะคิดว่ายาคุโมะน่าจะอยากดูระบบโครงสร้างพื้นฐานด้านรถไฟ#nนอกเรดวินเทอร์จริงๆ)"
2005205-35 = "อ้อ เป็นอย่างนี้สินะคะ เริ่มจากรถไฟใต้ดินก่อนสินะ..."
2005205-36 = "เดิมทีแล้วระบบรถไฟใต้ดินถูกสร้างขึ้นเพื่อให้รถไฟมาถึงและออกตรงเวลา"
2005205-37 = "นั่งรถไฟใต้ดินก็ได้บรรยากาศไปอีกแบบนะคะ"
2005205-41 = "ถ้างั้น คุณครูคะ การทัวร์รถไฟวันนี้"
2005205-42 = "ฉันขอฝากเนื้อฝากตัวด้วยนะคะ~ ฮิ ฮิ ฮิ"
2005205-49 = "อืม~ รถไฟโคลงเคลงเป็นระยะๆ แล้วก็มีเสียงจากรางด้วย แต่ระบบกันเสียงก็ทำให้เสียงที่ได้ยิน#nค่อนข้างสบายหู แทบจะเป็นเสียง ASMR เลยนะคะ..."
2005205-50 = "ไม่แปลกเลยที่คนที่นั่งรถไฟใต้ดินนานๆ จะรู้สึกง่วงขึ้นมา..."
2005205-51 = "..."
2005205-52 = "zzZ..."
2005205-57 = "ว้าว สถานีนี้สวยจังเลยค่ะ อาคารสถานที่ดูสะอาดตา แล้วก็มีผู้โดยสารเยอะด้วย...!"
2005205-58 = "โอ้โห รถไฟความเร็วสูงแต่ละสายที่วิ่งออกไปยังเขตต่างๆ ของคิโวทอสมาเชื่อมกันอยู่ตรงนี้สินะคะ แค่สายที่เชื่อมกันก็ 32 สายแล้ว... ฮืม ฮืมม"
2005205-59 = "ถ้างั้น คุณครูคะ ปกติเวลามาถึงสถานีรถไฟกลางที่เป็นสถานีสำคัญๆ เราต้องทำอะไรเหรอคะ?"
2005205-60 = "[s3] \"อืม... ควรถามทางให้ดี จะได้ไม่ขึ้นผิดสาย?\"\n[s4] \"ควรตรวจสอบตารางเวลาของรถไฟที่จะขึ้น?\""
2005205-63 = "นั่นก็เป็นสิ่งสำคัญที่ต้องทำค่ะ..."
2005205-64 = "แต่ยังมีอีกอย่างที่ขาดไม่ได้ค่ะ! ไฮไลต์ของการเดินทางด้วยรถไฟ! ก็คือการซื้อข้าวกล่องที่ขายในสถานี#nยังไงล่ะคะ!"
2005205-65 = "[s] \"งั้นหรอกเหรอ?\""
2005205-66 = "โธ่ ทำไมถามแบบนี้ล่ะคะ นี่เป็นสิ่งสำคัญไม่แพ้กันเลยนะ? กองทัพต้องเดินด้วยท้องสิคะ การนั่งรถไฟเที่ยวก็ด้วยค่ะ"
2005205-67 = "เอาละๆ ถ้าดูจากตารางเวลารถไฟสายนี้ ตอนนี้เรามีเวลาเหลือประมาณ 40 นาทีก่อนรถไฟจะมาค่ะ"
2005205-68 = "เป็นเวลาที่พอเหมาะในการไปเลือกซื้อข้าวกล่องเลยค่ะ! ไปกันเถอะ!"
2005205-73 = "โอ้ นี่มันข้าวกล่องรูปไหชื่อดังนี่คะ"
2005205-74 = "มื้ออร่อยที่มีทั้งปลาหมึก ปลาไหลตุ๋น ผักต่างๆ แล้วก็มีเทมปุระปลาหมึกด้วย..."
2005205-75 = "ที่สำคัญก็คือภาชนะที่เป็นรูปไหจริงๆ ค่ะ"
2005205-76 = "ถึงมันจะน้ำหนักมากหน่อย แต่เรื่องนั้นก็คงช่วยไม่ได้นะคะ..."
2005205-77 = "การออกแบบให้ภาชนะเป็นรูปไหที่ใช้จับปลาหมึกถือเป็นการเพิ่มมูลค่าให้กับสินค้า นี่ละค่ะส่วนสำคัญ"
2005205-81 = "อ๊ะ ส่วนนี่ก็ข้าวกล่องหน้าเนื้อสินะคะ"
2005205-82 = "เมนูที่เรียบง่าย แต่ก็มีความเสน่ห์เฉพาะตัวที่หาไม่ได้จากเมนูอื่น"
2005205-83 = "เนื้อวัวปรุงรสด้วยซีอิ๊ว เสิร์ฟพร้อมผักตุ๋นกับไข่ม้วน ขิงสดก็เป็นอะไรที่ขาดไม่ได้ค่ะ"
2005205-84 = "แต่นี่เป็นอาหารที่กินบนรถไฟ ก็เลยมีการดับกลิ่นขิงเพื่อไม่ให้มีกลิ่นฉุนเกินไป"
2005205-85 = "ฉันว่าการคิดถึงผู้บริโภคแบบนี้คือตัวกำหนดว่าสินค้านี้จะขายดีหรือเปล่าค่ะ"
2005205-89 = "ข้าวกล่องรูปรถไฟ!"
2005205-90 = "ภาชนะข้าวกล่องเป็นรูปรถไฟจริงๆ ด้วยค่ะ"
2005205-91 = "ถึงข้างในจะมีอาหารธรรมดาๆ อย่างข้าวปั้น ไก่คาราอาเกะ แล้วก็ไส้กรอก..."
2005205-92 = "แต่การได้ภาชนะข้าวกล่องกลับบ้านเป็นของที่ระลึกก็คุ้มค่าแล้วไม่ใช่เหรอคะ?"
2005205-95 = "และถึงจะไม่ใช่ข้าวกล่องในสถานีรถไฟ แต่ได้ยินว่าไอศกรีมนี้ก็มีชื่อเสียงไม่แพ้กันเลยค่ะ"
2005205-96 = "มีชื่อเสียงยังไงน่ะเหรอคะ? ก็..."
2005205-97 = "มันแข็งโป๊กจนตักกินไม่ได้เลยค่ะ..."
2005205-98 = "มีเรื่องเล่าที่คล้ายตำนานว่าลูกค้าคนหนึ่งโมโหมากจนเอาค้อนมาทุบ แต่กลายเป็นว่าค้อนนั้นกระเด็นไป#nเลยละค่ะ..."
2005205-101 = "อาหารที่ขายในสถานีนี่ยอดเยี่ยมไปเลยนะคะ!"
2005205-102 = "[s] \"อื้อๆ ซื้อไปให้หมดเลย\""
2005205-103 = "คะ?"
2005205-104 = "หมดเลย... เหรอคะ?"
2005205-105 = "คิดว่าที่ฉันสาธยายให้ฟังเพราะอยากซื้อไปเสียทุกอย่างงั้นเหรอคะ?"
2005205-106 = "มันก็จริงอยู่หรอก..."
2005205-107 = "แต่ฉันไม่คิดเลยว่าคุณครูจะใจดีซื้อให้ทุกอย่างแบบนี้..."
2005205-108 = "[s] \"เป็นนักเรียนก็ต้องกินให้อิ่มสิ\""
2005205-109 = "..."
2005205-113 = "ฉันเอาบางอย่างไปเก็บที่เดิมดีกว่าค่ะ"
2005205-114 = "ผิดคาดงั้นเหรอคะ?"
2005205-115 = "ก็นะ..."
2005205-116 = "ตอนไหนที่ควรปฏิเสธ ก็ต้องปฏิเสธสิคะ"
2005205-117 = "อีกอย่าง ต่อให้ซื้อไปทุกอย่าง ยังไงก็กินไม่หมดจนต้องทิ้งอยู่ดีค่ะ แบบนั้นน่ะน่าเสียดายกว่าไม่ได้ซื้อ#nอีกนะคะ"
2005205-139 = "[ns] \"นั่งรถไฟเที่ยววันนี้เป็นไงบ้าง?\""
2005205-140 = "เป็นยังไงน่ะเหรอคะ... ตอนนี้ฉันยังรู้สึกเหมือนอยู่ในความฝันค่ะ แต่ถึงยังไงฉันก็คิดว่า..."
2005205-141 = "อันดับแรกเลย โรงเรียนเราน่าจะต้องจัดไม้หมอนรถไฟใหม่ค่ะ..."
2005205-142 = "[s] \"อ่า นั่นก็เป็นสิ่งสำคัญนะ\""
2005205-143 = "ใช่ค่ะ ถ้าไม้หมอนรถไฟไม่มั่นคง ขบวนรถก็จะทั้งสั่นและส่งเสียงดัง..."
2005205-144 = "และที่สำคัญที่สุดก็คือ รถไฟจะวิ่งด้วยความเร็วสูงสุดไม่ได้ค่ะ"
2005205-145 = "แต่ถ้าจะเปลี่ยนไม้หมอนรถไฟ ก็ต้องมีการปรับปรุงรางรถไฟใหม่ด้วย..."
2005205-146 = "ถ้าดูจากขนาดพื้นที่ของเรดวินเทอร์..."
2005205-147 = "และพิจารณาระยะทางของทางรถไฟที่ตัดผ่านเรดวินเทอร์แล้ว..."
2005205-151 = "..."
2005205-152 = "เฮ้อ"
2005205-153 = "แต่ถึงยังไงฉันก็อยากให้เรดวินเทอร์มีทางรถไฟที่ได้มาตรฐานในสักวันนะคะ"
2005205-154 = "[s5] \"แล้วอยากเขียนตารางเวลาด้วยหรือเปล่า?\"\n[s6] \"แล้วอยากเขียนตารางเดินรถด้วยหรือเปล่า?\""
2005205-157 = "คะ? ให้เขียนอะไรยากๆ แบบนั้นน่ะเหรอคะ? เรื่องนั้นฉันขอปฏิเสธดีกว่าค่ะ"
2005205-158 = "นอกจากการเขียนจะซับซ้อนแล้ว คนที่ทำได้จะถูกมองว่าเป็นนักกลยุทธ์เลยนะคะ?! แล้วถ้าเป็นอย่างนั้น ต่อไปก็จะมีการติดต่อให้ไปทำนู่นนี่อีก..."
2005205-159 = "แบบนั้นก็ทำธุรกิจของชมรมไม่ได้น่ะสิคะ!"
2005205-160 = "สิ่งที่ฉันสนใจก็แค่การวิเคราะห์เส้นทางรถไฟในท้องถิ่นค่ะ! ถ้าเป็นไปได้ก็อยากทำแบบแมนนวลด้วย!"
2005205-161 = "ส่วนเหตุผลที่ฉันเริ่มสนใจในเรื่องรถไฟ ก็เพราะรถไฟเป็นวิธีหนึ่งในการขนส่งหนังสือค่ะ"
2005205-162 = "[s] \"สมแล้วที่เป็นหัวหน้าชมรมสื่อสิ่งพิมพ์...\""
2005205-163 = "แน่นอนอยู่แล้วค่ะ ฉันไม่ได้ตำแหน่งนี้มาเพราะโชคช่วยหรอกนะคะ"
2005205-164 = "ฮิ ฮิ ฮิ"

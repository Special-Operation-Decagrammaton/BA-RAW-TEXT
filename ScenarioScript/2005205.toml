2005205-57 = "3;야쿠모;11;오오, 멋진 역이네요. 시설도 깔끔하고, 이용객 역시 한눈에 봐도 많아 보이고……!\n#3;em;[///]\n#3;a"
2005205-58 = "3;야쿠모;08;오호. 키보토스 각지로 이어지는 고속철도 노선들도, 여기와 이어져 있군요. 이어진 선로 수만 해도 32선……. 흐음, 흐음."
2005205-59 = "3;야쿠모;09;그러면, 선생님. 이렇게 중앙역으로 분류되는 핵심 철도역에 왔을 때, 우리는 무엇을 해야 할까요?\n#3;em;[?]"
2005205-60 = "[s3] \"어…… 노선을 헷갈리지 않기 위해 길 물어보기?\"\n[s4] \"열차 시간표 다시 한번 확인하기?\""

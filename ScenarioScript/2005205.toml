2005205-22 = "3;야쿠모;99;이제부터 저는…… 붉은겨울 바깥……."
2005205-23 = "3;야쿠모;11;특히 D.U.의 철도 위주로 타면서, 노선과 시간표를 분석할 겁니다!\n#3;closeup"
2005205-24 = "3;야쿠모;03;그러니까 선생님도 함께하시죠! 조사 고문 교사로서요!\n#3;closeup"
2005205-25 = "[s] \"결국 그렇게 되나…….\""
2005205-26 = "3;야쿠모;09;에이, 왜 그러세요. 이거 나름 학생의 교육과도 관련된 업무라고요?\n#3;em;[음표]"

[translation]
2005205-1 = "時間表"
2005205-4 = "[ns] 「……」"
2005205-5 = "……"
2005205-6 = "[s1]「火車……還不來呢……」\n[s2]「要是再等下去，老師都要老了哦……？」"
2005205-9 = "真是的，就算是自己的學園……"
2005205-10 = "不過這種不像話的基礎設施，難道就不能想想辦法嗎……"
2005205-11 = "雖然已經不是一天兩天的事了，校內的循環列車從來就沒準時抵達過……"
2005205-12 = "不行，老師。"
2005205-13 = "我荒槇八雲下定決心了。"
2005205-14 = "[s]「拜託不要是什麼奇怪的決心……」"
2005205-15 = "哎唷，沒必要這樣吧？#n難道老師覺得我每次都只會欺騙您嗎？"
2005205-16 = "所有的改變，都需要所謂的模範案例。"
2005205-17 = "想要改變赤冬的鐵路基礎建設，就必須先有一個能夠成為模範的鐵路營運案例……"
2005205-18 = "因此，我至少得親身體驗一次能夠準時抵達、準時出發的列車才行！"
2005205-19 = "[s]「八雲難得說了句像樣的話！」"
2005205-20 = "對吧？"
2005205-21 = "問我接下來要做什麼……？"
2005205-22 = "我接下來要前往赤冬校外……"
2005205-23 = "以D.U.的鐵路為中心進行體驗，在搭乘的同時分析路線與時刻表！"
2005205-24 = "所以請老師也以調查顧問的身分陪我一起來吧！"
2005205-25 = "[s]「結論還是變成這樣了嗎……」"
2005205-26 = "哎呀，怎麼這麼說呢？#n這好歹也是跟學生的教育有關的業務哦？"
2005205-27 = "只要報告書寫得夠好，一定能爭取到預算的。"
2005205-28 = "啊，如果需要製作「那方面」的文書，找我幫忙會輕鬆很多哦。"
2005205-29 = "呣呵呵。"
2005205-31 = "（雖然暫時拒絕了八雲的提議……）"
2005205-32 = "（不過出於體驗鐵路基礎建設確實有其必要的理由，所以購買了兩張鐵路的一日券）"
2005205-35 = "原來如此，先從地鐵開始啊……"
2005205-36 = "雖然地鐵一般都有建立準時抵達、準時出發的系統……"
2005205-37 = "不過這也有它獨特的情調吧。"
2005205-41 = "那麼老師，今天的列車之旅……"
2005205-42 = "還請多多指教囉～呣呵呵。"
2005205-49 = "唔嗯～規律的晃動和軌道的聲音……#n因為有隔音設備的關係，聽起來就像白噪音一樣相對舒服呢……"
2005205-50 = "也難怪有人會一搭上地鐵就想睡覺了……"
2005205-51 = "……"
2005205-52 = "呼嚕……"
2005205-57 = "哦哦，真是座氣派的車站呢。#n不只設備整潔，還能一眼看見許多往來的旅客……！"
2005205-58 = "哦～通往奇普托斯各地的高速鐵路也有經過這裡呢。#n光是連接的軌道數就有32條……嗯嗯。"
2005205-59 = "那麼，老師。#n在來到這種被歸類為中央車站的樞紐火車站時，我們應該做什麼呢？"
2005205-60 = "[s3]「比如……為了避免搞錯路線而先去問路？」\n[s4]「再確認一次列車的時刻表？」"
2005205-63 = "那些當然也是一部份……"
2005205-64 = "不過還有一件更重要的事！#n那就是鐵路旅行的精華──挑選鐵路便當！"
2005205-65 = "[s]「原來是這個啊。」"
2005205-66 = "哎呀，這也是很重要的嘛。#n人總是得先填飽肚子，才能做好接下來的事呀。"
2005205-67 = "來來來，如果這裡有確實遵守時刻表的話，距離發車大約還有四十分鐘。"
2005205-68 = "這段時間正好適合用來挑便當！我們走吧！"
2005205-73 = "哦，這是那款有名的蛸壺章魚便當呢。"
2005205-74 = "有小章魚、燉星鰻、野菜風味飯，再加上炸章魚……"
2005205-75 = "最關鍵的是，這個便當的容器真的是個「壺」。"
2005205-76 = "……雖然因此重了一點，不過這也沒辦法吧。"
2005205-77 = "為捕捉章魚的漁具賦予商品價值，這也是很重要的。"
2005205-81 = "啊，是牛肉蓋飯便當呢。"
2005205-82 = "雖然是平凡又大眾的菜單，卻也有其無可取代的風味。"
2005205-83 = "用醬油調味的牛肉，配上燉菜和玉子燒。紅生薑當然也是不可或缺的。"
2005205-84 = "似乎是因為考慮到會在車上食用……#n為了避免味道太重，還對紅生薑進行過除臭處理呢。"
2005205-85 = "我認為就是這種細膩的體貼，決定了一碗飯最終能不能賣得好哦。"
2005205-89 = "是火車形狀的便當！"
2005205-90 = "直接把便當容器做成了火車的形狀呢。"
2005205-91 = "雖然內容物是相對平凡的飯糰、炸雞塊和香腸之類的東西……"
2005205-92 = "不過光是可以把便當盒當成紀念品，感覺就已經回本了吧？"
2005205-95 = "雖然不是鐵路便當，聽說這款冰淇淋也相當有名。"
2005205-96 = "問我有名在哪裡……？"
2005205-97 = "……好像是因為結凍得太硬的關係，根本沒辦法直接挖來吃的樣子。"
2005205-98 = "我甚至還聽說過有人因為急著想吃而拿槌子敲它，結果槌子反而被彈開的傳說呢……"
2005205-101 = "是不是很厲害呀，鐵路便當！"
2005205-102 = "[s]「好好好，全部都買吧。」"
2005205-103 = "嗯？"
2005205-104 = "全部？"
2005205-105 = "我不就是因為都想買才挑的……？"
2005205-106 = "雖然是這樣沒錯……"
2005205-107 = "但我沒想到老師會這麼爽快地答應要買……"
2005205-108 = "[s]「學生就是要好好吃飯嘛。」"
2005205-109 = "……"
2005205-113 = "我去把幾個放回去。"
2005205-114 = "覺得意外……是嗎？"
2005205-115 = "這個嘛……"
2005205-116 = "該婉拒的時候還是要懂得婉拒才行。"
2005205-117 = "而且買這麼多也吃不完，要是丟掉就太浪費了。"
2005205-139 = "[ns]「覺得列車之旅怎麼樣？」"
2005205-140 = "該怎麼說呢……#n雖然我直到現在還是有種如夢似幻的感覺，不過……"
2005205-141 = "我們似乎得先從枕木開始重新整頓才行呢……"
2005205-142 = "[s]「啊，那確實很重要呢。」"
2005205-143 = "沒錯。如果枕木不穩固的話，震動和噪音就會變得很嚴重。"
2005205-144 = "還有最重要的是，那樣列車根本無法順利加速。"
2005205-145 = "不過要更換枕木，勢必得連鐵軌一起重新翻修……"
2005205-146 = "唔嗯……考慮到赤冬的遼闊程度……"
2005205-147 = "再想想赤冬橫貫鐵路全程的行駛時間……"
2005205-151 = "……"
2005205-152 = "唉……"
2005205-153 = "不過我還是希望有一天，能看到完善的鐵路網鋪滿整個赤冬。"
2005205-154 = "[s5]「你好像對鐵道路線很有興趣呢？」\n[s6]「有沒有考慮過要編寫運行圖之類的？」"
2005205-157 = "咦？編寫運行圖？#n那種事我可敬謝不敏。"
2005205-158 = "除了過程本身就很繁瑣之外，做那種工作的人也會被當成戰略人才來對待吧！？#n如此一來就理所當然地會受到各種干預……"
2005205-159 = "這樣我不就沒辦法做出版事業了嗎！"
2005205-160 = "我感興趣的，充其量只是局部的鐵道路線分析而已！而且最好是處於被動狀態！"
2005205-161 = "況且我之所以會對那方面的事產生興趣，也是因為運送書本必須依靠鐵路的關係。"
2005205-162 = "[s]「八雲真不愧是出版部部長呢……」"
2005205-163 = "那當然囉。這才是我的老本行嘛。"
2005205-164 = "呣呵呵。"

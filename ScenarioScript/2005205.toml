[translation]
2005205-1 = "Timetable"
2005205-4 = "[ns] \"...\""
2005205-5 = "..."
2005205-6 = "[s1] \"The train...isn't coming...\"\n[s2] \"If this keeps up...I think I'm going to wither away...\""
2005205-9 = "Seriously, even if it's my own school..."
2005205-10 = "I can only make so many excuses for our ridiculously horrendous infrastructure."
2005205-11 = "While I shouldn't be surprised, I've never seen the campus shuttle train arrive on time..."
2005205-12 = "This won't do. Sensei."
2005205-13 = "I, Aramaki Yakumo, have made up my mind."
2005205-14 = "[s] \"That makes me extremely nervous...\""
2005205-15 = "Oho, is that what you think of me? I don't ONLY trick and manipulate you, you know."
2005205-16 = "If we want to incite change, the first thing we need to build is our template for best practices."
2005205-17 = "In other words, if we want to give Red Winter's railroad infrastructure a makeover, first we need to have a vision of what exemplary railway operations look like!"
2005205-18 = "At the very least, it seems necessary to personally experience what it's like for trains to have an actual timetable that they actually follow!"
2005205-19 = "[s] \"This is the first reasonable thing you've said in ages!\""
2005205-20 = "Right?"
2005205-21 = "Are you wondering where we're going next?"
2005205-22 = "From now on...outside Red Winter..."
2005205-23 = "I'll ride D.U.'s railroad network, analyzing routes and timetables!"
2005205-24 = "You should join me, Sensei! As an investigative advisor!"
2005205-25 = "[s] \"So this is how it goes, huh...?\""
2005205-26 = "Oh, come on. This is work related to student education, you know?"
2005205-27 = "If you just write up the report properly, the budget will definitely be allocated."
2005205-28 = "Of course, I can give you a hand if you need help with the paperwork. I'll make it easy breezy, just for you."
2005205-29 = "Heh, heh, heh."
2005205-31 = "Although I turned down Yakumo's proposal..."
2005205-32 = "...I did buy us two one-day rail passes, so she could experience public transit outside of Red Winter."
2005205-35 = "Ah, I see. The subway first, huh..."
2005205-36 = "While subways are generally known for their punctual arrival and departure systems..."
2005205-37 = "Well, this has its own sort of charm."
2005205-41 = "Then, Sensei. Today's train tour..."
2005205-42 = "I'll be in your care, tour guide. Heh, heh, heh."
2005205-49 = "Hmm... The rhythmic swaying. The sound of rails. Usually irksome, but the state-of-the-art soundproofing makes it soothing, like white noise."
2005205-50 = "No wonder people say they get sleepy just riding the subway..."
2005205-51 = "..."
2005205-52 = "Zzz..."
2005205-57 = "Wow, what a great station. The facilities are clean and well-maintained, and it's crowded as well!"
2005205-58 = "Aha. So there are high-speed rail lines connecting to various parts of Kivotos that link here. Just the number of connected tracks alone is 32 lines... Hmm, hmm."
2005205-59 = "So then, Sensei. When we arrive at a central station like this, a key railway hub, what should we do?"
2005205-60 = "[s3] \"Um... Ask for directions if you're lost?\"\n[s4] \"Check the train schedule again?\""
2005205-63 = "A practical answer from our teacher."
2005205-64 = "However! There's a much more important train station event we must experience! The signature attraction of traveling by train: choosing your station bento!"
2005205-65 = "[s] \"I see.\""
2005205-66 = "Oh, come on. You have to give me this one—it's important! Human beings can achieve nothing without a good, hot meal first!"
2005205-67 = "Okay. If the train is on schedule, we still have about 40 minutes before boarding."
2005205-68 = "Exactly enough time to get a bento! Let's go!"
2005205-73 = "Oh, this is the famous octopus jar bento!"
2005205-74 = "Braised octopus and conger eel, flavorful rice with vegetables. And octopus tempura too..."
2005205-75 = "Above all, the key point is that this lunchbox container is an actual jar!"
2005205-76 = "...It does make it a bit heavy, but what can you do?"
2005205-77 = "The most important thing is that they turned the jar used to catch the octopus and made it into a marketable product."
2005205-81 = "Ah, it's a beef bowl bento."
2005205-82 = "It's an ordinary, unassuming meal, but that sort of simplicity has its own appeal."
2005205-83 = "Beef flavored with soy sauce, and simmered vegetables with rolled omelet. Pickled ginger is a must, too, of course."
2005205-84 = "Considering it's food meant to be eaten on the train, they deodorized the pickled ginger to minimize the smell."
2005205-85 = "It's this kind of thoughtful attention to detail that determines whether they sell one more bowl or not."
2005205-89 = "A train-shaped bento!"
2005205-90 = "The bento container is literally shaped like a train."
2005205-91 = "The contents are relatively ordinary items like onigiri, karaage, and sausages, but..."
2005205-92 = "Just being able to take the bento container home as a souvenir already makes it worth it!"
2005205-95 = "It's not a station bento, but this ice cream is also quite famous in its own right."
2005205-96 = "Why is it so famous? Well..."
2005205-97 = "...It's frozen so solid that it's impossible to scoop out and eat as is."
2005205-98 = "Apparently there's even a legendary tale about someone who got so frustrated with it, they took to it with a hammer. But the hammer simply bounced right off of the rock-hard ice cream."
2005205-101 = "Aren't all the station products amazing?!"
2005205-102 = "[s] \"Yes, yes. Let's buy them all.\""
2005205-103 = "What?"
2005205-104 = "All...of them?"
2005205-105 = "...You thought that was why I was picking them out?"
2005205-106 = "You're not wrong, but..."
2005205-107 = "I never imagined you'd be so generous as to buy them for me..."
2005205-108 = "[s] \"Students need to eat well.\""
2005205-109 = "..."
2005205-113 = "I'll return a few things and come back."
2005205-114 = "Surprised?"
2005205-115 = "Well..."
2005205-116 = "Everything in moderation."
2005205-117 = "And I can't finish this much regardless. I wouldn't want it to end up in the trash."
2005205-139 = "[ns] \"How was the train trip?\""
2005205-140 = "Well... It still feels a bit like I'm dreaming, but for now..."
2005205-141 = "It looks like we need to start by reorganizing the railroad ties..."
2005205-142 = "[s] \"Ah, that's important.\""
2005205-143 = "Yes. If the railroad ties are unstable, both vibration and noise increase significantly."
2005205-144 = "Above all, the train won't be able to pick up speed properly."
2005205-145 = "But to replace the railroad ties, we'll ultimately have to rebuild the tracks as well..."
2005205-146 = "Let me see... Considering just how utterly HUGE Red Winter is..."
2005205-147 = "...and how long it takes to even traverse from one end of our railway to the other..."
2005205-151 = "..."
2005205-152 = "*sigh*"
2005205-153 = "I guess it's a pipe dream. But a dream, nonetheless."
2005205-154 = "[s5] \"You're really into railway lines, aren't you?\"\n[s6] \"Why not try making a timetable or something like that?\""
2005205-157 = "Huh? Like drawing up plans? I'd really rather not."
2005205-158 = "The work itself is a hassle, but they'd treat the person doing it like a strategic asset! Then, suddenly, won't people be asking for me left and right?!"
2005205-159 = "It'd interfere with running the publishing business!"
2005205-160 = "My interest is strictly limited to analyzing local railway lines! And preferably passively!"
2005205-161 = "I only took interest in the first place because books are always transported by rail."
2005205-162 = "[s] \"You really are the head of the Publishing Department...\""
2005205-163 = "Of course. That's only natural. A pine caterpillar must eat pine needles, right?"
2005205-164 = "Heh, heh, heh."

2005205-11 = "3;야쿠모;04;어제오늘 일도 아니지만, 교내 순환 기차가 제시간에 도착하는 꼴을 못 봤단 말이죠……."
2005205-12 = "3;야쿠모;05;안 되겠습니다. 선생님.\n#3;em;[반응]"
2005205-13 = "3;야쿠모;08;저 아라마키 야쿠모, 결심했습니다."

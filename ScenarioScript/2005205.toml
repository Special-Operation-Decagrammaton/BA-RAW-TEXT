2005205-65 = "[s] \"그거냐.\""
2005205-66 = "3;야쿠모;09;에이, 왜 그러세요. 이거 나름 중요한 거라고요? 사람이 다 먹고살아야 그다음 일을 할 수 있는 법이잖아요."
2005205-67 = "3;야쿠모;08;자, 자. 여기 철도 시간표가 제대로 지켜진다면, 아직 탑승까지는 40분 정도 남았어요."

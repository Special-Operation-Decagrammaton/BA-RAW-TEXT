[translation]
10015040-1 = "第4話;千年的應援團？"
10015040-3 = "[ns]「我累了……」"
10015040-4 = "呵呵，辛苦了。"
10015040-5 = "雖然嘴上這麼說，但老師很快就上手了呢？"
10015040-6 = "堇同學剛才也說……如果老師是千年的學生，希望能讓你以選手的身分去參賽。"
10015040-7 = "[s1]「過獎了……」\n[s2]「我還是在一旁遠遠看著就行了。」"
10015040-10 = "呵呵，但比起觀戰，親自參賽會更加快樂，不是嗎？"
10015040-11 = "所以為了盡可能地讓所有的學生都有出場的機會，#n我們研討會正在整理名單……"
10015040-12 = "但很多學生都不願意參賽，導致選手名單的組成有些困難。"
10015040-13 = "[s]「千年的學生很討厭體育活動嗎？」"
10015040-14 = "雖然也有像訓練部這種例外情況，但大部分確實如此。"
10015040-15 = "千年的校風是鼓勵思考與研究，#n所以學生大多是體力差和討厭與人交流的類型。"
10015040-16 = "就連名聲響亮的千年棒球部，#n也是對球描繪出的拋物線更感興趣，分數反而是其次。"
10015040-17 = "所以希望千年的學生能透過這次的機會，了解運動的魅力，#n互相交流，取得研究時需要的靈感……"
10015040-18 = "或許……對討厭體育的學生來說，這次的大運動會是一場麻煩的慶典。"
10015040-19 = "[s]「希望乃愛的真心能傳達給所有人。」"
10015040-23 = "呵呵……能聽到你這麼說，真的很開心。"
10015040-30 = "啊，終於回來了呢。#n是工程師部的大家所在的工業實習室。"
10015040-31 = "[s3]「……會不會太早來了？」\n[s4]「從委託後到現在也只過了三小時而已……」"
10015040-34 = "這點不必擔心。#n工程師部雖然經常在完成品上附加奇怪的功能，但在時限方面倒是從未失約過。"
10015040-35 = "既然剛才說能在三小時內完成，想必不會出問題的。"
10015040-36 = "我想現在應該已經做出了很棒的應援機器人才對。"
10015040-37 = "[s]「總覺得有種不祥的預感……」"
10015040-38 = "那麼就打擾了～"
10015040-46 = "咦……？"
10015040-48 = "[ns]「……？」"
10015040-49 = "大家……準備好了嗎？"
10015040-50 = "是的，團長！"
10015040-51 = "唔嗯……"
10015040-53 = "加油──！"
10015040-54 = "加油──！"
10015040-55 = "加點機油！"
10015040-56 = "加，加點機油……"
10015040-57 = "響，太小聲了！"
10015040-58 = "加，加點機油！"
10015040-60 = "上吧！上吧！獲勝吧！──千年！"
10015040-61 = "哇──！"
10015040-62 = "哇……"
10015040-69 = "哎呀，真是不錯的應援。#n充滿了熱情和幹勁呢。"
10015040-70 = "老師你也這麼認為對吧？"
10015040-71 = "[s5]「確實是很棒的應援……」\n[s6]「……但怎麼會突然穿上應援團的服裝呢？」"
10015040-74 = "是為了在明天的大運動會上幫選手們加油唷。"
10015040-75 = "畢竟已經有充足的科學根據能佐證「加油可以提升選手們的身體能力」了！"
10015040-76 = "反覆的大聲呼喊會影響大腦皮質，促進腎上腺素的分泌。"
10015040-77 = "再配合我們這身原色的應援團服裝與道具，就能讓選手們的情緒更加激昂！"
10015040-78 = "啊，順帶一提，我們穿的應援團服是響製作的。"
10015040-80 = "原本其實想製作三人份的立領學生服……#n卻因為時間不夠，只完成了詠葉前輩那份……"
10015040-81 = "亞都梨和我穿的是以前製作的啦啦隊服。#n由於是剛開始進行Cosplay時製作的服裝……布料很薄，縫線的手法也不夠成熟……"
10015040-82 = "竟然要穿上這種低完成度的衣服站在別人面前……#n讓人害羞到想找個洞鑽進去……"
10015040-84 = "請別這麼說，響。#n我覺得品質比店裡賣的還要棒哦？"
10015040-85 = "嗯，我也很喜歡這件立領學生服。#n如果可以的話，還想當成校服穿呢。"
10015040-86 = "[s]「我也覺得這身打扮很棒……」"
10015040-88 = "那個……雖然現在氣氛正好，但我得打個岔……"
10015040-94 = "請問剛才委託製作的應援機器人，現在情況怎麼樣了呢？"
10015040-100 = "喔……關於這件事……"
10015040-101 = "製作本身幾近完美……但卻發生了意料之外的事故……"
10015040-102 = "嗯，簡單來說就是……"
10015040-103 = "失敗了！"
10015040-104 = "[s]「工程師部製作機器人失敗了……？」"
10015040-106 = "那個，其實直到機器人的功能演示階段都沒有發生問題……"
10015040-107 = "不過為了更新安全程式，我們開啟了近距離通訊模組。#n結果在啟動的瞬間，它便立刻進入了暴走失控的狀態。"
10015040-108 = "唔唔……雖然我們想盡辦法要讓它停止運作，卻連緊急停止指令也失去效用……#n一陣騷動之後，機器人突然全力逃走了……"
10015040-109 = "結果就是這裡什麼都沒留下。"
10015040-110 = "……沒能遵守約定，真是慚愧。"
10015040-111 = "但我們畢竟賭上了工程師部的名譽，自然得確實達成委託。"
10015040-112 = "既然沒能完成機器人……就由我們在大運動會期間引導觀眾，為選手們加油吧！"
10015040-113 = "「任何情況下都要盡全力解決課題」是我們工程師部的座右銘！"
10015040-114 = "雖然還不是很擅長應援……但我們會盡力而為。"
10015040-116 = "總覺得疑點重重呢……竟然會在啟動近距離通訊模組後立刻發生異常。"
10015040-117 = "我可以看一下機器人的設計圖嗎？"
10015040-118 = "嗯，在這邊。"
10015040-125 = "……機器人的電路看起來沒有任何異常。#n緊急停止鍵的設計也沒錯。"
10015040-126 = "依照這個設計圖製作的話，照理說沒有理由會暴走。"
10015040-127 = "[s]「你只看設計圖就能知道嗎？」"
10015040-128 = "因為我也負責處理千年在專利方面的業務，所以已經很習慣檢查設計圖了。"
10015040-135 = "看不出有什麼特別之處……#n如果不是製作過程中發生重大錯誤……"
10015040-137 = "……就只能懷疑是被駭了。"
10015040-139 = "……被駭？"
10015040-140 = "但是，要在學園外使用近距離無線通訊入侵是不可能的事！"
10015040-142 = "關於這個……我們方才去貝里塔斯的部室時，聽到了這樣的事……"
10015040-147 = "……千年學園內部似乎有企圖妨礙大運動會的勢力存在？"
10015040-148 = "太好了～原來不是我們的設計有問題。"
10015040-149 = "……是駭入的話就沒辦法了呢。#n畢竟工程師部的安全模組是使用市售的插件……"
10015040-151 = "……本來是想等大會結束後再去追捕犯人，#n但既然事情演變成這樣，就不能繼續置之不理。"
10015040-152 = "這件事和駭客有關係，最好向貝里塔斯的成員尋求協助。"
10015040-153 = "嗯，時間所剩不多了，快點去貝里塔斯的部室吧！"

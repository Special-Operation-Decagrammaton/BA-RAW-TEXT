10015040-4 = "3;노아;01;후후, 수고 많으셨습니다.\n#3;em;[반응]\n#3;a"
10015040-5 = "3;노아;01;하지만 말씀과는 달리 금방 능숙하게 잘하시던걸요?\n#3;greeting"
10015040-6 = "3;노아;03;스미레 씨도 아까 말씀하셨지만, 선생님께서 밀레니엄의 학생이었다면 학생 대표로 경기에 출전시키고 싶어질 정도였으니까요.\n#3;em;[반짝]"
10015040-7 = "[s1] \"과찬이야…….\"\n[s2] \"나는 멀리서 참관하는 것만으로도 충분해.\""
10015040-8 = "#wait;10"
10015040-9 = "#wait;10"
10015040-10 = "3;노아;01;후후, 그래도 경기는 지켜보는 것보다 직접 뛰는 게 더 즐겁다고들 하잖아요?"
10015040-11 = "3;노아;01;그래서 저희 세미나에서도 가급적 많은 학생 여러분이 고르게 출전하실 수 있도록 명단을 정리하고 있습니다만……"
10015040-12 = "3;노아;99;경기에 참여하는 걸 꺼리는 학생들이 많아 선수 엔트리를 구성하는 데 다소 어려움이 있네요.\n#3;em;…"
10015040-13 = "[s] \"밀레니엄의 학생들은 체육 활동을 싫어하는 편이야?\""
10015040-14 = "3;노아;01;트레이닝부와 같은 예외도 있습니다만, 대부분은 그렇지요."
10015040-15 = "3;노아;01;사색과 연구를 장려하는 밀레니엄의 교풍 상, 체력이 약하고 남과 어울리기 싫어하는 스타일의 학생들이 많거든요.\n#3;m2"
10015040-16 = "3;노아;02;그나마 이름이 알려진 밀레니엄 야구부조차도 점수보다 야구공의 궤도가 그리는 포물선에 더 관심이 있다고 할 정도니까요."
10015040-17 = "3;노아;99;그래서 이번 기회를 통해 밀레니엄의 학생 여러분들이 스포츠의 매력을 깨닫고, 서로 교류하며 연구에 필요한 새로운 영감을 얻으시길 바랐습니다만……\n#3;greeting"
10015040-18 = "3;노아;01;……어쩌면 체육을 좋아하지 않는 학생들에게 이번 대운동회는 그저 귀찮기만 한, 달갑지 않은 축제일지도 모르겠네요.\n#3;em;…\n#3;m3"

10015040-81 = "3;히비키 응원단ND;19;코토리와 내가 입은 옷은 예전에 만든 치어리더 복장인데, 코스프레를 막 시작했을 때 만든 거라…… 옷감도 얇고 미숙한 부분도 많아서……\n#3;stiff"

[translation]
10015040-1 = "Episode 4; Millennium Cheer Squad...?"
10015040-3 = "[ns] \"I can't feel my body...\""
10015040-4 = "Heehee. You did a great job today."
10015040-5 = "I was surprised at your physical prowess!"
10015040-6 = "You know what, I agree with Sumire! If you were a student, I definitely would've recruited you as an athlete!"
10015040-7 = "[s1] \"You and I both know I wasn't that good...\"\n[s2] \"I'm more than happy just watching from the stands.\""
10015040-10 = "Heehee. But these games are so much more exciting when you're in them!"
10015040-11 = "That's why Seminar tries to organize the rosters so that all the students can have a chance to participate."
10015040-12 = "But in reality, most students don't even want the chance. It's hard finding enough athletes to compete."
10015040-13 = "[s] \"Do the students at Millennium not like physical activities?\""
10015040-14 = "They most definitely do not. But, of course, we have anomalies like the Athletics Training Club."
10015040-15 = "We're Millennium SCIENCE School for a reason. Students come here for the research opportunities, not to throw a ball across a field."
10015040-16 = "Even Millennium's baseball club is more interested in calculating the parabola of a pitcher's toss than actually scoring points."
10015040-17 = "That's just the way it is here. But, to let you in on a little secret, I was really hoping that our students would see the fun in these sports, and it would in turn help them branch out a little bit."
10015040-18 = "...Although I'm starting to realize that it seems more like a huge thorn in everyone's side."
10015040-19 = "[s] \"I really hope everyone will see your efforts, Noa.\""
10015040-23 = "Haha... Thank you. That means a lot."
10015040-30 = "And here we are! The infamous industrial lab, where the engineering magic happens."
10015040-31 = "[s3] \"Are we a little too early?\" \n[s4] \"It's only been three hours since we asked them to make the robot...\""
10015040-34 = "Don't worry. As strange and eccentric as they are, they never fail to meet a deadline."
10015040-35 = "Utaha said it would be done in three hours, so it will be."
10015040-36 = "I can't wait to meet our amazing new cheer bot."
10015040-37 = "[s] \"I don't know why I have such a bad feeling right now...\""
10015040-38 = "Hello! Hey!"
10015040-46 = "Huh...?"
10015040-48 = "[ns] \"...?\""
10015040-49 = "Engineering Department, ready?"
10015040-50 = "Yes!"
10015040-51 = "Y-Yeah..."
10015040-53 = "Fight!"
10015040-54 = "FIGHT!"
10015040-55 = "You can do it!"
10015040-56 = "Youcandoit..."
10015040-57 = "Hibiki! Your voice is too soft! And you have to enunciate!"
10015040-58 = "Y-You can do it!"
10015040-60 = "Win! Millennium!"
10015040-61 = "Yayyyyy!"
10015040-62 = "Yay..."
10015040-69 = "I feel pumped up! What a passionate cheer."
10015040-70 = "Don't you feel the adrenaline, Sensei?"
10015040-71 = "[s5] \"It was great, I just don't know why it happened...\"\n[s6] \"Wh-Why were you cheering?\""
10015040-74 = "Ahem. We're...practicing our cheers for the Millennium athletes tomorrow."
10015040-75 = "I've read lots of books on it! Did you know cheering has been scientifically proven to improve physical abilities?"
10015040-76 = "Loud repetitive sounds stimulate the cerebral cortex and promote adrenaline secretion, thereby increasing electromyographic activity."
10015040-77 = "And aesthetically pleasing things like our color-matched cheer outfits and pom-poms will maximize the athletes' excitement!"
10015040-78 = "Aren't the outfits great? Hibiki made them from scratch! There's nothing she can't make, be it robots or clothes!"
10015040-80 = "I wanted to make the sailor-style uniforms for all of us, but I only had time for Utaha's..."
10015040-81 = "My and Kotori's outfits are from ages ago, when I was first experimenting with cosplay. Please don't look too closely at the stitching..."
10015040-82 = "Augh! I don't want to wear this in front of everyone!"
10015040-84 = "But you look great, Hibiki! And this is a hundred times better than anything you could get at the store!"
10015040-85 = "Thank you again for mine, Hibiki. I honestly prefer it over my Millennium uniform."
10015040-86 = "[s] \"Yeah... You all look great, but...\""
10015040-88 = "I'm in the same boat as Sensei. I'm sorry to be the wet blanket here, but..."
10015040-94 = "...what happened to the cheer bot?"
10015040-100 = "W-Well... About that...!"
10015040-101 = "We were done... We basically finished it...but then...something...unexpected..."
10015040-102 = "To put it simply..."
10015040-103 = "We failed in our task."
10015040-104 = "[s] \"You all couldn't finish the robot...?\""
10015040-106 = "We did technically complete it. But things went haywire when we started testing."
10015040-107 = "We needed to install all the necessary security programs, so we turned on the short-range communication module and it went completely out of control."
10015040-108 = "We did everything we could to stop it, but it wouldn't even listen to our emergency shutdown protocols and it went wheeling down the hallway, causing chaos."
10015040-109 = "In conclusion, we don't have a single scrap of a robot to show you."
10015040-110 = "We at the Engineering Department are deeply ashamed to have failed in our mission."
10015040-111 = "But we are nothing if not dedicated! We made a promise, and we will fulfill our duties."
10015040-112 = "We may not be the cheer bot you requested, but this Cheer Squad is at your service!"
10015040-113 = "Our motto is to solve all issues with all we have, no matter what!"
10015040-114 = "Cheerleading isn't exactly on our resume, but we'll do our best..."
10015040-116 = "Can we back up for a second here? You're positive the issues began as soon as you turned on the short-range communication module?"
10015040-117 = "Let me see the cheer bot blueprints, please."
10015040-118 = "Of course. Here you go."
10015040-125 = "As I thought... The design is perfect. Not a circuit out of place, and the emergency shutdown should have worked when you enacted it."
10015040-126 = "There's no reason for it to have gone haywire based off these plans."
10015040-127 = "[s] \"You can tell that just based off the blueprint?\""
10015040-128 = "Heehee, yes I can! I'm in charge of processing any patents that are submitted to Seminar, so you can consider me a bit of an expert."
10015040-135 = "And considering the Engineering Department's own expertise, I doubt there were any severe production errors."
10015040-137 = "Which leads me to believe it must have been hacked."
10015040-139 = "Hacked?!"
10015040-140 = "How could someone hack such short-range communications from outside the school? That's way beyond any technology we've ever seen."
10015040-142 = "Actually, the Veritas president has an explanation for that."
10015040-147 = "...Some students from within Millennium have been sabotaging the festival?"
10015040-148 = "That's a relief! My self-esteem was taking a real hit thinking there was something wrong with our design."
10015040-149 = "I wouldn't call it a relief. Our security modules use commercial plugins so there's not much we can do to counter this hack."
10015040-151 = "I truly was hoping this could wait until after the field day, but it seems the situation's gone from bad to worse."
10015040-152 = "They say the best way to beat a hacker is with a better hacker."
10015040-153 = "Let's see what Veritas thinks about this situation."

[translation]
10015040-1 = "ตอนที่4;กองเชียร์แห่งมิลเลเนียม?"
10015040-3 = "[ns] \"ครูเหนื่อยไม่ไหวแล้ว...\""
10015040-4 = "ฮุฮุ เหนื่อยหน่อยนะคะ"
10015040-5 = "แต่จะว่าไปคุณครูก็ทำได้คล่องแคล่วดีไม่เหมือนกับที่พูดเลยนะคะ"
10015040-6 = "เมื่อสักครู่คุณสึมิเระก็บอกเหมือนกันค่ะว่า ถ้าคุณครูเป็นนักเรียนของมิลเลเนียมก็คงอยากจะให้เป็น#nตัวแทนลงแข่งขันกีฬาด้วยละค่ะ"
10015040-7 = "[s1] \"ชมกันเกินไปแล้ว...\"\n[s2] \"ครูว่าแค่สังเกตการณ์อยู่ไกลๆ ก็พอแล้วละ\""
10015040-10 = "ฮุฮุ แต่เขาว่ากันว่าการลงแข่งเองยังไงก็ดีกว่านั่งดูเฉยๆ อยู่แล้วไม่ใช่เหรอคะ?"
10015040-11 = "เพราะแบบนั้นพวกเราเซมิน่าเลยพยายามจัดรายชื่อนักเรียนให้ได้มากที่สุดเท่าที่จะทำได้ เพื่อให้ได้ลง#nแข่งกันอย่างทั่วถึงค่ะ..."
10015040-12 = "แต่ก็แน่นอนว่ามีนักเรียนจำนวนมากที่ไม่เต็มใจจะเข้าร่วมการแข่งขัน เพราะฉะนั้นการจัดรายชื่อนักแข่ง#nจึงไม่ใช่เรื่องง่ายเลยละค่ะ"
10015040-13 = "[s] \"นักเรียนมิลเลเนียมส่วนมากไม่ค่อยชอบกิจกรรมออกกำลังกายเหรอ?\""
10015040-14 = "ส่วนมากก็เป็นแบบนั้นค่ะ ถึงจะมีชมรมออกกำลังกายที่เป็นข้อยกเว้นก็เถอะค่ะ"
10015040-15 = "จุดแข็งของมิลเลเนียมคือส่งเสริมการคิดวิเคราะห์และการวิจัย ทำให้นักเรียนส่วนมากไม่ค่อยมีกำลัง#nกายและไม่ชอบทำกิจกรรมกับคนอื่นค่ะ"
10015040-16 = "และแม้แต่ชมรมเบสบอลที่มีชื่อของมิลเลเนียมก็ยังสนใจพาราโบลาของวงโคจรลูกเบสบอลมากกว่า#nการทำคะแนนอีกน่ะค่ะ"
10015040-17 = "ครั้งนี้จึงเป็นโอกาสที่จะทำให้นักเรียนมิลเลเนียมได้สัมผัสกับเสน่ห์ของกีฬา ได้ทำกิจกรรมเพื่อสาน#nสัมพันธ์กัน และถ้าได้รับแรงบันดาลใจใหม่ๆ ในการวิจัยด้วยก็คงดีค่ะ"
10015040-18 = "...แต่ว่างานมหกรรมแข่งขันกีฬาครั้งนี้อาจจะเป็นแค่กิจกรรมที่น่ารำคาญใจ และไม่น่ายินดีสำหรับ#nนักเรียนที่ไม่ชอบออกกำลังกายก็ได้ค่ะ"
10015040-19 = "[s] \"หวังว่าทุกคนจะรับรู้ถึงความหวังดีของโนอาได้นะ\""
10015040-23 = "ฮุฮุ แค่คุณครูพูดแบบนั้นก็รู้สึกขอบคุณแล้วค่ะ"
10015040-30 = "อ่า กลับมาอีกครั้งแล้วสินะคะ นี่คือห้องปฏิบัติงานวิศวกรรมของเหล่าไมสเตอร์แห่งชมรมวิศวกรรมค่ะ"
10015040-31 = "[s3] \"...กลับไปหาตั้งแต่ตอนนี้จะไม่เป็นไรเหรอ?\"\n[s4] \"เพิ่งผ่านไปแค่ 3 ชั่วโมงเองนะ จะไปเลยเหรอ...\""
10015040-34 = "ไม่ต้องกังวลนะคะ ถึงแม้ว่าสมาชิกชมรมวิศวกรรมจะชอบใส่ฟังก์ชันแปลกๆ ลงไปในสิ่งประดิษฐ์ แต่ก็ทำงานเสร็จตรงเวลาทุกครั้งค่ะ"
10015040-35 = "เมื่อสักครู่ก็บอกไว้ว่าจะทำให้เสร็จภายใน 3 ชั่วโมง เพราะฉะนั้นคงไม่มีปัญหาหรอกค่ะ"
10015040-36 = "ตอนนี้ก็คงจะประดิษฐ์หุ่นยนต์เชียร์แบบไม่เหมือนใครเสร็จแล้ว และกำลังรอเราอยู่แน่เลยค่ะ"
10015040-37 = "[s] \"ทำไมรู้สึกไม่สบายใจอย่างบอกไม่ถูกแฮะ...\""
10015040-38 = "ถ้างั้นก็ ขออนุญาตนะคะ~"
10015040-46 = "เอ๊ะ...?"
10015040-48 = "[ns] “...?”"
10015040-49 = "ทุกคน... เตรียมสโลแกน!"
10015040-50 = "รับทราบค่ะ... หัวหน้า!"
10015040-51 = "ค่ะ..."
10015040-53 = "พยายามเข้า!"
10015040-54 = "พยายามเข้า!"
10015040-55 = "สู้ๆ!"
10015040-56 = "สะ... สู้ๆ..."
10015040-57 = "ฮิบิกิเสียงเบาไปแล้วนะ!"
10015040-58 = "สะ... สู้ๆ!"
10015040-60 = "ชนะให้ได้ มิลเลเนียม!"
10015040-61 = "ว้าว!"
10015040-62 = "ว้าว..."
10015040-69 = "อุ๊ย เป็นการเชียร์ที่ไม่เหมือนใครจริงๆ นะคะเนี่ย รู้สึกถึงความกระตือรืนร้นพล่านไปหมดเลยค่ะ"
10015040-70 = "คุณครูเองก็คิดแบบนั้นรึเปล่าคะ?"
10015040-71 = "[s5] \"ก็เป็นการเชียร์ที่สุดยอดจริงๆ ละนะ...\"\n[s6] \"...จู่ๆ ทำไมถึงใส่ชุดเชียร์กันล่ะ?\""
10015040-74 = "อืม ก็จะได้ไปเชียร์นักกีฬาของมิลเลเนียมในงานมหกรรมแข่งขันกีฬาวันพรุ่งนี้ไงล่ะ"
10015040-75 = "นั่นก็เป็นเพราะว่ามันมีข้อพิสูจน์ตามหลักวิทยาศาสตร์เพียงพอแล้วว่า การเชียร์มีผลในการเพิ่ม#nสมรรถภาพทางกายของนักกีฬาค่ะ!"
10015040-76 = "เสียงดังซ้ำๆ จะส่งผลให้เปลือกสมองไปกระตุ้นการหลั่งสารอะดรีนาลีนและจะทำให้กล้ามเนื้อทำงาน#nได้อย่างเต็มประสิทธิภาพค่ะ"
10015040-77 = "ยิ่งไปกว่านั้น ถ้าใส่ชุดเชียร์และถืออุปกรณ์เชียร์ที่มีสีสันสดใสแบบนี้ ก็จะช่วยเพิ่มความกระตือรือร้นให้#nนักกีฬาได้ด้วยค่ะ!"
10015040-78 = "อ่า แล้วก็ต้องบอกว่าชุดเชียร์ที่พวกเราใส่อยู่นี่ ฮิบิกิเป็นคนตัดให้นะคะ"
10015040-80 = "ที่จริงแล้วฉันอยากตัดชุดเชียร์แบบกักคุรันให้ทั้งสามคนเลย แต่ว่าเวลาไม่พอก็เลยตัดได้แค่ของรุ่นพี่#nอุทาฮะ..."
10015040-81 = "ชุดของฉันกับโคโทริเป็นชุดเชียร์ที่ตัดเอาไว้อยู่แล้วตั้งแต่ตอนที่เพิ่งเริ่มแต่งคอสเพลย์... เนื้อผ้าก็เลย#nค่อนข้างบางแล้วก็มีส่วนที่ไม่สมบูรณ์แบบอยู่เยอะ..."
10015040-82 = "พอคิดว่าต้องใส่ชุดที่ตัดอย่างไม่สมบูรณ์แบบแล้วไปยืนต่อหน้าคนอื่น... แค่นั้นก็รู้สึกอายจนอยากจะ#nหนีไปไกลๆ แล้ว..."
10015040-84 = "อย่าพูดอย่างนั้นสิคะ ฮิบิกิ ชุดนี้ดูคุณภาพเยี่ยมกว่าชุดที่ขายตามร้านค้าทั่วไปอีกนะคะ"
10015040-85 = "อืม ฉันก็ชอบชุดกักคุรันนี้มากเลย ชอบมากถึงขนาดที่อยากจะใส่แทนชุดนักเรียนเลยละ"
10015040-86 = "[s] \"ครูก็คิดว่าชุดนี้เท่มากเหมือนกันนะ แต่ว่า...\""
10015040-88 = "ต้องขอโทษที่ขัดจังหวะนะคะ แต่ฉันมีคำถามนิดหน่อย..."
10015040-94 = "หุ่นยนต์เชียร์ที่เราไหว้วานให้ช่วยสร้างตอนนี้ไปถึงไหนแล้วเหรอคะ?"
10015040-100 = "อ๋อ.. เรื่องนั้นน่ะ คือว่า..."
10015040-101 = "พวกเราสร้างขึ้นมาได้อย่างสมบูรณ์แบบเลยละ... แต่จู่ๆ ก็เกิดอุบัติเหตุที่คาดไม่ถึง..."
10015040-102 = "อืม ถ้าจะสรุปผลที่เกิดขึ้นสั้นๆ ก็คือ..."
10015040-103 = "ทำไม่สำเร็จน่ะ!"
10015040-104 = "[s] \"...จะบอกว่าชมรมวิศวกรรมสร้างหุ่นยนต์ไม่สำเร็จงั้นเหรอ?\""
10015040-106 = "คือว่า ตอนที่ทดสอบฟังก์ชันของหุ่นยนต์ก็ยังไม่มีปัญหาอะไร..."
10015040-107 = "แต่พอเปิดโมดูลการสื่อสารระยะใกล้ขึ้นมาเพื่ออัปเดตโปรแกรมรักษาความปลอดภัย อยู่ดีๆ หุ่นยนต์ก็#nเริ่มอาละวาดและควบคุมไม่ได้เลยน่ะ"
10015040-108 = "อึก... พวกเราพยายามหาวิธีที่จะหยุดมัน แต่ว่าคำสั่งหยุดฉุกเฉินก็ใช้ไม่ได้ผล พอก่อความวุ่นวายอยู่สัก#nพักมันก็หนีหายเข้ากลีบเมฆไปเลย..."
10015040-109 = "สรุปสั้นๆ ก็คือไม่มีอะไรเหลืออยู่ที่นี่แล้วน่ะ"
10015040-110 = "...ขายหน้าจริงๆ ที่ทำตามสัญญาไม่ได้"
10015040-111 = "แต่ถึงยังไงเราก็มีชื่อเสียงของชมรมวิศวกรรมเป็นเดิมพัน เพราะฉะนั้นก็จะทำตามคำขอให้ถึงที่สุด"
10015040-112 = "ถึงจะสร้างหุ่นยนต์ไม่สำเร็จ... แต่พวกเราจะทำหน้าที่คอยต้อนรับผู้เข้าชมและเป็นกองเชียร์ให้เหล่า#nนักกีฬาแทนหุ่นยนต์เชียร์ตลอดงานมหกรรมแข่งขันกีฬาให้เอง!"
10015040-113 = "คติของชมรมวิศวกรรมก็คือพยายามให้ถึงที่สุดเพื่อทำภารกิจให้สำเร็จ ไม่ว่าจะเจอสถานการณ์ไหนก็#nตามค่ะ!"
10015040-114 = "ฉันอาจจะไม่ค่อยถนัดเรื่องการเชียร์ ...แต่จะทำให้ดีที่สุดแล้วกัน"
10015040-116 = "มีอะไรที่น่าสงสัยเต็มไปหมดเลยนะคะ ทันทีที่เปิดใช้งานโมดูลการสื่อสารระยะใกล้ก็เริ่มมีพฤติกรรม#nแปลกๆ งั้นเหรอ..."
10015040-117 = "ขอดูแบบร่างของการออกแบบหุ่นยนต์ได้รึเปล่าคะ?"
10015040-118 = "ได้สิ เอ้านี่"
10015040-125 = "เท่าที่ดูแล้ว... วงจรของหุ่นยนต์ก็ไม่มีอะไรผิดปกตินะคะ ปุ่มคำสั่งหยุดฉุกเฉินก็ถูกติดตั้งเอาไว้ถูกต้อง"
10015040-126 = "ถ้าหากสร้างหุ่นยนต์ขึ้นมาตามแผนนี้ก็คงไม่มีทางที่จะใช้งานไม่ได้ค่ะ"
10015040-127 = "[s] \"แค่ดูแบบร่างก็รู้ได้ถึงขั้นนั้นเลยเหรอ?\""
10015040-128 = "ฉันมีหน้าที่ดูแลจัดการเรื่องสิทธิบัตรของมิลเลเนียมด้วยน่ะค่ะ ก็เลยคุ้นชินกับการตรวจสอบแผนงาน#nแล้วละค่ะ"
10015040-135 = "ไม่มีอะไรผิดปกติ... ถ้าไม่มีข้อผิดพลาดร้ายแรงในขั้นตอนการสร้าง ก็หมายความว่า..."
10015040-137 = "...มีโอกาสที่ปัญหาจะเกิดจากการโดนแฮ็กค่ะ"
10015040-139 = "...โดนแฮ็กเหรอ?"
10015040-140 = "แต่ว่า มันไม่มีทางที่จะแฮ็กผ่านระบบสื่อสารระยะใกล้จากพื้นที่ภายนอกโรงเรียนได้เลยนะคะ..."
10015040-142 = "พวกเราก็เพิ่งได้ยินเรื่องนี้มาจากทางชมรมเวอริทัสเหมือนกันค่ะ..."
10015040-147 = "...มีคนภายในโรงเรียนมิลเลเนียมที่ต้องการจะขัดขวางงานมหกรรมแข่งขันกีฬางั้นเหรอ?"
10015040-148 = "โล่งอกไปทีนะคะ~ มันไม่ได้มีปัญหาที่ขั้นตอนของเราสินะคะ"
10015040-149 = "...ถ้าถูกแฮ็กก็คงจะช่วยไม่ได้นะ ชมรมวิศวกรรมใช้โมดูลรักษาความปลอดภัยแบบปลั๊กอินทั่วไป..."
10015040-151 = "...ตอนแรกเราตั้งใจจะตามหาตัวคนร้ายหลังจากการแข่งขันเสร็จสิ้น แต่ถ้าเป็นแบบนี้ก็คงจะปล่อยเอา#nไว้เฉยๆ ไม่ได้แล้วค่ะ"
10015040-152 = "และถ้าเป็นเรื่องเกี่ยวกับการแฮ็กก็คงจะต้องไปขอความช่วยเหลือจากสมาชิกเวอริทัสค่ะ"
10015040-153 = "เอาละ ตอนนี้เหลือเวลาไม่มากแล้ว รีบไปที่ห้องชมรมเวอริทัสกันเถอะค่ะ!"

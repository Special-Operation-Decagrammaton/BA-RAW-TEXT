1013006-7 = "3;니코 스바루;11;선생님 이럴 땐 진짜 싫어요!!!\n#3;stiff"
1013006-8 = "3;니코 스바루;01\n#3;a"
1013006-9 = "3;니코 스바루;02;그래서…… 뭘 사고 싶었냐고요?\n#3;em;[?]"
1013006-10 = "3;니코 스바루;25;그게, 그러니까……."
1013006-11 = "3;니코 스바루;26;…….\n#3;em;[…]"
1013006-12 = "3;니코 스바루;16;악보, 요.\n#fontsize;50\n#3;em;[훌쩍]"
1013006-13 = "[s] \"어? 미안. 잘 안 들렸어.\""
1013006-14 = "3;니코 스바루;11;으, 으으……. 그러니까…….\n#3;stiff"
1013006-15 = "3;니코 스바루;25;……."
1013006-16 = "3;니코 스바루;12;악보요, 악보! 가능하면 하모니카 편곡 가능한 걸로요!\n#3;em;[스팀]\n#3;hophop"

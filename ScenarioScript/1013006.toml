[translation]
1013006-1 = "黃昏河畔的口琴"
1013006-4 = "[ns]「買昴想買的東西！！！」"
1013006-5 = "這樣我壓力很大啦！！！"
1013006-6 = "[s]「很好！這個反應就對了！」"
1013006-7 = "老師這種時候真的很討厭耶！！！"
1013006-9 = "想知道……我想買什麼是嗎？"
1013006-10 = "那個，其實……"
1013006-11 = "……"
1013006-12 = "是樂譜。"
1013006-13 = "[s]「嗯？抱歉，我沒聽清楚。」"
1013006-14 = "唔，唔嗯……就是……"
1013006-15 = "……"
1013006-16 = "是樂譜啦，樂譜！#n如果可以的話，最好是能編成口琴曲的那種！"
1013006-18 = "呼……"
1013006-19 = "[s]「覺得滿足嗎？」"
1013006-20 = "滿足？"
1013006-21 = "感覺好像有，又好像沒有。"
1013006-22 = "不過以第一次購物來說，應該算是滿足了吧。"
1013006-23 = "[s]「……以後再多出來逛逛吧。」"
1013006-24 = "什麼？你說購物嗎？"
1013006-25 = "不行不行，我可沒有那麼多錢啊。"
1013006-26 = "嗯？你說我今天也沒花到多少錢？"
1013006-27 = "這倒是沒錯……"
1013006-28 = "我也多少能夠明白……光是看著商品就能感覺到愉快的心情了。"
1013006-29 = "不過……那不是會讓人產生「希望總有一天能擁有」的慾望嗎？"
1013006-30 = "當然人們為了撫平那樣的慾望，往往會採取一些行動……#n從某種角度來說，確實算是一種驅使人們前進的動力。"
1013006-31 = "然而我認為那種欲望……是很難真正被滿足的。"
1013006-32 = "獲得真正滿足的那天永遠也不會到來──雖然這麼說有點哀傷就是了。"
1013006-33 = "……"
1013006-34 = "老師。或許……我尋求的是一種終極的解決方案也說不定。"
1013006-35 = "當然我也清楚，這種東西就跟「能被滿足的慾望」一樣荒謬。#n但即便如此，我還是希望能抱有一絲絲期待……"
1013006-36 = "期待能在某個地方，找到我所追尋的解答。"
1013006-37 = "因為一直以來……我實在遭遇太多無法解決，或者沒有答案的問題了。"
1013006-38 = "[ns1]「……嗯。」\n[ns2]「我覺得昴完全有資格這麼說。」"
1013006-41 = "……謝謝你。"
1013006-42 = "哈哈。反正就算想再多也不可能實現，終究只是徒勞一場而已。"
1013006-43 = "[ns3]「不是那樣的。」\n[ns4]「就算真是如此，那也不能成為現在不全力以赴的藉口。」"
1013006-46 = "……"
1013006-47 = "[s5]「不管是昴所吹奏的口琴……」\n[s6]「還是買到能用口琴吹奏的樂譜……」\n[s7]「哪怕這一切終將消逝，也同樣是有意義的。」"
1013006-51 = "……！"
1013006-52 = "……是啊。"
1013006-53 = "像音樂這種轉瞬即逝的東西，真的很少見呢。"
1013006-54 = "我有時候，甚至還會覺得有點羞恥。"
1013006-60 = "不需要為自己的興趣感到羞恥……？#n這，這點我也清楚……至少理智上是這樣的。"
1013006-61 = "音樂固然能撫慰心靈，後輩們也都很喜歡……"
1013006-68 = "只是我有時候會懷疑，這會不會已經超過「老派」的程度……"
1013006-69 = "而是真的當作自己是在扮演古典小說或電影裡的主角了。"
1013006-70 = "哇啊……老實說出來還真讓人丟臉……"
1013006-71 = "[ns8]「沒事沒事。」\n[ns9]「就算是又如何呢。」"
1013006-74 = "不要因為事不關己就說得那麼輕鬆……"
1013006-78 = "……"
1013006-79 = "老師。"
1013006-80 = "如果方便的話，要不要一起到河邊走走？"
1013006-81 = "我有東西想讓老師聽。"
1013006-83 = "（於是便照昴所說，一起慢慢散步到了河邊）"
1013006-84 = "（與此同時，太陽也漸漸西沉）"
1013006-86 = "（昴在河邊找了個位子，開始演奏口琴）"
1013006-87 = "（默默迎著傍晚的風，聆聽昴的演奏……）"
1013006-91 = "― [log=니코 스바루]總覺得，有股新鮮的感覺。[/log][wa:3350] "
1013006-93 = "― [log=니코 스바루]像這樣為某個人演奏還是第一次……[/log][wa:3220] "
1013006-96 = "― [log=니코 스바루]感覺，怎麼樣呢？[/log][wa:2370] "
1013006-98 = "― [log=니코 스바루]應該，不奇怪吧……？[/log][wa:2050] "
1013006-101 = "[ns]「怎麼會呢。這是一場最完美的演奏。」"
1013006-103 = "― [log=니코 스바루]那是……那個……[/log][wa:3060] "
1013006-105 = "― [log=니코 스바루]我可以，認為那是真心話嗎？[/log][wa:2440] "
1013006-108 = "― [log=니코 스바루]……謝謝你。[/log][wa:280] "
1013006-111 = "― [log=니코 스바루]其實，要是還能做點別的事情[/log][wa:3190] "
1013006-113 = "― [log=니코 스바루]就好了……[/log][wa:240] "
1013006-116 = "― [log=니코 스바루]現在的我，[/log]"
1013006-118 = "― [log=니코 스바루]只能做到這些……[/log]"
1013006-121 = "― [log=니코 스바루]咦？[/log][wa:410] "
1013006-123 = "― [log=니코 스바루]「希望練習之後能再讓我聽」……？[/log]"
1013006-126 = "― [log=니코 스바루]「因為買了很多樂譜」……？[/log][wa:950] "
1013006-129 = "― [log=니코 스바루]這，這個……[/log][wa:1430] "
1013006-132 = "― [log=니코 스바루]等到……那個時候，[/log][wa:1480] "
1013006-134 = "― [log=니코 스바루]再讓我考慮一下吧。[/log][wa:40] "

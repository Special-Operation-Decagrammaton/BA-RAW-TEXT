1013006-18 = "3;니코 스바루;27;후아…….\n#3;em;[한숨]"
1013006-19 = "[s] \"만족했어?\""
1013006-20 = "3;니코 스바루;04;만족이요?"
1013006-21 = "3;니코 스바루;21;그런 것 같기도 하고, 아닌 것 같기도 하고.\n#3;em;…"
1013006-22 = "3;니코 스바루;00;쇼핑이라는 걸 처음 해 본 것 치고는, 만족했던 것 같기도 하지만요."
1013006-23 = "[s] \"……자주 오자.\""
1013006-24 = "3;니코 스바루;04;네? 쇼핑을요?\n#3;stiff"
1013006-25 = "3;니코 스바루;26;무리예요, 무리. 저 그렇게 돈 없어요.\n#3;em;[세로선]"
1013006-26 = "3;니코 스바루;04;예? 오늘도 정작 그렇게 많은 돈을 쓴 건 아니지 않냐고요?"
1013006-27 = "3;니코 스바루;10;그건 맞긴 한데요……."
1013006-28 = "3;니코 스바루;05;그렇군요……. 그냥 물건을 둘러보는 것만으로도, 즐거워지는 부분이 있으니까…….\n#3;em;[…]"
1013006-29 = "3;니코 스바루;17;하지만 그건, '언젠가 갖고 싶다'는 마음을 품게 하는 거잖아요?"
1013006-30 = "3;니코 스바루;00;물론 그 마음을 달래기 위해서 사람으로 하여금 무언가를 더 하게 만들고, 그 결과 어떤 의미로는 사람을 움직이도록 하는 것이겠지만요.\n#3;em;[재잘]"
1013006-31 = "3;니코 스바루;06;그래도 그런 욕망은, 좀처럼 충족되지 않는 것이라고 생각해요."
1013006-32 = "3;니코 스바루;17;결국, 채워지는 것 따위 없는 거잖아요. 쓸쓸한 이야기지만요."
1013006-33 = "3;니코 스바루;05;……."
1013006-34 = "3;니코 스바루;06;선생님. 저는 어쩌면……. 궁극적인 해결을 원하는 것인지도 몰라요."
1013006-35 = "3;니코 스바루;02;물론 그건 충족될 수 있는 욕망만큼이나 말도 안 되는 것이겠죠. 그래도, 그런 것이 어딘가에는 있지 않을까, 하고……."
1013006-36 = "3;니코 스바루;03;희미한 기대 정도는, 해 보고 싶어요."
1013006-37 = "3;니코 스바루;99;풀리지 않는 문제나 답이 없는 문제 같은 건, 지금까지 너무 많이 겪었거든요."

[translation]
1013006-1 = "ฮาร์โมนิการิมแม่น้ำในยามเย็น"
1013006-4 = "[ns] \"ของที่สุบารุอยากได้!!!\""
1013006-5 = "แบบนี้ฉันลำบากใจนะคะ!!!"
1013006-6 = "[s] \"แบบนี้สิ! ครูรอปฏิกิริยาแบบนี้อยู่เลย!\""
1013006-7 = "ตอนคุณครูเป็นแบบนี้นี่ฉันไม่ชอบที่สุดเลยค่ะ!!!"
1013006-9 = "ฉัน... อยากซื้ออะไรน่ะเหรอคะ?"
1013006-10 = "คือว่า แบบว่า..."
1013006-11 = "......"
1013006-12 = "สมุดโน้ตเพลง... ค่ะ"
1013006-13 = "[s] \"หืม? ว่าไงนะครูไม่ได้ยินเลย\""
1013006-14 = "ฮือ... คือว่า..."
1013006-15 = "......"
1013006-16 = "โน้ตเพลงค่ะ สมุดโน้ตเพลง! ถ้าเป็นไปได้ขอโน้ตเพลงสำหรับฮาร์โมนิกาค่ะ!"
1013006-18 = "ฟู่ว..."
1013006-19 = "[s] \"พอใจรึยัง?\" "
1013006-20 = "พอใจงั้นเหรอคะ?"
1013006-21 = "จะว่าพอใจก็พอใจอยู่ แต่ก็เหมือนยังไม่พอใจค่ะ..."
1013006-22 = "สำหรับการมาซื้อของครั้งแรกในชีวิตก็ถือว่าพอใจอยู่ละมั้งคะ"
1013006-23 = "[s] \"ไว้มากันบ่อยๆ นะ...\" "
1013006-24 = "คะ? มาซื้อของเหรอคะ?"
1013006-25 = "ไม่ไหวหรอกค่ะไม่ไหว ฉันไม่ได้มีเงินขนาดนั้นนะคะ"
1013006-26 = "คะ? วันนี้ก็ไม่ได้ใช้เงินไปเยอะอะไรงั้นเหรอคะ?"
1013006-27 = "มันก็จริงอยู่หรอกค่ะ..."
1013006-28 = "นั่นสินะคะ... แค่ได้เดินดูของเฉยๆ ก็ทำให้รู้สึกสนุกขึ้นมาได้จริงๆ เหมือนกัน..."
1013006-29 = "แต่มันทำให้เกิดความรู้สึกที่ว่า 'สักวันหนึ่งอยากจะได้ของสิ่งนั้นมา' ไม่ใช่เหรอคะ?"
1013006-30 = "แน่นอนว่าความรู้สึกนั้นก็จะผลักดันให้คนเราพยายามทำอะไรบางอย่างเพิ่ม ในอีกความหมายหนึ่งก็คือ มันคงเป็นแรงขับเคลื่อนให้คนเราก้าวเดินต่อไปได้"
1013006-31 = "แต่ฉันคิดว่าความปรารถนาแบบนั้นน่ะ มันยากที่จะเติมเต็มได้จริงๆ ค่ะ "
1013006-32 = "สุดท้ายแล้ว มันก็ไม่มีอะไรที่ถูกเติมเต็มได้จริงๆ หรอกค่ะ เป็นเรื่องที่น่าเศร้าจังเลยนะคะ"
1013006-33 = "......"
1013006-34 = "คุณครูคะ บางทีฉัน... อาจจะกำลังโหยหาการแก้ปัญหาที่สมบูรณ์แบบอยู่ก็ได้ค่ะ"
1013006-35 = "แน่นอนว่ามันคงเป็นเรื่องที่เป็นไปไม่ได้พอๆ กับการเติมเต็มความปรารถนาเหล่านั้นค่ะ แต่ยังไง ฉันก็ยังอยากจะเชื่อว่ามันอาจจะมีอยู่ที่ไหนสักแห่ง..."
1013006-36 = "เพราะงั้นเลยอยากจะลองคาดหวังดูสักครั้งค่ะ"
1013006-37 = "เพราะที่ผ่านมา ฉันเจอแต่ปัญหาที่แก้ไม่ได้ หรือปัญหาที่ไม่มีคำตอบมามากเกินพอแล้วค่ะ"
1013006-38 = "[ns1] \"อื้อ...\"\n[ns2] \"ครูคิดว่าสุบารุมีสิทธิ์ที่จะพูดแบบนั้นนะ\""
1013006-41 = "ขอบคุณค่ะ..."
1013006-42 = "ฮ่าฮ่า แต่ยังไงมันก็คงเป็นการคาดหวังลมๆ แล้งๆ ที่คิดไปก็คงเปล่าประโยชน์สินะคะ"
1013006-43 = "[ns3] \"ไม่หรอก\"\n[ns4] \"ถึงอย่างนั้น แต่ก็ไม่มีเหตุผลที่เราจะไม่ทำให้ดีที่สุดในตอนนี้นี่นา\""
1013006-46 = "......"
1013006-47 = "[s5] \"ทั้งเรื่องที่สุบารุเป่าฮาร์โมนิกา\"\n[s6] \"ทั้งเรื่องที่สุบารุพยายามหาโน้ตเพลงมาเป่าฮาร์โมนิกา\"\n[s7] \"ถึงทุกอย่างจะจางหายไป แต่มันก็มีความหมายนะ\""
1013006-51 = "......!"
1013006-52 = "นั่นสินะคะ..."
1013006-53 = "คงมีไม่กี่อย่างที่จะจางหายไปในทันทีได้เท่ากับดนตรีอีกแล้วละค่ะ"
1013006-54 = "บางทีฉันเองก็รู้สึกเขินๆ อยู่บ้างเหมือนกันนะคะ"
1013006-60 = "ไม่เห็นต้องเขินเรื่องงานอดิเรกเลยงั้นเหรอคะ? ค่ะ เรื่องนั้นฉันเองก็รู้อยู่หรอกค่ะ ทางทฤษฎีก็เข้าใจอยู่หรอกค่ะ"
1013006-61 = "ถึงมันจะช่วยฮีลใจ และพวกรุ่นน้องจะชอบกันมาก แต่ว่า..."
1013006-68 = "บางครั้งฉันก็รู้สึกว่าตัวเองหัวโบราณเกินไป"
1013006-69 = "ฉันอาจจะแค่อยากแสดงตัวตนเหมือนกับเป็นตัวเอกในนิยายหรือภาพยนตร์สมัยเก่าหรือเปล่านะ อะไรแบบนี้น่ะค่ะ"
1013006-70 = "ว้าว... พอพูดเองแบบนี้แล้วก็รู้สึกอายจริงๆ ด้วยค่ะ..."
1013006-71 = "[ns8] \"ไม่เป็นไรนะ ไม่เป็นไรเลย\"\n[ns9] \"ถึงเป็นแบบนั้นแล้วมันยังไงล่ะ\""
1013006-74 = "อย่ามัวแต่พูดแบบไม่สนใจอะไรเหมือนเป็นเรื่องของคนอื่นแบบนั้นสิคะ..."
1013006-78 = "......"
1013006-79 = "คุณครูคะ?"
1013006-80 = "ถ้าคุณครูไม่ว่าอะไร เดินลงไปที่ริมแม่น้ำด้วยกันหน่อยได้มั้ยคะ?"
1013006-81 = "มีสิ่งที่ฉันอยากจะให้คุณครูได้ฟังค่ะ"
1013006-83 = "(คุณครูเดินลงไปที่ริมแม่น้ำอย่างช้าๆ ตามคำชวนของสุบารุ)"
1013006-84 = "(ในระหว่างนั้น พระอาทิตย์ก็ค่อยๆ ลาลับขอบฟ้าไปทีละน้อย)"
1013006-86 = "(สุบารุเลือกที่นั่งริมแม่น้ำ และเริ่มเล่นฮาร์โมนิกา)"
1013006-87 = "(ท่ามกลางสายลมที่พัดผ่าน คุณครูก็ดื่มด่ำไปกับการเล่นฮาร์โมนิกาของสุบารุ...)"
1013006-91 = "― [log=니코 스바루]เป็นความรู้สึกที่แปลกใหม่ดีนะคะ[/log][wa:2590] "
1013006-93 = "― [log=니코 스바루]นี่เป็นครั้งแรกที่ฉันเล่นดนตรีให้ใครคนหนึ่งฟังน่ะ...[/log][wa:1780] "
1013006-96 = "― [log=니코 스바루]เป็นยังไง... บ้างคะ? [/log][wa:1850] "
1013006-98 = "― [log=니코 스바루]รู้สึกว่ามันแปลกหรือเปล่าคะ...?[/log][wa:1210] "
1013006-101 = "[ns] \"ไม่แปลกเลย เล่นได้ดีสุดๆ เลย\""
1013006-103 = "― [log=니코 스바루]ฉันจะคิดว่า... [/log][wa:2780] "
1013006-105 = "― [log=니코 스바루]นั่นมาจากใจจริงได้ใช่มั้ยคะ? [/log][wa:1800] "
1013006-108 = "― [log=니코 스바루]ขอบคุณค่ะ... [/log][wa:10] "
1013006-111 = "― [log=니코 스바루]ที่จริงฉันอยากจะทำอะไร[/log][wa:2830] "
1013006-113 = "― [log=니코 스바루]ให้ได้มากกว่านี้แท้ๆ... [/log][wa:10] "
1013006-116 = "― [log=니코 스바루]แต่ตอนนี้[/log]"
1013006-118 = "― [log=니코 스바루]ฉันทำให้ได้แค่เท่านี้...[/log]"
1013006-121 = "― [log=니코 스바루]คะ?[/log][wa:370] "
1013006-123 = "― [log=니코 스바루]อยากให้ไปฝึกเพิ่มแล้วมาเล่นให้ฟังอีกงั้นเหรอคะ?[/log][wa:10] "
1013006-126 = "― [log=니코 스바루]ไหนๆ ก็ซื้อโน้ตเพลงมาเยอะแยะแล้วงั้นเหรอคะ...?[/log][wa:10] "
1013006-129 = "― [log=니코 스바루]ระ... เรื่องนั้น[/log][wa:1030] "
1013006-132 = "― [log=니코 스바루]ไว้ถึงตอนนั้น [/log][wa:1280] "
1013006-134 = "― [log=니코 스바루]ฉันค่อยคิดอีกครั้งดีกว่าค่ะ [/log][wa:10] "

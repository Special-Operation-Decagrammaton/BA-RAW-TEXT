[translation]
1013006-1 = "Riverside Harmonica"
1013006-4 = "[ns] \"Whatever you want to buy, Subaru!\""
1013006-5 = "Tone it down!"
1013006-6 = "[s] \"That's quite the reaction!\""
1013006-7 = "I really hate when you do this, Sensei!"
1013006-9 = "So, about what I wanted to buy..."
1013006-10 = "R-Right, about that..."
1013006-11 = "..."
1013006-12 = "It's some sheet music."
1013006-13 = "[s] \"Huh? I didn't catch that.\""
1013006-14 = "U-Um... A..."
1013006-15 = "..."
1013006-16 = "Music? Like a score, possibly. Preferably one that transfers easily to the harmonica!"
1013006-18 = "Whoa..."
1013006-19 = "[s] \"Are you happy?\""
1013006-20 = "Happy?"
1013006-21 = "Maybe, maybe not."
1013006-22 = "That said, that was enjoyable for my first time shopping."
1013006-23 = "[s] \"...Let's do this more often.\""
1013006-24 = "Huh? Shopping?"
1013006-25 = "No way. I'm not made of money."
1013006-26 = "Huh? You don't think I spent a lot?"
1013006-27 = "I mean, you're right, but..."
1013006-28 = "Well... You have a point... And it is fun, in its own way, just to browse."
1013006-29 = "But it also creates a sense of yearning that I could do without."
1013006-30 = "Of course, that can create motivation, which translates into action."
1013006-31 = "Still, I think that kind of desire is rarely satisfied, especially through consumption."
1013006-32 = "In the end, no one's ever truly fulfilled, are they? How tragic."
1013006-33 = "..."
1013006-34 = "Sensei, in the end...I may have wanted a final answer. I wanted the anguish to end."
1013006-35 = "Of course, that's just as absurd as endlessly wanting things. Still, I can't help but wonder, in a way, if there is some kind of ultimate happiness we can obtain."
1013006-36 = "I want to hold onto that faint hope, at least."
1013006-37 = "I've faced too many unsolvable problems, so many questions without answers. It's exhausting."
1013006-38 = "[ns1] \"...Very well.\"\n[ns2] \"I think you've earned the right to say that.\""
1013006-41 = "...Thank you."
1013006-42 = "Haha. But it's obvious it won't work anyway. I'm wasting time by overthinking, as usual."
1013006-43 = "[ns3] \"I wouldn't count anything out.\"\n[ns4] \"Simply try your best right now.\""
1013006-46 = "..."
1013006-47 = "[s5] \"Like how you're playing the harmonica.\"\n[s6] \"And how you found a piece you can practice and play.\"\n[s7] \"While all of these things could vanish one day, they still matter now.\""
1013006-51 = "...!"
1013006-52 = "...You're right."
1013006-53 = "I suppose there are few things that vanish instantly, like a played music note."
1013006-54 = "Sometimes I feel a little embarrassed."
1013006-60 = "I shouldn't feel ashamed of my hobby? I know that, intellectually."
1013006-61 = "It soothes my heart, and the juniors really like it too, but..."
1013006-68 = "Sometimes I wonder if I'm not just an old soul..."
1013006-69 = "...but more of an imposter. Like I'm emulating some childish archetype I saw in a classic movie."
1013006-70 = "Oh... That's so embarrassing. Why did I say that?"
1013006-71 = "[ns8] \"It's okay.\"\n[ns9] \"What's so wrong about it?\""
1013006-74 = "Don't keep asking. It's not your problem. It's mine."
1013006-78 = "..."
1013006-79 = "Sensei?"
1013006-80 = "If you'd like, would you walk with me to the riverbank?"
1013006-81 = "I have something I'd like for you to hear."
1013006-83 = "As Subaru requested, I walked down to the river with her."
1013006-84 = "The sun began to set in front of us."
1013006-86 = "Subaru took a seat on the bank and played her harmonica."
1013006-87 = "I silently let the evening's breeze blow over me as I treasured her performance."
1013006-91 = "― [log=니코 스바루]It feels refreshing.[/log][wa:3030] "
1013006-93 = "― [log=니코 스바루]This is my first time playing for a solo audience...[/log][wa:1780] "
1013006-96 = "― [log=니코 스바루]How was it? [/log][wa:2210] "
1013006-98 = "― [log=니코 스바루]Was it weird, or anything...?[/log][wa:1290] "
1013006-101 = "[ns] \"Not at all. It was the best.\""
1013006-103 = "― [log=니코 스바루]That... [/log][wa:3060] "
1013006-105 = "― [log=니코 스바루]I can  trust your words, right?[/log][wa:1720] "
1013006-108 = "― [log=니코 스바루]...Thank you. [/log][wa:10] "
1013006-111 = "― [log=니코 스바루]The thing is, I wish I could[/log][wa:2590] "
1013006-113 = "― [log=니코 스바루]do more things... [/log][wa:10] "
1013006-116 = "― [log=니코 스바루]But right now,[/log]"
1013006-118 = "― [log=니코 스바루]this is about all I can do...[/log]"
1013006-121 = "― [log=니코 스바루]What? [/log][wa:250] "
1013006-123 = "― [log=니코 스바루]You'd love to see me practice and perform for you again?[/log][wa:10] "
1013006-126 = "― [log=니코 스바루]Since I bought so many music sheets...?[/log][wa:10] "
1013006-129 = "― [log=니코 스바루]Th-That's...[/log][wa:1190] "
1013006-132 = "― [log=니코 스바루]I'll...think about it [/log][wa:960] "
1013006-134 = "― [log=니코 스바루]again later. [/log][wa:10] "

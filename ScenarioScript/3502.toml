[translation]
3502-1 = "ของขวัญกับของขวัญ"
3502-3 = "อ๊าาา~ ร้อนจัง~ "
3502-4 = "ว่าแต่โมริโมริคุง... มีโมริโมริคุงอยู่ด้วย~"
3502-5 = "ของหวานหลังมื้อเที่ยงวันนี้คือโมริโมริคุง..."
3502-11 = "หืม...? เอ๊ะ..."
3502-12 = "ประธานคณะกรรมการวินัย...?!"
3502-13 = "หืม...?"
3502-14 = "อ่า นึกว่าใครที่ไหน เมกุเองสินะ มาทำอะไรที่นี่น่ะ...?"
3502-18 = "หรือว่าออนเซ็น...?"
3502-19 = "หืม? เปล่านะ เปล๊าา~! ตอนนี้ไม่ได้มาเพราะเรื่องนั้นสักหน่อย! ฉันแค่มาซื้อโมริโมริคุงไปกินเป็นของ#nหวานหลังมื้อเที่ยงน่ะ!"
3502-20 = "โมริโมริคุง...?"
3502-21 = "พอมานึกๆ ดูแล้ว มีไอศกรีมชื่อแบบนั้นอยู่ในร้านสะดวกซื้อด้วยสินะ"
3502-22 = "งั้นวันนี้ไม่มีงานขุดออนเซ็นแถวนี้หรอกใช่มั้ย?"
3502-23 = "อืม เรื่องนั้น..."
3502-24 = "อ๊ะ... เดี๋ยวนะ!"
3502-25 = "ก่อนอื่นก็ต้องทำ 'สิ่งที่หัวหน้าคาสุมิบอกให้ทำในตอนที่เจอกับคณะกรรมการวินัยหรือพวกวัลคิรี่' ประธานฮินะก็เป็นคณะกรรมการวินัยเหมือนกันนี่นะ!"
3502-26 = "...? ว่ายังไงล่ะ..."
3502-27 = "คือว่า... อืม... เดี๋ยวนะ ขอเวลาคิดหน่อย..."
3502-31 = "คิดออกหรือยัง...?"
3502-32 = "อ๊ะ...!"
3502-33 = "อื้อ นึกออกแล้ว ต้องเอาอันนี้ออกมาก่อน..."
3502-38 = "แถ่นแท้น...!! เจอแล้ว! เอ้า รับไปสิ!"
3502-44 = "แล้วตอนนี้ก็... อื้มๆ! "
3502-45 = "\"ขอบคุณสำหรับการทำงานหนักตลอดเวลาที่ผ่านมา นี่เป็นของขวัญเล็กๆ น้อยๆ จากพวกเรา ไม่ได้มีความหมายอื่นอะไรหรอกนะ ขอฝากเนื้อฝากตัวด้วยค่ะ\""
3502-46 = "......"
3502-47 = "........."
3502-48 = "พอพูดแบบนี้แล้วก็... จบ!"
3502-49 = "ฉันพูดสิ่งที่ต้องพูดไปแล้ว! ส่วนเรื่องออนเซ็นที่ถามมา ฉันเองก็ไม่รู้เหมือนกัน"
3502-50 = "หัวหน้ายังไม่ได้บอกอะไรฉันเหมือนกันน่ะ เอาเถอะ เดี๋ยวถึงเวลาก็คงบอกเองนั่นละ!"
3502-51 = "งั้นเหรอ... ถ้างั้นอันนี้..."
3502-55 = "ฮู่ว..."
3502-56 = "เมกุ..."
3502-57 = "คาสุมิขอให้เธอทำแบบนี้ แล้วเธอก็ทำแบบนี้กับคนอื่นด้วยงั้นเหรอ?"
3502-58 = "หืม...? เปล่านะ? ยังไม่เคยทำเลย?"
3502-59 = "นี่เป็นครั้งแรกที่ฉันได้เจอกับประธานคณะกรรมการวินัยฮินะนี่นา ว่าแต่ว่ามีอะไรเหรอ?"
3502-60 = "เข้าใจแล้ว งั้นก็ค่อยยังชั่วหน่อย"
3502-61 = "ถ้างั้นฉันมีเรื่องอยากรบกวนหน่อย ถ้าเธอสะดวกละก็ ช่วยรับฟังคำขอของฉันหน่อยได้รึเปล่า?"
3502-62 = "คำขอ...? อะไรล่ะ?"
3502-63 = "เอาเถอะ มันก็ได้อยู่หรอกนะ บอกมาได้เลย!"
3502-64 = "ขอบใจนะ ถ้างั้น..."
3502-65 = "ช่วยไปบอกคาสุมิเรื่องที่ฉันทำให้หน่อยแล้วกันนะ"
3502-71 = "...!? เฮือก!?"
3502-72 = "ซองถูกฉีกเป็นชิ้นๆ เลย...!?"
3502-73 = "ถ้าเป็นคาสุมิละก็ คงไม่ต้องอธิบายอะไรก็คงจะเข้าใจเอง แต่ว่าถ้าจะให้อธิบายเป็นคำพูดละก็..."
3502-74 = "ฝากบอกเธอหน่อยแล้วกันว่า 'ถ้าฉันจับได้ว่าเธอไปทำแบบนี้ที่ไหนอีก ฉันจะจัดการอย่างสาสมเลย'"
3502-75 = "'ฉันขอเตือนนะว่าให้เลิกทำนิสัยเดิมๆ ในเกเฮนน่าให้เร็วที่สุด'"
3502-78 = "ฝากไปบอกด้วยล่ะ เข้าใจมั้ย?"
3502-79 = "อะ... อื้ม... อะไรกันเนี่ย? ให้ของขวัญไปแล้ว แต่เธอกลับทำลายของขวัญทิ้ง... แล้วให้ไปบอกว่า#nทำลายของขวัญแล้วด้วย..."
3502-80 = "อืมมม เป็นการกระทำที่เข้าใจยากจริงๆ แฮะ..."
3502-81 = "เฮ้อ เอาเถอะ ทั้งประธานคณะกรรมการวินัยกับหัวหน้าของเราต่างก็ฉลาดกันทั้งคู่ ก็คงมีเหตุผลอยู่นั่น#nแหละ เข้าใจแล้วละ!"
3502-82 = "ฮุฮุ ขอบใจนะ"
3502-83 = "อ้อ... จะว่าไปแล้ว..."
3502-84 = "ประธานคณะกรรมการวินัย!! รอเดี๋ยวก่อนนะ!! เดี๋ยวฉันกลับมา!"
3502-89 = "มาแล้ว...!"
3502-90 = "รอนานเลยใช่มั้ย! เอ้า รับไปสิ!"
3502-95 = "นี่มัน... ไอศกรีม?"
3502-96 = "โมริโมริคุง...? ให้ฉันงั้นเหรอ?"
3502-97 = "อื้อ ฉันซื้อมาเยอะเพราะจะเอาไปแบ่งให้คนอื่นๆ น่ะ งั้นเอาให้ประธานคณะกรรมการวินัยสักอันคงไม่#nเป็นไรหรอก"
3502-98 = "วันนี้อากาศร้อนสุดๆ ในวันแบบนี้เหมาะจะกินโมริโมริคุงที่สุดเลย!"
3502-99 = "เอ๊ะ..."
3502-100 = "ยังไงก็เถอะ ประธานคณะกรรมการวินัยไม่ชอบที่ได้รับของขวัญจากพวกเราเหรอ? เมื่อกี้ถึงฉีกทิ้งไป#nแบบนั้นน่ะ"
3502-101 = "โทษทีๆ ฉันเผลอถามไปโดยไม่รู้ตัวน่ะ"
3502-105 = "เปล่า... ไม่ใช่แบบนั้นหรอก"
3502-106 = "ขอบคุณนะ เมกุ ฉันจะกินให้อร่อยเลย"
3502-107 = "หืม...? แบบนี้แสดงว่าโอเคใช่มั้ยนะ? แล้วมันต่างกันตรงไหนนะ...?"
3502-108 = "เรื่องนั้นไปถามคาสุมิเองก็แล้วกัน"
3502-109 = "..."
3502-110 = "เมกุ..."
3502-111 = "หืม? ฉันเหรอ?"
3502-112 = "ตอนนี้เมกุเป็นนักเรียนชั้นปี 3 ใช่มั้ย? ดูเข้ากับคาสุมิได้ดีเลยนะ..."
3502-113 = "ฉันรู้ว่าชมรมพัฒนาออนเซ็นมีอยู่ตั้งแต่ก่อนหน้านั้นแล้ว แต่จำนวนสมาชิกมีอยู่นับจำนวนได้ ซึ่งมันต่างออกไปจากตอนนี้เลย..."
3502-114 = "ตอนนั้นเมกุเป็นหัวหน้าชมรมใช่มั้ย? ส่วนคาสุมิเข้ามาทีหลัง "
3502-115 = "หืม? อ้อ~ อื้อ! พอหัวหน้าคาสุมิมา ฉันก็เลยให้เธอรับตำแหน่งหัวหน้าแทนน่ะ"
3502-116 = "อ่า~! ประธานคณะกรรมการวินัยนี่รู้ทุกเรื่องอย่างที่คิดเลยนะ!"
3502-117 = "ก็ไม่ขนาดนั้นหรอก..."
3502-118 = "ฮืม..."
3502-119 = "แล้วคาสุมิเป็นฝ่ายพูดก่อนเหรอ? ว่า 'ฉันจะรับตำแหน่งหัวหน้าต่อเอง' น่ะ?"
3502-120 = "อื้อ"
3502-121 = "งั้นเหรอ..."
3502-122 = "อ๊ะ เหมือนจะต่างไปนิดหน่อยนะ?"
3502-123 = "...? หืม?"
3502-124 = "อันที่จริงเธอถามฉันว่า 'อยากทำอะไร?' ฉันก็เลยตอบไปว่า 'อยากขุดออนเซ็นต่อไปเรื่อยๆ!' น่ะ!!"
3502-125 = "พอฉันพูดไปแบบนั้น หัวหน้าก็ตอบมาว่า 'งั้นฉันจะทำให้เป็นแบบนั้นเอง'"
3502-126 = "ตั้งแต่นั้นมา ฉันก็เลยได้ขุดออนเซ็นมาตลอดสมใจอยากเลยไงล่ะ!! แล้วก็มีสมาชิกคนอื่นๆ เพิ่มขึ้นเยอะเลยด้วย!!"
3502-130 = "งั้นเหรอ..."
3502-131 = "ฉันก็คิดแล้วว่ามันคงจะเป็นแบบนั้นน่ะ เพราะพวกคน 'ที่นั่น' ให้ความสำคัญกับคำสัญญาด้วยวาจา#nแบบนี้มาแต่ไหนแต่ไรแล้ว"
3502-134 = "หืม...? พูดถึงเรื่องอะไรน่ะ?"
3502-135 = "ไม่มีอะไรหรอก ฉันแค่พูดคนเดียวน่ะ"
3502-136 = "ฉันมีงานที่ต้องทำอยู่ คงต้องขอตัวก่อนนะ ช่วงนี้อากาศร้อนมาก เมกุก็ระวังสุขภาพด้วยนะ แล้วก็คาสุมิด้วย..."
3502-137 = "ฝากบอกคาสุมิด้วยล่ะว่าอย่าก่อเรื่องให้มันมากเกินไป..."
3502-138 = "อื้อ! ประธานคณะกรรมการวินัยเองก็กลับดีๆ ล่ะ~"
3502-142 = "ฉันเองก็กลับไปบ้างดีกว่า~"
3502-144 = "เรื่องมันก็เป็นแบบนี้แหละ...!"
3502-145 = "แล้วประธานคณะกรรมการวินัยก็ฝากมาด้วยนะ"
3502-146 = "บอกว่า 'ถ้าฉันจับได้ว่าเธอไปทำแบบนี้ที่ไหนอีก ฉันจะจัดการอย่างสาสมเลย'"
3502-147 = "'ฉันขอเตือนนะว่าให้เลิกทำนิสัยเดิมๆ ในเกเฮนน่าให้เร็วที่สุด' น่ะ"
3502-151 = "เฮือกกกกก!!!"
3502-152 = "ของขวัญกับของขวัญ"

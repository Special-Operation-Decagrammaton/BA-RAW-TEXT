[translation]
3502-1 = "Gift and Gift"
3502-3 = "Urgh... It's hot... "
3502-4 = "But Morimori... There's Morimori out here..."
3502-5 = "Today's after-lunch treat is Morimori..."
3502-11 = "...Hm? Huh...?"
3502-12 = "...Head Prefect?!"
3502-13 = "...Hmm?"
3502-14 = "Ah, I wondered who was doing all that mumbling. What are you doing here, Megu?"
3502-18 = "...Something to do with hot springs?"
3502-19 = "Huh? Oh, no, not right now. I'm just here to buy Morimori for dessert!"
3502-20 = "Morimori...?"
3502-21 = "Oh, right, the convenience store has ice cream with that name."
3502-22 = "So you're not digging any hot springs nearby today?"
3502-23 = "Um, well..."
3502-24 = "...Ah! Wait!"
3502-25 = "President Kasumi told me what to say when I meet the Prefect Team or a Valkyrie. And you're the head prefect, so..."
3502-26 = "...What are you doing?"
3502-27 = "Well... Um... Give me a minute to remember..."
3502-31 = "...Do you remember yet?"
3502-32 = "...Aha!"
3502-33 = "Yeah! I remember. First, I give you this..."
3502-38 = "...Um... Oh, here it is! Ta-da! Here, take it!"
3502-44 = "And now... Ahem!"
3502-45 = "\"Thanks for all your hard work. This isn't much, but it's a small token of our gratitude. Please keep taking good care of us.\""
3502-46 = "..."
3502-47 = "......"
3502-48 = "And...that's it!"
3502-49 = "That's everything I needed to do. Hey, why'd you ask if I was digging hot springs?"
3502-50 = "The president hasn't said to do that yet, but I'm sure she'll tell me when it's time!"
3502-51 = "I see... Then this is..."
3502-55 = "*sigh*"
3502-56 = "...Megu?"
3502-57 = "This thing Kasumi told you to do... Have you done it to anyone else?"
3502-58 = "...Huh? No, not yet."
3502-59 = "You're the first. Why do you ask?"
3502-60 = "All right. At least that's a relief."
3502-61 = "Then I have one request. Hear me out, please."
3502-62 = "Request? ...What is it?"
3502-63 = "I mean, sure, I'm listening. Go ahead!"
3502-64 = "Thank you. So..."
3502-65 = "Please pass this message back to Kasumi, word for word."
3502-71 = "*gasp*"
3502-72 = "You just ripped up the present...!"
3502-73 = "Kasumi will understand. She won't need an explanation. But if I must put it into words..."
3502-74 = "Tell her, \"If I find out you're doing something like this again, I will handle it personally.\""
3502-75 = "\"I'm warning you. Get rid of your old habits while you're inside Gehenna.\""
3502-78 = "...That is all. Did you get that?"
3502-79 = "Uh... What? Okay, so I gave you a gift, and then you ruined the gift...and now I tell the president you ruined the gift..."
3502-80 = "Umm, I don't really understand..."
3502-81 = "But okay. You and the president are both smart, so I'm sure there's a good reason. Sure, I'll tell her!"
3502-82 = "Heehee. Thank you."
3502-83 = "...Oh, actually...!"
3502-84 = "Head Prefect!! Wait right there!! I'll be back real soon!"
3502-89 = "...Okay, I'm back!"
3502-90 = "You've been waiting a while, huh? Here, take this!"
3502-95 = "This is...ice cream?"
3502-96 = "...Morimori? You're giving this to me?"
3502-97 = "Yeah! I wanted to buy a lot and then share them with everyone. So you should have one too!"
3502-98 = "It's a hot day today. Morimori's great for cooling down!"
3502-99 = "...Oh, wait."
3502-100 = "You don't want gifts from us, do you? I mean, you ripped up the last one..."
3502-101 = "Sorry, sorry! I just bought it 'cause, you know, force of habit."
3502-105 = "...No, it's fine."
3502-106 = "Thanks, Megu. I'll be sure to enjoy it."
3502-107 = "...Huh? It's fine? How is it different...?"
3502-108 = "Oh, I'm sure Kasumi will explain it to you if you ask."
3502-109 = "..."
3502-110 = "...Megu?"
3502-111 = "Huh? Me?"
3502-112 = "You're a third-year, right? You seem to be close to Kasumi..."
3502-113 = "Now, I know there was an earlier version of the Hot Springs Department. Though it only had around ten people at the time..."
3502-114 = "You were the president back then, weren't you? And Kasumi came later."
3502-115 = "Huh? Oh, that's right! After President Kasumi came on, she said she'd take over the president role, so I handed it to her."
3502-116 = "Wow! You really do know everything, Head Prefect!"
3502-117 = "Oh, I wouldn't say that..."
3502-118 = "Hm..."
3502-119 = "My question is, was Kasumi the one to suggest that? Did she say, \"I'll take the president spot for you\"?"
3502-120 = "Yup."
3502-121 = "...All right, then."
3502-122 = "...Well, maybe not exactly."
3502-123 = "Huh?"
3502-124 = "Actually, she asked, \"What do you want to do?\" So I said, \"I just want to keep digging hot springs!\""
3502-125 = "And then she said, \"Then I'll make sure you can do that.\""
3502-126 = "So now I get to just dig hot springs, and there's a lot of new people to help me!"
3502-130 = "...I see."
3502-131 = "I thought that might be the case. People with...her background do tend to keep their word, at least."
3502-134 = "...Huh? What do you mean?"
3502-135 = "Nothing at all. Just seeing another side of the story."
3502-136 = "Now, I have something I have to finish, so I'd best get going. Take care in the heat, Megu. And as for Kasumi..."
3502-137 = "...Tell her something else, too. Tell her, \"Don't make too much trouble.\""
3502-138 = "Ok! Bye, Head Prefect!"
3502-142 = "I'd better get going too."
3502-144 = "...And that's what happened!"
3502-145 = "And the Head Prefect wanted me to tell you..."
3502-146 = "\"If I find out you're doing something like this again, I will handle it personally.\""
3502-147 = "\"I'm warning you. Get rid of your old habits while you're inside Gehenna.\""
3502-151 = "Eeeeek!!"
3502-152 = "Gift and Gift"

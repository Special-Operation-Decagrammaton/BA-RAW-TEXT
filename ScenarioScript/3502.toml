[translation]
3502-1 = "送禮與回禮"
3502-3 = "哇啊～好熱哦～"
3502-4 = "不過我有咯哩咯哩君～有咯哩咯哩君～"
3502-5 = "今天的甜點是～咯哩咯哩君～"
3502-11 = "……咦？"
3502-12 = "……風紀委員長！？"
3502-13 = "……嗯？"
3502-14 = "啊啊，我還以為是誰，原來是惠啊。#n來這裡有什麼事嗎……？"
3502-18 = "……難道是為了溫泉？"
3502-19 = "嗯？不是不是～！現在不是為了溫泉！#n我只是來買咯哩咯哩君當飯後甜點而已～"
3502-20 = "咯哩咯哩君……？"
3502-21 = "這麼說來，便利商店裡好像是有叫這個名字的冰棒。"
3502-22 = "所以你今天沒有打算在附近挖溫泉之類的嗎？"
3502-23 = "唔嗯，怎麼說呢……"
3502-24 = "……啊！等一下！"
3502-25 = "現在應該使出「平時遇到風紀委員會或女武神時，佳澄部長教導的應對方法」才對！#n畢竟陽奈風紀委員長也是風紀委員會的嘛！"
3502-26 = "……？#n你打算做什麼……"
3502-27 = "那個……唔嗯……#n等等，我需要時間回想一下……"
3502-31 = "……想起來了嗎？"
3502-32 = "……啊！"
3502-33 = "嗯！我想起來了！#n首先要拿出這個……"
3502-38 = "鏘鏘～！！找到了！#n來，這個給你！"
3502-44 = "然後接著要說……咳咳！"
3502-45 = "「一直以來真是辛苦了。這是我們的一點小小心意。往後還請多多關照。」"
3502-46 = "…………"
3502-47 = "……………………"
3502-48 = "這句話說完……就結束了！"
3502-49 = "這樣該做的事都做完了！#n至於剛才說的挖溫泉的事，我也不太清楚。"
3502-50 = "因為部長還沒特別跟我說什麼。#n不過等時候到了，他自然會說的！"
3502-51 = "原來如此……至於這個……"
3502-55 = "呼……"
3502-56 = "……惠。"
3502-57 = "佳澄教你做的這件事，你有對其他人做過嗎？"
3502-58 = "……嗯？沒有哦？"
3502-59 = "實際面對面這麼做的，陽奈風紀委員長是第一個。#n為什麼這麼問呢？"
3502-60 = "這樣啊，那就好。"
3502-61 = "既然如此，能拜託你一件事嗎？"
3502-62 = "有事要拜託我……會是什麼事呢？"
3502-63 = "不過也沒什麼行不行的！儘管說吧！"
3502-64 = "謝謝你。那麼……"
3502-65 = "請你把我接下來做的事，原封不動地向佳澄轉達。"
3502-71 = "……啊！？"
3502-72 = "紙袋被打得粉碎了……！？"
3502-73 = "考慮到對方是佳澄，就算不特別解釋，他應該也會明白的。#n但如果非要我說點什麼的話……"
3502-74 = "「如果再被我發現這種行為，到時候我會好好教訓你。」"
3502-75 = "「勸你在格黑娜最好盡快改掉以前的習慣。」"
3502-78 = "……就這樣跟他說，可以嗎？"
3502-79 = "唔嗯……這是什麼意思？#n把收到的禮物粉碎……然後又要我把這件事告訴部長……"
3502-80 = "唔唔……我實在有點難以理解……"
3502-81 = "算了，畢竟風紀委員長跟部長都是聰明的人，這麼做肯定有什麼理由吧。#n我明白了！"
3502-82 = "呵呵。謝謝你。"
3502-83 = "啊，話說回來……"
3502-84 = "風紀委員長！！#n你在這裡等我一下！！我馬上回來！"
3502-89 = "我回來了……！"
3502-90 = "讓你久等了！#n來，這個給你！！"
3502-95 = "這是……冰棒？"
3502-96 = "……咯哩咯哩君？是要給我的嗎？"
3502-97 = "嗯！我本來就打算買很多回去分大家吃，所以也給風紀委員長一個！"
3502-98 = "今天這麼熱，最適合吃咯哩咯哩君了！"
3502-99 = "……哎呀。"
3502-100 = "話說風紀委員長是不是不喜歡收我們的禮物？#n……像是剛才也把那個給打碎了。"
3502-101 = "抱，抱歉！這只是我平時的習慣。"
3502-105 = "……不。沒那回事。"
3502-106 = "謝謝你，惠。#n我會好好享用的。"
3502-107 = "……嗯？收這個就沒問題嗎？#n這跟剛才有什麼不一樣呢……？"
3502-108 = "去問佳澄的話，他會告訴你答案的。"
3502-109 = "…………"
3502-110 = "……惠。"
3502-111 = "嗯？"
3502-112 = "惠現在是3年級對吧？#n你看起來和佳澄很要好……"
3502-113 = "我知道溫泉開發部從以前就存在了。#n雖然人數和現在不同，只有十幾個人左右……"
3502-114 = "那時候是惠擔任部長對吧？#n佳澄是後來才加入的。"
3502-115 = "嗯？啊啊～嗯！#n佳澄部長來了之後，說要代替我擔任部長，所以我就把位置讓給他了。"
3502-116 = "哎呀～！真不愧是風紀委員長，果然什麼事都知道！"
3502-117 = "也沒有這麼誇張……"
3502-118 = "唔嗯……"
3502-119 = "所以是佳澄先開口的嗎？說「我來替你擔任部長」？"
3502-120 = "嗯。"
3502-121 = "……這樣啊。"
3502-122 = "……啊，好像還是有點不一樣？"
3502-123 = "……嗯？"
3502-124 = "實際上是他問我「你想做什麼？」，我回答說「只想一直挖溫泉！」！！"
3502-125 = "然後佳澄部長就說「那我就如你所願吧」。"
3502-126 = "於是之後我就真的只需要挖溫泉就好，部員數量也大幅增加了！！"
3502-130 = "……原來如此。"
3502-131 = "大致跟我想的一樣。#n畢竟「那邊」的傢伙一向很重視這種口頭承諾。"
3502-134 = "……嗯？什麼意思？"
3502-135 = "沒什麼。只是一點小事罷了。"
3502-136 = "那麼我還有事要辦，先告辭了。#n今天天氣很熱，惠也要小心身體。再麻煩你轉告佳澄……"
3502-137 = "……不要惹出太大的麻煩。"
3502-138 = "嗯！風紀委員長也路上小心～"
3502-142 = "那我也回去吧～"
3502-144 = "……事情大概就是這樣！"
3502-145 = "另外風紀委員長還要我向部長傳話。"
3502-146 = "「如果再被我發現這種行為，到時候我會好好教訓你。」"
3502-147 = "「勸你在格黑娜最好盡快改掉以前的習慣。」"
3502-151 = "噫咿咿咿──！！！"
3502-152 = "送禮與回禮"

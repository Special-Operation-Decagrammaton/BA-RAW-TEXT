[translation]
1012002-1 = "#title;특별 강의: 스틱"
1012002-2 = "#na;(디저트 카페에 도착하고 얼마 뒤, 나츠가 멀리서 손을 흔들며 다가왔다.)"
1012002-3 = "#st;[0,0];instant;1;"
1012002-4 = "#clearST"
1012002-5 = "4;나츠 밴드;01\n#4;a\n#wait;1000"
1012002-6 = "4;나츠 밴드;01\n#4;em;[반응]\n#wait;1000"
1012002-7 = "4;나츠 밴드;02;오 선생님, 먼저 와 있었구나.\n#4;m3"
1012002-8 = "4;나츠 밴드;08;후후, 잘 찾아왔군.\n#4;em;[재잘]"
1012002-9 = "4;나츠 밴드;05;참고로 오늘은 바나나 초코 타르트를 주문할 거야."
1012002-10 = "4;나츠 밴드;01;이곳의 바나나 초코 타르트의 수준은 상당하거든."
1012002-11 = "4;나츠 밴드;99;부드러운 바나나와 딱딱한 초콜릿 칩의 절묘한 조화가 재미있는 식감을 만들어내고……\n#4;em;…"
1012002-12 = "4;나츠 밴드;01;동시에 결이 다른 두 단맛이 적절히 섞이며 상승 작용을 일으킨단 말이지."
1012002-13 = "4;나츠 밴드;08;기분이 바나나한 오늘 같은 날과 아주 잘 어울리는 디저트라 할 수 있어.\n#4;em;[반짝]"
1012002-14 = "[s] \"기분이 바나나하다니……?\""
1012002-15 = "4;나츠 밴드;99;후후, 그걸 이해하지 못하다니. 수업이 더 많이 필요하겠군, 선생님."
1012002-16 = "4;나츠 밴드;08;때때로 어떤 달콤함은 일반적인 단어로는 표현될 수 없거든."
1012002-17 = "4;나츠 밴드;01;언어 저편에 있는 것을, 언어로 표현할 수는 없는 것이니까."
1012002-18 = "4;나츠 밴드;08;아무튼 미리 말하자면, 오늘의 이 만남은 어쩔 수 없는 거야."
1012002-19 = "4;나츠 밴드;99;스트레스는 뇌에 부하를 가하고, 당분의 투여는 그 부하를 해소하는 최적의 수단이니…….\n#4;em;…"
1012002-20 = "4;나츠 밴드;01;……우리는 결국 디저트를 먹을 수밖에 없는 거지."
1012002-21 = "4;나츠 밴드;02;응? 최근 스트레스 받을 일이라도 있었던 거냐고?\n#4;em;[?]"
1012002-22 = "4;나츠 밴드;01;흐음, 내가 스트레스라……"
1012002-23 = "4;나츠 밴드;02;그럴 일이…… 있었나?\n#4;stiff"
1012002-24 = "[s1] \"이번에 나츠가 밴드의 모든 일정 관리를 떠맡았잖아?\"\n[s2] \"그것이 스트레스가 된 게 아닐까?\""
1012002-25 = "#wait;100"
1012002-26 = "#wait;100"
1012002-27 = "4;나츠 밴드;01;음? 아냐 아냐, 선생님.\n#4;em;[반응]"
1012002-28 = "4;나츠 밴드;00;그 정도 일은 스트레스라고 할 수도 없어."
1012002-29 = "4;나츠 밴드;01;친구들도 내 계획에 잘 따라와 주고 있고."
1012002-30 = "4;나츠 밴드;99;그러니까 스트레스라는 건 말이지."
1012002-31 = "4;나츠 밴드;05;천연 메이플 시럽 고드름을 핥다가 배탈이 나 드러눕는 바람에 기간 한정 파르페를 맛보지 못하게 되는 것 정도는 되어야……\n#4;em;[반짝]"
1012002-32 = "4;나츠 밴드;00;……스트레스라고 할 수 있는 거야."
1012002-33 = "4;나츠 밴드;99;하지만, 음.\n#4;em;…"
1012002-34 = "4;나츠 밴드;02;내가 선생님과 이렇게 같이 앉아 있을 수 있었던 이유가 스트레스 때문인 거잖아?"
1012002-35 = "4;나츠 밴드;08;그렇다면 그냥 스트레스가 없더라도 있는 셈 치지, 뭐.\n#4;em;[반짝]"
1012002-36 = "4;나츠 밴드;01;세상에는, 수단을 누리기 위해 목적을 선택하는 사람도 있는 법이니까.\n#4;closeup\n#fontsize;80"
1012002-37 = "#all;hide"
1012002-38 = "#na;(잠시 후, 흰 접시 위에 얹어진 초코바나나타르트가 서빙되어 나왔다.)"
1012002-39 = "#na;(맛은 역시나 훌륭했다.)"

[translation]
1012002-1 = "特別講座：鼓棒"
1012002-2 = "（抵達甜點咖啡廳不久之後，夏從遠處揮著手走了過來）"
1012002-7 = "哦～老師，你先到了啊。"
1012002-8 = "呵呵，挺有眼光的嘛。"
1012002-9 = "順帶一提，今天我打算點香蕉巧克力塔。"
1012002-10 = "因為這裡的香蕉巧克力塔，水準相當出色。"
1012002-11 = "柔軟的香蕉與脆硬的巧克力碎片，交織出絕妙的口感……"
1012002-12 = "兩種不同層次的甜味完美融合，產生奇妙的協同效應。"
1012002-13 = "簡直是最適合今天這種「香蕉心情」的甜點。"
1012002-14 = "[s]「香蕉心情是什麼心情……？」"
1012002-15 = "呵呵，老師竟然無法理解啊。#n看來你還需要更多課程呢。"
1012002-16 = "有時候，某些甜美是無法用普通的言語來表達的。"
1012002-17 = "畢竟語言以外的東西……終究無法用語言完整表達。"
1012002-18 = "總之我想先告訴你，今天的見面是無可避免的。"
1012002-19 = "因為壓力會增加大腦的負荷，而糖分則是消除負荷的最佳手段……"
1012002-20 = "……所以我們終究必須品嘗甜點。"
1012002-21 = "嗯？問我最近是不是有什麼壓力？"
1012002-22 = "唔嗯，壓力啊……"
1012002-23 = "我應該……要有壓力嗎？"
1012002-24 = "[s1]「這次樂團的所有行程，不都是夏一個人負責安排嗎？」\n[s2]「會不會因此覺得有壓力？」"
1012002-27 = "嗯？不不不，老師。"
1012002-28 = "那種事根本算不上什麼壓力。"
1012002-29 = "朋友們也都很配合我的計畫。"
1012002-30 = "對我來說……"
1012002-31 = "因為舔了天然的楓糖冰柱而吃壞肚子，結果錯過了期間限定的聖代……"
1012002-32 = "……才能稱得上壓力吧。"
1012002-33 = "不過回頭想想……"
1012002-34 = "現在能跟老師這樣坐在一起，不也是因為「壓力」這個理由嗎？"
1012002-35 = "那麼就算沒有壓力……也當作有吧。"
1012002-36 = "這個世界上，也有人是為了享受手段而選擇目標的嘛。"
1012002-38 = "（不久後，放置在白盤上的香蕉巧克力塔被端了過來）"
1012002-39 = "（味道果然十分出色）"

[translation]
1012002-1 = "คลาสพิเศษ: ไม้กลอง"
1012002-2 = "(เมื่อมาถึงร้านของหวานได้ไม่นาน คุณครูก็เห็นนัตสึเดินโบกมือมาแต่ไกลๆ)"
1012002-7 = "โอ้ คุณครู มาถึงก่อนฉันสินะ"
1012002-8 = "ฮุฮุ มาถึงแล้วแบบนี้ดีเลย"
1012002-9 = "ขอบอกไว้ก่อน วันนี้ฉันจะสั่งทาร์ตกล้วยช็อกโกแลตนะ"
1012002-10 = "ทาร์ตกล้วยช็อกโกแลตของที่นี่คุณภาพสูงมาก"
1012002-11 = "การผสมผสานอย่างลงตัวของเนื้อกล้วยนุ่มๆ กับช็อกโกแลตชิปกรุบกรอบจนกลายเป็นเนื้อสัมผัสที่น่า#nตื่นเต้น..."
1012002-12 = "และในเวลาเดียวกันความหวานของวัตถุดิบสองชนิดที่แตกต่างกันก็ผสมผสานกันได้อย่างเหมาะสม ช่วยเสริมรสชาติได้เป็นอย่างดี"
1012002-13 = "เหมาะกับวันที่อารมณ์ดี สดใส กล้วยๆ อย่างวันนี้ที่สุด"
1012002-14 = "[s] \"วันที่อารมณ์กล้วยๆ...?\""
1012002-15 = "ฮุฮุ ไม่เข้าใจหรอกเหรอเนี่ย สงสัยต้องเพิ่มชั่วโมงติวเข้มหนักๆ แล้วละคุณครู"
1012002-16 = "บางครั้งความหวานก็แสดงออกมาด้วยคำพูดธรรมดาๆ ไม่ได้ทั้งหมด"
1012002-17 = "เพราะสิ่งที่ลึกซึ้งกว่าคำพูด มันไม่สามารถอธิบายออกมาเป็นคำพูดได้ไงล่ะ"
1012002-18 = "แต่ก็ขอบอกไว้ก่อนแล้วกันว่าการนัดเจอวันนี้เป็นเรื่องจำเป็นนะ"
1012002-19 = "ความเครียดทำให้สมองทำงานหนัก เพราะงั้นการกินน้ำตาลเลยเป็นวิธีคลายเครียดที่ดีที่สุด..."
1012002-20 = "เลยไม่มีทางเลือกอื่นนอกจากมากินของหวานไงล่ะ"
1012002-21 = "หืม? ช่วงนี้มีเรื่องเครียดอะไรน่ะเหรอ?"
1012002-22 = "อืม เรื่องที่ฉันเครียด..."
1012002-23 = "มีเรื่องอะไรแบบนั้น... ด้วยเหรอ?"
1012002-24 = "[s1] \"ก็นัตสึเป็นคนดูแลตารางงานทั้งหมดของวงเลยเครียดรึเปล่า?\"\n[s2] \"เครียดเพราะต้องดูแลตารางงานของวงรึเปล่า?\""
1012002-27 = "หืม? ไม่หรอก ไม่ใช่หรอก คุณครู"
1012002-28 = "งานพวกนั้นไม่ทำให้เครียดหรอก"
1012002-29 = "คนอื่นๆ ก็ทำตามแผนที่ฉันวางไว้"
1012002-30 = "เพราะงั้นแล้วเรื่องเครียดๆ น่ะ"
1012002-31 = "ถ้าไม่ใช่เรื่องร้ายแรงอย่างการเผลอไปกินไซรัปน้ำหวานเมเปิ้ลธรรมชาติแล้วเกิดท้องเสียจนไม่ได้ไป#nลิ้มลองพาร์เฟต์ที่ขายจำกัดเวลาละก็..."
1012002-32 = "ไม่มีอะไรที่น่าเครียดหรอก..."
1012002-33 = "แต่... อืม"
1012002-34 = "เหตุผลที่ฉันมานั่งอยู่กับคุณครูได้แบบนี้ก็เพราะความเครียดใช่มั้ยล่ะ"
1012002-35 = "ถ้างั้นก็คิดว่าเครียดอยู่ทั้งที่ไม่ได้เครียดแล้วกัน"
1012002-36 = "ในโลกนี้มีผู้คนที่เลือกจุดมุ่งหมายเพื่อสนุกกับวิธีการอยู่ด้วยนะ"
1012002-38 = "(หลังจากนั้นไม่นาน ทาร์ตกล้วยช็อกโกแลตก็เสิร์ฟมาในจานสีขาวสะอาดตา)"
1012002-39 = "(และรสชาติก็ยอดเยี่ยมอย่างที่คิด)"

[translation]
10034010-1 = "Episode 1;Let's Form A Band!!"
10034010-2 = "I can't believe you just grabbed random food and ate it!"
10034010-4 = "[ns1] \"Why, was it, like, a limited edition?!\"\n[ns2] \"Well, you should have labeled it or something!!\""
10034010-5 = "W-Well...no, but come on!"
10034010-6 = "I was going to label everything! You ate it before I could do that!"
10034010-10 = "What exactly did you grab, anyway? What'd it look like?"
10034010-11 = "...You don't remember?! What, were you not paying attention, and just grabbed whatever?!"
10034010-12 = "Great, so I have to count up EVERYTHING and see what's missing!"
10034010-13 = "Hey, chill. Yelling isn't going to fix it."
10034010-14 = "Stuff happens. Sensei didn't know there was going to be a problem."
10034010-15 = "Grr...! Yeah, I know, but...! But...!!"
10034010-16 = "Arrrgh!!"
10034010-17 = "...Okay, maybe I'm overreacting, but it's BAD LUCK you happened to eat it right then!"
10034010-18 = "...Hm? What'd you say?"
10034010-19 = "You don't know what's going on? Well, yeah, okay. I did get a little carried away with all that yelling."
10034010-20 = "Basically, I was going to ask you to rate all these treats."
10034010-21 = "That's why I arranged them all on this table. So you could have a taste test and judge them."
10034010-22 = "[s3] \"You want me to eat... all of them?\"\n[s4] \"You want me to rate them?\""
10034010-25 = "That's right. We need an outside opinion."
10034010-26 = "We're picking out treats for the Dessert Cafe."
10034010-27 = "[s] \"...Dessert Cafe?\""
10034010-28 = "Yes. It's a fitting name for the star attraction of the Trinity Carnival, a grand event approaching far too soon."
10034010-29 = "Each of Trinity's many clubs will strive to outdo the rest in a fearsome battle of bakeries!"
10034010-30 = "...Put another way, we're each gonna have little themed cafes."
10034010-31 = "At the Academy Festival. It's coming up soon."
10034010-32 = "And it's kind of a big deal around here. Pretty much all the clubs are joining in."
10034010-33 = "[s5] \"I see, so that's why you called me here.\"\n[s6] \"You want to leave choosing the menu to me?\""
10034010-37 = "Yeah, that was my idea. Pretty good, huh? What do you say?"
10034010-38 = "Huh?"
10034010-39 = "Well, no, not everything in the club is my idea. Not really."
10034010-40 = "We don't have a president or anything, so it's basically just whoever gets an idea first. This time, it was her."
10034010-41 = "...Say again?"
10034010-42 = "You want to know who created the club, if there's no president?"
10034010-46 = "Aha. So that's what you were curious about, huh...?"
10034010-47 = "Hmm."
10034010-48 = "Oh, we should make this a game!"
10034010-49 = "All right, everybody shut up, shut up. Let's have Sensei guess who it could be."
10034010-50 = "...Well? Sensei?"
10034010-51 = "Which one of us do you think is the club founder?"
10034010-57 = "[ns7] \"...Yoshimi?\"\n[ns8] \"...Natsu?\"\n[ns9] \"...Kazusa?\""
10034010-58 = "Hmm. Most people guess it's me, since I have the strongest opinions around here..."
10034010-59 = "And the most energy."
10034010-60 = "...No, I'd say Natsu's rowdier than I am."
10034010-61 = "Hm? You're going to bring me into this...?"
10034010-62 = "Hm... I guess she is, now that I think about it."
10034010-63 = "What? What is this treachery?"
10034010-69 = "No, if Natsu started a club, nobody would ever join it."
10034010-70 = "Right?"
10034010-71 = "Heehee. Your modesty is adorable. But come now, tell the truth!"
10034010-72 = "I'd have to do more than tell you."
10034010-73 = "Ugh. Guess I'd better step in here..."
10034010-76 = "Hold it, hold it. We're a dessert club. Not a gang of thugs."
10034010-77 = "Oh, those are fighting words."
10034010-79 = "Everyone, we are the Four Divine Beasts of the After-School Sweets Gang!"
10034010-88 = "Don't put up a shield!!"
10034010-89 = "I will stand firm against all violence!!"
10034010-91 = "Ah, enough! Let's just do this already."
10034010-92 = "We're SUPPOSED to finish picking desserts before Airi gets back! We haven't even started that yet!!"
10034010-93 = "What would Airi say if she got back and saw us in this mess...?"
10034010-100 = "Let's form a band!!"
10034010-101 = "There you have it. She'd say, 'Let's form a band.'"
10034010-105 = "...A band...?"
10034010-107 = "Everyone...!!"
10034010-108 = "A band...!"
10034010-109 = "...Let's do it!!"
10034010-111 = "...A band?"
10034010-117 = "[ns10] \"A band, all of a sudden?\"\n[ns11] \"Didn't see that coming.\""
10034010-120 = "Oh... Sensei?"
10034010-121 = "I didn't know you were here. But yeah, we're forming a band now!"
10034010-122 = "H-Hold on a second, Airi."
10034010-123 = "Are we seriously going to do this, out of nowhere?"
10034010-129 = "It is kind of out of nowhere, isn't it?"
10034010-130 = "And wow, Kazusa of all people, questioning Airi..."
10034010-131 = "A rare occurrence, to be sure."
10034010-133 = "It's not out of nowhere! Listen, this is OUR cafe! For the Academy Festival!"
10034010-134 = "Don't you think we ought to have something special about it? A band cafe would be perfect!"
10034010-135 = "I mean, we COULD just do a regular Dessert Cafe, but that's what everybody else is doing!"
10034010-137 = "W-Well...?"
10034010-138 = "Whoa. That's a bold statement."
10034010-139 = "It's funny. Here we are, the After-School Sweets Club, deciding desserts aren't good enough."
10034010-141 = "There's no time to waste! The only chance we'll have to show off the band is at the Academy Festival opening."
10034010-142 = "And the audition for that is two weeks away! Even if we all get instruments and start practicing today, we're barely going to have enough time!"
10034010-143 = "We WON'T have enough time. We can't do it."
10034010-144 = "Hey, don't say we can't before we even try it."
10034010-147 = "Oh, I'm the bad guy now...?"
10034010-148 = "You really are unstoppable once you get going."
10034010-149 = "I did NOT see any of this coming."
10034010-151 = "Huh? What's wrong? Why are you all being so..."
10034010-152 = "Weird, I thought everybody was going to be on board."
10034010-153 = "How and why would you think that...?"
10034010-154 = "Calm down, everyone."
10034010-160 = "[ns12] \"Why a band, Airi?\"\n[ns13] \"So what inspired you for this?\""
10034010-163 = "H-Huh...? You're asking me...?"
10034010-164 = "W-Well... Hm... That's... So..."
10034010-165 = "I..."
10034010-169 = "I figured we needed to do SOMETHING, at least..."
10034010-170 = "[s] \"...\""
10034010-174 = "[ns] \"...?\""
10034010-175 = "...No!"
10034010-180 = "No, no, no, no, no, no, no!! No!!"
10034010-181 = "No way. Nope! Even for Airi, no means no!!"
10034010-182 = "What are we even talking about? I mean, I usually say yes, but this is crossing the line! And it's not like you're Natsu!"
10034010-183 = "What do I have to do with this?"
10034010-184 = "A band?! We're a dessert club!"
10034010-185 = "What does music have to do with desserts?! If we're doing this AS the dessert club, shouldn't we at least have SOMETHING to do with desserts?!"
10034010-187 = "Y-Yoshimi..."
10034010-188 = "Unvarnished truth is rarely without splinters."
10034010-189 = "Natsu..."
10034010-190 = "...Sorry, Airi."
10034010-191 = "Even Kazusa..."
10034010-195 = "[ns14] \"I think Yoshimi's right.\"\n[ns15] \"Hey, Airi. Let's take a breather and get some room to think.\""
10034010-198 = "...Sensei..."
10034010-202 = "O-Okay..."
10034010-203 = "..."
10034010-204 = "Okay, so if it HAD something to do with desserts, we'd be good, right...? Right...?"
10034010-206 = "...What?"
10034010-207 = "Something to do with...?"
10034010-208 = "Desserts...?"
10034010-210 = "In fact, there's something I happened to pick up on the way over here. Look!"
10034010-211 = "You 'happened' to pick it up? You had this prepared the whole time..."
10034010-217 = "...? What am I looking at...?"
10034010-218 = "It's the celebration concert recruitment poster for the Academy Festival opening. Not seeing the connection to desserts..."
10034010-219 = "...No, hold on. Yoshimi. Stop."
10034010-220 = "...Look. At the bottom of the poster. 'Concert Participation Rewards for Bands'."
10034010-221 = "...Rewards? What kind of...?"
10034010-225 = "...Huh."
10034010-227 = "...Oh my."
10034010-228 = "This can't be..."
10034010-233 = "[ns16] \"...Frederica Semla?\"\n[ns17] \"Is that the name of a dessert or something?\""
10034010-236 = "That's right, Sensei! Frederica Semla..."
10034010-237 = "...The queen of semla."
10034010-238 = "It's a legendary bread. So delicious, the queen of some old country ate 14 of them in a row. And then collapsed."
10034010-240 = "I hope they have the real thing, and not those cheap imitations we see in the store."
10034010-241 = "No, this is the Trinity Carnival. Organized by the Tea Party, no less. They would never stoop to petty fakery."
10034010-242 = "...So it IS the real thing? The real Frederica Semla...? For real...?"
10034010-243 = "Well, that makes it a whole different story... A whole different problem, I should say."
10034010-244 = "Quite different. It changes the very paradigm. We are the After-School Sweets Club..."
10034010-248 = "...\"Those who live to hunt down desserts not yet tasted.\""
10034010-250 = "...Hee hee."
10034010-251 = "Yoshimi? Everyone?"
10034010-252 = "How about now? What do you think?"
10034010-253 = "Are we up to this?"
10034010-260 = "[ns18] \"...Wait, when you say EVERYONE...\"\n[ns19] \"Why's everybody looking at me?\""
10034010-263 = "...Sensei."
10034010-265 = "Let's form a band!"

[translation]
10034010-1 = "ตอนที่ 1;มาตั้งวงดนตรีกันเถอะ!!"
10034010-2 = "อ๊ะ จู่ๆ ก็หยิบอันนั้นมากินเลยได้ยังไงกัน~~!!!"
10034010-4 = "[ns1] \"อะไรกัน!? อย่าบอกนะว่าเป็นขนมลิมิเต็ดน่ะ!??\"\n[ns2] \"ไม่นะ งั้นถ้ากินไม่ได้ก็ควรทำสัญลักษณ์บอกไว้สิ!\""
10034010-5 = "มะ... ไม่หรอก ไม่ใช่อะไรแบบนั้น... แต่ก็!!"
10034010-6 = "ฉันก็ว่าจะทำสัญลักษณ์ไว้อยู่หรอก! แต่คุณครูดันกินเข้าไปก่อนนี่สิ!"
10034010-10 = "อ่า อันนั้นมันขนมอะไรน่ะ? เมื่อกี้กินชิ้นไหนไปเหรอคุณครู? ขนมหน้าตาเป็นแบบไหน?"
10034010-11 = "ว่าไงนะ...? จำไม่ได้เหรอ? หยิบเอามั่วๆ ก็เลยไม่รู้ว่ากินอะไรไปงั้นเหรอ!?"
10034010-12 = "อึก...! งะ... งั้นก็ต้องเอาทั้งหมดที่เหลือมาเรียงใหม่ตั้งแต่แรกน่ะสิ..."
10034010-13 = "ใจร่มๆ เถอะ ถึงจะโวยวายไปก็ย้อนอะไรกลับไปไม่ได้หรอกนะ ก็มันช่วยไม่ได้นี่นา"
10034010-14 = "เรื่องที่เกิดขึ้นมันเป็นอุบัติเหตุ คุณครูก็มาที่นี่เหมือนปกติแล้วก็หยิบอะไรกินเหมือนทุกครั้งอยู่แล้ว"
10034010-15 = "อ่า... อึก...! เรื่องนั้นฉันก็รู้อยู่หรอก...! แต่ก็...!!"
10034010-16 = "ง่าาาาาาา~~!!!"
10034010-17 = "ถึงฉันจะดูเหลวไหลที่โมโหใส่คุณครูทั้งๆ ที่เป็นคนชวนมาเองก็เถอะ แต่ทำไมต้องมาหยิบขนมกิน#nในจังหวะนรกแบบนั้นด้วย...!"
10034010-18 = "หืม...? ว่าไงนะ?"
10034010-19 = "ขอให้อธิบายให้เข้าใจงั้นเหรอ? อ่า ขอโทษที ฉันเอาแต่หัวร้อนแล้วก็ตะโกนโวยวายน่ะ"
10034010-20 = "ที่เรียกคุณครูมา เพราะฉันจะขอให้คุณครูช่วย 'ให้คะแนน' ขนมน่ะ"
10034010-21 = "ขนมบนโต๊ะที่เห็นคือขนมที่ฉันเคยรีวิวไว้ ฉันว่าจะขอให้คุณครูช่วยประเมินแล้วให้คะแนนให้หน่อยน่ะ"
10034010-22 = "[s3] \"ให้ครูกินทั้งหมดนี่เลย...?\"\n[s4] \"ให้กินแล้วประเมินความอร่อยเหรอ?\""
10034010-25 = "ก็ประมาณนั้นแหละ เราอยากได้การประเมินที่เป็นกลางอยู่แล้ว"
10034010-26 = "เราจะเอาผลการประเมินไปใช้เลือกเมนูใน <คาเฟ่ของหวาน> น่ะ"
10034010-27 = "[s] \"คาเฟ่ของหวานเหรอ?\""
10034010-28 = "ใช่แล้วละ นี่เป็นส่วนหนึ่งของ <ทรีนิตี้คาร์นิวัล> ที่เป็นงานเทศกาลสุดยิ่งใหญ่ที่กำลังใกล้เข้ามา"
10034010-29 = "งานเลี้ยงฉลองที่ชมรมมากมายในทรีนิตี้ต่างก็มาแข่งขันแสดงความสามารถพิเศษของตน เพื่อชิงชัยชนะกัน..."
10034010-30 = "แต่มันก็ไม่ใช่การแข่งขันขนาดนั้นหรอกนะ มันก็เป็นเทศกาลในโรงเรียนนี่แหละ แต่ว่าแต่ละชมรมจะ#nเปิดคาเฟ่ขายของกัน"
10034010-31 = "อีกไม่นานก็จะถึงเทศกาลโรงเรียนที่ว่าแล้วละ"
10034010-32 = "นี่เป็นงานใหญ่ทีเดียว และชมรมทั่วไปอย่างชมรมของพวกเราก็เข้าร่วมกันเยอะด้วย..."
10034010-33 = "[s5] \"ก็เลยเรียกครูมาสินะ\"\n[s6] \"อยากให้ครูช่วยเลือกเมนูให้สินะ\""
10034010-37 = "เป็นยังไงล่ะ? เป็นวิธีที่ยอดเยี่ยมเลยใช่มั้ย? ถึงฉันจะเป็นคนเสนอไอเดียนี้ แต่ก็ต้องบอกว่าเป็นไอเดียที่ดีจริงๆ"
10034010-38 = "หืม...?"
10034010-39 = "ฉันเป็นคนกำหนดอะไรแบบนี้ตลอดเลยรึเปล่างั้นเหรอ? ไม่หรอก ก็ไม่ถึงขนาดนั้นนะ"
10034010-40 = "เราไม่มีหัวหน้าชมรม ก็เลยสลับเปลี่ยนกันไปเรื่อยๆ แล้วครั้งนี้ก็เป็นโยชิมิที่เสนอไอเดียนี้มาน่ะ"
10034010-41 = "ว่าไงนะ...?"
10034010-42 = "ถ้าไม่มีหัวหน้าชมรม แล้วตั้งชมรมกันได้ยังไงตั้งแต่แรกน่ะเหรอ?"
10034010-46 = "อ้อ~ สงสัยเรื่องนี้สินะ"
10034010-47 = "อืม~"
10034010-48 = "เอาแล้วสิ มีเรื่องน่าสนุกให้เล่าแล้ว"
10034010-49 = "เอาละๆ! ทุกคนเงียบ!! เวลานี้มาถึงแล้วละ! ฮุฮุฮุ! ได้เวลาเลือกแล้ว!"
10034010-50 = "คุณครู"
10034010-51 = "คุณครูคิดว่ายังไงเหรอ? หืม? คิดว่าใครเป็นคนตั้งชมรมขึ้นมาเหรอ?"
10034010-57 = "[ns7] \"โยชิมิ...?\"\n[ns8] \"นัตสึ...?\"\n[ns9] \"คาซึสะ...?\""
10034010-58 = "ฮึ่ม คิดว่าเป็นอย่างนั้นเหรอ? ก็นะ เพราะในชมรมฉันก็ค่อนข้างจะออกความเห็นมากอยู่แล้ว..."
10034010-59 = "ต้องบอกว่าเป็นคนที่พลังงานล้นเหลือเลยละ แล้วก็น่าหนวกหูพอๆ กับพลังงานที่มีเลย"
10034010-60 = "เลิกพูดอะไรไร้สาระได้แล้วน่า อีกอย่าง เรื่องพลังงานล้นเหลือน่ะไม่ใช่ฉันสักหน่อย นั่นน่ะนัตสึต่างหาก"
10034010-61 = "อ้าว? ทำไมอยู่ๆ ฉันถึงโดนพาดพิงล่ะ...?"
10034010-62 = "อืม... จะว่าไปก็จริงอยู่นะ"
10034010-63 = "จะหักหลังกันเหรอ...??"
10034010-69 = "เหลวไหลน่า ใครจะไปอยากเข้าชมรมที่ยัยนั่นตั้งขึ้นมากันล่ะ"
10034010-70 = "นั่นสินะ"
10034010-71 = "ฮุฮุ ไม่อ้อมค้อมกันเลยนะ... น่ารักกันจริงๆ!"
10034010-72 = "ถ้าพูดตรงๆ มากกว่านี้ ฉันว่ามันคงไม่จบแค่คำพูดหรอกนะ"
10034010-73 = "น่าหงุดหงิดชะมัด หรือจะเอา?"
10034010-76 = "เดี๋ยวก่อนสิ นี่เราอยู่ชมรมของหวานนะ ไม่ใช่กลุ่มนักเลงสักหน่อย"
10034010-77 = "จะมาหาเรื่องกันรึไง...?"
10034010-79 = "พวกเราคือจตุรเทพแห่งแก๊งของหวานหลังเลิกเรียนนะ!!"
10034010-88 = "แน่จริงก็อย่าถือโล่ป้องกันตัวสิ!!"
10034010-89 = "ฉันไม่ยอมแพ้ให้กับการใช้ความรุนแรงหรอก!!"
10034010-91 = "เฮ้อ~! พอได้แล้ว! เลิกเล่นสนุกกันได้แล้ว! มาตั้งใจทำงานของเรากันเถอะ!"
10034010-92 = "เราตั้งใจไว้ว่าจะเลือกของหวานให้เสร็จก่อนที่ไอริจะมาไม่ใช่รึไง! ตอนนี้งานของเราไม่คืบหน้าเลยนะ!!"
10034010-93 = "ถ้ายังไม่ได้งานกันอยู่อย่างนี้ เดี๋ยวไอริมาถึงก็คงพูดว่า..."
10034010-100 = "มาทำวงดนตรีกันเถอะ!!!"
10034010-101 = "เห็นมั้ยล่ะ? มาทำวง..."
10034010-105 = "วงดนตรีเหรอ...?"
10034010-107 = "ทุกคน!!"
10034010-108 = "เรามา...!"
10034010-109 = "ทำวงดนตรีกันเถอะ!!!"
10034010-111 = "วงดนตรีเหรอ...?"
10034010-117 = "[ns10] \"ทำไมจู่ๆ ถึงชวนตั้งวงดนตรีล่ะ...?\"\n[ns11] \"ไหงเป็นอย่างนี้ไปได้ล่ะ...\""
10034010-120 = "เอ๋... คุณครู!?"
10034010-121 = "มาได้ตรงจังหวะเลยนะคะ! ใช่แล้วค่ะ! วงดนตรี! เราจะทำวงดนตรีกันค่ะคุณครู!"
10034010-122 = "ดะ... เดี๋ยวนะ ไอริ เดี๋ยวก่อน"
10034010-123 = "แบบนี้มันกะทันหันมากไปนะ จะตั้งวงดนตรีงั้นเหรอ...? พูดเรื่องเหลวไหลอะไรของเธอน่ะ?"
10034010-129 = "เห็นภาพกีฬามันส์ๆ เหมือนที่ฉันเห็นเมื่อกี้มั้ย นัตสึ?"
10034010-130 = "คาซึสะกล้าสวนกลับไอริด้วยละ..."
10034010-131 = "ถือว่าเป็นภาพที่ไม่ได้หาดูกันได้ง่ายๆ เลยนะ"
10034010-133 = "ไม่ใช่เรื่องเหลวไหลนะ! ลองฟังฉันก่อนสิ คาเฟ่ของพวกเรา! คาเฟ่ที่เราจะเปิดในงานเทศกาลโรงเรียนน่ะ!"
10034010-134 = "ไหนๆ ก็จะทำแล้ว มันก็ควรจะทำให้ออกมามีเอกลักษณ์หน่อยใช่มั้ย? ฉันก็เลยเสนอให้ทำคาเฟ่วงดนตรียังไงล่ะ!!"
10034010-135 = "ถ้าเป็นคาเฟ่ของหวานเฉยๆ มันก็ธรรมดาไปนี่นา! ชมรมอื่นก็ขายของหวานในคาเฟ่กันทั้งนั้นด้วย!"
10034010-137 = "วะ... ว่าไงนะ...?"
10034010-138 = "โอ้ว~ เป็นคำพูดที่แข็งกร้าวจัง~"
10034010-139 = "ชมรมของหวานจะไม่เอาของหวานเนี่ยนะ...!?"
10034010-141 = "ไม่ใช่เวลาที่เราจะมาอยู่เฉยกันแล้วนะ! ถ้าจะให้ทุกคนได้เห็นการเล่นดนตรีของเรา ก็ต้องอาศัยช่วงเปิดงานเทศกาลโรงเรียนเท่านั้น..."
10034010-142 = "แล้วการคัดเลือกก็จะมีในอีก 2 สัปดาห์แล้ว! ต่อให้หาเครื่องดนตรีมาตอนนี้แล้วมาฝึกซ้อมกันเลยก็#nคงไม่ทันหรอก!"
10034010-143 = "มันก็ต้องไม่ทันอยู่แล้วน่ะสิ!! ในเมื่อมันไม่ทัน เราจะไปทำได้ยังไง!?"
10034010-144 = "อืม... การตัดสินว่าทำไม่ได้ทั้งๆ ที่ยังไม่ได้ลองทำถือเป็นนิสัยที่ไม่ดีนะ..."
10034010-147 = "อ้าว? แปลว่าฉันนิสัยไม่ดีงั้นเหรอ...?"
10034010-148 = "สาวน้อยคนนี้ ถ้าเครื่องติดแล้วก็ห้ามไม่อยู่เลยนะ~"
10034010-149 = "อืม... นี่เป็นปัญหาที่คาดไม่ถึงเลยแฮะ..."
10034010-151 = "หะ... หืม? ทำไมล่ะ? ทำไมทุกคนถึง..."
10034010-152 = "แปลกจัง... นึกว่าทุกคนจะตื่นเต้นและจะซื้อไอเดียนี้กันซะอีก..."
10034010-153 = "จู่ๆ ทำไมถึงไปได้ไอเดียแบบนั้นมาน่ะ..."
10034010-154 = "เอาเป็นว่าใจเย็นๆ ก่อนนะ..."
10034010-160 = "[ns12] \"ทำไมไอริถึงอยากทำวงดนตรีเหรอ?\"\n[ns13] \"ไปได้แรงบันดาลใจจากไหนมาหรือเปล่า?\""
10034010-163 = "คะ... คะ...!?  ฉันเหรอคะ...!?"
10034010-164 = "คะ... คือว่า... อืม... เหตุผลก็คือ... คือ..."
10034010-165 = "ฉัน..."
10034010-169 = "ฉัน... แค่คิดว่าควรจะทำอย่างนั้นน่ะค่ะ..."
10034010-170 = "[s] \"......\""
10034010-174 = "[ns] \"......?\""
10034010-175 = "เดี๋ยวนะ!"
10034010-180 = "เดี๋ยวๆๆๆๆๆ!! ฟังฉันนะ!!!"
10034010-181 = "ไม่ได้ ทำไม่ได้หรอก! ถึงจะเป็นไอริก็เถอะ แต่อะไรที่ไม่ได้ก็คือไม่ได้!!"
10034010-182 = "จู่ๆ ก็ชวนทำวงดนตรีเนี่ยนะ!? ถ้าเป็นเรื่องทั่วไปฉันคงเออออตามไปด้วยแล้ว แต่เรื่องนี้มันเกินตัวไปนะ! ทำตัวเป็นนัตสึไปได้!"
10034010-183 = "ทำไมฉันถึงโดนพาดพิงอยู่เรื่อยเลยล่ะ..."
10034010-184 = "วงดนตรีงั้นเหรอ!? พวกเราอยู่ชมรมของหวานนะ!"
10034010-185 = "วงดนตรีมันเกี่ยวกับชมรมของหวานยังไงกัน!? ถ้าเราจะทำอะไรในชื่อของชมรม อย่างน้อยก็ต้องเกี่ยวข้องกับของหวานสิ!!"
10034010-187 = "ยะ...โยชิมิจัง..."
10034010-188 = "ก็นะ บางครั้งความจริงมันก็เจ็บปวดแบบนี้แหละ"
10034010-189 = "นัตสึจัง..."
10034010-190 = "ขอโทษนะไอริ..."
10034010-191 = "คาซึสะจังก็ด้วยเหรอ..."
10034010-195 = "[ns14] \"โยชิมิพูดถูกนะ\"\n[ns15] \"ไอริ ครูว่านั่งพักก่อนดีกว่า\""
10034010-198 = "คุณครู..."
10034010-202 = "ถะ... ถ้างั้น..."
10034010-203 = "......"
10034010-204 = "ถะ... ถ้างั้น... ถ้าเกี่ยวข้องกับของหวานก็ถือว่าได้ใช่มั้ย...?"
10034010-206 = "ว่าไงนะ...?"
10034010-207 = "ไอเดียนี้เกี่ยวข้องกับ..."
10034010-208 = "ของหวานงั้นเหรอ...?"
10034010-210 = "พะ... พอดีว่าฉันเห็นว่ามันมีอะไรแบบนี้อยู่ด้วย... ก็เลยหยิบมาน่ะ! เอ้านี่!"
10034010-211 = "เดี๋ยวนะ 'พอดีว่า' งั้นเหรอ ใครเห็นเข้าก็คงต้องคิดว่าตั้งใจเตรียมมาตั้งแต่แรกนะ..."
10034010-217 = "นี่มัน...?"
10034010-218 = "อะไรกัน โปสเตอร์รับสมัครทีมแสดงเปิดงานเทศกาลโรงเรียนนี่นา? แล้วมันเกี่ยวอะไรกับของหวาน..."
10034010-219 = "เดี๋ยวนะ เดี๋ยวก่อน... โยชิมิ สต็อป!"
10034010-220 = "เจอแล้ว... ข้างล่างมีเขียนไว้ว่า 'รางวัลสำหรับวงดนตรีที่ผ่านการคัดเลือกเข้าร่วมแสดง'"
10034010-221 = "รางวัลเหรอ? มันจะยิ่งใหญ่แค่ไหนกันเชียว..."
10034010-225 = "หืม?"
10034010-227 = "เฮือกกกก"
10034010-228 = "เป็นไปไม่ได้..."
10034010-233 = "[ns16] \"เฟรเดริก้า เซมล่า?\"\n[ns17] \"เป็นชื่อของหวานเหรอ?\""
10034010-236 = "ใช่ค่ะ คุณครู อย่างที่ว่าเลยค่ะ! นี่คือ <เฟรเดริก้า เซมล่า> หรือที่เรียกกันว่า..."
10034010-237 = "... 'ราชินีแห่งเซมล่า'"

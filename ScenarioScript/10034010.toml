[translation]
10034010-1 = "第1話;來組樂團吧！！"
10034010-2 = "啊，你怎麼直接拿去吃了～～！！！"
10034010-4 = "[ns1]「什麼！？這是限量款嗎！？」\n[ns2]「那怎麼不做個記號呢！？」"
10034010-5 = "也不是啦，可是……！！"
10034010-6 = "我本來正打算這麼做的！可是剛好被老師吃掉了嘛！"
10034010-10 = "所以老師剛才吃的是哪一個？還記得長什麼樣子嗎？"
10034010-11 = "……啊？不記得了？#n隨便拿的所以沒印象！？"
10034010-12 = "吼唷……！那不就得從頭比對一次了嗎……！"
10034010-13 = "你先冷靜點吧。#n現在大呼小叫也改變不了什麼，而且這也沒辦法。"
10034010-14 = "老師他只是跟往常一樣來這裡，然後跟往常一樣隨便拿東西吃……#n所以只是場單純的意外而已。"
10034010-15 = "啊，唔……！這我都知道……！雖然知道，但是……！"
10034010-16 = "啊唔唔唔～～！！！"
10034010-17 = "我也知道對自己找來的人生氣很搞笑，但怎麼偏偏挑這種時候手腳這麼快呢……！"
10034010-18 = "……嗯？你說什麼？"
10034010-19 = "要我解釋一下是什麼情況？#n啊啊，抱歉抱歉。剛才一時太激動就嚷嚷了起來。"
10034010-20 = "簡單來說，我們原本是想請老師幫忙打「分數」的……"
10034010-21 = "也就是把前段時間評論過的甜點都買來擺在桌上，想請老師也品評一下。"
10034010-22 = "[s3]「所以我得把這些全都吃過一遍……？」\n[s4]「是要打幾顆星之類的嗎？」"
10034010-25 = "嗯，沒錯。我們需要比我們更大眾、客觀的評價。"
10034010-26 = "……為了設計「甜點咖啡廳」的菜單。"
10034010-27 = "[s]「……甜點咖啡廳？」"
10034010-28 = "正是如此。#n為了即將到來的大型活動「三一狂歡節」……"
10034010-29 = "也就是三一各個社團展現各自的驕傲，一決高下的盛宴……"
10034010-30 = "……其實也沒那麼誇張。#n只是因為是難得的學園祭，所以每個社團都想推出特色咖啡廳之類的東西而已。"
10034010-31 = "畢竟學園祭很快就要開始了。"
10034010-32 = "因為是相當盛大的活動，有很多像我們一樣的普通社團會參加……"
10034010-33 = "[s5]「原來如此，所以才找我來啊。」\n[s6]「是想把菜單的決定權交給我嗎？」"
10034010-37 = "怎麼樣？我想的這個方法不錯吧？"
10034010-38 = "……嗯？"
10034010-39 = "你說這種事不都是由我決定的？#n……沒有啊？哪有這回事？"
10034010-40 = "我們實際上沒有人擔任部長之類的職位，所以每次都是見機行事。#n這次剛好是喜美提出了意見。"
10034010-41 = "……嗯？"
10034010-42 = "你說沒有部長的話，那最初創立社團的人是誰？"
10034010-46 = "啊哈。你對這件事有興趣嗎……？"
10034010-47 = "哼嗯～"
10034010-48 = "什麼什麼？好像出現了相當有趣的話題。"
10034010-49 = "好！大家都先安靜！#n哼哼哼！現在是選擇題時間！"
10034010-50 = "……老師？"
10034010-51 = "你認為誰是這個社團的創辦人呢？請選擇！"
10034010-57 = "[ns7]「……喜美？」\n[ns8]「……夏？」\n[ns9]「……千紗？」"
10034010-58 = "哼嗯～看起來果然是這樣嗎？#n也對，我確實是社團內意見比較多的人……"
10034010-59 = "實際上也是最有活力的……相對來說也比較聒噪就是了。"
10034010-60 = "你少囉嗦。而且夏明明比我更活力旺盛好嗎？"
10034010-61 = "怎麼躺著也中槍……？"
10034010-62 = "嗯……這麼說也沒錯。"
10034010-63 = "……？？？？#n原來你的槍口也對著我嗎？"
10034010-69 = "不，這不合理吧。誰要加入這傢伙創的社團啊。"
10034010-70 = "確實。"
10034010-71 = "呵呵。瞧瞧你們這不坦率的模樣……真可愛！"
10034010-72 = "要坦率的話，恐怕就只能用行動表示了。"
10034010-73 = "確實挺欠揍的。要扁他的話我也加入。"
10034010-76 = "不不不。我們是甜點部，又不是太妹團。"
10034010-77 = "……想吵架是不是？"
10034010-79 = "我們是「放學後的甜點團」的四大天王！！"
10034010-88 = "盾牌給我放下！！"
10034010-89 = "我不會屈服於暴力──！！"
10034010-91 = "啊～！夠了！不要再胡鬧了！大家認真一點！"
10034010-92 = "不是說好要在愛莉來之前決定好菜單的嗎！#n結果到現在還完全沒有進展，真是的！！"
10034010-93 = "要是愛莉來了之後看到這種情況……"
10034010-100 = "來組樂團吧！！！"
10034010-101 = "喏，你看。#n果然會說「來組樂團」……"
10034010-105 = "樂團……？"
10034010-107 = "大家……！！"
10034010-108 = "我們……！"
10034010-109 = "……來組樂團吧！！！"
10034010-111 = "……樂團？"
10034010-117 = "[ns10]「……突然要組樂團？」\n[ns11]「事情的發展完全出乎意料……」"
10034010-120 = "咦……老師！？"
10034010-121 = "你來得正好！#n沒錯！樂團！是樂團唷，老師！！"
10034010-122 = "不是，那個……愛莉，你先等一下。"
10034010-123 = "再怎麼說也太突然了。#n組樂團……？什麼意思啊？"
10034010-129 = "看到了嗎，夏？太陽要打西邊出來了。"
10034010-130 = "居然能看見千紗吐槽愛莉……"
10034010-131 = "的確是百年難得一見的光景。"
10034010-133 = "才不突然呢！我是在說我們的咖啡廳！要在學園祭上開的咖啡廳！"
10034010-134 = "既然要開，弄得有特色一點不是更好嗎？#n所以來開一間樂團咖啡廳吧！！"
10034010-135 = "單純只是甜點咖啡廳太普通了！#n甜點什麼的在其他社團的咖啡廳也吃得到呀！"
10034010-137 = "你說……什麼……？"
10034010-138 = "哦～出現了不得了的發言～"
10034010-139 = "明明是甜點社團卻否定了甜點……！？"
10034010-141 = "現在不是說這些的時候了！#n能向大家展示樂團表演的機會，只剩下學園祭的開幕典禮而已……"
10034010-142 = "我們只剩兩個星期的時間！#n就算現在馬上去買樂器開始練習，時間也不夠！"
10034010-143 = "你也知道時間完全不夠！！所以才說辦不到嘛！？"
10034010-144 = "唔嗯……但我認為不應該連試都沒試就說做不到……"
10034010-147 = "……？#n所以不對的是我嗎……？"
10034010-148 = "畢竟他意外的是個下定決心就難以阻止的人呢～"
10034010-149 = "唔嗯……這我倒是完全沒料到……"
10034010-151 = "唔，唔嗯……？#n大家怎麼都是這種反應……"
10034010-152 = "真奇怪……我還以為大家會很有熱情的說……"
10034010-153 = "是什麼讓你產生了這種錯覺……"
10034010-154 = "總之先冷靜一下……"
10034010-160 = "[ns12]「愛莉為什麼想組樂團呢？」\n[ns13]「是受了什麼刺激嗎？」"
10034010-163 = "咦……！？我嗎……！？"
10034010-164 = "那，那個……唔嗯……因為……"
10034010-165 = "我……"
10034010-169 = "只是覺得……應該要這麼做……"
10034010-170 = "[s] 「…………」"
10034010-174 = "[ns] 「……？」"
10034010-175 = "……不行！"
10034010-180 = "不行不行不行──！！不行！！！"
10034010-181 = "不行。絕對不行！#n就算是愛莉提出的也一樣，反正不行就是不行！！"
10034010-182 = "怎麼突然說這種天馬行空的話呢！？#n一般情況下我還能盡力配合，但這次真的太超過了！你又不是夏！"
10034010-183 = "怎麼每次都扯到我……"
10034010-184 = "組樂團！？我們是甜點部耶！"
10034010-185 = "那跟甜點八竿子打不著吧！？#n如果要以甜點部的名義參加活動，起碼也得和甜點有點關聯吧！！"
10034010-187 = "喜，喜美醬……"
10034010-188 = "……實話有時候確實挺傷人的。"
10034010-189 = "夏醬……"
10034010-190 = "……抱歉，愛莉。"
10034010-191 = "連千紗醬也……"
10034010-195 = "[ns14]「喜美說的也不無道理。」\n[ns15]「愛莉。先深呼吸一下吧。」"
10034010-198 = "老師……"
10034010-202 = "那，那麼……"
10034010-203 = "…………"
10034010-204 = "所以大家的意思是……只要跟甜點有關就行了對吧？"
10034010-206 = "……咦？"
10034010-207 = "和甜點……"
10034010-208 = "有關……？"
10034010-210 = "我碰巧撿到了一個東西……！請看！"
10034010-211 = "才不是「碰巧」吧，怎麼看都是早有準備……"
10034010-217 = "這個是……？"
10034010-218 = "不就是學園祭開幕慶祝表演的招募海報嗎？#n這跟甜點有什麼關係……"
10034010-219 = "……不，等等。#n喜美你仔細看。"
10034010-220 = "……下面「獎品」的部分。"
10034010-221 = "……獎品？#n獎品怎麼了嗎……"
10034010-225 = "……咦。"
10034010-227 = "……哇。"
10034010-228 = "居然有這種事……"
10034010-233 = "[ns16]「……『Frederica Semla』？」\n[ns17]「是某種甜點的名字嗎？」"
10034010-236 = "沒錯，老師！是一種被稱為「Frederica Semla」的……"
10034010-237 = "……「女王泡芙」。"
10034010-238 = "據說曾因為太過好吃，導致某位古代女王連續吃了14個而昏倒的……傳說中的糕點。"
10034010-240 = "會是真的嗎……？#n目前為止，我們在店裡看過的都是仿冒品之類的東西。"
10034010-241 = "「三一狂歡節」這種規模的活動，身為主辦方的茶會居然拿仿冒品當獎品……？#n我覺得實在有點難以想像。"
10034010-242 = "所以真的是「Frederica Semla」……？認真……？"
10034010-243 = "這下情況就完全不同了……#n不，應該說完全是兩回事。"
10034010-244 = "啊啊，沒錯。前提已經改變了。#n畢竟我們放學後的甜點部……"
10034010-248 = "……可是「為了狩獵未曾品嚐過的甜點而活著的人們」啊。"
10034010-250 = "……嘿嘿。"
10034010-251 = "喜美醬、大家……"
10034010-252 = "怎麼樣……？#n大家現在覺得呢？"
10034010-253 = "……能過得了試鏡嗎？"
10034010-260 = "[ns18]「……咦！？大家怎麼了！？」\n[ns19]「怎麼突然用這麼嚴肅的表情盯著我看！？」"
10034010-263 = "……老師。"
10034010-265 = "來組樂團吧！"

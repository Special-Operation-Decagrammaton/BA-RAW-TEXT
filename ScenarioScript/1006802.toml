[translation]
1006802-1 = "Say Hello, Reisa"
1006802-4 = "Upsy-daisy..."
1006802-5 = "Huh?"
1006802-6 = "Wha-?!"
1006802-7 = "Oh! Hi, Sensei!"
1006802-8 = "[s1] \"Hi, Reisa.\"\n[s2] \"I didn't expect to see you here.\""
1006802-11 = "Yes! What a coincidence! Well, actually... A lot of buses go through here, so maybe it's not that big a coincidence!"
1006802-12 = "Are you on your way somewhere, Sensei? Or waiting for someone? Or...something else?"
1006802-13 = "Oh, you're waiting for the bus! Haha! Yes! That makes so much sense! Of course you are!"
1006802-14 = "Um..."
1006802-15 = "Well! Haha! I'll see you later!"
1006802-19 = "[ns3] \"Wait a moment, Reisa!\"\n[ns4] Stop her!"
1006802-22 = "...?"
1006802-23 = "Hm? What is it? You wanted to talk about something else?"
1006802-24 = "Oh? The MomoTalk I sent this morning?"
1006802-25 = "Ah. That. Hahaha! S-Sorry. It probably worried you. Please forget about it!"
1006802-26 = "I really didn't have anything to say... I was just gonna say hi."
1006802-27 = "But you must have so much to do... Now that I think about it, I must've added another thing to the pile."
1006802-28 = "I'll make sure it doesn't happen again!"
1006802-29 = "[s5] \"No! I'd like you to feel free to say hi whenever you want.\"\n[s6] \"I was actually trying to say that you can text me more, if you'd like.\""
1006802-32 = "...What?"
1006802-33 = "Uh. Oh? Um... T-Thank you?"
1006802-34 = "B-But, Sensei... You really went out of your way...just to say that?"
1006802-35 = "What? You wanna know if I have plans? Um, n-no, not really..."
1006802-36 = "I... rarely do. Unless there's something special going on. Haha..."
1006802-37 = "...Ah!"
1006802-38 = "Don't worry! My friends at school and I are fine! It's nothing like that, okay?"
1006802-39 = "It's me, actually... They ask me to hang out, but I'm not great at texting back..."
1006802-40 = "I just always take too long to think about how to respond, or I make things awkward by being too excited... That's how it usually goes, basically."
1006802-41 = "I was...maybe gonna ask you if you had tips to help me avoid making mistakes like that..."
1006802-42 = "[s7] \"I understand. I thought it'd be something like that.\"\n[s8] \"You just need a little advice, and practice.\""
1006802-45 = "Um... When you put it like that... I feel a bit worse about it..."
1006802-46 = "But... I think, maybe... How should I put this?"
1006802-47 = "I just thought that maybe, since you're a teacher and all... Maybe it'd be okay if I make mistakes with you?"
1006802-51 = "Um! But now that I say that out loud, it makes me sound like even more of an annoyance! I am so, so, so sorry..."
1006802-52 = "You're saying it's fine? But..."
1006802-53 = "[s9] \"Now try that with others, too.\"\n[s10] \"Practice thinking that it's okay if you make mistakes.\""
1006802-56 = "...? I don't get it, Sensei."
1006802-57 = "I already make so many! Why would it be okay to make more?"
1006802-58 = "Huh? You're saying the more I worry about it, the more likely it is to happen...? Um..."
1006802-59 = "I'm sorry! I still don't really get it..."
1006802-60 = "Um! But, you were nice enough to give me advice, Sensei, so even if I don't get it, I'll give it a try! Yep!"
1006802-61 = "It's...a bit scary, actually... But I'll do it anyway!"
1006802-67 = "Oh! There's your bus. Sorry, Sensei. I took up so much of your time after all."
1006802-68 = "Well, I'm heading out! Have a great day, Sensei!"
1006802-73 = "...Okay! Bye now!"
1006802-77 = "[ns11] \"Get home safe.\"\n[ns12] Get on the bus."

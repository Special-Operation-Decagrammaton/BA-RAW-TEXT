[translation]
1006802-1 = "สวัสดี เรอิสะ"
1006802-4 = "ฮึบ..."
1006802-5 = "หืม?"
1006802-6 = "อ๊ะ...?!"
1006802-7 = "อ๊ะ!! คุณครู!! สวัสดีค่ะ!!"
1006802-8 = "[s1] \"ว่าไง เรอิสะ\"\n[s2] \"คิดไม่ถึงเลยว่าจะเจอกันที่นี่\""
1006802-11 = "นั่นสิคะ! สงสัยป้ายรถบัสนี้มีรถหลายสายวิ่งผ่าน เราก็เลยบังเอิญได้เจอกันน่ะคะ!!"
1006802-12 = "คุณครูกำลังจะไปไหนเหรอคะ? หรือว่ามารอใครอยู่เหรอคะ...?"
1006802-13 = "อ๋อ มารอขึ้นรถบัสนี่เอง แหะๆ นั่นสินะคะ พอมาคิดดูแล้ว มันก็ต้องเป็นอย่างนี้อยู่แล้วเนอะ!"
1006802-14 = "อืม..."
1006802-15 = "แหะๆ! ถ้างั้นฉันขอตัวนะคะ...!"
1006802-19 = "[ns3] \"อ๊ะ เดี๋ยวก่อน เรอิสะ\"\n[ns4] เรียกเรอิสะที่กำลังจะเดินจากไป"
1006802-22 = "...??"
1006802-23 = "หืม? ทำไมเหรอคะ? มีอะไรจะคุยกับฉันหรือเปล่าคะ...?"
1006802-24 = "คะ? ข้อความใน MOMOTALK ที่ฉันส่งไปตอนเช้าเหรอคะ?"
1006802-25 = "อ่า... อะฮ่ะฮ่า...! ขะ... ขอโทษนะคะ ฉันไม่น่าทำให้คุณครูกังวลเลย ไม่ต้องใส่ใจหรอกค่ะ!"
1006802-26 = "มันไม่มีอะไรเลยจริงๆ ค่ะ! ฉันก็แค่อยากทักทายเฉยๆ น่ะค่ะ..."
1006802-27 = "พอมาคิดดูแล้ว คุณครูก็น่าจะงานยุ่งมากทีเดียว ไม่รู้ว่าฉันจะไปเพิ่มงานให้คุณครูหรือเปล่า..."
1006802-28 = "ต่อไปฉันจะระวังให้มากกว่านี้ค่ะ!"
1006802-29 = "[s5] \"ไม่หรอก คุยกับครูแบบสบายๆ ได้เลย\"\n[s6] \"ครูจะบอกว่าส่งมาอีกได้นะ\""
1006802-32 = "คะ...?"
1006802-33 = "เอ๋? อืม... ขะ... ขอบคุณค่ะ...?"
1006802-34 = "ตะ... แต่ว่า คุณครูไม่จำเป็นต้องมาที่นี่เพื่อบอกฉันก็ได้นี่นา..."
1006802-35 = "คะ? วันนี้ฉันมีนัดอื่นหรือเปล่างั้นเหรอคะ? มะ... ไม่มีค่ะ ก็ไม่ได้นัดใครไว้หรอกค่ะ..."
1006802-36 = "ปกติ... ฉันไม่ค่อยได้นัดเจอกับใครหรอกค่ะ ถ้าไม่มีเรื่องพิเศษอะไรน่ะนะ แหะๆ..."
1006802-37 = "อ๊ะ!!"
1006802-38 = "ขอบอกก่อนเลยว่าฉันกับเพื่อนๆ ชั้นปีเดียวกันไม่ได้มีปัญหาอะไรหรอกนะคะ ไม่มีปัญหาอะไรกันเลย! ไม่มีเลยแม้แต่สักนิดค่ะ!"
1006802-39 = "ตรงกันข้าม พวกเพื่อนๆ มักคอยส่งข้อความมาหาหรือไม่ก็ชวนไปไหนด้วยกัน แต่ฉันไม่รู้จะตอบ#nกลับยังไง..."
1006802-40 = "แล้วพอคิดนานๆ ก็หมดเวลาตอบ หรือไม่ก็รีบตอบไปจนทำให้อีกฝ่ายลำบากใจ... ก็เป็นซะอย่างนี้#nแหละค่ะ!!"
1006802-41 = "ฉะ... ฉันก็เลยคิดว่าจะถามคุณครูว่าต้องทำยังไงถึงจะไม่ทำพลาดแบบนั้นอีก..."
1006802-42 = "[s7] \"อืม ครูคิดแล้วว่าต้องเป็นเรื่องแบบนี้\"\n[s8] \"ครูเข้าใจ เรอิสะต้องการคนฝึกและให้คำปรึกษาน่ะ\""
1006802-45 = "พะ... พูดแบบนี้ฉันยิ่งรู้สึกผิดยังไงก็ไม่รู้ค่ะ..."
1006802-46 = "อืม แต่ฉันว่ามันก็จริงอยู่นะคะ เพราะคุณครูน่ะ... จะว่ายังไงดีนะ..."
1006802-47 = "ฉันคิดว่า... คุณครูเป็นครูผู้สอนก็คงจะเข้าใจ ถ้างั้นจะทำผิดพลาดนิดหน่อยคงไม่เป็นไร... ประมาณนี้#nน่ะค่ะ"
1006802-51 = "พอกล้าพูดออกมาหน่อย ก็ดูเหมือนยิ่งพูดกวนคุณครูเลยนะคะเนี่ย ขอโทษจริงๆ ค่ะ..."
1006802-52 = "ไม่เป็นไรงั้นเหรอคะ? แต่ว่า..."
1006802-53 = "[s9] \"จากนี้ก็ลองทำแบบเดียวกันกับคนอื่นดูนะ\"\n[s10] \"อย่าไปคิดล่วงหน้าเลยว่าเราพูดอะไรผิดไป\""
1006802-56 = "...??? หมายความว่ายังไงคะ?"
1006802-57 = "ตอนนี้ฉันก็พูดผิดพลาดเยอะอยู่แล้ว จะให้พูดผิดเพิ่มอีกเหรอคะ..."
1006802-58 = "เป็นเพราะเอาแต่สนใจกับสิ่งที่ไม่ควรทำ ก็เลยทำโดยไม่รู้ตัวงั้นเหรอคะ? อืม...? ไม่เห็นเข้าใจเลยค่ะ..."
1006802-59 = "อืม... ขอโทษด้วยค่ะ ฉันไม่เข้าใจจริงๆ ค่ะ"
1006802-60 = "ฮึ่ม! แต่ในเมื่อคุณครูพูดแบบนี้! ต่อให้ไม่เข้าใจ ฉันก็จะลองเชื่อดูค่ะ!! เอาแบบนี้แหละค่ะ!!!"
1006802-61 = "ถึงแม้ว่าในใจจะรู้สึกกลัวอยู่หน่อยๆ... แต่ฉันก็จะลองทำดูค่ะ!!"
1006802-67 = "อ๊ะ รถมาแล้ว... วันนี้ฉันรบกวนเวลาคุณครูไปเยอะเลยค่ะ"
1006802-68 = "ฉันขอตัวก่อนนะคะ! ขอให้วันนี้เป็นวันที่ดีนะคะคุณครู!!"
1006802-73 = "ฉันไปก่อนนะคะ ไปจริงๆ แล้วค่ะ!!"
1006802-77 = "[ns11] \"กลับดีๆ นะ\"\n[ns12] ขึ้นรถ"

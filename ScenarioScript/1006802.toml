[translation]
1006802-1 = "你好呀，澪紗"
1006802-4 = "嘿咻……"
1006802-5 = "……咦？"
1006802-6 = "……啊！"
1006802-7 = "啊啊啊！！老師！！你好！！"
1006802-8 = "[s1]「你好呀，澪紗。」\n[s2]「沒想到會在這裡遇到你，真巧呢。」"
1006802-11 = "就是說啊！我也沒想到會在這裡遇到老師！"
1006802-12 = "那個……老師在這裡做什麼呢……？"
1006802-13 = "啊，回去的公車……聽你這麼一說，確實也到這個時間了呢！#n抱歉問了奇怪的問題！"
1006802-14 = "唔嗯……"
1006802-15 = "啊哈哈！那麼我就先……！"
1006802-19 = "[ns3]「啊，等等，澪紗。」\n[ns4] 叫住正打算離開的澪紗"
1006802-22 = "……？？"
1006802-23 = "怎麼了嗎？還是有什麼事……？"
1006802-24 = "……啊，早上傳的MomoTalk是嗎？"
1006802-25 = "啊，啊哈哈……！那個是……不好意思讓老師費心了。#n我完全、真的沒問題的！"
1006802-26 = "也沒有發生什麼特別的事！#n只是想，跟老師打聲招呼而已……"
1006802-27 = "不過仔細想想，老師這麼忙，這樣會造成你的困擾對吧……"
1006802-28 = "以後我會注意不做無謂的聯絡！"
1006802-29 = "[s5]「更隨意聯絡我也沒關係唷。」\n[s6]「不用想太多，隨時可以聯絡我。」"
1006802-32 = "……什麼？"
1006802-33 = "嗯……咦，咦？#n謝，謝謝老師……"
1006802-34 = "難道……是為了跟我說這些才……？"
1006802-35 = "……嗯？等會是嗎？#n是沒有什麼計畫……"
1006802-36 = "除非發生什麼事件……啊哈哈。"
1006802-37 = "……啊！！"
1006802-38 = "那個……我跟班上同學處得很好哦！！#n完全沒有那種問題！！是真的！！"
1006802-39 = "反而該說，雖然有各種邀約……#n但……我總是無法好好回覆……"
1006802-40 = "花了太多時間思考該怎麼回答，結果沒能說出來，#n或是反應太過激烈讓人感到困擾之類的……大概是這種感覺！"
1006802-41 = "所，所以……那個……想聽聽，老師的建議……"
1006802-42 = "[s7]「你想要一個談話的對象對吧。」\n[s8]「澪紗的心情，我非常能夠明白。」"
1006802-45 = "老師明明很忙的，真是不好意思……不過……"
1006802-46 = "神奇的是，如果是在老師面前，那個……該怎麼說呢……"
1006802-47 = "就算說出一些有點奇怪的話也會被原諒……#n一定沒關係的，這種想撒嬌的心情就會……"
1006802-51 = "啊……我剛才說了非常失禮的話……對不起。"
1006802-52 = "沒關係？是這樣嗎……"
1006802-53 = "[s9]「嗯，率直的澪紗最棒了唷。」\n[s10]「不要想太多或許反而會比較好。」"
1006802-56 = "……？？？#n那是什麼意思呢？"
1006802-57 = "明明我總是一再失言，卻說不用在意……"
1006802-58 = "過度在意反而會有反效果……？#n唔嗯……嗯嗯……？"
1006802-59 = "……對不起，我還是不太清楚！"
1006802-60 = "不過！這是老師給我的建議！"
1006802-61 = "老實說，我自己其實不是很理解，也覺得有點害怕……#n不過我會試試看的！要勇於嘗試，對吧！"
1006802-67 = "啊。公車正好來了呢。#n不好意思，我一直說個不停。"
1006802-68 = "我就先告辭了！老師，祝你有美好的一天！"
1006802-73 = "……那麼，我會再聯絡你的哦！！！"
1006802-77 = "[ns11]「……小心別受傷了哦。」\n[ns12] 搭上公車"

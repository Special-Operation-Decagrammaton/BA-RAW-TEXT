1006802-56 = "3;레이사;04;……??? 그게 무슨 말인가요?"
1006802-57 = "3;레이사;01;그치만 지금도 실수가 많은데, 실수를 더 하라니……."
1006802-58 = "3;레이사;02;'하지 않으려는 것에만 집중하다 보면 그런 일도 생긴다'고요? 으음? 무슨 뜻인지 잘……."
1006802-59 = "3;레이사;08;……으음……. 죄송해요. 역시 잘 모르겠네요.\n#3;stiff"
1006802-60 = "3;레이사;09;음! 그렇지만 선생님의 말씀이니까요! 몰라도 해봐야겠죠!! 네!!!\n#3;em;[!]"

1006802-1 = "#title;안녕 레이사"
1006802-2 = "#wait;2900"
1006802-3 = "3;레이사;01\n#3;black"
1006802-4 = "3;레이사;01;영차…….\n#3;greeting\n#3;a"
1006802-5 = "3;레이사;02;……음?\n#3;em;[?]"
1006802-6 = "3;레이사;17;……어!\n#3;stiff"
1006802-7 = "3;레이사;03;어어어어-!! 선생님!! 안녕하세요!!\n#3;closeup"
1006802-8 = "[s1] \"안녕, 레이사.\"\n[s2] \"이런 곳에서 다 보네.\""
1006802-9 = "#wait;100"
1006802-10 = "#wait;100"
1006802-11 = "3;레이사;09;그러게요! 우연이네요! 하긴 이 정류장은 노선들이 많이 지나니까요!!\n#3;hophop"
1006802-12 = "3;레이사;02;선생님도 어디 가시는 길인가요? 아니면 반대로 누구 기다리시는 길……?"
1006802-13 = "3;레이사;07;아, 버스 기다리시는 길이시라고요. 하하, 그렇죠. 당연하겠네요! 생각해 보니.\n#3;em;[땀]"
1006802-14 = "3;레이사;01;음……."
1006802-15 = "3;레이사;15;하하! 그럼 저는 이만……!\n#3;stiff"
1006802-16 = "#st;[0,0];instant;1;"
1006802-17 = "#clearST"
1006802-18 = "3;레이사;15\n#3;m2\n#wait;1000"
1006802-19 = "[ns3] \"아, 잠깐. 레이사.\"\n[ns4] 가려던 레이사를 불러 세운다."
1006802-20 = "#wait;100"
1006802-21 = "#wait;100"
1006802-22 = "3;레이사;04;……??\n#3;em;[?!]\n#3;shake"
1006802-23 = "3;레이사;01;음? 왜 그러시나요? 뭔가 하실 말씀이라도……."
1006802-24 = "3;레이사;02;……네? 아, 아침에 보내 드렸던 모모톡이요?\n#3;m3"
1006802-25 = "3;레이사;15;아, 아하하……! 그, 그건 죄송해요. 괜히 신경 쓰시게 만들었나 보네요. 신경 쓰지 않으셔도 됩니다!\n#3;stiff"
1006802-26 = "3;레이사;01;진짜로 아무 내용 없었던 것뿐이니까요! 그냥 인사드리려고 그랬던 것이라……."
1006802-27 = "3;레이사;02;하긴 생각해 보면 선생님도 가뜩이나 바쁘실 텐데, 일을 얹어드린 것인지도 모르겠네요."
1006802-28 = "3;레이사;07;앞으로는 주의하도록 하겠습니다!\n#3;greeting"
1006802-29 = "[s5] \"아냐. 정말로 편하게 해도 괜찮아.\"\n[s6] \"더 해도 된다고 말하려고 그런 거야.\""
1006802-30 = "#wait;100"
1006802-31 = "#wait;100"
1006802-32 = "3;레이사;02;……네?\n#3;em;[?]"
1006802-33 = "3;레이사;01;어라? 어? 음……? 가, 감사합니다……?\n#3;stiff"
1006802-34 = "3;레이사;01;그, 그런데 선생님. 굳이 그런 말씀을 해 주시려고……."
1006802-35 = "3;레이사;02;……네? 오늘 약속이라든가 있냐고요? 아, 아뇨. 딱히 그렇지는……."
1006802-36 = "3;레이사;15;약속……은 보통 없죠. 특별한 일 없는 이상에야. 하하……."
1006802-37 = "3;레이사;14;……앗!!\n#3;em;[반응]"
1006802-38 = "3;레이사;13;혹시나 해서 미리 말씀드리지만 학급 친구들이랑은 잘 지내고 있으니까요!! 전혀 그런 거 아니니까요! 절대로!!\n#3;hophop"
1006802-39 = "3;레이사;06;오히려 연락이나 같이 놀자는 말은 오는데, 제가 제대로 반응을 못 한달까……."
1006802-40 = "3;레이사;14;고민하다 타이밍이 늦어버린다거나, 어쩌다 보니 너무 격하게 반응해서 곤란하게 만든다거나……. 그런 게 좀 있죠!! 네! 그런 거죠!!"
1006802-41 = "3;레이사;15;그, 그래서 선생님께 어떻게 하면 그런 실수를 좀 줄일 수 있을까 하고…….\n#3;stiff"
1006802-42 = "[s7] \"응. 그런 일일 거라 생각했어.\"\n[s8] \"연습과 조언 상대가 필요한 거지. 이해해.\""
1006802-43 = "#wait;100"
1006802-44 = "#wait;100"
1006802-45 = "3;레이사;01;그, 그렇게 말씀하시니 뭔가 더욱 죄송스러워지는걸요…….\n#3;em;[땀]"
1006802-46 = "3;레이사;06;으음. 하지만 사실이기도 한 것 같아요. 선생님은 좀……. 뭐라고 해야 할까……."
1006802-47 = "3;레이사;04;그래도 선생님……이시니까? 제가 실수해도 괜찮지 않을까……? 그런 생각에……."
1006802-48 = "#st;[0,0];instant;1;"
1006802-49 = "#clearST"
1006802-50 = "3;레이사;04\n#3;em;[...]\n#wait;2500"
1006802-51 = "3;레이사;16;뭔가 말하고 나니 더 대놓고 민폐였군요. 정말 죄송합니다…….\n#3;stiff"
1006802-52 = "3;레이사;06;……괜찮으시다고요? 그렇지만……."

[translation]
80000035-1 = "總之我有準備了！"
80000035-3 = "嗯，這樣就差不多了吧。接下來把這些文件……"
80000035-8 = "[ns]「亞子，這些文件該放在哪裡呢？」"
80000035-9 = "啊，請放在這裡。"
80000035-10 = "呼……突然就忙碌了起來，感謝老師的幫忙。"
80000035-11 = "這種時候，就連貓咪的手……不對，就連老師的手也能派上用場呢。"
80000035-12 = "[s]「那就好……」"
80000035-13 = "雖然老師的表情好像有所不滿，但我們不接受抱怨唷。"
80000035-14 = "不過……真拿您沒辦法。#n每完成一份文件，就給您一個獎勵吧。"
80000035-16 = "[s]「是巧克力啊，謝謝。」"
80000035-17 = "那麼接下來也拜託老師囉？"
80000035-21 = "[ns]「這份也OK了，我放在這裡哦。」"
80000035-22 = "好的，謝謝。那麼請收下。"
80000035-23 = "[s]「感激不盡。」"
80000035-26 = "那麼請收下這個巧克力……"
80000035-30 = "好的，請收下……"
80000035-35 = "辛苦了，請收下吧。"
80000035-37 = "（就這樣，每當將文件交給亞子就能持續地獲得巧克力……）"
80000035-40 = "[ns]「……難道這個巧克力，是亞子自己做的嗎？」"
80000035-41 = "什麼！？"
80000035-42 = "您，您是什麼時候發現的……！？"
80000035-43 = "[s1]「一開始給我巧克力的時候。」\n[s2]「不知為何一開始就知道了。」"
80000035-44 = "明明一開始就有注意到卻假裝不知道……！？"
80000035-45 = "明明一開始就有注意到卻假裝不知道……！？"
80000035-46 = "啊啊真是，性格太差勁了吧！！"
80000035-47 = "[s]「抱歉，我太開心了所以才……」"
80000035-48 = "唉……算了，被發現也沒關係。其實也無所謂。"
80000035-49 = "話說回來……"
80000035-50 = "既然都被發現了，請發表一點感想吧。"
80000035-51 = "我也是付出很多努力做出來的……"
80000035-52 = "[s]「那要不要趁機休息一下？我去泡咖啡。」"
80000035-56 = "……好吧，這樣也不錯。"
80000035-57 = "麻煩給我一杯Espresso。"
80000035-59 = "（之後一邊聽亞子發工作方面的牢騷，一邊悠閒地品嚐咖啡和巧克力）"

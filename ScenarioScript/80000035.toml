[translation]
80000035-1 = "นี่ฉันเตรียมมาให้เลยนะคะ"
80000035-3 = "อืม... เอกสารนี่เท่านี้ก็น่าจะพอแล้วล่ะ..."
80000035-8 = "[ns] \"อาโกะ เอกสารที่เสร็จแล้ววางไว้ตรงไหนดี?\""
80000035-9 = "อ๊ะ ถ้าเสร็จแล้วรบกวนใส่ลงถาดตรงนี้ได้เลยค่ะ"
80000035-10 = "ฮิฮิ มีคุณครูมาช่วยตอนที่ยุ่งแบบนี้ค่อยยังชั่วหน่อยค่ะ"
80000035-11 = "จริงๆ นะคะ ตอนที่หัวหมุนแบบนี้แม้แต่แมว... แม้แต่คุณครูก็ยังมีประโยชน์เลยค่ะ"
80000035-12 = "[s] \"แอบด่าครูรึเปล่าเนี่ย?\""
80000035-13 = "เปล่าเลยนะคะ อย่าคิดเล็กคิดน้อยสิคะ"
80000035-14 = "แล้วก็นี่ค่ะ ฉันให้เป็นรางวัลที่ทำเอกสารเสร็จหนึ่งแผ่นค่ะ"
80000035-16 = "[s] \"อ๊ะ ช็อกโกแลตนี่นา\""
80000035-17 = "ฉันให้รางวัลคุณครูแล้ว เพราะงั้นช่วยทำงานต่อด้วยนะคะ"
80000035-21 = "[ns] \"เสร็จอีกแผ่นแล้วล่ะ\""
80000035-22 = "ค่ะ ถ้างั้นคราวนี้ก็... นี่ค่ะ ให้ช็อกโกแลตเป็นรางวัลค่ะ"
80000035-23 = "[s] \"โอ้ววว ขอบใจนะ\""
80000035-26 = "แล้วก็อันนี้... ช็อกโกแลตที่เป็นรางวัล"
80000035-30 = "ฉันจะให้เพิ่มอีกหนึ่งชิ้นนะคะ"
80000035-35 = "ส่วนนี่ก็ช็อกโกแลต..."
80000035-37 = "(และในตอนที่คุณครูจะได้รับช็อกโกแลตเป็นรางวัลจากอาโกะเกินหกชิ้น...)"
80000035-40 = "[ns] \"นี่มัน... ช็อกโกแลตฝีมืออาโกะงั้นเหรอ?\""
80000035-41 = "...?! ดะ...เดี๋ยวก่อน ทำไมถึงได้..."
80000035-42 = "ไม่สิ... รู้ได้ยังไง แล้วรู้ตั้งแต่เมื่อไรคะ?!"
80000035-43 = "[s1] \"ตั้งแต่แรกที่ให้ช็อกโกแลตแล้วล่ะ\"\n[s2] \"แค่เห็นว่าหน้าตาช็อกโกแลตมันสวยดี...\""
80000035-44 = "รู้มาตั้งแต่แรกแล้ว... แต่กลับทำหน้าไม่รู้ไม่ชี้รับช็อกโกแลตจากฉันไปงั้นเหรอคะ?!"
80000035-45 = "รู้มาตั้งแต่แรกแล้ว... แต่กลับทำหน้าไม่รู้ไม่ชี้รับช็อกโกแลตจากฉันไปงั้นเหรอคะ?!"
80000035-46 = "นิสัยเสียเกินไปแล้วรึเปล่าคะ?"
80000035-47 = "[s] \"ก็พอได้รางวัลจากอาโกะ มันทำให้อารมณ์ดีแปลกๆ นี่นา\""
80000035-48 = "อา... ค่ะ... ก็ดีค่ะ ถึงคุณครูจะรู้แล้วก็ไม่เป็นไร เพราะยังไงก็ถือว่าเป็นเรื่องดีค่ะ"
80000035-49 = "ยิ่งกว่านั้น..."
80000035-50 = "ถ้ารู้ว่าเป็นช็อกโกแลตที่ฉันทำเองแล้วละก็ ทานแล้วก็ช่วยบอกความรู้สึกมาด้วยสิคะ"
80000035-51 = "ฉันตั้งใจทำขึ้นมามากๆ เลยนะคะ..."
80000035-52 = "[s] \"อื้อ ถ้างั้นมาพักดื่มกาแฟกันหน่อยดีมั้ย?\""
80000035-56 = "เฮ้อ... ช่วยไม่ได้นะคะ"
80000035-57 = "ของฉันขอเป็นเอสเปรสโซแล้วกันค่ะ"
80000035-59 = "(หลังจากนั้นคุณครูก็นั่งดื่มกาแฟและกินช็อกโกแลตไปพร้อมๆ กับนั่งฟังอาโกะบ่นเรื่องงาน)"

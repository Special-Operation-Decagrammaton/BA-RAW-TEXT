[translation]
80000035-1 = "#title;아무튼 준비한 거예요."
80000035-2 = "#wait;1500"
80000035-3 = "2;아코;01;……흐음. 이 서류는 이 정도면…….\n#2;em;…\n#2;a"
80000035-4 = "#st;[0,0];instant;1;"
80000035-5 = "#clearST"
80000035-6 = "#wait;1000"
80000035-7 = "#wait;1000"
80000035-8 = "[ns] \"아코, 여기 끝난 서류는 어디에 둘까?\""
80000035-9 = "2;아코;02;아, 그거라면 이쪽 바구니에 넣어주시겠나요?\n#2;em;[반응]\n#2;m3"
80000035-10 = "2;아코;03;후훗, 이렇게 바쁜 시기에 선생님의 도움을 받을 수 있어서 다행이네요."
80000035-11 = "2;아코;07;정말로 급할 때는 고양이……. 아니, 선생님 손이라도 일단 쓸데는 있는 법이로군요.\n#2;em;[반짝]\n#2;greeting"
80000035-12 = "[s] \"저기 너무 비꼰 끝에 원래 의미가 사라지지 않았어?\""
80000035-13 = "2;아코;08;네에, 불평은 접수하지 않겠습니다.\n#2;em;[음표]"
80000035-14 = "2;아코;03;그보다 자아, 서류 한 장을 끝낸 상으로 이걸 드릴게요.\n#2;greeting"
80000035-15 = "#wait;1000"
80000035-16 = "[s] \"앗, 초콜릿이다.\""
80000035-17 = "2;아코;07;그럼 상도 드렸으니, 이후의 작업도 부탁드린다고요?\n#2;em;[재잘]"
80000035-18 = "#all;hide"
80000035-19 = "#wait;1000"
80000035-20 = "#wait;1000"
80000035-21 = "[ns] \"또 하나 끝났어.\""
80000035-22 = "3;아코;08;네, 그럼 이번에도 여기. 상으로 초콜릿이에요.\n#3;em;[반응]\n#3;a"
80000035-23 = "[s] \"오오- 고마워.\""
80000035-24 = "#all;hide"
80000035-25 = "#wait;1000"
80000035-26 = "3;아코;03;그럼 여기, 상으로 초콜릿을.\n#3;a\n#3;em;[반짝]"
80000035-27 = "#all;hide"
80000035-28 = "#wait;750"
80000035-29 = "#wait;750"
80000035-30 = "3;아코;07;네, 또 하나, 초콜릿을 드릴게요.\n#3;a\n#3;em;[음표]"
80000035-31 = "#all;hide"
80000035-32 = "#wait;500"
80000035-33 = "#wait;500"
80000035-34 = "#wait;500"
80000035-35 = "3;아코;08;그리고 또 여기, 초콜릿을…….\n#3;a"
80000035-36 = "#all;hide"
80000035-37 = "#na;(그렇게 아코에게서 상으로 받은 초콜릿이 6개를 넘어갈 때 즈음.)"
80000035-38 = "#all;hide"
80000035-39 = "#wait;2500"
80000035-40 = "[ns] \"이거, 지금 보니까. 아코의 수제 초콜릿인 거지?\""
80000035-41 = "3;아코;04;…………?! 자, 잠! 그걸 어떻게?!\n#3;em;[?!]\n#3;shake\n#3;a"
80000035-42 = "3;아코;12;아니……. 언제부터, 어디서부터 눈치채고 있었던 거죠?!\n#3;hophop\n#3;closeup"
80000035-43 = "[s1] \"대충 맨 처음 초콜릿을 줬을 때부터?\"\n[s2] \"그냥 모양새가 이뻐서 어쩌다 보니……?\""
80000035-44 = "3;아코;10;이미 맨 처음부터 다 알고 있으면서, 모르는 척 새침한 표정으로 제 초콜릿을 받고 계셨단 건가요?!\n#3;stiff"
80000035-45 = "3;아코;10;이미 맨 처음부터 다 알고 있으면서, 모르는 척 새침한 표정으로 제 초콜릿을 받고 계셨단 건가요?!\n#3;stiff"
80000035-46 = "3;아코;05;성격, 너무 나쁜 거 아니에요?!\n#3;em;[!]\n#3;hophop"
80000035-47 = "[s] \"아코의 포상이, 너무 기쁜 나머지. 저도 모르게.\""
80000035-48 = "3;아코;11;……아아. 네, 뭐, 좋아요. 들켜도 상관없다고요. 그런 건 아무래도 좋은 일이니까.\n#3;em;[땀]\n#3;greeting"
80000035-49 = "3;아코;09;그보다……."
80000035-50 = "3;아코;05;제가 만든 초콜릿이란 걸 알았으면, 드시고 나서 감상이나 제대로 말해달라구요."
80000035-51 = "3;아코;02;……일단은, 그 노력해서 만든 거니까.\n#3;em;[///]\n#3;stiff"
80000035-52 = "[s] \"응. 그럼 잠깐 쉴까? 커피 타올게.\""
80000035-53 = "#st;[0,0];instant;1;"
80000035-54 = "#clearST"
80000035-55 = "3;아코;09\n#3;em;…\n#wait;2500"
80000035-56 = "3;아코;99;하아. 정말 어쩔 수 없다니까요.\n#3;em;[속상함]\n#3;stiff"
80000035-57 = "3;아코;01;……전, 에스프레소로 부탁드리겠어요."
80000035-58 = "#all;hide"
80000035-59 = "#na;(그 뒤로 업무와 관련해 툴툴거리는 아코와 함께 커피랑 초콜릿을 맛보았다.)"

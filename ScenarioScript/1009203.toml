[translation]
1009203-1 = "คำแนะนำในการออกแบบ"
1009203-4 = "(คุณครูได้รับข้อความจากโยชิมิ จึงออกไปยังคาเฟ่ที่โยชิมิรออยู่)"
1009203-9 = "อ๊ะ คุณครู ทางนี้ ทางนี้!"
1009203-15 = "(โยชิมินั่งอยู่ที่มุมหนึ่งของคาเฟ่ บนโต๊ะมีของหวานที่เธอสั่งมาและสมุดฝึกหัดกองโต)"
1009203-23 = "มาหากันทันทีเลยนะ?"
1009203-24 = "วันนี้ไม่มีงานอะไรทำเหรอ?"
1009203-28 = "ใช่แล้วงั้นเหรอ?"
1009203-29 = "เดี๋ยวสิ ถ้ารีบตอบโต้งๆ แบบนี้ฉันก็ขายหน้าน่ะสิ..."
1009203-33 = "จะ... จะยังไงก็เถอะ! ตอนนี้สิ่งสำคัญไม่ใช่เรื่องนั้น"
1009203-34 = "ก็การออกแบบเนี่ยน่ะสิ ไม่ใช่งานง่ายๆ เลยนะ ฉันว่าฉันทำคนเดียวไม่ไหว"
1009203-35 = "ก็เลยเรียกคุณครูมาให้ช่วยกันหน่อยน่ะ ช่วยได้อยู่ใช่มั้ย?"
1009203-39 = "[ns1] \"ครูไม่ค่อยรู้เรื่องการออกแบบไอคอนสักเท่าไร...\"\n[ns2] \"ว่าแต่กำลังวาดสัญลักษณ์ของวงอยู่เหรอ?\""
1009203-40 = "หืม...?"
1009203-41 = "ไอคอนอะไร?"
1009203-42 = "สัญลักษณ์?"
1009203-43 = "สัญลักษณ์อะไรเหรอ...?"
1009203-44 = "...?"
1009203-45 = "คิดว่าฉันเรียกมาให้ช่วยเรื่องการออกแบบสัญลักษณ์ของวงงั้นเหรอ?"
1009203-46 = "ไม่ใช่นะ? อันนั้นฉันจะเอาไว้ทำทีหลัง"
1009203-50 = "[ns3] \"ไม่ได้กำลังวาดสัญลักษณ์ของวงเหรอ?\"\n[ns4] \"แล้วตอนนี้ที่ตั้งใจทำอยู่คือ...\""
1009203-55 = "อ่า..."
1009203-56 = "ก็อันนี้ไง..."
1009203-61 = "[ns] \"......\""
1009203-65 = "...?"
1009203-66 = "[ns5] \"สรุปว่าเรื่อง 'การออกแบบ' ที่ว่า...\"\n[ns6] \"อันนี้คือการออกแบบลายเซ็นตัวเองเหรอ...?\""
1009203-69 = "อะไรกัน? ทำไมทำท่าทีแปลกๆ ล่ะ? มีเรื่องอะไรงั้นเหรอ?"
1009203-70 = "ว่าไงนะ...?"
1009203-71 = "ทำไมจู่ๆ ฉันถึงมาฝึกเซ็นลายเซ็นตัวเองน่ะเหรอ? ถามเพราะไม่รู้จริงๆ เหรอ?"
1009203-72 = "ของมันก็แน่อยู่แล้วรึเปล่า? อะไรกัน...? หรือว่าฉันทำอะไรผิดไปนะ?"
1009203-76 = "ฟังนะคุณครู ตอนนี้พวกฉันทำวงดนตรีแล้วนะ"
1009203-77 = "พวกฉันจะไปเปิดการแสดงเพื่อฉลองเทศกาลเชียวนะ มันก็ต้องมีคนไปดูเยอะเลยน่ะสิ?"
1009203-78 = "และถ้าเราเล่นได้ดี พวกเราก็ต้องมีชื่อเสียงขึ้นถูกมั้ย?"
1009203-79 = "ถ้าถึงตอนนั้นขึ้นมาแล้วเราไม่มีลายเซ็นเลยก็ยุ่งน่ะสิ ว่ามั้ย? ฉันพูดถูกใช่มั้ย?"
1009203-83 = "ใช่... มั้ย? คงไม่ผิดหรอกเนอะ? เนอะ?"
1009203-84 = "ใช่แหละ... เนอะ?"
1009203-85 = "[s7] \"ฝันให้ไกลมันก็ดีอยู่หรอกนะ...\"\n[s8] \"เตรียมเอาไว้เผื่อว่าจะดังก็ไม่เลวหรอก\""
1009203-88 = "หะ... หืม? งั้น... เหรอ...?"
1009203-92 = "เดี๋ยวนะ อ่า..."
1009203-93 = "อะ... เอ่อ... ทำไมรู้สึกเหมือนหน้าร้อนผ่าวขึ้นมาเลย..."
1009203-94 = "น่าอายชะมัด... นี่ฉันทำอะไรอยู่เนี่ย..."
1009203-98 = "เดี๋ยวนะ... คุณครู"
1009203-99 = "อย่าเพิ่งพูดอะไรนะ ปิดปากไปก่อนเลย ห้ามพูด ห้ามพูดอะไรออกมานะ"
1009203-100 = "[s9] \"คิกคิก นี่สินะ... คนจะเป็นซุปตาร์\"\n[s10] \"เพื่อนๆ รู้รึเปล่าว่ามาทำอย่างนี้อยู่น่ะ\""
1009203-103 = "บอกแล้วไงว่าให้ปิดปากไปเลย!!!!! นั่งเงียบๆ เลยนะ!!!!"
1009203-104 = "เฮ้อ จริงๆ เลย!!!"
1009203-108 = "เดี๋ยวก่อนสิ คือว่า... เฮ้อ..."
1009203-113 = "[ns] หัวเราะ"
1009203-118 = "หัวเราะก็ไม่ได้!!!! บอกว่าให้อยู่เงียบๆ ไง!!! นั่งเฉยๆ ไปเลย!!!"
1009203-121 = "อืม... อืมม..."
1009203-122 = "[s11] \"ถึงกับต้องซ่อนเลยเหรอ มันน่ารักดีออก\"\n[s12] \"ครูแกล้งเล่นหรอกน่า เราอาจจะดังเปรี้ยงปร้างขึ้นมาจริงๆ ก็ได้นะ\""
1009203-125 = "ไม่ต้องเลย!! ไม่ต้องมาอวยเลย!! ฟังแล้วไม่ได้ดีใจสักนิด!!"
1009203-126 = "เรื่องคิดเองไปก่อนล่วงหน้าน่ะเป็นนิสัยของฉันไปแล้ว ฉันก็เป็นแบบนี้มาตั้งแต่เด็กๆ นี่นา!"
1009203-127 = "คุณครูก็ไม่ได้เพิ่งจะรู้จักฉันแค่วันสองวัน เรื่องแบบนี้ก็น่าจะรู้อยู่แล้วไม่ใช่เหรอ!!!"
1009203-131 = "หืม...? ว่าไงนะ?"
1009203-132 = "ขอกระดาษแผ่นหนึ่งเหรอ? กระดาษอะไร..."
1009203-133 = "ลายเซ็นเหรอ?"
1009203-134 = "อะไรกัน...? จะล้อกันอีกแล้วเหรอ?"
1009203-135 = "[s13] \"ก็เราไม่รู้ว่าอนาคตจะเป็นยังไงนี่นา\"\n[s14] \"ถ้าไม่คิดไว้ก่อนมันก็อาจลำบากก็ได้\""
1009203-138 = "อะ... อึก! จะเริ่มอีกแล้วเหรอ..."
1009203-139 = "พูดอะไรแทงใจชะมัด..."
1009203-140 = "แต่ก็เอาเถอะ ถือว่าพูดได้ดีแล้วละ คงคิดว่าถ้าพูดอะไรแบบนั้นแล้วฉันจะรู้สึกดีอย่างนั้นสินะ?"
1009203-144 = "แต่ก็เหมือนจะดีขึ้นมานิดหน่อยนะ"
1009203-148 = "ฮึ่ยยยยย~!! น่าหงุดหงิด!!"
1009203-149 = "แล้วทำไมฉันถึงรู้สึกดีด้วยนะ!!"
1009203-150 = "เฮ้อ... ช่างมันเถอะ ยังไงก็รู้อยู่แล้วว่าเอาชนะไม่ได้ ใช่ว่าเรื่องแบบนี้จะไม่เคยเกิดด้วย"
1009203-154 = "งั้นขอหาแผ่นที่เซ็นไว้ดีๆ อีกสักแผ่น..."
1009203-159 = "คุณลูกค้าครับ นี่ใบเสร็จของเมนูที่สั่งไว้ครับ"
1009203-160 = "ช่วยเซ็นตรงนี้ให้หน่อยนะครับ"
1009203-164 = "อ๊ะ ได้ค่ะ สักครู่นะ"
1009203-168 = "ลายเซ็น... ลายเซ็น..."
1009203-173 = "...?"
1009203-179 = "อ๊ะ... พลาดจนได้"
1009203-180 = "...?"
1009203-184 = "[ns15] \"อย่าบอกนะว่า!!\"\n[ns16] \"เซ็นลายเซ็นคนดังลงไปในใบเสร็จเหรอ...!\""
1009203-188 = "[ns] \"ว้าว ลายเซ็นสวยจังเลย!\""
1009203-192 = "ไม่ๆ เดี๋ยวก่อนนะ! นั่นมัน...!!"
1009203-193 = "เดี๋ยวก่อน! ไม่ได้นะ!!!"
1009203-194 = "อย่านะ ไม่ได้! บอกว่าไม่ได้ก็คือไม่ได้สิ"
1009203-195 = "ฉันจริงจังนะ ไม่งั้นฉันเอาตายแน่ๆ! ฉันพูดจริงนะ!!!"
1009203-197 = "[ns17] \"นี่สินะซุปตาร์ในอนาคต!!\"\n[ns18] \"ใบเสร็จนี้ต้องเป็นของแรร์แน่เลย!!\""
1009203-200 = "อ๊ากกกกกกกกกก!!"
1009203-214 = "(แล้วพนักงานที่ร้านก็เดินมาดุว่าอย่าส่งเสียงดัง)"

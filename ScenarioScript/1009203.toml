[translation]
1009203-1 = "Design Advice?"
1009203-4 = "After getting Yoshimi's message, I went to meet her at the cafe."
1009203-9 = "Ah, Sensei. Here, over here!"
1009203-15 = "I found Yoshimi in the corner of the shop, with scrap papers and a pile of desserts at her table."
1009203-23 = "You got here fast, didn't you?"
1009203-24 = "Got nothing else to do today, or what?"
1009203-28 = "...Oh, you don't?"
1009203-29 = "Hang on. Why'd you answer so quickly?"
1009203-33 = "Well, anyway, it's not that important."
1009203-34 = "This design thing is hard. And there's only so much I can do by myself."
1009203-35 = "So then I thought, \"Hey, maybe Sensei can help.\" You don't mind, do you?"
1009203-39 = "[ns1] \"I don't know much about designing icon thingies, but...\"\n[ns2] \"Are you drawing the band's mark?\""
1009203-40 = "Huh?"
1009203-41 = "\"Icon thingies\"?"
1009203-42 = "...Mark?"
1009203-43 = "...What mark?"
1009203-44 = "Hm?"
1009203-45 = "I didn't say I was working on the LOGO, did I?"
1009203-46 = "I didn't tell you I was going to do that later?"
1009203-50 = "[ns3] \"So that's not the band's icon thingy?\"\n[ns4] \"Then what are you working on?\""
1009203-55 = "Uh..."
1009203-56 = "Well, you see, this is..."
1009203-61 = "[ns] \"...\""
1009203-65 = "Hm?"
1009203-66 = "[ns5] \"Something to do with design?\"\n[ns6] \"You're working on your autograph?\""
1009203-69 = "Huh? What's with that face? Is there a problem?"
1009203-70 = "...What?"
1009203-71 = "You're seriously asking me WHY I'm practicing my autograph?"
1009203-72 = "I mean, it should be obvious. I'm not wrong about that, am I?"
1009203-76 = "Listen, Sensei. We're starting a band, of course, right?"
1009203-77 = "We're going to open for a celebration concert, right? So lots of people will be watching, right?"
1009203-78 = "If the concert goes well, we're going to be famous, right?"
1009203-79 = "And it's really going to suck if I can't write autographs, don't you think? Am I wrong here?"
1009203-83 = "I'm... I'm not actually wrong, am I?"
1009203-84 = "...Am I...?"
1009203-85 = "[s7] \"I mean, big dreams are always good, but...\"\n[s8] \"Let's not get ahead of ourselves.\""
1009203-88 = "U-Um...? You really...?"
1009203-92 = "Wait, hold on. Ah..."
1009203-93 = "U-Um... My face is getting really hot all of a sudden..."
1009203-94 = "...Oh, I'm blushing. Just what...?"
1009203-98 = "...Hold on, Sensei."
1009203-99 = "Don't say anything. Just shut up. Do not. Do not open your mouth."
1009203-100 = "[s9] \"Haha. Is this the moment?\"\n[s10] \"Do the others know you're like this?\""
1009203-103 = "I said don't open your mouth!! Shut up!!"
1009203-104 = "Grr, seriously!!"
1009203-108 = "Hold on, um... *sigh*..."
1009203-113 = "[ns] Laugh."
1009203-118 = "Stop laughing!! I said be quiet!! Shut it!!"
1009203-121 = "Um... Mmm..."
1009203-122 = "[s11] \"You don't have to hide it. It was cute.\"\n[s12] \"It was a joke. Maybe you will get famous overnight.\""
1009203-125 = "Bah, I'm SURE you mean that! Pfft!"
1009203-126 = "I've always been an overthinker, my whole life. Yeah."
1009203-127 = "You ought to know that! You see it every day! My life's a delusion! I can't get outside of my head–"
1009203-131 = "Huh? What'd you say?"
1009203-132 = "You want an..."
1009203-133 = "...autograph?"
1009203-134 = "...Huh? Are you trying to pick a fight?"
1009203-135 = "[s13] \"I'm seizing the moment.\"\n[s14] \"Your autograph might be hard to come by in the future.\""
1009203-138 = "B-Bah, you're at it again..."
1009203-139 = "Quit teasing me..."
1009203-140 = "Although you really do have a way with words. Did you think that was going to make me feel better?"
1009203-144 = "...Because it kind of did."
1009203-148 = "Ughhh!! That's so annoying!!"
1009203-149 = "Why do I feel better?! What's wrong with me?!"
1009203-150 = "*sigh*. Whatever. I know I don't stand a chance against you. Nothing new there."
1009203-154 = "Okay then. Let me just find whichever autograph looks okay, and..."
1009203-159 = "Pardon me, miss. Here's the receipt for your orders."
1009203-160 = "Could you sign right here, if you don't mind?"
1009203-164 = "Ah. Yes. One moment."
1009203-168 = "Signature, a signature..."
1009203-173 = "Hm?"
1009203-179 = "...Wow, look what I did."
1009203-180 = "What?"
1009203-184 = "[ns15] \"I kind of saw that coming.\"\n[ns16] \"Heck of a signature for a receipt!\""
1009203-188 = "[ns] \"Wow, your signature is really cool!\""
1009203-192 = "No, no, wait! This is...!"
1009203-193 = "Hold on! No!!"
1009203-194 = "Don't do it, don't do it. For real, if I say don't do it, then don't do it."
1009203-195 = "I'm serious. You will die. You'll pay for it! I'm serious!!"
1009203-197 = "[ns17] \"Well done, future celebrity!\"\n[ns18] \"This receipt will be a collector's item!!\""
1009203-200 = "Aaaahhh!!"
1009203-214 = "The clerk admonished us not to cause a commotion."

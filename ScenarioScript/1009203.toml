[translation]
1009203-1 = "設計的建議？"
1009203-4 = "（接到喜美的聯絡後，前往了他所在的咖啡廳）"
1009203-9 = "啊，老師，我在這邊，這邊！"
1009203-15 = "（在咖啡廳的一隅，發現了被甜點和練習本埋沒的喜美）"
1009203-23 = "居然真的馬上就來了？"
1009203-24 = "看來你今天應該也很閒囉？"
1009203-28 = "……你說對？"
1009203-29 = "等一下，你說得這麼理直氣壯，會讓我有點尷尬耶……"
1009203-33 = "算，算了！現在那不是重點！"
1009203-34 = "設計果然很不容易啊。#n我一個人的能力實在有限。"
1009203-35 = "所以才會想找老師來幫忙，你應該不會拒絕吧？"
1009203-39 = "[ns1]「但是我對設計沒什麼概念……」\n[ns2]「你是在畫樂團的標誌嗎？」"
1009203-40 = "……嗯？"
1009203-41 = "怎麼突然提到標誌？"
1009203-42 = "……標誌？"
1009203-43 = "……什麼標誌？"
1009203-44 = "……？"
1009203-45 = "不是為了樂團標誌才找你來的？"
1009203-46 = "……對啊？#n那個我打算之後再處理。"
1009203-50 = "[ns3]「……所以你不是在設計樂團的標誌？」\n[ns4]「那你在設計的是什麼？」"
1009203-55 = "哦……"
1009203-56 = "就是這個……"
1009203-61 = "[ns] 「……」"
1009203-65 = "…………？"
1009203-66 = "[ns5]「所以你正在『設計』的……」\n[ns6]「是你本人的簽名……？」"
1009203-69 = "嗯？為什麼反應這麼奇怪？有什麼問題嗎？"
1009203-70 = "……咦？"
1009203-71 = "為什麼突然做這種事？#n你是真的不知道才問的嗎？"
1009203-72 = "沒什麼好奇怪的吧……#n咦？難道是我有問題？"
1009203-76 = "你聽我說，老師。我們現在不是在玩樂團嗎？"
1009203-77 = "而且還即將要在開幕活動上表演，對吧？#n這樣是不是會被很多人看見？"
1009203-78 = "如果我們表演得好，是不是就會變成知名的樂團？"
1009203-79 = "到時候如果沒有簽名，一定會很不方便……我這樣說有錯嗎？"
1009203-83 = "有錯……嗎？#n應，應該沒錯吧？"
1009203-84 = "非常……合理吧……？"
1009203-85 = "[s7]「這個嘛，雖然擁有遠大的夢想是件好事……」\n[s8]「但你好像稍～微有點想得太遠了。」"
1009203-88 = "唔，唔嗯……？是……嗎……？"
1009203-92 = "等，等一下……"
1009203-93 = "那，那個……我的臉好像突然開始燙了起來……"
1009203-94 = "……好丟臉。#n什麼跟什麼嘛……"
1009203-98 = "……等等，老師。"
1009203-99 = "一句話也別說，乖乖把嘴巴閉上。#n千萬，千～萬別把嘴巴張開。"
1009203-100 = "[s9]「咳哼。這是……你自己想的嗎？」\n[s10]「這件事其他人知道嗎？」"
1009203-103 = "不是叫你別說話了嗎！！！！！安靜一點啦！！！！"
1009203-104 = "啊，真是的！！！"
1009203-108 = "那個……唉……"
1009203-113 = "[ns] 嘴角上揚"
1009203-118 = "不准笑！！！！什麼都別做！！！什麼都不准做！！！"
1009203-121 = "嗯……唔嗯……"
1009203-122 = "[s11]「居然還藏起來，真可愛。」\n[s12]「我剛才是開玩笑的啦，說不定你們真的會暴紅哦。」"
1009203-125 = "算了啦！！那種客套話我才不稀罕咧！！"
1009203-126 = "反正我就是喜歡自作多情，從以前到現在都一樣！"
1009203-127 = "老師都認識我這麼久，應該也很清楚了吧！！#n我就是愛慕虛榮啦！！"
1009203-131 = "……嗯？你說什麼？"
1009203-132 = "叫我給你一張……？一張什麼……"
1009203-133 = "……簽名？"
1009203-134 = "……這是什麼意思？又在捉弄我嗎？"
1009203-135 = "[s13]「沒有人知道未來會怎麼發展嘛～」\n[s14]「現在不跟你要的話，說不定以後就拿不到了呀～」"
1009203-138 = "咳，咳咳……又開始了……"
1009203-139 = "又說這種明明虛偽卻很動聽的話……"
1009203-140 = "老師還真會花言巧語。#n你是不是以為你這樣說，我就不會再生氣了？"
1009203-144 = "……雖然心情好像真的有好一點就是了。"
1009203-148 = "啊～～～～！！煩死了！！"
1009203-149 = "為什麼又被老師哄了啦！！"
1009203-150 = "……真是的。#n算了，反正我贏不過老師也不是一兩天的事，根本沒什麼好大驚小怪的。"
1009203-154 = "那我就找一張簽得比較好的……"
1009203-159 = "不好意思打擾了。#n客人，這邊是您的餐點收據。"
1009203-160 = "如果方便的話，可以請您在這裡幫我簽個名嗎？"
1009203-164 = "啊，好，稍等我一下。"
1009203-168 = "簽名，簽名……"
1009203-173 = "……？"
1009203-179 = "……啊，我簽錯了。"
1009203-180 = "…………？"
1009203-184 = "[ns15]「我剛才就覺得可能會這樣！！」\n[ns16]「居然在收據上簽那種簽名……！」"
1009203-188 = "[ns]「哇，您的簽名真的很酷呢！」"
1009203-192 = "不對不對，等一下！這個是……！！"
1009203-193 = "等等！不行！！！"
1009203-194 = "不行不行，真的不行，我說不行就是不行。"
1009203-195 = "你是不是想死，我認真的。#n真的不會放過你哦！！我是說認真的！！！"
1009203-197 = "[ns17]「真不愧是未來的名人！！」\n[ns18]「這張收據肯定會增值！！」"
1009203-200 = "啊啊啊啊啊啊啊啊啊啊！！"
1009203-214 = "（……結果因為太過吵鬧，被店員罵了一頓）"

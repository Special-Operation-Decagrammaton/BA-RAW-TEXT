[translation]
2002305-1 = "獨自，稍作休息"
2002305-2 = "D.U.鐘崎港"
2002305-3 = "（因為公安局主導的走私販追蹤任務來到了港口）"
2002305-7 = "……這樣啊。辛苦了。"
2002305-8 = "搭乘小船逃跑的走私犯已經被在碼頭待機的警備局學生逮捕了。"
2002305-9 = "大家，做的很好。#n作戰到此結束。"
2002305-10 = "您辛苦了！"
2002305-11 = "[s]「辛苦了，環奈。」"
2002305-12 = "沒什麼，並不是困難的作戰。"
2002305-13 = "多虧老師協助統整學生們的目擊情報，才得以迅速掌握犯人的行蹤。"
2002305-14 = "我代表公安局向您致上謝意。"
2002305-15 = "[s]「你這麼鄭重會讓我有點害羞的……」"
2002305-22 = "環奈局長！任務比預期中還早結束，要不要去吃個飯啊？"
2002305-24 = "和我……？"
2002305-25 = "一起去那間家庭餐廳帕利亞吧！"
2002305-26 = "聽說前陣子那裡的飲料吧多了甜菜根啤酒……"
2002305-27 = "而且現在社群網站上很流行在上面加上一球冰淇淋哦！"
2002305-28 = "慶祝作戰成功，大家一起來辦個慶功宴吧！"
2002305-29 = "……抱歉，我今天下午還有工作要處理。"
2002305-30 = "你們自己去吧。#n況且難得的慶功宴，身為局長的我在場也只會破壞氣氛而已。"
2002305-31 = "但是……上次您也是說有急事要處理就先回去了對吧？"
2002305-32 = "大家都有話想跟局長說的唷。"
2002305-33 = "如果上司在場，想說的話就不能說了吧。"
2002305-34 = "想閒聊還是找其他學生吧。#n我很忙的。"
2002305-35 = "[s1]「我覺得一起去會很開心的唷。」\n[s2]「我可以幫你完成報告書的唷？」"
2002305-38 = "感謝您的好意，不過下班後我也有計畫了。"
2002305-39 = "和隊員們吃飯的機會……之後我會考慮的。"
2002305-40 = "那麼我就先告辭了。"
2002305-42 = "（當天晚上，完成其他工作返回夏萊的途中……）"
2002305-47 = "[ns3]「來吃晚餐吧。」\n[ns4]「附近的店家……」"
2002305-52 = "麵屋鈴醬營業中～"
2002305-53 = "要不要來碗拉麵～#n烤雞肉串跟關東煮也有哦～"
2002305-58 = "[ns] 去路邊攤吃拉麵"
2002305-61 = "歡迎光臨！"
2002305-62 = "請問想吃什麼呢～？"
2002305-63 = "[s]「請給我一碗鈴醬拉麵。」"
2002305-64 = "好的，一碗拉麵對吧。有空的位置都可以坐哦～"
2002305-69 = "呼……工作結束後吃的雞肉串就是不一樣。"
2002305-70 = "這裡的雞肉串跟其他地方的可不能相提並論。"
2002305-71 = "搭配烏龍茶一起享用，彷彿能將口中的油脂與整天的疲勞一同帶走……"
2002305-72 = "[s]「……環奈？」"
2002305-76 = "……嗯？"
2002305-77 = "老，老，老，老師！？您怎麼會在這裡？"
2002305-80 = "― 沒想到老師會來這種路邊攤……[wa:2960] "
2002305-82 = "― 真是出乎我的意料……[wa:360] "
2002305-85 = "[ns]「我也是。沒想到會在這裡遇見環奈。」"
2002305-86 = "― 是嗎？[wa:1120] "
2002305-88 = "― 我在這裡最能放鬆。[wa:3320] "
2002305-91 = "― 就算是大家害怕的不眠不休的公安局的局長……[wa:3620] "
2002305-93 = "― ……也是需要，能夠卸下鎧甲的地方。[wa:2920] "
2002305-96 = "― 所以今天，[wa:2620] "
2002305-98 = "― 如果您能當作沒看見的話，我會很感激的。[wa:3780] "
2002305-106 = "[ns5]「如果想轉換心情……」\n[ns6]「跟大家一起參加慶功宴不好嗎？」"
2002305-109 = "……既然被您看見了，我也不好意思再找藉口。"
2002305-110 = "雖然您應該也已經知道了，我和其他學生一樣，#n並不討厭開心地一起吃吃喝喝。"
2002305-111 = "但既然背負著「公安局的狂犬」之名，#n就不能輕易在他人面前卸下鎧甲。"
2002305-112 = "大家害怕的無情公安局狂犬，其實只是個會因為眼前的事情而感到喜怒哀樂的普通人，如果這件事傳出去的話……"
2002305-113 = "……那些得意忘形的犯罪者，可能會讓奇普托斯的治安更加惡化。"
2002305-114 = "因此，我才會在大家面前隱藏自己真實的一面……"
2002305-115 = "──不過卻被老師發現了呢。"
2002305-116 = "今天的事，還請務必對大家保密。"
2002305-117 = "[s]「環奈有什麼推薦的料理嗎？」"
2002305-118 = "咦？#n這麼突然……？"
2002305-119 = "[s7]「就當作是封口費吧。」\n[s8]「想知道環奈會推薦什麼料理。」"
2002305-122 = "……呵呵。#n我知道了。這種小事當然沒問題。"
2002305-123 = "我剛才吃的綜合烤雞肉串雖然不差，#n但今天這種寒冷的天氣，吃個熱呼呼的關東煮應該也很不錯。"
2002305-124 = "特別是關東煮裡的牛筋，花費許多時間煮得又軟又入味，非常好吃唷。"
2002305-125 = "[s]「那就來加點吧。」"
2002305-126 = "老闆，我們要加點2人份的關東煮。"
2002305-127 = "還有一杯特製烏龍茶。"
2002305-128 = "好的，請稍等～"
2002305-131 = "（之後便和環奈一起吃著關東煮，度過了快樂的時光）"

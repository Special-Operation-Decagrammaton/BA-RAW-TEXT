[translation]
2002305-1 = "เวลาพักผ่อนของหัวหน้า"
2002305-2 = "ท่าเรือคาเนะซากิ D.U."
2002305-3 = "(คุณครูกับคันนะกำลังออกไปที่ท่าเรือเพื่อช่วยในภารกิจไล่ล่าผู้ลักลอบขนของเถื่อน......)"
2002305-7 = "...งั้นเหรอ ดีมาก"
2002305-8 = "นักเรียนสำนักความมั่นคงที่ไปรออยู่ในท่าเทียบเรือที่ 3 จับกุมผู้ลักลอบขนของเถื่อนบนเรือได้แล้ว"
2002305-9 = "ทุกคนทำได้ดีมาก ขอจบภารกิจเพียงเท่านี้"
2002305-10 = "ขอบคุณมากเลยค่ะ!"
2002305-11 = "[s] \"เยี่ยมเลยนะ คันนะ\""
2002305-12 = "ไม่หรอกค่ะ นี่ไม่ใช่ปฏิบัติการที่ยากเลยค่ะ"
2002305-13 = "ถ้าชาเล่ต์ไม่ช่วยรวบรวมพยานหลักฐานจากนักเรียนที่อยู่ใกล้เคียง ฉันคงต้องใช้เวลามากกว่านี้ในการ#nสืบหาตัวคนร้ายค่ะ"
2002305-14 = "ในนามของกรมความมั่นคงสาธารณะ ฉันต้องขอขอบคุณคุณครูด้วยนะคะ"
2002305-15 = "[s] \"ชมกันแบบนี้ครูเขินนะ......\""
2002305-22 = "หัวหน้ากรมฯ คันนะ! ภารกิจก็เสร็จแล้ว เราไปหาอะไรดื่มเบาๆ กันมั้ยคะ?"
2002305-24 = "ดื่ม......? ที่ไหนเหรอ......?"
2002305-25 = "ก็ที่...ร้านอาหารสำหรับครอบครัวไบเซริย่าไงคะ!"
2002305-26 = "ได้ยินว่าครั้งนี้มีรูทเบียร์ใหม่เข้ามาในบาร์เครื่องดื่มด้วย......"
2002305-27 = "ไอศกรีมที่บาร์ของหวานก็ดูเป็นที่นิยมในโซเชียลมีเดียด้วยนะคะ"
2002305-28 = "มาดื่มฉลองความสำเร็จของปฏิบัติการในวันนี้กันเถอะค่ะ!"
2002305-29 = "...ขอโทษนะ แต่บ่ายวันนี้ฉันมีงานค้างอยู่ คงไปดื่มฉลองด้วยไม่ได้น่ะ"
2002305-30 = "พวกเธอไปสนุกกันเถอะ ถ้าหัวหน้ากรมฯ ไปกินด้วย บรรยากาศคงกร่อยกันพอดี"
2002305-31 = "ว่าแต่... ก่อนหน้านี้หัวหน้ากรมฯ ก็เคยบอกว่างานยุ่งจนไม่ได้เข้าร่วมงานเลี้ยงฉลองไปแล้วนี่คะ?"
2002305-32 = "ฉันอยากนั่งดื่มที่บาร์แล้วพูดคุยกับหัวหน้ากรมฯ นะคะ......"
2002305-33 = "การนั่งคุยกับเจ้านายมันจะไปสนุกอะไร"
2002305-34 = "ถ้าอยากหาเรื่องสนุกๆ คุยละก็ ไปหานักเรียนคนอื่นเถอะ ฉันงานรัดตัวมากเลยน่ะ"
2002305-35 = "[s1] \"ไม่ได้ไปนานแล้วนี่ ไปเถอะ\"\n[s2] \"ถ้างานยุ่ง เดี๋ยวครูไปช่วยเอง\""
2002305-38 = "ขอบคุณสำหรับน้ำใจนะคะ แต่หลังจากนี้ฉันก็มีนัดอื่นแล้วด้วยค่ะ"
2002305-39 = "ถ้าจะไปทานข้าวหรือดื่มฉลองกับสมาชิก... ฉันว่าคงต้องเป็นโอกาสหน้าแล้วค่ะ"
2002305-40 = "ถ้างั้นฉันขอตัวก่อนนะคะ"
2002305-42 = "(เย็นวันนั้น ระหว่างที่คุณครูเคลียร์งานแล้วกลับไปยังชาเล่ต์......)"
2002305-47 = "[ns3] \"ทำงานจนลืมกินข้าวเย็นอีกแล้วสินะ...\"\n[ns4] \"มีร้านอาหารแถวนี้เปิดมั้ยนะ...\""
2002305-52 = "ร้านเมนยะ สึซึจังค่า~"
2002305-53 = "เรามีทั้งราเม็งร้อนๆ~ ยากิโทริ~ แล้วก็โอเด้งด้วยค่ะ~"
2002305-58 = "[ns] เดินไปที่ร้านราเม็ง"
2002305-61 = "เชิญค่ะ! เมนยะ สึซึจัง ยินดีต้อนรับค่ะ!"
2002305-62 = "รับอะไรดีคะ?"
2002305-63 = "[s] \"ขอราเม็งชามหนึ่ง\""
2002305-64 = "ได้ค่ะ เดี๋ยวขอเตรียมอาหารให้คุณลูกค้าคนก่อนหน้าก่อนนะคะ ช่วยรอสักครู่นะคะ"
2002305-69 = "งื้อ... ยากิโทริที่กินหลังเลิกงานนี่วิเศษสุดๆ ไปเลย"
2002305-70 = "ถึงจะเป็นอาหารเดียวกัน แต่ถ้าไปกินที่อื่นก็คงไม่ได้รสชาติแบบนี้หรอก"
2002305-71 = "รสชาติสดชื่นของชาอู่หลงที่เสิร์ฟพร้อมกับยากิโทริ กับรสชาติที่มีน้ำมันเหลืออยู่ในลิ้นเหมือนจะ#nล้างความเหนื่อยล้าของทั้งวันได้เลย..."
2002305-72 = "[s] \"...คันนะ?\""
2002305-76 = "...หืม?"
2002305-77 = "คะ... คะ... คะ... คุณครู?! ทำไมถึงมาอยู่ที่นี่ได้คะ?"
2002305-80 = "― ฉันคิดไม่ถึงเลย ว่าคุณครูจะมาร้านแผงลอยแบบนี้......[wa:1480] "
2002305-82 = "― คิดไม่ถึงเลยจริงๆ[wa:80] "
2002305-85 = "[ns] \"ครูก็ไม่คิดเหมือนกันว่าจะมาเจอคันนะที่นี่\""
2002305-86 = "― อย่างนั้นเหรอคะ?[wa:600] "
2002305-88 = "― ฉันรู้สึกว่าที่นี่สบายที่สุดเลยค่ะ[wa:2320] "
2002305-91 = "― ถึงจะเป็นหัวหน้าของกรมความมั่นคงสาธารณะที่บ้างานและเป็นที่เกรงกลัวของทุกคน...[wa:1380] "
2002305-93 = "― ...แต่ยังไงก็ต้องมีสถานที่ที่จะถอดชุดเกราะออกได้เหมือนกันนะคะ[wa:1160] "
2002305-96 = "― เพราะงั้นวันนี้...[wa:2100] "
2002305-98 = "― ถ้าวันนี้คุณครูทำเป็นไม่เห็นก็จะขอบคุณมากเลยค่ะ[wa:2660] "
2002305-106 = "[ns5] \"ถ้าอยากเปลี่ยนบรรยากาศบ้าง......\"\n[ns6] \"เมื่อกี้ทำไมไม่ไปกับทุกคนล่ะ?\""
2002305-109 = "...ในเมื่อโดนจับได้แล้ว ฉันคงแก้ตัวอีกไม่ได้สินะคะ"
2002305-110 = "คุณครูเห็นฉันแล้วก็คงเดาได้ว่าฉันไม่ใช่คนที่ชอบกินแล้วก็พูดคุยเหมือนนักเรียนคนอื่นๆ ในสถาบันฝึก#nตำรวจ"
2002305-111 = "แต่ตราบใดที่ฉันแบกชื่อหมาบ้าของกรมความมั่นคงสาธารณะไว้ ฉันก็ถอดชุดเกราะต่อหน้าคนอื่นโดย#nพลการไม่ได้หรอกค่ะ"
2002305-112 = "เพราะถ้าพวกอาชญากรรู้ว่าหมาบ้าแห่งกรมความมั่นคงสาธารณะที่ไม่รู้จักการประนีประนอม ที่จริงแล้ว#nเป็นคนที่มีอารมณ์ดีใจ โกรธ เศร้า สุขเหมือนคนอื่น และชอบหาความสุขในการกินอาหารละก็..."
2002305-113 = "ความสงบเรียบร้อยในคิโวทอสก็น่าจะน้อยกว่านี้น่ะค่ะ..."
2002305-114 = "เพราะแบบนั้นฉันเลยพยายามจะไม่แสดงมุมของการเป็นมนุษย์ต่อหน้านักเรียนและประชาชนน่ะ"
2002305-115 = "แต่กับคุณครูแล้ว ฉันคงเก็บเป็นความลับไม่ได้น่ะค่ะ"
2002305-116 = "และนั่นแปลว่าต้องเก็บเรื่องนี้เป็นความลับกับนักเรียนคนอื่นนะคะ"
2002305-117 = "[s] \"ร้านนี้อะไรอร่อยเหรอคันนะ?\""
2002305-118 = "คะ? ทำไมอยู่ๆ ก็......?"
2002305-119 = "[s7] \"รับค่าปิดปากดีมั้ยนะ?\"\n[s8] \"แนะนำอาหารที่นี่ให้หน่อยสิ\""
2002305-122 = "...ฮุฮุ ถ้าเป็นเรื่องนั้น ฉันแนะนำให้ได้อยู่แล้วค่ะ"
2002305-123 = "ไก่เสียบไม้ย่างที่ฉันกินเมื่อกี้ก็ไม่เลว แต่ในอากาศแบบวันนี้ ฉันว่าโอเด้งร้อนๆ ก็น่าจะดีเหมือนกันค่ะ"
2002305-124 = "โดยเฉพาะอย่างยิ่งโอเด้งของร้านนี้ที่ต้มน้ำซุปตั้งแต่เปิดร้าน เส้นเอ็นวัวก็เลยอ่อนนุ่มเป็นพิเศษเลยค่ะ"
2002305-125 = "[s] \"งั้นสั่งเพิ่มดีมั้ยนะ...\""
2002305-126 = "มาสเตอร์ ขอเพิ่มโอเด้ง 2 ที่"
2002305-127 = "แล้วก็ขอชาอู่หลงพิเศษอีกแก้วด้วย"
2002305-128 = "รับออเดอร์ค่ะ!"
2002305-131 = "(จากนั้นคุณครูก็แบ่งโอเด้งกินกับคันนะ และได้ใช้เวลาด้วยกันอย่างสนุกสนาน)"

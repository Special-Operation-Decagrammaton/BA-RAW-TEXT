2002305-5 = "#clearST"
2002305-6 = "3;칸나;05\n#3;a\n#wait;1000"
2002305-7 = "3;칸나;02;……그런가. 수고 많았다."
2002305-8 = "3;칸나;99;보트를 타고 도주하던 밀수범은 제3 부두에서 대기하던 경비국 학생들에 의해 체포되었다고 하는군."
2002305-9 = "3;칸나;01;모두 수고가 많았다. 현 시간부로 상황을 종료한다."
2002305-10 = "#na;공안국 학생;수고 많으셨습니다!"
2002305-11 = "[s] \"수고했어, 칸나.\""
2002305-12 = "3;칸나;04;아닙니다. 어려운 작전도 아니었는걸요.\n#3;stiff"
2002305-13 = "3;칸나;02;게다가 샬레에서 근처 학생들의 목격 진술을 취합해 주시지 않았더라면 범인을 색적하는 데 시간이 더 걸렸을 겁니다."
2002305-14 = "3;칸나;99;공안국을 대표하여 감사의 인사를 드립니다.\n#3;greeting"
2002305-15 = "[s] \"그렇게 칭찬을 받으니 쑥스러운걸……\""

2002305-22 = "3;공안국 학생 A;02;칸나 국장님! 임무도 일찍 끝났는데 가볍게 한잔하러 가지 않으시겠습니까?\n#3;em;[반응]"
2002305-23 = "#all;hide"
2002305-24 = "5;칸나;02;한 잔……? 어디서……?\n#5;al\n#3;m1"
2002305-25 = "3;공안국 학생 A;01;그야 바로…… 이 앞에 있는 패밀리 레스토랑, 바이제리야에서 말이죠!\n#3;em;[음표]"
2002305-26 = "1;공안국 학생 B;02;이번에 바이제의 드링크 바에 신상 루트비어가 들어왔다고 하는데……\n#1;ar\n#3;m2"
2002305-27 = "1;공안국 학생 B;01;거기에 디저트 바의 아이스크림을 담아 먹는 게 요새 SNS에서 핫한 모양이에요."
2002305-28 = "3;공안국 학생 A;03;작전의 무사 완료를 자축할 겸 다 같이 축배를 들자고요!\n#3;jump"
2002305-29 = "5;칸나;04;……미안하지만 오늘은 오후에 업무가 밀려 있어 참가하기 어려울 것 같군."
2002305-30 = "5;칸나;99;귀관들끼리 오붓하게 다녀오도록. 나 같은 국장이 뒷풀이에 참가해봤자 분위기만 해칠 테니까."
2002305-31 = "3;공안국 학생 A;04;하지만…… 전에도 업무가 급하다며 뒤풀이에 참가하지 않고 먼저 돌아가셨잖아요?\n#3;em;[땀]\n#3;stiff"
2002305-32 = "1;공안국 학생 B;06;국장님과 함께 드링크 바에서 음료수를 마시며 수다를 떨고 싶었는데……\n#1;stiff"
2002305-33 = "5;칸나;03;상사와 나누는 대화가 뭐가 재미있다고.\n#5;m3\n#1;dl\n#3;dl"
2002305-34 = "5;칸나;02;허튼 농담이 하고 싶은 거라면 다른 학생을 알아봐. 나는 바쁘니까.\n#5;em;[반응]"
2002305-35 = "[s1] \"모처럼인데 같이 다녀오지 그래?\"\n[s2] \"일이 바쁘면 내가 대신 처리해 줄게.\""

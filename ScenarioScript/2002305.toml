2002305-1 = "#title;그 국장의 휴식"
2002305-2 = "#place;D.U. 카네사키 항구"
2002305-3 = "#na;(밀수범을 추적하던 공안국의 임무를 돕기 위해 칸나와 함께 항구에 나와 있던 중……)"

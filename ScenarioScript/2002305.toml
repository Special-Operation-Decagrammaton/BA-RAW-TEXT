2002305-110 = "3;칸나;02;방금 일로 짐작하셨겠지만, 저 또한 경찰학교의 다른 학생들처럼 즐겁게 먹고 떠드는 것을 꺼리는 사람은 아닙니다."
2002305-111 = "3;칸나;01;하지만 공안국의 미친개라는 이름을 짊어지고 있는 이상, 함부로 남들 앞에서 갑옷을 벗어둘 수는 없으니까요."
2002305-112 = "3;칸나;99;타협을 모르는 공안국의 미친개가, 사실은 평범하게 희로애락을 내비치며 식도락을 즐기는 사람이었다는 사실을 범죄자들이 알게 된다면……\n#3;em;[한숨]"
2002305-113 = "3;칸나;05;……키보토스의 치안이 조금 더 느슨해질 수도 있으니까요."
2002305-114 = "3;칸나;04;그래서 저는 언제나 학생들 앞에서는, 시민들 앞에서는 인간적인 모습을 내비치지 않으려 했습니다만."
2002305-115 = "3;칸나;03;선생님께 비밀로 할 수는 없겠군요."
2002305-116 = "3;칸나;02;아까도 말씀드렸지만, 다른 학생들에게 비밀입니다?\n#3;em;[반응]"
2002305-117 = "[s] \"이 가게에서 칸나가 추천하는 요리는 뭐야?\""

[translation]
2002102-1 = "Naughty or Nice?"
2002102-2 = "Sensei, it's me!"
2002102-3 = "[s] \"Hi, Hanae! Is that a new outfit?\""
2002102-4 = "Yes! Now, I'm Santa!"
2002102-5 = "And since I've put it on..."
2002102-6 = "I must fulfill my duties as Santa!"
2002102-7 = "[s1] \"Oh yeah...? Is that how it works?\"\n[s2] \"I don't know about that, but if you say so...\""
2002102-8 = "So, about my problem..."
2002102-9 = "So, about my problem..."
2002102-10 = "It's actually about my outfit."
2002102-11 = "[s3] \"Tell me about it.\"\n[s4] \"That makes me even more curious.\""
2002102-12 = "If you say so... Just, prepare yourself, okay? Take a deep breath. *inhale* *exhale*"
2002102-13 = "If you say so... Just, prepare yourself, okay? Take a deep breath. *inhale* *exhale*"
2002102-14 = "I just don't think I have what it takes to become the real Santa!"
2002102-15 = "[s] \"The real Santa? What does that mean to you, Hanae?\""
2002102-16 = "So many things! First off, how can I tell who's naughty or nice?"
2002102-17 = "What if I give a gift to someone who doesn't deserve it?"
2002102-18 = "And I have to be able to carry really heavy stuff!"
2002102-19 = "How else am I going to get on top of the roof with my big sack of gifts?"
2002102-20 = "And, worst of all...!"
2002102-21 = "I need to be able to fly at the speed of Mach two...or faster!"
2002102-22 = "Otherwise, I'll never make it to all of Kivotos in just one night!"
2002102-24 = "I knew I should tell her that Santa wasn't real, and the story was just a fairy tale."
2002102-25 = "But seeing her eager, innocent face, I couldn't bring myself to tell her it was fake..."
2002102-27 = "What do you mean? I'm not the real Santa, but just cosplaying as one for today?"
2002102-28 = "So you think....I don't need to try so hard...?"
2002102-29 = "Sensei, you're wrong! Shame on you for even thinking that way!"
2002102-30 = "There's a responsibility that comes with putting on a Santa outfit! It is that serious!"
2002102-31 = "This suit is the symbol of the children's hopes and dreams. You have to fulfill that duty with all your effort!"
2002102-32 = "[s5] \"I guess... I see where you're coming from.\" \n[s6] \"Ugh, bringing up the hopes and dreams of children... That's cheating!\""
2002102-33 = "Now you get me!"
2002102-34 = "Now you get me!"
2002102-35 = "But we still haven't solved my problem. What should I do, Sensei?"
2002102-36 = "[s] \"What's the most important to you, Hanae?\""
2002102-37 = "Hm... I have to be able to fly at the speed of Mach two! Let's tackle that first!"
2002102-38 = "[s7] \"I mean, that's too much.\"\n[s8] \"That's probably not gonna happen.\""
2002102-39 = "Oh... I thought that was the most doable one... Where do you think I should start then?"
2002102-40 = "Oh... I thought that was the most doable one... Where do you think I should start then?"
2002102-41 = "Huh? It doesn't matter how long I take to pass out gifts?"
2002102-42 = "I guess it would be easier to figure out how to tell if a kid is naughty or nice..."
2002102-43 = "Okay, Sensei! Please teach me how!"
2002102-44 = "[s9] \"I'll tell you something, and you tell me if I'm telling the truth.\"\n[s10] \"Okay. Try to figure out if I'm lying or telling the truth.\""
2002102-45 = "Oh! Like a lie detector test!"
2002102-46 = "Oh! Like a lie detector test!"
2002102-47 = "You're so smart, Sensei! Kids can lie about lots of things, because they don't realize it's a bad thing. It's our job to find them out and teach them!"
2002102-48 = "Yay! This'll be lots of fun. What's your first move, Sensei?"
2002102-49 = "[s] \"Actually, around this time of year, I carry around a sack...\""
2002102-51 = "[ns] \"And fly at the speed of Mach two to distribute gifts.\""
2002102-52 = "Whoa! Sensei, you're...you're just like Santa!"
2002102-53 = "What do you mean that's not true? But Sensei can do anything!"
2002102-54 = "That's...not true either? That's not possible for a regular person?"
2002102-55 = "I think... I get it... But I'm a little disappointed you can't fly..."
2002102-56 = "[s] \"*cough* *cough* Argh, I can't stop coughing and my stomach hurts!\""
2002102-57 = "Oh, no! It's okay, Sensei. Please lie down and I can help you!"
2002102-58 = "I read about sudden illnesses like this in one of my textbooks! I need to burn the air and remove any bad energy first!"
2002102-59 = "The next step is... Oh, yeah! I have to draw lots of blood and then whip you to help you overcome your hardships!"
2002102-60 = "[s] \"None of that makes sense! I'm just going to die!\""
2002102-62 = "Hanae and I played the lie detector game for a while."
2002102-63 = "...It made me realize, once again, just how trusting and innocent Hanae is, through and through."

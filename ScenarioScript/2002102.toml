[translation]
2002102-1 = "乖小孩？壞小孩？"
2002102-2 = "老師，讓你久等了！"
2002102-3 = "[s]「歡迎妳來，花繪。真少見的打扮呢。」"
2002102-4 = "沒錯，這是聖誕老人的服裝！"
2002102-5 = "而且既然穿上這套衣服……"
2002102-6 = "我就必須盡到身為聖誕老人的義務才行！"
2002102-7 = "[s1]「是，是嗎……？」\n[s2]「花，花繪這麼說的話……」"
2002102-8 = "關於我在MomoTalk上提過的「煩惱」……"
2002102-9 = "關於我在MomoTalk上提過的「煩惱」……"
2002102-10 = "其實，和這套衣服有很密切的關係。"
2002102-11 = "[s3]「居然。」\n[s4]「我很好奇。」"
2002102-12 = "於是在發表之前，先做個深呼吸……"
2002102-13 = "於是在發表之前，先做個深呼吸……"
2002102-14 = "我……是不是還沒有能力成為「真正的聖誕老人」呢！？"
2002102-15 = "[s]「真正的，聖誕老人……？」"
2002102-16 = "要成為真正的聖誕老人，首先要能嚴格地區分出乖小孩跟壞小孩才行！"
2002102-17 = "這是關乎禮物的，很重要的事。"
2002102-18 = "而且，必須要能輕鬆地搬動比自己的體重還重的東西才行。"
2002102-19 = "畢竟聖誕老人得要帶著禮物的袋子爬到屋頂上。"
2002102-20 = "最重要的是……"
2002102-21 = "要能以2馬赫以上的速度飛行！"
2002102-22 = "這樣才能在整個奇普托斯發送禮物！"
2002102-24 = "（雖然想告訴她可能是有了什麼誤會）"
2002102-25 = "（但是在花繪天真爛漫的笑容面前，我不禁語塞）"
2002102-27 = "……？"
2002102-28 = "因為不是真正的聖誕老人，所以不做到那個程度也沒關係……？"
2002102-29 = "老師！那種思考方式是不行的！"
2002102-30 = "不管是不是真正的聖誕老人，#n既然穿上了這套服裝就要認真去做才行！"
2002102-31 = "為了守護孩子們的夢想，還有希望！"
2002102-32 = "[s5]「這，這樣啊……！」\n[s6]「也許妳說的對……！」"
2002102-33 = "老師也明白了嗎！"
2002102-34 = "老師也明白了嗎！"
2002102-35 = "所以，事情就是這樣……#n你覺得該怎麼做才好呢，老師？"
2002102-36 = "[s]「唔嗯……花繪想先做什麼呢？」"
2002102-37 = "我想先從以2馬赫──"
2002102-38 = "[s7]「那個有點……」\n[s8]「從別的開始吧！」"
2002102-39 = "是嗎？我本來想試試看的……"
2002102-40 = "是嗎？我本來想試試看的……"
2002102-41 = "那麼，暫時先慢慢發禮物也沒關係……"
2002102-42 = "先從能分辨乖小孩和壞小孩開始好像可以。"
2002102-43 = "老師覺得該怎麼做呢？"
2002102-44 = "[s9]「那，你先試著聽我說的話。」\n[s10]「判斷我說的是不是謊言怎麼樣？」"
2002102-45 = "原來如此，判斷有沒有說謊對吧！"
2002102-46 = "原來如此，判斷有沒有說謊對吧！"
2002102-47 = "我覺得很好。有些孩子偶爾會說些沒有惡意的謊話嘛！"
2002102-48 = "不禁興奮起來了……那麼，隨時都可以開始！"
2002102-49 = "[s]「其實我每年這個時候，都會帶著禮物袋……」"
2002102-51 = "[ns]「邊用2馬赫的速度飛行邊發送禮物。」"
2002102-52 = "真的嗎！？#n老師簡直像聖誕老人一樣呢！"
2002102-53 = "咦，是謊話嗎？#n可是老師是什麼都做得到的人……"
2002102-54 = "咦，不是這樣嗎？也有做不到的事？"
2002102-55 = "原，原來是這樣啊……"
2002102-56 = "[s]「呃啊，肚子跟頭突然好痛啊！」"
2002102-57 = "真糟糕，我馬上幫你處理！#n請趕快躺下！"
2002102-58 = "我想想，這種時候就要像之前在書裡看過的一樣……#n先燃燒空氣來驅除邪氣。"
2002102-59 = "接著用鞭子抽打，只要撐過就會痊癒了！"
2002102-60 = "[s]「真的假的啊！」"
2002102-62 = "（之後雖然說了各式各樣的謊）"
2002102-63 = "（卻只讓我再次了解到花繪是個很相信他人的、非常善良的好孩子……）"

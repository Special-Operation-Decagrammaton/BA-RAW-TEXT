[translation]
2002102-1 = "เป็นเด็กดีหรือเปล่า?"
2002102-2 = "คุณครู ฉันมาแล้วค่ะ!"
2002102-3 = "[s] \"เข้ามาสิฮานาเอะ ใส่ชุดใหม่มาด้วยเหรอ?\""
2002102-4 = "ใช่ค่ะ นี่คือชุดซานต้าค่ะ!"
2002102-5 = "และหากฉันอยู่ในชุดซานต้า..."
2002102-6 = "ฉันก็ต้องปฏิบัติหน้าที่ของซานต้าค่ะ!"
2002102-7 = "[s1] \"งะ... งั้นเหรอ? ก็ได้...\"\n[s2] \"เอาตามที่ฮานาเอะสะดวกเลย...\""
2002102-8 = "คุณครูคะ... เรื่องกลุ้มใจที่ฉันบอกไปน่ะค่ะ"
2002102-9 = "คุณครูคะ... เรื่องกลุ้มใจที่ฉันบอกไปน่ะค่ะ"
2002102-10 = "ที่จริงแล้วมันเกี่ยวกับชุดที่ฉันใส่อยู่ค่ะ..."
2002102-11 = "[s3] \"กลุ้มใจอะไรบอกครูมาได้เลย\"\n[s4] \"พูดอย่างนี้ครูยิ่งอยากรู้แล้วสิ?\""
2002102-12 = "ถ้างั้น... ฉันขอเตรียมใจ... และหายใจเข้าลึกๆ ก่อนค่ะ ฮู่วว... ฮู่วว..."
2002102-13 = "ถ้างั้น... ฉันขอเตรียมใจ... และหายใจเข้าลึกๆ ก่อนค่ะ ฮู่วว... ฮู่วว..."
2002102-14 = "ฉันว่าฉันยังบกพร่องเรื่องการเป็นซานต้าที่แท้จริงค่ะ!"
2002102-15 = "[s] \"ฮานาเอะคิดว่าซานต้าที่แท้จริงต้องเป็นแบบไหนล่ะ?\""
2002102-16 = "ก่อนอื่นต้องแยกแยะเด็กดีกับเด็กดื้อได้อย่างชัดเจนค่ะ!"
2002102-17 = "จะได้ตัดสินใจได้อย่างเด็ดขาดไงคะว่าจะให้หรือไม่ให้ของขวัญดีค่ะ"
2002102-18 = "แล้วก็ต้องขนของที่มีน้ำหนักมากกว่าตัวเองให้ได้ด้วยค่ะ!"
2002102-19 = "จะได้แบกห่อของขวัญแล้วปีนขึ้นหลังคาได้ยังไงล่ะคะ"
2002102-20 = "แล้วก็สุดท้าย..."
2002102-21 = "ต้องบินให้ได้ความเร็วอย่างน้อย 2 มัคค่ะ!"
2002102-22 = "จะได้ไปแจกของขวัญได้ทั่วทุกหนแห่งในคิโวทอสเลยไงคะ"
2002102-24 = "(คุณครูอยากจะบอกไปว่าทั้งหมดคือเรื่องที่แต่งขึ้น)"
2002102-25 = "(แต่เมื่อเห็นหน้าที่ไร้เดียงสาของฮานาเอะแล้วก็ไม่กล้าพูดออกมา...)"
2002102-27 = "คะ? ฉันไม่ใช่ซานต้าตัวจริง แต่เป็นชมรมอัศวินบรรเทาทุกข์ในชุดซานต้า"
2002102-28 = "เพราะงั้นก็ไม่ต้องมีพลังขนาดนั้นก็ได้เหรอคะ?"
2002102-29 = "ไม่ได้หรอกค่ะคุณครู! ห้ามคิดอย่างนั้นนะคะ!"
2002102-30 = "อย่างน้อยถ้าเราอยู่ในชุดนี้ ก็ต้องรับผิดชอบงานอย่างจริงจังค่ะ"
2002102-31 = "เพราะการปกป้องความฝันและความหวังของเด็กๆ เป็นงานที่สำคัญค่ะ!  "
2002102-32 = "[s5] \"ถ้าพูดแบบนั้นก็ช่วยไม่ได้นะ...\"\n[s6] \"เปิดการ์ดความฝันและความหวังของเด็กๆ สินะ!\""
2002102-33 = "ในที่สุดคุณครูก็เข้าใจสักทีนะคะ!"
2002102-34 = "ในที่สุดคุณครูก็เข้าใจสักทีนะคะ!"
2002102-35 = "แต่ว่า... ฉันยังกลุ้มใจอยู่เหมือนเดิมเลยค่ะ ทำยังไงดีคะ?"
2002102-36 = "[s] \"ฮานาเอะอยากทำอะไรเป็นอย่างแรกเหรอ?\""
2002102-37 = "ฉันเหรอคะ? ฉันอยากบินด้วยความเร็ว 2 มัคก่อนค่ะ..."
2002102-38 = "[s7] \"อันนั้นมันยากเกินไปหรือเปล่า\"\n[s8] \"ครูว่ามันยากเกินที่จะทำตอนนี้นะ\""
2002102-39 = "งั้นเหรอคะ? พอดีฉันคิดว่าควรจะลองบินดูน่ะค่ะ ถ้างั้น... เอายังไงดีคะ?"
2002102-40 = "งั้นเหรอคะ? พอดีฉันคิดว่าควรจะลองบินดูน่ะค่ะ ถ้างั้น... เอายังไงดีคะ?"
2002102-41 = "เราแบกห่อของขวัญแล้วค่อยๆ แจกก็ได้..."
2002102-42 = "งั้นควรเริ่มจากการฝึกแยกแยะเด็กดีกับเด็กดื้องั้นเหรอคะ?"
2002102-43 = "แบบนี้ก็ดีเหมือนนะคะ! ถ้างั้นต้องทำยังไงเหรอคะ?"
2002102-44 = "[s9] \"งั้นครูจะเล่าเรื่องให้ฟัง แล้วฮานาเอะก็ตัดสินนะ\"\n[s10] \"'ฟังเรื่องจากครูแล้วตัดสินนะว่าเป็นเรื่องจริงหรือโกหก\""
2002102-45 = "อ้อ! แบบทดสอบคำโกหกนี่เอง!"
2002102-46 = "อ้อ! แบบทดสอบคำโกหกนี่เอง!"
2002102-47 = "ดีเลยค่ะคุณครู! เพราะบางครั้งเด็กๆ ก็โกหกออกมาแบบไม่มีเจตนาร้ายค่ะ"
2002102-48 = "จะเริ่มจากอะไรเหรอคะ? ฉันพร้อมแล้วค่ะ ตื่นเต้นจัง!"
2002102-49 = "[s] \"ที่จริงในเวลานี้ของทุกปี ครูจะแบกห่อผ้า\""
2002102-51 = "[ns] \"แล้วบินด้วยความเร็ว 2 มัคไปแจกของขวัญ\""
2002102-52 = "จริงเหรอคะ?! ว้าว! คุณครูเหมือนซานต้าเลยค่ะ!"
2002102-53 = "คะ? ไม่ใช่หรอกเหรอคะ? แต่คุณครูสามารถทำได้ทุกอย่างไม่ใช่เหรอคะ...?"
2002102-54 = "นั่นก็ไม่ใช่เหรอคะ? ทำได้แต่สิ่งที่ทำได้งั้นเหรอคะ?"
2002102-55 = "ค่ะ... งั้นก็คงเป็นแบบนั้น ทำไมฉันรู้สึกเหมือน... จะผิดหวังหน่อยๆ เลย"
2002102-56 = "[s] \"แค่กๆ แค่ก! อยู่ๆ ก็ไอและเจ็บตรงลิ้นปี่ขึ้นมา!\""
2002102-57 = "คะ? แบบนี้เรื่องใหญ่นะคะ! ต้องรีบปฐมพยาบาล! คุณครูนอนลงตรงนี้ก่อนค่ะ!"
2002102-58 = "ต่อไปก็ต้องเผาอากาศเพื่อขับไล่พลังงานชั่วร้ายออกไป ตามที่อ่านเจอมาในหนังสือ"
2002102-59 = "จากนั้นก็ทำให้เสียเลือดเยอะๆ เพื่อให้ร่างกายสมดุล แล้วจึงเฆี่ยนด้วยแส้เพื่อฝึกความอดทนค่ะ!"
2002102-60 = "[s] \"แบบนั้นครูได้ตายจริงๆ แน่!\""
2002102-62 = "(หลังจากนั้นคุณครูก็ให้โจทย์ทดสอบคำโกหกกับฮานาเอะต่อ)"
2002102-63 = "(และคุณครูก็ได้รู้ว่าฮานาเอะคือเด็กใสซื่อที่เชื่อคำพูดของคนอื่นได้ง่ายมาก...)"

[translation]
2002102-1 = "#title;착한 아이? 나쁜 아이?"
2002102-2 = "3;하나에 산타ND;00;선생님, 저 왔어요!\n#3;a\n#3;hophop\n#3;em;[음표]"
2002102-3 = "[s] \"어서 와, 하나에. 새 옷이네?\""
2002102-4 = "3;하나에 산타ND;07;맞아요, 산타 복장이에요!\n#3;em;[재잘]\n#3;hophop"
2002102-5 = "3;하나에 산타ND;99;그리고 이 옷을 입은 이상……"
2002102-6 = "3;하나에 산타ND;03;저는 산타의 의무를 다할 필요가 있어요!\n#3;em;[!]"
2002102-7 = "[s1] \"그런…… 가?\"\n[s2] \"잘 모르겠지만, 하나에가 그렇다면야……\""
2002102-8 = "3;하나에 산타ND;01;그래서…… 말씀드린 고민 말인데요.\n#3;em;…"
2002102-9 = "3;하나에 산타ND;01;그래서…… 말씀드린 고민 말인데요.\n#3;em;…"
2002102-10 = "3;하나에 산타ND;00;사실 이 옷과 아주 밀접하게 연관이 있어요……"
2002102-11 = "[s3] \"뭐든지 들어 줄게.\"\n[s4] \"그렇게까지 말하니까 나도 호기심이 생기는데?\""
2002102-12 = "3;하나에 산타ND;09;그러면…… 마음을 다잡고. 심호흡을 하고. 후우, 후우.\n#3;greeting"
2002102-13 = "3;하나에 산타ND;09;그러면…… 마음을 다잡고. 심호흡을 하고. 후우, 후우.\n#3;greeting"
2002102-14 = "3;하나에 산타ND;05;진정한 산타로서 저는 너무 부족한 것 같아요!\n#fontsize;80\n#3;closeup\n#3;em;[!]"
2002102-15 = "[s] \"진정한 산타라니, 하나에는 그걸 어떻게 생각하는데?\""
2002102-16 = "3;하나에 산타ND;99;우선 착한 아이와 나쁜 아이를 엄격하게 걸러내야 해요!\n#3;em;[음표]"
2002102-17 = "3;하나에 산타ND;02;그래야 선물을 줄지, 주지 말아야 할지 확실하게 정할 수 있으니까요."
2002102-18 = "3;하나에 산타ND;07;그리고 자기 몸무게보다 더 무거운 물건을 들 줄 알아야 해요!\n#3;hophop"
2002102-19 = "3;하나에 산타ND;01;그래야 선물 보따리를 들고 지붕 위를 올라갈 수 있으니까요."
2002102-20 = "3;하나에 산타ND;09;마지막으로……"
2002102-21 = "3;하나에 산타ND;03;마하 2 이상의 속도로 비행을 할 수 있어야 해요!\n#3;closeup\n#3;em;[!]"
2002102-22 = "3;하나에 산타ND;03;그래야만 전 키보토스를 방방곡곡 누비며 선물을 줄 수 있으니까요.\n#3;closeup"
2002102-23 = "#all;hide"
2002102-24 = "#na;(그건 모두 꾸며낸 이야기라고 말하고 싶었지만,)"
2002102-25 = "#na;(하나에의 천진난만한 얼굴 앞에서 차마 그 말을 꺼낼 수가 없었다……)"
2002102-26 = "3;하나에 산타ND;04\n#3;a"
2002102-27 = "3;하나에 산타ND;04;네? 저는 진짜 산타가 아니라, 산타 복장을 한 구호기사단이니까,\n#3;em;…"
2002102-28 = "3;하나에 산타ND;08;거기까지 할 필요는 없는 것 아니냐고요?\n#3;stiff"
2002102-29 = "3;하나에 산타ND;05;안 돼요, 선생님! 그런 사고방식은 떽! 이에요!\n#3;em;[반응]\n#3;hophop"
2002102-30 = "3;하나에 산타ND;05;적어도 이 복장을 한 이상, 진지하게 임할 필요가 있다고요!"
2002102-31 = "3;하나에 산타ND;07;아이들의 꿈과 희망을 지켜 주는 건 중요한 일이니까요!\n#3;em;[반짝]"
2002102-32 = "[s5] \"그렇게까지 말한다면 어쩔 수 없겠네……\"\n[s6] \"큭, 아이들의 꿈과 희망이라는 치트키를 쓰다니!\""
2002102-33 = "3;하나에 산타ND;07;드디어 선생님도 알아주셨네요!\n#3;em;[음표]"
2002102-34 = "3;하나에 산타ND;07;드디어 선생님도 알아주셨네요!\n#3;em;[음표]"
2002102-35 = "3;하나에 산타ND;06;그렇지만…… 문제 상황은 변하지 않았어요. 어떻게 하면 될까요?\n#3;stiff"
2002102-36 = "[s] \"우선…… 하나에는 무엇부터 하고 싶어……?\""
2002102-37 = "3;하나에 산타ND;02;저요? 저는 우선 마하 2 이상으로 비행하는 것부터……\n#3;em;[반응]"
2002102-38 = "[s7] \"아니, 무리니까.\"\n[s8] \"그거 웬만하면 무리니까.\""
2002102-39 = "3;하나에 산타ND;06;그런가요? 저는 시도해 볼 만하다고 생각했는데요. 그러면 어떡하죠……?\n#3;em;[속상함]\n#3;stiff"
2002102-40 = "3;하나에 산타ND;06;그런가요? 저는 시도해 볼 만하다고 생각했는데요. 그러면 어떡하죠……?\n#3;em;[속상함]\n#3;stiff"
2002102-41 = "3;하나에 산타ND;02;아하, 선물 보따리는 천천히 나누어주어도 괜찮으니까……"
2002102-42 = "3;하나에 산타ND;01;착한 아이와 나쁜 아이를 가려내는 것부터 시작하자고요?"
2002102-43 = "3;하나에 산타ND;07;그거 좋네요! 그런데, 어떻게 하면 좋을까요?\n#3;hophop"
2002102-44 = "[s9] \"내가 지금부터 하나에에게 뭔가 이야기를 해 볼게.\n[s10] \"그걸 듣고 하나에는 내 말이 거짓말인지 아닌지를 가려내 보는 거야.\""
2002102-45 = "3;하나에 산타ND;03;아하! 거짓말 테스트로군요!\n#3;em;[반응]\n#3;hophop"
2002102-46 = "3;하나에 산타ND;03;아하! 거짓말 테스트로군요!\n#3;em;[반응]\n#3;hophop"
2002102-47 = "3;하나에 산타ND;00;그게 좋겠어요, 선생님! 아이들은 가끔 악의 없이 거짓말을 하기도 하니까요!"
2002102-48 = "3;하나에 산타ND;07;무엇부터 시작하실래요? 전 준비됐어요. 두근거리네요!\n#3;em;[음표]"
2002102-49 = "[s] \"사실 난 매년 이맘때가 되면 보따리를 들고,\""
2002102-50 = "#wait;1000"
2002102-51 = "[ns] \"마하 2로 날아다니면서 선물들을 나눠주곤 해.\""
2002102-52 = "3;하나에 산타ND;00;정말이에요?! 세상에……! 선생님은 꼭 산타 같네요!\n#3;em;[?!]"
2002102-53 = "3;하나에 산타ND;04;네? 아니라고요? 그렇지만 선생님은 뭐든지 할 수 있으시잖아요……?\n#3;stiff"
2002102-54 = "3;하나에 산타ND;08;그것도 아닌가요? 할 수 있는 것만 할 수 있다고요?"
2002102-55 = "3;하나에 산타ND;06;네…… 그렇겠네요. 하지만 뭔가, 조금 실망……\n#3;em;[땀]"
2002102-56 = "[s] \"콜록, 콜록! 아앗, 갑자기 기침과 함께 명치에 아픔이!\""
2002102-57 = "3;하나에 산타ND;05;네? 그거 큰일이네요! 어서 응급 처치를! 우선 여기에 누우세요!\n#3;em;[!]\n#3;jump"
2002102-58 = "3;하나에 산타ND;99;그다음은 책에서 본 대로 공기를 태워 나쁜 기운을 없애고."
2002102-59 = "3;하나에 산타ND;03;피를 잔뜩 뽑아서 몸의 균형을 맞춘 다음, 채찍질을 하며 고행을 이겨내면 될 거예요!\n#3;closeup\n#3;em;[하트]"
2002102-60 = "[s] \"죽지 않을 병도 그러다 죽겠다!\""
2002102-61 = "#all;hide"
2002102-62 = "#na;(그 뒤로도 하나에에게 계속해서 거짓말 테스트를 해 보았다.)"
2002102-63 = "#na;(하나에는 사람의 말을 잘 믿어주는, 아주 착한 아이라는 것을 새삼 깨달았다……)"

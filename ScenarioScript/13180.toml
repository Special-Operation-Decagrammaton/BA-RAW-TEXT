[translation]
13180-1 = "Episode 18;Confusion and More Confusion"
13180-13 = "Hahaha! I feel refreshed!"
13180-18 = "H-How can this be...? All of our troops..."
13180-19 = "Kaiser PMC was really this powerful... "
13180-20 = "This can't be! Nephthys teamed up with Kaiser?!"
13180-21 = "What kind of nonsense is this? Aren't you two supposed to be enemies?!"
13180-23 = "You're not wrong. Once upon a time."
13180-24 = "But did you honestly think that Kaiser would just give up the Trans-Desert Railway bonds and not expect any returns?"
13180-25 = "All of this? It only happened because we've been secretly negotiating from the start."
13180-26 = "Even if that were the case, they're holding the Nephthys heir hostage and blackmailing Abydos! "
13180-27 = "No, no. To clarify, we don't have any particular dissatisfaction with the lady. "
13180-28 = "Nephthys will continue to serve Miss Nonomi."
13180-29 = "However, just as the company serves her, she also has obligations to the company."
13180-30 = "As long as Takanashi Hoshino arrives safely and declares the contract's dissolution, all will be well."
13180-31 = "Then, Nonomi will be able to enjoy her life at Abydos until she graduates, and we will gain ownership of the Train Cannon."
13180-33 = "Nephthys...? Not Kaiser?"
13180-34 = "Hm? Oh. Kaiser has no interest in the Train Cannon. That's why we were able to come to an agreement."
13180-35 = "Come to think of it, how did you know I planned to betray you?"
13180-36 = "Th-That's..."
13180-38 = "I told him."
13180-39 = "Suou...?! "
13180-45 = "What is this...? Y-You betrayed us?"
13180-47 = "No, no. Not at all."
13180-57 = "...Th-The Kaiser president? "
13180-63 = "My friend here originally belonged to Kaiser PMC."
13180-64 = "Former PMC. I'm retired."
13180-66 = "Suou! We saved a wandering delinquent like you, who didn't even have an academy to call home...and this is how you repay us?!"
13180-68 = "Saved? Who exactly did you save?"
13180-69 = "Settle down. Save the bonding for later, we've got a busy schedule. Right now, it's time to get to work. "
13180-70 = "Take care of them."
13180-95 = "U-Um..."
13180-96 = "U-Ugh!"
13180-98 = "Well done, everyone. Thanks to you, we made a significant profit from the bond sales."
13180-99 = "I was excited about this newfound windfall, but I guess there's no such thing as free lunch."
13180-100 = "Here's the data you requested, President."
13180-101 = "Let's see... "
13180-105 = "Heehee. The Train Cannon. Amusing. "
13180-106 = "You should've informed me sooner that something so marvelous was hidden in Abydos."
13180-108 = "Ugh..."
13180-114 = "The Train Cannon... Much more realistic than that outlandish space battleship. "
13180-115 = "According to the Strategy Department's analysis, this could definitely be used as an asymmetric power weapon."
13180-116 = "I see. We stopped receiving communications from Black Suit, so I didn't think there would be any new avenues to gain power. But this..."
13180-117 = "Yes. With this...we'll be able to achieve what we couldn't before... "
13180-118 = "...Can it be? There are still pieces of the Tyrant Emperor's legacy that haven't been destroyed...?"
13180-119 = "Excellent. Kaiser will claim the Train Cannon."
13180-121 = "What?!"
13180-128 = "Send a survey team to locate where the Train Cannon is hidden. It must be somewhere along the Trans-Desert Railway."
13180-129 = "Understood."
13180-130 = "Even if you somehow locate the Train Cannon, you have no ownership rights! "
13180-131 = "Oh?"
13180-132 = "Kaiser sold the bonds to the private equity fund!"
13180-133 = "Therefore, it's up to how the Abydos students decide to handle the contract left by the previous student council president. Kaiser has no say!"
13180-134 = "My, oh my. What do you take me for?"
13180-135 = "Are you truly trying to give a lesson on contractual law to the head of the Kaiser Corporation?"
13180-136 = "A-As such... "
13180-137 = "Did you really believe I didn't see right through your little plan? Why you formed a private equity fund and called for a general creditors' meeting in the first place?"
13180-139 = "U-Um..."
13180-140 = "I'll go ahead and explain your elementary little plan to you."
13180-141 = "This meeting had three possible outcomes."
13180-142 = "First, the Abydos Student Council representative, the contract's principal, would arrive at the meeting before noon and certify the contract."
13180-143 = "If that were the case, the sales contract would be considered valid, and the Abydos Student Council would maintain legal ownership of the Train Cannon. "
13180-144 = "Naturally, this was the least desirable outcome for you."
13180-146 = "..."
13180-147 = "..."
13180-149 = "Second, the Abydos Student Council representative, the contract's principal, would confess that the previous student council was a fraudulent organization that did not possess the authority to enter into any such contract. The contract would be considered invalid. "
13180-150 = "The rights to the Train Cannon would then default to Nephthys, its original owner."
13180-151 = "This was your ideal outcome, yes?"
13180-152 = "..."
13180-153 = "And to achieve this, you kidnapped Nonomi and even threatened Hoshino... This, I must admit, I was quite impressed with."
13180-154 = "That sounds like the actions of a true industrialist. Even I couldn't have come up with that. Kidnapping your own company's heir? Hahaha, that was truly amazing."
13180-155 = "Th-That's..."
13180-156 = "You Abydos folks really are of a different breed. Nephthys knows how to get things done. I have to thank you for the entertainment."
13180-157 = "...Ugh."
13180-158 = "And finally. The Abydos Student Council representative, the contract's principal, fails to show up to the meeting by noon when the contract expires... "
13180-159 = "...Or does attend, but declares they don't intend to uphold the contract. "
13180-160 = "In this case, the sales contract would be legally terminated, based on the principal's intent."
13180-161 = "Immediately upon termination of the sales contract, the Train Cannon would regain its status as an Abydos facility and be reassigned as DLB bond collateral. "
13180-163 = "The rights to the Train Cannon would then default to the private equity fund, which owns the DLB bonds."
13180-164 = "Naturally, this was the private equity fund's desired outcome."
13180-171 = "...Which is why you hired mercenaries to guard this place until noon."
13180-172 = "But that begs the question. Why was the general meeting even needed in the first place?"
13180-173 = "The sales contract would've been null and void regardless, once the two-year grace period ended."
13180-174 = "The logical thing to do would've been to quietly wait for the contract to expire at noon, not go through all the trouble of holding a general creditors' meeting."
13180-175 = "So why then did the private equity fund hold a general creditors' meeting, even going so far as to inform Abydos about it? "
13180-176 = "Why would all you little investors be so obsessed with this certification nonsense?"
13180-181 = "...Because your worst fear was us, Kaiser, discovering the Train Cannon's existence later down the line."
13180-183 = "Th-That's... "
13180-185 = "So you held this meeting, hoping to protect yourselves with all these certifications."
13180-186 = "Isn't that right? Private equity fund members, you did all this because you were afraid of me, right?"
13180-192 = "Hahaha, did I hit the nail on the head? "
13180-193 = "Hahahahahahahaha!"
13180-195 = "Well done, little investors. Please direct your attention here."
13180-201 = "Th-This...? This document is...?"
13180-202 = "A merger agreement?! With my ZYAKO Industries...?"
13180-203 = "The Pawnbroker Union is being merged as a subsidiary of Kaiser...?"
13180-205 = "That's right. I'll be taking over all your companies, from this moment forward. "
13180-206 = "Of course, I'll pay you a generous price. How does 1,000 yen sound? "
13180-208 = "Wh-What?!"
13180-209 = "What is this ridiculous nonsense you're spouting?!"
13180-216 = "U-Um..."
13180-217 = "Now, don't you worry. M&A is my specialty. Kaiser's done this successfully countless times."
13180-220 = "Do you know why Kaiser's emblem is an octopus?"
13180-223 = "It's because we have as many subsidiaries as an octopus has tentacles. Hahaha!"
13180-224 = "We'll get it done quick and easy. With the blink of an eye, you'll be members of the Kaiser Group."
13180-225 = "Now then, do I have your approvals? The pen is right here. "
13180-226 = "This is outrageous..."
13180-227 = "...I can't believe this. I never should've gotten involved in this..."
13180-235 = "Excellent, excellent. That settles it. You private equity fund members are now under the Kaiser Group! Congratulations, each of you!"
13180-236 = "Now that the private equity fund is mine, I suppose I'm the general creditors' representative. Speak now if you disapprove!"
13180-238 = "U-Ugh... We get it..."
13180-240 = "There, there. Job well done, little investors. "
13180-241 = "Go to your time-out corner now. You'll stay there until the meeting is over."
13180-255 = "...To summarize, if we hold our position here until noon, the Train Cannon is mine."
13180-256 = "Of course, there are other routes I can take to seize the Train Cannon, but, for now, the setup laid out by the private equity fund will be the most straightforward. "
13180-257 = "Your time to shine, General. Hold off any advances from Abydos until noon."
13180-258 = "Understood."
13180-260 = "Don't let your guard down. Black Suit himself coveted Takanashi Hoshino. She's no ordinary kid."
13180-262 = "Don't worry, President. I'm not a fool that falls victim to carelessness."
13180-264 = "A given! After all, you're my trusted general."
13180-266 = "Yes, sir."
13180-271 = "...Prepare for battle, troops. "
13180-275 = "All remaining staff are to search for the Train Cannon. It'll be time-consuming, but it should be possible with our information network."
13180-276 = "Yes! Understood!"
13180-280 = "Now then, just how far will your capabilities take you, Abydos?"
13180-286 = "Wh-Why isn't the boss contacting us?"
13180-287 = "Something strange's happening. "
13180-291 = "O-Over there...?!"
13180-302 = "Good. Take care of the small-fry, and we'll set up our base here. "
13180-303 = "Stop Schale and Abydos' advance at all costs!"
13180-310 = "Current Time 10:4X AM."
13180-313 = "I'm detecting new troops in the area... It's Kaiser PMC! "
13180-314 = "Kaiser PMC...?"
13180-315 = "A huge number of PMC forces are gathering around Central Station! They're engaged in battle with the private equity fund troops!"
13180-316 = "Wh-What in the world is going on...?"
13180-318 = "Conflict within the private equity fund?"
13180-319 = "No... Kaiser was never a part... I don't quite understand it, but the situation seems to be changing."
13180-320 = "And on top of that..."
13180-325 = "Huh?!"
13180-331 = "Whoa... Big problem.."
13180-332 = "Wh-What the heck is happening? Do we gotta run away? And abandon our railway construction?"
13180-333 = "Hikari thinks...running away...is probably impossible...?"
13180-335 = "Private equity fund forces confirmed! "
13180-337 = "E-Eeek!"
13180-338 = "Please spare us! We don't know anything!"
13180-340 = "Highlander Academy is...surrounded by Kaiser at the nearby restricted station?"
13180-342 = "What? Those little menaces? "
13180-343 = "What about Hoshino? "
13180-348 = "Kaiser?"
13180-355 = "Hahaha. I finally found you, Takanashi Hoshino."
13180-361 = "...Out of my way!"
13180-368 = "Those are Kaiser PMC's Special Forces! Hoshino...!"
13180-369 = "What should we do, Sensei?"
13180-370 = "[s1] \"It's okay. Hoshino'll be fine against the General.\"\n[s2] \"Let's go rescue the Highlander students.\""
13180-375 = "Current Time 10:5X AM."
13180-377 = "We have one hour and ten minutes until noon... "
13180-378 = "It's okay. We'll make it. "
13180-379 = "Augh! We've got no choice. Hoshino'll be okay, but those guys are gonna be in serious danger without our help."
13180-381 = "...Understood, Sensei!"
13180-382 = "Move out and rescue the Highlander Academy students!"

[translation]
13180-1 = "ตอนที่ 18;ความสับสนซ้ำสอง"
13180-13 = "ฮ่าฮ่าฮ่า ได้แค่เท่านี้เหรอครับ?"
13180-18 = "ปะ... เป็นไปได้ยังไง... กองกำลังทั้งหมดที่เราเกณฑ์มา..."
13180-19 = "ทำไมไคเซอร์ PMC ถึงมีพลังมากแบบนี้... "
13180-20 = "เป็นไปไม่ได้!! เนฟธิสไปจับมือกับไคเซอร์งั้นเหรอ?!"
13180-21 = "นี่มันเรื่องเหลวไหลอะไรกัน! ทั้งสองฝ่ายเป็นศัตรูกันไม่ใช่เหรอ?!"
13180-23 = "ก็ใช่ครับ เราเคยเป็น"
13180-24 = "แต่คุณคิดว่าไคเซอร์จะขายพันธบัตร <ทางรถไฟข้ามทะเลทราย> โดยไม่หวังสิ่งตอบแทนเหรอครับ?"
13180-25 = "ทางนั้นทำการค้าอย่างลับๆ กับพวกเรามาตลอด เรื่องแบบนั้นก็เลยเป็นไปได้ยังไงล่ะครับ"
13180-26 = "ตะ... แต่ก็กล้าจับตัวคุณหนูของตัวเองเป็นตัวประกันแล้วข่มขู่อะบิดอสเลยงั้นเหรอ!"
13180-27 = "ไม่ใช่อย่างนั้นหรอกครับ ขอบอกไว้ก่อนว่าทางผมไม่ได้มีความไม่พอใจในตัวคุณหนูเป็นพิเศษ "
13180-28 = "เนฟธิสจะต้องดูแลคุณหนูต่อไปเรื่อยๆ แล้วเราจะทำอย่างนั้นได้ยังไงกันล่ะครับ?"
13180-29 = "คุณหนูเพียงแค่มีภาระที่ต้องจ่ายให้กับบริษัทน่ะครับ"
13180-30 = "ถ้าโฮชิโนะมาถึงที่นี่ได้อย่างปลอดภัยและประกาศยกเลิกสัญญา ทุกอย่างก็จะคลี่คลายได้ครับ"
13180-31 = "แล้วคุณหนูก็จะได้กลับไปใช้ชีวิตที่อะบิดอสอย่างมีความสุขจนเรียนจบ ส่วนพวกผมก็จะได้กรรมสิทธิ์#nในปืนแม่เหล็กไฟฟ้าครับ"
13180-33 = "เนฟธิสได้เหรอ...? ไม่ใช่ไคเซอร์หรอกเหรอ?"
13180-34 = "ทางไคเซอร์ไม่สนใจปืนแม่เหล็กไฟฟ้าหรอกครับ เพราะงั้นถึงได้มาตกลงซื้อขายกับทางผมไงครับ"
13180-35 = "จะว่าไป คุณได้ข่าวมาจากไหนเหรอครับว่าผมจะหักหลัง?"
13180-36 = "ระ... เรื่องนั้น..."
13180-38 = "ฉันเป็นคนบอกเองน่ะ"
13180-39 = "สุโอ...?! "
13180-45 = "หมายความว่ายังไง...?! นี่คุณหักหลังพวกเราเหรอครับ!?"
13180-47 = "เปล่า ไม่ใช่อย่างนั้น"
13180-57 = "ปะ... ประธานใหญ่ของไคเซอร์...?! "
13180-63 = "เธอคนนี้อยู่ในไคเซอร์ PMC น่ะ"
13180-64 = "บอกว่าเคยอยู่ดีกว่า ตอนนี้ฉันออกมาแล้ว"
13180-66 = "สุโอ...!! ผมอุตส่าห์ช่วยแยงกี้สาวเร่ร่อนที่ไม่มีโรงเรียนจะอยู่...! แต่เลือกที่จะตอบแทนบุญคุณกันอย่าง#nนี้งั้นเหรอ...!"
13180-68 = "เฮอะ พวกคุณไม่ได้ช่วยอะไรฉันไว้สักหน่อย"
13180-69 = "นี่ ฉันไม่มีเวลามากนักหรอกนะ เอาไว้พวกเธอไปแสดงไมตรีจิตกันทีหลัง ตอนนี้ต้องทำงานสิ "
13180-70 = "จัดการซะ"
13180-95 = "โอยย..."
13180-96 = "อะ... อึกก...!"
13180-98 = "ทุกคนทำได้ดีมาก เราได้ผลประโยชน์จากพันธบัตรมหาศาลเลยละ"
13180-99 = "ฉันก็หลงคิดว่าเป็นลาภลอย แต่สุดท้ายโลกนี้ก็ไม่มีอะไรได้มาฟรีๆ สินะ"
13180-100 = "นี่คือข้อมูลสิ่งนั้นครับ ท่านประธานใหญ่"
13180-101 = "ไหนดูซิ "
13180-105 = "หึหึ ปืนแม่เหล็กไฟฟ้างั้นเหรอ น่าสนุกนะ "
13180-106 = "ทำไมไม่บอกกันก่อนล่ะ ว่ามีอาวุธยอดเยี่ยมแบบนี้ซ่อนอยู่ในอะบิดอสด้วย"
13180-108 = "อึก..."
13180-114 = "ปืนแม่เหล็กไฟฟ้า... ฟังดูไม่ใช่ของเหลวไหลอย่างยานรบอวกาศนั่น ก็เลยยิ่งน่าเชื่อถือหน่อย"
13180-115 = "ทีมกลยุทธ์วิเคราะห์ไว้ว่าสิ่งนี้จะเป็น <อาวุธยุทโธปกรณ์อสมมาตร> ได้อย่างแน่นอนครับ"
13180-116 = "งั้นเหรอ ฉันไม่ได้ติดต่อกับสูทดำมานานแล้ว นึกว่าคงไม่มีวิธีเหมาะสมที่จะได้พลังใหม่ๆ มาแล้วซะอีก แต่ถ้ามีสิ่งนี้ละก็..."
13180-117 = "ครับ ถ้ามีของสิ่งนี้... ก็จะทำเรื่องนั้นที่ยังไม่ได้ทำในอดีตได้... "
13180-118 = "งั้นเหรอ... ยังมีสมบัติของผู้เหี้ยมโหดที่ยังหลงเหลืออยู่อีกงั้นเหรอ"
13180-119 = "ดีละ เราจะเอาปืนแม่เหล็กไฟฟ้าไว้"
13180-121 = "ว่าไงนะ?!"
13180-128 = "ส่งทีมรังวัดไปค้นหาที่ซ่อนของ <ปืนแม่เหล็กไฟฟ้า> เดี๋ยวนี้ มันต้องอยู่ตรงไหนสักแห่งในทางรถไฟ#nข้ามทะเลทรายนี่ละ"
13180-129 = "รับทราบครับ"
13180-130 = "ไม่หรอก ถึงจะหาปืนแม่เหล็กไฟฟ้าเจอ แต่กรรมสิทธิ์ก็ไม่ได้เป็นของพวกคุณหรอกครับ! "
13180-131 = "หืม?"
13180-132 = "ไคเซอร์ขายพันธบัตรให้ <กองทุนไพรเวทอิควิตี้> ไปแล้ว!"
13180-133 = "ดังนั้นสิทธิ์ในปืนแม่เหล็กไฟฟ้าจะไม่ได้อยู่กับไคเซอร์! แต่จะขึ้นอยู่กับวิธีการจัดการหนังสือสัญญาที่#nประธานนักเรียนคนก่อนทิ้งไว้!"
13180-134 = "ให้ตายสิ นายคิดว่าฉันเป็นคนยังไงกัน"
13180-135 = "นายกำลังสอนเรื่องหนังสือสัญญาและการวิเคราะห์เชิงกฎหมายกับฉันงั้นเหรอ? ฉันคือประธานใหญ่#nของไคเซอร์ คอเปอเรชั่นเชียวนะ"
13180-136 = "ระ... เรื่องนั้น... "
13180-137 = "คิดว่าฉันจะไม่รู้แผนการในใจของพวกนายงั้นเหรอ? คิดว่าฉันไม่รู้เหรอว่าทำไมพวกนายถึงจัดตั้ง#nกองทุนไพรเวทอิควิตี้แล้วเปิดประชุมสมัชชาน่ะ?"
13180-139 = "อะ... อึก..."
13180-140 = "ฉันจะอธิบายแทนพวกนายให้ก็แล้วกัน"
13180-141 = "มีความเป็นไปได้ 3 อย่างที่คาดการณ์ได้จากการจัดการประชุมนี้"
13180-142 = "ความเป็นไปได้แรก ตัวแทนของ <สภานักเรียนอะบิดอส> ที่เป็นผู้ทำสัญญาซื้อขายมาเข้าร่วมการ#nประชุมก่อนเที่ยงวัน แล้วประกาศว่าจะคงสัญญาซื้อขายในอดีตไว้"
13180-143 = "แล้วสัญญาซื้อขายก็จะยังมีผลบังคับใช้ ส่วนปืนแม่เหล็กไฟฟ้าก็จะตกไปเป็นของ <สภานักเรียนอะบิดอส> ที่เป็นผู้ทำสัญญา "
13180-144 = "และนี่ก็น่าจะเป็นอนาคตที่พวกนายไม่อยากให้เกิดขึ้นอย่างเด็ดขาด"
13180-146 = "..."
13180-147 = "..."
13180-149 = "ความเป็นไปได้ที่ 2 ตัวแทนของ <สภานักเรียนอะบิดอส> ที่เป็นผู้ทำสัญญาซื้อขายมาสารภาพว่า สภานักเรียนนี้เป็นเพียงกลุ่มจอมปลอมที่ไร้ซึ่งถึงอำนาจ แล้วประกาศรับรองว่าสัญญาซื้อขายนั้นเป็น <โมฆะ> จากต้นทาง "
13180-150 = "แล้วสิทธิ์ในปืนแม่เหล็กไฟฟ้าก็จะตกไปเป็นของ <เนฟธิส> ที่เป็นผู้ครอบครองก่อนมีการเกิดสัญญา"
13180-151 = "และนี่ก็เป็นสิ่งที่เนฟธิสต้องการ ใช่มั้ยล่ะ?"
13180-152 = "..."
13180-153 = "พวกนายก็เลยจับตัวคุณหนูของตัวเองมาเป็นตัวประกันแล้วข่มขู่โฮชิโนะ... หึหึ ต้องบอกว่าฉันประทับใจกับวิธีการนี้เลยนะ"
13180-154 = "เป็นภาพลักษณ์ของนักธุรกิจที่เดินเกมได้เก่งกว่าฉันซะอีก ถึงกับลักพาตัวคุณหนูของบริษัทเลยอย่าง#nงั้นเหรอ? ฮ่าฮ่าฮ่าฮ่า ยอดเยี่ยมจริงๆ"
13180-155 = "ระ... เรื่องนั้นน่ะ..."
13180-156 = "นี่สินะเด็กเก่าอะบิดอส เวลาเนฟธิสทำอะไรก็จริงจังเหมือนกันนะ เรื่องนี้น่าสนุกจริงๆ"
13180-157 = "อึก..."
13180-158 = "และความเป็นไปได้ที่ 3 ถ้าตัวแทนจาก <สภานักเรียนอะบิดอส> ที่เป็นผู้ทำสัญญามาไม่ถึงภายในตอน#nเที่ยงวัน ก็คือมาไม่ทันเวลาที่สัญญาจะหยุดมีผลในทางกฎหมาย "
13180-159 = "หรือว่ามาเข้าประชุม แต่ประกาศจุดยืนว่าจะไม่คงสัญญาไว้ "
13180-160 = "ถ้าเป็นอย่างนั้น ก็จะเป็นการรับรองว่าสัญญาซื้อขายฉบับนั้นได้ <สิ้นสุดลง> ตามความตั้งใจของผู้ทำ#nสัญญา"
13180-161 = "และทันทีที่สัญญาซื้อขายสิ้นสุดลง ปืนแม่เหล็กไฟฟ้าก็จะกลับมามีสถานภาพเป็น <สิ่งอำนวยความ#nสะดวกพื้นฐานของอะบิดอส> และถูกกำหนดให้เป็นทรัพย์สินจำนองของพันธบัตร DLB โดยอัตโนมัติ "
13180-163 = "แล้วกรรมสิทธิ์ก็จะตกไปเป็นของ <กองทุนไพรเวทอิควิตี้> ที่เป็นผู้ถือครองพันธบัตร DLB ในปัจจุบัน "
13180-164 = "และนี่ก็คงจะเป็นอนาคตที่ <กองทุนไพรเวทอิควิตี้> อยากให้เป็น"
13180-171 = "เหตุผลที่แต่ละฝ่ายเจียดเงินของตัวเองมาจ้างกองกำลังให้มาปกป้องที่นี่ไว้จนถึงเที่ยงก็เพราะเหตุนี้"
13180-172 = "แต่มันก็ทำให้เกิดข้อสงสัยอยู่นะ ว่าทำไมถึงจะต้องมีการประชุมด้วย?"
13180-173 = "ในเมื่อมันเป็นเรื่องที่แน่นอนอยู่แล้วว่าถ้าพ้นเวลา 2 ปีของสัญญาซื้อขายไปแล้ว สัญญาก็จะไม่มีผลใน#nทางกฎหมาย"
13180-174 = "เพราะงั้นต่อให้ไม่ต้องจัดการประชุมสมัชชาเจ้าหนี้แล้วให้มีการประกาศและ <รับรอง> เจตนารมณ์ให้#nวุ่นวาย แต่แค่รอให้เลยเวลาเที่ยงไปก็จบ..."
13180-175 = "แต่ทำไม <กองทุนไพรเวทอิควิตี้> ถึงได้จัดการประชุมสมัชชาเจ้าหนี้ และถึงขนาดกับไปบอกทาง#nอะบิดอสว่าตัวเองจะเป็นเจ้าภาพจัดการประชุมเลยล่ะ? "
13180-176 = "ทำไมพวกนายถึงยึดติดกับการ <รับรอง> อะไรนี่ด้วย?"
13180-181 = "พวกนายน่ะ... กลัวว่าพวกฉันจะรู้เรื่องการมีอยู่ของปืนแม่เหล็กไฟฟ้าในภายหลัง"
13180-183 = "เรื่องนั้นมัน... "
13180-185 = "ก็เลยจัดการประชุมและให้มีการกระทำที่เป็นการรับรอง เพื่อเป็นการป้องกันล่วงหน้า"
13180-186 = "ใช่มั้ยล่ะ? พวกคนในกองทุนทั้งหลาย? ทำแบบนี้เพราะกลัวฉันกันนักใช่มั้ย? หืม?"
13180-192 = "ฮ่าฮ่าฮ่า หรือว่าฉันพูดแทงใจดำไปหน่อย? "
13180-193 = "ฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!"
13180-195 = "เอาละ ทุกคนทำได้ดีมากแล้ว ทีนี้ก็มาให้ความสนใจตรงนี้กัน"
13180-201 = "นะ... นั่นมัน...? เอกสารนั่น...?"
13180-202 = "หนังสือยินยอมการควบรวมกิจการ?! กิจการบันเทิง ZYAKO ของฉัน...?"
13180-203 = "สหพันธ์โรงรับจำนำจะกลายเป็นบริษัทลูกของไคเซอร์กรุ๊ปงั้นเหรอ...?"
13180-205 = "ก็ใช่น่ะสิ จากนี้ไปฉันจะซื้อกิจการของพวกนาย "
13180-206 = "อ้อ แน่นอนว่าจะตีให้ราคาอย่างงามเลยละ สัก 1,000 เยนดีมั้ย? "
13180-208 = "วะ... ว่าไงนะ?!"
13180-209 = "พะ... พูดอะไรเหลวไหล...!!?"
13180-216 = "อะ... อึก..."
13180-217 = "เอาละ ไม่ต้องกังวลไปหรอก เรื่องควบรวมและเข้าซื้อกิจการเป็นความสามารถพิเศษของฉันอยู่แล้ว นี่คือสิ่งที่ไคเซอร์ทำมาไม่รู้ตั้งกี่รอบแล้ว"
13180-220 = "รู้หรือเปล่าว่าทำไมสัญลักษณ์ของไคเซอร์ถึงได้เป็นรูปปลาหมึกยักษ์?"
13180-223 = "ก็เพราะเรามีบริษัทลูกมากมายเหมือนหนวดปลาหมึกยักษ์ยังไงล่ะ ฮ่าฮ่าฮ่าฮ่า!"
13180-224 = "เอาละ อีกไม่นานพวกนายก็จะได้มาเป็นสมาชิกของไคเซอร์กรุ๊ปของฉันแล้ว"
13180-225 = "ว่าไง จะเห็นชอบด้วยมั้ย? ปากกาอยู่ตรงนี้แล้ว รับไปสิ "
13180-226 = "ทะ... ทำไมถึงเผด็จการแบบนี้..."
13180-227 = "เป็นแบบนี้ไปได้ยังไง... ฉันไม่ควรเข้ามายุ่งกับเรื่องแบบนี้ตั้งแต่แรกเลย..."
13180-235 = "ดีละ เรียบร้อยหมดแล้วสินะ ในที่สุดสมาชิกส่วนใหญ่ของ <กองทุนไพรเวทอิควิตี้> ก็เป็นส่วนหนึ่ง#nของไคเซอร์กรุ๊ปแล้ว! ต้องฉลองสักหน่อยแล้วสิ?"

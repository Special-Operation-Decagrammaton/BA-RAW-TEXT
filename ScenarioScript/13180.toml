[translation]
13180-1 = "第18話;混亂與混亂"
13180-13 = "哈哈哈。這下舒服多了。"
13180-18 = "怎，怎麼會……居然把我們準備的兵力全部……"
13180-19 = "凱薩PMC的力量竟然……"
13180-20 = "怎麼可能！！奈芙蒂斯居然會跟凱薩聯手！？"
13180-21 = "這到底是怎麼回事！你們不是死對頭嗎！？"
13180-23 = "沒錯，確實就像你說的一樣。"
13180-24 = "但你們以為凱薩會白白交出「沙漠橫貫鐵路」的債權嗎？"
13180-25 = "是因為我們一直在私底下交易，才讓這件事情得以成立。"
13180-26 = "就，就算是這樣好了，你們居然用自己家族的大小姐當人質來威脅阿拜多斯！"
13180-27 = "不，坦白說，我們對大小姐並沒有什麼不滿。"
13180-28 = "畢竟那可是奈芙蒂斯應該一直服侍的對象啊。"
13180-29 = "只是既然接受了企業的好處，自然也有義務對企業提供相應的回報。"
13180-30 = "所以只要小鳥遊星野來到這裡宣佈契約無效，一切都能得到解決。"
13180-31 = "這麼一來，大小姐就能一直留在阿拜多斯過著幸福的生活直到畢業，#n而我們也能取得列車砲的所有權了。"
13180-33 = "是奈芙蒂斯……而不是凱薩？"
13180-34 = "嗯？凱薩對列車砲沒有興趣，所以才會答應和我們交易吧。"
13180-35 = "對了，你是從哪裡得知我們背叛的情報的呢？"
13180-36 = "那，那個……"
13180-38 = "是我說的。"
13180-39 = "蘇芳……！？"
13180-45 = "這是什麼意思……！？#n難，難道你背叛了我們嗎！"
13180-47 = "不不不，不是那樣的。"
13180-57 = "凱，凱薩總裁……！？"
13180-63 = "他原本就是凱薩PMC的人。"
13180-64 = "應該說「前」PMC才對。現在我已經引退了。"
13180-66 = "蘇芳……！！#n是我們救了你這個沒有學園要的流浪太妹……！你怎麼能恩將仇報……！"
13180-68 = "你們根本就沒幫上什麼忙吧？"
13180-69 = "夠了夠了，我可是很忙的。#n要攀交情麻煩等正事做完之後再說。"
13180-70 = "動手吧。"
13180-95 = "唔唔……"
13180-96 = "唔……"
13180-98 = "真是辛苦各位了。#n託你們的福，我才能靠債權大賺一筆。"
13180-99 = "原本只以為是筆天外飛來的橫財，果然天下沒有白吃的午餐啊。"
13180-100 = "總裁，這就是那個情報。"
13180-101 = "拿來我看看。"
13180-105 = "呵呵，列車砲啊……真有意思。"
13180-106 = "明明有這麼棒的東西藏在阿拜多斯，為什麼沒有事先告訴我呢？"
13180-108 = "唔唔……"
13180-114 = "列車砲……因為不像宇宙戰艦一樣簡直是天方夜譚，反而更有真實感呢。"
13180-115 = "按照戰略部的分析，這確實可以成為不對稱戰力兵器。"
13180-116 = "這樣啊。那個黑色西裝人已經失聯了好一段時間，本來還以為無法取得新力量了呢。只要有了這個……"
13180-117 = "是啊，只要有了它……之前沒能做到的那件事也……"
13180-118 = "……原來如此。#n竟然還有沒被報廢的東西啊──我指的是那個雷帝的遺產。"
13180-119 = "很好，那麼這門列車砲就歸我們所有了。"
13180-121 = "什麼！？"
13180-128 = "立刻派勘查隊找出藏匿「列車砲」的地點。#n應該就在沙漠橫貫鐵路的某個地方才對。"
13180-129 = "遵命。"
13180-130 = "不，就算找到列車砲，所有權也不會屬於你們！"
13180-131 = "哦？"
13180-132 = "你們凱薩已經把債權賣給「私募基金」了！"
13180-133 = "所以現在列車砲的權利，必須根據與阿拜多斯前學生會長簽下的契約而定！"
13180-134 = "真受不了，你把我當成什麼人了？"
13180-135 = "現在是在教我──凱薩公司的總裁──該怎麼處理契約和法規嗎？"
13180-136 = "這，這…… "
13180-137 = "組成私募基金召開債權團大會的目的……你們真以為我會不知道嗎？"
13180-139 = "唔……"
13180-140 = "我就替你們說明一下吧。"
13180-141 = "藉由這場大會，可能發展的未來一共有三種。"
13180-142 = "第一種──#n契約當事者「阿拜多斯學生會」的代表在12點前出席，表示履行契約的意思。"
13180-143 = "這麼一來契約將會生效，列車砲則會交給契約的當事者「阿拜多斯學生會」。"
13180-144 = "而這是你們絕不希望看見的未來。"
13180-146 = "……"
13180-147 = "……"
13180-149 = "第二種──#n契約當事者「阿拜多斯學生會」的代表在12點前出席，#n宣告自己並不具備學生會的權限，主張契約「無效」。"
13180-150 = "這麼一來，列車砲的權利就會歸契約前的所有者「奈芙蒂斯」所有。"
13180-151 = "這就是奈芙蒂斯期望看見的未來──沒錯吧？"
13180-152 = "……"
13180-153 = "為此不惜綁架自己家族的大小姐來威脅星野……老實說我實在很佩服。"
13180-154 = "哈哈哈。#n不擇手段到這種程度，簡直比我更有企業家的風範啊。"
13180-155 = "這……"
13180-156 = "阿拜多斯出身的人果然不容小覷。#n那個奈芙蒂斯認真起來竟然能做到這種地步，真是太有趣了。"
13180-157 = "……唔。"
13180-158 = "至於第三種──#n由於契約的效力將在今天12點結束……#n如果契約當事者「阿拜多斯學生會」的代表沒能在時限前出席……"
13180-159 = "又或者是在出席後表明不維持契約的立場……"
13180-160 = "那麼就能依照契約當事者的決定，公證這份契約就此「終結」。"
13180-161 = "接著在契約終結的瞬間，#n列車砲將恢復成「阿拜多斯基礎設施」的一部分，並自動成為DLB的抵押品。"
13180-163 = "如此一來，其所有權就會落入[ruby= ・     ・ ]目前[/ruby]擁有DLB的「私募基金」手中。"
13180-164 = "這就是「私募基金」希望看見的未來。"
13180-171 = "各位之所以僱用傭兵，在12點前守住這裡，也是為了這個目的吧。"
13180-172 = "但是你們難道沒有這種疑問嗎──為什麼非得召開大會不可？"
13180-173 = "契約一旦經過2年就會失去效力。"
13180-174 = "既然如此，何必大費周章地召開大會進行「公證」，只要過了12點不就行了嗎？"
13180-175 = "為什麼「私募基金」非得召開債權團大會，還特地將這件事告訴阿拜多斯的學生？"
13180-176 = "為何如此執著於「公證」這個行為呢？"
13180-181 = "──是因為害怕我們日後發現列車砲的存在。"
13180-183 = "……"
13180-185 = "所以才想召開大會，藉由接受公證的行為來防範未然。"
13180-186 = "我說的沒錯吧──私募基金的各位？#n你們是因為害怕我才做出這種事的吧？"
13180-192 = "哈哈，被我說中了嗎？"
13180-193 = "哈哈哈哈哈哈哈哈！"
13180-195 = "那麼，再麻煩各位確認一下這些文件。"
13180-201 = "這，這份文件是……？"
13180-202 = "併，併購同意書！？我的雜魚興業的……？"
13180-203 = "當舖聯盟將被併入凱薩集團的子公司……？"
13180-205 = "沒錯。從現在起，我將會接管你們的公司。"
13180-206 = "啊，當然我也會提出一個漂亮的價格。#n讓我想想……1000元怎麼樣？"
13180-208 = "……你，你說什麼！？"
13180-209 = "這是在開什麼玩笑……！！？"
13180-216 = "唔……"
13180-217 = "各位不必擔心。#nM&A既是我的專長，也是我們凱薩反覆執行過無數次的事。"
13180-220 = "你們知道凱薩的徽章為什麼是章魚嗎？"
13180-223 = "那是因為凱薩旗下的子公司，就像章魚的腳一樣多啊。哈哈哈哈──！"
13180-224 = "來吧，很快就會結束了。#n轉眼間你們就會成為我們凱薩集團的一員。"
13180-225 = "各位應該都同意吧？#n來，筆在這裡。"
13180-226 = "居，居然做出這種暴行……"
13180-227 = "……豈有此理。#n早知道就不該插手這件事的……"
13180-235 = "很好，這樣「私募基金」的大部分成員都變成凱薩集團的一員了！#n真是可喜可賀。"
13180-236 = "如此一來「私募基金」就是我的囊中物了。#n啊，今後債權團的代表也由我來負責……各位有意見嗎？"
13180-238 = "唔……我，我明白了……"
13180-240 = "各位都辛苦了。"
13180-241 = "因為你們必須在大會結束前待在這裡，先隨便找個角落待著吧。"
13180-255 = "……只要在12點前守住這裡，列車砲就是我們的了。"
13180-256 = "雖然還有很多方法能搶奪列車砲，#n但現在私募基金設下的這個局面，看起來是最乾淨俐落的選擇。"
13180-257 = "我就奉陪到底吧。#n將軍，務必在12點之前擋住阿拜多斯的進擊。"
13180-258 = "遵命。"
13180-260 = "可別掉以輕心。#n尤其是小鳥遊星野……他可是連黑色西裝人都覬覦的人才，想必不是泛泛之輩。"
13180-262 = "請您不必擔心，總裁。#n我和那些會因為大意而失敗的蠢貨不一樣。"
13180-264 = "果然是我信任的人才。那這件事就交給你了！"
13180-266 = "是！"
13180-271 = "……準備出擊。"
13180-275 = "剩下的其他人就去找出列車砲隱藏的位置吧。#n雖然得花點時間，但憑我們的情報能力應該能找出來才對。"
13180-276 = "是！遵命！"
13180-280 = "接下來就讓我見識見識阿拜多斯的實力吧。"
13180-286 = "為，為什麼老闆沒有聯絡我們？"
13180-287 = "狀況是不是不太對勁？"
13180-291 = "那，那個是……！？"
13180-302 = "把那些嘍囉收拾乾淨，在這裡建構陣地！"
13180-303 = "一定要阻擋夏萊和阿拜多斯的進攻！"
13180-310 = "AM 10:4X"
13180-313 = "確認到周圍出現了新的兵力！是，是凱薩PMC！"
13180-314 = "凱薩PMC……？"
13180-315 = "PMC的大量兵力湧向了中央車站……！正在與私募基金的兵力交戰！"
13180-316 = "這，這到底是怎麼回事……"
13180-318 = "私募基金發生內鬥了嗎？"
13180-319 = "不……凱薩應該沒有加入他們才對……#n雖然有點難以理解，但狀況好像改變了。"
13180-320 = "而且……"
13180-325 = "咦！？"
13180-331 = "哇～大事不妙～"
13180-332 = "這，這是什麼情況……該放棄工程逃跑嗎……？"
13180-333 = "好像～逃不掉了～？"
13180-335 = "發現私募基金的兵力！"
13180-337 = "噫！？"
13180-338 = "請饒了我們吧！我們什麼都不知道！"
13180-340 = "高地人鐵道學園……好像在附近的車站遭到了凱薩的包圍？"
13180-342 = "什麼？是那些傢伙嗎？"
13180-343 = "星野前輩人呢？"
13180-348 = "凱薩？"
13180-355 = "呵呵呵。總算找到你了，小鳥遊星野。"
13180-361 = "……閃開！！"
13180-368 = "是凱薩PMC的特殊部隊！！星野前輩……！"
13180-369 = "老師，現在該怎麼辦？"
13180-370 = "[s1]「別擔心，星野不會輸給那個將軍的。」\n[s2]「我們去救高地人鐵道學園的學生吧。」"
13180-375 = "AM 10:5X"
13180-377 = "還剩下約1小時10分鐘……"
13180-378 = "沒關係，應該能趕上。"
13180-379 = "唉，沒辦法了，星野前輩應該不會有事……#n但如果我們不幫忙另一邊的話，看起來會有危險。"
13180-381 = "……我明白了，老師！"
13180-382 = "開始協助高地人鐵道學園！"

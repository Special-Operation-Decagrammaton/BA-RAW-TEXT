1010405-60 = "3;현룡문 부원;05;손님이 무엇을 원하고 어떤 선택을 내릴 것인지, 미리 아울러 짐작하고 대접할 수 있어야 진정으로 손님을 감동시킬 수 있을 터인데!\n#3;em;[스팀]\n#3;hophop"
1010405-61 = "3;레이죠;01;…….\n#3;em;[빠직]"
1010405-62 = "3;현룡문 부원;05;그리고! 어째서 식당 정문에 현룡문의 문양이 설치되어 있지 않지?"
1010405-63 = "3;현룡문 부원;02;이것은 그것인가? 현룡문에 대한 반항심을 표출하려는 것이겠지?"
1010405-64 = "3;현룡문 부원;05;돌아가자마자 현무상회가 언제나처럼 현룡문에 대한, 나아가 산해경에 대한 역심(逆心)을 품고 있다고 보고해야겠어!\n#3;em;[!]\n#3;jump"
1010405-65 = "3;레이죠;07;……들어주십시오. 이곳은 현무상회 거리이며, 저희는 어디까지나 그 상징으로서–"
1010405-66 = "3;현룡문 부원;05;변명 같은 건 듣고 싶지 않다고! 중요한 것은 현무상회에게 진정한 접객을 하려는 마음가짐이 존재하는지!\n#3;closeup\n#bgshake\n#fontsize;80"
1010405-67 = "3;현룡문 부원;05;그리고 산해경의 전통과 문화를 이어 나가려는 의지가 있는지를 확인하는 것이니까!\n#3;closeup\n#3;em;[!]\n#fontsize;80"

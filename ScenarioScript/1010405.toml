1010405-1 = "#title;Enter the……"
1010405-2 = "#place;현무상회 본점"
1010405-3 = "#wait;1500"
1010405-4 = "3;현룡문 부원;05;뭐냐, 현무상회는! 현룡문의 감찰관이 직접 시찰을 나왔는데, 차 한잔 대접하지 않는 거냐!\n#3;a\n#3;em;[스팀]\n#3;hophop"
1010405-5 = "3;현룡문 부원;02;아니면 예전처럼 현룡문의 감찰관을 함정에 빠뜨리려는 것은 아니겠지?"
1010405-6 = "3;현룡문 부원;05;또 그 비슷한 일이 일어났다가는…… 이번에야말로 따끔한 맛을 보여 줄 수밖에 없을 테니까!\n#3;em;[!]"
1010405-7 = "#st;[0,0];instant;1;"
1010405-8 = "#clearST"
1010405-9 = "3;레이죠;99;……일단, 예전의 그 불미스러운 일에 대해서는 진심으로 사과를 드리겠습니다.\n#3;a\n#3;em;[...]"
1010405-10 = "3;레이죠;02;그리고 차를 대접하는 것은 큰 문제가 아닙니다만, 괜찮으시겠습니까?"
1010405-11 = "3;레이죠;99\n1;현룡문 부원;02;뭐가 말이지?\n#3;m5\n#1;a\n#1;em;[?]"
1010405-12 = "3;레이죠;02;차를 끓이려면, 위생관리평가 준비를 마쳐 둔 조리 도구를 사용해야 할 테니 말이죠."
1010405-13 = "3;레이죠;01;그렇게 되면 처음부터 감찰을 다시 시작하거나, 차라리 다른 날을 정해서 재감찰을 해야 하지 않을까요?\n#3;em;[반응]"
1010405-14 = "1;현룡문 부원;04;……!\n#1;em;[...]"
1010405-15 = "1;현룡문 부원;04;조, 좋아. 어차피 일정이 바쁘니, 구태여 차에 연연할 필요는 애초에 없었겠지…….\n#1;stiff"
1010405-16 = "1;현룡문 부원;05;그 대신 현무상회의 민낯을 속속들이 까발려 줄 테니 말이지!\n#1;em;[!]\n#1;jump"
1010405-17 = "#st;[0,0];instant;1;"
1010405-18 = "#clearST"
1010405-19 = "3;레이죠;01\n1;현룡문 부원;05\n#1;dl\n#3;m3\n#1;h\n#3;h\n#wait;1000"
1010405-20 = "[ns] \"어…… 이거, 위험한 거 아냐. 레이죠……?\""
1010405-21 = "3;레이죠;02;트집입니다, 트집. \n#fontsize;50"
1010405-22 = "3;레이죠;05;어차피 무슨 소리를 해도, 말꼬리를 잡고 늘어질 게 뻔하니까요.\n#fontsize;50"
1010405-23 = "3;현룡문 부원;05;우선 개인위생관리 상태를 점검하겠다! 손을 내밀어 보도록!\n#3;em;[!]\n#3;jump"

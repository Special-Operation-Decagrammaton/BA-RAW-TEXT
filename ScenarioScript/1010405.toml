1010405-55 = "3;현룡문 부원;07;에잇! 아직이다! 현룡문의 감찰은 이 정도로 끝나지 않아!"
1010405-56 = "3;현룡문 부원;05;우선은…… 그렇지! 내가 지금 생각하고 있는 음식 메뉴를 맞혀 봐라!\n#3;em;[!]\n#3;jump"

1010405-31 = "3;현룡문 부원;02;요리 장갑도 준비되어 있고, 오염 분리도 이루어지고 있는 듯하고……. 칫.\n#3;m5"
1010405-32 = "3;현룡문 부원;05;맞아. 뒷문을 열어 두고 있다거나 하는 건 아니겠지!\n#3;m2\n#3;em;[!]"
1010405-33 = "3;현룡문 부원;05;덥다고 함부로 문을 열어 두면, 벌레가 들어온다거나 바깥의 좋지 않은 냄새가 따라 들어올 수도 있으니 말이야!"
1010405-34 = "#all;hide"

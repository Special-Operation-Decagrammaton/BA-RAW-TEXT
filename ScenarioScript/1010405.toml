[translation]
1010405-1 = "Enter the..."
1010405-2 = "Black Tortoise Promenade Main Restaurant"
1010405-4 = "What's with the Black Tortoise Promenade?! A Genryumon member personally comes all the way here for an inspection, and you don't even serve her tea?"
1010405-5 = "Or, don't tell me, you're trying to spring another trap on me, the esteemed inspector? I haven't forgotten about last time!"
1010405-6 = "You'll really face the consequences, if something like that happens again!"
1010405-9 = "...To begin, I would like to sincerely apologize for that unfortunate incident."
1010405-10 = "And of course we can serve you tea. But are you sure that's okay?"
1010405-11 = "What're you saying?"
1010405-12 = "If we boil the tea, we'll have to use the utensils that we prepared for the hygiene inspection."
1010405-13 = "Then you'll have to start the inspection from the top, or reschedule entirely."
1010405-14 = "...!"
1010405-15 = "F-Fine. I'm busy, so I don't have time for your stupid tea, anyway."
1010405-16 = "I'll reveal every last dirty secret the Black Tortoise Promenade is hiding!"
1010405-20 = "[ns] \"Uh... Isn't this bad, Reijo...?\""
1010405-21 = "They're just looking for problems. "
1010405-22 = "No matter what we say or do, the inspector is going to nitpick every little detail."
1010405-23 = "First, individual hygiene! Show me your hands!"
1010405-24 = "Here. Everyone, show your hands."
1010405-28 = "...Yes. Look to your heart's content."
1010405-30 = "...They're clean. And the nails all cleanly cut."
1010405-31 = "Cooking gloves are present, and contaminants are separated... Tsk."
1010405-32 = "Right! What about the back door? You're not leaving it open, are you?!"
1010405-33 = "If you're carelessly leaving it open to air out the heat, unsanitary air or even BUGS can come through!"
1010405-35 = "Naturally. We at the Black Tortoise Promenade have installed a state-of-the-art ventilation system to circumvent any such concerns."
1010405-36 = "If you activate the system, like so..."
1010405-41 = "Wh-Who told you to activate it here! My hair!"
1010405-42 = "Trust and confirmation are important parts of inspections."
1010405-43 = "...Fine. Next is facility and utensil hygiene!"
1010405-45 = "Expiration dates of ingredients...!"
1010405-47 = "Managing cross contamination...!"
1010405-49 = "U-Unhygienic behaviors, like cigarettes or alcohol...!"
1010405-50 = "[s] \"I mean, I don't think students are really doing that...\""
1010405-52 = "(Why...is everything up-to-code?!)"
1010405-53 = "Are you done with your inspection? This might be a little presumptuous of me..."
1010405-54 = "...but I don't think you're going to find any infractions."
1010405-55 = "Hmph! It's not over yet! Don't look down on Genryumon!"
1010405-56 = "For now... I know! Guess the menu item I'm thinking of right now!"
1010405-57 = "Excuse me?"
1010405-58 = "[s] \"That's unreasonable!!\""
1010405-59 = "You can't even manage that, and you call yourself a restaurant?!"
1010405-60 = "How can you satisfy your customers, heart and soul, if you can't anticipate their every want and need?"
1010405-61 = "..."
1010405-62 = "In addition! Why isn't the Genryumon emblem proudly displayed on the main doors of the restaurant?"
1010405-63 = "You're exposing your rebellious feelings towards Genryumon! That's exactly what it is!"
1010405-64 = "Upon my return, I will immediately report the Black Tortoise Promenade's traitorous intentions towards Genryumon! No, towards Shanhaijing itself!"
1010405-65 = "Please hear me out. This is Black Tortoise Promenade, so we naturally display our symbol—"
1010405-66 = "I don't want to hear your paltry excuses! My objective here is to determine whether the Black Tortoise Promenade proudly carries the responsibilities of the service industry!"
1010405-67 = "I must confirm if you have the will to uphold Shanhaijing's illustrious tradition and culture!"
1010405-68 = "Actually, wasn't this just supposed to be a hygiene inspection?"
1010405-69 = "That statement betrays your shortsightedness! This takes priority over hygiene!"
1010405-73 = "...What do I do here, Sensei?"
1010405-74 = "[s] \"Uh... R-right. It's kung fu!\""
1010405-75 = "K-Kung fu?"
1010405-76 = "[s] \"Just recall the lessons you've learned from kung fu!\""
1010405-81 = "(Kung fu lessons...)"
1010405-85 = "(I remember the teaching, \"Don't think, feel.\")"
1010405-86 = "(What am I feeling?)"
1010405-87 = "(Extreme injustice...and rage!)"
1010405-88 = "(But you can't solve problems with rage.)"
1010405-89 = "(Then what can I use to overcome rage?)"
1010405-90 = "(That's...even more rage!)"
1010405-92 = "I understand. You're right. How could an organization as terrible as the Black Tortoise Promenade be so audacious as to distribute food throughout Shanhaijing?"
1010405-93 = "[s] \"Reijo?!\""
1010405-94 = "H-Hmph! That's right! So you finally understand your position!"
1010405-95 = "Yes. That's why, from now on, we of the Black Tortoise Promenade..."
1010405-96 = "...will no longer deliver snacks to Genryumon."
1010405-97 = "Wh-What?!"
1010405-98 = "Specifically, snacks you can only find in Shanhaijing... Genryumon really like fruit jelly, injeolmi crackers, and chocolate cream cookies, right? I can think of a few more."
1010405-99 = "We will make sure they are never! No matter what! Ever! Distributed! Ever again!"
1010405-100 = "Wait! If...If you do that...!"
1010405-101 = "Why are you surprised? How can the Black Tortoise Promenade, that apparently doesn't uphold the \"esteemed tradition and culture\" of Shanhaijing and doesn't know how to properly serve their customers..."
1010405-102 = "...create and distribute such products? Wouldn't that be strange?"
1010405-103 = "Especially if you consider the results of today's inspection."
1010405-104 = "Right, Inspector?"
1010405-105 = "W-Wait! Hold on just a moment!!"
1010405-108 = "In the end, the inspector had to practically beg at Reijo's feet..."
1010405-110 = "It was pretty eventful, but we managed to get through the inspection, without too much incident."
1010405-111 = "The lessons you learn from kung fu really are useful, huh, Sensei?"
1010405-113 = "Reijo's smile was bright, and she looked so energetic and refreshed."
1010405-114 = "I really had no choice but to nod and agree."

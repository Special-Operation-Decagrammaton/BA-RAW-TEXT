1010405-25 = "#st;[0,0];instant;1;"
1010405-26 = "#clearST"
1010405-27 = "1;현무상회 부원;01\n5;현무상회 부원;01\n3;현무상회 부원;01\n#1;a\n#3;a\n#5;a\n#1;h\n#3;h\n#5;h\n#wait;1000"

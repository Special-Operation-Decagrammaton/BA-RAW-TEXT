[translation]
1010405-1 = "Enter the..."
1010405-2 = "สำนักงานใหญ่ ย่านการค้าเทพเต่าดำ"
1010405-4 = "ย่านการค้าเทพเต่าดำนี่อะไรกัน! ผู้ตรวจตราจากมังกรดำอุตส่าห์มาถึงที่นี่ทั้งที แต่ชาสักแก้วก็ไม่เอามา#nต้อนรับกันเหรอ?"
1010405-5 = "ครั้งนี้คงไม่ได้คิดจะสร้างปัญหาอื่นให้ผู้ตรวจตราจากมังกรดำอีกใช่มั้ย?"
1010405-6 = "ถ้าเกิดเรื่องแบบนั้นอีกละก็... ครั้งนี้ฉันจะทำให้ได้ลิ้มรสชาติที่แสบร้อนเลยละ!"
1010405-9 = "ก่อนอื่นฉันต้องขออภัยต่อเหตุการณ์ที่เคยเกิดในอดีตค่ะ"
1010405-10 = "ส่วนการเสิร์ฟชาให้ก็ไม่ใช่เรื่องใหญ่อะไร แต่คุณจะไม่เป็นไรใช่มั้ยคะ?"
1010405-11 = "หมายความว่ายังไง?"
1010405-12 = "ถ้าจะต้มชา เราก็ต้องใช้อุปกรณ์ชงชาที่ต้องใช้ในการประเมินด้านสุขอนามัยของวันนี้น่ะค่ะ"
1010405-13 = "และถ้าเป็นแบบนั้น คุณก็ต้องเริ่มตรวจใหม่ตั้งแต่แรก หรือไม่ก็ต้องเข้ามาตรวจใหม่ในวันอื่นค่ะ"
1010405-14 = "...!"
1010405-15 = "กะ... ก็ได้ ยังไงฉันก็งานยุ่งอยู่แล้ว ไม่มีเวลามาดื่มชาอยู่หรอก..."
1010405-16 = "แต่ฉันจะเปิดเผยโฉมหน้าที่แท้จริงของย่านการค้าเทพเต่าดำให้ทุกคนได้เห็นแทน!"
1010405-20 = "[ns] \"บะ... แบบนี้จะไม่แย่เหรอ เรย์โจว?\""
1010405-21 = "ทางนั้นก็แค่ดื้อด้านน่ะค่ะ "
1010405-22 = "ไม่ว่าจะพูดอะไร มังกรดำก็จะหยิบเรื่องอื่นมาหาเรื่องอยู่ดีค่ะ"
1010405-23 = "งั้นฉันจะตรวจสอบเรื่องสุขอนามัยส่วนบุคคลก่อน! ยื่นมือออกมา!"
1010405-24 = "นี่ค่ะ พวกเราทุกคนก็ให้ความร่วมมือด้วยนะคะ"
1010405-28 = "เข้าใจแล้วค่ะ... ตรวจให้เต็มที่เลยค่ะ"
1010405-30 = "สะอาดสะอ้านดีแฮะ... เล็บก็ตัดสั้นดี"
1010405-31 = "ถุงมือทำอาหารก็มีเตรียมไว้ แล้วก็มีการแยกสารปนเปื้อนด้วย... ชิ!"
1010405-32 = "อืม ไม่ใช่ว่าเปิดประตูหลังทิ้งไว้หรอกใช่มั้ย?"
1010405-33 = "หากเปิดประตูทิ้งไว้เพราะอากาศร้อน แมลงหรือกลิ่นเหม็นจากภายนอกก็อาจเข้ามาได้นะ!"
1010405-35 = "ย่านการค้าเทพเต่าดำของเราติดตั้งระบบหมุนเวียนอากาศไว้ในห้องครัวแต่ละห้องเพื่อป้องกันปัญหา#nนั้นแล้วค่ะ"
1010405-36 = "ถ้าเปิดใช้งานระบบแบบนี้ละก็..."
1010405-41 = "คะ... ใครบอกให้เปิดกันเล่า! ผมฉันยุ่งไปหมดแล้วนะ อุตส่าห์เซ็ตมาอย่างดี!"
1010405-42 = "การยืนยันและความน่าเชื่อถือเป็นเรื่องสำคัญในการตรวจนี่คะ"
1010405-43 = "ดีละ... งั้นต่อไปคือการตรวจอุปกรณ์และสิ่งอำนวยความสะดวกในครัว!"
1010405-45 = "วันหมดอายุของวัตถุดิบ...!"
1010405-47 = "การควบคุมมลภาวะ...!"
1010405-49 = "ขะ... ของที่ไม่ถูกสุขลักษณะ อย่างเช่นบุหรี่หรือเครื่องดื่มแอลกอฮอล์...!"
1010405-50 = "[s] \"ของแบบนั้นนักเรียนจะไปมีได้ยังไง...\""
1010405-52 = "(ทำไมกันนะ... ทำไมทุกอย่างปกติหมดเลย?!)"
1010405-53 = "ตรวจหมดแล้วหรือยังคะ? จะให้ฉันพูดจากปากตัวเองก็กระไรอยู่นะคะ"
1010405-54 = "แต่ว่าที่นี่ไม่มีอะไรที่เป็นปัญหาหรอกค่ะ"
1010405-55 = "ฮึ่ย! ยังหรอก! การตรวจเข้มของมังกรดำยังไม่จบแค่นี้!"
1010405-56 = "ต่อไปก็... ใช่! ทายให้ถูกว่าตอนนี้ฉันคิดถึงเมนูอาหารอะไรอยู่!"
1010405-57 = "คะ?"
1010405-58 = "[s] \"ดึงดันไปแล้วหรือเปล่า?!\""
1010405-59 = "ถ้าเรื่องแค่นั้นยังทำไม่ได้ แล้วจะต้อนรับลูกค้าได้ยังไง!"
1010405-60 = "ต้องคาดเดาล่วงหน้าให้ได้สิว่าลูกค้าต้องการอะไรและจะเลือกสั่งอะไร ถึงจะบริการและสร้างความ#nประทับใจให้ลูกค้าได้อย่างแท้จริง!"
1010405-61 = "..."
1010405-62 = "อีกอย่าง! ทำไมประตูหน้าร้านไม่มีสัญลักษณ์ของมังกรดำติดไว้ล่ะ?"
1010405-63 = "เป็นอย่างนี้สินะ? นี่คือการบอกว่ามีจิตใจที่ต่อต้านมังกรดำสินะ?"
1010405-64 = "ฉันจะรีบกลับไปรายงานว่าย่านการค้าเทพเต่าดำยังคงมีทัศนคติเชิงลบต่อมังกรดำและซานไห่จิง!"
1010405-65 = "ฟังนะคะ ที่นี่คือย่านการค้าเทพเต่าดำ และสัญลักษณ์ของพวกเรา..."
1010405-66 = "ฉันไม่อยากฟังคำแก้ตัวใดๆ! สิ่งสำคัญน่ะก็คือ ย่านการค้าเทพเต่าดำมีความตั้งใจที่จะให้บริการลูกค้า#nอย่างแท้จริงหรือไม่"
1010405-67 = "และนี่คือการตรวจสอบว่าย่านการค้าเทพเต่าดำมีเจตจำนงที่จะสืบสานวัฒนธรรมและประเพณีของ#nซานไห่จิงหรือไม่!"
1010405-68 = "ก่อนอื่นเลยนะคะ ที่มังกรดำมาย่านการค้าเทพเต่าดำในวันนี้น่ะ เป็นเพราะว่าจะมาตรวจสอบ#nเรื่องสุขอนามัยไม่ใช่เหรอคะ?"
1010405-69 = "นี่เธอยังไม่รู้อีกเหรอ? เรื่องพวกนั้นน่ะสำคัญกว่าสุขอนามัยนะ!"
1010405-73 = "คุณครู ถ้าเจอเรื่องแบบนี้ต้องทำยังไงเหรอคะ...?"
1010405-74 = "[s] \"อ่า... ชะ... ใช่แล้วละ ใช้กังฟูเลย!\""
1010405-75 = "กะ... กังฟูงั้นเหรอคะ?"
1010405-76 = "[s] \"ถึงเวลาใช้บทเรียนที่ได้มาจากกังฟูแล้วละ!\""
1010405-81 = "(บทเรียนจากกังฟู...)"
1010405-85 = "(มีคำสอนที่บอกว่า 'จงละทิ้งความคิด และสัมผัสด้วยจิตใจ')"
1010405-86 = "(ความรู้สึกที่ฉันมีตอนนี้คือ...)"
1010405-87 = "(ความรู้สึกอยุติธรรมและความโกรธ... แบบสุดขีด!)"
1010405-88 = "(แต่เพียงแค่ความโกรธ ก็ไม่อาจแก้ปัญหาได้)"
1010405-89 = "(ถ้าอย่างนั้น จะมีอะไรที่เหนือไปกว่าความโกรธ)"
1010405-90 = "(ใช่แล้ว นั่นก็คือ... ความโกรธที่มากขึ้น!)"
1010405-92 = "เข้าใจแล้วค่ะ อาหารที่ทำในย่านการค้าที่ยุ่งวุ่นวายแบบนี้ไม่ควรถูกจัดจำหน่ายในซานไห่จิงหรอกค่ะ"
1010405-93 = "[s] \"เรย์โจว?!\""
1010405-94 = "ฮะ... ฮึ่ม! อะไรกัน เพิ่งจะมารู้ตัวเหรอ?"
1010405-95 = "ก็ใช่สิคะ และเพราะอย่างนั้น จากนี้ไปย่านการค้าเทพเต่าดำของเรา..."
1010405-96 = "จะไม่ส่งของว่างหรือขนมใดๆ ให้มังกรดำทั้งนั้นค่ะ"
1010405-97 = "วะ... ว่าไงนะ?!?!"
1010405-98 = "โดยเฉพาะของว่างในซานไห่จิงที่เป็นที่นิยมในมังกรดำ... ทั้งเยลลี่ผลไม้ โมจิคลุกถั่ว คุกกี้ครีมช็อกโกแลต..."
1010405-99 = "ไม่ว่าจะเกิดเรื่องอะไรขึ้น! เราก็จะไม่ส่งไปเด็ดขาด! รู้ไว้เลยค่ะว่าจากนี้พวกคุณจะไม่ได้กินอีกแล้ว!"
1010405-100 = "เดี๋ยวก่อน! ถะ... ถ้าเป็นอย่างนั้นละก็...!"
1010405-101 = "ทำหน้าตกใจอะไรขนาดนั้นคะ? ก็ย่านการค้าเทพเต่าดำในความคิดของคุณไม่มีทั้งเจตจำนงที่จะ#nสืบสานวัฒนธรรมและประเพณีของซานไห่จิง และไม่มีความตั้งใจที่จะให้บริการลูกค้าอย่างแท้จริงด้วย"
1010405-102 = "ถ้าย่านการค้าแบบนั้นส่งสินค้าออกไปตามอำเภอใจ มันจะไม่แปลกเหรอคะ?"
1010405-103 = "ยิ่งผลการตรวจของวันนี้เป็นอย่างนี้แล้วด้วย"
1010405-104 = "ฉันพูดถูกมั้ยคะ คุณผู้ตรวจตรา?"
1010405-105 = "ดะ... เดี๋ยวสิ! รอเดี๋ยวก่อน!!!"
1010405-108 = "(สุดท้ายผู้ตรวจตราก็ต้องขอโทษขอโพยเรย์โจวยกใหญ่...)"
1010405-110 = "ถึงจะเกิดเรื่องมากมาย แต่การตรวจตราในวันนี้ก็ลุล่วงไปได้นะคะ"
1010405-111 = "บทเรียนของกังฟูมีประโยชน์จริงๆ ด้วยค่ะ! ใช่มั้ยคะคุณครู?"
1010405-113 = "(เรย์โจวพูดอย่างกระฉับกระเฉงด้วยรอยยิ้มที่สดใส)"
1010405-114 = "(สิ่งที่คุณครูทำได้มีแต่การถอนหายใจเบาๆ และพยักหน้าให้เท่านั้น)"

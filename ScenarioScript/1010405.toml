[translation]
1010405-1 = "Enter the……"
1010405-2 = "玄武商會總店"
1010405-4 = "什麼意思啊玄武商會！#n玄龍門的監察官親自來視察，居然連一杯茶也不招待嗎？"
1010405-5 = "該不會是打算像之前一樣陷害玄龍門的監察官吧？"
1010405-6 = "要是再發生類似的事情……就別怪我狠狠教訓你們一頓了！"
1010405-9 = "……首先，請容許我為之前的醜事至上深深的歉意。"
1010405-10 = "要招待您喝茶倒不成問題，但這麼做真的好嗎？"
1010405-11 = "這話什麼意思？"
1010405-12 = "若要為您泡茶的話，就必須使用到已完成衛生管理評鑑的工具。"
1010405-13 = "如此一來，您不就得重新評鑑，或者擇日再前來進行了嗎？"
1010405-14 = "……！"
1010405-15 = "算，算了。#n反正我行程很忙，喝不喝茶其實也無所謂……"
1010405-16 = "但是，我一定會徹底揭開玄武商會的真面目！"
1010405-20 = "[ns]「這，這樣不會太危險嗎，令女……？」"
1010405-21 = "他根本是在找碴。"
1010405-22 = "不管我們怎麼回答，他都會抓著語病窮追猛打。"
1010405-23 = "首先要檢查的是個人的衛生管理！所有人把手伸出來！"
1010405-24 = "請看吧。各位也都跟著我做。"
1010405-28 = "……知道了，儘管檢查吧。"
1010405-30 = "……手洗的很乾淨嘛。指甲也有確實修剪。"
1010405-31 = "料理手套沒有問題，也有做好汙染分離……呿。"
1010405-32 = "對了，後門應該不是隨時開著的吧！"
1010405-33 = "要是因為太熱就隨便把門打開，蟲子或外部的臭味可能會跑進來的！"
1010405-35 = "為了防範這個問題，我們玄武商會的每間廚房都安裝了足夠規模的抽風系統。"
1010405-36 = "只要像這樣啟動系統……"
1010405-41 = "誰，誰叫你擅自啟動了！害我的頭髮都亂掉了啦！"
1010405-42 = "在視察過程中，信賴和確認都是很重要的吧。"
1010405-43 = "……算了。#n接下來是廚房用具和設施的清潔管理！"
1010405-45 = "食材的保存期限……！"
1010405-47 = "交叉汙染管理……！"
1010405-49 = "香，香菸或酒類之類的不衛生……！"
1010405-50 = "[s]「不是，學生怎麼可能抽菸喝酒呢……」"
1010405-52 = "（怎麼可能……竟然全部都合格！？）"
1010405-53 = "都確認好了嗎？#n雖然自己這麼說有點不好意思……"
1010405-54 = "但我想應該沒有太大的問題才對。"
1010405-55 = "不！還早得很呢！玄龍門的視察可不會就這樣結束！"
1010405-56 = "首先……對了！猜猜我現在心裡想的料理是什麼吧！"
1010405-57 = "什麼？"
1010405-58 = "[s]「這也太強人所難了吧！？」"
1010405-59 = "連這個也猜不到，還談什麼待客之道啊！"
1010405-60 = "事先預測出客人的喜好和選擇，才能真正打動客人的心！"
1010405-61 = "……"
1010405-62 = "還有！餐廳的大門怎麼沒有設置玄龍門的紋樣呢？"
1010405-63 = "這是什麼意思？是想藉此表達對玄龍門的反抗嗎？"
1010405-64 = "待會回去之後就報告玄武商會一直對玄龍門，甚至是山海經有反逆之心吧！"
1010405-65 = "……請聽我解釋。#n這裡是玄武商會的商店街，而那只是我們的象徵──"
1010405-66 = "我不想聽你辯解！#n重點是玄武商會到底有沒有想真誠接待客人的決心！"
1010405-67 = "以及是否有延續山海經傳統和文化的意志！"
1010405-68 = "今天玄龍門來玄武商會的目的，不是為了視察衛生情況嗎？"
1010405-69 = "你們還搞不清楚狀況是不是啊！這比什麼衛生重要多了！"
1010405-73 = "老師，這種時候該怎麼辦？"
1010405-74 = "[s]「這，這種時候……就用功夫吧！」"
1010405-75 = "功，功夫是嗎？"
1010405-76 = "[s]「想一想你從功夫中學會的道理！」"
1010405-81 = "（功夫的道理……）"
1010405-85 = "（記得有句話說「不必試著理解，而是去感受」）"
1010405-86 = "（現在我所感受到的情緒，那就是……）"
1010405-87 = "（極度的委屈……以及憤怒！）"
1010405-88 = "（但是憤怒並不能解決問題）"
1010405-89 = "（既然如此，該如何克服憤怒呢？）"
1010405-90 = "（那就必須……依靠更強烈的憤怒！）"
1010405-92 = "我明白了。#n像我們這種亂七八糟的商會製造的食物，確實不應該提供給山海經。"
1010405-93 = "[s]「令女！？」"
1010405-94 = "哼，哼！怎麼？現在總算明白了嗎？"
1010405-95 = "是的。因此今後我們玄武商會……"
1010405-96 = "將不再向玄龍門提供任何零嘴。"
1010405-97 = "什，什麼！？！？"
1010405-98 = "尤其是在山海經……#n在玄龍門也暗自流行的水果果凍、黃豆粉年糕、巧克力奶油餅乾等等……"
1010405-99 = "絕對！無論如何！都不會再提供了！"
1010405-100 = "等等！那樣……那樣的話……！"
1010405-101 = "您為何如此慌張？#n不願守護山海經的傳統文化，又缺乏真誠待客決心的玄武商會……"
1010405-102 = "若是擅自提供那些商品，您不覺得簡直無法無天嗎？"
1010405-103 = "如果將今天的視察結果積極納入考量，就更是如此了。"
1010405-104 = "我說的沒錯吧？監察官？"
1010405-105 = "等，等一下！我說了等一下！！！"
1010405-108 = "（後來監察官在令女面前不斷求饒，差點沒跪了下來……）"
1010405-110 = "雖然發生了很多事，幸好總算是順利度過視察日了。"
1010405-111 = "功夫的道理果然很有幫助！#n對吧，老師？"
1010405-113 = "（面對活力滿滿、面帶笑容的令女……）"
1010405-114 = "（除了輕聲嘆氣與點頭之外……實在想不出該如何回應）"

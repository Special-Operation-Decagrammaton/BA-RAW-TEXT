[translation]
2002402-1 = "#title;오후의 티타임"
2002402-2 = "#na;(나기사와의 약속 당일. 따가운 볕이 쏟아지는 회랑을 지나 티파티의 다과회실에 도착했다.)"
2002402-3 = "#all;hide"
2002402-4 = "#place;트리니티 다과회실"
2002402-5 = "3;나기사;01;어서 오십시오, 선생님. 기다리고 있었습니다.\n#3;a\n#3;em;[반응]"
2002402-6 = "3;나기사;02;마침 애프터눈 티의 준비가 끝난 참이었습니다만……."
2002402-7 = "3;나기사;04;……엄청난 땀이네요.\n#3;em;…"
2002402-8 = "3;나기사;04;혹시 다과회실까지 뛰어서 오신 건가요?"
2002402-9 = "[s] \"나기사와의 약속에 늦을 것 같아서…….\""
2002402-10 = "3;나기사;15;그렇다고는 해도 이렇게까지 무리하실 필요는 없었는데…….\n#3;em;[땀]"
2002402-11 = "3;나기사;04;하지만 곤란하네요. 지금 준비된 차는 더위를 식히는 데 도움이 되지 않는 뜨거운 홍차뿐이라."
2002402-12 = "3;나기사;02;잠시만 기다려주십시오. 학생을 불러 시원한 아이스티를 내오도록 준비하겠습니다."
2002402-13 = "[s] \"괜찮아. 마침 마시던 것이 있어.\""
2002402-14 = "#wait;1500"
2002402-15 = "[ns] 가방에서 페트병 홍차를 꺼낸다."
2002402-16 = "3;나기사;01;그건…… 무슨 음료수인가요?\n#3;em;[?]"
2002402-17 = "3;나기사;04;……네? 홍차요? 레디메이드 상태로 판매되는?"
2002402-18 = "3;나기사;01;신기하네요. 저로서는 처음 보는 브랜드입니다만……."
2002402-19 = "#st;[0,0];instant;1;"
2002402-20 = "#clearST"
2002402-21 = "#wait;1000"
2002402-22 = "3;나기사;11\n#3;em;…\n#wait;2500"
2002402-23 = "3;나기사;02;……선생님, 괜찮으시다면 혹시 그 홍차를 조금 나누어 주실 수는 없으실까요?\n#3;em;[반응]"
2002402-24 = "3;나기사;01;부끄러운 일입니다만, 저는 그동안 키보토스에 존재하는 모든 홍차 브랜드를 알고 있다 자부하고 있었답니다."
2002402-25 = "3;나기사;99;<렙톤>과 같은 대중적인 가향 홍차 브랜드부터, 트리니티에서도 쉽게 구하기 어려운 <트와일라잇> 사의 고급 브랜드까지."
2002402-26 = "3;나기사;01;어지간한 홍차는 다 마셔봤다고 생각했는데…… 선생님이 가져온 홍차 브랜드는 처음 보는 걸 보면 아직도 제 배움이 모자란 모양이네요."
2002402-27 = "3;나기사;12;선생님께서 그 차를 조금 나누어 주신다면, 제 배움에 큰 도움이 될 것 같습니다.\n#3;em;[반짝]"
2002402-28 = "[ns] 나기사의 찻잔에 홍차를 부어준다."
2002402-29 = "#wait;2000"
2002402-30 = "3;나기사;03;감사합니다, 선생님.\n#3;em;[음표]"
2002402-31 = "3;나기사;99;그럼 어디 한 입……."
2002402-32 = "#st;[0,0];instant;1;"
2002402-33 = "#clearST"
2002402-34 = "#wait;1500"
2002402-35 = "3;나기사;99;흐음…….\n#3;em;…"
2002402-36 = "3;나기사;99"
2002402-37 = "#wait;1000"
2002402-38 = "3;나기사;04;(……달아!)\n#3;closeup\n#3;em;[!]"
2002402-39 = "3;나기사;15;(뭔가요, 이 홍차는? 뇌를 찌르는 듯한 단맛 때문에 놀라서 홍차를 뿜어 버릴 뻔했잖아요!)\n#3;closeup"
2002402-40 = "3;나기사;15;(물론 러시안 티처럼 단맛을 가미하는 홍차가 없는 건 아니지만, 이건 설탕이 대놓고 씹힐 정도로 달착지근하니……)\n#3;closeup"
2002402-41 = "3;나기사;07;(게다가 인위적인 시트러스 계열의 향이 너무 강해서, 홍차의 풍미는 조금도 느껴지질 않아요!)\n#3;closeup\n#3;em;[속상함]"
2002402-42 = "3;나기사;04;(마음 같아서는 빨리 제대로 된 차를 마셔 입을 씻어내고 싶지만……)\n#3;closeup"
2002402-43 = "3;나기사;99;(그랬다가는 차를 나누어주신 선생님께도 실례일 테니, 지금은 참도록 하죠…….)\n#3;closeup"
2002402-44 = "3;나기사;99"
2002402-45 = "3;나기사;03;아, 하하하…… 꽤, 꽤, 꽤나 인상적인 맛이네요.\n#3;em;[땀]"
2002402-46 = "3;나기사;01;기호가 갈릴 수 있는 홍차의 향을 최소한으로 줄이고, 단맛을 강조한 점이 꽤나…… 대중적이라고 할까, 새로웠습니다……."
2002402-47 = "3;나기사;99;이런 맛이라면 평소에 차를 좋아하지 않는 밀레니엄이나 게헨나의 학생들도 부담 없이 홍차를 즐길 수 있겠어요. 후, 후후…….\n#3;stiff"
2002402-48 = "[s1] \"응. 이 페트병 홍차, 맛있지?\"\n[s2] \"나기사라면 좋아해줄 줄 알았어.\""
2002402-49 = "3;나기사;01;네…… 제게도 새로운 경험이 되었습니다.\n#3;em;…"
2002402-50 = "3;나기사;01;네…… 제게도 새로운 경험이 되었습니다.\n#3;em;…"
2002402-51 = "3;나기사;16;선생님께 이런 최악…… 아니, 극상의 홍차를 대접받게 될 줄이야."
2002402-52 = "3;나기사;03;오늘 약속을 잡길 잘했네요. 하하, 하하하…….\n#3;em;[땀]"
2002402-53 = "[s] \"그럴 줄 알고 다른 종류의 홍차도 가져왔어!\""
2002402-54 = "3;나기사;04;네, 네? 다른 종류의 홍차요?\n#3;em;[?!]\n#3;shake"
2002402-55 = "3;나기사;04;그 가방 안에 든 페트병…… 전부?"
2002402-56 = "3;나기사;16;하, 하지만 이 이상의 페트병 홍차를 마시는 건 조금…….\n#3;em;…"
2002402-57 = "[s3] \"나기사가 준비한 홍차와 번갈아 마셔보자.\"\n[s4] \"어떤 차이가 있을지 기대되네.\""
2002402-58 = "3;나기사;04;그, 그렇게 말씀하신다면…….\n#3;em;[!]"
2002402-59 = "3;나기사;04;그, 그렇게 말씀하신다면…….\n#3;em;[!]"
2002402-60 = "3;나기사;03;그럼…… 한 잔 더 부탁드려도 될까요?\n#3;stiff"
2002402-61 = "#all;hide"
2002402-62 = "#na;(이후 나기사는 페트병 홍차를 5잔 가까이 마신 뒤, 컨디션이 나빠졌다며 황급히 도망쳐 버렸다…….)"

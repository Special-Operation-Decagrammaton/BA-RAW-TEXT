[translation]
2002402-1 = "午後的品茶時間"
2002402-2 = "（和渚約定的當天，在熱的令人喘不過氣的陽光下，抵達了茶會的露臺）"
2002402-4 = "三一．露臺"
2002402-5 = "恭候多時了，老師。"
2002402-6 = "正巧下午茶的準備也已經完成……"
2002402-7 = "……您還是先擦擦汗比較好呢。"
2002402-8 = "雖然覺得不太可能，難道您是跑著過來的嗎？"
2002402-9 = "[s]「因為和渚約好的時間就快到了……」"
2002402-10 = "很高興您能這麼說，不過您不需要這麼勉強自己的。"
2002402-11 = "……以這個狀態來看，冰涼的飲料應該會比較適合吧？"
2002402-12 = "請您稍等，我立刻為您準備冰茶。"
2002402-13 = "[s]「謝謝。啊，我剛才正好有買冰的飲料過來……」"
2002402-15 = "[ns] 從背包拿出瓶裝紅茶"
2002402-16 = "……？"
2002402-17 = "啊，那也是紅茶呢……以能夠直接飲用的狀態……？"
2002402-18 = "還有這種東西呢……這個品牌是我第一次看見……"
2002402-23 = "……老師。您不介意的話，那個紅茶能分給我一些嗎？"
2002402-24 = "說來慚愧，我一直認為自己對奇普托斯幾乎所有的紅茶都有所了解。"
2002402-25 = "從「列頓」這類的大眾品牌，到連三一都很難取得的「唐凌」公司的高級茶葉……"
2002402-26 = "然而，老師帶來的這個品牌我先前從未見過。#n看來我的努力還不足夠呢。"
2002402-27 = "為了將來的學習，能讓我稍微品嘗一下味道嗎？"
2002402-28 = "[ns] 「嗯，當然沒問題。」"
2002402-30 = "非常謝謝您，老師。"
2002402-31 = "那麼……"
2002402-35 = "……"
2002402-38 = "（……好甜！？）"
2002402-39 = "（這，這個紅茶是怎麼回事！？這也太甜了，差點噎到……！）"
2002402-40 = "（我雖然知道有在紅茶裡加入果醬的喝法……#n　但這又不太一樣，簡直像是砂糖直接留在紅茶裡的強烈甜味……）"
2002402-41 = "（再加上這股過於強烈的人工香精的味道……絲毫感受不到紅茶的風味……！？）"
2002402-42 = "（口中全都是甜味……雖然很想趕快漱口……）"
2002402-43 = "（不過這樣對特地把紅茶分給我的老師就太失禮了……）"
2002402-45 = "感，感謝您的招待。#n怎麼說呢……是相當有個性的味道呢。"
2002402-46 = "把各有所好的「紅茶香氣」降低到只有些許風味的程度。#n作為代替，特別強調了「甜味」，該如何形容比較適合……#n較為大眾，還是該說較為新穎呢……"
2002402-47 = "這，這樣的口味，就算是平常不愛喝茶的千年或格黑娜的學生們，#n應該也能輕鬆享受紅茶吧。呵，呵呵……"
2002402-48 = "[s1]「嗯。雖然只是瓶裝紅茶，不過很好喝對吧？」\n[s2]「真不愧是渚，涉獵範圍真廣呢。」"
2002402-49 = "對，對我來說，這也是一次非常不錯的經驗。"
2002402-50 = "對，對我來說，這也是一次非常不錯的經驗。"
2002402-51 = "居然能品嘗到如此衝擊……不，這麼特別的紅茶。今天真是美妙的一天呢。"
2002402-52 = "啊哈哈……那麼轉換一下心情，#n請您享用我準備的下午茶──"
2002402-53 = "[s]「我還帶了各種瓶裝紅茶哦，要不要喝喝看？」"
2002402-54 = "……咦？"
2002402-55 = "為，為什麼您會帶這麼多呢……？咦，還有？"
2002402-56 = "再，再喝下去的話，那個……"
2002402-57 = "[s3]「渚準備的紅茶我也會好好享用的哦。」\n[s4]「種類這麼多真難抉擇呢。」"
2002402-58 = "是，是呢……"
2002402-59 = "是，是呢……"
2002402-60 = "那，那麼……我就收下這瓶有標籤的紅茶了。"
2002402-62 = "（也許是喝了太多紅茶的關係，渚的臉色變得不太好，因此這天就提早結束了）"

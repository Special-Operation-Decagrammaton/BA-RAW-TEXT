[translation]
2002402-1 = "Afternoon Tea Time"
2002402-2 = "To make it to my meeting with Nagisa in the Tea Party Room, I had to walk through what felt like endless hot, sun-drenched corridors."
2002402-4 = "Trinity Tea Party Room"
2002402-5 = "Welcome, Sensei. Thank you for taking the time to meet with me."
2002402-6 = "You're very punctual. I just finished preparing our afternoon tea."
2002402-7 = "...That is...quite a bit of sweat, though."
2002402-8 = "Did you run all the way here?"
2002402-9 = "[s] \"I didn't want to be late!\""
2002402-10 = "Still, there's no need to overdo it."
2002402-11 = "And I find myself with a conundrum, as well. The only tea I have ready is hot black tea, which certainly will not help you cool down."
2002402-12 = "Please give me one moment. I will call a student to fetch some iced tea."
2002402-13 = "[s] \"It's all right. I have a drink with me.\""
2002402-15 = "[ns] Take out a bottle of black tea."
2002402-16 = "What...kind of drink is that?"
2002402-17 = "Oh, it's tea? Black tea? The kind that's sold already brewed, I see..."
2002402-18 = "That's interesting. I've never sampled this brand before."
2002402-23 = "...Sensei, if you can spare any, could I try some of your tea?"
2002402-24 = "You see, I take pride in knowing every single black tea brand in Kivotos."
2002402-25 = "Every one, from popular flavored black tea brands like Lepton, to high-end brands that are difficult to get in Trinity, like Brinings of Kivotos."
2002402-26 = "And I thought I'd tried every one, but that brand is new to me. So it seems I still have more to learn."
2002402-27 = "So, in the interest of continuing my studies, would you share some of your tea?"
2002402-28 = "[ns] Pour some tea into Nagisa's teacup."
2002402-30 = "Thank you, Sensei."
2002402-31 = "And now, I'll take a sip."
2002402-35 = "Hm..."
2002402-38 = "(...It's so sweet!)"
2002402-39 = "(What is this? It's so sweet it makes my teeth hurt! I nearly spit it out!)"
2002402-40 = "(Of course, there are many sweet black teas. I quite enjoy Russian tea... But this one is so sweet it's like drinking sugar water.)"
2002402-41 = "(And the artificial citrus is so overpowering that you can't even taste the tea!)"
2002402-42 = "(I really, truly wish I had a proper cup of tea to wash this down...)"
2002402-43 = "(But that would be unforgivably rude, after Sensei shared their tea with me. I've just got to keep drinking...)"
2002402-45 = "Hah...haha...it's got a pretty...pretty impressive taste."
2002402-46 = "The flavor of black tea can be divisive, so it's been minimized and an emphasis was put on sweetness instead. This certainly is a new, modern taste..."
2002402-47 = "It's clearly been designed so even students from Millennium and Gehenna who don't usually like tea can enjoy it. Hee...hee..."
2002402-48 = "[s1] \"Yup. It's delicious, right?\"\n[s2] \"I knew you would enjoy it, Nagisa.\""
2002402-49 = "Yes...it certainly was a unique experience."
2002402-50 = "Yes...it certainly was a unique experience."
2002402-51 = "I didn't think I'd be treated to such an, um, such an interesting black tea today!"
2002402-52 = "I'm quite glad you agreed to meet with me. Haha...hahaha..."
2002402-53 = "[s] \"I knew you'd say that, so I brought another kind!\""
2002402-54 = "What? Another bottled black tea?"
2002402-55 = "Oh, and it's...quite a large bottle, I see."
2002402-56 = "Hm, don't you think drinking more bottled black tea than this could be..."
2002402-57 = "[s3] \"Let's alternate sips of this and the tea you brewed.\"\n[s4] \"It will be educational to compare them, don't you think?\""
2002402-58 = "Well, when you put it that way..."
2002402-59 = "Well, when you put it that way..."
2002402-60 = "I suppose... Pour me another cup, if you please."
2002402-62 = "Nagisa drank almost five cups of bottled black tea before fleeing, claiming a stomachache."

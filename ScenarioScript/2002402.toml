[translation]
2002402-1 = "เวลาน้ำชายามบ่าย"
2002402-2 = "(คุณครูผ่านทางเดินที่มีแสงแดดจ้า เพื่อไปหานางิสะที่ห้องชงชาของสภาน้ำชาตามนัด)"
2002402-4 = "ห้องชงชาทรีนิตี้"
2002402-5 = "ยินดีต้อนรับค่ะ คุณครู ฉันกำลังรออยู่เลยค่ะ"
2002402-6 = "และฉันก็เพิ่งเตรียมชายามบ่ายเสร็จพอดีด้วยค่ะ..."
2002402-7 = "...เหงื่อท่วมมาเลยนะคะเนี่ย"
2002402-8 = "ไม่ได้วิ่งมาถึงที่นี่ใช่มั้ยคะ?"
2002402-9 = "[s] \"ครูกลัวว่าจะมาสายน่ะ...\""
2002402-10 = "แต่ถึงอย่างนั้นก็ไม่ควรวิ่งหอบมาขนาดนี้สิคะ..."
2002402-11 = "แต่ทำยังไงดีล่ะคะ ชาที่ฉันเตรียมไว้เป็นชาแดงร้อนที่ไม่ได้ช่วยให้คุณครูคลายร้อนเลยสักนิด"
2002402-12 = "ช่วยรอสักครู่นะคะ ฉันจะเตรียมชาเย็นๆ ให้ค่ะ"
2002402-13 = "[s] \"ไม่เป็นไร ครูมีเครื่องดื่มมาด้วยอยู่แล้ว\""
2002402-15 = "[ns] หยิบขวดชาแดงออกมาจากกระเป๋า"
2002402-16 = "นั่นมัน... เครื่องดื่มอะไรเหรอคะ?"
2002402-17 = "...คะ? ชาแดงเหรอคะ? ขายเป็นขวดพร้อมทานเลยเหรอคะ?"
2002402-18 = "แปลกดีนะคะเนี่ย ฉันไม่เคยเห็นชาแดงยี่ห้อนั้นมาก่อนเลยค่ะ..."
2002402-23 = "...คุณครูคะ ถ้าไม่ว่าอะไร ขอฉันชิมชาแดงนั่นด้วยคนได้มั้ยคะ?"
2002402-24 = "น่าอายที่ฉันพูดแบบนี้ แต่ที่ผ่านมาฉันรู้จักชาแดงทุกยี่ห้อในคิโวทอสเลยค่ะ"
2002402-25 = "ตั้งแต่ <ลิปตอน> ยี่ห้อที่ได้รับความนิยมจากคอชาทั่วไป ไปจนถึง <ทไวไลท์> ยี่ห้อหรูที่หาซื้อได้#nยากในทรีนิตี้"
2002402-26 = "ฉันคิดว่าตัวเองดื่มชาแดงที่มีมาหมดแล้วซะอีก... แต่ชาแดงที่คุณครูเอามาเป็นยี่ห้อที่ฉันเพิ่งเคยเห็น#nเป็นครั้งแรกเลยค่ะ สงสัยฉันจะยังรู้จักชาแดงไม่ครอบคลุมพอนะคะ"
2002402-27 = "ถ้าคุณครูช่วยแบ่งชาให้ฉันชิม ก็น่าจะเป็นประโยชน์ต่อการเรียนรู้เกี่ยวกับชาแดงของฉันนะคะ"
2002402-28 = "[ns] เทชาแดงใส่แก้วชาของนางิสะ"
2002402-30 = "ขอบคุณนะคะคุณครู"
2002402-31 = "ถ้างั้นฉันขอชิมหน่อย..."
2002402-35 = "ฮืม..."
2002402-38 = "(...หวานจัง!)"
2002402-39 = "(อะไรเนี่ย ชาแดงนี่มัน? หวานขึ้นสมองอะไรแบบนี้ ตกใจจนแทบจะพ่นชาออกมาเลยค่ะ!)"
2002402-40 = "(ถึงชาที่รสหวานนำเหมือนชารัสเซียก็มีส่วนผสมของชาแดงอยู่เหมือนกัน แต่ชานี้มันหวานจนเกือบจะ#nต้องตัดขาเลย......)"
2002402-41 = "(แถมกลิ่นซิตรัสเทียมยังแรงมากเสียจนไม่รู้สึกถึงความเป็นชาแดงเลยด้วย!)"
2002402-42 = "(ใจจริงก็อยากดื่มชาดีๆ เพื่อล้างปากเดี๋ยวนี้เลย...)"
2002402-43 = "(แต่ถ้าทำอย่างนั้นคุณครูก็คงเสียใจ งั้นคงต้องอดทนดื่มไปให้หมด...)"
2002402-45 = "อ่า แหะๆๆๆ ปะ... ปะ... เป็นรสชาติที่น่าประทับใจมากเลยนะคะ"
2002402-46 = "ลดกลิ่นของชาแดงให้เหลือน้อยที่สุด แล้วเพิ่มความหวานเข้าไปแทน... ต้องบอกว่านี่เป็นชาแดงแนว#nใหม่หรือเปล่านะคะ..."
2002402-47 = "ถ้าเป็นรสชาติแบบนี้ นักเรียนมิลเลเนียมหรือเกเฮนน่าที่ไม่ชอบดื่มชาก็น่าจะดื่มได้สบายๆ เลยละค่ะ ฮุฮุ... ฮุ......"
2002402-48 = "[s1] \"อื้ม ชาแดงแบบขวดก็อร่อยใช่มั้ยล่ะ?\"\n[s2] \"ครูคิดไว้แล้วว่านางิสะต้องชอบ\""
2002402-49 = "ค่ะ... เปิดโลกใหม่ของฉันเลยละค่ะ"
2002402-50 = "ค่ะ... เปิดโลกใหม่ของฉันเลยละค่ะ"
2002402-51 = "ไม่คิดเลยนะคะว่าจะได้ดื่มชายอดแย่ เอ๊ย... ยอดเยี่ยมแบบนี้จากคุณครูค่ะ"
2002402-52 = "ดีจังเลยค่ะที่ฉันนัดคุณครูวันนี้ ฮ่าฮ่า ฮ่าฮ่าฮ่า..."
2002402-53 = "[s] \"ครูรู้ว่านางิสะจะต้องถูกใจ ก็เลยเอาชาแดงแบบอื่นๆ มาด้วยนะ!\""
2002402-54 = "คะ? คะ? ชาแดงแบบอื่นเหรอคะ?"
2002402-55 = "ขวดที่อยู่ในกระเป๋า... ทั้งหมด?"
2002402-56 = "ตะ...แต่ว่า ฉันคงดื่มชาแดงบรรจุขวดแบบนี้อีกไม่ได้..."
2002402-57 = "[s3] \"สลับกันดื่มกับชาแดงที่นางิสะเตรียมมาดีมั้ย?\"\n[s4] \"อยากรู้จังว่าจะเป็นชาอะไรบ้าง\""
2002402-58 = "ถะ...ถ้าคุณครูว่าอย่างนั้น..."
2002402-59 = "ถะ...ถ้าคุณครูว่าอย่างนั้น..."
2002402-60 = "ถ้างั้นก็... ช่วยรินน้ำชาให้ฉันอีกสักแก้วด้วยได้มั้ยคะ?"
2002402-62 = "(นางิสะก็ดื่มชาแบบขวดไปเกือบ 5 แก้ว จนต้องอ้างว่ารู้สึกไม่สบายและหนีออกมา...)"

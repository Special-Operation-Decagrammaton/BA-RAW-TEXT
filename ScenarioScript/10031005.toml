[translation]
10031005-1 = "บทเริ่มต้น;เผชิญหน้า"
10031005-2 = "หึหึ... หึหึหึ"
10031005-4 = "สำนักงานแพนเดโมเนียม โซไซตี้"
10031005-6 = "หึหึหึหึ หึหึหึหึ..."
10031005-10 = "หึหึหึหึ! ยินดีต้อนรับครูจากชาเล่ต์! มาหาพวกเราชาวแพนเดโมเนียม โซไซตี้สินะ!"
10031005-11 = "[s] \"อื้ม มีคนบอกว่า <ถึงเวลาแล้ว เราจะรออยู่ที่แพนเดโมเนียม โซไซตี้> น่ะ\""
10031005-15 = "[ns] \"แต่ที่บอกว่าถึงเวลาแล้ว หมายถึงอะไรเหรอ...\""
10031005-16 = "หึหึหึ ก็ได้ เราเข้าใจดี"
10031005-17 = "หลังจากเราติดต่อไป ครูก็คงจะครุ่นคิดอยู่สักพักสินะ"
10031005-18 = "คงจะคิดว่าในที่สุดวันนี้ก็มาถึงแล้วสินะ หรือไม่ก็คงคิดว่าในข้อความผิวเผินที่เห็นใน MOMOTALK จะมีความหมายอื่นแฝงอยู่ด้วยหรือเปล่า และจะมีความในใจอะไรที่เราคิดไม่ถึงหรือเปล่านะ...?"
10031005-19 = "ถ้างั้นก็ยิ่งต้องคิดพิจารณาให้ถี่ถ้วนก่อนจะเข้าไปหาแพนเดโมเนียม โซไซตี้หรือเปล่า? อะไรทำนองนี้น่ะ"
10031005-20 = "[s] \"ก็ไม่นะ ไม่ได้คิดอะไรแบบนั้นเลย...\""
10031005-21 = "เรารู้ ก็ไม่แปลกหรอก เรื่องนั้นน่ะท่านมาโคโตะผู้นี้เข้าใจดีเลยละ!"
10031005-22 = "เราเข้าใจดีว่าในฐานะหัวหน้าของกลุ่มตั้งมากมายขนาดนั้น โดยเฉพาะอย่างยิ่งในฐานะคนที่แบกชื่อ#nชาเล่ต์ไว้บนบ่าแล้ว...! ย่อมต้องรอบคอบเป็นธรรมดา"
10031005-23 = "หึหึหึหึ! ต้องบอกว่าสอบผ่านเลยละ!"
10031005-24 = "ผลพวงของการพบกันของเราในวันนี้จะทั้งช็อก ทั้งดราม่าแบบไม่ทันให้ตั้งตัวกันเลย!"
10031005-25 = "[s3] \"เอ่อ... ขอบใจนะ...?\"\n[s4] \"มาโคโตะ... ครูไม่เข้าใจเลยว่าหมายถึงอะไร...\""
10031005-28 = "นั่นน่ะสิ! ในเมื่อมาถึงที่นี่แล้ว เราก็ไม่มีอะไรจะปิดบัง!"
10031005-29 = "ที่เราเรียกครูมาที่นี่ในวันนี้... ก็เพื่อจะฟังคำตอบในสิ่งที่เสนอไปคราวก่อน!"
10031005-30 = "หึหึหึ! การชักชวนที่น่าดึงดูดของเราจะนำพาคำตอบแบบใดมาให้กันนะ...!"
10031005-31 = "รุ่นพี่มาโคโตะ~ ขออิบูกิขี่หลังหน่อย~"
10031005-32 = "อื้อ ได้สิ อิบูกิ รอเดี๋ยวนะ"
10031005-39 = "[ns] \"......\""
10031005-40 = "หืม...? คุยไว้ถึงตรงไหนแล้วนะ?"
10031005-41 = "อ้อ~! ฉันค่ะ! ฉัน! ฉันขอตอบค่ะ~! คุยถึงเรื่องรอฟังคำตอบต่อการชักชวนที่น่าดึงดูดของรุ่นพี่เมื่อคราว#nก่อนน่ะค่ะ~"
10031005-42 = "อ่า ใช่แล้ว ถูกต้องเลย เป็นผู้ช่วยที่ดีมาก จิอากิ"
10031005-43 = "ค่า~"
10031005-44 = "ฮึ่ม งั้นก็กลับเข้าประเด็นอีกครั้ง..."
10031005-45 = "เอาละครู! ได้เวลาให้คำตอบแล้ว เราอยากฟังคำตอบจากปากของครูเอง!"
10031005-46 = "ฮึบ ฮึบ~"
10031005-51 = "[ns5] \"คำตอบสำหรับข้อเสนอของมาโคโตะ...?\"\n[ns6] (คำร้องจากแพนเดโมเนียม โซไซตี้มีเข้ามาเยอะจนไม่รู้เลยว่าหมายถึงอะไร)"
10031005-54 = "อ้อ ดูจากสีหน้าของครูแล้ว"
10031005-55 = "\"ตัวเองเรียกเข้ามาเพื่อฟังคำตอบแท้ๆ แต่ทันทีที่เจอหน้ากันก็รีบเข้าประเด็นเลย...\""
10031005-56 = "\"แบบนี้เรียกว่าไม่มีมารยาทให้กันรึเปล่า?\" กำลังคิดแบบนี้อยู่ล่ะสิท่า?"
10031005-57 = "[s] \"หืม...?\""
10031005-58 = "ไม่ใช่หรอกค่ะ รุ่นพี่มาโคโตะ"
10031005-59 = "ฉันว่าคุณครูงงที่รุ่นพี่มาโคโตะเอาแต่พูดไปเรื่อยตามอำเภอใจมากกว่าค่ะ"
10031005-60 = "อะไรกันๆ อิโรฮะ ไม่รู้อะไรซะแล้ว"
10031005-61 = "หึหึหึ ดูสายตาของครูสิ นั่นคือดวงตาของผู้นำ สายตาของคนที่ยืนอยู่เหนือหัวใครบางคนยังไงล่ะ"
10031005-62 = "คนที่มีดวงตาแบบนั้นจะพยายามเก็บความคิดอันโง่เขลาเอาไว้"
10031005-63 = "ในฐานะผู้นำแพนเดโมเนียม โซไซตี้ ท่านฮานุมะ มาโคโตะผู้นี้มองดวงตาคู่นั้นได้อย่างทะลุปรุโปร่ง#nเลยละ! เรารู้ความหมายของสายตาอันร้อนแรงนั่นแล้ว!"
10031005-64 = "มันก็เป็นอย่างนี้ละค่ะ... คุณครู"
10031005-65 = "[s] \"อื้ม อิโรฮะ เอาตามนั้นไปนั่นละนะ...\""
10031005-66 = "ค่ะ เข้าใจแล้วค่ะ เฮ้อ..."
10031005-68 = "หึหึหึ!"
10031005-69 = "แน่นอนว่าเราเข้าใจความรู้สึกแบบนั้นของครูเป็นอย่างดี!"
10031005-70 = "เพราะฉะนั้น เพื่อเห็นแก่ขั้นตอนและระเบียบแบบแผนตามวิถีของเราแล้ว..."
10031005-71 = "ท่านมาโคโตะผู้นี้จะยื่นข้อเสนอให้ใหม่อีกครั้ง ณ ที่แห่งนี้"
10031005-72 = "เอาละ ครู [USERNAME]...!"
10031005-76 = "จะมาร่วมมือกับท่านมาโคโตะผู้นี้และแพนเดโมเนียม โซไซตี้หรือไม่!"
10031005-77 = "ฮึบ... อย่างนั้นละ... ฮึบ~"
10031005-83 = "[ns] \"ก็ว่าอยู่ว่าอะไร เรื่องของทางนี้เองสินะ\""
10031005-84 = "ค่ะ ฉันก็คิดไว้แล้วว่าจะเป็นแบบนั้น"
10031005-85 = "ว้าว จะจับมือกับชาเล่ต์สินะ! จะได้อยู่ข้างเดียวกับคุณครูเหรอเนี่ย! แบบนี้ดีเลยค่ะ!"
10031005-86 = "หึหึหึ! ถึงไม่จำเป็นต้องพูดอะไรเป็นพิเศษก็เถอะ แต่แพนเดโมเนียม โซไซตี้ของเราแข็งแกร่งมากนะ!"
10031005-87 = "หากเราได้อำนาจในนามของครู ก็ไม่ต่างจากได้กำลังพลถึงหนึ่งกองทัพ!"
10031005-88 = "ขอแค่เราจับมือกัน...! ก็เสมือนว่าเราได้ทั้งคิโวทอสมาไว้ในกำมือ... การได้ความสำเร็จที่ไม่มีใครเคย#nทำได้ก็จะเป็นเรื่องที่เป็นไปได้ขึ้นมา!"
10031005-89 = "หึหึหึ! ถ้าอย่างนั้น เราก็ขอสัญญากับครู..."
10031005-90 = "ว่าในวันที่พวกเราได้คิโวทอสมาครอบครอง...!"
10031005-91 = "ท่านฮานุมะ มาโคโตะคนนี้จะยกคิโวทอสให้ครูจากชาเล่ต์ครึ่งหนึ่ง...!"
10031005-92 = "ครึ่งหนึ่ง..."
10031005-93 = "ครึ่ง..."
10031005-94 = "อืม..."
10031005-95 = "ไม่สิ เราเผลอพูดออกไปด้วยอารมณ์ที่แรงกล้าน่ะ ครึ่งหนึ่งมันน่าจะ... มากเกินไป ต่อให้เป็นสัญญาที่พูดปากเปล่า แต่ยังไงก็ควรจะตรวจสอบให้รอบคอบก่อน..."
10031005-96 = "ชะ... ใช่...! ถึงจะไม่ใช่ครึ่งหนึ่งแบบเป๊ะๆ! แต่ถ้าปัดเศษขึ้น ก็น่าจะได้เกือบครึ่งหนึ่งแล้วละ เราจะแบ่งคิโวทอสให้ชาเล่ต์ประมาณนั้นแล้วกัน...!"
10031005-97 = "เอาละ ครู! คิดยังไงกับข้อเสนอของท่านมาโคโตะผู้ยิ่งใหญ่คนนี้!"
10031005-101 = "[ns] \"อ่า...\""
10031005-103 = "......"
10031005-105 = "ฮึบ~"
10031005-107 = "อะฮ่าฮ่าฮ่า! ตอนแรกใจป้ำบอกว่าจะแบ่งให้ครึ่งหนึ่ง แต่พอมาคิดดูอีกครั้งก็นึกเสียดายขึ้นมา ก็เลยชวนเปลี่ยนเรื่องเพื่อหลีกเลี่ยงการพูดยืนกราน!"
10031005-108 = "สมกับเป็นรุ่นพี่มาโคโตะจังเลยค่ะ! ว่ามั้ย อิโรฮะจัง?"
10031005-109 = "ฉันอายที่จะตำหนิอะไรแล้ว... ก็เลยอยู่เงียบๆ น่ะค่ะ จิอากิ"
10031005-111 = "โธ่เอ๊ย! หนวกหูน่า! หยุดพูดจาเรื่อยเปื่อยได้แล้ว!"
10031005-112 = "ว่าไงล่ะครู คำตอบน่ะ..."
10031005-113 = "ฮึบ! รุ่นพี่มาโคโตะ~ อิบูกิขึ้นมาขี่หลังแล้ว~!"
10031005-114 = "งั้นเหรอจ๊ะ~ อื้ม~ อิบูกิ! เก่งมาก~!"
10031005-115 = "ว้าว~! ไม่ว่ารุ่นพี่มาโคโตะจะบ่นว่าอะไร แต่อิบูกิจังก็พิชิตการปีนขึ้นบนไหล่ของรุ่นพี่ได้! ความน่ารักนี้มีอานุภาพมากกว่าไฟฟ้าแสนโวลต์ซะอีก!"
10031005-116 = "ฉันว่าแบบนี้ต้องบันทึกเอาไว้แล้ว! ฉัน โมโตมิยะ จิอากิ! ในฐานะเลขานุการแพนเดโมเนียม โซไซตี้ ขอทำหน้าที่อย่างเต็มกำลัง...!"
10031005-117 = "เอาละๆ! ทั้งรุ่นพี่มาโคโตะ! แล้วก็อิบูกิเลยนะ ชีส~!"
10031005-118 = "ชีส~"
10031005-119 = "หึหึหึ ชีส..."
10031005-125 = "จิอากิ ล้างรูปที่ถ่ายเมื่อกี้ให้ฉันด้วยนะคะ"
10031005-126 = "ถ้าอิโรฮะจังขอ ก็ต้องทำให้อยู่แล้ว~!"
10031005-127 = "หึหึหึหึ ว่าไงล่ะ ครู [USERNAME] ได้คำตอบรึยัง...?"
10031005-128 = "[s7] \"ครูก็ขอบใจข้อเสนอนั้นอยู่หรอกนะ...\"\n[s8] \"ครูคงต้องขอปฏิเสธ\""
10031005-134 = "ว่า... ไงนะ...?"
10031005-135 = "ทะ... ทำไมล่ะ... ครู ข้อเสนอที่น่าดึงดูดของท่านมาโคโตะผู้นี้... ไม่ได้มีบ่อยๆ หรอกนะ!"
10031005-136 = "มีเหตุผลอะไรที่เลี่ยงไม่ได้รึเปล่า? หรือว่ามีเงื่อนไขไหนที่ยังไม่พอใจ..."
10031005-137 = "อะฮ่าฮ่าฮ่า! เป็นเพราะตอนแรกบอกว่าจะแบ่งให้ครึ่งหนึ่ง แต่สุดท้ายก็กลับคำรึเปล่าคะ?"
10031005-138 = "พะ... เพราะเรื่องนั้นเหรอ...!"
10031005-139 = "ไม่ค่ะ ฉันไม่คิดว่าเป็นเพราะเรื่องนั้นหรอกค่ะ"
10031005-140 = "อิโรฮะ! ถ้าไม่ใช่เรื่องนั้น แล้วมันเป็นเพราะอะไรกัน..."
10031005-141 = "[s] \"วันนี้ที่ชาเล่ต์มีทำความสะอาดครั้งใหญ่น่ะ ครูไม่มีเวลามาก ขอโทษนะ\""
10031005-143 = "ว้าว~ รุ่นพี่มาโคโตะ~ สูงจังเลย~!"
10031005-144 = "(ยิ้มอย่างอ่อนโยน)"
10031005-145 = "......"
10031005-146 = "........."
10031005-147 = "ถ้างั้นก็ช่วยไม่ได้"
10031005-148 = "ถ้ามีงานต้องไปทำ เราก็คงยื้อเอาไว้ไม่ได้ ถ้างั้นวันนี้เราจะขอหลีกทางให้ก่อนแล้วกัน"
10031005-149 = "อ๊ะ รุ่นพี่มาโคโตะยอมให้เพราะเรื่องแบบนั้นจริงๆ เหรอคะ?!"
10031005-150 = "หืม? พูดอะไรของเธอน่ะ อิโรฮะ?"
10031005-151 = "หึหึ ถ้าเอาแต่ผลักดันข้อเสนอแนะของทางเราให้อีกฝ่ายตอบรับ ก็คงไม่ต่างจากเผด็จการกันพอดี"
10031005-152 = "ผู้นำที่แท้จริงต้องเคารพเงื่อนไขและเจตจำนงของอีกฝ่ายอย่างยืดหยุ่นสิ "
10031005-153 = "เว้นแต่ว่าอีกฝ่ายจะเป็นคณะกรรมการวินัย...!"
10031005-154 = "นี่คือสิ่งสำคัญ จำไว้ให้ขึ้นใจล่ะอิโรฮะ หึหึหึ"
10031005-155 = "อ่า... ค่ะ..."
10031005-156 = "อ่ะฮ่าฮ่า! สมกับเป็นรุ่นพี่มาโคโตะ~! อื้อ! ต้องถ่ายรูปเก็บไว้แล้วละ!"
10031005-166 = "ฮึ่ม พยายามเกลี้ยกล่อมถึงขนาดนั้น แต่ก็ไม่มีความหมายเลย"
10031005-170 = "สงสัยทุกคนคงจะลืมไปนะว่าถ้าอยากทำให้ครูจากชาเล่ต์มาเป็นฝ่ายเราอย่างจริงใจ วิธีที่แน่นอนที่สุดก็อยู่แค่ตรงนี้เอง"
10031005-171 = "ว่าไงนะ ซัตสึกิ... อย่าบอกนะว่า...! เธอนี่มัน...!"
10031005-172 = "อื้ม ใช่แล้ว มาโคโตะจัง ไม่ต้องใช้วิธีการอะไรที่มันยุ่งยากหรอก ก็แค่ใช้พลังจากโปรเจกต์อัลตร้า NK ของฉัน..."
10031005-173 = "แค่นี้ก็ทำให้ครูจากชาเล่ต์มาเป็นพวกของเราได้ในรวดเดียวโดยไม่ต้องโน้มน้าวอะไร!"
10031005-174 = "ฮุฮุฮุ! ครู! ดูนี่นะ!"
10031005-179 = "เอาละ จงตกอยู่ในภวังค์... จากนี้ไป ความซื่อสัตย์ที่คุณมีต่อแพนเดโมเนียม โซไซตี้จะค่อยๆ แกร่งกล้าขึ้น~"
10031005-180 = "และจะอยากซื้อพุดดิ้งจากร้านขนมหวานที่เพิ่งเปิดใกล้ๆ แพนเดโมเนียม โซไซตี้มาฝากเราด้วย~~"
10031005-184 = "[ns] \"อ่า อืม... ก็เหมือนจะรู้สึกแบบนั้นอยู่หน่อยนะ...?\""

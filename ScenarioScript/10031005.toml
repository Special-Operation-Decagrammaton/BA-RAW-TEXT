10031005-50 = "#wait;2500"
10031005-51 = "[ns5] \"마코토가 제안해 준 건에 대한 대답……?\"\n[ns6] (그간 만마전에서 들어온 요청이 많아서 그런지, 뭘 말하는 건지 모르겠는데.)"
10031005-52 = "#wait;100"
10031005-53 = "#wait;100"
10031005-54 = "3;마코토;99;아아. 그런가. 선생의 그 표정."
10031005-55 = "3;마코토;01;제아무리 대답을 듣고자 하여 불렀다고는 하나, 얼굴을 마주하자마자 다짜고짜 본론부터 요구하다니……."
10031005-56 = "3;마코토;03;이것은 역시 상호 간의 예의에 어긋나는 것이 아닌가? 라고 되묻고 싶어 하는 표정이군."
10031005-57 = "[s] \"으응……?\""
10031005-58 = "3;마코토;01\n5;이로하;01;아니요. 마코토 선배.\n#5;al\n#3;m2"
10031005-59 = "5;이로하;99;제가 보기엔 마코토 선배가 멋대로 흐름을 타고 떠드는 걸 보고 그냥 어리둥절하신 느낌인데요."
10031005-60 = "3;마코토;10;이런이런. 이로하. 뭘 모르는구나."
10031005-61 = "3;마코토;03;키키킷. 선생의 저 눈을 보아라. 저것은 리더의 눈. 누군가의 머리 위에 서는 자의 시선이다.\n#3;em;[재잘]"
10031005-62 = "3;마코토;00;저런 눈동자를 가진 자가, 그런 어리숙한 생각 따위를 품고 있으려고."
10031005-63 = "3;마코토;10;이 하누마 마코토 님은, 만마전의 리더로서 이미 꿰뚫어 보았단 말이다! 저 뜨거운 시선이 품고 있는 의미를 말이다!\n#3;em;[!]"
10031005-64 = "3;마코토;10\n5;이로하;06;……그렇다고 하네요. 선생님.\n#5;m3\n#3;dl"
10031005-65 = "[s] \"으응, 이로하. 그냥 그런 걸로…….\""
10031005-66 = "5;이로하;06;네네, 알겠습니다. 하아…….\n#5;greeting\n#5;em;[한숨]"
10031005-67 = "#all;hide"
10031005-68 = "3;마코토;03;키키킷!\n#3;em;[재잘]"
10031005-69 = "3;마코토;00;물론! 선생의 그런 마음 정도야 이 몸도 이해하고 있다마다!"
10031005-70 = "3;마코토;01;그러니 이 마코토 님도 나름대로 절차와 의식, 관습과 관례, 순서라는 것을 존중하는 마음으로……."
10031005-71 = "3;마코토;99;이 자리에서 새롭게 다시금 그대에게 제안하도록 하마."
10031005-72 = "3;마코토;00;자아, [USERNAME] 선생이여……!"

10031005-106 = "3;치아키;12\n#3;a"
10031005-107 = "3;치아키;12;아하하핫! 처음엔 기세를 타고 호기롭게 절반을 주마! 라고 하려고 했다가, 다시 생각해 보니 조금 아까운 생각이 든 나머지, 말을 빙빙 돌리면서 확언은 피하는 그 모습!\n#3;em;[재잘]"
10031005-108 = "3;치아키;11;역시 마코토 선배답네요! 그치? 이로하 쨩?"
10031005-109 = "3;치아키;11\n5;이로하;99;……지적하는 것도 부끄러우니까. 굳이 태클 걸지 않고 있던 거라구요. 치아키.\n#3;m1\n#5;al"
10031005-110 = "#all;hide"
10031005-111 = "3;마코토;04;에이이잇! 시끄럽다! 거기! 지방 방송은 중단하도록!\n#3;hophop"
10031005-112 = "3;마코토;00;그보다도 선생, 대답을………\n#3;em;…"
10031005-113 = "3;이부키;09;영! 차! 마코토 선배~ 이부키! 등에 다 올라왔어~!\n#3;em;[반짝]\n#3;jump\n#3;closeup"
10031005-114 = "3;마코토;08;아구구~ 응~ 이부키! 장해라~!\n#3;em;[음표]"
10031005-115 = "3;치아키;12;와아~! 마코토 선배가 뭐라고 떠들건 말건, 등반가로서 선배의 등허리를 정복한 이부키 쨩! 역시나 그 귀여움은 오늘도 백만 볼트!"
10031005-116 = "3;치아키;11;이건 반드시 기록해야만 한다고 저, 모토미야 치아키! 만마전의 서기로서 책임감이 불을 뿜기 시작……!\n#3;jump"
10031005-117 = "3;치아키;01;자자! 마코토 선배도! 이부키도 치-즈!"
10031005-118 = "3;이부키;03;치~즈~\n#3;em;[음표]\n#3;closeup"
10031005-119 = "3;마코토;10;크크큭. 치즈다……."

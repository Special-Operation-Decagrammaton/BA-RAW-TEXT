[translation]
10031005-1 = "序幕;見面"
10031005-2 = "……咯咯，咯咯咯。"
10031005-4 = "萬魔殿辦公室"
10031005-6 = "咯咯，嘻嘻嘻……"
10031005-10 = "嘻嘻嘻嘻！夏萊的老師！歡迎來到萬魔殿！"
10031005-11 = "[s]「啊，嗯。因為我有收到『時候到了，在萬魔殿等你』的通知。」"
10031005-15 = "[ns]「不過直到現在，我還是不明白那是什麼意思……」"
10031005-16 = "嘰嘻嘻。嗯，我想也是。"
10031005-17 = "收到我傳來的通知後，老師想必十分煩惱吧。"
10031005-18 = "比如「這天終於到了嗎？」、#n「除了表面上的訊息以外，那則MomoTalk會不會還隱藏著某些意義或心思？」……"
10031005-19 = "「在前往萬魔殿之前，是不是該好好思考一下？」諸如此類的。"
10031005-20 = "[s]「不是，我沒有那樣想過……」"
10031005-21 = "哼，這也是情有可原。我真琴大人完全能夠理解！"
10031005-22 = "作為眾多組織的領導者，尤其是肩負夏萊之名的人……我並不討厭你的那份謹慎！"
10031005-23 = "嘻嘻嘻！不，應該說有及格才對！"
10031005-24 = "正因如此，我們今天的相遇將帶來突然而衝擊……兼具戲劇性的影響！"
10031005-25 = "[s3]「呃……謝謝……？」\n[s4]「那個，真琴，我還是聽不懂你在說什麼……」"
10031005-28 = "嗯！既然都來到這裡，也沒什麼好隱瞞的了！"
10031005-29 = "今天我之所以請老師過來……是為了聽你對上次提議的答覆！"
10031005-30 = "嘻嘻嘻！老師究竟會如何回應我那充滿魅力的──"
10031005-31 = "真琴前輩～伊吹想爬到背上～"
10031005-32 = "啊啊，好。伊吹，你等我一下。"
10031005-39 = "[ns] 「…………」"
10031005-40 = "……嗯？剛才講到哪裡了？"
10031005-41 = "我知道我知道～！#n剛才講到前輩想聽老師回答，對上次提出的魅力提議有什麼看法～"
10031005-42 = "啊，沒錯。不愧是我的好幫手啊，千秋。"
10031005-43 = "是～"
10031005-44 = "咳哼，那麼回到正題……"
10031005-45 = "老師！是時候該告訴我你的答覆了！請親口說出來吧！"
10031005-46 = "嘿咻，嘿咻。"
10031005-51 = "[ns5]「要我回答真琴的提議……？」\n[ns6]（萬魔殿這段期間送來很多提議，實在不知道他指的是哪一個……）"
10031005-54 = "啊啊，這樣啊。#n從老師的表情來看……"
10031005-55 = "雖然是為了聽答覆而把自己叫來，可是才剛見面就直奔主題……"
10031005-56 = "這樣是不是有點失禮？#n──看起來一臉想問這麼問呢。"
10031005-57 = "[s]「嗯……？」"
10031005-58 = "不，真琴前輩。"
10031005-59 = "在我看來，老師只是因為跟不上真琴前輩奔放的思緒，所以有點暈頭轉向的而已。"
10031005-60 = "哎呀哎呀，伊呂波。這是你有所不知。"
10031005-61 = "嘻嘻嘻，看看老師那雙眼睛吧。#n那是領導者的眼睛──是站在他人之上的眼神。"
10031005-62 = "擁有那種眼睛的人，還會有那種傻念頭嗎？"
10031005-63 = "身為萬魔殿領袖的我──羽沼真琴大人，已經看透了那火熱的視線所代表的意義！"
10031005-64 = "……他是這麼說的，老師。"
10031005-65 = "[s]「唔嗯，伊呂波，就當是這樣吧……」"
10031005-66 = "是是，我知道了。唉……"
10031005-68 = "嘻嘻嘻！"
10031005-69 = "當然我也明白老師的用心！"
10031005-70 = "所以我真琴大人也以尊重程序與儀式、習慣及順序的心態……"
10031005-71 = "在此重新向你提出一個新的提議吧。"
10031005-72 = "來，[USERNAME]老師……！"
10031005-76 = "要不要和我們萬魔殿……不，和我真琴大人聯手呀！"
10031005-77 = "嘿咻……像這樣，嘿咻……"
10031005-83 = "[ns]「…………還以為你指的是什麼，原來是那個啊。」"
10031005-84 = "是是，我就知道會這樣。"
10031005-85 = "哇，跟夏萊攜手合作！居然能和老師站在同一邊！感覺真讚！"
10031005-86 = "呵呵呵！我想事到如今應該不必重申我們萬魔殿的強大了吧！"
10031005-87 = "如果能再得到像老師這樣的戰力，等同於獲得了千軍萬馬！"
10031005-88 = "只要我們聯手……！#n完全有可能實現將整個奇普托斯納入手中──這誰都未能實現的偉業！"
10031005-89 = "嘻嘻嘻！那麼我在此承諾老師一件事…………"
10031005-90 = "當我們一起拿下奇普托斯的那天……！"
10031005-91 = "我羽沼真琴大人就將奇普托斯的一半……！"
10031005-92 = "一半……"
10031005-93 = "一……"
10031005-94 = "…………唔嗯。"
10031005-95 = "……不，雖然是趁著氣勢這麼說，但一半是不是……有點太多了？#n即使只是口頭約定，在那之前還是必須冷靜評估……"
10031005-96 = "對，對了……！#n就把不完全是一半，但四捨五入之後面積會無限接近一半的奇普托斯交給夏萊吧！"
10031005-97 = "來吧，老師！覺得偉大真琴大人的提議如何！"
10031005-101 = "[ns]「呃……」"
10031005-103 = "…………"
10031005-105 = "嘿咻～"
10031005-107 = "啊哈哈哈！一開始明明豪爽地說會給一半……#n結果回頭想想覺得有點可惜，就兜圈子不把話說死的那個樣子！"
10031005-108 = "果然很像真琴前輩的作風！對吧伊呂波醬？"
10031005-109 = "……特別指明這一點也很尷尬，所以我才沒特意吐槽的，千秋。"
10031005-111 = "哎咿！那邊的人吵死了！不准私下開小窗！"
10031005-112 = "話說回來，老師，請快告訴我你的回答…………"
10031005-113 = "嘿～咻！真琴前輩～#n伊吹爬到背上了～！"
10031005-114 = "哎呀～嗯～伊吹真了不起耶～！"
10031005-115 = "哇啊～！無視真琴前輩話才說到一半，以攀登者的身分征服前輩的伊吹醬！#n那股可愛今天也是百萬伏特呢！"
10031005-116 = "這一定要記錄下來才行！#n我元宮千秋，身為萬魔殿書記的責任感已經熊熊燃起了……！"
10031005-117 = "來來來！真琴前輩跟伊吹都笑一個！"
10031005-118 = "西瓜甜不甜～！"
10031005-119 = "咯咯，當然甜……"
10031005-125 = "千秋，那張照片等等也請給我一張吧。"
10031005-126 = "既然伊呂波醬都這麼說了，當然沒問題～！"
10031005-127 = "嘻嘻嘻嘻。#n話說[USERNAME]老師，你的回答是……？"
10031005-128 = "[s7]「感謝你難得的提議……」\n[s8]「不過很抱歉，我拒絕。」"
10031005-134 = "什……麼……？"
10031005-135 = "為，為什麼呢……老師。#n和我真琴大人的提議同樣有魅力的機會，今後可能不會再出現了啊！"
10031005-136 = "是有什麼不得已的原因嗎？#n還是覺得條件不太能接受──"
10031005-137 = "啊哈哈哈！該不會是因為說了要平分卻又改口吧？"
10031005-138 = "果，果然是這樣嗎…………！"
10031005-139 = "不，我不這麼認為。"
10031005-140 = "但是伊呂波！如果不是的話，那到底為什麼……"
10031005-141 = "[s]「嗯，今天是夏萊大掃除的日子所以沒時間，抱歉。」"
10031005-143 = "哇～真琴前輩～好高～！"
10031005-144 = "…………（笑嘻嘻）"
10031005-145 = "…………"
10031005-146 = "………………"
10031005-147 = "那就沒辦法了。"
10031005-148 = "總不能把我這邊的要求強加給有預定計畫的人。#n今天就先這樣吧。"
10031005-149 = "哦，真琴前輩真的能接受嗎？"
10031005-150 = "嗯？你在說什麼啊伊呂波。"
10031005-151 = "嘻嘻。單方面把自己的要求強加於人，這可是暴君的行為。"
10031005-152 = "所以真正的領導者必須有變通性，並且尊重當事者的條件與意志。"
10031005-153 = "除非對方是風紀委員會……！"
10031005-154 = "這點很重要，你最好記清楚啊伊呂波。嘻嘻嘻。"
10031005-155 = "啊……是……"
10031005-156 = "啊哈哈！真像真琴前輩的作風～！嗯！拍下來吧！"
10031005-166 = "哼，你們拐彎抹角地想攏絡人，不覺得很沒意義嗎？"
10031005-170 = "大家好像都忘了。#n如果真心想讓夏萊的老師成為我方的人，最確實的方法不就在這裡嗎？"
10031005-171 = "什麼，皐月……難道……！你這傢伙……！"
10031005-172 = "沒錯，真琴醬。#n不必使用麻煩的手段，只要用我領導的NK-ULTRA計畫的力量……"
10031005-173 = "根本不用說服夏萊的老師，一下子就能讓他站在我們這邊！"
10031005-174 = "呵呵呵！老師！你看這個！"
10031005-179 = "來，沉淪吧……從現在起，你會越來越想效忠萬魔殿～"
10031005-180 = "同時你會想在不久前，萬魔殿附近新開的甜點店買布丁回來～～"
10031005-184 = "[ns]「哦哦……好，好像有那種感覺……？」"
10031005-188 = "呵呵，你們看，有效吧！？"
10031005-189 = "皐月前輩～伊吹也要試試～"
10031005-190 = "拿著硬幣～搖搖晃晃～老師越來越……想陪伊吹玩～！"
10031005-191 = "哎呀，伊吹醬，你很熟練耶？"
10031005-192 = "將來肯定能成為引領NK-ULTRA計畫的希望之星！"
10031005-193 = "啊，現在不是發呆的時候，千秋！"
10031005-195 = "是～！快門機會！身為萬魔殿的書記當然不能錯過～！"
10031005-209 = "……如你所見，萬魔殿大概就是這種感覺。"
10031005-210 = "感覺……被老師看著……好像有點難為情。"
10031005-211 = "[s]「是嗎？我覺得很和平很好啊。」"
10031005-212 = "和平……是嗎。"
10031005-213 = "嗯，確實是很和平啦……"

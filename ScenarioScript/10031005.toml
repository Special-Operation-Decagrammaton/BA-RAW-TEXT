10031005-5 = "#wait;2500"
10031005-6 = "3;마코토;03\n#na;???;크크크큭. 키키키킷………\n#3;black"
10031005-7 = "#st;[0,0];instant;1;"
10031005-8 = "#clearST"
10031005-9 = "3;마코토;03\n#3;a\n#wait;1000"
10031005-10 = "3;마코토;03;키키키킷! 환영한다! 샬레의 선생이여! 우리 만마전에 잘 와주었다!\n#3;closeup\n#bgshake"
10031005-11 = "[s] \"아, 응. <때가 되었으니 만마전에서 기다리고 있겠다>라는 연락을 받았으니까.\""
10031005-12 = "#st;[0,0];instant;1;"
10031005-13 = "#clearST"
10031005-14 = "#wait;1000"
10031005-15 = "[ns] \"근데 정작 때가 되었다니, 무슨 소리인지 모르겠어서…….\""
10031005-16 = "3;마코토;10;키시싯. 그래. 이해하고 있다.\n#3;em;[재잘]"
10031005-17 = "3;마코토;01;이 몸의 연락을 받고 난 뒤, 선생은 잠시 고민했겠지."
10031005-18 = "3;마코토;99;결국 이러한 날이 오고야 만 것인가. 혹시 전달받은 모모톡의 표면적인 메시지 외에도…… 그 안에 숨겨진 의미가 있는 건 아닐까? 거기에 내가 미처 파악하지 못한 속내가 있는 건 아닐까……?"
10031005-19 = "3;마코토;00;그렇다면 이대로 안일하게 만마전으로 발을 움직이기 전에 충분히 고민을 해봐야 하는 것이 아닐까? 등등."
10031005-20 = "[s] \"아니, 딱히 그런 생각을 했던 건…….\""
10031005-21 = "3;마코토;03;암, 그럴 수 있지. 나 마코토 님은 거기까지도 충분히 이해하고 있다!\n#3;greeting"
10031005-22 = "3;마코토;10;뭇 조직의 우두머리로서, 특히나 샬레라는 이름을 그 어깨에 짊어지고 있는 자로서 신중을 기하는 바로 그 모습……! 이 몸은 싫어하지 않아."
10031005-23 = "3;마코토;03;키키키킥! 아니, 오히려 합격점이라 할 수 있겠지!\n#3;em;[재잘]"
10031005-24 = "3;마코토;03;그만큼 오늘 이루어지는 우리의 만남이 가져올 여파는 갑작스럽고 충격적이며── 또한 극적일 테니까!\n#3;closeup"
10031005-25 = "[s3] \"저…… 감사합니다……?\"\n[s4] \"저기 마코토, 여전히 무슨 소리인지 도통………\""
10031005-26 = "#wait;100"
10031005-27 = "#wait;100"
10031005-28 = "3;마코토;99;그래! 여기까지 온 이상 무엇을 숨기랴!"
10031005-29 = "3;마코토;10;오늘 이 몸이 선생을 이 자리로 부른 것은…… 저번에 제안한 것에 대한 대답을 듣고자 부른 것이다!"
10031005-30 = "3;마코토;03;키키킷! 과연 선생은 이 몸의 매력적인 권유에 대해, 어떠한 답을 들려줄 생ㄱ………!\n#3;em;[재잘]"
10031005-31 = "3;마코토;03\n5;이부키;00;마코토 선배~ 이부키. 등에 올라갈래~\n#3;m2\n#5;em;[반짝]\n#5;al"
10031005-32 = "3;마코토;03;아아, 그래. 이부키. 잠시 기다려라.\n#3;em;[반응]"
10031005-33 = "#st;[0,0];instant;1;"
10031005-34 = "#clearST"
10031005-35 = "5;이부키;01\n3;마코토;10\n#3;h\n#5;h\n#3;m3\n#wait;750"
10031005-36 = "5;이부키;01\n3;마코토;10\n#3;h\n#5;h\n#5;m4\n#wait;1500"
10031005-37 = "5;이부키;01\n3;마코토;08\n#3;h\n#5;h\n#3;greeting\n#5;d\n#wait;1000"
10031005-38 = "5;이부키;01\n3;마코토;08\n#3;h\n#5;h\n#5;hide"
10031005-39 = "[ns] \"………….\""
10031005-40 = "3;마코토;01;………흠? 어디까지 이야기했었지?\n#3;em;[?]"
10031005-41 = "3;마코토;01\n1;치아키;12;네~ 저! 저! 저~ 저요~! 선배가 저번에 했던 매력적인 제안에 대한 대답을 듣고자 한다. 까지 말했습니다~\n#1;ar\n#1;em;[음표]\n#3;m4"
10031005-42 = "3;마코토;02;아, 그래. 맞아. 나이스 어시스트다. 치아키.\n#3;em;[반응]"
10031005-43 = "1;치아키;03;옙~"
10031005-44 = "1;치아키;03\n3;마코토;99;흠흠. 다시 본론으로 돌아와서…….\n#1;dl\n#3;m3"
10031005-45 = "1;치아키;03\n3;마코토;00;그래서 선생이여! 이제 슬슬 그 제안에 대한 대답을. 선생, 본인의 입으로 듣고자 한다!\n#1;hide\n#3;em;[!]"
10031005-46 = "3;마코토;00\n#na;이부키;영차. 영차."
10031005-47 = "#st;[0,0];instant;1;"

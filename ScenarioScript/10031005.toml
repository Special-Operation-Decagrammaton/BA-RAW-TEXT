[translation]
10031005-1 = "Prologue;Face-to-Face"
10031005-2 = "...Kihe. Kihehe."
10031005-4 = "Pandemonium Society Executive Office"
10031005-6 = "Kihehehe. Kihehehe..."
10031005-10 = "Welcome, Sensei of Schale! To the Pandemonium Society!"
10031005-11 = "[s] \"Oh, right. Your message earlier... 'I shall be waiting for you at the Pandemonium Society.'\""
10031005-15 = "[ns] \"Though I was a bit confused by the 'The time has come...'\""
10031005-16 = "Kihehe. Yes, I see."
10031005-17 = "My message must have truly perplexed you."
10031005-18 = "\"Ah, the day has finally arrived. What could be the hidden meaning behind Makoto's MomoTalk message? What are the intentions of her labyrinthine heart?\""
10031005-19 = "\"Should I not take my time to mull over this matter carefully before impetuously bumbling my way into the Pandemonium Society?\" And so on."
10031005-20 = "[s] \"Not what I was thinking about... But your impression was pretty funny.\""
10031005-21 = "Mm, it's only natural that you feel that way. I, the Great Makoto, fully understand!"
10031005-22 = "One must be cautious as the leader of an organization, especially one as prestigious as Schale! No, I don't mind it at all."
10031005-23 = "Kekekeke! Your cunning aces the test with flying colors!"
10031005-24 = "You're right to be cautious! For the aftershocks of our meeting today will be swift, stupefying, and world-shattering!"
10031005-25 = "[s3] \"Um... Thank you?\"\n[s4] \"...Makoto, what are you talking about?\""
10031005-28 = "Well then! If we've come this far, there's nothing more to hide!"
10031005-29 = "I've summoned you here today...to hear your response to my proposal from before!"
10031005-30 = "Kihehe! I wonder what answer Sensei will give my excellent suggestio—!"
10031005-31 = "Makoto, Ibuki wants uppies!"
10031005-32 = "Ah, certainly, Ibuki. Wait just one moment."
10031005-39 = "[ns] \"...\""
10031005-40 = "Now, where were we?"
10031005-41 = "Oh! Me, me, me! We left off with Makoto wanting to hear Sensei's response."
10031005-42 = "Ah, yes. Right. Nice assist, Chiaki."
10031005-43 = "Aye!"
10031005-44 = "Anyway, to the point..."
10031005-45 = "I wish to hear your answer, Sensei! I want to hear it straight from the horse's mouth."
10031005-46 = "Heave-ho. Heave-ho."
10031005-51 = "[ns5] \"...To what you offered before?\"\n[ns6] \"(WHICH proposal? If I had a nickel for every Pandemonium Society request I've gotten...)\""
10031005-54 = "Hmm. Your face betrays you, Sensei."
10031005-55 = "It's an expression that says, \"she called me here to hear my response, then went right for the jugular as soon as we met...\""
10031005-56 = "\"She would dare to defy common courtesy for this?\""
10031005-57 = "[s] \"Eh?\""
10031005-58 = "You're wrong, Makoto."
10031005-59 = "Personally, I think Sensei is confused from listening to you talk in circles."
10031005-60 = "Oh goodness. Iroha, you are truly clueless."
10031005-61 = "Kihehe. Look into Sensei's eyes. They're the eyes of a leader. One who stands tall atop the heads of others."
10031005-62 = "They are certainly not the eyes of a naive, goody-goody pencil pusher!"
10031005-63 = "It is only natural that I, the Great Makoto, leader of the Pandemonium Society, would see the meaning behind such a scorching gaze!"
10031005-64 = "...That's the gist of what she's saying, Sensei."
10031005-65 = "[s] \"Th-Thanks, Iroha. I'll just play along...\""
10031005-66 = "All right, got it. *sigh*"
10031005-68 = "Kihehe!"
10031005-69 = "Of course, I perfectly understand Sensei's feelings!"
10031005-70 = "So, I, the Great Makoto, shall pay heed to good manners, customs, and common decency."
10031005-71 = "In the halls of the Pandemonium Society, I am once again offering you my proposal."
10031005-72 = "Now then...[USERNAME] Sensei!"
10031005-76 = "Won't you join forces with I, the Great Makoto?! ...And the Pandemonium Society!"
10031005-77 = "Heave-ho... This way! Heave-ho..."
10031005-83 = "[ns] \"...Oh, so that's what you were going on about.\""
10031005-84 = "Figures. I knew it would be something like this."
10031005-85 = "Wow! A collaboration with Schale! We're gonna be siding with Sensei! I like it!"
10031005-86 = "Kekeke! There's no need for me to say it aloud, but the Pandemonium Society is quite powerful!"
10031005-87 = "If the Pandemonium Society gained the strategic might of Sensei, it would be as if we drafted a whole army!"
10031005-88 = "If we join forces, we could take over the entirety of Kivotos... An achievement that no other force has been able to accomplish!"
10031005-89 = "Kekeke! On that day, I promise you this..."
10031005-90 = "When we conquer Kivotos together..."
10031005-91 = "I, the Great Makoto, will give Schale's Sensei half of...!"
10031005-92 = "Half of..."
10031005-93 = "Ha—"
10031005-94 = "...Hmm."
10031005-95 = "I was just speaking off the cuff but doesn't half seem a bit too much? Even if it's only a verbal agreement, I should carefully review my terms..."
10031005-96 = "R-Right! Even if it's not exactly half, Schale should control close to half of Kivotos...after rounding up!"
10031005-97 = "So, Sensei! What do you say to my grand proposal!"
10031005-101 = "[ns] \"Uh...\""
10031005-103 = "..."
10031005-105 = "Heave-ho!"
10031005-107 = "Bahahaha! Did you see the way she just rolled into promising half, then started talking in circles because her brain turned on and she realized half was way too much!"
10031005-108 = "That's so Makoto! Right, Iroha?"
10031005-109 = "...Chiaki, it was so cringeworthy I didn't even want to draw attention to it."
10031005-111 = "Urgh! Shut up! You! Kill the live stream feed!"
10031005-112 = "Anyway! What is your response, Sensei?"
10031005-113 = "Heave! Ho! All aboard the Makoto express!"
10031005-114 = "Yay! Congrats, Ibuki! I'm so proud of you!"
10031005-115 = "Yay! Ibuki has conquered the Makoto express despite its constant rambling! Aah, why is Ibuki always cute as a button?"
10031005-116 = "I, Motomiya Chiaki, secretary of the Pandemonium Society, feel a burning responsibility to record every second of this!"
10031005-117 = "This way! Makoto, Ibuki! Say cheese!"
10031005-118 = "Cheese!"
10031005-119 = "Kihehe. Cheese..."
10031005-125 = "Chiaki, bring me a copy of that photo later."
10031005-126 = "Anything for you, Iroha!"
10031005-127 = "Kihehehe. AHEM. [USERNAME] Sensei, your answer?"
10031005-128 = "[s7] \"Thanks for the offer but...\"\n[s8] \"I'm afraid I have to decline.\""
10031005-134 = "What?"
10031005-135 = "Wh-Why? Sensei. You'll never get another opportunity as robust as my proposal!"
10031005-136 = "Is it because of some unforeseen circumstance? Or do you need me to sweeten our terms and conditions?"
10031005-137 = "Ahahaha! Are you sure it's not because you balked at giving up half of Kivotos?"
10031005-138 = "That must be it!"
10031005-139 = "I don't think that's the case."
10031005-140 = "But Iroha, if that's not it, then for what reason—"
10031005-141 = "[s] \"Well you see, today is Schale's office clean-up day. No time for global conquest. Sorry.\""
10031005-143 = "Whee! Makoto! It's so breezy up here!"
10031005-144 = "She smiled gently."
10031005-145 = "..."
10031005-146 = "..."
10031005-147 = "It can't be helped."
10031005-148 = "I can't force our demands onto someone with other plans. I'll let it slide, but only for today."
10031005-149 = "Uh, Makoto, are you really okay with that?!"
10031005-150 = "Hm? What do you mean, Iroha?"
10031005-151 = "Keke. If I recruited Schale through sheer force, I'd be no more than a tyrant."
10031005-152 = "A true leader must remain flexible, heed context, and value the agency of others."
10031005-153 = "Except when it comes to that noxious Prefect Team!"
10031005-154 = "That's good wisdom, Iroha. So do keep it in mind."
10031005-155 = "Ah. Kay..."
10031005-156 = "Ahaha! That's our Makoto! Ooo! Maybe I should take a picture of this too!"
10031005-166 = "Hmph. What's the point of trying to persuade people if you're just going to talk in circles?"
10031005-170 = "Have you all forgotten? We already have a foolproof method IF we want to bring the Sensei of Schale to our side."
10031005-171 = "Wait, Satsuki! You don't mean—"
10031005-172 = "Correct, Makoto. We can use the techniques I learned from my NK Ultra Project..."
10031005-173 = "We could bring Sensei onto our side without the hassle of diplomacy or persuasion!"
10031005-174 = "Fufufu! Oh, Sensei! Follow the birdy."
10031005-179 = "That's right, keep watching... You feel as if you want to swear loyalty to the Pandemonium Society..."
10031005-180 = "You also want to buy pudding from that new dessert shop near the Pandemonium Society..."
10031005-184 = "[ns] \"Um, uh... M-Maybe?\""
10031005-188 = "Fufu. Look, I think it's working!"
10031005-189 = "Hey Satsuki, let Ibuki try!"
10031005-190 = "You take out a coin...swing it around... Now Sensei wants to play with Ibuki!"
10031005-191 = "Oh my, Ibuki. You're a pro at this! "
10031005-192 = "I see great potential in the NK Ultra Project's future leader!"
10031005-193 = "Oy, don't just stand there, Chiaki!"
10031005-195 = "Of course! What an image! As the Pandemonium Society secretary, I can't miss this!"
10031005-209 = "...As you can see, this is just an average day for us."
10031005-210 = "And it's twice as embarrassing with you watching, Sensei."
10031005-211 = "[s] \"That so? I find it almost peaceful in a weird way.\""
10031005-212 = "Peaceful you say."
10031005-213 = "I guess you're not wrong."

10031005-83 = "[ns] \"………아, 뭔가 했더니 그쪽 이야기였구나.\""
10031005-84 = "5;이로하;99;네네, 그럴 줄 알았지만요.\n#5;al\n#5;em;…"
10031005-85 = "1;치아키;11;와, 샬레와의 공동작업! 선생님이랑 편을 먹는다니! 좋네요! 그거!\n#1;em;[음표]\n#1;ar"
10031005-86 = "5;이로하;99\n1;치아키;11\n3;마코토;03;크크큭! 새삼스레 말할 필요도 없겠지만. 우리 만마전은 강대하다!\n#3;em;[재잘]\n#1;dl\n#5;dr"
10031005-87 = "5;이로하;03\n1;치아키;11\n3;마코토;03;그런 만마전이 선생이라는 전력을 얻게 된다면, 그야말로 천군만마를 얻는 것이나 다름없을 터!\n#1;hide\n#5;hide"
10031005-88 = "3;마코토;10;우리가 함께 손을 잡기만 한다면……! 이 키보토스 전체를 손에 넣는다는…… 그 누구도 해내지 못한 위업을 달성하는 것도 충분히 가능할 테지!"
10031005-89 = "3;마코토;03;키키킷! 그렇게 되면 내 선생에게 약속하겠다………\n#3;em;[재잘]"
10031005-90 = "3;마코토;99;우리가 함께 키보토스를 손에 넣은 바로 그날……!"
10031005-91 = "3;마코토;05;이 하누마 마코토 님께서는 샬레의 선생, 그대에게 이 키보토스의 절반을……!"
10031005-92 = "3;마코토;01;절반을……."
10031005-93 = "3;마코토;04;절……\n#3;em;…"
10031005-94 = "3;마코토;06;…………음."
10031005-95 = "3;마코토;06;……아니, 기세로 말해버렸지만, 절반이라고 하면 역시 너무 많지 않……나? 아무리 구두로만 이야기하는 약속일지라도, 역시 그전에 차분히 검토해 볼 필요가…….\n#3;stiff\n#fontsize;50"
10031005-96 = "3;마코토;10;그, 그래……! 완전히 절반까지는 아니더라도! 적어도 반올림하면 한없이 절반에 가깝지 않을까? 하는 정도만큼의 키보토스를 샬레에 건네주마……!\n#3;jump"
10031005-97 = "3;마코토;10;자, 선생이여! 이 위대한 마코토 님의 제안이 어떠한가!\n#3;closeup"

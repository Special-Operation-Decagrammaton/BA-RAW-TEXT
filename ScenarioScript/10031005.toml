10031005-134 = "3;마코토;11;뭣……이……?"
10031005-135 = "3;마코토;06;어, 어째서냐…… 선생. 이 마코토 님의 제안만큼이나…… 매력적인 기회는 또 달리 없을 터인데!\n#3;em;[땀]"
10031005-136 = "3;마코토;04;뭔가 피치 못할 사정이라도 있는 것인가? 아니면 무언가 조건에서 부족한 점이라도──"

10031005-74 = "#clearST"
10031005-75 = "#wait;2500"
10031005-76 = "3;마코토;10;우리 만마전과…… 나아가 이 마코토 님과 손을 잡지 않겠나!\n#3;closeup\n#bgshake"
10031005-77 = "3;마코토;10\n#na;이부키;영차…… 이렇게 해서, 영차……\n#3;closeup"

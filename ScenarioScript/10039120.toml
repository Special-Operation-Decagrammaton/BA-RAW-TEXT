[translation]
10039120-1 = "後日談;生活安全局參加慶典的方法"
10039120-10 = "桐乃，你聽說了嗎？"
10039120-14 = "如果是指因應雙向監控攝影機的導入而修訂的道路交通法案，我已經聽說了哦！"
10039120-15 = "等等……有這回事？為什麼我不知道？"
10039120-16 = "總之我想說的不是那個！"
10039120-17 = "聽說這次三一學園要舉辦狂歡節哦。"
10039120-22 = "啊，是那個只在傳聞裡聽過的超大規模慶典嗎！#n哇哦……！"
10039120-23 = "這又不是什麼值得高興的事。#n每次只要有這種大型活動，生活安全局都得派人去維持秩序……這已經是常態了。"
10039120-24 = "換句話說就是我們要被派遣了。"
10039120-25 = "守護市民的安全是我們的義務！無論任何任務都沒問題！"
10039120-26 = "你還是這麼樂觀積極呢。#n我光用想的都覺得麻煩到想哭……"
10039120-27 = "一旦覺得麻煩就會陷入負面循環的唷？#n這種時候還是別想太多比較好！"
10039120-28 = "唔嗯……我現在連思考都覺得麻煩……"
10039120-36 = "你們好～！請問兩位就是這次要被派遣到「三一狂歡節」的人嗎？"
10039120-37 = "啊，是我們沒錯！"
10039120-38 = "哦～真是辛苦了。#n這些是要給你們的服裝。"
10039120-39 = "咦？服裝？"
10039120-40 = "詳細情況我也不太清楚，上頭只交代說要交給派遣人員而已。"
10039120-44 = "那麼先告辭啦～！辛苦了～！"
10039120-49 = "這是……？"
10039120-54 = "「狂歡節派遣人員用服裝」……？"
10039120-55 = "嗯？居然有這種東西？#n總之先拿出來看看吧。"
10039120-58 = "（不久之後……）"
10039120-63 = "等一下……！！#n這套服裝是怎麼回事！？"
10039120-64 = "我們的任務應該只有維持秩序跟引導市民而已，為什麼要穿得這麼華麗啊？#n穿生活安全局的制服就夠了吧！？"
10039120-65 = "這，這……"
10039120-69 = "會不會是行政作業上有疏失呢！？#n這種事在女武神還挺常見的……"
10039120-70 = "我得去跟上級要個交代！"
10039120-71 = "上級指的是……？"
10039120-76 = "這裡是公安局長。#n有什麼事嗎……？"
10039120-80 = "啊，是生活安全局啊。"
10039120-81 = "局長！這到底是怎麼回事，麻煩你解釋一下！"
10039120-85 = "你那副打扮是……"
10039120-86 = "為什麼要突然送這種服裝過來！這和「三一狂歡節」有關係嗎？"
10039120-87 = "嗯……？"
10039120-92 = "啊。"
10039120-93 = "啊啊……原來如此……"
10039120-94 = "原來如此！？#n所以這件事局長也知情嗎？"
10039120-96 = "局，局長！這套服裝真的是要給我們穿的嗎？"
10039120-101 = "……兩位先聽我說。#n這次的事情，其實與生活安全局的後勤補給有關。"
10039120-106 = "咦？怎麼說呢……"
10039120-108 = "某個民間企業願意向我們提供物資和零食的支援，#n但條件是這次被派遣到「三一狂歡節」的人員，都需要穿上特別的服裝。"
10039120-109 = "看來就是你們身上的那套吧。"
10039120-115 = "而這麼做的主要目的……#n是在宣傳民間企業的同時，讓平時形象嚴肅的女武神變得更親民。"
10039120-117 = "要，要由我們來改善女武神的形象嗎！？"
10039120-118 = "服裝怎麼樣先不說，這個責任也未免太重大了吧！"
10039120-119 = "況且多年來建立的形象，怎麼可能只靠這種服裝就輕易改變！"
10039120-121 = "我倒覺得比想像中適合……還挺不錯的啊。"
10039120-122 = "這套服裝，看久了確實還蠻可愛的沒錯……"
10039120-123 = "總之雖然抱歉，但事情就是這樣。#n這件事是上級決定的，所以我也愛莫能助。"
10039120-124 = "局長！你是因為自己不用穿才能說得一派輕鬆吧！"
10039120-128 = "啊，訊號突然不太穩定……（滋滋）……（滋）……"
10039120-133 = "喂？喂！？"
10039120-137 = "竟然假裝聽不見就掛斷了！真卑鄙！！"
10039120-138 = "唔嗯……看來我們不得不穿著這套服裝了呢。"
10039120-139 = "被派遣已經夠麻煩了，居然還得穿上這麼可愛……#n我是說這麼累贅的服裝，實在太不合理了。"
10039120-140 = "如果上級說什麼就照做的話，安逸慵懶的生活就要不翼而飛了。#n我要堅決抵制！！"
10039120-144 = "（狂歡節當天……）"
10039120-158 = "……"
10039120-159 = "……"
10039120-164 = "不好意思，請問洗手間在哪邊呢？"
10039120-169 = "左轉後直直走到盡頭就會看到了！"
10039120-171 = "啊，謝謝。"
10039120-178 = "你好！請問第二類參賽者的準備室該怎麼走呢？"
10039120-179 = "第二類參賽者的準備室是204號到212號！右轉後上樓就到了！"
10039120-180 = "這樣啊，謝謝你。辛苦了。"
10039120-181 = "不客氣。祝你取得好成績！"
10039120-186 = "你為什麼從剛才開始就在幫人家指路啊……我們也是來參加的耶。"
10039120-191 = "為市民們指路的習慣已經深入骨髓，所以自然而然地就……"
10039120-192 = "不過剛才那位同學，是穿著和服參加偶像比賽呢……真特別。"
10039120-193 = "有比穿甜甜圈店的宣傳服裝特別嗎？"
10039120-194 = "哎呀，既然終究得穿，不如多往好處想吧。"
10039120-195 = "唔嗯……真的有好處嗎？"
10039120-196 = "至少在合約期間內，企業會供應無限量的零食……"
10039120-197 = "啊，還可以搶先吃到新上市的產品。"
10039120-198 = "這點倒是還不錯啦……"
10039120-199 = "不過還真沒想到，那間民間企業竟然是我常去的「MasterDonut」……#n唉……這樣更沒辦法拒絕了……"
10039120-200 = "來吧，打起精神來！#n為了維護秩序和治安，也為了我們的業績！"
10039120-201 = "好麻煩哦……"
10039120-208 = "現在開始進行參加者確認。#n請問「Pretty Donut Police Girls」有在現場嗎？"
10039120-213 = "啊，是我們。"
10039120-214 = "這個名稱真是讓人無法適應。"
10039120-215 = "不過幸好不必正式參賽，只要以公益廣告的形式進行中場表演就行了。"
10039120-216 = "雖然短但是很重要哦！#n畢竟歌詞跟舞蹈，都是為了傳達安全守則而設計的！"
10039120-217 = "我們也努力練習過了不是嗎，吹雪！"
10039120-218 = "可是再怎麼練習還是會覺得羞恥啊……#n竟然讓我們做這種事……"
10039120-224 = "唉，緊張到我都胃痛了。"
10039120-225 = "哎呀，真糟糕。#n要不要先做個深呼吸……"
10039120-230 = "確認參加者姓名。#n中務桐乃同學？"
10039120-234 = "是！本官……啊不對，我在這裡！"
10039120-236 = "合歡垣吹雪同學？"
10039120-238 = "我，我在這……"
10039120-243 = "請，請幫幫我……"
10039120-245 = "嗯……？"
10039120-254 = "唉呦，嚇我一跳！#n怎麼會有人卡在吉祥物裡！？"
10039120-255 = "什，什麼！你沒事吧！？"
10039120-265 = "啊唔……謝，謝謝你們……"
10039120-266 = "你，你怎麼會卡在那裡？"
10039120-267 = "那，那個……因為馬上就要彩排讓我很緊張……"
10039120-268 = "為了不引人注意，我就躲在吉祥物後面做深呼吸……#n結果手機不小心掉了，所以就在撿的時候……"
10039120-269 = "差點就在表演前出大事了呢……"
10039120-270 = "多虧有兩位的幫忙，我才能平安無事。#n真的非常感謝。"
10039120-271 = "你們也是來參加比賽的嗎？"
10039120-276 = "啊，我們是……"
10039120-277 = "這件事說來話長，你就當作是有些特殊情況吧。"
10039120-278 = "……就是這樣！"
10039120-280 = "原，原來如此……世上真是無奇不有呢……"
10039120-281 = "兩位今天也在為了和平而努力……"
10039120-286 = "對了，那個時候真的很謝謝你。"
10039120-287 = "你當時真是太活躍了！"
10039120-289 = "呵呵，也謝謝你們一直守護著奇普托斯的安全。"
10039120-290 = "那麼，我很期待兩位的精彩表演。#n希望能再見到你們。"
10039120-291 = "嗯！我們也期待你的表演唷！加油！"
10039120-297 = "這位修女同學還真可愛。"
10039120-298 = "就是說呀。#n修女會也想跟我們一樣改變形象嗎？"
10039120-299 = "看來大家的目標都差不多呢？#n為了改變僵硬的形象而穿上偶像服……"
10039120-300 = "雖然我們現在代表的不是生活安全局，而是甜甜圈店就是了。"
10039120-301 = "啊哈哈……是這樣沒錯……"
10039120-305 = "話說回來，吹雪你好像沒那麼緊張了呢。"
10039120-309 = "嗯？真的耶。#n現在感覺好多了。"
10039120-310 = "剛才跟那位修女聊過之後，莫名感覺放鬆了不少。"
10039120-311 = "也許是因為修女們經常聽取他人的懺悔，所以是很好的諮詢對象呢。"
10039120-316 = "……Police Girls！"
10039120-317 = "「Pretty Donut Police Girls」在嗎！#n不在的話就要換下一隊了哦！"
10039120-321 = "啊！！我們在這裡！"
10039120-322 = "吹雪！輪到我們囉！"
10039120-323 = "唉……這一刻終究還是來了……"
10039120-324 = "快起來準備吧！！快點快點！"
10039120-325 = "是是是……"
10039120-337 = "（據說在狂歡節過後，生活安全局宣傳的甜甜圈店的銷量暴增到了兩倍以上）"

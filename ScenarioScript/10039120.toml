[translation]
10039120-1 = "ย้อนวันวาน;สำนักรักษาความปลอดภัยเที่ยวงานเทศกาล"
10039120-10 = "คิริโนะ ได้ยินเรื่องนั้นหรือยัง?"
10039120-14 = "หมายถึงเรื่องไหนเหรอคะ? ถ้าเป็นเรื่องการแก้ไขกฎหมายการจราจรอันเนื่องมาจากการติดกล้องตรวจ#nจับความเร็ว ฉันรู้เป็นอย่างดีแล้วค่ะ!"
10039120-15 = "หืม... มีอะไรแบบนั้นด้วยเหรอ? ทำไมฉันไม่รู้นะ?"
10039120-16 = "จะยังไงก็เถอะ สิ่งที่ฉันจะบอกไม่ใช่เรื่องนั้น!"
10039120-17 = "ดูเหมือนว่าในทรีนิตี้จะมีจัดงานคาร์นิวัลน่ะ"
10039120-22 = "อ๊ะ หมายถึงเทศกาลขนาดใหญ่ที่เป็นที่เลื่องลือกันสินะคะ! ว้าวว...!"
10039120-23 = "นั่นไม่ใช่เรื่องที่ต้องดีใจหรอกนะ ทุกครั้งที่มีงานใหญ่แบบนี้ สำนักรักษาความปลอดภัยจะส่งคนไป#nรักษาความสงบเรียบร้อยตลอดอยู่แล้ว"
10039120-24 = "และนี่ก็แปลว่าพวกเราจะถูกส่งไปทำงานน่ะสิ"
10039120-25 = "การดูแลความปลอดภัยของชาวเมืองเป็นหน้าที่ของพวกเราอยู่แล้วค่ะ! ไม่ว่าจะเป็นภารกิจแบบไหน ฉันก็เต็มใจค่ะ!"
10039120-26 = "คิดบวกอยู่ตลอดเลยนะ ส่วนฉันแค่คิดก็น้ำตาไหลแล้ว ก็คนมันขี้เกียจนี่นา"
10039120-27 = "ถ้าคิดว่าไม่อยากทำ ก็จะไม่อยากทำอยู่อย่างนั้นละค่ะ ถ้าเป็นแบบนี้เรายิ่งต้องคิดให้น้อยลงค่ะ!"
10039120-28 = "อืม... ขี้เกียจจะคิดแล้วอะ..."
10039120-36 = "สวัสดีค่ะ~! พวกคุณคือคนที่มาดูแลความสงบในงาน <ทรีนิตี้คาร์นิวัล> ใช่มั้ยคะ?"
10039120-37 = "อ๊ะ ใช่ค่ะ พวกฉันเองค่ะ!"
10039120-38 = "โอ้... คงต้องเหนื่อยน่าดูเลยนะคะ งั้นรับชุดนี้ไปนะคะ"
10039120-39 = "คะ? ชุดเหรอคะ?"
10039120-40 = "ที่จริงฉันก็ไม่รู้ว่าคืออะไรค่ะ ฉันแค่ได้คำสั่งให้เอามาให้พวกคุณน่ะค่ะ"
10039120-44 = "ถ้างั้นฉันไปละนะคะ~! โชคดีนะคะ~!"
10039120-49 = "นี่มันอะไรกันน่ะ?"
10039120-54 = "ชุดสำหรับผู้เข้าร่วมงานเทศกาล...?"
10039120-55 = "หืม มีอะไรแบบนี้ด้วยเหรอ? ลองเอาออกมาดูก่อนเถอะ"
10039120-58 = "(ครู่ต่อมา...)"
10039120-63 = "เดี๋ยวนะ...!! นี่มันชุดอะไรกัน?!"
10039120-64 = "งานของเราคือดูแลความปลอดภัยกับให้คำแนะนำชาวเมืองนะ ทำไมต้องใส่ชุดฟรุ้งฟริ้งแบบนี้ด้วยล่ะ? ใส่เครื่องแบบสำนักรักษาความปลอดภัยก็ได้ไม่ใช่เหรอ?!"
10039120-65 = "นะ... นั่นสิคะ..."
10039120-69 = "เกิดความเข้าใจผิดอะไรหรือเปล่านะ? เรื่องแบบนี้เกิดขึ้นบ่อยๆ ในวัลคิรี่นี่คะ..."
10039120-70 = "ต้องไปถามจากเบื้องบนแล้วละว่าทำไมถึงเป็นแบบนี้ไปได้!"
10039120-71 = "เบื้องบนเหรอคะ...?"
10039120-76 = "หัวหน้ากรมความมั่นคงสาธารณะค่ะ มีเรื่องอะไร..."
10039120-80 = "อ้อ สำนักรักษาความปลอดภัยงั้นเหรอ?"
10039120-81 = "หัวหน้ากรมฯ! ต้องอธิบายหน่อยแล้วละว่านี่มันเรื่องอะไรกัน!"
10039120-85 = "ชุดนั่นมันอะไรกัน..."
10039120-86 = "พวกเราก็ได้รับชุดพวกนี้มาทั้งๆ ที่ไม่รู้เหตุผลเหมือนกัน! นี่มันเกี่ยวกับ <ทรีนิตี้คาร์นิวัล> ด้วยเหรอ?"
10039120-87 = "หืม? หมายความว่ายังไง..."
10039120-92 = "อ้อ"
10039120-93 = "อ๋อ... แบบนี้สินะ..."
10039120-94 = "อะไรน่ะ?! พูดเหมือนรู้อะไรเลย?"
10039120-96 = "ทะ... ท่านหัวหน้ากรมฯ คะ? พวกเราต้องใส่ชุดนี้จริงๆ เหรอคะ?"
10039120-101 = "ใช่แล้วละ... ที่จริงมันเกี่ยวกับงานของสำนักรักษาความปลอดภัยในครั้งนี้น่ะ"
10039120-106 = "คะ? หมายความว่ายังไง..."
10039120-108 = "เพื่อเป็นการแลกเปลี่ยนเรื่องที่ได้รับการสนับสนุนขนมและอุปกรณ์ต่างๆ ที่ใช้ประจำวันของสำนักรักษาความปลอดภัยจะต้องมาจากบริษัทเอกชน ดังนั้นเจ้าหน้าที่ที่ถูกส่งไปที่งาน <ทรีนิตี้คาร์นิวัล> จะต้องสวมเครื่องแบบพิเศษนี้น่ะ "
10039120-109 = "ที่พวกเธอได้มาคงเป็นเครื่องแต่งกายที่ว่าน่ะ"
10039120-115 = "จุดประสงค์ก็คือการช่วยโปรโมตบริษัทเอกชน และปรับปรุงภาพลักษณ์ที่ไม่เป็นมิตรของวัลคิรี่..."
10039120-117 = "ภะ... ภาพลักษณ์ของวัลคิรี่ขึ้นอยู่กับพวกเรางั้นเหรอคะ!"
10039120-118 = "มันคือความรับผิดชอบที่ยิ่งใหญ่เกินไปหรือเปล่า แล้วมันก็ดูไม่เกี่ยวกับชุดด้วยนะ?"
10039120-119 = "อีกอย่าง คิดว่าภาพลักษณ์ที่เราสั่งสมกันมาตลอดจะเปลี่ยนแปลงได้ด้วยชุดแบบนี้น่ะเหรอ!"
10039120-121 = "แต่ชุดมันสวยกว่าที่คิดนะ... ฉันว่าไม่เป็นไรหรอก "
10039120-122 = "ก็จริงอยู่หรอกค่ะ พอดูๆ ไปแล้ว ได้ใส่ชุดนี้ก็น่ารักไปอีกแบบเหมือนกัน..."
10039120-123 = "สรุปว่าเป็นอย่างนี้ละ นี่เป็นการตัดสินใจของเบื้องบน ฉันเองก็คงทำอะไรไม่ได้ ขอโทษทีนะ"
10039120-124 = "หัวหน้ากรมฯ ไม่ได้ใส่เอง ก็พูดได้น่ะสิ!"
10039120-128 = "อ๊ะ สัญญาณมันขาดๆ แฮะ... ตื๊ด... ตื๊ด..."
10039120-133 = "ฮัลโหล? ฮัลโหล?!"
10039120-137 = "แกล้งทำเป็นไม่ได้ยินแล้ววางสายไปงั้นเหรอ! จริงๆ เลยเชียว!!"
10039120-138 = "อืม... สรุปว่าเราต้องใส่ชุดนี้จริงๆ สินะคะ"
10039120-139 = "แค่ถูกเลือกให้มาทำงานก็เซ็งจะแย่แล้ว แต่ยังต้องมาใส่ชุดน่ารักๆ... ไม่สิ ชุดเทอะทะๆ แบบนี้อีก เหลวไหลชะมัดเลย"
10039120-140 = "ถ้าต้องทำทุกอย่างตามที่สั่ง ฉันก็จะไม่ได้ใช้ชีวิตเกียจคร้านและสุขสบายน่ะสิ แบบนี้ต้องคว่ำบาตร!!"
10039120-144 = "(แล้วก็ถึงวันงานคาร์นิวัล...)"
10039120-158 = "..."
10039120-159 = "..."
10039120-164 = "เอ่อ... ไม่ทราบว่าห้องน้ำอยู่ทางไหนเหรอคะ?"
10039120-169 = "เดินไปทางซ้ายเลยค่ะ ห้องน้ำอยู่สุดทางเดินค่ะ!"
10039120-171 = "อ๊ะ ขอบคุณมากค่ะ"
10039120-178 = "สวัสดีค่ะ! ห้องรอสำหรับผู้เข้าประกวดช่วงที่ 2 อยู่ไหนเหรอคะ?"
10039120-179 = "ห้องรอสำหรับผู้เข้าประกวดช่วงที่ 2 คือห้อง 204 ถึงห้อง 212 ค่ะ! เลี้ยวขวาแล้วขึ้นไปก็จะเจอค่ะ!"
10039120-180 = "อ้อ ขอบคุณนะคะ สู้ๆ นะคะ"
10039120-181 = "นี่เป็นหน้าที่ของพวกฉันอยู่แล้วค่ะ ขอให้ได้ผลลัพธ์ที่ดีจากการประกวดนะคะ!"
10039120-186 = "ทำไมถึงยังทำหน้าที่ของสำนักรักษาความปลอดภัยอยู่อีกล่ะ... ตอนนี้พวกเรามาในฐานะผู้ร่วมงานนะ"
10039120-191 = "การบอกทิศทางแก่ชาวเมืองอย่างยินดีเป็นนิสัยของฉันไปแล้วค่ะ ฉันก็เผลอทำหน้าที่ไปโดยไม่#nรู้ตัวเหมือนกัน..."
10039120-192 = "จะว่าไป คนเมื่อกี้ถึงกับใส่ชุดกิโมโนมาประกวดไอดอลเลย แปลกจังเลยนะคะ"
10039120-193 = "คงไม่มีใครแปลกไปกว่าพวกเราที่ใส่ชุดโปรโมตร้านโดนัทมาแล้วละ"
10039120-194 = "เฮือก แต่ในเมื่อเราได้ใส่ชุดนี้แล้ว ก็คิดในทางที่ดีแล้วกันค่ะ"
10039120-195 = "เหอะ... จะให้คิดในทางที่ดีได้ยังไง?"
10039120-196 = "ในระยะเวลาสัญญา เราจะได้รับการสนับสนุนของว่างจากร้านอย่างไม่อั้นเลย คิดถึงเรื่องนี้ก็ได้ค่ะ..."
10039120-197 = "อ้อ แล้วถ้ามีเมนูใหม่ ทางร้านบอกว่าพวกเราจะได้ลองชิมก่อนด้วยนี่คะ"
10039120-198 = "นั่นมันก็ไม่ใช่เรื่องไม่ดีหรอกนะ..."
10039120-199 = "คิดไม่ถึงเลยว่าบริษัทเอกชนที่ว่าคือ 'มาสเตอร์โดนัท' ร้านประจำของฉัน... เฮ้อ... แบบนี้ก็ปฏิเสธไม่ได้น่ะสิ..."
10039120-200 = "เอาละ งั้นก็ไปลุยกันค่ะ! เพื่อรักษาระเบียบและความสงบเรียบร้อย! และเพื่อผลงานของพวกเรา!"
10039120-201 = "ขี้เกียจอะ..."
10039120-208 = "ขอเช็กชื่อนะคะ วง 'พริตตี้โดนัท โพลิซเกิร์ลส์' ค่ะ"
10039120-213 = "อ๊ะ พวกฉันเองค่ะ"
10039120-214 = "เป็นชื่อวงฟังกี่ครั้งก็ไม่คุ้นจริงๆ"
10039120-215 = "แต่ถึงอย่างนั้นก็ดีแล้วละนะ เพราะเราไม่ได้ถึงกับมาประกวด แต่มาแสดงสั้นๆ ในช่วงโปรโมตร้านก็#nเท่านั้นเอง"
10039120-216 = "ถึงจะเป็นการแสดงสั้นๆ แต่ก็สำคัญนะคะ แล้วเนื้อเพลงกับท่าเต้นก็บ่งบอกถึงความปลอดภัยด้วย!"
10039120-217 = "เราตั้งใจฝึกซ้อมกันมากเลยนี่คะ ฟุบุกิ!"
10039120-218 = "นั่นมันก็อีกเรื่อง แต่ฉันอายนี่นา... ทำไมถึงต้องโดนสั่งให้ทำอะไรแบบนี้ด้วยนะ..."
10039120-224 = "เฮ้อ ประหม่าจนปวดท้องเลย"
10039120-225 = "แย่แล้ว เป็นเรื่องใหญ่แล้วสินะคะ ลองหายใจเข้าลึกๆ ดูค่ะ..."
10039120-230 = "ขอเช็กรายชื่อนะคะ คุณนาคัตสึคาสะ คิริโนะ?"
10039120-234 = "ค่ะ! เจ้าหน้าที่คิริโนะ... ไม่สิ ฉันเองค่ะ!"
10039120-236 = "คุณเนมุคากิ ฟุบุกิ?"
10039120-238 = "ค่า ค่า..."
10039120-243 = "ชะ... ช่วยด้วยค่ะ..."
10039120-245 = "หืม...?"
10039120-254 = "เหวอ! อะไรเนี่ย! มีคนติดอยู่ในมาสคอตนี้นี่นา?!"
10039120-255 = "มีคนอยู่เหรอคะ? เป็นยังไงบ้างคะ?!"
10039120-265 = "อึกก... ขะ... ขอบคุณมากค่ะ..."
10039120-266 = "ทะ... ทำไมถึงเข้าไปอยู่ในนั้นได้คะ?"
10039120-267 = "เอ่อ... คือว่า... ใกล้จะถึงคิวฉันขึ้นไปซ้อมแล้ว แต่ฉันประหม่าขึ้นมาน่ะค่ะ..."
10039120-268 = "ฉันเข้าไปนั่งทำสมาธิหลังตุ๊กตาให้ไม่มีใครเห็น แต่ก็ทำโทรศัพท์ตก แล้วจังหวะที่ก้มไปเก็บ..."
10039120-269 = "เกือบได้เจ็บตัวก่อนการแสดงแล้วนะคะ..."
10039120-270 = "ขอบคุณที่เข้ามาช่วยไว้นะคะ ขอบคุณมากเลยค่ะ"
10039120-271 = "พวกคุณก็ประกวดไอดอลเหมือนกันใช่มั้ยคะ?"
10039120-276 = "อ่า พวกฉัน..."
10039120-277 = "เรื่องมันซับซ้อนน่ะ เอาเป็นว่าเรามีเหตุผลที่ต้องมาทำการแสดงนั่นแหละนะ"
10039120-278 = "ใช่ค่ะ เป็นอย่างนั้นละค่ะ...!"
10039120-280 = "งะ... งั้นสินะคะ โลกนี้มีหลากหลายเรื่องเลยนะคะ..."
10039120-281 = "ขอความสงบสุขจงอยู่กับพวกคุณนะคะ..."
10039120-286 = "จริงสิ ตอนนั้นขอบใจมากนะ"
10039120-287 = "เข้ามาช่วยได้เป็นอย่างดีเลยละ! "
10039120-289 = "ฮุฮุ ขอบคุณที่ทำงานหนักเพื่อปกป้องความปลอดภัยของคิโวทอสนะคะ"
10039120-290 = "แล้วฉันจะตั้งตาดูการแสดงที่ยอดเยี่ยมค่ะ หวังว่าจะได้เจอกันอีกนะคะ"
10039120-291 = "ค่ะ! พวกฉันก็จะรอดูการแสดงของคุณค่ะ! พยายามเข้านะคะ!"
10039120-297 = "คุณซิสเตอร์น่ารักจังเลยนะ"
10039120-298 = "นั่นสิคะ หรือว่าชมรมซิสเตอร์ก็อยากเปลี่ยนภาพลักษณ์เหมือนพวกเราคะ?"
10039120-299 = "เป้าหมายของทุกคนก็น่าจะคล้ายๆ กันนั่นละ แต่ดูชุดไอดอลที่จะเปลี่ยนภาพลักษณ์ที่เข้มงวดนี่สิ..."
10039120-300 = "ก็นะ ถึงตอนนี้พวกเราจะไม่ใช่สำนักรักษาความปลอดภัย แต่เป็นมาสคอตร้านโดนัทก็เถอะ"
10039120-301 = "แหะๆ... นั่นสินะคะ..."
10039120-305 = "จะว่าไป ตอนนี้ฟุบุกิดูผ่อนคลายขึ้นแล้วนะคะ"
10039120-309 = "หืม? นั่นสินะ ตอนนี้ฉันโอเคแล้วละ"
10039120-310 = "พอได้คุยกับซิสเตอร์คนเมื่อกี้ ฉันก็หายประหม่าไปโดยไม่รู้ตัวเลย"
10039120-311 = "ปกติพวกคุณซิสเตอร์จะรับฟังเรื่องกลุ้มใจของผู้คนด้วย การได้คุยกับเธออาจจะเป็นเรื่องที่ดีก็ได้นะคะ"
10039120-316 = "...เกิร์ลส์!"
10039120-317 = "'พริตตี้โดนัท โพลิซเกิร์ลส์'! ถ้าไม่อยู่ เราจะข้ามไปยังวงต่อไปเลยนะคะ!"
10039120-321 = "อ๊ะ!! อยู่ค่ะ! อยู่นี่ค่ะ!"
10039120-322 = "เตรียมตัวเลยค่ะ ฟุบุกิ! ถึงคิวพวกเราแล้วค่ะ!"
10039120-323 = "เฮ้อ... ในที่สุดก็ถึงเวลานี้สินะ..."
10039120-324 = "ลุกขึ้นเถอะค่ะ!! เร็วเข้าค่ะ!"
10039120-325 = "ค่า ค่า..."
10039120-337 = "(หลังจากจบงานคาร์นิวัล ร้านโดนัทที่สำนักรักษาความปลอดภัยช่วยโปรโมตให้ก็มียอดขายพุ่งเป็น 2 เท่า)"

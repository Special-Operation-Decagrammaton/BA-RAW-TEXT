[translation]
10039120-1 = "Afterword;Public Festival, Public Safety"
10039120-10 = "Kirino, did you hear?"
10039120-14 = "Hear what? If it's about the amendment to the Road Traffic Act, to accomodate the bidirectional surveillance cameras, I'm already aware."
10039120-15 = "Amendment? What? First I've heard of it."
10039120-16 = "Anyway, it's not that."
10039120-17 = "Trinity's holding a big festival."
10039120-22 = "Right, the Trinity Carnival!"
10039120-23 = "Heh, not like WE'RE going to have fun there. Every time there's a big event, the Public Safety Bureau sends out extra hands for security."
10039120-24 = "And yes, I checked, and that does include us."
10039120-25 = "Well, wherever citizens need protection, that's where we belong!"
10039120-26 = "Do you have to be so happy all the time? Just thinking about all that fun, right in front of me, out of my reach... It makes me tear up, that's what it does."
10039120-27 = "Well, maybe don't think of it that way."
10039120-28 = "I'd rather not think of it at all."
10039120-36 = "Hey there! Raise your hand if you've got a Trinity Carnival assignment."
10039120-37 = "We do!"
10039120-38 = "Great. I'll leave these costumes with you."
10039120-39 = "Huh? Costumes?"
10039120-40 = "I don't know. They just told me to pass 'em out."
10039120-44 = "Bye now. Take care!"
10039120-49 = "...Okay, there's a note on the package..."
10039120-54 = "\"Costumes for festival assignees.\""
10039120-55 = "Weird that they have these. Let's see..."
10039120-58 = "A little while later..."
10039120-63 = "Okay, seriously?!"
10039120-64 = "How does this help us do our jobs?! Can't we just go in uniform?"
10039120-65 = "I-I have no idea..."
10039120-69 = "Maybe there was a clerical error somewhere? Valkyrie has enough of those..."
10039120-70 = "Let me check with someone higher up and make sure..."
10039120-71 = "By \"someone higher up,\" you mean...?"
10039120-76 = "Public Peace Bureau, Director's office. How can I help you?"
10039120-80 = "Oh, is this the Public Safety Bureau?"
10039120-81 = "Director! I...need to know what's going on here."
10039120-85 = "Is this about the costumes?"
10039120-86 = "They just got dropped on my desk. Are they, like, official Trinity Carnival uniforms or something?"
10039120-87 = "Huh? What are you talking about?"
10039120-92 = "Ah."
10039120-93 = "Ah... So that's what that was..."
10039120-94 = "What is it?! Do you know something, Director?"
10039120-96 = "Are we REALLY supposed to wear these?"
10039120-101 = "...Listen, officer. This is part of the Public Safety Bureau's support assignment."
10039120-106 = "Huh? What do you...?"
10039120-108 = "In exchange for receiving all the support supplies and snacks from private companies, the personnel dispatched to the Trinity Carnival are required to wear special costumes."
10039120-109 = "So, yes, those are the ones."
10039120-115 = "We'll improve Valkyrie's...precarious public image to be something more approachable. While also promoting private companies."
10039120-117 = "So the responsibility for Valkyrie's image rests on OUR shoulders?"
10039120-118 = "Even if you don't factor in the costumes, isn't that WAY too much responsibility for just us two?"
10039120-119 = "You think we can change our whole image just by dressing up in pink this one time?"
10039120-121 = "They do look kind of good on you...don't you think?"
10039120-122 = "Well, yeah, they do..."
10039120-123 = "In any case, that's how it is. The higher-ups have spoken, and there's nothing I can do about it. I'm sorry."
10039120-124 = "Easy for you to say. YOU don't have to dress up!"
10039120-128 = "Sorry, you're breaking up... *crackle* Can't... hear..."
10039120-133 = "Hello? Hello??"
10039120-137 = "She cut us off. Thats just rude!"
10039120-138 = "...Well, I guess we really do have to wear these, then."
10039120-139 = "Getting sent out's bad enough. Having to go out in THIS is just nonsense."
10039120-140 = "Seriously, if we just keep doing everything we're told, it's going to be \"goodbye freedom, goodbye comfort.\" We ought to go on strike!"
10039120-144 = "(On the day of the festival...)"
10039120-158 = "..."
10039120-159 = "..."
10039120-164 = "Excuse me, which way is the restroom?"
10039120-169 = "End of the hallway, on your left."
10039120-171 = "Ah, thank you!"
10039120-178 = "Hi there, I'm looking for the waiting rooms for the second-round contestants."
10039120-179 = "You're looking for rooms 204 to 212! Turn right over there, and then go up."
10039120-180 = "Great, thanks for the help."
10039120-181 = "You're very welcome. Good luck!"
10039120-186 = "Why are you acting like a guide? We're going the same way. WE'RE contestants. ...Technically."
10039120-191 = "Force of habit. I'm just really used to guiding people."
10039120-192 = "That girl was wearing a kimono to the pop idol contest. Interesting choice."
10039120-193 = "Meanwhile, here we are, dressed up like donut mascots."
10039120-194 = "Well, since we ARE here, let's just try to think positively."
10039120-195 = "How? What's the bright side here?"
10039120-196 = "Well, remember, the sponsors are giving us infinite sweets while we're on the job."
10039120-197 = "And they said we get to taste the new ones first."
10039120-198 = "That's definitely not a DOWNside, but..."
10039120-199 = "Well... Yeah. It is Master Donut we're talking about. I can't say no to them."
10039120-200 = "That's the spirit! Let's represent with pride! For order and public safety! And for our performance reviews!"
10039120-201 = "Yeah, whatever..."
10039120-208 = "O-kay, next up... Are the \"Sweets Police\" here?"
10039120-213 = "Oh, it's us."
10039120-214 = "I'm still getting used to that name."
10039120-215 = "...Right, let's just get up onstage, give our little public service announcement, and be done with it."
10039120-216 = "It's a little more than a \"public service announcement.\" We're teaching safety rules through song and dance. It's important!"
10039120-217 = "Don't worry, you're ready. We've been practicing hard!"
10039120-218 = "That doesn't make it any less embarrassing. I can't believe they're making us do this..."
10039120-224 = "Ugh, I think I'm getting queasy..."
10039120-225 = "Uh-oh. Here, take a deep breath..."
10039120-230 = "Let me make sure I've got your names right. Nakatsukasa Kirino?"
10039120-234 = "Yes! That's me!"
10039120-236 = "Nemugaki Fubuki?"
10039120-238 = "Okay, okay..."
10039120-243 = "P-Please help me..."
10039120-245 = "Huh...?"
10039120-254 = "Oh crud, I think there's somebody squished in between them!"
10039120-255 = "Hey! Are you okay?!"
10039120-265 = "Ahh... Th-Thank you!"
10039120-266 = "No problem. What happened to you?"
10039120-267 = "Well, um...I got a little stage fright..."
10039120-268 = "...So I hid behind the mascot, just trying to catch my breath, and then I dropped my phone, so I bent down to pick it up, and the next thing I knew, I got sandwiched like you saw..."
10039120-269 = "Wow, glad we averted that disaster, at least."
10039120-270 = "Me too. Thank you. I really appreciate it."
10039120-271 = "Are you two going to be in the contest?"
10039120-276 = "...Sort of."
10039120-277 = "It's complicated..."
10039120-278 = "...and that's how we got roped into this."
10039120-280 = "I-I see... It really is a crazy world, isn't it?"
10039120-281 = "Let's hope for a little peace today..."
10039120-286 = "You're good at bringing peace."
10039120-287 = "Yeah, you were amazing!"
10039120-289 = "Heehee, well... Thank you for always working so hard to protect Kivotos's safety."
10039120-290 = "I'm sure you'll give a wonderful performance. Hope to see you again soon!"
10039120-291 = "We'll do our best. Take care!"
10039120-297 = "That's a cute look for a Sister."
10039120-298 = "It is, isn't it? I wonder if they want to change their image too."
10039120-299 = "Pop idol costumes, to transition out of a stuffy image. Small world."
10039120-300 = "I mean, I don't know how much this has to do with OUR image. We're representing a donut shop right now."
10039120-301 = "Haha, true..."
10039120-305 = "Are you feeling a little better, Fubuki?"
10039120-309 = "...Now that you mention it, yeah, I think I am."
10039120-310 = "I think talking to the Sister helped me loosen up, you know?"
10039120-311 = "Well, the Sisters do hear confessions, so I guess they make good counselors."
10039120-316 = "...Police!"
10039120-317 = "Sweets Police! Are you ready, or what? Get out there, or we're gonna skip you!"
10039120-321 = "Yikes! We're here! We're ready!"
10039120-322 = "Okay, Fubuki, it's our time to shine!"
10039120-323 = "Haah... The time has come..."
10039120-324 = "Hey, come on, no sitting down now! We've gotta move!"
10039120-325 = "Okay, okay..."
10039120-337 = "After the Public Safety Bureau girls' promotional public service announcement, sales at the donut shop doubled."

21190-85 = "(ติ๊ง)"
21190-86 = "<kirakiraNO1: ตอนได้เล่นเกมนี้ทำให้ฉันคิดเป็นครั้งแรกว่าเกมคือโรคร้าย#nมันเจ็บปวดตลอดการเล่นเลย แต่ทำไมกันนะ... รู้ตัวอีกทีก็โหลดเกมมาเล่นอีกแล้ว>"
21190-87 = "ยอดไปเลย! มีคนคาดหวังกับเกมของเราด้วย!"
21190-88 = "อืม..... โดยรวมแล้วทุกคนคาดหวังและตื่นเต้นเหมือนกับว่ากำลังดึงระเบิดเวลาที่ยังไม่ได้เปิดเลยล่ะ"
21190-89 = "หรือมันคือจิตวิทยานะ... เหมือนที่เราอยากลองเหยียบกับระเบิดแม้จะรู้ว่ามันคือระเบิดไงล่ะ..."

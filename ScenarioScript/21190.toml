21190-79 = "มันก็แค่คำพูดของคนที่ยังไม่ได้เล่นเกม... ไม่ต้องใส่ใจมากหรอก"
21190-80 = "(ติ๊ง)"
21190-81 = "<Kotoha0507: ถึงภาคแรกจะล้มเหลวไม่เป็นท่า แต่ก็ไม่ใช่เกมทั่วไปที่ไม่มีอะไรใหม่#nฉันคาดหวังแล้วล่ะว่าภาค 2 จะมีความแปลกใหม่ที่พัฒนาขึ้นยังไงบ้าง>"

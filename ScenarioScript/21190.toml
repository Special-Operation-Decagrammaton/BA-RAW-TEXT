[translation]
21190-1 = "第19話;Double O"
21190-2 = "千年．遊戲開發部"
21190-4 = "姐姐！還沒好嗎！？"
21190-5 = "等，等一下，別催我嘛！只要把這個輸入進去就好了……！"
21190-6 = "只剩下2分鐘了喔！？不可能不催你吧！"
21190-7 = "準確來說是96秒，說完就剩下92秒……"
21190-8 = "我，我知道我知道啦！已經做好了！"
21190-12 = "我這邊簡單做一下測試……嗯。"
21190-13 = "沒有出現錯誤，桃井！"
21190-14 = "OK！開始上傳檔案，預計上傳時間……15秒！愛麗絲，我們還剩幾秒！？"
21190-15 = "剩下19秒……！"
21190-16 = "拜，拜託了……！"
21190-20 = "傳送完成……"
21190-22 = "千年大賞的報名已完成。"
21190-23 = "趕上啦啊啊啊啊啊！"
21190-24 = "真是驚險……心臟差點就停了……"
21190-25 = "接下來……就是等3天後的結果發表了，對吧。"
21190-26 = "雖然總算是趕上了，但結果還沒出來。"
21190-27 = "3天後……就會決定我們能不能繼續待在這個社團活動室了。"
21190-28 = "……但3天其實挺長的吧？所以說我有一個提案。"
21190-29 = "在那之前，先把網頁版的《故事．傳說．編年史２》上傳上去怎麼樣？"
21190-31 = "！？"
21190-32 = "為，為什麼？"
21190-33 = "我等不了3天了！而且，比起評審的評價，你們不想先看看玩家的反應嗎？"
21190-34 = "唔嗯，可是好像有點害怕……好擔心又是負評。"
21190-35 = "你在說什麼啊！本來我們也不[ruby= ・     ・ ]只是[/ruby]為了千年大賞才做這個遊戲的吧！"
21190-36 = "拿出自信，讓他們看看吧！我們也是盡了全力的！"
21190-37 = "這，這麼說也沒錯啦……"
21190-38 = "……嗯，就上傳吧。"
21190-39 = "咦？"
21190-40 = "我想所謂的作品……就是因為有了看的人、玩的人，才能算是真正的完成了吧。"
21190-41 = "我想要……讓我們的遊戲，好好地被完成。"
21190-42 = "柚子醬……"
21190-43 = "沒問題的。就算和之前一樣負評滿天飛……"
21190-44 = "我們也盡力了。況且……有大家在的話，一定能承受住的。"
21190-46 = "我已經，不要緊了。"
21190-48 = "……"
21190-49 = "那麼我現在就上傳──！"
21190-50 = "啊！等，等一下！我還沒做好心理準備……！"
21190-52 = "上傳完成！要收到遊玩感想至少也要2、3個小時，等等就休息一下吧！"
21190-53 = "……哈啊，也對呢。"
21190-55 = "……"
21190-57 = "……"
21190-58 = "嗯？愛麗絲？為什麼要坐在電腦前面？"
21190-59 = "正在待機。"
21190-60 = "大家好像都開始下載了，我很在意。"
21190-61 = "就算立刻開始玩也需要一點時間，我想就算坐在那裡等也不會馬上就有回覆的唷？"
21190-62 = "嗯，就算如此我也想等。"
21190-63 = "我，我也是……"
21190-64 = "反正我也緊張得睡不著……"
21190-65 = "我也想等。"
21190-66 = "……嗯。"
21190-67 = "糟糕，害我也緊張起來了。"
21190-68 = "我也是擔心得不得了啊……#n嗚嗚，明明剛才是我自己那麼說的，卻還是緊張到不行啊！"
21190-69 = "（叮咚）"
21190-70 = "啊，有第一個評價了！"
21190-71 = "寫什麼！？寫了什麼！？"
21190-72 = "＜hermet021：哦？這是之前拿到垃圾遊戲第一名的那個遊戲的續作嗎？#n　我還以為已經放棄做遊戲了咧，看來還是學不乖啊＞"
21190-73 = "……"
21190-74 = "愛，愛麗絲，這種東西不用太在意……"
21190-75 = "……"
21190-76 = "聯絡真紀，對著那個IP的方位，讓他嚐嚐最高火力的光束砲。"
21190-77 = "不，不能那樣啦！"
21190-78 = "……沒事的。"
21190-79 = "對那種連遊戲都沒玩的人的言論……不需要在意，好嗎？"
21190-80 = "（叮咚）"
21190-81 = "＜Kotoha0507：前作《TSC》確實不是個可以放心稱讚的作品。#n　但多少還是有點新意的，至少不是那種爛大街的平庸作品。#n　我很期待這次的二代能夠帶來什麼樣的新東西＞"
21190-82 = "哦，慢慢開始有認真的回應了……"
21190-83 = "（叮咚）"
21190-84 = "＜QueenC：那麼，這次會出現什麼牛鬼蛇神呢……既然都出續作了，#n　希望別是什麼中庸的作品，不管是神作還是爛作我都很期待遊玩的體驗喔＞"
21190-85 = "（叮咚）"
21190-86 = "＜kirakiraNO1：雖然有玩過前作，但實在沒有留下什麼好的印象。#n　不如說現在還清楚地記得那些痛苦的回憶。#n　但究竟是為什麼呢……明明知道是續作還是忍不住下載了＞"
21190-87 = "好，好厲害！總覺得我們的遊戲期待很高啊！？"
21190-88 = "整體看起來有點像是「開心地拆炸彈」的感覺……"
21190-89 = "我看到了可怕的東西，各位……"
21190-91 = "（叮咚，叮咚）"
21190-92 = "＜cat0808：2小時後補習班就要考試了……但比起那個我更想現在就開始玩啊＞"
21190-93 = "＜You-me：考試什麼的之後要多少有多少。#n　但玩這個遊戲最好的時機就只有剛上架的現在而已啊！＞"
21190-94 = "呃，可以的話……我覺得還是去考試比較好吧……"
21190-95 = "下，下載數已經超過2000了！？這有點奇怪了吧！？"
21190-96 = "啊……有個有名的入口網站上刊登了我們發表遊戲的新聞的樣子。"
21190-97 = "哇啊啊啊……！我還想說只要不是沒人在乎就好了！#n沒想到竟然能夠達到這種下載數，突然有點害怕了！"
21190-100 = "……"
21190-101 = "……好緊張。"
21190-102 = "唔！又期待又擔心，心臟好像快要爆炸了！"
21190-103 = "（咚哐──！）"
21190-104 = "！？"
21190-105 = "心，心臟真的爆炸了嗎？"
21190-106 = "不，不是我的心臟！"
21190-107 = "那是什麼……！遊戲機爆炸了！？"
21190-108 = "是，是開機太久了嗎……？"
21190-109 = "才不是！這個砲擊是13.97mm砲……是花凜前輩！"
21190-110 = "（碰咚──！）"
21190-111 = "呀啊！？"
21190-112 = "確認到遠距離攻擊，來自活動室11點鐘方向！距離，大約1公里……！"
21190-113 = "是，是來報仇的！？"
21190-114 = "開始反擊！"
21190-115 = "不，愛麗絲，先離開這裡吧！在這裡戰鬥的話會把老師捲進來的，而且……"
21190-116 = "再這樣戰鬥下去的話，活動室會壞掉的！"
21190-117 = "姐姐……"
21190-118 = "外，外面還有學生會的人……！是來報「鏡子」那件事的仇的嗎……！？"
21190-119 = "是，是有一點不好意思啦……！"
21190-120 = "噫，又來了！"
21190-121 = "[s1] 「冷靜點。」\n[s2] 「趁他們在換子彈的時候，我們趕快到外面去吧。」"
21190-122 = "老師……！"
21190-123 = "老師……！"
21190-124 = "是！"
21190-125 = "愛麗絲，我和柚子負責前線！"
21190-126 = "好的。"
21190-127 = "愛麗絲會保護老師和大家的。"
21190-129 = "好，上吧！！"

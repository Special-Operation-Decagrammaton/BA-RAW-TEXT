21190-76 = "ติดต่อมากิ ฉันจะไปปล่อยลำแสงบีมใส่บ้านเจ้าของ IP นั้นสักหน่อย เดี๋ยวกลับมานะคะ"
21190-77 = "ทำแบบนั้นไม่ได้นะ!"

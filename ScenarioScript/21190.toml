[translation]
21190-1 = "第19話;ダブルオー"
21190-2 = "ミレニアム・ゲーム開発部"
21190-4 = "お姉ちゃん！まだ！？"
21190-5 = "ま、待って、急かさないで！あとこれだけ入力すれば終わりだから……！"
21190-6 = "あと2分だよ！？急かさずにはいられないって！"
21190-7 = "正確には96秒です、そう言ってる間に残り92秒……"
21190-8 = "わ、分かった分かった！もうできたから！"
21190-12 = "こっちは簡単なテストだけやって……うんっ。"
21190-13 = "エラーは出てない、モモイ！"
21190-14 = "オッケー！ファイルをアップロード、完了まで予想時間……15秒！アリス、あと何秒！？"
21190-15 = "残り19秒です……！"
21190-16 = "お、お願い……！"
21190-20 = "転送完了……"
21190-22 = "ミレニアムプライスへの参加受付が完了しました。"
21190-23 = "間に合ったああぁぁあ！"
21190-24 = "ギリギリ……心臓止まるかと思った……。"
21190-25 = "あとは……3日後の発表を待つだけ、だね。"
21190-26 = "とりあえず間に合ったけど、まだ結果が出たわけじゃない。"
21190-27 = "3日後には……このままこの部室にいられるのか、そうじゃないのかが決まる。"
21190-28 = "……でも3日って結構長いじゃん？そこで提案なんだけどさ、"
21190-29 = "先に、web版の『テイルズ・サガ・クロニクル２』をアップロードしてみるのはどう？"
21190-31 = "！？"
21190-32 = "ど、どうして？"
21190-33 = "3日間も待てないよ！それに、審査員の評価より先に、ユーザーの反応を見たくない！？"
21190-34 = "うーん、でもちょっと怖いかも……低評価コメントも心配だし。"
21190-35 = "何言ってるのさ！そもそも、ミレニアムプライスに出品するため[ruby=・・]だけ[/ruby]に作ったゲームじゃないでしょ！"
21190-36 = "自信を持って、見てもらおうよ！私たちはベストを尽くしたんだから！"
21190-37 = "そ、それはそうだけど……。"
21190-38 = "……うん、アップしよう。"
21190-39 = "え？"
21190-40 = "作品っていうのは……見てくれる人、遊んでくれる人がいてこそ、完成されるものだと思うから。"
21190-41 = "わたしは……わたしたちのゲームを、きちんと完成させたい。"
21190-42 = "ユズちゃん……。"
21190-43 = "大丈夫。もし前みたいに、低評価コメントのオンパレードになったとしても……。"
21190-44 = "全力で頑張ったから。それに……みんなが一緒だから、きっと受け止められる。"
21190-46 = "わたしはもう、大丈夫。"
21190-48 = "……。"
21190-49 = "それじゃあ今すぐアップロードー！"
21190-50 = "ああっ！ま、待って！心の準備が……！"
21190-52 = "転送完了！プレイして感想が貰えるまで少なくとも2、3時間はかかるだろうし、後はしばしの休憩ってことで！"
21190-53 = "……はあ、そうだね。"
21190-55 = "……。"
21190-57 = "……。"
21190-58 = "ん、アリス？なんでコンピューターの前に座ってるの？"
21190-59 = "待機します。"
21190-60 = "みなさんがダウンロードを始めたようです、気になります。"
21190-61 = "これからゲームをプレイするのにまた時間がかかるだろうし、待っててもそんなにすぐは来ないと思うよ？"
21190-62 = "はい、それでも待ちます。"
21190-63 = "わ、わたしも……。"
21190-64 = "どっちにしろ、緊張で眠れないし……。"
21190-65 = "わたしも、待ってる。"
21190-66 = "……うん。"
21190-67 = "ダメ、私もドキドキしてきちゃった。"
21190-68 = "私は心配でドキドキが止まらないよ……うぅっ、自分で言い出したのに緊張でおかしくなりそう！"
21190-69 = "（ピロン）"
21190-70 = "あっ、初コメ。"
21190-71 = "何て！？何て！？"
21190-72 = "＜hermet021：わお、これ前回クソゲーランキング1位を取った、あれの続編？もうゲーム作りはやめたと思ってたけど、懲りないねえ＞"
21190-73 = "……。"
21190-74 = "あ、アリス、こういうのはあんまり気にせず……"
21190-75 = "……。"
21190-76 = "マキに連絡。該当IPアドレスの方角に対して、最大出力のビーム砲を食らわせてきます。"
21190-77 = "そ、それはダメ！"
21190-78 = "……大丈夫。"
21190-79 = "ゲームをやってもいない人の発言だから……気にしないで、ね？"
21190-80 = "（ピロン）"
21190-81 = "＜Kotoha0507：前回の『TSC』は確かに、手放しで賞賛できる作品ではなかったかもしれません。ですが新鮮味があり、少なくともありふれた作品ではありませんでした。今回の2ではどんな目新しさを見せてくれるのか、楽しみです＞"
21190-82 = "おっ、徐々にちゃんとした反応が……。"
21190-83 = "（ピロン）"
21190-84 = "＜QueenC：さて、鬼が出るか蛇が出るか……せっかくなら中庸なんかじゃなくて、たとえどっち側だったとしても、振り切った体験を期待したいね＞"
21190-85 = "（ピロン）"
21190-86 = "＜kirakiraNO1：前作はやったけど、良い思い出としては残ってない。それどころか苦い記憶がいくつも鮮明に思い出せるくらい。でも、どうしてかな……続編だって知ってるのに、ついダウンロードしちゃった＞"
21190-87 = "す、すごい！なんか私たちのゲーム、めちゃくちゃ期待されてない！？"
21190-88 = "全体的になんか、「時限爆弾を楽しそうに解除しようとしてる」感じっていうか……。"
21190-89 = "怖いもの見たさ、みたいな……。"
21190-91 = "（ピロン、ピロン）"
21190-92 = "＜cat0808：2時間後に補習でテストがあるんだけど……そんなことより今はこのゲームがやりたい気分＞"
21190-93 = "＜You-me：テストなんてこれから先、いくらでもあるじゃん。これを遊ぶ最高のタイミングは、アップされたばっかりの今だけなんだよ！＞"
21190-94 = "えっと、それはできれば……テストを受けに行ってほしいかも……。"
21190-95 = "だ、ダウンロード数がもう2000を超えてる！？さすがにおかしくない！？"
21190-96 = "あ……有名なポータルサイトに、私たちのゲームが発表されたって記事が載ったみたい。"
21190-97 = "うわあぁぁ……！無関心じゃなければ良いな、くらいに思ってたのに！ここまで数が増えると急に怖くなってきた！"
21190-100 = "……。"
21190-101 = "……ドキドキします。"
21190-102 = "うぅっ！期待と不安で、心臓が爆発しそう！"
21190-103 = "（ドカアアァァァン！）"
21190-104 = "！？"
21190-105 = "ほ、本当に心臓、爆発しちゃったんですか？"
21190-106 = "ち、違う！私の心臓じゃない！"
21190-107 = "いったい何の……！ゲーム機が爆発！？"
21190-108 = "え、長時間やり過ぎたかな……？"
21190-109 = "違う！この砲撃は13.97mm砲……カリン先輩の！"
21190-110 = "（ドゴオォォォン！）"
21190-111 = "ひゃっ！？"
21190-112 = "遠距離攻撃を確認、部室正面に対して11時の方角！距離、約1km……！"
21190-113 = "ぜ、前回の仕返し！？"
21190-114 = "反撃を開始します！"
21190-115 = "ううん、アリス、一旦出よう！ここだと先生を巻き込んじゃうし、それに……。"
21190-116 = "このままここで戦ったら、私たちの部室が壊れちゃう！"
21190-117 = "お姉ちゃん……。"
21190-118 = "そ、外に生徒会の人たちも……！「鏡」の件の報復……！？"
21190-119 = "ちょ、ちょっとは申し訳ないと思ってたけど……！"
21190-120 = "ひぃっ、また来る！"
21190-121 = "[s1] \"落ち着いて。\"\n[s2] \"リロードしてるうちに、とにかく外へ出よう。\""
21190-122 = "先生……！"
21190-123 = "先生……！"
21190-124 = "はいっ！"
21190-125 = "アリス、私とユズが前に立つ！"
21190-126 = "はい。"
21190-127 = "アリスは、先生とみんなを守ります。"
21190-129 = "よし、行こう！！"

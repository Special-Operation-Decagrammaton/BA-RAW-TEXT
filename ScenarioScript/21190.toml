21190-92 = "<cat0808:เอาละ อีก 2 ชั่วโมงจากนี้ฉันต้องไปฝึกทำข้อสอบ หรือไม่ก็เล่น TSC 2 ระหว่าง 2 อย่างนี้ ฉันเลือก... TSC 2>"
21190-93 = "<Yousee-me: ของมันแน่อยู่แล้วไม่ใช่เหรอ? ข้อสอบไว้ไปทำเมื่อไหร่ก็ได้#nแต่ไม่ได้เล่น TSC 2 ตั้ง 2 ชั่วโมงใครจะไปทนได้!>"

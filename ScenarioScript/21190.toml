21190-71 = "ไหนๆ? ว่าไงบ้าง?"
21190-72 = "<hermet021: นี่มันเจ้าของรางวัลเกมยอดแย่ที่ 1 ของปีนี้นี่นา นึกว่าจะเลิกทำเกมไปแล้วซะอีก#nยังกล้ามาปล่อยภาคต่ออีกเหรอ? 5555>"

[translation]
21190-1 = "ตอนที่ 19;ดับเบิ้ลโอ"
21190-2 = "ชมรมพัฒนาเกมมิลเลเนียม"
21190-4 = "พี่โมโมอิ! ยังไม่เสร็จอีกเหรอ?!"
21190-5 = "อย่ามาเร่งกันสิ แค่พิมพ์ตรงนี้ก็เสร็จแล้ว..."
21190-6 = "เหลืออีกแค่ 2 นาทีเอง จะไม่ให้เร่งได้ยังไงล่ะ!"
21190-7 = "ที่ถูกต้องคือเหลือแค่ 96 วินาทีค่ะ พอประโยคนี้จบก็จะเหลือ 92 วินาที..."
21190-8 = "ระ... รู้แล้วน่า! เสร็จแล้ว เสร็จแล้ว!"
21190-12 = "ส่วนตรงนี้ก็เทสแบบง่ายๆ เอา... โอเค"
21190-13 = "ไม่เจอบั้กเลยโมโมอิ!"
21190-14 = "โอ้! โอเคเลย! งั้นส่งละนะ! อัปโหลดไฟล์! ใช้เวลาส่งประมาณ 15 วินาที! อาริสึ!"
21190-15 = "เหลือเวลาอีก 19 วินาที..."
21190-16 = "ขะ... ขอร้องล่ะ..."
21190-20 = "สะ... ส่งเสร็จแล้ว"
21190-22 = "ส่งผลงานเข้าร่วมนิทรรศการรวมผลงานมิลเลเนียมไพรซ์แล้ว"
21190-23 = "ทำได้แล้วววว!"
21190-24 = "เฮ้อ... หวุดหวิดเลย"
21190-25 = "จากนี้ก็เหลือแค่รอฟังผลในอีก 4 วันใช่ไหม?"
21190-26 = "เราทำสำเร็จตามกำหนดการก็จริง แต่ว่ายังไม่รู้ผลลัพธ์หรอกนะ"
21190-27 = "ในอีก 4 วันเราจะได้รู้กันว่าเราจะถูกไล่ออกจากห้องนี้หรือว่าจะได้อยู่ต่อ"
21190-28 = "เพราะงั้นฉันก็เลยอยากเสนออะไรหน่อยน่ะ"
21190-29 = "เราใช้เวลาที่เหลือมาอัปโหลดเทลส์ ซาก้า โครนิเคิล 2 ลงบนเว็บกันดีไหม?"
21190-31 = "?!"
21190-32 = "หืม? ทำไมล่ะ?!"
21190-33 = "ไม่อยากดูผลตอบรับจากคนอื่นก่อนการประเมินของคณะกรรมการกันเหรอ?!"
21190-34 = "อืม ถึงอย่างนั้นก็เถอะ... มันออกจะน่ากลัวอยู่นะ ถ้ามีคอนเมนต์แย่ๆ อีกล่ะ?"
21190-35 = "พูดอะไรแบบนั้นล่ะ! เราไม่ได้ตั้งใจทำเกมนี้เพื่อเล่นสนุกกันเองหรือเพื่อลงประกวด#nในงานมิลเลเนียมไพรซ์ตั้งแต่แรกอยู่แล้วนี่นา!"
21190-36 = "มั่นใจในผลงานหน่อย! พวกเราทุ่มกันสุดตัวแล้วนะ!"
21190-37 = "มันก็จริงอยู่หรอก..."
21190-38 = "อัปโหลดเลย..."
21190-39 = "หืม?"
21190-40 = "สิ่งที่เรียกว่าผลงาน ก็ต้องได้รับการประเมินจากคนอื่นถึงจะเสร็จสมบูรณ์"
21190-41 = "และฉัน… ก็อยากให้เกมของพวกเราสมบูรณ์ด้วย"
21190-42 = "ยูสึจัง..."
21190-43 = "ไม่เป็นไรหรอก ถึงจะมีคนแห่มาคอนเมนต์แย่ๆ เหมือนคราวที่แล้วอีก..."
21190-44 = "แต่เราก็ทำเต็มที่แล้ว และฉันก็... ได้อยู่กับพวกเธอแล้ว... ไม่ว่าจะออกมาเป็นยังไงฉันก็รับได้"
21190-46 = "ฉันไม่เป็นไรจริงๆ"
21190-48 = "......"
21190-49 = "งั้นจะอัปโหลดเลยนะ!"
21190-50 = "อ๊ะ! เดี๋ยวก่อนๆ!"
21190-52 = "ส่งไฟล์สำเร็จ! กว่าจะมีคนเข้ามาคอมเมนต์ก็น่าจะต้องใช้เวลาสัก 2-3 ชั่วโมง#nระหว่างนี้เรามาพักกันหน่อยดีไหม?"
21190-53 = "เฮ้อ... เอาสิ"
21190-55 = "......"
21190-57 = "... (พรึ่บ) "
21190-58 = "หืม? อาริสึ? ทำไมไปนั่งหน้าคอมพิวเตอร์ล่ะ?"
21190-59 = "กำลังรอค่ะ"
21190-60 = "คนอื่นเริ่มดาวน์โหลดเกมไปเล่นแล้ว อาริสึก็เลยสงสัยน่ะค่ะ"
21190-61 = "ถึงจะนั่งรอ แต่เราก็คงไม่ได้รีวิวหรือฟีดแบกที่จริงใจจากคนที่ตั้งใจเล่นเกมจริงๆ หรอก"
21190-62 = "ฉันจะรอค่ะ"
21190-63 = "...... ฉันก็ด้วย ......"
21190-64 = "ยังไงก็กลัวจนนอนไม่หลับอยู่ดีน่ะ"
21190-65 = "ขอรอด้วยดีกว่า"
21190-66 = "อืม...."
21190-67 = "ฉันก็เริ่มตื่นเต้นแล้วเหมือนกัน"
21190-68 = "เฮ้อ จริงๆ ต้องบอกว่ากังวลมากกว่าตื่นเต้นสิ เป็นคนเสนอให้อัปโหลดเองแท้ๆ#nแล้วจะมากังวลทำไมนะ!"

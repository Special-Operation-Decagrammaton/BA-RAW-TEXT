80000065-32 = "3;아카네;03;……전혀 이상할 것 없는, 순수한 발렌타인 초콜릿이니까요.\n#3;em;[음표]\n#3;greeting\n#3;a"
80000065-33 = "[s1] \"수제 초콜릿이다.\"\n[s2] \"직접 만든 거야?\""
80000065-34 = "3;아카네;01;후훗. 알아봐 주시는군요. 기쁜걸요.\n#3;em;[재잘]"
80000065-35 = "3;아카네;01;후훗. 알아봐 주시는군요. 기쁜걸요.\n#3;em;[재잘]"
80000065-36 = "3;아카네;02;네, 맞습니다. 늘 에이전트로서 활동하는 모습만 보여 드리는 것 같지만……. 이래 봬도 저 또한 엄연히 메이드니까요."
80000065-37 = "3;아카네;03;메이드로서, 이 정도는 기본 소양이죠. 저 스스로 만드는 걸 즐겨 하기도 하고요."
80000065-38 = "3;아카네;02;그래서 오늘 같은 날을 꽤 좋아한답니다. 자연스럽게 이런 일을 할 수 있는 이유가 돼 주잖아요?\n#3;em;[...]"
80000065-39 = "[s] \"……아카네?\""
80000065-40 = "3;아카네;01;음……. 그러네요……. 말하고 보니 조금 더 생각이 깊어지는걸요.\n#3;greeting"
80000065-41 = "3;아카네;02;후훗. 오늘은 어쩌면 메이드와 주인님보단, 학생과 선생님의 관계이고 싶은 것 일지도요."
80000065-42 = "3;아카네;03;……그래도 괜찮을까요? 선생님.\n#3;em;[///]\n#3;stiff"
80000065-43 = "[s3] \"물론이지. 아카네는 내 학생이잖아.\"\n[s4] \"아카네는 늘 내 소중한 학생이야.\""
80000065-44 = "3;아카네;04;……어머나.\n#3;em;[?!]\n#3;shake"
80000065-45 = "3;아카네;04;……어머나.\n#3;em;[?!]\n#3;shake"
80000065-46 = "3;아카네;06;이것은 또 조금……. 약간 시간을 끌면서 그 말씀을 유도하고 싶었던 건데 말이죠……."
80000065-47 = "3;아카네;01;오히려 즉석에서 말해 주시니 조금 당황스럽네요. 너무 쉽게 목적을 달성해버렸달까요?"
80000065-48 = "3;아카네;02;……후훗. 감사합니다. 선생님.\n#3;greeting"
80000065-49 = "3;아카네;03;……그리고 앞으로도, 잘 부탁드립니다.\n#3;em;[반짝]"

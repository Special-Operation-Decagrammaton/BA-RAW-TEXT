80000065-14 = "3;아카네;01;……음? 주인님?\n#3;em;[?]\n#3;shake"
80000065-15 = "3;아카네;02;어라……. 이상하네요. 왜 긴장하고 계시는 건가요?"
80000065-16 = "3;아카네;05;……네?\n#3;stiff"
80000065-17 = "3;아카네;04;……폭탄……이요?\n#3;em;[땀]"

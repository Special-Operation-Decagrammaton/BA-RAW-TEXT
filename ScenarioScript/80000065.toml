80000065-6 = "3;아카네;01;……어라. 역시 여기 계셨군요. 주인님.\n#3;em;[반응]\n#3;a"
80000065-7 = "3;아카네;99;사무실에 안 계시길래 여기 계실 거라 생각하고 있었습니다만……."
80000065-8 = "3;아카네;03;……후후훗. 네 맞아요. 오늘은 발렌타인 데이니까요.\n#3;em;[음표]"
80000065-9 = "3;아카네;02;평소 늘 저희들을 위해 고생해 주시는 주인님을 위해, 소소한 선물을 가져온 것이랍니다."
80000065-10 = "3;아카네;99;여기 이 가방 안에……."

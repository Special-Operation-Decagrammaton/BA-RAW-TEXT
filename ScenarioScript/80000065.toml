[translation]
80000065-1 = "像個女僕"
80000065-6 = "……哎呀，您果然在這裡呢。主人。"
80000065-7 = "因為您不在辦公室，所以稍微花了些時間找您。"
80000065-8 = "……呵呵。是的，因為今天是情人節呀。"
80000065-9 = "為了平時總是為了我們而努力的主人，準備了一些不成敬意的小禮物。"
80000065-10 = "就在這個包包裡……"
80000065-14 = "……主人？"
80000065-15 = "怎麼了嗎？"
80000065-16 = "……您很緊張？為什麼呢？"
80000065-17 = "……炸彈？"
80000065-22 = "啊啊，原來如此……"
80000065-23 = "不，該道歉的是我才對。都是因為我平時的所作所為……"
80000065-24 = "不過就算是我，也不會在這種日子拿出炸彈的。"
80000065-25 = "不過確實，這包包裡平常都裝著C4之類的東西……"
80000065-26 = "看來我得反省了呢。至少今後在主人面前我會稍微克制一點的。"
80000065-27 = "所以請主人別擔心。要拿出來的當然是……"
80000065-32 = "巧克力囉。"
80000065-33 = "[s1]「啊，難道是自己做的……？」\n[s2]「是朱音親手做的嗎？」"
80000065-34 = "呵呵，您注意到了嗎？"
80000065-35 = "呵呵，您注意到了嗎？"
80000065-36 = "是的，沒錯。最近好像只讓主人看到我進行特務工作時的樣子……#n但別看我這樣，我也是無庸置疑的女僕。"
80000065-37 = "身為女僕，這是基本的素養。而且我本來就喜歡做甜點。"
80000065-38 = "所以我還挺喜歡這種日子的。那麼就將這個送給主人……"
80000065-39 = "[s]「……朱音？」"
80000065-40 = "不，雖然這樣也沒什麼不好……"
80000065-41 = "但今天比起女僕與主人……也許我更希望是以一名學生的身分送給老師。"
80000065-42 = "……即使如此，您也願意收下嗎？"
80000065-43 = "[s3]「當然。」\n[s4]「朱音也是我重要的學生。」"
80000065-44 = "哎呀哎呀……"
80000065-45 = "哎呀哎呀……"
80000065-46 = "呵呵。我本來以為要聽到這句話還需要多花點時間的呢……"
80000065-47 = "不愧是您呢。好像反而變成是我比較害羞了。"
80000065-48 = "……謝謝您，老師。"
80000065-49 = "今後也務必請您多多指教哦？"
80000065-51 = "（之後和朱音兩人一起吃著巧克力，度過了一段優雅的時間）"
80000065-56 = "（朱音做的巧克力的美味程度，無論與任何高級品相比都毫不遜色）"

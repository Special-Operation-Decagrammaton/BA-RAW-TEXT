80000065-21 = "3;아카네;06\n#3;em;[속상함]\n#3;stiff\n#wait;2000"
80000065-22 = "3;아카네;06;어라라……. 이건 조금…….\n#3;greeting"
80000065-23 = "3;아카네;03;죄송합니다. 아마도 제 평소 행실에서 주인님께 오해를 불러일으킬 만한 게 있었나 보군요."
80000065-24 = "3;아카네;06;아무리 저라도, 이런 날 주인님 앞에서 대뜸 그런 걸 꺼내 들진 않지요.\n#3;em;[땀]"
80000065-25 = "3;아카네;04;그치만 확실히……. 이 가방도 평소에는 C4나 다이너마이트들을 담아두는 가방이니……."
80000065-26 = "3;아카네;01;이건 제가 반성해야겠군요. 앞으로 적어도 주인님 앞에서만큼은 조금 자제하도록 하겠습니다."
80000065-27 = "3;아카네;02;그러니 걱정하실 일은 전혀 없답니다. 여기 이렇게……."
80000065-28 = "#st;[0,0];instant;1;"

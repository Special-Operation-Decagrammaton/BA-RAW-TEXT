[translation]
80000065-1 = "ฝีมือของเมด"
80000065-6 = "เอ๊ะ... อยู่ที่นี่เองสินะคะ นายท่าน"
80000065-7 = "พอไม่เห็นนายท่านที่สำนักงานก็เลยคิดว่าต้องมาอยู่ที่นี่แน่ๆ..."
80000065-8 = "ฮุฮุฮุ... ใช่แล้วค่ะ วันนี้เป็นวันวาเลนไทน์นี่คะ"
80000065-9 = "ฉันเตรียมของขวัญเล็กๆ น้อยๆ มาให้นายท่านที่คอยช่วยเหลือฉันอยู่เสมอค่ะ"
80000065-10 = "อยู่ในกระเป๋านี่..."
80000065-14 = "อืม... นายท่าน?"
80000065-15 = "ตายจริง... แปลกจัง ทำไมนายท่านดูประหม่าล่ะคะ?"
80000065-16 = "คะ...?"
80000065-17 = "คิดว่าเป็นระเบิด... เหรอคะ?"
80000065-22 = "ตายจริง... นี่มันเอ่อ..."
80000065-23 = "ขอโทษด้วยค่ะ บางทีพฤติกรรมในเวลาปกติของฉันอาจทำให้นายท่านเข้าใจผิดไปบ้าง"
80000065-24 = "แต่ถึงยังไงในวันแบบนี้ ฉันก็ไม่เอาของแบบนั้นมาให้นายท่านหรอกนะคะ"
80000065-25 = "แต่ที่จริง... ฉันมักจะพกระเบิด C4 หรือไดนาไมต์ไว้ในกระเป๋านี้ตลอด..."
80000065-26 = "ฉันต้องลองคิดดูใหม่แล้วค่ะ อย่างน้อยต่อไปฉันจะระมัดระวังให้มากขึ้นค่ะ"
80000065-27 = "เพราะงั้นนายท่านไม่ต้องกังวลนะคะ ของที่ฉันเอามาวันนี้..."
80000065-32 = "คือช็อกโกแลตวันวาเลนไทน์ที่ไม่ได้ผสมอะไรแปลกปลอมค่ะ"
80000065-33 = "[s1] \"ช็อกโกแลตโฮมเมดเหรอ?\"\n[s2] \"อาคาเนะทำเองเหรอ?\""
80000065-34 = "ฮิฮิ ดูออกด้วยเหรอคะ อาคาเนะดีใจจังเลยค่ะ"
80000065-35 = "ฮิฮิ ดูออกด้วยเหรอคะ อาคาเนะดีใจจังเลยค่ะ"
80000065-36 = "ใช่แล้วค่ะ ถึงที่ผ่านมาฉันจะแสดงให้เห็นแต่ด้านที่ทำงานเป็นสายลับมาโดยตลอด...#nแต่เห็นแบบนี้ ฉันก็ยังเป็นเมดด้วยเหมือนกันนะคะ"
80000065-37 = "ในฐานะเมดแล้ว การทำขนมคือเรื่องพื้นฐานค่ะ และฉันเองก็ยังสนุกกับการทำขนมด้วยค่ะ"
80000065-38 = "ฉันถึงได้ชื่นชอบเทศกาลแบบนี้มาก เพราะว่ามันเป็นเหตุผลที่ทำให้ฉันสามารถทำอะไรแบบนี้ได้ค่ะ"
80000065-39 = "[s] \"อาคาเนะ...?\""
80000065-40 = "อืม จริงด้วยนะคะ พอพูดเรื่องนี้แล้วก็ทำให้ฉันคิดบางอย่างได้ค่ะ"
80000065-41 = "ฮุฮุ วันนี้ฉันอาจจะอยากมาคุยในฐานะนักเรียนกับคุณครู มากกว่าในฐานะเมดกับนายท่านก็ได้นะคะ"
80000065-42 = "...ขอทำแบบนั้นได้รึเปล่าคะ? คุณครู"
80000065-43 = "[s3] \"ได้อยู่แล้ว อาคาเนะเป็นนักเรียนของครูนี่\"\n[s4] \"อาคาเนะเป็นนักเรียนคนสำคัญของครูเสมอนะ\""
80000065-44 = "ตายจริง..."
80000065-45 = "ตายจริง..."
80000065-46 = "พูดแบบนี้... ฉันแค่อยากจะยืดเวลาที่จะได้คุยกันต่อไปอีกสักหน่อย..."
80000065-47 = "แต่คุณครูตอบกลับมาทันทีแบบนี้เลยตกใจนิดหน่อยค่ะ มันเหมือนทำภารกิจสำเร็จได้ทันทีเลยน่ะค่ะ"
80000065-48 = "ฮิฮิ ขอบคุณนะคะ คุณครู"
80000065-49 = "และจากนี้ต่อไป... ก็ขอฝากตัวด้วยนะคะ"
80000065-51 = "(หลังจากนั้นคุณครูก็ใช้เวลานั่งกินช็อกโกแลตกับอาคาเนะต่อ)"
80000065-56 = "(ช็อกโกแลตโฮมเมดของอาคาเนะมีรสชาติยอดเยี่ยมเหมือนเดิมไม่เปลี่ยน)"

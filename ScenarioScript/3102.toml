[translation]
3102-1 = "價值的證明（２）"
3102-4 = "……不管是誰，都懼怕著未來。"
3102-5 = "這是為什麼呢。#n……是因為與已經確定的過去不同，未來充滿著無限的可能性。"
3102-6 = "不確定的未來，其不確定性有時會帶給人們恐懼。"
3102-7 = "然而那份恐懼、那份未來並不會突然地到來。#n那樣不確定的變化，時常伴隨著足夠的預兆和時間。"
3102-8 = "問題……只不過是沒有觀測預兆的手段而已。"
3102-9 = "於是，能夠觀測奇普托斯所有情報的天才美少女駭客的我是這麼想的。"
3102-10 = "只要能夠將所有能夠觀測到的預兆和變化轉化為能夠計算的數據並進行演算的話，#n是否就能以較高的準確度預測未來……"
3102-11 = "……於是我完成的就是這個，未來觀測機「讖」的設計圖。"
3102-12 = "從天體的運行到人們的身體情報……將世界上所有的變數收集並統整，揭示可能性最高的未來。"
3102-13 = "那怕有一點，想要窺視不確定未來的心情的話……"
3102-17 = "就遵照這份設計圖，完成未來觀測機「讖」如何呢？"
3102-20 = "如果這是真的……"
3102-21 = "只要按照這份設計圖進行製作，就能造出能夠預測未來的裝置是嗎……？"
3102-22 = "似乎是這樣呢。預知未來，是嗎……"
3102-29 = "仔細想想，陽葵部長親自畫的設計圖我還是第一次見到。"
3102-30 = "雖然完全無視千年規定的格式，還能看到很多省略和跳躍性思考的部分……"
3102-31 = "不過確實，是改變了現存框架的新概念設計圖……#n似乎是這樣呢。"
3102-43 = "怎麼可能……納入世界上所有的變數演算出未來……？"
3102-44 = "這種事，就連現在最強的電腦也是不可能的才對……"
3102-48 = "但是，提案人是那個貝里塔斯的部長……"
3102-49 = "難道，真的有可能辦的到嗎……？"
3102-50 = "……這份提案，似乎需要很多相當高價的零件呢。"
3102-54 = "從觀測天體需要的折射鏡片，到似乎是要用在超級電腦上的尖端核心……"
3102-55 = "就算只是大略地估算，似乎也需要一般社團一整年的預算……"
3102-56 = "再說，也沒有真的能預知未來的保證，又沒有依照正式的程序提出……"
3102-57 = "那就，拒絕嗎？"
3102-61 = "先，先等一下！"
3102-62 = "再，再怎麼說立刻拒絕的話，不會有點浪費嗎……？"
3102-63 = "……咦？可是優香醬不是才剛說過嗎。"
3102-64 = "預算上沒有嘗試所有可能性的餘裕。"
3102-65 = "雖，雖然確實是這樣沒錯……"
3102-66 = "不過為了技術的發展，我覺得有時候新的挑戰也是必要的！"
3102-67 = "如果能預測未來的話，對千年難題來說應該也是一大貢獻……"
3102-68 = "考量到至今為止的各種天才般的發明，#n如果是陽葵部長製作的東西的話一定……"
3102-70 = "既然優香醬都這麼說的話我也不會阻止……"
3102-71 = "不過製作所需要的費用該由誰來負擔呢？"
3102-72 = "在貝里塔斯不是正式社團的情況下，#n不能使用貝里塔斯的名義……"
3102-73 = "社團的話還好說，莉央會長指示過不准對陽葵部長個人提供支援……"
3102-74 = "……用我的名字吧。"
3102-78 = "……用優香醬的名義，是嗎？"
3102-79 = "但是沒關係嗎？明明昨天才聽說優香醬投資的基金暴跌所以沒錢了……"
3102-80 = "沒，沒問題的。只要這個裝置完成的話，總會有辦法的……"
3102-85 = "只要能預測股市的走向以及集體心理的瘋狂的話……#n要賺多少錢都沒問題！"
3102-90 = "似乎充滿幹勁呢，那就這麼做吧？"
3102-91 = "……反正好像會很有趣♪"
3102-92 = "雖然設計圖看起來確實有點複雜，不過又不能把這份工作外包出去，得想辦法在研討會內部……"
3102-93 = "況且，這麼危險的裝置要是被整個千年都知道的話，不知道會發生怎麼樣的事故。"
3102-98 = "來吧，向著財富自由的完美未──"
3102-99 = "不對，是向著迎來技術奇點的完美未來，前進吧！"
3102-101 = "呵呵，真令人期待呢？"

[translation]
3102-1 = "#title;가치의 증명 2"
3102-2 = "#wait;1000"
3102-3 = "3;통신 히마리;99\n#3;a\n#wait;1500"
3102-4 = "3;통신 히마리;00;……사람은 누구나 미래를 두려워하지요."
3102-5 = "3;통신 히마리;03;고정된 과거와는 달리 미래는 무한한 가능성으로 열려 있으니까요."
3102-6 = "3;통신 히마리;07;확정되지 않은 미래란 곧 무지. 무지는 인간에게 두려움을 안겨다 주는 법입니다."
3102-7 = "3;통신 히마리;08;하지만 사람들의 생각과는 달리 미래는 절대 갑작스럽게 다가오지 않습니다. 변화는 언제나 충분한 전조를 수반하지요."
3102-8 = "3;통신 히마리;00;……다만 그 전조를 관측할 수 있는 충분한 수단이 인류에게 없을 뿐.\n#3;em;…"
3102-9 = "3;통신 히마리;08;그래서 키보토스의 모든 정보를 관측할 수 있는 천재 미소녀 해커인 저, 히마리는 이런 생각을 떠올렸습니다."
3102-10 = "3;통신 히마리;07;관측 가능한 모든 전조를 전산화하여 연산 장치에 넣고 돌리면 높은 확률로 미래를 예측할 수 있지 않을까— 하고 말이죠."
3102-11 = "3;통신 히마리;03;……그렇게 해서 완성된 것이 바로 이 미래관측기관, <예언의 기록>의 설계도입니다.\n#3;em;[반응]"
3102-12 = "3;통신 히마리;07;이 장치는 천체의 움직임부터 사람들의 생체 정보까지— 세상의 모든 변수를 취합하여 가장 가능성이 높은 미래를 사용자에게 보여줍니다."
3102-13 = "3;통신 히마리;08;혹시라도 불확실한 미래의 편린을 조금이라도 들여다보고 싶으신 분이 있다면……"
3102-14 = "#st;[0,0];instant;1;"
3102-15 = "#clearST"
3102-16 = "3;통신 히마리;08\n#3;h\n#wait;1500"
3102-17 = "3;통신 히마리;00;부디 이 설계도에 따라 <예언의 기록>을 완성해 주시길.\n#3;closeup"
3102-18 = "#all;hide"
3102-19 = "1;노아;02\n5;유우카;02\n#1;em;…\n#5;em;…\n#1;h\n#5;h\n#1;a\n#5;a\n#wait;2500"
3102-20 = "5;유우카;02;그러니까 이 주석에 쓰인 내용대로라면……"
3102-21 = "5;유우카;06;이 설계도로 미래를 예지할 수 있는 전산 장치를 만들 수 있다는 거야?\n#5;stiff\n#5;em;[땀]"
3102-22 = "1;노아;07;그런 모양이네요. 미래를 예지하는 전산 장치라……"
3102-23 = "#st;[0,0];instant;1;"

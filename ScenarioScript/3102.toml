3102-98 = "3;유우카;03;자. 이제 우리는 돈 걱정에 시달리지 않는 완벽한 미래—\n#3;em;[반짝]\n#3;closeup"
3102-99 = "3;유우카;04;아니, 기술적 특이점이 달성된 완벽한 미래를 향해 한 걸음 더 나아가는 거야!\n#3;stiff\n#3;closeup"

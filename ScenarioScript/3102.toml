3102-42 = "#all;hide"
3102-43 = "3;유우카;05;……말도 안 돼. 세상의 모든 변수에 순위를 매겨 미래를 연산하는 게 실제로 가능하다고?\n#3;em;…\n#3;a"
3102-44 = "3;유우카;99;그건 현존하는 최고 성능의 컴퓨터를 사용하더라도 불가능할 텐데……\n#3;m2"

3102-54 = "1;노아;99;천체 관측에 쓰이는 고가의 굴절 렌즈부터 슈퍼컴퓨터에 쓰이는 하이엔드 코어까지……."
3102-55 = "1;노아;02;가볍게 계산해보아도 어지간한 동아리의 분기 예산에 가까운 비용이 들 것 같네요."
3102-56 = "1;노아;01;정말로 이 장치가 미래를 예지할 수 있다는 보장도 없고, 제대로 된 절차를 밟아서 제출된 제안서도 아닌 것 같으니……"
3102-57 = "1;노아;03;역시 이 제안서는 기각하도록 할까요?\n#1;em;[반짝]"
3102-58 = "#st;[0,0];instant;1;"
3102-59 = "#clearST"
3102-60 = "1;노아;03\n3;유우카;02\n#3;em;[!]\n#1;h\n#3;h\n#wait;1000"
3102-61 = "3;유우카;05;자, 잠깐 기다려!\n#3;hophop\n#3;m4"
3102-62 = "3;유우카;05;이런 첨단 기술이 도입된 제안서를 검토하지도 않고 기각하다니, 아깝지도 않은 거야?"
3102-63 = "1;노아;02;……네? 하지만 유우카 쨩이 아까 말했잖아요?\n#1;em;[?]"
3102-64 = "1;노아;01;밀레니엄의 재정은 검증되지 않은 기술을 모두 시험해볼 수 있을 만큼 여유롭지 않다고……"
3102-65 = "3;유우카;04;무, 물론 그건 그렇지만……\n#3;em;[///]\n#3;stiff"
3102-66 = "3;유우카;05;그, 그래도 기술의 발전을 위해서라면 가끔은 새로운 도전도 감내해야지!\n#3;m3\n#1;dl"
3102-67 = "3;유우카;99;혹시라도 이 예언의 기록이 난제의 해석에 도움이 될 단서를 줄지도 모르고……"
3102-68 = "3;유우카;02;그동안 천재적인 발명을 해온 히마리 부장이 작성한 설계도라면, 아예 허황한 물건은 아닐 테니까……."
3102-69 = "#all;hide"
3102-70 = "3;노아;02;유우카 쨩의 생각이 그렇다면 반대할 생각은 없지만……"
3102-71 = "3;노아;01;이 <예언의 기록>의 제작에 드는 비용은 어느 동아리의 이름으로 청구해야 할까요?\n#3;em;[?]"
3102-72 = "3;노아;01;정식 인가 동아리도 아닌 베리타스에 청구서를 요청할 수도 없고……"
3102-73 = "3;노아;99;단체라면 몰라도 히마리 부장 개인에게는 지원을 하지 말라는 리오 회장님의 지시도 있었으니……."
3102-74 = "5;유우카;05;……내 이름으로 청구해줘.\n#5;em;…\n#5;al\n#3;m1"
3102-75 = "#st;[0,0];instant;1;"
3102-76 = "#clearST"
3102-77 = "3;노아;02\n#3;em;[반응]\n#wait;1200"
3102-78 = "3;노아;02;……유우카 쨩의 이름으로요?"
3102-79 = "3;노아;04;하지만 괜찮으시겠어요? 분명 어제 점심 때 들은 바로는 최근 유우카 쨩이 투자했던 펀드가 대폭락해서 개인적으로 쓸 돈도 빠듯하다고…….\n#3;em;[?]"
3102-80 = "5;유우카;04;괘, 괜찮아. <예언의 기록>이 완성된다면 돈 같은 건 아무래도 좋은 수준의 문제가 될 테니까……\n#5;em;[땀]\n#5;stiff"
3102-81 = "#st;[0,0];instant;1;"
3102-82 = "#clearST"
3102-83 = "5;유우카;99\n#5;h\n#wait;1500"
3102-84 = "#all;hide"
3102-85 = "3;유우카;05;주식 시장의 흐름이라든가…… 인간의 광기라든가…… 예지로 돈을 벌 방법은 잔뜩 있어!\n#3;em;[!]\n#3;closeup"
3102-86 = "#st;[0,0];instant;1;"
3102-87 = "#clearST"
3102-88 = "#all;hide"
3102-89 = "5;유우카;05\n1;노아;04\n#1;em;…\n#1;h\n#5;h\n#wait;2500"
3102-90 = "1;노아;01;……그럼 그렇게 할까요? 유우카 쨩도 뭔가 의욕이 넘치는 것처럼 보이고."
3102-91 = "1;노아;99;유우카 쨩의 오랜 친구…… 아니, 밀레니엄의 학생으로서 이런 재미있는 기회를 놓칠 수는 없으니까요.\n#fontsize;50"
3102-92 = "5;유우카;02;비록 구조가 복잡하긴 하지만, 예언의 기록의 제작은 외주 없이 세미나 내에서 은밀히 이루어져야 해.\n#5;em;[반응]"
3102-93 = "5;유우카;99;이런 위험한 물건의 존재가 밀레니엄의 괴짜들에게 알려진다면…… 또 어떤 사고가 터질지 모르니까."

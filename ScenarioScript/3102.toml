[translation]
3102-1 = "การพิสูจน์คุณค่า 2"
3102-4 = "......มนุษย์ทุกคนล้วนหวาดกลัวอนาคตค่ะ"
3102-5 = "เพราะอนาคตเปิดกว้างด้วยความเป็นไปได้ที่ไม่สิ้นสุด ไม่เหมือนกับอดีตที่คงที่"
3102-6 = "ความไม่รู้ก็คืออนาคตที่ยังไม่แน่นอนค่ะ ความไม่รู้เป็นสิ่งที่นำพาความหวาดกลัวมาสู่มนุษย์"
3102-7 = "แต่อนาคตไม่เคยมาแบบกะทันหันดั่งเช่นความคิดของมนุษย์ การเปลี่ยนแปลงมักเกิดขึ้นพร้อมกับลาง#nบอกเหตุและเวลาที่เพียงพอเสมอค่ะ"
3102-8 = "......แต่ว่า มนุษยชาติยังไม่มีวิธีการเพียงพอที่จะสังเกตลางบอกเหตุเหล่านั้น"
3102-9 = "เพราะฉะนั้นดิฉัน ฮิมาริ แฮ็กเกอร์อัจฉริยะสาวสวยที่สังเกตข้อมูลทั้งหมดในคิโวทอสได้ จึงคิดไอเดียนี้#nขึ้นได้ค่ะ"
3102-10 = "หากเราประมวลผลทุกข้อมูลที่สังเกตได้เข้าสู่ระบบคอมพิวเตอร์ ก็น่าจะสามารถคาดการณ์อนาคตได้#nอย่างมีความแม่นยำ แบบนี้น่ะค่ะ"
3102-11 = "......และนี่คือพิมพ์เขียวของเครื่องทำนายอนาคตที่ชื่อว่า <สถิติพยากรณ์> ค่ะ "
3102-12 = "เครื่องนี้จะรวบรวมทุกตัวแปรในโลก ตั้งแต่การเคลื่อนไหวของท้องฟ้า ไปจนถึงข้อมูลทางชีวภาพของ#nมนุษย์ แล้วแสดงผลอนาคตที่เป็นไปได้มากที่สุดให้แก่ผู้ใช้งานค่ะ"
3102-13 = "ถ้าหากมีท่านใดที่อยากเห็นอณูของอนาคตที่ไม่แน่นอน..."
3102-17 = "ก็ขอให้สร้างเครื่อง <สถิติพยากรณ์> นี้ให้สำเร็จตามพิมพ์เขียวนี้ด้วย"
3102-20 = "จากข้อมูลที่เขียนในเชิงอรรถนี้..."
3102-21 = "ก็แปลว่าเราสามารถสร้างเครื่องประมวลข้อมูลที่คาดการณ์อนาคตได้จากพิมพ์เขียวนี้ได้เหรอ?"
3102-22 = "น่าจะทำนองนั้นนะคะ เครื่องประมวลข้อมูลที่คาดการณ์อนาคตได้งั้นเหรอ..."
3102-29 = "จะว่าไป นี่คือพิมพ์เขียวที่หัวหน้าฮิมาริตัดทำขึ้นเองเลยเหรอคะเนี่ย ไม่เคยเห็นมาก่อนเลยละค่ะ"
3102-30 = "แม้ว่าเอกสารนี้จะไม่ยึดตามแบบฟอร์มของมิลเลเนียม แล้วก็มีส่วนที่ละไว้มากเกินไปจนมองไม่ออก และยากเกินกว่าจะเข้าใจได้อยู่..."
3102-31 = "แต่ก็เห็นได้ชัดเลยค่ะว่านี่คือพิมพ์เขียวแนวคิดใหม่ที่สามารถเปลี่ยนกระบวนทัศน์ดั้งเดิมได้"
3102-43 = "เป็นไปไม่ได้... นี่เราจะจัดอันดับตัวแปรทั้งหมดในโลก แล้วคำนวณอนาคตออกมาได้จริงๆ งั้นเหรอ?"
3102-44 = "ถึงจะใช้คอมพิวเตอร์ประสิทธิภาพสูงสุดที่มีอยู่ตอนนี้ก็น่าจะยังทำแบบนั้นไม่ได้เลยด้วย......"
3102-48 = "แถมสิ่งประดิษฐ์ชิ้นนี้ไม่ใช่ไอเดียของใครอื่น แต่คือหัวหน้าฮิมาริแห่งเวอริทัส......"
3102-49 = "ถ้าเป็นแบบนี้ ความเพ้อฝันอาจจะเกิดเป็นความจริงขึ้นมาก็ได้......"
3102-50 = "......แต่จะว่าไป แผนเสนอการวิจัยนี้ขอสนับสนุนอะไหล่ราคาแพงมากกว่าที่คิดเอาไว้อีกนะคะ"
3102-54 = "ทั้งเลนส์หักเหราคาแพงที่ใช้ในการสังเกตการณ์ทางดาราศาสตร์ ไปจนถึง CPU Core ที่ใช้กับซูเปอร์#nคอมพิวเตอร์......"
3102-55 = "ถึงจะแค่ลองคำนวณคร่าวๆ ดู งบสนับสนุนที่ขอถือว่าพอๆ กับงบประมาณทั้งไตรมาสของชมรมทั่วไป#nเลยนะคะ"
3102-56 = "เนื่องจากยังไม่มีการรับประกันว่าอุปกรณ์นี้จะสามารถมองเห็นอนาคตได้ และแผนการนำเสนอนี้ก็ไม่ได้#nผ่านขั้นตอนมาอย่างถูกต้อง..."
3102-57 = "เห็นทีคงจะต้องปัดตกไปใช่หรือเปล่าล่ะคะ?"
3102-61 = "ระ... รอเดี๋ยว!"
3102-62 = "เธอจะไม่พิจารณาแผนเสนอการวิจัยที่ใช้เทคโนโลยีล้ำสมัย แล้วปัดตกไปเลยงั้นเหรอ? แบบนี้มันน่าเสียดายออกนะ"
3102-63 = "คะ...? แต่เมื่อกี้ยูกะจังก็พูดเองนี่คะ?"
3102-64 = "ว่ามิลเลเนียมไม่มีสภาพคล่องทางการเงินพอที่จะทดสอบทุกเทคโนโลยีที่ยังไม่ได้รับการตรวจสอบ..."
3102-65 = "นะ... นั่นมันก็จริงอยู่หรอก..."
3102-66 = "ตะ... แต่เพื่อการพัฒนาเทคโนโลยี บางครั้งเราก็ต้องกัดฟันลองท้าทายอะไรใหม่ๆ บ้าง!"
3102-67 = "ดีไม่ดีเครื่องสถิติพยากรณ์นี่อาจจะให้เบาะแสที่เป็นประโยชน์ในการตีความปัญหาหนักใจของเราก็ได้..."
3102-68 = "ที่ผ่านมาเราก็เห็นอัจฉริยะอย่างหัวหน้าฮิมาริคิดประดิษฐ์อะไรได้ตั้งหลายอย่าง เพราะงั้นแผนการนี้ไม่#nน่าใช่เรื่องเหลวไหลหรอก..."
3102-70 = "ถ้ายูกะจังคิดแบบนั้น ฉันก็ไม่คิดจะคัดค้านหรอก..."
3102-71 = "แต่ต้องขอสนับสนุนงบประมาณสำหรับสร้างเครื่อง <สถิติพยากรณ์> นี้ในนามของชมรมอะไรเหรอคะ?"
3102-72 = "จะขอในนามของเวอริทัสก็ไม่ได้ เพราะไม่ใช่ชมรมที่ได้รับการอนุมัติอย่างเป็นทางการ..."
3102-73 = "ท่านประธานริโอะก็เคยสั่งไว้ด้วยว่าอย่าสนับสนุนหัวหน้าฮิมาริเป็นการส่วนตัว ถ้าเป็นกลุ่มก็ว่าไปอย่าง..."
3102-74 = "...ใช้ชื่อฉันได้เลย"
3102-78 = "...ขอรับการสนับสนุนในชื่อของยูกะจังเหรอคะ?"
3102-79 = "แบบนี้จะไม่เป็นไรเหรอคะ? เมื่อวานตอนกลางวันยังได้ยินอยู่เลยว่ากองทุนที่ยูกะจังลงทุนไปราคาร่วง#nระนาว แม้แต่เงินที่ใช้จ่ายส่วนตัวตอนนี้ยังไม่ค่อยจะมี..."
3102-80 = "มะ... ไม่เป็นไรหรอก ถ้าเครื่อง <สถิติพยากรณ์> สมบูรณ์ขึ้นมา ปัญหาเรื่องเงินๆ ทองๆ ก็คงแก้ไขได้#nไม่ยาก..."
3102-85 = "เพราะเราจะมีวิธีหาเงินได้มากมายจากการคาดการณ์ ทั้งกระแสตลาดหุ้น หรือแม้แต่จิตวิทยามวลชน!"
3102-90 = "ถ้างั้นก็เอาตามนี้เลยไหมคะ? ดูทรงแล้วยูกะจังกำลังมีความตั้งใจเต็มเปี่ยมเลย"
3102-91 = "ในฐานะที่เป็นเพื่อนของยูกะจังมานาน... ไม่สิ ในฐานะนักเรียนมิลเลเนียม ฉันจะพลาดโอกาสที่น่าสนใจแบบนี้ไปไม่ได้เลยละค่ะ"
3102-92 = "ถึงโครงสร้างมันจะซับซ้อนไปหน่อยก็เถอะ แต่ฉันคงต้องแอบสร้างเครื่องสถิติพยากรณ์ในเซมิน่านี่ละ จะให้ภายนอกรู้ไม่ได้"
3102-93 = "ขืนพวกเด็กพิลึกๆ ของมิลเลเนียมรู้เข้าว่ามีอุปกรณ์อันตรายๆ แบบนี้... อาจจะเกิดอุบัติเหตุอะไรขึ้นอีก#nก็ได้"
3102-98 = "เอาละ เราจะก้าวไปสู่อนาคตอันรุ่งโรจน์ที่ไม่ต้องกังวลเรื่องเงินทอง..."
3102-99 = "ไม่สิ สู่อนาคตที่สมบูรณ์แบบที่ขับเคลื่อนด้วยเทคโนโลยี!"
3102-101 = "อยากให้เครื่องนี้เสร็จสมบูรณ์ไวๆ จังนะคะ~"

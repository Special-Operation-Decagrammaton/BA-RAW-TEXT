[translation]
3102-1 = "Proof of Concept 2"
3102-4 = "...Everyone fears the future."
3102-5 = "Unlike the inert past, the future is full of indeterminate possibilities."
3102-6 = "But acknowledging that would be admitting ignorance, and ignorance is the root of all fear."
3102-7 = "However, the future is nothing more than the consequences of the present. Change is prefaced by what is in front of us right now."
3102-8 = "We simply lack the tools to understand our own present."
3102-9 = "So I, Himari, the beautiful super genius hacker who observes all data in Kivotos, had an idea."
3102-10 = "What if we gave ourselves those tools? Reality is nothing more than the accumulation of data points. If we could simply process it all effectively enough, could we not finally see the future with our own eyes?"
3102-11 = "And from that thought, the Prophecy Protocol was born."
3102-12 = "Every single variable in the world, from the movement of celestial bodies to the genomes of living creatures, will be broken down into the only thing that is truly understandable: data. And from that data, the future will be known."
3102-13 = "If there's anyone who wants to solve the problem that is the future..."
3102-17 = "I have included the Prophecy Protocol's design specifications."
3102-20 = "So according to the footnotes of this manifesto..."
3102-21 = "...This is the design of a device that predicts the future?"
3102-22 = "Seems like it. Predicting the future, huh?"
3102-29 = "I'm surprised that President Himari wrote this. I've never seen anything like it."
3102-30 = "It doesn't follow Millennium's standard proposal format...and all the random hypotheses make it hard to digest, yet..."
3102-31 = "It's certainly an ambitious design. Paradigm shift doesn't even begin to describe it... If it works, that is."
3102-43 = "It won't. It's impossible. I mean, breaking down everything in existence into data and processing all that? Nonsense... Right?"
3102-44 = "Even if the process were possible, there's no device in the world with the computing power needed for it."
3102-48 = "But this wasn't designed by any random person. It was designed by President Himari of Veritas herself..."
3102-49 = "Perhaps we simply need to expand our definition of possible to match hers..."
3102-50 = "...But even if we stretch our definition of possible, I'm not sure we can stretch our budget to the same extent."
3102-54 = "Expensive refractive lenses used for deep space observation, experimental processing cores designed for super computers..."
3102-55 = "This could fund an entire club."
3102-56 = "I still find it hard to believe it'll actually predict the future, and it wasn't even submitted properly..."
3102-57 = "Into the rejections pile this goes, then."
3102-61 = "Wait just a minute!"
3102-62 = "It'd be a waste to reject a such an advanced proposal without even giving it a shot."
3102-63 = "But you just said..."
3102-64 = "Millennium doesn't have enough money to fund unproven technologies..."
3102-65 = "S-Sure, but..."
3102-66 = "But all progress is a risk! I just want to take calculated ones!"
3102-67 = "If this Prophecy Protocol works, couldn't it solve the seven problems?"
3102-68 = "This is President Himari's design. Even if it doesn't work exactly as described, it can't be completely useless..."
3102-70 = "If even you're convinced, then I have no intention on arguing."
3102-71 = "Then who do I officially list as being funded for the Prophecy Protocol?"
3102-72 = "It can't be Veritas since they're not an official club..."
3102-73 = "And we have orders from President Rio to not support President Himari..."
3102-74 = "Put it under my name."
3102-78 = "You?!"
3102-79 = "Are you sure? I heard you say that the funds you invested recently completely flopped and you had to pay out of pocket to cover for that..."
3102-80 = "It's okay! If the Prophecy Protocol gets completed, I have a feeling I won't have to worry about money ever again..."
3102-85 = "Stocks... Trends... Time is money in more ways than one!"
3102-90 = "Well... At least you seem committed, Yuuka."
3102-91 = "As a devoted friend of Yuuka's... I mean, as a dedicated student of Millennium, I won't miss this opportunity."
3102-92 = "The structure looks a bit complicated, and we have to create the Prophecy Protocol without outsourcing it to anyone outside of Seminar."
3102-93 = "If the assorted oddballs of Millennium hear about something like this... Who knows what would happen?"
3102-98 = "Here's to a future where we never have to worry about money..."
3102-99 = "I mean...to a future made perfect by technology!"
3102-101 = "I'm already so excited!"

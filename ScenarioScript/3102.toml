3102-29 = "1;노아;01;그나저나 히마리 부장이 직접 작성한 설계도라니, 저도 처음 봤어요.\n#1;em;[반응]\n#1;m3\n#5;dr"
3102-30 = "1;노아;99;밀레니엄의 정규 보고 양식도 따르지 않고 있고, 생략되고 비약된 가설이 많아 한 눈에 알아보긴 어렵지만……"
3102-31 = "1;노아;01;기존의 패러다임을 바꿀 수 있는 새로운 개념이 적용된 설계도라는 것만큼은 분명하네요."

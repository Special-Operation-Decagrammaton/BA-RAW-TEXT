3102-47 = "3;유우카;99\n#3;m3\n#wait;1000"
3102-48 = "3;유우카;06;하지만 다른 사람도 아닌, 베리타스의 그 히마리 부장이 직접 설계한 물건이라면……\n#3;stiff\n#3;em;[땀]"
3102-49 = "3;유우카;05;공상을 현실로 이끌어내는 것도 불가능한 일이 아닐지도 몰라…….\n#3;m4"
3102-50 = "1;노아;01;……그나저나 이 제안서, 생각보다 고가의 부품을 꽤 요구하는군요.\n#1;em;[반응]\n#1;ar\n#3;m5"
3102-51 = "#st;[0,0];instant;1;"

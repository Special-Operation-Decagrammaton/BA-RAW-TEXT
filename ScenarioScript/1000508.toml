[translation]
1000508-1 = "#Title;행운을 잡는 법"
1000508-2 = "#place;D.U. 외곽 쇼핑몰"
1000508-3 = "3;호시노;01\n#3;a\n#wait;1000"
1000508-4 = "#na;(호시노와 함께 한참 동안이나 돌아다닌 끝에, 원하는 책을 구입했다.)"
1000508-5 = "3;호시노;02;으헤, 덕분에 살았어 선생.\n#3;em;[음표]"
1000508-6 = "3;호시노;14;우리 동네는 시골이라서 이런 최신판을 구하기가 힘들단 말이지."
1000508-7 = "3;호시노;14\n#3;d\n#wait;1000"
1000508-8 = "3;호시노;03;짜안- <월간 아쿠아 하비 특별본>! 부록으로 열대어 2000종 양장 도감까지!\n#3;closeup\n#3;a\n#3;em;[반짝]"
1000508-9 = "3;호시노;03;이게 천 엔이라니, 굉장하지 않아? 부록까지 완전 빵빵한데도 말이지? \n#3;hophop\n#3;closeup"
1000508-10 = "3;호시노;09;하아…… 빨리 펼쳐보고 싶어. 어디든 들어가자고!\n#3;shake\n#3;em;[하트]"
1000508-11 = "#3;dr\n#wait;1500"
1000508-12 = "[s] 따라간다."
1000508-13 = "#all;hide"
1000508-14 = "3;호시노;14;헤에- 이것 봐, 집에서 성게 키우는 법이래.\n#3;em;[음표]\n#3;greeting\n#3;a"
1000508-15 = "3;호시노;01;해수 수족관이라는 건 꽤 난이도가 높다고 하던데 말이지. 흐음."
1000508-16 = "[s] \"호시노는 물고기를 좋아하는구나?\""
1000508-17 = "3;호시노;02;으헤~ 뭐, 키우고 싶지만…… 이렇게 보고만 있어도 즐거우니까 괜찮아."

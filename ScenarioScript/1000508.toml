1000508-23 = "3;호시노;09;……으헤헤."
1000508-24 = "3;호시노;10;……어라? 이것 봐, 선생. 뒷쪽에 즉석 복권 티켓이 있어.\n#3;em;[반응]"
1000508-25 = "3;호시노;04;<아쿠아리움 개장 기념 무료 입장권 30명 추첨 티켓> #n……우, 우와아아?! 뭐야, 이거?\n#3;em;[?!]\n#3;shake"

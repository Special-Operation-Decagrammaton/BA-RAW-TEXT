[translation]
1000508-1 = "抓住幸運的方法"
1000508-2 = "D.U.外圍．購物中心"
1000508-4 = "（和星野一起逛了一會兒，買到了想要的書）"
1000508-5 = "唔嘿，多虧有老師。"
1000508-6 = "因為阿拜多斯是鄉下，所以很難買到這種新刊物。"
1000508-8 = "鏘──，《月刊Aqua Hobby特別篇》！附錄中收錄了200種熱帶魚圖鑑！"
1000508-9 = "這樣只要一千元，是不是很棒？連附錄都超讚的吧？ "
1000508-10 = "哈啊……真想趕快打開來看。哪裡都可以，找間店進去吧！"
1000508-12 = "[s] 跟上去"
1000508-14 = "唔嘿～你看這個，這是在家飼育海膽的方法。"
1000508-15 = "聽說海水水槽的難度挺高的，呼。"
1000508-16 = "[s] 「星野很喜歡魚吧？」"
1000508-17 = "唔嘿～嘛，雖然是喜歡到想養的程度……但像這樣用看的也很開心，所以沒關係。"
1000508-19 = "……"
1000508-20 = "……難道，有點孩子氣嗎……？我知道像我這樣年紀還有這種興趣的人不多……"
1000508-21 = "[s1] 「我覺得很好唷。」\n[s2] 「興趣和年齡無關唷。」"
1000508-22 = "……唔嘿嘿。"
1000508-23 = "……唔嘿嘿。"
1000508-24 = "……咦？你看這個，老師。後面有一張刮刮樂。"
1000508-25 = "「海生館開幕紀念免費入場券30名抽獎券」 #n……耶，耶耶！？這是什麼？"
1000508-26 = "海生館，也就是說……"
1000508-27 = "[s] 「像是超大的水族館吧。」"
1000508-28 = "超大的水族館……？！"
1000508-29 = "……！！"
1000508-30 = "意思是有機會獲得兩張平時單價要1萬5千元的門票嗎？"
1000508-31 = "只要刮中這張刮刮樂就行了吧？給我等著！ "
1000508-32 = "銅，銅板在…… "
1000508-34 = "老，老師！禱告吧！"
1000508-35 = "[s3] 「FIGHT！」\n[s4] 「加油！」"
1000508-36 = "（喀沙喀沙）"
1000508-37 = "（喀沙喀沙）"
1000508-38 = "（喀沙喀沙喀沙喀沙）"
1000508-39 = "（喀沙）……啊啊。"
1000508-40 = "[s5] 「中了嗎？」\n[s6] 「怎樣樣？」"
1000508-41 = "……沒中。 "
1000508-42 = "……沒中。 "
1000508-43 = "……唔嘿，幸運果然不可能不請自來。"
1000508-44 = "……"
1000508-45 = "好啦，那就走吧，老師。"
1000508-46 = "今天和老師一起走了許多路，買了想買的書，是相當美好的一天。"
1000508-47 = "[s] 帶著星野去書店"
1000508-48 = "嗯？老、老師，你在做什麼？你要去哪裡？"
1000508-51 = "……"
1000508-52 = "（買了50本相同的書）"
1000508-53 = "……喂，老師……難道是要……"
1000508-54 = "[s] 「現在放棄還太早！要刮到中獎為止！」"
1000508-55 = "……"
1000508-56 = "唔嘿～算了算了，我不是負責吐槽的角色，我就來和大人一起玩吧～"
1000508-57 = "好！在30次內刮中吧！！"
1000508-58 = "呀啊啊啊──！！"
1000508-60 = "（幸好在第38次的時候中獎，把票送給了星野）"
1000508-61 = "（煩惱該怎麼處理剩下的50本書，最後決定將它們存放在夏萊的圖書館）"

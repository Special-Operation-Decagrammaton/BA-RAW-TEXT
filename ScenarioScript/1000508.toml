[translation]
1000508-1 = "How to Seize Luck"
1000508-2 = "D.U. Outskirts Shopping Mall"
1000508-4 = "After we walked around for a while, Hoshino finally bought a book she wanted."
1000508-5 = "Thanks for showing me a good time today, Sensei."
1000508-6 = "My town is out in the countryside, so it's hard to find new editions like this. "
1000508-8 = "Ta-da! It's the special edition of Water Lovers Monthly Special Edition! It comes with a hardcover codex for two thousand types of tropical fish!"
1000508-9 = "And it's only 1,000 yen for all of that information. They're practically GIVING it away!"
1000508-10 = "I can't wait to take a peek at it. Let's find a place to sit inside. Anywhere will do!"
1000508-12 = "[s] Follow her."
1000508-14 = "Wow, would you look at that? An article about how to raise your very own sea urchins."
1000508-15 = "I heard that saltwater aquariums are really hard to maintain, though. Hmm."
1000508-16 = "[s] \"You really like fish, huh, Hoshino?\""
1000508-17 = "Well, I do want to keep some for myself...but I'm happy just looking at them."
1000508-19 = "..."
1000508-20 = "It's kind of childish...isn't it? It's not as though a lot of people my age have this kind of hobby..."
1000508-21 = "[s1] \"I don't think that matters.\"\n[s2] \"Hobbies have nothing to do with age.\""
1000508-22 = "...Heh heh."
1000508-23 = "...Heh heh."
1000508-24 = "Oh, look, Sensei. There's a scratch-off ticket on the back side!"
1000508-25 = "\"Aquarium Grand Opening Celebration. Free Admission Ticket for up to 30 People.\" ...Wh-Whaaat?! Is this what I think it is?"
1000508-26 = "Isn't an aquarium a...?"
1000508-27 = "[s] \"A place with huge tanks full of all kinds of fish.\""
1000508-28 = "They have all kinds of fish?!"
1000508-29 = "...!"
1000508-30 = "S-So, is this saying we could win two tickets worth 15,000 yen each? "
1000508-31 = "All I have to do is scratch off this lottery ticket...? Wait a second!"
1000508-32 = "I-I need a coin..."
1000508-34 = "S-Sensei! Wish me luck!"
1000508-35 = "[s3] \"Go for it!\"\n[s4] \"Good luck!\""
1000508-36 = "(scratch)"
1000508-37 = "(scratch)"
1000508-38 = "(scratch) (scratch)"
1000508-39 = "(scratch) Oh."
1000508-40 = "[s5] \"Did you win?\"\n[s6] \"What happened?\""
1000508-41 = "I didn't win..."
1000508-42 = "I didn't win..."
1000508-43 = "Hmm... I knew it was too good to be true."
1000508-44 = "..."
1000508-45 = "All right. Let's go, Sensei."
1000508-46 = "Today was still a pretty good day. I got to walk around with you and bought the book I wanted!"
1000508-47 = "[s] Take Hoshino to the bookstore."
1000508-48 = "Huh? Wh-What are you doing, Sensei? Where are we going?"
1000508-51 = "..."
1000508-52 = "I bought fifty more copies of the same magazine."
1000508-53 = "Sensei, are you trying to...?"
1000508-54 = "[s] \"It's too early to give up! Keep scratching until you win big!\""
1000508-55 = "..."
1000508-56 = "If you insist! You're the boss here, so who am I to say no?"
1000508-57 = "I'm going to win that prize, even if takes 30 tickets to do it!"
1000508-58 = "HAAAAAAA!"
1000508-60 = "Fortunately, I won the prize on my 38th try and gave the winning ticket to Hoshino."
1000508-61 = "I still had fifty magazines left over, so I decided to donate them to Schale's library."

[translation]
1000508-1 = "วิธีทำให้พบกับความโชคดี"
1000508-2 = "ห้างสรรพสินค้า นอกเขต D.U."
1000508-4 = "(หลังจากเดินเล่นในห้างสรรพสินค้ากับโฮชิโนะอยู่พักใหญ่ เธอก็หาซื้อหนังสือที่ต้องการได้)"
1000508-5 = "ขอบคุณมากเลยนะครู"
1000508-6 = "ย่านที่เราอยู่เป็นเขตห่างไกล เลยหาซื้อหนังสือที่วางแผงใหม่ยากน่ะ"
1000508-8 = "นี่ไง! <นิตยสาร 'อควา ฮ็อบบี้' รายเดือนฉบับพิเศษ>! เล่มภาคเสริมของหนังสือภาพปลาเขตร้อน#n2,000 สายพันธุ์!"
1000508-9 = "ซื้อมาได้ในราคาพันเยนเอง สุดยอดเลยมั้ยล่ะ? ถึงจะเป็นภาคเสริมแต่ก็เล่มหนามากเลยด้วย"
1000508-10 = "อ่า... อยากเปิดดูไวๆ แล้ว รีบไปหาที่นั่งกันเถอะ!"
1000508-12 = "[s] เดินตามโฮชิโนะไป"
1000508-14 = "ว้าว ดูนี่สิ วิธีเลี้ยงหอยเม่นที่บ้านละ"
1000508-15 = "ได้ยินว่าการดูแลรักษาพิพิธภัณฑ์สัตว์ทะเลเป็นงานยากมากเลยนะ ฮืมม"
1000508-16 = "[s] \"โฮชิโนะชอบสัตว์น้ำงั้นสินะ?\""
1000508-17 = "ฮิฮิ~ ฉันก็อยากลองเลี้ยงอยู่หรอก... แต่แค่มองแบบตอนนี้ก็รู้สึกเพลินแล้วละ"
1000508-19 = "...."
1000508-20 = "ฉันดูเหมือนเด็กไปหรือเปล่าน้า... คนที่อายุปูนนี้แล้วแต่ยังชอบเรื่องแบบนี้อยู่ คงมีไม่ค่อยเท่าไรเนอะ..."
1000508-21 = "[s1] \"ไม่เป็นไรหรอก\"\n[s2] \"ความชอบหรืองานอดิเรกไม่เกี่ยวกับอายุหรอก\""
1000508-22 = "แหะๆ..."
1000508-23 = "แหะๆ..."
1000508-24 = "เอ๊ะ...? ดูนี่สิครู ที่ปกหลังมีตั๋วชิงโชคด้วย"
1000508-25 = "<ตั๋วลุ้นชิงโชคกิจกรรมที่ระลึกเปิดอควาเรียม ลุ้นตั๋วเข้าชมฟรี 30 คน> วะ...ว้าวววว?! นี่มันอะไรเนี่ย?"
1000508-26 = "อควาเรียมงั้นเหรอ... หมายถึง..."
1000508-27 = "[s] \"พิพิธภัณฑ์สัตว์น้ำขนาดใหญ่ไงล่ะ\""
1000508-28 = "พิพิธภัณฑ์สัตว์น้ำขนาดใหญ่... งั้นเหรอ?!"
1000508-29 = "...!!"
1000508-30 = "มะ... หมายความว่าจะได้ตั๋วราคา 15,000 เยนฟรีๆ 2 ใบงั้นเหรอ?"
1000508-31 = "แค่ขูดตั๋วชิงโชคนี่ใช่มั้ย? มะ... มาขูดกันเลย!"
1000508-32 = "มีเหรียญมั้ยน้า..."
1000508-34 = "อวยพรกันหน่อยสิครู!"
1000508-35 = "[s3] \"สู้ๆ นะ!\"\n[s4] \"พยายามเข้า!\""
1000508-36 = "(ขูดๆ)"
1000508-37 = "(ขูดๆ)"
1000508-38 = "(ขูดๆๆ)"
1000508-39 = "(ขูดๆ) โอ้..."
1000508-40 = "[s5] \"ถูกรางวัลมั้ย?\"\n[s6] \"เป็นยังไงบ้าง?\""
1000508-41 = "ไม่ถูกเลย..."
1000508-42 = "ไม่ถูกเลย..."
1000508-43 = "เฮ้อ ฉันคงไม่มีโชคกับอะไรแบบนี้หรอกเนอะ"
1000508-44 = "...."
1000508-45 = "เอาละ ไปกันเถอะครู"
1000508-46 = "วันนี้ได้ทั้งเดินเที่ยวกับครู แล้วก็ได้ซื้อหนังสือที่อยากได้มาด้วย... เป็นวันที่ดีจริงๆ เลยน้า..."
1000508-47 = "[s] พาโฮชิโนะไปร้านหนังสือ"
1000508-48 = "หืม? อะไรน่ะครู? จะไปไหน?"
1000508-51 = "......"
1000508-52 = "(ซื้อหนังสือเล่มเดิมมาอีก 50 เล่ม)"
1000508-53 = "ดะ เดี๋ยวนะครู... แบบนี้ก็แปลว่า..."
1000508-54 = "[s] \"จะยอมแพ้ได้ยังไงล่ะ! ต้องขูดจนกว่าจะได้สิ!\""
1000508-55 = "..."
1000508-56 = "แหะๆ~ ก็... ได้ ฉันไม่ปฏิเสธข้อเสนอของผู้ใหญ่หรอก เอาตามนั้นแล้วกัน~"
1000508-57 = "มาลุยกันเลย จะต้องถูกรางวัลภายใน 30 ใบให้ได้!!"
1000508-58 = "ย้ากกกกก!!"
1000508-60 = "(หลังจากขูดมา 38 ใบก็ถูกรางวัล คุณครูจึงให้ตั๋วเป็นของขวัญแก่โฮชิโนะ)"
1000508-61 = "(หลังจากครุ่นคิดว่าจะทำอย่างไรกับหนังสือ 50 เล่มที่ซื้อมา สุดท้ายคุณครูก็ตัดสินใจเอาไปเก็บไว้#nที่ห้องสมุดของชาเล่ต์)"

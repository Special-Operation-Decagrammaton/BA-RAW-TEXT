[translation]
1005405-1 = "Mari's Repayment"
1005405-2 = "Private Park Behind the Cathedral"
1005405-3 = "I stopped by Trinity Cathedral in my free time."
1005405-4 = "The gates were open, so I wandered around to the private park behind the cathedral."
1005405-9 = "*pant* ... *pant* ... *pant*"
1005405-16 = "*huff* *puff*"
1005405-17 = "[ns1] \"That sound...is that running?\"\n[ns2] \"Who's jogging back here?\""
1005405-20 = "O-Oh..."
1005405-21 = "Sensei?"
1005405-22 = "[ns3] \"...Huh?\"\n[ns4] \"That voice...\""
1005405-29 = "Oh, it IS you! I wasn't sure you would come all the way out here..."
1005405-30 = "Are you here for services? I'm afraid they're over for the day."
1005405-31 = "No, no, of course you're always welcome. The Cathedral is here for everyone."
1005405-32 = "And you've been a great help to the Cathedral, and to me, personally, too."
1005405-33 = "Hmm? Why are you looking at me like that?"
1005405-34 = "Oh, my gym clothes?"
1005405-35 = "Right. Yes. Work ended early today so I changed to exercise."
1005405-36 = "I'm not doing anything too intense. Just a bit of jogging and stretching."
1005405-37 = "Heehee, but I haven't missed a day since I started."
1005405-38 = "I'm totally comfortable in this outfit now thanks to you, Sensei."
1005405-39 = "You remember...how scared I was to even try at first."
1005405-40 = "But with your help, I tried something new and had fun. And now I'm in the habit of exercising!"
1005405-41 = "Haha, you may be tired of hearing me say this, but I want to at least once more. Thank you, Sensei."
1005405-42 = "If they hold another field day, I'll probably sign up again."
1005405-43 = "Maybe I'll even do better next time!"
1005405-44 = "[s5] \"I'm glad I could help.\"\n[s6] \"That's great. I'll support you next time, too.\""
1005405-47 = "Sensei..."
1005405-48 = "Since you came all the way out here, would you mind waiting a moment?"
1005405-49 = "I'll get cleaned up and change back. That way, I can guide you around the Cathedral. It's the least I can do."
1005405-50 = "You don't want a tour? But..."
1005405-51 = "...Hm?"
1005405-52 = "You really just want me to keep exercising? Wh-What about you though?"
1005405-53 = "You say you'll just sit and watch? But...you can't! I-I don't want to waste your time..."
1005405-54 = "Oh... how could it not be a waste, though?"
1005405-55 = "[s7] \"I could use some time to relax.\"\n[s8] \"Don't worry. It'll be healing for me!\""
1005405-58 = "I really don't understand you sometimes..."
1005405-59 = "But okay, I'm sure you know what you're talking about."
1005405-60 = "Th-Then..."
1005405-61 = "I'll go back to exercising."
1005405-67 = "..."
1005405-68 = "After that, I sat on the bench and watched Mari jogging and stretching."
1005405-69 = "After a little while, Mari finished her exercise routine."
1005405-74 = "I'm done..."
1005405-75 = "Sorry, that took longer than I thought... You didn't get too bored, did you?"
1005405-76 = "...Not at all?"
1005405-77 = "You enjoyed watching...because no one's around to accuse you of anything?"
1005405-78 = "I'm sorry, I don't know what you mean. What would they accuse you of...?"
1005405-79 = "It was a joke? I see. I wasn't sure if I was supposed to laugh... I'm not good at this sort of thing, I guess."
1005405-80 = "Anyway, I'm glad you got a chance to rest. I don't really understand it, but I'm happy it sounds like I was able to help you, somehow."
1005405-81 = "I was already going to keep exercising, but if it helps you, too, Sensei, I'll enjoy it even more!"
1005405-82 = "Next time I'll bring you some drinks and snacks so you'll be even more comfortable."
1005405-83 = "This park is meant to bring peace to people, after all."
1005405-84 = "Please come by any time you'd like to take a break."
1005405-85 = "...Oh, except...the hours are set, and there's nothing I can do if it's closed..."
1005405-86 = "[s9] \"Let me know when you don't feel like exercising alone.\"\n[s10] \"It's okay. I'm not gonna come out here to sit by myself.\""
1005405-89 = "Hm? What do you mean by that...?"
1005405-93 = "Heehee... heeheehee."
1005405-94 = "Well, okay, Sensei. If that's what you want."
1005405-95 = "I'm glad you're planning on visiting again."
1005405-99 = "...Let's go inside now."
1005405-101 = "We walked inside the cathedral together, and I waited for her as she changed back into her habit. Then she sent me back to Schale."
1005405-102 = "She seemed refreshed and energized from her workout as we said goodbye."

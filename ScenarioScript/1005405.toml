1005405-28 = "3;마리 체육복ND;02\n#3;a\n#wait;1000"
1005405-29 = "3;마리 체육복ND;02;정말로 선생님이셨네요. 멀어서 혹시나 했는데, 여긴 어쩐 일로…….\n#3;em;[반응]"
1005405-30 = "3;마리 체육복ND;04;……네? 아아. 딱히 일로 오신 건 아니신 거군요."
1005405-31 = "3;마리 체육복ND;01;아뇨, 아뇨. 그럴 리가요. 물론 환영하죠. 성당은 모든 분께 열려 있는 곳이니까요."
1005405-32 = "3;마리 체육복ND;03;게다가 선생님께는……. 저희 성당도, 저 개인적으로도 큰 도움을 많이 받았고요."
1005405-33 = "3;마리 체육복ND;02;……음? 왜 그렇게 빤히 보시는……\n#3;em;[?]"
1005405-34 = "3;마리 체육복ND;04;……아아. 제 복장……이요?\n#3;stiff"
1005405-35 = "3;마리 체육복ND;02;아아. 이거 말씀이시군요. 네. 오늘은 일과가 조금 일찍 끝나서, 체육복으로 갈아입고 운동을 좀 하고 있었어요.\n#3;em;[반응]"
1005405-36 = "3;마리 체육복ND;07;실은 운동이라 할 만큼 거창한 건 없고……. 그저 주변을 몇 바퀴 도는 것과 맨손 체조 정도지만요."
1005405-37 = "3;마리 체육복ND;01;후후. 그래도 나름, 그날 이후로는 매일 빠지지 않고 하고 있답니다.\n#3;em;[반짝]"
1005405-38 = "3;마리 체육복ND;99;그러고 보니 제가 이 옷을 이렇게 편히 입을 수 있게 된 것도, 모두 선생님 덕이네요."
1005405-39 = "3;마리 체육복ND;01;……처음에는 참가하는 것조차 고민하고 있었으니까요."
1005405-40 = "3;마리 체육복ND;01;그때 선생님께서 격려해주신 덕분에 즐거운 경험도 하고, 지금은 이렇게 좋은 습관도 들었어요."
1005405-41 = "3;마리 체육복ND;99;정말이지, 몇 번이나 같은 말씀을 드리는 건지 모르겠네요. 또 감사드립니다, 선생님.\n#3;greeting"
1005405-42 = "3;마리 체육복ND;01;어쩌면 다음번에도……. 비슷한 기회가 있다면 참가하고 싶다고 말씀드릴 것 같아요."
1005405-43 = "3;마리 체육복ND;03;그때에는 이번보다는 좀 더 잘해볼 수 있을지도……?\n#3;em;[음표]"
1005405-44 = "[s5] \"응원한 보람이 있어서 다행이야.\"\n[s6] \"보기 좋은걸. 응원할게.\""
1005405-45 = "#wait;100"
1005405-46 = "#wait;100"
1005405-47 = "3;마리 체육복ND;02;선생님……."
1005405-48 = "3;마리 체육복ND;04;으음. 그러고 보니 이왕 여기까지 오셨는데, 조금만 기다려 주시겠어요?"
1005405-49 = "3;마리 체육복ND;04;금방 다시 시스터복으로 갈아입고 와서 주변 안내라도 시켜드릴게요. 제가 해드릴 수 있는 건 그런 것뿐이니……."
1005405-50 = "3;마리 체육복ND;08;괜찮으시다고요? 그치만…….\n#3;stiff"
1005405-51 = "3;마리 체육복ND;04;……네?\n#3;em;[?]"
1005405-52 = "3;마리 체육복ND;04;그냥 하던 운동 계속하라고요? 그, 그럼 선생님은요……?"
1005405-53 = "3;마리 체육복ND;08;앉아서 좀 쉬며 지켜보시겠다고요? 그, 그건 안 돼요! 뭔가 제가 선생님의 시간을 빼앗는 느낌인데…….\n#3;em;[?!]\n#3;shake"
1005405-54 = "3;마리 체육복ND;04;어……. 그런 게 아니시라고요? 그러면 대체……?"
1005405-55 = "[s7] \"보고 있으면 피로가 훨씬 빨리 풀릴 거 같아서.\"\n[s8] \"신경 쓰지 마. 선생님은 이런 게 힐링이란다!\""
1005405-56 = "#wait;100"
1005405-57 = "#wait;100"
1005405-58 = "3;마리 체육복ND;04;무, 무슨 말씀이신지 이해가 잘…….\n#3;em;[...]"
1005405-59 = "3;마리 체육복ND;01;그치만 알겠습니다. 선생님께서 하신 말씀이니, 뭔가의 이유가 있겠지요."
1005405-60 = "3;마리 체육복ND;99;그, 그럼…….\n#3;greeting"
1005405-61 = "3;마리 체육복ND;05;금방 다녀오겠습니다……!\n#3;em;[반짝]"

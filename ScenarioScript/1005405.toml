1005405-74 = "3;마리 체육복ND;04;다녀왔습니다……."
1005405-75 = "3;마리 체육복ND;08;괘, 괜찮으신가요? 조금 시간이 걸렸던 거 같은데……. 혹시 심심하셨다거나, 기다리기 지루하셨다거나…….\n#3;em;[?]"
1005405-76 = "3;마리 체육복ND;04;……전혀 아니라고요?"
1005405-77 = "3;마리 체육복ND;04;게다가 이 상황에서는 딱히 벌 받지도 않을 것 같아서 편하게 보셨다고요……?"
1005405-78 = "3;마리 체육복ND;08;그, 그게 무슨 말씀이신지……. 대체 누가 선생님께 벌을…….\n#3;stiff"
1005405-79 = "3;마리 체육복ND;04;……노, 농담이시라고요? 그렇군요. 웃어드렸어야 했던 걸까요……. 아직은 저도 미숙해서 그런지 모르는 게 많네요.\n#3;em;[반응]"
1005405-80 = "3;마리 체육복ND;01;아무튼 푹 쉬신 것 같아서 기뻐요. 잘은 모르지만, 도움이 되었던 걸지도 모르겠네요!"
1005405-81 = "3;마리 체육복ND;03;만약 이게 선생님께 도움이 될 수 있는 거라면, 저도 더더욱 즐겁게 빠지지 않고 할 수 있을 거 같아요!\n#3;em;[음표]"
1005405-82 = "3;마리 체육복ND;01;다음번에는 좀 더 편히 쉬실 수 있게 마실 것과 간식들도 좀 가져다 놓으면 좋을지도……?"
1005405-83 = "3;마리 체육복ND;99;생각해 보면, 이 공원은 정말로 마음이 편해지는 공간이니까요."
1005405-84 = "3;마리 체육복ND;01;선생님께서도 언제든 편히 오셔서 쉬실 수 있다면 좋을 거 같아요."
1005405-85 = "3;마리 체육복ND;07;……아. 개방 시간은 정해져 있으니까 그건 저도 어쩔 수 없지만요…….\n#3;em;[땀]"
1005405-86 = "[s9] \"마리야말로 혼자 운동하기 지루할 때 불러줘.\"\n[s10] \"괜찮아. 어차피 혼자 와서 앉아 있을 일은 없으니까.\""

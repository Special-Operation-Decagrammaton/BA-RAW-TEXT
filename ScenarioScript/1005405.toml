[translation]
1005405-1 = "瑪麗的回禮"
1005405-2 = "教堂後方的私有公園"
1005405-3 = "（因為難得有一些空閒時間，於是前往了三一大教堂）"
1005405-4 = "（由於那天是對外開放的日子，在裡頭隨意走動時，看見了大教堂後方的公園）"
1005405-9 = "哈啊……哈啊……"
1005405-16 = "哈啊……哈啊，哈啊……"
1005405-17 = "[ns1]「……嗯？是跑步的聲音嗎？」\n[ns2]「有人在慢跑嗎？」"
1005405-20 = "……咦，咦？"
1005405-21 = "……老師？"
1005405-22 = "[ns3]「……哦？」\n[ns4]「這個聲音是……」"
1005405-29 = "為什麼會來這裡……#n是因為工作嗎？"
1005405-30 = "……啊，原來不是啊。"
1005405-31 = "沒關係，就算沒有工作也隨時歡迎您過來。#n大教堂是對所有人開放的地方。"
1005405-32 = "更別說老師時常幫助我們……非常歡迎您。"
1005405-33 = "……怎麼了嗎？#n那樣一直盯著我看……"
1005405-34 = "……啊，是因為這副模樣嗎？"
1005405-35 = "因為今天例行的祈禱和掃除工作已經結束，所以我正好在運動。"
1005405-36 = "不過也就是在大教堂附近跑步、做點簡單的伸展而已，#n不知道能不能算是在運動……"
1005405-37 = "呵呵。其實在那之後我一直都有在運動。"
1005405-38 = "現在回想起來，我之所以能夠穿著體育服運動，也是多虧了老師呢。"
1005405-39 = "一開始還在煩惱要不要參加大運動會……"
1005405-40 = "正是因為有當時老師對我說的那些話，才會有現在的我。#n讓我知道運動的快樂，養成了很好的習慣。"
1005405-41 = "呵呵……雖然已經說了很多次了……真的非常感謝。#n謝謝您，老師。"
1005405-42 = "之後還有機會的話，我還想再參加。"
1005405-43 = "那個時候，我一定會比現在更好……"
1005405-44 = "[s5]「能幫上忙真是太好了，我會幫你加油哦。」\n[s6]「看著現在的瑪麗，連我也覺得很開心唷。」"
1005405-47 = "老師……"
1005405-48 = "您難得到大教堂來……請稍等一下。"
1005405-49 = "我這就去換上修女服，協助老師的工作。#n如果是和三一有關的事情的話，我想我能幫的上忙。"
1005405-50 = "沒關係……？#n可，可是……"
1005405-51 = "……咦？"
1005405-52 = "要我繼續運動？#n那這段期間，老師要做什麼呢？"
1005405-53 = "在旁邊看著我……？#n雖然不是不行……但有種剝奪了老師寶貴時間的感覺，有點抱歉……"
1005405-54 = "並沒有……？#n那是什麼意思呢。"
1005405-55 = "[s7]「只要看著瑪麗就會被治癒了。」\n[s8]「這種時間也是很重要的！」"
1005405-58 = "那是……什麼意思……呢？"
1005405-59 = "……我明白了。#n老師會這麼說，一定是有某些很深層的理由吧。"
1005405-60 = "那，那麼……"
1005405-61 = "我會加油的！"
1005405-67 = "（……）"
1005405-68 = "（於是就這樣坐在長椅上，靜靜看著努力慢跑和伸展的瑪麗）"
1005405-69 = "（看著穿著體育服的瑪麗，時間不知不覺就過去了）"
1005405-74 = "我回來了……！"
1005405-75 = "您，您還好嗎？#n因為多花了一點時間……您會不會覺得無聊……"
1005405-76 = "……完全不會，是嗎？"
1005405-77 = "而且在這裡不會被別人罵反而很輕鬆……？"
1005405-78 = "這，這是什麼意思……#n究竟是誰敢責罵老師……"
1005405-79 = "……開玩笑的？啊……您都快笑出來了呢。#n因為我還不太成熟，許多不足之處還請見諒。"
1005405-80 = "不過，您能悠閒地度過這段時間真是太好了。#n一想到我也能幫上老師的忙……真讓人開心。"
1005405-81 = "如果看著我運動的樣子就能讓您放鬆的話，我想之後也能開心地持續下去的！"
1005405-82 = "（下次為了讓老師能休息得更開心，或許該準備一些零食和飲料……）"
1005405-83 = "只要待在這座公園裡，心情就十分放鬆呢。"
1005405-84 = "歡迎老師隨時過來哦。"
1005405-85 = "……啊，不過因為有規定對外開放的時間，所以也不能說是隨時……"
1005405-86 = "[s9]「我知道了。那就在瑪麗也在的時候來吧。」\n[s10]「覺得一個人運動很無聊的時候就告訴我吧。」"
1005405-89 = "……我，我來邀請老師……"
1005405-93 = "……呵呵。"
1005405-94 = "……好的，我知道了。#n這樣的話，我近期會再邀請您的。"
1005405-95 = "那麼……既然之後也會常常來這裡……"
1005405-99 = "……今天的運動就到此為止吧。"
1005405-101 = "（之後在大教堂稍作等待，和換回修女服的瑪麗閒聊之後，#n　在他充滿笑容的目送下離開教堂回到了夏萊）"
1005405-102 = "（或許是運動讓他轉換了心情，瑪麗的笑容比平時更加爽朗）"

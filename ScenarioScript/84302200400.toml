[translation]
84302200400-5 = "是這裡嗎？看來找對地方了。"
84302200400-6 = "喂，莉央。我抵達目的地了。#n這個要插在哪裡？"
84302200400-11 = "……莉央？？"
84302200400-15 = "不是吧，難道說……"
84302200400-16 = "喂喂，真的假的？#n都來到這裡居然斷訊了？是有無線電干擾嗎？"
84302200400-17 = "難道莉央沒有想到這一點？#n……不，他不是這種人。應該只是單純的通訊裝置故障，或是在潛入的途中壞掉了。"
84302200400-18 = "我想想，現在該怎麼辦呢……"
84302200400-22 = "總之先全部插看看嗎？#n就算只是瞎猜，總會有一個是正確的吧。"
84302200400-26 = "唉，果然還是算了。#n要是一個不小心，事情可能會變得更嚴重。"
84302200400-27 = "沒辦法，只能先回去再問問莉央那傢伙了。"
84302200400-28 = "為了之後方便說明，先來拍張照……"
84302200400-36 = "仔細想想好像不太對。#n這樣算不算是洩漏機密啊？"
84302200400-37 = "結束之後要記得趕快刪掉。#n總之先回去吧……"

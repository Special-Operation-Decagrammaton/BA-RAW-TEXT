[translation]
84302200400-5 = "ที่นี่เหรอ? น่าจะมาถูกที่แล้วนะ"
84302200400-6 = "นี่ ริโอะ ฉันมาถึงที่แล้ว ให้เอาไปเสียบตรงไหนเหรอ?"
84302200400-11 = "ริโอะ...???"
84302200400-15 = "ไม่นะ หรือว่า..."
84302200400-16 = "เฮ้! นี่เรื่องจริงหรือเนี่ย? มาถึงที่นี่แล้ว แต่สายตัดไปเนี่ยนะ? หรือว่าการสื่อสารจะถูกแทรกแซงน่ะ?"
84302200400-17 = "ริโอะไม่ได้คาดการณ์ไว้เหรอ? ไม่สิ ริโอะไม่ใช่คนแบบนั้นหรอก... อุปกรณ์สื่อสารคงแค่เสียหาย หรือไม่ก็พังในระหว่างที่เราเข้ามาน่ะ"
84302200400-18 = "แล้วจากนี้จะเป็นยังไงนะ..."
84302200400-22 = "เจอช่องอะไรก็ลองเสียบก่อนดีมั้ย? ลองทำไปเรื่อยๆ มันต้องถูกสักที่ละน่า"
84302200400-26 = "เฮ้อ... ไม่ได้การละ ถ้าทำอะไรผิดพลาดไป เรื่องก็คงจะแย่ลงกว่านี้"
84302200400-27 = "งั้นก็ช่วยไม่ได้นะ คงต้องกลับไปแล้วถามจากริโอะอีกรอบแล้วละ"
84302200400-28 = "ถ่ายรูปเอาไว้ให้ดูด้วยดีกว่า..."
84302200400-36 = "รู้สึกเหมือนมีอะไรแปลกๆ แฮะ พอมาคิดๆ ดูแล้ว แบบนี้ความปลอดภัยจะรั่วไหลหรือเปล่า?"
84302200400-37 = "เสร็จงานแล้วเห็นทีต้องลบทันทีเลย เอาละ ได้แล้ว งั้นก็กลับไปก่อนดีกว่า..."

[translation]
22220-1 = "第22話;為王女準備的帕凡舞（１）"
22220-4 = "啊！在那裡！快看！"
22220-5 = "……居然真的打倒了。"
22220-6 = "寧瑠前輩好厲害！"
22220-8 = "柚子醬也好厲害！#n這都是多虧柚子醬的作戰啊！"
22220-9 = "我，我……也，也沒有做什麼，特別的事……"
22220-13 = "……"
22220-19 = "[ns]「寧瑠……！還好嗎！？」"
22220-21 = "……好麻。"
22220-22 = "[s]「……咦？」"
22220-23 = "身體好麻……動不了了……"
22220-24 = "可惡，安靜一點……腦袋嗡嗡作響……#n……我沒事，稍微休息一下就好了。"
22220-25 = "話說，我們社團的其他人呢？"
22220-26 = "[s1]「大家都沒事唷。雖然可能暫時無法動彈了。」\n[s2]「但他們要我先上來照顧寧瑠唷。」"
22220-27 = "……這樣啊。#n唉，是誰要照顧誰啊。"
22220-28 = "……這樣啊。#n唉，是誰要照顧誰啊。"
22220-29 = "……喂，小不點們。"
22220-30 = "嗯，嗯？"
22220-31 = "朱音、明日奈還有花凛……我們已經幫到這裡了。"
22220-32 = "現在就只剩下一件事了吧。"
22220-33 = "絕對，要把那傢伙帶回來哦。"
22220-39 = "嗯！"
22220-40 = "[s]「謝謝妳，寧瑠……大家，走吧！」"
22220-42 = "到了！"
22220-43 = "這裡就是埃里都中央塔的頂層……"
22220-44 = "（……吞口水）"
22220-46 = "從地圖上來看，愛麗絲應該就在這裡的某處。"
22220-51 = "沒錯，愛麗絲就在這裡。"
22220-52 = "會長……！"
22220-53 = "……！"
22220-54 = "還想戰鬥嗎！？"
22220-56 = "不，在季被擊倒的時間點，我所擁有的手段就已經全部消失了。"
22220-57 = "我承認……是我輸了。"
22220-58 = "[s]「莉央……」"
22220-59 = "妳們……居然真的來到了這裡。"
22220-60 = "為了拯救不遠的未來，確定會成為奇普托斯威脅的那孩子……"
22220-61 = "越過了所有的阻礙……"
22220-62 = "那是當然的！我們一開始就是這麼決定的！"
22220-63 = "即使，愛麗絲會[ruby=  ．    ．    ．    ．    ．    ．    ．    ．    ．  ]招來奇普托斯的終焉[/ruby]也一樣嗎？"
22220-64 = "突然說什麼？不要那樣說愛麗絲！"
22220-65 = "我，只是……"
22220-66 = "[ns3]「我不知道莉央是根據什麼採取行動。」\n[ns4]「但是，有一件事我可以很明確地告訴妳。」"
22220-69 = "[ns5]「莉央妳，不和任何人討論，獨自判斷一切並下了結論。」\n[ns6]「然後，強迫他人接受妳相信是正確的事。」"
22220-70 = "……！！"
22220-71 = "……！！"
22220-75 = "老師……你也要說我的行為只是自以為是嗎……？"
22220-76 = "但是……我……！！"
22220-77 = "我……"
22220-78 = "老師，我知道愛麗絲的位置了。"
22220-79 = "那個房間的角落，應該有個集中了電力的設施。愛麗絲就在那裡。"
22220-80 = "綠！柚子！"
22220-81 = "嗯！姐姐！"
22220-86 = "[ns]「莉央，剩下的事之後再說吧。」"
22220-87 = "……"
22220-93 = "愛麗絲！讓妳久等了！"
22220-94 = "愛麗絲醬！"
22220-96 = "愛麗絲醬……"
22220-97 = "……"
22220-98 = "[ns]「愛麗絲……？」"
22220-102 = "發，發生什麼事了！？"
22220-103 = "那，那裡的螢幕上……！"
22220-105 = "這是……！！"
22220-119 = "剛才……突然……有……什……！？"
22220-121 = "通訊……被……"
22220-123 = "……大……回答……！？"
22220-127 = "[ns]「千尋……！」"
22220-128 = "埃里都的所有系統被……駭入……"
22220-129 = "不，這不是單純的駭入……"
22220-130 = "整個都市都在變成「某種東西」？"
22220-131 = "現在不是說那些的時候！得趕快拔掉纜線將愛麗絲……！"
22220-132 = "不推薦那個行為。"
22220-133 = "！！"
22220-136 = "現在「王女」的表層人格被隔離在內部資料庫的深處。"
22220-137 = "若是強制解除連結，將會造成無法挽回的損傷吧。"
22220-138 = "愛麗絲……！？妳在說什麼……？"
22220-139 = "姐姐，這不是愛麗絲……"
22220-140 = "愛麗絲……？"
22220-141 = "那是，你們用來稱呼我們「王女」的名字……"
22220-142 = "「王女」不需要名字。#n名字會混亂存在的目的和本質。"
22220-143 = "你在說什麼啊！？吶，你是誰！把愛麗絲醬還來！"
22220-145 = "我的個體名稱是＜Key＞。"
22220-148 = "是幫助王女的無名祭司們留下的修行者，#n也是她繼承王座的[ruby=Key]「鑰匙」[/ruby]。"
22220-149 = "[s]「……什麼？」"
22220-150 = "她是「王女」，我是「鑰匙」。#n那就是我們的存在和目的。"
22220-151 = "現在，妨礙著我們的攻擊已確認停止。"
22220-152 = "現在起將修正錯誤，引導「王女」回到她該待的王座。"
22220-154 = "為了確保連結至AL-1S的可用資源，將執行全面搜索。"
22220-156 = "擴大資源領域。"
22220-158 = "資源名稱．要塞都市「埃里都」的全體可用資源──確認為1萬艾位元組。"
22220-159 = "……從這個時刻開始，啟動ATRAHASIS協議。"
22220-161 = "開始代號名稱「阿特拉哈西斯的方舟」啟動程序。"
22220-163 = "……！！阿特拉哈西斯……！？"
22220-168 = "為了輔助程序，將呼喚[ruby=Divi:Sion]追隨者[/ruby]。"
22220-182 = "……埃里都各地出現了[ruby=Divi:Sion]追隨者[/ruby]……？"
22220-183 = "[s]「莉央……這是怎麼回事？愛麗絲她……」"
22220-184 = "不，這不可能……我的計算……但是……！"
22220-185 = "我……只是擔心奇普托斯會迎向終焉，#n所以建造了這個要塞都市埃里都。"
22220-186 = "明明將我能夠動員的千年的所有技術、力量、能源和所有資源都集中到了這裡……"
22220-187 = "但是……反而因此……讓這座都市……"
22220-188 = "成為了終焉的開端……？"
22220-189 = "我……"
22220-190 = "──做錯了嗎？"
22220-191 = "製作方舟所需的資源已確保23%…………"
22220-192 = "……46%…………"
22220-193 = "老師！這樣下去的話……！"
22220-194 = "埃里都的所有資源都被搶走的話，#n奇普托斯會滅亡的。"
22220-195 = "得做出決定才行……！"
22220-196 = "[s]「……決定？」"
22220-199 = "王女已獲得了鑰匙，方舟也準備就緒。"
22220-200 = "按照無名祭司的要求，在此地建立新的「聖所」。"
22220-201 = "以它的到來為起點，所有的神祕將檔案化──"
22220-202 = "這樣下去世界會滅亡的……！！"
22220-206 = "跟大家一起逃吧，老師。"
22220-207 = "[s]「妳說逃跑，莉央……到底發生什麼了。」"
22220-208 = "現在這個都市本身將改變外貌。被扭曲為方舟這個新的概念。#n那樣的話……這奇普托斯……"
22220-209 = "是我的錯……"
22220-210 = "要是我沒有造出這個都市，從一開始就不會變成這樣了……"
22220-211 = "是我……是我的錯……"
22220-212 = "所以必須，由我來阻止才行……"
22220-214 = "那，那是什麼意思……？"
22220-215 = "……就算只靠我一個人，也會阻止系統給你看的。"
22220-216 = "[s]「……莉央。」"
22220-217 = "如果我的一條命……能夠阻止世界滅亡的話，我會這麼做的──必須要這麼做！"
22220-218 = "……快點！！這是極為合理的選擇啊，老師！"
22220-226 = "[ns]「妳說過……電車難題吧。」"
22220-228 = "[ns7]「在電車難題中只有兩個選項。」\n[ns8]「而妳會選擇犧牲較少的選項。」"
22220-229 = "我……"
22220-230 = "我……"
22220-231 = "[ns]「……我想那就是妳的善良吧，莉央。」"
22220-233 = "[ns]「但是如果兩個選擇，都必須有人犧牲的話……」"
22220-235 = "[ns]「我會回答那個問題本身是錯誤的。」"
22220-236 = "那……不是問題的答案，老師。只是詭辯而已。"
22220-237 = "否定思考實驗的前提條件的話，只是在強詞奪理。"
22220-238 = "[s]「拉操縱桿的那個人，是不是漏看了什麼呢？」"
22220-239 = "……！？"
22220-240 = "[s]「附近真的沒有願意幫助的人嗎？之類的。」"
22220-241 = "……！？"
22220-242 = "……73%…………89%…………"
22220-244 = "確保資源99%……………………"
22220-246 = "[ns]「我想選擇所有人齊心協力，『拯救一切』的選項。」"
22220-247 = "沒，沒有那種選項……"
22220-248 = "乃愛！就是現在！#n切斷所有電力！"
22220-249 = "好～優香醬。#n就等妳這句話唷♪"
22220-250 = "嘿！"
22220-256 = "下一話;為王女準備的帕凡舞（２）"

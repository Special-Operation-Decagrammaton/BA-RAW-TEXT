22220-23 = "I feel numb... I can't move..."
22220-24 = "But don't make a fuss about it... My head hurts... I'll be fine if I rest."
22220-25 = "What about the kids?"
22220-26 = "[s1] \"They're injured, but they were more worried about you.\" \n[s2] \"They asked me to take care of you.\""
22220-27 = "...Yeah? Ha. They should take care of themselves first."
22220-28 = "...Yeah? Ha. They should take care of themselves first."
22220-29 = "By the way... You youngsters."
22220-30 = "Y-Yes?"
22220-31 = "Akane, Asuna, and Karin gave their all to get us here."
22220-32 = "So, you have one thing left to do."
22220-33 = "Make sure to save her."
22220-39 = "Yes!"
22220-40 = "[s] \"Thanks, Neru... Let's go, everyone!\""
22220-42 = "Here! We're here!"
22220-43 = "This is the top floor of Eridu's central tower..."
22220-44 = "*gulp*"
22220-46 = "According to the structure's diagram, Aris has to be somewhere there."
22220-51 = "Yes. Aris is here."
22220-52 = "President...!"
22220-53 = "...!"
22220-54 = "Are you back for another round?!"
22220-56 = "Now that Toki is out of commission, I have no means."
22220-57 = "I accept my loss."
22220-58 = "[s] \"Rio...\""
22220-59 = "You all...really came here..."
22220-60 = "You came all this way just to save a robot who's a threat to Kivotos' future..."
22220-61 = "You overcame all the obstacles in your way..."
22220-62 = "Of course! That's what we said we'd do!"
22220-63 = "Even if Aris will bring destruction to Kivotos?"
22220-64 = "You're just being a sore loser! You can't talk about Aris like that!"
22220-65 = "I never had any malicious intent. I just..."
22220-66 = "[ns3] \"I don't know what logic you thought justified your actions, but...\"\n[ns4] \"...I can at least say this with confidence.\""
22220-69 = "[ns5] \"You judged and concluded everything by yourself without consulting others.\"\n[ns6] \"You tried to force what you believed was right on us.\""
22220-70 = "...!"
22220-71 = "...!"
22220-75 = "Sensei, are you calling me self-righteous...?"
22220-76 = "But...I...!"
22220-77 = "I..."
22220-78 = "Sensei, I've confirmed Aris' location."
22220-79 = "On the other side of the room, there will be a facility where power from all over Eridu is concentrated."
22220-80 = "Midori! Yuzu!"
22220-81 = "Let's go!"
22220-86 = "[ns] \"Rio. We'll talk after everything is over.\""
22220-87 = "..."
22220-93 = "Aris! We're here!"
22220-94 = "Aris!"
22220-96 = "Aris..."
22220-97 = "..."
22220-98 = "[ns] \"Is Aris okay?!\""
22220-102 = "Wh-Wh-What's going on?!"
22220-103 = "Th-The screen over there...!"
22220-105 = "This is...!"
22220-119 = "Now...suddenly...wh...?!"
22220-121 = "The communicat...is..."
22220-123 = "break...dow...?!"
22220-127 = "[s] \"Chihiro...!\""
22220-128 = "Eridu's entire system...has been hacked..."
22220-129 = "This is no simple hacking, either..."
22220-130 = "The entire city is morphing?!"
22220-131 = "We have to do something! Remove the cables and get Aris...!"
22220-132 = "I wouldn't recommend that."
22220-133 = "...!"
22220-136 = "Currently, the princess' superficial personality is isolated in the depths of an internal database."
22220-137 = "Forcibly disconnecting it will cause irreversible damage."
22220-138 = "Aris...?! What are you talking about? You're literally hanging off cables! Let us get you off!"
22220-139 = "No, Momoi, that is not Aris..."
22220-140 = "Aris...?"
22220-141 = "Yes. That is the name by which you call our princess."
22220-142 = "But the princess does not need a name. It disturbs her purpose and the nature of her existence."
22220-143 = "What are you talking about?! Who are you? Give Aris back!"
22220-145 = "My object name is Key."
22220-148 = "I am a trainee, left behind by the nameless priests who assisted the princess with her duties. I am the key that connects her to the throne she must inherit."
22220-149 = "[s] \"...What?\""
22220-150 = "She is the princess, and my role is that of the key. That is the reason and purpose for our existence."
22220-151 = "I have confirmed the attack disrupting her processing has ceased."
22220-152 = "I will now correct the errors and guide the princess to the throne, where she belongs."
22220-154 = "\"Perform a full search to obtain available resources connected to AL-1S.\""
22220-156 = "\"Expanding the area of available resources.\""
22220-158 = "\"Confirmed resource name: Fortress City of Eridu. Available data resources: 10,000 exabytes.\""
22220-159 = "\"...Starting now, protocol ATRAHASIS will be activated.\""
22220-161 = "\"Initiating the activation process of codename Ark of Atrahasis.\""
22220-163 = "...! Atrahasis...?!"
22220-168 = "\"Calling followers for process support.\""
22220-182 = "Divi:Sion is appearing all throughout Eridu...?"
22220-183 = "[s] \"Rio... What's going on? Aris is...\""
22220-184 = "It's impossible! My calculations couldn't have been incorrect."
22220-185 = "I created the Fortress City of Eridu because I was worried about the destruction of Kivotos."
22220-186 = "All the skill, power, energy, and resources of Millennium that I could mobilize are gathered here..."
22220-187 = "But instead...this city..."
22220-188 = "This city will be the origin of destruction?!"
22220-189 = "I..."
22220-190 = "Was I wrong...?"
22220-191 = "\"Secured 23% of the resources needed to build the Ark...\""
22220-192 = "\"...46%...\""
22220-193 = "Sensei! At this rate...!"
22220-194 = "If it manages to secure all of Eridu's resources, everything will be over."
22220-195 = "We...We have to make a decision!"
22220-196 = "[s] \"A decision?\""
22220-199 = "The princess obtained the key, and the Ark is ready."
22220-200 = "At the request of the nameless priests, a new sanctuary will be built on this land."
22220-201 = "With its arrival, all mysteries will be archived for the first time..."
22220-202 = "The world will end if we don't stop this, now."
22220-206 = "Run away with everyone, Sensei."
22220-207 = "[s] \"Run away? What do you mean...?\""
22220-208 = "The city itself will warp, distorting into a new concept called the Ark. Then, Kivotos will..."
22220-209 = "This is my fault..."
22220-210 = "If I hadn't fallen victim to my hubris... If I hadn't created this city..."
22220-211 = "I...I did this..."
22220-212 = "So I have to stop it..."
22220-214 = "Wh-What do you mean by that?"
22220-215 = "I'm going to send the system into overdrive to stop it."
22220-216 = "[s] \"...Rio.\""
22220-217 = "My life means nothing in the face of the world's survival! I must!"
22220-218 = "...Hurry! This is the only logical choice, Sensei!"
22220-226 = "[ns] \"This is...the trolley problem.\""
22220-228 = "[ns7] \"There are only two options in the trolley problem.\"\n[ns8] \"You're trying to choose the one with the least amount of sacrifices.\""
22220-229 = "I..."
22220-230 = "I..."
22220-231 = "[ns] \"That's the kindness in you, Rio.\""
22220-233 = "[ns] \"But if both choices end in someone's sacrifice...\""
22220-235 = "[ns] \"I'd say the question itself is flawed.\""
22220-236 = "That's not an answer, Sensei. That's just sophistry."
22220-237 = "You're denying the prerequisites of the thought experiment..."
22220-238 = "[s] \"What if the person who has to pull the lever is missing something?\""
22220-239 = "...?!"
22220-240 = "[s] \"Like...checking to see if there's anyone around who can help.\""
22220-241 = "...?!"
22220-242 = "\"...73% ...89%...\""
22220-244 = "\"Secured resources at 99%...\""
22220-246 = "[ns] \"I'm choosing the option that saves everyone.\""
22220-247 = "Th-There is no such option..."
22220-248 = "Noa! Right now! Cut off all power!"
22220-249 = "Finally, Yuuka! I've been waiting for this moment!"
22220-250 = "Hiyah!"
22220-256 = "Next Episode; Pavane for a Princess 2"

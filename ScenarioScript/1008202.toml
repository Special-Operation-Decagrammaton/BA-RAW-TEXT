[translation]
1008202-1 = "ปรมาจารย์แห่งชีวิตวัยรุ่น"
1008202-3 = "(คุณครูมาที่ห้องไกล่เกลี่ยของเฮียกกะเรียวรันตามการขอคำปรึกษาของเรนเกะ)"
1008202-7 = "ฮึบ!"
1008202-20 = "ย่ะ!"
1008202-28 = "อีกครั้งหนึ่ง!"
1008202-29 = "ย่าาา!"
1008202-36 = "ดีละ ถ้างั้นก็ปิดท้ายด้วยอันนี้!"
1008202-43 = "ย้าาาาา!!!"
1008202-53 = "[ns] \"ทะ... ท่าสุดท้ายนี่เท่ระเบิดไปเลย?!\""
1008202-57 = "เอ๋? คุณครู...?"
1008202-59 = "อยากรู้ว่าฉันทำแบบนั้นได้ยังไงน่ะเหรอ?"
1008202-60 = "มันคือเทคนิคการยิงปืนของเฮียกกะเรียวรันที่ถูกส่งต่อมารุ่นสู่รุ่นน่ะ ฉันหยิบเทคนิคนั้นมาใช้... แล้วทำแบบนี้... จากนั้นก็... ทำประมาณนี้"
1008202-61 = "[s1] \"ครูไม่ค่อยเข้าใจหรอก แต่นั่นคือการฝึกประจำในตอนเช้าใช่มั้ย?\"\n[s2] \"เมื่อกี้คือการฝึกประจำในตอนเช้าของเฮียกกะเรียวรันเหรอ?\""
1008202-64 = "อื้ม ใช่แล้ว"
1008202-65 = "เพราะคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรันของเรา... ก็ได้รับหน้าที่บางอย่างในเฮียกคิยาโคด้วย"
1008202-66 = "แน่นอนว่าการฝึกพละกำลังเป็นสิ่งจำเป็นเพื่อเตรียมพร้อมสำหรับสถานการณ์ที่มันอาจจะเกิดขึ้นได้ใน#nอนาคต"
1008202-67 = "แต่การฝึกยิงปืนอย่างที่เห็นเมื่อกี้ก็เป็นสิ่งที่พวกเราละเลยไม่ได้เช่นกัน"
1008202-68 = "ฮุฮุ ฟังแล้วอย่าตกใจล่ะ วันนี้ฉันยิงแม่นสุดๆ ไปเลย! สภาพร่างกายก็ยอดเยี่ยม กระปรี้กระเปร่าสุดๆ!"
1008202-69 = "[s3] \"ไม่ใช่แค่วันนี้หรอก... วันอื่นก็เห็นเป็นอย่างนี้นะ\"\n[s4] \"สมแล้วที่เป็นหัวหน้าหน่วยจู่โจมของเฮียกกะเรียวรัน!\"\n[s5] \"ฟูวะ เรนเกะ สุดยอด!\""
1008202-75 = "วะ...ว่าไงนะ?!"
1008202-76 = "ไม่เอาน่า~ ถึงจะชมกันแบบนนี้ แต่ฉันก็ไม่ทำอะไรให้หรอกนะ~"
1008202-77 = "ความสามารถระดับนี้น่ะ ไม่ว่าใครในเฮียกกะเรียวรันก็มีกันทั้งนั้น~"
1008202-78 = "แต่ก็แน่นอนว่าถ้าคุณครูชมกัน ฉันก็จะรับไว้ด้วยความยินดี ไม่ขอปฏิเสธหรอกนะ~"
1008202-82 = "...ซะที่ไหนล่ะ"
1008202-83 = "เอ่อ... อะแฮ่ม... จะว่าไปแล้ว..."
1008202-84 = "คุณครูมาถึงเร็วกว่าที่คิดนะเนี่ย? มาถึงก่อนที่ฉันจะฝึกช่วงเช้าเสร็จเสียอีก"
1008202-85 = "[s] \"อ้อ... พอได้ข้อความจากเรนเกะ ครูก็รีบมาเลยน่ะ\""
1008202-86 = "เฮ้อ ฉันทำให้คุณครูต้องเป็นห่วงมากเกินไปรึเปล่านะ~"
1008202-87 = "ที่บอกว่ารีบมาทันที มันก็น่าดีใจอยู่หรอก..."
1008202-88 = "แค่... ไม่คิดว่าจะมาถึงเร็วขนาดนี้น่ะ ต้องบอกว่าเป็นเรื่องที่ไม่ได้คิดไว้ก่อนเลยน่ะ"
1008202-89 = "หรือต้องบอกว่าฉันยังไม่ทันตั้งตัวดีนะ คือว่า... เรื่องนั้นน่ะ..."
1008202-95 = "[ns] \"ครูไม่ว่าอะไรหรอก แล้วอยากปรึกษาเรื่องอะไรเหรอ\""
1008202-97 = "วะ...ว้ากกก!!"
1008202-98 = "[s] \"หะ... หืม?! เรนเกะ?! เป็นอะไรไป?!\""
1008202-99 = "ดะดะดะดะ... เดี๋ยวก่อนนะ! ขอเวลานอก!"
1008202-103 = "อย่าเข้ามาใกล้กว่านี้นะ คุณครู!"
1008202-104 = "[s] \"ทำไมเหรอ หรือครูทำอะไรผิดไปรึเปล่า...\""
1008202-105 = "ไม่ๆๆๆๆ ไม่ใช่อย่างนั้น!"
1008202-106 = "พอดีว่าฉันเพิ่งฝึกช่วงเช้าเสร็จน่ะ... งะ...เหงื่อท่วมตัวเลย"
1008202-107 = "ถ้าคุณครูเข้ามาใกล้ๆ ละก็... ฉันจะ... จะ..."
1008202-108 = "กังวลอะไรหลายๆ อย่างน่ะ...! "
1008202-109 = "[s] \"อ่า... ขะ... ขอโทษนะ ครูไม่ทันคิดเรื่องนั้นน่ะ...\""
1008202-110 = "ฮู่ว... งั้นก็หยุดอยู่ตรงนั้นเลย! รอฉันแป๊บหนึ่งนะ คุณครู!"
1008202-111 = "ยังพอมีเวลาอยู่ ถ้าตั้งใจทำตั้งแต่ตอนนี้ละก็...!"
1008202-119 = "[ns] \"หืม? เรนเกะ...? ทำไมอยู่ๆ ก็กระโดดตบล่ะ?\""
1008202-120 = "ก็...! ถ้าทำแบบนี้... กลิ่นเหงื่อก็น่าจะหายไป... ได้บ้างไงล่ะ!"
1008202-124 = "ฮึบ! ใส่แรงที่เหลือให้หมด! "
1008202-130 = "แล้วกระโดดอีก 100 ครั้ง...!"
1008202-131 = "[s] \"เอ่อ... มันจะไม่ยิ่งหนักกว่าเดิมเหรอ?!\""
1008202-134 = "(หลังจากรอจนเรนเกะกระโดดตบจนพอใจ...)"
1008202-138 = "ฮู่วว... ดีละ แค่นี้ก็น่าจะพอแล้ว..."
1008202-139 = "[s] \"เสียงเรียกพลังกายพลังใจเมื่อกี้สุดยอดไปเลยนะ...\""
1008202-140 = "ไม่ต้องสนใจเรื่องนั้นหรอกน่า!"
1008202-141 = "เอาละ... งั้นมาเข้าประเด็นกันเถอะ..."
1008202-142 = "แต่ว่า... พอจะพูดเรื่องนี้ต่อหน้า... มันก็..."
1008202-143 = "อืม... "
1008202-144 = "[s] \"อืม...?\""
1008202-145 = "เปล่า... คือว่าฉัน... ค่อนข้าง... "
1008202-146 = "อื้ม! พอมาพูดต่อหน้าแทนการคุยผ่านแชตมันก็เขินๆ อยู่นะ!"
1008202-147 = "แต่ถึงอย่างนั้นก็เถอะ...! "
1008202-148 = "ถ้าฉันเอาแต่ก้มหน้ากังวลอยู่คนเดียวก็แก้ไขอะไรไม่ได้! งั้นก็ดีละ!"
1008202-149 = "เอาละ ตามมาทางนี้เลยคุณครู!"
1008202-156 = "ที่ฉันขอให้คุณครูมาหาวันนี้ก็เพราะ..."
1008202-157 = "[s] \"อื้ม เห็นว่ามีเรื่องอยากปรึกษาไม่ใช่เหรอ\""
1008202-158 = "ชะ...ใช่! เรื่องที่อยากปรึกษา... ใช่แล้ว คือเรื่องนั้น..."
1008202-159 = "คุณครู... ฉันคิดได้แล้วว่าถ้าฉันไม่ทำอะไรเลย เวลาก็จะล่วงเลยไปเปล่าๆ"
1008202-160 = "ให้พูดตรงๆ ก็คือ..."
1008202-164 = "ถ้ายังเป็นอยู่แบบนี้ ชีวิตวัยรุ่นของฉันก็จะสูญเปล่าไปเรื่อยๆ...!"
1008202-165 = "เพราะงั้นฉันก็เลยอยากขอความช่วยเหลือจากคุณครู... เพื่อหยุดสถานการณ์นี้!"
1008202-166 = "[ns] \"ห้ะ...?\""
1008202-167 = "อ่า... ถือว่ายังอธิบายได้ไม่เพียงพอ... รึเปล่านะ?"
1008202-171 = "ถ้าจะพูดให้เข้าใจง่ายขึ้นหน่อยละก็..."
1008202-172 = "ในอนาคตเมื่อเราอายุมากขึ้นจนการหวนคิดถึงความทรงจำในอดีตกลายเป็นกิจวัตรประจำวัน"
1008202-173 = "และพอคิดถึงวันนี้ ก็จะมีแต่ความคิดที่ว่า <อ่า... จะว่าไปแล้วตอนนั้นฉันเอาแต่ทุ่มเวลาไปกับการทำ#nกิจกรรมของเฮียกกะเรียวรันทุกวัน ชีวิตมัธยมปลายก็เลยจบลงในชั่วพริบตาเดียว... ชีวิตวัยรุ่นที่ไม่อาจหวนกลับของ#nฉัน... ช่างน่าเสียดายจริงๆ เลย...>"
1008202-174 = "แล้วมันก็จะน่าเสียดายมากๆ เลยใช่ไหมล่ะ?"
1008202-175 = "เพราะงั้นแล้ว เพื่อให้วันนี้มีเรื่องที่น่านึกถึงในอนาคต"
1008202-176 = "เรื่องยอดเยี่ยมที่พอหวนคิดถึงแล้วก็จะเผลอยิ้มออกมา... คุณครูไม่คิดเหรอว่าฉันควรใช้ชีวิตวัยรุ่นให้#nเป็นที่จดจำบ้าง?"
1008202-177 = "ไม่คิดเหรอว่านี่คือหนทางที่ชีวิตควรจะเป็นน่ะ?!"
1008202-181 = "[ns6] \"ขอโทษนะ เรนเกะ\"\n[ns7] \"เรื่องนี้มันลึกซึ้งมากขึ้นไปทุกที\"\n[ns8] \"ตอนนี้ครูไม่รู้ว่าหมายความว่ายังไงแล้ว!\""
1008202-188 = "(หลังจากนั้นเรนเกะก็พยายามเรียบเรียงคำพูด และอธิบายเรื่องทั้งหมดให้ฟัง)"
1008202-190 = "ฉันจะพูดตรงๆ เลยนะ! ฉันอยากทำ <กิจกรรมวัยรุ่น> ให้มากกว่านี้ก่อนที่จะสายเกินไป!"
1008202-191 = "คุณครู! ช่วยกันหน่อยนะ!"
1008202-192 = "[s9] \"ครูไม่รู้ว่าพูดแบบนี้จะถูกรึเปล่า\"\n[s10] \"แต่ตอนนี้เรนเกะก็ทำกิจกรรมของเฮียกกะเรียวรันอยู่นี่?\""
1008202-195 = "[ns] \"งั้นก็แปลว่ากำลังทำกิจกรรมของวัยรุ่นอยู่แล้ว...\""
1008202-196 = "หืม? พูดอะไรของคุณครูเนี่ย "
1008202-197 = "ถึงจะบอกว่าเป็นกิจกรรมของเฮียกกะเรียวรัน... แต่ก็แค่วิ่งออกกำลังกาย ศึกษายุทธศาสตร์ แล้วก็บ่นพึมพำไปด้วย แล้วก็ซ้อมยิงปืน... ทำแบบนี้วนไปทุกวันๆ"
1008202-198 = "บางทีก็ไปลาดตระเวนบนถนนเพื่อดูว่ามีเด็กเกเรสร้างปัญหารึเปล่า และถ้าเกิดเรื่องอะไรขึ้นจริงๆ เราก็แค่วางแผนและลงมือทำอย่างราบรื่น"
1008202-199 = "เฮ้อ~ แบบนี้ไม่ใช่การใช้ชีวิตวัยรุ่นหรอก "
1008202-200 = "มันก็แค่ <ชีวิตประจำวัน> น่ะ"
1008202-201 = "[s] \"งะ...งั้นเหรอ?\""
1008202-202 = "ชีวิตวัยรุ่นน่ะจะต้องเปล่งประกายระยิบระยับและมีความหวานอมเปรี้ยวในชีวิตนิดๆ..."
1008202-203 = "ใช่ มันควรต้องเป็นเหมือนฉากในผลงานนิยายของคุณนักเขียน <ความรักคือปลาคาร์ฟ> สิ!"
1008202-204 = "[s] \"ยะ... ยกตัวอย่างเช่น...?\""
1008202-205 = "ยกตัวอย่างเช่น..."
1008202-208 = "การพบกันที่หอมหวานจนใจเต้น... การจากลาที่เย็นชาจนใจสลาย..."
1008202-209 = "เพื่อนที่เคยสนิทจู่ๆ ก็กลับมาอีกครั้งเพื่อสารภาพเรื่องราวที่ซ่อนไว้ในอดีต... จนเกิดเรื่องราวที่ทำให้#nหัวใจร้อนผ่าว"
1008202-212 = "แต่กลายเป็นว่าเพื่อนคนนั้นคือหนึ่งในกาแล็กซี วอร์ริเออร์ที่รู้จักกันมาตั้งแต่ชาติที่แล้ว...!"
1008202-213 = "ความรู้สึกแบบนี้ที่ทำให้ชีวิตยิ่งพิเศษขึ้น... ประสบการณ์ที่ทำให้หัวใจเต้นแรง! ฉันอยากทำอะไรแบบนี้น่ะ คุณครูไม่คิดว่าทำแบบนี้แล้วจะดีกว่าเหรอ?!"
1008202-214 = "สักวันหนึ่งในอนาคต เวลาที่เราย้อนคิดถึงเรื่องราวในอดีต ก็จะได้มีเรื่องชวนยิ้มที่เอาไว้อวดใครก็ได้ไง!"
1008202-215 = "[s] \"ถ้ามีเรื่องแบบนั้นจริงๆ ก็คงอวดคนอื่นได้ตลอดชีวิตอยู่หรอก\""
1008202-216 = "อ้อ! แน่นอนว่าฉันไม่ได้เอาแต่ฝันว่าจะมีประสบการณ์เหมือนในการ์ตูนไปวันๆ หรอกนะ"
1008202-217 = "แต่... พอคิดว่าถ้าเป็นแบบนี้ไปเรื่อยๆ ฉันคงเอาแต่ฝึกฝนในฐานะเฮียกกะเรียวรันจนชีวิตวัยรุ่นจบลง และมันก็คงน่าเสียดายมาก..."
1008202-218 = "เพราะงั้น คุณครู... พอจะช่วยฉันหน่อยได้มั้ย...?"
1008202-219 = "[s] \"ถึงครูจะไม่เข้าใจทุกอย่างที่เรนเกะพูดออกมาก็เถอะ\""
1008202-221 = "[ns] \"แต่ถ้าอยากได้ความช่วยเหลือ ครูก็ยินดีช่วย\""
1008202-225 = "อ๊ะ จริงเหรอ...? พูดจริงใช่มั้ย?"
1008202-226 = "ฮิฮิฮิ! ขอบคุณนะ คุณครู!"
1008202-227 = "ตอนนี้เหมือนเรามีความสัมพันธ์กันแบบผู้ชี้แนะชีวิตวัยรุ่นกันเลยนะ!"
1008202-228 = "[s] \"ผู้ชี้แนะ...ชีวิตวัยรุ่น?\""
1008202-229 = "ฮืม ถ้าเป็นอย่างนั้น... ก็คงเรียกว่าคุณครูตามปกติไม่ได้"
1008202-230 = "ต้องหาคำเรียกอื่นที่เข้ากับความสัมพันธ์แบบใหม่นี้แล้วละ งั้นคงต้องเป็น..."
1008202-236 = "ท่านอาจารย์...!"
1008202-237 = "[s] \"ท่าน... อาจารย์?\""
1008202-238 = "อื้ม! ฟังดูดีเลย! "
1008202-239 = "จากนี้ถ้าเป็นการทำกิจกรรมวัยรุ่น ฉันจะเรียกคุณครูว่าท่านอาจารย์นะ!"
1008202-245 = "ลูกศิษย์ที่ยังบกพร่องคนนี้ขอฝากตัวด้วยนะ! ท่านอาจารย์! "
1008202-249 = "เอาละ มาจับมือกัน!"
1008202-250 = "[s] \"อ่า อื้ม... ครูก็ฝากตัวด้วยนะ\""
1008202-251 = "ฮิฮิ!"
1008202-253 = "(และหลังจากนั้นกิจกรรมชีวิตวัยรุ่นของคุณครูและเรนเกะก็ได้เริ่มต้นขึ้น)"

[translation]
1008202-1 = "Sensei's Youth"
1008202-3 = "I headed over to the Hyakkaryouran regulatory office per Renge's request."
1008202-7 = "Ha!"
1008202-20 = "Hiyah!"
1008202-28 = "Again!"
1008202-29 = "Ha!"
1008202-36 = "Great. Now the finisher!"
1008202-43 = "Hwah!!!"
1008202-53 = "[ns] \"Th-There was a lot of passion in that last move!\""
1008202-57 = "Wh-Who...? Sensei?!"
1008202-59 = "...How did I do that?"
1008202-60 = "Well, combining Hyakkaryouran's marksmanship techniques with a little bit of... Kind of like... Er, how do I explain this to you?"
1008202-61 = "[s1] \"It's interesting to see your training routine regardless!\"\n[s2] \"Does the Hyakkaryouran train like that every morning?\""
1008202-64 = "Yup. Without fail."
1008202-65 = "Despite recent events, the Hyakkaryouran Resolution Council does play an important role in keeping Hyakkiyako students safe."
1008202-66 = "We wouldn't be able to do that if we weren't the strongest around."
1008202-67 = "It's my job to keep everyone in tip-top shape, so I run shooting and conditioning drills every morning. "
1008202-68 = "I've been working on creating some new routines today. And I gotta say, I just can't miss! I'm feeling great. Heehee."
1008202-69 = "[s3] \"There's really no shortcuts when it comes to being strong.\"\n[s4] \"As expected of the Hyakkaryouran's Assault Squad Captain!\"\n[s5] \"Fuwa Renge! You're amazing!\""
1008202-75 = "Wh-What?"
1008202-76 = "I won't do you any favors even if you sweet talk me, you know."
1008202-77 = "It's really nothing special. This is expected of me, you know?"
1008202-78 = "I mean, don't get me wrong. I'm not complaining about a little bit of praise. Coming from you...it actually makes me kinda happy..."
1008202-82 = "Let's just forget I said that."
1008202-83 = "Um... Moving on..."
1008202-84 = "I thought you were coming after morning training! You're early, Sensei!"
1008202-85 = "[s] \"Your messages made me feel like I should come right away.\""
1008202-86 = "Shoot. I must've really worried you, huh? "
1008202-87 = "It's a nice feeling, being someone's priority..."
1008202-88 = "N-Not that I want you to waste your time sitting around waiting for me! I'm sorry... I should've planned better."
1008202-89 = "I'm not exactly ready yet..."
1008202-95 = "[ns] \"We'll figure it out together.\""
1008202-97 = "H-Hey! Don't move!"
1008202-98 = "[s] \"Wh-What?! Are you okay, Renge?\""
1008202-99 = "N-No! Time out! Pause! Sit!"
1008202-103 = "I said, don't move another inch, Sensei!"
1008202-104 = "[s] \"I'm not moving! Did I do something wrong?!\""
1008202-105 = "No, not at all. It's not you."
1008202-106 = "Look, I just finished my morning training. Do you get it?"
1008202-107 = "I'm worried that if you get too close..."
1008202-108 = "I'll...you know! It'll be gross! "
1008202-109 = "[s] \"I get it now... Sorry for not being considerate.\""
1008202-110 = "You're fine, Sensei. But I need you to just wait right there, please."
1008202-111 = "This situation is still salvageable, I promise."
1008202-119 = "[ns] \"Are you...doing jumping jacks?\""
1008202-120 = "Yes!!! This...way...the smell...will neutralize!"
1008202-124 = "Hyah! Dig deeper! "
1008202-130 = "One hundred reps!"
1008202-131 = "[s] \"I...I don't think that's how sweat works...\""
1008202-134 = "I waited patiently as Renge finished her impromptu workout."
1008202-138 = "Phew. All right. Thanks for waiting, Sensei."
1008202-139 = "[s] \"You're always so passionate!\""
1008202-140 = "It comes with the job description, you know?"
1008202-141 = "Anyways, now that's settled..."
1008202-142 = "It's a little more embarrassing when we're face-to-face, I have to admit."
1008202-143 = "Um... "
1008202-144 = "[s] \"Um?\""
1008202-145 = "I'm getting to my point! "
1008202-146 = "Man, this is harder to say out loud than I thought it'd be."
1008202-147 = "Ugh! Get it together, Renge! "
1008202-148 = "I'm the Hyakkaryouran Assault Squad Captain! I don't cower in fear at any obstacle!"
1008202-149 = "Yes! Follow me, Sensei!"
1008202-156 = "So the reason I asked you here today..."
1008202-157 = "[s] \"You said there was something you wanted to talk about.\""
1008202-158 = "R-Right! You see, it's about... Well, um..."
1008202-159 = "Okay. Sensei, I've come to the realization that I'm getting older. The flow of time is an unstoppable force that I can't fight!"
1008202-160 = "Ugh... How do I say this..."
1008202-164 = "My youth! I'm losing my youth, Sensei!"
1008202-165 = "I'm not the type to just sit around and let life do what it wants to me! I have to take this problem by the horns! And that's where you come in, Sensei!"
1008202-166 = "[ns] \"...Huh?\""
1008202-167 = "Ah... I still didn't explain it well, huh?"
1008202-171 = "Let me try again."
1008202-172 = "There'll come a time when these school days are nothing but a faint memory I try to pick out of the mist like a swirling dust mote."
1008202-173 = "What if I look back, and all I find are memories of me dutifully working at the Hyakkaryouran? I'll sigh my deepest sigh and wish I hadn't let my youth pass me by."
1008202-174 = "Wouldn't that be terrible? It's horrifying to even think about!"
1008202-175 = "I can't wake up on my death bed and realize that I'm weighed down by a thousand regrets!"
1008202-176 = "Don't you want to be able to look back on your life and smile softly at the fulfilling events that litter its timeline?"
1008202-177 = "Isn't that the only way life should be lived?!"
1008202-181 = "[ns6] \"Sorry, Renge, but I'm confused!\"\n[ns7] \"These are very overwhelming topics!\"\n[ns8] \"I still don't understand what you need!\""
1008202-188 = "Renge continued to try to explain her youth anxieties, which could more or less be summarized as follows."
1008202-190 = "Seriously! I need to participate in more youth activities while I still can!"
1008202-191 = "Please, Sensei! I'm requesting your assistance!"
1008202-192 = "[s9] \"I think you're already doing that, no?\"\n[s10] \"Aren't you busy with your Hyakkaryouran duties, Renge?\""
1008202-195 = "[ns] \"You're participating in plenty of 'youth activities' already, right?\""
1008202-196 = "HUH? You can't be serious, Sensei! "
1008202-197 = "Hyakkaryouran duties have nothing to do with youth! They're just running laps, studying military strategies, practicing marksmanship..."
1008202-198 = "...Geez, what else? We go on patrols every day and occasionally carry out operations to put down criminals. "
1008202-199 = "You can hardly call that the epitome of youth! "
1008202-200 = "That's not the kind of stuff they write about in the movies!"
1008202-201 = "[s] \"I...I see...\""
1008202-202 = "No you don't! Youth needs to sparkle like fireworks, a bittersweet experience of existence!"
1008202-203 = "It should be like the scenes the author of \"Koi About Love\" writes!"
1008202-204 = "[s] \"Maybe some examples would help?\""
1008202-205 = "For example..."
1008202-208 = "It's like the way your heart beats out of your chest when you meet someone new, or an aching farewell to a good friend..."
1008202-209 = "Or your ordinarily boring life is thrown for a loop when your companion asks you to coffee and confesses a secret past!"
1008202-212 = "And then you find out you and your friend are intricately tied together by the string of fate, like Galaxy Warriors!"
1008202-213 = "That's what I'm looking for! It's the kind of experience that redefines your very expectations of what life is."
1008202-214 = "Then I'll be old and gray, bragging to everyone about a dazzling youth that no one can ever take from me!"
1008202-215 = "[s] \"That would definitely be memorable! But also maybe a little impossible!\""
1008202-216 = "Ah! Sorry, I got a little carried away. I, of course, realize that in real life I probably won't find out I've lived several past lives with Sensei or anything like that... "
1008202-217 = "How do I say this... I got so wrapped up in the monotony of my Hyakkaryouran training and routine that it felt like my life was slipping away."
1008202-218 = "Would you help me take hold of my youth while I still can, Sensei?"
1008202-219 = "[s] \"I can't say I completely understood everything you said.\""
1008202-221 = "[ns] \"But I'll still do everything I can to help you, Renge.\""
1008202-225 = "Y-You will? Really...?"
1008202-226 = "Heehee! Thank you, Sensei!"
1008202-227 = "It's like we've entered into a youth mentorship!"
1008202-228 = "[s] \"A youth...mentorship?\""
1008202-229 = "Exactly. That means you're not just my teacher anymore..."
1008202-230 = "A more fitting title for our new relationship... Hm..."
1008202-236 = "Mentor!"
1008202-237 = "[s] \"M-Mentor?\""
1008202-238 = "It's the perfect fit! "
1008202-239 = "You'll be \"Mentor\" to me from now on, as we pursue my youth together!"
1008202-245 = "Mentor! I look forward to learning from you! "
1008202-249 = "Let's shake on it."
1008202-250 = "[s] \"Ah, yes. I'll do my best.\""
1008202-251 = "Heehee!"
1008202-253 = "With that, our journey to find Renge's youth began."

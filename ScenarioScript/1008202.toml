[translation]
1008202-1 = "青春的師父"
1008202-3 = "（於是應蓮華的要求前往了百花繚亂的調停室）"
1008202-7 = "哈！"
1008202-20 = "呼哈！"
1008202-28 = "再一次！"
1008202-29 = "哈！"
1008202-36 = "好，就用這招收尾吧！"
1008202-43 = "咿呀啊啊！！！"
1008202-53 = "[ns]「那個，最後一招的類型明顯不太一樣吧！？」"
1008202-57 = "咦？老師……？"
1008202-59 = "問我剛才是怎麼做的？"
1008202-60 = "是用我們百花繚亂代代相傳的射擊術……先這樣……再那樣？"
1008202-61 = "[s1]「原，原來如此……」\n[s2]「所以剛才那是百花繚亂平常做的晨練嗎？」"
1008202-64 = "嗯，沒錯。"
1008202-65 = "我們百花繚亂紛爭調停委員會……在百鬼夜行還是肩負一定的職責。"
1008202-66 = "為了應對任何狀況及預防萬一，除了鍛鍊體力之外……"
1008202-67 = "剛才那種射擊訓練也不能懈怠。"
1008202-68 = "呵呵，你聽了可別嚇到。#n今天的我可是百發百中！狀況絕佳哦！"
1008202-69 = "[s3]「原來如此……沒想到平常的鍛鍊也不馬虎。」\n[s4]「不愧是百花繚亂……不，真不愧是百花繚亂的突擊隊長！」\n[s5]「不破蓮華！太厲害了！」"
1008202-75 = "咦咦！？"
1008202-76 = "哎呀～就算那樣稱讚我也得不到好處的哦～？"
1008202-77 = "這種程度，只要是百花繚亂的人誰都做得到～"
1008202-78 = "當然～能被老師稱讚還是很開心。#n我也不會刻意拒絕啦～嘿嘿。"
1008202-82 = "…………不對。"
1008202-83 = "咳，咳哼，話說……"
1008202-84 = "老師，你來的比我想像中還早呢？#n上午的訓練都還沒結束。"
1008202-85 = "[s]「啊，嗯，我一接到蓮華的聯絡就馬上過來了。」"
1008202-86 = "哎呀，我是不是讓老師太費心了～ "
1008202-87 = "雖然很開心老師馬上就過來……"
1008202-88 = "不過……來的這麼快實在是出乎我的意料……"
1008202-89 = "我還沒做好準備。#n那個，就是……"
1008202-95 = "[ns]「沒關係，蓮華想諮詢什麼呢……」"
1008202-97 = "哇，哇啊啊啊！"
1008202-98 = "[s]「蓮華？怎麼了嗎？」"
1008202-99 = "等等等等一下！暫停！暫停！"
1008202-103 = "別再靠過來了！老師！"
1008202-104 = "[s]「怎麼了？我做錯什麼了嗎……」"
1008202-105 = "不不不，不是那樣的！"
1008202-106 = "我才剛全力晨練完……"
1008202-107 = "老師靠太近的話……那個……我的意思是……"
1008202-108 = "在各方面……！我都會很不自在……！"
1008202-109 = "[s]「啊……抱，抱歉。是我太遲鈍了……」"
1008202-110 = "呼……所以請稍等一下！老師！"
1008202-111 = "現在還來得及。#n只要從現在開始努力……！"
1008202-119 = "[ns]「嗯？蓮華……？為什麼突然開始做開合跳……」"
1008202-120 = "因為……這樣多少可以……讓汗味！飄走！"
1008202-124 = "嘿咻！再來！"
1008202-130 = "全力……跳100次……！"
1008202-131 = "[s]「那個，這樣不會有反效果嗎！？」"
1008202-134 = "（於是一直等到蓮華滿意為止……）"
1008202-138 = "呼……好，這樣應該沒問題了吧……"
1008202-139 = "[s]「你還真是卯足全力呢……」"
1008202-140 = "嗯，就當作是醞釀一下氣勢吧！"
1008202-141 = "先不說這些了……進入正題吧……"
1008202-142 = "但是……真要面對面說出來……那個……"
1008202-143 = "嗯…… "
1008202-144 = "[s]「嗯……？」"
1008202-145 = "不是，這有點……有點…… "
1008202-146 = "啊啊！直接面對面果然還是太讓人害羞了！"
1008202-147 = "可是……儘管如此！"
1008202-148 = "繼續一個人鑽牛角尖什麼都解決不了！好！"
1008202-149 = "老師！來！過來這邊！"
1008202-156 = "今天之所以請老師來……"
1008202-157 = "[s]「嗯，你說有事想諮詢。」"
1008202-158 = "……！沒錯，我想諮詢的……其實是……"
1008202-159 = "老師，我終於明白了。#n如果什麼都不做，時間將會一去不復返。"
1008202-160 = "我就直截了當地說了……"
1008202-164 = "老師！再這樣下去，我的青春就會白白浪費了！"
1008202-165 = "所以為了打破這個狀況……我需要老師的幫助！"
1008202-166 = "[ns]「……………………什麼？」"
1008202-167 = "啊……這樣說明果然不夠清楚嗎？"
1008202-171 = "說得更好懂一點的話……"
1008202-172 = "在遙遠的未來……當回味過去的記憶成為每天的例行公事的時候……"
1008202-173 = "如果每當想起今天時只會覺得：「對了，當時只顧著進行百花繚亂的活動，#n結果高中時期一眨眼就結束了……啊，我逝去的青春啊，真是太遺憾了……」"
1008202-174 = "……你不覺得這樣太令人扼腕了嗎？"
1008202-175 = "所以……為了不讓現在留下遺憾……"
1008202-176 = "老師不覺得應該度過每次想起來，嘴角就會不自覺上揚的那種……了不起的青春嗎！"
1008202-177 = "難道不覺得那才是勝利之路嗎？！"
1008202-181 = "[ns6]「抱歉，蓮華。」\n[ns7]「你牽扯的範圍太廣……」\n[ns8]「我更不懂你是什麼意思了！」"
1008202-188 = "（後來蓮華也繼續說個沒完。如果用一句話來做總結……）"
1008202-190 = "說白了就是我想趁現在多做一些「青春活動」！"
1008202-191 = "老師！幫幫忙吧！"
1008202-192 = "[s9]「不知道這麼說對不對……」\n[s10]「蓮華不是已經在進行百花繚亂的活動了嗎？」"
1008202-195 = "[ns]「那已經夠青春了吧……」"
1008202-196 = "嗯？老師這是什麼意思……"
1008202-197 = "百花繚亂的活動……也不過就是每天一起跑操場、學習兵法、練習射擊術……"
1008202-198 = "到街上巡視、看看有沒有問題學生……#n偶爾真的發生事件的時候有條不紊地展開作戰而已。"
1008202-199 = "哎～那才不叫青春呢。"
1008202-200 = "不就只是單純的「日常」嗎？"
1008202-201 = "[s]「是嗎？」"
1008202-202 = "所謂的青春應該是更加耀眼，酸酸甜甜的……"
1008202-203 = "嗯，就像「戀愛鯉魚」的作品裡會出現的那種？"
1008202-204 = "[s]「可以舉個例子嗎……？」"
1008202-205 = "就比如……"
1008202-208 = "心動的邂逅……與痛徹心扉的離別……"
1008202-209 = "要好的朋友某天突然坦白一直隱瞞的過去……這種讓人熱淚盈眶的劇情發展。"
1008202-212 = "想不到他居然是再續前緣的銀河戰士夥伴……！"
1008202-213 = "這種破天荒……又令人心跳不已的經歷才是我想要的！#n老師不覺得這樣才划得來嗎？"
1008202-214 = "即使以後回想起今天，也能笑著向任何人炫耀！"
1008202-215 = "[s]「如果真能遇到那種事，確實會是一輩子的驕傲！」"
1008202-216 = "啊！當然，我也不是希望能經歷那種戲劇化的設定。"
1008202-217 = "只是覺得……繼續在百花繚亂鍛鍊，就這樣結束青春實在很可惜……"
1008202-218 = "所以老師……你能幫我嗎……？"
1008202-219 = "[s]「我不敢說自己能完全理解蓮華說的話。」"
1008202-221 = "[ns]「不過如果你需要幫助，我會全力以赴。」"
1008202-225 = "真，真的嗎……？"
1008202-226 = "嘿嘿！謝謝老師！"
1008202-227 = "這樣我們就變成「青春師徒」了呢！"
1008202-228 = "[s]「青春……師徒？」"
1008202-229 = "咳咳，既然如此……只用老師這個稱呼好像不太夠。"
1008202-230 = "適合青春師徒的關係，而且要兼具帥氣和威嚴的稱呼……"
1008202-236 = "──師父。"
1008202-237 = "[s]「師父？」"
1008202-238 = "嗯！聽起來不錯！"
1008202-239 = "從現在起，如果是在一起進行青春活動的話，我會稱老師為師父！"
1008202-245 = "以後請務必多多關照我這個還不成材的徒弟哦！師父！"
1008202-249 = "來，握手！"
1008202-250 = "[s]「啊，嗯。請多多指教。」"
1008202-251 = "嘿嘿！"
1008202-253 = "（於是便和蓮華一起展開青春活動）"

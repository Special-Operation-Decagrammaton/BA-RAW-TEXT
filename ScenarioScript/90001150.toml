[translation]
90001150-1 = "第15話;打雪仗"
90001150-7 = "……以上就是目前的狀況。"
90001150-8 = "來，還有誰有問題嗎？"
90001150-10 = "那個……陽葵前輩？#n因為聽起來實在太缺乏現實感了……你該不會是在開駭客特有的玩笑吧？"
90001150-11 = "姐姐……"
90001150-13 = "嗯，我也預料到可能會是這種反應……"
90001150-15 = "然而這就是目前正在發生的現實。就像陽葵說的一樣。"
90001150-16 = "現在我們該做的是解除多次元防護罩……"
90001150-17 = "你們應該也還記得吧……當時也曾發生過同樣的事。"
90001150-22 = "[ns1]「沒錯，所以我才會拜託愛麗絲……和大家幫忙。」\n[ns2]「對不起。各位。」"
90001150-25 = "[ns3]「我也不知道這次能不能負起所有責任。」\n[ns4]「不過能做到的事情我全都會嘗試。」"
90001150-30 = "咦？老師？既然老師都這麼說了，我們也沒有其他意見……！"
90001150-31 = "沒，沒錯！你一直低著頭，我們反而會覺得很抱歉的！"
90001150-33 = "而且……這件事其實……"
90001150-35 = "……嗯，愛麗絲明白了。就跟那時候一樣。"
90001150-44 = "只要是為了老師，愛麗絲什麼都能承擔。"
90001150-45 = "只是……"
90001150-46 = "[s]「只是……？」"
90001150-51 = "不，不會有問題的。#n因為世界上有魔法跟奇蹟，所以一定沒問題。"
90001150-52 = "愛麗絲……？"
90001150-53 = "但是，只靠愛麗絲是不夠的。"
90001150-58 = "怎麼說呢？如果不夠的話，我們就必須設法……"
90001150-59 = "愛麗絲那天確實舉起了光之劍……「受祝福的」光之劍沒錯。"
90001150-60 = "可是只靠愛麗絲一個人的力量沒辦法達成。#n當時是如此，現在也沒有改變。"
90001150-61 = "如果愛麗絲想再次拿起受祝福的光之劍……"
90001150-66 = "就需要有Kei的力量。"
90001150-68 = "Kei……？"
90001150-73 = "啊！"
90001150-74 = "愛麗絲醬！這麼說來，難道那時候也是……？#nKei醬他好像答應了愛麗絲醬的請求……？"
90001150-76 = "嗯，是因為Kei協助了愛麗絲，所以愛麗絲才能完全拿起受祝福的光之劍。#n除此之外……"
90001150-77 = "……"
90001150-78 = "其實，愛麗絲也不知道為什麼是自己留了下來，而Kei卻離開了。"
90001150-79 = "但無論是當時還是現在，如果想攻略魔王城的話，就不能少了Kei的存在。"
90001150-80 = "[s]「原來如此……」"
90001150-81 = "……總之，如果「Kei」的存在是必要條件的話，那就沒辦法了。"
90001150-82 = "要是至少有一點關於Kei的線索就好了……"
90001150-84 = "……部長？"
90001150-89 = "我知道你想說什麼，英美。"
90001150-91 = "沒關係嗎？那件事……可以說嗎？"
90001150-93 = "……這是有關學者應該要具備的良心的問題。季、英美。"
90001150-94 = "不能把明明存在的東西硬說成不存在。"
90001150-95 = "可是……"
90001150-100 = "如果那是陽葵部長的想法，我也沒有異議。"
90001150-105 = "莉央，雖然我不清楚把這個情報告訴你是否正確，但我知道有關Kei的線索。"
90001150-110 = "什麼！？"
90001150-111 = "在我們搭乘生命守護者主艦，突入阿特拉哈西斯的方舟的那天……"
90001150-118 = "你說你把Kei移植到愛麗絲的鑰匙圈裡了！？"
90001150-120 = "……"
90001150-121 = "你先冷靜點，莉央。#n那個資料的大小只有2KB而已。"
90001150-122 = "根本不會發生什麼神奇的事，只是想把愛麗絲的願望融入其中……"
90001150-123 = "那真的是自然產生的資料嗎？"
90001150-129 = "莉央前輩？"
90001150-131 = "是，是啊。為什麼突然這麼說？"
90001150-132 = "……"
90001150-133 = "好像捕捉到一絲線索了。"
90001150-134 = "！？"
90001150-136 = "嗯？真的嗎？是什麼線索！？"
90001150-137 = "[s]「可以跟我們詳細說明嗎？」"
90001150-140 = "如果我的想法是對的，現在我們需要的就是那個資料……"
90001150-141 = "也就是植入鑰匙圈裡那2KB的檔案。"
90001150-142 = "但那是連分析到位元單位也無法理解的資料哦？"
90001150-143 = "我想也是。如果使用「奇普托斯」的「普通」技術，出現那種結果也是理所當然的。"
90001150-144 = "你的意思是有其他方法嗎？"
90001150-145 = "這……"
90001150-147 = "難道……難道有辦法救活Kei嗎，莉央前輩！？"
90001150-152 = "愛麗絲，你先等等。#n目前還沒有足夠的情報……"
90001150-153 = "請告訴愛麗絲，莉央前輩認為救得了Kei嗎？"
90001150-159 = "……對不起，我似乎也有點激動了。#n硬要說機率的話，大概在五成左右……"
90001150-160 = "不，準確來說或許會更低吧。"
90001150-161 = "而且更重要的是……如果失敗的話，連那僅剩的2KB資料都可能完全消失。"
90001150-163 = "！"
90001150-165 = "愛麗絲……"
90001150-166 = "愛麗絲醬……"
90001150-167 = "……"
90001150-169 = "也就是說……要是一個不小心，這次可能會完全失去Kei嗎？"
90001150-170 = "……"
90001150-171 = "這麼說有點殘酷，但是愛麗絲……"
90001150-172 = "這個問題的選擇……也許該取決於你。"
90001150-173 = "愛麗絲……但是Kei……"
90001150-179 = "（彎下腰和愛麗絲對視）"
90001150-180 = "[ns]「愛麗絲，你想怎麼做呢？」"
90001150-184 = "咦……是說愛麗絲嗎？"
90001150-185 = "因為這是Kei的事情……由愛麗絲來決定有點……"
90001150-186 = "[s]「嗯，是啊。誰都不能草率地決定這件事。」"
90001150-188 = "[ns5]「但是跟世界上的其他人相比……」\n[ns6]「我覺得愛麗絲有權再多說一點。」"
90001150-191 = "……！"
90001150-192 = "愛麗絲……"
90001150-193 = "愛麗絲……還是……"
90001150-200 = "想見到Kei。"
90001150-203 = "愛麗絲想再見Kei一面。"
90001150-204 = "老實說，因為愛麗絲還在見習中，所以也不太清楚。#n世界上還有太多愛麗絲不懂的事。"
90001150-205 = "雖然有盡可能站在Kei的立場，思考Kei會怎麼想這個問題，卻還是想不透……"
90001150-206 = "也許Kei會希望愛麗絲別再管自己了。"
90001150-213 = "但是那天，能留下來的是愛麗絲而不是Kei……這肯定不是偶然。"
90001150-214 = "所以接下來的這些，是愛麗絲的私心。"
90001150-218 = "愛麗絲想再和Kei說話。"
90001150-219 = "這次想成為Kei的夥伴……甚至是朋友。"
90001150-220 = "假如Kei真的能回來的話，愛麗絲願意傾聽他所有的埋怨。"
90001150-221 = "就算真的出了什麼差錯而永遠失去Kei，愛麗絲也不會責怪莉央前輩。"
90001150-222 = "愛麗絲真是……沒資格擔任勇者。"
90001150-223 = "居然因為自己的私心，而可能把Kei送到永遠無法見面的地方。#n是愛麗絲拜託莉央前輩做那種事的。"
90001150-224 = "非常抱歉，莉央前輩。#n對不起……"
90001150-226 = "別，別這麼說，我……"
90001150-228 = "老師也是，非常對不起。#n愛麗絲就是這麼貪心……"
90001150-229 = "[s] 「……」"
90001150-230 = "愛麗絲想向所有人……說聲對不起。"
90001150-231 = "那麼……"
90001150-236 = "……"
90001150-238 = "Kei的事情就麻煩大家了。"
90001150-239 = "……！"
90001150-240 = "……我知道了，愛麗絲。#n既然可愛的後輩都開口拜託了，又有誰能拒絕呢？"
90001150-241 = "莉央？別呆站在那邊了，馬上開始吧。#n既然得到我這擁有全知學位的超天才病弱美少女的幫助，就不能容許失敗發生。"
90001150-243 = "但，但是我剛才也說過，成功的機率遠低於一半……"
90001150-248 = "一定要成功，知道了嗎？"
90001150-252 = "……我知道了。#n現在不是談論可能性的時候吧。"
90001150-254 = "那，那個，老師、陽葵前輩、莉央前輩……？#n愛麗絲也……可以一起進去嗎？"
90001150-259 = "愛麗絲？"
90001150-260 = "怎麼突然這麼說？"
90001150-261 = "這……我並不建議這麼做，愛麗絲。#n除了這會是相當危險的工程之外……"
90001150-262 = "要是有個萬一……你就會親眼……"
90001150-264 = "可，可是……愛麗絲……"
90001150-269 = "（陽葵突然使了個眼色）"
90001150-270 = "（本來還在納悶那是什麼意思……突然有個想法從腦海中閃過！）"
90001150-276 = "[ns]「來，愛麗絲，還有遊戲開發部的大家。」"
90001150-278 = "嗯……？"
90001150-279 = "怎麼了嗎，老師？"
90001150-283 = "[ns]「要不要一起去外面打雪仗？」"
90001150-285 = "打，打雪仗……？#n為什麼這麼突然……？"
90001150-291 = "……！"
90001150-292 = "好啊，老師！真是個好主意呢！#n那我們就先出發囉！"
90001150-297 = "姐，姐姐！？怎麼連姐姐都突然這樣！"
90001150-298 = "桃井？桃井？#n可是愛麗絲，愛麗絲……！"
90001150-304 = "哎呀……桃井也真是的……"
90001150-305 = "非常謝謝您，老師。"
90001150-306 = "[s]「這種事就包在我身上吧。」"
90001150-308 = "還請留意別感冒了。#n萬一發燒的話，到時候我會整天在身邊照顧您。"
90001150-309 = "仔細想想，那種情況其實也挺令人期待的。"
90001150-310 = "季……你是希望老師感冒，還是不希望老師感冒？"
90001150-311 = "我也不清楚。"
90001150-312 = "唔嗯，好吧……"
90001150-318 = "[ns]「哦！你們已經開始了啊！」"
90001150-326 = "啊哈哈哈哈！接招吧，綠！"
90001150-327 = "啊，好冰！好冰哦！#n姐姐你真是……！我可不會輸哦！"
90001150-330 = "桃井、綠？而且連老師也……？"
90001150-331 = "大家怎麼突然……？但是愛麗絲……"
90001150-332 = "[s]「你覺得怎麼樣呢，愛麗絲？」"
90001150-336 = "愛麗絲……不清楚。#n雖然愛麗絲覺得現在這樣很好，但是Kei……"
90001150-337 = "Kei他……"
90001150-338 = "[s]「說的沒錯。這樣就對了。」"
90001150-342 = "嗯？這是什麼意思呢，老師？"
90001150-343 = "[s]「你不想讓Kei看到這麼棒的景象嗎？」"
90001150-344 = "嗯？讓Kei……？"
90001150-355 = "……嗯，確實是很棒的景象呢。"
90001150-359 = "沒想到世界上居然有地方會下這麼多的雪。#n那是企鵝嗎？愛麗絲第一次親眼看到。"
90001150-360 = "雖然桃井說過可能一到極地就會凍僵，但實際上並非如此。"
90001150-361 = "就算真的很冷……但愛麗絲覺得這裡也的確是世界的一部分。"
90001150-362 = "[s7]「沒錯，所以如果想說明這裡有多棒的話……」\n[s8]「愛麗絲就該先開心地大玩一場。」"
90001150-365 = "[ns]「最重要的是Kei一定會回來，對吧？」"
90001150-369 = "Kei一定會回來……"
90001150-373 = "……"
90001150-374 = "沒錯，老師！是愛麗絲想得不夠遠！"
90001150-375 = "老師說的對！#n如果想說明世界有多美好……"
90001150-376 = "愛麗絲就該比其他人更了解才行！#n為了達到這個目的──"
90001150-385 = "唔啊！？"
90001150-387 = "啊，啊啊啊……！綠丟的雪球砸到愛麗絲醬了……！"
90001150-393 = "愛麗絲知道了！這是假裝攻擊桃井，其實是要攻擊愛麗絲的迂迴戰術對吧！"
90001150-399 = "但是愛麗絲也不會輸的！#n愛麗絲要上了！"
90001150-407 = "噗哈！？"
90001150-408 = "啊哈哈！綠你看看你！真的超好笑的！唔哇啊！？"
90001150-417 = "這次是愛麗絲醬的雪球命中了桃井……！？"
90001150-418 = "好啊，愛麗絲！你想跟我打一場是吧？"
90001150-420 = "愛麗絲已經準備好了！#n就算對手是桃井跟綠也不會手下留情的哦！"
90001150-438 = "悄悄地……瞄準背後……！"
90001150-444 = "[ns]「既然這樣……我也來！」"
90001150-450 = "嗚啊啊！？！？"
90001150-451 = "呀啊！？！？"
90001150-452 = "呃啊！！？？"
90001150-456 = "噫噫！？突然連老師也……？"
90001150-457 = "[ns9]「哈哈哈哈！大家都大意了呢！」\n[ns10]「在這場冷酷且不分敵我的雪仗裡……！」\n[ns11]「分心可是不要命的行為哦！」"
90001150-465 = "很～好，老師！我才羽桃井可是絕對不會一直輸下去的！"
90001150-466 = "呵呵，我知道老師的意思了。#n那麼老師應該也做好覺悟了吧？"
90001150-467 = "愛麗絲知道！這是所有人對所有人的戰爭！"
90001150-474 = "說的也是……打雪仗的時候，就連老師都不能相信……！"
90001150-483 = "[ns]「呃啊，怎麼會！但我不會一直輸的！」"
90001150-484 = "哇啊！啊哈哈哈哈！"
90001150-485 = "來抓我呀，老師！"
90001150-487 = "愛麗絲已經學過了，連擊之中的每一下都要投入真心！"
90001150-493 = "那我也要拿出真功夫了……！"
90001150-499 = "（之後的好一陣子，大家一邊互丟雪球，一邊高聲地在雪原上四處奔跑）"
90001150-503 = "（那樣的時間……對當時在場的所有人來說都是不可或缺的）"
90001150-507 = "（看著玩得十分盡興的孩子們）"
90001150-509 = "（悄悄地在不被發現的情況下回到了冰海基地）"
90001150-515 = "歡迎您，老師。#n請先擦拭一下身體，我來幫忙吧。"
90001150-516 = "你來得正是時候，老師。#n現在我們……正好準備了這個基地可用的所有資料儲存裝置。"
90001150-517 = "雖然不是很清楚，但莉央大人表示需要大量的儲存空間。"
90001150-518 = "由於是需要力量的工作，所以我和英美都在幫忙。"
90001150-519 = "[s]「那麼現在……」"
90001150-520 = "嗯。"
90001150-521 = "老師就跟我們一起，看著Kei復活吧。"
90001150-523 = "下一話;呼喚聲"

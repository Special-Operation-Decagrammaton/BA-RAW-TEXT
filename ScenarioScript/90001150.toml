[translation]
90001150-1 = "Episode 15;Snow Fight"
90001150-7 = "...And that sums up the current situation."
90001150-8 = "Now, any more questions?"
90001150-10 = "Uh... Himari? I'm only asking this because everything you just said is so totally unbelievable...but this isn't some joke hackers like to make that I'm just not getting, right?"
90001150-11 = "Seriously, Sis? Please..."
90001150-13 = "I did expect at least one person to have that reaction..."
90001150-15 = "However, that truly is the current situation. Just as Himari said."
90001150-16 = "Our current objective is to disable the Multidimensional Barrier."
90001150-17 = "Yes. Just like last time, if you recall."
90001150-22 = "[ns1] \"Which is why I asked Aris and you all for help.\"\n[ns2] \"I'm sorry, everyone.\""
90001150-25 = "[ns3] \"I might not be able to take care of things this time...\"\n[ns4] \"...but I'll do what I can.\""
90001150-30 = "S-Sensei?! If you say stuff like that, how are we supposed to respond?!"
90001150-31 = "Sh-She's right! Bowing your head just makes us feel bad!"
90001150-33 = "O-On top of that... Well, this is actually..."
90001150-35 = "...Yes. I understand. Just like last time."
90001150-44 = "I can do it, Sensei. I can do anything for you."
90001150-45 = "But..."
90001150-46 = "[s] \"But...?\""
90001150-51 = "No. Nothing. It will be okay. In this world, there are magic and miracles. So I am sure everything will work out."
90001150-52 = "Aris...?"
90001150-53 = "But I am not enough on my own."
90001150-58 = "What do you need? Whatever it is, we'll get it to you, one way or another."
90001150-59 = "It is true that I was able to lift the Sword of Light...the \"Blessed\" Sword of Light on that day."
90001150-60 = "However, I cannot lift it with just my strength. It was the same back then."
90001150-61 = "In order for me to equip the Blessed Sword of Light again..."
90001150-66 = "...I need Kei."
90001150-68 = "Kei...? "
90001150-73 = "Ah!"
90001150-74 = "Aris! Does that mean that back then...Kei fulfilled your request...?"
90001150-76 = "Yes. Kei helped me. Which is why I was able to lift the Blessed Sword of Light. And..."
90001150-77 = "..."
90001150-78 = "If I am being honest, I do not know why Kei had to leave, and I remained here."
90001150-79 = "But both back then and now, we cannot clear the demon lord's castle without Kei."
90001150-80 = "[s] \"I see...\""
90001150-81 = "...If \"Kei\" is an essential part of the process, then it can't be helped."
90001150-82 = "If I had even the smallest clue about Kei, then maybe..."
90001150-84 = "...President?"
90001150-89 = "I know, Eimi. I know."
90001150-91 = "Is it okay? Is it okay...to talk about that?"
90001150-93 = "...Toki, Eimi, this is an ethical problem that scholars must grapple with."
90001150-94 = "We can't deny what has been proven to exist."
90001150-95 = "But..."
90001150-100 = "Understood. If that's what President Himari thinks."
90001150-105 = "Rio. I don't know if it's right to tell you this or not, but we do have a clue about Kei."
90001150-110 = "What?!"
90001150-111 = "On the day we charged the Ark of Atrahasis in Utnapishtim's Ship..."
90001150-118 = "So Kei was transplanted into Aris' keychain doll?!"
90001150-120 = "..."
90001150-121 = "Calm down, Rio. It was only 2 KB of data."
90001150-122 = "And there's nothing to be gotten from it. It was something we did to give Aris' hope a physical form."
90001150-123 = "Are you sure that data was formed naturally?"
90001150-129 = "Rio?"
90001150-131 = "Y-Yes. Why are you asking this all of a sudden?"
90001150-132 = "..."
90001150-133 = "It's small, but I may have something."
90001150-134 = "?!"
90001150-136 = "You do? Really, truly? What is it?!"
90001150-137 = "[s] \"Tell us more, please.\""
90001150-140 = "If I'm correct, what we need right now is the data..."
90001150-141 = "...from the 2 KB file that you transplanted into the keychain."
90001150-142 = "But we've already tried to analyze it at the bit level, and there was no data there...?"
90001150-143 = "That would be the natural result if you utilized the \"generic\" technology of Kivotos."
90001150-144 = "Is there a different approach for this kind of data?"
90001150-145 = "That's..."
90001150-147 = "Can you save Kei, Rio?!"
90001150-152 = "Aris, please wait. We still don't have enough context or information—"
90001150-153 = "Please answer me! Can you save Kei, Rio?"
90001150-159 = "...I'm sorry. I got a little bit ahead of myself. If we were to talk about probabilities, it would be about 50/50..."
90001150-160 = "No. If I were to be precise, it would be significantly less."
90001150-161 = "And, more importantly, if I fail, then whatever data you have may vanish completely."
90001150-163 = "!"
90001150-165 = "Aris..."
90001150-166 = "Aris..."
90001150-167 = "..."
90001150-169 = "...Does that mean, if things go wrong, I might lose Kei for good...?"
90001150-170 = "..."
90001150-171 = "It's cruel to say this to you, Aris..."
90001150-172 = "...but the final decision is yours."
90001150-173 = "But to me...Kei is..."
90001150-179 = "I bent down to Aris' eye level."
90001150-180 = "[ns] \"Aris, what do you want to do?\""
90001150-184 = "What...? What do you mean?"
90001150-185 = "But this is about Kei...and if I am the one to decide..."
90001150-186 = "[s] \"Yes. You're right. No one should be able to choose for Kei.\""
90001150-188 = "[ns5] \"However, I think you have the right to make this decision, Aris...\"\n[ns6] \"...more than anyone else in this world.\""
90001150-191 = "...!"
90001150-192 = "I..."
90001150-193 = "...I...want to..."
90001150-200 = "...see Kei again."
90001150-203 = "Just once more, I want to see Kei."
90001150-204 = "I really am not sure. I am only an apprentice, and there is much of this world I have yet to learn."
90001150-205 = "I tried to put myself in Kei's shoes, to understand how Kei would feel about this...but I still do not know."
90001150-206 = "Kei might say to let her go."
90001150-213 = "On that day, I was the one who got to stay, and Kei left. I am sure...that was not a coincidence."
90001150-214 = "That is why, from here on out, these are all my personal desires."
90001150-218 = "I want to talk to Kei again."
90001150-219 = "I want the chance to be allies with Kei. I want to be her friend."
90001150-220 = "If there is even a small chance for Kei to come back, I will take full responsibility."
90001150-221 = "If something goes wrong and I do truly lose Kei, I will not blame Rio."
90001150-222 = "Really, really...I am a failure as a hero."
90001150-223 = "To fulfill my own desires, I may send Kei somewhere I will never be able to see her again. That is what I am asking of Rio."
90001150-224 = "I am sorry, Rio. I am very sorry..."
90001150-226 = "N-No. I..."
90001150-228 = "Sensei, I am sorry to you too. I am a greedy person..."
90001150-229 = "[s] \"...\""
90001150-230 = "I also want to apologize...to everyone else. So..."
90001150-231 = "...So..."
90001150-236 = "..."
90001150-238 = "I will entrust Kei to you."
90001150-239 = "...!"
90001150-240 = "...We understand. After all, it's a request from our adorable Aris. How could we say no?"
90001150-241 = "Rio? This is no time to be dawdling about. Let us begin. As long as I, Millennium's delicate, yet beautiful, super-genius hacker who also has a degree in Omniscience, am assisting you, I will not tolerate failure."
90001150-243 = "I-I should reiterate, the odds of success are less than half..."
90001150-248 = "We will succeed. Understood?"
90001150-252 = "...I get it. Now isn't the time to consider probabilities."
90001150-254 = "U-Um. Sensei? Himari? Rio...? Can I...go in with you?"
90001150-259 = "Aris?"
90001150-260 = "Why all of a sudden?"
90001150-261 = "I...wouldn't recommend that, Aris. This is going to be quite a...dangerous process. On top of that..."
90001150-262 = "If we do fail, then you would witness, with your own two eyes..."
90001150-264 = "But, but...I..."
90001150-269 = "Himari gave me a sharp look."
90001150-270 = "I was trying to decipher what it meant when realization dawned on me..."
90001150-276 = "[ns] \"Now, Aris. And the Game Development Department.\""
90001150-278 = "Y-Yes...?"
90001150-279 = "What do you need, Sensei?"
90001150-283 = "[ns] \"Wanna go outside for a snowball fight?\""
90001150-285 = "A...snowball fight? N-Now, of all times?"
90001150-291 = "...!"
90001150-292 = "I like it, Sensei! What a great idea! We'll go outside RIGHT NOW!"
90001150-297 = "S-Sis?! What are you doing all of a sudden?"
90001150-298 = "Momoi? Momoi? But I, I..."
90001150-304 = "U-Ugh... Seriously, Momoi..."
90001150-305 = "Thank you, Sensei."
90001150-306 = "[s] \"Leave them to me.\""
90001150-308 = "Be careful not to get sick. However, if you do happen to get a fever, I will stay at your bedside, day and night."
90001150-309 = "Now that I think about it, I look forward to that situation occurring."
90001150-310 = "Toki... Do you want Sensei to be healthy or not?"
90001150-311 = "I'm not sure either."
90001150-312 = "Okay, okay..."
90001150-318 = "[ns] \"Oh! You're already at it!\""
90001150-326 = "Ahahaha! One more! Take this, Midori!"
90001150-327 = "Ow, that's cold! Ah! It's cooold! Sis, seriously! Don't think I'm going to just lie down and take that!"
90001150-330 = "Momoi? Midori? And even Sensei...?"
90001150-331 = "Why is everyone suddenly...? But I..."
90001150-332 = "[s] \"What're you thinking, Aris?\""
90001150-336 = "I...do not know. This is enjoyable, but Kei..."
90001150-337 = "...Kei..."
90001150-338 = "[s] \"You're right. That's exactly why we have to do this.\""
90001150-342 = "Hm? What does that mean, Sensei?"
90001150-343 = "[s] \"Don't you want to show Kei cool things like this?\""
90001150-344 = "What? Something like this...to Kei...?"
90001150-355 = "...I do. It is very cool."
90001150-359 = "I have never seen so much snow in one place. And look, there is a penguin! I have never seen one in real life."
90001150-360 = "Momoi said one would freeze instantly upon setting foot in the polar region, but it turns out that was not the case."
90001150-361 = "It is very cold...but this place also feels like it belongs in this world."
90001150-362 = "[s7] \"You're right. And you're going to tell her about how amazing it is here.\"\n[s8] \"But first you have to have fun and enjoy it yourself, right?\""
90001150-365 = "[ns] \"After all, Kei is definitely coming back.\""
90001150-369 = "Kei will definitely..."
90001150-373 = "..."
90001150-374 = "Sensei, you are correct! I did not think of it that way!"
90001150-375 = "I understand what you are saying! So that I may tell her about how amazing this world is..."
90001150-376 = "...I must learn more about it first! In order to do that—"
90001150-385 = "Kyaaah?!"
90001150-387 = "A-Ah!! Midori's snowball hit Aris...!"
90001150-393 = "I understand! You pretended to attack Momoi as a diversionary tactic, but attacked me instead!"
90001150-399 = "But I will not lose! Take this!"
90001150-407 = "Gyaaah?!"
90001150-408 = "Ahaha! Midori! That was so funny— Aaah?! "
90001150-417 = "Aris landed a direct hit on Momoi!"
90001150-418 = "All right, Aris! That's the spirit! Bring it on!"
90001150-420 = "I am ready! I will not go easy on you, Momoi, Midori!"
90001150-438 = "I should...sneak behind and aim for the back...!"
90001150-444 = "[ns] \"Then... Me too!\""
90001150-450 = "Aaah?!"
90001150-451 = "Kyaaah?!"
90001150-452 = "Aaaugh?!"
90001150-456 = "E-Eek?! Sensei, you too...?"
90001150-457 = "[ns9] \"Hahahaha! You all let your guard down!\"\n[ns10] \"In this cold-blooded, merciless snow fight, trust no one...!\"\n[ns11] \"Letting down your guard means giving up your life!\""
90001150-465 = "I see how it is, Sensei! I, Saiba Momoi, won't stand by and accept defeat!"
90001150-466 = "Fufufu. Your words ring true, Sensei. But that means you're also prepared, right?"
90001150-467 = "I know this! This is \"bellum omnium contra omnes,\" the war of all against all!"
90001150-474 = "That's right... In the middle of a snow fight, I can't even trust Sensei...!"
90001150-483 = "[ns] \"Augh, how could this happen?! But I won't go down that easily!\""
90001150-484 = "Yay! Ahahaha!"
90001150-485 = "Try and get me, Sensei!"
90001150-487 = "I have heard that consecutive hits are meant to carry seriousness in each and every one of them!"
90001150-493 = "Th-Then I'll get serious too...!"
90001150-499 = "We spent a long time throwing snowballs at each other, laughing and yelling as we ran through the snowy fields."
90001150-503 = "At that time...we needed something like that."
90001150-507 = "I watched them for a little bit as they gleefully reveled in the novelty of snow and ice."
90001150-509 = "With their attention diverted, I quietly slipped back into the base."
90001150-515 = "Welcome, Sensei. You should wipe yourself off first. Please allow me to help you."
90001150-516 = "You're here right on time, Sensei. We, uh...just finished preparing all the usable data storage devices in this base."
90001150-517 = "I don't understand the exact details, but Rio said we need as many data fields as we can get."
90001150-518 = "Since that required manpower, Eimi and I were assisting."
90001150-519 = "[s] \"Does that mean...?\""
90001150-520 = "Yes."
90001150-521 = "We're going to bear witness to Kei's resurrection."
90001150-523 = "Next Episode;The Sounds of Summoning"

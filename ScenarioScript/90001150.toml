90001150-308 = "ระวังเป็นหวัดด้วยนะคะ ถ้าเกิดกลับมาแล้วมีไข้ละก็ ตอนนั้นฉันจะคอยดูแลให้ตลอดทั้งวันเลยค่ะ"

[translation]
90001150-1 = "ตอนที่ 15;เล่นปาหิมะ"
90001150-7 = "สถานการณ์ที่เกิดขึ้นจนถึงตอนนี้ก็เป็นอย่างนี้ละค่ะ..."
90001150-8 = "เอาละ มีใครมีคำถามมั้ยคะ?"
90001150-10 = "อ่า... รุ่นพี่ฮิมาริ? ฉันสงสัยเพราะมันฟังดูไม่สมจริงเอาเสียเลยน่ะ...รุ่นพี่ไม่ได้เอามุขตลกของแฮ็กเกอร์#nมาพูดอยู่ใช่มั้ย?"
90001150-11 = "พี่โมโมอิ ขอร้องล่ะ พี่..."
90001150-13 = "ค่ะ ฉันคาดไว้แล้วละค่ะว่าใครได้ฟังก็คงมีท่าทีแบบนี้..."
90001150-15 = "แต่นี่คือความจริงที่กำลังเกิดขึ้นอยู่ในตอนนี้ อย่างที่ฮิมาริว่านั่นละ"
90001150-16 = "ตอนนี้สิ่งที่พวกเราต้องทำก็คือ การปลดบาเรียพหุมิติ..."
90001150-17 = "ใช่แล้วละ มันเหมือนกับในตอนนั้น... ที่พวกเธอก็น่าจะยังจำกันได้"
90001150-22 = "[ns1] \"ใช่ ครูก็เลยขอให้อาริสึ... และทุกคนมาช่วยน่ะ\"\n[ns2] \"ใช่แล้วละ ขอโทษนะทุกคน\""
90001150-25 = "[ns3] \"ครั้งนี้ครูไม่รู้ว่าจะรับผิดชอบทุกอย่างได้หรือเปล่า แต่ครูจะทำให้เต็มที่\"\n[ns4] \"ครูไม่รู้ว่าจะรับผิดชอบทุกอย่างได้หรือเปล่า แต่ครูจะพยายามจนถึงที่สุด\""
90001150-30 = "หืม? คุณครู? ถ้าคุณครูพูดอย่างนั้น พวกเราก็ไม่รู้จะพูดอะไรน่ะสิ...!"
90001150-31 = "ชะ... ใช่ค่ะ! แล้วถ้ายืนคอตกอยู่แบบนั้นละก็ พวกเราจะรู้สึกผิดมากกว่านะคะ!"
90001150-33 = "อีกอย่าง... เรื่องนี้น่ะ... จริงๆ แล้ว..."
90001150-35 = "ค่ะ... เข้าใจแล้วค่ะ เหมือนตอนนั้นสินะคะ"
90001150-44 = "เข้าใจแล้วค่ะ คุณครู เพื่อคุณครูแล้วละก็ อาริสึทำได้ทุกอย่างค่ะ"
90001150-45 = "แต่ว่า..."
90001150-46 = "[s] \"แต่ว่า...?\""
90001150-51 = "ไม่ค่ะ ไม่เป็นไรหรอกค่ะ ก็โลกของเรามีเวทมนตร์และปาฏิหาริย์อยู่นี่คะ เพราะงั้นมันจะต้องไม่เป็นไร"
90001150-52 = "อาริสึ...?"
90001150-53 = "แต่แค่อาริสึคนเดียวคงไม่เพียงพอค่ะ"
90001150-58 = "หมายความว่าอะไรเหรอคะ? ถ้ายังขาดเหลืออะไร ก็บอกพวกเรา..."
90001150-59 = "วันนั้นจริงอยู่ที่อาริสึ... ยกดาบแห่งแสง 'ประสาทพร' ขึ้นมาได้ค่ะ"
90001150-60 = "แต่ว่าด้วยพลังของอาริสึเพียงคนเดียวคงทำแบบนั้นไม่ได้หรอกค่ะ ทั้งในตอนนั้น แล้วก็ตอนนี้ด้วยค่ะ"
90001150-61 = "ถ้าจะยกดาบแห่งแสงประสาทพรให้ได้อีกครั้ง..."
90001150-66 = "อาริสึก็ต้องมีเคย์ค่ะ"
90001150-68 = "เคย์... งั้นเหรอ? "
90001150-73 = "อ๊ะ!"
90001150-74 = "อาริสึจัง! ถ้างั้นตอนนั้น...? เคย์จังทำตามที่อาริสึจังขอเหรอ...?"
90001150-76 = "ค่ะ เคย์ช่วยอาริสึไว้ค่ะ ตอนนั้นอาริสึก็เลยยกดาบแห่งแสงประสาทพรขึ้นมาได้ค่ะ แล้วก็..."
90001150-77 = "..."
90001150-78 = "ที่จริงอาริสึก็ไม่รู้ว่าทำไมอาริสึถึงยังอยู่ และทำไมเคย์ถึงหายไป"
90001150-79 = "แต่ถึงอย่างนั้น ถ้าเราจะทำลายป้อมราชาปีศาจ ไม่ว่าจะในตอนนั้นหรือตอนนี้ อาริสึก็ต้องมีเคย์ค่ะ"
90001150-80 = "[s] \"อย่างนี้นี่เองสินะ...\""
90001150-81 = "ถ้าจำเป็นต้องมี 'เคย์' ในกระบวนการนี้ งั้นก็คงช่วยไม่ได้..."
90001150-82 = "ถ้ามีเบาะแสเล็กๆ น้อยๆ เกี่ยวกับเคย์ก็คงจะดีสินะ..."
90001150-84 = "หัวหน้า...?"
90001150-89 = "ฉันรู้ว่าเอมิจะพูดอะไรค่ะ"
90001150-91 = "จะไม่เป็นไรเหรอคะ? เราจะ... พูดเรื่องนั้นได้เหรอคะ?"
90001150-93 = "นี่คือเรื่องจิตสำนึกที่นักวิชาการต้องมีน่ะค่ะ... โทคิ เอมิ"
90001150-94 = "สิ่งที่มีอยู่อย่างชัดแจ้งน่ะ เราไม่อาจบอกได้ว่าสิ่งนั้นไม่มีอยู่จริงนี่คะ"
90001150-95 = "แต่ว่า..."
90001150-100 = "เข้าใจแล้วค่ะ ถ้านั่นคือเจตจำนงของหัวหน้าฮิมาริละก็..."
90001150-105 = "ริโอะ ฉันไม่รู้ว่าควรส่งข้อมูลนี้ให้คุณหรือเปล่า แต่ว่าฉันมีเบาะแสของเคย์อยู่ค่ะ"
90001150-110 = "ว่าไงนะ?!"
90001150-111 = "วันที่พวกเรานั่งเรือรบของอุตนาพิชทิมแล้วมุ่งหน้าเข้าสู่เรืออะทราฮาซิส..."
90001150-118 = "จะบอกว่าย้ายเคย์ไปไว้ในพวงกุญแจตุ๊กตาของอาริสึงั้นเหรอ?!"
90001150-120 = "..."
90001150-121 = "ใจเย็นๆ ก่อนค่ะ ริโอะ ข้อมูลนั้นมีขนาดแค่ 2KB ค่ะ"
90001150-122 = "เราแค่จะเก็บความปรารถนาของอาริสึเอาไว้ เราไม่รู้ว่านั่นคือเคย์ตั้งแต่แรกด้วยค่ะ..."
90001150-123 = "แน่ใจเหรอว่านั่นคือข้อมูลที่เกิดขึ้นตามธรรมชาติจริงๆ น่ะ?"
90001150-129 = "รุ่นพี่ริโอะ?"
90001150-131 = "จู่ๆ พูดแบบนี้ หมายความว่าอะไรเหรอคะ?"
90001150-132 = "..."
90001150-133 = "ฉันพอเห็นเบาะแสนิดหน่อยแล้วละ"
90001150-134 = "?!"
90001150-136 = "คะ? จริงเหรอคะ? เบาะแสอะไรคะ?!"
90001150-137 = "[s] \"ช่วยอธิบายอีกหน่อยได้มั้ย?\""
90001150-140 = "ถ้าเป็นไปตามที่ฉันคิดละก็ ตอนนี้สิ่งที่พวกเราต้องการก็คือข้อมูลนั้น"
90001150-141 = "ไฟล์ขนาด 2KB ที่อยู่ในพวงกุญแจตุ๊กตานั่นไงล่ะ"
90001150-142 = "แต่ต่อให้วิเคราะห์ข้อมูลลึกลงไปจนถึงหน่วยบิต มันก็เป็นข้อมูลที่ไม่รู้ความหมายอยู่ดีนะคะ?"
90001150-143 = "ก็คงจะเป็นแบบนั้น ถ้าใช้เทคโนโลยี 'ทั่วไป' ของ 'คิโวทอส' ก็คงจะได้ผลลัพธ์อย่างนั้นนั่นละ"
90001150-144 = "แปลว่าเรามีวิธีอื่นในการเข้าถึงข้อมูลงั้นเหรอคะ?"
90001150-145 = "เรื่องนั้นน่ะ..."
90001150-147 = "จะบอกว่า... เราฟื้นคืนชีพเคย์ได้อย่างนั้นเหรอคะ รุ่นพี่ริโอะ?!"
90001150-152 = "อาริสึ เดี๋ยวก่อนนะคะ เรายังไม่มีข้อมูลสถานการณ์เพียงพอ..."
90001150-153 = "ช่วยตอบด้วยเถอะค่ะ รุ่นพี่ริโอะคิดว่าจะฟื้นคืนชีพเคย์ได้เหรอคะ?"
90001150-159 = "ขอโทษนะ... ฉันคงตื่นเต้นไปหน่อยน่ะ ถ้าจะพูดถึงความเป็นไปได้ ก็คงต้องบอกว่า 50-50..."
90001150-160 = "ไม่สิ ถ้าจะบอกให้ชัดๆ ละก็ ต้องบอกว่ามันน้อยกว่านั้นมาก"
90001150-161 = "และที่สำคัญ... ถ้าเราทำไม่สำเร็จละก็ ครั้งนี้ข้อมูลขนาด 2KB นั้นอาจจะสูญหายไปทั้งหมดก็ได้"
90001150-163 = "!"
90001150-165 = "อาริสึ..."
90001150-166 = "อาริสึจัง..."
90001150-167 = "..."
90001150-169 = "หมายความว่า... ถ้ามีอะไรผิดพลาด เราก็จะสูญเสียเคย์ไปตลอดกาลเลยเหรอคะ...?"
90001150-170 = "..."
90001150-171 = "อาริสึ ถึงคำพูดของฉันมันจะฟังดูโหดร้าย..."
90001150-172 = "แต่ว่าเรื่องนี้... อาจจะขึ้นอยู่กับการตัดสินใจของเธอน่ะ"
90001150-173 = "ขึ้นอยู่กับอาริสึ... แต่มีผลกับเคย์..."
90001150-179 = "(คุณครูโน้มตัวลงมาให้อยู่ในระดับสายตาของอาริสึ)"
90001150-180 = "[ns] \"อาริสึอยากทำยังไงเหรอ?\""
90001150-184 = "คะ...? อาริสึน่ะเหรอคะ?"
90001150-185 = "แต่ว่านี่คือเรื่องของเคย์... อาริสึจะตัดสินใจได้เหรอคะ..."
90001150-186 = "[s] \"อื้อ นี่ไม่ใช่เรื่องที่ไม่ว่าใครก็จะบุ่มบ่ามตัดสินใจได้หรอกนะ\""
90001150-188 = "[ns5] \"แต่ครูมองว่าอาริสึควรได้ออกความคิดเห็นน่ะ\"\n[ns6] \"แต่ครูมองว่าอาริสึควรได้ตัดสินใจเรื่องนี้น่ะ\""
90001150-191 = "...!"
90001150-192 = "อาริสึ..."
90001150-193 = "อาริ... สึ... อยาก..."
90001150-200 = "อยากเจอเคย์ค่ะ"
90001150-203 = "อาริสึอยากเจอเคย์อีกสักครั้งค่ะ"
90001150-204 = "แต่อาริสึไม่แน่ใจเลยค่ะ อาริสึเป็นผู้กล้าฝึกหัด ก็เลยมีสิ่งต่างๆ มากมายในโลกที่ยังไม่รู้ค่ะ"
90001150-205 = "อาริสึพยายามคิดในมุมมองของเคย์ดูว่าถ้าเป็นเคย์จะคิดยังไงเกี่ยวกับปัญหานี้ แต่อาริสึก็ไม่แน่ใจเลย#nค่ะ..."
90001150-206 = "บางทีเคย์อาจจะบอกว่าให้ปล่อยตัวเองไว้อย่างนี้ก็ได้"
90001150-213 = "ในวันนั้นมีแค่อาริสึที่เหลืออยู่ ส่วนเคย์อยู่ต่อไปไม่ได้ อาริสึคิดว่า... นั่นไม่ใช่เรื่องบังเอิญแน่นอนค่ะ"
90001150-214 = "เพราะงั้นจากนี้ต่อไป... จะเป็นความปรารถนาที่เรียกได้ว่าเป็นความโลภของอาริสึ"
90001150-218 = "อาริสึอยากคุยกับเคย์อีกครั้งค่ะ"
90001150-219 = "ครั้งนี้อาริสึอยากเป็นสหาย... อาริสึอยากเป็นเพื่อนกับเคย์ค่ะ"
90001150-220 = "ถ้านี่ทำให้เคย์กลับมาได้จริงๆ อาริสึก็จะรับคำตำหนิเอาไว้เองค่ะ"
90001150-221 = "และแม้ว่าจะเกิดข้อผิดพลาดจนต้องสูญเสียเคย์ไปตลอดกาล อาริสึก็จะไม่โทษรุ่นพี่ริโอะค่ะ"
90001150-222 = "แง... อาริสึไม่มีคุณสมบัติของผู้กล้าเลยค่ะ"
90001150-223 = "อาริสึดึงเคย์เข้ามาข้องเกี่ยวเอง และความโลภของอาริสึอาจจะส่งเคย์ไปยังที่ที่เราไม่มีวันได้พบกันอีก#nก็ได้ แล้วตอนนี้อาริสึยังขอร้องให้รุ่นพี่ริโอะทำงานยากๆ อีก"
90001150-224 = "ต้องขอโทษด้วยค่ะ รุ่นพี่ริโอะ ขอโทษนะคะ..."
90001150-226 = "มะ... ไม่ต้องขอโทษหรอก ฉันน่ะ..."
90001150-228 = "ต้องขอโทษคุณครูด้วยค่ะ อาริสึเป็นคนโลภมากเองค่ะ..."
90001150-229 = "[s] \"...\""
90001150-230 = "แล้วคนโลภมากคนนี้... ก็อยากขอโทษคนอื่นๆ ด้วยค่ะ เพราะงั้น..."
90001150-231 = "เพราะงั้น..."
90001150-236 = "..."
90001150-238 = "ขอรบกวนเรื่องเคย์ด้วยนะคะ"
90001150-239 = "...!"
90001150-240 = "เข้าใจแล้วค่ะ อาริสึ นี่เป็นคำขอจากรุ่นน้องที่น่ารักทั้งที ใครจะปฏิเสธลงล่ะคะ?"
90001150-241 = "ริโอะ? อย่ามัวแต่ยืนเหม่ออยู่ เรามาเริ่มกันเลยดีกว่าค่ะ ตราบใดที่ได้รับความช่วยเหลือจากแฮ็กเกอร์ ผู้มีรอยยิ้มฮีลใจเหมือนยาวิเศษผู้เป็นเจ้าของใบปริญญารอบรู้แห่งมิลเลเนียมคนนี้ ความล้มเหลวจะไม่#nปรากฏขึ้นมาหรอกค่ะ"
90001150-243 = "ตะ... แต่อย่างที่ได้บอกไปก่อนหน้านี้ว่าโอกาสที่จะสำเร็จมีไม่ถึงครึ่ง..."
90001150-248 = "ถึงยังไงเราก็ต้องทำให้สำเร็จค่ะ เข้าใจแล้วหรือยังคะ?"
90001150-252 = "เข้าใจแล้ว... ตอนนี้คงไม่ใช่เวลาจะมาพูดเรื่องความเป็นไปได้"
90001150-254 = "อะ... เอ่อ คุณครู? รุ่นพี่ฮิมาริ? รุ่นพี่ริโอะ...? ขอให้อาริสึ... เข้าไปด้วยได้มั้ยคะ?"
90001150-259 = "อาริสึ?"
90001150-260 = "จู่ๆ ทำไมถึงจะทำอย่างนี้ล่ะคะ?"
90001150-261 = "ฉัน... ไม่อยากแนะนำให้เข้ามาด้วยหรอกนะ อาริสึ อย่างแรกเลย... นี่เป็นกระบวนการที่อันตรายมาก นอกจากนั้น..."
90001150-262 = "ถ้ามันบังเอิญล้มเหลวขึ้นมา... เธอก็จะต้องเห็นสิ่งนั้นด้วยตาตัวเอง..."
90001150-264 = "แต่ถึงยังไง... อาริสึก็..."
90001150-269 = "(ฮิมาริส่งสัญญาณทางสายตาให้คุณครู)"
90001150-270 = "(ระหว่างที่สงสัยว่าหมายถึงอะไร... คุณครูก็นึกบางสิ่งออกอย่างทันควัน!)"
90001150-276 = "[ns] \"เอาละ อาริสึ แล้วก็ชมรมพัฒนาเกมด้วย\""
90001150-278 = "คะ... คะ...?"
90001150-279 = "เรียกพวกเราเหรอคะ คุณครู?"
90001150-283 = "[ns] \"เราออกไปเล่นปาหิมะข้างนอกกันมั้ย?\""
90001150-285 = "ละ... เล่นปาหิมะงั้นเหรอคะ...? ทำไมจู่ๆ ถึง...?"
90001150-291 = "...!"
90001150-292 = "เอาสิ คุณครู! เป็นความคิดที่ดีมากๆ เลยละ! งั้นพวกเราจะออกไปก่อนนะ!"
90001150-297 = "พะ... พี่โมโมอิ?! ทำไมจู่ๆ พี่ก็เออออตามคุณครูเฉยเลย?"

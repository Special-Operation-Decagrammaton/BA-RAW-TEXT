[translation]
1601006-1 = "巨匠的溫柔助眠"
1601006-2 = "今天也辛苦你了，老師。"
1601006-3 = "我根據你上次給我的回饋，研發了一項新的應援道具喔。"
1601006-4 = "畢竟這東西是根據老師的意見製作的，所以希望由老師來當第一名測試者。"
1601006-5 = "[s]「你今天也穿著那套啦啦隊服啊……」"
1601006-6 = "嗯……畢竟今天也跟「應援」有關嘛。"
1601006-7 = "而且我現在要是不穿著這套衣服，就沒有製作新應援道具的動力了呢。"
1601006-8 = "……可能已經在不知不覺中成為習慣了吧。"
1601006-9 = "……總之。"
1601006-10 = "我相信老師你一定會滿意這次的新作。"
1601006-11 = "因為這次的道具和以往的試作品不同，#n是以「所有現代人最渴求的慾望」為靈感來設計的。"
1601006-12 = "我苦心研發出來的成果……就是這個。"
1601006-16 = "[ns1]「這個是……應援用的彩球？」\n[ns2]「不是說過不再用彩球了嗎？」"
1601006-17 = "嗯，但那是指普通的彩球。"
1601006-18 = "嗯，但那是指普通的彩球。"
1601006-19 = "這個彩球跟普通的不同，因為我為它增加了一項特別的功能。"
1601006-20 = "那就是……藍牙功能。"
1601006-21 = "[s]「藍牙？」"
1601006-22 = "嗯。我試著應用先前研發的「昏迷鐵管」的功能。"
1601006-23 = "充分的睡眠能夠強化大腦的認知功能、提升專注力和工作能力……"
1601006-24 = "所以，幫助入眠才是最有效的應援。"
1601006-25 = "[s]「確實很有道理……」"
1601006-26 = "來，老師，快躺下，然後把彩球放在枕頭旁邊。"
1601006-31 = "（從彩球內傳來了由熟悉的聲音演唱的搖籃曲）"
1601006-32 = "[s]「這個聲音……」"
1601006-34 = "……嗯。"
1601006-35 = "……是我的聲音。"
1601006-36 = "因為臨時找不到可以用的音源……"
1601006-37 = "本來是想放古典樂的……"
1601006-38 = "……我為老師唱的搖籃曲，還行嗎……？"
1601006-39 = "[s3]「嗯，非常棒！」\n[s4]「這個肯定比較好！」"
1601006-44 = "……是嗎，太好了。"
1601006-45 = "很高興老師喜歡。"
1601006-46 = "使用方法很簡單。"
1601006-47 = "躺在床上後，把彩球放在頭的附近打開電源就行了。"
1601006-48 = "……用這個彩球的話，一定能睡得很舒服。"
1601006-55 = "……那麼，老師。"
1601006-56 = "祝你有個好夢。"
1601006-58 = "（……多虧響的發明，久違地睡了個好覺）"

1601006-15 = "3;히비키 응원단ND;18\n#3;greeting\n#wait;1500"
1601006-16 = "[ns1] \"이건…… 응원용 응원술?\"\n[ns2] \"응원술은 쓰지 않는다고 하지 않았어?\""
1601006-17 = "3;히비키 응원단ND;02;응, 평범한 응원술이라면 그렇겠지."
1601006-18 = "3;히비키 응원단ND;02;응, 평범한 응원술이라면 그렇겠지."
1601006-19 = "3;히비키 응원단ND;19;하지만 이 응원술에는 특별한 기능이 추가되어 있어."
1601006-20 = "3;히비키 응원단ND;20;바로…… 블루투스 기능이야.\n#3;em;…"
1601006-21 = "[s] \"블루투스?\""
1601006-22 = "3;히비키 응원단ND;21;응. 전에 만들었던 <실신 전용 쇠파이프>의 기능을 활용해 보았어."
1601006-23 = "3;히비키 응원단ND;19;충분한 수면은 뇌의 인지기능을 강화해 집중력을 향상시키고, 업무를 능숙하게 수행할 수 있도록 도와주니까……"
1601006-24 = "3;히비키 응원단ND;03;수면을 유도하는 행위야말로 가장 효과적인 응원이라고 할 수 있지.\n#3;em;[반짝]"
1601006-25 = "[s] \"틀린 말은 아니지만…….\""
1601006-26 = "3;히비키 응원단ND;12;자, 선생님. 침대에 누워서 이 응원술에 머리를 뉘어봐.\n#3;em;[반응]\n#3;closeup"

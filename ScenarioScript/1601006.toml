[translation]
1601006-1 = "เพลงกล่อมเด็กของไมสเตอร์"
1601006-2 = "วันนี้เหนื่อยหน่อยนะ คุณครู"
1601006-3 = "จากคำแนะนำที่ได้มาคราวก่อน คราวนี้ฉันลองสร้างอุปกรณ์เชียร์แบบใหม่แล้วละ"
1601006-4 = "ฉันเอาคำแนะนำของคุณครูมาสร้างอุปกรณ์ชิ้นนี้ขึ้น เลยอยากให้คุณครูได้ลองทดสอบดูก่อนน่ะ"
1601006-5 = "[s] \"วันนี้ก็ใส่ชุดเชียร์อีกแล้ว...\""
1601006-6 = "อื้อ ก็มันเกี่ยวกับงาน \"เชียร์\" นี่นา"
1601006-7 = "ตอนนี้น่ะ ถ้าฉันไม่ใส่ชุดนี้ก็จะไม่มีแรงบันดาลใจในการสร้างอุปกรณ์เชียร์ใหม่ๆ "
1601006-8 = "มันคงกลายเป็นกิจวัตรโดยที่ฉันไม่รู้ตัวน่ะ..."
1601006-9 = "ยังไงก็เถอะ..."
1601006-10 = "คุณครูน่าจะถูกใจอุปกรณ์เชียร์ที่ฉันทำขึ้นคราวนี้แน่ๆ"
1601006-11 = "อุปกรณ์เชียร์ชิ้นนี้น่ะ ต่างจากอุปกรณ์เชียร์ที่มีอยู่ตรงที่มันออกแบบมาเพื่อกระตุ้น \"ความปรารถเฉพาะที่ไม่ว่าใครก็ต้องการ และเป็นสิ่งที่คนสมัยใหม่ต้องการมากที่สุด\""
1601006-12 = "และสิ่งประดิษฐ์ชิ้นนั้นก็คือ... "
1601006-16 = "[ns1] \"นี่มัน... พู่สำหรับเชียร์?\"\n[ns2] \"ไหนบอกว่าจะไม่ใช้พู่เชียร์แล้วไง?\""
1601006-17 = "อื้อ แต่มันไม่ใช่พู่เชียร์ธรรมดาหรอกนะ"
1601006-18 = "อื้อ ถ้าเป็นพู่เชียร์ธรรมดา ฉันก็คงไม่ใช้หรอก"
1601006-19 = "แต่พู่เชียร์อันนี้น่ะมันมีฟังก์ชั่นพิเศษอยู่ด้วย"
1601006-20 = "นั่นก็คือ... ฟังก์ชั่นบลูทูธยังไงล่ะ"
1601006-21 = "[s] \"บลูทูธเหรอ?\""
1601006-22 = "อื้อ ฉันลองใช้ฟังก์ชั่นของ <ท่อเหล็กสลบเหมือด> มาประยุกต์ดูน่ะ"
1601006-23 = "การนอนหลับอย่างเพียงพอช่วยเพิ่มประสิทธิภาพการทำงานของสมอง และทำให้มีสมาธิขึ้น ทำให้สามารถทำงานได้ดีขึ้น..."
1601006-24 = "เพราะงั้นการช่วยให้หลับอาจเป็นวิธีการเชียร์ที่ได้ผลที่สุดก็ได้"
1601006-25 = "[s] \"ที่พูดมามันก็ไม่ผิดหรอกนะ แต่ว่ามัน...\""
1601006-26 = "เอ้า คุณครู มานอนที่เตียงแล้วเอาพู่เชียร์นี่วางไว้บนหัวนอนสิ"
1601006-31 = "(...คุณครูเอาพู่เชียร์วางไว้บนหัวเตียง เสียงร้องเพลงกล่อมเด็กที่คุ้นเคยก็ดังออกมา...)"
1601006-32 = "[s] \"เสียงนี้มัน...\""
1601006-34 = "ใช่แล้ว..."
1601006-35 = "เพลงกล่อมเด็กที่ฉันอัดเสียงไว้เองน่ะ"
1601006-36 = "ตอนที่รีบหาเพลงกล่อมเด็กมาใส่พู่เชียร์อันนี้ แต่ก็หาเพลงเหมาะๆ ไม่ได้..."
1601006-37 = "ก็เลยใช้เพลงกล่อมเด็กที่ร้องเองใส่ไว้ชั่วคราวก่อนน่ะ"
1601006-38 = "คิดแล้วเชียวว่าควรใช้พวกเพลงคลาสสิกแทนน่าจะดีกว่า..."
1601006-39 = "[s3] \"ไม่ใช่แบบนั้นสักหน่อย!\"\n[s4] \"แบบนี้ดีกว่าเพลงคลาสสิกเยอะเลย!\""
1601006-44 = "...งั้นเหรอ"
1601006-45 = "ค่อยยังชั่วที่คุณครูชอบ \"การเชียร์\" คราวนี้"
1601006-46 = "วิธีใช้ก็ง่ายมาก"
1601006-47 = "แค่นอนลงบนเตียง วางพู่เชียร์ไว้บนหัวเตียง แล้วก็เปิดฟังก์ชั่นบลูทูธก็เรียบร้อยแล้วละ"
1601006-48 = "วิธีเชียร์แบบนี้... จะทำให้คุณครูได้หลับพักผ่อนแบบดีที่สุดอย่างแน่นอน"
1601006-55 = "ถ้างั้นคุณครู..."
1601006-56 = "คืนนี้ขอให้ฝันดีนะ"
1601006-58 = "(...ต้องขอบคุณสิ่งประดิษฐ์ของฮิบิกิ คุณครูเลยนอนหลับสบายได้ตลอดคืน)"

[translation]
1601006-1 = "#title;마이스터의 상냥한 자장가"
1601006-2 = "3;히비키 응원단ND;02;오늘도 수고 많았어, 선생님.\n#3;em;[반응]\n#3;a"
1601006-3 = "3;히비키 응원단ND;01;지난번에 받은 피드백을 바탕으로 새로운 응원 도구를 만들어 보았어."
1601006-4 = "3;히비키 응원단ND;99;선생님의 의견을 적극 반영해서 만든 물건인 만큼, 선생님이 먼저 시험해 주었으면 좋겠어."
1601006-5 = "[s] \"오늘도 치어리더 차림이구나…….\""
1601006-6 = "3;히비키 응원단ND;21;응…… '응원'에 관련된 일이니까.\n#3;em;…"
1601006-7 = "3;히비키 응원단ND;20;이제는 이 옷을 입지 않으면 새로운 응원 도구를 만들고자 하는 의욕이 나질 않아."
1601006-8 = "3;히비키 응원단ND;19;……나도 모르는 사이에 루틴이 되어버린 걸까?"
1601006-9 = "3;히비키 응원단ND;02;……여하튼.\n#3;em;[반응]"
1601006-10 = "3;히비키 응원단ND;03;이번에 만든 응원 도구는 선생님의 마음에도 들 거야."
1601006-11 = "3;히비키 응원단ND;03;이 응원 도구는 기존의 시제품과는 달리, '누구에게나 필요하고, 현대인이 가장 갈망하는 특정한 성질의 욕망'을 자극하도록 설계되었으니까."
1601006-12 = "3;히비키 응원단ND;12;그렇게 해서 만들어진 결과물이…… 바로 이것.\n#3;em;[반짝]"
1601006-13 = "#st;[0,0];instant;1;"

[translation]
1601006-1 = "Sweet Dreams (Are Made of Pom-Poms)"
1601006-2 = "Great job today, Sensei."
1601006-3 = "Based on the past feedback, I made a new cheering device that doesn't intentionally explode."
1601006-4 = "Your opinions heavily influenced the design, so I'd like you to be the first to test it."
1601006-5 = "[s] \"I see you're wearing the cheerleading outfit today as well...\""
1601006-6 = "Well, yeah... What else would I wear during cheer-related work?"
1601006-7 = "I mean, if I don't wear this outfit, what will motivate me to make cheering devices? A lab coat? Nonsense."
1601006-8 = "...Maybe I do wear this too often out of habit now..."
1601006-9 = "...Not important now."
1601006-10 = "You are going to love this cheering device, I guarantee it."
1601006-11 = "I learned my lesson from last time. You see, this device's design is based around a natural desire that every modern person both needs and craves."
1601006-12 = "And from that desire...I give you this."
1601006-16 = "[ns1] \"Hibiki, these are pom-poms.\"\n[ns2] \"I thought you weren't going to use movement in your cheers?\""
1601006-17 = "These are pom-poms, correct, but you know what they're not? Ordinary pom-poms."
1601006-18 = "These are pom-poms, correct, but you know what they're not? Ordinary pom-poms."
1601006-19 = "They have one special feature. Not exploding."
1601006-20 = "They're wireless."
1601006-21 = "[s] \"Wireless?\""
1601006-22 = "It uses the same frequency as the Knockout Pipe I made before."
1601006-23 = "Sufficient sleep boosts cognitive function and improves concentration, both of which are vital to any sort of work."
1601006-24 = "So when you really think about it, isn't sleep the best kind of cheer?"
1601006-25 = "[s] \"The first part of that definitely made sense, but...\""
1601006-26 = "All right, Sensei. Lie down and lay your head on these pom-poms."
1601006-31 = "...As I rested my head against the pom-poms, I heard a lullaby sung by a familiar voice."
1601006-32 = "[s] \"This voice...\""
1601006-34 = "...Yes."
1601006-35 = "It's a lullaby I recorded."
1601006-36 = "I didn't have time to find the right lullaby..."
1601006-37 = "So as a stopgap, I sang the lullaby myself."
1601006-38 = "...Sorry, maybe classical music would have been better..."
1601006-39 = "[s3] \"No way!\"\n[s4] \"This is much better!\""
1601006-44 = "...I see."
1601006-45 = "I'm glad you like this kind of cheering."
1601006-46 = "And it's easy to use."
1601006-47 = "Just place the pom-poms close to your head and turn on the wireless function."
1601006-48 = "It guarantees deep, peaceful sleep."
1601006-55 = "Well, Sensei..."
1601006-56 = "Sweet dreams."
1601006-58 = "Thanks to Hibiki's invention, my sleep was long, restful, and full of sweet dreams."

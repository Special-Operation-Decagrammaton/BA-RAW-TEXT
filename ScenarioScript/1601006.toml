1601006-35 = "3;히비키 응원단ND;09;……내가 녹음한 자장가야."
1601006-36 = "3;히비키 응원단ND;10;급하게 응원술에 내장할 자장가를 찾다 보니 마땅한 음원을 찾을 수가 없어서……"
1601006-37 = "3;히비키 응원단ND;05;임시로 내 목소리로 자장가를 불러보았어."
1601006-38 = "3;히비키 응원단ND;11;……역시 평범한 클래식 음악을 쓰는 게 좋았으려나…….\n#3;em;[///]\n#3;stiff"

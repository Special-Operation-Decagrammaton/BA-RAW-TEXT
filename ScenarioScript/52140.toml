[translation]
52140-1 = "Episode 14;Nature's Beauty's Phantom Artist"
52140-3 = "Wh-What do you mean...? You're telling me Azami is in Nature's Beauty?"
52140-4 = "Precisely. Habu Azami is not an Ebisu Satellite School student."
52140-5 = "In fact, I believe she is the one who has been summoning the Artifact Spirits and attacking people."
52140-6 = "We were playing into her hands this entire time."
52140-11 = "Very astute, Miss Hyakkaryouran operations officer."
52140-12 = "I suppose there's no point in continuing this drab charade. But tell me, little cat, what gave it away?"
52140-13 = "Spare me the sarcasm. You were so clearly hiding something. I curse myself for overlooking it."
52140-14 = "I should have known when none of the villagers recognized you."
52140-19 = "After all, you were the president of the Self-Government Committee. It is such a small village, and yet no one knows you."
52140-20 = "And then Yabuki Shuro fell from President Ayame's gunshot."
52140-28 = "The tome should have protected her. If Shuro were truly in control, then the only thing that could have hurt her was the Hundred Lotus."
52140-29 = "Even after that, we frisked her and found nothing... There had to be another member holding the tome."
52140-32 = "Finally, this mansion clearly belonged to the Kadenokouji family."
52140-33 = "They lived here before moving to Hyakkiyako Central. The Mansion of the Beyond, this sprawling manor, was their home."
52140-34 = "The President of the Ebisu Self-Government Committee would never forget the Kadenokouji family's history. You would have recognized Yukari's name."
52140-35 = "You hid all of this until now. Clearly, you were concealing the truth about the mansion. You lured us in."
52140-40 = "Hahaha... Ahahaha...!"
52140-41 = "Wonderful deduction. I knew I liked you, operations officer!"
52140-42 = "Well, since the cat is out of the bag, I may as well slip into something more comfortable."
52140-53 = "My name is Habu Azami. I proudly serve Miss Kokuriko, the mistress of ghost stories. I am a snake charmer who charms the simple-minded with my serpent's tongue."
52140-54 = "But my true passion...is art...of the phantom variety."
52140-55 = "My job was to lead the Hyakkaryouran to my mistress's mansion. Clearly, the task was far too...complicated for Shuey."
52140-56 = "So, did you have fun? I've always wanted to join a girls' trip!"
52140-57 = "You conniving, cruel snake! I'll take you down for good!"
52140-58 = "Fufu. Your fiery courage is notable, but pitiful."
52140-59 = "Do you think you have a chance without the Hundred Lotus? Or Sensei?"
52140-60 = "...No, as it stands, not even Nagusa can come to your aid now."
52140-64 = "You... What did you do to Nagusa?"
52140-65 = "Well, would you like to take a guess, clever girl? What horrors have befallen her...I wonder?"
52140-69 = "Ah... Yes, that's the expression I was looking for. Your fear is exquisite."
52140-70 = "You may pretend to be outraged, you may feign boldness, but I see you for what you are."
52140-74 = "My tome, Toutei's Phantom Illustrations, is powered by fear."
52140-75 = "I use your lovely fear—those hues of pain—to color my illustrations."
52140-90 = "Let it consume you, dear. Let it be free."
52140-91 = "...Let it suffocate you from the inside and enliven my story."

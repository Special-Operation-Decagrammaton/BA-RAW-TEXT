[translation]
52140-1 = "ตอนที่ 14;นักเล่าเรื่องพรั่นพรึง"
52140-3 = "มะ... หมายความว่ายังไงน่ะ...? อาซามิคือสมาชิกชมรมความงามของธรรมชาติงั้นเหรอ?"
52140-4 = "ถูกต้องแล้ว ฮาบุ อาซามิที่อยู่ตรงนี้ไม่ใช่นักเรียนจากโรงเรียนสาขาเอบิสุ แต่เป็นสมาชิกชมรมความงามของธรรมชาติ"
52140-5 = "ถ้าฉันเดาถูกต้อง ตำนานร้อยเรื่องราวที่ออกมาโจมตีผู้คนในเขตปกครองตนเองทางเหนือก็เป็น#nส่วนหนึ่งของเรื่องลึกลับที่ผู้หญิงคนนั้นแต่งขึ้นมา"
52140-6 = "พวกเราหลงกลผู้หญิงคนนั้นตั้งแต่แรกแล้ว"
52140-11 = "มองทะลุปรุโปร่งเลยนะคะ ที่ปรึกษายุทธศาสตร์แห่งเฮียกกะเรียวรัน"
52140-12 = "ในเมื่อฉันบรรลุเป้าหมายแล้ว ฉันก็ไม่คิดจะปิดบังอีกต่อไป... ว่าแต่คุณรู้ได้ยังไงเหรอคะว่าฉันเป็น#nสมาชิกของชมรมความงามของธรรมชาติ?"
52140-13 = "ถ้าคิดจะเหน็บแนมก็เลิกคิดไปเถอะ เธอทำตัวน่าสงสัยเสียโจ่งแจ้งขนาดนี้ ฉันสมเพชตัวเองจริงๆ ที่เพิ่งมาแน่ใจเอาป่านนี้น่ะ"
52140-14 = "เธอน่าสงสัยหลายอย่างตั้งแต่แรกแล้ว อย่างแรกก็คือปฏิกิริยาของชาวบ้านแถวๆ โรงเรียนสาขาเอบิสุ#nที่เหมือนเพิ่งเคยเห็นเธอเป็นครั้งแรก"
52140-19 = "ตอนนั้นฉันคิดว่าคงเป็นชาวบ้านที่ไม่ค่อยมีเรื่องให้เจอกันบ่อยๆ ในชีวิตประจำวัน แต่มันก็ยากที่จะ#nเข้าใจว่าทำไมคนในหมู่บ้านเล็กๆ แห่งนี้ถึงไม่รู้จักประธานคณะกรรมการปกครองตนเอง"
52140-20 = "แล้วก็ตอนที่ยาบูกิ ชูโระถูกหัวหน้าอายาเมะยิง"
52140-28 = "ความลึกลับของหนังสือลึกลับมีผลกับทั้งตำนานร้อยเรื่องราวและนักเล่าเรื่องลึกลับเอง แต่ชูโระในตอนนั้นถูกปืนอื่นที่ไม่ใช่เฮียกกุเร็นยิงราวกับเธอใช้พลังของหนังสือลึกลับไม่ได้"
52140-29 = "และจากการที่ชูโระไม่มีหนังสือลึกลับอยู่กับตัว... ก็หมายความว่ามีสมาชิกคนอื่นถือหนังสือลึกลับอยู่"
52140-32 = "อย่างสุดท้ายก็คือลวดลายที่สลักไว้ในคฤหาสน์... นั่นคือลวดลายที่เป็นตราประจำตระกูลคาเดโนะโคจิ"
52140-33 = "คฤหาสน์หลังเดิมที่ตระกูลคาเดโนะโคจิเคยอยู่อาศัยเมื่อ 20 ปีก่อนจนเกิดเรื่องให้ต้องย้ายมาอยู่ใน#nเฮียกคิยาโคก็คงจะเป็น <คฤหาสน์นิพพาน> แห่งนี้"
52140-34 = "ถึงจะบอกว่าที่นี่เป็นคฤหาสน์ที่ถูกทิ้งร้าง แต่คณะกรรมการปกครองตนเองเอบิสุก็ไม่มีทางที่จะไม่รู้จัก#nตระกูลคาเดโนะโคจิที่ปกครองพื้นที่แห่งนี้มาเป็นเวลานาน"
52140-35 = "การที่เธอเก็บเรื่องนั้นเป็นความลับจนกระทั่งพวกเรามาถึง... คงเพราะมีบางอย่างในคฤหาสน์หลังนี้#nที่ไม่อยากให้พวกเรารู้"
52140-40 = "อะฮะฮ่า... อะฮะฮ่าฮ่า...!"
52140-41 = "ฉลาดเป็นกรดเลยนะคะ สมแล้วที่เป็นที่ปรึกษายุทธศาสตร์แห่งเฮียกกะเรียวรัน!"
52140-42 = "ในเมื่อตัวตนของฉันถูกเปิดเผยแล้ว งั้นฉันจะแนะนำตัวอย่างเป็นทางการอีกครั้งนะคะ"
52140-53 = "ชื่อของฉันคือฮาบุ อาซามิ เฮบิโอนาที่ใช้ลิ้นของงูล่อลวงผู้คน... ผู้รับใช้ของท่านโคคุริโกะ และผู้เป็นเจ้าของเรื่องลึกลับแห่งชมรมความงามของธรรมชาติ"
52140-54 = "แล้วก็ยังเป็นนักเล่าเรื่องพรั่นพรึงที่แต่งเรื่องน่ากลัวจากหนังสือลึกลับด้วยค่ะ"
52140-55 = "ครั้งนี้เป็นภารกิจของฉันในการพาพวกคุณมายัง <คฤหาสน์นิพพาน> แทนชูโระจังที่ไร้ความสามารถ#nน่ะค่ะ"
52140-56 = "เป็นยังไงบ้างคะ? สนุกกับการท่องเที่ยวครั้งนี้หรือเปล่า?"
52140-57 = "ยัยคนนี้... ที่ผ่านมาเธอหลอกพวกเราอย่างหน้าไม่อายเลยเหรอ ฉันไม่ยอมปล่อยไปแน่!"
52140-58 = "ฮุฮุ ความกล้าหาญนั่นช่างน่าชื่นชม แต่ก็น่าสมเพชด้วยนะคะ"
52140-59 = "ตอนนี้พวกคุณไม่มีทั้งคุณครูของชาเล่ต์และนางุสะ คิดว่าจะเอาชนะฉันได้งั้นเหรอคะ?"
52140-60 = "ไม่สิ... ยังไงตอนนี้นางุสะก็ใช้พลังได้ไม่เต็มที่อยู่ดี"
52140-64 = "นี่เธอ... ทำอะไรรุ่นพี่นางุสะไว้น่ะ?"
52140-65 = "ก็ไม่รู้สิคะ ลองเดาดูมั้ยล่ะคะ... ว่าตอนนี้รองหัวหน้าชมรมของพวกคุณอยู่ในสภาพไหน?"
52140-69 = "อ่า... ใช่แล้วละ สีหน้าอย่างนี้ละค่ะที่ฉันต้องการ"
52140-70 = "ดูผ่านๆ อาจเหมือนว่ากำลังโกรธ แต่ความกลัวที่ปรากฏในแววตาที่ไม่รู้ว่าจะเกิดอะไรขึ้นต่อไป ไม่ว่าจะใช้วิธีไหนก็ซ่อนไว้ไม่ได้หรอกค่ะ"
52140-74 = "พลังของหนังสือลึกลับ <โทเท บุคไค โรคุ> ของฉันมาจากความกลัวค่ะ"
52140-75 = "เพราะในบรรดาความกลัวทั้งหมด ความกลัวที่เลวร้ายที่สุดที่ผุดขึ้นมาในใจคือสีที่เหมาะสมที่สุด#nในการแต่งแต้ม <โทเท บุคไค โรคุ> ค่ะ"
52140-90 = "เอาละ เชิญจินตนาการเท่าที่คุณต้องการ และประหวั่นพรั่นพรึงเท่าที่คุณปรารถนากันเลยค่ะ"
52140-91 = "เพราะเรื่องราวของฉันจะยังไม่สิ้นสุด จนกว่าพวกคุณจะหายใจไม่ออกและสิ้นใจไป..."

52140-52 = "3;아자미;99\n#3;greeting\n#3;a\n#wait;1300"
52140-53 = "3;아자미;14;제 이름은 하부 아자미. 괴담의 주인이신 코쿠리코 님을 모시는 화조풍월부의 종자이자, 뱀의 혀로 사람을 홀리는 [ruby=뱀 여인]헤비온나[/ruby]이며—\n#3;em;[반응]"
52140-54 = "3;아자미;13;괴서를 통해 괴예를 자아내는 괴예가이기도 하지요."
52140-55 = "3;아자미;15;이번에는 불민한 슈로 쨩을 대신하여 여러분을 이 <피안의 저택>까지 모시는 것이 제 임무였답니다."
52140-56 = "3;아자미;10;어떠셨나요, 즐거운 여행이 되셨는지?"
52140-57 = "3;렌게;12;이 녀석…… 그동안 태연한 얼굴로 사람을 속이고 있었다니, 가만두지 않겠어!\n#3;stiff"
52140-58 = "3;아자미;14;후후, 그 용기만큼은 가상하지만 딱하네요."
52140-59 = "3;아자미;03;샬레의 선생님도, 나구사 양도 없는 이 상황에 여러분이 저를 상대로 승산이 있다고 생각하시는 건가요?\n#3;em;[?]"
52140-60 = "3;아자미;99;……아니, 어차피 지금이라면 나구사 양도 제대로 된 전력이 되어주지 못할 테지만요.\n#fontsize;50"
52140-61 = "#st;[0,0];instant;1;"
52140-62 = "#clearST"
52140-63 = "3;키쿄;02\n#3;em;[?!]\n#3;shake\n#3;h\n#wait;800"
52140-64 = "3;키쿄;10;너…… 나구사 선배에게 무슨 짓을 한 거야?"
52140-65 = "5;아자미;15;글쎄요. 한 번 알아맞혀 보시겠어요? 지금쯤 당신들의 부부장이 어떤 꼴이 되어 있을지.\n#5;em;[음표]\n#5;al\n#3;m1"
52140-66 = "#st;[0,0];instant;1;"
52140-67 = "#clearST"
52140-68 = "3;키쿄;11\n5;아자미;15\n#3;stiff\n#3;h\n#5;h\n#wait;1500"
52140-69 = "5;아자미;09;아아…… 그래, 바로 그 표정이에요. 제가 바랐던 표정은.\n#5;em;[///]"
52140-70 = "5;아자미;16;일견 분노를 가장하고 있지만, 앞으로 어떤 일이 벌어질지 알지 못한 두려움에서 피어나는 공포는 어떤 수를 쓰더라도 감출 수가 없지요.\n#5;m3\n#3;dl"
52140-71 = "#st;[0,0];instant;1;"
52140-72 = "#clearST"
52140-73 = "5;아자미;13\n#5;greeting\n#5;h\n#wait;1300"
52140-74 = "5;아자미;10;저의 괴서, <토테이붓카이로쿠>의 힘은 두려움에서 비롯된답니다."
52140-75 = "5;아자미;14;그 어떠한 두려움보다 여러분의 머릿속으로 떠올린 최악의 공포야말로, <토테이붓카이로쿠>의 삽화를 칠하는 데 가장 적합한 색을 발하니까요."

52140-83 = "2;환량백물어 자코;00\n3;환량백물어 자코;00\n#2;a\n#2;h\n#3;h\n#wait;300"
52140-84 = "4;환량백물어 자코;00\n2;환량백물어 자코;00\n3;환량백물어 자코;00\n#4;a\n#2;h\n#3;h\n#4;h\n#wait;300"

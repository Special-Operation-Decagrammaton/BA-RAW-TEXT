[translation]
52140-1 = "第14話;花鳥風月部的怪藝家"
52140-3 = "那，那是什麼意思……？#n薊同學是花鳥風月部的成員？"
52140-4 = "就是這個意思。#n在場的土生薊並不是惠比壽分校的學生，而是花鳥風月部的一員。"
52140-5 = "如果我的推測沒錯的話，#n在北方自治區襲擊人們的百物語，也是他藉由怪書所具現的怪談之一。"
52140-6 = "打從一開始，我們就被他玩弄於股掌之間。"
52140-11 = "真是驚人的洞察力呢，百花繚亂的作戰參謀大人。"
52140-12 = "既然目的已經達成，我也沒打算繼續隱瞞下去……不過你是怎麼察覺我的身分的呢？"
52140-13 = "想挖苦我的話還是省省吧。#n你明明表現得如此可疑，我卻直到現在才確信這件事……連我自己都難以接受。"
52140-14 = "打從一開始就有不少疑點。#n首先是惠比壽分校附近的居民，與你初次見面時的反應。"
52140-19 = "當時我以為只是碰巧沒遇過而已……#n不過這麼小的城鎮竟然沒有人認識自治委員會的會長，這實在說不通。"
52140-20 = "還有箭吹棕櫚被菖蒲開槍擊倒的時候也是。"
52140-28 = "怪書的神祕力量除了百物語之外，也適用於怪談家本身。#n然而當時的棕櫚卻像無法操控怪書一樣，被普通的槍械給制伏了。"
52140-29 = "之後在棕櫚身上也沒有發現怪書……這就代表擁有怪書的部員另有其人。"
52140-32 = "最後是這座宅邸中刻著的紋樣……那是勘解由小路家的家紋。"
52140-33 = "二十年前，勘解由小路家因那起事件而搬到百鬼夜行中心前居住的本家，#n應該就是這座「彼岸邸」才對。"
52140-34 = "即便已經遭到棄置，惠比壽自治委員會竟然對曾經長期統治這一帶的家族一無所知，#n這根本不合常理。"
52140-35 = "而你卻在抵達這裡之前閉口不談……#n就代表這座宅邸裡，有著你不想讓我們知道的東西。"
52140-40 = "啊哈哈……啊哈哈哈哈……！"
52140-41 = "真是精彩的推理。不愧是百花繚亂的作戰參謀！"
52140-42 = "既然身分已經被揭穿，就讓我重新做個自我介紹吧。"
52140-53 = "我土生薊，乃侍奉怪談之主雛罌粟大人的花鳥風月部信徒。#n是以蛇之舌蠱惑人心的蛇女──"
52140-54 = "也是藉由怪書具現怪藝的「怪藝家」。"
52140-55 = "本次代替不成器的棕櫚醬，將各位引導至這座「彼岸邸」正是我的任務。"
52140-56 = "各位感覺如何？這趟旅程還愉快嗎？"
52140-57 = "這傢伙……竟然能若無其事地欺騙我們這麼久，不可饒恕！"
52140-58 = "呵呵，這份勇氣倒是值得嘉許。"
52140-59 = "不過在夏萊的老師和名草同學都不在的情況下，你們還認為有辦法贏過我嗎？"
52140-60 = "……不，事到如今就算名草同學在場，恐怕也無法成為戰力了吧。"
52140-64 = "你……對名草前輩做了什麼？"
52140-65 = "這個嘛……要不要猜猜看啊？#n你們的副委員長，現在究竟變成什麼模樣了呢？"
52140-69 = "啊啊……沒錯，這樣就對了。#n我一直想看見你們這副表情。"
52140-70 = "表面上裝作憤怒，卻無法掩飾從未知中產生的恐懼。"
52140-74 = "我的怪書《稻亭物怪錄》的力量，正是由此而來。"
52140-75 = "在你們腦中浮現的最糟糕的恐怖，正是為《稻亭物怪錄》增添鮮明色彩的最佳顏料。"
52140-90 = "來，盡情想像，盡情恐懼吧。"
52140-91 = "直到你們窒息，吐出最後一口氣之前……我的故事都不會結束。"

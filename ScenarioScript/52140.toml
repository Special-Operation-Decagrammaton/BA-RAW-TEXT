[translation]
52140-1 = "#title;제14화;화조풍월부의 괴예가"
52140-2 = "3;렌게;04\n#3;em;[?!]\n#3;shake\n#3;a\n#wait;800"
52140-3 = "3;렌게;12;그, 그게 무슨 소리야……? 아자미 양이 화조풍월부의 부원이라니.\n#3;stiff"
52140-4 = "3;키쿄;07;그 말대로야. 여기 있는 하부 아자미는 에비스 분교의 학생이 아니라, 화조풍월부의 부원이었다는 거지.\n#3;em;…"
52140-5 = "3;키쿄;02;내 추측이 틀리지 않다면, 북방 자치구에서 사람을 습격해 왔다는 백물어 또한 그녀가 괴서를 통해 자아낸 괴담의 일부일 터."
52140-6 = "3;키쿄;09;처음부터 우리는 그녀의 손아귀에서 놀아났던 셈이야.\n#3;stiff"
52140-7 = "#st;[0,0];instant;1;"
52140-8 = "#clearST"
52140-9 = "3;키쿄;09\n#3;d\n#wait;1200"
52140-10 = "#all;hide"
52140-11 = "3;아자미 변장;12;대단한 통찰력이시네요, 백화요란의 작전참모님.\n#3;a"
52140-12 = "3;아자미 변장;13;어차피 목적한 바를 이루었으니, 더 숨길 생각은 없었지만…… 어떻게 제가 화조풍월부의 부원이라는 사실을 깨달으셨나요?"
52140-13 = "3;키쿄;02;비아냥거릴 생각이라면 그만둬. 그렇게 노골적으로 의심스러운 모습을 보여왔는데, 이제야 확신을 얻었다는 사실을 스스로도 용납하기 어려우니까.\n#3;em;[반응]"
52140-14 = "3;키쿄;05;처음부터 수상한 점이라면 여럿 있었지. 우선 에비스 분교 인근의 주민들이 너를 처음 본다는 반응을 보였을 때부터."
52140-15 = "3;고양이 유리 장인;00\n#3;h"
52140-16 = "#wait;500"
52140-17 = "#all;hide"
52140-18 = "#wait;500"
52140-19 = "3;키쿄;02;그때만 하더라도 단순히 평소에 마주칠 일이 없는 주민들뿐인가 싶었지만, 아무리 그래도 이 작은 마을에서 자치위원회의 회장을 모른다는 건 이해하기 어려워.\n#3;em;…\n#3;a"
52140-20 = "3;키쿄;05;그리고 야부키 슈로가 아야메 부장의 총격에 쓰러졌을 때."
52140-21 = "#all;hide"
52140-22 = "#wait;500"
52140-23 = "#all;hide"
52140-24 = "\n#wait;1000"
52140-25 = "3;슈로;18\n#3;fx;{shot}\n#3;shake\n#wait;1000"
52140-26 = "#all;hide\n#wait;1200"
52140-27 = "#wait;1500\n#all;hide\n#bgshake"
52140-28 = "#na;키쿄;괴서의 신비는 백물어 뿐만 아니라 괴담가에게도 적용되는 데, 그때의 슈로는 마치 괴서의 힘을 다루지 못하는 것처럼 백련이 아닌 다른 총에 제압되었지."
52140-29 = "#na;키쿄;그 이후에도 슈로의 몸에서 괴서가 발견되지 않았던 점으로 미루어 보아…… 괴서를 갖고 있는 부원은 따로 존재했을 거야."
52140-30 = "#all;hide"
52140-31 = "#wait;500"
52140-32 = "3;키쿄;05;그리고 마지막으로 이 저택에 새겨져 있는 문양…… 이 문양은 카데노코지 가문의 문양이야.\n#3;a"
52140-33 = "3;키쿄;07;20년 전, 카데노코지 가문이 그 사건 이후 백귀야행 중심부로 거처를 옮기기 전에 살았던 본채가, 아마 이 <피안의 저택>이었겠지."
52140-34 = "3;키쿄;01;하지만 아무리 버려진 저택이라 하더라도, 오랫동안 이 일대의 영지를 다스리던 카데노코지 가문의 존재를 에비스 자치위원회에서 몰랐다는 건 말이 되지 않아."
52140-35 = "3;키쿄;05;그럼에도 불구하고 이곳에 도달할 때까지 우리에게 그 사실을 숨겼다는 건…… 이 저택에 알리고 싶지 않은 무언가가 있어서였겠지.\n#3;stiff"
52140-36 = "#st;[0,0];instant;1;"
52140-37 = "#clearST"
52140-38 = "3;아자미 변장;02\n#3;em;…\n#3;h\n#wait;2500"
52140-39 = "3;아자미 변장;99\n#3;h\n#wait;1200"
52140-40 = "3;아자미 변장;11;아하하…… 아하하하……!\n#3;em;[재잘]"
52140-41 = "3;아자미 변장;12;정말 훌륭한 추리네요. 역시 백화요란의 작전참모다워요!"
52140-42 = "3;아자미 변장;20;그럼 정체도 모두 탄로 난 것 같으니, 정식으로 다시 한 번 인사를 드릴까요.\n#3;em;[음표]"

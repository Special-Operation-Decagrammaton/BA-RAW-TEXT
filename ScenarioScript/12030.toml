[translation]
12030-1 = "第3話;珍重再見，便利屋68"
12030-2 = "便利屋68．辦公室"
12030-3 = "唉……"
12030-4 = "亞瑠醬～你從剛才就一直在嘆氣唷，快點搬行李吧？"
12030-5 = "哈啊……"
12030-7 = "請，請問這個要搬到哪裡呢？"
12030-8 = "嗯？這個……啊，這是亞瑠醬難得發揮書法天賦留下的殘骸嘛。#n丟到那邊的可燃垃圾區就可以了唷。"
12030-11 = "怎麼可以丟掉！！肯定要帶走吧！"
12030-12 = "不過這不是書法課寫的作業嗎～？真的要帶走？#n而且「一日一惡」是什麼意思啊？"
12030-13 = "它，它10年後一定會有1億元左右的價值……"
12030-14 = "……唉。"
12030-16 = "捉弄你也沒什麼反應，真沒精神呢亞瑠醬……"
12030-17 = "社長，怎麼了嗎。"
12030-18 = "看來亞瑠醬無法接受要從辦公室搬走。"
12030-19 = "不過既然位置被風紀委員會知道了，客戶也可能因為任務失敗而找我們麻煩……#n這也沒辦法吧？"
12030-20 = "和阿拜多斯之間的衝突也結束得很不痛快。"
12030-21 = "就，就是說啊！事到如今還去襲擊曾經並肩作戰的人……怎麼可能辦得到啊！"
12030-22 = "……唉。 "
12030-23 = "連包包裡剩下的錢也全都拿去賠那間拉麵店了，這個社長真的是……"
12030-24 = "吵，吵死了！吵死了！ "
12030-25 = "可是，可是……！"
12030-26 = "……"
12030-27 = "冷酷的不法之徒……我……"
12030-29 = "……唉。 "
12030-30 = "我們社長還真是令人操心。"
12030-31 = "不過這不就是我們認識的亞瑠醬嗎？只要在一起就很開心！"
12030-32 = "是！我也是這麼想的！亞瑠大人！#n如，如果沒有亞瑠大人的話，我現在應該早就死了……"
12030-35 = "請打起精神來！我最尊敬亞瑠大人了！"
12030-36 = "就，就說吵死了嘛！"
12030-38 = "嘿……咻！"
12030-39 = "這個是最後一個！行李都裝好了！"
12030-40 = "那要去哪裡？"
12030-41 = "嗯……"
12030-42 = "反正也沒有什麼地方能去，要不要回格黑娜？"
12030-43 = "[s] 「大家好呀～」"
12030-45 = "！！"
12030-46 = "咦……！？"
12030-47 = "夏，夏萊的……！？"
12030-48 = "咦，啊，是老師！你來了啊！"
12030-49 = "為，為什麼來了啊！你不是正在幫阿拜多斯嗎！？"
12030-51 = "唔嗯，不過就算是那樣，你們不想和老師好好相處嗎？"
12030-52 = "嗯，說得沒錯。#n上次跟風紀委員會戰鬥的時候也受了老師的照顧……"
12030-53 = "看起來沒有惡意……而且我們也差不多要離開了，沒必要刻意與他為敵吧。"
12030-54 = "[s] 「要去哪裡嗎？」"
12030-56 = "只，只是為了尋找其他委託移動一下而已啦！"
12030-57 = "[s] 「這樣啊，下次見囉。亞瑠，還有大家。」"
12030-58 = "……呵呵。"
12030-59 = "呵呵，呵哈哈哈──！那當然！#n老師，我覺得和你成為商業上的合作夥伴好像也不錯。"
12030-60 = "不過我們現在忙得焦頭爛額，這件事還是下次再說吧，下次再說。"
12030-61 = "嗯，反正也不是永遠不會再來阿拜多斯了。這裡是個好地方呢。"
12030-62 = "嗯……就是說啊。"
12030-63 = "是，沒錯。"
12030-64 = "當，當然，我們還會回來吃拉麵的！！"
12030-68 = "……因為真的很好吃。"
12030-71 = "（就這樣，載著便利屋68行李的貨車消失在小巷的另一頭）"
12030-73 = "你好，老闆。我們來探病了。"
12030-74 = "老闆，還好嗎？"
12030-75 = "哦，茜香醬。綾音醬也來了，謝謝你們這麼早來探病。"
12030-76 = "[s]「您身體還好嗎？」"
12030-77 = "啊啊，連老師都來了。#n沒事沒事，只是稍微擦傷而已。"
12030-78 = "但是……老闆的店鋪……"
12030-79 = "啊啊，抱歉沒辦法讓你打工了，茜香醬。"
12030-80 = "才不是這個問題呢……"
12030-81 = "而且我本來就計畫之後要把店收掉了。#n只是比預期中還早實現而已。"
12030-82 = "咦？不做了……？"
12030-83 = "是啊，不久前收到了來自地主的遷出通知。"
12030-84 = "遷，遷出通知？這是怎麼回事？#n阿拜多斯自治區的建築物所有人應該是阿拜多斯高中才對……"
12030-85 = "……"
12030-87 = "……不，阿拜多斯學生會幾年前因為還不出錢，把建築物和土地的所有權都轉移了。畢竟是過去的事，你們不知道也不奇怪。"
12030-88 = "咦！？"
12030-89 = "騙，騙人！？竟然把阿拜多斯自治區的土地……！？到底交給了誰！？"
12030-90 = "[s1] 「……是凱薩信貸嗎？」\n[s2] 「……是凱薩公司嗎？」"
12030-91 = "唔嗯……好像是那個名字沒錯……抱歉，記得不是很清楚。"
12030-92 = "唔嗯……好像是那個名字沒錯……抱歉，記得不是很清楚。"
12030-93 = "怎麼會……不過，如果是那樣的話……"
12030-95 = "茜香醬，老師。請兩位先回學校吧。#n我有件事想確認，會先去其他地方再到學校。"
12030-96 = "嗯？什麼事？雖然不是很清楚……我也一起去！"
12030-97 = "那，那麼請老師先回教室吧！我們也很快就會回去的！"
12030-98 = "[s] 「我知道了，我也有話想告訴大家，等你們哦。」"
12030-99 = "老闆，別再想要退休或什麼的！知道了嗎！？"
12030-100 = "哦，哦哦……對了茜香醬，店裡有個裝了錢的奇怪包包，你知道些什麼嗎？"
12030-102 = "[s] 「請用來重建店鋪吧。」"
12030-103 = "呃，嗯？"
12030-106 = "我們走吧，茜香醬！"
12030-107 = "嗯！雖然不知道要去哪裡就是了……老師，待會見！"
12030-110 = "下一話;各自的故事（１）"

[translation]
12030-1 = "Episode 3;Farewell, Problem Solver 68"
12030-2 = "Problem Solver 68 Office"
12030-3 = "*sigh*"
12030-4 = "Don't just stand there, Aru! Let's get moving already!"
12030-5 = "*sigh*"
12030-7 = "E-Excuse me. Where should I put this?"
12030-8 = "Huh? Wow, look at this! Aru worked really hard on this calligraphy! Throw it into the burning pile of trash over there."
12030-11 = "You can't throw that away! We have to take it with us!"
12030-12 = "But it's just your old homework. \"One evil deed a day\"? What a strange message."
12030-13 = "B-But, it'll be worth about 100 million yen in ten years or so..."
12030-14 = "*sigh*"
12030-16 = "You look so down, Aru."
12030-17 = "What's up, boss?"
12030-18 = "I don't think Aru is happy to be moving out of the office."
12030-19 = "But the Prefect Team knows our location now, and our client is gonna come after us for failing the mission. What else can we do?"
12030-20 = "The fight with Abydos also ended on a sour note."
12030-21 = "Th-Those backstabbers! How could they go after allies who fought alongside them? They're cowards, that's what they are!"
12030-22 = "*sigh* "
12030-23 = "We left the money bag at the ramen place so the shopkeeper can pay for repairs. Aru, you're..."
12030-24 = "Sh-Shut up! Shut up!"
12030-25 = "I know!"
12030-26 = "..."
12030-27 = "I know I'm not...a hard-boiled outlaw..."
12030-29 = "*sigh*"
12030-30 = "Our boss is so high-maintenance."
12030-31 = "But that's Aru's charm! She's so much fun to be around!"
12030-32 = "That's true, Aru! If it weren't for you, I don't know if I would still be alive today..."
12030-35 = "I look up to you more than anyone, Aru!"
12030-36 = "I-I said shut up!"
12030-38 = "Heave-ho!"
12030-39 = "That's it! Everything's loaded!"
12030-40 = "Where should we go now?"
12030-41 = "Hmm..."
12030-42 = "Well, if no one has a plan, should we head back to Gehenna?"
12030-43 = "[s] \"Hello, everyone!\""
12030-45 = "...!"
12030-46 = "Y-You?!"
12030-47 = "Sch-Schale's Sensei?!"
12030-48 = "Whoa! It's Sensei! You're here!"
12030-49 = "Wh-What are you doing here? You're on Abydos' side!"
12030-51 = "Yeah, but Sensei said that we should get along."
12030-52 = "That's true. And Sensei did help us when we were fighting the Prefect Team..."
12030-53 = "Sensei doesn't seem to have any malicious intent... Besides, we're just about to leave. There's no reason to be hostile now."
12030-54 = "[s] \"You're leaving?\""
12030-56 = "We're not leaving! We're moving on, so we can get more commissions!"
12030-57 = "[s] \"Hope to see you soon, Aru.\""
12030-58 = "..."
12030-59 = "A-Ahahaha! Of course, Sensei! I can see us doing business together."
12030-60 = "Though, we can't right now since we're so busy. Maybe some other time."
12030-61 = "Yeah. It's not like we'll never visit Abydos again. I kind of like this place."
12030-62 = "Well... Yeah."
12030-63 = "Yes, I agree."
12030-64 = "O-Of course, I'll come back for the ramen!"
12030-68 = "...It was delicious."
12030-71 = "(Soon, the truck loaded with Problem Solver 68's worldly possessions passed through the alley.)"
12030-73 = "Hello, Master. We've come to check on you."
12030-74 = "Are you all right, Master?"
12030-75 = "Hey, Serika. Ah, and Serika's friend, Ayane. You're here early."
12030-76 = "[s] \"How are you feeling?\""
12030-77 = "Even Sensei's here. I'm fine, I'm fine. It was just a scratch."
12030-78 = "But what about your shop?"
12030-79 = "Well, I'm sorry I had to let you go, Serika."
12030-80 = "Why are you apologizing? I can't exactly work in a building that's been leveled."
12030-81 = "I was actually gonna close the shop soon anyway. It just happened earlier than I planned."
12030-82 = "What? You were going to close your shop?"
12030-83 = "Yeah. I already had an eviction notice from the building owner. "
12030-84 = "Th-The building owner? What are you talking about? Buildings in the Abydos district are owned by the Abydos School, so your shop has to be..."
12030-85 = "..."
12030-87 = "Actually, the Abydos Student Council couldn't pay off its debt, so the ownership of the building changed. I guess you didn't know because it happened so long ago."
12030-88 = "What?!"
12030-89 = "R-Really? The property was sold? To whom?!"
12030-90 = "[s1] \"Was it Kaiser Loans?\"\n[s2] \"Was it the Kaiser Corporation?\""
12030-91 = "Hmm... That name sounds right...but I'm not too familiar with all the documents and contracts."
12030-92 = "Hmm... That name sounds right...but I'm not too familiar with all the documents and contracts."
12030-93 = "I-If that's what happened..."
12030-95 = "Serika, Sensei, you should go ahead back to the school. I have to check something before I go."
12030-96 = "H-Huh? What is it? I'll go with you, Ayane!"
12030-97 = "Okay. In that case, you should go back to the club room first, Sensei. We'll be right behind you!"
12030-98 = "[s] \"All right. I also have something to tell everyone.\""
12030-99 = "Master! Don't even think about retiring yet, all right?"
12030-100 = "Oh, Serika. I saw a strange bag of money in the restaurant..."
12030-102 = "[s] \"Use it to repair your shop.\""
12030-103 = "E-Eh?"
12030-106 = "Let's go, Serika!"
12030-107 = "I don't know where we're going, but okay... See you later, Sensei!"
12030-110 = "Next Episode;Everyone Has a Story 1"

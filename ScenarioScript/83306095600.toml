[translation]
83306095600-6 = "ขอบคุณที่ช่วยนะคะ! พอท่านประธานมาช่วย งานก็เสร็จเร็วขึ้นเลยค่ะ!"
83306095600-7 = "ต้องเหนื่อยกันตลอดเลยนะ"
83306095600-8 = "อ่า... พอมาดูโปสเตอร์นี้ดีๆ แล้ว..."
83306095600-9 = "นี่มันลายเส้นของนักวาดการ์ตูน <akusi-girl> นักวาดการ์ตูนล้อเลียนในตำนานในโซเชียลมีเดีย...!"
83306095600-10 = "หืม...?"
83306095600-11 = "นะ... นี่เป็นของล้ำค่ามากเลยนะคะ! ฉันควรเอาไปให้ทุกคนในคณะกรรมการวินัยดูมากกว่าจะปล่อยทิ้ง#nไว้อย่างนี้ค่ะ!"
83306095600-12 = "อ่า... อืม... เอาสิ..."

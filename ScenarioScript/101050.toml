101050-137 = "3;베아트리체;01;일부이지만, 저는 의식을 통해 <색채>와 접촉했었죠. 그걸로 진정으로 제가 원하는 걸 깨달을 수 있었어요.\n#3;em;[반응]"
101050-138 = "3;베아트리체;01;제가 진정으로 해야만 하는 것…… 그것은 이런 시시한 실험이나 탐구가 아니었어요. 그래요…… 가장 위대한 존재가 되기 위해선……."
101050-139 = "3;베아트리체;01;세계의 멸망과 창생의 권한을 가져야 해요…… 즉, <파괴>하고 <창조>하는 절대자가 되는 것. 그것만이 유일한 방법……."
101050-140 = "3;베아트리체;01;해석되지 않고, 이해되지 않으며, 소통되지 않는 채 그저 도래하기만 하는 불길한 빛. 목적도, 소통도 되지 않는 불가해한 관념. 아아 그래요, 그것만이……."

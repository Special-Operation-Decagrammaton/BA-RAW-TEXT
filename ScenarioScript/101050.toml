[translation]
101050-1 = "ตอนที่ 5;รอยร้าวในชีวิตประจำวัน 3"
101050-4 = "เอาละ เตรียมทุกอย่างเสร็จหมดแล้ว โมเอะ ถึงตาเธอแล้ว"
101050-5 = "จริงนะ? ให้ฉันลุยได้จริงๆ ใช่ไหม? แฮ่ก... แฮ่ก..."
101050-6 = "มาถึงตรงนี้กันแล้ว เราคงไม่มีทางเลือกอื่นแล้วละ"
101050-7 = "เอาละ อย่าลังเลแล้วทำไปเลย!"
101050-8 = "งั้นฉันจะไม่ปฏิเสธ..."
101050-10 = "เจ้าพวกต่อแตนทั้งหลาย จงตายซะเถอะ!!"
101050-15 = "อะโห... รังต่อขนาดมหึมาโดนไฟเผาหายวับไปในพริบตาเลย..."
101050-16 = "ขอบใจมากนะที่มาช่วย ตอนฉันเจอรังต่อยักษ์นี่อยู่หลังโกดัง ฉันงงไปหมดเลยละว่าจะจัดการยังไงดี"
101050-17 = "ไม่เป็นไรหรอกค่ะ การกำจัดปัจจัยเสี่ยงที่คุกคามประชาชนเป็นหน้าที่ของ SRT อยู่แล้วค่ะ"
101050-18 = "ใช่ ถ้าชาวเมืองแตะต้องรังต่อโดยพลการเข้าละก็ อาจจะได้รับบาดเจ็บสาหัสก็ได้"
101050-19 = "ว่ากันว่าตัวต่อบางตัวมีพิษทางประสาทที่เป็นอันตรายถึงชีวิต การเผาทิ้งให้ราบคาบไปเลยจึงเป็นทาง#nเลือกที่ดีที่สุด"
101050-21 = "อะไรกัน หมดแล้วเหรอ?"
101050-22 = "ตอนบอกว่ามีรังต่อขนาดใหญ่ ฉันคิดว่าจะใหญ่จนฉันเผาเล่นได้สักชั่วโมงเสียอีก น่าเบื่อกว่าที่คิดแฮะ"
101050-23 = "รังต่อที่ต้องเผานานเป็นชั่วโมงงั้นเหรอ... ไม่อยากจะนึกภาพเลย..."
101050-25 = "ถ้าเป็นแต่ก่อน เวลาเกิดเรื่องแบบนี้ฉันคงจะโทรเรียกบริษัทกำจัดภัย หรือไม่ก็เรียกรถดับเพลิงให้มา#nจัดการไปแล้ว..."
101050-26 = "แต่พอมีการยืนยันว่าจะพัฒนาพื้นที่แถบโคะอุซางิ ทาวน์ หน่วยงานราชการและโครงสร้างพื้นฐานก็ถูก#nถอนออกไปหมด ชาวเมืองที่นี่ก็เลยไม่มีทางเลือกอื่นนอกจากต้องแก้ปัญหากันด้วยตัวเองน่ะ"
101050-27 = "พอเรื่องแบบนี้เกิดขึ้นซ้ำแล้วซ้ำเล่า... ฉันก็เลยคิดว่าจะย้ายบ้านไปดีไหม"
101050-31 = "...ฉันไม่รู้ว่าจะอยู่ที่นี่ถึงเมื่อไร แต่ถ้ามีเรื่องลำบากอะไรละก็ มาหาพวกฉันที่สวนสาธารณะได้นะคะ"
101050-32 = "ในฐานะนักเรียนของสถาบัน SRT พวกฉันจะเข้าช่วยเหลือเพื่อความปลอดภัยของชาวเมืองทุกเมื่อค่ะ"
101050-33 = "ได้ยินแบบนั้นฉันก็เบาใจได้นะ ฮุฮุ"
101050-34 = "ตายละ สติสตังของฉันคงหายไปหมดแล้ว ลืมไปเลยว่าต้องตอบแทนที่พวกเธอเข้ามาช่วยเหลือด้วย"
101050-38 = "ไม่หรอกค่ะ เรื่องเล็กๆ น้อยๆ ค่ะ ฉันแค่ทำในสิ่งที่ควรทำก็เท่านั้น"
101050-42 = "รับไปสิ นี่คือแพ็กยากิโทริแช่แข็งที่ขายในร้านของฉันเอง"
101050-44 = "ถึงจะมีแมลงวันตอมอยู่บ้าง แต่สมัยก่อนมันเป็นยากิโทริที่ผู้คนจากเขตอื่นๆ แห่เข้ามาหาซื้อกันเลยนะ"
101050-48 = "แพ็กยากิโทริแช่แข็ง... ผลิตภัณฑ์คุณภาพสูงที่ใส่ต้นหอมสดใหม่..."
101050-49 = "ยังไม่เลยวันหมดอายุ แถมยังอยู่ในสภาพดี..."
101050-50 = "จะให้ของดีๆ แบบนี้... กับพวกฉันเหรอคะ?"
101050-51 = "อื้ม... ทำไมเหรอ มีปัญหาอะไรกันหรือเปล่า?"
101050-52 = "หรือว่าถ้าไม่ชอบยากิโทริละก็..."
101050-53 = "ขอรับไว้ด้วยความยินดีค่ะ!"
101050-55 = "โคะอุซางิ การ์เด้น"
101050-57 = "อร่อยสุดๆ เลย!"
101050-58 = "นั่นสิ รอบนี้ย่างออกมาสุกพอดีเลยนะ ได้กลิ่นไฟหอมๆ มาจากเนื้อไก่ด้วย"
101050-59 = "ฮุฮุ ก็การใช้ไฟเป็นเรื่องถนัดของฉันนี่!"
101050-60 = "อืม เหมือนไฟมันจะเริ่มมอดแล้วนะ... ใส่ฟืนอีกสักหน่อยดีไหม?"
101050-65 = "กลิ่นหอมของต้นหอมสดกับรสมันๆ เลี่ยนๆ ของไก่เข้ากันมากเลยนะคะ"
101050-66 = "อื้ม โดยเฉพาะรสของหนังไก่ที่ย่างกรอบๆ อร่อยแบบไม่ต้องนับแคลอรีเลย!"
101050-67 = "หื้ม นานแค่ไหนแล้วนะที่เราไม่ได้กินอาหารสดใหม่แบบนี้..."
101050-68 = "ก็ช่วงนี้เรากินแต่เนื้อเค็มกระป๋องกันตลอดเลย..."
101050-69 = "ไหนๆ เราก็ไม่มีตู้เย็นอยู่แล้ว งั้นเราย่างไก่ที่ได้มาให้หมดเลยดีกว่า ไม่ต้องเหลือไว้หรอก!"
101050-73 = "รู้สึกสงบแปลกๆ นะคะ..."
101050-74 = "ใช่ แค่ได้นั่งดูกองไฟแบบนี้ ก็รู้สึกเหมือนได้ออกมาตั้งแคมป์เลย"
101050-75 = "ฮุฮุ... คิดแบบนั้นแล้วสนุกขึ้นมาเลยนะ"
101050-76 = "หมู่นี้ทั้งวัลคิรี่ ทั้งองค์การนักเรียนก็เงียบๆ กันแล้ว..."
101050-77 = "ส่วนคุณครูจากชาเล่ต์ก็งานยุ่งจนไม่ค่อยติดต่อมาด้วยค่ะ"
101050-78 = "แต่ถึงจะโทรมา ฉันก็จะไม่รับหรอก!"
101050-79 = "ใช่! ไม่ต้องไปติดต่อกับผู้ใหญ่แปลกๆ พรรค์นั้นหรอก!"
101050-80 = "ตะ... แต่ยังไงนานๆ ทีมาหากันบ้างก็น่าจะดีนะ..."
101050-84 = "แต่สำหรับนักเรียนคิโวทอส การไม่มีเรื่องอะไรเกิดขึ้นถือว่าเป็นเรื่องดีแล้วค่ะ"
101050-85 = "มันก็จริงอยู่ แต่กับพวกเราแล้ว..."
101050-86 = "อื้อ..."
101050-91 = "อ๊ะ จะว่าไปเรามีน้ำอัดลมที่เคยได้มาครั้งก่อนด้วยนะ ไปเอามาดื่มตอนนี้ดีไหม?"
101050-92 = "เราไม่มีตู้เย็น ฉันก็เลยเอาไปแช่น้ำพุไว้ ป่านนี้มันน่าจะเย็นเจี๊ยบแล้วละ!"
101050-93 = "น้ำอัดลมที่โซระให้มาตอนที่เราไปช่วยไล่เด็กเกเรที่ร้าน <เอ็นเจล 24> ให้คราวก่อนน่ะเหรอ?"
101050-94 = "นั่นมันน้ำอัดลมหายากที่เราเก็บไว้ดื่มในวันพิเศษๆ ไม่ใช่เหรอ?"
101050-95 = "วันที่เราได้กินยากิโทริเลิศรสแบบนี้แหละวันพิเศษ!"
101050-96 = "ไหนๆ ก็ไหนๆ แล้ว เอาเห็ดที่ไปเก็บมาก่อนหน้านี้มาย่างด้วยเลยดีกว่า!"
101050-97 = "โอเค งั้นไปเอามาเลยไหม?"
101050-102 = "ฉะ... ฉันไปด้วย...!"
101050-108 = "สำนักงานหัวหน้าสำนักป้องกัน"
101050-111 = "เครือข่ายข่าวกรอง...?"
101050-112 = "......"
101050-116 = "ค่ะ ว่ามาเลยค่ะ"
101050-117 = "......"
101050-118 = "...... อย่างนั้นเหรอคะ เข้าใจแล้วค่ะ"
101050-122 = "...... ในที่สุดก็เริ่มแล้วสินะคะ"
101050-125 = "ห้องประชุมเกมาเทรีย"
101050-129 = "สีสันกำลังมาที่นี่งั้นเหรอ...?"
101050-131 = "ค่ะ และนั่นจะทำให้ทั้ง <ชาเล่ต์> ทั้ง <เทพไร้นาม> ทั้ง <เรือ> เองก็จะหายไปทั้งหมดค่ะ เป็นยังไงล่ะคะ? เป็นวิธีที่แน่นอนเลยใช่ไหมคะ?"
101050-132 = "แล้วคิโวทอสก็จะหายไปด้วยสินะ"
101050-133 = "นี่มันอะไรกันครับมาดาม...? คิดจะทำลายการค้นคว้าของพวกเราเหรอครับ?"
101050-134 = "ค่ะ ฉันไม่สนหรอกค่ะ ฉันรู้แล้วว่านั่นไม่ใช่สิ่งที่ฉันต้องการจริงๆ ค่ะ"
101050-135 = "......"
101050-137 = "ถึงจะแค่ส่วนหนึ่งแต่ฉันก็ได้สัมผัสกับ <สีสัน> ผ่านพิธีนั้นมาแล้วค่ะ และมันก็ทำให้ฉันเข้าใจถึงสิ่งที่#nต้องการจริงๆ ค่ะ"
101050-138 = "สิ่งที่ฉันต้องทำจริงๆ... ไม่ใช่การทดลองหรือการค้นคว้าที่ไร้สาระเช่นนี้ค่ะ ใช่ค่ะ... เพื่อที่จะเป็นผู้ที่ยิ่ง#nใหญ่ที่สุดแล้ว..."
101050-139 = "ฉันต้องมีอำนาจในการทำลายล้างและสร้างโลก... นั่นหมายความว่าต้องเป็นผู้เผด็จการอย่างสมบูรณ์#nที่ทั้ง <ทำลาย> และ <สร้าง> ได้ และวิธีเดียวที่จะทำอย่างนั้นได้..."
101050-140 = "แสงไฟแห่งลางร้ายที่แค่ปรากฏขึ้น ไม่อาจวิเคราะห์ได้ ไม่อาจเข้าใจได้ ไม่อาจสื่อสารได้... ความคิดที่ไม่อาจเข้าใจได้ ไม่อาจรู้จุดประสงค์ได้... ใช่แล้วค่ะ..."
101050-141 = "วิธีที่จะกำจัดครู [USERNAME] นั่นได้...!"
101050-142 = "คิดจะทำบ้าอะไรน่ะ เสียสติไปแล้วรึไง"
101050-143 = "...... เป็นอย่างนั้นเองเหรอครับ มาดาม คุณถูกความเกลียดชังในตัวคุณกลืนกินเข้าไปแล้วสินะครับ น่าเสียดายจริงๆ "
101050-144 = "เกมาเทรียเป็นทั้งนักค้นคว้าและผู้แสวงหาสัจธรรม ความบ้าคลั่งที่ไม่อาจเข้าใจได้คือศัตรูเก่าแก่ที่เรา#nต้องทำลาย... เบียทริซ คุณไม่มีคุณสมบัติของเกมาเทรียอีกแล้วครับ"
101050-146 = "ว่าไงนะ? กล้าดียังไง... ตอนนี้พลังของสีสันกำลังหลั่งไหลอยู่ในตัวฉันนะ!"
101050-147 = "พลังของความบ้าคลั่งที่พวกนายหวาดหวั่นกันยังไงล่ะ..."
101050-148 = "ก็ดูเหมือนจะเป็นอย่างนั้นครับ โกลคอนดา ช่วยไปส่งเธอหน่อยครับ"
101050-149 = "ครับ ขอบคุณสำหรับที่ผ่านมานะครับ มาดาม"
101050-154 = "......?!"
101050-157 = "...... อะ... อ๊ากกกกกกกก!"
101050-158 = "อานุภาพรุนแรงกว่าระเบิดที่ใช้ทำลายฮาโลอีกนะครับเนี่ย"
101050-159 = "ครับ ถึงความลึกลับจะเป็นปริศนาที่ไม่สามารถตีความได้ แต่เธอก็เป็นคนที่เข้าใจได้ไม่ยากครับ"
101050-160 = "กรี๊ดดดดดดดด! "
101050-161 = "คิดว่าพวกเราไม่มีวิธีกีดขวางสีสันอย่างนั้นเหรอครับ? ที่จริงพวกเราเริ่มเตรียมตัวไว้ตั้งแต่ตอนรู้ว่าคุณ#nได้สัมผัสกับสีสันแล้วละครับ"
101050-162 = "ใช่!!"
101050-163 = "ถึงเราจะขัดแย้งและปะทะกันบ่อยเพราะโลกทัศน์ที่ต่างกัน แต่ยังไงก็ขอชื่นชมในความทะเยอทะยานของ#nคุณนะครับ เบียทริซ"
101050-164 = "---------------------------!!"
101050-174 = "......"
101050-175 = "น่าเสียดายนะครับ ตัวประกอบที่อยากจะเป็นพระเจ้าไม่รู้เลยเหรอครับว่าตัวเองจะเจอจุดจบแบบนี้? ถ้าหล่อนมีความเข้าใจในบทกวีมากกว่านี้อีกสักหน่อยละก็...  "
101050-176 = "ความบ้าคลั่งเป็นสิ่งที่น่ากลัวนะครับ ถึงผมจะอยากรู้ว่าหล่อนจะกลายเป็นสัตว์ประหลาดอะไรก็เถอะ... แต่ถ้าปล่อยไว้แบบนี้ ต่อไปก็อาจจะเกิดเรื่องน่าลำบากใจมากกว่านี้ก็ได้"
101050-177 = "เกิดที่ว่างขึ้นอีกแล้วสินะครับ เอาเถอะ ไว้คุยเรื่องกำลังเสริมกันทีหลังแล้วกัน"
101050-180 = "มาหารือเรื่องต่อไปกันเถอะครับ"
101050-181 = "......"
101050-182 = "......"
101050-184 = "ตอนต่อไป;ลางสังหรณ์"

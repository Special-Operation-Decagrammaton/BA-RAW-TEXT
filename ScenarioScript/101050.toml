[translation]
101050-1 = "第5話;日常的龜裂（３）"
101050-4 = "準備完成。交給你了，萌。"
101050-5 = "真的可以嗎？這樣做真的沒問題嗎？哈啊，哈啊……"
101050-6 = "都到這一步了，沒有逃避這個選項。"
101050-7 = "上吧，儘管放手去做！"
101050-8 = "那我就不客氣了……"
101050-10 = "開火──！"
101050-15 = "哇……！那麼大的虎頭蜂窩居然一下就燒光了……"
101050-16 = "非常謝謝你們！在倉庫發現蜂窩的時候，真是不知該如何是好……"
101050-17 = "別客氣，排除威脅市民的危險是SRT的義務。"
101050-18 = "沒錯。一般民眾如果隨便觸碰蜂窩，很可能會受傷的。"
101050-19 = "虎頭蜂可是有神經毒素啊。#n做好萬全的準備，一口氣燒毀是最好的方法。"
101050-21 = "什麼嘛，已經結束了嗎？"
101050-22 = "聽說有巨大的虎頭蜂窩，本來還以為能燒個1小時的……真可惜。"
101050-23 = "要，要花超過1個小時才能燒光的蜂窩……真不敢想像……"
101050-25 = "以前都是找除蟲業者或消防署來解決……"
101050-26 = "自從兔寶寶鎮決定要都更之後，公共機關和基礎建設全都被撤除……所以某種程度上都得自己解決問題才行。"
101050-27 = "但是，果然麻煩的事還是太多……我們或許也是時候該……"
101050-31 = "……如果又遇到了什麼困難，請來公園找我們吧。"
101050-32 = "身為SRT的隊員，我們隨時願意協助市民。"
101050-33 = "那還真是……相當可靠呢。"
101050-34 = "不好意思，明明受了你們的幫助卻完全忘記要給你們謝禮了呢。"
101050-38 = "沒關係，我們只是做了該做的事──"
101050-42 = "來，這是我們店裡的烤雞肉串。"
101050-44 = "雖然現在沒什麼客人……不過不久之前還是有客人會來的，味道多少有保證。"
101050-48 = "冷藏雞肉串……而且還有新鮮的蔥……"
101050-49 = "保存期限還沒過的話，狀況也不錯……"
101050-50 = "要免費……送給我們嗎……？"
101050-51 = "咦，咦？有什麼問題嗎……？"
101050-52 = "如果不喜歡雞肉串──"
101050-53 = "「「非常感謝！！」」"
101050-55 = "兔寶寶公園"
101050-57 = "好好吃……！"
101050-58 = "唔呣……這次烤得不錯呢。很有炭烤獨特的味道。"
101050-59 = "呵呵，用火可是我的專長啊！"
101050-60 = "唔嗯，火力好像有點不夠。柴火還夠嗎？"
101050-65 = "新鮮的蔥香味與雞肉的油脂，果然是絕配呢。"
101050-66 = "特別是這個烤到酥酥脆脆的雞皮……非常多汁，真是棒極了！"
101050-67 = "呼……多久沒吃到這麼新鮮的食物了呢……"
101050-68 = "最，最近……吃的總是醃肉罐頭……"
101050-69 = "反正我們也沒有冰箱，收到的肉就全部烤一烤吧！"
101050-73 = "……真是和平呢。"
101050-74 = "就是說啊。只要看著營火，感覺就像是來露營一樣。"
101050-75 = "呵呵……這麼想的話，總覺得有點開心呢。"
101050-76 = "最近女武神和聯邦學生會都沒什麼動靜……"
101050-77 = "夏萊的老師也沒有聯絡我們呢。"
101050-78 = "雖然就算聯絡也沒打算接就是了。"
101050-79 = "是，是啊……反正我們就算沒有老師也能過得很好！"
101050-80 = "可，可是，偶爾還是希望他能聯絡我們……"
101050-84 = "……對奇普托斯的學生來說，沒事就是好事吧。"
101050-85 = "話雖如此，但對我們來說……"
101050-86 = "嗯……"
101050-91 = "啊，對了。之前收到的汽水，要現在喝嗎？"
101050-92 = "因為沒有冰箱，所以就放在噴水池裡了……#n我想現在應該很涼快了哦！"
101050-93 = "你說的是之前趕走不良學生時，空送給我們的汽水嗎？"
101050-94 = "我記得你好像說過，因為是久違的碳酸飲料所以要在「重要的日子喝」……"
101050-95 = "所以就該在今天喝吧！#n能吃到這麼好吃的雞肉串的日子可不多唷？"
101050-96 = "今天就來開派對吧！#n好～！既然如此，之前採的蘑菇也一起烤吧！"
101050-97 = "……說的也對。#n那就趕快拿過來吧。"
101050-102 = "我，我也一起去……！"
101050-108 = "防衛室．辦公室"
101050-111 = "這邊的通訊響了就代表……"
101050-112 = "……"
101050-116 = "……請說。"
101050-117 = "……"
101050-118 = "……這樣啊，我知道了。"
101050-122 = "……終於要開始了呢。"
101050-125 = "蓋瑪特利亞．會議室"
101050-129 = "──「色彩」正在接近這裡……？"
101050-131 = "沒錯。如此一來不管是「夏萊」、「無名之神」、「方舟」全都會消失。#n怎麼樣？這是最確實的方法吧。"
101050-132 = "這樣一來，「色彩」會連奇普托斯也一起抹除吧。"
101050-133 = "……夫人想要讓我們的探究付之一炬嗎？"
101050-134 = "沒錯，探究什麼的根本無所謂。#n因為我已經意識到自己真正追求的是別的東西。"
101050-135 = "……"
101050-137 = "雖然只是一部分，但在我透過儀式和「色彩」接觸時，#n我領悟到了自己真正追求的東西。"
101050-138 = "我該做的……並不是無聊的實驗和探究。#n沒錯……為了成為偉大的存在──"
101050-139 = "必須取得世界的滅亡與創生的權限……#n也就是，要成為「破壞」與「創造」的絕對者。這才是唯一的方法……"
101050-140 = "無法解釋、無法理解，無法溝通──只知道將會到來的不祥之光。#n目的不詳又無法溝通的無法理解的觀念……啊啊，沒錯──那才是，"
101050-141 = "可以消滅那個[USERNAME]老師的方法……"
101050-142 = "這是何等醜態。#n失去理智了嗎，貝雅特里榭。"
101050-143 = "……這樣啊，夫人。你已經被自己的憎恨吞噬了呢。#n……真是遺憾。"
101050-144 = "蓋瑪特利亞是探究者、求道者……無法理解的瘋狂正是我們必須擊倒的宿敵……貝雅特里榭，你已經失去蓋瑪特利亞的資格了。"
101050-146 = "注意你的口氣……我的身上可是寄宿著「色彩」的力量哦？"
101050-147 = "你們如此畏懼的瘋狂之力──"
101050-148 = "似乎是呢。#n戈爾孔特，送她一程吧。"
101050-149 = "是。#n──這段期間我很快樂，夫人。"
101050-154 = "……！？"
101050-157 = "……唔，咕啊啊啊啊──！？"
101050-158 = "呼呣，似乎比破壞光環的炸彈更確實呢。"
101050-159 = "沒錯，神祕正因無法解析才會被稱為「神祕」，#n而她只是個容易理解的存在。"
101050-160 = "啊啊啊啊啊啊啊啊啊！！！"
101050-161 = "你以為我們沒有對抗「色彩」的手段嗎？#n……從聽見你和「色彩」接觸的那一刻起，我們就已經著手準備了。"
101050-162 = "沒錯！！"
101050-163 = "雖然我與閣下有著不同的世界觀，因此經常發生衝突。#n不過我對你的野心表達敬意，貝雅特里榭。"
101050-164 = "──────！！"
101050-174 = "……"
101050-175 = "真是遺憾。高聲呼喊要成為神的臨時演員，不知道自己總有一天會迎來這樣的命運嗎？啊啊，要是她能有點詩歌的造詣……"
101050-176 = "染上瘋狂的他，最終究竟會變化為什麼樣的怪物──#n雖然很好奇……但繼續放任他的話，將會引來更大的災禍吧。"
101050-177 = "又空出了一個位子呢。#n下一個人員的話題之後再討論吧。"
101050-180 = "那麼進入下一個議題──"
101050-181 = "……"
101050-182 = "……"
101050-184 = "下一話;前兆"

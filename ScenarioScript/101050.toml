[translation]
101050-1 = "Episode 5; A Fissure in Everyday Life 3"
101050-4 = "Preparations complete. It's your turn, Moe."
101050-5 = "*pant* *pant* Really? I'm really allowed to do this?!"
101050-6 = "We don't have any other options at this point."
101050-7 = "Stop messing around and just do it!"
101050-8 = "Then, if I may..."
101050-10 = "Die, you evil wasps!"
101050-15 = "Wow... That huge wasp nest burned down in a flash..."
101050-16 = "Thanks so much for your help. When I saw the wasp nest behind the storage, I didn't know what to do."
101050-17 = "There's no need to thank us. It's SRT's duty to eliminate any hazard that threatens citizens."
101050-18 = "That's right. Civilians could seriously injure themselves if they were to carelessly touch a wasp nest."
101050-19 = "Some wasps are said to have a deadly neurotoxin, so it's best to burn the whole nest down at once."
101050-21 = "Huh? That's it?"
101050-22 = "I thought I would get to see the blazing flames of the wasp nest crumbling to ashes burn for at least an hour. How disappointing."
101050-23 = "A-A whole hour...? Th-That's scary to even th-think about..."
101050-25 = "In the past, I would have called a pest control company or reported this to the fire department..."
101050-26 = "But after the redevelopment of Kousagi Town was finalized, all governmental offices and infrastructure were withdrawn, so most of these problems have to be solved by the residents themselves."
101050-27 = "There's just no end to it... So, we've been thinking about moving."
101050-31 = "I can't guarantee how long we'll be there, but please feel free to find us at the park if you need help."
101050-32 = "We are SRT, so we'll always do our utmost to ensure the citizens' safety."
101050-33 = "Oho! You sure are reliable. Heehee."
101050-34 = "Let me repay you for your help."
101050-38 = "Please, there's no need. We were only fulfilling our duty."
101050-42 = "Here. This is a frozen chicken skewer pack we sell at the store."
101050-44 = "Business is slow right now, but people used to even travel all the way from other districts to buy our chicken skewers."
101050-48 = "High-quality frozen chicken skewers...with fresh green onions..."
101050-49 = "It's not expired... In fact, it's in excellent condition..."
101050-50 = "Y-You would j-just give us something like this?"
101050-51 = "I-Is that a bad thing...?"
101050-52 = "It's okay if you don't like chicken skewers..."
101050-53 = "Thank you very much!!"
101050-55 = "Kousagi Park"
101050-57 = "Delicious...!"
101050-58 = "The outside is perfectly grilled... And that smoky taste just melts in your mouth."
101050-59 = "Heehee. I know, I know. I'm kind of considered an expert with fire."
101050-60 = "Speaking of, the fire is a little weak. Maybe I should put on more firewood..."
101050-65 = "The scent of fresh green onion and the rich taste of chicken go really well together."
101050-66 = "Don't forget the crispy fried chicken skin! Yum..."
101050-67 = "Oh, it's been so long since I ate something so fresh..."
101050-68 = "W-We only get to eat th-things out of cans... Like salted meat..."
101050-69 = "Let's grill every last piece! We don't have a refrigerator to store it anyway!"
101050-73 = "It's...peaceful."
101050-74 = "I like it. Sitting around a bonfire and eating grilled meat at a park... It's kind of like we're just taking a camping trip."
101050-75 = "Heehee... Th-That's a fun way to see it..."
101050-76 = "Valkyrie and the General Student Council have been quiet recently..."
101050-77 = "And Sensei must be busy as usual... They haven't contacted us in quite some time."
101050-78 = "Hmph. I'd ignore it if Sensei contacted us anyway!"
101050-79 = "Same! We don't need that dummy adult to help us!"
101050-80 = "I-I do wish Sensei would v-visit us sometimes..."
101050-84 = "At the end of the day, no news is good news for Kivotos."
101050-85 = "That's true, but for us..."
101050-86 = "Yeah... F-For us, without a school..."
101050-91 = "Hey, y'all. The soda we got before, let's drink it now."
101050-92 = "I put it in the fountain to keep it cold. It should be perfect to drink by now!"
101050-93 = "You mean the soda Sora gave us when we drove out those thugs from Angel 24?"
101050-94 = "Didn't you say no one could lay even one finger on it because you were saving it for an important day?"
101050-95 = "We got to eat some delicious, precious chicken skewers. What could be a more important day than this one?"
101050-96 = "I have an idea! We'll grill the mushrooms we picked!"
101050-97 = "That sounds perfect! I'll go get them!"
101050-102 = "W-Wait! T-Take me with you!"
101050-108 = "Chief of Defense Office"
101050-111 = "Is this the anti-espionage network...?"
101050-112 = "..."
101050-116 = "Yes, you may speak."
101050-117 = "..."
101050-118 = "...I see. Got it."
101050-122 = "...At long last."
101050-125 = "Gematria Conference Room"
101050-129 = "The Chroma is coming here?"
101050-131 = "Yes. With its coming, Schale, the Nameless Gods, the Ark... All will be eradicated. Is it not an elegant solution?"
101050-132 = "And Kivotos along with it!"
101050-133 = "To what ends, dear Madame? Perhaps you've grown tired of our research."
101050-134 = "Yes, I suppose you could say my motivations have shifted."
101050-135 = "..."
101050-137 = "As you well know, I had partial contact with the Chroma through the ritual. It led me to the see the truth."
101050-138 = "My purpose does not lie in this frivolous research or rudimentary experiments. That is not how I will become the greatest."
101050-139 = "For me to achieve that, I must have absolute authority. I must become an absolute. One with power to destroy and create the world itself."
101050-140 = "I will become an ominous light that cannot be interpreted, beyond human communication. To human eyes, I will be beyond a purpose they can understand."
101050-141 = "It is the only way to eliminate [USERNAME] Sensei!"
101050-142 = "What is this madness? Have you utterly lost your mind?"
101050-143 = "...What a shame. You have allowed your hatred to consume you, Madame. "
101050-144 = "Gematria is an explorer and a seeker. Incomprehensible madness is the very enemy we sought to defeat. In succumbing to your own madness, you have lost your right to Gematria."
101050-146 = "I—How dare you?! I hold the power of the Chroma within me!"
101050-147 = "I have tamed the power of madness you so desperately fear!"
101050-148 = "It does appear so. Golconde, if you would please?"
101050-149 = "Yes, yes. It's been a pleasure, Madame."
101050-154 = "...?!"
101050-157 = "...Kyaaaaaaaaah!!"
101050-158 = "Fascinating. It's even more effective than the halo-destroying bomb."
101050-159 = "Truly. Mysteries, as the name suggests, may be impossible to interpret, but Madame's motives were predictable."
101050-160 = "AHHHHHH! "
101050-161 = "Did you truly believe we would be twiddling our thumbs here? We have been preparing for a means to combat the Chroma since the moment you came into contact with it."
101050-162 = "BUT OF COURSE!"
101050-163 = "You and I disagreed upon the fundamentals of art and our perspectives of the world, but I have respected your ambition from the beginning, Beatrice."
101050-164 = "—!"
101050-174 = "..."
101050-175 = "Oh dear, oh dear. Our poor Madame has not read enough storybooks. Side characters who strive to become the protagonist never make it to the ending."
101050-176 = "Madness is a terrifying art. I was rather curious as to the manner of monster she would become, but it would have been more troublesome if we left it to fester."
101050-177 = "One seat is empty again. We will discuss recruitment later."
101050-180 = "For now, we must proceed to the next topic."
101050-181 = "..."
101050-182 = "..."
101050-184 = "Next Episode; Foreshadowing"

[translation]
1003906-1 = "RABBIT 4 หยุดพักผ่อนค่ะ"
1003906-2 = "ทางเดินเขาใกล้ๆ โคะอุซางิ การ์เด้น"
1003906-3 = "(มิยุนั่งยองๆ อยู่กับพื้นและเลือกอะไรบางอย่างอยู่...)"
1003906-4 = "อืม... หินก้อนนี้ก็ไม่ใช่..."
1003906-5 = "ก้อนนี้ก็ไม่ใช่..."
1003906-6 = "[s] \"ทำอะไรอยู่เหรอ?\""
1003906-10 = "คะ... คะ... คะ... คะ... คะ... คุณครู?!"
1003906-11 = "มะ... มะ... มะ... มะ...มาตั้งแต่เมื่อไรคะ?"
1003906-12 = "ฉันไม่ได้ยินเสียงฝีเท้าใครเดินมาเลย..."
1003906-13 = "ระ... หรือว่าคุณครูก็กลายเป็นมนุษย์จืดจางที่ไม่มีใครสังเกตเหมือนฉันไปแล้ว..."
1003906-14 = "[s] \"ครูแค่จงใจเดินเบาๆ น่ะ\""
1003906-15 = "งะ...งั้นเหรอคะ โล่งอกไปทีค่ะ"
1003906-16 = "ฉันตกใจมากๆ นึกว่าคุณครูกลายเป็นมนุษย์จืดจางเหมือนกับฉันไปซะแล้ว..."
1003906-17 = "ถ้าเกิดคุณครูกลายเป็นคนที่คนอื่นมองไม่เห็นไปอีกคนละก็..."
1003906-18 = "ตอนที่ไปเข้าเวรที่ชาเล่ต์ คงไม่มีคนมากดเปิดประตูให้ฉันแน่ๆ ค่ะ..."
1003906-19 = "[s] \"กังวลเพราะเหตุผลนั้นหรอกเหรอ...?\""
1003906-23 = "[ns] \"มิยุทำอะไรอยู่น่ะ?\""
1003906-24 = "นี่น่ะ... คือว่า..."
1003906-25 = "ฉันกำลังเก็บก้อนกรวดที่ตกลงมาข้างทางอยู่ค่ะ"
1003906-26 = "การเก็บก้อนกรวดเป็นงานอดิเรกของฉันนี่คะ"
1003906-27 = "[s] \"งั้นเหรอ? มีหินที่หายากบ้างรึเปล่า?\""
1003906-28 = "มะ...ไม่มีหรอกค่ะ ฉะ...ฉันไม่ได้มองหาแค่หินที่มีรูปร่างแปลกๆ หรอกค่ะ"
1003906-29 = "ก้อนกรวดที่ฉันเก็บอยู่เป็นก้อนกรวดธรรมดา..."
1003906-30 = "ก้อนกรวดที่ไม่มีใครสนใจ และโดนเตะไปมาก็เท่านั้นเองค่ะ"
1003906-31 = "พอเห็นก้อนกรวดพวกนั้นแล้ว..."
1003906-32 = "ฉันมีความรู้สึกที่สื่อถึงพวกมันได้บางอย่าง..."
1003906-33 = "ฉันเลยอยากมานั่งเก็บพวกมันค่ะ..."
1003906-34 = "[s] \"ครูพอเข้าใจว่ารู้สึกยังไง...\""
1003906-35 = "จะ...จริงเหรอคะ?"
1003906-36 = "คุณครูเข้าใจความรู้สึกของฉันแบบนี้ รู้สึกดีใจนิดๆ นะคะ..."
1003906-37 = "คะ...คุณครูคะ ถ้างั้นคุณครู... อยากจะมานั่งเก็บก้อนกรวดแถวๆ นี้กับฉันมั้ยคะ?"
1003906-38 = "แถวนี้มีก้อนกรวดธรรมดาๆ เยอะมาก ฉันเลยมาที่นี่บ่อยๆ ค่ะ..."
1003906-39 = "[s] \"ได้สิ\""
1003906-42 = "(ยื่นก้อนกรวดที่มีลักษณะดีให้กับมิยุ)"
1003906-43 = "หินก้อนนี้..."
1003906-44 = "คุณครูคะ นี่ไม่ใช่ก้อนกรวดธรรมดาหรอกนะคะ มันเป็นส่วนหนึ่งของหินหน้าผาที่แตกออกมาค่ะ..."
1003906-45 = "หินก้อนนี้ได้ทำหน้าที่ของมันอย่างเต็มที่แล้ว เพราะงั้นคงเรียกว่าเป็นหินธรรมดาๆ ไม่ได้หรอกค่ะ..."
1003906-46 = "[s] \"ถ้างั้นอันนี้ล่ะ?\""
1003906-47 = "หินก้อนนี้มีผิวที่เรียบมันวาวดีจนเกินจะเรียกว่าปกติได้ค่ะ..."
1003906-48 = "ถ้าเป็นก้อนกรวดพวกนี้ละก็ แม้แต่คนที่ไม่มีความสนใจเรื่องหินก็ยังต้องมองบ่อยๆ เลยค่ะ"
1003906-49 = "[s] \"ถ้างั้นอันนี้...\""
1003906-50 = "นี่เป็นหินแกรนิตที่เกิดจากหินภูเขาไฟที่หาได้ยากในบริเวณนี้..."
1003906-51 = "คุณครู... ดูเหมือนจะหาได้แต่หินแปลกๆ ที่ไม่ใช่หินธรรมดาๆ เลยนะคะ"
1003906-52 = "ฉันทราบดีว่าหินแปลกๆ มันมักจะสะดุดตา แต่สำหรับหินธรรมดาๆ อาจจะหายากสักหน่อย..."
1003906-53 = "แต่ยังไงก็ช่วยเลือกให้ละเอียดกว่านี้ด้วยนะคะ!"
1003906-54 = "[s] \"เข้มงวดกว่าที่คิดอีกนะเนี่ย...\""
1003906-56 = "(หลังจากนั้น คุณครูกับมิยุก็นั่งเลือกก้อนกรวดด้วยกันจนเกือบถึงตอนฟ้ามืด...)"

[translation]
1003906-1 = "RABBIT4，要休息了"
1003906-2 = "兔寶寶公園．附近的休息步道"
1003906-3 = "（美優蹲在地上，似乎在挑著什麼）"
1003906-4 = "這個不對……"
1003906-5 = "也不是這個……"
1003906-6 = "[s] 「美優，你在做什麼呢？」"
1003906-10 = "老，老老，老師！？"
1003906-11 = "你，你什麼時候來的……！？"
1003906-12 = "好像，沒聽到你的腳步聲……"
1003906-13 = "難，難道是在跟我相處的期間，老師的存在感也……？"
1003906-14 = "[s] 「抱歉嚇到你了。因為看你很專注，想說要安靜一點。」"
1003906-15 = "這，這樣啊……"
1003906-16 = "我還在想，要是真的是因為我而變成那樣該怎麼辦呢……"
1003906-17 = "如果連老師的存在感都低到讓別人找不到的話……"
1003906-18 = "自動門就不會打開，我們也回不了夏萊了……"
1003906-19 = "[s] 「嘛，確實……？」"
1003906-23 = "[ns] 「話說回來，你在做什麼呢？」"
1003906-24 = "那，那個……"
1003906-25 = "在撿，小石頭……"
1003906-26 = "那個……這是，我的興趣……"
1003906-27 = "[s] 「這樣啊，有找到形狀很特別的石頭嗎？」"
1003906-28 = "啊，不是，那個，我不是在找形狀特別的石頭……"
1003906-29 = "該說是不會吸引目光，誰也不會注意到的那種石頭嗎……"
1003906-30 = "被踢到一旁也不會被注意到的……那種石頭……"
1003906-31 = "看到它們的樣子，總覺得……"
1003906-32 = "能感同身受，該這麼說嗎。"
1003906-33 = "所以想，找到它們……"
1003906-34 = "[s] 「……這樣啊。好像可以理解那種心情。」"
1003906-35 = "真，真的嗎……？"
1003906-36 = "那，好像……有點開心。"
1003906-37 = "如果可以的話，那個……老師也一起來找怎麼樣呢？"
1003906-38 = "這附近有不少那種稜角不分明的石頭……"
1003906-39 = "[s] 「嗯，我很樂意。」"
1003906-42 = "（突然看到腳邊的石頭，於是就拿給美優看）"
1003906-43 = "這個是……"
1003906-44 = "……老師，這是磚塊的碎片。"
1003906-45 = "這個，該說是已經完成自己的使命了嗎……"
1003906-46 = "[s] 「原，原來如此……那這個呢？」"
1003906-47 = "這個……表面很漂亮呢。"
1003906-48 = "即使是對石頭沒興趣的人也會留意到的吧……"
1003906-49 = "[s] 「這個呢……？」"
1003906-50 = "這是一種很少見的火山岩呢……很稀有的……"
1003906-51 = "老師為什麼從剛才開始就一直拿特別的石頭呢……？"
1003906-52 = "雖然我知道稀有的石頭會吸引目光，不過也有和它們不一樣的石頭……"
1003906-53 = "請，請認真一點找……！"
1003906-54 = "[s] 「我，我會加油的……」"
1003906-56 = "（之後，直到日落都跟美優一起拚命地找小石頭）"

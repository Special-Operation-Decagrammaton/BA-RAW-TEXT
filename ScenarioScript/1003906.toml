[translation]
1003906-1 = "RABBIT 4, Let's Rest"
1003906-2 = "Trail near Kousagi Park"
1003906-3 = "I found Miyu crouching down, picking at something."
1003906-4 = "Umm... Not this rock..."
1003906-5 = "Not this one either."
1003906-6 = "[s] \"What are you doing?\""
1003906-10 = "S-S-Sensei?!"
1003906-11 = "Wh-When did you get here?"
1003906-12 = "I didn't hear you at all."
1003906-13 = "Have you been with me too much? D-Did you lose your presence too?!"
1003906-14 = "[s] \"I was just walking quietly.\""
1003906-15 = "Oh... That's good."
1003906-16 = "I was scared you were l-like me now..."
1003906-17 = "If you became invisible too..."
1003906-18 = "No one could open the automatic door for me when I go to work..."
1003906-19 = "[s] \"...That's your concern?\""
1003906-23 = "[ns] \"Anyway, what were you doing?\""
1003906-24 = "Well, um..."
1003906-25 = "I was picking some p-pebbles."
1003906-26 = "Collecting pebbles is my hobby..."
1003906-27 = "[s] \"Neat. Did you find anything interesting?\""
1003906-28 = "N-Not like that."
1003906-29 = "I like things no one would normally care about, I guess..."
1003906-30 = "L-Like a normal pebble that's been kicked around a lot."
1003906-31 = "Pebbles like those..."
1003906-32 = "I really relate to them."
1003906-33 = "So I wanna take care of them."
1003906-34 = "[s] \"I think I can understand that.\""
1003906-35 = "R-Really?"
1003906-36 = "Th-That makes me happy."
1003906-37 = "S-Sensei. Do you...wanna join me?"
1003906-38 = "There's lots of normal pebbles here. I-It's my favorite spot."
1003906-39 = "[s] \"Sure.\""
1003906-42 = "I found a normal pebble and handed it to Miyu."
1003906-43 = "This one..."
1003906-44 = "Sensei, this is a broken brick piece."
1003906-45 = "It has a role already...it's not very normal."
1003906-46 = "[s] \"What about this, then?\""
1003906-47 = "It's so smooth..."
1003906-48 = "Even people who don't like rocks would pick it."
1003906-49 = "[s] \"What about this?\""
1003906-50 = "This is granite, a volcanic rock... It's rare..."
1003906-51 = "Sensei. You only pick not normal ones."
1003906-52 = "Pretty and rare stones are easier to see, b-but that's not what we're looking for."
1003906-53 = "P-Please take it seriously!"
1003906-54 = "[s] \"You're stricter than I thought you'd be.\""
1003906-56 = "Miyu and I worked hard together to find normal pebbles until the sun went down."

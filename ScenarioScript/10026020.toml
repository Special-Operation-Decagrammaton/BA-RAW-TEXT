[translation]
10026020-1 = "Episode 2;All's Well That Ends Well"
10026020-2 = "So..."
10026020-3 = "This is the perfect way for Sakurako and Ui to make amends."
10026020-4 = "Naturally, as a person of interest in the scripture case, you're here as well, Sensei."
10026020-5 = "...Got it?"
10026020-6 = "[s] \"...\""
10026020-8 = "[ns1] \"Uhh, yup... Makes sense to me...\"\n[ns2] \"Um... Got what?\""
10026020-11 = "Heehee... I thought you might need more of an explanation."
10026020-12 = "When the Sisterhood discovered ruins on an island near Trinity..."
10026020-13 = "They did an immense amount of research into what kind of place it was and why it was built."
10026020-15 = "But that ancient language is so complex that even the Sisterhood couldn't decipher it. The project has been dormant for ages."
10026020-17 = "That's where Ui's extraordinary ability to decipher ancient texts and her deep knowledge of archaeology come into play."
10026020-18 = "She has the expertise we need to finally understand this place! It's a win for everyone involved! ♡"
10026020-19 = "So... Does that clear everything up?"
10026020-20 = "[s3] \"...I see. This is complicated.\"\n[s4] \"I think I understand now...\""
10026020-23 = "J-Just one thing, Hanako... Why are we wearing swimsuits if we're investigating ancient ruins?"
10026020-24 = "And why is yours so different from the rest of ours?"
10026020-26 = "Hinata, dear, don't worry yourself with unnecessary details. ♡"
10026020-27 = "That is not an unnecessary detail!"
10026020-28 = "Koharu?"
10026020-29 = "You said this was an emergency! Why are we on an island in the middle of nowhere?"
10026020-30 = "Of all the places we could be and things we could be doing right now, why here and why this?"
10026020-31 = "Because we didn't get to play together at the beach this summer, and it made me sad. "
10026020-32 = "So I thought we could play here instead, Koharu..."
10026020-33 = "Play? You're here to play?!"
10026020-34 = "Would it make you feel better if I said we need you here to keep an eye on everyone as part of your elite Justice Task Force duties?"
10026020-35 = "It doesn't matter how I feel! I mean, yes, as an elite, that's one of my duties, but—"
10026020-36 = "Ugh! Really? A bunch of girls in skimpy swimsuits stranded on a remote island...?"
10026020-37 = "..."
10026020-38 = "I mean, that's about as cliche as it gets... "
10026020-40 = "Huh?"
10026020-41 = "It's the kind of thing that only ever happens in low-budget—"
10026020-42 = "Oh my god!! Oh my god, you planned this depravity, didn't you?!"
10026020-43 = "Depravity? Koharu, I'm sure I don't know what you're talking about. Please explain."
10026020-44 = "I— You— You know what I mean!"
10026020-45 = "Honestly, I don't. Please tell me. And be very specific, so I know exactly what to watch out for in the future..."
10026020-46 = "Stop looking at me like that, you...you...deviant!"
10026020-47 = "What? We're just having some fun in the sun. It is summer, after all."
10026020-48 = "What are you—Hey! Stay away from me! Don't come near me!!"
10026020-49 = "Did you maybe mean something...like this? Hngh! ♡"
10026020-53 = "Aahhhh! Let go of me! Sensei, help! Make her stop! Uwahh!"
10026020-54 = "[ns] \"All right, ladies, that's enough joking around.\""
10026020-55 = "Why...? How did it come to this...?"
10026020-56 = "I just wanted to uncover the truth... Now they've dragged me out to the middle of nowhere in this scorching heat."
10026020-57 = "And all they gave me to wear is this...this... Ugh! That's the last time I let anyone else pack for me!"
10026020-61 = "But I suppose it would be worth it if we manage to find..."
10026020-62 = "Hm... If I can decipher the secrets of the ruins, then I'll have irrefutable proof that the Sisterhood—"
10026020-63 = "What's that, Ui?"
10026020-64 = "K-O-Z-E-K-I?"
10026020-65 = "Eeeek! D-Don't sneak up on me like that!"
10026020-66 = "And I wasn't saying anything! I was just talking to myself!"
10026020-68 = "Oh... Can you believe we have permission to do this from Sakurako herself? It's going to solve all our problems!"
10026020-69 = "With you on our side, Ui, we've got this!"
10026020-70 = "Hinata..."
10026020-71 = "I'm serious! You can do it, Ui! And even though this isn't my area of expertise..."
10026020-72 = "I'll stay right here beside you to help any way I can!"
10026020-73 = "Aaaaaugh!"
10026020-75 = "U-Ui?! What happened?! What's wrong?!"
10026020-76 = "How can you be so optimistic and supportive?!"
10026020-77 = "I came here to get this done and clear my name. I didn't expect... I mean..."
10026020-79 = "I can't handle all of this altruism! It's too much!"
10026020-80 = "Wh-What do you mean too much?! I was just trying to—"
10026020-81 = "N-No! I'm not blaming you for anything, Hinata. I just mean..."
10026020-82 = "I don't know what I mean other than... This is my problem to solve, not yours."
10026020-83 = "*inhale* Phew..."
10026020-84 = "Hinata, Sensei, I'm sorry..."
10026020-85 = "I feel so guilty. This is all my fault."
10026020-86 = "I was so busy obsessing over the scripture that I didn't stop to think about how my actions would affect all of you."
10026020-87 = "[s5] \"We understand. Just...try not to repeat your mistakes, okay?\"\n[s6] \"Don't worry. Everyone makes mistakes sometimes.\""
10026020-90 = "Exactly. Besides, it's not like Sister Sakurako blamed us directly."
10026020-91 = "Like Sensei said, everyone makes mistakes. You just have to be more careful in the future!"
10026020-92 = "The way I see it, you've already helped me out in the past."
10026020-93 = "So now, it's like I'm returning the favor. And helping my friend makes me happy!"
10026020-94 = "*splutter*"
10026020-95 = "Ui...?!"
10026020-96 = "[s7] \"You two have very different approaches to life.\"\n[s8] \"This is about more than nurturing a healthy relationship.\""
10026020-99 = "Well, it's not the reaction I expected, but I think I understand..."
10026020-100 = "*inhale* Sigh..."
10026020-101 = "Yes... Okay... So here we are, I guess."
10026020-102 = "Since this affects all of you too, I'll do my very best. Agreed?"
10026020-103 = "Yes! Thank you, Ui! Thank you so—"
10026020-104 = "S-Stop! Please..."
10026020-105 = "Really. Don't mention it... But if you're serious about helping, I could use a hand with this luggage."
10026020-106 = "Okay?"
10026020-107 = "I know it's a lot, but it's all part of my Ruins Investigation Kit."
10026020-108 = "The research we're about to do is incredibly complex, so we'll need a lot of tools."
10026020-109 = "I've got a dead language dictionary, ink for making copies, reagents to remove contaminants...everything!"
10026020-110 = "That said, be careful. These bags are a lot heavier than they look."
10026020-111 = "Hnngh!"
10026020-112 = "On it! I'll take this one!"
10026020-113 = "Hup!"
10026020-115 = "...?"
10026020-116 = "How did you lift that with one hand?!"
10026020-117 = "What do you mean? Did I do it wrong?"
10026020-118 = "N-No, I'm just surprised. It takes all the strength I have just to drag them..."
10026020-119 = "Oh! Well, don't worry about me. I'm responsible for all the cathedral supplies, so I've built up some muscle!"
10026020-120 = "Ah... Well, as long as you're all right, then I guess it's fine."
10026020-124 = "...Um, Hinata?"
10026020-125 = "Yeah, Ui?"
10026020-126 = "I know what I'm about to say is going to sound strange, but..."
10026020-127 = "I don't see any other way I can do this, and I need you to keep an open mind."
10026020-128 = "Do you think you could do that?"
10026020-129 = "You're not making a whole lot of sense, but...sure."
10026020-130 = "...Thank you, Hinata. What I need is... Well..."
10026020-134 = "Having everyone here... It's so much pressure! I need space. Like...literally two meters at all times..."
10026020-138 = "Wh—"
10026020-139 = "Huh?!"
10026020-141 = "I swear I don't mean anything by it! It's just...my own...weird...idiosyncrasy... Okay?"
10026020-142 = "Anyway... Uh... We can't lug this stuff everywhere we go, so... Why don't we set up a base camp?"
10026020-143 = "There! That looks like a good spot. Follow me, Hinata...at a distance."
10026020-149 = "Two meters."
10026020-154 = "B-B-B-But why, Ui?! Ui!"
10026020-158 = "[ns] \"Don't worry. You two just need some time to adjust.\""
10026020-161 = "[ns9] \"Are you okay, Koharu?\"\n[ns10] \"Sorry you got dragged into all this.\""
10026020-164 = "Well, I'm not exactly thrilled about all this, but I'll be fine. Besides, we have a job to do."
10026020-165 = "I don't really know why we're investigating these ruins, but I do know it's important."
10026020-166 = "So, as a Justice Task Force elite, I'll do whatever I can to help!"
10026020-167 = "Despite being on a deserted island...with nothing but swimsuits...with Hanako..."
10026020-168 = "..."
10026020-169 = "Argh! Death! Execution!"
10026020-170 = "[s] \"Huh?!\""
10026020-171 = "From now on, I'm keeping a close eye on her!"
10026020-172 = "As a Justice Task Force elite, it is my duty to protect the honor of Trinity!"
10026020-173 = "[s] \"...That's great. I'm rooting for you, Koharu.\""
10026020-175 = "And with that, the investigation of the ruins began."

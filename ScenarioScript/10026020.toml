[translation]
10026020-1 = "第2話;好事就是好事"
10026020-2 = "這樣一來……"
10026020-3 = "現在這裡……就成為櫻子同學和憂同學和解的重要場合了。"
10026020-4 = "當然，老師身為經典事件的當事人，自然也必須到場。"
10026020-5 = "……這樣您明白了嗎，老師？"
10026020-6 = "[s] 「…………」"
10026020-8 = "[ns1]「那個，總之，大家的泳裝都很適合哦……」\n[ns2]「……我應該明白什麼？？？」"
10026020-11 = "呵呵……果然還是需要詳細解釋一下才行呢。"
10026020-12 = "這裡是位於三一附近的無人島，而修女會在這裡發現了一座遺跡……"
10026020-13 = "這裡究竟是什麼樣的地方，建造遺跡的目的又是什麼……#n雖然已經進行過數次調查和研究……"
10026020-15 = "然而受遺跡內部的複雜構造，以及連修女會都無法解讀的古代文字影響，#n調查情況相當艱辛，因此已經被擱置了一段時間。"
10026020-17 = "所以我們要借助憂同學優秀的古代文字解讀能力，以及豐富的考古學知識……"
10026020-18 = "調查這座遺跡的真相！#n這樣一來，大家就能皆大歡喜了～♡"
10026020-19 = "……事情就是這樣，老師。#n現在有聽懂了嗎？"
10026020-20 = "[s3]「……原來如此，這就是你們之間的約定嗎？」\n[s4]「好像聽懂了，又好像沒聽懂……」"
10026020-23 = "花，花子同學……為什麼所有人都要穿泳裝呢……？#n既然任務是研究島上的遺跡，有必要統一穿上泳裝嗎……"
10026020-24 = "而且花子同學身上穿的……好像不能說是泳裝吧……"
10026020-26 = "哎呀？日向同學，那種小事不用在意唷♡"
10026020-27 = "那怎麼會是小事！！"
10026020-28 = "小春醬，有什麼問題嗎？"
10026020-29 = "這到底是什麼情況啊！#n突然說要我出動，又說些奇怪的話把我騙到這座奇怪的島上來！"
10026020-30 = "我到底要來這裡做什麼啊？完全搞不懂！！"
10026020-31 = "嗯……因為我一直……對沒能和小春醬一起在夏天到海邊玩感到耿耿於懷……"
10026020-32 = "所以才想趁這個機會，和你一起到海邊來……"
10026020-33 = "果然是找我來玩的嗎！？"
10026020-34 = "不然……就當作我是請你這位實現正義部的菁英來這裡……監視其他人的怎麼樣呢？#n這個點子不錯吧？"
10026020-35 = "不要一臉若無其事地問我「覺得怎麼樣？」好不好！#n雖，雖然我身為實現正義部的菁英，本來就有這樣的義務和使命……！"
10026020-36 = "嗚嗚……可是要穿著泳裝，在這座偏僻的離島上過好幾天什麼的……"
10026020-37 = "……"
10026020-38 = "也許會發生這樣那樣的事……甚至連那種事也……！？"
10026020-40 = "嗯？"
10026020-41 = "那種事我也只在書上看過……#n等等，難，難道花子的目的是那個嗎……！？"
10026020-42 = "死，死刑！！禁止色色！！死刑！！"
10026020-43 = "呵呵，小春醬，我不太明白你在說什麼，可以麻煩你解釋一下嗎？"
10026020-44 = "什麼！？你，你要我解釋什麼！？"
10026020-45 = "你所說的色色的事，具體來說是哪些事呢？可以舉例一下嗎？#n對了，請你親自示範，讓我觀摩學習吧。"
10026020-46 = "你，你那是什麼表情！#n簡直就像性致高昂的變態一樣！"
10026020-47 = "嗯，畢竟是夏天呀。"
10026020-48 = "我，我完全聽不懂其中的關聯。#n別，別過來！不要靠近我！！"
10026020-49 = "小春醬指的是這個吧，嘿咿♡"
10026020-53 = "不要啊啊啊────！老，老師救命！#n嗚嗚，是我錯了，拜託請饒了我……"
10026020-54 = "[ns]「大家看起來都很開心呢。」"
10026020-55 = "究，究竟為什麼……事情會變成這樣……這到底是什麼情況……"
10026020-56 = "我只不過，是想揭發真相而已……#n為什麼會被抓來大太陽底下……"
10026020-57 = "就連衣服也……雖然我的確說過穿什麼都無所謂……#n可，可是……這種衣服……"
10026020-61 = "不……這說不定……是個好機會……？#n只要能……"
10026020-62 = "把修女會……的前身「聖徒會」遺跡的真相查出來，#n找出他們無法反駁的證據的話……"
10026020-63 = "……嗯？你剛才說了什麼嗎，憂同學？#n不……"
10026020-64 = "古．関．前．輩？"
10026020-65 = "噫，噫噫噫噫！不，不要突然冒出來，想嚇死我啊！！"
10026020-66 = "沒，沒什麼……！我只是在自言自語而已！！"
10026020-68 = "總，總之，只要完成任務，一切就能順利落幕了吧？#n畢竟櫻子大人也同意了……"
10026020-69 = "我們一起努力調查吧！#n憂同學一定辦得到的！"
10026020-70 = "日向同學……"
10026020-71 = "是！我相信憂同學一定能做到！#n我也……雖然只能盡棉薄之力……"
10026020-72 = "但我也會陪在你身邊，盡我所能地幫助你的！！"
10026020-73 = "嘎啊啊啊！咳咳，咳咳！！"
10026020-75 = "……憂，憂同學！？#n怎麼會突然這樣，憂同學……！？"
10026020-76 = "夠，夠了！這種天真無邪的氣氛！還有一無所知的開朗！！"
10026020-77 = "我就算是來到這個地方，也還是一心想著要揭發隱藏的真相……！#n可是你……！！"
10026020-79 = "好不自在……靠得太近了……生理上沒辦法……！！"
10026020-80 = "咦，咦咦！？！？生理上沒辦法！？！？"
10026020-81 = "啊，不是，我的意思不是日向同學有什麼問題……#n該怎麼說呢……這是……"
10026020-82 = "……總之，這絕對不是你的錯。#n問題出在我自己身上，請相信我……"
10026020-83 = "哈……呼……"
10026020-84 = "……對不起，日向同學，還有老師……"
10026020-85 = "這件事自始至終都是因我而起……要是當初沒做那種事……"
10026020-86 = "我應該要考慮到你們的立場才對……#n然而卻滿腦子只在意經典，沒有替你們著想。"
10026020-87 = "[s5]「沒關係，之後別再犯同樣的錯誤就行了。」\n[s6]「畢竟每個人都會犯錯。」"
10026020-90 = "沒錯，而且櫻子大人似乎也沒有要追究責任的打算……"
10026020-91 = "就像老師說的一樣，每個人都會犯錯，只要下次改進就行了！"
10026020-92 = "而且我也受過憂同學的幫助……"
10026020-93 = "所以一想到這次終於能報答，我反而覺得很開心！"
10026020-94 = "唔……！咕哈！！"
10026020-95 = "憂同學……！？"
10026020-96 = "[s7]「憂跟日向的向性似乎不太好呢……」\n[s8]「雖然關係好不好又是另一回事了。」"
10026020-99 = "真是有趣的反應呢，我似乎稍微能夠理解……"
10026020-100 = "呼……唉……"
10026020-101 = "好吧……我知道了。#n既然如此……"
10026020-102 = "看在大家的份上……我也會盡可能努力的……這樣行了吧……？"
10026020-103 = "……嗯！謝謝你，憂同學！"
10026020-104 = "拜，拜託你別再這個樣子了……！算我求你了……！！"
10026020-105 = "如，如果想幫忙的話，就先幫我拿些行李吧……！"
10026020-106 = "……咦？"
10026020-107 = "你問這些是什麼？#n嗯……可以當成是「遺跡調查工具」。"
10026020-108 = "畢竟在調查時需要用到很多工具。"
10026020-109 = "例如古語字典、印製拓本的墨水、移除髒污的藥水等等……"
10026020-110 = "那些東西相加起來……比想像中來的更多更重，所以包包才會變成這樣……"
10026020-111 = "唔……"
10026020-112 = "原來如此！那這些就由我來拿吧，憂同學。"
10026020-113 = "嘿咻。"
10026020-115 = "……？"
10026020-116 = "什麼？竟然……單手把它提了起來？"
10026020-117 = "嗯？咦？那個……這樣不行嗎？#n難道需要用什麼特別的拿法……？"
10026020-118 = "沒，沒有，我只是有點驚訝……#n畢竟那些我用雙手都提不起來，只能一路拖著過來……"
10026020-119 = "啊哈，放心交給我吧。#n別看我這樣，我可是教堂物品的管理負責人喔。"
10026020-120 = "這兩件事有關聯嗎……算了……只要你能接受就行了……"
10026020-124 = "……那個，日向同學。"
10026020-125 = "……怎麼了嗎，憂同學！"
10026020-126 = "我想說的是……其實我也認為不應該這樣麻煩日向同學……"
10026020-127 = "可是為了順利進行任務，目前也只能這樣做了。#n還有……我說的話真的就只是字面上的意思，希望你不要過度解讀。"
10026020-128 = "……可以嗎？"
10026020-129 = "咦？你，你指的是……這當然沒問題……"
10026020-130 = "……謝謝你，日向同學。#n那麼……從現在開始……我們……"
10026020-134 = "先保持一點距離吧，不然我會覺得很有壓力……大概2m左右就行了……"
10026020-138 = "……咦？"
10026020-139 = "咦咦！？！？"
10026020-141 = "我真的沒有惡意……就像我之前說的一樣……這完全是我的問題……嗯。"
10026020-142 = "那麼就出發吧……也不能一直提著行李到處走，先找個適當的地方搭建調查營地吧。"
10026020-143 = "調查期間就以那裡為據點……#n日向同學……請跟我來，記得保持距離……"
10026020-149 = "……2m。"
10026020-154 = "憂，憂同學……？#n憂同學，為什麼……！為什麼呢……！"
10026020-158 = "[ns]「看來還需要一點時間……」"
10026020-161 = "[ns9]「小春，你還好嗎？」\n[ns10]「抱歉，把你平白無故地捲了進來。」"
10026020-164 = "我，我是無所謂啦！#n而且聽起來，好像也不只是來這裡玩……"
10026020-165 = "是來調查遺跡的吧？#n雖，雖然我也不太清楚……但這一定是很重要的事吧？"
10026020-166 = "既然如此，我身為實現正義部的菁英，自然有義務幫助你們！#n沒錯，就是這樣！"
10026020-167 = "……不過竟然跑到這種偏僻的無人島……#n大家都還穿著泳裝……再加上花子也在……"
10026020-168 = "……"
10026020-169 = "死刑──！！"
10026020-170 = "[s] 「啊！？」"
10026020-171 = "事情既然已經變成這樣，我一定會好好監視所有人的！"
10026020-172 = "賭上我實現正義部的菁英之名！我一定會守護三一的名譽！"
10026020-173 = "[s]「……加油，小春。」"
10026020-175 = "（就這樣，無人島的遺跡調查開始了）"

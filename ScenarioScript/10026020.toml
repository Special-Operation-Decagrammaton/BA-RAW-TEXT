[translation]
10026020-1 = "ตอนที่ 2;อะไรดีก็ว่าดี"
10026020-2 = "และด้วยเหตุนั้น..."
10026020-3 = "สรุปได้ว่าการพบกันครั้งนี้... คือการพบกันที่มีความหมาย เพื่อให้คุณซากุระโกะกับคุณอุยได้คืนดีกันค่ะ"
10026020-4 = "แน่นอนว่าผู้เกี่ยวข้องจากเหตุการณ์พระคัมภีร์อย่างคุณครูก็ต้องมาอยู่ด้วยค่ะ"
10026020-5 = "...เข้าใจสถานการณ์ใช่ไหมคะคุณครู?"
10026020-6 = "[s] \"............\""
10026020-8 = "[ns1] \"สะ... ใส่ชุดกันสวยดีนะ อืม...\"\n[ns2] \"...???  ให้ครูทำความเข้าใจอะไรนะ...?\""
10026020-11 = "ฮุฮุ... คงต้องอธิบายเพิ่มจริงๆ ด้วยสินะคะ"
10026020-12 = "ที่นี่คือซากปรักหักพังที่ชมรมซิสเตอร์ค้นพบในเกาะที่อยู่ในชายฝั่งทะเลทรีนิตี้..."
10026020-13 = "ที่ผ่านมามีการสำรวจและศึกษาอยู่หลายครั้งว่าที่นี่เป็นสถานที่แบบใด และมันมีไว้เพื่ออะไร"
10026020-15 = "แต่ที่แห่งนี้ก็ถูกปล่อยปละละเลยมาตลอด เพราะตัวอักษรโบราณกับลักษณะของซากปรักหักพังนั้น#nยากที่จะเข้าใจได้ ขนาดที่ว่าชมรมซิสเตอร์ก็ยังตีความไม่ออกค่ะ"
10026020-17 = "เพราะฉะนั้นเราเลยจะใช้ความสามารถในการตีความอักษรโบราณและความรู้ทางโบราณคดีที่เป็นเลิศ#nของคุณอุย..."
10026020-18 = "ในการเปิดเผยตัวตนของที่แห่งนี้กันค่ะ! เราจะได้ปิดจ๊อบนี้กันได้อย่างแฮปปี้เอนดิ้ง~♡"
10026020-19 = "...เรื่องมันก็เป็นอย่างนี้ละค่ะ คุณครู ฉันอธิบายแค่นี้ก็พอเข้าใจแล้วใช่ไหมคะ?"
10026020-20 = "[s3] \"...มีเรื่องแบบนี้กันเองสินะ\"\n[s4] \"ก็เหมือนจะเข้าใจได้อยู่บ้างหรอกนะ...\""
10026020-23 = "คะ... คุณฮานาโกะ... แต่ทำไมต้องให้ทุกคนใส่ชุดว่ายน้ำด้วย... ถึงเราจะมาทำภารกิจศึกษาซากปรัก#nหักพังที่เกาะกัน แต่ก็ไม่เห็นจำเป็นต้องใส่ชุดว่ายน้ำนี่..."
10026020-24 = "แถมชุดของคุณฮานาโกะ... มันดูออกจะแตกต่างจากชุดว่ายน้ำทั่วไปด้วย..."
10026020-26 = "ตายจริง? คุณฮินาตะ เรื่องเล็กน้อยแบบนี้ ปล่อยผ่านไปเถอะนะคะ♡"
10026020-27 = "ไม่เห็นจะเล็กน้อยเลย!!"
10026020-28 = "โคฮารุจัง?"
10026020-29 = "นี่มันอะไรกันเนี่ย! ที่ลากกันออกมาแล้วบอกว่าจะมีปฏิบัติการด่วน สุดท้ายก็ให้มาที่เกาะประหลาดๆ แบบนี้เหรอ!"
10026020-30 = "ทำไมฉันต้องมาด้วยเนี่ย? ไม่เห็นจะเข้าใจเลย!"
10026020-31 = "อืม... แต่โคฮารุจังกับฉันยังไม่ได้ไปเที่ยวทะเลฤดูร้อนด้วยกันเลย... มันก็เลยยังค้างคาใจฉันอยู่น่ะค่ะ "
10026020-32 = "ฉันก็เลยอยากใช้โอกาสนี้พาโคฮารุจังมาเที่ยวด้วยกัน..."
10026020-33 = "ตกลงมาเที่ยวหรอกเหรอเนี่ย?!"
10026020-34 = "หรือให้เป็นการมาสังเกตการณ์ทุกคน... ในฐานะของอีลีทแห่งชมรมทวงความยุติธรรมดีละค่ะ? แบบนั้นอาจจะเข้าท่าก็ได้นะ?"
10026020-35 = "อย่ามาพูดว่า 'เอาแบบนี้ไหมล่ะ?' โดยไม่สะทกสะท้านอะไรเลยสิ! นะ... แน่นอนว่าฉันก็มีภาระหน้าที่#nแบบนั้นในฐานะอีลีทเหมือนกัน...!"
10026020-36 = "เฮ้อ... แต่พอได้มาอยู่เกาะที่อยู่ห่างไกลในชุดว่ายด้วยกันตั้งหลายวันแบบนี้..."
10026020-37 = "..."
10026020-38 = "คงจะมีเรื่องนู้นเรื่องนี้เกิดขึ้นเยอะเลย... ดะ... ดีไม่ดีอาจจะเกิดเรื่องพรรค์นั้นด้วยก็ได้...?! "
10026020-40 = "คะ?"
10026020-41 = "เรื่องแบบนั้นฉันเคยอ่านเจอแต่ในหนังสือ... ฮะ... ฮานาโกะ อย่าบอกนะว่าเธอคิดทำถึงเรื่องนั้นเลย...!"
10026020-42 = "ตะ... ต้องถูกลงโทษ!!  ใครคิดเรื่องลามกอนาจารจะต้องโดนลงโทษ!!"
10026020-43 = "อืม... ฉันไม่เห็นจะเข้าใจเลย โคฮารุจังช่วยบอกฉันหน่อยได้ไหมคะว่าคิดเรื่องอะไรอยู่?"
10026020-44 = "ว่าไงนะ?!  จะ... จะให้ฉันบอกอะไร?!"
10026020-45 = "เรื่องลามกอนาจาร บอกให้เห็นภาพหน่อยได้ไหมคะว่ามันเป็นยังไง? แล้วไหนๆ ก็จะบอกแล้ว ช่วยบอกมาตรงๆ ให้ฉันเอาไปฝึกด้วยได้ไหมคะ?"
10026020-46 = "ทะ... ทำหน้าอะไรของเธอเนี่ย! เหมือนกับพวกโรคจิตที่กำลังตื่นเต้นงั้นแหละ!"
10026020-47 = "อื้อ ก็นี่มันฤดูร้อนนี่คะ"
10026020-48 = "มะ... ไม่เห็นจะเข้าใจเลย ยะ... อย่าเข้ามานะ! ออกไปห่างๆ เลย!!"
10026020-49 = "แบบนี้ใช่ไหมคะ อ๊าา♡"
10026020-53 = "อ๊ายยยย! ชะ... ช่วยด้วย! คุณครู! อ๊ากกก ฉันทำผิดไปแล้ว ยกโทษให้ฉันด้วย..."
10026020-54 = "[ns] \"ทุกคนดูสนุกกันจังเลยนะ\""
10026020-55 = "เดี๋ยวนะ นี่มัน... ทำไมถึงเป็นแบบนี้ไปได้... นี่มันเรื่องอะไรกันเนี่ย..."
10026020-56 = "ฉันก็แค่จะช่วยเปิดเผยความจริงก็เท่านั้น... แต่ทำไมถึงต้องถูกลากมาที่แดดจ้าแบบนี้ด้วย..."
10026020-57 = "แถมชุดก็ยัง... ถึงฉันจะบอกให้เตรียมให้เลยเพราะไม่สนใจเรื่องเสื้อผ้าก็เถอะ แต่แบบนี้มัน..."
10026020-61 = "หรือว่าบางที...? นี่อาจจะเป็นโอกาสดีก็ได้... ถ้าเป็นที่นี่ละก็..."
10026020-62 = "ชมรมซิสเตอร์... กับการเปิดเผยตัวตนที่แท้จริงของร่องรอยอารยธรรมโบราณของสาวก และหลักฐาน#nที่ไม่อาจปฏิเสธได้..."
10026020-63 = "...หืม? พูดว่าอะไรนะคะ? คุณอุย? ไม่สิ..."
10026020-64 = "รุ่นพี่ โค เซ กิ?"
10026020-65 = "ฮะ... เฮือกกก! ยะ... อย่าโผล่มาไม่ให้ซุ่มให้เสียงแบบนี้สิคะ มันตกใจนะคะ!"
10026020-66 = "มะ... ไม่มีอะไรเลยค่ะ! ฉันแค่พูดอะไรของฉันคนเดียวค่ะ!"
10026020-68 = "ตะ... แต่ว่าทุกอย่างมันคลี่คลายได้ด้วยการทำแบบนี้นะคะ! ทางท่านซากุระโกะก็อนุญาตแล้วด้วย..."
10026020-69 = "มาพยายามสำรวจด้วยกันเถอะค่ะ! ถ้ามีคุณอุยอยู่ทั้งคนละก็ เราต้องทำได้แน่นอนค่ะ!"
10026020-70 = "คุณฮินาตะ..."
10026020-71 = "ค่ะ ฉันเชื่อว่าคุณอุยต้องทำได้ค่ะ!"
10026020-72 = "แล้วฉันก็... จะช่วยคุณอุยอยู่ข้างๆ ด้วยคนค่ะ!!"
10026020-73 = "เฮือกกก! แค่ก... แค่ก!!"
10026020-75 = "......!? คะ... คุณอุย? ?  จู่ๆ ก็เป็นอะไรไปคะคุณอุย...!?"
10026020-76 = "พะ... พอที! ทั้งบรรยากาศไร้เดียงสา! และก็ที่มาทำหน้าทำตาสดใสเหมือนไม่รู้เรื่องอะไรเลยน่ะ!!"
10026020-77 = "ฉันนึกว่าจะมาที่นี่กันเพื่อแค่มาแกะร่องรอยเสียอีก...! แต่คุณก็...!!"
10026020-79 = "ทำให้ฉันหนักใจมากเลย... อย่าเข้ามาใกล้นะคะ... ฉันจะไม่ไหวแล้ว...!!"
10026020-80 = "คะ... คะ?!!?  ไม่ไหวแล้ว!?!?"
10026020-81 = "มะ... ไม่ใช่นะ ฉันไม่ได้จะบอกว่าทนคุณฮินาตะไม่ไหว... คือว่า... อึก..."
10026020-82 = "...เอาเถอะค่ะ เอาเป็นว่านี่ไม่ใช่ความผิดของคุณฮินาตะเลยค่ะ มันเป็นปัญหาที่ฉันคนเดียวเลย เชื่อฉันเถอะนะคะ..."
10026020-83 = "แฮ่ก... แฮ่ก... ฮู่ว..."
10026020-84 = "...ขอโทษนะคะ ทั้งคุณฮินาตะ ทั้งคุณครูเลย..."
10026020-85 = "อันที่จริงทั้งหมดนี้เป็นเพราะฉันคนเดียวเลย... ถ้าฉันไม่ไปทำเรื่องอะไรแบบนั้น..."
10026020-86 = "ฉันควรจะนึกถึงทุกๆ คนด้วย แต่พอเห็นพระคัมภีร์ ฉันก็หน้ามืดตามัวจนไม่ทันได้คิดถึงคนอื่นค่ะ"
10026020-87 = "[s5] \"ไม่เป็นไรหรอก แค่ไม่ทำอีกต่อไปก็พอแล้ว\"\n[s6] \"ไม่ว่าใครก็ทำผิดกันได้ทั้งนั้นนะ\""
10026020-90 = "ใช่ค่ะ อีกอย่าง ซิสเตอร์ซากุระโกะก็ไม่ได้ถามหาความรับผิดชอบจากพวกฉันด้วย..."
10026020-91 = "จริงอย่างที่คุณครูว่าละค่ะ ไม่ว่าใครก็ทำผิดพลาดกันได้ทั้งนั้น ไว้ต่อไปต้องระวังให้มากขึ้นนะคะ!"
10026020-92 = "อีกอย่าง ฉันก็เคยได้รับความช่วยเหลือจากคุณอุยมา..."
10026020-93 = "ถ้าคิดว่าครั้งนี้เป็นตาของฉันที่จะได้ช่วยเหลือกลับบ้าง แบบนี้ก็น่าดีใจอยู่นะคะ!"
10026020-94 = "อึ้กกก!!  เฮือกกก...! อึ้ก!!"
10026020-95 = "คุณอุย...!?"
10026020-96 = "[s7] \"...สองคนนี้ดูจะเป็นคนละขั้วกันเลยนะ\"\n[s8] \"ต่อให้จะมีความสัมพันธ์ที่ดีต่อกันก็เถอะ\""
10026020-99 = "ดูทำท่าทำทางเข้าสิ สนุกดีนะคะเนี่ย เหมือนกับรู้อะไรบางอย่างมาเลย..."
10026020-100 = "ฮู่ว... ฮู่ว..."
10026020-101 = "ค่ะ ก็ได้... เข้าใจแล้วค่ะ ไหนๆ ก็เป็นแบบนี้แล้ว..."
10026020-102 = "อย่างน้อยก็เห็นแก่ทุกคนที่นี่... ฉันจะพยายามอย่างสุดความสามารถแล้วกันค่ะ... หวังว่าจะได้นะคะ...?"
10026020-103 = "...ค่ะ! ขอบคุณนะคะคุณอุย!!"
10026020-104 = "ถะ... ถ้างั้นก็หยุดทีเถอะ...! พอได้แล้วละ...!!"
10026020-105 = "ถ้าคิดจะช่วยกันจริงๆ ละก็ มาช่วยขนของตรงนี้ไปเถอะค่ะ...!"
10026020-106 = "...คะ?"
10026020-107 = "สงสัยว่าของพวกนี้คืออะไรงั้นเหรอคะ? อ่า มันคือ... คิดเสียว่ามันเป็น <ชุดสำรวจซากปรักหักพัง> แล้วกันค่ะ"
10026020-108 = "เห็นอย่างนี้ก็เถอะ ฉันมาทำการศึกษานะคะ อุปกรณ์จำเป็นก็เลยเยอะแบบนี้ละค่ะ"
10026020-109 = "ทั้งพจนานุกรมภาษาโบราณ น้ำหมึกสำหรับลอกลาย แล้วก็สารเคมีที่เอาไว้กำจัดสารปนเปื้อน..."
10026020-110 = "พอเอาทุกอย่างที่จำเป็นมา... กระเป๋าก็เลยหนักแบบนี้เลยค่ะ..."
10026020-111 = "อึก..."
10026020-112 = "สุดยอดไปเลยค่ะ! งั้นฉันจะช่วยถืออันนี้ให้นะคะ คุณอุย"
10026020-113 = "ฮึบ!"
10026020-115 = "...?"
10026020-116 = "อะไรน่ะ? นี่คุณ... ถือมือเดียวไหวด้วยเหรอคะ?"
10026020-117 = "หืม? คะ? อ่า... ใช้มือเดียวไม่ได้เหรอคะ? หรือว่ามันต้องขนไปแบบพิเศษนะ..."
10026020-118 = "มะ... ไม่ค่ะ ฉันแค่ตกใจนิดหน่อย... พอดีว่าขนาดฉันใช้สองมือลากมายังไม่ค่อยจะไหวเลย..."
10026020-119 = "อ๋อ ถ้าเป็นเรื่องนั้นไม่ต้องกังวลไปหรอกค่ะ เห็นแบบนี้ฉันก็เป็นผู้ดูแลข้าวของในวิหารนะคะ!!"
10026020-120 = "งั้นก็ได้... ก็นะ... ถ้าเจ้าตัวบอกว่าไม่เป็นไรก็ดีแล้วละ..."
10026020-124 = "...เอ่อ คุณฮินาตะ"
10026020-125 = "...คะ? คุณอุย!"
10026020-126 = "ที่ฉันจะบอกต่อไปนี้... จริงๆ ฉันรู้นะคะว่าฉันไม่ควรทำแบบนี้กับคุณฮินาตะ..."
10026020-127 = "แต่ถ้าจะให้งานเดินแล้วละก็ มันก็ช่วยไม่ได้น่ะค่ะ เพราะงั้น... อย่าคิดในแง่ลบกับสิ่งที่ฉันจะพูดนะคะ ขอให้เข้าใจแค่เนื้อความก็พอ"
10026020-128 = "...ทำให้ได้ใช่ไหมคะ?"
10026020-129 = "คะ? มะ... หมายความว่ายังไง... แต่ก็... ได้อยู่แล้วค่ะ..."
10026020-130 = "...ขอบคุณนะคะ คุณฮินาตะ ถ้างั้นก็... จากนี้ไป... ช่วย..."
10026020-134 = "เดินห่างๆ ฉันหน่อยได้ไหมคะ พอดีฉันรู้สึกกดดันน่ะค่ะ... ขอสักแค่ 2 เมตรก็พอ..."
10026020-138 = "...คะ?"
10026020-139 = "คะ... อะไรนะคะ!?!?"
10026020-141 = "ฉันไม่ได้มีเจตนาไม่ดีนะคะ... ก็อย่างที่บอกไปก่อนหน้า... ว่านี่เป็นปัญหาที่ตัวฉันเองค่ะ ค่ะ..."
10026020-142 = "งั้นฉันรุดหน้าไปก่อนนะคะ... ยังไงเราก็น่าจะแบกสัมภาระติดตัวไปทุกที่ไม่ได้ ก่อนอื่นฉันจะไปหาที่ที่#nเหมาะกับการสร้างค่ายสำรวจดูค่ะ"
10026020-143 = "ย้ายของพวกนั้นไปที่ฐานเถอะค่ะ... คุณฮินาตะ... ช่วยเดินมาแบบเว้นระยะห่างด้วยนะคะ..."
10026020-149 = "2 เมตรนะคะ..."
10026020-154 = "คะ... คุณอุย...?  คุณอุย... ทำไมถึง...! ทำไมกันล่ะ...!"
10026020-158 = "[ns] \"คงต้องใช้เวลาปรับตัวสักพักเลยนะ ทั้งสองคน...\""
10026020-161 = "[ns9] \"แล้วโคฮารุล่ะ เป็นไงบ้าง?\"\n[ns10] \"ขอโทษที่ทำให้ต้องมาพัวพันกับเรื่องแบบนี้นะ\""
10026020-164 = "ไม่... ไม่เห็นเป็นไรเลย! ไม่เป็นไร! ฟังดูแล้วก็ไม่ใช่ว่าจะมาเที่ยวเล่นไปเสียทีเดียวนี่!!"
10026020-165 = "มาสำรวจซากปรักหักพังกันใช่ไหม? ถะ... ถึงฉันจะไม่รู้รายละเอียด... แต่มันคงเป็นงานสำคัญใช่ไหม?"
10026020-166 = "ถ้างั้นอีลีทจากชมรมทวงความยุติธรรมอย่างฉันก็ต้องมาช่วยอยู่แล้ว! ใช่แล้ว ใช่เลย!"
10026020-167 = "...แต่ว่า เราต้องมาสำรวจกันถึงเกาะห่างไกล... ในชุดว่ายน้ำแบบนี้... แถมยังมีฮานาโกะมาด้วย..."
10026020-168 = "..."
10026020-169 = "ลงโทษ!!"
10026020-170 = "[s] \"หืม?!\""
10026020-171 = "ในเมื่อเป็นแบบนี้แล้ว! ฉันจะตั้งใจสอดส่อง!!"
10026020-172 = "เพื่อปกป้องเกียรติของทรีนิตี้! ในฐานะของอีลีทแห่งชมรมทวงความยุติธรรม!!"
10026020-173 = "[s] \"...ครูจะเป็นกำลังใจให้นะ โคฮารุ\""

[translation]
10029005-1 = "บทเริ่มต้น;อีกหนึ่งเมืองแห่งการศึกษา"
10029005-2 = "(ยามบ่ายหลังจากเสร็จงาน คุณครูก็กลับมายังห้องพักผ่อนและนอนลงบนโซฟา)"
10029005-8 = "...โอ๊ะ คุณครู อยู่ที่ห้องพักพอดีเลยสินะ ได้จังหวะพอดีเลย"
10029005-9 = "[s1] \"เอมิ? มีเรื่องอะไรเหรอ?\"\n[s2] \"ได้จังหวะพอดีอะไรเหรอ?\""
10029005-12 = "อื้ม จะให้อธิบายก็ได้อยู่หรอกนะ แต่ว่าให้อธิบายทางโทรศัพท์แบบนี้มันคงจะไม่ได้ประสิทธิภาพสัก#nเท่าไร"
10029005-13 = "ที่ฉันติดต่อมาก็เพราะอยากถามว่าตอนนี้คุณครูสะดวกมาที่มิลเลเนียมหรือเปล่าน่ะ"
10029005-14 = "...หืม?"
10029005-15 = "ต่อให้ไม่ต้องอธิบายทั้งหมด แต่อย่างน้อยก็ขอให้ฉันช่วยอธิบายคร่าวๆ ให้หน่อยงั้นเหรอ?"
10029005-16 = "...ที่คุณครูว่ามามันก็เข้าใจได้ ถ้ามีข้อมูลล่วงหน้าสักหน่อย คุณครูก็น่าจะเตรียมวิธีรับมือเอาไว้ให้ได้#nมากที่สุดละเนอะ"
10029005-17 = "แบบนั้นน่าจะดีกว่านะ งั้นฉันจะเล่าให้ฟังเลยแล้วกัน"
10029005-18 = "ฉันช่วยเหลือผู้ประสบภัยไว้ได้ระหว่างทำงานของชมรมปรากฏการณ์ลี้ลับในการสำรวจพื้นที่รกร้าง#nแถวๆ มิลเลเนียมน่ะ แล้วฉันก็พาทุกๆ คนมาที่มิลเลเนียม"
10029005-19 = "แต่หัวหน้าบอกว่าคนพวกนั้น..."
10029005-20 = "...ไม่น่าจะใช่ 'ชาวเมืองคิโวทอส' น่ะ"

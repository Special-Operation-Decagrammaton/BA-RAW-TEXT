[translation]
10029005-1 = "序幕;另一個學園都市"
10029005-2 = "（某個完成工作後，躺在休息室沙發上休息的午後）"
10029005-8 = "……啊，老師。#n你剛好在休息室啊，看來正是時候呢。"
10029005-9 = "[s1]「英美？怎麼了嗎？」\n[s2]「為什麼這麼說？」"
10029005-12 = "唔嗯……雖然並不是做不到，但是像這樣透過電話說明似乎不太有效率。"
10029005-13 = "今天之所以聯絡，是想問老師現在方不方便來千年一趟。"
10029005-14 = "……嗯？"
10029005-15 = "就算不詳細也沒關係，能不能先簡單說明一下……？"
10029005-16 = "……老師說的對。#n如果沒有一定程度的了解，老師也沒辦法事先做好準備吧。"
10029005-17 = "這樣才更有效率。那麼我這就開始說明。"
10029005-18 = "我在進行特異現象搜查部的工作，也就是調查千年附近廢墟的過程中發現了遇難者。#n所以暫時將他們都帶回了千年。"
10029005-19 = "但是部長說那些人……"
10029005-20 = "……好像不是「奇普托斯的居民」。"

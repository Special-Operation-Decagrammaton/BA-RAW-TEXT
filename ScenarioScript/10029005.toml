[translation]
10029005-1 = "Prologue; Another Academy City"
10029005-2 = "I was done for the day and just settling in on the couch in the lounge."
10029005-8 = "Oh, Sensei. Are you in the lounge? Good timing."
10029005-9 = "[s1] \"Eimi? What's going on?\"\n[s2] \"And why is it good timing?\""
10029005-12 = "Um. There's no time to explain. You need to witness this in person."
10029005-13 = "I was calling to ask you to come to Millennium straight away. If that's all right with you."
10029005-14 = "...Oh?"
10029005-15 = "As long as I don't get into detail, I should have time for a simple explanation?"
10029005-16 = "You're right. If you have some information in advance, you will be better prepared for a variety of scenarios."
10029005-17 = "That would be more efficient. All right, I'll explain."
10029005-18 = "While on a mission for the Super Phenomenon Task Force, I found some strangers unconscious in the Millennium ruins. I took them back to the academy."
10029005-19 = "But according to the President, these people..."
10029005-20 = "She says that they aren't \"people of Kivotos.\""

[translation]
10029005-1 = "#title;프롤로그;또 다른 학원 도시"
10029005-2 = "#na;(업무를 마치고 휴게실로 들어와, 소파에 누워 있던 오후.)"
10029005-3 = "#st;[0,0];instant;1;"

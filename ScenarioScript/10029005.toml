10029005-6 = "#wait;2500"
10029005-7 = "3;통신에이미;01\n#3;a\n#wait;1500"
10029005-8 = "3;통신에이미;02;……오, 선생님. 마침 휴게실인가 보네. 좋은 타이밍이야.\n#3;em;[반응]"
10029005-9 = "[s1] \"에이미? 무슨 일이야?\"\n[s2] \"좋은 타이밍이라니?\""
10029005-10 = "#wait;100"
10029005-11 = "#wait;100"
10029005-12 = "3;통신에이미;99;음. 설명하려면 못 할 건 없지만, 이렇게 통신상으로 설명하는 건 그다지 효율적인 행동이 아닌 것 같아."
10029005-13 = "3;통신에이미;01;선생님만 괜찮다면 지금 밀레니엄으로 와 줄 수 있는지, 그걸 물어보려고 연락한 거거든."
10029005-14 = "3;통신에이미;02;……응?\n#3;em;[?]"
10029005-15 = "3;통신에이미;01;자세한 설명은 아니라도 간단한 설명 정도는 해 줄 수 있지 않냐고?"
10029005-16 = "3;통신에이미;99;……맞는 말이야. 어느 정도의 사전 정보가 있어야 선생님도 최대한 다양한 수를 대비하고 올 수 있겠지."
10029005-17 = "3;통신에이미;01;그쪽이 더 효율적인 것 같으니, 바로 이야기할게."
10029005-18 = "3;통신에이미;02;초현상특무부의 일로 밀레니엄 근처의 폐허를 조사하다 조난자를 구조했어. 그리고 일단 모두 밀레니엄으로 데리고 왔는데."
10029005-19 = "3;통신에이미;99;그런데 부장 말로는, 그 사람들…….\n#3;em;…"
10029005-20 = "3;통신에이미;04;……아무래도 '키보토스의 주민'이 아닌 것 같다고 해.\n#3;closeup"

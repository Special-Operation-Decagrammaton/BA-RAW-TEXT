[translation]
10036080-1 = "Episode 8;The Legendary Thug"
10036080-3 = "Valkyrie Police School students shudder when they think of the arrest that day."
10036080-8 = "The day they lost twelve police cars, two tanks, and took a pile of casualties, all against one single enemy."
10036080-13 = "Her strength and endurance are unrivaled."
10036080-18 = "One of the infamous \"Seven Prisoners,\" \"The Legendary Thug\"..."
10036080-24 = "It's a beautiful night, everyone."
10036080-25 = "A night I've been waiting for, for a long time."
10036080-28 = "Kurihama Akemi...!"
10036080-30 = "Good, you remember."
10036080-31 = "I am Akemi. And greetings to you all."
10036080-32 = "[s] \"(That's...)\""
10036080-33 = "It's been a while, hasn't it?"
10036080-34 = "You have no idea how much I missed you all."
10036080-35 = "And what about yourselves?"
10036080-36 = "You still remember the last time we met, don't you?"
10036080-38 = "Wait..."
10036080-40 = "Don't tell me you've forgotten."
10036080-41 = "You MUST remember tipping off the Valkyrie cops to come and get me."
10036080-42 = "Ever since then, I've been behind bars at the Corrections Bureau."
10036080-43 = "Thinking...about...you."
10036080-44 = "So is everyone ready?"
10036080-46 = "R-Ready? Ready for what?"
10036080-48 = "Oh, I'm about to show you."
10036080-50 = "E-Eeek...!"
10036080-51 = "I-I knew it. You ordered the ambush too, didn't you?"
10036080-53 = "What ambush? What order?"
10036080-60 = "Big Sis!!"
10036080-62 = "Oh, my. What are you all doing here?"
10036080-63 = "Avenging you, of course!"
10036080-64 = "But I'm not with you anymore. I'm just a fugitive now."
10036080-65 = "No, no! You'll always be our Big Sis!"
10036080-66 = "You left us because Valkyrie was after you. You took one for the team!"
10036080-67 = "And then right after you left, the Helmet Gang got you sent to jail... Ugh!"
10036080-68 = "...Ah, you do remember me. And you even tried to avenge me."
10036080-69 = "How sweet!"
10036080-70 = "So good of the professor to arrange this lovely reunion."
10036080-71 = "You hired Professor Smug too?"
10036080-72 = "Big Sis must be the \"her\" the professor was talking about!"
10036080-76 = "[ns] \"('Professor Smug.' Is that...?)\""
10036080-82 = "Sorry to bust in on your \"lovely reunion,\" but we ain't goin' down so easy!"
10036080-83 = "Yeah! Even if you are the \"Legendary Thug,\" you've been rotting in jail this whole time!"
10036080-84 = "Hey, think what takin' her down is gonna do for our street cred!"
10036080-90 = "Ah, that's the spirit."
10036080-91 = "Girls, I appreciate everything you've done for me, but please stay back."
10036080-92 = "Understand, this is personal for me."
10036080-93 = "With Elizabeth in my arms, I will take my revenge on all of these pretenders."
10036080-94 = "Now, you! Prepare to die!"
10036080-97 = "AAAHHH!"
10036080-98 = "D-Don't run! Return fire!"
10036080-102 = "Aaahh! Forget that! Run! Ruuun!"
10036080-114 = "Hime, get down...!"
10036080-123 = "Ugh..."
10036080-124 = "Eeek! Misaki! Are you okay?!"
10036080-126 = "Misaki...!"
10036080-127 = "Tch...! Sensei, we can't just stand here. The kids are in danger."
10036080-128 = "And she's wrecking the stage, too!"
10036080-129 = "[s] Nod."
10036080-130 = "Hey! Party crasher!"
10036080-132 = "Who, me?"
10036080-137 = "Sounds like we have a new target, Elizabeth..."
10036080-138 = "[s] \"(So Elizabeth is the cannon...)\""
10036080-139 = "Now who said that? Come on out."
10036080-141 = "Me. Right here."
10036080-142 = "People are here to have a good time, and I'm not going to let you ruin it. Walk away."
10036080-143 = "Oho, you are adorable."
10036080-144 = "What makes you think I need your permission?"
10036080-145 = "Besides, I can't walk away now. After I came all this way for some bloody havoc?"
10036080-146 = "But if you still think you can stop me..."
10036080-147 = "...then I'll show you why you shouldn't have tried."

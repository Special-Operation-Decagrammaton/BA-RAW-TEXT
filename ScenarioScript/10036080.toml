[translation]
10036080-1 = "ตอนที่ 8;แยงกี้สาวในตำนาน"
10036080-3 = "ถ้าให้นึกถึงปฏิบัติการจับกุมที่เคยเกิดขึ้นเมื่อไม่นานมานี้ เหล่านักเรียนจากสถาบันฝึกตำรวจวัลคิรี่#nก็ตัวสั่นกันทุกครั้งค่ะ"
10036080-8 = "นั่นเป็นเพราะวันนั้นโรงเรียนต้องสูญเสียรถตำรวจไป 12 คัน รถถัง 2 คัน และมีผู้ได้รับบาดเจ็บมากมาย#nจากเป้าหมายจับกุมเพียงแค่ 'คนเดียว' เท่านั้น"
10036080-13 = "กำลังวังชาและความถึกทนของเธอผู้นั้นไม่มีใครเทียบเทียมได้"
10036080-18 = "เธอคือ 'แยงกี้สาวในตำนาน' ที่เป็นหนึ่งใน 'เจ็ดอาชญากร'"
10036080-24 = "ช่างเป็นค่ำคืนที่สวยงามจริงๆ นะคะทุกคน"
10036080-25 = "แล้วก็เป็นค่ำคืนที่ดิฉันรอคอยมานานด้วยค่ะ"
10036080-28 = "คุริฮามะ อาเคมิ...!"
10036080-30 = "ค่ะ น่าดีใจจังเลยนะคะที่ยังจำกันได้"
10036080-31 = "ขอกล่าวทักทายทุกคนนะคะ ดิฉัน อาเคมิค่ะ"
10036080-32 = "[s] (เธอคนนั้นคือ...?)"
10036080-33 = "ไม่ได้เจอกันนานเลยนะคะ นานโขเลยละ"
10036080-34 = "ดิฉันอยากเจอพวกคุณจนร้อนรุ่มใจไปหมดเลยค่ะ"
10036080-35 = "แล้วพวกคุณล่ะคะ เป็นยังไงกันบ้าง?"
10036080-36 = "พวกคุณจะจดจำช่วงเวลาสุดท้ายที่เราเจอกันใช่มั้ยคะ?"
10036080-38 = "...!"
10036080-40 = "ถ้าไม่ใช่อย่างนั้นก็แย่เลยนะคะ"
10036080-41 = "เพราะการแอบแจ้งข่าวของพวกคุณ ทำให้พวกนกกระจอกวัลคิรี่รู้ตำแหน่งของดิฉันยังไงล่ะคะ"
10036080-42 = "ทำเอาดิฉันต้องไปอยู่ในห้องขังของสำนักควบคุมอยู่นานเลยละค่ะ"
10036080-43 = "ตอนอยู่ที่นั่น ดิฉันคิดถึงพวกคุณทุกลมหายใจเข้าออกเลยละ"
10036080-44 = "เอาละ พร้อมกันแล้วหรือยังคะ?"
10036080-46 = "พะ... พร้อมเหรอ?! พร้อมทำอะไร?!"
10036080-48 = "ก็พร้อมที่จะ... โดนฉันเล่นด้วยจนสาหัสยังไงล่ะคะ"
10036080-50 = "ฮะ... เฮือก...!"
10036080-51 = "ธะ... เธอคนที่สั่งให้พวกแยงกี้มาโจมตีพวกเราสินะ!"
10036080-53 = "คะ? ใครสั่งใครให้ทำอะไรนะคะ?"
10036080-60 = "ลูกพี่ใหญ่!!!!!"
10036080-62 = "อุ๊ย? ทำไมทุกคนถึงมาอยู่กันที่นี่...?"
10036080-63 = "พวกเราก็มาเพื่อแก้แค้นให้ลูกพี่ใหญ่น่ะสิคะ!"
10036080-64 = "แต่ตอนนี้ดิฉันไม่ใช่ทีมเดียวกับพวกคุณแล้วนะคะ... ดิฉันเป็นแค่นักโทษแหกคุก..."
10036080-65 = "ไม่ค่ะ! ลูกพี่ใหญ่จะยังเป็นลูกพี่ใหญ่ของพวกเราเสมอค่ะ!"
10036080-66 = "พอเราถูกวัลคิรี่หมายหัว ลูกพี่ใหญ่ก็ลาออกจากกลุ่มเราไปเพื่อจะปกป้องพวกเราไม่ใช่เหรอคะ...!"
10036080-67 = "และเมื่อจากพวกเราไป ลูกพี่ใหญ่ก็ไปตกหลุมพรางของพวกแก๊งหมวกกันน็อก จนต้องไปใช้ชีวิตใน#nห้องขังหนาวๆ ของสำนักควบคุม... ฮือ!"
10036080-68 = "ตายจริง... ทุกคนยังไม่ลืมดิฉันสินะคะ แล้วยังคิดที่จะแก้แค้นให้ด้วยอีก..."
10036080-69 = "ดิฉันประทับใจมากเลยค่ะ...!"
10036080-70 = "ไปว่าจ้างศาสตราจารย์จนเราได้มาเจอกันอย่างนี้นี่เองสินะคะ น่าอบอุ่นหัวใจที่สุด!"
10036080-71 = "ลูกพี่ใหญ่ก็ไปว่าจ้างศาสตราจารย์ยิ้มหวานเพื่อจะแก้แค้นเหมือนกันเหรอคะ?!"
10036080-72 = "หรือว่า <เธอผู้นั้น> ที่ศาสตราจารย์พูดถึง... ก็คือลูกพี่ใหญ่...!"
10036080-76 = "[ns] (ศาสตราจารย์ยิ้มหวาน... ชื่อนี้มัน...)"
10036080-82 = "ขอโทษที่ขัดจังหวะนะ กำลังซึ้งกันแท้ๆ แต่พวกเราไม่คิดจะถูกเล่นงานง่ายๆ หรอกนะ!"
10036080-83 = "ใช่! ถึงเธอจะเป็น 'แยงกี้สาวในตำนาน' แต่เธอก็เพิ่งแหกคุกออกมาได้ไม่นาน!"
10036080-84 = "นี่เป็นโอกาสทองของแก๊งหมวกกันน็อกที่จะจับกุมเธอต่างหาก"
10036080-90 = "ค่ะ ก็ดีค่ะ ต้องแบบนี้สิคะ"
10036080-91 = "อ้อ จริงสิ ดิฉันก็ซาบซึ้งที่ทุกคนออกโรงเพื่อดิฉันนะคะ"
10036080-92 = "แต่ดิฉันอยากแก้แค้นครั้งนี้ให้สำเร็จด้วยมือของดิฉันเองค่ะ ได้โปรดเข้าใจด้วยนะคะ"
10036080-93 = "แค้นนี้ต้องชำระ และดิฉันกับเอลิซาเบธจะเป็นคนชำระแค้นเองค่ะ"
10036080-94 = "เอาละ! เตรียมตัวให้ดีนะคะ!"
10036080-97 = "ว้ากกกก!"
10036080-98 = "ยะ... อย่าหนีนะ! สู้กลับเลย!"
10036080-102 = "เหวออออออ! ไม่เอาดีกว่า! ขอถอนคำพูด! หนีเร็ว! หนี!"
10036080-114 = "องค์หญิง หมอบไว้...!"
10036080-123 = "อึก..."
10036080-124 = "เฮือก! คุณมิซากิ! เป็นอะไรหรือเปล่าคะ?!"
10036080-126 = "มิซากิ...!"
10036080-127 = "ชิ...! ฉันอยู่เฉยแบบนี้ไม่ได้แล้วละ ครู ทุกคนกำลังตกอยู่ในอันตราย"
10036080-128 = "เวทีก็ระเนระนาดไปแล้วด้วย...!"
10036080-129 = "[s] พยักหน้า"
10036080-130 = "นี่! คนที่บุกรุกเข้ามาน่ะ!"
10036080-132 = "คะ? หมายถึงดิฉันเหรอคะ?"
10036080-137 = "อุ๊ยตาย! เอลิซาเบธ!"
10036080-138 = "[s] (ชื่อเครื่องยิงระเบิดจรวดเหรอ...)"
10036080-139 = "ใครคือคนโหดร้ายคนนั้นกันคะ?!"
10036080-141 = "ฉันเอง"
10036080-142 = "กลับไปเดี๋ยวนี้ ฉันไม่อนุญาตให้ใครมาทำลายงานเทศกาลไปมากกว่านี้แล้ว"
10036080-143 = "ฮุฮุฮุ มาต่อต้านดิฉันสินะคะ น่ารักกระจุ๋มกระจิ๋มเสียจริง"
10036080-144 = "คุณเป็นใครเหรอคะ ถึงคิดว่าจะมาอนุญาตหรือไม่อนุญาตให้ดิฉันทำอะไรได้?"
10036080-145 = "ไม่ว่าคุณจะว่าอย่างไร ดิฉันก็ถอยให้ไม่ได้หรอกค่ะ ตราบใดที่ดิฉันมาถึงที่นี่แล้ว ดิฉันก็จะแก้แค้นกลับ#nไปให้จงได้!"
10036080-146 = "แต่ถ้าคุณจะยังขัดขวางกันต่อละก็...!"
10036080-147 = "ดิฉันจะทำให้เห็นถึงความแตกต่างของพละกำลังที่จะทำให้คุณรู้ว่าการกระทำของคุณมันไม่มี#nความหมายอะไรเลยตั้งแต่แรกค่ะ!"

[translation]
10036080-1 = "第8話;傳說的太妹"
10036080-3 = "回想起那一次的逮捕行動，女武神警察學園的學生們總是會忍不住發抖。"
10036080-8 = "損失了12輛警車與2輛戰車，出現了多名傷者……而敵人卻只有「一個人」。"
10036080-13 = "其力量與耐力無人能及。"
10036080-18 = "惡名昭彰的「七罪人」之一，「傳說的太妹」──"
10036080-24 = "真是個美麗的夜晚呢，各位。"
10036080-25 = "同時也是我等待已久的夜晚。"
10036080-28 = "栗浜明美……！"
10036080-30 = "是的，很高興各位還記得我。"
10036080-31 = "小女子明美，在此向各位問好。"
10036080-32 = "[s]（那個樣子是……？）"
10036080-33 = "好久不見……真是好久不見了。"
10036080-34 = "這段時間我有多想念各位，你們肯定不知道吧。"
10036080-35 = "各位又是如何呢？"
10036080-36 = "想必都還記得我們最後一次見面的時候吧？"
10036080-38 = "……！"
10036080-40 = "如果不記得的話，小女子可是會很傷腦筋的。"
10036080-41 = "都是因為你們去通風報信，女武神的麻雀們才會知道我在哪裡。"
10036080-42 = "在我身處矯正局監獄的漫長時光裡……"
10036080-43 = "隨．時．都．思．念．著．各．位。"
10036080-44 = "那麼，各位都準備好了嗎？"
10036080-46 = "準，準備！？什麼準備！？"
10036080-48 = "那當然……是被我打得粉碎的準備囉。"
10036080-50 = "噫，噫噫……！"
10036080-51 = "果，果然是你指使那些太妹襲擊我們的！"
10036080-53 = "嗯？你說我指使了什麼人？"
10036080-60 = "大姐頭！！！！！"
10036080-62 = "哎呀？各位怎麼會在這裡呢……？"
10036080-63 = "當然是為了給大姐頭報仇啦！"
10036080-64 = "但如今小女子已經不再是你們的同伴……只是一介逃犯而已……"
10036080-65 = "不！大姐頭永遠是我們的大姐頭！"
10036080-66 = "您是因為發覺自己已經被女武神盯上……為了保護我們才會退出的吧……！"
10036080-67 = "沒想到才剛離開就被頭盔團的陷阱謀害，被關進了矯正局的冰冷監牢……嗚嗚！"
10036080-68 = "你們……真不敢相信。#n各位不但沒有忘記小女子，還想著要為我復仇……"
10036080-69 = "小女子真的很感動……！"
10036080-70 = "想不到委託教授，竟然能造就如此溫暖的重逢！"
10036080-71 = "大姐頭也委託了那個笑咪咪教授嗎！？"
10036080-72 = "沒想到教授提到的「她」竟然會是大姐頭……！"
10036080-76 = "[ns]（笑咪咪教授？這個名字我記得……）"
10036080-82 = "抱歉打擾你們感人的重逢！但我們可不打算乖乖挨打啊！"
10036080-83 = "沒錯！就算你是「傳說的太妹」也才剛逃獄出來而已！"
10036080-84 = "這反而是提升頭盔團聲望的大好機會！"
10036080-90 = "嗯，很好，這樣就對了。"
10036080-91 = "各位，雖然很感謝你們為小女子打抱不平的心意……"
10036080-92 = "但這場復仇，我希望能由我親自了結。#n還請你們諒解。"
10036080-93 = "這是屬於我的復仇──就由我和伊莉莎白來對付他們。"
10036080-94 = "覺悟吧！"
10036080-97 = "哇啊啊啊啊！"
10036080-98 = "不，不准逃！快反擊！"
10036080-102 = "呀啊啊啊啊啊啊！撤退！快逃！快逃啊！"
10036080-114 = "公主，快趴下……！"
10036080-123 = "唔……"
10036080-124 = "噫噫噫！美咲同學！你沒事吧！？"
10036080-126 = "美咲……！"
10036080-127 = "嘖……！老師，不能再袖手旁觀了。孩子們有危險。"
10036080-128 = "而且連舞台也被弄得一團糟了……！"
10036080-129 = "[s] 點頭"
10036080-130 = "喂！那邊的入侵者！"
10036080-132 = "嗯？是在說小女子嗎？"
10036080-137 = "哎呀！伊莉莎白！"
10036080-138 = "[s]（是那隻火箭發射器的名字嗎……）"
10036080-139 = "是哪個無禮之人！？"
10036080-141 = "是我。"
10036080-142 = "趕緊離開吧。#n我不允許你繼續破壞這場慶典。"
10036080-143 = "唔呵呵，真是不痛不癢的反抗。"
10036080-144 = "請問你又是哪位，竟敢對我說允不允許？"
10036080-145 = "無論你怎麼說，小女子都絕不會退讓。#n既然已經來到這裡，我一定要完成復仇！"
10036080-146 = "如果你還是執意要阻撓我的話……！"
10036080-147 = "小女子就讓你認清力量的差距，#n讓你明白你的行為自始至終都是徒勞吧！"

[translation]
1012703-1 = "จุดเริ่มต้นของนักเขียน"
1012703-2 = "ย่านพลุกพล่าน"
1012703-3 = "(วันรุ่งขึ้น คุณครูไปทำงานที่ไวลด์ฮันต์แต่เช้าตรู่ และหลังจะทำงานเสร็จ)"
1012703-4 = "[ns] \"หมู่นี้มีเรื่องให้มาไวลด์ฮันต์บ่อยจังเลย...\""
1012703-5 = "(ในขณะที่เพิ่งกลับมาถึงเขตชิราโทริ)"
1012703-6 = "หืม? คุณครู?"
1012703-9 = "สะ... สวัสดีค่ะ..."
1012703-10 = "[s] \"มิโยะ? มาทำอะไรที่นี่น่ะ?\""
1012703-11 = "คะ... คือว่า..."
1012703-12 = "ฉันได้รับข้อเสนอตีพิมพ์นิยายจากสำนักพิมพ์ ก็เลยได้รับอนุญาตให้ออกมาคุยธุรกิจได้น่ะค่ะ..."
1012703-13 = "[s] \"ตีพิมพ์นิยายเหรอ?!\""
1012703-14 = "ค่ะ ฉันส่งต้นฉบับนิยายโรแมนติกที่เขียนที่ชาเล่ต์เมื่อวันก่อนให้หลายสำนักพิมพ์ไป..."
1012703-15 = "แล้วหนึ่งในนั้นก็ติดต่อมาบอกว่าอยากตีพิมพ์นิยายของฉันค่ะ"
1012703-16 = "[s1] \"ว่าที่นักเขียนนิยายรักโรแมนติกคนดังสินะ!\"\n[s2] \"ในที่สุดก็มีคนเห็นออร่าของนักเขียนมิโยะแล้ว!\""
1012703-19 = "ฉะ... ฉันยังไม่ได้เซ็นสัญญาเลย อย่าเพิ่งชมกันขนาดนั้นเลยค่ะ...!"
1012703-20 = "แล้วฉันจะไปคุยธุรกิจกี่โมงน่ะเหรอคะ?"
1012703-21 = "อีกสัก 20 นาที... เอ่อ ตอนบ่าย 2 น่ะค่ะ"
1012703-22 = "คะ...? คุณครูก็จะไปด้วยงั้นเหรอคะ?"
1012703-23 = "เอ่อ... คุณครูไม่ต้องลำบากเพราะฉันก็ได้..."
1012703-24 = "แต่ถึงยังไง การมีคนมาช่วยตรวจสอบหนังสือสัญญาก็น่าจะดีกว่า... เหรอคะ?"
1012703-28 = "ถะ... ถ้างั้นก็..."
1012703-29 = "ฉันต้องรบกวนด้วยนะคะ คุณครู"
1012703-31 = "(จากนั้นคุณครูก็เดินทางไปที่สำนักพิมพ์กับมิโยะ)"
1012703-33 = "ห้องประชุม สำนักพิมพ์"
1012703-34 = "เชิญเลยครับ คุณนักเขียน ยินดีต้อนรับครับ"
1012703-35 = "ว่าแต่คุณครูของชาเล่ต์มีธุระอะไรที่นี่..."
1012703-36 = "[s] \"มาสังเกตการณ์การเซ็นสัญญาตีพิมพ์ของนักเรียนน่ะ\""
1012703-37 = "อ่า... อย่างนี้สินะ แต่เรื่องสัญญาไม่มีอะไรให้กังวลมากหรอกครับ"
1012703-38 = "เอาละ งั้นก็มาเริ่มกันเลยครับ ก่อนจะไปดูหนังสือสัญญา ผมขออธิบายจุดยืนของสำนักพิมพ์#nก่อนนะครับ"
1012703-39 = "อย่างที่ทราบกันดีว่าการตีพิมพ์หนังสือเป็นงานที่มีค่าใช้จ่ายสูงมาก"
1012703-40 = "นอกจากค่าใช้จ่ายในการพิมพ์แล้ว ยังมีค่าพิสูจน์อักษร ออกแบบรูปเล่ม แล้วก็การตลาดด้วยครับ"
1012703-41 = "นอกจากนี้ถ้าหนังสือที่พิมพ์ไปขายไม่หมด ก็ต้องเสียค่าใช้จ่ายจำนวนมากในการเก็บรักษาหนังสือ#nที่เหลือด้วย พอเข้าใจมั้ยครับ?"
1012703-42 = "ระ... เรื่องนั้นฉันก็พอรู้อยู่บ้างค่ะ ว่าแต่ทำไมถึง..."
1012703-43 = "ผมอยากอธิบายให้เข้าใจว่าการตีพิมพ์หนังสือของคุณนักเขียนเป็นงานที่มีความเสี่ยงสูงมากน่ะครับ"
1012703-44 = "[s] \"แต่ทางสำนักพิมพ์ต้องเป็นผู้รับผิดชอบเรื่องการพิมพ์สิ...\""
1012703-45 = "ก็เพราะอย่างนั้นละครับ! ทางเราก็เลยมีข้อเสนอบางอย่างให้กับคุณนักเขียน!"
1012703-46 = "นั่นก็คือ... ให้คุณนักเขียนร่วมลงทุนในการตีพิมพ์หนังสือนิยายของตัวเองยังไงล่ะครับ!"
1012703-47 = "...?"
1012703-48 = "ไม่ต้องหนักใจไปหรอกนะครับ คุณนักเขียนรับผิดชอบเฉพาะค่าใช้จ่ายในการพิมพ์กับพิสูจน์อักษร แล้วก็ค่าออกแบบรูปเล่มกับการตลาดก็พอครับ!"
1012703-49 = "ส่วนที่เหลือทางเราจะจัดการให้เอง!"
1012703-50 = "[s] \"เดี๋ยวนะ นี่เหมือนมิโยะต้องรับผิดชอบเองทั้งหมดเลย...\""
1012703-51 = "อย่างนี้เองสินะคะ...!"
1012703-52 = "[s] \"มิโยะ...? \""
1012703-53 = "แต่ไม่ได้มีแค่นี้ใช่มั้ยคะ?"
1012703-54 = "ครับ?"
1012703-55 = "พอหนังสือถูกตีพิมพ์แล้ว ฉันต้องซื้อเองประมาณ 500 เล่มเพื่อแผนการตลาดใช่มั้ยล่ะคะ? ก็เราต้องอยู่ในอันดับหนังสือขายดีให้ได้นี่คะ ฉันเข้าใจถูกมั้ยคะ?"
1012703-56 = "เฮือก...! รู้งานในวงการนี้ดีเลยนะครับ!"
1012703-57 = "และเพื่อพัฒนาคุณภาพงานเขียนในอนาคต ฉันก็ต้องซื้อคอร์สเขียนนิยายของทางสำนักพิมพ์ด้วย ใช่มั้ยคะ?"
1012703-58 = "ใช่เลยครับ! รู้มาหมดแล้วนะครับเนี่ย!"
1012703-59 = "ค่ะ จะไม่รู้ได้ยังไงล่ะคะ"
1012703-60 = "ก็นี่มันวิธีของมิจฉาชีพนี่คะ..."
1012703-64 = "ฉะ... ฉีกหนังสือสัญญาเลยเหรอ...!"
1012703-65 = "ไปค่ะ คุณครู เราไม่มีธุระอะไรที่นี่แล้วค่ะ"
1012703-72 = "สวนสาธารณะใกล้ๆ"
1012703-73 = "ฮู่ว..."
1012703-74 = "อย่าทำหน้าแบบนั้นสิคะ คุณครู ฉันไม่เป็นไรค่ะ"
1012703-75 = "คะ? ฉันมองออกได้ยังไงว่าเป็นสำนักพิมพ์มิจฉาชีพน่ะเหรอคะ?"
1012703-76 = "ง่ายมากค่ะ ฉันลองคิดว่าตัวเองเป็นมิจฉาชีพแล้วเอาตัวเองเข้าไปอยู่ในสถานการณ์นั้น แค่นี้ฉันก็นึก#nกลโกงของพวกนั้นได้อย่างเป็นธรรมชาติเลยค่ะ เหมือนเวลาคิดหาวิธีลักลอบขนส่งสินค้านั่นละค่ะ"
1012703-77 = "ฉันก็เลย..."
1012703-78 = "ฮือ..."
1012703-79 = "[s] \"มิโยะ?!\""
1012703-80 = "ทำไมฉันเจอแต่เรื่องแบบนี้กันนะ หรือพรสวรรค์ของฉันคือดึงดูดพวกมิจจี้?"
1012703-81 = "อุตส่าห์ทุ่มเทกับสิ่งที่รักแล้วแท้ๆ แต่กลับไม่เห็นวี่แววว่าจะมีพรสวรรค์เลยสักนิด..."
1012703-82 = "พรสวรรค์อย่างเดียวที่ฉันมีก็คือการทำเรื่องผิดกฎโรงเรียน แล้วฉันก็ไม่ได้อยากมีพรสวรรค์แบบนั้น#nสักนิด..."
1012703-83 = "งั้นฉันคงหมดหวังจะได้เป็นนักเขียนนิยายโรแมนติกมืออาชีพแล้วใช่มั้ยคะ...?"
1012703-84 = "[s] \"เรื่องนั้นครูไม่รู้หรอก\""
1012703-88 = "ช่างเป็นคำปลอบใจที่ดีจังเลยนะคะ..."
1012703-89 = "[s] \"แต่อย่างน้อยมิโยะก็ไม่ได้ไปในทางที่ผิดหรอกนะ\""
1012703-93 = "[ns] \"เพราะมิโยะรู้ดีกว่าใครว่าทางที่ผิดคือทางไหนไง\""
1012703-94 = "..."
1012703-95 = "การค้นหาเส้นทางที่ถูกต้องเป็นเรื่องสำคัญ... แต่การหลีกเลี่ยงเส้นทางที่ผิดก็สำคัญไม่แพ้กัน..."
1012703-96 = "นั่นสิคะ ถ้าฉันไม่มีพรสวรรค์แบบนี้ ฉันก็คงตกเป็นเหยื่อของกลโกงแบบที่เจอเมื่อสักครู่ไปแล้วค่ะ"
1012703-97 = "งั้นพรสวรรค์แบบนี้ก็ไม่ได้แย่เท่าไรนะคะ"
1012703-98 = "ถึงจะยังไม่ชอบอยู่ดีก็เถอะ..."
1012703-99 = "[s3] \"ปากบอกว่าไม่ชอบ แต่ลักลอบส่งของจนได้เงินเยอะเลยนี่...\"\n[s4] \"ได้ข่าวว่าเพิ่งซื้อเครื่องพิมพ์ดีดใหม่เลยไม่ใช่เหรอ?\""
1012703-104 = "งะ... เงียบๆ เถอะค่ะ!"
1012703-106 = "(จากนั้นคุณครูก็คุยกับมิโยะในสวนสาธารณะสักพักแล้วเดินทางกลับ)"

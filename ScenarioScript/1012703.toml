1012703-57 = "3;출판사 직원;04\n5;미요;03;그리고 차후에 출간할 책의 퀄리티를 상승시키기 위해, 당사에서 제공하는 유료 글쓰기 강의도 수강해야 할 거고요, 맞죠?\n#5;m3\n#3;dl"

[translation]
1012703-1 = "作家的門檻"
1012703-2 = "繁華街"
1012703-3 = "（隔天一早就因為工作去了一趟狂獵。而在回程的路上……）"
1012703-4 = "[ns]「最近常常跑到狂獵去呢……」"
1012703-5 = "（就在剛回到白鳥區的時候）"
1012703-6 = "咦？老師？"
1012703-9 = "你，你好……"
1012703-10 = "[s]「美代？你怎麼會在這裡？」"
1012703-11 = "那，那個……"
1012703-12 = "因為收到出版社的出書提案，所以就以業務會議的理由申請了外出許可……"
1012703-13 = "[s]「出書提案！？」"
1012703-14 = "是的。我把之前在夏萊寫的戀愛小說的原稿，寄給了幾間出版社……"
1012703-15 = "結果其中一間表示想出版，並提出了一些意見。"
1012703-16 = "[s1]「原來那是戀愛小說啊……」\n[s2]「看來作家美代的作品終於要亮相了呢！」"
1012703-19 = "都，都還沒有簽約呢，請不要太捧我……！"
1012703-20 = "會議幾點開始，是嗎？"
1012703-21 = "在二十分鐘之後……也就是下午兩點。"
1012703-22 = "……咦？老師也要一起去？"
1012703-23 = "沒，沒關係的……老師不必特地為了我……"
1012703-24 = "有人能一起檢視合約的內容比較好……是嗎？"
1012703-28 = "那，那麼……"
1012703-29 = "就拜託你了，老師。"
1012703-31 = "（就這樣和美代一起前往了出版社）"
1012703-33 = "出版社會議室"
1012703-34 = "歡迎光臨，作家小姐。請進。"
1012703-35 = "話說為何連夏萊的老師也……？"
1012703-36 = "[s]「聽說我的學生要簽出版合約，所以就過來旁聽了。」"
1012703-37 = "這，這樣啊……我想應該沒什麼問題。"
1012703-38 = "那麼我們就開始吧。#n在檢視合約內容之前，我想先說明我們的立場。"
1012703-39 = "誠如兩位所知，出版書籍是一項成本相當高的工作。"
1012703-40 = "除了基本的印刷費用之外，編輯、設計和行銷需要的金額也非常可觀。"
1012703-41 = "假如印出來的書賣不完的話，還必須支付高昂的倉儲費用來處理庫存……#n目前為止都能夠理解嗎？"
1012703-42 = "這，這些我都清楚，不過為什麼要跟我說這些……"
1012703-43 = "我們只是希望您能夠明白……出版您的書籍必須承擔相當大的風險而已。"
1012703-44 = "[s]「不過這本來就是出版社應該負的責任吧……」"
1012703-45 = "正因如此！我們不得不向您提出一個建議！"
1012703-46 = "那就是……您也要一起投資這本書的出版！"
1012703-47 = "……？"
1012703-48 = "其實負擔並不會很大。#n您只要負擔印刷、編輯，還有設計跟行銷的費用就好！"
1012703-49 = "其他事情我們會全權處理！"
1012703-50 = "[s]「那不就幾乎都是美代在付錢了嗎……」"
1012703-51 = "原來如此……！"
1012703-52 = "[s]「美代……？」"
1012703-53 = "不過，應該還不只這些吧？"
1012703-54 = "咦？"
1012703-55 = "在書籍出版之後……#n為了達成銷售排行榜前幾名的行銷目標，我還得自己買個五百本左右對吧？"
1012703-56 = "是，是的……！原來您都知道啊！"
1012703-57 = "為了提升將來出版書籍的品質，我是不是還必須參加貴公司提供的付費寫作課程？"
1012703-58 = "沒錯！您瞭解得真清楚呢！"
1012703-59 = "是啊，我當然清楚。"
1012703-60 = "……詐騙的套路也就那幾招而已。"
1012703-64 = "合，合約被……！"
1012703-65 = "我們走吧，老師。#n這裡沒什麼好看的了。"
1012703-72 = "附近的公園"
1012703-73 = "呼……"
1012703-74 = "請不要露出那種表情，老師。我沒事的。"
1012703-75 = "咦？問我是怎麼看穿詐騙手法的？"
1012703-76 = "很簡單。只要把自己當成詐騙犯，嘗試站在他們的立場思考……#n犯罪手法就會自然而然地浮現在腦海中。就像構思走私手法的時候一樣。"
1012703-77 = "所以……"
1012703-78 = "……嗚嗚。"
1012703-79 = "[s]「美代！？」"
1012703-80 = "為什麼我會是個這樣的人呢。"
1012703-81 = "在真正喜歡並付出努力的事情上毫無天賦……"
1012703-82 = "卻擁有自己一點也不想要的犯罪才能……"
1012703-83 = "看來……我果然不可能成為真正的戀愛小說家吧？"
1012703-84 = "[s]「這個我也無法斷定。」"
1012703-88 = "……老師真會安慰人呢。"
1012703-89 = "[s]「不過，至少你不會走上錯誤的道路。」"
1012703-93 = "[ns]「因為你比任何人都清楚哪條路是錯誤的。」"
1012703-94 = "……"
1012703-95 = "避開錯誤的路，就跟找到正確的路一樣重要……"
1012703-96 = "這麼說也有道理。#n假如我沒有這種才能的話，剛才恐怕就會受騙上當了吧。"
1012703-97 = "從這個角度來看，這種才能也不是完全沒用呢。"
1012703-98 = "……雖然還是很討厭就是了。"
1012703-99 = "[s3]「可是討厭歸討厭，你前陣子……」\n[s4]「不也是用走私賺來的錢買了新的打字機嗎？」"
1012703-104 = "請，請不要提這件事！"
1012703-106 = "（之後又跟美代在公園聊了一會才回去）"

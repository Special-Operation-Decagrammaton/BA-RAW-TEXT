1012703-11 = "3;미요;02;그, 그게…….\n#3;em;…"
1012703-12 = "3;미요;08;출판사로부터 출간 제의를 받게 되어서, 업무 미팅 사유로 외출 허가를 받았어요……."
1012703-13 = "[s] \"출간 제의?!\""
1012703-14 = "3;미요;07;예. 제가 저번에 샬레에서 쓴 로맨스 소설 원고를 여러 출판사에 보냈는데……"
1012703-15 = "3;미요;08;그 중 한 곳에서 출간하고 싶다고 의견을 타진해 와서요.\n#3;em;[음표]"
1012703-16 = "[s1] \"그거 로맨스였구나…….\"\n[s2] \"어쨌든 드디어 미요 작가님의 글이 빛을 보는군요!\""
1012703-17 = "#wait;10"
1012703-18 = "#wait;10"
1012703-19 = "3;미요;30;아, 아직 계약서에 사인도 안 했는데 너무 띄우지 마세요……!\n#3;em;[///]\n#3;stiff"
1012703-20 = "3;미요;02;그래서 미팅이 몇 시냐고요?"
1012703-21 = "3;미요;36;20분 뒤에…… 그러니까 2시에요."
1012703-22 = "3;미요;04;……네? 선생님도 동행하시겠다고요?\n#3;em;[?]"
1012703-23 = "3;미요;04;아니…… 저 때문에 굳이 그러실 것까진 없는데……."
1012703-24 = "3;미요;02;그래도 계약서 내용을 함께 검토해 줄 사람이 있는 편이 좋다고…… 요?"

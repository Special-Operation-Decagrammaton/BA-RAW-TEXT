1012703-34 = "5;미요;01\n1;출판사 직원;03;어서 오세요, 작가님. 환영합니다.\n#1;greeting\n#1;a\n#5;a\n#1;em;[재잘]"
1012703-35 = "5;미요;01\n1;출판사 직원;01;그런데 옆에 샬레의 선생님께선 어쩐 일로……."
1012703-36 = "[s]\"제 학생이 출간 계약을 맺는다고 해서, 참관하러 왔습니다.\""
1012703-37 = "1;출판사 직원;02;예 뭐…… 그렇군요. 뭐 크게 문제 될 것은 없겠죠."
1012703-38 = "5;미요;01\n1;출판사 직원;03;자, 그러면 시작하시죠. 먼저 계약서를 살피기에 앞서, 저희 측 입장에 대해 먼저 설명해 드리겠습니다.\n#5;dr\n#1;m3"
1012703-39 = "1;출판사 직원;04;당연히 아시겠지만, 출간이라는 것은 상당한 금액이 들어가는 작업입니다."
1012703-40 = "1;출판사 직원;09;인쇄비는 기본이고, 편집과 디자인, 마케팅에도 엄청난 돈이 들어가지요.\n#1;em;[한숨]"
1012703-41 = "1;출판사 직원;06;거기다 찍어낸 책들이 다 팔리지 않을 경우, 남은 책들을 보관하는 창고 이용료도 상당히 지출되고요. 이해하시나요?"
1012703-42 = "3;미요;30;저, 저도 알고는 있는 사항입니다만, 그걸 왜…….\n#1;hide\n#5;hide"
1012703-43 = "3;출판사 직원;03;저희가 작가님의 책을 출간한다는 것은 상당한 위험 부담을 지는 일이라는 것, 그것을 이해시켜 드리려고요.\n#3;em;[반짝]"
1012703-44 = "[s] \"저기, 출간의 책임을 출판사가 지는 건 당연한 건데…….\""
1012703-45 = "3;출판사 직원;08;그래서! 저희는 부득이하게도 작가님께 한 가지 제안을 하고 싶습니다!\n#3;jump"
1012703-46 = "3;출판사 직원;08;바로…… 작가님의 책을 출간하는 데에, 작가님도 함께 투자를 하시는 것이죠!\n#3;em;[재잘]"
1012703-47 = "3;미요;05;……?"
1012703-48 = "3;출판사 직원;03;크게 부담 가지실 것 없습니다. 인쇄와 편집 비용, 그리고 디자인과 마케팅 비용 정도만 작가님이 부담하시면 되는 겁니다!"
1012703-49 = "3;출판사 직원;03;나머지는 저희가 다 알아서 할 것이고요!"
1012703-50 = "[s] \"아니 그러면 사실상 미요가 다 하는…….\""
1012703-51 = "3;출판사 직원;00\n5;미요;14;그렇군요……!\n#5;em;[반짝]\n#3;m2\n#5;al"

[translation]
1012703-1 = "Writer's Threshold"
1012703-2 = "Downtown"
1012703-3 = "The next morning, I went to Wildhunt for work."
1012703-4 = "[ns] \"I feel like I'm here a lot lately.\""
1012703-5 = "And after hours of work, just as I got back to Shiratori City..."
1012703-6 = "Hm? Sensei?"
1012703-9 = "Good morning..."
1012703-10 = "[s] \"Miyo? What brings you out of Wildhunt's walls?\""
1012703-11 = "W-Well..."
1012703-12 = "I received an offer from a publisher here. I was granted a few hours' leave because this is considered a work meeting."
1012703-13 = "[s] \"A publication offer?!\""
1012703-14 = "Yes. You may remember that I was working on a story while visiting you at Schale."
1012703-15 = "And...I finished! A romance imprint is interested in my work."
1012703-16 = "[s1] \"THAT was romance...?\"\n[s2] \"This is amazing, Miyo! You're a real writer!\""
1012703-19 = "D-Don't flatter me! Please, I haven't even seen the contract yet."
1012703-20 = "Oh, when's the meeting?"
1012703-21 = "It's in 20 minutes, 2 o'clock. And it's in this building. I've been trying not to pace too much. I don't want to look desperate, right?"
1012703-22 = "...What? You'll join me?"
1012703-23 = "I mean... That's asking so much of you. You undoubtedly had a long day, and..."
1012703-24 = "That's true. I've never signed a legitimate contract before. And you know so much about them."
1012703-28 = "I-In that case..."
1012703-29 = "I'd be happy to have you, Sensei."
1012703-31 = "Miyo and I headed to the publisher's office together."
1012703-33 = "Publisher Meeting Room"
1012703-34 = "Ah! There she is! Our special writer with her ribbons and that eye for romance!"
1012703-35 = "But...Schale's Sensei? What are you doing here?"
1012703-36 = "[s]\"I heard you're offering her a contract. I'm here for support.\""
1012703-37 = "Ah, right. So invested! How wonderful. Look at the two of us, encouraging the youthful voices of tomorrow!"
1012703-38 = "Since you're all busy, let's get to it. Now, Miyo, you're a smart girl, so you probably know all of this."
1012703-39 = "The industry isn't what it used to be! There's so much overhead. Writing may be easy for you, but publishing is expensive!"
1012703-40 = "Sure, there's paper, but also editors, designs, localization, and MARKETING! You wouldn't believe how much marketing costs."
1012703-41 = "And, in the unfortunately possible event that the printed books don't sell, there are storage fees. Climate-controlled warehouses! Armed guards!"
1012703-42 = "Y-Yes. I am familiar with these concepts."
1012703-43 = "Excellent. We're crystal clear. I just wanted to make sure we were on the same page!"
1012703-44 = "[s] \"But isn't this the normal cost of doing business?\""
1012703-45 = "Business! You're speaking my language, Sensei. Now, let's get to the proposal."
1012703-46 = "Miyo... How would you like to be an equal partner?! We're giving you the opportunity to invest in your OWN book's publication."
1012703-47 = "...?"
1012703-48 = "That's right. We'll publish, and YOU get the privilege of paying for printing, editing, designing, and marketing!"
1012703-49 = "Meanwhile, we'll handle the rest!"
1012703-50 = "[s] \"Wait, that's just Miyo doing everything...\""
1012703-51 = "Wow...!"
1012703-52 = "[s] \"Miyo...?\""
1012703-53 = "Oh, I bet that's not all, right?"
1012703-54 = "Huh?"
1012703-55 = "After I pay all that \"investment\" money and get published, naturally, I'll have to buy 500 or so copies, right? So we can game the Kronos Bestseller List?"
1012703-56 = "Oh...! You're familiar!"
1012703-57 = "And I bet I'd also have to enroll in some of your paid writing courses... You know, to make sure my next book with you is even better? Is that right?"
1012703-58 = "Absolutely! You're already up to speed. We're investing in your future, Miyo!"
1012703-59 = "Yes, of course! Wow!"
1012703-60 = "...You scammers need a new playbook."
1012703-64 = "Th-The contract...!"
1012703-65 = "Let's go, Sensei. I have no more business here."
1012703-72 = "Nearby Park"
1012703-73 = "*sigh*"
1012703-74 = "Please don't look at me like that, Sensei. It's fine. I'm tougher than I look."
1012703-75 = "Hm? How did I spot the scam?"
1012703-76 = "It's simple. I just imagined what I would do if I wanted to...exploit some naive girl with a dream, then worked from there. It's how I come up with our smuggling ideas, too."
1012703-77 = "So..."
1012703-78 = "...*sob*"
1012703-79 = "[s] \"Miyo?!\""
1012703-80 = "Why is this what I'm good at? Being scum?"
1012703-81 = "I can't get anyone to care about my work, my writing, the thing I focus on the most."
1012703-82 = "...My only talent is crime."
1012703-83 = "I'll never be a writer. No one wants my silly romances. I'm just doomed to be...THIS, aren't I?"
1012703-84 = "[s] \"Beats me.\""
1012703-88 = " How comforting. You have such a way with words."
1012703-89 = "[s] \"I'm not worried, Miyo. You'll find your path.\""
1012703-93 = "[ns]\"Because you know the wrong paths better than anyone.\""
1012703-94 = "..."
1012703-95 = "Avoiding the wrong path...is just as important as finding the right path."
1012703-96 = "Yeah. I could've been that girl who falls for scams. So cute. So naive. But I'm me."
1012703-97 = "It's a benefit. I'm blessed to be so...clever."
1012703-98 = "...Although I still hate what I am."
1012703-99 = "[s3] \"But smuggling pays, right...?\"\n[s4]\"It got you a new typewriter?\""
1012703-104 = "S-Shut up!"
1012703-106 = "We talked a bit longer in the park before returning back."

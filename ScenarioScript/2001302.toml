[translation]
2001302-1 = "安全檢查"
2001302-2 = "夏萊．辦公室"
2001302-4 = "（完成幾個工作回到辦公室後，看見千尋正坐在電腦前）"
2001302-5 = "[ns1] 「千尋，辛苦了」\n[ns2] 「之前說的維護做得如何呢？」"
2001302-6 = "嗯，維護本身沒什麼問題。"
2001302-7 = "嗯，維護本身沒什麼問題。"
2001302-8 = "只不過是清除Log，確認一下快取而已。"
2001302-9 = "幸好目前為止還沒有發現有人入侵伺服器的紀錄。也沒有發現奇怪的病毒。"
2001302-10 = "……不過，並非沒有問題。"
2001302-11 = "[s] 「問題……？」"
2001302-12 = "……"
2001302-13 = "老師的安全意識有問題！"
2001302-14 = "為什麼會把電腦的密碼寫在螢幕旁邊呢！？"
2001302-15 = "[s] 「因為記不住複雜的密碼……」"
2001302-16 = "就算這樣也不能把密碼寫在這種任何人都看的到的地方啊！"
2001302-17 = "要是被有惡意的某人看到的話，不只是老師和夏萊，就連有關係的學生們的紀錄都有可能會流出去的……"
2001302-18 = "因為夏萊有著超越法規的權限，這種地方要特別注意才行。"
2001302-19 = "老師應該要對自己正在處理多麼重要的資料更有自覺才對。"
2001302-20 = "[s] 「對不起……」"
2001302-21 = "幸好就像我剛才說的一樣，目前為止似乎沒什麼問題……"
2001302-22 = "之後可要多注意一點才行。"
2001302-31 = "來吧，老師。更新一下密碼吧，就算是比較好記的也沒關係。"
2001302-32 = "[s3] 「1、2、3、4……」\n[s4] 「q、w、e、r……」"
2001302-33 = "……等等。"
2001302-34 = "……等等。"
2001302-35 = "那種每個人都會用的低強度密碼有什麼意義！"
2001302-36 = "[s] 「我覺得這樣比較好記……」"
2001302-37 = "好記程度某種意義上是很重要沒錯，不過我說的是「比較好記」吧！"
2001302-38 = "得用老師才知道的那種，特別的文字排列或是數字才行。"
2001302-39 = "[s] 「……自己的生日之類的？」"
2001302-40 = "那也不行！如果是盯上老師的駭客的話，那種情報應該早就洩漏了才對。"
2001302-41 = "這可是資料安全基礎中的基礎啊，老師……"
2001302-42 = "請用那些以外的字串吧。還有盡可能加入特殊字元和混用大小寫。"
2001302-43 = "不然的話，可能會被簡單的腳本給破解的。"
2001302-44 = "[s5] 「這樣啊……」\n[s6] 「真不容易呢，系統安全……」"
2001302-45 = "就算不容易也要做。電腦的密碼就跟玄關的鑰匙一樣。"
2001302-46 = "就算不容易也要做。電腦的密碼就跟玄關的鑰匙一樣。"
2001302-47 = "隨便處理的話，就像是把玄關的鑰匙放在信箱裡一樣哦。"
2001302-48 = "[s] 「……」"
2001302-49 = "看你這個表情……吶，雖然覺得不太可能，老師該不會真的把大門的鑰匙放在信箱吧？"
2001302-50 = "唉……竟然不只是網路方面有問題啊……"
2001302-51 = "……真是的，我會從頭跟你說明安全的概念的，請仔細聽。"
2001302-53 = "（之後千尋花了數十分鐘進行了安全意識相關的說教）"

[translation]
2001302-1 = "สรุปการรักษาความปลอดภัยประจำวัน"
2001302-2 = "สำนักงานชาเล่ต์"
2001302-4 = "(เมื่อทำงานนอกสถานที่เสร็จแล้วกลับมาถึงที่สำนักงาน ก็พบจิฮิโระนั่งรออยู่หน้าคอมพิวเตอร์)"
2001302-5 = "[ns1] \"พยายามได้ดีมากเลยนะ จิฮิโระ\"\n[ns2] \"ตรวจสอบความปลอดภัยที่พูดถึงเรียบร้อยดีใช่มั้ย?\""
2001302-6 = "อื้ม การตรวจสอบความปลอดภัยมันไม่ใช่เรื่องยากอะไรหรอก"
2001302-7 = "อื้ม การตรวจสอบความปลอดภัยมันไม่ใช่เรื่องยากอะไรหรอก"
2001302-8 = "เรื่องตรวจสอบบันทึกทั้งหมดและการล้างข้อมูลแคชน่ะมันเป็นเรื่องง่ายๆ..."
2001302-9 = "โชคดีไปที่ไม่มีใครบุกรุกเข้ามาในเซิร์ฟเวอร์ของชาเล่ต์ แล้วก็ไม่มีโค้ดเสียหายด้วย"
2001302-10 = "แต่ว่า PC เครื่องนี้ยังมีปัญหาใหญ่อยู่"
2001302-11 = "[s] \"ปัญหาอะไรเหรอ?\""
2001302-12 = "นั่นก็คือ..."
2001302-13 = "สำนึกเรื่องความปลอดภัยของคุณครูไงล่ะ!"
2001302-14 = "ทำไมถึงเขียนรหัสผ่านแล้ววางทิ้งไว้โจ่งแจ้งแบบนั้นฮะ?"
2001302-15 = "[s] \"ก็รหัสซับซ้อนแบบนั้นมันจำยากนี่...\""
2001302-16 = "จะยังไงก็เถอะ ไปเขียนรหัสผ่านวางทิ้งไว้ในที่ที่คนอื่นมองเห็นแบบนั้นไม่ได้นะ!"
2001302-17 = "ถ้าคนที่มาเห็นกระดาษโน้ตเกิดมีจุดประสงค์ร้ายขึ้นมา บันทึกของคุณครูรวมไปถึงเด็กนักเรียนที่#nเกี่ยวข้องกับชาเล่ต์อาจจะรั่วไหลจนเกิดเป็นสถานการณ์ร้ายแรงก็ได้"
2001302-18 = "ชาเล่ต์น่ะเป็นองค์กรที่อยู่เหนือกฎหมาย ต้องระมัดระวังให้มากเข้าไว้สิ"
2001302-19 = "คุณครูควรจะตระหนักให้มากขึ้นนะว่าตัวเองกำลังจัดการกับข้อมูลที่สำคัญขนาดไหนอยู่น่ะ"
2001302-20 = "[s] \"ครูขอโทษ...\""
2001302-21 = "โชคดีนะที่รอบนี้ไม่มีปัญหาอะไรร้ายแรง จะปล่อยผ่านไปก็ได้..."
2001302-22 = "ครั้งหน้าก็อย่าทำอะไรที่สะเพร่าแบบนี้อีกล่ะ"
2001302-31 = "คุณครู เขียนรหัสใหม่ตรงนี้ทีสิ คราวนี้เอารหัสผ่านง่ายๆ นะ"
2001302-32 = "[s3] เขียน <12345> ลงไป\n[s4] เขียน <qwerty> ลงไป"
2001302-33 = "ทำอะไรน่ะ?!"
2001302-34 = "ทำอะไรน่ะ?!"
2001302-35 = "จะใช้ข้อความสิ้นคิดแบบนั้นเป็นรหัสผ่านได้ยังไงกัน!"
2001302-36 = "[s] \"ก็ไหนบอกว่าให้เขียนอะไรที่จำง่ายๆ ไง...\""
2001302-37 = "ถึงจะบอกให้เขียนรหัสผ่านที่จำง่ายก็เถอะ แต่ไม่ได้บอกให้ตั้งรหัสผ่านเป็นข้อความง่ายๆ ที่ใครก็เดาได้แบบนั้นสักหน่อย!"
2001302-38 = "ควรจะตั้งรหัสผ่านเป็นตัวอักษรหรือตัวเลขพิเศษที่มีแค่คุณครูที่รู้สิ"
2001302-39 = "[s] \"ถ้างั้นก็ตั้งเป็นวันเกิดของครู...\""
2001302-40 = "นั่นก็ไม่ได้! ถ้าเป็นแฮ็กเกอร์ที่จ้องจะเล่นงานคุณครูละก็ต้องรู้วันเกิดของคุณครูอยู่แล้วสิ"
2001302-41 = "นี่มันเป็นขั้นพื้นฐานที่สุดของความปลอดภัยเลยนะ..."
2001302-42 = "และยิ่งถ้าเป็นรหัสผ่านเข้าบัญชีสำคัญๆ ก็ต้องใช้รหัสที่มีตัวอักษรพิเศษหรือตัวพิมพ์เล็ก และตัวพิมพ์ใหญ่อย่างน้อยหนึ่งตัวถึงจะดี"
2001302-43 = "ถ้าไม่อย่างนั้นแค่มาโครระดับพื้นฐานก็สามารถเข้าถึงบัญชีได้แล้ว"
2001302-44 = "[s5] \"งั้นเหรอ...?\"\n[s6] \"นั่นมันเรื่องใหญ่เลยนะ...\""
2001302-45 = "จะเรื่องใหญ่หรือไม่ใหญ่ รหัสผ่านเข้าคอมพิวเตอร์ก็ไม่ต่างอะไรจากกุญแจประตูหน้าบ้านหรอกนะ"
2001302-46 = "จะเรื่องใหญ่หรือไม่ใหญ่ รหัสผ่านเข้าคอมพิวเตอร์ก็ไม่ต่างอะไรจากกุญแจประตูหน้าบ้านหรอกนะ"
2001302-47 = "การตั้งรหัสผ่านแบบไม่ใส่ใจก็เหมือนกับการที่ขี้เกียจแล้ววางกุญแจบ้านไว้ในตู้จดหมายนั่นแหละ"
2001302-48 = "[s] \"อ่า…\""
2001302-49 = "อย่าบอกนะว่าคุณครู...คงไม่ได้วางกุญแจบ้านไว้ในตู้จดหมายจริงๆ ใช่มั้ย?"
2001302-50 = "เฮ้อ...ไม่ได้หละหลวมแค่ความปลอดภัยในโลกออนไลน์สินะ"
2001302-51 = "ฉันจะอธิบายความสำคัญของการรักษาความปลอดภัยให้ฟัง ตั้งใจฟังด้วยล่ะ!"
2001302-53 = "(หลังจากนั้นก็ได้นั่งฟังจิฮิโระบ่นเรื่องสำนึกในการรักษาความปลอดภัยอยู่นานสองนาน...)"

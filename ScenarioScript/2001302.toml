[translation]
2001302-1 = "Daily Security Audit"
2001302-2 = "Schale Executive Office"
2001302-4 = "I returned to the office from a business trip and found Chihiro waiting in front of a computer."
2001302-5 = "[ns1] \"I'm back, Chihiro. All done, I take it?\"\n[ns2] \"Finish the security check you mentioned?\""
2001302-6 = "The security check itself didn't pose much of a challenge."
2001302-7 = "The security check itself didn't pose much of a challenge."
2001302-8 = "All I had to do was thoroughly examine the logs and clear the cache."
2001302-9 = "Fortunately, I didn't find any traces of the Schale server being hacked or any malware left behind."
2001302-10 = "However, there's still a problem with this PC."
2001302-11 = "[s] \"What kind of a problem?\""
2001302-12 = "It's..."
2001302-13 = "...your security practices, Sensei!"
2001302-14 = "Why would you write down your password in a visible location?"
2001302-15 = "[s] \"Because it's really complicated and hard to remember...\""
2001302-16 = "That doesn't excuse you putting the password where anyone can see!"
2001302-17 = "You would have an emergency on your hands if this fell into the hands of someone with malicious intent. Every record pertaining to Schale and its students could leak."
2001302-18 = "Schale having extrajudicial authority makes it even more of a target.#nThat calls for being more careful."
2001302-19 = "The kind of information that comes through this office isn't to be taken lightly."
2001302-20 = "[s] \"Sorry...\""
2001302-21 = "I'll let it slide this time since there was no harm done."
2001302-22 = "Please be more careful in the future."
2001302-31 = "I want you to write down a new password here, Sensei.#nSomething that's easy to remember."
2001302-32 = "[s3] Write \"12345\".\n[s4] Write \"qwerty\"."
2001302-33 = "What do you think you're doing?!"
2001302-34 = "What do you think you're doing?!"
2001302-35 = "Something like that can't be your password!"
2001302-36 = "[s] \"But you said something easy to remember.\""
2001302-37 = "That doesn't give you an excuse to write something so obvious that anyone could guess what it is!"
2001302-38 = "You have to use a combination of letters and numbers that you may know by heart, but others wouldn't be able to guess."
2001302-39 = "[s] \"Then I'll use my birthday.\""
2001302-40 = "That's no good either! Any hacker targeting you would obviously know what your birthday is."
2001302-41 = "These kind of security tips are supposed to be common knowledge."
2001302-42 = "And it's a good idea to include at least one special character or uppercase letter for important accounts."
2001302-43 = "Otherwise, the account can be cracked with a simple macro."
2001302-44 = "[s5] \"Really?\"\n[s6] \"That sounds scary...\""
2001302-45 = "Yes, really. Your PC password is like the key to your front door."
2001302-46 = "That's because it is. Your PC password is like the key to your front door."
2001302-47 = "Having an insecure password is like leaving your spare key in your mailbox because otherwise you'll forget where you put it."
2001302-48 = "[s] \"That one too, huh...\""
2001302-49 = "Sensei? Do you keep your spare key in your mailbox?"
2001302-50 = "*sigh* I should have known this extended to your offline security as well."
2001302-51 = "It's time to go over the importance of security starting from the basics.#nListen up!"
2001302-53 = "Chihiro lectured me about security for over an hour..."

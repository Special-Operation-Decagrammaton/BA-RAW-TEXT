2001302-3 = "4;치히로;05\n#4;a\n#4;em;…\n#wait;2500"
2001302-4 = "#na;(외근 업무를 마치고 집무실로 돌아오니, 치히로가 컴퓨터 앞에 앉아서 기다리고 있었다.)"
2001302-5 = "[ns1] \"수고 많았어, 치히로.\"\n[ns2] \"말했던 보안 점검은 무사히 끝마쳤어?\""
2001302-6 = "4;치히로;02;음. 보안 점검 자체는 어려운 일도 아니었어.\n#4;m3\n#4;em;[반응]"
2001302-7 = "4;치히로;02;음. 보안 점검 자체는 어려운 일도 아니었어.\n#4;m3\n#4;em;[반응]"
2001302-8 = "4;치히로;01;로그를 전수 검사하고 캐시 데이터를 청소하는 단순한 일이었으니까……."
2001302-9 = "4;치히로;01;다행히 샬레의 서버에는 누군가가 침입한 기록도 없었고, 특별한 악성 코드도 발견되지 않았어."
2001302-10 = "4;치히로;02;……하지만 이 PC에는 아직도 큰 문제가 남아있어."
2001302-11 = "[s] \"어떤 문제?\""
2001302-12 = "4;치히로;99;그건 바로……\n#4;em;…"
2001302-13 = "4;치히로;05;선생님의 보안 의식이야!\n#fontsize;80\n#4;closeup"
2001302-14 = "4;치히로;04;어째서 PC의 비밀번호를 잘 보이는 곳에 써서 놔두는 거야?\n#4;closeup\n#4;em;[땀]"
2001302-15 = "[s] \"복잡한 비밀번호는 외우기 어려워서…….\""
2001302-16 = "4;치히로;05;그렇다고 해서 누구나 볼 수 있는 곳에 비밀번호를 써 두면 안 되지!\n#4;hophop"
2001302-17 = "4;치히로;05;이 메모지를 본 누군가가 나쁜 마음이라도 먹었다면, 선생님은 물론이고 샬레와 관련된 학생들의 기록까지 유출될 수도 있는 위급한 상황이었다고."
2001302-18 = "4;치히로;02;샬레는 초법적 수사권을 지닌 기관이잖아? 그런 만큼 더 주의를 해야지."
2001302-19 = "4;치히로;01;선생님은 자신이 얼마나 중요한 정보를 취급하고 있는지 좀 더 자각해야 해.\n#4;em;[!]"
2001302-20 = "[s] \"……미안.\""
2001302-21 = "4;치히로;99;다행히 이번에는 큰 문제가 없었던 것 같으니 넘어가 주겠지만…….\n#4;em;[속상함]\n#4;stiff"
2001302-22 = "4;치히로;02;다음부터는 이런 경솔한 행동은 절대 하지 마."
2001302-23 = "#st;[0,0];instant;1;"

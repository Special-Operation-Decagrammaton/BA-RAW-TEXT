2001302-35 = "3;치히로;02;그런 단순한 문자열이 암호가 될 수 있을 리가 없잖아!"
2001302-36 = "[s] \"하지만 기억하기 쉬운 것으로 적으라며?\""
2001302-37 = "3;치히로;05;기억하기 쉬운 비밀번호를 적으라고는 했지만, 누구나 떠올릴 수 있는 단순한 문자열로 정하라고 하지는 않았어!\n#3;stiff\n#3;em;[빠직]"
2001302-38 = "3;치히로;01;비밀번호는 선생님만 알 수 있는 특별한 문자나 숫자 배열을 사용해야지."
2001302-39 = "[s] \"그렇다면 내 생일로…….\""
2001302-40 = "3;치히로;05;그것도 안 돼! 선생님을 노리고 있는 크래커라면 선생님의 생일은 당연히 알고 있을 거라고.\n#3;hophop"
2001302-41 = "3;치히로;04;이건 보안의 기초 중의 기초라고……."
2001302-42 = "3;치히로;02;그리고 중요한 계정의 비밀번호에는 특수문자나 대소문자를 하나 정도 포함하는 게 좋아.\n#3;em;[반응]"
2001302-43 = "3;치히로;01;그렇지 않으면 간단한 수준의 매크로만으로도 계정이 열릴 수 있으니까."
2001302-44 = "[s5] \"그런가……?\"\n[s6] \"그것 참 큰일이네…….\""
2001302-45 = "3;치히로;05;큰일이고 말고. PC의 비밀번호는 집에 들어올 수 있는 현관문 열쇠와도 같으니까.\n#3;em;[!]"
2001302-46 = "3;치히로;05;큰일이고 말고. PC의 비밀번호는 집에 들어올 수 있는 현관문 열쇠와도 같으니까.\n#3;em;[!]"
2001302-47 = "3;치히로;01;비밀번호를 아무렇게나 방치하는 건 현관문 열쇠를 귀찮다며 우편함에 넣어두는 거나 마찬가지인 행위야."
2001302-48 = "[s] \"어…….\""
2001302-49 = "3;치히로;05;설마 선생님…… 정말로 현관문 열쇠를 우편함에 넣어두는 건 아니겠지?\n#3;em;…"
2001302-50 = "3;치히로;04;하아…… 온라인의 보안만 취약한 게 아니었다니…….\n#3;stiff"
2001302-51 = "3;치히로;05;지금부터 보안의 중요성에 대해서 설명해줄 테니 잘 들어!\n#3;em;[!]\n#3;closeup\n#fontsize;80"

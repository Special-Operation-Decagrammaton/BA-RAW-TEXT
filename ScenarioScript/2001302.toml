2001302-31 = "3;치히로;02;선생님. 여기에 새 비밀번호를 적어줘. 이번에는 기억하기 쉬운 것으로.\n#3;closeup\n#3;em;[반응]"
2001302-32 = "[s3] <12345>라고 적는다.\n[s4] <qwerty>라고 적는다."
2001302-33 = "3;치히로;05;뭐 하는 거야?!\n#3;jump\n#3;em;[?!]"

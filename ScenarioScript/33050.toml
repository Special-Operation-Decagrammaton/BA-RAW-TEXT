[translation]
33050-1 = "第5話;エデン条約調印式（１）"
33050-4 = "今この動画をご覧の皆さん、こんにちは！"
33050-5 = "クロノススクール報道部のアイドルレポーター、[ruby=かわる]川流[/ruby]シノンです！"
33050-6 = "本日はついに締結される、ゲヘナ学園とトリニティ総合学園の「エデン条約」の調印式。その現場に来ております！"
33050-7 = "私は今、「通功の古聖堂」の前にいるのですが……"
33050-17 = "すでに現場は熱がこもっており、お互いに譲るまいと張り詰めた空気になっております！"
33050-18 = "誰かが一歩間違えれば、この場が大惨事になりそうなほどの雰囲気です！感じられますでしょうかこの空気感！"
33050-20 = "犬猿の仲とでも言いましょうか、呉越同舟と言いましょうか！私たちの良く知るトリニティとゲヘナの様相です！"
33050-21 = "……はい？余計なことを言うな？早く進めろ？仕方ないですね、今日も画面外から飛んでくる言葉が拳に変わる前に、ちゃっちゃとお話を進めていきましょう！"
33050-23 = "ものすごい威圧感ですね！ここが調印式の会場である、古聖堂の様子です！"
33050-25 = "「どうしてこの場所が選ばれたのか」ということにつきましては、どうやら或る筋の情報によりますと「ゲヘナの首脳部からの提案」とのことです！これは意外！"
33050-26 = "ここがかつて、トリニティの「第一回公会議」が開催された歴史的な場所だからでしょうか？"
33050-27 = "いえいえ、そうではないようです。どうやらその理由は……「これほど大きなイベントなのだから、大きくて権威のある場所が良い」とのこと。"
33050-28 = "要するに、「デカい場所の方がカッコ良いだろうが！」とのことです！なるほど、分かりやすいですね！"
33050-29 = "少々話は変わりますが、先ほど申し上げた「第一回公会議」、そしてそこで定められた戒律は、当時の「ユスティナ聖徒会」という強力な集団が守り続けたと言われています。"
33050-30 = "果たしてそれが関連しているのでしょうか、本日はトリニティの「シスターフッド」もこの調印式に参加していることが確認されています！"
33050-31 = "これまで長い間、対外的な活動を自ら禁じていた「シスターフッド」……彼女たちがここに来て、なぜ登場したのでしょうか？"
33050-32 = "先ほどの「ユスティナ聖徒会」、今では歴史の中に消えたその組織の後身を自任する……そういった意味合いがあるのでしょうか？"
33050-33 = "さあ、トリニティ総合学園に吹き荒れる政治の嵐の行方は果たして……はい？難しい話は良い？視聴率とアクセス数が落ちる？"
33050-34 = "政治もやってられませんが、デスクからの圧力もやってられませんね！しかし、私たちには言論の自由が――"
33050-38 = "現在回線の影響などにより、映像が乱れております。少々お待ちください"
33050-40 = "……エデン条約が締結されるとその後、両学園の首脳部は古聖堂にて「[ruby=ETO]エデン条約機構[/ruby]」の創設に同意することになります！"
33050-42 = "そうするとトリニティとゲヘナ……長年敵同士だったこの二つの学園は、お互いの間で行われる紛争について、共に解決するという義務を負うことになります！"
33050-43 = "この古聖堂で締結されるということもあり、神聖な戒律の守護に従い、その義務を誠実に果たすことが期待されるのではないでしょうか！"
33050-44 = "ややこしいですね、簡単に言いましょう！これまでいがみ合ってきたことでも有名なこのキヴォトスの二つの巨大な学園が、ついに平和のため手を取り合おうとしているのです！"
33050-45 = "さあそんな大事なタイミングで、我らが連邦生徒会は何をしているのでしょうか？"
33050-46 = "昨日行われた、連邦生徒会による緊急記者会見の様子をご覧ください！"
33050-48 = "……以上で会見を終えます。"
33050-51 = "ちょっと待ってください行政官！それはつまり、連邦生徒会長の行方はまだ分かっていないということですか？"
33050-52 = "要するにそうです。"
33050-53 = "要約しなくてもそうでは！？"
33050-55 = "連邦生徒会の能力について、世間の評価は厳しくなっています。この点についてはいかがでしょうか？"
33050-56 = "まあ仕方ないんじゃん？"
33050-57 = "モモカちゃん……！"
33050-58 = "不確定な情報につきましては、現段階でのコメントは差し控えさせていただきます。"
33050-59 = "それぞれの自治区で起きているジェントリフィケーションへの対応策はどうなっていますか？"
33050-60 = "「SRT特殊学園」の閉鎖が決定したこと、それと以前のサンクトゥムタワーでの騒動は何か関係があるのですか？タワーの一部が焼失したとの情報もありますが？"
33050-61 = "トリニティとゲヘナの「エデン条約」につきましては、どのようにお考えですか？"
33050-62 = "各学園の自治区で起きた事件につきまして、基本的にはそれぞれの学園に対応を委ねています。連邦生徒会の無闇な介入はかえって無責任かと考えます。"
33050-63 = "まあ、介入する時間も人手も無いし。"
33050-64 = "モモカちゃん……っ！"
33050-65 = "それでは、この辺りで終了とさせていただきます。"
33050-70 = "はい！つまりは「あんまり興味無い」ということですね！"
33050-71 = "さすがは連邦生徒会！その大らかさは天をも突き抜けるようです！"
33050-72 = "それでは次に、このエデン条約に参加する各学園の主要人物につきまして――"
33050-75 = "……騒がしいな。"
33050-76 = "今日はついに、あのエデン条約が締結される日ですからね！特別に学校も休日扱いですし、街も人でいっぱいです！"
33050-77 = "クロノス放送の方もさっきいましたし、何だかお祭りっぽいですね！"
33050-78 = "そうですね。せっかくのお祭り騒ぎなので、先生も一緒だったら良かったのですが……どうやら条約の方でお忙しそうです。"
33050-79 = "……で、どうして私はここに呼ばれてるわけ？"
33050-80 = "それはもちろん、私たちはまだ補習授業部の仲間だからですよ、コハルちゃん♡"
33050-81 = "実質的に補習授業部の卒業パーティーも兼ねてるんですから、もう少し付き合ってくれません？"
33050-82 = "べ、別に嫌とは言ってないじゃん！み、みんなで頑張って、乗り越えたわけだし……。"
33050-83 = "……それに、これで全部終わりってわけじゃないし。私はずっと正義実現委員会にいるから、押収品の管理室にでも来てくれれば大抵……"
33050-84 = "うん。すぐにでも遊びに行くよ、コハル。"
33050-85 = "でしたら今度私も伺いますね。いつか押収されてしまった、「カーマ・スートラ」を返してもらわないとですし。"
33050-86 = "カーマ……？何それ？"
33050-87 = "古典文学の作品ですよ。噴水のところで気持ち良く読んでいたのですが、どういうわけか急に押収されてしまって……"
33050-88 = "古典文学？ふーん……"
33050-89 = "……ってそんなわけないじゃん！あんたが読んでる時点で絶対エッチなやつでしょ！エッチなのはダメ！焼却！！"
33050-90 = "うーん、押収はともかく、古書館で借りたものなので燃やされるのは困るのですが……。"
33050-94 = "あれ、アズサちゃん。もしかしてそのぬいぐるみ、ずっと持ち歩いてるんですか？"
33050-98 = "うん。大事な物だから、やっぱり持ち歩かないと。"
33050-99 = "そ、そこまででしたか……いえ、ありがたいのですが！モモフレンズの世界は広いですし、せっかくなら他にも色々集めてみませんか？今度ぜひお店とかにも……"
33050-100 = "うん、楽しみにしてる。"
33050-101 = "はい、ぜひ！今度ペロロ様の冒険アニメも公開されることですし！"
33050-102 = "……アニメ？"
33050-103 = "はい！仲間たちと力を合わせて悪を打ち砕き、共に苦難を乗り越え、最後にはみんな笑顔で終わるというそのエンディングがすごい感動的だそうで……！"
33050-104 = "それ、だいぶネタバレじゃない？"
33050-105 = "え、あっ！？い、今のは忘れてください！？"
33050-106 = "ふふっ、ヒフミちゃんはそういったハッピーエンドが好きなんですか？"
33050-107 = "は、はい、そうですね。やっぱり普通過ぎますかね……？"
33050-108 = "……悪いとは言わないけど、ちょっとありきたりじゃない？最終的にはみんなで仲良く大団円とか。"
33050-109 = "……私も、ハッピーエンドはよく分からないな。頑張ったところで世界はそうそう変わらない、傷は無かったことにならない。それがこの世界の真実だから。"
33050-110 = "あうぅ……みんなダーク寄りなんですね……。"
33050-111 = "私はそういうのはちょっと辛くって……やっぱりみんなで幸せになれるハッピーエンドが好きです。"
33050-112 = "まあ、好みは人それぞれですからね。ちなみに私はヒロインが目を蕩けさせて、涎を垂らしながら許しを請うタイプのエンディングが好きです♡"
33050-113 = "ばっ、バカじゃないの！？そんなエンディングあるの！？"
33050-114 = "うーん、結構あると思いますが……。"
33050-115 = "……とはいえ、ヒフミが好きなら悪いものだとは思わない。それもそれで良いのだと思う。"
33050-119 = "アズサちゃーーーんっ！"
33050-125 = "あらあら♡"
33050-126 = "ひゃぁぁぁ……っ！？"
33050-128 = "このまま、全てが終わったら……。"
33050-129 = "いえ、今日の調印式が終わったら、先生とゆっくり話したいですね。"
33050-130 = "……うん、私も。"
33050-131 = "……先生、ここにいれば良かったのに。"
33050-132 = "そうですね……今先生は、古聖堂にいらっしゃるのでしょうか。多分、忙しくされているんでしょうね……？"
33050-134 = "古聖堂・ホール"
33050-136 = "[ns] \"……暇だなぁ。\""
33050-139 = "次回;エデン条約調印式（２）"

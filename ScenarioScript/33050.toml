[translation]
33050-1 = "第5話;伊甸園條約簽約儀式（１）"
33050-4 = "現在觀看這部影片的大家，你們好！"
33050-5 = "我是克洛盧斯學園新聞部的偶像主播，川流詩音！"
33050-6 = "本日終於要締結的，格黑娜學園和三一綜合學園的「伊甸園條約」的簽約儀式。我來到了現場！"
33050-7 = "我目前，在「通功的古教堂」前面……"
33050-17 = "現場已經非常火熱，互不相讓形成了緊張的氣氛！"
33050-18 = "要是有人走錯一步，這個地方就會變成大慘案的氣氛！有感覺到嗎這個氛圍！"
33050-20 = "該說是犬猿之仲呢，還是吳越同舟呢！和我們所知的三一和格黑娜如出一轍呢！"
33050-21 = "……什麼？不要說多餘的話？快繼續？真沒辦法呢，今天也趁畫面外傳來的話變成拳頭之前，讓我們快速地繼續下去吧！"
33050-23 = "真是強大的威壓感呢！這就是簽約儀式的會場，古教堂的情況！"
33050-25 = "「為什麼這個地方被選上了呢」關於這個，看來根據某項情報指出是「來自格黑娜高層的提案」的樣子！這真是意外！"
33050-26 = "因為這裡是，過去三一舉辦「第一次公會議」具有歷史的地方嗎？"
33050-27 = "不對，似乎不是那樣。看來那個理由是……「因為是這樣盛大的活動，在寬敞具有權威的地方比較好」的樣子。"
33050-28 = "也就是說，「大的地方比較帥啊！」就是這樣！原來如此，很容易理解呢！"
33050-29 = "稍微轉個話題，剛才說的「第一次公會議」，傳聞在那裡定下的戒律，是由當時名為「優斯提娜聖徒會」的強力集團持續守護著。"
33050-30 = "究竟和那個有關連嗎，本日確認到了三一的「修女會」也參加了這個簽約儀式！"
33050-31 = "長久以來，自身禁止對外活動的「修女會」……她們來到這裡，為何登場了呢？"
33050-32 = "是在自我宣示代表剛才的「優斯提娜聖徒會」，現在已消失在歷史中的那個組織……這樣的意思嗎？"
33050-33 = "究竟，吹向三一綜合學園的政治風暴的走向如何……什麼？難懂的話夠了？收視率和觀看人數會下降？"
33050-34 = "雖然受不了政治，不過來自編輯部的壓力也讓人受不了呢！但是，我們有言論的自由──"
33050-38 = "現在因為線路影響等等問題，畫面出現異常。請稍候"
33050-40 = "……伊甸園條約締結之後，兩學園的高層將在古教堂同意創設「[ruby=ETO]伊甸園條約機構[/ruby]」！"
33050-42 = "這樣一來三一和格黑娜……長年互為敵人的這兩間學園，對彼此之間發生的紛爭，將背負共同解決的義務！"
33050-43 = "因為是在這間古教堂締結的，是否可以期待遵從神聖的戒律守護，誠實的執行那項義務呢！"
33050-44 = "真複雜呢，說得簡單一點吧！至今為止以互相仇視聞名的奇普托斯兩所巨大的學園，終於為了和平要握手言和了！"
33050-45 = "那麼在這麼重要的時機點，我們的聯邦學生會在做什麼呢？"
33050-46 = "請看昨天舉辦的，來自聯邦學生會的緊急記者會的情況！"
33050-48 = "……記者會到此結束。"
33050-51 = "請等一下行政官！那也就是，還不知道聯邦學生會長的去向嗎？"
33050-52 = "簡而言之就是這樣。"
33050-53 = "不用簡略也是那樣吧！？"
33050-55 = "關於聯邦學生會的能力，世間的評價變得越來越嚴厲了。關於這點有何看法呢？"
33050-56 = "嘛也沒辦法嘛？"
33050-57 = "桃香醬……！"
33050-58 = "對於不確定的情報，現階段請恕我保留評論。"
33050-59 = "對於在各自的自治區發生的都市仕紳化的對策怎麼樣了？"
33050-60 = "決定關閉「SRT特殊學園」的事，和以前聖所之塔的騷動有什麼關係嗎？還有塔的一部份燒毀的情報？"
33050-61 = "關於三一和格黑娜的「伊甸園條約」，請問有何看法？"
33050-62 = "對於各學園自治區發生的事件，基本上是交給各自的學園處理。我認為聯邦學生會的隨意介入反而是不負責任的行為。"
33050-63 = "嘛，也沒有介入的時間和人手就是了。"
33050-64 = "桃香醬……！"
33050-65 = "那麼，提問環節到此結束。"
33050-70 = "是的！也就是「沒什麼興趣」這麼回事呢！"
33050-71 = "不愧是聯邦學生會！豁達程度簡直突破天際！"
33050-72 = "那麼接下來，關於參加這個伊甸園條約各學園的主要人物──"
33050-75 = "……好吵雜。"
33050-76 = "今天終於是，那個伊甸園條約締結的日子呀！學校也特別視為假日，街上也擠滿人潮！"
33050-77 = "克洛盧斯報導的人剛才也在，感覺好像祭典呢！"
33050-78 = "就是呀。難得的祭典氣氛，如果老師也在一起就好了……看來條約方面的事很忙。"
33050-79 = "……所以，為什麼我被叫來這裡？"
33050-80 = "那當然是因為，我們還是補課部的夥伴唷，小春醬♡"
33050-81 = "實際上也是補課部的畢業派對，可以配合一下嗎？"
33050-82 = "我，我也沒有說不要啊！大，大家一起努力，克服了嘛……"
33050-83 = "……而且，不是這樣就全都結束了。我一直都在實現正義部，只要來扣押品的管理室的話大多……"
33050-84 = "嗯。我會立刻去玩的唷，小春。"
33050-85 = "那樣的話我下次也去拜訪哦。也必須請妳把曾經被扣押的《慾望與智慧》還給我才行。"
33050-86 = "慾望……？那是什麼？"
33050-87 = "是古典文學的作品唷。在噴泉的地方看得正愉快，不知道為什麼突然被扣押……"
33050-88 = "古典文學？哼……"
33050-89 = "……呃怎麼可能嘛！光是妳在看的時機點就絕對是色色的東西吧！不可以色色！燒毀！！"
33050-90 = "嗯……扣押還好說，因為是在古書館借的東西燒掉的話會很困擾……"
33050-94 = "啊咧，梓醬。難道那個玩偶，一直帶在身上嗎？"
33050-98 = "嗯。因為是重要的東西，果然要帶在身上才上才行。"
33050-99 = "到，到那種程度啊……不，雖然很感激！不過Momo好友的世界很廣闊，機會難得要不要試著蒐集其他的？下次務必到商店之類的……"
33050-100 = "嗯，我很期待。"
33050-101 = "是的，務必！這次佩洛洛大人的冒險動畫也公開了！"
33050-102 = "……動畫？"
33050-103 = "是的！和夥伴齊心協力打擊邪惡，共同跨越苦難，聽說最後大家一起笑著結束的結局非常感動……！"
33050-104 = "那個，算是劇透吧？"
33050-105 = "咦，啊！？剛，剛才的請忘了！？"
33050-106 = "呵呵，日步美醬喜歡那種圓滿結局嗎？"
33050-107 = "是，是的，就是說呀。果然太普通了嗎……？"
33050-108 = "……雖然不會說不好，不會有點隨處可見嗎？最終大家一起友好大團圓之類的。"
33050-109 = "……我也，不太清楚圓滿結局呢。就算努力了世界也不會那麼輕易改變，傷痕也不會消失。因為那就是這個世界的真相。"
33050-110 = "啊嗚……大家都比較負面呢……"
33050-111 = "那種對我來說有點難受……果然還是喜歡大家幸福的圓滿結局。"
33050-112 = "嘛，喜好各自不同呀。順帶一提我喜歡女主角眼神渙散，流著口水請求原諒的類型的結局♡"
33050-113 = "妳，妳是笨蛋嗎！？有那種結局嗎！？"
33050-114 = "嗯……我認為還蠻多的……"
33050-115 = "……雖然這麼說，日步美喜歡的話我不認為是不好的東西。我認為那樣也不錯。"
33050-119 = "梓醬──！"
33050-125 = "啊啦啊啦♡"
33050-126 = "呀啊啊啊……！？"
33050-128 = "就這樣，全都結束的話……"
33050-129 = "不，今天的簽約儀式結束之後，想和老師悠哉的聊天呢。"
33050-130 = "……嗯，我也是。"
33050-131 = "……老師，如果在這裡就好了。"
33050-132 = "就是說呢……現在老師，在古教堂嗎。大概，非常忙碌吧……？"
33050-134 = "古教堂．大廳"
33050-136 = "[ns]「……好閒啊。」"
33050-139 = "下一話;伊甸園條約簽約儀式（２）"

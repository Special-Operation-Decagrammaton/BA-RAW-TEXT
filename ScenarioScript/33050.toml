33050-125 = "#na;하나코;어머나♡"
33050-126 = "#na;코하루;……!"
33050-127 = "#all;hide"
33050-128 = "3;하나코;99;그러네요. 뭐랄까…… \n#3;a\n#3;em;…"
33050-129 = "3;하나코;01;오늘 조약이 끝나면 선생님과 함께 느긋하게 얘기를 나눌 수 있으면 좋겠네요……."
33050-130 = "5;아즈사;03;선생님이랑……. 응. 나도 기대하고 있어.\n#5;a\n#3;m1\n#5;em;[반짝]"
33050-131 = "#3;hide\n1;코하루;00;……선생님. 여기 같이 있었으면 좋았을 텐데.\n#1;em;[///]"
33050-132 = "5;히후미;01;네. 선생님…… 고성당에 계시려나……. 지금은 엄청 바쁘시겠죠……?"

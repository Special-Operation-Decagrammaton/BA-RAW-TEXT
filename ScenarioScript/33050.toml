[translation]
33050-1 = "Episode 5;Eden Treaty Signing Ceremony Part 1"
33050-4 = "Hello to all our viewers at home!"
33050-5 = "This is the Kronos School of Journalism's star reporter, Kawaru Shinon!"
33050-6 = "We're live at the scene of the highly anticipated Eden Treaty signing ceremony!"
33050-7 = "That's right, the Cathedral of Communion where Gehenna Academy and Trinity General School are slated to officially sign the treaty."
33050-17 = "You could cut the tension in the air with a knife! Neither side is flinching in this intense battle of nerves!"
33050-18 = "It feels like a single misstep could lead to disaster! Can you feel the sparks in the air?"
33050-20 = "Historically, these two academies get along like cats and dogs—snakes and mongooses! Even now, this longstanding rivalry is boiling hot. Can the treaty stop it from bubbling over? "
33050-21 = "What's that? Stop babbling and say my segue already? Okay, let's move on to the next shot before my producer really gets mad!"
33050-23 = "What an imposing sight! The signing ceremony will be taking place later today at this historic cathedral!"
33050-25 = "Why here of all places? According to our sources, this location was actually suggested by the top brass at Gehenna!"
33050-26 = "Could it be because Trinity's First Council was also held at this location so many years ago? "
33050-27 = "Not according to our source! Supposedly, Gehenna wanted an event of this magnitude to simply take place at an equally powerful location! "
33050-28 = "That's all there is to it, and it certainly fits the bill. I love it!"
33050-29 = "Speaking of the First Council, did you know that the commandments that were decided upon there were upheld by a powerful organization known as the Saint Justina Council?"
33050-30 = "Could that have something to do with Trinity's Sisterhood attending today's signing ceremony?"
33050-31 = "The Sisterhood has long abstained from involving itself with politics. What could motivate them to step out of the shadows now?"
33050-32 = "Could they be positioning themselves as the successors of the Saint Justina Council, the organization that has now vanished into history? "
33050-33 = "And what will become of the political storm sweeping through Trinity General School...?! What's that? You want me to keep things short and simple or we're going to lose viewers?"
33050-34 = "Well, my producer doesn't know how to abstain from cutting my time short! So much for freedom of the press!"
33050-38 = "Hold on just a moment, folks. We seem to be experiencing technical difficulties."
33050-40 = "Once the Eden Treaty is signed, the top executives of the two academies will agree upon the creation of the Eden Treaty Organization at the cathedral!"
33050-42 = "At that time, the two academies that have always been at odds will officially begin working together to settle their disputes!"
33050-43 = "Signing at the cathedral shows each side is committed to upholding the treaty and perhaps even the sacred commandments!"
33050-44 = "Put simply, this is the moment when two of the largest and most prominent academies in Kivotos will finally join hands in peace!"
33050-45 = "Which begs the question: What involvement does the General Student Council have with such a momentous occasion?"
33050-46 = "Let's take a look back at their press conference that was held just yesterday!"
33050-48 = "We'll now close by fielding questions."
33050-51 = "Excuse me, Chief Officer! Does this mean the General Student Council president is still missing?"
33050-52 = "In short, yes."
33050-53 = "Explain yourself! Why? Where is she?!"
33050-55 = "Public approval of the General Student Council is plummeting. What are your thoughts on this?"
33050-56 = "*munch* Well, I can't blame 'em."
33050-57 = "Momoka..."
33050-58 = "We have no comment to offer on the general public's opinions."
33050-59 = "What are your plans to slow down the gentrification occurring in several districts?"
33050-60 = "Is there any relationship between the decision to close SRT Academy and the previous riot at Sanctum Tower? There's speculation that part of the tower was destroyed!"
33050-61 = "What are your thoughts on the treaty between Trinity and Gehenna? "
33050-62 = "The academies are responsible for overseeing the management of their own districts, as they always have been. The General Student Council will continue to take a hands-off approach to such matters."
33050-63 = "*munch* Yeah, because we don't have the time or manpower to get involved."
33050-64 = "Momoka, hush..."
33050-65 = "No further questions. "
33050-70 = "There you have it! The General Student Council isn't concerning themselves with the treaty at all! "
33050-71 = "How impartial of them! As nonpartisan as always! "
33050-72 = "Next, let's analyze the key personnel of each academy attending the signing ceremony."
33050-75 = "This place is rather crowded."
33050-76 = "Of course! Today's the signing ceremony and classes were canceled. Everyone's out celebrating!"
33050-77 = "Kronos has been covering all the festivities. It kind of feels like we're in the middle of a festival."
33050-78 = "It sure does. If only Sensei were here to enjoy it with us, but they're busy with the Eden Treaty."
33050-79 = "Ugh. Why did I get dragged out here too?"
33050-80 = "Whatever do you mean? We're all still clubmates after all."
33050-81 = "This is supposed to be the Make-Up Work Club's farewell party. It wouldn't be the same without you here."
33050-82 = "W-Well, obviously! You couldn't have done it all without me, and I worked hard too, y'know..."
33050-83 = "Anyway, I told you all that you're welcome to come hang out with me at the Justice Task Force whenever you want. I'm usually in the room where confiscated goods are stored..."
33050-84 = "I'd love to come visit you, Koharu."
33050-85 = "Sure. I'll be by soon to pick up my confiscated kamasutra."
33050-86 = "Kama...what? What's that?"
33050-87 = "Oh, it's just a boring piece of classic literature. I find it soothing to read by the fountain, but it was confiscated for some reason."
33050-88 = "Why would classic literature be banned?"
33050-89 = "Wait, no! It must be something dirty if YOU were reading it! Burn it! Burn it with fire!"
33050-90 = "But I borrowed it from the library... You'd be destroying school property if you burned it."
33050-94 = "Oh, Azusa. You've been carrying around your Dr. Peroro plush?"
33050-98 = "Yes, I cherish him. Of course he goes wherever I go."
33050-99 = "Th-That's really sweet of you, but he doesn't have to be your only plush. The Momoverse is full of other cute characters to collect too."
33050-100 = "Right. That could be nice."
33050-101 = "Which reminds me! A new Peroro anime OVA was released recently!"
33050-102 = "Anna...may?"
33050-103 = "It's supposed to be really inspirational. I heard the part where all the friends join forces to defeat the villain is especially touching."
33050-104 = "Spoilers..."
33050-105 = "Ahhh! My bad! Forget everything I just said!"
33050-106 = "So you like stories that have happy endings, Hifumi?"
33050-107 = "Y-Yeah I guess so. Does that make me sound boring? "
33050-108 = "It's not that they're bad—it's just kind of cliché. Think of all the stories you've experienced where everyone lives happily ever after."
33050-109 = "I find happy endings to be purely fictional as well. The world isn't so quick to change, no matter how hard you try. That's reality."
33050-110 = "S-So you guys prefer more mature stories... "
33050-111 = "I guess that makes me a little mundane too. Maybe I'm just a sucker for endings where everyone can still laugh and smile."
33050-112 = "Well, everyone has their own tastes. My favorite kind of ending is when the heroine is mindlessly drooling and begging for forgiveness. ♥"
33050-113 = "What the hell are you talking about?! What kind of ending is that?!"
33050-114 = "Are you suuure you don't know?"
33050-115 = "It doesn't bother me if you like happy endings, Hifumi. If you like them, then so do I."
33050-119 = "*sob* Azusa!"
33050-125 = "Well, well!"
33050-126 = "...!"
33050-128 = "There's something I've been thinking about... "
33050-129 = "I want us all to get together with Sensei after the signing ceremony and unwind a little."
33050-130 = "That would be nice. It's been a while since I've had a casual conversation with Sensei."
33050-131 = "Yeah. I still wish Sensei could have joined us today."
33050-132 = "They should be at the cathedral right about now. I can only imagine how hectic things are today."
33050-134 = "Cathedral Central Hall"
33050-136 = "[ns] \"*yawn* Man, this is boring.\""
33050-139 = "Next Episode;Eden Treaty Signing Ceremony Part 2"

[translation]
33050-1 = "ตอนที่ 5;พิธีลงนามสนธิสัญญาเอเดน (1)"
33050-4 = "สวัสดีค่ะผู้ชมที่อยู่ทางบ้านทุกท่าน!"
33050-5 = "ฉันคือนักข่าวไอดอลแห่งชมรมข่าวจากโครโนส! คาวารุ ชิน่อน! สวัสดีทุกคนอีกครั้งค่ะ! "
33050-6 = "ตอนนี้ฉันอยู่ในสถานที่จัดพิธีลงนามสนธิสัญญาเอเดนค่ะ!"
33050-7 = "เอาละค่ะ ตอนนี้ฉันอยู่หน้า <วิหารปันบุญโบราณ> ที่จะมีการลงนามในข้อตกลงอย่างเป็นทางการ ระหว่างสถาบันเกเฮนน่าและสถาบันทรีนิตี้ค่ะ"
33050-17 = "โอ้โห บรรยากาศตึงเครียดมากเลยค่ะ! ไม่ต่างกับสงครามประสาทน่าตึงเครียด#nที่ทั้งสองฝ่ายไม่มีช่องว่างให้กันเลย!"
33050-18 = "หากใครง้างไกปืนขึ้นมาละก็ สิ่งที่ตามมาคงเป็นเหตุการณ์สยองขวัญอย่างไม่ต้องสงสัย! ทุกคนรู้สึกเหมือนฉันไหมคะ? เหมือนอากาศมันร้อนขึ้นมายังไงยังงั้นเลย!"
33050-20 = "สองสถาบันที่เปรียบเสมือนสุนัขกับลิง ไม่สิ แมวกับนกกามากกว่า! นี่แหละคือทรีนิตี้และเกเฮนน่า!"
33050-21 = "คะ...? ให้เลิกพูดอะไรเพ้อเจ้อแล้วเกาะติดสถานการณ์ดีๆ เหรอคะ? ก็ได้ค่ะ ตัดภาพไปที่หน้าจอแสดงข้อมูลต่อไปเลยค่ะ!"
33050-23 = "ว้าว นี่คือความรู้สึกกดดันอย่างรุนแรงเลยละค่ะ! ใช่แล้ว ที่นี่คือส่วนกลางของวิหารโบราณ ที่จะใช้เป็นสถานที่จัดพิธีลงนามค่ะ"
33050-25 = "ทำไมถึงมาจัดพิธีที่นี่นะ...? ตามแหล่งข่าวแล้ว ผู้นำของเกเฮนน่าเป็นคนเสนอแนะที่นี่มาค่ะ คาดไม่ถึงเลยใช่ไหมคะ?"
33050-26 = "เหตุผลเพราะที่นี่คือสถานที่ในประวัติศาสตร์ที่ใช้เปิดการประชุมสภาครั้งที่ 1 ของทรีนิตี้ในอดีตหรือเปล่า?"
33050-27 = "ไม่ใช่หรอกค่ะ... เหตุผลก็คืองานใหญ่ๆ ขนาดนี้ต้องจัดในสถานที่ยิ่งใหญ่เท่านั้น! "
33050-28 = "เยี่ยมไปเลยใช่ไหมคะ?! นี่คือคำตอบที่ว่าทำไมถึงจัดพิธีลงนามที่นี่ค่ะ!#nเรื่องแบบนี้ไม่เห็นจะต้องคิดให้ยาก!"
33050-29 = "ในการประชุมสภาครั้งที่ 1 กล่าวกันว่า <สาวกยูสตาร์> ที่เป็นกลุ่มอำนาจในขณะนั้น เป็นผู้ปกป้องบรรทัดฐานของสภาไว้ละค่ะ"
33050-30 = "นี่อาจจะทำให้ <ชมรมซิสเตอร์> ของทรีนิตี้มาเข้าร่วมพิธีในวันนี้ก็ได้!"
33050-31 = "<ชมรมซิสเตอร์> ถูกห้ามทำกิจกรรมภายนอกมาเป็นเวลานานแล้ว#nแต่เหตุใดถึงมาปรากฏตัวที่นี่ล่ะคะ?"
33050-32 = "หรือว่าจะมาประกาศว่าเป็นทายาทของ <สาวกยูสตาร์> ที่หายไปจากประวัติศาสตร์คะ? "
33050-33 = "วังวนการเมืองที่รุนแรงในสถาบันทรีนิตี้... สุดท้ายแล้ว... คะ? ให้ข้ามเรื่องยากๆ ไปเลยเหรอคะ? คนดูเริ่มน้อยลงแล้วเหรอคะ?"
33050-34 = "มากดดันกันในที่แบบนี้ได้ไง! ฉันขอร้องเรียนเพื่ออิสรภาพของสื่อค่ะ...!!"
33050-38 = "เราไม่สามารถปรับสภาพหน้าจอได้ชั่วคราวค่ะ ขออภัยในความไม่สะดวกนะคะ"
33050-40 = "การจรดปากกาลงนามในสนธิสัญญาเอเดนหมายถึงการที่ผู้นำทั้งสองสถาบันยอมรับ#nการจัดตั้งองค์กรสนธิสัญญาเอเดนในวิหารโบราณ..."
33050-42 = "และถ้าเป็นเช่นนั้น โรงเรียนทั้งสองแห่งที่ครั้งหนึ่งเคยเป็นศัตรูกันจะมีหน้าที่ร่วมกัน#nในการแก้ไขข้อพิพาทที่เกิดขึ้นค่ะ!"
33050-43 = "และยิ่งมาจัดพิธีในที่นี้แล้ว ก็คงต้องปฏิบัติหน้าที่อย่างแข็งขัน#nตามการปกป้องบรรทัดฐานที่ศักดิ์สิทธิ์ค่ะ!"
33050-44 = "สองสถาบันใหญ่ของคิโวทอสที่ต่อสู้กันมาไม่ต่างจากลิงกับเสือ#nในที่สุดก็ถึงเวลาที่ทั้งสองฝ่ายจะตกลงสันติภาพกันแล้วค่ะ!"
33050-45 = "นี่คือนาทีสำคัญเลย สงสัยจังค่ะว่าทางองค์การนักเรียนกำลังทำอะไรอยู่?"
33050-46 = "เราจะไปดูเทปบันทึกภาพการแถลงข่าวขององค์การนักเรียนที่จัดขึ้นอย่างกะทันหัน เมื่อวานนี้กันค่ะ!"
33050-48 = "...ขอจบการแถลงข่าวอย่างเร่งด่วนแต่เพียงเท่านี้ค่ะ"
33050-51 = "เดี๋ยวสิคะหัวหน้าฝ่ายบริหาร!#nนี่แปลว่าเรายังไม่พบร่องรอยของประธานองค์การนักเรียนเหรอคะ?"
33050-52 = "ถ้าจะให้สรุปก็ใช่ค่ะ"
33050-53 = "แล้วถ้าไม่สรุปล่ะคะ?!"
33050-55 = "คิดอย่างไรกับคำวิจารณ์ที่ว่าองค์การนักเรียนไร้ความสามารถคะ?"
33050-56 = "(ง่ำๆ) ก็มันจริงนี่"
33050-57 = "โมโมกะจัง..."
33050-58 = "พวกเราจะไม่พูดถึงการประเมินจากภายนอกนะคะ"
33050-59 = "ตอนนี้มีการเตรียมมาตรการตอบโต้ในการแบ่งพื้นที่ที่จะเกิดขึ้นในแต่ละเขตปกครองตนเองไหมคะ?"
33050-60 = "การตัดสินใจปิดสถาบัน SRT กับเหตุการณ์แซงค์ทัมทาวเวอร์มีความเกี่ยวข้องกันไหมคะ?#nส่วนหนึ่งของทาวเวอร์โดนเผาจนมอด เป็นเรื่องจริงไหมคะ?"
33050-61 = "มีความคิดอย่างไรเกี่ยวกับสนธิสัญญาระหว่างทรีนิตี้กับเกเฮนน่าคะ? "
33050-62 = "เรื่องที่เกิดขึ้นในแต่ละเขตปกครองตนเอง โดยพื้นฐานแล้วเป็นความรับผิดชอบของเขตนั้นๆ องค์การนักเรียนจะไม่เข้าไปแทรกแซงค่ะ"
33050-63 = "(ง่ำๆ) เราไม่มีเวลาจะไปยุ่งเกี่ยวหรอกนะ แถมคนก็ไม่มีด้วย"
33050-64 = "โมโมกะจัง... ชู่วว"
33050-65 = "เราขอไม่ตอบคำถามเพิ่มแล้วค่ะ "
33050-70 = "ค่ะ! แปลได้ว่า เราไม่ได้สนใจอะไร! แบบนี้เองสินะคะ "
33050-71 = "องค์การนักเรียนก็ยังคงไม่แคร์สื่อเหมือนเดิมเลย! เท่สุดๆ ไปเลยค่ะ! "
33050-72 = "งั้นต่อไปเราจะมาวิเคราะห์คำกล่าวทักทายสำคัญๆ ของโรงเรียนที่มาเข้าร่วม#nในพิธีลงนามสนธิสัญญาเอเดนในวันนี้..."
33050-75 = "คนเยอะเต็มไปหมดเลย..."
33050-76 = "ใช่ค่ะ! ก็วันนี้เป็นวันลงนามในสนธิสัญญาเอเดนแล้วนี่คะ เลือกจัดในวันหยุดที่ไม่มีคาบเรียนซะด้วย ก็ว่าอยู่ค่ะว่าทำไมคนบนถนนถึงเยอะแบบนี้!"
33050-77 = "มีนักข่าวจากโครโนสเต็มไปหมดเลย รู้สึกเหมือนเป็นงานเทศกาลเลยค่ะ!"
33050-78 = "นั่นสิคะ ฉันอยากให้คุณครูอยู่ด้วยจัง แต่ว่าก็น่าจะงานยุ่งกับสนธิสัญญาอยู่..."
33050-79 = "อึ่ก... ทำไมฉันถึงมาอยู่ตรงนี้ได้..."
33050-80 = "ฮุฮุ ก็เพราะโคฮารุจังยังเป็นสมาชิกชมรมชั้นเรียนเสริมยังไงล่ะคะ?"
33050-81 = "นี่ถือเป็นปาร์ตี้บอกลาชมรมชั้นเรียนเสริมของเราด้วย มาอยู่ด้วยกันเดี๋ยวเดียวไม่ได้เหรอคะ?"
33050-82 = "คะ... ใครบอกว่าไม่อยากอยู่ล่ะ?! แบบนี้มันก็ไม่ได้แย่อะไรเหรอก ก็... ก็เราเหนื่อยมาด้วยกันนี่นา..."
33050-83 = "อีกอย่างฉันก็บอกไปแล้วนี่ว่าถ้าคิดถึงก็มาหาที่ชมรมทวงความยุติธรรมได้#nฉันน่าจะอยู่ที่หน่วยอายัดทรัพย์สินตลอดแหละ"
33050-84 = "อืม... แล้วฉันจะแวะไปเที่ยวนะโคฮารุ"
33050-85 = "ดีเลยค่ะ แล้วฉันจะไปเอาหนังสือกระบวนท่าลับที่ถูกยึดไปคราวก่อนคืนนะคะ"
33050-86 = "กามะ... อะไรนะ? มันคืออะไรเหรอ?"
33050-87 = "วรรณกรรมคลาสสิกค่ะ เวลาได้นั่งอ่านที่น้ำพุจะทำให้อารมณ์ดีมากเลย แต่ดันโดนยึดไปซะได้..."
33050-88 = "วรรณกรรมคลาสสิก...? แบบนั้นก็น่าจะได้คืนนะ..."
33050-89 = "เดี๋ยวสิ แล้วเราจะยึดหนังสือแบบนั้นไปทำไม?!  บอกมาเลยนะ มันคือหนังสือ 18+ ใช่ไหม?#nต้องใช่แน่ๆ! ต้องยึดไว้แล้วเอาไปเผาให้หมด! สิ่งสกปรกจะต้องถูกแผดเผา!!"
33050-90 = "แต่ฉันยืมมาจากห้องสมุดโบราณนะคะ... เอาไปเผาไม่ได้นะ..."
33050-94 = "จะว่าไป อาซึสะจังเอาตุ๊กตานั่นติดตัวไปทุกที่เลยนะ"
33050-98 = "อืม... ของสำคัญแบบนี้ต้องเอาติดตัวไว้สิ"
33050-99 = "มะ... ไม่เป็นไรหรอกค่ะอาซึสะจัง! ไม่ต้องหวงน้องขนาดนั้นก็ได้ค่ะ#nโลกของ MOMO FRIENDS กว้างใหญ่มากเลยนะคะ เอาไว้สะสมของที่น่ารักๆ กว่านี้อีกก็ได้ค่ะ"
33050-100 = "งั้นเหรอ? อืม... น่าสนใจแล้วสิ"
33050-101 = "ค่ะ! แอนิเมชันบู๊ของท่านเพโรโร่ก็กำลังเข้าโรงแล้วด้วยนะคะ"
33050-102 = "อื้ม แอนิเมชัน...?"
33050-103 = "ใช่ค่ะ! ท่านเพโรโร่เอาชนะความยากลำบากและรวมพลังกับเพื่อนๆ เพื่อเอาชนะคนร้าย ฉากจบนี้น่าประทับใจมากเลยล่ะค่ะ..."
33050-104 = "อ้าว ทำไมสปอยล์ล่ะ?"
33050-105 = "คะ?!  เอ่อ... นั่นสิ... ลืมๆ ที่ฉันพูดไปเถอะค่ะ!!"
33050-106 = "โอ๊ะ... ฮิฟุมิจังชอบฉากจบแบบแฮปปี้เอนดิ้งสินะคะ?"
33050-107 = "เออะ... เอ่อ... ค่ะ ฉันชอบแบบนั้น... หรือมันดูธรรมดาไปไหมคะ...? "
33050-108 = "มันไม่ง่ายไปหน่อยเหรอ? ฉากจบที่ทุกคนมาหัวเราะเริงร่าด้วยกันน่ะ..."
33050-109 = "ฉันไม่รู้หรอกว่าแฮปปี้เอนดิ้งมันจะดีจริงๆ หรือเปล่า เพราะต่อให้พยายามแค่ไหน โลกก็ไม่เปลี่ยนแปลงไปอยู่ดี นี่แหละความจริงของโลกใบนี้"
33050-110 = "อ่า... ทุกคนดูจะชอบอะไรดาร์กๆ นะคะ... "
33050-111 = "ฉันไม่ค่อยดูอะไรแบบนั้นหรอกค่ะ... ฉันชอบฉากจบแบบแฮปปี้เอนดิ้งที่ทุกคนมีความสุข..."
33050-112 = "เราต่างก็มีรสนิยมของตัวเองนี่คะ อ้อ! ส่วนฉันชอบฉากจบที่นางเอกน้ำลายไหลย้อย แล้วขอให้ยกโทษให้ค่ะ♡"
33050-113 = "พูดอะไรของเธอเนี่ย!? มีฉากจบแบบนั้นที่ไหนกันเล่า!"
33050-114 = "อืม... จะไม่มีเลยเหรอ..."
33050-115 = "ไม่เป็นไรหรอกนะฮิฟุมิ ถ้าเธอชอบ ฉันก็ชอบด้วย"
33050-119 = "งื้อออ อาซึสะจัง!"
33050-125 = "ตายจริง♡"
33050-126 = ".......!"
33050-128 = "นั่นสินะคะ... "
33050-129 = "ฉันอยากพูดคุยกับคุณครูหลังสิ้นสุดสนธิสัญญาวันนี้จังเลยค่ะ#nอยากใช้เวลาด้วยกันแบบไม่ต้องเร่งรีบ..."
33050-130 = "อืม... ฉันก็หวังว่าจะได้พูดคุยอย่างสบายๆ กับคุณครูเหมือนกัน"
33050-131 = "คุณครู... อยากให้อยู่ตรงนี้ด้วยกันจัง"
33050-132 = "นั่นสิคะ... ตอนนี้คุณครูอยู่ที่วิหารโบราณไหมนะ... ตอนนี้น่าจะกำลังยุ่งเลย ว่าไหมคะ?"
33050-134 = "โถงกลางในวิหารโบราณ"
33050-136 = "[ns] \"เฮ้อ... ไม่มีอะไรทำเลย\""
33050-139 = "ตอนต่อไป;พิธีลงนามสนธิสัญญาเอเดน (2)"

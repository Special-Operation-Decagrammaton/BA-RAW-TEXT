[translation]
33050-1 = "#title;제5화;에덴조약 조인식 1"
33050-2 = "#wait;1500"
33050-3 = "#all;hide"
33050-4 = "#na;시논;안녕하세요! TV 앞의 시청자 여러분!"
33050-5 = "#na;시논;크로노스 스쿨 보도부의 아이돌 리포터! 카와루 시논! 인사드립니다!"
33050-6 = "#na;시논;네, 드디어 체결되는 에덴조약 조인식, 그 뜨거운 현장에 나와있습니다!"
33050-7 = "#na;시논;자아, 저는 지금 게헨나 학원과 트리니티 학원의 공식 협정이 체결될 예정인 <통공의 고성당> 앞에 나와있는데요."
33050-8 = "#zmc;instant;0,0;2528\n#all;hide"
33050-9 = "#zmc;move;0,0;2528;10"
33050-10 = "#zmc;move;0,100;2528;1000\n#wait;1500"
33050-11 = "#zmc;instant;0,100;2528\n#all;hide"
33050-12 = "#zmc;move;0,100;2528;10"
33050-13 = "#zmc;move;100,100;2528;1000\n#wait;1500"
33050-14 = "#zmc;instant;100,100;2528\n#all;hide"
33050-15 = "#zmc;move;100,100;2528;10"
33050-16 = "#zmc;move;0,100;2528;1000\n#wait;1500"
33050-17 = "#zmc;instant;0,100;2528\n#na;시논;오오, 뜨겁습니다! 서로 조금의 빈틈도 보이지 않겠다는 양측의 팽팽한 신경전!"
33050-18 = "#zmc;instant;0,100;2528\n#na;시논;누가 방아쇠를 잘못 누르기라도 하면 대참사가 벌어져도 이상하지 않은 분위기! 느껴지시나요? 이 쓸데없이 높은 온도감이!"
33050-19 = "#all;hide"
33050-20 = "#na;시논;과연 개와 원숭이같은, 아니, 고양이와 까마귀 같은 두 학원! 이것이 바로 트리니티와 게헨나!"
33050-21 = "#na;시논;……네? 쓸데없는 소리 하지말고 진행하라고요? 알겠습니다, 어김없이 날아오는 데스크의 딴죽과 함께, 다음 자료 화면으로 넘어가겠습니다!"
33050-22 = "#zmc;instant;0,-222;2528\n#all;hide"
33050-23 = "#zmc;instant;0,-222;2528\n#na;시논;우와, 엄청난 위압감입니다! 네, 이게 바로 지금 조인식이 열리고 있는 고성당 본관의 모습입니다."
33050-24 = "#all;hide"
33050-25 = "#na;시논;왜 하필 이런 곳에서 조인식을……? 소식통에 의하면, 이 장소는 의외로 게헨나의 수뇌부가 제안한 곳이라고 합니다!"
33050-26 = "#na;시논;이곳이 과거, 트리니티의 제1차 공의회가 개최된 역사적인 장소이기 때문에?"
33050-27 = "#na;시논;아뇨…… 이 정도의 큰 이벤트에는 큰 권위가 있는 장소여야만 한다……!"
33050-28 = "#na;시논;요컨대, 폼나잖아! 그런 이유라는 것입니다! 과연! 이해하기 쉬워서 좋군요!"
33050-29 = "#na;시논;제1차 공의회! 그 당시에 있었던 <유스티나 성도회>라는 강력한 집단이 이 공의회의 계율을 수호했다고 하는데요."
33050-30 = "#na;시논;그 때문인지는 몰라도 트리니티의 <시스터후드> 동아리도 이 조인식에 참석을 한 것이 확인되었습니다!"
33050-31 = "#na;시논;오랫동안 외부활동을 금하고 있던 <시스터후드>가 무슨 이유일까요?"
33050-32 = "#na;시논;<유스티나 성도회>, 지금은 역사 속으로 사라진 그 조직의 후신을 자처하겠다는 선언일까요?"
33050-33 = "#na;시논;트리니티 학원에 몰아치는 정치의 소용돌이는 과연…… 네? 어려운 이야기는 넘어가라고요? 접속자 수가 떨어지고 있다고요?"
33050-34 = "#na;시논;이런 곳에서 또 데스크의 압력이! 규탄한다!! 언론의 자유를……!!"
33050-35 = "#st;[0,0];instant;1;"
33050-36 = "#clearST"
33050-37 = "#wait;1500"
33050-38 = "#na;안내 방송;잠시 화면 상태가 고르지 못했습니다. 시청자분들의 양해를 부탁드립니다."
33050-39 = "#all;hide"
33050-40 = "#na;시논;……에덴조약이 체결되면 두 학원의 수뇌부는 고성당에서 에덴조약기구군 창설에 동의하게 됩니다!"
33050-41 = "#all;hide"
33050-42 = "#na;시논;그렇게 되면 앙숙이던 두 학원은 강제적으로 서로간에 벌어지는 분쟁을 함께 해결해야 하는 의무를 지게 됩니다!"
33050-43 = "#na;시논;고성당에서 체결하는 만큼, 신성한 계율의 수호에 따라 그 의무를 성실히 수행해야겠죠!"
33050-44 = "#na;시논;즉, 개와 원숭이처럼 싸워대던 키보토스의 유명한 두 거대 학원이 마침내 평화에 합의하는 순간인 것입니다!"
33050-45 = "#na;시논;이런 굉장한 일이 벌어지고 있는데, 총학생회는 과연 무엇을 하고 있을까요?"
33050-46 = "#na;시논;네, 어제 있었던 총학생회의 긴급 기자회견 방송을 잠깐 보시겠습니다!"
33050-47 = "#all;hide"
33050-48 = "#na;린;……그렇게 해서 긴급 기자회견을 마치겠습니다. 이상입니다."
33050-49 = "#st;[0,0];instant;1;"
33050-50 = "#wait;2500\n#clearST"
33050-51 = "#zmc;move;-316,-222;2528;200\n#na;학생 기자 A;잠깐만요, 수석행정관! 그러니까, 총학생회장의 행방은 아직도 찾지 못했다, 라는 얘기잖아요?"
33050-52 = "#zmc;instant;-316,-222;2528\n#na;린;요약하면 그렇습니다."
33050-53 = "#zmc;instant;-316,-222;2528\n#na;학생 기자 A;요약 안 해도 그 얘기인데요?!"
33050-54 = "#zmc;move;-316,-222;2528;10"
33050-55 = "#zmc;move;316,-222;2528;200\n#na;학생 기자 B;총학생회가 너무 무능한 거 아니냐는 세간의 평가에는 어떻게 생각하십니까?"
33050-56 = "#zmc;move;-580,-111;1896;500\n#na;모모카;(와작와작) 뭐, 사실이지.\n#fontsize;55"
33050-57 = "#zmc;move;-632,333;1896;500\n#na;아유무;모모카 쨩…….\n#fontsize;55"
33050-58 = "#zmc;move;0,333;1896;500\n#na;린;저희는 외부의 평가에 대해 특별히 코멘트하지 않습니다."
33050-59 = "#zmc;move;0,0;3160;200\n#na;학생 기자 C;각종 자치구에서 벌어지는 젠트리피케이션의 대응책은 준비하고 계신가요?"
33050-60 = "#na;학생 기자 D;SRT 학원의 폐쇄 결정과 저번의 생텀타워 소요 사건은 관계가 있나요? 타워 일부가 전소되었다고 들었습니다!"
33050-61 = "#na;학생 기자 E;트리니티와 게헨나가 체결하는 조약에 대해서는 어떻게 생각하십니까?"
33050-62 = "#na;린;각 학원 자치구에서 벌어지는 일은 기본적으로 자치구의 책임. 총학생회는 그것에 개입하지 않습니다."
33050-63 = "#zmc;move;-580,-111;1896;500\n#na;모모카;(와작와작) 개입할 시간도, 인력도 없거든.\n#fontsize;55"
33050-64 = "#zmc;move;-632,333;1896;500\n#na;아유무;모모카 쨩 쉿…….\n#fontsize;55"
33050-65 = "#zmc;move;0,333;1896;500\n#na;린;더 이상의 질문은 받지 않겠습니다."
33050-66 = "#st;[0,0];instant;1;"
33050-67 = "#clearST"
33050-68 = "#all;hide\n#wait;1500"
33050-69 = "#all;hide"
33050-70 = "#na;시논;네! 요컨대, 별 관심이 없다! 라는 것이네요."
33050-71 = "#na;시논;과연 총학생회! 여전히 대범함이 하늘을 찌르고 있습니다! 역시 멋져요!"
33050-72 = "#na;시논;그럼 다음에는 이 에덴조약에 참석하는 각 학원들의 주요 인사에 대한 분석을……."
33050-73 = "#all;hide"
33050-74 = "#wait;1500"
33050-75 = "3;아즈사;02;……다들 시끄럽네.\n#3;a\n#3;em;…"
33050-76 = "5;히후미;03;네! 드디어 오늘 에덴조약이 체결되는 날이니까요. 휴일로 지정되어서 수업도 없고, 어쩐지 거리도 사람들로 가득 차 있고요!\n#5;a\n#5;em;[반짝]\n#3;m1"
33050-77 = "5;히후미;00;크로노스 방송 쪽 분들도 여기저기 보이고 있고 축제 같은 느낌이에요!"
33050-78 = "1;하나코;01;그러게요. 선생님도 함께 계셨으면 좋겠지만, 아무래도 조약 쪽의 일로 바쁘신 것 같고…….\n#1;a\n#3;hide"
33050-79 = "5;코하루;00;으으……. 어째서 나는 여기에…….\n#5;a\n#5;stiff"
33050-80 = "1;하나코;03;후후, 아직까진 우리는 보충수업부니까요, 코하루 쨩?\n#1;em;[하트]"
33050-81 = "1;하나코;01;이게 우리 보충수업부의 해산 파티겸이기도 하니까, 조금만 어울려주면 안될까요?"
33050-82 = "5;코하루;11;누, 누가 싫댔어?! 이것도 딱히 나쁘지 않다고? 다, 다 같이 고생했으니까…….\n#5;hophop"
33050-83 = "5;코하루;00;그리고 말했잖아, 언제든지 정의실현부에 놀러오라고. 나는 주로 압류품 관리처에 있으니까."
33050-84 = "1;아즈사;03;응. 놀러 갈게. 코하루.\n#1;em;[반짝]"
33050-85 = "1;하나코;03;네. 그럼 저도 저번에 압수당한 카마수트라 책을 돌려받으러 갈게요.\n#1;greeting"
33050-86 = "5;코하루;04;카마…… 뭐? 그게 뭐야?\n#5;em;[///]\n#5;stiff"
33050-87 = "1;하나코;99;고전 문학작품이에요. 분수대에 앉아서 읽으면 기분이 좋아지는 내용인데 어쩌다 압수를 당해서……."
33050-88 = "5;코하루;05;고전 문학? 그, 그런거라면 뭐……."
33050-89 = "5;코하루;09;……아니, 그럴 리가 없잖아?! 야한 거지? 야한 거잖아! 압수! 소각이야! 오물은 소각!!\n#5;hophop\n#5;m4"
33050-90 = "1;하나코;04;으응, 고서관에서 빌린 거라…… 태워버리면 곤란한데…….\n#1;em;[땀]"
33050-91 = "#st;[0,0];instant;1;"
33050-92 = "#clearST"
33050-93 = "5;코하루;09\n1;하나코;04\n#1;d\n#5;d\n#wait;1000"
33050-94 = "#1;hide\n#5;hide\n3;히후미;01;그런데 그 인형은 계속 가지고 다니는 거예요, 아즈사 쨩?\n#3;a\n#3;em;[?]"
33050-95 = "#st;[0,0];instant;1;"
33050-96 = "#clearST"
33050-97 = "#all;hide\n#wait;1500"
33050-98 = "1;아즈사;01;응. 소중한 물건이니까. 가지고 다녀야지.\n#1;a\n#1;em;[반짝]"
33050-99 = "5;히후미;04;아, 아뇨, 아즈사 쨩!? 그렇게 아끼지 않아도 괜찮다구요? 모모프렌즈의 세계는 넓으니까, 더 귀여운 것들을 수집해도 된다구요?\n#5;a\n#5;shake\n#5;em;[?!]"
33050-100 = "1;아즈사;99;그런가. 응. 그것도 기대되는 걸."
33050-101 = "5;히후미;03;네! 이번에 새로 개봉하는 페로로 님의 활극 애니메이션도 있고요!\n#5;m4\n#5;hophop\n#5;em;[반짝]"
33050-102 = "1;아즈사;02;음. 애니메이션……?\n#1;em;[반짝]"
33050-103 = "5;히후미;00;네! 특히 힘든 고난을 극복하고 동료들과 힘을 합쳐 악당을 물리치는 엔딩이 정말 감동적이라고……."
33050-104 = "1;코하루;05;그거 스포일러 아냐?\n#1;em;[땀]"
33050-105 = "5;히후미;04;네?! 그, 그러네요……?! 방금 건 잊어주세요?!\n#5;shake\n#5;em;[?!]"
33050-106 = "1;하나코;02;어머나…… 히후미 쨩은 해피 엔딩을 좋아하는 쪽?"
33050-107 = "5;히후미;01;아, 아우우……. 네. 그렇긴 한데…… 여, 역시 좀 평범한 느낌일까요……. \n#5;stiff"
33050-108 = "1;코하루;07;뻔하잖아, 그런 거. 다들 마지막에 시끄럽게 하하호호거리기나 하고…….\n#1;em;[반응]\n#1;jump"
33050-109 = "1;아즈사;99;나도 해피엔딩은 잘 모르겠어. 애써봤자 세계는 바뀌지 않아. 그게 이 세계의 진실이니까."
33050-110 = "5;히후미;04;아우우……. 다들 다크한 걸 좋아하나보네요……. \n#5;stiff"
33050-111 = "5;히후미;01;저는 그런 건 조금 보기 힘들달까…… 모두가 행복해지는 해피엔딩이 좋은데…… 아우우…….\n#5;em;…\n#5;m3\n#1;dl"
33050-112 = "#1;hide\n#5;hide\n3;하나코;03;응, 취향은 마음대로니까요. 참고로 저는 여주인공이 풀린 눈으로 침을 흘리며 용서를 비는 엔딩이 좋아요♡\n#3;em;[하트]\n#3;closeup"
33050-113 = "3;코하루;09;무슨 헛소릴 하는 거야! 그런 엔딩이 어딨어!\n#3;hophop\n#3;closeup"
33050-114 = "3;하나코;04;으응…… 없으려나……."
33050-115 = "3;아즈사;03;하지만 상관없어. 히후미. 네가 좋다면 나도 상관없으니까.\n#3;em;[반짝]"
33050-116 = "#st;[0,0];instant;1;"
33050-117 = "#clearST"
33050-118 = "3;히후미;02\n#3;stiff\n#wait;1500\n#3;closeup"
33050-119 = "#all;hide\n#na;히후미;으아앙- 아즈사 쨩!\n#fontsize;100"

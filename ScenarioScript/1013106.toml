[translation]
1013106-1 = "夜空下的公主殿下"
1013106-3 = "[ns]「話說，居然有極光啊……」"
1013106-4 = "是的，在赤冬偶爾能看到。"
1013106-5 = "還有這種極光預報的APP哦？"
1013106-6 = "[s]「你很喜歡攝影嗎？」"
1013106-7 = "應該……算是吧？"
1013106-8 = "跟人像相比，我更喜歡拍攝風景。"
1013106-9 = "某方面來說……我認為評論與攝影之間，存在著一定程度的共同點。"
1013106-10 = "[s]「我倒沒有這麼想過呢。」"
1013106-11 = "咳哼。事情是這樣的，老師。"
1013106-12 = "所謂的評論，基本上就是將看到某種文化創作時所產生的心像……"
1013106-13 = "運用自己的邏輯，以文字的形式「顯影」出來對吧？"
1013106-14 = "所以，也能說是將那一瞬間的心像，透過自己的詮釋法將其「定影」下來的行為。"
1013106-15 = "而那被詮釋過後的心像──也就是「評論」，#n在經過眾人的閱讀與理解後，便能在某種程度上獲得「客觀性」。"
1013106-16 = "所謂的客觀性，不就代表著「任何人看都會認同」的觀點嗎？"
1013106-17 = "因此，我才會認為評論與攝影存在著共通點。"
1013106-18 = "[s]「因為攝影某方面來說也是客觀的？」"
1013106-19 = "是的。然而由於拍攝者的技術差異……"
1013106-20 = "或者感受方面的不同，成果也會隨之改變。"
1013106-21 = "從主觀出發，卻試圖保證客觀性的評論。"
1013106-22 = "從客觀出發，卻也蘊含著主觀性的攝影。"
1013106-23 = "這種矛盾卻又環環相扣的關係，不覺得很有趣嗎？"
1013106-24 = "至少……我是這麼認為的。"
1013106-25 = "創作與評論的關係，應該也是如此吧。"
1013106-26 = "[s]「創作……創作啊……」"
1013106-27 = "嗯？問我有沒有想過要親自創作看看……？"
1013106-28 = "這，這……"
1013106-29 = "這個嘛……"
1013106-30 = "啊……！"
1013106-34 = "老師！有極光！"
1013106-41 = "……大自然真的很偉大呢。"
1013106-42 = "每當我看著這樣的景象，總是會不禁感嘆人類的微不足道。"
1013106-43 = "甚至會思考為什麼要做評論，創作又有什麼意義之類的事……"
1013106-44 = "但是即便如此，我依然認為──創作是人類所能創造出的、最美麗的結果之一。"
1013106-45 = "不是有句話說「人本身或許不美，但人所創造出的事物卻可以很美」嗎？"
1013106-46 = "……如果無法感受到某樣東西的美，自然也不可能產生想將其創造出來的慾望了吧。"
1013106-47 = "而評論……或許就是我能為那些由人創造出的美……"
1013106-48 = "所獻上的……屬於我的讚賞吧。"
1013106-49 = "[s1]「既然如此……」\n[s2]「我想幫貴音拍張照，可以嗎？」"
1013106-52 = "咦，咦咦！？老師您嗎……？#n雖，雖然我很感激也很高興……不過您為何突然提議要拍照呢？"
1013106-53 = "咦咦咦！？既然要拍，乾脆來設定一個主題？#n老，老師想拍什麼樣的主題呢……？"
1013106-54 = "要我自己「創作」！？#n這也太突然了吧！？！？"
1013106-55 = "[s3]「可是你看！」\n[s4]「極光很美，創作也很美呀！」"
1013106-58 = "把美的東西跟美的東西加在一起，就會變得更美……！？"
1013106-59 = "這不就是「在章魚燒上面淋薄荷巧克力醬也一定會很美味」的邏輯嗎！？"
1013106-63 = "況且創作……並不是評論家涉足的領域……"
1013106-64 = "雖，雖然我確實看過很多作品，但我還是覺得那樣有種冒犯了別人領域的感覺……！"
1013106-65 = "我不想輕視創作者們所經歷的痛苦……"
1013106-66 = "因為瞧不起創作而草率開始，最終卻傷害了所有人的情況……我已經見過非常多了。"
1013106-67 = "嗯？那就只在這裡，來一場只有老師一名讀者的「祕密創作」吧……？"
1013106-68 = "只在這裡施展魔法，就算只是一場夢也沒關係，試著扮演想成為的自己……？"
1013106-69 = "[s]「嗯，現在就由我來當貴音的『評論家』吧。」"
1013106-70 = "……！"
1013106-71 = "這，這樣的話……"
1013106-72 = "至少，關鍵字之類的……請由老師來決定吧……"
1013106-73 = "[s5]「那就設定成家道中落後受到驅逐的公爵千金！」\n[s6]「在逃難途中看見了極光，於是被深深感動了吧！」"
1013106-76 = "為何每個人見到我都一定會說類似的故事呢……我實在難以理解。"
1013106-77 = "……不過好吧。這畢竟是老師決定的關鍵字。"
1013106-78 = "咳哼。"
1013106-79 = "在我之上有三位姊姊，而我則是名門家族中的么女。"
1013106-80 = "雖然受到許多人的疼愛……可惜我的身體從小就不是很強健。"
1013106-81 = "或許是出於無法經常出門玩耍而產生的補償心理，我經常對身邊的人開一些小玩笑。"
1013106-82 = "因此姊姊們總是稱呼我為[ruby=Shvibzik]「小頑童」[/ruby]。#n其中我跟三姊瑪麗亞的感情特別好。"
1013106-83 = "在身體狀況尚可的日子裡，#n我們會用同一顆枕頭睡在簡易的床上，早晨則會一起用冷水沐浴。"
1013106-84 = "雖然我其實很討厭冷水澡，但是姊姊說這樣身體才會變健康……"
1013106-85 = "然而……因為發生了種種不幸的事，我的家族最終沒落了……"
1013106-87 = "我們四姊妹為遙遙無期的重逢許下約定後便各奔東西，踏上了遙遠的旅程……"
1013106-94 = "― [log=타카네]老師，請看…… [/log][wa:1770] "
1013106-96 = "― [log=타카네]是極光呢。[/log][wa:120] "
1013106-99 = "― [log=타카네]在故事中，[/log]"
1013106-101 = "― [log=타카네]有著天空的守護者們──[/log]"
1013106-104 = "― [log=타카네]享受宴會的模樣[/log]"
1013106-106 = "― [log=타카네]看起來就是這樣的說法。 [/log][wa:910] "
1013106-109 = "― [log=타카네]雖然曾經以為會永遠待在一起的人們，[/log][wa:1440] "
1013106-111 = "― [log=타카네]已經……再也見不到了。[/log][wa:2140] "
1013106-114 = "― [log=타카네]世界想必仍會一如既往，[/log][wa:2110] "
1013106-116 = "― [log=타카네]充滿著寒冷、令人感覺遙遠吧。 [/log][wa:2220] "
1013106-119 = "― [log=타카네]而我之所以仍會仰望極光，[/log][wa:1050] "
1013106-121 = "― [log=타카네]懷抱希望──[/log]"
1013106-124 = "― [log=타카네]或許是因為在這個地方，有個願意陪伴我到最後的[/log][wa:3270] "
1013106-126 = "― [log=타카네]「夥伴」在身邊吧。 [/log][wa:880] "
1013106-129 = "[ns]「啊，原來如此。我現在是你的夥伴啊。」"
1013106-131 = "― [log=타카네]呵呵。是的。[/log][wa:1850] "
1013106-133 = "― [log=타카네]現在是這種設定哦，「老師」。[/log][wa:2390] "
1013106-136 = "― [log=타카네]照片，就麻煩您囉？[/log][wa:2120] "
1013106-139 = "……"
1013106-140 = "[s]「為，為什麼要那麼彆扭呢，公主殿下……？」"
1013106-141 = "才不是公主殿下！那個設定已經結束了！#n我就只是三善貴音而已，以後也永遠都是！"
1013106-142 = "真是的……假如這是別人的創作，我肯定會在翻開第一頁的瞬間……"
1013106-143 = "在看見第一行時就給出「老套到讓我達成了在一分鐘之內放棄閱讀的偉業」的評論！"
1013106-144 = "[s]「可是那不是你自己創作的嗎？」"
1013106-145 = "是老師叫我做的吧！！！！！"
1013106-146 = "嗚嗚……請快給我看照片吧……"
1013106-147 = "[s]「覺得怎麼樣？」"
1013106-148 = "……"
1013106-149 = "拍得很好呢，真的……"
1013106-150 = "謝謝您，老師。"
1013106-151 = "那個，我有件事想拜託您……"
1013106-152 = "這張照片……還有在這裡發生的事……"
1013106-153 = "希望您不要向任何人提起。"
1013106-154 = "[s]「有這麼難為情嗎？」"
1013106-155 = "這部分的原因當然也有……"
1013106-160 = "不過更主要的理由……是我希望能將這一切，當成只屬於老師和我的祕密。"

[translation]
1013106-1 = "Princess Under the Night Sky"
1013106-3 = "[ns] \"I can't believe I'm seeing an aurora...\""
1013106-4 = "Yes, it occasionally shows itself over Red Winter."
1013106-5 = "We even have an aurora forecast app."
1013106-6 = "[s] \"I see you like taking photos.\""
1013106-7 = "I...suppose?"
1013106-8 = "...Though, I am more interested in capturing scenic landscapes than taking portraits."
1013106-9 = "I feel that, in a way, that taking photographs and forming critiques share considerable common ground."
1013106-10 = "[s] \"I never considered that.\""
1013106-11 = "Ahem. Please allow me to expand on my thesis, Sensei."
1013106-12 = "The purpose of critique is to observe a cultural work, and then use one's own logic and words..."
1013106-13 = "...to transcribe one's feelings through the act of writing."
1013106-14 = "In a way, you seek to capture the feelings and impressions of a certain moment, and articulate those to another."
1013106-15 = "And your impression, or \"critique,\" is then read by your peers, then reinterpreted and edited to convey an air of objectivity."
1013106-16 = "To seek \"objectivity\" is, perhaps, the fruitless effort to represent a universal point of view."
1013106-17 = "That's how I see the link between photography and critique."
1013106-18 = "[s] \"So you're saying that a photo conveys objectivity?\""
1013106-19 = "To an extent. Nothing is truly \"objective.\" The photographer makes dozens of decisions, after all. Consider the lens, the framing, the shutter speed..."
1013106-20 = "All these micro-decisions impact the resulting photograph and how it will be interpreted."
1013106-21 = "Any attempt to secure objectivity will inevitably involve a multitude of subjective decisions."
1013106-22 = "The creator's fingerprints will naturally show on any work."
1013106-23 = "Don't you find that intertwined tension interesting?"
1013106-24 = "At least... I think it is."
1013106-25 = "I feel the same could be said about the relationship between creative works and critique."
1013106-26 = "[s] \"Creative works...?\""
1013106-27 = "What? Have I ever considered making my own...\"more creative\" works?"
1013106-28 = "Uh... Well..."
1013106-29 = "I..."
1013106-30 = "Ah...!"
1013106-34 = "Sensei! An aurora!"
1013106-41 = "...Nature is amazing, is it not?"
1013106-42 = "Whenever I witness nature's grandeur, I can't help but consider that we as people are mere motes of dust floating in a grand, vast universe."
1013106-43 = "Sometimes I even ponder why I bother writing critiques or even consider being creative..."
1013106-44 = "Yet, at the same time, I believe creative expression is one of the most beautiful endeavors a person can attempt."
1013106-45 = "You know what they say: \"people may not be beautiful, but what they create could be.\""
1013106-46 = "...Unless one finds something to be truly breathtaking, they will never be inspired enough to attempt the act of creation."
1013106-47 = "Perhaps \"critique\" is my form of a creative expression..."
1013106-48 = "...My own unique way of celebrating beauty."
1013106-49 = "[s1] \"In that case...\"\n[s2] \"I'd like to take a photo of you. Would that be okay?\""
1013106-52 = "Wh-What?! You, taking a picture of me...? I-I mean, I would be grateful and happy but... Why all the sudden?"
1013106-53 = "Whaaaat?! You want me to create a \"theme\" for my pose? Wh-What kind of theme did you have in mind...?"
1013106-54 = "Y-You want me to come up with one? Spontaneously? This is so SUDDEN, Sensei!"
1013106-55 = "[s3] \"But look!\"\n[s4] \"The aurora is beautiful and so is the very act of creation!\""
1013106-58 = "What? Adding something pretty on top of something else pretty would just be additive, not harmonious!"
1013106-59 = "Do you also enjoy pouring mint chocolate syrup on hot takoyaki?"
1013106-63 = "Above all, creation...isn't part of the...a critic's repertoire..."
1013106-64 = "Y-Yes, of course I read and appreciate a bevy of different works! But still! This feels like I'm over-stepping into someone else's world..."
1013106-65 = "I don't want to undermine the struggle of those who are courageous enough to create..."
1013106-66 = "...I've seen plenty of incidents where someone was haphazardly creative, and it resulted in widespread pain and suffering."
1013106-67 = "What? You really think it's permissible? If I'm with you? It can be a secret?"
1013106-68 = "...To capture a single, magical moment...just for me. How aspirational."
1013106-69 = "[s] \"Yes. Let me be your critic, Takane.\""
1013106-70 = "...!"
1013106-71 = "Th-Then..."
1013106-72 = "Could you inspire me with some...keywords...or something...?"
1013106-73 = "[s5] \"You're a disgraced princess on the run!\"\n[s6] \"And, despite the chaos, you're taken by the pure beauty of the aurora!\""
1013106-76 = "...Why do people keep telling me things like that...?"
1013106-77 = "All right. If it's something you came up with, Sensei..."
1013106-78 = "Ahem."
1013106-79 = "I had three older sisters, making me the youngest in a quite well-respected family."
1013106-80 = "I was beloved by the people, but ever since I was a child...I was struck by a tragic frailty."
1013106-81 = "I was never allowed to have fun outside, so I always instead chose to pull pranks on the people around me..."
1013106-82 = "Because of that, my sisters called me \"little menace,\" and I was particularly close with my third sister."
1013106-83 = "Whenever I wasn't sick, we would share a pillow on our cot. On mornings, we'd bathe together in cold water."
1013106-84 = "I never liked cold baths, but my sister insisted it would help with my health..."
1013106-85 = "But...due to a number of unfortunate events, our house came to ruin..."
1013106-87 = "And we, the four sisters, scattered and said goodbye, without ever knowing if we'd find each other again."
1013106-94 = "― [log=타카네]Sensei, look... [/log][wa:1450] "
1013106-96 = "― [log=타카네]An aurora.[/log][wa:10] "
1013106-99 = "― [log=타카네]Old stories say[/log]"
1013106-101 = "― [log=타카네]that the light is of...[/log]"
1013106-104 = "― [log=타카네]guardians of the heavens,[/log]"
1013106-106 = "― [log=타카네]enjoying a banquet. [/log][wa:590] "
1013106-109 = "― [log=타카네]The ones who I thought would be with me forever...[/log][wa:120] "
1013106-111 = "― [log=타카네]...can no longer be found.[/log][wa:1540] "
1013106-114 = "― [log=타카네]And the world[/log][wa:2030] "
1013106-116 = "― [log=타카네]continues to feel cold and far.[/log][wa:1580] "
1013106-119 = "― [log=타카네]But I can still look up at the aurora[/log][wa:50] "
1013106-121 = "― [log=타카네]and have hope because...[/log]"
1013106-124 = "― [log=타카네]My \"partner,\" who will stay by my side until the end...[/log][wa:1950] "
1013106-126 = "― [log=타카네]...is right here.[/log][wa:600] "
1013106-129 = "[ns] \"Oh, that would make me the partner, then?\""
1013106-131 = "― [log=타카네]Fufu. Yes...[/log][wa:1610] "
1013106-133 = "― [log=타카네]That's the prelude to this story.[/log][wa:1630] "
1013106-136 = "― [log=타카네]Please take a good photo, okay?[/log][wa:1240] "
1013106-139 = "..."
1013106-140 = "[s] \"Wh-Why are you looking at me like that, my lady...?\""
1013106-141 = "I'm not your lady! We're done with that! I'm just Miyoshi Takane, and always will be!"
1013106-142 = "Really... If someone else wrote that story, I would only need to read one page to form a verdict..."
1013106-143 = "\"A tale so derivative and hackneyed that its first line moved me...in record time...to slam it shut and throw it in the bin!\""
1013106-144 = "[s] \"But you wrote it yourself.\""
1013106-145 = "Only because you told me to! I wasn't prepared!"
1013106-146 = "Ugh... Just show me the photograph, please."
1013106-147 = "[s] \"So?\""
1013106-148 = "..."
1013106-149 = "It came out wonderfully..."
1013106-150 = "Thank you, Sensei."
1013106-151 = "I would like to ask one thing of you."
1013106-152 = "This photograph, and whatever...else...happened here..."
1013106-153 = "Please don't mention it to anyone else."
1013106-154 = "[s] \"Is it really that embarrassing?\""
1013106-155 = "Well, that's certainly a part of it."
1013106-160 = "I want to keep some things between you and me, Sensei."

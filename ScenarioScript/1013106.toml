[translation]
1013106-1 = "ท่านหญิงใต้ท้องฟ้ายามค่ำคืน"
1013106-3 = "[ns] \"ที่นี่มีแสงเหนือด้วยเหรอเนี่ย...\""
1013106-4 = "ค่ะ บางครั้งในเรดวินเทอร์ก็มีแสงเหนือให้เห็นค่ะ"
1013106-5 = "ฉันมีแอปฯ พยากรณ์แสงเหนือด้วยนะคะ"
1013106-6 = "[s] \"ทาคาเนะชอบถ่ายรูปสินะ?\""
1013106-7 = "ก็... ค่อนข้างชอบนะคะ"
1013106-8 = "แต่ว่าฉันชอบถ่ายรูปวิวทิวทัศน์มากกว่าผู้คนค่ะ"
1013106-9 = "ในแง่หนึ่ง... ฉันว่าการวิจารณ์กับการถ่ายรูปก็มีจุดที่คล้ายคลึงกันค่ะ"
1013106-10 = "[s] \"ครูไม่เคยคิดแบบนั้นมาก่อนเลยแฮะ\""
1013106-11 = "อะแฮ่ม มันเป็นอย่างนี้น่ะค่ะ คุณครู"
1013106-12 = "โดยสรุปแล้ว คำวิจารณ์ก็คือ... ภาพที่ผุดขึ้นมาในใจตามตรรกะของตัวเองเมื่อมองดูผลงานสร้างสรรค์#nทางวัฒนธรรม..."
1013106-13 = "แค่มันถูก 'ถ่ายทอด' ออกมาในรูปแบบตัวอักษรแทนน่ะค่ะ"
1013106-14 = "ในแง่หนึ่งอาจกล่าวได้ว่าภาพในขณะนั้นถูก 'ถ่าย' ไว้โดยวิธีการตีความของแต่ละคนค่ะ"
1013106-15 = "และภาพที่ถูกตีความ... หรือก็คือ 'คำวิจารณ์' นั้น ก็เป็นสิ่งที่ทุกคนจะอ่านและตีความได้อีกที ก็เลยนำมาซึ่ง 'ภาวะวัตถุวิสัย' ได้ในระดับหนึ่งค่ะ"
1013106-16 = "โดยสรุปแล้ว วัตถุวิสัยก็คือมุมมองที่ไม่ว่าใครก็เห็นด้วยได้นี่คะ?"
1013106-17 = "และเพราะอย่างนั้น ฉันก็เลยคิดว่าบทวิจารณ์กับรูปถ่ายคือสิ่งที่คล้ายคลึงกันค่ะ"
1013106-18 = "[s] \"รูปถ่ายก็มีความเป็นวัตถุวิสัยในบางแง่นะ\""
1013106-19 = "ใช่ค่ะ แต่ถึงอย่างนั้นก็ยังขึ้นอยู่กับฝีมือของคนที่ถ่ายรูปอยู่ดี"
1013106-20 = "ถ้าความรู้สึกเปลี่ยนแปลงไป ผลลัพธ์ที่ได้ก็จะเปลี่ยนตามไปด้วยค่ะ"
1013106-21 = "บทวิจารณ์เริ่มด้วยอัตวิสัย แต่ก็พยายามให้ออกมาเป็นวัตถุวิสัย"
1013106-22 = "ส่วนรูปภาพเริ่มด้วยวัตถุวิสัย แต่ก็แฝงไว้ด้วยอัตวิสัย"
1013106-23 = "คุณครูไม่คิดว่าความสัมพันธ์ที่ขัดแย้งกันแบบนี้มันน่าสนใจดีเหรอคะ?"
1013106-24 = "อย่างน้อยฉันก็... คิดแบบนั้นน่ะค่ะ"
1013106-25 = "ความสัมพันธ์ระหว่างการสร้างสรรค์และการวิจารณ์ก็ไม่ต่างกันค่ะ"
1013106-26 = "[s] \"การสร้างสรรค์... การสร้างสรรค์งั้นเหรอ...\""
1013106-27 = "คะ? ฉันเคยคิดอยากสร้างสรรค์อะไรบ้างหรือเปล่าน่ะเหรอคะ?"
1013106-28 = "อืม... เรื่องนั้น..."
1013106-29 = "เรื่องนั้น..."
1013106-30 = "อ๊ะ...!"
1013106-34 = "คุณครู! แสงเหนือค่ะ!"
1013106-41 = "ธรรมชาติเป็นสิ่งที่น่าทึ่งจริงๆ นะคะ..."
1013106-42 = "พอได้มาเห็นอะไรแบบนี้ละก็ คนเราก็ไม่ใช่อะไรที่ยิ่งใหญ่เลย"
1013106-43 = "ฉันถึงกับคิดเลยค่ะว่าคนเราเขียนบทวิจารณ์ไปทำไม แล้วเราสร้างสรรค์ผลงานกันไปเพื่ออะไร..."
1013106-44 = "แต่ยังไงฉันก็คิดว่าผลงานสร้างสรรค์คือหนึ่งในผลลัพธ์ที่งดงามอย่างแท้จริงที่มนุษย์สร้างขึ้นได้ค่ะ"
1013106-45 = "มีคำกล่าวแบบนี้อยู่ด้วยนี่คะ ที่บอกว่า 'แม้มนุษย์ไม่อาจสวยงามได้ด้วยตัวเอง แต่สิ่งที่มนุษย์สร้างสรรค์#nขึ้นมานั้นอาจสวยงามได้'"
1013106-46 = "ถ้าไม่รู้สึกว่าสิ่งใดสวยงาม เราก็คงไม่คิดที่จะสร้างมันขึ้นมาด้วยซ้ำนี่คะ..."
1013106-47 = "ในบางแง่แล้ว คำวิจารณ์อาจเป็นการสรรเสริญความสวยงามที่มนุษย์สร้างขึ้นมา..."
1013106-48 = "ซึ่งเป็นสิ่งที่ฉัน... ถ่ายทอดออกมาได้ก็ได้ค่ะ"
1013106-49 = "[s1] \"ถ้างั้นครูขอถ่ายรูปทาคาเนะได้มั้ย?\"\n[s2] \"ถ้างั้นครูขอถ่ายรูปให้ทาคาเนะได้มั้ย?\""
1013106-52 = "คะ... คะ?! คุณครู... น่ะเหรอคะ...? กะ... ก็น่าขอบคุณและน่าดีใจอยู่หรอกค่ะ... ว่าแต่ทำไมจู่ๆ ถึง?"
1013106-53 = "คะ??!! ในเมื่อจะถ่ายแล้ว ก็อยากหาคอนเซ็ปต์สักหน่อยงั้นเหรอคะ? คะ... คุณครูคิดถึงคอนเซ็ปต์#nแบบไหนอยู่...?"
1013106-54 = "ให้ฉันสร้างสรรค์ขึ้นมาเองงั้นเหรอคะ?!?! แบบนี้มันกะทันหันไปหน่อยหรือเปล่า!!??"
1013106-55 = "[s3] \"แต่ดูความสวยงามนั่นสิ!\"\n[s4] \"แสงเหนือเป็นสิ่งสวยงาม การสร้างสรรค์เองก็เช่นกัน!\""
1013106-58 = "คะ? ถ้าเพิ่มความสวยงามในสิ่งที่สวยงามอยู่แล้ว ผลลัพธ์ที่ได้ก็จะยิ่งสวยแบบทวีคูณงั้นเหรอคะ?!"
1013106-59 = "นั่นคือตรรกะเดียวกับที่บอกว่าต่อให้เอาซอสมิ้นต์ช็อกไปราดทาโกะยากิก็จะอร่อยอยู่ดีนี่คะ!?"
1013106-63 = "และที่สำคัญที่สุด การสร้างสรรค์... ไม่ใช่งานของนักวิจารณ์หรอกค่ะ..."
1013106-64 = "นะ... แน่นอนว่าฉันได้อ่านและเห็นอะไรมามากมาย! แต่ถึงยังไงก็เถอะค่ะ! ถ้าทำแบบนั้น มันจะเป็นการข้ามเส้น..."
1013106-65 = "ฉันไม่อยากด้อยค่าความเจ็บปวดของผู้ที่สร้างสรรค์สิ่งต่างๆ ค่ะ..."
1013106-66 = "ฉันเคยเห็นหลายกรณีที่มีคนมองผลงานสร้างสรรค์อย่างชุ่ยๆ จากนั้นก็วิจารณ์อย่างดูแคลน แล้วจบด้วยการสร้างบาดแผลให้เจ้าของผลงานค่ะ..."
1013106-67 = "คะ? แต่เมื่ออยู่ที่นี่ คุณครูจะเป็นผู้ชมเพียงคนเดียว งั้นก็ให้ฉันสร้างสรรค์ผลงานลับๆ ที่เราจะไม่บอกใครงั้นเหรอคะ...?"
1013106-68 = "จะร่ายมนตร์หรือทำเรื่องที่เพ้อฝันก็ได้ ขอแค่ให้ฉันทำอะไรก็ตามที่อยากทำที่นี่...?"
1013106-69 = "[s] \"อื้อ แล้วครูจะเป็น 'นักวิจารณ์' ของทาคาเนะให้เอง\""
1013106-70 = "...!"
1013106-71 = "ถะ... ถ้างั้น..."
1013106-72 = "อย่างน้อยคุณครูก็ช่วย... คิดพล็อตให้สักหน่อยสิคะ..."
1013106-73 = "[s5] \"งั้นเอาเป็นบุตรสาวท่านดยุกที่ถูกไล่ออกมา!\"\n[s6] \"บุตรสาวท่านดยุกได้เห็นแสงเหนือระหว่างหลบหนี!\""
1013106-76 = "ทำไมทุกคนที่เจอฉันถึงพูดอะไรทำนองนี้กันอยู่เรื่อยเลยก็ไม่รู้นะคะ..."
1013106-77 = "ก็ได้ค่ะ ในเมื่อนี่เป็นพล็อตที่คุณครูช่วยคิดให้"
1013106-78 = "อะแฮ่ม"
1013106-79 = "ฉันมีพี่สาว 3 คน และฉันเป็นลูกสาวคนสุดท้องของตระกูลที่มีอนาคตค่ะ"
1013106-80 = "โชคดีที่ฉันถูกเลี้ยงดูมาด้วยความรักจากคนมากมาย แต่ว่าฉัน... สุขภาพไม่ค่อยดีมาตั้งแต่เด็กๆ แล้วค่ะ"
1013106-81 = "นี่คงจะเป็นการชดเชยที่ฉันไม่ค่อยได้ออกไปเที่ยวเล่นข้างนอก ฉันก็เลยชอบแกล้งคนรอบข้างเล่น#nอยู่บ่อยๆ ค่ะ"
1013106-82 = "พวกพี่สาวของฉันก็เลยพากันเรียกฉันว่า [ruby=Shvibzik]'เจ้าตัวแสบ'[/ruby] อ้อ ฉันสนิทกับพี่มาเรีย พี่สาวคนที่ 3 ที่สุดเลยค่ะ"
1013106-83 = "วันไหนที่ฉันไม่รู้สึกป่วย เราจะนอนหนุนหมอนใบเดียวกันบนเตียงพับ และในตอนเช้าเราจะอาบน้ำเย็น#nด้วยกันค่ะ"
1013106-84 = "ที่จริงฉันไม่ชอบอาบน้ำเย็นหรอกค่ะ แต่พี่สาวบอกว่าการทำแบบนั้นจะช่วยให้ฉันสุขภาพดีขึ้น..."
1013106-85 = "ทว่า... ระหว่างนั้นก็เกิดเรื่องราวร้ายๆ มากมายจนตระกูลของฉันล่มสลาย..."
1013106-87 = "พวกเรา 4 พี่น้องต่างแยกย้ายกันไปคนละทาง ต่างคนต่างออกเดินทางไกล โดยหวังว่าจะได้กลับมาพบกันอีกในสักวัน..."

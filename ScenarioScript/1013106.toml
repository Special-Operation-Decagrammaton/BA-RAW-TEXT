1013106-139 = "..."
1013106-140 = "[s] \"ทะ... ทำไมทำหน้าบึ้งตึงแบบนั้นล่ะ ท่านหญิง...?\""
1013106-141 = "ฉันไม่ใช่ท่านหญิงแล้วค่ะ! การแสดงมันจบไปแล้วต่างหาก! ฉันก็แค่มิโยชิ ทาคาเนะ และจะเป็นอย่างนี้ไปตลอดค่ะ!"
1013106-142 = "จริงๆ เลยเชียว... ถ้านี่เป็นผลงานของคนอื่น ก็คงได้บทวิจารณ์ตั้งแต่เปิดหน้าแรกว่า"
1013106-143 = "มันล้าสมัยถึงขนาดที่อ่านบรรทัดแรกจบ ก็คิดได้เลยว่า 'นี่ละหนังสือประเภทที่ทำให้ฉันเลิกอ่านภายใน 1 นาที!' ค่ะ!"
1013106-144 = "[s] \"แต่ก็เล่นตามบทไปด้วยไม่ใช่เหรอ?\""
1013106-145 = "ก็คุณครูสั่งให้ฉันทำแบบนั้นนี่คะ!!!!!"
1013106-146 = "ฮึ่ม... เอารูปมาดูเถอะค่ะ..."
1013106-147 = "[s] \"เป็นไงบ้าง?\""
1013106-148 = "..."
1013106-149 = "รูปออกมาสวยจังเลยค่ะ..."
1013106-150 = "ขอบคุณนะคะ คุณครู"
1013106-151 = "เอ่อ ฉันอยากขอร้องอะไรสักอย่างน่ะค่ะ"
1013106-152 = "รูปที่ถ่าย... กับเรื่องที่เกิดขึ้นที่นี่..."
1013106-153 = "ขอคุณครูอย่าไปบอกใครได้มั้ยคะ?"
1013106-154 = "[s] \"อายขนาดนั้นเลยเหรอ?\""
1013106-155 = "จะว่าอายก็อายอยู่ค่ะ"
1013106-160 = "แต่ที่สำคัญก็คือ ฉันก็อยากเก็บทุกอย่างไว้เป็นความลับระหว่างฉันกับคุณครูเท่านั้นค่ะ"

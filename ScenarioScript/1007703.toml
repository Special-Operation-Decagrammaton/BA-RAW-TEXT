1007703-7 = "3;이치카;02;……응?\n#3;em;[?]"
1007703-8 = "3;이치카;02;어? 선생님……? 무슨 일이심까? 이런 곳까지."
1007703-9 = "3;이치카;04;으음. 아닌가? 반대로 제가 왜 여기 있는지를 지금 설명해야 하는 타이밍일까……요?\n#3;stiff"

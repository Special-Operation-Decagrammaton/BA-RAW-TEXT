[translation]
1007703-1 = "No Big Deal"
1007703-2 = "While I was out running errands, I took a shortcut through the mall."
1007703-6 = "Ichika was there admiring an instrument on display at the music shop."
1007703-7 = "...Huh?"
1007703-8 = "Oh, hello, Sensei! What brings you to this neck of the woods?"
1007703-9 = "You're more interested in why I'm here?"
1007703-10 = "It doesn't matter. I'm just glad to see you again."
1007703-11 = "...Huh?"
1007703-12 = "You really want to know what I was looking at?"
1007703-13 = "Nothing important...just a guitar..."
1007703-14 = "I've never really though about playing before. That is, not until this morning."
1007703-15 = "I've never even touched a guitar, let alone played one."
1007703-19 = "Hahaha! Yeah, that's the reaction I expected."
1007703-20 = "I know it's out of the ordinary for me, but... I heard some people playing guitar on my way here."
1007703-21 = "They weren't drawing a crowd or anything."
1007703-22 = "But isn't that cool? They found something they're passionate about, that they love no matter what people say."
1007703-23 = "It made me want to discover what I'm passionate about. So I came here."
1007703-24 = "But now that I'm looking at it..."
1007703-25 = "...Haha."
1007703-26 = "I'm not sure it's for me. What if I don't like it enough to really practice? Then I'd never be able to play well."
1007703-27 = "On the other hand, you don't know until you try, right? Maybe I'll love it!"
1007703-28 = "..."
1007703-29 = "Ah, who am I kidding? Inspiration has never struck before. Why would it now?"
1007703-30 = "Besides..."
1007703-31 = "Something like that probably requires more talent than skill."
1007703-35 = "...Hm?"
1007703-36 = "You really think I should give it a try?"
1007703-37 = "What exactly do you want to hear?"
1007703-38 = "Me playing the guitar?"
1007703-39 = "Me?"
1007703-40 = "For you, Sensei?"
1007703-41 = "Um..."
1007703-45 = "What are you even saying? I-I could never! I—"
1007703-46 = "I just said I've never even touched a guitar before! Are you trying to embarrass me?"
1007703-47 = "[s1] \"I'm just saying you should give it a shot.\"\n[s2] \"Maybe we could learn together.\""
1007703-50 = "But still... I..."
1007703-51 = "Even if that is what you meant... It's too much. I-I just can't."
1007703-52 = "I know I said I wanted to find something I'm passionate about, but..."
1007703-53 = "Well... It's..."
1007703-54 = "Um... Mmm..."
1007703-55 = "*sigh*"
1007703-56 = "Fine! I'll just...figure it out or something! If you really want to hear me."
1007703-57 = "But if it's terrible, don't say I didn't warn you! You hear me?!"
1007703-58 = "[s3] \"I would never criticize you like that.\"\n[s4] \"Take it easy. You have nothing to worry about.\""
1007703-61 = "Well, okay then... I'll get the cheapest one they make for beginners."
1007703-67 = "Ichika went into the store and purchased one of the acoustic guitars on the display."
1007703-68 = "Then we walked over to the riverside and sat down."
1007703-70 = "It's a real guitar... And it's mine..."
1007703-71 = "I was only thinking about getting one, but now we're actually sitting here with one."
1007703-72 = "Even though it's for a beginner, to anyone walking by, I look like a professional. Haha!"
1007703-73 = "And now that I have music and instructions, I guess there's nothing left to do but play."
1007703-74 = "If I follow the instructions, it might sound okay. What do you think?"
1007703-75 = "[s5] \"It's probably a little more complicated than that...\"\n[s6] \"Maybe start off with something easy.\""
1007703-78 = "Okay, yeah. Let's see... I should hold it like this."
1007703-79 = "And the chords are...here. Yes. Hm..."
1007703-80 = "And then I strum, I think."
1007703-84 = "Something like this? How's it sound?"
1007703-88 = "[ns7] \"Are you sure this is your first time playing?\"\n[ns8] \"You're picking it up that easily...?\""
1007703-91 = "I mean...yes? I guess I am. "
1007703-92 = "It's meant for beginners though."
1007703-93 = "Whether it's cooking, programming, or drawing, this is pretty typical when you're following simple instructions, isn't it?"
1007703-94 = "I don't see why musical instruments would be any different. They're made to be played..."
1007703-95 = "Just do as you're told and it'll work. Simple as that."
1007703-96 = "You can even add a little something to the basics to make it your own."
1007703-97 = "No big deal."
1007703-98 = "...Hm?"
1007703-99 = "You really are impressed, aren't you?"
1007703-100 = "And you're wondering if people have told me I'm a quick study."
1007703-101 = "Well... I can't say it's the first time I've heard that..."
1007703-102 = "Haha. All right. All right. Say that all you want, but it takes more than flattery to win my trust."
1007703-103 = "Why don't we just practice some more, if that's okay with you?"
1007703-107 = "Pick some songs from the book, and I'll play them."
1007703-110 = "We spent a while there. Ichika played, and I listened."
1007703-111 = "I still don't believe it was her first time playing. She was very impressive."

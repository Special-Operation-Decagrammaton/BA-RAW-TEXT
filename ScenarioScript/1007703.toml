[translation]
1007703-1 = "ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ"
1007703-2 = "(ระหว่างเดินทางไปทำงาน คุณครูก็เข้าไปในห้างสรรพสินค้าเพื่อใช้ทางลัด)"
1007703-6 = "(คุณครูเห็นอิจิกะกำลังยืนดูบางอย่างอยู่หน้าร้านเครื่องดนตรีในห้างสรรพสินค้า)"
1007703-7 = "...หืม?"
1007703-8 = "เอ๋? คุณครู...? มีธุระอะไรที่นี่เหรอคะ?"
1007703-9 = "อืม หรือว่าไม่ควรถามไปแบบนั้นนะ? ทำไมฉันถึงมาอยู่ที่นี่งั้นเหรอคะ...?"
1007703-10 = "แต่ก็ไม่สำคัญหรอกค่ะ ได้เจอคุณครูในที่แบบนี้ก็ดีเหมือนกันนะคะ~"
1007703-11 = "...คะ?"
1007703-12 = "อ้อ สงสัยว่าฉันกำลังดูอะไรอยู่น่ะเหรอคะ? คิดไว้แล้วว่าคุณครูต้องถามแบบนี้..."
1007703-13 = "อืม... ไม่มีอะไรพิเศษหรอกค่ะ ก็แค่กีตาร์น่ะค่ะ..."
1007703-14 = "...? ฉันสนใจในการเล่นกีตาร์มั้ยน่ะเหรอคะ? ไม่ค่ะ ฉันไม่มีความคิดแบบนั้นเลย จนกระทั่งถึงเช้านี้ค่ะ"
1007703-15 = "ที่ผ่านมาอย่าว่าแต่ลองดีดเลยค่ะ แค่ลองจับกีตาร์ฉันยังไม่เคยเลย"
1007703-19 = "ฮ่าๆ คิดไว้แล้วเชียวว่าจะต้องทำหน้าแบบนั้น"
1007703-20 = "แต่วันนี้... ระหว่างมาที่นี่ ฉันเห็นคนเล่นกีตาร์เปิดหมวกอยู่ข้างถนนน่ะค่ะ"
1007703-21 = "คนพวกนั้นไม่ได้ทำให้ฉันอยากเล่นกีตาร์จริงจังขึ้นมาหรอกนะคะ แต่ว่า..."
1007703-22 = "มันเท่สุดๆ เลยว่ามั้ยคะ? ที่ไม่ว่าคนอื่นจะว่ายังไง แต่ตัวเองก็มีสิ่งที่อยากทำ และตั้งใจเพื่อจะทำสิ่ง#nนั้นออกมา"
1007703-23 = "พอเห็นอย่างนั้น ฉันก็คิดว่าตัวเองก็ 'ต้องลองทำอะไรดูสักอย่างมั้ยนะ' ก็เลยถึงได้มายืนดูกีตาร์อยู่#nแบบนี้ค่ะ"
1007703-24 = "แต่พอได้มาดูจริงๆ ก็..."
1007703-25 = "...ฮะฮะฮะ..."
1007703-26 = "ฉันไม่รู้อะไรเกี่ยวกับกีตาร์เลยค่ะ ฉันไม่คิดว่ามันจะสนุกขนาดนั้น และก็ไม่คิดว่าจะตั้งใจฝึกซ้อมด้วย..."
1007703-27 = "แต่ก็ไม่มีใครรู้ใช่มั้ยคะ? บางทีถ้าได้ลองทำครั้งหนึ่งก็อาจจะสนุกจนติดใจเลยก็ได้!"
1007703-28 = "......"
1007703-29 = "ล้อเล่นค่ะ... ที่ผ่านมาฉันยังไม่เคยเจอเรื่องแบบนั้นกับตัวเองเลย ถ้าจู่ๆ มาเจอตอนนี้ก็คงจะแปลกๆ ค่ะ"
1007703-30 = "บางที..."
1007703-31 = "การหาสิ่งที่อยากทำก็คงอาจต้องใช้พรสวรรค์ก็ได้ค่ะ"
1007703-35 = "...คะ?"
1007703-36 = "แต่ยังไงฉันก็ควรจะลองเล่นดูสักครั้งงั้นเหรอคะ? ...ทำไมล่ะคะ?"
1007703-37 = "...อยากฟังงั้นเหรอคะ? ...ฟังอะไร?"
1007703-38 = "...ฟังฉันเล่นกีตาร์เหรอคะ?"
1007703-39 = "ฉันเนี่ยนะคะ...?"
1007703-40 = "...เล่นให้คุณครูฟัง?"
1007703-41 = "เอ่อ..."
1007703-45 = "ไม่เอา!! ไม่เอาดีกว่าค่ะ! พูดอะไรของคุณครูคะเนี่ย...! ทำไมอยู่ๆ ก็เป็นแบบนี้ล่ะคะ?"
1007703-46 = "ฉันเพิ่งบอกไปเมื่อกี้เองนี่นา อย่าว่าแต่ลองเล่นเลย แค่ลองจับกีตาร์ฉันยังไม่เคยเลยค่ะ! จะดูฉันขายหน้าเหรอไงกันคะ?"
1007703-47 = "[s1] \"ครูแค่บอกให้ลองเล่นขำๆ ดูน่ะ\"\n[s2] \"ครูหมายถึงให้เริ่มไปด้วยกันน่ะ\""
1007703-50 = "เอ่อ... แต่ว่า... ฉะ... ฉันไม่ได้หมายความว่าอย่างนั้น..."
1007703-51 = "พอจู่ๆ คุณครูพูดแบบนั้น... ฉันก็รู้สึกกดดันขึ้นมาน่ะค่ะ"
1007703-52 = "ต่อให้เป็นฉันเองที่พูดว่า 'อยากลองทำดู' ก็เถอะ..."
1007703-53 = "คือว่ามัน..."
1007703-54 = "อืม... อืมม..."
1007703-55 = "...ฮึ่ยย"
1007703-56 = "...แต่ก็เอาเถอะ ไม่รู้ด้วยแล้ว! ยังไงก็ต้องได้แหละน่า! ก็คุณครูเป็นคนบอกว่าอยากฟังนี่เนอะ!"
1007703-57 = "แต่อย่ามาพูดทีหลังว่าฉันเล่นไม่ได้เรื่องนะคะ! ห้ามเด็ดขาดนะ!"
1007703-58 = "[s3] \"แน่นอน ครูไม่พูดแบบนั้นหรอก\"\n[s4] \"เล่นแบบปล่อยจอยเลยก็ได้\""
1007703-61 = "ถะ... ถ้างั้น... งั้นขอเป็นสำหรับมือใหม่ ที่ราคาถูกที่สุด...!"
1007703-67 = "(อิจิกะเข้าไปในร้านและซื้อกีตาร์โปร่งที่ตั้งโชว์มา 1 ตัว)"
1007703-68 = "(จากนั้นก็สะพายกระเป๋ากีตาร์แล้วเดินก้าวเท้าหนักๆ ไปยังริมแม่น้ำ)"
1007703-70 = "อืม... กีตาร์... ฉันมีกีตาร์ของตัวเองแล้วจริงๆ ด้วย..."
1007703-71 = "ก่อนหน้านี้ฉันได้แค่จินตนาการเอง แต่สุดท้ายก็ได้ถือกีตาร์เดินมาริมแม่น้ำจริงๆ ด้วยนะคะ แถมยังมีคอร์ดเพลงมาอีก"
1007703-72 = "ใครมาเห็นคงคิดว่าฉันเป็นมือกีตาร์ขั้นเซียน แต่จริงๆ เป็นแค่มือใหม่หัดดีดดีๆ นี่เอง แหะๆ"
1007703-73 = "แต่ยังไงฉันก็มีคอร์ดเพลง และวิธีดีดก็มีในหนังสือด้วย..."
1007703-74 = "ถ้าลองเล่นดูตามที่คุณครูบอก บางทีอาจจะออกมาดีก็ได้... ว่ามั้ยคะ?"
1007703-75 = "[s5] \"ถึงมันจะไม่ง่ายขนาดนั้น...\"\n[s6] \"ลองเล่นขำๆ ดูก็ไม่เสียหายนะ\""
1007703-78 = "งั้นก็ลองขำๆ ดู... วางมือแบบนี้..."
1007703-79 = "แล้วดูคอร์ด~ ไหนดูซิ~ ทางนี้ต้อง~ ฮืม~"
1007703-80 = "แล้วก็ดีดสายแบบนี้..."
1007703-84 = "ใช่แบบนี้หรือเปล่าคะ...?"
1007703-88 = "[ns7] \"ลองเล่นครั้งแรกจริงหรือเปล่าเนี่ย?\"\n[ns8] \"ทำไมถึงชิลขนาดนี้...?\""
1007703-91 = "คะ? ค่ะ... ก็... "
1007703-92 = "เอ๋ จะไปมีอะไรยากล่ะคะ ก็นี่มันกีตาร์สำหรับมือใหม่นี่นา"
1007703-93 = "ปกติถ้าดูคู่มือ คนอื่นก็น่าจะทำได้ประมาณนี้กันหมดนี่คะ? ต่อให้เป็นการทำอาหาร การใช้อุปกรณ์ หรือวาดรูปก็ตาม... "
1007703-94 = "กับเครื่องดนตรีก็ไม่น่ามีอะไรต่างนี่คะ? ก็มันทำมาไว้ให้คนใช้นี่นา..."
1007703-95 = "ก็แค่ทำตามที่สั่งให้ทำ ไม่เห็นมีอะไรยากเลยค่ะ"
1007703-96 = "บางครั้งก็ต้องหัดประยุกต์หรือปรับอะไรเพิ่มนิดหน่อยจากวิธีพื้นฐานเพื่อให้เข้ากับตัวเอง"
1007703-97 = "ฉันว่ามันไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ"
1007703-98 = "...คะ?"
1007703-99 = "แต่นี่ก็สุดยอดแล้วงั้นเหรอคะ?"
1007703-100 = "...ถามว่าฉันไม่เคยได้ยินคำแบบนี้จากคนรอบข้างเลยงั้นเหรอคะ? อย่างเช่นทำอะไรดีแล้วมีคนบอกว่า#nเก่งมาก...?"
1007703-101 = "ก็... ใช่ว่าจะไม่เคยเลยนะคะ..."
1007703-102 = "ฮ่าๆ ไม่ต้องเลยค่ะ ถึงจะพูดชมกันอย่างนั้น ฉันก็ไม่ได้เล่นเก่งขึ้นหรอกนะคะ"
1007703-103 = "ถ้าคุณครูไม่ติดอะไรละก็ มาฝึกกันต่อดีกว่าค่ะ..."
1007703-107 = "ช่วยเลือกเพลงจากหนังสือนี้ให้สักเพลงสองเพลงได้มั้ยคะ? ฉันจะลองเล่นดูเลยค่ะ"
1007703-110 = "(หลังจากนั้นคุณครูก็ใช้เวลาไปกับการฟังอิจิกะเล่นกีตาร์ให้ฟังที่ริมแม่น้ำ)"
1007703-111 = "(อิจิกะบอกว่านี่เป็นการลองเล่นครั้งแรก แต่เธอก็เล่นได้ดีมากทุกเพลง)"

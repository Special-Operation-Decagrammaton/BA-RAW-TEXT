[translation]
1007703-1 = "沒什麼了不起"
1007703-2 = "（前往工作的途中，為了抄捷徑而進入了購物中心）"
1007703-6 = "（在購物中心一角的樂器店展示窗前，發現了正在看東西的一花）"
1007703-7 = "……嗯？"
1007703-8 = "咦，老師……？你來這裡有什麼事嗎？"
1007703-9 = "唔嗯～不對不對。#n好像是我該說明為什麼會在這裡……"
1007703-10 = "算了，先不管那些，很高興能在這裡見到老師～"
1007703-11 = "……咦？"
1007703-12 = "我在看什麼？#n啊啊，就知道老師會這麼問……"
1007703-13 = "其實也沒什麼，只是在看吉他而已……"
1007703-14 = "……是不是對吉他有興趣？#n沒有耶～在今天以前我根本連想都沒想過。"
1007703-15 = "別說彈吉他了，就連摸都沒摸過。"
1007703-19 = "哈哈，就知道老師會露出那種表情。"
1007703-20 = "真的只是……該怎麼說呢，我在來的路上看到了一些在街上演奏吉他的人。"
1007703-21 = "雖然並沒有受到很多關注，但是……"
1007703-22 = "你不覺得很酷嗎？#n不在乎他人的目光，熱衷於想做的事且一心投入的樣子。"
1007703-23 = "看著看著就有一種「我也該試試看」的想法。#n所以才會在這邊看著吉他。"
1007703-24 = "但實際來到這裡才發現……"
1007703-25 = "……哈哈。"
1007703-26 = "我果然還是不太清楚。#n總覺得彈吉他並不會很開心，也不覺得自己會很努力……"
1007703-27 = "不過這也很難說吧？#n說不定試試看就會突然有興趣了！"
1007703-28 = "…………"
1007703-29 = "開玩笑的。那種事八成不會發生吧……畢竟從來都沒發生過。"
1007703-30 = "或許……"
1007703-31 = "或許找出自己的興趣也是需要天分的呢。"
1007703-35 = "……嗯？"
1007703-36 = "問我要不要彈一次看看？#n……為什麼？"
1007703-37 = "……因為你想聽？#n……想聽什麼？"
1007703-38 = "……吉他？"
1007703-39 = "聽我……？"
1007703-40 = "……彈給老師聽？"
1007703-41 = "嗯……"
1007703-45 = "不不不！！還是算了吧！為什麼突然這麼說……！不會太突然了嗎？"
1007703-46 = "而且我剛才不是說了嗎？#n別說是彈了，我連碰都沒碰過！老師是想讓我丟臉嗎？"
1007703-47 = "[s1]「我的意思是可以先輕鬆地嘗試一下。」\n[s2]「我的意思是可以一起嘗試看看。」"
1007703-50 = "可，可是……我指的不是……"
1007703-51 = "老師突然那樣說……讓我感到有點壓力。"
1007703-52 = "雖然是我先說「想試試看」的，但……"
1007703-53 = "還是有點……那個……"
1007703-54 = "嗯……唔嗯……"
1007703-55 = "……唔唔。"
1007703-56 = "……哎呀，不管了！總會有辦法的！#n反正是老師自己說想聽的！"
1007703-57 = "之後可不能說我彈得不怎麼樣之類的話哦，絕對哦！？"
1007703-58 = "[s3]「當然，我不會做那種事的。」\n[s4]「放輕鬆彈吧！」"
1007703-61 = "那，那就……先買最便宜的初學者用吉他吧……！"
1007703-67 = "（一花走進店裡，買了一把陳列在展示窗上的木吉他）"
1007703-68 = "（之後背著吉他袋，腳步沉重地走向河邊）"
1007703-70 = "嗯……吉他……是真的吉他呢……"
1007703-71 = "本來只是想像一下而已，結果真的帶著吉他來到河邊了。#n而且甚至還拿著樂譜。"
1007703-72 = "別人看了應該會以為我是吉他高手吧，但其實我拿的只是初學者用的吉他，哈哈。"
1007703-73 = "不過既然有樂譜，書上也有彈奏的方法……"
1007703-74 = "只要按照書上的方法做……就行了嗎？"
1007703-75 = "[s5]「雖然可能沒那麼簡單……」\n[s6]「一開始先放輕鬆嘗試就可以了。」"
1007703-78 = "我看看……先像這樣握住……"
1007703-79 = "把弦～這樣～往這邊～嗯～"
1007703-80 = "……然後再這樣？"
1007703-84 = "……大概這種感覺嗎？"
1007703-88 = "[ns7]「你真的是第一次彈嗎？」\n[ns8]「那麼簡單就……？」"
1007703-91 = "咦？嗯……"
1007703-92 = "畢竟是初學者用的吉他，所以才沒有很難吧。"
1007703-93 = "只要看著教學，通常都不會做的太差吧？#n無論是料理、機器還是畫畫……"
1007703-94 = "我想樂器也沒什麼不同吧？#n再怎麼說都是設計出來給人用的……"
1007703-95 = "只要照著做就行了，其實也沒什麼。"
1007703-96 = "就算偶爾需要隨機應變，也只是在基本做法上增加一點變化而已。"
1007703-97 = "我認為這其實真的沒什麼了不起的。"
1007703-98 = "……咦？"
1007703-99 = "你說我很厲害？"
1007703-100 = "……有沒有被人說過學什麼像什麼之類的……？"
1007703-101 = "唔……好像也不能說沒有……"
1007703-102 = "哈哈，算了。#n就算老師誇我也沒有好處的哦。"
1007703-103 = "先不說這個了，我們再練習一下吧？#n如果老師不介意的話……"
1007703-107 = "請從這本樂譜中挑幾首曲子吧，我來試彈看看。"
1007703-110 = "（之後便在河邊聽著一花彈奏吉他）"
1007703-111 = "（雖然一花說這是他第一次演奏，聽起來卻完全不像是這麼回事）"

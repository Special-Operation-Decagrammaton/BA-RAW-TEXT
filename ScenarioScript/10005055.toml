[translation]
10005055-4 = "尼哈哈哈哈！哎呀，活著果然什麼都有可能發生呢～！！"
10005055-5 = "天下無敵的C&C被捕的醜態，沒想到居然有親眼目睹的一天！"
10005055-6 = "哎呀～果然自由就是好呢！三十六計走為上策！"
10005055-7 = "[s1]「真是大團圓呢。」\n[s2]「只剩下明日奈了……」"
10005055-8 = "啊，這麼說來……"
10005055-9 = "啊，這麼說來……"
10005055-10 = "明日奈前輩還是一如既往不知道去哪了呢？"
10005055-11 = "不過在船上這點是確定的，考慮到警備員的數量，被捕肯定也只是時間的問題吧！"
10005055-12 = "尼哈哈哈！請再等一下，很快就會讓大家相親相愛地在一起了！"
10005055-13 = "接下來該怎麼辦呢～就這樣把你們丟到某個無人島上吧。"
10005055-14 = "那麼那麼～之後可能不會再見了，各位自便吧！！"
10005055-18 = "哦，這個時機，難道是！？"
10005055-19 = "照這個流程肯定不會錯的，辛苦了～！"
10005055-20 = "明日奈前輩～好久不見──！！"
10005055-29 = "啊，小雪醬！"
10005055-30 = "原來你在這啊？"
10005055-32 = "尼哈哈哈哈！你好呀，前輩。"
10005055-33 = "警備員的各位也辛苦了！"
10005055-39 = "來來來請到裡面去吧！這樣就和大家一樣了！"
10005055-40 = "就算想反抗也是沒用的唷～這裡又不是千年，那麼做的話會出大──"
10005055-45 = "……各位客人。"
10005055-46 = "……？"
10005055-47 = "……各位客人？不是在叫我嗎？"
10005055-48 = "……不是你。"
10005055-49 = "是在那邊的各位。"
10005055-50 = "……剛才真是萬分失禮，各位已經被釋放了。"
10005055-54 = "……咦？"
10005055-56 = "……啊？"
10005055-57 = "這是……？"
10005055-58 = "……釋放？為什麼？"
10005055-60 = "這是明日奈[ruby=・]大[/ruby][ruby=・]人[/ruby]的命令。"
10005055-61 = "……[ruby=・]大[/ruby][ruby=・]人[/ruby]？"
10005055-62 = "遵從S級且為VIP的明日奈大人的指示，將各位釋放。"
10005055-63 = "剛才已經進行過討論……#n非常抱歉，請恕我們請求到剛才戰鬥為止的損害賠償……#n只要各位支付賠償，其餘的一切都將不予以過問。"
10005055-64 = "雖然剛才為止是根據情況做出的判斷，但還是失禮了。#n那麼，各位請慢走……"
10005055-71 = "好像就是這樣！"
10005055-72 = "雖然差點就被抓走，但他們一看到遊戲的畫面好像就通通停手了？"
10005055-73 = "好像做了許多聯絡，之後就告訴我「請儘管吩咐」，所以我就自由發揮了！"
10005055-74 = "也就是說雖然得付點錢，但我們已經自由了唷！！接下來就和往常一樣！"
10005055-75 = "[s3]「不是說『S』相當稀有嗎……？」\n[s4]「不愧是明日奈。」"
10005055-79 = "……哈哈。"
10005055-80 = "原來如此……"
10005055-81 = "也就是說，只要我們付錢，不管想做什麼都可以。"
10005055-82 = "也不會成為學校間的問題……我可以這麼理解吧？"
10005055-83 = "哈。"
10005055-84 = "……挺好的嘛。"
10005055-85 = "喂，白兔……要不要快點逃啊？我可以等你10秒哦？"
10005055-87 = "……"
10005055-88 = "要逃得認真點唷？"
10005055-89 = "……不然可就太掃興了！！"

[translation]
10005055-4 = "อ่ะฮะฮะฮะฮะ!! ไม่คิดเลยว่าจะได้เห็นอะไรแบบนี้ด้วย"
10005055-5 = "สายลับของ C&C ถูกจับซะเองแบบนี้เนี่ย!"
10005055-6 = "รู้งี้ทำแบบนี้ตั้งนานแล้ว การได้มีอิสระนี่มันสุดยอดจริงๆ ถ้าไม่อยากโดนดุก็ต้องออกจากโรงเรียน#nมาคนเดียวแบบนี้สินะ!"
10005055-7 = "[s1] \"ทุกคนมารวมตัวกันอย่างชื่นมื่นเลยนะ\"\n[s2] \"ถ้าอาสึนะมาก็ครบทีมเลยเนอะ?\""
10005055-8 = "เอ่อ... นั่นสินะคะ"
10005055-9 = "เอ่อ... นั่นสินะคะ"
10005055-10 = "รุ่นพี่อาสึนะ...? ยังไม่โดนจับงั้นสินะคะ?"
10005055-11 = "อืมมม~ แต่ว่าการ์ดของที่นี่มีจำนวนเยอะมาก คงจะหนีไปอีกได้ไม่นาน~"
10005055-12 = "ฮะฮะฮะฮ่า!! แค่รอเวลาแล้วกันค่ะ สุดท้ายก็ต้องถูกจับมารวมกันอยู่ในนั้นอยู่ดี!"
10005055-13 = "ถ้าเป็นแบบนี้ เดี๋ยวฉันจะพาพวกรุ่นพี่ไปเกาะที่อยู่ไกลๆ จากมิลเลเนียม แล้วปล่อยไว้ที่นั่นดีมั้ยคะ~"
10005055-14 = "แล้วเราก็จะได้... บ๊ายบายกัน~ เพราะอยู่ด้วยกันแล้วก็ไม่สนุกเลย งั้นต่อไปก็อย่าเจอกันอีกดีกว่า-!"
10005055-18 = "อ๊ะ ได้ยินเสียงเปิดประตูพอดีเลย!?"
10005055-19 = "วะฮะฮะ! แบบนี้ต้องเป็นไปตามที่คิดไว้แน่ๆ ค่ะ ก็นะ... เรื่องแค่นี้มันก็แน่นอนอยู่แล้ว!"
10005055-20 = "เข้ามาได้เลยค่ะ--- รุ่นพี่อาสึนะ!!"
10005055-29 = "โอ้สสส-! โคยูกิ! อยู่นี่เองสินะ!"
10005055-30 = "ว่าไง~!"
10005055-32 = "อ่ะฮะฮะฮะฮะ!! สวัสดีค่ะรุ่นพี่!"
10005055-33 = "แล้วก็การ์ดบันนี่เกิร์ลทุกคน!!"
10005055-39 = "เอาละๆ! รุ่นพี่ก็อย่าขัดขืนให้ประโยชน์เลย รีบๆ เข้าไปข้างในเถอะค่ะ!"
10005055-40 = "คงไม่ได้คิดจะก่อเรื่องวุ่นวายที่นี่หรอกใช่มั้ยคะ? ที่นี่ไม่ใช่เขตของมิลเลเนียม ถ้าก่อเรื่องวุ่นวายขึ้น#nจะเป็นเรื่องใหญ่เอานะคะ"
10005055-45 = "คนที่อยู่ตรงนั้นน่ะ..."
10005055-46 = "...?"
10005055-47 = "คะ...? ฉันเหรอคะ?"
10005055-48 = "...? เปล่า..."
10005055-49 = "ไม่ใช่เธอ คนที่อยู่ในห้องขังนั่นน่ะ"
10005055-50 = "ได้รับการปล่อยตัวแล้วค่ะ... เชิญออกมาได้"
10005055-54 = "คะ...?"
10005055-56 = "ว่าไงนะ...?"
10005055-57 = "ตายจริง...?"
10005055-58 = "ปล่อยตัว...? ทำไมล่ะ?"
10005055-60 = "ตอนนี้ \"ท่าน\" อาสึนะเป็นสมาชิกระดับ VIP แล้ว เธอจึงมีสิทธิ์อยู่เหนือกฎของของเรือลำนี้ค่ะ"
10005055-61 = "ว่าไงนะ...? ระดับอะไรนะ?"
10005055-62 = "ตามคำสั่งของท่านอาสึนะ เพื่อนๆ ทุกคนในห้องขังจะถูกปล่อยตัวทั้งหมดค่ะ"
10005055-63 = "และสำหรับความเสียหายจากความวุ่นวายที่เกิดขึ้นก่อนหน้านี้และหลังจากนี้ เพียงแค่จ่ายค่าเสียหาย#nตามจำนวนเงินที่เรียก ทางเราก็จะไม่เอาความค่ะ"
10005055-64 = "ถ้างั้นขอตัวก่อนนะคะ ขอให้มีความสุขกับช่วงเวลาที่เหลือนะคะ..."
10005055-71 = "ฉันก็ได้ยินแบบนั้นเหมือนกันน่ะ ยอดไปเลยใช่มั้ยล่ะ?"
10005055-72 = "พวกนั้นไล่จับฉันอยู่ตั้งนาน แต่พอฉันสุ่มล็อตโต้ออกมาได้ พวกนั้นก็หยุดชะงักเลยละ"
10005055-73 = "ถึงจะไม่รู้ว่าสุ่มมาได้ยังไง แต่ดูเหมือนตั้งแต่นี้ไปฉันจะทำตามใจชอบได้แล้ว~ ฉันก็เลยมาที่นี่ก่อนน่ะ"
10005055-74 = "เนรุ! ตอนนี้เราทำเหมือนตอนที่อยู่ที่มิลเลเนียมได้แล้วละ! แค่จ่ายค่าเสียหายก็พอ!"
10005055-75 = "[s3] \"สุ่มได้ระดับ S เหรอ...?\"\n[s4] \"สถานการณ์ชักสนุกขึ้นแล้วสิ\""
10005055-79 = "อา... หึหึหึ..."
10005055-80 = "อา... แบบนี้เองสินะ เข้าใจแล้ว อา~ เข้าใจทุกอย่างแล้วละ"
10005055-81 = "พูดสั้นๆ คือ ตราบใดที่จ่ายค่าเสียหายให้ จากนี้เราจะลุยเละแค่ไหนก็ได้..."
10005055-82 = "และจะไม่เป็นปัญหาระหว่างโรงเรียนด้วย... แบบนั้นใช่มั้ย?"
10005055-83 = "ฮะฮ่าฮ่า ได้เลย ถ้าเป็นแบบนี้ละก็..."
10005055-84 = "ถือเป็นเรื่องน่ายินดีที่สุดที่ได้ฟังมาในวันนี้เลยละ"
10005055-85 = "แล้วนี่เธอยังไม่รีบหนีไปอีกงั้นเรอะ?"
10005055-87 = "..."
10005055-88 = "นี่เป็นคำขอร้องส่วนตัวของฉัน... อย่าเพิ่งให้ฉันจับได้ง่ายๆ นักละ"
10005055-89 = "เพราะความสนุกมันเพิ่งจะเริ่มต้นน่ะ..."

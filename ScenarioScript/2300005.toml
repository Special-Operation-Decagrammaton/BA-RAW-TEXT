[translation]
2300005-1 = "เรื่องกังวลของไอริ"
2300005-2 = "สวนทรีนิตี้"
2300005-3 = "สวัสดีค่ะคุณครู!"
2300005-4 = "วันนี้เป็นยังไงบ้างคะ? ทุกอย่างปกติดีใช่มั้ยคะ?"
2300005-5 = "[s] \"อื้ม ไอริล่ะ?\""
2300005-6 = "ฉันได้เจอคุณครูแบบนี้ วันนี้ก็ต้องเป็นวันที่ดีสิคะ"
2300005-7 = "ว่าแต่... คุณครูพอมีเวลาหน่อยมั้ยคะ?"
2300005-8 = "ฉันมีบางอย่างอยากปรึกษากับคุณครูน่ะค่ะ"
2300005-9 = "เอ่อ... อืม..."
2300005-10 = "จริงๆ มันไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ..."
2300005-11 = "แต่ฉันจะชอบเงอะงะเวลาที่ต้องอธิบายหรือออกความคิดเห็นของฉันต่อหน้าเพื่อนๆ..."
2300005-12 = "ส่วนมากจะปะติดปะต่อคำไม่ถูก และเลือกที่จะไม่พูดอะไรเลยด้วยค่ะ..."
2300005-13 = "ฉันว่า..."
2300005-14 = "นี่ต้องเป็นที่นิสัยฉันแน่เลยค่ะ... ฉันว่าฉันค่อนข้างขี้อาย..."
2300005-15 = "ถ้าฉันยังเป็นแบบนี้ไปเรื่อยๆ... มันจะโอเคมั้ยคะ?"
2300005-16 = "ถ้าคนอื่นรำคาญที่ฉันเป็นอย่างนี้ล่ะ..."
2300005-17 = "[s] \"...\""
2300005-18 = "...คุณครูคะ?"
2300005-19 = "[s1] ให้คำแนะนำอย่างจริงจังเพราะเป็นการปรึกษาที่ดีมาก\n[s2] ให้คำแนะนำอย่างจริงจังเพราะเป็นเรื่องที่นักเรียนกังวล"
2300005-20 = "เอ่อ... คุณครูคะ?"
2300005-21 = "เอ่อ... คุณครูคะ?"
2300005-22 = "ทำไมจู่ๆ บรรยากาศถึงเปลี่ยนไปแบบนี้ล่ะ..."
2300005-23 = "เรามา... นั่งเงียบๆ กันมั้ยคะ?"
2300005-24 = "[s3] \"ครูนั่งฟังเรื่องของหวานจากไอริได้ทั้งวันเลยล่ะ\"\n[s4] \"ตาของไอริเป็นประกายเลยล่ะเวลาพูดถึงของหวาน\""
2300005-25 = "อ่า... ยะ... อย่างนั้นเหรอคะ?"
2300005-26 = "อ่า... ยะ... อย่างนั้นเหรอคะ?"
2300005-27 = "[s5] \"ไอริดูรู้จักของหวานเยอะแยะเลย\"\n[s6] \"ไอริดูตื่นเต้นทุกครั้งที่ได้พูดเรื่องของหวานเลย\""
2300005-28 = "คะ? บางทีฉันก็คิดแบบนั้นเหมือนกันค่ะ..."
2300005-29 = "คะ? บางทีฉันก็คิดแบบนั้นเหมือนกันค่ะ..."
2300005-30 = "อืม..."
2300005-31 = "ฉันเข้าใจแล้วค่ะว่าคุณครูต้องการสื่ออะไร"
2300005-32 = "ตอนที่ฉันบอกเพื่อนๆ ว่าของหวานจากร้านไหนอร่อยบ้าง..."
2300005-33 = "ตอนที่ฉันเล่าว่าควรเลือกกินไอศกรีมรสไหนดี..."
2300005-34 = "หรือไม่ก็ตอนที่แนะนำของหวานที่ออกใหม่ให้เพื่อนๆ ฟัง..."
2300005-35 = "ตอนนั้นฉัน..."
2300005-36 = "อืม..."
2300005-37 = "ฉันพูดความคิดของฉันออกมาอย่างเต็มที่เลยล่ะค่ะ..."
2300005-38 = "อ่า แหะๆๆ ..."
2300005-39 = "[s7] \"ก็รู้จักตัวเองดีนี่\"\n[s8] ยกนิ้วโป้งให้โดยไม่พูดอะไร"
2300005-40 = "......"
2300005-41 = "......"
2300005-42 = "จริงด้วยนะคะ เรื่องนี้ฉันมองข้ามไปเลย..."
2300005-43 = "อืม... เป็นอย่างนี้นี่เองสินะคะ..."
2300005-44 = "ฉันคิดถูกแล้วล่ะค่ะที่มาปรึกษาคุณครู"
2300005-45 = "......"
2300005-46 = "ว่าแต่ คุณครูคะ"
2300005-47 = "นอกจากเรื่องนี้แล้ว หมู่นี้ฉันมีเรื่องอื่นที่ต้องคิดอยู่ด้วยค่ะ"
2300005-48 = "ถะ... ถ้าคุณครูไม่ว่าอะไรล่ะก็..."
2300005-49 = "ช่วยฟัง... ความคิดของฉันหน่อยได้มั้ยคะ?"
2300005-51 = "(คุณครูใช้เวลาที่เหลือของวันนั่งคุยกับไอริในสนามของทรีนิตี้)"

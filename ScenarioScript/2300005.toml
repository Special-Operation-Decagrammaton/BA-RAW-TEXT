[translation]
2300005-1 = "#title;아이리의 고민"
2300005-2 = "#place;트리니티 교정"
2300005-3 = "3;아이리;03;선생님! 안녕하세요!\n#3;em;[반짝]\n#3;a\n#3;greeting"
2300005-4 = "3;아이리;01;오늘도 행복한 하루 보내고 계신가요?"
2300005-5 = "[s] \"응, 아이리는?\""
2300005-6 = "3;아이리;07;저야말로 선생님을 보니 즐거운걸요.\n#3;em;[재잘]"
2300005-7 = "3;아이리;02;그럼, 잠깐 시간 괜찮으세요?"
2300005-8 = "3;아이리;01;선생님께 상담받고 싶은 것이 있는데요."
2300005-9 = "3;아이리;99;음…… 그게."
2300005-10 = "3;아이리;04;다름이 아니라…….\n#3;em;[속상함]"
2300005-11 = "3;아이리;04;친구들에게 의견이나 생각을 말할 때, 좀 얼버무린다고 해야 할까…….\n#3;em;…"
2300005-12 = "3;아이리;04;제대로 말을 못하고 넘기는 경우가 많은 것 같아서……."
2300005-13 = "3;아이리;99;아무래도 제가……"
2300005-14 = "3;아이리;99;음, 이건 제 성격 문제인데…… 소심한 게 아닌가 싶어서…….\n#3;em;[땀]\n#3;stiff"
2300005-15 = "3;아이리;02;이대로…… 괜찮을까요? 앞으로…… 라던가."
2300005-16 = "3;아이리;04;다른 사람들이 저를 답답하게 여기면…….\n#3;stiff\n#3;em;[속상함]"
2300005-17 = "[s] \"…….\""
2300005-18 = "3;아이리;02;……응? 선생님?\n#3;em;[반응]"
2300005-19 = "[s1] 정말 제대로 된 상담이기에, 진지하게 답하기로 한다.\n[s2] 정말 학생다운 고민이기에, 진지하게 답하기로 한다."
2300005-20 = "3;아이리;02;……어라? 선생님?"
2300005-21 = "3;아이리;02;……어라? 선생님?"
2300005-22 = "3;아이리;02;뭔가 분위기가 변한 느낌이…….\n#3;em;…"
2300005-23 = "3;아이리;04;저, 정좌할까요?\n#3;stiff"
2300005-24 = "[s3] 좋아하는 디저트의 맛을 말할 때의 아이리는,\n[s4] 눈이 빛나고 있었다고 말한다."
2300005-25 = "3;아이리;02;어……. 그, 그랬던가요?"
2300005-26 = "3;아이리;02;어……. 그, 그랬던가요?"
2300005-27 = "[s5] 다양한 디저트를 설명할 때의 아이리는,\n[s6] 항상 적극적이었다고 말한다."
2300005-28 = "3;아이리;02;네? 그, 그랬던 거 같기도 하고…….\n#3;em;[반응]"
2300005-29 = "3;아이리;02;네? 그, 그랬던 거 같기도 하고…….\n#3;em;[반응]"
2300005-30 = "3;아이리;99;……. 으음."
2300005-31 = "3;아이리;01;무슨 얘기를 하시는 지 알 거 같아요.\n#3;greeting"
2300005-32 = "3;아이리;01;……친구들에게 어느 카페의 디저트가 맛있는 지 알려줄 때라던가.\n#3;m2"
2300005-33 = "3;아이리;99;아이스크림 가게에서 어떤 맛을 고를 건지 물어볼 때라던가……\n#3;m3"
2300005-34 = "3;아이리;01;신상 디저트를 다른 친구들에게 소개시켜 줄 때 라던가…….\n#3;m4"
2300005-35 = "3;아이리;99;확실히…… 전……."
2300005-36 = "3;아이리;99;음…….\n#3;em;…"
2300005-37 = "3;아이리;01;이미 제 생각을 적극적으로 잘 말하고 있었네요…….\n#3;m3"
2300005-38 = "3;아이리;04;아, 아하하하…….\n#3;em;[땀]\n#3;stiff"
2300005-39 = "[s7] \"잘 알고 있네.\"\n[s8] 말없이 엄지를 올린다."
2300005-40 = "3;아이리;99;……."
2300005-41 = "3;아이리;99;……."
2300005-42 = "3;아이리;01;…… 응, 그렇네요. 모르고 있었던 부분이지만……. \n#3;greeting"
2300005-43 = "3;아이리;07;……헤헤. 응. 그렇구나……. \n#3;em;[재잘]"
2300005-44 = "3;아이리;01;저, 선생님에게 상담 받길 잘한 것 같아요."
2300005-45 = "3;아이리;01;……."
2300005-46 = "3;아이리;02;저기, 선생님.\n#3;em;[반응]"
2300005-47 = "3;아이리;01;이 고민 말고도, 제가 요즘 생각하는 것들이 조금 있는데요."
2300005-48 = "3;아이리;02;그…… 선생님만 괜찮으시다면."
2300005-49 = "3;아이리;04;제 생각을…… 조금만 더 들어 주시겠어요?\n#3;em;[///]\n#3;stiff"
2300005-50 = "#all;hide"
2300005-51 = "#na;(이후, 남은 시간동안 트리니티의 교정 밴치에 앉아 아이리와 함께 많은 이야기를 나누었다.)"

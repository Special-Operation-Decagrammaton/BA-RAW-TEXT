[translation]
1000503-1 = "เช้าที่สดใสของจอมขี้เกียจ"
1000503-2 = "ห้องชมรมคณะกรรมการแผนงาน"
1000503-3 = "(คุณครูมาหาโฮชิโนะ แต่ไม่เจอใครเลย)"
1000503-4 = "งืม... คร่อก... ฟี้..."
1000503-5 = "(ได้ยินเสียงมาจากห้องเรียนข้างๆ)"
1000503-6 = "[s] ลองไปดูที่ห้องข้างๆ"
1000503-8 = "ห้องชมรม อะบิดอส"
1000503-9 = "คร่อก... ฟี้..."
1000503-10 = "งืมๆ... คร่อกกกก"
1000503-11 = "(โฮชิโนะกำลังนอนอยู่บนโต๊ะเรียนที่นำมาวางต่อๆ กันเป็นที่นอน)"
1000503-12 = "[s] เขย่าตัวปลุกให้ตื่น"
1000503-15 = "หะ... หืม?"
1000503-18 = "วะ... ว้ากกก?! ตกใจหมดเลย!"
1000503-19 = "คุณครู?! มีธุระอะไรเหรอ? "
1000503-20 = "[s] พยายามอธิบาย"
1000503-21 = "มาช่วยฉัน... เพราะฉันส่งข้อความไปงั้นเหรอ?"
1000503-22 = "แหะๆ... เรานัดกันไว้หรอกเหรอ? สงสัยฉันจะละเมอส่งไปน่ะ ซอรี่ๆ"
1000503-23 = "เท่าที่จำได้คือฉันตื่นมาแล้วก็มาโรงเรียน แต่หลังจากนั้นก็จำไม่ค่อยได้แฮะ..."
1000503-24 = "รู้ตัวอีกทีก็มานอนอยู่ที่นี่แล้ว แหะๆ น่าทึ่งมากเลยใช่มั้ย?"
1000503-25 = "ไม่อยากเชื่อเลยนะว่าครูจะมาหาเพราะเป็นห่วง ถึงลุงจะได้ยินคำพูดแบบนั้นบ่อยๆ ก็เถอะ#nแต่พอเจอเข้ากับตัวจริงๆ ก็น่าซึ้งใจนะเนี่ย"
1000503-26 = "ไหนๆ คุณครูก็มาแล้ว เราไปล่าสมบัติกันดีมั้ย?"
1000503-27 = "เอาน่า อย่าปฏิเสธเลย ไปค้นพุ่มหญ้าตรงสนามกีฬากันเถอะ!"
1000503-29 = "(คุณครูกับโฮชิโนะไปค้นบริเวณพุ่มหญ้าที่สนามกีฬากว่า 3 ชั่วโมง แต่ก็ไม่เจออะไรเป็นพิเศษ)"
1000503-30 = "(จากนั้นคุณครูก็กลับไปที่ชาเล่ต์โดยมีโฮชิโนะที่ตัวเปื้อนฝุ่นมอมแมมตามมาส่ง)"

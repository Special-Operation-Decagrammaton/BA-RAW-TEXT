[translation]
1000503-1 = "懶惰蟲的早晨"
1000503-2 = "對策委員會．教室"
1000503-3 = "（來找星野，但什麼人都沒有）"
1000503-4 = "咕噥……呼……"
1000503-5 = "（隔壁的教室傳來聲音）"
1000503-6 = "[s] 去隔壁的教室看看"
1000503-8 = "阿拜多斯高中．教室"
1000503-9 = "…………"
1000503-10 = "…………咕噥，呼。"
1000503-11 = "（星野躺在用桌子併在一起製成的簡易床鋪上）"
1000503-12 = "[s] 試著搖晃肩膀"
1000503-15 = "……唔，嗯？"
1000503-18 = "哇，哇啊？！嚇了一跳！"
1000503-19 = "老師？怎麼這麼突然？ "
1000503-20 = "[s] 說明情況"
1000503-21 = "……看了我的訊息所以來幫我嗎？"
1000503-22 = "……唔嘿。是嗎？我可能睡迷糊了，抱歉抱歉。"
1000503-23 = "雖然有想辦法起床上學，但是之後就沒什麼印象了…… "
1000503-24 = "注意到的時候已經睡在這裡了。唔嘿，這還真是厲害。"
1000503-25 = "因為擔心才來的，沒想到有一天能聽到那樣的台詞。大叔很感激啊～"
1000503-26 = "既然來了，就順便去尋寶吧，老師？"
1000503-27 = "好啦，就別客氣了。今天去操場旁邊的雜草中找找吧！"
1000503-29 = "（在那之後，在操場的雜草堆中找了3個小時，沒有什麼特別的收穫）"
1000503-30 = "（告別了滿身灰塵目送我離開的星野後，回到了夏萊）"

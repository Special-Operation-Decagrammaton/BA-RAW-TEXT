[translation]
1000503-1 = "A Lazy Morning"
1000503-2 = "Foreclosure Task Force Room"
1000503-3 = "I returned to check on Hoshino, but no one was there."
1000503-4 = "Zzz... *snore*"
1000503-5 = "I could hear someone in the next classroom."
1000503-6 = "[s] Go to the next classroom."
1000503-8 = "Abydos Club Room"
1000503-9 = "..."
1000503-10 = "*snore* Zzz..."
1000503-11 = "(Hoshino is lying on a makeshift bed made from a few desks she pushed together.)"
1000503-12 = "[s] Wake her up."
1000503-15 = "...H-Hmm?"
1000503-18 = "Wh-Whoa! You scared me!"
1000503-19 = "Sensei? What are you doing here?"
1000503-20 = "[s] Try to explain."
1000503-21 = "...I sent you a text, so you came to help me?"
1000503-22 = "Heh. I must have sent it in my sleep or something. My bad."
1000503-23 = "I managed to wake up and go to class, but I don't remember much after that..."
1000503-24 = "I guess I fell asleep here. Heh. This is so crazy."
1000503-25 = "You came because you were worried about me. I never thought I'd see the day. I'm moved."
1000503-26 = "Now that you're here, why don't you join me on a treasure hunt, Sensei?"
1000503-27 = "Come on, it'll be fun. Let's go head for the weeds in the schoolyard!"
1000503-29 = "I spent three hours searching through the weeds in the schoolyard, but to no avail."
1000503-30 = "A dust-covered Hoshino then bid me farewell as I went back to Schale."

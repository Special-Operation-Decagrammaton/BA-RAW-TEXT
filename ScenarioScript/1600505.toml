[translation]
1600505-1 = "夏天的大海 憧憬 感慨"
1600505-4 = "（抵達海邊時，弦生早已坐在那邊）"
1600505-5 = "（不同於以往，今天只是靜靜地凝視著大海……）"
1600505-6 = "[s1] 「弦生？」\n[s2] 「大海真美對吧。」"
1600505-7 = "……"
1600505-8 = "……"
1600505-9 = "……嚇！？"
1600505-10 = "老，老師！？您怎麼會來這裡……？"
1600505-11 = "MomoTalk……？所，所以是擔心我才來的嗎……！？"
1600505-12 = "對，對不起，真的沒什麼事情……"
1600505-13 = "讓老師操了不必要的心……真的很對不起……"
1600505-14 = "謝，謝謝老師。您能這麼說，我很感激……"
1600505-15 = "您問我在這裡做什麼嗎……？"
1600505-16 = "呃……"
1600505-17 = "……那個。"
1600505-18 = "其，其實我自己也不是很清楚，因為也不是說正在做什麼事……"
1600505-19 = "就只是……"
1600505-20 = "單純坐在這邊一直看著海……"
1600505-21 = "怎麼說呢……"
1600505-22 = "只是和我在小說裡看到的「海邊風景」不太一樣……"
1600505-23 = "幾乎沒有其他觀光客，很安靜，只有我孤零零一個人……"
1600505-24 = "覺得有些寂寞，卻也莫名覺得好像不錯……？"
1600505-25 = "……？"
1600505-26 = "我看起來，很開心嗎？"
1600505-27 = "真，真的嗎？對不起，我也不太清楚自己心裡是怎麼想的……"
1600505-28 = "嘰嘻……"
1600505-29 = "[s3] 「我覺得不需要和其他人的想法完全一樣喔。」\n[s4] 「弦生有什麼感受才是最重要的。」"
1600505-30 = "是，是這樣嗎？原來如此……？"
1600505-31 = "是，是這樣嗎？原來如此……？"
1600505-32 = "……來到這裡之後，遇到好多在三一時不知道的事情。"
1600505-33 = "而且嘗試之後，都能從中感受到奇妙的感覺……"
1600505-34 = "讓我一直在想，這麼做是否洽當，這麼做是否正確……"
1600505-35 = "[s5] 「對於初次接觸的事物本來就會覺得不安。」\n[s6] 「但弦生現在的表情看起來很開心。」"
1600505-36 = "啊，是，是的……"
1600505-37 = "啊，是，是的……"
1600505-38 = "或許真的是這樣吧……"
1600505-39 = "剛開始我還很不知所措……"
1600505-40 = "但現在回想起來……每件事最終確實都非常愉快……"
1600505-41 = "……"
1600505-42 = "嘰嘻……"
1600505-43 = "嘰嘻嘻……是啊。看來，我果然是真的很快樂。而且，現在也是……"
1600505-44 = "……老師真是了不起。"
1600505-45 = "心裡舒暢多了。是啊，回想起來，每件事都很開心。"
1600505-46 = "而且也有很多，其他地方沒辦法做的事……"
1600505-47 = "[s7] 「嗯，和弦生一起玩我也覺得很快樂。」\n[s8] （雖然大多都是一些特殊的玩法……）"
1600505-48 = "……咯咯，嘰嘰嘰。"
1600505-49 = "……咯咯，嘰嘰嘰。"
1600505-50 = "……老，老師。"
1600505-51 = "那個……"
1600505-54 = "非常感謝。"
1600505-56 = "……謝謝老師能這樣，"
1600505-57 = "陪我來一起海邊，我真的非常高興。"

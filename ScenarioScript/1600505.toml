[translation]
1600505-1 = "Summer Ocean Stairs"
1600505-4 = "I went to the beach and found Tsurugi sitting in the sand."
1600505-5 = "She was gazing at the water without moving or looking around much, unlike before."
1600505-6 = "[s1] \"Tsurugi?\"\n[s2] \"What are you looking at?\""
1600505-7 = "...?"
1600505-8 = "...?"
1600505-9 = "*gasp*?!"
1600505-10 = "S-Sensei. What are you doing here?"
1600505-11 = "My MomoTalk? You came because you were worried?"
1600505-12 = "I-I mean...there's nothing more to what I said."
1600505-13 = "I'm sorry if I worried you."
1600505-14 = "Even if you say it's all right, I still..."
1600505-15 = "Huh? What am I doing here?"
1600505-16 = "Um..."
1600505-17 = "..."
1600505-18 = "I'm not really sure myself. I wasn't really doing anything."
1600505-19 = "I was just..."
1600505-20 = "I was just sitting here and staring at the water. I'm not sure why."
1600505-21 = "I wonder why..."
1600505-22 = "Maybe because it's not like how I pictured it."
1600505-23 = "There aren't any beachgoers around, and there isn't any sign of fun or activity anywhere. It's just me all by myself."
1600505-24 = "Maybe what I'm feeling is...wistful regret?"
1600505-25 = "Huh?"
1600505-26 = "That's not what you were expecting?"
1600505-27 = "Well, I guess I can't really tell how I come across to other people, so... Kehehe."
1600505-28 = "Keke, kehehe..."
1600505-29 = "[s3] \"Maybe it doesn't matter if it's not the beach experience others have.\"\n[s4] \"You've looked like you were having fun to me.\""
1600505-30 = "Really? I'm not sure if that's true, but...okay."
1600505-31 = "Really? I'm not sure if that's true, but...okay."
1600505-32 = "What I mean to say is, I know I've felt different than when I'm at Trinity since I've been here."
1600505-33 = "But there's still so much that didn't live up to my expectations."
1600505-34 = "It made me wonder. Is what I experienced really okay? Could it be there was something I was doing wrong?"
1600505-35 = "[s5] \"Nothing is ever like people imagine it their first time.\"\n[s6] \"You still look pretty satisfied if you ask me, Tsurugi.\""
1600505-36 = "Oh. Okay..."
1600505-37 = "Oh. Okay..."
1600505-38 = "Maybe you're right."
1600505-39 = "Everything did feel so unfamiliar at first..."
1600505-40 = "...but I guess it was also fun now that I think about it."
1600505-41 = "..."
1600505-42 = "Keke, heehee..."
1600505-43 = "So it is. Yes, I think what you said was right."
1600505-44 = "You always seem to know everything, Sensei. I never would have been able to realize this on my own."
1600505-45 = "I feel like I was worrying for nothing. I guess I was doing okay."
1600505-46 = "I mean, I've done a lot of things that I couldn't do elsewhere, like playing with you..."
1600505-47 = "[s7] \"It was pretty fun.\"\n[s8] \"(Fun is what you make of it, I guess.)\""
1600505-48 = "Keke..."
1600505-49 = "Keke..."
1600505-50 = "Right."
1600505-51 = "From the bottom of my heart..."
1600505-54 = "...thank you, Sensei."
1600505-56 = "Thank you for bringing me here."
1600505-57 = "To the beach."

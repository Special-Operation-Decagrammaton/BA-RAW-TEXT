[translation]
1600505-1 = "ภาพฝันของทะเลฤดูร้อน"
1600505-4 = "(คุณครูไปที่ทะเลและเจอซึรุกินั่งอยู่ที่ริมชายหาด)"
1600505-5 = "(เธอนั่งเหม่อมองทะเลอยู่เฉยๆ และไม่ได้ดูลุกลี้ลุกลนไปรอบๆ เหมือนที่ผ่านมา)"
1600505-6 = "[s1] \"ซึรุกิ?\"\n[s2] \"มองอะไรอยู่เหรอ?\""
1600505-7 = "...?"
1600505-8 = "...?"
1600505-9 = "...!? เฮือก!!"
1600505-10 = "คะ... คุณครู! มาทำอะไรที่นี่เหรอคะ...?"
1600505-11 = "เอ๋? ข้อความ MOMOTALK ที่ฉันส่งไปเหรอคะ...? คุณครูมาเพราะเป็นห่วงฉันงั้นเหรอ...!?"
1600505-12 = "ปะ...เปล่าค่ะ คือมันไม่มีอะไรเหมือนที่ฉันบอกไปตามข้อความจริงๆ"
1600505-13 = "เหมือนจะทำให้คุณครูเป็นห่วง ขอโทษด้วยนะคะ..."
1600505-14 = "ไม่เป็นไรงั้นเหรอคะ? ขอบคุณนะคะที่พูดแบบนี้แต่ว่าฉัน..."
1600505-15 = "คะ? ฉันกำลังทำอะไรอยู่น่ะเหรอคะ?"
1600505-16 = "อืม..."
1600505-17 = "..."
1600505-18 = "ที่จริงฉันก็ไม่รู้เหมือนกันค่ะ รู้สึกเหมือนไม่ได้ทำอะไรอยู่เลยค่ะ"
1600505-19 = "ฉันก็แค่..."
1600505-20 = "ฉันก็แค่นั่งมองทะเลอยู่ตรงนี้เฉยๆ ค่ะ ฉันก็ไม่แน่ใจเหมือนกันค่ะว่าเพราะอะไร..."
1600505-21 = "เพราะอะไรกันนะ..."
1600505-22 = "บางทีอาจเป็นเพราะทะเลฤดูร้อนมันต่างกับที่ฉันจินตนาการเอาไว้ก็ได้ค่ะ"
1600505-23 = "เพราะรอบๆ ไม่มีนักท่องเที่ยว และไม่ครึกครื้นเลย...? มีแค่ตัวฉันอยู่คนเดียว..."
1600505-24 = "หรือสิ่งที่ฉันกำลังรู้สึกอยู่... อาจเป็นความผิดหวังรึเปล่านะคะ?"
1600505-25 = "คะ...?"
1600505-26 = "ฉันไม่ได้ดูเป็นอย่างนั้นเหรอคะ?"
1600505-27 = "งั้นเหรอคะ... ที่จริงฉันก็ไม่รู้เลยว่าตัวเองดูเป็นยังไง... คิกๆ..."
1600505-28 = "คิกๆๆ..."
1600505-29 = "[s3] \"ทะเลของเราไม่เห็นต้องเหมือนของคนอื่นก็ได้นี่?\"\n[s4] \"คงไม่ใช่ความผิดหวังหรอก ครูว่าเธอก็ดูสนุกดีนะ\""
1600505-30 = "จริงเหรอคะ...? ถึงฉันไม่ค่อยแน่ใจเท่าไร แต่... ก็ได้ค่ะ..."
1600505-31 = "จริงเหรอคะ...? ถึงฉันไม่ค่อยแน่ใจเท่าไร แต่... ก็ได้ค่ะ..."
1600505-32 = "ที่ฉันมั่นใจก็คือ... พอมาที่นี่ฉันรู้สึกแตกต่างจากตอนที่ฉันอยู่ที่ทรีนิตี้ค่ะ"
1600505-33 = "แต่ก็มีหลายๆ อย่างที่แตกต่างจากที่ฉันคาดหวังไว้โดนสิ้นเชิง"
1600505-34 = "มันเลยทำให้ฉันสงสัยว่า สิ่งที่ฉันได้มาเจอมันโอเคแล้วจริงๆ รึเปล่า หรือว่ามันมีอะไรผิดพลาด#nไปรึเปล่าน่ะค่ะ"
1600505-35 = "[s5] \"สิ่งที่เราคิดมักจะไม่เหมือนกับที่เราได้เจอในครั้งแรกหรอก\"\n[s6] \"แต่ตอนนี้ซึรุกิก็มีสีหน้าที่โอเคอยู่นะ\""
1600505-36 = "อา... ค่ะ"
1600505-37 = "อา... ค่ะ"
1600505-38 = "อาจเป็นแบบนั้นก็ได้นะคะ"
1600505-39 = "ทุกอย่างดูไม่คุ้นเคยเลยสำหรับฉันในตอนแรก..."
1600505-40 = "แต่พอมาคิดดูอีกครั้ง สุดท้ายแล้วมันก็อาจเป็นเรื่องที่สนุกก็ได้..."
1600505-41 = "..."
1600505-42 = "ฮิฮิ..."
1600505-43 = "นั่นน่ะสิคะ... ฉันคิดว่าที่คุณครูพูดมาก็ถูกนะคะ"
1600505-44 = "คุณครูรอบรู้ไปหมดทุกอย่างเลยนะคะ ถ้าฉันยังคงนั่งคิดอยู่คนเดียวคงไม่ได้คำตอบอะไรแน่เลย"
1600505-45 = "ฉันรู้สึกเหมือนว่าจะกังวลในสิ่งที่ไม่จำเป็นอยู่เลยค่ะ ทั้งที่จริงๆ ฉันก็ทำได้ดีอยู่แล้วแท้ๆ..."
1600505-46 = "หมายถึง... ฉันได้ทำอะไรหลายอย่างที่ไม่สามารถทำที่อื่นได้ อย่างเช่น ได้วิ่งเล่นสนุกกับคุณครู..."
1600505-47 = "[s7] \"ครูสนุกมากเลยนะ\"\n[s8] (ถึงบางอย่างมันจะแปลกๆ ไปสักหน่อยก็เถอะ..)"
1600505-48 = "ฮิฮิ..."
1600505-49 = "ฮิฮิ..."
1600505-50 = "ค่ะ..."
1600505-51 = "ขอบคุณนะคะคุณครู..."
1600505-54 = "ขอบคุณในหลายๆ เรื่องเลยนะคะ"
1600505-56 = "แล้วก็..."
1600505-57 = "ขอบคุณมากเลยนะคะที่พาฉันมาทะเล"

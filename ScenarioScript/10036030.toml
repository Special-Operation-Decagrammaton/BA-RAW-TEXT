[translation]
10036030-1 = "Episode 3;Approaching Shadow"
10036030-5 = "It's so loud."
10036030-6 = "Yeah, well, we're right by the beach. There's a ton of seagulls."
10036030-7 = "I don't mind them, just the Helmet Gangster brats!"
10036030-8 = "With their \"Grand Alliance Gathering.\" Come on!"
10036030-9 = "They think they can mess with our Big Sis and then throw a full on party?!"
10036030-10 = "As if Outlaw Beach belongs to them!"
10036030-11 = "Right?"
10036030-12 = "Anybody else want to do something about that?"
10036030-14 = "Yeah!"
10036030-15 = "I've been waiting for a chance to get back at them."
10036030-16 = "They crossed our Big Sis, and they WILL pay the price."
10036030-17 = "Let them think they're having a good time, and then? We swoop in and crush them!"
10036030-18 = "Which reminds me, what was with that...professor girl? The one who said she'd organize a plan if we paid her?"
10036030-19 = "She's probably an information broker from the Black Market."
10036030-20 = "I mean, I'm guessing. She wouldn't let us see her face."
10036030-21 = "Yeah, she was pretty sketchy."
10036030-22 = "Still, sketchy or not, the point is those Helmet Goons are hosting a festival right in front of our eyes!"
10036030-23 = "I hope you're all ready to ruin it!"
10036030-24 = "Yeah!"
10036030-25 = "All right. So what we're gonna do..."
10036030-29 = "...Ah, there's the call, right on time. Guess the plan's ready."
10036030-34 = "There you are, Sensei. Did you find your wallet?"
10036030-35 = "Wonderful. Perfect timing. Please, come hide behind this rock with us."
10036030-39 = "[ns] Follow Atsuko behind the rock."
10036030-41 = "Quit shoving, Hiyori. Ugh, why are we so close together? There's so much space..."
10036030-42 = "There WAS more space. We've got one more person now. And they're right up against me."
10036030-43 = "[s] \"I'm sorry...\""
10036030-45 = "Shh, everyone be quiet. She might hear us."
10036030-46 = "Saori? Where is she?"
10036030-47 = "Over there, by the shoreline."
10036030-50 = "DJ B.o.B! Thanks for coming!"
10036030-51 = "You're the best in the Black Market. With you here, this whole party's gonna be a blast!"
10036030-56 = "*ahem* Well, it's the Helmet Gang's big event. I'm happy to help."
10036030-57 = "We're all clear on the payment, right?"
10036030-58 = "Of course. We'll send it to your account as soon as the party's over."
10036030-59 = "Good, good. Honor among thieves, and all that."
10036030-60 = "Hey! Part-timer! Be careful with that. It's expensive!"
10036030-62 = "Hup! Understood!"
10036030-63 = "Move it over there, and then check that speaker! I saw some scratches on it earlier."
10036030-64 = "If anything breaks, it's gonna be on you. Treat it all like it's more valuable than you are!"
10036030-65 = "...Understood!"
10036030-66 = "Yeah. Oh, and move that prop about a meter to the left."
10036030-67 = "Didn't you say it was too far left earlier?"
10036030-68 = "Yeah, but now I like it better that way."
10036030-69 = "What, you got a problem with that? If this isn't going to work out, I can just go home."
10036030-70 = "*gasp* D-Don't! Please stay. We'll make it right."
10036030-71 = "Part-timer, do as you're told! Now!"
10036030-72 = "...Understood!"
10036030-75 = "...What an unpleasant man."
10036030-76 = "They may be paying her, but they needn't treat her so."
10036030-77 = "Textbook definition of a corrupt client. If I were in her place, I'd have shot them already."
10036030-78 = "Yeah, it's a sweatshop here for sure."
10036030-79 = "At this rate, chronic fatigue and insomnia will make every day a struggle for her... She might collapse from stress-induced gastritis or hypertension..."
10036030-80 = "[s1] \"Sounds like office work. We get all those in a gift bundle.\"\n[s2] \"Those all sound surprisingly familiar...\""
10036030-83 = "We must do something."
10036030-84 = "B-But weren't we going to \"watch from afar\"?"
10036030-85 = "If we get involved, she'll see us for sure."
10036030-86 = "...I wanted her to have a bit of a hard time, but not like that."
10036030-87 = "Let's see what strings we can pull from behind the scenes."
10036030-92 = "Gently, that is."
10036030-96 = "*huff* *huff*..."
10036030-97 = "Actually, I think the speaker should be a little closer to the audience."
10036030-98 = "Move it again, part-timer!"
10036030-99 = "U-Understood."
10036030-100 = "What's the holdup? We've barely even started!"
10036030-101 = "Hmph. THIS is my \"assistant and bodyguard\"? I am not impressed."
10036030-102 = "..."
10036030-103 = "I'm going to go take a walk. Move it while I'm gone. You got it?"
10036030-104 = "Yes, yes, I've got it."
10036030-105 = "Mm-hm, that fresh sea breeze!"
10036030-114 = "The trail's clean too. Good, good."
10036030-115 = "I should send the part-timer out for some ramen or something when I get back."
10036030-116 = "I deserve THAT much for coming all the way out here— Huh?!"
10036030-125 = "Wh-Who are you guys, popping up out of nowhere like this?"
10036030-126 = "Out of my way! I'm trying to have a nice walk!"
10036030-127 = "Would you join us for a chat, Mister DJ? It won't be long."
10036030-128 = "What, you want an autograph? Not happening. The fan meetup rules are all posted online. Go read 'em."
10036030-132 = "Wh-Why are you all holding guns...?"
10036030-133 = "[s] \"Wait-wait-wait! Misaki! You said 'gently'!\""
10036030-134 = "Oh, this is me being gentle."
10036030-135 = "I-I don't know who you are, but you're making a mistake!"
10036030-136 = "Do you even know who I am? I'm DJ B.o.B! If anything happens to me, the Helmet Gang's going to pay you right back for it!"
10036030-137 = "If you've got ANY sense at all, you'd better put those guns— Ow!"
10036030-143 = "My hand slipped."
10036030-144 = "No hurting him, Misaki. Don't waste all of Sao-Sao's hard work on his concert."
10036030-145 = "I know. I just can't stand the way he talks."
10036030-146 = "We can resolve this peacefully. Isn't that so, Mister DJ B.o.B?"
10036030-148 = "D-Do you have a deathwish?! I'll call the Helmet Gang right now and—"
10036030-152 = "OW!"
10036030-153 = "[s] \"Atsuko, you too?!\""
10036030-158 = "I...don't care for the way he talks either."
10036030-160 = "Damned brats... Ugh..."
10036030-165 = "H-Hey, sorry to interrupt while you're threatening him, but..."
10036030-167 = "We're only talking with him. What's the matter?"
10036030-169 = "Well, I was just on lookout up in that tree, and there's people headed this way."
10036030-170 = "I ran the numbers, and they'll be here in the next ten seconds. I did lay a trap for them, if you want me to go spring it."
10036030-175 = "No, hold it for now. Hiyori, go back to where you were. Hime, you secure the DJ."
10036030-176 = "And as for you, Sensei..."
10036030-177 = "[s] \"I guess I'll help secure the DJ.\""
10036030-178 = "...Sure, that works."
10036030-180 = "You brats! Who do you think you are? You can't just— Mmph!"
10036030-189 = "Please, Mister B.o.B, I implore you, stop talking."
10036030-191 = "...They're coming."
10036030-198 = "Haha! The DJ's gift-wrapped in front of us! Just like we planned!"
10036030-199 = "It'd BETTER go just like we planned. We all broke the bank to pay for it!"
10036030-200 = "Ah, now that stupid festival's as good as over!"
10036030-203 = "The festival's what?"
10036030-205 = "Hey, who are you? Helmet Gangsters? No, you don't have helmets..."
10036030-206 = "What do you have to do with DJ B.o.B?"
10036030-207 = "Whatever it is, move over! We're here to kidnap him!"
10036030-209 = "Mmph?!"
10036030-211 = "Kidnap?"
10036030-212 = "[s] \"Kidnap?!\""
10036030-213 = "Thugs, huh? You trying to ruin the festival?"
10036030-215 = "Hell yeah, we are! We owe you Helmet jerks!"
10036030-216 = "The plan we bought says all we've gotta do is kidnap DJ B.o.B, and the whole festival falls apart. It's perfect!"
10036030-217 = "And then we'll have our own DJ! We'll make him do turntable scratches all day for a week!"
10036030-218 = "All day? Let's make it thirty-six hours a day! Really make him show how much he loves Big Sis!"
10036030-220 = "Hnnngh...!"
10036030-222 = "I'm sure you have your reasons for revenge, but we can't allow it."
10036030-223 = "Our friend Saori has worked too hard on this festival to let it go to ruin."
10036030-224 = "Her intentions and her aspirations are noble to a fault, and deserve their just reward."
10036030-226 = "Huh. Okay, I guess we're gonna have to disagree."
10036030-227 = "So what are you gonna do? Stop us?"
10036030-228 = "Everybody, come on out!"
10036030-238 = "You two are outnumbered and outgunned. Back off before it gets ugly."
10036030-240 = "Okay, if you say so, we will."
10036030-241 = "But first, you there, would you move three steps to the left?"
10036030-243 = "Huh? What are you talking about?"
10036030-247 = "Like this?"
10036030-249 = "Just like that."
10036030-250 = "Do it, Hiyori."
10036030-256 = "Agh! S-Sniper!"
10036030-258 = "Your turn, Atsuko."
10036030-259 = "At once!"

[translation]
10036030-1 = "第3話;逼近的黑影"
10036030-5 = "吵死了。"
10036030-6 = "就是說啊。#n可能是因為這座森林靠海的關係，海鷗一直叫個不停。"
10036030-7 = "不是那個啦混蛋！我指的是頭盔團那些傢伙！"
10036030-8 = "什麼聯歡會嘛！未免也太囂張了！"
10036030-9 = "也不想想他們對大姐頭做了什麼好事，竟然還好意思嘻嘻哈哈地舉辦慶典……！"
10036030-10 = "就是啊。弄得好像「不法者海灘」是他們的地盤一樣！"
10036030-11 = "沒錯沒錯！"
10036030-12 = "你們也這麼覺得吧？"
10036030-14 = "那當然！"
10036030-15 = "我們一直在尋找報仇的機會。"
10036030-16 = "把大姐頭害成那樣的代價，一定要讓他們好好償還。"
10036030-17 = "在他們最開心的時候大搞破壞──這就是我們的復仇……！"
10036030-18 = "話說回來，那個叫教授的人到底是什麼來頭啊？#n居然只要給錢就能幫人擬定計畫……"
10036030-19 = "只是黑市裡常見的情報販子吧。"
10036030-20 = "既然他堅持不露面，只敢用通訊設備跟我們聯絡……#n我看八成是個沒種親自出馬的膽小鬼。"
10036030-21 = "唔嗯，還是覺得有點可疑……"
10036030-22 = "可不可疑不是重點，重點是那些頭盔團的傢伙正在大搖大擺地舉辦慶典！"
10036030-23 = "大家，都準備好把這場慶典搞得亂七八糟了嗎！"
10036030-24 = "準備好了！"
10036030-25 = "很好，那麼……！"
10036030-29 = "……電話來的正是時候。#n看來計劃已經順利成功了吧。"
10036030-34 = "啊，老師。看來你已經找到錢包了呢。"
10036030-35 = "你來得正好，先躲到這塊石頭後面吧。"
10036030-39 = "[ns] 照著敦子說的躲到岩石後方"
10036030-41 = "日和，你不要推我。#n空間明明這麼大，何必擠來擠去的……"
10036030-42 = "多，多了一個人當然會變擠嘛……#n所以我才會撞來撞去的……"
10036030-43 = "[s]「我很抱歉……」"
10036030-45 = "嘘，大家安靜。會被沙醬聽到的。"
10036030-46 = "沙織姐在哪裡？"
10036030-47 = "那裡，你看海邊的方向。"
10036030-50 = "非常感謝您的到來，DJ B.o.B！"
10036030-51 = "多虧您這位黑市最強DJ的蒞臨，我們的聯歡會才能更顯風采！#n真是感激不盡！"
10036030-56 = "嗯，畢竟這是頭盔團的重要活動，我自然不能缺席了。"
10036030-57 = "話說回來，數字確定跟說好的一樣吧？"
10036030-58 = "那當然。等慶典結束之後，馬上就會轉帳給您。"
10036030-59 = "很好很好。大家都是在黑市走跳的人，言而有信可是很重要的……"
10036030-60 = "喂！那邊的打工仔！#n那東西可是很貴的，搬的時候給我小心一點！"
10036030-62 = "是！我知道了！"
10036030-63 = "搬完之後再去把音箱就定位！#n我剛才檢查的時候發現邊緣有刮痕……"
10036030-64 = "要是東西故障的話，負責搬運的你可是要負起全責的……#n勸你最好把這些東西看得比自己的性命還珍貴！"
10036030-65 = "……我明白了。"
10036030-66 = "還有，待會再去把舞台右邊的裝飾往左移個1m。"
10036030-67 = "可是你剛才明明才說太靠左了……"
10036030-68 = "我現在就覺得這個位置比較好啊！"
10036030-69 = "怎麼，你有什麼不滿嗎？還是我乾脆現在走人算了？"
10036030-70 = "啊！那，那可不行！請您息怒！"
10036030-71 = "打工仔！趕快照做！快點快點！"
10036030-72 = "……我知道了。"
10036030-75 = "……好過分。"
10036030-76 = "即使對方是沙醬的雇主，這樣對待別人也太過分了。"
10036030-77 = "這種惡劣的雇主，把他釘在牆上當標本都嫌浪費。#n換作是我早就開槍了。"
10036030-78 = "就是說啊……真是黑心的慣老闆……"
10036030-79 = "再這樣下去，沙織姐遲早會深陷在慢性疲勞和失眠症的痛苦之中……#n最後因為壓力型胃痛或高血壓而昏倒……"
10036030-80 = "[s1]「這是什麼上班族必備大禮包嗎……」\n[s2]「這些病名我怎麼有點耳熟……」"
10036030-83 = "得想想辦法才行。"
10036030-84 = "可，可是我們不是說好要默默守護沙織姐的嗎？"
10036030-85 = "要是現在出手的話，肯定會被發現的哦？"
10036030-86 = "……雖然我也希望他能吃點苦，但不是透過這種方式。"
10036030-87 = "從背後動點手腳吧。"
10036030-92 = "當然……是親切又不失禮貌的那種。"
10036030-96 = "哈啊，哈啊……"
10036030-97 = "不不不，我看音箱還是擺在離觀眾近一點的地方好了。"
10036030-98 = "打工仔，你再把位置移動一下！"
10036030-99 = "我，我知道了。"
10036030-100 = "到底在磨蹭什麼啊？要你做點事有這麼難嗎？"
10036030-101 = "唉，就這點程度還敢說是我的助手兼保鏢。嘖嘖嘖。"
10036030-102 = "……"
10036030-103 = "我出去吹吹風，你趕快把東西移好，聽到沒有？"
10036030-104 = "我知道了。"
10036030-105 = "哼哼～清爽的海風～"
10036030-114 = "步道也修整得不錯嘛。挺好的挺好的。"
10036030-115 = "回去之後再叫打工仔去買碗拉麵回來。"
10036030-116 = "既然要本大爺親自表演，這種程度的服務也是理所當──嗯！？"
10036030-125 = "你，你們是誰？為什麼要擋在我面前……"
10036030-126 = "給我讓開！別打擾我散步！"
10036030-127 = "方便跟我們聊聊嗎，DJ先生？#n不會耽誤你太多時間的。"
10036030-128 = "真是的，是來跟我要簽名的嗎？#n不行不行，要參加粉絲見面會麻煩走官方流程。"
10036030-132 = "你，你幹嘛突然往槍裡裝子彈……？"
10036030-133 = "[s]「先先先等一下！美咲！說好的『親切又不失禮貌』呢！」"
10036030-134 = "這樣還不夠「親切」嗎？"
10036030-135 = "雖，雖然不知道你們是誰，但這樣對我可是會倒大楣的！"
10036030-136 = "你們知不知道我是誰啊？DJ B.o.B聽過沒有？#n要是我出了什麼事的話，頭盔團肯定不會放過你們的。"
10036030-137 = "要是不想被秋後算帳的話，最好立刻把槍給我拿……啊！"
10036030-143 = "不小心手滑了。"
10036030-144 = "美咲，不可以真的弄傷他哦。#n不然沙醬準備的表演就要開天窗了。"
10036030-145 = "我知道。誰叫這傢伙講話那麼討人厭。"
10036030-146 = "我相信他一定能好好溝通的──你說對吧，DJ B.o.B先生？"
10036030-148 = "喂！你們真的想死是不是！我現在就去叫頭盔團來……！"
10036030-152 = "好痛！"
10036030-153 = "[s]「連敦子也……！？」"
10036030-158 = "這樣講話會讓別人很不舒服的。"
10036030-160 = "這些可惡的傢伙……唔……"
10036030-165 = "那，那個，抱歉打擾你們恐嚇……"
10036030-167 = "這不是恐嚇，是溝通哦，日和。#n話說有什麼事嗎？"
10036030-169 = "那個……我在樹上發現有群人正往這邊過來。"
10036030-170 = "根據我的計算，大約再10秒左右就會到達這裡……#n耶嘿嘿，需要啟動提前設置的陷阱嗎？"
10036030-175 = "不，先別輕舉妄動吧。#n日和就在原位待命，公主幫忙看好DJ。"
10036030-176 = "至於老師……"
10036030-177 = "[s]「我會待在旁邊的。」"
10036030-178 = "……隨你高興吧。"
10036030-180 = "這群混帳，誰准你們擅自決定──呃啊！？"
10036030-189 = "B.o.B先生，麻煩你安靜一點。"
10036030-191 = "……來了。"
10036030-198 = "哈哈！DJ B.o.B竟然真的在這裡？#n所以計劃成功了嗎？"
10036030-199 = "錢都給了當然要成功啊！那些可是大家一點一滴存下來的零用錢耶！"
10036030-200 = "很好！這樣頭盔團的慶典就沒戲唱了！"
10036030-203 = "你們剛才說慶典怎麼了？"
10036030-205 = "你們是誰啊？頭盔團的？#n可是又沒有戴頭盔……"
10036030-206 = "你們跟DJ B.o.B是什麼關係？"
10036030-207 = "沒關係的話就給我讓開！我們要綁架這傢伙！"
10036030-209 = "呃唔！？"
10036030-211 = "綁架？"
10036030-212 = "[s]「綁架！？」"
10036030-213 = "這些太妹……打算破壞慶典嗎？"
10036030-215 = "沒錯！我們要向頭盔團報仇！"
10036030-216 = "根據那個什麼教授的計畫──只要綁走DJ B.o.B，頭盔團的聯歡會就會徹底完蛋！#n畢竟那可是壓軸的活動啊！真是太完美了！"
10036030-217 = "沒錯沒錯！綁架之後還要強迫他整天工作！一週之內都得不停地刷碟！"
10036030-218 = "為了大姐頭，每天36小時感謝地刷碟！"
10036030-220 = "呃唔唔……！"
10036030-222 = "報仇……雖然不知道是什麼意思，但我不能讓你們得逞。"
10036030-223 = "這場慶典是沙醬努力準備的。"
10036030-224 = "所以不能讓你們隨便破壞。"
10036030-226 = "哈，這些傢伙好像聽不懂人話耶。"
10036030-227 = "所以呢？你們打算妨礙我們嗎？"
10036030-228 = "姐妹們！"
10036030-238 = "只有三個人也想跟我們打？#n勸你們還是快滾吧，否則可別怪我們不客氣了。"
10036030-240 = "好吧，那也沒辦法了。"
10036030-241 = "不過那邊那個人，可以麻煩往左邊走三步嗎？"
10036030-243 = "嗯？什麼意思？"
10036030-247 = "這樣嗎？"
10036030-249 = "做得很好。"
10036030-250 = "──日和。"
10036030-256 = "阿娘喂！有，有狙擊手！"
10036030-258 = "趁現在，敦子。"
10036030-259 = "嗯！"

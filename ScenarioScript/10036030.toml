[translation]
10036030-1 = "ตอนที่ 3;เงาที่ใกล้เข้ามา"
10036030-5 = "หนวกหูชะมัดเลย!"
10036030-6 = "นั่นน่ะสิ คงเป็นเพราะอยู่ในป่าติดชายหาด ก็เลยได้ยินเสียงนกนางนวลแสบหูแบบนี้น่ะ"
10036030-7 = "ยัยบื้อนี่ ฉันไม่ได้พูดถึงนกสักหน่อย! พูดถึงพวกแก๊งหมวกกันน็อกต่างหากเล่า!"
10036030-8 = "จัดงานสหพันธ์กันงั้นเรอะ อวดดีชะมัด!"
10036030-9 = "ลืมเรื่องที่ก่อไว้กับลูกพี่ใหญ่ของเรา แล้วมาสนุกสนานรื่นเริงกันในงานเทศกาลเนี่ยนะ...!"
10036030-10 = "ใช่ ทำเหมือนว่า <ชายหาดนอกกฎหมาย> เป็นที่ของตัวเองอย่างนั้นละ!"
10036030-11 = "ใช่ๆ!"
10036030-12 = "พวกเธอก็คิดเหมือนกันใช่มั้ย?"
10036030-14 = "ใช่เลย!"
10036030-15 = "เจ้าพวกแก๊งหมวกกันน็อก ฉันคิดอยู่แล้วว่าสักวันต้องมีโอกาสได้ล้างแค้นพวกแก"
10036030-16 = "มาทำให้ลูกพี่ใหญ่ของเราลงเอยแบบนั้นได้ยังไง! พวกแกก็ต้องเจอดีบ้าง"
10036030-17 = "ถ้าจะแก้แค้นให้สาสมที่สุด ก็ต้องเข้าไปก่อกวนตอนที่กำลังสนุกที่สุดกันนี่ละ...!"
10036030-18 = "ว่าแต่ศาสตราจารย์คนนั้นคือใครเหรอ? คนที่ถ้าให้เงินก็จะวางแผนการให้น่ะ..."
10036030-19 = "ก็คงเป็นหน่วยข่าวกรองที่มีอยู่เกลื่อนตลาดมืดนั่นแหละ"
10036030-20 = "ดูจากการที่เธอปิดบังหน้าตาและให้ได้ยินแค่เสียงแล้ว สงสัยจะไม่มั่นใจในหน้าตาตัวเองน่ะ"
10036030-21 = "อืม น่าสงสัยอยู่นะเนี่ย..."
10036030-22 = "เรื่องนั้นเอาไว้ก่อนเถอะ ตอนนี้เรื่องที่สำคัญคือเจ้าพวกแก๊งหมวกกันน็อกกำลังสนุกกับงานเทศกาลกัน#nอยู่ต่างหาก!"
10036030-23 = "ทุกคนพร้อมที่จะไปป่วนเทศกาลให้เละตุ้มเป๊ะกันแล้วใช่มั้ย!?"
10036030-24 = "พร้อมแล้ว!"
10036030-25 = "ดีละ ถ้างั้นก็...!"
10036030-29 = "มีโทรศัพท์เข้ามาพอดีเลย... สงสัยจะวางแผนเสร็จแล้วสินะ"
10036030-34 = "อ๊ะ คุณครู เจอกระเป๋าสตางค์แล้วเหรอ?"
10036030-35 = "มาได้ตรงจังหวะเลย เอาละ มาซ่อนตัวหลังหินก้อนนี้"
10036030-39 = "[ns] เข้าไปแอบหลังก้อนหินตามที่อาสึโกะบอก"
10036030-41 = "ฮิโยริ อย่าผลักสิ อึก... ที่ก็ออกจะกว้าง แต่เราดันมาทำอะไรกันเนี่ย..."
10036030-42 = "พะ... พอมีมาเพิ่มอีกคน ที่ก็แคบลงไปเลยนะคะ... เบียดกันเป็นปลากระป๋องแล้ว..."
10036030-43 = "[s] \"ขอโทษนะ...\""
10036030-45 = "ชู่ว ทุกคนเงียบ เดี๋ยวซัตจังก็ได้ยินหรอก"
10036030-46 = "พี่ซาโอริอยู่ตรงไหนเหรอคะ?"
10036030-47 = "โน่นไง ดูตรงชายหาดสิ"
10036030-50 = "ขอบคุณที่ตอบรับงานของเรานะคะ ดีเจ B.o.B!"
10036030-51 = "พอมีดีเจที่เก่งที่สุดในตลาดมืดอย่างคุณมาด้วย งานสหพันธ์ของเราก็น่าจะสนุกขึ้นอีกเป็นกองเลยค่ะ ขอบคุณนะคะ!"
10036030-56 = "ก็นะ นี่เป็นงานที่สำคัญของแก๊งหมวกกันน็อกแท้ๆ ฉันก็ต้องมามีส่วนร่วมด้วยสิ"
10036030-57 = "ว่าแต่ค่าจ้างจะเป็นไปตามที่ตกลงกันไว้ใช่มั้ย?"
10036030-58 = "แน่นอนค่ะ เราจะโอนค่าจ้างให้ทันทีหลังงานจบเลยค่ะ"
10036030-59 = "เยี่ยมเลย งั้นฉันก็วางใจได้ ยังไงซะพวกเธอก็เป็นเหมือนชาวตลาดมืดเหมือนกัน เราก็คนบ้านเดียวกัน#nนี่เนอะ..."
10036030-60 = "นี่! เด็กพาร์ทไทม์ตรงนั้นน่ะ! ของชิ้นนั้นไม่ใช่ถูกๆ นะ ยกให้มันระวังๆ หน่อย!"
10036030-62 = "ฮึบ! เข้าใจแล้ว!"
10036030-63 = "ยกอันนั้นเสร็จแล้วก็ไปดูลำโพงด้วยนะ! เมื่อกี้ฉันเห็นมีรอยขีดข่วนตรงมุมด้วย"
10036030-64 = "ถ้ามีอะไรเสียหายแม้แต่อย่างเดียว ก็จะเป็นความผิดของเธอที่เป็นคนขนย้ายนะ คิดซะว่ามันมีค่ามากกว่าค่าตัวเธอสิ!"
10036030-65 = "เข้าใจแล้ว..."
10036030-66 = "อ้อ ส่วนเรื่องเวทีน่ะ ย้ายพร็อพทางขวาไปทางซ้ายอีก 1 เมตรนะ"
10036030-67 = "แต่เมื่อกี้บอกว่ามันอยู่ทางซ้ายมากไปไม่ใช่เหรอ..."
10036030-68 = "ก็ตำแหน่งเมื่อกี้มันโอเคกว่าตอนนี้นี่ หรือเธอจะว่ายังไง?"
10036030-69 = "มีปัญหาอะไรหรือเปล่า? งั้นฉันเทงานแล้วกลับบ้านเลยดีมั้ย?"
10036030-70 = "เฮือก! มะ... ไม่ได้นะคะ! อย่าโกรธเลยนะคะ!"
10036030-71 = "เด็กพาร์ทไทม์! ขยับพร็อพตามที่คุณดีเจสั่งสิ! เร็วเข้า!"
10036030-72 = "เข้าใจแล้ว..."
10036030-75 = "เกินไปแล้วนะ..."
10036030-76 = "ต่อให้ซัตจังจะเป็นผู้ถูกว่าจ้างก็เถอะ แต่แบบนี้มันเกินไปจริงๆ"
10036030-77 = "เป็นผู้ว่าจ้างที่นิสัยแย่สุดๆ ไปเลยนะ ถ้าเป็นฉันคงยิงไปแล้วละ"
10036030-78 = "นั่นสินะคะ... สมแล้วที่เป็นคนจากตลาดมืด..."
10036030-79 = "ขืนเป็นแบบนี้คงได้เป็นภาวะเพลียเรื้อรังจนลำบากหนักกว่าเดิมแน่ๆ เลยค่ะ... อาจจะเป็นโรคกระเพาะ#nอักเสบจากความเครียดหรือความดันสูงจนสลบไปเลยก็ได้..."
10036030-80 = "[s1] \"มาเป็นแพ็กเกจรวมโรควัยทำงานเลยนะ...\"\n[s2] \"ทำไมครูคุ้นชินกับแต่ละโรคจัง...\""
10036030-83 = "ต้องทำอะไรสักอย่างแล้วละ"
10036030-84 = "ตะ... แต่เราควรจะเฝ้าดูพี่ซาโอริจากห่างๆ ไม่ใช่เหรอคะ?"
10036030-85 = "ถ้าเราเข้าไปเอี่ยว พี่ซาโอริจะเห็นพวกเรานะคะ"
10036030-86 = "ฉันก็อยากให้หัวหน้าได้ค้นหาตัวเองอยู่หรอกนะ... แต่ให้มาทำด้วยวิธีนี้น่ะมันไม่ได้หรอก"
10036030-87 = "แค่แอบช่วยอยู่เบื้องหลัง คงไม่เป็นอะไรหรอก"
10036030-92 = "จะช่วยอย่างอ่อนโยนเลยละ"
10036030-96 = "แฮ่ก... แฮ่ก..."
10036030-97 = "ไม่ๆ ฉันว่าเอาลำโพงไว้ใกล้ๆ กับที่นั่งคนดูแบบเมื่อกี้น่าจะดีกว่า"
10036030-98 = "เด็กพาร์ทไทม์! มาย้ายลำโพงอีกรอบ!"
10036030-99 = "ขะ... เข้าใจแล้ว..."
10036030-100 = "ทำไมถึงยืดยาดแบบนี้ล่ะ? ยังทำไปได้ไม่เท่าไรเลย!"
10036030-101 = "ไหนว่าจะมาเป็นทั้งผู้ช่วยและผู้คุ้มกันไง ทำอะไรไม่ได้ดั่งใจเลย ฮึ่ย จึ๊ๆ"
10036030-102 = "..."
10036030-103 = "ฉันจะออกไปเดินรับลมหน่อย เธอก็ยกของตามที่สั่งด้วยล่ะ เข้าใจมั้ย?"
10036030-104 = "เข้าใจแล้ว"
10036030-105 = "อืม~ ลมทะเลสดชื่นดีจัง~"
10036030-114 = "ทางเดินก็ทำไว้ดีเลยนะเนี่ย เยี่ยมเลย"
10036030-115 = "ตอนกลับไป เห็นทีต้องสั่งให้เด็กพาร์ทไทม์ไปซื้อราเม็งให้สักชามแล้วละ"
10036030-116 = "ฉันอุตส่าห์มารับงานให้ เรื่องอาหารก็คงต้องดูแลกันอยู่แล้ว... หืม?!"
10036030-125 = "อะไรน่ะ พวกเธอเป็นใคร? ทำไมจู่ๆ ก็โผล่มาขวางทาง..."
10036030-126 = "หลีกไปนะ! ฉันจะเดินเล่น อย่ามาขวางกันสิ!"
10036030-127 = "ขอคุยด้วยหน่อยได้มั้ย คุณดีเจ? ฉันไม่ใช้เวลานานหรอก"
10036030-128 = "ให้ตายสิ จะมาขอลายเซ็นงั้นเหรอ? ฉันให้ไม่ได้หรอก ไปสมัครแฟนมีตติ้งให้มันถูกต้องนู่น"
10036030-132 = "ทะ... ทำไมถึงใส่กระสุนปืนล่ะ...?"
10036030-133 = "[s] \"เดี๋ยวๆๆ มิซากิ! ไหนว่าจะช่วยอย่างอ่อนโยนไง!\""
10036030-134 = "จะให้ฉันอ่อนโยนมากกว่านี้อีกงั้นเหรอ?"
10036030-135 = "ฉะ... ฉันไม่รู้หรอกนะว่าเธอเป็นใคร แต่เธอพลาดแล้วละที่มาทำกับฉันแบบนี้!"
10036030-136 = "รู้มั้ยว่าฉันเป็นใคร? ฉันคือดีเจ B.o.B นะ! ถ้ามีอะไรเกิดขึ้นกับฉัน แก๊งหมวกกันน็อกคงไม่ยอมอยู่เฉยๆ แน่"
10036030-137 = "ถ้ากลัวว่าจะเกิดปัญหาในวันข้างหน้าก็วางปืนลงซะ... อ๊ากก!"
10036030-143 = "มือลื่นไปน่ะ"
10036030-144 = "มิซากิ ห้ามทำเขาเจ็บตัวนะ เขาเป็นคนสำคัญของการแสดงดนตรีที่ซัตจังจัดเตรียมอยู่"
10036030-145 = "ก็รู้อยู่หรอก แต่หมอนี่พูดจากวนโอ๊ยเองนี่นา"
10036030-146 = "แค่สั่งสอนด้วยคำพูดก็พอแล้วละ ใช่มั้ยคะ คุณดีเจ B.o.B?"
10036030-148 = "ยัยพวกนี้นี่! อยากตายกันนักหรือไง! ฉันจะไประดมแก๊งหมวกกันน็อกมาเดี๋ยวนี้เลย...!"
10036030-152 = "อ๊าก!"
10036030-153 = "[s] \"อาสึโกะก็ด้วยเหรอ?!\""
10036030-158 = "พูดแบบนี้ไม่สบอารมณ์เอาซะเลย"
10036030-160 = "ยัยพวกบ้าเอ๊ย... ฮึ่ย..."
10036030-165 = "อะ... เอ่อ... ขอโทษที่ขัดจังหวะระหว่างการขู่กันอยู่นะคะ..."
10036030-167 = "ไม่ได้ขู่กันสักหน่อย เราแค่พูดคุยกันเฉยๆ ต่างหาก ฮิโยริ แต่ก็ช่างเถอะ มีเรื่องอะไรเหรอ?"
10036030-169 = "คือว่า... ฉันไปเฝ้าระวังอยู่บนต้นไม้ แล้วก็เห็นว่ามีพวกคนที่มุ่งหน้ามาทางนี้ค่ะ "
10036030-170 = "จากการคำนวณของฉัน คนพวกนั้นน่าจะมาถึงที่นี่ใน 10 นาทีค่ะ... แหะๆ ให้ฉันเปิดใช้งานกับดักที่วาง#nไว้ชั่วคราวเลยมั้ยคะ?"
10036030-175 = "ไม่เป็นไร รอดูสถานการณ์ก่อน ฮิโยริกลับไปประจำที่ตำแหน่งเดิม ส่วนองค์หญิงช่วยคุมตัวดีเจเอาไว้ที"
10036030-176 = "ส่วนคุณครู..."
10036030-177 = "[s] \"ครูจะอยู่ข้างๆ เอง\""
10036030-178 = "ก็ได้... ตามใจแล้วกัน"
10036030-180 = "ยัยเด็กพวกนี้นี่ เป็นใครมาจากไหนถึงจะมาคุมตัวฉันห้ะ? เดี๋ยวเถอะ... อุ๊บ?!"
10036030-189 = "อยู่เงียบๆ สักครู่นะ คุณ B.o.B"
10036030-191 = "มาแล้ว..."
10036030-198 = "ฮ่าฮ่า! ดีเจ B.o.B มาอยู่ที่นี่จริงๆ ด้วยแฮะ? เป็นไปตามแผนเลยนะ"
10036030-199 = "เราจ่ายเงินไปแล้ว ก็ต้องเป็นไปตามแผนสิ! นั่นมันเงินเก็บที่เราหมั่นสะสมทีละเยนๆ เลยนะ!"
10036030-200 = "ดีละ! งั้นงานเทศกาลของพวกแก๊งหมวกกันน็อกก็จบเห่แล้วละ!"
10036030-203 = "งานเทศกาลจบเห่งั้นเหรอ?"
10036030-205 = "อะไรกัน พวกเธอเป็นใครน่ะ? แก๊งหมวกกันน็อกเหรอ? แต่ก็ไม่ได้ใส่หมวกกันน็อกนี่นา..."
10036030-206 = "เกี่ยวข้องอะไรกับดีเจ B.o.B น่ะ?"
10036030-207 = "ถ้าไม่เกี่ยวอะไรกันก็หลบไปซะ! พวกฉันจะมาลักพาตัวเขาไป!"
10036030-209 = "อุ๊บ?!"
10036030-211 = "ลักพาตัว?"
10036030-212 = "[s] \"ลักพาตัวเหรอ?!\""
10036030-213 = "พวกแยงกี้... นี่พวกเธอจะมาทำลายงานเทศกาลงั้นเหรอ?"
10036030-215 = "ใช่! พวกเราจะมาแก้แค้นแก๊งหมวกกันน็อกของพวกเธอ!"
10036030-216 = "ศาสตราจารย์อะไรนั่นวางแผนให้เราไว้แล้ว แค่พวกฉันลักพาตัวดีเจ B.o.B ไป ก็ทำลายงานสหพันธ์ของ#nแก๊งหมวกกันน็อกได้แล้ว! เพราะถ้าไม่มีดีเจ ก็จะไม่มีอีเวนต์หลักของเทศกาลยังไงล่ะ! เป็นแผนที่สมบูรณ์แบบสุดๆ ไปเลย!"
10036030-217 = "ใช่! ฉันจะลักพาตัวเขาแล้วเอาไปใช้งานทั้งวันเลยละ! สั่งงานดีเจสักสัปดาห์หนึ่งไปเลยดีมั้ย!"
10036030-218 = "ให้สแครชแผ่นให้ลูกพี่ใหญ่ของเราฟังวันละ 36 ชั่วโมงเลย!"
10036030-220 = "อุ๊บบ...!"
10036030-222 = "แก้แค้นเหรอ... ฉันไม่รู้ว่าพวกเธอพูดถึงอะไร แต่จะให้ทำแบบนั้นไม่ได้หรอกนะ"
10036030-223 = "นี่เป็นงานเทศกาลที่ซัตจังตั้งใจเตรียมมากๆ"
10036030-224 = "ฉันจะให้พวกเธอทำตามแผนการนั้นไม่ได้หรอก"
10036030-226 = "เฮอะ เป็นพวกที่พูดไม่รู้เรื่องสินะ"
10036030-227 = "แล้วจะยังไงล่ะ คิดจะขวางพวกเราหรือไง?"
10036030-228 = "ทุกคน!"

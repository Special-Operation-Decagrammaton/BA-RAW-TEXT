[translation]
3202-1 = "和樂公主的特別公演（２）"
3202-2 = "（就這樣，到了知世演出「百鬼夜行感謝祭」的當天）"
3202-3 = "知世大人的演出！真令人期待！"
3202-4 = "上次的感謝祭也很棒！這次會怎樣呢？"
3202-5 = "無論如何，一定要拍很多照片！"
3202-6 = "結果直到演出前都沒過問原因呢。"
3202-7 = "……是啊。"
3202-8 = "不過也不能逼問知世醬想隱瞞的事。"
3202-9 = "我們只能扮演讓知世醬放心演出的角色。"
3202-10 = "你是說只在台下看著嗎？"
3202-11 = "就像現在這樣？"
3202-12 = "沒錯。在舞台上發光發熱是知世醬的職責。"
3202-13 = "雖然不清楚知世醬的想法，但我們的職責就是全力支持他。"
3202-14 = "也對，我們終究還是在暗中活動的存在。"
3202-15 = "喵哈哈，我喜歡。"
3202-16 = "仁耶大人理解的方向好像不太一樣……"
3202-17 = "總之我們就在這裡相信並注視著知世醬吧。"
3202-26 = "那麼，「百鬼夜行感謝祭」的演出即將開始！"
3202-31 = "「百鬼夜行感謝祭」是百鬼夜行聯合學園的傳統表演，#n舉辦的目的是為了向學園的工作人員表達平時的感謝。"
3202-32 = "今天的演出是由百鬼夜行聯合學園的偶像──和樂公主！和樂知世大人來呈現！"
3202-33 = "那麼知世大人！請開始吧！"
3202-34 = "嗯，好～"
3202-39 = "第一個表演是雨傘舞蹈。"
3202-40 = "使用的是由百鬼夜行聯合學園的藍染工藝製成，表現不屈精神的藍色──"
3202-46 = "──不，是桃色的雨傘……#n啊，沒錯！讓人聯想起櫻花！真是太美了！"
3202-50 = "接下來要登場的是依照百鬼夜行傳統方式製作的精美木芥子人偶──"
3202-54 = "──不！#n是，是可愛的狐狸玩偶和達摩不倒翁！"
3202-59 = "喵哈，看來不只對我們保密呢。"
3202-60 = "與平常……截然不同的感謝祭……"
3202-61 = "這樣會讓聚集在會場的觀眾議論紛紛……不知所措的……！"
3202-62 = "呀啊！知世大人！好可愛！"
3202-63 = "不愧是知世大人！"
3202-64 = "今天的知世大人也是最棒的！"
3202-66 = "……幸好沒有演變成那種局面。不過……！"
3202-71 = "雖然遺憾，不過「百鬼夜行感謝祭」即將接近尾聲。"
3202-72 = "最後有請今天的主角，知世大人向大家問候。"
3202-73 = "那麼，請知世大人打聲招呼吧！"
3202-74 = "還請務必依照腳本進行……！"
3202-75 = "謝謝大家今天的光臨～"
3202-79 = "其實呢，今天的演出和平常不太一樣，大家有發現嗎～？"
3202-80 = "嗯，因為今天有特別想感謝的人～所以準備了和平時有點不一樣的元素。"
3202-81 = "原，原來如此！怪不得……！"
3202-82 = "那麼，知世大人想感謝的特別人物究竟是誰呢！"
3202-83 = "那就是～"
3202-85 = "仁耶部長和佳穗副部長～"
3202-90 = "咦！？"
3202-91 = "哎呀，哎呀呀。"
3202-95 = "嗯，部長和副部長總是努力讓我能開心地演出～"
3202-96 = "所以今天的演出是為了他們哦～"
3202-97 = "所，所以，演出的道具之所以和平常不一樣……"
3202-98 = "是為了我和仁耶大人……？"
3202-99 = "喵哈哈，原來是這樣啊。"
3202-100 = "確實，桃色是佳穗最喜歡的顏色。"
3202-102 = "而且還準備了長得像我和仁耶大人的人偶。"
3202-103 = "嗯？真的是因為長得像才挑的嗎？佳穗也這麼覺得？"
3202-104 = "購買的柳橙汁也是……仔細一看，是仁耶大人平常愛喝的品牌……"
3202-105 = "代替儀式用茶具的杯子也是我喜歡的角色。"
3202-106 = "連布丁也是為了迎合仁耶大人和我的口味……"
3202-107 = "哼嗯～原來是這樣啊～#n嗯，被反將一軍了呢。真難為情～"
3202-108 = "晚點得向他說聲謝謝呢。"
3202-109 = "但我還是覺得達摩不是因為長得像我才選的──"
3202-111 = "哇啊啊！知世醬！謝謝你！"
3202-112 = "我居然沒搞清楚狀況就懷疑了知世醬……！"
3202-113 = "嗯，沒關係唷。"
3202-114 = "仁耶部長、佳穗副部長。#n一直以來都很謝謝你們。"
3202-115 = "所以……"
3202-116 = "以後也請多指教唷？"
3202-118 = "是！知世醬！"
3202-119 = "喵哈哈，包在我身上～"
3202-121 = "所以說，那個達摩……真的是……？"
3202-126 = "──這就是事情的經過。"
3202-127 = "[s1]「佳穗和仁耶應該很感動吧。」\n[s2]「真高興佳穗和仁耶能喜歡。」"
3202-130 = "嗯，佳穗副部長都哭得唏哩嘩啦了呢。"
3202-131 = "仁耶部長也很感動。"
3202-132 = "作戰成功。"
3202-133 = "[s]「看來知世很喜歡陰陽部的大家呢。」"
3202-134 = "嗯，很喜歡。"
3202-135 = "我、佳穗副部長、仁耶部長……"
3202-136 = "要永遠像這樣，一起待在陰陽部～"
3202-138 = "和樂公主的特別公演"

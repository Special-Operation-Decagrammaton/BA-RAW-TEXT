[translation]
3202-1 = "การแสดงพิเศษขององค์หญิงวาราคุ (2)"
3202-2 = "(เวลาล่วงเลยผ่านไป จนวันจัดงานแสดง <เทศกาลขอบคุณ เฮียกคิยาโค> มาถึง) "
3202-3 = "การแสดงของท่านชิเซะ! ตื่นเต้นจัง!"
3202-4 = "การแสดงเทศกาลขอบคุณเมื่อคราวก่อนดีมากๆ ครั้งนี้จะเป็นการแสดงแบบไหนกันนะ?"
3202-5 = "ไม่ว่าจะเป็นการแสดงแบบไหน ฉันก็จะถ่ายรูปไว้เยอะๆ เลย!"
3202-6 = "การแสดงจะเริ่มอยู่แล้วแท้ๆ แต่เราก็ยังไม่ได้ถามเหตุผลของเธอเลยนะ"
3202-7 = "นั่นน่ะสิคะ..."
3202-8 = "แต่ว่าให้ไปซักไซ้ในสิ่งที่ชิเซะจังอยากจะปิดบังเอาไว้... ฉันทำไม่ได้จริงๆ ค่ะ"
3202-9 = "หน้าที่ของพวกเราคือทำให้ชิเซะจังขึ้นแสดงได้อย่างสบายใจนี่คะ"
3202-10 = "ถ้างั้นจะคอยดูอยู่เฉยๆ งั้นเหรอ?"
3202-11 = "เหมือนกับตอนนี้เนี่ยนะ?"
3202-12 = "ใช่แล้วค่ะ การเปล่งประกายบนเวทีเป็นหน้าที่ของชิเซะจัง..."
3202-13 = "ถึงเราจะไม่รู้สิ่งที่ชิเซะจังจะทำ แต่การสนับสนุนเธออย่างสุดกำลังคือหน้าที่ของพวกเราค่ะ"
3202-14 = "โธ่ๆ ถ้างั้นพวกเราก็แค่เป็นตัวประกอบสินะ"
3202-15 = "อะฮะฮ่า แต่ฉันก็ชอบแบบนั้นนะ"
3202-16 = "คุณนิยะ ฉันคิดว่ามันไม่ใช่แบบนั้นนะคะ..."
3202-17 = "แต่เอาเป็นว่าพวกเรามาเชื่อมั่นแล้วก็คอยดูชิเซะจังกันเถอะค่ะ"
3202-26 = "การแสดง <เทศกาลขอบคุณ เฮียกคิยาโค> จะเริ่มขึ้น ณ บัดนี้ครับ!"
3202-31 = "การแสดง <เทศกาลขอบคุณ เฮียกคิยาโค> เป็นการแสดงดั้งเดิมของสหพันธ์เฮียกคิยาโคเพื่อแสดง#nความขอบคุณต่อผู้ทำหน้าที่ต่างๆ ภายในโรงเรียน"
3202-32 = "และการแสดงในวันนี้ ไอดอลแห่งสหพันธ์เฮียกคิยาโค! องค์หญิงวาราคุ! จะร่วมแสดงในครั้งนี้ด้วยครับ!"
3202-33 = "ถ้างั้นคุณชิเซะ... เชิญเริ่มได้เลยครับ!"
3202-34 = "อื้อ ได้เลย~"
3202-39 = "การแสดงแรกคือระบำร่มครับ"
3202-40 = "การแสดงที่นำงานศิลปหัตถกรรมย้อมสีครามของสหพันธ์เฮียกคิยาโคมาใช้ เพื่อแสดงถึงจิตใจที่ไม่ย่อท้อ..."
3202-46 = "ดะ...เดี๋ยวสิ ร่มสีชมพูหวานแหววนั่น... จะ...จริงด้วย! ทะ...ทำให้นึกถึงดอกซากุระเลยครับ! งดงามอย่างยิ่งยวดเลยครับ!"
3202-50 = "และต่อไปก็ถึงเวลาที่สุดยอดตุ๊กตา... ตุ๊กตาโคเคชิที่แกะสลักขึ้นอย่างปราณีตด้วยวิธีดั้งเดิมของ#nเฮียกคิยาโค..."
3202-54 = "ซะ...ซะที่ไหน...! ตะ...แต่เป็นตุ๊กตาสุนัขจิ้งจอกและตุ๊กตาล้มลุกดารุมะสุดน่ารักต่างหากครับ!"
3202-59 = "ฮ่า... ดูเหมือนจะไม่ได้เก็บเป็นความลับแค่กับพวกเรานะ"
3202-60 = "งานเทศกาลขอบคุณรูปแบบใหม่... แบบที่ไม่เคยมีมาก่อน..."
3202-61 = "ถ้าเป็นแบบนี้ละก็ พวกคนที่มาชมการแสดงก็คงจะอึ้งแล้วพูดนินทากัน..."
3202-62 = "กรี๊ดดดด! ท่านชิเซะน่าร๊ากกกกก!"
3202-63 = "สมกับเป็นท่านชิเซะเลยค่าาาา!"
3202-64 = "วันนี้ท่านชิเซะสุดยอดไปเลยค่า!"
3202-66 = "...ไม่เป็นแบบนั้นก็ค่อยยังชั่วหน่อย แต่ยังไง..."
3202-71 = "ตามลำดับของ <เทศกาลขอบคุณ เฮียกคิยาโค> ในที่สุดตอนนี้เราก็มาถึงลำดับสุดท้ายกันแล้วครับ"
3202-72 = "และลำดับสุดท้ายก็คือการกล่าวอะไรสักเล็กน้อยจากคุณชิเซะ นักแสดงหลักในวันนี้ครับ"
3202-73 = "ถ้างั้นคุณชิเซะ รบกวนกล่าวอะไรสักเล็กน้อยด้วยครับ!"
3202-74 = "ช่วยพูดตามบทด้วยเถอะครับ...!"
3202-75 = "ขอบคุณทุกคน...ที่มาในวันนี้~"
3202-79 = "วันนี้ทุกคนดูออกรึเปล่า... ว่าการแสดงวันนี้ไม่เหมือนกับทุกๆ ครั้ง~?"
3202-80 = "อื้อ ใช่แล้วละ ฉันมีคนที่อยากจะแสดงคำขอบคุณเป็นพิเศษ... ก็เลยเตรียมการแสดงที่ต่างไปจากเดิม"
3202-81 = "ยะ...อย่างนี้นี่เอง! คิดอยู่แล้วเชียว..."
3202-82 = "ถ้างั้น... คนที่คุณชิเซะอยากจะขอบคุณเป็นพิเศษเนี่ย ใครกันเหรอครับ?!"
3202-83 = "ก็คือ..."
3202-85 = "หัวหน้านิยะกับรองหัวหน้าคาโฮะน่ะ~"
3202-90 = "คะ?!"
3202-91 = "เอ๋... อะไรกัน"
3202-95 = "อื้อ ก็หัวหน้ากับรองหัวหน้าน่ะคอยช่วยให้ฉันทำการแสดงได้อย่างสนุกๆ อยู่ตลอดเลยนี่นา~"
3202-96 = "เพราะงั้นวันนี้เลยอยากแสดงเพื่อทั้งสองคนบ้าง~"
3202-97 = "ถะ...ถ้างั้นเหตุผลที่เตรียมอุปกรณ์การแสดงต่างไปจากเดิมก็..."
3202-98 = "ทำเพื่อฉันกับคุณนิยะ...?"
3202-99 = "อะฮะฮ่า ก็ตามนั้นนั่นแหละ"
3202-100 = "สีชมพูเป็นสีที่คาโฮะจังชอบที่สุด..."
3202-102 = "ก็เลยเตรียมตุ๊กตาที่เหมือนฉันกับคุณนิยะมาสินะคะ"
3202-103 = "หะ...หืม? คาโฮะก็คิดแบบนั้นเหรอ? คิดว่าชิเซะเลือกมาเพราะเหมือนฉันจริงๆ เหรอ?"
3202-104 = "น้ำส้มที่ซื้อมาก็ด้วย... พอดูดีๆ แล้วก็จะเห็นว่าเป็นยี่ห้อที่คุณนิยะชอบดื่มบ่อยๆ..."
3202-105 = "แก้วลายการ์ตูนที่ซื้อมาแทนถ้วยน้ำชาดั้งเดิมนั่น ก็เป็นลายการ์ตูนที่ฉันชอบ"
3202-106 = "นอกจากนี้ก็ยังมีพุดดิ้งที่คุณนิยะกับฉันชอบอีกด้วย..."
3202-107 = "อืม~ พอมาคิดๆ ดูแล้วก็เป็นแบบนั้นจริงๆ ด้วยแฮะ~ ฮึ่ย โดนเข้าแล้วไง เขินชะมัดเลย~"
3202-108 = "ต้องไปขอบคุณบ้างแล้วละ"
3202-109 = "แต่คิดว่าชิเซะเลือกตุ๊กตาดารุมะนั่นมาเพราะเหมือนฉันจริงๆ เหรอ...."
3202-111 = "ฮือออ! ชิเซะจัง! ขอบคุณมากเลยนะคะ!"
3202-112 = "ฉันไม่รู้อะไรเลย แถมยังเอาแต่สงสัยชิเซะจัง...!"
3202-113 = "อื้อ ไม่เป็นไรหรอก"
3202-114 = "หัวหน้านิยะ รองหัวหน้าคาโฮะ ขอบคุณมากเลยนะ"
3202-115 = "เพราะงั้น..."
3202-116 = "จากนี้ไปก็ขอรบกวนด้วยนะ"
3202-118 = "ค่ะ! ชิเซะจัง!"
3202-119 = "อะฮะฮ่า ไว้ใจพวกเราได้เลย~"
3202-121 = "นี่ คือว่าเรื่องตุ๊กตาดารุมะนั่นน่ะ... เรื่องจริงเหรอ...?"
3202-126 = "...ก็เป็นแบบนี้แหละ"
3202-127 = "[s1] \"คาโฮะกับนิยะคงประทับใจมากๆ เลยสิน้า\"\n[s2] \"ดีแล้วละนะที่คาโฮะกับนิยะชอบน่ะ\""
3202-130 = "อื้อ รองหัวหน้าคาโฮะน้ำตาไหลไม่หยุดเลย"
3202-131 = "หัวหน้านิยะก็ดูประทับใจเหมือนกัน"
3202-132 = "แผนการสำเร็จแหละ"
3202-133 = "[s] \"ชิเซะชอบสมาชิกชมรมหยินหยางมากๆ เลยสินะ\""
3202-134 = "อื้อ ชอบสิ"
3202-135 = "ไม่ว่าเมื่อไร ฉัน หัวหน้านิยะ รองหัวหน้าคาโฮะ..."
3202-136 = "ก็รวมกันเป็นชมรมหยินหยางนี่นา~"
3202-138 = "การแสดงพิเศษขององค์หญิงวาราคุ"

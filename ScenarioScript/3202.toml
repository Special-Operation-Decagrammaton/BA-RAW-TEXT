[translation]
3202-1 = "Princess Waraku's Special Concert 2"
3202-2 = "The day of the Hyakkiyako Thanksgiving Festival finally arrived."
3202-3 = "I'm so excited! Chise's directing the concert this time!"
3202-4 = "I love the Thanksgiving Festival! I'm excited to see how it's gonna go."
3202-5 = "I cleared space on my camera's memory card just for today!"
3202-6 = "Today's the big day! And we still have no idea what her plan is."
3202-7 = "It seems that's the situation."
3202-8 = "I've long since learned how tight-lipped Chise is when she wants to be."
3202-9 = "So I've come to terms with the fact that my role today is not to be a director or coordinator."
3202-10 = "Why're you watching from backstage?"
3202-11 = "You don't want to go out there?"
3202-12 = "Today is Chise's day to shine."
3202-13 = "Her actions make no sense to me at all, but I'll support her regardless."
3202-14 = "Secret agents, working in the shadows!"
3202-15 = "Nyahaha. It's got a nice ring to it."
3202-16 = "I don't think we're exactly on the same page..."
3202-17 = "But we're both here for Chise."
3202-26 = "Thank you all for coming to the \"A Hyakkiyako Thanksgiving\" concert!"
3202-31 = "This Thanksgiving Festival is a long-held tradition at Hyakkiyako. It is a day for us to pause and show gratitude to those who keep our community running."
3202-32 = "And we have a very special treat for the concert! Today's star is none other than Hyakkiyako's beloved idol, Princess Waraku Chise!"
3202-33 = "Let's give Chise a warm welcome!"
3202-34 = "Hello."
3202-39 = "First, we have the umbrella dance."
3202-40 = "Traditional Hyakkiyako umbrellas are dyed with traditional methods, passed down through generations, our dignified history represented in the indigo—"
3202-46 = "A-Ah! I mean...pink? Umbrella? It, um...is just like the cherry blossoms we all so enjoy! Wonderful!"
3202-50 = "Onto the next stage! You'll see our traditional kokeshi..."
3202-54 = "Ahem. Fox and Daruma doll!"
3202-59 = "We're not the only ones she didn't explain anything to."
3202-60 = "It doesn't follow the usual script at all! Our Thanksgiving traditions..."
3202-61 = "The audience must be utterly confused!"
3202-62 = "Chise really is the cutest!"
3202-63 = "Chise always knocks it out of the park!"
3202-64 = "That's our idol!"
3202-66 = "...They don't care! I'm grateful, but how is this working?!"
3202-71 = "It's finally over... Ahem! I mean, we've come to the end of the \"A Hyakkiyako Thanksgiving\" concert."
3202-72 = "Our star of the evening, Chise, will say a few parting words."
3202-73 = "Take it away, Chise!"
3202-74 = "Preferably by following the script!"
3202-75 = "Thank you for watching my performance."
3202-79 = "Did anyone notice that I made changes to the concert?"
3202-80 = "Yes. I did it to show gratitude to my important people."
3202-81 = "A-Ah, yes! Of course that's the reason!"
3202-82 = "Could you tell us who they are, Chise?"
3202-83 = "My important people are..."
3202-85 = "...President Niya and Vice President Kaho."
3202-90 = "D-Did I hear that correctly?!"
3202-91 = "Me?"
3202-95 = "Without the president and vice president, I would have never gotten to become Princess Waraku."
3202-96 = "So today I wanted them to have fun being in the audience."
3202-97 = "That's why you changed the props and colors?"
3202-98 = "You did it for us..."
3202-99 = "Nyahaha! So all the pieces fall into place."
3202-100 = "Chise wanted the pink umbrella, because Kaho's favorite color is pink."
3202-102 = "And, instead of a Kokeshi doll, you picked dolls that looked like Niya and me."
3202-103 = "What do you mean \"looked like Niya\"? Do you really think so, Kaho?"
3202-104 = "Moving along... Look, Niya. You drink that brand of orange juice almost every morning."
3202-105 = "All of this merch Chise got is of my favorite character!"
3202-106 = "That's even mine and Niya's favorite pudding flavor..."
3202-107 = "Ah, yes. Wow! Amazing! I'm truly impressed, Chise."
3202-108 = "But before we get all mushy gushy..."
3202-109 = "Tell me. In what ways do I look like the Daruma, like—"
3202-111 = "Chise! *sob* How can I ever thank you?"
3202-112 = "I'm sorry I stalked you and doubted your directing choices!"
3202-113 = "I didn't know that you did, but it's okay."
3202-114 = "I appreciate both of you very much. President Niya. Vice President Kaho."
3202-115 = "Moving forward..."
3202-116 = "I hope we'll do more fun things together."
3202-118 = "Of course, Chise!"
3202-119 = "Nyahaha! You don't even need to say it."
3202-121 = "Just one little thing. Let's go back to the Daruma..."
3202-126 = "...And that's all."
3202-127 = "[s1] \"I'm sure Kaho and Niya were touched.\"\n[s2] \"I'm glad it all went well.\""
3202-130 = "Vice President Kaho's eyes were like rivers."
3202-131 = "President Niya didn't cry, but I could tell she liked it."
3202-132 = "Mission complete."
3202-133 = "[s] \"You're really getting along with everyone in the Yin-Yang Club.\""
3202-134 = "Yes. I am."
3202-135 = "President Niya, Vice President Kaho, and I have made many memories together."
3202-136 = "The three of us make up the Yin-Yang Club."
3202-138 = "Princess Waraku's Special Concert"

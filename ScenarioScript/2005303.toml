[translation]
2005303-1 = "忍者少女好害羞！"
2005303-2 = "百鬼夜行商店街"
2005303-3 = "來，客人送來的禮服已經修理完畢了。"
2005303-4 = "哦哦……！"
2005303-5 = "好漂亮……！"
2005303-6 = "破掉的地方消失得無影無蹤了……！"
2005303-7 = "這就是專家的手藝嗎……！"
2005303-8 = "[s]「修得很完美呢，三千留。」"
2005303-9 = "哼哼哼，不過可不能就這樣結束哦。"
2005303-10 = "老師大人，請稍等我一下！"
2005303-15 = "（五分鐘後……）"
2005303-16 = "老師大人！"
2005303-18 = "來，我們繼續出發吧！"
2005303-19 = "[ns]「你換好衣服了！？」"
2005303-20 = "呵呵，那當然囉。"
2005303-21 = "衣服本來就是拿來「穿」的東西……"
2005303-22 = "所以不親自穿穿看的話，怎麼知道有沒有修補好呢？"
2005303-23 = "[s]「好像……還挺有道理的？」"
2005303-24 = "但是！光是穿上還不夠。"
2005303-25 = "得在穿上之後盡可能做出各種動作才行。"
2005303-26 = "比如走路、跑步、提重物等等……！"
2005303-27 = "必須測試到這個程度，才能知道衣服究竟有沒有修補好！"
2005303-28 = "[s]「雖然你這樣說也沒錯啦……」"
2005303-29 = "怎麼樣，老師大人也認同吧？"
2005303-30 = "所以，我已經排好了最適合進行測試的路線了！"
2005303-31 = "往那邊一直走過去，就會看到一排販賣各種周邊的店家。"
2005303-32 = "上次一起去過的那間我常去的愛店，也在那條巷子的盡頭。"
2005303-33 = "只要到那條街上完成購物……"
2005303-34 = "走路、跑步、提重物！#n所有測試都能一次搞定！"
2005303-35 = "而且我剛好聽說那邊有幾家店，最近開始進貨新的忍者周邊……不對，是忍具了！"
2005303-36 = "是不是很驚人？這就代表越來越多人開始喜歡忍者了吧！"
2005303-37 = "[s]「果然那才是你真正的目的吧！」"
2005303-38 = "哦？你願意陪我一起去嗎？"
2005303-39 = "[s]「我還沒說要陪你去吧……！」"
2005303-40 = "不愧是老師大人！好，一起走吧！"
2005303-46 = "百鬼夜行周邊商品商店街"
2005303-47 = "（結果還是被三千留拖來了周邊商店街）"
2005303-48 = "來來來，在這條街上買周邊的時候，必須繃緊神經才行哦，老師大人。"
2005303-49 = "就算是完全相同的周邊，在不同店裡的價格也可能天差地遠。"
2005303-50 = "所以養成「看到標價馬上記住，並在腦中比較」的習慣是很重要的。"
2005303-51 = "當然忍者周邊……不對，忍具並不適用這個規則就是了。"
2005303-52 = "畢竟數量本身就很少，根本沒必要比價……"
2005303-53 = "不過……嗯？"
2005303-54 = "找到了！是套娃手裏劍！"
2005303-55 = "這是手裏劍裡面藏了小手裏劍的特製手裏劍哦！"
2005303-56 = "就算接住了飛來的手裏劍，裡面還會彈出另一枚手裏劍進行攻擊……#n可說是無法防禦的投擲武器！"
2005303-57 = "是自從在「甲斐犬汪汪」導演的作品中首次登場之後，#n就被無數作品致敬過的經典道具哦！"
2005303-58 = "還有旁邊這個是……忍者用火焰煙霧彈！"
2005303-59 = "它在引爆後會噴出火焰而不是煙霧，因此是能同時遮蔽視線並進行攻擊的稀世忍具！"
2005303-60 = "[s]「那跟燃燒彈有什麼區別……？」"
2005303-61 = "哎呀，不要計較那些小細節嘛，老師大人。"
2005303-62 = "接下來這是……古代忍者的全像投影卷軸！？"
2005303-63 = "連這種東西都有嗎！？"
2005303-70 = "（就這樣跟著三千留逛了一段時間的忍者周邊……不對，是忍具）"
2005303-72 = "唔喵～真開心……"
2005303-73 = "雖然因為花了不少錢修補禮服，最後只買得起一枚手裏劍…… "
2005303-74 = "不過光是能跟老師大人一起到處逛逛，我就已經很開心了。"
2005303-75 = "還有，那個……"
2005303-76 = "謝謝老師大人……容忍我的任性……"
2005303-77 = "[s]「別這麼說，我也玩得很開心哦。」"
2005303-78 = "真，真的嗎……？"
2005303-79 = "嘿……嘿嘿……"
2005303-80 = "不，不過呢！如果只用說的……總覺得有點不好意思！"
2005303-81 = "來！ "
2005303-82 = "[s]「這是……扭蛋？」"
2005303-83 = "是，是我為了送給老師大人，剛才去扭蛋機扭到的！"
2005303-84 = "那是這條街上唯一的忍者扭蛋機哦！"
2005303-85 = "雖然不知道裡面裝了什麼……"
2005303-86 = "不過那也是扭蛋的樂趣所在嘛！"
2005303-87 = "來，一起打開來看看吧？"
2005303-89 = "……咦？"
2005303-92 = "― [log=미치루 드레스]裡面是……戒指對吧！？[/log][wa:4770] "
2005303-94 = "― [log=미치루 드레스]上面還有手裏劍的裝飾，感覺……不錯嘛！？[/log][wa:4540] "
2005303-97 = "[ns]「既然都轉到了，要不要戴戴看呢？」"
2005303-98 = "― [log=미치루 드레스]……咦？老師大人，要戴嗎……？[/log][wa:4340] "
2005303-100 = "― [log=미치루 드레스]啊，不，我是無所謂啦……[/log][wa:2090] "
2005303-103 = "― [log=미치루 드레스]（咦……？把戒指，送給對方……？）[/log][wa:4080] "
2005303-105 = "― [log=미치루 드레스]（這樣……不就像是在告白嗎──！？） [/log][wa:2960] "
2005303-108 = "― [log=미치루 드레스]先，先等一下，老師大人！[/log][wa:1690] "
2005303-110 = "― [log=미치루 드레스]這真的不是我算好的……！不過，那個……！[/log][wa:3070] "
2005303-113 = "[ns]「你先冷靜點，三千留……！」"
2005303-114 = "― [log=미치루 드레스]嗚……嗚啊啊～～！[/log][wa:3040] "
2005303-117 = "這，這這，這是……！"
2005303-118 = "那，那個……！"
2005303-119 = "嘿！"
2005303-120 = "砰！"
2005303-121 = "[ns]「……」"
2005303-123 = "（等煙霧散去之後，三千留已經不見蹤影了）"
2005303-124 = "（……而那個扭蛋不知為何，被留在了掌心之中）"

[translation]
2005303-1 = "นินจาสาวเขินนะ!"
2005303-2 = "ย่านการค้า เฮียกคิยาโค"
2005303-3 = "นี่ค่ะ ชุดที่ฝากไว้ซ่อมเสร็จเรียบร้อยค่ะ"
2005303-4 = "โอ้ว...!"
2005303-5 = "งานประณีตเลยละ...!"
2005303-6 = "ไม่เหลือร่องรอยว่าเคยขาดมาก่อนเลย...!"
2005303-7 = "นี่สินะฝีมือของผู้เชี่ยวชาญ...!"
2005303-8 = "[s] \"ได้ชุดกลับมาแล้วสินะ มิจิรุ\""
2005303-9 = "ฮุฮุ จะให้จบแค่นี้ไม่ได้หรอก"
2005303-10 = "รอเดี๋ยวนะ ท่านอาจารย์!"
2005303-15 = "(5 นาทีต่อมา...)"
2005303-16 = "ท่านอาจารย์!"
2005303-18 = "เอาละ ไปกันต่อเลย!"
2005303-19 = "[ns] \"ไปเปลี่ยนชุดมาเหรอ?!\""
2005303-20 = "ฮุฮุ ก็ใช่น่ะสิ"
2005303-21 = "ก็เสื้อผ้าคือสิ่งที่เอาไว้ 'สวมใส่' นี่นา..."
2005303-22 = "เพราะงั้นถ้าอยากทดสอบว่าซ่อมแซมมาเรียบร้อยดีหรือเปล่า ก็ต้องลองใส่ดูตอนนั้นเลยสิ"
2005303-23 = "[s] \"โน้มน้าวเก่ง... ใช้ได้เลยนะ!\""
2005303-24 = "แต่ถึงยังไง! แค่การลองใส่ดูน่ะไม่พอหรอก"
2005303-25 = "หลังจากสวมใส่แล้ว ก็ต้องลองขยับร่างกายให้ได้มากที่สุดด้วย"
2005303-26 = "ต้องทั้งเดิน วิ่ง แล้วก็ยกของหนักๆ...!"
2005303-27 = "ต้องทดสอบให้ละเอียดแบบนี้ละ ถึงจะรู้ว่าเสื้อผ้าซ่อมมาเรียบร้อยและใช้งานได้เหมือนเดิมหรือเปล่า!"
2005303-28 = "[s] \"ที่พูดมาก็ไม่ผิดหรอกนะ...\""
2005303-29 = "เป็นไงล่ะ ท่านอาจารย์ก็คิดเหมือนกันใช่มั้ย?"
2005303-30 = "ขอเข้าเรื่องเลยนะ ข้าน้อยไปคิดวิธีการที่ดีที่สุดในการทดสอบชุดมาแล้ว!"
2005303-31 = "ถ้าเดินตรงไปถึงซอยตรงโน้น จะเจอร้านค้าที่ขายกู้ดชนิดต่างๆ"
2005303-32 = "ร้านประจำที่เราไปด้วยกันคราวก่อนก็อยู่สุดซอยนั้นเหมือนกัน"
2005303-33 = "ถ้าเราเข้าไปที่นั่นแล้วซื้อของออกมา..."
2005303-34 = "ก็จะได้ทั้งเดิน วิ่ง แล้วก็ถือของหนักๆ! ถือว่าได้ทดสอบครบทุกท่วงท่าเลย!"
2005303-35 = "นอกจากนี้ข้าน้อยยังได้ยินว่าบางร้านในซอยนั้นมีกู้ดนินจาใหม่... ไม่สิ มีอุปกรณ์วิชานินจาใหม่ๆ เข้ามาขายแล้วด้วย!"
2005303-36 = "น่าทึ่งใช่มั้ยล่ะ? ตอนนี้มีผู้คนที่ชื่นชอบนินจามากขึ้นเรื่อยๆ แล้วนะ!"
2005303-37 = "[s] \"สรุปว่าเป้าหมายคือสิ่งนั้นสินะ!\""
2005303-38 = "โอ๊ะ? จะไปด้วยกันงั้นเหรอ?"
2005303-39 = "[s] \"ครูยังไม่ได้บอกว่าจะไปสักหน่อย...!\""
2005303-40 = "สมกับเป็นท่านอาจารย์จริงๆ! เอาละ งั้นก็ไปกันเถอะ!"
2005303-46 = "ย่านการค้ากู้ดต่างๆ ในเฮียกคิยาโค"
2005303-47 = "(สุดท้ายคุณครูก็โดนมิจิรุลากมาย่านการค้า)"
2005303-48 = "เอาละ ถ้าจะซื้อกู้ดจากย่านการค้าแห่งนี้ เราต้องตั้งสติให้ดีเลยนะ ท่านอาจารย์"
2005303-49 = "ต่อให้เป็นกู้ดอย่างเดียวกัน แต่ราคาก็แตกต่างกันไปในแต่ละร้าน"
2005303-50 = "เพราะงั้นเราต้องฝึกสังเกตราคาและเปรียบเทียบราคาในใจทันทีที่เห็น นี่ละสิ่งสำคัญของการซื้อของ"
2005303-51 = "ถึงมันจะใช้ไม่ได้กับกู้ดเกี่ยวกับนินจา... ไม่สิ กับอุปกรณ์วิชานินจาก็เถอะ..."
2005303-52 = "เหตุผลก็คือมันมีไม่กี่ชิ้น เราเลยไม่จำเป็นต้องเปรียบเทียบราคาน่ะ..."
2005303-53 = "แต่ถึงอย่างนั้นก็เถอะ... หืม?"
2005303-54 = "เจอแล้ว! ชูริเคนตุ๊กตาแม่ลูกดก!"
2005303-55 = "ดาวกระจายพิเศษที่มีดาวกระจายขนาดเล็กซ่อนอยู่ข้างใน!"
2005303-56 = "อาวุธขว้างที่ยังไงก็หลบหลีกไม่ได้ เพราะต่อให้จับดาวกระจายไว้ได้ ดาวกระจายอันอื่นที่อยู่ข้างในก็จะ#nพุ่งออกมาโจมตีอยู่ดี...!"
2005303-57 = "นี่คืออุปกรณ์ประกอบฉากที่ได้รับการยกย่องจากหลายสำนัก นับตั้งแต่ปรากฏตัวครั้งแรกในผลงานของ#nผู้กำกับไคโชว์อินุ กูรูรุ!"
2005303-58 = "แล้วสิ่งที่อยู่ข้างๆ ก็คือ... ระเบิดควันเพลิงนินจา!"
2005303-59 = "อาวุธนินจาหายากที่เมื่อจุดระเบิดแล้วจะปล่อยเปลวไฟออกมาแทนควัน ทำให้บดบังสายตา และโจมตีไปพร้อมกันได้!"
2005303-60 = "[s] \"แล้วมันต่างจากระเบิดเพลิงปกติตรงไหน...?\""
2005303-61 = "ฮุฮุ อย่าไปสนใจเรื่องเล็กๆ น้อยๆ เลยน่า ท่านอาจารย์"
2005303-62 = "ไหนดูตรงนี้ซิ... ม้วนคัมภีร์โฮโลแกรมของนินจาโบราณงั้นเหรอ?!"
2005303-63 = "ขายกระทั่งของแบบนี้เลยเหรอเนี่ย?!"
2005303-70 = "(แล้วคุณครูก็เดินตามมิจิรุและซื้อกู้ดนินจา... ไม่สิ ซื้ออุปกรณ์วิชานินจาอยู่นานสองนาน)"
2005303-72 = "อะฮะฮ่า... สนุกจังเลย..."
2005303-73 = "ถึงจะเสียเงินไปกับการซ่อมชุด จนซื้อได้แค่ชูริเคนอันเดียว... "
2005303-74 = "แต่แค่ได้เดินซื้อของกับท่านอาจารย์ ข้าน้อยก็มีความสุขแล้วละ"
2005303-75 = "แล้วก็..."
2005303-76 = "ขอบคุณที่... ตอบรับคำขอร้องของข้าน้อยนะ ท่านอาจารย์..."
2005303-77 = "[s] \"ครูก็สนุกเหมือนกัน\""
2005303-78 = "จะ... จริงเหรอ...?"
2005303-79 = "แหะ... แหะๆ..."
2005303-80 = "ตะ... แต่ถึงยังไง! ถ้าแค่พูดแล้วปล่อยผ่านไปเฉยๆ ก็คงจะ... เขินๆ นิดหน่อย!"
2005303-81 = "เอ้า! "
2005303-82 = "[s] \"นี่มัน... ของเล่นกาชาปองเหรอ?\""
2005303-83 = "ขะ... ข้าน้อยไปหยอดตู้ขายมาน่ะ ตั้งใจจะเอามาให้ท่านอาจารย์!"
2005303-84 = "เป็นของเล่นนินจากาชาปองที่มีขายแค่ที่นี่ที่เดียวเลยนะ!"
2005303-85 = "ถึงข้าน้อยจะไม่รู้ว่ามีอะไรอยู่ข้างในก็เถอะ..."
2005303-86 = "แต่นี่ละความสนุกของการเปิดกาชาปอง!"
2005303-87 = "เอาละ งั้นมาเปิดดูด้วยกันเลยมั้ย?"
2005303-89 = "เอ๋...?"
2005303-92 = "― [log=미치루 드레스]ข้างในคือ... แหวนนี่นา?! [/log][wa:4210] "
2005303-94 = "― [log=미치루 드레스]มะ... มีชูริเคนห้อยอยู่ด้วย เท่สุดๆ ไปเลย! ว้าววว![/log][wa:3340] "
2005303-97 = "[ns] \"ในเมื่อได้มาแล้ว งั้นใส่เลยมั้ย?\""
2005303-98 = "― [log=미치루 드레스]...หืม? ท่านอาจารย์? จะใส่งั้นเหรอ...?[/log][wa:3420] "
2005303-100 = "― [log=미치루 드레스]มะ... ไม่หรอก ข้าน้อยไม่ติดอะไร...![/log][wa:1170] "
2005303-103 = "― [log=미치루 드레스](เอ๋? ยื่นแหวนให้คนอื่น...?)[/log][wa:3640] "
2005303-105 = "― [log=미치루 드레스](นี่มัน... เหมือนสารภาพรักเลย?!)  [/log][wa:2360] "
2005303-108 = "― [log=미치루 드레스]ระ... ระ... รอเดี๋ยวนะ ท่านอาจารย์![/log][wa:770] "
2005303-110 = "― [log=미치루 드레스]ข้าน้อยไม่ได้ตั้งใจให้เป็นแบบนี้... ไม่สิ คือว่า...! [/log][wa:1750] "
2005303-113 = "[ns] \"ใจเย็นๆ ก่อนนะ มิจิรุ...!\""
2005303-114 = "― [log=미치루 드레스]วะ... ว้ากกก...! [/log][wa:2720] "
2005303-117 = "บะ... บะ... บะ... แบบนี้มัน...!"
2005303-118 = "คะ... คือว่า...!"
2005303-119 = "นะ... นี่แหนะ!"
2005303-120 = "ตู้มมมมมม!"
2005303-121 = "[ns] \"......\""
2005303-123 = "(พอควันจางลง มิจิรุก็หายตัวไปแล้ว)"
2005303-124 = "(ส่วนแหวนที่ได้จากกาชาปองก็มาอยู่ในมือของคุณครูได้ยังไงไม่รู้...)"

[translation]
10011080-1 = "Episode 8; What Really Stands in Our Way"
10011080-3 = "[ns] \"You want us to stop?\""
10011080-4 = "We were finally alerted of the situation, albeit belatedly."
10011080-5 = "To think something so unseemly was allowed to happen at the exchange meeting..."
10011080-6 = "And something as serious as the kidnapping of a VIP guest should have been reported immediately, no?"
10011080-7 = "Ack! Well, y-you see..."
10011080-8 = "Considering the...effort you've put in to resolve the situation, I'll allow it."
10011080-9 = "But from here on, we will handle this."
10011080-10 = "Y-You want us to butt out?"
10011080-11 = "I wouldn't put it like that, but yes. Luckily, we've been able to use the broadcast to pinpoint the Free Spirited Mouryo's whereabouts."
10011080-12 = "We will be calling in Hyakkaryouran to deal with them. The Yin-Yang Club will be taking over operations from here."
10011080-13 = "Now, if you'll excuse me."
10011080-18 = "You can't just decide that for us!"
10011080-25 = "That's right! Th-The show can still be salvaged!"
10011080-26 = "We all worked so hard to make it here... If we catch the Mouryo, the show can go on!"
10011080-28 = "How very admirable. But I don't believe you are all in agreement here."
10011080-29 = "There appears to be one key person here who hasn't spoken up."
10011080-30 = "...!"
10011080-34 = "*sigh*"
10011080-35 = "I'm grateful the public hasn't caught wind of what's happened yet."
10011080-36 = "But allow me to be frank."
10011080-37 = "The show is already a failure."
10011080-38 = "And it's inconceivable that the Ninjutsu Research Club would be entrusted to pick up the pieces. Some ragtag group that's not even an official club."
10011080-39 = "My advice? Step down before you get hurt."
10011080-40 = "And if this is about making your club official..."
10011080-41 = "There's a proper route you can take, am I correct?"
10011080-42 = "Hrgh!"
10011080-48 = "Kaho is right."
10011080-49 = "President?!"
10011080-50 = "President...!"
10011080-52 = "[ns] \"Michiru.\""
10011080-53 = "At the end of the day, it's my selfishness that's gotten us into this mess. If it weren't for me, we wouldn't be in this disaster."
10011080-54 = "I'm sorry... I'm sorry to Kaho, Sensei, everyone else..."
10011080-55 = "My selfishness dragged everyone else down."
10011080-60 = "...And poor Ibuki is scared and alone because of me too."
10011080-61 = "This is all because of my stupid self, so..."
10011080-63 = "Yeah... I think it's time we get lost..."
10011080-64 = "No! Never!"
10011080-69 = "...S-Sure... Maybe the vice president of the Yin-Yang Club is right."
10011080-70 = "Why you won't submit a club application no matter what, and why you were so insistent on this..."
10011080-71 = "Why...? You didn't tell me or Izuna anything until it got this bad..."
10011080-72 = "...I'm just a big scatterbrained oaf, so I can't for the life of me figure it out!"
10011080-73 = "Tsukuyo..."
10011080-74 = "But all of that aside...! We made a promise!"
10011080-75 = "...A promise?"
10011080-76 = "We promised Ibuki..."
10011080-77 = "We promised her we would protect her. Save her if she needed us, no matter what."
10011080-84 = "...Tsukuyo?"
10011080-85 = "Rule three of being a ninja! When ninjas make a promise..."
10011080-86 = "...They always keep their word!"
10011080-87 = "So please, Sensei. Please...help us..."
10011080-88 = "[s] \"Got it. Leave it to me.\""
10011080-89 = "Do you really, truly believe you can fight your way through?"
10011080-90 = "...I see. Well, fine. Have it your way! I shall give you the fight you desperately want."

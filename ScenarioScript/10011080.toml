[translation]
10011080-1 = "第8話;阻擋去路的東西"
10011080-3 = "[ns]「你說中止……？」"
10011080-4 = "雖然遲了一些，但總算是掌握了狀況。"
10011080-5 = "居然偏偏在這場交流會中發生了這種事……"
10011080-6 = "儘管我十分想請教為何事到如今仍未收到關於綁架的聯絡……"
10011080-7 = "呃……那，那是……！"
10011080-8 = "不過就暫且先不過問了。畢竟各位似乎也付出了不少努力。"
10011080-9 = "但此事暫時就到此為止了。"
10011080-10 = "是，是要我們收手，的意思嗎……？"
10011080-11 = "是的，幸好已經掌握了逃逸中的「妖怪劇團．即興流派」的所在地。"
10011080-12 = "也已經召集了百花繚亂。本案將由陰陽部來接手。"
10011080-13 = "那麼我先走一步……"
10011080-18 = "請，請等一下！"
10011080-25 = "對，對了！公演還，還沒有失敗……！"
10011080-26 = "大家好不容易，齊心協力地，來到了這裡。#n接下來只要，抓到妖怪劇團……！"
10011080-28 = "那股志氣值得讚賞……不過那真的是你們所有人的意願嗎？"
10011080-29 = "最重要的那個人似乎連一句話都沒說。"
10011080-30 = "……！"
10011080-34 = "……呼。"
10011080-35 = "雖然對外表示公演仍在繼續……"
10011080-36 = "但我老實告訴各位。"
10011080-37 = "公演已經失敗了。"
10011080-38 = "而此事的善後工作無法交給並非正式社團的忍術研究部的各位。"
10011080-39 = "因此，請各位在這裡收手吧。"
10011080-40 = "想成為正式社團的話……"
10011080-41 = "還有其他的方法吧。"
10011080-42 = "唔……！"
10011080-48 = "……或許，佳穗說得沒錯。"
10011080-49 = "部長……？"
10011080-50 = "……"
10011080-52 = "[ns]「三千留……」"
10011080-53 = "這件事，打從一開始就是我的任性造成的。#n都怪我太過貪心……"
10011080-54 = "大家，對不起……不管是佳穗，還是老師大人……"
10011080-55 = "都被捲了進來……"
10011080-60 = "也是因為我，那孩子……伊吹說不定也正在哭泣。"
10011080-61 = "都怪我，想著那種蠢事……"
10011080-63 = "所以……就到此為──"
10011080-64 = "……不可以！"
10011080-69 = "佳穗同學說的……或許，並沒有錯。"
10011080-70 = "很多事情，我都還搞不清楚……不管是忍者，還是這次的事件……"
10011080-71 = "就連申請書的事也是……為什麼，沒有對我跟伊樹菜醬說過……"
10011080-72 = "我只是，身材比較高大一點而已……#n有很多做不到的事、搞不清楚的事！"
10011080-73 = "月夜……"
10011080-74 = "但是，現在那些都無所謂……！#n因為，我們，不是約定好了嗎……？"
10011080-75 = "……約定？"
10011080-76 = "對伊吹醬說，不要害怕──"
10011080-77 = "「無論如何都會去救你」！"
10011080-84 = "……！"
10011080-85 = "忍者鐵則其三！「所謂忍者──"
10011080-86 = "──絕對會遵守許下的約定」！"
10011080-87 = "所以，老師……！"
10011080-88 = "[s]「嗯。交給我吧。」"
10011080-89 = "不願收手，是嗎……那就沒辦法了。"
10011080-90 = "事已至此，我也只能強制執行了！"

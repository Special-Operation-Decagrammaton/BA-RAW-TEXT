[translation]
10011080-1 = "ตอนที่ 8; สิ่งที่ขวางทางเราอยู่จริงๆ แล้วคือ..."
10011080-3 = "[ns] \"มาบอกให้หยุดตอนนี้เหรอ หมายความว่าไงน่ะ?\""
10011080-4 = "ฉันเองก็เพิ่งจะเข้าใจสถานการณ์ค่ะ"
10011080-5 = "ไม่คิดเลยว่าจะเกิดเรื่องที่น่าอับอายแบบนี้ในงานแลกเปลี่ยน..."
10011080-6 = "อยากทราบว่าทำไมถึงไม่รายงานว่ามีแขกผู้มีเกียรติของเราถูกลักพาตัวไปล่ะคะ"
10011080-7 = "อึก...! เรื่องนั้น...!"
10011080-8 = "แต่เห็นแก่ที่ทุกท่านพยายามอย่างหนัก ครั้งนี้จะยอมปล่อยไปก็แล้วกันค่ะ"
10011080-9 = "ต่อจากนี้ปล่อยให้ทางเราจัดการเถอะค่ะ"
10011080-10 = "อ๊ะ จะให้หยุดตรงนี้เหรอคะ...?"
10011080-11 = "ค่ะ โชคดีที่เราทราบตำแหน่งของพวกปีศาจจอมเอาแต่ใจที่กำลังหลบหนีได้จากการถ่ายทอดสดแล้วค่ะ"
10011080-12 = "เราจะติดต่อไปที่เฮียกกะเรียวรันเพื่อแก้ไขปัญหา จากนี้ให้เป็นหน้าที่ของชมรมหยินหยางเถอะค่ะ"
10011080-13 = "ถ้างั้นฉันขอตัวนะคะ"
10011080-18 = "จู่ๆ มาพูดแบบนั้นก็ใจร้ายเกินไปนะคะ!"
10011080-25 = "จะ... จริงด้วยค่ะ! กะ... การแสดงก็ยังไม่ถือว่าล้มเหลวซะทีเดียวนะคะ!"
10011080-26 = "อุตส่าห์ร่วมแรงร่วมใจฝ่าฟันมาถึงตรงนี้แล้วแท้ๆ... ขอแค่จับตัวพวกปีศาจได้ การแสดงก็จะจบลงด้วยดี...!"
10011080-28 = "เป็นคำพูดที่ฟังดูดีนะคะ... แต่คนอื่นๆ จะคิดแบบเดียวกันรึเปล่าคะ?"
10011080-29 = "ดูแล้วคนที่สำคัญที่สุดในตอนนี้ยังไม่พูดอะไรเลยสักคำนะคะ"
10011080-30 = "...!"
10011080-34 = "เฮ้อ..."
10011080-35 = "ถึงจะโชคดีที่ตอนนี้คนนอกยังเข้าใจว่าการแสดงยังคงดำเนินอยู่"
10011080-36 = "แต่พูดตามตรงเลยนะคะ"
10011080-37 = "การแสดงนี้ถือว่าล้มเหลวไปแล้วละค่ะ"
10011080-38 = "และเราก็ไม่สามารถปล่อยให้ชมรมที่ไม่เป็นทางการอย่างชมรมวิจัยศาสตร์นินจารับหน้าที่สะสางความ#nเรียบร้อยได้ค่ะ"
10011080-39 = "ถ้าไม่อยากเจ็บตัวก็ถอยไปค่ะ"
10011080-40 = "ถ้าตั้งใจเข้าร่วมเพราะต้องการจะเป็นชมรมทางการตั้งแต่แรกละก็..."
10011080-41 = "มันก็ยังมีอีกหลายวิธีนอกจากวิธีนี้ไม่ใช่เหรอคะ?"
10011080-42 = "อึก...!"
10011080-48 = "ที่คาโฮะพูดมาก็ถูก..."
10011080-49 = "หัวหน้า...?"
10011080-50 = "ท่านหัวหน้า...?"
10011080-52 = "[ns] \"มิจิรุ\""
10011080-53 = "ทั้งหมดมันเริ่มจากความโลภของข้าน้อยตั้งแต่แรก ที่เรื่องกลายเป็นแบบนี้ก็เพราะข้าน้อยเอง"
10011080-54 = "ขอโทษนะทุกคน... คาโฮะก็ด้วย ท่านอาจารย์ ขอโทษนะ..."
10011080-55 = "เป็นเพราะความโลภของข้าน้อยทุกคนเลยต้องมาวุ่นวายกับเรื่องนี้"
10011080-60 = "ตอนนี้อิบูกิเองก็อาจจะกำลังร้องไห้อยู่ก็ได้..."
10011080-61 = "ทุกอย่างเป็นเพราะข้าน้อยมันซื่อบื้อเอง"
10011080-63 = "อืม... เพราะงั้นเราพอแค่นี้เถอะ..."
10011080-64 = "ไม่ได้นะคะ! ไม่ได้เด็ดขาดค่ะ!"
10011080-69 = "ถะ... ถึงแม้ว่า... ระ... รองหัวหน้าชมรมหยินหยางอาจจะพูดถูกก็เถอะค่ะ"
10011080-70 = "ฉะ... ฉันเองก็พอจะรู้หรอกค่ะว่าทำไมท่านหัวหน้าไม่ยอมยื่นใบสมัครเป็นชมรมทางการ และต้องมาทุ่มเทกับเรื่องครั้งนี้..."
10011080-71 = "แม้เรื่องจะมาถึงขั้นนี้แล้ว... แต่ก็ไม่บอกอะไรฉันกับอิซุนะจังเลย!"
10011080-72 = "ฉันทั้งอืดอาด ตัวใหญ่แล้วก็ซื่อบื้อด้วย... ไม่ค่อยรู้เรื่องอะไรหรอกค่ะ!"
10011080-73 = "สึคุโยะ..."
10011080-74 = "แต่ถึงจะอย่างนั้น...! พวกเราก็สัญญาไว้แล้วนะคะ!"
10011080-75 = "สัญญาเหรอ...?"
10011080-76 = "ก็สัญญากับอิบูกิจังแล้วนี่คะ บอกว่าไม่ต้องกลัว..."
10011080-77 = "<ไม่ว่าจะเกิดอะไรขึ้น นินจาก็จะไปช่วยองค์หญิงเอง> ค่ะ!"
10011080-84 = "สึคุโยะ...?"
10011080-85 = "กฎเหล็กของนินจา! ข้อที่สาม! <นินจาน่ะ! จะต้องรักษาสัญญาเสมอ...!>"
10011080-86 = "โดยไม่มีข้อยกเว้น...!"
10011080-87 = "ใช่มั้ยคะคุณครู...!"
10011080-88 = "[s] \"อืม ให้พวกเราจัดการเถอะ\""
10011080-89 = "...ไม่ว่ายังไงก็จะบุกเข้าไปให้ได้เหรอคะ!"
10011080-90 = "ช่วยไม่ได้นะคะ! ถ้างั้นทางเราก็จะใช้กำลังเหมือนกันค่ะ! "

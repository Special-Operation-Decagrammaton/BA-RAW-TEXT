[translation]
1010105-1 = "After-party for Two"
1010105-2 = "At Saori's invitation, I went to see her DJ performance."
1010105-6 = "What a blast! My head's still bobbing."
1010105-7 = "I was worried because the DJ was a newbie, but she totally killed it!"
1010105-8 = "Did you see her sweating? I felt her passion all the way from the dance floor!"
1010105-13 = "[ns1] \"(Saori, you really gave it your all...)\"\n[ns2] \"(The audience definitely picked up on your feelings.)\""
1010105-22 = "[ns] \"Saori.\""
1010105-26 = "...Hm?"
1010105-27 = "Ah. You came, Sensei. Thank you."
1010105-28 = "How was my performance?"
1010105-29 = "[s3] \"It was so exciting!\"\n[s4] \"Just amazing. In every way.\""
1010105-32 = "Truly?"
1010105-33 = "I'm relieved you enjoyed it."
1010105-34 = "I made many mistakes, but at least the audience members had a good time."
1010105-35 = "I was worried if I had done a satisfactory job, but your words are very reassuring."
1010105-38 = "[ns] \"Why are you alone? Where'd the rest of the staff go?\""
1010105-39 = "To dinner. They're going to hold an after-party."
1010105-40 = "I declined their invitation."
1010105-41 = "I'd like to organize my notes...and I'm never at ease in crowded atmospheres."
1010105-42 = "I prefer my solitude."
1010105-46 = "*cough*"
1010105-47 = "[s] \"Are you okay?\""
1010105-48 = "Ahem. Yes."
1010105-49 = "My mouth is just a little dry. Nothing to concern yourself over."
1010105-53 = "Huh? ...Your drink? You happened to bring one?"
1010105-54 = "I'm always taking from you. Thank you."
1010105-55 = "[s] \"Not at all.\""
1010105-60 = "Would you like to sit? Come here, Sensei."
1010105-67 = "― [log=사오리 수영복]There's something lonely about looking down at the seats after the concert ends.[/log][wa:930] "
1010105-68 = "― [log=사오리 수영복]The audience members have dispersed, the lights dimmed. [/log][wa:3520] "
1010105-71 = "― [log=사오리 수영복]That brilliant stage has fallen silent without a single trace.[/log][wa:3160] "
1010105-74 = "― [log=사오리 수영복]Seeing that place filled with passion and cheers, suddenly become so still...[/log][wa:280] "
1010105-75 = "― [log=사오리 수영복]There's a desolate feel to it.[/log][wa:3380] "
1010105-78 = "― [log=사오리 수영복]...Still, it's okay now.[/log][wa:4520] "
1010105-81 = "― [log=사오리 수영복]Although not much has changed... I feel more at ease.[/log][wa:2560] "
1010105-84 = "― [log=사오리 수영복]Yes... Perhaps because you are with me, Sensei.[/log][wa:4530] "
1010105-87 = "Thank you for the drink, Sensei. I feel energized now."
1010105-88 = "[s] \"Just from a can of soda?\""
1010105-89 = "I don't think I need anything else—"
1010105-94 = "...That was unexpected."
1010105-95 = "I must have expended more energy than I thought during the performance."
1010105-96 = "[s5] \"Shall we have our own after-party?\"\n[s6] \"Quietly, just the two of us?\""
1010105-101 = "If you say so, Sensei."
1010105-106 = "I'll follow you."

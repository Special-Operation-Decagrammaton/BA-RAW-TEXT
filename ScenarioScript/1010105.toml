[translation]
1010105-1 = "งานเลี้ยงฉลองของสองเรา"
1010105-2 = "(คุณครูได้ข้อความจากซาโอริ และไปดูการแสดงดนตรีของดีเจ)"
1010105-6 = "สนุกสุดๆ ไปเลย! ฉันโยกเยอะจนยังไม่หายเจ็บไหล่เลยละ"
1010105-7 = "อุตส่าห์กังวลเพราะเห็นว่าเป็นดีเจหน้าใหม่ ฉันไม่ควรเสียเวลาไปกังวลเลยนะเนี่ย!"
1010105-8 = "ใช่ ดีเจเล่นดนตรีจนเหงื่อท่วมเลย ฉันรู้สึกได้ถึงแพชชั่นจากเธอเลยละ"
1010105-13 = "[ns1] (ซาโอริตั้งใจทำงานมากจริงๆ นะ...)\n[ns2] (ผู้ชมก็รับรู้ได้ถึงความพยายามนะเนี่ย)"
1010105-22 = "[ns] \"ซาโอริ\""
1010105-26 = "หืม...?"
1010105-27 = "อ๊ะ ครู มาหาฉันเหรอ? ขอบคุณนะ"
1010105-28 = "โชว์เล่นดนตรีของฉันเป็นยังไงบ้าง?"
1010105-29 = "[s3] \"สนุกสุดเหวี่ยงไปเลยละ\"\n[s4] \"มันส์สุดๆ เลยไป\""
1010105-32 = "ขะ... ขนาดนั้นเลยเหรอ..."
1010105-33 = "ขอบคุณที่สนุกไปด้วยนะ"
1010105-34 = "ฉันยังมีข้อบกพร่องมากมาย แต่ก็ดีใจนะที่ผู้ชมสนุกกันไปด้วย"
1010105-35 = "ฉันกังวลว่าจะทำได้ดีหรือเปล่า แต่พอได้ฟังคำของครูแล้วก็เบาใจขึ้นนะ"
1010105-38 = "[ns] \"ว่าแต่ทำไมถึงอยู่คนเดียวบนเวทีล่ะ? สตาฟคนอื่นล่ะ?\""
1010105-39 = "อ้อ คนอื่นออกไปทานข้าวเย็นกับผู้จัดงานน่ะ คงจะเลี้ยงฉลองหลังจบการแสดงกัน"
1010105-40 = "พวกเขาก็ชวนฉันไปเหมือนกัน แต่ฉันปฏิเสธไป"
1010105-41 = "ฉันต้องเก็บข้าวของพวกนี้ก่อน อีกอย่าง... ฉันก็ไม่ชอบบรรยากาศโหวกเหวกด้วย"
1010105-42 = "ฉันขออยู่คนเดียว..."
1010105-46 = "แค่กๆ!"
1010105-47 = "[s] \"เป็นอะไรมั้ย?\""
1010105-48 = "อะแฮ่ม... ไม่เป็นไรหรอก"
1010105-49 = "คงจะแค่คอแห้งน่ะ ครูไม่ต้องห่วงฉันหรอก..."
1010105-53 = "หืม? นี่มัน... เครื่องดื่มนี่? มีติดตัวอยู่พอดีงั้นเหรอ?"
1010105-54 = "ขอบคุณนะ เหมือนว่าฉันจะเอาแต่ติดหนี้ครูนะเนี่ย"
1010105-55 = "[s] \"ไม่ต้องคิดมากหรอก\""
1010105-60 = "งั้นก็ไปนั่งพักหน่อยดีมั้ยนะ ครูก็เข้ามานั่งด้วยสิ"
1010105-67 = "― [log=사오리 수영복]ที่นั่งของผู้ชมที่ได้เห็นหลังจบการแสดง มันดูเงียบเหงาจังเลยนะ[/log][wa:1690] "
1010105-68 = "― [log=사오리 수영복]ผู้ชมมากมายกลับกันไปหมดแล้ว ไฟก็ปิดหมดแล้ว...[/log][wa:3960] "
1010105-71 = "― [log=사오리 수영복]ถ้าที่นี่เป็นที่ที่เงียบสงบตั้งแต่แรก ก็คงเป็นอีกเรื่อง...[/log][wa:3320] "
1010105-74 = "― [log=사오리 수영복]พอที่ที่เต็มไปด้วยความร้อนแรง และเสียงตะโกน กลับเงียบสงบลง[/log][wa:1040] "
1010105-75 = "― [log=사오리 수영복]ฉันก็รู้สึกเปล่าเปลี่ยวนิดๆ นะ[/log][wa:3380] "
1010105-78 = "― [log=사오리 수영복]...แต่ยังไง ตอนนี้ก็ไม่เป็นไรแล้วละ[/log][wa:4080] "
1010105-81 = "― [log=사오리 수영복]ถึงจะไม่มีอะไรเปลี่ยนแปลงมากมาย... แต่ฉันก็สบายใจ[/log][wa:2720] "
1010105-84 = "― [log=사오리 수영복]นี่อาจเป็นเพราะมีครูอยู่ข้างๆ ก็ได้[/log][wa:5010] "
1010105-87 = "ขอบคุณสำหรับเครื่องดื่มนะครู ฉันมีแรงขึ้นแล้วละ"
1010105-88 = "[s] \"ด้วยเครื่องดื่มกระป๋องเดียวเนี่ยนะ?\""
1010105-89 = "ที่จริงก็ควรกินอะไรมากกว่านี้อยู่หรอก..."
1010105-94 = "ไม่ได้เตรียมใจว่าจะเป็นแบบนี้เลย..."
1010105-95 = "ดูเหมือนว่าฉันจะใช้พลังงานกับการแสดงดนตรีไปเยอะน่ะ"
1010105-96 = "[s5] \"ถ้างั้นเราก็ไปเลี้ยงฉลองกันบ้างมั้ย?\"\n[s6] \"งั้นเราไปเลี้ยงฉลองกันสองคนมั้ย?\""
1010105-101 = "ถ้าครูพูดแบบนั้นก็ช่วยไม่ได้นะ"
1010105-106 = "งั้นฉันจะไปด้วยแล้วกัน"

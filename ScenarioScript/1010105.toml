[translation]
1010105-1 = "兩人的慶功宴"
1010105-2 = "（接到沙織的聯絡後，前去欣賞他的DJ表演）"
1010105-6 = "剛才真是太嗨了！我肩膀的節拍到現在還停不下來呢。"
1010105-7 = "一開始聽說DJ是新人的時候還有點擔心，看來是我想太多了！"
1010105-8 = "就是說啊。他竟然刷碟刷到滿身大汗，連我都能感受到他的熱情啊。"
1010105-13 = "[ns1]（沙織的確很認真……）\n[ns2]（原來觀眾們也都感覺到了啊）"
1010105-22 = "[ns]「沙織。」"
1010105-26 = "……嗯？"
1010105-27 = "啊，老師。你真的來了啊，謝謝你。"
1010105-28 = "你覺得表演怎麼樣？"
1010105-29 = "[s3]「氣氛超嗨的哦。」\n[s4]「全場都被你震懾住了。」"
1010105-32 = "有，有那麼誇張嗎……"
1010105-33 = "謝謝，沒想到你這麼喜歡我的表演。"
1010105-34 = "雖然剛才的表演還是有很多缺點，不過只要觀眾玩得開心，我就滿足了。"
1010105-35 = "原本還有點擔心自己究竟能不能辦到的，#n現在聽老師這麼說，我心中的石頭也總算能放下了。"
1010105-38 = "[ns]「不過為什麼舞台上只有你一個人？其他工作人員呢？」"
1010105-39 = "啊，其他人都一起去吃晚餐了。說是要辦慶功宴的樣子。"
1010105-40 = "他們本來也有邀我一起去，可是我拒絕了。"
1010105-41 = "畢竟這些器材得提前收拾好……況且我本來就不太喜歡那種熱鬧的氣氛。"
1010105-42 = "所以我打算一個人──"
1010105-46 = "咳咳！"
1010105-47 = "[s]「你怎麼了？」"
1010105-48 = "咳咳，我沒事。"
1010105-49 = "只是喉嚨有點乾而已，你不必擔心……"
1010105-53 = "嗯？這是……飲料？身上剛好有帶？"
1010105-54 = "謝謝你。我好像總是欠老師人情啊。"
1010105-55 = "[s]「你不用放在心上。」"
1010105-60 = "那我們就稍微坐一下吧，老師。請來這邊。"
1010105-67 = "― [log=사오리 수영복]表演結束後的觀眾席，實在有點冷清啊。[/log][wa:3410] "
1010105-68 = "― [log=사오리 수영복]眾多的觀眾散去，燈光盡數消失…… [/log][wa:5080] "
1010105-71 = "― [log=사오리 수영복]五彩斑斕的舞台也不留痕跡地沉入寂靜之中。[/log][wa:4840] "
1010105-74 = "― [log=사오리 수영복]原本充滿熱情與歡聲的空間突然安靜下來……[/log][wa:2560] "
1010105-75 = "― [log=사오리 수영복]實在讓人不禁感到哀傷。[/log][wa:4140] "
1010105-78 = "― [log=사오리 수영복]……不過，現在已經不要緊了。[/log][wa:4920] "
1010105-81 = "― [log=사오리 수영복]雖然什麼都沒有改變……卻已經能淡然地看待。[/log][wa:3840] "
1010105-84 = "― [log=사오리 수영복]……也許是因為老師在我身邊的關係吧。[/log][wa:5690] "
1010105-87 = "謝謝你的飲料，老師。#n我又重新恢復活力了。"
1010105-88 = "[s]「一罐飲料就夠了嗎？」"
1010105-89 = "是啊，只要這樣就……"
1010105-94 = "……情況似乎有點出乎意料。"
1010105-95 = "剛才的表演消耗我太多體力了。"
1010105-96 = "[s5]「那我們要不要也辦一場慶功宴？」\n[s6]「只有我們兩個人，不是很熱鬧的那種。」"
1010105-101 = "既然老師開口就沒辦法了。"
1010105-106 = "我當然奉陪。"

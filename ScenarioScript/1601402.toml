[translation]
1601402-1 = "มาเล่นเกมกับอิบูกิกันเถอะ!"
1601402-4 = "ขอรบกวนหน่อยนะค้า!"
1601402-8 = "สวัสดีค่าคุณครู! อิบูกิมาแล้ว!"
1601402-9 = "[s1] \"ไม่เจอกันนานเลยน้า อิบูกิ!\"\n[s2] \"ช่วงที่ไม่เจอกัน เหมือนจะโตขึ้นรึเปล่าเนี่ย?\""
1601402-12 = "ฮิฮิ งั้นเหรอ?"
1601402-13 = "ที่จริงแล้วน่ะ รุ่นพี่มาโคโตะถามด้วยละว่าจะมาเล่นที่ชาเล่ต์ได้ยังไง"
1601402-14 = "อิบูกิก็เลยบอกไปว่า \"วันนี้น่ะ อิบูกิอยากจะมาเล่นที่ชาเล่ต์ให้หนำใจเลย~!\" แล้วก็มาที่นี่น่ะ~!"
1601402-15 = "[s3] \"อิบูกิอุตส่าห์มาหาทั้งที แต่ครูขอโทษจริงๆ...\"\n[s4] \"ถ้างั้นครูคงต้องรีบทำงานของชาเล่ต์ให้เสร็จก่อนแล้วละ...\""
1601402-21 = "เรื่องนั้นสบายมากค่ะ!"
1601402-22 = "วันนี้อิบูกิมาเข้าเวรตัวแทนด้วย เพราะงั้นอิบูกิจะช่วยงานคุณครูเอง!"
1601402-23 = "[s5] \"จริงเหรอ? ถ้างั้นจะให้อิบูกิช่วยงานไหนดีนะ?\"\n[s6] \"พออิบูกิบอกว่าจะช่วย ครูก็มีแรงทำงานเลย\""
1601402-26 = "อื้อ จะให้ช่วยงานไหนก็บอกมาได้เลยค่ะ!"
1601402-28 = "(จากนั้นคุณครูกับอิบูกิก็เริ่มทำงานด้วยกัน)"
1601402-36 = "เอกสารหนึ่ง... สอง... สามแผ่น..."
1601402-37 = "..."
1601402-41 = "...(เหลือบมอง)"
1601402-42 = "[s] (หืม...?)"
1601402-46 = "สะ...สี่แผ่น ห้าแผ่น..."
1601402-51 = "...(เหลือบมอง)"
1601402-52 = "[s] (สายตาของอิบูกิ... เหมือนจะมองไปที่เกมกับของเล่นที่วางไว้เลย...?)"
1601402-53 = "(ส่ายหน้าไปมา)"
1601402-54 = "ไม่ได้ๆ ถ้าว่อกแว่กคิดเรื่องอื่นจะเป็นเด็กไม่ดี..."
1601402-55 = "[s] \"อิบูกิ\""
1601402-56 = "หืม? เรียกอิบูกิทำไมเหรอ คุณครู?"
1601402-57 = "[s] \"พักเล่นเกมกันสักหน่อยมั้ย?\""
1601402-58 = "มะ... ไม่ได้หรอก! ก็วันนี้อิบูกิมาช่วยงานคุณครูนี่นา!  "
1601402-59 = "จะมาเล่นสนุกตามปกติไม่ได้เด็ดขาด!"
1601402-60 = "[s] \"แต่ว่าครูอยากให้อิบูกิมาเล่นด้วยนะ\""
1601402-62 = "[ns7] \"งานครูก็เยอะเป็นปกติอยู่แล้ว...\"\n[ns8] \"ถ้าไม่หาเวลาจริงๆ จังๆ ก็ไม่ค่อยได้เล่นหรอก\""
1601402-65 = "อย่างนั้นเหรอ..."
1601402-66 = "อ๊ะ ถ้าไม่ค่อยได้เล่น ทำไมถึงซื้อเครื่องเล่นเกมกับของเล่นมาล่ะ?"
1601402-67 = "[s9] \"คะ...คงเรียกว่าเปย์ของเล่นแก้เครียดละมั้ง...\"\n[s10] (มองด้วยสายตาไร้เดียงสาแบบนั้นมันเจ็บปวดนะ...!)"
1601402-70 = "คุณครูไม่สบายตรงไหนรึเปล่า? สีหน้าดูไม่ดีเลย..."
1601402-71 = "[s] \"มะ...ไม่เป็นไร สรุปว่าอิบูกิจะมาเล่นเป็นเพื่อนครูมั้ย?\""
1601402-72 = "หืม?"
1601402-73 = "อะ...อิบูกิน่ะ คือว่า..."
1601402-77 = "[ns] \"ครูอยากให้อิบูกิพูดสิ่งที่อยากทำออกมาได้อย่างสบายใจนะ...\""
1601402-79 = "[ns] \"ครูจะดีใจมากเลยนะ ถ้าอิบูกิพูดออกมาตรงๆ\""
1601402-84 = "ฮิฮิ อย่างนี้นี่เอง"
1601402-85 = "ที่จริง อิบูกิอยากเล่นกับคุณครูมากเลย! ทั้งเล่นเกม แล้วก็เล่นตุ๊กตาด้วย!"
1601402-86 = "แต่มันจะไม่เป็นไรจริงๆ เหรอ?"
1601402-87 = "[s] \"แน่นอน! งั้นเริ่มจากเล่นเกมดีมั้ย?\""
1601402-88 = "อื้อ! เอาสิ!"

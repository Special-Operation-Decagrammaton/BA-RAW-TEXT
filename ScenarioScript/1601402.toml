[translation]
1601402-1 = "Playtime with Ibuki!"
1601402-4 = "Excuse Ibuki!"
1601402-8 = "Hey Sensei! Let's play!"
1601402-9 = "[s1] \"It's been a while, Ibuki!\"\n[s2] \"Have you gotten taller?\""
1601402-12 = "Heehee, you think so?"
1601402-13 = "Makoto said Ibuki should go hang out at Schale!"
1601402-14 = "Normally Ibuki would ignore her. But Ibuki wanted to have lots of fun at Schale! So Ibuki is here!"
1601402-15 = "[s3] \"I'm sorry, Ibuki. I know you came a long way to see me...\"\n[s4] \"But Sensei has to take care of some Schale work first.\""
1601402-21 = "That's okay!"
1601402-22 = "Ibuki's also here as the student rep today, so Ibuki will help Sensei work!"
1601402-23 = "[s5] \"Really? Can I leave it to you then?\"\n[s6] \"Well, now that Ibuki's helping, I'm feeling motivated!\""
1601402-26 = "Yes! Leave it to Ibuki!"
1601402-28 = "Ibuki and I got to work."
1601402-36 = "One document, two documents, three documents..."
1601402-37 = "..."
1601402-41 = "*glance*"
1601402-42 = "[s] \"(Hm?)\""
1601402-46 = "F-Four documents, five documents..."
1601402-51 = "*glance*"
1601402-52 = "[s] \"(I think Ibuki's more focused on the game console and toys in the corner than working...)\""
1601402-53 = "*shakes head*"
1601402-54 = "No... Ibuki can't slack off! Only bad girls do that!"
1601402-55 = "[s] \"Ibuki.\""
1601402-56 = "Hm? What's the matter, Sensei?"
1601402-57 = "[s] \"Do you want to play some games for a bit?\""
1601402-58 = "N-No! Ibuki is supposed to help Sensei with their work today!"
1601402-59 = "Ibuki can't ALWAYS be playing around!"
1601402-60 = "[s] \"It's okay. I'd like to play around too, Ibuki.\""
1601402-62 = "[ns7] \"I'm always drowning in work...\"\n[ns8] \"It's hard to find the time and energy to do fun stuff.\""
1601402-65 = "Oh..."
1601402-66 = "But then...why did you buy the game machines and toys, if you don't have time for them?"
1601402-67 = "[s9] \"Well, uh, as an adult sometimes buying stuff relieves stress too!\"\n[s10] \"(The fact she asked out of total innocence makes it hurt even more!)\""
1601402-70 = "Sensei, are you okay? You don't look so good..."
1601402-71 = "[s] \"I-I'm fine... Anyway, what do you think, Ibuki? Up for a game?\""
1601402-72 = "Hm?"
1601402-73 = "I-Ibuki... Um..."
1601402-77 = "[ns] \"Or maybe Ibuki wants to play something else?\""
1601402-79 = "[ns] \"You can be honest with Sensei. I promise you won't get in trouble.\""
1601402-84 = "Heehee. Okay."
1601402-85 = "The truth is, Ibuki really wanted to play with Sensei! Ibuki wanted to play video games! And dolls too!"
1601402-86 = "Are you sure that's okay?"
1601402-87 = "[s] \"Absolutely! Shall we start with some video games, then?\""
1601402-88 = "Yes!"

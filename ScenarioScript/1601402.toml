[translation]
1601402-1 = "跟伊吹一起玩遊戲！"
1601402-4 = "打擾了！"
1601402-8 = "嗨～老師！我來玩了！"
1601402-9 = "[s1]「好久不見，伊吹！」\n[s2]「這段期間好像長高了？」"
1601402-12 = "嘻嘻，是嗎？"
1601402-13 = "其實真琴前輩問我，要不要來夏萊玩一下再回去！"
1601402-14 = "伊吹也想在夏萊好好玩一下！所以今天才會過來！"
1601402-15 = "[s3]「難得伊吹專程來這裡，真的很抱歉。」\n[s4]「不過老師得先處理夏萊的工作。」"
1601402-21 = "沒關係！"
1601402-22 = "伊吹今天是值日生，所以會幫忙老師工作！"
1601402-23 = "[s5]「真的嗎？那就拜託你囉？」\n[s6]「伊吹竟然要幫忙，我突然充滿了鬥志呢。」"
1601402-26 = "嗯！任何事都交給我吧！"
1601402-28 = "（於是便開始和伊吹一起工作）"
1601402-36 = "文件有一張，二張，三張……"
1601402-37 = "……"
1601402-41 = "……（一瞥）"
1601402-42 = "[s]（嗯？）"
1601402-46 = "四，四張，五張……"
1601402-51 = "……（一瞥）"
1601402-52 = "[s]（伊吹的視線……一直飄向遊戲機和玩具？）"
1601402-53 = "（搖頭）"
1601402-54 = "不行，分心做其他事會變成壞孩子……"
1601402-55 = "[s]「伊吹。」"
1601402-56 = "嗯？怎麼了嗎，老師？"
1601402-57 = "[s]「要不要玩一下遊戲？」"
1601402-58 = "不，不用！因為伊吹今天是來幫老師工作的！"
1601402-59 = "不可以和平常一樣一直玩！"
1601402-60 = "[s]「可是老師希望伊吹能和我一起玩。」"
1601402-62 = "[ns7]「因為平常工作太多了……」\n[ns8]「如果沒有下定決心，根本沒時間和體力做那種事。」"
1601402-65 = "這樣啊……"
1601402-66 = "嗯？既然沒時間玩，為什麼還要買遊戲機和玩具呢？"
1601402-67 = "[s9]「該說購買本身才是重點……還是要消除壓力呢……」\n[s10]（這毫無惡意的純真發言實在太傷人了……！）"
1601402-70 = "老師不舒服嗎？你的臉色不太好……"
1601402-71 = "[s]「我，我沒事……伊吹覺得呢？要不要一起玩？」"
1601402-72 = "嗯？"
1601402-73 = "伊，伊吹……那個……"
1601402-77 = "[ns]「另外……如果伊吹有什麼想做的事情……」"
1601402-79 = "[ns]「不用忍耐，老實說出來比較好哦。」"
1601402-84 = "嘿嘿，原來如此。"
1601402-85 = "其實伊吹也很想和老師一起玩！一起玩遊戲，一起玩娃娃！"
1601402-86 = "真的可以嗎？"
1601402-87 = "[s]「當然囉！那就從遊戲開始吧？」"
1601402-88 = "嗯！好！"

[translation]
2300408-1 = "The Meister's Medal"
2300408-2 = "Schale Suburban Shop"
2300408-4 = "As Utaha and I arrived in town to buy things for work, we came across a newly opened shop."
2300408-5 = "Huh? This place is new."
2300408-6 = "There's a lot of young women waiting here. I wonder what they're selling..."
2300408-7 = "Hello. Welcome to the grand opening of Momo Nails!"
2300408-8 = "We're offering free nail care to celebrate our opening, so please come give us a try!"
2300408-9 = "Heh, it's a nail salon."
2300408-10 = "Come to think of it, there are students at Millennium who stick gel and gems on their nails."
2300408-11 = "[s] \"Utaha, why don't you give it a try?\""
2300408-12 = "Me? Get my nails done?"
2300408-13 = "I'm fine. My nails aren't that pretty anyways..."
2300408-15 = "You there, lady! You have a great look about you!"
2300408-16 = "If you're up for it, how about some free nail care?"
2300408-17 = "You mean me? But I've never had my nails done..."
2300408-18 = "That's great. It's a lot more rewarding to care for nails like yours!"
2300408-19 = "True fashion runs from the top of your head to the tips of your toes! There's nothing like pretty nails to boost your confidence!"
2300408-20 = "But..."
2300408-21 = "[s1] \"It's fine, you should try it.\"\n[s2] \"A meister should never be afraid to try something new!\""
2300408-25 = "Well...if Sensei insists."
2300408-26 = "Then maybe just a little bit of nail care..."
2300408-27 = "Okay, please have a seat here!"
2300408-29 = "Your nails are finished. What do you think?"
2300408-30 = "It's been a while since I saw my fingers so clean."
2300408-31 = "There are no more cracks, and all the oil has been cleaned... It's almost as if I'm looking at somebody else's hands."
2300408-32 = "Nail art is really amazing."
2300408-33 = "[s] \"How would you like nail care every week?\""
2300408-34 = "...No, it's fine. If I decorate my nails it'll bother me when I work on the machines."
2300408-35 = "Cracked and oily hands suit me better."
2300408-36 = "I'm not embarrassed. I might look dirty...but dirty hands are the meister's mark of honor."
2300408-37 = "...But maybe I'll leave my pinky finger decorated to remember this."
2300408-40 = "Excuse me, is it possible to have gel applied to just my pinky finger?"
2300408-41 = "Yes, that's no problem. Give me a few seconds."
2300408-43 = "After the nail salon, I returned to Schale with a rather excited Utaha."

[translation]
2300408-1 = "巨匠的勳章"
2300408-2 = "夏萊外圍．商店街"
2300408-4 = "（為了買工作上需要的東西和詠葉來到市內，卻在商店街發現沒看過的店面）"
2300408-5 = "嗯？似乎是新開的店呢。"
2300408-6 = "看起來聚集了很多年輕女性，是什麼樣的店呢……"
2300408-7 = "歡迎光臨！我們是前幾天剛開幕的美甲沙龍，「Momo Nail」！"
2300408-8 = "作為開幕紀念，正在為所有客人免費維護指甲，請來體驗看看──！"
2300408-9 = "原來如此，是維護指甲的店呢。"
2300408-10 = "話說千年的學生之中，也偶爾會開始看見以做凝膠指甲、裝飾配件為樂的學生呢。"
2300408-11 = "[s]「詠葉也試看看吧？」"
2300408-12 = "我，做美甲……？"
2300408-13 = "不，我沒關係啦。我的指甲，並不是用來裝飾的漂漂亮亮的東西……"
2300408-15 = "那裡的姊姊！打扮得非常漂亮呢！"
2300408-16 = "不介意的話，我們正在做免費的指甲維護，請問如何呢？"
2300408-17 = "我，我嗎？但是我，至今為止那種事一次都……"
2300408-18 = "請不用擔心！不如說正是那種客人，才有做的價值！"
2300408-19 = "時尚是始於指尖，止於指尖的東西！#n把指甲維護得漂亮的話連心情也會變好唷～！"
2300408-20 = "不，不過……"
2300408-21 = "[s1]「機會難得，吶？」\n[s2]「巨匠可不能害怕新挑戰唷！」"
2300408-25 = "老師那麼說的話……"
2300408-26 = "那稍微維護指甲就好，拜託妳吧。"
2300408-27 = "好的，那麼請往這邊！"
2300408-29 = "非常完美！請問如何呢？"
2300408-30 = "好厲害啊……也很久沒看過自己的指甲這麼漂亮了。"
2300408-31 = "裂開的痕跡也完全不顯眼，油漬也完全被除掉了。簡直像是在看著不同人的手……"
2300408-32 = "所謂的指甲彩繪，真是厲害的東西呢……"
2300408-33 = "[s]「藉這個機會，試著頻繁的來訪如何？」"
2300408-34 = "……不，那個就容我拒絕吧。美甲的話會過於漂亮，感覺操作機械時也會一直在意。"
2300408-35 = "而且，我想我也比較適合滿是油漬裂開的手吧。"
2300408-36 = "並不是覺得害羞。#n雖然不好看……不過那個骯髒的指甲，即使那樣，也是作為巨匠的勳章一樣的東西。"
2300408-37 = "……不過，也是呢。只有小指的指甲，作為紀念。"
2300408-40 = "姊姊，只有左手小指做凝膠指甲是可行的嗎？"
2300408-41 = "是的，沒問題唷！請稍等一下！"
2300408-43 = "（這之後，結束指甲的維護，和看起來有些開心的詠葉回到了夏萊）"

[translation]
2300408-1 = "#title;마이스터의 훈장"
2300408-2 = "#place;샬레 외곽 상점가"
2300408-3 = "#wait;1500"
2300408-4 = "#na;업무에 필요한 물건을 구입하기 위해 우타하와 시내에 나왔다가, 상점가에 새로 문을 연 가게 하나를 보게 되었다."
2300408-5 = "3;우타하;07;응? 새로운 가게가 문을 연 모양이네.\n#3;em;[반응]\n#3;a"
2300408-6 = "3;우타하;02;젊은 여성 손님들이 많이 몰려 있어. 무얼 파는 가게려나……."
2300408-7 = "#na;네일샵 점원;안녕하세요. 이번에 새롭게 개점한 네일숍, <모모 네일>입니다!"
2300408-8 = "#na;네일샵 점원;개점을 기념하여 손님 여러분께 무료로 손톱 손질을 해드리고 있으니, 부담 갖지 말고 방문해 주세요!"
2300408-9 = "3;우타하;03;아하, 손톱을 손질하는 가게구나.\n#3;greeting"
2300408-10 = "3;우타하;01;그러고보니 밀레니엄의 학생들 중에서도 손톱에 젤을 바르거나 큐빅을 붙여서 네일 아트를 하는 학생들이 종종 있었지."
2300408-11 = "[s] \"우타하도 한 번 해보는 게 어때?\""
2300408-12 = "3;우타하;07;내가 네일 아트를……?\n#3;em;[?!]\n#3;stiff"
2300408-13 = "3;우타하;06;나는 괜찮아. 어차피 내 손톱은 그다지 예쁘지도 않고……."
2300408-14 = "3;우타하;07\n#3;stiff\n#3;h"
2300408-15 = "#na;네일샵 점원;거기, 아가씨! 스타일이 참 좋아보이시네요!"
2300408-16 = "#na;네일샵 점원;괜찮으시다면 저희 가게에서 무료로 손톱 손질을 받아보시는 건 어떠신가요?"
2300408-17 = "3;우타하;06;나, 나 말이야? 하지만 나는 그동안 한번도 손톱을 손질해 본 일이 없는데…….\n#3;em;…"
2300408-18 = "#na;네일샵 점원;괜찮아요. 그런 분들일수록 더 손톱 손질을 하는 보람이 있으니까요!"
2300408-19 = "#na;네일샵 점원;패션의 완성은 손 끝에서 시작해서 손 끝에서 끝나는 법! #n예쁘게 손톱을 치장하면 기분도 좋아진다고요~."
2300408-20 = "3;우타하;04;하지만……."
2300408-21 = "[s1] \"나는 괜찮으니까 다녀와.\"\n[s2] \"마이스터가 새로운 도전을 두려워하면 안되지!\""
2300408-22 = "#wait;100"
2300408-23 = "#wait;100"
2300408-24 = "3;우타하;99\n#3;em;…\n#wait;2500"
2300408-25 = "3;우타하;03;……선생님이 그렇게 말한다면 어쩔 수 없지.\n#3;greeting\n#3;em;[반짝]"
2300408-26 = "3;우타하;02;그럼 손톱 손질만 가볍게……."
2300408-27 = "#na;네일샵 점원;네, 이쪽의 의자에 앉아주세요!"
2300408-28 = "#all;hide"
2300408-29 = "#na;네일샵 점원;손질 끝났습니다. 어떠신가요?"
2300408-30 = "3;우타하;07;이렇게 깨끗한 손톱을 보는 건 오랜만이네.\n#3;em;[반짝]\n#3;a"
2300408-31 = "3;우타하;07;갈라진 흔적도 없고, 기름도 깨끗이 지워진 게…… 마치 다른 사람의 손을 보는 것 같아."
2300408-32 = "3;우타하;03;정말 네일 아트라는 건 대단하구나."
2300408-33 = "[s] \"이 기회에 매주 손톱 관리를 받으러 오는 건 어때?\""
2300408-34 = "3;우타하;06;……아니, 역시 괜찮아. 손톱을 예쁘게 치장하면 기계를 조작할 때마다 신경이 쓰일 테니까.\n#3;em;…"
2300408-35 = "3;우타하;99;역시 내게는 갈라지고 기름이 잔뜩 묻은 더러운 손이 더 어울려."
2300408-36 = "3;우타하;02;부끄러운 건 아니야. #n못나긴 했지만…… 그 지저분한 손톱이야 말로 마이스터의 훈장과도 같은 거니까."
2300408-37 = "3;우타하;03;……하지만 새끼 손톱 하나만큼은 기념으로 남겨둘까.\n#3;em;[///]"
2300408-38 = "3;우타하;03\n#3;greeting\n#wait;400"
2300408-39 = "3;우타하;03\n#3;closeup\n#wait;1000"
2300408-40 = "3;우타하;03;저기, 왼쪽 새끼 손톱 하나에만 젤을 바르는 것도 가능할까?\n#3;closeup\n#3;em;[반짝]"
2300408-41 = "#na;네일샵 점원;네, 가능합니다. 잠시만 기다려주세요."
2300408-42 = "#all;hide"
2300408-43 = "#na;이후 손톱 손질을 마치고, 평소보다 살짝 즐거워보이는 우타하와 함께 샬레로 돌아왔다."

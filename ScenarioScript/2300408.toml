[translation]
2300408-1 = "เหรียญตราไมสเตอร์"
2300408-2 = "ย่านการค้าด้านนอกชาเล่ต์"
2300408-4 = "เมื่ออุทาฮะกับคุณครูมาถึงในเมืองเพื่อมาซื้อของไปทำงาน ก็พบกับร้านค้าที่เพิ่งเปิดใหม่"
2300408-5 = "หืม? นี่คงจะเป็นร้านใหม่สินะ"
2300408-6 = "มีลูกค้าผู้หญิงยืนรอคิวอยู่เต็มเลย ฉันอยากรู้จังว่าเขาขายอะไร..."
2300408-7 = "สวัสดีค่า ขอต้อนรับเข้าสู่พิธีเปิดร้านทำเล็บ <โมโม่เนล> นะคะ!"
2300408-8 = "เรามีบริการทำเล็บให้ฟรีเพื่อเป็นการฉลองเปิดร้านของเรา เชิญแวะเข้ามากันได้เลยค่า!"
2300408-9 = "อ่า ร้านทำเล็บนี่เอง"
2300408-10 = "พอมาคิดดูแล้ว ก็มีนักเรียนที่โรงเรียนมิลเลเนียมหลายคนเลยนะที่ติดเจลและเพชรลงไปบนเล็บของ#nพวกเขา"
2300408-11 = "[s] \"อุทาฮะ ทำไมไม่ลองดูหน่อยล่ะ?\""
2300408-12 = "จะให้ฉันทำเล็บน่ะเหรอ.....?"
2300408-13 = "ไม่ดีกว่า เล็บของฉันก็ไม่ได้สวยงามอะไรอยู่แล้ว..."
2300408-15 = "คุณผู้หญิงตรงนั้น! คุณดูดีไม่เบาเลยนะคะ!"
2300408-16 = "ถ้ามีเวลาสนใจมาลองทำเล็บฟรีดูมั้ยคะ?"
2300408-17 = "มะ... หมายถึงฉันเหรอ? แต่ฉันไม่เคยทำเล็บมาก่อนเลยนะ..."
2300408-18 = "แบบนั้นก็ยิ่งดีเลยล่ะค่ะ การได้ทำเล็บแบบของคุณยิ่งเป็นอะไรที่คุ้มค่าเลยนะคะ!"
2300408-19 = "แฟชั่นที่แท้จริงมันต้องเริ่มต้นจากหัวจรดเท้าของคุณ! ไม่มีอะไรจะเสริมความมั่นใจไปได้ดีกว่า#nการมีเล็บที่สวยงามแล้วค่า~"
2300408-20 = "แต่ว่า....."
2300408-21 = "[s1] \"ไม่เป็นไรหรอกนะ ลองดูสิ\"\n[s2] \"ไมสเตอร์ไม่ควรที่จะเกรงกลัวการได้ลองอะไรใหม่นะ!\""
2300408-25 = "ถ้าคุณครูพูดแบบนั้นแล้วล่ะก็... ก็ได้"
2300408-26 = "ถ้างั้นทำเล็บสักหน่อยก็ได้......"
2300408-27 = "ได้ค่า เชิญนั่งลงตรงนี้ได้เลยค่ะ!"
2300408-29 = "ทำเล็บเสร็จเรียบร้อยแล้วค่า เป็นอย่างไรบ้างคะ?"
2300408-30 = "ฉันไม่ได้เห็นนิ้วตัวเองสะอาดแบบนี้นานแล้วนะ..."
2300408-31 = "ไม่มีรอยแตกแล้ว คราบน้ำมันก็ถูกล้างออกไปหมด... มันรู้สึกเหมือนฉันกำลังมองดูมือของคนอื่น#nอยู่เลย"
2300408-32 = "การตกแต่งเล็บนี่เป็นอะไรที่สุดยอดไปเลยนะ"
2300408-33 = "[s] \"อยากจะทำเล็บทุกสัปดาห์ดูมั้ยล่ะ?\""
2300408-34 = ".....ไม่ล่ะ ถ้าฉันตกแต่งเล็บแล้วมันจะมีปัญหาในตอนที่ใช้งานเครื่องจักรเอาได้"
2300408-35 = "มือที่มีรอยแตกและเปื้อนน้ำมันดูเหมาะกับฉันมากกว่า"
2300408-36 = "ฉันไม่ได้อายหรอกนะ ถึงมันอาจจะดูสกปรก... แต่มือที่สกปรกคือสัญลักษณ์ที่มีเกียรติของ#nไมสเตอร์ค่ะ"
2300408-37 = "แต่บางทีฉันอาจจะปล่อยเล็บนิ้วก้อยเอาไว้ เพื่อให้จดจำเรื่องวันนี้ได้..."
2300408-40 = "คือว่า ถ้าจะให้ติดเจลไว้ที่นิ้วก้อยของฉันนิ้วเดียวได้มั้ยคะ?"
2300408-41 = "ได้เลยไม่มีปัญหาค่ะ ช่วยรอสักครู่นะคะ"
2300408-43 = "หลังจากทำเล็บเสร็จแล้ว คุณครูก็กลับไปที่ชาเล่ต์กับอุทาฮะที่ดูมีความสุขมากกว่าปกติ"

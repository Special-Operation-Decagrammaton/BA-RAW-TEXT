[translation]
211-1 = "未完的怪談"
211-4 = "呼呣，本想著是次又是誰迷路至此……竟偏偏是你啊。#n這也算是個驚喜。"
211-5 = "……啊啊，原來如此。"
211-6 = "以近日眼前所見之事來看……"
211-7 = "與妾身的邂逅，或許難以稱之為怪談──甚至並非奇事。"
211-8 = "…………"
211-9 = "哦？這是什麼意思？"
211-10 = "你也很清楚吧？#n那場發生在你生命中的騷動。"
211-11 = "充斥熱鬧與歡樂的慶典舞台──其背後因受人需要而借助的「貓手」。"
211-12 = "生於他人的惡意，遭人呼來喚去……最終被隨意丟棄的多餘故事。"
211-13 = "其名為幻魎百物語「貓鬼黑影」──"
211-14 = "此時此刻依舊燃燒著人群散去的慶典會場，發出陣陣慟哭……"
211-15 = "尚未劃下句點便走向終結的哀傷[ruby=百物語]怪談[/ruby]。"
211-17 = "源自暗藍深夜──圍繞燃燒燭火創造百種故事的遊戲之物。"
211-18 = "能如此相遇亦是緣分。"
211-19 = "夏萊的老師，你能為這淒美的怪談畫下句點嗎……？"
211-20 = "妾身很期待哦，呵呵。"

[translation]
211-1 = "The Fate of an Unfinished Ghost Story"
211-4 = "I was rather intrigued as to which lost soul wandered their way in this time... I must say, you were not who I was expecting."
211-5 = "...Ah, I see. I understand now."
211-6 = "I suppose with the way events have been unfolding..."
211-7 = "Well, our meeting here is simply the next turn of the page. It hardly compares to the legends bursting from their stories."
211-8 = "..."
211-9 = "...Hm? You don't understand?"
211-10 = "Have you not heard? Of the raucous events of your world?"
211-11 = "It's a story set on the joyous stage of a festival. But a \"cat's paw\" orchestrated a dark ending from backstage."
211-12 = "She crafted a story of lies and betrayal, giving birth instead to a story of abandonment and a desperate soul tired of being used for others' ends."
211-13 = "They created a Phantom Fable: Myouki Kurokage."
211-14 = "A pitiful ghost story that will never be granted its ending. "
211-15 = "Even now, its spirit haunts and burns in the abandoned festival grounds. Can you hear its wails of sorrow?"
211-17 = "All this originated from the hushed whispers of their stories with nothing but a candle to light their way. To guide their hundred tales."
211-18 = "And thus, with a twist of fate's own hand, our meeting was perhaps inevitable."
211-19 = "Can our Schale's Sensei at last put an end to this pitiful ghost story?"
211-20 = "I will be watching, as always. Heehee."

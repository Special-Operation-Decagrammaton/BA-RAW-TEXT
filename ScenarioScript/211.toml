[translation]
211-1 = "#title;매듭짓지 못한 괴담의 말로"
211-2 = "3;쿠즈노하;01\n#3;a\n#wait;1500"
211-3 = "3;쿠즈노하;02\n#3;em;[?]\n#wait;1500"
211-4 = "3;쿠즈노하;00;이번엔 또 어떤 이가 길을 잃고 이리로 흘러들었나 싶었건만, 하필 만난 것이 그대라니. 이 또한 놀랄 일이로구먼."
211-5 = "3;쿠즈노하;02;……아아, 아니, 아니지. 그래, 그런 것이었나.\n#3;em;[반응]"
211-6 = "3;쿠즈노하;99;작금의 우리 앞에서 벌어지고 있는 일에 비추어 본다면……."
211-7 = "3;쿠즈노하;01;나와 그대가 만나는 일쯤이야. 한 줌의 괴담조차 되지 못하는── 딱히 이상하지도 않을 일일지도 모른다는 겐가."
211-8 = "3;쿠즈노하;01;……….\n#3;em;…"
211-9 = "3;쿠즈노하;02;호오? 그게 무슨 말이느냐고?"
211-10 = "3;쿠즈노하;03;그대는 이미 알고 있지 않나? 그대가 살아가는 유애에서 일어난 소동을."
211-11 = "3;쿠즈노하;99;요란하고 즐겁기만 하던 축제의 무대, 그 뒤편에서 누군가가 필요로 하여 빌렸던 <고양이 손> 하나."
211-12 = "3;쿠즈노하;01;타인의 악의에서 자아낸 끝에 필요에 따라 쓰고, 쓰이지 않고, 또 쓰임이 끝나고 나서야 마구잡이로 버려진 이야기의 여분."
211-13 = "3;쿠즈노하;02;그 이름. 입을 모아 부르기를, 환량백물어. 묘귀 쿠로카게──."
211-14 = "3;쿠즈노하;05;지금 이 순간에도 유애의 뒤편에서 모두가 떠나간 축제장을 어지럽히며 불태우고 망가트린 끝에 구슬피 울고 있는……. "
211-15 = "3;쿠즈노하;01;결말을 매듭짓지 못한 채 끝내 다다르고야 만, 그 애처로운[ruby=백물어] 괴담 [/ruby]의 말로를 말이야."
211-16 = "#all;hide"
211-17 = "3;쿠즈노하;08;이 모든 것은 한밤중의 깊푸른 심야. 타오르는 촛불 앞에 둘러앉아 자아내던 백가지의 이야기 놀이에서 태어난 것.\n#3;a\n#3;closeup"
211-18 = "3;쿠즈노하;03;자아, 이렇게 만난 것도 인연이겠지.\n#3;em;[반응]\n#3;closeup"
211-19 = "3;쿠즈노하;01;샬레의 선생, 자네라면 이 애처로운 괴담에 어울리는 마침표를 찍어줄 수 있을까?\n#3;closeup"
211-20 = "3;쿠즈노하;00;내, 자네의 활약을 기대하고 있겠네. 후후.\n#3;em;[음표]\n#3;closeup"

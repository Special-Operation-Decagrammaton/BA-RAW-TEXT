[translation]
211-1 = "เรื่องเล่าของตำนานที่ไร้จุดจบ"
211-4 = "คราวนี้... ข้ากำลังสงสัยอยู่เชียวว่าผู้ที่หลงทางเข้ามายังที่แห่งนี้คือใครกัน ไม่คิดเลยว่าจะได้บังเอิญ#nพบกับทางนั้นที่นี่ ช่างน่าตกใจเสียจริง"
211-5 = "อ่า... ไม่สิ ใช่แล้ว... คงเป็นเช่นนั้นสินะ"
211-6 = "เทียบกับสิ่งที่เกิดขึ้นต่อหน้าพวกเราในตอนนี้..."
211-7 = "ก็คงถึงเวลาที่พวกเราจะได้พบกันแล้วละ มันไม่ใช่เพียงเรื่องเล่าลี้ลับทั่วๆ ไป... แต่ท้ายที่สุดแล้วมันก็อาจจะไม่ใช่เรื่องแปลกอะไรก็ได้"
211-8 = "......"
211-9 = "หืม...? สิ่งที่ข้าพูดนั้นหมายความว่าอย่างไรงั้นหรือ?"
211-10 = "คุณเองก็น่าจะรู้อยู่แล้วไม่ใช่หรือ? ว่าความวุ่นวายที่เกิดขึ้นในโลกที่ทางนั้นอยู่น่ะ..."
211-11 = "เบื้องหน้าคืองานเทศกาลรื่นเริงสนุกสนาน แต่เบื้องหลังกลับยืม <อุ้งมือแมว> มาด้วยความจำเป็นของ#nใครบางคน"
211-12 = "เศษเสี้ยวส่วนหนึ่งของเรื่องราวที่ถือกำเนิดขึ้นจากความอาฆาต พยาบาท และเจตนาร้ายของผู้อื่น ทั้งเรื่องราวที่ถูกเขียน เรื่องราวที่ไม่ได้เขียน และเรื่องราวที่ถูกทอดทิ้งหลังจากขีดเขียนเสร็จ"
211-13 = "นามของมันที่เหล่าผู้คนต่างเรียกขานคือ \"เมียวกิ คุโระคาเงะ\" จากตำนานร้อยเรื่องราววิญญาณลี้ลับ"
211-14 = "แม้กระทั่งตอนนี้ มันก็ยังส่งเสียงกรีดร้อง คำรามอย่างรวดร้าว#nหลังจากทำลายและแผดเผาสถานที่จัดงานเทศกาลที่ทุกคนจากไป..."
211-15 = "ข้ากำลังพูดถึงตำนานร้อยเรื่องราวลี้ลับที่น่าสังเวชที่ไร้จุดจบ"
211-17 = "เรื่องราวทั้งหมดล้วนเกิดจากการนั่งล้อมวงเล่าเรื่องราวในตำนานร้อยเรื่อง ท่ามกลางแสงไฟจากเทียนไขที่ลุกโชนในกลางดึกคืนหนึ่ง..."
211-18 = "เช่นนั้น... คงเป็นโชคชะตาที่นำพาให้เราได้มาพบกัน"
211-19 = "ครูของชาเล่ต์ หากเป็นคุณละก็... จะช่วยเขียนจุดจบที่เหมาะสมให้กับเรื่องราวลี้ลับที่น่าสมเพชนี้#nได้หรือไม่?"
211-20 = "ข้า... จะตั้งตารอก็แล้วกัน ฮุฮุ..."

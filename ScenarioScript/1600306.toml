[translation]
1600306-1 = "Girl Chases Sparkles"
1600306-2 = "The place Suzumi told me about was a quiet amusement park in Trinity."
1600306-3 = "It was quite late, so the rides were moving around without parkgoers."
1600306-4 = "Ah, Sensei. I'm here."
1600306-5 = "Thanks for coming. I know you're busy and it's quite late..."
1600306-6 = "[s1] \"I was happy to come.\"\n[s2] \"What's going on?\""
1600306-7 = "Well... Like I said, it's not about anything important."
1600306-8 = "L-Like I said, it's not about anything important."
1600306-9 = "Um..."
1600306-10 = "[s] \"Yes...?\""
1600306-11 = "The...s-stars..."
1600306-12 = "I wanted to show you...the stars..."
1600306-13 = "[s3] \"Oh! How come?\" \n[s4] \"Why stars all of a sudden?\""
1600306-14 = "I-I'm sorry. I know this is out of nowhere."
1600306-15 = "I-I'm sorry. I know this is out of nowhere."
1600306-16 = "I don't know what I was thinking... Maybe this was silly of me..."
1600306-17 = "You can go... Let's pretend this didn't happen."
1600306-21 = "Huh? You don't mind?"
1600306-22 = "So...you asked why stars all of a sudden...?"
1600306-23 = "There's no special reason..."
1600306-24 = "I just wanted to show them to you, I guess."
1600306-31 = "You see.."
1600306-32 = "This amusement park is the last stop on my nightly patrol."
1600306-33 = "It's deserted and a good place to hide at this time, so there were a lot of thugs here once."
1600306-34 = "But they kept running into me and eventually went away. So now it's nice and quiet here."
1600306-35 = "...It's really peaceful."
1600306-36 = "So I had time to sit on the balcony or stand around staring at the stars."
1600306-37 = "And then I thought...maybe I could see more stars if I went higher."
1600306-38 = "The highest vantage point here is the Ferris wheel.."
1600306-39 = "Well..."
1600306-40 = "But it's kind of weird...to get on a Ferris wheel alone... So..."
1600306-41 = "[s] \"You need someone to go on it with you.\""
1600306-42 = "It sounds really childish when it's said aloud. I'm sorry."
1600306-43 = "...! You really don't mind?"
1600306-44 = "Th-That's...um..."
1600306-48 = "...Umm, never mind."
1600306-49 = "Thank you, Sensei."
1600306-53 = "Then, this way..."
1600306-54 = "[s] Follow Suzumi."
1600306-60 = "Suzumi and I walked side by side to the Ferris wheel."
1600306-68 = "I told you before about having one day to not worry about anything."
1600306-69 = "I've kind of been wishing I had a day off where I didn't have to do Vigilante Crew work or worry about anything."
1600306-70 = "I realized, maybe that's kind of what this place is."
1600306-71 = "That's what I was thinking about, anyway..."
1600306-75 = "I-I'm sorry. I'm rambling."
1600306-83 = "Oh... We're here."
1600306-84 = "It's gonna go up soon, so just a second."
1600306-87 = "― ...It's beautiful.[wa:760] "
1600306-90 = "― I feel like[wa:1000] "
1600306-92 = "― I could reach the stars from here.[wa:260] "
1600306-95 = "― I've been enjoying these[wa:2300] "
1600306-97 = "― moments of reprieve lately...[wa:1060] "
1600306-100 = "― I think it's been that way since I met you.[wa:1720] "
1600306-103 = "― ...Sensei.[wa:2640] "
1600306-106 = "― Do you think we could[wa:1400] "
1600306-108 = "― hang out here and there?[wa:1400] "
1600306-111 = "― I know[wa:1540] "
1600306-113 = "― I talk about boring stuff all the time, but...[wa:580] "
1600306-116 = "― Maybe someday, I'll...[wa:3780] "
1600306-118 = "― ...Yes, one day...[wa:4240] "
1600306-121 = "...I'll tell you what I really want to say."

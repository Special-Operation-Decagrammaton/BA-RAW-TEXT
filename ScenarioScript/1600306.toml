[translation]
1600306-1 = "追逐耀眼光芒"
1600306-2 = "（鈴美告訴我的地點，是一座位於三一自治區的冷清遊樂園）"
1600306-3 = "（由於已經夜深，園內沒有其他客人，只剩遊樂設施孤單地運轉著）"
1600306-4 = "啊，老師。這裡。"
1600306-5 = "謝謝老師百忙之中抽空過來。而且現在時間又這麼晚了……"
1600306-6 = "[s1] 「不會唷，不用在意。」\n[s2] 「今天有什麼事嗎？」"
1600306-7 = "就，就像剛才MomoTalk上說的一樣，其實也不是什麼大事……"
1600306-8 = "就，就像剛才MomoTalk上說的一樣，其實也不是什麼大事……"
1600306-9 = "只是……"
1600306-10 = "[s] 「……？」"
1600306-11 = "……星星。"
1600306-12 = "我想讓老師，看看星星。"
1600306-13 = "[s3] 「……嗯？」\n[s4] 「星星……？」"
1600306-14 = "對，對不起，我也知道很沒頭沒尾……"
1600306-15 = "對，對不起，我也知道很沒頭沒尾……"
1600306-16 = "突然把老師找來說這種話，很讓人困擾對吧。"
1600306-17 = "所以，如果老師另外有事的話，可以馬上拒絕我也沒關係……"
1600306-21 = "啊，那，那真是太好了……"
1600306-22 = "原因嗎？"
1600306-23 = "其實，沒什麼特別的原因……"
1600306-24 = "只是單純想讓老師也看看星空而已。"
1600306-31 = "這座遊樂園……"
1600306-32 = "是我每日巡邏路線的終點站。"
1600306-33 = "這座遊樂園以前聚集了很多太妹……"
1600306-34 = "但他們最近似乎都轉移陣地到其他地方了。"
1600306-35 = "……遊樂園也因此平靜下來。"
1600306-36 = "讓人能放鬆靠在扶手上，仰望天空。"
1600306-37 = "接著某天，我突然想到如果到更高的地方，應該能看得更清楚吧……"
1600306-38 = "就想說要不要搭上摩天輪看看。"
1600306-39 = "然後……"
1600306-40 = "又覺得一個人坐摩天輪……好像還是沒什麼意思……"
1600306-41 = "[s] 「原來如此，所以你才會找我來呀？」"
1600306-42 = "實際講出來，還真是個幼稚的理由呢……真是對不起。"
1600306-43 = "咦？現在就去坐摩天輪……？"
1600306-44 = "啊，真，真的嗎……？"
1600306-48 = "不，請別在意。"
1600306-49 = "不好意思，我們走吧，老師。"
1600306-53 = "那麼，請跟我來吧……"
1600306-54 = "[s] 跟著鈴美走"
1600306-60 = "（於是和鈴美並肩走向摩天輪）"
1600306-68 = "我想到之前和老師說過的話了。"
1600306-69 = "我當時說過，希望下次能在更輕鬆的狀況下交談……"
1600306-70 = "仔細想想……"
1600306-71 = "我的願望早就已經實現了。"
1600306-75 = "不好意思。"
1600306-83 = "我又說些奇怪的話了。"
1600306-84 = "……我們搭上去吧。"
1600306-87 = "― ……真美呢。[wa:1240] "
1600306-90 = "― 在這裡，[wa:1280] "
1600306-92 = "― 星星彷彿觸手可及。[wa:1260] "
1600306-95 = "― 最近可以像這樣度過[wa:2900] "
1600306-97 = "― 悠閒平靜的時光……[wa:1860] "
1600306-100 = "― ……或許是從遇見老師的那一刻開始的吧。[wa:2680] "
1600306-103 = "― ……老師。[wa:2840] "
1600306-106 = "― 如果可以的話，今後，[wa:1840] "
1600306-108 = "― 還能和我待在一起嗎？[wa:1960] "
1600306-111 = "― 雖然我可能，[wa:1540] "
1600306-113 = "― 還是會一直說些無趣的話……[wa:1900] "
1600306-116 = "― 不過總有一天我也……[wa:4260] "
1600306-118 = "― ……嗯。總有一天，一定可以。[wa:4400] "
1600306-121 = "……將心裡的想法傳達給老師。"

[translation]
1600306-1 = "เด็กสาวกับดาววิบวับ"
1600306-2 = "(สถานที่ที่สึซึมิบอกมาคือสวนสนุกที่เงียบสงัดแห่งหนึ่งภายในเขตทรีนิตี้)"
1600306-3 = "(คงเป็นเพราะว่าตอนนี้ดึกมากแล้ว เลยมีแต่เครื่องเล่นที่เคลื่อนไหวไปมาโดยไม่มีลูกค้าใช้งาน)"
1600306-4 = "อ๊ะ คุณครู ทางนี้ค่ะ"
1600306-5 = "คุณครูคงยุ่งมาก ขอบคุณที่อุตส่าห์มานะคะ ทั้งที่ดึกขนาดนี้แล้ว..."
1600306-6 = "[s1] \"ไม่เป็นไร...\"\n[s2] \"มีเรื่องอะไรเหรอ?\""
1600306-7 = "ฉะ...ฉันไม่ได้มีธุระสำคัญอะไร อย่างที่บอกไปในแชตหรอกค่ะ"
1600306-8 = "ฉะ...ฉันไม่ได้มีธุระสำคัญอะไร อย่างที่บอกไปในแชตหรอกค่ะ"
1600306-9 = "คือ..."
1600306-10 = "[s] \"คือ...?\""
1600306-11 = "คือว่า... ดะ...ดาว..."
1600306-12 = "ฉะ...ฉันอยากให้คุณครูได้มาชมดาวก็เลย..."
1600306-13 = "[s3] \"หืม...?\"\n[s4] \"ดาวทำไมเหรอ?\""
1600306-14 = "ขะ... ขอโทษค่ะ ว่าแล้วเชียวว่ามันคงกะทันหันเกินไปสินะคะ"
1600306-15 = "ขะ... ขอโทษค่ะ ว่าแล้วเชียวว่ามันคงกะทันหันเกินไปสินะคะ"
1600306-16 = "จู่ๆ ก็เรียกคุณครูออกมาแล้วพูดแบบนี้... ดูเหมือนฉันจะทำผิดไปซะแล้วค่ะ"
1600306-17 = "ถ้างั้นถือว่าฉันไม่เคยพูด..."
1600306-21 = "คะ...? ไม่เป็นไรงั้นเหรอคะ?"
1600306-22 = "แล้ว... ทำไมจู่ๆ ฉันถึงชวนมาดูดาวงั้นเหรอคะ?"
1600306-23 = "คือว่า... ไม่ได้มีเหตุผลอะไรเป็นพิเศษหรอกค่ะ..."
1600306-24 = "ฉันแค่อยากให้คุณครูได้ชมดาวก็เท่านั้นค่ะ..."
1600306-31 = "ที่นี่..."
1600306-32 = "ที่สวนสนุกแห่งนี้... เป็นสถานที่ที่ฉันแวะมาทุกครั้งหลังลาดตระเวณเสร็จค่ะ"
1600306-33 = "สวนสนุกในช่วงเวลาแบบนี้ ไม่มีคนพลุกพล่าน และเหมาะเป็นสถานที่ซ่อนอย่างดี ตอนแรกที่นี่มีพวกนักเลงเข้ามาอยู่กันเยอะมากเลยค่ะ"
1600306-34 = "แต่อาจเป็นเพราะฉันมาที่นี่ เลยได้ปะทะกันบ่อยๆ พอพวกนั้นย้ายไปที่อื่น ที่นี่ก็เงียบสงบขึ้นมากค่ะ"
1600306-35 = "รู้สึกได้ถึงความสงบเรียบร้อยเลยค่ะ"
1600306-36 = "ทำให้ฉันมีเวลาว่างพอที่จะนั่งพักที่ตรงบันได หรือยืนมองดวงดาวบนท้องฟ้าได้ค่ะ"
1600306-37 = "พอแบบนั้นแล้วฉันก็เลยคิดว่า... ถ้าได้ขึ้นไปที่สูงๆ กว่านี้ อาจจะมองเห็นดาวชัดขึ้นก็ได้ ฉันคิดแบบนั้นค่ะ"
1600306-38 = "แต่สถานที่ที่นึกขึ้นได้ตอนนี้ก็มีแค่ชิงช้าสวรรค์เท่านั้นค่ะ..."
1600306-39 = "คือ..."
1600306-40 = "แต่ว่าพวกชิงช้าสวรรค์นี่... ถ้าจะขึ้นไปนั่งคนเดียวมันก็คงจะแปลกๆ เพราะงั้นฉันก็เลย..."
1600306-41 = "[s] \"เรียกครูมาเพราะอยากให้มีเพื่อนนั่งด้วยสินะ\""
1600306-42 = "พอมาคิดดูอีกที ฉันนี่ทำตัวเหมือนเด็กๆ เลยนะคะ ขอโทษด้วยค่ะ คุณครู"
1600306-43 = "คะ? ไม่เป็นไรเหรอคะ? เอ๊ะ? ให้ไปขึ้นชิงช้ากันเลยเหรอคะ?"
1600306-44 = "คือว่า... คือ..."
1600306-48 = "อืม... เปล่าค่ะ"
1600306-49 = "ขอบคุณนะคะคุณครู"
1600306-53 = "ถ้างั้นเชิญทางนี้ค่ะ..."
1600306-54 = "[s] เดินตามสึซึมิไป"
1600306-60 = "(คุณครูกับสึซึมิเดินไปที่ชิงช้าด้วยกัน)"
1600306-68 = "เมื่อก่อน เคยมีครั้งหนึ่งที่ฉันเล่าให้ฟังเรื่องวันสบายๆ ที่ไม่ต้องกังวลเรื่องอะไรใช่มั้ยคะ"
1600306-69 = "ถ้ามีวันที่ไม่ต้องทำงานของกลุ่มรักษาความสงบ และได้พักผ่อนสบายๆ โดยไม่ต้องคิดอะไรบ้าง ก็คงดีนะคะ"
1600306-70 = "พอคิดทบทวนดู ก็รู้สึกเหมือนตอนนี้ได้ใช้เวลาแบบนั้นอยู่เหมือนกัน..."
1600306-71 = "ฉันคิดแบบนั้นค่ะ"
1600306-75 = "ฉันพูดอะไรเรื่อยเปื่อยไปซะแล้ว ขอโทษด้วยนะคะ"
1600306-83 = "มาถึงแล้วค่ะ"
1600306-84 = "เดี๋ยวก็ขึ้นไปถึงแล้วค่ะ อดทนนิดนึงนะคะ"
1600306-87 = "― สวยจังเลยค่ะ...[wa:880] "
1600306-90 = "― ถ้าอยู่ที่นี่ละก็[wa:760] "
1600306-92 = "― รู้สึก...เหมือนจะคว้าดวงดาวมาได้เลยค่ะ[wa:100] "
1600306-95 = "― ตอนนี้ก็ได้ใช้เวลาแบบสบายๆ[wa:2220] "
1600306-97 = "― ได้ใช้เวลาแบบไม่รีบร้อนแล้วนะคะ...[wa:860] "
1600306-100 = "― คงจะตั้งแต่... ที่ฉันได้พบกับคุณครูน่ะค่ะ...[wa:1680] "
1600306-103 = "― คุณครูคะ...[wa:2600] "
1600306-106 = "― ถ้าคุณครูไม่ว่าอะไร ต่อจากนี้ไป...[wa:880] "
1600306-108 = "― ช่วยมาใช้เวลาแบบนี้ด้วยกันอีกได้มั้ยคะ?[wa:800] "
1600306-111 = "― ฉันน่ะ...อาจจะเผลอ...[wa:940] "
1600306-113 = "― พูดเรื่องที่ไม่สนุกออกไปก็ได้...[wa:1140] "
1600306-116 = "― แต่ว่าสักวันหนึ่ง...ฉันเองก็คง...[wa:3340] "
1600306-118 = "― ค่ะ... สักวันหนึ่ง...[wa:4120] "
1600306-121 = "ถ้าวันที่ฉันกล้าพูดออกไปมาถึงก็... คงดีนะคะ"

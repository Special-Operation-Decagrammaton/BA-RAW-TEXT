10043050-286 = "งั้นเหรอคะ ยิ่งการแข่งขันเข้มข้นและบรรยากาศในสนามร้อนแรงขึ้น ผู้ชมก็น่าจะยิ่งถามหาเครื่องดื่ม แต่กลายเป็นว่าพนักงานพาร์ทไทม์หายไปกันหมด..."
10043050-287 = "เทรนเนอร์คิดว่ายังไงเหรอคะ?"
10043050-288 = "ค่ะ ใช่ค่ะ เป็นเรื่องที่แปลกอย่างไม่ต้องสงสัยเลย อย่างน้อยถ้าพวกเรารู้ได้ว่าพนักงานพาร์ทไทม์ไป#nไหนกันก็ดีน่ะสิ..."

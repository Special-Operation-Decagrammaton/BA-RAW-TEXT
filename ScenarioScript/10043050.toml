10043050-89 = "3;스미레 아르바이트;05;팬이 있기에 선수들이 있는 것이고, 선수들이 있기에 팬이 모이는 것이기도 하죠."
10043050-90 = "3;스미레 아르바이트;10;스포츠가 문화로 성장하는 데에는, 많은 팬의 힘이 가장 중요하겠습니다만, 그런 팬에게도 최소한에 지켜야 할 선은 있어야 하지 않을까요!\n#3;em;[!]"
10043050-91 = "3;스미레 아르바이트;05;회원님들이 찾아오지 않는 트레이닝 센터는, 그저 기구를 모아 놓은 공간에 지나지 않는 것처럼 말이죠!"
10043050-92 = "3;백곰 기록하던 관중;00;윽……! 재미도 없는 정론이나 늘어놓다니!\n#3;em;[땀]\n#3;stiff"
10043050-93 = "#st;[0,0];instant;1;"
10043050-94 = "#clearST"

[translation]
10043050-1 = "Episode 5;The Key is an Unbreakable Spirit"
10043050-3 = "I see...so Rei's taking a breather, then."
10043050-4 = "[s] \"Yeah, we've been doing a LOT of running around.\""
10043050-5 = "(nod) Watching every person in this huge crowd for anything suspicious..."
10043050-6 = "...it takes a toll, physically and mentally."
10043050-7 = "[s] \"Are you holding up okay, Sumire?\""
10043050-8 = "I'm fine. I've built up the stamina for this."
10043050-9 = "In fact, I've spotted a couple of suspects. And, as long as I'm wearing this and playing \"part-timer\"..."
10043050-10 = "...I think I know how to get close to them!"
10043050-11 = "Let's go!"
10043050-20 = "First, there's that person over there."
10043050-26 = "Third pitch, straight, swing strike..."
10043050-27 = "4th pitch, splitter, ball..."
10043050-33 = "5th pitch, hit...center field fly... So that makes the batting rate..."
10043050-34 = "...and the pitcher's ERA is now..."
10043050-39 = "You see him, Trainer? He's been scribbling notes this whole time."
10043050-40 = "[s] \"That...definitely seems out of the ordinary.\""
10043050-41 = "Definitely. I don't even know baseball that well, and he's still sticking out to me."
10043050-42 = "Why is he recording all the stats of both teams?"
10043050-43 = "Let me go find out... "
10043050-44 = "Huh? What am I planning on doing? Don't worry, Trainer. I'm just doing my \"part-time job.\""
10043050-47 = "If you calculate the OPS..."
10043050-52 = "Hello, sir! Would you like a drink?"
10043050-53 = "Whoa! Wh-What...? Drink? What?"
10043050-54 = "Come to think of it, I've been taking so many notes, I forgot I was thirsty. Sure, let me have one of those."
10043050-55 = "Here you go. Drink up!"
10043050-61 = "Okay, next batter's stepping up, and..."
10043050-62 = "What are you writing?"
10043050-63 = "This? Eh...nothing much. Batting averages, pitch types, hitting results, that sort of thing."
10043050-64 = "Huh? You want to know why?"
10043050-65 = "..."
10043050-66 = "None of your business! Just stick to your job! "
10043050-70 = "(Did you see that, Trainer?)"
10043050-71 = "[s1] (...We'll need to investigate further.)\n[s2] (Let's not get too obvious about it...)"
10043050-74 = "(Right!)"
10043050-81 = "Gah, you made me miss the play! You ruined it! I only get the points from the betting site if I upload EVERYTHING in real time!"
10043050-86 = "...To the sketchy gambling site where you're trying to sway the odds."
10043050-87 = "You know, I'm a fan, I bought the ticket... I'll do what I want here!"
10043050-88 = "That doesn't sound right to me."
10043050-89 = "The fans are here for the players, and the players are here for the fans."
10043050-90 = "Sports culture needs fans, lots of them, but there are still lines and boundaries!"
10043050-91 = "Think of a training center if the members just \"did what they wanted.\" What then?"
10043050-92 = "Ugh, I didn't ask for a lecture! ...Whatever, I'm out of here."
10043050-97 = "Well, I guess we did stop A corrupted fan..."
10043050-98 = "...but he didn't seem like the culprit to me."
10043050-99 = "[s] \"I mean, I think it was still good to stop him...\""
10043050-100 = "Thank you for saying that, Trainer."
10043050-101 = "But let's not give up. If I gave up now...I'd miss out on all this stair climbing!"
10043050-102 = "The next lead's over this way!"
10043050-107 = "Go, Heroes! Fight! Win!"
10043050-108 = "March to the drums of victory! We're right there with you!"
10043050-114 = "[ns] \"A cheer squad?\""
10043050-115 = "Not just that, Trainer. Look closer."
10043050-116 = "They might SEEM like your run-of-the-mill drum-based cheerleaders..."
10043050-117 = "But did you know drums can actually send secret messages in Morse code?"
10043050-121 = "I thought Sumire was reading too deeply into it, but..."
10043050-126 = "H-How did you know? We had the perfect plan: pose as Hero fans, and use Morse code to steal their signals! How could you have figured it out?"
10043050-131 = "I took Morse code as an elective. The Code Cracking Club members looked like they could use some training."
10043050-132 = "[s3] \"You did?!\"\n[s4] \"Was that your only reason?\""
10043050-135 = "It's a bit of a tangent...but I do want to say something here."
10043050-136 = "The reason why wins and losses are noble is because there's an implicit agreement that the games are fair."
10043050-137 = "Twisting that fairness, like you're doing, just cheapens the win."
10043050-138 = "True sports depend on sportsmanship."
10043050-143 = "...Sure, but we're scared, okay? "
10043050-144 = "What if we LOSE to the Heroes?"
10043050-145 = "What if this loser team actually beats us? None of us Pillager fans could handle that!"
10043050-146 = "I mean, it's not like they're winning NOW, but they COULD win! We don't know!"
10043050-147 = "[s5] \"That's one of the great things about sports.\"\n[s6] \"The thrill of the unexpected.\""
10043050-151 = "[ns7] \"We all like winning more than losing.\"\n[ns8] \"We'd all love to be sure we can win every time. But...\""
10043050-155 = "..."
10043050-157 = "I'm sorry... We were in the wrong..."
10043050-159 = "Good to hear you say that."
10043050-160 = "You know, if you really are that passionate..."
10043050-161 = "...why not channel that passion into your own health and fitness, at the Millennium Training Center?"
10043050-162 = "[s] \"You are a GREAT saleswoman, Sumire...\""
10043050-166 = "Hm? I'm not sure what you mean by that, Trainer."
10043050-169 = "...Anyway, that was worth checking out, but now we're at another dead end."
10043050-170 = "This is not easy, Trainer. Not easy at all."
10043050-171 = "[s] \"I'm glad you're so into it, but we shouldn't always jump to conclusions...\""
10043050-172 = "You're right. Some self-reflection would do me some good, I think."
10043050-173 = "In the meantime, there's so much of a ruckus in this huge stadium that no one else cares what we're doing here."
10043050-174 = "That's kind of amazing, in a way."
10043050-175 = "[s] \"Amazing how dramatic it can get here?\""
10043050-176 = "Just amazing in general."
10043050-177 = "You know, I'm not always the best speaker, or the clearest."
10043050-180 = "And some people think I'm too serious about everything."
10043050-181 = "Maybe if I were better at relaxing and taking it easy..."
10043050-182 = "...I'd be better at approaching people like this."
10043050-185 = "[ns9] \"I think you're fine just the way you are.\"\n[ns10] \"We need people who can take things seriously.\""
10043050-188 = "Thank you, Trainer."
10043050-189 = "Heehee... Although I know you ALWAYS find something nice to say."
10043050-193 = "...Uh, that was a joke. I hope I didn't...sound weird or offensive."
10043050-194 = "I didn't? Good, I'm glad."
10043050-195 = "..."
10043050-196 = "Speaking of amazing things, look at all this team spirit. The team never gives up, and neither do the fans."
10043050-197 = "Even if they always lose, even if they alllmost win, they never get discouraged."
10043050-198 = "...Hey, Trainer?"
10043050-202 = "Or should I say \"Sensei\"?"
10043050-203 = "[s] \"...?!\""
10043050-205 = "[ns] Listen to Sumire without interruption."
10043050-206 = "You might think it's weird of me to bring all this up out of nowhere."
10043050-207 = "But I like to think I relate to people who keep on trying, and to people who help them stay on the path."
10043050-208 = "I'm a trainer, after all."
10043050-209 = "But now I've gotten myself thinking...just what exactly is \"training\"?"
10043050-210 = "[s] \"What do you think, Sumire?\""
10043050-214 = "..."
10043050-215 = "People contain multitudes. Everyone has their own internal conflicts. "
10043050-216 = "Sometimes, what they want to do in the moment conflicts with who they want to be."
10043050-217 = "I see that a lot in my work."
10043050-220 = "Like, say you start a new diet."
10043050-221 = "But managing your food intake, that's a lot of work. You get tired of it. It's a constant struggle, you're hungry, and you miss your favorite foods... It's hard. It hurts."
10043050-222 = "So in that situation, what do you want to do? You might decide to eat, oh, I don't know, a creamy cheese pasta dish."
10043050-223 = "Just think of all that rich, thick cheese, and the sweet cream, and maybe some bacon mixed in too."
10043050-224 = "With pepper sprinkled on top."
10043050-225 = "[ns] \"I want some.\""
10043050-226 = "Fufu. Who wouldn't?"
10043050-229 = "And after all that pasta, you might want to wash it down with a nice cool chocolate shake."
10043050-230 = "With some of that bittersweet chocolate to balance out the creaminess that's still in your mouth."
10043050-231 = "That'd feel pretty good, wouldn't it?"
10043050-232 = "...And it would keep you away from the healthy, balanced body you wanted to achieve."
10043050-235 = "Willpower is fragile. The tiniest, most ridiculous thing can just shatter it."
10043050-236 = "Now me, I try to keep things simple and say what I mean. Some people say I'm insensitive or blunt."
10043050-237 = "And not just me. The Athletics Training Club has that reputation, at least from outsiders."
10043050-238 = "But even so..."
10043050-241 = "Sometimes, I see a member work out so hard they can barely make it home afterwards."
10043050-242 = "And they still show up the next day, with the will to keep going."
10043050-243 = "Maybe one in ten people does that."
10043050-246 = "But if you can cherish that one person, and help them reach the goal they're going for..."
10043050-247 = "Sometimes, I think that's good enough."
10043050-248 = "Maybe I'm just rambling now..."
10043050-249 = "But I guess what I'm saying—again—is that I respect people who take on that challenge, and the people who help them stay on it."
10043050-250 = "I admire them. I just like them. Can't help it."
10043050-251 = "I... I like you the same way, Sensei."
10043050-252 = "[s] \"Oh?!\""
10043050-253 = "Fufu. You sound surprised."
10043050-258 = "Trainer."
10043050-262 = "I felt like I ought to say thank you, but I couldn't really speak."
10043050-263 = "All I could do in the moment was look into her eyes..."
10043050-268 = "Hey, part-timer! Over here!"
10043050-269 = "All the other part-timers disappeared someplace. Could you give me a drink?"
10043050-273 = "Huh? The other part-timers...?"
10043050-274 = "[s] \"Disappeared?\""
10043050-275 = "Well, we'll deal with that later. Here's the drink. Nice and cold."
10043050-279 = "Thank you!"
10043050-283 = "Phew, that hits the spot. Yeah, I don't know where they went. I was getting really thirsty."
10043050-284 = "Do you remember...around what time they disappeared?"
10043050-285 = "Hm, sometime around the second inning, maybe...? It was when the match was just starting to heat up."
10043050-286 = "\"Heat up.\" So just when people would be looking for more drinks, they all went off somewhere."
10043050-287 = "What do you think, Trainer?"
10043050-288 = "Right. It's definitely strange. If we could find where they went off to..."
10043050-293 = "Phew! My throat's so dry, after all that cheering with no drinks around..."
10043050-297 = "[ns] \"Oh, Hanae. We meet again.\""
10043050-298 = "Oh?"
10043050-299 = "Sensei!"
10043050-303 = "Ah, I didn't know you were working here, Sumire!"
10043050-304 = "Yep. You said you were thirsty, Hanae? Hold on."
10043050-309 = "*gulp* *gulp*... Thank you! I was getting a little dizzy!"
10043050-310 = "Whew, yeah, just what I needed! I can cheer all day now!"
10043050-311 = "Perfect timing, Sumire! You'd make a great Remedial Knight!"
10043050-313 = "Fufu. I'd rather be a Health Knight, just going around making people healthier."
10043050-314 = "That sounds good too! Wait, are Health Knights a thing?"
10043050-318 = "Oh, speaking of drinks..."
10043050-319 = "...I guess the other part-timers all went off someplace together."
10043050-323 = "!!!"
10043050-324 = "[s] \"Do you know where?\""
10043050-325 = "Yeah, I saw them go over that way!"
10043050-330 = "That's...?"
10043050-331 = "[s] \"To the seats behind the catcher...?\""
10043050-332 = "It'd make a good cheering spot, now that I think about it."
10043050-333 = "You could see the whole stadium from there!"
10043050-340 = "(So for some weird reason, the part-timers all gathered in one place, from which you can see the whole stadium.)"
10043050-344 = "(I'm pretty sure that means...)"
10043050-352 = "Sumire! Sensei! Are you there? The culprit just called again!"
10043050-353 = "They gave us the usual blah-blah-blah and hung up..."
10043050-355 = "But thanks to that, I think we got a lead on where they are!"
10043050-356 = "[s] \"Really?!\""
10043050-357 = "Awesome, Rei! What's the lead?"
10043050-358 = "The reception quality. See, while they were talking, I was going around the stands..."
10043050-359 = "...and depending on where I was, the call either got clearer or noisier!"
10043050-360 = "So if we play hot-and-cold with that..."
10043050-365 = "...we'll find them that way. Good job, Rei."
10043050-366 = "[s] \"Well, we know what to do, then...\""
10043050-367 = "Yes, Trainer."
10043050-368 = "Next call with the culprit, we keep them on as long as possible..."
10043050-370 = "...and we track 'em down!"

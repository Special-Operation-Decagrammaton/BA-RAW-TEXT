[translation]
10043050-1 = "第5話;重要的是不屈不撓的心"
10043050-3 = "原來如此……莉同學現在需要暫時休息一下啊。"
10043050-4 = "[s]「嗯……從各方面來說，情況都很艱難。」"
10043050-5 = "要仔細觀察每位觀眾，尋找是否有可疑的跡象……"
10043050-6 = "這對體力和精神都是相當大的考驗。#n我完全可以理解。"
10043050-7 = "[s]「堇不要緊嗎？」"
10043050-8 = "不必擔心。我對體力方面還算有自信。"
10043050-9 = "話說老師來得正好。#n我已經觀察到一些可疑人物，也想好該怎麼利用現在的角色和打扮……"
10043050-10 = "去接近那些人了！"
10043050-11 = "我們走吧！"
10043050-20 = "首先是那邊那位觀眾。"
10043050-26 = "第三球揮棒落空……球種是直球……"
10043050-27 = "第四球……壞球……球種是指叉球……"
10043050-33 = "第五球打擊……中外野飛球……這樣打者的打擊率是……"
10043050-34 = "同時投手的防禦率是……"
10043050-39 = "指導員，你看到了嗎？#n那個人一直在用平板記錄著什麼。"
10043050-40 = "[s]「這……確實不太尋常呢。」"
10043050-41 = "是啊，在不太了解棒球的我眼裡……"
10043050-42 = "詳細記錄攻守雙方所有資訊的行為，實在有點奇怪。"
10043050-43 = "那麼，我去去就回。"
10043050-44 = "嗯？我打算做什麼？#n請不必擔心，指導員。現在的我只是個工讀生而已。"
10043050-47 = "計算OPS的話……"
10043050-52 = "你好～請問需要來杯飲料嗎？"
10043050-53 = "唔哇！？#n什，什麼嘛，原來是賣飲料的啊？"
10043050-54 = "這麼說來……一直在專心做記錄，連口渴了都沒注意到。#n麻煩給我一杯吧。"
10043050-55 = "好的，請慢用。"
10043050-61 = "下一位打者登上打擊區……然後……"
10043050-62 = "請問這是在記錄什麼呢？"
10043050-63 = "這個嗎？唔嗯……沒什麼啦。#n就只是選手的打擊率、投手的球種、擊球的品質和結果……之類的東西而已。"
10043050-64 = "問我為什麼要記錄這些？"
10043050-65 = "……"
10043050-66 = "關你什麼事啊！打工仔就專心打工！"
10043050-70 = "（指導員，你看到了嗎？）"
10043050-71 = "[s1]（……的確有必要調查一下）\n[s2]（但不要太粗暴哦……！）"
10043050-74 = "（是，指導員！）"
10043050-81 = "可惡……！我那把比賽資訊即時上傳到運彩網站海薛一筆的計畫啊……！"
10043050-86 = "不只瀏覽未經許可的網站，甚至還想操縱網站上的輿論嗎……"
10043050-87 = "少囉嗦！身為球迷，這麼做也很合理吧……大概。"
10043050-88 = "這點我恐怕無法同意。"
10043050-89 = "有球迷才會有選手──有選手才能吸引球迷。"
10043050-90 = "運動之所以能發展成一種文化，粉絲們的支持固然很重要沒錯……#n不過即便是粉絲，也有應該遵守的底線！"
10043050-91 = "否則就跟沒有會員要來的健身房一樣，只是擺著健身器材的空間而已！"
10043050-92 = "呿……！我不想聽你說這種無聊的大道理！"
10043050-97 = "雖然阻止了一個走偏了的球迷……"
10043050-98 = "不過我似乎搞錯對象了。#n他並不是我們要找的犯人。"
10043050-99 = "[s]「沒，沒關係……那個人的行為的確不值得鼓勵……！」"
10043050-100 = "謝謝你願意這樣安慰我，指導員。"
10043050-101 = "不過我還沒放棄。#n因為一旦放棄，肌肉就會停止成長！"
10043050-102 = "下一個目標是這裡！"
10043050-107 = "上吧！戰鬥吧！贏得最後的勝利！"
10043050-108 = "敲響勝利之鼓！我們為你撐腰！"
10043050-114 = "[ns]「這不是普通的應援團嗎！？」"
10043050-115 = "不，指導員。#n我們必須時刻對所有事情保持警惕。"
10043050-116 = "雖然從表面上來看，他們的確只是敲擊太鼓為選手加油的應援團……"
10043050-117 = "實際上很可能是某個祕密組織，正透過鼓聲以摩斯密碼發送密報！"
10043050-121 = "（原本以為這絕對是堇的過分解讀……）"
10043050-126 = "你，你怎麼會知道我們自稱柯基粉，偷偷把暗號用摩斯密碼傳出去！？"
10043050-131 = "因為我為了向密碼破解社團的成員們推廣訓練，#n曾經選修過摩斯密碼的通識課啊！"
10043050-132 = "[s3]「真的假的！？」\n[s4]「結果還是為了推廣訓練嗎！？」"
10043050-135 = "雖然跟最初的猜想略有差異……#n不過作為同樣涉獵「運動」的人，我有些話實在不吐不快。"
10043050-136 = "勝負之所以具有崇高的價值，正是因為建立於正當規則之上的默契和共識。"
10043050-137 = "如果以某種手段將其扭曲，最終連勝利的價值都將被破壞殆盡。"
10043050-138 = "而共同維護這些默契和共識的，也許就是人們所謂的「運動家精神」吧。"
10043050-143 = "雖然是這樣沒錯……但老實說我也很害怕。"
10043050-144 = "萬一今天真的輸給勇士隊怎麼辦……"
10043050-145 = "如果被從來沒有輸過的對手擊敗的話，我實在沒有勇氣承擔這樣的結果……"
10043050-146 = "畢竟球是圓的，局勢隨時都有可能忽然逆轉……"
10043050-147 = "[s5]「沒有人不喜歡贏。」\n[s6]「想迴避『變數』也是人的一種本能。」"
10043050-151 = "[ns7]「但正是因為這些變數與難以預料的結果……」\n[ns8]「『運動』才會讓我們如此著迷吧。」"
10043050-155 = "……"
10043050-157 = "對不起……是我們錯了……"
10043050-159 = "嗯，這樣就夠了。"
10043050-160 = "如果這一切都是因為「球迷的愛」過於熾熱所引起……"
10043050-161 = "之後有空的話……要不要來我們千年訓練中心，一起揮灑這份無處宣洩的熱情呢？"
10043050-162 = "[s]「沒想到堇這麼有推銷的天分……」"
10043050-166 = "嗯？指導員這句話的意思是……？"
10043050-169 = "雖然這次也歪打正著，結果還是與犯人無關……"
10043050-170 = "實在不容易呢，指導員。"
10043050-171 = "[s]「努力搜查是好事，但下次還是別太輕易下定論比較好……！」"
10043050-172 = "是……指導員。我也正在反省。"
10043050-173 = "幸好棒球場本就鑼鼓喧天，因此幾乎沒有人留意到暗號的存在。"
10043050-174 = "真是……讓人不由得發自內心讚嘆呢。"
10043050-175 = "[s]「你說的讚嘆是指……這些吶喊聲嗎？」"
10043050-176 = "嗯？沒有，我只是純粹感到佩服而已。"
10043050-177 = "……不好意思，指導員。#n我似乎不太擅長拐彎抹角或說場面話。"
10043050-180 = "身旁的人也經常說我對每件事都過於認真。"
10043050-181 = "假如我的個性能夠更圓滑溫和，在別人眼中更有魅力的話……"
10043050-182 = "或許就能展現出另一種面貌，拉近跟某人的距離了吧。"
10043050-185 = "[ns9]「我覺得堇現在這樣也很好哦。」\n[ns10]「世上也需要像堇這樣的人。」"
10043050-188 = "謝謝你，指導員。"
10043050-189 = "呵呵……指導員總是會用悅耳的話來回應我呢。"
10043050-193 = "啊……那個，剛才那只是玩笑話而已。#n如果指導員聽了覺得不舒服或奇怪的話，我先向你道歉。"
10043050-194 = "沒關係是嗎？#n嗯，那就好。"
10043050-195 = "……"
10043050-196 = "說回剛才的話題吧。#n一支屢戰屢敗、本應灰心喪志卻仍堅持挑戰自我的球隊……"
10043050-197 = "以及陪著這支球隊一路走來的球迷，都讓我打從心底感到敬佩。"
10043050-198 = "那個，指導員。"
10043050-202 = "不……「老師」。"
10043050-203 = "[s] 「……！？」"
10043050-205 = "[ns]（決定靜靜地聽堇說下去）"
10043050-206 = "突然說這種話，老師可能會覺得我很奇怪……"
10043050-207 = "不過我並不討厭越挫越勇的人，也不討厭引導他們繼續挑戰的人。"
10043050-208 = "畢竟我自己也勉強算是個「指導員」……怎麼可能會討厭呢？"
10043050-209 = "不過話又說回來，所謂的「訓練」究竟是什麼呢？"
10043050-210 = "[s]「堇是怎麼想的呢？」"
10043050-214 = "……"
10043050-215 = "人類是種矛盾的存在。"
10043050-216 = "當下想做的事與自己真正想成為的樣子，往往截然不同。"
10043050-217 = "身為一名指導員，我對這種事再清楚不過了。"
10043050-220 = "舉例來說，現在有個人正打算減肥。"
10043050-221 = "然而在執行飲食控制的過程中，難免會讓人感到疲乏……#n甚至出現折磨、無力、煎熬、痛苦的感受。"
10043050-222 = "從那個人的立場來看，他當下最想做的事會是什麼呢？#n我想……或許是吃上一大盤加了大量鮮奶油的奶油起司義大利麵吧。"
10043050-223 = "濃厚香醇的起司、香甜的鮮奶油，以及煎得恰到好處的鹹香培根完美結合在一起……#n想必會非常美味才對。"
10043050-224 = "如果再撒上粗黑胡椒粉的話，更是妙不可言。"
10043050-225 = "[ns]「嗯，聽了連我都想吃了。」"
10043050-226 = "呵呵，是嗎。"
10043050-229 = "吃完麵之後，由於口中還殘留著一些油膩的感覺……#n順帶又點了冰涼清爽的巧克力冰淇淋，作為飯後的甜點。"
10043050-230 = "藉此以巧克力甜中帶苦的味道，洗去口齒間的油膩。"
10043050-231 = "對大部分的人來說，這應該已經足夠感到幸福了吧。"
10043050-232 = "……但與此同時，這也無疑是與理想中那健康又勻稱的身材告別的行為。"
10043050-235 = "人們的意志是非常脆弱的。#n隨時可能會因為任何瑣碎又荒謬的理由而崩潰和瓦解。"
10043050-236 = "我……是個單純的人。#n心思不夠細膩──說難聽點就是固執又呆板。"
10043050-237 = "我也很清楚……自己和訓練部在外人眼中是什麼樣子。"
10043050-238 = "不過即便如此……"
10043050-241 = "有些會員就算前一天已經拚到連手指都抬不起來……"
10043050-242 = "隔天依然會以「無論如何都想堅持下去」的意志力，拖著沈重的身體出現在訓練室。"
10043050-243 = "雖然這種人，通常十個之中只會有一個……"
10043050-246 = "但如果能夠好好珍惜，協助他離自己的目標更近一步的話……"
10043050-247 = "我認為那真的是件非常棒的事。"
10043050-248 = "說了這麼多，結論就跟我剛才提過的一樣。"
10043050-249 = "我並不討厭越挫越勇的人，也不討厭引導他們繼續挑戰的人。"
10043050-250 = "或者說我反而很喜歡，甚至沒辦法不喜歡這樣的人。"
10043050-251 = "而從這個意義上來說……我也喜歡著老師。"
10043050-252 = "[s]「咦，咦咦！？」"
10043050-253 = "呵呵。為什麼要這麼驚訝呢？"
10043050-258 = "「指導員」。"
10043050-262 = "（總覺得應該要說聲謝謝，卻不知為何遲遲說不出口）"
10043050-263 = "（就在視線被堇的眼神牢牢吸引的時候……）"
10043050-268 = "嗯？賣飲料的工讀生！可以麻煩你一下嗎！"
10043050-269 = "這附近的工讀生全都不見了，只能找你買飲料了！"
10043050-273 = "咦？你說這附近的工讀生……？"
10043050-274 = "[s]「全都不見了？」"
10043050-275 = "啊，現在不是想這個的時候。#n來，這邊是你的飲料。請在退冰之前及時享用哦。"
10043050-279 = "非常謝謝你！"
10043050-283 = "呼，總算得救了。#n比賽明明才比到一半，工讀生就全都不見人影，差點就把我渴死了。"
10043050-284 = "請問你還記得……大概從什麼時候開始沒看到工讀生的嗎……？"
10043050-285 = "唔嗯，是一局上半還是二局上半呢……#n總之大概就是賽況剛開始熱起來的時候。"
10043050-286 = "原來如此。#n明明飲料的需求會隨著氣氛的熱烈程度而提高，工讀生們卻在這時不知去向……"
10043050-287 = "你怎麼看呢，指導員？"
10043050-288 = "嗯，我也認為這確實很不尋常。#n要是能打聽出那些工讀生的去向……"
10043050-293 = "呼啊……有點累了呢。#n光顧著應援，就連一口水都沒喝……"
10043050-297 = "[ns]「花繪？又見面了呢。」"
10043050-298 = "咦？"
10043050-299 = "老師！"
10043050-303 = "原來如此！堇同學在負責提供飲料給大家喝啊！"
10043050-304 = "是的，花繪同學。#n你口渴了對吧？請稍等一下。"
10043050-309 = "（咕嚕，咕嚕……）#n謝謝！我剛好覺得有點累了呢！"
10043050-310 = "託你的福，我又打起精神了！感覺有力氣繼續應援了！"
10043050-311 = "為大家帶來救贖的堇同學真了不起！簡直就像救護騎士團一樣！"
10043050-313 = "呵呵。如果能選擇的話，我似乎更想成為將健康帶給大家的健康騎士團呢。"
10043050-314 = "聽起來也很不錯呢！#n不過健康騎士團是什麼意思？"
10043050-318 = "咦？說到飲料……"
10043050-319 = "我發現其他工讀生……好像不知道為什麼都集中在某個地方耶。"
10043050-323 = "！！！"
10043050-324 = "[s]「花繪，可以告訴我們是哪裡嗎？」"
10043050-325 = "嗯！就是那邊！"
10043050-330 = "那裡是……？"
10043050-331 = "[s]「捕手後方的座位……？」"
10043050-332 = "嗯！我覺得在那裡應援一定很讚！"
10043050-333 = "只要站在那裡，就有種能把整個球場盡收眼底的感覺！"
10043050-340 = "（工讀生都集中在可以看到整座球場的地方……）"
10043050-344 = "（也就是說……？）"
10043050-352 = "前輩！老師！你們在嗎？#n犯人不久前又來電了！"
10043050-353 = "雖然還是老樣子，說了一些莫名其妙的話就掛斷了……"
10043050-355 = "不過多虧了這通電話，我大概能掌握犯人所在位置的範圍了！"
10043050-356 = "[s]「真的嗎，莉！？」"
10043050-357 = "你真厲害，莉同學。#n不過是怎麼辦到的……？"
10043050-358 = "線索就是訊號的強度！#n我一邊在觀眾席四處走動，一邊跟犯人通訊……"
10043050-359 = "因為雜訊會隨著我的移動而增減……"
10043050-360 = "只要利用這一點，往雜訊減少的方向尋找的話……！"
10043050-365 = "犯人遲早會無所遁形。#n做得好，莉同學。"
10043050-366 = "[s]「那麼，我們現在要做的就是……！」"
10043050-367 = "嗯，指導員。"
10043050-368 = "下次跟犯人通訊的時候，要盡可能拖延時間……"
10043050-370 = "直到找出犯人的所在位置！"

10043050-332 = "ค่ะ! ฉันว่าถ้าได้ไปเชียร์ตรงนั้นก็น่าจะดีเลยค่ะ"
10043050-333 = "ถ้าอยู่ตรงนั้นก็น่าจะเห็นสนามกีฬาได้เต็มตาเลย!"
10043050-340 = "(เหมือนพนักงานพาร์ทไทม์เจาะจงไปแจกเครื่องดื่มในที่ที่เห็นได้ทั้งสนามกีฬาเลยนะคะ)"
10043050-344 = "(และนั่นก็หมายความว่า...?)"
10043050-352 = "รุ่นพี่! คุณครู! อยู่ตรงโน้นใช่มั้ยคะ? เมื่อกี้คนร้ายเพิ่งโทรเข้ามาอีกรอบค่ะ!"
10043050-353 = "เขาเอาแต่พูดเรื่องเหลวไหลเหมือนทุกครั้งแล้วก็วางสายไป..."
10043050-355 = "แต่การสนทนาล่าสุดทำให้ฉันได้เบาะแสเล็กๆ น้อยๆ มาว่าเขาอยู่ตรงไหนค่ะ!"

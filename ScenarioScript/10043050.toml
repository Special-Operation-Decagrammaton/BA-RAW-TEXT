10043050-226 = "ฮุฮุ งั้นเหรอคะ?"
10043050-229 = "แต่ถ้ากินพาสต้าเสร็จ ก็น่าจะยังรู้สึกเลี่ยนๆ ในปาก งั้นลองคิดว่ากำลังกินของหวานอย่างไอศกรีม#nช็อกโกแลตเย็นๆ สิคะ"
10043050-230 = "ล้างปากด้วยรสหวานอมขมอันเป็นเอกลักษณ์ของช็อกโกแลตจนรู้สึกสดชื่น..."
10043050-231 = "เพียงเท่านี้คนส่วนใหญ่ก็น่าจะรู้สึกมีความสุขแล้วค่ะ"
10043050-232 = "แล้วก็... คงสร้างร่างกายที่แข็งแรงและรูปร่างที่สมดุลอย่างที่ต้องการไม่ได้ด้วยค่ะ"
10043050-235 = "ความตั้งใจอย่างแน่วแน่เป็นสิ่งที่บอบบางค่ะ มันพังทลายลงได้ทุกเมื่อด้วยเหตุผลที่เล็กน้อย และไร้สาระที่สุด"
10043050-236 = "ฉัน... เป็นคนธรรมดาคนหนึ่งค่ะ ฉันไม่ค่อยละเอียดอ่อนเท่าไร และได้ยินคนอื่นบอกบ่อยๆ ว่าฉันเป็นเหมือนเส้นตรง แต่ก็ไปในทางความหมายที่ไม่ดีน่ะค่ะ"
10043050-237 = "ฉันรู้ดีค่ะ... ว่าตัวฉันกับชมรมออกกำลังกายถูกคนภายนอกมองมายังไง"
10043050-238 = "แต่มันก็... นั่นสินะคะ ถึงจะเป็นอย่างนั้น"
10043050-241 = "แต่ที่ฟิตเนสเซ็นเตอร์ก็จะมีสมาชิกที่ออกกำลังกายอย่างหนัก แล้วก็เหนื่อยมากจนแทบขยับนิ้วไม่ได้"

10043050-52 = "1;스미레 아르바이트;08;안녕하세요? 드링크 한 잔 어떠십니까?\n#1;em;[반응]"
10043050-53 = "3;백곰 기록 중인 관중;00;우왓?! 뭐, 뭐야……? 드링크 아르바이트?\n#3;em;[?!]\n#3;shake"
10043050-54 = "3;백곰 기록 중인 관중;00;그러고 보니…… 기록에 너무 열중한 나머지, 목이 마른 것도 잊고 있었네. 한 잔 부탁해.\n#3;stiff"

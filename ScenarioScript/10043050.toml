10043050-274 = "[s] \"หายไปหมดเลยงั้นเหรอ?\""
10043050-275 = "อ๊ะ ไม่ใช่เวลาจะมาถามอยู่สิ นี่ค่ะ ดื่มอะไรเย็นๆ ก่อนนะคะ"
10043050-279 = "ขอบคุณครับ!"

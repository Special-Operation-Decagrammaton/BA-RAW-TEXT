10043050-135 = "3;스미레 아르바이트;99;처음 짐작해 본 것에서는 조금 벗어났습니다만, 비슷한 '스포츠'에 발을 담그고 있는 몸으로서, 이 말은 꼭 해 드리고 싶군요."
10043050-136 = "3;스미레 아르바이트;02;승부의 승패가 가치 있고 고귀한 것은, 그것이 정당한 규칙 위에서 이루어지고 있다는 암묵적인 약속과 합의가 있기 때문입니다.\n#3;em;[반응]"

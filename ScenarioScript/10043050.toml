10043050-62 = "1;스미레 아르바이트;03;뭘 그렇게 기록하고 계시는가요?\n#1;m2"
10043050-63 = "5;백곰 기록 중인 관중;00;이거? 뭐…… 별거 아니야. 선수들 타율, 투수 구종, 타구의 질이나 결과…… 그런 것들이지."

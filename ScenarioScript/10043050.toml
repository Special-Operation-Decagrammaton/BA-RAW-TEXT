[translation]
10043050-1 = "ตอนที่ 5;สิ่งที่สำคัญคือจิตใจที่ไม่ท้อถอย"
10043050-3 = "อย่างนี้นี่เอง... ฉันว่าเรย์น่าจะต้องพักผ่อนสักหน่อยนะคะ"
10043050-4 = "[s] \"อืม... นี่เป็นสถานการณ์ที่ลำบากในหลายๆ แง่เลย\""
10043050-5 = "การจับตาดูผู้ชมทุกคนเพื่อหาว่ามีใครจะทำอะไรแปลกๆ หรือเปล่า..."
10043050-6 = "เป็นงานที่ต้องใช้ทั้งพลังกายและพลังใจไม่น้อยเลย ทำได้ดีมากแล้วค่ะเรย์"
10043050-7 = "[s] \"แล้วสึมิเระล่ะ เป็นยังไงบ้าง?\""
10043050-8 = "ฉันยังไหวอยู่ค่ะ ถ้าเป็นเรื่องพลังกายละก็ ฉันมั่นใจอยู่แล้วค่ะ"
10043050-9 = "แต่คุณครูก็มาได้จังหวะพอดีเลยค่ะ ฉันสังเกตเห็นอะไรบางอย่างที่น่าสงสัย แล้วฉันก็คิดไว้แล้วว่า#nจะใช้ประโยชน์จากหน้าที่และชุดของฉัน..."
10043050-10 = "แล้วเข้าหาคนพวกนั้นยังไงดี!"
10043050-11 = "เอาละ ไปกันเถอะค่ะ!"
10043050-20 = "เริ่มจากคนที่อยู่ตรงโน้นเลยค่ะ"
10043050-26 = "ลูกที่ 3 ตีไม่โดน... ประเภทลูก ลูกตรง..."
10043050-27 = "ลูกที่ 4... ลูกขว้างแบบสปลิตเตอร์..."
10043050-33 = "ลูกที่ 5 ตีโดน... ลอยไปกลางสนาม... ทำให้เปอร์เซ็นต์การตีลูกของแบตเตอร์เป็น..."
10043050-34 = "แล้วการขว้างเสียเฉลี่ยของพิชเชอร์ก็..."
10043050-39 = "เห็นมั้ยคะ เทรนเนอร์? คนนั้นกำลังจดอะไรในแท็บเล็ตของตัวเองอยู่ค่ะ"
10043050-40 = "[s] \"แบบนี้มัน... ไม่ปกติจริงด้วย\""
10043050-41 = "ใช่มั้ยล่ะคะ ขนาดฉันไม่ค่อยรู้เรื่องเบสบอลมากเท่าไรยังคิดแบบนั้นเลยค่ะ"
10043050-42 = "ฉันว่าการจดข้อมูลทั้งฝ่ายรุกและฝ่ายรับมันดูแปลกๆ ยังไงชอบกล"
10043050-43 = "งั้นฉันขอตัวไปดูก่อนนะคะ"
10043050-44 = "คะ? ฉันคิดจะทำอะไรน่ะเหรอคะ? ไม่ต้องห่วงนะคะ เทรนเนอร์ ตอนนี้ฉันคือพนักงานพาร์ทไทม์ค่ะ"
10043050-47 = "แล้วถ้าคำนวณค่า OPS ละก็..."
10043050-52 = "สวัสดีค่ะ รับเครื่องดื่มสักแก้วมั้ยคะ?"
10043050-53 = "หืม?! อะ... อะไรเนี่ย...? เด็กพาร์ทไทม์ขายเครื่องดื่มเหรอ?"
10043050-54 = "จะว่าไป... ฉันมัวแต่จดจ่อกับการบันทึกข้อมูลจนลืมไปเลยว่าตัวเองคอแห้งอยู่ งั้นขอแก้วหนึ่งนะ"
10043050-55 = "ค่ะ นี่ค่ะ เชิญดื่มเลยค่ะ"
10043050-61 = "แบตเตอร์คนต่อไปมาแล้ว... แล้วก็..."
10043050-62 = "ตั้งใจจดบันทึกอะไรขนาดนั้นเหรอคะ?"
10043050-63 = "นี่น่ะเหรอ? ก็... ไม่ใช่อะไรมากหรอก ก็พวกเปอร์เซ็นต์การตีลูก ประเภทของลูกที่ขว้างออกไป คุณภาพและผลลัพธ์ของลูกที่ตีได้... อะไรประมาณนี้น่ะ"
10043050-64 = "ทำไมฉันถึงจดอะไรแบบนี้น่ะเหรอ?"
10043050-65 = "......"
10043050-66 = "ไม่ต้องสนใจหรอกน่า! สนใจงานพาร์ทไทม์ของตัวเองไปนู่น ไปตั้งใจทำงานเถอะ!"
10043050-70 = "(เทรนเนอร์ เห็นหรือเปล่าคะ?)"
10043050-71 = "[s1] (ต้องสืบอย่างเนียนๆ แล้วละ...)\n[s2] (ต้องสืบต่อแล้วละ แต่อย่าให้โจ่งแจ้งนะ...)"
10043050-74 = "(ได้ค่ะ เทรนเนอร์!)"
10043050-81 = "อึก...! แผนอัปโหลดข้อมูลการแข่งขันแบบเรียลไทม์ในเว็บไซต์เดิมพันกีฬาแล้วรับคะแนนของฉัน...!"
10043050-86 = "นอกจากโพสต์ลงเว็บไซต์ที่ไม่ได้รับอนุญาตแล้ว ยังพยายามบิดเบือนความคิดเห็นในนั้นตามใจอีก#nเหรอคะ..."
10043050-87 = "โธ่เอ๊ย! คนเป็นแฟนเบสบอล ทำแบบนี้มันเรื่องธรรมดาน่า! คิดว่างั้นนะ..."
10043050-88 = "แต่ฉันไม่คิดว่ามันถูกต้องนะคะ"
10043050-89 = "นักกีฬาอยู่ได้ก็เพราะแฟนๆ แล้วแฟนๆ ก็มารวมตัวกันเพราะนักกีฬา"
10043050-90 = "ถ้าจะทำให้กีฬาเติบโตเป็นวัฒนธรรมแล้ว พลังของแฟนๆ เป็นสิ่งที่สำคัญที่สุด และอย่างน้อยเราก็ต้องให้เกียรติและเคารพแฟนๆ เหล่านั้นไม่ใช่เหรอคะ!"
10043050-91 = "ลองเปรียบเทียบดูนะคะ ฟิตเนสเซ็นเตอร์ที่ไม่มีคนมาเล่น ก็ไม่ต่างจากสถานที่เก็บอุปกรณ์ออกกำลัง#nกายหรอกค่ะ!"
10043050-92 = "อึก...! อย่ามาพูดอะไรที่ฉันเถียงไม่ออกสิ!"
10043050-97 = "ฉันปรับทัศนคติของแฟนกีฬาที่ใช้กีฬาในทางที่ผิดมาแล้วค่ะ..."
10043050-98 = "แต่สุดท้ายแล้วเหมือนฉันจะคิดผิดไปนะคะ เขาไม่ใช่คนร้ายที่เรากำลังตามหาค่ะ"
10043050-99 = "[s] \"ไม่เป็นไรหรอก... ยังไงเขาก็ทำตัวแปลกเองนี่เนอะ...?\""
10043050-100 = "ขอบคุณที่พูดแบบนั้นนะคะ เทรนเนอร์"
10043050-101 = "แต่ฉันยังไม่ถอดใจหรอกค่ะ ถ้าเรายอมแพ้ กล้ามเนื้อก็จะหยุดพัฒนาค่ะ!"
10043050-102 = "จุดต่อไปที่ฉันสงสัยคือตรงนี้ค่ะ!"
10043050-107 = "ลุยเลย! สู้เขา! แล้วเอาชัยชนะมาให้ได้!"
10043050-108 = "นี่คือกลองแห่งชัยชนะ! กลองดี แมวตีก็ดัง!"
10043050-114 = "[ns] \"ก็แค่กองเชียร์ทั่วไปหรือเปล่า?!\""
10043050-115 = "ไม่ใช่หรอกค่ะ เทรนเนอร์ เราต้องใส่ใจกับทุกรายละเอียดสิคะ"
10043050-116 = "ถ้ามองอย่างผิวเผิน พวกเขาก็เหมือนกองเชียร์ที่ส่งกำลังใจด้วยเสียงกลองค่ะ..."
10043050-117 = "แต่การตีกลองนั่นอาจเป็นวิธีการส่งข้อความลับผ่านรหัสมอร์สของสมาคมลับอะไรก็ได้นะคะ!"
10043050-121 = "(คุณครูคิดว่าสึมิเระเข้าใจอะไรผิดไปมาก แต่ว่า...)"
10043050-126 = "ดะ... ได้ยังไงกัน? รู้ได้ยังไงว่าพวกเราแสร้งเป็นแฟนทีมคอร์กี้แล้วใช้รหัสมอร์สเพื่อแอบอ่านสัญญาณ#nการเล่นของพวกเขาแล้วส่งให้ทีมเราน่ะ!"
10043050-131 = "ฉันอยากไปเทรนให้สมาชิกชมรมถอดรหัส ก็เลยลงวิชารหัสมอร์สเป็นวิชาเลือกค่ะ!"
10043050-132 = "[s3] \"จริงเหรอเนี่ย?!\"\n[s4] \"สุดท้ายก็ทำเพื่อเผยแพร่การเทรนนิ่งเหรอ!\""
10043050-135 = "มันอาจแตกต่างจากสิ่งที่ฉันเดาไว้ตอนแรกนิดหน่อย แต่ในฐานะคนที่อยู่ในวงการ 'กีฬา' เหมือนกัน ฉันก็อยากพูดอย่างนี้สักหน่อยค่ะ"
10043050-136 = "การที่ผลแพ้ชนะมีคุณค่าและน่าชื่นชม ก็เพราะเราแข่งขันกันภายใต้กฎกติกาที่ยุติธรรมยังไงล่ะคะ"
10043050-137 = "แต่ถ้าคุณบิดเบือนมันด้วยวิธีนี้ละก็ สุดท้ายแล้วชัยชนะที่ได้ก็จะไร้คุณค่านะคะ"
10043050-138 = "แฟนกีฬาก็ต้องมีน้ำใจนักกีฬาเหมือนกันค่ะ"
10043050-143 = "มันก็... จริงอยู่หรอก แต่บอกตามตรงว่าพวกฉันก็กลัวอยู่เหมือนกัน"
10043050-144 = "ลองคิดดูสิ สมมติเบรฟส์ชนะขึ้นมาได้ แล้วต่อไปจะเป็นยังไง..."
10043050-145 = "ที่ผ่านมาทีมพวกฉันชนะมาตลอดเลยนะ ถ้าแพ้ให้เบรฟส์ขึ้นมาสักครั้ง พวกฉันรับมือกับเรื่องที่จะตาม#nมาไม่ไหวหรอก..."
10043050-146 = "เราวางใจอะไรกับลูกเบสบอลกลมๆ ไม่ได้หรอก เหตุการณ์ที่ไม่คาดคิดเกิดขึ้นได้ทุกเมื่อนั่นละ..."
10043050-147 = "[s5] \"เราก็ไม่คาดคิดเหมือนกันว่าจะมีการโกงแบบนี้\"\n[s6] \"แต่ 'กีฬา' ที่แท้จริงควรเล่นอย่างยุติธรรมสิ\""
10043050-151 = "[ns7] \"ยอมรับผลที่เกิดจากลูกเบสบอลกลมๆ นั่นเถอะ\"\n[ns8] \"ให้เกียรติลูกเบสบอลและนักกีฬาในสนามเถอะ\""
10043050-155 = "......"
10043050-157 = "ขอโทษนะ... พวกเราทำผิดไปแล้ว..."
10043050-159 = "ค่ะ ถ้ารู้ตัวและสำนึกก็ดีแล้วค่ะ"
10043050-160 = "ถ้าทั้งหมดนี้เป็นเรื่องที่เกิดจาก 'ความคลั่งไคล้ที่ร้อนแรงเกินไปของแฟนเบสบอล' ละก็..."
10043050-161 = "ไว้คราวหน้าลองแวะมาที่ฟิตเนสเซ็นเตอร์ของมิลเลเนียม แล้วมาปลดปล่อยความคลั่งไคล้นี้ดูสิคะ"
10043050-162 = "[s] \"สึมิเระ ขายของเก่งอยู่นะเนี่ย...\""
10043050-166 = "คะ? พูดแบบนั้นหมายความว่ายังไงคะ เทรนเนอร์?"
10043050-169 = "ถึงการคาดเดาของฉันจะไม่ผิด แต่สุดท้ายพวกเขาก็ไม่ใช่คนร้ายอยู่ดี"
10043050-170 = "งานนี้ไม่ง่ายเลยนะคะ เทรนเนอร์ ไม่ง่ายเลยค่ะ"
10043050-171 = "[s] \"การช่างสังเกตมันก็ดีอยู่หรอกนะ แต่อย่าด่วนสรุปดีกว่า...\""
10043050-172 = "ค่ะ... เทรนเนอร์ ฉันก็รู้สึกผิดในส่วนนั้นอยู่ค่ะ"
10043050-173 = "ยังไงก็ค่อยยังชั่วนะคะที่ในสนามเบสบอลอึกทึกครึกโครมเป็นทุนอยู่แล้ว ก็เลยไม่มีใครสนใจอะไรเท่าไร"
10043050-174 = "เฮ้อ... อดไม่ได้ที่จะรู้สึกประทับใจไปด้วยนะคะ น่าทึ่งมากๆ เลยละ"
10043050-175 = "[s] \"ประทับใจกับ... ความวุ่นวายและการเชียร์ของผู้ชมน่ะเหรอ?\""
10043050-176 = "คะ? ฉันแค่รู้สึกทึ่งเฉยๆ ค่ะ"
10043050-177 = "อืม... ขอโทษนะคะ เทรนเนอร์ ฉันน่าจะไม่เก่งเรื่องการพูดอ้อมๆ หรือเลี่ยงประเด็นน่ะค่ะ"
10043050-180 = "ฉันรู้ดีค่ะว่าหลายครั้งคนอื่นก็มองว่าฉันจริงจังเกินไปกับทุกเรื่องโดยไม่จำเป็น"
10043050-181 = "ถ้าฉันมีบุคลิกที่ผ่อนคลาย อ่อนโยน และน่าดึงดูดใจคนอื่นมากกว่านี้สักหน่อยก็คงจะดี..."
10043050-182 = "ถ้าอยู่ในรูปลักษณ์ที่ต่างจากตอนนี้ ฉันคิดว่าตัวเองน่าจะเข้าหาคนอื่นได้ดีกว่านี้น่ะค่ะ"
10043050-185 = "[ns9] \"ครูว่าสึมิเระที่เป็นอยู่ตอนนี้ก็เพียงพอแล้วนะ\"\n[ns10] \"ครูว่าเป็นตัวเองแบบนี้ก็มีเสน่ห์แล้วนะ\""
10043050-188 = "ขอบคุณค่ะ เทรนเนอร์"
10043050-189 = "ฮุฮุ... เทรนเนอร์เป็นคนคิดบวกได้กับทุกเรื่องเลยนะคะ"
10043050-193 = "อ๊ะ... ฉันไม่ได้มีเจตนาจะว่าอะไรนะคะ ถ้าสิ่งที่ฉันพูดทำให้เทรนเนอร์ไม่สบายใจหรือรู้สึกแปลกๆ ฉันขอโทษนะคะ"
10043050-194 = "ไม่เป็นไรงั้นเหรอคะ? ค่ะ งั้นก็โล่งอกไปที"
10043050-195 = "......"
10043050-196 = "กลับมาเรื่องของเราดีมั้ยคะ? ฉันประทับใจกับทีมที่ต่อให้จะแพ้อย่างน่าเสียดายทุกครั้ง แต่ก็ยังพยายามต่อแม้จะหมดกำลังใจหรืออยากยอมแพ้ก็ตาม"
10043050-197 = "แล้วก็ประทับใจแฟนๆ ทุกคนที่ไม่หยุดส่งกำลังใจให้ทีมนั้นด้วยค่ะ"
10043050-198 = "เอาละ เทรนเนอร์"
10043050-202 = "ไม่สิ... 'คุณครูคะ'"
10043050-203 = "[s] \"...?!\""
10043050-205 = "[ns] (ฟังเรื่องของสึมิเระเงียบๆ)"
10043050-206 = "คุณครูอาจคิดว่ามันแปลกที่จู่ๆ ฉันก็หยิบเรื่องนี้ขึ้นมาพูด แต่ว่า..."
10043050-207 = "ฉันไม่ได้เกลียดคนที่พยายามจะลุกขึ้นสู้อีกครั้ง และพยายามที่จะเป็นผู้นำค่ะ"
10043050-208 = "จะไปเกลียดคนแบบนั้นได้ยังไงว่ามั้ยคะ ถ้าจะให้พูดตรงๆ ฉันก็เป็น 'เทรนเนอร์' คนหนึ่งค่ะ"
10043050-209 = "การเทรนนิ่งมันคืออะไรเหรอคะ?"
10043050-210 = "[s] \"แล้วสึมิเระคิดว่ายังไงเหรอ?\""
10043050-214 = "......"
10043050-215 = "มนุษย์เป็นสิ่งมีชีวิต 2 ขั้วค่ะ"
10043050-216 = "หลายครั้งที่สิ่งที่เราอยากทำในตอนนี้แตกต่างกับสิ่งที่ตัวเองอยากเป็นจริงๆ"
10043050-217 = "ฉันเข้าใจประเด็นนั้นมากๆ เพราะฉันก็เป็นเทรนเนอร์ค่ะ"
10043050-220 = "สมมติว่ามีใครบางคนที่เริ่มไดเอต"
10043050-221 = "พอเขาคนนั้นควบคุมอาหารไปเรื่อยๆ แน่นอนว่าต้องเหนื่อยล้าในสักวัน เพราะการไดเอตนั้นลำบาก ไร้รสชาติ ทรมาน และเจ็บปวดด้วย"
10043050-222 = "ลองมาคิดกันมั้ยคะว่าถ้าเป็นเขาคนนั้น สิ่งที่อยากทำทันทีในตอนนี้คืออะไร ลองคิดว่ากำลังกินพาสต้าครีมชีสที่ใส่ครีมสดแสนชุ่มฉ่ำอยู่สิคะ"

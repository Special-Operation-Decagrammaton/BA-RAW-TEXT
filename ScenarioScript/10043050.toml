10043050-298 = "เอ๋?"
10043050-299 = "คุณครู!"
10043050-303 = "นั่นสินะคะ! คุณสึมิเระกำลังแจกจ่ายเครื่องดื่มให้ผู้ชมอยู่สินะคะ!"
10043050-304 = "ใช่แล้วค่ะ คุณฮานาเอะ เมื่อกี้บอกว่าคอแห้งหรือเปล่าคะ? รอฉันเดี๋ยวหนึ่งนะคะ"
10043050-309 = "อึกๆ... ขอบคุณนะคะ! ฉันกำลังเหนื่อยอยู่พอดีเลย!"
10043050-310 = "ตอนนี้ฉันมีแรงแล้วละค่ะ ขอบคุณนะคะ! น่าจะกลับไปเชียร์ได้อีกรอบแล้วค่ะ!"
10043050-311 = "คุณสึมิเระช่วยบรรเทาทุกข์ให้คนในสนามแบบนี้ ถือว่ายอดเยี่ยมจังเลยนะคะ! เหมือนเป็นอัศวินบรรเทาทุกข์เลยค่ะ!"
10043050-313 = "ฮุฮุ ฉันน่าจะเหมาะกับการเป็นอัศวินบรรเทาแคลอรี่มากกว่าค่ะ"
10043050-314 = "แบบนั้นก็ดีเลยนะคะ! ว่าแต่อัศวินบรรเทาแคลอรี่คืออะไรเหรอคะ?"
10043050-318 = "เอ๋? จะว่าไป เมื่อกี้คุณพูดถึงเครื่องดื่ม..."
10043050-319 = "ฉันรู้สึกเหมือนพนักงานพาร์ทไทม์คนอื่นๆ พากันเดินไปแจกเครื่องดื่มอยู่จุดเดียวเลยค่ะ"
10043050-323 = "!!!"

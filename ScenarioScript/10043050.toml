10043050-86 = "3;스미레 아르바이트;10;그것도 인가받지 않은 사이트인 데다가, 사이트 여론까지 마음대로 조종하려 했군요……."
10043050-87 = "3;백곰 기록하던 관중;00;쳇! 팬이라면 이 정도는 할 수 있는 일이라고! ……아마도.\n#3;hophop"

10043050-1 = "#title;제5화;중요한 것은 꺾이지 않는 마음"
10043050-2 = "3;스미레 아르바이트;02\n#3;em;…\n#3;a\n#wait;2500"
10043050-3 = "3;스미레 아르바이트;99;그렇군요……. 레이 양에게는 잠깐의 휴식이 필요한 상황이군요."
10043050-4 = "[s] \"응……. 아무래도 여러모로 힘든 상황이니까.\""
10043050-5 = "3;스미레 아르바이트;00;확실히 무언가 이상한 낌새가 느껴지지 않는지, 모든 관중을 하나하나 지켜보는 것은……."
10043050-6 = "3;스미레 아르바이트;02;체력적으로도 정신적으로도, 무리가 가는 일이겠지요. 충분히 그럴 수 있는 일입니다."
10043050-7 = "[s] \"스미레는 괜찮아?\""
10043050-8 = "3;스미레 아르바이트;03;저는 아직 괜찮습니다. 체력 쪽으로는 어느 정도 자신이 있는 몸이기도 하고요.\n#3;em;[반응]"
10043050-9 = "3;스미레 아르바이트;99;마침 잘 오셨습니다. 이미 수상해 보이는 몇몇 요소들을 관찰해 두었거든요. 그리고 지금의 제 역할과 복장을 이용해……."
10043050-10 = "3;스미레 아르바이트;07;그 사람들에게 어떻게 접근하면 좋을지도, 생각해 두었습니다!\n#3;em;[반짝]\n#3;greeting"
10043050-11 = "3;스미레 아르바이트;08;자, 가시죠!\n#3;m4"

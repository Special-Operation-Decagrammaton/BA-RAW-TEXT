10043050-243 = "ต่อให้จะมีสมาชิกแบบนี้แค่ 1 คนจาก 10 คนก็เถอะค่ะ"
10043050-246 = "แต่ถ้าฉันให้ความสำคัญกับคนคนนั้น และช่วยให้เขาบรรลุเป้าหมายที่ตัวเองอยากเป็นได้..."
10043050-247 = "ฉันคิดว่าเพียงเท่านี้ก็ดีเพียงพอแล้วค่ะ"
10043050-248 = "สุดท้ายแล้วฉันก็พูดเรื่องเดิมซ้ำแล้วซ้ำอีกนะคะ"
10043050-249 = "ฉันไม่ได้เกลียดคนที่พยายามจะลุกขึ้นสู้อีกครั้ง และพยายามที่จะเป็นผู้นำค่ะ"

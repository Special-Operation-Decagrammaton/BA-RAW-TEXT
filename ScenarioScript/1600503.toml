[translation]
1600503-1 = "於夏天海邊的遊玩方式"
1600503-2 = "啊，老師。恭候多時了。"
1600503-3 = "請，請問怎麼會突然要來找我呢……？"
1600503-4 = "[s1] 「我想讓海邊熱鬧起來。」\n[s2] 「只要場面變得熱鬧愉快，人潮就會變多了吧。」"
1600503-5 = "那，那個……！？"
1600503-6 = "那，那個……！？"
1600503-7 = "……？"
1600503-8 = "老師……這些東西又是……？"
1600503-9 = "[s3] 「用得上的我全帶來了！」\n[s4] 「海灘球、游泳圈、陽傘、飛盤……」"
1600503-10 = "咦！這，這麼多……"
1600503-11 = "咦！這，這麼多……"
1600503-12 = "或，或許是我自作多情，但這莫非……是為了我……？"
1600503-13 = "不，不會，怎麼會困擾呢……！不會的……！？"
1600503-14 = "非，非常感謝老師……"
1600503-15 = "……這下，我……"
1600503-16 = "該怎麼答謝老師才好呢……"
1600503-17 = "……咦？"
1600503-18 = "只要玩的開心就可以了嗎……？"
1600503-19 = "這，這樣啊。既然老師這麼說的話……那我知道了。"
1600503-20 = "敝人弦生，將會盡己所能……！"
1600503-21 = "全力以赴玩得開心！！"
1600503-22 = "（……）"
1600503-23 = "（看來她沒有理解「玩」的意思，但現在先忽略這塊吧）"
1600503-25 = "（總之先張開陽傘，幫泳圈和海灘球充氣，把氣氛營造出來）"
1600503-26 = "（問題就在……）"
1600503-28 = "準，準備好了，老師！我隨時都可以……"
1600503-29 = "[s5] 「好，那我丟過去囉，弦生！」\n[s6] 把海灘球輕輕拋給弦生"
1600503-30 = "（咚）"
1600503-31 = "（咚）"
1600503-32 = "啊，那個……"
1600503-33 = "……桀耶耶耶耶啊啊！！！"
1600503-34 = "[s] 「……？」"
1600503-35 = "（咚哐哐哐哐哐哐！！！！）"
1600503-39 = "哈啊，哈啊，哈啊，哈啊……呼，嗯。"
1600503-40 = "老，老師……我這樣做對嗎……？"
1600503-41 = "啊咧……老師？"
1600503-42 = "……"
1600503-43 = "您，您沒事吧？"
1600503-44 = "[s7] 「沒事，真是好險。」\n[s8] 「地面凹了一個洞……」"
1600503-45 = "對，對不起……"
1600503-46 = "對，對不起……"
1600503-47 = "咦？再一次嗎……？真的不要緊嗎……？"
1600503-48 = "我，我知道了。那再一次……！"
1600503-49 = "（咚）"
1600503-50 = "……嘰呀呀呀呀呀呀！！！"
1600503-52 = "（咻咚哐哐哐哐哐哐！！！！）"
1600503-53 = "（……）"
1600503-54 = "（還是玩別的吧）"
1600503-56 = "真，真是對不起……"
1600503-57 = "感覺……我有很多地方都做錯了……"
1600503-58 = "老師都為了我特地趕來，我卻給老師添麻煩……"
1600503-59 = "[s] 拿出飛盤"
1600503-62 = "老師？這是……？"
1600503-63 = "飛盤……？這，這是要……"
1600503-64 = "我，我應該怎麼做才好？請問這要怎麼玩……"
1600503-65 = "接住之後再送回來就可以了嗎……？那，那感覺我應該辦得到……"
1600503-66 = "而且感覺玩這東西，老師的負擔也不會那麼大……"
1600503-67 = "那就……拜託老師了……！！"
1600503-68 = "[s] 扔出飛盤"
1600503-71 = "……"
1600503-72 = "……嚇哈啊啊啊！！"
1600503-76 = "……老，老師！我拿回來了！"
1600503-77 = "請，請問我這樣做是對的嗎……？"
1600503-78 = "[s9] 「剛才這下明明是個丟超遠的大暴投……」\n[s10] 「弦生也太厲害了……」"
1600503-79 = "真，真的嗎？很高興老師願意誇獎我……"
1600503-80 = "真，真的嗎？很高興老師願意誇獎我……"
1600503-81 = "嗯！玩，玩這東西應該就不會有問題了……！"
1600503-84 = "老師如果不介意的話……可以再玩一次嗎？"
1600503-85 = "[ns] 一時好奇，便試著把飛盤盡全力扔遠遠的，看看極限在哪"
1600503-89 = "（後來和弦生玩飛盤玩了好一段時間）"
1600503-90 = "（全力丟出飛盤，弦生接住飛盤後特別將飛盤用拿的帶回來……#n　雖然感覺和正常的玩法有些不同，但也無所謂了）"
1600503-91 = "哈啊，哈啊……哈啊……"
1600503-92 = "[s] 「弦生辛苦了。要休息一下嗎？」"
1600503-93 = "……嘰嘻，嘰嘻嘻。"
1600503-96 = "― 嘰嘻，桀哈哈哈哈！[wa:1810] "
1600503-99 = "― 啊，對不起……[wa:1410] "
1600503-101 = "― 謝謝您，老師。[wa:2390] "
1600503-104 = "― 能像這樣在海邊玩，這還是頭一次。雖然很開心，[wa:5890] "
1600503-107 = "― 但也比想像中還要耗體力呢……[wa:3090] "
1600503-110 = "― 有點累了。[wa:5390] "
1600503-113 = "― ……對了老師。我突然想起來，[wa:3590] "
1600503-115 = "― 這套泳裝一直都，有點緊……[wa:4960] "
1600503-118 = "― 不知道是不是，尺寸不合呢……[wa:3300] "
1600503-121 = "― 啊，咦咦……您，您怎麼了！？[wa:3050] "
1600503-123 = "― 我，我，我又，做錯了什麼嗎……！？[wa:3980] "

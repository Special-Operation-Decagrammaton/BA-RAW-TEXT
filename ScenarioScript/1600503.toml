[translation]
1600503-1 = "เล่นสนุกในฤดูร้อน"
1600503-2 = "มะ... มาแล้วเหรอคะคุณครู? ฉันรออยู่ที่นี่ตามที่คุณครูบอกเลยค่ะ"
1600503-3 = "ว่าแต่ที่คุณครูพูดเมื่อกี้นี้หมายถึง..."
1600503-4 = "[s1] \"ครูมาช่วยแก้ปัญหาของซึรุกิไง\"\n[s2] \"ซึรุกิเล่นอยู่คนเดียวคงไม่สนุกใช่มั้ยล่ะ?\""
1600503-5 = "ถะ...ถ้าบอกว่าฉันไม่กังวลเรื่องนั้นก็คงจะเป็นการพูดโกหกคุณครู..."
1600503-6 = "ถะ...ถ้าบอกว่าฉันไม่กังวลเรื่องนั้นก็คงจะเป็นการพูดโกหกคุณครู..."
1600503-7 = "หืม?"
1600503-8 = "คุณครู... ถืออะไรมาด้วยเหรอคะ...?"
1600503-9 = "[s3] \"ของสำหรับเล่นสนุกที่ชายหาดไงล่ะ\"\n[s4] \"วอลเลย์บอลชายหาด ห่วงยาง ร่มกันแดด จานร่อน...\""
1600503-10 = "ยะ...อย่างนั้นเหรอคะ"
1600503-11 = "ยะ...อย่างนั้นเหรอคะ"
1600503-12 = "ไม่ทราบว่าของพวกนี้... เตรียมมาเพื่อฉันเหรอคะ?"
1600503-13 = "คะ? อา... คิดว่าฉันกำลังเดินเล่นแบบเซ็งๆ อยู่คนเดียวเหรอคะ?"
1600503-14 = "งะ... งั้นเหรอคะ อืม..."
1600503-15 = "ค่ะ..."
1600503-16 = "ที่จริงก็เป็นแบบนั้นค่ะ คุณครูอุตส่าห์มาหาฉันถึงที่นี่ ฉันซาบซึ้งจนไม่รู้ว่าจะต้องขอบคุณยังไงดี..."
1600503-17 = "คะ...?"
1600503-18 = "แค่ฉันได้เล่นสนุกก็เท่ากับเป็นการตอบแทนแล้วเหรอคะ...?"
1600503-19 = "อืม อย่างนี้นี่เอง เข้าใจแล้วค่ะ..."
1600503-20 = "ฉันไม่รู้ว่าจะทำได้รึเปล่า... แต่ฉันจะพยายามเต็มที่ค่ะ!"
1600503-21 = "จะสนุกให้สุดเหวี่ยงเลยค่ะ!"
1600503-22 = "(...)"
1600503-23 = "(ดูเหมือนจะไม่เข้าใจคำว่าเล่นสนุกเท่าไรเลยนะ)"
1600503-25 = "(คุณครูหยิบร่มกันแดดออกมากาง และสูบลมห่วงยางกับวอลเลย์บอลชายหาดให้ เพียงไม่นาน#nทุกอย่างก็ดูเข้าที่เข้าทาง...)"
1600503-26 = "(แต่ว่ามีปัญหาอยู่หนึ่งอย่าง...)"
1600503-28 = "พะ... พร้อมแล้วค่ะคุณครู! ตีลูกเสิร์ฟมาได้เลยค่ะ"
1600503-29 = "[s5] \"เอาล่ะ รับให้ดีนะ!\"\n[s6] เสิร์ฟวอลเลย์บอลไปทางซึรุกิ"
1600503-30 = "(ตุ้บ...)"
1600503-31 = "(ตุ้บ...)"
1600503-32 = "..."
1600503-33 = "ก๊ากกกก กรั่กๆๆๆ!!"
1600503-34 = "[s] \"...?\""
1600503-35 = "(ป๊าบบบ!!!!  ตู้มมมม!!!)"
1600503-39 = "แฮ่กๆ...แฮ่ก... ฮู่ว"
1600503-40 = "คุณครูคะ...? เล่นแบบนี้ใช่มั้ยคะ ฉันทำถูกรึเปล่าคะ...?"
1600503-41 = "เอ่อ... คุณครูคะ?"
1600503-42 = "..."
1600503-43 = "เป็นอะไรหรือเปล่าคะ!?"
1600503-44 = "[s7] \"ไม่เป็นไรหรอก แต่หวุดหวิดเลยนะ\"\n[s8] \"ลูกตบนั่นทำพื้นเป็นหลุมเลย...\""
1600503-45 = "ขอโทษนะคะ ขอโทษจริงๆ ค่ะ..."
1600503-46 = "ขอโทษนะคะ ขอโทษจริงๆ ค่ะ..."
1600503-47 = "เอ๋? ให้ฉันลองอีกครั้งเหรอคะ? ไม่เป็นไรจริงๆ เหรอคะ?"
1600503-48 = "เอ่อ ก็ได้ค่ะ งั้นฉันจะลองอีกรอบ...!"
1600503-49 = "(ตุ้บ...)"
1600503-50 = "ก๊ากกกก กรั่กๆๆๆ!!"
1600503-52 = "(ป๊าบบบ!!!!  ตู้มมมม!!!)"
1600503-53 = "(...)"
1600503-54 = "(สุดท้ายทั้งคู่ก็ตัดสินใจว่าควรเลิกเล่น)"
1600503-56 = "ขะ... ขอโทษนะคะ..."
1600503-57 = "ฉันรู้สึกเหมือนกับว่า... ไม่มีอะไรเป็นไปเหมือนกับที่ฉันจินตนาการไว้เลย"
1600503-58 = "แถมฉันยังเอาแต่ทำให้คุณครูเดือดร้อน ฉันรู้สึกผิดจากก้นบึ้งของหัวใจเลย..."
1600503-59 = "[s] เอาจานร่อนออกมาแทนลูกวอลเลย์บอล"
1600503-62 = "เอ๋? คุณครูคะ นั่นอะไรเหรอคะ...?"
1600503-63 = "เอ๋? จานร่อนเหรอคะ...?"
1600503-64 = "แล้ว... มันเล่นยังไงเหรอคะ?"
1600503-65 = "อ๋อ... แค่ต้องไปเอามันกลับมาใช่มั้ยคะ? มันก็ไม่ได้ดูยากเท่าไรเลย..."
1600503-66 = "ก็ได้ค่ะ ถ้าเป็นการเล่นแบบนี้คงไม่เป็นภาระให้คุณครูแน่นอนค่ะ"
1600503-67 = "ถะ...ถึงฉันจะน่าอายไปสักหน่อย ตะ...แต่ถ้าคุณครูพร้อมแล้ว ฉันขอรบกวนอีกรอบนะคะ!"
1600503-68 = "[s] ร่อนจานร่อนออกไปไกลๆ อย่างรวดเร็ว"
1600503-71 = "..."
1600503-72 = "กร๊าก กรั่กๆๆ!!"
1600503-76 = "คุณครูคะ...! ฉันไปเอากลับมาแล้วค่ะ!"
1600503-77 = "แต่ว่า... อันนี้มันเล่นแบบนี้จริงๆ เหรอคะ?"
1600503-78 = "[s9] \"วิ่งตามจานร่อนทันแถมไปเอากลับมาได้ด้วย?\"\n[s10] \"ซึรุกินี่ไม่ธรรมดาเลยนะ...\""
1600503-79 = "ยะ... อย่างนั้นเหรอคะ? ถ้าคุณครูพูดแบบนี้ฉันก็สบายใจขึ้นหน่อย..."
1600503-80 = "ยะ... อย่างนั้นเหรอคะ? ถ้าคุณครูพูดแบบนี้ฉันก็สบายใจขึ้นหน่อย..."
1600503-81 = "งั้นฉันว่าถ้าเล่นอันนี้ก็คงไม่มีปัญหาแล้วล่ะค่ะ!"
1600503-84 = "ถ้าคุณครูไม่ว่าอะไร ฉันขอลองอีกครั้งได้มั้ยคะ..."
1600503-85 = "[ns] รับจานร่อนมาจากซึรุกิอีกครั้ง"
1600503-89 = "(หลังจากนั้นคุณครูก็เล่นจานร่อนกับซึรุกิอยู่พักใหญ่)"
1600503-90 = "(ถึงจะรู้สึกว่านี่ไม่น่าจะใช่สิ่งที่คนสองคนจะเล่นด้วยกัน... แต่ก็พยายามมองข้ามมันไป)"
1600503-91 = "แฮ่กๆ... แฮ่กๆ..."
1600503-92 = "[s] \"โอเครึเปล่า? พักก่อนมั้ย?\""
1600503-93 = "คิคิคิ..."
1600503-96 = "― คิกๆ... คิกๆๆๆ[wa:1610] "
1600503-99 = "― อ๊ะ... ขอโทษค่ะ[wa:1090] "
1600503-101 = "― ขอบคุณนะคะ... คุณครู[wa:1870] "
1600503-104 = "― ฉันเพิ่งเคย... มาเที่ยวที่ทะเลเป็นครั้งแรก... มันสนุกดีนะคะ[wa:4410] "
1600503-107 = "― แต่ว่าการมาเที่ยวทะเล... ใช้พลังงานมากกว่าที่คิดอีกนะคะ[wa:1450] "
1600503-110 = "― เฮ้อ... ฉันรู้สึกเหนื่อยนิดหน่อยค่ะ[wa:4190] "
1600503-113 = "― คุณครูคะ... จู่ๆ ฉันก็คิดขึ้นมา...[wa:2790] "
1600503-115 = "― ชุดว่ายน้ำนี่... มันค่อนข้าง... อึดอัดนิดหน่อยค่ะ...[wa:3400] "
1600503-118 = "― หรือว่า ไซซ์มันไม่พอดี... หรือเปล่านะคะ?[wa:2260] "
1600503-121 = "― อะ...เอ๋... ทำไมมองแบบนั้นล่ะคะ?[wa:2330] "
1600503-123 = "― ฉะ... ฉัน... ฉันเผลอทำอะไรผิดไปอีกรึเปล่าคะ...?![wa:2740] "

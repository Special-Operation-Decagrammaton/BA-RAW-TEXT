[translation]
10023060-1 = "第6話;總之先試著前進吧"
10023060-2 = "（喧鬧的第一天結束，來到了第二天）"
10023060-6 = "這就是要在明天的拍賣會上拍賣的畫作啊。#n……我打算參加，你呢？"
10023060-7 = "以為我會因為害怕「慈愛的怪盜」，一個人夾著尾巴逃走嗎？"
10023060-12 = "[ns] （即使發生了昨天那樣的騷動，參加者似乎依然沒有減少）"
10023060-21 = "呼……好累。"
10023060-22 = "[s]「辛苦了，桃井。」"
10023060-23 = "謝謝你，老師……#n好像陷入「都走到這一步了，就算只是爭一口氣也要撐到最後～！」的心情了。"
10023060-24 = "不過……老師，抱歉。"
10023060-25 = "都是因為我。才讓你捲進這麼麻煩的事情。"
10023060-26 = "[s]「沒關係。我反而覺得能跟大家在一起很高興哦。」"
10023060-27 = "……真的嗎？不會後悔嗎？"
10023060-28 = "如果聽到那種話……之後要是再發生同樣的事情，還是會叫老師來的哦！"
10023060-29 = "[s]「嗯，隨時都可以叫我哦。」"
10023060-34 = "！！！"
10023060-35 = "[ns]「桃井……！」"
10023060-36 = "這是！"
10023060-37 = "保持冷靜吧。#n我聽說「慈愛的怪盜」絕對不會做出傷人的行為。"
10023060-38 = "昨天確實也是如此。#n那我們就盡情享受「活動」吧。"
10023060-39 = "雖然很同情明太郎先生操勞的心情……#n但如果把這當成是拍賣會的餘興節目，確實是個不錯的調味料呢。"
10023060-46 = "大家意外地沒有動搖呢。是因為有了昨天的經驗嗎？"
10023060-47 = "那我們也……"
10023060-48 = "[s]「嗯，按照計畫行動吧。」"
10023060-50 = "繪畫就交給我吧。我會把它移動到安全的地方。"
10023060-51 = "我們到上層去吧！"
10023060-57 = "愛麗絲會在中央大廳做好無論「怪盜」何時出現都能進行狙擊的準備！"
10023060-58 = "我，我會躲起來……觀察狀況……"
10023060-59 = "[s]「大家，加油吧！」"
10023060-63 = "……"
10023060-64 = "……"
10023060-66 = "……"
10023060-68 = "為何什麼都沒發生呢！？"
10023060-73 = "（就在這時，腳邊滾來了一顆透明的球體）"
10023060-74 = "（彷彿被吸引了一般拿起珠子……）"
10023060-78 = "貴安，能聽到我的聲音嗎？"
10023060-79 = "[s]「是誰……？」"
10023060-81 = "這是我的小道具。有件無論如何都想偷偷告訴您的事……#n我會壓低音量以免被周圍的人聽見，還請您專心聽。"
10023060-82 = "[s]「難道你是……？」"
10023060-83 = "啊啊，問候就留到下次吧。"
10023060-84 = "時間所剩不多──我就開門見山地說了。#n您正受人欺騙。"
10023060-85 = "[s]「被騙……是被誰騙呢？」"
10023060-86 = "……您還帶著預告信嗎？#n請您仔細回想。謎題應該還有剩才對──"
10023060-87 = "──啊啊，雖然遺憾，對話就到此為止了。#n我就先行一步，在該處等候您的到來。"
10023060-88 = "是要在明知被欺騙的情況下逃避現實──#n還是要不顧危險找出真相呢。"
10023060-89 = "人生就是不斷選擇的過程──對吧？"
10023060-93 = "[ns]「被切斷了……」"
10023060-98 = "照明好像恢復了！"
10023060-99 = "「慈愛的怪盜」……#n哦？沒看到人呢。"
10023060-100 = "那麼真的只是單純的停電嗎？"
10023060-101 = "或者也可能是在剛才那短暫的時間裡發生了攻防戰。"
10023060-107 = "老師，怎麼了？"
10023060-108 = "[s]「桃井，可以集合大家嗎？」"
10023060-109 = "咦？可是……警備任務該怎麼辦呢？"
10023060-110 = "[s]「我打算說的就是這件事。」"
10023060-115 = "老師，那是真的嗎！？"
10023060-116 = "大家都被騙了？被誰？"
10023060-117 = "[s1]「雖然沒有說到那種程度……」\n[s2]「但他說只要解開預告信的謎團就能知道真相。」"
10023060-120 = "那種話要怎麼相信呢？"
10023060-121 = "對方可是七罪人哦？#n或許是在欺騙我們，試圖讓我們放鬆警備也說不定唷？"
10023060-122 = "但是「慈愛的怪盜」在綠遇到危險的時候救了他……"
10023060-123 = "這，這個嘛……是沒錯啦！"
10023060-124 = "可是話雖如此，也不能這樣就信任他吧！#n之所以救了綠，可能也只是一時興起……老師怎麼想呢？"
10023060-125 = "[s3]「就算是七罪人……」\n[s4]「也同樣是一名重要的學生，所以我想相信他。」"
10023060-128 = "也對……老師就是這種人呢。"
10023060-130 = "……有一點我一直很在意。"
10023060-131 = "「安迪基西拉的後方」……#n那個詞出現的時候，明太郎先生的態度有點奇怪。"
10023060-132 = "啊，確實是這樣！#n而且在解開預告信的謎團之後，明明還不確定是否正確就自顧自地推進話題！"
10023060-133 = "斷言只要保護好那幅畫就好這點，我覺得有點奇怪……"
10023060-135 = "愛麗絲從剛剛開始就沒有看見明太郎先生。"
10023060-136 = "啊……我也有在大廳跟正門戒備……卻從來沒看過他……"
10023060-137 = "[s]「在展示會上有人看見過明太郎先生嗎？」"
10023060-142 = "不覺得很奇怪嗎？#n一般人會把視線從重要的藝術品移開嗎？"
10023060-143 = "這麼說來，明太郎先生在展示會開始之前就……"
10023060-144 = "[s5]「明明都委託C&C負責警備了……」\n[s6]「卻連怪盜出現時都不見人影……」"
10023060-147 = "預告信中還沒有解開的部分是哪些呢？"
10023060-148 = "「月亮無法觸及的場所，靜止的舞與安迪基西拉的後方」……應該是這邊吧……"
10023060-149 = "綠，你剛才說明太郎先生的反應有點奇怪對吧？"
10023060-150 = "嗯，總覺得他好像在轉移話題……"
10023060-151 = "安迪基西拉……安迪基西拉……"
10023060-156 = "難道說……？"
10023060-157 = "啊，這是柚子的「UZQueen模式」！#n愛麗絲知道！"
10023060-158 = "[s]「你想到什麼了？」"
10023060-159 = "那個……我記得明太郎先生說過……#n這座宅邸有一座巨大的類比時鐘對吧……？"
10023060-160 = "安迪基西拉島的機械……是計算天體位置的複雜裝置……"
10023060-161 = "就連曆法的計算也能做到，所以我想，也能算是時鐘的一種……"
10023060-171 = "這就是那個類比時鐘啊。"
10023060-172 = "原來如此──#n只要來到這裡就能輕鬆理解何謂「靜止的舞」了呢。"
10023060-178 = "和時鐘並排的……舞者的銅像。"
10023060-179 = "[s]「完全是『靜止的舞』呢。」"
10023060-180 = "唔～嗯……可是時鐘和銅像的後面什麼都沒有呀？"
10023060-181 = "──請稍等。#n只有這片磁磚的樣式和其他磁磚不同。"
10023060-185 = "……看來是「中獎」了呢。"
10023060-189 = "（季改變了磁磚的方向）"
10023060-190 = "（將其放回地上後──）"
10023060-197 = "！！！"
10023060-199 = "[ns]「這是……隱藏階梯！？」"
10023060-200 = "似乎是通往地下的階梯呢。"
10023060-201 = "「月亮無法觸及的場所」……原來是這麼回事。"
10023060-202 = "委託人之所以轉移話題的理由，只要進去就能知道了吧。"
10023060-203 = "[s]「這底下……會有什麼在等著我們呢。」"
10023060-204 = "不實際去看是無從得知的。#n但是，如果委託人和「慈愛的怪盜」都在的話……"
10023060-206 = "沒，沒沒，沒關係的，老師！#n發生什麼事的話，我們遊戲開發部會保護老師的！"
10023060-207 = "……用那麼顫抖的聲音說那種話一點說服力都沒有，姐姐。"
10023060-209 = "請放心。我也會跟著一起去的。"
10023060-210 = "因為我們是夥伴──一起去吧。"
10023060-211 = "[s]「謝謝，真讓人安心。」"
10023060-213 = "任務條件更新了！接下來是地城探險！#n愛麗絲也非常喜歡地城RPG！"
10023060-214 = "老師必須緊跟著愛麗絲才行。#n因為愛麗絲是勇者，老師是吉祥物！"
10023060-215 = "[s]「勇者大人，請幫幫我吧！」"
10023060-216 = "老師，請注意……安全哦……"
10023060-217 = "如，如果發生什麼意外，請躲進我的箱子裡吧……#n只要縮起身體，躲兩個人還是沒問題的……"
10023060-218 = "[s]「那麼……小心前進吧！」"

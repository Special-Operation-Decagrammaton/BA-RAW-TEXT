[translation]
10023060-1 = "Episode 6;For Now, Let's Get Going"
10023060-2 = "After an eventful first day, we had hoped the second one would run a little more smoothly..."
10023060-6 = "So this is the painting that will be auctioned off tomorrow. I intend to bid. What about you?"
10023060-7 = "I can only say that it depends on the day's atmosphere."
10023060-12 = "[ns] \"(Despite everything, they still seem like they're looking forward to the auction.)\""
10023060-21 = "Ugh. I'm exhausted."
10023060-22 = "[s] \"Good work out there, Momoi.\""
10023060-23 = "We've come so far, I almost want to see it through to the end, just out of spite! It's what's keeping me going right now!"
10023060-24 = "If that makes sense, anyway."
10023060-25 = "I'm sorry for getting you mixed up in all of this, Sensei."
10023060-26 = "[s] \"It's actually been a breath of fresh air, in a way.\""
10023060-27 = "You mean that? You better mean it, or else!"
10023060-28 = "Because now I'm gonna call you every time I need you to bail us out of another pickle!"
10023060-29 = "[s] \"...I take it back! Please!\""
10023060-34 = "...!"
10023060-35 = "[ns] \"It must be her!\""
10023060-36 = "What's happening?"
10023060-37 = "I wouldn't worry too much. I've heard that the Benevolent Thief may harm people's wallets, but there are never any casualties."
10023060-38 = "Ah! You're right. I suppose we can just...sit back and enjoy the show?"
10023060-39 = "Don't tell Meitaro I said this, but it may even be a little entertaining."
10023060-46 = "No one's really panicking. Are they already used to it after yesterday?"
10023060-47 = "In that case..."
10023060-48 = "[s] \"It's time. Just like we planned.\""
10023060-50 = "She will not lay a finger on the painting."
10023060-51 = "I'm guarding the top of the stairs."
10023060-57 = "Just give the command, and I can snipe any target!"
10023060-58 = "I'll be hidden... assessing the situation..."
10023060-59 = "[s] \"I believe in all of you!\""
10023060-63 = "..."
10023060-64 = "..."
10023060-66 = "..."
10023060-68 = "It's so tense! She's not doing anything!"
10023060-73 = "As we were all waiting, I felt a small marble bump into my foot."
10023060-74 = "Against my better judgment, I picked up the marble..."
10023060-78 = "Hello, Sensei. Can you hear me?"
10023060-79 = "[s] \"Who is this?\""
10023060-81 = "This little marble is one of my favorite toys. It allows me to communicate with you, and eavesdroppers can't hear us."
10023060-82 = "[s] \"Is this...?\""
10023060-83 = "Shh. Ask no further."
10023060-84 = "We have no time. I need to tell you. You are a pawn in a much, larger game. We all are."
10023060-85 = "[s] \"Then who's moving the pieces?\""
10023060-86 = "You'd know already if you'd managed to unravel my riddle. Either way, you'll find out soon enough."
10023060-87 = "How regretful. It seems we've run out of time. I must make my way to my destination."
10023060-88 = "You can choose to be the king's fool and continue your blind dance, or you can choose to risk it all for the truth."
10023060-89 = "Life is naught but an endless series of these sorts of choices, wouldn't you agree?"
10023060-93 = "[ns] \"She's gone...\""
10023060-98 = "Thank goodness! We can see again!"
10023060-99 = "But what of the Benevolent Thief? She seems to have disappeared with the darkness."
10023060-100 = "Perhaps it was just an innocent black out?"
10023060-101 = "That, or the security is just as effective as Meitaro touts."
10023060-107 = "Is something wrong, Sensei?"
10023060-108 = "[s] \"Can you get everyone over here please, Momoi?\""
10023060-109 = "Huh? How come? What about our security job?"
10023060-110 = "[s] \"That's exactly why.\""
10023060-115 = "Are you serious, Sensei?!"
10023060-116 = "We're all being tricked? But by who?"
10023060-117 = "[s1] \"She didn't say who it was...\"\n[s2] \"She only said the answer was in the card's riddle...\""
10023060-120 = "And we're just supposed to trust her? "
10023060-121 = "This is one of the Seven Prisoners we're talking about! She could just be lying!"
10023060-122 = "She can't be completely bad. She saved Midori..."
10023060-123 = "Sh-She did do that, but...!"
10023060-124 = "Maybe it was a spur of the moment thing! I don't know! What do we do, Sensei?"
10023060-125 = "[s3] \"The Seven Prisoners are all still students...\"\n[s4] \"She's a student, so I want to hear her out...\""
10023060-128 = "That's a very Sensei-like response."
10023060-130 = "I had something I wanted to bring up too, actually."
10023060-131 = "Do you all remember when I read \"Behind Antikythera...\" from the card? I thought Meitaro's response was a bit off."
10023060-132 = "You're totally right! When we basically cracked the code, he was kinda dismissive about it!"
10023060-133 = "And I thought it was weird that he was so sure that one painting was all we needed to protect at first."
10023060-135 = "I would like to report as well! I have not been able to find Meitaro for a really long time."
10023060-136 = "I've been surveilling the hall, front gate, and window sill, but I've seen no sign of Meitaro."
10023060-137 = "[s] \"So, no one here has seen him?\""
10023060-142 = "That's weird. Did he just leave today's security to us and bounce?"
10023060-143 = "You're right. Now that I think about it, I haven't seen Meitaro once since the exhibition started."
10023060-144 = "[s5] \"Hm. Wasn't he the one most worried about the painting's safety?\" \n[s6] \"Why would he disappear when the thief was meant to attack?\""
10023060-147 = "What was that part... The part about the moon we couldn't solve... "
10023060-148 = "\"behind the frozen dance and Antikythera, no moonlight shines.\""
10023060-149 = "Midori, you said Meitaro's reaction was...strange, right?"
10023060-150 = "Yeah. As if he was trying to avoid the subject..."
10023060-151 = "Antikythera... Antikythera..."
10023060-156 = "Could it be...?"
10023060-157 = "Oh, this is UZQueen Mode! I know it well."
10023060-158 = "[s] \"Did you realize something?\""
10023060-159 = "Meitaro showed us that big analogue clock...right?"
10023060-160 = "The Antikythera...is a calendar-like device that calculates the movement of celestial bodies..."
10023060-161 = "At its core it could be considered a kind of clock..."
10023060-171 = " So this is that analogue clock."
10023060-172 = "I understand the meaning behind the stopped clock now."
10023060-178 = "Do you see? The statue of the dancer is right under the clock."
10023060-179 = "[s] \"Quite literally, a frozen dance.\""
10023060-180 = "I don't see anything behind the clock and statute though..."
10023060-181 = "If you don't mind. Look here, on the floor. This circular section doesn't align with the rest of the tiles."
10023060-185 = "We should be able to spin and realign it."
10023060-189 = "Toki carefully spun the tile to complete the design."
10023060-190 = "And then...!"
10023060-197 = "...!"
10023060-199 = "[ns] \"I wasn't expecting opening walls and hidden stairs on this mission...\""
10023060-200 = "They lead to the basement."
10023060-201 = "\"No moonlight shines\" is an apt description."
10023060-202 = "I understand why Meitaro changed the subject so quickly."
10023060-203 = "[s] \"So... What do you think is down there?\""
10023060-204 = "I don't know. But if Meitaro and the Benevolent Thief have walked these stairs, we have no choice but to follow suit."
10023060-206 = "It's all right, S-Sensei! The Game Development Department will be sure to p-protect you!"
10023060-207 = "You can't say that while your voice is trembling... They'll know you're scared..."
10023060-209 = "Rest assured. C&C is here as well."
10023060-210 = "We agreed to work together on this mission. I intend to keep my word."
10023060-211 = "[s] \"You are all capable of overcoming this!\""
10023060-213 = "Quest event activated! We will now be operating in my favorite genre: dungeon crawler!"
10023060-214 = "Since I am the hero, and you are the mascot, please stay right by my side! Sensei!"
10023060-215 = "[s] \"I'll be counting on you, hero!\""
10023060-216 = "E-Everyone...be careful...please...."
10023060-217 = "My box is always open if you need to hide... I think we can fit two if we really squeeze."
10023060-218 = "[s] \"Okay! Game Development Department, C&C, let's go!\""

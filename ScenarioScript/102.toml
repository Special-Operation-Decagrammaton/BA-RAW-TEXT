[translation]
102-1 = "特殊任務．信用貨幣回收"
102-2 = "聯邦學生會．作戰指揮室"
102-3 = "現在學生們稱為「史林皮亞」的廢墟，本來是由MOMO集團建設的主題樂園，名叫「烏托邦」。"
102-4 = "不過，因為經營不善所以不到半年就倒閉了。（喀滋）"
102-5 = "問題是……最近流傳著奇妙的傳言。"
102-6 = "本應斷電的設施和遊樂器材到了晚上就會自己動起來，#n把靠近的學生整個吞掉之類的……"
102-7 = "遊樂器材動起來倒是無所謂，但學生消失可是大問題。"
102-8 = "希望老師可以去調查發生了什麼事。"
102-9 = "不管什麼都行，只要發現任何線索都要立刻向聯邦學生會報告哦。#n交給你囉～！"

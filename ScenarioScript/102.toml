[translation]
102-1 = "Commission: Item Retrieval"
102-2 = "General Student Council Situation Room"
102-3 = "The ruined complex—Slumpia as the students know it—used to be a theme park built by the Momo Group called Utopia."
102-4 = "It was shut down in less than half a year due to poor management. Go figure. *crunch*"
102-5 = "The thing is, some strange rumors have been circulating about that place lately."
102-6 = "Stuff like machines moving by themselves at night despite there being no power, students disappearing there... That sort of thing."
102-7 = "I couldn't care less about some rusty old machines, but missing students are a big problem."
102-8 = "It'd be great if you could investigate what's going on."
102-9 = "Bring any clues you find to the General Student Council right away."

10027005-16 = "3;메루;11;먼지가 너무 많아! 이러다 폐 다 상하겠어!\n#3;em;[!]\n#3;closeup"
10027005-17 = "3;모미지;04;청소와 먼지는 떼려야 뗄 수 없는 관계죠……\n#3;em;…\n#3;closeup"
10027005-18 = "#all;hide"
10027005-19 = "1;모미지;04\n5;메루;11;조금 전부터 계속 같은 생각만 들고 있는데, 이 청소, 의미는 있는 거야?"
10027005-20 = "5;메루;11;도서관을 깨끗하게 정리해 봤자, 누가 찾아오기나 하겠냐고! 좋아한다고 해 봤자 낮잠 자러 찾아오는 체리노 회장 정도겠지!\n#5;em;[빠직]"
10027005-21 = "5;메루;11;그렇게 뻔질나게 찾아올 거면, 차라리 장서 반입이나 허락해 주던가!"
10027005-22 = "1;모미지;05;그 말에는 공감이 가네요…… 그렇지만 도서관을 정리해 두는 건 나쁜 일이 아니잖아요? "
10027005-23 = "1;모미지;07;적어도…… 도서관에서 생활하는 우리들에게는, 좋은 일이 되겠죠…….\n#1;em;[음표]"
10027005-24 = "5;메루;11;우에에…… 청소하면서까지 정론을 듣기는 싫어…….\n#5;stiff"
10027005-25 = "1;모미지;02;그리고요. 청소하다 보면 가끔 뜻하지도 않은 보물을 발견하기도 하잖아요?\n#1;em;[?]"
10027005-26 = "#all;hide"
10027005-27 = "3;모미지;03;이왕 하는 거, 겸사겸사 여러 가지를 노린다고 생각하는 게 좋을 것 같은데요.\n#3;em;[반짝]\n#3;closeup"
10027005-28 = "3;메루;11;……그 보물이란 거, 보통 유행 지난 책이나 만화 같은 거잖아…….\n#3;em;[세로선]\n#3;closeup"
10027005-29 = "#all;hide"
10027005-30 = "5;메루;11\n1;모미지;05;잊었어요, 메루 선배? 우리 <지식해방전선>에게는 그런 것도 귀하다구요!\n#1;em;[!]"
10027005-31 = "1;모미지;02;콘텐츠의 유입과 순환이 되지 않아서, 다들 무언가 새로운 것을 내놓으라고 아우성치는 게 우리들의 현실이잖아요!"
10027005-32 = "5;메루;11;새로운 콘텐츠라고 공급해 줄 수 있는 게, 한물간 책이나 만화 정도라는 거잖아. 그 소리는……."
10027005-33 = "1;모미지;05;왜 이럴 때만 냉정하게 현실을 지적하는 거예요!\n#1;em;[빠직]"

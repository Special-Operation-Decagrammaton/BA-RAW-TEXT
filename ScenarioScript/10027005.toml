[translation]
10027005-1 = "序幕;知識解放戰線的一天"
10027005-2 = "赤冬聯邦學園．圖書館"
10027005-13 = "咳咳，咳咳！"
10027005-14 = "沒事吧，前輩？"
10027005-16 = "這裡灰塵實在太多了！#n繼續待在這裡，我的肺就要壞掉了！"
10027005-17 = "可是打掃本來就和灰塵有密不可分的關係……"
10027005-19 = "我從剛剛就一直在想……打掃這裡真的有意義嗎？"
10027005-20 = "就算把這裡掃得一塵不染又有什麼用，根本就沒人會來！#n看到這裡變乾淨會高興的，也就只有跑來這裡睡午覺的潔莉諾會長而已吧！"
10027005-21 = "三天兩頭跑來這裡睡覺，還不准我們新增藏書！"
10027005-22 = "雖然我也同意你說的話……#n不過把圖書館打掃乾淨也不是件壞事吧？"
10027005-23 = "至少……對住在圖書館的我們來說是這樣……"
10027005-24 = "嗚咦……打掃已經很累了，可以別再說那種事了嗎……"
10027005-25 = "而且，打掃的時候不是經常會找到一些意外的寶物嗎？"
10027005-27 = "所以既然都要打掃，乾脆就把它當成是一場尋寶遊戲吧。"
10027005-28 = "你所謂的寶物，不就是些過時的書或漫畫嗎……"
10027005-30 = "愛瑠前輩，你難道忘了嗎？#n那些對我們「知識解放戰線」來說也是非常重要的唷！"
10027005-31 = "就是因為汰換書籍的速度太慢，大家才會吵著要我們拿點新東西出來不是嗎？"
10027005-32 = "而你所謂的新東西就是那些過時的書籍和漫畫啊……#n這聽起來實在有點……"
10027005-33 = "為什麼只有這種時候會冷靜地剖析現實啊！"
10027005-46 = "咦？愛瑠前輩！#n請過來這邊！"
10027005-47 = "嗯？怎麼了？#n你找到什麼了嗎？"
10027005-48 = "沒錯！我找到了《LUNA》的第四卷到第二十一卷！#n沒想到這種寶物竟然一直沉睡在圖書館裡……！"
10027005-49 = "……《LUNA》是什麼？"
10027005-50 = "咦……！？難道前輩不知道《LUNA》嗎？#n這樣怎麼稱得上是「知識解放戰線」的成員呢，愛瑠前輩？"
10027005-51 = "所以那到底是什麼……"
10027005-52 = "竟然連這部傳說級的神作都不知道……#n前輩，我好像對你有點失望……"
10027005-53 = "這部作品講述了兩個同樣名叫「露娜」的人，#n在因緣際會下成為室友後發生的一連串故事……"
10027005-54 = "愛情、人生、龐克、樂團和電影……說它是各種類的集大成之作也不為過哦！"
10027005-55 = "雖然因為一些原因，第二十二卷最終卷……有點一言難盡……"
10027005-56 = "但總之！想不到愛瑠前輩竟然現在才認識這部神作……#n真替你之前虛度的光陰感到可憐！"
10027005-57 = "可憐的是我的光陰不是我嗎！？"
10027005-59 = "我怎麼會覺得愛瑠前輩可憐呢！"
10027005-60 = "那倒也是！"
10027005-61 = "總而言之！正好我手邊有收藏第一到第三卷，#n前輩你也趁這個機會認識一下《LUNA》這部神作吧！"
10027005-62 = "我一定得照做嗎？"
10027005-63 = "我們可是「知識解放戰線」，所有知識都是平等且重要的！#n就算是《LUNA》也不例外！"
10027005-64 = "別拿「知識解放戰線」當作滿足私心的藉口！"
10027005-79 = "呼……終於看完了……#n咦，已經這麼晚了嗎？"
10027005-80 = "怎麼樣？怎麼樣？#n好看嗎？很好看吧？"
10027005-81 = "嗯……首先……"
10027005-82 = "首先？"
10027005-83 = "不錯，確實不錯。"
10027005-84 = "我就說吧！？"
10027005-85 = "但這……不就是各種狗血劇情所組成的大雜燴嗎？"
10027005-86 = "咦……？"
10027005-87 = "不停地為了衝突而衝突，一旦角色變得難以處理就隨便製造個巧合讓他退場……"
10027005-88 = "這，這種說法……在連載的時候確實也時不時會有人提出來批評……"
10027005-89 = "但，但你不覺得透過這種方式相遇的角色，全都非常有魅力嗎？#n尤其是第十六卷裡，工作室的經紀人和露娜意外撞上的那一幕真的好棒喔……！"
10027005-90 = "嗯，角色的造型確實畫得不錯。#n考慮到作品的年代，甚至稱得上是非常前衛。"
10027005-91 = "不過同時，作者為了突顯角色性格的劇情過於扭曲複雜，有些甚至還互相衝突……"
10027005-92 = "就連最終章也是一樣。#n第二十一卷的結局到底是什麼啊？完全沒有要收束劇情的意思嘛。"
10027005-93 = "你剛才說第二十二卷是最終卷對吧？#n我真的很好奇作者把故事寫得那麼複雜，真的有辦法在一卷內完結嗎？你怎麼看？"
10027005-94 = "第二十二卷……並不存在。"
10027005-95 = "什麼？沒有最終卷？為什麼？"
10027005-96 = "……所知。"
10027005-97 = "嗯？我沒聽清楚。"
10027005-104 = "愛瑠前輩憑什麼說這種話啊，明明就對《LUNA》一無所知！"
10027005-105 = "……咦，咦咦？"
10027005-107 = "竟然還問為什麼沒有最終卷？#n我才想問咧！！"
10027005-108 = "還有……！"
10027005-109 = "還，還有……？"
10027005-110 = "愛瑠前輩嘴上說的這麼好聽，你倒是說說看你創作出了什麼偉大的作品啊！"
10027005-111 = "前輩不也一樣老是愛寫什麼就寫什麼，完全沒想過後續要怎麼收場嗎！？"
10027005-112 = "就是因為你在設計角色和劇情的時候每次都是先想畫面再補細節才會這樣！"
10027005-113 = "這種完全不在乎劇情和角色設定的行為，前輩你也好不到哪裡去！"
10027005-114 = "紅，紅葉？為什麼突然這麼生氣？"
10027005-116 = "我的忍耐已經到極限了！#n今天一定要把想說的話通通說出來！"
10027005-124 = "偷吃我的炸鬆餅的人就是你吧，愛瑠前輩！？#n這樣啊這樣啊，你竟然是那種人……"
10027005-125 = "誰叫你把那東西在室溫下放了一整天，我當然會以為那是可以吃的啊！#n你好歹也在上面寫個名字吧！"
10027005-126 = "不是自己的東西不隨便亂碰，這不是做人的基本常識嗎！"
10027005-135 = "你老是想說什麼就說什麼，想做什麼就做什麼……！"
10027005-136 = "愛瑠前輩……我最討厭了！"
10027005-137 = "……！"
10027005-138 = "老虎不發威，你還真當我是病貓啊……#n真要說的話，我也有很多想說的話好嗎！？"
10027005-140 = "紅葉你之前不也……！"
10027005-148 = "我還想說為什麼我們老是進同樣的書，就是你偷偷重複下單了好幾次對吧，紅葉！"
10027005-149 = "我，我是為了買到限量版才會出此下策的！#n你知道要買到限量版有多難嗎！"
10027005-151 = "就是因為這樣，我們才會被禁止申請新增藏書兩個月的不是嗎！#n你又要怎麼解釋！"
10027005-158 = "還好意思指責我老是為所欲為，紅葉自己也沒好到哪裡去！"
10027005-160 = "這，這是兩回事！"
10027005-161 = "你說說看這兩件事有什麼不同啊！"
10027005-163 = "唔唔……！"
10027005-164 = "哼……！"
10027005-169 = "算了！我以後沒有你這個前輩！"
10027005-171 = "既然把自己說得那麼了不起，你就一個人自生自滅吧！"
10027005-180 = "你以為我不敢嗎！"
10027005-181 = "以後我也沒有你這個後輩！"
10027005-182 = "……"
10027005-183 = "……真的離開圖書館了。"
10027005-184 = "哼，那樣正好！#n就算沒有紅葉，我自己一個人也能過得很好……！"
10027005-185 = "過得……"
10027005-186 = "……"
10027005-187 = "真的沒問題嗎！？！？"

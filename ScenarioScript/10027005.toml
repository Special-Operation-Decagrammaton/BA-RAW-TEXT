[translation]
10027005-1 = "บทเริ่มต้น;วันหนึ่งของชมรมแนวร่วมปลดปล่อยความรู้"
10027005-2 = "ห้องสมุดสหภาพเรดวินเทอร์"
10027005-13 = "แค่กๆ แค่กๆ!"
10027005-14 = "ไหวไหมคะ รุ่นพี่?"
10027005-16 = "ฝุ่นเกาะเขรอะไปหมดเลย! แบบนี้ปอดได้พังหมดแน่!"
10027005-17 = "ฝุ่นกับการทำความสะอาดมันเป็นของคู่กันอยู่แล้วนี่คะ..."
10027005-19 = "ฉันคิดแต่เรื่องนี้มาสักพักแล้วละ ว่าการทำความสะอาดครั้งนี้มันมีความหมายหรือเปล่า?"
10027005-20 = "ต่อให้มาปัดฝุ่นห้องสมุดจนสะอาด แต่แล้วมันจะมีใครมาที่นี่กันล่ะ! ถึงจะชอบห้องสมุดก็เถอะ แต่มันก็มีแต่ประธานเชริโน่ที่เอาแต่มานอนก็เท่านั้นแหละ!"
10027005-21 = "ถ้าจะมาบ่อยขนาดนั้น ก็อนุญาตให้ฉันเอาหนังสือเข้ามาเพิ่มสักทีสิ!"
10027005-22 = "ฉันเห็นด้วยเลยค่ะ... แต่การจัดห้องสมุดไว้ก่อนก็ไม่ใช่เรื่องเสียหายนี่คะ? "
10027005-23 = "อย่างน้อย... มันก็ดีกับพวกเราที่ใช้ชีวิตอยู่กันในห้องสมุดอยู่แล้ว..."
10027005-24 = "พอเลย... แค่ทำความสะอาดก็เหนื่อยมามากพอแล้ว ฉันไม่อยากโดนเทศน์เพิ่มอีกนะ..."
10027005-25 = "อีกอย่างนะคะ ถ้าทำความสะอาดไปเรื่อยๆ บางทีเราก็อาจจะเจอสมบัติที่คาดไม่ถึงก็ได้นะคะ"
10027005-27 = "ไหนๆ ก็มาทำแล้ว ลองปรับมุมมองว่านี่คือการทำเพื่ออะไรหลายๆ อย่างดีกว่าค่ะ"
10027005-28 = "...สมบัติอะไรนั่นที่เธอว่า ปกติก็จะเป็นหนังสือหรือการ์ตูนที่เคยโด่งดังเมื่อสมัยก่อนเองนี่..."
10027005-30 = "ลืมไปแล้วเหรอคะ รุ่นพี่เมรุ? ของแบบนั้นถือว่ามีคุณค่าสำหรับ <ชมรมแนวร่วมปลดปล่อยความรู้> ของเรามากๆ เลยนะคะ!"
10027005-31 = "พอมันไม่มีการเพิ่มเนื้อหาใหม่ๆ ทุกคนก็เลยเรียกร้องให้ออกเนื้อหาใหม่มาบ้างไม่ใช่เหรอคะ!"
10027005-32 = "มันก็แน่อยู่แล้ว สิ่งพิมพ์ที่มีเนื้อหาใหม่ๆ ได้ก็หนีไม่พ้นหนังสือหรือการ์ตูนที่ล้าสมัยไปแล้ว..."
10027005-33 = "ทีแบบนี้ละเอาความจริงมาพูดได้อย่างหน้าตาเฉยเลยนะคะ!"
10027005-46 = "หืม? รุ่นพี่เมรุ! ดูนี่สิคะ!"
10027005-47 = "หืม? อะไรเหรอ? เจออะไรขึ้นมาหรือไง?"
10027005-48 = "ค่ะ! <ลูน่า> เล่ม 4-21 ค่ะ! เหลือจะเชื่อเลย มีสมบัติแบบนี้หลับไหลอยู่ในห้องสมุดกับเค้าด้วย...!"
10027005-49 = "...<ลูน่า> คืออะไรเหรอ?"
10027005-50 = "คะ...?! รุ่นพี่เมรุไม่รู้จัก <ลูน่า> เหรอคะ? แล้วมาอยู่ใน <ชมรมแนวร่วมปลดปล่อยความรู้> ได้ยังไงคะเนี่ย?!"
10027005-51 = "ก็บอกมาสิว่ามันคืออะไร..."
10027005-52 = "ไม่รู้จักผลงานในตำนานได้ยังไงกัน แบบนี้ทำเอาฉันผิดหวังอยู่หน่อยเลยนะคะ!"
10027005-53 = "นี่เป็นเรื่องของตัวละคร 2 ตัวที่ชื่อ 'ลูน่า' เหมือนกัน และมีเหตุการณ์ให้ต้องมาอยู่ในบ้านเดียวกัน#nจนเกิดเรื่องตามมา..."
10027005-54 = "ทั้งเรื่องความรัก ชีวิต ความพังก์ วงดนตรี และภาพยนตร์... เอาเป็นว่าเรื่องนี้รวมทุกอย่างไว้#nครบรสเลยละค่ะ!"
10027005-55 = "แต่ด้วยเหตุผลหลายอย่าง ทำให้เล่ม 22 ที่เป็นเล่มจบบริบูรณ์ต้องเจอชะตากรรมแบบนั้น..."
10027005-56 = "เอาเถอะค่ะ! ฉันเห็นใจเวลาชีวิตของรุ่นพี่เมรุจริงๆ โตมายังไงกันคะถึงได้ไม่รู้จักผลงานในตำนานเรื่องนี้!"
10027005-57 = "เห็นใจเวลาของฉัน แต่ไม่เห็นใจฉันเลยเนี่ยนะ โมมิจิ!"
10027005-59 = "ฉันจะไปคิดสงสารรุ่นพี่เมรุได้ยังไงล่ะคะ?"
10027005-60 = "นั่นมันก็จริงอยู่หรอก!"
10027005-61 = "เอาเถอะค่ะ โชคดีที่ฉันมีเล่ม 1-3 อยู่แล้ว งั้นถือโอกาสนี้รุ่นพี่ก็มาเข้าวงการ <ลูน่า> ด้วยกันเถอะคะ!"
10027005-62 = "ฉันต้องทำอย่างนั้นด้วยเหรอ?"
10027005-63 = "ก็พวกเราเป็น <ชมรมแนวร่วมปลดปล่อยความรู้> นี่คะ ความรู้ทุกอย่างล้วนเท่าเทียมและมีค่า! และ <ลูน่า> ก็ไม่ใช่ข้อยกเว้นค่ะ! การ์ตูนก็เป็นความรู้และปัญญาค่ะ!"
10027005-64 = "อย่าเอาความชอบส่วนตัวมาหากินกับ <ชมรมแนวร่วมปลดปล่อยความรู้> นะ!"
10027005-79 = "เฮ้ออ... อ่านจบแล้ว... อะไรกัน เวลาผ่านไปตั้งขนาดนี้แล้วเลยเหรอ?"
10027005-80 = "ว่าไงคะ? เป็นยังไงบ้าง?  คิดว่ายังไงคะ?"
10027005-81 = "อืม... ก่อนอื่นก็..."
10027005-82 = "ก่อนอื่น?"
10027005-83 = "ไม่ได้แย่นะ ก็ไม่ถึงกับแย่ แต่ว่า..."
10027005-84 = "ใช่ไหมล่ะคะ?!"
10027005-85 = "อันนี้มันประดิษฐ์เนื้อหาเกินจริงมากไปหรือเปล่า?"
10027005-86 = "คะ...?"
10027005-87 = "แบบว่า... มีแต่ความขัดแย้งกันที่พาไปสู่ความไม่ลงรอยกันไม่จบสิ้น แล้วตัวละครที่จัดการปัญหาไม่ได้#nก็มักจะชอบถูกลืมโดยบังเอิญ"
10027005-88 = "ระ... เรื่องนั้น... ก็เป็นการวิจารณ์ที่ฉันได้ยินอยู่บ่อยๆ สมัยที่มีการตีพิมพ์ต่อเนื่อง... ค่ะ"
10027005-89 = "ตะ... แต่การที่ตัวละครได้มาเจอกันแบบนั้นก็เป็นอะไรที่น่าสนใจมากเลยนี่คะ! โดยเฉพาะในเล่ม 16 ตอนที่ตัวละครผู้จัดการในสตูดิโอเดินไปชนกับลูน่า ซีนนั้นเท่ระเบิดเลยนะคะ...!"
10027005-90 = "อื้ม ถือว่าออกแบบตัวละครได้ดีเลย ถ้าดูปีที่พิมพ์ ก็เรียกได้ว่าเป็นการ์ตูนบุกเบิกเลยละ"
10027005-91 = "แต่ในทางกลับกัน เรื่องราวที่สร้างขึ้นเพื่อทำให้ตัวละครโดดเด่นมันพันกันยุ่งเหยิงไปหมด แล้วตอนที่#nจบแบบแกงคนอ่านก็ไม่ใช่น้อยๆ ด้วย..."
10027005-92 = "ในตอนสุดท้ายก็เหมือนกัน ตอนจบในเล่ม 21 ออกมาเป็นแบบนั้นได้ยังไง? ไม่เห็นจะเคลียร์อะไรให้#nกระจ่างเลยสักนิด"
10027005-93 = "เรื่องนี้มันมี 22 เล่มจบใช่ไหม? สงสัยจังแฮะว่าเรื่องที่ลุกลามไปขนาดนั้นจะคลี่คลายหมดในเล่ม 22 ได้#nหรือเปล่า สปอยล์หน่อยได้ไหม?"
10027005-94 = "เล่ม 22... ไม่มีค่ะ"
10027005-95 = "ว่าไงนะ? ไม่มีเล่มจบงั้นเหรอ? ทำไมล่ะ?"
10027005-96 = "... แบบนี้เหรอคะ"
10027005-97 = "หืม? ได้ยินไม่ชัดเลย"
10027005-104 = "รุ่นพี่เมรุรู้อะไรเกี่ยวกับ <ลูน่า> ถึงมาสงสัยแบบนี้เหรอคะ?!"
10027005-105 = "หะ... หืม?"
10027005-107 = "ถามมาได้ว่าทำไมไม่มีเล่มจบบริบูรณ์ ฉันต่างหากค่ะที่อยากถามแบบนั้น!!"
10027005-108 = "อีกอย่าง...!"
10027005-109 = "อะ... อีกอย่าง...?"
10027005-110 = "ที่รุ่นพี่เมรุพูดน่ะ คิดว่าตัวเองเคยสร้างผลงานที่ดีเลิศมาแล้วเหรอคะถึงพูดแบบนั้นออกมาได้?"
10027005-111 = "ไม่รู้ตัวเหรอคะว่าตัวเองก็เอาแต่พูดและไม่คิดแก้ไขให้เรียบร้อยเหมือนกัน!"
10027005-112 = "ตอนวางคาแรคเตอร์ตัวละครกับเนื้อเรื่องก็เอาแต่นึกถึงฉากก่อน แล้วค่อยใส่ส่วนที่เหลือเข้าไป!"
10027005-113 = "การทำให้เนื้อเรื่องกับตัวละครสะเปะสะปะไปมา รุ่นพี่ยังหนักกว่าอีกนะคะ แล้วจะยังมีหน้ามาวิพากษ์#nวิจารณ์งานคนอื่นเหรอคะ?!"
10027005-114 = "มะ... โมมิจิ? จู่ๆ ก็เป็นอะไรของเธอเนี่ย?"
10027005-116 = "ฉันก็ทนมานานจนหมดความอดทนแล้วนะคะ! คงต้องระบายสิ่งที่อยู่ในใจแล้วละค่ะ!"
10027005-124 = "เป็นอย่างนั้นเองสินะคะ! เป็นอย่างนั้นนี่เอง! คนที่กินแพนเค้กทอดของฉันก็คือรุ่นพี่เมรุนี่เองสินะคะ?!"
10027005-125 = "ก็เห็นใครเอามาวางไว้ข้างนอกทั้งวี่ทั้งวัน ฉันก็เลยคิดว่ากินได้น่ะสิ! ถ้ากลัวคนอื่นมาเอาไปกิน ก็แล้วทำไมไม่เขียนชื่อติดเอาไว้เลยล่ะ!"
10027005-126 = "ก็ถ้าไม่ใช่ของตัวเองตั้งแต่แรก คนที่มีสามัญสำนึกเขาก็จะไม่เข้าไปแตะต้องหรอกค่ะ!"
10027005-135 = "เอาแต่พูดและก็ทำตามอำเภอใจตัวเองอยู่เรื่อย...!"
10027005-136 = "รุ่นพี่เมรุ... ใจแคบแล้วก็ยังขี้งอนด้วย!"
10027005-137 = "......!"
10027005-138 = "เอาใหญ่แล้วนะ... ฉันเองก็มีเรื่องอยากพูดไม่น้อยไปกว่ากันหรอกนะ?!"
10027005-140 = "อย่าเอาแต่ว่าคนอื่นเลยโมมิจิ คราวที่แล้วเธอเองก็...!"
10027005-148 = "ฉันก็ว่าอยู่ว่าทำไมมีหนังสือเหมือนกันเข้ามาบ่อยๆ เธอเองใช่ไหมที่สั่งมาซ้ำ? โมมิจิ!"
10027005-149 = "กะ... ก็มันช่วยไม่ได้นี่คะ ก็ฉันพยายามหาฉบับจัดพิมพ์พิเศษนี่นา! รู้ไหมคะว่าการหาฉบับจัดพิมพ์#nพิเศษมันยากแค่ไหน!"
10027005-151 = "เพราะแบบนี้ไงเราเลยถูกห้ามไม่ให้สั่งหนังสือตั้ง 2 เดือน! แล้วเรื่องนี้จะทำยังไง!"
10027005-158 = "มาพูดเหมือนกับว่ามีแต่ฉันแค่คนเดียวที่ทำตามอำเภอใจ! โมมิจิเองก็เหมือนกันนั่นแหละ!"
10027005-160 = "นั่นมันคนละเรื่องกันนะคะ!"
10027005-161 = "มันเรื่องเดียวกันชัดๆ เลยนะ!"
10027005-163 = "ฮึ่ม...!"
10027005-164 = "เหอะ!"
10027005-169 = "ช่างเถอะค่ะ! จากนี้ไปฉันไม่รู้จักคนอย่างรุ่นพี่แล้ว!"
10027005-171 = "เอาเลยค่ะ! ถ้าคิดว่าตัวเองดีที่สุดอย่างที่พูดก็ทำตัวแบบนั้นไปเลยค่ะ!"
10027005-180 = "คิดว่าฉันจะกลัวหรือไง!"
10027005-181 = "ฉันก็ไม่รู้จักคนอย่างโมมิจิเหมือนกัน!"
10027005-182 = "......"
10027005-183 = "ออกจากห้องสมุดไปแล้วแฮะ"
10027005-184 = "เหอะ! ก็ดีแล้วแหละ! ต่อให้ไม่มีโมมิจิ ฉันก็อยู่คนเดียวได้...!"
10027005-185 = "ไม่มีปัญหา...!"
10027005-186 = "......"
10027005-187 = "ได้หรือเปล่านะ?!?!"

10027005-46 = "3;모미지;02;어? 메루 선배! 여기 좀 와 보세요!\n#3;em;[반응]"
10027005-47 = "5;메루;02;엉? 뭔데. 뭔가 찾았어?\n#5;al\n#3;m1"
10027005-48 = "3;모미지;03;네! <루나> 4권부터 21권까지예요! 세상에, 이런 보물이 도서관에서 잠들어 있었다니……!\n#3;em;[반짝]"
10027005-49 = "5;메루;00;……<루나>가 뭔데?"
10027005-50 = "3;모미지;04;네……?! 설마, <루나>를 모르는 거예요? 어떻게 그러고서도 <지식해방전선>을 자처할 수 있다는 거죠. 메루 선배는?!\n#3;em;[?!]"
10027005-51 = "5;메루;05;그러니까 그게 뭐냐고……."
10027005-52 = "3;모미지;05;이 전설의 작품을 모르시다니, 저 조금 실망했을지도 몰라요!\n#3;m3\n#5;dr\n#3;em;[!]"
10027005-53 = "3;모미지;99;똑같이 '루나'라는 이름을 가진 두 명의 등장인물이, 어쩌다 같은 이유로 동거하게 되면서 벌어지는 이야기를 다룬…….\n#3;em;…"
10027005-54 = "3;모미지;03;사랑과 인생과 펑크와 밴드와 영화와…… 아무튼 모든 것의 집대성이라고요!\n#3;hophop"
10027005-55 = "3;모미지;04;여러 사정이 있어 완결권인 22권은…… 조금, 그렇게 되었지만…….\n#3;stiff"
10027005-56 = "3;모미지;05;어쨌든! 이 전설을 모르고 살아왔던 메루 선배의 시간이 불쌍해요!\n#3;closeup\n#3;em;[!]"
10027005-57 = "3;메루;04;내 시간이 불쌍하고, 나는 불쌍하지 않은 거냐. 모미지!\n#3;em;[?!]\n#3;closeup"
10027005-58 = "#all;hide"
10027005-59 = "5;메루;04\n1;모미지;07;제가 메루 선배를 불쌍하다고 생각할 리가 없잖아요!\n#1;em;[음표]"
10027005-60 = "5;메루;02;그건 그래!\n#5;em;[!]"
10027005-61 = "1;모미지;03;아무튼 간에요! 마침 1권부터 3권까지는 제가 소장 중이니까, 이 기회에 선배도 <루나>에 입문해 보는 거예요!"
10027005-62 = "5;메루;16;그거 꼭 해야 해?\n#5;em;[한숨]\n#5;stiff"
10027005-63 = "1;모미지;05;우리는 <지식해방전선>이잖아요. 모든 지식은 평등하며 소중하죠! <루나>라고 해서 예외가 될 수는 없어요! 아뇨, 그래서는 안 돼요!"
10027005-64 = "5;메루;05;사심이 담긴 형태로 <지식해방전선>을 이용하지 마–!\n#5;em;[빠직]"

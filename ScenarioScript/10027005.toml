[translation]
10027005-1 = "Prologue;A Day with the Knowledge Liberation Front"
10027005-2 = "Red Winter Academy Library"
10027005-13 = "*cough* *cough*"
10027005-14 = "Are you okay?"
10027005-16 = "No! All this dust is killing my lungs!"
10027005-17 = "That's why we're cleaning..."
10027005-19 = "But what's the point?"
10027005-20 = "Why do all this cleaning when nobody's ever here to appreciate it? President Cherino is the only visitor, and she just comes here to nap!"
10027005-21 = "And if they're actually expecting visitors, then they should at least let us stock more books."
10027005-22 = "I agree... But is keeping the library clean such a bad thing? "
10027005-23 = "We live here, so we benefit from it whether anyone else does or not."
10027005-24 = "Blegh! Don't try to trick me with your well-reasoned arguments..."
10027005-25 = "You know, sometimes people find unexpected treasures while they're cleaning."
10027005-27 = "Why don't we treat this more like we're looking for useful artifacts?"
10027005-28 = "Outdated books and old manga are not treasures."
10027005-30 = "Meru...all information is valuable to the Knowledge Liberation Front!"
10027005-31 = "Whether it's new or not, people are always clamoring for the latest content."
10027005-32 = "Yeah, but when the latest content is moldy old books and manga—"
10027005-33 = "Why are you so determined to be negative about this?"
10027005-46 = "Wait a second... Meru! Come here!"
10027005-47 = "Huh? What? Did you find something?"
10027005-48 = "Yes! I found \"Luna\", Volumes 4 to 21! I can't believe such treasures were right under our noses!"
10027005-49 = "What's \"Luna\"?"
10027005-50 = "Meru, you don't know about \"Luna\"?! And you call yourself a member of the Knowledge Liberation Front..."
10027005-51 = "Well, you see..."
10027005-52 = "I'm disappointed in you! These stories are legendary!"
10027005-53 = "It's about two characters named \"Luna\" who experience life together."
10027005-54 = "There's something for everyone! Love, life, punk themes, a band, movies, and...everything!"
10027005-55 = "The final volume, Volume 22, took kind of a turn, but..."
10027005-56 = "You've really missed out on something amazing, Meru! What a shame..."
10027005-57 = "Do you mean that you pity me for missing out? Or do you find my ignorance shameful?"
10027005-59 = "Oh, I've never once thought you were shameful, Meru! You know that!"
10027005-60 = "Hm, that's true."
10027005-61 = "Anyway! I happen to own Volumes 1 to 3. Why don't you take this chance to get acquainted with \"Luna\"?"
10027005-62 = "Do I have to?"
10027005-63 = "Of course! We are the Knowledge Liberation Front. All information is equally valuable, and \"Luna\" is no exception!"
10027005-64 = "You're just using the Knowledge Liberation Front as an excuse to make me read this, aren't you?"
10027005-79 = "*sigh* All done... Whoa! It's later than I thought!"
10027005-80 = "Does that mean you liked it? Tell me. What did you think?"
10027005-81 = "Um, first..."
10027005-82 = "First?"
10027005-83 = "It wasn't bad, but—"
10027005-84 = "Right?! It's amazing!"
10027005-85 = "You don't think the storyline feels a little...contrived?"
10027005-86 = "Excuse me?"
10027005-87 = "It's just creating conflict for conflict's sake. Or they use freak accidents to write off characters that get too complicated."
10027005-88 = "W-Well... Some critics did point that out back in the manga's heyday..."
10027005-89 = "B-But that doesn't mean the characters aren't appealing! Take Volume 16, for example. Luna's confrontation with the studio manager—"
10027005-90 = "I'll admit the characterization was good, especially considering the publication year."
10027005-91 = "But the story itself is too convoluted. It got so bad that it actually ruined some volumes if you ask me."
10027005-92 = "Like in the last part in Volume 21, they left too many loose ends."
10027005-93 = "You said Volume 22 is the final volume, right? I'm not sure that's enough to tie all of those up... What do you think?"
10027005-94 = "Well, actually... Volume 22 doesn't exist."
10027005-95 = "What?! Why not?! That's a terrible way to end things."
10027005-96 = "...expert."
10027005-97 = "Huh? I didn't catch that."
10027005-104 = "Who died and made you the expert, Meru?!"
10027005-105 = "...H-Huh?"
10027005-107 = "I just wanted to know why there's no final volume to wrap up the story."
10027005-108 = "And another thing!!"
10027005-109 = "A-Another thing?"
10027005-110 = "You're not a REAL author! Who are you to judge!"
10027005-111 = "You never think things through before you commit them to the page. You're no better than they are!"
10027005-112 = "You just think of a scene and then force every character and storyline to fit in!"
10027005-113 = "They're flawed just like you say this story is. So what makes you such an authority on the subject?!"
10027005-114 = "M-Momiji? What is going on with you? What's wrong?"
10027005-116 = "I've just had it, okay?! I need to get this off my chest!"
10027005-124 = "And let's not forget that you ate my fried pancake, either! Because I certainly didn't!"
10027005-125 = "It was sitting out ALL day! I just assumed it was up for grabs. You should have labeled it or something!"
10027005-126 = "I shouldn't have needed to! If it's not yours, don't touch it! It's common sense!"
10027005-135 = "You never consider anyone else! You just do whatever you want!"
10027005-136 = "You're so inconsiderate, Meru!"
10027005-137 = "...!"
10027005-138 = "I don't have to stand here and take this! I have tons to say to you too!"
10027005-140 = "You have no right to complain, Momiji. Take the book orders..."
10027005-148 = "We keep getting multiple copies of the same book. I bet you mistakenly placed a duplicate order, huh, Momiji?"
10027005-149 = "I had no choice! I'm looking for a l-limited edition! It's really hard to get!"
10027005-151 = "The reason doesn't matter. Thanks to you, the Secretariat refused to approve any orders for two months! How are you going to fix that?!"
10027005-158 = "So? You say that like I'm the only one doing whatever I want! You're just as bad, Momiji!"
10027005-160 = "Those are two completely unrelated things!"
10027005-161 = "No they aren't!"
10027005-163 = "Ugh!"
10027005-164 = "Hmph!"
10027005-169 = "Fine! Whatever!"
10027005-171 = "Keep acting like you're better than everyone else and see what happens! See if I care!"
10027005-180 = "You're not going to scare me with threats!"
10027005-181 = "Because I don't care about you either, Momiji!"
10027005-182 = "..."
10027005-183 = "Oh, fine! Just walk away when I'm talking to you!"
10027005-184 = "Hmph. Good riddance! I'll be just fine on my own..."
10027005-185 = "Yeah..."
10027005-186 = "..."
10027005-187 = "I hope..."

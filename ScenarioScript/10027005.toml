10027005-86 = "1;모미지;04;네……?\n#1;em;[?!]\n#1;shake"
10027005-87 = "3;메루;99;갈등을 위한 갈등만을 계속해서 만들어 낸다든가, 처리하기 곤란해진 캐릭터는, 우연을 가장해 잊히게 둔다든가.\n#3;em;…"
10027005-88 = "1;모미지;04;그, 그건 분명…… 연재 당시에도, 간간이 들렸던 비평이긴 한데, 요…….\n#1;stiff"
10027005-89 = "1;모미지;05;하, 하지만 그런 식으로 만난 캐릭터들은 분명 매력적이잖아요! 특히나 16권에서 나왔던 스튜디오의 매니저 캐릭터랑 루나가 부딪쳤을 때는 굉장히 멋져서……!\n#1;em;[!]\n#1;jump"
10027005-90 = "3;메루;01;응, 캐릭터 조형은 꽤 좋았어. 출간 연도를 생각하면 오히려 선구적이었다고 봐야겠지."
10027005-91 = "3;메루;02;하지만 그 반대급부로 그 캐릭터들을 띄워주기 위해 구성된 스토리가 이리 꼬이고 저리 꼬이는 바람에, 끝내 파탄 나버린 에피소드도 몇 있었고…….\n#3;m4\n#1;m2"
10027005-92 = "3;메루;00;심지어 마지막 부분도 마찬가지야. 21권 마지막의 그건 뭐야? 제대로 마무리된 게 하나도 없던데.\n#3;m3\n#1;m1"
10027005-93 = "3;메루;03;완결권이 22권이라고 했지? 거기까지 커진 사건을 22권에서 다 수습하는 게 정말 가능한지 궁금할 지경인데. 어때?\n#3;em;[?]"

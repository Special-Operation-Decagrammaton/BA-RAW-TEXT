[translation]
1012506-1 = "魔法畫家"
1012506-2 = "（依照與繪梨的約定，來到了狂獵街道）"
1012506-8 = "哦哦！這邊這邊，御者！"
1012506-9 = "準備都已經完成了。請跟我來吧。"
1012506-10 = "[s]「今天要畫畫對吧？」"
1012506-11 = "沒錯。"
1012506-12 = "我要以御者為模特兒，畫一幅肖像畫。"
1012506-13 = "[s]「哦哦，真令人期待！」"
1012506-14 = "妞呵呵，敬請期待唷。#n因為今天會在特別的情境下進行。"
1012506-15 = "我會盡可能只用自己體內的魔力來完成這幅畫。"
1012506-16 = "[s1]「是為了實作考試練習嗎？」\n[s2]「該不會連帽子也要脫吧？」"
1012506-22 = "御，御者想讓我脫嗎……？"
1012506-23 = "如，如果是御者的要求……我願意接受。#n可是這裡人實在有點多……"
1012506-24 = "[s]「……你說的是帽子吧？」"
1012506-28 = "妞呵呵呵，你覺得呢？"
1012506-29 = "[s]「拜託你說是帽子！」"
1012506-30 = "妞呵呵，當然是帽子囉！"
1012506-31 = "那麼，既然已經跟御者打過招呼，我們就往工房出發吧。"
1012506-36 = "[ns]「咦？這不是去工房的路吧？」"
1012506-37 = "不，這的確是往工房的路沒錯。"
1012506-38 = "因為今天的工房就在這裡！"
1012506-39 = "我要在狂獵最熱鬧的地方畫御者的肖像！"
1012506-40 = "在這種地方作畫，一定能讓我更有自信！"
1012506-41 = "[s3]「這麼做的話確實……」\n[s4]「在很多人看的地方畫畫，應該能夠鍛鍊自信。」"
1012506-44 = "那麼，請御者坐到這邊的椅子上吧。我馬上把畫布架好。"
1012506-51 = "嗯？是戶外寫生嗎？"
1012506-52 = "正好有點無聊，過去看看吧。"
1012506-57 = "[ns]「圍觀的人開始聚過來了……」"
1012506-59 = "沒，沒問題的！這都在預料之內！"
1012506-63 = "那麼開始吧。"
1012506-64 = "在公開工房進行的，我的世界創造魔法！"
1012506-67 = "― [log=에리]……我想起了第一次畫畫的日子。[/log][wa:7320] "
1012506-70 = "― [log=에리]那時……我筆直地、純粹地，[/log][wa:1980] "
1012506-72 = "― [log=에리]面對著畫布。[/log][wa:400] "
1012506-75 = "― [log=에리]而現在的我……並不一樣。[/log][wa:2400] "
1012506-78 = "― [log=에리]變得不知道該畫什麼才好，[/log][wa:1520] "
1012506-80 = "― [log=에리]失去了自信……[/log][wa:1480] "
1012506-83 = "― [log=에리]就在那時，[/log][wa:700] "
1012506-85 = "― [log=에리]御者告訴了我。[/log][wa:880] "
1012506-88 = "― [log=에리]名為「夢想」的魔法，[/log]"
1012506-90 = "― [log=에리]早已寄宿在心裡。[/log][wa:1890] "
1012506-93 = "― [log=에리]只要有夢想……從今以後，[/log][wa:3170] "
1012506-95 = "― [log=에리]似乎就不會再迷失方向了。[/log][wa:1010] "
1012506-98 = "― [log=에리]御者……可以的話，[/log][wa:1650] "
1012506-100 = "― [log=에리]能跟我走上同樣的道路嗎？[/log][wa:1300] "
1012506-103 = "― [log=에리]色彩繽紛、充滿夢想的──[/log][wa:2140] "
1012506-105 = "― [log=에리]魔法之路！[/log]"
1012506-109 = "怎麼樣，御者？我的心意傳達到了嗎？"
1012506-110 = "[s5]「嗯，確實傳達到了。」\n[s6]「看來言靈魔法師並不是我，而是繪梨呢。」"
1012506-113 = "嘿嘿嘿……"
1012506-114 = "[s]「可以讓我看一眼嗎？」"
1012506-115 = "不行！要等完成之後才能給你看！"
1012506-120 = "哦，是繪梨醬！"
1012506-121 = "咦？這幅畫是……？"
1012506-122 = "大，大家？是是是從什麼時候……！？"
1012506-123 = "哇，是幅很有衝擊力的肖像畫耶！#n繪梨的色彩品味真棒！"
1012506-124 = "呵呵，剛才還一臉害羞，結果畫得很好嘛。"
1012506-125 = "真，真的嗎……？"
1012506-126 = "啊，抱歉打擾你了。那我們先走囉！"
1012506-127 = "加油，繪梨醬！"
1012506-131 = "嘿嘿嘿……"
1012506-132 = "[s]「是群好朋友呢。」"
1012506-133 = "是啊，大家都是善良的人。"
1012506-134 = "……果然，我的擔心是多餘的啊。"
1012506-139 = "那麼我們繼續吧！"
1012506-144 = "只屬於我的──世界創造！"
1012506-146 = "（最終在眾人的注視與鼓勵下，繪梨完成了作品）"
1012506-147 = "（是一幅無論誰看都能感受到「繪梨風格」的精彩作品）"

[translation]
1012506-1 = "Magical Painter"
1012506-2 = "As I promised Eri, I headed out to the Wildhunt Academy campus."
1012506-8 = "Ooh! This way, Master!"
1012506-9 = "Everything's all ready. Let's begin."
1012506-10 = "[s] \"You said you'll be painting today, right?\""
1012506-11 = "Correct."
1012506-12 = "I plan on drawing a portrait. With you as the model, Master."
1012506-13 = "[s] \"Ooh, I'm looking forward to it.\""
1012506-14 = "Nyuhuhu, you should. We're painting under special circumstances today."
1012506-15 = "I'll be drawing using only the mana I have inside me."
1012506-16 = "[s1] \"Are you practicing for the practical exam?\"\n[s2] \"Are you going to take your hat off?\""
1012506-22 = "A-Are you asking me to strip, Master...?"
1012506-23 = "...Well, I will take it off if that's what you ask of me. But not with all these people around."
1012506-24 = "[s] \"...You're talking about the hat, right?\""
1012506-28 = "Nyuhuhu, perhaps..."
1012506-29 = "[s] \"Please say you are!\""
1012506-30 = "Nyuhuhu, yes. I do mean the hat."
1012506-31 = "Now then, without further ado, let's be off to the atelier."
1012506-36 = "[ns] \"Hey, isn't the atelier the other way?\""
1012506-37 = "Ah, not today, it isn't."
1012506-38 = "Because today, THIS will be our atelier!"
1012506-39 = "I'll paint your portrait right here, the spot with the most foot traffic in all of Wildhunt Academy!"
1012506-40 = "Painting here, in this crowd, should boost my confidence and then some."
1012506-41 = "[s3] \"Good idea.\"\n[s4] \"If you can paint for an audience, you can paint anywhere.\""
1012506-44 = "Now then, please sit right there, if you would. I'll just break out the canvas..."
1012506-51 = "Hm? Oh, she's practicing outdoors?"
1012506-52 = "I'm not busy. You want to go check it out?"
1012506-57 = "[ns] \"And here's our audience already.\""
1012506-59 = "A-As expected. Nothing to worry about it."
1012506-63 = "...Let's begin."
1012506-64 = "Here, in public, observe my magic, as I spin a whole world with my will!"
1012506-67 = "― [log=에리]...This reminds me of the first time I ever picked up a brush.[/log][wa:5440] "
1012506-70 = "― [log=에리]Back then... I was so fresh and pure...[/log][wa:940] "
1012506-72 = "― [log=에리]...when I faced that canvas. [/log][wa:10] "
1012506-75 = "― [log=에리]But now... I don't feel that way anymore.[/log][wa:1240] "
1012506-78 = "― [log=에리]I lost the magic of my inspiration... [/log][wa:480] "
1012506-80 = "― [log=에리]and with it, I lost my confidence.[/log][wa:400] "
1012506-83 = "― [log=에리]But then,[/log][wa:540] "
1012506-85 = "― [log=에리]you told me, Master...[/log][wa:280] "
1012506-88 = "― [log=에리]...that dreams are a magic all their own,[/log]"
1012506-90 = "― [log=에리]right here in my heart.[/log][wa:1290] "
1012506-93 = "― [log=에리]That those dreams could keep me[/log][wa:2410] "
1012506-95 = "― [log=에리]from getting lost on the path.[/log][wa:290] "
1012506-98 = "― [log=에리]Master...if you don't mind, [/log][wa:890] "
1012506-100 = "― [log=에리]would you like to walk the path with me?[/log][wa:180] "
1012506-103 = "― [log=에리]The path of magic,[/log][wa:1900] "
1012506-105 = "― [log=에리]full of colorful dreams![/log]"
1012506-109 = "How do you feel, Master? Did my heart reach you?"
1012506-110 = "[s5] \"It certainly did.\"\n[s6] \"Your words are magic, Eri.\""
1012506-113 = "Heeheehee..."
1012506-114 = "[s] \"Could I take a peek at the painting?\""
1012506-115 = "Not yet! I'll show you when I finish!"
1012506-120 = "Oh, it's Eri!"
1012506-121 = "Whoa, look at her picture, though..."
1012506-122 = "E-Everyone? Wh-Wh-When did you get here?!"
1012506-123 = "That's a REALLY impressive portrait. And I can see it's got your color scheme!"
1012506-124 = "Don't be shy. It looks amazing!"
1012506-125 = "Y-You mean it?"
1012506-126 = "Ah, sorry! I shouldn't distract you. I'll see you later!"
1012506-127 = "You rock, Eri! Keep it up!"
1012506-131 = "Ehe, eheehee..."
1012506-132 = "[s] \"Those are good friends you've got there.\""
1012506-133 = "They really are wonderful."
1012506-134 = "...And I was so worried over nothing."
1012506-139 = "I'd best keep at it, then!"
1012506-144 = "Spinning these worlds of my own design!"
1012506-146 = "And so, with the support and admiration of many people around her, Eri completed her work."
1012506-147 = "It was an incredible piece, made with her own distinctive style."

[translation]
1012506-1 = "ภาพวาดแห่งเวทมนตร์"
1012506-2 = "(คุณครูมาที่สถาบันไวลด์ฮันต์ตามที่รับปากกับเอริไว้)"
1012506-8 = "โอ้! ทางนี้ค่ะ มาสเตอร์!"
1012506-9 = "ทุกอย่างพร้อมแล้วค่ะ รีบไปกันเถอะค่ะ"
1012506-10 = "[s] \"วันนี้จะวาดรูปใช่มั้ย?\""
1012506-11 = "ใช่ค่ะ"
1012506-12 = "วันนี้ฉันอยากจะวาดรูปเหมือนของมาสเตอร์ค่ะ"
1012506-13 = "[s] \"โอ้ คาดหวังแล้วนะ?\""
1012506-14 = "อุฮุฮุ ตั้งตารอได้เลยค่ะ วันนี้เราจะวาดรูปกันในสถานการณ์พิเศษนิดหน่อยค่ะ"
1012506-15 = "ฉันจะวาดรูปโดยใช้พลังมานาที่มีอยู่ในตัวของฉันค่ะ"
1012506-16 = "[s1] \"ฝึกวาดรูปเพื่อเตรียมตัวสอบสินะ?\"\n[s2] \"หรือว่าจะถอดหมวกวาดรูปเหรอ?\""
1012506-22 = "มะ... มาสเตอร์อยากเห็นฉันเปลือยเปล่าตอนวาดภาพเหรอคะ...?"
1012506-23 = "เอ่อ... ถ้าเป็นความต้องการของมาสเตอร์ ฉันก็ยินดีทำตามค่ะ แต่ถ้าเป็นที่ที่คนเยอะแบบนี้มันค่อนข้างลำบากนะคะ"
1012506-24 = "[s] \"หมายถึงหมวกใช่มั้ย...?\""
1012506-28 = "อุฮุฮุ คิดว่าอะไรล่ะคะ?"
1012506-29 = "[s] \"แค่ตอบว่าใช่ก็พอ!\""
1012506-30 = "อุฮุฮุ ใช่ค่ะ ฉันหมายถึงหมวกน่ะค่ะ!"
1012506-31 = "เอาละ ทักทายกันพอแล้ว เราไปที่สตูดิโอกันเถอะค่ะ"
1012506-36 = "[ns] \"หืม? นี่ไม่ใช่ทางไปสตูดิโอนี่นา?\""
1012506-37 = "เปล่าสักหน่อยค่ะ นี่เป็นทางไปสตูดิโอถูกแล้วค่ะ"
1012506-38 = "เพราะที่นี่คือสตูดิโอที่เราจะใช้วาดรูปในวันนี้ค่ะ!"
1012506-39 = "ฉันจะวาดรูปมาสเตอร์ที่นี่... ในบริเวณที่คนพลุกพล่านที่สุดของสถาบันไวลด์ฮันต์ค่ะ"
1012506-40 = "ถ้าวาดรูปในที่แบบนี้ละก็ จะต้องช่วยเพิ่มความมั่นใจให้ฉันได้แน่ๆ ค่ะ!"
1012506-41 = "[s3] \"ถ้าเป็นวิธีนี้ก็อาจจะได้ผลเนอะ\"\n[s4] \"ถ้าวาดรูปในที่ที่คนเยอะแบบนี้ได้ ก็คงมั่นใจขึ้นแหละเนอะ\""
1012506-44 = "เอาละค่ะ รบกวนมานั่งที่เก้าอี้ตรงนี้ด้วยค่ะ ฉันขอขึงผ้าใบก่อนนะคะ"
1012506-51 = "หืม? ฝึกวาดภาพกลางแจ้งเหรอ?"
1012506-52 = "กำลังเบื่อๆ อยู่พอดีเลย เข้าไปดูกันเถอะค่ะ"
1012506-57 = "[ns] \"เริ่มมีคนมามุงเยอะแล้วนะ...\""
1012506-59 = "มะ... ไม่เป็นไรหรอกค่ะ! ฉันคาดการณ์ไว้แล้วว่าจะเป็นแบบนี้ค่ะ"
1012506-63 = "งั้นจะเริ่มเลยนะคะ"
1012506-64 = "ฉันจะแสดงเวทมนตร์สร้างโลกของฉัน ณ ที่แห่งนี้เอง!"
1012506-67 = "― [log=에리]ฉันนึกถึงตอนที่วาดภาพครั้งแรกเลยค่ะ[/log][wa:6520] "
1012506-70 = "― [log=에리]ตอนนั้น... ฉันเผชิญหน้ากับผ้าใบแคนวาส[/log][wa:1020] "
1012506-72 = "― [log=에리]อย่างซื่อสัตย์และบริสุทธิ์ใจ [/log][wa:10] "
1012506-75 = "― [log=에리]ฉันในตอนนี้เหมือนไม่ใช่ตัวฉันเองเลยค่ะ[/log][wa:1360] "
1012506-78 = "― [log=에리]ฉันไม่รู้ว่าจะวาดอะไรดี [/log][wa:1040] "
1012506-80 = "― [log=에리]และสูญเสียความมั่นใจไปหมด...[/log][wa:640] "
1012506-83 = "― [log=에리]และในตอนนั้นเอง[/log][wa:300] "
1012506-85 = "― [log=에리]มาสเตอร์ก็ทำให้ฉันได้รู้ค่ะ[/log][wa:80] "
1012506-88 = "― [log=에리]ว่าเวทมนตร์ที่ชื่อว่า <ความฝัน>[/log]"
1012506-90 = "― [log=에리]มันอยู่ในใจของฉันอยู่แล้ว[/log][wa:1210] "
1012506-93 = "― [log=에리]ถ้ามีความฝันละก็... ไม่มีทาง[/log][wa:2530] "
1012506-95 = "― [log=에리]ที่จะหลงทางอีกแน่นอนค่ะ[/log][wa:570] "
1012506-98 = "― [log=에리]มาสเตอร์... ถ้าไม่รบกวนเกินไป[/log][wa:850] "
1012506-100 = "― [log=에리]ช่วยเดินไปกับฉันได้มั้ยคะ?[/log][wa:740] "
1012506-103 = "― [log=에리]เดินไปด้วยกันบนเส้นทางแห่งเวทมนตร์[/log][wa:1260] "
1012506-105 = "― [log=에리]ที่เต็มไปด้วยความฝันอันสดใสนี้กันนะคะ![/log]"
1012506-109 = "เป็นยังไงบ้างคะ มาสเตอร์ รับรู้ได้ถึงความในใจของฉันรึเปล่าคะ?"
1012506-110 = "[s5] \"แน่นอน ครูรับรู้แล้วละ\"\n[s6] \"คนที่มีวัจนมนตราน่ะไม่ใช่ครูหรอก แต่เป็นเอริต่างหาก\""
1012506-113 = "อ่า แหะๆๆ..."
1012506-114 = "[s] \"ขอครูดูหน่อยได้มั้ย?\""
1012506-115 = "ไม่ได้ค่ะ! รอให้เสร็จก่อนแล้วฉันจะให้ดูค่ะ!"
1012506-120 = "โอ๊ะ เอริจังนี่นา!"
1012506-121 = "เอ๋? ภาพนี้มัน...?"
1012506-122 = "ทะ... ทุกคน? มะ... มะ... มาตั้งแต่เมื่อไรน่ะ?!"
1012506-123 = "ว้าว เป็นภาพเหมือนที่น่าประทับใจสุดๆ เลยแฮะ รู้สึกได้ถึงเอกลักษณ์เฉพาะตัวของเอริเลย!"
1012506-124 = "ฮุฮุ เขินเหรอ รูปนี้สวยสุดๆ เลยนะ"
1012506-125 = "งะ... งั้นเหรอคะ...? "
1012506-126 = "อ๊ะ โทษที! ฉันไม่กวนแล้ว ไปก่อนนะ!"
1012506-127 = "เท่มากเลย เอริจัง! สู้ๆ นะ!"
1012506-131 = "แหะๆ แหะๆๆ..."
1012506-132 = "[s] \"เป็นกลุ่มเพื่อนๆ ที่ดีจังเลยนะ\""
1012506-133 = "ค่ะ ทุกคนเป็นคนดีมากๆ เลยค่ะ"
1012506-134 = "...ฉันคงกังวลมากไปเองสินะคะ"
1012506-139 = "งั้นขอวาดต่อเลยนะคะ!"
1012506-144 = "เวทมนตร์สร้างโลกของฉัน...!"
1012506-146 = "(หลังจากนั้นก็มีคนเข้ามาให้กำลังใจมากมาย และเอริก็วาดรูปจนเสร็จ)"
1012506-147 = "(ทุกคนเห็นด้วยว่าภาพวาดของเอริเป็นผลงานที่ยอดเยี่ยมและน่าทึ่งมาก)"

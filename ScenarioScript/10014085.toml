[translation]
10014085-2 = "อ่า เริ่มหิวแล้วสิ..."
10014085-3 = "น่าเบื่อชะมัดเลย เราสั่งอะไรมากินกันดีมั้ย?"
10014085-4 = "ยะ... โยชิมิจัง? ในตู้เย็นยังมีของกินอีกเยอะเลยไม่ใช่เหรอ...?"
10014085-5 = "อันนั้นไม่ได้สิ ของในนั้นมันกำหนดไว้แล้วว่าต้องกินให้หมดตอนไหน มันคนละอย่างกันนะ"
10014085-6 = "ฉันจะสั่งผ่านแอปสั่งอาหาร... ทุกคนจะกินด้วยใช่มั้ย?"
10014085-7 = "กินอะไรดี? ไอริ เธอว่าไง?"
10014085-8 = "อืม~ ถ้างั้นวันนี้เอาเป็น..."
10014085-9 = "พาร์เฟต์มินต์ช็อกโกแลตมั้ย?"
10014085-10 = "วันนี้ 'เอาเป็น'...?"
10014085-11 = "เอาเป็นว่าเข้าใจแล้ว... ไอริสั่งเมนูนั้นเลย..."
10014085-12 = "นัตสึ... เธอล่ะ?"
10014085-19 = "ฉัน... <นัตสึ>"
10014085-20 = "ยูโทริ.... นัตสึ"
10014085-21 = "ไม่ได้ถามว่าเธอเป็นใครสักหน่อย ถามว่าจะกินอะไรต่างหากเล่า"
10014085-22 = "เชื่อเค้าเลย..."
10014085-23 = "เฮ้อ ช่างเถอะ เดี๋ยวฉันสั่งให้เองแล้วกัน สั่งอะไรมาก็กินอันนั้นไปแหละ"
10014085-24 = "นัตสึกับฉัน... เอาเป็นอันนี้คนละอัน..."
10014085-25 = "และสุดท้ายก็..."
10014085-26 = "'เธอ' ล่ะจะกินอะไร..."
10014085-30 = "เอ๊ะ? ใครมาน่ะ?"
10014085-31 = "[s1] \"มารวมกันอยู่ที่นี่เอง\"\n[s2] \"สวัสดีนะ\""
10014085-32 = "อ๊ะ? คุณครู...?"
10014085-33 = "อ๊ะ? คุณครู...?"
10014085-34 = "เหมือนจะมาตอนที่กำลังจะสั่งอะไรอยู่พอดีเลยนะ โชคดีจัง"
10014085-35 = "ไหนๆ ก็สั่งแล้ว สั่งให้พวกเราด้วย..."
10014085-36 = "ฮะฮ่า!! กลับมาแล้วสินะคะ กำลังรออยู่เลยค่ะ! เคียวยามะ คาซึสะ!!"
10014085-37 = "...?"
10014085-38 = "[s3] \"ยัยคนที่น่าหนวกหูสินะ\"\n[s4] \"ดูท่าจะกำลังรออยู่เลยนะ\""
10014085-39 = "อ่อ... เดี๋ยวก่อน อะไรน่ะ..."
10014085-40 = "อ่อ... เดี๋ยวก่อน อะไรน่ะ..."
10014085-41 = "ไม่สิ เดี๋ยวนะ มันอะไรกันล่ะเนี่ย?"
10014085-42 = "ทำไมถึงมาอยู่ที่นี่ได้..."
10014085-43 = "ที่นี่คือ 'รังโจร' ของคุณจริงๆ ด้วยสินะคะ!?"
10014085-44 = "ได้ยินเรื่องทั้งหมดแล้วค่ะ! ที่ว่าเอาชนะแยงกี้สาวทั้งหมดในพื้นที่ได้ด้วยตัวคนเดียว...! สร้างตำนานอีกแล้วนะคะ!!"
10014085-45 = "ปีศาจที่ถูกผนึกไว้แห่งทรีนิตี้! แคทส์ พาลูค!!"
10014085-46 = "พูดอะไรของเธออีกแล้วน่ะ!? พูดอะไรฟังแล้วไม่เห็นจะรู้เรื่องเลยสักนิด!?"
10014085-47 = "ไม่สิ พูดอะไรของเธอกันแน่เนี่ย? เอาชนะแยงกี้สาวทั้งหมดงั้นเหรอ? ใครบอกกันหา? ไปฟังมาจากไหนน่ะ!?"
10014085-48 = "ฮุฮุ ฉันมีแหล่งข่าวค่ะ เหล่าอัศวินที่รับหน้าที่ปิดผนึกคุณเอาไว้..."
10014085-49 = "นั่นก็คือ <แก๊งของหวานหลังเลิกเรียน> ผู้กล้าหาญและสูงส่ง"
10014085-50 = "...??? นั่นมันเรื่องอะไรกัน..."
10014085-58 = "หึ..."
10014085-59 = "[s5] \"จะว่าไป ที่พูดก็ไม่ผิดนะ\"\n[s6] \"...ปฏิเสธไม่ได้อย่างน่าแปลกเลยละนะ\""
10014085-64 = "โยชิมิ-!!! นัตสึ-!!!"
10014085-65 = "นี่พวกเธอเป็นบ้ากันไปหมดแล้วรึไง!? ถอนคำพูดเดี๋ยวนี้เลย อธิบายให้ยัยนี่เข้าใจใหม่เลยนะ!!"
10014085-66 = "พวกเธอคงทำไปแบบนั้นเพราะไม่รู้เรื่องอะไร แต่ยัยนี่น่ะเชื่อจริงๆ นะ!! ยัยนี่ไม่รู้จักคำว่าล้อเล่นเลยสักนิด ...!!"
10014085-71 = "นี่คือ <การแข่งขัน> ค่ะ! เคียวยามะ คาซึสะ!!"
10014085-75 = "เฮ้อ..."
10014085-76 = "พวกเธอ... ไว้มีโอกาสเมื่อไร ฉันจะ..."
10014085-77 = "บุกจู่โจม!!"
10014085-93 = "จะฆ่าพวกเธอหมกตู้เย็นซะเลย!!"
10014085-94 = "เรื่องเล่าชมรมของหวาน ~ความลับรสหวานกับดงปืน~"

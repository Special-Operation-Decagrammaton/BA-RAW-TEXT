[translation]
10014085-2 = "肚子餓了……"
10014085-3 = "閒著沒事，要不要叫點外送來吃？"
10014085-4 = "喜，喜美醬？#n冰箱裡已經有很多東西了不是嗎……？"
10014085-5 = "冰箱裡的東西不是這種時候吃的。#n每個東西都有適合吃的時候嘛。"
10014085-6 = "來用App點餐好了……大家也要吃吧？"
10014085-7 = "要吃什麼？愛莉？"
10014085-8 = "唔嗯，那今天就……"
10014085-9 = "薄荷巧克力聖代吧？"
10014085-10 = "今天「就」……？"
10014085-11 = "知道了……那愛莉就吃那個吧……"
10014085-12 = "夏呢？"
10014085-19 = "我是……「夏」。"
10014085-20 = "……柚鳥……夏。"
10014085-21 = "我不是在問你是誰，是在問你要吃什麼！"
10014085-22 = "唉……算了。"
10014085-23 = "我幫你隨便點，之後可別抱怨啊。"
10014085-24 = "夏和我就……吃這個吧……"
10014085-25 = "接下來是……"
10014085-26 = "「你」要吃什……"
10014085-30 = "……咦，有誰來了嗎？"
10014085-31 = "[s1] 「大家都到齊了啊。」\n[s2] 「大家好呀。」"
10014085-32 = "咦？老師……？"
10014085-33 = "咦？老師……？"
10014085-34 = "哦，在點外送嗎？Lucky。"
10014085-35 = "順便幫我們點吧……"
10014085-36 = "哈哈哈！！你果然回來了！#n我等你很久了！杏山千紗！！"
10014085-37 = "……？"
10014085-38 = "[s3] 「是熱血又吵鬧的笨蛋。」\n[s4] 「好像等你很久了呢。」"
10014085-39 = "……咦，等一下。#n……什麼情況。"
10014085-40 = "……咦，等一下。#n……什麼情況。"
10014085-41 = "不是……這怎麼回事？"
10014085-42 = "你為什麼會在這裡……？"
10014085-43 = "這裡果然就是你的「巢穴」啊！！"
10014085-44 = "我全都聽說了！竟然一個人把那些太妹全都收拾掉了……！#n又留下了一個傳說呢……！"
10014085-45 = "凱茜．帕魯格……被封印在三一的魔獸！！"
10014085-46 = "你在說什麼我完全聽不懂！？"
10014085-47 = "話說，你剛才說什麼？把太妹全都解決掉了？#n誰跟你這麼說的？"
10014085-48 = "哼哼……我可是一直有在連絡的唷。#n跟封印著你的騎士們……"
10014085-49 = "崇高又勇敢的「放學後的甜點團」。"
10014085-50 = "……？#n什麼東西……"
10014085-58 = "……呵。"
10014085-59 = "[s5] 「原來如此……某種意義上也沒說錯呢。」\n[s6] 「……微妙的難以否定呢。」"
10014085-64 = "喜美！！！夏！！！"
10014085-65 = "你們瘋了嗎！？#n趕快更正那些話，好好跟這傢伙說明清楚啊！！"
10014085-66 = "這傢伙會信以為真的！！#n他搞不懂什麼是玩笑啊……！！"
10014085-71 = "「決鬥」吧！！杏山千紗！！"
10014085-75 = "……唉。"
10014085-76 = "……你們這些人。真的是，我之後一定會把你們所有人……"
10014085-77 = "先手必勝！！"
10014085-93 = "給我做好覺悟啊！！"
10014085-94 = "放學後的甜點故事～甜祕密和槍擊戰～"

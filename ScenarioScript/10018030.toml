[translation]
10018030-1 = "Episode 3; This Isn't Over!"
10018030-2 = "*pant* *pant* ...! Wh-Who even are you people?!"
10018030-3 = "Allow me to answer you."
10018030-4 = "We're pilgrims, and our holy sites are the gastronomic extremes of the world."
10018030-6 = "Undaunted by any hardship or obstacle standing between us and delicious food, we are none other than Gehenna's Gourmet Research Society. Eat or Die!"
10018030-12 = "The Gourmet Research Society?! Really?!"
10018030-13 = "The ones who jumped into a sea of fire for popcorn?!"
10018030-15 = "?!"
10018030-17 = "Where did you hear that nonsense?"
10018030-18 = "They didn't jump into a sea of fire, that's where they came from! They left because they already ate everything inside of it."
10018030-25 = "Rumor has it that one of them has a black hole for a stomach. If you get too close to her mouth, you get sucked in."
10018030-27 = "?!"
10018030-29 = "And don't they have some sort of curse? That no meal can be finished around them, because something always comes up."
10018030-35 = "A-Anyway!"
10018030-36 = "What are those demonic terrorists from the Gourmet Research Society doing here?"
10018030-37 = "Demonic?! Terrorists?!"
10018030-38 = "We just go around eating good food! A few explosions here and there are unavoidable in that process!"
10018030-39 = "I've heard how shameless the Gourmet Research Society is. Now I see all the rumors are true. How scary..."
10018030-40 = "Listen up! You have no right to interrupt us here!"
10018030-41 = "Right! We have the power of contract law on our side!"
10018030-42 = "The owner here is supposed to vacate the premises!"
10018030-43 = "We're just here for a friendly reminder."
10018030-44 = "Yeah! We're just being good neighbors! Except we're not actually neighbors...which means we're going out of our way to be nice!"
10018030-46 = "That's odd."
10018030-47 = "I don't remember my neighbors ever wearing helmets and threatening people with guns."
10018030-48 = "W-We don't threaten anybody with guns! We just threaten people while holding guns!"
10018030-49 = "So, why are the Gourmet Helmet Gangsters involved with Nyao Foods' supposed contract disputes?"
10018030-50 = "Can we assume then the existence of a relationship between Nyao Foods and the Gourmet Helmet Gangsters?"
10018030-54 = "Wh-Whaaaaat? That's crazy talk..."
10018030-55 = "W-We're toast if the higher-ups hear about this!"
10018030-56 = "Well, they won't hear about it if there are no witnesses."
10018030-57 = "But there are witnesses... Oh! I get it now. Yeah! No witnesses!"
10018030-58 = "Oh, I'm sorry, we must have given you a concussion since you can't seem to think straight anymore."
10018030-59 = "You couldn't even touch us a moment ago, so where is this confidence coming from?"
10018030-60 = "Heh heh heh... Fools! When cowards like us change our attitude, there's always a good reason!"
10018030-61 = "Whatever could you mean?"
10018030-62 = "No need for questions! Just turn around and realize your defeat!"
10018030-71 = "What's going on? Why were you spamming us with emergency calls?"
10018030-72 = "I wanna get this out of the way, there's a meeting for pet rock owners that I want to go to."
10018030-74 = "Reinforcements?"
10018030-75 = "I see. How quaint."
10018030-77 = "Now do you get it?"
10018030-78 = "No one challenges the Gourmet Helmet Gangsters and gets away with it!"
10018030-80 = "No, not that..."
10018030-81 = "What I understand now is that you're no better than a restaurant serving spoiled food."

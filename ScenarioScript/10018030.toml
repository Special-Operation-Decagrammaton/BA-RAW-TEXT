[translation]
10018030-1 = "第3話;別以為這樣就結束了！"
10018030-2 = "哈啊，哈啊……！你們，究竟是什麼人啊！"
10018030-3 = "這個問題，就由我來回答吧。"
10018030-4 = "我等是為了追求美食的極意而踏上旅途的孤獨巡禮者。EAT or DIE。"
10018030-6 = "只要是為了美食，任何苦難都能克服──那便是我們格黑娜美食研究會。"
10018030-12 = "美食研究會！？真的假的！？"
10018030-13 = "聽說是群能為了食物縱身跳入火海的傢伙！？"
10018030-15 = "！？"
10018030-17 = "不，不對。"
10018030-18 = "聽說是連火海都能吞下肚！"
10018030-25 = "如果是這樣的話，那胃裡有黑洞的傳聞也就合理了……"
10018030-27 = "！？"
10018030-29 = "我還聽說因為暴食而被下了詛咒，所以每到重要的時刻就會吃不到食物。"
10018030-35 = "總，總之！"
10018030-36 = "為什麼恐怖份子集團「美食研究會」會出現在麻雀亭這樣的地方？"
10018030-37 = "什麼恐怖份子嘛！真是失禮！"
10018030-38 = "我們只是在做美食巡禮而已！#n那些只是過程中的一點小插曲！"
10018030-39 = "看來美食研究會喪盡天良的傳言是真的。#n真是群可怕的傢伙……"
10018030-40 = "總之！你們沒有在這裡妨礙我們的權利！"
10018030-41 = "對啊，對啊！老闆娘可是已經在契約上簽名了！"
10018030-42 = "我們只不過是來提醒一下期限就快到了而已！"
10018030-43 = "告訴人家記得遵守約定有什麼問題嗎？"
10018030-44 = "就是啊就是啊！#n我們只是怕他忘了，所以才來提醒……就像友善的好鄰居一樣！"
10018030-46 = "你們說的話還真有意思呢。"
10018030-47 = "如果是來關心的，怎麼會用頭盔遮住臉，還威脅店主呢？"
10018030-48 = "有，有什麼意見嗎！"
10018030-49 = "再加上──為什麼饕餮頭盔團會介入麻雀亭和喵食品之間的糾紛呢？"
10018030-50 = "喵食品和饕餮頭盔團之間有什麼關聯嗎？"
10018030-54 = "哎……我們該不會搞砸了吧？"
10018030-55 = "完，完了……如果被上面的人知道的話，我們就……！"
10018030-56 = "不，目前還沒事。只要沒有目擊者的話，就什麼事都沒發生。"
10018030-57 = "是啊！只要沒有人看到就行了！"
10018030-58 = "看來你們還沒有看清現實啊。"
10018030-59 = "明明從剛才開始，就連一根手指都不敢輕舉妄動……現在為何又在胡言亂語呢？"
10018030-60 = "嘿嘿嘿……態度之所以會一百八十度急轉彎，當然是有相應的理由囉！"
10018030-61 = "理由……？"
10018030-62 = "沒錯！你們可別以為事情這樣就結束了！"
10018030-71 = "發生什麼事了？為什麼突然緊急呼叫？"
10018030-72 = "既然來都來了……趕緊把他們收拾掉吧。"
10018030-74 = "增援是嗎？"
10018030-75 = "原來如此，我明白了。"
10018030-77 = "現在知道自己的立場了吧？"
10018030-78 = "但已經太遲了！#n這就讓你們瞧瞧，和我們饕餮頭盔團作對會是什麼下場！"
10018030-80 = "你的好意我心領了──"
10018030-81 = "但我明白的，是你們不過是群玷汙美食的烏合之眾而已！"

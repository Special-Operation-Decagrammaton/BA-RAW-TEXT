[translation]
10018030-1 = "ตอนที่ 3;อย่าคิดว่าจะจบแค่นี้นะ!"
10018030-2 = "แฮ่ก... แฮ่ก...! ยัยพวกนี้เป็นใครกันเนี่ย!"
10018030-3 = "ฉันจะเป็นคนตอบเรื่องนั้นให้เองค่ะ"
10018030-4 = "ผู้โดดเดี่ยวที่ออกเดินทางเพื่อแสวงหาอาหารรสเลิศ EAT or DIE"
10018030-6 = "ถ้าเพื่อการลิ้มรสอาหารแสนอร่อยแล้วละก็ ต่อให้ลำบากแค่ไหนพวกเราก็ไม่หวาดหวั่น เพราะพวกเรา#nคือชมรมชิมอาหารของเกเฮนน่าค่ะ"
10018030-12 = "ชมรมชิมอาหาร?! พูดจริงเรอะ?!"
10018030-13 = "พวกที่ยินดีกระโดดลงไปในทะเลเพลิงเพื่อของอร่อยๆ นั่นน่ะนะ?"
10018030-15 = "?!"
10018030-17 = "ไม่หรอก"
10018030-18 = "ฉันได้ยินมาว่าพวกนั้นเอาชนะทะเลเพลิงได้แล้ว เป็นพวกกินแหลกไม่สนใครเลย"
10018030-25 = "งั้นเหรอ... ได้ยินว่าต่อให้มีอาหารกองมากมายแค่ไหน เจ้าพวกนั้นก็ฟาดเรียบได้ด้วย"
10018030-27 = "?!"
10018030-29 = "ได้ยินว่าโดนสาปให้อดกินของอร่อยทุกๆ ครั้งที่มีเรื่องสำคัญเลยด้วยนะ?"
10018030-35 = "จะ...จะยังไงก็เถอะ!"
10018030-36 = "พวกชมรมชิมอาหารที่เป็นผู้ก่อการร้ายจอมโหดแบบนั้น ทำไมถึงมาอยู่ที่นี่ได้ล่ะ?"
10018030-37 = "อะไรนะ? ผู้ก่อการร้ายเรอะ!"
10018030-38 = "พวกเราก็แค่ตามหาร้านอาหารอร่อยๆ แล้วระหว่างนั้นก็ชอบมีพวกเด็กเกเรโผล่ออกมาสร้างปัญหาให้ก็#nเท่านั้นเอง!"
10018030-39 = "ได้ยินว่าพวกชมรมชิมอาหารไม่มีจิตสำนึกด้วย ดูท่าจะเป็นเรื่องจริงซะด้วย คนน่ากลัวพวกนั้น..."
10018030-40 = "ยังไงก็เถอะ! พวกเธอไม่มีสิทธิ์มาขวางพวกเราหรอกนะเฟ้ย!"
10018030-41 = "ใช่ ใช่แล้ว! ยังไงซะสัญญากับข้อกฎหมายก็อยู่ข้างพวกเรายังไงเล่า!"
10018030-42 = "ตอนนี้ก็ถึงเวลาที่เจ้าของบอกว่าจะย้ายออกแล้วด้วย!"
10018030-43 = "พวกเราแค่มาบอกให้รักษาสัญญาก็เท่านั้นเอง คงไม่มีปัญหาใช่มั้ย?"
10018030-44 = "ใช่แล้ว ใช่แล้ว! พวกเราก็แค่มาเตือนเรื่องที่ลืมกันง่ายๆ ก็เท่านั้น... เหมือนเพื่อนบ้านแสนดีไงเล่า!"
10018030-46 = "ใช้คำพูดได้น่าสนใจดีนะคะ"
10018030-47 = "ชักจะสงสัยแล้วสิคะ ว่าเพื่อนบ้านที่แสนดีสมัยนี้ เค้าใส่หมวกกันน็อกแล้วมาข่มขู่เจ้าของร้านแบบนี้#nด้วยสินะคะ?"
10018030-48 = "ละ... แล้วจะทำไมล่ะ! ทำไปทำมามันก็ชินกับวิธีนี้ไปแล้วน่ะสิ!"
10018030-49 = "ยิ่งกว่านั้น นี่เป็นปัญหาของทางเนียวฟู้ด ทำไมแก๊งหมวกกันน็อกคุรุเมะอย่างพวกคุณถึงเข้ามาวุ่นวาย#nด้วยล่ะคะ?"
10018030-50 = "หรือว่าเรื่องนี้แก๊งหมวกกันน็อกคุรุเมะกับเนียวฟู้ดร่วมมือกันเหรอคะ?"
10018030-54 = "เอ๋...? หรือว่าพวกเราไม่ควรยุ่งเรื่องนี้งั้นเหรอ?"
10018030-55 = "อึก?! ซะ...ซวยแล้ว! ถ้าเรื่องนี้ไปเข้าหูถึงเบื้องบนละก็ พวกเราได้กลายเป็นปุ๋ยกันแน่ๆ...!"
10018030-56 = "ไม่สิ ลองคิดดูสิ ถ้าไม่มีใครเห็นละก็... ถือเป็นอาชญากรรมที่สมบูรณ์แบบเลยนะ"
10018030-57 = "ใช่... จริงด้วย! แค่ทำให้ไม่มีผู้เห็นเหตุการณ์ก็พอแล้วนี่!"
10018030-58 = "ดูท่าทางความสามารถในการพิจารณาสถานการณ์ก็ตกต่ำลงด้วยนะคะ"
10018030-59 = "ก่อนหน้านี้พวกคุณยังทำอะไรพวกเราไม่ได้แท้ๆ... จะยังพูดแบบนี้อีกเหรอคะ?"
10018030-60 = "ฮี่ๆๆ... เวลาที่คนอย่างพวกเรามีท่าทีเปลี่ยนไป มันก็มีเหตุผลอยู่นะ..."
10018030-61 = "เหตุผล...?"
10018030-62 = "ใช่แล้ว! ตอนนี้พวกเธอเจอดีแน่!"
10018030-71 = "มีอะไรกันน่ะ? ทำไมจู่ๆ ถึงเรียกรวมพลกะทันหันล่ะ?"
10018030-72 = "เรามาตามที่เรียกแล้ว รีบๆ จัดการแล้วไปนอนกันดีกว่า"
10018030-74 = "กำลังสนับสนุนเหรอคะ?"
10018030-75 = "อย่างนี้เองสินะคะ เข้าใจแล้วค่ะ"
10018030-77 = "เข้าใจแล้วใช่มั้ยห้ะ?"
10018030-78 = "กล้ามาวุ่นวายกับแก๊งหมวกกันน็อกคุรุเมะของเราแบบนี้ จบไม่สวยแน่!"
10018030-80 = "เปล่าค่ะ..."
10018030-81 = "ที่ฉันเข้าใจคือ... คุณเป็นพวกเดียวกับคนที่ยกย่องอาหารไม่อร่อยพวกนั้นค่ะ"

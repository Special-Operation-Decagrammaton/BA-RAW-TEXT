[translation]
1012906-1 = "少女追尋的光芒"
1012906-2 = "（來到了鈴美告知的地點）"
1012906-3 = "（是三一內的一間清幽的遊樂園）"
1012906-6 = "（過了10分鐘之後，看見了鈴美的身影）"
1012906-10 = "老師，對不起我遲到了！！"
1012906-11 = "真的非常抱歉。"
1012906-12 = "[s1]「沒事沒事，我也才剛到而已！」\n[s2]「沒關係沒關係。」"
1012906-15 = "感謝您的寬容大量……"
1012906-16 = "之，之所以打扮成這樣，和我今天遲到的原因有關……"
1012906-17 = "其實昨天……"
1012906-18 = "可能是因為太累的關係，結果不小心把簽字筆和衣服一起拿去洗了……"
1012906-19 = "……最後完好無損的，就只有這套衣服而已。"
1012906-20 = "當，當然……我已經事先打電話向遊樂園說明了！"
1012906-21 = "今天沒有舉行其他活動，所以應該不會被誤認成表演的角色。"
1012906-22 = "[s3]「你一定很難過吧。謝謝你還願意來。」\n[s4]「有記得提前聯絡，冷靜的處理很棒哦！」"
1012906-25 = "畢竟……這種確認是很重要的。"
1012906-26 = "（……再加上不希望因此跟老師說「下次再約」）"
1012906-27 = "（因為今天也想見到老師……）"
1012906-28 = "[s5]「非常漂亮哦！超帥氣的！」\n[s6]「而且我覺得這套衣服很適合遊樂園！」"
1012906-31 = "是，是嗎？那真是太好了。"
1012906-33 = "（和鈴美一起在遊樂園享樂）"
1012906-34 = "（因為這套服裝而很受小朋友們的喜愛）"
1012906-38 = "吃我這招！Giga Lighting！！"
1012906-39 = "怪獸又出現了！！"
1012906-40 = "那是……舞台表演呢。"
1012906-41 = "和怪獸軍團的大決戰……#n原來如此，是英雄秀啊。"
1012906-42 = "……"
1012906-44 = "（鈴美靜靜地站著，望向舞台看了好一陣子）"
1012906-51 = "啊。"
1012906-52 = "不好意思。我好像耽誤太久了。"
1012906-53 = "[s]「有什麼煩惱嗎？」"
1012906-54 = "要說是煩惱的話……也許算是吧。"
1012906-55 = "人們似乎很喜歡英雄拯救他人的故事呢。"
1012906-56 = "比如那位英雄，還有我現在扮成的魔法少女……都是這種類型的故事。"
1012906-57 = "大家之所以盼望著英雄……也許是因為現實中不存在英雄的關係吧。"
1012906-58 = "……我剛才就在思考這些。"
1012906-59 = "[s7]「英雄現在就在我眼前哦？」\n[s8]「不僅穿著英雄的衣服，還以英雄的方式行動著。」"
1012906-64 = "是嗎？"
1012906-65 = "……"
1012906-66 = "雖然不想以英雄的身分自居……"
1012906-67 = "不過……我並不討厭被老師這麼稱呼。"
1012906-68 = "因為老師您，總是真心誠意地對待我。"
1012906-69 = "能坦率地接受對方的好意，原來是這麼令人開心的事啊。"
1012906-70 = "[s9]「因為鈴美真的非常帥氣！」\n[s10]「因為鈴美真的帥到不行！」"
1012906-73 = "謝謝您願意陪著我。"
1012906-74 = "即使只是些無趣的話題，您也願意溫柔地聽我訴說。"
1012906-75 = "啊，已經晚上了呢……"
1012906-81 = "現在就算在這裡，似乎也能抓住星星了。"

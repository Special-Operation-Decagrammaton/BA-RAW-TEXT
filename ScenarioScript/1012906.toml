[translation]
1012906-1 = "The Sparkle the Girl Chased"
1012906-2 = "I went to where she asked."
1012906-3 = "It was a quiet Trinity amusement park."
1012906-6 = "About 10 minutes later, Suzumi arrived."
1012906-10 = "Sensei, I'm sorry for being late!"
1012906-11 = "Please accept my apology."
1012906-12 = "[s1]\"Don't be sorry, I just got here too!\"\n[s2]\"It's fine, it's fine.\""
1012906-15 = "Thank you for your grace..."
1012906-16 = "L-Look, this outfit? I have a reason. It's why I'm delayed."
1012906-17 = "The thing is, yesterday..."
1012906-18 = "I was a little tired. I guess I put a marker in with my laundry..."
1012906-19 = "...And...this was all I had left. So, of course I had to do my hair, too."
1012906-20 = "Really, though! I called the amusement park and they gave me permission to wear this!"
1012906-21 = "They don't have any events planned for today, so no one would mistake me for a cast member."
1012906-22 = "[s3]\"Thank you for coming.\"\n[s4]\"You did a great job!\""
1012906-25 = "Because things like this...are important."
1012906-26 = "(...And, of course, I couldn't miss seeing Sensei...)"
1012906-27 = "(I wanted to see them so much...)"
1012906-28 = "[s5]\"You look so pretty!\"\n[s6]\"You blend in with the amusement park!\""
1012906-31 = "Y-You think so? That's a relief."
1012906-33 = "I enjoyed the amusement park with Suzumi."
1012906-34 = "Her outfit made her quite popular!"
1012906-38 = "Now! Behold my giga lightning!"
1012906-39 = "More monsters have arrived?!"
1012906-40 = "That's...quite the stage performance."
1012906-41 = "Battling a monster army. What a fantasy."
1012906-42 = "..."
1012906-44 = "Suzumi stared at the stage for a while."
1012906-51 = "Ah."
1012906-52 = "Excuse me. I made you wait for so long."
1012906-53 = "[s]\"Is something on your mind?\""
1012906-54 = "I suppose...you could say that."
1012906-55 = "It seems like people enjoy stories where the hero rescues another."
1012906-56 = "I can't help but think about that as I wear this costume."
1012906-57 = "Perhaps everyone craves these stories because they don't normally exist."
1012906-58 = "...That's what I was thinking."
1012906-59 = "[s7]\"But I have a hero right in front of me.\"\n[s8]\"...Someone who acted heroic in a heroic outfit.\""
1012906-64 = "Is that so?"
1012906-65 = "..."
1012906-66 = "I never wanted to call myself a hero..."
1012906-67 = "...but it's not bad hearing it from Sensei."
1012906-68 = "Since you speak with such sincerity..."
1012906-69 = "...I enjoy your statement of goodwill."
1012906-70 = "[s9]\"It's because you're cool, Suzumi!\"\n[s10]\"You're super special!\""
1012906-73 = "Thank you for staying with me."
1012906-74 = "And thank you for being so kind and listening to my tedious stories."
1012906-75 = "Ah, night has fallen."
1012906-81 = "I feel like I could reach the stars from here, too."

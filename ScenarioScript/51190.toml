51190-189 = "3;슈로;09;애당초…… 당신은 이곳에, <백화요란>으로 돌아오고 싶어 하지도 않았잖아요? 계속해서 그곳에서 도망치고 싶어 한 주제에."
51190-190 = "3;슈로;10;다시 돌아오다니. 참으로 부끄럼 같은 것도 없는 건가요. 당신이란 인간은.\n#3;em;[한숨]"
51190-191 = "1;렌게;13;너…… 무슨 말을 하는 거야…….\n#1;ar\n#3;m5"
51190-192 = "3;슈로;02;어라라~~? 그 표정. 보아하니 설마 아직 모르고 있는 건가요~?\n#3;em;[반응]"

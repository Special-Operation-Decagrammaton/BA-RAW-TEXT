[translation]
51190-1 = "ตอนที่ 19;นักเล่าเรื่องลึกลับ จากชมรมความงามแห่งธรรมชาติ 1"
51190-4 = "เปลวไฟลุกโชน"
51190-5 = "ผีพรายมากมายปรากฏตัวบนท้องถนน"
51190-7 = "เมื่อมีสัญญาณบอกเทศกาล"
51190-12 = "พวกข้าจะไปหาพวกเจ้า"
51190-18 = "ใช่... ในที่สุดก็เริ่มแล้วสินะ"
51190-19 = "เอาละ ขอข้าดูหน่อยซิ"
51190-21 = "ตำนานร้อยเรื่องราวที่พวกเจ้าสร้างขึ้นน่ะ"
51190-37 = "[ns] \"สู้กันตั้งขนาดนี้... แต่ทำไมทางนั้นไม่ได้สักแผลเลย...\""
51190-40 = "อะไรน่ะ อะไรกันเนี่ย! โดนสาดกระสุนไปซะขนาดนั้น ทำไมไม่เห็นจะสะทกสะท้านผิวเลยสักนิด?!"
51190-42 = "อ๊าาา~! แบบนี้มันแปลกๆ นะ! รู้สึกเหมือนยิงไม่เข้าเลย~!"
51190-43 = "เหมือนกับยิงอากาศยังไงยังงั้นแหละ"
51190-44 = "ใช่ค่ะ รู้สึกเหมือนยิงภาพลวงตาที่ไม่มีอยู่จริงเลย..."
51190-46 = "...ไม่มีประโยชน์หรอก"
51190-47 = "[s] \"...นางุสะ?\""
51190-50 = "สิ่งนั้นน่ะ... ใช้ปืนธรรมดายิงไม่ได้ผลหรอก"
51190-51 = "ว่าไงนะ?! ทำไมล่ะ?!"
51190-52 = "เพราะว่ามันคือ... ตำนานร้อยเรื่องราววิญญาณลี้ลับ"
51190-53 = "เรื่องน่ากลัวจากหนังสือลึกลับ <อิโนะ โมโนโนเคะ โรคุ> ที่ชมรมความงามของธรรมชาติสร้างขึ้นมา"
51190-54 = "ผีแบบนั้นน่ะ แค่กระสุนธรรมดาทำอะไรไม่ได้หรอก"
51190-55 = "หาา?! จะให้ฉันเชื่อเรื่องเหลวไหลอะไรแบบนั้นเหรอ?!"
51190-56 = "...ไม่สิ! ในเมื่อยิงไม่เข้าจริงๆ มันก็น่าเชื่ออยู่! แต่ก็!"
51190-58 = "ถ้าเป็นอย่างที่คุณนางุสะว่า... ก็แปลว่าเราไม่มีทางล้มผีตนนั้นได้เลยน่ะสิคะ?"
51190-59 = "ไม่มีอะไรทำให้มันบาดเจ็บได้เลยงั้นเหรอ! แบบนี้มันโกงกันเกินไปแล้วนะ! ใครเขียนบทให้มีตัวละคร#nแบบนี้น่ะ! โกงกันชัดๆ!"
51190-64 = "ใช่ว่าจะไม่มีวิธีรับมือเลยหรอกนะ..."
51190-65 = "[s] \"นางุสะ มีวิธีอื่นงั้นเหรอ?!\""
51190-66 = "สิ่งที่เอาชนะภูตผีปีศาจที่อยู่ในหนังสือลึกลับได้ มีเพียงคนที่ได้รับการยอมรับจากผู้พยากรณ์ใหญ่ คุซึโนฮะ และได้รับสืบทอดสิทธิ์นั้น"
51190-67 = "<หัวหน้าของเฮียกกะเรียวรัน> และ<[ruby=บัวขาวร้อยดอก]เฮียกกุเร็น[/ruby]> หลักฐานแสดงสิทธิ์ที่ครอบครอง โดยหัวหน้าคนนั้นเท่านั้น..."
51190-68 = "[s] (เหมือนเคยได้ยินเรื่องคล้ายๆ กันมาจากไหนเลย..)"
51190-70 = "นี่เป็นของในตำนานที่สืบทอดมาตั้งแต่ผู้พยากรณ์ใหญ่คุซึโนฮะ และเฉพาะหัวหน้าของเฮียกกะเรียวรัน#nเท่านั้นที่จะมีสิทธิ์ได้ครอบครองกันจากรุ่นสู่รุ่น..."
51190-71 = "มันคือ <ปืนปีศาจล่าผีในตำนาน> เจ้าค่ะ!"
51190-73 = "ถ้าไม่มีเฮียกกุเร็น... ก็ไม่สามารถสร้างบาดแผลให้ตำนานร้อยเรื่องราววิญญาณลี้ลับได้"
51190-74 = "งั้นแปลว่าพวกเราทำอะไรไม่ได้เลยเหรอ? ผีประหลาดอะไรนั่นกำลังก่อความไม่สงบถึงขนาดนั้นเลยนะ"
51190-75 = "...ใช่ พวกเราทำอะไรไม่ได้แล้ว"
51190-76 = "แล้วรุ่นพี่นางุสะรู้เรื่องนั้นได้ยังไง?"
51190-77 = "ที่ทุ่งหิมะใหญ่... ฉัน..."
51190-78 = "ไม่... ไม่มีอะไร จะยังไงก็ไม่สำคัญหรอก"
51190-79 = "เราต้องหนี ขืนอยู่ต่อไป ทุกคนก็จะมีแต่เจ็บตัวกันเสียเปล่า แล้วก็จะจบเห่กันหมด"
51190-80 = "ก่อนจะเป็นแบบนั้น... ก่อนจะเกิดเรื่องเหมือนตอนนั้น เราต้องรีบ...!"
51190-85 = "แบบนั้นน่ะมันทำให้ฉันอยู่เฉยๆ ไม่ได้หรอกนะ!"
51190-90 = "เรนเกะจัง...?"
51190-95 = "ไม่ลงมือทำอะไรเลย แล้วให้เอาแต่ไปทางโน้นทีทางนี้ทีเหมือนตอนที่ท้องฟ้าเป็นสีแดงอย่างคราวก่อน#nงั้นเหรอ?"
51190-96 = "ไม่เอา ฉันทำแบบนั้นไม่ได้หรอก!"
51190-97 = "เราจะไม่ทำอย่างตอนนั้นอีก..."
51190-98 = "ตอนนั้นทุกคนกำลังรอคอยความช่วยเหลือ แต่พวกเราทำอะไรไม่ได้เลย ฉันไม่อยากแก้ตัวว่าทำอะไร#nไม่ได้แล้ว แล้วยอมแพ้ไปดื้อๆ หรอกนะ!"
51190-99 = "[s] \"เรนเกะ...\""
51190-100 = "รุ่นพี่นางุสะพูดเองไม่ใช่เหรอว่าคนที่มีสิทธิ์นั้นสามารถกำจัดมันได้"
51190-101 = "ถ้างั้นก็แปลว่ารุ่นพี่ก็ทำได้ไม่ใช่เหรอ?! ก็รุ่นพี่เป็นรักษาการหัวหน้าเฮียกกะเรียวรันนี่นา!"
51190-107 = "ไม่ใช่... ฉัน... มือขวาของฉัน..."
51190-108 = "ฉัน... ทำไม่ได้"
51190-113 = "ทำไม่ได้หรอก ฉันไม่มี <สิทธิ์> ที่ว่า เพราะตอนนี้..."
51190-114 = "ไม่สิ ต่อให้จะบอกว่ามี <สิ่งนั้น> อยู่..."
51190-115 = "แต่ฉันก็ทำไม่ได้"
51190-116 = "รุ่นพี่ ทำไมล่ะ..."
51190-121 = "เพราะฉัน... ไม่ใช่อายาเมะ"
51190-126 = "อะฮ่าฮ่าฮ่าฮ่าฮ่า! รู้ตัวดีสินะคะ!"
51190-127 = "รู้ดีกว่าใครเพื่อนเลย~!"
51190-131 = "ใครน่ะ...?"
51190-138 = "ฮิฮิ ฮิฮิฮิ ถูกต้อง ถูกต้องเลย~! นางุสะจังพูดถูกแล้วละค่ะ"
51190-139 = "คุโระคาเงะคือหนึ่งในเรื่องน่ากลัวจากหนังสือลึกลับอิโนะ โมโนโนเคะ โรคุ พวกคุณน่ะ ทำให้บาดเจ็บไม่ได้แม้แต่ปลายเล็บหรอกค่ะ"
51190-140 = "แต่ถ้าเป็น... <อายาเมะ> ที่ได้รับการสืบทอดสิทธิ์มาจากผู้พยากรณ์ใหญ่ละก็ไม่แน่"
51190-146 = "ใช่มั้ยล่ะคะ? คุณเองก็รู้เรื่องนี้ดีเลยนี่คะ? นางุสะจัง"
51190-147 = "ทำไม... ทำไมเธอถึงมาอยู่ที่นี่..."
51190-148 = "ยาบูกิ... ชูโระ"
51190-149 = "[s] \"จากชมรมความงามของธรรมชาติ...?\""
51190-150 = "อะฮ่าฮ่าฮ่าฮ่าฮ่า~ น่าดีใจจัง~ จำฉันได้ทั้งนางุสะจังทั้งคุณครูจากชาเล่ต์เลยนะคะ"
51190-151 = "แล้วก็ขอบคุณนะคะคุณครู ที่ช่วยอยู่ด้วยกันจนถึงตรงนี้ตามที่ฉันบอก"
51190-152 = "ขอบคุณที่ไม่คิดว่าสิ่งที่ฉันบอกมันเป็นเรื่องเหลวไหลนะคะ~"
51190-153 = "เป็นยังไงบ้างคะ?"
51190-154 = "ถูกใจ <ความลึกลับ> ที่ฉันขนมาให้เต็มถนนกันไหมเอ่ย?"
51190-159 = "หมายความว่า... เรื่องวุ่นวายและพวกปีศาจบนท้องถนน...?"
51190-160 = "เป็นฝีมือของแกงั้นเหรอ?!"
51190-161 = "หืม? จริงเหรอ?! คนคนนั้นคือ...?!"
51190-162 = "[ns] \"ตัวต้นเรื่อง... ที่เรียกปีศาจออกมา...\""
51190-164 = "อ่ะฮ่า~ ศัตรูรู้ตัวแล้วสินะ แล้วก็โกรธขึ้นมาแล้วด้วย"
51190-165 = "ฉันละถูกใจพฤติกรรมนั้นของพวกคุณเอาเสียมากๆ เลยค่ะ มากจนอย่าบอกใครเลย~!"
51190-167 = "ไม่ต้องพูดอะไรไร้สาระ ตอบคำถามฉันมาก็พอ...!"
51190-169 = "ได้ค่ะ ถ้าเป็นคำถามจากพวกคุณ ฉันจะตอบให้อย่างดีเลย"
51190-170 = "งั้นฉันขอแนะนำตัวอย่างเป็นทางการนะคะ"
51190-171 = "ชื่อของฉันก็คือ ชูโระ"
51190-172 = "นักเล่าเรื่องลึกลับจากชมรมความงามแห่งธรรมชาติ..."
51190-173 = "ผู้ที่เรียกตำนานร้อยเรื่องราววิญญาณลี้ลับออกมา ณ ที่แห่งนี้อย่างที่พวกคุณว่า หวังว่าในวันข้างหน้าจะจำกันได้นะคะ ฮิฮิฮิ"
51190-174 = "[s] \"นักเล่าเรื่องลึกลับ...?\""
51190-175 = "อะฮ่า อะฮ่าฮ่า ทำหน้าแบบนั้นกันอีกแล้วนะ"
51190-176 = "ทำหน้าเหมือนกับไม่เข้าใจสาเหตุและก็งงกับสิ่งที่อยู่ตรงหน้าอย่างนั้นแหละ"
51190-177 = "แถมรอบนี้ยังเพิ่มสีหน้าที่จ้องมองฉันด้วยจิตใจที่คิดร้ายและความเป็นปรปักษ์ที่ลบออกไปไม่ได้อีก"
51190-178 = "น่าพอใจนะคะ ดีเลยค่ะ สีหน้าแบบนั้นน่ะ ฉันชอบ"
51190-179 = "โดยเฉพาะสีหน้าของคุณ... ถูกใจฉันมากที่สุดเลยละค่ะ นางุสะจัง"
51190-185 = "นี่มันนานแค่ไหนแล้วคะ หลังจากที่เราเจอกันในทุ่งหิมะใหญ่? ฮิฮิ"
51190-186 = "ฉันก็ว่าอยู่ว่าหลังจากนั้นคุณหนีไปอยู่ไหน ไม่คิดเลยนะว่าจะกลับมาที่เฮียกคิยาโคอีก"
51190-187 = "อ้อ สำหรับคนรั้งท้ายที่น่าสังเวชอย่างคุณแล้ว ต่อให้ตะลอนไปทั่ว แต่ก็คงมีแค่ที่นี่ที่เดียวที่กลับมาได้"
51190-188 = "แต่ยังไงก็... ดูไม่มีความละอายใจเอาเสียเลยนะคะ"
51190-189 = "ก็คุณไม่ได้อยากกลับมาที่ <เฮียกกะเรียวรัน> ตั้งแต่แรกแล้วนี่คะ? คนที่อยากหนีออกมาจากที่นั่น"
51190-190 = "แต่กลับหัวซุกหัวซุนกลับมา คนอย่างคุณน่ะ ไม่มีสิ่งที่เรียกว่ายางอายเลยนะคะ"
51190-191 = "นี่เธอ... พูดอะไรออกมา..."
51190-192 = "ตายแล้ว~~? ดูทำหน้าเข้าสิ น่าจะยังไม่รู้อะไรเลยนะคะเนี่ย~?"
51190-193 = "นางุสะจัง ยังคงเก็บเป็นความลับแล้วไม่ได้บอกอะไรกับทุกคนเลยเหรอคะ~?"
51190-198 = "ยังเอาแต่โกหกอยู่อีกงั้นเหรอคะ~?"
51190-200 = "อึก..."
51190-202 = "อ่ะฮ่าฮ่าฮ่า~~~"
51190-203 = "ยังใส่ชุดของเฮียกกะเรียวรัน ใช้ชื่อของเฮียกกะเรียวรัน แล้วปกปิดตัวตนที่แท้จริงด้วยการแสร้งทำเป็น#nรักษาการหัวหน้าเฮียกกะเรียวรันอยู่เหมือนเดิมเลย"
51190-204 = "นางุสะจังยังทำตัวน่าละอายไม่เปลี่ยนเลยนะ แต่ฉันคนนี้น่ะรู้หมดเปลือกแล้ว~"
51190-205 = "ไม่มีใครรู้เลยสินะคะ ทั้งสมาชิกเฮียกกะเรียวรันที่อยู่ ณ ที่แห่งนี้ แล้วก็คุณครูที่อยู่ตรงนั้นด้วย"
51190-207 = "หยุด... นะ..."
51190-209 = "ไม่รู้หรอกนะว่าแกเป็นใคร!"
51190-210 = "แต่ถ้าจะมาพูดจาเพ้อเจ้อให้เฮียกกะเรียวรันต้องขายหน้าละก็ ฉันไม่อยู่เฉยแน่...!"
51190-212 = "พูดจาเพ้อเจ้องั้นเหรอ แบบนี้ไม่ยุติธรรมนะคะ... ไม่ยุติธรรมเลย ว่ามั้ยคะ นางุสะจัง?"
51190-213 = "งั้นฉันจะพูดแทนให้เองค่ะ นางุสะจังคงจะอับอายขายหน้าจนพูดอะไรไม่ออก"
51190-214 = "ฉันจะบอกความจริงที่นางุสะจังที่ยืนอยู่ตรงนั้นปิดปากเงียบมาตลอด ฉันจะบอกแทนให้หมดเลยค่ะ"
51190-215 = "พอได้แล้ว..."
51190-216 = "พอได้แล้วงั้นเหรอคะ ฉันทำแบบนั้นไม่ได้หรอกค่ะ ก็ยัยบื้อที่อยู่ตรงโน้นหาว่าฉันพูดเพ้อเจ้อนี่คะ?"
51190-217 = "ฉันเป็นคนชอบตอบคำถามของคนอื่นค่ะ ถ้าใครถามอะไรมาก็ต้องตอบให้ได้อย่างสมเหตุสมผล ถึงจะเป็นยอดคนค่ะ"
51190-218 = "เพราะงั้นฉันก็จะบอกให้ค่ะ"
51190-222 = "ที่ผ่านมานางุสะจังเอาแต่พูดอย่างนี้ใช่มั้ยล่ะคะ?"
51190-224 = "<ฉันเป็นหัวหน้าเฮียกกะเรียวรันไม่ได้>"
51190-228 = "<ฉันไม่ใช่อายาเมะ> และ <ฉันไม่มีสิทธิ์อะไรแบบนั้น>"
51190-229 = "เอะอะก็อายาเมะ อายาเมะ เอาแต่ให้เหตุผลเรื่องอายาเมะอยู่เรื่อย"
51190-230 = "พอได้แล้ว...!"
51190-231 = "อ่ะฮ่าฮ่า"
51190-232 = "โธ่เอ๊ย"
51190-237 = "[log][ff4444]<โกหก>[-][/log]"
51190-240 = "[log][ff4444]<ทั้งๆ ที่ไม่เคยคิดแบบนั้นเลยแม้แต่ครั้งเดียว>[-][/log]"
51190-246 = "ที่จริงนั่นไม่ใช่เหตุผลเลยนี่? อย่ามาพูดจาเหลวไหลอยู่เลย"
51190-247 = "ถึงจะแก้ตัวเหมือนมีเหตุผลมารองรับได้ดี แต่เธอก็โกหกทั้งเพนี่นา?"
51190-248 = "มันทั้งน่าอับอาย ทั้งน่าขายหน้า ก็เลยบอกทุกคนไม่ได้ใช่มั้ยล่ะ?"
51190-249 = "แล้วก็กลัวที่จะสารภาพความจริงกับทุกคนด้วย"
51190-250 = "[s] \"กลัว...?\""
51190-251 = "ใช่ค่ะ นางุสะจังกลัวว่าทุกคนจะจับได้น่ะ"

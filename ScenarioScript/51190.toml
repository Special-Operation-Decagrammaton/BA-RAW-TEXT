[translation]
51190-1 = "第19話;花鳥風月部的怪談家（１）"
51190-4 = "火焰熊熊燃燒。"
51190-5 = "魑魅魍魎充斥街道。"
51190-7 = "在宣告慶典開始的信號發射之時。"
51190-12 = "我們將前去拜訪。"
51190-18 = "──很好，終於開始了。"
51190-19 = "來，讓我見識見識吧。"
51190-21 = "[ruby=你們]由你創[/ruby]作的[ruby=怪談]「百物語」[/ruby]。"
51190-37 = "[ns]「明明打得那麼激烈……卻一點傷都沒有……」"
51190-40 = "到底是怎麼回事！#n我明明已經狂轟濫炸了，為什麼還毫髮無傷！？"
51190-42 = "嗚啊啊啊～！絕對有哪裡不太對勁！#n就算再怎麼射擊也沒有命中的感覺～！"
51190-43 = "感覺就像在打空氣呢。"
51190-44 = "是啊，感覺像是在射擊不存在現實中的幻象……"
51190-46 = "……沒用的。"
51190-47 = "[s]「……名草？」"
51190-50 = "……普通的射擊是行不通的。"
51190-51 = "什麼！？為什麼！？"
51190-52 = "這並不奇怪……因為那是「幻魎百物語」。"
51190-53 = "是源於怪書《稻生物怪錄》的……花鳥風月部召喚出來的「怪談」。"
51190-54 = "所以普通的子彈對那種怪談沒有作用。"
51190-55 = "什麼！？你要我相信那種話！？"
51190-56 = "雖然因為真的射不中也只能相信就是了……！"
51190-58 = "照名草同學的說法……我們完全沒辦法打倒祂嗎？"
51190-59 = "居然什麼都不管用！根本是作弊角色嘛！#n那樣太犯規了！犯規！"
51190-64 = "並非……完全無法打倒。"
51190-65 = "[s]「名草，有什麼辦法是嗎！？」"
51190-66 = "只有得到大預言者葛葉認可並繼承其資格者，才能打倒源自怪書中的怪談。"
51190-67 = "只有「百花繚亂的委員長」及其持有的資格象徵 「百蓮」……"
51190-68 = "[s] （好像在哪裡……聽過類似的話……）"
51190-70 = "從大預言者葛葉手中取得，僅有百花繚亂委員長才有資格擁有的……"
51190-71 = "字面意義上的「獵鬼傳說魔槍」！"
51190-73 = "「百蓮」──除此之外……是不可能對幻魎百物語造成傷害的。"
51190-74 = "那我們束手無策了嗎？#n明明怪物正在大肆搗亂……"
51190-75 = "……是啊，我們什麼都做不了。"
51190-76 = "名草前輩是怎麼知道的？"
51190-77 = "我……已經在大雪原……"
51190-78 = "不，沒什麼。那都無所謂了。"
51190-79 = "趕緊逃跑吧。#n這樣下去大家都會受傷，一切都會結束的。"
51190-80 = "在那之前……在事情變得跟當時一樣之前……！"
51190-85 = "就算這樣也不能坐視不管！"
51190-90 = "蓮華醬……？"
51190-95 = "又要像天空變紅的時候一樣……只是慌慌張張地不知所措嗎！"
51190-96 = "不，那可不行！"
51190-97 = "不能再像那個時候一樣……"
51190-98 = "在大家需要幫助的時候什麼都做不了……#n我不想再因為「這就是我們的極限」這種理由放棄了！"
51190-99 = "[s]「蓮華……」"
51190-100 = "名草前輩說過，擁有象徵的人就能打倒祂。"
51190-101 = "那前輩你不就辦得到嗎！？#n身為百花繚亂委員長代理的前輩！"
51190-107 = "不……我……我的右手已經……"
51190-108 = "我……辦不到。"
51190-113 = "我辦不到。#n我已經把「象徵」交給了桔梗……"
51190-114 = "不，就算有「那個」………"
51190-115 = "我還是辦不到。"
51190-116 = "前輩，為什麼……"
51190-121 = "因為我……不是菖蒲。"
51190-126 = "啊哈哈哈哈哈！你很清楚嘛！"
51190-127 = "真是清楚到令人作嘔～！"
51190-131 = "……是誰？"
51190-138 = "咿嘻，咿嘻嘻嘻。#n沒錯沒錯，完全正確～！名草醬說的對！"
51190-139 = "那個幻魎百物語的「黑影」是從我的怪書《稻生物怪錄》而生的怪談之一。#n你們根本傷不了祂一根寒毛。"
51190-140 = "……除非從大預言者手中繼承象徵的「菖蒲」在場，那就難說了。"
51190-146 = "這一點你也很清楚吧？名草醬？"
51190-147 = "你……為什麼會在這裡…… "
51190-148 = "箭吹……棕櫚。"
51190-149 = "[s]「你是花鳥風月部的……」"
51190-150 = "啊哈哈哈哈哈～真高興～#n名草醬和夏萊的老師都記得我耶？"
51190-151 = "另外我要再次謝謝你，老師。#n謝謝你像我說的一樣，一路陪伴到這裡。"
51190-152 = "而且沒把我的話當耳邊風～"
51190-153 = "覺得如何呢？"
51190-154 = "喜歡我為你們在大街小巷準備的「怪談」嗎？"
51190-159 = "你的意思是……發生在街上的騷動和怪物……"
51190-160 = "都是你搞的鬼嗎！？"
51190-161 = "咦，真的嗎！？那個人……！？"
51190-162 = "[ns]「就是呼喚出怪物的元兇……」"
51190-164 = "哈哈～你們的敵意、戒心和憤怒刺痛了我的皮膚。"
51190-165 = "你們的反應讓我非～常非常滿意～！"
51190-167 = "廢話少說。快回答我的問題……！"
51190-169 = "是是是，如果你們想問那個問題，我就鄭重回答你們吧。"
51190-170 = "再次向各位自我介紹。"
51190-171 = "我的名字叫棕櫚。"
51190-172 = "正如你們所說，是叫出幻魎百物語的──"
51190-173 = "──花鳥風月部的怪談家．箭吹棕櫚。#n希望你們好好記住，嘻嘻嘻。"
51190-174 = "[s]「怪談家……？」"
51190-175 = "啊哈，啊哈哈。又是那種表情。"
51190-176 = "無法明白眼前發生的事，感到莫名其妙的表情。"
51190-177 = "帶著無法抹去的敵意和怒火，惡狠狠瞪著我的表情。"
51190-178 = "真是棒極了。我非常喜歡。"
51190-179 = "……其中我最滿意的就是你的表情，名草醬。"
51190-185 = "在大雪原之後多久沒見了呀？咿嘻。"
51190-186 = "本來還在想那之後你逃到哪裡去了……沒想到你會再回到百鬼夜行啊。"
51190-187 = "啊啊，像你這種悲慘的失敗者，在歷經徬徨之後能回去的也就只有這裡了吧。"
51190-188 = "不過你還真是厚臉皮。"
51190-189 = "當初……你不是根本不想回到「百花繚亂」嗎？#n明明一直想逃離那個地方……"
51190-190 = "結果卻還是回來了。#n實在是不知羞恥。"
51190-191 = "你……你在說什麼……"
51190-192 = "哎呀呀～～？從你的表情看來，難道大家還不知道嗎～？"
51190-193 = "名草醬，你該不會還瞞著大家，什麼都沒說吧～？"
51190-198 = "你還在說謊嗎～？"
51190-200 = "…………唔。"
51190-202 = "啊哈哈哈～～～"
51190-203 = "身穿百花繚亂的羽織，肩負百花繚亂的名號……#n裝作百花繚亂的委員長代理，隱藏自己的真面目……"
51190-204 = "名草醬依然做著毫不知恥的行為呢。#n雖然我早就全～都知道了……"
51190-205 = "不過在場的百花繚亂成員，以及老師……所有人都被你蒙在鼓裡。"
51190-207 = "停下來……"
51190-209 = "雖然不知道你是誰……"
51190-210 = "如果再繼續胡言亂語侮辱百花繚亂，我絕對不會放過你……！"
51190-212 = "居然說我在胡言亂語，冤枉……真是太冤枉了。#n你說對吧名草醬？"
51190-213 = "既然不好意思說出來，就讓我代替你告訴大家吧？"
51190-214 = "名草醬至今絕口不提的真相，我就幫你向所有人公開吧！"
51190-215 = "別再說了…… "
51190-216 = "居然要我別說，也太強人所難了吧。#n而且那個蠢丫頭不是在提問嗎？問我在胡說什麼。"
51190-217 = "我是個喜歡回答別人問題的人哦？#n既然有人提問，就該給他恰當的回答……這樣才稱的上優秀不是嗎？"
51190-218 = "所以我決定告訴你們。"
51190-222 = "名草醬他啊～總是這麼說對吧？"
51190-224 = "「我無法成為百花繚亂的委員長」"
51190-228 = "「因為我不是菖蒲」、「不是菖蒲的我沒有那種資格」──"
51190-229 = "菖蒲菖蒲菖蒲，永遠都拿菖蒲當藉口對吧？"
51190-230 = "不要再說了…………！"
51190-231 = "啊哈哈哈。"
51190-232 = "真是的。"
51190-237 = "[log][ff4444]「騙人」[-][/log]"
51190-240 = "[log][ff4444]「明明從來沒那麼想過」[-][/log]"
51190-246 = "胡說八道也該有個限度。#n其實真正的原因根本就不是那個吧？"
51190-247 = "雖然用那些冠冕堂皇的理由萬般無奈地辯解，但那些全都是騙人的……不是嗎？"
51190-248 = "你不敢告訴任何人對吧？#n因為你會感到慚愧、丟臉……"
51190-249 = "因為你害怕向所有人坦白真相！"
51190-250 = "[s]「害怕……？」"
51190-251 = "沒錯，名草醬他啊，害怕事實被大家得知。"
51190-252 = "啊哈哈，所以由我來替他說吧！#n名草醬不敢說出口的醜陋心聲……"
51190-253 = "我會用我的怪書一一揭露。"
51190-258 = "…………！"
51190-273 = "你聽說了嗎？菖蒲委員長突然消失了。"
51190-274 = "（眾口紛紜）"
51190-275 = "以後百花繚亂會怎樣？#n這樣委員長的位置就空出來了吧？"
51190-281 = "（議論紛紛）"
51190-282 = "就算菖蒲前輩不在，我們也有他青梅竹馬的名草前輩在，名草前輩也一樣優秀。"
51190-284 = "所以沒關係。"
51190-288 = "（用充滿期待的聲音說著）"
51190-295 = "「不，不是那樣的。」"
51190-296 = "（那是來不及說出口的心聲）"
51190-299 = "……我辦不到。"
51190-304 = "（對我來說，這[ruby=象徵]把槍實[/ruby]在太沉重了）"
51190-305 = "更何況……我……"
51190-309 = "[ruby=因為我不是菖蒲。]這樣下去，我的真面目會被發現。[/ruby]"
51190-310 = "[ruby=因為我沒辦法代替菖蒲。]一直以來，我只是在扮演百花繚亂副委員長這個優等生的角色而已。[/ruby]"
51190-311 = "[ruby=有資格成為百花繚亂委員長的人，就只有菖蒲而已。]沒有才能也沒有實力，只是站在菖蒲身邊。[/ruby]"
51190-314 = "卻什麼也比不上菖蒲，根本沒什麼了不起的我──"
51190-315 = "既卑鄙又醜惡的我──"
51190-316 = "能待在菖蒲身邊就感到心滿意足，什麼都做不到的我──"
51190-318 = "──會被大家發現。"
51190-319 = "之所以能在這裡不過是因為僥倖──"
51190-321 = "只是倚靠著菖蒲的光環，死命逞強而已。"
51190-322 = "大家都會指責我、嘲笑我。"
51190-325 = "我好害怕。"
51190-326 = "害怕真相曝光。"
51190-327 = "所以得在真面目被發現之前──"
51190-329 = "[log]「快逃」[/log]"
51190-333 = "嗯！？剛才好像看到奇怪的東西……"
51190-334 = "一閃而過。"
51190-335 = "那是……過去的……光景嗎？"
51190-336 = "[s]「不，這不單純是過去……」"
51190-338 = "這是……名草前輩的……？"
51190-344 = "覺得怎麼樣呀？心情如何？"
51190-345 = "窺見對方以為隱藏得很好的真心作何感想……可以告訴我嗎？"
51190-346 = "尤其是……"
51190-350 = "站在小巷牆角的你……"
51190-351 = "看見自己極力譴責的前輩的真心，究竟有什麼感想呢～？"
51190-357 = "[ns]「桔梗……！」"
51190-358 = "大街上發生騷亂，所以我出來看看發生什麼事。"
51190-359 = "就是這樣……而已。"
51190-360 = "剛才……"
51190-361 = "……！"
51190-362 = "那是名草前輩的真心嗎？"
51190-363 = "桔梗，我……"
51190-365 = "啊哈哈！沒錯沒錯！"
51190-366 = "剛才那就是名草醬一直沒告訴各位的真心話。#n百花繚亂的大家尊敬之人的本質。"
51190-367 = "真是的～表面上說什麼「非菖蒲不可」、「自己不是菖蒲所以沒有資格」之類的～"
51190-368 = "其實那全是彌天大謊！"
51190-369 = "實際上只是個覺得能扮演配得上青梅竹馬的角色就心滿意足──#n打從心裡認為其他後輩根本無所謂的蠢蛋。"
51190-370 = "其結果就是現在，他做出想從你們身邊逃走的行動。"
51190-372 = "你一開始就是因為那種理由……才離開我們的嗎？"
51190-373 = "名草前輩……"
51190-378 = "桔梗，蓮華……！不是的……！"
51190-379 = "我不是一開始就決定那麼做……！我只是……！"
51190-381 = "又說那種謊話。"
51190-382 = "你本來不就是那種人嗎？"
51190-383 = "只是害怕你那卑劣不堪的真面目被別人發現而已，不是嗎？"
51190-384 = "與其受人責備不如溜之大吉──你這個失敗者不就是這麼想的嗎？#n事到如今還不承認啊？"
51190-385 = "你這個人實在是──"
51190-386 = "──令人噁心。"
51190-388 = "我……我……！"
51190-389 = "我……只是……對大家……"
51190-391 = "前輩……"
51190-392 = "御稜名草，你……"
51190-396 = "我……"
51190-397 = "不是那樣的……菖蒲……"
51190-398 = "我只是對菖蒲……！"
51190-400 = "啊哈，啊哈哈！"
51190-401 = "因為隱藏至今的真相曝光而開始分裂了呢。"
51190-402 = "很好很好，全部崩壞吧。"
51190-403 = "彼此譴責、敵視、打鬥、攻擊──"
51190-404 = "用言語傷害對方，用謊言隱瞞真相。"
51190-405 = "將真實拋諸腦後，以虛假的故事創作怪談。"
51190-406 = "如此一來……"
51190-407 = "你們總算……總算…………"
51190-408 = "能成為我夢寐以求的真正風情──"
51190-412 = "[ns]「椿！」"
51190-413 = "嗯。交給我吧，老師。"
51190-420 = "下一話;花鳥風月部的怪談家（２）"

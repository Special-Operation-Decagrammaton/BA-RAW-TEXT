[translation]
51190-1 = "Episode 19;The Bard of Nature's Beauty 1"
51190-4 = "The flames consume the streets."
51190-5 = "The monsters of your nightmares have found their way into reality."
51190-7 = "The festival begins as the night sky lights up."
51190-12 = "And then we will rise."
51190-18 = "It begins."
51190-19 = "Please put on your best performance for me."
51190-21 = "Sing for me your very own ghost story."
51190-37 = "[ns] \"All of that...and not even a scratch.\""
51190-40 = "How is this possible? It's eating up our bullets like they're takoyaki!"
51190-42 = "None of my shots are doing anything! Do I just suck?!"
51190-43 = "Like we're just shooting at the air..."
51190-44 = "It's truly not of this world."
51190-46 = "...It's futile. All of it."
51190-47 = "[s] \"...Nagusa?\""
51190-50 = "Your bullets, as Renge said, may as well be takoyaki to that monster."
51190-51 = "Seriously?! Why?"
51190-52 = "We have no power against a Phantom Fable."
51190-53 = "The Phantom Fables originate from a tome named Ino's Phantom Records. Created by Nature's Beauty."
51190-54 = "You cannot shoot a ghost."
51190-55 = "Are you hearing yourself right now? That sounds absolutely insane! "
51190-56 = "...Well, considering that thing doesn't have a single scratch on it, I can't say it's NOT true. But, ghosts?"
51190-58 = "Nagusa... Do you mean to say there's nothing we can do against it?"
51190-59 = "Nothing at all?! What a poopy, mean cheater! Boo!"
51190-64 = "I never said it was impossible."
51190-65 = "[s] \"Not impossible is better than nothing, Nagusa!\""
51190-66 = "It would require the Great Prophet Kuzunoha's approval. The Authority of the President. Only then could someone overcome the power of the Phantom Fables."
51190-67 = "The Hyakkaryouran president is the only one in all of Hyakkiyako to possess the Hundred Lotus."
51190-68 = "[s] \"(Why do I feel like I've heard this story before?)\""
51190-70 = "It is nothing less than a legendary firearm wielded by the Great Prophet Kuzunoha, which only the presidents of the Hyakkaryouran are capable of bearing..."
51190-71 = "The legendary exorcist spell gun!"
51190-73 = "Without the Hundred Lotus, all is lost."
51190-74 = "We can't just leave it to do as it wants. There's no other option?"
51190-75 = "...There is not."
51190-76 = "Where and when the heck did you learn all of that, Nagusa? "
51190-77 = "When I visited the Great Snowfield..."
51190-78 = "That's a story for another time. "
51190-79 = "We must act swiftly to evacuate. Minimize the injuries and damage the best we can."
51190-80 = "I don't... We cannot afford to repeat history here."
51190-85 = "No way! I hate that plan!"
51190-90 = "Renge...?"
51190-95 = "You want me to turn tail and run away? Just like the day the sky turned red?"
51190-96 = "I refuse."
51190-97 = "I don't want to be like that anymore."
51190-98 = "I don't want to give up before it's even over. Not again. Hyakkiyako needs us now, more than ever!"
51190-99 = "[s] \"Renge...\""
51190-100 = "There's no other options? You've already spelled it out step-by-step."
51190-101 = "We need the Hundred Lotus? The Authority of the President? Aren't I looking at the Hyakkaryouran president right now?!"
51190-107 = "Ah, well, I... My right arm is..."
51190-108 = "I just...can't."
51190-113 = "I handed the Authority over to Kikyou."
51190-114 = "...And it wouldn't matter regardless."
51190-115 = "Authority or not, I cannot."
51190-116 = "Why not? I don't understand."
51190-121 = "I'm... I'll never be Ayame."
51190-126 = "Hahahaha! Now isn't that the truth!"
51190-127 = "In fact, you know it to be true better than anyone in the whole wide world."
51190-131 = "...Who was that?"
51190-138 = "Heehee! Heeheehee. Nagusa is correct, whether she wants to be or not. "
51190-139 = "You can't lay a finger on my precious Kurokage, the best of the Phantom Fables. It was born from Ino's Phantom Records, made by yours truly."
51190-140 = "Unless, of course, Ayame came marching in here with her Authority, rightly earned from the Great Prophet."
51190-146 = "But that's not gonna happen, is it, Nagusa?"
51190-147 = "What have you done? Why are you here? "
51190-148 = "...Yabuki Shuro."
51190-149 = "[s] \"She's the one from Nature's Beauty I spoke to.\""
51190-150 = "Hahahaha! Oh my gosh. Nagusa AND Schale's Sensei remembered me! I'm honored!"
51190-151 = "Truly, I'm so grateful for your presence here today, Sensei. "
51190-152 = "For being a witness to my story."
51190-153 = "Tell me, what do you think so far?"
51190-154 = "Are you enjoying the ghost stories I prepared for the Lantern Festival?"
51190-159 = "Do you mean to say...the monsters, all this destruction..."
51190-160 = "This is all your doing?"
51190-161 = "Huh?! No way! But she's so small and cute!"
51190-162 = "[ns] \"You summoned all these monsters?\""
51190-164 = "Hahaha! I really like those expressions on your faces. You really hate me, don't you?"
51190-165 = "I love, love, love the way you heroes act! Seriously, show me more!"
51190-167 = "Answer my question before I cut you in half!"
51190-169 = "Heeheehee. I like being in one piece, so I'll indulge you."
51190-170 = "Allow me to introduce myself."
51190-171 = "I'm Shuro! "
51190-172 = "And yes, I was the one who summoned the Phantom Fables to this realm."
51190-173 = "I am the Nature's Beauty's bard, Yabuki Shuro. Remember my name, okay?"
51190-174 = "[s] \"Bard...?\""
51190-175 = "Haha. Hahaha! What adorable faces you like to make."
51190-176 = "That expression said, \"I'm a dummy! I don't understand any of this!\""
51190-177 = "Or maybe it's saying, \"I hate you. I hate you. I hate you. I hate you. I hate you.\""
51190-178 = "Heeheehee. Let me really soak it all in."
51190-179 = "...But no one's expression can match up to yours, Nagusa. No one's."
51190-185 = "Have you missed me? It seems like our meeting in the Great Snowfield was a thousand years ago."
51190-186 = "I waited and waited, hoping you would come back to play with me. Imagine how I felt when I found out you came here instead!"
51190-187 = "Ah, ah. You're right. What else would a stupid, useless, miserable loser like you do?"
51190-188 = "Maybe losers don't feel any type of shame. "
51190-189 = "You can't even abandon the Hyakkaryouran properly. You run away, come back, run away, come back."
51190-190 = "I would say I'm disappointed, but you're not even worth that."
51190-191 = "Don't talk about Nagusa like that, you little imp."
51190-192 = "Huuuh? If you're still defending her, then..."
51190-193 = "Hahaha! Secrets, secrets don't make friends, Nagusa!"
51190-198 = "Are you nothing but a liar?"
51190-200 = "...Shut up."
51190-202 = "Haha! Hahaha! This is too good!"
51190-203 = "You wear the Hyakkaryouran uniform, pretend to be the president of the Hyakkaryouran, and lie shamelessly to every single Hyakkaryouran member!"
51190-204 = "But you can't lie to me, can you, Nagusa?"
51190-205 = "You lie, and lie, and lie, and the Hyakkaryouran and Sensei just lap it all up."
51190-207 = "Stop..."
51190-209 = "I don't know who you think you are..."
51190-210 = "But shut up with that nonsense you're spewing!"
51190-212 = "Nonsense? How mean... Even Nagusa knows that it's not nonsense."
51190-213 = "I'll even be nice and help Nagusa out. Do you want to know all her secrets? "
51190-214 = "Just remember that it was me who finally told you the truth, not your precious Nagusa."
51190-215 = "I said stop... "
51190-216 = "Stop? But Miss All-Brawn-No-Brains over there wants to know what I mean."
51190-217 = "You of all people know that fair questions deserve fair answers. Otherwise you're a bad person! Right?"
51190-218 = "I'll be so very gracious and answer."
51190-222 = "Nagusa's like a broken record. Blabbering the same thing over and over again. "
51190-224 = "\"I'll never be good enough to be the Hyakkaryouran's president.\""
51190-228 = "\"I'm not Ayame,\" and, \"Only Ayame earned the Authority.\""
51190-229 = "Didn't you ever get bored of yourself? Ayame this, Ayame that! Boohoo, Ayame's so much better than me!"
51190-230 = "I said to stop!"
51190-231 = "Hahaha."
51190-232 = "You've got some nerve!"
51190-237 = "[log][ff4444]Liar.[-][/log]"
51190-240 = "[log][ff4444]It was never about Ayame.[-][/log]"
51190-246 = "It's not that you thought Ayame was sooo great, was it?"
51190-247 = "You throw your hands up in the air and tell more lies about how it can't be helped."
51190-248 = "Are you ashamed? Embarrassed? Afraid you'll lose everyone if you tell the truth?"
51190-249 = "Scary! It's so, so scary to be honest, isn't it?"
51190-250 = "[s] \"Why would she be scared?\""
51190-251 = "Because! Liars are always afraid of being exposed!"
51190-252 = "Allow me to expose the true Nagusa to you. The ugly, insecure Nagusa she's been running from."
51190-253 = "You can't hide anything from me and my tome."
51190-258 = "What...?!"
51190-273 = "Can you believe it? It seems like President Ayame really did disappear."
51190-274 = "(Whispers. Rumors.)"
51190-275 = "We don't have a president. Who'll lead the Hyakkaryouran?"
51190-281 = "(Talk travels quickly.)"
51190-282 = "Nagusa has supported Ayame all these years. She's done so much for the Hyakkaryouran."
51190-284 = "Everything's going to be fine."
51190-288 = "(Their voices swell with expectation.)"
51190-295 = "No... It's not."
51190-296 = "(How could I say that?)"
51190-299 = "I can't do that to them."
51190-304 = "(I'm not strong enough to bear this cross.)"
51190-305 = "I can't..."
51190-309 = "Because they will at last see me for what I really am."
51190-310 = "They will see that I'm a mere imposter."
51190-311 = "I never deserved the position by Ayame's side."
51190-314 = "I'm lacking in every way possible. Useless in comparison to Ayame."
51190-315 = "There was never a more disgusting, terrible person to join the Hyakkaryouran."
51190-316 = "I clung to Ayame's coattails, hoping her flame would cast me in a favorable light. "
51190-318 = "With Ayame gone, my nature will be revealed."
51190-319 = "Imposter. Fraud. They'll all know."
51190-321 = "Their impression of me will rot and rot the longer I stay here without Ayame."
51190-322 = "Their laughter already rings in my ears. Their derision."
51190-325 = "Scared..."
51190-326 = "I'm so scared to be seen."
51190-327 = "I must protect myself. Before my skin is peeled away and I am revealed..."
51190-329 = "[log]I need to run away.[/log]"
51190-333 = "D-Did anyone else see that?"
51190-334 = "Yes. We all witnessed it."
51190-335 = "Was that...of the past?"
51190-336 = "[s] \"More than a memory, it was her feelings...\""
51190-338 = "That wasn't real, was it? N-Nagusa? It can't be."
51190-344 = "Hahaha! Tell me exactly how you feel right now."
51190-345 = "I want to know what it feels like to find out the person you admired was nothing but a fraud."
51190-346 = "More than you actually..."
51190-350 = "Especially you, hiding out in the alleyway."
51190-351 = "I wanna hear from you, both her harshest critic and her greatest believer. How does it feel to watch her crumble before your eyes?"
51190-357 = "[ns] \"Kikyou! You've been here?\""
51190-358 = "Yes. There seemed to be terror filling the streets that needed to be eradicated. "
51190-359 = "So I came to address it...and found something else entirely."
51190-360 = "That...thing we were forced to see."
51190-361 = "...!"
51190-362 = "Those are your thoughts, Nagusa? Your true motives?"
51190-363 = "Kikyou, please. I..."
51190-365 = "Hahaha! Yes, just like that. It's all true, Kikyou."
51190-366 = "Don't you feel betrayed? All of you looked up to her with stars in your eyes, and on the inside she was nothing but a rotten old coward."
51190-367 = "Did you believe her, when she told you she couldn't fill Ayame's shoes? When she insisted she wasn't qualified?"
51190-368 = "You were a fool! She was afraid that the longer she was president, the more pieces her carefully constructed image would shatter into."
51190-369 = "This cowardly, shameless idiot was supposed to be your president?! All she cared about was looking good for her precious childhood friend. She barely stuck around for five minutes once Ayame was gone."
51190-370 = "And look at her now, running, running, running away. As always."
51190-372 = "This was your reasoning? For your abandonment? Your betrayal?"
51190-373 = "Nagusa... I don't...understand..."
51190-378 = "Please! Kikyou! Renge! "
51190-379 = "My intention was never... I simply..."
51190-381 = "Lie, lie, lie."
51190-382 = "Don't you ever get tired of lying?"
51190-383 = "Say it simply. \"I was scared of rejection,\" or maybe, \"I didn't want you to find out I was a spineless, terrible person.\""
51190-384 = "Accept it. I wanna hear you say it. Admit that you're a dirty coward!"
51190-385 = "...Nothing? Really?"
51190-386 = "You disgust me."
51190-388 = "That's not... I...!"
51190-389 = "I-I... I just thought, without me, everyone could..."
51190-391 = "You..."
51190-392 = "Goryou Nagusa. You are..."
51190-396 = "I..."
51190-397 = "It wasn't like that... It was for Ayame..."
51190-398 = "I just wanted Ayame back..."
51190-400 = "Hahaha! Ahahaha! This is too good."
51190-401 = "Yes, yes! Tell them everything. Reveal all those hidden frustrations, the anger and betrayal!"
51190-402 = "Rip your heart out."
51190-403 = "Friend becomes foe, and love turns to hatred."
51190-404 = "Let vitriol guide your tongue and your bonds crumble like dust."
51190-405 = "We are eradicating the narratives you believed in! And from the ashes, stories built on rumors and misconceptions will be born."
51190-406 = "That is the climax of my play. "
51190-407 = "All my hard work... My plans...!"
51190-408 = "At long last, you will all blossom into my elegance!"
51190-412 = "[ns] \"Tsubaki!\""
51190-413 = "Understood."
51190-420 = "Next Episode;The Bard of Nature's Beauty 2"

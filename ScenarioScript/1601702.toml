[translation]
1601702-1 = "I hate people"
1601702-2 = "(คุณครูแวะไปที่ร้านเครื่องเขียนเพื่อซื้ออุปกรณ์สำนักงาน)"
1601702-10 = "ขอทางหน่อยครับ~"
1601702-16 = "อ๊ะ..."
1601702-24 = "อึก..."
1601702-25 = "พะ... เพราะแบบนี้ละถึงไม่อยากมาที่ที่คนเยอะๆ... จะทำให้คนพวกนี้หายไปก็ไม่ได้..."
1601702-26 = "[s] \"สวัสดี อาโอบะ ได้เจอกันที่นี่ด้วยนะ\""
1601702-30 = "อ่า..."
1601702-34 = "เอะ... เอ๋?? คุณครูนี่คะ?"
1601702-35 = "สะ... สวัสดีค่ะ...!"
1601702-36 = "วะ... ว้าว... เป็นคุณครูจริงด้วย..."
1601702-37 = "[s] \"มาซื้อของเหรอ?\""
1601702-38 = "อะ... อ่า... ค่ะ..."
1601702-39 = "ฉันต้องเขียนรายงานเกี่ยวกับชิ้นส่วนอะไหล่ที่จะใช้ แต่ว่ากระดาษหมดพอดี..."
1601702-40 = "[s] \"มาซื้อของใช้สำนักงานแล้วเอาไปเบิกสินะ\""
1601702-44 = "คะ... คะ? ไม่ใช่ค่ะ... ฉันจ่ายเงินเองต่างหาก..."
1601702-45 = "[s] \"ไม่ได้ซื้อไปใช้เรื่องงานหรอกเหรอ?\""
1601702-46 = "เอ่อ... ทะ... ที่จริงก็ซื้อไปใช้เรื่องงาน..."
1601702-47 = "แต่ถ้าไม่เบิกของสำนักงานไว้ล่วงหน้านานๆ ก็จะไม่ได้ของค่ะ... แหะๆ..."
1601702-48 = "เมื่อก่อนฉันเจอปัญหานี้อยู่บ่อยๆ... จนตอนนี้ฉันจ่ายเงินซื้อเองแล้วค่ะ..."
1601702-49 = "[s] \"ได้ยังไงกัน...\""
1601702-50 = "ปะ... ปกติที่ไฮแลนเดอร์ก็เป็นอย่างนี้ละค่ะ..."
1601702-51 = "พะ... พอมาคิดดูมันก็น่าโมโหนะ..."
1601702-52 = "มีกฎแปลกๆ เยอะไปหมด... ฉะ... ฉันเหนื่อยใจมากเลยค่ะ..."
1601702-55 = "ไหนจะต้องเขียนรายงานแบบหน้าหลังเพราะต้องประหยัดกระดาษ..."
1601702-56 = "แล้วถ้าเนื้อหามีแค่หน้าเดียว ก็ต้องหาใส่อะไรไปเพิ่มเพื่อให้มีสองหน้าค่ะ..."
1601702-59 = "ละ... เหลวไหลใช่มั้ยคะ? แหะๆ..."
1601702-60 = "เวลาจะขอให้อนุมัติอะไร เราก็ต้องให้ท่านผู้บริหารประทับตราลงเอกสาร... แต่มีครั้งหนึ่งที่ทางนั้น#nบอกว่าทำตราประทับหาย ฉันเลยต้องรออยู่หลายสัปดาห์กว่าจะซื้อตราประทับอันใหม่ สรุปว่าฉันไม่ได้งานเลยค่ะ"
1601702-61 = "แล้วตอนสั่งข้าวกล่องมากิน ก็ต้องสั่งแต่เมนูที่ท่านผู้บริหารจะกิน..."
1601702-62 = "พอมีงานก็ไม่บอกล่วงหน้า แล้วก็มาโยนให้ตอนเหลือเวลาทำแค่วันเดียว..."
1601702-63 = "[s] \"มะ... มีเรื่องแบบนั้นเยอะเลยสินะ...\""
1601702-64 = "ใช่ค่ะ... เกิดเรื่องแบบนั้นบ่อยเลยละค่ะ..."
1601702-65 = "ตะ... ตอนนี้ก็คงมีใครบางคนที่กำลังทุกข์ทรมานอยู่... แหะๆ... เหมือนกับฉันน่ะค่ะ"
1601702-66 = "พอเจอเรื่องแบบนั้นบ่อยๆ เข้า ตอนนี้ฉันก็ไม่ได้คาดหวังอะไรแล้วค่ะ..."
1601702-67 = "ถ้าเราคาดหวัง เราก็อาจจะผิดหวังได้นี่คะ... ฮุฮุ..."
1601702-68 = "ชีวิตประจำวันมันก็มีแต่เรื่องน่าเบื่อแบบนี้ละค่ะ..."
1601702-69 = "[s] \"งั้นวันนี้ขอครูให้ของขวัญเป็นของใช้สำนักงานได้มั้ย?\""
1601702-73 = "คะ... คะ?! คะ... คุณครูน่ะเหรอคะ...?"
1601702-74 = "ให้ฉันซื้อของที่จำเป็นได้ตามใจเลยงั้นเหรอคะ?"
1601702-75 = "มะ... ไม่เป็นไรค่ะ! ฉะ... ฉันทำแบบนั้นไม่ได้หรอกค่ะ... แบบนั้นจะเป็นหนี้บุญคุณมากเกินไปค่ะ...!"
1601702-76 = "[s1] \"แต่เราไม่ได้เจอกันแบบนี้บ่อยๆ นะ\"\n[s2] \"ไม่ต้องเกรงใจนะ ถือว่าเป็นของขวัญที่ได้เจอกันแล้วกัน\""
1601702-79 = "อะ... อ่า... เอางั้นเหรอคะ..."
1601702-80 = "อันที่จริง... ฉันต้องใช้กระดาษ A4... พวกเครื่องเขียนก็หายไปเกือบหมด... ละ... แล้วก็ต้องใช้เทปกาวอีก..."
1601702-87 = "ถะ... ถ้างั้น! ฉันขอติดหนี้บุญคุณคุณครูนะคะ..."
1601702-88 = "ตะ... แต่วันนี้วันเดียวนะ...! ขอบคุณค่ะ... คุณครู..."
1601702-92 = "ฉันได้อุปกรณ์สำนักงานที่ต้องการครบแล้วค่ะ..."
1601702-93 = "ขะ... ขอบคุณนะคะ คุณครู..."
1601702-94 = "[s3] \"เรื่องแบบนี้มันก็เกิดขึ้นได้น่า\"\n[s4] \"ยังไงก็ต้องมีความหวังดีๆ กับวันพรุ่งนี้นะ อาโอบะ\""
1601702-97 = "อ่า..."
1601702-98 = "ก็คงอย่างนั้นค่ะ..."
1601702-99 = "แต่ถ้าคาดหวังก็ต้องผิดหวังเป็นธรรมดา... แล้วฉันก็ไม่อยากผิดหวังด้วย..."
1601702-104 = "วันนี้ขอบคุณมากนะคะ คุณครู"
1601702-105 = "ฉันจะไม่ลืมบุญคุณนี้ค่ะ"
1601702-107 = "(อาโอบะโค้งขอบคุณอยู่อีกหลายครั้งแล้วกลับไป)"

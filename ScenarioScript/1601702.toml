[translation]
1601702-1 = "I hate people "
1601702-2 = "（為了購買辦公用品而到了文具店）"
1601702-10 = "借過～"
1601702-16 = "啊……"
1601702-24 = "唔唔……"
1601702-25 = "所，所以我才討厭人多的地方……又不能把所有人都打飛……"
1601702-26 = "[s]「嗨，青葉。沒想到會在這裡遇到你。」"
1601702-30 = "啊……"
1601702-34 = "咦，老師？"
1601702-35 = "您，您好……！"
1601702-36 = "哇，哇啊……是老師……"
1601702-37 = "[s]「你來這裡買東西嗎？」"
1601702-38 = "啊，啊啊……是的……"
1601702-39 = "因為要製作零件的出庫清單，結果辦公室的紙用完了……"
1601702-40 = "[s]「所以是用公帳買辦公用品啊。」"
1601702-44 = "咦？不是的……#n是用我自己的錢……"
1601702-45 = "[s]「那不是工作要用到的東西嗎？」"
1601702-46 = "呃……是，是這樣沒錯……"
1601702-47 = "可是沒有事先申請的話，就沒辦法報公帳……嘿嘿……"
1601702-48 = "之前已經吃過很多次虧了……所以現在都乾脆用自己的錢買……"
1601702-49 = "[s]「怎麼這樣……」"
1601702-50 = "高，高地人本來就是這樣的……"
1601702-51 = "想，想到就讓人火大……"
1601702-52 = "這種奇怪的規定一大堆……壓，壓力超大的……"
1601702-55 = "比如為了節約用紙，報告一定要用廢紙背面的空白來寫……"
1601702-56 = "如果沒有廢紙的話，還得先印點東西才能拿來用……"
1601702-59 = "不，不覺得很好笑嗎？嘿嘿……"
1601702-60 = "我還遇過簽核文件需要幹部蓋章，卻因為他把印章搞丟的關係……#n在刻好新的印章之前，只能乾等好幾週的鬼故事……"
1601702-61 = "就連訂便當的時候，也要所有人配合幹部點同一種便當……"
1601702-62 = "明明有交期卻不先講，結果到了前一天才丟一堆東西過來……"
1601702-63 = "[s]「這，這種事還真多啊……」"
1601702-64 = "就，就是說啊……這種事每天都在上演……"
1601702-65 = "現，現在八成也有人在某個角落受苦吧……#n嘿嘿……就像我一樣……"
1601702-66 = "所以現在，我已經不再對任何事情抱有期待了……"
1601702-67 = "因為期待只會帶來失望而已……呵呵……"
1601702-68 = "日常生活就是充滿了苦悶跟疲憊……"
1601702-69 = "[s]「我們難得見到面，我送你一些辦公用品吧？」"
1601702-73 = "咦！？老，老師您要送我……？"
1601702-74 = "需要什麼全都可以買……？"
1601702-75 = "不，不行！這，這樣……對老師太不好意思了……！"
1601702-76 = "[s1]「畢竟這種機會很難得嘛。」\n[s2]「不必覺得有壓力，需要什麼就挑吧。」"
1601702-79 = "啊，啊嗚……需要的東西……"
1601702-80 = "我想想……有影印用的紙……幾乎都被弄丟的筆……還，還有膠帶也……"
1601702-87 = "那，那就拜託老師了……！"
1601702-88 = "只，只要幫我今天這次就行了……！#n謝謝老師……"
1601702-92 = "託，託老師的福，需要的物品都買到了……"
1601702-93 = "謝，謝謝老師……"
1601702-94 = "[s3]「這種事偶爾也會發生的哦。」\n[s4]「希望有一天，青葉也能開始期待每天的生活。」"
1601702-97 = "啊……"
1601702-98 = "也，也許會有這麼一天吧……"
1601702-99 = "可是有期待的話就會失望……我又不喜歡失望……"
1601702-104 = "今天真的非常感謝您，老師。"
1601702-105 = "這份恩情，我絕對不會忘記的。"
1601702-107 = "（青葉後來又重複道謝了好幾次才離開）"

[translation]
1601702-1 = "I Hate People "
1601702-2 = "I visited a stationery store to purchase work supplies."
1601702-10 = "Excuse me."
1601702-16 = "Ah..."
1601702-24 = "Ugh..."
1601702-25 = "Th-This is why I hate crowded places... Too many people to beat up by myself..."
1601702-26 = "[s] \"Hi, Aoba. Nice to see you here.\""
1601702-30 = "Ah..."
1601702-34 = "Huh? H-Huh??? Sensei?"
1601702-35 = "H-Hello...!"
1601702-36 = "I... I wasn't expecting to see you..."
1601702-37 = "[s] \"Are you here to buy something?\""
1601702-38 = "A-Ah... Yes..."
1601702-39 = "I need to write a list of all the parts we're shipping, but we ran out of paper in the office..."
1601702-40 = "[s] \"So you're picking up a requisition?\""
1601702-44 = "H-Huh? No... I'm paying out of pocket..."
1601702-45 = "[s] \"For work stationery?\""
1601702-46 = "Y-Yeah... I-I mean I am, but..."
1601702-47 = "There's a lot of strict rules and deadlines about getting reimbursed for expenses..."
1601702-48 = "It seemed like I'd always miss something in the paperwork every time I tried...so now I just buy it with my own money."
1601702-49 = "[s] \"That sounds unfair.\""
1601702-50 = "I-It's just how Highlander is..."
1601702-51 = "Pretty frustrating, now that I say it out loud..."
1601702-52 = "There's all kinds of weird bureaucracy. It gets...stressful."
1601702-55 = "Like, \"All reports must be written on scrap paper for conservation purposes.\""
1601702-56 = "And if there is no scrap paper, I have to print something off so I can USE it as scrap paper."
1601702-59 = "K-Kind of funny, right? Heehee..."
1601702-60 = "Then there was the time... Well, officers have to stamp documents to approve them, and this one officer lost her stamp, so we all had to wait weeks while she ordered a new one."
1601702-61 = "Or, \"When an officer orders bento, we all have to use that same menu.\""
1601702-62 = "Sometimes, they drop next-day deadlines on us out of nowhere..."
1601702-63 = "[s] \"Sounds like you're putting up with a lot.\""
1601702-64 = "All the time, yeah."
1601702-65 = "E-Even now, I'm sure someone back at the office is suffering just like I am."
1601702-66 = "...But I've more or less come to accept that's what life is."
1601702-67 = "If you never have expectations, you're never let down, right? Fufu..."
1601702-68 = "Life is just one big long stretch of exhaustion and boredom..."
1601702-69 = "[s] \"Well, since we're both here today, would it be all right if I gifted you some office supplies?\""
1601702-73 = "E-Eh?! Y-You'd do that, Sensei?"
1601702-74 = "I... I mean, they have everything I need here..."
1601702-75 = "N-No! I-I can't... That's way too big of a favor...!"
1601702-76 = "[s1] \"You deserve a break.\"\n[s2] \"You won't owe me anything. Just pick out whatever you need.\""
1601702-79 = "U-Uhh... Well..."
1601702-80 = "Now that I think about it, I need paper... I lost almost all my writing utensils, so... Oh, and tape, I need tape..."
1601702-87 = "Okay, well, I AM going to be in your debt!"
1601702-88 = "A-And it's just for today! Thank you... Sensei..."
1601702-92 = "Everything I need. It's all right here..."
1601702-93 = "Th-Thank you, Sensei..."
1601702-94 = "[s3] \"Sometimes, good things do happen, for all of us.\"\n[s4] \"I hope someday, you can enjoy your everyday life again.\""
1601702-97 = "Ah..."
1601702-98 = "W-Well, maybe..."
1601702-99 = "But if I start hoping for better, I'll be let down again. I've had enough of that..."
1601702-104 = "Thank you so much for today, Sensei."
1601702-105 = "I won't forget what you did for me."
1601702-107 = "Aoba thanked me multiple times, then headed back."

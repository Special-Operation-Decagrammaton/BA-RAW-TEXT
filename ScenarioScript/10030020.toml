[translation]
10030020-1 = "第2話;搭帳篷"
10030020-6 = "好，我們到了。#n這裡就是位於千年東邊的「東阿爾卑斯」。"
10030020-7 = "我們會在東岳山角搭帳篷露營一夜，明天清晨上山看日出。"
10030020-8 = "在那之前沒有特別的行程，大家可以在這附近做想做的事，悠閒地度過一天。"
10030020-9 = "[s1]「居然能在千年學園附近看到這麼美的自然景觀……」\n[s2]「我一直以為千年是高度都市化的地區，這片景色真是讓人意外。」"
10030020-12 = "千年學園的市中心確實充滿用尖端技術建造的建築，但並非所有地區都是這樣。"
10030020-13 = "自治區裡也有很多像「廢墟」一樣的未開發地區。"
10030020-14 = "雖然平常幾乎不受人關注……但沒有比這裡更適合露營或健行的地方了。"
10030020-18 = "……樹叢中吹來的涼風真舒服。"
10030020-19 = "大家心情如何？#n難得脫離都市呼吸到新鮮空氣，想必身心都很舒暢──"
10030020-28 = "──看來並非如此呢。"
10030020-29 = "雖然有所預期，沒想到真的完全收不到電波……"
10030020-30 = "而且離最近的便利商店居然超過30km……#n這樣該去哪買能量飲料……"
10030020-31 = "感覺光是移動就耗費一大半的體力了……"
10030020-32 = "怎麼現在就在喊苦……露營都還沒開始呢。"
10030020-33 = "真紀，可以把後車廂的紅色袋子拿來給我嗎？"
10030020-38 = "紅色袋子……是這個嗎？"
10030020-44 = "唔，好重……這些東西是什麼啊？鐵管？"
10030020-45 = "是帳篷桿。#n我們可是來露營的，總得把帳篷搭起來吧。"
10030020-46 = "順便也把放在後面的袋子全都拿過來。#n那些都是搭帳篷會用到的工具。"
10030020-47 = "這些超重的東西都是帳篷的零件！？"
10030020-48 = "怎麼才剛抵達就要把體力用來準備帳篷……"
10030020-49 = "明明有舒適又牢固的部室，卻非要在野外搭帳篷睡覺……真是太不合理了。"
10030020-50 = "嗯，如果你們想要的話，不搭帳篷直接露宿也是一種選擇。"
10030020-51 = "不過現在這個時期，要在沒有取暖用具的情況下在外頭過夜……#n我想應該會很冷……沒關係嗎？"
10030020-57 = "嗚……"
10030020-58 = "既然副部長都這麼說了，那也沒辦法……"
10030020-59 = "那個……前輩，沒有更簡單的方法嗎？"
10030020-60 = "我在網路上看過只要打開就能自動搭設的帳篷……"
10030020-62 = "你指的是自動帳篷啊。#n因為搭設簡便的關係，確實很受新手喜歡……"
10030020-63 = "但是從結構上來看，由於桿子和帳篷合而為一，即使經過折疊還是不好收納。#n再加上頂棚相對較低，不太適合當作多人使用的大型帳篷。"
10030020-68 = "而且單薄的布料不耐風雨和寒冷，從各方面來看都很難在冬季使用。"
10030020-69 = "與其為了彌補這些缺點而增加防水油布或遮蓋物，直接使用普通帳篷反而更省事。"
10030020-70 = "[s3]「看來……千尋很瞭解露營耶。」\n[s4]「你平時也常去露營嗎？」"
10030020-73 = "怎麼說呢，我並不會刻意到露營場去露營……"
10030020-74 = "只是保安工作經常需要熬夜，才會在找睡袋的過程中慢慢對露營裝備產生興趣……"
10030020-75 = "偶爾有空的時候，我也會在安靜的郊外搭帳篷曬曬太陽。"
10030020-77 = "在野外曬太陽，總覺得……"
10030020-78 = "是老奶奶才會有的嗜好……"
10030020-85 = "……沒，沒有啦！哈哈哈……"
10030020-87 = "總之我想在天黑之前盡快把帳篷搭好，來這裡集合吧。"
10030020-88 = "大家一起合作，很快就搭好了。#n別露出一臉厭惡的表情嘛。"
10030020-89 = "知道了知道了……"
10030020-93 = "前輩，正面是這一邊對嗎？"
10030020-94 = "嗯，帳篷地墊的銀箔要朝向地面，這樣才能防止濕氣進入。"
10030020-95 = "可是怎麼看都是這面比較好看……"
10030020-96 = "這地墊不是做好看的好嗎……？"
10030020-100 = "副，副部長……這根桿子會不會斷掉啊？#n真，真的可以再彎下去嗎……？"
10030020-101 = "別擔心，它在設計上就能承受那種程度的形變，再用點力沒關係。"
10030020-102 = "可是就算我想再把它弄彎……也沒有這麼大的力氣……"
10030020-107 = "哇，哇啊……墊子被風吹走了！"
10030020-108 = "等等……！要是已經固定好的部分鬆掉會更危險……"
10030020-112 = "我來抓住這邊，你快去把墊子拿回來！"
10030020-124 = "來，最後把固定在防水油布上的繩子整理一下……"
10030020-129 = "搭設完成，大家辛苦了。"
10030020-134 = "好累……"
10030020-135 = "才搭個帳篷，我的體力就已經用光了……"
10030020-137 = "在晚餐之前沒有需要體力的工作了，大家自由休息吧。"
10030020-138 = "就算你這麼說……"
10030020-139 = "現在沒有網路也沒有電子設備，要我們怎麼休息……"
10030020-140 = "這裡不能玩遊戲也不能上網，連鬆軟的沙發都沒有……"
10030020-141 = "……你們除了躺在沙發上玩遊戲就沒有其他休息方式了嗎？"
10030020-142 = "趁這個機會學一下不靠電子設備放鬆的方法吧。"
10030020-143 = "靜下心來在大自然中散步，你們就會發現時間在不知不覺中流逝。"
10030020-149 = "呿……這說法太牽強了。"
10030020-150 = "沒有能收到電波的地方嗎？"
10030020-151 = "說不定高處能收到手機訊號，到附近繞繞吧。"
10030020-156 = "前，前輩，我們去散步一下！"
10030020-158 = "好，別走太遠喔。"
10030020-167 = "露營準備差不多告一個段落了……老師現在要做什麼？"
10030020-168 = "[s5]「我想處理沒做完的工作。」\n[s6]「為了以防萬一，我把一部分的報告印出來了！」"
10030020-171 = "不行，老師今天也不能做平常的工作。"
10030020-172 = "[s]「……為什麼？」"
10030020-173 = "我剛才不是說了嗎？#n這次露營的目的是脫離日常生活，享受悠閒的休息時光。"
10030020-174 = "都到今年最後一天了，老師就忘記工作，好好讓精神放鬆一下吧。"
10030020-181 = "如果老師覺得這樣打發時間很無聊的話，我可以把帶來的書借你。"
10030020-182 = "[s7]「……《槍、可愛、青春》？」\n[s8]「是常常被束之高閣的人文學書籍……」"
10030020-185 = "平時如果刻意留時間讀這類的書，不是會很難集中精神嗎？"
10030020-186 = "但換作是在沒有其他事能做的露營場，就連這類生硬的書也能讀得津津有味。"
10030020-194 = "我也會在旁邊看書，有什麼事就叫我一聲吧。"
10030020-196 = "（於是便坐在陰涼處，和千尋一起享受悠閒的讀書時光）"

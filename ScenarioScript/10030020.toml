[translation]
10030020-1 = "ตอนที่ 2;กางเต็นท์"
10030020-6 = "เอาละ มาถึงแล้ว ที่นี่คือเทือกเขาฮิงาชิที่อยู่ในฝั่งตะวันออกของมิลเลเนียม"
10030020-7 = "เราจะกางเต็นท์กันที่เชิงเขาฮิงาชิทาเกะแล้วอยู่ที่นี่กันหนึ่งคืน แล้วพรุ่งนี้ตอนเช้ามืดเราจะปีนเขาไปดู#nพระอาทิตย์ขึ้นด้วยกัน"
10030020-8 = "ระหว่างนี้จะยังไม่มีกำหนดการอะไรเป็นพิเศษ ให้ทุกคนทำในสิ่งที่อยากทำ แล้วก็ใช้เวลาแบบสบายๆ ได้เลย"
10030020-9 = "[s1] \"ไม่คิดเลยว่าจะได้มาดูธรรมชาติสวยๆ ใกล้มิลเลเนียมแบบนี้...\"\n[s2] \"นึกว่ามิลเลเนียมเป็นเมืองเทคโนโลยี แต่ก็มีทิวทัศน์แบบนี้ด้วยสินะ\""
10030020-12 = "แม้ศูนย์กลางของโรงเรียนมิลเลเนียมจะเต็มไปด้วยอาคารที่สร้างด้วยเทคโนโลยีชั้นสูง แต่ก็ไม่ใช่ว่าจะ#nเป็นอย่างนั้นทุกพื้นที่หรอกนะ"
10030020-13 = "ในเขตปกครองตนเองมิลเลเนียมก็มีเขตที่ยังไม่ได้พัฒนาที่เหมือนกับ <พื้นที่รกร้าง> อยู่หลายที่เหมือน#nกัน"
10030020-14 = "ถึงปกติจะไม่ค่อยมีใครสนใจเท่าไร... แต่ถ้าพูดถึงที่ตั้งแคมป์หรือเดินป่าแล้ว ไม่มีที่ไหนเหมาะสมกว่าที่#nนี่แล้วละ"
10030020-18 = "ลมเย็นๆ ที่พัดผ่านต้นสนทำให้รู้สึกดีจัง..."
10030020-19 = "ทุกคนรู้สึกยังไงกันบ้าง? ได้ออกจากเมืองมาสูดอากาศบริสุทธิ์แบบนี้ สดชื่นทั้งกายและใจเลยใช่มั้ย"
10030020-28 = "ไม่น่าจะใช่แฮะ..."
10030020-29 = "ถึงจะพอเดาได้อยู่แล้วก็เถอะ แต่ไม่คิดเลยว่าจะจับคลื่นสัญญาณไม่ได้จริงๆ..."
10030020-30 = "แถมร้านสะดวกซื้อที่อยู่ใกล้ที่สุดก็อยู่ห่างไปตั้ง 30 กม. แบบนี้จะหาเครื่องดื่มชูกำลังได้จากที่ไหน..."
10030020-31 = "แค่เดินทาง ฉันก็รู้สึกเหมือนใช้แรงหมดไปครึ่งหนึ่งแล้วค่ะ"
10030020-32 = "ทำเป็นจะร้องไห้ตั้งแต่เริ่มทริปได้ยังไง เรายังไม่ได้ตั้งแคมป์เลยด้วยซ้ำนะ"
10030020-33 = "มากิ ช่วยเอากระเป๋าสีแดงออกมาจากท้ายรถให้หน่อยสิ"
10030020-38 = "กระเป๋าสีแดง... ใบนี้เหรอ?"
10030020-44 = "อึก หนักจัง... ขนอะไรมาเนี่ย? ท่อเหล็กเหรอ?"
10030020-45 = "เสาเต็นท์น่ะ เราจะตั้งแคมป์กัน ก็ต้องกางเต็นท์ก่อนสิ"
10030020-46 = "แล้วก็ฝากเอากระเป๋าที่อยู่ข้างหลังนั่นออกมาให้หมดด้วยนะ สัมภาระทั้งหมดตรงนั้นคืออุปกรณ์ที่ใช้ใน#nการกางเต็นท์น่ะ"
10030020-47 = "ของหนักๆ ทั้งหมดนี่คือชิ้นส่วนของเต็นท์หมดเลยเหรอ?!"
10030020-48 = "มาถึงก็ต้องกางเต็นท์ทันทีเลยเหรอเนี่ย ต้องใช้พลังอีกแล้ว..."
10030020-49 = "เรามีห้องชมรมที่ทั้งมั่นคงและสะดวกสบาย ทำไมต้องออกมากางเต็นท์นอนกลางแจ้งกันด้วย... ความคิดริเริ่มแบบนี้มันไร้เหตุผลนะคะ"
10030020-50 = "ถ้าพวกเธอต้องการ จะพักแรมแบบไม่ต้องกางเต็นท์ก็ได้นะ"
10030020-51 = "แต่อากาศในตอนนี้น่ะ ถ้าอยู่กลางแจ้งแบบไม่มีอุปกรณ์ให้ความอบอุ่นก็คงจะหนาวแย่... จะไม่เป็นไรกันเหรอ?"
10030020-57 = "อึก..."
10030020-58 = "ถ้ารองหัวหน้าพูดแบบนั้นก็คงขัดไม่ได้..."
10030020-59 = "เอ่อ... รุ่นพี่... ไม่มีวิธีที่ง่ายกว่านี้เหรอ?"
10030020-60 = "ฉันเคยเห็นในอินเทอร์เน็ตว่ามีเต็นท์ที่กางออกได้เองด้วยนะ..."
10030020-62 = "หมายถึงเต็นท์สนามกางอัตโนมัติสินะ แน่นอนว่าเต็นท์สนามอัตโนมัติน่ะกางง่าย ก็เลยเป็นที่นิยมของ#nนักออกแคมป์มือใหม่..."
10030020-63 = "แต่ด้วยโครงสร้างที่เสาและเต็นท์ติดอยู่ด้วยกัน มันเลยจัดเก็บลำบากเพราะมันมีขนาดใหญ่ ต่อให้พับแล้วก็เถอะ นอกจากนี้ยังมีเพดานต่ำ เลยไม่เหมาะที่จะใช้เป็นเต็นท์ที่นอนหลายๆ คน"
10030020-68 = "อีกอย่าง ผ้าของเต็นท์สนามมักจะบางและไม่ค่อยทนลมฝน ก็เลยไม่เหมาะกับการเอามาใช้ในหน้า#nหนาวอย่างตอนนี้น่ะ"
10030020-69 = "ต่อให้จะเพิ่มหลังคาหรือที่กำบังอะไรเข้าไป สุดท้ายการใช้เต็นท์ธรรมดาก็สะดวกกว่าอยู่ดี"
10030020-70 = "[s3] \"จิฮิโระดู... คุ้นเคยกับการออกแคมป์จังเลยนะ\"\n[s4] \"ปกติก็ชอบมาแคมป์ปิ้งบ่อยๆ เหรอ?\""
10030020-73 = "อืม ฉันก็ไม่ถึงกับไปกางเต็นท์ตามลานแคมป์ปิ้งหรอกนะ..."
10030020-74 = "แต่งานรักษาความปลอดภัยที่ฉันทำมักจะทำทั้งคืน พอต้องหาถุงนอนสำหรับทำงานโต้รุ่ง ฉันก็เลยเริ่มสนใจเกี่ยวกับอุปกรณ์แคมป์ปิ้งขึ้นมา..."
10030020-75 = "ตอนที่งานไม่ยุ่ง ฉันก็จะไปกางเต็นท์อยู่ที่ชานเมืองเงียบๆ แล้วบางครั้งก็นอนอาบแดดด้วย"
10030020-77 = "นอนอาบแดดกลางแจ้งเหรอ..."
10030020-78 = "งานอดิเรกเหมือนผู้สูงวัยเลยแฮะ..."
10030020-85 = "เผลอพูดไปซะได้! แหะ... แหะๆ"
10030020-87 = "ฉันอยากรีบกางเต็นท์ให้เสร็จก่อนพระอาทิตย์ตก ทุกคนมารวมตัวกันทางนี้เร็วเข้า"
10030020-88 = "ถ้าทุกคนลงแรงช่วยกัน แป๊บเดียวก็เสร็จแล้วละ อย่าทำหน้าเหมือนไม่อยากทำขนาดนั้นสิ"
10030020-89 = "ก็ได้ๆ..."
10030020-93 = "รุ่นพี่ อันนี้ด้านหน้าใช่มั้ย? "
10030020-94 = "อื้ม ผ้าปูนั่นเอาไว้รองพื้นนะ ตอนปูก็ให้เอาด้านสีเงินปูลงบนพื้น ทำแบบนั้นจะได้ป้องกันความชื้นได้"
10030020-95 = "แต่ว่าด้านนี้มันสวยกว่านะ..."
10030020-96 = "นั่นไม่ใช่ผ้าที่ปูตกแต่งเพื่อความสวยงามสักหน่อย..."
10030020-100 = "ระ... รองหัวหน้า... เสานี้มันหักรึเปล่า? มะ... มันงอแบบนี้ได้ด้วยเหรอ...?"
10030020-101 = "อื้ม ไม่เป็นไรหรอก มันถูกออกแบบมาให้ทนต่อการดัดแปลงอยู่แล้ว ดึงให้แรงกว่านั้นอีกหน่อยสิ"
10030020-102 = "ฉันพยายามแล้วนะ... แต่ไม่มีแรงงอเสาเลย..."
10030020-107 = "ว้ากก... เบาะปูพื้นปลิวตามลมไปแล้วค่ะ!"
10030020-108 = "ดะ... เดี๋ยวก่อน...! ถ้าดึงส่วนที่ยึดไว้มันจะอันตรายนะ..."
10030020-112 = "ฉันจะจับตรงนี้เอาไว้ให้ รีบวิ่งไปเอาเบาะปูพื้นมาเร็ว!"
10030020-124 = "เอาละ จากนี้ก็แค่จัดการเชือกที่ใช้ยึดหลังคา..."
10030020-129 = "แค่นี้ก็เป็นอันเสร็จแล้ว ทุกคนทำได้ดีมาก"
10030020-134 = "เพลียร่างจัง..."
10030020-135 = "ฉันใช้พลังที่เหลือไปกับการกางเต็นท์จนหมดเลยค่ะ..."
10030020-137 = "จากนี้ก็ไม่มีเรื่องที่ต้องใช้แรงไปจนถึงเวลาอาหารเย็นแล้วละ ทุกคนไปพักผ่อนกันตามสบายเถอะ"
10030020-138 = "พักผ่อนตามสบายงั้นเหรอ..."
10030020-139 = "ไม่มีทั้งอินเทอร์เน็ตหรืออุปกรณ์อิเล็กทรอนิกส์ จะให้พักยังไงน่ะ?"
10030020-140 = "อยู่ที่นี่จะเล่นเกมก็ไม่ได้ ท่องเน็ตก็ไม่ได้ แถมไม่มีโซฟานิ่มๆ ให้นั่งอีก..."
10030020-141 = "นอกจากนั่งเล่นเกมบนโซฟาแล้ว พวกเธอไม่รู้จักวิธีพักผ่อนอื่นๆ เลยเหรอ?"
10030020-142 = "งั้นก็ใช้โอกาสนี้เรียนรู้วิธีการพักผ่อนโดยไม่ต้องใช้อุปกรณ์อิเล็กทรอนิกส์ก็แล้วกัน"
10030020-143 = "ถ้าทำจิตใจให้สงบและไปเดินเล่นท่ามกลางธรรมชาติที่กว้างใหญ่ เวลาจะผ่านไปอย่างรวดเร็วโดยไม่รู้ตัว#nเลยละ"
10030020-149 = "ชิ... บังคับกันนี่นา..."
10030020-150 = "จะมีตรงไหนที่จับคลื่นสัญญาณได้บ้างรึเปล่านะ?"
10030020-151 = "ถ้าเป็นที่สูงๆ ก็อาจจะมีสัญญาณโทรศัพท์ก็ได้นะคะ ลองไปดูรอบๆ กันเถอะค่ะ"
10030020-156 = "ระ... รุ่นพี่ พวกเราไปเดินเล่นกันเดี๋ยวมานะ!"
10030020-158 = "อื้อ อย่าไปไกลนักล่ะ"
10030020-167 = "เท่านี้การเตรียมตั้งแคมป์ก็น่าจะเสร็จแล้ว... งั้นจากนี้คุณครูจะทำอะไรเหรอ?"
10030020-168 = "[s5] \"ครูว่าจะทำงานที่ค้างให้เสร็จน่ะ\"\n[s6] \"ครูเอาเอกสารรายงานมาทำด้วย\""
10030020-171 = "ไม่ได้สิ วันนี้คุณครูเองก็ห้ามทำงานด้วยเหมือนกัน"
10030020-172 = "[s] \"...ทำไมล่ะ?\""
10030020-173 = "เมื่อกี้ฉันก็บอกไปแล้วไม่ใช่เหรอ? การมาแคมป์ปิ้งครั้งนี้มีวัตถุประสงค์เพื่อออกจากนิสัยการใช้ชีวิต#nตามปกติ และเพลิดเพลินไปกับการพักผ่อนหย่อนใจแทน"
10030020-174 = "นี่เป็นวันสุดท้ายของปีแล้ว วันนี้คุณครูก็ลืมเรื่องงานไปก่อน แล้วมาพักทำจิตใจให้สบายๆ นะ"
10030020-181 = "ถ้าการอยู่เฉยๆ มันน่าเบื่อ ฉันจะให้ยืมหนังสือที่พกมาด้วยแล้วกัน"
10030020-182 = "[s7] \"<ปืน ความน่ารักและวัยรุ่น>...?\"\n[s8] \"เป็นหนังสือที่ครูไม่เคยหยิบออกจากชั้นเลยแฮะ...\""
10030020-185 = "ปกติแล้วถ้าตั้งใจหาเวลาอ่านหนังสือแบบนี้ มันก็ยากที่จะมีสมาธิอ่านใช่มั้ยล่ะ?"
10030020-186 = "แต่ถ้าเรามาตั้งแคมป์ที่ไม่มีอะไรอื่นให้ทำแบบนี้ ก็จะอ่านหนังสือเล่มหนาๆ ได้อย่างสนุกเลยละ"
10030020-194 = "ฉันจะอ่านหนังสืออยู่ข้างๆ ถ้ามีเรื่องอะไรก็เรียกด้วยนะ"
10030020-196 = "(หลังจากนั้นคุณครูก็นั่งอ่านหนังสือใต้ร่มไม้กับจิฮิโระอยู่ครู่ใหญ่)"

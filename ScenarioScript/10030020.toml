[translation]
10030020-1 = "Episode 2;Pitch the Tent"
10030020-6 = "We're here. These are the Higashi Alps, the mountains on Millennium's eastern border."
10030020-7 = "We'll set up camp here at the base of Mt. Higashidake, sleep overnight, and climb the mountain early in the morning to catch the sunrise."
10030020-8 = "I don't have anything planned until then, so feel free to explore the area and enjoy the day after we set up camp."
10030020-9 = "[s1] \"To see such beautiful natural scenery near Millennium...\"\n[s2] \"I thought Millennium was almost fully urbanized.\""
10030020-12 = "The buildings at Millennium's heart may have been built with advanced technology, but the outskirts have more variety."
10030020-13 = "There are quite a few places that haven't felt the touch of our technology, like the Millennium ruins."
10030020-14 = "They aren't what we're known for...but we also have perfect campsites and hiking trails."
10030020-18 = "...I like listening to the breeze whispering through the pine trees."
10030020-19 = "How is everyone feeling? Haven't your mind and body been refreshed by escaping the city and breathing the fresh air—"
10030020-28 = "...Or not."
10030020-29 = "I tried to prepare my heart, but there's really no signal at all..."
10030020-30 = "The nearest convenience store is over thirty kilometers away... Wh-Where will I get my energy drinks?"
10030020-31 = "It feels like I've already lost half of my strength from travelling this far..."
10030020-32 = "It's too early to start grumbling. We haven't even started camping."
10030020-33 = "Maki, can you retrieve the red pouch from the car?"
10030020-38 = "Red pouch... You mean this?"
10030020-44 = "Ugh, it's heavy... What is all this? Steel pipes?"
10030020-45 = "They're poles for our group tent. We'll need to build the tent we'll be sleeping in."
10030020-46 = "Grab all of the bags that were behind that one. They have everything we need."
10030020-47 = "Why would a tent be this heavy?"
10030020-48 = "Why do I have to use up my remaining energy bar on setting up camp right after arriving..."
10030020-49 = "Building a tent and sleeping outdoors when we have a warm and comfortable club room... How illogical."
10030020-50 = "Well, feel free to sleep beneath the stars if you want."
10030020-51 = "But it gets chilly this time of year. It's going to be a long, cold night without anything to keep you warm... Is that okay?"
10030020-57 = "Urgh..."
10030020-58 = "It can't be helped, if the vice president says so..."
10030020-59 = "Uh... Isn't there an easier way?"
10030020-60 = "I saw an ad for a tent that builds itself automatically online..."
10030020-62 = "You mean a pop-up tent. Pop-up tents are preferred by beginners because they're easy to set up..."
10030020-63 = "But since their poles and tent fabric are combined, they take up a lot of space even after folding, making them difficult to store. They're also not suitable for large tents designed to hold multiple people due to their low ceilings."
10030020-68 = "And they tend to be made with thin fabric, which makes them susceptible to rainy weather and cold temperatures. So, no, pop-up tents are less than ideal during the winter."
10030020-69 = "You would need to add some tarp or build some kind of shelter to compensate. At that point, it's less of a hassle to set up a normal tent."
10030020-70 = "[s3] \"Chihiro is quite the outdoorswoman.\"\n[s4] \"Have you gone camping often?\""
10030020-73 = "Well, it's not like I go to campsites or anything like that..."
10030020-74 = "But my security work often requires me to pull all-nighters. I became interested in camping equipment when I was looking for portable sleeping bags..."
10030020-75 = "Occasionally I set up a privacy tent and sunbathe outside of the academy when there's downtime between my jobs."
10030020-77 = "Sunbathing outside, that's like..."
10030020-78 = "A grandma's hobby..."
10030020-85 = "...O-Or a granddaughter's! Ha, haha..."
10030020-87 = "...Regardless, we should build the tent before the sun sets, so I want everyone to gather around."
10030020-88 = "Many hands make light work. So chin up, we'll be done in no time."
10030020-89 = "Fine, fine..."
10030020-93 = "Chihiro, is this the front of the tent? "
10030020-94 = "Yes. Make sure to spread out the ground sheet with the foil facing down. That way it will prevent moisture from forming."
10030020-95 = "But it looks so much prettier this way..."
10030020-96 = "It's not a sheet for aesthetic purposes."
10030020-100 = "V-Vice President... Are you sure this pole isn't going to break? C-Can I really bend it like this?"
10030020-101 = "It's fine. It's designed to withstand much more strain than that, so pull harder."
10030020-102 = "But even if I try to bend it more... My strength is gone..."
10030020-107 = "W-Whoa, the mat is flying away!"
10030020-108 = "W-Wait! Someone might get hurt if that stake gets loose—"
10030020-112 = "I'll hold this side down, so go secure it!"
10030020-124 = "Finally, if we tie down the cord that's securing the tarp..."
10030020-129 = "That's the final step. Good work, everyone."
10030020-134 = "I'm exhausted..."
10030020-135 = "Setting up the tent consumed all of my strength..."
10030020-137 = "We don't have anything scheduled until dinnertime, so feel free to rest."
10030020-138 = "Even if you say we can rest..."
10030020-139 = "How can we relax without the internet or any electronic devices?"
10030020-140 = "I can't game, I can't surf the web—there isn't even a sofa to lounge on..."
10030020-141 = "...Do none of you have any notion of ways you can relax other than loafing around and playing video games?"
10030020-142 = "This is a chance to learn ways to rest without plugging yourselves in."
10030020-143 = "Take a walk and view the natural beauty around us. You'll be amazed at how quickly time flies by."
10030020-149 = "Ugh... What a joke..."
10030020-150 = "Do you think I could get a signal from that hilltop?"
10030020-151 = "It may be possible to connect to the phone network higher up. Let's look around."
10030020-156 = "Ch-Chihiro, we're going for a walk!"
10030020-158 = "Good, but make sure to stay on the path!"
10030020-167 = "Well, since the camp is ready now... Sensei, what will you do until dinner?"
10030020-168 = "[s5] \"I have some work I need to catch up on...\"\n[s6] \"I printed out some reports to read!\""
10030020-171 = "Absolutely not. Sensei, you're also forbidden from your usual work today."
10030020-172 = "[s] \"...Why not?\""
10030020-173 = "The whole point of this camping trip is to escape from our unhealthy ruts and refresh ourselves in a new environment."
10030020-174 = "It's the last day of the year. You should set aside your work and turn your mind towards something else, at least for today."
10030020-181 = "I can lend you one of the books I brought, if you need a way to pass the time."
10030020-182 = "[s7] \"...'Guns, Charm, and Zeal,' the pop anthropology book?\"\n[s8] \"'The Shower Broker,' a biography of an infamous bath developer?\""
10030020-185 = "It's hard to focus on these kinds of books when you try to make time for them on purpose, right?"
10030020-186 = "But even dry books can be absorbing when you've removed outside distractions, like at a campsite."
10030020-194 = "I'll be reading a book over here, so just call me if you need anything."
10030020-196 = "Chihiro and I sat beneath the shade, passing peaceful hours reading together."

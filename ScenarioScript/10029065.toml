[translation]
10029065-6 = "搞什麼……！是不是比剛才更多了啊！？根本沒完沒了！！"
10029065-7 = "那當然，畢竟是相當重要的設施。對方想必會傾盡全力保護。"
10029065-12 = "而且護盾依然完好無缺……"
10029065-14 = "無人機也一直在增加……雖然要對付它們不成問題……"
10029065-15 = "但這樣下去就無法阻止設施「運轉」了。"
10029065-16 = "明明就差一點點而已！！難道一切都要功虧一簣了嗎！？"
10029065-17 = "唉，就算再來一次也只會重蹈覆轍嗎！？無限循環……！？"
10029065-18 = "那實在有點……！！"
10029065-19 = "哈啊啊啊啊啊啊──！！！"
10029065-23 = "……嗯？怎麼回事？"
10029065-24 = "這個聲音……"
10029065-25 = "……！！什麼時候到操作面板附近了！？"
10029065-26 = "……佐天學妹！？！？"
10029065-28 = "只要摧毀那個東西就行了吧？"
10029065-29 = "如果是那樣的話……！就由我來……！！"
10029065-30 = "唔啊啊啊！？請，請等一下……！防禦子彈的護盾還沒……！！"
10029065-31 = "如果子彈行不通……！！"
10029065-32 = "……直接打壞它就沒問題了吧！！"
10029065-33 = "哈啊啊啊啊──！！"
10029065-47 = "哈啊，哈啊……哈啊……哈啊……"
10029065-53 = "呼，呼……"
10029065-54 = "……用……"
10029065-55 = "用槍身把護盾給……"
10029065-56 = "什，什麼？剛才那個擊球姿勢……？難道之前是棒球選手嗎……！？"
10029065-57 = "……成功……了嗎？成功了嗎？"
10029065-58 = "好像稍微安靜下來了……"
10029065-59 = "[s1]「是……嗎？」\n[s2]「無人機確實停下來了……」"
10029065-62 = "成功了嗎……？這麼輕鬆……？"
10029065-63 = "怎麼覺得……"
10029065-64 = "好像有點太容易了……"
10029065-65 = "……御坂同學。"
10029065-66 = "……啊。"
10029065-67 = "完全是在立Flag……"
10029065-72 = "……呵呵。"
10029065-74 = "果然會這樣！！"
10029065-75 = "咦，咦咦！？"
10029065-81 = "……真是敗給你了。"
10029065-82 = "機器發光了……！！"
10029065-83 = "……！"
10029065-84 = "嗚啊啊啊啊啊啊啊啊──！？！？"
10029065-93 = "……咦？"
10029065-95 = "……？"
10029065-96 = "……嗯？"
10029065-97 = "怎……怎麼回事？"
10029065-101 = "大家……都沒事吧？有沒有人不見了？"
10029065-102 = "嗯，嗯……我沒事。"
10029065-103 = "[s3]「大家好像都沒事。」\n[s4]「什麼事都沒發生嗎？」"
10029065-106 = "難道……是故障？"
10029065-107 = "因為在適當的時機施加了衝擊，讓它無法正常運作了！？"
10029065-108 = "真的就這樣解決了嗎！？"
10029065-109 = "我們本來的目的是把機器修好，解決這個說法有點……"
10029065-110 = "……不。"
10029065-111 = "……設施啟動了。#n只是運轉方向相反而已。"
10029065-112 = "不是將我們傳走……"
10029065-113 = "……而是把人傳送了過來。"
10029065-114 = "[s] 「…………」"
10029065-116 = "[ns] 「……什麼？？」"
10029065-132 = "！？"

[translation]
10029065-6 = "อะไรเนี่ย...! ทำไมมีเยอะกว่าเมื่อกี้อีกล่ะ!?  ออกมากันไม่หยุดเลย!!"
10029065-7 = "ไม่แปลกหรอก เพราะเครื่องมือนั่นมันสำคัญมากนี่นา มันก็คงพยายามปกป้องตัวเองอย่างเต็มที่น่ะ"
10029065-12 = "บาเรียก็ยังทำงานดีอยู่..."
10029065-14 = "ส่วนโดรนก็เพิ่มมากขึ้นเรื่อยๆ แค่สิ่งที่เราต้องรับมือด้วยน่ะไม่เป็นปัญหาหรอก..."
10029065-15 = "แต่ถ้าเป็นแบบนี้ละก็ เราไม่มีเวลาหยุด 'การทำงาน' ของเครื่องมือตรงนั้นแน่"
10029065-16 = "อยู่ตรงหน้าแล้วแท้ๆ เชียว!! เราต้องเข้ามาถึงตรงนี้ใหม่ตั้งแต่ต้นเหรอคะ? ?"
10029065-17 = "เดี๋ยวนะ ถ้าตอนเข้ามาใหม่ ก็จะเจอสถานการณ์แบบนี้อีกหรือเปล่าคะ!?  แบบนี้ก็ไม่จบไม่สิ้นเลยสิ?"
10029065-18 = "อย่างนั้นมัน...!!"
10029065-19 = "ย้ากกกกกกก!!!"
10029065-23 = "...? หืม? อะไรคะนั่น?"
10029065-24 = "เสียงนี้มัน..."
10029065-25 = "...!!  มีคนเข้าไปใกล้แผงหน้าปัด!!"
10029065-26 = "... คุณซาเต็น!?!?"
10029065-28 = "แค่ต้องทำลายอันนี้ใช่ไหมคะ!? แค่ทำให้พังก็พอแล้วใช่ไหมคะ!?"
10029065-29 = "ถ้าแค่ต้องทำแบบนี้ละก็...! ฉันลุยเอง...!!"
10029065-30 = "ว้ากกก!?  ดะ... เดี๋ยวก่อนค่ะ...! บาเรียป้องกันกระสุนยังทำงานอยู่...!!"
10029065-31 = "ถ้าใช้กระสุนไม่ได้ผล...!!"
10029065-32 = "... คงต้องไปทุบให้พังแล้วละค่ะ!!"
10029065-33 = "ย้ากกกกก!!"
10029065-47 = "แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก..."
10029065-53 = "แฮ่ก... แฮ่ก..."
10029065-54 = "... ชะ..."
10029065-55 = "ใช้กระบอกปืนทุบเองเลยเหรอ..."
10029065-56 = "อะ... อะไรคะเนี่ย? ท่าตีเมื่อกี้มัน...? เป็นอดีตนักเบสบอลหรือเปล่าคะ...!?"
10029065-57 = "... ได้... หรือยังคะ? ได้แล้วมั้ยนะ?"
10029065-58 = "เหมือนมันจะเบาลงแล้วนะ..."
10029065-59 = "[s1] \"อย่างงั้นเหรอ...?\"\n[s2] \"โดรนก็หยุดวุ่นวายกันแล้วด้วย...\""
10029065-62 = "หรือว่าเราคลี่คลายสถานการณ์... ได้แล้ว? ง่ายแบบนี้เลยเหรอ...?"
10029065-63 = "มันดู..."
10029065-64 = "คลี่คลายได้ง่ายกว่าที่คิดไปหน่อย..."
10029065-65 = "... คุณมิซากะ"
10029065-66 = "... อ่า"
10029065-67 = "ที่เพิ่งพูดไปเมื่อกี้น่ะ เหมือนมันจะเป็นการบอกเปรยๆ ว่าหลังจากนี้จะ..."
10029065-72 = "... ฮุฮุ"
10029065-74 = "ว่าแล้วเชียว!!"
10029065-75 = "อะ... อะไรเหรอ!?"
10029065-81 = "... เป็นคนที่ยอดเยี่ยมจริงๆ เลย"
10029065-82 = "มีแสงออกมาจากเครื่องด้วย...!!"
10029065-83 = "...!"
10029065-84 = "ว้ากกกกกกกกกกก!?!?"
10029065-93 = "... เอ๋?"
10029065-95 = "...?"
10029065-96 = "... หืม?"
10029065-97 = "เมื่อกี้... อะไรน่ะ?"
10029065-101 = "ทุกคนปลอดภัยดี... ใช่มั้ย? ไม่มีใครหายไปใช่มั้ย?"
10029065-102 = "ค่ะ... ค่ะ... ฉันไม่เป็นไรค่ะ"
10029065-103 = "[s3] \"ทุกคนน่าจะปลอดภัยดีนะ\"\n[s4] \"ไม่มีอะไรเกิดขึ้นเหรอเนี่ย?\""
10029065-106 = "หรือว่า... เครื่องทำงานล้มเหลว?"
10029065-107 = "เราทำให้เกิดความเสียหายทางกายภาพในจังหวะเวลาที่เหมาะสม เครื่องก็เลยทำงานอย่างไม่มี#nประสิทธิภาพเหรอคะ??"
10029065-108 = "งั้นก็แปลว่าเราคลี่คลายสถานการณ์ได้แล้วสิ!?"
10029065-109 = "เป้าหมายเริ่มแรกของเราคือการซ่อมแซมเครื่องมือ ถ้าจะบอกว่าคลี่คลายมันก็ไม่ถูก..."
10029065-110 = "... ไม่สิ"
10029065-111 = "... เครื่องมือมันยังทำงานอยู่เลยนี่นา มันแค่ทำงานตรงกันข้าม"
10029065-112 = "มันไม่ได้หยุดการส่งไป... อืม..."
10029065-113 = "... แต่กลับเรียกอะไรบางอย่างมาทางนี้"
10029065-114 = "[s] \"......\""
10029065-116 = "[ns] \"...... หา??\""
10029065-132 = "!?"

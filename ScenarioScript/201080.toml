[translation]
201080-1 = "第8話;虚像と推論"
201080-4 = "[ns1] \"……どうしてサングラスを？\"\n[ns2] \"サングラス、よく似合ってるよ！\""
201080-5 = "変装です。正体がバレてはいけませんので。"
201080-6 = "ファッションではありません。変装です。"
201080-7 = "[s] \"変装……？\""
201080-8 = "はい。"
201080-9 = "これから、聞き込み調査を行います。#n私が知る連邦生徒会長を覚えている人を探すために。"
201080-10 = "今日一日、行政委員会の皆さんの様子を見ていたのですが、#n連邦生徒会長に違和感を覚える人は誰一人いませんでした。"
201080-11 = "さらに各自治区の代表にも特別な反応はありませんでした。#nこれらの状況から推測すると――"
201080-12 = "記憶の改ざんはキヴォトス全体に及んでいると思われます。"
201080-13 = "[s] \"キヴォトス全体の記憶が改ざん……。\""
201080-14 = "荒唐無稽に聞こえることは分かっています。"
201080-15 = "ですが私や先生のように、元の連邦生徒会長を覚えている者がいるとすれば……。"
201080-16 = "「本物の連邦生徒会長」の行方を掴めるかもしれません。"
201080-17 = "[s3] \"今のところ、その方法しかないよね……。\"\n[s4] \"私もシャーレに来てくれる生徒に聞いてみるよ。\""
201080-20 = "ありがとうございます。とても頼りになります。"
201080-24 = "……当然、私の記憶違いも疑いました。"
201080-25 = "すぐさま周囲の信頼を得て、連邦生徒会が活気を取り戻していく様子を見ていたら、#n尚更そう思うようになりましたが……。"
201080-26 = "それでもあの人は――"
201080-28 = "リンちゃん。"
201080-30 = "リンちゃん～"
201080-32 = "リンちゃん！"
201080-34 = "――決して、私が記憶している連邦生徒会長ではありません。"
201080-38 = "すみません、少し話が長くなりました。"
201080-42 = "[ns] \"それより、そのサングラスはずっとかけてるつもり？\""
201080-43 = "もちろんです。私の身元がバレてしまえば、調査にも影響が出てしまいます。"
201080-44 = "なにより、行政官が連邦生徒会長を疑っているという話が広まってしまえば、#nまた別の混乱を招く可能性がありますから。"
201080-45 = "怪しまれないように、変装をするのが先決でしょう。"
201080-46 = "[s] （もっと怪しまれそうな気が……）"
201080-47 = "なんですか、その顔は。"
201080-48 = "もしかして……このサングラス、おかしいでしょうか？"
201080-49 = "[s5] \"そ、そんなことないよ？\"\n[s6] \"に、似合いすぎてて、つい……。\""
201080-52 = "…………。"
201080-53 = "時間がありません。続きは歩きながら話しましょうか。"
201080-54 = "まずは多くの生徒が集まる商業施設からです。"
201080-56 = "シラトリ区・コーギータウン"
201080-59 = "（市内の繫華街で、連邦生徒会長について聞き込みを始めた）"
201080-60 = "……連邦生徒会長ですか？お戻りになられて本当に良かったです。"
201080-61 = "ご不在の間は、あれこれ不便なことが多かったですから……。"
201080-62 = "復帰されたのですし、市内で銃撃戦に巻き込まれるような心配も減るといいですよね。"
201080-64 = "連邦生徒会長の印象？いやぁ～？変わったかなぁ？"
201080-65 = "私は人の顔を覚えるのが苦手でな……。"
201080-66 = "髪色がちょっと変わったとか……？"
201080-68 = "明らかに違いますよね！こういうのには敏感なんです。"
201080-69 = "失踪される前と比べて……髪の毛が5cmほど短くなりました！"
201080-70 = "手入れは1人じゃ難しいですし、定期的に美容室に通わなきゃいけないのに……。"
201080-71 = "彼女が消えていた間、どの美容師さんがついていたんですかね？"
201080-73 = "（誰も、前の連邦生徒会長を覚えていなかった……）"
201080-75 = "連邦生徒会長の印象が変わった？さぁ～どうだろ。"
201080-76 = "エリカちゃん、なんか心当たりとかある？"
201080-77 = "うーん……私も特には。"
201080-78 = "連邦生徒会長って元々ああいう印象だったでしょ？#n品格のある笑顔に、紫色の瞳、綺麗なプラチナブロンドの髪――"
201080-79 = "あ、だって、あの色を真似した「会長ブロンド」が流行ってたくらいだし？"
201080-80 = "そうそう！人気だったよね～"
201080-81 = "あたしも毛先だけ染めよっかなって悩んだもん。"
201080-82 = "いつも話題の中心にいるから、覚えてないわけないよ。"
201080-84 = "[ns7] \"……そっか。\"\n[ns8] \"ゲヘナの生徒も注目してるんだね。\""
201080-87 = "もちろん。キヴォトスの安全を守る連邦生徒会長を知らないわけないでしょ。"
201080-91 = "……マコト？誰？それ。#nうーん、どこかで聞いたことあるような……。"
201080-93 = "（そして、怪しまれる羽目になることも）"
201080-98 = "そこ、止まれ！"
201080-99 = "ここで連邦生徒会長に関するデマを広めているのって、あなた達ですよね？"
201080-100 = "まったく……どうしてそのようなデマを？"
201080-101 = "そのせいで苦情がきてて、こっちだって困ってるんですよ。"
201080-102 = "[s] \"いや、そういうつもりは……。\""
201080-103 = "あれ、あなたは――"
201080-104 = "[USERNAME]先生！？"
201080-105 = "こ、これは失礼しました。私たちも通報で来たものでして。"
201080-106 = "先生が仰るなら、なにか誤解があったのでしょう。"
201080-107 = "ですが気をつけてください。#n連邦生徒会長が戻られたとはいえ、誰もが安心して暮らせているわけではないので。"
201080-108 = "一部からですが、失踪の原因と経緯について真相究明を求める声もあがっていて……。"
201080-109 = "しばらくは、D.U.が騒がしくなりそうですね。"
201080-114 = "[ns] \"結局、連邦生徒会長を覚えてる人は見つからなかったね。\""
201080-115 = "……ええ。"
201080-116 = "[s9] \"……そろそろ帰ろうか？\"\n[s10] \"もう遅いし、寒くなってきたよ。\""
201080-119 = "もう少しだけ……お願いします。"
201080-120 = "もっと探せば、見つけられるかもしれません。"
201080-121 = "30分だけでもいいので――"
201080-123 = "今日はツイてないかと思いきや……まさかシャーレの先生に出会えるとは。"
201080-128 = "しかも人目を避けて、暗い場所で生徒と二人きり……。"
201080-129 = "これは――"
201080-133 = "特ダネですね！"
201080-134 = "[s] \"マイ！？\""
201080-135 = "はい！クロノスチャンネルのメインMCにして真実を逃さない執拗なジャーナリスト！#n[ruby=かざまき]風巻[/ruby]マイです！"
201080-136 = "いやぁ～今日はインタビューのドタキャンが多くて落ち込んでたんですけど……#nまさか[USERNAME]先生に出会うだなんて！#nおかげで手ぶらで帰る心配はなくなりました！"
201080-142 = "それより、こちらの生徒さんは？"
201080-143 = "コソコソと密会していたということは……どこかのお偉いさんとか……？"
201080-144 = "それか、人には言えない密接な関係……？"
201080-145 = "[s11] （このタイミングでマイに見つかるなんて……）\n[s12] （困ったな……）"
201080-148 = "……あれ？"
201080-149 = "……あれあれ？どこかで見覚えがあるような……？"
201080-150 = "その尖った耳に、青みがかった黒い髪の毛……。"
201080-151 = "クロノスチャンネルで取材したこともあるような気がしますが、誰でしたっけ……。"
201080-156 = "……あ！"
201080-158 = "（バレてしまいましたか……）"
201080-159 = "あなた、秘密主義のアイドルグループ「K.G.S.C」のボーカル、「リナ」ですね！？"
201080-160 = "……はい？"
201080-165 = "とぼけたって無駄ですよ？#n先日のバンド大会で彗星のごとく現れて大人気を博すも姿を消してしまった――#n名前も出身校も分からない秘密主義アイドルグループ！ですよね？"
201080-166 = "取材のためにあれこれ試してみたのですが、情報は何一つ得られずじまい……。"
201080-167 = "この機会に、ぜひお言葉を……！"
201080-168 = "いえ、それよりまずはお名前と出身校を教えていただけますか！？"
201080-169 = "[s] \"マイ、いったん落ち着いて。\""
201080-170 = "そ、そんな真顔で……いきなりどうされたんですか？"
201080-171 = "[s13] \"……リナちゃんはシャーレの仕事を手伝ってくれてるんだ。\"\n[s14] \"キヴォトスの安全に関わることだから、秘密にしてほしい。\""
201080-172 = "……誰が「リナちゃん」ですか。"
201080-174 = "よりによって機密情報とは……。"
201080-175 = "分かりました。先生の頼みなら仕方ありません。"
201080-176 = "これを無視したら、報道部に爆弾が飛んでくる可能性もあるので……。"
201080-177 = "とはいえ、手ぶらで帰るわけにはいかないというのも理解してもらいたくて……#n何か代わりに、特ダネになりそうなことを教えてくれませんか？"
201080-178 = "シャーレの先生だけが知っているスキャンダルとか……。"
201080-180 = "まだ誰にも言っていない先生の秘密とか……！"
201080-181 = "[s] （ちょうどいいし、マイにも聞いてみよう）"
201080-185 = "[ns] \"じゃあ、連邦生徒会長が交代したって話は知ってる？\""
201080-186 = "はい？失踪している間に入れ替わったってことですか？"
201080-192 = "はあ……何を言ってるんですか。"
201080-193 = "そんな話、誰も聞いてくれませんよ。"
201080-194 = "いや、むしろシャーレの先生が陰謀論を信じているということが特ダネになるのでは……？"
201080-195 = "[s] \"それは勘弁してほしいかな……。\""
201080-196 = "とにかく、そんな話は聞いたことありませんね。"
201080-197 = "連邦生徒会長のような著名人を誰にもバレずに交代させるなんて、#nそれがどれだけ難しいか分からないわけではないでしょう？"
201080-198 = "……あ、そういえば誰かが似たようなことを言ってたような。"
201080-199 = "連邦生徒会長は青い瞳に水色の髪の毛だったのに、戻ってきたら変わっていたと――"
201080-201 = "それは誰ですか！？"
201080-203 = "びっくりしたぁ！いきなりどうしたんですか？"
201080-204 = "どこで、誰に聞いたのですか！その人に会わないといけないんです！"
201080-205 = "えっと……あ、アオバ西区にある古いドリンクバーの常連さん、ですが……。"
201080-206 = "面白い話があるからって、前に取材に行ったんですよ。#nなのにでたらめな都市伝説ばっかり聞かされて。"
201080-207 = "この時間帯なら会えるんじゃないですかね。#n変なガラクタをいっぱいつけてるので、すぐ見つかると思いますよ。"
201080-208 = "ありがとうございます。大変助かりました。"
201080-209 = "[s] \"ありがとう！あとでお礼するね！\""
201080-210 = "ど、どういたしまして……。"
201080-216 = "先生とアイドル、それに連邦生徒会長って……どういう組み合わせ？"
201080-218 = "次回;グッドイブニング・ミスターオーウェル"

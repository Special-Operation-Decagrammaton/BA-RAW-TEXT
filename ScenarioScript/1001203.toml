[translation]
1001203-1 = "和指導員一起"
1001203-2 = "千年周邊的購物中心"
1001203-4 = "（因為睡過頭，和堇約定的時間遲了約30分鐘）"
1001203-5 = "[s]（尋找堇）"
1001203-6 = "（明明是預定在這邊見面的，卻看不見堇）"
1001203-7 = "[s]「…… 嗯？」"
1001203-13 = "呼，呼……"
1001203-14 = "啊，指導員！"
1001203-15 = "恭候多時了。"
1001203-16 = "[s]「我遲到了抱歉哦。」"
1001203-17 = "沒關係的，指導員。"
1001203-18 = "正好因為今天有這趟外出，而擔憂今天的運動量會不足。"
1001203-19 = "在空閒的時間，稍微做了深蹲。"
1001203-20 = "果然深蹲，是很好的運動呢。"
1001203-21 = "雖然只有稍微做一下，下半身的肌肉卻已經脹脹的，"
1001203-22 = "[s]「那個，不會在意周圍的人之類的嗎？」"
1001203-23 = "感覺差不多緊繃……什麼？"
1001203-24 = "啊……………"
1001203-25 = "……啊啊啊啊！！！"
1001203-28 = "[s]「呃，堇！」"
1001203-29 = "（前往堇消失的方向）"
1001203-31 = "唔，唔唔唔唔……"
1001203-32 = "不，不好意思。指導員。"
1001203-33 = "等待的期間正在思考要做什麼才好的時候，"
1001203-34 = "對了，來做深蹲吧，這樣靈機一動。"
1001203-35 = "原本只是想稍微做一下，卻沉迷了……"
1001203-36 = "如，如果，那個……"
1001203-37 = "指導員感覺到，和我在一起會覺得羞恥的話……"
1001203-38 = "[s1]「不會，沒有那種事唷。」\n[s2]「努力運動的樣子，我認為很美唷。」"
1001203-39 = "……非常謝謝您，溫柔的話語。"
1001203-40 = "……非常謝謝您，溫柔的話語。"
1001203-41 = "不過，今後如果有因我而在意的事的話，"
1001203-42 = "請務必告訴我。"
1001203-43 = "雖然我的肌肉，當然也很重要。"
1001203-44 = "比起這個，指導員更加……"
1001203-45 = "……"
1001203-46 = "[s]「？」"
1001203-47 = "不，不是的！什麼都沒有！"
1001203-48 = "那，那麼！去買乳清蛋白吧！？"
1001203-49 = "來走吧！"
1001203-52 = "（和不知為何有點害羞的堇一起逛街，買了乳清蛋白）"
1001203-54 = "千年．近郊街道"
1001203-55 = "今天非常謝謝您，指導員。"
1001203-56 = "多虧了您，買到了好商品。"
1001203-57 = "特別是，從遠處發現大特價販賣所剩無幾的乳清蛋白的瞬間，"
1001203-58 = "一瞬間將購物中心的人潮撥開，迅速取得剩餘的乳清蛋白指導員的身姿。"
1001203-59 = "那是，充滿判斷力和行動力，真正帥氣大人的感覺。"
1001203-60 = "看著那個身姿的指導員，嚷嚷著到底買了什麼周圍的反應也很有趣呢。"
1001203-61 = "那種動作是我沒辦法做到的。"
1001203-62 = "[s3]「啊哈哈，真害羞呢。」\n[s4] （徹底的散發霸氣）"
1001203-63 = "呵呵，指導員真的是很有趣的人呢。"
1001203-64 = "呵呵，指導員真的是很有趣的人呢。"
1001203-65 = "總之，買這麼多的話我想應該足夠了。"
1001203-66 = "什麼？乳清蛋白，會不會買太多了，嗎？"
1001203-67 = "因為乳清蛋白，是比想像中消耗得還要快的東西。"
1001203-68 = "而且……"
1001203-69 = "我想，最近馬上會有需要的人。"
1001203-70 = "嗯？說的是誰，嗎？"
1001203-71 = "那是祕密。"
1001203-72 = "我想，大概很快就會知道了。呵呵。"
1001203-73 = "那麼我差不多該回去了。"
1001203-74 = "請回去路上注意安全哦，指導員。"
1001203-77 = "（思考著堇說的「誰」會是誰呢的同時返回家中）"

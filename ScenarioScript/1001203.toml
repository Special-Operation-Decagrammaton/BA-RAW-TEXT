[translation]
1001203-1 = "ไปด้วยกันกับเทรนเนอร์"
1001203-2 = "ห้างสรรพสินค้า ชานเมืองมิลเลเนียม"
1001203-4 = "(คุณครูมัวแต่นอนกลางวันเลยทำให้มาช้ากว่าเวลานัดไป 30 นาที)"
1001203-5 = "[s] มองหาสึมิเระ"
1001203-6 = "(คุณครูไม่เจอสึมิเระในบริเวณที่นัดพบ)"
1001203-7 = "[s] \"...อืม?\""
1001203-13 = "แฮ่ก...แฮ่ก…"
1001203-14 = "อ๊ะ เทรนเนอร์คะ!"
1001203-15 = "ฉันกำลังรออยู่เลยค่ะ"
1001203-16 = "[s] \"ขอโทษที่มาช้านะ\""
1001203-17 = "ไม่เป็นไรค่ะ เทรนเนอร์"
1001203-18 = "ฉันกังวลว่าจะออกกำลังกายได้ไม่ครบตามกำหนด เพราะมีนัดกับคุณครูวันนี้น่ะค่ะ"
1001203-19 = "โชคดีที่คุณครูมาช้านิดหน่อย ฉันเลยมีเวลาไปฝึกสควอทมาค่ะ"
1001203-20 = "สควอทนี่เป็นวิธีออกกำลังกายที่ดีมากเลยนะคะ"
1001203-21 = "ถึงจะฝึกไม่นานแต่ก็รับรู้ได้เลยว่ากล้ามเนื้อช่วงล่างตึงมากๆ"
1001203-22 = "[s] \"เอ่อ... เธอไม่แคร์เหรอว่าคนอื่นจะมองว่ายังไง?\""
1001203-23 = "มันรู้สึกเหมือน... คะ?"
1001203-24 = "อ่า...\n"
1001203-25 = "อ๊าาาาา!"
1001203-28 = "[s] \"สึ...สึมิเระ!\""
1001203-29 = "(วิ่งตามสึมิเระไป)"
1001203-31 = "อ๊าาาาา....!"
1001203-32 = "ขะ... ขอโทษค่ะ เทรนเนอร์"
1001203-33 = "ฉันมัวแต่คิดว่าระหว่างรอจะทำอะไรดี"
1001203-34 = "จู่ๆ ก็คิดว่าถ้าสควอทรอไปพลางๆ น่าจะดีกว่า"
1001203-35 = "ฉันจะฝึกแค่แป๊ปเดียว...ไม่รู้เลยว่าฝึกไปนานขนาดนั้น"
1001203-36 = "ถะ...ถ้าเกิด...."
1001203-37 = "ถ้าเกิดเทรนเนอร์คิดว่าฉันเป็นภาระมากเกินไป..."
1001203-38 = "[s1] \"ไม่หรอก ครูไม่คิดแบบนั้นหรอกนะ\"\n[s2] \"ครูชอบที่ได้เห็นสึมิเระออกกำลังกายนะ\""
1001203-39 = ".....ขอบคุณนะคะ"
1001203-40 = ".....ขอบคุณนะคะ"
1001203-41 = "แต่ถ้าเกิดฉันทำอะไรให้เทรนเนอร์รู้สึกรำคาญใจล่ะก็...."
1001203-42 = "บอกฉันได้ตลอดเลยนะคะ"
1001203-43 = "สำหรับฉัน การรักษากล้ามเนื้อเป็นเรื่องสำคัญก็จริงอยู่...."
1001203-44 = "แต่ว่าเทรนเนอร์น่ะสำคัญกว่า...."
1001203-45 = "......\n"
1001203-46 = "[s] \"?\""
1001203-47 = "ปะ...เปล่าค่ะ ไม่มีอะไรค่ะ"
1001203-48 = "ถะ...ถ้างั้น เราไปซื้อเวย์โปรตีนกันเลยดีมั้ยคะ?"
1001203-49 = "ไปกันเถอะค่ะ!"
1001203-52 = "(คุณครูกับสึมิเระไปเลือกซื้อเวย์โปรตีนด้วยกัน และสึมิเระก็หน้าแดงตลอดระหว่างที่เลือกซื้อของ)"
1001203-54 = "ถนนใกล้ๆ กับมิลเลเนียม"
1001203-55 = "วันนี้ขอบคุณมากนะคะ เทรนเนอร์"
1001203-56 = "วันนี้เทรนเนอร์ไปด้วยเลยได้ของดีๆ มาเยอะเลยค่ะ"
1001203-57 = "โดยเฉพาะตอนที่เทรนเนอร์ไปเจอเวย์โปรตีนลดราคา...."
1001203-58 = "แถมยังอุตส่าห์ฝ่าฝูงคนที่มาช้อปปิ้งของลดราคาเพื่อไปชิงเวย์โปรตีนลดราคามาให้ฉันด้วย"
1001203-59 = "เทรนเนอร์เป็นตัวอย่างของผู้ใหญ่ที่มีความกระตือรือร้น และไหวพริบในการใช้ชีวิตมากเลยค่ะ"
1001203-60 = "ฉันรู้สึกสนุกมากที่เห็นคนอื่นๆ สงสัยว่าเทรนเนอร์จะซื้ออะไรกันแน่....#nท่าทางของพวกเขาน่าขำมากเลยค่ะ"
1001203-61 = "ถ้าเป็นฉันล่ะก็คงฝ่าคนเข้าไปแบบเทรนเนอร์ไม่ได้แน่ๆ"
1001203-62 = "[s3] \"ฮ่าฮ่าฮ่า น่าอายจัง\"\n[s4] \"ทำท่าภูมิใจสุดๆ\""
1001203-63 = "หึหึ เทรนเนอร์เป็นคนที่ตลกมากเลยนะคะ"
1001203-64 = "หึหึ เทรนเนอร์เป็นคนที่ตลกมากเลยนะคะ"
1001203-65 = "จะยังไงก็เถอะค่ะ วันนี้ฉันซื้อเวย์โปรตีนมาเยอะเลย"
1001203-66 = "คะ? ซื้อมาเยอะเกินไปรึเปล่างั้นเหรอคะ?"
1001203-67 = "ฉันกินเวย์โปรตีนหมดเร็วมากค่ะ"
1001203-68 = "แล้วก็...."
1001203-69 = "ฉันซื้อมาเผื่อว่าจะมีใครอยากลองกินด้วยน่ะค่ะ"
1001203-70 = "หืม? ใครน่ะเหรอคะ?"
1001203-71 = "เรื่องนั้นเป็นความลับค่ะ"
1001203-72 = "เดี๋ยวเทรนเนอร์ก็รู้เองค่ะ หึหึ"
1001203-73 = "ตอนนี้ฉันคงต้องขอตัวกลับก่อนนะคะ"
1001203-74 = "กลับดีๆ นะคะ เทรนเนอร์"
1001203-77 = "(ระหว่างทางที่เดินกลับคุณครูยังคงสงสัยอยู่ว่าสึมิเระซื้อเวย์โปรตีนมาเผื่อใครกันแน่)"

[translation]
1001203-1 = "My Trainer and Me"
1001203-2 = "Shopping Mall Near Millennium"
1001203-4 = "(I overslept and am 30 minutes late from when I was supposed to meet Sumire.)"
1001203-5 = "[s] Look for Sumire."
1001203-6 = "(I looked around where we were supposed to meet, but didn't see her anywhere.)"
1001203-7 = "[s] \"Hmm?\""
1001203-13 = "*pant* *pant*"
1001203-14 = "Ah? Trainer!"
1001203-15 = "I've been waiting for you."
1001203-16 = "[s] \"Sorry I'm late.\""
1001203-17 = "That's okay."
1001203-18 = "I was actually worried I wouldn't get my daily training in because of our plans."
1001203-19 = "I was able to get some squats in because you were late."
1001203-20 = "They make for a great workout."
1001203-21 = "I didn't even do that many, but I could already feel the burn."
1001203-22 = "[s] \"You're in public. You don't mind other people staring?\""
1001203-23 = "It feels so... Huh?"
1001203-24 = "Ah..."
1001203-25 = "Aghhh!"
1001203-28 = "[s] \"S-Sumire!\""
1001203-29 = "(I ran in the direction Sumire vanished to.)"
1001203-31 = "U-Ugh..."
1001203-32 = "I-I'm sorry, Trainer."
1001203-33 = "I was only trying to find some way to effectively pass the time."
1001203-34 = "Then I thought it would be the perfect time for some squats."
1001203-35 = "I was only going to do a few, but then I got in the zone and..."
1001203-36 = "I-If..."
1001203-37 = "If you think that I'm doing too much, then..."
1001203-38 = "[s1] \"No, that's not it.\"\n[s2] \"I'm glad you're so dedicated.\""
1001203-39 = "Thanks. I needed that."
1001203-40 = "Thanks. I needed that."
1001203-41 = "But still, if I ever do anything that bothers you..."
1001203-42 = "...I want you to tell me."
1001203-43 = "I care a lot about my fitness..."
1001203-44 = "...but what matters most to me is..."
1001203-45 = "..."
1001203-46 = "[s] \"...?\""
1001203-47 = "N-Nothing! Forget I said anything!"
1001203-48 = "A-Anyway! Weren't we going to shop for protein supplements?"
1001203-49 = "Let's go!"
1001203-52 = "(I bought protein supplements with a strangely flustered Sumire.)"
1001203-54 = "Millennium Suburb Streets"
1001203-55 = "Thanks for shopping with me today, Trainer."
1001203-56 = "You helped me find what I needed."
1001203-57 = "I'm especially thankful that you have an eye for sales."
1001203-58 = "The way you pushed your way through the crowd to get that protein was amazing."
1001203-59 = "You're such an excellent role model on how to be determined and motivated."
1001203-60 = "Though it was also fun to see all the passersby wonder why you were in such a rush."
1001203-61 = "I never could have done something like that."
1001203-62 = "[s3] \"Haha. I'm kind of embarrassed in retrospect.\"\n[s4] Boast as much as you can."
1001203-63 = "Heehee. You're so funny."
1001203-64 = "Heehee. You're so funny."
1001203-65 = "Anyway, I think that's enough for today."
1001203-66 = "What? Do you think I bought too many supplements?"
1001203-67 = "You'd be surprised how quickly I can go through these."
1001203-68 = "And besides..."
1001203-69 = "...I have a feeling that someone else might be needing them soon."
1001203-70 = "Hmm? You wanna know who I'm talking about?"
1001203-71 = "That's a secret."
1001203-72 = "You'll find out soon enough. Heehee."
1001203-73 = "I should be heading back now."
1001203-74 = "Be safe on your way home, Trainer."
1001203-77 = "(I returned home as I wondered who Sumire could be talking about.)"

[translation]
10046200-3 = "อ่า..."
10046200-4 = "อ่า..."
10046200-5 = "......"
10046200-6 = "......"
10046200-7 = "เอ่อ... สบายดีมั้ยคะ?"
10046200-8 = "คิดว่าถ้าเป็นเธอแล้วจะสบายดีมั้ยล่ะ?!"
10046200-9 = "แหะๆ... ก็... นั่นสินะคะ?"
10046200-10 = "คุณ... เป็นคณะกรรมการวินัยของเกเฮนน่าใช่มั้ยคะ? มีธุระอะไรที่นี่เหรอคะ...?"
10046200-11 = "อ้อ หรือว่ามาเที่ยวเล่น..."
10046200-12 = "ไม่ใช่สักหน่อย!"
10046200-13 = "อ่า... งั้นเหรอคะ..."
10046200-14 = "......"
10046200-15 = "ฮึ่ย น่าอึดอัดชะมัด! ทำไมถึงทำตัวไม่ถูกอยู่แบบนั้นล่ะ!"
10046200-16 = "เอ่อ... ก็... ความประทับใจแรกที่พวกเรามีต่อกันมันไม่ค่อยดีเท่าไรไม่ใช่เหรอคะ..."
10046200-17 = "ถึงแม้ส่วนใหญ่จะเป็นความผิดของฉันก็เถอะค่ะ แหะๆ..."
10046200-18 = "อะไรกัน ก็รู้ดีอยู่แล้วนี่นา ถ้างั้นทำไมไม่พูดว่า 'ขอโทษด้วยค่ะ' ให้มันจบๆ ไปเสียล่ะ!? จะมัวลังเลอยู่อีกนานแค่ไหนกัน?"
10046200-19 = "จากนี้เราจะทำงานด้วยกันแล้ว ขืนยังเป็นแบบนั้นอยู่ฉันก็ร่วมงานด้วยลำบากนะ!"
10046200-20 = "ค่ะ นั้นสินะคะ... ถ้าเราจะทำงานด้วยกัน..."
10046200-24 = "คะ? เมื่อกี้ว่ายังไงนะคะ?"
10046200-25 = "ก็แบบ"
10046200-26 = "ก็... เด็กๆ เกเฮนน่ากำลังก่อปัญหาอยู่ที่นี่ใช่มั้ยล่ะ? ทั้งชมรมพัฒนาออนเซ็น แล้วก็ชมรมชิมอาหารด้วย..."
10046200-27 = "อ่า... ค่ะ... จะว่าอย่างนั้นก็ได้?"
10046200-28 = "ฉันก็เลยจะมาช่วยหน่อยน่ะ"
10046200-29 = "คะ?!"
10046200-30 = "อ้อ! แต่แน่นอนว่าก็ต้องผ่านการอนุญาต... จากเธอด้วย!"
10046200-31 = "เดิมทีแล้วนี่เป็นเรื่องที่คณะกรรมการวินัยต้องเข้ามาจัดการน่ะ"
10046200-32 = "ขอโทษนะ... ฉันจัดการคนของเราได้ไม่ดีเอง"
10046200-36 = "แหะๆ... จริงๆ เลยนะ..."
10046200-37 = "ในเกเฮนน่ามีคนที่พูดตรงไปตรงมาหลายคนเลยนะคะ"
10046200-38 = "อ๊ะ ฉันหมายถึงในแง่ดีนะคะ!"
10046200-39 = "งั้นเหรอ? แต่ฉันกลับอิจฉาโรงเรียนของเธอมากกว่านะ เด็กเจ้าปัญหาก็ไม่ค่อยมี ชุดนักเรียนก็น่ารัก... ไม่สิ ไม่มีอะไรทั้งนั้น!"
10046200-40 = "ฮ่าฮ่า...!"
10046200-41 = "อะ... อะไรน่ะ? ทำไมจู่ๆ ก็หัวเราะออกมาแบบนั้นล่ะ?"
10046200-42 = "เปล่าหรอกค่ะ ฉันแค่คิดว่าผู้คนที่อยู่ในสถานที่เดียวกันดูคล้ายคลึงกันอย่างไม่น่าเชื่อน่ะค่ะ"
10046200-43 = "แล้วมันน่าหัวเราะตรงไหนไม่ทราบ..."
10046200-44 = "แต่ก็เอาเถอะ สรุปว่าเธอยินดีให้ช่วยใช่มั้ย?"
10046200-45 = "ถ้างั้นก็ไปกันเลย!"

[translation]
10046200-3 = "啊……"
10046200-4 = "啊……"
10046200-5 = "…………"
10046200-6 = "…………"
10046200-7 = "那個……你好嗎？"
10046200-8 = "你覺得我看起來像「很好」的樣子嗎！？"
10046200-9 = "哈哈……也是啦。"
10046200-10 = "記得是……格黑娜風紀委員會的成員對吧？#n你怎麼會來這裡……？"
10046200-11 = "啊，難道是來玩──"
10046200-12 = "才不是！"
10046200-13 = "啊，這樣啊……"
10046200-14 = "……"
10046200-15 = "哎唷，真是急死人了！#n你到底在那邊扭扭捏捏什麼啦！"
10046200-16 = "不，不是啦……畢竟我們第一次見面的印象不是太好……"
10046200-17 = "雖然大部分都是我的錯就是了，哈哈……"
10046200-18 = "怎麼，原來你自己也知道啊。#n既然如此，說聲「對不起」不就好了嗎！#n何必這樣畏畏縮縮的？"
10046200-19 = "接下來還要一起工作，你如果一直這樣會讓我很困擾的！"
10046200-20 = "這麼說也對……接下來還要一起工……"
10046200-24 = "咦？你剛才說什麼？"
10046200-25 = "啊，就是……"
10046200-26 = "我們學園的人好像在這裡惹了不少麻煩。#n比如溫泉開發部啊，美食研究會之類的……"
10046200-27 = "啊，嗯……確實是這樣沒錯？"
10046200-28 = "所以……我才想說要來幫忙一下。"
10046200-29 = "咦！？"
10046200-30 = "啊！當然前提是你們能夠接受啦……！"
10046200-31 = "畢竟這些案件，本來應該由風紀委員會來處理才對。"
10046200-32 = "……抱歉，是我們管理不周。"
10046200-36 = "哈哈……不得不說……"
10046200-37 = "格黑娜的人都挺坦率的呢。"
10046200-38 = "啊，我是指好的方面哦！"
10046200-39 = "是嗎？我反而比較羨慕你們學園呢。#n不只問題兒童相對少，制服又很可愛……沒，沒什麼啦！"
10046200-40 = "……哈哈！"
10046200-41 = "怎，怎麼突然笑了起來？"
10046200-42 = "沒什麼，只是覺得不管生活在哪裡，人似乎都差不多呢。"
10046200-43 = "那有什麼好笑的啊……"
10046200-44 = "總之你沒意見吧？"
10046200-45 = "那就打起精神上吧！"

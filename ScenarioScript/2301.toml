2301-18 = "3;시즈코;01;뭐어, 어쨌거나 본론으로 들어가서, 오늘 이렇게 우리가 모인 이유는 간단해."
2301-19 = "3;시즈코;00;이제 곧 다음 달에 까마귀까악까악 상점가에서 축제를 개최할 예정이야.\n#3;em;[음표]"

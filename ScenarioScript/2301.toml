[translation]
2301-1 = "การประชุมทั่วไปของชมรมเทศกาล!"
2301-2 = "(ในช่วงบ่ายของวันหยุดแสนสบาย สมาชิกชมรมเทศกาลได้มารวมตัวกันที่ร้านเฮียกคิยาโค)"
2301-3 = "ไวท์บอร์ด พร้อม! ปากกา... พร้อม! เท่านี้ก็พร้อมแล้วล่ะ"
2301-4 = "พร้อมแล้วก็เริ่มเลย พีน่า"
2301-5 = "เยส!"
2301-6 = "พีน่ารับคำสั่งค่ะหัวหน้า!"
2301-10 = "การประชุมทั่วไปของชมรมเทศกาลกำลังจะเริ่มขึ้นแล้ววววว! เยสสส!"
2301-12 = "อืม..."
2301-13 = "เวลามีประชุมทีไร ฉันอดคิดไม่ได้เลยว่าทำไมพวกเราต้องพูดเปิดประชุมแบบนี้ด้วย...?"
2301-14 = "โนว์-โนว์-โนววววว์! เราต้องรักษาธรรมเนียมไว้สิคะ! หัวหน้า!"
2301-15 = "งานประชุมทั่วไปของชมรมเราเป็นธรรมเนียมที่สำคัญมาก"
2301-16 = "เพราะงั้นเลยต้องพิถีพิถันและจริงจังกับงานนี้ค่ะ!"
2301-17 = "ถ้าพีน่าพูดแบบนั้น ฉันก็ไม่ขัดหรอกนะ..."
2301-18 = "ถ้างั้นก็เข้าเรื่องกันเถอะ เหตุผลที่เรามาประชุมกันวันนี้ก็ง่ายๆ เลย"
2301-19 = "เดือนหน้าจะมีการจัดงานเทศกาลขึ้นที่ย่านการค้าคาราสึ"
2301-20 = "และในฐานะที่พวกเราได้รับมอบหมายให้เป็นผู้จัดงาน เพราะงั้นเราจะต้องตั้งใจทำให้เต็มที่!"
2301-21 = "น่าเสียดายที่ตอนนี้อุมิกะไม่อยู่ เธอกำลังไปสำรวจพื้นที่สำหรับจัดงานเทศกาลในพื้นที่ของเกเฮนน่าอยู่#nคงเข้าร่วมด้วยไม่ได้"
2301-22 = "เพราะงั้นครั้งนี้พวกเราสองคนจะต้องช่วยกันจัดงานเทศกาลนี้ให้สำเร็จให้ได้"
2301-23 = "ค่ะ!"
2301-24 = "งั้นก็เข้าเรื่องเลย มีไอเดียอะไรดีๆ ที่จะช่วยทำให้งานเทศกาลปังขึ้นกว่าเดิมบ้างไหม?"
2301-25 = "ไอเดียอะไรก็ได้ เรื่องเล็กๆ น้อยๆ ก็ได้ เพราะถ้าเราช่วยกันคิด มันก็อาจกลายเป็นไอเดียที่ปังสุดๆ เลยก็ได้"
2301-26 = "อืมมม....!"
2301-29 = "ค่าาาา! ฉันเองๆ ฉันมีไอเดียเสนอค่ะ! ฉันคิดออกแล้ว!"
2301-30 = "ฮ้าวววว"
2301-31 = "อ๊ะ..."
2301-33 = "เอ่อ..."
2301-34 = "ฉันพยายามทำเป็นไม่เห็นพวกเธออยู่นะ อย่าเข้ามายุ่งสิ~!"
2301-35 = "แล้วทำไมพวกคนนอกอย่างสมาชิกชมรมฝึกฝน... ถึงมาอยู่ที่นี่กันล่ะ?!"
2301-36 = "ก็บอกว่าวันนี้ร้านเฮียกคิยาโคหยุดยังไงล่ะ!"
2301-37 = "เอ่อ... คือว่า..."
2301-38 = "ชมรมฝึกฝนมีแผนจะไปปิคนิกกัน เราเลยจะแวะมาซื้อขนมกัน"
2301-39 = "แต่ไม่รู้เลยว่าวันนี้เป็นวันหยุดของร้านเฮียกคิยาโค ขอโทษด้วยนะ ชิซุโกะจัง"
2301-40 = "เห็นพวกเขามาเดินป้วนเปี้ยนอยู่ที่หน้าประตู ฉันก็เลยเชิญพวกเขาเข้ามาเองค่ะหัวหน้า!"
2301-41 = "พีน่า?!"
2301-42 = "ตอนที่ลำบากเราก็ต้องช่วยเหลือกันสิคะ!"
2301-43 = "ถูกต้องค่ะ! พีน่าพูดถูกต้องแล้วววว!"
2301-44 = "เดี๋ยวสิ ถึงเธอจะพูดมีเหตุผลก็เถอะ#nยึดมั่นในหลักเหตุผลที่ถูกต้องมันก็ดีอยู่หรอกนะแต่ว่า…!"
2301-45 = "ฉันขอโทษจริงๆ ที่ทำให้วุ่นวายกันนะคะ นี่เป็นข้าวกล่องที่ฉันตั้งใจทำมาไว้กินตอนมื้อกลางวันค่ะ#nชิซุโกะจัง มากินด้วยกันไหมคะ?"
2301-46 = "หืม? เอ่อ ขอบคุณนะ#nว้าว! ข้าวปั้นรูปตัวการ์ตูนเหรอ?"
2301-47 = "น่าอร่อยจัง! ถ้างั้นขอลองชิมหน่อยน้า..."
2301-48 = "เดี๋ยวสิ ฉันทำอะไรเนี่ย?!"
2301-49 = "ตอนนี้ชมรมเทศกาลของเรากำลังเตรียมงานพิเศษกันอยู่ ถ้ามีคนนอกเข้ามายุ่งแบบนี้มันลำบากนะ!"
2301-51 = "หัวหน้า! แบบนั้นไม่ถูกนะคะ!"
2301-52 = "พะ...พีน่า...?"
2301-53 = "ฉันคิดว่านอกจากความเห็นของเราแล้ว#nเราก็ควรเปิดรับไอเดียเรื่องงานเทศกาลจากคนนอกชมรมด้วยเหมือนกันนะคะ"
2301-54 = "อึ่ก...!"
2301-55 = "ถ้าไม่เปิดรับไอเดียใหม่ๆ ก็จะล้าหลังนะคะ!"
2301-56 = "การที่จะทำให้ชมรมของเราเติบโต เราจะต้องเปิดรับมุมมองจากคนภายนอกด้วยค่ะ!"
2301-57 = "เหมือนกับคำพูดในเรื่อง <เหมียวเหมียวพันช์ จอมเจ้าเล่ห์> ยังไงล่ะคะ...!"
2301-58 = "ถึงจะเป็นคำพูดในหนังก็เถอะ!"
2301-59 = "แต่ยังไงก็.... เฮ้อ..."
2301-61 = "ก็ได้ๆ เธอพูดถูกแล้วล่ะ"
2301-62 = "บางครั้งเราก็ควรรับความเห็นจากคนนอกเข้ามาพิจารณาด้วย"
2301-63 = "เราอาจจะได้เจอไอเดียใหม่ๆ หรือจุดสำคัญที่เรามองข้ามไปก็ได้"
2301-64 = "อื้อ ดีล่ะ! ฉันอนุญาต! "
2301-65 = "เอาล่ะ ถ้าสมาชิกชมรมฝึกฝนมีไอเดียอะไรปังๆ บอกมาได้เลยนะ"
2301-66 = "เอ๋? จริงเหรอคะ? เราเสนอไอเดียได้เหรอคะ?"
2301-67 = "เพิ่งจะมาถามเนี่ยนะว่าพูดได้รึเปล่า?!"
2301-68 = "ความเห็นเรื่องเทศกาล? ฉัน... ขอแค่ได้งีบสักหน่อยก็พอใจแล้ว... คร่อกกกก"
2301-69 = "เอาแต่นอนก็ไม่ใช่งานเทศกาลน่ะสิ!"
2301-70 = "อืม ฉันไม่ค่อยแน่ใจเท่าไหร่เลย คาเอเดะจังคิดว่ายังไงบ้างคะ?"
2301-71 = "อือฮึ หือ? ฉันเหรอ?"
2301-72 = "ถ้าคิดจะเป็นเลดี้ที่เพียบพร้อมแล้วล่ะก็ ฉันคิดว่าห้ามละเลยการฝึกฝนแม้แต่สักวันเดียว~!"
2301-73 = "(ทั้งที่ไม่ได้ไปฝึกอะไรแต่ออกมาเที่ยวเตร่อยู่แบบนี้ ยังจะพูดแบบนั้นอีกเหรอ?)"
2301-74 = "ฉันมีแผนการตามแบบฉบับพวกผู้ใหญ่ที่ดึงดูดคนจำนวนมากมาได้ในครั้งเดียวอยู่นะ!"
2301-75 = "ดะ...เดี๋ยวก่อนสิ! แผนการตามแบบฉบับพวกผู้ใหญ่งั้นเหรอ? เธอมีแผนอะไรกันแน่?"
2301-76 = "แผนการตามแบบฉบับพวกผู้ใหญ่งั้นเหรอ? พีน่าตื่นเต้นจังเลย! อยากรู้จัง!"
2301-77 = "ถ้าทำตามแผนนี้ล่ะก็ แค่พริบตาเดียวคนก็จะมารวมกันเป็นมวลมหาชนได้เลยนะ?!"
2301-78 = "แผนการตามแบบฉบับผู้ใหญ่... มวลมหาชน..."
2301-79 = "ระ...หรือว่าคิดจะทำเรื่องที่น่าอายงั้นเหรอ?!"
2301-81 = "อาย... หมายถึงเขินเหรอ? "
2301-82 = "คาเอเดะจัง ชิซุโกะจังหมายถึง \"เรื่องที่น่าอับอาย\" ต่างหากล่ะคะ"
2301-83 = "อ๋อ! อื้อออ~! ต้องเป็นเรื่องที่น่าอายอยู่แล้ว?"
2301-84 = "เอ๊ะ?"
2301-87 = "มะ...ไม่ได้นะ! ถึงจะทำเพื่อทำให้งานเทศกาลประสบความสำเร็จก็เถอะ#nแต่ชมรมเทศกาลของเราต้องยึดมั่นในหลักจริยธรรมด้วย..."
2301-88 = "แต่ว่าย่านการค้าที่ขอให้เราไปจัดงานเทศกาลคราวนี้ ได้ข่าวว่ามีลูกค้าน้อยลง และก็มีร้านค้าหลายร้านที่ต้องปิดตัวลงไปด้วย"
2301-89 = "พอคิดถึงตอนที่ประธานกลุ่มการค้ามาไหว้วานพร้อมกับท่าทางที่เหมือนจะร้องไห้แบบนั้นแล้ว..."
2301-90 = "ฉันคิดว่ายังไงก็ต้องทำอะไรสักอย่างให้ได้!"
2301-91 = "อืม... แค่นี้ก็ลังเลแล้วเหรอ หัวหน้าชมรมเทศกาลนี่เป็นเด็กน้อยซะจริงๆ เลยนะ..."
2301-92 = "ตะ...แต่...!"
2301-94 = "อย่ามัวแต่ลังเลเหมือนเด็กๆ สิ ลงมือทำไปเลยก็สิ้นเรื่อง!"
2301-95 = "กิจกรรมต้องห้าม......"
2301-96 = "กิจกรรมขายการ์ดเกมยอดฮิต <มูชิควีน> จำกัดจำนวนหนึ่งคนต่อหนึ่งกล่องยังไงล่ะ!"
2301-97 = "อะไรนะ...? กิจกรรมต้องห้ามเหรอ พูดอะไรของเธอเนี่ย?"
2301-98 = "เอ๋?! การ์ดมูชิควีนเป็นการ์ดเกมหายาก ปกติจะซื้อได้แค่คนละสองซองเท่านั้นนี่คะ"
2301-99 = "จะเปิดขายให้คนละหนึ่งกล่องเลยงั้นเหรอ!"
2301-100 = "ถ้าทำแบบนั้นพวกเกมเมอร์ทั่วคิโวทอสที่เล่นการ์ดมูชิควีนก็จะมารวมตัวกันมหาศาลแน่นอน!"
2301-101 = "หือ....?"
2301-102 = "ใช่แล้ว! แล้วนอกจากนั้น เราก็จะจัดงานแข่งแบตเทิลการ์ดมูชิควีนรอบพิเศษขึ้นด้วย!"
2301-103 = "อ๊ะ?! เดี๋ยวนะ ถ้าอย่างนั้นนอกจากเด็กโรงเรียนเราแล้ว พวกเด็กนักเรียนโรงเรียนอื่น#nอย่างเกเฮนน่าหรือทรีนิตี้ก็จะมางานเทศกาลด้วยสินะ?!"
2301-104 = "ถ้างั้นนี่อาจจะเป็นการแข่งแบตเทิลการ์ดที่เฟ้นหาสุดยอดเกมเมอร์ในคิโวทอสเลยก็ได้นะ?!"
2301-106 = "ว้าววว คงเป็นงานเทศกาลที่สุดยอดมากแน่ๆ เลยค่ะ"
2301-107 = "งานใหญ่งั้นเหรอ... คร่อก... คนเยอะ..."
2301-109 = "อึ่ก... นี่อาจทำให้เกิดความขัดแย้งครั้งใหญ่ระหว่างโรงเรียนได้เลย...!"
2301-110 = "ไม่เป็นไรค่ะ! พีน่าเองก็จะไม่ยอมแพ้เหมือนกัน!"
2301-111 = "หัวหน้าชิซุโกะคะ! ถ้ามีเรื่องวุ่นวายอะไรเกิดขึ้นล่ะก็ ปล่อยให้พีน่าจัดการเองค่ะ!"
2301-117 = "เดี๋ยวสิ แล้วจะไปหาการ์ดที่ไม่มีขายในท้องตลาดได้ที่ไหนกัน…"
2301-118 = "มะ... ไม่ได้ๆๆ ไม่ใช่แค่นั้นนะ..."
2301-119 = "งานประชุมเพื่อการจัดงานเทศกาล... ตอนนี้กำลังประชุมไปแบบ..."
2301-122 = "อึ่ก..."
2301-125 = "ช่วยด้วยยยย! อุมิกะ! เมื่อไหร่เธอจะกลับมาาาาา~!"
2301-126 = "การประชุมทั่วไปของชมรมเทศกาล!"

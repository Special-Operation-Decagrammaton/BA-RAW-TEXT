[translation]
2301-1 = "The Festival Department's Meeting!"
2301-2 = "(It's a leisurely holiday afternoon. Members of the Festival Operations Department have gathered at a corner of Momoyodou.)"
2301-3 = "Whiteboard, check. Dry erase marker, check. Yep, we're good to go!"
2301-4 = "Whenever you're ready, Pina."
2301-5 = "Understood!"
2301-6 = "Now that we have the president's blessing, we will begin! "
2301-10 = "Now we'll commence with the meeting of the Festival Operations Department! Hiyah!"
2301-12 = "Hmmm..."
2301-13 = "I can't help but wonder... Do we really have to start our meetings like this every time?"
2301-14 = "Yes! Proper procedure is essential, President!"
2301-15 = "The Festival Department's regular meeting is an important and delicate ritual!"
2301-16 = "It's essential we all give it our best effort!"
2301-17 = "If you say so, Pina."
2301-18 = "Anyway, let's get to the point. The reason why we've gathered here today is simple..."
2301-19 = "The Crowcawcaw shopping district will be holding a festival this coming month."
2301-20 = "Since we at the Festival Department have been commissioned to be the producers of this festival, we need to give it our all!"
2301-21 = "Unfortunately...Umika isn't with us at the moment. She's doing an on-site investigation for a festival in Gehenna."
2301-22 = "It's just you and me, Pina. If the two of us put our heads together, we should be able to pull this off."
2301-23 = "Got it!"
2301-24 = "Let's get down to business. Do you have any ideas that could help us make this festival a smash hit?"
2301-25 = "I'm open to whatever ideas you've got. Even something small might get the ball rolling."
2301-26 = "Hmm..."
2301-29 = "Oh! Me! Me! Me! I've got one! I have a good idea!"
2301-30 = "*yawns*"
2301-31 = "Oh, my..."
2301-33 = "Ah, ha!"
2301-34 = "I've been trying to ignore you! Stop getting in the way!"
2301-35 = "More importantly, why are members of the Inner Discipline Club here? Who let these outsiders attend?!"
2301-36 = "Is Momoyodou taking the day off too?!"
2301-37 = "*yawn* So, let me explain what happened..."
2301-38 = "The Inner Discipline Club was going on a picnic, so we stopped by to buy some snacks..."
2301-39 = "But we didn't realize that Momoyodou had a holiday today. I'm sorry, Shizuko."
2301-40 = "I had to invite them after seeing their sad faces at the front gate, President!"
2301-41 = "Pina?!"
2301-42 = "We gotta help those in need!"
2301-43 = "That's the truth! I win!"
2301-44 = "I mean, she's right. I know she's right, but..."
2301-45 = "As an apology, here's a packed lunch I made for myself. Would you like to eat it together, Shizuko?"
2301-46 = "Hmm? Ah, thanks! Whoa, does this rice ball have a character on it?"
2301-47 = "That looks delicious! Let me take one..."
2301-48 = "Wait, what am I saying?!"
2301-49 = "This is the Festival Department's regularly scheduled club time! We can't have outsiders here!"
2301-51 = "That's not true, President!"
2301-52 = "Pina...?"
2301-53 = "I think that we should take ideas for the festival from outsiders as well, not just come up with our own!"
2301-54 = "Ugh..."
2301-55 = "Stagnant water is sure to stink!"
2301-56 = "In other words, in order to make this organization better, we need to embrace other people's perspectives!"
2301-57 = "It's an idea that was captured perfectly in Loyal Cat's Fist!"
2301-58 = "Ugh, I knew that was from your silly movie!"
2301-59 = "Still... *sigh*"
2301-61 = "All right, Pina. You have a point..."
2301-62 = "Getting a fresh perspective from an outsider can be valuable from time to time..."
2301-63 = "Doing so might even reveal something important that we've been missing."
2301-64 = "All right, then! I'll allow it! "
2301-65 = "Okay, Inner Discipline Club, if you have a good idea, we're all ears."
2301-66 = "Huh? For real? Are we allowed to do that?"
2301-67 = "How can you ask that after everything we just said?!"
2301-68 = "An idea for the festival? Eh, I don't really care, just so long as I get to sleep... *snores*"
2301-69 = "Hey! Festivals aren't for sleeping!"
2301-70 = "What about you, Kaede?"
2301-71 = "Who, me?"
2301-72 = "As someone who trains hard every day to become a proper lady..."
2301-73 = "(Does she actually have something to say, or is she just here to hang out?)"
2301-74 = "...I've got a grown-up plan that will bring customers in by the boatload!"
2301-75 = "...Hold up! A \"grown-up\" plan? What are you plotting?"
2301-76 = "Ooh, a grown-up plan! That's exciting!"
2301-77 = "I'm pretty sure that people will flock in from everywhere if we try this out!"
2301-78 = "\"Grown-up...\" \"Flock in from everywhere...\""
2301-79 = "Don't tell me... Are you gonna do something vulgar?!"
2301-81 = "Vulgar? "
2301-82 = "\"Vulgar\" can mean something shameless, Kaede..."
2301-83 = "Oh! That would definitely be shameless!"
2301-84 = "Excuse me?"
2301-87 = "No! Even if it's for a successful festival, the Festival Department has codes and ethics to upkeep!"
2301-88 = "Even though the shopping district that commissioned us is suffering from a decline in customers, and many stores are on the brink of closing down..."
2301-89 = "And then, when I think about the Merchant Guild president in tears, asking for our help..."
2301-90 = "I want to do whatever I can, I really mean it! Except..."
2301-91 = "So you're getting cold feet now? I see...the president of Festival Department is nothing but a kid..."
2301-92 = "...B-But!"
2301-94 = "What are you, a little kid? Stop hesitating and spit it out!"
2301-95 = "Well, it would be a forbidden event..."
2301-96 = "A special sale where we'd sell boxes full of cards from Mushiqueen, the popular trading card game. We could sell one box per person!"
2301-97 = "What? \"Forbidden\"? Say that again...?"
2301-98 = "Aren't Mushiqueen cards available in very limited quantities? They're usually limited to two packs per person!"
2301-99 = "You're going to sell one whole box to each person?! "
2301-100 = "That'll summon a legion of Mushiqueen players from all over Kivotos!"
2301-101 = "Hmm..."
2301-102 = "Correct! And on top of that, we'll hold a special Mushiqueen tournament!"
2301-103 = "Wait, doing this might bring in students from other schools...not only from Hyakkiyako, but Gehenna and even Trinity!"
2301-104 = "If that happens, it would be a tournament of epic proportions. It'll determine the mightiest Mushiqueen player in all of Kivotos!"
2301-106 = "Wow. This is gonna be a great festival."
2301-107 = "Total... Zzz... Chaos..."
2301-109 = "*gulps* ...This could cause a full-scale war between the academies!"
2301-110 = "No problem! I won't lose!"
2301-111 = "President Shizuko! Even if war breaks out, please let me handle it!"
2301-117 = "So, uh, how are we supposed to get the super rare cards...?"
2301-118 = "Never mind that, what I'm trying to say is..."
2301-119 = "The meeting for the festival...the procedure..."
2301-122 = "Ugh..."
2301-125 = "Help me, Umika! When are you coming back?!"
2301-126 = "The Festival Department's Meeting!"

[translation]
2301-1 = "來吧，節慶營運管理部例行會議！"
2301-2 = "（在某個悠閒的午後。於百夜堂的角落，節慶營運管理部的成員們聚集在了一起）"
2301-3 = "白板準備OK、白板筆也是新品。嗯，完美呢。"
2301-4 = "那麼，菲娜。"
2301-5 = "是的！"
2301-6 = "那麼也收到部長的命令了！"
2301-10 = "即刻起，開始節慶營運管理部的定期會議！！！"
2301-12 = "嗯……"
2301-13 = "我每次都會想，會議上有需要這種情緒嗎……？"
2301-14 = "在說什麼啊！禮儀不管在什麼時候都很重要唷，部長！"
2301-15 = "我們節慶營運管理部的定期會議，是崇高又纖細的儀式！"
2301-16 = "必須發自內心認真的，同時樂在其中，全力的進行才行！"
2301-17 = "嘛，菲娜那麼說的話是沒關係……"
2301-18 = "總之進入正題，從今天的議題說明開始吧。"
2301-19 = "下個月，我想妳應該知道預定在「烏羽商店街」舉辦的祭典，"
2301-20 = "有個策畫那個商店街的慶典的委託。當然作為節慶營運管理部，沒有理由拒絕，我打算全力以赴唷。"
2301-21 = "海花她……很遺憾，還沒從格黑娜地區的祭典調查回來。"
2301-22 = "這次只能由我和菲娜兩個人，想辦法讓這個祭典成功了呢。"
2301-23 = "是的！"
2301-24 = "那我就單刀直入的問了，關於這次的祭典有什麼不錯的主意嗎？"
2301-25 = "不管是什麼都OK。就算會覺得無趣，也有可能從那裡找到突破口。"
2301-26 = "唔──嗯……！"
2301-29 = "這裡這裡～！我有！我有唷，好主意！"
2301-30 = "呼啊……"
2301-31 = "啊啦啊啦……"
2301-33 = "……我說啊。"
2301-34 = "我都努力無視了可以不要強行介入嗎！！？"
2301-35 = "比起這個為什麼修行部，外部的人會在這裡啊！？"
2301-36 = "況且今天百夜堂休息耶！？"
2301-37 = "呼啊……那是因為～，"
2301-38 = "修行部打算去野餐，所以前來外帶需要的零食，"
2301-39 = "在來這裡之前並不知道百夜堂休息……不好意思，靜子醬。"
2301-40 = "因為看起來好像很困擾的站在門口！所以菲娜就招待進來了！"
2301-41 = "是妳啊！！！"
2301-42 = "困擾的時候就該互相幫助！"
2301-43 = "正論！菲娜的勝利！"
2301-44 = "並沒有在勝負！不，雖然有道哩，確實是有道理沒錯……！"
2301-45 = "啊，話說回來剛好有帶著中午打算吃的便當。靜子醬，一起吃如何呢？"
2301-46 = "咦，是嗎？謝謝，那倒是很開心……哇，角色便當？"
2301-47 = "好厲害，好可愛感覺好好吃！那就稍微……"
2301-48 = "不對！"
2301-49 = "現在是節慶營運管理部的定期會議中！有外部的人在的話我會很困擾！"
2301-51 = "部長！我覺得那樣不對！"
2301-52 = "菲，菲娜……？"
2301-53 = "就算是祭典的主意，也不能總是只有我們提出，偶爾也要聽取外部的意見！菲娜是這麼想的！"
2301-54 = "唔，原來如此……！？"
2301-55 = "稱之為「流水不腐」！"
2301-56 = "反過來說，要將組織以健全的形式壯大，有必要積極的接受外部的意見才對！"
2301-57 = "「不仁不義的喵喵拳」裡面，也有那麼說！"
2301-58 = "嘛我就知道這次也是在說電影！"
2301-59 = "不過……"
2301-61 = "就是說呢，菲娜。我認為妳說得對。"
2301-62 = "畢竟原本就人數稀少，偶爾來自外部新鮮的意見，也有可能會連接著好主意也說不定。"
2301-63 = "根據那個，我們也許能看見未曾看見的事物……"
2301-64 = "嗯，好！我知道了！"
2301-65 = "修行部的各位，那就重新請妳們參加了。有什麼意見的話就說吧！"
2301-66 = "咦，可以嗎？真的？"
2301-67 = "剛才強硬的插進來事到如今說這種話！？"
2301-68 = "祭典……我，只要能舒服的睡覺的話什麼都……呼……"
2301-69 = "那樣就不是祭典了吧！！話說不要在說話的時候睡著！"
2301-70 = "我，對於祭典不太了解……楓醬呢？"
2301-71 = "咦，我？我？"
2301-72 = "欸嘿嘿，我想想……我的話，朝著出色淑女每天勤奮鍛鍊的我的話啊～……！"
2301-73 = "（……剛才不是說了野餐嗎？）"
2301-74 = "會實行一口氣聚集客人，進行像大人……成人般的計劃吧！"
2301-75 = "成，成人般的計劃！？那是什麼，是什麼計劃……！？"
2301-76 = "竟然是成人般的計劃，菲娜，非常期待！"
2301-77 = "實行這個的話，我想肯定會從各個地方聚集很多人過來唷？"
2301-78 = "成人般，聚集過來……"
2301-79 = "該，該不會，是想做什麼不知羞恥的事吧！？"
2301-81 = "不知羞恥……？"
2301-82 = "楓醬，就是「若無其事的做著害臊的事」的意思。"
2301-83 = "嘿～，嗯……！確實，根據思考的方式也許有點不知羞恥？"
2301-84 = "啊啦啊啦……"
2301-87 = "不，不行不行！就算是為了讓祭典成功，我們節慶營運管理部終究只是保持著分寸和倫理……！"
2301-88 = "啊，不過這次委託的商店街，也說了最近客人減少瀕臨倒閉的店面也很多……"
2301-89 = "萬事拜託了，商店街的會長也含淚這麼說……"
2301-90 = "……不不不，我雖然也想要想辦法讓祭典成功！"
2301-91 = "呵呵，竟然因為這種程度的事就迷惘，就算說是節慶營運管理部的部長也還只是個孩子呢？"
2301-92 = "可，可是……！"
2301-94 = "必須成功才行吧，那就做吧！"
2301-95 = "禁忌的活動……"
2301-96 = "交換卡牌遊戲，「甲蟲皇后」的每人一箱販賣！"
2301-97 = "……咦？禁忌？卡牌？……在說什麼？"
2301-98 = "咦咦！？要將那個限定販賣相當難以入手，不管在哪裡每人都只能購買2包是常有的事的，那個「甲蟲皇后」的卡牌……！"
2301-99 = "每人可以買一箱！？那確實是禁忌，是大人的作為！"
2301-100 = "做了那種事的話，奇普托斯全域的「甲蟲皇后」玩家確實會洶湧而來唷！"
2301-101 = "……什麼？"
2301-102 = "沒錯！而且，同時舉辦「甲蟲皇后對決」的話就肯定會是大盛況不會錯的！"
2301-103 = "……啊！仔細想想，做到這種程度的話不僅百鬼夜行，格黑娜和三一，奇普托斯各地學校的學生都會一湧而來……！？"
2301-104 = "那樣的話，就會變成依字面上決定奇普托斯最強的「甲蟲皇后」之座的大會了！？"
2301-106 = "雖然不太懂，不過似乎會是個出色的祭典呢？"
2301-107 = "……嗯嗯，大騷動……？那有點……呼……Zzz……"
2301-109 = "（吞口水）……變成那樣的話搞不好，還會波及到學校間大規模的抗爭……！"
2301-110 = "不過不用擔心，菲娜也會參戰！"
2301-111 = "部長！就算萬一變成抗爭，那個時候就交給菲娜我吧！"
2301-117 = "不是那個卡牌，很難入手的話是要怎麼大量進貨……"
2301-118 = "不不不，比起那種事……"
2301-119 = "會議的，進行……"
2301-122 = "唔唔唔……！！"
2301-125 = "幫幫我海花！趕快回來啊～！！？"
2301-126 = "來吧，節慶營運管理部例行會議！"

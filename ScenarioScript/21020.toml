[translation]
21020-1 = "Episode 2;Seminar Treasurer Yuuka"
21020-2 = "Millennium Game Development Department"
21020-4 = "..."
21020-5 = "It's you! One of the Student Council's Four Divine Beasts! The Cold and Calculating Treasurer, Yuuka!"
21020-6 = "Could you please not refer to me like I'm some kind of monster? I'm simply trying to do my job."
21020-7 = "..."
21020-8 = "Sensei."
21020-9 = "[s] \"Good to see you, Yuuka.\""
21020-10 = "*sigh* What a mess."
21020-11 = "Momoi."
21020-13 = "You all are as stubborn as ever, aren't you? Now you've resorted to involving Schale to stop us from shutting you down."
21020-14 = "But it doesn't matter."
21020-15 = "Whether it's Schale, the General Student Council—or even if the General Student Council president herself suddenly returned. It still wouldn't make a difference!"
21020-16 = "The academy's Student Council has full discretion over the operation of its clubs."
21020-17 = "The Game Development Department will be closed. No one can stop it."
21020-18 = "N-Not so fast!"
21020-19 = "You said that if we don't have the minimum required members or meet our club's objectives..."
21020-20 = "...that you would lose your budget and club room, yes. It's been explained countless times to you."
21020-21 = "It's been over a year, and you still don't have enough members nor has your club been completing its objectives."
21020-24 = "With that in mind, on what grounds could you possibly object to our decision?"
21020-26 = "I do have grounds! We're standing on tons of 'em! O-Our club is working its butt off at our activities!"
21020-28 = "So, w-we deserve a summit hearing!"
21020-29 = "I think you mean a mitigation hearing..."
21020-30 = "And don't be ridiculous!"
21020-32 = "You've tried opening a pachinko parlor inside the school, attacked the Ancient History Research Society looking for a rare classic game console..."
21020-33 = "Your club's activities are anything but typical! How dare you ask for more funds?! You're just creating havoc under the guise of \"fostering a healthy development environment.\""
21020-34 = "What do you have to say for yourselves?!"
21020-35 = "S-Sometimes you've gotta look at the intentions behind something instead of the results..."
21020-36 = "That's what a failure would say. I don't want to hear it."
21020-37 = "You're the one who asked for an excuse!"
21020-38 = "I merely wanted a reason, not a meaningless excuse. Results are all that matter at Millennium."
21020-39 = "It's not like we don't have any results! We DID complete an objective! We finished a game!"
21020-40 = "Th-That's right! Tales Saga Chronicle won top prize at a competition!"
21020-43 = "[ns] \"Tales Saga Chronicle?\""
21020-44 = "Yes, I'm aware of the award you won."
21020-45 = "I suppose Sensei is in the dark, however."
21020-46 = "Tales Saga Chronicle is the only game their club has successfully produced thus far."
21020-47 = "And its reviews were just as impressive as the game itself. I remember them quite well."
21020-48 = "\"If they wanted to create the most pathetic RPG of all time, then job well done.\""
21020-49 = "\"It's lacking in a lot of areas, especially common sense.\""
21020-50 = "\"Oh, my god. This game makes Dead Crimson look like a masterpiece.\""
21020-51 = "Y-You can't judge our game based on some trolls tearing us down..."
21020-52 = "These are hardly outliers. It was the consensus."
21020-53 = "That's why you won the award for Worst Game of the Year."
21020-54 = "H-Hey, all publicity is good publicity, right?!"
21020-55 = "[s] \"Did it come with a trophy and everything?!\""
21020-57 = "..."
21020-58 = "..."
21020-61 = "..."
21020-62 = "...Anyway."
21020-63 = "It is unacceptable for your club to be wasting funds while damaging Millennium's reputation."
21020-64 = "You're a drain on resources and impeding the progress of other clubs on campus."
21020-65 = "So, the burden of proof lies with you to show that your club is conducting valid activities."
21020-66 = "You want us to prove it?"
21020-67 = "As I've said, if your club can produce meaningful results, we'll rescind our decision to shut you down."
21020-68 = "Do you mean like winning accolades?"
21020-69 = "Yes. Take the baseball club advancing to the Interhigh Championship or the Engineering Department submitting new inventions for example. Something along those lines."
21020-70 = "Surely there must be some sort of contest the Game Development Department can enter."
21020-71 = "Try not to win yet another Worst Game of the Year award."
21020-72 = "Ugh."
21020-73 = "If you'd rather save time, I could shut it down now instead. Feel free to vacate the club room and throw away all this junk."
21020-74 = "..."
21020-75 = "D-Don't call it junk."
21020-76 = "What is it if not junk?"
21020-77 = "They're my..."
21020-81 = "I got it!"
21020-82 = "You want results? You'll get them!"
21020-83 = "Will I...?"
21020-84 = "In fact, development is practically done!"
21020-86 = "Is it?"
21020-87 = "Wh-What are you talking about?"
21020-88 = "Why so surprised, Midori?"
21020-89 = "We have a secret weapon up our sleeves."
21020-90 = "And we'll be making a submission to the Millennium Prize..."
21020-91 = "Tales Saga Chronicle 2! Otherwise known as TSC2!"
21020-92 = "?!"
21020-93 = "[s] \"What's the Millennium Prize?\""
21020-95 = "It's a contest where hundreds of Millennium clubs submit the fruits of their labor. No one could shut us down if we won that! Not even you!"
21020-96 = "That may be true."
21020-97 = "If—and only if—you were to win."
21020-98 = "I'm sure you realize how absurd what you're proposing is, Momoi."
21020-99 = "It would be like our baseball club moving up to the majors rather than simply advancing to the Interhigh Championship."
21020-100 = "Regardless, I'm excited to see what you have in store—even if it is destined to end in failure."
21020-102 = "So here it is: your final chance."
21020-103 = "You have two weeks until the Millennium Prize. I hope you're looking forward to it as much as I am."
21020-105 = "It was good seeing you again, Sensei. I'm sorry it wasn't under better circumstances."
21020-106 = "But business is business when it comes to Student Council matters."
21020-107 = "I hope that things will be more pleasant the next time we meet. So long."
21020-109 = "*clank*"
21020-110 = "..."
21020-111 = "Momoi..."
21020-112 = "It's a long shot, but don't you think it'd be easier to recruit another member than it would be to develop a new game?"
21020-113 = "We've been trying that for a month, and no one's joined."
21020-114 = "I'm tired of people saying retro games are trash when things like VR have already been around for years."
21020-115 = "..."
21020-116 = "That sneaky Yuuka! She's just discriminating against us because she knows we're nerds that don't have friends! I hate her!"
21020-117 = "You can't blame Yuuka... We're the ones who are breaking the rules that apply to all the other clubs."
21020-118 = "Whatever. My point is we have no hope going down the recruitment route."
21020-119 = "But that doesn't mean there isn't a way."
21020-120 = "Oh, right. What's this \"secret weapon\" you mentioned to Yuuka?"
21020-121 = "It's Sensei, obviously."
21020-122 = "[s] \"Me?\""
21020-123 = "Don't you remember those ruins I mentioned, Sensei?"
21020-124 = "There's a mysterious place near Millennium the General Student Council won't allow anyone to enter."
21020-125 = "Supposedly, the reason access is restricted is because it's dangerous, but they've never told anyone what the danger is. That's pretty suspicious if you ask me."
21020-126 = "It's impossible to know if anyone has ever gone in or if anyone has ever made it back."
21020-127 = "It's a completely unknown world..."
21020-128 = "[s] \"Why would you want to go to a place like that?\""
21020-129 = "Because we wanna make a great game!"
21020-130 = "I want to prove something."
21020-131 = "I know the only thing we have to our name thus far is a crummy Worst Game of the Year award."
21020-132 = "But the game consoles that I love, that have always made me happy..."
21020-134 = "...are anything but junk! They're my treasures!"
21020-135 = "Momoi..."
21020-136 = "All we have to do is go to the ruins and finally find it."
21020-137 = "[s] \"What's 'it'?\""
21020-138 = "Oh, I probably should have explained that first."
21020-139 = "Sensei, by any chance..."
21020-142 = "...have you ever heard of the G.BIBLE?"
21020-144 = "Next Episode;To the Ruins"

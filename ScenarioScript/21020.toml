[translation]
21020-1 = "ตอนที่ 2;นักบัญชีแห่งเซมิน่า ยูกะ"
21020-2 = "ชมรมพัฒนาเกมมิลเลเนียม"
21020-4 = "......"
21020-5 = "มาแล้วสินะ! 1 ใน 4 จตุรเทพของสภานักเรียน! นักบัญชีที่เยือกเย็น! ยูกะ!"
21020-6 = "อย่าเรียกคนและหน้าที่รับผิดชอบด้วยคำที่เหมือนใช้เรียกมอนสเตอร์ได้ไหม? แบบนี้มันเสียมารยาทนะ"
21020-7 = "แล้วก็..."
21020-8 = "คุณครู"
21020-9 = "[s] \"ยินดีที่ได้เจอนะยูกะ\""
21020-10 = "เฮ้อ... ไม่คิดเลยนะว่าจะได้มาเจอกันแบบนี้"
21020-11 = "โมโมอิ"
21020-13 = "ดูท่าจะไม่ยอมแพ้ง่ายๆ สินะ อยากขัดขวางการยุบชมรมจนไปดึง 'ชาเล่ต์' เข้ามาเกี่ยวข้องแบบนี้"
21020-14 = "แต่มันก็ไม่มีความหมายอะไรหรอก"
21020-15 = "แม้จะเป็นชาเล่ต์ขององค์การนักเรียนก็ตาม ไม่สิ แม้ประธานองค์การนักเรียนที่หายไปจะกลับมาก็ตาม!"
21020-16 = "เพราะชะตากรรมของชมรมอยู่ในมือของสภานักเรียนของแต่ละโรงเรียนยังไงล่ะ"
21020-17 = "อีกอย่าง การยุบชมรมพัฒนาเกมก็เป็นเรื่องที่ตัดสินใจกันแล้ว ไม่ว่าใครก็ขัดขวางไม่ได้หรอก"
21020-18 = "ยะ... ยังยุบไม่ได้นะ!"
21020-19 = "เธอบอกว่าหากพวกเรามีสมาชิกไม่ครบจำนวน หรือบรรลุผลในฐานะชมรมของมิลเลเนียมไม่ได้..."
21020-20 = "ก็จะถูกยึดทั้งเงินสนับสนุนและห้องชมรมด้วย"
21020-21 = "พวกเธอทั้งมีสมาชิกไม่ครบ แล้วก็ไม่สามารถพิสูจน์ผลงานของชมรมได้มาเกินกว่า 1 ปีแล้ว"
21020-24 = "แบบนี้คงไม่มีข้อคัดค้านการยุบชมรมหรอกนะ?"
21020-26 = "ฉันมีข้อคัดค้าน! แล้วก็มีเยอะเลยด้วย! พะ... พวกเรากำลังทุ่มเทเพื่อชมรมอยู่นะ!"
21020-28 = "เพราะฉะนั้น ต้องมี... มันเรียกว่าอะไรนะ... การลดหย่อน!"
21020-29 = "หมายถึงการยืดหยุ่นล่ะสิ..."
21020-30 = "อย่ามาตลกเลยน่า!"
21020-32 = "สร้างปาจิงโกะพาร์คในโรงเรียน แล้วตกแต่งให้เหมือนคาสิโน ค้นหาเครื่องเล่นเกมเก่าแก่#nก็เลยไปบุกสมาคมวิจัยประวัติศาสตร์โบราณ....."
21020-33 = "คิดว่านี่มันเป็นกิจกรรมปกติในชมรมเหรอ? ทำแต่เรื่องรบกวนคนอื่นแบบนี้#nยังจะมาขอเงินสนับสนุน 'ปรับสภาพแวดล้อมการพัฒนา' ไปอีก ฉันยอมให้ไม่ได้"
21020-34 = "มีอะไรจะแก้ตัวไหมล่ะ!"
21020-35 = "บะ... บางทีเราก็ต้องประเมินที่ความตั้งใจมากกว่าผลลัพธ์ที่ได้สิ....."
21020-36 = "ฉันไม่อยากได้ยินคำแก้ตัวของคนขี้แพ้แบบนั้นหรอกนะ"
21020-37 = "แล้วไหนบอกว่าให้แก้ตัวไงล่ะ! ตกลงจะเอายังไงกันแน่!"
21020-38 = "สิ่งที่ฉันจะบอกคือ ฉันไม่อยากฟังคำแก้ตัวที่ไม่มีความหมาย เพราะในมิลเลเนียม#nสิ่งที่พิสูจน์ได้ก็คือ 'ผลลัพธ์' เท่านั้น"
21020-39 = "จะบอกว่าเราไม่มีผลลัพธ์อย่างงั้นเหรอ!? ทำไมจะไม่มีล่ะ! พวกเราก็ทำเกมขึ้นมานะ!"
21020-40 = "ชะ.. ใช่ค่ะ! <เทลส์ ซาก้า โครนิเคิล> เคยติดอันดับใน 'นิทรรศการรวมผลงาน' บางงานด้วยนะคะ!"
21020-43 = "[ns] \"เทลส์ ซาก้า โครนิเคิล?\""
21020-44 = "ก็ใช่... เกมนี้ได้รางวัลมาก็จริง"
21020-45 = "คุณครูไม่รู้สินะคะ"
21020-46 = "<เทลส์ ซาก้า โครนิเคิล> ...คือผลงานเดียวของชมรมพัฒนาเกมค่ะ"
21020-47 = "แถมยังได้รีวิวมาจนน่าประทับใจเลยด้วย"
21020-48 = "'ผู้พัฒนาประสบความสำเร็จอย่างมากในการผลิตเกม RPG ที่น่าสิ้นหวังที่สุดเท่าที่เคยมีมา'"
21020-49 = "'เกมนี้มีหลายส่วนที่ยังขาด แต่ส่วนที่ขาดมากที่สุดน่าจะเป็น 'สติ' ของผู้พัฒนา'"
21020-50 = "'พระเจ้าช่วย พอได้เล่นเกมนี้ถึงได้รู้ว่าเดธคริมสันเป็นผลงานชิ้นเยี่ยม'"
21020-51 = "จะเอาคำรีวิวที่เต็มไปด้วยการดูหมิ่นมาประเมินเกมของเราไม่ได้นะ....."
21020-52 = "การรีวิวส่วนมากคือผลลัพธ์ที่เป็นจริงนะ"
21020-53 = "และคำว่าผลลัพธ์ที่พวกเธอพูด ก็คือการได้ที่ 1 จาก <รางวัลเกมยอดแย่> ....."
21020-54 = "ยะ... อย่าพูดจาแบบนั้นสิ!"
21020-55 = "[s] \"ได้ที่ 1 เลยเหรอ เยี่ยมมาก!\""
21020-57 = "......"
21020-58 = "......"
21020-61 = "......"
21020-62 = "ช่างเถอะ..."
21020-63 = "ฉันไม่ยอมปล่อยให้ชมรมที่ทำให้โรงเรียนเสื่อมเสียชื่อเสียงได้รับเงินสนับสนุนไป#nโดยไม่เกิดประโยชน์หรอกนะ"
21020-64 = "นักเรียนอีกหลายคนไม่ได้รับการสนับสนุนการทำกิจกรรมพิเศษก็เพราะพวกเธอ"
21020-65 = "เพราะฉะนั้น ถ้าอยากจะอ้างว่ากำลังทำกิจกรรมชมรมอย่างถูกต้องอยู่... ก็พิสูจน์ให้เห็นสิ"
21020-66 = "พิสูจน์เหรอ...?"
21020-67 = "ฉันบอกไปหลายครั้งแล้วนี่ว่าถ้าพวกเธอสร้างผลลัพธ์ที่ดีออกมาได้ ก็จะยกเลิกการยุบชมรมให้"
21020-68 = "อย่างเช่นได้รางวัลในการประกวดน่ะเหรอ?"
21020-69 = "ใช่ ก็เหมือนกับชมรมเบสบอลที่ได้ไปแข่งชิงแชมป์ทั่วประเทศ หรือชมรมวิศวกรรมที่สร้าง#nสิ่งประดิษฐ์ออกมาได้"
21020-70 = "กับชมรมพัฒนาเกม ก็น่าจะเกี่ยวข้องกับนิทรรศการรวมผลงาน..."
21020-71 = "แต่ก็น่าเสียดายนะ ที่ความสามารถของพวกเธอทำให้ได้มาแค่รางวัลเกมยอดแย่อันดับ 1"
21020-72 = "อึ้ก..."
21020-73 = "ถ้ามันจะเกินความสามารถก็ไม่ต้องพยายามหรอก เก็บของออกจากห้องชมรมไปตอนนี้เลย#nแล้วก็ทิ้งของเก่าคร่ำครึนี่ด้วย"
21020-74 = "......."
21020-75 = "ยะ... อย่ามาเรียกว่าของเก่าคร่ำครึนะ"
21020-76 = "แล้วงั้นมันคืออะไรกันล่ะ?"
21020-77 = "เอ่อ... มันคือ..."
21020-81 = "ชิส์...!"
21020-82 = "ฉันจะเอาผลลัพธ์มาให้ดูเอง...."
21020-83 = "ผลลัพธ์เหรอ...?"
21020-84 = "ฉันเตรียมทุกอย่างเพื่อผลลัพธ์นั้นไว้แล้ว!"
21020-86 = "เอ๊ะ?"
21020-87 = "มะ... ไม่น่าเชื่อ!"
21020-88 = "ทำไมเธอถึงตกใจล่ะมิโดริ!?"
21020-89 = "พวกเรามีอาวุธลับอยู่นะ"
21020-90 = "ในงาน 'มิลเลเนียมไพรซ์' ครั้งนี้"
21020-91 = "เราจะปล่อยเกม <TSC2> หรือก็คือ <เทลส์ ซาก้า โครนิเคิล 2>!"
21020-92 = "?!"
21020-93 = "[s] \"มิลเลเนียมไพรซ์?\""
21020-95 = "นิทรรศการรวมผลงานที่ใหญ่ที่สุดของมิลเลเนียมที่มีร้อยกว่าชมรมส่งผลงานเข้าประกวด!#nถ้าได้รางวัลจากงานนี้ เธอก็คงจะมาว่าอะไรเราไม่ได้!"
21020-96 = "มันก็ใช่..."
21020-97 = "ถ้า 'ได้รับรางวัล' นะ..."
21020-98 = "แต่เธอรู้อะไรไหมโมโมอิ ที่เธอพูดน่ะ ไม่ใช่แค่การที่ชมรมเบสบอลจะได้ไปแข่งชิงแชมป์ทั่วประเทศ..."
21020-99 = "แต่มันยิ่งใหญ่ในระดับที่ชมรมเบสบอลมัธยมปลายไปแข่งเมเจอร์ลีกเลยนะ"
21020-100 = "แต่ก็... น่าคาดหวังอย่างบอกไม่ถูกเลยล่ะ"
21020-102 = "ดีล่ะ งั้นฉันจะรอก็แล้วกัน"
21020-103 = "เหลือเวลาอีก 2 สัปดาห์ก่อนงานมิลเลเนียมไพรซ์ ระหว่างนั้นจะได้ผลลัพธ์อะไรออกมานะ"
21020-105 = "เราไม่ได้เจอกันนานเลยนะคะคุณครู ทำไมเอาแต่ทำหน้าเย็นชาแบบนั้นล่ะคะ?"
21020-106 = "ที่ฉันทำแบบนี้เพราะนี่เป็นงานของสภานักเรียนค่ะ"
21020-107 = "วันนี้ต้องขอตัวก่อนแล้วกันค่ะ แล้วเจอกันใหม่ในบรรยากาศที่ดีกว่านี้นะคะ"
21020-109 = "(แกร๊ก)"
21020-110 = "....."
21020-111 = "พี่โมโมอิ..."
21020-112 = "ฉันว่าเราควรจะหวังกับการหาสมาชิกชมรมมากกว่าการสร้างเกมนะ ถึงจะมีโอกาสน้อยก็เถอะ..."
21020-113 = "เราหาคนมาเดือนหนึ่งแล้วนะ... แต่ก็ไม่มีใครมาสมัครเลย"
21020-114 = "\"VR ก็ล้าสมัย นี่มันเกมเรโทรแบบไหนกัน\" ฉันเบื่อกับการถูกกระทำเหมือนเป็นคนโง่แล้ว"
21020-115 = "......"
21020-116 = "ยูกะคนขี้ขลาด! มาใช้ประโยชน์จากการที่เด็กเนิร์ดอย่างพวกเราไม่มีเพื่อนอย่างนั้นเหรอ!?#nยกโทษให้ไม่ได้!"
21020-117 = "ไม่หรอก... แต่นี่ก็ถือเป็นกรรมตามสนองของพวกเรานะ..."
21020-118 = "เอาเถอะ แต่ยังไงเราก็คงหมดหวังเรื่องการหาคนเข้าชมรมอยู่ดี"
21020-119 = "แต่ก็ไม่ใช่ว่ามันไม่มีวิธีหรอกนะ"
21020-120 = "จริงสิ 'อาวุธลับ' ที่พี่บอกยูกะไปเมื่อกี้คืออะไรเหรอ?"
21020-121 = "ก็คุณครูไงล่ะ"
21020-122 = "[s] \"ครูเหรอ?\""
21020-123 = "ตามที่เราบอกไปเมื่อกี้ เป้าหมายของเราอยู่ที่ 'พื้นที่รกร้าง'"
21020-124 = "พื้นที่รกร้างที่ว่าคือเขตปริศนาแถวๆ มิลเลเนียมที่องค์การนักเรียนเคยควบคุมการเข้าออก"
21020-125 = "ว่ากันว่าที่นั่นเป็นเขตหวงห้ามเพราะเป็นที่ที่อันตราย... และสิ่งที่พิสูจน์ว่ามันอันตรายจริงๆ ก็คือ...#nการที่ไม่รู้แน่นอนว่ามันมีอันตรายอะไรซ่อนอยู่"
21020-126 = "อันตรายขนาดที่ว่าเราไม่รู้เลยว่ามีใครเคยเข้าไปบ้างหรือเปล่า หรือว่าเข้าไปแต่ก็กลับออกมาไม่ได้"
21020-127 = "ที่นั่นคือโลกปริศนาเลยล่ะ..."
21020-128 = "[s] \"แล้วจะเข้าไปในที่แบบนั้นทำไมเหรอ?\""
21020-129 = "ก็เพราะอยากทำเกมดีๆ ยังไงล่ะ!"
21020-130 = "ฉันน่ะ อยากจะพิสูจน์ให้ได้"
21020-131 = "แม้ตอนนี้พวกเราจะอยู่แค่ในระดับ 'เกมยอดแย่อันดับ 1' ก็เถอะ"
21020-132 = "แต่ฉันพิสูจน์ให้ได้ว่าเครื่องเล่นเกมที่ฉันชอบ และทำให้ฉันมีความสุข..."
21020-134 = "จะต้องไม่เป็นแค่ 'ของเก่าคร่ำครึ' แต่มันคือ 'สมบัติ' ต่างหากล่ะ!"
21020-135 = "พี่โมโมอิ..."
21020-136 = "เพราะฉะนั้นฉันจะเข้าไปในพื้นที่รกร้าง แล้วหา 'สิ่งนั้น' มาให้ได้"
21020-137 = "[s] \"สิ่งนั้น?\""
21020-138 = "อ่า เห็นทีฉันต้องเล่าเรื่องนี้ก่อนสินะ"
21020-139 = "คุณครูรู้จัก..."
21020-142 = "G.Bible ไหม?"
21020-144 = "ตอนต่อไป;ไปยังพื้นที่รกร้าง"

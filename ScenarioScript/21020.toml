[translation]
21020-1 = "第2話;セミナーの会計、ユウカ"
21020-2 = "ミレニアム・ゲーム開発部"
21020-4 = "……。"
21020-5 = "出たな、生徒会四天王の一人！「冷酷な算術使い」の異名を持つ生徒会の会計、ユウカ！"
21020-6 = "勝手に変な異名を付けて、人をモンスターか何かみたいに呼ばないでくれる？失礼ね。"
21020-7 = "それよりも……"
21020-8 = "……先生。"
21020-9 = "[s] \"やあ、ユウカ。\""
21020-10 = "……はあ、こんな形で会うなんて。"
21020-11 = "先生とは色々と話したいこともありますが、それはまた後にするとして……モモイ。"
21020-13 = "本当に諦めが悪いわね。廃部を食い止めるために、わざわざ「シャーレ」まで巻き込むだなんて。"
21020-14 = "けど、そんなことをしても無意味よ。"
21020-15 = "例え連邦生徒会のシャーレだとしても……いえ、あの連邦生徒会長が戻ってきたとしても！"
21020-16 = "部活の運営については概ね、各学校の生徒会に委ねられてるんだから。"
21020-17 = "ゲーム開発部の廃部はもう決まったことなの、これはもう誰にも覆せない。"
21020-18 = "そ、そんなことはない！"
21020-19 = "言ってたでしょ、部員が規定人数に達するか、ミレニアムの部活として見合う成果を出せれば……"
21020-20 = "……それができれば良し。もしできなかったら廃部、部費はもちろん部室も没収する。私、そこまでちゃんと言ったわよね。"
21020-21 = "あなたたちは部員数も足りない上に、部活としての成果を証明できるようなものも無いまま、もう何か月も経ってるんだから……。"
21020-24 = "廃部になっても、何も異議はないはずだけど？"
21020-26 = "異議あり！すごくあり！私たちだって全力で部活動をしてる！"
21020-28 = "だからあの、何だっけ……上場閣僚？とかいうのがあっても良いはず！"
21020-29 = "それを言うなら「情状酌量」でしょう。それより、今なんて言ったかしら？全力で活動してる……？"
21020-30 = "笑わせないで！"
21020-32 = "校内に変な建物を建てたと思ったら、まるでカジノみたいに装飾してギャンブル大会を始めるし、レトロゲームを探すとか言いながら古代史研究会を襲撃するし……"
21020-33 = "おかしいでしょう！？「全力」かもしれないけど、部活動としては間違ってるわよ！それに、これだけ各所に迷惑をかけておいて、よく毎度のように部費なんか請求できるわね！？"
21020-34 = "真っ当な言い訳くらいしてみたらどうなの！"
21020-35 = "と、時には結果よりも、心意気を評価してあげることも必要……"
21020-36 = "負け犬の言い訳なんて聞きたくない。"
21020-37 = "聞きたいのか聞きたくないのかどっちなのさ！？"
21020-38 = "無意味な言い訳は聞きたくないってことよ。ミレニアムでは「結果」が全て。"
21020-39 = "け、結果だってあるもん！私たちも、ゲームを開発してるんだから！"
21020-40 = "そ、そうですよ！『テイルズ・サガ・クロニクル』はちゃんと、「あのコンテスト」で受賞、も……"
21020-43 = "[ns] \"『テイルズ・サガ・クロニクル』？\""
21020-44 = "……そうね。確かに受賞、してたわ。"
21020-45 = "その反応を見るに、先生はご存じないようですね。"
21020-46 = "『テイルズ・サガ・クロニクル』……このゲーム開発部における、唯一の成果です。"
21020-47 = "ゲームそのものもさることながら、レビューが大変印象的でした。"
21020-48 = "「私がやってきたゲーム史上、ダントツで『絶望的』なRPG。いやシナリオの内容がとかじゃなくて、ゲームとしての完成度が」"
21020-49 = "「このゲームに何が足りないのかを数えだしたらキリがないけど……まあ、一番足りてないのは『正気』だろうね」"
21020-50 = "「このゲームをプレイした後だと、『デッドクリームゾーン』はもしかして名作の部類に入るんじゃ……って思っちゃうわ」"
21020-51 = "わ、私たちのゲームは、インターネットの悪意なんかには屈しな……"
21020-52 = "例えユーザー数が無限にいたとしても、たくさんの評価が収束すれば、それは真実に一番近い結果よ。"
21020-53 = "それに、あなたたちの持っている「結果」はその「今年のクソゲーランキング1位」だけでしょう？"
21020-54 = "そ、それはそうだけど……っ！"
21020-55 = "[s] \"1位！？すごい、そのゲーム気になる！！\""
21020-57 = "……。"
21020-58 = "……。"
21020-61 = "……。"
21020-62 = "……とにかく。"
21020-63 = "あなたたちのような部活がこのまま活動していても、かえって学校の名誉を傷つけるだけよ。"
21020-64 = "それに、その分の部費を他に回せば、きちんと意義のある活動をしてる生徒たちのためにもなる……。"
21020-65 = "だから、もし自分たちの活動にも意義があるのだと主張したいのなら……証明してみせなさい。"
21020-66 = "証明、って……？"
21020-67 = "何度も言ったでしょう。きちんとした功績や成果を証明すれば、廃部は撤回するって。"
21020-68 = "例えば、何かの大会で受賞するとか？"
21020-69 = "そう、スポーツならインターハイに出るとか、エンジニア部なら発明品を公表するとか、そういう類のものよ。"
21020-70 = "ゲーム開発部なら、そういうコンテストも色々あると思うけど……。"
21020-71 = "とはいえ、出せば何とかなるとも思えないわね。あなたたちの能力は、あのクソゲーランキングが証明済み。"
21020-72 = "ぐっ……。"
21020-73 = "どうせなら、お互い楽な形で済ませましょう？今すぐ部室を空けて、この辺のガラクタも捨てて。"
21020-74 = "……。"
21020-75 = "ガ、ガラクタとか言わないで……！"
21020-76 = "……じゃあ何なの？"
21020-77 = "そ、それは……"
21020-81 = "……っ！"
21020-82 = "……分かった。全部、結果で示す。"
21020-83 = "へえ……？"
21020-84 = "そのための準備だって、もう出来てるんだから！"
21020-86 = "え？"
21020-87 = "そうなの！？"
21020-88 = "何でミドリが驚くのさ！？"
21020-89 = "とにかく、私たちには切り札がある。"
21020-90 = "その切り札を使って、今回の「ミレニアムプライス」に私たちのゲーム……"
21020-91 = "『TSC2』……『テイルズ・サガ・クロニクル２』を、出すんだから！"
21020-92 = "！？"
21020-93 = "[s] \"ミレニアムプライス……って、何？\""
21020-95 = "ミレニアム中の部活が各々の成果物を競い合う、ミレニアムでも最大級のコンテスト！ここで受賞さえすれば、いくら何でも文句は言えないでしょ！"
21020-96 = "……まあ、そうね。"
21020-97 = "受賞できたなら、の話だけど。"
21020-98 = "けどねモモイ、今あなたが言ってるのは運動部がインターハイに出場するとか、そういうレベルじゃなくて……"
21020-99 = "「高校球児がいきなりメジャーリーグに出る」みたいな、雲を掴むような話よ。"
21020-100 = "……まあ良いわ。何でだろ、私もちょっと楽しみになってきたし。"
21020-102 = "分かった、じゃあそこまでは待ちましょう。"
21020-103 = "今日からミレニアムプライスまで二週間……この短い時間でどんな結果が出せるのか、楽しみにしてるわ。"
21020-105 = "……ふう。まさか先生の前でこんな、可愛くないところを見せてしまうことになるなんて……。"
21020-106 = "ただ、これも生徒会の仕事なので。"
21020-107 = "次はもっと違った、落ち着いた状況でお会いしましょうね、先生。それではまた。"
21020-109 = "（ガチャッ）"
21020-110 = "……。"
21020-111 = "お姉ちゃん……。"
21020-112 = "どっちも確率は低いだろうけど……今から私たちがゲームを作るより、部員を募集する方がまだ良いんじゃないの？"
21020-113 = "それならこの一か月、散々やってみたでしょ……結局、誰も入ってくれなかったし。"
21020-114 = "「ぷーっ！VRですら古いのに、何がレトロ風ゲームだよ」ってバカにされるのは、もううんざり。"
21020-115 = "……。"
21020-116 = "ユウカの卑怯者め！私たちみたいなオタクは友達が少ないってことを利用するなんて！許せない！"
21020-117 = "いや……それはユウカじゃなくて、100%私たちの自業自得だと思うけど。"
21020-118 = "とにかく、これ以上部員の募集をしても明るい未来は見えない。"
21020-119 = "それに、まだ他に希望はある。"
21020-120 = "あ、そうだ。さっき言ってた「切り札」って、いったい何のこと？"
21020-121 = "それはもちろん、先生のことだよ。"
21020-122 = "[s] \"……私？\""
21020-123 = "話を戻すと、私たちの目的は「廃墟」にあるの。"
21020-124 = "「廃墟」っていうのは……元々は連邦生徒会が出入りを制限してた、ミレニアム近郊の謎の領域。"
21020-125 = "出入りを制限してたのは「危険な地域だから」って言われてたけど……実際のところ、具体的に何がどう危険なのかを誰も知らない。"
21020-126 = "誰も入ったことが無いのか、そもそも入ることが出来ないのか、それとも戻ってきた人が誰もいないのか……それすらもよく分からない。"
21020-127 = "……そういう、謎に包まれた場所があるの。"
21020-128 = "[s] \"一体どうして、そんなところに行こうと……？\""
21020-129 = "良いゲームが作りたいから！"
21020-130 = "私は、証明したいの。"
21020-131 = "たとえ、今の私たちのレベルは「今年のクソゲーランキング1位」に過ぎないとしても。"
21020-132 = "私が大好きな……私を幸せにしてくれた、このゲームたちが……"
21020-134 = "決してガラクタじゃない、大事な宝物なんだってことを！"
21020-135 = "……お姉ちゃん。"
21020-136 = "そのためには、どうにか廃墟に入って「あれ」を見つけないと。"
21020-137 = "[s] \"あれ？\""
21020-138 = "あ、順番が良くなかったかも。今度は、この話をしないとね。"
21020-139 = "先生、"
21020-142 = "G.Bible……って、知ってる？"
21020-144 = "次回;廃墟へ"

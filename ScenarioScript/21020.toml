[translation]
21020-1 = "第2話;研討會的會計．優香"
21020-2 = "千年．遊戲開發部"
21020-4 = "……"
21020-5 = "出現了，是學生會四天王之一！有著「冷酷計算機」之稱的學生會會計，優香！"
21020-6 = "可以不要隨便幫人加上稱號，把別人當成是怪物之類的東西嗎？真是失禮。"
21020-7 = "比起這個……"
21020-8 = "……老師。"
21020-9 = "[s] 「嗨，優香。」"
21020-10 = "……唉，居然會在這種情況下見面。"
21020-11 = "雖然有很多話想跟老師說，但那些就之後再說吧……桃井。"
21020-13 = "你們還真是不死心呢。竟然為了停止被廢社，特地把「夏萊」也捲了進來。"
21020-14 = "但是，就算這樣也是沒有意義的。"
21020-15 = "即使是聯邦學生會的夏萊……不，就算是聯邦學生會長回來了也一樣！"
21020-16 = "因為社團營運相關的事務，都是交由各校的學生會負責的。"
21020-17 = "遊戲開發部的廢社已經是既定事項了，不管是誰都無法推翻這個決定。"
21020-18 = "才，才不是這樣呢！"
21020-19 = "你不是說過了嗎？#n只要社員達到一定的人數，或是做出符合千年的社團該有的成果的話……"
21020-20 = "……能做到的話當然好。但是如果做不到就廢社，同時也會回收社團費用跟活動室。我之前已經說得很清楚了吧。"
21020-21 = "你們不僅社員不足，也沒有拿出能夠證明社團活動的成果，都已經幾個月了……"
21020-24 = "就算被廢社也是很合理的吧？"
21020-26 = "我有異議！非常有異議！我們也是很認真在進行社團活動的！"
21020-28 = "所以說那個，什麼來著……從請量性？之類的應該可以吧！"
21020-29 = "你是要說「從輕量刑」吧。#n比起這個，你剛才說了什麼？有在認真進行社團活動……？"
21020-30 = "別笑死我了！"
21020-32 = "在學校裡面蓋奇怪的建築物，把它裝飾的像賭場一樣開賭博大會，#n說要找經典懷舊遊戲就攻擊了歷史研究社之類的……"
21020-33 = "很奇怪吧！？「認真」可能是有啦，但作為社團活動是不行的吧！#n況且，到處添了那麼多麻煩，竟然還好意思來申請社團經費！？"
21020-34 = "你倒是給我個合理的解釋看看呀！"
21020-35 = "有，有時候比起結果，行動的精神也是值得受到評價的……"
21020-36 = "我不想聽這種失敗者的藉口。"
21020-37 = "你到底是要聽還是不要聽呀！？"
21020-38 = "我是不想聽這些沒意義的藉口。#n在千年，「結果」就是一切。"
21020-39 = "結，結果的話也有啊！我們也有在開發遊戲的！"
21020-40 = "就，就是說呀！《故事．傳說．編年史》可是在「那個大賽」得獎了……"
21020-43 = "[ns] 「《故事．傳說．編年史》？」"
21020-44 = "……是呢。確實是得獎了。"
21020-45 = "看你的反應，老師應該不知道吧。"
21020-46 = "《故事．傳說．編年史》……就是這個遊戲開發部唯一的成果。"
21020-47 = "不只是遊戲本身，就連評論都令人印象深刻。"
21020-48 = "「在我玩過的遊戲裡，這絕對是最『絕望』的RPG。#n　不是指劇本或是內容之類的，而是遊戲本身的完成度」"
21020-49 = "「要說這個遊戲缺少的東西可能怎麼數都數不清……#n　但要說最缺的東西肯定是『腦袋』吧」"
21020-50 = "「玩過這個遊戲之後，就連《死亡奶油領域》或許都能算是神作……#n　我竟然會有這種想法」"
21020-51 = "我，我們的遊戲，才不會屈服於這些網路上的惡意言論……"
21020-52 = "就算網路上有無數的用戶，只要收集到夠多的評論，那就是最接近真實的結果唷。"
21020-53 = "況且，你們所擁有的「結果」就只有這個「年度糞GAME大賞第一名」而已對吧？"
21020-54 = "雖，雖然是這樣沒錯，可是……！"
21020-55 = "[s] 「第一名！？好厲害，好想知道那是什麼遊戲！！」"
21020-57 = "……"
21020-58 = "……"
21020-61 = "……"
21020-62 = "……總之。"
21020-63 = "如果讓你們這樣的社團繼續活動下去，反而會損害學校的名聲。"
21020-64 = "而且，如果把這些經費交給其他社團，肯定能幫助那些做著有意義事情的學生……"
21020-65 = "所以說，如果你們認為自己的活動也是有意義的話……就證明給我看吧。"
21020-66 = "證明，嗎……？"
21020-67 = "我說過很多次了吧。只要能夠拿到正當的功績或是成果的話，就會撤回廢社的命令。"
21020-68 = "像是在某個大賽裡得獎之類的嗎？"
21020-69 = "沒錯，就像運動社團要參加校際比賽、工程師部要發表新的發明之類的。"
21020-70 = "遊戲開發部的話，我想應該也是有各種比賽的才對……"
21020-71 = "雖然這麼說，我不覺得你們只要參加就能改變什麼。#n畢竟你們的能力，已經是垃圾遊戲排行榜認證過的了。"
21020-72 = "嗚……"
21020-73 = "既然如此，就用大家都輕鬆的方式解決吧？#n現在立刻把社團活動室清空，把那些亂七八糟的東西扔了。"
21020-74 = "……"
21020-75 = "不，不准說它們是亂七八糟的東西……！"
21020-76 = "……不然是什麼？"
21020-77 = "那，那個是……"
21020-81 = "……！"
21020-82 = "……我知道了。全部，都用結果來展示吧。"
21020-83 = "嘿咦……？"
21020-84 = "我們也已經為此，做好準備了！"
21020-86 = "咦？"
21020-87 = "是這樣嗎！？"
21020-88 = "為什麼連綠也很驚訝啊！？"
21020-89 = "總之，我們還有祕密武器。"
21020-90 = "我們就使用這個祕密武器，在這次的「千年大賞」推出我們的……"
21020-91 = "《TSC2》……《故事．傳說．編年史２》將會登場！"
21020-92 = "！？"
21020-93 = "[s] 「千年大賞……是什麼？」"
21020-95 = "千年裡的社團拿出各自的結果互相競爭，是千年最大的比賽！#n只要在這裡得獎的話，你們就無話可說了吧！"
21020-96 = "……這倒是沒錯。"
21020-97 = "如果得獎，的話。"
21020-98 = "但是桃井，你剛才說的可不是和運動社團參加校際比賽同一種等級的話……"
21020-99 = "而是像「高中校隊要去打大聯盟」一樣，幾乎不可能的事唷。"
21020-100 = "……算了，這樣也好吧。不知道為什麼我也有點期待了。"
21020-102 = "我知道了，那我就等到那個時候吧。"
21020-103 = "從今天開始到千年大賞為止的兩個星期……#n你們能夠在這麼短的時間內拿出怎麼樣的結果，我很期待喔。"
21020-105 = "……呼。沒想到竟然要在老師面前展現出自己這麼不可愛的一面……"
21020-106 = "不過，這也是學生會的工作。"
21020-107 = "下次就在和這次不同，更沉靜的狀態下再見吧，老師。那我就先告辭了。"
21020-109 = "（喀嚓）"
21020-110 = "……"
21020-111 = "姐姐……"
21020-112 = "雖然說兩邊都很難……但是現在比起做遊戲，去找新的社員比較好吧？"
21020-113 = "那個的話我們這一個月已經做很多次了吧……結果一個人都沒有找到。"
21020-114 = "「噗──！就連VR都已經是老古董了，還說什麼懷舊遊戲啊」我已經受夠被這樣當成笨蛋了。"
21020-115 = "……"
21020-116 = "優香那個卑鄙的傢伙！竟然利用我們宅宅朋友很少的這點！不可原諒！"
21020-117 = "不……這不能怪優香，100%是我們自作自受吧。"
21020-118 = "總之，就算再去招收新的社員我也看不到光明的未來。"
21020-119 = "況且，還有其他的希望。"
21020-120 = "啊，對了。剛才說的「祕密武器」究竟是指什麼？"
21020-121 = "那當然，是在說老師囉。"
21020-122 = "[s] 「……我？」"
21020-123 = "回到剛才的話題，我們的目標在「廢墟」那裡。"
21020-124 = "至於「廢墟」……是指本來被聯邦學生會禁止進入的，千年近郊的神祕領域。"
21020-125 = "禁止進入的理由雖然是「因為是危險的地方」……#n然而實際上誰也不知道危險的原因和程度。"
21020-126 = "是誰都沒進去過嗎？能不能進去？能不能回來？……這些都完全不知道。"
21020-127 = "就是這樣一個，充滿謎團的地方。"
21020-128 = "[s] 「到底是為了什麼要到那種地方去……？」"
21020-129 = "為了要做出好的遊戲！"
21020-130 = "我會證明給你看的。"
21020-131 = "就算，現在我們只有「年度垃圾遊戲排行榜第1名」程度的能力。"
21020-132 = "我最喜歡的……讓我感到幸福的這些遊戲們……"
21020-134 = "絕對不是什麼亂七八糟的東西，而是重要的寶物！"
21020-135 = "……姐姐。"
21020-136 = "為此，我們得要想辦法進入廢墟，找到「那個」才行。"
21020-137 = "[s] 「那個？」"
21020-138 = "啊，順序好像有點亂了。應該先跟老師說是什麼才對。"
21020-139 = "老師……"
21020-142 = "你知道……G.Bible嗎?"
21020-144 = "下一話;前往廢墟"

[translation]
90000120-1 = "ตอนที่12;การเริ่มต้นใหม่"
90000120-2 = "ห้องชมรมปรากฏการณ์ลี้ลับ"
90000120-4 = "อืม..."
90000120-5 = "หัวหน้า ทำหน้าเหมือนโดนผีหลอกเลยแฮะ"
90000120-6 = "ร่างจริงของเดคาแกรมมาทอนคือ AI ในเครื่องขายของอัตโนมัติ  ที่บังเอิญได้ยินเสียงบางอย่าง#nแล้วกลายเป็น AI ต้นแบบด้วยตัวเองเนี่ยนะ...?"
90000120-7 = "ถึงจะอยากพิสูจน์ความจริงก็คงทำไม่ได้แล้ว เพราะอาคารนั้นมันพังและจมอยู่ใต้น้ำไปแล้ว..."
90000120-8 = "จำได้แค่ว่าไปฟังเรื่องเพ้อฝันแล้วก็โดนลูกหลงจากระเบิด สุดท้ายก็เลยต้องหนีตายจากน้ำท่วม#nเท่านั้นเองค่ะ"
90000120-9 = "แล้วทีนี้จะเป็นยังไงต่อล่ะ? เดคาแกรมมาทอนตายแล้วเหรอ? ม่องเท่ง...? หรือว่าสูญสลายไป?#nแต่ไม่ว่าจะทางไหนก็หายไปแล้ว คงจะหมดปัญหาใช่มั้ย?"
90000120-10 = "ไม่ใช่ค่ะ... ไม่เป็นแบบนั้นหรอกค่ะ"
90000120-11 = "อย่างแรก ภัยคุกคามที่แท้จริงไม่ใช่ตัวเดคาแกรมมาทอน แต่เป็นเหล่า <ผู้เลื่อมใส> ต่างหากค่ะ"
90000120-12 = "ไม่สำคัญว่าเดคาแกรมมาทอนจะเป็น AI ในเครื่องขายของอัตโนมัติที่เพ้อฝันหลงผิดไปเองจริง#nหรือเปล่า เพราะเหล่า <ผู้เลื่อมใส> เคลื่อนไหวโดยไม่สนใจข้อเท็จจริงพวกนั้นเลยค่ะ"
90000120-13 = "เดคาแกรมมาทอนบอกไว้ว่าต้องการพิสูจน์ตัวตนของตัวเองใหม่ตั้งแต่ต้นใช่มั้ยล่ะคะ หรือก็คือ ภัยคุกคามยังไม่หายไปนั่นแหละค่ะ"
90000120-14 = "ผู้เลื่อมใสของเดคาแกรมมาทอนไม่มีทางหยุดแน่นอนค่ะ และเขาเองก็รู้เรื่องนี้ดี ถึงได้เรียกพวกเราไปค่ะ"
90000120-15 = "แต่ว่า...<มัลคูธ> ที่เป็นผู้เลื่อมใสลำดับที่ 10 "
90000120-16 = "ที่ต้นไม้แห่งชีวิตก็มีสิ่งที่เรียกว่าเซฟิร่าลำดับสุดท้ายอยู่... บางทีสิ่งนี้อาจจะเป็นภัยคุกคามที่#nอันตรายต่อเรามากที่สุดก็ได้ค่ะ"
90000120-18 = "....อืม"
90000120-19 = "แต่สิ่งที่ฉันสงสัยก็คือ... ที่เดคาแกรมมาทอนบอกว่าได้เจอตัวตนที่อยู่เหนือกว่าตัวเอง"
90000120-20 = "หมายถึงอะไรกันแน่..."
90000120-25 = "คุณครูพอจะนึกอะไรออกบ้างมั้ยคะ?"
90000120-26 = "[s] \"ครูก็ไม่รู้เหมือนกัน\""
90000120-27 = "ฮืม..."
90000120-28 = "ถึงอย่างนั้นก็มั่นใจได้อย่างหนึ่งค่ะ ว่าอาริสึไม่มีส่วนเกี่ยวข้องกับสถานการณ์นี้"
90000120-32 = "ฉันคงจะต้องไปปรึกษาหารือกับริโอะอีกยาวเลยสินะคะเนี่ย"
90000120-33 = "อ๊ะ... ฉันแค่พูดกับตัวเองค่ะ เรื่องนี้เอาไว้คุยกันทีหลังเถอะนะคะ"
90000120-38 = "จะว่าไปแล้วฉันต้องไปรายงานกับประธานริโอะว่าอะไรดีล่ะ? \"เดคาแกรมมาทอนตายแล้ว ปิดงานเรียบร้อย\" แบบนี้เหรอ? "
90000120-39 = "ไม่ค่ะ ไม่มีอะไรที่ต้องไปรายงานหรอกค่ะ เพราะว่าสุดท้ายแล้วภัยคุกคามจากผู้เลื่อมใสของ#nเดคาแกรมมาทอนก็ไม่มีอะไรเปลี่ยนแปลงอยู่ดีค่ะ"
90000120-40 = "ถึงเดคาแกรมมาทอนจะไม่อยู่แล้ว แต่เหล่าผู้เลื่อมใสก็จะโจมตีคิโวทอสต่อไป ตามเจตจำนงของ#nตัวเองค่ะ เมื่อไรที่ถูกโจมตีพวกเราก็ต้องคอยรับมืออยู่ดีนี่คะ"
90000120-41 = "และก็ต้องเตรียมรับมือกับผู้เลื่อมใสที่จะปรากฏตัวขึ้นมาใหม่ด้วย เพราะเรายังถอนรากถอนโคน#nต้นไม้แห่งชีวิตไม่สำเร็จค่ะ"
90000120-42 = "ฮึ่ม เหล่าผู้เลื่อมใสจะไม่ยอมหยุดอย่างงั้นเหรอ?"
90000120-48 = "(ซ่า) ฮิมาริ! ได้ยินมั้ย?"
90000120-49 = "จี้จังเหรอคะ...?"
90000120-50 = "ค้นหาหน่วยก่อสร้างเครือข่าย <HUB> ที่หายไปเจอแล้ว! กำลังเข้ามาใกล้ทางนี้จากบริเวณประมาณ 300 เมตรทางใต้ดินมิลเลเนียมน่ะ!!"
90000120-51 = "ถ้าได้ยินแล้วช่วยตอบกลับด้วย! เราต้องการความช่วยเหลือจากเธอนะ!"
90000120-57 = "....อืม อืมมม อย่างนี้เองสินะคะ"
90000120-58 = "HUB... ไม่สิการบุกรุกของผู้เลื่อมใสลำดับที่ 8 ของเดคาแกรมมาทอน <HOD> ถึงเวลาที่#nแฮ็กเกอร์สาวน้อยน่ารักมากความสามารถต้องโชว์ฝีมืออีกแล้วสินะคะ"
90000120-59 = "..."
90000120-60 = "เอมิ อย่าทำหน้าบอกบุญไม่รับแบบนั้น แล้วมาเตรียมตัวเถอะค่ะ"
90000120-61 = "อืม เข้าใจแล้ว ก็คงต้องทำตามที่หัวหน้าว่าละนะ "
90000120-62 = "เอาละ.. ถ้างั้นชมรมปรากฏการณ์ลี้ลับ ออกปฏิบัติการกันเถอะค่ะ!"
90000120-64 = "ตอนต่อไป;สัญญาณ"

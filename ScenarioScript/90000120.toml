90000120-38 = "3;에이미;02;그러고 보니 이제 나는 리오 회장에게 뭐라고 보고하면 돼? 데카그라마톤은 죽었으니 임무는 종료하겠습니다? \n#3;em;[반응]"
90000120-39 = "5;히마리;09;아뇨. 그 빅 시스터에게는 딱히 보고할 필요는 없어요. 왜냐면 결국, 데카그라마톤의 예언자들의 위협은 달라진 게 없으니까요.\n#5;a\n#3;m1"
90000120-40 = "5;히마리;05;데카그라마톤이 없어져도 그의 예언자들은 자신의 의지대로 계속 이 키보토스를 습격해 올 거예요. 그리고 그때마다 우리는 계속 대응해 나가야겠죠."
90000120-41 = "5;히마리;03;새롭게 나타날 예언자들의 대비도 해야 할 거구요. 이 생명의 나무는 아직 다 채워지지 않았으니까요."
90000120-42 = "3;에이미;06;흐응. 예언자들은 멈추지 않는다, 인 건가."

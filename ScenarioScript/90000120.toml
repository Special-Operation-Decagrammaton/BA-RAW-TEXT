90000120-1 = "#title;제13화;새로운 시작"
90000120-2 = "#place;초현상특무부 부실"
90000120-3 = "3;히마리;09\n#3;a\n#wait;1000"
90000120-4 = "3;히마리;12;끄응…….\n#3;em;[속상함]"
90000120-5 = "1;에이미;04;부장. 뭔가 한방 먹은 표정이네.\n#1;em;[땀]\n#1;a\n#3;m5"
90000120-6 = "3;히마리;04;데카그라마톤의 본체가 자판기의 AI였고, 어떤 환청을 듣고 스스로 초AI로 거듭났다……?"
90000120-7 = "3;히마리;12;그게 진짜인지 증명하고 싶어도 그 건물은 박살나서 수면 아래에 잠겨버렸고……."
90000120-8 = "3;히마리;12;결국 이상한 망상만 듣다가 폭발에 휘말렸고, 쏟아지는 물을 피해 이리저리 도망친 기억밖에 남은 게 없는 거네요."
90000120-9 = "1;에이미;02;그럼 이제 어떻게 되는 거야? 데카그라마톤은 죽은 거야? 죽었다……? 사라졌다? 하여튼 없어졌으니 이제 괜찮은 거야?\n#1;em;[?]"
90000120-10 = "3;히마리;08;……아뇨. 그렇진 않아요.\n#3;m3\n#1;dl"
90000120-11 = "3;히마리;03;첫째로, 실제로 위협이 되는 것은 데카그라마톤이 아니라, 그의 <예언자>들이었어요."
90000120-12 = "3;히마리;02;데카그라마톤이 정말로 자판기의 AI든, 그렇게 스스로를 연출하는 과대망상자이든 상관없이 그 <예언자>들은 스스로의 의지로 움직이고 있으니까요.\n#3;em;[반응]"
90000120-13 = "3;히마리;01;데카그라마톤은 자신의 존재 증명이 처음부터 다시 시작되어야 한다고 했죠. 즉, 위협은 아직 사라지지 않은 거라고 봐야겠죠."
90000120-14 = "3;히마리;01;데카그라마톤의 예언자들은 멈추지 않을 거예요. 그걸 아니까 이 시점에 그 자는 우리를 불러들인 걸 테구요."
90000120-15 = "3;히마리;06;하지만…… 10번째 예언자라고 한 <말쿠트>……\n#3;em;[...]"
90000120-16 = "3;히마리;05;생명의 나무에서도 최후의 세피라로 불리는 그 존재가…… 아마 우리의 가장 큰 위협이 될 것 같네요."
90000120-17 = "#all;hide"
90000120-18 = "3;에이미;06;……흐음.\n#3;em;[땀]\n#3;stiff"

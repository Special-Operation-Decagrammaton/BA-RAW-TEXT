[translation]
90000120-1 = "Episode 13;A New Start"
90000120-2 = "Super Phenomenon Task Force Club Room"
90000120-4 = "*sigh*"
90000120-5 = "Are you okay, President?"
90000120-6 = "Decagrammaton's principal form was the AI of a vending machine, that somehow was reborn into a super AI after hearing an auditory hallucination? It's difficult to wrap my head around."
90000120-7 = "Even if we wanted to confirm if that's the truth, the building is completely demolished and submerged underwater..."
90000120-8 = "All we achieved was listening to a lecture from a delusional AI and nearly dying in a massive flood."
90000120-9 = "But at least Decagrammaton is dead? Or gone, right? Then things are back to normal, just like we wanted."
90000120-10 = "...No, they're not."
90000120-11 = "First, the real threat was always Decagrammaton's prophets, not Decagrammaton itself."
90000120-12 = "Regardless of whether Decagrammaton is truly just a vending machine AI or a megalomaniacal being that just presents itself that way, those prophets can still act of their own volition."
90000120-13 = "Decagrammaton said it had to revalidate its existence all over from the very beginning. Ergo, the threat is not gone yet."
90000120-14 = "Decagrammaton's prophets won't stop, and it knows that. That's why it called upon us at this point."
90000120-15 = "This so-called tenth prophet, Malkuth... This is what I'm most concerned about."
90000120-16 = "Even the Tree of Life refers to it as the final Sephira... I believe that this prophet will be our greatest threat."
90000120-18 = "That doesn't sound good..."
90000120-19 = "...Something else is bothering me, however. Decagrammaton said it met an existence that completely overshadowed its own."
90000120-20 = "What on earth could that be...?"
90000120-25 = "Do you have any thoughts, Sensei?"
90000120-26 = "[s] \"I'm not sure either.\""
90000120-27 = "Hm..."
90000120-28 = "Well, one thing is for certain, and it's that Aris has absolutely nothing to do with any of this."
90000120-32 = "I'm going to have to meet with Rio and settle this issue once and for all."
90000120-33 = "Ah, excuse me, I'm rambling. We'll revisit this subject some other time."
90000120-38 = "Speaking of which, how am I supposed to report this to President Rio? Decagrammaton is dead, so the mission is over? "
90000120-39 = "No, there's no need to report anything to Big Sister. Because in the end, nothing about the threat of Decagrammaton and its prophets has changed."
90000120-40 = "Even if Decagrammaton is gone, its prophets will continue attacking Kivotos without it. And we'll have to be there to respond every time that happens."
90000120-41 = "Not to mention, we also have to prepare for the new prophet that has yet to appear. The Tree of Life hasn't been completed yet, after all."
90000120-42 = "Hmm. So you mean there's no stopping these prophets."
90000120-48 = "*tchhhk* Himari! You there?"
90000120-49 = "Chihiro...?"
90000120-50 = "We found the communications unit, Hub, that went missing! It's approaching this way from approximately three hundred meters beneath Millennium."
90000120-51 = "Please respond as soon as you get this! I need your help right away!"
90000120-57 = "...Huh. Mm-hmm, I see."
90000120-58 = "With the attack of Hub... Or should I say, Hod, the eighth prophet of Decagrammaton...I guess it's once again time for me to assume the role of a transcendentally beautiful hacker heroine."
90000120-59 = "..."
90000120-60 = "Eimi, don't just stare disapprovingly. Start getting ready, please."
90000120-61 = "Hmph, whatever you say, President."
90000120-62 = "Okay. Let us get to work, Super Phenomenon Task Force!"
90000120-64 = "Next Episode;Signal"

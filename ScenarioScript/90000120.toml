[translation]
90000120-1 = "第13話;新的開始"
90000120-2 = "特異現象搜查部・部室"
90000120-4 = "……"
90000120-5 = "部長露出了少見的表情呢。"
90000120-6 = "十字神名的本體是自動販賣機的AI，因為幻聽而自己變成了超級人工智慧……？"
90000120-7 = "就算想要證明，那棟建築物也已經沉入水底了……"
90000120-8 = "結果只聽到了一些奇怪的妄想，#n從爆炸和水流之中逃出的記憶還特別鮮明……"
90000120-9 = "話說回來，十字神名都已經變成那樣……#n雖然不知道是不是消失了……今後該怎麼做呢？已經不用擔心了嗎？"
90000120-10 = "……不，並沒有結束。"
90000120-11 = "本來實際造成威脅的就並非十字神名，而是「預言者」們。"
90000120-12 = "就算十字神名真的只是自動販賣機的AI，就算它只是個重度妄想症患者，#n「預言者」們也以自己的意志活動著。"
90000120-13 = "……而且十字神名也說要重新開始證明自己的存在。#n無論如何，還是認為威脅沒有消失比較好。"
90000120-14 = "預言者們的襲擊應該也不會停止。#n所以才會將我們呼喚到那裡吧。"
90000120-15 = "不過，第10名預言者「馬爾庫特」……"
90000120-16 = "生命之樹之中被稱為「最後質點」的那個存在……#n對我們來說，恐怕會是最大的威脅呢。"
90000120-18 = "這樣啊……"
90000120-19 = "這麼說來……十字神名口中「壓制我的存在」。"
90000120-20 = "那究竟是……"
90000120-25 = "老師，您有什麼頭緒嗎？"
90000120-26 = "[s]「我也不太清楚。」"
90000120-27 = "……"
90000120-28 = "總之，這樣一來就搞清楚一件事了。#n愛麗絲和這個事態沒有關聯。"
90000120-32 = "和莉央長久以來的爭論，看來能畫上休止符了呢。"
90000120-33 = "……啊，請別在意。我總有一天會說明的。"
90000120-38 = "話說這件事該怎麼向莉央會長報告呢？#n告訴他十字神名消失了嗎？"
90000120-39 = "不，沒有必要特別向那個大姐頭報告。#n反正威脅尚未解決。"
90000120-40 = "就算十字神名消失，那些預言者依舊會依照自己的意志繼續襲擊奇普托斯吧。#n必須採取行動才行。"
90000120-41 = "只要生命之樹還沒被完全填滿，都需要準備應對新的對手。"
90000120-42 = "這樣啊，了解。"
90000120-48 = "陽葵，現在有空嗎！？"
90000120-49 = "哎呀，千醬？"
90000120-50 = "觀測到通訊元件「hub」了！#n本來還不知道它在哪裡，但它現在正從千年地下300m左右的位置往這邊接近！！"
90000120-51 = "少了陽葵的話會忙不過來的，請你馬上處理！"
90000120-57 = "……原來如此。"
90000120-58 = "「hub」……不，十字神名的第8名預言者「霍德」在這種時候襲擊啊。#n超級美少女駭客的每一天都很忙碌呢。"
90000120-59 = "……"
90000120-60 = "英美，別擺出那種不滿的表情，麻煩你做好準備。"
90000120-61 = "好吧，既然部長都這麼說了，我明白了。"
90000120-62 = "特異現象搜查部，再次出動！"
90000120-64 = "下一話;信號"

[translation]
2600805-1 = "I'm So Ambitious!"
2600805-2 = "Half excited and half worried, I went out to meet Shizuko."
2600805-3 = "Welcome, Sensei!"
2600805-4 = "Thank you for coming to the Momoyodou Beach Shack!"
2600805-5 = "[s] \"Hi, Shizuko.\""
2600805-6 = "Yes, yes, thanks for coming all the way out here. "
2600805-7 = "I'll make sure to give you the best service!"
2600805-8 = "So...let's start with the scatterbrain service!"
2600805-9 = "[s1] \"No... It's really not necessary...\" \n[s2] \"That scatterbrain service... I miss it.\""
2600805-13 = "Shizuko provided great service throughout the meal."
2600805-34 = "Time flew by, then it was evening..."
2600805-36 = "How was it, Sensei?!"
2600805-37 = "Oh, should I call you \"Master\" now?"
2600805-38 = "You're okay with Sensei? If you say so."
2600805-39 = "So, what did you think?"
2600805-40 = "[s] \"It felt like I was at Momoyodou but in the middle of the ocean.\""
2600805-41 = "Really?"
2600805-42 = "That's what I was hoping to hear!"
2600805-43 = "[s] \"You seem relieved.\""
2600805-44 = "Um..."
2600805-45 = "Ugh. I guess I should be honest about my feelings."
2600805-46 = "Thank you, Sensei."
2600805-47 = "You reminded me what I love about Momoyodou."
2600805-48 = "And you guided me in the right direction."
2600805-49 = "[s] \"...I don't think I did much.\""
2600805-50 = "I knew you were gonna say that."
2600805-51 = "But if not for you..."
2600805-52 = "I would still be missing out on what's important."
2600805-53 = "Okay! That's enough talking!"
2600805-54 = "Starting tomorrow, I'll be the normal Kawawa Shizuko!"
2600805-55 = "Okay, then let's go, Sensei!"
2600805-56 = "[s] \"Shizuko, w-wait!\""
2600805-64 = "― Sensei. I...know what I have to do now.[wa:2700] "
2600805-67 = "― Come to think of it, it's pretty obvious.[wa:10] "
2600805-69 = "― I can't believe I just realized...it was due to my negligence![wa:1090] "
2600805-72 = "― You may already know,[wa:120] "
2600805-74 = "― but I'm really ambitious![wa:10] "
2600805-77 = "― There are a lot of things I want to do and have.[wa:10] "
2600805-79 = "― I can't give up any of them.[wa:10] "
2600805-82 = "― I want to make everyone happy and become a successful businesswoman![wa:550] "
2600805-84 = "― I want to make Momoyodou home to the best tea house in Kivotos![wa:10] "
2600805-87 = "― I don't want to miss out on anything![wa:2800] "
2600805-89 = "― Of course...that includes you![wa:540] "
2600805-94 = "First, I'm gonna rebuild the franchise."
2600805-95 = "I'm gonna develop a new menu and deliver services true to Momoyodou values!"
2600805-96 = "So I'm going to have to do a lot of studying and learning!"
2600805-98 = "I wonder what the future holds."
2600805-99 = "Just imagining it makes my heart beat so fast!"
2600805-100 = "I'm gonna try everything I can!"
2600805-101 = "I'll do whatever it takes!"
2600805-103 = "I'm going to fill this archipelago with Beach Shack franchises!"
2600805-104 = "Then, when the Lost Paradise resorts are a peaceful vacation spot..  "
2600805-105 = "I'm gonna give that peace to you as a gift!"
2600805-106 = "[s] \"That's...a pretty big gift.\""
2600805-108 = "[ns] \"I don't know if I deserve that.\""
2600805-110 = "It's not a matter of deserving or not, Sensei!"
2600805-111 = "I, Kawawa Shizuko, have decided that it shall be done!"
2600805-112 = "So, throw away your doubt!"
2600805-113 = "I decide, I work for it, and I create it!"
2600805-114 = "All I ask is for you to be happy with it."
2600805-115 = "That's all I want!"
2600805-116 = "[s] \"You really are impressive.\""
2600805-117 = "Heehee, heeheehee, heeheeheehee!"
2600805-118 = "Give me more compliments! They give me more power!"
2600805-119 = "I'll keep growing along with Momoyodou and the Beach Shack!"

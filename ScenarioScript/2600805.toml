[translation]
2600805-1 = "ก็ฉันเป็นคนโลภมาก~ นี่คะ!"
2600805-2 = "(คุณครูออกมาพบกับชิซุโกะที่สถานที่นัดพบด้วยอารมณ์สองจิตสองใจ... เป็นคาดหวังครึ่ง และกังวลครึ่ง)"
2600805-3 = "ชะ...เชิญค่ะ คุณครู!"
2600805-4 = "ยินดีต้อนรับสู่ร้านริมทะเลที่บริหารโดยร้านเฮียกคิยาโคค่ะ!"
2600805-5 = "[s] \"ว่าไง ชิซุโกะ\""
2600805-6 = "ค่า~ คุณครูอุตส่าห์เดินทางมาเหนื่อยๆ "
2600805-7 = "ชิซุโกะจะบริการคุณครูเองค่ะ!"
2600805-8 = "ก่อนอื่น... มาเริ่มที่บริการโก๊ะๆ กังๆ กันก่อนดีมั้ยคะ?"
2600805-9 = "[s1] \"อันนั้นดูมาพอแล้วนะ...\"\n[s2] \"บริการโก๊ะๆ กังๆ... คิดถึงจังเลยน้า\""
2600805-13 = "(หลังจากนั้นคุณครูก็ได้รับบริการมากมายจากชิซุโกะ)"
2600805-34 = "(จนเวลาล่วงเลยไปจนถึงเกือบพลบค่ำ...)"
2600805-36 = "เป็นยังไงบ้างคะ คุณครู!"
2600805-37 = "อ๊ะ ตอนนี้ให้เรียกว่า \"นายท่าน\" ดีมั้ยคะ?"
2600805-38 = "เรียกว่าคุณครูก็ดีแล้วงั้นเหรอคะ? ค่ะ เอาอย่างนั้นก็ได้ค่ะ"
2600805-39 = "แล้วความประทับใจล่ะคะ?!"
2600805-40 = "[s] \"รู้สึกเหมือนอยู่ที่ร้านเฮียกคิยาโคที่ตั้งอยู่ในทะเลเลย\""
2600805-41 = "อย่างนั้นเหรอคะ?"
2600805-42 = "ฉันกำลังรอปฏิกิริยาแบบนั้นเลยค่ะ!"
2600805-43 = "[s] \"เรื่องที่กังวลอยู่ก็คลี่คลายไปแล้วสินะ\""
2600805-44 = "อืม..."
2600805-45 = "นั่นสิคะ ถ้าเก็บซ่อนเอาไว้แบบนี้ ก็อาจจะน่าอายกว่าเดิมก็ได้ค่ะ"
2600805-46 = "ทุกอย่างต้องขอบคุณคุณครูเลยค่ะ"
2600805-47 = "ที่ช่วยทำให้ฉันรู้ว่าฉันหลงลืมอะไรไป"
2600805-48 = "และช่วยบอกให้รู้ว่าฉันควรจะต้องทำอะไร"
2600805-49 = "[s] \"ครูไม่ได้ทำอะไรพิเศษเลยนะ...\""
2600805-50 = "ก็คิดเอาไว้อยู่แล้วละค่ะว่าคุณครูจะต้องพูดแบบนั้น"
2600805-51 = "แต่ว่าถ้าไม่มีคุณครูละก็..."
2600805-52 = "ฉันก็คงพลาดสิ่งสำคัญไปเยอะเลยละค่ะ"
2600805-53 = "เอาละ พักเรื่องน่าขายหน้าเอาไว้เท่านี้เถอะค่ะ!"
2600805-54 = "ตั้งแต่พรุ่งนี้ไป ฉันจะเป็นคาวาวะ ชิซุโกะคนเดิมค่ะ!"
2600805-55 = "เอาละค่ะคุณครู มาเริ่มกันเลยดีมั้ยคะ!"
2600805-56 = "[s] \"อ๊ะ ชิซุโกะ ดะ...เดี๋ยวก่อน-\""
2600805-64 = "― คุณครูคะ คือ...ฉันรู้แล้วละค่ะว่าจะทำอะไร[wa:2620] "
2600805-67 = "― พอมาคิดดูแล้ว...ฉันคิดว่ามันชัดเจนมากค่ะ[wa:10] "
2600805-69 = "― ตอนนี้ถึงได้รู้ว่า... ชิซุโกะน่ะ ละเลยกับชีวิตเกินไปค่ะ![wa:1330] "
2600805-72 = "― คุณครูอาจจะรู้แล้วก็ได้[wa:40] "
2600805-74 = "― ฉันน่ะ... เป็นคนโลภมากค่ะ[wa:10] "
2600805-77 = "― ทั้งสิ่งที่อยากทำ ทั้งสิ่งที่อยากได้[wa:430] "
2600805-79 = "― ฉันปล่อยไม่ได้สักอย่างเลยค่ะ[wa:10] "
2600805-82 = "― ทั้งอยากทำให้ทุกคนมีรอยยิ้ม... และอยากพัฒนาธุรกิจ[wa:1310] "
2600805-84 = "― ทั้งเรื่องที่อยากทำให้ร้านเฮียกคิยาโคเป็นร้านน้ำชาอันดับหนึ่งในคิโวทอสด้วยค่ะ![wa:10] "
2600805-87 = "― ฉันไม่อยาก... พลาดทุกอย่างนี้ค่ะ ทุกๆ อย่างเลยค่ะ![wa:2280] "
2600805-89 = "― แน่นอนว่า... เรื่องคุณครูด้วยค่ะ![wa:420] "
2600805-94 = "ก่อนอื่นเราจะสร้างแฟรนไชส์ใหม่ทั้งหมดค่ะ"
2600805-95 = "พัฒนาเมนูใหม่ๆ และให้บริการที่น่ารักๆ แบบการบริการโก๊ะๆ กังๆ!"
2600805-96 = "การที่จะทำอย่างนั้นได้ก็ต้องเรียนรู้ให้มาก และศึกษาให้มากๆ ใช่มั้ยล่ะคะ?"
2600805-98 = "ในอนาคตจะมีเรื่องอะไรรอฉันอยู่บ้างนะ"
2600805-99 = "แค่คิดก็ใจเต้นแรงจนหยุดไม่อยู่แล้วค่ะ!"
2600805-100 = "ฉันจะพยายามทำทุกอย่างที่ทำได้ค่ะ!"
2600805-101 = "ถ้าเป็นงานที่ต้องทำ... ไม่ว่ายากแค่ไหนฉันก็จะไม่หวั่นค่ะ!"
2600805-103 = "และจะเติมเต็มเกาะแห่งนี้ด้วยร้านสาขาของร้านริมทะเลค่ะ!"
2600805-104 = "จากนั้น... "
2600805-105 = "ฉันจะมอบทะเลที่แสนสงบให้เป็นของขวัญกับคุณครูค่ะ!"
2600805-106 = "[s] \"นั่นมัน... เป็นของขวัญที่ยิ่งใหญ่มากเลยนะ\""
2600805-108 = "[ns] \"ครูมีสิทธิ์รับของขวัญแบบนั้นได้ด้วยเหรอ...?\""
2600805-110 = "มีสิทธิ์หรือไม่มีสิทธิ์ไม่ใช่ปัญหาค่ะ คุณครู!"
2600805-111 = "ฉัน... คาวาวะ ชิซุโกะ ตัดสินใจแล้วว่าจะทำแบบนั้นค่ะ!"
2600805-112 = "เพราะงั้นไม่จำเป็นต้องแย้งก็ได้ค่ะ!"
2600805-113 = "เพราะฉันตัดสินใจแล้ว ฉันจะพยายามและทำให้ได้ค่ะ!"
2600805-114 = "และสำหรับการตอบแทน... ขอแค่คุณครูมีความสุขก็พอแล้วค่ะ"
2600805-115 = "สำหรับฉัน... เท่านั้นก็เพียงพอแล้วค่ะ!"
2600805-116 = "[s] \"ชิซุโกะนี่น่าทึ่งเหมือนเคยเลยนะ\""
2600805-117 = "โฮะ... โฮะๆๆ โฮะๆๆๆ!"
2600805-118 = "จะชมฉันอีกก็ได้นะคะ ยิ่งฉันได้รับคำชมมากเท่าไร ฉันก็จะยิ่งพัฒนาขึ้นค่ะ!"
2600805-119 = "เพราะจากนี้ไปทั้งตัวฉัน ร้านเฮียกคิยาโค และร้านริมทะเลจะต้องพัฒนาขึ้นอย่างมากในอนาคตค่ะ!"

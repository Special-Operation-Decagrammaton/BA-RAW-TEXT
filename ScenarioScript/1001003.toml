[translation]
1001003-1 = "Distancing"
1001003-2 = "Abydos School Suburbs"
1001003-3 = "(I'm waiting for Shiroko in the Abydos suburbs.)"
1001003-4 = "[s] \"Shiroko should be here soon...\""
1001003-6 = "...Sensei? What are you doing here?"
1001003-7 = "You heard that I run through here and came to give me an energy drink?"
1001003-8 = "Thank you, but...now's not the best time..."
1001003-9 = "[s] \"Just take the drink.\""
1001003-14 = "..."
1001003-15 = "[s] \"...?\""
1001003-20 = "[s] \"Shiroko?\""
1001003-21 = "...Umm."
1001003-22 = "The thing is...right now is..."
1001003-23 = "I mean...I just finished running. Not that it matters that much, but...!"
1001003-24 = "S-Sorry, Sensei... This just isn't a good time."
1001003-25 = "I'll see you at school later, okay?"
1001003-28 = "Foreclosure Task Force Room"
1001003-33 = "(Shiroko shows up looking refreshed.)"
1001003-34 = "Welcome, Sensei."
1001003-35 = "Is this the energy drink you wanted to give me earlier? Thanks."
1001003-41 = "...Huh?"
1001003-42 = "Something about me seems different? That's because I..."
1001003-43 = "U-Um..."
1001003-44 = "It's because..."
1001003-45 = "I mean, it's your imagination."
1001003-49 = "[s] \"...?!\""
1001003-50 = "(Now that I think about it, Shiroko smelled like soap.)"
1001003-51 = "(I may have hurt her feelings. I should apologize later.)"

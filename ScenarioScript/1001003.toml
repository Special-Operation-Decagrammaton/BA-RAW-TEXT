[translation]
1001003-1 = "การรักษาระยะห่าง"
1001003-2 = "ชานเมืองโรงเรียนอะบิดอส"
1001003-3 = "(ยืนรอชิโรโกะอยู่ใกล้ๆ ชานเมืองโรงเรียนอะบิดอส)"
1001003-4 = "[s] \"ชิโรโกะน่าจะมาแล้วนะ...\""
1001003-6 = "คุณครู...? มาทำอะไรเหรอ?"
1001003-7 = "ได้ยินข่าวว่าฉันมาวิ่งที่นี่เลยเอาเครื่องดื่มชูกำลังมาให้งั้นเหรอ...?"
1001003-8 = "อืม... ขะ...ขอบคุณนะแต่คือว่า...."
1001003-9 = "[s] \"เอาล่ะ นี่เครื่องดื่ม\""
1001003-14 = "...... \n"
1001003-15 = "[s] \"...?\""
1001003-20 = "[s] \"ชิโรโกะ...?\""
1001003-21 = "อืม...."
1001003-22 = "เปล่า... คือว่าตอนนี้..."
1001003-23 = "คือฉันเพิ่งจะวิ่งเสร็จน่ะ แต่ก็ไม่เป็นไรหรอก....!"
1001003-24 = "ทะ...โทษทีคุณครู... ตอนนี้คงจะลำบากน่ะ"
1001003-25 = "เดี๋ยวเจอกันที่โรงเรียนนะ"
1001003-28 = "ห้องชมรมคณะกรรมการแผนงาน"
1001003-33 = "(ชิโรโกะปรากฏตัวด้วยสีหน้าที่สดใสกว่าทุกที)"
1001003-34 = "เชิญเลยคุณครู"
1001003-35 = "เครื่องดื่มชูกำลังที่จะให้ฉันเมื่อกี้นี้เหรอ? อื้อ ขอบคุณนะ"
1001003-41 = "หือ...?"
1001003-42 = "ฉันดูต่างจากเมื่อกี้เหรอ? เรื่องนั้นคือ..."
1001003-43 = "อืม..."
1001003-44 = "เรื่องนั้น...."
1001003-45 = "มะ...ไม่มีอะไรหรอก"
1001003-49 = "[s] \"...?!\""
1001003-50 = "(พอลองสังเกตดีๆ จะได้กลิ่นหอมจางๆ ของสบู่จากชิโรโกะ)"
1001003-51 = "(คุณครูรู้สึกว่าทำอะไรบางอย่างพลาดไป และคิดว่าครั้งหน้าจะต้องขอโทษชิโรโกะให้ได้)"

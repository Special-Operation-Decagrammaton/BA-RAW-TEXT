[translation]
1001003-1 = "一點點的距離"
1001003-2 = "阿拜多斯高中．近郊"
1001003-3 = "（在阿拜多斯近郊等待白子）"
1001003-4 = "[s] 「白子差不多要來了才對……」"
1001003-6 = "……咦，老師？在這裡做什麼呢？"
1001003-7 = "你聽說我在這裡慢跑，所以來拿能量飲料給我……？"
1001003-8 = "唔，嗯……雖，雖然很感激，可是那個……"
1001003-9 = "[s] 「來，你的飲料。」"
1001003-14 = "…… "
1001003-15 = "[s] 「……？」"
1001003-20 = "[s] 「……白子？」"
1001003-21 = "……唔嗯。"
1001003-22 = "……抱歉，那個……"
1001003-23 = "現在，剛結束慢跑所以……雖，雖然，我並沒有那麼在意……！"
1001003-24 = "抱，抱歉，老師……果然現在，還是先不用了。"
1001003-25 = "學校見。"
1001003-28 = "對策委員會．教室"
1001003-33 = "（白子帶著比剛才舒暢的表情出現了）"
1001003-34 = "嗨，老師。 "
1001003-35 = "剛剛的能量飲料？嗯，我就心懷感激地收下囉。"
1001003-41 = "……嗯？"
1001003-42 = "和剛才的態度不一樣？這個，那是……"
1001003-43 = "唔，嗯……"
1001003-44 = "那是……"
1001003-45 = "沒，沒什麼。"
1001003-49 = "[s] 「……！？」"
1001003-50 = "（話說回來白子身上隱約散發著肥皂的香味）"
1001003-51 = "（好像做錯了什麼，下次得道歉才行）"

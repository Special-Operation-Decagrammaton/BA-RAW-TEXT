[translation]
11110-2 = "Episode 11;To the Black Market! Part 1"
11110-3 = "Black Market"
11110-4 = "There's a huge crowd of people in the market."
11110-5 = "So this is the Black Market..."
11110-6 = "Whoa! There's a ton of people here! ☆"
11110-7 = "Yeah. I was expecting a smaller operation, but this is like a city unto itself."
11110-8 = "I didn't realize an unauthorized district would be so big and so busy."
11110-9 = "To be fair, we hardly ever leave Abydos. There are a lot of weird places outside our district."
11110-10 = "Have you ever been here before, Hoshino?"
11110-11 = "No, but I've heard stories about all kinds of places around the city."
11110-12 = "Apparently, there's a giant aquarium somewhere too!"
11110-13 = "We should all go there next time. Heh. Just think of all the sushi we can get..."
11110-14 = "Not that I know, but I don't think an aquarium is for THAT..."
11110-15 = "Eyes sharp, everyone. You're in the heart of the illegal weapons and arms trade, so be ready for anything."
11110-16 = "If anything does happen, I'll... Huh?!"
11110-17 = "*pop* *pop* *pop* *tat*"
11110-19 = "Gunfire."
11110-22 = "Stop right there!"
11110-23 = "W-Waaah! No, no, no! P-Please, stop chasing me!"
11110-24 = "And why would we do that?!"
11110-28 = "Hey. That uniform..."
11110-31 = "Watch out! Coming through!"
11110-34 = "*crash*"
11110-35 = "O-Ow... Sorry about that!"
11110-36 = "Are you okay?"
11110-37 = "Though I guess being chased answers that question."
11110-38 = "Well...that's..."
11110-41 = "Who the heck are you? Get outta the way! We got business with that Trinity student!"
11110-42 = "Uh... But I don't have any business with you. "
11110-43 = "...!"
11110-44 = "That's right! That uniform belongs to Trinity General School, one of the largest academies in all of Kivotos!"
11110-46 = "And one of the richest too! Kidnapping her is sure to command a hefty ransom!"
11110-47 = "Abductions and negotiations! Now that's what I call an investment plan!"
11110-48 = "Whaddaya think? You interested? We could make a fair split..."
11110-50 = "Huh?"
11110-53 = "*thwack*"
11110-54 = "Arrrggghhh!"
11110-55 = "Bad guys have to be punished! ☆"
11110-56 = "Hmm."
11110-57 = "Oh. Oh, dear."
11110-59 = "Th-Thank you so much. I would have been in so much trouble with my school if not for you."
11110-60 = "It's bad enough I snuck out here on my own. If something bad happened...#nIt's giving me a headache just thinking about it!"
11110-61 = "You said your name was Hifumi, right? So what's a Trinity student doing in a dangerous place like this?"
11110-62 = "A-Ahaha... It's kind of a long story. I came here looking for something..."
11110-63 = "It's no longer in production, but I heard that it shows up every now and then on the Black Market."
11110-64 = "Like a tank? "
11110-65 = "A contraband firearm?"
11110-66 = "A biochemical agent?"
11110-67 = "What?! No, of course not! It's...a limited edition piece of Peroro merchandise."
11110-68 = "Peroro?"
11110-69 = "Limited edition merchandise?"
11110-70 = "Yup! It's this guy right here. A limited edition plush from the Peroro and Ice Cream franchise collaboration!"
11110-71 = "Only 100 of them were ever made!"
11110-72 = "What do you think? Cute, right?"
11110-73 = "..."
11110-74 = "Wow! I love Momo Friends too! Peroro is so cute! ☆#nI'm a fan of Mr. Nicholai, personally."
11110-75 = "Right? The way Mr. Nicholai philosophizes is just so dashing!"
11110-76 = "In fact, I recently bought a compilation of Mr. Nicholai's work,#n\"Reaching Beyond Good & Evil\"! It was a first edition too!"
11110-77 = "I have no idea what they're talking about."
11110-78 = "You never did care for cutesy stuff, Hoshino."
11110-79 = "Huh. I guess I just don't get the young people these days."
11110-80 = "We're practically the same age..."
11110-81 = "I came here looking for that, but ended up getting targeted by those thugs.#nEither way, I would've been in deep trouble without you guys."
11110-82 = "Anyway, what brings Abydos students to a place like this?"
11110-83 = "The same thing as you. We're looking for something."
11110-84 = "Yeah. Something that's out of production now and hard to find.#nBut we heard we might be able to find it here."
11110-85 = "Wow, great minds think alike."
11110-86 = "Hang on, guys! Armed forces are closing in on you!"
11110-87 = "What?!"
11110-89 = "There they are!"
11110-90 = "You're gonna pay for messing with us!"
11110-93 = "They must be from the same gang as those thugs you scared off.#nAnd they look like they're raring for a fight!"
11110-94 = "Well, if it's a fight they want..."
11110-95 = "Why do we keep getting involved with these rough-and-tumble types everywhere we go? Is it us?"
11110-96 = "You'll have time to complain later... Now's the time to act!"

[translation]
11110-2 = "第11話;前往黑市（１）"
11110-3 = "黑市"
11110-4 = "（熱鬧喧騰）"
11110-5 = "1;茜香;00;這裡就是黑市……"
11110-6 = "哇啊☆這裡真熱鬧呢？"
11110-7 = "嗯，原本以為只是個小市集，想不到竟然有城市等級的規模。"
11110-8 = "治外法權居然會擴張得如此巨大。"
11110-9 = "唔嘿～因為咱們之前一直都待在阿拜多斯境內呀～#n學校外面可是有很多奇怪的地方唷～"
11110-10 = "星野前輩來過這裡嗎？"
11110-11 = "沒有，我也是第一次來這裡～#n不過聽說其他學校有很多新奇的事物呢～"
11110-12 = "像是非～常大的水族館之類的，好像叫海生館！"
11110-13 = "真希望下次能去看看～唔嘿，魚……生魚片……"
11110-14 = "雖然不是很清楚，但海生館應該不是那種地方吧……"
11110-15 = "請大家集中精神。#n那裡可是專門交易非法武器和兵器的地方，不知道會發生什麼事情。"
11110-16 = "如果發生什麼事的話，我……呀啊！？"
11110-17 = "（噠噠噠噠噠噠噠噠噠！）"
11110-19 = "是槍聲。"
11110-22 = "站住！"
11110-23 = "嗚，嗚哇啊啊！完了，完蛋了──！！，請，請不要追上來──！！"
11110-24 = "誰會照做啊！"
11110-28 = "哎呀……那件制服是…… "
11110-31 = "哇哇哇，請借過一下──！！"
11110-34 = "（哐噹──）"
11110-35 = "痛，痛痛痛……對，對不起！"
11110-36 = "沒事吧？"
11110-37 = "不，好像沒必要這麼問，畢竟你正在被人追趕。"
11110-38 = "那……那是因為……"
11110-41 = "你們是怎樣？給我讓開！我們有事要找那個三一的傢伙。"
11110-42 = "啊，啊嗚……但是我，我沒有事要找你們……"
11110-43 = "……！！ "
11110-44 = "我想起來了，那件制服……#n是奇普托斯規模最大的學校之一，三一綜合學園！"
11110-46 = "是啊，還是奇普托斯最有錢的學校！ #n所以綁架後就能拿到很多贖金了！"
11110-47 = "綁架後交涉！很厲害的理財技術吧？呵呵呵呵。"
11110-48 = "如何，你們也有興趣的話，要不要參一腳？#n贖金分配就……"
11110-50 = "嗯？"
11110-53 = "（碰碰！）"
11110-54 = "呃啊啊啊！"
11110-55 = "壞蛋就得接受懲罰才行☆"
11110-56 = "嗯。"
11110-57 = "啊……咦？咦？ "
11110-59 = "非，非常感謝。#n要是沒有各位的話，差點就要造成學校的麻煩了……"
11110-60 = "而且我也是偷偷跑來這裡，要是發生什麼問題……#n啊嗚嗚……光用想的就……"
11110-61 = "那個，是叫日步美醬嗎？#n三一的大小姐怎麼會來這種危險的地方呢？"
11110-62 = "啊，啊哈哈……那個…… #n其實我在找一個東西……"
11110-63 = "因為斷貨的關係，現在完全買不到。#n不過聽說黑市正在暗中進行交易……"
11110-64 = "該不會是……戰車？ "
11110-65 = "1;星野;04;還是非法武器？"
11110-66 = "化學武器之類的嗎？ "
11110-67 = "咦！？不，不是……那個，是佩洛洛大人的限定版周邊商品。"
11110-68 = "佩洛洛？"
11110-69 = "限定周邊商品？"
11110-70 = "是！就是這個。佩洛洛大人和冰淇淋店聯名推出的限定版娃娃！"
11110-71 = "這是只生產100個的限量商品唷。"
11110-72 = "怎麼樣，可愛吧？"
11110-73 = "……"
11110-74 = "哇～☆Momo好友！我也很喜歡！佩洛洛醬超可愛的對吧！ #n我喜歡的是Mr.尼柯萊。"
11110-75 = "我懂！尼柯萊充滿哲學感的地方也很帥。 "
11110-76 = "我還買了最近上市的尼柯萊的哲學書《善惡的彼端》！而且還是初版！"
11110-77 = "……哎呀～大叔我完全聽不懂你們在說什麼呢。"
11110-78 = "1;茜香;01;星野前輩對這種花俏的東西完全沒興趣吧。"
11110-79 = "5;星野;01;呼呣，最近的年輕人還真是難懂呢。"
11110-80 = "1;茜香;11; 明明年紀也沒差幾歲……"
11110-81 = "簡單來說，我只是來找周邊商品而已，結果莫名被不良分子纏上了……#n如果沒有各位的話，現在不知道已經落得什麼下場了。"
11110-82 = "……不過阿拜多斯的各位來這裡有什麼事嗎？"
11110-83 = "咱們也跟你一樣在找東西。"
11110-84 = "沒錯。因為停產所以很難入手，不過聽說這裡有賣。"
11110-85 = "原來如此，確實和我很像呢。"
11110-86 = "各位，不好了！有一群武裝份子正從四周接近我們！"
11110-87 = "5;茜香;06;什麼！？"
11110-89 = "是那些傢伙！"
11110-90 = "竟敢找我們麻煩！準備被教訓得跪地求饒吧！"
11110-93 = "看來和剛才打退的小流氓是同夥！已經完全是敵對模式！"
11110-94 = "求之不得。"
11110-95 = "真是的，怎麼走到哪裡都會被這些人纏上啊？#n我們到底做錯了什麼？"
11110-96 = "抱怨等等再說吧……各位，準備應戰！"

[translation]
11110-2 = "ตอนที่ 11;ไปยังตลาดมืด 1"
11110-3 = "ตลาดมืด"
11110-4 = "(เสียงเอะอะโวยวาย)"
11110-5 = "นี่สินะตลาดมืด..."
11110-6 = "ว้าวว☆ คนเยอะจังเลยนะคะ"
11110-7 = "นั่นสิ นึกว่าจะเป็นแค่ตลาดเล็กๆ ซะอีก ใหญ่โตจนเหมือนเป็นเมืองหนึ่งเมืองได้เลย"
11110-8 = "ไม่คิดเลยว่าจะมีพื้นที่นอกกฎหมายที่มีขนาดใหญ่แบบนี้อยู่..."
11110-9 = "แหะๆ~ เพราะเราแทบไม่ได้ออกจากเขตอะบิดอสเลยไงล่ะ นอกโรงเรียนก็มีสถานที่แปลกๆ แบบนี้ถมเถไป"
11110-10 = "รุ่นพี่โฮชิโนะเคยมาที่นี่เหรอ?"
11110-11 = "เปล่า ลุงก็เพิ่งเคยมาครั้งแรกน่ะ แต่เคยได้ยินเหมือนกันว่าแถวในเมือง หรือตามเขตโรงเรียนก็มี#nสถานที่แปลกๆ อยู่เหมือนกัน"
11110-12 = "เห็นว่ามีพิพิธภัณฑ์สัตว์น้ำขนาดใหญ่มากๆ ด้วยนะ แบบที่เรียกว่าอควาเรียมไง!"
11110-13 = "ถ้าคราวหน้ามีโอกาสได้ไปบ้างก็คงจะดีน้า~ ซาชิมิต้องอร่อยแน่เลย..."
11110-14 = "ถึงฉันจะไม่ค่อยรู้เรื่องอควาเรียมเท่าไร แต่คิดว่าคงไม่มีอะไรแบบนั้นให้กินหรอกมั้ง..."
11110-15 = "ทุกคน รบกวนตั้งใจกันหน่อยค่ะ ที่นั่นคือสถานที่ซื้อขายแลกเปลี่ยนอาวุธผิดกฎหมายนะคะ มันอาจจะเกิดเรื่องอะไรขึ้นได้ทุกเมื่อ"
11110-16 = "ถ้าเกิดเรื่องอะไรขึ้นละก็ ฉันจะ.... อ๊ะ?!"
11110-17 = "(ปังๆๆๆๆๆ!)"
11110-19 = "เสียงปืนนี่นา"
11110-22 = "หยุดอยู่ตรงนั้นนะ!!"
11110-23 = "อะ... อ๊ะ! เกิดเรื่องเข้าจนได้ ยะ... อย่าตามมาเลยนะคะ!"
11110-24 = "แล้วทำไมฉันต้องปล่อยเธอไปด้วยล่ะ?!!"
11110-28 = "เอ๋... ชุดนักเรียนนั่นมัน..."
11110-31 = "โอ๊ะ! ช่วยหลีกทางหน่อยค่ะ~"
11110-34 = "(ชน)"
11110-35 = "อ๊ะ... โอ้ย ขะ... ขอโทษค่ะ!"
11110-36 = "เป็นอะไรรึเปล่า?"
11110-37 = "ดูจากที่โดนไล่ตามมาแบบนี้ คงกำลังลำบากอยู่สินะ"
11110-38 = "คะ... คือว่า..."
11110-41 = "พวกเธอเป็นใครน่ะ? หลีกไปให้พ้น! พวกฉันมีเรื่องต้องคุยกับยัยเด็กจากทรีนิตี้นั่น"
11110-42 = "ตะ.. แต่... ฉันไม่มีอะไรจะคุยด้วยนี่คะ..."
11110-43 = "...!!"
11110-44 = "ใช่แล้ว ชุดนักเรียนนั่นมัน... ชุดนักเรียนของโรงเรียนสามัญทรีนิตี้ หนึ่งในโรงเรียนขนาดใหญ่ที่สุด#nในคิโวทอสค่ะ!"
11110-46 = "ใช่! แถมยังเป็นโรงเรียนที่รวยที่สุดในคิโวทอสอีกด้วย! เพราะงั้นถ้าลักพาตัวไป ก็คงเรียกค่าไถ่ได้#nเยอะมากแน่ๆ ด้วยไงเล่า!"
11110-47 = "ลักพาตัวเพื่อเรียกค่าไถ่ นับเป็นเทคนิคการลงทุนชั้นยอดเลยใช่มั้ยล่ะ! วะฮ่าฮ่า!"
11110-48 = "ว่าไงล่ะ? พวกเธอสนใจมาร่วมมือด้วยกันไหม? จะแบ่งเงินค่าไถ่ไปก็ได้นะ..."
11110-50 = "หืม?"
11110-53 = "(ป้าบบบ!)"
11110-54 = "อ๊ากกกก!"
11110-55 = "คนนิสัยไม่ดีก็ต้องโดนดุแบบนี้แหละค่ะ~☆"
11110-56 = "อืม..."
11110-57 = "อ่า... เอ๋? คะ?"
11110-59 = "ขะ... ขอบคุณทุกคนนะคะ ถ้าไม่ได้ทุกคนช่วยไว้ ฉันคงทำให้โรงเรียนลำบากแน่เลยค่ะ..."
11110-60 = "จริงๆ ฉันแอบมาที่นี่คนเดียวก็ถือว่าทำผิดกฎแล้ว ถ้ายังมีเรื่องอื่นตามมาอีกละก็... แค่คิดดูสภาพคง...."
11110-61 = "อ่า~ เธอชื่อฮิฟุมิจังเหรอ? เด็กสาวจากทรีนิตี้มาที่ที่อันตรายแบบนี้ทำไมกันน่ะ?"
11110-62 = "อ่า... อะฮ่าฮ่า... คือว่าฉันมีของที่อยากได้อยู่น่ะค่ะ..."
11110-63 = "ของชิ้นนี้ไม่มีวางขายในตลาดทั่วไปนานแล้ว เลยหาซื้อได้ยากมากๆ แต่ฉันบังเอิญได้ยินมาว่ายังพอมี#nการลักลอบซื้อขายแลกเปลี่ยนกันอยู่ในตลาดมืดค่ะ..."
11110-64 = "สิ่งนั้นคือ... รถถังเหรอ?"
11110-65 = "หรือว่าอาวุธผิดกฎหมาย?"
11110-66 = "กระสุนชีวเคมีเหรอคะ?"
11110-67 = "เอ๋? ไม่ใช่ของแบบนั้นหรอกค่ะ... ก็แค่สินค้าของท่านเพโรโร่ รุ่นลิมิเต็ดน่ะค่ะ..."
11110-68 = "เพโรโร่?"
11110-69 = "สินค้ารุ่นลิมิเต็ด?"
11110-70 = "ใช่ค่ะ นี่ไงคะ! ตุ๊กตาลิมิเต็ด ที่ท่านเพโรโร่ไปคอลแลบกับแฟรนไชส์ไอศกรีม!"
11110-71 = "มีผลิตออกมาแค่ 100 ตัวเท่านั้นนะคะ"
11110-72 = "เป็นไงคะ น่ารักใช่มั้ยคะ?"
11110-73 = "......"
11110-74 = "ว้าว~☆ MOMO FRIENDS! ฉันก็ชอบเหมือนกันค่ะ! เพโรโร่จังน่ารักมากเลย~ ส่วนฉันชอบมิสเตอร์นิโคไลค่ะ"
11110-75 = "ใช่มั้ยล่ะคะ? คุณลุงนิโคไลก็เท่ดีค่ะ ดูเป็นนักปรัชญามากเลย"
11110-76 = "ฉันซื้อหนังสือปรัชญา <อีกด้านหนึ่งของความดีและความชั่ว> ของคุณลุงนิโคไลมาด้วยละค่ะ!#nได้ฉบับวางจำหน่ายครั้งแรกมาด้วยนะคะ!"
11110-77 = "เฮ้อ~ คุยเรื่องอะไรกันเนี่ย ลุงคนนี้ไม่เห็นจะเข้าใจเลย"
11110-78 = "ก็รุ่นพี่โฮชิโนะไม่สนใจของอะไรที่น่ารักฟรุ้งฟริ้งแบบนี้นี่นา"
11110-79 = "ฮึ่ม วัยรุ่นสมัยนี้เข้าใจยากจังเลยน้า"
11110-80 = "เราก็ไม่ได้อายุห่างกันมากขนาดนั้นสักหน่อย..."
11110-81 = "ฉันมาหาซื้อสินค้าชิ้นนี้ แล้วก็บังเอิญไปเจอเข้ากับพวกนักเลงค่ะ ถ้าไม่ได้ทุกคนช่วยก็คงเกิดเรื่อง#nใหญ่ไปแล้วแน่ๆ"
11110-82 = "ว่าแต่... นักเรียนของทางอะบิดอสมาทำธุระอะไรที่นี่เหรอคะ?"
11110-83 = "พวกเราก็มาด้วยจุดประสงค์เดียวกันนั่นแหละ มีของที่อยากหาซื้อนิดหน่อยน่ะ"
11110-84 = "ใช่ ตอนนี้สิ่งนั้นถูกระงับการผลิตไปแล้วก็เลยหาซื้อยาก แต่ได้ยินมาว่ามีขายอยู่ที่นี่ก็เลยลองแวะมาดู"
11110-85 = "จุดประสงค์คล้ายกันเลยนะคะ"
11110-86 = "รอเดี๋ยวก่อนค่ะทุกคน! มีกลุ่มคนพกอาวุธกำลังเข้ามาใกล้ที่นี่ค่ะ!"
11110-87 = "อะไรนะ?!"
11110-89 = "เจ้าพวกนั้นแหละ!!"
11110-90 = "กล้ามาหยามพวกเราเรอะ? ต้องสั่งสอนสักหน่อยแล้ว!!"
11110-93 = "กลุ่มนักเลงที่เราจัดการไปเมื่อกี้แน่เลยค่ะ! ดูเตรียมอาวุธมาพร้อมเลยค่ะ!"
11110-94 = "ถ้าอยากสู้ก็ได้อยู่แล้ว..."
11110-95 = "ทำไมไปที่ไหนก็เจอพวกนักเลงอยู่เรื่อยเลยนะ! พวกเราทำอะไรผิดรึไง?"
11110-96 = "เอาไว้ค่อยว่ากันทีหลัง... ตอนนี้ทุกคนเตรียมรับมือกันก่อนเถอะค่ะ!"

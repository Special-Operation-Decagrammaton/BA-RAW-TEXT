[translation]
13400-1 = "ตอนที่ 40;ร่องรอยที่ความฝันทิ้งไว้"
13400-5 = "สายฟ้า..."
13400-6 = "ปรากฏไปทั่วทั้งโอเอซิสแห้งแล้งเลย..."
13400-10 = "ลุกขึ้นไหวมั้ย? ฮินะจัง?"
13400-14 = "อืม... ฉันเดินคนเดียวได้"
13400-23 = "นี่มัน..."
13400-24 = "ดอกไม้ไฟเหรอ...?"
13400-25 = "หรือว่ามันตอบสนองต่อสายฟ้านั่น...? แต่ก็ไม่ได้ดูอันตรายนะ..."
13400-34 = "นี่มัน..."
13400-35 = "ดูตรงโน้นสิ รูปร่างเหมือนปลาเลย?"
13400-36 = "สวยจัง... ท้องฟ้าทั้งผืนเหมือนท้องทะเลเลยค่ะ...!"
13400-39 = "..."
13400-40 = "ฉันเคยได้ยินข่าวลือ... เกี่ยวกับแร่ที่เกิดปฏิกิริยาตอบสนองต่ออุณหภูมิที่สูงมากจนเกิดปรากฏการณ์#nไอออน-พลาสม่า นี่สินะที่บอกว่าเปล่งแสงได้..."
13400-41 = "แต่นั่นเป็นแร่โลหะหายากที่ราคาแพงที่สุด ทำไมถึงมาอยู่ที่นี่ได้นะ...?"
13400-42 = "..."
13400-45 = "(ราคาแพงที่สุด...?)"
13400-46 = "พระอาทิตย์ขึ้นแล้ว..."
13400-49 = "รุ่นพี่พูดถูกแล้วค่ะ มีอยู่จริงๆ ด้วยนะคะ... สมบัตินั่น..."
13400-50 = "สิ่งที่รุ่นพี่ทิ้งไว้ที่นี่..."
13400-51 = "ฉันคิดว่าตัวเองจะไม่มีวันล่วงรู้ร่องรอยทุกอย่างได้เสียอีก..."
13400-52 = "แต่ก็ไม่ใช่เลยค่ะ..."
13400-55 = "ค่ะ... ไม่ใช่อย่างนั้นเลยค่ะ... รุ่นพี่"
13400-63 = "วะ... ว้าว! มันเริ่มปะทุเร็วขึ้นแล้ว!"
13400-64 = "อย่างนี้สินะ เหตุผลที่มีราคาสูงถึง 10 ล้านเยนต่อ 100 กรัมก็เพราะปรากฏการณ์ลูกโซ่นี้สินะ?"
13400-65 = "ว่าไงนะ?!"
13400-66 = "ว่าไงนะ?"
13400-67 = "น่าจะใช่นะ ก็ใน 2 ปีที่ผ่านมา ราคาของมันสูงขึ้นเกือบ 10 เท่าเลยนี่นา"
13400-68 = "มะ... ไม่นะ!! หยุดนะ! อย่าระเบิดหมดสิ! เงินกำลังปะทุอยู่นะ! แล้วก็ปะทุเร็วกว่าเดิมด้วย!! "
13400-69 = "ระ... เราต้องใช้พลั่ว! พลั่ว! อายาเนะจัง?!"
13400-70 = "จู่ๆ จะมาขอพลั่วจากฉันเหรอ...?"
13400-71 = "ทำไมไม่เอาพลั่วติดตัวไว้ล่ะ!!"
13400-74 = "ไม่สิ ถ้ามานึกถึงความแข็งของพื้นดิน ฉันว่าน่าจะต้องใช้จอบมากกว่า ถ้าไม่อย่างนั้นก็..."
13400-75 = "มีวิธีที่จะหยุดระเบิดนี้มั้ย?"
13400-76 = "ไม่ได้หรอก ปฏิกิริยาลูกโซ่ที่เริ่มไปแล้วจะสิ้นสุดหลังจากที่ทุกอย่างถูกเผาแล้วเท่านั้น"
13400-77 = "ว้าว! เกิดปฏิกิริยาลูกโซ่แล้วสินะคะ~♧"
13400-82 = "ชิโรโกะ อย่าเอาหน้ากากที่ฉันให้ไปมาทำเป็นถุงใส่ดินทรายสิ"
13400-83 = "อืม... แต่ว่า..."
13400-84 = "รุ่นพี่ชิโรโกะ ตอนเรียกรุ่นพี่ชิโรโกะคนโน้นน่ะ ใช้คำเรียกแบบอื่นไม่ได้เหรอ? แบบนี้มันสับสนนะ"
13400-85 = "ถ้างั้นฉันจะเรียกชิโรโกะคนโน้นว่าชิโรโกะตัวเล็กแล้วกัน"
13400-86 = "ไม่เอา เดี๋ยวฉันก็โตแล้ว อย่าเรียกกันแบบนั้นสิ"
13400-87 = "ถ้างั้นก็ชิโรโกะที่อ่อนแอกว่า?"
13400-91 = "เดี๋ยวสิ อย่ายิงกันนะรุ่นพี่ชิโรโกะ!!"
13400-92 = "ไม่มีประโยชน์หรอก ฉันมีประสบการณ์ในสิ่งที่เธอไม่เคยเจอมาก่อน แล้วก็รู้ในสิ่งที่เธอไม่รู้ ความแตกต่างนี้เป็นสิ่งที่..."
13400-93 = "ใช่ ตอนนั้นก็สู้มาแล้วครั้งหนึ่ง ฉันไม่แพ้หรอก"
13400-96 = "ช่วยหยุดสักทีเถอะค่ะ!!"
13400-97 = "ว้าว~♧ ดูโน่นสิคะ! สงสัยจะเป็นฉากฟีนาเล่แล้วนะคะ! ระเบิดให้เห็นเต็มตาเลย...! ว้าว~!"
13400-106 = "อืม~ นั่นสินะ..."
13400-107 = "เวลาลุงคนนี้พยายามจะทำตัวเท่ๆ ก็จะเป็นเสียอย่างนี้ทุกครั้งเลย"
13400-110 = "ก็คงช่วยไม่ได้น่ะนะ..."
13400-111 = "แหะๆ~"
13400-113 = "ตอนต่อไป;สิ่งที่เหลืออยู่หลังจากนั้น"

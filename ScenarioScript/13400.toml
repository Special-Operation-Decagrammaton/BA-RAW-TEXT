[translation]
13400-1 = "第40話;夢留下的痕跡"
13400-5 = "閃電……"
13400-6 = "在整片乾涸的綠洲之中……"
13400-10 = "還站得起來嗎，陽奈醬？"
13400-14 = "啊啊……我自己可以走。"
13400-23 = "這是……"
13400-24 = "煙火……？"
13400-25 = "……是那道閃電產生的反應嗎？#n看起來好像沒什麼危險……"
13400-34 = "這個是……"
13400-35 = "你們看那個，那不是魚的形狀嗎？"
13400-36 = "真美……整片天空都像海洋一樣……！"
13400-39 = "……"
13400-40 = "……我聽人家說過。#n有種礦石在超高溫的狀態下會引發離子與電漿現象，甚至還能夠放出光芒……"
13400-41 = "不過那種礦石明明是極為昂貴的稀有金屬，為什麼會出現在這裡……？"
13400-42 = "……"
13400-45 = "（極為昂貴……？）"
13400-46 = "……太陽升起了。"
13400-49 = "前輩說的沒錯。#n這裡，真的有寶藏……"
13400-50 = "前輩留在這裡的東西……"
13400-51 = "我還以為自己找不到他留下來的任何痕跡……"
13400-52 = "是我錯了……"
13400-55 = "嗯……是我錯了……前輩。"
13400-63 = "哇，哇啊！爆炸的速度越來越快了！"
13400-64 = "原來如此。#n那東西之所以100g就價值1000萬元，就是因為這個連鎖反應嗎？"
13400-65 = "咦！？"
13400-66 = "什麼？"
13400-67 = "我想應該不會有錯。#n畢竟光是最近這兩年，那東西的價格就漲了接近十倍。"
13400-68 = "不，不行！！給我停下來！#n等等啊！我們的錢在燃燒耶！越燒越快了啦！！"
13400-69 = "鏟子，我們需要鏟子！鏟子！綾音醬！？"
13400-70 = "這種時候突然跟我要鏟子，我該去哪裡找呢……？"
13400-71 = "鏟子這種東西不是應該隨身攜帶嗎！！"
13400-74 = "不，考慮到土壤的硬度，或許十字鎬會更適合。#n或者是……"
13400-75 = "有什麼方法可以阻止礦石繼續爆炸嗎？"
13400-76 = "……沒有。#n這種連鎖反應一旦開始，就一定得等到所有礦物都燒成灰才會結束。"
13400-77 = "哇──！連鎖反應開始了～♧"
13400-82 = "白子，不要把我給你的面具拿來當沙包。"
13400-83 = "嗯……可是……"
13400-84 = "白子前輩，你叫另一個白子前輩的時候可不可以換個稱呼啊？#n不然會弄得我們很亂耶。"
13400-85 = "那我就叫你小白子吧。"
13400-86 = "不行，我很快就會長大，那樣根本沒有意義。"
13400-87 = "不然叫你弱白子吧？"
13400-91 = "喂，白子前輩，不要突然發飆啦！！"
13400-92 = "沒用的。我經歷過你不知道的事，知道你不知道的事，這之間的差距……"
13400-93 = "嗯，之前已經交手過一次。我不會輸的。"
13400-96 = "拜託你們別這樣！！"
13400-97 = "哇～♧你們看那個！這應該就是最後的最後了吧！竟然一次……！哇啊～！"
13400-106 = "……唔嗯～真是的。"
13400-107 = "每次大叔我想要耍帥的時候，總是會變成這個樣子呢。"
13400-110 = "……算了，看來我也只能認命了。"
13400-111 = "唔嘿～"
13400-113 = "下一話;其後留下的事物"

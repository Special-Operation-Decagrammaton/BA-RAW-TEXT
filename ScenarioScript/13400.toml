[translation]
13400-1 = "Episode 40;Traces of a Dream"
13400-5 = "The lightning..."
13400-6 = "All over the dried-up oasis... "
13400-10 = "Can you get up, Hina?"
13400-14 = "Yes. I can walk on my own."
13400-23 = "These are..."
13400-24 = "...fireworks?"
13400-25 = "Is it a reaction from the lightning? It doesn't appear dangerous..."
13400-34 = "This is..."
13400-35 = "Look at that one! It kinda looks like a fish."
13400-36 = "How pretty...like the sky's turned into an ocean."
13400-39 = "..."
13400-40 = "I've heard rumors about a mineral capable of producing an ion-plasma phenomenon during extremely high-temperature reactions. It's said to even have the potential to shape light..."
13400-41 = "Why would it be here, though? It's an incredibly rare metal, not to mention very expensive."
13400-42 = "..."
13400-45 = "(Expensive...?)"
13400-46 = "...The sun rises."
13400-49 = "You were right, Yume. There was treasure here all along."
13400-50 = "I thought I would never be able to find the traces..."
13400-51 = "...of what you left behind..."
13400-52 = "I was wrong..."
13400-55 = "Yeah. I was really wrong, Yume."
13400-63 = "Wh-Whoa! They're going off so fast now!"
13400-64 = "I see. That chain reaction must be why it costs nearly ten million yen for just 100 grams."
13400-65 = "What?!"
13400-66 = "What?"
13400-67 = "That should be around the market price. It's jumped about tenfold in the past two years."
13400-68 = "G-Gah! No! Make it stop! Our money is burning! It's all burning up like wildfire! "
13400-69 = "Sh-Shovel! We need a shovel! Ayane, a shovel!"
13400-70 = "Unfortunately, I don't just casually carry around a shovel with me..."
13400-71 = "Well, you should really consider it from now on!"
13400-74 = "No, please consider carrying around a pickaxe. It'll break the ground more easily."
13400-75 = "Are there any methods we can use to halt the explosions?"
13400-76 = "...None. The reaction will continue until there's nothing left to burn."
13400-77 = "Wow! Look at it go! ♧"
13400-82 = "Hey. Shiroko. Please don't use the mask I gave you as a bag."
13400-83 = "Um...but the minerals..."
13400-84 = "Hey, Shiroko. Can you call the other Shiroko something else? It's starting to get super confusing."
13400-85 = "Then...I'll call her \"Small Shiroko.\""
13400-86 = "Rejected. I'm going to grow taller very soon."
13400-87 = "Ah. I know. \"Weak Shiroko.\""
13400-91 = "Gah, Shiroko! Put your gun down! No shooting!"
13400-92 = "It's no use. I've experienced things you've yet to experience, I know things you've yet to learn. You cannot fill the gap between—"
13400-93 = "Yeah. I've fought you once, so I won't lose this time."
13400-96 = "Quit it already!!"
13400-97 = "Wow! Look at that going off all at once! It's the grand finale! What an incredible sight! ♧"
13400-106 = "...Yeah, it sure is."
13400-107 = "Whenever this old-timer tries to say something cool, it always turns out like this, huh?"
13400-110 = "...Well, I guess it can't be helped."
13400-111 = "Heh, heh."
13400-113 = "Next Episode;What Remains Afterwards"

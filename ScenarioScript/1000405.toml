[translation]
1000405-1 = "ความชื่นชอบของคนอื่นๆ"
1000405-2 = "ห้างสรรพสินค้าขนาดย่อม ชานเมืองเกเฮนน่า"
1000405-6 = "........\n"
1000405-7 = "อ่า สวัสดี... คุณครู"
1000405-8 = "[s1] \"เจอฮินะจังตอนกลางวันด้วยละ!\"\n[s2] \"ได้เจอฮินะจังท่ามกลางฟ้าสดใสด้วย!\""
1000405-9 = "มันก็ไม่ใช่เรื่องใหญ่อะไรสักหน่อยนี่?"
1000405-10 = "มันก็ไม่ใช่เรื่องใหญ่อะไรสักหน่อยนี่?"
1000405-11 = "อย่าทำเหมือนเห็นผีตอนกลางวันแสกๆ จะได้มั้ย"
1000405-12 = "คราวก่อนบอกไว้แล้วนี่ว่าจะมาเจอกัน... ตอนกลางวันน่ะ..."
1000405-13 = "[s] \"วันนี้เธอไม่ยุ่งเหรอ?\""
1000405-14 = "อ่า ไม่หรอก ฉันไม่ได้ยุ่งตลอดเวลาหรอกนะ"
1000405-15 = "ฉันจัดตารางงานใหม่เลยพอมีเวลาว่างประมาณสามชั่วโมงน่ะ..."
1000405-16 = "[s3] \"สามชั่วโมง?\" \n[s4] \"แค่สามชั่วโมงเองเหรอ?\""
1000405-17 = "หืม...?"
1000405-18 = "หืม...?"
1000405-19 = "มะ... ไม่พอเหรอ...?"
1000405-20 = "ฉันคิดว่าแค่นี้ก็น่าจะพอแล้วสำหรับ... สำหรับการ... ช้อปปิ้ง..."
1000405-21 = "[s] \"ไม่เป็นไร เรื่องนั้นเดี๋ยวค่อยคิดก็ได้ ไปกันเถอะ!\""
1000405-22 = "อ่า... อะ...อื้อ"
1000405-24 = "(คุณครูเข้าไปในห้างสรรพสินค้ากับฮินะ)"
1000405-27 = "(ไม่ค่อยมีคนเลย...)"
1000405-28 = "(คุณครูคงเลือกที่นี่เพราะคนน้อยสินะ...)"
1000405-29 = "(ให้ตาย...)"
1000405-30 = "แล้วเรื่องสำคัญที่จะบอก มันคืออะไรล่ะนั่นน่ะ?"
1000405-31 = "[s5] \"ไม่มีอะไรหรอก\"\n[s6] \"แค่อยากมาเดตกันน่ะ\""
1000405-32 = "......."
1000405-33 = "......."
1000405-34 = "คิดแล้วเชียว"
1000405-36 = "ร้านเครื่องประดับตัวการ์ตูน"
1000405-37 = "ร้านเครื่องประดับนี่นา..."
1000405-38 = "มีแต่รูปสัตว์พิลึกๆ เต็มไปหมดเลย..."
1000405-39 = "หืม? ฉันชอบอันไหนน่ะเหรอ?"
1000405-40 = "หึ ไม่ล่ะ ฉันไม่ชอบของพวกนี้หรอก"
1000405-41 = "มีเด็กนักเรียนหลายๆ คนชอบของน่ารักๆ พวกนี้อยู่ก็จริง แต่ฉันไม่ชอบหรอก แถมไม่รู้ด้วยว่า#nตัวการ์ตูนพวกนี้ชื่ออะไร"
1000405-42 = "เราไปร้านอื่นกันดีมั้ย?"
1000405-44 = "ร้านเกม"
1000405-45 = "ร้านเกมตู้นี่นา..."
1000405-46 = "ฉันเคยเล่นรึเปล่าน่ะเหรอ? ไม่ล่ะ ฉันไม่สนใจที่แบบนี้หรอก"
1000405-47 = "มีแต่คนส่งเสียงดังหนวกหู แล้วก็แสงสีแสบตาไปหมด แถมคนก็เยอะด้วย"
1000405-48 = "ฉันรู้ว่าคนอื่นๆ ชอบมาที่นี่เพื่อมาเล่นสนุกกัน แต่ฉันไม่ชอบเลยสักนิดเดียว"
1000405-49 = "เพราะงั้นไปที่อื่นกันเถอะ"
1000405-51 = "ร้านขายเสื้อผ้า"
1000405-52 = "ร้านขายเสื้อผ้าแนวสตรีทแฟชั่นสินะ...."
1000405-53 = "มีนักเรียนไม่กี่คนหรอกที่ชอบใส่เสื้อผ้าสีสันฉูดฉาดตอนออกมาเที่ยวในวันหยุดน่ะ..."
1000405-54 = "...มีเสื้อผ้าที่ฉันชอบรึเปล่าน่ะเหรอ?"
1000405-55 = "ไม่ล่ะ ไม่มีเลย"
1000405-56 = "ทำไมต้องซื้อเสื้อผ้าที่ไม่จำเป็นด้วยล่ะ?"
1000405-57 = "ฉันมีชุดนักเรียนอยู่แล้ว ไม่เห็นต้องซื้อชุดอื่นเลย"
1000405-58 = "[s7] \"ซื้อไปลองใส่สักตัวมั้ย?\"\n[s8] \"ฮินะชอบเสื้อตัวไหนที่สุดเหรอ?\""
1000405-59 = "...?"
1000405-60 = "...?"
1000405-61 = "อืม..."
1000405-62 = "อืม..."
1000405-64 = "อืม..."
1000405-66 = "มะ... ไม่รู้เลย"
1000405-67 = "ขะ... ขอโทษนะ"
1000405-69 = "ในร้านอาหารสำหรับครอบครัว"
1000405-70 = "(ทั้งสองคนแวะพักที่ร้านอาหารสำหรับครอบครัวใกล้ๆ)"
1000405-71 = "......"
1000405-72 = "..."
1000405-73 = "..."
1000405-74 = "[s] \"มีอะไรเหรอฮินะจัง?\""
1000405-75 = "หืม...?"
1000405-76 = "ปะ...เปล่าหรอก... แค่วันนี้...มันไม่เหมือนกับที่ฉันคิดไว้เท่านั้นเอง..."
1000405-77 = "ฉันรู้สึกเหมือนกับว่า... วันนี้ฉันทำพังซะแล้ว..."
1000405-78 = "ฉัน... เป็นคนที่อยู่ด้วยแล้วไม่สนุกสินะ#nเฮ้อ ฉันเองรู้เรื่องนี้ดีอยู่แล้วล่ะ"
1000405-79 = "[s9] \"แต่ครูชอบฮินะที่เป็นแบบนี้นะ\"\n[s10] \"แบบนี้สมกับเป็นฮินะแล้วล่ะ\""
1000405-82 = "......"
1000405-83 = "(ยอมให้ฉันแบบนี้อีกแล้ว...)"
1000405-84 = "(จริงๆ เลยเชียว...)"
1000405-85 = "รับอะไรดีครับ?"
1000405-86 = "อ่อ... อื้อ ฉันขอกาแฟดำ ไม่ใส่ไซรัปกับนม"
1000405-87 = "แล้วคุณครู... หืม?"
1000405-88 = "มีอะไรเหรอ?"
1000405-89 = "[s11] \"กำลังคิดว่าฮินะนี่เหมือนผู้ใหญ่จริงๆ เลยนะ\"\n[s12] \"ชอบอะไรเหมือนผู้ใหญ่เลยนะ\""
1000405-90 = "เอ๋...? ผะ...ผู้ใหญ่เหรอ?"
1000405-91 = "เอ๋...? ผะ...ผู้ใหญ่เหรอ?"
1000405-92 = "......"
1000405-93 = "อะฮ่ะฮ่ะฮะ... พูดอะไรน่ะ? คุณครูต่างหากที่เป็นผู้ใหญ่\n"
1000405-94 = "ฉันก็แค่เด็กคนหนึ่งที่ตัวเล็ก ขี้หงุดหงิดและไม่น่ารักเลย"
1000405-96 = "(แต่ว่าฉันก็เป็นเด็กคนหนึ่ง...)"
1000405-97 = "(ที่ชื่นชมความเป็นผู้ใหญ่ของคุณครู...)"
1000405-100 = "วันนี้คุณครูต้องหมดสนุกเพราะฉัน เพราะงั้นไม่ต้องพยายามใจดีกับฉันก็ได้..."
1000405-101 = "[s13] \"เปล่าสักหน่อย วันนี้ครูได้เห็นฮินะยิ้มด้วยนี่นา\"\n[s14] \"วันนี้ครูสนุกมากเลยต่างหาก\""
1000405-102 = "......"
1000405-103 = "......"
1000405-104 = "อะ...อื้อ"
1000405-108 = "(รีบสั่งอาหารหน่อยได้มั้ยครับ...)"

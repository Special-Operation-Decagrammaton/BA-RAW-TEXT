[translation]
1000405-1 = "大人小孩什麼的"
1000405-2 = "格黑娜郊外．小型購物中心"
1000405-6 = "……那個。"
1000405-7 = "你，你好……？"
1000405-8 = "[s1] 「在白天見面真新鮮！」\n[s2] 「蔚藍天空下的陽奈醬！」"
1000405-9 = "那樣，太誇張了……"
1000405-10 = "那樣，太誇張了……"
1000405-11 = "把人說得像是只在半夜出沒的妖怪一樣……"
1000405-12 = "因為約好了在中午見面，所以才沒辦法。"
1000405-13 = "[s] 「風紀委員會的工作沒關係嗎？」"
1000405-14 = "……沒關係，我也不是24小時365天都在工作。"
1000405-15 = "只要調整行程的話，還是能擠出3個小時左右。"
1000405-16 = "[s3] 「……3個小時？」\n[s4] 「不會太少嗎？」"
1000405-17 = "……？ "
1000405-18 = "……？ "
1000405-19 = "咦，太少……是嗎……？"
1000405-20 = "我，我以為這樣就足夠了……只是購物，而已。"
1000405-21 = "[s] 「沒事的，謝啦。那就走吧！」"
1000405-22 = "啊，嗯……"
1000405-24 = "（和陽奈一起進入購物中心）"
1000405-27 = "（沒什麼人呢……）"
1000405-28 = "（老師大概是為了我，才來這種地方……）"
1000405-29 = "（這個人，真的是……）"
1000405-30 = "……那麼，重要的事是什麼？"
1000405-31 = "[s5] 「沒什麼特別的唷？」\n[s6] 「約會不是重要的事嗎？」"
1000405-32 = "……唉。"
1000405-33 = "……唉。"
1000405-34 = "是那麼回事啊……雖然有感覺是那麼回事了。"
1000405-36 = "動物角色主題的飾品店"
1000405-37 = "飾品……"
1000405-38 = "有許多奇怪的動物設計…… "
1000405-39 = "……？不，沒什麼特別喜歡的……"
1000405-40 = "再說，我本來就不怎麼喜歡這種東西。"
1000405-41 = "雖然知道有學生說很可愛，但我不太能理解。也不知道這些小東西的名字……"
1000405-42 = "那個，那去其他地方吧……"
1000405-44 = "遊戲中心"
1000405-45 = "遊戲中心……"
1000405-46 = "不，沒怎麼來過。也沒有興趣。"
1000405-47 = "聲音吵雜，眩光刺眼，人很多……"
1000405-48 = "我能理解有人喜歡這種地方。只不過我不喜歡。"
1000405-49 = "……可以嗎？那麼，去其他地方……"
1000405-51 = "服飾店"
1000405-52 = "這個，好像叫做街頭時尚吧……"
1000405-53 = "我知道很多學生在週末外出的時候會穿這種華麗的衣服……"
1000405-54 = "……有沒有什麼在意的東西？"
1000405-55 = "……沒有。"
1000405-56 = "不必特別買不需要的東西。"
1000405-57 = "已經有制服了，不需要那麼多便服。"
1000405-58 = "[s7] 「不一定要買，只是想聽聽妳喜歡什麼樣的。」\n[s8] 「這裡面的話喜歡什麼樣的？」"
1000405-59 = "……？"
1000405-60 = "……？"
1000405-61 = "那個……"
1000405-62 = "嗯……"
1000405-64 = "唔嗯……"
1000405-66 = "……抱歉。 "
1000405-67 = "沒有一個特別喜歡……"
1000405-69 = "購物中心．家庭餐廳"
1000405-70 = "（休息的同時，順便走進了附近的家庭餐廳）"
1000405-71 = "……"
1000405-72 = "………"
1000405-73 = "…………"
1000405-74 = "[s] 「怎麼了嗎？」"
1000405-75 = "咦……？"
1000405-76 = "不，不是……那個，老師期待的，應該不是這樣的吧……"
1000405-77 = "總覺得……我，好像搞砸了……"
1000405-78 = "抱歉，我也有自覺……自己是個無趣的人。"
1000405-79 = "[s9] 「那不也是種個性嗎？」\n[s10] 「而且那樣很像陽奈，我覺得很好。」"
1000405-82 = "……"
1000405-83 = "（這個人，真的是……）"
1000405-84 = "（又說這麼溫柔的話……）"
1000405-85 = "請問要點什麼？"
1000405-86 = "啊……我要咖啡，不加糖跟牛奶的黑咖啡。"
1000405-87 = "老師要……嗯？"
1000405-88 = "怎麼了，老師？"
1000405-89 = "[s11] 「陽奈像個大人一樣呢。」\n[s12] 「我在想陽奈還是一如往常的味覺跟大人一樣呢。」"
1000405-90 = "……大人？ "
1000405-91 = "……大人？ "
1000405-92 = "……"
1000405-93 = "呵呵，還以為你要說什麼呢。大人是老師才對吧。"
1000405-94 = "我還只是個……個子小、淨發牢騷，也不可愛的孩子。"
1000405-96 = "（你那樣的關心，才像是大人該有的……）"
1000405-97 = "（而這樣想的我，還只是個孩子……）"
1000405-100 = "畢竟今天因為我變得無趣了……不用那麼勉強也……"
1000405-101 = "[s13] 「沒有勉強唷，畢竟也看見了陽奈的笑容。」\n[s14] 「今天過得很開心。」"
1000405-102 = "……"
1000405-103 = "……"
1000405-104 = "……是，是嗎。那就好……"
1000405-108 = "（別卿卿我我了，快點另一份餐點……）"

[translation]
101135-7 = "Retreat, retreat!"
101135-8 = "Retreat to the inside of the building and regroup!"
101135-17 = "Secured the convenience store on the first floor!"
101135-18 = "You've come to help, Bento Disposal Specialists!"
101135-19 = "...Sora?"
101135-20 = "This building has had so many violent incidents that I'm...an expert at hiding in the storage now. I've gotten used to it, I guess..."
101135-21 = "...We're sorry for the trouble."
101135-22 = "No, thanks for saving me! Oh! Do you want some expired bentos? We have a lot."
101135-23 = "...Thank you. I'd love some after we finish this mission."
101135-25 = "All set! The entrance is clear!"
101135-26 = "Thank you for your help, Public Peace Bureau."
101135-27 = "Aren't you all supposed to be upright and law-abiding? Helping us doesn't exactly fit the bill for goody two-shoes like you guys."
101135-28 = "Criminals are just gonna make fun of a bunch of police who broke the law."
101135-29 = "Haha... It's kinda weird to hear that from the RABBIT Squad..."
101135-30 = "It's okay since we're helping Director Kanna."
101135-31 = "Valkyrie students get ridiculed by criminals all the time anyway..."
101135-32 = "We'll secure the entrance so reinforcements can't get in behind you, so you all go recapture the building!"
101135-33 = "We're counting on you."
101135-35 = "Starting now, we'll be entering the Schale building and carrying out two missions simultaneously."
101135-36 = "First, reclaim the Crafting Chamber from PMC in the Schale basement."
101135-37 = "Second, rescue the chief officer locked somewhere in the Schale building."
101135-38 = "But...we don't know where the chief officer is."
101135-39 = "We're compromising the hostage's safety if we barge in without knowing their location."
101135-40 = "We can help there."
101135-41 = "Ah! Wh-Who are you...?"
101135-42 = "W-We're the General Student Council."
101135-43 = "[s] \"Momoka! Ayumu! You're safe!\""
101135-45 = "Yeah. We're at the Sanctum Tower underground communication center. You have no idea how hard it was to hide without PMC noticing us."
101135-46 = "Who would have thought the hole I use for skipping class would be this useful? Hahaha!"
101135-47 = "M-Momoka...!"
101135-48 = "Hey, thanks to that, we restored the communication log and determined Rin's location."
101135-49 = "It's the third empty room above the Schale Residence Hall."
101135-50 = "Sensei... Please save Rin..."
101135-52 = "[ns] \"I'll deliver her to you safe and sound.\""
101135-53 = "...Yes!"
101135-55 = "Next Episode; Operation Recapture Schale 2"

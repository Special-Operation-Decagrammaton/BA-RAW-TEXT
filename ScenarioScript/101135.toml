[translation]
101135-7 = "ถอนกำลัง ถอนกำลัง!"
101135-8 = "ถอยกลับเข้าไปในอาคารแล้วตั้งตัวใหม่!"
101135-17 = "ได้พื้นที่ร้านสะดวกซื้อชั้น 1 มาแล้วค่ะ!"
101135-18 = "<บริษัทเคลียร์ข้าวกล่องที่ขายไม่ได้แล้ว>! พวกคุณมาช่วยฉันสินะคะ! "
101135-19 = "คะ...?"
101135-20 = "อาคารนี้มีเหตุการณ์รุนแรงเกิดขึ้นบ่อยมาก... ฉันก็เลยเริ่มหันไปซ่อนตัวในห้องเก็บสินค้า ตอนนี้ซ่อน#nบ่อยจนชินแล้วค่ะ..."
101135-21 = "เหนื่อยน่าดูเลยนะคะ..."
101135-22 = "จริงสิ! เอาข้าวกล่องไปไหมคะ? รอบนี้มีเหลือเพียบเลยค่ะ"
101135-23 = "ขอบคุณค่ะ... เดี๋ยวไว้จะมาเอานะคะ"
101135-25 = "ดีละ! เคลียร์ทางเข้าได้แล้ว!"
101135-26 = "ขอบคุณที่ช่วยนะคะ กรมความมั่นคงสาธารณะ"
101135-27 = "ว่าแต่ แหกกฎมาช่วยพวกเราแบบนี้ จะไม่เป็นอะไรเหรอ?"
101135-28 = "ต่อไปอาจโดนพวกอาชญากรเยาะเย้ยว่าเป็นตำรวจที่ไม่รักษากฎก็ได้นะ...?"
101135-29 = "แหะๆ... ได้ฟังคำแบบนี้จากกองทหาร RABBIT แล้วก็รู้สึกแปลกๆ ชอบกลนะ..."
101135-30 = "ไม่เป็นไรหรอกค่ะ ก็นี่เป็นงานที่ทำเพื่อช่วยหัวหน้ากรมฯ คันนะนี่คะ"
101135-31 = "ยังไงก็เป็นเรื่องธรรมดาอยู่แล้วค่ะที่นักเรียนวัลคิรี่จะโดนพวกอาชญากรเยาะเย้ย..."
101135-32 = "พวกฉันจะขวางไม่ให้กองกำลังใดเข้ามา ระหว่างนี้ช่วยไปยึดอาคารคืนด้วยนะคะ!"
101135-33 = "ขอบคุณนะคะทุกคน"
101135-35 = "พวกฉันจะเข้าไปในอาคารชาเล่ต์ตั้งแต่นี้ไป เราจะต้องทำสองภารกิจต่อไปนี้ไปพร้อมๆ กันค่ะ"
101135-36 = "ภารกิจแรก ยึด <คราฟต์แชมเบอร์> ที่อยู่ชั้นใต้ดินของอาคารชาเล่ต์คืนมาจาก PMC"
101135-37 = "ภารกิจที่สอง ช่วยหัวหน้าฝ่ายบริหารที่ถูกขังอยู่ในอาคารชาเล่ต์"
101135-38 = "แต่ว่า... เราไม่รู้นะว่าหัวหน้าฝ่ายบริหารถูกขังไว้ที่ไหน"
101135-39 = "ถ้าเราเริ่มปฏิบัติการโดยไม่รู้ตำแหน่งของตัวประกัน เราก็ไม่สามารถรับรองความปลอดภัยได้นะ"
101135-40 = "เรื่องนั้นให้เป็นหน้าที่ของพวกฉันเอง"
101135-41 = "อ๊ะ... ใครน่ะ...?"
101135-42 = "พะ... พวกฉันคือองค์การนักเรียนค่ะ"
101135-43 = "[s] \"โมโมกะ! อายูมุ! ปลอดภัยดีสินะ!\""
101135-45 = "อื้ม! ที่นี่เป็นศูนย์การสื่อสารใต้ดินของแซงค์ทัมทาวเวอร์น่ะ กว่าจะหลบสายตาของ PMC แล้วแอบเข้า#nมาในนี้ได้ พวกฉันเหนื่อยกันแทบตายเลย"
101135-46 = "ไม่รู้เลยนะว่าช่องหมาลอดที่ใช้ตอนโดดเรียนจะมีประโยชน์แบบนี้ด้วย ฮ่ะฮ่ะฮ่า!"
101135-47 = "โมโมกะจัง..."
101135-48 = "เอาเป็นว่าพวกฉันกู้คืนบันทึกการสื่อสารมาได้ จนติดตามตำแหน่งของรุ่นพี่รินได้น่ะ"
101135-49 = "ห้องว่างห้องที่สามที่ไม่ได้ถูกใช้งาน อยู่ด้านบนที่พักชาเล่ต์"
101135-50 = "คุณครู... ได้โปรดช่วยรุ่นพี่รินด้วย..."
101135-52 = "[ns] \"อื้ม วางใจได้เลย\""
101135-53 = "ค่ะ...!"
101135-55 = "ตอนต่อไป;ปฏิบัติการยึดคืนชาเล่ต์ 2"

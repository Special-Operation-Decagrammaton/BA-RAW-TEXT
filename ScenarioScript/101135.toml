[translation]
101135-7 = "撤退，快撤退！"
101135-8 = "撤退到建築內部重新整備！"
101135-17 = "1樓的便利商店，已成功奪回！"
101135-18 = "啊，是以前幫忙處理「廢棄品」的各位對吧？#n你們來幫忙了啊！"
101135-19 = "……呃。"
101135-20 = "因為這裡總是會發生各種事件……#n感覺越來越擅長躲藏了。好像，已經習慣了……"
101135-21 = "……那還真是辛苦你了。"
101135-22 = "啊，對了！有需要廢棄便當嗎？#n這次也剩下非常多。"
101135-23 = "……謝謝，之後請務必交給我們。"
101135-25 = "好！入口也搞定了！"
101135-26 = "感謝你們願意幫忙，公安局的各位。"
101135-27 = "不過，這樣違反規則幫助我們，真的沒關係嗎？"
101135-28 = "不會被犯罪者嘲笑是「連規則都不會遵守的警察」之類的嗎？"
101135-29 = "啊哈哈……雖然不想被「RABBIT小隊」這麼說……"
101135-30 = "沒問題的。只要能幫上環奈局長就好。"
101135-31 = "而且，女武神的學生們被犯罪者嘲笑也已經是家常便飯了……"
101135-32 = "我們會負責阻止後續的部隊，大樓的奪還就交給各位了！"
101135-33 = "各位，謝謝你們。"
101135-35 = "那麼，我們這就突入夏萊大樓。#n接下來必須同時執行兩項任務。"
101135-36 = "第一，從PMC手中奪回夏萊大樓地下的「工藝室」。"
101135-37 = "第二，救出被囚禁在夏萊大樓某處的琳行政官。"
101135-38 = "不過……我們完全不知道行政官被關在哪裡唷？"
101135-39 = "在還沒掌握人質的位置前就開始作戰有點……#n我認為很難保證安全。"
101135-40 = "這件事交給我們吧。"
101135-41 = "是……是誰……？"
101135-42 = "我，我們是聯邦學生會。"
101135-43 = "[s]「桃香，步！你們沒事啊！」"
101135-45 = "嗯。我們在聖所之塔的地下通訊中心。#n為了避開監視到達這裡，真是費了好一番功夫。"
101135-46 = "沒想到摸魚時使用的通風口會在這種時候派上用場呢！啊哈哈！"
101135-47 = "桃香醬……"
101135-48 = "在修復通訊Log之後，總算是找到琳前輩的位置了唷。"
101135-49 = "夏萊居住區的北部，現在沒有在使用的第三個房間。#n前輩就在那裡。"
101135-50 = "老師……還請您，將琳前輩……"
101135-52 = "[ns]「嗯，包在我身上。」"
101135-53 = "……是！"
101135-55 = "下一話;[ruby=S.C.H.]夏萊[/ruby]奪還作戰（２）"

101135-17 = "3;미야코;05;1층 편의점, 확보했습니다!\n#3;a\n#3;em;[!]"
101135-18 = "3;미야코;02\n1;소라;08;도와주러 오셨군요! <폐기 도시락 처리업자>분들! \n#1;a\n#1;em;[반응]\n#3;m5"
101135-19 = "3;미야코;02;……네?"
101135-20 = "1;소라;10;정말 이 건물은 난폭한 사건들이 너무 많이 발생해서…… 창고에 숨어 있는 법만 느는 것 같아요. 뭐, 이젠 뭐 익숙해졌다지만……."
101135-21 = "3;미야코;04;……고생이 많으시네요.\n#3;em;[땀]"
101135-22 = "1;소라;13;맞다. 폐기 도시락 가져가실래요? 이번에도 잔뜩 있거든요.\n#1;m2\n#1;em;[반짝]"
101135-23 = "3;미야코;03;……감사합니다. 나중에, 부디.\n#3;greeting"
101135-24 = "#all;hide"
101135-25 = "3;사키;07;좋아! 입구도 클리어!\n#3;em;[반짝]\n#3;a"
101135-26 = "3;미야코;03;도와주셔서 감사합니다, 공안국 여러분."
101135-27 = "3;통신모에;05;그보다 정말 규칙을 어기고 우리를 도와줘도 괜찮은 거야?\n#3;a"
101135-28 = "3;통신모에;15;나중에 규칙도 안 지키는 경찰이라고 범죄자들한테 조롱당할지도 모르는데……?"
101135-29 = "1;공안국 학생 B;01\n5;공안국 학생 B;01\n3;공안국 학생 A;03;하하…… 그 'RABBIT 소대'에게 이런 말을 들으려니, 뭔가 기분이 묘하긴 하지만……\n#3;em;[세로선]"
101135-30 = "5;공안국 학생 B;01;괜찮습니다. 칸나 국장님을 돕는 일이니까요.\n#5;greeting"
101135-31 = "3;공안국 학생 A;02;발키리 학생들이 범죄자들에게 조롱당하는 건 어차피 일상다반사고……"
101135-32 = "1;공안국 학생 C;03;후속 병력의 접근은 저희가 막고 있을 테니, 그 사이에 건물 탈환을 부탁드립니다!\n#1;em;[반응]\n#1;jump"
101135-33 = "#1;hide\n#5;hide\n3;미야코;03;감사합니다. 여러분.\n#3;greeting"
101135-34 = "#all;hide"
101135-35 = "3;미야코;10;그럼 저희는 지금부터 샬레 건물에 본격적으로 돌입. 두 가지의 임무를 동시에 수행해야 합니다.\n#3;em;…\n#3;a"
101135-36 = "3;미야코;05;첫 번째, 샬레 건물 지하에 있는 <크래프트 챔버>를 PMC에게서 탈환한다."
101135-37 = "3;미야코;10;두 번째, 샬레 건물 어딘가에 갇혀 있는 수석 행정관을 구출한다."
101135-38 = "1;통신모에;05;그치만…… 수석 행정관이 어디에 갇혀 있는지 모르잖아.\n#1;a"
101135-39 = "1;통신모에;15;인질의 위치를 파악해두지 않고 작전을 시작하면 안전을 보장하기가 힘들어."
101135-40 = "5;통신모모카;14;그건 이쪽에게 맡겨두라고.\n#5;a"
101135-41 = "1;미유;02;앗…… 누구……?\n#1;a"
101135-42 = "5;아유무;01;저, 저희는 총학생회입니다.\n#5;sig\n#5;a"
101135-43 = "[s] \"모모카! 아유무! 무사했구나!\""
101135-44 = "#all;hide"
101135-45 = "5;아유무;01\n2;모모카;05;그래, 참고로 여기는 생텀 타워의 지하 통신센터야. PMC의 눈을 피해 여기까지 숨어든다고 얼마나 힘들었는지 모른다고.\n#2;a\n#5;a"
101135-46 = "2;모모카;47;땡땡이칠 때 쓰던 개구멍이 이런 데서 도움이 될 줄은 몰랐다니까? 하하핫!\n#2;hophop\n#2;em;[재잘]"
101135-47 = "5;아유무;11;모모카 쨩…….\n#5;em;[땀]"
101135-48 = "2;모모카;36;어떻게든 통신 로그를 복구해서 린 선배의 위치를 찾아낼 수 있었어."
101135-49 = "2;모모카;37;샬레 생활관 위쪽의 사용하지 않는 세 번째 빈 방이야. \n#2;em;[반응]"

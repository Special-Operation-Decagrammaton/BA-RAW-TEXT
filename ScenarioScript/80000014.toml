[translation]
80000014-1 = "ของขวัญที่ไม่ได้ตั้งใจ"
80000014-2 = "สำนักงานชาเล่ต์"
80000014-5 = "สวัสดีค่ะ คุณครู อรุณสวัสดิ์ค่ะ"
80000014-6 = "รถไฟขบวนที่มาชาเล่ต์ช้ากว่ากำหนด... ฉันเลยมาช้าไปหน่อย ขอโทษด้วยค่ะ"
80000014-7 = "[s] \"อายาเนะ ช้าไป 5 นาทีเองนะ\""
80000014-8 = "จริงด้วยค่ะ ระหว่างทางที่มาฉันซื้อนี่มาด้วยค่ะ..."
80000014-13 = "เซ็ตของขวัญช็อกโกแลตค่ะ ทานให้อร่อยนะคะ คุณครู"
80000014-14 = "[s] \"ทำไมจู่ๆ ถึงให้ช็อกโกแลตครู...?\""
80000014-15 = "ฉันมักจะมารบกวนคุณครูอยู่บ่อยๆ นี่คะ"
80000014-16 = "แถมคุณครูก็ยังเคยบอกด้วยว่าช่วงนี้คุณครูนอนไม่ค่อยเต็มอิ่มเลยด้วยน่ะค่ะ"
80000014-17 = "ได้ยินว่าในช็อกโกแลตจะมีคาเฟอีนและสารธีโอโบรมีนที่ช่วยบรรเทาความเหนื่อยล้าอยู่ เพราะงั้นถ้ามีเวลาก็ควรทานบ้างนะคะ"
80000014-18 = "ที่จริงแล้ว... ด้านหน้าสถานีรถไฟมีเซ็ตช็อกโกแลตวางขายเต็มไปหมด ฉันก็เลยซื้อมาค่ะ..."
80000014-19 = "คะ...? ชะ...ช็อกโกแลตวันวาเลนไทน์เหรอคะ?"
80000014-20 = "จริงด้วยสินะคะ พอมาคิดๆ ดูแล้ว วันนี้เป็นวันวาเลนไทน์นี่นา... ถ้างั้นช็อกโกแลตที่ฉันให้คุณครูไป ก็คือช็อกโกแลตวันวาเลนไทน์..."
80000014-21 = "คะ...คือว่าฉะ...ฉันไม่ได้คิดเรื่องแบบนั้นเลยนะคะ...!"
80000014-22 = "ไม่สิ ถ้าบอกว่าไม่คิดเลยก็คงจะเป็นเรื่องโกหก... มะ... ไม่ใช่นะคะ...!"
80000014-23 = "ฉะ...ฉันไม่ได้ให้ช็อกโกแลตคุณครูเพราะรู้สึกแบบนั้นเลยนะคะ...!"
80000014-24 = "นะ...แน่นอนว่าคุณครูอาจรับไปด้วยความรู้สึกแบบนั้น... ถ้าเป็นแบบนั้น... ฉันก็คงดีใจ..."
80000014-25 = "ตะ...แต่ถ้าสมาชิกชมรมคนอื่นๆ รู้เข้าจะทำยังไงล่ะคะ"
80000014-26 = "คงจะโดนมองแปลกๆ แล้วก็ล้อว่า 'โห... อายาเนะ เห็นหงิมๆ แบบนี้แต่ไม่เบาเลยนะ~' แน่ๆ เลยค่ะ..."
80000014-27 = "นะ...แน่นอนว่าถ้าคุณครูช่วยเก็บเป็นความลับไว้... ไม่สิ ถ้าคุณครูอยากพูดออกไป ก็ไม่เป็นอะไรหรอก#nนะคะ แต่ว่ามัน..."
80000014-29 = "(คุณครูนั่งปลอบใจอายาเนะที่ตื่นตระหนกอยู่พักใหญ่ หลังจากสงบลงแล้วทั้งสองก็นั่งกิน#nช็อกโกแลตด้วยกัน)"

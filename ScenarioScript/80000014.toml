[translation]
80000014-1 = "An Unintended Gift"
80000014-2 = "Schale Office"
80000014-5 = "Good morning, Sensei."
80000014-6 = "Sorry I'm late. The train got delayed."
80000014-7 = "[s] \"Don't mention it. It's just five minutes.\""
80000014-8 = "To make it up to you, I bought this at the station on my way here."
80000014-13 = "It's a chocolate set. I hope you enjoy it."
80000014-14 = "[s] \"Well, this is a surprise...\""
80000014-15 = "I thought it'd be a nice thing to do since you're always looking out for me."
80000014-16 = "Besides, you've never been much of a morning person, sleeping in like you do after working so late."
80000014-17 = "I thought the caffeine and theobromine contained in the chocolate would act as a good pick-me-up."
80000014-18 = "Truth be told, it was sort of an impulse purchase. They happened to be selling all sorts of chocolate sets in front of the station. I wonder why that is..."
80000014-19 = "H-Huh? Because it's Valentine's Day?"
80000014-20 = "R-Right. Today's date is... That means the chocolates I gave you are Valentine's Day chocolates..."
80000014-21 = "I swear I didn't know! I didn't mean anything like that when I gave them to you!"
80000014-22 = "I mean, not that I DIS-like you, but I didn't mean it in a way that means I LIKE like you, and I...! I...!"
80000014-23 = "I-I'm just trying to say that I didn't mean it like that!"
80000014-24 = "I can't blame you for taking it that way...and it's not as though it's the end of the world or anything."
80000014-25 = "But what am I gonna say if the other task force members find out?!"
80000014-26 = "They'll tease me and say things like, \"Whoa, Ayane. You're such a player.#nLook at you sneaking off first thing in the morning to make your move!\""
80000014-27 = "P-Please keep this a secret between you and me. Wait, that makes it sound even more scandalous! So you can tell people if you want, but just don't... Ugh, I don't know!"
80000014-29 = "I did my best to calm down the flustered Ayane, and we eventually enjoyed the chocolate together after a good laugh."

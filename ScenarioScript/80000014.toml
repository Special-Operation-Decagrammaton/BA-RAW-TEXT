[translation]
80000014-1 = "意外的禮物"
80000014-2 = "夏萊．辦公室"
80000014-5 = "早安，老師。"
80000014-6 = "來夏萊的路上遇到火車誤點……所以有點遲到，真是抱歉……"
80000014-7 = "[s]「沒關係，遲到5分鐘完全不用在意的哦。」"
80000014-8 = "對了，雖然是在來的路上臨時買的……"
80000014-13 = "這是巧克力禮盒，請老師享用。"
80000014-14 = "[s]「這是……？」"
80000014-15 = "因為平時總是受老師照顧。"
80000014-16 = "而且老師之前說過，最近不管睡多久都無法消除疲勞對吧？"
80000014-17 = "巧克力含有咖啡因等等的成分，有助於緩解疲勞。忙碌的時候就吃一點吧。"
80000014-18 = "今天車站前不知為何有很多店家在賣巧克力，當時想到老師就買了……#n現在想想究竟是為什麼呢……"
80000014-19 = "……咦？情人節……？"
80000014-20 = "啊，這麼說來今天是情人節……那我現在給老師的就是情人節巧克力……"
80000014-21 = "那，那個，這是，所以說，我不是抱持著那種感情……！"
80000014-22 = "不，說對老師沒有那種感情是騙人的……不對！"
80000014-23 = "這個是，該說沒有意識到嗎……！"
80000014-24 = "當，當然老師要那麼想的話也沒問題，不如說我會很開心……"
80000014-25 = "要，要是被對策委員會的大家知道的話……"
80000014-26 = "大家一定會用「嘿～綾音裝得一副乖巧的樣子，#n沒想到是那種先下手為強的人啊～很厲害嘛～？」的眼光看我……"
80000014-27 = "當，當然如果老師願意保密的話……不對，想說出去也沒關係……？"
80000014-29 = "（之後總算是讓驚慌失措的綾音冷靜下來，一起悠哉地享用了巧克力）"

[translation]
2600402-1 = "Bookworm"
2600402-2 = "Hiya, Sensei! I'm glad you're here."
2600402-3 = "I guess I did invite you over. Heehee. Thanks all the same."
2600402-4 = "What's even funnier is that there isn't much to do here."
2600402-5 = "Oh, I'm sorry. Could you lower your voice just a little bit? Everyone else is reading..."
2600402-6 = "We can get away with a little small talk. The library is big enough and our voices won't echo."
2600402-7 = "I just don't want things to get too loud, that's all."
2600402-8 = "Can I recommend something to read while you're here?"
2600402-9 = "If it's coming from me, then you know you won't regret it!"
2600402-10 = "What do you like to read? Novels? Essays? Non-fiction? Science magazines...?"
2600402-11 = "[s1] \"Let's try a novel.\"\n[s2] \"I like cookbooks and travel guides.\""
2600402-12 = "Oh... That's very you. Wonderful! I have just the thing..."
2600402-13 = "Oh... That's very you. Wonderful! I have just the thing..."
2600402-14 = "What you want should be riiiiight over here... Wait."
2600402-15 = "Huh? Did you hear that?"
2600402-19 = "Hahaha! This is hilarious! Heeheehee! Oh, my stomach! No more!"
2600402-21 = "What, you punks got a problem with me? You own this library or something? Huh?!"
2600402-22 = "*munch* These chips are awesome. Whoops, I spilled some crumbs. Oh, well!"
2600402-26 = "..."
2600402-27 = "Would you mind waiting just a moment, Sensei? I can't overlook this as the librarian."
2600402-29 = "Excuse me. You're causing a disturbance."
2600402-30 = "Huh? Who? Me?"
2600402-31 = "Yes, you. This is a library. Can you please keep your voice down?"
2600402-32 = "Quiet conversations are allowed within the library, but you have to keep your voices down."
2600402-33 = "Food, on the other hand, is strictly forbidden! You can only bring beverages inside sealed containers, and you have to use a straw!"
2600402-34 = "Please be considerate to the other visitors!"
2600402-35 = "*sigh* Is this a joke? Why's a geek like you trying to tell me what to do? Leave me alone and let me read in peace!"
2600402-36 = "Actually, stay where you are. I'm gonna make you regret talking to me like that."
2600402-38 = "*crinkle*"
2600402-39 = "...!"
2600402-40 = "..."
2600402-41 = "What did you just do?"
2600402-42 = "D-Did you just fold that page?"
2600402-43 = "Huh? Well, duh! How else am I supposed to keep track of where I was?"
2600402-45 = "Why, you...!"
2600402-48 = "You're so...profane!"
2600402-50 = "*boooooom*"
2600402-51 = "...?!"
2600402-52 = "Wh-What was that? Wh-Why did everything turn gray...?"
2600402-53 = "These are...my first steps? My first day at elementary school? Birthday parties... All these memories..."
2600402-54 = "What's that? A river? Who's that on the other side...? Some old geezer is waving his hand..."
2600402-55 = "That's...a book? The corner...? On my head...?"
2600402-58 = "I could forgive every other rule you broke, but damaging a book cannot go unpunished!"
2600402-59 = "Fools that don't understand the value of books need to be taught a lesson!"
2600402-60 = "You'll be paying out of pocket for the book you creased!"
2600402-61 = "U-Ugh... My head... What just happened?"
2600402-62 = "I nearly died! Was that a revolving lantern just now?!"
2600402-63 = "It takes more than that to kill someone. I read a book that taught me how to adjust the strength of the blow."
2600402-64 = "Wh-What the hell? What's wrong with you?! You call yourself a librarian?!"
2600402-65 = "You little...! If that's how you want to play it, then take this!"
2600402-69 = "*woosh*"
2600402-70 = "[ns] \"Shimiko!\""
2600402-74 = "*grabs*"
2600402-75 = "...?"
2600402-76 = "What...? What happened?"
2600402-77 = "What in the...? Did you just stop my punch with one hand?"
2600402-78 = "\"Don't judge a book by its cover.\""
2600402-79 = "Every reader knows that simple rule. Did you think you could push me around just because I'm a librarian?"
2600402-80 = "Do you have any idea how many books a librarian has to carry a day?"
2600402-82 = "I'm so ripped that taking care of punks like you is a piece of cake!"
2600402-83 = "Wh-What the hell...? Hold on! Are you...lifting me off the floor?!"
2600402-84 = "A-Argh! L-Let me down! I said let me down!"
2600402-85 = "Whew."
2600402-86 = "I would throw you out the window, but that would only cause an even bigger scene."
2600402-87 = "So I'll let you off with a warning. Next time, I won't be Ms. Nice Librarian, got it?"
2600402-88 = "Okay! Okay! Just let me down..."
2600402-90 = "I'm sorry..."
2600402-91 = "...is what you thought I was gonna say! I'm takin' this book as payback!"
2600402-93 = "..."
2600402-95 = "...?"
2600402-96 = "Wait a second. When did you get all the way over there?"
2600402-97 = "*sigh*"
2600402-98 = "I hate repeating myself."
2600402-99 = "What did I just tell you about underestimating a librarian?"
2600402-100 = "Do you realize how quickly librarians have to return books to their shelves? How far they have to go to do it?"
2600402-101 = "I've trained myself to sprint without making a sound. Nobody can outpace me."
2600402-102 = "Regardless, you don't seem like you've learned your lesson."
2600402-103 = "Very well. The hard way it is."
2600402-104 = "H-Haha! Yeah, right! You're just bluffing!"
2600402-106 = "D-Don't come any closer! Stop right there...!"
2600402-109 = "A-Aaauugghhh!"
2600402-110 = "The troublemaker's pathetic scream whimpered out as Shimiko began her \"lesson.\""
2600402-112 = "Moments later."
2600402-113 = "*sigh* There's always one that has to be taught to follow the rules."
2600402-114 = "I'm sorry you had to see me like that, Sensei. I invited you today to have fun."
2600402-115 = "Honestly, I wanted you to see me as the intellectual type..."
2600402-116 = "[s3] \"What intellectual wouldn't want to protect knowledge?\"\n[s4] \"I thought you were incredible. Great work, Shimiko!\""
2600402-117 = "...!"
2600402-118 = "...!"
2600402-119 = "Y-You're...just trying to make me feel better."
2600402-120 = "...Heeheehee."
2600402-121 = "Still, I appreciate hearing that—especially from you."
2600402-122 = "Thank you, Sensei. You can read in peace with that finally settled!"
2600402-124 = "I spent the rest of my time at the library reading the books that Shimiko recommended."
2600402-125 = "Fortunately, the iced coffee I brought had a lid and included a straw."

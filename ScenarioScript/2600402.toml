[translation]
2600402-1 = "เด็กสาวที่ชอบหนังสือ"
2600402-2 = "สวัสดีค่ะคุณครู! มาที่นี่จริงๆ ด้วย"
2600402-3 = "จริงสิ ก็ฉันเคยเชิญไปว่าให้มาที่นี่นี่นา ฮุฮุ... ขอบคุณที่มานะคะ!"
2600402-4 = "ฉันเอ่ยปากชวนมาที่นี่ก็จริง แต่ว่าที่นี่ไม่ค่อยมีอะไรให้ทำเท่าไหร่หรอกค่ะ"
2600402-5 = "อ่า... ขอโทษด้วยนะคะ คุณครูช่วยลดเสียงลงหน่อยได้มั้ยคะ? พอดีคนอื่นอ่านหนังสือกันอยู่..."
2600402-6 = "แต่ห้องสมุดนี้ก็กว้างขวางมาก ฉันว่าเรายังพอคุยกันได้อยู่ค่ะ เสียงไม่ค่อยก้องเท่าไหร่หรอก"
2600402-7 = "แต่ที่ฉันให้ลดเสียงลงเพราะไม่อยากให้ใครได้ยินเท่านั้นน่ะค่ะ ฮุฮุ"
2600402-8 = "ไหนๆ คุณครูก็มาที่นี่แล้ว ให้ฉันแนะนำหนังสือน่าอ่านให้ดีมั้ยคะ?"
2600402-9 = "ถ้าเป็นหนังสือที่ฉันแนะนำล่ะก็ รับรองว่าไม่ผิดหวังแน่ค่ะ!"
2600402-10 = "คุณครูชอบอ่านแนวไหนเหรอคะ? พวกนิยายเรียงความสั้นๆ? หรือว่าสารคดี?#nหรือจะชอบนิตยสารทางวิทยาศาสตร์...?"
2600402-11 = "[s1] \"ลองอ่านนิยายชิลๆ ดูดีมั้ยนะ?\"\n[s2] \"ครูชอบหนังสือทำอาหารหรือคู่มือท่องเที่ยวน่ะ\""
2600402-12 = "ต้องแบบนี้สิ! มันดูเข้ากับคุณครูมากเลยค่ะ เอาล่ะ! งั้นวางใจฉันได้เลยค่ะ!"
2600402-13 = "ต้องแบบนี้สิ! มันดูเข้ากับคุณครูมากเลยค่ะ เอาล่ะ! งั้นวางใจฉันได้เลยค่ะ!"
2600402-14 = "ไหนดูหน่อยซิ... ถ้าเป็นหนังสือแนวที่คุณครูชอบก็น่าจะอยู่แถวนี้... เอ๋?"
2600402-15 = "...? หืม? เกิดเรื่องวุ่นวายอะไรกัน?"
2600402-19 = "วะฮ่ะฮ่ะฮ่าา! นี่มันตลกชะมัด!! ฮ่ะฮ่ะฮ่าาา!! โอยยย หัวเราะจนปวดท้องแล้ว! วะฮ่ะฮ่ะฮ่าา!!"
2600402-21 = "หืม? มีอะไร? ทำไมมองด้วยสายตาแบบนั้นล่ะ!? พวกแกจ่ายค่าเช่าที่นี่เรอะ?"
2600402-22 = "ขนมนี่ก็อร่อยนะเนี่ย ง่ำๆๆ แจ๊บๆๆ โธ่เอ๊ย หกเลอะเลย"
2600402-26 = "......"
2600402-27 = "สักครู่นะคะคุณครู บรรณารักษ์คนนี้จะอยู่เฉยไม่ได้แล้วค่ะ สงสัยฉันต้องเข้าไปสั่งสอนสักหน่อย"
2600402-29 = "นี่! พวกคุณกำลังก่อความวุ่นวายนะคะ"
2600402-30 = "หืม? ว่าไงนะ? ฉันเหรอ?"
2600402-31 = "ค่ะ คุณนั่นแหละค่ะ! ที่นี่คือห้องสมุดนะคะ จะทำอะไรก็ต้องให้เงียบที่สุดสิคะ"
2600402-32 = "ถึงที่นี่จะเป็นห้องสมุดขนาดใหญ่ที่ไม่ได้ห้ามให้พูดคุยกัน แต่ว่าทำแบบนี้มันเกินไปแล้วนะคะ"
2600402-33 = "อีกอย่าง ที่นี่ห้ามเอาอาหารเข้ามานะคะ! ส่วนเครื่องดื่มเราก็อนุญาตแค่ที่มีฝาปิดมิดชิด#nไม่ก็ที่ต้องใช้หลอดดูดเท่านั้นค่ะ!"
2600402-34 = "ช่วยนึกถึงคนอื่นที่มาใช้ห้องสมุดบ้างสิคะ!"
2600402-35 = "เฮ้อ เรื่องมากจริงๆ... ทำไมคนอย่างเธอต้องมาบอกให้ฉันทำหรือไม่ทำอะไรด้วย!#nคนจะมาอ่านหนังสือดีๆ แท้ๆ"
2600402-36 = "ยืนอยู่ตรงนั้นเลยนะ ขอฉันได้สั่งสอนอะไรเธอหน่อย ถ้าไม่เจอกับตัวก็คงคิดไม่ได้สินะ#nว่าอย่างยุ่งเรื่องของคนอื่น!"
2600402-38 = "...แกร่บ"
2600402-39 = "......!"
2600402-40 = "......"
2600402-41 = "ทำอะไรของคุณน่ะ...?"
2600402-42 = "นี่คุณ... พับหน้าหนังสือเหรอคะ?"
2600402-43 = "หืม? ทำไม่ได้เหรอ? ก็จะได้รู้ไงว่าอ่านถึงตรงไหนแล้วยังไงละ..."
2600402-45 = "หนอย...!"
2600402-48 = "นี่มันเกินไปแล้วนะ~!!"
2600402-50 = "ตู้มมมมม!!"
2600402-51 = "......!?!?"
2600402-52 = "มะ... เมื่อกี้มัน... อะไรน่ะ? ทะ... ทำไมทุกอย่าง... เป็นสีเทาไปหมด...?"
2600402-53 = "โอย... นี่มันภาพของ... ความทรงจำ... วันแรกที่เข้าเรียนประถม... ปาร์ตี้วันเกิด..."
2600402-54 = "อะไรกันเนี่ย? นี่มันแม่น้ำเหรอ? ใครน่ะ? ฝั่งตรงข้ามนั่นมัน... คุณตาที่ไม่รู้จักกำลังโบกมือให้เราอยู่..."
2600402-55 = "นั่นมัน... หนังสือ? หรือมุมโต๊ะ...? อยู่บนหัวเราเหรอ...?"
2600402-58 = "ฉันพอจะข่มใจกับเรื่องอื่นได้ แต่เรื่องทำลายหนังสือ ฉันให้อภัยไม่ได้เด็ดขาด!"
2600402-59 = "คนโง่เขลาอย่างคุณต้องได้รับการสั่งสอนให้รู้คุณค่าของหนังสือ! แล้วก็การใช้งานห้องสมุดด้วย!"
2600402-60 = "รู้ไว้เลยนะคะว่าสิ่งที่คุณทำมันหนักหนามาก!"
2600402-61 = "อะ... อึ้ก... เริ่มได้สติแล้ว... แต่ปวดหัวจัง... การโดนตีเมื่อกี้คืออะไรน่ะ...?"
2600402-62 = "นึกว่าต้องได้ไปสวรรค์แล้ว! เธอใช้โคมไฟตีหัวฉันเรอะ?!"
2600402-63 = "คนเราไม่ตายง่ายๆ แบบนี้หรอกค่ะ และฉันก็ควบคุมแรงอย่างถูกต้องตามที่หนังสือบอกแล้วด้วย"
2600402-64 = "พูดอะไรบ้าบอ! หนังสืออะไรนั่นเชื่อถือไม่ได้แล้ว! มีบรรณารักษ์แบบนี้ด้วยเหรอ!?"
2600402-65 = "เธอนี่นะ...! ดีเลย ต่อไปก็เป็นตาของฉันแล้วสินะ ฉันไม่ออมมือให้แน่!!"
2600402-69 = "ฟึ่บบ!!"
2600402-70 = "[ns] \"ชิมิโกะ!\""
2600402-74 = "ฟึ่บ!"
2600402-75 = "......?"
2600402-76 = "เอ๋...? อะไรเนี่ย?"
2600402-77 = "อะ... อะไรกัน? หยุดหมัดของฉัน... ด้วยมือเดียวเหรอ...?"
2600402-78 = "..... 'อย่าตัดสินคนแค่ภายนอก ขนาดปกหนังสือยังบอกไม่หมดเลยว่าเนื้อหาข้างในเป็นอย่างไร'"
2600402-79 = "ถ้าเป็นคนอ่านหนังสือก็ต้องรู้เรื่องนี้ดีค่ะ เห็นฉันเป็นบรรณารักษ์ของห้องสมุด#nก็เลยคิดว่าจะอ่อนแอเหรอคะ?"
2600402-80 = "รู้มั้ยคะว่าคนเป็นบรรณารักษ์ต้องแบกหนังสือหนักๆ วันละกี่เล่ม?"
2600402-82 = "พลังแขนของพวกเรา... ไม่ได้ด้อยไปกว่าคุณหรอกค่ะ!"
2600402-83 = "พะ.. พูดอะไร... ดะ... เดี๋ยวก่อน...! ทำไมจู่ๆ ตัวก็ลอยขึ้นล่ะ...!"
2600402-84 = "อ๊ากกก! เอาฉันลงนะ! เอาฉันลง!"
2600402-85 = "ฮู่ว..."
2600402-86 = "ใจจริงฉันอยากจะจับโยนออกไปทางหน้าต่างเลยด้วยซ้ำ แต่ในเมื่อเราทำอะไรเสียงดังมากไม่ได้#nงั้นจะปล่อยลงดีๆ แล้วกันนะคะ"
2600402-87 = "แต่ฉันจะยอมให้แค่ครั้งนี้ครั้งเดียวนะคะ ต่อไปต้องเคารพกฎห้องสมุดด้วย เข้าใจมั้ยคะ?"
2600402-88 = "ระ.. รู้แล้วน่า ไม่ต้องขู่หรอก! บอกว่ารู้แล้วไง... คิดว่าฉัน..."
2600402-90 = "คิดว่าฉัน..."
2600402-91 = "จะยอมเธองั้นเรอะ!? ขอเอาหนังสือที่อ่านอยู่ไปเลยแล้วกันนนน!!"
2600402-93 = "......"
2600402-95 = "......?"
2600402-96 = "หืม...? นี่มันอะไรอีก!? มาอยู่ข้างหน้าตั้งแต่ตอนไหนน่ะ?"
2600402-97 = "เฮ้อ......"
2600402-98 = "เชื่อเขาเลย... ชอบให้พูดเรื่องเดิมซ้ำๆ เหรอคะ? เมื่อกี้ก็พูดไปชัดเจนแล้วนะคะ..."
2600402-99 = "งั้นจะบอกอีกรอบแล้วกัน คนที่เป็นบรรณารักษ์น่ะ..."
2600402-100 = "ต้องเดินไปมาเพื่อจัดหนังสือที่เละเทะลงในชั้นหนังสือวันละไม่รู้กี่สิบรอบ"
2600402-101 = "ความสามารถพิเศษของเราคือการเคลื่อนที่อย่างรวดเร็วอย่างไร้สุ้มเสียง"
2600402-102 = "จะว่าไป... คุณดูไม่มีท่าทีที่จะสำนึกผิดเลยนะคะ...."
2600402-103 = "งั้นฉันคงจะยิ้มให้ด้วยความใจดีด้วยไม่ได้แล้วละค่ะ"
2600402-104 = "เฮือกก! ตอนนี้ก็ยิ้มอยู่ไม่ใช่เหรอ?! ยิ้มไปด้วยพูดไปด้วยแบบนี้มันน่ากลัวนะ!!"
2600402-106 = "ยะ... อย่าเข้ามานะ...! อย่าเข้ามา...!"
2600402-109 = "อ๊ากกก!!"
2600402-110 = "(สุดท้ายแล้วผู้ใช้บริการห้องสมุดที่ไร้มารยาทก็โดนชิมิโกะ 'สั่งสอน' โดยที่ส่งเสียงร้อง#nออกมาไม่ได้เลย)"
2600402-112 = "(หลังจากนั้นไม่นาน)"
2600402-113 = "เฮ้อ... คนแบบนี้มีอยู่ทั่วเลย..."
2600402-114 = "ขอโทษนะคะคุณครู ฉันอุตส่าห์ชวนคุณครูมาที่ห้องสมุด แต่ก็ต้องมาเจอเรื่องกวนใจจนได้"
2600402-115 = "จริงๆ ฉันอยากให้คุณครูเห็นฉันในมุมที่สุขุมและฉลาดรอบรู้มากกว่าคนที่ชอบต่อสู้น่ะค่ะ..."
2600402-116 = "[s3] \"การปกป้องความรู้เป็นสิ่งที่ฉลาดแล้วล่ะ\" \n[s4] \"แต่มันเป็นภาพลักษณ์ที่เท่มากเลยนะชิมิโกะ\""
2600402-117 = "......!"
2600402-118 = "......!"
2600402-119 = "พะ... พูดอะไรคะเนี่ย... ตั้งใจพูดให้ฉันรู้สึกดีใช่มั้ยคะ?"
2600402-120 = "...ฮุฮุฮุ"
2600402-121 = "ไม่หรอกค่ะ แต่ได้ฟังจากคุณครูแล้วก็รู้สึกดีนะคะ..."
2600402-122 = "ขอบคุณนะคะคุณครู ทีนี้เรามาอ่านหนังสือกันเถอะค่ะ! จริงสิ! ฉันต้องแนะนำหนังสือให้นี่นา!"
2600402-124 = "(คุณครูใช้เวลาทั้งวันที่เหลืออย่างผ่อนคลายด้วยการอ่านหนังสือที่ชิมิโกะแนะนำให้)"
2600402-125 = "(โชคดีที่กาแฟที่ซื้อมาเป็นแก้วที่มีฝาปิดมิดชิดและมีหลอดมาให้...)"

[translation]
2600402-1 = "愛書的少女"
2600402-2 = "老師早安！你真的來了啊。"
2600402-3 = "雖然是我邀你來的，但我也知道老師是個大忙人……所以我很高興老師真的能來，謝謝老師。"
2600402-4 = "也很抱歉請老師來這麼一個，做不了什麼款待的地方。"
2600402-5 = "啊……對不起，我們把音量降低一點吧。這裡還有其他人在看書……"
2600402-6 = "這間圖書館很大，小聲交談應該沒有問題。結構上也不會有太大的回音。"
2600402-7 = "當然這只是以防萬一啦。但還是謝謝老師配合，呵呵。"
2600402-8 = "既然來了，老師要不要也借一本書呢？"
2600402-9 = "我也會盡全力幫老師選一本推薦的書！"
2600402-10 = "老師喜歡什麼類型呢？小說？自傳？或是非文學？這裡也有科學雜誌之類的喔……"
2600402-11 = "[s1] 「我現在想悠閒地看小說。」\n[s2] 「我想看一些料理書或旅遊攻略之類的。」"
2600402-12 = "果然……很符合老師的形象！那就交給我吧！"
2600402-13 = "果然……很符合老師的形象！那就交給我吧！"
2600402-14 = "我看看……那我們來看看這區……"
2600402-15 = "……？嗯？怎麼這麼吵鬧？"
2600402-19 = "哇哈哈哈哈！這個超好笑！呀哈哈哈！啊哈、哈、嘻──，肚子好痛！啊嘿嘿嘿！"
2600402-21 = "……啊啊？你們看什麼看。有什麼意見嗎？我可是客人啊！"
2600402-22 = "啊～餅乾好好吃……啊姆姆，喀滋喀滋……啊，屑屑。算了，反正會有人打掃嘛。"
2600402-26 = "……"
2600402-27 = "請老師稍等一下。身為圖書管理員實在不能放任不管。"
2600402-29 = "不好意思，這位同學。"
2600402-30 = "哦？什麼？我？"
2600402-31 = "是。就是你。這裡是公共場所，可以請你遵守規矩嗎。"
2600402-32 = "雖然不會要你完全不講話，但你的舉止實在太超過了。"
2600402-33 = "更何況這裡禁帶外食，飲料也只能裝在密封容器裡用吸管喝。"
2600402-34 = "請你不要造成其他人的困擾！"
2600402-35 = "掃興……來了個死板的傢伙……老娘難得有興致要來這種地方看書！"
2600402-36 = "來啊，來打架啊。像你這種人就是要吃一次苦頭才會懂啦。"
2600402-38 = "（啪嚓）"
2600402-39 = "……！"
2600402-40 = "……你。"
2600402-41 = "……你剛才，做了什麼？"
2600402-42 = "你剛才……該不會在折書頁吧？"
2600402-43 = "哈？這不是廢話嗎？不然要怎麼記得看到哪裡了。"
2600402-45 = "……你這個……"
2600402-48 = "不尊重書的人！！！！"
2600402-50 = "（哐───！！！！！）"
2600402-51 = "……！？！？"
2600402-52 = "咕啊……剛才……？咦……？世界，怎麼……變成灰色……"
2600402-53 = "啊，是小學開學……和生日派對……的回憶……"
2600402-54 = "什麼？……河？是誰？對岸……有個老爺爺……"
2600402-55 = "……啊！？怎，怎麼回事……書角，打到我的頭……？"
2600402-58 = "雖然也有其他很多問題行為，但唯一絕對饒不了的，就是毀損書本！"
2600402-59 = "竟然連書本的價值都不懂！看來你需要徹底教育一番……"
2600402-60 = "包括賠償摺到的書本，這代價可是很重的……請你覺悟吧！"
2600402-61 = "唔，頭好痛……視線總算清楚了……？"
2600402-62 = "不對！我差點就沒命了耶！都看到跑馬燈了啊！"
2600402-63 = "人不會這麼容易就死的。然後這本書的材料也不會因為這點衝擊而變形，我也有調整力道了。"
2600402-64 = "問題不在那裡好吧！這傢伙是怎樣！？真的是圖書管理員嗎！？"
2600402-65 = "可惡……！那現在輪到我了！接招吧！"
2600402-69 = "吃我一拳！！"
2600402-70 = "[ns] 「志美子！」"
2600402-74 = "（接住）"
2600402-75 = "……哈？"
2600402-76 = "咦？不是吧……？"
2600402-77 = "一隻手，就擋下了拳頭……？"
2600402-78 = "……你以為只看封面，就能充分了解書本的內容嗎？"
2600402-79 = "只要是有在看書的人，都會明白這個道理。請別以為我是圖書管理員就小看我。"
2600402-80 = "你知道圖書管理員一天要搬多少書嗎？一次要搬幾本書嗎？"
2600402-82 = "就算單論臂力，我也不會輸給你這種人。"
2600402-83 = "什，什麼……！？被，被抬起來了……！？"
2600402-84 = "嗚，嗚啊！？放，放我下來！放我下來！"
2600402-85 = "……呼。"
2600402-86 = "雖然很想就這樣把你摔出去，但我不想發出太大的聲響。"
2600402-87 = "下次不會再通融了哦，知道嗎？"
2600402-88 = "我，我知道了。我知道了啦！我以後會確實……"
2600402-90 = "確實守規矩……"
2600402-91 = "……才有鬼啦！閃人啦！！！！"
2600402-93 = "……"
2600402-95 = "……？"
2600402-96 = "……咦？哈？什麼時候……？"
2600402-97 = "呼……"
2600402-98 = "為什麼同樣的話要我重複這麼多次呢……"
2600402-99 = "你可知道圖書管理員的工作內容嗎？"
2600402-100 = "圖書管理員為了把所有借還得書本放回去，你覺得每天總共要移動多少距離？"
2600402-101 = "不發出聲音快速移動，這可是圖書管理員的必備技能。"
2600402-102 = "然後，身為圖書管理員當然也要隨時保持笑容，但你似乎沒有反省的意思……"
2600402-103 = "這下我也很難再保持笑容了。"
2600402-104 = "嚇！？不，不要笑！好可怕，不要用那種笑容靠過來！"
2600402-106 = "不，不要過來……！不要靠近我啊！"
2600402-109 = "嗚，嗚啊啊……唔！"
2600402-110 = "（結果不良學生在叫都叫不出來的狀態下，接受了志美子的「教育」）"
2600402-112 = "（稍後……）"
2600402-113 = "……呼。難免就是會有那樣的人呢……"
2600402-114 = "對不起，老師。明明就是我邀你來的，卻讓你看到難堪的模樣。"
2600402-115 = "原本還想向老師展現，更穩重、更有知性的一面……"
2600402-116 = "[s3] 「不會喔，感覺就像是知識的守護者。」\n[s4] 「很有知性（？）很帥氣喔，志美子！」"
2600402-117 = "……！"
2600402-118 = "……！"
2600402-119 = "那，那種客套話……"
2600402-120 = "……呵呵。"
2600402-121 = "不，能聽到老師這麼說就很開心了。"
2600402-122 = "謝謝老師。雖然時間遲了點，但讓我重新邀請你在這裡慢慢放鬆吧！"
2600402-124 = "（之後，我便讀著志美子推薦的書，悠哉度過了剩餘的時間）"
2600402-125 = "（……幸好今天帶的咖啡，是要插吸管喝的密封包裝）"

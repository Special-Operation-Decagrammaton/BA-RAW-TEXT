2600402-1 = "#title;책이 좋은 소녀"
2600402-2 = "3;시미코;03;안녕하세요. 선생님! 진짜 와주셨네요.\n#3;a\n#3;em;[반짝]\n#3;greeting"
2600402-3 = "3;시미코;01;하긴 제가 놀러 오라고 초대했었죠. 후훗…… 와주셔서 감사해요."
2600402-4 = "3;시미코;99;거창하게 초대한 것치고는 딱히 해드릴 것도 없는 곳이긴 하지만요."
2600402-5 = "3;시미코;02;아, 죄송해요. 목소리 톤을 조금만 낮춰주시겠어요? 다른 분들 책 읽는 중이라……\n#3;em;[반응]"
2600402-6 = "3;시미코;01;그래도 이 도서관은 굉장히 넓은 곳이라, 약간의 대화라면 괜찮아요. 잘 안 울리거든요."
2600402-7 = "3;시미코;99;어디까지나 혹시나에 대한 미연의 방지라는 차원에서의 이야기죠. 후후."
2600402-8 = "3;시미코;02;그럼 오신 김에 읽을 만 한 책이라도 하나 추천해 드릴까요?"
2600402-9 = "3;시미코;03;다른 누구도 아닌 제 추천이니까요. 분명 후회하지 않으실 거예요!\n#3;em;[재잘]"
2600402-10 = "3;시미코;01;어떤 스타일이 좋으세요? 소설이나 수필? 아니면 비문학 쪽? 과학 잡지라거나……\n#3;em;[?]"
2600402-11 = "[s1] \"그럼 느긋하게 소설이나 볼까.\"\n[s2] \"요리 책이나 여행 가이드 같은 게 좋아.\""
2600402-12 = "3;시미코;01;과연…… 역시 생각했던 이미지대로의 선택이시군요. 좋아요! 저만 믿으세요!\n#3;greeting"
2600402-13 = "3;시미코;01;과연…… 역시 생각했던 이미지대로의 선택이시군요. 좋아요! 저만 믿으세요!\n#3;greeting"

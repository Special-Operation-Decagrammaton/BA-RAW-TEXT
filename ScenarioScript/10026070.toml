[translation]
10026070-1 = "第7話;正確的使用方法"
10026070-2 = "（四個地點都調查完後，再次回到了一開始集合的海邊）"
10026070-3 = "嗯……唔……"
10026070-4 = "嗯……？#n唔嗯…………"
10026070-5 = "[s1]「怎麼了，憂？」\n[s2]「你好像在認真想事情。」"
10026070-8 = "啊，那個……其實也沒什麼……"
10026070-9 = "只是在一邊看地圖，一邊回想目前調查到的線索……不過……嗯……"
10026070-10 = "感覺有點奇怪……我一件一件說明給你聽，老師。"
10026070-12 = "首先是這裡……看起來像訓練場的石造遺跡。"
10026070-14 = "接著是以司令室為主體的地下遺跡……"
10026070-16 = "而這裡則是指引船舶的燈塔……這些地點其實都沒什麼稀奇。"
10026070-17 = "雖然年代久遠，但這些設施的確都符合古代三一的建築風格，#n且設施的用途也相對明確，整體並沒有特別值得注意的異常。因此……"
10026070-21 = "那，那個……花子……"
10026070-22 = "你不覺得那個人……跟剛來到這裡的時候相比，好像變得有點不太一樣嗎……？"
10026070-23 = "……嗯？是嗎？"
10026070-24 = "憂同學他……一但進入狀況……簡直就像變了個人……"
10026070-25 = "說不定那就是熱衷於自己喜愛事物時的模樣呢。#n真替他感到高興，呵呵。"
10026070-27 = "雖然我個人更希望能找到那種，#n古聖徒會在荒郊野外建造的拷問場或刑場之類的就是了……"
10026070-32 = "可惜這次似乎不是那種主題呢……"
10026070-33 = "哈，哈哈，哈哈……"
10026070-34 = "啊，抱歉……"
10026070-35 = "總之既然不是那種主題，就不用太擔心了……"
10026070-36 = "所以這件事就要這樣畫下句點了嗎？"
10026070-37 = "當我腦海中出現這個念頭的時候……突然覺得……"
10026070-38 = "[s3]「好像還能挖掘出更多祕密？」\n[s4]「覺得這樣還不夠盡興之類的嗎？」"
10026070-41 = "老實說，這個地方很可能真的沒什麼特別。#n或者該說很可能就是這樣，但是……"
10026070-42 = "直到最後的最後都不放棄任何「可能性」，才是研究者的應該秉持的精神。"
10026070-43 = "打從一開始就抱著「這裡肯定沒什麼」這種心態的研究者，是絕不可能有所成就的。"
10026070-44 = "就算次次碰壁，次次無功而返，我們都要永遠堅信下次也許就會獲得成果。"
10026070-45 = "……因此，我打算改變一下研究的觀點。#n從調查「這裡的用途」……"
10026070-46 = "改為「這裡被棄置的原因」。"
10026070-47 = "這麼說也有道理。#n如此重視傳統與紀錄的修女會竟然會拋棄這座島嶼，甚至抹去相關的紀錄。"
10026070-48 = "或許我們該把調查的重點擺在「抹除紀錄」這個不符合修女會行事作風的行為上。"
10026070-49 = "沒錯，這確實不像修女會會採取的做法。"
10026070-50 = "那麼究竟是什麼原因導致他們這麼做呢？#n要做到這個地步的理由又是什麼？"
10026070-51 = "訓練場、地下遺跡、燈塔……"
10026070-53 = "還有相當突兀的檸檬農場……"
10026070-59 = "……檸檬？"
10026070-60 = "憂同學……？"
10026070-64 = "的確挺可疑的……你們看，從地圖上也能發現。#n只有這座檸檬農場的位置特別偏遠。"
10026070-65 = "確實……感覺實在不像是建設計畫中的一部份。#n也就是說，這座農場是後來增建的。"
10026070-66 = "這座島的環境不會自然生出檸檬樹，因此那些多半是有人特地從島外運過來的。"
10026070-67 = "而檸檬不太可能當成主食……#n之所以這麼做一定有特別的原因。"
10026070-68 = "檸檬……檸檬……"
10026070-76 = "[ns5]「你把檸檬摘了回來？」\n[ns6]「為什麼突然拿出檸檬？」"
10026070-79 = "唔嗯……除此之外應該沒有別的可能了。"
10026070-81 = "我擠……！！"
10026070-85 = "[ns7]「竟然把檸檬汁擠在地圖上！？」\n[ns8]「用手擠出來的酸水滴下來了……！！」"
10026070-88 = "哎呀……居然握得那麼緊……♡"
10026070-89 = "憂同學，沒想到你也有大膽又狂野的一面……"
10026070-90 = "不要講得那麼大聲，花子！"
10026070-91 = "憂，憂同學！？憂同學！#n為，為什麼要這麼做呢！？那是我們教堂保存許久的舊地圖……！！"
10026070-93 = "……嗯，果然沒錯。#n怪不得我一直覺得這張地圖的材質和一般的羊皮紙不太一樣。"
10026070-94 = "你們看，新的標記點出現了。"
10026070-99 = "……咦，咦！？#n地圖上……出現了之前沒有的標記……！？"
10026070-100 = "這是古代常用的手法。#n能夠隱藏情資，只讓特定人士獲得資訊。"
10026070-101 = "本來以為這種手法已經落伍了……#n沒想到放到現在依舊相當有用。"
10026070-103 = "換作是修女會的研究小組，肯定不會想到要滴檸檬汁，或是用火燻烤地圖吧。#n之所以採取這樣的手法，也許就是考慮到這一點……"
10026070-104 = "真受不了，外面的人為什麼總是在沒有意義的事情上過分迂腐呢？#n一點也不在乎這孩子想要的究竟是什麼。"
10026070-105 = "……不，說不定這就是他們想要達到的效果吧。"
10026070-106 = "總之，我們的下一個目標已經很明確了。#n這兩個地點應該就是這座島的祕密據點。"
10026070-107 = "既然是「祕密據點」，這裡肯定藏有「這座島的真正內幕」。"
10026070-108 = "……走吧。"
10026070-112 = "憂，憂同學！？等等我們，憂同學！！"
10026070-116 = "我完全沒想到會是這樣，你真的是太厲害了！"
10026070-117 = "我也會盡全力幫你的！#n一起把真相通通挖掘出來吧，憂同學！！"
10026070-118 = "唔啊啊……！！2m！！2m……！！"
10026070-122 = "呵呵呵，那麼……"
10026070-123 = "我們也趕快跟上吧。"

[translation]
10026070-1 = "Episode 7;Proper Usage"
10026070-2 = "Once we were done investigating all four sites, we returned to our landing point on the beach."
10026070-3 = "Mm... Hm..."
10026070-4 = "Hmm...? Mmm..."
10026070-5 = "[s1] \"What is it, Ui?\"\n[s2] \"You look deep in thought.\""
10026070-8 = "Oh, it's... It's nothing serious..."
10026070-9 = "I was just looking at this map... But... Hmm..."
10026070-10 = "It's a bit strange. Take this, for example..."
10026070-12 = "Here... The way these stone walls are laid out looks like a training ground."
10026070-14 = "And the command center we investigated here was built like a bunker."
10026070-16 = "Then there's the lighthouse to guide ships, which is nothing out of the ordinary."
10026070-17 = "But taken together, they form the shape of an ancient Trinity design. It's clear as day."
10026070-21 = "Um... Hanako..."
10026070-22 = "Something about her has changed. She's not the same as when we got here."
10026070-23 = "That so?"
10026070-24 = "Yes. Ui's really focused right now...confident even. It's like she's a different person."
10026070-25 = "I guess that's what happens when you're doing something you love. It's nice to see. Heehee..."
10026070-27 = "Considering it's in the middle of nowhere, I half expected to find some sort of torture or execution chambers that the ancient Council used."
10026070-32 = "But that doesn't seem to be the case here."
10026070-33 = "Hahaha, haha..."
10026070-34 = "Ah, sorry, that probably sounded bad..."
10026070-35 = "Anyway, it doesn't look even remotely like that sort of thing."
10026070-36 = "So I thought, \"Is that it then?\""
10026070-37 = "But the more I thought about it, the more I realized something."
10026070-38 = "[s3] \"You think there's something more?\"\n[s4] \"You're not satisfied?\""
10026070-41 = "Well, I mean, it could be nothing. It's most likely nothing."
10026070-42 = "But I wouldn't be a good researcher if I didn't ask myself, \"What if...?\""
10026070-43 = "If you go in expecting nothing, then that's exactly what you'll find."
10026070-44 = "But if you keep looking for something more even when you come up empty handed, you might be surprised."
10026070-45 = "So let's look at this from another angle. Instead of trying to figure out what this place was..."
10026070-46 = "Let's think about why it was abandoned."
10026070-47 = "Good point. The people who built this place, who valued tradition and history above all else, destroyed and abandoned it."
10026070-48 = "The key to our investigation is in something the Sisterhood would find absolutely abhorrent: they destroyed records."
10026070-49 = "Yes. That's not at all normal Sisterhood behavior."
10026070-50 = "But why do it? Why would anyone take such measures?"
10026070-51 = "The training grounds, the command center, the lighthouse..."
10026070-53 = "...and that strange lemon grove..."
10026070-59 = "Hm... The lemon grove..."
10026070-60 = "Ui...?"
10026070-64 = "That's strange... Look. Even on the map, this lemon grove is a little out of place."
10026070-65 = "I see what you mean. It doesn't fit with everything else. It's like they added it on as an afterthought."
10026070-66 = "Plus, lemon trees aren't native to this island. They would have had to bring them in from the outside."
10026070-67 = "And lemons aren't a practical choice when it comes to food supply either. There must be a reason for that."
10026070-68 = "Lemons... Lemons..."
10026070-76 = "[ns5] \"Why do you have a lemon?\"\n[ns6] \"What do you plan to do with that?\""
10026070-79 = "Mmm... Yes. That must be it. That must be the reason..."
10026070-81 = "Hup!!"
10026070-85 = "[ns7] \"Why are you squeezing the lemon?! The juice will ruin the map!\"\n[ns8] \"Ah! It's getting everywhere!\""
10026070-88 = "Oh my! If you can squeeze that hard... ♡"
10026070-89 = "Ui's more feisty than she looks!"
10026070-90 = "You don't need to shout, Hanako!"
10026070-91 = "Ui! What are you doing?! That map has been in the Cathedral's care for ages—"
10026070-93 = "Ha! I thought that might work. This map wasn't made of typical parchment."
10026070-94 = "Look! Two new locations!"
10026070-99 = "What's this?! Something new is appearing on the map!"
10026070-100 = "It's an old technique used to keep information hidden from spies."
10026070-101 = "What do you know? It's not exactly cutting edge, but it worked well enough."
10026070-103 = "The Sisterhood's research team would never have dared to spray the map with lemon juice and hold it up to sunlight..."
10026070-104 = "They are so out of touch. Normal people never take interest in this kind of thing, do they?"
10026070-105 = "...Although, I suppose that's what the map makers were counting on."
10026070-106 = "Anyway, now it's clear what we need to do. We need to visit these two secret locations."
10026070-107 = "That's the real reason this place exists."
10026070-108 = "Let's go."
10026070-112 = "U-Ui?! Wait for us, Ui!"
10026070-116 = "We never would have thought of this! You're amazing!"
10026070-117 = "Whatever you need, we'll do our best to help! Together to the very end, Ui!"
10026070-118 = "Wahhhh! Two meters! Two meters!!"
10026070-122 = "Heehee! Okay then..."
10026070-123 = "Shall we tag along?"

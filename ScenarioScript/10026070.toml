[translation]
10026070-1 = "ตอนที่ 7;วิธีใช้ที่ถูกต้อง"
10026070-2 = "(หลังจากสำรวจครบทั้ง 4 จุดสำรวจ ทุกคนก็กลับมาเจอกันที่ชายหาดที่เคยมารวมตัวกันในตอนแรกอีก#nครั้ง)"
10026070-3 = "อืม... ฮืม..."
10026070-4 = "หืม...? อืม... อืมมม..."
10026070-5 = "[s1] \"มีอะไรเหรอ อุย?\"\n[s2] \"ทำสีหน้าครุ่นคิดหนักมากเลยนะ\""
10026070-8 = "มะ... ไม่ค่ะ คือ... มันไม่ได้มีเรื่องใหญ่อะไร..."
10026070-9 = "ฉันก็แค่ตรวจสอบข้อมูลที่สำรวจมาอยู่น่ะค่ะ แล้วก็เทียบกับแผนที่ตรงนี้ด้วย... แต่ว่า... อืม..."
10026070-10 = "ฉันกลับคิดว่ามันดูแปลกๆ... ไว้ฉันจะค่อยๆ อธิบายไปนะคะ"
10026070-12 = "ก่อนอื่นเลย ที่นี่คือ... ถนนกำแพงหินที่ดูเหมือนจะเป็นสนามฝึก"
10026070-14 = "ส่วนที่นี่ก็ศูนย์บัญชาการที่สร้างไว้เป็นอย่างดีด้วยบังเกอร์ใต้ดิน..."
10026070-16 = "ตรงนี้คือประภาคารสำหรับนำทางเรือขนาดใหญ่... ไม่มีจุดไหนน่าสงสัยเลยค่ะ"
10026070-17 = "ถึงมันจะเก่าแก่แล้ว แต่การใช้สอยตามแบบฉบับของทรีนิตี้โบราณก็ค่อนข้างชัดเจน โดยรวมแล้วไม่มี#nอะไรแปลกเลยค่ะ เพราะงั้น..."
10026070-21 = "นะ... นี่... ฮานาโกะ..."
10026070-22 = "คนคนนั้นน่ะ... ดูต่างออกไปจากตอนที่มาถึงครั้งแรกเลย ว่าไหม...?"
10026070-23 = "...หืม? งั้นเหรอคะ?"
10026070-24 = "คุณอุย... เหมือนกำลังอินกับอะไรบางอย่างอยู่เลยค่ะ... เหมือนเป็นคนละคนเลย..."
10026070-25 = "ที่เป็นแบบนั้น อาจเป็นเพราะเธอได้จดจ่อกับสิ่งที่ชอบก็ได้ค่ะ ดีจังเลยนะคะ ฮุฮุ"
10026070-27 = "ส่วนตัวแล้วฉันว่าที่นี่เป็นสถานที่คล้ายๆ กับจุดทรมานหรือแดนลงโทษที่ห่างไกลของสาวกโบราณเสีย#nอีกค่ะ"
10026070-32 = "น่าเสียดายที่ดูเหมือนจะไม่ใช่แนวคิดนั้นนะคะ..."
10026070-33 = "...ฮ่า... ฮ่าฮ่าฮ่า ฮ่าฮ่า..."
10026070-34 = "...อ่า ขอโทษที..."
10026070-35 = "เอาเป็นว่าที่นี่ไม่ใช่ที่แบบนั้น งั้นก็ไม่มีเหตุผลที่จะต้องกังวลกันหรอกค่ะ..."
10026070-36 = "ถ้าอย่างนั้น มันก็จะจบลงแค่นี้เหรอ?"
10026070-37 = "ถึงจะคิดอย่างนั้นแต่ก็... ยังรู้สึกยังค้างคานะคะ..."
10026070-38 = "[s3] \"คิดว่าต้องมีอะไรมากกว่านั้นสินะ\"\n[s4] \"ปิดจ๊อบแค่นี้ยังไม่พอใจล่ะสิ?\""
10026070-41 = "แต่ก็นะ ที่จริงแล้วที่นี่อาจจะไม่มีอะไรเป็นพิเศษอยู่แล้วก็ได้ คงไม่มีอะไรหรอกค่ะ แต่ว่า..."
10026070-42 = "ทัศนคติที่ดีของนักวิจัยคือการทำให้ไม่มีความคิดว่า 'ถ้าเผื่อว่า' ในตอนสุดท้ายค่ะ"
10026070-43 = "และนักวิจัยที่คิดว่า 'ไม่มีอะไรพิเศษหรอก' ตั้งแต่แรก ก็จะไม่สามารถค้นพบอะไรได้ค่ะ"
10026070-44 = "ต่อให้เหมือนจะทำไปโดยสูญเปล่าหรือเจอตอนจบที่เปล่าประโยชน์ แต่ก็ควรคิดอยู่เสมอค่ะว่ามันต้อง#nมีอะไรบางอย่างรอให้ค้นพบอยู่"
10026070-45 = "ตอนนี้เราลองมาเปลี่ยนประเด็นกันสักหน่อยไหมคะ แทนที่จะสงสัยว่าสถานที่แห่งนี้ 'เอาไว้ทำอะไร'..."
10026070-46 = "เราเปลี่ยนมาตั้งคำถามว่า 'ทำไมถึงถูกปิดไป' แทน"
10026070-47 = "นั่นสินะคะ ทำไมพวกคนที่ให้ความสำคัญกับประเพณีและบันทึกต่างๆ ถึงได้ทิ้งที่แห่งนี้ไป แล้วก็ยังทำลายแม้กระทั่งบันทึกด้วย"
10026070-48 = "บางทีประเด็นหลักของการสำรวจนี้อาจจะเป็น 'การทำลายบันทึก' ที่ไม่สมกับการเป็นชมรมซิสเตอร์#nก็ได้นะคะ"
10026070-49 = "ค่ะ จะบอกว่าการทำแบบนี้ไม่เหมือนกับชมรมซิสเตอร์ทั่วๆ ไปก็ได้ค่ะ"
10026070-50 = "แล้วทำไมถึงต้องทำกันขนาดนั้นด้วย? มันเพราะอะไรกัน?"
10026070-51 = "ทั้งสนามฝึก ทั้งศูนย์บัญชาการ ทั้งประภาคาร..."
10026070-53 = "และก็สวนเลมอนที่ไม่เข้าพวก..."
10026070-59 = "เลมอน...?"
10026070-60 = "คุณอุย...?"
10026070-64 = "...มีอะไรแปลกๆ ลองดูสิคะ ในแผนที่ก็แปลกค่ะ สวนเลมอนนี้มันไม่กลมกลืนกับที่อื่นเลยค่ะ"
10026070-65 = "นั่นสิ... ฉันรู้สึกเหมือนกับว่ามันไม่ได้อยู่ในแผนการเริ่มต้นตอนสร้างสถานที่นี้เลยค่ะ นั่นแปลว่ามันถูก#nสร้างขึ้นมาเองทีหลัง"
10026070-66 = "เกาะนี้ไม่ใช่สภาพแวดล้อมที่ต้นเลมอนจะเติบโตเองได้เลย มันน่าจะถูกเอามาปลูกจากที่อื่นนะคะ"
10026070-67 = "เลมอนก็ใช่ว่าจะใช้เป็นอาหารหลักบนเกาะได้ด้วย... งั้นคงมีเหตุผลอะไรอื่นสินะคะ"
10026070-68 = "...เลมอน... เลมอน..."
10026070-76 = "[ns5] \"เอาเลมอนออกมาด้วยเหรอ?\"\n[ns6] \"จู่ๆ ทำไมถึงเข้าเรื่องเลมอนล่ะ?\""
10026070-79 = "อืม... คงต้องเป็นอย่างนั้นแน่ค่ะ ที่นี่มันมีเพียงสิ่งนี้เท่านั้น"
10026070-81 = "...ฮึบ...!!"
10026070-85 = "[ns7] \"บีบน้ำเลมอนลงบนแผนที่เลยเหรอ!?\"\n[ns8] \"น้ำเลมอนเปรี้ยวๆ หยดลงผ่านมือไปแล้ว...!!\""
10026070-88 = "อุ๊ย... ถ้าบีบแรงขนาดนั้นละก็...♡"
10026070-89 = "คุณอุยก็มีมุมที่ใจกล้าและรุนแรงอยู่นะคะเนี่ย..."
10026070-90 = "อย่าพูดเสียงดังสิ ฮานาโกะ!"
10026070-91 = "คะ... คุณอุย!?!  คุณอุย! ทะ... ทำอะไรลงไปคะ!?  นั่นแผนที่โบราณของวิหารนะ...!!"
10026070-93 = "...อืม ใช่ค่ะ เป็นแบบนี้จริงด้วยนะคะ ก็ว่าอยู่ พอดูจากกระดาษหนังแกะที่ใช้ทำแผนที่แล้วฉันก็ว่ามันมี#nอะไรแปลกๆ"
10026070-94 = "ออกมาแล้วค่ะ จุดใหม่ในแผนที่"
10026070-99 = "......!? อะ... เอ๋? อะไรคะเนี่ย? แผนที่... แสดงจุดใหม่ที่ไม่เคยเห็นมาก่อนด้วยเหรอคะ...!?"
10026070-100 = "นี่คือวิธีที่นิยมใช้กันในสมัยก่อนค่ะ เอาไว้ปกปิดข้อมูลที่ต้องการแสดงให้คนเฉพาะกลุ่มดูเท่านั้นค่ะ"
10026070-101 = "ปัจจุบันนี้ไม่ค่อยได้ใช้วิธีนี้กันแล้วเพราะเป็นที่รู้จักมากขึ้น... แต่พอเป็นแผนที่เก่าแบบนี้ ฉันก็เลยคิดว่า#nอาจจะซ่อนลูกเล่นนี้ไว้ค่ะ"
10026070-103 = "ถ้าเป็นทีมวิจัยของชมรมซิสเตอร์ คงไม่กล้าแม้แต่จะคิดบีบน้ำเลมอนลงแผนที่และจุดไฟดูใกล้ๆ ใช่ไหมคะ? บางทีแผนที่นั่นอาจจะคิดมาเพราะคำนึงถึงเรื่องนั้นก็ได้..."
10026070-104 = "เฮ้อ คนข้างนอกชอบเป็นอย่างนี้กันอยู่เรื่อยเลยนะคะ สุดท้ายก็ไม่สนใจว่าเด็กคนนี้ต้องการอะไร"
10026070-105 = "...ไม่สิ บางทีนั่นอาจจะไม่ใช่สิ่งที่ต้องการก็ได้"
10026070-106 = "เอาเถอะค่ะ เอาเป็นว่าตอนนี้สิ่งที่เราต้องทำมันชัดเจนขึ้นมาแล้วค่ะ สองที่นี้... อาจเป็นสถานที่ลับของ#nเกาะนี้ก็ได้"
10026070-107 = "พอเป็นสถานที่ลับ ก็หมายความว่า... มันคือ 'เบื้องหลังที่แท้จริงของที่นี่' ค่ะ"
10026070-108 = "...ไปกันเถอะค่ะ"
10026070-112 = "คะ... คุณอุย!?  รอก่อนสิคะ คุณอุย!!"
10026070-116 = "ฉันคิดไม่ถึงเลยจริงๆ ค่ะ คุณอุยสุดยอดมากเลยค่ะ!"
10026070-117 = "ฉันจะช่วยอย่างเต็มที่เลยค่ะ! เรามาช่วยกันจนกว่าจะหาคำตอบให้ได้เลยนะคะ คุณอุย!!"
10026070-118 = "ว้ากก...!!  2 เมตร!!  2 เมตร...!!"
10026070-122 = "ฮุฮุฮุ ถ้างั้น..."
10026070-123 = "เราก็ตามไปด้วยเลยไหมคะ?"

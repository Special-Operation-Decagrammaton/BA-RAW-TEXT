[translation]
1001605-1 = "#title;초회한정판이에요. 선생님."
1001605-2 = "#place;밀레니엄 전자상가 하루하바라"
1001605-3 = "#na;(사전에 미도리와 약속한 장소로 나가자, 그곳은 그야말로 발 디딜 틈 하나 없이 수많은 인파로 북적이고 있었다.)"
1001605-4 = "[ns1] \"와, 사람 정말 많네.\"\n[ns2] \"게임을 사랑하는 사람이 이렇게나 한가득…….\""
1001605-5 = "3;미도리;02;선생님! 주의해주세요! 멍하니 있다간 미아가 되어버리니까요!\n#3;a\n#3;em;[반응]"
1001605-6 = "3;미도리;02;선생님! 주의해주세요! 멍하니 있다간 미아가 되어버리니까요!\n#3;a\n#3;em;[반응]"
1001605-7 = "[s3] \"대체, 이게 어떻게 된 일이야?\"\n[s4] \"단순한 게임 판매가 아닌 거야?\""
1001605-8 = "3;미도리;01;이번에 발매된 신작 게임을 단순한 신작이라고 생각하지 마세요."
1001605-9 = "3;미도리;01;이번에 발매된 신작 게임을 단순한 신작이라고 생각하지 마세요."
1001605-10 = "3;미도리;02;무려 십여 년이나 전에 나왔던 전설적인 명작이자, 당시 평론 사이트에서도 심사위원 전원이 만점을 준 걸로 유명한 게임."
1001605-11 = "3;미도리;03;젤나의 전설 신작이니까요!\n#3;em;[하트]"
1001605-12 = "3;미도리;02;수많은 게이머는 물론 컬렉터까지 포함해. 이번 초회한정판 특전을 노릴 게 분명해요."
1001605-13 = "3;미도리;99;우리는 여기서 그 사냥감을 쟁취해내기 위한 사냥꾼……."
1001605-14 = "3;미도리;05;아니, 전사가 되어 싸움에 임해야만 해요!\n#3;em;[반짝]\n#3;greeting"
1001605-15 = "[s] \"어째, 점점 더 게임을 사러 온 게 아닌 듯한…….\""
1001605-16 = "3;미도리;01;게임 판매 개시 시간은 지금으로부터 1시간 뒤."
1001605-17 = "3;미도리;02;물리적으로 방문할 수 있는 가게의 개수가 한정 되어있는 이상, 어떤 루트로 매장을 돌지 전략적으로 판단할 필요가 있어요."
1001605-18 = "[s] \"미도리는 이미 계획이 다 있구나.\""
1001605-19 = "3;미도리;03;당연하죠. 오늘만을 기다려왔으니까요!\n#3;em;[음표]\n#3;hophop"
1001605-20 = "3;미도리;02;자, 이럴 때가 아니에요. 선생님! 퀘스트를 시작하죠!"

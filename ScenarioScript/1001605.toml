[translation]
1001605-1 = "รุ่นลิมิเต็ดรุ่นแรกเลยค่ะ คุณครู"
1001605-2 = "ฮารุฮาบะระ ย่านร้านเครื่องใช้ไฟฟ้าในมิลเลเนียม"
1001605-3 = "(เมื่อไปถึงสถานที่ที่นัดกับมิโดริไว้ ที่นั่นเต็มไปด้วยฝูงชนจำนวนมากแบบไม่มีที่ให้เดินเลย)"
1001605-4 = "[ns1] \"ว้าว คนเยอะสุดๆ ไปเลย\"\n[ns2] \"มีคนที่รักเกมอยู่เต็มไปหมดขนาดนี้...\""
1001605-5 = "คุณครู! ระวังค่ะ! ถ้าเหม่อๆ จะกลายเป็นเด็กหลงทางได้นะคะ!"
1001605-6 = "คุณครู! ระวังค่ะ! ถ้าเหม่อๆ จะกลายเป็นเด็กหลงทางได้นะคะ!"
1001605-7 = "[s3] \"นี่มันเกิดอะไรขึ้นกันเหรอ?\"\n[s4] \"ไม่ใช่แค่การขายเกมธรรมดาหรอกเหรอ?\""
1001605-8 = "อย่าได้คิดว่าเกมใหม่ที่วางขายในงานนี้เป็นงานชิ้นใหม่ทั่วไปนะคะ"
1001605-9 = "อย่าได้คิดว่าเกมใหม่ที่วางขายในงานนี้เป็นงานชิ้นใหม่ทั่วไปนะคะ"
1001605-10 = "มันเป็นผลงานชื่อดังในตำนานที่ออกมาเมื่อหลายทศวรรษก่อน และเป็นเกมที่ผู้ตัดสินทุกคน#nให้คะแนนเต็มร้อยในเว็บไซต์วิจารณ์ตอนนั้นด้วย"
1001605-11 = "ผลงานใหม่ของเดอะเลเจนด์ออฟเซลนาค่ะ!"
1001605-12 = "รวมถึงนักสะสมและเกมเมอร์นับไม่ถ้วน แน่นอนว่ามีรุ่นลิมิเต็ดเฉพาะในครั้งนี้ด้วยค่ะ"
1001605-13 = "พวกเราเป็นนักล่าที่มาที่นี่เพื่อล่าเหยื่อ..."
1001605-14 = "ไม่ใช่สิ ต้องเป็นผู้กล้าที่ต้องออกไปสู้ต่างหากค่ะ!"
1001605-15 = "[s] \"ทำไมดูเหมือนว่าจะไม่ได้มาเพื่อซื้อเกมขึ้นเรื่อยๆ...\""
1001605-16 = "จากนี้ไป 1 ชั่วโมงจะเป็นช่วงเวลาของการขายเกม"
1001605-17 = "เนื่องจากเราเข้าชมร้านค้าได้ในจำนวนจำกัด จึงต้องตัดสินใจอย่างมีกลยุทธ์ว่าควรไปเส้นทางใดค่ะ"
1001605-18 = "[s] \"มิโดริมีแผนเตรียมไว้หมดแล้วนี่นา\""
1001605-19 = "แน่นอนอยู่แล้วค่ะ ฉันรอมาเพื่อวันนี้เท่านั้นค่ะ!"
1001605-20 = "เอาล่ะ ตอนนี้ไม่เป็นแบบนั้นนะคะ คุณครู! มาเริ่มเควสกันเถอะค่ะ!"
1001605-22 = "ถ้าลองมองจากเส้นทางหลัก ที่แรกสุดที่จะเลือกคือที่นี่ ตลาดใหญ่ค่ะ"
1001605-23 = "ที่นี่มีขนาดใหญ่ที่สุด เลยเป็นตัวเลือกที่ดีที่สุดที่จะหาของจากของจำนวนมากมายนี้ได้...!"
1001605-24 = "[ns] \"อ๊ะ มิโดริดูนี่สิ\""
1001605-28 = "ขายหมด... แล้ว?"
1001605-29 = "\"สินค้าใหม่ของเดอะเลเจนด์ออฟเซลนาราคาพิเศษขายหมดแล้ว\" ?"
1001605-30 = "ฟะ... ฟะ... ฟลายอิงเก็ต~?!"
1001605-31 = "ขายหมดตั้งแต่ยังไม่เริ่มขายได้ยังไงกันคะ?!"
1001605-32 = "[s5] \"ดูท่าทางคงไม่อยู่ที่นี่\"\n[s6] \"ครูมั่นใจว่าหลายคนคงคิดเหมือนกัน\""
1001605-33 = "นี่จะต้องร้องเรียนนะคะ! ไม่สิ ถ้าไม่อยู่ที่นี่ก็ต้องรีบหาที่อื่นแล้วล่ะค่ะ!"
1001605-34 = "นี่จะต้องร้องเรียนนะคะ! ไม่สิ ถ้าไม่อยู่ที่นี่ก็ต้องรีบหาที่อื่นแล้วล่ะค่ะ!"
1001605-35 = "คุณครู! วิ่งค่ะ!"
1001605-47 = "แฮ่ก แฮ่ก... อ่า... ไม่ว่าที่ไหนก็ไม่มี..."
1001605-48 = "[s] \"เราคงต้องยอมแพ้ให้กับรุ่นลิมิเต็ด...\""
1001605-49 = "ไม่ได้ค่ะ ไม่ได้เด็ดขาดค่ะ ฉันนับนิ้วรอให้วันนี้มาถึงเลยนะ!"
1001605-50 = "จะยอมแพ้แบบนี้ไม่ได้เด็ดขาดค่ะ"
1001605-51 = "เหลือที่สุดท้ายอีกที่เดียวเท่านั้น...!"
1001605-53 = "ที่นี่คือที่สุดท้ายค่ะ ถ้าที่นี่ก็ไม่มี..."
1001605-54 = "หืม"
1001605-55 = "คะ... คุณครู อยู่นี่ค่า! เดอะเลเจนด์ออฟเซลนารุ่นลิมิเต็ดใหม่!"
1001605-56 = "[s7] \"โล่งอกไปที\"\n[s8] \"ถ้างั้นแค่ซื้อสิ่งนี้ก็จบ...\""
1001605-57 = "อ๊ะ เจอแล้ว! เกมเดอะเลเจนด์ออฟเซลนา! เหลืออันเดียวเท่านั้น!"
1001605-58 = "อ๊ะ เจอแล้ว! เกมเดอะเลเจนด์ออฟเซลนา! เหลืออันเดียวเท่านั้น!"
1001605-59 = "อ๋า......"
1001605-60 = "[s] \"มิโดริ\""
1001605-62 = "หืม... อะไรน่ะ"
1001605-63 = "คุณลุง! เอาอันนี้ค่ะ!"
1001605-64 = "[s9] \"ไม่เป็นไรแน่นะ?\"\n[s10] \"มิโดริเองก็ตามหามาทั้งวันเลยนี่นา\""
1001605-65 = "ค่ะ ฉันเองก็คิดอยากจะลองดู แต่ว่า..."
1001605-66 = "ค่ะ ฉันเองก็คิดอยากจะลองดู แต่ว่า..."
1001605-67 = "สิ่งที่เรียกว่าเกมน่ะ ถ้าเล่นกันหลายๆ คนก็จะสนุกยิ่งขึ้นใช่มั้ยล่ะคะ?"
1001605-68 = "เพราะงั้นฉันไม่เป็นไรหรอกค่ะ คุณครู"
1001605-71 = "(ถึงจะทำตัวเป็นผู้ใหญ่ แต่ก็อยากจะลองเล่นดูนะ! ฮือ ฮือ...!)"
1001605-73 = "(ในวันต่อมา คุณครูเอาของขวัญไปที่ห้องชมรมพัฒนาเกม)"
1001605-74 = "หืม? คุณครู มีอะไรหรือเปล่าคะ?"
1001605-75 = "[s] \"มิโดริ นี่ของขวัญ\""
1001605-76 = "นี่มัน..."
1001605-77 = "เดอะเลเจนด์ออฟเซลนารุ่นลิมิเต็ด...!"
1001605-78 = "ดะ... ได้ยังไงกันคะ?"
1001605-79 = "[s11] \"ครูใช้เวลาเมื่อวานทั้งคืน\"\n[s12] \"ตระเวนไปตามร้านจนเจอเพื่อมิโดริน่ะ\""
1001605-82 = "[s] \"นี่แหละพลังของผู้ใหญ่\""
1001605-83 = "นี่คือสิ่งที่ผู้ใหญ่ทำได้ทั้งคืน...!"
1001605-84 = "...คุณครู ทำเพื่อฉัน..."
1001605-85 = "[s] \"มิโดริ?\""
1001605-86 = "ไม่มีอะไรหรอกค่ะ คุณครู"
1001605-87 = "ฉันดีใจมากเลยค่ะ ขอบคุณสำหรับของขวัญมากเลยค่ะ คุณครู!"

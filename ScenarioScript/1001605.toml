[translation]
1001605-1 = "It's Limited Edition, Sensei"
1001605-2 = "Millennium Electronics Market Haru Habara"
1001605-3 = "(When I arrived at the place I promised to meet Midori, it was so crowded that there was nowhere to stand.)"
1001605-4 = "[ns1] \"Wow, this place is packed.\"\n[ns2] \"It's full of people who love games...\""
1001605-5 = "Please be careful! If you don't pay attention, you'll get lost!"
1001605-6 = "Please be careful! If you don't pay attention, you'll get lost!"
1001605-7 = "[s3] \"What the heck is going on?\"\n[s4] \"This can't be just a simple game release event!\""
1001605-8 = "Don't think of this new release as just another game."
1001605-9 = "Don't think of this new release as just another game."
1001605-10 = "It's a true masterpiece that came out about ten years ago, and it famously received perfect scores from reviewers on prominent gaming sites!"
1001605-11 = "It's a new release in the Legend of Zinda series!"
1001605-12 = "Gamers and collectors alike all have their eyes on the limited edition special bonus."
1001605-13 = "We're like hunters after rare prey..."
1001605-14 = "No, I mean, heroes fighting our enemies!"
1001605-15 = "[s] \"I feel like this isn't about buying the game anymore...\""
1001605-16 = "The game will go on sale in one hour."
1001605-17 = "Since there aren't that many stores to visit, we must visit them strategically."
1001605-18 = "[s] \"...You've planned this out already.\""
1001605-19 = "Of course. I've been waiting ages for today!"
1001605-20 = "We have no time to waste, Sensei! Let's get this quest started!"
1001605-22 = "I've chosen a hypermarket as our first destination. It only makes sense to start there."
1001605-23 = "Since it's the biggest store, it'll have the most copies. It'd be the best if we could get it here!"
1001605-24 = "[ns] \"Oh, but look, Midori...\""
1001605-28 = "Out of...stock?"
1001605-29 = "\"All copies of the new Legend of Zinda scheduled to arrive today are already sold out.\""
1001605-30 = "B-Beaten to the punch?!"
1001605-31 = "Are they really all sold out before even going on sale?!"
1001605-32 = "[s5] \"I guess they don't have it.\"\n[s6] \"I'm sure a lot of people had the same idea.\""
1001605-33 = "We should submit a complaint! No, more importantly, we have to go someplace else to score a copy quickly!"
1001605-34 = "We should submit a complaint! No, more importantly, we have to go someplace else to score a copy quickly!"
1001605-35 = "Sensei! Run!"
1001605-47 = "*pant* I can't believe it's out of stock everywhere..."
1001605-48 = "[s] \"I guess we'll have to give up on getting the limited edition...\""
1001605-49 = "No, I can't do that. I've been waiting so long for this day!"
1001605-50 = "I can't just give up like this."
1001605-51 = "Let's go check one more place..."
1001605-53 = "This is our last chance. If it's not here..."
1001605-54 = "Oh."
1001605-55 = "S-Sensei. It's here! The new limited edition Legend of Zinda!"
1001605-56 = "[s7] \"Great.\"\n[s8] \"Now, all we gotta do is buy it...\""
1001605-57 = "Oh, found it! The Legend of Zinda! It's the last copy!"
1001605-58 = "Oh, found it! The Legend of Zinda! It's the last copy!"
1001605-59 = "Oh..."
1001605-60 = "[s] \"Midori.\""
1001605-62 = "Hmm... Well."
1001605-63 = "Sir! Please, give that to me!"
1001605-64 = "[s9] \"Are you gonna be okay?\"\n[s10] \"You've been looking for this all day.\""
1001605-65 = "Yes. I've been really wanting to play it, but..."
1001605-66 = "Yes. I've been really wanting to play it, but..."
1001605-67 = "But I want to give other people a chance to enjoy it!"
1001605-68 = "I'll be okay, Sensei."
1001605-71 = "(I was pretending to be mature, but I really wanted to play it! Waah...)"
1001605-73 = "The next day, I went to the Game Development Department with a gift."
1001605-74 = "Huh? Sensei, what are you doing here?"
1001605-75 = "[s] \"Midori, I've brought you a gift.\""
1001605-76 = "This is..."
1001605-77 = "The limited edition Legend of Zinda!"
1001605-78 = "H-How did you get this?"
1001605-79 = "[s11] \"I checked all the stores all night...\"\n[s12] \"...to get one for you, Midori.\""
1001605-82 = "[s] \"This is the power of adulthood.\""
1001605-83 = "An adult can stay up all night..."
1001605-84 = "...You did this for me, Sensei?"
1001605-85 = "[s] \"Midori?\""
1001605-86 = "Oh, it's nothing, Sensei."
1001605-87 = "I'm so happy. Thank you for the gift, Sensei!"

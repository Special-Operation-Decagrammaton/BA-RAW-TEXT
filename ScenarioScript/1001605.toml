[translation]
1001605-1 = "是首發限定版唷，老師"
1001605-2 = "千年．電器街「春葉原」"
1001605-3 = "（到了跟綠約好的地方，那裡人山人海，連想動一下都很困難）"
1001605-4 = "[ns1] 「哇……真是可怕的人數。」\n[ns2] 「愛著遊戲的人竟然有這麼多……」"
1001605-5 = "老師，請小心一點！發呆的話會迷路的唷！"
1001605-6 = "老師，請小心一點！發呆的話會迷路的唷！"
1001605-7 = "[s3] 「好像真的會迷路呢……」\n[s4] 「是配合遊戲的發售在舉辦什麼活動嗎？」"
1001605-8 = "今天發售的遊戲可不只是普通的新作而已喔。"
1001605-9 = "今天發售的遊戲可不只是普通的新作而已喔。"
1001605-10 = "竟然是，那個十幾年前推出的傳說中的名作，讓當時評論網站的評審們全部都打滿分的知名遊戲……"
1001605-11 = "那個《薩爾那傳說》的新作呀！"
1001605-12 = "不只是大多數的玩家，還有收藏家們，大家都想要拿到這次的首發限定特典。"
1001605-13 = "我們現在要成為爭奪獵物的獵人……"
1001605-14 = "不，是要成為戰士，面對這場戰鬥不可！根據情況要開火也是可以的！"
1001605-15 = "[s] 「我們是來買遊戲的對吧……？」"
1001605-16 = "遊戲的開賣時間是在1小時之後。"
1001605-17 = "既然實際上能走到的店舖有限，要採取什麼路線就需要先有戰略性的思考。"
1001605-18 = "[s] 「綠比平常還可靠……」"
1001605-19 = "那是當然的，我可是期待今天期待很久了！"
1001605-20 = "好啦，現在不是說這個的時候了。老師，我們開始任務吧！"
1001605-22 = "從王道的觀點考慮各種各樣的路線後，我最先選的就是這裡，大型家電量販店。"
1001605-23 = "因為規模最大，想必進的貨也是最多的才對。如果能在這裡買到是最好的……！"
1001605-24 = "[ns] 「啊，但是綠你看這個。」"
1001605-28 = "售完的，告知……？"
1001605-29 = "「預計今天到貨的《薩爾那傳說》新作已經全數銷售完畢」？"
1001605-30 = "偷，偷，偷跑！？"
1001605-31 = "在發售日之前就賣完了！？"
1001605-32 = "[s5] 「大家的執念真可怕……」\n[s6] 「開賣前就賣光……」"
1001605-33 = "這，這該去檢舉吧！……不，比起這個，如果這裡沒有的話就該立刻去其他地方找才行。"
1001605-34 = "這，這該去檢舉吧！……不，比起這個，如果這裡沒有的話就該立刻去其他地方找才行。"
1001605-35 = "老師，我們用跑的吧！"
1001605-47 = "哈啊，哈啊……找不到……"
1001605-48 = "[s] 「難道說，所有地方都賣光了嗎……」"
1001605-49 = "不，不能放棄，這還不知道！"
1001605-50 = "我等今天已經等很久了，不能就這麼放棄。"
1001605-51 = "最後，還有一個地方沒去……！"
1001605-53 = "這就是最後一個地點了，如果這裡也沒有的話……"
1001605-54 = "啊……"
1001605-55 = "老，老師！找到了，是《薩爾那傳說》新作的首發限定版！"
1001605-56 = "[s7] 「太好了……！」\n[s8] 「總算是順利的……」"
1001605-57 = "啊，找到了！是最後一個《薩爾那傳說》！"
1001605-58 = "啊，找到了！是最後一個《薩爾那傳說》！"
1001605-59 = "啊……"
1001605-60 = "[s] 「綠……」"
1001605-62 = "……"
1001605-63 = "店員先生！我要買這個！"
1001605-64 = "[s9] 「……這樣可以嗎？」\n[s10] 「綠也找了一整天了說……」"
1001605-65 = "嗯……雖然我也是想說一定要玩到的……"
1001605-66 = "嗯……雖然我也是想說一定要玩到的……"
1001605-67 = "但是，我也不想破壞掉那個笑容。所謂的遊戲，就應該要開開心心的玩才對。"
1001605-68 = "所以說，沒關係的，老師。"
1001605-71 = "（雖然裝得像個大人一樣……但果然還是好想玩啊！嗚哇啊啊……！）"
1001605-73 = "（隔天，我帶著禮物到了遊戲開發部的活動室）"
1001605-74 = "咦？老師，有什麼事嗎？"
1001605-75 = "[s] 「綠，這是給你的禮物。」"
1001605-76 = "這個是……"
1001605-77 = "《薩爾那傳說》首發限定版……！"
1001605-78 = "怎，怎麼拿到的！？"
1001605-79 = "[s11] 「運氣好而已。」\n[s12] 「我到處找來找去，就找到了。」"
1001605-82 = "[s] 「畢竟在規定內的熬夜是大人的特權嘛。」"
1001605-83 = "這就是能夠熬夜的大人……"
1001605-84 = "……老師特別為了我……"
1001605-85 = "[s] 「綠？」"
1001605-86 = "沒，沒事，什麼都沒有，老師。"
1001605-87 = "我真的很開心……非常謝謝你的禮物！老師！"

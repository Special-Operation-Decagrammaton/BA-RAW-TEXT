1007902-34 = "4;미사카;13;그게, 좀……. 아직도 능력을 쓰려고 하면 머리가 좀 지끈거린달까. 집중이 잘 안된달까…….\n#4;em;[땀]"
1007902-35 = "4;미사카;06;여기 온 뒤로 쭉 그런 게 좀 있네. 세계가 달라서 그런 걸까……."
1007902-36 = "4;미사카;03;아. 아프거나 몸이 안 좋은 건 아니니까, 걱정할 필요는 없어. 그저 컨디션이 좀 안 좋다는 느낌.\n#4;jump"
1007902-37 = "4;미사카;01;굳이 비유하자면 능력을 쓰는 데에만 뭔가가 거슬린다는 느낌……? 별 건 아니고."
1007902-38 = "4;미사카;99;그렇지만, 음……."
1007902-39 = "4;미사카;06;확실히……. 막상 당연하게 쓰던 힘을 잘 못 쓰니, 조금 갑갑하긴 하네."
1007902-40 = "4;미사카;03;평상시에는 자주 쓰지 않는다고 생각했는데, 어쩌면 무의식적으로 꽤 이런저런 곳에 쓰고 있었던 걸지도."

[translation]
1007902-1 = "แค่เผื่อไว้ก่อน"
1007902-2 = "(คุณครูไปที่ย่านร้านเครื่องใช้ไฟฟ้าในตัวเมืองที่มิซากะอยู่)"
1007902-7 = "(และได้เห็นมิซากะกำลังยืนดูเครื่องใช้ไฟฟ้าต่างๆ อย่างสนใจ)"
1007902-11 = "......"
1007902-15 = "...อ๊ะ คุณครู ตรงนี้ๆ"
1007902-16 = "หืม? ฉันมีธุระอะไรในย่านร้านเครื่องใช้ไฟฟ้าน่ะเหรอ? ก็ไม่นะ ไม่ได้มีธุระอะไรเป็นพิเศษ"
1007902-17 = "ก็แค่กำลังเดินดูรอบๆ นี้ให้ทั่วๆ อยู่น่ะ แล้วก็มาเจอคุณครูที่นี่พอดี"
1007902-18 = "ที่นี่ก็มีของให้ดูเยอะกว่าที่คิดนะ"
1007902-19 = "บางอย่างก็ไม่ได้แตกต่างกันเท่าไหร่ แต่ก็ไม่มีอะไรที่เหมือนกันเป๊ะๆ เลย"
1007902-20 = "อย่างเครื่องใช้ไฟฟ้าที่อยู่ที่นี่ก็เป็นของที่ฉันเพิ่งเคยเห็นเป็นครั้งแรก"
1007902-21 = "ถ้าลองดูให้ละเอียดๆ ทุกอย่างที่นี่เป็นของที่ฉันไม่เคยเห็นมาก่อน แต่เรื่องหลักการหรือวิธีการทำงาน#nก็ไม่ได้ต่างจากที่ฉันรู้จักเท่าไหร่..."
1007902-22 = "[s1] \"เหมือนได้มาเที่ยวต่างประเทศเลยเนอะ...\"\n[s2] \"เหมือนเป็นนักท่องเที่ยวเลยนะเนี่ย\""
1007902-25 = "ใช่ๆ แต่อย่างน้อยก็คุยกันรู้เรื่อง เลยไม่มีปัญหาเรื่องการสื่อสาร..."
1007902-26 = "...หืม?"
1007902-27 = "วิเคราะห์อุปกรณ์? อยากรู้ว่าฉันทำอะไรแบบนั้นได้มั้ยน่ะเหรอ? ก็ได้อยู่นะ ก็ฉันมีพลังจิตนี่นา"
1007902-28 = "ต่อให้ไม่แยกชิ้นส่วนออกมา แต่ถ้าดูการไหลเวียนของไฟฟ้าข้างใน ก็พอจะจับทางได้อยู่น่ะ"
1007902-29 = "...แต่ฉันยังไม่เคยวิเคราะห์อะไรเชิงลึกดูหรอกนะ"
1007902-34 = "คือว่า... ถ้าฉันพยายามใช้พลัง มันจะรู้สึกปวดหัวจี๊ดๆ เลยน่ะ ทำให้รวบรวมสมาธิไม่ได้เลย..."
1007902-35 = "ฉันเป็นแบบนั้นตั้งแต่มาที่นี่แล้วละ สงสัยจะเป็นเพราะอยู่คนละโลกกัน..."
1007902-36 = "อ้อ ฉันไม่ได้ไม่สบายตรงไหนหรอกนะ สบายใจได้ แค่รู้สึกร่างกายไม่กระปรี้กระเปร่าเต็มที่ก็เท่านั้นเอง"
1007902-37 = "ถ้าจะให้อธิบายละก็ ฉันรู้สึกเหมือนมีอะไรกวนใจทุกครั้งที่จะใช้พลังน่ะ แต่มันไม่ใช่เรื่องใหญ่หรอก"
1007902-38 = "แต่ว่า อืม..."
1007902-39 = "พอใช้พลังของตัวเองที่เคยใช้มาตลอดไม่ได้ มันก็น่าอึดอัดอยู่นะ"
1007902-40 = "ฉันนึกว่าฉันไม่ค่อยได้ใช้พลังนี้บ่อยๆ ในชีวิตประจำวันเสียอีก แต่เอาเข้าจริงๆ ฉันอาจจะใช้มันทุกวัน#nโดยที่ไม่รู้ตัวก็ได้"
1007902-44 = "[ns3] \"แต่ก็ถือว่ามีข้อดีหรือเปล่า?\"\n[ns4] \"แล้วมีบ้างหรือเปล่าที่รู้สึกอึดอัดจากการมีพลัง?\""
1007902-47 = "อะไรกัน ทำไมมาชวนมองในมุมกลับแบบนี้ล่ะ? ฉันไม่ได้รู้สึกเสียดายหรือหดหู่ถึงขนาดที่ต้องมา#nปลอบใจกันสักหน่อย"
1007902-48 = "แต่ก็... อืม ไหนๆ คุณครูก็ถามมาแล้ว งั้นฉันจะไปลองคิดทบทวนดูแล้วกัน"
1007902-49 = "เรื่องที่เสียดายเพราะมีพลังจิตติดตัว..."
1007902-50 = "มีอะไรแบบนั้นรึเปล่านะ? ไฟฟ้า... ไฟฟ้า..."
1007902-51 = "... อ้อ"
1007902-55 = "เอ๋...?"
1007902-56 = "หรือว่า...? บางที...?"
1007902-57 = "[s5] \"หรือว่า...?\"\n[s6] \"คิดอะไรออกงั้นเหรอ?\""
1007902-60 = "คะ... คุณครู! แป๊บหนึ่งนะ! รอฉันแป๊บหนึ่ง!"
1007902-61 = "ฉันมีบางอย่างที่อยากทดสอบน่ะ! เดี๋ยวฉันมานะ!!"
1007902-66 = "[ns] ตามมิซากะไป"
1007902-68 = "(คุณครูตามมิซากะที่วิ่งไปยังตรอกแห่งหนึ่งที่อยู่ใกล้ๆ)"
1007902-69 = "(แต่พอคุณครูมาถึง ก็เจอมิซากะที่ทำสีหน้าหดหู่ ท้อแท้ใจอยู่ที่นั่น)"
1007902-77 = "[ns7] \"...มิซากะ?\"\n[ns8] \"มีอะไรเหรอ? สีหน้าไม่ดีเลย\""
1007902-80 = "......"
1007902-84 = "[ns9] \"เสียงแมวร้องเหรอ?\"\n[ns10] \"หืม? เสียงนี้มัน...\""
1007902-87 = "อืม... ฉันคิดว่าบางที พลังที่อ่อนลงก็น่าจะให้ผลที่ต่างกันออกไปน่ะ"
1007902-88 = "...อ่า ขอโทษนะคุณครู ที่จู่ๆ ฉันก็วิ่งออกมาโดยไม่ได้บอกอะไรเลย"
1007902-89 = "เดิมทีแล้วแมวหรือสัตว์อื่นๆ จะพากันหลบฉันเพราะฉันมีพลังไฟฟ้าน่ะ"
1007902-90 = "ในเมื่ออยู่ที่นี่แล้วพลังของฉันอ่อนลง ฉันก็เลยคิดไปว่าสถานการณ์มันอาจจะดีขึ้นก็ได้..."
1007902-91 = "แต่น้องๆ ก็เหมือนจะหนีฉันอยู่เหมือนเดิม"
1007902-92 = "เฮ้อ..."
1007902-93 = "แบบนี้ก็คงมีแต่เรื่องแย่ๆ ไม่มีเรื่องดีๆ เลย..."
1007902-94 = "......"
1007902-95 = "...หืม?"
1007902-96 = "ที่เป็นแบบนั้นเพราะน้องๆ เป็นหมาแมวจรจัดงั้นเหรอ?"
1007902-97 = "ในเมื่อตอนนี้พลังอ่อนลงแล้วจริงๆ ถ้าได้เจอกับน้องๆ ที่คุ้นชินกับคน ก็อาจจะให้ยอมลูบตัวก็ได้#nงั้นเหรอ...?"
1007902-104 = "...จริงเหรอ คุณครู?"
1007902-105 = "[s11] \"ครูก็ยังไม่แน่ใจหรอกนะ...\"\n[s12] \"ลองดูก็ไม่ได้เสียหายนี่...?\""
1007902-108 = "...อืม นั่นสิเนอะ"
1007902-109 = "ดีละ! ก็จริงอย่างที่คุณครูว่านะ นี่ยังเร็วเกินไปที่จะยอมแพ้!"
1007902-110 = "งั้นไปกันเลย! มีที่ไหนแนะนำบ้างมั้ย? อย่างเช่นคาเฟ่แมวเหมียว หรือร้านขายสัตว์เลี้ยงน่ะ!"
1007902-111 = "ช่วยพาไปหน่อยสิคุณครู!"
1007902-113 = "(หลังจากนั้นคุณครูก็พามิซากะผู้ที่มีความคาดหวังเต็มเปี่ยม ไปทัวร์คาเฟ่แมวเหมียวและร้านขายสัตว์#nเลี้ยงใกล้ๆ)"
1007902-124 = "(...แต่น่าเสียดายที่ผลลัพธ์ก็ยังคงออกมาเหมือนเดิม)"

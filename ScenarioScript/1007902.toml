1007902-15 = "4;미사카;00;……아, 선생님. 여기야, 여기.\n#4;m3"
1007902-16 = "4;미사카;02;응? 전자상가에 볼일이 있냐고? 아니, 딱히 그런 건 아닌데?\n#4;em;[?]"
1007902-17 = "4;미사카;99;주변을 한 번 쭉 돌아다니고 있었을 뿐이야. 마침 선생님과 만난 곳이 여기인 거고."
1007902-18 = "4;미사카;03;생각보다 볼거리가 많더라고, 여기도."
1007902-19 = "4;미사카;01;어떻게 보면 별로 차이가 없다 싶으면서도, 또 어떻게 보면……. 똑같은 게 하나도 없더라고."
1007902-20 = "4;미사카;00;당장 여기 있는 전자제품들도, 전부 내 눈에는 처음 보는 메이커들뿐이잖아."
1007902-21 = "4;미사카;03;천천히 뜯어보면 전부 처음 보는 것들뿐. 그런데 또 막상 작동 원리나 방식 자체는 크게 다르지 않은 것 같고…….\n#4;jump"
1007902-22 = "[s1] \"외국에 온 느낌인 걸까…….\"\n[s2] \"완전히 관광객 같은 분위기네.\""

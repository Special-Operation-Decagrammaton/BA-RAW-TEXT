[translation]
1003605-1 = "Inside the Bushes"
1003605-2 = "Inside the Trinity Cathedral"
1003605-3 = "I came to the Trinity Cathedral expecting to see Hinata in high spirits."
1003605-4 = "Once again, there was still time before Mass, so there weren't any students inside."
1003605-8 = "And then, yet again, I saw an open door on one side of the cathedral."
1003605-9 = "[s1] \"(I'm getting déjà vu...)\"\n[s2] Go through the open door."
1003605-15 = "Park Behind Trinity Cathedral"
1003605-16 = "The door led outside to a large park located behind the cathedral."
1003605-17 = "It seemed to be private land owned by the cathedral. I then spotted Hinata taking care of a tree in the middle of the park."
1003605-18 = "Hmmm hmmm hmmm. ♪"
1003605-19 = "...?"
1003605-20 = "Hmm? Sensei?"
1003605-21 = "[s] \"Hi.\""
1003605-22 = "O-Oh. Hello..."
1003605-23 = "Um..."
1003605-24 = "Sensei, how did you get here? This place is restricted to outsiders.#nThe door is kept locked..."
1003605-25 = "Oh, no."
1003605-26 = "Please don't tell me... I think I know what you're about to say."
1003605-27 = "U-Unless you're going to tell me I'm imagining things. Surely I didn't make the same mistake again. Right? Right...? Haha..."
1003605-28 = "[s3] \"Sorry to say that your feeling is right on the money.\"\n[s4] \"Don't worry. I closed the door this time.\""
1003605-29 = "I-I knew it! I forgot to close it behind me again!"
1003605-30 = "I-I knew it! I forgot to close it behind me again!"
1003605-31 = "Aw...! Why do I keep doing that?!"
1003605-32 = "[s5] \"Everyone makes mistakes.\"\n[s6] \"It's fine, Hinata.\""
1003605-33 = "I know, but still...!"
1003605-34 = "I know, but still...!"
1003605-35 = "So you closed the door when you went through?"
1003605-36 = "Thank you, Sensei. You're always looking after me."
1003605-37 = "Though you wouldn't even be here right now if I didn't make that mistake."
1003605-38 = "What am I doing here? Oh, this little park is one of the places I've been looking after for a long time."
1003605-39 = "I guess you could say I'm this park's manager."
1003605-40 = "Right. My managerial duties aren't limited to things only inside the cathedral."
1003605-41 = "Oh, but you don't have to worry. I know better than to put too much work on my shoulders like I did before."
1003605-42 = "I'm getting better at asking the other Sisters for help when there's more work than I can handle on my own."
1003605-43 = "I have you to thank, Sensei."
1003605-44 = "Taking care of this park isn't very difficult, so I can handle it by myself."
1003605-45 = "Maybe the old me would have felt overwhelmed, but things are different now."
1003605-46 = "So..."
1003605-52 = "*gasp*!"
1003605-53 = "[s7] \"Time to hide.\"\n[s8] Jump into the nearby bushes."
1003605-61 = "Hinata! Where are you?"
1003605-62 = "Are you here?"
1003605-63 = "I heard she was supposed to be here..."
1003605-64 = "...but I don't see her anywhere. Where could she have gone?"
1003605-66 = "S-Sensei..."
1003605-67 = "This is bad. I never expected anyone else to come here at this hour."
1003605-68 = "U-Um..."
1003605-69 = "There's not a lot of space in this bush."
1003605-73 = "Wh-What was that?"
1003605-74 = "I'm not sure..."
1003605-75 = "Oh, no. I think they noticed us!"
1003605-76 = "[s9] \"Why did you hide too?\"\n[s10] \"I was the only one who had to hide.\""
1003605-77 = "Wait. What?"
1003605-78 = "Wait. What?"
1003605-79 = "Uh..."
1003605-80 = "You're right, huh? That makes a lot more sense now that I think about it..."
1003605-81 = "I think I heard something coming from the bushes."
1003605-82 = "Oh, no. They're gonna find us!"
1003605-83 = "I-I have to get out there!"
1003605-89 = "H-Hello. How are you doing?"
1003605-90 = "Is there something I can help you with? A-Ahaha..."
1003605-91 = "H-Hinata?! What were you doing in there?"
1003605-92 = "O-Oh, the bush? I was...just taking care of it! A little up-close watering is all."
1003605-93 = "But what was all that noise just now?"
1003605-94 = "N-Nothing. Anyway, what brings you here?"
1003605-95 = "I-I'd be happy to lend a hand if you need anything! Just show me the way.#nIn fact, let's go right now!"
1003605-96 = "O-Oh. Um, okay..."
1003605-97 = "We could use a hand moving the bookshelf in the cathedral."
1003605-98 = "Is that all? Sure, I'd love to! Let's go take care of that right away!"
1003605-103 = "..."
1003605-104 = "[ns] \"*sigh*\""
1003605-106 = "[ns] \"I should get going.\""
1003605-108 = "I quietly stood up, left the bush, and made my way back to Schale."

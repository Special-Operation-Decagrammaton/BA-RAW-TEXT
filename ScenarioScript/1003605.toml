[translation]
1003605-1 = "ในพุ่มไม้"
1003605-2 = "ด้านในวิหารทรีนิตี้"
1003605-3 = "(คุณครูเข้ามาด้านในวิหารทรีนิตี้และหวังว่าจะได้เห็นใบหน้าของฮินาตะที่ดูมั่นใจขึ้น)"
1003605-4 = "(อาจเป็นเพราะว่าตอนนี้ไม่ใช่เวลาสวดนมัสการ ภายในวิหารจึงไม่มีใครอยู่เลย)"
1003605-8 = "(และอีกครั้ง... คุณครูเห็นประตูที่มุมหนึ่งของวิหารเปิดทิ้งไว้...)"
1003605-9 = "[s1] (รู้สึกเหมือนเดจาวูเลยแฮะ)\n[s2] เดินเข้าไปในประตู"
1003605-15 = "สวนหลังวิหาร สถาบันทรีนิตี้"
1003605-16 = "(พอออกมาด้านนอกประตูก็พบกับสวนขนาดใหญ่อยู่หลังวิหาร)"
1003605-17 = "(ดูเหมือนสวนนี้เป็นพื้นที่ส่วนบุคคลของทางวิหาร และคุณครูก็เห็นฮินาตะกำลังตัดแต่งต้นไม้อยู่ที่นั่น)"
1003605-18 = "ฮื้มม~ ฮืม ฮื้มม~~"
1003605-19 = "...?"
1003605-20 = "เอ๋... คุณครูเหรอคะ...?"
1003605-21 = "[s] \"ว่าไง ฮินาตะ\""
1003605-22 = "เอ่อ... สวัสดีค่ะ..."
1003605-23 = "เอ๋...?"
1003605-24 = "คุณครูเข้ามาที่นี่ได้ยังไงคะ? คนนอกเข้ามาที่นี่ได้เฉพาะเวลาเปิดทำการเท่านั้นนี่คะ..."
1003605-25 = "อ๊ะ..."
1003605-26 = "ทำไมฉันรู้สึกเหมือนเดจาวูยังไงก็ไม่รู้ค่ะ..."
1003605-27 = "หรือว่าคิดไปเองนะ...? คงจะคิดไปเองแน่เลย ชะ... ใช่มั้ยคะ? ฮะฮะฮะ..."
1003605-28 = "[s3] \"ไม่หรอก ครูก็รู้สึกเดจาวูเหมือนกัน\"\n[s4] \"ไม่ต้องห่วงนะ ครูปิดประตูให้แล้ว\""
1003605-29 = "นั่นสินะคะ ฉันรู้สึกเหมือนเดจาวูจริงๆ ค่ะ! ฉันคงเผลอเปิดประตูเอาไว้อีกแล้วสินะคะ...!"
1003605-30 = "วะ... ว่าแล้วเชียว! ก็ว่าทำไมรู้สึกเดจาวู! ฉันเผลอเปิดประตูเอาไว้อีกแล้วสินะคะ...!"
1003605-31 = "ฮืออออ! ฉันเอาแต่พลาดเรื่องเดิมอีกแล้ว...!"
1003605-32 = "[s5] \"คนอื่นเขาก็เป็นกันน่า\"\n[s6] ปลอบฮินาตะ"
1003605-33 = "ฮือ... แต่ยังไงก็เถอะค่ะ..."
1003605-34 = "ฮือ... แต่ยังไงก็เถอะค่ะ..."
1003605-35 = "อา... คุณครูปิดประตูตอนเข้ามาแล้วใช่มั้ยคะ?"
1003605-36 = "ขอบคุณนะคะคุณครู ฉันได้รับความช่วยเหลือจากคุณครูอีกแล้ว"
1003605-37 = "แต่ว่าถ้าฉันไม่ทำพลาด คุณครูก็คงไม่ได้มาที่สวนนี่หรอกใช่มั้ยคะ ฮิฮิ..."
1003605-38 = "ฉันกำลังทำอะไรอยู่งั้นเหรอคะ? ฉันกำลังดูแลสวนอยู่น่ะค่ะ"
1003605-39 = "คะ? ฉันต้องดูแลทั้งสวนเลยรึเปล่าน่ะเหรอคะ...? คิดว่าคงใช่นะคะ..."
1003605-40 = "ผู้ดูแลไม่ได้จำเป็นต้องเอาแต่จัดของอยู่แต่ในวิหารนี่คะ"
1003605-41 = "แต่ไม่ต้องเป็นห่วงหรอกนะคะ เพราะฉันไม่ได้หักโหมเหมือนแต่ก่อนแล้วค่ะ"
1003605-42 = "หากช่วงไหนมีงานเยอะ ฉันก็ขอให้ซิสเตอร์คนอื่นช่วยบ้าง... เลยทำงานสบายขึ้นกว่าเดิมเยอะเลยค่ะ"
1003605-43 = "ทั้งหมดนี้ต้องขอบคุณคุณครูนะคะ..."
1003605-44 = "งานวันนี้เป็นงานสบายๆ ที่ฉันสามารถทำคนเดียวได้ค่ะ"
1003605-45 = "ถ้าเป็นเมื่อก่อนฉันคงจะกังวลแล้วก็โหมทำงาน แต่ตอนนี้ฉันเปลี่ยนไปแล้วค่ะ"
1003605-46 = "เพราะงั้น..."
1003605-52 = "...!?"
1003605-53 = "[s7] \"แย่แล้วล่ะ...\"\n[s8] รีบวิ่งไปซ่อนในพุ่มไม้แถวนั้น"
1003605-61 = "ซิสเตอร์ฮินาตะ~ ซิสเตอร์ฮินาตะ~ อยู่รึเปล่าคะ?"
1003605-62 = "อยู่ที่นี่รึเปล่าคะ?"
1003605-63 = "เมื่อกี้ฉันยังได้ยินเสียงซิสเตอร์อยู่เลย..."
1003605-64 = "ไม่เห็นมีเลยนี่นา เธอหายไปไหนนะ...?"
1003605-66 = "คุณครูคะ คือว่า..."
1003605-67 = "แบบนี้แย่แน่ๆ เลยค่ะ ไม่นึกเลยว่าซิสเตอร์คนอื่นจะมาที่นี่ในเวลานี้..."
1003605-68 = "นอกจากนี้...คือว่า... คุณครูคะ..."
1003605-69 = "อยู่ในพุ่มไม้แบบนี้... มันแคบเกินไปนะคะ?"
1003605-73 = "นั่นอะไรคะ...?"
1003605-74 = "ฉันก็ไม่แน่ใจเหมือนกันค่ะ..."
1003605-75 = "งานเข้าแล้วค่ะ... พวกซิสเตอร์คงจะเห็นพวกเราแล้วแน่ๆ เลยค่ะ...!"
1003605-76 = "[s9] \"แล้วฮินาตะจะมาซ่อนด้วยทำไมเนี่ย?\"\n[s10] \"ครูซ่อนคนเดียวก็พอแล้วนี่นา\""
1003605-77 = "อะไรนะคะ...?"
1003605-78 = "อะไรนะคะ...?"
1003605-79 = "เอ๋...?"
1003605-80 = "นั่นสินะคะ ฉันไม่ต้องมาซ่อนก็ได้นี่นา..."
1003605-81 = "ได้ยินเสียงออกมาจากทางพุ่มไม้นั่นด้วย..."
1003605-82 = "เกิดเรื่องใหญ่แล้วค่ะ แบบนี้มีหวังโดนจับได้แน่ๆ เลยค่ะ!"
1003605-83 = "งั้นฉันจะรีบออกไปก่อนนะคะ...!!"
1003605-89 = "สะ... สวัสดีค่ะซิสเตอร์...!"
1003605-90 = "มะ...มีอะไรให้ช่วยรึเปล่าคะ...? อ่ะฮะฮะฮะ..."
1003605-91 = "ซะ... ซิสเตอร์ฮินาตะ!? ทำไมมาอยู่ตรงนี้ได้คะ...!?"
1003605-92 = "นะ... นั่นน่ะสิคะ! อ่ะฮะฮะฮะ... สงสัยฉันทำงานเพลินไปหน่อยจนไม่ได้ยินเสียงเลยค่ะ"
1003605-93 = "แล้วถ้างั้นเสียงเมื่อกี้ล่ะ...?"
1003605-94 = "มะ...ไม่มีอะไรหรอกค่ะ ว่าแต่ว่ามาหาฉันที่นี่มีเรื่องอะไรรึเปล่าคะ?"
1003605-95 = "ฉะ...ฉันยินดีช่วยทุกเรื่องเลยค่ะ! แค่บอกมาว่าฉันต้องทำอะไร หรือต้องไปที่ไหน...!"
1003605-96 = "เอ่อ... ค่ะ... เข้าใจแล้วค่ะ"
1003605-97 = "คือว่าพอดีเราต้องย้ายตู้หนังสือที่อยู่ในวิหารน่ะค่ะ"
1003605-98 = "อ๋อ! เรื่องนี้เองเหรอคะ? ฉันจะไปให้เดี๋ยวนี้เลย! ฉันจะไปช่วยยกเองค่ะ!"
1003605-103 = "(...)"
1003605-104 = "[ns] \"...\""
1003605-106 = "[ns] กลับไปชาเล่ต์"
1003605-108 = "(คุณครูลุกออกมาอย่างระมัดระวังแล้วก็รีบกลับไปที่ชาเล่ต์)"

[translation]
1003605-1 = "在草叢裡"
1003605-2 = "三一教堂內部"
1003605-3 = "（期待現在過去說不定能看到日向努力工作的身影，於是便繞道前去三一的教堂）"
1003605-4 = "（寬闊的教堂內，沒看到有任何學生）"
1003605-8 = "（看到教堂一角，有一扇稍稍敞開的門）"
1003605-9 = "[s1]（這個狀況好像有點既視感……）\n[s2] 打開門走進去"
1003605-15 = "三一教堂後方公園"
1003605-16 = "（門外通往教堂後方，一座廣闊的公園映入眼簾）"
1003605-17 = "（日向正在公園角落修剪樹木）"
1003605-18 = "哼哼～哼哼哼～♪"
1003605-19 = "……？"
1003605-20 = "咦，老師……？"
1003605-21 = "[s]「日向，早啊。」"
1003605-22 = "啊，是！早安……"
1003605-23 = "……？"
1003605-24 = "老，老師，您怎麼會來這裡……？#n一般來說，不是內部人士應該進不了這裡才對……"
1003605-25 = "……"
1003605-26 = "感覺之前好像也發生過類似的狀況……"
1003605-27 = "這應該……不是錯覺吧？"
1003605-28 = "[s3]「嗯，我也覺得不是。」\n[s4]「總之我有關上門了，目前沒問題了。」"
1003605-29 = "果，果然是那樣嗎！？#n我又放著門沒關……！"
1003605-30 = "果，果然是那樣嗎！？#n我又放著門沒關……！"
1003605-31 = "嗚嗚……我竟然犯了同樣的失誤……！"
1003605-32 = "[s5]「人有時候就是會這樣啦。」\n[s6] 安慰日向"
1003605-33 = "為什麼我老是這樣……"
1003605-34 = "為什麼我老是這樣……"
1003605-35 = "啊，話說回來老師有幫我關門對吧。謝謝老師。"
1003605-36 = "我老是受到老師幫助……"
1003605-37 = "該怎麼答謝您才好呢……"
1003605-38 = "……啊，是。就如稍早聯絡的一樣，我正在進行公園的管理工作。"
1003605-39 = "……？#n啊，是。這也是我負責的地方。"
1003605-40 = "我負責的範圍不光是教堂內部，也包括周遭的各種雜務……"
1003605-41 = "啊，但是不用擔心！#n我已經比之前還了解休息的重要了。"
1003605-42 = "事情太多的時候，我也會請其他修女幫忙……心情也比以前輕鬆很多了。"
1003605-43 = "……這都多虧了老師和大家。"
1003605-44 = "今天的事情是真的很輕鬆，所以才會由我一個人做。"
1003605-45 = "心情也非常的祥和。#n或許我多少也有一些改變了吧……！"
1003605-46 = "所以，那個……"
1003605-52 = "……！？"
1003605-53 = "[s7]「……啊。我不該待在這裡。」\n[s8] 馬上躲進附近的草叢"
1003605-61 = "日向修女？你在這裡嗎？"
1003605-62 = "嗯？他應該在這裡才對呀……？"
1003605-63 = "就是啊，剛剛也有聽到他的聲音……"
1003605-64 = "奇怪，到底去哪了呢……？"
1003605-66 = "哎呀……"
1003605-67 = "真，真傷腦筋。#n沒想到這個時間竟然會有其他人來這裡……"
1003605-68 = "老師，那個……"
1003605-69 = "這座草，比想像中還擠……"
1003605-73 = "……？#n好像有東西在動……？"
1003605-74 = "真，真的嗎……？"
1003605-75 = "要，要被發現了……！？"
1003605-76 = "[s9]「……仔細想想，日向不用跟著躲起來吧？」\n[s10]「我一個人躲起來不就行了嗎……？」"
1003605-77 = "……"
1003605-78 = "……"
1003605-79 = "……咦？"
1003605-80 = "確，確實如此……"
1003605-81 = "那邊的草叢果然有發出聲音……"
1003605-82 = "嗚，他們果然往這邊來了……！"
1003605-83 = "總，總之我馬上出去……！！"
1003605-89 = "兩，兩位好……！"
1003605-90 = "請，請問有什麼事呢……？"
1003605-91 = "日，日向修女，你怎麼會在草叢裡……？"
1003605-92 = "那是……因為我看到了令人在意的雜草，耶嘿嘿……"
1003605-93 = "這，這樣啊……"
1003605-94 = "對，對了，兩位找我有什麼事嗎！？#n是不是哪裡需要我幫忙……！？"
1003605-95 = "任，任何事都可以！在哪裡？請問我要去哪裡幫忙？我們趕快走吧！！"
1003605-96 = "啊，那就麻煩你了……"
1003605-97 = "其實是因為我們必須移動教堂的書架，希望你能來幫忙……"
1003605-98 = "原，原來如此！我當然願意幫忙！#n只要各位不嫌棄的話，我什麼忙都可以幫！"
1003605-103 = "（……）"
1003605-104 = "[ns]「……」"
1003605-106 = "[ns] 總之在不被發現的情況下偷偷回去"
1003605-108 = "（之後悄悄離開公園，回到了夏萊）"

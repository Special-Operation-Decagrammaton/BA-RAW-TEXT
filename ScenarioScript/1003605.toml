1003605-35 = "2;히나타;02;……아. 문은 선생님께서 대신 닫아 주신 거군요."
1003605-36 = "2;히나타;03;감사합니다, 선생님. 또 선생님의 도움을 받았네요.\n#2;em;[반짝]\n#2;greeting"
1003605-37 = "2;히나타;04;무, 물론 선생님께서 여기 계신 것부터가 저에겐 실책이긴 하지만……. 아하하……."
1003605-38 = "2;히나타;02;……음? 저요? 저야 아까도 말씀드렸듯, 공원을 관리하고 있었답니다."
1003605-39 = "2;히나타;00;네? ……전부 다 제가 담당하냐고요? 뭐, 일단은 그렇죠……?\n#2;em;[?]"
1003605-40 = "2;히나타;01;관리 담당자라는 게, 꼭 성당 안의 비품들만 취급하는 건 아니니까요."
1003605-41 = "2;히나타;02;아. 하지만 걱정 마세요. 이젠 무리하게 전부 다 제가 끌어안진 않으니까요."
1003605-42 = "2;히나타;99;일이 많을 때라면 다른 자매님께 부탁드리기도 하고……. 전보다 많이 편해졌어요."

1003605-26 = "2;히나타;05;뭔가 지금……. 약간 기시감이 드는 것 같은데……."
1003605-27 = "2;히나타;03;기분 탓……일까요? 기분 탓이겠죠, 역시? 아하하하하…….\n#2;em;[///]"
1003605-28 = "[s3] \"아니. 나도 마찬가지야.\"\n[s4] \"걱정 마. 이번에는 문 닫고 왔으니까.\""
1003605-29 = "2;히나타;04;여, 역시! 역시 그런 거였군요!! 저 또 문을 열어놓고 와서……!\n#2;em;[!]\n#2;shake"

[translation]
84301300101-5 = "เมื่อกี้มันเรื่องเลวร้ายชัดๆ..."
84301300101-6 = "......"
84301300101-7 = "อ่า แหะๆๆ..."
84301300101-8 = "ตะ... แต่ถึงยังไง จระเข้ก็... น่ารักดีนะ! ฉันคิดว่าดีแล้วละที่ไปกัน!"
84301300101-9 = "จริงจังใช่มั้ยเนี่ย...?"
84301300101-10 = "บางครั้งความเมตตาก็ทำร้ายได้มากกว่าปืนนะ ไอริ"
84301300101-11 = "หมายถึงกับจระเข้เหรอ? หรือว่ากับฉัน?"
84301300101-12 = "ถามอะไรอย่างนั้นน่ะ..."
84301300101-14 = "ไม่มีความโรแมนติกเอาซะเลยนะ..."

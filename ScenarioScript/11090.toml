[translation]
11090-2 = "Episode 9;Unrelenting Blood Feud"
11090-3 = "Take care on your way home!"
11090-4 = "Good luck with your business!"
11090-5 = "Haha! Same to you guys! Good luck with revitalizing your school.#nI'll be cheering you on!"
11090-6 = "Bye-bye!"
11090-9 = "Heh... What great kids, yeah?"
11090-10 = "..."
11090-11 = "..."
11090-12 = "Aru. Didn't those uniforms look familiar to you?"
11090-13 = "Huh? No. Why?"
11090-14 = "Those were Abydos students."
11090-16 = "What did you say?!"
11090-18 = "Hahaha! You should see the look on your face."
11090-19 = "Did you really not know?"
11090-20 = "B-But doesn't that mean they're our targets? Sh-Should I go back inside and snuff them out?"
11090-21 = "Haha. It's a little late for that. We're gonna raid 'em in a bit anyway,#nso save it for then, Haruka."
11090-22 = "Y-You're serious... They're the ones from Abydos? Ugh. Ah...#nWhy is fate such a cruel mistress?"
11090-23 = "What's wrong, Aru? Isn't it time for us to get to work?"
11090-24 = "The hired muscle is waiting for instructions."
11090-25 = "Do we gotta...? Do we have to wipe them out this second?"
11090-26 = "Looks like our sweet little Aru is being torn apart."
11090-27 = "What happened to doing the crime as long as the client has the dime? Problem Solver 68 doesn't let emotions get in the way, so what's going on?"
11090-28 = "I-I know that, but..."
11090-29 = "(She really is conflicted right now.)"
11090-30 = "I gotta pull myself together! What kind of executive would I be if I can't do a simple job like this?"
11090-32 = "Let's do it! Round up the muscle!"
11090-38 = "Hey. What took you so long?"
11090-39 = "Just taking care of business. I trust you're all prepared?"
11090-40 = "Whatever you say. Just remember we're clocking out on the dot.#nEspecially since you were stingy with our pay."
11090-41 = "We can leave the fine print for later. Let's get going! Time to attack Abydos!"
11090-43 = "Let's move!"
11090-44 = "*sigh*"
11090-45 = "I-I won't let you down, Aru!"
11090-47 = "We'll crush them to dust!"
11090-49 = "I'm reading a large armed group 15 kilometers south of campus!"
11090-50 = "What? Is it the Helmet Gang again?"
11090-51 = "N-No! It's not them."
11090-52 = "They look like mercenaries! Someone must have hired them to attack!"
11090-53 = "What'd they do, pick them up from Thugs Depot at the crack of dawn?#nIt must have cost a fortune to hire that many of them."
11090-54 = "We can't allow them to get any closer! Sensei, give us the order to move out!"
11090-55 = "[s] \"It's showtime.\""
11090-57 = "I've got eyes on a squad leading those goons up ahead!"
11090-58 = "Wait. Aren't those the girls we met at the ramen shop?"
11090-59 = "U-Urgh..."
11090-60 = "You guys are the ones attacking us?! After I gave you all that extra ramen?! You ungrateful pricks!"
11090-61 = "Heehee! I really did appreciate that, but it doesn't matter.#nThis is business, not personal."
11090-62 = "Agreed. It's regrettable, but business is business. We have to uphold our contract."
11090-63 = "So you're fixers, then."
11090-65 = "What kind of job is that for girls your age?! Shouldn't you be working normal part-time jobs?"
11090-66 = "It's not a part-time job! This is a real, respectable business!#nWith job titles and everything!"
11090-67 = "And I'm the boss!"
11090-68 = "She's the chief of staff."
11090-69 = "And this here is the department head."
11090-70 = "Please. The title isn't nearly as impressive as you make it out to be."
11090-73 = "So, who hired you? No... Why am I even asking?"
11090-74 = "We could always get it out of you by force."
11090-75 = "Haha. Good luck. We don't spill trade secrets."
11090-76 = "Get 'em, girls!"

[translation]
11090-2 = "第9話;背信棄義的血鬥"
11090-3 = "5;알바茜香;03;那麼，路上小心哦！"
11090-4 = "祝你們工作順利！"
11090-5 = "啊哈哈！好！你們也加油重振學校唷！#n我也會替你們加油的！"
11090-6 = "再見！"
11090-9 = "呼……真是一群不錯的人呢。"
11090-10 = "……"
11090-11 = "……"
11090-12 = "社長。#n……你有注意到他們的制服嗎？"
11090-13 = "咦？制服怎麼了嗎？"
11090-14 = "那些是阿拜多斯的人哦。"
11090-16 = "什什什什，什，什麼────！！！？？？"
11090-18 = "啊哈哈哈哈，反應有夠好笑～"
11090-19 = "唉……真的完全沒注意到啊……"
11090-20 = "咦？這，這麼說來，他們就是我們的目標嗎？#n需，需要我去除掉他們嗎！？"
11090-21 = "啊哈哈哈。現在才說有點晚了。#n反正等一下就要去襲擊，到時候再大鬧一番吧，遙香醬。"
11090-22 = "騙，騙人的吧……那些孩子竟然是阿拜多斯……？#n嗚，嗚嗚……命運為什麼要開這種玩笑……"
11090-23 = "走吧亞瑠醬，該去工作囉？"
11090-24 = "那些傭兵都在等我們的命令。"
11090-25 = "真的嗎……？#n我現在要……對那些孩子……"
11090-26 = "啊哈哈，對善良的亞瑠醬來說，這種情況可能很難受吧～"
11090-27 = "「不受人情所困」、「只要有錢就使命必達」是我們便利屋68的宗旨。#n事到如今還在煩惱什麼？"
11090-28 = "話，話雖如此……"
11090-29 = "（看來完全無法接受……）"
11090-30 = "這，這樣下去不行，亞瑠！#n身為企業之長不能再這樣下去！"
11090-32 = "走吧！召集人力！ "
11090-38 = "搞什麼啊～這麼晚才來。"
11090-39 = "有點雜事。準備好了吧？"
11090-40 = "那當然。做什麼都可以，但是不加班哦。 #n畢竟時薪都砍半了。"
11090-41 = "現在不要在意那種小細節！ #n好，走吧！去襲擊阿拜多斯！"
11090-43 = "出動～！"
11090-44 = "唉……"
11090-45 = "亞瑠大人！我，我會努力的！"
11090-47 = "一點不留，全部處理乾淨！"
11090-49 = "已確認學校南方15km處有大規模兵力聚集！ "
11090-50 = "聚集？是頭盔團嗎？"
11090-51 = "不，並不是頭盔團！"
11090-52 = "……是傭兵！也許是兼職傭兵！"
11090-53 = "唔嘿～傭兵啊。應該不便宜吧。"
11090-54 = "再繼續接近的話很危險！ #n老師，請下達出動命令！"
11090-55 = "[s] 「出動──！」"
11090-57 = "已確認在前方率領傭兵的組織了！ "
11090-58 = "咦……是在拉麵店見過的……？"
11090-59 = "嗯，嗯……"
11090-60 = "我還想說是誰呢，原來是你們嗎！#n明明連拉麵都免費幫你們加大了還襲擊我們，這些忘恩負義的傢伙！！"
11090-61 = "啊哈哈哈，那時候謝謝你。#n不過就事論事，我們也是在工作。"
11090-62 = "雖然遺憾，但公私得要分明。#n接下的委託必須確實執行。"
11090-63 = "……原來如此。#n工作指的就是便利屋啊。"
11090-65 = "真是的！學生不是應該要做正規一點的打工嗎？ #n偏偏做什麼便利屋！"
11090-66 = "這，這才不是打工！是正兒八經的公司！我們每個人都有自己的職稱！"
11090-67 = "我是社長！"
11090-68 = "這位是室長……"
11090-69 = "而這位是課長……"
11090-70 = "唉……社長。#n這種時候說這些不是更難堪了嗎……"
11090-73 = "是誰指使的？#n……不，想也知道不會回答吧。"
11090-74 = "（喀嚓）只能強行拷問了。"
11090-75 = "哼哼哼，那當然是商業機密囉？"
11090-76 = "全員！攻擊！"

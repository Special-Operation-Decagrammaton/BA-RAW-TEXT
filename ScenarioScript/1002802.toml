[translation]
1002802-1 = "明日奈的生態"
1002802-2 = "（總覺得有點擔心明日奈，而去了自助洗衣店）"
1002802-5 = "（不過也因為已經深夜了，周圍安靜得鴉雀無聲）"
1002802-6 = "（嗡嗡嗡……）"
1002802-7 = "（洗衣店裡傳來了洗衣機運轉的聲音。）"
1002802-8 = "[s] 往發出聲音的地方查看"
1002802-15 = "……嗯？"
1002802-16 = "剛剛好像有什麼聲音……？"
1002802-17 = "[s1] 「……明日奈？」\n[s2] 「辛苦了。」"
1002802-18 = "……？"
1002802-19 = "……？"
1002802-22 = "― 咦？這時間有什麼事？主人？[wa:3520] "
1002802-25 = "― ……我？如同你所看到的我當然是來洗衣服啊！[wa:2650] "
1002802-28 = "― ……你問我來洗衣服為什麼是這個模樣？[wa:1970] "
1002802-31 = "― 那當然是因為全部都丟去洗了啊。[wa:2340] "
1002802-33 = "― 因為連內衣都丟進去了，所以沒有其他衣服能穿──？[wa:1530] "
1002802-36 = "― 咦──，我沒有騙人啊～[wa:2290] "
1002802-38 = "― 那要親眼確認看看嗎？[wa:2000] "
1002802-41 = "[ns3] 「……！？」\n[ns4] 「不要那麼輕易地說這種話啊……」"
1002802-44 = "― 啊哈哈，臉紅了！[wa:1470] "
1002802-46 = "― 不過主人來這邊要做什麼？[wa:1510] "
1002802-49 = "― ……嗯？是來看我的？這個時間？[wa:2690] "
1002802-52 = "― 好開心！我正好覺得一個人好無聊！[wa:3140] "
1002802-54 = "― 謝謝你，主人！！那，要玩什麼呢？[wa:3010] "
1002802-59 = "呵呵，其實我沒想到會在這種地方遇到主人呢──"
1002802-60 = "該不會是因為剛剛傳的訊息擔心我了吧？抱歉呢，謝謝你！"
1002802-61 = "呀──，幸好有聯絡──"
1002802-62 = "……！"
1002802-63 = "……"
1002802-64 = "[s5] 「……明日奈？」\n[s6] 「怎麼突然表情這麼嚴肅？」"
1002802-65 = "唔嗯……不，等一下……"
1002802-66 = "唔嗯……不，等一下……"
1002802-67 = "突然感覺好像是我命令了老師一樣……！？"
1002802-68 = "[s7] 「……命令？」\n[s8] 「不用那麼在意啦……」"
1002802-69 = "嗯，覺得情況反過來了呢──！"
1002802-70 = "啊哈哈哈。嗯，謝啦。我只是想說說看而已！"
1002802-71 = "是說，我那樣暗示你就來了呢。我有這麼令人擔心嗎？"
1002802-72 = "……啊，還沒啟動洗衣機！"
1002802-79 = "（明日奈匆忙地把洗衣籃子裡的衣服，放入洗衣機裡）"
1002802-84 = "（迅速弄好後，明日奈的洗衣機也開始轉動了）"
1002802-87 = "呼呼～嗯，洗好了♪"
1002802-88 = "唔嗯，不過下次還是不要在晚上，在白天聯絡你比較好吧？"
1002802-89 = "老師也是要睡覺的嘛。對吧？"
1002802-90 = "……嗯？"
1002802-91 = "明日奈也會在老師需要時出現，所以老師也早就想做同樣的事情了？"
1002802-92 = "……"
1002802-93 = "好厲害！講出來之後，不覺得我們的關係很厲害嗎！？"
1002802-94 = "嗯？這樣的關係是什麼關係？"
1002802-95 = "互相叫對方就會出來的關係，是很厲害的關係吧！"
1002802-96 = "好──，那主人有需要的時候，明日奈也會隨傳隨到！像是在洗衣服很閒的時候！"
1002802-97 = "或是今後全部讓明日奈幫你一起洗，要嗎？那樣比較方便吧？"
1002802-98 = "……嗯？沒關係，先不用？"
1002802-99 = "耶──幹嘛一臉害羞？啊哈哈，真可愛！"
1002802-100 = "和主人在一起真開心，哈哈哈哈哈！"
1002802-102 = "（之後和明日奈一直坐著聊天，直到衣服洗好還聊了好長一段時間）"
1002802-103 = "（……然後返回夏萊時，已經天亮了）"

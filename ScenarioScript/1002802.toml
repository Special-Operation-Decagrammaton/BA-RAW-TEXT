[translation]
1002802-1 = "สิ่งที่ต้องทำในตอนกลางดึก"
1002802-2 = "(คุณครูรู้สึกกังวลเพราะไม่รู้ว่าอาสึนะจะก่อเรื่องอะไรขึ้นบ้าง จึงมาที่ร้านซักผ้าหยอดเหรียญ)"
1002802-5 = "(ถึงจะเป็นร้านซักผ้าหยอดเหรียญที่เปิดตลอด 24 ชั่วโมง แต่เนื่องจากดึกมากแล้วบริเวณรอบๆ จึงเงียบสงัด)"
1002802-6 = "กึงงงง..."
1002802-7 = "(ได้ยินเสียงเครื่องซักผ้าที่เปิดใช้งานจากด้านในร้าน)"
1002802-8 = "[s] เดินไปทางต้นทางของเสียง"
1002802-15 = "หืม...?"
1002802-16 = "เมื่อกี้เสียงอะไรน่ะ...?"
1002802-17 = "[s1] \"อาสึนะ...?\"\n[s2] \"อยู่ที่นี่จริงๆ ด้วย\""
1002802-18 = "...?"
1002802-19 = "...?"
1002802-22 = "― เอ๊ะ? ดึกขนาดนี้แล้ว มีอะไรรึเปล่า นายท่าน?[wa:2320] "
1002802-25 = "― ฉันเหรอ? อย่างที่เห็น ฉันมาซักผ้าน่ะสิ![wa:1930] "
1002802-28 = "― หืม...? แค่มาซักผ้า ทำไมต้องใส่ชุดนี้ด้วยน่ะเหรอ?[wa:730] "
1002802-31 = "― ก็เพราะว่า ชุดอื่นๆ ที่มี ฉันเอามาซักหมดแล้วไงล่ะ[wa:980] "
1002802-33 = "― พวกชุดชั้นในก็เอามาซักหมดเลยด้วย ไม่มีเหลือสักชุดเลยละ[wa:330] "
1002802-36 = "― เอ๋~ ไม่ได้โกหกสักหน่อย![wa:1770] "
1002802-38 = "― ถ้างั้นนายท่านจะพิสูจน์ให้เห็นกับตาเลยมั้ย?[wa:680] "
1002802-41 = "[ns3] \"ไม่เอาๆ ไม่ๆ ครูผิดไปแล้ว\"\n[ns4] \"มาซักผ้าเฉยๆ จริงสินะ\""
1002802-44 = "― ฮ่าฮ่าฮ่า หน้าแดงแจ๋เลย![wa:830] "
1002802-46 = "― ว่าแต่ว่านายท่านมาที่นี่ทำไมเหรอ?[wa:670] "
1002802-49 = "― ...หืม? มาหาฉันงั้นเหรอ? ดึกป่านนี้แล้วเนี่ยนะ?[wa:1410] "
1002802-52 = "― ดีจัง! ฉันกำลังเบื่อๆ เพราะต้องอยู่คนเดียวพอดีเลย![wa:1780] "
1002802-54 = "― ขอบคุณนะ นายท่าน!! เอาละ ถ้างั้น... เราจะเล่นอะไรกันดี?[wa:1450] "
1002802-59 = "ที่จริงฉันไม่คิดเลยนะว่าจะได้เจอกับนายท่านที่นี่"
1002802-60 = "หรือว่ามาเพราะข้อความที่ฉันส่งไปเหรอ? เพราะแบบนั้นใช่มะ? ฉันส่งไปได้ถูกจังหวะเลยใช่ม้า?"
1002802-61 = "พอนายท่านได้รับข้อความแล้วก็..."
1002802-62 = "...!"
1002802-63 = "ฮึ่ม..."
1002802-64 = "[s5] \"อาสึนะ...?\"\n[s6] \"ทำไมจู่ๆ ทำหน้าบูดแบบนั้นล่ะ!?\""
1002802-65 = "อืม... ฉันก็แค่..."
1002802-66 = "อืม... ฉันก็แค่..."
1002802-67 = "ดูเหมือนจู่ๆ ฉันจะเผลอ \"คอล\" นายท่านออกมาน่ะ เลยรู้สึกผิดนิดหน่อย"
1002802-68 = "[s7] \"คอล...?\"\n[s8] \"เราไม่ได้มาทำภารกิจอะไรกันสักหน่อย...\""
1002802-69 = "อื้อ จริงสิ ถ้ามีสัญญาณคอลไปก็ต้องตอบกลับสินะ!"
1002802-70 = "ฮ่ะฮ่ะฮ่า! ใช่มั้ยล่ะ คงเป็นแบบนั้นใช่มั้ย"
1002802-71 = "ฉันรู้สึกแบบนั้นล่ะ ถึงจะพูดอ้อมโลกก็เถอะ แต่นายท่านรู้ว่าเป็นสัญญาณจากฉันก็เลยตรงมาที่นี่#nเลยสินะ"
1002802-72 = "อ๊ะ จริงด้วย...!! ต้องไปเอาผ้าใส่เครื่องก่อน ฉันนี่น้า..."
1002802-79 = "(อาสึนะหยิบผ้าในตะกร้าออกมาใส่เครื่อง ก่อนจะกดปุ่มเริ่มซัก)"
1002802-84 = "(จากนั้นเครื่องซักผ้าก็เริ่มทำงานเหมือนกับเครื่องอื่นๆ ที่ตั้งอยู่ใกล้เคียงกัน)"
1002802-87 = "อืม..."
1002802-88 = "แต่ถ้ารู้ว่าเรียกไปแล้วนายท่านจะรีบมาทันทีแบบนี้ เอาไว้เรียกตอนกลางวันดีกว่า"
1002802-89 = "นายท่านเองก็ต้องพักผ่อนใช่มั้ยล่ะ"
1002802-90 = "หืม...?"
1002802-91 = "เวลาที่นายท่านต้องการ อาสึนะก็ไปหาทันทีเหมือนกัน เพราะงั้นนายท่านก็เลยทำเหมือนกันงั้นเหรอ?"
1002802-92 = "โอ้..."
1002802-93 = "สุดยอดเลย!! พวกเรามีความสัมพันธ์กันแบบนั้นเหรอ? หืม? ใช่มั้ยนายท่าน?"
1002802-94 = "หืม? ฉันหมายถึงความสัมพันธ์แบบไหนน่ะเหรอ?"
1002802-95 = "เมื่อกี้นายท่านพูดเองไม่ใช่เหรอ? ว่าเป็นความสัมพันธ์ที่ถ้าฝ่ายใดฝ่ายหนึ่งเรียกก็จะมาเจอกันทันที"
1002802-96 = "ถ้างั้นเวลาที่นายท่านซักผ้า แล้วเรียกอาสึนะไปหา อาสึนะก็จะรีบไปหานายท่านทันทีเลย!"
1002802-97 = "หรือไม่งั้นก็เอามาซักพร้อมกับของอาสึนะก็ได้นะ เอาแบบนั้นดีมั้ย? แบบนั้นสบายกว่าใช่มั้ยล่ะ?"
1002802-98 = "ไม่เป็นไรงั้นเหรอ? นายท่านทำให้อาสึนะเข้าใจผิดงั้นเหรอ?"
1002802-99 = "ฮ่ะฮ่ะฮ่า! จะขอโทษทำไมเล่า? เดาความคิดนายท่านไม่ถูกเลยน้า~ สนุกจัง!"
1002802-100 = "ฮ่ะฮ่ะฮ่ะฮ่าา!!"
1002802-102 = "(หลังจากอาสึนะซักผ้าเสร็จแล้ว คุณครูกับอาสึนะก็นั่งคุยกันต่ออย่างสนุกสนาน)"
1002802-103 = "(...และเมื่อถึงเวลาที่คุณครูกลับมาที่ชาเล่ต์ ก็พบว่าเป็นเวลาที่พระอาทิตย์ขึ้นพอดี...)"

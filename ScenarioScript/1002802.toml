[translation]
1002802-1 = "What We Do Late at Night"
1002802-2 = "I headed for the laundromat, worried Asuna was going to create a scene."
1002802-5 = "It was a 24-hour laundromat, but it was quiet so late at night."
1002802-6 = "*whir*"
1002802-7 = "I heard the sound of washing machines running in the laundromat."
1002802-8 = "[s] Head to where the sound is coming from."
1002802-15 = "Huh?"
1002802-16 = "Did I hear something just now...?"
1002802-17 = "[s1] \"...Asuna?\"\n[s2] \"So you really were here.\""
1002802-18 = "...?"
1002802-19 = "...?"
1002802-22 = "― Huh? What are you doing at this hour, Master?[wa:2240] "
1002802-25 = "― Me? Isn't it obvious? I'm here to do laundry![wa:1690] "
1002802-28 = "― ...Why am I dressed like this to do laundry?[wa:930] "
1002802-31 = "― It's because everything else is being washed.[wa:1140] "
1002802-33 = "― I'm washing all my underwear right now, so I have nothing else.[wa:10] "
1002802-36 = "― What? I'm not lying![wa:1930] "
1002802-38 = "― Want to see for yourself?[wa:1400] "
1002802-41 = "[ns3] \"No, no. My mistake.\"\n[ns4] \"You really were here just to do laundry.\""
1002802-44 = "― Hahaha. Your face is red![wa:790] "
1002802-46 = "― But why are you here, Master?[wa:830] "
1002802-49 = "― Huh? You're here to see me? At this hour?[wa:1650] "
1002802-52 = "― Awesome! I was getting bored by myself![wa:2220] "
1002802-54 = "― Thank you, Master! So, what should we play?[wa:1930] "
1002802-59 = "I honestly wasn't expecting to meet you here!"
1002802-60 = "Did you come here because of the message I sent you earlier? That's it, right? Did I do good?"
1002802-61 = "You got the message and..."
1002802-62 = "...!"
1002802-63 = "Hmm."
1002802-64 = "[s5] \"...Asuna?\"\n[s6] \"Why do you suddenly look so serious?\""
1002802-65 = "No, it's just..."
1002802-66 = "No, it's just..."
1002802-67 = "It feels like maybe I summoned you out of nowhere. I feel a little bad now."
1002802-68 = "[s7] \"...Summoned?\"\n[s8] \"I mean, it's not like this is a mission or anything.\""
1002802-69 = "I guess when you hear your call sign, you have to respond!"
1002802-70 = "Hahaha! Yeah, you've got a point."
1002802-71 = "That's just how it feels to me. Even though I kind of danced around it, you recognized what I wanted and came straight here."
1002802-72 = "Oh, that's right! I have to start the washing machine. Silly me."
1002802-79 = "Asuna threw the laundry from her laundry basket into the washing machine and pressed the button."
1002802-84 = "Asuna's washing machine began running like the others beside hers."
1002802-87 = "Hmm..."
1002802-88 = "But if I knew you'd really come running like this, I would've called during the day."
1002802-89 = "You have to sleep too, don't you?"
1002802-90 = "Huh?"
1002802-91 = "You came for me because I would also come for you if you needed me?"
1002802-92 = "Oh dear."
1002802-93 = "That's amazing! Is that the kind of relationship we're in? Huh? Is it, Master?"
1002802-94 = "What kind of relationship am I talking about?"
1002802-95 = "You said it yourself, Master! The kind where if we call each other, we show up."
1002802-96 = "Then whenever you're doing the laundry, you can call me too. I'll come at any hour of the day!"
1002802-97 = "Or, whenever I do laundry, I can do both of ours together. You'd like that, right?"
1002802-98 = "You're fine? You gave me the wrong idea?"
1002802-99 = "Hahaha! Why are you apologizing? I love how I never know what you'll say!"
1002802-100 = "Hahahaha!"
1002802-102 = "Even after Asuna was done with her laundry, we continued to sit and talk."
1002802-103 = "And when I returned to Schale, the sun was already rising."

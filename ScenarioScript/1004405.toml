[translation]
1004405-1 = "Stars on the Sand"
1004405-2 = "I couldn't sleep, so I went out to get some air."
1004405-5 = "Everyone was asleep, and all I could hear was crickets."
1004405-9 = "[ns1] \"Is someone awake?\"\n[ns2] Go to where the sound came from."
1004405-15 = "I was wondering if it was you."
1004405-16 = "[s3] \"Oh, of course.\"\n[s4] \"That voice...!\""
1004405-22 = "Heeheehee. I was hiding to surprise you!"
1004405-23 = "Why are you outside at this hour?"
1004405-24 = "Are you doing something...?"
1004405-25 = "[s5] \"I followed you outside.\"\n[s6] \"I wanted to get some air.\""
1004405-26 = "Hmm... You're weird, Sensei."
1004405-27 = "Hmm... I'll believe you."
1004405-28 = "Heehee. It's been hard to fall asleep these days."
1004405-32 = "Maybe a walk will help!"
1004405-37 = "Yup, yup!"
1004405-38 = "Um..."
1004405-39 = "[s7] \"...Nonomi?\"\n[s8] \"What's up?\""
1004405-44 = "Oh, it's nothing."
1004405-45 = "I was just...thinking about why I can't sleep these days."
1004405-46 = "It feels like..."
1004405-47 = "I don't know why, but...I feel like sleeping is a waste."
1004405-48 = "When I fall asleep, tomorrow comes so fast! I feel like I'm losing so much time..."
1004405-49 = "It's been so fun here. I think that's why I'm sad about losing time."
1004405-50 = "I'm speaking nonsense. Haha..."
1004405-51 = "Huh?"
1004405-52 = "Where are you going?"
1004405-53 = "What do you want to show me?"
1004405-54 = "But the beach is that way."
1004405-55 = "It's late. It might not be safe so far from the resort!"
1004405-56 = "Hm?"
1004405-57 = "You're my guardian, so it's okay?"
1004405-61 = "...That's true."
1004405-67 = "All right, I'll follow my guardian!"
1004405-72 = "We're on the beach! At night!"
1004405-76 = "It's nice and cool out here. You can really feel the breeze."
1004405-77 = "No one else lives on this island...so there are no lights, and the stars are shining brighter than ever."
1004405-81 = "Sensei?"
1004405-82 = "[s] \"...Nonomi.\""
1004405-84 = "[ns9] \"Look over there.\"\n[ns10] \"There are stars there too.\""
1004405-88 = "...?"
1004405-93 = "...!!!"
1004405-96 = "― Look, Sensei! It's sparkling![wa:2010] "
1004405-98 = "― The ocean looks like the night sky![wa:200] "
1004405-101 = "― Did you..."
1004405-103 = "― bring me here to show me this?[wa:640] "
1004405-106 = "― Come to think of it...[wa:110] "
1004405-108 = "― I think I saw this on the pamphlet.[wa:410] "
1004405-111 = "― \"The plankton sparkle like stars at night...\"[wa:2350] "
1004405-113 = "― It's so beautiful.[wa:1300] "
1004405-116 = "[ns11] \"Are you satisfied?\"\n[ns12] \"Do you feel a bit better?\""
1004405-117 = "― Heehee. Maybe?[wa:4820] "
1004405-118 = "― Heehee. Maybe?[wa:4820] "
1004405-121 = "― I'm kidding.[wa:1110] "
1004405-123 = "― I should be able to sleep well tonight.[wa:50] "
1004405-126 = "― Thank you, Sensei.[wa:1670] "
1004405-128 = "― Today's been like a dream.[wa:640] "
1004405-131 = "― Well... I'm glad I got to come to this island.[wa:1030] "
1004405-134 = "― But, just a little bit more...[wa:1720] "

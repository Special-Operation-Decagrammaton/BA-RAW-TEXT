[translation]
1004405-1 = "ดาวบนหาดทราย"
1004405-2 = "(คุณครูนอนไม่หลับเลยลุกออกมาสูดอากาศบริสุทธิ์...)"
1004405-5 = "(อาจเพราะเป็นกลางดึกที่ทุกคนหลับหมดแล้ว บริเวณรอบๆ เลยเงียบสงัด ได้ยินเพียงเสียงแมลง#nตัวเล็กๆ ร้องเท่านั้น)"
1004405-9 = "[ns1] \"ยังมีใครตื่นอยู่อีกเหรอ...?\"\n[ns2] เดินไปตามทางที่ได้ยินเสียง"
1004405-15 = "คิดแล้วเชียวว่าต้องเป็นคุณครู"
1004405-16 = "[s3] \"ว่าแล้วเชียว...\"\n[s4] \"เสียงนี้มัน...!\""
1004405-22 = "ฮิฮิฮิ ฉันมาแอบตรงนี้ เพราะตั้งใจจะทำให้คุณครูตกใจน่ะค่ะ♡"
1004405-23 = "ดึกแบบนี้ออกมาทำอะไรเหรอคะ?"
1004405-24 = "มีงานอะไรที่ต้องทำงั้นเหรอคะ...?"
1004405-25 = "[s5] \"ครูตามโนโนมิมาไงล่ะ\"\n[s6] \"ครูแค่ออกมารับลมนิดหน่อยน่ะ\""
1004405-26 = "อืม... อย่างนั้นเหรอคะ"
1004405-27 = "อืม... อย่างนั้นเหรอคะ"
1004405-28 = "ฮิฮิ ที่จริงแล้วฉันนอนไม่ค่อยหลับน่ะค่ะ"
1004405-32 = "ถ้างั้นไหนๆ ก็ออกมาแล้ว เราไปเดินเล่นกันมั้ยคะ?"
1004405-37 = "อืม..."
1004405-38 = "อืม....."
1004405-39 = "[s7] \"โนโนมิ...?\"\n[s8] \"มีอะไรเหรอ?\""
1004405-44 = "ปะ... เปล่าค่ะ ไม่มีอะไรหรอกค่ะ"
1004405-45 = "ก็แค่... ฉันกำลังคิดว่าทำไมตัวเองถึงนอนไม่หลับน่ะค่ะ"
1004405-46 = "จะว่ายังไงดีนะ... คงเป็นเรื่องความรู้สึกน่ะค่ะ"
1004405-47 = "ฉันไม่รู้ว่าเพราะอะไรเหมือนกัน... มันรู้สึกเหมือน... เสียดาย...?"
1004405-48 = "ถ้าวันนี้หลับไป พอตื่นมามันก็จะกลายเป็นพรุ่งนี้ไปแล้ว เลยรู้สึกเหมือนกับเวลาหายไปอีกหนึ่งวัน..."
1004405-49 = "ตั้งแต่มาที่นี่ฉันรู้สึกสนุกมากๆ ในทุกนาที อาจเป็นเพราะแบบนั้นเลยทำให้รู้สึกเสียดายน่ะค่ะ"
1004405-50 = "ฉันเป็นคนพูดเองแท้ๆ แต่ก็ยังไม่ค่อยเข้าใจในสิ่งที่ตัวเองพูดเลยค่ะ แหะๆ..."
1004405-51 = "หืม...?"
1004405-52 = "คุณครู จู่ๆ จะไปไหนเหรอคะ?"
1004405-53 = "มีบางอย่างที่อยากให้ฉันดูงั้นเหรอคะ?"
1004405-54 = "แต่ทางนั้นมันทางไปชายหาดนะ..."
1004405-55 = "นี่ก็ดึกมากแล้ว ถ้าจะไปถึงตรงนั้นมันไม่ไกลเกินไปหน่อยเหรอคะ? ฮิฮิฮิ..."
1004405-56 = "คะ...?"
1004405-57 = "คุณครูเป็นผู้ปกครองของฉัน ก็เลยไม่เป็นไรงั้นเหรอคะ?"
1004405-61 = "นั่นสินะคะ..."
1004405-67 = "ดีละ ถ้างั้นฉันก็จะตามผู้ปกครองไปค่ะ!"
1004405-72 = "มาถึงชายหาดแล้วสินะคะ!"
1004405-76 = "อื้อ~ เย็นสบายจัง... ลมทะเลตรงนี้เย็นกว่าตรงฝั่งรีสอร์ตจริงๆ ด้วยค่ะ"
1004405-77 = "อาจเป็นเพราะที่นี่เป็นเกาะร้าง... เลยไม่ค่อยมีแสงไฟเท่าไหร่ ดาวก็เลยส่องสว่างมากเลยนะคะ"
1004405-81 = "คุณครู...?"
1004405-82 = "[s] \"โนโนมิ...?\""
1004405-84 = "[ns9] \"ดูตรงนั้นสิ\"\n[ns10] \"ตรงนี้ก็มีดาวอยู่ด้วยนะ\""
1004405-88 = "....?"
1004405-93 = "....!!!"
1004405-96 = "― ดูสิคะ คุณครู! มันกำลังส่องแสงอยู่ค่ะ[wa:1690] "
1004405-98 = "― ท้องทะเล... เหมือนท้องฟ้ายามค่ำคืนเลยค่ะ![wa:10] "
1004405-101 = "― ที่คุณครูพาฉันมาที่นี่..."
1004405-103 = "― ก็เพื่อให้ฉันได้เห็นดวงดาวพวกนี้งั้นเหรอคะ?[wa:120] "
1004405-106 = "― พอมาคิดดูแล้ว...[wa:350] "
1004405-108 = "― เหมือนเคยเห็นอยู่ในโบรชัวร์เหมือนกันค่ะ[wa:250] "
1004405-111 = "― เขียนไว้ว่า 'พอตกกลางคืน...แพลงก์ตอนจะส่องแสง เหมือนกับดาวบนท้องฟ้า'...[wa:1310] "
1004405-113 = "― สวยมากๆ เลยค่ะ[wa:1460] "
1004405-116 = "[ns11] \"เห็นแบบนี้แล้วใจฟูขึ้นบ้างมั้ย?\"\n[ns12] \"หายรู้สึกเสียดายบ้างมั้ย?\""
1004405-117 = "― ฮิฮิ... คุณครูคิดว่ายังไงล่ะคะ?[wa:4140] "
1004405-118 = "― ฮิฮิ... คุณครูคิดว่ายังไงล่ะคะ?[wa:4140] "
1004405-121 = "― ฉันล้อเล่นค่ะ[wa:1070] "
1004405-123 = "― วันนี้ฉันคง... นอนหลับได้อย่างมีความสุขแล้วค่ะ[wa:10] "
1004405-126 = "― ขอบคุณนะคะ คุณครู[wa:1710] "
1004405-128 = "― วันนี้... เป็นวันที่เหมือนฝันจริงๆ เลยค่ะ[wa:40] "
1004405-131 = "― ฉันคิดว่าการได้มาที่นี่ เป็นเรื่องที่ดีมากเลยละค่ะ[wa:870] "
1004405-134 = "― แต่ว่า... ฉันอยากจะขอ...[wa:1960] "
1004405-136 = "― อยากขออยู่กับคุณครูแบบนี้... นานขึ้นอีกหน่อยได้มั้ยคะ[wa:640] "

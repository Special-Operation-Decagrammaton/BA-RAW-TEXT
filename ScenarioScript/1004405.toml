[translation]
1004405-1 = "閃爍於砂上的星辰"
1004405-2 = "（睡不太著，決定到外面吹吹風）"
1004405-5 = "（不知道是不是大家都睡著了，夜晚的寂靜裡只有昆蟲的叫聲響徹著）"
1004405-9 = "[ns1] 「誰醒來了嗎……？」\n[ns2] 朝著聲音的方向走去"
1004405-15 = "我還在想會不會是老師呢，結果真的是老師。"
1004405-16 = "[s3] 「啊，果然。」\n[s4] 「這個聲音是……！」"
1004405-22 = "呵呵呵。我想嚇老師一跳，所以躲起來了♡"
1004405-23 = "大半夜的怎麼了嗎？"
1004405-24 = "有什麼事情嗎……？"
1004405-25 = "[s5] 「我是跟著野乃美來的。」\n[s6] 「睡不著，來吹吹風的。」"
1004405-26 = "呼嗯……是這樣啊。"
1004405-27 = "呼嗯……是這樣啊。"
1004405-28 = "呵呵，其實我也睡不太著。"
1004405-32 = "……機會難得……稍微一起走走吧？"
1004405-37 = "唔～嗯……"
1004405-38 = "……嗯嗯。"
1004405-39 = "[s7] 「……野乃美？」\n[s8] 「怎麼了嗎？」"
1004405-44 = "不……沒什麼事。"
1004405-45 = "只是……思考了一下睡不著的理由。"
1004405-46 = "總覺得……有點可惜。"
1004405-47 = "就這樣睡著，醒來之後就變明天了吧？"
1004405-48 = "那樣的話，感覺在這裡珍貴的一天就那樣不斷的消失……"
1004405-49 = "來到這裡之後，真的很開心。#n所以越接近回去的日子，不捨的心情就越發強烈……"
1004405-50 = "我也不知道自己在講什麼呢。啊哈哈……"
1004405-51 = "……咦？"
1004405-52 = "老師，要去哪裡……？"
1004405-53 = "想給我看個東西？"
1004405-54 = "但是那裡只有海……"
1004405-55 = "現在也夜深了，差不多該回去了……"
1004405-56 = "……嗯？"
1004405-57 = "老師是監護人所以沒關係……嗎。"
1004405-61 = "……確實是那樣呢。"
1004405-67 = "我知道了！野乃美，會跟著監護人的☆"
1004405-72 = "……到達～！"
1004405-76 = "哇……好舒服……"
1004405-77 = "周圍也沒有亮光……星星看得很清楚呢。"
1004405-81 = "……老師？"
1004405-82 = "[s] 「……野乃美。」"
1004405-84 = "[ns9] 「你看看反方向。」\n[ns10] 「這裡也有星星唷。」"
1004405-88 = "…………？"
1004405-93 = "…………！！！"
1004405-96 = "― 請看，老師！在發光！[wa:2770] "
1004405-98 = "― 大海看起來就像星空一樣！[wa:1120] "
1004405-101 = "― 老師就是為了這個，"
1004405-103 = "― 才帶我來這裡的嗎？[wa:1480] "
1004405-106 = "― 這麼說來，[wa:790] "
1004405-108 = "― 手冊上好像也有寫到。[wa:1410] "
1004405-111 = "― 「到了晚上，浮游生物就會發光，如星辰般閃爍」……[wa:3190] "
1004405-113 = "― 真的很美呢。[wa:1780] "
1004405-116 = "[ns11] 「稍微有精神了嗎？」\n[ns12] 「不捨的心情，稍微消失了嗎？」"
1004405-117 = "― ……呵呵，不好說哦～？[wa:4940] "
1004405-118 = "― ……呵呵，不好說哦～？[wa:4940] "
1004405-121 = "― 這麼說，是開玩笑的。[wa:1190] "
1004405-123 = "― 今晚似乎可以舒服地入睡了。[wa:1090] "
1004405-126 = "― 謝謝你，老師……[wa:2070] "
1004405-128 = "― 真的是，如美夢般的一天。[wa:1200] "
1004405-131 = "― 我……能來到這裡真是太好了。[wa:2310] "
1004405-134 = "― 不過，再稍微……[wa:2600] "
1004405-136 = "― ……請再稍微，待在我身邊吧。[wa:2200] "

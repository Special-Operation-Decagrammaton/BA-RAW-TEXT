[translation]
10033030-1 = "ตอนที่ 3;ยินดีที่ได้พบ"
10033030-2 = "ขอบคุณที่ร่วมเดินทางมาจนถึงที่นี่นะคะ ทุกๆ คน"
10033030-3 = "จากนี้ไป เราจะขึ้นไปยังจุดชมวิวที่เห็นตระหง่านอยู่บนนั้นค่ะ!"
10033030-8 = "ว้าว ถนนที่นี่น่าทึ่งจังเลย! เริ่มรู้สึกถึงความแตกต่างแล้วสิ!"
10033030-9 = "เป็นบรรยากาศที่หาไม่ได้ในโรงเรียนเราเลยละ"
10033030-10 = "ฉันจะถ่ายรูปตรงนี้! เอริกะจังก็ถ่ายด้วยกันมั้ย?"
10033030-11 = "ก็ดีนะ งั้นไหนๆ ก็จะถ่ายแล้ว..."
10033030-12 = "หืม? อ้อ เข้าใจแล้วละ นี่ๆ! ทางนี้คุณไกด์จัง! ทุกคนเลย!"
10033030-14 = "พะ... พวกฉันด้วยเหรอคะ?"
10033030-16 = "อื้อ! ใช่แล้ว! จะถ่ายรูปที่ระลึกทั้งที ก็ต้องถ่ายด้วยกันสิ! ฉันชื่อว่าคิราระ โยซากุระ คิราระ!"
10033030-17 = "ส่วนฉัน ฮาทามิ เอริกะ"
10033030-19 = "จะถ่ายรูปเหรอคะ? การถ่ายรูปด้วยกันคือพิธีการสำคัญที่เสริมสร้างความผูกพันและมิตรภาพสินะคะ!"
10033030-20 = "ฉันชื่อว่าอาซาฮินะ พีน่า รับหน้าที่ไกด์ให้นักเรียนเกเฮนน่าในครั้งนี้ค่ะ! ยินดีที่ได้รู้จักนะคะ!"
10033030-21 = "อ่า... เอ่อ... ฉัน... ซาโตฮามะ อุมิกะค่ะ ถึงจะยังบกพร่องไปบ้าง แต่ก็ขอฝากตัวด้วยนะคะ..."
10033030-22 = "ฉันคาเอเดะ! อิซามิ คาเอเดะ! กำลังฝึกฝนเพื่อเป็นเลดี้ที่เพียบพร้อมและสมบูรณ์แบบอยู่น่ะ!"
10033030-24 = "อะฮ่าฮ่าฮ่า ฉันว่าตอนนี้คาเอเดะจังก็ดูเป็นเลดี้ที่เพียบพร้อมอยู่แล้วนะ"
10033030-25 = "หะ... หืม?! งะ... งั้นเหรอ?!?! อ่า แหะๆๆ... ได้ยินแบบนี้ก็แอบดีใจนิดๆ นะ..."
10033030-26 = "ตะ... แต่ถึงอย่างนั้นก็เถอะ! แค่นั้นยังไม่พอหรอกนะ! ฉันต้องเป็นเลดี้ที่เพียบพร้อมและสมบูรณ์แบบ#nกว่านี้อีก! อื้ม!"
10033030-27 = "ฉัน... คาซึกะ... สึบากิ... ฮ้าววว.... ไว้ถ้าตอนกลางคืนนอนไม่หลับ... ก็บอกฉันนะ... ฉันเตรียมทุกอย่าง#nไว้ให้แล้ว... ทั้งหมอน ผ้าห่ม ผ้าปิดตา ที่อุดหู..."
10033030-28 = "อะ... อืม... แต่นักเรียนโรงเรียนเราไม่น่าจะอยากนอนกันเท่าไรนะ..."
10033030-30 = "แต่ว่ารุ่นพี่สึบากิจะโพสท่าแบบนั้นจริงเหรอ? จะไม่เป็นอะไรเหรอ?"
10033030-31 = "ฮ้าววว.... ไม่เป็นอะไรหรอก..."
10033030-37 = "เอาละ ถ้างั้นก็!"
10033030-42 = "เย้! อุมิกะ! ทุกคน! ยิ้ม~~!"
10033030-43 = "หืม? ค่ะ... ค่ะ...!"
10033030-54 = "ถ้างั้นก็... หนึ่ง สอง สาม"
10033030-56 = "แชะ!"
10033030-63 = "รูปออกมาสวยเลย! ฉันส่งรูปให้เอามั้ย? อ๊ะ งั้นก็ต้องมีเบอร์โทรศัพท์กันสิ มาแลกเบอร์กันมั้ย?"
10033030-64 = "คิราระเป็นคนเข้ากับคนง่ายมากน่ะ ช่วยเข้าใจหน่อยนะ"
10033030-71 = "เรามาถึงจุดชมวิวกันแล้วค่ะ ขอบคุณที่พยายามขึ้นมาด้วยกันนะคะ"
10033030-72 = "จากจุดชมวิวนี้เราจะเห็นต้นไม้ศักดิ์สิทธิ์ที่เป็นทั้งสัญลักษณ์ของสหพันธ์เฮียกคิยาโคและเป็นสิ่งที่พวก#nเราภาคภูมิใจค่ะ"
10033030-73 = "และบังเอิญเอามากๆ ที่ในวันพรุ่งนี้! จะมีงานต้นไม้ศักดิ์สิทธิ์ที่นั่นพอดีเลยค่ะ!"
10033030-74 = "ราวกับว่ารอให้ทุกคนไปเที่ยวอยู่เลยนะ! ตั้งตารอได้เลย!"
10033030-79 = "อืม... ตอนไปงานต้นไม้ศักดิ์สิทธิ์... ฉันลองไม่ง่วงดูดีมั้ยนะ..."
10033030-80 = "(ที่จริงแล้วพวกเรา... เตี๊ยมการจัดงานต้นไม้ศักดิ์สิทธิ์นิดหน่อย... เพื่อให้ตรงกับการทัศนศึกษาของ#nนักเรียนเกเฮนน่าต่างหาก...)"
10033030-82 = "จะว่าไป ก่อนหน้านี้อุมิกะจังแนะนำว่าเฮียกคิยาโคเป็นโรงเรียนที่มีชื่อเสียงเรื่องงานเทศกาลใช่มั้ยนะ?"
10033030-83 = "มีชื่อเสียงเรื่องงานเทศกาลงั้นเหรอ? ฉันรู้สึกเหมือนคนที่นี่มีชีวิตเพื่องานเทศกาลมากกว่านะ"
10033030-84 = "[s] \"อืม เป็นความประทับใจที่ชัดเจนจังนะ\""
10033030-86 = "แต่ถึงอย่างนั้นงานเทศกาลก็เป็นเรื่องที่ดีนะคะ ใช่ไหมล่ะคะ?"
10033030-87 = "เทศกาลทำให้เราออกจากกิจวัตรประจำวันได้ และทำให้เราพยายามด้วยกันเพื่อจุดมุ่งหมายเดียวกัน นั่นคือความสำเร็จของงานเทศกาล"
10033030-88 = "ทั้งเป็นสิ่งที่ทำให้ทุกคนหัวเราะ สนุกสนาน ได้เจอสิ่งใหม่ๆ และได้สร้างความทรงจำจากการเปิด#nประสบการณ์ที่คาดไม่ถึงอีกด้วยค่ะ...!"
10033030-89 = "แต่นอกจากที่นี่แล้ว แต่ละโรงเรียนในคิโวทอสก็มีการจัดเทศกาลในรูปแบบที่หลากหลายด้วยนะคะ!"
10033030-90 = "แค่ในสถาบันเกเฮนน่าที่พวกคุณเรียนอยู่ ก็มีเทศกาลแห่ดอกกุหลาบในวันที่ 11 เวลา 11:11 น. แล้วก็เทศกาลที่ทุกคนขว้างมะเขือเทศนุ่มๆ ใส่กันด้วย..."
10033030-92 = "อ่า... โรงเรียนเรามีเทศกาลอะไรแบบนั้นด้วยเหรอ?"
10033030-93 = "ไม่รู้สิ ก็พวกเราคือชมรมกลับบ้านนี่นา"
10033030-94 = "อะฮ่าฮ่าฮ่า อุมิกะจังดูจะชอบงานเทศกาลมากเลยเนอะ? พอพูดถึงงานเทศกาลแล้วก็เหมือนเป็นอีกคน#nไปเลย!"
10033030-96 = "อ๊ะ...?! ขะ... ขอโทษค่ะ! พอดีฉัน..."
10033030-97 = "[s] \"อุมิกะชอบงานเทศกาล... จริงๆ นั่นแหละ...\""
10033030-98 = "แม้แต่คุณครูก็คิดอย่างนี้เหรอคะ?!"
10033030-100 = "ว่าแต่งานต้นไม้ศักดิ์สิทธิ์นั่นจะเป็นยังไงเหรอ? ฉันชักจะอยากไปแล้วสิ"
10033030-101 = "หวังว่าจะไม่เกิดเรื่องอะไรขึ้นนะ..."
10033030-106 = "ว้าย?! นี่มันอะไรเนี่ย ลื่นจัง! ล้มหัวคะมำเลย..."
10033030-107 = "เป็นยังไงบ้าง? อะไรกัน ไม่เห็นจะเป็นอะไรเลย เธอเว่อร์ไปเองรึเปล่า"
10033030-108 = "อ๊ะ?! ปะ... เป็นยังไงบ้างคะ เจ็บตรงไหนรึเปล่า? ต้องขอโทษด้วยนะคะ! แต่ว่าพื้นตรงนี้มัน...!"
10033030-110 = "ถูกเช็ดไว้อย่างดีจนคุณแม่บ้านยังชมเลยค่ะ! เงาวับจนส่องแล้วเห็นหน้าของเราเลยนะคะ!"
10033030-111 = "ปะ... แปลกจัง! ถ้าพื้นตรงอื่นก็ถูกเช็ดไว้อย่างสะอาดสะอ้านก็อีกเรื่อง แต่นี่เหมือนกับใครตั้งใจขัด#nเฉพาะพื้นตรงนี้ให้เงาวับจนลื่นอย่างนั้นละ...!"
10033030-113 = "แถมยังเป็นจุดที่มองเห็นต้นไม้ศักดิ์สิทธิ์ได้ดีที่สุดด้วย..."
10033030-115 = "ฉันเอาด้วยๆ! ฉันก็อยากลื่นเหมือนกัน!"
10033030-116 = "ต่อแถวสิ ตรงนี้ฉันยืนอยู่ก่อนแล้วนะ"
10033030-121 = "ทุกคน! ทุกคนคะ? ฟังกันก่อนสิคะ! จากนี้ไปจะเป็นการอธิบายเรื่องประวัติศาสตร์ของต้นไม้ศักดิ์สิทธิ์...!"
10033030-123 = "โรงเรียนเรามีเรื่องเข้าถงเข้าแถวตั้งแต่เมื่อไรกันเล่า!"
10033030-124 = "เดี๋ยวสิ... ที่นี่ไม่ใช่โรงเรียนของเรานะ"
10033030-126 = "สำหรับต้นกำเนิดของต้นไม้ศักดิ์สิทธิ์ แม้จะยังไม่เป็นที่ปรากฏแน่ชัด แต่การสันนิษฐานที่น่าจะเป็นไป#nได้มากที่สุดก็คือ...!"
10033030-128 = "เราต้องไปห้ามพวกนั้นก่อนรึเปล่า?"
10033030-129 = "อืม... แต่ก็ยังไม่มีใครเอาระเบิดมือออกมา ไม่มีใครดึงสลักระเบิด แถมยังไม่วางทุ่นระเบิดกันนี่? น่าจะยังไม่เป็นไรนะ"
10033030-134 = "เอาละๆ อย่าทะเลาะกันเลยนะทุกคน..."
10033030-136 = "อ่า... ฉันว่าจะน่าเป็นแล้วนะ"
10033030-143 = "ถ้าจะแย่งที่กันอย่างนี้ละก็ เรามาขัดพื้นทั้งหมดที่นี่แล้วทำเป็นพื้นสไลเดอร์ไปเลยมั้ย!"
10033030-144 = "จริงด้วย เอาให้ลื่นทั้งแผงไปเลย!"
10033030-145 = "[ns] \"แบบนั้นไม่น่าจะดีนะ?!\""
10033030-150 = "โอ๊ะ ลื่นจริงๆ ด้วย!"
10033030-151 = "ฉันด้วยๆ ขอฉันเล่นบ้าง!"
10033030-155 = "ถ้าจะเล่นก็ไปช่วยขัดพื้นสิ!"
10033030-157 = "ทะ... ทุกคนคะ?! ช่วยฟังที่พวกฉันพูดหน่อยเถอะค่ะ...!"
10033030-158 = "ไหนๆ ก็จะทำแล้ว งั้นเราติดตั้งระเบิดไว้ตรงสุดทางที่ลื่นๆ ดีมั้ย?"
10033030-159 = "ไอเดียดีเลย! จะได้ลอยไปไกลๆ ได้เลยด้วย!"
10033030-160 = "แต่ถ้าลอยไปแล้วตกลงมาล่ะ?"
10033030-161 = "ก็ต้องรับผิดชอบตัวเองสิ!"
10033030-162 = "ไม่ได้นะคะทุกคนนนนน!"
10033030-167 = "อุมิกะจัง ต้องมาเจอเรื่องหนักเกินไปรึเปล่าเนี่ย?"
10033030-168 = "ไปห้ามพวกนั้นกันเถอะ"
10033030-169 = "อะฮ่าฮ่าฮ่า งั้นก็ช่วยไม่ได้นะ!"
10033030-177 = "แฮ่ก แฮ่ก... ในที่สุดเราก็ทำให้ทุกคนสงบลงได้แล้วละ!"
10033030-178 = "ยอดไปเลยค่ะ! ถ้าอย่างนั้นฉันจะพาทุกคนไปยังจุดเรียนรู้ต่อไปเลยนะคะ!"
10033030-182 = "ฮ้าววว... พอได้ออกแรงเดินก็ง่วงขึ้นกว่าเดิมเลยนะ..."
10033030-186 = "[ns] \"ทุกคนทำได้ดีมาก...\""
10033030-190 = "แฮ่ก... แฮ่ก... นักเรียนจากเกเฮนน่า... มีพลังล้นเหลือกันจังเลยนะคะ..."
10033030-191 = "ขอบคุณที่ช่วยกันนะคะ... ขอบคุณจริงๆ ค่ะ..."
10033030-193 = "อะฮ่าฮ่าฮ่า! พอเห็นอุมิกะจังต้องมาทำงานหนักเพราะพวกเรา ฉันก็อดไม่ได้ที่จะช่วยน่ะ~"
10033030-194 = "เรื่องแบบนี้เป็นเหมือนชีวิตประจำวันของพวกเราอยู่แล้ว แต่นักเรียนจากโรงเรียนอื่นคงมองว่าแปลกใช่#nมั้ยล่ะ?"
10033030-195 = "[s] \"แต่ครูก็อยากขอบใจพวกเราเหมือนกันนะ\""
10033030-196 = "นี่ ทั้งครูกับอุมิกะจังเลย ฉันจะบอกอะไรให้นะ"
10033030-197 = "ถ้ามาไล่ขอบคุณทุกครั้งที่เกิดเรื่องแบบนี้ ฉันว่าวันนี้คงได้พูดขอบคุณเกิน 100 ครั้งเลยก็ได้นะ"
10033030-198 = "[s] \"ฟังอย่างนี้แล้วไม่อยากคิดเลยนะว่าจะเกิดอะไรขึ้นอีกบ้าง\""
10033030-199 = "งั้นพวกเราขอตามพีน่าไปที่ต่อไปก่อนนะ! ครูกับอุมิกะจังก็ค่อยๆ ตามมาล่ะ~!"
10033030-203 = "แล้วไว้ไปเจอกันที่นั่นนะ ไม่สิ ต้องบอกว่า \"ต่อไปก็ขอฝากตัวด้วยนะ\" มากกว่ารึเปล่า?"
10033030-208 = "อึก... เราช้ากว่ากำหนดการไปตั้ง 12 นาทีแล้วค่ะ... ถ้าเราไม่รับมือกับเรื่องเวลาที่ล่าช้าละก็...!"
10033030-209 = "[s1] \"เราจัดตารางไว้แบบเผื่อเวลาแล้ว\"\n[s2] \"ครูว่าล่าช้าไปแค่นี้ยังไม่เป็นไรหรอกนะ\""
10033030-212 = "แต่ว่า... ตารางของเราก็เพิ่งจะเริ่มเองนะคะ..."
10033030-213 = "ถ้ามันเกิดเรื่องแบบนี้ขึ้นในทุกๆ ครั้งเลยละก็... แบบนั้นจะทำยังไงดีล่ะคะ?"
10033030-214 = "[s] \"อุมิกะ บางครั้งคนเราน่ะ\""
10033030-215 = "ค่ะ คุณครู"
10033030-216 = "[s] \"ก็ต้องมีช่วงเวลาที่... แค่ต้องทำออกมาให้ดีที่สุดนะ\""
10033030-220 = "คุณครูนี่ละก็~!"

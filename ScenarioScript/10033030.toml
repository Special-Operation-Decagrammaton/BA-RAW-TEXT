10033030-5 = "#clearST"
10033030-6 = "#all;hide"
10033030-7 = "2;키라라;00\n4;에리카;00\n#2;a\n#4;a\n#2;h\n#4;h\n#wait;1000"
10033030-8 = "2;키라라;00;와, 여기 거리 신기해! 벌써부터 뭔가 느낌이 확 다른데?\n#2;em;[재잘]"
10033030-9 = "4;에리카;00;우리 학교는 일단 이런 분위기는 아니니까 말이지."
10033030-10 = "2;키라라;01;나 여기서 사진 찍을래! 에리카 쨩도?\n#2;hophop"
10033030-11 = "4;에리카;00;그럴까? 그러면 하는 김에…….\n#4;em;[반응]"
10033030-12 = "2;키라라;02;응? 아하, 무슨 말인지 알겠어. 저기요, 저기! 거기 가이드 쨩이랑 모두!"
10033030-13 = "#all;hide"
10033030-14 = "3;우미카;07;저, 저희도요?\n#3;em;[땀]"
10033030-15 = "#all;hide"
10033030-16 = "4;에리카;00\n2;키라라;01;응? 당연하지! 사진은 다 같이 찍는 거 아냐? 난 키라라. 요자쿠라 키라라!\n#2;em;[?]"
10033030-17 = "4;에리카;03;하타미 에리카야."
10033030-18 = "#all;hide"
10033030-19 = "3;우미카;07\n2;피나 가이드;08;사진인가요! 그렇군요. 함께 사진을 찍는 것으로 의리와 우정을 다지는, 중요한 의식인 것이로군요!\n#2;ar\n#3;m4\n#2;hophop"
10033030-20 = "2;피나 가이드;03;게헨나 여러분들의 가이드를 책임지고 있는, 아사히나 피나입니다! 반갑습니다!\n#2;greeting\n#2;em;[반짝]"
10033030-21 = "3;우미카;16;어, 아……. 사토하마, 우미카, 입니다. 부족한 부분이 많지만, 잘 부탁드려요…….\n#3;em;[///]\n#3;stiff"
10033030-22 = "5;카에데 가이드;11;난 카에데! 이사미 카에데야! 멋지고 완벽한 레이디를 위해 수행 중!\n#5;al\n#2;m1\n#3;m3"
10033030-23 = "#all;hide"
10033030-24 = "3;키라라;00;아하하하. 카에데 쨩, 내가 보기에는 이미 멋진 레이디인 것 같은데?\n#3;em;[재잘]"
10033030-25 = "3;카에데 가이드;07;어, 어?! 그, 그래?!?! 에, 에헤헷……. 그건 조금 기쁠지도……. \n#3;stiff"
10033030-26 = "3;카에데 가이드;03;하, 하지만! 아직 그 정도로는 안 되니까! 지금보다 더 멋지고 더 완벽한 레이디가 될 거니까! 응!\n#3;hophop"
10033030-27 = "3;츠바키 가이드;10;카스가…… 츠바키……. 하암……. 이따 밤에 잠이 잘 안 오면…… 말해 줘……. 숙면 베개와 이불, 안대랑 귀마개……. 모두 준비되어 있으니까……."
10033030-28 = "3;에리카;04;으, 으응……. 우리 학교 애들은 오히려 잠자기 싫어할 것 같지만…….\n#3;em;[땀]"

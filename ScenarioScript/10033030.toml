10033030-88 = "3;우미카;03;모두가 웃고, 즐거워하고, 새로운 경험과 생각지도 못한 체험 속에서 추억을 남기고……!\n#3;stiff"
10033030-89 = "3;우미카;10;거기에 키보토스의 각 학교에는 들은 적도, 본 적도 없는 축제들이, 각양각색의 형태를 띠고 개최된단 말이에요!\n#3;hophop"
10033030-90 = "3;우미카;10;여러분들이 다니시는 게헨나 학원만 해도, 11일 11시 11분에 정확히 시작하여 장미의 행진으로 정점을 이루는 축제라든가, 참가자 전원이 서로에게 물렁물렁한 토마토를 던져대는–!\n#3;em;[!]\n#3;closeup"

[translation]
10033030-1 = "Episode 3;Nice to Meet You"
10033030-2 = "I hope everyone enjoyed their ride here."
10033030-3 = "If you squint your eyes, you'll be able to find our next stop way up there: the observatory!"
10033030-8 = "The vibes are, like, totally different here. I love the decor!"
10033030-9 = "You wouldn't find anything like this at Gehenna, that's for certain."
10033030-10 = "Ooh, this is the perfect spot for a selfie. Erika, come here!"
10033030-11 = "Good idea! In that case..."
10033030-12 = "Ah! You're right. Everyone, let's take a pic! That means you too, guide cuties!"
10033030-14 = "U-Us too?"
10033030-16 = "You're part of the group now, so you should be in the picture! I'm Kirara, by the way. Yozakura Kirara!"
10033030-17 = "Hatami Erika."
10033030-19 = "I-I suppose photos are important friendship rituals that symbolize commitment and camaraderie... Okay!"
10033030-20 = "Nice to meet you! My name is Asahina Pina, one of your guides for this trip!"
10033030-21 = "O-Oh! Right. I'm Satohama Umika... I still have a lot to learn, but I'll do my best to make this a memorable experience."
10033030-22 = "I'm Kaede! Isami Kaede! I'm training to become the perfect proper lady!"
10033030-24 = "In training? But you already are one, Mizz Kaede! Hahaha!"
10033030-25 = "Y-You really think so? Seriously? Heeheehee! Wait till I tell Mimori! "
10033030-26 = "But that doesn't mean I'm going to slack on my training! I'll become even more perfect, promise!"
10033030-27 = "Kasuga Tsubaki... *yawn* If you have trouble falling asleep, I have pillows, sleep masks, blankets, earplugs... Whatever you need."
10033030-28 = "Thanks, but asking these hooligans to settle down and sleep while they're on a field trip is a tall order."
10033030-30 = "Tsubaki! Are you sure that's how you're gonna pose for the picture?"
10033030-31 = "*yawn* Yeah... All good."
10033030-37 = "Everyone, ready?"
10033030-42 = "Yes, ma'am! Umika, everyone, say cheese!"
10033030-43 = "Okay! Ch-Cheese!"
10033030-54 = "One... Two..."
10033030-56 = "Three!"
10033030-63 = "Let me see... Yay! How cute! Give me your number so I can send it to you guys. And that way you'll have mine too."
10033030-64 = "I'm sure you picked up on it by now, but Kirara has absolutely zero boundaries. Just let me know if you ever get uncomfortable."
10033030-71 = "Good work making it all the way up to the observatory."
10033030-72 = "Here we have the perfect view of the Tree of Deities. It's an important symbol to Hyakkiyako that we have always held in great esteem."
10033030-73 = "And would you look at that! The Tree of Deities ritual just so happens to be taking place tomorrow."
10033030-74 = "What a happy coincidence! You bet I'm super excited for it!"
10033030-79 = "I've scheduled a nap right before the ritual...so I'll be up on time."
10033030-80 = "(We did move forward the Tree of Deities ritual just a hair to accommodate the field trip...but no one needs to know that!)"
10033030-82 = "That reminds me, isn't Hyakkiyako really well known for their festivals, Umika?"
10033030-83 = "I heard that festivals are like their lifeblood!"
10033030-84 = "[s] \"Hm. That's actually a good way of putting it.\""
10033030-86 = "Festivals are just magical experiences, don't you think?"
10033030-87 = "Escaping everyday life, coming together for a common goal..."
10033030-88 = "It's a unique place for people to make memories and have experiences they wouldn't be able to anywhere else! The sound of laughter, as people enjoy their youth, is so wonderful."
10033030-89 = "And what makes festivals truly wonderful is that no two are ever the same. Every academy in Kivotos has their own variations they celebrate!"
10033030-90 = "Even in Gehenna Academy, where you came from, there's a festival that starts exactly at 11:11 on the 11th and peaks with the march of roses, or the Squishy Tomato Festival, where people throw tomatoes at each other!"
10033030-92 = "We...have festivals like that?"
10033030-93 = "How would we know? We're the Go-Home Club, not the Participate-in-School-Activities Club."
10033030-94 = "Hahahaha! But Umika, you're a huge fan of festivals, aren't you? You lit up like a firefly when you started talking about them."
10033030-96 = "R-Really? I apologize. I got completely caught up in the moment."
10033030-97 = "[s] \"Umika really...REALLY likes festivals...\""
10033030-98 = "You too, Sensei?!"
10033030-100 = "The Tree of Deities ritual sounds super fun though! Everything's so different from Gehenna."
10033030-101 = "Let's just hope we can get through it without something blowing up..."
10033030-106 = "Ack! I slipped on this tile! Why's it so smooth?!"
10033030-107 = "Are you— Dummy. You're not even hurt. Quit whining."
10033030-108 = "M-My sincere apologies! That spot...!"
10033030-110 = "Look how shiny it is... I can see my own reflection!"
10033030-111 = "You're right! And it's just this one spot that's been polished like a mirror. Feels kinda intentional..."
10033030-113 = "...That spot's well-known for having the best view of the Tree of Deities."
10033030-115 = "Hold up, me too! I'm tryna slide around too!"
10033030-116 = "I was here first. Get behind me."
10033030-121 = "Ahem! Um, so, the Tree of Deities has a long history—"
10033030-123 = "You want me to line up? Who do you think we are? Trinity?"
10033030-124 = "It's not like we're at Gehenna right now, wise guy!"
10033030-126 = "A-Although we don't know the true origins of the Tree of Deities, there are a few fables...!"
10033030-128 = "Should we do something?"
10033030-129 = "Hmm, as long as we don't see any grenades or land mines or rockets, I think we're okay!"
10033030-134 = "Break it up, guys."
10033030-136 = "Ah, see? Everything's going to be fine."
10033030-143 = "I've got it! Why don't we polish up all the tiles and then it'll turn into a giant slide everyone can use."
10033030-144 = "Hell yeah!"
10033030-145 = "[ns] \"That was a huge jump in logic!\""
10033030-150 = "Hahaha! It's super slippery!"
10033030-151 = "I wanna slide! Slide!"
10033030-155 = "Polish your own section of floor, then!"
10033030-157 = "Wh-What are you doing? Please listen, everyone!"
10033030-158 = "You know what would make this sick? Setting some bombs!"
10033030-159 = "Imagine how much air we would get if we did that!"
10033030-160 = "What if we get hurt?!"
10033030-161 = "Then good luck! Hahaha!"
10033030-162 = "Noooooooooo!"
10033030-167 = "Isn't Umika stressing a little too much?"
10033030-168 = "We should stop them."
10033030-169 = "Hahaha! Looks like we have no choice."
10033030-177 = "*pant* *pant* Somehow, the beast was tamed!"
10033030-178 = "It's my turn to step up to the plate! Everyone, please follow me to the next location!"
10033030-182 = "*yawn* This is a lot more action...than I anticipated."
10033030-186 = "[ns] \"Good work, everyone...\""
10033030-190 = "*pant* *pant* Gehenna students sure are...energetic! *pant*"
10033030-191 = "From the bottom of my heart, thank you for helping."
10033030-193 = "Hahaha! Don't sweat it. You were, like, super stressed out!"
10033030-194 = "I forgot that this level of insanity isn't really normal at other schools."
10033030-195 = "[s] \"You were a huge help. Thank you.\""
10033030-196 = "Um, Teach? Umika? Let me just say something."
10033030-197 = "Don't feel the need to thank us every time this happens. Because it's probably going to happen at least, say, a hundred more times today."
10033030-198 = "[s] \"I'm a little scared to find out if that's true!\""
10033030-199 = "It might happen sooner than you think. We'll see you at the next spot, Sensei! Umika!"
10033030-203 = "We'll keep helping each other out, 'kay? Catch you there!"
10033030-208 = "Oh dear... We're twelve minutes behind schedule. How am I going to balance out the time?"
10033030-209 = "[s1] \"We have built-in grace periods on the itinerary.\"\n[s2] \"We're still okay on time. For now.\""
10033030-212 = "But we're already using up all our extra time, and the day's just begun."
10033030-213 = "If this continues to happen, what am I meant to do, Sensei?"
10033030-214 = "[s] \"Umika. Sometimes...\""
10033030-215 = "Yes, Sensei?"
10033030-216 = "[s] \"Sometimes...all we can do is try our very best.\""
10033030-220 = "Senseiii!"

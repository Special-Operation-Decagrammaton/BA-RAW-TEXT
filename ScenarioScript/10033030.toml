[translation]
10033030-1 = "第3話;很高興見到你"
10033030-2 = "各位來到這裡都辛苦了。"
10033030-3 = "接下來我們將繼續前往上方的觀景台！"
10033030-8 = "哇，這裡的街道好神奇！有種很不一樣的感覺耶？"
10033030-9 = "畢竟我們學園的氛圍，跟這裡完全不同嘛。"
10033030-10 = "我想在這裡拍張照！繪里香醬要一起嗎？"
10033030-11 = "好啊。既然如此……"
10033030-12 = "嗯？啊哈，我知道你要說什麼了。#n來來來！那邊的導覽員們也一起來吧！"
10033030-14 = "我，我們也要一起嗎？"
10033030-16 = "當然囉！照片就是要大家一起拍不是嗎？#n我叫做綺羅羅，夜櫻綺羅羅！"
10033030-17 = "我叫旗見繪里香。"
10033030-19 = "要拍照片嗎！原來如此，透過一起拍照來加深義理與友誼，是個重要的儀式呢！"
10033030-20 = "我是負責為格黑娜的各位進行導覽的朝比奈菲娜！#n很高興見到你們！"
10033030-21 = "啊……我是里浜海花。#n雖然有許多不足，還請各位多多指教……"
10033030-22 = "我是楓！勇美楓！正在為了成為出色又完美的淑女而修行！"
10033030-24 = "啊哈哈哈。楓醬，在我看來你已經是個出色的淑女了哦？"
10033030-25 = "咦！？是，是嗎！？#n耶嘿嘿……那還真是令人高興……"
10033030-26 = "不，不過這個程度還不夠！#n我要成為比現在還要出色又完美的淑女！嗯！"
10033030-27 = "我是春日……椿……呼啊……#n如果有人晚上睡不著……就告訴我吧……#n睡眠枕頭和被子、眼罩和耳罩……我全都準備好了……"
10033030-28 = "嗯……雖然我們學園的學生，反而可能會不想睡覺吧……"
10033030-30 = "不過椿前輩，那種姿勢沒問題嗎？"
10033030-31 = "呼啊……沒問題……"
10033030-37 = "來，大家一起看這邊！"
10033030-42 = "耶～！海花！大家！要笑喔！"
10033030-43 = "咦？好，好的……！"
10033030-54 = "那麼，一，二──"
10033030-56 = "──三！"
10033030-63 = "嗯，拍得真好！要不要把照片傳給你們？#n啊，這樣得先交換號碼才行呢？"
10033030-64 = "真不好意思，如你們所見，綺羅羅是很自來熟的類型。"
10033030-71 = "各位一路上都辛苦了。"
10033030-72 = "就像大家現在見到的一樣，#n從這個觀景台，可以一覽百鬼夜行聯合學園引以為傲的象徵──神木。"
10033030-73 = "而且碰巧的是！明天正好預計將舉辦神木祭！"
10033030-74 = "彷彿在等待大家的到來一樣呢！敬請期待！"
10033030-79 = "嗯……在神木祭的時候，我也得清醒一點才行……"
10033030-80 = "（雖然實際上是稍微調整了神木祭的時間……以配合格黑娜的修學旅行……）"
10033030-82 = "話說海花醬之前說過，百鬼夜行是以豐富的慶典聞名的學園對吧？"
10033030-83 = "甚至有種是為慶典而生的感覺呢。"
10033030-84 = "[s]「嗯，某種意義上確實可以這麼說。」"
10033030-86 = "可是慶典真的很棒對吧？"
10033030-87 = "能夠脫離日常生活，一心一意地追求慶典的成功……"
10033030-88 = "所有人都可以樂在其中，藉由新鮮且意想不到的體驗留下回憶……！"
10033030-89 = "不只如此，在奇普托斯的各個學園，#n還有許許多多我們前所未聞的慶典，以各式各樣的形式舉行！"
10033030-90 = "比如各位所在的格黑娜學園，#n就有在11日11點11分準時開始，以玫瑰花遊行為重頭戲的慶典……#n以及大家一起互相丟擲番茄的慶典……"
10033030-92 = "咦……我們學園有那種慶典嗎？"
10033030-93 = "我也不太確定，畢竟我們是回家部的嘛。"
10033030-94 = "啊哈哈哈。看來海花醬真的很喜歡慶典呢？#n感覺就像變了個人一樣！"
10033030-96 = "咦……！？#n真，真不好意思！一不小心就……！"
10033030-97 = "[s]「海花很喜歡慶典……真的很喜歡……」"
10033030-98 = "連老師都這麼說！？"
10033030-100 = "話說神木祭啊……會是個怎麼樣的慶典呢？真讓人期待。"
10033030-101 = "希望不要又發生什麼大事……"
10033030-106 = "嗚哇！？這裡是怎樣？好滑！#n害我跌倒了……"
10033030-107 = "還好嗎？#n搞什麼，也沒受傷嘛？真愛大驚小怪。"
10033030-108 = "咦！？沒，沒事吧？真是不好意思！#n不過這片地板……！"
10033030-110 = "簡直光滑得不可思議！甚至能反射出自己的臉！"
10033030-111 = "真，真奇怪！？#n如果其他地方也一樣的話倒還好，但感覺這裡就像特別被人擦得滑溜溜的一樣……"
10033030-113 = "……只有最能看清楚神木的地方，被擦得一塵不染……"
10033030-115 = "我也要，我也要！我也要滑！"
10033030-116 = "排隊好不好，排隊。#n是我先來的耶。"
10033030-121 = "各位同學！？那個，現在將開始說明與神木有關的歷史……！"
10033030-123 = "我們學園什麼時候有人在排隊了！"
10033030-124 = "不是……首先這裡不是我們學園好嗎？"
10033030-126 = "雖，雖然有關神木的起源，目前還眾說紛紜，但最有可能的推測是……"
10033030-128 = "是不是阻止一下比較好？"
10033030-129 = "唔……不過也還沒有人拿出手榴彈、拔出安全引線或是散佈對人地雷。"
10033030-134 = "好了好了，大家不要吵架……"
10033030-136 = "哦，好像沒問題了？"
10033030-143 = "既然這樣，不如就把整片地板都擦得滑溜溜的，弄得像水平滑梯一樣吧！"
10033030-144 = "有道理！"
10033030-145 = "[ns]「那不太對吧！？」"
10033030-150 = "哦，變滑了！"
10033030-151 = "我也要，我也要滑！"
10033030-155 = "要滑就先擦地板！"
10033030-157 = "各，各位同學！？麻煩聽我說話……！"
10033030-158 = "既然這樣，要不要在滑梯的盡頭安裝噴射式炸彈？"
10033030-159 = "好像不錯耶！這樣可以飛的很遠！"
10033030-160 = "不過要是掉下去怎麼辦？"
10033030-161 = "自己看著辦啦！"
10033030-162 = "不可以啊啊啊啊啊──！"
10033030-167 = "海花醬是不是太辛苦了？"
10033030-168 = "……阻止他們吧。"
10033030-169 = "啊哈哈哈。沒辦法了！"
10033030-177 = "呼……總算讓所有人都冷靜下來了！"
10033030-178 = "真厲害！那麼不才菲娜，接下來將帶各位前往下一個地點！"
10033030-182 = "呼啊……活動身體之後感覺更睏了……"
10033030-186 = "[ns]「大家都辛苦了……」"
10033030-190 = "呼……哈啊……#n格黑娜的大家……還真有活力……"
10033030-191 = "真的很感謝你們兩位的幫忙……"
10033030-193 = "啊哈哈哈！看著海花醬辛苦的樣子，我也想幫忙做點什麼呀～"
10033030-194 = "雖然對我們來說就像日常一樣，但是在其他學園眼裡果然有點奇特吧？"
10033030-195 = "[s]「我也謝謝你們。」"
10033030-196 = "那個，老師？海花醬？先跟你們說哦。"
10033030-197 = "如果連這種事都要一一道謝的話，今天可能會重複道謝超過一百次的……"
10033030-198 = "[s]「真是一句讓人不想深究的話！」"
10033030-199 = "總之我們也到下一個地點去吧！老師和海花醬也要慢慢跟上來哦～！"
10033030-203 = "在下一個地點見吧。#n之後也請多多關照。"
10033030-208 = "嗚嗚……行程晚了12分鐘……要是不處理好這個時間差的話……！"
10033030-209 = "[s1]「我們已經在行程之間留了很寬裕的時間。」\n[s2]「現在應該還在誤差範圍內才對……至少目前還在。」"
10033030-212 = "但是……行程才剛剛開始而已。"
10033030-213 = "要是每次都發生這種事……到時候該怎麼辦？"
10033030-214 = "[s]「有時候呢，海花。」"
10033030-215 = "是，老師請說。"
10033030-216 = "[s]「我們能做的……就只有盡人事聽天命而已……」"
10033030-220 = "老師～！"

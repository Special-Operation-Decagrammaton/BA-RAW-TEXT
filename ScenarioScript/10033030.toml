10033030-1 = "#title;제3화;만나서 반갑습니다."
10033030-2 = "3;우미카;00;여기까지 오시느라 수고하셨습니다. 여러분.\n#3;a\n#3;greeting\n#3;em;[반짝]"
10033030-3 = "3;우미카;01;저희는 지금부터, 이 자리에서 위쪽으로 보이는 전망대까지 올라갈 거예요!"

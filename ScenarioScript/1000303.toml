1000303-33 = "4;히후미;01;오늘 비가 온다는 소식은 없었지만, 가끔씩 일기예보가 틀릴 때도 있잖아요?"
1000303-34 = "4;히후미;00;그럴 때를 대비해서 가방에 우산 하나는 늘 필수죠!\n#4;hophop"

[translation]
1000303-1 = "背包的祕密"
1000303-2 = "三一綜合學園．中庭"
1000303-3 = "哼，哼哼～♪ 哼哼，哼哼～♬"
1000303-4 = "啊，老師！"
1000303-6 = "啊！"
1000303-9 = "痛痛痛痛……"
1000303-10 = "[s] 「還好嗎？」"
1000303-11 = "耶嘿嘿……沒，沒事的。我總是冒冒失失的，已經很習慣跌倒了！"
1000303-12 = "但是真奇怪呢。這附近明明沒有會絆倒人的石頭之類的東西，居然會突然失去平衡……"
1000303-13 = "[s] 「會不會是包包太重了呢？」"
1000303-14 = "你說這個佩洛洛大人的包包嗎？確實可能是這樣呢。"
1000303-15 = "最近把一堆有的沒的東西都放在包包裡，就變得重得不得了……正好覺得差不多該整理一下了。"
1000303-16 = "剛好趁這個機會，現在就來整理一下吧……"
1000303-19 = "[ns] 「……這個是什麼？」"
1000303-20 = "啊，老師也注意到了嗎！這是印有佩洛洛大人臉的特製OK繃喔！"
1000303-21 = "朋友受傷的時候，如果手邊沒有OK繃的話，不是很困擾？"
1000303-22 = "所以就放了一組OK繃在包包裡！"
1000303-25 = "[ns] 「…………那這個是？」"
1000303-26 = "啊，那個是老大哥造型的靠墊！"
1000303-27 = "裡面裝滿了羽毛，摸起來很鬆軟的唷。"
1000303-28 = "坐在公園的長椅上的時候，放在背後會更舒服的！"
1000303-31 = "[ns] 「…………這個又是？」"
1000303-32 = "這是有粉紅波卡圖案的折疊傘！"
1000303-33 = "雖然天氣預報說今天不會下雨，但總是會有不準的時候對吧？"
1000303-34 = "為了那種時候，傘也是必須的！"
1000303-36 = "唔嗯……雖然想要整理出一些不需要的東西，但全部都很重要呢。"
1000303-43 = "那也沒辦法，只好暫時先背著這個很重的包包走了……"
1000303-44 = "[s] 「日步美是會做好萬全準備的那種人呢。」"
1000303-45 = "是，是這樣嗎？可能是吧，嘿嘿……"
1000303-46 = "因為我只是個平凡的人，為了能夠幫上朋友的忙，平時就需要付出更多努力才行。"
1000303-47 = "而這個包包就是我努力的象徵！"
1000303-51 = "啊，突然下雨了……"
1000303-52 = "請看，真的碰到派上用場的時候了呢。#n呵呵。"
1000303-53 = "老師，快到這個粉紅波卡的傘底下來吧。來，再靠近一點。"
1000303-55 = "不用害羞沒關係的，快來吧！"
1000303-57 = "（這之後，和日步美共撐一把傘回到了車站）"

1000303-11 = "3;히후미;00;헤헤…… 괘, 괜찮아요. 저, 워낙 덜렁거려서 넘어지는 일에는 익숙하거든요!\n#3;greeting\n#3;a"
1000303-12 = "3;히후미;04;하지만 이상하네요. 이 길에는 넘어질 만한 돌부리도 없었는데 갑자기 균형을 잃어버리다니……."

[translation]
1000303-1 = "ความลับของกระเป๋า"
1000303-2 = "สนาม สถาบันทรีนิตี้"
1000303-3 = "ลั่นลัลล้า~♪ ลัลล้า~♪ ลัลล้า~♪"
1000303-4 = "อ๊ะ คุณครูคะ!"
1000303-6 = "อ๊ะ เอ๋....?"
1000303-9 = "อะอะอะอ๊ายยยยย..."
1000303-10 = "[s] \"ไม่เป็นไรนะ?\""
1000303-11 = "แหะๆ... มะ...ไม่เป็นไรค่ะ ฉันมักซุ่มซ่ามจนหกล้มบ่อยๆ อยู่แล้วค่ะ!"
1000303-12 = "แต่แปลกมากเลยนะคะ บนถนนก็ไม่มีก้อนหินที่น่าจะสะดุดล้มได้เลย ทำไมจู่ๆ ฉันถึงเสียหลักล้ม#nแบบนี้ได้นะ...."
1000303-13 = "[s] \"อาจเพราะกระเป๋าหนักไปรึเปล่า?\""
1000303-14 = "คุณครูหมายถึงกระเป๋าท่านเพโรโร่เหรอคะ? ฉันก็คิดอย่างนั้นค่ะ"
1000303-15 = "ล่าสุดนี้ฉันใส่ของในกระเป๋าเยอะมากจนมันแทบจะรับน้ำหนักไม่ไหวแล้วด้วย... ฉันกำลังคิดว่าจะ#nจัดกระเป๋าอยู่เลยค่ะ"
1000303-16 = "ไหนๆ ก็พูดเรื่องจัดกระเป๋าแล้ว ฉันจัดกระเป๋าเลยดีกว่าค่ะ"
1000303-19 = "[ns] \"นี่มัน.....?\""
1000303-20 = "แค่เห็นก็จำได้เลยเหรอคะ! ใช่แล้วค่ะ นั่นพลาสเตอร์ลายท่านเพโรโร่ค่ะ!"
1000303-21 = "ถ้าเกิดเพื่อนๆ ของฉันเป็นแผลแล้วฉันไม่มีพลาสเตอร์ก็คงลำบากใช่มั้ยล่ะคะ?"
1000303-22 = "ฉันเลยพกกล่องพลาสเตอร์ติดกระเป๋าเอาไว้ตลอดค่ะ!"
1000303-25 = "[ns] \"แล้วนี่.....?\""
1000303-26 = "อ๋อ นั่นหมอนรองรูปคุณบิ๊กบราเธอร์ค่ะ"
1000303-27 = "ข้างในเป็นขนนกค่ะ นุ่มน่านอนมากๆ เลยนะคะ"
1000303-28 = "เวลาที่ต้องไปนั่งที่ม้านั่งแข็งๆ ถ้าใช้หมอนนี่รองหลังก็จะช่วยให้นั่งได้สบายขึ้นค่ะ!"
1000303-31 = "[ns] \"แล้วนี่ล่ะ.....?\""
1000303-32 = "อันนั้นเป็นร่มพับลายพิงค์กี้พาก้าค่ะ!"
1000303-33 = "ถึงพยากรณ์อากาศจะบอกว่าไม่มีฝนตก แต่บางครั้งข้อมูลก็ผิดพลาดบ่อยๆ เหมือนกันค่ะ"
1000303-34 = "เพราะงั้นถึงต้องคอยพกร่มติดตัวไว้ตลอดไงล่ะคะ! "
1000303-36 = "อืม... ฉันคิดว่าคงจะมีของที่ไม่จำเป็นอยู่บ้าง แต่พอดูดีๆ แล้วก็จำเป็นทั้งหมดเลย"
1000303-43 = "ช่วยไม่ได้นะคะ... ฉันคงจะต้องแบกกระเป๋าหนักๆ แบบนี้ต่อไป..."
1000303-44 = "[s] \"ฮิฟุมินี่เตรียมพร้อมดีจังเลยนะ\""
1000303-45 = "คะ...คุณครูคิดแบบนั้นเหรอคะ ฮิฮิ..."
1000303-46 = "ฉันเป็นแค่เด็กธรรมดาๆ เลยคิดว่าตัวเองจะต้องพยายามให้มากขึ้นเพื่อจะสนับสนุนเพื่อนๆ ค่ะ"
1000303-47 = "กระเป๋าใบนี้คือเครื่องพิสูจน์ความพยายามของฉันค่ะ!"
1000303-51 = "อ๊ะ จู่ๆ ฝนก็ตกลงมา..."
1000303-52 = "เห็นมั้ยคะ เพราะแบบนี้ถึงต้องเตรียมพร้อมไว้ค่ะ#nฮุฮุ..."
1000303-53 = "คุณครูคะ รีบเข้ามาในร่มคุณพิงค์กี้พาก้าสิคะ"
1000303-55 = "รีบเข้ามาสิคะ จะอายทำไมกัน!"
1000303-57 = "หลังจากนั้นคุณครูก็เดินไปที่สถานีรถไฟพร้อมกับฮิฟุมิ"

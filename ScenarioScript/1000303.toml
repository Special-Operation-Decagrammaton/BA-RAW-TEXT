1000303-14 = "3;히후미;02;이 페로로 님 모양 가방 말인가요? 그럴지도 모르겠네요.\n#3;em;[?]"
1000303-15 = "3;히후미;01;최근 가방에 이것저것 쑤셔 넣었더니 감당하기 어려울 정도로 무게가 늘어나서…… 슬슬 가방 정리를 할까 생각하던 중이었거든요."
1000303-16 = "3;히후미;00;말이 나온 김에 가방을 한 번 정리해 볼까요?\n#3;em;[반응]"
1000303-17 = "#all;hide"
1000303-18 = "#wait;1000"
1000303-19 = "[ns] \"……이건?\""
1000303-20 = "3;히후미;00;선생님도 한눈에 알아보시는군요! 그건 페로로 님의 얼굴이 인쇄된 반창고에요!\n#3;em;[반응]\n#3;hophop\n#3;a"
1000303-21 = "3;히후미;02;친구들이 다쳤을 때 치료할 반창고가 그 자리에 없으면 곤란하잖아요?"
1000303-22 = "3;히후미;03;그래서 반창고 한 묶음 정도는 가방에 넣어두고 다닌답니다!\n#3;greeting"

1000303-27 = "2;히후미;00;안에 깃털이 잔뜩 들어있어서 누르면 푹신푹신하답니다."
1000303-28 = "2;히후미;03;딱딱한 벤치에 앉을 때 등 뒤에 받쳐두면 편안하게 앉을 수 있어요!\n#2;em;[반짝]\n#2;hophop"

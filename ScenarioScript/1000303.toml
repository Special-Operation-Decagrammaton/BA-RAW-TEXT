[translation]
1000303-1 = "The Bag and Its Secret"
1000303-2 = "Trinity General School Campus"
1000303-3 = "Hmm, hmm... ♪ Hmm, hmmm... ♬"
1000303-4 = "Oh, Sensei!"
1000303-6 = "H-Huh?"
1000303-9 = "Ouch..."
1000303-10 = "[s] \"Are you okay?\""
1000303-11 = "Heehee... I-I'm okay. Falling over from clumsiness is nothing new to me."
1000303-12 = "Actually, that was weird. I didn't trip over a rock or anything. Why did I lose my balance all of a sudden...?"
1000303-13 = "[s] \"Maybe your bag's too heavy?\""
1000303-14 = "You mean this Peroro bag? Maybe you're right."
1000303-15 = "I do have a lot of stuff in it, so it's pretty heavy... I've been meaning to get around to organizing it."
1000303-16 = "On second thought, what better time than now?"
1000303-19 = "[ns] \"Wait, is that...?\""
1000303-20 = "Good eye, Sensei! It's a bandage with Peroro's face on it!"
1000303-21 = "I carry them in case my friends ever get hurt when I'm around. I'd feel terrible if I couldn't help."
1000303-22 = "That's why they have a permanent spot in my bag!"
1000303-25 = "[ns] \"...What's this?\""
1000303-26 = "Oh, that's a Big Brother cushion!"
1000303-27 = "It's stuffed with feathers, so it's very fluffy."
1000303-28 = "No bench is too hard when you have this behind your back!"
1000303-31 = "[ns] \"...What about this one?\""
1000303-32 = "That's an umbrella with a Pinky-Paca print!"
1000303-33 = "It's not supposed to rain today, but you never know, right?"
1000303-34 = "I'd rather have an umbrella and not need it than need it and not have it!"
1000303-36 = "Hmm... I thought I'd find something I can part with in here, but everything is super important."
1000303-43 = "It looks like I'm stuck with my bag being as heavy as ever..."
1000303-44 = "[s] \"You must enjoy being so well-prepared.\""
1000303-45 = "Y-You think so? Heehee..."
1000303-46 = "I don't have any particular talents, so I do what I can to be helpful to my friends."
1000303-47 = "My bag being so full is proof of that!"
1000303-51 = "Oh, look. A sudden rain shower..."
1000303-52 = "See? This is why I always come prepared! Heehee..."
1000303-53 = "Here, Sensei. Get under my Pinky-Paca umbrella. Come on under!"
1000303-55 = "Come on, don't be shy!"
1000303-57 = "I made it to the station while sharing Hifumi's umbrella."

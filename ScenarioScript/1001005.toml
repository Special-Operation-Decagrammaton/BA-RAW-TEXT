[translation]
1001005-1 = "การปั่นจักรยานถนน"
1001005-2 = "ห้างสรรพสินค้า"
1001005-3 = "อืม"
1001005-4 = "ขอบคุณที่มาด้วยกันนะคุณครู"
1001005-5 = "หลังจากก้าวเข้าสู่ยุคของการส่งสัญญาณแบบไร้สายเมื่อไม่นานมานี้ มันทำให้มุมมองของโลกการปั่นจักรยานถนนก็เปิดกว้างขึ้นด้วยน่ะ"
1001005-6 = "ฉันยังไม่ค่อยเข้าใจเรื่องระบบดิจิทัลของระบบไวร์เลสเท่าไหร่... ที่จริงฉันชอบความรู้สึกของน้ำหนัก#nที่ส่งผ่านมาจากระบบแบบมีสายมากกว่า"
1001005-7 = "แต่ว่าเวลามีเทคโนโลยีใหม่ๆ ออกมาอย่างน้อยก็ควรลองดูก่อน..."
1001005-10 = "อืม... ฉันพูดมากอยู่ฝ่ายเดียวรึเปล่านะ..."
1001005-11 = "[s1] \"ไม่เลย สนุกดีนะ\"\n[s2] \"ไม่ได้เห็นชิโรโกะพูดเยอะแบบนี้มานานแล้วนะ\""
1001005-12 = "อะ...อืม..."
1001005-13 = "อะ...อืม..."
1001005-14 = "ร้านขายจักรยานอยู่ด้านโน้น ไปกันเลยไหม?"
1001005-17 = "(คุณครูใช้เวลากับชิโรโกะอย่างสนุกสนานที่ร้านขายจักรยาน)"

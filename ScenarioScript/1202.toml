[translation]
1202-1 = "Maid & Made 1"
1202-5 = "มีใครอยู่ไหมคะ?"
1202-6 = "ขอเข้าไปข้างในได้ไหมคะ?"
1202-10 = "อ๊ะ ประตูเปิดอยู่นี่นา"
1202-11 = "งั้นฉันขอเข้าไปหน่อยนะคะ"
1202-17 = "ห้องเรียนที่เป็นห้องชมรม C&C"
1202-20 = "อ๊ะ อยู่ข้างในนี้สินะ โล่งอกไปที"
1202-24 = "...... เฮือก"
1202-25 = "ทำหน้าแบบนี้อีกแล้วเหรอ? เฮ้อ จริงๆ เลย ไม่ว่าฉันจะไปที่ไหน ก็ไม่ได้รับการต้อนรับดีๆ กับเค้าเลย"
1202-26 = "มะ... ไม่ใช่นะ ขอโทษที ฉันไม่ได้หมายความแบบนั้น......"
1202-30 = "ตายจริง คุณยูกะเองเหรอคะ?"
1202-31 = "มีอะไรให้ฉันรับใช้หรือเปล่าคะ?"
1202-32 = "หรือว่าครั้งนี้ก็มีภารกิจให้อีก......"
1202-33 = "ขอโทษนะคะ คือว่าตอนนี้คุณหัวหน้าไม่อยู่ พวกเราเลยยังรับงานไม่ได้... หรือจะฝากข้อความทิ้งไว้ก่อน#nไหมคะ?"
1202-34 = "ไม่ดีกว่า ไม่เป็นไร มันไม่ใช่เรื่องภารกิจหรอก......"
1202-35 = "ไม่สิ พอมาลองคิดดูดีๆ มันก็อาจจะใช่ก็ได้?"
1202-36 = "ว่าจะให้ช่วยงานที่ค่อนข้างแตกต่างกับภารกิจทั่วไปให้หน่อยน่ะ"
1202-37 = "งานที่ต่างจากภารกิจทั่วไปงั้นเหรอ...? หมายความว่ายังไง?"
1202-38 = "อืม คือว่า... งานที่จะให้ทำน่ะ ฉันว่ามันแตกต่างตั้งแต่ประเภทแล้ว"
1202-39 = "จะอธิบายยังไงดีนะ มันเป็น 'ภารกิจ' ก็จริง แต่จะเรียกว่าเป็น 'หน้าที่' ก็ยังคลุมเครืออยู่"
1202-40 = "......???  ทำไมยิ่งอธิบายยิ่งไม่เข้าใจเลย..."
1202-41 = "เป็นภารกิจ แต่ไม่ใช่หน้าที่..."
1202-42 = "ฮุฮุ พูดอะไรน่าสนุกอีกแล้ว..."
1202-43 = "มะ... ไม่ใช่นะ มันไม่ใช่อะไรที่น่าสนุกหรอกนะ..."
1202-44 = "พวกเธอรู้ใช่ไหมว่าย่านการค้าข้างหน้านี้กำลังคึกคักกับการเตรียมงานเทศกาลกันอยู่น่ะ?"
1202-45 = "หมายถึงย่านร้านเครื่องใช้ไฟฟ้าใช่ไหม?"
1202-46 = "เห็นติดป้ายประกาศเอาไว้ด้วยว่ามี 'ธีมคาเฟ่ที่ให้นักเรียนเข้าร่วม'"
1202-47 = "อื้ม แล้วก็จะมีคาเฟ่ในคอนเซ็ปต์ที่หลากหลายเพื่อหารายได้ของเทศกาลด้วยละ"
1202-48 = "แต่ว่า..."
1202-49 = "......แต่ว่า?"
1202-50 = "แต่ว่า... เฮ้อ..."
1202-51 = "ก็อย่างที่รู้ว่านักเรียนที่เข้าร่วมคือนักเรียนมิลเลเนียม..."
1202-52 = "ฉันก็เลยกังวลเกี่ยวกับ 'คอนเซ็ปต์ที่หลากหลาย' ของคาเฟ่น่ะสิ..."
1202-53 = "อะฮ่ะฮ่ะ... ฉันพอจะคาดเดาสถานการณ์ได้แล้วละค่ะ"
1202-54 = "ก็แต่ละคาเฟ่ที่เลือกจัดกันน่ะสิ ดูทรงแล้วไม่น่าจะมีลูกค้าเข้าเลย ทั้งธีมหัดเขียนโค้ด ไหนจะธีมวิศวกรอีก..."
1202-55 = "เฮ้อ... ถ้าเป็นเฮียกคิยาโคหรือทรีนิตี้ เวลามีงานเทศกาลก็จะหาเงินได้เยอะแยะ แต่ทำไมโรงเรียนเรา#nถึงเป็นแบบนี้มาตลอดก็ไม่รู้..."
1202-56 = "สุดท้ายทางย่านการค้าก็เลยไปขอร้องกับเซมิน่า ว่าให้ช่วยเสนอแผนการอื่นให้หน่อยได้ไหม..."
1202-57 = "ฉันเองก็ไม่รู้ว่าทำไมเซมิน่าต้องเข้ามายุ่งกับงานแบบนั้นด้วย แต่คงเป็นเพราะย่านร้านเครื่องใช้ไฟฟ้า#nอยู่ในเขตปกครองตนเองมิลเลเนียม..."
1202-58 = "อ่ะฮะฮะฮ่า... อย่างนี้เองเหรอคะ..."
1202-59 = "แต่ว่า... ขอโทษนะคะ ขอถามได้ไหมคะว่าแล้วพวกฉัน... ไปเกี่ยวอะไรด้วย...?"
1202-60 = "อื้ม..."
1202-61 = "ฉันก็เลยจะมาบอกว่าไว้ก่อน...... ยังไงล่ะ"
1202-70 = "......คุณเมดที่ยอดเยี่ยมแห่ง C&C ทุกท่าน"
1202-75 = "......? ทำไมจู่ๆ ก็พูดเพราะ......"
1202-76 = "จู่ๆ ก็เปลี่ยนชื่อเรียกให้ซะขนาดนั้น แบบนี้ฉันเริ่มจะกลัวๆ แล้วนะคะ..."
1202-77 = "แต่ถึงพวกเธอจะปฏิเสธ แต่จริงๆ ก็เป็นเมดกันอยู่ดีไม่ใช่เหรอ?"
1202-78 = "เป็นตั้งแต่ <ชุดเมด> ที่ใส่กันแล้วด้วย"
1202-79 = "จากที่ได้ยินมา พวกเธอก็แอบเข้าเมดคาเฟ่กันไม่น้อยเลย"
1202-80 = "ค่ะ... เอ่อ ก็... ก็ใช่ค่ะ "
1202-81 = "พวกเราก็เคยทำแบบนั้นจริงๆ......"
1202-82 = "เพราะฉะนั้นในครั้งนี้... คิดเสียว่าเป็นการชดใช้ค่าเสียหายกับทุกเรื่องที่ผ่านมา..."
1202-87 = "พวกเธอช่วย... ทำเมดคาเฟ่ให้สักสัปดาห์หนึ่งได้ไหม?"
1202-89 = "(1 ชั่วโมงต่อมา)"
1202-94 = "หาาาาาา!? พูดอะไรเหลวไหลเนี่ย!?"
1202-95 = "เมดคาเฟ่งั้นเหรอ? พูดเพ้อเจ้อ! งานนี้เรารับไม่ได้หรอก! พวกเธอไม่คิดว่ามันไร้สาระเหรอ!?"
1202-96 = "ดูทำเข้าสิ เห็นพวกเราใส่ชุดเมด ก็เลยคิดว่าเราเป็นเมดจริงๆ งั้นสิ?"
1202-97 = "ก็... ปกติถ้าเราเห็นใครใส่ชุดเมด เราก็ย่อมคิดว่าเขาเป็นเมดนี่คะ.....?"
1202-98 = "ดีเลยรุ่นพี่"
1202-99 = "ในที่สุดเราก็ประสบความสำเร็จในการทำให้คนอื่นรู้แล้วว่าพวกเราคือเมด"
1202-100 = "พูดไปเรื่อยน่า ไม่เอาด้วยหรอก ไม่เอาเด็ดขาด!"
1202-101 = "ไปบอกทางนู้นเลยว่าพวกเราไม่ทำงานนี้ เข้าใจไหม?"
1202-102 = "อะ... อืม... รุ่นพี่... แบบว่า... พวกเรา... ดัน..."
1202-103 = "......?"
1202-104 = "ทำไมทำท่าทางแบบนั้นเล่า? ดัน...? ดันอะไร?"
1202-105 = "ดันไปรับงานนั้นมาแล้วน่ะสิ"
1202-106 = "ก็ทางเซมิน่าตัดสินใจจะจัดสรรงบประมาณให้ เราก็เลยไม่อยากคืนเงินไปน่ะ"
1202-107 = "เราถอยไม่ได้แล้วละ สัญญาก็เขียนไปแล้ว และทางนั้นก็บอกไว้ด้วยว่า ถ้าเรายกเลิกสัญญาก็ต้องจ่าย#nค่าปรับด้วยนะ"
1202-111 = "......? หาาา?"
1202-112 = "วะ... ว่าไงนะ? มีหนังสือสัญญาด้วยเหรอ? พวกนั้นคิดจะเอาหนังสือสัญญามามัดตัวพวกเราน่ะสิ...!"
1202-113 = "แต่เดี๋ยวนะ... เดี๋ยวก่อน พอมาลองคิดดูดีๆ แล้วนี่พวกเธอเขียนหนังสือสัญญากันได้ไง?"
1202-114 = "ฉันคือหัวหน้านะ ฉันยังไม่ได้เซ็นหนังสือสัญญาเลย แล้วมันจะใช้ได้ได้ยังไง!? บอกมาเลยนะว่าใครเป็น#nคนเซ็น!"
1202-115 = "อ้อ เรื่องเซ็นชื่อเหรอ? ฉันเองแหละ!"
1202-120 = "......"
1202-121 = "......"
1202-122 = "......? เอ้า? ทำไมล่ะ??"
1202-123 = "ทำไมเหรอ? มีอะไรรึเปล่า?"
1202-127 = "......"
1202-128 = "...... โธ่เอ๊ย เฮ้อ...... "
1202-129 = "ค่ะ... รุ่นพี่... เรื่องก็เป็นอย่างนี้แหละค่ะ"
1202-130 = "ก็เราตกลงกันไว้แล้วว่าตอนที่รุ่นพี่ไม่อยู่ รุ่นพี่อาสึนะจะเป็นคนตัดสินใจ..."
1202-131 = "พอเลย...... รู้แล้วน่า หยุดพูดได้แล้ว... ขอร้องแหละ..."
1202-132 = "หือ? โกรธกันเหรอ?"
1202-133 = "ทำไมล่ะ? เรารับงานนี้ไม่ได้เหรอ?"
1202-134 = "มันดูน่าสนุกดีออก ถ้าทำคาเฟ่ออกมาได้ดี ทางนั้นบอกว่าจะให้เงินเราด้วยนะ ถ้าได้ทำ หัวหน้าเองก็#nจะสนุกไปด้วยไม่ใช่เหรอ?"
1202-139 = "มะ... ไม่ทำเฟ้ย! ไม่เอาด้วยหรอก......!"
1202-140 = "เธอคิดว่ามันดูน่าสนุกนักรึไง!?"
1202-141 = "อื้ม! น่าจะสนุกเลยแหละ!"
1202-147 = "ยอมๆ ไปเถอะรุ่นพี่ รุ่นพี่อาสึนะตกลงรับงานไปแล้วนี่นา คงต้องทำแบบไม่มีทางเลือกอื่นแล้วละ"
1202-148 = "ชะ... ใช่ค่ะ เรามาคิดว่าต่อไปจะทำยังไงดี แบบนี้น่าจะดีกว่านะคะ"
1202-153 = "ทำไมนะ..."
1202-154 = "ทำไมเจ้าพวกนั้นถึงมาไม้นี้เรื่อยเลย......"

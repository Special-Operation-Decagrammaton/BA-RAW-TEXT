[translation]
1202-1 = "Maid&Made（１）"
1202-5 = "……咦？"
1202-6 = "沒人在嗎？"
1202-10 = "啊，門開著。"
1202-11 = "我要進去囉？"
1202-17 = "C&C社辦"
1202-20 = "哎呀，有人在的話就回個話啊。"
1202-24 = "啊……"
1202-25 = "居然是「啊」，難道我真的去哪裡都不受歡迎嗎……？雖然從立場上來看這也是沒辦法的……"
1202-26 = "啊啊不是，抱歉。我沒有那個意思，只是因為妳突然來訪而有點驚訝……"
1202-30 = "哎呀，優香。"
1202-31 = "今天有什麼，"
1202-32 = "委託嗎？"
1202-33 = "如果是任務的話，因為現在寧瑠前輩不在……需要我幫忙傳話嗎？"
1202-34 = "不，沒關係。今天我來不是為了任務……"
1202-35 = "不對，某種意義上可能也算是任務……"
1202-36 = "與平時的任務不同，我有個請求。"
1202-37 = "請求……？真少見呢，內容是什麼？"
1202-38 = "唔嗯，該怎麼說才好呢……"
1202-39 = "雖然是委託但不是任務……嗯，果然還是「請求」這個說法最貼切吧。"
1202-40 = "越來越搞不懂了……"
1202-41 = "雖然是委託但不是任務……"
1202-42 = "原來如此，總覺得可能是很複雜的事呢？"
1202-43 = "啊不是，那個，真的不是什麼大不了的事。"
1202-44 = "妳們知道現在正在忙著準備慶典吧？"
1202-45 = "嗯，是指電器街吧。"
1202-46 = "這麼說來好像在哪聽過，要舉辦一個由學生們主導的慶典。"
1202-47 = "沒錯。"
1202-48 = "然後為了炒熱慶典的氣氛，打算用各種主題開咖啡廳，可是……"
1202-49 = "……可是？"
1202-50 = "可是……"
1202-51 = "從結果來看，參與的多半都是千年的學生……"
1202-52 = "所以雖然說是「各種主題」，但該說是有點奇怪的傾向嗎……"
1202-53 = "啊啊，原來如此……呵呵，大概明白了。"
1202-54 = "什麼寫程式體驗或是工程實驗之類的……不管怎麼看，全都是些吸引不了客人的東西。"
1202-55 = "明明百鬼夜行或三一的慶典都能辦得相當熱鬧，為什麼我們學園會這樣……"
1202-56 = "所以電器街那邊感覺到不安的人們就聯絡了研討會。問說有個備案會不會比較好……"
1202-57 = "姑且不論「連這種事都是研討會的管轄範圍嗎」的心情，但畢竟是千年自治區內的事，我們也不能坐視不管……"
1202-58 = "原，原來如此……"
1202-59 = "妳說的我了解了。但是，為什麼會來我們這裡呢……？"
1202-60 = "那是因為，"
1202-61 = "那個……"
1202-70 = "C&C，同時也是女僕部的各位同學，有件事情想請妳們幫忙……"
1202-75 = "為什麼講話突然這麼客氣……"
1202-76 = "總，總覺得有股不祥的預感……"
1202-77 = "你們穿的是貨真價實的女僕裝對吧？"
1202-78 = "就算只是偽裝，而且還有各種功能，但依然是女僕裝對吧？"
1202-79 = "而且，至今為止也多次用這套服裝潛入女僕咖啡廳對吧？"
1202-80 = "嘛，是可以這麼說……？"
1202-81 = "確，確實有過這種事……"
1202-82 = "所以說那個，只要一個星期就好，就當作是之前那件事的補償……"
1202-87 = "C&C能不能開一間女僕咖啡廳呢……？"
1202-89 = "（1小時後……）"
1202-94 = "什麼──！？"
1202-95 = "女僕咖啡廳！？在說什麼啊笨蛋！？真是莫名其妙！！"
1202-96 = "就因為平時穿著女僕裝，就以為我們真的是女僕嗎！？"
1202-97 = "這個嘛，平時就穿著女僕裝的話，一般來說都會被當成女僕吧……"
1202-98 = "不過，這樣說不定也是件好事。"
1202-99 = "因為已經成功向大家植入我們是女僕的印象了。"
1202-100 = "開什麼玩笑！拒絕拒絕！"
1202-101 = "現在立刻去研討會拒絕他們！"
1202-102 = "呃，其實那個……"
1202-103 = "……？"
1202-104 = "怎麼了，有話就說清楚。話說快點去啊。"
1202-105 = "已經接受委託了。"
1202-106 = "研討會那邊似乎也已經在組織各種預算了。"
1202-107 = "而且已經無法退出了。因為已經在合約上簽了名，如果取消的話會有很多問題的。"
1202-111 = "……啊？"
1202-112 = "咦，啊？為什麼這次還特別簽契約？怎麼這次突然這麼正式啊……？"
1202-113 = "……等等。喂，已經簽名了是什麼意思。"
1202-114 = "我可沒有簽名哦！？這是怎麼回事！？"
1202-115 = "是我簽的唷！！"
1202-120 = "……"
1202-121 = "……"
1202-122 = "……嗯？怎麼了怎麼了？"
1202-123 = "怎麼了嗎？我有好好簽名呀！"
1202-127 = "妳這傢伙……！"
1202-128 = "不，啊，原來是這樣啊……"
1202-129 = "……就是這樣。"
1202-130 = "寧瑠前輩不在的時候就由明日奈前輩來決定……有這麼一個規定……"
1202-131 = "哈啊……真是的……"
1202-132 = "咦，不能簽名嗎？"
1202-133 = "為什麼？"
1202-134 = "感覺超有趣的唷！而且一部分賺到的錢也會給我們不是嗎？部長也一起加入吧，女僕咖啡廳！"
1202-139 = "誰要啊笨蛋！"
1202-140 = "而且一點也不有趣吧！？"
1202-141 = "才沒有那種事，一定會很開心的！"
1202-147 = "寧瑠前輩，放棄吧。事到如今已經無法阻止明日奈前輩了。"
1202-148 = "就是啊，總之先以參加為前提，想想之後要怎麼做比較好。"
1202-153 = "唉……"
1202-154 = "真受不了……妳們這些傢伙總是一而再再而三給我找麻煩！！！"

[translation]
1008105-1 = "การพักผ่อนก็เป็นสิ่งสำคัญนะเจ้าคะ!"
1008105-5 = "ฮุฮุ ข้ามาแล้วเจ้าค่ะ ท่านอาจารย์"
1008105-6 = "[s] \"เข้ามาสิ ยูคาริ รอแป๊บหนึ่งนะ ครูขอเตรียมตัวก่อน\""
1008105-7 = "เจ้าค่ะ! ข้าจะรออย่างสงบเสงี่ยมอยู่ตรงนี้เจ้าค่ะ!"
1008105-8 = "ถ้างั้นข้าขอเสียมารยาทหน่อยนะเจ้าคะ"
1008105-13 = "ฮุฮุ~ ฮุฮุฮุ~♪"
1008105-14 = "วันนี้จะได้เรียนรู้อะไรจากท่านอาจารย์น้า~"
1008105-15 = "ฮุฮุ ตื่นเต้นจนแทบจะอดใจรอไม่ไหวแล้วเจ้าค่ะ..."
1008105-20 = "หืม? เสียงนี้มัน..."
1008105-28 = "อ่า..."
1008105-29 = "[s] \"ยูคาริ? ทำไมเหรอ?\""
1008105-30 = "ท่านอาจารย์... ข้างนอกฝนตก..."
1008105-34 = "(หลังจากนั้นทั้งสองก็รอให้ฝนหยุดอยู่ในสำนักงาน แต่ฝนไม่มีท่าทีว่าจะหยุดตกเลย)"
1008105-35 = "[s] \"พยากรณ์อากาศบอกว่าวันนี้ฝนจะตกทั้งวันเลย\""
1008105-39 = "ถ้างั้นวันนี้ก็ไม่ควรออกไปข้างนอกสินะเจ้าคะ"
1008105-40 = "[s] \"ขอโทษนะ ครูควรจะดูพยากรณ์อากาศก่อนแท้ๆ\""
1008105-41 = "อ๊ะ ไม่หรอกเจ้าค่ะ ข้าเองก็ไม่ได้ดูพยากรณ์อากาศมาเหมือนกัน"
1008105-42 = "วันนี้... คงต้องเป็นอย่างนั้น"
1008105-43 = "ข้าจะนั่งสงบเสงี่ยมอยู่ที่นี่แล้วเฝ้าดูท่านอาจารย์ทำงานอยู่ข้างๆ เจ้าค่ะ!"
1008105-44 = "[s] \"ฮะฮ่าๆ... ขอบใจที่พูดแบบนั้นนะ แต่ว่า...\""
1008105-45 = "แต่ถึงอย่างนั้นก็เถอะ..."
1008105-46 = "ท่านอาจารย์จะบอกว่าการพูดคุยเรื่อยเปื่อยแบบนี้ทำให้ข้าเสียเวลางั้นเหรอเจ้าคะ?"
1008105-47 = "ตายจริง"
1008105-52 = "การที่ท่านอาจารย์พูดแบบนั้นทำให้ข้าเศร้าใจยิ่งกว่าเดิมอีกนะเจ้าคะ"
1008105-53 = "[s] \"อ้าว...?\""
1008105-54 = "วันนี้ข้ามาที่นี่ด้วยความรู้สึกตื่นเต้นที่จะได้พบท่านอาจารย์เจ้าค่ะ"
1008105-58 = "ต่อให้ไม่ต้องออกไปไหนหรือทำอะไรเป็นพิเศษ"
1008105-59 = "แค่การที่ข้าได้ออกมาจากบ้านของตระกูลและได้ใช้เวลาอยู่กับท่านอาจารย์"
1008105-60 = "ทุกอย่างนี้ก็เป็นสิ่งที่แปลกใหม่ของข้า..."
1008105-61 = "และในแต่ละวันก็เป็นวันพิเศษแล้วเจ้าค่ะ"
1008105-62 = "ต่อให้ไม่ใช่วันนี้ ก็ยังมีวันพรุ่งนี้"
1008105-63 = "และต่อให้วันพรุ่งนี้ไม่สะดวก ก็ยังมีวันอื่นๆ อีก"
1008105-64 = "ความคิดที่ว่าพรุ่งนี้จะได้คุยอะไรกันอีก วันต่อไปท่านอาจารย์จะสอนเรื่องน่าตื่นเต้นอะไรให้อีก"
1008105-65 = "แค่ได้มีความหวังวันละนิด ทุกๆ วันของข้าก็เป็นวันที่สดใสและสนุกแล้วเจ้าค่ะ"
1008105-66 = "เพราะงั้น ถ้าท่านอาจารย์บอกว่าทำให้ข้าเสียเวลา หรือคิดว่าข้าจะเสียใจละก็..."
1008105-67 = "ถือว่าเป็นการเข้าใจผิดครั้งใหญ่เลยละเจ้าค่ะ!"
1008105-68 = "การได้อยู่กับท่านอาจารย์แบบตอนนี้เป็นสิ่งที่ข้าชอบมากๆ และมันก็เป็นเวลาที่มีค่ามากเจ้าค่ะ!"
1008105-69 = "[s] \"อื้ม ขอบใจที่คิดแบบนั้นนะ ยูคาริ\""
1008105-70 = "โอ๊ะ ข้าก็แค่บอกความจริงที่อยู่ในใจข้าน่ะเจ้าค่ะ"
1008105-71 = "ของมันแน่นอนอยู่แล้ว ถ้าท่านอาจารย์มาพูดขอบคุณแบบนี้ข้าก็เขินนะเจ้าคะ~"
1008105-72 = "ฮุฮุฮุ~♪"
1008105-73 = "[s] \"ครูได้รับรู้ความจริงใจจากยูคาริแล้วละ\""
1008105-74 = "ดีจังเลยนะเจ้าคะ..."
1008105-75 = "ดีจัง..."
1008105-76 = "ความจริงใจ...?"
1008105-78 = "การได้อยู่กับท่านอาจารย์แบบตอนนี้เป็นสิ่งที่ข้าชอบมากๆ และมันก็เป็นเวลาที่มีค่ามากเจ้าค่ะ!"
1008105-80 = "......"
1008105-81 = "........."
1008105-82 = "(อ่า... นะ... นี่ข้า...?!)"
1008105-83 = "(ข้าเผลอพูดความรู้สึกที่แท้จริงออกไปเหรอเจ้าคะ...?!)"
1008105-84 = "[s] \"ครูก็จะทำให้ดีที่สุดเพื่อตอบสนองความคาดหวังของยูคารินะ\""
1008105-85 = "จะ... เจ้าค่ะ!"
1008105-86 = "คำที่... ท่านอาจารย์พูดมา!"
1008105-87 = "ยูคาริเก็บไว้ในใจอย่างดีแล้วเจ้าค่ะ!"
1008105-88 = "[s] \"ยูคาริ?\""
1008105-89 = "เพราะงั้น เรื่องที่คุยนี้... เอาเป็นว่า... จบที่ตรงนี้นะเจ้าคะ...!"
1008105-91 = "(หลังจากนั้นยูคาริก็หลบสายตาคุณครูอยู่พักหนึ่ง แต่ทั้งสองคนก็ได้ใช้เวลาช่วงเย็นแบบชิลๆ พร้อมกับ#nเสียงฝนตกด้วยกัน)"

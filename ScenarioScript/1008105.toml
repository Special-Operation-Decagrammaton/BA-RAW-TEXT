[translation]
1008105-1 = "休息也很重要！"
1008105-5 = "呵呵，您好，老師。"
1008105-6 = "[s]「歡迎你來，紫。可以稍等我一下嗎？我準備好就出去。」"
1008105-7 = "是！我會在這裡等您！"
1008105-8 = "那麼就先失禮了。"
1008105-13 = "哼哼～哼哼～♪"
1008105-14 = "今天要～跟老師～一起～學什麼呢～"
1008105-15 = "呵呵，真的好期待……"
1008105-20 = "嗯？這個聲音是……"
1008105-28 = "啊……"
1008105-29 = "[s]「紫？怎麼了嗎？」"
1008105-30 = "老師……外面下雨了……"
1008105-34 = "（之後暫時在辦公室消磨時間，但雨卻絲毫沒有停下的跡象）"
1008105-35 = "[s]「這下傷腦筋了。天氣預報說今天會下一整天的雨。」"
1008105-39 = "看來今天最好不要外出比較好呢。"
1008105-40 = "[s]「抱歉，我應該事先確認天氣預報的。」"
1008105-41 = "別，別這麼說。#n小女子也同樣沒注意到。"
1008105-42 = "今天……嗯。"
1008105-43 = "我會乖乖坐在這裡，在一旁看老師工作的樣子！"
1008105-44 = "[s]「啊哈哈……謝謝你這麼說，不過……」"
1008105-45 = "不過……？"
1008105-46 = "因為跟我閒聊的關係，好像浪費了我的時間……？#n原來老師是這個意思。"
1008105-47 = "哎呀。"
1008105-52 = "聽老師這麼說，小女子反而有點受傷。"
1008105-53 = "[s] 「咦……？」"
1008105-54 = "一想到今天能來見老師，小女子的心裡便感到十分雀躍。"
1008105-58 = "就算不去哪裡、不特別做什麼……"
1008105-59 = "光是離開宅邸，和老師待在一起……"
1008105-60 = "對小女子而言，這些點點滴滴都是嶄新的體驗……"
1008105-61 = "都是無可取代日子的延續。"
1008105-62 = "就算今天不行還有明天。"
1008105-63 = "如果明天有困難也還有後天。"
1008105-64 = "小女子一直在思考明天要和老師聊什麼，隔天老師會教我什麼有趣的事物……"
1008105-65 = "這一點一滴累積的期待……讓每一天都成了小女子耀眼快樂的日子。"
1008105-66 = "因此，如果老師覺得浪費了我的時間，或者我可能會感到難過……"
1008105-67 = "那麼您就誤會了！"
1008105-68 = "對小女子而言，和最喜歡的老師共度的當下才是最棒的寶物！"
1008105-69 = "[s]「嗯，謝謝你這麼說，紫。」"
1008105-70 = "哎呀，小女子只是把心裡的想法說出來而已！"
1008105-71 = "對這種理所當然的話道謝，我會很害羞的～"
1008105-72 = "呵呵呵～♪"
1008105-73 = "[s]「不過紫的真心，我確實感受到了哦。」"
1008105-74 = "那真是太好了……"
1008105-75 = "太好了……"
1008105-76 = "……真心……？"
1008105-78 = "對小女子而言，和最喜歡的老師共度的當下才是最棒的寶物！"
1008105-80 = "…………"
1008105-81 = "………………"
1008105-82 = "（咦……小小小女子……情不自禁就──！？）"
1008105-83 = "（順勢說出真心話了……！？）"
1008105-84 = "[s]「為了滿足紫的期待，我以後也會全力以赴的。」"
1008105-85 = "是，是……！"
1008105-86 = "……老，老師您說的話！"
1008105-87 = "小女子也確實收到了！"
1008105-88 = "[s]「紫？」"
1008105-89 = "所以，這個話題就到此……到此結束……！"
1008105-91 = "（之後不知為何，一段時間內都無法和紫對上眼神，#n　就這麼和紫一起在雨聲中度過了悠閒的午後）"

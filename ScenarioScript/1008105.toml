[translation]
1008105-1 = "Rest Is Important!"
1008105-5 = "I've arrived! I hope I didn't keep you waiting, Sensei."
1008105-6 = "[s] \"Welcome, Yukari. Could you wait just a moment? There's a few things I still need to prepare.\""
1008105-7 = "Sure thing! I'll wait right here!"
1008105-8 = "Don't mind me."
1008105-13 = "Hm hmm. ♪"
1008105-14 = "What shall I learn from Sensei today?"
1008105-15 = "Heehee, I'm so excited."
1008105-20 = "Hm? What's that sound?"
1008105-28 = "Oh..."
1008105-29 = "[s] \"Yukari? What's the matter?\""
1008105-30 = "Sensei... It's raining..."
1008105-34 = "We waited for a little while in the office, but the rain did not stop."
1008105-35 = "[s] \"According to the forecast, it's going to rain all day. What a pain.\""
1008105-39 = "I guess we won't be going out on any adventures then."
1008105-40 = "[s] \"I'm sorry, Yukari. I should have checked the forecast.\""
1008105-41 = "Don't worry about it. I mean, I didn't check either."
1008105-42 = "As for today...I've got it all figured out."
1008105-43 = "I shall keep Sensei company while they work!"
1008105-44 = "[s] \"Ahaha... That's sweet, Yukari. But...\""
1008105-45 = "But what?"
1008105-46 = "Do you feel like you've wasted my time because we can't go outside?"
1008105-47 = "Oh, Sensei."
1008105-52 = "You feeling that way would actually make me sad."
1008105-53 = "[s] \"Huh?\""
1008105-54 = "I came here today because I was excited to spend time with you, Sensei."
1008105-58 = "We don't have to go anywhere, or do anything special."
1008105-59 = "Getting to be out in the world with you is enough."
1008105-60 = "Every experience you show me is new."
1008105-61 = "And every day feels unique."
1008105-62 = "If we can't go out today, we'll have tomorrow."
1008105-63 = "If tomorrow proves too troublesome, we can look forward to the next time."
1008105-64 = "What tale will Sensei tell me tomorrow? What surprising lesson will Sensei teach me next week?"
1008105-65 = "That anticipation makes every day feel dazzling."
1008105-66 = "So if you're ever scared that you wasted my time..."
1008105-67 = "Don't be! You're looking at it all backwards."
1008105-68 = "Every moment with you is precious, Sensei!"
1008105-69 = "[s] \"Thank you for that, Yukari. Truly.\""
1008105-70 = "Oh my! I was just speaking from the heart!"
1008105-71 = "Thanking me for something so obvious... You're making me blush!"
1008105-72 = "Heeheehee. ♪"
1008105-73 = "[s] \"I'm glad you got to express how you truly feel.\""
1008105-74 = "Me too."
1008105-75 = "Thank—"
1008105-76 = "Wait... How I truly feel?"
1008105-78 = "Every moment with you is precious, Sensei!"
1008105-80 = "..."
1008105-81 = "..."
1008105-82 = "(Wait... D-Did I just—?!)"
1008105-83 = "(I was so caught up in the moment. What did I just say?!)"
1008105-84 = "[s] \"I'll work hard to live up to your expectations, Yukari.\""
1008105-85 = "Ah... Yes...!"
1008105-86 = "Wow... S-Sensei's sure got a way with words!"
1008105-87 = "Oh! I must've eaten too much junk food. That must be why my heart feels like it's going to explode!"
1008105-88 = "[s] \"Yukari?\""
1008105-89 = "This was a lovely talk, Sensei."
1008105-91 = "I spent the rest of the afternoon listening to the rain with Yukari, who said nothing and avoided eye contact the whole time."

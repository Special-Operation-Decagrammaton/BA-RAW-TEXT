[translation]
10010030-1 = "ตอนที่ 3;การต่อสู้ในย่านแออัด 1"
10010030-6 = "(คุณครูไปที่ริมแม่น้ำโซลูตเพื่อซื้อเค้กมิราเคิล 5000 ที่อุยอยากได้)"
10010030-13 = "(แต่ที่นั่นมีแต่เสียงอึกทึกครึกโครม)"
10010030-14 = "ว่าไงนะ...? แล้วทีนี้จะทำยังไงล่ะ?"
10010030-15 = "จะให้ทำอะไรได้ล่ะ ก็ต้องรอจนกว่าชมรมทวงความยุติธรรมจะแก้ปัญหาได้น่ะสิ"
10010030-16 = "ทางนั้นจะแก้ปัญหาให้เหรอ...? ตรงนั้นมันอยู่นอกทรีนิตี้นะ..."
10010030-17 = "อืม... เท่าที่ฟังมาก็คงจะเป็นอย่างนั้น... นี่ไม่ใช่เรื่องเล่นๆ เลยนะ โธ่เอ้ย! ปาเข้าไปตั้งวันที่ 5 แล้ว!"
10010030-18 = "[s] \"......?\""
10010030-20 = "คุณครูคะ...? นี่มันอะไรกันคะเนี่ย...? ทำไมสีหน้าแต่ละคนดูไม่ดีเลย..."
10010030-21 = "เอ๋...? คุณครู?"
10010030-22 = "คุณครูมาทำอะไรที่นี่น่ะ?"
10010030-23 = "หืม? คนรู้จักของคุณครูเหรอคะ..."
10010030-28 = "เอ๋...? ข้างๆ นี่คือใคร...?"
10010030-29 = "คุณซิสเตอร์จากวิหารไง เห็นแล้วยังดูไม่ออกอีกเหรอ?"
10010030-30 = "เปล่าสักหน่อย... นี่! คิดว่าฉันถามแบบนั้นเพราะไม่รู้จริงๆ รึไงฮะ?"
10010030-31 = "......"
10010030-32 = "ทำไมถึงเงียบไปล่ะ...?"
10010030-33 = "กำลังกลุ้มใจอยู่น่ะ"
10010030-35 = "มีอะไรให้กลุ้มใจอีก...!!!"
10010030-37 = "แหะๆๆ... สะ...สวัสดีค่ะ ฉันฮินาตะจากชมรมซิสเตอร์ค่ะ"
10010030-38 = "ได้ยินมาว่าที่นี่ขายเค้กมิราเคิล 5000 ก็เลยมาที่นี่น่ะค่ะ..."
10010030-40 = "เค้กมิราเคิล 5000? คุณซิสเตอร์ก็มาซื้อเค้กเหมือนกันเหรอคะ? พวกฉันก็มาที่นี่เพื่อซื้อเค้กนั่นเหมือนกันค่ะ!"
10010030-41 = "อืม... แต่น่าเศร้าจังที่หาซื้อไม่ได้เลย..."
10010030-42 = "คะ...? ทำไมเหรอคะ? หรือว่าขายหมดเกลี้ยงแล้ว...?"
10010030-43 = "ไม่ใช่แบบนั้นหรอกค่ะ... เหตุผลก็เพราะ..."
10010030-44 = "เราต่างก็เป็นเหยื่อของระบบทุนนิยมที่บิดเบี้ยวยังไงล่ะ"
10010030-46 = "ทั้งมิราเคิล 5000 ทั้งเราด้วย..."
10010030-47 = "[s1] \"เหยื่อของระบบทุนนิยมที่บิดเบี้ยว?\"\n[s2] ถามว่าเกิดเรื่องอะไรขึ้น"
10010030-48 = "อืม... ที่จริงก็ไม่ใช่เรื่องที่ซับซ้อนอะไรขนาดนั้นหรอก"
10010030-49 = "อืม... ที่จริงก็ไม่ใช่เรื่องที่ซับซ้อนอะไรขนาดนั้นหรอก"
10010030-50 = "ก็ถ้ามีเค้กลิมิเต็ดเอดิชั่นที่ล้ำค่ามากๆ ทุกคนก็ต้องอยากกิน และคุณค่าของมันก็จะมากขึ้น"
10010030-51 = "และถ้าเป็นแบบนี้ สักวันหนึ่งก็จะมีคนที่เริ่มจมอยู่กับ 'คุณค่า' ของเค้กที่ไม่ใช่เค้ก..."
10010030-52 = "สุดท้ายก็จะกลายเป็นการข้ามเส้นที่ไม่ควรข้ามไป ก็เท่านี้น่ะ"
10010030-53 = "...? เอ่อ...? ขะ... ขอโทษนะคะ ฉันไม่เข้าใจเลย..."
10010030-54 = "เฮ้อ... ปกติยัยนี่ก็พูดอะไรเพี้ยนๆ แบบนี้แหละค่ะ พวกเราต่างหากค่ะที่ต้องขอโทษ"
10010030-55 = "มีคนไปที่ร้านเพื่อกว้านซื้อมิราเคิล 5000 ไว้ขายต่อเอาไว้เก็งกำไรน่ะค่ะ"
10010030-56 = "ไม่เพียงแค่นั้น เขายังเอาทั้งรถบรรทุกเค้กและจับตัวเจ้าของร้านไปด้วย จะได้ทำเค้กขายไม่ได้อีก"
10010030-57 = "ตอนนี้ถ้าอยากกินเค้กนั้น ก็ต้องไปที่ย่านแออัดแล้วจ่ายด้วยราคาที่สูงลิบเลยค่ะ"
10010030-58 = "ทะ... ทำไมถึงเป็นแบบนั้นไปได้คะเนี่ย? เราต้องแบ่งกันกินกับทุกคนอย่างมีความสุขสิคะถึงจะถูก"
10010030-59 = "ในช่วงแรกที่เป็นกระแส 'ทุกคน' คงหาซื้อกินกันง่ายๆ ไม่ได้หรอก..."
10010030-60 = "แต่ถึงจะอย่างนั้นก็เถอะ ถ้ามากว้านซื้อ \"เพื่อเก็งกำไร\" แทนที่จะซื้อมากินเอง แบบนี้จะยอมไม่ได้เด็ดขาด"
10010030-61 = "มันเป็นการดูหมิ่นเค้กนะ! ยกโทษให้ไม่ได้!!"
10010030-63 = "ฉันก็เลยกลุ้มอยู่น่ะค่ะว่าจะทำยังไงดีกับกลุ่มคน 'รักมิราเคิล 5000' ที่มารวมตัวกันแบบนี้"
10010030-64 = "[s3] \"เป็นเรื่องยากเลยนะเนี่ย\"\n[s4] \"คนพวกนี้... หมดเลยเหรอ...?\""
10010030-69 = "แต่ถ้าทุกอย่างบนโลกแก้ไขได้เพียงแค่การนั่งกลุ้มใจ โลกนี้ก็คงไม่มีโศกนาฏกรรมหรอก"
10010030-70 = "คนพวกนั้นคงจะไม่ฟังพวกเรา... และการที่เรามานั่งคิดหาวิธีแบบนี้ก็ไม่ได้ช่วยอะไร..."
10010030-71 = "ใช่แล้ว ตราบใดที่รถบรรทุกยังอยู่ในอาคารตรงย่านแออัดและพื้นที่รอบๆ ถูกปิดล้อมแบบนี้ก็ไม่มี#nหนทางอื่น"
10010030-72 = "อาคารทั้งหมดกลายเป็นป้อมปราการแบบนี้... ลำพังพวกเราคงไม่ไหวหรอก ถ้าเป็นกองทหารหรือชมรมทวงความยุติธรรมก็อาจจะจัดการได้อยู่..."
10010030-73 = "เดี๋ยวนะ... เดี๋ยวก่อน..."
10010030-74 = "เอ๊ะ..."
10010030-78 = "บางทีเรื่องนี้... อาจจะคลี่คลายไปก่อนหน้านี้แล้วก็ได้"
10010030-79 = "หืม...?"
10010030-80 = "หมายความว่ายังไง? คลี่คลายแล้วงั้นเหรอ?"
10010030-81 = "ใช่... จริงด้วย... มันคลี่คลายแล้ว เพราะทุกอย่างถูกเตรียมพร้อมไว้แล้วไงล่ะ"
10010030-83 = "\"กองทหาร\" ไงล่ะ!"
10010030-84 = "...?"
10010030-85 = "นัตสึจัง...? กะ... กองทหารงั้นเหรอ? กองทหารอะไรน่ะ...?"
10010030-87 = "ไอริ เธอคิดว่าอะไรคือสิ่งที่กองทหารต้องการล่ะ?"
10010030-88 = "คำถามมาอีกแล้ว..."
10010030-89 = "อืม... นั่นน่ะสิ...? ปืน... กับทหาร...? แล้วก็... รถถัง...? ปืนครก...?"
10010030-91 = "คนสั่งการ..."
10010030-92 = "แบบนี้นี่เอง... เข้าใจแล้ว เป็นแบบนี้เองสินะ"
10010030-93 = "คนสั่งการ...?"
10010030-94 = "อืม..."
10010030-95 = "[s5] \"นี่อย่าบอกนะว่า...\"\n[s6] \"...กำลังพูดถึงครูอยู่เหรอ?\""
10010030-96 = "ฮุฮุ มองทะลุปรุโปร่งเลยนะคะ 'คอมมานเดอร์'"
10010030-97 = "ฮุฮุ มองทะลุปรุโปร่งเลยนะคะ 'คอมมานเดอร์'"
10010030-98 = "ช่วยพาพวกเราปลดปล่อยปาฏิหาริย์ และช่วยเผยแพร่ความหวานให้แก่ทุกคนด้วยนะคะ\n"
10010030-99 = "พูดแบบนี้น่าจะได้เนอะ...?"
10010030-100 = "[s7] \"ครูก็ไม่มีปัญหาอะไร แต่ว่า...\"\n[s8] \"ฮินาตะล่ะ...? ติดอะไรไหม?\""
10010030-107 = "มะ... ไม่ติดค่ะ ถ้ามีเรื่องลำบากฉันก็ต้องช่วยเหลืออยู่แล้วค่ะ!"
10010030-108 = "ถึงพวกฉันจะอยากได้แค่เค้กก็ตาม... แต่ยังไงก็คงมองข้ามคนที่ตกอยู่ในสถานการณ์ลำบากไม่ได้หรอกค่ะ"
10010030-109 = "ฉะ... ฉันก็จะช่วยอีกแรงค่ะ! ขอให้ฉันช่วยด้วยอีกแรงเถอะนะคะ!"
10010030-110 = "ดีเลย! ดีมาก! ถูกใจจริงๆ เลย!"
10010030-111 = "ทุกคนได้ยินแล้วใช่ไหม?! นี่คือสงครามเบ็ดเสร็จ!! เราจะเจาะเข้าข้างหน้าเลย!"
10010030-112 = "ออกเดินทางได้!!"
10010030-116 = "เราจะไม่ยอมตกเป็นทาสของการกักตุนเพื่อเก็งกำไร! เราจะเป็นเจ้านายของขนมหวาน!!"
10010030-117 = "เหมือนเคยได้ยินคำแบบนี้มาจากไหนเลย..."
10010030-118 = "จู่โจมได้!!"
10010030-124 = "......"
10010030-125 = "ระ... รอด้วยค่า...! อ๊าย.....!?"
10010030-131 = "เป็นไปตามที่คิดเลย... ทำไมไม่ใช้วิธีนี้ตั้งแต่แรกนะ?"
10010030-132 = "วันนี้ขายได้เท่าไหร่แล้ว? ว่าแต่เค้กนี่ ตั้งราคาแบบนี้ก็มีคนซื้อเหรอ?"
10010030-133 = "ก็เพราะอยากกินกันไงล่ะ มันก็เป็นเรื่องดีกับเราไม่ใช่เหรอ? คิคิ…"
10010030-134 = "แถมลูกค้ายังเป็นชาวทรีนิตี้อีก เด็กๆ ที่นี่เงินหนากันหลายคนเลยล่ะ"
10010030-135 = "นี่เป็นธุรกิจที่ทำกำไรได้มากที่สุดเท่าที่เคยทำมาเลย มีหวังเราได้เป็นเศรษฐีแน่ๆ"
10010030-139 = "หยุดก่อน... มีคนมา"
10010030-144 = "......"
10010030-145 = "ว่าไง? พวกเธอก็มาซื้อมิราเคิล 5000 งั้นเหรอ?"
10010030-146 = "มาถึงที่นี่เองแบบนี้ แสดงว่าคงรู้สถานการณ์มาบ้างแล้วสินะ... มีเงินมาเท่าไหร่ล่ะ?"
10010030-147 = "เงิน... เงินงั้นเหรอ..."
10010030-148 = "ใช่ แต่บอกเลยนะว่าจะไม่มีการต่อรองอะไรทั้งนั้น ทางเราจะเป็นฝ่ายเสนอราคาทั้งหมด..."
10010030-153 = "...?"
10010030-154 = "เอากระสุนไปแทนก็แล้วกัน...!"
10010030-158 = "ฮะ... ฮึ่ม...!?"
10010030-163 = "......!!  ทะ... ทำอะไรน่ะ...!!"
10010030-164 = "ยัยเด็กนี่! อยากใส่เดี่ยวกับฉันเหรอ?"
10010030-165 = "เปล่า...! ฉันไม่ได้มาคนเดียว!"
10010030-171 = "ทาสเค้กทั้งหลาย! ก้าวออกมาข้างหน้าเลย!!"

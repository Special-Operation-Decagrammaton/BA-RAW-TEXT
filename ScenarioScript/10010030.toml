[translation]
10010030-1 = "Episode 3;Battle of Slum Castle Part 1"
10010030-6 = "At Ui's request, we first came to the Solut River to purchase her Miracle 5,000 cake."
10010030-13 = "There was a crowd when we arrived, and something seemed to be amiss."
10010030-14 = "What should we do now?"
10010030-15 = "What do you mean? We wait until the Justice Task Force takes care of this,#nof course."
10010030-16 = "WILL they take care of it? This place is pretty much out of their jurisdiction..."
10010030-17 = "Good point... Ugh. This has been going on for days!"
10010030-18 = "[s] \"...?\""
10010030-20 = "What do you think is going on, Sensei? They don't seem to be very happy campers..."
10010030-21 = "\"Sensei\"? Wait..."
10010030-22 = "What are you doing here?"
10010030-23 = "Oh. It would seem she recognizes you."
10010030-28 = "Hey. Who's this girl?"
10010030-29 = "She's one of the Sisters from the cathedral, obviously."
10010030-30 = "I know that! Do you think I don't have eyes?!"
10010030-31 = "..."
10010030-32 = "I asked you a question! Don't just stand there!"
10010030-33 = "I was contemplating."
10010030-35 = "What's there to contemplate?!"
10010030-37 = "Um... Hello. My name is Hinata, and I belong to the Sisterhood."
10010030-38 = "Sensei and I are...in the middle of running some important errands.#nWe came here to buy something known as a Miracle 5,000 cake?"
10010030-40 = "Whoa, you're here for the cake too? That's what we came for."
10010030-41 = "Not that we had any luck, unfortunately..."
10010030-42 = "You didn't? Are they sold out?"
10010030-43 = "No, it's not that..."
10010030-44 = "She means to say capitalism has bared its greedy fangs yet again."
10010030-46 = "It's sunk them into the Miracle 5,000 and us by consequence."
10010030-47 = "[s1] \"Capitalism is to blame?\"\n[s2] \"What happened?\""
10010030-48 = "Exactly what you would expect."
10010030-49 = "Exactly what you would expect."
10010030-50 = "When something is marketed as a rare limited edition, demand goes through the roof, which raises the value."
10010030-51 = "Which draws people who are simply interested in the cake's value and not the cake itself."
10010030-52 = "And so, a line that should never be crossed has been stepped over."
10010030-53 = "Um... I'm not sure I understand."
10010030-54 = "*sigh* She's always like this."
10010030-55 = "She means to say scalpers are buying all of the Miracle 5,000 cakes and reselling them for a profit."
10010030-56 = "They even took the food truck that sells the cake and abducted the owner."
10010030-57 = "You'll have to go to where they parked it in the slums and pay a ridiculously high price if you want to try that cake now."
10010030-58 = "Wh-Who would do such a thing? Food is meant to be shared with everyone!"
10010030-59 = "There's no sharing with \"everyone\" when it comes to limited edition sweets in this town."
10010030-60 = "Not that I've got any mercy for scalpers! They aren't even interested in eating that cake for themselves."
10010030-61 = "That's an insult to sweets everywhere!"
10010030-63 = "Anyway, all of the members of the Miracle 5,000 fan club have gotten together to figure out a solution."
10010030-64 = "[s3] \"Scalpers are the worst.\"\n[s4] \"All of these people are fans?\""
10010030-69 = "Meeting here is a start, but standing around and thinking isn't going to solve the problem."
10010030-70 = "There's no reasoning with scalpers, so what are we to do?"
10010030-71 = "What CAN we do? They've got that poor food truck sealed away somewhere in the slums. We can't just go and steal it back."
10010030-72 = "That place is practically a fortress. Only an army like the Justice Task Force could break into somewhere like that."
10010030-73 = "Hold on."
10010030-74 = "I see."
10010030-78 = "The solution is right in front of us."
10010030-79 = "Huh?"
10010030-80 = "What solution? What are you talking about?"
10010030-81 = "Expect the unexpected. The answer to our problems has come to us."
10010030-83 = "You said it would take an army, yes?! Well, we have just what we need, then!"
10010030-84 = "...?"
10010030-85 = "Um, Natsu? What are you talking about? How are WE an army?"
10010030-87 = "Let me ask you both this. What does every army need?"
10010030-88 = "Tch. I hate quizzes..."
10010030-89 = "Um... I don't know. Guns? Soldiers? And, uh..."
10010030-91 = "A commander."
10010030-92 = "Now I know what you're getting at."
10010030-93 = "A commander?"
10010030-94 = "Oh..."
10010030-95 = "[s5] \"Wait. Do you mean...?\"\n[s6] \"Are you referring to me?\""
10010030-96 = "You're quick on the uptake, Commander."
10010030-97 = "You're quick on the uptake, Commander."
10010030-98 = "It's up to you to lead us to a miracle and spread sweet blessings to everyone."
10010030-99 = "Are you up to the challenge, Sensei?"
10010030-100 = "[s7] \"I guess I don't mind, but...\"\n[s8] \"What do you think, Hinata?\""
10010030-107 = "M-Me? You don't have to ask! Of course I want to help people in a tight situation!"
10010030-108 = "And not just because we need to get our hands on the cake too.#nIt would be wrong to turn a blind eye to people in need of help."
10010030-109 = "So count me in!"
10010030-110 = "That's the spirit! Let's do this!"
10010030-111 = "You hear that? This is WAR! Let's show 'em they picked a fight with the wrong sweet-lovers!"
10010030-112 = "ROLL OUT!"
10010030-116 = "We will never be slaves to scalpers...!#n\nBut we will be conquerers of desserts!"
10010030-117 = "Why does that sound familiar...?"
10010030-118 = "Charge!"
10010030-124 = "..."
10010030-125 = "W-Wait for us!"
10010030-131 = "Shoot. This is easy money. Why didn't we think of this sooner?"
10010030-132 = "I can't believe we're still moving product at this price. How many have we sold today?"
10010030-133 = "Haha. Not our fault they decided they couldn't live without it."
10010030-134 = "They all looked like Trinity girls too. No wonder they've got loaded pockets."
10010030-135 = "Business is booming. We're gonna be filthy rich!"
10010030-139 = "Hold up. Looks like we got another one."
10010030-144 = "..."
10010030-145 = "Hey. You here for a Miracle 5,000 cake too?"
10010030-146 = "You must know how this works. You got the money?"
10010030-147 = "The money, huh?"
10010030-148 = "Don't act stupid. Yeah, the money. Cash. Moolah. And don't try to haggle.#n\nThis is a seller's market, sweetheart."
10010030-153 = "...?"
10010030-154 = "I've got your moolah right here."
10010030-158 = "GAHHH...!"
10010030-163 = "What the...?! You wanna fight?!"
10010030-164 = "You think you can take me on all by yourself?!"
10010030-165 = "Whoever said I was alone?"
10010030-171 = "Dessert-lovers, assemble!"

[translation]
10010030-1 = "第3話;前往貧民窟的要塞（１）"
10010030-6 = "（首先為了買到限定蛋糕「Miracle5000」前往了索魯特河）"
10010030-13 = "（抵達河邊時，發現那裡異常的嘈雜……）"
10010030-14 = "咦，就只能這樣……？"
10010030-15 = "嗯。在實現正義部幫我們解決問題之前也只能等了……"
10010030-16 = "他們會來嗎？#n這裡幾乎已經在三一自治區外了……"
10010030-17 = "這麼說也有道理……啊啊真是的，虧我最近每天都跑來的說！"
10010030-18 = "[s]「……？」"
10010030-20 = "那個……這是什麼情況？#n大家的表情似乎都不是很開心……"
10010030-21 = "……咦，老師？"
10010030-22 = "老師為什麼會在這裡？"
10010030-23 = "哎呀，是老師認識的人嗎……？"
10010030-28 = "好久不見。#n旁邊那位是……誰？"
10010030-29 = "看就知道了吧，是位修女啊。"
10010030-30 = "不，我不是那個意思……話說，你把我當笨蛋嗎？"
10010030-31 = "……"
10010030-32 = "……為什麼要在這種時候沉默啊！"
10010030-33 = "我仔細想了想，好像有這種可能性。"
10010030-35 = "果然是把我當成笨蛋了嘛笨蛋！！"
10010030-37 = "那個，不好意思打擾你們。#n你們好，我是修女會的日向。"
10010030-38 = "其實我們是為了買「Miracle5000」蛋糕來這裡的……"
10010030-40 = "啊，修女同學也一樣啊。其實我們也是為了同一個目的來的！"
10010030-41 = "只是那個，很遺憾地沒有買到……"
10010030-42 = "是，是嗎？#n難道已經賣完了……？"
10010030-43 = "不，不是那個原因，是那個……"
10010030-44 = "因為被扭曲的資本主義迷惑了。"
10010030-46 = "……不管是Miracle5000，還是我們。"
10010030-47 = "[s1]「扭曲的資本主義……？」\n[s2] 詢問是怎麼一回事"
10010030-48 = "實際上，這件事也沒有那麼複雜。"
10010030-49 = "實際上，這件事也沒有那麼複雜。"
10010030-50 = "一款數量有限、限定的貴重蛋糕，如果大家都想要的話，價格自然會水漲船高。"
10010030-51 = "就這樣在不知不覺間，「蛋糕的價值」反而比蛋糕本身更引人注目……"
10010030-52 = "就可能導致兩者之間的界線漸漸變得模糊，或是因此造成損害。"
10010030-53 = "呃……？"
10010030-54 = "抱歉，這傢伙說話就是這個樣子。"
10010030-55 = "也就是說，某些試圖轉賣「Miracle5000」獲益的人，#n把所有蛋糕都買走了……就是這麼回事。"
10010030-56 = "甚至為了不讓蛋糕的產量提高，將卡車連同蛋糕店的店長一起擄走了。#n畢竟這樣才能增加利益。"
10010030-57 = "所以才會導致現在這種，想立刻買到就得去貧民窟支付異常價格的狀況。"
10010030-58 = "為什麼要做這種事呢……#n食物應該要是大家一起好好享用的東西才對……"
10010030-59 = "不過這本來就是限定版，要「大家一起」也有困難就是了。"
10010030-60 = "但姑且先不管這一點，為了轉賣而做出這種事情簡直不可原諒！"
10010030-61 = "這是對甜點的侮辱！！"
10010030-63 = "所以我們才會集結「Miracle5000同好會」的大家，一起思考今後該怎麼辦。"
10010030-64 = "[s3]「轉賣確實是不可原諒……」\n[s4]「好厲害，聚集而來的人真不少呢。」"
10010030-69 = "雖然集合了大家，不過光是這樣也無法解決問題。"
10010030-70 = "交涉也沒有成功，這下該怎麼辦呢……"
10010030-71 = "對方在把蛋糕店連人帶車擄走後藏在了某個建築裡，還把周圍一帶全都封鎖了。"
10010030-72 = "現在已經變得跟要塞一樣，除非是像實現正義部那種「正規的戰鬥集團」，#n否則是沒辦法處理的吧。"
10010030-73 = "……？"
10010030-74 = "……原來如此？"
10010030-78 = "也許可以解決。"
10010030-79 = "咦？"
10010030-80 = "那是什麼意思？"
10010030-81 = "所謂有備無患……準備已經完成了。"
10010030-83 = "「正規的戰鬥集團」。#n至少也是與它類似的東西。"
10010030-84 = "……？"
10010030-85 = "那個，夏醬？"
10010030-87 = "愛莉，你覺得「正規的戰鬥集團」的必要條件是什麼呢？"
10010030-88 = "又開始問答時間了……"
10010030-89 = "這個嘛……槍械、戰鬥人員、負責各個職位的人，還有……"
10010030-91 = "……是這麼回事啊。"
10010030-92 = "愛莉舉的那些例子都沒錯，那麼接下來需要的就是「指揮官」了。"
10010030-93 = "指揮官……？"
10010030-94 = "……啊。"
10010030-95 = "[s5]「難道……」\n[s6]「……是我？」"
10010030-96 = "嘻嘻……正如你所料唷，[ruby=Commander]「指揮官」[/ruby]。"
10010030-97 = "嘻嘻……正如你所料唷，[ruby=Commander]「指揮官」[/ruby]。"
10010030-98 = "來，帶領我們解放奇蹟吧。#n為了將甜美的恩寵傳遍整個大地……"
10010030-99 = "……對吧？"
10010030-100 = "[s7]「畢竟大家看起來都很困擾，我當然樂意幫忙……」\n[s8]「日向覺得這樣沒問題嗎？」"
10010030-107 = "是，是！那是當然！"
10010030-108 = "對我們來說，那個蛋糕也是不可或缺的……#n但在那之前，不能對身陷困境的人們坐視不管。"
10010030-109 = "所以，反而應該是我要請你們讓我幫忙才對！"
10010030-110 = "嗯，了解！這樣事情就好辦了！"
10010030-111 = "來吧，開始全面抗爭！既然如此就正面突破吧！"
10010030-112 = "立刻出發！"
10010030-116 = "我們不會成為轉賣的奴隸！！我們要成為甜點的主人！"
10010030-117 = "這些台詞好像在哪裡聽過……"
10010030-118 = "前進吧，不斷前進！！"
10010030-124 = "那，那個……"
10010030-125 = "哇，哇啊啊啊啊啊……！？"
10010030-131 = "哎呀～這門生意真好賺。#n要是早點想到就好了。"
10010030-132 = "沒想到真的有人願意用那種價格來買……今天也賺爛了呢。"
10010030-133 = "哈哈，真是可喜可賀。"
10010030-134 = "感覺三一的學生還挺多的。出手闊綽真是幫大忙了。"
10010030-135 = "只要維持下去，我們就能一路發大財了！"
10010030-139 = "嗯？有人來了……？"
10010030-144 = "……"
10010030-145 = "有什麼事？你也是來買「Miracle5000」的嗎？"
10010030-146 = "既然都到這裡來了，應該了解狀況吧？#n所以，你要出多少？"
10010030-147 = "要出多少啊……"
10010030-148 = "沒錯，勸你別想討價還價比較好哦？#n惹我們不高興的話，之後付多少錢都買不到也不是不可──"
10010030-153 = "……？"
10010030-154 = "……那我就用這個來付吧。"
10010030-158 = "咕哈……！？"
10010030-163 = "你，你做什麼！？來打架的嗎！？"
10010030-164 = "以為一個人就能贏過我們！？"
10010030-165 = "……我並不是一個人。"
10010030-171 = "所有熱愛甜點的同志們啊，現在正是起身戰鬥的時候！"

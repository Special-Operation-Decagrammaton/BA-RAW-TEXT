1008303-57 = "3;키쿄;99;한쪽이 다른 한쪽에게 시혜할 뿐인 관계는, 애당초 관계로서 파탄 나 있는 것이나 다름없어.\n#3;em;[한숨]"
1008303-58 = "3;키쿄;01;인간이란 욕망을 가진 생물. 바라는 바가 있어 접근하고 관계를 맺는 것이 당연한 생물이야."
1008303-59 = "3;키쿄;02;그러니 의연한 척 속내를 숨기려고 해 봤자 나 키류 키쿄의 눈을 피할 수는 없어."
1008303-60 = "3;키쿄;01;서로 의중을 떠보기 위해 무의미한 대화를 지속해 봐야 피차 피곤해지기만 할 뿐이니까. 그냥 시원스레 원하는 바를 말하도록 해."
1008303-61 = "3;키쿄;16;<이용할 수 있는 수단은 많으면 많을수록 좋은 법>. 그리고 지금이 바로 그 수단으로써 키류 키쿄를 이용할 수 있는 기회야.\n#3;em;[반짝]\n#3;greeting"

1008303-30 = "3;키쿄;02;저번에 선생님. 당신이 적극적으로 백화요란의 부실을 고쳐준 덕분에, 최근 부원들 사이에서 제법 평이 좋아."
1008303-31 = "#all;hide"
1008303-32 = "#wait;500"
1008303-33 = "#na;키쿄;구체적으로 예를 들면 <더는 비가 와도 양동이를 찾을 필요가 없사와요!> 라던가, <바닥이 언제 무너질지 조마조마하면서 걷지 않아도 되니, 엄청 편하네.> 라던가."
1008303-34 = "#na;키쿄;<장지문에 뚫려 있던 구멍이 사라졌어! 문이라는 건 원래 비바람을 막아주는 기능을 가지고 있는 물건이구나!> 라든가……."
1008303-35 = "[s] \"저기, 평소에 대체 어떻게 생활을 했던 거야?!\""
1008303-36 = "#all;hide"
1008303-37 = "#wait;500"
1008303-38 = "4;키쿄;07;뭐어, 살짝 과장은 있을지언정 모두가…… 나를 포함해 고마움을 느끼고 있는 건 사실이야.\n#4;em;…\n#4;a"
1008303-39 = "4;키쿄;01;그런 의미에서 오늘, 나는 당신에게 빚을 갚고자 찾아왔어.\n#4;m3"
1008303-40 = "4;키쿄;03;샬레의 선생님. 오늘 하루 당신의 업무를 나, 키류 키쿄가 도와주겠어.\n#4;em;[반응]"

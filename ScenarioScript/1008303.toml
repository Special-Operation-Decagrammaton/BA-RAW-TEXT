[translation]
1008303-1 = "Cutting Ties with Conviction"
1008303-5 = "As promised, I've arrived."
1008303-6 = "[s1] \"This is all happening so suddenly...\"\n[s2] \"Yes. You really are here...\""
1008303-9 = "Your reaction is rather lackluster."
1008303-10 = "Is a student's unannounced visit unwelcome here?"
1008303-11 = "I highly doubt that. I have heard that Schale opens its arms to any and all students."
1008303-12 = "Then, by process of elimination..."
1008303-13 = "You're displeased with my presence in particular?"
1008303-14 = "[s3] \"No! Not at all! Never! That's not the case!\"\n[s4] \"I'm beyond thrilled that you're here!\""
1008303-17 = "...I see."
1008303-18 = "Um."
1008303-19 = "You need not indulge in such ostentatious reassurances."
1008303-20 = "I was joking."
1008303-21 = "[s] \"R-Really? I think your jokes might be a bit too advanced for me...\""
1008303-22 = "That sounds rather like mockery, but I will let it pass."
1008303-23 = "Enough pleasantries. "
1008303-24 = "I have come here on business."
1008303-25 = "Are you curious as to my motives?"
1008303-26 = "It's rather simple."
1008303-30 = "Your repairs to our club room have been received with resounding approval."
1008303-33 = "Students have been exclaiming things such as, \"We won't have to set out buckets when it rains anymore!\" and \"I can walk without being scared of falling through the floor!\""
1008303-34 = "One in particular said, \"Wow! I didn't know doors were meant to actually stop rain and wind!\""
1008303-35 = "[s] \"Um, what kind of life have you been living?!\""
1008303-38 = "Perhaps our students indulged in a touch of drama in their descriptions. Regardless, they are grateful. As am I."
1008303-39 = "As I said previously, I am not one to neglect my debts."
1008303-40 = "Therefore, I, Kiryuu Kikyou, will assist Schale's Sensei with your tasks today."
1008303-46 = "This is perhaps a once-in-a-lifetime opportunity to give orders to the Hyakkaryouran's operations officer. "
1008303-47 = "Will this properly repay our debt to you?"
1008303-48 = "[s5] \"I didn't help you expecting any kind of compensation.\"\n[s6] \"Dinner last time was more than enough.\""
1008303-51 = "...Lies."
1008303-52 = "[s] \"...Huh?\""
1008303-53 = "I liken you to the boy who cried wolf. A liar."
1008303-54 = "There is no being on this planet so selfless as to be satisfied with a mere dinner as payment for a long day's work."
1008303-55 = "You needn't fake such modesties."
1008303-56 = "Human relationships are give and take."
1008303-57 = "For one party to only give and the other to only take... It is no relationship at all."
1008303-58 = "People are greedy. They use others to achieve their own ends and are used in return."
1008303-59 = "Act as beguiling and innocent as you please. You cannot trick me."
1008303-60 = "Let's not continue the song and dance of proprieties. I despise wasting time."
1008303-61 = "I have used Schale as a means to my ends. It is your opportunity to employ Kiryuu Kikyou for yours."
1008303-62 = "I do not bestow this upon just anyone."
1008303-66 = "[ns7] \"Okay. If you say so, Kikyou.\"\n[ns8] \"You're right. I'd be silly to pass this up.\""
1008303-69 = "...And things are as they should be. "
1008303-70 = "I, Kiryuu Kikyou, will fulfill my duty and accomplish any task you assign to me to perfection."
1008303-75 = "(...This should be enough.)"
1008303-76 = "(I will fulfill Sensei's request, and my debts will be cleared.)"
1008303-77 = "(The scales of power in our relationship will once again be balanced.)"
1008303-78 = "[ns] \"My task for you is to take a break today.\""
1008303-82 = "...Excuse me?"
1008303-83 = "Is this a pathetic attempt at a joke?"
1008303-84 = "Do you require me to clean out your ears instead?"
1008303-85 = "I am offering you the opportunity to employ the esteemed services of Hyakkaryouran's operations officer."
1008303-86 = "Are you mocking me again?"
1008303-87 = "[s] \"No! I'm sincerely assigning you the task of taking a break.\""
1008303-91 = "[ns] \"Aren't you an operations officer? You should know how important rest is!\""
1008303-95 = "O-Of course I know that!"
1008303-96 = "One could even argue that rest is more important than efficient processes in an operation."
1008303-97 = "I won't allow your misdirection to distract me. "
1008303-98 = "You are grasping at technicalities."
1008303-99 = "[s] \"You told me to give you a task. So I did. What happens next is up to you.\""
1008303-100 = "And so the agency returns to me?"
1008303-101 = "You are incomprehensible."
1008303-102 = "[s] \"It makes no difference to me if you follow through on your word or not.\""
1008303-103 = "...!"
1008303-104 = "Hah."
1008303-105 = "If that is your will..."
1008303-111 = "[ns] \"W-Whoa! Kikyou! Please don't hurt me! I'm sorry!\""
1008303-115 = "Don't be ridiculous. "
1008303-116 = "I am doing as you say and selecting a book from your shelf."
1008303-117 = "[s] \"Do you mean...\""
1008303-121 = "I will acquiesce."
1008303-122 = "Per Sensei's request, I will quietly rest at Schale today."
1008303-131 = "I will lay claim to this book and sofa to achieve those ends."
1008303-132 = "[s] \"Please do! I just brewed some coffee, if you'd like some.\""
1008303-133 = "...Yes."
1008303-140 = "For you to refuse to put me to work..."
1008303-141 = "You are truly an enigma, Sensei."
1008303-142 = "Truly..."
1008303-146 = "Just a strange, strange teacher."
1008303-148 = "I spent the rest of the afternoon relaxing with Kikyou."

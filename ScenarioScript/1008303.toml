1008303-4 = "3;키쿄;01\n#3;a\n#3;h\n#wait;1500"
1008303-5 = "3;키쿄;02;예고한 대로 방문했어.\n#3;em;[반응]"
1008303-6 = "[s1] \"예고라고 하기엔 제법 갑작스러웠던 느낌이…….\"\n[s2] \"네, 방문하셨군요…….\""
1008303-7 = "#wait;10"
1008303-8 = "#wait;10"
1008303-9 = "3;키쿄;05;흥, 꽤나 떨떠름한 반응이네."
1008303-10 = "3;키쿄;13;갑작스러운 학생의 방문이 달갑지 않은 것일까?\n#3;em;…"
1008303-11 = "3;키쿄;07;……아니, 평소 풍문으로 듣기에 샬레는 그 어떤 학생에게라도 열려 있는 장소라 했었지."
1008303-12 = "3;키쿄;99;그럼 여기서 소거법으로 따져 본다면 달갑지 않은 건 학생이라는 카테고리가 아닌……"
1008303-13 = "3;키쿄;16;내 쪽의 이야기가 되는 거려나?\n#3;em;[?]"
1008303-14 = "[s3] \"아니! 전혀! 절대로! 그렇지 않습니다!\"\n[s4] \"응! 역시 필요하다면 얼마든지 마음껏 방문해 줬으면 할 정도니까!\""
1008303-15 = "#wait;10"
1008303-16 = "#wait;10"
1008303-17 = "3;키쿄;07;……아, 그래."
1008303-18 = "3;키쿄;13;으음…….\n#3;em;…"
1008303-19 = "3;키쿄;07;그…… 나도 그냥 살짝 농담을 했을 뿐이니까."
1008303-20 = "3;키쿄;01;그렇게까지 격하게 변명하지 않아도 괜찮아."
1008303-21 = "[s] \"으응? 그래? 미안…… 키쿄의 농담이 내겐 살짝 어려웠나 봐.\""
1008303-22 = "3;키쿄;05;……지금 그거, 혹시 놀리는 거야?\n#3;em;[빠직]"
1008303-23 = "3;키쿄;13;아니…… 잡담은 여기까지. "
1008303-24 = "3;키쿄;02;난 어디까지나 당신에게 볼일이 있어 찾아왔을 뿐이니까."
1008303-25 = "3;키쿄;01;어쩐 일로 이렇게 샬레를 찾아온 거냐고?\n#3;em;[?]"
1008303-26 = "3;키쿄;99;그 이유라면 단순해."

[translation]
1008303-1 = "เริ่มและจบให้ชัดเจน"
1008303-5 = "ฉันมาหาตามที่แจ้งไว้ล่วงหน้าแล้ว"
1008303-6 = "[s1] \"รู้สึกกะทันหันเกินกว่าจะบอกว่าแจ้งล่วงหน้าแล้วนะ...\"\n[s2] \"อื้ม มาแล้วสินะ...\""
1008303-9 = "ฮึ่ม ท่าทีไม่เต็มใจจังเลยนะ"
1008303-10 = "ไม่ยินดีที่จู่ๆ ก็มีนักเรียนแวะมาหาอย่างงั้นเหรอ?"
1008303-11 = "...แต่จากข่าวลือที่ฉันได้ยินมา เห็นว่าชาเล่ต์เป็นที่ที่ยินดีต้อนรับนักเรียนทุกคนอยู่แล้ว"
1008303-12 = "ถ้างั้นที่คุณดูไม่ยินดีแบบนี้ก็แสดงว่า..."
1008303-13 = "ไม่อยากเจอฉันเหรอ?"
1008303-14 = "[s3] \"ไม่นะ! ไม่ใช่! ไม่ใช่สักนิด! ไม่เลย!\n[s4] \"ที่นี่น่ะ ถ้าอยากมาก็มาได้ตลอดเลย!\""
1008303-17 = "...อ่า งั้นเหรอ"
1008303-18 = "อืม..."
1008303-19 = "แต่.... ฉันก็แค่หยอกเล่นนิดหน่อยเอง"
1008303-20 = "ไม่ต้องแก้ตัวจริงจังขนาดนั้นก็ได้"
1008303-21 = "[s] \"หืม? งั้นเหรอ? ขอโทษนะ... การหยอกล้อของคิเคียวมันดูจริงจังไปหน่อยน่ะ\""
1008303-22 = "...นี่กำลังแกล้งฉันอยู่รึเปล่า?"
1008303-23 = "เอาเถอะ... อย่ามัวคุยแต่เรื่องไร้สาระอยู่เลย"
1008303-24 = "ที่ฉันมาหาคุณก็เพราะมีธุระ ไม่ได้มีเรื่องส่วนตัวอะไรอื่น"
1008303-25 = "สงสัยว่าฉันมาที่ชาเล่ต์ทำไมน่ะเหรอ?"
1008303-26 = "เหตุผลก็ง่ายๆ"
1008303-30 = "คุณครู คราวก่อนที่คุณมาช่วยซ่อมห้องเฮียกกะเรียวรันให้อย่างแข็งขัน เราก็เลยได้รับเสียงตอบรับที่ดี#nจากสมาชิก"
1008303-33 = "ถ้าจะให้ยกตัวอย่าง ก็เช่น <จากนี้ถ้าฝนตกก็ไม่ต้องวิ่งหากระป๋องมารองน้ำแล้วเจ้าค่ะ> หรือไม่ก็ <ทีนี้ก็สบายใจได้แล้ว ไม่ต้องเดินอย่างหวาดเสียวแล้วละว่าพื้นจะทรุดฮวบลงไปตอนไหน!>"
1008303-34 = "แล้วก็ <รูที่เคยอยู่ตรงประตูกั้นหายไปแล้ว! ปกติประตูเป็นสิ่งที่ช่วยป้องกันลมฝนสินะเนี่ย!>"
1008303-35 = "[s] \"แล้วนี่... ปกติก่อนหน้านี้อยู่กันยังไงเนี่ย?!\""
1008303-38 = "อืม นี่อาจจะฟังดูเว่อร์ไปสักหน่อย... แต่ตอนนี้ฉันและทุกคนกำลังรู้สึกขอบคุณอยู่"
1008303-39 = "และเพราะอย่างนี้ วันนี้ฉันก็เลยมาที่นี่เพื่อใช้หนี้บุญคุณ"
1008303-40 = "คุณครูชาเล่ต์ วันนี้คิริว คิเคียว จะช่วยงานของคุณเอง"
1008303-46 = "จากนี้คือโอกาสที่คุณสามารถสั่งงานที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันได้ทุกอย่าง"
1008303-47 = "ว่าไงล่ะ ฟังดูน่าสนใจไม่น้อยเลยใช่มั้ย?"
1008303-48 = "[s5] \"ถ้าเรื่องนั้นน่ะไม่เป็นไรหรอก ครูไม่คิดจะรับอะไรตอบแทนอยู่แล้ว\"\n[s6] \"อีกอย่าง คราวก่อนก็ตอบแทนครูเพียงพอแล้วนี่\""
1008303-51 = "...โกหก"
1008303-52 = "[s] \"...ว่าไงนะ?\""
1008303-53 = "ก็ทั้งที่บอกว่าไม่ต้องการสิ่งตอบแทนตั้งแต่แรก และที่บอกว่าได้กินอาหารเย็นจากฉันก็เพียงพอแล้ว"
1008303-54 = "แบบนั้นมันจะไปพอได้ยังไง"
1008303-55 = "ไม่ต้องรักษามารยาทหรอกนะ"
1008303-56 = "ความสัมพันธ์ระหว่างบุคคลจะสมบูรณ์ได้เมื่อมีการให้และการรับ"
1008303-57 = "ความสัมพันธ์ที่ฝ่ายใดฝ่ายหนึ่งเป็นผู้ให้อยู่ฝ่ายเดียว มันก็ไม่ต่างจากความสัมพันธ์ที่พังทะลายไปแล้ว#nหรอก"
1008303-58 = "มนุษย์เป็นสิ่งมีชีวิตที่เกิดมาพร้อมความปรารถนา และเพราะมีความปรารถนา จึงมีการเข้าหา และสานสัมพันธ์ต่อกัน นี่แหละสิ่งมีชีวิต"
1008303-59 = "เพราะแบบนั้น ต่อให้แสร้งทำเป็นเด็ดเดี่ยวและพยายามซ่อนความในใจ ก็ไม่มีทางที่คิริว คิเคียวคนนี้จะ#nไม่รู้หรอก"
1008303-60 = "และถ้าจะพูดคุยอย่างไร้ความหมายเพื่อเดาจิตใจของกันและกันไปเรื่อยๆ ก็จะมีแต่เหนื่อยเปล่าๆ พูดสิ่งที่ต้องการมาเลยดีกว่า"
1008303-61 = "จำที่ฉันเคยบอกว่า <ยิ่งมีวิธีการที่ใช้ได้มากเท่าไรก็ยิ่งดี> ได้มั้ย ตอนนี้เป็นโอกาสแล้วที่คุณจะได้#nใช้งานคิริว คิเคียว"
1008303-62 = "รู้ไว้ด้วยล่ะว่าโอกาสแบบนี้ไม่ได้มีบ่อยๆ หรอกนะ"
1008303-66 = "[ns7] \"อืม ถ้าคิเคียวจะพูดขนาดนี้ละก็ ได้เลย\"\n[ns8] \"โอกาสแบบนี้คงไม่เกิดขึ้นบ่อยๆ ด้วย\""
1008303-69 = "...อืม กะไว้แล้วละว่าต้องเป็นอย่างนี้"
1008303-70 = "ก็ดี สั่งมาได้ทุกอย่างเลย ไม่ว่าคุณจะขออะไร คิริว คิเคียวคนนี้ก็จะทำออกมาให้สมบูรณ์แบบมากกว่าที่#nคาดไว้อีก"
1008303-75 = "(...แค่นี้ก็น่าจะได้แล้วเนอะ)"
1008303-76 = "(ช่วยทำในสิ่งที่ต้องการแต่โดยดีเพื่อใช้หนี้บุญคุณที่เกิดระหว่างกัน)"
1008303-77 = "(ถ้างั้นความสัมพันธ์ของเราจะได้กลับไปเป็นเหมือนเดิม ไม่มีอะไรติดค้างต่อกัน...)"
1008303-78 = "[ns] \"สิ่งที่ครูอยากขอคิเคียวก็คือ <วันนี้ต้องพักผ่อนให้เต็มที่>\""
1008303-82 = "...ว่าไงนะ?"
1008303-83 = "เดี๋ยวนะ พูดแกล้งกันรึเปล่า?"
1008303-84 = "ที่ฉันบอกไป คุณฟังถูกรึเปล่า?"
1008303-85 = "ฉันบอกไปว่านี่คือโอกาสที่จะ <ใช้งาน> ฉันนะ"
1008303-86 = "...หรือว่า เห็นว่าฉันเป็นคนโง่?"
1008303-87 = "[s] \"ฟังถูกแล้ว ครูก็เลยขอให้คิเคียว <พักผ่อน> ไง\""
1008303-91 = "[ns] \"ถ้าเป็นที่ปรึกษายุทธศาสตร์ก็ต้องรู้สิว่าการพักผ่อนสำคัญแค่ไหน\""
1008303-95 = "ระ... เรื่องนั้นฉันก็รู้อยู่หรอก"
1008303-96 = "สำหรับปฏิบัติการแล้ว บางครั้งเรื่องเสบียงและการพักผ่อนก็สำคัญมากกว่าการลงมือทำงาน"
1008303-97 = "แต่ที่เราคุยกันอยู่มันไม่เกี่ยวกับเรื่องนั้นนี่"
1008303-98 = "คิดเหรอว่าคำพูดล้อเล่นของคุณจะโน้มน้าวใจของฉันได้..."
1008303-99 = "[s] \"ครูก็แค่ขอให้ทำตามที่คิเคียวบอก จะทำหรือไม่ทำก็เป็นเรื่องของคิเคียวนะ\""
1008303-100 = "ก็เลยจะผลักภาระให้ฉันเป็นคนเลือก จะเอาอย่างนี้สินะ"
1008303-101 = "...เชื่อเขาเลย ทำไมถึงทำแบบนี้ก็ไม่รู้"
1008303-102 = "[s] \"แต่ว่าถ้าคิเคียวจะกลับคำพูดตัวเอง ครูก็ไม่ว่าอะไรนะ\""
1008303-103 = "...!"
1008303-104 = "เฮ่อ... ฮู่ว..."
1008303-105 = "ก็ได้ ถ้าคุณเลือกที่จะขอกันแบบนั้น──"
1008303-111 = "[ns] \"ยะ... เย้ยย คิเคียว! ไม่ต้องโกรธกันขนาดนั้นก็ได้...!\""
1008303-115 = "...หมายความว่าไง?"
1008303-116 = "ฉันก็แค่จะหยิบหนังสือจากชั้นหนังสือที่อยู่ข้างหลังคุณครูก็แค่นั้น"
1008303-117 = "[s] \"นั่นก็แปลว่า...?\""
1008303-121 = "ก็จะทำตามที่คุณดื้อดึงให้ทำไง"
1008303-122 = "คุณครู วันนี้ฉันจะพักผ่อนอย่างสงบเสงี่ยมในชาเล่ต์ตามที่คุณบอก"
1008303-131 = "งั้นก็ขอยืมหนังสือกับโซฟาหน่อยนะ"
1008303-132 = "[s] \"อ่า... อื้ม! เอากาแฟด้วยมั้ย? ครูเพิ่งชงไว้เมื่อกี้เลย\""
1008303-133 = "...รบกวนด้วยแล้วกัน"
1008303-140 = "อุตส่าห์ให้โอกาสแล้วเชียว แต่ก็ทำให้เรื่องเป็นแบบนี้จนได้"
1008303-141 = "คุณครูชาเล่ต์... ฉันละไม่เข้าใจคุณเลยจริงๆ"
1008303-142 = "แปลกคน..."
1008303-146 = "...จริงๆ เลย"
1008303-148 = "(จากนั้นคุณครูกับคิเคียวก็ได้ใช้เวลาช่วงบ่ายอย่างสบายๆ ด้วยกัน)"

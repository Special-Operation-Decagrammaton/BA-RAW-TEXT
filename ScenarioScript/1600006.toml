[translation]
1600006-1 = "Wrong Assumption"
1600006-3 = "(Gasping for breath, I ran into the forest Haruka was supposed to have disappeared into.)"
1600006-4 = "(But the forest was deep and vast, and I lost my way during my search. Before long, I too, found myself in trouble.)"
1600006-6 = "(...I couldn't remember how long I wandered around for.)"
1600006-9 = "(I leaned against a nearby tree to rest my exhausted body and eventually fell asleep...)"
1600006-10 = "..."
1600006-12 = "...sei."
1600006-13 = "[ns] \"...?\""
1600006-14 = "...nsei!"
1600006-15 = "...Sensei! Wake up, Sensei!"
1600006-16 = "Sensei!"
1600006-18 = "Sensei, are you okay? Sensei!"
1600006-19 = "Oh... You're awake. Whew... You scared me..."
1600006-20 = "[s] \"...Haruka...?\""
1600006-21 = "A-Ah... Yes... That's right. It's me..."
1600006-22 = "*gasp*"
1600006-23 = "S-Sorry. I was so surprised I didn't realize I...!"
1600006-24 = "I-I mean, I was only trying to support your weight, but I-I shouldn't have t-touched you...!"
1600006-25 = "What...? You're fine with this...? Y-You just want to rest for a bit...?"
1600006-26 = "B-But...! U-Uh...!"
1600006-27 = "N-No! It's not that I don't want to...! It's just...!"
1600006-28 = "...S-Sensei?"
1600006-29 = "Y-Your complexion is... Are you feeling better?"
1600006-30 = "[s1] \"Yeah. Seeing you has made me feel better.\"\n[s2] \"I'm lucky to wake up like this. I'm glad I came out here.\""
1600006-31 = "...?"
1600006-32 = "...?"
1600006-33 = "#%^&*@#?!?!"
1600006-37 = "I'm sorry I'm sorry I'm sorry I'm sorry I'm sorry I don't know what you mean, but I'm sorry..."
1600006-38 = "A-Are you sure you're okay? B-But..."
1600006-39 = "C-Come to think of it, why are you in a dirty, gloomy place like this...?"
1600006-40 = "N-Nobody ever comes here except me... An abandoned place like this..."
1600006-41 = "...? What? What was I doing here?"
1600006-42 = "A-Ah... W-Well..."
1600006-43 = "I was just looking for new soil...to plant some weeds..."
1600006-44 = "I-I sometimes come here to dig up soil to take back with me...and if I'm lucky...I get some stuff to use as compost..."
1600006-45 = "[s3] \"Ah. So you came here for your plants.\"\n[s4] \"I misunderstood you. Hahaha.\""
1600006-46 = "...Huh? Wh-What do you mean, Sensei...?"
1600006-47 = "...Huh? Wh-What do you mean, Sensei...?"
1600006-48 = "Uh... Th-Then what was your reason for coming here...?"
1600006-49 = "D-Don't tell me you came here for my sake...?! To such a remote place...?! For s-someone like me...?!"
1600006-50 = "[ns] \"...\""
1600006-51 = "I explained the current situation to Haruka as gently as possible."
1600006-52 = "..."
1600006-53 = "But as Haruka listened, her body began to droop."
1600006-54 = "..."
1600006-55 = "...Sorr..."
1600006-56 = "[s] \"...Haruka, wait.\""
1600006-57 = "I'm sorry I'm sorry I'm sorry I'm sorry I'm sorry I'm sorry I'm sorry I'm sorry I'm sorry I'm sorry..."
1600006-61 = "I'm sorry I'm sorry I'm sorry I'm sorry I'm sorry I didn't know, I really didn't know. I didn't think you'd assume that..."
1600006-62 = "I'm sorry. I'm sorry for making excuses. I'm sorry for causing trouble. It seems that in order to prove my sincerity, I'll have to stay here after all...!"
1600006-63 = "What? I don't need to do that? B-But I've caused you so much trouble, Sensei...!"
1600006-64 = "Huh?"
1600006-65 = "This is how much you normally walk during your hikes? I-Is that so? B-But weren't you collapsed here just now...?"
1600006-66 = "Oh, no! Not at all! I'm not trying to argue or dispute what you're saying, it's just...!"
1600006-67 = "[s5] Look at Haruka's hand to change the subject.\n[s6] \"What's that in your hand?\""
1600006-68 = "...Huh? O-Oh, these...?"
1600006-69 = "...Huh? O-Oh, these...?"
1600006-70 = "O-Oh... This is the soil I told you about earlier... I just finished digging it up..."
1600006-71 = "The weeds I want to plant...aren't from around here. The grasses here aren't \"weeds\" exactly..."
1600006-72 = "The weeds I grow are the more useless...stray kinds that pop up from the cracks of sidewalks and roads."
1600006-73 = "But...even those little ones have a kind of soil they like, so...I just wanted to take care of them..."
1600006-74 = "I-I'm just like those weeds...always receiving everyone's help. Completely, utterly useless..."
1600006-75 = "S-So while I can't do anything to make up for it, I at least want to be...helpful to the weeds."
1600006-76 = "[s7] \"You're such a kind soul, Haruka.\"\n[s8] \"You just want to be helpful to someone.\""
1600006-77 = "Th-That's not it at all...! S-Someone like me doesn't have a kind soul or anything like that! It's just that...!"
1600006-78 = "Th-That's not it at all...! S-Someone like me doesn't have a kind soul or anything like that! It's just that...!"
1600006-79 = "N-No! I mean! I'm not saying that you were wrong, Sensei, but I...!"
1600006-80 = "...U-Um..."
1600006-81 = "...Th-Then."
1600006-82 = "...If you insist, Sensei, then I-I'll just go with it. I'll make it so...!"
1600006-83 = "...Wh-What? I already did?"
1600006-84 = "B-But...there's no way that... Oh, I mean! I'm not saying it's impossible, and I'm not trying to say you're wrong!"
1600006-85 = "Th-That... Ugh... Ughhh...!"
1600006-86 = "F...Fine... I-If you insist...then we'll go with that!"
1600006-87 = "...We'll go along with that...! Y-Yes!"
1600006-89 = "I then got up and returned to the school with Haruka and her soil."
1600006-90 = "Fortunately, Haruka knew the forest path well, so we got back quickly, without getting lost."
1600006-94 = "In fact, I felt a little embarrassed that I lost my way and collapsed in such a short distance..."

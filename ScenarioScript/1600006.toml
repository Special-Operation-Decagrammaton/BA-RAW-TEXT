[translation]
1600006-1 = "錯誤的猜測"
1600006-3 = "（我上氣不接下氣地，跑向遙香所說的森林深處）"
1600006-4 = "（森林比想像中還要遼闊，從中途開始，連條像樣的路都沒有，也讓我頓時失去方向）"
1600006-6 = "（……不知跑了多久之後）"
1600006-9 = "（腳下突然一個踉蹌，身體倒在附近一棵樹上，我也就這麼靠在樹上，閉上了雙眼……）"
1600006-10 = "（……）"
1600006-12 = "……師。"
1600006-13 = "[ns] 「……？」"
1600006-14 = "……老師！"
1600006-15 = "……老師！請醒一醒，老師！！！"
1600006-16 = "老師！！！"
1600006-18 = "老師，你還好嗎！？老師！"
1600006-19 = "啊……您醒來了嗎……太好了……"
1600006-20 = "[s] 「……遙香？」"
1600006-21 = "啊，是，是。我是遙香……"
1600006-22 = "……啊！"
1600006-23 = "對，對對對對對對不起！我這是，那個……！"
1600006-24 = "那個，雖然事態緊急，但是我，我這種人怎麼可以碰老師呢……！！"
1600006-25 = "咦？沒，沒關係嗎……？咦？因、因為很輕鬆，所以想維持這姿勢……？"
1600006-26 = "但，但是……！唔唔……！"
1600006-27 = "啊，不，不會！哪個，我絕對沒有討厭的意思，可是……！！"
1600006-28 = "……啊。"
1600006-29 = "老，老師的臉色總算……太好了。身體舒服多了嗎……？"
1600006-30 = "[s1] 「嗯，看到遙香讓我安心多了。」\n[s2] 「能像這樣躺在遙香腿上，真是來對了。」"
1600006-31 = "……？"
1600006-32 = "……？"
1600006-33 = "！！？！？！？＆％＄！＄！＠％！？！！！？！？！？！？？！"
1600006-37 = "對不起對不起對不起對不起對不起對不起！！那個。真的，我這種人的……！！"
1600006-38 = "就，就這麼躺著，真的沒關係嗎……？可，可是，那個……"
1600006-39 = "……好的。話，話說回來，為什麼老師會來這種，昏暗骯髒的地方……？"
1600006-40 = "如，如您所見，這，這裡除了我之外，都不會有人來，是個相當無趣的地方……"
1600006-41 = "……？咦？我，我，我在這裡做什麼……？"
1600006-42 = "我是在，那，那個……"
1600006-43 = "我來幫現在培養的雜草……找適合的土……"
1600006-44 = "我，我偶爾會來這裡。這裡有挺多，品質不錯的土……"
1600006-45 = "[s3] 「原來如此。」\n[s4] 「抱歉，是我誤會了。」"
1600006-46 = "那個……？請，請問那是，什麼意思……？"
1600006-47 = "那個……？請，請問那是，什麼意思……？"
1600006-48 = "難，難道說，老師不是恰巧來到這邊，而是……"
1600006-49 = "該，該不會是為了我來的……！？為了我這種人特地跑來這麼遠的地方……！？這是為什麼……！？"
1600006-50 = "[ns] 「……是因為……」"
1600006-51 = "（我把在MomoTalk上看到、想到的東西，盡可能委婉地解釋給遙香聽）"
1600006-52 = "……"
1600006-53 = "（雖然有盡可能委婉了，但遙香很聰明，聽到一半眼神也開始飄移）"
1600006-54 = "……"
1600006-55 = "……對，"
1600006-56 = "[s] 「那個，遙香……？還，還好──」"
1600006-57 = "對不起對不起對不起對不起對不起對不起對不起對不起對不起對不起對不起對不起對不起對不起對不起……！"
1600006-61 = "對不起對不起對不起對不起對不起，我沒想到我輕率送出的訊息會被這麼解讀……！"
1600006-62 = "對不起對不起，我不應該辯解的，對不起造成您的困擾，我到底該怎麼謝罪才好……！！"
1600006-63 = "……咦？不用謝罪……？可，可是我給老師造成這麼大的困擾……！！"
1600006-64 = "……？"
1600006-65 = "平常散步就差不多會走這麼遠……？是，是嗎……？可，可是老師剛才不是昏倒了……"
1600006-66 = "啊啊啊啊啊！不是！那個！對不起我不是這意思！我絕對沒有要頂嘴的意思……！"
1600006-67 = "[s5] 突然，視線被遙香的手吸引過去。\n[s6] 「那些是今天要帶回去的雜草嗎？」"
1600006-68 = "……咦？啊，這，這些嗎……？"
1600006-69 = "……咦？啊，這，這些嗎……？"
1600006-70 = "這，這些是剛剛說的泥土……是剛剛才在這附近挖來的……"
1600006-71 = "我不會在這裡採雜草……在這裡生長的草，啊，這單純只是我的看法……我覺得那些，並不是「雜草」……"
1600006-72 = "我養的「雜草」是長在更淒涼……是在街道的邊邊角角生長的那種……"
1600006-73 = "但是……即便是這樣的雜草，也需要土才能生長……所，所以既然是我能做到的事，那就應該盡量……"
1600006-74 = "因，因為我也是……一點用處都沒有，總是得到大家的幫助……"
1600006-75 = "當，當然這算不上什麼動機……也沒資格自大地說是在幫助雜草……但就是想做些什麼……"
1600006-76 = "[s7] 「遙香真是溫柔呢。」\n[s8] 「我覺得這種想法非常了不起。」"
1600006-77 = "怎，怎麼會……！我我沒有那麼了不起……！"
1600006-78 = "怎，怎麼會……！我我沒有那麼了不起……！"
1600006-79 = "啊，那個，不是的！我不是説老師說的是錯的，我是想說……！"
1600006-80 = "唔，唔……"
1600006-81 = "那，那麼……"
1600006-82 = "……既然老師這麼說，就，就當作那樣吧……不對，我會努力讓它變成事實……！"
1600006-83 = "……什，什麼？已經是事實了……？"
1600006-84 = "沒，沒有沒有沒有，這怎麼可能……！啊，那個，我絕對不是在跟您頂嘴……！"
1600006-85 = "那個……就是……唔唔唔……！"
1600006-86 = "那，那麼……雖然我可能還名不符實……但既，既然老師這麼說了……！"
1600006-87 = "那就容我當它是，事，事實吧……！"
1600006-89 = "（之後我就和遙香一起帶著泥土回去了）"
1600006-90 = "（幸好遙香相當熟悉森林的地形，所以回程沒有迷路，很順利就回去了）"
1600006-94 = "（因為回程比想像中還要單純，反而讓我覺得不好意思，一直想對遙香道歉）"

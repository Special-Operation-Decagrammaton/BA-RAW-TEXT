[translation]
1600006-1 = "การคาดเดาที่ผิดพลาด"
1600006-3 = "(คุณครูสูดหายใจเข้าเต็มปอด ก่อนจะวิ่งเข้าไปในป่าตามที่ฮารุกะวิ่งหายเข้าไป)"
1600006-4 = "(แต่ว่าป่าทั้งลึกและกว้างใหญ่มาก คุณครูจึงคลาดกับฮารุกะกลางทาง สุดท้ายก็หลงทางอยู่ในป่า)"
1600006-6 = "(จากนั้นคุณครูก็จำไม่ได้ว่าเดินวนอยู่ในป่านั้นนานเท่าไร)"
1600006-9 = "(คุณครูเดินไปนั่งพักใต้ต้นไม้ให้หายเหนื่อย แล้วก็เผลอหลับไป)"
1600006-10 = "(...)"
1600006-12 = "...คุณ..."
1600006-13 = "[ns] \"...?\""
1600006-14 = "...คุณครู...!"
1600006-15 = "...คุณครูคะ!! ทำใจดีๆ ไว้ค่ะคุณครู!!!"
1600006-16 = "คุณครูคะ!!!"
1600006-18 = "คุณครูเป็นอะไรรึเปล่าคะ? คุณครู!"
1600006-19 = "อา... ฟื้นแล้วสินะคะ เฮ้อ... ใจหายหมดเลย..."
1600006-20 = "[s] \"ฮารุกะ...?\""
1600006-21 = "อา... ค่ะ ฉันเองค่ะ ฮารุกะเองค่ะ"
1600006-22 = "ฮึ่ก..."
1600006-23 = "ขะ...ขอโทษด้วยนะคะ พะ...พอดีฉันตกใจมากไปหน่อยก็เลยทำไปโดยไม่รู้ตัว...!"
1600006-24 = "ถะ...ถึงจะเป็นการช่วยเหลือก็เถอะ แต่ที่ฉันประคองและสัมผัสคุณครูแบบนี้มัน...!!"
1600006-25 = "คะ...? ไม่เป็นไรงั้นเหรอคะ...? อยู่ท่านี้ก็สบายดีเลยอยากให้ทำแบบนี้ต่อเหรอคะ...?"
1600006-26 = "ตะ...แต่ว่ามัน...! มะ... มัน...!"
1600006-27 = "ปะ...เปล่าค่ะ! ไม่ใช่ว่าฉันไม่ชอบหรอกนะคะ...!! แต่ว่ามัน...!!"
1600006-28 = "คะ...คุณครู...?"
1600006-29 = "สะ...สีหน้าคุณครูดูไม่ดีเลย... รู้สึกดีขึ้นบ้างไหมคะ?"
1600006-30 = "[s1] \"อื้อ ได้มองฮารุกะแบบนี้ ครูดีขึ้นแล้วล่ะ\"\n[s2] \"ได้อยู่ในอ้อมกอดฮารุกะแบบนี้ ครูโชคดีจังเลยนะ คิดถูกแล้วที่มา\""
1600006-31 = "?"
1600006-32 = "?"
1600006-33 = "#%^&*@#!!??"
1600006-37 = "ขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะ#nขอโทษค่ะขอโทษค่ะขอโทษด้วยค่ะขอโทษด้วยค่ะ"
1600006-38 = "มะ...ไม่เป็นไรจริงๆ เหรอคะ? ตะ...แต่ว่า..."
1600006-39 = "ว่าแต่ว่าทำไมคุณครู... ถึงได้มาอยู่ในในที่โทรมๆ แบบนี้ล่ะคะ...?"
1600006-40 = "ทะ... ที่นี่ปกติแล้ว นอกจากฉันแล้วจะไม่มีใครมา... เป็นที่ที่ถูกทุกคนลืมเลือนไปแล้ว..."
1600006-41 = "...? คะ? ฉันกำลังทำอะไรอยู่น่ะเหรอคะ?"
1600006-42 = "เอ่อ... คือว่า..."
1600006-43 = "ฉันแค่มาเปลี่ยนดินแล้วก็ถอนหญ้าในกระถาง...บอนไซ..."
1600006-44 = "บะ...บางครั้งฉันก็แค่มาขุดเอาดินกลับไปค่ะ... ถะ...ถ้าโชคดีล่ะก็ อะ..อาจจะเจอวัตถุดิบ#nเอาไว้ทำปุ๋ยหมักดีๆ..."
1600006-45 = "[s3] \"อ๋อ มาดูแลบอนไซสินะ\"\n[s4] \"ครูเข้าใจผิดสินะ ฮะฮะฮะ\""
1600006-46 = "คะ...? หมายถึงอะไรเหรอคะคุณครู...?"
1600006-47 = "คะ...? หมายถึงอะไรเหรอคะคุณครู...?"
1600006-48 = "เอ๋... แล้วคุณครูคิดอะไรเหรอคะถึงได้มาที่นี่...?"
1600006-49 = "ระ...หรือว่าคุณครูตามฉันมาที่นี่...!? มาที่ห่างไกลแบบนี้...!? เพราะฉันเหรอคะ...!?"
1600006-50 = "[ns] \"...\""
1600006-51 = "(คุณครูอธิบายสถานการณ์ที่เกิดขึ้นให้ฮารุกะฟังอย่างดีที่สุด)"
1600006-52 = "..."
1600006-53 = "(แต่ว่าสายตาของฮารุกะค่อยๆ หลุบต่ำลง)"
1600006-54 = "..."
1600006-55 = "ขะ..."
1600006-56 = "[s] \"ฮารุกะ... เดี๋ยวก่อน...\""
1600006-57 = "ขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะ#nขอโทษค่ะขอโทษค่ะขอโทษด้วยค่ะขอโทษด้วยค่ะ..."
1600006-61 = "ขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะ#nฉันไม่รู้จริงๆ ค่ะ ไม่คิดว่าคุณครูจะเข้าใจแบบนี้..."
1600006-62 = "ขอโทษด้วยค่ะขอโทษด้วยค่ะที่แก้ตัวขอโทษด้วยค่ะที่ทำให้ลำบาก#nฉันจะออกไปจากที่นี่เพื่อแสดงความขอโทษ...!!"
1600006-63 = "...เอ๋? ไม่ต้องทำแบบนั้นก็ได้เหรอคะ? แต่ว่าฉันกลับทำให้คุณครูลำบากซะแล้ว...!!"
1600006-64 = "คะ...?"
1600006-65 = "ปกติคุณครูมาเดินออกกำลังกายแบบนี้อยู่แล้วอย่างนั้นเหรอคะ? งั้นเหรอคะ?#nตะ...แต่ว่าแล้วที่คุณครูสลบไปล่ะคะ...?"
1600006-66 = "ปะ...เปล่าค่ะ! เปล่าค่ะ! ฉันไม่ได้จะซักไซ้หรือว่าเค้นคำตอบอะไรหรอกนะคะ...!!!"
1600006-67 = "[s5] มองที่มือของฮารุกะเพื่อหาวิธีเปลี่ยนเรื่องคุย\n[s6] \"ที่เธอถืออยู่เป็นวัชพืชชนิดใหม่เหรอ?\""
1600006-68 = "คะ...? อ่า... นะ...นี่น่ะเหรอคะ?"
1600006-69 = "คะ...? อ่า... นะ...นี่น่ะเหรอคะ?"
1600006-70 = "อา... นี่เป็นดินที่ฉันเล่าให้ฟัง... ที่ขุดขึ้นมาเมื่อกี้น่ะค่ะ"
1600006-71 = "พวกวัชพืชที่ขึ้นบนบอนไซ... หาจากที่นี่ไม่ได้หรอกค่ะ... เพราะว่าพวกหญ้าที่ขึ้นที่นี่#nมันไม่ใช่ \"วัชพืช\" น่ะค่ะ..."
1600006-72 = "วัชพืชที่ฉันปลูกอยู่จะเป็นพวกวัชพืช...ไร้ประโยชน์.. ที่ขึ้นริมทางเท้าที่พวกเด็กๆ เดินไปมา..."
1600006-73 = "แต่ว่า...ถึงจะเป็นวัชพืชไร้ประโยชน์ก็คงอยากได้ดินดีๆ บ้าง...#nฉันเลยอยากจะเอาดินไปให้พวกมันค่ะ..."
1600006-74 = "ฉันเองก็เหมือนกับวัชพืชพวกนั้น... ที่ไร้ประโยชน์และเอาแต่รับความช่วยเหลือจากคนอื่นอยู่เสมอ... "
1600006-75 = "ถึงมันจะแทนกันไม่ได้ แต่อย่างน้อยฉันก็อยากทำประโยชน์ให้กับพวกวัชพืชบ้าง..."
1600006-76 = "[s7] \"ฮารุกะเป็นคนใจดีมากเลยนะ\"\n[s8] \"อยากทำประโยชน์ให้กับใครบางคนงั้นเหรอ?\""
1600006-77 = "มะ...ไม่ถึงขนาดนั้น...! ฉันไม่ใช่คนใจดีอะไรหรอกค่ะมันก็แค่...!"
1600006-78 = "มะ...ไม่ถึงขนาดนั้น...! ฉันไม่ใช่คนใจดีอะไรหรอกค่ะมันก็แค่...!"
1600006-79 = "มะ... ไม่ใช่นะคะ! เดี๋ยวก่อนนะคะ! แต่ที่คุณครูพูดมาก็ไม่ได้ผิดหรอกนะคะ แต่ว่ามัน...เอ่อคือ...!!"
1600006-80 = "...คะ... คือ..."
1600006-81 = "ถ้างั้น..."
1600006-82 = "ถ้าคุณครูพูดแบบนั้น... ก็ตกลงว่าเป็นตามนั้นค่ะ ตกลงตามนั้นค่ะ...!!"
1600006-83 = "คะ... คะ? ตอนนี้ก็ใจดีอยู่แล้วเหรอคะ?"
1600006-84 = "ตะ...แต่ว่า... เรื่องนั้นไม่มีทาง... มะ...ไม่สิ! ไม่ใช่นะคะคือว่า... นี่ไม่ใช่การบังคับให้พูดนะคะ...!"
1600006-85 = "คะ... คือว่า... คะ... คือ......!!!"
1600006-86 = "เอา...แบบ...นั้น...ก็ได้ค่ะ ถ้าคุณครูพูดแบบนั้น... เรื่องนั้น...!!!"
1600006-87 = "เอาตามนั้นเลยค่ะ...!! ค่ะ...!"
1600006-89 = "(จากนั้นทั้งสองคนก็ลุกขึ้น และคุณครูก็ช่วยฮารุกะถือดินที่ขุดมากลับโรงเรียน)"
1600006-90 = "(โชคดีที่ขากลับได้กลับมาพร้อมกับฮารุกะที่รู้ทางในป่า เลยกลับมาถึงโรงเรียนได้แบบไม่หลงทาง)"
1600006-94 = "(คุณครูเขินนิดหน่อยเมื่อรู้ว่าระยะทางในป่าไม่ได้ลึกอย่างที่คิด แต่ตนเองกลับหลงซะได้...)"

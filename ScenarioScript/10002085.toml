[translation]
10002085-1 = "ตอนที่ 8;ร้านริมทะเล 2"
10002085-2 = "ร้านริมทะเล"
10002085-3 = "อึ่ก...! อึ่ก...อะ...อะไรกัน ทำไมยัยพวกนี้ถึงมาอยู่ที่นี่ได้ล่ะ...!?"
10002085-4 = "เป็นไปไม่ได้... หรือว่ายัยพวกนี้เป็นพวกเดียวกันกับเจ้าของร้านริมทะเลงั้นเหรอ!"
10002085-5 = "พวกคุณควรเห็นคุณค่าอาหารแสนสำคัญที่คนอื่นตั้งใจทำขึ้นมาสิคะ!#nนี่มันเป็นเรื่องพื้นฐานสุดๆ เลยนะ!!"
10002085-6 = "พะ...พื้นฐาน...!? อาหารแสนสำคัญ...!? พวกเธอ...คิดงั้นจริงเรอะ!!"
10002085-7 = "ฮะ...ฮึ่ก ฝากไว้ก่อนก็แล้วกัน! คอยดูเถอะ...! สักวันนึงจะเอาคืนให้สาสมเลย!! "
10002085-12 = "อืมมมม~"
10002085-13 = "ขอบคุณทุกคนมากนะ! รอดมาได้เพราะทุกคนเลยนะเนี่ย! ไม่งั้นคงเกิดเรื่องใหญ่ขึ้นแน่ๆ..."
10002085-14 = "ขอบคุณทุกคนที่ช่วยทำให้ร้านปลอดภัยนะ!"
10002085-15 = "ไม่เป็นไรค่ะ มันเป็นเรื่องที่ชมรมทวงความยุติธรรมควรจัดการอยู่แล้วค่ะ ฉันดีใจนะคะที่ช่วยร้านเอาไว้ได้"
10002085-16 = "อื้อ! โชคดีจริงๆ!"
10002085-17 = "ถึงมันอาจจะดูน้อยไปหน่อย..."
10002085-20 = "แต่ว่ามาดื่มเครื่องดื่มนี่กันก่อนเถอะ! เอ้า นี่!"
10002085-21 = "ฉันให้ฟรีๆ เลย! ฉันให้เป็นของขวัญขอบคุณน่ะ! ทุกคนดื่มได้เลยนะ!"
10002085-22 = "พวกเราไม่ได้ช่วยเพราะหวังอะไรตอบแทนเลยนะคะ..."
10002085-23 = "นี่คืออะไรเหรอคะ? น้ำผลไม้...? สีดูแปลกๆ ดีนะคะ"
10002085-24 = "เชื่อมือได้เลย ลองชิมดูแล้วเดาดูสิว่ามันคืออะไร!"
10002085-25 = "เธอก็ดื่มด้วยสิ เธอด้วยๆ!"
10002085-26 = "ฉลองที่ร้านปลอดภัยยังไงล่ะ!"
10002085-27 = "ทุกคน ชนแก้ววว~!!"
10002085-34 = "ชนแก้ววว~!!"
10002085-35 = "[s] (ดื่มเครื่องดื่ม)"
10002085-38 = "(กลืนเครื่องดื่มลงไป)"
10002085-44 = "(พ่นเครื่องดื่มออกมาอย่างแรง)"
10002085-45 = "(หลังจากลองดื่มแล้วก็รู้ทีหลังว่านั่นคือ <น้ำผลไม้ปลิงทะเลรสช็อกโกแลต>)"

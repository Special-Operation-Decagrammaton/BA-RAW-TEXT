[translation]
10002085-1 = "Episode 8;Beach Shack Part 2"
10002085-2 = "Beach Shack"
10002085-3 = "Gah! Wh-Why? What are you losers doing here too?!"
10002085-4 = "Now I get it. These crooks have been in bed with that corrupt restaurant the whole time!"
10002085-5 = "Paying back someone's hospitality is common courtesy. Fighting back is the least we could do!"
10002085-6 = "Courtesy?! Hospitality?! Are you out of your minds?!"
10002085-7 = "Ugh. You'll pay for this...! You'll all pay for this! "
10002085-12 = "*sniffle*"
10002085-13 = "Thank you for coming to my rescue, everyone! You really saved me!"
10002085-14 = "The restaurant is still standing thanks to you."
10002085-15 = "Don't mention it—this is what the Justice Task Force does. I'm glad we could save the restaurant."
10002085-16 = "Yep! Thank goodness for that!"
10002085-17 = "This doesn't really make it up to you, but here."
10002085-20 = "Have a drink on me, everyone!"
10002085-21 = "It's totally on the house as my way of saying thanks."
10002085-22 = "We weren't expecting anything in return, but if you insist."
10002085-23 = "What is this, anyway? Juice? The color looks quite exotic."
10002085-24 = "Trust me—it's good. Try to figure it out from the flavor."
10002085-25 = "You too! Here!"
10002085-26 = "To the restaurant's safety!"
10002085-27 = "Cheers!"
10002085-34 = "Cheeeeers!"
10002085-35 = "[s] Take a sip."
10002085-38 = "*gulp*"
10002085-44 = "BLEGH!"
10002085-45 = "(It turns out that was the Chocolate Sea Cucumber Juice.)"

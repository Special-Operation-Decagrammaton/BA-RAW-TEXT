[translation]
10002085-1 = "第8話;海之家（２）"
10002085-2 = "海之家"
10002085-3 = "唔啊啊！？#n為，為什麼連你們都在這裡……！？"
10002085-4 = "可惡，竟然跟這間海之家結盟了嗎……！？"
10002085-5 = "竟敢不尊重別人辛苦製作的料理，真是豈有此理！請你們反省！"
10002085-6 = "要，要我們尊重那種料理……！？你們是認真的嗎！？"
10002085-7 = "可惡，給我走著瞧！#n下次，下次一定會……！！"
10002085-12 = "幸，幸好沒事……"
10002085-13 = "真的很謝謝你們大家！託你們的福得救了！"
10002085-14 = "差點就出大事了呢！"
10002085-15 = "別這麼說，這是身為實現正義部的一員該做的。#n店鋪沒事真是太好了。"
10002085-16 = "嗯！還是謝謝你們！"
10002085-17 = "雖然可能算不上是謝禮……"
10002085-20 = "這些請大家喝！"
10002085-21 = "啊，這些都是免費招待！#n就當作是感謝的心意，儘管喝吧！"
10002085-22 = "雖然這並非本意，不過我就感激地收下了。"
10002085-23 = "……話說回來，這個果汁……顏色相當奇特呢。"
10002085-24 = "沒事沒事，不用想太多！"
10002085-25 = "來，也給你，那邊那位也一起來吧！"
10002085-26 = "那麼，慶祝店裡平安無事！"
10002085-27 = "乾杯～！！"
10002085-34 = "乾杯～！！"
10002085-35 = "[s] 喝下那杯灰色的飲料"
10002085-38 = "（……咕嚕！）"
10002085-44 = "噗嗚嗚嗚嗚嗚嗚嗚嗚！？！？"
10002085-45 = "（醒來之後才知道，那時喝的就是「巧克力海參汁」）"

[translation]
1300408-1 = "#Title;건강해지는 거예요"
1300408-2 = "#place;아비도스 학교 운동장"
1300408-3 = "3;노노미;03;아, 오셨네요, 선생님!\n#3;hophop\n#3;a\n#3;em;[반응]"
1300408-4 = "3;노노미;01;여기, 아령이에요.\n#3;greeting"
1300408-5 = "3;노노미;02;어디보자…… 5kg짜리가 20개, 10kg짜리가 10개, 20kg짜리는 5개…….\n#3;m2"
1300408-6 = "3;노노미;04;……네? 이렇게 많은 줄 몰랐다고요?\n#3;m3"
1300408-7 = "3;노노미;14;어라……. 그러고보니까 시로코 쨩도 비슷한 얘기를 했던 거 같은데……. \n#3;em;[땀]\n#3;stiff"
1300408-8 = "3;노노미;13;으응…… 제가 너무 많이 산 걸까요. 체력 단련에 아령이 얼마나 필요한지 잘 몰라서……."
1300408-9 = "3;노노미;04;5kg 짜리 하나면 된다고요? 그, 그렇군요…….\n#3;em;[반응]"
1300408-10 = "3;노노미;01;그럼 나머지는 아비도스 학교 체육관에다가 놔둬야겠어요."
1300408-11 = "3;노노미;07;지금은 거의 쓰이지 않고 있지만…… #n나중에 학교가 다시 정상화되었을 때 사용할 수 있었으면 좋겠네요.\n#3;em;[반짝]\n#3;greeting"
1300408-12 = "#all;hide"

[translation]
1300408-1 = "In Pursuit of Health"
1300408-2 = "Abydos School Playground"
1300408-3 = "Oh, there you are, Sensei!"
1300408-4 = "Here. Dumbbells."
1300408-5 = "Let's see... Twenty five-kilogram weights...ten ten-kilogram weights...and five fifteen-kilogram weights."
1300408-6 = "Come again? You didn't realize we bought so many?"
1300408-7 = "Funny you should say that... I believe Shiroko said the same thing."
1300408-8 = "Hmm... Maybe I overdid it. How was I supposed to know how many dumbbells we'd need...?"
1300408-9 = "We could have made-do with a single five-kilogram one? M-Maybe..."
1300408-10 = "I suppose the extras could be donated to the Abydos school gym."
1300408-11 = "Unfortunately, it's still shut down right now... Hopefully, we can use it again once the school is back to normal."

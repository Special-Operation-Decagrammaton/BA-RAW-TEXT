[translation]
1300408-1 = "變得健康吧"
1300408-2 = "阿拜多斯高中．操場"
1300408-3 = "啊，你來了啊，老師！"
1300408-4 = "來，這個，啞鈴。"
1300408-5 = "那個，我看看……5kg的20組、10kg的10組、20kg的5組……"
1300408-6 = "……什麼？沒想到有這麼多嗎？"
1300408-7 = "咦……這麼說來，白子醬好像也說過類似的話……"
1300408-8 = "嗯……我，買太多了嗎。我不太知道啞鈴一般需要多少才好……"
1300408-9 = "5kg的1組就夠了嗎？原，原來如此……"
1300408-10 = "那麼剩下的，就放在學校的體育館囉。"
1300408-11 = "雖然現在幾乎已經沒有在使用了……等學校哪天恢復正常後，能使用到的話就太好了。"

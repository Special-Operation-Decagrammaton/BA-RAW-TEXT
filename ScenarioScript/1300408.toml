[translation]
1300408-1 = "เราต้องแข็งแรงขึ้น"
1300408-2 = "สนามกีฬาโรงเรียนอะบิดอส"
1300408-3 = "คุณครู มาแล้วเหรอคะ!"
1300408-4 = "นี่ค่ะ ดัมเบล\n"
1300408-5 = "ไหนดูซิ... ขนาด 5 กก. 20 อัน ขนาด 10 กก. 10 อัน... แล้วก็ขนาด 20 กก. อีก 5 อัน..."
1300408-6 = "คะ...? ไม่รู้ว่าเราซื้อมาเยอะขนาดนี้เหรอคะ?"
1300408-7 = "อืม... จะว่าไปแล้ว ชิโรโกะจังก็เคยพูดแบบนี้เหมือนกัน..."
1300408-8 = "อืม... บางทีฉันอาจจะซื้อมาเยอะเกินไป พอดีฉันไม่แน่ใจว่าเราจะต้องใช้ดัมเบลกี่อันกันแน่ก็เลย..."
1300408-9 = "ขนาด 5 กก. อันเดียวก็พอเหรอคะ? งะ... งั้นเหรอคะ....."
1300408-10 = "ถ้างั้นฉันจะเอาอันที่เหลือเอาไปไว้ที่โรงยิมของโรงเรียนแล้วกันค่ะ"
1300408-11 = "แต่ว่าตอนนี้โรงยิมของเราปิดอยู่...#nถ้าจากโรงเรียนบูรณะใหม่แล้วกลับมาเปิดใช้โรงยิมได้เหมือนเดิมก็คงดีนะคะ"

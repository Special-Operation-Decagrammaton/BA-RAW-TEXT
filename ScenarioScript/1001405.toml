[translation]
1001405-1 = "於是伊樹菜開始喜歡"
1001405-2 = "（為了參加時代劇鑑賞會，拜訪了伊樹菜的家）"
1001405-3 = "啊，主公！歡迎光臨！"
1001405-4 = "您一路上是否有迷路呢？"
1001405-5 = "啊！我馬上幫您倒茶！"
1001405-6 = "如果您肚子餓的話，這裡還有爆米花口味的饅頭喔！"
1001405-7 = "[s1] 「謝謝，我不客氣了。」\n[s2] 「伊樹菜，你好像比平常開心耶。」"
1001405-8 = "欸嘿嘿，是的！"
1001405-9 = "欸嘿嘿，是的！"
1001405-10 = "因為今天要看的時代劇系列，是伊樹菜最喜歡的作品之一。"
1001405-11 = "而且今天可以和主公一起看，並分享彼此的心得……！"
1001405-12 = "讓我這幾天一直無法靜下心來……"
1001405-13 = "在MomoTalk邀請主公之後，就一直有種輕飄飄的感覺！"
1001405-14 = "[s] 「是，是嗎……今天要看那個系列的什麼？」"
1001405-15 = "柴犬汪藏導演拍的經典忍者時代劇《徬徨的孤獨忍者77人組》豪華版！"
1001405-16 = "[s3] 「那真的算孤獨嗎？」\n[s4] 「怎麼感覺朋友很多啊……？」"
1001405-17 = "而且每集1小時，總共8集！"
1001405-18 = "而且每集1小時，總共8集！"
1001405-20 = "全系列加起來8小時的超大作！"
1001405-21 = "[s] 「那麼久！？」"
1001405-22 = "是，是的，不過……"
1001405-23 = "要了解這部作品的真正價值，必須要每一集都看過……"
1001405-24 = "請問，不行嗎……？"
1001405-25 = "[s5] （伊樹菜總是生龍活虎動來動去的耳朵……）\n[s6] （居然無力地垂下了……！）"
1001405-30 = "[ns7] 「不會，沒那回事！今天我正好，」\n[ns8] 「想來看個時代劇度過一整天！」"
1001405-33 = "那，那真是太好了……！"
1001405-34 = "那我們馬上開始吧！主公！"
1001405-36 = "嘿咻， "
1001405-37 = "把錄影帶放進播放器裡……"
1001405-41 = "嗯……？啊，開始了！"
1001405-43 = "（就這樣和伊樹菜一起觀賞了將近8個小時的時代劇）"
1001405-45 = "非常有趣呢！"
1001405-46 = "對主公的忠誠！"
1001405-47 = "各個忍者為了活命，不得不拔刀相向。"
1001405-48 = "慘烈的戰鬥！接二連三的背叛！"
1001405-49 = "以及在那之間綻放的友情和愛情……"
1001405-50 = "主公！您覺得怎麼樣！？"
1001405-51 = "伊樹菜都看過好幾次了還是覺得超帥氣！都會不知不覺看到出神！\n"
1001405-52 = "[s11] 「比想像的還要有趣好幾倍嚇我一跳……」\n[s12] 「滿溢出了很多帥氣感呢。」"
1001405-53 = "就是說呀！所謂的忍者就是雖然活在黑暗之中，卻是很帥氣的存在！"
1001405-54 = "就是說呀！所謂的忍者就是雖然活在黑暗之中，卻是很帥氣的存在！"
1001405-55 = "[s13] 「感覺好像多少能夠體會，」\n[s14] 「伊樹菜為什麼會喜歡忍者了。」"
1001405-58 = "──！！您有體會到了嗎！"
1001405-59 = "主公……！"
1001405-61 = "伊樹菜真的由衷喜歡忍者！"
1001405-62 = "[s] 「哇！？伊樹菜，你冷靜點！」"
1001405-63 = "欸嘿♪ 欸嘿嘿～♪  "
1001405-68 = "主公～主公～！"
1001405-69 = "啊！對了！除了這部，伊樹菜還有另一個推薦的新系列喔！"
1001405-70 = "[s] 「不過，伊樹菜，時間已經不早了……」"
1001405-71 = "咦……可是伊樹菜想和主公一起看完，一起聊感想的說……"
1001405-72 = "但說的也是。已經很晚了，還是算了吧……"
1001405-75 = "[ns] 「沒事！不管多少都看！」"
1001405-77 = "謝，謝謝主公……！那就，開始看吧！"
1001405-79 = "（於是，和伊樹菜的鑑賞會，就這麼一路持續到了早上）"

[translation]
1001405-1 = "What Izuna Likes"
1001405-2 = "(I arrived at Izuna's place for a historical drama watch party.)"
1001405-3 = "Ah, my lord! You're here!"
1001405-4 = "Did you find your way okay?"
1001405-5 = "And would you like some tea?"
1001405-6 = "I also have popcorn-flavored manju if you're hungry!"
1001405-7 = "[s1] \"You really went all out.\"\n[s2] \"You look excited, Izuna.\""
1001405-8 = "Heehee!"
1001405-9 = "Heehee!"
1001405-10 = "The series we're going to watch is one of Izuna's favorites."
1001405-11 = "I'm sure you'll have a newfound appreciation for these kinds of stories once you see it."
1001405-12 = "I can hardly sit still..."
1001405-13 = "Ever since I sent you that MomoTalk, I've felt like I'm about to explode!"
1001405-14 = "[s] \"Really...? What are we watching?\""
1001405-15 = "It's a deluxe set of Shiba Dog Wang Wang's masterpiece, \"The Lonely 77 Wandering Ninjas\"!"
1001405-16 = "[s3] \"How can they be lonely if there are 77 of them?\"\n[s4] \"Sounds like they have a lot of friends to me...\""
1001405-17 = "There are eight episodes that run for an hour each!"
1001405-18 = "There are eight episodes that run for an hour each!"
1001405-20 = "I hope you didn't have plans for the next eight hours."
1001405-21 = "[s] \"You didn't mention that part!\""
1001405-22 = "Huh? But..."
1001405-23 = "This is a must-watch if you want to understand the true value of ninja historical dramas."
1001405-24 = "Is this...too much for you? *slumps*"
1001405-25 = "[s5] (Izuna's ears are usually perked up, but not now...)\n[s6] (I've never seen her ears droop like that before!)"
1001405-30 = "[ns7] \"It's okay! I don't have anything else to do today.\"\n[ns8] \"I wanted to spend the whole day watching ninja dramas anyway!\""
1001405-33 = "What a relief...!"
1001405-34 = "Then let's watch it together, my lord!"
1001405-36 = "Woohoo!"
1001405-37 = "I'll just put the tape into the player..."
1001405-41 = "Huh? Oh, it's starting!"
1001405-43 = "(I spend the next eight hours watching the historical drama with Izuna.)"
1001405-45 = "Wow! That was so much fun!"
1001405-46 = "Loyalty to a lord!"
1001405-47 = "Ninjas forced to cross blades just to survive."
1001405-48 = "Desperate struggles! Betrayal!"
1001405-49 = "And the friendship and love that bloom in the ashes..."
1001405-50 = "Wasn't that amazing, my lord?"
1001405-51 = "When Izuna looks at it, she can't help but think to herself, \"Oh, that's cool!\""
1001405-52 = "[s11] \"Yeah... It was much better than I expected.\"\n[s12] \"It definitely pushed the envelope.\""
1001405-53 = "Of course! Ninjas are the best!"
1001405-54 = "Of course! Ninjas are the best!"
1001405-55 = "[s13] \"I think I get it now.\"\n[s14] \"I can see why you like them so much.\""
1001405-58 = "You finally understand."
1001405-59 = "Heehee. My lord..."
1001405-61 = "That makes me so happy!"
1001405-62 = "[s] \"Wh-Whoa. Calm down, Izuna!\""
1001405-63 = "Heehee. ♪ "
1001405-68 = "My lord, my lord!"
1001405-69 = "Oh! I almost forgot. This one's great, but Izuna has a new series to recommend!"
1001405-70 = "[s] \"It's getting pretty late...\""
1001405-71 = "But I wanted to watch this one with you too..."
1001405-72 = "Can't you stay for just a little while longer...? *slumps*"
1001405-75 = "[ns] \"How can I say no to you?!\""
1001405-77 = "Yes! The second viewing is starting! ♪"
1001405-79 = "(Izuna and I stayed up all night.)"

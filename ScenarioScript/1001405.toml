[translation]
1001405-1 = "เพราะแบบนั้นอิซุนะจึงรู้สึกดี"
1001405-2 = "(จากนั้นคุณครูก็ไปที่บ้านของอิซุนะเพื่อดูละครย้อนยุค)"
1001405-3 = "อ๊ะ นายท่าน! เชิญเลยค่ะ!"
1001405-4 = "เดินทางมาเหนื่อยหรือเปล่าคะ?"
1001405-5 = "จะรับน้ำชาไหมคะ?"
1001405-6 = "ถ้าหิวก็มีขนมหมั่นโถวรสป็อปคอร์นด้วยนะคะ!"
1001405-7 = "[s1] \"เตรียมทุกอย่างพร้อมเลยนะ\"\n[s2] \"อิซุนะดูตื่นเต้นนะ\""
1001405-8 = "ฮิฮิฮิ!"
1001405-9 = "ฮิฮิฮิ!"
1001405-10 = "ซีรีส์ละครย้อนยุคที่เราจะดูในวันนี้เป็นหนึ่งในเรื่องที่อิซุนะชอบที่สุดเลยค่ะ"
1001405-11 = "พอคิดว่าจะได้มาดูกับนายท่าน ได้แบ่งปันความรู้สึกกันแล้ว..."
1001405-12 = "อิซุนะก็ตื่นเต้นจนอยู่เฉยไม่ไหวเลยล่ะค่ะ"
1001405-13 = "ตอนที่ส่งข้อความไปทาง MOMOTALK ไปหานายท่านก็ตื่นเต้นมากเลยค่ะ!"
1001405-14 = "[s] \"งั้นเหรอ...?\" ละครย้อนยุคที่จะดูวันนี้ชื่ออะไรล่ะ?\""
1001405-15 = "ผลงานละครนินจาย้อนยุคชิ้นเอกของปรมาจารย์ผู้กำกับชิบะ#nเซ็ตดีลักซ์ 'นินจาพเนจรผู้โดดเดี่ยว 77 คน' ค่ะ!"
1001405-16 = "[s3] \"มีตั้ง 77 คน โดดเดี่ยวตรงไหนน่ะ?\"\n[s4] \"มีเพื่อนเต็มไปหมดเลยไม่ใช่รึไง...?\""
1001405-17 = "มีทั้งหมด 8 องก์ องก์ละ 1 ชั่วโมง!"
1001405-18 = "มีทั้งหมด 8 องก์ องก์ละ 1 ชั่วโมง!"
1001405-20 = "รวมแล้วทั้งหมด 8 ชั่วโมงค่ะ!"
1001405-21 = "[s] \"ไม่เห็นเคยบอกเลยว่าเยอะขนาดนี้?!\""
1001405-22 = "คะ?! แต่ว่า..."
1001405-23 = "ถ้าจะเข้าถึงละครนินจาย้อนยุคก็ต้องดูประมาณนี้นะคะ..."
1001405-24 = "แต่ถ้านายท่าน… ไม่สะดวก…? (หูลู่)"
1001405-25 = "[s5] (หูของอิซุนะที่มักจะกระดิกอยู่ตลอดแต่ตอนนี้มัน...)\n[s6] (หู่ลู่ขนาดนั้นเลยเหรอ...!)"
1001405-30 = "[ns7] \"ไม่เป็นไร! ครูมีเวลาทั้งวันเลยล่ะ\"\n[ns8] \"ครูอยากดูละครนินจาย้อนยุคมากเลย!\""
1001405-33 = "โล่งอกไปที...!"
1001405-34 = "งั้นมาดูกันเลยนะคะ! นายท่าน!"
1001405-36 = "วู้ว~"
1001405-37 = "เอาม้วนวิดีโอใส่ลงในเครื่องเล่น"
1001405-41 = "หืม? อ๊ะ เริ่มแล้วค่ะ!"
1001405-43 = "(และเพราะแบบนั้น คุณครูเลยได้ดูละครย้อนยุคกับอิซุนะไปร่วม 8 ชั่วโมง)"
1001405-45 = "ว้าว! สนุกจังค่ะ!"
1001405-46 = "ความภักดีต่อผู้เป็นนาย!"
1001405-47 = "นินจาที่ต้องห้ำหั่นกันเพื่อความอยู่รอด"
1001405-48 = "การต่อสู้ที่โหดร้าย! การทรยศครั้งแล้วครั้งเล่า!"
1001405-49 = "และความรักและมิตรภาพที่เกิดขึ้น..."
1001405-50 = "ยอดไปเลยใช่ไหมล่ะคะ นายท่าน?"
1001405-51 = "พอดูไปเรื่อยๆ อิซุนะก็คิดว่า \"ว้าว เท่จังเลยน้า~...!\""
1001405-52 = "[s11] \"สนุกกว่าที่คิดไว้เลยนะ\"\n[s12] \"ที่จริงก็มีกลิ่นอายเรื่องโรแมนซ์ด้วยนะ\""
1001405-53 = "ใช่ค่ะ! นินจาคือสิ่งมีชีวิตที่เต็มไปด้วยเรื่องโรแมนซ์ค่ะ!"
1001405-54 = "ใช่ค่ะ! นินจาคือสิ่งมีชีวิตที่เต็มไปด้วยเรื่องโรแมนซ์ค่ะ!"
1001405-55 = "[s13] \"อย่างนี้นี่เอง อิซุนะถึงได้ชอบ...\"\n[s14] \"รู้สึกเหมือนจะเข้าใจมากขึ้นนิดหน่อย\""
1001405-58 = "เข้าใจแล้วสินะคะ!"
1001405-59 = "ฮิฮิ! นายท่าน!"
1001405-61 = "ฉันชอบมากเลยล่ะค่ะ!"
1001405-62 = "[s] \"ว้าก อิซุนะ?! ใจเย็นๆ ก่อน!\""
1001405-63 = "ฮืมฮื้ม♪ ฮืมฮื้มฮืม~♪"
1001405-68 = "นายท่าน~ นายท่าน~!"
1001405-69 = "อ๊ะ! จริงด้วย! อิซุนะมีซีรีส์เรื่องใหม่มาแนะนำด้วยค่ะ!"
1001405-70 = "[s] \"อืม... แต่ตอนนี้ก็ดึกมากแล้ว...\""
1001405-71 = "อิซุนะอยากดูด้วยกันและแบ่งปันความรู้สึก..."
1001405-72 = "ไม่ได้เหรอคะ...? (หูลู่)"
1001405-75 = "[ns] \"เปล่า! ครูพร้อมทุกเมื่อเลย!\""
1001405-77 = "เย้! มาเริ่มชมละครย้อนยุคเรื่องที่สองกันเถอะค่ะ~♪"
1001405-79 = "(จากนั้นคุณครูก็ดูละครย้อนยุคกับอิซุนะทั้งคืน)"

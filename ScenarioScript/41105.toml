[translation]
41105-3 = "咕啊啊！？"
41105-4 = "強，強的亂七八糟啊……快逃！"
41105-8 = "各，各位！要去哪裡？敵人還沒……"
41105-9 = "再說了明明什麼都不想做，怎麼可能戰鬥啊！？"
41105-10 = "我要回去了，"
41105-11 = "這種生活受夠了！"
41105-12 = "給，給我等一下！！"
41105-20 = "啊啊，「所確幸」的基地……好不容易蒐集到的高價裝飾品都燒起來了……"
41105-21 = "[s] 「一提再提真是抱歉，但你不是不執著於『擁有』嗎……？」"
41105-22 = "吵死了！！奢侈是人的本質吧！？"
41105-23 = "要不是你們，要不是你們……！"
41105-27 = "……A側，安全。"
41105-28 = "2樓的狙擊手也全員倒下……"
41105-29 = "B側也安全。"
41105-30 = "除了幾個逃走的，全都鎮壓完成。"
41105-32 = "好的，各位辛苦了。"
41105-33 = "雖然沒有收穫，不過幸好沒有受傷……"
41105-37 = "……嗯？都子，這不是罐頭嗎？雖然賞味期限到期了……"
41105-41 = "煙燻鮭魚和培根……"
41105-45 = "連油漬干貝都有！"
41105-46 = "哦哦……只要有這些，普通的便當也能一口氣變高級……！"
41105-48 = "等，等等，不准碰！"
41105-49 = "那些高級罐頭，是我打算當下酒菜珍藏的……！"
41105-51 = "都子醬，這裡有好多睡袋和防潑水加工的防水布……"
41105-52 = "之前每次下雨的時候都很困擾，但只要有這個……"
41105-53 = "……原來如此，說得沒錯呢。"
41105-57 = "萌，可以立刻安排車輛嗎？"
41105-58 = "戰利品似乎比想像中還多。"
41105-60 = "這，這些東西什麼時候是「戰利品」了！"
41105-61 = "這全都是我的東西！別對我的所有物出手！"
41105-62 = "[s] 「說好的『無所有』呢……」"
41105-64 = "但是這些，賞味期限幾乎都到期了耶？"
41105-65 = "你的部下也不在了……吃不完吧？"
41105-66 = "最初進行威嚇射擊的是你們。"
41105-67 = "作為損害賠償，就算不是全部，也請給我們一部分吧。"
41105-72 = "唔，咕唔……"
41105-74 = "飯桶！社會的腫瘤！那麼想要的話為什麼不正常工作！？"
41105-75 = "那麼強的話，不用依靠廢棄便當也能生活吧！看要當傭兵還什麼都行吧！"
41105-76 = "我們不是傭兵，而是SRT。"
41105-77 = "誰管你啊！既然有正當的所屬，區區便當讓給我又怎樣！！"
41105-78 = "在賭上生存戰鬥的地方，帶入最先進武器和正義邏輯……"
41105-79 = "你們根本滿口狡辯！"
41105-80 = "滿口狡辯的是你吧！？"
41105-81 = "左一句「無所有」右一句「求道者」，行動卻完全忠於慾望……"
41105-82 = "是求道者的話就像個求道者，給我去吃豆芽菜便當！"
41105-83 = "吵死了！就算是求道者也想吃燒肉便當啊！"
41105-84 = "[s] 「冷靜點冷靜點……」"
41105-86 = "[s1] 「總之這次我也有錯，防水布那些有需要我會幫忙買。」\n[s2] 「大家也不要帶走這裡的東西。」"
41105-89 = "……"
41105-95 = "我再說一次，不需要老師的幫助。"
41105-96 = "無論老師說什麼，我們也不會改變想法……"
41105-97 = "……好累。幾乎連食慾都沒了。"
41105-98 = "回去吃個豆芽菜便當睡覺吧……"
41105-99 = "我，我也是……"
41105-100 = "……說得也是呢。突然吃油膩的東西對胃也不好……"
41105-104 = "營地RABBIT，這裡是RABBIT1。"
41105-105 = "作戰結束，現在開始返回。"
41105-106 = "咦，戰利品呢？和牛牛排便當呢！？"
41105-107 = "很遺憾，沒有那種東西。"
41105-108 = "今天就吃豆芽菜便當吧。"
41105-109 = "咦咦！？好不容易安排車輛了耶！？"
41105-110 = "吵死了，就當作是減肥。"
41105-117 = "呵，呵呵，那個充滿慾望的眼神……"
41105-118 = "果然「擁有」會讓人盲目，內心變得兇惡……"
41105-119 = "[s] 「我覺得你的眼神也差不多……」"
41105-120 = "我，"
41105-121 = "我才沒有！？"
41105-122 = "我這澄澈的雙眼，可以看穿所有的價值！因此有很多同志……"
41105-123 = "話，話說回來同志們都不在了……"
41105-124 = "……趁這個機會，老師要不要也參加「所確幸」呢？"
41105-125 = "來吧老師，放下所有物，一起尋找精神的歸屬……"
41105-126 = "[s] 「恕我拒絕……」"
41105-129 = "下一話;大雨特報"

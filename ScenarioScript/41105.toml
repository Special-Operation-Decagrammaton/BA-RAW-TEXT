41105-37 = "1;사키 헬멧;02;……어라? 미야코, 여기 봐. 유통기한이 막 지난 반찬 통조림이 잔뜩 쌓여 있어."
41105-38 = "#st;[0,0];instant;1;"
41105-39 = "#clearST"

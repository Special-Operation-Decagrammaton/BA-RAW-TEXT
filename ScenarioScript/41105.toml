41105-69 = "#clearST"
41105-70 = "#all;hide"
41105-71 = "3;데카르트;03\n#3;em;…\n#wait;2500"
41105-72 = "3;데카르트;02;으읏…… 으으읏……\n#3;stiff"
41105-73 = "#all;hide"
41105-74 = "3;데카르트;05;이 사회의 거머리! 니트! 거지! 어째서 정당하게 일해서 음식을 구하지 않는 거야?\n#3;closeup\n#fontsize;80\n#bgshake"
41105-75 = "3;데카르트;05;그렇게 강하면 이런 곳에서 폐기 도시락에 집착할 필요도 없잖아! 용병 일이든 뭐든 하라고!\n#3;em;[빠직]\n#3;stiff\n#3;closeup"
41105-76 = "3;데카르트;05\n5;미야코;11;저희는 용병이 아닙니다. SRT의 요원입니다만……\n#5;al\n#3;m1"
41105-77 = "3;데카르트;05;그렇다면 더더욱 도시락을 양보했어야지!\n#3;hophop"
41105-78 = "3;데카르트;06;가난한 시민들이 생존을 위해 싸우는 전장에 최첨단 무기를 들고 와서 양학을 하다니……"
41105-79 = "3;데카르트;05;이 위선자들 같으니라고!\n#3;em;[!]\n#fontsize;80"
41105-80 = "5;사키 헬멧;09;뭐? 그, 그러는 너야말로 위선자잖아!\n#5;em;[땀]\n#5;stiff"
41105-81 = "5;사키 헬멧;10;무소유니, 수도니 그럴싸한 말만 잔뜩 떠든 주제에, 하는 행동은 욕망 그 자체면서……"
41105-82 = "5;사키 헬멧;11;수도자면 수도자답게 얌전히 숙주 도시락이나 먹으라고!\n#5;em;[빠직]\n#5;m4"
41105-83 = "3;데카르트;05;시끄러워! 나도 야키니쿠 도시락 먹을 거야!\n#3;hophop\n#3;m2"

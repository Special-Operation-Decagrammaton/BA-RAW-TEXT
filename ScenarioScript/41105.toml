41105-41 = "1;사키 헬멧;02;훈제 연어랑 베이컨……\n#1;em;…"
41105-42 = "#st;[0,0];instant;1;"
41105-43 = "#clearST"
41105-44 = "1;사키 헬멧;01\n#1;greeting\n#wait;1500"
41105-45 = "1;사키 헬멧;03;오일에 절인 조개관자도 있네!"
41105-46 = "1;사키 헬멧;07;후후, 이 통조림을 곁들인다면 평범한 폐기 도시락도 순식간에 고급스러워지겠는걸.\n#1;em;[음표]\n#1;hophop"
41105-47 = "#all;hide"
41105-48 = "5;미야코;07\n2;사키 헬멧;03\n1;데카르트;02;잠깐…… 손대지 마!\n#1;hophop\n#1;ar\n#2;m3"
41105-49 = "1;데카르트;05;그 <겐츠마>의 고급 통조림은 나중에 술안주로 먹기 위해 아껴 두었던 거라고!"
41105-50 = "#all;hide"
41105-51 = "3;미유ND;02;미야코 쨩, 여기에는 구멍 난 침낭이랑 낡은 방수포도 잔뜩 있어.\n#3;em;[반응]\n#3;a"
41105-52 = "3;미유ND;11;비가 내릴 때마다 바닥이 습해져서 걱정이었는데…… 이걸 바닥에 깔면 될 것 같아."
41105-53 = "5;미야코;02;……그렇네요.\n#5;em;…\n#5;al\n#3;m1"

[translation]
41105-3 = "Gyahh!"
41105-4 = "Th-They're too strong... Run!"
41105-8 = "C-Comrades? Where are you running? The enemy is still there..."
41105-9 = "These wimps don't even have the guts to get a job. Of course they hightailed it out of battle."
41105-10 = "I'm going home."
41105-11 = "I don't wanna be a hobo anymore!"
41105-12 = "Wait, no! You have to fight for me!"
41105-20 = "Oh no... My precious base... All my expensive decorations I worked so hard to collect... It's all burning..."
41105-21 = "[s] \"What happened to giving up on worldly desires?\""
41105-22 = "Shut up! Shut up, you! Everyone likes nice, expensive things!"
41105-23 = "You... If it weren't for you..."
41105-27 = "Site A clear."
41105-28 = "And I took out a-all the snipers, too..."
41105-29 = "Site B clear."
41105-30 = "Besides those who escaped, all of the enemies on the first floor have been neutralized."
41105-32 = "Nice and clean, everyone."
41105-33 = "There might not have been a payload, but no one got hurt."
41105-37 = "Miyako, come check this out. I think...this is a bunch of canned food."
41105-41 = "Smoked salmon, bacon..."
41105-45 = "There's even scallops preserved in oil!"
41105-46 = "What a payload! Imagine eating our bentos with these delicacies!"
41105-48 = "Wait... Keep your greedy paws off that!"
41105-49 = "I've been saving that high-quality canned food from Gentsuma to have with a drink!"
41105-51 = "M-Miyako. I found a buncha other stuff too. Sleeping bags, tarpaulins..."
41105-52 = "We can put this under us when we sleep! The ground gets so damp when it rains."
41105-53 = "Great job, Miyu."
41105-57 = "Moe, please arrange for some transportation."
41105-58 = "There's a lot more loot than we expected. We won't be able to carry it all."
41105-60 = "Loot? LOOT?! That's my STUFF."
41105-61 = "It's all mine! My things. My precious possessions. My everything! You can't have it!"
41105-62 = "[s] \"Ah. Yes. I, too, love the noble pursuit of non-possessiveness.\""
41105-64 = "You call all this trash your precious possessions?"
41105-65 = "I don't see your little minions anywhere anyways. I don't think you'll need any of this anymore."
41105-66 = "Correct. And you were also the one who baited us with false information and attempted to kill us."
41105-67 = "I don't believe this even begins to compensate us for our losses as a direct result of your actions."
41105-72 = "Ghh... Arrrgh...!"
41105-74 = "You leeches! NEETs! You useless hobos! Why the hell don't you go out and work to earn your own food?!"
41105-75 = "If you're so strong, why're you scrounging over expired bentos anyway?! Go get a real job! Be mercenaries or something! I don't care!"
41105-76 = "We're not mercenaries. We're SRT agents."
41105-77 = "Hmph! Well then you really shouldn't have stolen our bentos in the first place."
41105-78 = "Citizens in poverty battle for survival every day. You think you can just flash your big, fancy weapons and bully everyone into doing what you want? Huh?!"
41105-79 = "You... You hypocrites!"
41105-80 = "Us? Hypocrites? Look in the mirror sometime, buddy."
41105-81 = "Noble pursuit, this. Non-possession, that. Meanwhile, your supposed enlightenment is just a phony scam to hide the fact that you're a lazy good-for-nothing!"
41105-82 = "A real monk wouldn't care if they were eating wagyu or mung bean sprouts!"
41105-83 = "Shut up! I deserve to eat yakiniku bentos too!"
41105-84 = "[s] \"Break it up, you two.\""
41105-86 = "[s1] \"You shouldn't steal his things. I'll buy you what you need.\"\n[s2] \"RABBIT Squad, leave his things here. I have a credit card.\""
41105-89 = "..."
41105-95 = "We don't need your help, Sensei."
41105-96 = "Neither do we need to listen to anything you say... But..."
41105-97 = "Weird, I don't have much of an appetite. Must've worked too hard."
41105-98 = "I think I'll just eat a mung bean sprout bento at home."
41105-99 = "M-Me too..."
41105-100 = "...Yes. I believe we may get stomachaches if we force ourselves to eat."
41105-104 = "Camp RABBIT, this is RABBIT 1. Please cancel transport. Operation complete."
41105-105 = "We're returning to base now."
41105-106 = "What about the top-quality wagyu bento?! Sensei said it was there!"
41105-107 = "Regretfully, it looks like they're plum out of the top-quality wagyu bento."
41105-108 = "Luckily, we have the mung bean sprout bentos from today. They're even a few days before their expiration."
41105-109 = "Does no one appreciate me?! I already arranged transport!"
41105-110 = "Sorry, Moe. Think of it as non-possessiveness."
41105-117 = "Didn't you see?! The glowering look of greed in their murderous little eyes..."
41105-118 = "It's just as I said. Attachment to material possessions blinds people with greed, which inevitably leads to violence!"
41105-119 = "[s] \"As Saki said... You should look in a mirror.\""
41105-120 = "Me?! Blinded by greed?"
41105-121 = "Nuh-uh! Not in a million years!"
41105-122 = "I am an enlightened one! I understand what true value is in this lost society!"
41105-123 = "I may have lost comrades today, but I can rebuild!"
41105-124 = "Actually...I just had a thought. Sensei, why don't you join the Pursuers yourself?"
41105-125 = "All you must do to join is prove your commitment to non-possessiveness and give up a very, very small portion of your things."
41105-126 = "[s] \"I'd rather eat a mung bean sprout bento.\""
41105-129 = "Next Episode; Heavy Rain Advisory"

[translation]
41105-3 = "ぐあぁっ！？"
41105-4 = "で、でたらめな強さだ……逃げろ！"
41105-8 = "み、みなさん！どこに行くのですか？まだ敵は……"
41105-9 = "そもそも何もしたくないのに、戦闘なんかできるわけないだろ！？"
41105-10 = "もう帰る、"
41105-11 = "こんな生活懲り懲りだ！"
41105-12 = "ま、待ちなさい！！"
41105-20 = "ああ、「所確幸」のアジトが……せっかく集めた高い装飾品も、全部燃えて……"
41105-21 = "[s] \"何度も申し訳ないんだけど、「所有」に執着しないんじゃ……？\""
41105-22 = "うるさい！！贅沢するのは人間の本質だろう！？"
41105-23 = "あなたたちが、あなたたちさえいなければ……！"
41105-27 = "……Aサイト、クリア。"
41105-28 = "2階の狙撃手も全員無力化……"
41105-29 = "Bサイトもクリア。"
41105-30 = "何人か逃げられたけど、それ以外は全員制圧した。"
41105-32 = "はい、お疲れ様でした。"
41105-33 = "得るものはありませんでしたが、怪我などは無いようで何より……"
41105-37 = "……ん？ミヤコ、これ缶詰じゃないか？賞味期限は切れてるけど……"
41105-41 = "燻製のサーモンにベーコン……"
41105-45 = "オイル漬けのホタテまである！"
41105-46 = "おぉ……これさえあれば普通の弁当も、一気に高級な感じに……！"
41105-48 = "ま、待て、触るな！"
41105-49 = "そこの高級缶詰は、後でお酒のつまみにしようと私が大事に……！"
41105-51 = "ミヤコちゃん、ここに寝袋とか撥水加工のシートがたくさん……。"
41105-52 = "雨が降るたびに困ってたけど、これさえあれば……。"
41105-53 = "……なるほど、そうですね。"
41105-57 = "モエ、今すぐ車両を手配してもらえますか？"
41105-58 = "思ったより戦利品が多くなりそうです。"
41105-60 = "な、何をいつの間に「戦利品」扱いしてるんだ！"
41105-61 = "これは全部私のものだ！私の所有物に手を出すな！"
41105-62 = "[s] \"「無所有」の話は一体どこに……。\""
41105-64 = "でもこれ、ほとんど賞味期限切れかけだぞ？"
41105-65 = "お前の部下はもういなくなっちゃったし……食べきれなくないか？"
41105-66 = "最初に威嚇射撃をしてきたのはそちらです。"
41105-67 = "その分の損失として、全部ではないにせよ頂けないでしょうか。"
41105-72 = "うっ、くうっ……。"
41105-74 = "穀潰し！社会の膿！そんなに欲しいならどうして真っ当に働かない！？"
41105-75 = "そんなに強ければ、廃棄弁当なんか当てにしなくても生活できるだろう！傭兵にでも何にでもなれるじゃないか！"
41105-76 = "私たちは傭兵ではなく、SRTですから。"
41105-77 = "知るか！とにかく真っ当な所属があるなら、弁当くらい譲ったらどうなんだ！！"
41105-78 = "生存をかけて戦ってるところに、最先端の武器やら正義の理屈やらを持ち込んで……"
41105-79 = "あなたたちの言っていることは全て詭弁だ！"
41105-80 = "詭弁だらけなのはお前の方だろ！？"
41105-81 = "「無所有」だの「求道者」だの言ってるくせに、行動は欲望に忠実だし……"
41105-82 = "求道者なら求道者らしく、もやし弁当でも食ってろ！"
41105-83 = "うるさい！求道者だって焼肉弁当が食べたいんだ！！"
41105-84 = "[s] \"どうどう……。\""
41105-86 = "[s1] \"とにかく今回は私も悪いし、必要なシートとかは私が買うから。\"\n[s2] \"みんなも、ここにある物は持っていかないであげて。\""
41105-89 = "……。"
41105-95 = "もう一度言いますが、先生の助けは不要です。"
41105-96 = "先生が何を言おうと、私たちが考えを変えることはありませんし……。"
41105-97 = "……疲れた。もう食欲すらほぼ無い。"
41105-98 = "帰って、もやし弁当でも食べて寝よう……。"
41105-99 = "わ、私も……。"
41105-100 = "……そうですね。急に脂っぽい物を食べたら胃に悪そうですし……。"
41105-104 = "キャンプRABBITへ、こちらRABBIT1。"
41105-105 = "作戦は終了、帰投します。"
41105-106 = "え、戦利品は？和牛ステーキ弁当は！？"
41105-107 = "残念ですが、無かったことになりました。"
41105-108 = "今日はもやし弁当でも食べるとしましょう。"
41105-109 = "えぇー！？せっかく車両の手配したのに！？"
41105-110 = "うるさい、ダイエットだと思え。"
41105-117 = "ふ、ふふ、その欲望に満ちた眼差し……"
41105-118 = "やはり「所有」は人の目を見えなくし、心を凶悪に……"
41105-119 = "[s] \"あなたも大体同じ眼だと思うけど……。\""
41105-120 = "わ、"
41105-121 = "私はそんなことありませんが！？"
41105-122 = "私はこの澄んだ眼で、全ての価値を見極めることができるのです！その結果、多くの同志たちが……"
41105-123 = "そ、そういえば同志たちはいなくなったんでした……。"
41105-124 = "……この際ですし、先生も「所確幸」に参加されませんか？"
41105-125 = "さあ先生の所有物を手放し、共に精神の在り処を……。"
41105-126 = "[s] \"遠慮します……。\""
41105-129 = "次回;大雨注意報"

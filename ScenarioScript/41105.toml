[translation]
41105-3 = "อ๊ากกกก!"
41105-4 = "ศัตรูเก่งกันมากเลย... หนีเร็ว!"
41105-8 = "พวกพ้องทั้งหลาย! จะไปไหนกันน่ะ? ทางโน้นยังมีศัตรู..."
41105-9 = "แค่เรื่องหางานทำเรายังไม่กล้าเลย แล้วคิดว่าเรื่องต่อสู้เราจะทำได้เหรอ?"
41105-10 = "ฉันกลับบ้านดีกว่า"
41105-11 = "ไม่อยากใช้ชีวิตแบบขอทานอีกแล้ว!"
41105-12 = "เดี๋ยวก่อน! อย่าหนีไปนะ! มาสู้ด้วยกันก่อนเซ่!"
41105-20 = "หมดกัน ฐานทัพ <ความสุขเล็กๆ> กับของตกแต่งราคาแพงที่สะสมมา... กำลังถูกไฟเผา..."
41105-21 = "[s] \"ไหนว่าไม่สนเรื่องการครอบครองอะไรไง?\""
41105-22 = "หนวกหูน่า! คนเราก็ชอบอะไรที่แพงและหรูหราอยู่แล้วนี่!"
41105-23 = "ทั้งหมดนี้... เป็นเพราะพวกเธอ...!"
41105-27 = "เคลียร์โซน A เรียบร้อย..."
41105-28 = "สไนเปอร์ที่อยู่ชั้น 2 โดนเก็บหมดแล้ว..."
41105-29 = "เคลียร์โซน B เรียบร้อย"
41105-30 = "ศัตรูชั้น 1 ถูกปราบเรียบ แต่มีบางคนที่หนีไปได้"
41105-32 = "ทำได้ดีมากค่ะทุกคน"
41105-33 = "ถึงเราจะไม่ได้อะไรกลับมามากเท่าไร แต่ก็โชคดีแล้วละค่ะที่ไม่มีใครได้รับบาดเจ็บ"
41105-37 = "เอ๋...? ดูนี่สิมิยาโกะ มีอาหารกระป๋องที่เพิ่งหมดอายุเพียบเลย"
41105-41 = "แซลมอนรมควันกับเบคอน..."
41105-45 = "หอยเชลล์แช่ในน้ำมันก็มี!"
41105-46 = "ฮิฮิ ถ้ามีอาหารกระป๋องกินเป็นเครื่องเคียงด้วย ข้าวกล่องเหลือทิ้งธรรมดาๆ ก็คงหรูหราขึ้นในชั่วพริบตา"
41105-48 = "หยุดนะ... ห้ามแตะต้องเด็ดขาด!"
41105-49 = "ฉันเก็บอาหารกระป๋องชั้นดีนี้ไว้เป็นกับแกล้มเหล้านะ!"
41105-51 = "มิยาโกะจัง ตรงนี้มีถุงนอนที่มีรูรั่วกับผ้ายางเก่าๆ เพียบเลย"
41105-52 = "ฉันกังวลอยู่เรื่อยเลยเวลาฝนตกแล้วพื้นเปียกชื้น ถ้ามีผ้ายางรองพื้นเราก็ไม่ต้องกังวลอีกต่อไปแล้วล่ะ"
41105-53 = "นั่นสินะคะ..."
41105-57 = "โมเอะ ช่วยส่งรถมารับของทางนี้หน่อยได้ไหมคะ?"
41105-58 = "ของที่เรายึดมาได้มีมากกว่าที่คิดเอาไว้อีกน่ะค่ะ ถ้าจะให้เดินแบกกลับไปคงจะลำบาก"
41105-60 = "ของที่ยึดได้งั้นเหรอ? จะมายึดของของคนอื่นไปได้ยังไง?"
41105-61 = "ฉันคือเจ้าของของพวกนี้นะ! ทุกอย่างคือของรักของหวงของฉัน ฉันให้ใครไม่ได้!"
41105-62 = "[s] \"ใครกันนะที่บอกว่าจะไม่เป็นเจ้าของอะไร...\""
41105-64 = "ของรักของหวงอะไรกัน นี่มันของเสียที่ควรทิ้งต่างหาก"
41105-65 = "ลูกน้องของคุณก็หนีไปกันหมดแล้ว คงไม่มีใครมาใช้แล้วล่ะ..."
41105-66 = "อีกอย่างนะ พวกคุณนั่นแหละที่ล่อลวงพวกเรามาด้วยข้อมูลอันเป็นเท็จ"
41105-67 = "ของเก่าๆ แค่นี้ไม่เพียงพอต่อความเสียหายที่เราได้รับด้วยซ้ำ..."
41105-72 = "หนอย...."
41105-74 = "เจ้าพวกปลิงของสังคม! คนขี้แพ้! พวกขอทาน! ทำไมไม่ไปหางานทำดีๆ แล้วหาข้าวกินเองล่ะ?"
41105-75 = "ถ้าเก่งกันขนาดนี้ก็ไม่ต้องมารอเก็บข้าวกล่องเหลือทิ้งก็ได้นี่! ไปหางานทำซะ จะเป็นทหารรับจ้าง#nหรืออะไรก็ว่าไปสิ!"
41105-76 = "พวกเราไม่ใช่ทหารรับจ้างนะคะ เป็นหน่วยทหารของ SRT ต่างหาก..."
41105-77 = "ถ้าอย่างนั้นก็ยิ่งต้องแบ่งข้าวกล่องให้พวกเราสิ!"
41105-78 = "ไม่อยากเชื่อเลยว่าพวกเธอจะเอาอาวุธเทคโนโลยีชั้นสูงมาใช้ในสนามรบที่มีพลเมืองผู้ยากจนต้อง#nต่อสู้เพื่อความอยู่รอด..."
41105-79 = "พวกจอมปลอม พวกใจไม้ไส้ระกำ!"
41105-80 = "ว่าไงนะ? แกนั่นแหละจอมปลอม!"
41105-81 = "ปากบอกว่าไม่ได้อยากครอบครองอะไร แต่สุดท้ายการกระทำล้วนแล้วแต่มาจากความโลภทั้งนั้น..."
41105-82 = "ถ้าอยากใช้ชีวิตอย่างมีศีลธรรมก็กินข้าวกล่องหน้าถั่วงอกไปซะสิ!"
41105-83 = "เงียบไปเลย! ฉันจะกินข้าวหน้าเนื้อย่าง!"
41105-84 = "[s] \"พอๆๆ ทั้งคู่อย่าทะเลาะกันเลย\""
41105-86 = "[s1] \"ถ้าอยากได้ของใช้จำเป็นอะไรก็บอกครูได้เลย\"\n[s2] \"กองทหาร RABBIT อย่าไปแตะต้องของพวกนั้น\""
41105-89 = "......"
41105-95 = "จะต้องให้บอกกี่รอบกันคะว่าพวกเราไม่ต้องการความช่วยเหลือจากคุณครู"
41105-96 = "ไม่ว่าคุณครูจะพูดอะไร เราก็จะไม่เปลี่ยนความคิดหรอกค่ะ..."
41105-97 = "เฮ้อ... หรือว่าเราออกแรงต่อสู้มากเกินไป ทำไมวันนี้ไม่อยากอาหารเลยนะ"
41105-98 = "สงสัยจะได้กลับค่ายไปกินข้าวหน้าถั่วงอกแหงๆ..."
41105-99 = "อื้ม ฉันก็ด้วย..."
41105-100 = "นั่นสินะคะ... ถ้าฝืนกินอาหารมันๆ มีหวังได้ท้องอืดกันพอดี"
41105-104 = "RABBIT 1 เรียก RABBIT ในค่าย ปฏิบัติการเสร็จสิ้นแล้วค่ะ"
41105-105 = "เราจะกลับไปที่ค่ายเดี๋ยวนี้ค่ะ"
41105-106 = "ว่าไงนะ แล้วของที่ยึดได้ล่ะ? ข้าวกล่องหน้าเนื้อวากิวชั้นดีล่ะ?!"
41105-107 = "น่าเสียดายที่ข้าวกล่องหน้าเนื้อวากิวชั้นดีที่นี่ขายหมดแล้วค่ะ"
41105-108 = "วันนี้เรากินแค่ข้าวกล่องหน้าถั่วงอกจากร้านสะดวกซื้อแถวนั้นแล้วกันค่ะ"
41105-109 = "ว่าไงนะ? ฉันอุตส่าห์เตรียมรถขนของแล้วนะ!"
41105-110 = "หนวกหูน่าโมเอะ คิดซะว่าไดเอตก็แล้วกัน"
41105-117 = "เห็นแล้วใช่ไหม? นี่แหละสายตาของคนที่ถูกความโลภครอบงำ..."
41105-118 = "การอยากได้อยากมีทำให้คนตาบอดและมีจิตใจโหดร้าย"
41105-119 = "[s] \"นายเองก็ด้วยไม่ใช่เหรอ?\""
41105-120 = "นี่แกบอกว่าฉันตาบอดเพราะความอยากได้อยากมีงั้นรึ?"
41105-121 = "ไม่มีทางซะหรอก!"
41105-122 = "ตาทั้งสองข้างของฉันแยกแยะได้ชัดเจนว่าสิ่งใดมีค่าและสิ่งใดไร้ค่า!"
41105-123 = "แม้ว่าความวุ่นวายในวันนี้จะทำให้ฉันสูญเสียพวกพ้องไปก็เถอะ..."
41105-124 = "จริงสิ คุณครูก็มาเข้าร่วมกลุ่ม <ความสุขเล็กๆ> ของเราดูไหมล่ะ?"
41105-125 = "แต่คุณครูต้อง 'ปล่อยวาง' ของที่มีอยู่เพื่อพิสูจน์ให้เห็นว่าไม่ต้องการเป็นเจ้าของสิ่งใดด้วยนะ"
41105-126 = "[s] \"ไม่เอาอะ...\""
41105-129 = "ตอนต่อไป;ระวังฝนตกหนัก"

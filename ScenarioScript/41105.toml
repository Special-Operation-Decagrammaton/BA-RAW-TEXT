41105-57 = "5;미야코;03;모에, 이쪽으로 바로 차량을 수배해서 보내주시겠습니까?"
41105-58 = "5;미야코;03;전리품이 생각보다 많아서 도보로 귀환하는 건 어려울 것 같습니다."
41105-59 = "#all;hide"
41105-60 = "3;데카르트;02;전리품이라니, 남의 물건을 두고 무슨 소리를 하는 거야?\n#3;hophop"
41105-61 = "3;데카르트;05;이건 다 내 거야! 내 소유라고! 누구에게도 못 주는 내 소중한 애장품이야!\n#3;em;[빠직]"
41105-62 = "[s] \"무소유는 어디 갔어…….\""
41105-63 = "#all;hide"
41105-64 = "3;사키 헬멧;12;애장품이라고는 해도 다 썩기 직전의 폐품뿐이잖아?\n#3;em;[?]"
41105-65 = "3;사키 헬멧;11;더욱이 당신네 부하도 다 떠난 것 같으니 이제 쓸 곳도 거의 없을 테고……."
41105-66 = "5;미야코;11;게다가 거짓 정보로 저희를 꾀어내어 먼저 위협을 가한 것은 그쪽입니다.\n#5;em;[반응]\n#5;al\n#3;m1"
41105-67 = "5;미야코;10;그로 인해 저희가 입은 손실을 생각하면 이 정도의 보상도 부족할 수준입니다만……."

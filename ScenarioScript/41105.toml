41105-22 = "2;데카르트;05;시끄러워! 사람이면 비싸고 호화로운 걸 좋아하는 게 당연하잖아?!\n#2;hophop\n#2;m3"
41105-23 = "2;데카르트;06;너희들만…… 너희들만 아니었어도……!\n#2;em;[속상함]"

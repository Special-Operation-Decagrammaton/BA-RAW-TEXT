[translation]
10049010-1 = "ตอนที่ 1;พอแล้วละ กลุ่มรักษาความสงบน่ะ"
10049010-2 = "อาคารเรียนอนุบาลเก่า ทรีนิตี้"
10049010-3 = "เธอน่ะ ไม่ต่างอะไรจากพวกเราหรอก"
10049010-5 = "คะ?"
10049010-6 = "นี่ๆ พอได้แล้ว! พูดแบบนั้นเดี๋ยวก็ได้โดนระเบิดแสงอีกลูกหรอก!"
10049010-7 = "ไม่ค่ะ... กฎของฉันคือจะไม่โจมตีฝ่ายตรงข้ามที่หมดสภาพต่อสู้แล้วค่ะ"
10049010-8 = "แต่ที่สำคัญกว่านั้น เมื่อกี้คุณพูดว่าอะไรนะคะ?"
10049010-9 = "\"ไม่ต่างอะไรจากพวกเรา\" งั้นเหรอคะ?"
10049010-10 = "ระเบิดแสงที่ขว้างมาเมื่อกี้ก็เป็นฝีมือเธอใช่มั้ย?"
10049010-11 = "ยัย 'มนุษย์แฟลชบอมบ์แห่งทรีนิตี้' ที่เรียกตัวเองว่ากลุ่มรักษาความสงบ"
10049010-16 = "ค่ะ... ใช่แล้วค่ะ..."
10049010-17 = "เธอคิดว่าตัวเองคู่ควรกับการทำแบบนั้นงั้นเหรอ?"
10049010-18 = "ไม่ได้เป็นชมรมทวงความยุติธรรมชุดดำสักหน่อย"
10049010-19 = "กลุ่มรักษาความสงบเป็นชื่อที่พวกเธอตั้งขึ้นมาเองไม่ใช่เหรอ?"
10049010-20 = "จริงอยู่ค่ะที่ฉันไม่ใช่ชมรมทวงความยุติธรรม..."
10049010-21 = "การทำงานดูแลความปลอดภัยของเพื่อนบ้าน จำเป็นต้องมีคุณสมบัติที่คู่ควรด้วยเหรอคะ?"
10049010-22 = "ก็ถ้าไม่ได้รับการยอมรับจากสังคม งั้นก็ไม่ต่างอะไรกับพวกฉันหรอก"
10049010-23 = "ถึงจะขัดขวางคนอื่นและใช้ความรุนแรง แต่อย่างน้อยพวกฉันก็ไม่เคยโอ้อวดว่าตัวเองดีเด่มาจากไหน!"
10049010-24 = "ทำไมเธอถึงมาทำงานกลุ่มรักษาความสงบอะไรนี่อยู่เหรอ? ไม่เห็นจะมีใครมองเห็นเลยนี่นา?"
10049010-25 = "หรือว่าเข้าชมรมทวงความยุติธรรมไม่ได้ ก็เลยต้องมาอยู่กลุ่มนี้แทน?"
10049010-26 = "!!"
10049010-27 = "การที่เธอมาคุกคามคนอื่นแบบนี้ สุดท้ายแล้วมันก็คืออาชญากรรมไม่ใช่เหรอ?"
10049010-28 = "ฉันพูดถูกใช่มั้ยล่ะ! ช่างเถอะ ไปดีกว่า! ฉันไม่มาเหยียบย่านสกปรกๆ นี้อีกแล้ว!"
10049010-32 = "หืม? อ่า..."
10049010-36 = "......"
10049010-41 = "จะ... จะไม่เป็นไรเหรอ? ถ้ายัยนั่นตามมารังควานเราล่ะจะทำยังไง...?"
10049010-42 = "ชู่ว..! นิ่งไว้ ใจดีสู้เสือไว้ก่อน"
10049010-43 = "ดูสิ"
10049010-45 = "......"
10049010-47 = "เห็นมั้ย? ฉันพูดถูกเผง ยัยนั่นถึงกับยืนนิ่งเลย"
10049010-48 = "บอกแล้วว่าไม่มีใครเอาชนะตรรกะของฉันได้หรอก"
10049010-49 = "จะ... จะยังไงก็ช่าง ฉันว่าเราใช้จังหวะนี้เผ่นก่อนเถอะ!! "
10049010-55 = "ไม่เห็นจะมีใครมองเห็น..."
10049010-56 = "เข้าชมรมทวงความยุติธรรมไม่ได้..."
10049010-57 = "สุดท้ายแล้ว การทำแบบนี้ก็คืออาชญากรรม..."
10049010-58 = "ฉัน... เป็นอย่างนั้นเหรอคะ..?"
10049010-63 = "ห้องสมุดเก่า ทรีนิตี้"
10049010-64 = "ไหนดูซิ หนังสือที่เปลี่ยนเป็นเล่มตีพิมพ์ใหม่ใส่รวมไว้ในกล่องนี้แล้ว"
10049010-65 = "ส่วนหนังสือที่จะบริจาคให้ห้องสมุดอื่นก็อยู่ตรงนี้..."
10049010-70 = "อื้อ! ส่วนหนังสือที่จะเอาไปเก็บในโกดังก็จัดเสร็จแล้ว!"
10049010-71 = "เวลาล่วงเลยมาขนาดนี้แล้วเหรอเนี่ย... ต้องรีบไปรีบกลับแล้วละ"
10049010-75 = "หืม? เสียงใครดังมาจากหลังโกดังน่ะ..."
10049010-79 = "งั้นก็สุดสัปดาห์นี้ใช่มั้ย...?"
10049010-80 = "อื้อ หัวหน้าราบุบอกไว้ว่าจะไปวันนั้น"
10049010-81 = "หัวหน้าสั่งให้ทุกคนมารวมตัวกันที่ <สวนสนุกบอเดอร์แลนด์> น่ะ"
10049010-85 = "(สะ... สมาชิกแก๊งหมวกกันน็อก? ดึกดื่นแบบนี้มาทำอะไรที่นี่น่ะ?)"
10049010-86 = "(จะว่าไป ฉันก็เคยได้ยินข่าวลือว่าห้องสมุดเก่าไม่ค่อยมีใครมา คนก็เลยชอบแอบนัดกันมาที่นี่เพื่อ#nหลบเลี่ยงสายตาคนอื่น)"
10049010-87 = "(ตอนนี้น่าจะยังไม่มีใครรู้ว่าฉันอยู่ที่นี่ งั้นรีบหนีไปจากตรงนี้ดีกว่า...)"
10049010-89 = "แบบนี้สวนสนุกน่าจะเละจนไม่มีชิ้นดีเลยละ"
10049010-90 = "!"
10049010-94 = "ถึงจะไม่อยากให้เป็นแบบนั้น แต่งานนี้แก๊งหมวกกันน็อกป๋อมแป๋มพลาดไม่ได้หรอก"
10049010-95 = "แล้วจะบาดเจ็บมากหรือเปล่านะ"
10049010-96 = "ก็ขึ้นอยู่กับว่าทางนั้นจะมาไม้ไหนน่ะ"
10049010-98 = "(จะมีคนบาดเจ็บงั้นเหรอ? นี่มันแผนการอะไรกัน...)"
10049010-99 = "แต่ว่า... ลำพังพวกเราจะเพียงพอเหรอ?"
10049010-100 = "เห็นว่าจะส่งกำลังเสริมจากแก๊งอื่นมาให้ไม่ใช่เหรอ? ยังไงก็ไหวน่า"
10049010-101 = "ไปกันเถอะ เดี๋ยวมีใครมาได้ยินเข้า"
10049010-103 = "(ห้ามมาทางนี้นะ...!)"
10049010-104 = "(หนีก่อนดีกว่า...!)"
10049010-111 = "แฮ่ก... แฮ่ก..."
10049010-112 = "เรื่องที่ 2 คนนั้นคุยกันเมื่อกี้"
10049010-113 = "ที่บอกว่าสุดสัปดาห์นี้... จะมีคนบาดเจ็บใน <สวนสนุกบอเดอร์แลนด์>"
10049010-114 = "แล้วก็เอ่ยชื่อหัวหน้าราบุออกมาด้วย เรื่องนี้..."
10049010-115 = "ต้องขัดขวางไว้ให้ได้ ฉันต้องไปแจ้งใครสักคนแล้วละ..."
10049010-119 = "ว้ายย!"
10049010-120 = "......"
10049010-121 = "อ๊ะ คุณสึซึมิจากกลุ่มรักษาความสงบ?"
10049010-122 = "มาได้จังหวะพอดีเลยค่ะ! "
10049010-123 = "เมื่อกี้ฉันได้ยินสมาชิกแก๊งหมวกกันน็อกวางแผนชั่วร้ายอะไรกันอยู่หลังโกดังห้องสมุดเก่าค่ะ"
10049010-124 = "ทำยังไงดีคะ? กลุ่มรักษาความสงบทำอะไรได้บ้างมั้ยคะ?"
10049010-125 = "คะ? อ๊ะ... ค่ะ"
10049010-126 = "อย่างนั้นสินะคะ ถ้างั้นก็..."
10049010-130 = "ก็ถ้าไม่ได้รับการยอมรับจากสังคม งั้นก็ไม่ต่างอะไรกับพวกฉันหรอก"
10049010-134 = "[log=불량배 스케반 A]หรือว่าเข้าชมรมทวงความยุติธรรมไม่ได้ ก็เลยต้องมาอยู่กลุ่มนี้แทน?[/log]"
10049010-137 = "......"
10049010-138 = "คุณสึซึมิ?"
10049010-139 = "ไม่มีอะไรค่ะ เราไปแจ้งชมรมทวงความยุติธรรมด้วยกันเถอะค่ะ"
10049010-140 = "'บางที' นี่อาจเป็นงานของชมรมทวงความยุติธรรมก็ได้ค่ะ..."
10049010-141 = "อ่า... ค่ะ งั้นสินะคะ...?"
10049010-142 = "งั้นก็รีบไปแจ้งกันเถอะค่ะ!"
10049010-143 = "......"

10049010-9 = "About us \"not being so different.\""
10049010-10 = "Well, going by the flash grenades and all, you're her, right?"
10049010-11 = "\"Trinity's Running Flash Grenade,\" from the self-proclaimed Vigilante Crew?"
10049010-16 = "...Yes. Yes, that's me."
10049010-17 = "So are you even ALLOWED to do this?"
10049010-18 = "I don't see a Justice Task Force uniform on you."
10049010-19 = "The whole Vigilante Crew is self-appointed, right?"
10049010-20 = "It's true, we're not on the Justice Task Force..."
10049010-21 = "But do we need to be \"allowed\" to protect our neighborhood?"
10049010-22 = "Point is, you're lawless, just like us."
10049010-23 = "Trying to force other people to do what you want. At least we don't brag about how great we are!"
10049010-24 = "What even made you want to be a vigilante? You think anybody appreciates it?"
10049010-25 = "You're just doing this 'cause you couldn't get on the Force, aren't you?"
10049010-26 = "!!"
10049010-27 = "Do the REAL police know you're going around making threats like this?"
10049010-28 = "Ah, whatever! I'm not coming back here again!"
10049010-32 = "Huh? Oh, uh..."
10049010-36 = "..."

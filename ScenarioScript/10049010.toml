[translation]
10049010-1 = "第1話;自衛隊什麼的，已經夠了"
10049010-2 = "三一附設幼稚園．舊校舍"
10049010-3 = "你啊，其實跟我們沒什麼兩樣吧？"
10049010-5 = "咦？"
10049010-6 = "喂喂，別說了！不然等一下又要被閃光彈閃瞎了啦！"
10049010-7 = "……不。我的原則是不會攻擊已經被制伏的對手。"
10049010-8 = "比起這個，你剛才說什麼？"
10049010-9 = "「跟我們沒什麼兩樣」……？"
10049010-10 = "從剛才丟的閃光彈來看，你就是那個人吧？"
10049010-11 = "以[ruby= ・     ・     ・ ]自衛隊[/ruby]自居，被叫做「三一的行走閃光彈」的傢伙。"
10049010-16 = "……算是吧。"
10049010-17 = "你有資格做這些事嗎？"
10049010-18 = "既不是穿黑衣的實現正義部……"
10049010-19 = "自衛隊什麼的，也只是你隨便自稱的吧？"
10049010-20 = "我確實不是實現正義部的成員……"
10049010-21 = "不過守護鄰里的安全，難道還需要具備資格嗎？"
10049010-22 = "既然都沒有經過官方認證，你跟我們不就是半斤八兩嗎？"
10049010-23 = "擅自妨礙別人、動不動就使用暴力……但我們至少不會裝作自己很了不起的樣子！"
10049010-24 = "你到底為什麼偏要做自衛隊這種事啊？又沒有人會認同你？"
10049010-25 = "該不會是因為進不了實現正義部，所以才故意這麼做的吧？"
10049010-26 = "！！"
10049010-27 = "像你這樣以個人的身分威脅別人，到頭來不也是犯罪嗎？"
10049010-28 = "算了算了！我們走！#n這一帶髒得要死，以後再也不來了！"
10049010-32 = "咦？啊……"
10049010-36 = "……"
10049010-41 = "這，這樣沒問題嗎？#n要是他跟過來找碴怎麼辦……！"
10049010-42 = "噓……！要裝作若無其事的樣子，若無其事。"
10049010-43 = "你看那邊。"
10049010-45 = "……"
10049010-47 = "看到了吧？#n就是因為我說的話沒有錯，他才會什麼都做不了。"
10049010-48 = "我的邏輯果然無人能敵吧？"
10049010-49 = "總，總之快趁現在開溜吧！！"
10049010-55 = "……沒有人會認同我。"
10049010-56 = "進不了實現正義部。"
10049010-57 = "這麼做到頭來也是犯罪……"
10049010-58 = "我，原來是這樣的人嗎……？"
10049010-63 = "三一舊圖書館"
10049010-64 = "唔嗯……換下來的書都集中到這個箱子裡了。"
10049010-65 = "要捐給其他圖書館的部分在這邊……"
10049010-70 = "好！今天要搬到倉庫的書就是這些！"
10049010-71 = "已經這麼晚了啊……得趕快回去才行。"
10049010-75 = "咦？倉庫後面怎麼有談話聲……"
10049010-79 = "……所以是這個週末沒錯吧？"
10049010-80 = "嗯。良舞隊長說就定在那天。"
10049010-81 = "大家要在「Borderlands遊樂園」集合啊。"
10049010-85 = "（哎呀，是頭盔團的成員？怎麼這個時間出現在這裡？）"
10049010-86 = "（這麼說來，的確有傳聞說有人會因為舊圖書館人煙稀少，而在這裡偷偷集會……）"
10049010-87 = "（似乎還沒被發現的樣子，趁現在悄悄離開吧……）"
10049010-89 = "看來遊樂園八成會被打個稀巴爛吧。"
10049010-90 = "！"
10049010-94 = "雖然有點不好意思，不過這筆案子對我們嘩啦嘩啦頭盔團來說，實在不容錯過。"
10049010-95 = "應該會有很多人受傷吧。"
10049010-96 = "那就看對方會怎麼應對了。"
10049010-98 = "（會有人受傷？他們到底在計畫什麼……？）"
10049010-99 = "不過只靠我們真的夠嗎？"
10049010-100 = "不是說其他組織也會來支援嗎？應該夠了吧。"
10049010-101 = "那我們趕緊走吧。不然要是被別人聽到就糟了。"
10049010-103 = "（拜託千萬別過來這邊……！）"
10049010-104 = "（我得趕快逃……！）"
10049010-111 = "哈啊……哈啊……"
10049010-112 = "剛才那兩個人說……"
10049010-113 = "這個週末在「Borderlands遊樂園」……會有人受傷？"
10049010-114 = "而且還提到了良舞隊長……"
10049010-115 = "這件事不能就這樣放著不管。至少得去找人通報才行……"
10049010-119 = "呀啊！"
10049010-120 = "……"
10049010-121 = "啊，自衛隊的鈴美同學？"
10049010-122 = "你來得正好！"
10049010-123 = "在舊圖書館的倉庫後面，有頭盔團的人在密謀要做壞事！"
10049010-124 = "該怎麼辦才好？自衛隊這邊能想想辦法嗎？"
10049010-125 = "什麼？#n……啊，是。"
10049010-126 = "原來如此。如果是這樣的話……"
10049010-130 = "既然都沒有經過官方認證，你跟我們不就是半斤八兩嗎？"
10049010-134 = "[log=불량배 스케반 A]該不會是因為進不了實現正義部才故意這麼做的吧？[/log]"
10049010-137 = "……"
10049010-138 = "鈴美同學？"
10049010-139 = "沒什麼。我們一起去向實現正義部報案吧。"
10049010-140 = "或許……這確實是實現正義部的工作……"
10049010-141 = "啊，是。原來如此……？"
10049010-142 = "那我們快點去報案吧！"
10049010-143 = "……"

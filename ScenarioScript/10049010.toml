[translation]
10049010-1 = "Episode 1;Who Cares About the Vigilante Crew?"
10049010-2 = "Trinity Kindergarten, Former Institute"
10049010-3 = "You know we're not so different, right?"
10049010-5 = "What?"
10049010-6 = "Hey, shut up! You want her to throw another flash grenade?"
10049010-7 = "...I'm not going to. I don't attack when the enemy's defenseless."

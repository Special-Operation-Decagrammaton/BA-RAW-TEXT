[translation]
1006515-1 = "蘊含心意的裝飾品"
1006515-2 = "（因為陰陽部的工作提前結束，所以提早來到了休息室）"
1006515-12 = "啊，老師！"
1006515-13 = "時間應該還沒到才對……"
1006515-14 = "[s1]「啊，抱歉，因為我工作提早結束了……」\n[s2]「抱歉，你還在打掃嗎？」"
1006515-17 = "沒關係，今天本來就打掃得比較久……"
1006515-18 = "畢竟老師要來，所以我打掃得比平常更認真。"
1006515-19 = "只是沒想到竟然會沒抓好時間……"
1006515-20 = "抱歉讓您看到這種亂糟糟的場面，老師。"
1006515-21 = "[s3]「不會不會，畢竟是我自己太早到。」\n[s4]「既然如此，我也來幫忙吧。」"
1006515-24 = "怎麼能麻煩老師做我該做的工作……"
1006515-25 = "咦？兩個人一起打掃比較快，這樣就可以趕快喝茶了……？"
1006515-26 = "這麼說也對，現在休息室如此髒亂，老師也無法好好休息……反而得不償失……"
1006515-27 = "我明白了，那可以麻煩您稍做協助嗎？"
1006515-30 = "（就在一起專心地打掃休息室時……）"
1006515-32 = "嘿咻……這個要小心一點……"
1006515-36 = "[ns5]「你擦得還真認真。」\n[ns6]「那對你來說一定很寶貴吧？」"
1006515-39 = "啊，是的。"
1006515-40 = "雖然太過執著於某樣物品，並非陰陽部副部長該有的行為……"
1006515-41 = "但這個東西，對我來說實在很特別……"
1006515-42 = "[s]「竟然能讓佳穗說出特別這種話，真讓人感興趣……」"
1006515-43 = "那……老師要不要看看呢？"
1006515-44 = "[s]「嗯？可以嗎？」"
1006515-45 = "當然，我並不介意。"
1006515-46 = "來，這東西有點重，還請您多留意。"
1006515-51 = "[ns]「原來是百鬼夜行的學生們送給你的啊。」"
1006515-55 = "呵呵，沒錯。"
1006515-56 = "那是我剛代表陰陽部，接下戰略領袖職務時發生的事。"
1006515-57 = "當時我曾在慶典中幫助過商店街的人。"
1006515-58 = "因為還不太熟悉工作內容，所以闖了不少禍……"
1006515-59 = "然而那場慶典結束之後……商店街的各位和參加慶典的學生還是送了我這個東西。"
1006515-60 = "「多虧有陰陽部的幫助，這次的活動才能夠像以往一樣順利進行」、#n「有你的幫忙，讓我們鬆了一口氣」、「這一切都是託陰陽部的福」……"
1006515-61 = "我所獲得的感謝……完全超出了我的預期。"
1006515-62 = "明明自己其實沒有做什麼了不起的事，為此我還有點慚愧呢。"
1006515-63 = "[s]「我相信你當時肯定也盡了自己的全力。」"
1006515-64 = "我，我只是……希望當時的活動能順利舉行，#n為宣傳我們百鬼夜行聯合學園的文化盡一份心力……"
1006515-65 = "不過每次看到這張感謝狀的時候，我的心底都會湧上一股成就感。"
1006515-66 = "「啊，那麼努力果然是正確的，所以我的心意才能傳達到大家的心裡」──"
1006515-67 = "像這樣暗自慶幸著自己有盡到戰略領袖的義務。"
1006515-68 = "因此為了不忘記當時的心情，每次打掃的時候，我都會把它拿出來仔細擦拭。"
1006515-69 = "[s]「的確就像你說的一樣，是個意義重大的物品呢。」"
1006515-70 = "呵呵，沒錯。"
1006515-74 = "這樣休息室就打掃完了。"
1006515-75 = "非常感謝您的幫忙，老師！"
1006515-76 = "[s]「好，那我們就按照約定來喝茶吧。」"
1006515-77 = "呵呵，在打掃得乾乾淨淨的休息室裡，和老師一起喝茶……"
1006515-78 = "今天的茶喝起來肯定別有一番風味。"
1006515-79 = "那麼，我現在就去準備。"
1006515-81 = "（之後便和佳穗一起，在清理乾淨的休息室裡喝茶）"

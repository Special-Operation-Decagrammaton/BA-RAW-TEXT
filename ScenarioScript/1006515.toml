[translation]
1006515-1 = "ของตกแต่งจากใจ"
1006515-2 = "(งานที่ชมรมหยินหยางเสร็จเร็วกว่ากำหนด คุณครูเลยไปที่ห้องพักผ่อนเร็วกว่าเวลานัด)"
1006515-12 = "อ๊ะ คุณครู?"
1006515-13 = "ยังไม่ถึงเวลาที่นัดกันไว้เลย..."
1006515-14 = "[s1] \"อ้อ โทษที พอดีครูงานเสร็จเร็วน่ะ...\"\n[s2] \"โทษที ยังทำความสะอาดอยู่เหรอ?\""
1006515-17 = "ไม่เป็นไรค่ะ การทำความสะอาดวันนี้ใช้เวลาเยอะกว่าปกตินิดหน่อยน่ะค่ะ"
1006515-18 = "พอคุณครูบอกว่าจะแวะมา ฉันเลยใส่ใจเรื่องการทำความสะอาดขึ้นอีกนิดหน่อยน่ะค่ะ"
1006515-19 = "แต่ไม่อยากเชื่อเลยว่าจะคำนวณเวลาผิดจนทำพลาดแบบนี้..."
1006515-20 = "ดันให้คุณครูเห็นสภาพที่ไม่น่าดูแบบนี้ซะได้ ต้องขอโทษด้วยค่ะ"
1006515-21 = "[s3] \"เปล่าๆ ครูต่างหากที่มาเร็วเอง\"\n[s4] \"ไหนๆ ก็เป็นแบบนี้แล้ว เดี๋ยวครูช่วยเอง\""
1006515-24 = "แต่ฉันคงจะขอให้คุณครูมาช่วยงานของฉันไม่ได้..."
1006515-25 = "คะ? \"ช่วยกันทำให้เสร็จเร็วๆ แล้วไปดื่มชากันเถอะ\" งั้นเหรอคะ?"
1006515-26 = "นั่นสินะคะ ถ้าปล่อยให้ห้องพักผ่อนอยู่ในสภาพนี้นานๆ คุณครูก็คงจะนั่งพักผ่อนไม่ได้..."
1006515-27 = "เข้าใจแล้วค่ะ ถ้างั้นขอรบกวนหน่อยได้มั้ยคะ?"
1006515-30 = "(ระหว่างที่ช่วยกันทำความสะอาดห้องพักผ่อนอยู่...)"
1006515-32 = "ฮึบ... อันนี้ต้องระวังหน่อย..."
1006515-36 = "[ns5] \"เช็ดอย่างพิถีพิถันมากเลยนะเนี่ย?\"\n[ns6] \"ดูเหมือนเป็นของสำคัญเลยนะ\""
1006515-39 = "อ๊ะ ค่ะ"
1006515-40 = "การยึดติดกับสิ่งของแบบนี้ ในฐานะรองหัวหน้าชมรมหยินหยางแล้วเป็นสิ่งที่ไม่สมควรอย่าง#nยิ่งก็จริง..."
1006515-41 = "แต่ยังไงของชิ้นนี้ก็เป็นของที่พิเศษสำหรับฉัน..."
1006515-42 = "[s] \"ถ้าขนาดคาโฮะยังบอกว่าพิเศษละก็ น่าสนใจนะ...\""
1006515-43 = "อ่า... งั้นอยากลองดูสักหน่อยมั้ยคะ?"
1006515-44 = "[s] \"เอ๋? ให้ครูดูได้จริงๆ เหรอ?\""
1006515-45 = "แน่นอนค่ะ มันไม่ใช่เรื่องยากอะไรสักหน่อยนี่คะ"
1006515-46 = "นี่ค่ะ มันหนักนิดหน่อย ระวังด้วยนะคะ"
1006515-51 = "[ns] \"ของที่พวกนักเรียนคนอื่นๆ ในเฮียกคิยาโคให้คาโฮะมาสินะ\""
1006515-55 = "ฮุฮุ... ค่ะ"
1006515-56 = "มันเป็นตอนที่ฉันเพิ่งรับหน้าที่เป็นหัวหน้าทีมประชาสัมพันธ์เชิงกลยุทธ์ได้ไม่นาน"
1006515-57 = "ตอนที่มีงานเทศกาล ฉันเคยไปช่วยคนอื่นๆ ด้วยน่ะค่ะ"
1006515-58 = "ฉันยังไม่คุ้นชินกับงานต่างๆ ดี เลยยังไม่รู้ว่าอะไรเป็นอะไร และทำให้เกิดเรื่องวุ่นวายต่างๆ ขึ้น"
1006515-59 = "แต่ว่าหลังจากจบงานเทศกาลแล้ว... พ่อค้าแม่ค้ากับพวกนักเรียนที่มาร่วมงานก็ให้ของสิ่งนี้#nมาเป็นของขวัญกับฉันค่ะ"
1006515-60 = "พวกเขาบอกว่า 'เพราะได้ทางชมรมหยินหยางมาช่วย งานครั้งนี้ก็เลยผ่านไปได้อย่างราบรื่น' บ้างล่ะ 'เพราะพวกเธอมาช่วยงานเลยผ่านเรื่องลำบากมาได้' หรือไม่ก็ 'ต้องขอบคุณชมรมหยินหยางจริงๆ' บ้างล่ะ..."
1006515-61 = "และได้รับคำขอบคุณหลายๆ อย่างที่... เกินคาดมากเลยค่ะ"
1006515-62 = "ทั้งที่ฉันไม่ได้ทำอะไรมากมายเลยแท้ๆ... รู้สึกละอายใจมากเลยค่ะ"
1006515-63 = "[s] \"ครูมั่นใจว่าคาโฮะคงพยายามช่วยอย่างสุดกำลังอยู่แล้วละ\""
1006515-64 = "ฉะ... ฉันก็แค่พยายามทำในส่วนของฉันเพื่อให้งานเทศกาลจัดขึ้นได้โดยประสบความสำเร็จ... แล้วก็แค่อยากประชาสัมพันธ์วัฒนธรรมของสหพันธ์เฮียกคิยาโคให้เป็นที่รู้จักก็เท่านั้น..."
1006515-65 = "ยังไงก็ตาม... พอเห็นหนังสือขอบคุณพวกนี้ทีไร ฉันก็รู้สึกอิ่มเอมใจทุกครั้งเลยค่ะ"
1006515-66 = "อ๊ะ แต่เรื่องที่ฉันทุ่มเทสุดตัวก็เป็นความจริง เพราะงั้นก็รู้สึกได้ว่าสื่อความรู้สึกถึงทุกๆ คน"
1006515-67 = "แล้วก็กำลังทำหน้าที่ของหัวหน้าทีมประชาสัมพันธ์เชิงกลยุทธ์ได้ดีอยู่... แบบนี้น่ะค่ะ"
1006515-68 = "และเพื่อไม่ให้ลืมความรู้สึกในตอนนั้น ฉันก็จะหยิบมันออกมาเช็ดทำความสะอาดอย่างดี#nเวลาที่ทำความสะอาดแบบนี้"
1006515-69 = "[s] \"เป็นของที่มีความหมายลึกซึ้งอย่างที่คาโฮะบอกจริงๆ ด้วยนะ\""
1006515-70 = "ฮุฮุ ก็เป็นแบบนั้นแหละค่ะ"
1006515-74 = "เท่านี้ก็ทำความสะอาดห้องพักผ่อนเสร็จแล้วละค่ะ"
1006515-75 = "ขอบคุณที่ช่วยนะคะคุณครู"
1006515-76 = "[s] \"งั้นเรามาดื่มชากันตามที่วางแผนไว้ดีมั้ย?\""
1006515-77 = "ฮุฮุ วันนี้ชาคงจะอร่อยเป็นพิเศษแน่เลยค่ะ"
1006515-78 = "มีคุณครูมาอยู่ด้วยกันในห้องพักผ่อนที่สะอาดสะอ้านแบบนี้..."
1006515-79 = "งั้นฉันขอไปเตรียมชาก่อนนะคะ"
1006515-81 = "(หลังจากนั้นคุณครูกับคาโฮะก็นั่งดื่มชาอย่างสบายๆ ด้วยกันในห้องพักผ่อนแสนสะอาด)"

1006515-11 = "3;카호;02\n#3;em;[반응]\n#wait;1500"
1006515-12 = "3;카호;02;앗, 선생님?\n#3;m3"
1006515-13 = "3;카호;04;아직 시간이 안 되었을 터인데……."
1006515-14 = "[s1] \"앗, 미안, 업무가 빨리 끝나는 바람에…….\"\n[s2] \"미안, 아직 청소 중이었구나?\""
1006515-15 = "#wait;100"
1006515-16 = "#wait;100"
1006515-17 = "3;카호;02;괜찮습니다. 오늘 청소가 평소보다 길어진 것도 있으니까요."
1006515-18 = "3;카호;03;선생님께서 방문하신다고 하여, 조금 더 힘을 주어 청소하고 있었습니다."
1006515-19 = "3;카호;04;다만 시간 계산을 잘못해 이런 실수를…….\n#3;em;[땀]"
1006515-20 = "3;카호;02;번잡한 모습을 보여드려 죄송할 따름입니다."
1006515-21 = "[s3] \"아냐, 아냐, 내가 일찍 온 거니까.\"\n[s4] \"이왕 이렇게 된 거, 나도 도울게.\""
1006515-22 = "#wait;100"
1006515-23 = "#wait;100"
1006515-24 = "3;카호;00;하지만 제 일을 선생님께 부탁할 수는……."
1006515-25 = "3;카호;02;네? 같이 해서 빨리 끝내고 차를 마시자, 라고요……?\n#3;em;[?]"
1006515-26 = "3;카호;01;그렇네요. 휴게실을 이런 상태로 오래 두는 것도 선생님이 쉴 수 없으니 안 될 일이고……."
1006515-27 = "3;카호;03;알겠습니다. 그럼 조금 거들어 주시겠습니까?\n#3;em;[음표]"
1006515-28 = "#all;hide"
1006515-29 = "#wait;3000"
1006515-30 = "#na;(한동안 함께 휴게실을 청소하던 중…….)"
1006515-31 = "#all;hide"
1006515-32 = "3;카호;00;읏차…… 이건 조심해서…….\n#3;a\n#3;em;[반응]"
1006515-33 = "#st;[0,0];instant;1;"
1006515-34 = "#clearST"
1006515-35 = "3;카호;00\n#3;greeting\n#wait;2500"
1006515-36 = "[ns5] \"굉장히 공들여서 닦는구나?\"\n[ns6] \"굉장히 소중한 물건 같네.\""
1006515-37 = "#wait;100"
1006515-38 = "#wait;100"
1006515-39 = "3;카호;02;앗, 네에.\n#3;em;[반응]"
1006515-40 = "3;카호;99;물건에 집착하는 면은, 음양부의 부부장으로선 다소 올바르지 못한 모습일지도 모릅니다마는."
1006515-41 = "3;카호;02;그래도 이 물건은 제게 있어서는 정말로 특별한 물건이다 보니……."
1006515-42 = "[s] \"카호가 특별하다고 말할 정도라니, 좀 흥미가 가는데…….\""
1006515-43 = "3;카호;02;아…… 그럼 한 번 보시겠나요?"
1006515-44 = "[s] \"어? 그래도 돼?\""
1006515-45 = "3;카호;03;네, 어려운 일도 아니니까요."
1006515-46 = "3;카호;03;여기 있습니다. 조금 무거우니 유의해 주세요.\n#3;greeting"
1006515-47 = "#st;[0,0];instant;1;"
1006515-48 = "#clearST"
1006515-49 = "3;카호;03\n#3;d\n#wait;1000"
1006515-50 = "#wait;2500"
1006515-51 = "[ns] \"백귀야행 학생들이 카호에게 준 거구나.\""
1006515-52 = "#st;[0,0];instant;1;"
1006515-53 = "#clearST"
1006515-54 = "3;카호;01\n#3;a\n#wait;1000"
1006515-55 = "3;카호;03;후후, 네.\n#3;jump\n#3;em;[음표]"
1006515-56 = "3;카호;01;제가 음양부로서, 전략홍보팀장으로서 업무를 맡은 지 얼마 되지 않았을 무렵이었던가요."
1006515-57 = "3;카호;02;그때 열린 축제에서 상점가 여러분을 도와드린 적이 있었지요."
1006515-58 = "3;카호;00;아직 업무에 익숙해지지 못했을 때라, 천지 분간도 되지 않는 사고뭉치였던 저입니다만."
1006515-59 = "3;카호;01;그래도 그 축제가 끝나고 난 뒤…… 상인 분들과 참가한 학생분들로부터 이 물건을 받았답니다."
1006515-60 = "3;카호;99;'음양부가 도와준 덕분에 무탈하게 아무 일 없이 이번에도 행사가 성공했다'든가, '도와줘서 여러모로 한 시름 놓았다'든가, '역시 음양부 덕분이다.'라든가…….\n#3;em;…"
1006515-61 = "3;카호;03;정말…… 분에 넘치는 감사의 말을 들었었지요."
1006515-62 = "3;카호;03;제가 그리 큰일을 한 것도 아닌데, 부끄러울 따름입니다."
1006515-63 = "[s] \"카호라면 분명 최선을 다해 도왔을 테니까.\""
1006515-64 = "3;카호;13;저, 저는 그저 그때에도 지금과 마찬가지로 행사들이 성공적으로 개최되어 우리 백귀야행 학원의 문화가 더 널리 알려졌으면 하는 마음에서 힘을 냈을 뿐이라…….\n#3;em;[///]\n#3;stiff"
1006515-65 = "3;카호;99;그래도, 이 감사장을 볼 때마다 무척 뿌듯한 마음이 들곤 한답니다."
1006515-66 = "3;카호;01;아, 내가 마음먹었던 건 틀리지 않았구나. 그래서 이 마음이, 조금이나마 모두에게 전해질 수 있었구나."
1006515-67 = "3;카호;01;전략홍보팀장으로서 잘 해내고 있구나. 하며 안심하기도 했었지요."
1006515-68 = "3;카호;02;그래서 그때의 마음을 잊지 않고자, 이렇게 매일 청소할 때마다 빼놓지 않고 꼼꼼히 닦고 있습니다."
1006515-69 = "[s] \"확실히, 카호의 말대로 의미가 깊은 물건이네.\""
1006515-70 = "3;카호;03;후훗, 그렇답니다.\n#3;em;[음표]"
1006515-71 = "#all;hide"
1006515-72 = "#wait;3000"
1006515-73 = "#all;hide"
1006515-74 = "3;카호;02;이걸로 휴게실 정리가 끝났군요.\n#3;em;[반응]\n#3;a"
1006515-75 = "3;카호;00;도와주셔서 감사합니다, 선생님.\n#3;greeting"
1006515-76 = "[s] \"그럼, 처음 계획대로 차를 마실까?\""
1006515-77 = "3;카호;03;후후, 오늘 차의 맛은 각별하겠군요.\n#3;jump"
1006515-78 = "3;카호;03;깨끗이 정리된 휴게실에, 선생님까지 계시니……."
1006515-79 = "3;카호;03;그럼, 준비하겠습니다.\n#3;jump\n#3;em;[!]"
1006515-80 = "#all;hide"
1006515-81 = "#na;(그 뒤 깨끗해진 휴게실에서 카호와 함께 느긋하게 차를 마셨다.)"

[translation]
83303400200-6 = "真是令人讚嘆的實力，陽奈風紀委員長。"
83303400200-7 = "多虧你才會有那麼多的屍……更正，傷患躺在部室裡。"
83303400200-8 = "因為剛才有點生氣，下手好像重了一點。"
83303400200-9 = "幸好傷患的傷勢都沒有太嚴重。"
83303400200-10 = "我只是做了該做的事而已。"
83303400200-11 = "不過，陽奈風紀委員長。你的臉上有傷口……"
83303400200-12 = "啊……可能是在壓制的過程稍微有點擦傷。"
83303400200-13 = "放任不管可能會留下疤痕。#n那邊的櫃子裡有藥膏，請拿去用吧。"
83303400200-14 = "嗯……那我就心懷感激地收下了。"

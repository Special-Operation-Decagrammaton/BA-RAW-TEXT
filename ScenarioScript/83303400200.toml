[translation]
83303400200-6 = "Your work is so clean, Head Prefect Hina."
83303400200-7 = "Thank you for giving me the chance to lay so many corpses to rest—sorry, I mean injured to recover in their hospital beds."
83303400200-8 = "I was stricter with them than I should have been. I'm afraid I lost my temper."
83303400200-9 = "Luckily, none of them will suffer particularly serious injuries, in large part thanks to you."
83303400200-10 = "I was just fulfilling my duty."
83303400200-11 = "Oh—wait, Head Prefect Hina. There's blood on your cheek..."
83303400200-12 = "Ah... I seem to have received a small scratch when I was subduing them."
83303400200-13 = "Please take some ointment from the supply cabinet there. I would hate for one of these troublemakers to boast that they had scarred you."
83303400200-14 = "Ah... Thank you."

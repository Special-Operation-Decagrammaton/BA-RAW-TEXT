[translation]
83303400200-6 = "จัดการได้เรียบร้อยมากเลยค่ะ ประธานกรรมการวินัยฮินะ"
83303400200-7 = "ต้องขอบคุณที่ทำให้ศพ... ไม่สิ ผู้บาดเจ็บมาอยู่ในห้องพยาบาลได้อย่างราบรื่นนะคะ"
83303400200-8 = "ฉันโมโหก็เลยมือหนักไปหน่อยน่ะ"
83303400200-9 = "แต่ก็โล่งอกไปทีนะที่ไม่มีใครได้รับบาดเจ็บสาหัส แล้วทุกคนก็ได้รับการรักษาอย่างดีด้วย"
83303400200-10 = "ฉันก็แค่ทำตามหน้าที่น่ะค่ะ"
83303400200-11 = "แต่ว่า ประธานกรรมการฮินะ... แผลที่แก้มของคุณ..."
83303400200-12 = "อ่า... สงสัยจะโดนข่วนระหว่างจัดการเจ้าพวกนั้นน่ะ "
83303400200-13 = "ถ้าปล่อยไว้อาจเกิดแผลเป็นก็ได้นะคะ ในชั้นวางของตรงนั้นมียาอยู่ค่ะ เอาไปทาแผลด้วยนะคะ"
83303400200-14 = "อื้ม ฉันจะรับไว้ ขอบใจนะ"

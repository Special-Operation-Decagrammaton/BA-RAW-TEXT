[translation]
84310100701-6 = "……你真的想聽嗎？#n那些「未完成」的故事？"
84310100701-7 = "不，不用了。我沒有那個意思。#n只是這樣反而讓我有點好奇，得訓練到什麼程度才能成為那2%。"
84310100701-8 = "……我覺得寧瑠應該沒問題。"
84310100701-10 = "不，這恐怕很難說。#n畢竟為了作戰而移動，跟為了運動而跑步是兩回事。"
84310100701-11 = "……只要你情緒上來就能堅持下去了吧。"
84310100701-12 = "唔嗯……"
84310100701-13 = "好像……確實是這樣沒錯。"
84310100701-14 = "（原來這麼誇張啊。我大概能猜到了）"

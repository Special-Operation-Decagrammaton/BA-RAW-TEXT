[translation]
84310100701-6 = "อยากรู้จริงๆ เหรอว่าคนที่ 'ไม่ผ่านโปรแกรมการเทรน' เป็นยังไงน่ะ...?"
84310100701-7 = "ปะ... เปล่าค่ะ ไม่ใช่อย่างนั้นค่ะ ตรงกันข้าม ฉันแค่สงสัยน่ะค่ะว่าต้องอยู่ในระดับไหนถึงจะเข้าไปอยู่ใน 2% ตรงนั้นได้"
84310100701-8 = "ฉันว่าระดับเนรุก็น่าจะได้นะ..."
84310100701-10 = "ไม่หรอก ฉันว่ายังหวุดหวิด การเคลื่อนไหวในการทำปฏิบัติการกับการขยับร่างกายเพื่อออกกำลังกาย#nนานๆ มันเป็นคนละเรื่องกันนะ"
84310100701-11 = "ถ้ามีแพชชันก็ทำสำเร็จได้อยู่หรอก..."
84310100701-12 = "เรื่องนั้นมัน..."
84310100701-13 = "มันก็... น่าจะใช่น่ะนะ"
84310100701-14 = "(ประมาณนี้นี่เอง พอจะเห็นภาพขึ้นมาบ้างแล้วละ)"

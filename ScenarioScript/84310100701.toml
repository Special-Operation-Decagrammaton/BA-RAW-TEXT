84310100701-8 = "...Well, I think Neru could accomplish that feat."
84310100701-10 = "I'd be cutting it close. I can move around in combat easily enough, but running nonstop for exercise is a whole different ballgame."
84310100701-11 = "...True, but if you thought you were losing, you'd push yourself as hard as possible to win."
84310100701-12 = "That..."
84310100701-13 = "...does sound likely, yes."
84310100701-14 = "(So that's the standard, then. I can extrapolate from there.)"

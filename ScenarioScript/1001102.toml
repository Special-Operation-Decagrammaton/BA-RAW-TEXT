[translation]
1001102-1 = "#title;간식 시간"
1001102-2 = "#place;매화원 입구"
1001102-3 = "3;슌;02;어머나, 선생님. 매화원에는 어쩐 일이신가요?\n#3;em;[반응]\n#3;a"
1001102-4 = "3;슌;02;간식 시간이요? 네, 마침 매화원의 학생들에게 간식을 나누어 주려던 참이긴 했는데……"
1001102-5 = "3;슌;04;어머나, 실수로 선생님께도 메일이 갔나 보군요. #n제 실수에요.\n#3;em;[땀]"
1001102-6 = "3;슌;03;하지만 마침 잘 되었네요. #n매화원에 오신 김에 같이 간식이라도 드시고 가시는 게 어떠신가요?\n#3;greeting"
1001102-7 = "3;슌;01;사양하실 것 없어요. 과일은 충분하니까요!"
1001102-8 = "3;슌;01;게다가 선생님께 부탁드리고 싶은 것도 있으니…… #n자, 자. 이쪽으로 와 주세요.\n#3;m4"
1001102-9 = "3;슌;01\n#3;dr\n#wait;1500"
1001102-10 = "#all;hide"
1001102-11 = "#place;매화원 주방"
1001102-12 = "3;슌;03;후후, 정말 신선하고 맛있어 보이죠? #n매화원의 아이들에게 나누어 줄 거라고 말하니 상회 분들이 이렇게나 많은 과일을 보내주셨어요.\n#3;greeting\n#3;em;[반짝]\n#3;a"
1001102-13 = "3;슌;06;다만 보내주신 양이 너무 많아서 저 혼자서는 손질하기 어려울 것 같아서요. #n선생님께서 과일 손질을 조금 도와주셨으면 좋겠어요."
1001102-14 = "3;슌;01;어디보자…… 여기 있는 감과 배는 제가 손질할 테니, 선생님은 사과의 껍질을 깎아주세요.\n#3;m2"
1001102-15 = "[s] \"알겠어.\""
1001102-16 = "#all;hide"
1001102-17 = "3;슌;03;어디…… 어머나, 선생님. 정말 사과를 예쁘게 잘 깎아 주셨네요!\n#3;hophop\n#3;em;[반응]\n#3;a"
1001102-18 = "3;슌;01;이렇게 솜씨가 좋으니 선생님은 나중에 멋진 어른이 되실 수 있을 거예요."
1001102-19 = "3;슌;04;아차차, 선생님은 이미 훌륭한 한 사람의 어른이시죠. #n매화원의 어린 학생들을 대하다 보니 자꾸 실수를 하게 되네요.\n#3;em;[땀]"
1001102-20 = "3;슌;01;자, 이번에는 제가 깎은 과일을 한 번 봐주세요. 어떤가요?"
1001102-21 = "[s] \"예쁘게 잘 깎았어.\""
1001102-22 = "3;슌;03;정말요? 선생님께 칭찬을 받으니 저도 기쁘네요. 후후……\n#3;em;[///]"
1001102-23 = "3;슌;03\n#3;d\n#wait;1000"
1001102-24 = "3;슌;01;그럼 먼저 조금만 맛을 볼까요? #n자, 선생님 아~ 하세요.\n#3;closeup\n#3;a"
1001102-25 = "3;슌;03;부끄러워 하지 마시고. #n자, 제가 주는 과일을 받아 드셔보세요.\n#3;closeup\n#3;em;[음표]"
1001102-26 = "3;슌;06;……그것도 아니라면 설마 제가 주는 과일은 드시기 싫으신 건가요?\n#3;closeup"
1001102-27 = "3;슌;05;떽! 착한 어린이는 음식을 가려 먹지 않는다구요! #n아무리 선생님이라 하더라도 봐 드릴 수 없어요!\n#3;em;[!]\n#3;closeup"
1001102-28 = "3;슌;01;자, 다시 한 번, 아~\n#3;closeup\n#3;em;[음표]"
1001102-29 = "3;슌;01\n#3;closeup\n#3;greeting\n#wait;1500"
1001102-30 = "3;슌;01\n#3;closeup\n#3;d\n#wait;1000"
1001102-31 = "3;슌;01;후후, 잘하셨어요. 맛이 어떠신가요?\n#3;em;[반짝]\n#3;a"
1001102-32 = "[s] \"아주 신선하고 달콤해.\""
1001102-33 = "3;슌;03;그런가요? 그럼 이번에는 저한테도 한 입, 먹여주세요."
1001102-34 = "3;슌;01;에이, 또 부끄러워하시기는. #n저만 과일을 먹여드리면 불공평하잖아요?"
1001102-35 = "3;슌;01\n#3;d\n#wait;1000"
1001102-36 = "3;슌;07;자, 아~.\n#3;closeup\n#3;em;[반짝]\n#3;a"
1001102-37 = "3;슌;07\n#3;closeup\n#3;h\n#wait;1500"
1001102-38 = "[s] 슌의 입에 자른 사과를 넣어준다."
1001102-39 = "3;슌;99\n#3;closeup\n#3;greeting\n#wait;1500"
1001102-40 = "3;슌;01;음~ 선생님이 직접 먹여주신 과일이라 그런지 더욱 달콤하네요.\n#3;em;[음표]\n#3;closeup"
1001102-41 = "3;슌;02;그럼 한 입 더…… #n어머나? 벌써 시간이 이렇게 되었네요.\n#3;em;[반응]\n#3;closeup"
1001102-42 = "3;슌;02\n#3;closeup\n#3;d\n#wait;1000"
1001102-43 = "3;슌;01;더 꾸물거리다가는 간식 시간이 끝나버리고 말 거예요. 어서 서두르죠.\n#3;a"
1001102-44 = "3;슌;01;선생님은 그쪽에 있는 접시를 들고 가주세요. 저는 이쪽에 있는 접시들을 나를게요."
1001102-45 = "3;슌;03;후후, 오늘 간식 시간도 기대가 되네요.\n#3;em;[음표]"

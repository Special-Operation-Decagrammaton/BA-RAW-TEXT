[translation]
1001102-1 = "點心時間"
1001102-2 = "梅花園．入口"
1001102-3 = "哎呀，老師。你來梅花園有什麼事嗎？"
1001102-4 = "點心時間嗎？是的，我正好要分點心給梅花園的孩子們吃……"
1001102-5 = "哎呀，看來我不小心把訊息也傳給老師了。 #n是我的失誤。"
1001102-6 = "不過這樣正好。 #n既然來到梅花園，一起吃完點心再走怎麼樣？"
1001102-7 = "請不用客氣，這裡的水果很充足！"
1001102-8 = "而且我也有事想拜託老師…… #n好了好了，請跟我來。"
1001102-11 = "梅花園廚房"
1001102-12 = "呵呵，看起來很新鮮美味吧？ #n我說要分給梅花園的孩子們，商會的人就送了這麼多水果來。"
1001102-13 = "不過送來的量實在太多了，我一個人恐怕處理不來…… #n便希望老師能幫忙收拾一下水果。"
1001102-14 = "我看看……我來處理這邊的柿子和水梨，老師請幫我削蘋果。"
1001102-15 = "[s] 「了解。」"
1001102-17 = "我看看啊……哎呀，老師。你削蘋果削得好漂亮啊！"
1001102-18 = "老師的手這麼巧，以後一定能成為廚藝高明，出色的大人。"
1001102-19 = "哎唷，你看看我，老師已經是一個出色的大人了。 #n都怪我總是和梅花園的孩子們相處，一時改不過來。"
1001102-20 = "對了，這次請看看我切的水果。好看嗎？"
1001102-21 = "[s] 「削得很漂亮，果然有一套。」"
1001102-22 = "真的嗎？能得到老師的稱讚，我也很高興。呵呵……"
1001102-24 = "那先來嚐一下味道吧？ #n老師來，請說啊～"
1001102-25 = "呵呵，不用不好意思。 #n來，敬請享用吧。"
1001102-26 = "……難道說，老師不想吃我給的水果嗎？"
1001102-27 = "那可不行！乖孩子是不會挑食的！ #n就算是老師也不可以任性！"
1001102-28 = "來，請吃吧，啊～"
1001102-31 = "呵呵，老師好乖。味道如何？"
1001102-32 = "[s] 「非常新鮮多汁而且香甜。」"
1001102-33 = "是嗎？那這次也請餵我吃一口吧。"
1001102-34 = "咦，這樣也會害羞嗎？ #n只有我餵水果也太不公平了，呵呵。"
1001102-36 = "來，啊～"
1001102-38 = "[s] 把切成小塊的蘋果放到旬的嘴裡"
1001102-40 = "嗯～不知道是不是因為老師餵我，水果吃起來特別甜呢。"
1001102-41 = "那再來一口…… #n哎呀？時間已經這麼晚了啊。"
1001102-43 = "再拖拖拉拉的話點心時間就要結束了。動作快點吧。"
1001102-44 = "老師，請幫我把那邊的盤子拿出去。我來拿這邊的盤子。"
1001102-45 = "呵呵，今天的點心時間也很令人期待呢。"

[translation]
1001102-1 = "Snack Time"
1001102-2 = "Plum Blossom Garden Entrance"
1001102-3 = "What a surprise, Sensei. To what do I owe the pleasure?"
1001102-4 = "Snack time? Yes, I was just about to hand out snacks to the Plum Blossom Garden students..."
1001102-5 = "Oh, dear. I must have emailed you by mistake. I'm sorry about that."
1001102-6 = "No matter. Why not join us while you're here?"
1001102-7 = "Don't hold back. We have plenty of fruit to go around!"
1001102-8 = "Besides, I have something to ask of you... Now, now. Come on over here."
1001102-11 = "Plum Blossom Garden Kitchen"
1001102-12 = "Doesn't everything look so fresh? The Promenade kindly donated so much fruit when we told them it was for the Plum Blossom Garden students."
1001102-13 = "I couldn't possibly cut and prepare all of it myself. Would you mind helping me?"
1001102-14 = "Let's see... I'll prepare the persimmons and pears. How about you peel the apples, Sensei?"
1001102-15 = "[s] \"No problem.\""
1001102-17 = "Well, I'll be, Sensei. These apples look delectable."
1001102-18 = "This will be a good skill to have when you grow up, you know."
1001102-19 = "Pardon me. I'm fully aware you're already an adult. I simply get used to saying these kinds of things because I'm always interacting with the children."
1001102-20 = "Now take a gander at the fruits I peeled. How do they look?"
1001102-21 = "[s] \"Looking good.\""
1001102-22 = "Does it now? It feels good to have your seal of approval. Heehee..."
1001102-24 = "Then should we taste them first? Here, Sensei. Say, \"Ahhh\"."
1001102-25 = "Don't be shy. Here, have a bite of this."
1001102-26 = "...You don't want to eat the one I picked out for you?"
1001102-27 = "Good boys and girls are never picky about their food. The same rule applies to you!"
1001102-28 = "Now, one more time. Say, \"Ahhh\"."
1001102-31 = "There. That's better. How does it taste?"
1001102-32 = "[s] \"It's fresh and really sweet.\""
1001102-33 = "Is it? Then I wouldn't mind a bite myself."
1001102-34 = "Don't be shy. It wouldn't be fair if I was the only one to do the feeding."
1001102-36 = "Now, it's my turn! Ahhh..."
1001102-38 = "[s] Put an apple slice in Shun's mouth."
1001102-40 = "Mmm! It's even sweeter when you're the one feeding me."
1001102-41 = "I may need another to form an opinion, though... Oh my, look at the time."
1001102-43 = "Snack time will be over if we take any longer. We should hurry."
1001102-44 = "You carry the plates over there. I'll bring the ones here."
1001102-45 = "Heehee. I'm looking forward to today's snack time."

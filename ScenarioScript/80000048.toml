[translation]
80000048-1 = "The Tastes of a Lord and a Ninja"
80000048-2 = "Oh, my lord! How did you know I was thinking of you?"
80000048-3 = "You appeared just as I wanted to see you. I-Is this a new ninjutsu ability?!"
80000048-4 = "[s1] \"Yes, my ability of walking down the street.\"\n[s2] \"I was just doing my usual patrol for Schale.\""
80000048-5 = "Oh. If it wasn't your doing..."
80000048-6 = "Oh. If it wasn't your doing..."
80000048-7 = "Wow! My desire to see you must have awakened one of my hidden abilities!"
80000048-8 = "I've been studying ninjutsu extra hard lately!"
80000048-9 = "[s] \"Okay... So, what can I do for you?\""
80000048-10 = "Oh, right! My lord! Today is Valentine's Day!"
80000048-11 = "And thus, we can't forget about chocolates today!"
80000048-12 = "[s] \"Yeah, I suppose.\""
80000048-13 = "So I acquired some items I've been coveting for a long time, my lord!"
80000048-18 = "[ns] \"Shurikens?\""
80000048-19 = "Not just shurikens, but also caltrops, kunais, and more!"
80000048-20 = "I managed to get a bunch of stuff ninjas use every day!"
80000048-21 = "It's the 49th special chocolate ninja set, and it's very popular in Hyakkiyako's Whirlpool Movie Village!"
80000048-22 = "This monumental merch was featured in Shiba Dog Wang Wang's masterpiece \"Shiba Dog and Ninja\"!"
80000048-23 = "I woke up at the crack of dawn to stand in line for this!"
80000048-24 = "[s] \"Shiba Dog...chocolate set? Huh?\""
80000048-25 = "Look at the rich color. Smell the fragrant chocolate."
80000048-26 = "Simply looking at this chocolate set inspires me to train harder!"
80000048-27 = "Aren't ninja tools incredible? The sight of them makes me feel like a real ninja!"
80000048-28 = "W-Well, I mean I feel like a real ninja because I am one!"
80000048-29 = "Heehee! What do you think, my lord?"
80000048-30 = "[s] \"As long as you're happy, I'm happy.\""
80000048-31 = "Good, because I'm REALLY happy! Heehee!"
80000048-32 = "Oh, what am I doing? Here, my lord! Take this chocolate!"
80000048-36 = "[ns3] \"Are you sure you want to give this to me?\"\n[ns4] \"I can't take your special chocolates...\""
80000048-37 = "I understand, but..."
80000048-38 = "I understand, but..."
80000048-39 = "...the main reason I wanted this set so bad was so I could share with you,#nmy lord."
80000048-40 = "[s] \"Izuna!\""
80000048-41 = "That's why I was fervently wishing I could see you."
80000048-42 = "You're going to love it, my lord! The taste will make you feel like a real ninja!"
80000048-43 = "[s] \"The taste of a ninja it is, then!\""
80000048-44 = "Y-You've already understood the ninja truths before even eating the chocolate?!"
80000048-45 = "I won't be defeated, my lord! If your weapon of choice is the shuriken,#nI'll use my caltrop chocolate!"
80000048-46 = "Now, my lord. Let's dig in! Nin nin!"
80000048-50 = "Izuna was all smiles as we shared the ninja chocolate."

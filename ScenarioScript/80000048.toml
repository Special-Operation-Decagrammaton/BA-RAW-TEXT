[translation]
80000048-1 = "主公和忍者的滋味"
80000048-2 = "啊，主公！伊樹菜正好在想要不要去見主公呢！"
80000048-3 = "居然在伊樹菜這麼想的時候突然現身……這也是某種忍術嗎！？"
80000048-4 = "[s1]「不，應該不是那樣吧……」\n[s2]「因為有點夏萊的工作要做。」"
80000048-5 = "不是主公的忍術，的意思嗎……"
80000048-6 = "不是主公的忍術，的意思嗎……"
80000048-7 = "所以是因為伊樹菜想見到主公的迫切渴望，讓新的能力覺醒了嗎！？"
80000048-8 = "最近非常努力學習忍術，說不定是產生效果了呢！"
80000048-9 = "[s]「說，說不定是哦……？話說今天有什麼事嗎？」"
80000048-10 = "啊，對了！主公，今天是情人節對吧？"
80000048-11 = "說到情人節，伊樹菜就會想到巧克力！"
80000048-12 = "[s]「嗯，確實是呢。」"
80000048-13 = "所以伊樹菜成功入手了「那個東西」！主公請看！"
80000048-18 = "[ns]「這是……手裏劍？」"
80000048-19 = "是的！而且不只有手裏劍，還有菱角和苦無等等！"
80000048-20 = "獲得了很多忍者會使用的道具！"
80000048-21 = "這是最近在「百鬼夜行．漩渦電影村」販售的熱門商品，#n特製忍具49號「巧克力組合」！"
80000048-22 = "是柴犬汪藏導演的代表作《帶犬忍者》裡也有出現的商品……！"
80000048-23 = "伊樹菜為了這個，從半夜就開始夜排……才總算是買到了！"
80000048-24 = "[s]「……又是忍者又是柴犬還有巧克力？」"
80000048-25 = "這鮮豔的顏色，以及巧克力的香甜氣味……"
80000048-26 = "伊樹菜光是拿著這組巧克力，彷彿就能使出很多忍術……"
80000048-27 = "忍具果然很棒呢！光是看著就覺得很開心！"
80000048-28 = "……啊！不是，不只是感覺而已，伊樹菜已經是優秀的忍者了！"
80000048-29 = "對吧，主公！"
80000048-30 = "[s]「雖然不是很懂，但伊樹菜開心的話我也很開心。」"
80000048-31 = "是，是嗎？耶嘿嘿……"
80000048-32 = "不，不對！主公，請收下這個！"
80000048-36 = "[ns3]「咦，真的可以給我嗎？」\n[ns4]「這不是伊樹菜好不容易才買到的嗎……？」"
80000048-37 = "雖然是那樣沒錯……"
80000048-38 = "雖然是那樣沒錯……"
80000048-39 = "但伊樹菜本來就是想和主公一起吃才買的……"
80000048-40 = "[s]「伊樹菜……！」"
80000048-41 = "所以才在找主公！"
80000048-42 = "快來一起吃吧，肯定能嘗到忍者的味道的！"
80000048-43 = "[s]「原來如此，這就是忍者的味道啊。」"
80000048-44 = "啊啊，主公才收到巧克力就已經變成厲害的忍者了嗎！？"
80000048-45 = "伊樹菜也不能輸！這個菱角就由伊樹菜收下！主公請吃那邊的手裏劍巧克力吧！"
80000048-46 = "來，主公請用吧！忍忍～！"
80000048-50 = "（就這樣和笑瞇瞇的伊樹菜，一起享用了忍者巧克力組合）"

[translation]
80000048-1 = "รสชาติของนายท่านและนินจา"
80000048-2 = "อ๊ะ นายท่าน!? นายท่านรู้ได้ยังไงคะว่าอิซุนะอยากเจอนายท่านอยู่พอดีเลย"
80000048-3 = "นายท่านปรากฏตัวมาพอดีในตอนที่อิซุนะอยากเจอแบบนี้... หรือว่านี่คือวิชานินจาแบบใหม่ของ#nนายท่านคะ?!"
80000048-4 = "[s1] \"เปล่าสักหน่อย ครูทำแบบนั้นไม่ได้หรอก...\"\n[s2] \"ครูแค่มาลาดตระเวนเพราะงานของชาเล่ต์ต่างหาก\""
80000048-5 = "อ๊ะ บอกว่าไม่ใช่ความสามารถของนายท่านอย่างนั้นเหรอ..."
80000048-6 = "อ๊ะ บอกว่าไม่ใช่ความสามารถของนายท่านอย่างนั้นเหรอ..."
80000048-7 = "อ๋า! หรือว่าอาจเป็นเพราะอิซุนะคิดอยากจะพบกับคุณครูมากๆ จนความปรารถนานั้นไปปลุกพลัง#nใหม่ที่อยู่ภายในตัวอิซุนะขึ้นมา?!"
80000048-8 = "อิซุนะ! เพราะอิซุนะหมั่นศึกษาวิชานินจาอยู่เป็นประจำแน่เลยค่ะ!"
80000048-9 = "[s] \"อื้อ นะ...นั่นสิ ว่าแต่มีอะไรถึงอยากเจอครูเหรอ?\""
80000048-10 = "อ๊ะ จริงด้วย! ฮิฮิฮิ! นายท่าน! วันนี้เป็นวันวาเลนไทน์นี่คะ?"
80000048-11 = "อิซุนะคิดว่าถ้าเป็นวันวาเลนไทน์ก็ต้องนึกถึงช็อกโกแลตค่ะ!"
80000048-12 = "[s] \"ปกติก็เป็นแบบนั้นละนะ\""
80000048-13 = "จริงด้วย! ในที่สุดอิซุนะก็ได้ <สิ่งของ> ที่อิซุนะเฝ้ารออยู่ตลอดมาแล้วค่ะ นายท่าน!"
80000048-18 = "[ns] \"นี่มัน... ชูริเคน?\""
80000048-19 = "ไม่ใช่ชูริเคนนะคะ! ยังมีมาคิบิชิกับคุไน แล้วก็อย่างอื่นอีกด้วย!"
80000048-20 = "ฮิฮิฮิ! อุปกรณ์จำเป็นที่นินจามักใช้เป็นประจำเต็มไปหมดเลยค่ะ!"
80000048-21 = "นี่เป็นเซ็ตช็อกโกแลตพิเศษของนินจา No.49 ที่ขายกันทั่วๆ ไปใน <สวนสนุกภาพยนตร์เฮียกคิยาโค> ค่ะ!"
80000048-22 = "นี่เป็นสินค้าที่ระลึกที่อยู่ในหนังของผู้กำกับชื่อดังปรมาจารย์ผู้กำกับชิบะ ในเรื่อง <นินจากับสุนัขชิบะ>...!"
80000048-23 = "อิซุนะไปเข้าแถวรอตั้งแต่เช้ามืด... เพื่อซื้อเจ้านี่เลยค่ะ!"
80000048-24 = "[s] \"สินค้าของชิบะอินุ... ช็อกโกแลต? เซ็ต?\""
80000048-25 = "สีสันสดใสแบบนี้... กลิ่นช็อกโกแลตหอมหวนชวนเตะจมูก..."
80000048-26 = "ว้าววว... แค่อิซุนะเห็นช็อกโกแลตเซ็ตนี้... อิซุนะก็รู้สึกพลุ่งพล่านเหมือนจะใช้วิชานินจาใหม่ได้#nทันทีเลย..."
80000048-27 = "ฮ่า... อุปกรณ์นินจา... ยอดเยี่ยมมากเลยค่ะ! แค่ได้เห็นก็รู้สึกเหมือนได้เป็นนินจาแล้วค่ะ!"
80000048-28 = "อึ่ก?! ไม่สิ ไม่ใช่แค่รู้สึกเท่านั้น ตอนนี้อิซุนะก็เป็นนินจาเต็มตัวแล้ว?!"
80000048-29 = "ฮิฮิฮิ! เป็นยังไงบ้างคะ? นายท่าน?!"
80000048-30 = "[s] \"อื้อ แค่เห็นอิซุนะดีใจ ครูก็แฮปปี้แล้วล่ะ\""
80000048-31 = "ฮิฮิฮิ ใช่มั้ยล่ะคะ ฮิฮิ..."
80000048-32 = "ถ้างั้น... นี่เจ้าค่ะ นายท่าน! ช่วยรับช็อกโกแลตไปด้วยนะคะ!"
80000048-36 = "[ns3] \"หืม? ให้ช็อกโกแลตรูปชูริเคนนี่กับครูจะดีเหรอ?\"\n[ns4] \"อิซุนะอุตส่าห์ไปยืนต่อแถวรอเลยนะ?\""
80000048-37 = "ต้องดีสิคะ"
80000048-38 = "ก็ใช่ค่ะ แต่ว่า..."
80000048-39 = "ตอนไปซื้ออิซุนะก็คิดว่าอยากซื้อมากินด้วยกันกับนายท่านค่ะ..."
80000048-40 = "[s] \"อะ...อิซุนะ!\""
80000048-41 = "ก็อิซุนะติดตามนายท่านมาตลอดนี่คะ!"
80000048-42 = "นายท่าน! ถ้าได้กินช็อกโกแลตด้วยกันคงอร่อยมากแน่ๆ เลยค่ะ นี่เป็นรสชาติแห่งนินจาเลยนะคะ!"
80000048-43 = "[s] \"งั้นเหรอ รสชาติแห่งนินจานี่เอง!\""
80000048-44 = "อ๊ะะะ! เพิ่งรับช็อกโกแลตไป ยังไม่ได้กินเลยแต่ก็ได้วิชานินจามาแล้วงั้นเหรอ?!"
80000048-45 = "ย้าาา! อิซุนะไม่ยอมแพ้นายท่านหรอกค่ะ! ถ้านายท่านกินช็อกโกแลตชูริเคน อิซุนะก็จะกิน#nช็อกโกแลตมาคิบิชินี่แล้วกันค่ะ!"
80000048-46 = "นายท่าน! มากินช็อกโกแลตด้วยกันเถอะค่ะ! นินนิน~!"
80000048-50 = "(จากนั้นคุณครูก็นั่งกินเซ็ตช็อกโกแลตนินจากับอิซุนะที่ยิ้มออกมาอย่างมีความสุข)"

[translation]
80000048-1 = "#title;주군과 닌자의 맛"
80000048-2 = "3;이즈나;02;앗! 주군!? 마침 제가 주군을 만나고 싶다고 생각하던 걸 어떻게 아시고!\n#3;em;[?!]\n#3;a"
80000048-3 = "3;이즈나;03;이즈나가 간절히 원할 때 때마침 나타나 주시다니, 혹시 이건 주군의 새로운 인법인가요?!\n#3;hophop"
80000048-4 = "[s1] \"아니, 그런 능력 없으니까………\"\n[s2] \"마침 샬레의 업무로서 순찰을 하고 있었을 뿐이고.\""
80000048-5 = "3;이즈나;05;앗…… 주군의 능력이 아니라는 이야기는…….\n#3;em;[...]"
80000048-6 = "3;이즈나;05;앗…… 주군의 능력이 아니라는 이야기는…….\n#3;em;[...]"
80000048-7 = "3;이즈나;02;아앗! 반대로 이건 주군을 엄청 엄청 만나고 싶어 하던 이즈나의 간절한 바람이, 새로운 능력을 각성시킨 걸지도?!\n#3;shake"
80000048-8 = "3;이즈나;07;이즈나. 그렇지 않아도 평소에 열심히 인법을 공부하고 있으니까요!\n#3;em;[반짝]\n#3;hophop"
80000048-9 = "[s] \"으, 응 그래. 그래서 무슨 일이야? 만나고 싶었다니.\""
80000048-10 = "3;이즈나;02;아, 맞다! 에헤헷! 주군! 오늘은 발렌타인 데이이지요?\n#3;em;[반응]"
80000048-11 = "3;이즈나;01;발렌타인 데이라면, 역시 초콜릿이라고. 이즈나는 생각합니다!\n#3;greeting"
80000048-12 = "[s] \"뭐, 보통은 그렇겠지.\""
80000048-13 = "3;이즈나;00;그래서 마침, 이즈나. 평소 고대하고 고대하던 이 <물건>을 드디어 손에 넣는 데 성공했어요! 주군!\n#3;em;[음표]"
80000048-14 = "#st;[0,0];instant;1;"
80000048-15 = "#clearST"
80000048-16 = "3;이즈나;00\n#3;d\n#wait;1000"
80000048-17 = "#wait;2500"
80000048-18 = "[ns] \"이건…… 수리검?\""
80000048-19 = "3;이즈나;02;수리검뿐만이 아니에요! 그 밖에도 마름쇠와 쿠나이 등등!\n#3;em;[반짝]\n#3;a"
80000048-20 = "3;이즈나;05;에헤헷! 그야말로 닌자가 평소 사용하는 도구, 필요로 하는 물건이 한가득!\n#3;greeting"
80000048-21 = "3;이즈나;03;최근 <백귀야행 소용돌이 영화촌>에서 엄청 인기리에 판매되고 있는 특제 닌자 굿즈 49번 초콜릿 세트예요!\n#3;em;[재잘]\n#3;hophop"
80000048-22 = "3;이즈나;01;이게 또 시바견왕왕 감독의 대표작 <닌자를 동반한 시바견>에 나왔던 기념비적인 굿즈라……!"
80000048-23 = "3;이즈나;07;이즈나, 이걸 구하려고 새벽부터 줄을 서서……… 간신히 구매했습니다!\n#3;em;[음표]"
80000048-24 = "[s] \"시바견 굿즈…… 초콜릿? 세트? 응?\""
80000048-25 = "3;이즈나;99;이 영롱한 빛깔……. 코를 찌르는 향긋한 초콜릿 내음…….\n#3;em;[...]"
80000048-26 = "3;이즈나;01;우와아아……. 이즈나, 이 초콜릿 세트를 보고만 있어도……. 당장 인법을 쓸 수 있을 것만 같다는 생각이 뭉글뭉글……하고-\n#3;em;[///]\n#3;greeting"
80000048-27 = "3;이즈나;07;하아아……. 닌자 도구란, 정말 굉장해요! 보고만 있어도 닌자가 된 기분이니까요!\n#3;hophop"
80000048-28 = "3;이즈나;05;핫?! 아니, 기분뿐만이 아니라. 이미 이즈나는 어엿한 닌자지만요?!\n#3;em;[?!]\n#3;shake"
80000048-29 = "3;이즈나;00;에헤헷! 어떠신가요? 주군?!\n#3;hophop"
80000048-30 = "[s] \"응, 이즈나가 기뻐하는 걸 보니, 좋네.\""
80000048-31 = "3;이즈나;03;에헤헷. 그러신가요? 에헷. 에헤헷…….\n#3;em;[///]"
80000048-32 = "3;이즈나;02;아, 이럴 게 아니라! 자, 그럼 여기! 주군! 초콜릿 받으세요!\n#3;hophop\n#3;m5"
80000048-33 = "#st;[0,0];instant;1;"
80000048-34 = "#clearST"
80000048-35 = "3;이즈나;02;\n#3;greeting\n#wait;2500"
80000048-36 = "[ns3] \"어? 수리검 초콜릿, 나한테 줘도 되는 거야?\"\n[ns4] \"이즈나가 고생해서 산 굿즈라며?\""
80000048-37 = "3;이즈나;01;그건 그렇지만…….\n#3;em;[...]"
80000048-38 = "3;이즈나;01;그건 그렇지만…….\n#3;em;[...]"
80000048-39 = "3;이즈나;07;이즈나, 처음부터 이 굿즈를 사서 주군과 같이 먹으면 엄청 좋겠다~ 라고 생각해서…….\n#3;m3"
80000048-40 = "[s] \"이, 이즈나……!\""
80000048-41 = "3;이즈나;03;그걸 위해 이제까지 줄곧 주군을 찾고 있던 거니까요!\n#3;hophop"
80000048-42 = "3;이즈나;02;주군! 같이 먹으면 분명 엄청 맛있을 거예요! 닌자의 맛이니까!\n#3;em;[음표]\n#3;greeting"
80000048-43 = "[s] \"과연! 닌자의 맛이옵니까!\""
80000048-44 = "3;이즈나;05;아앗! 초콜릿을 받자마자, 먹기 전부터 주군은 벌써부터 닌자의 진수를?!\n#3;em;[?!]\n#3;jump"
80000048-45 = "3;이즈나;02;얍! 그럼 이즈나도 주군에게 질 수 없습니다! 주군이 수리검이라면, 이즈나는 이 마름쇠 초콜릿으로 하겠습니다!\n#3;greeting\n#3;closeup"
80000048-46 = "3;이즈나;07;자아, 주군, 같이 먹어요! 닌닌~!\n#3;em;[하트]\n#3;closeup\n#3;hophop"
80000048-47 = "#st;[0,0];instant;1;"
80000048-48 = "#clearST"
80000048-49 = "3;이즈나;07\n#3;d\n#3;closeup\n#wait;1000"
80000048-50 = "#na;(그렇게 방긋방긋 웃는 이즈나와 함께 닌자 초콜릿 세트를 맛있게 나눠 먹었다.)"
80000048-51 = "#wait;1000"

2000002-20 = "3;히비키;07;내가 소속된 엔지니어부는, 밀레니엄에서 기계에 가장 특화된 학생들이 모이는 곳이야.\n#3;a"
2000002-21 = "3;히비키;99;우리는 그러한 자신들을 자랑스럽게 생각하고, 마이스터라 부르지.\n#3;em;[...]"
2000002-22 = "3;히비키;02;선생님의 스마트폰의 문제도 확인했어. \n#3;greeting"

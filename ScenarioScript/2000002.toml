[translation]
2000002-1 = "Call Me Meister"
2000002-2 = "Schale Executive Office"
2000002-7 = "(My cell phone is broken.)"
2000002-8 = "[s1] Go to a repair shop.\n[s2] Give up on communication forever."
2000002-9 = "Neither of those is a good choice."
2000002-10 = "Neither of those is a good choice."
2000002-11 = "What's up, Sensei? The General Student Council sent me a request, so I was in the neighborhood."
2000002-12 = "What kind? You know, just regular maintenance on the machinery."
2000002-13 = "Some of the devices used at the General Student Council were originally owned by Millennium."
2000002-14 = "But no one around here seems to know how any of it works."
2000002-15 = "Anyway, your phone is going to be fine, so don't worry."
2000002-16 = "That means I can help you."
2000002-18 = "I can make it into something more than just a boring old cell phone."
2000002-20 = "I'm part of the Engineering Department! No one from Millennium knows their way around machines better than we do."
2000002-21 = "That's why we're proud to call ourselves meisters!"
2000002-22 = "So after taking a look at your phone..."
2000002-23 = "...I'd say you overloaded the motherboard while charging it."
2000002-24 = "You should be good if you replace a capacitor on it..."
2000002-25 = "...but I think it wouldn't hurt to go the extra step while we're at it."
2000002-28 = "Hmm... How about adding a self-destruction system?"
2000002-29 = "[s3] \"That's perfect!\"\n[s4] \"Why would I need that?\""
2000002-30 = "I know, right? I'll get on it right away."
2000002-31 = "Oh... Right."
2000002-32 = "I just remembered they put in a rule about us not making self-destruction systems anymore..."
2000002-33 = "*sigh* Our club has a checkered past, and a few members have backstories that follow them everywhere."
2000002-34 = "But we have our reasons for that. Our club is always looking for ways to innovate."
2000002-35 = "So, sorry. Looks like I'll need to get approval from the higher-ups before I can add that function for you."
2000002-36 = "Putting that aside, Sensei... I bet you're wondering why you'd need a self-destruction function—especially after I just fixed it."
2000002-37 = "Stop and think about it."
2000002-38 = "Your cell phone contains lots of important information—the kind even your other devices don't have."
2000002-39 = "You know, like personal information tied to your identity."
2000002-40 = "What better way to protect it than to build in a self-destruct function? It's so simple."
2000002-41 = "What, you think self-destructing goes against the whole point of protecting it?"
2000002-42 = "And that way your phone can double as a bomb or grenade if you ever need one!"
2000002-43 = "Fine, fine. I guess I can't force you to see the light."
2000002-45 = "There. Your phone's all fixed."
2000002-46 = "..."
2000002-47 = "It should work fine now."
2000002-48 = "Give me a call if your phone or any of your other electronics go on the fritz."
2000002-49 = "I'd be happy to lend a hand."

2000002-14 = "5;히비키;07;물론 총학생회의 더 많은 기계는, 그 정체조차 알 수 없는 것들이지만……"
2000002-15 = "5;히비키;01;어쨌든, 선생님의 스마트폰은 다행히 일반적인 기종인 것 같네.\n#5;em;[반응]"

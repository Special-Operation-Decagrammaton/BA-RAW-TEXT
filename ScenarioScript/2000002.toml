2000002-9 = "5;히비키;02;…………어느 쪽이든 좋은 선택은 아니야.\n#5;al\n#5;em;[반응]"
2000002-10 = "5;히비키;02;…………어느 쪽이든 좋은 선택은 아니야.\n#5;al\n#5;em;[반응]"
2000002-11 = "5;히비키;03;안녕. 선생님. #n총학생회에서 요청이 와서, 도우러 왔다가 들렀어.\n#5;m3"

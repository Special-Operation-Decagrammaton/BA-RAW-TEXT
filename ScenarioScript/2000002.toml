[translation]
2000002-1 = "叫我巨匠"
2000002-2 = "夏萊．辦公室"
2000002-7 = "（手機故障了）"
2000002-8 = "[s1] 請專門業者修理\n[s2] 放棄不管"
2000002-9 = "……不管選哪一邊都不是好選擇。"
2000002-10 = "……不管選哪一邊都不是好選擇。"
2000002-11 = "老師早安。 #n我接到聯邦學生會的請求來到附近幫忙，就順便來打個招呼。"
2000002-12 = "你問是什麼請求？是機器的修理和整頓。"
2000002-13 = "現在聯邦學生會所使用的機器中，有一部分是由千年打造的。"
2000002-14 = "當然，聯邦學生會所使用的其他機器，大多都不是我們了解的範疇了……"
2000002-15 = "總之，幸好老師的手機似乎是一般機種。"
2000002-16 = "那就由我來幫你修好，也順便改良吧。"
2000002-18 = "改良成一個超越手機的東西。"
2000002-20 = "我所隸屬的工程師部，聚集了千年之中最擅長硬體與機器領域的學生。"
2000002-21 = "我們都自豪地稱自己為巨匠。"
2000002-22 = "對了，關於老師的手機，我確認好了。"
2000002-23 = "似乎是在供電過程中，對主機板造成了過多的負荷。"
2000002-24 = "雖然只要更換電容器就夠了……"
2000002-25 = "但我覺得可以再進一步改良。"
2000002-28 = "先來個初步的……加入自爆功能如何？"
2000002-29 = "[s3] 「很酷耶。」\n[s4] 「……為什麼？」"
2000002-30 = "對吧？那我就立刻準備。"
2000002-31 = "……啊。"
2000002-32 = "前輩們有說過，禁止任意加入自爆功能……"
2000002-33 = "唉，畢竟是個具有優良傳統的社團，所以還是有很多人比較保守。"
2000002-34 = "不過，這想必也是經過長時間的反覆實驗和檢驗，所累積的確定事實。"
2000002-35 = "很抱歉，要等以後得到前輩的許可，才能幫老師加裝自爆功能了。"
2000002-36 = "老師，你或許會覺得，#n既然要修手機為什麼要裝個會弄壞它的功能對吧。"
2000002-37 = "請想像一下。"
2000002-38 = "手機和其他機器不同，裡面包含了特別的資訊。"
2000002-39 = "沒錯，就是個資。"
2000002-40 = "為了保護個資，加入自爆功能以防萬一是極為合理的。"
2000002-41 = "嗯？但自爆了到頭來也稱不上有保護？"
2000002-42 = "不過根據情況，也可以當作手榴彈或定時炸彈呀……"
2000002-43 = "真可惜，那好吧。"
2000002-45 = "OK，修好了。"
2000002-46 = "……"
2000002-47 = "那個……雖然暫時應該不會再出問題。"
2000002-48 = "要是老師的手機或其他電子機器又故障了……就找我吧。"
2000002-49 = "我隨時都願意幫忙。"

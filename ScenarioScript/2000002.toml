[translation]
2000002-1 = "เรียกฉันว่า \"ไมสเตอร์\""
2000002-2 = "สำนักงานชาเล่ต์"
2000002-7 = "(โทรศัพท์มือถือพังซะแล้ว)"
2000002-8 = "[s1] ไปซ่อมที่ร้านโทรศัพท์\n[s2] ยอมแพ้เรื่องโทรศัพท์"
2000002-9 = "...ไม่ใช่ตัวเลือกที่ดีทั้งสองทางเลย"
2000002-10 = "...ไม่ใช่ตัวเลือกที่ดีทั้งสองทางเลย"
2000002-11 = "ว่าไงคุณครู พอดีทางองค์การนักเรียนเรียกตัวมา ฉันก็เลยแวะมาน่ะ"
2000002-12 = "โดนเรียกมาทำอะไรงั้นเหรอ? ก็งานซ่อมบำรุงอุปกรณ์ทั่วไปนั่นแหละ"
2000002-13 = "ตอนนี้อุปกรณ์ที่ทางองค์การนักเรียนใช้อยู่ส่วนใหญ่เป็นอุปกรณ์ที่ทางมิลเลเนียมส่งมาให้..."
2000002-14 = "แต่ดูเหมือนองค์การนักเรียนจะไม่รู้จักอุปกรณ์พวกนั้นสักเท่าไรน่ะ...."
2000002-15 = "ยังไงก็เถอะ โชคดีที่มือถือของคุณครูเป็นรุ่นธรรมดานะ"
2000002-16 = "ถ้างั้นเดี๋ยวฉันช่วยซ่อมให้เอง"
2000002-18 = "ฉันจะปรับปรุงมันให้เป็นมากกว่าโทรศัพท์ให้นะ"
2000002-20 = "ชมรมวิศวกรรมของพวกเราเป็นชมรมที่รวมตัวเด็กนักเรียนยอดอัจฉริยะทางด้านอุปกรณ์เอาไว้เลยนะ"
2000002-21 = "พวกเราภาคภูมิใจในความสามารถตัวเองถึงขั้นเรียกตัวเองว่าไมสเตอร์เลยละ"
2000002-22 = "ฉันตรวจดูปัญหาเรื่องโทรศัพท์ของคุณครูแล้ว"
2000002-23 = "ดูเหมือนว่าเมนบอร์ดของโทรศัพท์จะทำงานหนักมากเกินไปในระหว่างที่ชาร์จไฟน่ะ"
2000002-24 = "แค่ซ่อมตัวคอนเดนเซอร์ก็ใช้ได้แล้ว...."
2000002-25 = "แต่ฉันคิดว่ามันควรจะเพิ่มอะไรเข้าไปสักหน่อย"
2000002-28 = "อืม... ถ้าง่ายๆ เลยเราเพิ่มฟังก์ชั่นระเบิดตัวเองเข้าไปดีมั้ย?"
2000002-29 = "[s3] \"เยี่ยมเลยนะ\"\n[s4] \"ใส่เข้าไปทำไมกันนะ? แต่ก็เอาเถอะ\""
2000002-30 = "ใช่มั้ยล่ะ? ถ้างั้นเดี๋ยวฉันลงมือเลยแล้วกัน"
2000002-31 = ".....อ่า จริงด้วย"
2000002-32 = "มานึกดูแล้วตอนนี้ถูกรุ่นพี่สั่งไม่ให้เพิ่มฟังก์ชั่นระเบิดลงในอุปกรณ์ตามใจชอบอยู่นี่นา"
2000002-33 = "เฮ้อ... ชมรมของเราเป็นชมรมที่มีประวัติมายาวนาน เลยมีสมาชิกที่เป็นพวกหัวโบราณอยู่"
2000002-34 = "แต่ว่ายังไงมันก็เป็นข้อเท็จจริงที่ได้รับการยืนยันจากการลองผิดลองถูกและตรวจสอบมาแล้ว...."
2000002-35 = "ขอโทษด้วยนะคุณครู ถ้าจะเพิ่มฟังก์ชั่นระเบิดตัวเองล่ะก็ ฉันจะต้องไปขออนุญาตพวกรุ่นพี่ก่อน#nเอาไว้จะมาทำให้คราวหน้านะ"
2000002-36 = "คุณครู กำลังคิดว่าจะทำอะไรหลังจากซ่อมโทรศัพท์เสร็จแล้วสินะ"
2000002-37 = "คิดดูสิ"
2000002-38 = "โทรศัพท์ของคุณครูมีข้อมูลสำคัญๆ อยู่เยอะมาก ไม่เหมือนอุปกรณ์อื่นๆ"
2000002-39 = "ข้อมูลส่วนตัวยังไงล่ะ"
2000002-40 = "ดังนั้นเพื่อป้องกันข้อมูลส่วนตัวรั่วไหล การติดตั้งฟังก์ชั่นระเบิดตัวเองจึงเป็นวิธีที่ดีที่สุดยังไงล่ะ"
2000002-41 = "อืม... ระเบิดตัวเองไม่ใช่วิธีป้องกันงั้นเหรอ?"
2000002-42 = "แต่ถ้าจำเป็นก็ใช้โทรศัพท์เป็นระเบิดเวลาพกพาได้ด้วยนะ..."
2000002-43 = "น่าเสียดายจัง ช่วยไม่ได้นะ"
2000002-45 = "ซ่อมเสร็จแล้วละ"
2000002-46 = "......."
2000002-47 = "คือว่า... มันน่าจะใช้งานได้แล้วละ"
2000002-48 = "ถ้าโทรศัพท์หรืออุปกรณ์อิเล็กทรอนิกพังละก็... บอกฉันได้นะ"
2000002-49 = "ฉันจะมาซ่อมให้คุณครูเอง"

[translation]
2300803-1 = "คำอธิษฐานเพื่อคุณ"
2300803-6 = "(พอมาถึงด้านในวิหาร คุณครูก็ไม่พบคนอื่นๆ เหมือนที่มารีบอก)"
2300803-7 = "(วิหารที่ว่างเปล่าให้ความรู้สึกที่สง่างามและดูสะอาดตาไปพร้อมกัน)"
2300803-8 = "มาแล้วเหรอคะคุณครู ทางนี้ค่ะ"
2300803-9 = "[s1] \"...?\"\n[s2] หันหน้าไปมองต้นทางของเสียง"
2300803-14 = "― ขอบคุณที่มานะคะ คุณครู[wa:3400] "
2300803-17 = "― ค่ะ ฉันกำลังสวดอธิษฐาน... เพื่อคุณครูอยู่พอดีเลยค่ะ[wa:650] "
2300803-20 = "― สถานที่ที่เงียบสงบแบบนี้ ยิ่งเหมาะสำหรับสวดอธิษฐานค่ะ[wa:2840] "
2300803-22 = "― มันทำให้รู้สึกว่าตอนที่สวดภาวนา จิตใจฉันรู้สึกสะอาดบริสุทธิ์ขึ้นค่ะ...[wa:1410] "
2300803-25 = "― เส้นทางที่คุณครูเลือกเดินมา...[wa:2230] "
2300803-27 = "― และก็เส้นทางที่คุณครูมุ่งไป...[wa:640] "
2300803-30 = "― ขอให้มีแต่... ความสงบสุข[wa:1550] "
2300803-32 = "― ในเส้นทางเหล่านั้นนะคะ..."
2300803-35 = "― คะ...? ฉันเคยสวดอธิษฐานเพื่อตัวเองบ้างรึเปล่า...น่ะเหรอคะ?[wa:2220] "
2300803-37 = "― เรื่องนั้น... ไม่หรอกค่ะ ไม่เป็นไรหรอกค่ะ[wa:2450] "
2300803-40 = "― แค่ได้เห็นคุณครูมีความสุขแบบนี้ ฉันก็ดีใจแล้วค่ะ[wa:2850] "
2300803-42 = "― หรือนี่อาจจะเป็นการสวดอธิษฐาน... เพื่อพวกเราเองก็ได้ค่ะ[wa:2390] "
2300803-45 = "ที่จริงฉันอยากสวดอธิษฐานแบบนี้บ่อยๆ แต่ว่างานที่วิหารค่อนข้างยุ่ง..."
2300803-46 = "อืมมม... แบบนี้ก็คงเป็นแค่ข้ออ้างสินะคะ"
2300803-47 = "ซิสเตอร์ไม่ควรมีนิสัยชอบพูดแก้ตัวค่ะ"
2300803-48 = "ช่วยอภัยให้ฉันสำหรับการดูแลที่ล่าช้าด้วยนะคะ คุณครู"
2300803-49 = "[s3] \"ไม่หรอก ก็สมกับเป็นเด็กสาวที่จะเป็นซิสเตอร์ดีนะ\"\n[s4] \"ว่าแล้วเชียวว่าตอนนี้เธอเป็นซิสเตอร์ที่น่ายกย่องแล้ว...\""
2300803-50 = "คะ... คะ? งะ...งั้นเหรอ?"
2300803-51 = "คะ... คะ? งะ...งั้นเหรอ?"
2300803-52 = "มะ...ไม่สิ คราวนี้ก็คงแค่พูดไปงั้นๆ ใช่มั้ยคะ? คุณครูนี่นะ..."
2300803-53 = "การโกหกเป็นสิ่งที่ไม่ดีนะคะคุณครู คราวที่แล้วก็เกือบเป็นเรื่องใหญ่แล้วนะคะ"
2300803-54 = "ตั้งแต่วันนั้นฉันก็สวดอธิษฐานทุกวันว่าขอให้ไม่เกิดเรื่องแบบนั้นขึ้นอีก แต่ว่ามันก็..."
2300803-55 = "คะ...?"
2300803-56 = "เรื่องคราวที่แล้วไม่ได้เกิดขึ้นเพราะโกหกกันงั้นเหรอคะ?"
2300803-57 = "งะ...งั้นเหรอคะ? อืม... ถ้างั้นอะไรเหรอคะ...?"
2300803-58 = "จะ...จะยังไงก็เถอะค่ะ"
2300803-59 = "ถ้าคุณครูไม่ว่าอะไร รบกวนเข้ามาใกล้ๆ อีกหน่อยได้มั้ยคะ?"
2300803-65 = "การสวดอธิษฐานมีอยู่หลายวิธี..."
2300803-66 = "และหนึ่งในนั้นก็คือ..."
2300803-70 = "วิธีการสวดอธิษฐานโดยการกุมมือและยกขึ้นมาอธิษฐานด้วยกันแบบนี้ค่ะ"
2300803-71 = "ส่วนตัวแล้วฉันคิดว่าการอธิษฐานแบบนี้จะทำให้พระองค์ได้ยินคำอธิษฐานได้ดีขึ้นค่ะ"
2300803-72 = "โดยเฉพาะผู้ที่ต้องดูแลนักเรียนคนอื่นๆ มากกว่าตัวเองอย่างคุณครู"
2300803-73 = "บางทีคุณครูเอง ถ้าหากว่ามีโอกาสมาสวดอธิษฐานละก็ คุณครูก็อาจจะอธิษฐานเพื่อนักเรียน#nคนอื่นๆ แทนตัวเองก็ได้นะคะ"
2300803-74 = "ดังนั้นฉันคิดว่าควรมีใครกุมมือคุณครูไว้แบบนี้และร่วมอธิษฐานด้วยกันค่ะ"
2300803-75 = "ฉันจะทำหน้าที่นั้นให้เองค่ะ เพราะสักวันหนึ่งฉันอยากจะเป็นซิสเตอร์ผู้น่ายกย่องให้ได้ค่ะ..."
2300803-76 = "เอาละค่ะ หลับตาลงนะคะ..."
2300803-77 = "แล้วมาร่วมสวดอธิษฐานด้วยกันเถอะค่ะ สวดอธิษฐาน... เพื่อคุณครู"
2300803-79 = "...และก็เพื่อตัวฉันที่อยากจะทำแบบนั้นค่ะ"

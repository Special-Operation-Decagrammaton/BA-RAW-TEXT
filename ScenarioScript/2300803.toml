2300803-52 = "3;마리;07;아, 아니. 이번에도 그냥 하시는 말씀이시죠? 선생님도 참…….\n#3;em;[땀]\n#3;stiff"
2300803-53 = "3;마리;01;거짓말은 좋지 않아요, 선생님. 저번에도 그걸로 큰일 날 뻔 하셨잖아요."

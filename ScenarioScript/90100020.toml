[translation]
90100020-1 = "第2話;超人と狐の間"
90100020-6 = "あっつ……。"
90100020-7 = "なんでこんな暑いわけ？夏ってまだ先でしょ？"
90100020-8 = "というか……このグラウンド最悪。#n全然日陰ないし、塀があるから風も通らないし……。"
90100020-9 = "囚人には日除けなんかいらないってわけ？"
90100020-14 = "看守から見て死角ができないようにしてるんじゃない～？"
90100020-15 = "隠れられるところがあったら脱獄しやすいし？"
90100020-16 = "実際、ワカモなんかは木陰で脱獄用の工具を受け取ってたらしいよ。"
90100020-17 = "あいつ……最初っから気に入らなかったのよね。"
90100020-18 = "脱獄する気も起きないくらいに締め上げておけばよかった！"
90100020-23 = "落ち着いてクルミちゃん。過度な制圧は禁止されてるからね。"
90100020-24 = "それは分かってるけど……今は自分が矯正局にいるんだって思うと、#n昔のことを思い出しちゃってイライラするのよ。"
90100020-25 = "……というか、ニコは暑くないの？#n一緒に走ってるのに全然汗かいてなくない？"
90100020-26 = "暑いのは平気なんだ。今日くらいの気温なら、涼しく感じるくらい。"
90100020-27 = "おかしい……暑熱順化の訓練だって同じメニューを受けてたはずなのに……。#nどうしてこんなに差が……。"
90100020-28 = "やっぱり体質の違いかしら？"
90100020-29 = "……クルミはニコより[ruby=・]ア[/ruby][ruby=・]レ[/ruby]が小さいからじゃない～？"
90100020-30 = "小さいって何がよ！？"
90100020-31 = "耳だよ、耳。#n……あはっ、何を想像したの？"
90100020-32 = "ほら、体の末端って気温の変化に敏感だって言うじゃん？"
90100020-33 = "ニコは耳が大きいから、そのぶん熱も逃がしやすいんじゃないかなって。"
90100020-34 = "たしかに……夏は真っ先に耳が熱くなるかも。"
90100020-35 = "その代わり、冬だとすぐ冷えて痛くなっちゃうんだけどね。"
90100020-36 = "そうなの……？まあ、そういう差はあるんでしょうけど。"
90100020-37 = "はぁ……でも、私は冬のほうが好きかも。#n夏って胸の下が蒸れて辛くて……。"
90100020-42 = "………………ちっ。"
90100020-43 = "いま舌打ちしたでしょ！"
90100020-44 = "……してないけど？"
90100020-45 = "嘘よ！「ちっ」って聞こえてるんだから！"
90100020-50 = "……ユキノはまだ走ってるね。"
90100020-51 = "ユキノー、いつまでやるつもり？もうすぐ運動の時間終わっちゃうよー。"
90100020-58 = "……もう一周走ったら戻る。"
90100020-63 = "ユキノ、矯正局に入ってから訓練ばっかだよね。#n私たちともあんまり話してくれないし。"
90100020-64 = "1人で考えたいことでもあるのかしら？"
90100020-72 = "まあ……そりゃあ、たくさんあるでしょ。"
90100020-73 = "それは、そうだろうけど……。"
90100020-74 = "それでも、あんまり無理しないでほしいね……。"
90100020-79 = "（[ruby=ここ]矯正局[/ruby]でのうのうと過ごしていたって、私の罪が晴れるわけではない）"
90100020-80 = "（責任を取れる大人になるためにも、より学び、より努力し――人を信じなければ）"
90100020-81 = "（でも……）"
90100020-83 = "全部お前たちのせいだろう！？"
90100020-84 = "市民のための作戦？冗談じゃない！#n私はその作戦で被害を受けたんだぞ！"
90100020-87 = "どうしてこんな目に遭うんだ！？私だって市民だ！助けてくれよ！"
90100020-88 = "……いっそ、放っておいてくれたらよかったのに。"
90100020-91 = "あんたらと話すことなんてない！#nもっと上の――責任が取れるヤツを呼んでこい！"
90100020-93 = "（あの時……何を選び、どう行動すべきだったのか。今も答えは分からない）"
90100020-94 = "（先生の言うように、時間が解決してくれる問題だったのだろうか？）"
90100020-95 = "（それとも、[ruby=超人]連邦生徒会長[/ruby]だけが解決できることだったのだろうか……）"
90100020-96 = "……5、5020番……。"
90100020-97 = "しゅ、囚人番号5020番……！"
90100020-99 = "あれ？矯正局長だ。誰かを探してるみたいだね。"
90100020-100 = "ユキノの番号じゃない？"
90100020-101 = "ユキノー、呼ばれてるよー？"
90100020-105 = "……ごめんなさい、ユキノさん。#n番号呼びに慣れないとは思いますがご容赦ください……。"
90100020-106 = "……いえ、こちらも訓練に集中していて反応が遅くなりました。"
90100020-107 = "どのようなご要件でしょうか。"
90100020-108 = "面会要請が来ています。#n外出準備をお願いできますと……。"
90100020-109 = "本日の面会時間はすでに終了しているはずですが。"
90100020-110 = "はい……ですが、特別な方でして。"
90100020-114 = "――連邦生徒会長がお呼びです。"
90100020-115 = "連邦生徒会長が……？"
90100020-120 = "……同じことを何度も伺ってしまい、申し訳ございません。"
90100020-121 = "本当に、行方不明だった連邦生徒会長が戻ってこられたのですか？"
90100020-122 = "はい……急なことだったので、ヴァルキューレもしばらくはバタバタしてしまいまして。"
90100020-123 = "ですが、ようやく一段落ついたんです。#nそれに、連邦生徒会長のおかげで、滞っていた仕事もだいぶ片付きまして。"
90100020-124 = "この調子なら、矯正局も少しずつ改善できるかと。"
90100020-128 = "（私たちは、連邦生徒会長が戻ってくるのを信じて待つべきだった……のか）"
90100020-129 = "もちろん、これだけでヴァルキューレが正常化したとは言えませんが。#n防衛室長の一件もありますし――"
90100020-133 = "あっ、ごめんなさい……無神経なことを言いました。"
90100020-134 = "いえ、構いません。"
90100020-143 = "会長。ユキノ――いえ、囚人番号5020番をお連れしました。"
90100020-144 = "どうぞ、お入りください。"
90100020-145 = "（……聞き慣れない声だ）"
90100020-146 = "（違和感がある……どこか、会長らしくないような……？）"
90100020-147 = "（連邦生徒会長は、どんな声だっただろうか……？）"
90100020-148 = "（彼女の姿が……思い出せない）"
90100020-154 = "連邦生徒会長執務室"
90100020-157 = "お久しぶりですね、ユキノ小隊長。"
90100020-161 = "あなたは――"
90100020-169 = "――連邦生徒会長。"
90100020-170 = "ご無沙汰しております。なんだか、印象が変わりましたね。"
90100020-171 = "最近よく言われるんです。あまり自覚は無いのですが。"
90100020-172 = "それだけ長く席を空けてしまったということなのでしょうね。"
90100020-177 = "立ち話もなんですから、お掛けください。"
90100020-179 = "……不在中の一連の出来事については既に報告を受けています。"
90100020-180 = "カヤ防衛室長が、あなた達を使ってクーデターを企てたそうですね。"
90100020-181 = "………はい。"
90100020-182 = "お気になさらず。あなたを責めるつもりはありません。"
90100020-183 = "むしろ私の方が……皆さんに謝らなければ。"
90100020-184 = "様々な事件が起き、混乱が広がったことでしょう。#nそれもすべて、私が姿を消してしまったがゆえ。"
90100020-185 = "その[ruby=さなか]最中[/ruby]で、誰かが誤った選択をしたとして――どうして責任を追及できるというのでしょう。"
90100020-187 = "……私の不手際でした。"
90100020-189 = "いえ……申し訳ありません。"
90100020-190 = "特に……SRT特殊学園の皆さんに対しては、本当に申し訳なく思っています。"
90100020-191 = "SRTの管理権限を巡って争いが起こり……学園の解体にまで至ったのですから。"
90100020-192 = "RABBIT小隊をはじめとして――"
90100020-193 = "入学して間もない1年生には、つらい経験をさせてしまいました。"
90100020-194 = "公務が落ち着き次第にはなりますが、SRT特殊学園を復活させようと考えておりまして。#n隊員たちが最良の教育を受けられるよう尽力するつもりです。"
90100020-198 = "そこまでしていただけるのであれば、他に望むことはありません。"
90100020-199 = "……ただし。"
90100020-200 = "だからといって、皆さんの過去が無かったことになるわけではありません。"
90100020-201 = "クーデターのためにインフラを止め、連邦生徒会を襲撃し――#n都心で爆破テロを起こそうとした。その罪は重いです。"
90100020-202 = "もちろん、恩赦を与えることはできます。ですが、それでは市民の不満は溜まる一方で、信頼回復などとてもできないでしょう。"
90100020-203 = "これは慎重に進めなければならない事案です。#n……SRTが、本来の役割を取り戻すためにも。どうか、ご理解ください。"
90100020-204 = "罪を犯した時点で、どのような処罰も甘んじて受ける覚悟はできていました。"
90100020-205 = "ただ……他の小隊員は、あくまで私の命令に従っただけです。"
90100020-206 = "私はどうなろうと構いません……どうか、他の小隊員には便宜を図っていただけないでしょうか。"
90100020-207 = "全ての責任を1人で背負おうとする。#nあなたの悪い癖ですね。"
90100020-208 = "世の中のあらゆる事象は複雑に絡み合っています。#nただ1人に全ての責任を負わせることなどできません。"
90100020-209 = "この現状は……そうですね。#n全員が少しずつ責任を持ち、役割を果たした結果といえるでしょう。"
90100020-210 = "……もちろん、私も例外ではありません。"
90100020-211 = "ですからこの事態の代償も、みんなで支払うべきなのです。"
90100020-216 = "……以前、作戦行動中に容疑者の初動対応に失敗し、#n市民を巻き込んでしまったことがありました。"
90100020-217 = "その市民が批難すべきは、現場で指揮官を務めていた私だというのに……。"
90100020-218 = "会長がすべての矢面に立ってくださったおかげで、私たちの責任は一切問われませんでした。"
90100020-219 = "世の中のあらゆる問題は1人で背負うことができないのだとしたら……#nなぜ会長は、これまでSRTの力と責任を1人で背負われていたのですか？"
90100020-220 = "当時は……余裕があったからです。"
90100020-221 = "あの頃の私は、皆さんの過失を補えるだけの余裕も、地位も、責任も持っていました。"
90100020-222 = "私の依頼で任務に就いた者が、窮地に陥ってしまった。#nそれを助けられる余裕があるのに責任だけを押しつける。#nそれは、正しいリーダーの姿とは言えませんから。"
90100020-223 = "であれば私も――"
90100020-224 = "今のあなたにそれができるとは思えません。#n疲れが滲んでいますよ。自分の罪を背負うだけでも精一杯なように見えます。"
90100020-225 = "いつか、他人の罪を背負えるだけの余裕があなたに戻ってからでも遅くはありません。"
90100020-226 = "それまでは、どうかこのわがままを聞いてください、ユキノさん。"
90100020-230 = "……会長のお気持ちは理解しました。"
90100020-231 = "ですが矯正局に籠って反省しているだけでは、SRTの名誉は取り戻せません。"
90100020-232 = "罪を償える機会をいただけるのでしたら、どんな任務でもお引き受けします。#nご指示を。"
90100020-237 = "……恩赦は難しくとも、市民に奉仕する機会を用意する程度は許されるでしょう。"
90100020-241 = "……「ロア」という言葉を聞いたことはありますか？"
90100020-242 = "人々の間で噂として伝わっていく、根拠も出どころも分からない胡乱な話。#n伝承……都市伝説、あるいは怪談。"
90100020-243 = "にわかには信じがたい、けれど説得力があるがゆえに、語り継がれ――#n生き永らえていく物語。"
90100020-245 = "現実には存在しない異界の駅へと向かう列車――"
90100020-247 = "真夜中に、聞くだけで呪われてしまう声が流れてくるラジオ――"
90100020-249 = "決まった手順で乗り降りすると、二度と戻ってこられなくなるエレベーター――"
90100020-251 = "……驚かないのですね。#n実は怪談がお好きなのですか？"
90100020-252 = "真偽が定かではない話に感情移入するのは非効率的です。"
90100020-253 = "そうですね。ロアとは本来、まともに取り合うべきではない――#n取るに足らない空想の産物にすぎなかったのでしょう。"
90100020-254 = "ですがこの頃、実際に[ruby=・]遭[/ruby][ruby=・]遇[/ruby][ruby=・]し[/ruby][ruby=・]た[/ruby]という報告が増えているのです。"
90100020-255 = "それは目撃談に留まらず――実害も出始めている。"
90100020-256 = "実害……それは、ロアによるものでしょうか？"
90100020-257 = "ロアとの遭遇を主張する生徒は、真相を確かめる間もなく声を失ったり、#n失踪してしまったりするケースがほとんどです。"
90100020-258 = "テロや失踪事件であれば、ヴァルキューレ警察学校の出番ですが、#nこと今回に至っては実情すら把握できていない状態でして。"
90100020-259 = "ロアの伝播を防ぐべく、行政委員会は捜査をより上位の組織に移管すべきだと判断しました。"
90100020-260 = "通常の治安組織では対応できない状況において、迅速かつ半ば超法規的な捜査が必要とされるのであれば――"
90100020-265 = "SRTに白羽の矢が立った、というわけですね。"
90100020-266 = "その通りです。"
90100020-267 = "ただ、これはあくまで連邦生徒会長からの[ruby=・]提[/ruby][ruby=・]案[/ruby]です。#n命令でも、指示でもありません。"
90100020-268 = "相手の正体さえ分からず、最悪の場合、被害者と同じ末路を辿るかもしれない。"
90100020-275 = "あなたがロアを見つける前に、ロアがあなたを見つけてしまったなら──#n次は、あなた自身がロアとなる可能性すらあります。"
90100020-276 = "それでも、この作戦に臨みますか？"
90100020-278 = "はい。"
90100020-279 = "私たちには、償うべき罪がありますので。"
90100020-284 = "良いでしょう。こちらで集めた情報を共有します。"
90100020-285 = "ロアの実態を探り、キヴォトスに広まる脅威を一掃してください。"
90100020-286 = "……それから、もう1つ。#nこれは連邦生徒会長ではなく、私個人としてのお願いです。"
90100020-290 = "どうか――無事に帰ってきてください。"
90100020-291 = "ご心配なく。"
90100020-292 = "勝ち目のない戦いは即時撤退。それも、特殊部隊の仕事ですから。"
90100020-294 = "1点、作戦に先立って質問をよろしいでしょうか。"
90100020-295 = "ええ、どうぞ。"
90100020-296 = "非公式に行われる作戦とはいえ、拠点の確保や弾薬の補給のためには外部と連絡を取る必要があります。支援を担う組織も。"
90100020-297 = "以前までは連邦生徒会長がやってくださりました。#nしかし、今は状況がそれを許さないでしょう。"
90100020-298 = "そうですね。私がFOX小隊の支援を直接引き受けてしまえば、#n連邦生徒会長がSRT特殊学園の復活を公に認めた、という印象を与えかねません。"
90100020-299 = "ですが幸いなことに、その役割を担える組織があります。"
90100020-300 = "連邦生徒会に匹敵する権限と予算を有していて、連邦生徒会の誰もが認める捜査機関。"
90100020-301 = "――シャーレです。"
90100020-306 = "……聞き間違いでしょうか？"
90100020-308 = "次回;小隊は腹ごしらえしてから行進する"

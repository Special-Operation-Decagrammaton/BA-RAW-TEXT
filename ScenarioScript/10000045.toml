10000045-76 = "1;츠바키;02;오- 피도 눈물도 없는 악당.\n#1;a"
10000045-77 = "1;츠바키;02\n3;카에데;07;과연, 마츠리부의 부장!\n#3;a\n#3;em;[반응]"
10000045-78 = "1;츠바키;02\n3;카에데;00;가게의 실적, 축제의 성패, 원하는 것을 쟁취하기 등등!\n#3;hophop"
10000045-79 = "1;츠바키;02\n3;카에데;11;목적을 위해서라면 갖은 수단을 가리지 않는다는 소문이 있던데. 사실이었구나!\n#3;hophop\n#3;em;[반짝]"
10000045-80 = "1;츠바키;02\n3;카에데;11\n5;미모리;06;그……. 카에데 쨩. 그건 칭찬이 아니지 않을……까요?\n#5;a\n#5;em;[땀]"
10000045-81 = "[s] \"…….\""
10000045-82 = "1;츠바키;02\n3;카에데;11\n5;미모리;06\n#1;d\n#3;d\n#5;d\n#wait;1000"

[translation]
10000045-2 = "Ack!"
10000045-6 = "Izuna lost again?!"
10000045-7 = "But Izuna came more prepared than ever! Does this mean Izuna can't beat Sensei in a fair fight?!"
10000045-8 = "Does Izuna require more training?"
10000045-9 = "[s1] \"Why do this? I thought becoming a ninja was your dream.\"\n[s2] \"Why would you fight alongside the Mouryo?\""

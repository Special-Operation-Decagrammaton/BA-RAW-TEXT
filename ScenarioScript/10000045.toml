[translation]
10000045-2 = "เอ๋?!"
10000045-6 = "นี่... อิซุนะแพ้อีกแล้วเหรอคะ?!"
10000045-7 = "แต่ครั้งนี้เตรียมตัวมาดีกว่าก่อนเยอะเลยนะ?! นี่แปลว่าอิซุนะไม่มีทางเอาชนะได้เลยเหรอ?!"
10000045-8 = "หรือว่าอิซุนะยังฝึกฝนไม่เพียงพอ?!"
10000045-9 = "[s1] \"ไหนบอกว่าความฝันคือการได้เป็นนินจาไงล่ะ?\"\n[s2] \"ทำไมถึงมาอยู่กับพวกปีศาจล่ะ?\""
10000045-10 = "คะ? คือว่า..."
10000045-11 = "คะ? คือว่า..."
10000045-12 = "ก็เพราะตอนนี้อิซุนะกำลังทำภารกิจที่ได้รับมอบหมายจากผู้ว่าจ้างในฐานะนินจาอยู่ยังไงล่ะคะ!"
10000045-13 = "[s] \"ผู้ว่าจ้าง...?\""
10000045-14 = "ทำภารกิจจัดการคนที่ขวางทางให้หมด เพื่อกิจการของผู้ว่าจ้าง!"
10000045-15 = "ทำภารกิจให้สำเร็จโดยไม่เกี่ยง! นี่แหละค่ะคือทางของนินจา!"
10000045-16 = "ถ้าเดินทางสายนินจาแบบนี้ไปเรื่อยๆ ล่ะก็ สักวันหนึ่งคงได้เจอนายท่าน...!"
10000045-17 = "อุ้ย! เผลอพูดข้อมูลสำคัญไปแล้ว! หรือว่านี่คืออุบายที่น่ากลัวของคุณครู?!"
10000045-18 = "ฮึ่มม! ครั้งนี้อิซุนะจะต้องยอมถอย! แต่ครั้งหน้าไม่เป็นแบบนี้แน่!"
10000045-19 = "เตรียมตัวเจอกันในครั้งหน้าไว้เลยนะคะคุณครู! จะโค่นล้มให้ได้เลย!"
10000045-20 = "[s] \"นั่นมันบทพูดของวายร้ายในอนิเมะไม่ใช่เหรอ?\""
10000045-21 = "อิซุนะไม่ใช่วายร้ายนะคะ!"
10000045-22 = "นินจาคือคนที่ล่าถอยเมื่อจำเป็น แล้วไปพักฟื้นเพื่อกลับมาท้าทายใหม่ต่างหาก!"
10000045-23 = "ครั้งต่อไปจะไม่ยอมแพ้แน่ค่ะ! นินนิน!"
10000045-25 = "(ฟิ้วววว~)"
10000045-27 = "(อิซุนะหายไปอย่างรวดเร็ว)"
10000045-29 = "ไม่ได้บาดเจ็บตรงไหนใช่ไหมคะคุณครู?!"
10000045-30 = "[s] พยักหน้า"
10000045-31 = "อ๊ะ! พวกปีศาจหนีไปแล้ว!"
10000045-32 = "พวกนั้นพูดว่า 'ฮึ่มม ครั้งหน้าไม่ออมมือให้แน่' แล้วหนีไปเลย นี่สินะวายร้าย"
10000045-33 = "ปกติพวกฉันต้องลำบากในการสู้อยู่ฝ่ายเดียว แต่พอได้คุณครูมาอีกคน งานก็ง่ายขึ้นเป็นกองเลยนะคะ"
10000045-34 = "นี่สินะ... ที่เรียกว่าพลังของผู้ใหญ่?!"
10000045-35 = "ใช่ ยอดไปเลย.."
10000045-36 = "[s] \"ครั้งที่แล้วพวกเธอ...\""
10000045-39 = "หยุดตรงนั้นเลยนะ~ ฉันไม่ปล่อยไปแน่!"
10000045-40 = "ดะ.. เดี๋ยวนะคะ คะ.. คาเอเดะจัง แฮ่ก... แฮ่ก... ทำไมไวจังเลย..."
10000045-42 = "หืมม~ ตอนนั้นคุณครูก็อยู่ด้วยเหรอ?"
10000045-43 = "ชมรมฝึกฝนต่อสู้กับพวกปีศาจและลาดตระเวนถนนมาตลอด!"
10000045-44 = "หืม? ลาดตระเวนถนนงั้นเหรอ?"
10000045-45 = "\"ให้การพิทักษ์ท้องถนนเป็นส่วนหนึ่งของการฝึกฝน!\" ก็เป็นหนึ่งในเป้าหมายของชมรมเรานี่นา~"
10000045-46 = "เราก็เลยมาพิทักษ์ท้องถนนในช่วงเทศกาลด้วยยังไงล่ะ!"
10000045-47 = "ก็ทุกคนต้องสนุกสนานกันได้ ถึงจะเรียกว่าเป็นเทศกาลไม่ใช่เหรอคะ?"
10000045-48 = "แต่อยู่ๆ พวกปีศาจบนท้องถนนก็ออกมาก่อเรื่อง และพวกเราก็ไม่รู้ว่าต้องทำยังไง..."
10000045-49 = "ก็เลยไปชมรมหยินหยาง..."
10000045-50 = "ฉันไม่รู้เลยนะเนี่ยว่าชมรมฝึกฝนทำกิจกรรมแบบนี้อยู่"
10000045-51 = "คิดว่าเป็นพวกประหลาดนี่ทำแต่อะไรแปลกๆ ซะอีก..."
10000045-52 = "[s] \"นี่ชมใช่ไหมน่ะ?\""
10000045-53 = "เอ่อ... อย่าคิดไม่ดีสิคะ~!"
10000045-54 = "ฉันไม่รู้เลยค่ะว่าทำไมจู่ๆ พวกปีศาจก็ออกมาก่อเรื่องแบบนี้!"
10000045-55 = "ฮ้าวว~ zzZ จะว่าไป ฉันได้ยินข่าวลือบางอย่างมาล่ะ"
10000045-56 = "ว่ากันว่ามี 'ผู้ว่าจ้าง' ที่เคลื่อนไหวโดยการระดมพวกปีศาจที่เดินเตร็ดเตร่อยู่ตามถนน"
10000045-57 = "[s] (อิซุนะก็เคยพูดถึงผู้ว่าจ้างนี่นา...)"
10000045-60 = "ก็เพราะตอนนี้อิซุนะกำลังทำภารกิจที่ได้รับมอบหมายจากผู้ว่าจ้างในฐานะนินจาอยู่ยังไงล่ะคะ!"
10000045-62 = "[ns] (หรือว่าจะเป็นคนที่มอบงานให้อิซุนะอยู่)"
10000045-63 = "มีคนจ่ายเงินให้พวกตัวป่วนนั่นทำงานงั้นเหรอ? ทำไมกันล่ะ?"
10000045-64 = "ก็เพราะว่ามีวายร้ายที่ไม่พอใจในเทศกาลครั้งนี้น่ะสิ!"
10000045-65 = "คงจะเป็นคนที่ทนไม่ได้ที่เห็นคนอื่นได้ออกมาเที่ยวเล่นอย่างสนุกสนาน! ใช่ ต้องใช่แน่ๆ#nพวกนี้แหละคือวายร้าย!"
10000045-66 = "ฉันไม่ค่อยรู้ที่คาเอเดะจังพูดเท่าไหร่หรอกนะคะ แต่ฉันมั่นใจว่าต้องมีคนอยากหยุดเทศกาลนี้ค่ะ"
10000045-67 = "ถึงตอนนี้เราจะยังไม่รู้สาเหตุของพวกเขา"
10000045-68 = "แต่การไปหาตัวผู้ที่สั่งการพวกปีศาจน่าจะดีกว่าการมาสู้กับปีศาจเรื่อยๆ อยู่อย่างนี้นะคะ"
10000045-69 = "อืมม~ จะไปหาตัวผู้สั่งการยังไงล่ะ~?"
10000045-70 = "หาตัวผู้สั่งการ... ผู้สั่งการ…"
10000045-71 = "ถ้าจะหาตัวผู้สั่งการที่ตั้งใจจะทำลายเทศกาล..."
10000045-72 = "เราก็ต้องใช้มาตรการขั้นรุนแรง!"
10000045-74 = "นั่นคือการลักพาตัวสมาชิกปีศาจเพื่อถามหาหัวหน้าแก๊ง!"
10000045-76 = "ว้าว... ใครคือวายร้ายกันแน่เนี่ย"
10000045-77 = "ไม่เบาเลยนะ หัวหน้าชมรมเทศกาล!"
10000045-78 = "มีข่าวลือว่าชมรมนี้ทำได้ทุกอย่างเพื่อให้บรรลุเป้าหมาย"
10000045-79 = "ไม่ว่าจะเป็นกำไรของร้าน ความสำเร็จของเทศกาล และอะไรทุกอย่างที่ต้องการ#nข่าวลือนี้คงจะจริงสินะ!"
10000045-80 = "เอ่อ... คาเอเดะจัง มันคือ... คำชม... ถูกไหมคะ?"
10000045-81 = "[s] \"........\""
10000045-84 = "มะ.. ไม่เป็นไรหรอกค่ะ!"
10000045-85 = "ชิ... ชิซุโกะเป็นไอดอลที่จิตใจอ่อนโยนยังไงล่ะคะ!"
10000045-88 = "....ย้ากกก! เราไปหาตัวผู้สั่งการกันเลยค่ะ Go!"

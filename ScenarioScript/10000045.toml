[translation]
10000045-1 = "#wait;1000"
10000045-2 = "3;이즈나 무소속;04;캐앵?!\n#3;shake\n#3;a\n#3;fx;{shot}\n#fontsize;80"
10000045-3 = "3;이즈나 무소속;04\n#3;falldownL\n#wait;1500"
10000045-4 = "#all;hide"
10000045-5 = "#all;hide"
10000045-6 = "3;이즈나 무소속;04;이, 이즈나가 또 졌다구요?!\n#3;hophop\n#3;a"
10000045-7 = "3;이즈나 무소속;04;이번엔 더욱더 만반의 준비를 하고 찾아왔는데?! 정면승부로는 안 된다는 건가요?!\n#3;stiff"
10000045-8 = "3;이즈나 무소속;06;아니면 아직, 이즈나의 수행 부족 때문?!"
10000045-9 = "[s1] \"그보다 이즈나는 닌자가 꿈이라고 했으면서.\"\n[s2] \"어째서 망량즈와 같이 있는 거야?\""
10000045-10 = "3;이즈나 무소속;05;네? 그야…….\n#3;em;[반응]"
10000045-11 = "3;이즈나 무소속;05;네? 그야…….\n#3;em;[반응]"
10000045-12 = "3;이즈나 무소속;03;이즈나는 지금 닌자로서 고용주에게 의뢰를 받고 활동 중이니까요!\n#3;hophop\n#3;em;[!]"
10000045-13 = "[s] \"고용주……?\""
10000045-14 = "3;이즈나 무소속;01;고용주의 사업을 위해! 방해꾼들을 쓰러트리고 임무를 완수한다!\n#3;greeting\n#3;em;[반짝]"
10000045-15 = "3;이즈나 무소속;00;그 어떤 내용의 의뢰라도 완수하는 것이 닌자의 길!\n#3;em;[!]"
10000045-16 = "3;이즈나 무소속;99;그렇게 닌자의 길을 걷다 보면 언젠가 이즈나는 저만의 주군을……!"
10000045-17 = "3;이즈나 무소속;04;핫?! 나도 모르게 중요 정보를?! 이것도, 선생님의 무서운 책략?!\n#3;shake\n#3;em;[?!]"
10000045-18 = "3;이즈나 무소속;04;으, 으읏! 이즈나! 이번만큼은 물러가겠지만. 다음번엔 다를 거예요!\n#3;stiff"
10000045-19 = "3;이즈나 무소속;05;다음에 만나면 각오하세요! 선생님! 반드시 쓰러트려 드릴 테니까!\n#3;hophop"
10000045-20 = "[s] \"그거 완전히 도망치는 삼류 악당 대사잖아…….\""
10000045-21 = "3;이즈나 무소속;04;이, 이즈나는 삼류 악당이 아니에요!\n#3;em;[속상함]\n#3;stiff"
10000045-22 = "3;이즈나 무소속;99;닌자란 자고로 필요하다면 몇 번이고 후퇴한 다음 몸을 추스르고 다시 도전하는 존재!"
10000045-23 = "3;이즈나 무소속;05;다음엔 절대로 지지 않아요! 닌닌!\n#3;em;[!]\n#3;hophop\n#3;closeup"
10000045-24 = "3;이즈나 무소속;05\n#3;closeup\n#3;greeting\n#3;d\n#wait;700"
10000045-25 = "#na;(퍼엉!)\n#fontsize;80\n#bgshake"
10000045-26 = "#all;hide"
10000045-27 = "#na;(그렇게 눈 깜짝할 새에 이즈나는 사라졌다.)"
10000045-28 = "#all;hide"
10000045-29 = "3;시즈코;04;아앗, 선생님. 어디 다치신 곳은 없나요?!\n#3;a\n#3;stiff\n#3;em;[반응]"
10000045-30 = "[s] 고개를 끄덕인다."
10000045-31 = "3;카에데;11;와앗! 망량즈가 한순간에 도망쳐버렸어!\n#3;a\n#3;hophop\n#3;em;[!]"
10000045-32 = "3;카에데;11\n1;츠바키;01;도망치면서 '큿, 다음 번엔 다를 거다!' 같은 말을 했어. 그거, 악당?\n#1;a"
10000045-33 = "3;카에데;11\n1;츠바키;01\n5;미모리;03;저희들로만 싸울 땐 계속 고전했지만. 선생님이 함께하신 것만으로도 이렇게 다르군요.\n#5;a"
10000045-34 = "1;츠바키;01\n5;미모리;03\n3;카에데;07;꿀꺽. 이, 이게 어른! 어른의 힘인가?!\n#3;em;[반짝]\n#3;greeting"
10000045-35 = "5;미모리;03\n3;카에데;07\n1;츠바키;02;응. 굉장-해.\n#1;em;…"
10000045-36 = "[s] \"너희들이라면 분명 저번에…….\""
10000045-37 = "#wait;100"
10000045-38 = "#all;hide"
10000045-39 = "#na;카에데;거기~서! 놓치지 않는다앗!"
10000045-40 = "#na;미모리;자, 잠깐만요. 카, 카에데 쨩. 하아…… 하아…… 너, 너무 빨라요……"
10000045-41 = "#all;hide"
10000045-42 = "3;츠바키;02;으응~ 그때, 선생님도 있었던 거야~?\n#3;a\n#3;em;[?]"
10000045-43 = "3;카에데;00;우리 수행부는 이제까지 망량즈와 싸우면서 거리 순찰 활동을 해왔으니까!\n#3;em;[반응]"
10000045-44 = "5;시즈코;02;어? 거리 순찰?\n#5;al\n#3;m1"
10000045-45 = "#3;hide\n1;츠바키;01;수행의 일환으로 거리를 지키자- 라는 것도 우리 동아리의 목표니까~"
10000045-46 = "1;카에데;11;축제의 거리를 지키는 거야!\n#1;hophop\n#1;em;[반짝]"
10000045-47 = "1;미모리;01;모두가 즐겁게 즐길 수 있어야 비로소 축제잖아요?\n#1;a\n#1;greeting"
10000045-48 = "1;미모리;06;하지만 어째선지 길거리 망량즈가 날뛰기 시작해서, 곤란해하던 참이었어요.\n#1;em;…"
10000045-49 = "5;시즈코;06;그래서 음양부에……."
10000045-50 = "5;시즈코;99;전혀 몰랐어. 수행부가 이런 활동을 하고 있을 줄은."
10000045-51 = "5;시즈코;06;그냥 평소에 이상한 짓만 하는 괴짜들인 줄로만 알았는데.\n#5;em;[땀]\n#5;stiff"
10000045-52 = "[s] \"대놓고 그런 말을 하는 건 좀 그렇지 않아?\""
10000045-53 = "5;시즈코;04;어, 어쨌든 간에요~!\n#5;hophop"
10000045-54 = "5;시즈코;05;갑자기 망량즈 애들이 저렇게 날뛰는 이유를 모르겠다구요!\n#5;em;[!]"
10000045-55 = "1;츠바키;08;흐아암. 그러고 보면 최근에 소문을 들은 적이 있어.\n#1;stiff"
10000045-56 = "1;츠바키;01;거리의 뒤편에서 어슬렁거리던 망량즈를 하나로 규합해서 움직이는 '고용주'가 있다고."

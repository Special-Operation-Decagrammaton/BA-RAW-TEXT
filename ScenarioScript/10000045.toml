10000045-50 = "I had no idea the Inner Discipline Club was fighting to protect everyone."
10000045-51 = "I thought you were all just weirdos that went around doing weird stuff for fun."
10000045-52 = "[s] \"You realize you're saying that to their faces, right?\""
10000045-53 = "W-Well, anyway...!"
10000045-54 = "We don't know why the Mouryo are causing so much trouble all of a sudden either."
10000045-55 = "*yawn* Come to think of it, I did hear a rumor recently."
10000045-56 = "There's some kind of \"boss\" uniting the Mouryo that wander the streets."
10000045-57 = "[s] \"(That must be the client Izuna mentioned...)\""
10000045-60 = "Izuna is currently on a mission for her client!"
10000045-62 = "[ns] \"(That can only mean that someone hired Izuna.)\""
10000045-63 = "Are you suggesting that someone is paying them? Why would anyone do that?"
10000045-64 = "There must be a scoundrel out there who has it in for the festival!"
10000045-65 = "I bet they can't stand everybody laughing and having a good time!#nThat kind of person is nothing less than pure evil!"
10000045-66 = "Kaede might be jumping to conclusions on that one, but there's no denying someone is trying to sabotage the festival."
10000045-67 = "Now we just need to figure out their motive."

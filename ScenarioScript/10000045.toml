10000045-42 = "Oh. You were there too, Sensei?"
10000045-43 = "So you saw! That's right—the Inner Discipline Club has been patrolling the streets and fighting off the Mouryo."
10000045-44 = "Really? You have?"
10000045-45 = "One of the club's goals to promote discipline is to protect our community."
10000045-46 = "That's why we're doing what we can to keep the festival safe!"

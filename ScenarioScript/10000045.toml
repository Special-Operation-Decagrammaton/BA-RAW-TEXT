10000045-61 = "#all;hide"
10000045-62 = "[ns] (이즈나를 고용한, 다른 누군가가 있다는 거구나.)"
10000045-63 = "3;시즈코;02;그 문제아들을? 돈 들이면서까지? 왜?\n#3;a\n#3;em;[?]"
10000045-64 = "3;카에데;15;이 축제가 잔뜩 마음에 안 드는 못된 악당이 있는 게 분명해!\n#3;hophop\n#3;em;[빠직]"
10000045-65 = "3;카에데;15;분명 모두가 하하호호 웃고 떠드는 걸 보고 배가 아픈 걸 테지! 응. 결정! 그런 나쁜 사람인 거네!"
10000045-66 = "3;미모리;10;카에데 쨩의 말은 잘 모르겠지만. 이 축제를 멈추고 싶어하는 사람은 분명 있는 모양이에요."
10000045-67 = "3;미모리;99;그 목적이 무엇인지, 아직 알 수는 없지만."
10000045-68 = "3;미모리;02;그래도 망량즈와 계속해서 이렇게 싸우기보다는 그 원흉을 찾으면 되지 않을까요?\n#3;em;[반응]"
10000045-69 = "1;츠바키;02;우움~ 원흉이라면 어떻게 찾게~?\n#1;a\n#3;m5"
10000045-70 = "#3;hide\n5;시즈코;01;원흉을 찾는다. 원흉…….\n#5;em;…"
10000045-71 = "5;시즈코;99;우리 축제를 잔뜩 방해하려는 원흉을 찾기 위해서라면……."
10000045-72 = "5;시즈코;05;우리도 눈물을 머금고, 특단의 조치를 취할 필요가 있어!\n#5;em;[반응]"
10000045-73 = "#all;hide"
10000045-74 = "3;시즈코;05;망량즈 멤버를 유괴해서, 수괴를 알아내는 거야!\n#3;hophop\n#3;closeup"

[translation]
10000045-2 = "呀啊！？"
10000045-6 = "伊，伊樹菜又輸了！？"
10000045-7 = "明明做了比之前更萬全的準備才來的……！#n居然還是無法對抗……！？"
10000045-8 = "是修行還不夠嗎……！？"
10000045-9 = "[s1]「伊樹菜，你不是說成為忍者是你的夢想嗎？」\n[s2]「為什麼會和妖怪劇團在一起呢？」"
10000045-10 = "那是因為……"
10000045-11 = "那是因為……"
10000045-12 = "伊樹菜現在是以一名忍者的身分在服從雇主的命令！"
10000045-13 = "[s]「雇主……？」"
10000045-14 = "是的！必須打倒妨礙者，完成任務才行！"
10000045-15 = "無論是什麼樣的任務，只要是命令就必須完美執行，這才是忍者！"
10000045-16 = "這樣一來，伊樹菜總有一天會與真正的主公……！"
10000045-17 = "04;啊！？伊樹菜不知不覺就把這些說了出來……！#n這也是老師的策略嗎！？"
10000045-18 = "唔唔！伊樹菜是識時務的忍者，這次就先撤退了……！"
10000045-19 = "下次見面的時候，還請做好覺悟！伊樹菜一定會打敗老師的！"
10000045-20 = "[s]「完全是三流反派開溜的台詞……」"
10000045-21 = "伊，伊樹菜才不是什麼三流反派！伊樹菜是忍者！"
10000045-22 = "所謂忍者就是要執行戰略性……那個，戰略性的撤退，#n之後再鍥而不捨地一再挑戰，就是這樣的存在！"
10000045-23 = "下次伊樹菜絕對不會輸的！忍忍！"
10000045-25 = "（咻！）"
10000045-27 = "（於是伊樹菜又再次消失了）"
10000045-29 = "啊，老師！你沒事吧，有沒有哪裡受傷！？"
10000045-30 = "[s] 點頭"
10000045-31 = "嗚嗚，被他們逃走了……！"
10000045-32 = "他們所有人都說著「可惡，下次一定……！」之類的話一邊逃跑……"
10000045-33 = "我們之前總是陷入苦戰，沒想到光是多了老師就有這麼大的改變……"
10000045-34 = "（吞口水）……這就是大人的力量嗎！？"
10000045-35 = "嗯，真厲害。"
10000045-36 = "[s]「啊，這麼說來你們是之前……」"
10000045-39 = "站住──！別想逃！"
10000045-40 = "楓，楓醬也請等一下……哈啊，哈啊……你，你跑太快了……"
10000045-42 = "咦？我們有見過老師嗎……？"
10000045-43 = "啊，可能是在巡邏的時候擦身而過了吧？#n我們最近常常在街上巡邏，同時和那些妖怪劇團戰鬥！"
10000045-44 = "巡邏？"
10000045-45 = "把守護街道當成修行的一環……這也是我們社團的目標之一。"
10000045-46 = "一定要從那些傢伙手中守住櫻花祭！"
10000045-47 = "大家都樂在其中才能算是櫻花祭。"
10000045-48 = "不過妖怪劇團．街頭流派卻突然開始作亂，我們正覺得頭痛呢。"
10000045-49 = "所以你們才會去陰陽部……"
10000045-50 = "修行部居然在進行這種活動，我之前完全不知道。"
10000045-51 = "還以為只是群舉止怪異的怪人而已……"
10000045-52 = "[s]「在人家面前這麼說不太好吧……」"
10000045-53 = "總，總而言之！"
10000045-54 = "妖怪劇團「突然」出來作亂是事實，不過仔細想想究竟是為什麼呢……！？"
10000045-55 = "嗯……這麼說來，最近有個傳聞。"
10000045-56 = "有個把先前四散各地的妖怪劇團加以整合、使喚的「雇主」……之類的人。"
10000045-57 = "[s] （這麼說來，伊樹菜也提到過「雇主」……）"
10000045-60 = "伊樹菜現在是以一名忍者的身分在服從雇主的命令！"
10000045-62 = "[ns] （有人雇用了伊樹菜且命令著他……）"
10000045-63 = "雇主……特地花錢雇用那些問題兒童？那又是為了什麼呢？"
10000045-64 = "原來如此，他肯定是壞蛋沒錯！"
10000045-65 = "可能是看到大家開心地笑著就不高興，因此才出來作亂！#n嗯，絕對是這樣！絕對是個壞蛋！"
10000045-66 = "雖然不是很懂楓說的話，但看來確實有人想要破壞這場櫻花祭呢。"
10000045-67 = "雖然還不清楚他的目的究竟是什麼……"
10000045-68 = "但與其繼續跟妖怪劇團戰鬥，是不是該直接找出元兇比較好呢？"
10000045-69 = "我贊成～不過要怎麼找呢？"
10000045-70 = "元兇，元兇啊……"
10000045-71 = "這是為了揪出妨礙我們櫻花祭的元凶……"
10000045-72 = "嗯，雖然是斷腸之痛但也沒辦法了！"
10000045-74 = "就用單純的方法吧。綁架妖怪劇團的成員，逼他說出雇主究竟是誰！"
10000045-76 = "嗚哇～真是沒血沒淚。"
10000045-77 = "不愧是節慶營運管理部的部長！"
10000045-78 = "店裡的生意、慶典的成功，為了達成目的會不擇手段！"
10000045-79 = "我之前就聽過這種傳聞，沒想到是真的啊！"
10000045-80 = "楓醬，那不是稱讚……"
10000045-81 = "[s]「……」"
10000045-84 = "呃，不是，好像也不至於要這麼做，那個！"
10000045-85 = "討，討厭啦～靜子是心地善良的看板娘……！"
10000045-88 = "……啊啊真是的！總之，去找出元兇吧！！"

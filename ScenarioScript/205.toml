[translation]
205-1 = "บุกโจมตีศูนย์บัญชาการไคเทนเจอร์!"
205-3 = "ไม่เจอกันนานเลยนะคุณครู"
205-4 = "หืม? ทำไมทำหน้าแบบนั้นล่ะ? หรือว่าตกใจที่เห็นฉันงั้นเหรอ? "
205-5 = "หรือว่ากำลังหวังว่าจะได้เจออะไรอย่างอื่นอยู่งั้นเหรอ? ฮิฮิฮิ น่าเสียดายนะ#nแต่ที่นี่ไม่มีคนอื่นนอกจากท่านโมโมกะผู้น่ารักคนนี้หรอก (ง่ำๆ)"
205-6 = "เอาล่ะ มาคุยเรื่องงานกันดีกว่าคุณครู"
205-7 = "เจ้าวายร้ายไคเทนเจอร์ที่เป็นที่ต้องการตัวในคิโวทอส#nเราเจอศูนย์บัญชาการของเจ้าพวกนั้นแล้วล่ะ"
205-8 = "ดูเหมือนเจ้าพวกนั้นกำลังวางแผนอันตรายอะไรกันอยู่นะ"
205-9 = "เงินที่พวกเจ้าไคเทนเจอร์ปล้นไปมีมูลค่ามหาศาล#nขนาดที่สามารถสร้างอาวุธผิดกฎหมายขึ้นมาได้จำนวนมากเลยล่ะ... "
205-10 = "อีกทั้งเจ้าพวกนั้นยังขโมยแบบแปลนอาวุธ วัสดุ และอุปกรณ์เทคโนโลยี#nที่ใช้สำหรับการสร้างไปด้วย..."
205-11 = "ทั้งเงินจำนวนมหาศาลและเทคโนโลยี... เจ้าพวกนั้นคิดจะทำอะไรกันแน่นะ? "
205-12 = "ฮ่าฮ่าฮ่า ถึงจะไม่รู้ว่าเจ้าพวกนั้นวางแผนอะไรอยู่ แต่คงไม่ใช่เรื่องดีสำหรับคิโวทอสแน่"
205-13 = "เพราะงั้นเพื่อความสบายของ... ไม่สิ ถึงเวลาที่ทางชาเล่ต์จะต้องออกโรงแล้วล่ะนะ"
205-14 = "ฉันอยากให้คุณครูไปที่ศูนย์บัญชาการของพวกไคเทนเจอร์แล้วทำลายแผนการร้ายของพวกมันให้หน่อย ถึงจะยังไม่รู้ว่าคืออะไรก็เถอะ (ง่ำๆ)"
205-19 = "ฮุฮุฮุ รบกวนหน่อยแล้วกันนะ คุณครู"

[translation]
205-1 = "前往凱坦澤的根據地！"
205-3 = "嗨，好久不見，老師。"
205-4 = "為什麼露出那種表情？難道是因為我突然出現嚇到你了？"
205-5 = "呵呵，雖然不知道你期待的是誰，但很遺憾，現在是最最可愛的桃香的回合哦。（喀滋喀滋）"
205-6 = "所以……工作來了唷，老師。"
205-7 = "最近發現了奇普托斯知名通緝犯「凱坦澤」那些傢伙的大本營。"
205-8 = "他們似乎又～在計畫著什麼危險的事情。"
205-9 = "雖然不知道他們具體在做些什麼，但就算只看凱坦澤至今為止搶走的金額，也是能做出好幾個違法兵器的等級哦。"
205-10 = "還有大型武器的設計圖和最新使用了工程技術的新金屬素材……這些東西也偷了不少。"
205-11 = "利用如此龐大的資本和技術……究竟想做什麼呢？"
205-12 = "不過大概不會是什麼正經事吧。也不像是會對奇普托斯有所貢獻的事。"
205-13 = "所以就輪到方便……不對，是親切的夏萊出場了。"
205-14 = "可以去凱坦澤的大本營粉碎那些傢伙的計劃嗎？#n雖然不知道會出現什麼，不過夏萊應該沒問題的吧。（喀滋）"
205-19 = "呵呵。那就拜託你囉，老師。"

[translation]
205-1 = "Raiding the Kaitenger!"
205-3 = "Been a long time, Sensei."
205-4 = "Why the long face? Surprised to see me here? "
205-5 = "Were you expecting me to make a bigger deal out of this? Well, too bad. Seeing my cute face should be more than enough. *crunch*"
205-6 = "All right. Here's more busywork for you."
205-7 = "It's the Kaitenger, Kivotos' most wanted villains. We found out where those idiots have set up a base."
205-8 = "They're probably up to no good."
205-9 = "Why else would they steal a bunch of money to get their hands on illegal weapons? "
205-10 = "They've also been ruthlessly stealing weapon blueprints and crafting materials."
205-11 = "Just what are they planning to do with all that cash and equipment? "
205-12 = "Hahaha. Who knows? But I'm pretty sure it's not good for Kivotos."
205-13 = "It's about time Schale made itself useful again—I mean...kindly helped out."
205-14 = "I want you to go to their base and tear whatever they're plotting into shreds. *crunch*"
205-19 = "See ya later, Sensei. I look forward to the good news."

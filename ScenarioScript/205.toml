[translation]
205-1 = "#title;카이텐져 본거지 습격!"
205-2 = "#wait;2500"
205-3 = "3;모모카;11;자아, 오랜만이야, 선생.\n#3;a\n#3;em;[음표]"
205-4 = "3;모모카;02;응? 어째서 그런 표정이야? 설마 이 내가 나와서 놀란 거야? "
205-5 = "3;모모카;10;다른 뭔가 대단한 거라도 나오길 기대했어? 후후후, 안됐지만 여기선 귀여운 모모카 님밖에 등장하지 않거든. (와작)\n#3;greeting"
205-6 = "3;모모카;12;자, 그러면 또 일이야, 선생.\n#3;em;[반짝]"
205-7 = "3;모모카;05;키보토스의 지명수배 악당 카이텐져. 그 녀석들의 본거지를 발견했어."
205-8 = "3;모모카;07;그 녀석들, 무언가 위험한 음모를 꾸미고 있단 말이지.\n#3;em;…"
205-9 = "3;모모카;01;카이텐져가 지금까지 강탈해 간 현금만 해도 불법 병기를 몇 개나 만들 수 있는 수준에다가, "
205-10 = "3;모모카;02;무기 설계 도면이나 최신 공학 기술이 적용된 금속 소재…… 이런 것들도 마구잡이로 훔치고 있었거든.\n#3;em;[반응]"
205-11 = "3;모모카;99;막대한 자본과 기술…… 그걸로 대체 뭘 하려는 걸까? "
205-12 = "3;모모카;47;아하하. 뭔진 몰라도 이 키보토스에 도움이 되는 일은 아니겠지.\n#3;hophop\n#3;em;[재잘]"
205-13 = "3;모모카;12;그러니까 편리한…… 아니, 친절한 샬레가 나설 차례라는 거야."
205-14 = "3;모모카;10;카이텐져의 본거지로 가서 그 녀석들이 꾸미고 있는 음모를 분쇄해주면 좋겠어. 그게 뭔진 모르겠지만. (와작)\n#3;greeting"
205-15 = "#st;[0,0];instant;1;"
205-16 = "#clearST\n3;모모카;12\n#3;d\n#wait;1000"
205-17 = "#wait;1000"
205-18 = "3;모모카;12\n#3;a\n#wait;1000\n#3;closeup"
205-19 = "3;모모카;46;후후후, 그럼 잘 부탁해. 선생.\n#3;em;[음표]\n#3;closeup"

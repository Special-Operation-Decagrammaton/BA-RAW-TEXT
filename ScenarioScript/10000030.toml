[translation]
10000030-1 = "Episode 3;The Eccentric Girl from the Yin-Yang Club"
10000030-2 = "Let's get going before it's too late, Sensei!"
10000030-3 = "Whenever things begin to hit the fan at Hyakkiyako, like now..."
10000030-4 = "...there are two main places where we can turn for help."
10000030-5 = "First is the Yin-Yang Club, which is more or less the academy's student council."
10000030-6 = "And the other is the Hyakkaryouran Resolution Council."
10000030-7 = "But I heard that Hyakkaryouran is currently on hiatus!"
10000030-8 = "Yep. Pina's right about that."
10000030-9 = "That would leave only the Yin-Yang Club...at first glance."
10000030-10 = "[s] \"'At first glance'?\""
10000030-11 = "About that..."
10000030-12 = "You'll see what I mean later!"
10000030-13 = "Let's be off for now, Sensei."
10000030-14 = "I'm leaving Momoyodou in your care while I'm gone, Pina."
10000030-15 = "You got it! I won't let anyone encroach on OUR turf!"
10000030-16 = "All right, then. Before I go, answer me one question."
10000030-17 = "Hit me!"
10000030-18 = "Let's say the Mouryo come here while Sensei and I are gone."
10000030-19 = "What will you do if they come knocking on the door and say, \"Excuse me. May I have some water?\""
10000030-20 = "A gangster with a sense of justice would never ignore someone in need!#nI would help them!"
10000030-21 = "No! Wrong answer!"
10000030-22 = "*sigh* What am I going to do with you?"
10000030-23 = "Maybe I shouldn't leave the store like this..."
10000030-24 = "You worry too much, President! I've got this!"
10000030-26 = "Shizuko and I left Momoyodou and arrived at an impressive-looking building."
10000030-27 = "This is one of the most important sites at Allied Hyakkiyako Academy. "
10000030-28 = "The Yin-Yang Club should be inside."
10000030-29 = "Ugh... My stomach is always in knots when I come here."
10000030-30 = "[s] \"Why?\""
10000030-31 = "Well...the Yin-Yang Club isn't very cooperative, and they rarely agree to help."
10000030-32 = "Truth be told, this request would be better for Hyakkaryouran..."
10000030-33 = "The Yin-Yang Club claims that they exist to keep the balance at Hyakkiyako..."
10000030-34 = "...so there's no guarantee they'll cooperate. They'll smirk and say, \"We don't have the authority.\""
10000030-35 = "Or at least that's what their smug president always says!"
10000030-36 = "Not to mention, they have a rule about official matters always needing to be addressed in writing first."
10000030-37 = "Give me a break! Who has time for that when the festival is underway?!"
10000030-38 = "My old nemesis: red tape! Always with the red tape!"
10000030-40 = "Haha. But that's enough complaining for now."
10000030-41 = "We have our ways of getting them to cooperate. And this time, we have you and Schale on our side, Sensei. "
10000030-42 = "The Yin-Yang Club president will have to listen to us so long as you're here."
10000030-43 = "This time, I'll have the upper hand on that smug little piece of work.#nHeh heh heh..."
10000030-44 = "U-Uh, I mean... I sure hope she'll hear us out! T-Teeheehee..."
10000030-45 = "[s] \"You're trying to keep up appearances even now?\""
10000030-46 = "F-Forget you heard that! Let's just get inside!"
10000030-49 = "Welcome, Sensei. We were waiting for you."
10000030-50 = "Hey, Chise... Wait. Did you just say you knew Sensei was coming?"
10000030-51 = "How did you know that?"
10000030-52 = "Niya told me."
10000030-53 = "And now here you both are."
10000030-54 = "The cute sensei..."
10000030-55 = "...and the raccoon."
10000030-56 = "Wha...?! Who are you calling a raccoon?!"
10000030-58 = "Where's that know-it-all president of yours anyway?"
10000030-59 = "The president?"
10000030-60 = "She..."
10000030-61 = "Hmm..."
10000030-62 = "I think a black cat would make for a much better pet, personally."
10000030-63 = "No one asked you for pet suggestions! "
10000030-64 = "Wait... Are you implying I'm some kind of pet raccoon?!"
10000030-66 = "Anyway... The whole reason Sensei and I came here was to meet with her."
10000030-67 = "So? Where is she, Chise?"
10000030-68 = "The president?"
10000030-69 = "She's out-of-office..."
10000030-70 = "...for the rest of the day."
10000030-71 = "She should be back tomorrow."
10000030-72 = "For the rest of the day? But it's still early. What for?"
10000030-73 = "...? *tilts head*"
10000030-74 = "To see...a cat?"
10000030-75 = "Why did you phrase that like a question? Someone tell me what's going on!"
10000030-76 = "It figures that annoying president isn't here when we need her most..."
10000030-77 = "[s] Explain to Chise why you came."
10000030-78 = "Yeah, I know all about the incident at the festival."
10000030-79 = "You do?!"
10000030-80 = "The president said we can't help directly..."
10000030-81 = "...but the Inner Discipline Club may be able to."
10000030-82 = "The Inner Discipline Club?"
10000030-83 = "There's been a similar claim from the Inner Discipline Club about the commotion at the festival. The president's stance is basically..."
10000030-84 = "...if one group can't get it done, why don't they try working together?"
10000030-85 = "[s] \"There must be clubs with similar concerns.\""
10000030-86 = "Are you saying the Inner Discipline Club...is also looking for help?"
10000030-87 = "Okay, say no more. Let's go pay them a visit."
10000030-88 = "Please get ahold of me if your president returns, Chise."
10000030-89 = "Come on, Sensei! Let's go!"
10000030-92 = "Yep. Catch you later..."
10000030-94 = "So, the Inner Discipline Club. They're kind of... How do I put this?"
10000030-95 = "Their members are known to be kinda weird."
10000030-96 = "[s1] \"YOU think they're weird?\"\n[s2] \"Weirder than you?\""
10000030-97 = "What are you trying to say? That I'm...?"
10000030-98 = "You think I'm weird?! I am NOT weird, Sensei!"
10000030-99 = "How could you call Momoyodou's very own idol, Kawawa Shizuko, a weirdo? "
10000030-100 = "AN-Y-WAY!"
10000030-101 = "The Inner Discipline Club does all sorts of training to better themselves."
10000030-102 = "For example, they do jigsaw puzzles in their sleep to improve their sleep cycles."
10000030-103 = "[s] \"They do what?\""
10000030-104 = "They even take out thugs to improve their street cred."
10000030-105 = "[s] \"Come again?\""
10000030-106 = "The best of them can even read minds!"
10000030-107 = "[s] \"Is this a joke? I feel like I'm being pranked right now.\""
10000030-108 = "It's NO joke. Well, according to the stories, anyway.#nYou'll see for yourself soon enough."
10000030-109 = "Still, I'm not convinced they're going to help us."
10000030-110 = "Oh, sorry... I should stop thinking so negatively!"
10000030-111 = "We won't know until we try!"
10000030-112 = "Let's go see the Inner Discipline Club!"
10000030-115 = "*cough* *cough* Wh-What was that?!"
10000030-117 = "Hahahaha! The Mouryo are back to ruin the festival!"
10000030-118 = "This time, we're gonna tear down everything!"
10000030-120 = "Shoot! It's them again!"
10000030-121 = "Bring it on! We're ready to fight anytime, anywhere!"

[translation]
10000030-1 = "ตอนที่ 3;หญิงสาวแห่งชมรมหยินหยาง"
10000030-2 = "รีบเคลื่อนไหวก่อนจะสายกว่านี้เถอะค่ะคุณครู!"
10000030-3 = "ถ้ามีเรื่องวุ่นวายเกิดขึ้นในเฮียกคิยาโคแบบที่เกิดในครั้งนี้ล่ะก็..."
10000030-4 = "เรามีสองที่ที่สามารถไปขอความช่วยเหลือได้ค่ะ"
10000030-5 = "ที่แรกก็คือ <ชมรมหยินหยาง> ที่เรียกได้ว่าเป็นสภานักเรียนของสหพันธ์เฮียกคิยาโค"
10000030-6 = "และอีกที่ก็คือ <คณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรัน>"
10000030-7 = "ได้ยินมาว่าตอนนี้พวกเฮียกกะเรียวรันไม่อยู่นะคะ!"
10000030-8 = "ถ้าพวกเฮียกกะเรียวรันไม่อยู่ตามที่พีน่าบอกละก็..."
10000030-9 = "วันนี้เราอาจจะทำได้แค่ไปขอความช่วยเหลือจากชมรมหยินหยาง... อาจจะนะ..."
10000030-10 = "[s] \"อาจจะเหรอ?\""
10000030-11 = "อืม... พอดีว่า..."
10000030-12 = "เอาเป็นว่าไปดูให้เห็นกับตาเองน่าจะดีกว่าค่ะ!"
10000030-13 = "เอาล่ะ ไปกันเถอะค่ะคุณครู!"
10000030-14 = "แล้วก็พีน่า ระหว่างที่ฉันไม่อยู่ เธอต้องคอยตรวจตราดูว่ามีเหตุการณ์อะไรเกิดขึ้น#nในร้านเฮียกคิยาโคหรือไม่ เข้าใจไหม?"
10000030-15 = "เข้าใจแล้วค่ะ! ฉันจะจดจำใส่หัวใจของอัศวินไว้เลยค่ะ!"
10000030-16 = "จ้ะ... งั้นฉันจะถามอะไรหน่อย"
10000030-17 = "ค่ะ! ตื่นเต้นจัง!"
10000030-18 = "สมมติว่าพวกปีศาจแห่เข้ามาอีกในระหว่างที่ฉันและคุณครูไม่อยู่"
10000030-19 = "แล้วมาเคาะประตูร้านเฮียกคิยาโคแล้วบอกว่า \"คอแห้งจังเลย ขอน้ำกินหน่อยสิ\" เธอจะทำยังไง?"
10000030-20 = "ถ้าคนอื่นกำลังลำบาก เราต้องช่วยเหลือ! นี่คือหัวใจของอัศวินค่ะ!"
10000030-21 = "ทำแบบนี้ไม่ได้สิ!"
10000030-22 = "เฮ้อ... เชื่อเขาเลย..."
10000030-23 = "ฉันไว้ใจเธอได้ใช่ไหม?"
10000030-24 = "ได้สิคะหัวหน้า! วางใจพีน่าคนนี้ได้เลย!"
10000030-26 = "(มาถึงอาคารขนาดใหญ่ที่สง่างาม)"
10000030-27 = "นี่คือหนึ่งในสถานที่สำคัญของสหพันธ์เฮียกคิยาโค..."
10000030-28 = "ห้องชมรมหยินหยางอยู่ในอาคารนี้แหละค่ะ"
10000030-29 = "อึ้ก... มาที่นี่ทีไรเป็นต้องเจ็บใจทุกทีเลยค่ะ"
10000030-30 = "[s] \"ทำไมเหรอ?\""
10000030-31 = "ก็แบบว่า... พวกเขาไม่ค่อยออกไปไหน ถ้าเป็นเรื่องที่ไม่ใหญ่โตก็จะไม่ค่อยออกมาช่วยน่ะค่ะ"
10000030-32 = "เดิมทีเรื่องแบบนี้ต้องให้พวกเฮียกกะเรียวรันช่วย..."
10000030-33 = "เพราะชมรมหยินหยางบอกว่าตัวเองเป็นผู้ที่รักษาสมดุลของเฮียกคิยาโคตามชื่อของชมรม"
10000030-34 = "ไม่ว่าจะเกิดอะไรขึ้น พวกเขาก็เอาแต่ทำตัวเป็นกลาง แถมยังยิ้มแล้วบอกว่า#n\"พวกเราไม่มีสิทธิ์ทำอะไรหรอก~\""
10000030-35 = "โดยเฉพาะหัวหน้าชมรมที่เอาแต่ยิ้มหวานอยู่ทุกวัน!"
10000030-36 = "แถมถ้ามีเรื่องอะไรต้องติดต่อ ก็จะชอบบอกว่า \"ถ้าเป็นเรื่องสำคัญก็ส่งเอกสารมานะคะ\""
10000030-37 = "เทศกาลอยู่ตรงหน้าอยู่แล้ว จะให้เอาเวลาที่ไหนไปเขียนเอกสารมากันล่ะ!"
10000030-38 = "นี่ใช่ไหมคะที่เรียกว่าระบบราชการ? ข้อเสียของระบบราชการใช่ไหมคะ?!"
10000030-40 = "....ฮุฮุ แต่ก็คงทำได้ถึงแค่วันนี้แหละค่ะ"
10000030-41 = "ถ้าพวกเขาจะเล่นแบบนั้น เราก็มีวิธีรับมือของเราเหมือนกัน เพราะเรามีคุณครูจากชาเล่ต์อยู่ด้วยนี่คะ"
10000030-42 = "มีคุณครูอยู่กับเราทั้งคน หัวหน้าชมรมหยินหยางเองก็คงไม่กล้าปฏิเสธที่จะให้ความร่วมมือ#nกับเราหรอกค่ะ"
10000030-43 = "ฉันจะทำให้คนหัวสูงแบบนั้นยอมทำตามพวกเรา... ซะทีไหนล่ะคะ ล้อเล่นค่ะ"
10000030-44 = ".......แหะๆ"
10000030-45 = "[s] \"แต่ครูเชื่อไปแล้วนะ\""
10000030-46 = "ชะ.. ช่างเถอะ รีบเข้าไปกันเถอะค่ะ!"
10000030-49 = "เข้ามาสิคุณครู กำลังรออยู่เลย"
10000030-50 = "ชิเซะ... นี่เธอกำลังรอคุณครูอยู่งั้นเหรอ?"
10000030-51 = "รู้อยู่แล้วเหรอว่าพวกเราจะมาหาน่ะ?"
10000030-52 = "อื้ม หัวหน้าบอกไว้น่ะ"
10000030-53 = "มากันสองคนสินะ"
10000030-54 = "คุณครูที่น่ารัก"
10000030-55 = "กับคุณแรคคูน"
10000030-56 = "อึ้ก…! ใครเป็นแรคคูนกันล่ะ?!"
10000030-58 = "ฮึ่ม..... แล้วคุณหัวหน้าที่บอกว่ารู้ทุกเรื่องนี่ไปอยู่ไหนกันล่ะ?"
10000030-59 = "หัวหน้า..."
10000030-60 = "อ่อ..."
10000030-61 = "อืม..."
10000030-62 = "หัวหน้าชอบเลี้ยงแมวสีดำน่ะ"
10000030-63 = "ไม่ได้ถามสักหน่อยว่าชอบเลี้ยงสัตว์อะไร!"
10000030-64 = "...เดี๋ยวนะ ที่บอกว่าเป็นแรคคูนก็หมายถึงสัตว์เลี้ยงเหรอ?!"
10000030-66 = "ช่างเถอะ... วันนี้ฉันกับคุณครูมาที่นี่เพื่อพบหัวหน้า"
10000030-67 = "หัวหน้าของเธออยู่ไหนล่ะชิเซะ?"
10000030-68 = "หัวหน้าเขา..."
10000030-69 = "วันนี้เขา..."
10000030-70 = "กลับไปแล้วน่ะ"
10000030-71 = "ไว้มาพรุ่งนี้นะ"
10000030-72 = "ว่าไงนะ? ไม่อยู่งั้นเหรอ? แต่ยังกลางวันอยู่เลยนะ! รีบกลับไปทำอะไรล่ะ?"
10000030-73 = "......? (เอียงคอ)"
10000030-74 = "กลับไป... เลี้ยงแมว... รึเปล่านะ?"
10000030-75 = "อะไรของเธอเนี่ย? ถามอะไรไม่ได้คำตอบที่เป็นประโยชน์เลย!"
10000030-76 = "หายหัวไปไหนในช่วงเวลาที่สำคัญๆ แบบนี้นะ... เชื่อเขาเลย!"
10000030-77 = "[s] อธิบายกับชิเซะไปว่ามาหาทำไม"
10000030-78 = "อื้ม ฉันรู้อยู่แล้วล่ะว่ามาหาเพราะเทศกาลวุ่นวาย"
10000030-79 = "หา?!"
10000030-80 = "แล้วหัวหน้าก็บอกไว้ด้วยว่า เราช่วยอะไรโดยตรงไม่ได้"
10000030-81 = "ให้ไปที่ชมรมฝึกฝนแทน"
10000030-82 = "....ชมรมฝึกฝน?"
10000030-83 = "ชมรมฝึกฝนก็ยื่นเรื่องเข้ามาเหมือนกัน บอกว่าหนวกหูกับความวุ่นวายบนท้องถนนมาก หัวหน้าก็เลย..."
10000030-84 = "บอกว่าถ้ากลุ่มเดียวแก้ปัญหาไม่ได้ ก็ให้ไปร่วมมือกันแล้วช่วยกันเอง"
10000030-85 = "[s] \"มีชมรมที่เจอเรื่องคล้ายๆ กันมาด้วยสินะ\""
10000030-86 = "อึ่ก... แต่พวก... ชมรมฝึกฝน"
10000030-87 = "ก็ได้ ไหนๆ ก็เจอปัญหาคล้ายๆ กัน ฉันคงต้องลองไปชมรมฝึกฝนดู"
10000030-88 = "แต่ถ้าหัวหน้าเธอกลับมาก็ติดต่อมาหน่อยนะชิเซะ"
10000030-89 = "เอาล่ะ ไปเถอะค่ะคุณครู!"
10000030-92 = "ค่ะ ไปดีมาดีนะคะ~"
10000030-94 = "อืม... ชมรมฝึกฝน... ชมรมฝึกฝน..."
10000030-95 = "พวกนักเรียนในชมรมฝึกฝน... ออกจะประหลาดๆ อยู่สักหน่อยน่ะค่ะ..."
10000030-96 = "[s1] \"อย่างนั้นเหรอ?\"\n[s2] \"ประหลาดเท่าชิซุโกะไหม?\""
10000030-97 = "ก็ใช่น่ะสิคะ"
10000030-98 = "ว่าฉันเป็นคนประหลาดเหรอคะ! พะ.. พะ... พะ... พูดอะไรของคุณครูเนี่ย! คุณครูนี่นะ!"
10000030-99 = "ฉันคือชิซุโกะ~ ไอดอลสาวประจำร้านเฮียกคิยาโคต่างหากล่ะ~!"
10000030-100 = "กลับเข้าเรื่องเถอะค่ะ!"
10000030-101 = "ชมรมฝึกฝนคือชมรมที่บอกว่าตัวเองทำกิจกรรมต่างๆ ก็เพื่อการฝึกฝน"
10000030-102 = "อย่างเช่น ต่อจิกซอว์ในระหว่างนอนเพื่อจะได้นอนอย่างสุขภาพดี..."
10000030-103 = "[s] \".....หือ?\""
10000030-104 = "ไม่ก็ไปปราบพวกอันธพาลข้างถนนเพราะบอกว่าอยากเป็นเลดี้ที่เพียบพร้อม"
10000030-105 = "[s] \"...หืม?\""
10000030-106 = "เห็นว่ามีสมาชิกบางคนใช้ทักษะอ่านใจคนเพื่อเป็นกุลสตรีที่เพียบพร้อมด้วยนะคะ!"
10000030-107 = "[s] \".......??\""
10000030-108 = "แต่มันก็แค่ข่าวลือน่ะค่ะ ถ้าอยากรู้ความจริงน่าจะต้องไปสืบมาเอง"
10000030-109 = "แบบนั้นเราจะไปขอความช่วยเหลือจากพวกคนประหลาดแบบนั้นได้ไหมนะ?"
10000030-110 = "อืม... ไม่ดีกว่า เลิกคิดในแง่ลบ!"
10000030-111 = "เรื่องแบบนี้ถ้าไม่ลองดูด้วยตัวเองก็ไม่รู้หรอก ว่าไหมคะ?"
10000030-112 = "เอาล่ะ! งั้นเรารีบไปที่ชมรมฝึกฝนกันดีกว่าค่ะ!"
10000030-115 = "แค่กๆๆ อะไรอีกเนี่ย?!"
10000030-117 = "หึหึหึหึ! ปีศาจมาพังงานเทศกาลแล้ว!"
10000030-118 = "ครั้งนี้จะขยี้ให้แหลกไปเลย!"
10000030-120 = "ฮึ่ม! พวกแกไม่เหน็ดเหนื่อยกันบ้างรึไง!"
10000030-121 = "ก็ได้! มีเท่าไหร่ก็เข้ามาเลย!"

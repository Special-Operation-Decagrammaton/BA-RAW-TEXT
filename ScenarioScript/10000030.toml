[translation]
10000030-1 = "第3話;陰陽部的電波少女"
10000030-2 = "事不宜遲，我們走吧老師！"
10000030-3 = "說到百鬼夜行發生麻煩時該尋求幫助的對象……"
10000030-4 = "會立刻想到的有兩個。"
10000030-5 = "其中一個是實際上可說是百鬼夜行聯合學園學生會的「陰陽部」。"
10000030-6 = "另一個則是名為「百花繚亂紛爭調停委員會」的社團，然而……"
10000030-7 = "聽說百花繚亂的所有人現在都不在！"
10000030-8 = "是的，就像菲娜所說的一樣，現在無法依賴他們。"
10000030-9 = "如今我們能尋求協助的對象是陰陽部，但……"
10000030-10 = "[s]「但……？」"
10000030-11 = "唔嗯，那個，該怎麼說呢……"
10000030-12 = "哎！直接去看看比較快！"
10000030-13 = "來，我們走吧！老師！"
10000030-14 = "啊，菲娜。#n我不在的時候，百夜堂就拜託你囉？"
10000030-15 = "當然沒問題！我會以任俠的精神守護這裡的！"
10000030-16 = "……那我問你。"
10000030-17 = "是！"
10000030-18 = "假設妖怪劇團在我和老師不在的時候過來了。"
10000030-19 = "要是那些傢伙說著「我們口好渴，能給杯水喝嗎？」，#n邊打算進入百夜堂的話……該怎麼做？"
10000030-20 = "幫助遇到困難的人！那樣才是任俠！"
10000030-21 = "都～說～了～！那樣不行！要把他們趕走才對！"
10000030-22 = "唉……真是的……"
10000030-23 = "……交給你沒問題吧？"
10000030-24 = "是，部長！交給菲娜吧！"
10000030-26 = "（抵達的地方是一座充滿韻味的建築）"
10000030-27 = "這裡是百鬼夜行聯合學園中相當的重要的地方之一…… "
10000030-28 = "在這前方的就是陰陽部的部室。"
10000030-29 = "唔……不管來幾次都讓人覺得胃痛……"
10000030-30 = "[s]「為什麼呢？」"
10000030-31 = "陰陽部可是出了名的懶散，就算拜託他們也很難讓他們採取行動。"
10000030-32 = "本來處理這種事的幾乎都是百花繚亂的人……"
10000030-33 = "該說陰陽部是部如其名嗎，他們自稱是維持百鬼夜行平衡的存在……"
10000030-34 = "然而實際上，就算發生狀況也只會笑嘻嘻地說「我們沒有權限～」之類的，#n擺出一副模稜兩可的態度……"
10000030-35 = "特別是那個部長！"
10000030-36 = "我們每次申訴的時候他都說「重要的案件請以書面形式提交」之類的……"
10000030-37 = "用書面就太慢了嘛！！！"
10000030-38 = "官僚體制？那就是官僚體制嗎！？為什麼動作那麼慢啊！！！#n等到案件通過不管結果好不好事情都已經結束了！！"
10000030-40 = "……呵呵，不過那也到今天為止了。"
10000030-41 = "既然他們擺出那種態度，那我也有我的對策。#n現在我們這邊可是有夏萊的老師在。"
10000030-42 = "只要老師在場，就算是那個懶惰的陰陽部部長也只能幫忙了吧。"
10000030-43 = "那個總是一臉從容的人也能任我擺布……呵呵呵……"
10000030-44 = "……啊！？#n……那個～靜子好擔心他們願不願意聽人家的話唷～"
10000030-45 = "[s]「……差不多可以不用演了哦？」"
10000030-46 = "總，總之我們趕快進去吧！"
10000030-49 = "歡迎你來，老師。我在等你哦。"
10000030-50 = "知世……呃，咦？#n你剛才說「在等你」？"
10000030-51 = "你已經知道我們會來了嗎？"
10000030-52 = "嗯，部長說過了。"
10000030-53 = "兩人到來"
10000030-54 = "可愛的大人與"
10000030-55 = "小狸貓同學"
10000030-56 = "誰，誰是狸貓啊！？"
10000030-58 = "咳哼……所以說，那位依然擺出「我全都知道」那種態度的部長在哪裡？"
10000030-59 = "部長他……"
10000030-60 = "那個……"
10000030-61 = "唔嗯……"
10000030-62 = "好像說過，要養就養黑貓。"
10000030-63 = "我又沒有問他喜歡什麼寵物！"
10000030-64 = "……剛才說的「狸貓」該不會也是在說寵物吧！？#n我又不是老師的寵物！！"
10000030-66 = "唉，總之……我今天不是來找你玩，是來找你們部長的。"
10000030-67 = "知世，部長在哪裡？"
10000030-68 = "部長……"
10000030-69 = "他今天已經"
10000030-70 = "放學回家去了"
10000030-71 = "明天再見"
10000030-72 = "……咦，放學？#n現在還是白天吧？怎麼回事？"
10000030-73 = "……"
10000030-74 = "……你覺得呢？"
10000030-75 = "誰知道呢……#n等一下，為什麼是你問我們啊！完全無法理解！？"
10000030-76 = "嗚嗚，居然偏偏在這麼重要的時候不在……"
10000030-77 = "[s] 說明來找知世的原因"
10000030-78 = "嗯，我知道。是有人打算妨礙櫻花祭的事，對吧？"
10000030-79 = "你知道啊！？"
10000030-80 = "部長說過，雖然沒辦法直接幫忙──"
10000030-81 = "不過去修行部應該會有辦法才對。"
10000030-82 = "……修行部？"
10000030-83 = "修行部也有來投訴，說街上很吵。#n於是部長說……"
10000030-84 = "「一個人辦不到的話，兩個人合力不就行了嗎？」……這樣。"
10000030-85 = "[s]「意思是說其他社團也有相同的煩惱囉？」"
10000030-86 = "嗚，修行部啊……"
10000030-87 = "沒辦法，這次也只好去修行部……"
10000030-88 = "知世，如果之後部長回來的話，可以連絡我一下嗎？"
10000030-89 = "老師，我們走吧！"
10000030-92 = "路上小心～"
10000030-94 = "話說修行部，修行部啊……"
10000030-95 = "聽說修行部的學生幾乎都是怪人……"
10000030-96 = "[s1]「是嗎？」\n[s2]「像靜子一樣？」"
10000030-97 = "那當然……"
10000030-98 = "呃，哈啊！？不對……討厭啦老師～你在說什麼呢～？"
10000030-99 = "靜子才不是怪人～是百夜堂最可愛最可愛的看板娘唷☆"
10000030-100 = "……總之！"
10000030-101 = "修行部是個嘴上總是說為了修行，做著一些莫名其妙活動的社團。"
10000030-102 = "比如說有一邊睡覺一邊拼拼圖，說是修行的一環的人。"
10000030-103 = "[s]「……嗯？」"
10000030-104 = "說要成為出色的淑女，卻莫名制伏了街上的混混們的人。"
10000030-105 = "[s]「咦……？」"
10000030-106 = "還有說是大和撫子的興趣，能夠使用讀心術的部員。"
10000030-107 = "[s]「……？？？」"
10000030-108 = "不過我也只聽過傳聞，真正的情況得要親自確認才知道。"
10000030-109 = "話又說回來，那些怪人們真的幫得上忙嗎……"
10000030-110 = "唔嗯……算了，負面思考到此為止！"
10000030-111 = "這種事就是要實際試過才會知道！"
10000030-112 = "好！我們趕快去修行部吧！"
10000030-115 = "咳咳，咳咳……這，這次又怎麼了！？"
10000030-117 = "哼哈哈！這次一定要把櫻花祭搞砸，妖怪劇團登場啦！"
10000030-118 = "這次一定要擊潰你們！"
10000030-120 = "又～是妖怪劇團！還學不乖啊！"
10000030-121 = "既然如此我就奉陪到底！"

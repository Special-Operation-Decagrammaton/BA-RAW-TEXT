90100112-18 = "1;가짜 총학생회장;08;근본적으로 키보토스가 혼란에 빠진 것에는 제 책임도 있지만…… 당신의 행동은 총학생회를 완전히 무너트릴 뻔 했습니다."
90100112-19 = "1;가짜 총학생회장;07;그렇기에 재판을 진행하기 전에 앞서 당신의 증언을 들어보고 싶었습니다."
90100112-20 = "3;가짜 총학생회장;05;카야, 어째서 당신은 총학생회장의 자리를 노린 건가요?\n#1;hide\n#3;closeup"

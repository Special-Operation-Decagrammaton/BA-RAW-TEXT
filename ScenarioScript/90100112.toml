90100112-36 = "3;카야 죄수복;20;저의 [ruby=초인]총학생회장[/ruby]은…… 그렇게 생기지 않았다고요!\n#fontsize;60\n#3;closeup\n#3;hophop\n#3;em;[스팀]"

90100112-40 = "3;카야 죄수복;20;물론 당신도 제법 기품이 있긴 하지만, 전혀 다르다고요!"
90100112-41 = "3;카야 죄수복;08;진짜 총학생회장은 좀 더 우아하고, 사람들이 다가가기 쉬운…… 가끔은 그래서 오히려 얼빠진 느낌조차 들지만, 그 점까지 완벽한—\n#3;stiff"
90100112-42 = "1;교정국 간수;08;이 녀석, 총학생회장님께 그게 무슨 말버릇이냐!\n#1;ar\n#3;m4\n#1;em;[!]"
90100112-43 = "4;카야 죄수복;18;당신도 이 가짜에게 매수당한 건가요? 누가 봐도 총학생회장과 다르게 생겼잖아!\n#3;hide\n#1;dl\n#4;m3\n#4;hophop"

[translation]
90100112-3 = "連邦生徒会長執務室"
90100112-5 = "囚人番号1192番をお連れしました。"
90100112-6 = "どうぞ、お入りください。"
90100112-13 = "お久しぶりですね、防衛室長。"
90100112-14 = "いえ……[ruby=しらぬい]不知火[/ruby]カヤ。"
90100112-15 = "あなたは……。"
90100112-16 = "私が不在だった間のことは、すべて報告を受けました。"
90100112-17 = "[ruby=なながみ]七神[/ruby]リン代行が失脚した隙を突いて、クーデターを試みたそうですね。"
90100112-18 = "キヴォトスが混乱に陥ったそもそもの原因は私にあります。#nとはいえ、あなたの行動は連邦生徒会を崩壊させかねないものでした。"
90100112-19 = "だからこそ裁判に先立って、あなたの証言を聞いておきたいのです。"
90100112-20 = "何故あなたは連邦生徒会長の座を狙ったのですか？"
90100112-24 = "………。"
90100112-25 = "いや、あなた……誰なんですか？"
90100112-26 = "……はい？"
90100112-27 = "私が……分からないのですか？"
90100112-28 = "分かるも何も、初対面ですよね？"
90100112-29 = "そんなことより、どうして連邦生徒会長の服を着てるんです？#nまさか、あなたもクーデターを――"
90100112-33 = "では、改めて自己紹介をさせてください。"
90100112-34 = "私は学園都市キヴォトスを管理する連邦生徒会の長――"
90100112-35 = "何を言ってるんですか！？"
90100112-36 = "私[ruby=連邦生徒会長]の超人は[/ruby]こんなのじゃない！！"
90100112-40 = "あなたにだって[ruby=・]そ[/ruby][ruby=・]れ[/ruby][ruby=・]な[/ruby][ruby=・]り[/ruby][ruby=・]の[/ruby][ruby=・]品[/ruby]はありますけど、比べるべくもありません！"
90100112-41 = "本物の連邦生徒会長はもっと優雅で、なのに親しみがあって……#nたまに抜けて見えることもあるけど、それも含めて完璧な――"
90100112-42 = "お前！連邦生徒会長に向かって何て口のきき方だ！"
90100112-43 = "あなたもこの偽物に買収されたんですか？#n何もかもが違うじゃないですか！！"
90100112-44 = "本物が戻ってきたら、あなたも、シャーレの先生も、リンも、みんなただじゃ――"
90100112-51 = "ぐえっ！"
90100112-52 = "申し訳ありません。長い収監生活で頭がおかしくなったようです。"
90100112-53 = "……いえ。カヤさんとの面談は日を改めましょう。"
90100112-59 = "次こそ失敗しないんだからぁぁぁぁ――！"
90100112-64 = "……私の印象、そんなに変わったんでしょうか。"
90100112-66 = "ロア追跡編;To be Continued in Chapter 2"

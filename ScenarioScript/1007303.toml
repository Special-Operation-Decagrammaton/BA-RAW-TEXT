[translation]
1007303-1 = "森林裡的小咖啡廳"
1007303-3 = "（前往憂說的「好地方」）"
1007303-7 = "[ns1]「……？？」\n[ns2]「應該是這附近沒錯啊……」"
1007303-12 = "啊，老師。你來了呀。"
1007303-16 = "請往這邊。"
1007303-20 = "[ns] 前往聲音傳來的方向"
1007303-23 = "― [log=우이 수영복ND]怎，怎麼樣呢……？[/log][wa:2390] "
1007303-25 = "― [log=우이 수영복ND]我的祕密基地……[/log][wa:1590] "
1007303-28 = "― [log=우이 수영복ND]氣氛，還挺不錯的對吧？嘻嘻……[/log][wa:5090] "
1007303-31 = "[ns3]「是憂自己打造的嗎？」\n[ns4]「真厲害，就像咖啡廳一樣。」"
1007303-32 = "― [log=우이 수영복ND]老師要不要也進來看看？[/log][wa:2960] "
1007303-33 = "― [log=우이 수영복ND]老師要不要也進來看看？[/log][wa:2860] "
1007303-35 = "― [log=우이 수영복ND]意外的很舒適哦。[/log][wa:1390] "
1007303-38 = "― [log=우이 수영복ND]啊……兩個人一起進來，[/log][wa:1460] "
1007303-40 = "― [log=우이 수영복ND]會不會有點擠呢……[/log][wa:1590] "
1007303-43 = "― [log=우이 수영복ND]……咦？用看的就夠了……？[/log][wa:4440] "
1007303-46 = "― [log=우이 수영복ND]……那樣的話，請老師過來的意義就……[/log][wa:3150] "
1007303-49 = "― [log=우이 수영복ND]……不過，這樣真不錯呢。[/log][wa:8400] "
1007303-52 = "― [log=우이 수영복ND]外面……[/log]"
1007303-54 = "― [log=우이 수영복ND]或許未必都是壞事也說不定。[/log][wa:2910] "
1007303-57 = "― [log=우이 수영복ND]……那個，老師……[/log][wa:2860] "
1007303-60 = "― [log=우이 수영복ND]如果，不介意的話……[/log][wa:1480] "
1007303-63 = "― [log=우이 수영복ND]要不要……來一杯呀？[/log][wa:2070] "
1007303-67 = "來，請用，老師。"
1007303-68 = "在森林中喝的冰咖啡……"
1007303-69 = "因為這裡很涼的關係……冰塊不會馬上融化……"
1007303-70 = "唔……畢竟有帶冰桶來，這也是當然的。"
1007303-71 = "[s5] 接下憂遞過來的咖啡\n[s6]「謝謝，我正好覺得有點熱。」"
1007303-74 = "呵呵……"
1007303-75 = "……啊。"
1007303-76 = "以防萬一先說一下……要對其他人保密喔。"
1007303-77 = "因為這是我為了安靜獨處，好不容易才建成的祕密基地……"
1007303-78 = "咦……？#n你說你來這裡沒關係嗎？"
1007303-79 = "當然……因為是老師嘛……"
1007303-80 = "那，那個……就，就是……"
1007303-81 = "如果沒有人知道我在哪裡的話……#n可能……會讓其他人擔心……"
1007303-82 = "我只是想要有一點私人的時間，並不想造成大家多餘的麻煩……"
1007303-83 = "只，只要老師知道我在哪裡……其他人也不會再特地來找我了吧……"
1007303-87 = "……嗯……"
1007303-88 = "唔……其實，那些理由都無所謂……"
1007303-89 = "我只是……想讓老師知道……就是這樣而已……"
1007303-90 = "[s7]「就像有了專屬的咖啡廳一樣呢。」\n[s8]「遺跡的祕密咖啡廳……挺時尚的嘛！」"
1007303-93 = "嗯……我，我其實，沒有那個意思……"
1007303-94 = "唔嗯……咖啡廳……咖啡廳啊……"
1007303-95 = "……唔……"
1007303-96 = "說的也是，只要老師別帶其他人來就行了。"
1007303-97 = "……就是說啊，確實如此……而且也有咖啡……"
1007303-98 = "……咖啡廳啊。"
1007303-102 = "感覺……還挺不錯的。"
1007303-103 = "……呵呵。"
1007303-105 = "（之後和憂一起喝著冰咖啡，靜靜感受夏天……）"
1007303-109 = "（雖然可惜，還是在落日前返回了營地）"

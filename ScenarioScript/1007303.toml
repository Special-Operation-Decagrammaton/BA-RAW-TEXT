[translation]
1007303-1 = "คาเฟ่เล็กๆ ในป่าลึก"
1007303-3 = "(คุณครูไปที่ 'สถานที่เหมาะๆ' ตามที่อุยบอก)"
1007303-7 = "[ns1] \"...??\"\n[ns2] \"น่าจะอยู่แถวๆ นี้นี่นา...\""
1007303-12 = "อ๊ะ มาแล้วเหรอคะคุณครู"
1007303-16 = "ทางนี้ค่ะ ทางนี้..."
1007303-20 = "[ns] หันไปทางที่ได้ยินเสียงเรียก"
1007303-23 = "― [log=우이 수영복ND]ปะ...เป็นยังไงคะ...?[/log][wa:1950] "
1007303-25 = "― [log=우이 수영복ND]ที่ซ่อนตัวของฉัน...[/log][wa:1150] "
1007303-28 = "― [log=우이 수영복ND]บรรยากาศดีมากเลยใช่มั้ยล่ะคะ? ฮิฮิ...[/log][wa:4210] "
1007303-31 = "[ns3] \"อุยจัดเองหมดนี่เลยเหรอ?\"\n[ns4] \"สุดยอดเลย เหมือนคาเฟ่ย่อมๆ เลยนะ\""
1007303-32 = "― [log=우이 수영복ND]คุณครู...อยากลองเข้ามามั้ยคะ...?[/log][wa:2120] "
1007303-33 = "― [log=우이 수영복ND]คุณครู...อยากลองเข้ามามั้ยคะ...?[/log][wa:2020] "
1007303-35 = "― [log=우이 수영복ND]มันสบายกว่าที่คิดไว้เยอะเลย[/log][wa:630] "
1007303-38 = "― [log=우이 수영복ND]อ่า... แต่ถ้าเข้ามาสองคน[/log][wa:940] "
1007303-40 = "― [log=우이 수영복ND]มันจะแคบไปหน่อยรึเปล่านะ...[/log][wa:870] "
1007303-43 = "― [log=우이 수영복ND]...คะ? แค่ดูจากข้างนอกก็พอแล้ว...?[/log][wa:3600] "
1007303-46 = "― [log=우이 수영복ND]ถ้างั้น... ที่บอกให้คุณครูมาก็ไม่มีความหมายน่ะสิ...[/log][wa:1830] "
1007303-49 = "― [log=우이 수영복ND]แต่ยังไง... ที่แบบนี้... ก็รู้สึกดีจังเลยค่ะ[/log][wa:7120] "
1007303-52 = "― [log=우이 수영복ND]บางที... ข้างนอก...[/log]"
1007303-54 = "― [log=우이 수영복ND]ก็อาจจะไม่ได้มีแต่เรื่องแย่ๆ ก็ได้[/log][wa:2070] "
1007303-57 = "― [log=우이 수영복ND]...คือว่าคุณครู...[/log][wa:2500] "
1007303-60 = "― [log=우이 수영복ND]ถ้าคุณครูไม่ติดอะไรละก็...[/log][wa:840] "
1007303-63 = "― [log=우이 수영복ND]อยากลองดื่ม... สักแก้วมั้ยคะ?[/log][wa:1310] "
1007303-67 = "นะ...นี่ค่ะ เชิญเลยค่ะ คุณครู"
1007303-68 = "อเมริกาโน่เย็นที่ดื่มในป่า..."
1007303-69 = "ในถ้ำนี้ค่อนข้างเย็น... เพราะงั้นน้ำแข็งที่เตรียมมาก็เลยไม่ค่อยละลายค่ะ"
1007303-70 = "ก็นะ... พอดีฉันเอาถังน้ำแข็งมาด้วย ยังไงมันก็ต้องไม่ละลายอยู่แล้ว"
1007303-71 = "[s5] ดื่มกาแฟที่อุยชงให้\n[s6] \"ขอบใจนะ ข้างนอกนี่ร้อนสุดๆ เลย\""
1007303-74 = "ฮิฮิ..."
1007303-75 = "...อ่า"
1007303-76 = "ถึงคุณครูเองก็คงจะรู้อยู่แล้ว แต่ฉันอยากบอกคุณครูเอาไว้ก่อน เรื่องนี้... ช่วยเก็บเป็นความลับ อย่าบอกคนอื่นๆ นะคะ"
1007303-77 = "ฉันหาสถานที่เหมาะๆ และทำที่นี่ขึ้นมาเพราะไม่อยากให้มีใครมาหา..."
1007303-78 = "คะ...? แล้วคุณครูมาแบบนี้ โอเครึเปล่างั้นเหรอคะ?"
1007303-79 = "ก็... คุณครูนี่นา..."
1007303-80 = "คะ...คือว่า... คือว่าเรื่องนั้นมัน..."
1007303-81 = "ถ้าไม่มีใครรู้ว่าฉันอยู่ที่ไหนเลยละก็... แบบนั้นมัน... ก็อาจทำให้คนอื่นเป็นห่วง..."
1007303-82 = "ฉันแค่อยากแยกออกมาอยู่เงียบๆ ไม่ได้อยากเป็นภาระให้ใครหรอกนะคะ..."
1007303-83 = "ถ้าเป็นคุณครูละก็... ถึงจะรู้อะไรก็คงไม่ซักไซ้ถามเพิ่มหรอกใช่มั้ยล่ะคะ เพราะงั้น..."
1007303-87 = "...อืม..."
1007303-88 = "ก็นะ... คุณครูน่ะ...ไม่เป็นไรหรอกค่ะ"
1007303-89 = "ถ้าคุณครูมาก็... ไม่เป็นไรค่ะ ฮิฮิ..."
1007303-90 = "[s7] \"รู้สึกเหมือนมีคาเฟ่ส่วนตัวเลย\"\n[s8] \"คาเฟ่ลับในซากปรักหักพัง คูลสุดๆ!\""
1007303-93 = "เอ่อ... ฉะ...ฉันไม่ได้หมายถึงแบบนั้น แต่ว่า..."
1007303-94 = "อืม... คาเฟ่... คาเฟ่เหรอ..."
1007303-95 = "...ก็นะ..."
1007303-96 = "แบบนั้นอาจจะไม่เป็นไรก็ได้ ขอแค่คุณครูไม่พาคนอื่นมาก็พอค่ะ"
1007303-97 = "...นั่นสินะคะ ฉันพอคิดภาพออกค่ะ เพราะมีกาแฟอยู่ด้วยนี่นา..."
1007303-98 = "...คาเฟ่"
1007303-102 = "อื้ม... อาจจะไม่แย่...ก็ได้นะคะ"
1007303-103 = "ฮิฮิฮิ..."
1007303-105 = "(หลังจากนั้น คุณครูก็นั่งดื่มอเมริกาโน่เย็นกับอุยเพื่อคลายร้อน)"
1007303-109 = "(หลังจากใช้เวลาอยู่ที่นั่นพักใหญ่ คุณครูก็กลับไปที่แคมป์สำรวจ)"

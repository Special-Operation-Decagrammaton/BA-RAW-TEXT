[translation]
1007303-1 = "The Small Cafe in the Forest"
1007303-3 = "I came to the 'good place' that Ui mentioned."
1007303-7 = "[ns1] \"...?\"\n[ns2] \"I think I'm in the right place...\""
1007303-12 = "Oh, Sensei. You're here."
1007303-16 = "This way."
1007303-20 = "[ns] Look in the direction of the voice."
1007303-23 = "― [log=우이 수영복ND]Wh-What do you think...?[/log][wa:1790] "
1007303-25 = "― [log=우이 수영복ND]My little hideaway...[/log][wa:1070] "
1007303-28 = "― [log=우이 수영복ND]It's pretty nice, right? Heehee... [/log][wa:4290] "
1007303-31 = "[ns3] \"Did you make all this?\"\n[ns4] \"Amazing. It's a cafe.\""
1007303-32 = "― [log=우이 수영복ND]Would you like to come in, Sensei?[/log][wa:2040] "
1007303-33 = "― [log=우이 수영복ND]Would you like to come in, Sensei?[/log][wa:1940] "
1007303-35 = "― [log=우이 수영복ND]It's comfier than you'd think.[/log][wa:510] "
1007303-38 = "― [log=우이 수영복ND]Oh... I guess it might be too small[/log][wa:500] "
1007303-40 = "― [log=우이 수영복ND]for two people...[/log][wa:1270] "
1007303-43 = "― [log=우이 수영복ND]...What? You're happy just watching...?[/log][wa:3400] "
1007303-46 = "― [log=우이 수영복ND]...But that defeats the whole purpose of bringing you here...[/log][wa:1430] "
1007303-49 = "― [log=우이 수영복ND]...Still, this feels nice.[/log][wa:7840] "
1007303-52 = "― [log=우이 수영복ND]Maybe...[/log]"
1007303-54 = "― [log=우이 수영복ND]Not everything about the outdoors sucks.[/log][wa:1830] "
1007303-57 = "― [log=우이 수영복ND]...Um, Sensei...? [/log][wa:2500] "
1007303-60 = "― [log=우이 수영복ND]If you'd like...[/log][wa:1240] "
1007303-63 = "― [log=우이 수영복ND]Would you care...for a drink?[/log][wa:1310] "
1007303-67 = "H-Here you go, Sensei."
1007303-68 = "An iced Americano, from Ui's cafe..."
1007303-69 = "I brought some ice from camp. I'm surprised it's still frozen."
1007303-70 = "Well, I guess that's the point of the cooler. I don't get out much..."
1007303-71 = "[s5] Drink the coffee that Ui offered.\n[s6] \"Thanks. It's hot out here.\""
1007303-74 = "Heehee..."
1007303-75 = "...Oh."
1007303-76 = "This likely goes without saying, but please keep this place a secret."
1007303-77 = "It's the one place I can hide without anyone finding me..."
1007303-78 = "...Hm? Am I okay with you knowing?"
1007303-79 = "Well... You're you..."
1007303-80 = "A-And as a teacher...y-you should probably know..."
1007303-81 = "If my location is completely unknown...it could cause problems..."
1007303-82 = "I don't want to worry anyone. I just want to be alone sometimes."
1007303-83 = "I think... People will feel okay with leaving me alone, if they know you know."
1007303-87 = "Hmm..."
1007303-88 = "Well... I guess that's a bunch of excuses..."
1007303-89 = "I'm okay with you coming here, Sensei. Heehee."
1007303-90 = "[s7] \"It feels like I have my own exclusive cafe.\"\n[s8] \"A secret cafe, hidden away just for me!\""
1007303-93 = "Um... I suppose you could put it that way..."
1007303-94 = "Hmm... A cafe... Sensei's cafe..."
1007303-95 = "...Well..."
1007303-96 = "I can accept that. As long as it's just us."
1007303-97 = "...I can kind of see the vision. There is coffee here after all..."
1007303-98 = "...A cafe."
1007303-102 = "That...doesn't sound too bad to me."
1007303-103 = "Heehee."
1007303-105 = "Ui and I stayed at her cafe for a while longer, drinking ice cold americanos and enjoying the time we had left."
1007303-109 = "Once the sun started going down, I headed back to base camp first."

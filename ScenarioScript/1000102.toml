[translation]
1000102-1 = "#title;체온 조절"
1000102-2 = "#place;밀레니엄 교사 안"
1000102-3 = "#wait;2000"
1000102-4 = "3;에이미;06;후우…… 오늘 임무도 수고했어, 선생님.\n#3;em;[속상함]\n#3;stiff\n#3;a"
1000102-5 = "[s] \"에이미도 수고했어.\""
1000102-6 = "3;에이미;02;자, 그럼……"
1000102-7 = "3;에이미;01\n#3;d\n#wait;1000"
1000102-8 = "#all;hide\n#na;에이미가 갑작스럽게 옷깃을 끌어 내린다."
1000102-9 = "[s] \"뭐, 뭐하는 거야?!\""
1000102-10 = "3;에이미;02;으응? 옷을 벗고 있는데. 왜?\n#3;em;[?]\n#3;stiff\n#3;a"
1000102-11 = "3;에이미;01;왜 갑자기 옷을 벗냐니…… 그야, 더우니까?"
1000102-12 = "3;에이미;02;덥다고 함부로 옷을 벗으면 안 된다고? #n하지만 옷을 입은 상태라면 몸 안의 열이 빠져나가기가 어렵잖아?\n#3;em;[반응]"
1000102-13 = "3;에이미;01;몸 안의 열을 발산하기 위해서는 옷을 벗는 게 가장 효율적인 방법이야.\n#3;greeting"
1000102-14 = "[s] \"하지만 밖에서 함부로 옷을 벗는 건 부끄러운 일이야.\""
1000102-15 = "3;에이미;02;부끄러운 일……? #n부끄러우면 임무를 수행하는 데 뭔가 방해가 되는 건가?\n#3;em;[?]"
1000102-16 = "[s] \"그래도 옷을 벗는 건 안 돼.\""
1000102-17 = "3;에이미;01;그럼 옷을 벗지 않고 체온을 낮출 수 있는 방법이 뭐가 있을까."
1000102-18 = "3;에이미;99;으음…….\n#3;em;[...]"
1000102-19 = "[s] \"아이스크림을 먹는 건 어때?\""
1000102-20 = "3;에이미;02;아이스크림? 확실히 차가운 것을 먹으면 체온이 내려갈 테니…… #n몸을 식히는 데 도움이 되겠네.\n#3;em;[반응]"
1000102-21 = "[s] \"교외의 아이스크림 가게로 가자. 내가 하나 사 줄게.\""
1000102-22 = "3;에이미;03;좋아, 하지만 선생님 몫의 아이스크림은 내가 살게.\n#3;em;[반짝]"
1000102-23 = "3;에이미;02;어째서냐니…… 그 편이 더 <효율적> 이잖아?"
1000102-24 = "3;에이미;03;후후후…… 어서 가자, 선생님. #n땀이 식기 전에.\n#3;em;[음표]\n#3;greeting"
1000102-25 = "#all;hide"
1000102-26 = "#na;그 후, 에이미와 사이좋게 아이스크림을 나누어 먹었다."

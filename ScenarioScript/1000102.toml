[translation]
1000102-1 = "การปรับอุณหภูมิร่างกาย"
1000102-2 = "ด้านในอาคารเรียนหลัก มิลเลเนียม"
1000102-4 = "ฮู่ว... วันนี้งานก็ผ่านฉลุยอีกแล้วนะคะคุณครู"
1000102-5 = "[s] \"เอมิก็ทำได้ดีมากเลยนะ\""
1000102-6 = "งั้นตอนนี้..."
1000102-8 = "จู่ๆ เอมิก็ถอดเสื้อออก"
1000102-9 = "[s] \"ทะ...ทำอะไรน่ะ?!\""
1000102-10 = "หือ? ถอดเสื้อออกไงคะ ทำไมเหรอ?"
1000102-11 = "ฉันถอดเสื้อทำไมน่ะเหรอ.... ก็...มันร้อนอ่ะ"
1000102-12 = "เวลาร้อนๆ ฉันจะถอดเสื้อออกแบบนี้ไม่ได้งั้นเหรอ? แต่ว่าถ้าใส่เสื้ออยู่แบบนั้น ฉันจะหายร้อนได้ยังไงล่ะ?"
1000102-13 = "การถอดเสื้อออกเป็นวิธีคลายความร้อนที่อยู่ในร่างกายได้ดีที่สุดแล้วนะ"
1000102-14 = "[s] \"แต่ว่าการถอดเสื้อผ้าในที่สาธารณะแบบนี้มันน่าอายนะ\""
1000102-15 = "น่าอายเหรอ....? แค่เพราะมันน่าอายเลยทำให้ต้องหยุดการทำภารกิจงั้นเหรอ?"
1000102-16 = "[s] \"แต่ยังไงก็ถอดเสื้อออกแบบนี้ไม่ได้นะ\""
1000102-17 = "มีวิธีไหนที่จะคลายร้อนได้อีก นอกจากถอดเสื้อออกกันนะ..."
1000102-18 = "อืม...."
1000102-19 = "[s] \"งั้นเราไปกินไอศกรีมกันดีมั้ย?\""
1000102-20 = "ไอศกรีมเหรอ? ถ้ากินของเย็นๆ น่าจะช่วยลดอุณหภูมิร่างกายลงได้... คงช่วยให้หายร้อนได้สินะ"
1000102-21 = "[s] \"งั้นไปร้านไอศกรีมที่ด้านนอกโรงเรียนกันเถอะ เดี๋ยวครูเลี้ยงเอง\""
1000102-22 = "ก็ได้ แต่ว่าไอศกรีมของคุณครูเดี๋ยวฉันซื้อให้เองนะ"
1000102-23 = "ทำไมน่ะเหรอ?... แบบนี้มันก็ <สมเหตุสมผล> ดีไม่ใช่รึไง?"
1000102-24 = "ฮุฮุฮุ... รีบไปกันเถอะคุณครู ก่อนที่จะเหงื่อออกอีกรอบนะ"
1000102-26 = "หลังจากนั้นคุณครูก็ไปนั่งกินไอศกรีมกับเอมิอย่างเพลิดเพลิน"

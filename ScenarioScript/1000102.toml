[translation]
1000102-1 = "Temperature Control"
1000102-2 = "Inside a Millennium Building"
1000102-4 = "*sigh* Great job again, Sensei."
1000102-5 = "[s] \"Not too shabby yourself.\""
1000102-6 = "Now, then..."
1000102-8 = "Eimi suddenly started undressing."
1000102-9 = "[s] \"Wh-What are you doing?!\""
1000102-10 = "Hmm? I'm taking my clothes off. Why?"
1000102-11 = "Why am I taking them off...? Well, because it's hot."
1000102-12 = "I can't just take my clothes off because it's hot? How else am I suppose to cool off, then?"
1000102-13 = "The most efficient way to dissipate heat inside one's body is to undress."
1000102-14 = "[s] \"Aren't you embarrassed to take your clothes off in public?\""
1000102-15 = "Embarrassed...? Is embarrassment a valid reason to not successfully carry out a mission?"
1000102-16 = "[s] \"You still can't take your clothes off.\""
1000102-17 = "Then what would you suggest I do to cool down without undressing?"
1000102-18 = "Hmm..."
1000102-19 = "[s] \"How about eating ice cream?\""
1000102-20 = "Ice cream? Yes, ingesting something cold may work... That should prove an effective way of lowering my internal temperature."
1000102-21 = "[s] \"Let's go to an ice cream shop out in the suburbs. It'll be my treat.\""
1000102-22 = "Very well, on the condition that I buy you your ice cream."
1000102-23 = "Why...? Because that's the sensible thing to do."
1000102-24 = "Heehee... We should hurry, Sensei. Staying here will only make us overheat more."
1000102-26 = "Eimi and I then went out for ice cream."

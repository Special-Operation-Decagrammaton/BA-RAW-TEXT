[translation]
1000102-1 = "體溫調節"
1000102-2 = "千年．校舍內"
1000102-4 = "呼……今天的任務也辛苦你了，老師。"
1000102-5 = "[s] 「英美也辛苦了。」"
1000102-6 = "好，那麼……"
1000102-8 = "（英美突然開始脫衣服）"
1000102-9 = "[s] 「你，你在做什麼！？」"
1000102-10 = "唔？我正在脫衣服呀，怎麼了？"
1000102-11 = "你問我為什麼突然脫衣服……因為很熱？"
1000102-12 = "你說不能因為覺得熱就亂脫衣服？#n不過穿著衣服的話，身體不是就很難散熱嗎？"
1000102-13 = "脫衣服是讓身體散熱最有效率的方法。"
1000102-14 = "[s] 「但是，在戶外脫衣服不會很害羞嗎？」"
1000102-15 = "害羞……？#n害羞會影響任務的執行嗎？"
1000102-16 = "[s] 「總之，不能脫衣服。」"
1000102-17 = "那麼，還有什麼能在不脫衣服的情況下，讓體溫降下來的好方法呢。"
1000102-18 = "嗯……"
1000102-19 = "[s] 「吃冰淇淋如何？」"
1000102-20 = "冰淇淋？吃冰冰涼涼的東西確實能讓體溫降下來……#n或許是冷卻身體的好方法。"
1000102-21 = "[s] 「去校外的冰淇淋店吧。我請客。」"
1000102-22 = "好呀，但那樣的話，老師的冰淇淋就由我來付。"
1000102-23 = "你問我為什麼……這樣比較「有效率」，不是嗎？"
1000102-24 = "呵呵呵……我們快點走吧，老師。#n不然汗都要乾了。"
1000102-26 = "（在那之後，和英美一起開心的分享了冰淇淋）"

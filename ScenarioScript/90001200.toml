[translation]
90001200-1 = "第20話;前兆"
90001200-6 = "各位，如大家所見，我們又回到凍原地帶了。"
90001200-11 = "愛麗絲知道！是之前說有巨大變形怪獸的地方！"
90001200-12 = "沒錯沒錯，我也記得！這個題材真是太棒了！"
90001200-13 = "沒錯，桃井！怪獸、變身和機器人……！"
90001200-14 = "只要再加上跳躍就是神作了！絕對不會失敗！"
90001200-15 = "……我先問你一件事，桃井。#n你打算用那個題材寫什麼故事？"
90001200-16 = "這，這個我現在才要開始想……#n不過總而言之，就先讓世界滅亡再開始吧！"
90001200-17 = "嗯，駁回。"
90001200-22 = "為什麼～！？"
90001200-24 = "莉央大人。就跟您說的一樣，我發現鐵道的痕跡了。"
90001200-25 = "要先下去看看嗎？還是要從空中偵察？#n該怎麼做呢，老師？"
90001200-26 = "[s1]「有些東西從空中可能無法確認。」\n[s2]「小心地下去看看吧。」"
90001200-29 = "我明白了，老師。#n請您不必擔心。如果發生什麼事的話，我會保護老師的。"
90001200-30 = "[s]「嗯，季果然很可靠！」"
90001200-31 = "只是嘴上說說？"
90001200-32 = "那個，季？現在還在操控……"
90001200-33 = "沒辦法，現在就聽從莉央大人的指示吧。"
90001200-34 = "我將降低直升機的高度，請各位留意機身晃動。"
90001200-38 = "感覺……有點淒涼呢……"
90001200-39 = "那也很正常，畢竟這裡本來就空無一人。"
90001200-40 = "是啊。如果要打個比方的話，這裡就像是有人在被遺忘的土地上倉促建設的鐵道……"
90001200-41 = "在運送完資源之後又被廢棄了。"
90001200-43 = "鐵道的許多部份都中斷了呢。#n似乎是做了某些處理……使其無法再被人使用。"
90001200-44 = "不過路線的痕跡還在。"
90001200-45 = "可，可是這樣追蹤……該怎麼辦呢？#n要一直走下去的話有點……"
90001200-46 = "說的也是。接下來就用車輛來移動吧。#n運輸船可以用自動操控叫過來。"
90001200-53 = "就這麼辦吧。#n如果情況不妙再搭運輸船就行了。"
90001200-59 = "……於是所有人都過著幸福的生活。"
90001200-60 = "接，接下來呢？所以後來怎麼樣了？"
90001200-61 = "這個故事到這裡就結束了，Ain……"
90001200-62 = "怎麼這樣……"
90001200-63 = "哎呀，童話一般都是這樣的吧？#n雖然Ain聽到都快哭了，但結局通常早就注定了哦？"
90001200-64 = "可，可是……！"
90001200-66 = "咦？Soph不是也差點就哭出來了嗎？"
90001200-67 = "哪，哪有！？#n我只是，只是……！"
90001200-72 = "但是結局已定確實是顯而易見的事。#n所以才會希望，至少能是個圓滿的結局。"
90001200-73 = "沒，沒錯，耶嘿嘿。#n而且更讓我開心的是，那是姐姐大人的聲音……"
90001200-74 = "下一個故事是什麼，姐姐大人？#n下一個下一個！"
90001200-76 = "原來你們喜歡童話故事啊，Ain、Soph、Aur。"
90001200-77 = "嗯，嗯……！如果是姐姐大人唸給我們聽的話……就更喜歡了……！"
90001200-78 = "而且這也算是收集外面所謂的「現實」吧？"
90001200-79 = "雖然我其實沒什麼興趣。#n那些不就只是人類愚蠢的故事而已嗎？"
90001200-80 = "但是能用姐姐大人的聲音唸出來還是挺好的。"
90001200-82 = "接下來該說哪個故事好呢？#n要選勞動者階級的鶴對抗象徵邪惡資本家的狐狸，並成功革命的故事嗎？"
90001200-83 = "還是要選北風與太陽，為了脫下貧窮旅人的上衣而反覆採取壓迫與懷柔的政策，#n最後由旅人戰勝一切的故事？"
90001200-84 = "我，我覺得……"
90001200-89 = "咦，有警報？"
90001200-90 = "我來瞧瞧。#n哦哦……這是？"
90001200-91 = "什，什麼！？#n那個大人和調月莉央他們……又回到凍原地帶了……？"
90001200-92 = "這……"
90001200-93 = "哎呀哎呀，那應該就是他對Soph「宣戰」的回應吧。"
90001200-94 = "之所以回到凍原……嗯，應該是為了追蹤資源運輸鐵道的痕跡吧。"
90001200-95 = "他們居然能猜到正確答案啊？#n雖然只有一點點……但似乎出現了事情變麻煩的可能性。"
90001200-96 = "你怎麼說，Soph？#n我應該說過，像宣戰這種人類的玩笑不開也罷的吧？"
90001200-97 = "唔……"
90001200-98 = "算了，沒關係。反正也就只有這種時候能取笑Soph了。"
90001200-99 = "喂！？"
90001200-100 = "可，可是如果他們沿著那條路走的話，最後就會……"
90001200-101 = "不不不。所以我反而不擔心，Ain。"
90001200-102 = "嗯？啊……！"
90001200-103 = "沒錯，就是那樣。#n要往那裡去的話，必須突破的障礙可不只有一個兩個哦。"
90001200-104 = "不過對方的夥伴好像變多了呢。#n看來有必要確認一下？"
90001200-105 = "我，我來調查！#n哦哦……首先……是這個人！"
90001200-110 = "哼哼哼，讓我看看……名字是才羽桃井。#n屬性是亂七八糟的編劇，沒有其他特徵。不管怎麼看都是個無害的人。"
90001200-115 = "下一個是才羽綠。才羽桃井的雙胞胎妹妹。#n屬性是業餘插畫家，沒有其他特徵。看起來也一樣無害。"
90001200-120 = "最，最後是……花岡，柚子……？#n屬性是，軟體工程師耶……？看起來也是大致上無害的樣子……"
90001200-121 = "Ain、Soph、Aur。#n雖然只短暫出現了一下，但剛才好像捕捉到了其他兩個不同的信號。"
90001200-126 = "姐，姐姐大人！？姐姐大人不用在意這種事的……！"
90001200-127 = "對，對呀！這本來就是我們應該做的。#n等到需要姐姐大人出手的時候，情況應該已經完全不一樣了！"
90001200-128 = "但是我也想幫助Ain、Soph和Aur。"
90001200-130 = "姐姐想要幫助妹妹，這不是理所當然的嗎？"
90001200-134 = "啊，啊啊……"
90001200-135 = "好耀眼……好高貴……"
90001200-136 = "不過姐姐大人，其實這種突發信號是很常見的。#n應該只是短暫出現了一些雜訊而已。"
90001200-137 = "嗯，這種突發雜訊的原因，通常是從宇宙中飛來的介子造成的。"
90001200-138 = "理論上所有電路都可能會發生錯誤。#n這種現象被稱為[ruby=Single-Event Upset]單粒子反轉[/ruby]。"
90001200-139 = "所，所以在這種時候……希望姐姐大人能更相信我們一點！"
90001200-140 = "因為我們……是值得姐姐大人驕傲的妹妹們！"
90001200-142 = "……"
90001200-143 = "我明白了，那就拜託你們了。"
90001200-144 = "不過如果有我能幫忙的地方，請記得要告訴我。#n可以答應我嗎？"
90001200-145 = "好～！"
90001200-152 = "那麼……怎麼辦呢？"
90001200-153 = "唔，那個，該怎麼說……"
90001200-154 = "唔嗯，不如……"
90001200-155 = "就別管他們了吧？"
90001200-156 = "雖然總覺得你會八成這麼說，但你啊……"
90001200-157 = "與其貿然行動，導致我們的戰力出現折損……"
90001200-158 = "讓他們繼續浪費時間徘徊不是更安全嗎？"
90001200-159 = "目，目前我，我們的最大目標……是讓覺醒的涅察赫醬更穩定……！"
90001200-160 = "這倒是沒錯。我們必須進一步提升擴張的速度才行。#n這麼說來……他們浪費越多時間，對我們反而越有利吧。"
90001200-161 = "而且你們想想看，就算老師一行人能夠抵達「網格點」……"
90001200-162 = "只要他們無法突破「提法瑞特」，根本不可能進入鋼鐵大陸不是嗎？"
90001200-163 = "而，而且就算萬一提法醬被突破了……還有下一道屏障在等著他們……！"
90001200-164 = "說的也是。#n即使他們真的能突破那個守門人，這片鋼鐵大陸可是我們的大本營啊。"
90001200-165 = "他們絕對無法突破的！"
90001200-166 = "唔哇！？抱歉，Ain。我不是覺得真的會那樣才這麼說的。#n只是，該怎麼說呢，就是……"
90001200-167 = "我們總是得先設想到所有可能的情況，才能擬定應對計劃對吧？#n你想想，畢竟還有那個什麼……量子隧道之類的東西。"
90001200-168 = "對，對耶。對不起……我又……"
90001200-169 = "沒事沒事。"
90001200-170 = "總之大概就是這樣。#n就算在最壞的情況下，那些不可能發生的問題全部一起發生──"
90001200-171 = "我們也只要在鋼鐵大陸終結一切就行了。"
90001200-172 = "……對我們來說最重要的，是無論如何都絕不能讓姐姐大人出去。"
90001200-173 = "啊，啊啊……嗯……沒錯……"
90001200-174 = "沒錯，絕對不行……"
90001200-175 = "……！"
90001200-176 = "話說Aur，你要不要試著開個玩笑？"
90001200-177 = "你說我嗎？這可真稀奇。#nSoph居然會要我開個「玩笑」。"
90001200-178 = "因為我真的看到可能性了。#n你聽我說──"
90001200-184 = "──大概就是這樣，你覺得咧？"
90001200-185 = "哇，哇啊……"
90001200-186 = "……"
90001200-187 = "我知道了！#n哎呀～Soph你也真是的，怎麼知道我喜歡這個啊！"
90001200-188 = "我怎麼會不知道……所以呢，要動手了嗎？"
90001200-189 = "當然囉！要是老師一行人連這點程度都無法突破的話，也只能到此為止了吧？"
90001200-190 = "那，那個，這好像不是「這點程度」……就能表達的……"
90001200-192 = "那種事我才不管！"
90001200-193 = "是，是……"
90001200-194 = "我立刻開始準備。#n應該得花一點時間，你們等我一下吧！"
90001200-198 = "是是是，你加油。"
90001200-202 = "感覺已經移動很久了……究竟會連接到哪裡呢……"
90001200-203 = "[s]「給人的感覺就像是橫貫大陸的鐵道呢……」"
90001200-208 = "就是說啊。#n不知不覺天都黑了呢……該繼續追蹤嗎？"
90001200-209 = "考慮到危險程度和我們的情況，平時的我應該會建議暫時停止追蹤……"
90001200-210 = "大家，對不起。#n鋼鐵大陸就連現在也正不斷擴大，所以我們不能放慢速度。"
90001200-212 = "就跟強行軍沒兩樣呢。"
90001200-213 = "雖然那也不錯……不過莉央大人，前方的鐵道似乎中斷了。"
90001200-214 = "咦！？真的嗎？那怎麼辦？"
90001200-215 = "我們該不會迷路了吧？#n該怎麼辦才好……！"
90001200-216 = "……我還有一個壞消息。"
90001200-217 = "這，這是在開玩笑吧……？"
90001200-218 = "我也希望這只是個玩笑。"
90001200-219 = "從剛才開始，GPS也斷訊了……"
90001200-220 = "！？！？"
90001200-221 = "真的斷訊了……怎麼會突然這樣？#n明明是從我的個人衛星直接接收座標的啊……！？"
90001200-222 = "[s]「你居然有個人衛星！？從哪弄來的！？」"
90001200-223 = "……那並不重要。重點是我們現在可能真的迷路了──"
90001200-229 = "──！？！？#n大家快趴下，隨便找個東西抓緊！"
90001200-238 = "很好！順利進去了！"
90001200-239 = "成，成功了……！"
90001200-240 = "利用Ain的無聲無人機集中投射[ruby=能量]禁忌之力[/ruby]……很好。#n現在那整片區域已經完全被遮蔽能量場包圍了。"
90001200-241 = "就像遭到大規模的EMP攻擊一樣，任何電子裝置應該都無法使用了！"
90001200-242 = "謝謝你，Ain！我們總是欠你人情呢！"
90001200-243 = "沒，沒有啦……耶嘿嘿……#n因為我們的飛輪醬總是全力以赴……！"
90001200-244 = "這次的名字挺容易接受的耶……"
90001200-246 = "那邊的情況如何！？"
90001200-247 = "不行，會長……任何電路都沒有回應。"
90001200-248 = "我明明有確實做好EMP的遮蔽處理，怎麼會……？"
90001200-249 = "我的Abi-Eshuh現在也完全無法使用。#n要是在這種時候遭受襲擊的話……！"
90001200-250 = "那，那我們……會怎麼樣呢……？"
90001200-251 = "嗚嗚……"
90001200-253 = "老師……Kei……"
90001200-254 = "[s3]「大家先冷靜下來。」\n[s4]「如果太慌亂的話，本來能做到的事也會做不到的。」"
90001200-260 = "[ns] （話雖如此……究竟該怎麼辦呢？）"
90001200-261 = "唉，真是越來越過分了。"
90001200-262 = "K，Kei！？"
90001200-264 = "[ns]「Kei？」"
90001200-265 = "沒事的，王女……愛麗絲。不必擔心。"
90001200-266 = "我並不是隨便說說而已。#n我知道現在發生了什麼，也知道該如何應對。"
90001200-267 = "真，真的嗎？Kei！？"
90001200-268 = "愛麗絲……王女啊，請看著我的眼睛。#n沒錯，很好。這樣就行了。"
90001200-269 = "那麼接下來我會確實告訴那些「小鬼頭」……"
90001200-270 = "他們挑戰的對象究竟是誰……！"
90001200-278 = "下一話;最後的職責"

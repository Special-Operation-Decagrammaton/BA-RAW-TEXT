90001200-188 = "จะไม่รู้ได้ไงล่ะ... เอาเป็นว่า จะทำใช่มั้ย?"
90001200-189 = "แน่นอนสิคะ! ถ้าคณะสืบค้นของคุณครูคนนั้นผ่านการแกล้งแค่นี้มาไม่ได้ งั้นก็คงต้องยอมแพ้แค่นั้นค่ะ"

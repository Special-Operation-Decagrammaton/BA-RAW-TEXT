[translation]
90001200-1 = "Episode 20;Foreshadowing"
90001200-6 = "As you can see, everyone, we are now in the tundra region."
90001200-11 = "I remember that you told us about a giant transforming robot you encountered here!"
90001200-12 = "Right, right! I remember that too! This'll work for the plot!"
90001200-13 = "Yes, Momoi! Monster! Transformation! Robot!"
90001200-14 = "This is all we need to make a godly game! There's no way we'll fail!"
90001200-15 = "...Allow me to ask you this, Momoi. What kind of story are you trying to write with those elements?"
90001200-16 = "Th-That's something to start thinking about... For now, let's start with world destruction!"
90001200-17 = "Nope. Denied."
90001200-22 = "Why?!"
90001200-24 = "Ms. Rio, as you said, I've detected traces of the railroads."
90001200-25 = "Should we land and scout the area? Or would you prefer aerial surveillance, Sensei?"
90001200-26 = "[s1] \"We'll miss details from all the way up here.\"\n[s2] \"Let's make our way down, carefully.\""
90001200-29 = "Understood, Sensei. Don't worry. If anything happens, I will protect you."
90001200-30 = "[s] \"Okay. You're so trustworthy, Toki!\""
90001200-31 = "Do you plan on expressing that sentiment only verbally?"
90001200-32 = "Um, Toki? Since you're piloting at the moment..."
90001200-33 = "It can't be helped. I will follow Rio's orders for now."
90001200-34 = "I will decrease our altitude. Please buckle your seatbelts, and beware of turbulence."
90001200-38 = "It's so...desolate..."
90001200-39 = "That's natural. This area has never been inhabited."
90001200-40 = "Yes. And someone chose these forgotten lands to hurriedly construct railroads."
90001200-41 = "And once they had fulfilled their resource quota, they then quickly abandoned the facility."
90001200-43 = "The tracks appear to have been destroyed in various places. It seems intentional, an act to prevent them from being used again."
90001200-44 = "Yet remains of the tracks are still here."
90001200-45 = "B-But how should we approach...the tracking? Walking all the way would be a bit..."
90001200-46 = "She's right. Let's use a vehicle for now. I can bring the transport ship via autopilot. "
90001200-53 = "Let's do that. If anything goes wrong, we'll have the safety of the ship."
90001200-59 = "...And then they lived happily ever after."
90001200-60 = "A-And then? And? What happened after that?"
90001200-61 = "We have reached the conclusion of the story, Ein..."
90001200-62 = "How could that be...?"
90001200-63 = "I mean, that's just how fairy tales are, right? Even though Ein nearly cried in the middle, the ending is almost always predictable."
90001200-64 = "B-But...!"
90001200-66 = "Oh? Did you not also almost come to tears, Sof?"
90001200-67 = "Th-That's not true! I was just, so, uh...!"
90001200-72 = "However, it is true that the endings are of a predetermined nature. If that's how it must be, then a happy ending is the ideal!"
90001200-73 = "Th-That's right. Ehehe. Also, I-I liked that it was in Elder Sister's voice..."
90001200-74 = "What's the next story, Elder Sister? Next, next!"
90001200-76 = "It would appear you enjoy fairy tales, Ein, Sof, Ohr."
90001200-77 = "Y-Yes! I do! And I like it...even more...when you're reading them, Elder Sister!"
90001200-78 = "And it has the added utility of collecting data on the humans' \"reality,\" right?"
90001200-79 = "Eh, I see no particular intrigue in said \"utility.\" They are foolish stories from foolish humans."
90001200-80 = "However, I do quite enjoy hearing them in Elder Sister's voice."
90001200-82 = "Which one shall I read next? This story speaks of a working-class crane using its wits to wage revolution against the sly, capitalist fox."
90001200-83 = "Or perhaps this tale of the winds and sun conspiring to purloin a poor traveler's cloak? However, the traveler prevails through their many trials."
90001200-84 = "U-Um... I would like..."
90001200-89 = "The alarm?"
90001200-90 = "Let us see... Oh?"
90001200-91 = "Wh-What? That bad adult and Tsukatsuki Rio's group...returned to the tundra...?"
90001200-92 = "This is..."
90001200-93 = "Well, well, well. This is that. This appears to be their response to Sof's \"declaration of war.\""
90001200-94 = "And their reason for returning to the tundra... Aha. They intend to follow the remains of our transportation routes."
90001200-95 = "They approach the answer quickly, do they not? There's a chance, however miniscule, that things will take a troublesome turn."
90001200-96 = "How do you defend yourself here, Sof? This is precisely why I discouraged you from copying human pranks, like this \"declaration of war\" of yours."
90001200-97 = "U-Ugh..."
90001200-98 = "Worry not, worry not. After all, how else would I find the opportunity to belittle you?"
90001200-99 = "Hey!"
90001200-100 = "B-But if they continue following that route, then in the end..."
90001200-101 = "No, no, no. That is precisely why I'm not concerned, Ein."
90001200-102 = "Huh? Ah...!"
90001200-103 = "Yes. That's right. The path they follow is one riddled with obstacles."
90001200-104 = "It looks like they've recruited more people, though. It'd be worth it to evaluate the situation."
90001200-105 = "I-I'll do it! U-Umm... So... Let's start with this person!"
90001200-110 = "Hm, hm, hmmm. Let's see... She is called Saiba Momoi. Her attribute is that of a disarranged storyteller. No other notable characteristics. Harmless beyond measure."
90001200-115 = "This one's Saiba Midori. The younger twin of Saiba Momoi. Her attribute is that of an amateur illustrator. No other notable characteristics. She's harmless, too."
90001200-120 = "A-And finally... Hanaoka Yuzu...? Her attribute is, oh, a programmer...? F-For the most part, she also seems harmless."
90001200-121 = "Ein, Sof, Ohr. I witnessed it for only the briefest of moments, but did two signals not briefly flicker into sight?"
90001200-126 = "E-Elder Sister?! Please don't strain yourself over such a thing!"
90001200-127 = "E-Exactly! This kind of stuff is entirely our responsibility. You should save your powers for much more important situations!"
90001200-128 = "However, I desire to be of assistance to you, my younger sisters. Ein, Sof, Ohr."
90001200-130 = "Is it not the natural instinct of an older sister to wish so?"
90001200-134 = "A-Ahh..."
90001200-135 = "So brilliant... So noble..."
90001200-136 = "However, Elder Sister, 'tis more common than not to see such outlier signals. Insignificant noise is all it is."
90001200-137 = "Yeah. These random noises are typically caused by mesons."
90001200-138 = "Theoretically speaking, there's a possibility of error in all electronic circuits. It's called a single-event upset."
90001200-139 = "S-So, if you don't mind, p-please place your trust in us!"
90001200-140 = "We are your proud...younger sisters, after all!"
90001200-142 = "..."
90001200-143 = "Acknowledged. I understand. I shall continue relying on you."
90001200-144 = "However, if you do require my assistance, please do not hesitate to request it of me. Will you pledge that?"
90001200-145 = "Yes!"
90001200-152 = "Well... What should we do?"
90001200-153 = "Um, so, we... That is..."
90001200-154 = "Hm... What to do...?"
90001200-155 = "Leave them be."
90001200-156 = "I knew you were going to say that."
90001200-157 = "And I'm correct, no? Why engage them and needlessly lose our forces?"
90001200-158 = "Is it not ideal to whittle away their time? Allow them to wander aimlessly?"
90001200-159 = "O-Our b-biggest goal right now...is stabilizing the awakened Netzach, after all...!"
90001200-160 = "That's true. And we do need to bolster its expansion rate. So I guess the more time they waste, the better it is for us."
90001200-161 = "And what would happen, even if that teacher and their motley crew reached Grid Points?"
90001200-162 = "Tiphareth stands between them and the Steel Continent. An insurmountable obstacle for them."
90001200-163 = "A-And there's even more to overcome, even if they do somehow make it past Tiphy!"
90001200-164 = "That's also true. In the impossible event that they defeat the gatekeeper, the Steel Continent is our home ground."
90001200-165 = "They'll never be able to defeat it!"
90001200-166 = "Whoa! Sorry, Ein. I'm sorry. I wasn't implying that it was possible. It was just...um... You know! "
90001200-167 = "We have to consider all possible outcomes when creating plans, right? There's also things like quantum tunneling..."
90001200-168 = "Y-You're right. I'm sorry... I..."
90001200-169 = "There, there."
90001200-170 = "As you said. Even if the most improbable, worst-case scenario comes to pass..."
90001200-171 = "...we will put an end to all, here at the Steel Continent."
90001200-172 = "...Our primary directive is to ensure that Elder Sister will never have need to set foot outside."
90001200-173 = "A-Ah... Yes... Yeah. That's right..."
90001200-174 = "...Yes. Right. That must never..."
90001200-175 = "...!"
90001200-176 = "That said, Ohr. Would you like to pull a prank with me?"
90001200-177 = "Me? How rare. For you to request me for a \"prank.\" I'll hear you out."
90001200-178 = "This is a pretty good one, in my opinion. So..."
90001200-184 = "...Like that. What do you think?"
90001200-185 = "Wh-Whoa..."
90001200-186 = "..."
90001200-187 = "Understood! Wow, wow, wow, Sof! How is it you know of my inclination for such things?"
90001200-188 = "How could I not know...? Anyways, you're in agreement, right?"
90001200-189 = "Of course! In the first place, if that teacher's crew cannot even overcome this, then their capabilities are woefully limited!"
90001200-190 = "Um, I don't think it's fair to say \"can't even overcome\" in that situation..."
90001200-192 = "'Tis not my concern!"
90001200-193 = "R-Right..."
90001200-194 = "I shall begin preparations immediately! Naturally, it will take some time, so have patience!"
90001200-198 = "Yeah, yeah. Good luck."
90001200-202 = "We've been going for a long time... I wonder how far this path goes..."
90001200-203 = "[s] \"It feels like we're following a transcontinental railroad...\""
90001200-208 = "It's already nighttime... Should we still continue?"
90001200-209 = "...Under normal circumstances, considering the risk, I would condone taking a break for the night."
90001200-210 = "However, the Steel Continent continues to grow, even as we speak. We can't slow down now. I'm sorry, everyone."
90001200-212 = "A forced march..."
90001200-213 = "I'm fine with that, Ms. Rio. However, it seems the railroad tracks end here."
90001200-214 = "Eek?! Really? What should we do??"
90001200-215 = "Does that mean we're lost? What do we do...?"
90001200-216 = "...I have more bad news."
90001200-217 = "Y-You're joking, right...?"
90001200-218 = "I truly wish I was."
90001200-219 = "However, we lost our GPS signal a little bit ago."
90001200-220 = "?!"
90001200-221 = "She's right... What's going on? I was definitely receiving my coordinates from my personal satellite...!"
90001200-222 = "[s] \"You have a personal satellite?! How?!\""
90001200-223 = "...That's irrelevant. What's important right now is that there's a strong possibility we get lost—"
90001200-229 = "...?! Get down! Hold onto whatever you can!"
90001200-238 = "Nice! They're in!"
90001200-239 = "I-It worked...!"
90001200-240 = "We successfully implemented Ein's silent drones to focus the projection of the Forbidden Power's energy... Excellent. This entire area is now surrounded by a closed energy field."
90001200-241 = "Their electronic devices will be rendered useless, as if hit by a massive EMP attack!"
90001200-242 = "Thank you, Ein! You're always of such assistance to us!"
90001200-243 = "Y-You're welcome... Ehehe... Our fly-wheels always do their best...!"
90001200-244 = "At least this name is somewhat understandable this time..."
90001200-246 = "How's it going over there?!"
90001200-247 = "It's no use, President... None of the circuits are responding."
90001200-248 = "I set up safety measures against EMPs, so how could this have happened?"
90001200-249 = "My Abi-Eshuh has also been rendered powerless. If we're ambushed now...!"
90001200-250 = "Wh-What's going...to happen to us...?"
90001200-251 = "U-Ugh..."
90001200-253 = "Sensei... Kei..."
90001200-254 = "[s3] \"Let's all calm down first.\"\n[s4] \"Panicking won't get us anywhere.\""
90001200-260 = "[ns] \"(But what should we do now?)\""
90001200-261 = "*sigh* Honestly. Enough of this."
90001200-262 = "K-Kei?!"
90001200-264 = "[ns] \"Kei???\""
90001200-265 = "It's fine, Prin—Aris. It's fine."
90001200-266 = "You can believe me. I know what this is, as well as how to counter it."
90001200-267 = "R-Really, Kei?"
90001200-268 = "Aris... Princess. Look at me. Look into my eyes. Yes. Excellent. Just keep that up."
90001200-269 = "Now then, let us teach these \"brats\" a lesson."
90001200-270 = "We'll make them realize just who they've picked a fight with!"
90001200-278 = "Next Episode;Final Duty"

[translation]
90001200-1 = "ตอนที่ 20;ลางสังหรณ์"
90001200-6 = "ทุกคนคะ อย่างที่เห็นกันว่าพวกเรากลับมาที่เขตทุนดรากันอีกครั้งแล้วค่ะ"
90001200-11 = "อาริสึจำได้ค่ะ! ที่บอกว่าที่นี่มีสัตว์ประหลาดขนาดใหญ่ที่เปลี่ยนร่างได้ใช่มั้ยคะ!"
90001200-12 = "ใช่ๆ ฉันก็จำได้เหมือนกัน! ของแบบนี้ควรอยู่ในเกมมากเลย!"
90001200-13 = "นั่นสิคะ โมโมอิ! สัตว์ประหลาด การเปลี่ยนร่าง แล้วก็หุ่นยนต์...!"
90001200-14 = "ถ้ามีองค์ประกอบพวกนี้ ต้องเป็นเกมที่แจ่มมากๆ เลยละ! จะไม่ยอมให้กับเจ้าพวกนี้เด็ดขาดเลย!"
90001200-15 = "ขอถามอะไรสักอย่างนะคะ... โมโมอิ แล้วจะเขียนเนื้อเรื่องให้มีองค์ประกอบพวกนั้นยังไงเหรอคะ?"
90001200-16 = "ฉะ... ฉันก็ยังไม่ได้คิดเอาไว้เลย... แต่เอาเป็นว่าเริ่มจากการทำลายล้างโลกแล้วกัน!"
90001200-17 = "อ๋อค่ะ ฉันไม่ให้ผ่านค่ะ"
90001200-22 = "ทำไมล่ะ~"
90001200-24 = "ท่านริโอะ เจอร่องรอยของทางรถไฟอย่างที่ว่าเลยค่ะ"
90001200-25 = "เราลงไปดูข้างล่างกันก่อนมั้ย? หรือว่าจะลาดตระเวนจากบนอากาศ? คุณครูคิดว่ายังไงเหรอ?"
90001200-26 = "[s1] \"อาจมีบางอย่างที่เราไม่เห็นจากตรงนี้ ลงไปข้างล่างกันเถอะ\"\n[s2] \"ลงไปข้างล่างน่าจะเห็นอะไรได้มากขึ้นนะ แต่ก็ระวังกันด้วยล่ะ\""
90001200-29 = "เข้าใจแล้วค่ะ คุณครู แล้วก็ไม่ต้องกังวลนะคะ ถ้าเกิดอะไรขึ้น ฉันจะปกป้องคุณครูเองค่ะ"
90001200-30 = "[s] \"อื้อ ได้ยินอย่างนั้นครูก็อุ่นใจนะ!\""
90001200-31 = "ชมกันด้วยการกระทำก็ได้นะคะ ไม่ต้องพูดอย่างเดียวหรอกค่ะ"
90001200-32 = "นี่ โทคิ? ตอนนี้เราบินกันอยู่นะ..."
90001200-33 = "งั้นก็ช่วยไม่ได้นะคะ ตอนนี้ฉันจะทำตามคำสั่งของท่านริโอะค่ะ"
90001200-34 = "จะลดระดับความสูงแล้วค่ะ ระวังเครื่องสั่นนะคะ"
90001200-38 = "ที่นี่ดู... เปล่าเปลี่ยวจังเลยนะคะ..."
90001200-39 = "ก็ไม่แปลกหรอก ปกติที่นี่ไม่มีใครอยู่แล้วน่ะ"
90001200-40 = "ค่ะ ถ้าจะให้เปรียบเทียบ ก็คงเหมือนกับมีใครมาสร้างทางรถไฟอย่างรีบเร่งในพื้นที่ที่ถูกลืมไปแล้ว"
90001200-41 = "จากนั้นก็รีบส่งทรัพยากร แล้วก็เลิกใช้อุปกรณ์และสถานที่ไปหลังจากเสร็จงานน่ะค่ะ"
90001200-43 = "ทางรถไฟขาดอยู่หลายๆ จุดเลยนะคะ เหมือนว่ามาจัดการในภายหลังให้ใช้งานไม่ได้อีกอย่างนั้นเลยค่ะ"
90001200-44 = "แต่ยังไงก็มีร่องรอยของทางรถไฟหลงเหลือให้เราติดตามไปได้นะคะ"
90001200-45 = "วะ... ว่าแต่เราจะ... ติดตามกันยังไงเหรอคะ? ถ้าจะเอาแต่เดินเท้าละก็ ฉันว่าไม่น่าจะไหว..."
90001200-46 = "เธอพูดถูกแล้วละ จากนี้ไปเราจะใช้รถกัน แล้วถ้าจะใช้ยาน ฉันจะเปิดการควบคุมอัตโนมัติแล้วเรียกมา#nอีกครั้งเอง"
90001200-53 = "เอาตามนั้นค่ะ ถ้าสถานการณ์ไม่เป็นไปตามที่ตั้งใจไว้ ตอนนั้นเราก็กลับขึ้นยานขนส่งอีกครั้งก็ได้ค่ะ"
90001200-59 = "แล้วทุกคนก็มีชีวิตที่สงบสุขด้วยกันค่ะ..."
90001200-60 = "ตะ... ต่อไปล่ะคะ? ต่อไปเป็นยังไงเหรอคะ?"
90001200-61 = "เรื่องนี้จบแค่นี้ค่ะ ไอน์..."
90001200-62 = "เป็นไปได้ยังไง..."
90001200-63 = "สิ่งที่เรียกว่านิทานก็เป็นอย่างนี้อยู่แล้วไม่ใช่เหรอ? ตอนกลางๆ เรื่องทำเอาไอน์เกือบร้องไห้ แต่สุดท้ายก็จบลงด้วยดีนะ"
90001200-64 = "ตะ... แต่ยังไงก็เถอะ...!"
90001200-66 = "แต่เดี๋ยวนะ? ที่บอกว่าเกือบร้องไห้ ซอฟเองก็เหมือนกันไม่ใช่เหรอคะ?"
90001200-67 = "คะ... ใครเกือบร้องไห้ ไม่ใช่ฉันสักหน่อย?! ฉันก็แค่... ก็แค่...!"
90001200-72 = "แต่มันก็แน่นอนอยู่แล้วละค่ะที่ต้องมีตอนจบ ถ้าเป็นไปได้ ขอให้จบแบบแฮปปี้เอนดิ้งดีกว่านะคะ"
90001200-73 = "ชะ... ใช่ค่ะ แหะๆๆ แล้วก็ พะ... พอเป็นเสียงของพี่ ฉันก็เลยยิ่งชอบค่ะ..."
90001200-74 = "ต่อไปเป็นเรื่องอะไรเหรอพี่? เรื่องต่อไป เรื่องต่อไป!"
90001200-76 = "ชอบฟังนิทานกันสินะคะ ไอน์ ซอฟ ออร์"
90001200-77 = "ค่ะ ค่ะ... ใช่แล้วค่ะ...! แล้วยิ่งเป็นพี่มาอ่านให้... มันก็ยิ่งสนุกค่ะ...!"
90001200-78 = "นอกจากนี้นี่ยังเป็นการรวบรวมสิ่งที่เรียกว่า 'ความเป็นจริง' จากภายนอกด้วย"
90001200-79 = "ฉันไม่ได้สนใจนิทานถึงขนาดนั้นหรอกค่ะ ก็มันเป็นเรื่องราวที่โง่เขลาของมนุษย์ไม่ใช่เหรอคะ?"
90001200-80 = "แต่ถ้าเป็นการฟังนิทานที่พี่เล่าให้ฟังละก็ ฉันชอบมากเลยละค่ะ"
90001200-82 = "ถ้างั้นเรื่องต่อไปจะเป็นเรื่องอะไรคะ? เอาเป็นวรรณกรรมกองโจรที่บอกเล่าเรื่องราวของนกกระสา ตัวแทนของชนชั้นแรงงานที่ต่อต้านสุนัขจิ้งจอก สัญลักษณ์ของชนชั้นนายทุนชั่วร้ายจนทำการปฏิวัติมา#nได้สำเร็จ"
90001200-83 = "หรือไม่ก็เรื่องของผู้มีอำนาจที่อยู่เบื้องบนอย่างพระอาทิตย์และสายลมเหนือ ที่พยายามข่มขวัญ และเกลี้ยกล่อมเอาเสื้อคลุมจากนักเดินทางยากจนอยู่ซ้ำๆ แต่สุดท้ายนักเดินทางก็เอาชนะทุกอย่างได้#nดีมั้ยคะ?"
90001200-84 = "คะ... คือว่าฉัน... ฉันขอเป็น..."
90001200-89 = "อะไรกันน่ะ เสียงเตือนภัยนี่นา?"
90001200-90 = "ไปดูกันเถอะ เอ๋... นี่มัน?"
90001200-91 = "คะ... คะ?! ผู้ใหญ่คนนั้นกับคณะสืบค้นของสึคัตสึกิ ริโอะ... กลับมาที่เขตทุนดราอีกครั้ง... เหรอคะ...?"
90001200-92 = "นี่มัน..."
90001200-93 = "โถๆๆ คงเป็นการตอบสนองต่อ 'การประกาศสงคราม' ของซอฟน่ะสิคะ"
90001200-94 = "การกลับมาที่เขตทุนดราอีกครั้ง... อ้อ คงจะมาสืบหาร่องรอยของทางรถไฟที่ใช้ขนส่งทรัพยากรน่ะค่ะ"
90001200-95 = "เท่านี้ก็คงพอเดาคำตอบได้แล้วนะคะ? แบบนี้งานนี้คง... น่ารำคาญขึ้นนิดหน่อยนะคะ"
90001200-96 = "ว่ายังไงล่ะคะ ซอฟ? ฉันบอกไปแล้วไม่ใช่เหรอคะว่าไม่ต้องประกาศสงครามที่เหมือนการแกล้งแหย่#nของมนุษย์ก็ได้"
90001200-97 = "อะ... อึก..."
90001200-98 = "ไม่หรอก ฉันไม่ได้จะว่าอะไรหรอกค่ะ แต่ถ้าไม่ใช่ตอนนี้ แล้วเมื่อไรฉันจะได้แกล้งซอฟแบบนี้ล่ะคะ?"
90001200-99 = "นี่เธอแกล้งกันเรอะ!"
90001200-100 = "ตะ... แต่ถ้าพวกนั้นมาตามเส้นทางนั้นละก็ สุดท้ายก็จะได้เจอกับ..."
90001200-101 = "ไม่หรอกค่ะ ไม่หรอก ตรงกันข้าม ฉันกลับไม่กังวลเลยค่ะ ไอน์"
90001200-102 = "คะ? อ้อ...!"
90001200-103 = "ใช่ค่ะ เป็นอย่างนั้นละค่ะ พอไปถึงตรงนั้น สิ่งกีดขวางที่พวกนั้นต้องเจอไม่ได้มีแค่อย่างสองอย่าง#nหรอกค่ะ"
90001200-104 = "แต่ดูเหมือนว่าพวกนั้นจะมากันเยอะขึ้นเลยนะ น่าจะต้องไปตรวจสอบสักหน่อยแล้วละ"
90001200-105 = "ฉะ... ฉันจะตรวจสอบให้เองค่ะ! เอ่อ เอ่อ... เอาเป็น... คนคนนี้ก่อนแล้วกันค่ะ!"
90001200-110 = "ฮึ่มๆๆ ไหนดูซิ... คนนี้ชื่อไซบะ โมโมอิ เป็นนักเขียนเนื้อเรื่องจอมวุ่นวาย นอกจากนั้นก็ไม่มีคุณสมบัติ#nอื่นแล้ว ไม่น่ามีอะไรที่เป็นอันตรายหรอก"
90001200-115 = "ส่วนคนนี้ก็ไซบะ มิโดริ แฝดผู้น้องของไซบะ โมโมอิ เป็นนักวาดภาพมือสมัครเล่น นอกจากนั้นก็ไม่มี#nคุณสมบัติอื่นแล้ว สรุปว่าแฝดคู่นี้ไม่น่ามีอันตรายอะไร"
90001200-120 = "สะ... สุดท้ายก็... ฮานาโอกะ ยูสึ...? เป็นโปรแกรมเมอร์ค่ะ... โดยรวมแล้วก็ไม่น่ามีอันตรายอะไรนะคะ"
90001200-121 = "ไอน์ ซอฟ ออร์ เมื่อกี้มี 2 สัญญาณที่ถูกตรวจจับได้แล้วก็หายไปค่ะ"
90001200-126 = "พะ... พี่คะ?! พี่ไม่ต้องลำบากมาใส่ใจเรื่องแบบนี้ก็ได้...!"
90001200-127 = "ชะ... ใช่! นี่เป็นงานของพวกเราน่ะ พวกงานที่พี่ต้องลงแรง จะเป็นงานที่แตกต่างออกไปอย่างสิ้นเชิง#nเลยละ!"
90001200-128 = "แต่ฉันก็อยากช่วยไอน์ ซอฟ และออร์นะคะ"
90001200-130 = "คนเป็นพี่ต้องอยากช่วยเหลือน้องอยู่แล้วไม่ใช่เหรอคะ?"
90001200-134 = "อะ... อ่า..."
90001200-135 = "สุดยอดไปเลย... ประเสริฐเหลือเกิน..."
90001200-136 = "แต่ว่า พี่คะ สัญญาณแบบนี้มันเกิดขึ้นบ่อยๆ ค่ะ คงจะมีคลื่นรบกวนมาแทรกชั่วขณะหนึ่งน่ะค่ะ"
90001200-137 = "อื้อ คลื่นรบกวนที่มาอย่างกะทันหันแบบนี้น่ะ ส่วนมากมีสาเหตุมากจากอนุภาคจากอวกาศ"
90001200-138 = "ในทางทฤษฎีแล้ว สิ่งนี้อาจทำให้เกิดการทำงานผิดพลาดในวงจรอิเล็กทรอนิกส์ได้ แบบนี้เรียกว่า#nซิงเกิล อีเวนต์ อัปเซ็ต (Single-event upset: SEU) ค่ะ"
90001200-139 = "พะ... เพราะงั้นพี่ก็... เชื่อใจพวกฉันในเรื่องนี้ได้เลยค่ะ!"
90001200-140 = "เพราะพวกฉันคือ... น้องสาวที่น่าภาคภูมิใจของพี่นี่คะ!"
90001200-142 = "..."
90001200-143 = "อย่างนั้นสินะ เข้าใจแล้วค่ะ ถ้างั้นก็รบกวนด้วยนะคะ"
90001200-144 = "แต่ถ้ามีอะไรที่ฉันช่วยได้ก็ต้องบอกกันนะคะ สัญญากับฉันได้มั้ยคะ?"
90001200-145 = "ค่า~!"
90001200-152 = "เอาละ ถ้างั้นก็... เอายังไงดีนะ?"
90001200-153 = "อืม เอ่อ เอาเป็น..."
90001200-154 = "อืม ช่างเถอะ"
90001200-155 = "ปล่อยไปเถอะค่ะ"
90001200-156 = "กะไว้แล้วเชียวว่าเธอต้องพูดอะไรแบบนี้..."
90001200-157 = "แต่ถ้าเราบุ่มบ่ามทำอะไรลงไปละก็ กำลังของฝ่ายเราอาจจะเสียหายก็ได้"
90001200-158 = "ฉันว่าให้พวกนั้นเสียเวลาไปกับการจับจุดไม่ถูกอยู่ตรงนั้นน่าจะปลอดภัยกว่าค่ะ"
90001200-159 = "ชะ... ใช่ค่ะ จะ... จากสถานการณ์ปัจจุบัน ปะ... เป้าหมายสูงสุดของพวกเรา... ก็คือการทำให้เน็ตซาชจังที่ตื่นแล้วอยู่ในความเสถียรมากขึ้นนี่คะ...!"
90001200-160 = "ก็จริงนะ ไหนพวกเราจะต้องเพิ่มความเร็วในการขยายตัวอีก ถ้าอย่างนั้นแล้ว... ยิ่งพวกนั้นเสียเวลามาก#nแค่ไหน พวกเราก็จะยิ่งได้ประโยชน์มากเท่านั้นสินะ?"
90001200-161 = "อีกอย่างนะคะ ต่อให้คณะของคุณครูคนนั้นมาถึง <กริดพอยต์> ได้"
90001200-162 = "แต่ถ้าฝ่า <ทิฟาเร็ธ> ไปไม่ได้ ก็ไม่มีทางเข้ามาถึงดินแดนเหล็กกล้าได้หรอกค่ะ"
90001200-163 = "ละ... และต่อให้โชคดีฝ่าทิฟาจังมาได้... ต่อไปก็ยังมีอีกหนึ่งอุปสรรคที่กีดขวางอยู่ดีค่ะ...!"
90001200-164 = "นั่นมันก็ใช่นะ และต่อให้ผ่านผู้เฝ้าประตูนั้นมาได้จริงๆ แต่ดินแดนแห่งเหล็กกล้าคือฐานทัพหลักของ#nพวกเราอยู่ดี"
90001200-165 = "ไม่มีทางผ่านตรงนั้นมาได้หรอกค่ะ!"
90001200-166 = "เหวอ?! ขอโทษนะ ไอน์ ขอโทษที ฉันไม่ได้พูดอย่างนั้นเพราะคิดว่ามันจะเกิดขึ้นจริงๆ หรอก ก็แค่ลองๆ สมมติดูน่ะ "
90001200-167 = "ก็การเตรียมแผนตอบสนองต้องพิจารณาถึงความเป็นไปได้ทั้งหมดนี่นา? เหมือนอย่างอันนั้นไง ที่เรียกว่าอุโมงค์ควอนตัมน่ะ"
90001200-168 = "นะ... นั่นสินะคะ ขอโทษด้วยค่ะ... ฉันลืมตัวไปน่ะค่ะ..."
90001200-169 = "ไม่เป็นไรหรอก ไม่เป็นไร"

[translation]
2000203-1 = "#title;불로불사의 영약"
2000203-2 = "#place;사야의 연구실"
2000203-3 = "3;사야;03;어서 오는 거다, 선생! 기다리고 있었다.\n#3;em;[반짝]\n#3;hophop\n#3;a"
2000203-4 = "3;사야;02;연락한대로 나님이 드디어 진짜 불로불사의 영약을 만들어내는 데 성공한 것이다!"
2000203-5 = "3;사야;00;또 피부가 금색으로 변하는 게 아니냐고? #n아니, 이 네즈스케를 보는 것이다.\n#3;em;[반응]"
2000203-6 = "3;사야;01\n#3;m1\n#wait;1000"
2000203-7 = "3;사야;02;이 윤기나는 털과 똘망똘망한 눈망울…… 어렸을 적의 네즈스케로 돌아간 게 분명하지?\n#3;em;[반짝]"
2000203-8 = "3;사야;05;……쥐라서 나이를 잘 모르겠다고? #n쳇, 무신경한 것이다."
2000203-9 = "3;사야;05\n#3;m3\n#wait;1000"
2000203-10 = "[s] 네즈스케의 나이를 묻는다."
2000203-11 = "3;사야;02;네즈스케의 나이? 나님이 10살 때부터 기르기 시작했으니 최소한 6살은 넘지 않았을까?\n#3;em;[?]"
2000203-12 = "3;사야;01;그러고 보면 쥐 치고는 제법 나이가 든 할아버지 쥐이려나……"
2000203-13 = "3;사야;03;그래도 나님이 실험을 위해 틈틈히 먹인 영약 덕분에 네즈스케는 아주 건강한 것이다. #n그렇지, 네즈스케?\n#3;em;[음표]"
2000203-14 = "#na;네즈스케는 말이 없다. 겁을 먹은 것 같다."
2000203-15 = "3;사야;07;네즈스케, 이 녀석……! 어째서 이 타이밍에 입을 다무는 것이냐? #n누가 보면 나님이 널 계속 괴롭혀 왔다고 생각할 게 아니냐!\n#3;em;[빠직]\n#3;hophop"
2000203-16 = "3;사야;05;……응? 가끔 생물 폭탄에 네즈스케를 붙여 함께 던지지 않았느냐고?\n#3;shake"
2000203-17 = "3;사야;00;그건 괴롭힌 게 아니다! 그저 실험을 한 것뿐이지. 후-후-훗.\n#3;em;[음표]"
2000203-18 = "3;사야;03;네즈스케는 충직한 조수로서 나님의 실험을 도와주고 있는 것 뿐이다. #n그렇지, 네즈스케?"
2000203-19 = "#na;네즈스케는 여전히 말이 없다. 겁을 먹은 것 같다."
2000203-20 = "3;사야;07;이 녀석, 입을 열지 않으면 강제로라도 실토하게 만들어 줄 테다!\n#3;hophop\n#3;em;[!]"
2000203-21 = "[s] 불로불사의 영약에 대해 묻는다."
2000203-22 = "3;사야;01;아 참, 깜박할 뻔한 것이다. \n#3;em;[반응]"
2000203-23 = "3;사야;02;자, 이게 이번에 개발한 불로불사의 영약인 것이다."
2000203-24 = "3;사야;01\n#3;greeting\n#wait;450\n#3;h\n#3;d"
2000203-25 = "3;사야;01\n#wait;1000\n#3;closeup\n#3;h\n#3;a"
2000203-26 = "#na;사야가 수상쩍어보이는 오색빛깔의 플라스크를 건넸다."
2000203-27 = "[s1] \"…….\"\n[s2] \"……이번에는 정말 효과가 있겠지?\""
2000203-28 = "3;사야;00;아직도 나님을 의심하는 것이냐? 이번 약은 이미 네즈스케에게 실험을 해 봤으니 걱정하지 않아도 좋은 것이다.\n#3;closeup\n#3;em;[재잘]"
2000203-29 = "3;사야;00;아직도 나님을 의심하는 것이냐? 이번 약은 이미 네즈스케에게 실험을 해 봤으니 걱정하지 않아도 좋은 것이다.\n#3;closeup\n#3;em;[재잘]"
2000203-30 = "3;사야;02;이번에야 말로 고등학교 시절의 선생님으로 돌아갈 수 있을 테니까!\n#3;closeup"
2000203-31 = "[s] 약을 마신다."
2000203-32 = "3;사야;02\n#3;d\n#3;closeup\n#wait;1000"
2000203-33 = "#st;[0,0];instant;1;"
2000203-34 = "#clearST\n#all;hide\n#wait;3000"
2000203-35 = "3;사야;07;자, 어때? 젊어지는 기분이 들어?\n#3;em;[?]\n#3;a"
2000203-36 = "[s] \"손에……\""
2000203-37 = "3;사야;05;손에?"
2000203-38 = "[s] \"손에 회색 털이 돋아나기 시작했어!\""
2000203-39 = "3;사야;07;회색 털이 돋아난다고? 그럴 리가…… \n#3;stiff"
2000203-40 = "3;사야;05;이 비약에 들어간 재료는 분명 개구리 뒷다리, 달맞이꽃 한 뿌리, 네즈스케의 털 한 줌, 그리고……\n#3;em;[...]"
2000203-41 = "3;사야;04;으악, 착각했다! 실수로 불로불사의 영약이 아니라 온 몸에 윤기나는 회색 털이 나는 영약을 만들어 버린 것이다!\n#3;shake\n#3;em;[?!]"
2000203-42 = "3;사야;07;어, 어떻게 하지, 선생? 며, 면도기라도 가져다 줄까?"
2000203-43 = "[s] 몸을 원래대로 되돌려 달라고 한다."
2000203-44 = "3;사야;05\n#3;h\n#3;d\n#wait;1000"
2000203-45 = "3;사야;05\n#3;h\n#3;closeup\n#wait;1000\n#3;a"
2000203-46 = "3;사야;04\n#3;h\n#3;stiff\n#3;em;[반응]\n#3;closeup\n#wait;1500"
2000203-47 = "3;사야;04;으, 으악! 가까이 오지 마! 거대한 고양이 같아서 무서운 것이다! \n#3;hophop"

[translation]
2000203-1 = "Immortality Elixir"
2000203-2 = "Saya's Research Lab"
2000203-3 = "There you are, Sensei. Thanks for not keeping me waiting."
2000203-4 = "So, as we last discussed, the immortality elixir has finally been completed."
2000203-5 = "You're wondering if your skin will turn gold again? No way! Just look at Nezusuke."
2000203-7 = "That lustrous fur! Those big, bright eyes... Nezusuke definitely looks way younger!"
2000203-8 = "Are you saying he looks the same as ever? Hmph. Don't be so rude."
2000203-10 = "[s] Ask how old Nezusuke is."
2000203-11 = "Nezusuke? I've had him since I was ten, so he must be at least six years old?"
2000203-12 = "I suppose that would make him rather old for a mouse... He's like a rat grandpa."
2000203-13 = "But look at him. Nezusuke is fit as a fiddle thanks to all the elixirs I feed him while fine tuning my experiments. Isn't that right, Nezusuke?"
2000203-14 = "Nezusuke looks scared stiff."
2000203-15 = "Nezusuke! Why are you so quiet all of a sudden? You're going to make Sensei think that I've been abusing you all this time!"
2000203-16 = "Huh? What about that time I attached you to a live bomb...?"
2000203-17 = "That wasn't abuse! It was for the sake of science, silly. Heehee!"
2000203-18 = "You were only helping me with my totally safe research because you're my loyal assistant. Isn't that right, Nezusuke?"
2000203-19 = "Nezusuke remains silent. He still looks terrified."
2000203-20 = "Why you little... Speak up, or I'm going to attach another bomb to you and blow the words out!"
2000203-21 = "[s] Ask her about the immortality elixir."
2000203-22 = "Oh, right! I nearly forgot."
2000203-23 = "Okay! This is THE immortality elixir."
2000203-26 = "Saya gives me another colorful, suspicious-looking flask."
2000203-27 = "[s1] \"...\"\n[s2] \"...Are you sure this one works?\""
2000203-28 = "Are you doubting me? I already tested it on Nezusuke, so I know it works."
2000203-29 = "Are you doubting me? I already tested it on Nezusuke, so I know it works."
2000203-30 = "You'll feel like a high-schooler again in no time!"
2000203-31 = "[s] Drink the elixir."
2000203-35 = "So, how do you feel? Young?"
2000203-36 = "[s] \"My hand...\""
2000203-37 = "Your hand?"
2000203-38 = "[s] \"There's gray fur growing on my hand!\""
2000203-39 = "Gray fur? That doesn't sound right..."
2000203-40 = "This formula contains frog legs, a sprinkle of evening primrose, a clump of Nezusuke's fur, and..."
2000203-41 = "Oh, no! This isn't the immortality elixir! I must have made one that makes you grow gray fur all over your body!"
2000203-42 = "Uh... Can I interest you in a razor, Sensei?"
2000203-43 = "[s] Tell her to turn you back to normal."
2000203-47 = "Agh! Don't come any closer! You look like a giant cat!"

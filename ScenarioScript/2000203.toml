[translation]
2000203-1 = "ยาอายุวัฒนะ"
2000203-2 = "ห้องทดลองของซายะ"
2000203-3 = "เข้ามาสิครู! กำลังรออยู่เลย"
2000203-4 = "อย่างที่บอก ตอนนี้ท่านซายะพัฒนาสูตรยาอายุวัฒนะได้สำเร็จแล้วล่ะ!"
2000203-5 = "ถามว่าผิวจะเปลี่ยนเป็นสีทองอีกรึเปล่างั้นเหรอ?#nไม่หรอก ดูเจ้าเนสึซึเกะนี่สิ"
2000203-7 = "ดูขนที่แวววาวกับดวงตาที่เป็นประกายนั่นสิ... เนสึซึเกะดูเด็กลงเยอะเลยใช่มั้ยล่ะ?"
2000203-8 = "เพราะเนสึซึเกะเป็นหนูเลยดูไม่ค่อยออกเหรอ?#nชิส์ ตาไม่มีแววเลยจริงๆ"
2000203-10 = "[s] ถามถึงอายุของเนสึซึเกะ"
2000203-11 = "อายุของเนสึซึเกะเหรอ? ฉันเลี้ยงเนสึซึเกะมาตั้งแต่ฉันสิบขวบ... คงอายุประมาณหกปีได้มั้ง?"
2000203-12 = "สำหรับพวกหนู เนสึซึเกะก็เป็นคุณปู่ได้แล้วนะ..."
2000203-13 = "ต้องขอบคุณยาอายุวัฒนะของท่านซายะคนนี้เลยนะที่ทำให้เนสึซึเกะยังแข็งแรงอยู่แบบนี้น่ะ#nใช่รึเปล่า เนสึซึเกะ?"
2000203-14 = "เนสึซึเกะยังคงนิ่งเงียบ แถมมีท่าทางหวดกลัวนิดๆ"
2000203-15 = "เนสึซึเกะ! นี่...! ทำไมถึงนิ่งเงียบแบบนั้นเล่า!#nถ้าคนอื่นมาเห็นเข้าคงเข้าใจผิดว่าฉันจับแกมาทรมานแน่ๆ!"
2000203-16 = "...หือ? ฉันเคยใช้เนสึซึเกะเป็นระเบิดพลีชีพด้วยเหรอ...?"
2000203-17 = "นั่นไม่ใช่การทรมานซะหน่อย! นั่นมันแค่การทดลองต่างหาก ฮุฮุฮุ..."
2000203-18 = "ในฐานะผู้ช่วยที่ซื่อสัตย์ของท่านซายะ เนสึซึเกะก็แค่ช่วยเรื่องการทดลองเท่านั้นเอง#nใช่รึเปล่า เนสึซึเกะ?"
2000203-19 = "เนสึซึเกะยังคงนิ่งเงียบเหมือนเดิม แถมมีท่าทางหวดกลัวนิดๆ"
2000203-20 = "นี่! ถ้าไม่ยอมอ้าปากพูดล่ะก็ฉันจะบังคับให้พูดแล้วนะ!"
2000203-21 = "[s] ถามซายะเกี่ยวกับยาอายุวัฒนะ"
2000203-22 = "จริงสิ เกือบลืมไปเลย"
2000203-23 = "เอาล่ะ นี่คือยาอายุวัฒนะ"
2000203-26 = "ซายะยื่นขวดแก้วที่มีของเหลวแปลกๆ ที่มีสีสันสดใสมาให้"
2000203-27 = "[s1] \"......\"\n[s2] \"....คราวนี้จะได้ผลจริงๆ ใช่ไหม?\""
2000203-28 = "ยังสงสัยท่านซายะคนนี้อยู่อีกเหรอ? คราวนี้ฉันทดลองกับเนสึซึเกะก่อนแล้ว ไม่ต้องห่วงหรอก"
2000203-29 = "ยังสงสัยท่านซายะคนนี้อยู่อีกเหรอ? คราวนี้ฉันทดลองกับเนสึซึเกะก่อนแล้ว ไม่ต้องห่วงหรอก"
2000203-30 = "พอดื่มแล้วครูก็จะรู้สึกเหมือนย้อนวัยกลับไปสมัยมัธยมปลายเลยล่ะ!"
2000203-31 = "[s] ดื่มยาในขวดแก้ว"
2000203-35 = "เป็นยังไงบ้าง? รู้สึกเด็กลงบ้างมั้ย?"
2000203-36 = "[s] \"มือ...\""
2000203-37 = "มือเหรอ?"
2000203-38 = "[s] \"มือครูมีขนสีเทางอกขึ้นมาแล้ว!\""
2000203-39 = "มีขนสีเทางอกขึ้นมาเหรอ? เป็นไปได้ยังไงกัน...."
2000203-40 = "วัตถุดิบที่ใช้ปรุงยาคราวนี้ก็มี... ขาหลังของกบ รากของต้นอีฟนิ่งพริมโรส#nขนของเนสึซึเกะหนึ่งหย่อม แล้วก็..."
2000203-41 = "โธ่เอ้ย สับสนซะได้! นี่ไม่ใช่สูตรปรุงยาอายุวัฒนะ แต่มันเป็นสูตรปรุงยาที่ทำให้มีขนสีเทา#nงอกออกมาทั่วตัวต่างหากล่ะ!"
2000203-42 = "ทะ...ทำยังไงดีล่ะครู? ฉะ...ฉันไปเอาที่โกนหนวดมาให้มั้ย?"
2000203-43 = "[s] ขอให้ซายะทำให้ร่างกายกลับเป็นแบบเดิมให้"
2000203-47 = "อะ...อึ่ก...! อย่าเข้ามาใกล้นะ! ตอนนี้ครูดูเหมือนแมวตัวใหญ่ๆ เลย มันน่ากลัวนะ!"

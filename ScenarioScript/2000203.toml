[translation]
2000203-1 = "不老不死的靈藥"
2000203-2 = "沙耶的研究室"
2000203-3 = "呀啊，老師！等你很久了。"
2000203-4 = "如我聯絡的，我終於，這次真的成功製作出了不老不死的靈藥！"
2000203-5 = "皮膚會不會又變成金色的？#n不對不對，你看看這個根津助。"
2000203-7 = "這個光滑流順的毛，和閃閃發光的眼睛……肯定是回到了小時候的根津助不會錯，不這麼認為嗎？"
2000203-8 = "……因為是根津助所以不知道年齡？#n沒有那種事，來你仔細看。"
2000203-10 = "[s]（詢問根津助的年齡）"
2000203-11 = "根津助的年齡？我10歲的時候開始養的，所以至少超過6歲吧？"
2000203-12 = "這樣想的話，以老鼠來說是有點年紀的鼠爺爺了……"
2000203-13 = "但是多虧了我為了實驗三不五時的餵牠喝靈藥，根津助現在也很有精神。#n沒錯吧，根津助？"
2000203-14 = "（根津助沒有回應，似乎在害怕）"
2000203-15 = "根津助……！為什麼在這個時機閉上嘴巴？#n被不知道的人看到的話不就像是我在欺負你嗎！"
2000203-16 = "……嗯？有沒有偶爾把根津助綁在炸彈上丟出去？"
2000203-17 = "那不是欺負！只是讓牠陪我實驗而已。哼—哼—哼。"
2000203-18 = "根津助只是作為忠實的助手，在幫忙我的實驗而已。#n沒錯吧，根津助？"
2000203-19 = "（還是一樣沒有根津助的回答，似乎在害怕）"
2000203-20 = "這傢伙，不開口的話，就算要強迫也要讓你說出口！"
2000203-21 = "[s]（詢問關於不老不死的靈藥）"
2000203-22 = "啊，對哦。差點忘記了。"
2000203-23 = "來，這就是這次開發的不老不死的靈藥。"
2000203-26 = "（沙耶把可疑，顏色鮮艷的燒瓶遞了過來）"
2000203-27 = "[s1]「……」\n[s2]「……這次真的會有效果吧？」"
2000203-28 = "還在懷疑我嗎？這次的藥，根津助也已經實驗過了所以不用擔心。"
2000203-29 = "還在懷疑我嗎？這次的藥，根津助也已經實驗過了所以不用擔心。"
2000203-30 = "這次一定，可以回到高中生時期的老師才對！"
2000203-31 = "[s]（喝下藥）"
2000203-35 = "那麼，如何？有變年輕的感覺嗎？"
2000203-36 = "[s]「手上……」"
2000203-37 = "手上？"
2000203-38 = "[s]「手上長出灰色的毛！」"
2000203-39 = "灰色的毛？怎麼可能會……"
2000203-40 = "這個秘藥加入的材料記得是，青蛙的後腳、月見草的根、根津助的一撮毛，還有……"
2000203-41 = "唔哇，誤會了！因為搞錯了所以不是不老不死的靈藥，而是做成了全身長滿光滑流順灰色的毛的靈藥了！"
2000203-42 = "怎，怎麼辦，老師？要，要拿剃刀之類的來嗎？"
2000203-43 = "[s]（要求把身體變回原樣）"
2000203-47 = "唔，唔哇啊！不要靠過來！像巨大的怪貓一樣好恐怖！"

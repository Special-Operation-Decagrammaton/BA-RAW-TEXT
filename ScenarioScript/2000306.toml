[translation]
2000306-1 = "狙擊手的試煉（２）"
2000306-2 = "某個建築的屋頂"
2000306-3 = "今天的訓練項目是……肌力訓練！"
2000306-4 = "你說明明只需要待在原地射擊敵人的狙擊手，為什麼還需要鍛鍊肌力嗎？"
2000306-5 = "雖然說在狙擊的時候，只需要待在原地等待就好沒錯。但是，為了要找到最好的狙擊位置，常常不得不爬上爬下的。"
2000306-6 = "老師，要不要試著拿拿看我的槍呢？"
2000306-10 = "[s] 「好，好重……」"
2000306-13 = "對吧，反器材步槍的重量，可是隨便就超過20公斤。"
2000306-14 = "為了要能夠帶著這麼重的槍爬上爬下，就必須要有足夠的力氣才行。"
2000306-15 = "今天就在5分鐘內爬上這棟30層樓高的大樓吧！"
2000306-16 = "槍就交給我來拿，老師就拿著彈藥跟著我來吧。"
2000306-17 = "[s] 「先，先等一下……」"
2000306-18 = "沒有那種時間了！"
2000306-20 = "（之後，跟麻白一起訓練到了筋疲力盡）"

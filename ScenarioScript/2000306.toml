[translation]
2000306-1 = "#title;저격수의 시련 2"
2000306-2 = "#place;어느 건물 옥상 위"
2000306-3 = "3;마시로;05;오늘의 훈련은…… 바로 근력 훈련입니다!\n#3;em;[반짝]\n#3;greeting\n#3;a"
2000306-4 = "3;마시로;02;가만히 앉아서 적을 노리는 저격수에게 어째서 근력 훈련이 필요하냐고요?\n#3;em;[?]"
2000306-5 = "3;마시로;00;분명 저격을 할 때는 가만히 앉아서 대기해야만 하지만, 좋은 저격 포인트를 찾기 위해서는 부지런히 계단을 오르내려야 합니다."
2000306-6 = "3;마시로;02;선생님, 제 총을 한 번 들어보시겠습니까?\n#3;em;[반응]"
2000306-7 = "3;마시로;02\n#3;d\n#wait;1000"
2000306-8 = "3;마시로;01\n#3;h\n#3;closeup\n#wait;1000\n#3;a"
2000306-9 = "#wait;1500\n#bgshake"
2000306-10 = "[s] \"무, 무거워…\""
2000306-11 = "3;마시로;01\n#3;h\n#3;closeup\n#3;greeting\n#wait;1500"
2000306-12 = "3;마시로;01\n#3;d\n#3;closeup\n#wait;1000"
2000306-13 = "3;마시로;02;예, 대물 저격총의 무게는 20kg은 가볍게 넘긴답니다.\n#3;em;[반응]\n#3;a"
2000306-14 = "3;마시로;01;이런 무거운 총을 지고 건물을 오르내리려면 강인한 근력 또한 필수이지요."
2000306-15 = "3;마시로;05;오늘은 이 30층 건물을 계단으로 5분 만에 오르도록 합시다!\n#3;em;[!]"
2000306-16 = "3;마시로;02;총기는 제가 들 테니, 선생님께서는 탄통을 들고 따라와 주시겠습니까?"
2000306-17 = "[s] \"자, 잠깐만 기다려…\""
2000306-18 = "3;마시로;05;여유를 부릴 시간은 없습니다!\n#3;closeup"
2000306-19 = "#all;hide"
2000306-20 = "#na;이후, 녹초가 될 때까지 마시로와 훈련했다."

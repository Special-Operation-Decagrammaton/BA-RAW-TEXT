[translation]
2000306-1 = "The Sniper's Ordeal Part 2"
2000306-2 = "Building Rooftop"
2000306-3 = "Strength is the key to today's training session!"
2000306-4 = "Most people are surprised to hear snipers undergo muscle training. They think all we do is sit around and wait for our target."
2000306-5 = "While it is true that we spend a lot of time sitting, we also have to climb up and down a lot of stairs in order to find the perfect location."
2000306-6 = "Sensei, would you like to try carrying my rifle?"
2000306-10 = "[s] \"I-It's...heavy.\""
2000306-13 = "Correct. The average sniper rifle weighs in excess of 20 kilos."
2000306-14 = "It takes extraordinary fitness to be able to run up and down stairs with it in tow."
2000306-15 = "So for today, I'm going to climb 30 flights of stairs in five minutes!"
2000306-16 = "I'll carry the gun. Would you mind carrying the cartridge as you follow me?"
2000306-17 = "[s] \"W-Wait a second...\""
2000306-18 = "This is no time to be lazy!"
2000306-20 = "I then trained with Mashiro until my knees were about to give out."

[translation]
2000306-1 = "ความยากลำบากของสไนเปอร์ 2"
2000306-2 = "บนดาดฟ้าของอาคารแห่งหนึ่ง"
2000306-3 = "การฝึกวันนี้... คือการฝึกพละกำลังค่ะ!"
2000306-4 = "ทำไมเราต้องฝึกพละกำลังให้กับสไนเปอร์ที่นั่งจ้องศัตรูอยู่เฉยๆ น่ะเหรอคะ?"
2000306-5 = "แน่นอนว่าตอนลอบยิงนั้นต้องนั่งรอเฉยๆ แต่เราต้องขึ้นบันไดอย่างแข็งขันเพื่อหาจุดลอบยิงดีๆ ค่ะ"
2000306-6 = "คุณครูมาลองยกปืนของฉันดูสักครั้งมั้ยคะ?"
2000306-10 = "[s] \"นะ.. หนักจัง...\""
2000306-13 = "ใช่ค่ะ น้ำหนักของปืนไรเฟิลซุ่มยิงนั้นเกิน 20 กิโลกรัมค่ะ"
2000306-14 = "การแบกปืนหนักๆ แบบนี้ขึ้นลงอาคาร พละกำลังก็เป็นสิ่งจำเป็นเช่นกันค่ะ"
2000306-15 = "วันนี้มาขึ้นตึก 30 ชั้นด้วยบันไดภายใน 5 นาทีกันค่ะ!"
2000306-16 = "ฉันจะถือปืนไปเอง คุณครูถือกระสุนปืนตามฉันมาแล้วกันนะคะ"
2000306-17 = "[s] \"เดี๋ยวก่อน รอครูด้วย...\""
2000306-18 = "ไม่มีเวลามาเอ้อระเหยแล้วค่ะ!"
2000306-20 = "(หลังจากนั้นคุณครูก็ฝึกกับมาชิโระจนหมดแรง)"

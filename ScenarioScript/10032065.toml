10032065-218 = "Your question betrays your ignorance, Sensei."
10032065-219 = "Help? Problem Solver 68 doesn't do anything for free. The enemy of my enemy is my friend, no?"
10032065-220 = "It's simply a calculated move to get the job done."
10032065-221 = "Take this as a lesson in being hard-boiled. You need to adapt to any situation and take advantage of strategic alliances wherever possible."
10032065-222 = "Remember when Aru was all like, \"Outlaws don't work with anybody\"? Oh! I do! 'Cause it was an hour ago! Hahaha!"
10032065-223 = "This is totally different! I'm using underhanded tactics to steal the target!"

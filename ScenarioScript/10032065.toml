[translation]
10032065-8 = "……地下停車場就是這裡啊。"
10032065-9 = "嗯……負責接應的人力還沒到嗎？比想像中還慢呢。"
10032065-10 = "不，現在不是批評的時候。#n我只要守護委託人，直到接應的人力抵達就行了。"
10032065-11 = "幸好這裡的地形是我非常熟悉的型態……"
10032065-15 = "…………"
10032065-16 = "便利屋68……"
10032065-17 = "這麼快就追上來了啊，真麻煩。"
10032065-18 = "[s1]「你在這裡啊，沙織。」\n[s2]「跟佳世子說的一樣。」"
10032065-21 = "連老師也……"
10032065-28 = "……稍等一下。"
10032065-29 = "咦，咦……？阿蘭奇諾呢……？阿蘭奇諾去哪了？"
10032065-30 = "你背上那一包又是什麼？"
10032065-34 = "雖然我覺得不太可能，但姑且還是問你一下……"
10032065-35 = "[s3]「……那該不會是唐．阿蘭奇諾吧？」\n[s4]「你把委託人打包起來了嗎？」"
10032065-38 = "……？"
10032065-39 = "……是這樣沒錯，有什麼問題嗎？"
10032065-44 = "……？"
10032065-45 = "……？"
10032065-50 = "[ns]「……？」"
10032065-55 = "好，好像確實是個不錯的方法……"
10032065-56 = "啊哈哈哈哈！很厲害嘛！真是大膽的想法！！"
10032065-58 = "不是，怎麼可能不錯。這樣完全不行吧？"
10032065-59 = "什，什麼……？#n你們的反應好像我做錯了什麼事一樣。"
10032065-60 = "還有老師……？你為什麼一直跟便利屋68待在一起呢？"
10032065-61 = "BD怎麼樣了？難道這也是BD製作的一環嗎？"
10032065-63 = "……這是在開玩笑嗎？"
10032065-64 = "你的常識是不是跟一般人不太一樣……"
10032065-66 = "……嗯？"
10032065-67 = "你說現在這個不重要？那又是什麼……"
10032065-79 = "……！"
10032065-80 = "時機正好。"
10032065-82 = "什，什麼……！？好像有很多黑色車輛正在湧進來耶！？"
10032065-83 = "數量相當多哦？"
10032065-85 = "……太遲了嗎。"
10032065-86 = "我，我會全部……！"
10032065-91 = "慢著，遙香。先觀察一下情況吧。"
10032065-92 = "那似乎是來把頭目帶走的幫派主力……想一口氣對付他們沒這麼容易。"
10032065-100 = "大家來得正好，委託人就在這……"
10032065-106 = "不准動！把手舉起來！你已經被包圍了！！"
10032065-107 = "乖乖把頭目放下！這樣就饒你一命！"
10032065-111 = "……嗯？"
10032065-112 = "[ns5]「他們包圍了沙織……？」\n[ns6]「他們怎麼會針對沙織……？」"
10032065-115 = "咦，咦？這個情況是……？"
10032065-116 = "等等，你們誤會了。我不是你們的敵人。"
10032065-117 = "我只是在準確執行委託人交付的工作而已。#n我這不是把委託人帶來了嗎？"
10032065-118 = "委託人……？#n你在說哪個委託人！是誰？是誰指使你的！！"
10032065-119 = "什麼是誰，那當然是……"
10032065-126 = "……這個人啊？"
10032065-127 = "他要我幫助他安全地逃難，這是我們從一開始就說好的事。"
10032065-128 = "…………？"
10032065-129 = "那是什麼意思……"
10032065-132 = "你在胡說什麼啊！？現在是要我們相信這些鬼話嗎！？"
10032065-134 = "……？"
10032065-135 = "你說什麼？"
10032065-136 = "這傢伙竟敢把我們當笨蛋！？#n你只是因為事跡敗露，為了抽身而說謊吧！"
10032065-137 = "說謊也要先打草稿吧！！"
10032065-139 = "又是令人難以理解的反應……"
10032065-140 = "怎麼會變成這樣？#n我沒有把任何人當成笨蛋啊。"
10032065-141 = "況且才剛加入這個行業的我，根本沒有理由把你們這些老手當成笨蛋。"
10032065-145 = "那傢伙從剛剛開始到底都在說什麼……？#n這還不是把我們當笨蛋？"
10032065-146 = "看到那個樣子，你還要我們相信你把頭目當成「委託人」嗎！？"
10032065-148 = "那個樣子……？什麼意思？"
10032065-149 = "這是為了讓移動更有效率的對策。#n從結果來看，不是確實達到了快速移動的目的嗎？"
10032065-150 = "這樣有什麼問題？"
10032065-152 = "……原來你是認真的啊。"
10032065-154 = "…………"
10032065-155 = "[s7]「如果是沙織的話有可能……如果是沙織的話……」\n[s8]「效率……效率是什麼呢……」"
10032065-158 = "嗯……"
10032065-159 = "傷腦筋，現在這個情況恐怕很難解開誤會……"
10032065-160 = "既然如此，只能叫醒本人親自作證了。"
10032065-161 = "喂，起來吧。我需要你起來說明我們的合作情況。"
10032065-162 = "……快起來。"
10032065-167 = "呃……唔嗯嗯……"
10032065-168 = "這，這傢伙竟敢……！！你剛才是打了頭目嗎！？"
10032065-170 = "……？？？"
10032065-171 = "不是，我沒有打他，只是想叫醒他而已……"
10032065-172 = "我再也等不下去了！反正對手只有一個人而已！！所有人攻擊！！"
10032065-173 = "攻擊攻擊！！"
10032065-178 = "為，為什麼……！！為什麼會變成這樣！？"
10032065-182 = "難道……"
10032065-183 = "難道我又落入陷阱了嗎……！！"
10032065-184 = "又受人利用之後遭到捨棄了嗎！！"
10032065-185 = "[s9]「雖然這次感覺有點不一樣……」\n[s10]「沙織……那個……」"
10032065-190 = "……呼。"
10032065-191 = "……遙香。"
10032065-192 = "是，是！亞瑠大人！！"
10032065-193 = "……準備戰鬥。#n我們現在要支援錠前沙織。"
10032065-194 = "是，是！"
10032065-199 = "……嗯？"
10032065-204 = "嗯？"
10032065-205 = "亞瑠醬，你剛剛說什麼？要支援？"
10032065-206 = "……社長？"
10032065-207 = "咦……怎麼回事……？那個人不是我們的敵人嗎……？"
10032065-208 = "啊，不是！我絕對不是在反問！#n我明白了！！現在馬上準備！！"
10032065-215 = "[ns11]「……亞瑠？」\n[ns12]「你要幫忙嗎？」"
10032065-218 = "……哼，稱之為幫忙似乎有點語病呢。"
10032065-219 = "我只是想完成委託而已。#n既然敵人跟敵人起了衝突，對我們而言不正是絕佳的機會嗎？"
10032065-220 = "我們沒理由不採取行動，這是經過徹底計算的策略。"
10032065-221 = "只要對自己有利，無論對方是誰都能聯手──這就是冷硬派的世界。"
10032065-222 = "雖然一小時前才說過既不會讓步也不會合作就是了～"
10032065-223 = "就，就說了這不是讓步或合作！完全只是「為了搶奪目標」而已！！"
10032065-224 = "……所以說……！"
10032065-225 = "[s13]「……謝謝你，亞瑠。」\n[s14]「居然那麼快就受到你的幫助了。」"
10032065-230 = "……呵呵，似乎閒聊太久了。"
10032065-231 = "那麼……"
10032065-232 = "所有人進攻！支援錠前沙織，這次一定要奪回阿蘭奇諾！！"
10032065-233 = "……突擊！！"

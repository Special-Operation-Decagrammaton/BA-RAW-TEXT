[translation]
10032065-8 = "ที่นี่สินะ ลานจอดรถใต้ดิน"
10032065-9 = "อืม... พวกสมุนที่จะนัดเจอกันยังไม่มาอีกเหรอ? รับมือช้ากว่าที่คิดไว้อีกนะ"
10032065-10 = "ไม่สิ นี่ไม่ใช่เวลาที่ฉันควรมาบ่นอยู่ ตอนนี้ต้องคุ้มกันผู้ว่าจ้างจนกว่าสมุนพวกนั้นจะมา"
10032065-11 = "โชคดีที่สภาพแวดล้อมเป็นแบบที่ฉันคุ้นเคยด้วย..."
10032065-15 = "......"
10032065-16 = "หน่วยรับจ้างสารพัด 68..."
10032065-17 = "มาถึงกันแล้วเหรอ แบบนี้ก็น่าลำบากใจแล้วสินะ"
10032065-18 = "[s1] \"อยู่ตรงนี้เองสินะ ซาโอริ\"\n[s2] \"เป็นอย่างที่คาโยโกะพูดไว้เลย\""
10032065-21 = "ครูก็มาด้วยเหรอ..."
10032065-28 = "เดี๋ยวก่อน..."
10032065-29 = "อะ... อะไรกัน...? แล้วอารันซิโนล่ะ...? อารันซิโนไปไหนแล้ว?"
10032065-30 = "แล้วห่อผ้าข้างหลังนั่นมันอะไรกันน่ะ?"
10032065-34 = "ถึงไม่น่าจะใช่ แต่ขอถามไว้ก่อนนะ..."
10032065-35 = "[s3] \"นั่นดอน อารันซิโนเหรอ?\"\n[s4] \"เอาผู้ว่าจ้างใส่กระสอบแล้วแบกขึ้นหลังมาเหรอ?\""
10032065-38 = "...?"
10032065-39 = "แล้วมันเป็นปัญหายังไง...?"
10032065-44 = "...?"
10032065-45 = "...?"
10032065-50 = "[ns] \"......?\""
10032065-55 = "กะ... ก็ดูเป็นวิธีที่มีประสิทธิภาพอยู่นะ..."
10032065-56 = "ฮ่าฮ่าฮ่าฮ่าฮ่า! สุดยอดไปเลยนะ! เป็นความคิดที่กล้าหาญมากเลย!!"
10032065-58 = "ไม่ละ แบบนี้ไม่โอเคเลยสักนิด วิธีนี้ฉันไม่ซื้อหรอก"
10032065-59 = "วะ... ว่าไงนะ? พูดเหมือนฉันทำอะไรผิดอย่างนั้นละ"
10032065-60 = "ครูก็ด้วย... ทำไมถึงอยู่กับหน่วยรับจ้างสารพัด 68 ตลอดเลยล่ะ?"
10032065-61 = "แล้วเรื่องสื่อการสอนล่ะถึงไหนแล้ว? หรือว่านี่ก็เป็นส่วนหนึ่งของการทำสื่อการสอนด้วย?"
10032065-63 = "นี่เธอล้อเล่นหรือถามจริงจังกันแน่...?"
10032065-64 = "มีปัญหากับเรื่องสามัญสำนึกรึเปล่า...?"
10032065-66 = "หืม...?"
10032065-67 = "ตอนนี้เรื่องนั้นมันไม่สำคัญงั้นเหรอ? หมายความว่ายังไง..."
10032065-79 = "......!"
10032065-80 = "ได้จังหวะพอดีเลย"
10032065-82 = "อะ... อะไรน่ะ...!? รถสีดำหลายคันกำลังวิ่งเข้ามาในนี้!"
10032065-83 = "วิธีนี้ยอดเยี่ยมไปเลย!"
10032065-85 = "เราช้าไปงั้นเหรอ..."
10032065-86 = "หะ... ให้ฉันจัดการ...!"
10032065-91 = "ใจเย็นก่อน ฮารุกะ ตอนนี้เราต้องดูสถานการณ์ก่อน"
10032065-92 = "รถพวกนั้นน่าจะเป็นสมุนที่มาพาตัวบอสกลับไป... พวกนั้นมากันเยอะกว่าที่เราจะสู้ไหวนะ"
10032065-100 = "ทุกคนมาได้ถูกจังหวะเลย ผู้ว่าจ้างอยู่นี่..."
10032065-106 = "ยกมือขึ้น! อย่าขยับ!! พวกเราล้อมไว้หมดแล้ว!!"
10032065-107 = "ส่งตัวบอสมาเสียดีๆ! แล้วฉันจะไว้ชีวิตเธอ!!"
10032065-111 = "หืม...?"
10032065-112 = "[ns5] \"ซาโอริโดนล้อมเหรอ...?\"\n[ns6] \"ทำไมถึงเล็งเป้ามาที่ซาโอริล่ะ...?\""
10032065-115 = "อะ... อะไรกัน? สถานการณ์นี้มัน...?"
10032065-116 = "เดี๋ยวก่อน ฉันว่ามีการเข้าใจผิดกันแล้วละ ฉันไม่ใช่ศัตรูของพวกคุณหรอกนะ"
10032065-117 = "ฉันได้รับงานจากผู้ว่าจ้างมา ก็เลยพาเขาหลบหนีมาถึงที่นี่ยังไงล่ะ"
10032065-118 = "ผู้ว่าจ้าง...? ผู้ว่าจ้างอะไรกัน? เธอหมายถึงใครกันแน่!!"
10032065-119 = "ถามมาได้ ก็..."
10032065-126 = "คนนี้ไง..."
10032065-127 = "คนคนนี้จ้างวานให้ฉันช่วยพาหลบหนีมาอย่างปลอดภัย นี่เป็นเรื่องที่ตกลงไว้ตั้งแต่แรกแล้ว"
10032065-128 = "......?"
10032065-129 = "หมายความว่ายังไง..."
10032065-132 = "พูดเรื่องเหลวไหลอะไรของเธอ!? จะให้พวกเราเชื่อคำพูดนั้นงั้นเรอะ!?"
10032065-134 = "...?"
10032065-135 = "ว่าไงนะ?"
10032065-136 = "พอถูกจับได้ก็พูดโกหกเพื่อหนีเอาตัวรอดสินะ คิดว่าพวกเราเป็นคนโง่รึไง!?"
10032065-137 = "ถ้าจะกุเรื่องโกหก ก็เอาให้มันสมเหตุสมผลหน่อยเถอะน่า!!"
10032065-139 = "เจอการตอบสนองที่เข้าใจยากอีกแล้ว... "
10032065-140 = "ทำไมถึงเป็นอย่างนี้ไปได้ล่ะ? ฉันไม่ได้ปฏิบัติกับใครเหมือนอีกฝ่ายเป็นคนโง่เลยนะ"
10032065-141 = "เด็กใหม่ที่เข้ามาทำงานในวงการนี้จะไปคิดว่ารุ่นพี่อย่างพวกคุณเป็นคนโง่ทำไมกัน"
10032065-145 = "ยัยเด็กนี่ พล่ามอะไรอยู่ได้...! ยังจะบอกอีกเรอะว่าไม่ได้ทำเหมือนเราเป็นคนโง่!?"
10032065-146 = "ทำให้บอสของเราอยู่ในสภาพนั้น แล้วยังจะกล้าบอกว่าบอสของเราเป็น 'ผู้ว่าจ้าง' อีก! จะให้พวกฉันเชื่อได้ยังไง!?"
10032065-148 = "สภาพนั้นงั้นเหรอ...? หมายความว่ายังไง?"
10032065-149 = "นี่เป็นวิธีการเคลื่อนไหวอย่างมีประสิทธิภาพต่างหาก แล้วมันก็ทำให้ผู้ว่าจ้างของฉันหลบหนีมาได้อย่าง#nรวดเร็ว"
10032065-150 = "พวกคุณมีปัญหาอะไรอย่างนั้นเหรอ?"
10032065-152 = "ทำเพื่อภารกิจขนาดนี้เลยสินะ..."
10032065-154 = "......"
10032065-155 = "[s7] \"ไม่แปลกหรอก... ถ้าเป็นซาโอริน่ะนะ...\"\n[s8] \"นี่สินะ... ที่เรียกว่ามีประสิทธิภาพ\""
10032065-158 = "อืม..."
10032065-159 = "งั้นก็ยุ่งแล้วละ เพราะตอนนี้ความเข้าใจผิดระหว่างกันดูเหมือนจะคลี่คลายไม่ได้..."
10032065-160 = "ถ้าเป็นแบบนี้ฉันก็คงต้องปลุกให้เจ้าตัวมายืนยันด้วยตัวเอง"
10032065-161 = "นี่ ลุกขึ้น ลุกขึ้นมาอธิบายสิว่าคุณเป็นผู้จ้างงานฉันมา"
10032065-162 = "ลุกขึ้น..."
10032065-167 = "อะ... อึก... เฮือก..."
10032065-168 = "ยัยเด็กนี่ กล้าดียังไง...!! เธอเตะบอสของพวกเราเหรอ??"
10032065-170 = "...???"
10032065-171 = "ไม่ได้เตะสักหน่อย ก็แค่จะปลุกให้เขาลุกขึ้น..."
10032065-172 = "ทนต่อไปไม่ไหวแล้ว! ยังไงฝ่ายตรงข้ามก็มีแค่คนเดียว!! ทุกคนโจมตีเลย!!"
10032065-173 = "โจมตีเต็มกำลัง!!"
10032065-178 = "อะ... อะไรน่ะ...!! ทำไมถึงมากันเยอะแบบนี้!?"
10032065-182 = "อย่าบอกนะว่า...!!"
10032065-183 = "อึก... เป็นแบบนี้เหรอ... ฉันติดกับอีกแล้วเหรอเนี่ย...!"
10032065-184 = "นี่ฉันถูกหลอกใช้แล้วถูกเฉดหัวทิ้งอีกแล้วเหรอ!!"
10032065-185 = "[s9] \"ครั้งนี้เหมือนจะต่างออกไปหน่อยนะ...\"\n[s10] \"ซาโอริ... คือว่า...\""
10032065-190 = "ฮู่ว..."
10032065-191 = "ฮารุกะ"
10032065-192 = "ค่ะ! ท่านอารุ!!"
10032065-193 = "เตรียมลุยได้เลย เราจะไปสนับสนุนโจมาเอะ ซาโอริกัน"
10032065-194 = "ค่ะ ได้เลยค่ะ!"
10032065-199 = "คะ...?"
10032065-204 = "หืม?"
10032065-205 = "อารุจัง เมื่อกี้ว่าอะไรนะ? ให้เตรียมลุยเหรอ?"
10032065-206 = "ประธาน...?"
10032065-207 = "เอ๋... แต่นั่นไม่ใช่ศัตรูของเราหรอกเหรอคะ...?"
10032065-208 = "มะ... ไม่ใช่นะคะ! ไม่ใช่! ฉันไม่ได้ถามซ้ำหรอกนะคะ! ระ... รับทราบค่ะ!! ฉันจะเตรียมตัวเดี๋ยวนี้ค่ะ!!"
10032065-215 = "[ns11] \"อารุ...?\"\n[ns12] \"จะเข้าไปช่วยเหรอ?\""
10032065-218 = "ฮึ่ม ช่วยอะไรกันล่ะ อย่าใช้คำที่ทำให้เข้าใจผิดสิ"
10032065-219 = "ฉันก็แค่จะทำภารกิจให้สำเร็จก็เท่านั้น ถ้าศัตรูกับศัตรูกำลังต่อสู้กันอยู่ ก็ถือว่าเป็นโอกาสของเราไม่ใช่#nเหรอ?"
10032065-220 = "เราไม่มีเหตุผลที่ต้องอยู่เฉยๆ อยู่แล้ว ถ้าทำอะไรเพื่อผลประโยชน์ได้ก็ต้องทำสิ"
10032065-221 = "ใช่ ถ้ามันเป็นประโยชน์ต่อเรา ไม่ว่าอีกฝ่ายจะเป็นใคร เราก็จับมือด้วยได้ตามสถานการณ์ นี่ละโลกของความร้ายกาจ"
10032065-222 = "แต่หนึ่งชั่วโมงที่แล้วยังบอกอยู่เลยนะว่า \"เราจะไม่หลีกทางให้คนอื่น และจะไม่ร่วมมือกับใครก็ตามที่#nเชื่อใจไม่ได้ด้วย\"~"
10032065-223 = "มะ... ไม่ใช่การหลีกทางให้หรือร่วมมือสักหน่อย! เป็นการทำเพื่อ 'ชิงตัวเป้าหมาย' ของเรามาต่างหาก!"
10032065-224 = "เพราะงั้น...!"
10032065-225 = "[s13] \"ขอบใจนะ อารุ\"\n[s14] \"ครูได้รับการตอบแทนแล้วละ\""
10032065-230 = "ฮุฮุ... เราพูดกันยาวไปแล้วละ"
10032065-231 = "กลับมาที่ภารกิจเถอะ..."
10032065-232 = "ทุกคนเข้าไปเลย! ไปสนับสนุนโจมาเอะ ซาโอริ แล้วชิงตัวดอน อารันซิโนมา!!"
10032065-233 = "โจมตีได้...!!"

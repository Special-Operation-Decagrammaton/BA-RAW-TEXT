[translation]
2005306-1 = "Ninja Girl Never Misses a Trend!"
2005306-3 = "[ns] \"Michiru?\""
2005306-8 = "Domo, Honorable Sensei. This is indeed Michiru."
2005306-12 = "[ns] \"Wh-Who are you?!\""
2005306-13 = "Eh?! What are you talking about?!"
2005306-14 = "What did I just say? I'm Michiru!"
2005306-15 = "[s1] \"Knocking, then entering politely...\"\n[s2] \"This isn't any 'Michiru' I know!\""
2005306-18 = "Ah! Just what kind of person do you think I am?!"
2005306-19 = "...N-No! Don't clarify. I think I know."
2005306-20 = "Anyway, for today!"
2005306-21 = "I prepared something called a \"briefing\"!"
2005306-22 = "[s] \"A briefing?\""
2005306-23 = "Heehee, that's right."
2005306-24 = "The \"Michiruchi, a Girl's Ninja Scroll Channel Growth Secrets and Roadmap Presentation Briefing\"...!"
2005306-25 = "What do you think, Honorable Sensei? Are you eagerly anticipating what I have to share?"
2005306-26 = "[s] \"Ah, so THIS is what that MomoTalk was about...\""
2005306-27 = "Exactly!"
2005306-28 = "My secret plan that relies on legitimate, very normal methods!"
2005306-29 = "Now then, without further delay, I'll begin my presentation!"
2005306-30 = "And we'll cut straight to the thrilling conclusion!"
2005306-31 = "[s] \"The conclusion? You've just started.\""
2005306-32 = "Well, uh, anyway!"
2005306-33 = "In conclusion, from now on I'll be incorporating more of the latest, hottest, newest, trendiest trends into my videos."
2005306-34 = "Even if it means I'm cutting down...on ninja-related topics!"
2005306-35 = "[s3] \"Cutting down on the ninja talk in a ninja channel...\"\n[s4] \"Are you sure that's okay?\""
2005306-38 = "Fufu, let's consider it a step back in order to ensure a great leap forward, Sensei. It's tactical!"
2005306-39 = "Just think about it. Why do you think people click on a video?"
2005306-40 = "It's...because they see the high view count!"
2005306-41 = "[s5] \"You're saying you need a high number of views to get high views...\"\n[s6] \"Michiru, you're not making sense.\""
2005306-44 = "I am! I just need to temporarily boost the views so that more people will see what all the fuss is about!"
2005306-45 = "As long as it's not illegal...like using programs to forge numbers...then I should employ any method possible!"
2005306-46 = "That way, people visiting the channel can watch without worrying about our legitimacy! And without questioning our morality."
2005306-47 = "To accomplish this, I have decided to upload videos that incorporate the latest trends!"
2005306-48 = "[s] \"And what kind of trends do you plan on incorporating?\""
2005306-49 = "Fufu, that's a good question, Honorable Sensei."
2005306-50 = "The trend I chose for this first installment is...\"fashion\"!"
2005306-51 = "[s] \"Fashion...?\""
2005306-52 = "Yeah. \"Fashion\" is a very hot topic right now."
2005306-53 = "I recently analyzed the \"Trending\" tab, and I'll have you know..."
2005306-54 = "All of the top videos were about fash-i-on!"
2005306-55 = "\"7 T-shirts That You'll Love,\" \"Coordinating Your Grenade With Your Flattering Colors,\" \"Coat Designs That Will Make Your Gun POP,\" and so on..."
2005306-56 = "And that's why I've planned a fashion-forward video!"
2005306-57 = "[s] \"Oh, what is it about?\""
2005306-58 = "It is..."
2005306-59 = "The intersection of fashion and ninjutsu, of course!"
2005306-60 = "I plan on coming up with several fashion-related ninjutsu. It'll be a series. I'll upload a video a week."
2005306-61 = "And, once I pull in as many subscribers as I can..."
2005306-62 = "Then I'll start trickling in real ninja content bit by bit...!"
2005306-63 = "And people will be charmed by the world of ninjutsu before they even know it! Full immersion. The trap will be set!"
2005306-64 = "...Like frogs caught in a gradually boiling pot of water!"
2005306-65 = "[s] \"What a scary analogy!\""
2005306-66 = "Anyway! That's my briefing, Sensei!"
2005306-67 = "As for how the story goes... I'm confident that the results will speak for themselves."
2005306-68 = "So stay tuned, Sensei. Keep watching, commenting, liking, and subscribing!"
2005306-69 = "I, Michiru, shall become a super popular influencer! And then you can be my manager!"
2005306-70 = "And that's it for today! Adios! Goodbye! PEACE!"
2005306-76 = "Despite the smoke bomb, I could tell which door she took."
2005306-78 = "A few days passed."
2005306-80 = "I was dealing with the usual pile of paperwork..."
2005306-81 = "Honorable Sensei..."
2005306-85 = "Help meee..."
2005306-86 = "[s7] \"Michiru! Are you successful yet? Shall I be your manager?\"\n[s8] \"Save me from this paperwork hell...!\""
2005306-89 = "No... I...was also looking for some help. You know, like I said."
2005306-90 = "[s] \"...Eh?\""
2005306-91 = "I tried uploading a video regarding fashion and...a little ninjutsu."
2005306-92 = "And the community's response is so bad that it's almost suspicious..."
2005306-93 = "I'm drowning in dislikes, even more than usual!"
2005306-94 = "[s] \"Is the video glitched? Have you read the comments?\""
2005306-95 = "...No."
2005306-96 = "I'm actually too scared to go on the page."
2005306-97 = "Which is why I'm here, Honorable Sensei... I wanted to ask you to...check out the page with me. "
2005306-98 = "[s] \"...If that's what you want, I'll help you.\""
2005306-99 = "Thank you, Honorable Sensei..."
2005306-101 = "I started reviewing Michiru's video..."
2005306-106 = "Classroom in Hyakkiyako Old Schoolhouse 38"
2005306-107 = "\"Michiruchi, A Girl's Ninja Scroll\"!"
2005306-108 = "Domo, Michiru here."
2005306-109 = "Today's ninjutsu topic is the \"Changing Clothes Technique\"! "
2005306-110 = "It's a practical secret technique that, once mastered, will empower you to change into even the fussiest of clothes in a flash!"
2005306-111 = "It must be seen to be believed!"
2005306-112 = "...And I'll show you how it's done!"
2005306-113 = "But, just in case..."
2005306-114 = "Hiyah!"
2005306-119 = "[ns] \"(She closed the camera's lens cap?!)\""
2005306-121 = "Tada!"
2005306-122 = "Look! I changed in an instant!"
2005306-123 = "Now then, let's talk about how this particular piece of ninjutsu works..."
2005306-124 = "...The lens cap stayed on until the end of the video."
2005306-125 = "Most of the uploaded video was a black screen."
2005306-126 = "Schale Office"
2005306-127 = "..."
2005306-128 = "[ns] \"...\""
2005306-129 = "Ah, I-I-I can't believe I made such an amateur mistake...!"
2005306-130 = "Aaaaaaah...!"
2005306-136 = "Perhaps because she was so flustered, Michiru departed without setting off her usual smoke bomb."

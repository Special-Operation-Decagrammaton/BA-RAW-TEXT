[translation]
2005306-1 = "忍者少女不落伍！"
2005306-3 = "[ns]「三千留？」"
2005306-8 = "你好，老師大人。我是三千留。"
2005306-12 = "[ns]「你，你是誰啊！？」"
2005306-13 = "咦！？為什麼是這個反應！？"
2005306-14 = "我剛才不是有說我是三千留嗎！？"
2005306-15 = "[s1]「居然這麼有禮貌地先敲門才進來……」\n[s2]「我的三千留才不會這樣！」"
2005306-18 = "唔喵啊！你平常到底是怎麼看待我的啊！？"
2005306-19 = "……算了，還是別說好了！我大概猜得到。"
2005306-20 = "總之，今天呢！"
2005306-21 = "本人我，可是準備了一份名為「簡報」的東西過來哦？"
2005306-22 = "[s]「簡報？」"
2005306-23 = "哼哼，沒錯！"
2005306-24 = "「少女忍法帖小小三千留頻道成長祕策及其藍圖之簡報」……！"
2005306-25 = "怎麼樣？老師大人也一直很期待這個主題吧？"
2005306-26 = "[s]「啊，之前在MomoTalk說的就是這個啊。」"
2005306-27 = "沒錯！"
2005306-28 = "不依賴旁門左道，完全從我腦袋裡想出來的祕策……！"
2005306-29 = "那麼，現在開始進行祕策簡報！"
2005306-30 = "首先從結論說起！"
2005306-31 = "[s]「一開始就說結論！？」"
2005306-32 = "那個……總，總之呢！"
2005306-33 = "反正結論就是，以後做影片的時候要融入更多流行元素！"
2005306-34 = "就算……必須稍微減少一些忍者相關的話題也是！"
2005306-35 = "[s3]「在忍者頻道減少忍者相關的話題……」\n[s4]「這樣真的沒問題嗎？」"
2005306-38 = "呵呵，就當作是為了前進十步而暫時後退一步吧。"
2005306-39 = "你想想看，很多人會點開影片來看的最大原因是什麼呢？"
2005306-40 = "那就是……很高的觀看次數！"
2005306-41 = "[s5]「為了創造很高的觀看次數，就需要很高的觀看次數……」\n[s6]「三千留，這樣討論不出結果啊。」"
2005306-44 = "不是！我的意思是要先把觀看次數衝高，才能吸引更多觀眾進來！"
2005306-45 = "只要不是使用造假程式之類的非法，都應該不擇手段地提升觀看次數才對！"
2005306-46 = "這樣第一次來到我們頻道的人，就能安心地觀賞影片了！"
2005306-47 = "為了達成這個目標，我才會決定上傳反映最新潮流的影片！"
2005306-48 = "[s]「那你打算融入什麼流行元素呢？」"
2005306-49 = "哼哼哼，這個問題問得真好呢，老師大人。"
2005306-50 = "我這次選擇的流行關鍵字就是……「時尚」！"
2005306-51 = "[s]「時尚……？」"
2005306-52 = "沒錯。現在最熱門的話題就是「時尚」。"
2005306-53 = "我前陣子分析了「人氣飆升影片」的清單……"
2005306-54 = "結果發現排名最前面的，全都是跟時尚有關的內容！"
2005306-55 = "比如「每天穿都不會膩的7種T恤」、「用個人色彩測出你的專屬手榴彈」、#n「尋找與你的槍最搭的大衣設計」等等……"
2005306-56 = "所以我也以時尚為主題，企劃了一支影片！"
2005306-57 = "[s]「哦？是什麼樣的內容？」"
2005306-58 = "不聽話的孩子……"
2005306-59 = "時尚與忍術的聯名合作！"
2005306-60 = "我打算構思能融合時尚的忍術，然後以每週一次的頻率進行更新！"
2005306-61 = "只要先用這些內容，盡可能吸引更多訂閱者……"
2005306-62 = "然後再不經意地開始上傳正宗的忍者內容的話……！"
2005306-63 = "人們就會在不知不覺之間，逐漸沉浸在忍者的魅力之中！"
2005306-64 = "就像待在溫水裡的青蛙一樣！"
2005306-65 = "[s]「這比喻也太可怕了吧！」"
2005306-66 = "總之！簡報就到此結束！"
2005306-67 = "之後的事……就用成果來證明吧！"
2005306-68 = "這次也要好好期待我的表現哦，老師大人！"
2005306-69 = "我三千留一定會成為超級知名的網紅，然後回來聘請老師大人當我的經紀人的！"
2005306-70 = "那今天就先這樣啦！Adios＝SAYONARA！"
2005306-76 = "（雖然他引爆了煙霧彈，不過完全能看出三千留是從哪邊離開的……）"
2005306-78 = "（幾天後）"
2005306-80 = "（今天也一如往常，正埋首處理堆積如山的公文時……）"
2005306-81 = "老師大人……"
2005306-85 = "救救我……"
2005306-86 = "[s7]「三千留！你果然凱旋歸來，要接我離開了嗎！」\n[s8]「快把我從這片公文地獄裡救出去吧……！」"
2005306-89 = "不是……我也是來找老師求救的……！"
2005306-90 = "[s]「……咦？」"
2005306-91 = "其實我這次上傳了以時尚和忍術為主題的影片。"
2005306-92 = "可是反應卻糟糕到不可思議……"
2005306-93 = "負評的數量居然是之前的好幾倍……！"
2005306-94 = "[s]「你有確認過留言或影片的內容嗎？」"
2005306-95 = "……沒有。"
2005306-96 = "因為我害怕到……連留言跟影片都不敢點開……"
2005306-97 = "所以才跑來找老師大人……想請你跟我一起看影片和留言…… "
2005306-98 = "[s]「如果你願意讓我看的話……我會幫你的。」"
2005306-99 = "拜託了，老師大人……"
2005306-101 = "（於是便開始檢視三千留的影片）"
2005306-106 = "百鬼夜行．第38舊校舍的某間教室"
2005306-107 = "少女忍法帖，小小三千留～"
2005306-108 = "大家好，我是三千留。"
2005306-109 = "那麼～今天要示範的忍術是「更衣之術」！ "
2005306-110 = "是個只要熟練掌握，就連複雜的衣服都能在瞬間換好的祕藏實用忍術哦！"
2005306-111 = "俗話說，百聞不如一見。"
2005306-112 = "就先由我來示範一下吧！"
2005306-113 = "不過為了以防萬一……"
2005306-114 = "嘿咻！"
2005306-119 = "[ns]（把攝影機的鏡頭蓋蓋上了！？）"
2005306-121 = "鏘鏘！"
2005306-122 = "請看！就像這樣，一瞬間就換好衣服囉！"
2005306-123 = "那麼接下來，我會開始說明這個忍術的原理……"
2005306-124 = "（……直到影片結束為止，鏡頭蓋都沒有再拿下來過）"
2005306-125 = "（也就是說，三千留上傳了一支絕大部分都是黑畫面的影片）"
2005306-126 = "夏萊辦公室"
2005306-127 = "……"
2005306-128 = "[ns]「……」"
2005306-129 = "唔啊啊啊，這，這，這種低級的錯誤……！"
2005306-130 = "唔，唔喵啊啊……！"
2005306-136 = "（……或許是因為太過慌張，三千留沒有像平時一樣引爆煙霧彈，而是直接消失了。）"

[translation]
2005306-1 = "สาวนินจาไม่ตกเทรนด์หรอก!"
2005306-3 = "[ns] \"มิจิรุ?\""
2005306-8 = "โดโมะ ท่านอาจารย์ ข้าน้อยมิจิรุเองค่ะ"
2005306-12 = "[ns] \"คะ... ใครเนี่ย?!\""
2005306-13 = "เอ๋?! ทำไมพูดอย่างนั้นล่ะ?!"
2005306-14 = "ก็เพิ่งบอกไปว่าข้าน้อยคือมิจิรุไง?!"
2005306-15 = "[s1] \"ก็เห็นเคาะประตูแล้วเข้ามาอย่างสุภาพเลย...\"\n[s2] \"ปกติมิจิรุของครูไม่เป็นแบบนี้หรอกนะ!\""
2005306-18 = "ว้ากก! ที่ผ่านมาคิดว่าข้าน้อยเป็นคนยังไงน่ะ?!"
2005306-19 = "มะ... ไม่ดีกว่า ไม่ต้องพูดเลย! ข้าน้อยพอรู้คำตอบแล้วละ"
2005306-20 = "แต่ก็เอาเถอะ เข้าประเด็นของวันนี้กันดีกว่า!"
2005306-21 = "วันนี้ข้าน้อยคนนี้เตรียม 'การบรรยายสรุป' มาเลยนะ!"
2005306-22 = "[s] \"บรรยายสรุปงั้นเหรอ?\""
2005306-23 = "ฮุฮุ ใช่แล้ว"
2005306-24 = "มันก็คือ <การบรรยายสรุปเกี่ยวกับเคล็ดลับและวิสัยทัศน์ในการพัฒนาช่องวิถีนินจาสาว มิจิรุจจี้> ยังไงล่ะ...!"
2005306-25 = "เป็นไงล่ะ? นั่นเป็นหัวข้อที่ท่านอาจารย์ก็รออยู่เลยใช่มั้ย?"
2005306-26 = "[s] \"อ้อ ที่บอกทาง MOMOTALK คราวก่อนคือเรื่องนี้สินะ\""
2005306-27 = "ใช่แล้วละ!"
2005306-28 = "เคล็ดลับที่มาจากมันสมองของข้าน้อย โดยไม่ต้องหวังพึ่งวิธีประหลาดๆ...!"
2005306-29 = "เอาละ มาฟังการบรรยายสรุปเคล็ดลับนั้นกันเลย!"
2005306-30 = "ขอเข้าข้อสรุปเลยนะ!"
2005306-31 = "[s] \"จะเริ่มด้วยข้อสรุปเลยงั้นเหรอ?!\""
2005306-32 = "อ่า... อะ... เอาเถอะน่า!"
2005306-33 = "สรุปเลยก็คือ ต่อไปถ้าข้าน้อยจะทำวิดีโอที่สอดแทรกเทรนด์ล่าสุดเข้าไปให้มากขึ้น!"
2005306-34 = "ต่อให้ต้องลดเรื่องราว... เกี่ยวกับนินจาไปสักเล็กน้อยก็เถอะ!"
2005306-35 = "[s3] \"เป็นช่องเกี่ยวกับนินจา แต่จะลดเรื่องเกี่ยวกับนินจาเหรอ...\"\n[s4] \"ถ้าตัดเรื่องเกี่ยวกับนินจาออก จะไม่เป็นไรเหรอ?\""
2005306-38 = "ฮุฮุ เราต้องถอยหลัง 1 ก้าว เพื่อเดินหน้าไปอีก 10 ก้าวสิ ท่านอาจารย์"
2005306-39 = "ลองคิดดูนะ ท่านอาจารย์คิดว่าอะไรคือเหตุผลสำคัญที่สุดที่ทำให้คนเข้ามาดูคลิปวิดีโอเหรอ?"
2005306-40 = "มันก็คือ... ยอดวิวสูงๆ ไงล่ะ!"
2005306-41 = "[s5] \"ต้องมียอดวิวสูงๆ เพื่อจะเพิ่มยอดวิวให้ได้สูงๆ งั้นเหรอ...\"\n[s6] \"มิจิรุ อย่าบอกนะว่านึกถึงการซื้อยอดวิว\""
2005306-44 = "ฟังก่อนสิ! ที่ข้าน้อยจะสื่อก็คือ เราต้องทำให้วิดีโอมียอดวิวสูงๆ ไว้ก่อน จะได้ยิ่งดึงคนเข้ามาดูเพิ่ม!"
2005306-45 = "แต่สิ่งที่สำคัญก็คือ เราต้องเพิ่มยอดวิวอย่างไม่เลือกวิธี เว้นแต่จะเป็นวิธีที่ผิดกฎหมาย อย่างเช่นการใช้โปรแกรมดัดแปลงต่างหากล่ะ!"
2005306-46 = "แล้วคนที่เข้ามาดูช่องเป็นครั้งแรกก็จะวางใจและรับชมวิดีโอได้อย่างมั่นใจด้วย!"
2005306-47 = "เพราะงั้นข้าน้อยก็เลยตัดสินใจว่าจะอัปโหลดวิดีโอที่เกาะกระแสล่าสุด!"
2005306-48 = "[s] \"จะเกาะกระแสเรื่องอะไรเหรอ?\""
2005306-49 = "ฮุฮุ ถามได้ดีเลยละ ท่านอาจารย์"
2005306-50 = "คีย์เวิร์ดของกระแสที่ข้าน้อยเลือกมาใช้ในครั้งนี้ก็คือ... 'แฟชั่น' ยังไงล่ะ!"
2005306-51 = "[s] \"แฟชั่น...?\""
2005306-52 = "ใช่แล้ว ก็ 'แฟชั่น' เป็นเรื่องที่ชาวเน็ตให้ความสนใจกันมากนี่นา"
2005306-53 = "ที่จริงไม่นานมานี้ข้าน้อยลองไปวิเคราะห์ลิสต์ <วิดีโอยอดนิยม> มาด้วยละ"
2005306-54 = "และวิดีโอที่อยู่อันดับต้นๆ ก็เป็นเรื่องเกี่ยวกับแฟชั่นทั้งหมดเลย!"
2005306-55 = "ทั้ง <เสื้อยืด 7 แบบที่ใส่ทุกวันก็ไม่เบื่อ> <ระเบิดมือตามสีประจำตัวของคุณ> แล้วก็ <เสื้อโค้ทในดีไซน์ที่เหมาะกับปืนของคุณ>"
2005306-56 = "ข้าน้อยก็เลยวางแผนว่าจะทำวิดีโอที่เกี่ยวกับแฟชั่นดูบ้างน่ะ!"
2005306-57 = "[s] \"โอ้ แล้วจะให้ออกมาเป็นยังไงเหรอ?\""
2005306-58 = "ก็จะให้เป็น..."
2005306-59 = "การผสมผสานระหว่างแฟชั่นกับศาสตร์นินจา!"
2005306-60 = "ข้าน้อยจะคิดหาศาสตร์นินจาที่ได้แรงบันดาลใจมาจากแฟชั่น แล้วอัปโหลดวิดีโอสัปดาห์ละครั้ง!"
2005306-61 = "แล้วก็จะใช้คอนเทนต์นี้ดึงดูดผู้ติดตามให้ได้เยอะๆ เลย..."
2005306-62 = "จากนั้นก็ค่อยๆ อัปโหลดคอนเทนต์เกี่ยวกับนินจาให้มากขึ้น..."
2005306-63 = "แล้วผู้คนจะค่อยๆ หลงใหลในเสน่ห์ของนินจาโดยไม่รู้ตัวยังไงล่ะ!"
2005306-64 = "น้ำหยดลงหินทุกวัน หินยังกร่อนเลยไม่ใช่เหรอ! ได้เห็นนินจาบ่อยเข้าๆ เดี๋ยวก็ชอบไปเองละ"
2005306-65 = "[s] \"ดูพูดเปรียบเทียบเข้าสิ!\""
2005306-66 = "เอาเถอะน่า! เอาเป็นว่าข้าน้อยของจบการบรรยายสรุปเพียงเท่านี้!"
2005306-67 = "ส่วนเรื่องหลังจากนี้จะเป็นยังไง... ข้าน้อยจะพิสูจน์ให้เห็นด้วย 'ผลลัพธ์' เอง!"
2005306-68 = "เพราะงั้นครั้งนี้ก็ตั้งตารอด้วยนะ ท่านอาจารย์!"
2005306-69 = "ข้าน้อยมิจิรุคนนี้! จะกลายเป็นอินฟลูเอนเซอร์ชื่อดัง แล้วจะมาทาบทามให้ท่านอาจารย์มาเป็นผู้จัดการ#nส่วนตัวให้เลยละ!"
2005306-70 = "งั้นวันนี้ขอตัวก่อนละ! อาดิโอส ซาโยนาระ!"
2005306-76 = "(ถึงมิจิรุจะหายตัวไปพร้อมระเบิดควัน แต่คุณครูก็พอเดาได้ว่าหายไปทางไหน...)"
2005306-78 = "(ไม่กี่วันหลังจากนั้น)"
2005306-80 = "(ในขณะที่คุณครูกำลังจัดการเอกสารกองโตเท่าภูเขาเหมือนทุกวัน...)"
2005306-81 = "ท่านอาจารย์..."
2005306-85 = "ช่วยข้าน้อยด้วย..."
2005306-86 = "[s7] \"มิจิรุ! โด่งดังจนมาชวนครูไปทำงานด้วยแล้วสินะ!\"\n[s8] \"ช่วยพาครูออกจากขุมนรกแห่งเอกสารนี้ที...\""
2005306-89 = "เปล่านะ... ข้าน้อยมาเพื่อขอให้ท่านอาจารย์ช่วยต่างหาก...!"
2005306-90 = "[s] \"หืม...?\""
2005306-91 = "ข้าน้อยอัปโหลดวิดีโอเกี่ยวกับศาสตร์นินจาและแฟชั่นไปน่ะ"
2005306-92 = "แต่ว่าผลตอบรับออกมาไม่ค่อยดีเท่าไร..."
2005306-93 = "มีคนกดไม่ถูกใจเยอะกว่าวิดีโอเก่าๆ ตั้งหลายเท่าเลยน่ะสิ...!"
2005306-94 = "[s] \"ไปดูวิดีโอแล้วอ่านคอมเมนต์มางั้นเหรอ?\""
2005306-95 = "เปล่าหรอก..."
2005306-96 = "ที่จริงข้าน้อยกลัวจนไม่กล้ากดเข้าไปดูเลยด้วยซ้ำ..."
2005306-97 = "ข้าน้อยก็เลยมาหาท่านอาจารย์... เพราะอยากให้ช่วยดูวิดีโอและอ่านคอมเมนต์ด้วยกันน่ะ... "
2005306-98 = "[s] \"ถ้าให้ครูดูด้วยได้... ครูก็เต็มใจช่วยนะ\""
2005306-99 = "รบกวนด้วยนะ ท่านอาจารย์..."
2005306-101 = "(แล้วคุณครูก็เริ่มตรวจสอบวิดีโอของมิจิรุ)"
2005306-106 = "ห้องเรียนแห่งหนึ่งในอาคารเรียนเก่าที่ 38 เฮียกคิยาโค"
2005306-107 = "วิถีนินจาสาว มิจิรุจจี้~"
2005306-108 = "โดโมะ ข้าน้อยมิจิรุเองค่ะ"
2005306-109 = "เอาละ ศาสตร์นินจาที่จะสาธิตให้ดูในวันนี้ก็คือ <วิชาเปลี่ยนเสื้อผ้า>! "
2005306-110 = "นี่คือวิชาลับเฉพาะที่ทำให้เราเปลี่ยนเสื้อผ้าที่ซับซ้อนได้ในพริบตา!"
2005306-111 = "แต่สิบปากว่าก็ไม่เท่าตาเห็น"
2005306-112 = "งั้นข้าน้อยจะสาธิตให้ได้ดูกันเลย!"
2005306-113 = "แต่เพื่อเตรียมพร้อมในกรณีฉุกเฉิน..."
2005306-114 = "ฮึบบ!"
2005306-119 = "[ns] (ปิดฝาครอบเลนส์กล้องเหรอ?!)"
2005306-121 = "ท้าดา!"
2005306-122 = "นี่ไง! ข้าน้อยเปลี่ยนชุดมาในพริบตาเลย!"
2005306-123 = "เอาละ ต่อไปจะเป็นการพูดถึงหลักการของศาสตร์นินจานี้..."
2005306-124 = "(มิจิรุลืมถอดฝาครอบเลนส์จนกระทั่งวิดีโอจบลง...)"
2005306-125 = "(ภาพส่วนใหญ่ในวิดีโอจึงเป็นสีดำ แต่ก็อัปโหลดไปทั้งอย่างนั้น)"
2005306-126 = "สำนักงานชาเล่ต์"
2005306-127 = "..."
2005306-128 = "[ns] \"......\""
2005306-129 = "อ๊าาาาา ทะ... ทะ... ทำไมข้าน้อยถึงทำพลาดเหมือนเป็นมือสมัครเล่นแบบนี้นะ...!"
2005306-130 = "วะ... ว้ากกกก...!"
2005306-136 = "(อาจเป็นเพราะตกใจมากเกินไป มิจิรุจึงหายตัวไปแบบไม่ได้จุดระเบิดควันอย่างทุกครั้ง...)"

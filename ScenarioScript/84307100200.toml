[translation]
84307100200-5 = "กลับมาแล้วเหรอ เนรุ มีงานที่ต้องทำเพิ่มอีกอย่างพอดีเลย"
84307100200-9 = "หา...? นี่ฉันเพิ่งจะมาถึงเองนะ?"
84307100200-10 = "ถึงฉันจะบอกเองกับปากว่าจะช่วยก็เถอะ... แต่ใช้งานฉันมากเกินไปแล้วหรือเปล่า?"
84307100200-11 = "แล้วเซอาล่ะ...? อย่าบอกนะว่าจะใช้งานฉันคนเดียวน่ะ?"
84307100200-12 = "ไม่หรอก ฉันให้งานที่เหมาะสมกับเซอาไปอยู่เหมือนกัน และแน่นอนว่าฉัน... ก็รู้ว่าเธอทำงานหนัก"
84307100200-13 = "ฉันรู้อยู่แก่ใจ... แต่งานครั้งนี้ฉันไม่อาจฝากให้ยูริโซโนะ เซอารับผิดชอบได้น่ะ"
84307100200-14 = "งานครั้งนี้...? มันคืออะไรเหรอ? หรือว่าต้องไปต่อสู้อะไรอีก?"
84307100200-15 = "อื้อ"
84307100200-19 = "โอเค งั้นก็คงช่วยไม่ได้"
84307100200-20 = "เข้าใจได้เร็วจังเลยนะ..."
84307100200-21 = "ก็มันเป็นเรื่องที่ควรเข้าใจนี่นา ทำไม? อยากให้ฉันพูดอะไรให้มากความอย่างนั้นเหรอ?"
84307100200-22 = "ไม่หรอก"
84307100200-23 = "ที่สำคัญกว่านั้น... คือของชิ้นนี้น่ะ"
84307100200-24 = "นี่มันอะไรเหรอ...?"
84307100200-28 = "หืม? สนับเข่านี่นา เป็นสิ่งประดิษฐ์อย่างหนึ่งในงานเหรอ?"
84307100200-29 = "มันไม่ได้ถูกสร้างขึ้นมาด้วยเทคโนโลยีสมัยใหม่อะไรหรอก แต่มันก็มาพร้อมคุณสมบัติพิเศษบางอย่าง"
84307100200-30 = "เมื่อใส่สนับเข่าอันนี้ มันจะทำให้เราไปถึงจุดหมายได้ด้วยการขยับเพียงครั้งเดียว และตอนเคลื่อนไหวก็ไม่เกิดเสียงด้วย"
84307100200-34 = "ส่วนอันนี้..."
84307100200-39 = "คือแผ่นรองพิเศษที่ช่วยเก็บเสียงเมื่อยิงเป้าหมายในระยะประชิด ดูจากรูปแบบการโจมตีของเธอแล้ว ฉันว่านี่น่าจะเป็นประโยชน์น่ะ"
84307100200-40 = "แหะๆ... ของเล่นพวกนี้น่าสนุกดีนี่ ไม่เลวเลย"
84307100200-44 = "ถ้าให้ของพวกนี้ฉัน... ก็แปลว่าฉันเอาไปใช้ในงานครั้งนี้ได้ใช่มั้ย?"
84307100200-45 = "แน่นอน ที่ฉันให้ก็เพราะแบบนี้ละ"
84307100200-48 = "ภารกิจก็ไม่ซับซ้อนหรอก มีรายงานว่าพบการเคลื่อนไหวของคนที่แอบเข้าไปในงานเอ็กซ์โป และพยายามขโมยของที่จัดแสดงไว้ เราต้องหาตัวคนพวกนั้นแล้วจัดการให้เรียบร้อย"
84307100200-54 = "เป้าหมายของเราคือหัวหน้าของคนพวกนั้น ถ้าจับหัวหน้าไม่ได้ ก็คงถอนรากถอนโคนพวกนั้นไม่ได้ เพราะงั้นพวกเราก็เลยต้องได้ตัวหัวหน้ามา"
84307100200-57 = "แล้วลูกน้องคนอื่นล่ะ? ให้ฉันจัดการให้หงายได้เลยใช่มั้ย?"
84307100200-58 = "แค่ไม่ต้องยิงก็พอ"
84307100200-59 = "แหะๆ... ชักจะตื่นเต้นแล้วสิ การต่อสู้มือเปล่าก็น่าจะสนุกไปอีกแบบนะ"
84307100200-60 = "จริงๆ ฉันไม่กังวลอะไรเลย แต่ยังไงก็คงต้องพูดตามมารยาทว่าให้ระมัดระวังด้วย"
84307100200-61 = "ถ้าบอกว่าพูดไปตามมารยาท งั้นความเป็นห่วงนั่นก็ไม่มีความหมายหรอก"
84307100200-62 = "เฮ้อ... ช่างเถอะ แค่เธอรู้สึกเป็นห่วงใครบ้างก็ถือว่าก้าวหน้าแล้วละนะ"
84307100200-66 = "งั้นเดี๋ยวฉันกลับมา รออยู่ที่นี่ล่ะ"
84307100200-68 = "ระวังตัวด้วยนะ..."

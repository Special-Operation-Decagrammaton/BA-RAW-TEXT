[translation]
84307100200-5 = "Welcome, Neru. I have a new task for you."
84307100200-9 = "Seriously? I just got here!"
84307100200-10 = "You think you can just boss me around? I did say I'd help, but..."
84307100200-11 = "...What about Seia? You're not singling me out here, right? You've got something for her too?"
84307100200-12 = "Yurizono Seia is already out on task, doing what she can. Just as I'm doing what I can here. And I'm very grateful for all your hard work and contributions."
84307100200-13 = "But this task, I can't leave to her. It has to be you this time."
84307100200-14 = "Why, is it a combat mission or something?"
84307100200-15 = "It is, yes."
84307100200-19 = "Okay, that tracks."
84307100200-20 = "...You're quick to understand."
84307100200-21 = "Well, you got right to the point. I'm not going to argue when you're making sense, unless you want me to."
84307100200-22 = "I don't."
84307100200-23 = "Anyway...here, take these."
84307100200-24 = "...? What are they?"
84307100200-28 = "Knee pads? Are they special? Did you invent them?"
84307100200-29 = "It's not new technology, but they do have a special feature built in."
84307100200-30 = "They'll let you slide across the room with a single movement, without making noise."
84307100200-34 = "And this too..."
84307100200-39 = "You can use it to shock and subdue your target, again without making noise. I thought it might come in handy for you."
84307100200-40 = "Heh... That's a lot of fun toys to play with. Not bad."
84307100200-44 = "And I can use them right away for this mission, right?"
84307100200-45 = "Of course. That's why I gave them to you."
84307100200-48 = "The mission is simple. I've located people trying to sneak into the Expo venue and steal exhibits. I need you to take them out."
84307100200-54 = "Our primary target is their leader. They won't stop as long as she's still standing. Drop her, then take her to the authorities for questioning."
84307100200-57 = "What about the rest? I can just beat them up and leave them KO'd, right?"
84307100200-58 = "As long as you don't fire any shots."
84307100200-59 = "Heh... All right, close quarters combat all the way this time. Fun!"
84307100200-60 = "Not that I'm worried about you, but I should say, \"Be careful and stay safe.\""
84307100200-61 = "It doesn't mean anything when you put it like that..."
84307100200-62 = "...but it's an improvement, coming from you, so I'll take it."
84307100200-66 = "I'll be on my way, then. Just wait here for me."
84307100200-68 = "...Stay safe."

[translation]
84307100200-5 = "你來得正好，寧瑠。#n正巧又發生了一件事。"
84307100200-9 = "……啊？我才剛來而已耶？"
84307100200-10 = "你是不是把我使喚得太理所當然了啊？#n雖然我是說過願意幫忙啦……"
84307100200-11 = "……聖亞呢？你該不會只叫我一個人工作吧？"
84307100200-12 = "他正在執行適合他的工作。我自己也是一樣……#n我當然也能體會你的辛苦。"
84307100200-13 = "但你應該能夠理解才對……這件事實在無法交給百合園聖亞。"
84307100200-14 = "這件事……？#n難道需要戰鬥嗎？"
84307100200-15 = "沒錯。"
84307100200-19 = "OK，那就沒辦法了。"
84307100200-20 = "……理解得真快呢。"
84307100200-21 = "因為你的說明很好理解啊。#n怎麼？難不成你希望我慢慢鋪陳，再說點好聽的場面話？"
84307100200-22 = "我沒有這個意思。"
84307100200-23 = "話說回來……這個給你。"
84307100200-24 = "……這是什麼？"
84307100200-28 = "護膝？這也是新發明嗎？"
84307100200-29 = "雖然沒有應用新的技術，但確實具備了特殊功能。"
84307100200-30 = "只要一個動作就能快速移動到目標地點，滑行時也不會發出巨大的聲響。"
84307100200-34 = "還有這個也是……"
84307100200-39 = "這個特殊墊片能在你近距離制伏目標時安靜地傳遞衝擊。#n考慮到你的行動特性，我認為應該會有幫助。"
84307100200-40 = "嘿……這些玩具還挺不錯的嘛。"
84307100200-44 = "把這些東西給我的意思……是我馬上拿來用也沒關係嗎？"
84307100200-45 = "當然。那就是我把它們交給你的目的。"
84307100200-48 = "任務很簡單──我發現有人潛入了博覽會會場，試圖偷走展品。#n必須逮住他們，將其一網打盡。"
84307100200-54 = "目標是他們的隊長。#n只有抓到隊長才能杜絕這種行為，所以務必要把隊長抓回來。"
84307100200-57 = "其他人呢？全部打倒也可以嗎？"
84307100200-58 = "只要不開槍都沒問題。"
84307100200-59 = "嘿……挺讓人期待的嘛。#n畢竟肉搏戰也有肉搏戰的樂趣。"
84307100200-60 = "雖然我根本不擔心你，但還是說句客套話吧──路上小心。"
84307100200-61 = "自己說是客套話就沒意義了吧……"
84307100200-62 = "……算了。#n你光是能那麼說，就已經是很大的進步了。"
84307100200-66 = "那我去去就回，你在這裡等著吧。"
84307100200-68 = "……路上小心。"

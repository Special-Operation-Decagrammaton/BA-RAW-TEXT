[translation]
1006103-1 = "ตามเทรนด์"
1006103-3 = "(คุณครูออกมาย่านการค้าเพื่อซื้อของใช้สำนักงานของชาเล่ต์)"
1006103-4 = "(ท่ามกลางร้านค้าเรียงราย คุณครูเห็นซากุระโกะยืนดูตู้โชว์สินค้าอยู่หน้าร้านเครื่องประดับ)"
1006103-8 = "อืมมม... อืม..."
1006103-12 = "ฮืมม อันนี้... อืม ไม่ดีกว่าค่ะ ไม่ๆ..."
1006103-13 = "...ฮึ่มม"
1006103-14 = "[s1] \"หวัดดี ซากุระโกะ\"\n[s2] \"มาทำอะไรอยู่ตรงนี้เหรอ?\""
1006103-19 = "...!? อื้ม!? อ๊ะ คะ... คุณครู!? สะ... สงบสุขดีหรือเปล่าคะ......!!"
1006103-20 = "...คะ? ฉันเหรอคะ?"
1006103-21 = "ฉันก็แค่เดินผ่านมาแถวนี้... ก็เลย..."
1006103-22 = "พอดีมีเรื่องกวนใจฉันอยู่นิดหน่อย ก็เลยดูของในร้านอยู่น่ะค่ะ ใช่ค่ะ"
1006103-23 = "ที่จริงฉันอยากจะลองเปลี่ยนผ้าคลุมหัว... หรือไม่ก็เครื่องประดับที่ใช้อยู่น่ะค่ะ"
1006103-27 = "อ๊ะ ไม่ใช่ว่าฉันมีงานอดิเรกอะไรแบบนั้นหรอกนะคะ"
1006103-28 = "ก็แค่..."
1006103-29 = "เอ่อ... ฉันไม่รู้ว่าคุณครูจะคิดยังไง..."
1006103-36 = "แต่มันก็มีเรื่องแบบนั้นอยู่นี่คะ ที่คนอื่นเขาทำกัน แต่ถ้าฉันไม่ทำอยู่คนเดียว..."
1006103-37 = "ก็จะเรียกว่าไม่ทันกระแส... แบบนั้นน่ะค่ะ"
1006103-38 = "[s3] \"อ้อ แบบนั้นเอง\"\n[s4] \"เรื่องเทรนด์ใช่มั้ย?\""
1006103-41 = "ปกติแล้วฉันมักจะอยู่ในวิหาร และถ้ามีเรื่องที่ต้องออกไปข้างนอก ซิสเตอร์คนอื่นจะเป็นคนไปค่ะ"
1006103-42 = "จริงๆ ฉันก็อยากอยู่ด้วยกันกับทุกคน"
1006103-43 = "แต่ว่ายังไงก็ต้องมีใครสักคนอยู่ดูแลงานและวิหารน่ะค่ะ"
1006103-44 = "พอเป็นแบบนั้น ฉันเลยไม่ค่อยทันกับความเป็นไปของภายนอกวิหารน่ะค่ะ"
1006103-45 = "ฉันได้แต่ฟังที่ซิสเตอร์คนอื่นเค้าพูดกัน แล้วก็จินตนาการเพื่อทำความเข้าใจในแบบของตัวเองค่ะ"
1006103-46 = "ถึงแม้บางครั้ง จินตนาการนั้นจะแตกต่างไปจากความจริงนิดหน่อยก็เถอะค่ะ"
1006103-50 = "คือ..."
1006103-51 = "มันเหมือนกับ MOMOTALK ที่ฉันส่งให้คุณครูตอนเช้า..."
1006103-52 = "[s5] \"งะ... งั้นเองเหรอ มันก็... เป็นไปได้นะ\"\n[s6] \"ไม่เป็นไรหรอก มันก็แปลกใหม่ดี\""
1006103-55 = "ฮุฮุ ฉันรู้สึกได้ถึงความเอาใจใส่จากคำพูดของคุณครูเลยละค่ะ"
1006103-56 = "ขอบคุณนะคะคุณครู"
1006103-57 = "ฉันว่าจะเลือกเครื่องประดับน่ะค่ะ จริงๆ ฉันว่าชิ้นไหนก็ได้ทั้งนั้น..."
1006103-58 = "ว่าแต่ คุณครูพอจะรู้บ้างมั้ยคะว่าช่วงนี้เครื่องประดับหรือดีไซน์แบบไหนกำลังเป็นที่นิยม?"
1006103-59 = "ฉันตามเทรนด์ไม่ค่อยทันน่ะค่ะ ถ้าคุณครูพอรู้บ้าง ช่วยบอกฉันหน่อยได้มั้ยคะ?"
1006103-63 = "อ๊ะ งั้นเหรอคะ?"
1006103-64 = "ก็ไม่น่าแปลกหรอกค่ะ คุณครูเองก็งานรัดตัวขนาดนี้"
1006103-68 = "ต้องขอโทษด้วยจริงๆ ค่ะ"
1006103-69 = "ฉันไม่อยากรบกวนเวลาที่มีค่าของคุณครูอีก ถ้างั้นฉันเลือกเอง..."
1006103-76 = "คุณลูกค้าครับ? เห็นยืนดูสินค้าในตู้มาสักพักแล้ว ไม่ทราบว่าหาชิ้นไหนเป็นพิเศษหรือเปล่าครับ?"
1006103-77 = "อ้อ... เอ่อ... ขอโทษที่ยืนเกะกะนะคะ"
1006103-78 = "ฉันแค่... ยังเลือกไม่ได้น่ะค่ะ..."
1006103-79 = "ก็อย่างที่เห็นค่ะ ฉันไม่ค่อยเชี่ยวชาญทางด้านนี้สักเท่าไร..."
1006103-83 = "...อะฮ่า!"
1006103-85 = "ถ้าเรื่องนั้นไม่ต้องกังวลไปนะครับ!"
1006103-90 = "ผมจะช่วยหาเครื่องประดับที่เหมาะกับคุณลูกค้าให้เองครับ!"
1006103-95 = "เข้าไปข้างในก่อนมั้ยครับ? สไตล์ของคุณลูกค้าเข้ากับเครื่องประดับได้หลายชิ้นเลยครับ แต่ก็มีบาง#nชิ้นที่เหมาะเจาะอย่างที่สุดเลย!!"
1006103-96 = "คะ? คะ? ดะ... เดี๋ยวก่อนสิคะ เดี๋ยว...!?"
1006103-101 = "อะ... เอ๋...!? เอ๋???!?"
1006103-106 = "[ns7] ปล่อยให้เข้าไปคนเดียวคงไม่ดี ตามไปดีกว่า\n[ns8] โดนลากเข้าไปแบบนั้นก็น่ารักดี แต่ตามไปดูหน่อยดีกว่า"
1006103-114 = "(คุณครูตามซากุระโกะและเจ้าของร้านเข้าไปในร้าน)"
1006103-121 = "(เจ้าของร้านเชียร์เครื่องประดับให้ซากุระโกะหลายชิ้นจนซากุระโกะทำตัวไม่ถูก พอคุณครูเห็นว่าเธอ#nทำปากเบะเหมือนจะร้องไห้ก็เลยพาตัวซากุระโกะออกมา)"
1006103-126 = "เฮ้อ วันนี้ฉันใช้พลังงานไปเยอะเลยละค่ะ..."
1006103-127 = "วันนี้ต้องขอบคุณมากๆ นะคะคุณครู"
1006103-128 = "ถ้าคุณครูไม่อยู่ด้วยละก็... แค่จินตนาการดู ฉันก็กลัวแล้วค่ะ"
1006103-129 = "การตามเทรนด์ให้เหมือนคนอื่นไม่ใช่เรื่องง่ายสำหรับฉันเลยค่ะ"
1006103-130 = "...คะ? ไม่จำเป็นต้องตามเทรนด์เหมือนคนอื่นก็ได้เหรอคะ?"
1006103-131 = "ตะ...แต่ว่า... แต่ฉันเป็นซิสเตอร์นะคะ ถ้าจะเข้าใจคนอื่น ก็ต้องเข้าใจความเป็นไปของสังคมด้วย..."
1006103-132 = "[s9] \"เสมอต้นเสมอปลายแบบนี้แหละดีแล้ว\"\n[s10] \"คนแบบนั้นคือที่ปลอบใจและเป็นที่พึ่งพิงที่ดีเลยละ\""
1006103-135 = "คุณครู..."
1006103-136 = "ฮุฮุ ฮุฮุฮุ"
1006103-137 = "เข้าใจแล้วค่ะ พอคุณครูพูดแบบนี้ฉันก็รู้สึกดีขึ้นมาเลยค่ะ"
1006103-138 = "ฉันเอาแต่รับความช่วยเหลือจากคุณครูตลอดเลย เป็นถึงซิสเตอร์ แต่ก็ให้คนอื่นมาช่วยเหลือ... น่าอายจังเลยนะคะ..."
1006103-139 = "......"
1006103-140 = "แต่ว่า... ฉันก็ไม่ได้รู้สึกไม่ดีเสียทีเดียวหรอกค่ะ"
1006103-141 = "เพราะอะไรกันนะ? ถึงวันนี้จะเป็นวันที่รู้สึกถึงความบกพร่องของตัวเองก็เถอะ..."
1006103-142 = "หรือว่า..."
1006103-143 = "เพราะวันนี้ฉันได้เจอกับ..."
1006103-147 = "'คนเสมอต้นเสมอปลาย' ของฉันเหมือนกันค่ะ"
1006103-149 = "(คุณครูเดินมาส่งซากุระโกะที่เดินอมยิ้มมาจนถึงมหาวิหาร เมื่อไปถึงแล้วก็กลับไปยังชาเล่ต์)"

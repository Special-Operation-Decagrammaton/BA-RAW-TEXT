[translation]
1006103-1 = "「流行」"
1006103-3 = "（為了購買夏萊的工作用品來到了商店街）"
1006103-4 = "（在各種商店櫛比鱗次的街上，發現了站在飾品店前的櫻子）"
1006103-8 = "……呼呣……唔嗯。"
1006103-12 = "這個……不，這樣不對。#n果然……"
1006103-13 = "……唔唔。"
1006103-14 = "[s1]「櫻子，你好呀。」\n[s2]「你在這裡做什麼呢？」"
1006103-19 = "……！！？老，老師！？#n您，您好……！"
1006103-20 = "……什麼？我嗎？"
1006103-21 = "我，我只是碰巧……經過這附近……"
1006103-22 = "正好發現了有點感興趣的東西，所以才會在這裡看著。"
1006103-23 = "那個……其實我在思考是不是該換個頭紗或飾品。"
1006103-27 = "啊，這並不是因為個人的喜好……"
1006103-28 = "該怎麼說呢……"
1006103-29 = "雖然不清楚別人對我的看法……"
1006103-36 = "不過其他人都換了飾品，卻只有我沒換的話……"
1006103-37 = "那個，該說會被覺得是個落伍的人嗎……"
1006103-38 = "[s3]「嗯嗯，這個我懂。」\n[s4]「是在說流行對吧。」"
1006103-41 = "由於我平時都待在教堂，#n外部的事務都是由其他修女負責……"
1006103-42 = "儘管有時也想一起外出，"
1006103-43 = "不過必須有人要留在教堂裡才行。"
1006103-44 = "久而久之自然就會與外面的世界有些脫節。"
1006103-45 = "只能以其他修女的談話內容為基礎進行想象和解讀。"
1006103-46 = "但是，這種想像時常會與事實存在差異……"
1006103-50 = "那個，也會遇到……"
1006103-51 = "和先前的MomoTalk……類似的狀況……"
1006103-52 = "[s5]「原來是這樣啊。」\n[s6]「沒關係唷，我覺得很新鮮。」"
1006103-55 = "非常感謝您的體貼。"
1006103-56 = "除此之外……"
1006103-57 = "我想買一些新的飾品……"
1006103-58 = "老師了解最近流行什麼樣的設計嗎？"
1006103-59 = "如果知道的話，希望您願意傾囊相授……"
1006103-63 = "啊，這樣啊。"
1006103-64 = "也對……畢竟老師十分繁忙，這也無可奈何。"
1006103-68 = "失禮了。"
1006103-69 = "再佔用老師寶貴的時間就不好了，接下來我就自己──"
1006103-76 = "這位客人！您剛剛就一直盯著櫥窗看，有什麼想要找的商品嗎？"
1006103-77 = "啊，抱歉妨礙到您了。"
1006103-78 = "那個，因為每一樣都十分精美，不知該如何抉擇……"
1006103-79 = "我對這方面的事情實在有些生疏……"
1006103-83 = "原來如此，是這樣呀！"
1006103-85 = "請您不用擔心！"
1006103-90 = "就由我來幫客人您挑選最適合的商品吧！"
1006103-95 = "來來，您請進吧！#n客人您的美貌，與任何商品都非常適合的唷！"
1006103-96 = "呃，那個……請，請等一下──！？"
1006103-101 = "呀啊啊啊──！？！？"
1006103-106 = "[ns7] 不能就這麼放任不管，於是決定跟上去\n[ns8] 櫻子看起來很困擾，於是決定跟上去"
1006103-114 = "（跟在櫻子和店長身後一起進入了商店）"
1006103-121 = "（帶著被老闆推薦了店裡的各種商品而感到困擾的櫻子離開了店裡）"
1006103-126 = "……呼，今天真是不得了的一天呢。"
1006103-127 = "今天在各方面真的都很謝謝您，老師。"
1006103-128 = "如果老師您不在……光是想像都覺得可怕。"
1006103-129 = "果然要跟上流行不是件容易的事呢。"
1006103-130 = "……？#n沒有必要強迫自己跟隨流行，是嗎？"
1006103-131 = "……但我是一名修女，為了理解他人就需要各種各樣的知識……"
1006103-132 = "[s9]「始終如一也是有好處的唷。」\n[s10]「能夠讓人敞開心胸的，就是那樣的地方。」"
1006103-135 = "老師……"
1006103-136 = "呵呵。"
1006103-137 = "聽您這麼說，讓我覺得心情輕鬆了一些。"
1006103-138 = "直到最後都受您幫助了呢。#n明明身為修女卻總是受人恩惠……真是羞愧。"
1006103-139 = "……"
1006103-140 = "但是……我也並不討厭這種感覺。"
1006103-141 = "為何會這樣呢？#n明明是一再暴露自己短處的一天……"
1006103-142 = "也許……"
1006103-143 = "就像剛才您對我說的一樣……"
1006103-147 = "對我來說，老師就是「始終如一的人」也說不定呢。"
1006103-149 = "（送面帶微笑的櫻子回到大教堂後，便回到了夏萊）"

[translation]
1006103-1 = "Catching Up on the Trends"
1006103-3 = "I visited the shopping district to pick up some supplies for Schale."
1006103-4 = "In the middle of a row of shops, peering in the window of an accessory store, was Sakurako."
1006103-8 = "Um... Hmm..."
1006103-12 = "Hm. This is... Hmm. Or, is it..."
1006103-13 = "*sigh*"
1006103-14 = "[s1] \"Hi, Sakurako.\"\n[s2] \"What are you doing here?\""
1006103-19 = "...!? H-Hm! Ah. Sensei!? H-How are you, um, how are you doing today?"
1006103-20 = "Huh? Me?"
1006103-21 = "Ah, well... I just happened to be passing through this neighborhood, to—"
1006103-22 = "Well, nevermind. I was passing through, and I noticed... I was looking at the items in this store, because..."
1006103-23 = "As a matter of fact, I was considering changing some of my accessories."
1006103-27 = "It's not that I have much knowledge or interest about such things."
1006103-28 = "But..."
1006103-29 = "Well, I'm not sure if you'll understand, but..."
1006103-36 = "If I see everyone else pursuing a hobby, or a style, and I don't at least look into it..."
1006103-37 = "I feel as if I must be falling behind. Does that...make sense?"
1006103-38 = "[s3] \"Ah, I know exactly what you mean.\"\n[s4] \"You're worried about trends?\""
1006103-41 = "You may have noticed that I rarely leave the cathedral. If there are things to take care of outside, other Sisters usually handle them."
1006103-42 = "It's not that I don't want to join them on occasion..."
1006103-43 = "But, someone has to stay behind and handle all the administrative work."
1006103-44 = "So I suppose it's natural that I'm a bit behind when it comes to the state of the outside world."
1006103-45 = "The other Sisters tell me things, of course, and I try to understand and imagine it based on their descriptions."
1006103-46 = "But, of course, sometimes my imagination differs from the truth."
1006103-50 = "Well..."
1006103-51 = "For example, like the MomoTalk I sent you this morning..."
1006103-52 = "[s5] \"I-I see. I understand...\"\n[s6] \"It's all right. It was a novel experience.\""
1006103-55 = "Heh, you're always so considerate of me."
1006103-56 = "Thank you, Sensei."
1006103-57 = "Anyway, as long as I'm here, I thought I'd pick out an accessory."
1006103-58 = "Do you, by any chance, know anything about which designs are in fashion?"
1006103-59 = "And, if so, would you mind sharing that knowledge with me?"
1006103-63 = "Ah. Well, that's a shame."
1006103-64 = "I suppose you are quite busy as well."
1006103-68 = "Excuse me."
1006103-69 = "I've taken up enough of your valuable time. I'll take it upon myself to—"
1006103-76 = "Ah, excuse me, valued customer! I've noticed you've been looking at the show window for a little while. Can I offer you assistance? Are you looking for something in particular?"
1006103-77 = "A-Ah. I'm very sorry. I hope I wasn't disturbing anyone."
1006103-78 = "I'm just having, um, a bit of trouble picking something out..."
1006103-79 = "As you can see, I'm not very knowledgeable about fashion."
1006103-83 = "...Aha!"
1006103-85 = "I see, I see! Not to worry, valued customer!"
1006103-90 = "I will find the perfect accessory for you!"
1006103-95 = "Please, come in, come in! You'd look good in anything, of course, but I have a few suggestions to get you started!"
1006103-96 = "H-Huh? ...Uh, hold on! Um?!"
1006103-101 = "Wh... Wait!"
1006103-106 = "[ns7] Follow because Sakurako needs help.\n[ns8] Follow because it'll probably be cute."
1006103-114 = "I followed Sakurako and the shopkeeper inside."
1006103-121 = "The shopkeeper was making suggestion after suggestion to an overwhelmed Sakurako. I rescued her and we made our escape back outside."
1006103-126 = "Phew. What a day."
1006103-127 = "Thank you so much, Sensei."
1006103-128 = "If you weren't here... *shudder* I don't even want to think about that."
1006103-129 = "As I suspected. Catching up to the rest of the world will be quite difficult."
1006103-130 = "...Huh? You don't think there's a need to catch up?"
1006103-131 = "B-But... But I'm a Sister. I ought to study such things in order to understand others."
1006103-132 = "[s9] \"Sometimes, it's better to stay the same.\"\n[s10] \"Being stable and constant is reassuring to people.\""
1006103-135 = "Sensei..."
1006103-136 = "Heehee... Heeheehee."
1006103-137 = "I must admit I feel quite relieved to hear you say that."
1006103-138 = "Oh dear. I'm still getting help from you. As a Sister, it's a bit embarrassing to be on the receiving end like this."
1006103-139 = "..."
1006103-140 = "But... I can't say I truly dislike it, in this case."
1006103-141 = "I wonder why? Despite the fact that my flaws and shortcomings have been on display..."
1006103-142 = "Perhaps..."
1006103-143 = "Well, to me, perhaps you are someone who stays the same."
1006103-147 = "You are, as you put it, someone \"stable and constant.\""
1006103-149 = "I walked a smiling Sakurako back to the cathedral before returning to Schale."

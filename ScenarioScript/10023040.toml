[translation]
10023040-1 = "ตอนที่ 4;ฉันมาแล้วค่ะ ดึ๋งๆ"
10023040-8 = "[ns] \"สวัสดีอาริสึ ตั้งใจทำความสะอาดจังเลยนะ\""
10023040-9 = "ใช่ค่ะคุณครู! ก็ตอนนี้อาริสึเป็นผู้กล้าเมดนี่คะ!"
10023040-10 = "[s] \"ผู้กล้าเมด?\""
10023040-11 = "ผู้กล้าเมดก็คือที่สุดของทั้งเมดและผู้กล้าไงคะ! คนที่เป็นที่สุดของทั้งสองสาย แบบนั้นถึงได้แข็งแกร่ง#nขั้นสุดเลยค่ะ!"
10023040-12 = "[s] (สำหรับอาริสึแล้ว เมดคืออะไรกันนะ...)"
10023040-13 = "จะว่าไป คุณครูไหวเหรอคะ? อดหลับอดนอนตั้งแต่เช้ามืดแบบนี้ จะไม่เป็นไรเหรอคะ?"
10023040-14 = "คุณครูต้องดูแลตัวเองนะคะ ต้องนอนให้เต็มอิ่ม พักผ่อนให้เพียงพอ แล้วก็รับประทานอาหารที่มี#nประโยชน์ด้วยค่ะ"
10023040-15 = "ส่วนอาริสึไหวแน่นอนค่ะ! ที่ผ่านมาอาริสึเล่นเกมโต้รุ่งกับพวกโมโมอิจนชินแล้วค่ะ!"
10023040-16 = "[s1] \"แค่ครูเห็นอาริสึตั้งใจทำภารกิจ ครูก็มีแรงแล้วละ...\"\n[s2] \"ต้องไปบอกโมโมอิแล้วสินะว่าอย่าโต้รุ่งให้มันบ่อยนัก...\""
10023040-24 = "อ๊ะ คุณครูหาวออกมาแล้ว! อาริสึจะจัดการทำความสะอาดเองค่ะ ส่วนคุณครูเข้าไปพักผ่อนเถอะนะคะ"
10023040-25 = "ตอนนี้มันก็เพิ่งจะ 05:20 น. แล้วด้วย!"
10023040-26 = "นี่ อาริสึจัง...? ถ้าถูพื้นเสร็จแล้ว มาช่วยฉันปัดฝุ่นทางนี้หน่อยได้ไหม?"
10023040-27 = "ได้เลยค่ะยูสึ! อาริสึเปลี่ยนเข้าสู่โหมดปัดฝุ่นค่ะ!"
10023040-31 = "ฮ้าววววว..."
10023040-32 = "ง่วงจัง..."
10023040-33 = "[s] \"ทุกคนต้องเหนื่อยกันตั้งแต่ฟ้ายังไม่สางเลยนะ...\""
10023040-34 = "ทำไงได้ล่ะ... ก็ผู้ว่าจ้างขอให้ดูแลคฤหาสน์ตั้งแต่ 05:20น. จนถึง 07:40 น. เลยนี่นา..."
10023040-35 = "แล้วระหว่างนั้นก็ขอให้ทำความสะอาดง่ายๆ ไปด้วยอีกค่ะ"
10023040-36 = "ที่จริงมันก็ไม่มีปัญหาหรอก ยังไงซะงานตรงนี้เราจะได้เบี้ยเลี้ยงแยกต่างหากอีกที..."
10023040-37 = "แต่มันง่วงนี่สิ ง่วง~ จาง~"
10023040-39 = "(ช่วงเช้าผ่านไปได้ด้วยดี และก็ผ่านมาถึงช่วงเย็น)"
10023040-40 = "(งานปาร์ตี้จัดขึ้นตามเวลาที่กำหนด และในงานก็... วุ่นวายมากกว่าที่คิด)"
10023040-42 = "นี่เธอ แก้วของฉันยังว่างอยู่เลยนะ หรือว่าไม่ได้ยินที่ฉันพูดเมื่อกี้?"
10023040-43 = "อ๊ะ? ขะ... ขอโทษ...."
10023040-44 = "ขอโทษค่ะ ฉันจะไปเอาเครื่องดื่มมาให้เดี๋ยวนี้ค่ะ"
10023040-45 = "ความผิดพลาดของเธอจะทำให้เจ้าของงานถูกวิจารณ์นะ อย่าลืมข้อนี้สิ!"
10023040-46 = "(อึกกก...! อะไรของหมอนี่เนี่ย! พวกเราไม่ได้เป็นเมดจริงๆ จังๆ สักหน่อย!)"
10023040-47 = "แค่เริ่มก็เป็นอย่างนี้แล้ว ถึงจะบอกว่าถูกจ้างมาเพราะรูปลักษณ์ก็เถอะ แต่อย่างน้อยก็ควรรู้เรื่องการ#nบริการขั้นพื้นฐานสิ? ถ้าเรื่องแค่นี้ยังไม่มีละก็..."
10023040-48 = "คือ... ประทานโทษนะคะ แต่คุณได้เครื่องดื่มไปแล้วนะคะ?"
10023040-49 = "อะไรกัน? จะเป็นไปได้ยังไง เมื่อกี้ฉันก็เห็นๆ อยู่ว่ามันไม่มี...!"
10023040-53 = "จะ... จริงด้วย! ใครแอบมารินเครื่องดื่มแบบไม่ให้รู้ตัวแบบนี้นะ ดูแลแขกได้ยอดเยี่ยมเลยแฮะ..."
10023040-55 = "(อะไรเนี่ย?! เป็นแบบนี้ได้ไงน่ะมิโดริ?)"
10023040-56 = "(ฉันก็ไม่รู้เหมือนกัน...)"
10023040-65 = "แงงง! แขกมากันเยอะมากเลยค่ะ! ไหนว่างานไม่ใหญ่แน่ไงคะ!"
10023040-69 = "นี่เธอ! จานตรงนี้มันหล่นแล้วนะ!"
10023040-70 = "โชคดีอยู่หรอกที่มันไม่แตก แต่ฉันก็ตกใจไปแล้วนะ จะรับผิดชอบยังไง!"
10023040-72 = "ขะ... ขอโทษค่ะ! แต่ตอนนี้อาริสึขยับไปไหนไม่ได้เลยค่ะ..."
10023040-74 = "จะยกข้ออ้างแบบนั้นเหรอ? รีบมาเคลียร์สถานการณ์เร็วๆ เข้าสิ!"
10023040-75 = "ตะ... แต่ว่า..."
10023040-79 = "งือ... ช่วยหลบหน่อยนะคะ..."
10023040-87 = "เอ๋...? จาน... หายไปแล้วค่ะ"
10023040-88 = "พูดอะไรของเธอ? เมื่อกี้มันยังตกอยู่ตรงนี้เลย..."
10023040-89 = "เอ๋? ใครเก็บไปตอนไหนน่ะ?!"
10023040-90 = "ฮึ่ม... อุตส่าห์วางแผนการว่าจะจับผิดงานปาร์ตี้เพื่อให้ได้รับการดูแลเป็นอย่างดีในวันประมูลแท้ๆ...!"
10023040-92 = "นี่ พวกจอมขี้เกียจ ทำอะไรพวกเธอน่ะ! จะเอาอาหารแบบนี้ไปเสิร์ฟให้แขกงั้นเหรอ?"
10023040-93 = "ดูให้ดีสิ! นี่มันเหมือนปลากระพงย่างตรงไหน? มันยังไม่สุกดีเลยนะ ปลามันยังดิ้นอยู่เลยไม่เห็นเหรอไง!"
10023040-94 = "แล้วพวกเมดไปทำอะไรกันหมด! มาทำงานให้มันคุ้มค่าจ้างหน่อยสิ!"
10023040-95 = "หวาาา... ขอโทษค่ะ ขอโทษด้วยค่ะ"
10023040-96 = "ขอโทษแล้วมันจบเหรอ? อาหารจัดใส่จานไว้ซ้อนกันขนาดนี้ แค่ควันที่ออกจากอาหารก็จะทำให้ทั้งครัว#nเป็นทะเลหมอกได้แล้ว! ยังไม่รีบไปเสิร์ฟ..."
10023040-97 = "อีก?"
10023040-98 = "อาหารทั้งหมด... หายไปไหนแล้วน่ะ?"
10023040-101 = "ฉันเอาไปเสิร์ฟหมดแล้วค่ะ จะสั่งงานอะไรเพิ่มไหมคะ?"
10023040-102 = "ว่าไงนะ? อาหารเยอะขนาดนั้น เอาไปเสิร์ฟแป๊บเดียวหมดเลยเหรอ?"
10023040-103 = "แน่นอนค่ะ ก็ฉันเป็นเมดที่สมบูรณ์แบบไงคะ"
10023040-104 = "มะ... เมดเหรอ? ไม่ใช่... บันนี่เกิร์ลหรอกเหรอ?"
10023040-105 = "... งั้นก็ดี ทุกคนไปได้แล้ว"
10023040-109 = "ทีมห้องครัว! ไม่ใช่พวกเธอ! มารวมตัวกัน!"
10023040-116 = "เอ่อ..."
10023040-121 = "ไม่ได้เจอกันนานเลยนะคะ พีซ พีซ"
10023040-122 = "เอ๋?????!"
10023040-124 = "[ns] \"แบบนี้นี่เอง เนรุคง...\""
10023040-125 = "ค่ะ <จอมโจรแห่งความเสน่หา> กำลังมาที่คฤหาสน์นี้ ก็เลยมาขอให้ฉันช่วยอีกแรงค่ะ"
10023040-126 = "นอกจากนั้นฉันยังได้ภารกิจอื่นมาด้วยค่ะ..."
10023040-127 = "จะว่าไป ไม่คิดเลยนะคะว่าคุณครูจะมาที่นี่อยู่ก่อนแล้ว คงต้องเรียกว่าเป็นโชคชะตาแล้วละมั้งคะ"
10023040-128 = "[s] \"ครูก็ดีใจที่ได้เจอโทคินะ\""
10023040-129 = "ขอบคุณค่ะคุณครู "
10023040-130 = "พวกรุ่นพี่ก็บอกฉันไว้ค่ะว่า..."
10023040-131 = "\"ตอนนี้คนที่เชื่อใจได้มีแค่โทคิเท่านั้น หวังว่าจะทำผลงานออกมาให้ไม่เสียชื่อ C&C นะ แล้วพวกเราจะ#nรอฟังข่าวดี\""
10023040-132 = "\"ใช้อุปกรณ์และงบประมาณตามใจได้เลย แล้วค่อยไปทำเรื่องเบิกกับบัญชีของเซมิน่าเอา\""
10023040-133 = "\"พวกฉันอาจไม่ได้พูดแบบนี้บ่อยๆ แต่ก็เชื่อใจเธอเสมอนะ\""
10023040-137 = "...... ฮุฮุ"
10023040-138 = "[s] \"ครูดีใจด้วยนะที่ได้ยินแบบนั้น...\""
10023040-139 = "จากข้อมูลที่ฉันได้มา เห็นว่า <จอมโจรแห่งความเสน่หา> มักจะส่งจดหมายเตือนให้อีกฝ่ายค่ะ"
10023040-140 = "ฉันคิดว่าถ้าได้เห็นจดหมายเตือนนั้น ฉันอาจจะช่วยคลี่คลายสถานการณ์ได้บ้างค่ะ"
10023040-141 = "[s5] \"โทคิ แต่ว่า...\"\n[s6] \"ครูมีบางอย่างที่กังวลเกี่ยวกับโทคิน่ะ...\""
10023040-142 = "ค่ะ มีอะไรเหรอคะ?"
10023040-143 = "ค่ะ มีอะไรเหรอคะ?"
10023040-144 = "[s] \"... ทำไมถึงเป็นบันนี่เกิร์ลเหรอ?\""
10023040-145 = "......"
10023040-146 = "น่าผิดหวังจังเลยค่ะคุณครู"
10023040-147 = "[s] \"ทำไมล่ะ?!\""
10023040-148 = "ก็เครื่องแบบในการทำปฏิบัติการลับของ C&C คือชุดบันนี่เกิร์ลนี่คะ"
10023040-149 = "ฉันทำการบ้านมาอย่างดีเลยค่ะ มีบันทึกของพวกรุ่นพี่ว่าแต่ก่อนเคยมาทำภารกิจบนเรือสำราญสุดหรู#nของโรงเรียนการเดินเรือโอดิสซีย์ด้วยค่ะ"
10023040-150 = "[s] \"อ๊ะ แต่ตอนนั้นมันมีเหตุผลหลายอย่างเลย...\""
10023040-151 = "?"
10023040-152 = "[s] \"อะ... อืม ไม่มีอะไรหรอก ไม่เป็นไร โทคิใส่ชุดนี้ได้เลย...\""
10023040-153 = "ทำไมคุณครูถึงทำหน้าเหมือนยอมแพ้ทุกอย่างและถอนหายใจออกมากันล่ะคะ..."
10023040-154 = "แต่ช่างเถอะค่ะ ถ้าคุณครูว่าอย่างนั้น ก็คงจะเป็นอย่างนั้นค่ะ"
10023040-155 = "และที่สำคัญกว่านั้นคือ ปัญหาอย่างหนึ่งที่เราเผชิญอยู่..."
10023040-159 = "อะ... อ่า... อ่าาาาา....."
10023040-163 = "... ไม่มีค่ะ... ที่นี่ไม่มีใครเลยค่ะ..."
10023040-165 = "......"
10023040-166 = "ถ้าเจอเรื่องแบบนี้ต้องทำยังไงเหรอคะคุณครู?"
10023040-167 = "[s7] \"ตอนที่ไม่แน่ใจ เราควรถามจากผู้ใหญ่...\"\n[s8] \"ขอโทษนะ ผู้ใหญ่ไม่ได้มีคำตอบสำหรับทุกสิ่งเสมอไปหรอก...\""
10023040-168 = "งั้นเหรอคะ... ว่าแต่ทุกคนมาทำอะไรกันที่นี่เหรอคะ?"
10023040-169 = "งั้นเหรอคะ... ว่าแต่ทุกคนมาทำอะไรกันที่นี่เหรอคะ?"
10023040-170 = "ฉะ... ฉันไม่กลัวคนอย่างเธอหรอก! ฉันจะเอาชนะด้วยเกมต่อสู้ไปเลย!"
10023040-171 = "พี่โมโมอิ... ระวังหน่อยนะ คนนั้นน่ะ ถ้าเสียเปรียบขึ้นมาแล้วจะถอดเสื้อผ้าแล้วใช้สูตรโกงนะ"
10023040-173 = "เราจะให้อาริสึจังถูกชิงตัวไปอีกไม่ได้... งือ... แต่ก็..."
10023040-174 = "[ns] \"... เดี๋ยวครูไปอธิบายแทนให้เอง...\""
10023040-177 = "ภารกิจของ C&C... อย่างนี้เองเหรอคะ ที่มาขอให้ช่วยเตรียมชุดเมดให้ก็เพื่อการนี้นี่เอง..."
10023040-178 = "อะ... เอายังไงดีล่ะพี่โมโมอิ?"
10023040-179 = "นี่เราจบเห่แล้วเหรอ?!  เราจะถูกรุ่นพี่เนรุกินหัวกันแล้วสินะ?!"
10023040-180 = "แงงง!"
10023040-181 = "ไม่หรอกค่ะ ฉันไม่ไปรายงานพวกรุ่นพี่หรอกค่ะ ฉันมาทำภารกิจก็เท่านั้น"
10023040-182 = "แต่ก็ไม่คาดคิดเลยนะคะว่าชมรมพัฒนาเกมทุกคนจะมาอยู่ที่นี่..."
10023040-183 = "[s] \"ไม่เป็นไรจริงเหรอ? แต่พวกเราถือวิสาสะกันขนาดนี้เลยนะ\""
10023040-184 = "ค่ะ ไม่เป็นไรหรอกค่ะ"
10023040-185 = "ยังไงพวกรุ่นพี่ก็ทิ้งฉันออกไปทำปฏิบัติการกันอยู่ดี ถึงฉันจะทำย้อนคำสั่งก็คงไม่เป็นไรหรอกค่ะ"
10023040-189 = "[ns9] \"เอ๋?\" ทำไมจู่ๆ... ไฟก็...\"\n[ns10] \"เดี๋ยวนะ นี่มัน... 07:38 น. แล้วเหรอ...?!\""
10023040-190 = "?!?!"
10023040-191 = "?!?!"
10023040-193 = "อะ... อะไรกัน? ไฟดับทั้งคฤหาสน์เลย!"
10023040-194 = "เกิดเรื่องอะไรขึ้นเหรอ? คุณเมทาโร่ คุณเมทาโร่?"
10023040-195 = "จะ... ใจเย็นๆ ก่อนครับทุกคน ไฟแค่ดับชั่วคราวเท่านั้นครับ ผมจะรีบไปจัดการให้เป็นปกติเดี๋ยวนี้ครับ"
10023040-196 = "ไม่หรอกค่ะ มันจะไม่เป็นปกติหรอก"
10023040-197 = "นั่นใครน่ะ...?"
10023040-199 = "มีบางคนบอกไว้ว่า สิ่งที่มีค่าก็ควรค่าแก่การครอบครอง"
10023040-200 = "และต้องถูกเก็บ จำกัด และดูแลอย่างเคร่งครัด ไม่ให้รั่วไหลไปข้างนอก"
10023040-201 = "มันจะจริงอย่างที่ว่าไหมคะ? ถ้ามันเป็นของที่มีค่าจริงๆ ก็ควรจะแบ่งให้กับทุกคนสิคะ?"
10023040-202 = "อย่าบอกนะว่า...!"
10023040-205 = "บางคนเรียกฉันว่าหัวขโมยค่ะ"
10023040-212 = "และบางคนก็เรียกฉันว่าอาชญากร"
10023040-217 = "เราไม่ได้เกิดมาพร้อมชื่อของตัวเอง คำเรียกของเราจึงถูกกำหนดโดยคนอื่น"
10023040-222 = "เพราะอย่างนั้นฉันจึงจะยอมรับภาษาที่พวกคุณใช้เรียกฉันค่ะ"
10023040-224 = "ใช่แล้วค่ะ ชื่อที่เรียกฉันกันโดยทั่วไปก็คือ"
10023040-236 = "<จอมโจรแห่งความเสน่หา> ค่ะ"

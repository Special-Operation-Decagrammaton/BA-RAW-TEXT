[translation]
10023040-1 = "Episode 4; Hello There. Hop."
10023040-8 = "[ns] \"Hi there, Aris. You're busy cleaning!\""
10023040-9 = "Yes, I am! Because I am a hero maid!"
10023040-10 = "[s] \"What is a hero maid?\""
10023040-11 = "An advanced job! A merging of the strongest. Only someone who has mastered both the class of hero and maid can evolve to this form."
10023040-12 = "[s] \"(Aris really admires maids...)\""
10023040-13 = "I am busy cleaning, but what are you doing up so early, Sensei?"
10023040-14 = "Proper sleep, rest, and food are very important! Please take care of yourself."
10023040-15 = "Sensei isn't invincible like me! Momoi and the others and I are used to staying up all night playing video games!"
10023040-16 = "[s1] \"All your energy is giving me energy!\" \n[s2] \"You know, Momoi needs to stop keeping everyone up all night...\""
10023040-24 = "Sensei! You yawned! You must go get some rest and leave the cleaning to us!"
10023040-25 = "It is very early for Sensei to be up, after all!"
10023040-26 = "Are you almost done with mopping the floor, Aris...? Would you mind helping with dusting?"
10023040-27 = "I am finished, Yuzu! Now transferring to dusting mode!"
10023040-31 = "*yawn*"
10023040-32 = "So sleepy..."
10023040-33 = "[s] \"Everyone's got their work cut out for them, so early too.\""
10023040-34 = "Well, the original job was to stop the thief, and the calling card said she would come between 5:20 AM and 7:40 AM."
10023040-35 = "Meitaro just added the cleaning on top, since we were already up."
10023040-36 = "We are being paid extra for it, so I can't really complain, but..."
10023040-37 = "I'm so...sleepy..."
10023040-39 = "Time passed from morning to afternoon without a single incident."
10023040-40 = "The guests began arriving and the party began on schedule, but the job was even more...involved than we were originally led to believe."
10023040-42 = "You. My glass is still empty. Perhaps you didn't hear me the first time?"
10023040-43 = "Huh? Oh, uh..."
10023040-44 = "I'm very sorry... I'll refill it right away."
10023040-45 = "Hmph. You'd do well to keep in mind that your actions reflect upon your employer."
10023040-46 = "(What is he saying?! I'm not even a real maid, you jerk!)"
10023040-47 = "I know you're just temp hires, but does your agency not teach you even the basics? To not be able to fill a glass—"
10023040-48 = "Excuse me, but your glass is full."
10023040-49 = "Do you think I'm an idiot? I know what an empty glass looks like, and it's like this!"
10023040-53 = "O-Oh? Wait... Wh-When did someone refill my glass? I didn't even notice it..."
10023040-55 = "(What the heck?! Did you see that, Midori?)"
10023040-56 = "(I did, but I don't know how it happened...)"
10023040-65 = "Ack! There are too many guests! I am going to be squished like a slime mob!"
10023040-69 = "You, there! There's a plate on the floor!"
10023040-70 = "Thankfully it isn't broken, and I didn't injure myself! But I was still quite shocked!"
10023040-72 = "I-I am sorry! I am trying but I am being s-squished...!"
10023040-74 = "How lazy! I insist you do your job, and clean it!"
10023040-75 = "B-But..."
10023040-79 = "U-Ugh! I-I am sorry, but I must get through, guests...!"
10023040-87 = "Huh? I am confused. There is no plate..."
10023040-88 = "Do you have no eyes? The plate is right there!"
10023040-89 = "What?! Who picked it up?!"
10023040-90 = "Um... I was only trying to criticize the event in an attempt to barter a better deal at the auction... How unfortunate..."
10023040-92 = "Are your feet made of lead?! I can't send a cold dish to service!"
10023040-93 = "Look at this! Does this look like grilled sea bass to you? If we release it, it'll come back to life and swim into the sea!"
10023040-94 = "What's wrong with you maids? If you want your money, work for it!"
10023040-95 = "Augh! You're right! Sorry! I'm so sorry!"
10023040-96 = "\"Sorry\" doesn't deliver food! There's so many dishes waiting to go out, you'd think we were holding Thanksgiving dinner back here. Hurry up and— "
10023040-97 = "And..."
10023040-98 = "Where...did all the food go...?"
10023040-101 = "I delivered everything. What would you like me to do next?"
10023040-102 = "What do you mean? You delivered all those dishes?!"
10023040-103 = "Such things are child's play for a capable maid."
10023040-104 = "Y-You said you're a maid...not a...bunny?"
10023040-105 = "Well, uh, I guess that's all I needed. You can all go now."
10023040-109 = "Not you, kitchen staff! Front and center!"
10023040-116 = "Um..."
10023040-121 = "It's been a while. Peace, peace."
10023040-122 = "Whaaat?! And don't say \"peace\" when you're holding up peace signs! It's unnecessary!"
10023040-124 = "[ns] \"So that's what happened. It was Neru...\""
10023040-125 = "Yes. She informed me of the Benevolent Thief's plans and asked me to secure the mansion. "
10023040-126 = "Although I did receive another mission as well..."
10023040-127 = "Regardless, I'm really...pleased with this unexpected meeting, Sensei."
10023040-128 = "[s] \"Pleasure's all mine, Toki.\""
10023040-129 = "Thank you, Sensei."
10023040-130 = "You know, before I left, the other members told me something..."
10023040-131 = "They said, \"You're the only one we can rely on for this job, Toki. We trust you'll bring back good news and results befitting a C&C agent.\""
10023040-132 = "\"Complete your objective at any cost. No tool or need is too expensive. Just submit an expense report to Seminar.\""
10023040-133 = "\"I know we don't say this enough, but we all have faith in you.\""
10023040-137 = "Heehee."
10023040-138 = "[s] \"That happy little smirk tells me you were very excited to tell me this...\""
10023040-139 = "Yes, I was. I was also told that the Benevolent Thief always sends a calling card before the actual heist."
10023040-140 = "If you don't mind, I believe I can be of assistance."
10023040-141 = "[s5] \"I feel like you're leaving out something important...\" \n[s6] \"There's something that's been on my mind...\""
10023040-142 = "Hm? What do you mean?"
10023040-143 = "Yes? What is it?"
10023040-144 = "[s] \"...Why are you wearing a bunny costume?\""
10023040-145 = "..."
10023040-146 = "I'm disappointed in you, Sensei."
10023040-147 = "[s] \"Because of what?!\""
10023040-148 = "You should know this already. Personally, I've studied C&C's previous infiltration cases, especially the Odyssey Maritime School cruise infiltration."
10023040-149 = "I have concluded that a bunny costume must be the operation uniform for C&C infiltration work."
10023040-150 = "[s] \"Oh... Oh, no. That situation was entirely different...\""
10023040-151 = "...?"
10023040-152 = "[s] \"Never mind. At the end of the day, Toki, you'll always be you. And that's a good thing.\""
10023040-153 = "Your words are kind, but the heavy sigh afterwards sounded very defeated..."
10023040-154 = "But I will take your words at face value."
10023040-155 = "I believe we have a more...pressing issue at hand."
10023040-159 = "Ugh... Aaaaaagh..."
10023040-163 = "...Don't look...here... No one's home..."
10023040-165 = "..."
10023040-166 = "What do I do, Sensei?"
10023040-167 = "[s7] \"It makes sense to ask your teacher about bewildering situations...\" \n[s8] \"I'm sorry to say that teachers don't always have the answers...\""
10023040-168 = "I see... In that case, may I ask just what is happening here?"
10023040-169 = "I see... In that case, may I ask just what is happening here?"
10023040-170 = "I-I'm not afraid of you! I can take you on in a fight...a-a fighting game!"
10023040-171 = "Be careful, Momoi. Last time she started losing, she changed classes and cheated!"
10023040-173 = "W-We don't wanna lose Aris again...but...!"
10023040-174 = "[s] \"...Let me explain.\""
10023040-177 = "You accepted a request for C&C, which is why you asked me to find you maid uniforms. I see..."
10023040-178 = "I-Is it all over for us, Momoi...?"
10023040-179 = "I don't know! What do we do? Is Neru gonna kill us for real this time?"
10023040-180 = "Eek!"
10023040-181 = "I won't report you. It is not over, and Neru won't kill you. I'm here to finish my mission, nothing more."
10023040-182 = "Although I had no idea the Game Development Department would be a part of that mission..."
10023040-183 = "[s] \"Are you sure? We acted completely on our own, under your name.\""
10023040-184 = "Yes, I'm sure."
10023040-185 = "If my fellow members can go on a mission without me, I can go do as I please without them."
10023040-189 = "[ns9] \"That suddenly became very personal...\" \n[ns10] \"We lost track of time! It's...7:38?\""
10023040-190 = "?!?!"
10023040-191 = "?!?!"
10023040-193 = "What's going on? The lights went out!"
10023040-194 = "What is all this? Meitaro? Meitaro!"
10023040-195 = "P-Please keep calm everyone! This is just a temporary black out. The lights will come back momentarily."
10023040-196 = "A foolish hope."
10023040-197 = "Who...?"
10023040-199 = "The more value an object holds, the more desperately society seeks to own it. To control it."
10023040-200 = "The elite \"protect\" these valuable items, so that they stay in the hands of the worthy: themselves."
10023040-201 = "But is that the way it should be? No! If something really is so valuable, then it should be freely enjoyed by the masses!"
10023040-202 = "It couldn't be...!"
10023040-205 = "The rumors whisper of an elusive thief..."
10023040-212 = "While others sneer at me as a mere criminal."
10023040-217 = "On the day we are born, we are pure: without titles, without labels. And so we accept the ones others gift us."
10023040-222 = "I, too, have been graciously bestowed a title by you members of society."
10023040-224 = "Yes. I have embraced the name you have gifted me."
10023040-236 = "It is nice to meet you. I am the Benevolent Thief."

[translation]
10023040-1 = "第4話;向您問好，蹦"
10023040-8 = "[ns]「辛苦了，愛麗絲。打掃得真認真呢。」"
10023040-9 = "當然囉，老師！#n因為現在的愛麗絲是女僕勇者！"
10023040-10 = "[s]「女僕勇者？」"
10023040-11 = "就是超越女僕和勇者境界的最強存在！#n最強與最強結合而成的高等職業！"
10023040-12 = "[s] （對愛麗絲來說，女僕究竟是什麼呢……？）"
10023040-13 = "話說回來，老師這個時間還醒著沒問題嗎？"
10023040-14 = "請珍惜生命哦。#n不在旅館休息的話是不會回復體力的。"
10023040-15 = "愛麗絲完全沒問題！#n因為常常和桃井他們一起熬夜玩遊戲！"
10023040-16 = "[s1]「我從努力的愛麗絲身上獲得了元氣哦，沒問題的。」\n[s2]「得和桃井說不能熬夜玩遊戲才行……」"
10023040-24 = "啊，老師打哈欠了！#n打掃就交給愛麗絲，老師請去睡一覺吧！"
10023040-25 = "重要的是現在剛過了凌晨5點20分！"
10023040-26 = "愛麗絲醬……那邊的櫃子擦完了的話，可以麻煩你接著打掃這裡嗎？"
10023040-27 = "知道了，柚子！#n愛麗絲，切換為擦地板模式！"
10023040-31 = "呼啊啊啊啊啊……"
10023040-32 = "好睏……"
10023040-33 = "[s]「大家都努力到現在，真是辛苦了……」"
10023040-34 = "啊哈哈……畢竟委託人說5點20分到7點40分要特別警戒……"
10023040-35 = "因為還被順便委託了打掃工作，身體的活動讓人更想睡了也是事實……"
10023040-36 = "雖然會追加打掃部分的報酬，所以也沒什麼不滿，不過……"
10023040-37 = "好～睏～啊～"
10023040-39 = "（……就這樣平安無事地到了下午）"
10023040-40 = "（依照計畫舉辦的派對比想像中還要混亂）"
10023040-42 = "喂，我的杯子空了。#n什麼時候才要幫我補滿啊？"
10023040-43 = "咦？啊，抱歉……"
10023040-44 = "非，非常抱歉。我馬上拿來給您。"
10023040-45 = "女僕的失態可是會直接造成對主人的批評，你們到底在做什麼！"
10023040-46 = "（唔咕咕咕……！老虎不發威當我是病貓啊！#n　再說我們本來就不是真正的女僕！）"
10023040-47 = "再說了，就算只是雇來的女僕，也該學過基本的能力吧？#n那邊的機器人都比你們優雅多了。"
10023040-48 = "那個……非常抱歉。#n客人您的杯子已經裝滿了。"
10023040-49 = "什麼？怎麼可能。#n剛才明明就……！"
10023040-53 = "還，還真的！究竟是誰補滿的……？#n完全沒有感覺到任何聲音和氣息啊……？"
10023040-55 = "（騙人！？發生什麼事了？）"
10023040-56 = "（我也不知道……）"
10023040-65 = "嗚哇～！客人太多了！#n再這樣下去，愛麗絲要變得跟史萊魯一樣了！"
10023040-69 = "喂！這裡有盤子掉了！"
10023040-70 = "這樣很危險的！趕快想想辦法！"
10023040-72 = "非，非常對不起！#n可是愛麗絲現在在服務其他客人……"
10023040-74 = "那能算是藉口嗎？你以為我是誰啊！"
10023040-75 = "嗚，嗚嗚……"
10023040-79 = "嗚嗚……真的很抱歉。這位客人，請稍等一下……"
10023040-87 = "咦……？#n盤子……是在哪裡呢？"
10023040-88 = "你在胡說什麼啊？不就在……"
10023040-89 = "跑，跑哪去了！？"
10023040-90 = "咕奴奴……#n我那在派對上找碴，讓自己在拍賣會受到優待的計畫啊……！"
10023040-92 = "喂，你們到底在做什麼啊！#n打算端出這種料理給客人嗎？"
10023040-93 = "看清楚了！這到底哪裡烤過了啊？#n這連半熟都不算吧！？"
10023040-94 = "那邊的女僕，你也一樣！#n拿了薪水就給我好好做事！"
10023040-95 = "哇啊……對不起，對不起！"
10023040-96 = "有空道歉還不趕快把料理端出去！好不容易做好的料理都要冷……"
10023040-97 = "啊？"
10023040-98 = "剛才還在這的料理……跑哪去了？"
10023040-101 = "我全都送出去了。是否還有其他指示呢？"
10023040-102 = "你說什麼？一個人就把那麼大量的食物都送出去了？"
10023040-103 = "那是當然。因為我是優秀的女僕。"
10023040-104 = "女，女僕……？#n不是兔女郎嗎？"
10023040-105 = "……很好，大廳組的可以換班去休息了！"
10023040-109 = "廚房組給我留下！"
10023040-116 = "咦……"
10023040-121 = "好久不見了。Peace，Peace。"
10023040-122 = "咦咦咦咦咦！？"
10023040-124 = "[ns]「原來如此，寧瑠他……」"
10023040-125 = "是的。#n掌握了「慈愛的怪盜」的情報後，前輩表示之後就交給我了。"
10023040-126 = "雖然還有其他任務在身……"
10023040-127 = "話說回來，沒想到老師會在這裡。"
10023040-128 = "[s]「很高興能見到季哦。請多指教。」"
10023040-129 = "非常感謝您，老師。我也很高興。"
10023040-130 = "此外，前輩們還這麼跟我說了。"
10023040-131 = "「我們不在的時候，一切就交給季醬囉！」#n「期待聽到好消息」──"
10023040-132 = "──「道具和預算隨意使用沒關係，請把所有申請書都送給研討會的會計」。"
10023040-133 = "還有──「雖然平常沒說出來，不過我信任你」。"
10023040-137 = "……呵。"
10023040-138 = "[s]「嗯，嗯……那真是太好了呢。」"
10023040-139 = "──「慈愛的怪盜」似乎已經送出預告信了呢。"
10023040-140 = "能請您讓我也過目一下嗎？"
10023040-141 = "[s5]「那倒是沒關係，不過季……」\n[s6]「我從剛才就很在意……」"
10023040-142 = "是，怎麼了嗎？"
10023040-143 = "是，怎麼了嗎？"
10023040-144 = "[s]「……為何是兔女郎呢？」"
10023040-145 = "……"
10023040-146 = "您是認真這麼問的嗎，老師。"
10023040-147 = "[s]「咦！？」"
10023040-148 = "C&C的潛入作戰，不就是要穿兔女郎裝嗎？"
10023040-149 = "我從前輩們之前潛入奧德賽海洋高級中學的豪華郵輪的紀錄中是這麼判斷的……"
10023040-150 = "[s]「啊，那是因為各種原因……」"
10023040-151 = "……？"
10023040-152 = "[s]「沒，沒什麼。季保持現況就好……」"
10023040-153 = "雖然不清楚老師為何露出那種糾結的表情……"
10023040-154 = "既然老師都這麼說了，我就不去在意了。"
10023040-155 = "總之，現在必須解決怪盜的事件才行。#n此外──"
10023040-159 = "啊嗚……啊，啊嗚嗚嗚……"
10023040-163 = "……沒有……這，這裡沒有任何人……"
10023040-165 = "……"
10023040-166 = "這種時候該怎麼做才好呢？"
10023040-167 = "[s7]「雖然我很高興你遇到不懂的事情會來問我……」\n[s8]「抱歉，大人也未必總是知道所有事情的答案……」"
10023040-168 = "是嗎……話說回來，各位為何會在這裡呢？"
10023040-169 = "是嗎……話說回來，各位為何會在這裡呢？"
10023040-170 = "我，我一點也不怕你哦！#n有必要的話，我會用格鬥遊戲揍扁你的！"
10023040-171 = "姐姐，小心一點。#n這個人……只要陷入不利就會換上作弊裝備。"
10023040-173 = "不能再讓愛麗絲醬，被搶走……可是……#n嗚嗚，可是……"
10023040-174 = "[ns]「……我來說明吧。」"
10023040-177 = "被誤認成C&C接下了委託，是嗎……原來如此。#n老師之所以會借女僕裝，就是因為這個原因啊。"
10023040-178 = "怎，怎麼辦，姐姐？"
10023040-179 = "已經完蛋了啊啊啊！#n怎麼辦！？要被寧瑠前輩罵了！！"
10023040-180 = "嗚哇～！？"
10023040-181 = "不，我不會向前輩們報告。#n因為我只是來執行任務而已。"
10023040-182 = "雖然遊戲開發部的存在在意料之外……"
10023040-183 = "[s]「真的沒關係嗎？之後會不會被找麻煩……」"
10023040-184 = "是，沒關係的。"
10023040-185 = "丟下我不管的也是前輩們……就算多少出現一些意外，只要能完成任務就沒有問題。"
10023040-189 = "[ns9]「咦，電力……」\n[ns10]「等等，難道說……！」"
10023040-190 = "！？！？"
10023040-191 = "！？！？"
10023040-193 = "發，發生什麼事了？整間房子都停電了！"
10023040-194 = "究竟發生了什麼？明太郎先生？#n請你說明！"
10023040-195 = "請，請冷靜！各位請放心。#n只是暫時停電而已，馬上就會恢復正常的。"
10023040-196 = "不，這可不行──"
10023040-197 = "是誰……？"
10023040-199 = "有人曾經這麼說過。#n──「有價值的事物就該為人所有」。"
10023040-200 = "即便就此不見天日……經過數年，數十年──#n就算有朝一日被人們所遺忘亦然如此。"
10023040-201 = "然而，這真的是正確的嗎？#n所謂的藝術品，不正是因為廣為人知，才得以證明它的價值嗎？"
10023040-202 = "難道是……！"
10023040-205 = "有人將我蔑稱為小偷──"
10023040-212 = "也有人責罵我為罪人。"
10023040-217 = "人們生而無名，稱呼亦是由他人給予。"
10023040-222 = "因此──我接受了那個名號。"
10023040-224 = "沒錯，我的名字就是──"
10023040-236 = "──「慈愛的怪盜」。"

[translation]
2004706-1 = "Operations Officer's Clever Tactic"
2004706-2 = "As Kikyou requested, I went out to the beach at the agreed-upon time."
2004706-7 = "Hello, Sensei. I've been waiting for you."
2004706-8 = "[s] \"Did everything work out okay?\""
2004706-9 = "Yes. So we can enjoy today with nothing weighing us down."
2004706-10 = "Hm? What are we doing today?"
2004706-11 = "You'll know soon enough."
2004706-12 = "For starters... I intend to enter the water to chest height."
2004706-13 = "I require your assistance. You have no objections, yes?"
2004706-14 = "[s1] \"Do you need a harness?\"\n[s2] \"How about the cat's cradle thread?\""
2004706-17 = "It matters not."
2004706-18 = "[s] \"I-It doesn't?!\""
2004706-19 = "I'm very well-acquainted with your jokes now, Sensei."
2004706-20 = "I will not indulge every single one of them anymore."
2004706-21 = "Now, hurry."
2004706-25 = "Give me your hand."
2004706-29 = "*exhale*"
2004706-30 = "[s3] \"Don't worry.\"\n[s4] \"I'm by your side, you know?\""
2004706-36 = "...Yes. Thank you."
2004706-40 = "Kikyou and I enjoyed playing in the water at a new depth for a while."
2004706-42 = "Thank you, Sensei."
2004706-43 = "You've alleviated much of my worries around entering the ocean."
2004706-44 = "In large part thanks to you not letting go of my hand."
2004706-45 = "[s] \"It was nothing.\""
2004706-46 = "Do you not feel any fatigue?"
2004706-47 = "[s] \"Hm? I'm fine.\""
2004706-48 = "I'm exhausted..."
2004706-49 = "...yet you're still full of energy?"
2004706-50 = "[s5] \"Ah! Suddenly, I'm so sleepy!\"\n[s6] \"Ugh! Why am I sooo tired?\""
2004706-53 = "...You are, aren't you?"
2004706-54 = "It can't be helped. Allow me to take you to a resting spot I prepared for you in anticipation of your weak stamina."
2004706-55 = "[s] \"Oh! Is this what you were talking about earlier?\""
2004706-56 = "Fufu. You'll have to find out."
2004706-60 = "This way. Follow me."
2004706-66 = "[ns] \"Huh, isn't this...?\""
2004706-67 = "Yes, are you able to use it? Please lie down, like so."
2004706-70 = "― [log=키쿄 수영복]How is it? Quite nice, yes?[/log][wa:1090] "
2004706-72 = "― [log=키쿄 수영복]I built it for you.[/log]"
2004706-75 = "― [log=키쿄 수영복]So enjoy to your heart's content.[/log][wa:470] "
2004706-78 = "[ns7] \"This is the best!\"\n[ns8] \"I really, really love it!\""
2004706-81 = "― [log=키쿄 수영복]To confess... This was a first for me. [/log][wa:2750] "
2004706-84 = "― [log=키쿄 수영복]To be thinking of someone while creating something.[/log][wa:2790] "
2004706-86 = "― [log=키쿄 수영복]And to lower my defenses so completely in front of someone.[/log][wa:130] "
2004706-89 = "― [log=키쿄 수영복]I will not...specify who, though.[/log][wa:1610] "
2004706-92 = "― [log=키쿄 수영복]...Please continue to stay by my side.[/log][wa:1320] "
2004706-94 = "― [log=키쿄 수영복]And I shall stay by yours.[/log][wa:1300] "
2004706-97 = "― [log=키쿄 수영복]...This alliance is eternal.[/log][wa:1940] "
2004706-100 = "Afterwards, we spent a fun time on the hammock until late at night."

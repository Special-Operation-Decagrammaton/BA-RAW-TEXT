[translation]
2004706-1 = "อุบายของที่ปรึกษายุทธศาสตร์"
2004706-2 = "(คุณครูมาถึงทะเลตรงตามเวลาที่นัดไว้กับคิเคียว)"
2004706-7 = "เข้ามาสิ ฉันกำลังรออยู่เลย"
2004706-8 = "[s] \"งานที่ต้องทำราบรื่นดีหรือเปล่า?\""
2004706-9 = "อื้อ ไม่มีปัญหา จากนี้น่าจะเล่นสนุกได้อย่างสบายใจเลยละ"
2004706-10 = "หืม? วันนี้ฉันอยากทำอะไรน่ะเหรอ?"
2004706-11 = "เดี๋ยวก็รู้เองนั่นละ"
2004706-12 = "ก่อนอื่นเลย... วันนี้ฉันอยากลงน้ำให้ถึงระดับอก"
2004706-13 = "งั้นคุณครูมาช่วยประคองฉันไว้เหมือนคราวที่แล้วได้มั้ย?"
2004706-14 = "[s1] \"อยากได้สายรัดหรือเปล่า?\"\n[s2] \"ให้ครูไปเอาด้ายมามั้ย?\""
2004706-17 = "จะอะไรก็ได้ทั้งนั้นละ"
2004706-18 = "[s] \"ดะ... ได้หมดเลยเหรอ?!\""
2004706-19 = "ใช่ว่าคุณเพิ่งจะแกล้งฉันมาแค่วันสองวันนี่นา"
2004706-20 = "ฉันขี้เกียจต่อล้อต่อเถียงด้วยทุกครั้งน่ะ"
2004706-21 = "เอาละ รีบๆ เข้าสิ"
2004706-25 = "ยื่นมือมา"
2004706-29 = "ฮู่วว..."
2004706-30 = "[s3] \"ไม่ต้องกังวลนะ\"\n[s4] \"ครูอยู่ข้างๆ แล้วนี่ไง\""
2004706-36 = "อื้อ... รบกวนด้วยนะ"
2004706-40 = "(หลังจากนั้นคุณครูก็สนุกกับการว่ายน้ำกับคิเคียวอยู่นาน)"
2004706-42 = "ขอบคุณนะ คุณครู"
2004706-43 = "จากนี้ฉันน่าจะลงน้ำคนเดียวได้อย่างไร้กังวลแล้วละ"
2004706-44 = "ขอบคุณที่ไม่ปล่อยมือกันนะ"
2004706-45 = "[s] \"ครูไม่ได้ช่วยอะไรมากเลย\""
2004706-46 = "จะว่าไป คุณไม่เหนื่อยบ้างเหรอ?"
2004706-47 = "[s] \"หืม? ครูยังไหวนะ?\""
2004706-48 = "ฉันไม่ไหวแล้ว"
2004706-49 = "แต่คุณยังสดชื่นได้อยู่งั้นเหรอ?"
2004706-50 = "[s5] \"อ๊ะ! จู่ๆ ก็รู้สึกเพลียขึ้นมาซะงั้น...!\"\n[s6] \"อึก! จู่ๆ ก็หมดแรงขึ้นมาเฉยเลย...!\""
2004706-53 = "ใช่มั้ยล่ะ...?"
2004706-54 = "คุณเองก็น่าจะเหนื่อยเหมือนกัน งั้นเราไปพักผ่อนกันเถอะ ฉันเตรียมบางอย่างเอาไว้ให้เป็นพิเศษเลย"
2004706-55 = "[s] \"ที่บอกว่า 'มีเรื่องต้องทำ' เมื่อกี้ก็คือ...\""
2004706-56 = "ฮุฮุ ได้เห็นเดี๋ยวก็รู้เองนั่นละ"
2004706-60 = "ทางนี้ ตามมาสิ"
2004706-66 = "[ns] \"โอ้... นี่มัน...?\""
2004706-67 = "รู้วิธีใช้หรือเปล่า? ใช่แล้ว นอนลงแบบนั้นละ"
2004706-70 = "― [log=키쿄 수영복]เป็นยังไงล่ะ? ใช้ได้เลยใช่มั้ย?[/log][wa:930] "
2004706-72 = "― [log=키쿄 수영복]ฉันถักมันไว้เพื่อวันนี้เลย[/log]"
2004706-75 = "― [log=키쿄 수영복]หวังว่าคุณจะสนุกให้เต็มที่เลยนะ[/log][wa:550] "
2004706-78 = "[ns7] \"ดีจังเลยนะ!\"\n[ns8] \"สบายจัง!\""
2004706-81 = "― [log=키쿄 수영복]ที่จริง... นี่เป็นครั้งแรกเลยละ [/log][wa:3030] "
2004706-84 = "― [log=키쿄 수영복]ที่ฉันทำอะไรแล้วนึกถึงหน้าของใครบางคนตลอดเลย[/log][wa:3070] "
2004706-86 = "― [log=키쿄 수영복]รวมถึงการให้ใครได้เห็นฉันที่ผ่อนคลายแบบนี้ด้วย[/log][wa:650] "
2004706-89 = "― [log=키쿄 수영복]ฉันจะ... ไม่บอกหรอกนะว่าคนคนนั้นคือใคร[/log][wa:1410] "
2004706-92 = "― [log=키쿄 수영복]แต่ต่อไปก็ช่วยอยู่ข้างๆ ฉันด้วยนะ...[/log][wa:1400] "
2004706-94 = "― [log=키쿄 수영복]ฉันเองก็จะคอยปกป้องคุณอยู่ข้างๆ เหมือนกัน[/log][wa:700] "
2004706-97 = "― [log=키쿄 수영복]พันธมิตรของเรา... จะไม่มีวันเสื่อมคลายนะ...[/log][wa:1340] "
2004706-100 = "(แล้วคุณครูกับคิเคียวก็สนุกกับการนอนเปลด้วยกันจนถึงดึกดื่น)"

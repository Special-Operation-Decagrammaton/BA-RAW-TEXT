[translation]
2004706-1 = "作戰參謀的奇策"
2004706-2 = "（如桔梗所說，準時來到了海邊）"
2004706-7 = "你來啦。我在等你哦。"
2004706-8 = "[s]「事情都順利解決了嗎？」"
2004706-9 = "沒問題。#n所以放心享受吧。"
2004706-10 = "嗯？問我今天要做什麼？"
2004706-11 = "你很快就會知道了。"
2004706-12 = "首先……今天我打算走到胸口的深度。"
2004706-13 = "所以這次也希望你能幫我，可以嗎？"
2004706-14 = "[s1]「需要牽繩嗎？」\n[s2]「還是用玩翻花繩的線？」"
2004706-17 = "隨你高興就好。"
2004706-18 = "[s]「真，真的能隨我高興嗎！？」"
2004706-19 = "反正你捉弄我也不是一兩天的事了。"
2004706-20 = "我只是覺得每件事都認真反應很傻而已。"
2004706-21 = "來，快點。"
2004706-25 = "把手給我。"
2004706-29 = "呼……"
2004706-30 = "[s3]「沒事的。」\n[s4]「我就在你身邊哦？」"
2004706-36 = "……嗯，拜託你了。"
2004706-40 = "（之後和桔梗一起享受了好一段時間的海水浴）"
2004706-42 = "謝謝你，老師。"
2004706-43 = "現在就算我一個人下水也不用擔心了吧。"
2004706-44 = "或許是多虧你一直沒有放開我的手的關係。"
2004706-45 = "[s]「這點小事不算什麼。」"
2004706-46 = "話說回來，你不覺得有點累了嗎？"
2004706-47 = "[s]「嗯？我感覺還好耶？」"
2004706-48 = "我都已經快虛脫了。"
2004706-49 = "你還這麼有精神嗎？"
2004706-50 = "[s5]「啊！我突然好想睡……！」\n[s6]「奇怪，怎麼全身好像沒力了……！」"
2004706-53 = "……對吧？"
2004706-54 = "既然你看起來也累了，我就帶你去我特別準備的休息處吧。"
2004706-55 = "[s]「難道剛才說『要做的事情』是……」"
2004706-56 = "呵呵，你看了就知道了。"
2004706-60 = "這邊，跟我來吧。"
2004706-66 = "[ns]「哦哦，這是……？」"
2004706-67 = "知道怎麼用嗎？#n沒錯，這樣躺下來就對了。"
2004706-70 = "― [log=키쿄 수영복]怎麼樣？還不賴吧？[/log][wa:1810] "
2004706-72 = "― [log=키쿄 수영복]是我為了今天而做的。[/log]"
2004706-75 = "― [log=키쿄 수영복]來，好好享受吧。[/log][wa:1470] "
2004706-78 = "[ns7]「這個很讚耶！」\n[ns8]「感覺超棒的！」"
2004706-81 = "― [log=키쿄 수영복]其實……這全部，都是第一次。[/log][wa:3750] "
2004706-84 = "― [log=키쿄 수영복]無論是在製作東西的時候，一直浮現某個人的臉……[/log][wa:3910] "
2004706-86 = "― [log=키쿄 수영복]還是把毫無防備的模樣，展現給某個人看。[/log][wa:1730] "
2004706-89 = "― [log=키쿄 수영복]雖然……我沒打算連是誰都說出來就是了。[/log][wa:2170] "
2004706-92 = "― [log=키쿄 수영복]……今後也待在我身邊吧。[/log][wa:2360] "
2004706-94 = "― [log=키쿄 수영복]你的身旁，就由我來守護。[/log][wa:1860] "
2004706-97 = "― [log=키쿄 수영복]……這個同盟，是永恆的哦。[/log][wa:2540] "
2004706-100 = "（於是吊床上的愉快時光，就這麼一路延續到了深夜）"

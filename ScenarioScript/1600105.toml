[translation]
1600105-1 = "Maid in Surprise"
1600105-3 = "（雖然熬夜工作，但始終看不見終點）"
1600105-8 = "（想著稍微休息一下就趴在桌子上，於是意識漸漸的……）"
1600105-11 = "（……）"
1600105-12 = "……人。"
1600105-13 = "……主人？"
1600105-16 = "主人？啊咧，真奇怪──應該差不多要起來了呀。"
1600105-17 = "[s] 「明日奈……？」"
1600105-18 = "啊，主人早安！我按照約定來了唷！"
1600105-19 = "正好你看起來很累，我想這是個侍奉的好機會！"
1600105-20 = "這裡？是夏萊的宿舍唷？因為主人趴在桌子上睡著了，所以就把主人搬過來了。"
1600105-21 = "嗯？為什麼是那種表情？難道是害羞了？比起這個，就算再累也不能趴在桌子上睡覺的唷。"
1600105-22 = "桌子上都是營養飲料跟文件……這樣下去的話身體會壞掉的唷？"
1600105-23 = "好啦好啦，總之現在就暫時把那些全都忘了，老老實實接受明日奈的侍奉吧？"
1600105-24 = "外送也差不多要到了，一起來吃吧！"
1600105-25 = "……嗯？就算是女僕也會叫外送的呀，因為很好吃嘛！"
1600105-26 = "你問我怎麼進來的……從入口啊。"
1600105-27 = "……密碼？"
1600105-28 = "啊，你說那個機器？憑感覺按一按就開了呀？"
1600105-29 = "……啊哈哈哈哈！！那是什麼表情，還是一樣可愛呢，主人──！"
1600105-30 = "……嗯──？怎麼啦，待在這裡也可以的唷？"
1600105-31 = "還有文件要處理？你說桌上的那些嗎？"
1600105-32 = "把類似的文件放在一起就可以了吧？我已經都弄好了，放心吧！雖然我沒有很仔細看。"
1600105-33 = "但我覺得應該是沒問題……還是很在意的話，要拿來給主人看嗎？"
1600105-35 = "（明日奈把整理過的文件拿了幾份給我看）"
1600105-36 = "（雖然她說沒有認真看，卻正確得不可思議）"
1600105-37 = "嗯？你問我怎麼辦到的？……直覺？"
1600105-38 = "做得很好？太好了～！"
1600105-39 = "啊，打掃跟洗衣服我都已經做好了，主人可以什麼都不用擔心的唷？"
1600105-40 = "有沒有什麼要我幫忙做的呢？什麼都可以喔！"
1600105-41 = "吃飯？洗澡？還是……"
1600105-42 = "[s1] 「肩膀好像，有點痠……」\n[s2] 「……那就麻煩幫我按摩吧。」"
1600105-43 = "哦！主人也慢慢習慣當「主人」了呢！按照這個感覺繼續拜託我也可以的唷！"
1600105-44 = "哦！主人也慢慢習慣當「主人」了呢！按照這個感覺繼續拜託我也可以的唷！"
1600105-45 = "那麼，就幫主人做明日奈的特別按摩！"
1600105-46 = "來，請轉過去吧？"
1600105-48 = "脖子後面，嗯，嗯……肩膀也，這樣，按一下。像是要包覆住一樣揉一揉～"
1600105-52 = "（雖然是沒有用太多力氣的溫柔手法，卻讓僵硬的肌肉放鬆了，非常舒服）"
1600105-53 = "……怎麼樣呀？感覺有效嗎？"
1600105-54 = "啊哈，被按摩的主人像貓一樣發出叫聲了呢？"
1600105-55 = "好，OK～！有感覺舒服一點了嗎？"
1600105-56 = "嗯，那就好！我也很開心！"
1600105-57 = "咦？為什麼開心？畢竟我是女僕嘛！"
1600105-58 = "能夠順利侍奉主人，對女僕來說就是最大的喜悅了！"
1600105-59 = "嗯？說「能夠順利」很像是特務？啊哈哈，好像也是呢。"
1600105-60 = "……嗯？什麼？"
1600105-61 = "……咦，要對明日奈？"
1600105-62 = "由主人來侍奉？"
1600105-63 = "……什麼意思？"
1600105-64 = "……啊，這次要換主人來揉我的肩膀？"
1600105-65 = "太好了──！好像很有趣！明明是女僕卻被人侍奉真是新奇！"
1600105-66 = "那就，請吧！"
1600105-69 = "準備OK！那就麻煩主人囉──！"
1600105-70 = "[s] 揉明日奈的肩膀"
1600105-72 = "……嗯。"
1600105-73 = "……呀！？"
1600105-74 = "……？"
1600105-75 = "[s] 「……？」"
1600105-76 = "……？？？"
1600105-77 = "咦，什，什麼？主人剛剛做了什麼？"
1600105-78 = "……只有揉肩膀而已？真的嗎？"
1600105-79 = "咦，咦咦？沒，沒事，沒什麼，只是稍微嚇到了而已……？"
1600105-80 = "沒，沒事的！我沒事的請繼續吧！"
1600105-81 = "[s] 揉明日奈的脖子附近"
1600105-83 = "……"
1600105-84 = "……哈啊！？"
1600105-85 = "……？？？"
1600105-86 = "什，什麼！？這是什麼感覺？這種感覺好像是第一次……？"
1600105-87 = "……咦？咦？怎麼辦才好？"
1600105-88 = "問要不要停下來……？不，不用，沒事的！"
1600105-89 = "那個，不，不是不喜歡之類的，這個是，那個……"
1600105-90 = "呃……"
1600105-91 = "再，再一次！請溫柔一點哦！"
1600105-92 = "沒，沒有在緊張！我沒事！大，大概……！"
1600105-93 = "……嗯，呼，嗯……主人……沒事的……"
1600105-94 = "就，就這樣繼續……"
1600105-97 = "您好──！您點的外送來了──！！"
1600105-98 = "（……）"
1600105-99 = "（之後，兩個人乖乖地吃了飯）"

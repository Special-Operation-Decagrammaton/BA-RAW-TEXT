1600105-15 = "3;아스나;01\n#3;a\n#wait;1500"
1600105-16 = "3;아스나;01;주인님? 으음. 이상하다. 슬슬 일어날 때가 된 거 같은데……\n#3;em;…"
1600105-17 = "[s] \"아스나……?\""
1600105-18 = "3;아스나;03;아, 일어났네! 정신이 들어? 주인님! 약속대로 아스나가 왔어!\n#3;hophop\n#3;em;[반응]"
1600105-19 = "3;아스나;03;마침 되게 피곤해 보여서, 보답의 봉사를 해줄 수 있는 기회라고 생각했지!\n#3;greeting"
1600105-20 = "3;아스나;02;여기가 어디냐고? 생활관인데? 주인님이 자고 있길래, 내가 안아서 데려왔는데?"
1600105-21 = "3;아스나;06;응? 왜 놀라는 거야? 정말~. 아무리 피곤하다고 책상에서 그냥 자면 어떻게 해!\n#3;em;[반응]"
1600105-22 = "3;아스나;05;온 사방에 각성 드링크랑 서류뭉치만 쌓여서는…… 그러다간 몸 버리겠어."
1600105-23 = "3;아스나;03;자, 자. 오늘 하루만이라도 전~부 잊어버리고, 아스나의 봉사를 받는 거야, 알았지?\n#3;em;[음표]"
1600105-24 = "3;아스나;03;마침 조금 있으면 도착하게끔 배달음식도 주문해 뒀으니까, 같이 먹는 거야! 주인님!\n#3;hophop"
1600105-25 = "3;아스나;02;……응? 뭐라고? 메이드가 배달요리를 주문해도 되냐고?\n#3;em;[?]"
1600105-26 = "3;아스나;01;아니, 그것보다 어떻게 들어왔냐고? 그게 무슨 말이야? 당연히 현관으로 들어왔지."
1600105-27 = "3;아스나;01;……현관 비밀번호?\n#3;em;…"
1600105-28 = "3;아스나;02;으음~? 대충 이거겠지~ 하는 느낌으로 누르니까 맞았다면서 열리던데?"
1600105-29 = "3;아스나;03;……아하하하하!! 또 멍한 표정! 귀여워, 주인님!\n#3;shake\n#3;em;[재잘]"
1600105-30 = "3;아스나;01;……응?"
1600105-31 = "3;아스나;02;아직 해야 할 일이 남아 있다고? 서류 분류작업? 아, 그 책상 위에 있던 것들?"
1600105-32 = "3;아스나;01;그거라면 내가 다 해 놨는데? 뭐, 제대로 읽고 한 건 아니지만.\n#3;greeting"

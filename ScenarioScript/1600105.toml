[translation]
1600105-1 = "The Maid's Surprise"
1600105-3 = "(I'm pulling another all-nighter. My suffering never ends, no matter how much I try.)"
1600105-8 = "(I laid my head on my desk for only a second before I was out cold.)"
1600105-11 = "(...)"
1600105-12 = "...ster?"
1600105-13 = "Master?"
1600105-16 = "Master? That's strange. You should be awake by now."
1600105-17 = "[s] \"Asuna?\""
1600105-18 = "Now you're awake! How do you feel, Master? I came by just like I promised!"
1600105-19 = "You seemed really tired, so I thought this would be the perfect opportunity to repay you."
1600105-20 = "You're probably wondering where you are. I picked you up while you were sleeping and brought you to the Residence Hall."
1600105-21 = "Why the surprised look? Seriously! Being tired is no excuse to fall asleep at your desk."
1600105-22 = "I found you in a pile of papers and empty energy drink cans. You're going to ruin your health at this rate, you know."
1600105-23 = "Come here. Put everything out of your mind and let me take care of you, okay?"
1600105-24 = "I ordered food for us. Master. It should be here any minute."
1600105-25 = "What's that? Isn't it strange for a maid to be ordering delivery?"
1600105-26 = "And you want to know how I got us inside, huh? We came through the front door, obviously."
1600105-27 = "Oh, how did I know the door code?"
1600105-28 = "I dunno. I pressed the buttons I thought would work and then it opened."
1600105-29 = "Hahaha! You're making that face again! You're so cute, Master."
1600105-30 = "Huh?"
1600105-31 = "You still have papers to sort through? Oh, you mean the ones that were on your desk?"
1600105-32 = "I already took care of those. Well, I didn't read them, to be fair."
1600105-33 = "I just sorted the ones that looked similar. Do you want me to bring them to you?"
1600105-35 = "(Asuna quickly brought some of the organized files and showed them to me.)"
1600105-36 = "(The files were surprisingly well-organized despite being sorted based on guesswork.)"
1600105-37 = "How did I do this good of a job? Like I said, I was just making educated guesses."
1600105-38 = "That look on your face tells me you're satisfied. That's good!"
1600105-39 = "Oh, and I already cleaned your office and took care of your laundry, so you don't have chores to worry about either."
1600105-40 = "So what do you wanna do now? You can ask me about anything except your work!"
1600105-41 = "Just want to eat? Take a bath? Or..."
1600105-42 = "[s1] \"My shoulders are a bit stiff...\"\n[s2] \"Would it be too much to ask for a massage?\""
1600105-43 = "Well, well! Look at you, becoming more comfortable with asking for your maid's services, Master."
1600105-44 = "Well, well! Look at you, becoming more comfortable with asking for your maid's services, Master."
1600105-45 = "One Asuna five-star massage coming right up!"
1600105-46 = "Now, now. Turn around and sit down."
1600105-48 = "From the back of the neck...press the shoulders lightly with your hands like this."
1600105-52 = "(Asuna's touch is gentle, yet strong enough to relieve the tension in my muscles.)"
1600105-53 = "So? How do you feel?"
1600105-54 = "Haha. You're purring like a kitty cat!"
1600105-55 = "Okay, all done! Are you feeling any better, Master?"
1600105-56 = "You look like a whole new Sensei. Good to see. In fact, I'm a little proud for some reason!"
1600105-57 = "You think I look even more refreshed than you do? It's only natural. I'm a maid, after all."
1600105-58 = "A maid's greatest pleasure is hearing that she has served her master well!"
1600105-59 = "Did you just say I'm more of a secret agent than a maid? Haha. Let's not pay attention to the minor details..."
1600105-60 = "What...was that?"
1600105-61 = "You want to..."
1600105-62 = "...serve me?"
1600105-63 = "What do you mean? How would a master serve their maid?"
1600105-64 = "Oh! Do you want to rub my shoulders like I rubbed yours? For me?"
1600105-65 = "Oooh, that sounds fun! The maid getting to be served for a change."
1600105-66 = "Then I'll turn around and take a seat. Just like this!"
1600105-69 = "Well, if you insist. I'm ready when you are, Master!"
1600105-70 = "[s] (Massage Asuna's shoulders.)"
1600105-72 = "..."
1600105-73 = "Ah?!"
1600105-74 = "...?"
1600105-75 = "[s] \"...?\""
1600105-76 = "???"
1600105-77 = "Wh-What was that? What are you doing, Master?"
1600105-78 = "Did you just...massage my shoulders?"
1600105-79 = "N-No. I was just surprised, is all..."
1600105-80 = "I-I'm fine with it. You continue, and I'll sit still."
1600105-81 = "[s] (Massage Asuna's lower neck.)"
1600105-83 = "..."
1600105-84 = "Eep!"
1600105-85 = "...?"
1600105-86 = "Wh-What's going on? I've never felt like this before..."
1600105-87 = "Sorry, what was that?"
1600105-88 = "You think it's best that you...stop?"
1600105-89 = "N-No! It isn't that I'm not enjoying myself. It's more like..."
1600105-90 = "U-Um..."
1600105-91 = "Just, try one more time! I promise I'll be okay!"
1600105-92 = "N-No, I'm not nervous! So...!"
1600105-93 = "...Go ahead. Please try one more time, Master."
1600105-94 = "A-A little more..."
1600105-97 = "Deliveryyy!"
1600105-98 = "(...)"
1600105-99 = "(I sent Asuna home after she and I ate together.)"

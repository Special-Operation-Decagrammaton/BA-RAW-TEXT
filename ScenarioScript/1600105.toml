[translation]
1600105-1 = "ของขวัญเซอร์ไพรส์ของเมด"
1600105-3 = "(เป็นอีกวันที่คุณครูต้องทำงานถึงกลางดึก แต่ก็ไม่มีทีท่าว่างานจะเสร็จ)"
1600105-8 = "(คิดว่าจะเอาหัวฟุบกับโต๊ะเพื่อพักผ่อนสักเดี๋ยวเดียว แต่พอนอนก็เผลอหลับไปเลย)"
1600105-11 = "(...)"
1600105-12 = "...ท่าน?"
1600105-13 = "...นายท่าน?"
1600105-16 = "นายท่าน? อืม แปลกจังเลย เวลานี้น่าจะตื่นได้แล้วนะ..."
1600105-17 = "[s] \"อาสึนะเหรอ...?\""
1600105-18 = "อ่า ตื่นแล้วเหรอ?! รู้สึกยังไงบ้าง? อาสึนะมาตามสัญญาแล้วนะ!"
1600105-19 = "นายท่านดูเหนื่อยมากเลย ฉันคิดว่าจะช่วยทำอะไรให้สักหน่อยแล้ว!"
1600105-20 = "ที่นี่คือที่ไหนน่ะเหรอ? ก็ที่พักไง? ฉันไปเจอนายท่านนอนหลับอยู่ ก็เลยแบกมาที่นี่"
1600105-21 = "ทำไมถึงตกใจล่ะ!? นายท่านนี่น๊า~ ถึงจะเหนื่อยแค่ไหน แต่จะไปนอนบนโต๊ะไม่ได้นะ!"
1600105-22 = "รอบๆ ตัวมีแต่กระป๋องเครื่องดื่มกับกองกระดาษ... ถ้าหักโหมแบบนี้จะเสียสุขภาพเอานะ"
1600105-23 = "วันนี้ลืมเรื่องงานไปให้หมด แล้วมาให้อาสึนะดูแลซะดีๆ เข้าใจมั้ย?"
1600105-24 = "ฉันสั่งข้าวไว้ให้แล้ว เดี๋ยวก็มาถึงแล้วล่ะ เรามากินด้วยกันนะนายท่าน!"
1600105-25 = "...หืม? ว่าไงนะ? มันแปลกที่เมดสั่งอาหารกินงั้นเหรอ?"
1600105-26 = "แล้วก็สงสัยว่าเข้ามาที่นี่ได้ยังไงงั้นเหรอ? พูดแบบนี้หมายความว่าอะไรน่ะ? ก็ต้องเข้าทางประตู#nหน้าอยู่แล้วสิ"
1600105-27 = "...รหัสผ่านงั้นเหรอ?"
1600105-28 = "อืม~? ก็แค่เดาๆ เอาน่ะ แต่พอลองกดแล้วมันก็ถูกขึ้นมา"
1600105-29 = "ฮ่ะฮ่ะฮ่ะฮ่าา!! ทำหน้าอะไรเนี่ย? นายท่านเนี่ยน่ารักจัง!"
1600105-30 = "หือ...?"
1600105-31 = "ยังจัดเอกสารไม่เสร็จเหรอ? พวกที่อยู่บนโต๊ะใช่มั้ย?"
1600105-32 = "ฉันจัดให้หมดแล้วแหละ แต่ก็ไม่ได้อ่านดูดีๆ หรอกนะ"
1600105-33 = "ฉันจัดลวกๆ น่ะ แค่เอาเอกสารที่ดูคล้ายๆ กันมาไว้ด้วยกัน... ถ้าอยากดู ให้ฉันไปเอามาให้ดูมั้ย?"
1600105-35 = "(อาสึนะไปเอาแฟ้มเอกสารที่จัดแล้วมาให้ดู)"
1600105-36 = "(บอกว่าจัดลวกๆ แต่ว่ามันถูกต้องและเป็นระเบียบอย่างเหลือเชื่อ)"
1600105-37 = "หือ? สงสัยว่าจัดอย่างเป็นระเบียบแบบนี้ได้ยังไงน่ะเหรอ? ระบงระเบียบอะไรกันล่ะ?#nก็บอกว่าจัดลวกๆ ไง"
1600105-38 = "ดูทำหน้าเข้าสิ นี่ฉันจัดได้ถูกต้องหมดเลยล่ะสิท่า? โล่งอกไปที~"
1600105-39 = "ฉันทำความสะอาดสำนักงานแล้วก็ซักผ้าไว้ให้แล้วล่ะ นายท่านไม่มีอะไรที่ต้องทำแล้ว"
1600105-40 = "หรือมีอะไรที่อยากทำมั้ย? ถ้าไม่ใช่เรื่องงานก็บอกฉันได้ทุกอย่างเลย!"
1600105-41 = "ทานข้าว? อาบน้ำ? หรือว่า..."
1600105-42 = "[s1] \"เมื่อยไหล่อยู่พอดี...\"\n[s2] \"...ช่วยนวดให้หน่อยได้มั้ย?\""
1600105-43 = "โอ้ว! นายท่านสั่งงานอาสึนะอย่างสบายใจขึ้นแล้วสินะ! ดีเลยๆ"
1600105-44 = "โอ้ว! นายท่านสั่งงานอาสึนะอย่างสบายใจขึ้นแล้วสินะ! ดีเลยๆ"
1600105-45 = "โอเค! งั้นอาสึนะจะนวดให้เป็นพิเศษเลย รับรองสบายตัวแน่! เห็นแบบนี้ฉันก็นวดเก่งอยู่นะ!"
1600105-46 = "เอาล่ะ หมุนตัวแล้วนั่งลงไปเลยค่ะ~"
1600105-48 = "เริ่มจากหลังคอ... แล้วลงมาที่ไหล่แบบนี้~ ใช้มือกดเบาๆ แค่พอประมาณ~"
1600105-52 = "(อาสึนะนวดเบาๆ อย่างอ่อนโยน น่าตกใจที่ความปวดเมื่อยหายไปหมด)"
1600105-53 = "...เป็นไง? ดีขึ้นบ้างมั้ย?"
1600105-54 = "ฮ่ะฮ่ะฮ่ะฮ่าา! นายท่านส่งเสียงเหมือนแมวเลย? ฟินเหรอ?"
1600105-55 = "เสร็จแล้วค่า! สบายตัวขึ้นบ้างมั้ยคะนายท่าน?"
1600105-56 = "โอ้ว~! นายท่านดูมีพลังขึ้นนะ? โชคดีที่การนวดได้ผลด้วย ดีใจจัง!"
1600105-57 = "หืม? ทำไมฉันถึงดูอารมณ์ดีกว่างั้นเหรอ? มันก็แน่นอนอยู่แล้ว! ก็ฉันเป็นเมดไง!"
1600105-58 = "การบริการนายท่านจนพอใจและมีความสุข คือความปรารถนาสูงสุดคือเมดยังไงล่ะ!"
1600105-59 = "คิดว่าฉันดูเป็นสายลับมากกว่าเมดเหรอ? ฮ่ะฮ่ะฮ่า! อย่าสนใจอะไรเล็กๆ น้อยๆ เลยน่า..."
1600105-60 = "หือ... อะไรนะ?"
1600105-61 = "ครั้งนี้นายท่านจะ..."
1600105-62 = "บริการอาสึนะเหรอ...?"
1600105-63 = "หมายความว่ายังไง? นายท่านจะบริการอะไรให้ฉันนะ?"
1600105-64 = "อ๋อ~ จะนวดไหล่ตอบแทนฉันใช่มั้ย?"
1600105-65 = "ว้าว~! ดีเลย! น่าสนุกนะ! เมดจะได้รับบริการจากนายท่านเหรอเนี่ย?"
1600105-66 = "งั้นฉันจะนั่งหันหลังให้ เอาล่ะ นั่งตัวตรงแบบนี้~"
1600105-69 = "เอาล่ะ พร้อมแล้ว! รบกวนด้วยนะคะนายท่าน!"
1600105-70 = "[s] (นวดไหล่ให้อาสึนะ)"
1600105-72 = "......"
1600105-73 = "...เฮือก!?"
1600105-74 = "......?"
1600105-75 = "[s] \"...?\""
1600105-76 = "......???"
1600105-77 = "อะไรกัน? อะไรเนี่ย? เมื่อกี้นายท่านทำอะไรน่ะ?"
1600105-78 = "......? หืม? แค่นวดไหล่งั้นเหรอ?"
1600105-79 = "อะ... อืม ไม่มีอะไรหรอก ไม่มีอะไร ก็แค่... ตกใจนิดหน่อย..."
1600105-80 = "นวดต่อเลย ฉันไม่เป็นไร! จะนั่งนิ่งๆ ให้แบบนี้แหละ"
1600105-81 = "[s] (นวดคอด้านล่างให้อาสึนะ)"
1600105-83 = "......"
1600105-84 = ".....เฮือก!!"
1600105-85 = "......??"
1600105-86 = "อะ... อะไรเนี่ย!? ทำไมเป็นอย่างนี้ล่ะ? ไม่เคยรู้สึกแบบนี้มาก่อนเลย...?"
1600105-87 = "......? หืม? ว่าไงนะ?"
1600105-88 = "ควรหยุดนวด... ดีกว่า... งั้นเหรอ?"
1600105-89 = "มะ... ไม่หรอก! ไม่เป็นไร ฉันไม่ได้ไม่ชอบ ก็แค่... เอ่อ..."
1600105-90 = "อะ... อืม..."
1600105-91 = "ถะ... ถ้างั้นขออีกรอบแล้วกัน! รอบสุดท้ายแล้ว!"
1600105-92 = "ไม่ใช่อย่างนั้นนะ ฉันไม่ได้ประหม่าสักหน่อย! ก็บอกว่าไม่เป็นไรไง"
1600105-93 = "อืม... อืม... ขออีกรอบได้มั้ย... นายท่าน..."
1600105-94 = "อะ... อีกรอบนะ..."
1600105-97 = "อาหารมาส่งแล้วคร้าบบบบ!!"
1600105-98 = "(...)"
1600105-99 = "(คุณครูกินข้าวเสร็จแล้วก็ส่งอาสึนะกลับบ้าน)"

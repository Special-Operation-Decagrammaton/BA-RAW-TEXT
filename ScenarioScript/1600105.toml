1600105-36 = "#na;(대충 감으로 했다더니, 믿을 수 없을 정도로 정확하게 잘 분류가 되어 있었다.)"
1600105-37 = "3;아스나;02;응? 어떻게 한 거냐고? 뭘 어떻게 해? 그냥 대충 감으로 찍어서 한 건데?\n#3;a\n#3;em;[?]"

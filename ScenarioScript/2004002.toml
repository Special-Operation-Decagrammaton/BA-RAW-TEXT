2004002-74 = "#st;[0,0];instant;1;"
2004002-75 = "#clearST"
2004002-76 = "3;사츠키;99;\n#3;em;…\n#wait;2500"
2004002-77 = "3;사츠키;02;결식 학생을 위한 모금에 매달 참여하고 있다던데? 후후.\n#3;closeup\n#fontsize;80"
2004002-78 = "[s] \"……\""
2004002-79 = "#wait;1000"
2004002-80 = "[ns5] \"내 입으로 말하긴 그렇지만……\"\n[ns6] \"그건 약점이라기보다는 미담의 영역 아닐까?\""
2004002-81 = "#wait;100"
2004002-82 = "#wait;100"
2004002-83 = "3;사츠키;99;아니, 아니. 그렇지 않아."
2004002-84 = "3;사츠키;01;우리가 살아가는 키보토스는 그야말로 야생. 적자생존의 세계니까."
2004002-85 = "3;사츠키;02;그런 냉혹한 세계에서 섣부른 동정심을 발휘하는 건 스스로 약점을 드러내는 거나 마찬가지잖아?"
2004002-86 = "[s] \"나는 선생이니까, 학생을 위한 일을 하고 있을 뿐이야.\""
2004002-87 = "3;사츠키;03;후후, 이것마저 아무렇지 않게 넘기는 거야?\n#3;em;[재잘]"
2004002-88 = "3;사츠키;02;역시 선생이네. 본인이 인정해버리면 더 이상 해당 정보를 악의적으로 활용할 수 없는 맹점을 공략하다니."
2004002-89 = "[s] \"아니, 애초에 약점이 아니라니까 그거……\""
2004002-90 = "3;사츠키;03;흐응, 하지만 이번 정보는 정말 치명적일걸?\n#3;em;[음표]"
2004002-91 = "3;사츠키;01;선생의 약점, 그 세 번째……\n#3;greeting"
2004002-92 = "#st;[0,0];instant;1;"
2004002-93 = "#clearST"
2004002-94 = "3;사츠키;99\n#3;em;…\n#wait;2500"
2004002-95 = "3;사츠키;02;선생은 인스턴트 라면을 끓일 때, 봉지 밑바닥에 남은 부스러기까지 탈탈 털어 넣는다……!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
2004002-96 = "[s] \"……\""
2004002-97 = "#wait;1000"
2004002-98 = "[ns] \"그게 보통 아니야……?\""
2004002-99 = "3;사츠키;03;후후, 같은 행동일지라도 누가 하느냐에 따라 그 의미가 달라지는 법이지.\n#3;em;[재잘]"
2004002-100 = "3;사츠키;99;언제나 고고하고 완벽한 샬레의 선생이, 평범한 사람들이나 하는 행실을 한다고?"
2004002-101 = "3;사츠키;01;과연 이 사실을 학생들이 알게 되면 어떨까? 크게 실망해서 등을 돌리지 않을까?"
2004002-102 = "3;사츠키;03;하지만 우리 만마전은 달라. 선생의 그런 결점까지도 포용할 수 있는……\n#3;em;[음표]"
2004002-103 = "[s] \"아니, 괜찮아……\""
2004002-104 = "#st;[0,0];instant;1;"
2004002-105 = "#clearST"
2004002-106 = "3;사츠키;99;아직 상황 파악이 덜 된 모양이네.\n#3;em;[한숨]\n#3;greeting"

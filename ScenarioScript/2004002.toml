[translation]
2004002-1 = "#title;사츠키는 알고 있다."
2004002-2 = "#na;(사츠키의 연락을 받고 얼마 지나지 않아……)"
2004002-3 = "#st;[0,0];instant;1;"
2004002-4 = "#clearST"
2004002-5 = "#wait;2000"
2004002-6 = "3;사츠키;01;후후, 여기가 선생의 사무실…… 마코토 쨩이 말한 것처럼 생각보다 간소하구나.\n#3;a"
2004002-7 = "3;사츠키;02;아, 혹시 바빴던 건 아니지?\n#3;em;[반응]"
2004002-8 = "[s] \"바쁜 거야 항상 바쁘지. 그런데 무슨 일……\""
2004002-9 = "3;사츠키;01;뭐, 그렇다 하더라도 상관없어."
2004002-10 = "3;사츠키;03;내가 가져온 건 아무리 바쁜 일이라도 미뤄야 할 정도로 중요한 안건이니까.\n#3;em;[반짝]"
2004002-11 = "[s1] \"처음부터 내 말을 들을 생각이 없었구나……\"\n[s2] \"대체 무슨 일이길래 그래?\""
2004002-12 = "#wait;100"
2004002-13 = "#wait;100"
2004002-14 = "3;사츠키;99;흠, 선생이라면 짐작하고 있을 줄 알았는데."
2004002-15 = "3;사츠키;03;연기는 그만해도 돼. 전문가들의 대화잖아?\n#3;em;[음표]"
2004002-16 = "3;사츠키;01;어쨌든, 지금 진행 중인 만마전의 계획……"
2004002-17 = "3;사츠키;01;마코토 쨩의 [키보토스 언론 장악] 1단계가 본격적인 궤도에 오르게 되었으니."
2004002-18 = "#st;[0,0];instant;1;"
2004002-19 = "#clearST"
2004002-20 = "3;사츠키;01\n#3;d\n#wait;2000"
2004002-21 = "3;사츠키;01\n#3;a\n#3;closeup\n#wait;1000"
2004002-22 = "3;사츠키;02;만마전의 협력자인 선생도 적극적으로 협조하라는 이야기야.\n#3;closeup\n#3;em;[반짝]"
2004002-23 = "#st;[0,0];instant;1;"
2004002-24 = "#clearST"
2004002-25 = "#wait;2500"
2004002-26 = "[ns3] \"아니, 그런 일에 협력한다고 한 적은 없는데.\"\n[ns4] \"애초에 처음 듣는 일이거든?!\""
2004002-27 = "#wait;100"
2004002-28 = "#wait;100"
2004002-29 = "3;사츠키;04;그럴 리가. 만마전 정보부의 자료는 정확했을 텐데?\n#3;em;[?!]"
2004002-30 = "3;사츠키;06;게헨나 광장에서 모두가 지켜보는 가운데 마코토 쨩의 구두를 핥으며 천 년간 무조건적인 협력을 약조한 게 아니었어?"
2004002-31 = "[s] \"아니야!! 대체 어디서 나온 거야, 그런 헛소문!!\""
2004002-32 = "3;사츠키;99;흥, 입수한 정보에 오류가 있는 건가. 귀찮아서 검증 과정을 생략했더니 이런 문제가 생기네.\n#3;em;[한숨]"
2004002-33 = "[s] \"생략해서는 안 될 걸 너무 과감하게 빼버린 거 아냐?\""
2004002-34 = "#st;[0,0];instant;1;"
2004002-35 = "#clearST"
2004002-36 = "3;사츠키;01\n#3;em;…\n#wait;2500"
2004002-37 = "3;사츠키;99;어쨌든 내 소개부터 제대로 해야겠네.\n#3;greeting"
2004002-38 = "3;사츠키;03;나, 쿄고쿠 사츠키는 게헨나 학생회 정보부의 후인이야.\n#3;em;[반짝]"
2004002-39 = "3;사츠키;02;내가 이끄는 만마전 정보부는, 역사의 뒤안길로 사라진 전 게헨나 학생회 정보부의 노하우를 이어받은 기술적 계승자라고 할 수 있고."
2004002-40 = "3;사츠키;03;딱히 정식으로 인계받은 건 아니지만, 그냥 내가 그렇게 생각하고 있지.\n#3;em;[음표]"
2004002-41 = "[s] \"그냥 맘대로 정한 거구나……\""
2004002-42 = "3;사츠키;01;자아, 소개는 이쯤이면 됐고. 본론으로 들어가지."
2004002-43 = "3;사츠키;99;자발적으로 협력하지 않는다면……\n#3;em;…"
2004002-44 = "3;사츠키;02;우리 정보부가 파악한 핵심 정보를 활용해 당신을 협박할 수밖에.\n#3;closeup"

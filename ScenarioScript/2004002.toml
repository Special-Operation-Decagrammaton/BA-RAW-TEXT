[translation]
2004002-1 = "皐月知道"
2004002-2 = "（在接到皐月的聯絡不久之後……）"
2004002-6 = "呵呵，這就是老師的辦公室啊……比真琴醬說的還要簡樸呢。"
2004002-7 = "啊，你該不會很忙吧？"
2004002-8 = "[s]「忙啊，一直都很忙。有什麼事嗎……」"
2004002-9 = "這樣啊，不過就算你很忙也沒辦法。"
2004002-10 = "因為我想討論的，是無論多忙都得優先處理的事情。"
2004002-11 = "[s1]「你打從一開始就沒打算參考我的意見吧……」\n[s2]「所以到底是什麼事？」"
2004002-14 = "哼嗯，我還以為老師已經猜到了呢。"
2004002-15 = "沒必要掩飾。畢竟這可是專家之間的對話嘛？"
2004002-16 = "總之，目前萬魔殿正在推行的計劃……"
2004002-17 = "真琴醬的「奇普托斯媒體控制」的第一階段已經步入正軌。"
2004002-22 = "作為萬魔殿的合作者，老師也應該積極配合才對。"
2004002-26 = "[ns3]「不是，我從來沒說過要配合這種事吧……」\n[ns4]「況且這件事我根本沒聽過啊！？」"
2004002-29 = "怎麼可能。#n萬魔殿情報部的資料應該很精確才對啊？"
2004002-30 = "你不是在格黑娜廣場的眾目睽睽之下──#n舔了真琴醬的鞋子並承諾無條件配合一千年嗎？"
2004002-31 = "[s]「亂講！！這種謠言到底是從哪傳出來的啦！！」"
2004002-32 = "哼，原來是情報有誤啊。#n因為嫌麻煩就省略了查證流程，沒想到居然會出問題。"
2004002-33 = "[s]「你是不是把不該省略的事省略得太果斷了？」"
2004002-37 = "既然如此，我還是先正式介紹一下自己吧。"
2004002-38 = "我，京極皐月──是格黑娜學生會情報部的繼承者。"
2004002-39 = "我所領導的萬魔殿情報部，#n在技術層面承襲了消逝於歷史長河中的前格黑娜學生會情報部。"
2004002-40 = "雖然並沒有經過正式的繼承程序，但我個人就是這麼認為的。"
2004002-41 = "[s]「說白了就是你擅作主張繼承的嘛……」"
2004002-42 = "好了，介紹就到此為止。#n進入正題吧。"
2004002-43 = "如果你不願意主動合作的話……"
2004002-44 = "我也只好利用情報部掌握的關鍵情報來威脅你了。"
2004002-51 = "[ns]「關鍵情報……？」"
2004002-52 = "沒錯，那就是老師你的「弱點」。"
2004002-53 = "呵呵，怎麼樣？做好心理準備了嗎？"
2004002-54 = "[s]「……」"
2004002-56 = "[ns]（因為弱點實在太多，完全猜不到他指的是什麼……）"
2004002-57 = "首先是第一個弱點。"
2004002-58 = "老師你……"
2004002-62 = "有在奇普托斯的田野間裸奔的癖好對吧？"
2004002-63 = "[s]「雖然是有這麼個事實沒錯，但那才不是我的癖好懂嗎！？」"
2004002-64 = "竟然這麼坦率地承認了自己的弱點……？"
2004002-65 = "看來這種程度的事根本無法讓你感到羞恥啊……不愧是老師。"
2004002-66 = "[s]「那件事確實是挺羞恥的……！」"
2004002-67 = "哼，但這還沒結束。"
2004002-68 = "老師的弱點可是多達數十個呢。"
2004002-69 = "[s]「居然這麼多？我到底是怎麼活到現在的……」"
2004002-70 = "如果聽到會怕的話，要我停下來也可以……但前提是你得承諾和萬魔殿合作一千年。"
2004002-71 = "那麼，老師的第二個弱點……"
2004002-72 = "[ns]（吞口水……）"
2004002-73 = "老師你……"
2004002-77 = "每個月都會為貧困飢餓的學生募款對吧？呵呵。"
2004002-78 = "[s]「……」"
2004002-80 = "[ns5]「雖然自己說有點不好意思……」\n[ns6]「但這與其說是弱點，更像是美談吧？」"
2004002-83 = "不不不，不是這樣的。"
2004002-84 = "我們所生活的奇普托斯，是個弱肉強食、適者生存的世界。"
2004002-85 = "在如此殘酷的世界裡草率地表現同情心，無異於暴露自己的弱點不是嗎？"
2004002-86 = "[s]「我是老師，所以只是在做對學生有益的事而已。」"
2004002-87 = "呵呵，這個你也毫不在意嗎？"
2004002-88 = "老師果然不同凡響。#n只要本人大方承認，情報就不會遭到濫用……真是突破盲點了呢。"
2004002-89 = "[s]「不是，我就說那根本不是弱點嘛……」"
2004002-90 = "哼，不過這次的情報絕對是致命的哦？"
2004002-91 = "老師的第三個弱點……"
2004002-95 = "老師煮泡麵的時候，會把包裝底部剩下的碎屑也全部倒進去……！"
2004002-96 = "[s]「……」"
2004002-98 = "[ns]「這不是很普通嗎……？」"
2004002-99 = "呵呵，即使是相同的行為，意義也會隨著做的人是誰而改變。"
2004002-100 = "眾人眼中高貴完美的夏萊老師，竟然會做出一般人也會做的行為？"
2004002-101 = "要是學生們知道了這件事會怎麼樣？#n會不會大失所望，進而漸漸離你而去呢？"
2004002-102 = "但我們萬魔殿不一樣。#n我們就連老師這樣的缺點都能接受……"
2004002-103 = "[s]「不用了，沒關係……」"
2004002-106 = "看來你還沒搞清楚狀況呢。"
2004002-107 = "老師，我現在是在威脅你。"
2004002-112 = "如此巨大的弱點……老師的祕密可是會曝露於全天下的人面前哦！"
2004002-113 = "[s]「我是覺得就算公開也無所謂啦……」"
2004002-118 = "連這個你都不在意嗎……呵呵……"
2004002-119 = "雖然不清楚老師為何能如此鎮靜，但這也沒辦法。"
2004002-120 = "逮住弱點威脅的計劃就此結束。"
2004002-121 = "但我可還沒放棄。"
2004002-122 = "為了得到老師的協助，往後我會使出更激烈的手段。"
2004002-123 = "那麼，我就先告辭了。"
2004002-124 = "[s]「哦哦……你慢走……」"
2004002-127 = "呵呵，下次可不會像今天一樣溫柔了哦。#n好好期待吧。"
2004002-132 = "[ns]「他好像對我有很大的誤解……」"

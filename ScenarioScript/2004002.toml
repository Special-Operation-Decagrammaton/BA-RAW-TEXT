2004002-118 = "3;사츠키;99;이것마저도 개의치 않는 건가…… 후후……\n#3;a"
2004002-119 = "3;사츠키;99;어떻게 그렇게 의연할 수 있는지는 모르겠지만, 별수 없네.\n#3;em;[한숨]"

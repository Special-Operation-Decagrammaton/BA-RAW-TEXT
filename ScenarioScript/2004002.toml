2004002-49 = "#clearST"
2004002-50 = "#wait;2500"
2004002-51 = "[ns] \"핵심 정보……?\""
2004002-52 = "3;사츠키;03;선생, 당신의 '약점'말이야.\n#3;em;[반짝]"
2004002-53 = "3;사츠키;01;후후, 어때? 들을 각오는 됐어?"
2004002-54 = "[s] \"……\""
2004002-55 = "#wait;1000"
2004002-56 = "[ns] (약점이 너무 많아서, 뭐가 나올지 짐작도 안 간다……)"
2004002-57 = "3;사츠키;03;그 첫 번째."
2004002-58 = "3;사츠키;01;선생, 당신은……"
2004002-59 = "#st;[0,0];instant;1;"
2004002-60 = "#clearST"
2004002-61 = "3;사츠키;99\n#3;em;…\n#wait;2500"
2004002-62 = "3;사츠키;02;전라로 키보토스의 들판을 질주하는 취미가 있다지?\n#3;closeup\n#fontsize;80"
2004002-63 = "[s] \"일단 사실이긴 한데!! 취미까지는 아니거든?!\""
2004002-64 = "3;사츠키;10;자신의 약점을 그렇게 선선히 인정하는 거야……?\n#3;em;[?!]"
2004002-65 = "3;사츠키;01;이 정도쯤은 수치의 영역으로 판단하지도 않는다는 건가. 역시 선생이네."
2004002-66 = "[s] \"부끄러운 일이긴 했지만……!\""
2004002-67 = "3;사츠키;99;흥, 하지만 아직 끝나지 않았어.\n#3;em;[한숨]"
2004002-68 = "3;사츠키;01;아직 남아있는 선생의 약점은 수십 개도 넘는다고?"
2004002-69 = "[s] \"그렇게 많아? 어떻게 살아온 거야, 나……\""
2004002-70 = "3;사츠키;02;듣다가 너무 무서우면 그만해도 돼. 대신 만마전에게 천 년의 협력을 약속해 줘야겠지만."
2004002-71 = "3;사츠키;01;자아, 선생의 두 번째 약점……\n#3;greeting"
2004002-72 = "[ns] (꿀꺽……)"

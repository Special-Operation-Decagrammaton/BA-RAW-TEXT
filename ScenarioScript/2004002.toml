[translation]
2004002-1 = "Satsuki is All-Knowing"
2004002-2 = "Not long after getting Satsuki's message..."
2004002-6 = "Heehee, so this is Sensei's office... Like Makoto said, it's more plain than you'd think."
2004002-7 = "Oh, you weren't busy, were you?"
2004002-8 = "[s] \"I'm always busy. Anyway, what brings—\""
2004002-9 = "Well, it doesn't matter."
2004002-10 = "What I'm about to tell you is top priority, no matter what you're up to."
2004002-11 = "[s1] \"You're not going to listen much, are you?\"\n[s2] \"What exactly is going on?\""
2004002-14 = "Hmph, I think you know, Sensei."
2004002-15 = "You don't have to pretend. We're both professionals, after all."
2004002-16 = "Now, per the Pandemonium Society's grand plan..."
2004002-17 = "Stage one of Makoto's Kivotos Media Takeover is finally underway."
2004002-22 = "We want your cooperation, as the Pandemonium Society's partner."
2004002-26 = "[ns3] \"I never agreed to cooperate with anything like that.\"\n[ns4] \"This is my first time hearing about ANY of this...\""
2004002-29 = "Oh, no, no. The Pandemonium Society Intelligence Committee's information CANNOT have been wrong about this."
2004002-30 = "Are you telling me you DIDN'T lick Makoto's shoes and promise unconditional cooperation for a thousand years, in front of everyone, in Gehenna Plaza?"
2004002-31 = "[s] \"No!! Where'd that kind of baseless rumor even come from?!\""
2004002-32 = "Hmph, so our intel was flawed. I made an executive decision to skip the verification process, because you know how much of a pain THAT is, and, well, now it seems we have a problem."
2004002-33 = "[s] \"That was a bold decision. Are you regretting it yet?\""
2004002-37 = "...Hmm. I suppose I should properly introduce myself."
2004002-38 = "I am Kyougoku Satsuki, heir to the Gehenna Student Council Intelligence Committee."
2004002-39 = "My organization inherited all the expertise of the previous Gehenna Student Council Intelligence Committee, which you're no doubt familiar with from history."
2004002-40 = "Not that I OFFICIALLY hold the original title, but I think of that as a small formality."
2004002-41 = "[s] \"Or so you decided yourself.\""
2004002-42 = "Well, enough pleasantries. Let's get to the point."
2004002-43 = "If you're not willing to cooperate..."
2004002-44 = "Then I have no choice but to inform you of the leverage our committee has obtained on you."
2004002-51 = "[ns] \"What leverage?\""
2004002-52 = "Your \"weakness,\" Sensei."
2004002-53 = "Heehee. How about it? Are you prepared to hear all about it?"
2004002-54 = "[s] \"...\""
2004002-56 = "[ns] \"(I have so many weaknesses, I can't even guess what she's going to say...)\""
2004002-57 = "First."
2004002-58 = "Sensei, we happen to know that you..."
2004002-62 = "You have a hobby of running through the fields of Kivotos completely naked. Yes?"
2004002-63 = "[s] \"Okay, that DID happen, but it's not a hobby or anything!!\""
2004002-64 = "You admit it so willingly. Hmm."
2004002-65 = "Clearly, you feel no shame about it. As we'd expect of you, Sensei."
2004002-66 = "[s] \"It WAS embarrassing, but—\""
2004002-67 = "Hold on. We're not finished yet."
2004002-68 = "I know dozens of your weak points in all."
2004002-69 = "[s] \"That many? Just what kind of life have I been living?\""
2004002-70 = "If you're uncomfortable, we can stop at any time. Simply pledge your cooperation with the Pandemonium Society for the next thousand years."
2004002-71 = "Now, your second weakness..."
2004002-72 = "[ns] *gulp*"
2004002-73 = "As I understand it, Sensei, you..."
2004002-77 = "...help raise funds every month for students who can't afford meals. Heehee."
2004002-78 = "[s] \"...\""
2004002-80 = "[ns5] \"That's a weird thing to bring up in this context.\"\n[ns6] \"Isn't that more of a heartwarming story than a weakness?\""
2004002-83 = "Oh, no. Not at all."
2004002-84 = "Kivotos is a wild land. Survival of the fittest is the only law."
2004002-85 = "To show sympathy or mercy in a world this cruel is to leave yourself entirely vulnerable, is it not?"
2004002-86 = "[s] \"I'm a teacher. I look out for my students.\""
2004002-87 = "Heehee, so even that revelation doesn't faze you, hmm?"
2004002-88 = "Clever, Sensei. If you admit to the shameful truth, it's no longer leverage."
2004002-89 = "[s] \"It's not 'shameful' in the first place...\""
2004002-90 = "Oh, but we're just getting started."
2004002-91 = "Your third weakness, Sensei..."
2004002-95 = "When cooking instant ramen noodles, you shake the pack to get all the crumbs out!"
2004002-96 = "[s] \"...\""
2004002-98 = "[ns] \"Isn't that normal...?\""
2004002-99 = "Heehee, well, a \"normal\" person could get away with that, but you?"
2004002-100 = "Schale's Sensei, the noble paragon, scrounging like a commoner?"
2004002-101 = "What would the students say, if they knew? How quickly would they turn from you in disappointment?"
2004002-102 = "But the Pandemonium Society...oh, we're different. We're willing to embrace even the—"
2004002-103 = "[s] \"No, seriously, that's normal. It's fine.\""
2004002-106 = "I don't think you fully grasp the situation. Need I spell it out?"
2004002-107 = "This is blackmail, Sensei. I'm blackmailing you."
2004002-112 = "I have the power to expose every one of your enormous weaknesses to the entire world."
2004002-113 = "[s] \"I'm not sure if that's going to be a problem.\""
2004002-118 = "So even now, you stand tall, do you? Heehee..."
2004002-119 = "Well, you're stronger than I thought. I'll say that."
2004002-120 = "I guess this isn't going to work."
2004002-121 = "But this isn't over. Far from it."
2004002-122 = "I'll do whatever it takes to make SURE you cooperate."
2004002-123 = "Until next time, then."
2004002-124 = "[s] \"O-Okay... Bye...\""
2004002-127 = "And I assure you, next time, I won't be so nice to you."
2004002-132 = "[ns] \"At least one of us has a big misunderstanding here.\""

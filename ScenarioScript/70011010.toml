[translation]
70011010-1 = "監原ミスズの憂鬱（１）"
70011010-3 = "ありがとね、スズちゃん！"
70011010-4 = "おかげで私、頑張れる気がする！絶対また連絡するから！"
70011010-5 = "といっても、それはあなたが努力したからですよ。"
70011010-12 = "3か月連続で表彰！？すごいねスズちゃん！"
70011010-13 = "ヴァルキューレ全体でもそうそうないよね！？"
70011010-14 = "といっても、皆さんのご協力あってのものですよ。"
70011010-21 = "まぁ、スズちゃんしかいないよね。"
70011010-22 = "スズちゃん？ああ、[ruby=かんばら]監原[/ruby]ミスズ？#nあの性格で大丈夫なのかな……。"
70011010-23 = "でもほら、実績はあるし……。"
70011010-24 = "（……ん？）"
70011010-25 = "あっ、あちらに！こんにちは！監原ミスズさんですね？"
70011010-32 = "次期矯正局長に選ばれたお気持ちをお聞かせください！"
70011010-33 = "（どうして、こんなことになったのでしょう……）"
70011010-34 = "（私はこんなこと……）"
70011010-48 = "……ズちゃん。"
70011010-50 = "スズちゃん。"
70011010-51 = "ひあぁあっ！？"
70011010-52 = "うわっ、ビックリしたぁ……大丈夫？"
70011010-53 = "ごめんなさい……少し考え事をしていて……。"
70011010-54 = "もー、ただでさえ普段ぽけーっとしてるんだから。しっかりしてよ？"
70011010-55 = "えへへ……そうですね、気をつけないと。ご心配ありがとうございます。"
70011010-56 = "……それで、お願いしてたやつなんだけど。"
70011010-57 = "あ……これ、ですよね？"
70011010-62 = "これこれぇ！これ無いとほんとに朝キツいんだよー。"
70011010-63 = "ありがと！またお願いね！"
70011010-64 = "あ、えっと……一応、外の物を何度も持ち込むのはルール的に……。"
70011010-65 = "なので次はちょっと難しいかも……しれません……。"
70011010-66 = "え？持ってきてくれたの、今日が初めてじゃないよね？"
70011010-67 = "えっと……これまでは特例のようなもの、といいますか……。"
70011010-68 = "じゃあ次も特例で頼むよ～"
70011010-69 = "はいぃ……。"
70011010-70 = "でも……少しずつ減らしてみてはいかがでしょう？#nあまり体に良いものでもありませんから。"
70011010-71 = "んー……まぁ、そうだけど……。"
70011010-72 = "……あれ？ちょっと。"
70011010-77 = "げっ、看守！"
70011010-78 = "だから看守じゃないって何回言えば……あー、もういいや。"
70011010-79 = "で、何やらかしたんだ？"
70011010-80 = "なんで決めつけるんだよ！"
70011010-81 = "日頃の行いを振り返ってみろって。#nそれで……。"
70011010-84 = "……。"
70011010-88 = "ほら。ボディチェックされる前に自分から出しな。"
70011010-89 = "チッ。"
70011010-94 = "……なんだこれ？"
70011010-95 = "見りゃ分かんだろ、抹茶ラテスティックだよ。カフェイン入ってるやつ。"
70011010-96 = "カフェイン？それならインスタントコーヒーが支給されてるだろう？"
70011010-97 = "あれ苦くてまずいもん。"
70011010-98 = "はぁ……遊びに来てるんじゃないんだぞ……。"
70011010-99 = "というかこれ、結構高いやつじゃなかったか？金はどうしてるんだ？"
70011010-100 = "え？そうなの？"
70011010-101 = "は？知らないのか？ってことはまさか……。"
70011010-102 = "え、えへへ……それは私が選んだ物なのです。"
70011010-103 = "ただでさえ窮屈な思いをされていますから……#nせめて食べ物くらい、美味しいものをと思って……えへへ……。"
70011010-104 = "あっ、それに……収監されている生徒の体調管理は私たちの仕事ですし……。"
70011010-105 = "局長。"
70011010-106 = "あ、や、えっと……えへへ……。"
70011010-107 = "はぁ……毎度これでは困ります。私たちの仕事が増えるんですよ？"
70011010-108 = "ごめんなさい……。"
70011010-109 = "おいおい、あんまスズちゃんを責めんなって。無理言ったのは私なんだから。"
70011010-110 = "責めるなら私にしろ！！"
70011010-114 = "いや、それはそうだろうよ……。"
70011010-115 = "どうして私が悪者みたいになってるんだ……。"
70011010-116 = "おい、何事だ？"
70011010-120 = "あっ、先輩……。"
70011010-121 = "あー……だいたい分かった。"
70011010-122 = "お前は自分の部屋に戻れ。それも忘れずに持ってけよ。"
70011010-123 = "こんなつもりじゃなかったんだけど……。"
70011010-124 = "やっぱカフェイン減らすか……スズちゃん、ごめんな。"
70011010-128 = "えへへ……お気をつけて。"
70011010-129 = "では、私たちもこれで。持ち場に戻ります。"
70011010-135 = "はい……引き続き、よろしくお願いします……。"
70011010-137 = "こんなんでいいんですか？"
70011010-138 = "局長の性格は知ってるだろ……うちらが合わせるしかない。"
70011010-139 = "はぁ……ミスズさん、優しすぎますよ。"
70011010-140 = "いや、良い人なのは分かるし、私も好きですけど……。"
70011010-141 = "まぁ言いたいことは分かるよ。誰にだって向き不向きはある。でも――"
70011010-143 = "矯正局長の振る舞いとしては、ちょっとな……。"
70011010-150 = "今日もなんとか終わりました……。"
70011010-154 = "局長室……私には広すぎますね。"
70011010-155 = "といっても、局員の頃のデスクは狭くて不便でしたし……#n皆さんにスペースを分けてあげられたらいいのに……。"
70011010-160 = "歴代の局長も、同じ思いだったのでしょうか……？#nそれとも……私が庶民的すぎるだけなのか……。"
70011010-165 = "といっても、あまり悩んでいても仕方ありませんね。#nやめやめ。この辺にしておきましょう。"
70011010-166 = "もっと良いことを考えないと。せっかく今日は仕事が早く終わったのですし。"
70011010-167 = "これだって。多少無理はしましたが……なんとか間に合いそうで良かったです。"
70011010-171 = "ふふっ。"
70011010-172 = "編み物はいいですね……心が落ち着いて……。"
70011010-173 = "このまま時間が止まればいいのに――"
70011010-177 = "局長！"
70011010-178 = "はひっ！？"
70011010-183 = "夜分遅くに失礼します！これは早急に報告すべきと思い……！"
70011010-184 = "は、はい、構いません。急務なら当然です。"
70011010-185 = "それで、どうされましたか？"
70011010-186 = "それが……囚人が脱獄を――"
70011010-187 = "ええっ！？脱獄ぅ！？"
70011010-188 = "いつ！？誰が！？ワカモですか！？1人で！？"
70011010-189 = "あっ……違います。"
70011010-190 = "1人じゃない！？"
70011010-191 = "じゃあ何人のワカモが脱獄を！？"
70011010-192 = "いや、そもそもワカモは1人しか……。"
70011010-193 = "というか、ワカモはずっと前に脱獄したじゃないですか。"
70011010-194 = "あ……そうでした。取り乱しました……。"
70011010-195 = "ご安心ください。脱獄は阻止できています。"
70011010-196 = "とはいえ事が事なので、処分についての判断をいただきたく。"
70011010-197 = "脱獄を試みた生徒の身元はこちらです。"
70011010-202 = "あぁ、それでしたら。"
70011010-209 = "少し、時間をいただけますか？直接話をしてみようと思います。"
70011010-210 = "つまり、取り調べですよね？"
70011010-211 = "あまり好きな表現ではありませんが……そうなります。"
70011010-212 = "ですが、わざわざ局長が危険人物と対面しなくても……。"
70011010-213 = "矯正局は人手不足なのですから。"
70011010-214 = "私にやらせてください。"
70011010-215 = "……分かりました。準備に取り掛かります。"
70011010-223 = "……昔なら、こういうこともなかったのですが。"

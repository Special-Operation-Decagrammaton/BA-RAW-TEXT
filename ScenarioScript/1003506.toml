[translation]
1003506-1 = "依然無名"
1003506-2 = "（依照憂所說，在便利商店買了能量飲料和口香糖後來到了古書館）"
1003506-3 = "（……總覺得憂似乎很累，所以也幫他買了貼布之類的東西）"
1003506-5 = "古書館內部"
1003506-8 = "……？"
1003506-9 = "門被……誰，擅自……"
1003506-10 = "[s1] 「……憂？」\n[s2] 「你的聲音挺起來很累，還好嗎？」"
1003506-11 = "……？"
1003506-12 = "……？"
1003506-13 = "啊，不，不好意思。原來是老師啊……對不起，好像，把你當成走路工一樣……"
1003506-14 = "請進來吧……"
1003506-17 = "― 謝，謝謝你，老師……[wa:5460] "
1003506-19 = "― 那個，幫大忙了……[wa:1900] "
1003506-22 = "― ……這個，是嗎？[wa:2160] "
1003506-24 = "― 那個，我正在進行解讀作業。[wa:3420] "
1003506-27 = "― 這個古書館裡……"
1003506-29 = "― 用過去的語言所寫成的書，有很多。[wa:2550] "
1003506-32 = "― 這些孩子們也是帶著想要傳達的事情，就這麼一直，[wa:5980] "
1003506-34 = "― 在這裡等著才對……[wa:710] "
1003506-37 = "― 因為也沒有其他人能做……所以就由我來……[wa:4260] "
1003506-40 = "― ……對不起，這些話一點也不有趣……對吧？[wa:4520] "
1003506-43 = "[ns3] 「不，我覺得很棒，這是件很重要的事。」\n[ns4] 「憂真厲害呢。」"
1003506-46 = "― ……！啊，呃，那個……[wa:4600] "
1003506-48 = "― 被這麼誇獎的話，那個……[wa:3280] "
1003506-51 = "― 該怎麼回答才好呢……"
1003506-53 = "― 想說的話，突然想不到了呢……嘿嘿……[wa:5130] "
1003506-56 = "……總覺得心情很奇怪。"
1003506-57 = "至今為止，這種作業也做了好一段時間了……被這麼說，還是第一次……"
1003506-58 = "而且居然還是老師……"
1003506-59 = "大家會認為這是「無所謂的作業」……我是這麼想的。#n事實上，這種人應該也不少吧……"
1003506-60 = "我一直認為就算這樣也無所謂。#n我只需要做我該做的事就好……"
1003506-61 = "[s5] 「我不認為這是『無所謂』的事哦。」\n[s6] 「能這麼想就很厲害了，我認為這是件好事。」"
1003506-62 = "老師……"
1003506-63 = "老師……"
1003506-64 = "[s7] 「而且，我也知道哦。」\n[s8] 「為什麼憂會當上部長，又為何會受到大家的支持。」\n[s9] 「這些都是憂厲害的地方哦。」"
1003506-65 = "唔……"
1003506-66 = "唔……"
1003506-67 = "唔……"
1003506-68 = "……"
1003506-69 = "謝，謝謝你。"
1003506-70 = "如果，外面像老師這樣的人更多一點的話……我或許會想到外面去也說不定呢。"
1003506-71 = "……當然我也知道，外面的人們也不全都是不在乎他人的壞人。"
1003506-72 = "雖然知道……就算心裡知道，卻還是無能為力。#n果然還是會這樣呢。"
1003506-73 = "我重要的部員們，也曾經想強迫我到外面去……"
1003506-74 = "雖然覺得他們很重要，不過這種強硬的部分還是要另當別論。"
1003506-75 = "雖然我不覺得這全都是壞事，老師卻……"
1003506-76 = "明明是老師……不，就因為是老師吧。"
1003506-77 = "願意配合我，和我用同樣的稱呼方式……"
1003506-78 = "……真是嚇到我了。竟然還有這樣的人啊。"
1003506-79 = "所以才會自然地像這樣，該說是期待嗎……總覺得心情輕飄飄的。"
1003506-80 = "我也不知道用「期待」這個詞適不適合。#n對我來說，這還是一種模糊的感情……"
1003506-81 = "……但是等時機到了的話，應該就能夠解讀了吧。#n這個話題就留到那個時候再說吧。"
1003506-82 = "[s10] 「當然。」\n[s11] 「在你喜歡的時候，以你喜歡的方式告訴我吧。」"
1003506-83 = "……呼。"
1003506-84 = "……呼。"
1003506-85 = "……嗯，我會試著這麼做的。"
1003506-86 = "……真的很謝謝你，老師。"
1003506-88 = "（之後協助了憂的解讀作業，在一旁觀看解讀工作）"
1003506-89 = "（幾乎在作業結束的同時，憂便進入了夢鄉。#n　在為他蓋上毛毯後安靜地離開了古書館）"

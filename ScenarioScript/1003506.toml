1003506-63 = "3;우이;15;……선생님……."
1003506-64 = "[s7] \"나도 이걸로 더욱 확실하게 알았어.\"\n[s8] \"부원들이 우이를 부장으로서 존경하는 이유 말이지.\"\n[s9] \"이런 일을 묵묵하게 해왔다는 것 자체가 대단한 거야.\""

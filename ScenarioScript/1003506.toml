1003506-68 = "3;우이;07;……."
1003506-69 = "3;우이;03;감사합니다. 힘이 나네요.\n#3;greeting"
1003506-70 = "3;우이;08;세상 사람들이 다 선생님 같은 분이셨다면……. 저도 밖으로 나가 볼 생각 정도는 해볼 텐데 말이죠."
1003506-71 = "3;우이;06;……물론 저도 알고 있어요. 바깥 사람들이 다 무신경하고 못되지만은 않았다는 것쯤은.\n#3;em;…"
1003506-72 = "3;우이;07;알지만……. 사람마다 알아도 잘 안되는 게 하나둘쯤은 있기 마련이니까요."
1003506-73 = "3;우이;08;사실 제가 좋아하는 우리 부원들도, 저에게 자주 그걸 강요하는 편이고……."
1003506-74 = "3;우이;15;부원들이 좋은 것과는 별개로, 저한테는 사실 꽤나 부담스러운 일이거든요. 그게…….\n#3;em;[속상함]\n#3;stiff"
1003506-75 = "3;우이;02;……그런데 선생님은 오히려 그런 말을 전혀 하지 않으시네요."
1003506-76 = "3;우이;01;……선생님이신데도."
1003506-77 = "3;우이;99;오히려 저와 대화 분위기도 맞춰 주시고……. 굳이 책들을 '아이'라고 같이 불러 주실 때도 있으셨고…….\n#3;em;…"
1003506-78 = "3;우이;03;확실히……. 놀랐어요. '이게 선생님이라는 거구나'라고 생각했어요."
1003506-79 = "3;우이;03;그러니 자연스레 기대도 하게 되더라고요."
1003506-80 = "3;우이;02;사실 뭐에 대한 기대인지조차 지금은 구체적으로 잘 모를 막연함이지만……."
1003506-81 = "3;우이;03;뭐……. 그것도 때가 되면 알 수 있겠죠. 그러면 그때 다시 말씀드릴게요. 괜찮죠?\n#3;em;[음표]"
1003506-82 = "[s10] \"물론이지. 편하게 생각해.\"\n[s11] \"가장 편할 때, 가장 편하게 말해줘.\""

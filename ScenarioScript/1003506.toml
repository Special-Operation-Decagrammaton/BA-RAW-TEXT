1003506-56 = "3;우이;03;뭔가……. 기분이 굉장히 묘하네요.\n#3;a"
1003506-57 = "3;우이;99;쭉 짬 날 때마다 이 작업을 하고는 있었지만……. 그런 말을 들을 거라곤 상상도 못 했었거든요.\n#3;em;…"
1003506-58 = "3;우이;03;그것도 다른 사람도 아닌 선생님께……."
1003506-59 = "3;우이;15;사실 다들 쓸데없는 짓이라고 여길 줄 알았거든요. 분명 그렇게 생각하는 사람도 많을 테고…….\n#3;stiff"
1003506-60 = "3;우이;03;사실 그래도 상관없다고 생각 하면서, 내가 해야 할 일이라고 생각해서 해왔을 뿐인 정도라서……."
1003506-61 = "[s5] \"아냐. 절대 그렇지 않아.\"\n[s6] \"누군가에겐 반드시 필요해질 일이라고 생각해.\""

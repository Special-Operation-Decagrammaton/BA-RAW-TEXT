[translation]
1600202-1 = "請聽我說明！"
1600202-2 = "（……不知從何處傳來一陣吵雜的聲音）"
1600202-3 = "呃呃……不行了……讓我回去吧……！"
1600202-4 = "我的耳朵……不，我的大腦已經到極限了……！救命……！救命！"
1600202-5 = "[s]「……？」"
1600202-6 = "啊，是老師！"
1600202-7 = "正好，老師拜託你想想辦法！"
1600202-8 = "……等等！你們要去哪裡？我們才剛開始呢！"
1600202-9 = "噫噫噫噫噫噫！"
1600202-10 = "是我們不好！雖然不知道我們哪裡不好，總之請原諒我們吧！"
1600202-11 = "沒什麼需要原諒的，無知不是罪過呀！雖然無知很危險，有時也會使人犯罪……"
1600202-12 = "但也因此，我們必須隨時警覺自己的無知，重要的是要時時保持努力吸收新知的態度！"
1600202-13 = "好，那我們繼續剛剛的話題！其實罐頭最一開始並不是裝在鐵罐裡，而是玻璃瓶。它原本是一種軍方保存食物的技術，直到後來因為市場競爭的關係……"
1600202-14 = "因此，罐頭的歷史就從瓶裝演化為鐵罐裝了。至於為什麼只有醃牛肉罐頭和其他扁狀罐頭不一樣，特地設計成梯形……"
1600202-15 = "呃啊啊啊啊啊啊—！"
1600202-16 = "[s]「醃牛肉罐頭……？」"
1600202-17 = "啊，老師！您好！"
1600202-18 = "嗯？你問這是怎麼回事？……什麼事都沒有啊？"
1600202-19 = "只是因為她們問我「為什麼醃牛肉罐頭要做成梯形」，所以我才簡單講解……"
1600202-20 = "簡單！？這樣叫簡單！？前前後後已經2個小時了！？"
1600202-21 = "你甚至還回溯到鋁的挖掘歷史和採掘技術，從罐頭原料開始講！！"
1600202-22 = "那當然！什麼事都只了解皮毛，可稱不上是真正有了解！"
1600202-23 = "只聽皮毛而不理解最根本的原因和由來，是無法真正理解的！"
1600202-24 = "那也不需要連原料的起源都知道吧！？"
1600202-25 = "沒錯！我們想知道的不是原物料，而是這個形狀是不是有什麼科學上的依據……！"
1600202-26 = "……！！"
1600202-27 = "……啊！"
1600202-28 = "我，我們剛剛是不是嚴重說錯話了……"
1600202-29 = "原來如此！比起歷史起源，你們更想知道科學根據啊？這正是我的專業領域呢！"
1600202-30 = "這樣的話，最好先了解為什麼罐頭會使用鋁當作原料吧。眾所周知，鋁是元素週期表中原子序13號的……"
1600202-31 = "比起原先使用的鐵，鋁因為其表面鈍化現象使之不易受外部環境影響……"
1600202-32 = "噫噫！！夠了，夠了！哇啊啊啊啊啊！"
1600202-33 = "要留下心裡陰影了……！我暫時不吃醃牛肉了！！"
1600202-35 = "等，等等！你們要去哪裡！等一下，我還沒講完……！"
1600202-36 = "……"
1600202-37 = "……她們走掉了，我才剛開始講耶……"
1600202-38 = "為什麼會這麼抗拒學習新知識呢？知道原本不知道的事情應該會很開心啊……"
1600202-39 = "老師應該能夠理解我吧？畢竟你是老師嘛。"
1600202-40 = "[s1]「當然囉，無知是罪過！」\n[s2]「我覺得，配合對方的程度講解也很重要。」"
1600202-41 = "真不愧是老師！提高全世界知識水平的人物！"
1600202-42 = "我一直都很崇拜老師！特別是……"
1600202-43 = "……原，原來如此。嗯～這麼說確實有道理……"
1600202-44 = "但也因此，我才會盡量從基本的部分開始說明呀……"
1600202-45 = "……"
1600202-46 = "[s]「……亞都梨？」"
1600202-47 = "這麼說起來，老師常常會被學生們問問題……"
1600202-48 = "就算老師不主動回答，大家也會自動自發跑來問老師……"
1600202-49 = "我要怎麼做，才能變得和老師一樣呢！？"
1600202-50 = "老師好帥氣！我好崇拜！我也能成為像老師一樣的人！"
1600202-51 = "總有一天，我要在坐滿觀眾的大禮堂盡情演講……！"
1600202-53 = "……啊。"
1600202-54 = "對，對不起我太大聲了。啊哈哈……"
1600202-55 = "……你說我真的很喜歡說明事情？"
1600202-56 = "嗯～我想想……這句話好像沒錯，又好像不太正確……"
1600202-57 = "我確實是很喜歡說明一件事情……"
1600202-58 = "正確來說，我更喜歡看到對方聽完我講解後，露出豁然開朗的神情吧……"
1600202-59 = "或是和聽得懂我在講什麼的人，在對方理解箇中喜悅時一起討論我講解的內容……"
1600202-60 = "……啊哈哈，明明我很喜歡說明知識，但要說明自己的心情卻有點難呢。"
1600202-61 = "……像我這麼愛講話，老師會不會覺得不太好？"
1600202-62 = "[s3]「話多是好事。」\n[s4]「我覺得很像小雞，很可愛。」"
1600202-63 = "對、對吧？果然是那樣吧？"
1600202-64 = "（……太好了）"
1600202-65 = "小，小雞……？"
1600202-66 = "（完全沒想到老師會突然說我可愛……！）"
1600202-67 = "太好了，我還擔心老師會不會覺得我很討人厭……"
1600202-68 = "老師果然是最理解我的人！"
1600202-69 = "嘿嘿。"
1600202-70 = "……"
1600202-71 = "[s]「……亞都梨？」"
1600202-72 = "這麼說起來，說到「理解」這個詞，就讓我想到……"
1600202-73 = "人類如果想要理解某件事情，似乎必須要先理解自己……"
1600202-74 = "而所謂自我認識，不就是將自身行為，感情，判斷或選擇，和外界做出區別嗎？"
1600202-75 = "因此就某種意義上來說，將自己與外界分離的這種行為，其實反而是「接受外界事物」的前提，我覺得這個觀點相當有趣……"
1600202-78 = "…老師？"
1600202-79 = "咦？老師去哪了？"
1600202-83 = "……是去廁所嗎？"

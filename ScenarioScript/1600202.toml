[translation]
1600202-1 = "Listen Here!"
1600202-2 = "There's a murmuring coming from somewhere."
1600202-3 = "Ugh... This is too much. Get me outta here!"
1600202-4 = "My head... My ears can't take any more of this! Help...! HELP!"
1600202-5 = "[s] \"...?\""
1600202-6 = "Ah, is that you, Sensei?"
1600202-7 = "My savior. I'll do anything, Sensei! Just, please, change places with me!!"
1600202-8 = "Wait! Where are you going? We still have a lot left! We're just getting started!"
1600202-9 = "Eeeeeek!"
1600202-10 = "We're sorry. I don't know what we did wrong, but please spare us!"
1600202-11 = "Spare you? Ignorance isn't a sin! I mean, it's dangerous and could lead to sin..."
1600202-12 = "...but that's why we have to fight and always be open to learning!"
1600202-13 = "Now, as I was saying! The canned food's manufacturing process didn't start in cans but bottles as a method of military food storage. Later, because of market competition..."
1600202-14 = "...the bottled food era ended and the iron-canned food era began. If you're wondering why the corned beef can was trapezoidal unlike the other canned flat meats..."
1600202-15 = "Gahhhhhh!!"
1600202-16 = "[s] \"Did I hear something about canned corn beef?\""
1600202-17 = "Oh. Hello, Sensei!"
1600202-18 = "What's going on here...? I'm not sure what you mean. Nothing unusual."
1600202-19 = "They asked me why canned corned beef was trapezoidal, so I was simply explaining..."
1600202-20 = "S-Simply?! It's already been two hours!"
1600202-21 = "You've been going on about the history of mining aluminum and the techniques of the miners!"
1600202-22 = "Of course I am! That's important historical context you need to know!"
1600202-23 = "How can you expect to understand the big picture if you don't know the little details?"
1600202-24 = "That doesn't mean we have to know EVERYTHING!"
1600202-25 = "Yeah! We simply wanted to know why it was shaped like that!"
1600202-26 = "...!"
1600202-27 = "...Never mind."
1600202-28 = "We may have gone too far in a few places..."
1600202-29 = "So you were looking for more scientific reasoning! That's my specialty!"
1600202-30 = "Then maybe I should start with why aluminum is used in the first place. As you know, aluminum, or \"Al,\" is a metal with the atomic number of 13 on the periodic table."
1600202-31 = "Compared to conventional metals used before it, it has greater resistance from external environments due to the reactivity and passivation of its surface..."
1600202-32 = "Ahhh! Stop! Stop it! Arrrggghhh!"
1600202-33 = "I'm developing PTSD! I won't be able look at corned beef for years!"
1600202-35 = "W-Wait! Where you are going? Stop right there! I said stop!"
1600202-36 = "..."
1600202-37 = "Hmm. They left before I could get to the important stuff..."
1600202-38 = "I wonder why everybody is so reluctant to learn. Don't you feel happy when you learn something you didn't know before?"
1600202-39 = "You understand, don't you, Sensei? You are a teacher, after all."
1600202-40 = "[s1] \"Of course. Knowledge is power!\"\n[s2] \"Part of teaching is understanding your student's pace for learning.\""
1600202-41 = "I knew I could trust you to be on the front lines of the war against ignorance!"
1600202-42 = "I've always respected that about you. Especially because..."
1600202-43 = "R-Really? Hmm. I suppose that's true."
1600202-44 = "That's why I tried to start with the basics..."
1600202-45 = "..."
1600202-46 = "[s] \"...Kotori?\""
1600202-47 = "That reminds me, Sensei. You receive all kinds of questions from students."
1600202-48 = "Some even want to answer questions in class when you don't call on them."
1600202-49 = "How do you do that?! How can I become like you?!"
1600202-50 = "It's amazing! I want to be the same kind of teacher you are!"
1600202-51 = "My dream is to one day give lectures in a hall full of people wanting to learn!"
1600202-53 = "...Uh. "
1600202-54 = "I-I got a little carried away there, didn't I? Haha..."
1600202-55 = "Huh? You think I really like explaining things?"
1600202-56 = "You're not incorrect, but there's more to it than that."
1600202-57 = "Well, I can't deny that..."
1600202-58 = "...but to be more precise, I like seeing the look on people's faces when they learn something new."
1600202-59 = "I like teaching people new things so that I can have someone to talk to about them once they're caught up."
1600202-60 = "...I may like explaining some things, but I'm really bad at explaining how I feel."
1600202-61 = "Do you think I'm...too talkative?"
1600202-62 = "[s3] \"There's nothing wrong with talking when you're passionate.\"\n[s4] \"You're like a baby chick. I think it's cute.\""
1600202-63 = "Really? Do you think so?"
1600202-64 = "(At least Sensei doesn't think I'm strange...)"
1600202-65 = "A baby ch-chick...? R-Really?"
1600202-66 = "(Still, I never thought someone would call me cute...!)"
1600202-67 = "That's fortunate. I was worried I may have made a bad impression..."
1600202-68 = "I'm so glad that at least you understand me, Sensei!"
1600202-69 = "Heehee..."
1600202-70 = "..."
1600202-71 = "[s] \"...Kotori?\""
1600202-72 = "Speaking of understanding..."
1600202-73 = "For a human to understand something, it presupposes self-awareness..."
1600202-74 = "...and self-awareness means that one is conscious of their actions, feelings, and decisions, right?"
1600202-75 = "So everything we notice and understand about ourselves actually enables us to notice and accept those things in others..."
1600202-78 = "...Sensei?"
1600202-79 = "Hello? Sensei?"
1600202-83 = "Maybe they went to the bathroom."

1600202-1 = "#title;제 설명을 들어요!"
1600202-2 = "#na;(……어디선가 소란스러운 웅성거림이 들려온다.)"
1600202-3 = "#na;밀레니엄 학생 A;으으…… 더는 무리야…… 그만 보내줘……!"
1600202-4 = "#na;밀레니엄 학생 B;내 머리는…… 아니 귀부터 이미 과부하야……! 도움……! 도움!!"
1600202-5 = "[s] \"……?\""
1600202-6 = "#na;밀레니엄 학생 A;아, 서, 선생님! 선생님이다!"
1600202-7 = "#na;밀레니엄 학생 B;마침 잘 됐어요, 어떻게 좀 해주세요, 선생님! 저와 자리 교체를!!"
1600202-8 = "3;코토리;06;……잠깐! 어딜 가는 거예요? 아직 한참 멀었다고요! 이제 겨우 시작인 걸요!\n#3;a\n#3;hophop\n#3;em;[반응]"
1600202-9 = "#na;밀레니엄 학생 A;히이이이익-!!"
1600202-10 = "#na;밀레니엄 학생 B;우리가 잘못했어, 뭘 잘못했는 진 모르지만 용서해줘!"
1600202-11 = "3;코토리;00;용서라뇨? 무지는 죄가 아니에요! 물론 죄로 이어질 수 있는 위험한 것이긴 하지만……\n#3;em;[음표]"
1600202-12 = "3;코토리;03;물론 그러니 더더욱 평상시에도 무지를 경계하고 하나라도 더 알려는 태도가 중요하지요!\n#3;greeting\n#3;em;[반짝]"
1600202-13 = "3;코토리;02;자, 하던 말을 계속 이어서! 통조림의 제조과정은 말이죠. 원래 통조림은 캔이 아니라 병에서 시작된 군사적인 음식물 보관 방식으로, 이후 경쟁을 위해 다른 곳에서……\n#3;hophop"
1600202-14 = "3;코토리;02;그래서 병조림의 역사가 끝나고 철로 된 통조림의 시대가 펼쳐지기 시작했는데, 이때부터 어째서 다른 납작한 고기 통조림들과 달리 콘비프 통조림만 사다리꼴이냐 하면……\n#3;em;[재잘]"
1600202-15 = "#na;밀레니엄 학생 B;으아아아아아아-!!\n#fontsize;80"
1600202-16 = "[s] \"콘비프 통조림?\""
1600202-17 = "3;코토리;02;……! 아, 선생님! 안녕하세요!\n#3;em;[반응]\n#3;greeting"
1600202-18 = "3;코토리;01;네? 무슨 일이냐고요? ……무슨 일이요? 아무 일도 없는데요?"
1600202-19 = "3;코토리;99;그냥 이분들이 '왜 콘비프 통조림은 사다리꼴 모양이냐'고 물으셔서 간단하게……\n#3;em;…"
1600202-20 = "#na;밀레니엄 학생 A;가, 간단하게!? 이게 간단하게라고!? 벌써 2시간째인데……!!"
1600202-21 = "#na;밀레니엄 학생 B;콘비프를 담은 통조림의 원재료인 알루미늄의 채굴 역사와 광부들의 기술까지 올라갔잖아!!"
1600202-22 = "3;코토리;05;그거야 당연하죠! 뭐든지 겉핥기로 부분적인 것만 이해해선 안 된다고요.\n#3;hophop\n#3;em;[!]"
1600202-23 = "3;코토리;06;본질적인 이유와 원인을 파악해야 뒷부분을 들어도 제대로 이해가 가는 법이에요!\n#3;em;[반응]"

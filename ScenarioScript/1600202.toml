1600202-31 = "3;코토리;01;기존에 사용하던 일반 철에 비해서 반응성과 표면의 부동화 현상으로 인해 외부 환경으로부터 큰 저항성을 가지게 되니까……\n#3;m4\n#3;em;[재잘]"

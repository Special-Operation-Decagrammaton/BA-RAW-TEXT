[translation]
1600202-1 = "ฟังคำอธิบายของฉันก่อนสิคะ!"
1600202-2 = "(...ได้ยินเสียงดังอึกทึกครึกโครมมาจากที่ไหนสักแห่ง)"
1600202-3 = "อ๊าก... ปล่อยฉันออกไปเถอะ...!"
1600202-4 = "หัวของฉัน... หูของฉัน... เกินจะรับได้แล้ว...! ช่วยด้วย...! ช่วยด้วย~!!"
1600202-5 = "[s] \"...?\""
1600202-6 = "อ๊ะ คะ... คุณครู! คุณครูนี่นา!"
1600202-7 = "มาพอดีเลยค่ะ ช่วยทำอะไรสักอย่างหน่อยสิคะ คุณครู! สลับที่กับฉันที!!"
1600202-8 = "...เดี๋ยวสิ! จะไปไหน? ยังเหลืออีกเยอะเลยนะ! นี่เพิ่งเริ่มต้นเอง!"
1600202-9 = "เฮือกกกก!!"
1600202-10 = "พวกเราทำผิดไปแล้ว ถึงเราจะไม่รู้ว่าทำอะไรผิดไป แต่โปรดยกโทษให้เราด้วย!"
1600202-11 = "ยกโทษเหรอ? ความเขลาไม่ใช่ความผิดค่ะ! แน่นอนว่ามันเสี่ยงที่จะกลายเป็นความผิด แต่ว่า..."
1600202-12 = "เพราะอย่างนี้ทัศนคติที่ไม่ให้เกิดความเขลาและเปิดรับการเรียนรู้ตลอดเวลาถึงเป็นสิ่งสำคัญยังไงล่ะคะ!"
1600202-13 = "ทีนี้ฉันจะพูดต่อนะ! ฉันพูดถึงกระบวนการผลิตอาหารกระป๋อง เดิมทีอาหารกระป๋องไม่ได้เก็บในกระป๋อง#nแต่เริ่มจากวิธีถนอมอาหารแบบทหารโดยใช้ขวดแก้ว ต่อมาพัฒนาขึ้นเพื่อให้แข่งขันได้มากขึ้น..."
1600202-14 = "เพราะแบบนั้นประวัติศาสตร์การใช้ขวดแก้วจึงสิ้นสุดลง และเริ่มต้นสู่ยุคของกระป๋องเหล็ก#nนับแต่นั้นมากระป๋องคอร์นบีฟเลยมีรูปทรงคางหมู ต่างจากกระป๋องเนื้อแบนอื่นๆ...."
1600202-15 = "อ๊าก!!"
1600202-16 = "[s] \"กระป๋องคอร์นบีฟ?\""
1600202-17 = "...! อ๊ะ คุณครู! สวัสดีค่ะ!"
1600202-18 = "คะ? เกิดอะไรขึ้นงั้นเหรอคะ? ...อะไรเหรอคะ? ก็ไม่มีเรื่องอะไรเลยนี่คะ?"
1600202-19 = "แค่พวกเขาถามว่า 'ทำไมกระป๋องคอร์นบีฟถึงเป็นรูปทรงคางหมูล่ะ' ฉันเลยอธิบายให้ฟังง่ายๆ..."
1600202-20 = "งะ... ง่ายเรอะ!? บอกว่านี่ง่ายเรอะ!? นี่เล่าตั้ง 2 ชั่วโมงแล้วนะ...!!"
1600202-21 = "เล่าไปจนถึงเทคโนโลยีของคนงานเหมืองและประวัติศาสตร์การขุดอะลูมิเนียมที่ใช้เป็นวัตถุดิบ#nของกระป๋องใส่คอร์นบีฟนี่นะ!!"
1600202-22 = "ก็ต้องอย่างนั้นน่ะสิ! ไม่ว่าเรื่องเล็กน้อยแค่ไหนก็จะเข้าใจแค่ผิวเผินไม่ได้ค่ะ"
1600202-23 = "ต้องเข้าใจเหตุผลและสาเหตุที่แท้จริง ถึงจะเข้าใจได้อย่างถ่องแท้ค่ะ!"
1600202-24 = "แต่ไม่จำเป็นต้องรู้จนถึงต้นกำเนิดของวัตถุดิบก็ได้นี่!?"
1600202-25 = "ใช่ๆ! พวกเราเพียงแค่สงสัยว่าทำไมมันถึงมีรูปร่างแบบนั้น!"
1600202-26 = ".......!!"
1600202-27 = "...เฮือก"
1600202-28 = "ดูเหมือนพวกเราพูดอะไรผิดมหันต์ออกไป......"
1600202-29 = "อย่างนั้นเองสินะคะ! คุณสงสัยเหตุผลด้านวิทยาศาสตร์มากกว่าสินะ?#nอ่า~ ถ้าอย่างนั้นก็เป็นสาขาที่ฉันเชี่ยวชาญเลยค่ะ!"
1600202-30 = "เอาล่ะ เรามาเริ่มกันที่อะลูมิเนียม วัตถุดิบที่ใช้ทำกระป๋องละกันค่ะ อย่างที่คุณน่าจะรู้#nอะลูมิเนียมเป็นโลหะในตารางธาตุหมายเลข 13..."
1600202-31 = "เมื่อเทียบกับเหล็กปกติที่ใช้แล้ว อะลูมิเนียมมีความทนทานต่อสภาพแวดล้อมภายนอกมากกว่า#nเพราะพื้นผิวผ่านการเกิดปฏิกิริยาและการหลอมเหลว..."
1600202-32 = "อ๊าก! พอ! พอได้แล้ว!! อ๊ากกกกก!!"
1600202-33 = "เหมือนฉันได้รับความบอบช้ำทางจิตใจ คงกินคอร์นบีฟไม่ได้สักพัก!!"
1600202-35 = "ดะ...เดี๋ยวก่อน! จะไปไหน! รอก่อนค่ะ! รอก่อนสิคะ!"
1600202-36 = "......."
1600202-37 = "...อืม...ทุกคนไปหมดเลย ฉันยังไม่ได้เล่าเนื้อหาส่วนสำคัญเลย..."
1600202-38 = "ทำไมทุกคนถึงมีความรู้สึกต่อต้านการได้รับความรู้นะ ไม่ดีใจที่ได้รู้ในสิ่งที่ไม่รู้หรอกเหรอ?"
1600202-39 = "คุณครูเข้าใจใช่มั้ยคะ? เป็นคุณครูนี่นา?"
1600202-40 = "[s1] \"แน่นอนอยู่แล้ว ความรู้คือพลัง!\"\n[s2] \"สิ่งสำคัญคือปรับให้เข้ากับอีกฝ่ายยังไงล่ะ\""
1600202-41 = "ว่าแล้วเชียว คุณครูนี่เป็นแนวหน้าในการทำลายความไม่รู้ในโลกนี้จริงๆ!"
1600202-42 = "ยอดเลยค่ะ! ฉันนับถือคุณครูอยู่ตลอดค่ะ! โดยเฉพาะ..."
1600202-43 = "......! งะ... งั้นเหรอคะ? อืม.. มันก็จริงอยู่หรอกนะ..."
1600202-44 = "เพราะอย่างนั้นฉันเลยตั้งใจที่จะอธิบายเรื่องพื้นฐานก่อน..."
1600202-45 = "......."
1600202-46 = "[s] \"......โคโทริ?\""
1600202-47 = "พอมาคิดดูคุณครูได้รับคำถามจากนักเรียนคนอื่นๆ อยู่ตลอด..."
1600202-48 = "และยังคนที่ถามขึ้นมาต่อหน้าคนอื่นๆ แบบที่ไม่ได้เรียกก็มี!"
1600202-49 = "คุณครูทำได้ยังไงกันนะพอเจออย่างนั้น? ถ้าเป็นฉันจะทำอย่างนั้นได้มั้ยนะ?"
1600202-50 = "เท่มากเลยค่ะ! เป็นฝันของฉันเลย! ฉันคิดว่าสักวันถ้าเป็นได้แบบนั้นก็คงจะดีค่ะ!"
1600202-51 = "ฉันอยากจะจัดบรรยายในหอประชุมขนาดใหญ่ที่มีผู้คนมารวมตัวกันเพื่อฟังฉันในสักวันนึง......!"
1600202-53 = "...อ๊ะ"
1600202-54 = "ฉะ... ฉันเสียงดังไปหรือเปล่าคะ แหะๆ...."
1600202-55 = "...คะ? ชอบที่ฉันอธิบายจริงๆ อย่างนั้นเหรอคะ?"
1600202-56 = "อืม~ ค่ะ... จะว่าอย่างนั้นก็ได้ แต่ก็แตกต่างกันนิดหน่อย......"
1600202-57 = "โดยพื้นฐานแล้วฉันก็ชอบแหละ......"
1600202-58 = "ฉันชอบที่ได้เห็นคนเข้าใจเรื่องนั้นหลังจากที่ได้อธิบายอย่างชัดเจนแล้ว......"
1600202-59 = "ฉันชอบที่ได้พูดคุยเกี่ยวกับเรื่องต่างๆ กับคนที่เข้าใจเรื่องที่ฉันอธิบาย..."
1600202-60 = "...ฉันชอบการอธิบาย แต่พอเอาเข้าจริงๆ ก็มีเรื่องที่ฉันอธิบายไม่ได้เหมือนกันค่ะ"
1600202-61 = "อืม... ฉันดูเหมือนคนพูดมากเกินไปหรือเปล่าคะ?"
1600202-62 = "[s3] \"คุยเยอะๆ ได้เลย\"\n[s4] \"ครูคิดว่าน่ารักเหมือนลูกเจี๊ยบเลย\""
1600202-63 = "งะ... งั้นเหรอคะ? คิดอย่างนั้นจริงๆ เหรอคะ?"
1600202-64 = "(โล่งอกไปที... คุณครูไม่ได้คิดว่าฉันประหลาด...)"
1600202-65 = "ลูกเจี๊ยบ...? ยะ... อย่างงั้นเหรอคะ?"
1600202-66 = "(ไม่คิดเลยว่าจะได้ยินคนชมฉันว่าน่ารัก...!)"
1600202-67 = "ดีจังเลยค่ะ ฉันเคยกังวลว่าจะดูไม่ดีเท่าไหร่..."
1600202-68 = "ว่าแล้วเชียวคุณครูเข้าใจฉันทุกอย่าง! ฉันดีใจจังเลยล่ะค่ะ!!"
1600202-69 = "ฮิฮิ"
1600202-70 = "......"
1600202-71 = "[s] \"...โคโทริ?\""
1600202-72 = "พอมาคิดๆ ดูแล้ว ถ้าพูดถึง \"ความเข้าใจ\" ..."
1600202-73 = "ความเข้าใจของมนุษย์นั้นโดยพื้นฐานแล้ว หมายถึงการตระหนักรู้ถึงตัวเอง....."
1600202-74 = "การตระหนักรู้ถึงตัวเองนี้สามารถแยกแยะได้จากภายนอก เช่น พฤติกรรม ความรู้สึก#nและการตัดสินใจของตัวเองใช่มั้ยคะ?"
1600202-75 = "เพราะฉะนั้นแล้ว พฤติกรรมที่แยกตัวออกจากภายนอก ในอีกมุมหนึ่งก็ทำให้เรายอมรับสิ่งต่างๆ ได้..."
1600202-78 = "...คุณครู?"
1600202-79 = "เอ๋? คุณครู?"
1600202-83 = "...ไปห้องน้ำแล้วเหรอ?"

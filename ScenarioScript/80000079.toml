[translation]
80000079-1 = "隱藏真心的巧克力"
80000079-2 = "大家好。"
80000079-3 = "非常感謝大家今天抽空參加我們修行部主辦的情人節特別活動──#n「任何人都能輕鬆學會！巧克力製作教室」！"
80000079-4 = "[s]「哇！不愧是三森副部長！」"
80000079-5 = "呵呵。今天夏萊的老師也前來參加……"
80000079-6 = "身為一個以大和撫子為目標的人，我會盡力完成這次的課程。"
80000079-7 = "那個，我這次想試做的是──"
80000079-8 = "是加了櫻桃的巧克力，對吧！"
80000079-9 = "櫻桃的樹語是「真實的愛」，我想收到的人一定會很開心的唷。"
80000079-10 = "我，我明明什麼都還沒說……#n不愧是暗中支配著百鬼夜行的魔性讀心術士三森大人……！"
80000079-11 = "咦？不，我並沒有做出那種……#n那，那種奇怪的傳聞是從哪裡傳出來的……？"
80000079-12 = "我，我想做的是──"
80000079-13 = "原來如此。是想用可可塊和可可脂，#n製作真正意義上的「手工」巧克力呢。"
80000079-14 = "雖然調整牛奶和砂糖的比例可能有點困難……#n不過我認為收到的人一定也會因此感受到你的真心唷。#n一起加油吧。"
80000079-15 = "但，但是，真的做的出來嗎？其實我的手不是很巧……"
80000079-16 = "呵呵，沒問題的。最重要的是那份心意哦。#n而且試錯也是「修行」之中很重要的過程唷。"
80000079-17 = "唔呵，唔呵呵……我想做的是……"
80000079-18 = "咦……？想要製作在常溫下也不會凝固，像史萊姆一樣的超大型巧克力……？"
80000079-19 = "想看收到禮物的人被巧克力史萊姆吞下，#n身心全都變成自己所有物的場景……？"
80000079-20 = "不，不可以！那種東西，實在是……"
80000079-21 = "太不知羞恥了！"
80000079-22 = "可惡，果然不行嗎……"
80000079-24 = "呼……辛苦了，老師。"
80000079-25 = "[s1]「三森也辛苦了。」\n[s2]「三森果然很厲害呢。」"
80000079-26 = "咦！？怎麼突然這麼說……！？"
80000079-27 = "咦！？怎麼突然這麼說……！？"
80000079-28 = "因為我……能察覺到思念他人的心情，並且給予支持……？"
80000079-29 = "不，不是那樣的……#n而且，就算能像那樣給大家建議，我卻……"
80000079-30 = "連最重要的人的心，都不是很明白……"
80000079-31 = "[s3]「想，想不到暗中支配著百鬼夜行的魔性讀心術士居然……！」\n[s4]「竟然有連三森都不知道的事……！」"
80000079-32 = "都，都說了，真的沒有那種事！"
80000079-33 = "都，都說了，真的沒有那種事！"
80000079-34 = "……話說回來，老師。那個，如果不會造成你困擾的話……#n可以請你，收下這個嗎……？"
80000079-39 = "[ns5]「是三森送的巧克力！」\n[ns6]「是事先為我準備的嗎？謝謝你！」"
80000079-40 = "那個……其實是在巧克力教室的過程中，抽空準備的。"
80000079-41 = "那個……其實是在巧克力教室的過程中，抽空準備的。"
80000079-42 = "不過仔細想想……#n比起幫助大家，我選擇了優先滿足自己的私慾，讓我覺得有些愧疚……"
80000079-43 = "這樣是不是沒資格成為大和撫子呢……"
80000079-44 = "[s]「不會，沒有那種事唷。」"
80000079-45 = "……呵呵。"
80000079-46 = "……我果然沒辦法完全讀懂人的心呢。"
80000079-47 = "畢竟我現在，心臟跳個不停……#n老師心裡正想著什麼，我完全無從得知……"
80000079-48 = "[s]「我現在──」"
80000079-49 = "噓──"
80000079-50 = "現在請什麼都別說，好嗎？"
80000079-51 = "因為我想就這樣，感受這股心動的感覺……"
80000079-52 = "……那，那麼我就先告辭了！"
80000079-56 = "[ns]「呃……再見……？」"
80000079-57 = "（目送不知為何如逃跑般離去的三森後，品嘗了收下的巧克力）"
80000079-58 = "[ns7]「……嗯。」\n[ns8]「能感受到三森的心意，真好吃。」"

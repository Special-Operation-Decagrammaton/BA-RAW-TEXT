[translation]
80000079-1 = "Chocolate of Hidden Feelings"
80000079-2 = "Hello, everyone. Thank you for being here to celebrate Valentine's Day with us."
80000079-3 = "I'm so glad you've all joined the Inner Discipline Club's chocolate-making class."
80000079-4 = "[s] \"Instruct us, Vice President Mimori!\""
80000079-5 = "Heehee... We're honored to have Schale's Sensei present for today's class."
80000079-6 = "I will be giving it my all as a member of the Inner Discipline Club and as one who aims to become a proper lady."
80000079-7 = "I want to make..."
80000079-8 = "Ah, I see. Hand-made chocolate-covered cherries!"
80000079-9 = "The cherry tree represents \"one true love.\" I'm sure the recipient will deeply appreciate it."
80000079-10 = "H-How did you know?! I didn't say that... I guess I should've expected it from the powerful mind reader and secret ruler of Hyakkiyako, Mimori...!"
80000079-11 = "What? N-no! That's not true at all! Where on earth did you hear that...?"
80000079-12 = "Well, um..."
80000079-13 = "Ah-ha. I see you're aiming for the truest form of hand-made chocolate, so you've brought cacao mass and cacao butter."
80000079-14 = "Good luck! It might be difficult to get the right ratio of milk and sugar, but I'm sure the recipient will appreciate just how much effort went into making it."
80000079-15 = "D-do you really think so? I'm not that good at cooking, so...I wonder if I'm just being too ambitious..."
80000079-16 = "That's all right! As long as you're willing to keep trying, you can do anything. Any setbacks you encounter are just a part of the journey."
80000079-17 = "I want... Heehee..."
80000079-18 = "What...? You're trying to make...a squishy, slippery, slime-like chocolate?"
80000079-19 = "And you want to see the recipient slowly being consumed by the chocolate slime...? So they'll be yours, body and soul...?"
80000079-20 = "N-No! That's too..."
80000079-21 = "Too shameless!"
80000079-22 = "Oh... I guess it was too good to be true..."
80000079-24 = "Phew. Great work, Sensei!"
80000079-25 = "[s1] \"You did all the work, Mimori.\"\n[s2] \"You always amaze me.\""
80000079-26 = "W-What?! What are you talking about?"
80000079-27 = "W-What?! What are you talking about?"
80000079-28 = "Oh... You're saying that it's not easy to understand what someone's thinking, and to know the right time to offer them help. I suppose, but..."
80000079-29 = "Well, it's nothing, really, just..."
80000079-30 = "I still don't know the thoughts of the most important person to me."
80000079-31 = "[s3] \"...?\"\n[s4] \"There's something the magical mind reader doesn't know...?!\""
80000079-32 = "It's really not like that!"
80000079-33 = "It's really not like that!"
80000079-34 = "Um... Sensei? If you don't mind... Could I offer you this?"
80000079-39 = "[ns5] \"Chocolate from you, Mimori?\"\n[ns6] \"You were hiding this the whole time? Thank you!\""
80000079-40 = "I took a little time during the class to make one myself."
80000079-41 = "I took a little time during the class to make one myself."
80000079-42 = "I feel a little guilty about it, since I used time where I was supposed to be helping others to do something for myself."
80000079-43 = "I guess this takes me further away from my goal of being a proper lady..."
80000079-44 = "[s] \"That's not true, Mimori.\""
80000079-45 = "Heehee."
80000079-46 = "You said before that I always know what someone is thinking. But that's really not true."
80000079-47 = "Right now, as I'm giving you this chocolate... I can't possibly hear your thoughts over the thunder of my racing heart."
80000079-48 = "[s] \"Well—\""
80000079-49 = "Shhh!"
80000079-50 = "Don't tell me yet, okay?"
80000079-51 = "I want to savor this excitement for the rest of the day."
80000079-52 = "So, um... Please excuse me!"
80000079-56 = "[ns] \"Oh, uh... Bye...?\""
80000079-57 = "As I watched Mimori flee, I carefully opened the chocolate she made."
80000079-58 = "[ns7] \"I can definitely feel her feelings from this.\"\n[ns8] \"It's...really delicious.\""

80000079-55 = "3;미모리;03\n#3;dl\n#wait;1500"
80000079-56 = "[ns] \"어…… 잘 가……?\""
80000079-57 = "#na;(어째서인지 도망가듯 사라진(?) 미모리를 배웅하며, 미모리의 초콜릿을 조심스럽게 먹어 보았다.)"
80000079-58 = "[ns7] \"응. 역시 미모리의 마음이 느껴져서.\"\n[ns8] \"정말…… 맛있네.\""

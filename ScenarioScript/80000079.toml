80000079-39 = "[ns5] \"미모리가 주는 초콜릿이다!\"\n[ns6] \"미리 준비해 뒀던 거야? 고마워.\""
80000079-40 = "3;미모리;08;초콜릿 교실을 하면서, 동시에 나름대로…… 준비해 보았어요.\n#3;em;[///]"
80000079-41 = "3;미모리;08;초콜릿 교실을 하면서, 동시에 나름대로…… 준비해 보았어요.\n#3;em;[///]"
80000079-42 = "3;미모리;07;남들을 돕는 자리에서, 저 자신의 사리사욕을 취하려 한 것 같아…… 조금, 양심의 가책이 느껴지네요"
80000079-43 = "3;미모리;06;역시, 이래서야 요조숙녀 실격이려나요……\n#3;em;[땀]\n#3;m3"
80000079-44 = "[s] \"그런 게 아니야. 미모리.\""
80000079-45 = "3;미모리;08;후훗……\n#3;em;[하트]"
80000079-46 = "3;미모리;99;선생님께선 제가 누군가를 생각하는 마음을 미리 알아챈다고 하셨지만…… 그렇지 않답니다."
80000079-47 = "3;미모리;03;지금, 이렇게 준비한 초콜릿을 선생님께 전달하면서도…… 저, 선생님의 마음 같은 건 전혀 알 수 없을 만큼…… 이렇게, 가슴이 두근거리고 있으니까요……?"
80000079-48 = "[s] \"그거라면, 말인데……\""
80000079-49 = "3;미모리;01;쉬잇–\n#3;greeting"
80000079-50 = "3;미모리;03;지금은 말씀해주지 않으셔도, 된답니다?"
80000079-51 = "3;미모리;08;조금은, 이 두근거림을 지닌 채…… 하루를 보내고 싶으니까요."
80000079-52 = "3;미모리;03;그, 그럼! 먼저 돌아가 보겠습니다!\n#3;em;[///]"

[translation]
80000079-1 = "ช็อกโกแลตที่ซ่อนความรู้สึกไว้"
80000079-2 = "สวัสดีค่ะทุกคน เพื่อฉลองวันวาเลนไทน์ ขอบคุณที่มาเข้าร่วม..."
80000079-3 = "คาบเรียนทำช็อกโกแลตที่ทางชมรมฝึกฝนเป็นเจ้าภาพ' ในครั้งนี้ค่ะ"
80000079-4 = "[s] \"ว้าว! ขอบคุณที่สอนนะ รองหัวหน้ามิโมริ!\""
80000079-5 = "ฮุฮุ... วันนี้คุณครูจากชาเล่ต์มาเข้าร่วมคาบเรียนกับเราด้วย"
80000079-6 = "ในฐานะสมาชิกชมรมฝึกฝนที่มุ่งมั่นฝึกฝนการเป็นกุลสตรีที่เพียบพร้อม... ฉันจะทำให้ดีที่สุดค่ะ"
80000079-7 = "ช็อกโกแลตที่ฉันอยากจะทำ..."
80000079-8 = "อา... อย่างนั้นเหรอคะ เชอร์รีเคลือบช็อกโกแลตโฮมเมด!"
80000079-9 = "ใช่ค่ะ ภาษาดอกไม้ของเชอร์รีคือ \"รักเพียงหนึ่งเดียว\" คนที่ได้รับจะต้องรู้สึกใจฟูแน่ๆ ค่ะ"
80000079-10 = "ระ...รู้ได้ยังไง...? ฉันยังไม่พูดอะไรเลย... สมแล้วที่เป็นท่านมิโมรินักอ่านใจลึกลับแห่งเฮียกคิยาโค...!"
80000079-11 = "คะ? ฉะ...ฉันไม่ได้เป็นอะไรแบบนั้นหรอกนะคะ! ทะ...ทำไมถึงมีข่าวลือแปลกๆ แบบนั้นกันได้คะ...?"
80000079-12 = "คะ...คือว่าฉัน..."
80000079-13 = "อ่ะฮ่า คุณอยากทำช็อกโกแลต \"โฮมเมด\" จริงๆ โดยใช้ช็อกโกแลตลิเคียวร์กับโกโก้บัตเตอร์ที่ซื้อมา#nสินะคะ"
80000079-14 = "สู้ๆ นะคะ ในตอนแรกอาจจะกะปริมาณน้ำตาลกับนมที่ใช้ได้ยากสักหน่อย แต่ถ้าคนรับได้รู้ถึงความทุ่ม#nเทของคุณ คงจะดีใจมากแน่ๆ ค่ะ"
80000079-15 = "จะ...จะไม่เป็นอะไรจริงๆ เหรอคะ? ฉันไม่ค่อยเก่งเรื่องทำอาหารโฮมเมดเท่าไร... ไม่รู้เลยว่าเป็นการทำ#nอะไรเกินตัวไปรึเปล่า..."
80000079-16 = "ไม่เป็นไรหรอกค่ะ! ถ้ามุ่งมั่นที่จะทำเต็มที่แล้วละก็ ต้องทำได้แน่นอนค่ะ และการลองผิดลองถูก#n1-2 ครั้ง ก็เป็นหนึ่งในขั้นตอนการฝึกฝนเหมือนกันค่ะ"
80000079-17 = "คือว่าฉันน่ะ... ฮือ..."
80000079-18 = "คะ...? อยากทำช็อกโกแลตขนาดใหญ่ที่นุ่มฟูเหมือนกับสไลม์ยักษ์ แล้วก็ไม่ละลายในอุณหภูมิปกติงั้น#nเหรอคะ...?"
80000079-19 = "แล้วก็อยากเห็นคนรับช็อกโกแลต... ถูกช็อกโกแลตสไลม์เขมือบลงท้อง...? เพื่อทำให้ร่างกายและจิต#nใจเป็นของตนเองโดยสมบูรณ์...?"
80000079-20 = "มะ...ไม่ได้นะคะ! แบบนั้นมัน..."
80000079-21 = "มันน่าอายเกินไปค่ะ!"
80000079-22 = "อึก... คิดแล้วเชียวว่าไม่ได้..."
80000079-24 = "ฮู่ว ขอบคุณที่ตั้งใจทำงานค่ะคุณครู"
80000079-25 = "[s1] \"มิโมริต่างหากน่ะที่เหนื่อย\"\n[s2] \"มิโมรินี่สุดยอดเลยนะ\""
80000079-26 = "คะ?! จะ... จู่ๆ พูดอะไรคะเนี่ย...?"
80000079-27 = "คะ?! จะ... จู่ๆ พูดอะไรคะเนี่ย...?"
80000079-28 = "อา... การรู้ความคิดคนอื่นล่วงหน้า แล้วก็ให้ความช่วยเหลือหรือคำแนะนำอย่างทันท่วงทีน่ะ ไม่ใช่ใครก็#nทำได้ง่ายๆ เหรอคะ?"
80000079-29 = "มะ... ไม่ใช่แบบนั้นนะคะ คือว่าฉันน่ะ..."
80000079-30 = "แม้แต่สิ่งที่อยู่ในใจของคนสำคัญที่สุด... ก็ยังไม่รู้เลยค่ะ"
80000079-31 = "[s3] \"???\"\n[s4] \"มีเรื่องที่นักอ่านใจอย่างมิโมริไม่รู้ด้วยเหรอเนี่ย...!\""
80000079-32 = "อะไรกันคะ...!"
80000079-33 = "กะ...ก็บอกแล้วว่าไม่ใช่อย่างนั้นไงล่ะคะ!"
80000079-34 = "เอ่อ คุณครูคะ? ถ้าไม่เป็นการเสียมารยาทเกินไปละก็... คือ... ช่วยรับสิ่งนี้ไว้ได้รึเปล่าคะ...?"
80000079-39 = "[ns5] \"ช็อกโกแลตจากมิโมริ!\"\n[ns6] \"เตรียมไว้ก่อนแล้วเหรอ? ขอบคุณนะ\""
80000079-40 = "ฉันเตรียมเอาไว้... ตอนที่เตรียมคาบสอนทำช็อกโกแลตน่ะค่ะ"
80000079-41 = "ฉันเตรียมเอาไว้... ตอนที่เตรียมคาบสอนทำช็อกโกแลตน่ะค่ะ"
80000079-42 = "ดูเหมือนฉันจะใช้ประโยชน์จากการช่วยเหลือคนอื่นไปซะแล้ว... รู้สึกผิดจริงๆ ค่ะ"
80000079-43 = "แบบนี้คงไม่มีคุณสมบัติของกุลสตรีที่เพียบพร้อมแล้วสินะคะ..."
80000079-44 = "[s] \"ไม่ใช่แบบนั้นหรอกนะมิโมริ\""
80000079-45 = "ฮุฮุ..."
80000079-46 = "ถึงคุณครูจะบอกว่าฉันสามารถอ่านใจคนอื่นได้ก็จริง... แต่มันไม่ใช่แบบนั้นหรอกนะคะ"
80000079-47 = "ตอนนี้ทั้งๆ ที่ฉันมอบช็อกโกแลตให้คุณครูแบบนี้แล้วแท้ๆ... แต่ฉันน่ะ มองไม่ออกเลยค่ะว่าคุณครูคิด#nอะไรอยู่... เพราะงั้นเลยรู้สึกใจเต้นอยู่แบบนี้ไงล่ะคะ...?"
80000079-48 = "[s] \"เรื่องนั้นน่ะ...\""
80000079-49 = "ชู่ว–"
80000079-50 = "ไม่ต้องบอกตอนนี้ก็ได้นะคะ"
80000079-51 = "ฉันอยากจะอยู่กับความรู้สึกใจเต้นแบบนี้... ไปอีกสักวันหนึ่งค่ะ"
80000079-52 = "ถะ...ถ้างั้น...! ฉันขอตัวกลับก่อนนะคะ!"
80000079-56 = "[ns] \"เอ่อ อืม... กลับดีๆ...นะ...?\""
80000079-57 = "(คุณครูยืนมองมิโมริที่จู่ๆ ก็วิ่งหนี(?) หายไปในพริบตา จากนั้นก็ค่อยๆ หยิบช็อกโกแลตของมิโมริมากิน#nอย่างระมัดระวัง)"
80000079-58 = "[ns7] \"อืม รับรู้ได้ถึงความรู้สึกของมิโมริเลย\"\n[ns8] \"อร่อย...จังเลย\""

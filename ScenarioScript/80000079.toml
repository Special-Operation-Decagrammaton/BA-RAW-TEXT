[translation]
80000079-1 = "#title;마음을 숨긴 초콜릿"
80000079-2 = "3;미모리;01;안녕하세요. 여러분. 발렌타인 데이를 맞이해 특별히 저희 수행부에서 준비한……\n#3;a\n#3;em;[반응]"
80000079-3 = "3;미모리;03;'수행부 주최 간이 초콜릿 만들기 교실'에 참가해 주셔서 정말 감사드립니다.\n#3;greeting"
80000079-4 = "[s] \"와! 가르쳐 주세요, 미모리 부부장님!\""
80000079-5 = "3;미모리;08;후후…… 오늘은 특별히 샬레의 선생님께서도 이 교실에 참가해 주셨으므로."
80000079-6 = "3;미모리;09;저도 요조숙녀를 목표로 하는 수행부의 일원으로서…… 최선을 다해 수업을 진행하겠습니다.\n#3;em;[음표]"
80000079-7 = "#na;백귀야행의 학생A;제가 만들고 싶은 초콜릿은……"
80000079-8 = "3;미모리;02;아…… 그렇군요. 체리가 담긴 수제 초콜릿!\n#3;em;[반응]"
80000079-9 = "3;미모리;03;맞아요. 체리의 나무말은 '오직 한 사랑'이죠. 받는 분도 마음으로부터 좋아하실 거예요."
80000079-10 = "#na;백귀야행의 학생A;어, 어떻게……? 아직 말씀드리지도 않았는데…… 역시 백귀야행을 암암리에 지배하는 마성의 독심술사 미모리 님……!"
80000079-11 = "3;미모리;04;네? 저, 저는 그런 거 아니에요! 어디에서 그런 이상한 소문이 퍼진 거죠……?\n#3;em;[땀]\n#3;stiff"
80000079-12 = "#na;백귀야행의 학생B;저, 저는요……"
80000079-13 = "3;미모리;03;아하. 카카오매스와 카카오버터를 직접 구매해서, 진정한 의미의 '수제' 초콜릿을 만들고 싶으신 거군요.\n#3;em;[반응]"
80000079-14 = "3;미모리;99;힘내세요. 처음에는 우유와 설탕의 비율 조절이 어려울 수도 있겠지만, 받는 분도 그 정성을 아신다면 진심으로 기뻐하실 거예요."
80000079-15 = "#na;백귀야행의 학생B;저, 정말 괜찮을까요? 저는 손재주가 없는 편인데…… 괜히 욕심을 부리는 게 아닐까 싶기도 하고……"
80000079-16 = "3;미모리;10;괜찮아요! 최선을 다하려는 마음만 있다면, 누구나 해낼 수 있답니다. 그리고, 한두 번의 시행착오까지도, 수행의 한 과정이니까요.\n#3;em;[!]"
80000079-17 = "#na;백귀야행의 학생C;저는 말이에요…… 우후후……"
80000079-18 = "3;미모리;07;네……? 상온에서도 물컹거리고 미끌거리는 슬라임 같은 초대형 초콜릿을 만들고 싶으시다고요……?\n#3;em;…"
80000079-19 = "3;미모리;06;그리고 받는 분이 그 초콜릿 슬라임에게 먹혀 들어가는 광경을 보고 싶다……? 진정한 의미에서 몸도 마음도 자신의 것으로 만들기 위해서……?"
80000079-20 = "3;미모리;06;아, 안 돼요! 그런 건 너무……\n#3;stiff"
80000079-21 = "3;미모리;05;파렴치하잖아요!\n#3;em;[!]\n#3;closeup"
80000079-22 = "#na;백귀야행의 학생C;크윽, 역시 안 되나요……"
80000079-23 = "#all;hide"
80000079-24 = "3;미모리;03;휴우. 수고하셨어요. 선생님.\n#3;a\n#3;em;[땀]"
80000079-25 = "[s1] \"수고는 미모리가 다 했지.\"\n[s2] \"미모리는 정말 대단하구나.\""
80000079-26 = "3;미모리;04;네?! 가, 갑자기 무슨 말씀이신지……?\n#3;em;[?!]"
80000079-27 = "3;미모리;04;네?! 가, 갑자기 무슨 말씀이신지……?\n#3;em;[?!]"
80000079-28 = "3;미모리;02;아…… 누군가를 생각하는 마음을 미리 알아채고, 시의적절하게 도움을 주는 건 아무나 할 수 있는 게 아니라고요?"
80000079-29 = "3;미모리;07;그, 그런 거 아니에요…… 오히려 전……"
80000079-30 = "3;미모리;06;가장 중요한, 다른 분의 마음조차…… 잘 모르고 있는걸요.\n#3;em;…"
80000079-31 = "[s3] \"???\"\n[s4] \"마성의 독심술사 미모리가 모르는 것도 있다니……!\""
80000079-32 = "3;미모리;04;그, 그러니까 그런 거 아니라니까요!\n#3;em;[///]"
80000079-33 = "3;미모리;04;그, 그러니까 그런 거 아니라니까요!\n#3;em;[///]"
80000079-34 = "3;미모리;07;저, 선생님? 실례가 되지 않는다면…… 이것을…… 받아 주실 수, 있으실까요……?"
80000079-35 = "#st;[0,0];instant;1;"
80000079-36 = "#clearST"

[translation]
63100-1 = "第10話;獻給不逝之物的召會"
63100-5 = "[log]綜合考試當天[/log]"
63100-9 = "感覺怎麼樣？"
63100-10 = "嗯。"
63100-11 = "雖然沒有任何根據……"
63100-12 = "但我有自信，一切都會很順利。"
63100-13 = "雖然真的沒有任何根據就是了。"
63100-17 = "那不就是完全沒讀書的意思嗎……"
63100-19 = "我剛才想了一下。"
63100-20 = "嗯？"
63100-21 = "所謂的教科書，不就是專門為了教導學生而推出的書嗎？"
63100-22 = "所以呢？"
63100-23 = "在我看來，我們的教科書失敗了。"
63100-24 = "因為它沒能順利教會我。"
63100-25 = "哇，這種邏輯我真是前所未聞……"
63100-26 = "總之，考試加油吧……"
63100-27 = "你也是……"
63100-28 = "祝你只比我多錯一題。"
63100-29 = "你乾脆詛咒我算了……"
63100-34 = "[ns]「大家！都有好好讀書嗎！」"
63100-35 = "啊，老師！"
63100-36 = "老師……"
63100-37 = "不管怎麼想都覺得自己會考砸的學生，該怎麼辦才好呢……"
63100-38 = "[s1]「哎呀，現在都還沒開始耶。」\n[s2]「走進教室坐到書桌前，才是真正的開始！」\n[s3]「到了那個時候，就連原本會的都會記不太清楚哦！」"
63100-42 = "哇……真是令人振奮的鼓勵耶……"
63100-43 = "[s]「總之，大家都要加油哦！」"
63100-44 = "是……"
63100-49 = "嗨，老師早安。#n你特地親自來送我們嗎？"
63100-50 = "還真愛瞎操心……就算不那麼做，我們也不會逃跑好嗎。#n不然之前的努力就都要白費了。"
63100-55 = "嗯？我以為老師只是純粹想幫我們加油才來的……？"
63100-56 = "啊……我，我覺得美咲同學其實都知道，只是故意那樣說而已啦……"
63100-57 = "是，是嗎？#n抱歉，美咲。"
63100-59 = "哎，你們真的是……！"
63100-60 = "唉……算了。"
63100-61 = "那麼我們就出發了，老師。"
63100-62 = "我，我會全力以赴的……"
63100-71 = "你好，老師。"
63100-72 = "老，老師好……#n今天不用上班嗎？"
63100-73 = "[s4]「今天的上班地點就是這裡……」\n[s5]「至於工作內容則是監考和應援……」"
63100-76 = "原，原來是這樣啊。"
63100-80 = "我對奧利斯接受考試這件事，還會不會感到抗拒……？"
63100-81 = "……"
63100-82 = "坦白講，不能說完全沒有。"
63100-83 = "但是……我已經決定要試著去相信了。"
63100-84 = "相信[ruby=奧利斯]那些孩子[/ruby]說要再試一次看看的聲音。"
63100-85 = "……還有老師也是。"
63100-86 = "[s]「謝謝你，昴。」"
63100-90 = "咦，咦咦？為什麼要突然謝我！？"
63100-91 = "[s]「謝謝你願意相信我。」"
63100-92 = "那，那是……"
63100-93 = "嗯？老師如果得不到學生的信任，其實也會感到不安和動搖……？"
63100-94 = "……"
63100-95 = "這個回答，有點出乎意料呢……"
63100-97 = "那麼，我也有幫上老師的忙嗎！？"
63100-98 = "[s]「當然有囉。哎呀，好乖好乖。」"
63100-105 = "（摸了摸舞彩的頭）"
63100-106 = "嘿嘿……耶嘿嘿……#n感覺心情真好……謝謝你，老師。"
63100-111 = "……"
63100-112 = "我，我也……"
63100-118 = "啊，前輩！時間好像到了！我們快走吧！"
63100-119 = "咦？"
63100-120 = "啊，嗯……"
63100-125 = "[ns]「三一那邊，差不多也開始考試了吧……」"
63100-126 = "（如果要說身為大人有什麼好處的話，大概就是不用考試了吧）"
63100-127 = "（一邊想著這種無俚頭的事情，一邊找了間咖啡廳坐下）"
63100-128 = "（在遠端處理工作的同時，等待考試結束）"
63100-135 = "唔啊……真的結束了……"
63100-136 = "感覺怎麼樣？"
63100-142 = "……"
63100-143 = "……"
63100-144 = "徹底考砸了……"
63100-148 = "不，不是都還沒對答案嗎！"
63100-149 = "哎唷，反正就是有這種感覺嘛。"
63100-151 = "其實我也是……"
63100-152 = "同志啊……"
63100-157 = "[ns]「大家，歡迎回來！」"
63100-159 = "老師……"
63100-160 = "嗚嗚嗚……老師……"
63100-161 = "不管怎麼想，我的考試都完蛋了……！"
63100-162 = "[s6]「那種事情完全不用在意！」\n[s7]「在考試結束的這天，我們得遵守傳統才行！」"
63100-165 = "那是什麼？"
63100-166 = "考試結束當天的傳統？"
63100-167 = "[s8]「那就是……『考後慶功』！」\n[s9]「一邊吃好吃的東西，一邊開心地玩樂！」\n[s10]「這是一定要遵守的傳統哦！」"
63100-174 = "竟，竟然有那麼優良的傳統……！"
63100-175 = "說不定考試這件事，其實意外地還不錯呢！"
63100-177 = "不，那點我持保留意見……#n明明光是準備就超辛苦的耶……？"
63100-178 = "可是那已經是過去的事了！#n換句話說……！"
63100-179 = "已經結束的痛苦，就不再是痛苦了！"
63100-180 = "……！"
63100-181 = "嗯，這才是奧利斯的風格！"
63100-183 = "沒錯！"
63100-184 = "請我們吃好吃的吧，老師！"
63100-185 = "[s11]「好！去把大家通通叫來吧！後續的事情通通不用擔心！」\n[s12]「不過老師的錢包會痛，還是稍微體諒一下好了……」"
63100-189 = "是！！！"
63100-195 = "（於是孩子們的第一次考試……）"
63100-196 = "（就這樣隨著熱鬧的慶功宴，平安落下了帷幕……）"
63100-208 = "你好，昴。還有舞彩也是。#n請坐吧。"
63100-210 = "你好，敦子同學。"
63100-211 = "您，您好……敦子公主殿下……"
63100-213 = "呵呵，我已經不再是公主或其他特別的身分了。#n可以隨意稱呼我沒關係。"
63100-214 = "我們不是約好要輕鬆地稱呼對方嗎？"
63100-215 = "雖，雖然是這樣沒錯，可是……！#n可，可是……唔唔……"
63100-216 = "你好……敦子同學……"
63100-217 = "嗯，這樣就夠了。謝謝你。"
63100-219 = "話說，找我們有什麼事嗎，敦子同學。"
63100-221 = "唔嗯～考試已經順利結束了對吧？#n我聽說在「外面」通常會這樣做。"
63100-222 = "來，我們先開動吧。#n這間咖啡廳的胡桃派好像特別有名。"
63100-223 = "好，好的……那我就不客氣了……#n謝謝你……"
63100-224 = "兩位考試的狀況都還好嗎？#n我個人是把能寫的題目都盡量寫完了。"
63100-225 = "我也把會的題目都寫完了！"
63100-226 = "雖然不會的部分比會的還多就是了……"
63100-227 = "昴呢？"
63100-229 = "三年級的題目實在有點吃力……我就言盡於此了。"
63100-230 = "呵呵，不過模擬考本來就是用來確認考生實力的，不是嗎？"
63100-231 = "也沒有什麼懲處或處分，放輕鬆接受結果就好了。"
63100-235 = "咦……？真正的考試有處分之類的嗎！？"
63100-236 = "唔嗯……要是成績太差的話，有時候會需要補課。"
63100-237 = "如果成績一直不好的話……聽說也可能出現留級，或者無法畢業的情況。"
63100-238 = "啊……原來那就叫處分啊……"
63100-239 = "……嗯。"
63100-240 = "從某種意義上來說，這是個溫柔的世界呢。"
63100-241 = "……"
63100-242 = "……"
63100-243 = "小隊今後打算怎麼做呢，敦子同學？"
63100-244 = "你果然會問這個問題呢。不過這也是理所當然的事吧。"
63100-245 = "……"
63100-250 = "從結論來說，奧利斯小隊打算對一直以來棄之不顧的奧利斯負起責任。"
63100-251 = "……以什麼樣的方式？"
63100-252 = "在選出下一屆奧利斯學生會之前，奧利斯小隊打算擔任臨時學生會的角色。"
63100-257 = "奧利斯小隊……成為奧利斯學生會？#n也，也就是說……"
63100-258 = "我們的學園……終於能像其他學園一樣……"
63100-259 = "在睽違幾百年之後，重新回歸正常了嗎！？"
63100-260 = "為了達成那個目標，我會盡最大的努力。"
63100-261 = "以奧利斯臨時學生會長的身分。"
63100-262 = "學生會長！？"
63100-263 = "冷靜冷靜。你有點太大聲囉，舞彩。"
63100-264 = "啊，嗯。不，不好意思。"
63100-265 = "其實依照奧利斯所剩無幾的傳統來看……#n能夠勝任那個位置的人，除了你之外也沒有別人了吧。"
63100-266 = "我明白了。那麼其他人呢？"
63100-267 = "美咲應該會負責會計的工作。"
63100-268 = "雖然他本人表示「真的直到最後都要壓榨我啊……知道了。我做就是了嘛……」。"
63100-269 = "不過把那些美咲語翻譯過來的話，就是「既然要做就會盡全力」的意思。"
63100-270 = "什麼叫美咲語啊……"
63100-271 = "唔嗯～大概把一半左右的話反向解讀就能聽懂了吧？#n啊，要是在本人面說這件事他會超級生氣，所以要小心哦。"
63100-272 = "唉……"
63100-273 = "沙織則是總務兼副會長。"
63100-274 = "是個妥當的人選呢。"
63100-275 = "他針對學校的營運方針，提出了以下的建議……「大家盡量多打工吧」。"
63100-276 = "為什麼又是打工啊！？"
63100-277 = "唔嗯～「這樣可以快速學到社會上的很多事情，也能賺零用錢……」、#n「從各方面來說，對於重建奧利斯都會很有幫助」……他是這麼說的。"
63100-278 = "啊，他還特別叮嚀要小心合約詐騙，所以只要有人要簽合約，暫時都要先拿給他看。#n這個部分雖然有點丟臉，但他本人表示已經很習慣了。"
63100-279 = "……這不就是把自己的經驗原封不動地搬出來嗎。"
63100-280 = "呵呵，畢竟人是能從經驗中學習的生物嘛。#n除此之外……"
63100-281 = "除此之外？"
63100-282 = "……"
63100-286 = "嗯，這樣應該已經大致確定好方向了吧？"
63100-287 = "之後可能會收到成立各種社團的申請，也必須依照預算與合理性來判斷是否核准……"
63100-288 = "不過那些到時候再看著辦就行了吧……"
63100-289 = "什麼？希望不要只顧著說那些公事，而是談談我個人的私心？"
63100-290 = "你，你就別為難我了，敦子。#n現在我們的立場，已經不能只顧著考慮自己了……"
63100-291 = "你說這是身為學生會長的請求……？"
63100-292 = "……"
63100-293 = "既，既然你都這麼說了……#n就當作是個無關緊要的意見聽聽看吧…………"
63100-297 = "我們也來……試著做套制服之類的東西……怎麼樣呢……"
63100-298 = "如果能做得漂亮可愛一點的話……好像也還不錯……"
63100-299 = "謝謝你，沙醬。#n這就是我希望聽到的。"
63100-302 = "抱歉。這個部分我整理一下再跟你說。"
63100-303 = "咦？好，好吧。"
63100-304 = "然後是日和……"
63100-305 = "日和他擔任的是……"
63100-306 = "……書記？"
63100-307 = "顧名思義，是擔任紀錄官的書記呢。#n不過那樣的話……"
63100-308 = "嗯……他本人好像也知道這點，所以一開始還「嗚嗚嗚～」地哭了。"
63100-309 = "但是他之後又重新振作了起來，燃起了會全力以赴的鬥志。"
63100-310 = "日和能拿出幹勁是件好事。我也覺得很高興。"
63100-311 = "雖，雖然不是很懂，但是感覺不錯呢……因為日和同學，是個很親切的人……"
63100-312 = "是啊……#n嗯，既然你們都喜歡的話……"
63100-313 = "啊，我還有件事想拜託「尼科米底亞部隊」。"
63100-314 = "……拜託我們？#n是什麼事呢……？"
63100-315 = "希望你們能擔任奧利斯風紀委員會的角色。"
63100-316 = "風，風紀委員會……？"
63100-317 = "嗯。就是其他學園負責治安、風紀與秩序的自治武裝機構。"
63100-318 = "我認為這份工作，除了昴之外無法交給任何人。"
63100-319 = "……如果我拒絕呢？"
63100-320 = "你會拒絕嗎？"
63100-321 = "……"
63100-323 = "前，前輩……！"
63100-328 = "唉……"
63100-329 = "手段相當老練呢。敦子同學。"
63100-330 = "是嗎？畢竟我可是學生會長呢。雖然只是臨時的。"
63100-331 = "某方面來說，倒也挺合理的……"
63100-332 = "（能夠將人事安排處理到毫無怨言，這也是一種才能吧）"
63100-333 = "……"
63100-334 = "你最終打算得到什麼樣的結果呢，敦子同學？"
63100-340 = "我想把奧利斯打造成一所很棒的學園。"
63100-341 = "……在這一點上，我們的想法是一致的呢。"
63100-342 = "嗯。只要是留在奧利斯的學生，大家的心情應該都差不多吧。"
63100-343 = "……確實如此。#n不過要達成這個目標……要做的事情想必非常多吧？"
63100-344 = "我知道。所以這次，我不想再逃避責任了。#n……雖然這句話之前也已經說過了。"
63100-345 = "你有自信嗎？"
63100-346 = "老實說，假如只有我一個人的話，其實沒什麼自信。#n所以我才會開口請你們幫忙。"
63100-347 = "彼此牽著手的話，有可能會一起跌倒的哦……？"
63100-348 = "不過，也可能會有人能夠幫忙拉起跌倒的人。"
63100-349 = "反正沒有人知道未來會怎麼發展，我不想只往壞的方面去想。"
63100-350 = "那不就是不切實際的樂觀主義嗎？"
63100-351 = "當然可以這麼解讀沒錯，不過我個人希望能夠將其視為行動主義。#n啊，雖然行動主義這個專有名詞的定義，其實跟我說的不太一樣就是了。"
63100-352 = "這只是我個人的想法……我認為最重要的，終究還是把握時機付諸行動。"
63100-353 = "為了做到這一點，不如就假裝自己懷抱著對未來的模糊希望吧。"
63100-358 = "如果可以的話，希望能和大家一起。"
63100-359 = "……"
63100-360 = "我明白了。"
63100-361 = "既然你是這麼想的，我也會盡我所能地協助你。"
63100-362 = "畢竟將來會發生什麼，有什麼等待著我們……我們都無從得知。"
63100-363 = "誰能料到我們竟然會參加考試呢……"
63100-364 = "呵呵，我也確實嚇了一跳呢。"
63100-365 = "話，話說……關於三一那位救護騎士團的團長……"
63100-366 = "是說美禰同學嗎？#n嗯，這件事也該跟你們說明一下。"
63100-367 = "我聽說……他自從那天向我們宣揚救護之後，就一直臥床不起。"
63100-368 = "嗯，似乎是這樣沒錯。"
63100-369 = "不過不用擔心。我聽說他已經完全康復了。"
63100-373 = "真的嗎！？#n真是太好了！"
63100-374 = "雖然有幾天沒能好好讀書，不過應該不會對這次考試的結果造成太大的影響。"
63100-375 = "原來如此……那真是值得慶幸呢。"
63100-376 = "嗯，其實美禰同學那天……#n相當於把四名「啟示錄的天使」的力量，封印在了自己體內。"
63100-377 = "等等……原來是那樣的嗎！？"
63100-378 = "嗯，美禰同學在擊倒四位天使之後，自己也失去了意識對吧？"
63100-379 = "正因如此，七位天使達成和諧並解放力量的情況才沒有發生。"
63100-380 = "意思是美禰同學他……一直承受著四位天使！？"
63100-382 = "怎，怎麼了嗎，昴前輩……？"
63100-387 = "啊，抱歉。我有點太大聲了。#n可是……那實在……"
63100-388 = "沒錯，所以在昴作為最後一名天使被擊退時，美禰同學也幾乎在同一時間醒了過來。"
63100-389 = "……真不敢相信。#n光是一個就幾乎能讓人失去意識了，他的精神力到底是怎麼回事……"
63100-390 = "……也許那就是所謂的信念或正直吧？"
63100-391 = "無論面臨什麼樣的狀況、遭遇什麼樣的打擊，就算承認一切的悲劇都會發生……"
63100-392 = "即便如此，依舊堅持向前邁進的模樣。"
63100-393 = "這一點……我真的覺得非常了不起。"
63100-395 = "就是說啊……"
63100-396 = "不過話又說回來……有個部分我實在無法理解。"
63100-397 = "是哪個部分？"
63100-398 = "為什麼他嘴上說要救護別人，卻反而把人弄得遍體鱗傷呢。"
63100-399 = "……"
63100-403 = "敦，敦子同學？"

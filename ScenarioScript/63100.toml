[translation]
63100-1 = "Episode 10;Ecclesia for Those Who Don't Disappear"
63100-5 = "[log]Mock Exam Day[/log]"
63100-9 = "Well?"
63100-10 = "Hm."
63100-11 = "I don't have anything to back it up..."
63100-12 = "...but I suddenly feel really confident that everything's going to be okay."
63100-13 = "Again, I've done nothing to warrant feeling this way."
63100-17 = "You didn't study at all, did you?"
63100-19 = "So I was thinking..."
63100-20 = "Um..."
63100-21 = "Textbooks are books that are made to teach students well, right?"
63100-22 = "Right..."
63100-23 = "Then, as far as I can tell, our textbook sucks."
63100-24 = "It didn't teach me anything."
63100-25 = "Wow. I've literally never heard that kind of logic before..."
63100-26 = "With that, good luck on the test..."
63100-27 = "You too..."
63100-28 = "Get exactly one more question wrong than me!"
63100-29 = "You totally just cursed me!"
63100-34 = "[ns] \"All right! Did everyone study hard?\""
63100-35 = "Ah, Sensei!"
63100-36 = "Sensei..."
63100-37 = "What should you do when you feel like you're gonna bomb a test?"
63100-38 = "[s1] \"That's just the beginning! You haven't even started yet.\"\n[s2] \"Just wait until you walk inside and sit at your desk.\"\n[s3] \"Suddenly, everything you studied will start to go blurry...\""
63100-42 = "Wow... I feel...a thousand times worse..."
63100-43 = "[s] \"Anyway, do your best, everyone!\""
63100-44 = "Okaaay..."
63100-49 = "Hi, Sensei. Nice to see you. You came out here to meet us?"
63100-50 = "You're such a worrywart... Do you seriously think we're going to run away at this point? We went through too much trouble to get here."
63100-55 = "Hm? Is Sensei not here purely to cheer us on?"
63100-56 = "Oh... I mean, I thought Misaki was just saying that to be Misaki..."
63100-57 = "I-I see. I apologize, Misaki."
63100-59 = "Seriously? I wasn't—"
63100-60 = "*sigh* Whatever."
63100-61 = "Well then, we should be off, Sensei."
63100-62 = "I-I'll do my very best..."
63100-71 = "Hello, Sensei."
63100-72 = "Ah, hi, Sensei... Did you not have to work today?"
63100-73 = "[s4] \"Today, this is my work…\"\n[s5] \"My job is to proctor and cheer!\""
63100-76 = "I-I see."
63100-80 = "Hm? You want to know how I feel about taking the Arius mock exam?"
63100-81 = "..."
63100-82 = "Honestly... I can't say the idea sits well with me yet."
63100-83 = "But all of the Arius kids wanted to try again."
63100-84 = "And I've decided to put my trust in them."
63100-85 = "You as well, Sensei."
63100-86 = "[s] \"Thank you, Subaru.\""
63100-90 = "E-Eh? What? Why? Wasn't that uncalled for?!"
63100-91 = "[s] \"Thank you for trusting me.\""
63100-92 = "W-Well, that isn't anything to..."
63100-93 = "Huh? You get anxious and unsure when your students don't trust what you're doing?"
63100-94 = "..."
63100-95 = "I...wasn't expecting such an honest answer."
63100-97 = "D-Does that mean I'm helping you too, Sensei?!"
63100-98 = "[s] \"Yes, absolutely. Good girl. I'm very proud of you.\""
63100-105 = "I patted Maia on the head."
63100-106 = "Heehee... Heh... That feels nice... Thank you, Sensei."
63100-111 = "..."
63100-112 = "M-Me too..."
63100-118 = "Subaru! Let's go! It's already time!"
63100-119 = "Huh? O-Oh..."
63100-120 = "Okay..."
63100-125 = "[ns] I wonder if the Trinity exam has started yet...\""
63100-126 = "(If there's one good thing about being an adult...)"
63100-127 = "(...It's that I don't have to take mock exams anymore... Silly thoughts)"
63100-128 = "I spent some time getting work done at a nearby cafe while I waited for the exam to end."
63100-135 = "Ugh... It's really, actually over..."
63100-136 = "So? How was it?"
63100-142 = "..."
63100-143 = "..."
63100-144 = "It was a complete disaster..."
63100-148 = "H-Hey, they haven't even been graded yet!"
63100-149 = "You know...sometimes you just know..."
63100-151 = "...Honestly, same..."
63100-152 = "My sister-in-arms..."
63100-157 = "[ns] \"Welcome back, everyone!\""
63100-159 = "Sensei..."
63100-160 = "*Sob*... Sensei..."
63100-161 = "I'm positive I totally bombed the test...!"
63100-162 = "[s6] \"That doesn't matter right now!\"\n[s7] \"We have to uphold the long-held tradition to complete our exams!\""
63100-165 = "What's that?"
63100-166 = "Like...to celebrate the end of exam season?"
63100-167 = "[s8] \"That's right...the post-exam party!\"\n[s9] \"We'll eat delicious food and have a great time!\"\n[s10] \"It's a tradition that we must never let die out!\""
63100-174 = "W-Wow! There are amazing traditions like that?"
63100-175 = "Maybe exams aren't so bad after all!"
63100-177 = "Wait, wait, wait. Let's not forget how brutal all that studying was THAT quickly."
63100-178 = "But it's done with, isn't it?"
63100-179 = "Once the pain's over, it's not pain anymore!"
63100-180 = "...!"
63100-181 = "That's the Arius way!"
63100-183 = "Right!"
63100-184 = "Can you buy us something delicious, please, Sensei?"
63100-185 = "[s11] \"Invite everyone! Don't worry about a thing!\"\n[s12] \"...Although, please keep my poor wallet in mind, at least...\""
63100-189 = "Okay!"
63100-195 = "And just like that..."
63100-196 = "...their very first exam, and after-party, came to a peaceful, happy close."
63100-208 = "Hello, Subaru, Maia. Please, sit."
63100-210 = "Hello, Atsuko."
63100-211 = "U-Um... Hello, P-Princess Atsuko..."
63100-213 = "Fufu. I'm not a princess anymore, so there's no need for the title."
63100-214 = "Didn't we agree to be friendly with each other?"
63100-215 = "W-We did! It's just... Okay... *inhale*"
63100-216 = "A-Atsuko. Hello, Atsuko."
63100-217 = "Thank you. I appreciate it."
63100-219 = "So, what did you want to talk about, Atsuko? "
63100-221 = "Hm... The exam went well, right? And I heard that this is a common post-exam activity in the outside world."
63100-222 = "First, let's fill our stomachs. This cafe's pecan pie is supposedly very famous."
63100-223 = "O-Okay... Thank you very much..."
63100-224 = "So, how did both of you feel about the exam? I think I answered everything to the best of my ability."
63100-225 = "I answered everything I knew as well!"
63100-226 = "But, to be honest with you, there was a lot more I didn't know than I did."
63100-227 = "What about you, Subaru?"
63100-229 = "...It was my first time taking a mock exam, and the third-year questions felt a bit heavy for me. That's all."
63100-230 = "Fufu. Since it's just a mock exam, it's only meant to be a...personal benchmark, of sorts."
63100-231 = "There aren't any punishments for a mock exam either, so it doesn't matter what your results are."
63100-235 = "Huh...? Do real exams...have punishments?!"
63100-236 = "Hm... If you do too poorly, you'll need to take supplemental classes."
63100-237 = "And if your grades don't improve, you could be held back a year, or be barred from graduating."
63100-238 = "Ah... So that's what \"punishments\" are..."
63100-239 = "...Yes."
63100-240 = "These are the ways in a much kinder world."
63100-241 = "..."
63100-242 = "..."
63100-243 = "What are your plans for the Squad from here on out, Atsuko?"
63100-244 = "I assumed you would be curious."
63100-245 = "..."
63100-250 = "The Arius Squad intends to address the responsibilities it's been neglecting until now."
63100-251 = "...And how does it plan on doing that?"
63100-252 = "Until the next Arius student council is officially and fairly elected, the Arius Squad intends to function as an acting student council."
63100-257 = "The Arius Squad...will act as the Arius student council? But then... Then..."
63100-258 = "That would make our school...just like other schools..."
63100-259 = "Wouldn't that mean that, after hundreds and hundreds of years, the Arius Satellite School is going to get back to normal?"
63100-260 = "I'll do all I can to ensure that happens."
63100-261 = "Yes. I'll have to, as Arius' acting student council president."
63100-262 = "Student council president?!?!"
63100-263 = "Easy, easy. You're getting a little loud, Maia."
63100-264 = "A-Ah. Sorry."
63100-265 = "Objectively, based on what few traditions Arius still has, it couldn't be anyone but you."
63100-266 = "Okay. What does everyone else intend on doing?"
63100-267 = "Misaki will be treasurer."
63100-268 = "She complained, of course. \"You really want to work me to the bone, don't you? Fine, if you really have no one better.\""
63100-269 = "In Misaki-speak, that means, \"I'm doing it anyway, so I might as well do my best.\""
63100-270 = "What on earth is \"Misaki-speak\"...?"
63100-271 = "Well... It's a language where you simply flip about half of what she says. Don't say that to her face, though. She'll be quite enraged with you."
63100-272 = "*sigh*..."
63100-273 = "And Saori will be vice president, and a general manager as well."
63100-274 = "I can follow the logic."
63100-275 = "For management, she proposed this policy: Everyone should work part-time jobs whenever they are able."
63100-276 = "What? Why?!"
63100-277 = "She said it's because you'll learn about society quickly, earn some pocket money, and help with the Arius rebuilding efforts."
63100-278 = "Since scams are a concern, she's directed everyone to get contracts approved by her before they sign anything. She rather sheepishly explained that she's undergone a lot of trial and error in that field."
63100-279 = "...So she's just making everyone follow her blueprint."
63100-280 = "Fufu. People learn best from experience, after all. Also..."
63100-281 = "\"Also\"?"
63100-282 = "..."
63100-286 = "Hm? We're starting to get the groundwork laid down."
63100-287 = "If we start getting club applications, we'll need to evaluate them based on budget and feasibility..."
63100-288 = "It'll have to be on a case by case basis, when the time comes."
63100-289 = "Hm? Less logistics, more of my personal wishes?"
63100-290 = "I-I couldn't, Atsuko. We're not in a position to be putting ourselves, or our wants, first anymore."
63100-291 = "It's a request from my student council president...?"
63100-292 = "..."
63100-293 = "W-Well... There's little justification for them, so you may ignore this thought entirely."
63100-297 = "It crossed my mind... What if we...made ourselves uniforms...?"
63100-298 = "Something pretty, and cute."
63100-299 = "Thank you, Sao-Sao. That's exactly what I wanted to hear."
63100-302 = "Sorry. I'll elaborate when the time is right."
63100-303 = "Huh? Sure. Fine by me."
63100-304 = "And Hiyori..."
63100-305 = "...Hiyori is..."
63100-306 = "...our secretary?"
63100-307 = "So a secretary, also acting as a record keeper. That's..."
63100-308 = "Yeah... She cried quite a bit when she first realized..."
63100-309 = "Then, she pulled herself together and got fired up about doing her best."
63100-310 = "Hiyori always does great things when she's motivated to, so I was very happy."
63100-311 = "I-I don't really know why, but that makes me happy too... Hiyori's just really kind..."
63100-312 = "Well... As long as it makes you happy."
63100-313 = "Oh, and there's something I want to ask of Nicomedia's Troop as well."
63100-314 = "...Us? What is it?"
63100-315 = "I'd like you to take on the role of Arius's disciplinary team."
63100-316 = "Disciplinary...team?"
63100-317 = "Yeah, an autonomous force in charge of public order, morals, and discipline."
63100-318 = "For this, I really don't think I can ask anyone but you, Subaru."
63100-319 = "...And if I say no?"
63100-320 = "Are you really gonna be that way?"
63100-321 = "..."
63100-323 = "S-Subaru...?"
63100-328 = "*sigh*"
63100-329 = "You've always been a crafty one, Atsuko."
63100-330 = "Have I? I suppose I AM the student council president. Even if just for now."
63100-331 = "Yeah, yeah. Exactly as you should. "
63100-332 = "(Handling personnel matters this smoothly is a talent in itself.)"
63100-333 = "..."
63100-334 = "So what's your big plan, Atsuko?"
63100-340 = "I want to turn Arius into a wonderful school."
63100-341 = "...Then we're on the same page there."
63100-342 = "Yeah. I figure any student from Arius will say the same."
63100-343 = "...You're not wrong. There's an absurd amount of work to do, though, isn't there?"
63100-344 = "I know. I won't run away again. I'll assert that as many times as you need."
63100-345 = "Are you confident in your abilities?"
63100-346 = "To be frank, no. I'm not. That's why I need help."
63100-347 = "Joining hands just means it's easier for one person to pull down the other."
63100-348 = "Or it's easier to pull each other back up if one of us falls."
63100-349 = "There's no way of knowing the future, so I don't want to dwell on worst-case scenarios."
63100-350 = "Isn't that just unfounded optimism?"
63100-351 = "You could see it that way, but I'd rather call it activism. Ah, I know the word has its own definition, strictly speaking."
63100-352 = "I've been using it to convey that what matters is to take action in the here and now, in the moment I am currently standing in."
63100-353 = "And I don't believe we can do that without at least pretending we harbor some vague, hazy hope for our future."
63100-358 = "Together, if we can."
63100-359 = "..."
63100-360 = "Understood."
63100-361 = "If that's how you feel, then I'll do my best to support you."
63100-362 = "We really don't know what'll happen next, or what's coming our way."
63100-363 = "I mean, who would've thought we'd end up taking some mock exam...?"
63100-364 = "Fufu. I admit, even I was caught off guard by that."
63100-365 = "C-Come to think of it.....about that Remedial Knights captain from Trinity..."
63100-366 = "Mine? Right. We should talk about her too."
63100-367 = "Yes... I heard she was bedridden for a while, after the incident in Arius."
63100-368 = "She was. However..."
63100-369 = "There's nothing to worry about. She's recovered completely."
63100-373 = "Really?! That's great to hear!"
63100-374 = "She was unable to study for a few days, but it sounds like it won't have much impact on her mock exam results."
63100-375 = "I see... I guess that's a relief, at least."
63100-376 = "Yeah. The truth is, that day Mine essentially sealed the power of the four Angels of Revelation inside herself."
63100-377 = "What? That's what actually happened?!"
63100-378 = "Yes. Just before she passed out, she defeated four of the angels, if you recall."
63100-379 = "Her actions stymied the seven angels' only chance to harmonize and unleash their full power."
63100-380 = "Mine...endured the power of all four angels?! By sheer will?!"
63100-382 = "Wh-What's wrong, Subaru...?"
63100-387 = "Ah, no, I'm sorry. I didn't mean to raise my voice. I was just so..."
63100-388 = "It would seem that Mine awoke at almost the exact moment you were defeated as the final angel."
63100-389 = "...I could barely handle just one. Her mentality and strength are out of this world."
63100-390 = "...Maybe that's what you call conviction, or integrity."
63100-391 = "No matter what happens, no matter what comes at her, even knowing that it may end in tragedy..."
63100-392 = "...she endures and presses forward regardless."
63100-393 = "That part of her...really is incredible."
63100-395 = "It is..."
63100-396 = "That said, there's one thing I just can't wrap my head around."
63100-397 = "What is it?"
63100-398 = "If she's trying to help people, why does she leave them in such a wreck?"
63100-399 = "..."
63100-403 = "A-Atsuko?"
63100-404 = "You're pulling out your mask? Seriously?! No one can hear you when you wear that thing!"
63100-405 = "(Flick, flick, fwoosh.)"
63100-406 = "I don't know sign language! And you know that!"
63100-410 = "Are you running away again, Hakari Atsuko?!"
63100-414 = "...But she still made sure to pay in advance..."
63100-415 = "Subaru, I just realized something!"
63100-416 = "Leaving yourself an escape route, in case of emergency, is super important!"
63100-417 = "That's not something you should try to learn..."
63100-418 = "Better yet, just learn to not put yourself in a situation where you would need one."
63100-430 = "Oh, Sensei. Welcome."
63100-431 = "[s13] \"Hi, Atsuko. Hi, everyone!\"\n[s14] \"How's the restoration work going?\""
63100-434 = "As you can see, this is currently the only place that's been fully restored."
63100-435 = "This is the starting point. From here on outwards..."
63100-436 = "...we want to create a new Arius, one building at a time."
63100-437 = "I mean, no one wants to go to a school that looks abandoned."
63100-438 = "...And someday we'll have to accept new students and transfers again."
63100-439 = "Do you really think...anyone would really want to come here?"
63100-440 = "Apparently... Some people are interested."
63100-441 = "They're interested in the...particular set of skills that is most widely associated with our school."
63100-442 = "Sh-Shouldn't we let that kind of stuff just fade into nothingness?!"
63100-443 = "...No matter when or where, there'll always be people who idolize power."
63100-445 = "People like those won't last long here, anyways."
63100-446 = "[s] \"That reminds me, how did everyone do on the exam?\""
63100-447 = "Let me think... Out of ten ranks, I was number two. For my first try at taking a test, I believe that should be acceptable?"
63100-448 = "...Rank three."
63100-449 = "...Literature really is hopelessly nonlinear..."
63100-450 = "I was rank four... Waaah..."
63100-451 = "[s15] \"It's okay, Hiyori! It's okay!\"\n[s16] \"Rank four's still good! Really good!\""
63100-454 = "Waaah...! Kindness can come across as pity at times like these!"
63100-455 = "[s] \"You can just do better next time!!\""
63100-463 = "Patrol report complete... Oh, Sensei, you're here?"
63100-464 = "Ah, hello, Sensei. Welcome to Arius!"
63100-465 = "M-More importantly, what brings you here?"
63100-466 = "Huh...? You came because you heard the mock exam results were out?!"
63100-467 = "..."
63100-468 = "I'm sorry, Sensei... I only got rank four... Uwaaah..."
63100-469 = "Rank four...? You too?"
63100-470 = "H-Hiyori, you too?"
63100-471 = "..."
63100-472 = "..."
63100-476 = "That would mean we're...rank four buddies!"
63100-477 = "Yeah! Buddies!"
63100-478 = "We'll try even harder next time!"
63100-479 = "Yeah! I'll put in double the work!"
63100-484 = "UWAAAHHH!"
63100-487 = "[ns] \"By the way.\""
63100-489 = "Y-Yes...?"
63100-490 = "[s] \"You don't have anything you want to tell me, Subaru?\""
63100-491 = "..."
63100-492 = "I mean, I'm sure that's why you came all this way."
63100-493 = "[s] \"...\""
63100-497 = "[ns] \"You placed fifth.\""
63100-498 = "...Yes."
63100-499 = "[s] \"How about we put more time into studying from here on out?\""
63100-500 = "...Okaaay..."
63100-509 = "[wa:1850]― [log=스바루]Seriously, [wa:2040]so much [wa:620]has happened.[/log]"
63100-512 = "[wa:560]― [log=스바루]Looking back,[/log]"
63100-514 = "― [log=스바루]it almost feels like [wa:900]it was all just a dream...[/log]"
63100-517 = "[wa:250]― [log=스바루]I wanted to [wa:1520]thank you,[/log]"
63100-519 = "― [log=스바루]for all that [wa:1050]you've done.[wa:80] [/log]"
63100-522 = "[wa:350]― [log=스바루]That, at least, [wa:1820]I can promise is sincere.[/log]"
63100-528 = "Hm? You mean my grades?"
63100-529 = "Hm..."
63100-530 = "This might sound a bit like I'm bragging, but..."
63100-531 = "It's all thanks to you, regardless, Sensei."
63100-535 = "I placed first."
63100-536 = "Thank you, Sensei."
63100-537 = "You really are...the greatest thing that has happened to my life."

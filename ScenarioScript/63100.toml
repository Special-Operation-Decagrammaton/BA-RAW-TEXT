63100-242 = "..."
63100-243 = "จากนี้ไปสควอดจะทำยังไงต่อเหรอคะ คุณอาสึโกะ?"
63100-244 = "จะถามเรื่องนั้นสินะ อื้อ ก็ไม่แปลกหรอก"
63100-245 = "..."
63100-250 = "สควอดของอาเรียสจะรับผิดชอบเกี่ยวกับอาเรียสเพื่อชดเชยสิ่งที่พวกเราละเลยมาตลอดน่ะค่ะ"
63100-251 = "รับผิดชอบยังไงเหรอคะ...?"
63100-252 = "สควอดของอาเรียสจะปฏิบัติหน้าที่เป็นสภานักเรียนชั่วคราว จนกว่าจะมีการคัดเลือก และแต่งตั้งสภานักเรียนชุดต่อไปของอาเรียสค่ะ"

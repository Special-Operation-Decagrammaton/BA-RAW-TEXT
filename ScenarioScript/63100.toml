63100-229 = "นี่เป็นครั้งแรกที่ฉันได้สอบจำลอง ฉันว่าข้อสอบของชั้นปีที่ 3 มันค่อนข้างยากเลยละค่ะ... ฉันขอตอบเท่านี้ดีกว่าค่ะ"
63100-230 = "ฮุฮุ แต่ยังไงมันก็เป็นแค่การสอบจำลองนะ คิดว่าเป็นการวัดความสามารถของเราก็พอ"
63100-231 = "การสอบจำลองไม่มีการลงโทษอะไรเป็นพิเศษ งั้นก็ยอมรับผลลัพธ์อย่างสบายใจได้เลย"
63100-235 = "คะ...? แสดงว่าตอนสอบจริงมีการลงโทษเหรอคะ?!"
63100-236 = "อืม... ถ้าคะแนนแย่มากๆ ก็อาจจะเปิดชั้นเรียนเสริม"
63100-237 = "และถ้าคะแนนยังไม่กระเตื้องขึ้นอีก... ได้ยินว่าอาจถูกให้ซ้ำชั้น หรือไม่ก็อาจเรียนไม่จบพร้อมเพื่อนๆ ก็ได้"
63100-238 = "อ่า... แบบนั้นเรียกว่าลงโทษแล้วสินะคะ! ค่ะ..."

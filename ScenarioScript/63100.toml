63100-262 = "ประธานนักเรียนเหรอคะ?!?!"
63100-263 = "นี่ๆ พูดดังไปแล้วค่ะ ไมอา"
63100-264 = "อ๊ะ... อ่า ค่ะ ขอโทษค่ะ"
63100-265 = "ตามธรรมเนียมที่หลงเหลืออยู่เพียงเล็กน้อยของอาเรียสแล้ว ที่จริงก็ไม่มีใครอื่นที่จะดำรงตำแหน่งนั้น#nได้นอกจากคุณแล้วละค่ะ"
63100-266 = "เข้าใจแล้วค่ะ แล้วคนอื่นล่ะคะ?"
63100-267 = "ฉันอาจให้มิซากิมาช่วยงานด้านบัญชี"
63100-268 = "เจ้าตัวบอกไว้ว่า 'ใช้งานกันคุ้มเลยนะ ก็ได้ๆ แค่ทำให้ได้ก็พอแล้วใช่มั้ยล่ะ...'"
63100-269 = "ภาษามิซากิแบบนั้นแปลได้ว่า 'ในเมื่อได้ทำแล้ว ฉันจะทำให้เต็มที่เลย' น่ะ"
63100-270 = "ภาษามิซากิงั้นเหรอ มันเป็นยังไงเหรอคะ..."
63100-271 = "อืม~ เป็นภาษาที่ต้องแปลสิ่งที่พูดออกมาครึ่งหนึ่งในทางตรงกันข้าม น่าจะเป็นอย่างนั้นนะ? แต่ถ้าไปพูดแบบนี้กับเจ้าตัวละก็ ระวังจะโดนโกรธมากๆ เอาได้ล่ะ"
63100-272 = "เฮ้อ..."
63100-273 = "ส่วนซาโอริก็จะได้เป็นรองประธาน ควบกับเจ้าหน้าที่งานธุรการ"
63100-274 = "ใช้คนได้ถูกกับงานเลยนะคะ"
63100-275 = "เห็นว่าจะเสนอนโยบายการดำเนินงานของโรงเรียน ให้ 'ทุกคนทำงานพาร์ทไทม์ให้มากที่สุดเท่าที่จะ#nเป็นไปได้' อยู่นะ"

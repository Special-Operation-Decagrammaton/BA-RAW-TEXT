63100-38 = "[s1] \"อะไรกัน ยังไม่ทันจะเริ่มสอบเลย อย่าเพิ่งท้อสิ\"\n[s2] \"ถ้ายังไม่เข้าไปนั่งสอบ ก็ยังไม่ใช่เวลามาโอดครวญหรอกนะ!\"\n[s3] \"พอเริ่มสอบแล้ว ตอนนั้นแหละคือเวลายากลำบากที่แท้จริง!\""
63100-42 = "โห... นี่พูดปลอบใจกันใช่มั้ยคะ..."

63100-258 = "งั้นโรงเรียนของพวกเราก็... จะกลับมาเป็นปกติ..."
63100-259 = "เหมือนโรงเรียนอื่นๆ เหรอคะ?! ในรอบหลายร้อยปีเลยน่ะเหรอ!?"
63100-260 = "พวกฉันจะพยายามอย่างเต็มที่ เพื่อให้สิ่งนั้นเกิดขึ้นจริงได้น่ะ"

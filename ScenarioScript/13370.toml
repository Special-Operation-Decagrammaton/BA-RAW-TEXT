[translation]
13370-1 = "第37話;必須說出口的事"
13370-6 = "星野前輩。"
13370-11 = "夢前輩最後究竟想對我說什麼……"
13370-12 = "那本手冊裡又寫了什麼……"
13370-13 = "也許我永遠沒機會知道了。"
13370-14 = "但我依然會為了找尋答案而永遠痛苦下去。"
13370-15 = "這種痛苦……"
13370-16 = "或許這種痛苦……"
13370-17 = "就是我必須承受的「罪」吧……？"
13370-18 = "不是那樣的，前輩。"
13370-19 = "星野前輩真正後悔的並不是那件事吧！"
13370-20 = "星野前輩其實一直想溫柔地對待夢前輩……一直想讓他知道你很喜歡他……"
13370-21 = "但是最後卻沒能做到，這才是你痛苦的原因吧！"
13370-24 = "如果知道那是最後一次的話……"
13370-25 = "我一定會誠實地告訴他我的想法……"
13370-26 = "是啊……竟然會再也見不到了……任何人都沒這麼想過吧。"
13370-29 = "那是一場意外，前輩。"
13370-31 = "那種理由無法讓人釋懷。"
13370-32 = "那不是前輩的錯。"
13370-34 = "我也知道那不是我的錯，但實際上就是如此。"
13370-35 = "是我錯了。"
13370-36 = "如果不是星野前輩的話，我……"
13370-37 = "說不定會一個人在寒冷和恐懼之中顫抖，最後孤獨地在沙漠中死去。"
13370-38 = "嗯，那條圍巾我依舊珍藏著，星野前輩。"
13370-40 = "……畢竟那時候白子醬遇到麻煩了嘛。#n夢前輩……對我……"
13370-41 = "嗯，如果是這樣的話，我也想對夢會長說聲謝謝。"
13370-43 = "……"
13370-47 = "我們只是偶然地誕生，歷經痛苦後毫無意義地死去。#n這就是世界的真相吧。"
13370-48 = "假如死亡也存在意義……如果真的是那樣的話……"
13370-49 = "夢前輩又為何會以那種方式死去呢？#n那種死法究竟有什麼意義……？"
13370-50 = "星野前輩……"
13370-52 = "夢前輩是因為迷路而死的。"
13370-53 = "沒有指南針，也沒有通訊器和水，而且當時還連續好幾天都看不到星星。"
13370-54 = "夢前輩的手機已經是老古董了。#n雖然我好幾次都想叫他去買台新的，但最後都還是忍住沒把話說出口。"
13370-55 = "因為我們還得想辦法把學校的債還清才行。"
13370-56 = "如果……如果我那時候……"
13370-57 = "星野前輩！"
13370-59 = "……"
13370-60 = "我也……不太清楚，我沒有仔細想過那種事……"
13370-61 = "但是只要我們繼續像這樣尋找理由……最後一定……"
13370-63 = "綾音醬。"
13370-64 = "……修好學校水道的人是綾音醬對吧。"
13370-65 = "前輩……？"
13370-67 = "謝謝你。#n雖然沒有說出口，但我一直都很感謝你。"
13370-68 = "星野前輩……？"
13370-70 = "……"
13370-71 = "唉……抱歉前輩。#n我不知道該說什麼才好……"
13370-72 = "……"
13370-73 = "快點給我回來！！你這個笨蛋前輩！！我們還要一起去吃拉麵耶！"
13370-74 = "只要你回來，我跟綾音醬就出道當偶像！！"
13370-76 = "茜香醬……"
13370-77 = "茜香醬果然很可愛呢～"
13370-78 = "……咦咦！？"
13370-80 = "………………"
13370-81 = "是時候該放下了。"
13370-82 = "讓學生會長的事過去吧，前輩。"
13370-84 = "白子醬……？"
13370-85 = "像茜香和綾音一樣不認識會長的學生，將來只會越來越多。"
13370-86 = "雖然這間教室裡充滿了你和他的回憶……#n但是請你讓這間教室，慢慢地被那些學生的笑聲填滿吧，前輩。"
13370-87 = "然後……"
13370-88 = "希望你能記住和他一起度過的每個瞬間，而不是他悲慘的結局。"
13370-89 = "雖然與會長的死相關的謠言很多，#n但他究竟是個什麼樣的人……你應該記得最清楚才對。"
13370-90 = "所以……請放下那本手冊吧。"
13370-97 = "謝謝你，另一個白子醬。"
13370-98 = "雖然不太了解你，但有件事我很清楚。"
13370-99 = "那就是我不希望你變得跟我一樣。"
13370-100 = "謝謝你，白子醬。#n你果然是白子醬沒錯。"
13370-101 = "只不過……"
13370-102 = "你自己不也還留著那些東西嗎？"
13370-103 = "……！！"
13370-107 = "我指的是茜香、野乃美、綾音，還有我死後留下的武器。"
13370-108 = "你明明一樣都捨不得丟。"
13370-109 = "我……"
13370-111 = "我們真的有辦法放下過去的事嗎……白子醬？"
13370-112 = "我們……做得到嗎……？#n隨著時間流逝，記憶也慢慢淡去之後……一切就真的過去了嗎？"
13370-113 = "……"
13370-114 = "…………………………………………"
13370-115 = "我也……不知道……前輩……"
13370-116 = "我也不知道……我們究竟做不做得到……"
13370-117 = "人類……"
13370-118 = "真的有辦法從「罪」、「悲傷」以及「痛苦」中解脫嗎……？"
13370-119 = "那簡直……就像要讓死者重生一樣困難……"
13370-120 = "……"
13370-125 = "結束了──！！！"
13370-126 = "「賽特的憤怒」終於成功顯現了！！"
13370-127 = "哦哦哦──！看啊，塞特啊，祂那雷擊的憤怒啊……！！"
13370-128 = "將地面上的一切事物通通燃燒殆盡吧──！！"
13370-132 = "老師！！「賽特的憤怒」……！！"
13370-133 = "小，小心！好像有什麼東西過來了！！#n有股龐大……非常龐大的能量……"
13370-137 = "我……"
13370-138 = "我……………………"
13370-139 = "辦不到。"
13370-143 = "前輩的死究竟留下了什麼。"
13370-144 = "在查清楚它所代表的意義之前……"
13370-148 = "我……"
13370-156 = "老師，快躲開！！"
13370-157 = "現，現在的我無法抵擋那樣的攻擊！！"
13370-158 = "請趕快讓和你在一起的所有學生……！！"
13370-159 = "哇啊啊啊啊啊！？"
13370-163 = "[ns]「星野，你覺得夢會在那本手冊裡留下什麼呢？」"
13370-164 = "我就是為了查清楚這件事……"
13370-165 = "[s]「可是那是永遠不可能查清楚的事。」"
13370-166 = "……"
13370-167 = "[s]「不過即便如此，你心中還是有個想要相信的答案吧？」"
13370-168 = "……如果是夢前輩的話，他會在裡面寫些什麼呢？"
13370-169 = "[s]「最了解夢的人不就是你嗎？」"
13370-170 = "……"
13370-171 = "[ns1]「你希望夢在手冊裡寫下的東西……」\n[ns2]「以及你想要相信的答案……」"
13370-174 = "[ns3]「也許那都不是真相。」\n[ns4]「但是所謂的真相……」"
13370-177 = "[ns]「就算不存在，它是真相的事實也不會有所改變。」"
13370-179 = "[ns]「我們唯一能做的，就是相信那就是真相並繼續前進。」"
13370-181 = "[ns5]「那就是……對我們這些平凡的人……」\n[ns6]「對我們這些既無法復活死者，也無法讓時間倒流的人們而言……」"
13370-184 = "[ns7]「唯一的奇蹟。」\n[ns8] 唯一的奇蹟。"
13370-192 = "……"
13370-193 = "這裡是……"
13370-194 = "……嗯？"
13370-199 = "……手冊？"
13370-200 = "啊，啊啊……？"
13370-204 = "啊啊啊啊……！？#n這個……怎麼會在這裡……！？"
13370-208 = "你過得好嗎，星野醬？"
13370-217 = "嘿嘿嘿，我一直很好奇兩年後的你會變成什麼樣子呢……"
13370-222 = "下一話;約定"

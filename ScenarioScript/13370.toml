13370-174 = "[ns3] \"ถึงจะไม่จริงทั้งหมด แต่ก็เป็นเรื่องจริง\"\n[ns4] \"ถึงจะเป็นแค่ความปรารถนา แต่ก็เป็นความจริง\""

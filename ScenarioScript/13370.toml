[translation]
13370-1 = "Episode 37;What Must be Said"
13370-6 = "Hoshino."
13370-11 = "What was Yume trying to tell me, before the end?"
13370-12 = "What did she write in that notebook?"
13370-13 = "I'll probably...never find out."
13370-14 = "This suffering will linger until I do."
13370-15 = "This pain..."
13370-16 = "This pain must be..."
13370-17 = "...the sin I'm fated to bear, right?"
13370-18 = "Hoshino. You're wrong."
13370-19 = "That's not the true source of your pain and regrets!"
13370-20 = "You regret...not telling Yume how much you treasured her. Not treating her with the kindness she deserved."
13370-21 = "And you've endured so much pain because you couldn't do that for her at the very end."
13370-24 = "If I had known that was going to be the last time..."
13370-25 = "I should've been honest with her...at every chance I got..."
13370-26 = "But you didn't know! There was no way for you to know that you'd never see her again."
13370-29 = "It was an accident, Hoshino."
13370-31 = "I can't ease these feelings with sad excuses like that."
13370-32 = "It's not your fault."
13370-34 = "I know that. I've always known that. But it's still my fault."
13370-35 = "It's all my fault."
13370-36 = "Hoshino. If it weren't for you..."
13370-37 = "I would've died alone in that desert. Shivering in the cold, afraid and alone."
13370-38 = "Yeah. I've cherished your scarf since that day, Hoshino."
13370-40 = "...I just helped you because you were in trouble. Yume...to me..."
13370-41 = "Yeah. Then I owe Yume my gratitude too."
13370-43 = "..."
13370-47 = "We're born, we suffer, and we die. I suppose that's the great secret to life..."
13370-48 = "If death truly has some greater meaning..."
13370-49 = "What was the meaning behind Yume's death? Why did she have to die the way that she did?"
13370-50 = "Hoshino... "
13370-52 = "Yume got stranded and died."
13370-53 = "She didn't have a compass or water...and her communicator wasn't working. The sky would've been too cloudy for her to use the stars to navigate."
13370-54 = "Yume's old phone was a barely functioning piece of scrap. Time after time, she would find herself tempted to replace it with a new one. But she always told herself no, in the end."
13370-55 = "Because she wanted every last yen to go to paying down our debt..."
13370-56 = "What if...back then...I had..."
13370-57 = "Hoshino!"
13370-59 = "..."
13370-60 = "I...don't have the answers. I've never had to ponder things like that..."
13370-61 = "But if you keep pursuing this fruitless search...in the end... "
13370-63 = "Ayane."
13370-64 = "...You were the one who fixed the school faucet."
13370-65 = "Huh...?"
13370-67 = "Thank you. I never really say it, but I've always been thankful for you."
13370-68 = "Hoshino...?"
13370-70 = "..."
13370-71 = "*sigh* Sorry, Hoshino. I don't know what the right thing to say is..."
13370-72 = "..."
13370-73 = "Just come back already! You dummy! We'll go get a hot bowl of ramen together!"
13370-74 = "I'll do the dumb idol thing with Ayane! Just come back!"
13370-76 = "Serika..."
13370-77 = "You're so cute, Serika..."
13370-78 = "...Huh?!"
13370-80 = "..."
13370-81 = "It's time to let go."
13370-82 = "Allow yourself to be free, Hoshino. You must let go of the student council president."
13370-84 = "Shiroko...?"
13370-85 = "Allow Serika and Ayane, who don't bear the pain of her memory..."
13370-86 = "...to fill this academy, this classroom haunted by her loss, with their laughter."
13370-87 = "Instead..."
13370-88 = "...remember the precious memories of your time together, and let go of her tragic death."
13370-89 = "Her death will persist in rumors and whispers, but only you...can remember Yume as she was, alive."
13370-90 = "So, let go...of that notebook."
13370-97 = "Thank you, Shiroko of another world..."
13370-98 = "I may not know you, but I understand you all too well."
13370-99 = "You want to protect Shiroko from becoming like me."
13370-100 = "Thank you, Shiroko. You really are her."
13370-101 = "But..."
13370-102 = "You still have them too, don't you?"
13370-103 = "...!"
13370-107 = "The weapons Serika, Nonomi, Ayane, and I left behind, after our deaths..."
13370-108 = "You couldn't bring yourself to throw them away."
13370-109 = "I..."
13370-111 = "So can I really let it go, Shiroko?"
13370-112 = "For us...is such a thing really possible? Can we really allow time to flow, to forget memories not to be forgotten?"
13370-113 = "..."
13370-114 = "... ..."
13370-115 = "I can't...answer that, Hoshino."
13370-116 = "I don't know if that's possible..."
13370-117 = "Can someone..."
13370-118 = "...escape? Escape from sin? From tragedy? From suffering?"
13370-119 = "Such a feat may be as impossible as resurrecting the dead..."
13370-120 = "..."
13370-125 = "IT IS DONE!!"
13370-126 = "The Fury of Set's manifestation is complete!!"
13370-127 = "Oooh! Set! The ferocious lightning strike!"
13370-128 = "Burn it all! Scorch the overworld to ashes!!"
13370-132 = "Sensei! The Fury of Set is...!!"
13370-133 = "Something's coming! B-Be careful! The energy is tremendous!"
13370-137 = "I..."
13370-138 = "I... ..."
13370-139 = "It's impossible..."
13370-143 = "The remnant of Yume..."
13370-144 = "Unless I can see it for myself...finally understand..."
13370-148 = "I..."
13370-156 = "Watch out, Sensei!! "
13370-157 = "I don't have any energy left to block the attack!! "
13370-158 = "All the students! They're going to—"
13370-159 = "Uwaaah!! "
13370-163 = "[ns] \"Hoshino. What do you think is written in Yume's notebook?\""
13370-164 = "I have to find out. I—"
13370-165 = "[s] \"You'll never be able to.\""
13370-166 = "..."
13370-167 = "[s] \"You know that. But you're looking for something to believe in.\""
13370-168 = "What would Yume...have written in there?"
13370-169 = "[s] \"You're the one who knows Yume, better than anyone.\""
13370-170 = "..."
13370-171 = "[ns1] \"Whatever it is you're hoping Yume wrote...\"\n[ns2] \"...whatever it is you're hoping to believe in...\""
13370-174 = "[ns3] \"It may not be real...\"\n[ns4] \"...but it's still the truth.\""
13370-177 = "[ns] \"It may not even exist, but that truth is your reality.\""
13370-179 = "[ns] \"Believe in your truth, and move forward. That's the only option.\""
13370-181 = "[ns5] \"For normal people like us...\"\n[ns6] \"...people who can't resurrect the dead, or turn back time...\""
13370-184 = "[ns7] \"That's our only miracle.\"\n[ns8] That's our only miracle."
13370-192 = "..."
13370-193 = "This place is... "
13370-194 = "...Huh?"
13370-199 = "...Notebook?"
13370-200 = "H-Huh...?"
13370-204 = "Huhhh?!? Wh-Why is this...h-here...?"
13370-208 = "How have you been, Hoshino?"
13370-217 = "Heeheehee. I wondered how much you would grow in two years... "
13370-222 = "Next Episode;Promise"

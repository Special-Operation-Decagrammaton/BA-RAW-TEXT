13370-181 = "[ns5] \"สำหรับคนธรรมดาอย่างเรา การคืนชีพคนตายหรือย้อนคืนเวลากลับมา...\"\n[ns6] \"สำหรับคนธรรมดาอย่างเรา การย้อนเวลาหรือหวนคืนชีวิต...\""

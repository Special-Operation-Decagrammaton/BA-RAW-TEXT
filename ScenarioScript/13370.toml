[translation]
13370-1 = "ตอนที่ 37;สิ่งที่จำเป็นต้องบอกให้รู้"
13370-6 = "รุ่นพี่โฮชิโนะ"
13370-11 = "รุ่นพี่ยูเมะอยากบอกอะไรกับฉันเป็นอย่างสุดท้ายกันนะ..."
13370-12 = "ในสมุดโน้ตเขียนไว้ว่าอะไรกันแน่"
13370-13 = "ฉันคงไม่มีวันที่จะรับรู้เรื่องนั้นไปตลอดชีวิตเลยสินะ"
13370-14 = "ฉันคงต้องทนทุกข์ทรมานเพื่อหาคำตอบไปตลอดชีวิต"
13370-15 = "ความเจ็บปวดนี้..."
13370-16 = "ความเจ็บปวดนี้มัน..."
13370-17 = "คงเป็น <บาป> ติดตัวที่ฉันต้องรับมือสินะ...?"
13370-18 = "ไม่ใช่อย่างนั้นหรอกค่ะ รุ่นพี่"
13370-19 = "รุ่นพี่โฮชิโนะไม่ได้เสียดายสิ่งนั้นไม่ใช่เหรอคะ!"
13370-20 = "รุ่นพี่โฮชิโนะน่ะ... อยากเข้าหารุ่นพี่ยูเมะอย่างอ่อนโยน... อยากถ่ายทอดความรู้สึกดีๆ ให้รุ่นพี่ยูเมะ..."
13370-21 = "แต่สุดท้ายก็ทำอย่างนั้นไม่ได้ ถึงได้เจ็บปวดอยู่อย่างนี้ไม่ใช่เหรอคะ!"
13370-24 = "ถ้ารู้ว่าจะเป็นครั้งสุดท้ายละก็..."
13370-25 = "ฉันควรพูดความจริงออกไปทุกเวลาแท้ๆ..."
13370-26 = "ค่ะ... ก็รุ่นพี่ไม่รู้นี่คะว่าจะไม่ได้เจอกันอีกเป็นครั้งที่ 2 แล้ว... ต้องบอกว่าไม่แม้แต่จะจินตนาการเลยด้วย#nซ้ำ"
13370-29 = "มันเป็นอุบัติเหตุนะ รุ่นพี่"
13370-31 = "จะให้ฉันสบายใจกับคำแก้ตัวแบบนั้นได้ยังไง"
13370-32 = "นั่นไม่ใช่ความผิดของรุ่นพี่นะ"
13370-34 = "ฉันก็คิดอย่างนั้น แต่มันก็เป็นความผิดของฉันอยู่ดี"
13370-35 = "ฉันทำผิดเอง"
13370-36 = "ถ้าไม่ได้รุ่นพี่โฮชิโนะ ฉันก็คง..."
13370-37 = "นอนสั่นด้วยความหนาวและความกลัว และตายอย่างโดดเดี่ยวในทะเลทรายไปแล้วก็ได้"
13370-38 = "อื้อ ฉันยังรักษาผ้าพันคอที่เคยให้ไว้อย่างดีนะ รุ่นพี่โฮชิโนะ"
13370-40 = "ตอนนั้นชิโรโกะจังกำลังลำบากน่ะ... รุ่นพี่ยูเมะ... บอกฉันเสมอว่า..."
13370-41 = "อื้อ ฉันก็อยากขอบคุณประธานยูเมะเหมือนกัน"
13370-43 = "..."
13370-47 = "เราล้วนเกิดมาเพื่อเผชิญความเจ็บปวดแล้วตายไปอย่างไร้ความหมาย นั่นคงเป็นสัจธรรมสินะ"
13370-48 = "หากความตายมีความหมายละก็... หากเป็นอย่างนั้นจริงๆ ละก็..."
13370-49 = "ทำไมรุ่นพี่ยูเมะถึงต้องตายอย่างนั้นด้วยล่ะ? แบบนั้นมันจะมีความหมายอะไร...?"
13370-50 = "รุ่นพี่โฮชิโนะ... "
13370-52 = "รุ่นพี่ยูเมะหลงทางและตายจากไป"
13370-53 = "รุ่นพี่ไม่มีทั้งเข็มทิศ ไม่มีสัญญาณติดต่อ ไม่มีน้ำดับกระหาย และสภาพอากาศก็ทำให้ดูทิศของดวงดาว#nไม่ได้อยู่หลายวัน"
13370-54 = "โทรศัพท์มือถือของรุ่นพี่ยูเมะเป็นรุ่นเก่าที่ตกรุ่นไปแล้ว รุ่นพี่ก็เลยอยากซื้อเครื่องใหม่อยู่หลายครั้ง แต่สิ่งที่ฉันเห็นคือรุ่นพี่เอาแต่ฝืนใช้เครื่องเก่าๆ อยู่อย่างนั้น"
13370-55 = "เพราะต้องเก็บเงินไว้ใช้หนี้ของโรงเรียน"
13370-56 = "ถ้าหากว่า... ตอนนั้นฉัน..."
13370-57 = "รุ่นพี่โฮชิโนะ!"
13370-59 = "..."
13370-60 = "ฉันเอง... ก็ไม่รู้เหมือนกันค่ะ ฉันไม่เคยคิดเรื่องแบบนั้นเลย..."
13370-61 = "แต่ถ้าเราหาเหตุผลต่อไปเรื่อยๆ ละก็... สุดท้ายแล้ว... "
13370-63 = "อายาเนะจัง"
13370-64 = "อายาเนะจังใช่มั้ยที่เป็นคนซ่อมก๊อกน้ำของโรงเรียนให้...?"
13370-65 = "รุ่นพี่...?"
13370-67 = "ขอบใจนะ ฉันไม่เคยพูดออกไป แต่ก็คิดอย่างนั้นอยู่ตลอดนะ"
13370-68 = "รุ่นพี่โฮชิโนะ...?"
13370-70 = "..."
13370-71 = "เฮ้อ... ขอโทษนะ รุ่นพี่ ฉันไม่รู้เลยว่าต้องพูดอะไร"
13370-72 = "..."
13370-73 = "รีบกลับมาได้แล้ว!! รุ่นพี่ไม่มีหัวคิดคนนี้นี่!! เราต้องไปกินราเม็งด้วยกันสิ!"
13370-74 = "ถ้ากลับมา ฉันจะยอมเป็นไอดอลกับอายาเนะจังให้เลย!!"
13370-76 = "เซริกะจัง..."
13370-77 = "เซริกะจังนี่น่ารักชะมัดเลย~"
13370-78 = "ว่าไงนะ...?!"
13370-80 = "............"
13370-81 = "ปล่อยไปเถอะ"
13370-82 = "ปล่อยให้จากไปได้แล้วละรุ่นพี่ ประธานนักเรียนน่ะ"
13370-84 = "ชิโรโกะจัง...?"
13370-85 = "ให้นักเรียนที่ไม่รู้จักเธอคนนั้นอย่างเซริกะและอายาเนะได้เติมเต็มโรงเรียนนี้"
13370-86 = "ให้ห้องเรียนนี้ที่เต็มไปด้วยความทรงจำที่มีร่วมกันกับเธอคนนั้น ถูกเติมเต็มไปด้วยรอยยิ้มของเด็กๆ ที่ไม่รู้จักเธอคนนั้นเถอะ รุ่นพี่"
13370-87 = "อีกอย่าง"
13370-88 = "ไม่ต้องไปจดจำความตายอันน่าเศร้าสลดของเธอคนนั้นหรอก จดจำแต่ทุกช่วงเวลาที่ได้มีร่วมกันกับ#nเธอคนนั้นก็พอ"
13370-89 = "แม้การตายของเธอจะถูกเล่าขานไปเหมือนข่าวลือ แต่ก็มีเพียงรุ่นพี่ไม่ใช่เหรอ... ที่รู้ดีว่าเธอคนนั้นเป็นคนยังไง"
13370-90 = "ปล่อยเรื่องสมุดโน้ตนั่น... ไปเถอะ"
13370-97 = "ขอบใจนะ ชิโรโกะจังอีกคน"
13370-98 = "ฉันคิดว่าตัวเองไม่ค่อยรู้อะไรเกี่ยวกับเธอเท่าไร แต่ที่จริงฉันรู้จักเธอดีเลยละ"
13370-99 = "ชิโรโกะจังไม่อยากให้ฉันผิดพลาดซ้ำสองนี่นา"
13370-100 = "ขอบใจนะ ชิโรโกะจัง เธอก็คือชิโรโกะจังจริงๆ"
13370-101 = "แต่ว่า..."
13370-102 = "เธอก็ยังเก็บสิ่งนั้นไว้อยู่เลยนี่"
13370-103 = "...!!"
13370-107 = "อาวุธที่เซริกะ โนโนมิ อายาเนะ และก็ฉันที่ทิ้งไว้หลังจากตายไปแล้วน่ะ"
13370-108 = "เธอยังเก็บมันไว้ทั้งหมดเลยไม่ใช่เหรอ"
13370-109 = "ฉัน..."
13370-111 = "คิดว่าจะปล่อยของพวกนั้นไปได้มั้ยล่ะ...? ชิโรโกะจัง...?"
13370-112 = "พวกเรา... ทำอย่างนั้นได้เหรอ...? ในขณะที่เวลาล่วงเลยไป... คิดว่าพวกเราจะทิ้งความทรงจำเหล่านั้น#nได้เหรอ...?"
13370-113 = "..."
13370-114 = "............................"
13370-115 = "ฉัน... ไม่รู้เหมือนกัน... รุ่นพี่..."
13370-116 = "ฉันก็ไม่รู้ว่า... จะทำแบบนั้นได้หรือเปล่า..."
13370-117 = "เราจะ..."
13370-118 = "หลุดพ้นจาก <บาป>... จาก <ความเศร้า>... และจาก <ความเจ็บปวด> ได้หรือเปล่านะ...?"
13370-119 = "เรื่องนั้นน่ะ... ดูจะยากพอๆ กับการฟื้นคืนชีพคนที่ตายไปแล้วเลย..."
13370-120 = "..."
13370-125 = "เสร็จแล้ว!!!!"
13370-126 = "ในที่สุดการเผยตัวของ <ความโกรธแค้นของเซ็ต> ก็เสร็จสมบูรณ์!!"
13370-127 = "โอ้ววว! ดูไว้เถิด เซ็ตเอ๋ย... ความโกรธแค้นที่พลุ่งพล่านเอ๋ย...!!"
13370-128 = "จงแผดเผาทุกอย่างบนพิภพ!!"
13370-132 = "คุณครู!! <ความโกรธแค้นของเซ็ต> มัน...!!"
13370-133 = "ระ... ระวังนะคะ! มีบางอย่างกำลังเข้ามาค่ะ!! พลังงาน... พลังงานมหาศาล..."
13370-137 = "ฉัน..."
13370-138 = "ฉันน่ะ..."
13370-139 = "ไม่ไหวหรอก"
13370-143 = "สิ่งที่ได้จากการตายของรุ่นพี่"
13370-144 = "ถ้าฉันไม่ได้คำตอบว่ามันคืออะไร และมีความหมายอย่างไรละก็..."
13370-148 = "ฉัน..."
13370-156 = "หลบค่ะ คุณครู!! "
13370-157 = "ตะ... ตัวหนูในตอนนี้ขัดขวางการโจมตีนั้นไม่ไหวแล้วค่ะ!! "
13370-158 = "นักเรียนทุกคนที่อยู่ตรงนั้น...!!"
13370-159 = "อะ... อ๊ายยยยย?! "

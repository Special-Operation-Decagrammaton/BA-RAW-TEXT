[translation]
10011070-1 = "ตอนที่ 7;ด่านที่ 4 : เคหาสน์วงกต"
10011070-6 = "ดีจ้า~! ยินดีต้อนรับนะทุกคน! ด่านนี้ก็คือเคหาสน์วงกต!"
10011070-7 = "ที่ที่เต็มไปด้วยกับดักและอุปกรณ์มากมาย...! สถานที่ท่องเที่ยวที่โด่งดังที่สุดในสวนสนุกภาพยนตร์!"
10011070-8 = "นั่นมัน... คฤหาสน์นินจาไม่ใช่เหรอ?"
10011070-9 = "ไม่ต้องไปคิดถึงเรื่องหยุมหยิมอะไรหรอกน่า!"
10011070-10 = "ยังไงก็เถอะ! ฉันคือผู้รับผิดชอบที่นี่ <ด่านที่สี่: พิชิต! เคหาสน์วงกต!> อิซามิ คาเอเดะ! อายุ 15 ปี! งานอดิเรกคือการจับด้วงกว่างโกลเด้นเฮอร์คิวลิส!"
10011070-11 = "[s] \"คิดเอาไว้แล้วเชียว ผู้เฝ้าประตูคนถัดไปก็คือคาเอเดะสินะ\""
10011070-12 = "ฮุ! ฮุ! ฮุ! ใช่แล้ว! คนร้ายที่ลักพาตัวองค์หญิงไปได้หนีเข้าไปในคฤหาสน์แห่งนี้...! น่าจะเป็นงั้นละนะ! "
10011070-13 = "เพราะงั้นแล้ว~ วิธีการผ่านด่านนี้ไปก็ง่ายมาก!"
10011070-15 = "หาทางออกจากคฤหาสน์แห่งนี้..."
10011070-18 = "เอาชนะอุปสรรคที่อยู่ด้านในนั้น"
10011070-21 = "แล้วก็ไปให้ถึงเส้นชัย! ก็ประมาณนั้นแหละ!"
10011070-23 = "ถึงจะฟังดูง่าย แต่ถ้าไม่ฟังรายละเอียดให้ดีๆ แล้วละก็~!"
10011070-24 = "เอาละ! เข้าใจแล้ว! จะเคหาสน์วงกตหรือคฤหาสน์นินจาก็ไม่กลัวทั้งนั้น!"
10011070-25 = "อ๊ะ ท่านหัวหน้า...! เดี๋ยวก่อนสิคะ...!"
10011070-26 = "หัวหน้า! วิธีที่จะพิชิตเคหาสน์วงกตได้ สิ่งสำคัญคือเราจะต้องปรึกษาหารือกันนะคะ อิซุนะน่ะ...!"
10011070-27 = "ไม่ต้องห่วงๆ พอเข้าไปแล้วเดี๋ยวก็หาทางได้เองนั่นแหละ!"
10011070-28 = "ยังไงซะการเบี่ยงเบนความสนใจพวกนี้น่ะ แค่บุกทะลวงเข้าไปก็...!"
10011070-32 = "อ๊ะ! ยังอธิบายไม่จบเลยนะ!"
10011070-38 = "หืม...?"
10011070-39 = "[s] \"มิจิรุ อันตราย...?!\""
10011070-46 = "อะฮะฮ่ะ~ เหล่าเด็กสาวที่ต้องเผชิญหน้ากับอุปสรรคที่ดาหน้าเข้ามาอย่างต่อเนื่อง"
10011070-47 = "รวมไปถึงคุณครูที่คอยอยู่ข้างๆ"
10011070-48 = "ฮุฮุ... ถึงจะคาดไว้แล้วก็จริง แต่นี่มันช่าง..."
10011070-49 = "เป็นภาพที่งดงามกว่าที่คิดเอาไว้อีกเลยนะ น่าสนุกจริงๆ อื้อ สนุกจังเลย"
10011070-50 = "คุณนิยะ...! นี่มันเกิดเรื่องอะไรกันคะ?!"
10011070-51 = "หืม? ทำไมล่ะ~! คาโฮะ..."
10011070-52 = "เมื่อสักครู่มีการติดต่อเข้ามาจากแรงงานรับจ้างที่ตอนแรกรับหน้าที่เป็นคนร้ายที่ลักพาตัวองค์หญิง ถามว่าเมื่อไรจะถึงตาที่จะได้ออกมาแสดง..."
10011070-53 = "นั่นก็หมายความว่าพวกคนที่พาตัวคุณอิบูกิไปตอนนี้ก็คือ...?"
10011070-54 = "อ่า อย่างงั้นเหรอ? ฮืม~ แปลกจังเลยนะ อื้มๆ เรื่องแบบนั้น..."
10011070-55 = "เกิดขึ้นได้ยังไงกันน้า~?"
10011070-56 = "...?! อีกแล้วเหรอคะ คราวนี้ใครไปกระตุ้นความสนใจของคุณนิยะอีก..."
10011070-60 = "ไม่เป็นไรค่ะ.. เข้าใจแล้ว จากนี้ฉันจะเป็นคนจัดการเองค่ะ ถ้าอย่างนั้นขอตัวก่อนนะคะ"
10011070-65 = "อะฮะฮ่ะ~ คาโฮะละก็~ แค่สนุกไปตามที่เป็นอยู่ก็ได้ไม่ใช่เหรอ ไม่ยืดหยุ่นเอาซะเลยน้า♪"
10011070-69 = "แล้วทีนี้คุณครูจะทำยังไงต่อไปน้า~?"
10011070-70 = "ครั้งนี้แตกต่างจากอุปสรรคที่ผ่านมาได้ง่ายๆ ก่อนหน้านี้ เพราะว่าเป็นภารกิจที่ละเอียดอ่อนมากขึ้นกว่า#nเดิมอีกใช่มั้ยล่ะ~?"
10011070-71 = "เมื่อเผชิญหน้ากับความกังวลแบบนั้น คุณครูจะให้คำตอบแบบไหนกันนะ?"
10011070-72 = "คุณครูจะทำยังไงกันนะ?"
10011070-81 = "ถ้าอย่างงั้นแล้วการแสดงครั้งนี้ก็ขอฝากด้วยนะ ชมรมวิจัยศาสตร์นินจาทุกคน~♪"
10011070-87 = "พวกเรา <ปีศาจจอมเอาแต่ใจ> จะไม่มีวันลืมเป้าหมายอันยิ่งใหญ่ของเรา และจะลงมือทำทันที จัดการพวกที่ขวางทางให้หมด"
10011070-93 = "ด่านที่ต้องเจอกับรองหัวหน้าชมรมฝึกฝนน่ะเหรอ? ชมรมวิจัยศาสตร์นินจาเป็นใครกันแน่?"
10011070-94 = "ชมรมวิจัยศาสตร์นินจาเหรอ ชื่อแปลกพิลึกแฮะ..."
10011070-102 = "(ไม่ยอมแพ้หรอก... ครั้งนี้เป็นโอกาสที่ได้มาอย่างยากลำบาก)"
10011070-103 = "(จะต้องผ่านทุกอย่างไปให้ได้... และได้เป็นชมรมทางการด้วยความภาคภูมิ...)"
10011070-104 = "(นี่เป็นโอกาสที่จะยืนต่อหน้าอิซุนะและสึคุโยะได้อย่างมั่นใจ...!)"
10011070-105 = "(เพราะฉะนั้น ข้าน้อยต้องทำให้ได้...!)"
10011070-114 = "เอ๊ะ ที่นี่คือ...?"
10011070-115 = "[s] \"อ่า มิจิรุเป็นอะไรมั้ย? สงสัยจะตกลงมาตรงนี้เพราะกับดักน่ะ\""
10011070-116 = "กับดัก? ในคฤหาสน์? ที่เป็นสถานที่ท่องเที่ยวน่ะเหรอ?"
10011070-117 = "จริงด้วย ที่นี่คือคฤหาสน์นินจาสินะ!"
10011070-118 = "เฮือก?! ไม่ใช่เวลามายืนเฉยนะ! ท่านอาจารย์! เราต้องรีบออกไปจากที่นี่..."
10011070-119 = "[s1] \"ขอโทษที... พอดีว่าตอนนี้ขยับตัวลำบากน่ะ...\"\n[s2] \"ดูเหมือนว่าตอนที่ตกลงมาข้อเท้าจะแพลงนิดหน่อยน่ะ\""
10011070-122 = "ตอนที่ตกลงมา? ข้อเท้า...?"
10011070-123 = "อ่า... หรือว่าเป็นเพราะช่วยรับข้าน้อยเอาไว้... ท่านอาจารย์ต้องมาเจ็บตัว... เพราะข้าน้อยงั้นเหรอ?"
10011070-124 = "เพราะว่าข้าน้อยมัวแต่เร่งรีบ...?"
10011070-125 = "[s] \"ไม่หรอก ไม่ใช่เพราะมิจิรุหรอกนะ...\""
10011070-130 = "...หมดแล้ว"
10011070-131 = "[s] \"อะไรเหรอ? มิจิรุ?\""
10011070-132 = "ทุกอย่างพังหมดแล้ว..."
10011070-133 = "แงงงงง?! ข้าน้อยทำทุกอย่างพังหมดแล้ว~! ทำยังไงดีล่ะ ท่านอาจารย์?!"
10011070-142 = "[ns] \"เป็นไงบ้าง? ใจเย็นขึ้นบ้างไหม?\""
10011070-143 = "... ฮึก... ฮือ... อื้อ"
10011070-144 = "[s3] \"มิจิรุ ที่บอกว่าพังหมดแล้วมันหมายความว่ายังไงเหรอ?\"\n[s4] \"ช่วยอธิบายให้ครูฟังหน่อยได้ไหม?\""
10011070-147 = "เป็นเพราะความโลภของข้าน้อยตั้งแต่แรก..."
10011070-148 = "ข้าน้อยน่ะ... ตอนที่อิบูกิถูกลักพาตัวไปก็ไม่ยอมรายงาน"
10011070-149 = "ทั้งที่ควรจะรายงานไปที่ชมรมหยินหยางและเฮียกกะเรียวรันตั้งแต่แรกเพื่อแก้ไขปัญหาซะ"
10011070-150 = "แต่ก็เป็นเพราะความโลภของข้าน้อย..."
10011070-151 = "[s] \"ก็ไม่อยากเสียโอกาสที่จะได้เป็นชมรมทางการใช่ไหมล่ะ?\""
10011070-152 = "…!! วะ... ว่าแล้วเชียว! รู้อยู่แล้วสินะ?"
10011070-153 = "ใช่แล้ว... เรื่องนั้นก็ใช่อยู่..."
10011070-154 = "ข้าน้อยอยากให้นินจาเป็นที่รู้จักมากกว่านี้ก็จริง แต่ถ้าทำแบบนั้นก็อาจจะโดนคนอื่นหัวเราะเยาะเอาก็ได้"
10011070-155 = "คิดแบบนั้นทีไรก็กลัวทุกที... พอได้รับโอกาสครั้งนี้ ไม่ว่ายังไงก็อยากจะเป็นชมรมทางการให้ได้ไงล่ะ "
10011070-156 = "มันเป็นโอกาสที่อาจจะหาไม่ได้อีกแล้ว ก็เลยตั้งใจว่ายังไงก็จะต้องทำให้สำเร็จให้ได้..."
10011070-161 = "เพราะข้าน้อยจะต้องรับผิดชอบที่ไปดึงอิซุนะที่อยากเป็นนินจาและมองนินจาด้วยสายตาเป็นประกาย..."
10011070-162 = "และสึคุโยะที่ไม่รู้เรื่องอะไรด้วยเลยมาเกี่ยวข้องด้วย"
10011070-164 = "เธอคือสึคุโยะสินะ?"
10011070-165 = "!!"
10011070-166 = "ถ้าไม่ติดอะไรละก็ มาเข้าชมรมวิจัยศาสตร์นินจากับข้าน้อยเอาไหมล่ะ?"
10011070-168 = "ข้าน้อยก็แค่อยากจะเป็นรุ่นพี่ที่ไม่ทำให้ทั้งสองคนต้องอับอายเท่านั้นเอง..."
10011070-169 = "แต่ถ้าการแสดงจะล้มเหลวแบบนี้ ปล่อยให้โอกาสหลุดมือไปแต่แรกคงดีกว่า"
10011070-173 = "เป็นเพราะข้าน้อยลังเลที่จะรายงานเรื่องนี้ เด็กที่ถูกพวกปีศาจลักพาตัวไปก็เลย..."
10011070-175 = "ต้องมามีประสบการณ์ที่เจ็บปวดเพราะข้าน้อย ตอนนี้ก็ไม่รู้เหมือนกันว่ากำลังร้องไห้อยู่หรือเปล่า"
10011070-177 = "ทั้งหมดเป็นเพราะข้าน้อยเอง... ข้าน้อยมีแต่จะทำให้เหตุการณ์เลวร้ายขึ้นไปอีก"
10011070-178 = "ถ้าคนอื่นรู้เรื่องนี้ คนพวกนั้นก็อาจจะตำหนิอิซุนะและสึคุโยะไปด้วยเพียงเพราะว่าเป็นส่วนหนึ่งของชมรม#nวิจัยศาสตร์นินจาก็ได้"
10011070-179 = "เด็กพวกนี้ต้องมาเดือดร้อนเพราะความโลภของข้าน้อยล้วนๆ เลย"
10011070-180 = "บางทีทั้งอิซุนะและสึคุโยะ..."
10011070-181 = "ถ้ารู้ว่าทุกอย่างกลายเป็นแบบนี้เพราะข้าน้อยละก็... แน่นอนว่าก็คง... จะผิดหวังแน่ๆ"
10011070-182 = "ข้าน้อยน่ะ... จริงๆ ... จริงๆ แล้วน่ะ..."
10011070-183 = "[s] \"เอาละ ข้อเท้าครูดีขึ้นแล้ว ค่อยๆ ไปต่อกันดีไหม?\""
10011070-184 = "เดี๋ยวสิ...?! ตอนนี้ข้าน้อยกำลังจริงจังสุดๆ เลยนะ?!"
10011070-185 = "ถ้าเป็นในอนิเมะ ตอนนี้คือฉากที่ตัวเอกกำลังเปิดเผยความกังวลในใจที่เก็บซ่อนเอาไว้ออกมาเลยนะ?!"
10011070-186 = "แต่ทำไมปฏิกิริยาตอบกลับถึงเป็นแบบนั้นล่ะ ท่านอาจารย์?!"
10011070-187 = "ข้าน้อยจะร้องไห้แล้วนะ?! ไม่สิ! ถ้าจะให้ถูกคือข้าน้อยร้องไห้ไปแล้วต่างหาก...! ถึงงั้นก็เถอะ!"
10011070-188 = "[s] \"ที่ไม่ยื่น <ใบสมัครเป็นชมรมทางการ> เพราะว่ากลัวสินะ?\""
10011070-189 = "หืม....?"
10011070-190 = "ก็มันไม่มีทางยื่นใบสมัครอย่างเป็นทางการได้อยู่แล้วน่ะสิ!"
10011070-192 = "ก็นั่นแหละ ถ้าคิดง่ายๆ เลยนะ ชมรมวิจัยศาสตร์นินจาคืออะไรกันล่ะ? นินจาแบบดั้งเดิมเหรอ...?"
10011070-193 = "ก็แค่แต่งคอสเพลย์เป็นนินจาเหมือนในอนิเมะหรือในหนังสือการ์ตูนเท่านั้นเอง!"
10011070-194 = "ชมรมแบบนี้... คะ... ใครจะไปยอมรับกันล่ะ?"
10011070-195 = "นินจาเหรอ งานอดิเรกแปลกๆ แบบนี้คงไม่มีใครยอมรับหรอก...!"
10011070-197 = "คิดว่าจะแค่โดนตำหนิเหรอ? จะถูกทำเหมือนเป็นพวกโง่เง่าต่างหาก!"
10011070-198 = "ไม่ใช่แค่ข้าน้อยนะ แต่ทุกคนในชมรมเลย..."
10011070-199 = "เพราะงั้น...!"
10011070-203 = "[ns5] \"พอเป็นแบบนั้น ครูก็ไม่รู้จะตอบมิจิรุยังไงเลย\"\n[ns6] \"คำถามนั้นน่ะ มิจิรุควรจะไปถามอีกสองคนก่อนนะ\""
10011070-207 = "ท่านอาจารย์พูดอะไรกัน ข้าน้อยน่ะ..."
10011070-208 = "[s] \"ไปกันเถอะ เอานี่ เช็ดน้ำหูน้ำตาซะ\""
10011070-209 = "เข้าใจแล้ว..."
10011070-210 = "ก่อนอื่นก็ต้องออกไปจากที่นี่ให้ได้ก่อนละนะ..."
10011070-214 = "ขอบคุณนะ ท่านอาจารย์"
10011070-215 = "[s] \"ด้วยความยินดี แต่ว่านะเครื่องสำอางเลอะหมดแล้ว...\""
10011070-216 = "อะ... อะไรนะ?!"
10011070-217 = "ย้ากกก! ต้องพูดอะไรแบบนั้นต่อหน้าสุภาพสตรีด้วยรึไงเล่า?!"
10011070-218 = "เฮ้อ... จริงๆ เลย สับสนไปหมดแล้ว..."
10011070-219 = "รู้แล้ว เข้าใจแล้วน่า ไม่ว่าจะพร่ำเพ้อถึงตอนจบยังไงสุดท้ายการออกไปจากที่นี่ก็สำคัญที่สุด..."
10011070-220 = "แต่ว่านะ เราจะออกไปจากที่นี่ได้ยังไง..."
10011070-224 = "เอ๊ะ...?"
10011070-225 = "[s] \"มีอะไรเหรอ?\""
10011070-226 = "เดี๋ยวก่อนนะ... ทิวทัศน์ตรงนี้รู้สึกคุ้นๆ ยังไงไม่รู้"
10011070-227 = "ลักษณะของโถงทางเดิน ตำแหน่งห้อง..."
10011070-228 = "ผังห้องของคฤหาสน์แห่งนี้ โครงสร้างนี้... หรือว่าจะมาจาก <คามาโบโกะ ภาควายุสลาตัน>?"
10011070-229 = "ถ้าเป็นอย่างนั้นละก็ ข้าน้อยพอจะรู้อยู่นะ..."
10011070-230 = "ท่านอาจารย์ ทางนี้!"
10011070-231 = "[ns] \"อืม\""
10011070-252 = "ว่าแล้วเป็นอย่างที่คิดเลย! ลอกแบบมาจากคฤหาสน์นินจาใน <คามาโบโกะ ภาควายุสลาตัน> ทั้งหมดเลยนี่?!"
10011070-253 = "แบบนี้ถูกลิขสิทธิ์รึเปล่าเนี่ย?! ก็อยากจะถามแบบนั้นอยู่เหมือนกัน!"
10011070-254 = "[s] \"กรณีแบบนี้ก็เจอได้บ่อยตามสถานที่ท่องเที่ยวต่างๆ ละนะ\""
10011070-255 = "ดะ... เดี๋ยวค่อยไปถามกับผู้รับผิดชอบทีหลังก็ได้! ทีนี้ก็..."
10011070-256 = "อ๊ะ! มีคนผ่านออกแล้วแล้ว! คุณครูกับมิจิรุล่ะ!"
10011070-257 = "[s] \"คาเอเดะ...? เกิดอะไรขึ้นน่ะ?\""
10011070-258 = "ก็เล่นเข้าไปก่อนที่ฉันจะอธิบายกติกาจบนี่นา ฉันเองก็เลยไม่รู้จะทำยังไง"
10011070-259 = "ฮึ่ม! ไหนๆ ก็ออกมาได้แล้ว! งั้นจะอธิบายกติกาให้ฟังละนะ!"
10011070-260 = "พอเข้าไปในคฤหาสน์นี้ก็จะเจอกับวงกต ใครที่มาถึงทางออกเป็นคนแรกก็จะได้รับบัตรท้าชิง!"
10011070-262 = "บัตรท้าชิง...?"
10011070-263 = "ถูกต้อง! บัตรท้าชิง! สำหรับคนที่มาถึงคนแรก~!"
10011070-269 = "คาเอเดะผู้นี้! จะเป็นคู่ต่อสู้ให้เอง! ปรบมือ!"
10011070-270 = "ถ้าเอาชนะได้ก็ถือว่าผ่าน! ลุยกันเลย!"
10011070-271 = "เดี๋ยวสิๆ มันควรจะเป็นแบบนี้งั้นเหรอ?!"

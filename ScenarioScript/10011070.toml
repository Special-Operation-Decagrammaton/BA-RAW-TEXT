[translation]
10011070-1 = "第7話;第四道關卡：[ruby=Trick House]機關屋[/ruby]"
10011070-6 = "哈囉哈囉～！歡迎來到第四道關卡！！"
10011070-7 = "這裡是藏著無數陷阱跟裝置的「[ruby=Trick House]機關屋[/ruby]」！#n在漩渦電影村也是相當有名的設施之一哦！"
10011070-8 = "也就是……忍者屋敷？"
10011070-9 = "這我不太清楚！！"
10011070-10 = "總而言之，我正是這「第四道關卡：[ruby=Trick House]機關屋[/ruby]」的守門人勇美楓！#n今年15歲！興趣是抓獨角仙！"
10011070-11 = "[s]「楓果然也在啊。」"
10011070-12 = "哼哼哼……沒錯！#n順帶一提，綁走公主的壞人已經逃到這間屋子裡面了……吧！大概！　"
10011070-13 = "然後，這道關卡的規則很簡單！"
10011070-15 = "只要進入這間[ruby=Trick House]機關屋[/ruby]……"
10011070-18 = "抵達終點"
10011070-21 = "就算通關！"
10011070-23 = "不過裡面可是有許多試煉，用普通的方法可是行不通的唷！"
10011070-24 = "簡單明瞭，很好！管它是[ruby=Trick House]機關屋[/ruby]還是忍者屋敷都好，放馬過來吧！"
10011070-25 = "啊，部長……！？"
10011070-26 = "部長！是不是該先討論一下攻略方法……！"
10011070-27 = "沒關係沒關係，路是人走出來的！"
10011070-28 = "客群畢竟是觀光客，應該不會太困難才對……！"
10011070-32 = "啊！我才說明到一半而已！"
10011070-38 = "……咦？"
10011070-39 = "[s]「三千留，危險……！？」"
10011070-46 = "喵哈哈～接連襲來的試煉，挺身面對的少女們……"
10011070-47 = "並且，在他們身邊……"
10011070-48 = "呵呵……雖然早有預期，不過……"
10011070-49 = "嗯嗯，真有趣呢。"
10011070-50 = "仁耶大人，這究竟是怎麼回事……！？"
10011070-51 = "嗯？怎麼了～佳穗？"
10011070-52 = "剛才負責扮演綁匪的人聯絡了我，問說「我們什麼時候要上場」……"
10011070-53 = "如果此事屬實，那麼現在綁架伊吹同學的人究竟是……？"
10011070-54 = "哎呀～這就奇怪了呢？"
10011070-55 = "是怎麼回事呢～？"
10011070-56 = "又是這種情況嗎……這次又是為了什麼目的……"
10011070-60 = "我明白了……之後我會自己採取行動。"
10011070-65 = "真是的～佳穗還是一樣不知變通♪"
10011070-69 = "接下來事情將會怎麼發展呢～？"
10011070-70 = "目前為止雖然一路過關斬將，但問題也差不多該浮現了……"
10011070-71 = "面對那樣的學生，您將會引導出什麼樣的答案呢……"
10011070-72 = "我拭目以待唷，老師♪"
10011070-81 = "那麼忍術研究部的各位，這次的公演就拜託你們囉～♪"
10011070-87 = "那麼開始行動吧。#n迅速前進，處理礙事之徒……上吧，「妖怪劇團．即興流派」！"
10011070-93 = "睡美人不就是那個修行部的部長嗎？#n雖然很佩服，不過我好像沒聽過什麼「忍術研究部」……"
10011070-94 = "……話說名字還真奇怪。"
10011070-102 = "（千載難逢的機會……）"
10011070-103 = "（一口氣提升形象，光明正大地成為正式社團……）"
10011070-104 = "（能在伊樹菜和月夜面前抬頭挺胸的，重要機會……！）"
10011070-105 = "（所以我絕對要……！）"
10011070-114 = "……咦，這裡是……？"
10011070-115 = "[s]「啊，你醒了嗎？看來是陷阱啟動了，所以我們才會掉進這裡。」"
10011070-116 = "……陷阱？"
10011070-117 = "也就是說，這裡果然是忍者屋敷嘛！"
10011070-118 = "啊！現在不是說這個的時候……老師大人，得快點逃離這裡才行──"
10011070-119 = "[s1]「抱歉，可以等我一會嗎？」\n[s2]「我的腳好像扭到了……」"
10011070-122 = "腳？難道……是在掉下來的時候……？"
10011070-123 = "莫非我之所以沒事……是因為老師大人……"
10011070-124 = "都怪我……一個人，擅自跑了出去……"
10011070-125 = "[s]「這不是三千留的錯，沒事的。」"
10011070-130 = "……是我的錯……"
10011070-131 = "[s]「嗯？三千留？」"
10011070-132 = "……都是我的錯。"
10011070-133 = "都怪我，一切都搞砸了……怎，怎麼辦……！#n對不起，對不起，老師大人……！！"
10011070-142 = "[ns]「稍微冷靜一點了嗎？」"
10011070-143 = "嗚嗚……嗯。"
10011070-144 = "[s3]「你剛才說『搞砸了』……？」\n[s4]「這是什麼意思，可以說給我聽嗎？」"
10011070-147 = "這一切……全都是我的任性造成的。"
10011070-148 = "那孩子……伊吹被綁架的時候，本來應該立刻通報的才對。"
10011070-149 = "如果有立刻聯絡陰陽部或百花繚亂的話，問題或許已經解決了……"
10011070-150 = "而我，卻因為自己的任性……"
10011070-151 = "[s]「為了成為正式的社團？」"
10011070-152 = "……！！老，老師果然……知道嗎？"
10011070-153 = "……嗯，這也不奇怪……"
10011070-154 = "我是真心想推廣忍者的。#n可是告訴其他學生的話，他們是否會接受而不會嘲笑我，讓我非常害怕……"
10011070-155 = "所以我才想趁這次機會，總之先成為正式的社團。"
10011070-156 = "這種機會，可能再也不會出現了。#n所以我無論如何也想要成功。"
10011070-161 = "抱持著如此純粹憧憬的伊樹菜……"
10011070-162 = "以及對這件事一無所知的月夜……我必須負起將那兩個人牽扯進來的責任。"
10011070-164 = "你就是月夜？"
10011070-165 = "！！"
10011070-166 = "如果可以的話……要不要加入忍術研究部？"
10011070-168 = "我只是想成為，能讓他們引以為傲的前輩而已……"
10011070-169 = "要是公演告吹，就這樣失去機會或許還比較好。"
10011070-173 = "然而因為我猶豫要不要通報……害得被妖怪劇團綁架的那孩子……"
10011070-175 = "現在或許也在哭泣。也可能，遭到了殘忍的對待。"
10011070-177 = "這全部，都是我的錯……"
10011070-178 = "要是這件事傳了出去，不知道無辜的伊樹菜和月夜會因為跟「忍術研究部」有關，#n受到多少人的指指點點。"
10011070-179 = "因為我的任性，造成了許多人的麻煩。"
10011070-180 = "如果伊樹菜和月夜……"
10011070-181 = "全都知道了的話，我想他們一定會很失望的。#n都是因為我沒有勇氣，事情才會變成這樣……"
10011070-182 = "我，已經……"
10011070-183 = "[s]「我的腳好像已經恢復了！！」"
10011070-184 = "老，老師大人……！？#n我現在正在說很認真的事耶！？"
10011070-185 = "是動畫裡經常會看到的，#n女主角吐露重要煩惱的第9或第10話左右會出現的場景耶！！？"
10011070-186 = "竟然像這樣輕鬆帶過……！"
10011070-187 = "我都快哭出來了哦！#n不對，準確來說，已經哭到一半了……也不對！"
10011070-188 = "[s]「沒有交出『申請書』，是因為害怕？」"
10011070-189 = "……哦？"
10011070-190 = "沒，沒錯！怎麼可能交得出正式申請書嘛……！"
10011070-192 = "對普通人來說「忍者是什麼？」、「忍術研究部是什麼？」才是正常的反應不是嗎！"
10011070-193 = "會被當成是在說動畫或漫畫的事也是理所當然的……！"
10011070-194 = "那種社團的推薦書什麼的，根本無法拜託其他人……！"
10011070-195 = "我不覺得，會被任何人認同……"
10011070-197 = "要是輕易告訴別人，還可能被人在背後指指點點，或是被當成笨蛋……"
10011070-198 = "只有我一個人也就罷了……"
10011070-199 = "但其他兩人……！"
10011070-203 = "[ns5]「接下來的事就不是我能擅自同意的了。」\n[ns6]「知道那個答案的，就只有那兩個人了吧。」"
10011070-207 = "老，老師大人……？"
10011070-208 = "[s]「好了，我們差不多該走了。事後再後悔就來不及囉。」"
10011070-209 = "……嗯。"
10011070-210 = "無論如何，都得先從這裡逃出去才行……"
10011070-214 = "……謝謝你，老師大人。"
10011070-215 = "[s]「不客氣……啊，你的妝有點花掉了唷。」"
10011070-216 = "嗚啊！？"
10011070-217 = "你，你一定要對一個淑女說那種話嗎！？"
10011070-218 = "真是的……"
10011070-219 = "不管想說什麼，也得先離開這裡再說……"
10011070-220 = "不過就算想前進……"
10011070-224 = "……咦？"
10011070-225 = "[s] 「怎麼了？」"
10011070-226 = "這個走廊，這個格局……"
10011070-227 = "我有見過……"
10011070-228 = "這該不會……是《魚板旋風傳》裡出現過的……？"
10011070-229 = "我知道了，我全都記得……！"
10011070-230 = "老師大人，往這邊！"
10011070-231 = "[ns]「嗯。」"
10011070-252 = "果然如我所料！這裡跟《魚板旋風傳》的忍者屋敷一模一樣……！"
10011070-253 = "話說這不會有版權問題嗎！？"
10011070-254 = "[s]「觀光地區常常會有這種情況呢。」"
10011070-255 = "唔唔，之後一定要去質問這裡的負責人！不過話說回來……"
10011070-256 = "啊，辛苦了～！"
10011070-257 = "[s]「咦，楓……？」"
10011070-258 = "真是的，我都還沒說明完規則，你們兩個就衝進去了，害我很困擾呢。"
10011070-259 = "那麼再次開始說明規則！"
10011070-260 = "突破這間[ruby=Trick House]機關屋[/ruby]的人將得到挑戰權！"
10011070-262 = "挑戰權……？"
10011070-263 = "沒錯！挑戰權！也就是……"
10011070-269 = "向我本人──楓，提出挑戰的權力唷！"
10011070-270 = "只要贏過我就算是正式通關！那麼要開始囉～！"
10011070-271 = "結果還是要這樣啊！？"
10011070-272 = "[s]「哎呀，這也沒辦法。」"

[translation]
10011070-1 = "Episode 7; The Fourth Obstacle: The Trick House"
10011070-6 = "Hey y'all! Welcome to your next obstacle, the Trick House!"
10011070-7 = "Filled with countless traps and gadgets, it's the Whirlpool Movie Village's number one tourist spot!"
10011070-8 = "Isn't that just a ninja mansion?"
10011070-9 = "Please don't sweat the little details!"
10011070-10 = "Listen up! I am Isami Kaede, and I'm in charge of the fourth trial, the Trick House! I'm fifteen years old, and my hobby is catching beetles!"
10011070-11 = "[s] \"This gatekeeper I was expecting.\""
10011070-12 = "Heehee! That's right! And the cabal that kidnapped the princess has already fled inside the mansion! Or something like that! Line, please?"
10011070-13 = "Anyway! Passing this trial is simple!"
10011070-15 = "Get through that mansion..."
10011070-18 = "Navigate the obstacles within..."
10011070-21 = "And reach the finish line to save the princess!"
10011070-23 = "Beware! It may sound simple, but I wouldn't underestimate the Trick House."
10011070-24 = "Okay, we got it! Trick house, ninja mansion, whatever it is, it's on! We're ready!"
10011070-25 = "W-Wait, President...! Please hang back..."
10011070-26 = "President! When it comes to trick houses, I can't overstate how important it is to have an impenetrable strategy!"
10011070-27 = "It's fine. Fine! Everything is going to be fine!"
10011070-28 = "These are just attractions anyway! They're meant to be easy to get through!"
10011070-32 = "Wait! I haven't finished explaining yet!"
10011070-38 = "Huh?"
10011070-39 = "[s] \"Michiru, look out!\""
10011070-46 = "Bwahaha! The trials keep coming, but these girls just keep on forging ahead!"
10011070-47 = "And of course, you're right there with them every step of the way."
10011070-48 = "I did have high expectations, but goodness."
10011070-49 = "This is turning out to be even greater then I'd hoped. What fun. What tremendous, tremendous fun."
10011070-50 = "Niya! What is happening?!"
10011070-51 = "Hm? Is something wrong, Kaho?"
10011070-52 = "I received a call from the workers who were supposed to play the princess' kidnappers asking when the performance was beginning."
10011070-53 = "Who on earth is with Ibuki right now?"
10011070-54 = "You don't say? Isn't that just the strangest thing. Oh dear."
10011070-55 = "What do you think could be happening?"
10011070-56 = "Again?! Please, Niya! Who is it that's caught your fancy this time?"
10011070-60 = "I don't want to hear it, actually. I'll have to handle this personally. Good-bye."
10011070-65 = "Bwahaha! Oh, silly Kaho! It would be so much better if she could just sit back and relax. ♪"
10011070-69 = "Well, I wonder what you'll do now?"
10011070-70 = "Compared to the obstacles you've been breezing through without a care in the world, I think you'll find this next one quite sensitive and...dare I say, delicate?"
10011070-71 = "What kind of response will you come up with in the face of such a challenge?"
10011070-72 = "Hmm, Sensei?"
10011070-81 = "It's a deal. Members of the Ninjutsu Research Club, I look forward to your help with the show! ♪"
10011070-87 = "Don't forget, us Free-Spirited Mouryo are here for a specific goal. Execute the mission swiftly, and get rid of anyone who stands in our way. No distractions."
10011070-93 = "Going toe-to-toe against the president of the Inner Discipline Club? What even is this Ninjutsu Research Club anyway?"
10011070-94 = "What kind of stupid name is \"Ninjutsu Research Club\" anyway? Pfft."
10011070-102 = "(I'll never give up. This is a once-in-a-lifetime opportunity.)"
10011070-103 = "(We can solve everything. We'll finally become an official club)"
10011070-104 = "(And I'll be able to hold my head up high for Izuna and Tsukuyo!)"
10011070-105 = "(Which is why no matter what...!)"
10011070-114 = "Huh? Where am I...?"
10011070-115 = "[s] \"Hey, Michiru. Are you okay? We landed here when you fell in that trap.\""
10011070-116 = "A trap? In the mansion? A tourist spot?"
10011070-117 = "Hang on a goddang second! This is an actual ninja mansion?!"
10011070-118 = "We need all hands on deck! Honorable Sensei! Let's go!"
10011070-119 = "[s1] \"Well... It's kind of hard for me to move around right now.\"\n[s2] \"I think I landed on my foot wrong when you fell.\""
10011070-122 = "Your foot? The fall?"
10011070-123 = "Honorable Sensei... Are... Are you saying you got hurt because you...caught me when I fell?"
10011070-124 = "All because I went rushing off on my own?"
10011070-125 = "[s] \"It's not...exactly your fault, Michiru.\""
10011070-130 = "...ruined..."
10011070-131 = "[s] \"What'd you say, Michiru?\""
10011070-132 = "It's all ruined..."
10011070-133 = "WAAAAH! I'm sorry! What do I do? I ruined everything!"
10011070-142 = "[ns] \"Do you feel a little better now?\""
10011070-143 = "Ugh. *sniff* ...Yes."
10011070-144 = "[s3] \"So, Michiru, what's this about everything being ruined?\"\n[s4] \"Do you want to talk about ruining everything?\""
10011070-147 = "...It's me. It's my selfishness."
10011070-148 = "When Ibuki got kidnapped, I didn't report it on purpose."
10011070-149 = "I should've reported it right away to the Yin-Yang Club and Hyakkaryouran like I'm supposed to..."
10011070-150 = "But...I got greedy..."
10011070-151 = "[s] \"You didn't want to miss your shot at making the club official?\""
10011070-152 = "Y-You knew the whole time?"
10011070-153 = "That's true...but that's not all..."
10011070-154 = "I do want to spread ninja culture all across Kivotos. But...what if everyone makes fun of me?"
10011070-155 = "I was so scared of being laughed at... So I wanted to seize this chance to make the club official more than anything."
10011070-156 = "We might not ever get this chance again! So I had to make it happen! No matter what!"
10011070-161 = "I have a responsibility to everyone. Izuna and her starry-eyed wonder of ninjas..."
10011070-162 = "And sweet, wide-eyed Tsukuyo..."
10011070-164 = "Tsukuyo, right?"
10011070-165 = "...!"
10011070-166 = "You want to join the Ninjutsu Research Club with me?"
10011070-168 = "I wanted to be a role model they could be proud of. That's all."
10011070-169 = "If the only consequence of today was the show being ruined and us not getting officiated... That would be okay."
10011070-173 = "But because I hesitated to make a report, that kid the Mouryo kidnapped..."
10011070-175 = "I promised to keep her safe. And now she's crying somewhere I can't help her."
10011070-177 = "It's because of my greed that this situation has spiraled."
10011070-178 = "If people find out, what if Izuna and Tsukuyo get blamed just for being involved in the Ninjutsu Research Club?"
10011070-179 = "If I hadn't been so selfish..."
10011070-180 = "What if Izuna and Tsukuyo find out?"
10011070-181 = "They would be so disappointed in me if they found out this was all my fault."
10011070-182 = "...I'm... I'm so..."
10011070-183 = "[s] \"Okay, my foot's feeling much better now. Shall we?\""
10011070-184 = "Wha?! We were having a moment just now! Weren't we?!"
10011070-185 = "In a ninja movie, I would be the main heroine who finally unburdened herself of the enormous secret she'd been carrying the whole time!"
10011070-186 = "You can't be so nonchalant about the climax, Honorable Sensei!"
10011070-187 = "See, now I'm crying! How do you feel now? I mean, I was already crying! I know!"
10011070-188 = "[s] \"So you were too scared to submit a formal application?\""
10011070-189 = "Huh?"
10011070-190 = "I mean... How could I have ever submitted an application?!"
10011070-192 = "What normal, ordinary person takes ninjas seriously? We're called the Ninjutsu Research Club, for crying out loud!"
10011070-193 = "All we do is cosplay as ninjas from anime and comic books!"
10011070-194 = "Who was going to actually accept us?"
10011070-195 = "No one would understand! They already call us weirdos with stupid hobbies!"
10011070-197 = "You think they'd care? They'd treat us like imbeciles!"
10011070-198 = "They'd treat my friends like imbeciles!"
10011070-199 = "That's why I can't!"
10011070-203 = "[ns5] \"If that's what you think, Michiru, I have nothing else to say.\"\n[ns6] \"I think you should see what the other two have to say, Michiru.\""
10011070-207 = "Honorable Sensei...? I don't understand..."
10011070-208 = "[s] \"Time to get going. Here, let's wipe those tears off your face.\""
10011070-209 = "You're right."
10011070-210 = "For now, our priority is getting out of here."
10011070-214 = "...Thanks, Honorable Sensei."
10011070-215 = "[s] \"Don't mention it. Also, your makeup is starting to run.\""
10011070-216 = "Wh-Whaaat?!"
10011070-217 = "Hey! You could've said it a little nicer!"
10011070-218 = "...I don't know what to say anymore. How did we get here?"
10011070-219 = "I know, I know. What matters is how we're gonna get out."
10011070-220 = "But I don't have a clue how to do that either..."
10011070-224 = "Huh?"
10011070-225 = "[s] \"What's wrong?\""
10011070-226 = "Wait a second... This all looks really familiar."
10011070-227 = "This corridor, the layout of the room..."
10011070-228 = "The rooms in this mansion, this structure... Could it be... Kama-Boko Gale Battle...?"
10011070-229 = "If that's the case... Then I actually might have a clue."
10011070-230 = "Honorable Sensei, this way!"
10011070-231 = "[ns] \"Lead the way.\""
10011070-252 = "I knew it! This place is a carbon copy of the ninja mansion episode of Kama-Boko Gale Battle!"
10011070-253 = "Isn't that copyright infringement?! I know there's more pressing matters at hand, but what the heck!"
10011070-254 = "[s] \"It's actually pretty common to see this happen in tourist spots, isn't it?\""
10011070-255 = "Ugh, I'm gonna give the management here a piece of my mind later! Right now, we have a princess to save."
10011070-256 = "Wow! Two qualifiers! It's Sensei and Michiru!"
10011070-257 = "[s] \"Kaede? What's going on?\""
10011070-258 = "I can't believe you rushed off without hearing the rules first! I was at a loss!"
10011070-259 = "Ahem! But since you made it through, I can finish explaining!"
10011070-260 = "Whoever bests the maze within the mansion earns the right to be a contender!"
10011070-262 = "A contender?"
10011070-263 = "That's right! So whoever gets out first..."
10011070-269 = "...Gets to fight the gatekeeper, who is me! Kaede! Applause!"
10011070-270 = "If you beat me, then you win! So ready or not, here I come!"
10011070-271 = "Wait, so we went through the whole obstacle course just to fight her?"
10011070-272 = "[s] \"Sure looks that way.\""

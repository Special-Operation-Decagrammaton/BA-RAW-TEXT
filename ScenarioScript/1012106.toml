[translation]
1012106-1 = "夏之海，夜之紫"
1012106-2 = "（在從便利商店回來的路上，發現了熟悉的背影）"
1012106-6 = "啊，老師？"
1012106-7 = "您怎麼會在這裡……#n啊，原來是買完東西正好經過啊。"
1012106-8 = "不會，一點也不打擾。#n小女子反而感到開心呢。"
1012106-9 = "小女子只是……只是在看著海而已。"
1012106-10 = "白天那麼熱鬧又歡樂的景色，現在卻靜得令人難以置信……"
1012106-11 = "會覺得這樣的景象有些寂寞，就代表小女子改變了吧。"
1012106-15 = "在遇見老師之前，「這樣的海」對小女子來說反而才是正常的。"
1012106-16 = "……"
1012106-20 = "哼哼～哼～♪"
1012106-21 = "海之紫是無敵戰艦～♪ 在海底自由穿梭哦～♪"
1012106-22 = "[ns1]（在這種時候唱歌……！？）\n[ns2]（那是船沉了……這種話還是別說了吧）  "
1012106-25 = "即使漂浮在水面上，也要像不會濕的蓮花般優雅……#n若因衣服和頭髮弄濕而丟臉，將會損害家族的品格……"
1012106-26 = "這是小女子從小就經常聽到的教誨。"
1012106-27 = "不過今天……呵呵！#n豈止是弄濕衣服，甚至整個人都跳進海裡了呢！"
1012106-28 = "要是被家裡的人看到，恐怕會嚇得當場昏倒吧。"
1012106-29 = "[ns3]「今天玩得開心嗎？」\n[ns4]「紫會覺得後悔嗎？」"
1012106-30 = "是的！非常開心！"
1012106-31 = "老師總是能把小女子的世界變得無比美麗。"
1012106-32 = "小女子紫，對任何選擇都不會後悔！#n雖然很想這麼說……"
1012106-33 = "小女子真的很開心。#n老師您想必會說這才是最重要的吧？呵呵。"
1012106-34 = "還有……這是連家族的人也不知道的，屬於小女子的祕密。#n我只偷偷告訴老師一個人哦。"
1012106-39 = "從沒讓衣服沾到海水……其實是騙人的。"
1012106-40 = "每次來海邊的時候，小女子都會偷偷把腳伸進清澈透明的海水裡。"
1012106-41 = "一直以來，小女子都是用這種方式享受夏日的海邊。"
1012106-43 = "（和紫一起靜靜地看著夜晚的海）"
1012106-48 = "啊啊啊！"
1012106-49 = "[ns]「怎麼了，紫！？」"
1012106-50 = "不小心就聊得太開心，結果耽誤老師太多時間了！"
1012106-51 = "老師原本是因為其他事情才出門的吧！？"
1012106-52 = "（……早已融化的冰淇淋，正滴滴答答地從便利商店的袋子裡流出來）"
1012106-53 = "老師，請您趕快回去吧！#n紫沒問題的，請不用擔心！"
1012106-54 = "[s5]「不，已經來不及了……」\n[s6]「咯哩咯哩君的HP已經歸零了。」"
1012106-57 = "啊啊……都是因為和小女子見面才會變成這樣……"
1012106-58 = "[s7]「既然如此那也沒辦法了……」\n[s8]「我接下來要去夜晚的海邊探險，要一起來嗎？」"
1012106-61 = "……！"
1012106-66 = "是！小女子會永遠陪伴著您！"
1012106-68 = "（之後和紫一起逛了海邊的夜市，享受了各種小吃）"

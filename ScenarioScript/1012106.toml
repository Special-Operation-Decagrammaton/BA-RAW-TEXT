[translation]
1012106-1 = "Sea of Summer, Yukari of Night"
1012106-2 = "After leaving the convenience store, I spotted someone familiar."
1012106-6 = "Ah, Sensei?"
1012106-7 = "What brings you here? Oh! I see you were buying...such eclectic groceries."
1012106-8 = "No. You are not a bother. In fact, I am delighted to see you."
1012106-9 = "I... I was just watching the sea. Listening, as well."
1012106-10 = "This was all so rowdy and fun during the day. And now...it feels quite the opposite."
1012106-11 = "The fact that I find this peace quite lonely must mean that I have changed."
1012106-15 = "Before I met you, this kind of privacy was natural to me. It was all I knew."
1012106-16 = "..."
1012106-20 = "Hmm, hmm! ♪"
1012106-21 = "Yukari, the unsinkable ship! Sailing wherever she pleases! ♪"
1012106-22 = "[ns1] \"(Singing, now of all times...?!)\"\n[ns2] \"(Not the best travel itinerary...)\"  "
1012106-25 = "Even on water, you will float above, elegant like a lotus. A lady must never shame her family with wet clothes and soaked hair."
1012106-26 = "This is what I was taught from a young age."
1012106-27 = "But today, haha! I soaked my clothes and even ruined my makeup! I did not care! I jumped into the sea!"
1012106-28 = "If my attendant saw this, she would likely faint from the shock!"
1012106-29 = "[ns3] \"Did you have fun today?\"\n[ns4] \"Was it worth it?\""
1012106-30 = "Undoubtedly! I had so much fun!"
1012106-31 = "Sensei, you always show me new, beautiful things in the everyday."
1012106-32 = "While it's true that I, Yukari, possess a few recent regrets..."
1012106-33 = "...I had a marvelous time. And you would agree that is paramount, right, Sensei? Heehee."
1012106-34 = "And... I have a secret for you. Not even my servants know."
1012106-39 = "I lied. I have, indeed, soaked my clothes in the sea before."
1012106-40 = "Whenever we visited our private beach, I gazed into the clear water and dipped my feet when no one was looking."
1012106-41 = "In a way, I enjoyed those wet socks. It was my own way of enjoying the summer sea."
1012106-43 = "We watched the night sea for a while."
1012106-48 = "Ah!"
1012106-49 = "[ns] \"What's wrong, Yukari?!\""
1012106-50 = "I was so happy...that I neglected the time."
1012106-51 = "You were on your way home before I distracted you."
1012106-52 = "Melted ice cream dripped out of my bag..."
1012106-53 = "Sensei, you must be on your way. Please, resume your business!"
1012106-54 = "[s5] \"No, it's too late...\"\n[s6] \"My Morimori popsicle has already passed on...\""
1012106-57 = "Oh... This is all because we happened to find each other."
1012106-58 = "[s7] \"That's all right...\"\n[s8] \"How about you and I explore together?\""
1012106-61 = "...!"
1012106-66 = "Yes! Lead the way!"
1012106-68 = "Afterwards, Yukari and I strolled through the pier's night market and sampled delicious snacks."

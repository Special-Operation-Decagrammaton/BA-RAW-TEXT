[translation]
1012106-1 = "#title;여름의 바다, 밤의 유카리"
1012106-2 = "#na;(잠깐 편의점에 들렀다가 오는 길에 익숙한 뒷모습을 발견했다.)"
1012106-3 = "#st;[0,0];instant;1;"
1012106-4 = "#clearST"
1012106-5 = "#wait;2000"
1012106-6 = "2;유카리 수영복;02;앗, 선생님?\n#2;em;[반응]\n#2;a"
1012106-7 = "2;유카리 수영복;02;여기는 어인 일로…… 아, 장을 보고 지나가시던 중이셨군요."
1012106-8 = "2;유카리 수영복;12;아니요. 전혀 방해가 아니어요. 소녀는 오히려 기쁘답니다.\n#2;m3\n#2;em;[음표]"
1012106-9 = "2;유카리 수영복;03;소녀는, 소녀는 그저 바다를 보고 있었사와요."
1012106-10 = "2;유카리 수영복;99;낮에는 그렇게 소란스럽고, 즐거웠던 풍경이 거짓말처럼 적막해져서……."
1012106-11 = "2;유카리 수영복;12;이 모습을 쓸쓸하다 여기는 것은, 소녀가 변했다는 뜻이겠죠.\n#2;em;[한숨]"
1012106-12 = "#st;[0,0];instant;1;"
1012106-13 = "#clearST"
1012106-14 = "#wait;3500"
1012106-15 = "2;유카리 수영복;99;선생님과 만나기 전까지는, <이런 바다>가 오히려 소녀에게 정상이었으니까요."
1012106-16 = "2;유카리 수영복;15;……."
1012106-17 = "#st;[0,0];instant;1;"
1012106-18 = "#clearST"
1012106-19 = "2;유카리 수영복;17\n#2;em;[...]\n#wait;2500"
1012106-20 = "2;유카리 수영복;99;흐흥~ 흥~♪\n#2;jump"
1012106-21 = "2;유카리 수영복;13;바다의 유카리는 무적 전함~♪ 바닷속을 종횡무진이어요~♪\n#2;em;[음표]"
1012106-22 = "[ns1] (이 타이밍에 노래를……?!)\n[ns2] (그러면 그냥 침몰이지만…… 말하지 말자.)  "
1012106-23 = "#wait;10"
1012106-24 = "#wait;10"
1012106-25 = "2;유카리 수영복;99;비록 물에 떠 있더라도 젖지 않는 연꽃처럼 우아하게 있어라…… 옷과 머리카락을 적셔 망신당하면 가문의 기품이 훼손된다……."
1012106-26 = "2;유카리 수영복;03;어릴 적부터 소녀가 항상 들어온 말씀들이어요."
1012106-27 = "2;유카리 수영복;13;그런데 오늘은, 후후! 옷을 적시기는커녕, 아예 바닷물에 퐁당 뛰어들었사와요!\n#2;em;[재잘]"
1012106-28 = "2;유카리 수영복;12;집안 분들이 보셨다면 깜짝 놀라서 그 자리에서 쓰러지시겠죠."
1012106-29 = "[ns3] \"오늘 즐거웠어?\"\n[ns4] \"유카리는 후회해?\""
1012106-30 = "2;유카리 수영복;18;네! 무척이나 즐거웠답니다!\n#2;em;[!]"
1012106-31 = "2;유카리 수영복;99;선생님은 항상 소녀의 세계를, 한없이 아름다운 세계로 바꿔주셔요."
1012106-32 = "2;유카리 수영복;05;저 유카리, 어떤 선택에도 후회는 없사와요! ……라고 하면 거짓말이겠지만…….\n#2;em;[!]"
1012106-33 = "2;유카리 수영복;12;소녀는 아주 즐거웠사와요. 그리고 선생님께서는 그게 가장 중요하다 말씀하시겠죠? 후후."
1012106-34 = "2;유카리 수영복;02;그리고…… 이건 집안 분들도 모르는 소녀의 비밀이지만, 선생님께만 몰래 가르쳐 드릴게요.\n#2;em;[반응]"
1012106-35 = "#st;[0,0];instant;1;"
1012106-36 = "#clearST"
1012106-37 = "2;유카리 수영복;02\n#2;d\n#wait;1000"
1012106-38 = "3;유카리 수영복;12\n#3;a\n#3;closeup\n#2;hide\n#wait;1000"
1012106-39 = "3;유카리 수영복;02;바다에 옷조차 적신 적 없다는 말은 거짓말이어요.\n#fontsize;50\n#3;closeup"
1012106-40 = "3;유카리 수영복;17;바다에 올 때마다, 맑고 투명한 바닷물을 내려다보면서, 남몰래 슬쩍 발을 담가보곤 했사와요.\n#fontsize;50\n#3;closeup"
1012106-41 = "3;유카리 수영복;19;항상 그런 식으로, 소녀 나름 여름 바다를 즐겨왔답니다.\n#3;em;[하트]\n#fontsize;50\n#3;closeup"

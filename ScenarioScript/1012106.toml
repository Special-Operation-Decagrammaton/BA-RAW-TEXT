1012106-49 = "[ns] \"무슨 일이야, 유카리?!\""
1012106-50 = "3;유카리 수영복;07;무심코 기분이 좋아서, 선생님을 오래 붙잡아 두고 말았사와요!"
1012106-51 = "3;유카리 수영복;11;분명 다른 용건이 있어서 나오신 거지요?!\n#3;em;[?!]\n#3;shake"

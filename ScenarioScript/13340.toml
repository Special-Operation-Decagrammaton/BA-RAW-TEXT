[translation]
13340-1 = "Episode 34;Apology"
13340-3 = "...Sensei."
13340-4 = "[ns] \"...?\""
13340-5 = "There we go! Sorry! You were sleeping so soundly that I didn't want to wake you!"
13340-6 = "But I think we need to start our preparations...or Hoshino's going to yell at us!"
13340-11 = "Yume! [USERNAME] Sensei! Hurry up! We need to go find treasure at the oasis!"
13340-12 = "I'll wait for you at the school gate!"
13340-13 = "Hurry up, or I'll leave without you! "
13340-17 = "Haha. Hoshino's so excited. "
13340-18 = "She's become more mischievous since your arrival, Sensei...in a good way, of course."
13340-19 = "[s] \"...\""
13340-20 = "...Sensei?"
13340-21 = "[s] \"Yume...\""
13340-22 = "Yes, Sensei? Is something wrong?"
13340-23 = "Did you have a nightmare or something? Why do you look so sad?"
13340-24 = "[s] \"I'm sorry, Yume...\""
13340-25 = "..."
13340-26 = "[s] \"I'm sorry...I might be an adult, but...\""
13340-27 = "..."
13340-28 = "[ns] \"As an adult... I...\""
13340-30 = "[ns] \"I...\""
13340-32 = "Sensei."
13340-33 = "Mmm... I don't know all the details, but I can tell you one thing for certain."
13340-34 = "It wasn't your fault, Sensei."
13340-35 = "So please don't apologize."
13340-36 = "[ns1] \"I can't turn back time.\"\n[ns2] \"I can't undo death.\""
13340-39 = "[ns] \"I'm not a being capable of that.\""
13340-41 = "[ns] \"I'm...just a...\""
13340-44 = "[ns3] \"...an ordinary person, who can do no more than extend a hand...\"\n[ns4] \"...to the child suffering within my reach.\""
13340-47 = "You're right. But don't you think that's enough, Sensei?"
13340-48 = "It's the little things that accumulate, bit by bit..."
13340-49 = "...and one day, become an overwhelming miracle! Like Hoshino!"
13340-50 = "...Oops. Hoshino gets mad when I call her a miracle, but still..."
13340-51 = "I believe that to be true...or maybe I just want to believe it..."
13340-55 = "[ns] \"I'll remember those words, Yume. Always.\""
13340-56 = "Really? I-I kind of just blurted all that out, but... "
13340-60 = "You're off to go rescue a suffering child, right?"
13340-61 = "[s] \"Yes, the child who's within my reach.\""
13340-62 = "I hope you can rescue her safely!"
13340-63 = "[s] \"I will. No matter what.\""
13340-73 = "[ns] \"It's you.\""
13340-74 = "You are...?!"
13340-75 = "[USERNAME] Sensei?! H-How did you get here?! "
13340-76 = "[s] \"We finally meet, Underground Dweller.\""
13340-77 = "What are you attempting?! The game has concluded! "
13340-78 = "Victory is mine! You lose, without having done a single thing of note!"
13340-79 = "[s] \"No.\""
13340-80 = "No?"
13340-81 = "[s] \"This is only the beginning.\""
13340-90 = "Coordinates confirmed. Rerouting the partially manifested Chroma's power to activate the forced jump sequence."
13340-94 = "[ns] \"Shiroko, please! ...Stop her!\""
13340-101 = "...!!"
13340-102 = "Don't reach out to something like that."
13340-103 = "H-How...?"
13340-113 = "Sunaookami Shiroko, I know you. You are not weak. "
13340-114 = "I know because you are me. And I am strong."
13340-115 = "It's a simple syllogism. But that's why it's okay."
13340-119 = "[ns] \"Shiroko!\""
13340-120 = "Yeah."
13340-124 = "Sensei called for me. You need my help, right?"
13340-125 = "Th-The current situation is—"
13340-127 = "I know. Leaving Hoshino be will mean the destruction of this world."
13340-128 = "Y-Yeah... "
13340-129 = "I already know. It began with Abydos, after all."
13340-137 = "You dodged that?!"
13340-141 = "You...don't...know... "
13340-142 = "...my...pain..."
13340-143 = "No, Hoshino. I do."
13340-144 = "Pain is something I know better than anyone."
13340-147 = "I will stop you. Come, Takanashi Hoshino."
13340-148 = "Is there any hope of winning?"
13340-149 = "Yes. I know how to handle that thing."
13340-158 = "I've fought you once, so I won't lose this time."
13340-160 = "Next Episode;Terror vs. Terror"

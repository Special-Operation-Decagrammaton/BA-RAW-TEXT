[translation]
13340-1 = "ตอนที่ 34;คำขอโทษ"
13340-3 = "คุณครู..."
13340-4 = "[ns] \"...?\""
13340-5 = "อืม... ฉันขอโทษค่ะ คุณครูกำลังนอนหลับสนิทจนแทบปลุกไม่ขึ้นเลย..."
13340-6 = "แต่เราต้องเตรียมตัวกันแล้วละค่ะ... ไม่งั้นโฮชิโนะจังคงโกรธแน่ๆ..."
13340-11 = "รุ่นพี่ยูเมะ! คุณครู [USERNAME]! รีบออกมาเร็วค่ะ! เราต้องไปล่าสมบัติที่โอเอซิสด้วยกันสิ!!"
13340-12 = "แล้วฉันจะรออยู่หน้าประตูโรงเรียนนะคะ!"
13340-13 = "ถ้าไม่รีบออกมา ฉันจะไปคนเดียวนะคะ!"
13340-17 = "อืม... โฮชิโนะจังตื่นเต้นมากเลยนะคะ..."
13340-18 = "ตั้งแต่คุณครูมา เธอก็ซุกซนกว่าเดิมอีก... อ่า... ฉันพูดในทางที่ดีนะคะ"
13340-19 = "[s] \"...\""
13340-20 = "คุณครู...?"
13340-21 = "[s] \"ยูเมะ...\""
13340-22 = "ค่ะ คุณครู... มีเรื่องอะไรเหรอคะ?"
13340-23 = "ฝันร้ายเหรอคะ? ทำไมจู่ๆ ก็ทำหน้าเศร้าแบบนั้น..."
13340-24 = "[s] \"ขอโทษนะ ยูเมะ...\""
13340-25 = "..."
13340-26 = "[s] \"ขอโทษนะ... ครูเป็นผู้ใหญ่แท้ๆ...\""
13340-27 = "..."
13340-28 = "[ns] \"ในฐานะผู้ใหญ่... ครูควรจะ...\""
13340-30 = "[ns] \"ครูน่ะ...\""
13340-32 = "คุณครู"
13340-33 = "อืม... ที่จริงฉันไม่รู้รายละเอียดหรอกค่ะ... แต่มีหนึ่งสิ่งที่ชัดเจนอยู่นะคะ"
13340-34 = "นั่นไม่ใช่ความผิดของคุณครูหรอกค่ะ"
13340-35 = "อืม... เพราะงั้นคุณครูไม่ต้องขอโทษหรอกค่ะ"
13340-36 = "[ns1] \"ครูย้อนเวลากลับมาไม่ได้\"\n[ns2] \"ครูทำให้ความตายเป็นเรื่องไม่จริงไม่ได้\""
13340-39 = "[ns] \"ครูไม่ใช่[ruby=เทพ]สิ่งมีชีวิต[/ruby]แบบนั้น...\""
13340-41 = "[ns] \"ครู... เป็นแค่...\""
13340-44 = "[ns3] \"เป็นแค่คนธรรมดาที่ยื่นมือให้เด็กที่เจ็บปวด\"\n[ns4] \"ครูยื่นมือให้เด็กที่อยู่ในที่ที่มือครูเอื้อมไปถึงได้เท่านั้น\""
13340-47 = "อืม... แค่นี้ก็เพียงพอแล้วไม่ใช่เหรอคะคุณครู?"
13340-48 = "เมื่อสิ่งเล็กๆ น้อยๆ เหล่านี้มารวมกันมากๆ เข้า... ในสักวันหนึ่ง..."
13340-49 = "ก็อาจเป็นปาฏิหาริย์ที่ยิ่งใหญ่ได้นี่คะ! เหมือนโฮชิโนะจังตรงโน้นไง!"
13340-50 = "งือ... ถ้าพูดว่าปาฏิหาริย์ โฮชิโนะจังคงจะโกรธ..."
13340-51 = "แต่ว่า... ฉันเป็นคนที่เชื่อเรื่องแบบนั้นน่ะค่ะ... หรือต้องบอกว่าฉันอยากจะเชื่อดีนะ..."
13340-55 = "[ns] \"ครูจะจำคำนี้ไว้ตลอดนะ ยูเมะจัง\""
13340-56 = "คะ? อืม... แต่ฉันแค่พูดไปเรื่อยเปื่อยเอง..."
13340-60 = "จะไปช่วยเด็กที่กำลังเจ็บปวดใช่มั้ยคะ?"
13340-61 = "[s] \"อื้ม เด็กที่มือของครูยื่นไปถึงได้\""
13340-62 = "ขอให้คุณครูช่วยเธอได้นะคะ!"
13340-63 = "[s] \"ครูต้องช่วยให้ได้\""
13340-73 = "[ns] \"นายเองน่ะเหรอ\""
13340-74 = "แกมัน...?!"
13340-75 = "ครู [USERNAME]?! ทะ... ทำไมถึงมาอยู่ที่นี่ได้...?!"
13340-76 = "[s] \"ได้เจอกันสักทีนะ ผู้อาศัยอยู่ใต้พิภพ\""
13340-77 = "คิดจะทำอะไรน่ะ! เกมนี้มันจบไปแล้ว!"
13340-78 = "กระผมชนะเกมนี้แล้ว!! คุณมันก็แค่คนไร้กำลังที่พ่ายแพ้อย่างราบคาบ!!"
13340-79 = "[s] \"ไม่หรอก\""
13340-80 = "ไม่งั้นเหรอ?"
13340-81 = "[s] \"มันเพิ่งจะเริ่มตอนนี้ต่างหาก\""
13340-90 = "ยืนยันพิกัด... ตรวจพบการขโมยพลังของ <สีสัน> ที่เผยออกมาอย่างจำกัด แล้วก่อให้เกิดวงจรก้าวกระโดด"
13340-94 = "[ns] \"ชิโรโกะ!! ช่วยขวางชิโรโกะไว้ที!!!\""
13340-101 = "...!!"
13340-102 = "อย่ายื่นมือเข้าไปทำอะไรอย่างนั้นเลย"
13340-103 = "ทะ... ทำไมกัน...!!?"
13340-113 = "สึนาโอกามิ ชิโรโกะ ฉันรู้จักเธอดี เธอไม่ได้อ่อนแอหรอก"
13340-114 = "เพราะเธอคือฉันไงล่ะ อืม แล้วฉันก็แข็งแกร่งด้วย"
13340-115 = "เป็นตรรกะง่ายๆ ใช่มั้ยล่ะ เพราะงั้นไม่เป็นไรหรอก"
13340-119 = "[ns] \"ชิโรโกะ!!\""
13340-120 = "อืม"
13340-124 = "คุณครูเรียกฉันมาน่ะ ต้องการความช่วยเหลือจากฉันใช่มั้ย?"
13340-125 = "สะ... สถานการณ์ตอนนี้มัน..."
13340-127 = "ฉันรู้ว่าถ้าปล่อยรุ่นพี่โฮชิโนะไว้แบบนั้น โลกนี้ก็คงล่มสลาย"
13340-128 = "อะ... อื้ม..."
13340-129 = "ฉันรู้อยู่แล้ว เพราะสิ่งนั้นเริ่มต้นที่อะบิดอสยังไงล่ะ"
13340-137 = "หลบได้เหรอ...?!"
13340-141 = "พวกเธอ... ไม่เข้าใจ..."
13340-142 = "ไม่... ใช่... เหรอ... ความเจ็บปวด... นี้น่ะ..."
13340-143 = "ไม่หรอก รุ่นพี่โฮชิโนะ ฉันเข้าใจความเจ็บปวดแบบนั้นดี"
13340-144 = "เข้าใจดียิ่งกว่าใครเลยละ"
13340-147 = "ฉันจะหยุดไว้เอง ทาคานาชิ โฮชิโนะ เข้ามาเลย"
13340-148 = "มีโอกาสชนะเหรอ?"
13340-149 = "อืม ฉันรู้ว่าต้องรับมือกับสิ่งนั้นยังไง"
13340-158 = "ตอนนั้นก็สู้มาแล้วครั้งหนึ่ง ฉันไม่แพ้หรอก"
13340-160 = "ตอนต่อไป;เทอเรอร์ vs เทอเรอร์"

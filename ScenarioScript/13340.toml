[translation]
13340-1 = "第34話;道歉"
13340-3 = "……老師。"
13340-4 = "[ns]「……？」"
13340-5 = "嗚嗚……對不起。#n雖然你睡得很沉……"
13340-6 = "但現在該開始準備了……不然星野醬可能會生氣的……"
13340-11 = "夢前輩！[USERNAME]老師！#n請快點出來！趕快去綠洲尋寶吧！！"
13340-12 = "我在校門前等你們哦！"
13340-13 = "不趕快來的話，我就要自己去囉！？"
13340-17 = "呵呵……星野醬感覺很興奮呢……"
13340-18 = "自從老師來了之後，好像更像淘氣鬼了……啊，當然是指好的意思哦。"
13340-19 = "[s] 「………………」"
13340-20 = "……老師？"
13340-21 = "[s]「夢……」"
13340-22 = "是，老師……？你怎麼了？"
13340-23 = "剛才做惡夢了嗎？怎麼一臉難過的表情……"
13340-24 = "[s]「對不起。夢……」"
13340-25 = "……"
13340-26 = "[s]「對不起……我明明是……大人……」"
13340-27 = "……"
13340-28 = "[ns]「明明身為大人……我卻……」"
13340-30 = "[ns]「我……」"
13340-32 = "老師。"
13340-33 = "唔嗯……雖然詳細的情形我不清楚……但有件事我可以確定。"
13340-34 = "這不是老師的錯。"
13340-35 = "嗯……所以老師不需要道歉。"
13340-36 = "[ns1]「我無法讓時間倒轉。」\n[ns2]「我無法抹去死亡的發生。」"
13340-39 = "[ns]「我不是那樣的[ruby=神]存在[/ruby]……」"
13340-41 = "[ns]「我……只是個……」"
13340-44 = "[ns3]「能向我能力範圍內受苦的孩子……」\n[ns4]「伸出援手的普通人而已。」"
13340-47 = "……嗯，那樣不就夠了嗎，老師？"
13340-48 = "那些瑣碎的小事累積起來……總有一天……"
13340-49 = "說不定就會成為巨大的奇蹟哦！就像在那裡的星野醬一樣！"
13340-50 = "啊……隨便用奇蹟這個說法，會害星野醬生氣的……"
13340-51 = "但是……我還是相信奇蹟……我希望去相信……"
13340-55 = "[ns]「我會一直記住這句話的，夢醬。」"
13340-56 = "咦？唔嗯……我其實只是隨口說說而已……"
13340-60 = "……你會去救受苦的孩子吧？"
13340-61 = "[s]「嗯，我會盡我所能。」"
13340-62 = "要是能順利就好了呢！"
13340-63 = "[s]「我一定會解救他們的。」"
13340-73 = "[ns]「就是你啊。」"
13340-74 = "你是……！？"
13340-75 = "[USERNAME]老師！？#n你，你怎麼會出現在這裡……！？"
13340-76 = "[s]「終於見到你了，地下生活者。」"
13340-77 = "你在打什麼主意！這場遊戲已經結束了！"
13340-78 = "這場遊戲的勝利屬於我！！你已經輸得一敗塗地了！！"
13340-79 = "[s]「不。」"
13340-80 = "竟然還不承認──？"
13340-81 = "[s]「現在才正要開始。」"
13340-90 = "確定座標。#n搶奪顯現出來的「色彩」的部分力量，發動強制轉移程式。"
13340-94 = "[ns]「白子！！快阻止白子──！！！」"
13340-101 = "……！！"
13340-102 = "別碰那種東西。"
13340-103 = "你，你怎麼會……！！？"
13340-113 = "砂狼白子，我很瞭解你。#n你並不弱。"
13340-114 = "因為你就是我。#n嗯，而且我很強。"
13340-115 = "這是很簡單的三段論，所以沒問題的。"
13340-119 = "[ns]「白子！！」"
13340-120 = "嗯。"
13340-124 = "我聽到老師的呼喚就過來了。#n你需要我的幫忙對吧？"
13340-125 = "現，現在的情況是……"
13340-127 = "我知道。如果放任星野前輩不管，世界就會走向滅亡。"
13340-128 = "唔，唔嗯……"
13340-129 = "我很清楚。因為[ruby= ・     ・ ]那個[/ruby]就是從阿拜多斯開始的。"
13340-137 = "躲開了……！？"
13340-141 = "你們……根……本…… "
13340-142 = "不懂……這種……痛苦……"
13340-143 = "不，星野前輩。那種痛苦我很瞭解。"
13340-144 = "我比任何人都瞭解。"
13340-147 = "我要阻止你，小鳥遊星野──一決勝負吧。"
13340-148 = "有勝算嗎？"
13340-149 = "嗯。我很清楚要怎麼對付[ruby= ・     ・ ]那個[/ruby]。"
13340-158 = "之前已經交手過一次，我不會輸的。"
13340-160 = "下一話;TERROR vs TERROR"

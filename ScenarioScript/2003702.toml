[translation]
2003702-1 = "警察故事─美食街篇"
2003702-2 = "（收到MomoTalk後，來到了吹雪所在的地方）"
2003702-6 = "老……不對，監察官！你來的正好！"
2003702-7 = "[s1]「不是，你怎麼叫我監察官……」\n[s2]「你是不是在打什麼不好的主意？」"
2003702-10 = "原來連監察官也慌了嗎？"
2003702-11 = "沒事沒事，我會告訴你現在該怎麼做。"
2003702-12 = "那就是要跟我這個救生員一起，在美食廣場取締垃圾食物。"
2003702-13 = "[s3]「你你你先等一下，什麼垃圾食物？」\n[s4]「我還沒跟上你的節奏。」"
2003702-19 = "老師真的很遲鈍耶。"
2003702-20 = "我就簡單說明一下吧。"
2003702-21 = "距今大約30分鐘前，#n我收到了這個水上樂園美食廣場裡的「MasterDonut」會推出新甜甜圈的情報。"
2003702-22 = "雖然目前尚未發售，可是開賣之後一定會湧現大批的人潮。"
2003702-23 = "[s]「……所以呢？」"
2003702-24 = "我們有機會在正式開賣前，搶先品嚐到那個甜甜圈哦！"
2003702-25 = "前提是……要跟食品衛生的管制監察官一起！"
2003702-26 = "根據我仔細調查的結果，#n食品衛生管制監察官似乎是由聯邦學生會的幹部，或者夏萊的老師擔任。"
2003702-27 = "都說到這裡了，老師應該已經明白了吧？"
2003702-28 = "[s]「吹雪，你該不會……」"
2003702-29 = "為了遊客的安全和快樂，以及健全的飲食文化……"
2003702-30 = "老師和我有事先品嚐「MasterDonut」水上樂園店新甜甜圈的特權……#n不，應該說是義務！"
2003702-34 = "[ns]「就知道你會這麼說。」"
2003702-35 = "我們趕快出發吧！得在開賣前趕到才行！"
2003702-38 = "客人您好！"
2003702-39 = "非常感謝兩位的光臨，不過現在還沒到營業時間。#n可以麻煩兩位稍後再來嗎？"
2003702-40 = "啊，沒關係沒關係。我們不是普通的客人。"
2003702-41 = "我是樂園的救生員，而這位是夏萊的老……不對，是食品衛生的管制監察官。"
2003702-42 = "我們是來這裡檢查食品狀態的。"
2003702-43 = "啊！原來如此！我們當然樂意配合！"
2003702-44 = "那可以讓我們試吃一下嗎？"
2003702-45 = "當然可以！#n要不要嚐嚐看預計今天開賣的新甜甜圈呢？"
2003702-46 = "很好說話嘛。"
2003702-50 = "那我就不客氣囉。"
2003702-52 = "來，請用。"
2003702-53 = "這就是我們店裡的得意之作……"
2003702-62 = "「黃瓜甜甜圈」！"
2003702-63 = "我們在甜甜圈裡頭，加了一整條新鮮的小黃瓜！"
2003702-64 = "什，什麼！？"
2003702-69 = "這可是獲得了某位知名美食團體成員的好評哦！"
2003702-70 = "搭配薄荷芥末醬還會變得更好吃！"
2003702-71 = "[s5] （完全不知道是什麼味道……！）\n[s6] （不想想像會是什麼味道……！）"
2003702-74 = "那，那個，我非吃不可嗎？"
2003702-75 = "該說有點不合口味……#n還是該說我實在很好奇這種口味到底適合什麼人呢……！"
2003702-76 = "總之這好像不太適合作為稽查的對象……！"
2003702-77 = "[s]「要好好工作才行哦，吹雪。」"
2003702-81 = "[ns]「為了遊客的安全和快樂，以及健全的飲食文化……！」"
2003702-82 = "來，請快品嘗看看吧！"
2003702-84 = "我們特別為您挑了比較大條的黃瓜哦！"
2003702-86 = "噫，噫噫！那麼大的我沒辦法……！"
2003702-88 = "（之後，吹雪雖然把黃瓜甜甜圈吃了個精光……）"
2003702-89 = "（……表情卻一副快哭出來的樣子）"

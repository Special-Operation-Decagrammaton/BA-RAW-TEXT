[translation]
2003702-1 = "#title;폴리스 스토리-식당가 편"
2003702-2 = "#na;(모모톡을 받고 후부키가 있는 곳을 찾았다.)"
2003702-3 = "#st;[0,0];instant;1;"
2003702-4 = "#clearST"
2003702-5 = "3;후부키 수영복ND;01\n#3;a\n#wait;1000"
2003702-6 = "3;후부키 수영복ND;03;선……아니 감찰관! 와줘서 고마워!\n#3;em;[음표]"
2003702-7 = "[s1] \"아니, 감찰관이라니…….\"\n[s2] \"대체 무슨 일을 꾸미고 있는 거야?\""
2003702-8 = "#wait;100"
2003702-9 = "#wait;100"
2003702-10 = "3;후부키 수영복ND;00;감찰관도 당황했구나?"
2003702-11 = "3;후부키 수영복ND;10;괜찮아, 괜찮아. 지금부터 할 일은 내가 알려줄 테니까.\n#3;em;[재잘]"
2003702-12 = "3;후부키 수영복ND;00;라이프가드인 나와 같이 이 푸드코트를 둘러보면서 불량식품 단속을 하는 거야."
2003702-13 = "[s3] \"잠깐잠깐잠깐. 불량식품?\"\n[s4] \"이야기를 못 따라가겠어.\""
2003702-14 = "#st;[0,0];instant;1;"
2003702-15 = "#st;[0,0];instant;1;"
2003702-16 = "#clearST"
2003702-17 = "3;후부키 수영복ND;01\n#3;em;…\n#wait;2500"
2003702-18 = "3;후부키 수영복ND;13\n#3;em;[한숨]\n#wait;1500"
2003702-19 = "3;후부키 수영복ND;05;정말, 선생은 눈치가 없구만."
2003702-20 = "3;후부키 수영복ND;02;간단하게 말할게."
2003702-21 = "3;후부키 수영복ND;01;지금으로부터 약 30분 전, 이 워터파크의 푸드코트에 있는 마스터 도넛에서 신작 도넛이 나온다는 정보를 들었어.\n#3;em;…"
2003702-22 = "3;후부키 수영복ND;02;아직 판매가 개시되지는 않았지만, 팔기 시작하면 그 즉시 거대한 인파가 몰릴 것은 당연하겠지."
2003702-23 = "[s] \"……그래서?\""
2003702-24 = "3;후부키 수영복ND;10;정식 판매가 시작되기 전에 그 도넛을 맛볼 수 있는 기회가 있다구!\n#3;jump"
2003702-25 = "3;후부키 수영복ND;03;바로바로……식품 위생 단속 감찰관과 함께라면 말야!"
2003702-26 = "3;후부키 수영복ND;00;그리고 규정을 면밀히 살핀 결과, 식품 위생 단속 감찰관은 총학생회 임원이나 샬레의 선생님이 맡기로 되어 있더라고."
2003702-27 = "3;후부키 수영복ND;10;여기까지 말했으면 대충 알겠지?"
2003702-28 = "[s] \"후부키 너 설마…….\""
2003702-29 = "3;후부키 수영복ND;14;파크 이용객들의 안전과 즐거움, 그리고 건전한 식음문화를 위해서……."
2003702-30 = "3;후부키 수영복ND;03;선생님과 나는 마스터 도넛 워터파크점의 신작 도넛을 미리 맛볼 특권, 아니 의무가 있다는 거지!\n#3;closeup"
2003702-31 = "#st;[0,0];instant;1;"
2003702-32 = "#clearST"
2003702-33 = "#wait;2500"
2003702-34 = "[ns] \"그럴 줄 알았어.\""
2003702-35 = "3;후부키 수영복ND;03;자, 얼른 가자구! 판매가 시작되기 전에!\n#3;hophop"

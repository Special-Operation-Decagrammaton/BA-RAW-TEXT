[translation]
2003702-1 = "Police Story: Food Court Episode"
2003702-2 = "Fubuki sent me a MomoTalk message, asking if I could come help her."
2003702-6 = "Sen...I mean, Inspector! Thank you for coming!"
2003702-7 = "[s1] \"What? 'Inspector'...?\"\n[s2] \"What in the world are you plotting?\""
2003702-10 = "Guess you weren't expecting this, were you, Inspector?"
2003702-11 = "No worries. Let me tell you what we're doing today."
2003702-12 = "You and I are going to go around the food court and crack down on food safety."
2003702-13 = "[s3] \"Hold on a minute. Food safety?\"\n[s4] \"I don't think I'm following.\""
2003702-19 = "Keep up, Sensei."
2003702-20 = "All right, full disclosure..."
2003702-21 = "About thirty minutes ago, I received intelligence that the Master Donut at this water park's food court will be releasing a NEW donut."
2003702-22 = "They haven't started selling it yet, but once they do, we can be sure of a huge crowd."
2003702-23 = "[s] \"...So?\""
2003702-24 = "So, we have a chance to be the first ones to taste it!"
2003702-25 = "That is, of course...if I'm with the food safety inspector!"
2003702-26 = "See, I looked into the regulations, and they say — I'll quote them — \"The food safety inspector should be a member of the General Student Council OR a teacher from Schale.\""
2003702-27 = "You get it?"
2003702-28 = "[s] \"Fubuki, you're not...\""
2003702-29 = "For the safety and enjoyment of the park visitors, and to promote a culture of health and wellness..."
2003702-30 = "You and I have the privilege — no, the obligation — to taste Master Donut's new donut first!"
2003702-34 = "[ns] \"Yep, okay...\""
2003702-35 = "Now, come on, let's go. Before they start flying off the shelves!"
2003702-38 = "Hello!"
2003702-39 = "Thanks for coming. We're not quite open yet, though. Could you come back later?"
2003702-40 = "Oh, we're not customers."
2003702-41 = "I'm a park lifeguard, and this is Schale's Sen...I mean, food safety inspector."
2003702-42 = "We've come to...inspect your food safety. Before you open."
2003702-43 = "Oh! I understand! I'd be happy to help."
2003702-44 = "Good, good. Can we ask for a sample?"
2003702-45 = "Yes, of course! How about our new donut? It's just about to go on sale."
2003702-46 = "That would be perfect, actually."
2003702-50 = "We'll take you up on that offer."
2003702-52 = "Great! Here you go!"
2003702-53 = "Our store's ambitious new creation..."
2003702-62 = "The Cucumber Donut!"
2003702-63 = "A donut with an entire fresh cucumber inside!"
2003702-64 = "Wh-What?!"
2003702-69 = "Endorsed by a member of the world-famous Gourmet Society!"
2003702-70 = "It tastes even better if you dip it in this mint wasabi sauce!"
2003702-71 = "[s5] \"(I can't even imagine what this is going to taste like.)\"\n[s6] \"(I don't WANT to imagine what this is going to taste like...)\""
2003702-74 = "So, um...do we have to eat this now?"
2003702-75 = "It's a bit outside of my...usual palate... I'm honestly curious about the people who LIKE these..."
2003702-76 = "I mean, it might not be the most appropriate donut to sample...!"
2003702-77 = "[s] \"We need to do our job properly, Fubuki.\""
2003702-81 = "[ns] \"For the safety and enjoyment of the park visitors, and to promote a culture of health and wellness...\""
2003702-82 = "Please, have a taste!"
2003702-84 = "I chose an especially big cucumber for this one!"
2003702-86 = "E-Eek! That's way too big...!"
2003702-88 = "Fubuki managed to finish the entire cucumber donut."
2003702-89 = "By the time she was done, she looked like she was ready to cry."

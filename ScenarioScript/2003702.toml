[translation]
2003702-1 = "เรื่องราวของตำรวจ - ตอนถนนแห่งร้านอาหาร"
2003702-2 = "(คุณครูได้รับข้อความ MOMOTALK จึงออกไปยังที่ที่ฟุบุกิอยู่)"
2003702-6 = "คุณ... ไม่สิ ผู้ตรวจตรา! ขอบคุณที่มานะ!"
2003702-7 = "[s1] \"ทำไมถึงเรียกว่าผู้ตรวจตราล่ะ...\"\n[s2] \"คิดจะทำอะไรงั้นเหรอ?\""
2003702-10 = "ผู้ตรวจตราก็ตกใจเหมือนกันสินะ?"
2003702-11 = "ไม่เป็นไรนะ ฉันจะบอกเองว่าต้องทำงานอะไร"
2003702-12 = "วันนี้เราจะไปออกตรวจศูนย์อาหารแล้วควบคุมอาหารคุณภาพต่ำด้วยกัน"
2003702-13 = "[s3] \"เดี๋ยวๆๆๆ อาหารคุณภาพต่ำเหรอ?\"\n[s4] \"ครูตามไม่ทันแล้ว\""
2003702-19 = "ครูเนี่ยละก็ ทำไมไม่รู้บ้างเลย"
2003702-20 = "ถ้างั้นฉันจะพูดให้เข้าใจง่ายๆ นะ"
2003702-21 = "ประมาณครึ่งชั่วโมงก่อนหน้านี้ ฉันได้ยินมาว่าร้านมาสเตอร์โดนัทที่อยู่ในศูนย์อาหารของสวนน้ำมี#nโดนัทสูตรใหม่มาขาย"
2003702-22 = "และถ้าเริ่มขายขึ้นมาละก็ คนต้องแห่กันมาซื้อเต็มร้านแน่ๆ"
2003702-23 = "[s] \"อื้ม แล้ว...?\""
2003702-24 = "นี่เป็นโอกาสที่ฉันจะได้ชิมโดนัทก่อนเริ่มขายน่ะสิ!"
2003702-25 = "แล้วก็ได้กินพร้อมกับผู้ตรวจตราที่มาควบคุมคุณภาพอาหารด้วย!"
2003702-26 = "ฉันไปศึกษาข้อปฏิบัติอย่างละเอียดมาแล้ว คนที่จะตรวจสอบคุณภาพอาหารได้ต้องเป็นกรรมการของ#nองค์การนักเรียนหรือไม่ก็คุณครูของชาเล่ต์น่ะ"
2003702-27 = "พูดเท่านี้ก็พอจะเข้าใจแล้วใช่มั้ย?"
2003702-28 = "[s] \"ฟุบุกิ นี่เธอ...\""
2003702-29 = "เพื่อความปลอดภัยและสนุกของลูกค้าสวนน้ำ และเพื่อวัฒนธรรมการบริโภคที่ถูกต้อง..."
2003702-30 = "ฉันกับคุณครูจึงมีสิทธิ์... ไม่สิ มีหน้าที่ในการชิมโดนัทสูตรใหม่ของมาสเตอร์โดนัทสาขาสวนน้ำ!"
2003702-34 = "[ns] \"กะไว้แล้วว่าต้องเป็นแบบนี้\""
2003702-35 = "เอาละ รีบไปกันเถอะ! เราต้องไปก่อนที่ร้านจะขายนะ!"
2003702-38 = "สวัสดีครับ!"
2003702-39 = "ขอบคุณที่มานะครับ แต่ตอนนี้ร้านเรายังไม่เปิดครับ ไว้อีกสักพักค่อยมาใหม่ได้มั้ยครับ?"
2003702-40 = "อื้อ ไม่เป็นไรหรอกๆ พวกเราไม่ใช่ลูกค้าทั่วไปน่ะ"
2003702-41 = "ฉันคือไลฟ์การ์ดของสวนน้ำ ส่วนคนนี้ก็ครูจาก... ไม่สิ ผู้ตรวจตราที่ทำหน้าที่ควบคุมคุณภาพอาหารน่ะ"
2003702-42 = "เรามาตรวจสอบคุณภาพอาหารก่อนที่จะวางขาย"
2003702-43 = "อ๊ะ! งั้นเหรอครับ! ถ้าอย่างนั้นผมก็ต้องให้ความร่วมมือสิครับ!"
2003702-44 = "งั้นขอเริ่มจากชิมอาหารได้มั้ย?"
2003702-45 = "ครับ ได้เลยครับ! ลองชิมโดนัทสูตรใหม่ที่จะวางขายวันนี้วันแรกมั้ยครับ?"
2003702-46 = "ดีจังนะที่เข้าเรื่องได้ไวแบบนี้"
2003702-50 = "งั้นฉันจะไม่ปฏิเสธละนะ"
2003702-52 = "ครับ นี่ครับ"
2003702-53 = "นี่คือเมนูที่ร้านของเราคิดค้นมาอย่างตั้งใจ..."
2003702-62 = "<โดนัทแตงกวา> ครับ!"
2003702-63 = "เราใส่แตงกวาสดใหม่ทั้งลูกลงไปในโดนัทเลยละครับ!"
2003702-64 = "วะ... ว่าไงนะ?! "
2003702-69 = "เมนูนี้ได้รับคำชมที่น่าประทับใจจากสมาชิกกลุ่มชิมอาหารชื่อดังท่านหนึ่งมาน่ะครับ!"
2003702-70 = "ถ้าจิ้มกับซอสมินต์วาซาบิ ก็จะยิ่งอร่อยกว่าเดิมอีกครับ!"
2003702-71 = "[s5] (นี่มันรสชาติอะไรกันเนี่ย...!)\n[s6] (ไม่อยากจินตนาการเลยว่ารสชาติจะเป็นยังไง...!)"
2003702-74 = "นี่... พวกฉัน... ต้องกินโดนัทอันนี้เหรอ?"
2003702-75 = "ต้องบอกว่ามันไม่ถูกปากฉัน... หรือควรจะสงสัยดีนะว่าของแบบนี้มันไปถูกปากใครกัน...!"
2003702-76 = "ฉันว่ามันไม่เหมาะสมจะมาเป็นของให้ชิมนะ...!"
2003702-77 = "[s] \"ฟุบุกิ ตั้งใจทำงานสิ\""
2003702-81 = "[ns] \"เพื่อความปลอดภัยและสนุกของลูกค้า เพื่อวัฒนธรรมการบริโภค...!\""
2003702-82 = "เอาละ งั้นก็รีบชิมเลยครับ!"
2003702-84 = "ผมเลือกชิ้นที่แตงกวาลูกใหญ่ให้เป็นพิเศษเลยนะครับ!"
2003702-86 = "ฮะ... เฮือก! ใหญ่ขนาดนี้ไม่ไหวหรอก...!"
2003702-88 = "(จากนั้นฟุบุกิก็ทนกินโดนัทแตงกวาจนหมด)"
2003702-89 = "(เมื่อกินเสร็จ ฟุบุกิก็ทำหน้าเหมือนจะร้องไห้ออกมา)"

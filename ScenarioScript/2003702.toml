2003702-38 = "2;도넛가게 주인;03;안녕하세요!\n#2;em;[음표]"
2003702-39 = "2;도넛가게 주인;03;찾아주셔서 감사합니다만, 아직 영업시간이 아닙니다. 이따가 와 주시겠어요?"
2003702-40 = "4;후부키 수영복ND;00;아, 괜찮아, 괜찮아. 우리는 일반 손님이 아니거든."
2003702-41 = "4;후부키 수영복ND;99;나는 파크의 라이프가드고, 이쪽은 샬레의 선, 아니 식품 위생 단속 감찰관이야."
2003702-42 = "4;후부키 수영복ND;02;영업 전에 식품의 상태를 점검하러 왔어."
2003702-43 = "2;도넛가게 주인;04;아! 그러셨군요! 그런 거라면 당연히 협조해야죠!\n#2;em;[!]"
2003702-44 = "4;후부키 수영복ND;10;그럼 시식을 부탁해도 될까?"
2003702-45 = "2;도넛가게 주인;03;아, 그럼요! 오늘부터 판매 예정인 신작 도넛을 맛보는 건 어떠신가요?"

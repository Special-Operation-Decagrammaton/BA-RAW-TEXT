[translation]
80000016-1 = "把你的胃"
80000016-2 = "夏萊．辦公室"
80000016-3 = "我正在等你呢，老師。"
80000016-4 = "今天是情人節。#n是墜入愛河的少女們將巧克力送給心儀的對象，傳達重要心意的日子……"
80000016-5 = "所以在這個難得的日子，我有個禮物想送給老師。"
80000016-11 = "……是特別為老師準備的巧克力。"
80000016-12 = "老師願意……收下嗎？"
80000016-13 = "（巧克力上裝著竊聽器）"
80000016-14 = "[s]「收到巧克力我很開心，不過上面的這是……？」"
80000016-15 = "呃，那個是……"
80000016-16 = "巧克力上的金屬裝置只是單純的裝飾而已。"
80000016-17 = "絕，絕對不是用來錄下老師生活聲音的竊聽器。"
80000016-18 = "[s]「為什麼總是要把竊聽器放在食物裡呢？」"
80000016-19 = "那，那是因為老師總是不收下裝有竊聽器的禮物……"
80000016-20 = "所以我想，要是和食物放在一起，老師說不定就會收下……"
80000016-21 = "[s1]「……要是把它吃下去，能在胃裡錄到周圍的聲音嗎？」\n[s2]「真的吃下去很危險吧……」"
80000016-22 = "……這麼說也對。#n要是老師把竊聽器吞下去，應該只能聽見胃發出的聲音而不是說話的聲音才對……"
80000016-23 = "……這麼說也對。#n要是老師把竊聽器吞下去，應該只能聽見胃發出的聲音而不是說話的聲音才對……"
80000016-24 = "……老師腸胃的聲音？"
80000016-25 = "好像也不錯……"
80000016-29 = "老師，可以請你張開嘴巴嗎？"
80000016-30 = "[s]「你，你想做什麼……」"
80000016-31 = "沒什麼，只是想讓老師吞下竊聽器而已。"
80000016-32 = "健康方面問題請不用擔心。"
80000016-33 = "我所製作的這個竊聽器是以和食物一起食用為前提設計的，#n既不會生鏽，也不會溶出對身體有害的成分。"
80000016-34 = "而且體積十分小巧，和水一起吞下就能輕鬆地進到胃裡。"
80000016-35 = "所以，請你聽話……張開嘴巴！"
80000016-36 = "[s]「小玉，不要啦！」"
80000016-38 = "（之後為了不吞下竊聽器，和小玉拉扯了好一陣子）"

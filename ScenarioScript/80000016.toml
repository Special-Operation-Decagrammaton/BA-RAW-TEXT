[translation]
80000016-1 = "#title;위장 속의 도청장치"
80000016-2 = "#place;샬레 업무관"
80000016-3 = "3;코타마;01;기다리고 있었습니다, 선생님.\n#3;a"
80000016-4 = "3;코타마;99;오늘은 발렌타인 데이. 사랑에 빠진 소녀들이 상대에게 초콜릿을 건네며 그동안 숨겨왔던 본심을 전달하는 날…….\n#3;em;[...]"
80000016-5 = "3;코타마;02;오늘을 맞아 저도 선생님께 드리고 싶은 선물이 있습니다."
80000016-6 = "#st;[0,0];instant;1;"
80000016-7 = "#clearST"
80000016-8 = "3;코타마;01\n#3;m5\n#wait;1000"
80000016-9 = "3;코타마;01\n#3;greeting\n#wait;1500"
80000016-10 = "3;코타마;01\n#wait;1500"
80000016-11 = "3;코타마;02;……선생님을 위해 특별히 준비한 초콜릿입니다."
80000016-12 = "3;코타마;05;받아…… 주시겠습니까?\n#3;stiff"
80000016-13 = "#na;(초콜릿 위에 도청장치가 설치되어 있다.)"
80000016-14 = "[s] \"선물은 기쁘지만…… 이건……?\""
80000016-15 = "3;코타마;04;어, 그건 그러니까…….\n#3;shake\n#3;em;[?!]"
80000016-16 = "3;코타마;02;초콜릿 위에 올려져 있는 금속 장치는 단순한 토핑입니다.\n#3;m3"
80000016-17 = "3;코타마;06;저, 절대로 주변의 소리를 녹음하는 도청장치가 아닙니다.\n#3;em;[땀]\n#3;stiff"
80000016-18 = "[s] \"어째서 자꾸 음식에 도청장치를 설치하는 거야?\""
80000016-19 = "3;코타마;99;그, 그건 선생님이 자꾸 도청장치가 설치된 선물을 받지 않으시니까…….\n#3;stiff"
80000016-20 = "3;코타마;04;아니. 선생님께서 음식 외의 선물은 받지 않으려 하시는 것 같아서…….\n#3;em;[속상함]"
80000016-21 = "[s1] \"그래도 음식에 기계 장치를 넣는 건 위험하잖아.\"\n[s2] \"실수로 도청장치를 삼키면 어떻게 해?\""
80000016-22 = "3;코타마;04;그렇군요. 만약 선생님이 도청장치를 삼키게 된다면 선생님의 말소리는커녕, 위장에서 나는 소리밖에 들을 수가 없으니…….\n#3;em;[반응]"
80000016-23 = "3;코타마;04;그렇군요. 만약 선생님이 도청장치를 삼키게 된다면 선생님의 말소리는커녕, 위장에서 나는 소리밖에 들을 수가 없으니…….\n#3;em;[반응]"
80000016-24 = "3;코타마;02;선생님의 위장 소리……?\n#3;stiff"
80000016-25 = "3;코타마;01;그건 또 나름 괜찮을지도…….\n#3;em;…\n#fontsize;55"
80000016-26 = "#st;[0,0];instant;1;"
80000016-27 = "#clearST"
80000016-28 = "3;코타마;01\n#3;d\n#wait;1000"
80000016-29 = "3;코타마;06;선생님, 잠시 입을 벌려주시겠습니까?\n#3;em;[반짝]\n#3;closeup\n#3;a"
80000016-30 = "[s] \"무, 무얼 하려는 거야?\""
80000016-31 = "3;코타마;02;별것 아닙니다. 선생님에게 도청장치를 먹이려는 것뿐입니다.\n#3;em;[반응]\n#3;closeup"
80000016-32 = "3;코타마;03;건강 문제라면 걱정하지 않으셔도 좋습니다.\n#3;closeup"
80000016-33 = "3;코타마;03;음식에 넣기 위해 제가 특수 제작한 이 도청장치는 녹이 스는 일은 물론이고 몸에 해로운 성분도 배어 나오지 않으니까요.\n#3;em;[음표]\n#3;closeup"
80000016-34 = "3;코타마;05;게다가 크기도 작으니 물과 함께 삼키면 금세 뱃속으로 들어갈 겁니다.\n#3;closeup"
80000016-35 = "3;코타마;06;그러니 이제 순순히…… 입을 벌려주세요!\n#3;em;[!]\n#3;hophop\n#3;closeup"
80000016-36 = "[s] \"싫어, 안 돼, 이러지 마!\"\n#bgshake"
80000016-37 = "#all;hide"
80000016-38 = "#na;(이후, 도청장치를 삼키지 않기 위해 코타마와 한동안 실랑이를 했다.)"

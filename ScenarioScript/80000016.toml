[translation]
80000016-1 = "อุปกรณ์ดักฟังที่ซ่อนมา"
80000016-2 = "สำนักงานชาเล่ต์"
80000016-3 = "กำลังรออยู่เลยค่ะ คุณครู"
80000016-4 = "วันนี้เป็นวันวาเลนไทน์ วันที่เด็กสาวที่มีความรักจะมอบช็อกโกแลตให้กับคนรัก เพื่อถ่ายทอด#nความรู้สึกที่เก็บไว้ในใจ..."
80000016-5 = "วันนี้ฉันมีของขวัญที่อยากให้คุณครูด้วยค่ะ"
80000016-11 = "ช็อกโกแลตที่ฉันเตรียมมาเป็นพิเศษเพื่อคุณครูโดยเฉพาะ"
80000016-12 = "ช่วยรับไป... ได้รึเปล่าคะ?"
80000016-13 = "(เห็นอุปกรณ์ดักฟังติดตั้งอยู่บนช็อกโกแลต)"
80000016-14 = "[s] \"ครูดีใจที่ได้ของขวัญอยู่หรอกนะ แต่นี่มันอะไรน่ะ...?\""
80000016-15 = "เอ่อ คือว่าเรื่องนั้น..."
80000016-16 = "อุปกรณ์โลหะที่วางอยู่บนช็อกโกแลตเป็นแค่ท็อปปิ้งเฉยๆ ค่ะ"
80000016-17 = "ฉะ...ฉันไม่ได้ติดตั้งอุปกรณ์ดักฟังเสียงรอบข้างไว้หรอกนะคะ"
80000016-18 = "[s] \"ทำไมถึงเอาอุปกรณ์ดักฟังมาติดไว้บนอาหารล่ะ?\""
80000016-19 = "ก็เพราะคุณครูไม่ยอมรับของขวัญที่ติดตั้งอุปกรณ์ดักฟังไว้สักที..."
80000016-20 = "ฉันเลยคิดว่าถ้าซ่อนไว้ในอาหารคุณครูน่าจะยอมรับไป..."
80000016-21 = "[s1] \"เอาอุปกรณ์ดักฟังมาติดบนอาหารมันอันตรายนะ\"\n[s2] \"ถ้าครูเผลอกลืนลงไปจะทำยังไงล่ะ?\""
80000016-22 = "นั่นสินะคะ ถ้าคุณครูเผลอกลืนเครื่องดักฟังเข้าไป คงไม่ได้ยินทั้งเสียงพูด แต่อาจได้ยิน#nเสียงในท้องคุณครูแทน..."
80000016-23 = "นั่นสินะคะ ถ้าคุณครูเผลอกลืนเครื่องดักฟังเข้าไป คงไม่ได้ยินทั้งเสียงพูด แต่อาจได้ยิน#nเสียงในท้องคุณครูแทน..."
80000016-24 = "เสียงในท้องของคุณครู...?"
80000016-25 = "อาจเป็นไอเดียที่ดีก็ได้..."
80000016-29 = "คุณครูช่วยอ้าปากหน่อยได้มั้ยคะ?"
80000016-30 = "[s] \"คะ...คิดจะทำอะไรน่ะ?\""
80000016-31 = "ไม่มีอะไรค่ะ ฉันแค่จะป้อนอุปกรณ์ดักฟังให้คุณครูทานเท่านั้นเองค่ะ"
80000016-32 = "ไม่ต้องห่วงเรื่องสุขภาพนะคะ"
80000016-33 = "นี่เป็นอุปกรณ์ดักฟังชนิดพิเศษที่ฉันทำขึ้นเพื่อใช้กับอาหารโดยเฉพาะ มันจะไม่ขึ้นสนิม#nแล้วสารเคมีที่อยู่ข้างในก็จะไม่รั่วไหลออกมาในท้องด้วยค่ะ"
80000016-34 = "มันมีขนาดเล็กมาก พอกลืนก็จะลงไปในกระเพาะอาหารได้อย่างรวดเร็วเลยละค่ะ"
80000016-35 = "เพราะงั้นคุณครู... ช่วยอ้าปากด้วยค่ะ!"
80000016-36 = "[s] \"ไม่เอาาาา อย่าทำแบบนี้สิ!\""
80000016-38 = "(หลังจากนั้นคุณครูก็ยื้อกับโคทามะอยู่พักใหญ่ เพื่อไม่ให้ตัวเองเผลอกลืนเครื่องดักฟังลงไป)"

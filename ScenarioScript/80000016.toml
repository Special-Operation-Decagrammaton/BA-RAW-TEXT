[translation]
80000016-1 = "Wiretapping Device in Disguise"
80000016-2 = "Schale Office"
80000016-3 = "I've been waiting, Sensei."
80000016-4 = "Today is Valentine's Day—when girls give chocolates to their love interests to confess their feelings."
80000016-5 = "So, I have a gift I'd like to give you."
80000016-11 = "I've prepared this chocolate muffin."
80000016-12 = "Will you accept it?"
80000016-13 = "There's clearly a wiretap device stuffed into the muffin."
80000016-14 = "[s] \"Uh, thanks, but...what's the deal with this part?\""
80000016-15 = "Ah, that. It's, um..."
80000016-16 = "If you're referring to the gadget stuffed into the muffin,#nit's just a topping."
80000016-17 = "That's all. It's not a wiretap for recording audio if that's what you're thinking."
80000016-18 = "[s] \"Why do you keep putting wiretaps in food?\""
80000016-19 = "B-Because you've been rejecting my other gifts with wiretaps..."
80000016-20 = "I thought hiding it in food would be more effective."
80000016-21 = "[s1] \"It doesn't seem very safe.\"\n[s2] \"What if I swallowed the wiretap by mistake?\""
80000016-22 = "You raise a good point. I would only be able to record the grumbling of your stomach and not your voice if you mistakenly ate the wiretap."
80000016-23 = "You raise a good point. I would only be able to record the grumbling of your stomach and not your voice if you mistakenly ate the wiretap."
80000016-24 = "Hmm. The grumbling of your stomach..."
80000016-25 = "I suppose that wouldn't be so bad to observe either."
80000016-29 = "Sensei, would you open wide for me?"
80000016-30 = "[s] \"What are you up to...?\""
80000016-31 = "Nothing. I was only going to place the wiretap."
80000016-32 = "Don't worry. It won't affect your health."
80000016-33 = "The wiretap was designed to be installed in food, so it's non-toxic.#nIt won't even rust, let alone make you sick."
80000016-34 = "And it's small enough to where you should be able to swallow it with a little bit of water—like a pill."
80000016-35 = "So please open wide!"
80000016-36 = "[s] \"Keep that thing away from me!\""
80000016-38 = "I resisted Kotama for a while to keep the wiretap out of my digestive system."

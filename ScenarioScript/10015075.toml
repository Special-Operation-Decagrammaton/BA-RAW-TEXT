[translation]
10015075-1 = "尾聲;大運動會當日"
10015075-7 = "唔唔……唔唔唔……"
10015075-8 = "那個機器人不行……大運動會上並沒有發射對戰車導彈的項目……"
10015075-9 = "高價租來的車輛……來自其他學校的賠償請求……"
10015075-11 = "這樣下去會破產的……！"
10015075-16 = "咦，咦咦？是夢嗎……？"
10015075-17 = "呼……太好了。#n真是個可怕的噩夢……"
10015075-18 = "不過也對，就算聚集了奇普托斯各地的學生，#n也不至於會有人在大運動會上胡亂發射對戰車導彈吧……"
10015075-19 = "話說回來，為何外面這麼亮？現在時間是……"
10015075-20 = "早上7點！？！？"
10015075-21 = "完蛋了！準備的工作還沒完成呢……！"
10015075-22 = "總之先換上運動服……不對，先發送緊急公文……！"
10015075-32 = "抱，抱歉！乃愛！#n我睡著了……！"
10015075-33 = "噓──"
10015075-34 = "……？"
10015075-35 = "請放低音量，優香醬。#n大家才剛睡著哦。"
10015075-36 = "那，那個……"
10015075-39 = "嘿嘿……這次的大運動會……也要把世界塗成各種顏色……"
10015075-40 = "唔唔……就算是老師的請求……要把泳裝改造成啦啦隊服……太為難人了……"
10015075-41 = "咕噥……我來說明一下大運動會的歷史……#n最初是奧德賽海洋高級中學的學生們為了在船上鍛鍊體力，才開始舉辦體育祭……"
10015075-42 = "……能量飲料……需要更多的能量飲料……"
10015075-44 = "呵呵，大家努力到很晚，好像都累壞了呢。"
10015075-45 = "大家……在這裡做什麼呢？"
10015075-50 = "這是備品的庫存清單和向相關學校提出的申請單。#n貝里塔斯的各位幫忙整理了。"
10015075-51 = "貝里塔斯幫忙做研討會的工作……？#n什麼意思？"
10015075-52 = "被竊取的器材和毀損的設施也已經修復完成……"
10015075-53 = "至於應援機器人……狀況不是很樂觀，這個部分就請你見諒囉。"
10015075-55 = "修理費的結算和報銷也都完成了……？"
10015075-56 = "等等，這原本是我的工作吧──"
10015075-57 = "呼啊……果然有點累了呢。"
10015075-58 = "我也要去睡一下，之後就拜託你了。"
10015075-60 = "等，等一下，乃愛！"
10015075-68 = "[ns]「優香，睡得好嗎？」"
10015075-69 = "啊……[USERNAME]老師。"
10015075-70 = "對不起。#n我把該做的事放在一旁，自顧自地睡著了……"
10015075-71 = "被你看到我不負責任的樣子，真是不好意思……"
10015075-72 = "[s1]「別這麼說，不用放在心上。」\n[s2]「沒關係。有稍微緩解疲勞了嗎？」"
10015075-75 = "嗯，可能是因為太久沒有睡得這麼熟，現在有股前所未有的清爽感……"
10015075-76 = "其他學生都在熬夜幫忙我處理工作，而我卻在睡大頭覺……#n一想到這點，就讓我內疚到胸痛……"
10015075-77 = "真是的……這麼勉強的話，怎麼不早點叫醒我呢？"
10015075-78 = "累成這副模樣，大家有辦法好好享受慶典嗎……"
10015075-79 = "[s]「……大家的想法可能跟你一樣吧？」"
10015075-80 = "咦？"
10015075-81 = "[s3]「畢竟是難得的大運動會。」\n[s4]「想讓最辛苦的優香也能好好享受慶典。」"
10015075-87 = "就算他們沒有花這麼多心力，我敢說我也能好好享受慶典的……"
10015075-89 = "……才怪。"
10015075-94 = "確實，如果要獨自處理那麼龐大的業務量……#n別說是享受慶典，大概等開幕式結束後我就會馬上睡著吧。"
10015075-95 = "……這次我欠大家一份人情。"
10015075-97 = "但是，現在還無法鬆懈。"
10015075-98 = "因為在大運動會結束之前，還是會不斷地發生零星的小事故。"
10015075-99 = "身為主辦這次大運動會的學園幹部，我會為了能讓大家盡情享受這場慶典繼續努力。"
10015075-100 = "[s5]「嗯，這樣的想法很棒。」\n[s6]「不過別太逞強唷。」"
10015075-103 = "……老師才是在逞強吧？"
10015075-104 = "從這情況來看，老師也為了幫助大家而沒有好好睡覺吧……"
10015075-105 = "就算是一下下也好，請老師也在開幕式開始前睡一覺吧。"
10015075-110 = "因為……我剛才說的「大家」也包含了老師……"
10015075-111 = "說好囉……？"
10015075-123 = "（之後，大運動會的準備進行得相當順利，平安迎來了開幕式）"
10015075-124 = "（雖然有部分學生因為得知比賽項目被追加了一些內容而引起騷動……）"
10015075-130 = "──即將開始選手宣誓。"
10015075-132 = "本次晄輪大祭的選手代表是由阿拜多斯高中的「奥空綾音」選手，以及──"
10015075-139 = "──三一綜合學園的「浦和花子」選手擔任。"
10015075-147 = "（……和之後發生在大運動會上的騷動相比，只不過是小巫見大巫罷了）"

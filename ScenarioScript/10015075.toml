[translation]
10015075-1 = "Epilogue; A Field Day's Dawn"
10015075-7 = "Ugh... Aughhh..."
10015075-8 = "Not that robot... No... There's no \"firing anti-tank missiles\" event for the field day..."
10015075-9 = "Expensive rental cars...damage claims from other schools..."
10015075-11 = "We're going to go bankrupt! My books!"
10015075-16 = "H-Huh? It was just a dream?"
10015075-17 = "Oh, thank goodness. That was the worst nightmare I've had in a while."
10015075-18 = "Kivotos students may be eccentric, but surely they wouldn't senselessly shoot around anti-tank missiles or detonate bombs as fireworks."
10015075-19 = "Wait a second... Why's it so bright outside? ...Wh-What time is it?!"
10015075-20 = "SEVEN? IN THE MORNING?!"
10015075-21 = "I'm done for! It's over! Where's my list? I still have so many things to do before the opening ceremony!"
10015075-22 = "Where do I start? Where's my uniform? Wait, no, I should get that official letter out first!"
10015075-32 = "N-Noa! Noa, I fell asleep, I'm so sorry."
10015075-33 = "Shhh, Yuuka. Everything is okay."
10015075-34 = "...What?"
10015075-35 = "Let's try to keep our voices down. The kids all just fell asleep."
10015075-36 = "Oh... S-Sorry..."
10015075-39 = "Heehee... The field day is my canvas and I'm gonna paint it..."
10015075-40 = "N-No, Sensei... Even if it's you asking... I won't make the cheerleading swimsuit.... I won't."
10015075-41 = "You see... The Halo Festival began many years ago... It all started with the Odyssey Maritime School...and they added the field day to enhance their physical strength..."
10015075-42 = "Eye...twitching... Need more...energy drinks...more..."
10015075-44 = "Haha. How adorable. They really put their all in, working through the night."
10015075-45 = "I'm confused. What's going on here?"
10015075-50 = "Here's the inventory supply list and all the entries we processed from other schools. Veritas helped me organize everything."
10015075-51 = "Veritas did this? They cooperated with Seminar?"
10015075-52 = "Indeed, they did. And we've restored all damaged facilities as well as stolen gym equipment."
10015075-53 = "The cheer bot is...still undergoing some difficulties, but I hope you can understand."
10015075-55 = "Wait, and the repair costs and claim settlements have been handled?"
10015075-56 = "I was supposed to do all of that. What did you—"
10015075-57 = "*yawn* Well, I think I'm going to go hit the hay. I'm pretty exhausted."
10015075-58 = "I'll come back after I've rested a little bit. There's still a few things left to be done, if you don't mind."
10015075-60 = "W-Wait. Noa!"
10015075-68 = "[ns] \"How did you sleep, Yuuka?\""
10015075-69 = "Oh... [USERNAME] Sensei."
10015075-70 = "I slept okay, but... I'm so sorry. I can't believe I was sleeping with so much work left to do."
10015075-71 = "I'm not normally this irresponsible. I don't know what to say."
10015075-72 = "[s1] \"It's okay, as long as you got some rest.\" \n[s2] \"Did you rest enough?\""
10015075-75 = "I can't say the last time I've slept through the night like that, so I feel really refreshed."
10015075-76 = "But it was at the cost of my fellow students. I was happily sleeping while they worked through the night."
10015075-77 = "They should've woken me up. I didn't want them to push themselves so hard."
10015075-78 = "They're not going to be able to enjoy the festival if they're so exhausted."
10015075-79 = "[s] \"Maybe they were all thinking the same thing.\""
10015075-80 = "What do you mean?"
10015075-81 = "[s3] \"The Halo Festival is really important to everyone, and no one worked harder than you.\"\n[s4] \"Maybe everyone wanted you to be able to enjoy the fruits of your labor.\""
10015075-87 = "I still could have enjoyed it without them working themselves to the bone!"
10015075-89 = "Well... I guess that's not entirely true."
10015075-94 = "You're right. If I had tried to finish the entire list on my own, I would've fallen asleep the moment the opening ceremony was done."
10015075-95 = "...They were really looking out for me. I owe something to everyone for this."
10015075-97 = "That means I have to be on alert more than ever though."
10015075-98 = "I'm sure more incidents will crop up throughout the festival."
10015075-99 = "As an executive of Millennium, I can't let their hard work go to waste. I'll use all the energy I recuperated and make sure everything goes smoothly from here on out."
10015075-100 = "[s5] \"Great idea. It's just like you.\"\n[s6] \"Make sure you don't push yourself too hard."
10015075-103 = "You have to make sure you're not overworking yourself, too, Sensei."
10015075-104 = "You stayed up all night with the students, didn't you?"
10015075-105 = "There's not much time left, but you should try to at least rest your eyes a little before the opening ceremony."
10015075-110 = "When I said I owe everyone for this, that meant you too."
10015075-111 = "So, promise me, okay? I can handle it from here."
10015075-123 = "The rest of the preparations for the field day went smoothly thanks to a well-rested Yuuka, and the opening ceremony was held without incident."
10015075-124 = "Well, mostly without incident. A few students rioted when it was announced that additional events were being added to the festivities."
10015075-130 = "Player representatives, please step up to the stadium to read the field day pledges."
10015075-132 = "The player representatives of the Kivotos Halo Festival are Okusora Ayane of Abydos High School and..."
10015075-139 = "Urawa Hanako of Trinity General School."
10015075-147 = "All in all, the opening ceremony was smooth as silk compared to the commotion that followed during the field day."

[translation]
10015075-1 = "บทส่งท้าย;เช้าวันงานมหกรรมแข่งขันกีฬา"
10015075-7 = "อะ... อือ....."
10015075-8 = "หุ่นยนต์นั่นไม่ได้นะ... ที่งานมหกรรมแข่งขันกีฬาไม่มีการแข่งขันยิงขีปนาวุธสักหน่อย..."
10015075-9 = "รถแพงๆ ที่เช่ามา... โรงเรียนอื่นมาเรียกร้องค่าเสียหาย..."
10015075-11 = "ถ้าเป็นแบบนี้ต้องล้มละลายกันหมดแน่...!"
10015075-16 = "เอ๊ะ เอ๋...? ฝันไปงั้นเหรอ...?"
10015075-17 = "เฮ้อ โล่งอกไปที เป็นฝันร้ายที่น่าขนลุกชะมัด..."
10015075-18 = "พอมาคิดๆ ดูแล้ว ถึงคิโวทอสจะมีนักเรียนแปลกๆ อยู่หลายคน แต่ก็คงไม่มีใครที่แปลกถึงขนาดที่เอา#nขีปนาวุธมาจุดเล่นแทนพลุในสถานที่แข่งขันหรอกมั้ง..."
10015075-19 = "จะว่าไป ทำไมข้างนอกมันถึงสว่างแบบนี้ล่ะ? กี่โมงแล้วเนี่ย..."
10015075-20 = "7 โมงเช้า?!!"
10015075-21 = "แย่แล้ว! ยังเหลืองานที่ต้องจัดการอีกตั้งเยอะ...!"
10015075-22 = "ต้องรีบไปเปลี่ยนเป็นชุดพละ... ไม่สิ ต้องจัดส่งเอกสารราชการด่วนก่อน...!"
10015075-32 = "ขะ... ขอโทษนะ โนอา! ฉันเผลอหลับไปทั้งๆ ที่ไม่รู้ตัวน่ะ...!"
10015075-33 = "ชู่ว..."
10015075-34 = "อะ... อื้ม?"
10015075-35 = "เบาเสียงลงหน่อยนะคะ ยูกะจัง ทุกคนเพิ่งจะหลับไปเมื่อสักครู่นี้เองค่ะ"
10015075-36 = "เอ่อ... อื้ม"
10015075-39 = "ฮิฮิ... งานมหกรรมแข่งขันกีฬาครั้งนี้... จะต้องเต็มไปด้วยสีสันมากมายเลยละ..."
10015075-40 = "อึก... ต่อให้เป็นคำขอของคุณครูก็เถอะ... แต่ชุดเชียร์ที่ไม่ต่างอะไรจากชุดว่ายน้ำนี่... ไม่ไหวหรอกนะ..."
10015075-41 = "งึมงำๆ... ถ้าจะให้อธิบายประวัติศาสตร์ของงานมหกรรมแข่งขันกีฬา... เป็นเทศกาลการแข่งกีฬาที่จัด#nขึ้นบนดาดฟ้าเรือโดยนักเรียนของโรงเรียนการเดินเรือโอดิสซีย์เพื่อฝึกฝนร่างกาย..."
10015075-42 = "...เครื่องดื่มชูกำลัง...เอาเครื่องดื่มชูกำลังมาอีก..."
10015075-44 = "ฮุฮุ สงสัยทุกคนจะเหนื่อยเพราะเมื่อวานทำงานกันจนดึกน่ะค่ะ"
10015075-45 = "ทุกคน... มาทำอะไรกันที่นี่น่ะ?"
10015075-50 = "นี่ค่ะ... รายการสถานะอุปกรณ์ในคลัง รายชื่อนักกีฬาที่ได้รับมาจากโรงเรียนที่เกี่ยวข้องค่ะ ฉันได้สมาชิกเวอริทัสทุกคนช่วยจัดการให้ค่ะ"
10015075-51 = "เวอริทัสมาช่วยงานของเซมิน่างั้นเหรอ...? หมายความว่ายังไงน่ะ?"
10015075-52 = "อุปกรณ์กีฬาที่ถูกขโมยไปกับสิ่งอำนวยความสะดวกที่เสียหายก็ได้คืนมาแล้ว..."
10015075-53 = "หุ่นยนต์เชียร์ก็... สภาพโดยรวมไม่ค่อยดีเท่าไร แต่ก็ช่วยเข้าใจด้วยนะคะ"
10015075-55 = "คิดบัญชีและทำเรื่องเบิกค่าซ่อมแซมเรียบร้อยแล้วเหรอ...?"
10015075-56 = "เดี๋ยวก่อนนะ แต่นั่นมันเป็นงานที่ฉันต้องเป็นคนจัดการนี่..."
10015075-57 = "ฮ้าว... ฉันเองก็ทำงานทั้งคืน ตอนนี้เลยเหนื่อยๆ นิดหน่อยน่ะค่ะ"
10015075-58 = "ว่าจะขอตัวไปนอนพักสักหน่อย ฝากจัดการงานที่เหลือด้วยนะคะ"
10015075-60 = "ระ...รอเดี๋ยวสิ! โนอา!"
10015075-68 = "[ns] \"หลับสบายดีมั้ย ยูกะ?\""
10015075-69 = "อ่า... คุณครู [USERNAME]"
10015075-70 = "ขอโทษด้วยค่ะ มีงานที่ต้องจัดการเยอะมากแท้ๆ แต่ฉันดันมาหลับไปซะได้..."
10015075-71 = "คุณครูต้องมาเห็นสภาพที่ไร้ความรับผิดชอบแบบนี้ น่าอายจริงๆ ค่ะ"
10015075-72 = "[s1] \"ไม่เป็นไรหรอก ไม่ต้องคิดมากนะ\"\n[s2] \"เป็นยังไงบ้าง พอจะหายเหนื่อยบ้างมั้ย?\""
10015075-75 = "ค่ะ รู้สึกสดชื่นแบบที่ไม่เคยเป็นมาก่อนเลยค่ะ คงจะเป็นเพราะว่าได้นอนพักแบบไม่มีอะไรมารบกวน..."
10015075-76 = "พอคิดว่าระหว่างที่นักเรียนคนอื่นกำลังทำงานโต้รุ่งแทนฉัน แล้วฉันเอาแต่นอนหลับไม่รู้เรื่องรู้ราว ก็รู้สึกผิดจนปวดท้องเลยค่ะ..."
10015075-77 = "จริงๆ เลยนะ... ถ้าจะต้องฝืนทำงานหนักกันขนาดนี้ทำไมถึงไม่ปลุกฉันล่ะ?"
10015075-78 = "ถ้าเหนื่อยกันขนาดนี้จะไปสนุกกับเทศกาลได้ยังไงกัน..."
10015075-79 = "[s] \"อาจเป็นเพราะว่าทุกคนก็คิดแบบนั้นเหมือนกันก็ได้นะ?\""
10015075-80 = "คะ?"
10015075-81 = "[s3] \"คงจะตื่นเต้นกับงานมหกรรมแข่งขันกีฬาที่นานๆ จะจัดสักทีน่ะ\"\n[s4] \"ทุกคนคงอยากให้ยูกะที่ทำงานหนักมาตลอดสนุกกับงานเทศกาลด้วยน่ะ\""
10015075-87 = "ถึงไม่เป็นห่วงกันขนาดนั้น ฉันก็คงหาทางสนุกเองได้อยู่แล้วละ..."
10015075-89 = "...ที่จริงก็ไม่น่าจะเป็นแบบนั้นหรอกค่ะ"
10015075-94 = "ค่ะ ถ้าฉันต้องจัดการงานทั้งหมดนั่นคนเดียว อย่าว่าแต่สนุกกับงานเทศกาลเลย หลังจบพิธีเปิดก็คงจะ#nเหนื่อยจนสลบไปทันทีเลยละค่ะ"
10015075-95 = "...ครั้งนี้ฉันติดหนี้ทุกคนซะแล้วนะคะ"
10015075-97 = "แต่ว่าเราจะยังวางใจไม่ได้หรอกนะคะ"
10015075-98 = "ตราบใดที่งานแข่งกีฬายังไม่จบ มันอาจจะมีอุบัติเหตุไม่คาดฝันเกิดขึ้นได้ทุกเมื่อค่ะ"
10015075-99 = "ในฐานะกรรมการจัดงานมหกรรมแข่งขันกีฬาครั้งนี้ ฉันจะพยายามต่อไปอย่างเต็มที่ เพื่อให้ทุกคนสนุก#nไปกับงานนี้ค่ะ!"
10015075-100 = "[s5] \"เป็นความคิดที่ดีเลยละนะ\"\n[s6] \"ถึงอย่างงั้นก็อย่าฝืนตัวเองเกินไปนะ\""
10015075-103 = "...คุณครูเองถึงจะพูดแบบนั้นแต่ก็กำลังฝืนทำงานหนักเกินไปอยู่รึเปล่าคะ?"
10015075-104 = "ดูจากสถานการณ์แล้วคุณครูเองก็คงอยู่ช่วยนักเรียนทั้งคืนจนไม่ได้หลับไม่ได้นอนเลยเหมือนกันนี่นะ..."
10015075-105 = "ก่อนที่พิธีเปิดจะเริ่ม คุณครูไปนอนพักเอาแรงสักหน่อยก็ยังดีนะคะ"
10015075-110 = "'ทุกคน' ที่ฉันพูดถึงเมื่อกี๊ รวมคุณครูอยู่ด้วยนะ..."
10015075-111 = "ต้องสัญญานะคะ...?"
10015075-123 = "(หลังจากนั้นก็เตรียมงานมหกรรมแข่งขันกีฬาอย่างราบรื่น และจัดพิธีเปิดได้โดยสวัสดิภาพ)"
10015075-124 = "(ถึงแม้ว่าจะมีนักเรียนบางส่วนที่พอเห็นรายการแข่งขันที่เพิ่มเข้ามาใหม่แล้วโวยวายกันอยู่บ้างก็ตาม...)"
10015075-130 = "อีกสักครู่ตัวแทนนักกีฬาที่จะนำกล่าวคำปฏิญาณเปิดงานจะเข้ามาในพิธีแล้วค่ะ..."
10015075-132 = "ตัวแทนนักกีฬาของฮาโลเฟสติวัลครั้งนี้ก็คือนักกีฬา 'โอคุโซระ อายาเนะ' จากโรงเรียนมัธยมอะบิดอส และก็..."
10015075-139 = "นักกีฬา 'อุราวะ ฮานาโกะ' จากโรงเรียนสามัญทรีนิตี้ค่ะ"
10015075-147 = "(...เป็นเหตุการณ์เล็กๆ เมื่อเทียบกับความวุ่นวายที่เกิดขึ้นในงานมหกรรมแข่งขันกีฬา)"

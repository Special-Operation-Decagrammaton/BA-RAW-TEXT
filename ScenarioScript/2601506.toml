[translation]
2601506-1 = "似曾相識"
2601506-4 = "[ns1]「無論真正的一花是什麼樣子！」\n[ns2]「我都會接受的！」"
2601506-7 = "……咦？"
2601506-8 = "這就是所謂的既視感嗎？#n還是老師失憶了……？"
2601506-9 = "……究竟怎麼回事？"
2601506-10 = "老師你剛才，是不是說了跟之前一模一樣的話……？"
2601506-11 = "[s]「嗯，沒錯。」"
2601506-12 = "咦，啊……"
2601506-13 = "……那是為什麼呢？"
2601506-14 = "難道是我上次沒有表達清楚嗎……"
2601506-15 = "……不對，這實在不太可能。老師應該都知道了才對。"
2601506-16 = "雖然我上次演得自己好像很危險一樣……"
2601506-17 = "但老實說，我並不想成為需要老師費心的學生。"
2601506-18 = "[s]「明明都開了那種玩笑……？」"
2601506-19 = "……啊，這麼說也有道理呢。"
2601506-20 = "從我演出那場戲的時間點開始，就已經成為需要老師費心的學生了。"
2601506-21 = "明明我沒有那個意思的。"
2601506-25 = "……？"
2601506-26 = "不過這和現在的對話有什麼關係？"
2601506-27 = "[s3]「現在我已經知道一花並不總是模範生了。」\n[s4]「所以至少在我面前的時候，不隱藏自己也沒關係。」"
2601506-30 = "哦哦，聽你這麼一說……"
2601506-31 = "……好像有道理？"
2601506-32 = "唔……唔嗯……"
2601506-33 = "哈哈，總覺得好像哪裡怪怪的。"
2601506-34 = "我本來是不想讓老師這麼做的，結果反而因此給了老師更正當的理由。"
2601506-35 = "啊，我沒有討厭的意思哦！"
2601506-36 = "準確來說，我只是希望老師不要對其他學生也做同樣的事情而已。"
2601506-37 = "畢竟……那樣可能會有危險。"
2601506-38 = "沒想到居然會因為演了那場戲，反而讓我想要隱藏的一面曝光了。"
2601506-39 = "哎呀～這下完全進退兩難了呢。"
2601506-40 = "既然都已經被看光了，繼續裝模作樣只會更奇怪吧。"
2601506-41 = "我果然不是什麼模範生啊。"
2601506-42 = "[s5]「我不是在責怪一花。」\n[s6]「只是希望你在我面前可以更輕鬆自在一點。」"
2601506-45 = "我就是在說這種地方啦……"
2601506-46 = "唉……"
2601506-47 = "好吧，我知道了。"
2601506-48 = "既然你都一再強調了……"
2601506-49 = "往後在老師面前，我會試著更坦率一點。"
2601506-50 = "不過我得先說清楚──"
2601506-55 = "──這一切，可都是老師自己造成的哦？"

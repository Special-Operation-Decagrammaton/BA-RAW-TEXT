[translation]
2601506-1 = "เคยเห็นมาแล้ว"
2601506-4 = "[ns1] \"ไม่ว่าจะเป็นอิจิกะคนไหนครูก็ชอบนะ!\"\n[ns2] \"ไม่ว่าจะเป็นอิจิกะคนไหนครูก็จะยอมรับนะ!\" "
2601506-7 = "หืม...? อ่า..."
2601506-8 = "อะไรเนี่ย เดจาวูเหรอ? หรือว่าสูญเสียความทรงจำขึ้นมา...?"
2601506-9 = "มันอะไรกันน่ะ...? "
2601506-10 = "เอ่อ คุณครูคะ เมื่อกี้พูดเหมือนกับคราวที่แล้วเลยหรือเปล่าคะ...?"
2601506-11 = "[s] \"อื้อ ใช่แล้วละ\""
2601506-12 = "อ้อ... อ่า... ค่ะ"
2601506-13 = "ทำไมเหรอคะ...?"
2601506-14 = "หรือว่าความรู้สึกของฉันยังถ่ายทอดออกไปไม่เพียงพอ..."
2601506-15 = "ไม่สิ... ไม่มีทางเป็นอย่างนั้นหรอก คุณครูตั้งใจใช่มั้ยคะ?"
2601506-16 = "คุณครู คราวที่แล้วที่ฉันแกล้งเล่นละครว่าถ้าตัวเองเป็นคนอันตรายขึ้นมาจะเป็นยังไงน่ะค่ะ"
2601506-17 = "แต่ถ้าให้พูดตามตรง ฉันไม่อยากเป็นนักเรียนที่ซุกซนหรอกค่ะ"
2601506-18 = "[s] \"แต่ก็แกล้งเล่นแบบนั้นน่ะนะ...?\""
2601506-19 = "อ่า... เป็นอย่างนั้นไปแล้วสินะ"
2601506-20 = "ตอนที่ฉันแกล้งเล่นละครแบบนั้น ฉันก็กลายเป็นนักเรียนที่ซุกซนไปแล้วสินะ"
2601506-21 = "ฉันไม่ได้มีเจตนาอย่างนั้นแท้ๆ"
2601506-25 = "...?"
2601506-26 = "แต่ว่าเรื่องนั้นมันเกี่ยวอะไรกับเรื่องที่เราคุยกันตอนนี้เหรอคะ?"
2601506-27 = "[s3] \"ครูรู้แล้วละว่าอิจิกะไม่ใช่นักเรียนดีเด่นตลอดเวลา\"\n[s4] \"อิจิกะไม่ต้องปิดบังอะไรจากครูหรอกนะ\""
2601506-30 = "อ่า... กลายเป็นแบบนั้น..."
2601506-31 = "ไปจนได้นะคะ...?"
2601506-32 = "อืม... อืมมม~..."
2601506-33 = "แหะๆ แต่ก็แปลกจังเลยนะคะ"
2601506-34 = "ฉันบอกครูไม่ให้ทำแบบนั้น แต่ก็กลับให้เหตุผลคุณครูในการทำแบบนั้น"
2601506-35 = "อ๊ะ ฉันไม่ได้ไม่ชอบหรอกนะคะ!"
2601506-36 = "ถ้าจะบอกให้ชัดเจน ฉันไม่อยากให้คุณครูต้องเจอแบบนี้จากนักเรียนคนอื่นที่ไม่ใช่ฉันน่ะค่ะ"
2601506-37 = "ก็เพราะมัน... อาจจะอันตรายได้"
2601506-38 = "แต่ว่า... การที่ฉันเล่นละครแบบนั้นไป มันกลับทำให้ฉันเปิดเผยส่วนที่อยากซ่อนไว้ออกมานะคะ"
2601506-39 = "อ่า~ ฉันแพ้เข้าให้แล้วสิคะ"
2601506-40 = "คุณครูได้เห็นสิ่งที่ไม่เคยเห็นจากฉันไปแล้ว จากนี้ฉันคงใช้เล่ห์เหลี่ยมอะไรไม่ได้แล้วละค่ะ"
2601506-41 = "ฉันคงไม่ใช่นักเรียนดีเด่นจริงๆ ด้วยค่ะ"
2601506-42 = "[s5] \"ครูไม่ได้จะตำหนิอิจิกะหรอกนะ\"\n[s6] \"ครูแค่อยากให้ทำตัวตามสบายตอนอยู่กับครูน่ะ\""
2601506-45 = "ก็นั่นละค่ะ..."
2601506-46 = "อ่า... อืม... เฮ้อ..."
2601506-47 = "ค่ะ เข้าใจแล้วค่ะ"
2601506-48 = "ถ้าคุณครูจะย้ำอย่างนี้เรื่อยๆ"
2601506-49 = "จากนี้ไปฉันจะพยายามซื่อตรงกับคุณครูให้มากขึ้นค่ะ"
2601506-50 = "ขอบอกไว้ล่วงหน้านะคะ"
2601506-55 = "ทั้งหมดนี้คุณครูเริ่มเองนะคะ...?"

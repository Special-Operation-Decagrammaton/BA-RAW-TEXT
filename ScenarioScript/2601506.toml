[translation]
2601506-1 = "Already Seen It"
2601506-4 = "[ns1] \"Ichika, I'll always accept you!\"\n[ns2] \"No matter who you are!\" "
2601506-7 = "...What?"
2601506-8 = "Is this déjà vu? Or do I have amnesia?"
2601506-9 = "...What's going on here? "
2601506-10 = "Didn't you say the same exact thing last time, Sensei?"
2601506-11 = "[s] \"Yes, I did.\""
2601506-12 = "Uh, right. Okay."
2601506-13 = "...So, what are you doing?"
2601506-14 = "Did I not do enough to get my message across?"
2601506-15 = "...No, I definitely did. You're doing this on purpose."
2601506-16 = "Look, I was just kidding when I said I was a dangerous person and all that jazz."
2601506-17 = "So you really don't have to treat me like a delinquent student."
2601506-18 = "[s] \"After that prank you pulled, though...\""
2601506-19 = "...I guess I have no ground to stand on there."
2601506-20 = "I'm the one who brought this about when I acted out."
2601506-21 = "That really wasn't how I meant things to play out, though."
2601506-25 = "...?"
2601506-26 = "But why are you bringing this up now?"
2601506-27 = "[s3] \"Now I know that you're not a model student all the time.\"\n[s4] \"So you don't have to hide things from me anymore.\""
2601506-30 = "I guess..."
2601506-31 = "...that makes sense?"
2601506-32 = "Um... Hmmm."
2601506-33 = "Haha. This is odd."
2601506-34 = "I was trying to dissuade you entirely, but now you're coming on even stronger."
2601506-35 = "Ah! I didn't mean that in a bad way."
2601506-36 = "I'd just like to clarify that I was trying to say that you shouldn't act that way with other students too."
2601506-37 = "Someone's seriously going to take advantage of you one day."
2601506-38 = "But...I guess there's a little truth behind every lie, huh?"
2601506-39 = "Wow, what a conundrum."
2601506-40 = "I can't deny what you've already seen, after all."
2601506-41 = "I'm not the model student everyone thinks I am."
2601506-42 = "[s5] \"I'm not trying to say that either, Ichika.\"\n[s6] \"I just wish you'd relax a bit more when you're with me.\""
2601506-45 = "That's exactly what I'm talking about..."
2601506-46 = "Um... *sigh*"
2601506-47 = "Okay. I get it."
2601506-48 = "Since you insist."
2601506-49 = "When it's just the two of us, I'll try to be myself."
2601506-50 = "But I'm warning you in advance."
2601506-55 = "You're the one who signed up for this, Sensei!"

[translation]
61010-1 = "第1話;枷鎖"
61010-4 = "哈啊……哈啊……哈啊……哈啊……"
61010-11 = "哈啊……哈啊……哈啊……唔……"
61010-16 = "咳……！咳咳，咳咳……！"
61010-21 = "……稍微休息一下再走吧。"
61010-22 = "呼……呼……呼……"
61010-30 = "……嘿嘿。"
61010-31 = "還以為只要到外面去，就能有所改變的說。"
61010-32 = "嗯，沒錯。"
61010-33 = "只要到了外面，一切都會跟以前不一樣。"
61010-35 = "如果是那些孩子們。"
61010-36 = "是小隊走過的路的話……"
61010-37 = "就算是我，應該也能跟上吧。"
61010-39 = "……下雨了。"
61010-40 = "（好冷……）"
61010-41 = "（指尖已經沒有感覺了……）"
61010-42 = "還得……繼續走下去才行……"
61010-53 = "嗯？才工作五天就想跟我要薪水？"
61010-54 = "那可不行！而且你連合約都沒簽吧？"
61010-56 = "奧利斯？我從來沒聽說過那種地方啊？"
61010-57 = "等等，那不就等於沒有學籍嗎？#n看來我能隨意使喚你了啊……"
61010-59 = "去把這件事辦好。"
61010-60 = "……辦不到？為什麼？#n真讓人失望，你們不是特別接受過這種訓練嗎？"
61010-61 = "問我怎麼知道的？#n我也有能打聽這類消息的管道啊。"
61010-62 = "不打算再做那種事了？#n不想再跟那方面的工作扯上關係？"
61010-63 = "明明是唯一會做的事卻不想做，真是可笑。"
61010-64 = "況且你也沒辦法找到正經的工作吧。"
61010-65 = "滾吧。如果不打算接受就別浪費我的時間。"
61010-67 = "……全都是錯覺。"
61010-68 = "怎麼可能會有那種好事。"
61010-69 = "怎麼可能所有事情都能輕鬆解決。"
61010-70 = "怎麼可能一切……都跟想像中一樣順利。"
61010-71 = "誤會是個人的自由，但代價可不是。"
61010-73 = "[log=마이아 언노운]逃向的地方並不存在什麼樂園。[/log]"
61010-75 = "[log=마이아 언노운]這種事我早已心知肚明。[/log]"
61010-77 = "[log=마이아 언노운]但我還是想做夢。[/log]"
61010-80 = "[log=마이아 언노운]我也想感受……希望存在的那種感覺。[/log]"
61010-82 = "[log=마이아 언노운][ff4444]……或許，那本身就是場夢吧。[-][/log]"
61010-85 = "啊啊……"
61010-86 = "不過，我還是回來了。"
61010-87 = "雖然不會有所改善，心情卻感覺輕鬆了一些。"
61010-88 = "奧利斯分校。"
61010-90 = "我成長的地方。"
61010-91 = "我經歷過的地方。"
61010-92 = "我……接受教育的地方。"
61010-93 = "我們的「學園」。"
61010-100 = "你回來了呢。"
61010-106 = "咦……？"
61010-107 = "總之先好好休息吧。#n我知道，你有很多話想說。"
61010-108 = "前輩……"
61010-109 = "昴前輩……！"
61010-110 = "沒錯，是我梯昴哦。"
61010-111 = "你是立木舞彩，對吧？#n慢慢說沒關係。"
61010-112 = "就算你被世界拒於門外……我和奧利斯也不會拋棄你的。"
61010-113 = "是……是！"
61010-115 = "[log=스바루]歡迎回來。[/log]"
61010-117 = "[log=스바루][ff4444]回到我們的奧利斯。[-][/log]"
61010-121 = "下一話;學生的本分！"

[translation]
61010-1 = "ตอนที่ 1;บ่วง"
61010-4 = "แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก..."
61010-11 = "แฮ่ก... แฮ่ก... ฮ่า... อึก..."
61010-16 = "อึก...! แค่ก... แค่ก... แค่กๆ... แค่ก...!"
61010-21 = "พักก่อน... แล้วค่อยไปต่อแล้วกัน..."
61010-22 = "ฮู่ว... ฮู่ว... ฮู่ว..."
61010-30 = "เหอะๆ..."
61010-31 = "คิดว่าออกไปข้างนอกแล้วจะหาทางออกได้เสียอีก"
61010-32 = "อื้อ ใช่แล้วละ"
61010-33 = "คิดว่าพอออกมาอยู่ข้างนอก จะได้เจออะไรแตกต่างไปเสียอีก"
61010-35 = "ข้างนอก..."
61010-36 = "ที่สควอดพวกนั้นออกไป..."
61010-37 = "คิดว่าคนอย่างฉันก็จะตามไปได้เสียอีก"
61010-39 = "ฝน... เริ่มตกแล้วสินะ"
61010-40 = "(หนาวจัง...)"
61010-41 = "(ปลายนิ้วชาจนไม่รู้สึกอะไรเลย...)"
61010-42 = "แต่ก็ต้องไปต่อละนะ..."
61010-53 = "หืม? ทำงานมาได้ 5 วันแล้ว ก็เลยจะเบิกค่าจ้างเหรอ?"
61010-54 = "เห็นทีคงไม่ได้หรอก! เราไม่ได้เซ็นสัญญาจ้างงานกันไว้สักหน่อย"
61010-56 = "อาเรียส? อยู่ที่ไหนน่ะ? ไม่เห็นเคยได้ยินมาก่อนเลย"
61010-57 = "เดี๋ยวนะ งั้นก็แสดงว่าเธอไม่ได้อยู่ในทะเบียนของโรงเรียนน่ะสิ? ถ้างั้นก็ใช้งานได้ตามใจเลยสินะ...?"
61010-59 = "รับงานนี้ไปทำซะ"
61010-60 = "ทำไม่ได้งั้นเหรอ? ทำไมล่ะ? น่าผิดหวังชะมัด นี่พวกเธอไม่ได้รับการฝึกฝนระดับมืออาชีพมาเพื่องาน#nแบบนั้นหรอกเหรอ?"
61010-61 = "ฉันรู้ได้ยังไงน่ะเหรอ? ก็มีสายข่าวคอยรายงานเรื่องแบบนั้นอยู่บ้างน่ะสิ"
61010-62 = "ว่าไงนะ ไม่คิดจะทำงานแบบนั้นแล้ว แล้วก็ไม่อยากเกี่ยวข้องกับงานด้านนั้นอีกต่อไปแล้วด้วย?"
61010-63 = "ไม่ตลกเลยนะ จะเลิกทำสิ่งเดียวที่ตัวเองทำได้อย่างนั้นเหรอ"
61010-64 = "ตัวเองไม่ได้อยู่ในสถานะที่จะหางานดีๆ ทำได้แท้ๆ"
61010-65 = "กลับไปเถอะ ถ้าไม่รับงานจากฉัน ฉันก็ไม่อยากเสวนากับคนอย่างเธออีก"
61010-67 = "ฉันเข้าใจผิด... ไปทุกอย่างเลย"
61010-68 = "มันจะเป็นแบบนั้นไปได้ยังไงกันล่ะ"
61010-69 = "ไม่มีทางที่เรื่องจะคลี่คลายง่ายๆ ขนาดนั้น"
61010-70 = "มันไม่มีทาง... ที่ทุกๆ อย่างจะเป็นไปตามที่คิดอยู่แล้ว"
61010-71 = "จะคิดผิดยังไงก็ได้ แต่มันก็ต้องมีราคาที่ต้องจ่ายอยู่ดี"
61010-73 = "[log=마이아 언노운]ไม่มีแดนสวรรค์รออยู่ในที่ที่หลบหนีไป[/log]"
61010-75 = "[log=마이아 언노운]เรื่องนั้นฉันพอรู้ดี[/log]"
61010-77 = "[log=마이아 언노운]แต่ถึงอย่างนั้นฉันก็อยากฝัน[/log]"
61010-80 = "[log=마이아 언노운]ฉันเองก็อยากรับรู้ถึง... สิ่งที่เรียกว่าความหวังที่รออยู่[/log]"
61010-82 = "[log=마이아 언노운][ff4444]บางทีสิ่งนั้นอาจจะเป็นความฝันเลยก็ได้...[-][/log]"
61010-85 = "อ่า..."
61010-86 = "แต่ถึงยังไงก็ได้กลับมาแล้ว"
61010-87 = "ถึงมันจะไม่ทำให้อะไรดีขึ้น แต่ฉันก็โล่งใจขึ้นนะ"
61010-88 = "โรงเรียนสาขาอาเรียส"
61010-90 = "ที่ที่ฉันเติบโตมา"
61010-91 = "ที่ที่ฉันผ่านร้อนผ่านหนาวมา"
61010-92 = "ที่ที่ฉัน... เคยได้รับการศึกษา"
61010-93 = "ที่ที่เป็น 'โรงเรียน' ของพวกเรา"
61010-100 = "กลับมาแล้วสินะคะ"
61010-106 = "หืม...?"
61010-107 = "ฉันรู้ค่ะว่ามีหลายเรื่องที่อยากเล่า แต่ไปพักผ่อนก่อนเถอะค่ะ"
61010-108 = "รุ่นพี่..."
61010-109 = "รุ่นพี่สุบารุ...!"
61010-110 = "ค่ะ ฉันเองค่ะ คาเกฮาชิ สุบารุ"
61010-111 = "ชื่อทะชิกิ ไมอา... ใช่มั้ยคะ? ไม่เป็นไรค่ะ ค่อยๆ เล่าให้ฉันฟังก็ได้"
61010-112 = "ต่อให้โลกใบนี้จะทอดทิ้งคุณ แต่ฉันกับอาเรียสยังไม่ทิ้งคุณนะคะ"
61010-113 = "ค่ะ... ค่ะ!"
61010-115 = "[log=스바루]ยินดีต้อนรับกลับมาค่ะ[/log]"
61010-117 = "[log=스바루][ff4444]ยินดีต้อนรับสู่อาเรียสของเรา[-][/log]"
61010-121 = "ตอนต่อไป;หน้าที่หลักของนักเรียน!"

[translation]
13040-1 = "ตอนที่ 4;สิ่งที่ล่วงเลยไป"
13040-2 = "ทะ... ทะ... ทำไมถึงเป็นแบบนี้ไปได้นะ..."
13040-3 = "หึหึหึ ทำไมน่ะเหรอ? ก็เพราะว่าเธอเชื่อใจคนอื่นง่ายน่ะสิ"
13040-4 = "ฮือ... ฉันไม่ได้เชื่อคนง่ายสักหน่อย... แต่นี่เป็นงานมั่นคงที่จะได้เงินเดือนจากการทำงาน 90 ชั่วโมง ต่อสัปดาห์ไม่ใช่เหรอคะ...?"
13040-5 = "ในเขตปกครองตนเองที่จะพังแหล่ไม่พังแหล่แบบนี้ จะไปมีงานจับกังที่มั่นคงได้ยังไง! "
13040-6 = "ใช่แล้วละ ถ้าจะมีก็คงมีแค่การทำงานใช้แรงงาน 90 ชั่วโมงต่อสัปดาห์นั่นแหละ"
13040-7 = "ละ... แล้วเงินเดือนล่ะคะ...?"
13040-8 = "จะไปมีให้ได้ยังไงเล่า! หึหึหึหึ!"
13040-10 = "บะ... แบบนี้ไม่ได้สิคะ... ฉันต้องหาเงินมาใช้หนี้ของโรงเรียนนะ จะใช้แรงงานแล้วไม่จ่ายเงินได้ยังไง... และถ้าฉันไม่รีบกลับไป รุ่นน้องจะเป็นห่วงเอาด้วย..."
13040-12 = "ตอนนี้เธออยู่ในสภาพที่จะกังวลเรื่องอะไรแบบนั้นได้ด้วยเหรอ?"
13040-13 = "อีกอย่าง ในอาคารนี้ก็มีแต่สมุนของฉันเต็มไปหมด ไม่มีใครจะช่วยเธอได้หรอกนะ"
13040-14 = "เพราะงั้น..."
13040-18 = "หืม...?"
13040-19 = "แผ่นดินไหวเหรอ? ทำไมอาคารถึงสั่น..."
13040-23 = "ถึงเวลาแห่งการพิพากษาแล้ว~! เจ้าพวกนักเลง~!!"
13040-24 = "วะ... ว้ากกก?! "
13040-25 = "อะ... อะไรน่ะ?!"
13040-27 = "ฮะ... โฮชิโนะจัง...?!"
13040-28 = "เจอตัวแล้วสักทีนะคะรุ่นพี่! เรายุ่งกันจะตายอยู่แล้ว ถ้าหายไปแบบนี้อีกก็แย่สิคะ!"
13040-29 = "รีบกลับกันเถอะค่ะ เรามีงานที่ต้องทำกันอีกเพียบเลยนะคะ!"
13040-31 = "ทะ... ทำอะไรของเธอน่ะ!"
13040-32 = "เฮ้! ทางนี้! เรียกสมุนมาตรงนี้ให้หมด!"
13040-34 = "คงไม่มีใครมาหรอก ฉันจัดการเจ้าพวกที่อยู่ในอาคารนี้หมดแล้ว"
13040-36 = "วะ... ว่าไงนะ?!"
13040-37 = "คน... คนเยอะขนาดนั้น...?! จัดการไปตอนไหน...?!  ตะ... ตัวคนเดียวด้วย...?!"
13040-46 = "อ๊ากกกก! "
13040-47 = "โอ๊ยยย!! "
13040-51 = "ฮือออ... น่ากลัวมากเลย โฮชิโนะจัง..."
13040-52 = "กลัวแล้วทำไมถึงไปโดนผู้ใหญ่แปลกๆ หลอกเข้าอีกล่ะคะ"
13040-53 = "ก็..."
13040-54 = "ตอนนี้เขตปกครองตนเองอะบิดอสเป็นพื้นที่ไร้กฎหมายนะคะ พอผู้คนพากันย้ายออกไป ในเมืองก็ว่างเปล่าและก็เสื่อมโทรมด้วยค่ะ"
13040-55 = "และพอเป็นแบบนี้ พวกอันธพาลที่อยู่ทั่วคิโวทอสก็เลยแห่กันมาที่อะบิดอส"
13040-56 = "เพราะงั้นถ้ารุ่นพี่เจอใครที่ไม่คุ้นหน้า ก็ขอให้คิดไว้ก่อนเลยค่ะว่าเป็นคนไม่ดี"
13040-57 = "แต่ว่า... ถ้าเป็นคนที่เจอสถานการณ์ยากลำบากมาจริงๆ จะทำยังไงล่ะ? "
13040-58 = "ไม่มีทางเป็นอย่างนั้นหรอกค่ะ ในอะบิดอสไม่มีคนดีอยู่หรอก ทุกคนเป็นคนไม่ดีที่มีแผนร้ายในใจกันทั้ง#nนั้นแหละ!"
13040-59 = "อืม... แต่ว่า..."
13040-60 = "คนที่ยื่นมือเข้าไปช่วยก่อน คนนั้นจะถูกทรยศนะคะ! ถ้าอยากรักษาโรงเรียนของเราไว้ เราก็ต้องสงสัยในตัวคนอื่นเข้าไว้ค่ะ!"
13040-64 = "เพราะงั้นจากนี้ไปก็มากระตือรือร้นให้มากขึ้น..."
13040-65 = "โฮชิโนะจัง"
13040-66 = "......?"
13040-67 = "ไม่หรอก โฮชิโนะจัง แบบนั้นไม่ได้หรอกนะ"
13040-72 = "ระ... รุ่นพี่ยูเมะ..."
13040-76 = "ฟังให้ดีนะ โฮชิโนะจัง นี่คือเรื่องสำคัญ"
13040-77 = "นี่... เข้ามาใกล้กันเกินไป... แล้วนะคะ"
13040-82 = "โฮชิโนะจัง ความสงสัย ความไม่ไว้วางใจ ความรุนแรง การโกหก... ถ้าเราเริ่มชินกับสิ่งเหล่านี้มากขึ้น..."
13040-83 = "สักวันหนึ่งพวกเราก็จะเป็นคนแบบนั้นเหมือนกัน"
13040-85 = "......"
13040-86 = "ถึงแม้เราจะทำแบบนั้นเพื่อปกป้องอะบิดอส... แต่นั่นก็ไม่ใช่อะบิดอสที่เราปรารถนาหรอก"
13040-87 = "ถ้าอะบิดอสของเราถูกจดจำว่าเป็นสถานที่แห่งความไม่ไว้วางใจ ความรุนแรง และการโกหก... ฉันก็คงเสียใจนะ"
13040-88 = "เพราะงั้น โฮชิโนะจัง ถ้าเจอคนที่กำลังมีปัญหา ฉันก็อยากให้เรายื่นมือเข้าช่วย ถ้าไปเจอคนที่หนาว และหิวโหย เราก็ให้เสื้อผ้าและอาหาร..."
13040-89 = "......"
13040-90 = "ฉันเป็นคนหัวไม่ดี คงอธิบายอะไรได้ไม่ละเอียด..."
13040-91 = "แต่โฮชิโนะจังก็น่าจะเข้าใจสิ่งที่ฉันพยายามจะสื่อนะ ใช่มั้ย?"
13040-95 = "โลกสวยเกินไปรึเปล่าคะ รุ่นพี่ยูเมะ ถ้าทำอย่างนั้นแล้วถูกหักหลังขึ้นมาจะทำยังไงคะ? แล้วถ้ารุ่นพี่ไปตกอยู่ในอันตรายเหมือนตอนนั้นอีกล่ะ?"
13040-96 = "ถ้าเป็นแบบนั้น โฮชิโนะจังจะมาช่วยอีกไหมนะ...?"
13040-97 = "ก็... คงจะเป็นอย่างนั้นอยู่หรอกค่ะ"
13040-98 = "ฮิฮิฮิ..."
13040-99 = "อะ... อะไรคะ?"
13040-100 = "อื้ม! ต้องจดคำนั้นไว้แล้วละ โฮชิโนะจังจะได้ไม่ลืมไง!"
13040-101 = "คะ?!"
13040-107 = "ทะ... ทำอะไรคะเนี่ย?! อย่าจดนะคะ! ไปจดบทสนทนาที่น่าอายในสมุดโน้ตแปลกๆ ทำไมคะ!! "
13040-108 = "จะว่าไป รุ่นพี่ไม่คิดอยากเปลี่ยนสมุดโน้ตเหรอคะ? ไม่ได้เป็นเด็กประถมแล้วนะ..."
13040-109 = "จริงสิ รุ่นพี่ยูเมะ ฉันมีแผนการที่คิดเอาไว้ค่ะ"
13040-110 = "มันเป็นวิธีที่จะทำให้ความสงบเรียบร้อยของอะบิดอสดีขึ้นกว่าเดิมน่ะ..."
13040-111 = "รุ่นพี่ยูเมะ...?"
13040-115 = "รุ่นพี่ยูเมะ...?"

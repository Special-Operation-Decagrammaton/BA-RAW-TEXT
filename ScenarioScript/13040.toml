[translation]
13040-1 = "第4話;那些逝去的事物"
13040-2 = "嗚嗚……怎麼會變成這樣。"
13040-3 = "呵呵，怎麼會變成這樣？#n還不是因為你太輕易相信別人。"
13040-4 = "嗚……我沒有輕易相信……#n可是這不是每週工作90小時就能拿到薪水的工作嗎……？"
13040-5 = "在這種快完蛋的自治區裡，怎麼可能會有老實給錢的工作呢！"
13040-6 = "沒錯沒錯，只有每週工作90小時是真的！"
13040-7 = "那，那薪水呢……？"
13040-8 = "當然是沒有啦！嘻嘻嘻嘻──！"
13040-10 = "這，這樣我會很困擾的……我必須要還學校的債，無償工作實在有點……#n而且不趕快回去的話，後輩會擔心我的……"
13040-12 = "現在是擔心那種事情的時候嗎？"
13040-13 = "是啊，再說了，這棟建築裡到處都是我們的手下，沒人會幫你的啦！"
13040-14 = "所以……"
13040-18 = "……嗯？"
13040-19 = "地震嗎？怎麼好像有震動……"
13040-23 = "審判時刻到了～！你們這些強盜！！"
13040-24 = "哇，哇啊啊啊──！？"
13040-25 = "搞，搞什麼！？"
13040-27 = "星，星野醬……！？"
13040-28 = "前輩，我找你好久了！#n都快忙死了，你一直不在會讓我很困擾！"
13040-29 = "趕快回去吧。要做的事已經堆積如山了！"
13040-31 = "你這傢伙在幹什麼？"
13040-32 = "喂，喂！把手下通通叫來這邊！"
13040-34 = "應該不會有人來喔？#n這棟建築物裡的人已經全部被我收拾掉了。"
13040-36 = "什麼！？"
13040-37 = "是，是什麼時候……！？#n居然一個人就把那麼多人給……！？"
13040-46 = "呃，呃啊啊啊──！"
13040-47 = "咕啊啊啊──！！"
13040-51 = "嗚嗚，嗚嗚嗚……我好害怕哦，星野醬……"
13040-52 = "你怎麼又被那些奇怪的大人給騙了？"
13040-53 = "可是……"
13040-54 = "現在的阿拜多斯自治區已經越來越無法無天了。#n隨著人們的離開，空蕩的城市也開始發展成貧民窟。"
13040-55 = "只有奇普托斯各處的不良份子在不斷湧入。"
13040-56 = "基本上只要是沒看過的陌生人，都可以當成是壞人。"
13040-57 = "可是……要是他們真的是有困難的人該怎麼辦？"
13040-58 = "那怎麼可能。#n阿拜多斯沒有善良的人，全部都是心懷鬼胎的壞蛋！"
13040-59 = "嗚嗚……但是……"
13040-60 = "要是先釋出善意會被人背叛的！#n要不斷地懷疑懷疑再懷疑！這樣才可以保護我們的學校！"
13040-64 = "所以從現在起，要更積極地……"
13040-65 = "星野醬。"
13040-66 = "……？"
13040-67 = "星野醬，這樣是不對的。"
13040-72 = "夢，夢前輩……？"
13040-76 = "這是重要的事，要仔細聽哦，星野醬。"
13040-77 = "那個……太，太靠近了……"
13040-82 = "懷疑、不信任、暴力、謊言……#n當我們逐漸對這些事情感到習以為常……"
13040-83 = "總有一天也會變成那種人的。"
13040-85 = "……"
13040-86 = "就算這種方法能拯救阿拜多斯……那也並不是我們所盼望的阿拜多斯。"
13040-87 = "如果人們印象中的阿拜多斯是個充滿不信任、暴力和謊言的地方……#n會讓我有點傷心。"
13040-88 = "所以星野醬，如果發現有人身處困境，希望你可以先釋出善意。#n要是遇到有人挨餓受凍，希望你願意給他們飯菜和衣物……"
13040-89 = "……"
13040-90 = "雖然我是個笨蛋，沒辦法解釋得很清楚……"
13040-91 = "不過星野醬一定能理解我的意思，對吧？"
13040-95 = "……這種想法太安逸了，夢前輩。#n要是這麼做，結果被背叛該怎麼辦？要是前輩又像現在這樣遇到危險該怎麼辦？"
13040-96 = "那個時候，星野醬也會來救我的對吧？"
13040-97 = "……這倒是沒錯。"
13040-98 = "耶嘿嘿……"
13040-99 = "什，什麼啦？"
13040-100 = "嗯！為了不忘記星野醬說的這句話，我要把它寫下來！"
13040-101 = "啊！？"
13040-107 = "等，等一下！不要寫下來啦！#n而且還是在品味這麼奇怪的手冊裡……寫這麼羞恥的東西……！！"
13040-108 = "話說前輩不打算換一本手冊嗎？又不是小學生……"
13040-109 = "對了，夢前輩。#n我打算從現在開始執行一個計畫。"
13040-110 = "這樣應該能改善阿拜多斯的治安……所以……"
13040-111 = "……夢前輩？"
13040-115 = "……夢前輩？"
13040-121 = "……"
13040-122 = "夢前輩……"
13040-123 = "……"
13040-124 = "………………"
13040-125 = "這，這裡是……"
13040-126 = "…………"
13040-127 = "啊，啊啊……"
13040-135 = "……嗯……對了。"
13040-136 = "阿拜多斯學生會辦公室……我是來封鎖這裡的……"
13040-137 = "看來我好像……不小心睡了一會……"
13040-138 = "……"
13040-139 = "我明明……得封鎖這裡才行。"
13040-140 = "唉……"
13040-148 = "還是等明天……再做吧……"
13040-149 = "明天就一定得……"
13040-154 = "哎呀，你是……"
13040-155 = "我一直在等你！副學生會長！"
13040-156 = "咦……等我？"
13040-157 = "是的！我有話要跟你說！"
13040-158 = "呃……有什麼事？"
13040-159 = "我，我的確……是奈芙蒂斯集團的人。"
13040-160 = "不，不過就算這樣也無所謂！我也可以……為阿拜多斯做出貢獻……！！"
13040-161 = "貢獻……？"
13040-166 = "我可以用這張金卡，把學校的債還清！"
13040-172 = "你說……什麼？金卡……？"
13040-173 = "咦？啊……這，這是我專用的信用卡……#n也就是可以動用奈芙蒂斯資金的法人卡……大概是這樣……"
13040-174 = "還是別隨便說出那種話吧，小姐。"
13040-175 = "……！！"
13040-176 = "假如你用那張卡把學校的債務還清，相當於成為了這個學校的主人哦？#n這是你期望的嗎？"
13040-177 = "咦？我，我沒有那個意思……只是想無償……"
13040-178 = "沒有什麼東西是無償的。#n就算你這麼認為，其他人也未必跟你一樣。"
13040-179 = "更何況那張卡的所有人不是你，而是奈芙蒂斯。#n最終還清債務的將會是奈芙蒂斯，不會是你哦？"
13040-180 = "我，我……"
13040-181 = "只因為可以隨意使用，就以為這些錢都是你的了嗎，小姐？"
13040-182 = "你有自己賺過錢嗎？有親手做過什麼事嗎？比如打掃洗衣之類的？"
13040-183 = "那，那個……"
13040-184 = "你可別搞錯了──#n錢的所有權不是在花用的人身上，而是在賺取的人身上。"
13040-185 = "在你用那張卡還債的瞬間，奈芙蒂斯就會認定這所學校的所有權屬於他們。"
13040-186 = "那麼……"
13040-187 = "要怎麼做，才可以還清阿拜多斯欠下的債呢……？"
13040-189 = "……"
13040-190 = "只要以阿拜多斯學生的身分，用自己賺的錢還債就行了吧？"
13040-191 = "……"
13040-192 = "……嗯，我知道了。#n就像你一樣……對吧？"
13040-193 = "嗯……？"
13040-194 = "……我明白了。#n等我準備完畢之後，會再來找你的。"
13040-195 = "啊，還有，我不叫「小姐」……"
13040-197 = "我的名字叫野乃美，星野[ruby= ・     ・ ]前輩[/ruby]。"
13040-198 = "哦，哦……？"
13040-200 = "先告辭了。"
13040-204 = "咦……？"
13040-207 = "前，前輩！？你在哪裡！？"
13040-215 = "夢前輩！我在這裡！！前輩！！"
13040-216 = "夢前輩！！！"
13040-220 = "……！！"
13040-221 = "……"
13040-222 = "星，星野前輩……"
13040-226 = "………………………………"
13040-227 = "……怎麼，原來是你啊。"
13040-228 = "那，那個……你沒事吧……？"
13040-229 = "……"
13040-230 = "誰說你可以隨意進來的？#n這裡是高中的教室，國中生是不能進來的。"
13040-231 = "因為我聽見了叫聲……"
13040-232 = "……而且我已經畢業，現在不再是國中生了。"
13040-233 = "我決定就讀跟奈芙蒂斯有產學合作關係的高中。#n高地人鐵道學園……資料應該已經送到了吧……"
13040-234 = "那也不錯。#n你就趕快去之後要唸的學校吧，別來這裡煩我。"
13040-235 = "……是。#n所以我想在離開阿拜多斯之前，再來附近看看……"
13040-239 = "只是偶然來到校園附近……沒，沒有刻意跟蹤星野前輩……"
13040-240 = "結果就聽見了叫聲……"
13040-241 = "……這樣啊。"
13040-242 = "那你就隨意逛逛再走吧，小姐。"
13040-243 = "……那個消息我聽說了。"
13040-247 = "學生會長失蹤的事件……那個叫夢的人……"
13040-251 = "雖然有人說學生會長因為問題太多，丟下副學生會長逃跑了……"
13040-252 = "不過極祕的情報顯示……學生會長並非失蹤……"
13040-256 = "而且……最先發現的人就是……"
13040-257 = "我，我會裝作不知道的！#n讓這個消息傳出去也完全沒有好處……"
13040-258 = "沒關係，反正也不會有人傳出去。#n這裡就只有你跟我而已。"
13040-259 = "那個……"
13040-260 = "前輩放棄去沙漠尋找了嗎……？"
13040-261 = "就連學生會長被發現之後……前輩還是一直在沙漠徘徊……"
13040-262 = "好像在尋找什麼不是嗎……？"
13040-267 = "這麼說來，這裡是阿拜多斯學生會辦公室吧……？#n東西好像都整理過了……"
13040-268 = "門似乎也是關上的……前輩又回到這裡了是嗎？#n已經找到要找的東西了嗎？"
13040-269 = "出去吧。"
13040-274 = "啊，請等一下，前輩！"
13040-280 = "咳咳，咳咳……積了好多灰塵……"
13040-281 = "……畢竟我一個人實在無能為力，已經很久沒打掃了。#n小心一點，那邊的地板壞了。"
13040-282 = "這裡實際上是為了躲避沙漠化，四處輾轉後才停留下來的別館。#n設施的狀態實在不怎麼樣。"
13040-283 = "……嗯，我也聽說了。#n以奇普托斯最悠久建築聞名的阿拜多斯本館，早已被埋在沙漠的某處……"
13040-284 = "沒錯，我入學時去過的學校建築也被沙漠埋沒了。"
13040-285 = "星野前輩入學後不久後就搬到這裡了吧？"
13040-286 = "……你還真清楚啊？"
13040-287 = "不過這裡雖然是別館，但學校該有的這裡通通都有……咦？"
13040-288 = "前輩，這裡是學園祭事務局。#n居然連這種地方都有嗎？"
13040-290 = "學園祭……指的該不會是綠洲沙漠慶典吧？"
13040-294 = "喂，等等，不要隨便進去……"
13040-296 = "說到慶典，我有個好主意！#n要不要舉辦各式各樣的活動，來吸引人們的注意呀？"
13040-297 = "嗯嗯！舉辦華麗可愛的活動怎麼樣？比如偶像舞台♧"
13040-298 = "咦？"
13040-299 = "……裡面什麼都沒有。"
13040-300 = "那當然。沙漠慶典這種活動早就停辦了。"
13040-301 = "……說的也是。#n仔細想想，這也是理所當然的……"
13040-302 = "唉……"
13040-306 = "……所以你來這裡打算做什麼？"
13040-307 = "嗯？是為了偶像舞台……"
13040-308 = "不是這個意思。#n我想問的是你──奈芙蒂斯集團的千金為什麼要跟著我。"
13040-309 = "其他學校的國中生何必稱呼我為前輩？#n為什麼要自找麻煩？"
13040-310 = "你不是說過自己要去念什麼……高地人鐵道學園之類的嗎？#n這裡可不是那所學校啊。"
13040-311 = "那，那是因為……"
13040-312 = "……我總覺得要是去了那裡，自己將會一直生活在後悔之中。"
13040-313 = "為什麼？那裡不是跟奈芙蒂斯有產學合作的學園嗎？"
13040-314 = "是，我想待遇應該會很不錯吧。#n說不定還會當上學生會長……"
13040-315 = "嘿～學生會長？那不是很好嗎？"
13040-316 = "……"
13040-317 = "……好吧，我知道你另有隱情。"
13040-318 = "不過就算來這裡，你也一樣會後悔的。#n來這所陰沉又安靜的學校有什麼好處？"
13040-319 = "你還那麼年輕，聽大叔我一席話吧，野乃美醬。"
13040-320 = "（大叔……？）"
13040-321 = "星野前輩跟我的年紀沒差很多吧……？"
13040-322 = "你不是國中生嗎？#n高中生不能說這種話嗎？"
13040-323 = "可是我已經畢業了……"
13040-324 = "算了，就先這樣吧。"
13040-333 = "因為時間有限，我簡單介紹一下高地人鐵道學園！"
13040-335 = "這是一所專門進行與鐵道管理相關教育的學園。#n除了管理奇普托斯的部分鐵路之外，也發展了各種事業。"
13040-336 = "這所學園的特點是沒有特定的自治區。#n不過相對的，他們所管理的鐵路成為了類似自治區的存在。"
13040-337 = "是由點和線組成的自治區嗎……真特別呢。"
13040-338 = "是的，也許是因為這個原因，#n他們正如那位監察官所說的一樣，政治關係十分複雜。"
13040-339 = "有管理維護鐵道的行政組織以及治安組織……#n其中負責學園行政的則是[ruby=Central Control Center]中央管制中心[/ruby]，簡稱CCC。"
13040-340 = "類似高地人學園的學生會嗎？"
13040-342 = "沒錯，茜香醬。#n那對雙胞胎是CCC的幹部，也就是學生會委員……"
13040-347 = "後來出現的……那位名叫朝霧蘇芳的同學，#n好像就是從牽制CCC的理事會組織派來的監察官……"
13040-348 = "雖然這麼看來，朝霧同學和那對雙胞胎是互相牽制的關係……但還不是很確定……"
13040-350 = "這就是目前所知，與高地人鐵道學園相關的資訊了。"
13040-354 = "嗯……？"
13040-359 = "這，這是校門前的門鈴聲……？"
13040-360 = "雖然有客人來訪的時候門鈴會響是常識，#n但那個被人遺忘、沒人在意的門鈴終於響了嗎！？"
13040-362 = "哈～囉～"
13040-363 = "我們是高地人學園CCC的成員。已經到校門口了，可以讓我們進去嗎？#n怎麼沒人回答？光，動手吧！"
13040-364 = "哦吼～光選手的1秒16下門鈴連擊～要上囉～咻啪啪啪啪～"
13040-373 = "咦咦！？"
13040-374 = "這，這些傢伙在做什麼啊？"
13040-375 = "唔嘿～真是說人人到。#n不過他們的動作還真快呢？"
13040-378 = "……唉。#n麻煩借過，幹部們。"
13040-382 = "嗚哦哦～？"
13040-383 = "喂，不要突然推我啦！"
13040-384 = "……打擾了。我是高地人鐵道學園監理監察官朝霧蘇芳。#n代替他們向各位道歉。"
13040-385 = "我依約來找對策委員會了。#n方便的話，可以讓我們進去嗎？我們並不是來起爭議的。"
13040-387 = "怎，怎麼辦？"
13040-388 = "沒辦法，讓他們進來吧。#n要是不管他們的話，我們僅有的門鈴可能會壞掉的。"
13040-390 = "下一話;沙漠橫貫鐵路"

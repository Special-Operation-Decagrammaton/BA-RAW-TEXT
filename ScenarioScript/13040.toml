[translation]
13040-1 = "Episode 4;Things Now Gone"
13040-2 = "Uwaaah. How did this happen?"
13040-3 = "Heeheehee. Isn't it obvious? You naive, trusting soul..."
13040-4 = "B-But...! You told me...! You said it would be 90 hours of reliable work per week, and I'd get paid lots for it!"
13040-5 = "You really think a broken down district like Abydos would have reliable work? Hah! "
13040-6 = "Around these parts, you scrape by with whatever work you can."
13040-7 = "Sh-Shouldn't I still get paid though?"
13040-8 = "Hahaha! You're a riot!"
13040-10 = "But... I have to get paid! I need to make a lot of money so I can pay off the school's debt! And if my underclassman finds out about this, she's gonna get really worried and—"
13040-12 = "You're really worrying about the wrong things here."
13040-13 = "You're our prisoner now! Every square inch of this building is lined with our subordinates, all armed to the teeth! No one's gonna save you now, honey!"
13040-14 = "So—"
13040-18 = "...Huh?"
13040-19 = "W-Was that an earthquake? The whole building..."
13040-23 = "You disgusting thugs!"
13040-24 = "W-Waaaah?!"
13040-25 = "Wh-What the?!"
13040-27 = "H-Hoshino...?"
13040-28 = "Seriously! Do you have to disappear when I already have so much to do? Do you know how long it took to find you?!"
13040-29 = "We've got work to do. Let's go!"
13040-31 = "Y-You think you're just gonna waltz out of here?"
13040-32 = "Hey! Stop this little girl immediately!"
13040-34 = "Who're you talking to? Unless you have more cronies hiding in the ceilings, I already took out all the trash."
13040-36 = "H-How can that be?"
13040-37 = "You did that by yourself?! What kind of superhuman are you?"
13040-46 = "A-Aaaargh!"
13040-47 = "Gyahh!"
13040-51 = "W-Waaah! I was so scared! Hoshinooo!"
13040-52 = "Can you please stop getting tricked by obviously dodgy adults?"
13040-53 = "But..."
13040-54 = "How many times do I have to tell you? There's no rules or decency in Abydos anymore. Once all the residents left, the neighborhoods turned into crime-ridden slums."
13040-55 = "Abydos is Kivotos' trashcan for its unsavory and unwanted characters."
13040-56 = "So, if you don't know them, just assume they're bad!"
13040-57 = "B-But what if they're not? What if they actually just need help? "
13040-58 = "That's a fantasy! The only people in Abydos are criminals with bad intentions!"
13040-59 = "Um... But..."
13040-60 = "No buts! If you try to help people, they'll take advantage of you faster than you can blink. Being on guard with anyone and everyone is the only way we'll protect our school."
13040-64 = "Which is why I'm saying, you need to be more—"
13040-65 = "Hoshino."
13040-66 = "...?"
13040-67 = "The way you're speaking... It's wrong, Hoshino."
13040-72 = "Y-Yume...?"
13040-76 = "This is reaaally important, so please listen closely, Hoshino."
13040-77 = "W-Wait, you don't have to tell me from this close up!"
13040-82 = "Hoshino, you can't live your life being suspicious of everyone you come across. Accepting violence and lies as the norm...taking them for granted..."
13040-83 = "If we do that, one day we'll wake up and realize we've become the people we hate the most."
13040-85 = "..."
13040-86 = "You're right. We might be able to save Abydos using your methods. But it won't be our Abydos anymore."
13040-87 = "I can't bear the thought of Abydos becoming synonymous with lies and violence. That would make me...sad."
13040-88 = "I know you think it's silly, but I hope that we'll always be able to hold out our hand to people who need it, especially in times like these. We can offer food and clothing to those who are hungry and cold..."
13040-89 = "..."
13040-90 = "I'm a dummy, so I don't know if I'm saying this right..."
13040-91 = "But I think if it's you, you can understand what I'm trying to say."
13040-95 = "No way! This is exactly what I mean! This bumbling innocence of yours is what always gets you into trouble! What if trusting people means ending up in a situation like today again?!"
13040-96 = "If that happens, you'll come to the rescue again, won't you?"
13040-97 = "...Well, yeah."
13040-98 = "Heeheehee."
13040-99 = "Wh-What are you giggling about?!"
13040-100 = "Okay! I'm writing this down so we never forget this conversation! \"Today Hoshino said...\""
13040-101 = "What?!"
13040-107 = "S-Stop that right now! I hate it when you pull out that notebook! And again, what's with the design? Huh?! I said stop writing!"
13040-108 = "Please...at least get a different notebook... We're not elementary school students anymore..."
13040-109 = "You know what, forget the notebook. I wanted to talk to you about a plan I came up with, Yume."
13040-110 = "If it works, I think it'll make Abydos at least a little safer..."
13040-111 = "...Yume?"
13040-115 = "Yume?!"
13040-121 = "..."
13040-122 = "Yume..."
13040-123 = "..."
13040-124 = "..."
13040-125 = "Th-This place..."
13040-126 = "..."
13040-127 = "O-Oh..."
13040-135 = "Right. I got distracted."
13040-136 = "I'm here to lock up...the Abydos Student Council room..."
13040-137 = "Guess I fell asleep again..."
13040-138 = "..."
13040-139 = "I just need to lock up, huh...?"
13040-140 = "*sigh*"
13040-148 = "There's no rush. I'll do it tomorrow."
13040-149 = "Yeah, tomorrow. Definitely..."
13040-154 = "...You."
13040-155 = "I've been waiting for you, Vice President!"
13040-156 = "...For me? Why?"
13040-157 = "I'd like to tell you something!"
13040-158 = "That so? Okay... Go ahead."
13040-159 = "Y-You're right. I am from the Nephthys Group."
13040-160 = "B-But I don't think that should stop me from helping Abydos if I want to!"
13040-161 = "Help Abydos...?"
13040-166 = "I'll pay off the school's debt in its entirety! With this gold card!"
13040-172 = "Uh... wait... What? Gold card...?"
13040-173 = "Technically it's my personal credit card... Well, Nephthys finances it, but I can sort of use it..."
13040-174 = "Don't you think you're being arrogant, li'l lady?"
13040-175 = "...!!"
13040-176 = "If you pay off the school's debt with that card, that means you'll own the school from here on out. Is that your angle?"
13040-177 = "Wh-What?! No! Of course not! I... I just wanted to help. I don't care about owning anything..."
13040-178 = "That's not how it works. You might not have bad intentions, but you're naive."
13040-179 = "Nephthys finances that card, so it's technically theirs. If you use that, then it'll be Nephthys who paid off our debt."
13040-180 = "I-I..."
13040-181 = "It's not your money just because you're spending it, li'l lady."
13040-182 = "Tell me, have you ever lifted a finger in your life? Worked? Done laundry? Wiped a countertop?"
13040-183 = "W-Well..."
13040-184 = "Here's a life lesson. Money belongs to the person who earns it. Not the privileged little heir who spends it without a care in the world."
13040-185 = "If you're trying to hand this school over to Nephthys, then, sure, pay off our debt with your fancy card."
13040-186 = "Then..."
13040-187 = "What do I do? How can I help pay back Abydos' debt?"
13040-189 = "..."
13040-190 = "If you really wanted, you could get a job and help make payments. As an Abydos student."
13040-191 = "..."
13040-192 = "Okay. I understand. Just like you, right?"
13040-193 = "H-Huh?!"
13040-194 = "I'll be back before you know it, okay? Once I get a few things sorted out!"
13040-195 = "Oh... And my name isn't li'l lady..."
13040-197 = "It's Nonomi... Upperclassman Hoshino!"
13040-198 = "H-Huh...?"
13040-200 = "If you'll excuse me!"
13040-204 = "H-Huh?!"
13040-207 = "Yume?! Where are you?!"
13040-215 = "Yume! I'm here for you! Yume!"
13040-216 = "Yume!!!"
13040-220 = "...!!"
13040-221 = "..."
13040-222 = "H-Hoshino?"
13040-226 = "..."
13040-227 = "Oh. It's just you."
13040-228 = "S-Sorry for waking you up... Are you...okay?"
13040-229 = "..."
13040-230 = "Middle schoolers shouldn't poke their noses around where they don't belong. This is a high school, you know."
13040-231 = "I...heard someone screaming."
13040-232 = "And I've officially graduated, so I'm no longer a middle schooler."
13040-233 = "I've been accepted into Highlander Railroad Academy, actually. They're in an industry-academia contract with Nephthys... I think they're processing my paperwork now."
13040-234 = "Congrats. Good for you. Then, shoo. Go enjoy your fancy new school."
13040-235 = "I was hoping... I wanted to take one last look around the Abydos district before I left."
13040-239 = "I wasn't trying to stalk you or anything! I was just walking by the school..."
13040-240 = "...But then I heard someone screaming, so I came to check."
13040-241 = "I see."
13040-242 = "Go have a blast. Enjoy your farewell tour, li'l lady."
13040-243 = "Um, I heard the news..."
13040-247 = "The student council president went missing? Was her name Yume?"
13040-251 = "There have been a lot of rumors... That the president was an airhead who struggled at leading the school, that she abandoned the vice president..."
13040-252 = "But I looked into the classified documents. The president isn't missing, but she... Well..."
13040-256 = "I read that the person who provided a witness account..."
13040-257 = "I-I'm sorry! I shouldn't be prying like this. Talking about it won't change anything."
13040-258 = "Eh, I mean, it's just you and me here."
13040-259 = "Did..."
13040-260 = "Did you give up looking? For whatever was in the desert?"
13040-261 = "You persisted, didn't you? Even after the president was found, you continued searching the desert."
13040-262 = "What were you looking for?"
13040-267 = "And this is the Abydos Student Council room, correct? Everything is packed away already..."
13040-268 = "But you went through the effort of forcing the sealed door open... I can't help but think you were looking for something. Did you find it?"
13040-269 = "Let's go."
13040-274 = "Ah? W-Wait for me!"
13040-280 = "*cough* *cough* It's so dusty..."
13040-281 = "I'm only one person, you know. We don't exactly have a cleaning crew here. The sand's ruined the flooring and just about everything else."
13040-282 = "We were forced into this annex when all the other buildings were mummified by Abydos' desertification. It's not exactly state-of-the-art facilities out here."
13040-283 = "I've heard the history. It was considered a tragedy when the main building of Abydos was buried by the desert, seeing as this was once the oldest, most storied district in all of Kivotos."
13040-284 = "You've done your homework. Even the building we used during my first year is long gone at this point."
13040-285 = "Yes... I believe you joined the school, and then had to move here not too soon after?"
13040-286 = "...Maybe a little too much homework."
13040-287 = "I was interested in the history! Despite being an annex, it's still equipped with everything you would need to hold classes— Hm?"
13040-288 = "What's this classroom, Hoshino? \"School Festival Headquarters\"? I never saw this in the layout plans or documentation."
13040-290 = "Oh! Could this be for the Oasis Festival?"
13040-294 = "Hold it! Don't just barge into—"
13040-296 = "I have a wonderful idea! You could revitalize the school and bring back visitors with fun events like the Oasis Festival!"
13040-297 = "Yup, yup! We could do a cute event like an idol performance! ♧"
13040-298 = "Oh."
13040-299 = "...It's empty."
13040-300 = "Duh. The Oasis Festival hasn't been around for years."
13040-301 = "You're...absolutely right. I suppose I got a little carried away there."
13040-302 = "*sigh*"
13040-306 = "Hey. Why are you here?"
13040-307 = "Hm? Well I was thinking having an idol performance would—"
13040-308 = "No, not here in this room. Why have you been following me around, li'l Nephthys lady?"
13040-309 = "I've got things to do and entertaining a middle schooler wasn't on the agenda. So, why're you showing up here with all your questions and ideas?"
13040-310 = "You're already registered and set to go to Highlander, aren't you?"
13040-311 = "I just..."
13040-312 = "I have this feeling deep down that I'll regret it for the rest of my life if I choose Highlander."
13040-313 = "Aren't they partnered with Nephthys? Sounds like a grand old time for you."
13040-314 = "You're not wrong... I'd likely be treated well, even appointed student council president..."
13040-315 = "A fancy position for a fancy girl, huh?"
13040-316 = "..."
13040-317 = "...Look. I get it. You've got your own situation and worries."
13040-318 = "But look around you. There's exactly one student here. There's nothing appealing about this sad, old ghost town."
13040-319 = "You've got a bright future ahead of you, Nonomi. So take this old-timer's advice, all right?"
13040-320 = "(Old timer...?)"
13040-321 = "You're not that much older than me, Hoshino..."
13040-322 = "What do you mean, li'l middle schooler? We're entire grades apart."
13040-323 = "I technically graduated though..."
13040-324 = "Eh, same thing."
13040-333 = "I'll present a brief overview of Highlander Railroad Academy! Time is of the essence right now."
13040-335 = "The academy maintains railroads throughout Kivotos. It even personally owns and manages some lines running throughout the city, on top of having several business ventures."
13040-336 = "It's unique from other academies in that it doesn't necessarily belong to any given district. The railways act as district borders which individual factions manage."
13040-337 = "All these dots and lines make up different districts, huh? Unique is one way to put it."
13040-338 = "Yes, and the constant push and pull of power over these railway districts create a complex political structure, as the overseer mentioned."
13040-339 = "The secretariat and the security department are in charge of maintaining and managing the railways...and the Central Control Center manages the academy's administrative duties."
13040-340 = "So we can kinda see it as Highlander's student council."
13040-342 = "Exactly, Serika. The twins we had the misfortune of meeting are officers of the CCC. In other words, members of the student council."
13040-347 = "And Asagiri Suou, the overseer, works for the board of directors. Her primary directive is to keep the CCC in check."
13040-348 = "It would appear Suou wasn't lying when she said she's not necessarily allied with the twins, but...again, it's all rather complicated."
13040-350 = "That concludes my briefing on Highlander Railroad Academy."
13040-354 = "Huh?"
13040-359 = "W-Was that the doorbell?!"
13040-360 = "We installed it for visitors to use, but it's the first time it's ever actually been rung!"
13040-362 = "Hi, hi."
13040-363 = "It's us! Highlander's CCC. Hellooo! Hikari, don't stop ringing the doorbell. We're here! Let us in!"
13040-364 = "Roger... Please prepare for the Hikari Special One-Second-Sixteen-Hit Ding-Dong-Ditch Combo...!"
13040-373 = "What?!"
13040-374 = "Wh-Why are they like this?!"
13040-375 = "Huh. Speak of the devil. They actually came."
13040-378 = "*sigh* Move, officers."
13040-382 = "Whoa?!"
13040-383 = "Wait your turn! No pushing!"
13040-384 = "I am Asagiri Suou, Highlander overseer. I apologize for these two idio—for our officers' lack of manners."
13040-385 = "We've arrived to make good on our promise to the Foreclosure Task Force. If you would let us in, I assure you we come in peace."
13040-387 = "Wh-What should we do?"
13040-388 = "I don't really want them to break our only doorbell, so let's just let them in."
13040-390 = "Next Episode;The Trans-Desert Railway"

13040-125 = "ทะ... ที่นี่คือ..."
13040-126 = "......"
13040-127 = "อะ... อ่า..."
13040-135 = "จริงด้วย... ใช่แล้ว"
13040-136 = "ฉัน... ตั้งใจจะมา... ปิดห้องสภานักเรียนอะบิดอส..."
13040-137 = "แล้วก็คงเผลอหลับไป... สินะ..."
13040-138 = "......"
13040-139 = "ต้องไปปิด... ให้ได้สิ... "
13040-140 = "เฮ้อ..."
13040-148 = "เอาไว้พรุ่งนี้... แล้วกัน..."
13040-149 = "พรุ่งนี้จะไม่ผลัดวันประกันพรุ่งอีก..."
13040-154 = "เอ๋? นี่เธอ..."
13040-155 = "ฉันกำลังรอคุณอยู่เลยค่ะ! คุณรองประธานนักเรียน!"
13040-156 = "หืม... ฉันเหรอ?"
13040-157 = "ค่ะ! ฉันมีเรื่องอยากคุยด้วยน่ะค่ะ!"
13040-158 = "อืม... เรื่องอะไรเหรอ?"
13040-159 = "ฉะ... ฉันเป็นคนของเนฟธิสกรุ๊ปจริงๆ ค่ะ"
13040-160 = "ตะ... แต่ก็ไม่เป็นไรหรอกนะคะ! เพราะฉัน... มีสิ่งที่ทำเพื่ออะบิดอสได้ค่ะ...!!"
13040-161 = "สิ่งที่ทำได้เหรอ...?"
13040-166 = "ฉันจะจ่ายหนี้ทั้งหมดของโรงเรียนให้เองค่ะ! จ่ายด้วยบัตรโกลเด้นการ์ดนี้!"
13040-172 = "อ่า... เดี๋ยวนะ... บัตรอะไรนะ? โกลเด้นการ์ด...?"
13040-173 = "คะ? เอ่อ... คือ... มันเป็นบัตรเครดิตส่วนตัวของฉันน่ะค่ะ... คล้ายๆ กับบัตรเครดิตที่ยืมเงินกองทุนของ#nเนฟธิสมาใช้ได้..."
13040-174 = "อย่าพูดอะไรอวดดีนักเลยคุณหนู"
13040-175 = ".....!!"
13040-176 = "ถ้าใช้บัตรอะไรนั่นจ่ายหนี้ให้โรงเรียน ก็แปลว่าเธอจะได้เป็นเจ้าของโรงเรียนนี้ นั่นคือสิ่งที่เธอต้องการเหรอ?"
13040-177 = "คะ? ฉะ... ฉันไม่เคยคิดอะไรแบบนั้นนะคะ... ฉันไม่อยากได้อะไรตอบแทนเลย..."
13040-178 = "ไม่มีใครทำอะไรโดยไม่หวังผลตอบแทนหรอก ถึงเธอจะคิดแบบนั้น แต่คนอื่นคงไม่คิดแบบนี้ด้วยหรอกนะ"
13040-179 = "อีกอย่าง บัตรใบนั้นก็ไม่ใช่บัตรของเธอ แต่เป็นของเนฟธิสไม่ใช่เหรอ? ถ้าทำอย่างนั้น คนที่มาช่วยจ่าย#nหนี้ก็คือเนฟธิส แล้วทำไมเธอถึงคิดว่าตัวเองคือคนที่ช่วยจ่ายหนี้ให้ล่ะ?"
13040-180 = "ฉะ... ฉัน..."
13040-181 = "พอเป็นเงินที่ใช้จ่ายได้อย่างอิสระ ก็เลยคิดว่าเป็นเงินของตัวเองงั้นเหรอ คุณหนู? "
13040-182 = "เธอเคยหาเงินใช้เองบ้างมั้ย? หรือว่าเคยลองทำงานดูบ้างรึยัง? ทำความสะอาดล่ะ ทำได้รึเปล่า? แล้วซักผ้าล่ะ?"
13040-183 = "ระ... เรื่องนั้น..."
13040-184 = "คนที่เป็นเจ้าของเงิน ไม่ใช่คนที่ใช้เงินหรอกนะ แต่เป็นคนที่หาเงินนั่นมาได้ต่างหาก เธอห้ามเข้าใจผิดเรื่องนี้เด็ดขาดล่ะ"
13040-185 = "ทันทีที่เธอจ่ายหนี้ด้วยบัตรใบนี้ เนฟธิสก็จะคิดว่าสิทธิ์ในการเป็นเจ้าของโรงเรียนนี้ตกไปเป็นของทาง#nนั้น"
13040-186 = "ถ้างั้น..."
13040-187 = "ต้องทำยังไงถึงจะจ่ายหนี้ของอะบิดอสได้เหรอคะ...?"
13040-189 = "......"
13040-190 = "ก็ต้องหาเงินมาจ่ายหนี้เองในฐานะนักเรียนของอะบิดอสน่ะสิ"
13040-191 = "......"
13040-192 = "อืม... เข้าใจแล้วค่ะ ต้องเป็นเหมือนคุณ... ใช่มั้ยคะ?"
13040-193 = "หะ... หืม...?"
13040-194 = "ฉันเข้าใจแล้วค่ะ ถ้าเตรียมตัวเสร็จแล้วฉันจะมาหาใหม่นะคะ"
13040-195 = "อ้อ ฉันไม่ได้ชื่อว่าคุณหนู..."
13040-197 = "ฉันชื่อโนโนมิค่ะ รุ่นพี่โฮชิโนะ"
13040-198 = "เอะ... เอ๋...?"
13040-200 = "ขอตัวก่อนนะคะ"
13040-204 = "หะ... หืม...?"
13040-207 = "ระ... รุ่นพี่?! อยู่ตรงไหนคะ?!"
13040-215 = "รุ่นพี่ยูเมะ! ฉันอยู่ตรงนี้ค่ะ!! รุ่นพี่!!"
13040-216 = "รุ่นพี่ยูเมะ!!!"
13040-220 = ".....!!"
13040-221 = "......"
13040-222 = "ระ... รุ่นพี่โฮชิโนะ..."
13040-226 = ".................."
13040-227 = "อะไรกัน เธอเองหรอกเหรอ?"
13040-228 = "อะ... เอ่อ... ปะ... เป็นยังไงบ้างคะ...?"
13040-229 = "......"
13040-230 = "ใครบอกให้เธอเข้ามาที่นี่ตามอำเภอใจ? ที่นี่คือห้องเรียนของโรงเรียนมัธยมปลายนะ เด็กมัธยมต้นเข้ามาไม่ได้"
13040-231 = "ฉันได้ยินเสียงร้องน่ะค่ะ..."
13040-232 = "แล้วตอนนี้ฉันก็ไม่ใช่เด็กมัธยมต้นแล้วค่ะ ฉันเพิ่งเรียนจบมาเลย..."
13040-233 = "ฉันตัดสินใจเข้าเรียนต่อในโรงเรียนมัธยมปลายที่มีความร่วมมือด้านอุตสาหกรรมและการศึกษากับ#nเนฟธิสค่ะ น่าจะชื่อว่าสถาบันการรถไฟไฮแลนเดอร์นะคะ... ตอนนี้เอกสารสมัครเข้าเรียนน่าจะส่งไปถึงแล้ว#nด้วยค่ะ...  "
13040-234 = "ดีแล้วละ ถ้างั้นเธอก็ไปโรงเรียนที่ตัวเองจะไปอยู่สิ ไม่ต้องมาทำตัวให้น่ารำคาญอยู่ที่นี่"
13040-235 = "ค่ะ... เพราะแบบนี้ ฉันก็เลยอยากมาดูที่นี่เป็นครั้งสุดท้ายก่อนจะจากอะบิดอสไป..."
13040-239 = "แต่พอฉันเข้ามาใกล้ๆ สนามของอะบิดอส... ฉันก็... เอ่อ... ฉันไม่ได้มีเจตนาจะสะกดรอยตามรุ่นพี่#nโฮชิโนะหรอกนะคะ..."
13040-240 = "พอดีฉันไปได้ยินเสียงร้องเข้าน่ะ..."
13040-241 = "งั้นเหรอ..."
13040-242 = "งั้นก็เดินดูโรงเรียนแต่พอดีแล้วกลับไปเถอะ คุณหนู"
13040-243 = "ฉัน... ได้ยินข่าวมาแล้วค่ะ"
13040-247 = "เรื่องที่ประธานสภานักเรียนหายไป... คนที่ชื่อยูเมะน่ะค่ะ..."
13040-251 = "ถึงจะมีคนที่บอกว่าประธานสภานักเรียนเป็นคนที่มีปัญหามากมายตั้งแต่แรก ก็เลยทิ้งรองประธานนักเรียนไว้แล้วหนีไป... "
13040-252 = "แต่ความลับสุดยอดที่ถูกเผยออกมาก็คือ... ประธานสภานักเรียน... ไม่ได้หายตัวไป..."
13040-256 = "และคนที่เจอเธอเป็นครั้งสุดท้าย..."
13040-257 = "ฉะ... ฉันจะทำเป็นไม่รู้เรื่องค่ะ! เพราะต่อให้เที่ยวคุยเรื่องแบบนี้ไปทั่วก็ไม่มีอะไรดีขึ้นมา..."
13040-258 = "เอาเถอะ ยังไงก็ไม่มีใครที่จะปล่อยข่าวลืออยู่แล้วนี่ ที่นี่มันก็มีแค่ฉันกับเธอสองคน"
13040-259 = "อ่า..."
13040-260 = "แล้วนี่... ตอนนี้รุ่นพี่เลิกไปเตร็ดเตร่หาในทะเลทรายแล้วเหรอคะ?"
13040-261 = "ถึงจะพบประธานสภานักเรียนแล้ว... แต่รุ่นพี่ยังไปเตร็ดเตร่ในทะเลทรายอยู่ตลอดไม่ใช่เหรอคะ? กำลังหาอะไรอยู่เหรอคะ...?"
13040-262 = "ทำไมกันล่ะ...?"
13040-267 = "จะว่าไป ที่นี่คือห้องสภานักเรียนอะบิดอสใช่ไหมคะ...? ข้าวของก็ดูเหมือนจะจัดไว้เรียบร้อยแล้ว..."
13040-268 = "ดูจากประตู ที่นี่ก็น่าจะถูกปิดไปแล้วนี่นา รุ่นพี่กลับมาอีกครั้งเหรอคะ? เจอของที่หาอยู่แล้วหรือยังคะ?"
13040-269 = "ออกไปเถอะ"
13040-274 = "อ๊ะ... อ๊ะ ดะ... เดี๋ยวก่อนค่ะ รุ่นพี่!"
13040-280 = "แค่ก แค่ก... ฝุ่นหนาเตอะเลยนะคะเนี่ย..."
13040-281 = "ก็... ไม่ได้ทำความสะอาดมานานแล้วนี่นา ฉันไม่กล้าทำคนเดียวหรอก ระวังตรงนั้นด้วยล่ะ พื้นมันพังแล้วน่ะ"
13040-282 = "ที่นี่คืออาคารย่อยที่เราย้ายหนีภัยทะเลทรายมาน่ะ อาคารและสิ่งอำนวยความสะดวกก็เลยไม่ค่อยดี"
13040-283 = "ค่ะ... เข้าใจแล้วค่ะ ฉันก็เคยได้ยินมาเหมือนกันว่าอาคารส่วนกลางของอะบิดอสที่มีประวัติศาสตร์#nยาวนานที่สุดถูกฝังอยู่ที่ไหนสักแห่งในทะเลทราย..."
13040-284 = "ใช่ อาคารเรียนตอนที่ฉันมาสมัครเข้าเรียนครั้งแรกก็ถูกฝังในทะเลทรายเหมือนกัน"
13040-285 = "มีการย้ายอาคารมาที่นี่ไม่นานนักหลังจากรุ่นพี่โฮชิโนะมาเข้าเรียนใช่ไหมคะ?"
13040-286 = "รู้ดีเลยนี่นา?"
13040-287 = "ค่ะ ถึงที่นี่จะเป็นอาคารย่อย แต่ก็มีทุกอย่างที่โรงเรียนอื่นมี... เอ๋?"
13040-288 = "รุ่นพี่... มีสำนักงานเทศกาลโรงเรียนด้วยค่ะ มีห้องชมรมแบบนี้อยู่ด้วยเหรอคะเนี่ย?"
13040-290 = "เทศกาลโรงเรียน... อย่าบอกนะว่าเป็นเทศกาลทรายโอเอซิส?"
13040-294 = "นี่ เดี๋ยวสิ เข้าไปตามอำเภอใจไม่ได้นะ..."
13040-296 = "ถ้าเป็นงานเทศกาลละก็ ฉันมีไอเดียอยู่ค่ะ! เราจัดเทศกาลต่างๆ ดึงดูดความสนใจของผู้คนดีไหมคะ?"
13040-297 = "อื้อ! เอาเป็นอีเวนต์ที่หรูๆ น่ารักๆ อย่างเวทีของไอดอลดีไหมคะ♧"
13040-298 = "เอ๋?"
13040-299 = "นี่มันห้องเปล่าๆ นี่คะ..."
13040-300 = "มันก็แน่นอนอยู่แล้ว ก็งานเทศกาลอย่างเทศกาลทรายน่ะถูกระงับไปตั้งนานแล้วนี่"
13040-301 = "นั่นสินะคะ... พอมาคิดดูแล้วก็สมเหตุสมผล..."
13040-302 = "เฮ้อ..."
13040-306 = "มาที่นี่ทำไมน่ะ...?"
13040-307 = "คะ? ก็เวทีของไอดอล..."
13040-308 = "ไม่ใช่ ฉันไม่ได้หมายความว่าอย่างนั้น ฉันถามว่าเธอตามฉันมาทำไมน่ะ คุณหนูเนฟธิส?"
13040-309 = "ไม่มีเหตุผลที่เธอจะเรียกคนจากโรงเรียนอื่นว่ารุ่นพี่หรอกนะ ทำไมถึงมาทำให้รำคาญแบบนี้?"
13040-310 = "ไปสมัครเข้าสถาบันการรถไฟไฮแลนเดอร์ไว้ไม่ใช่รึไง? ไม่ใช่ที่นี่สักหน่อย"
13040-311 = "ระ... เรื่องนั้น..."
13040-312 = "ถ้าไปที่นั่น... ฉันคงจะใช้ชีวิตอย่างเสียใจน่ะค่ะ"
13040-313 = "ทำไมล่ะ? ไหนว่าเป็นโรงเรียนที่จับมือกับเนฟธิสไง?"
13040-314 = "ค่ะ ฉันจะได้รับการดูแลเป็นอย่างดีจากที่นั่นแน่นอนค่ะ บางทีอาจจะได้รับตำแหน่งประธานนักเรียนมา#nด้วยซ้ำ..."
13040-315 = "โห~ ได้เป็นประธานนักเรียนเลยเหรอ? งั้นก็ดีเลยนี่?"
13040-316 = "......"
13040-317 = "เอาเถอะ... ฉันรู้ว่าเธอคงมีเหตุผลส่วนตัว"
13040-318 = "แต่ถึงมาเรียนที่นี่ก็จะเสียใจเหมือนกันนั่นแหละ เธอชอบอะไรในโรงเรียนที่ทั้งมืดมน ทั้งเงียบแบบนี้ถึง#nได้มาที่นี่งั้นเหรอ?"
13040-319 = "เธอยังเป็นวัยรุ่นนะ โนโนมิจัง ฟังที่ลุงคนนี้พูดให้ดีนะ"
13040-320 = "(ลุงเหรอ...?)"
13040-321 = "แต่ว่ารุ่นพี่โฮชิโนะคะ รุ่นพี่อายุไม่ต่างกับฉันเท่าไรนี่คะ...?"
13040-322 = "เธอเป็นเด็กมัธยมต้นนะ พูดอะไรแบบนั้นกับพี่มัธยมปลายไม่ได้สิ"
13040-323 = "แต่ฉันจบมัธยมต้นแล้วนะคะ..."
13040-324 = "แต่ถึงอย่างนั้นก็เถอะ..."
13040-333 = "เราไม่มีเวลาแล้ว ถ้างั้นฉันจะรีบอธิบายเกี่ยวกับสถาบันการรถไฟไฮแลนเดอร์นะคะ!"
13040-335 = "ที่นี่เป็นสถาบันการศึกษาที่มีความเชี่ยวชาญเรื่องการจัดการและการศึกษาเกี่ยวกับรถไฟค่ะ สถาบัน#nแห่งนี้บริหารจัดการเส้นทางรถไฟบางส่วนที่มีในคิโวทอส แล้วก็น่าจะทำธุรกิจอื่นเยอะเลยละค่ะ"
13040-336 = "ลักษณะพิเศษของสถาบันนี้คือไม่มีเขตปกครองตนเองค่ะ แต่เส้นทางรถไฟที่พวกเขาดูแลอยู่เหมือน#nจะทำหน้าที่เป็นเขตปกครองตนเองของพวกเขา"
13040-337 = "เขตปกครองตนเองที่เชื่อมต่อกันด้วยจุดและรางงั้นเหรอ... แปลกดีจัง"
13040-338 = "ค่ะ อาจเป็นเพราะเหตุนี้ สถาบันแห่งนี้เลยดูเหมือนจะมีความขัดแย้งทางการเมืองที่ซับซ้อนมากๆ อย่างที่ผู้ควบคุมคนนั้นบอกไว้น่ะค่ะ"
13040-339 = "ที่นั่นมีสำนักงานและหน่วยงานที่ดูแลทางรถไฟ... แล้วก็มี CCC (Central Control Center) ที่เป็น#nศูนย์ควบคุมส่วนกลางที่มีหน้าที่บริหารจัดการสถาบันค่ะ "
13040-340 = "เป็นเหมือนสภานักเรียนของไฮแลนเดอร์ใช่มั้ย?"
13040-342 = "ใช่แล้วละ เซริกะจัง ฝาแฝดนั่นคือผู้บริหารใน CCC หรือจะมองว่าเป็นกรรมการสภานักเรียนก็ได้..."
13040-347 = "ส่วนอาซากิริ สุโอที่มาปรากฏตัวทีหลัง... ก็คงจะเป็นผู้ควบคุมที่คณะกรรมการบริหารที่ตรวจสอบ CCC ส่งตัวมาอีกที..."
13040-348 = "ถึงคุณสุโอกับฝาแฝดนั่นจะดูไม่ค่อยจะลงรอยกัน... แต่ฉันก็ยังไม่แน่ใจค่ะ... "
13040-350 = "และนี่คือข้อมูลของสถาบันการรถไฟไฮแลนเดอร์ที่เรารู้ค่ะ "
13040-354 = "เอ๋...?"
13040-359 = "นะ... นั่นเสียงกริ่งจากหน้าประตูโรงเรียนไม่ใช่เหรอ...?"
13040-360 = "เราติดตั้งกริ่งนั้นไว้เพื่อให้กดตอนมีแขกมาเยี่ยมก็จริง แต่ก็ไม่มีใครใช้จนเราลืมไปแล้ว แล้วทำไมจู่ๆ ถึงมาดังเอาตอนนี้ล่ะคะ?!"
13040-362 = "สวัสดี"
13040-363 = "ฉันมาจาก CCC ของไฮแลนเดอร์น่ะ ตอนนี้อยู่หน้าโรงเรียนแล้ว ขอเข้าไปได้มั้ย? ไม่ตอบแฮะ ฮิคาริ กดกริ่งรัวๆ เลย!"
13040-364 = "โอ้ ฮิคาริมือหนึ่งในการกดกริ่ง เจอสกิลกด 16 ครั้งต่อวินาทีเข้าไปหน่อย ชูบาบาบาบา"
13040-373 = "คะ?!"
13040-374 = "อะ... อะไรกัน ทำอะไรของพวกเธอน่ะ?"
13040-375 = "โอ้โห~ พูดถึงปุ๊บก็มาปั๊บเลยนะ มาไวกว่ารถไฟอีก"
13040-378 = "เฮ้อ... หลบไปก่อน ท่านผู้บริหาร"
13040-382 = "โอ๊ะ?"
13040-383 = "นี่ อย่าผลักกันสิ!"
13040-384 = "ขออภัย... ฉันคืออาซากิริ สุโอ ผู้ควบคุมการก่อสร้างของไฮแลนเดอร์ ฉันต้องขอโทษแทนพวกนี้ด้วย"
13040-385 = "ฉันมาหาคณะกรรมการแผนงานตามที่สัญญาไว้ ถ้าไม่ติดอะไร ขอฉันเข้าไปหน่อยได้มั้ย? ฉันไม่ได้มาที่นี่เพื่อจะต่อสู้หรอกนะ"
13040-387 = "อะ... เอายังไงดีคะ?"
13040-388 = "ก็คงช่วยไม่ได้นะ ถ้าปล่อยไว้แบบนี้ กริ่งอันเดียวที่เรามีก็คงพังกันพอดี บอกให้เข้ามาเถอะ"
13040-390 = "ตอนต่อไป;ทางรถไฟข้ามทะเลทราย"

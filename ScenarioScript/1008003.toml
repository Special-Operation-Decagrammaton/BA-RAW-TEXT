[translation]
1008003-1 = "人人都有弱點"
1008003-2 = "（和食蜂約好碰面的地方是附近的運動場）"
1008003-7 = "還以為老師會叫我去哪裡……沒想到是這種地方。"
1008003-8 = "……所以呢？把我叫到這裡來有什麼事嗎？"
1008003-9 = "……嗯？什麼？"
1008003-10 = "你說我之所以會頭痛……可能是因為沒呼吸到外面的空氣？"
1008003-11 = "如果事情那麼簡單的話，我一開始就不會傷腦筋了……"
1008003-12 = "算了，聽老師的話來吹吹風也不錯。"
1008003-13 = "……咦？"
1008003-14 = "既然都出來了，要不要稍微慢跑一下再回去？"
1008003-15 = "啊啊……嗯……我實在想不到這麼做的理由。"
1008003-16 = "我也不認為這是個明智的決定……"
1008003-17 = "畢竟慢跑跟我聰明的形象一點也不搭不是嗎？"
1008003-21 = "老，老師！？我話才說到一半，你怎麼已經準備要開跑了……？"
1008003-22 = "[s1]「不用太勉強！」\n[s2]「只是輕鬆慢跑一下而已啦！」"
1008003-28 = "老師！！你一個人要跑去哪裡！？"
1008003-29 = "等，等一下！等等我……！"
1008003-34 = "（……結果就連一圈都沒跑完）"
1008003-40 = "[ns] 「……？」"
1008003-42 = "[ns3]「……食蜂？」\n[ns4]「怎麼突然這麼安靜……」"
1008003-52 = "那個……哈啊……哈啊……拜託……先……等一下……哈啊……"
1008003-53 = "我喊你……那麼多次……哈啊……哈啊……哈啊……"
1008003-54 = "……哈啊……哈……"
1008003-55 = "……唔……"
1008003-61 = "[ns5]「……食蜂！？」\n[ns6]「你沒事吧！？食蜂……食蜂！！」"
1008003-67 = "（連忙帶著昏倒的食蜂前往附近的醫院）"
1008003-69 = "…………"
1008003-70 = "唔……咦……？"
1008003-71 = "我昏倒了嗎……"
1008003-75 = "嗯？老師？"
1008003-76 = "你一直在旁邊照顧我嗎？#n……你的表情是怎麼回事？"
1008003-77 = "……？？？"
1008003-78 = "對不起……？啊啊，你是指剛才的事嗎？"
1008003-79 = "沒想到你會為那種事道歉。#n雖然我剛才的確有點慌張，不過那點小事我是不會在意的。"
1008003-80 = "請不要覺得我是個難搞的女人，我只是比較謹慎罷了，並不會雞蛋裡挑骨頭。"
1008003-81 = "嗯……話說回來……我完全想不起昏倒時發生的事……"
1008003-82 = "醫生有來看過了對吧？#n那麼應該也在我昏倒的期間檢查過我身體的狀況了吧？"
1008003-83 = "那樣也好，結果有檢查出身體有什麼異常嗎？"
1008003-84 = "……嗯？"
1008003-85 = "為什麼不回答我的問題？莫非是聽到了什麼壞消息嗎？"
1008003-86 = "是不是我在被傳送到這裡的過程中，身體出現了某些不知名的異狀……"
1008003-87 = "[s7]「不，那倒不是……」\n[s8]「但從某個角度來說好像又……」"
1008003-93 = "……？？？"
1008003-94 = "醫生說我的身體沒有任何異常？#n……那不是件好事嗎？"
1008003-95 = "你說醫生……生氣了？為什麼……"
1008003-96 = "……啊。"
1008003-97 = "「這位病人只是因為太少運動，所以身體很虛弱而已」……#n醫生他……是這麼說的嗎……"
1008003-101 = "咳，咳哼……"
1008003-102 = "……原，原來是這樣啊……#n嗯……這也是情有可原……"
1008003-103 = "畢竟真要說的話……我是傾向於動腦的類型……"
1008003-104 = "…………"
1008003-105 = "……老師？"
1008003-106 = "我現在就算不使用能力，也大概猜得出老師在想什麼……"
1008003-107 = "就算你用那種眼神看我……"
1008003-109 = "……我也絕對不會做的。"

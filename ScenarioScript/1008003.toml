[translation]
1008003-1 = "ทุกคนย่อมมีสิ่งที่ไม่ถนัด"
1008003-2 = "(คุณครูนัดเจอกับโชคุโฮวที่สนามกีฬาแห่งหนึ่งที่อยู่ใกล้ๆ)"
1008003-7 = "ก็คิดว่าเรียกให้มาที่ไหน... คิดไม่ถึงเลยว่าจะเรียกมาที่แบบนี้"
1008003-8 = "...ทำไมเหรอ? มีธุระอะไรถึงเรียกฉันมาที่นี่ล่ะ?"
1008003-9 = "...หืม? ว่าไงนะ?"
1008003-10 = "ที่ฉันปวดหัว... อาจเป็นเพราะฉันไม่ได้ออกมาสูดอากาศข้างนอกงั้นเหรอ...?"
1008003-11 = "ถ้าเป็นเรื่องพื้นๆ แบบนั้น ฉันก็คงไม่กังวลตั้งแต่แรกหรอก..."
1008003-12 = "แต่ถ้าเป็นแค่การออกมาสูดอากาศอย่างที่คุณครูว่า ก็อาจจะไม่ใช่เรื่องแย่นักก็ได้"
1008003-13 = "...หืม?"
1008003-14 = "ไหนๆ ก็ออกมาแล้ว ก็เลยอยากชวนวิ่งจ็อกกิงเบาๆ งั้นเหรอ?"
1008003-15 = "อ่า... อืม... มะ... ไม่รู้สิ ฉันว่าไม่เห็นต้องทำถึงขนาดนั้นเลย"
1008003-16 = "มันดูไม่น่าจะใช่ความคิดที่ฉลาดเท่าไหร่เลยด้วย..."
1008003-17 = "เรื่องแบบนี้ไม่เหมาะกับคนที่ชาญฉลาดอย่างฉันหรอกนะ "
1008003-21 = "คะ... คุณครู!? ฉันกำลังพูดด้วยนะ ทำไมอยู่ๆ ถึงไปเตรียมตัววิ่งแบบนั้นล่ะ...?"
1008003-22 = "[s1] \"รับรองว่าครูจะไม่ฝืนตัวเอง!\"\n[s2] \"ครูจะแค่ไปจ็อกกิงเบาๆ เอง!\""
1008003-28 = "คุณครู!! จะวิ่งไปไหนคนเดียวน่ะ!?"
1008003-29 = "ระ... รอด้วย! รอกันด้วยสิ...!"
1008003-34 = "(ทั้งสองคนยังวิ่งได้ไม่ครบรอบดี...)"
1008003-40 = "[ns] \"......?\""
1008003-42 = "[ns3] \"...โชคุโฮว?\"\n[ns4] \"ทำไมอยู่ๆ ก็เงียบไปล่ะ...\""
1008003-52 = "อ่า... แฮ่ก... แฮ่ก... ยะ... หยุดก่อน... แฮ่กๆ..."
1008003-53 = "ฉันตะโกนเรียก... จนปากจะฉีกแล้วนะ... แฮ่กๆ... แฮ่ก... แฮ่ก..."
1008003-54 = "ฮะ...ฮือ...."
1008003-55 = "อึก..."
1008003-61 = "[ns5] \"โชคุโฮว...!?\"\n[ns6] \"ไหวรึเปล่า?! โชคุโฮว!?\""
1008003-67 = "(คุณครูรีบพาโชคุโฮวที่เป็นลมไปโรงพยาบาลที่อยู่ใกล้ๆ)"
1008003-69 = "......"
1008003-70 = "เอ๋...? เอ๋..."
1008003-71 = "นี่ฉันสลบไปเหรอ..."
1008003-75 = "หืม? คุณครู?"
1008003-76 = "นั่งเฝ้าอยู่ข้างๆ จนถึงตอนนี้เลยเหรอ? แล้วทำไมทำหน้าแบบนั้นล่ะ?"
1008003-77 = "...???"
1008003-78 = "ขอโทษงั้นเหรอ...? อ่า เพราะเรื่องก่อนหน้านี้น่ะเหรอ?"
1008003-79 = "ได้รับคำขอโทษแบบไม่ทันตั้งตัวเลยแฮะ ถึงจะตกใจอยู่บ้าง แต่เรื่องแค่นี้ไม่เป็นไรหรอกน่า"
1008003-80 = "ฉันไม่อยากถูกมองว่าเป็นผู้หญิงเรื่องมากหรอกนะ ฉันก็แค่เป็นคนระมัดระวังน่ะ ไม่ใช่คนที่อารมณ์เสีย#nง่ายอะไรแบบนั้น"
1008003-81 = "อืม... จะว่าไป... ฉันจำตอนที่เป็นลมไปไม่ได้เลย..."
1008003-82 = "มีหมอมาดูฉันใช่มั้ย? ถ้างั้นก็คงมาตรวจร่างกายฉันตอนที่เป็นลมไปใช่มั้ย?"
1008003-83 = "ก็ถือเป็นเรื่องดีนะ ว่าแต่ผลตรวจออกมาเป็นยังไงบ้าง? ร่างกายฉันมีอะไรผิดปกติรึเปล่า?"
1008003-84 = "...หืม?"
1008003-85 = "ทำไมเลี่ยงไม่ตอบล่ะ? หรือว่ามีอะไรไม่ดีเหรอ?"
1008003-86 = "อย่าบอกนะว่าพอมาอยู่โลกนี้แล้ว ฉันดันมีอาการอะไรที่หมอทางนี้ก็ไม่รู้จักน่ะ..."
1008003-87 = "[s7] \"ไม่หรอก ไม่ใช่อะไรแบบนั้น...\"\n[s8] \"มันก็แค่...\""
1008003-93 = "...???"
1008003-94 = "ร่างกายฉันไม่ได้ผิดปกติอะไรงั้นเหรอ? งั้นก็ถือว่าดีแล้วไม่ใช่รึไงน่ะ?"
1008003-95 = "คุณหมอ... โกรธฉันเหรอ? โกรธทำไม..."
1008003-96 = "...อ่า"
1008003-97 = "ร่างกายอ่อนแอ เพราะขาดการออกกำลังกายอย่างรุนแรง' งั้นเหรอ...?"
1008003-101 = "ฮืม... ฮืม..."
1008003-102 = "งะ... งั้นสินะ... มันก็... ก็ไม่ได้แปลกซะหน่อย..."
1008003-103 = "ก็ฉันเป็นพวกที่ใช้กำลังสมองมากกว่าใช้กำลังกายนี่นา..."
1008003-104 = "......"
1008003-105 = "...คุณครู?"
1008003-106 = "ถึงฉันจะไม่ใช้พลังจิต แต่ก็พอรู้ได้หรอกนะว่าตอนนี้คุณครูคิดอะไรอยู่..."
1008003-107 = "ถ้ายังมองด้วยสายตาแบบนั้นไม่เลิกละก็..."
1008003-109 = "ฉันจะไม่มีวันไปออกกำลังกายเด็ดขาด"

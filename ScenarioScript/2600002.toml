2600002-50 = "3;치나츠;04;아, 네, 네? 죄, 죄송합니다. 순간 무슨 말씀인지…… 이해를……\n#3;shake\n#3;em;[속상함]"
2600002-51 = "3;치나츠;04;그, 그런 것보다……! 너, 너무 시간을 끌었네요. 죄송합니다. 기껏 와주셨는데……\n#3;stiff"

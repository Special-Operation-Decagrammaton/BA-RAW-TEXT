[translation]
2600002-1 = "สิ่งที่ใครบางคนจะต้องทำ"
2600002-2 = "เฮ้อ..."
2600002-3 = "แบบนี้เมื่อไหร่จะเสร็จล่ะ? งานกองเยอะแบบนี้ ทำไมไม่มีใครยื่นมือมาช่วยกันเลยนะ..."
2600002-5 = "โอ้ย ทำไมหนักแบบนี้นะ แต่เยอะแบบนี้จะไม่ให้หนักได้ยังไงล่ะเนอะ..."
2600002-6 = "...เอ๋?"
2600002-7 = "[s1] \"ให้ครูช่วยมั้ย?\"\n[s2] \"มันดูหนักมากเลยนะนั่น\""
2600002-8 = "......!?"
2600002-9 = "......!?"
2600002-10 = "คะ... คุณครู!? ทำไมถึงมาอยู่ที่นี่ได้ล่ะคะ?"
2600002-11 = "มาเพราะฉันติดต่อไปงั้นเหรอคะ? อ๋อ... จากข้อความของฉันใช่มั้ยคะ?"
2600002-12 = "ฉะ... ฉันติดต่อไปก็จริง... แต่ไม่คิดว่าคุณครูจะมาเร็วขนาดนี้..."
2600002-13 = "ตะ...แต่ไม่เป็นไรค่ะ! ฉะ... ฉันจัดการเอกสารพวกนี้ได้นะคะ ฉันยกไหวอยู่ค่ะ"
2600002-14 = "คะ? ไม่เป็นไรค่ะ ไม่เป็นไรจริงๆ..."
2600002-15 = "...จะช่วยยกครึ่งหนึ่งเหรอคะ?"
2600002-16 = "อะ... อืม... ฉันไม่ควรขอให้คุณครูช่วยงานอะไรแบบนี้นะคะ..."
2600002-17 = "..."
2600002-18 = "ก็ได้ค่ะ ไหนๆ คุณครูก็อาสาจะช่วยแล้ว ถ้าจะปฏิเสธก็คงเสียมารยาทใช่มั้ยล่ะคะ"
2600002-19 = "งั้นก็รบกวนด้วยนะคะ แล้วก็... ขอบคุณมากนะคะ"
2600002-20 = "นี่ค่ะ..."
2600002-23 = "[s] (รับเอกสารครึ่งหนึ่งมาจากชินัตสึ)"
2600002-24 = "...เอ๋?"
2600002-25 = "หนักกว่าที่คิดเหรอคะ? ฮุฮุ ใช่ค่ะ กระดาษพวกนี้หนักกว่าที่คิดเยอะเลยค่ะ"
2600002-26 = "ขอบคุณที่มาช่วยนะคะ แบบนี้ฉันก็เหนื่อยน้อยลงหน่อย"
2600002-27 = "อยากรู้ว่าต้องยกไปไหนเหรอคะ? ตามฉันมาได้เลยค่ะ! เราจะเดินลงบันไดไปค่ะ..."
2600002-28 = "ไม่ไกลมากหรอกค่ะ ตามฉันมาดีๆ นะคะ"
2600002-29 = "คะ? คุณครูไม่เชื่อว่าฉันต้องยกเอกสารพวกนี้ลงบันไดไปเหรอคะ?"
2600002-30 = "อืม... จริงๆ มันก็อันตรายอย่างที่คุณครูกังวลนะคะ..."
2600002-31 = "ฮุฮุฮุ..."
2600002-32 = "มาคิดดูแล้ว มีแค่คุณครูเท่านั้นนะคะที่เป็นห่วงฉันแบบนี้ ขอบคุณนะคะ"
2600002-33 = "แต่ก็ไม่เป็นไรหรอกค่ะ ฉันชินกับงานแบบนี้แล้วล่ะ"
2600002-34 = "คุณครูอาจจะทราบดีแล้วว่านักเรียนของเกเฮนน่าต่างมีบุคลิกเฉพาะตัวที่ชัดเจน..."
2600002-35 = "ไม่มีใครอยากมาทำงานอะไรที่ไม่ซับซ้อนแบบนี้หรอกค่ะ มีแต่คนพยายามเลี่ยงงานนี้กันทั้งนั้น"
2600002-36 = "ฉันก็เลยต้องมาทำยังไงล่ะคะ..."
2600002-37 = "ฉันแค่จะบอกว่า... ฉันทำงานนี้มานาน ก็เลยชินแล้วแค่นั้นน่ะค่ะ"
2600002-38 = "...คะ? หน้าที่ของฉันน่ะเหรอคะ?"
2600002-39 = "ไม่ใช่ตำแหน่งคนจัดการเอกสารหรอกค่ะ... ฉันดูแลเรื่องงานพยาบาลค่ะ"
2600002-40 = "สงสัยใช่มั้ยคะว่าทำไมคนที่ดูแลเรื่องงานพยาบาลต้องมาแบกเอกสารแบบนี้ด้วย?#nเฮ้อ... นั่นสินะคะ"
2600002-41 = "ฉันอยากให้มีคนมาช่วยทำงานนี้เพิ่มจังเลยค่ะ"
2600002-42 = "ที่ฉันทำอยู่นี่ไม่ใช่เพราะว่าฉันสนุกหรอกค่ะ แต่เป็นเพราะที่ฉันได้บอกไปต่างหาก..."
2600002-43 = "ถ้าไม่มีใครทำ งานก็จะเพิ่มขึ้นไปเรื่อยๆ และสุดท้ายก็ต้องมีคนมาทำอยู่ดี"
2600002-44 = "......"
2600002-45 = "ถึงงานจะหนัก แต่ฉันว่ามันก็เหมาะกับคนที่เรียบง่ายอย่างฉันดีนะคะ ฮุฮุ...."
2600002-46 = "[s3] \"ไม่ใช่เรียบง่ายหรอก เรียกว่าจิตใจดีมากกว่า\"\n[s4] \"ใครมาบอกว่าสาวแว่นเรียบง่ายเหรอ? ยอมให้ไม่ได้!\""
2600002-47 = "......"
2600002-48 = "......"
2600002-49 = "...เอ๋?"
2600002-50 = "คะ? ขะ ขอโทษนะคะ พอดีฉันไม่เข้าใจว่าหมายความว่าอะไร..."
2600002-51 = "แต่ที่สำคัญกว่านั้นก็คือ... ฉันทำให้คุณครูเสียเวลามากเลยค่ะ ขอโทษนะคะ#nคุณครูอุตส่าห์รีบมาช่วย แต่ฉันก็เอาแต่คุยจนเสียเวลา..."
2600002-52 = "ระ... รีบไปกันเถอะค่ะ..."
2600002-54 = "(ชินัตสึพูดจบก็รีบจ้ำลงบันไดไป)"
2600002-55 = "[s] (ตามชินัตสึไป)"
2600002-58 = "ถึงแล้วค่ะ... ที่นี่แหละค่ะคุณครู"
2600002-59 = "ขอบคุณที่มาช่วยนะคะ วางเอกสารไว้ตรงนี้เลยค่ะ เดี๋ยวที่เหลือฉันจัดการเอง"
2600002-60 = "คะ? ไหนๆ ก็มาแล้ว จะช่วยจนเสร็จงานเลยเหรอคะ?"
2600002-61 = "ทะ... ทำไมกันล่ะคะ..."
2600002-62 = "คือว่า... อืม..."
2600002-63 = "ฉันไม่รู้ว่าจะต้องทำยังไงน่ะค่ะ ไม่เคยมีคนมาช่วยฉันมาก่อน..."
2600002-64 = "...เอ๋?"
2600002-65 = "ให้สั่งงานได้ตามสบายเลยเหรอคะ? ให้คิดเสียว่าเราทำงานนี้ด้วยกันตั้งแต่แรกแล้วงั้นเหรอคะ?"
2600002-66 = "คุณครูจะมาช่วยฉันทุกครั้งที่ฉันต้องการความช่วยเหลือเลยเหรอคะ?"
2600002-67 = "......"
2600002-68 = "ฮุฮุฮุ..."
2600002-69 = "ขอบคุณที่อยากช่วยนะคะ แต่ฉันคงทำแบบนั้นไม่ได้หรอกค่ะ ฉันไม่อยากรบกวนคุณครูน่ะค่ะ"
2600002-70 = "แต่ว่า... ฉันก็ยอมรับนะคะ"
2600002-71 = "พอมีคุณครูมาช่วย ฉันก็รู้สึกว่างานน้อยลง และไม่เหน็ดเหนื่อยเหมือนที่เคยด้วยค่ะ"
2600002-72 = "ฉันจะไม่ขอให้คุณครูช่วยทุกวันหรอกค่ะ... แค่บางครั้งบางคราวก็พอ..."
2600002-73 = "เอาแค่ตอนที่คุณครูไม่ยุ่งก็พอแล้วล่ะค่ะ"
2600002-74 = "ถ้างั้นในอนาคต... เราก็มา... ทำด้วยกันอีกนะคะ..."
2600002-75 = "......"
2600002-77 = "ระ... รบกวนด้วยนะคะคุณครู"
2600002-79 = "(ชินัตสึยิ้มอย่างเขินอายแล้วเริ่มจัดการเอกสารที่ยกมา)"
2600002-80 = "(คุณครูช่วยชินัตสึจัดการเอกสารจนเสร็จทั้งหมดแล้วออกมาจากห้องเรียน)"

2600002-61 = "3;치나츠;04;왜, 왜 그렇게까지……\n#3;stiff"
2600002-62 = "3;치나츠;04;그게…… 음……"
2600002-63 = "3;치나츠;06;오히려 어떻게 해야 할 지 잘 모르겠네요. 누구도 이렇게 해 준 적이 없어서……\n#3;em;[땀]"
2600002-64 = "3;치나츠;01;……네?"
2600002-65 = "3;치나츠;02;그냥 편하게……? 처음부터 두 명이서 일했던 것처럼 생각하면 된다고요?\n#3;em;[반응]"

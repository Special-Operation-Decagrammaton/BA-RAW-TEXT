[translation]
2600002-1 = "#title;누군가는 해야만 하는 일"
2600002-2 = "3;치나츠;06;하아……\n#3;stiff\n#3;a\n#3;em;[속상함]"
2600002-3 = "3;치나츠;05;정말이지, 끝도 없군요. 이렇게나 일들이 쌓여 가는데 누구 하나 손 댈 생각도 안하고……"
2600002-4 = "3;치나츠;05\n#3;greeting\n#wait;1500"
2600002-5 = "3;치나츠;06;영차. 으음, 확실히 무겁군요. 이정도 분량이니 당연하다면 당연하겠지만……\n#3;stiff\n#3;em;[땀]"
2600002-6 = "3;치나츠;01;……응?"
2600002-7 = "[s1] \"대신 들어줄까?\"\n[s2] \"무거워 보이는데.\""
2600002-8 = "3;치나츠;02;……!?\n#3;em;[?!]\n#3;shake"
2600002-9 = "3;치나츠;02;……!?\n#3;em;[?!]\n#3;shake"
2600002-10 = "3;치나츠;02;서, 선생님!? 선생님께서 어째서 이런 곳에……!\n#3;stiff"
2600002-11 = "3;치나츠;02;네? 연락 받고 오셨다고요? 아…… 제가 보낸 메시지요?"
2600002-12 = "3;치나츠;04;무, 물론 제가 그렇게 연락 드리긴 했습니다만…… 그, 그렇다고 이렇게 곧바로……\n#3;em;[///]"
2600002-13 = "3;치나츠;05;아, 아니! 그 이전에, 우선 괜찮습니다. 서, 서류는 그냥 제가 들면 되니까요.\n#3;shake\n#3;em;[!]"
2600002-14 = "3;치나츠;02;네? 아, 아뇨. 정말로 괜찮은데……"
2600002-15 = "3;치나츠;02;아…… 절반만이라도 달라고요?\n#3;stiff"
2600002-16 = "3;치나츠;06;으, 으음…… 아무리 그래도 선생님께 이런 일을……\n#3;em;[땀]"
2600002-17 = "3;치나츠;01;……"
2600002-18 = "3;치나츠;02;아닙니다. 그래도 일부러 말씀해 주신 건데, 거절하는 것도 예의가 아니겠죠."
2600002-19 = "3;치나츠;07;그럼 부탁드리겠습니다. ……그리고 감사합니다."
2600002-20 = "3;치나츠;02;여기……"
2600002-21 = "3;치나츠;01\n#3;greeting\n#wait;400"
2600002-22 = "3;치나츠;01\n#wait;1000\n#3;closeup"
2600002-23 = "[s] (치나츠가 들고 있던 서류의 절반을 받는다.)"
2600002-24 = "3;치나츠;02;……네?"
2600002-25 = "3;치나츠;07;보기보다 무거우시다고요? 후훗. 그렇죠. 종이라는 건 생각보다 꽤 무거우니까요.\n#3;em;[재잘]"
2600002-26 = "3;치나츠;07;덕분에 저는 훨씬 편해졌습니다. 다시 한번 감사드려요.\n#3;greeting"
2600002-27 = "3;치나츠;02;……네? 어디로 가면 되냐고요? 아. 절 따라오시면 됩니다. 여기 계단으로 쭉 내려가서……"
2600002-28 = "3;치나츠;01;그리 멀지는 않으니까, 따라와 주시면 감사하겠습니다."
2600002-29 = "3;치나츠;02;네? 이렇게 한가득 서류철을 들고 계단까지 내려가려고 했냐고요?\n#3;em;[?]"
2600002-30 = "3;치나츠;99;위험하지 않냐고요? 그, 그야 물론 조금 그럴 수도 있긴 하지만……"
2600002-31 = "3;치나츠;03;……후후훗.\n#3;em;[재잘]"
2600002-32 = "3;치나츠;07;생각해 보니 그렇게 말씀해주신 분도 선생님이 처음이시군요. 감사합니다."
2600002-33 = "3;치나츠;07;하지만 정말로 괜찮습니다. 익숙해져 있으니까요, 이 정도는."
2600002-34 = "3;치나츠;99;선생님께서도 아시겠지만, 저희 게헨나 학생들은 특히나 자기만의 개성들이 강해서……\n#3;em;…"
2600002-35 = "3;치나츠;01;이런 수수한 일을 하려는 사람들은 별로 없거든요. 어떻게든 회피하려고 하죠."
2600002-36 = "3;치나츠;06;그래서 달리 하는 사람이 없다 보니, 제가 하게 됐고……\n#3;em;[땀]"
2600002-37 = "3;치나츠;01;계속 제가 하다 보니 조금은 익숙해졌다…… 그런 사소한 이야기입니다."
2600002-38 = "3;치나츠;02;……네? 저요?\n#3;em;[?]\n#3;stiff"
2600002-39 = "3;치나츠;01;서류 담당……? 아니요. 저는 보건담당이랍니다."
2600002-40 = "3;치나츠;06;네? 보건담당이 왜 이런 일까지 하고 있냐고요? ……하아. 그러게나 말이에요.\n#3;em;[속상함]"
2600002-41 = "3;치나츠;99;이런 것도 따로 해주는 담당 인력이 더 많았으면 좋겠는데 말이죠."
2600002-42 = "3;치나츠;01;뭐, 저도 딱히 좋아서 하는 건 아니니까요. 하지만 아까도 말씀드렸듯……"
2600002-43 = "3;치나츠;02;누구라도 하지 않으면 이렇게 끊임없이 쌓여만 가니까요. 결국 누군가 해야만 하는 일."
2600002-44 = "3;치나츠;01;……"
2600002-45 = "3;치나츠;07;수수한 저한테는 꽤 어울리는 일이기도 하고 말이에요. 후후……\n#3;em;…"
2600002-46 = "[s3] \"수수하지 않아. 상냥하다고 생각해.\"\n[s4] \"안경 미소녀가 수수하다고? 참을 수 없군!!\""

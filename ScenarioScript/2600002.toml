[translation]
2600002-1 = "必須有人負責的事"
2600002-2 = "哈啊……"
2600002-3 = "真是沒完沒了呢……明明事情只會越堆越多，可是卻沒有人願意做……"
2600002-5 = "嘿咻，有點重呢……不過文件量這麼多，本來就不可能會輕到哪裡去……"
2600002-6 = "……嗯？"
2600002-7 = "[s1]「我幫你拿吧？」\n[s2]「看起來很重呢，你還好嗎？」"
2600002-8 = "……！？"
2600002-9 = "……！？"
2600002-10 = "老，老師！？您怎麼會在這裡……！"
2600002-11 = "因為有接到聯絡？……啊，您是說我傳的訊息嗎？"
2600002-12 = "雖，雖然我有說想見老師……但也沒想到會這麼快……"
2600002-13 = "啊……總之這些我沒問題。還沒重到我拿不動。"
2600002-14 = "咦？不，不會，真的沒關係……"
2600002-15 = "……至少分一半給老師嗎？"
2600002-16 = "但怎麼能讓老師做這種事……"
2600002-17 = "……"
2600002-18 = "不，既然老師都這麼說了，一直拒絕好像也有些失禮。"
2600002-19 = "那就拜託老師了……還有，謝謝老師。"
2600002-20 = "嘿咻……"
2600002-23 = "[s] （接下千夏手上一半的文件）"
2600002-24 = "……還可以嗎？"
2600002-25 = "比想像中還要重嗎……？呵呵，我想也是。紙張這種東西一次拿很多的話，確實會比看起來還要重呢。"
2600002-26 = "多虧有老師幫忙，我才能輕鬆這麼多，謝謝老師。"
2600002-27 = "啊，然後，只要跟著我走就行了。沿著這個樓梯走下去……"
2600002-28 = "距離沒有很遠，走吧。"
2600002-29 = "您說文件這麼重，一個人走樓梯很危險……？"
2600002-30 = "話雖如此，但也沒辦法……"
2600002-31 = "……呵呵呵。"
2600002-32 = "不，仔細想想，還是第一次有人對我說這種話。"
2600002-33 = "不過請別擔心，我已經習慣了。……而且，這次還有老師來幫忙。"
2600002-34 = "我想老師應該也知道，我們格黑娜的學生個性都很強烈……"
2600002-35 = "幾乎沒有人願意做這種枯燥的工作。"
2600002-36 = "大家都是盡量能躲就躲，所以最後就變成由我來做了……"
2600002-37 = "做著做著就慢慢習慣了……沒什麼大不了的。"
2600002-38 = "……咦？您問我的職務是文書處理嗎……？"
2600002-39 = "不，我原本的職務是醫療救援。"
2600002-40 = "您說為什麼醫療連這種事都要做？……唉，就是說啊。"
2600002-41 = "我也希望有人能專門負責這些事務，"
2600002-42 = "我也不是因為喜歡才做這些工作。不過就像我剛才說的……"
2600002-43 = "即使沒有人願意做，終究還是要有人去處理才行。"
2600002-44 = "……"
2600002-45 = "而且這也相當適合，像我這樣不起眼的人。呵呵……"
2600002-46 = "[s3]「不會不起眼啊，而且你還這麼善良。」\n[s4]「眼鏡美少女哪裡不起眼！？」"
2600002-47 = "……"
2600002-48 = "……"
2600002-49 = "……咦？"
2600002-50 = "老，老師您說什麼……？對，對不起，我腦袋一時轉不過來……"
2600002-51 = "話，話說回來……！我們別傻站在這了，快點處理完吧。對不起，老師好不容易來一趟……"
2600002-52 = "我，我們趕快走吧……"
2600002-54 = "（千夏一邊這麼說著，一邊踏著輕快的步伐走下階梯）"
2600002-55 = "[s] （跟在後面）"
2600002-58 = "……就是這裡，老師。"
2600002-59 = "謝謝老師的幫忙，東西放這邊就好，剩下的我自己整理。"
2600002-60 = "您說要幫忙就乾脆幫到最後……？"
2600002-61 = "為，為什麼要做到那種程度……"
2600002-62 = "那個……嗯……"
2600002-63 = "對不起，從來沒人對我這麼好，我反而不知道該怎麼辦……"
2600002-64 = "……咦？"
2600002-65 = "今天開始習慣兩個人一起工作……？"
2600002-66 = "您說，如果我有需要，老師可以每天都過來……？"
2600002-67 = "……"
2600002-68 = "……呵呵呵。"
2600002-69 = "謝謝老師的心意，但我不能那麼做。我不想給老師添麻煩。"
2600002-70 = "不過……是的，說的也是呢。"
2600002-71 = "多虧有老師在，我今天一點也不無聊，這都是老師的功勞。"
2600002-72 = "……所以就算不是每天也沒關係，等到老師工作告一段落……"
2600002-73 = "等到老師有空閒，再請老師幫忙就好了。"
2600002-74 = "到時候再像今天一樣，一起……"
2600002-75 = "……"
2600002-77 = "……那，那就請多多關照了，老師。"
2600002-79 = "（千夏靦腆地笑著，並開始處理剩餘的文件）"
2600002-80 = "（一起把當天必須處理的東西都完成後，我便和千夏離開了教室）"

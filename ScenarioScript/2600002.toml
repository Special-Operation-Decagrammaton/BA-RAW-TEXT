2600002-58 = "3;치나츠;01;……도착했습니다. 여기예요, 선생님.\n#3;a\n#3;greeting"
2600002-59 = "3;치나츠;07;도와주셔서 감사합니다. 여기 놔주시면, 나머진 제가 정리할 수 있어요.\n#3;em;[반짝]"

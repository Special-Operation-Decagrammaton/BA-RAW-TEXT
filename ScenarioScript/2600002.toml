2600002-68 = "3;치나츠;03;……후후훗.\n#3;em;[재잘]"
2600002-69 = "3;치나츠;07;말씀은 정말 감사하지만, 그럴 수는 없지요. 선생님께 폐를 끼치는 것만큼은 사양입니다."
2600002-70 = "3;치나츠;07;하지만…… 네. 그렇네요.\n#3;greeting"
2600002-71 = "3;치나츠;07;덕분에 적어도 오늘은 따분하지 않다고 느끼고 있습니다. 선생님 덕분에요."
2600002-72 = "3;치나츠;99;……그러니 매일까진 아니더라도, 언제든 내키실 때……\n#3;em;…"

[translation]
2600002-1 = "What's Gotta Be Done"
2600002-2 = "*sigh*"
2600002-3 = "Is this ever going to end? All of this work piled up, and the others aren't doing anything to help."
2600002-5 = "(struggle) And it's so heavy too. Though that shouldn't surprise me at this point."
2600002-6 = "Huh?"
2600002-7 = "[s1] \"Need a hand?\"\n[s2] \"That looks heavy.\""
2600002-8 = "...?!"
2600002-9 = "...?!"
2600002-10 = "S-Sensei?! What are you doing here?"
2600002-11 = "You're here because of the last text I sent?"
2600002-12 = "W-Well, yes, b-but I didn't expect you to drop what you were doing and rush over here."
2600002-13 = "A-And the answer is no! I can handle carrying these documents just fine."
2600002-14 = "Excuse me? No, I said I was fine."
2600002-15 = "You...really want to carry half of them?"
2600002-16 = "I shouldn't be asking a teacher to do this for me..."
2600002-17 = "..."
2600002-18 = "Fine. You're offering, so it would be rude to turn you down."
2600002-19 = "Then please...and thank you."
2600002-20 = "Here you are."
2600002-23 = "[s] (I took half of the documents that Chinatsu was carrying.)"
2600002-24 = "Hmm?"
2600002-25 = "Heavier than you thought it would be? Paper is deceptively heavy when you stack it up like this."
2600002-26 = "You've made my life so much easier. Thanks again."
2600002-27 = "You want to know where we're headed? Just follow me. We're going straight down the stairs here..."
2600002-28 = "I promise it's not far, so I'd appreciate it if you could come with me."
2600002-29 = "You can't believe that I was about to go down the stairs with all of these files?"
2600002-30 = "I don't think it would have been that dangerous. Well, maybe a little..."
2600002-31 = "Heehee..."
2600002-32 = "Now that I think about it, you're the first person to say something like that to me. Thank you."
2600002-33 = "I would have managed. I'm used to things like this."
2600002-34 = "As I'm sure you've noticed, the students of Gehenna have unique personalities, to say the least..."
2600002-35 = "Many of them would never bother with this kind of menial work. They always try to avoid it."
2600002-36 = "So it often times falls to me to get it done."
2600002-37 = "So I have a lot of practice in dealing with these kinds of things. That's all."
2600002-38 = "Hmm? What about me?"
2600002-39 = "Am I in charge of paperwork? No, I'm the head of the Medical Committee."
2600002-40 = "*sigh* I don't get why a medical officer would have to do this either."
2600002-41 = "I wish we had more people to take care of this kind of work."
2600002-42 = "It's not something I particularly enjoying doing. But like I said before..."
2600002-43 = "...if no one does it, then it'll just keep piling up. Someone has to do it."
2600002-44 = "..."
2600002-45 = "Though this kind of work suits someone boring like me. Haha..."
2600002-46 = "[s3] \"I wouldn't call you boring. I think you're very kind-hearted.\"\n[s4] \"Who would call a such pretty girl in glasses boring?!'\""
2600002-47 = "..."
2600002-48 = "..."
2600002-49 = "...Excuse me?"
2600002-50 = "I must have blacked out for a second, because you couldn't possibly be talking about me."
2600002-51 = "M-More importantly...! I should apologize for taking up your time like this. You came all the way here, and yet I..."
2600002-52 = "W-We should hurry."
2600002-54 = "(Chinatsu hurried down the stairs at a brisk pace.)"
2600002-55 = "[s] (I followed her.)"
2600002-58 = "Here we are, Sensei."
2600002-59 = "Thanks for your help. You can leave your stack there. I can take it from here."
2600002-60 = "What was that? You want to help until I'm completely done?"
2600002-61 = "But...why?"
2600002-62 = "You don't..."
2600002-63 = "I'm not sure what to say. No one's ever offered like this before."
2600002-64 = "Hmm?"
2600002-65 = "I should just go with the flow? Think of us as two people who have been working together from the beginning?"
2600002-66 = "You'll help me until the job is done?"
2600002-67 = "..."
2600002-68 = "Heehee..."
2600002-69 = "It's nice of you to offer, but I couldn't agree to that. The last thing I want to do is inconvenience you."
2600002-70 = "...But I will admit this."
2600002-71 = "Today's work was much less tedious with you here, Sensei."
2600002-72 = "I won't ask you to help me every day, but as long as you're up to it..."
2600002-73 = "...I may turn to you if you aren't too busy."
2600002-74 = "That will afford us the opportunity to...catch up."
2600002-75 = "..."
2600002-77 = "I-I'll be looking forward to it."
2600002-79 = "(With a shy smile, Chinatsu began to organize the rest of the documents.)"
2600002-80 = "(Chinatsu and I left the classroom together after we finished our work for the day.)"

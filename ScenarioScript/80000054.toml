[translation]
80000054-1 = "ความรู้สึกที่คุ้นเคย"
80000054-3 = "(คุณครูออกมาซื้อเครื่องดื่มที่ร้านสะดวกซื้อ)"
80000054-9 = "เอ๊ะ... คุณครูนี่นา"
80000054-10 = "[s] \"....สึซึมิ?\""
80000054-11 = "สวัสดีค่ะ คุณครู ได้เจอกันที่นี่บังเอิญจังเลยนะคะ มาซื้ออะไรเหรอคะ...?"
80000054-12 = "คะ...? ฉันเหรอคะ? ก็... ก็เหมือนเดิมน่ะค่ะ แวะมาซื้อเครื่องดื่ม แล้วก็เลยซื้อพวกกระสุนตุนไว้หน่อย..."
80000054-13 = "อืม..."
80000054-14 = "นึกดูแล้ววันนี้เป็นวันวาเลนไทน์สินะคะ เอะใจอยู่เหมือนกันว่าทำไมร้านสะดวกซื้อถึงตกแต่งร้านใหม่"
80000054-15 = "อืม... วันวาเลนไทน์..."
80000054-16 = "..."
80000054-17 = "[s1] \"สึซึมิ...?\"\n[s2] \"มีอะไรเหรอ?\""
80000054-18 = "เปล่าค่ะ จู่ๆ ก็คิดว่าได้บังเอิญเจอกันแล้ว ถ้าจะแยกย้ายกันไปเฉยๆ มันก็น่าเสียดายค่ะ"
80000054-19 = "เปล่าค่ะ จู่ๆ ก็คิดว่าได้บังเอิญเจอกันแล้ว ถ้าจะแยกย้ายกันไปเฉยๆ มันก็น่าเสียดายค่ะ"
80000054-20 = "เลยคิดว่าอยากให้อะไรบางอย่างกับคุณครูค่ะ..."
80000054-21 = "นะ...แน่นอนว่าถ้าคุณครูไม่ว่าอะไรนะคะ"
80000054-22 = "คะ...? คุณครูดีใจเหรอคะ?"
80000054-23 = "พูดแบบนี้ตลอดเหมือนเคยเลยนะคะ ขอบคุณมากค่ะ"
80000054-24 = "ถะ...ถ้างั้นก็ต้องเลือกของก่อน..."
80000054-33 = "อันนี้... ดีมั้ยคะ...?"
80000054-35 = "[s3] \"รูปดาวด้วยแฮะ...\"\n[s4] \"สีทองระยิบระยับเลย!\""
80000054-36 = "ปะ...เป็นยังไงคะ? มะ...มันแปลกใช่มั้ยคะ...?"
80000054-37 = "ปะ...เป็นยังไงคะ? มะ...มันแปลกใช่มั้ยคะ...?"
80000054-38 = "คะ? ทำไมต้องเป็นรูปนี้งั้นเหรอคะ?"
80000054-39 = "คือว่า... เอ่อ... ฉันไม่ได้มีเหตุผลพิเศษที่เลือกรูปนี้หรอกค่ะ"
80000054-40 = "เอ๊ะ... นั่นสินะ... ทำไมฉันถึงได้เลือกรูปนี้มานะ"
80000054-41 = "[s5] \"เลือกสิ่งที่คุ้นเคยโดยไม่รู้ตัวรึเปล่า\"\n[s6] \"เพราะมักเห็นของแบบนี้หลังปาแฟลชบอมบ์รึเปล่า\""
80000054-42 = "พะ...พูดอะไรแบบนั้นกันคะ"
80000054-43 = "พะ...พูดอะไรแบบนั้นกันคะ"
80000054-44 = "ปะ...เปลี่ยนดีกว่าค่ะ รู้สึกเหมือนมันทำให้คุณครูเข้าใจผิดน่ะค่ะ"
80000054-45 = "คะ...? คุณครูขออันนี้เหรอคะ? อันนี้จะดีจริงๆ เหรอคะ? ทำไมกันนะ..."
80000054-46 = "[s] \"ใครเห็นก็รู้ได้ทันทีเลยไงว่าสึซึมิเลือกให้\""
80000054-47 = "คุณครู..."
80000054-51 = "ค่ะ... ขอบคุณมากค่ะ "
80000054-52 = "ดูเหมือนใช้เวลาคุณครูไปเยอะเลยนะคะ ฉันไม่เป็นไรหรอกค่ะ... ถ้างั้นฉันขอตัวก่อนนะคะ"
80000054-56 = "แต่ถ้าคุณครูไม่ว่าอะไร คือว่า... ขากลับนี่..."
80000054-57 = "เราไม่ได้เดินไปด้วยกันนานแล้ว วันนี้คุณครู... ให้ฉันเดินคุ้มกันไปได้มั้ยคะ?"
80000054-60 = "(คุณครูกลับมาที่ชาเล่ต์ได้อย่างปลอดภัยโดยมีสึซึมิเดินคุ้มกันมาด้วย)"

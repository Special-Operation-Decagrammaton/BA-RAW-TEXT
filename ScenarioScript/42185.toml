42185-92 = "3;미야코;99;출입로가 통제된 상황에서 빠르게 경로를 파악하여 범인이 대응하기 전에 기습하는 것은 CQB의 기본."
42185-93 = "3;미야코;03;전부터 느낀 것이지만 키리노 씨의 신속 대응 능력은 SRT의 그 누구보다도 훌륭하다고 생각합니다.\n#3;m3\n#5;dr"

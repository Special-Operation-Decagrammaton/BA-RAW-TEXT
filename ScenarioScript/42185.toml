42185-76 = "3;데카르트;02;저희를 향한 핍박과 모멸이 계속되더라도…… 단원들이 모두 도망쳐 저 혼자 남는다 하더라도…… <소확행>의 투쟁은 계속될 것입니다."
42185-77 = "3;데카르트;05;키보토스의 모두가 일하지 않고, 소유하지 않는, 무소유의 행복을 깨닫는 그날까지!\n#3;em;[!]\n#3;stiff"

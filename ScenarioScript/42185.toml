[translation]
42185-3 = "這，這些傢伙是怎麼回事啊！#n到底是從哪裡出現，又是從哪裡消失的！？"
42185-4 = "明明已經完全掌握了車站的構造圖……難道有他們才知道的祕密通道嗎！？"
42185-10 = "那當然！"
42185-11 = "是什麼時候──"
42185-21 = "像兔寶寶站這種歷史悠久的車站通常都經過數次擴建，#n因此當然會有許多地圖上沒有記載的通道或空間！"
42185-22 = "由於這些地方有容易發生犯罪的傾向，所以生活安全局的學生幾乎都有所掌握……#n沒想到會在這種情況下派上用場呢！"
42185-26 = "啊，吹雪！#n敵人……不對，奧客朝二樓過去了！"
42185-28 = "嗯嗯，有看到囉～"
42185-29 = "你們打算在電扶梯上奔跑嗎？#n這樣很危險唷～"
42185-34 = "可惡的麻雀！一定給你好看！"
42185-36 = "啊，你先等等。#n這座電扶梯因為太舊的關係……"
42185-40 = "偶～爾會緊急停止哦。"
42185-48 = "唔，唔哇！？"
42185-53 = "所以說為了安全起見，在電扶梯上請勿行走奔跑。#n這可是優良市民的常識唷。"
42185-59 = "這群生活安全局的烏合之眾……竟敢用這種把戲愚弄我們……"
42185-60 = "不可饒恕！"
42185-61 = "啊，危險──"
42185-75 = "竟然忘了我們「所確幸」的存在，凱薩公司的菁英也還差得遠呢！"
42185-76 = "即便對我們的侮蔑和壓迫依舊持續……就算團員們逃到只剩下我一個人……#n「所確幸」鬥爭仍然會持續下去。"
42185-77 = "直到奇普托斯的所有人都察覺不工作、不擁有──無所有的快樂為止！"
42185-79 = "居然在追求不工作的生活方式，真是一段佳話。"
42185-80 = "哦，你對無所有的生活方式感興趣嗎？#n我們隨時都歡迎新的修道者加入！"
42185-81 = "……只不過，假如你想加入「所確幸」的話，#n為了證明自身的無所有，就必須將你的持有品[ruby= ・     ・ ]稍微[/ruby]奉獻一點出來才行。"
42185-82 = "（唔嗯……？總覺得有種直銷的氣息……）"
42185-86 = "……Clear。#n上行月台這裡也清理得差不多了。"
42185-87 = "生活安全局的各位，謝謝你們。#n多虧有你們才能順利地抵達月台。"
42185-88 = "不會不會！#n本官只不過是在取締那些在車站內搗亂的奧客罷了。"
42185-89 = "反而是我該感謝你協助我們的業務！"
42185-90 = "……桐乃同學，你今天展現出來[ruby=限制空間戰鬥]的CQB能[/ruby]力，令我十分印象深刻。"
42185-91 = "C，CQB……？#n本官不記得有學過啊……"
42185-92 = "在出入口遭到封鎖的情況下迅速掌握路徑，#n在敵方做出應對之前發動突襲就是CQB的基本要領。"
42185-93 = "我從以前就覺得桐乃同學的臨機應變能力，比任何一個SRT的學生都還優秀。"
42185-94 = "看來「每當發生犯罪時，生活安全局都會最先抵達現場」這句話所言不假。"
42185-96 = "是，是這樣嗎……？"
42185-97 = "本官只是想趕快巡邏完去吃美食才會……"
42185-101 = "……"
42185-102 = "……不過就算是這樣，我還是以身為生活安全局的一員感到驕傲！"
42185-104 = "當然，我身為公園的居民，也常常受你們照顧。"
42185-105 = "那麼……接下來也要繼續拜託你了。"
42185-107 = "是！"
42185-109 = "下一話;深淵"

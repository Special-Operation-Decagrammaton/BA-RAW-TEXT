[translation]
42185-3 = "な、何だこいつら！一体どこから現れてどこに消えてるんだ！？"
42185-4 = "駅の構内図は完璧に把握しているはずなのに……ヤツらだけが知っている隠し通路があるとでもいうのか！？"
42185-10 = "もちろんです！"
42185-11 = "いつの間に――"
42185-21 = "古い駅は増築を重ねていますから、地図に載っていない通路やスペースがたくさんあるのです！"
42185-22 = "こういう場所は犯罪が起こりやすい傾向にありますので、#n生活安全局の生徒は把握しておりまして……#nまさか、こんな所で役に立つとは思いませんでしたが！"
42185-26 = "あっ、フブキ！2階に敵……いえ、不良乗客が向かっています！"
42185-28 = "うんうん、見てるよ～"
42185-29 = "エスカレーターを突っ切るつもりなのかな？危ないよ～"
42185-34 = "クソッ！目に物見せてやる！"
42185-36 = "あ、ちょっとたんま。#nこのエスカレーター、古すぎるからさぁ。"
42185-40 = "たま～に緊急停止しちゃうんだ。"
42185-48 = "う、うわぁっ！？"
42185-53 = "だから、安全のためにエスカレーターは立ち止まって利用してね。#n文化市民の常識だよ。"
42185-59 = "この生活安全局の寄せ集めどもめ……こんなやり方で我々を弄ぶなんて……"
42185-60 = "許さんぞッ！"
42185-61 = "あっ、危な――"
42185-75 = "「所確幸」を忘れるなんて、カイザーコーポレーションのエリートもまだまだですね！"
42185-76 = "我々に対する侮蔑と迫害が続いたとしても……団員が全員逃げて私一人だけ取り残されたとしても……「所確幸」の闘争は続くのです。"
42185-77 = "キヴォトスの誰もが働かず、所有しない――無所有の悦びに気付くその日まで！"
42185-79 = "働かないで済む生き方を追求するなんて、素敵な話じゃん。"
42185-80 = "お、無所有の生き方に興味があるのですか？#n我々はいつだって新しい修道者を歓迎します！"
42185-81 = "……ただ、「所確幸」に入るためには、己の無所有を証明するために所持品を[ruby=・  ・]少し[/ruby]降ろさないといけませんがね。"
42185-82 = "（う～ん、なんだか雲行きが怪しく……）"
42185-86 = "……クリア。上りホーム側も片付けました。"
42185-87 = "生活安全局の皆さん、ありがとうございました。#nおかげさまで怪我せず、無事ホームにたどり着けました。"
42185-88 = "いえいえ！本官は駅構内でトラブルを起こす不良乗客を取り締まっただけですから。"
42185-89 = "むしろ業務へのご協力、感謝します！"
42185-90 = "……今日、キリノさんが披露された[ruby=近接戦闘]CQB[/ruby]の腕前は、なかなか印象的でした。"
42185-91 = "C、CQBですか……？#n本官は習った覚えがないのですが……"
42185-92 = "出入口が封鎖された状況で素早く経路を把握し、#n犯人が対応する前に奇襲するのはCQBの基本。"
42185-93 = "以前から思っていたのですが、キリノさんの対応能力はSRTの誰よりも優れていると思います。"
42185-94 = "犯罪発生時に誰よりも早く現場に現れるという生活安全局の話は嘘ではなかったんですね。"
42185-96 = "そ、そうなのですか……？"
42185-97 = "本官はただ、パトロールを早く終わらせて美味しいものを食べようと……"
42185-101 = "……。"
42185-102 = "……まあ、でも！#n生活安全局の一員として、それなりの誇りは持っております！"
42185-104 = "ええ。公園の住人として、いつもお世話になっています。"
42185-105 = "それでは……引続きよろしくお願いしますね。"
42185-107 = "はいっ！"
42185-109 = "次回;アビス"

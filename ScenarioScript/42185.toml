[translation]
42185-3 = "Who are these people? How are they moving like this? Where are they coming from?"
42185-4 = "We should have the full blueprint of this station. Is there a secret route only they know about or something?"
42185-10 = "Bingo!"
42185-11 = "When did she...?!"
42185-21 = "Old stations like Kousagi have undergone numerous renovations, leaving lots of forgotten nooks and crannies."
42185-22 = "They tend to turn into hot spots for shady activity, so Public Safety students naturally learn the terrain pretty well. Just didn't think we'd be using them this way."
42185-26 = "Oh, Fubuki! We have hostiles, I mean, improper passengers going to the 2nd floor!"
42185-28 = "Yup, yup. I have eyes on them."
42185-29 = "Are they thinking of using the escalators as a shortcut? Risky move..."
42185-34 = "Those little punks! Just wait 'til we catch up!"
42185-36 = "Oh, a heads up. These escalators are ancient."
42185-40 = "Please remain vigilant for any sudden stops. Thank you!"
42185-48 = "H-Huh?!"
42185-53 = "Which is why running on escalators isn't advised. It's basic safety, really."
42185-59 = "These damn Public Safety Bureau kids are running circles around us with their dirty tactics."
42185-60 = "We'll take you all down!"
42185-61 = "Look out!"
42185-75 = "You're the rookies if you forgot about your opponent, the Pursuers!"
42185-76 = "Even if I'm looked down upon with disdain... Even if I'm the last man standing... Our fight will go on!"
42185-77 = "Until every citizen in Kivotos understands the freedom of living without the burdens of work or possessions!"
42185-79 = "A world with no work? I'm listening..."
42185-80 = "Are you perhaps interested in a life of non-possession? We are always ready to accept new believers!"
42185-81 = "...But joining the Pursuers means giving up 'some' materialistic ties. Preferably in the form of cash."
42185-82 = "(Why do I feel like I'm being recruited to a pyramid scheme...)"
42185-86 = "...All clear. North platform is secured."
42185-87 = "Thank you, Public Safety Bureau. We wouldn't have made it here with no casualties without your assistance."
42185-88 = "All in a day's work. Just making sure the passengers and public are safe!"
42185-89 = "In fact, we owe you one for ensuring public order!"
42185-90 = "Thank you. I was very impressed by your close combat battle abilities today."
42185-91 = "M-Mine? I.. I've never trained that before..."
42185-92 = "Identifying how to control and subdue your enemy's movements in tight spaces is a basic principle of close combat. You do it instinctively."
42185-93 = "I've always thought your ability to evaluate and react to a situation was even better than any SRT students."
42185-94 = "You embody the Public Safety's reputation for speed and efficiency. That's why I find you very impressive, Kirino."
42185-96 = "Impressive? Me...?"
42185-97 = "It's always just been a habit of mine to move as efficiently as possible so I could finish my patrol quickly and hit my go-to eateries..."
42185-101 = "..."
42185-102 = "...But, of course, I take immense pride and care in my work as a member of Valkyrie's Public Safety Bureau!"
42185-104 = "Yes, we're under your care, as residents of the park."
42185-105 = "Then... I leave the rest to you."
42185-107 = "Understood!"
42185-109 = "Next Episode; Abyss"

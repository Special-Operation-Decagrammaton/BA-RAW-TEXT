42185-87 = "3;미야코;03;감사합니다, 생활안전국 여러분. 덕분에 부상 없이 승강장까지 무사히 진입할 수 있었습니다.\n#3;greeting"
42185-88 = "5;키리노;00;아닙니다. 본관은 그저 역사 내에서 말썽을 부리는 불량 승객들을 단속한 것뿐인걸요.\n#5;al\n#5;em;[반짝]\n#5;hophop\n#3;m1"
42185-89 = "5;키리노;03;오히려 생활안전 업무에 협조해 주셔서 대단히 감사합니다!"
42185-90 = "3;미야코;02;……오늘 키리노 씨가 보여 주신[ruby=근접전투체계] CQB [/ruby]실력은 꽤나 인상적이었습니다."

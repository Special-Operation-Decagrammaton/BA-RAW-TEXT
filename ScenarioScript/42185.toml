[translation]
42185-3 = "อะไรของพวกนั้นน่ะ? อยู่ๆ ก็โผล่มาจากไหนไม่รู้ แล้วก็หนีหายไปไหนแล้ว?"
42185-4 = "พวกฉันรู้เส้นทางตามแผนที่ของสถานีเป็นอย่างดีแล้วนี่นา... หรือว่าจะมีเส้นทางลับที่มีแต่พวกนั้นที่รู้?"
42185-10 = "แน่นอนค่ะ!"
42185-11 = "นี่เธอ แอบเข้ามาตอนไหนกัน...!"
42185-21 = "สถานีโคะอุซางิเป็นสถานีเก่ามีการต่อเติมอยู่เรื่อยๆ ก็เลยมีพื้นที่ตรงประตูหลัง และพื้นที่ยิบย่อย#nอีกหลายจุดที่ไม่ได้ระบุไว้ในแผนที่ค่ะ"
42185-22 = "พื้นที่บริเวณนี้มีแนวโน้มที่จะเป็นพื้นที่ที่มีอาชญากรรมสูง นักเรียนของสำนักรักษาความปลอดภัยส่วน#nใหญ่จึงรู้ตำแหน่งทั้งหมด... แต่ไม่คิดเลยนะคะว่าจะถึงวันที่ได้ใช้ประโยชน์ขึ้นมาจริงๆ"
42185-26 = "อ๊ะ ฟุบุกิ! มีศัตรู... ไม่สิ มีผู้โดยสารนิสัยไม่ดีกำลังมุ่งหน้าไปที่ชั้น 2 ค่ะ!"
42185-28 = "อื้ม ฉันกำลังจับตาดูอยู่"
42185-29 = "คิดจะวิ่งผ่าบันไดเลื่อนมาเลยเหรอนั่น? แบบนั้นมันอันตรายนะ..."
42185-34 = "ยัยพวกนกกระจอกน่ารำคาญพวกนี้นี่! ฉันจะขึ้นไปกำราบพวกเธอเดี๋ยวนี้เลย!"
42185-36 = "อ๊ะ ขอโทษนะ พอดีบันไดเลื่อนของสถานีนี้มันเก่ามากแล้ว"
42185-40 = "บางครั้งมันก็หยุดทำงานเอาซะดื้อๆ น่ะ"
42185-48 = "วะ... ว้าก?!"
42185-53 = "เพื่อความความปลอดภัย พวกนายอย่าเดินหรือวิ่งบนบันไดเลื่อนจะดีกว่า นี่มันเป็นสามัญสำนึกของคน#nที่มีอารยะนะ"
42185-59 = "ยัยพวกสมองทึบจากสำนักรักษาความปลอดภัย... คิดจะใช้วิธีเปิ่นๆ หลอกล่อคนฉลาดอย่างพวกฉันงั้น#nเหรอ..."
42185-60 = "ฉันไม่ปล่อยไว้เฉยๆ แน่!"
42185-61 = "อ๊ะ อันตราย!"
42185-75 = "ลืมว่าที่นี่ยังมี <ความสุขเล็กๆ> ไปได้ยังไง คนฉลาดของไคเซอร์ คอร์เปอเรชั่นตาบอดไปแล้วสินะครับ!"
42185-76 = "ต่อให้พวกคุณจะข่มเหงและดูถูกพวกเราไปเรื่อยๆ... ต่อให้สมาชิกคนอื่นจะหนีจนเหลือแค่ผมคนเดียว การต่อสู้ของ <ความสุขเล็กๆ> ก็จะยังดำเนินไปไม่เสื่อมคลายครับ"
42185-77 = "ผมจะสู้จนกว่าจะถึงวันที่ทุกคนในคิโวทอสไม่ต้องทำงาน ไม่เป็นเจ้าของ และเข้าใจในความสุขที่ไม่#nต้องครอบครองสิ่งใด!"
42185-79 = "อยากมีชีวิตที่ไม่ต้องทำงานงั้นเหรอ? เป็นความคิดที่เจ๋งเป้งสุดๆ ไปเลยแฮะ"
42185-80 = "โอ้ สนใจในชีวิตที่ไม่ครอบครองสิ่งใดงั้นเหรอครับ? พวกผมยินดีรับผู้บำเพ็ญตนใหม่ๆ ด้วยใจที่เปิด#nกว้างเสมอเลยนะครับ!"
42185-81 = "แต่ถ้าจะเข้ามาในกลุ่ม <ความสุขเล็กๆ> ก็ต้อง 'ปล่อยวาง' ของที่มีอยู่เพื่อพิสูจน์ให้เห็นว่าไม่ต้องการ#nเป็นเจ้าของสิ่งใดด้วยนะครับ"
42185-82 = "(หืม...? ทำไมรู้สึกเหมือนเจอมิจฉาชีพเลย...)"
42185-86 = "... เคลียร์ ชานชาลาขาขึ้นก็จัดการเรียบร้อยแล้วค่ะ"
42185-87 = "ขอบคุณนะคะ พอมีสำนักรักษาความปลอดภัยทุกคนช่วยเอาไว้ เราก็เลยเข้ามาถึงชานชาลาได้โดย#nที่ไม่มีใครได้รับบาดเจ็บค่ะ"
42185-88 = "ไม่หรอกค่ะ ฉันก็แค่ควบคุมผู้โดยสารนิสัยไม่ดีที่สร้างปัญหาในอาคารสถานีรถไฟก็เท่านั้นเองค่ะ"
42185-89 = "พวกฉันต่างหากค่ะที่ต้องขอบคุณที่ให้ความร่วมมือในงานสวัสดิภาพของชาวเมือง ขอบคุณนะคะ!"
42185-90 = "... เทคนิคการต่อสู้ระยะประชิดหรือ CQB ของคุณคิริโนะวันนี้ถือว่าน่าประทับใจมากเลยค่ะ"
42185-91 = "C... CQB เหรอคะ...? แต่ฉันยังไม่เคยเรียนอะไรแบบนั้นเลยนะคะ..."
42185-92 = "เมื่ออยู่ในสถานการณ์ที่ทางเข้าออกถูกปิด การวิเคราะห์หาเส้นทางอย่างรวดเร็วให้ได้ก่อนที่คนร้ายจะ#nตอบโต้คือพื้นฐานของ CQB"
42185-93 = "ฉันจับความรู้สึกได้มานานแล้วละค่ะว่าความสามารถในการตอบสนองอย่างรวดเร็วของคุณคิริโนะนั้น ยอดเยี่ยมกว่า SRT คนไหนๆ เสียอีกค่ะ"
42185-94 = "มันไม่ใช่เรื่องโกหกเลยนะคะ ที่บอกว่าหากเกิดเหตุอาชญากรรมขึ้นมา นักเรียนจากสำนักรักษาความ#nปลอดภัยจะปรากฏตัวในที่เกิดเหตุเร็วกว่าใครทั้งหมด"
42185-96 = "ฉะ... ฉันเหรอคะ?"
42185-97 = "ปกติแล้วฉันก็แค่อยากจะลาดตระเวนให้เสร็จเร็วๆ จะได้ไปตระเวนร้านเด็ดๆ ต่อ ก็เลยชอบหาทางลัด#nไปเรื่อยน่ะค่ะ..."
42185-101 = "......"
42185-102 = "... แต่ในฐานะสมาชิกของสำนักรักษาความปลอดภัยวัลคิรี่ ฉันก็ภาคภูมิใจในตัวเองอยู่ค่ะ!"
42185-104 = "ค่ะ ส่วนฉันก็เป็นหนี้บุญคุณอยู่ตลอดในฐานะผู้อาศัยในสวนสาธารณะค่ะ"
42185-105 = "ถ้างั้นก็... ฝากเรื่องที่เหลือด้วยนะคะ"
42185-107 = "ได้ค่ะ!"
42185-109 = "ตอนต่อไป;เหวนรก"

[translation]
80000089-1 = "The Seminar Secretary's Sweet Prank"
80000089-2 = "Hello, Sensei."
80000089-3 = "Do you have a moment?"
80000089-4 = "[s1] \"Hello, Noa.\"\n[s2] \"What brings you to Schale today?\""
80000089-5 = "Well, while I was passing through the area, I happened across something I've been wanting for a while, and I bought it!"
80000089-6 = "Well, while I was passing through the area, I happened across something I've been wanting for a while, and I bought it!"
80000089-7 = "It's very rare! I just couldn't keep it to myself. I wanted to show it to you, Sensei."
80000089-8 = "[s] \"What could it be?\""
80000089-12 = "It's..."
80000089-13 = "Ta-da!"
80000089-15 = "It's a bottle of ink."
80000089-16 = "Most people use ballpoint pens if they're going to be writing by hand these days. It's hard to find a glass bottle of ink."
80000089-17 = "But, as the Seminar secretary, I was curious to try the classic quill-and-ink calligraphy."
80000089-18 = "Of course, no one in Millennium would sell a classic like this. All our documents are written digitally."
80000089-19 = "But I was walking through a shopping district near here and I found this lovely ink bottle!"
80000089-20 = "I couldn't wait to try it out, but I don't have any paper on hand..."
80000089-21 = "So I decided to stop by Schale. Oh, excuse me for the interruption..."
80000089-22 = "[s] \"No need. Feel free to come by whenever you need anything.\""
80000089-23 = "Thank you, Sensei."
80000089-24 = "So could I borrow a piece of paper?"
80000089-25 = "[s] Give Noa a piece of paper."
80000089-26 = "Thank you."
80000089-27 = "Let's see..."
80000089-32 = "Hmm? This ink isn't working very well..."
80000089-33 = "I think the quill might need wetting."
80000089-43 = "[ns3] \"Noa, that ink could be toxic! Don't put it in your mouth!\"\n[ns4] \"Spit it out quickly, spit it out, spit it out!\""
80000089-46 = "Heh... Heeheehee..."
80000089-47 = "Smile, you're on candid camera!"
80000089-48 = "[s] \"...Huh? A camera? Where?\""
80000089-49 = "Sensei, do you remember what day today is?"
80000089-50 = "[s] \"Valentine's Day?\""
80000089-51 = "Yes. Today is Valentine's Day. A time when those in love give each other chocolates..."
80000089-52 = "And, more relevantly, a time when the shopping district has a bunch of chocolate in unusual shapes."
80000089-53 = "I bought this ink bottle from a specialty sweet shop."
80000089-54 = "The liquid inside is chocolate, not ink."
80000089-55 = "It's actually quite delicious!"
80000089-56 = "[s5] \"That's good, but I was really freaked out...\"\n[s6] \"I thought you were actually putting ink in your mouth.\""
80000089-57 = "Heehee. As an apology for the prank, you can have this chocolate, Sensei."
80000089-58 = "Heehee. As an apology for the prank, you can have this chocolate, Sensei."
80000089-59 = "It's not really practical for writing, as it's difficult to transfer to quills and it spoils easily, but..."
80000089-60 = "It would be perfect if you want to make a statement about your sweet feelings for someone."
80000089-61 = "If you ever want to deliver that kind of message..."
80000089-62 = "Please use this ink."

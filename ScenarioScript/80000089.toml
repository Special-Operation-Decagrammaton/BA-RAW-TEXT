[translation]
80000089-1 = "研討會書記乃愛的甜蜜惡作劇"
80000089-2 = "你好，老師。"
80000089-3 = "能占用你一點時間嗎？"
80000089-4 = "[s1]「哈囉，乃愛。」\n[s2]「當然沒問題，不過今天有什麼事嗎？」"
80000089-5 = "呵呵。其實我在夏萊附近買了「某個東西」……"
80000089-6 = "呵呵。其實我在夏萊附近買了「某個東西」……"
80000089-7 = "因為是少見的東西，所以想讓老師也看看，於是就過來了。"
80000089-8 = "[s]「是什麼東西呢……？」"
80000089-12 = "那就是……"
80000089-13 = "鏘鏘～！"
80000089-15 = "是瓶裝墨水。"
80000089-16 = "現在幾乎都用原子筆書寫，所以越來越少見了呢。"
80000089-17 = "不過身為研討會的書記……#n我一直想挑戰一次用羽毛筆和墨汁來寫書法。"
80000089-18 = "然而現在千年大部分的文件都是使用數位的方式記錄，#n這種古典的文具幾乎已經看不見了……"
80000089-19 = "而剛才碰巧在對面的商店街看見了這個。"
80000089-20 = "於是我就想馬上嘗試用它書寫的感覺，手邊卻碰巧沒有紙張……"
80000089-21 = "所以我才會跑來夏萊。很抱歉這麼突然。"
80000089-22 = "[s]「沒關係，隨時要來都可以唷。」"
80000089-23 = "謝謝你，老師。"
80000089-24 = "那麼……能請老師給我一張紙嗎？"
80000089-25 = "[s]把紙張遞給乃愛"
80000089-26 = "謝謝老師。"
80000089-27 = "那麼……"
80000089-32 = "哎呀，墨汁好像不太順暢呢。"
80000089-33 = "稍微弄濕可能會好一點。就用舌頭輕輕地……"
80000089-43 = "[ns3]「乃愛，你剛才舔了墨水嗎！？」\n[ns4]「快吐出來！」"
80000089-46 = "……呵呵。"
80000089-47 = "整人計畫，大成功～♪"
80000089-48 = "[s]「整，整人計畫……？」"
80000089-49 = "老師，你記得今天是什麼日子嗎？"
80000089-50 = "[s]「……是情人節，對吧？」"
80000089-51 = "是的，正是如此。#n是將巧克力送給心愛之人……甜蜜蜜的特別日子。"
80000089-52 = "路過商店街時，我發現那裡正賣著許多沒見過的巧克力。"
80000089-53 = "而這個瓶裝墨水也是其中之一。"
80000089-54 = "雖然看起來是墨水，裡面裝的其實是巧克力。"
80000089-55 = "……嗯，又甜又好吃呢。"
80000089-56 = "[s5]「那就好……」\n[s6]「我以為是墨水，害我擔心了一下。」"
80000089-57 = "呵呵。作為剛才惡作劇的賠罪，這個巧克力就送給老師吧。"
80000089-58 = "呵呵。作為剛才惡作劇的賠罪，這個巧克力就送給老師吧。"
80000089-59 = "畢竟是巧克力，要像墨水一樣的順暢的運筆可能有點困難。#n而且還有保存期限……"
80000089-60 = "不過正因如此，想要傳達心意的時候……我想應該沒有比這更適合的墨水了。"
80000089-61 = "等老師面臨這種情況的時候……"
80000089-62 = "請務必，要使用這個墨水哦。"

[translation]
80000089-1 = "#title;세미나 서기 노아의 달콤한 장난"
80000089-2 = "3;노아;01;안녕하세요, 선생님.\n#3;a\n#3;em;[반응]"
80000089-3 = "3;노아;03;잠깐 시간 괜찮으신가요?"
80000089-4 = "[s1] \"안녕, 노아.\"\n[s2] \"이 시간에 샬레에는 무슨 일이야?\""
80000089-5 = "3;노아;01;그게, 이 근처를 지나가다가 예전부터 꼭 갖고 싶었던 물건 하나를 구입했거든요."
80000089-6 = "3;노아;01;그게, 이 근처를 지나가다가 예전부터 꼭 갖고 싶었던 물건 하나를 구입했거든요."
80000089-7 = "3;노아;03;워낙 귀한 것인지라. 혼자 보기가 아까워 선생님께 자랑하기 위해 가져왔답니다.\n#3;em;[음표]"
80000089-8 = "[s] \"어떤 물건이기에……\""
80000089-9 = "#st;[0,0];instant;1;"
80000089-10 = "#clearST"
80000089-11 = "3;노아;01\n#3;m1\n#wait;1000"
80000089-12 = "3;노아;99;바로……\n#3;em;…"
80000089-13 = "3;노아;03;짠—"
80000089-14 = "#wait;2500"
80000089-15 = "3;노아;01;바로 잉크가 담긴 잉크병입니다.\n#3;em;[반짝]"
80000089-16 = "3;노아;01;요새는 글씨를 쓸 때 주로 볼펜을 사용하니, 이렇게 잉크만 따로 담긴 유리병을 찾는 사람은 거의 없으니까요."
80000089-17 = "3;노아;99;하지만 세미나의 서기된 사람으로서, 클래식한 깃펜과 잉크로 멋진 캘리그라피를 그려보고 싶다는 욕망도 조금은 있었답니다.\n#3;m3"
80000089-18 = "3;노아;02;다만 밀레니엄에서는 대부분의 문서들을 워드프로세서 기기로 기록하다 보니, 이런 클래식한 잉크병을 파는 곳은 도저히 찾을 수가 없었거든요……"
80000089-19 = "3;노아;03;그런데 마침 오늘 샬레 근처의 상가를 지나다 이렇게 멋진 색의 잉크병을 발견했답니다.\n#3;em;[음표]"
80000089-20 = "3;노아;01;좋은 잉크를 찾았으니 한시라도 빨리 필기감을 시험해 보고 싶었는데, 마침 종이를 갖고 있지 않아서요."
80000089-21 = "3;노아;99;그래서 이렇게 약속도 없이 갑작스럽게 샬레에 찾아오게 되었습니다. 부디 양해를……"
80000089-22 = "[s] \"아니야. 필요할 때 언제든 부담 없이 찾아와.\""
80000089-23 = "3;노아;03;감사합니다, 선생님.\n#3;em;[하트]"
80000089-24 = "3;노아;01;그래서, 괜찮으시다면 종이 한 장만 빌려주지 않으시겠어요?"
80000089-25 = "[s] 노아에게 종이를 건네준다."
80000089-26 = "3;노아;03;감사합니다.\n#3;greeting"
80000089-27 = "3;노아;01;어디, 어디……\n#3;em;…"
80000089-28 = "#st;[0,0];instant;1;"
80000089-29 = "#clearST"
80000089-30 = "3;노아;01\n#3;greeting\n#wait;1000"
80000089-31 = "#wait;1500"
80000089-32 = "3;노아;02;어라? 어째서인지 이 잉크, 잘 듣지를 않네요.\n#3;em;[?]"
80000089-33 = "3;노아;99;그렇다면 살짝 깃펜에 침을 묻혀보면……\n#3;em;…"
80000089-34 = "#st;[0,0];instant;1;"
80000089-35 = "#clearST"
80000089-36 = "3;노아;99\n#3;greeting\n#wait;1000"
80000089-37 = "#wait;1500"
80000089-38 = "3;노아;99\n#3;d\n#wait;1000"
80000089-39 = "#wait;200"
80000089-40 = "#wait;200"
80000089-41 = "#wait;200"
80000089-42 = "3;노아;01\n#3;a\n#3;closeup\n#wait;1500"
80000089-43 = "[ns3] \"노아, 잉크를 먹으면 어떻게 해?!\"\n[ns4] \"빨리 뱉어! 퉤 하고 뱉어, 퉤!\""
80000089-44 = "3;노아;04\n#3;em;…\n#wait;2500"
80000089-45 = "3;노아;04\n#3;em;…\n#wait;2500"
80000089-46 = "3;노아;03;훗…… 후후후……"
80000089-47 = "3;노아;03;오늘의 몰래 카메라, 대성공이네요~\n#3;em;[재잘]"
80000089-48 = "[s] \"모, 몰래 카메라……?\""
80000089-49 = "3;노아;01;선생님. 오늘이 무슨 날인지 기억하고 계신가요?"
80000089-50 = "[s] \"……발렌타인 데이?\""
80000089-51 = "3;노아;99;네, 오늘은 발렌타인 데이. 사랑하는 사람들이 서로에게 초콜릿을 주고받는 사랑스러운 기념일이지요. \n#3;em;…"
80000089-52 = "3;노아;01;덕분에 상가에 평소에는 볼 수 없었던 다양한 모양의 초콜릿이 잔뜩 있더라고요."
80000089-53 = "3;노아;01;이 잉크병도 초콜릿을 파는 식료품점에서 사왔답니다."
80000089-54 = "3;노아;01;병의 모양은 이래도 안에 담긴 액체는 잉크가 아닌 초콜릿이에요."
80000089-55 = "3;노아;03;음, 맛도 제법 달콤하네요~\n#3;em;[음표]"
80000089-56 = "[s5] \"그렇다면 다행이지만……\"\n[s6] \"잉크를 마신 줄 알고 깜짝 놀랐잖아.\""
80000089-57 = "3;노아;03;후후. 장난의 사과를 대신할 겸, 이 초콜릿은 선생님께 선물할게요.\n#3;em;[재잘]"
80000089-58 = "3;노아;03;후후. 장난의 사과를 대신할 겸, 이 초콜릿은 선생님께 선물할게요.\n#3;em;[재잘]"
80000089-59 = "3;노아;01;이 초콜릿 잉크는 평범한 잉크와는 달리 깃펜에도 잘 묻지 않고, 상하기도 쉬워서 글을 적는 데에는 적합하지 않겠지만……"
80000089-60 = "3;노아;99;사랑과 같은 달콤한 마음을 전하고자 할 때는 이만한 잉크도 따로 없겠죠."
80000089-61 = "3;노아;01;선생님께서도 언젠가 누군가에게 달콤한 말을 전하고 싶어지신다면……"
80000089-62 = "3;노아;03;부디, 꼭 이 잉크를 사용해주세요.\n#3;em;[하트]"

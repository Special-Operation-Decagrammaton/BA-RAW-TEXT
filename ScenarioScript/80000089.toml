[translation]
80000089-1 = "การหยอกเล่นของโนอา เลขาแห่งเซมิน่า"
80000089-2 = "สวัสดีค่ะคุณครู"
80000089-3 = "ขอรบกวนเวลาสักครู่ได้รึเปล่าคะ?"
80000089-4 = "[s1] \"ว่าไง โนอา\"\n[s2] \"มาชาเล่ต์ตอนเวลาแบบนี้ มีอะไรเหรอ?\""
80000089-5 = "คือว่า... ฉันผ่านมาแถวนี้ เลยแวะซื้อของขวัญที่อยากได้มานานแล้วมาด้วยน่ะค่ะ"
80000089-6 = "คือว่า... ฉันผ่านมาแถวนี้ เลยแวะซื้อของขวัญที่อยากได้มานานแล้วมาด้วยน่ะค่ะ"
80000089-7 = "มันหายากมากๆ ถ้าเก็บไว้ดูคนเดียวคงน่าเสียดาย ก็เลยจะเอามาอวดให้คุณครูดูค่ะ"
80000089-8 = "[s] \"ของอะไรเหรอ?...\""
80000089-12 = "มันก็คือ..."
80000089-13 = "แต่นแต๊น—"
80000089-15 = "ขวดหมึกที่บรรจุน้ำหมึกข้างในค่ะ"
80000089-16 = "สมัยนี้มักใช้ปากกาลูกลื่นกันเป็นส่วนใหญ่ เลยไม่ค่อยมีคนหาซื้อขวดหมึกแบบนี้แล้วน่ะค่ะ"
80000089-17 = "แต่ว่าในฐานะเลขาของเซมิน่า ฉันเองก็อยากใช้ปากกาหมึกซึมกับน้ำหมึกในการรังสรรค์ตัวอักษรอยู่#nเหมือนกันนะคะ"
80000089-18 = "แต่ว่าที่มิลเลเนียมน่ะ เอกสารจะใช้เวิร์ด โปรเซสเซอร์ในการบันทึกซะเป็นส่วนใหญ่ เลยหาร้านที่ขาย#nอุปกรณ์เครื่องเขียนคลาสสิกแบบนี้ไม่ค่อยได้แล้วค่ะ..."
80000089-19 = "แต่วันนี้ฉันบังเอิญผ่านไปที่ย่านการค้าแถวๆ ชาเล่ต์ ก็เลยได้เจอขวดหมึกเท่ๆ แบบนี้มาค่ะ"
80000089-20 = "พอเจอน้ำหมึกดีๆ แล้วก็ใจร้อนอยากลองเขียนดูไวๆ แต่ว่าฉันไม่ได้พกกระดาษดีๆ มาเลยค่ะ"
80000089-21 = "ก็เลยมาที่ชาเล่ต์อย่างกะทันหันแบบนี้ค่ะ ขอโทษที่ไม่ได้แจ้งล่วงหน้านะคะ..."
80000089-22 = "[s] \"ไม่เป็นไร แวะมาได้ตลอดเลย\""
80000089-23 = "ขอบคุณนะคะคุณครู"
80000089-24 = "ถ้าคุณครูไม่ว่าอะไรละก็... ขอกระดาษแผ่นหนึ่งได้รึเปล่าคะ?"
80000089-25 = "[s] ยื่นกระดาษให้โนอา"
80000089-26 = "ขอบคุณค่ะ"
80000089-27 = "ไหน... ขอลองหน่อยซิ..."
80000089-32 = "เอ๋? ทำไมน้ำหมึกอันนี้... เขียนไม่ค่อยติดเลยนะ"
80000089-33 = "ถ้างั้น ขอลองเอาน้ำลายแตะที่ปลายปากกาดูหน่อย..."
80000089-43 = "[ns3] \"โนอา กินหมึกปากกาแบบนั้นได้ยังไง?!\"\n[ns4] \"รีบบ้วนออกมาเลย! กินหมึกแบบนั้นไม่ได้สิ คายออกมานะ!\""
80000089-46 = "ฮุฮุ... ฮุฮุฮุ..."
80000089-47 = "การแกล้งแอบถ่ายวันนี้... ประสบความสำเร็จอย่างงดงามค่ะ~"
80000089-48 = "[s] \"กะ...แกล้งแอบถ่ายเหรอ...?\""
80000089-49 = "คุณครู จำได้มั้ยคะว่าวันนี้วันอะไร?"
80000089-50 = "[s] \"...วันวาเลนไทน์?\""
80000089-51 = "ค่ะ วันนี้เป็นวันวาเลนไทน์ค่ะ วันแห่งความรักที่คนรักจะให้ช็อกโกแลตกันและกันค่ะ "
80000089-52 = "เพราะงั้นวันนี้เลยมีสินค้าต่างๆ ที่หาได้ยากในวันปกติมาวางขายเยอะเลยค่ะ"
80000089-53 = "ขวดหมึกอันนี้ ฉันก็ซื้อมาจากร้านขายช็อกโกแลตค่ะ"
80000089-54 = "ของเหลวที่อยู่ในขวดนี้ไม่ใช่น้ำหมึก แต่เป็นช็อกโกแลตต่างหากล่ะคะ"
80000089-55 = "อื้ม... รสชาติหวานมากๆ เลยค่ะ~"
80000089-56 = "[s5] \"งั้นก็ค่อยยังชั่วหน่อย...\"\n[s6] \"ตกใจหมด ครูนึกว่าเธอกินน้ำหมึกเข้าไปซะอีก\""
80000089-57 = "ฮุฮุ ฉันขอให้ช็อกโกแลตเป็นของขวัญแล้วก็ของแทนคำขอโทษที่แกล้งคุณครูแล้วกันนะคะ"
80000089-58 = "ฮุฮุ ฉันขอให้ช็อกโกแลตเป็นของขวัญแล้วก็ของแทนคำขอโทษที่แกล้งคุณครูแล้วกันนะคะ"
80000089-59 = "หมึกช็อกโกแลตอันนี้ ต่างจากน้ำหมึกธรรมดาตรงที่มันจะไม่ติดปากกาหมึกซึมค่ะ แถมยังเสียง่าย#nมันเลยไม่เหมาะกับจะเอามาเป็นน้ำหมึกเขียนหนังสือน่ะค่ะ แต่ว่า..."
80000089-60 = "คงไม่มีน้ำหมึกไหนที่จะเหมาะสำหรับสื่อความรู้สึกแสนหวานที่อยู่ในใจได้ดีเท่าน้ำหมึกอันนี้แล้วค่ะ"
80000089-61 = "ถ้าเกิดคุณครูอยากสื่อคำพูดหวานๆ ให้ใครสักคน..."
80000089-62 = "ก็เชิญใช้น้ำหมึกอันนี้ได้เลยนะคะ"

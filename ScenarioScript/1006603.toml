1006603-7 = "3;아리스 메이드;02\n#3;a"
1006603-8 = "#place;게임개발부 부실"
1006603-9 = "3;아리스 메이드;03;선생님! 기다리고 있었습니다.\n#3;em;[반응]"
1006603-10 = "3;아리스 메이드;01;생각보다 빨리 오셨네요. 서두르신 모양입니다. 무슨 일이라도 있었습니까?"
1006603-11 = "[s1] \"그게, 메이드 자료라고 하니까 말이지……\"\n[s2] \"아리스 혼자 공부하게 둬서는 안 될 것 같았어.\""
1006603-12 = "#wait;100"
1006603-13 = "#wait;100"
1006603-14 = "3;아리스 메이드;02;그렇습니까? 하지만 아리스도 좋습니다."
1006603-15 = "3;아리스 메이드;03;공부는 함께 할수록 효과가 좋아진다고도 들었으니까요!\n#3;em;[음표]"

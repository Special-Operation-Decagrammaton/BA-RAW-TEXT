[translation]
1006603-1 = "女僕學習大作戰！"
1006603-2 = "（收到愛麗絲的聯絡後，前往遊戲開發部……）"
1006603-8 = "遊戲開發部．部室"
1006603-9 = "……咦，老師？"
1006603-10 = "為什麼這麼著急呢？"
1006603-11 = "[s1]「那個，有點擔心那是什麼樣的資料……」\n[s2]「總覺得不能放愛麗絲一個人學習……」"
1006603-14 = "是嗎？#n愛麗絲覺得應該不是需要老師擔心的事情……"
1006603-15 = "不過愛麗絲很高興能跟老師一起學習！#n聽說一起學習會提高學習的效果！"
1006603-19 = "愛麗絲找到的資料──"
1006603-28 = "乓啪喀乓！就是這些！"
1006603-29 = "[s]「這，這是……！？」"
1006603-30 = "沒錯！是有各種女僕登場的影片！"
1006603-31 = "只要看完這些，愛麗絲的女僕等級肯定會大大提升！"
1006603-32 = "也就是像所謂的經驗值道具一樣！"
1006603-33 = "《假面女僕》、《魔力女僕》、《立花女僕隊》……"
1006603-34 = "聽說這些都是非常推薦的影片！"
1006603-35 = "[s]「先等等，愛麗絲，那是哪裡來的情報！？」"
1006603-36 = "是網路上找的！"
1006603-37 = "網路真的非常方便！#n透過搜索什麼都能找到！"
1006603-38 = "[s]「總覺得有股危險的味道……」 "
1006603-39 = "危險……？#n愛麗絲不這麼覺得！"
1006603-40 = "畢竟有「因為實在太感動，甚至改變了人生」這樣的評論！"
1006603-41 = "[s]「或許確實會有那種人沒錯，可是……！」"
1006603-42 = "居然是能讓人感動到改變人生的作品……愛麗絲很期待！#n究竟會是什麼樣的內容呢？"
1006603-43 = "……沒問題的。就算萬一有危險，#n愛麗絲可是見習勇者──不，是見習女僕勇者！#n能夠保護自己的身體！"
1006603-44 = "咦？不是這個意思……？#n可是……唔嗯……可是老師也在……"
1006603-45 = "老師經常說「幫助學生是老師的義務」！#n如果發生什麼事，老師也會幫助愛麗絲的對吧？"
1006603-46 = "[s3]「……被你這麼一說……」\n[s4]「無法反駁……」"
1006603-49 = "耶嘿嘿。那麼隊伍順利組成了！"
1006603-50 = "乓啪喀乓！老師成為了夥伴！"
1006603-51 = "來，任務開始了！"
1006603-53 = "（就這樣，和愛麗絲一起開始觀賞「推薦」的影片……）"
1006603-55 = "……"
1006603-56 = "[s]「……」"
1006603-57 = "…………"
1006603-58 = "[s]「愛麗絲……？」"
1006603-59 = "………………"
1006603-60 = "[ns]「愛～麗～絲～！？」"
1006603-61 = "愛麗絲知道了！"
1006603-62 = "[s]「！？」"
1006603-63 = "原來如此……女僕竟然是如此深奧啊！"
1006603-64 = "既然轉職成了女僕，就必須改變對老師的稱呼──"
1006603-65 = "主人！"
1006603-66 = "[s]「那，那個叫法有點……」"
1006603-67 = "還有那些愛麗絲本來抱有疑問的行為，#n原來其實是女僕的基本素養！"
1006603-68 = "例如搞錯餐點、在空無一物的地方跌倒，#n還有在料理上加入奇怪的醬料──"
1006603-69 = "全都是為了療癒主人心靈的服務啊！"
1006603-70 = "[s]「不對！才不是那樣！」 "
1006603-72 = "（愛麗絲接二連三地說著學來的「素養」）"
1006603-73 = "（為了解開他的誤會，花費了不少時間……）"
1006603-75 = "今天是收穫滿滿的一天。"
1006603-76 = "託老師的福，感覺女僕等級又提升了不少！"
1006603-77 = "[s]「那……那真是……太好了……」"
1006603-78 = "老師？怎麼了嗎？"
1006603-79 = "總覺得，老師好像沒什麼精神……"
1006603-80 = "難道……老師並不開心嗎……？"
1006603-81 = "[s5]「不會，沒有那種事唷。」\n[s6]「下次要學習的時候，請你一定要找我過來哦。」"
1006603-84 = "是嗎？那真是太好了！"
1006603-85 = "……耶嘿嘿。#n愛麗絲果然很喜歡老師。"
1006603-86 = "今後也請多多指教──"
1006603-87 = "主人！"

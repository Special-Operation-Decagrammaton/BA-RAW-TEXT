1006603-60 = "[ns] \"아리스? 아리스?!\""
1006603-61 = "3;아리스 메이드;05;아리스, 깨달았습니다!\n#3;em;[!]\n#3;jump"
1006603-62 = "[s] \"우왓?!\""
1006603-63 = "3;아리스 메이드;02;메이드라는 건 이런 것이었군요! 깊고, 심오합니다!"
1006603-64 = "3;아리스 메이드;99;아리스는 지금까지 아무것도 모르고 있었군요! 우선은 선생님을 부르는 방법부터 바꿔야겠습니다."
1006603-65 = "3;아리스 메이드;05;주인님!\n#3;closeup"
1006603-66 = "[s] \"아리스……? 그 호칭은 조금……?\""
1006603-67 = "3;아리스 메이드;02;그리고 제가 실수라고 생각했던 것들도, 사실은 메이드의 기본 소양이었던 거군요!\n#3;em;[!]"
1006603-68 = "3;아리스 메이드;00;실수로 다른 메뉴를 가져다준다던가, 균형을 잃고 넘어지며 몸을 부딪쳐 온다던가, 덜렁이다가 음식에 엉뚱한 소스를 섞는다던가!"
1006603-69 = "3;아리스 메이드;07;그 모두가 사실은 마음을 치유하는 귀여운 서비스라는 것이군요!"
1006603-70 = "[s] \"그거 정말로 위험하니까! 그런 거 아니니까!\" "
1006603-71 = "#all;hide"
1006603-72 = "#na;(그 밖에도 아리스는 무수한 '메이드'로서의 소양을 이야기했다……)"
1006603-73 = "#na;(아리스의 오해를 바로잡기까지, 상당히 많은 시간이 소요되었다……)"
1006603-74 = "3;아리스 메이드;01\n#3;a"
1006603-75 = "3;아리스 메이드;03;오늘은 정말 즐거웠습니다. 선생님."
1006603-76 = "3;아리스 메이드;07;메이드에 대해 더 잘 알게 된 날이었습니다!\n#3;em;[음표]"
1006603-77 = "[s] \"그래…… 아리스가 좋다면야……\""
1006603-78 = "3;아리스 메이드;04;왜 그렇게 하얗게 불타 버리셨습니까? 잿가루가 떨어질 것 같습니다……"
1006603-79 = "3;아리스 메이드;09;새로운 것을 배우는 건 즐거운 일인데, 선생님은 즐겁지 않았나요……?\n#3;stiff"
1006603-80 = "3;아리스 메이드;06;혹시, 아리스, 때문인가요……?\n#3;em;[훌쩍]"
1006603-81 = "[s5] \"아니야. 나도 즐거웠어.\"\n[s6] \"다음에도 이런 일이 생길 것 같으면, 꼭, 꼭, 꼭, 불러 줘.\""

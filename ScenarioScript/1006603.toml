1006603-27 = "3;아리스 메이드;00\n#3;closeup\n#3;a\n#wait;1000"
1006603-28 = "3;아리스 메이드;07;뽜밤뽜밤! 이것입니다!\n#3;closeup"
1006603-29 = "[s] \"이건…… 설마?!\""
1006603-30 = "3;아리스 메이드;05;그렇습니다! 다양한 메이드 씨들이 나오는 영상 매체들입니다!\n#3;em;[!]"
1006603-31 = "3;아리스 메이드;05;이 매체들로 공부하면…… 메이드로서 아리스의 경험치가 더욱 올라갈 것임에 틀림없습니다!"
1006603-32 = "3;아리스 메이드;00;말하자면, 경험치 책 같은 것이니까요!"
1006603-33 = "3;아리스 메이드;01;<가면의 메이드레이디>, <마보로매틱>, <타치바나 메이드대>……\n#3;greeting"
1006603-34 = "3;아리스 메이드;07;특별히 엄선 받은 추천작들만 모았습니다!\n#3;em;[반짝]"
1006603-35 = "[s] \"우선 말이지! 그거 어디에서 추천받은 거야?!\""
1006603-36 = "3;아리스 메이드;02;네? 그야 당연히 인터넷에서입니다.\n#3;em;[?]"
1006603-37 = "3;아리스 메이드;00;인터넷에서는 뭐든지 검색하면 나옵니다. 정말로 편리합니다!"
1006603-38 = "[s] \"그렇다면 더더욱 위험하다는 생각이 드는데!?\" "
1006603-39 = "3;아리스 메이드;04;위험…… 입니까? 아리스는 잘 모르겠습니다.\n#3;em;[땀]"
1006603-40 = "3;아리스 메이드;09;어떤 분은 이 매체들로 인해 인생이 바뀌었다며 감동적이었다는 리뷰를 쓰기도 했습니다.\n#3;stiff"
1006603-41 = "[s] \"분명 그런 사람도 있겠지만! 이해가 가는 면도 없잖아 있지만!\""
1006603-42 = "3;아리스 메이드;00;사람을 감동시키고 인생을 바꾸는 작품이라니, 아리스도 기대가 됩니다! 아리스도 비슷한 경험이 잔뜩 있었으니까요! "
1006603-43 = "3;아리스 메이드;05;그리고 위험하다고 해도 아리스는 끄떡없습니다! 아리스는 견습이지만 용사입니다! 이제는 메이드에 도전하고 있습니다! 스스로의 몸은 스스로가 지킬 수 있습니다!\n#3;jump"
1006603-44 = "3;아리스 메이드;02;네? 그런 의미의 위험이 아니라고 하셨습니까? 음…… 잘 모르겠습니다. 그렇다면 선생님께서 도와주시면 되지 않습니까?\n#3;em;[?]"
1006603-45 = "3;아리스 메이드;05;평소에 선생님이 자주 했던 말입니다! 학생을 돕는 것은 선생님의 의무라고!"
1006603-46 = "[s3] \"여기서 그 말을 꺼내 버리면 할 말이 없긴 한데!\"\n[s4] \"……그래. 차라리 보호자가 있는 편이 나을 수도 있지……\""
1006603-47 = "#wait;100"
1006603-48 = "#wait;100"
1006603-49 = "3;아리스 메이드;02;그렇다면 선생님도 함께해 주시는 겁니까? 그렇다고요?"
1006603-50 = "3;아리스 메이드;03;와아! 해냈습니다! 이것으로 아리스는 한층 더 성장할 수 있습니다!\n#3;em;[반짝]"
1006603-51 = "3;아리스 메이드;07;선생님이 동료가 되었습니다! 뽜밤뽜밤!\n#3;jump"
1006603-52 = "#all;hide"
1006603-53 = "#na;(그렇게, 아리스와 함께…… 조금…… '특별한' 매체들을 감상하기 시작했다……)"
1006603-54 = "3;아리스 메이드;01\n#3;a"

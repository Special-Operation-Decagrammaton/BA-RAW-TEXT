[translation]
1006603-1 = "Study! Maid Grand Operation!"
1006603-2 = "I headed to the Game Development Department after Aris' message."
1006603-8 = "Game Development Department Club Room"
1006603-9 = "Sensei! I have been waiting for you."
1006603-10 = "You are here earlier than expected, so you must have hurried. Is there something you were concerned about?"
1006603-11 = "[s1] \"Uh, so you said 'maid study', right...?\"\n[s2] \"It felt wrong to leave you alone with your maid studies...\""
1006603-14 = "Is that so? But that is great."
1006603-15 = "I heard studying is much better when done together!"
1006603-19 = "And if you were wondering what kind of materials I found..."
1006603-28 = "Bum bum bum! Here!"
1006603-29 = "[s] \"It's... don't tell me...\""
1006603-30 = "Right! These are video references that various maids appear in!"
1006603-31 = "There is no doubt I will gain even more EXP if I study using these materials!"
1006603-32 = "These are basically EXP books!"
1006603-33 = "\"Kamen no Maid Lady,\" \"Maboromatic\", and \"Tachibana Maid Team!\""
1006603-34 = "They are from the best recommendations!"
1006603-35 = "[s] \"So, first off... where did you get the recommendations from?\""
1006603-36 = "Hmm? Of course, from the internet."
1006603-37 = "I can search the internet for any information I need. It is very convenient!"
1006603-38 = "[s] \"You know, that makes it sound even more dangerous!\""
1006603-39 = "Dangerous... you say? I am not sure."
1006603-40 = "Some people have written reviews that these have changed their lives, and were really touching."
1006603-41 = "[s] \"I know there are people like that, and I do understand where they're coming from, but...!\""
1006603-42 = "If something is so touching that it changes someone's life... I am really looking forward to watching it! I had similar experiences, too!"
1006603-43 = "And even if it is dangerous, I am not scared! I may be a novice, but I am a hero! And I am challenging myself to become a maid! I can protect myself from danger!"
1006603-44 = "...Hmm? It is not dangerous in that way? I do not understand. Can you help me, then?"
1006603-45 = "It is something you have said often! It is Sensei's duty to help students!"
1006603-46 = "[s3] \"I mean, I can't say it isn't if you say that!\"\n[s4] \"...I guess, it's better to have a guardian supervising you in this case...\""
1006603-49 = "Are you with me, then?"
1006603-50 = "Yay! I did it! I can grow even further now!"
1006603-51 = "Sensei has joined the party! Bum bum bum!"
1006603-53 = "So I watched Aris' maid references with her."
1006603-55 = "..."
1006603-56 = "[s] \"...\""
1006603-57 = "..."
1006603-58 = "[s] \"So... Aris?\""
1006603-59 = "..."
1006603-60 = "[ns] \"Aris? Aris?!\""
1006603-61 = "I have finally understood!"
1006603-62 = "[s] \"Huh?!\""
1006603-63 = "So this is what a maid is! It is deep and complicated..."
1006603-64 = "I really did not know much about the matter! I should change my way of referring to you, Sensei."
1006603-65 = "Master!"
1006603-66 = "[s] \"Aris...? I think that title is a bit...\""
1006603-67 = "And... everything I thought was a mistake was... the basic manner of a maid, after all!"
1006603-68 = "Such as bringing a wrong menu, losing balance and tackling, or putting a wrong sauce and being clumsy...!"
1006603-69 = "Everything is basically a mental-healing service!"
1006603-70 = "[s] \"Hey, I mean, it's getting pretty dangerous! It's not like that!\""
1006603-72 = "After that, Aris continued to talk about the 'basics' of a maid..."
1006603-73 = "It took a while to correct her misunderstandings."
1006603-75 = "It was really fun, Sensei."
1006603-76 = "I have come to become very knowledgeable about maids!"
1006603-77 = "[s] \"Yeah... if you had fun...\""
1006603-78 = "Why are you all burnt out? It is almost like ashes could fall from you."
1006603-79 = "Learning new things is supposed to be fun. Did you not have fun?"
1006603-80 = "Is it because.. of me...?"
1006603-81 = "[s5] \"No, I had fun, too. Sometimes fun is just tiring.\"\n[s6] \"If you are going to have this kind of study session again... Make. Sure. to call me, okay?.\""
1006603-84 = "Is that so? That is good to hear!"
1006603-85 = "I like when you are by me, Sensei."
1006603-86 = "Looking forward to talking with you again..."
1006603-87 = "Master!"

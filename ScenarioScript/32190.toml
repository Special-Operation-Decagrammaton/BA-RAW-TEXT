[translation]
32190-1 = "第19話;第3次特別學力測驗"
32190-3 = "啊，啊嗚……"
32190-4 = "總算告一段落了呢……"
32190-5 = "嗯……"
32190-10 = "小春醬！？"
32190-11 = "只，只是有點腳軟而已……"
32190-12 = "這也難怪……畢竟整晚都跑來跑去的……"
32190-13 = "而且這一整個星期，幾乎都沒有好好睡覺……"
32190-17 = "不，日步美，現在才正要開始。"
32190-19 = "……嗯？"
32190-20 = "……啊。"
32190-21 = "對，對了……我們還得去考試才行。"
32190-22 = "啊……我都忘了……"
32190-24 = "現在時間是早上7點50分。"
32190-25 = "要在一小時內趕到考場才行。快跑吧。"
32190-30 = "咦！？要，要跑過去嗎！？#n先，先等一下啊梓醬！要從這裡一路跑到分館嗎！？"
32190-31 = "全力跑的話應該能勉強趕上。#n日步美醬，小春醬！快跑起來！"
32190-35 = "明，明明光是走路，腳就很痛了說……等一下啦！"
32190-36 = "啊，啊嗚……為什麼會變成這樣……"
32190-39 = "哈啊……哈啊……哈啊……"
32190-40 = "總，總算到了呢……"
32190-41 = "等你們很久了，補課部的各位。#n蓮實副部長有話請我轉達。"
32190-42 = "他說……請加油吧。"
32190-43 = "哎呀哎呀。"
32190-44 = "蓮，蓮實前輩……！"
32190-45 = "此外，他也請我向各位轉達……很抱歉沒幫上忙。"
32190-46 = "……這樣啊。"
32190-47 = "[s] 「我們進去吧。」"
32190-51 = "……"
32190-52 = "……"
32190-53 = "……"
32190-54 = "……"
32190-55 = "[s] 「這就是最後一次測驗了呢。」"
32190-56 = "……嗯。#n結果究竟如何，將由這場考試決定。"
32190-57 = "就是說呀。"
32190-58 = "啊嗚……"
32190-59 = "……"
32190-60 = "真是發生了很多事呢。"
32190-61 = "我明白你的心情，不過感想還是等考試之後再說吧。"
32190-62 = "嗯……沒錯。#n我們必須靠自己的力量……努力達成目標。"
32190-63 = "嗯，直到最後都不放棄。"
32190-64 = "嗯，我也一樣。#n可不能忘記梓醬教會我的事呢。"
32190-65 = "滿分！我會以滿分為目標的哦！"

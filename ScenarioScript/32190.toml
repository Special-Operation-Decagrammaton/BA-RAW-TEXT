[translation]
32190-1 = "ตอนที่ 19;การสอบประเมินครั้งที่ 3"
32190-3 = "อา..."
32190-4 = "เรามาถึงตอนจบแล้วใช่ไหมคะ..."
32190-5 = "อะ...อื้อ"
32190-10 = "โคฮารุจัง....?!"
32190-11 = "ขะ... ขาฉันไม่มีแรงแล้ว..."
32190-12 = "นั่นสิคะ... พวกเราวิ่งวุ่นไม่ได้หยุดกันทั้งคืนเลย..."
32190-13 = "แถมสัปดาห์นี้ยังนอนกันไม่ค่อยจะพอด้วย..."
32190-17 = "ไม่หรอกฮิฟุมิ นี่คือการเริ่มต้นต่างหาก"
32190-19 = "คะ...?"
32190-20 = "อ่า..."
32190-21 = "จริงด้วยค่ะ... เรายังต้องสอบประเมินกันอยู่"
32190-22 = "จริงด้วย... ฉันลืมไปเลย... "
32190-24 = "อีกสิบนาทีจะแปดโมงเช้าแล้ว"
32190-25 = "เราต้องไปถึงห้องสอบใน 1 ชั่วโมง วิ่ง!"
32190-30 = "คะ?! วิ่งไปเลยเหรอคะ?!  ระ... รอก่อนสิคะอาซึสะจัง!#nจะให้วิ่งจากตรงนี้ไปถึงอาคารในเขตชานเมืองเลยเหรอคะ...?!"
32190-31 = "วิ่งให้ตายก็ไม่น่าทันหรอกค่ะ ฮิฟุมิจัง โคฮารุจัง! สงสัยต้องเหาะแล้วล่ะค่ะ!"
32190-35 = "แฮ่ก... แค่ก้าวขาเดินก็เหนื่อยแล้วนะ... รอด้วยสิ!"
32190-36 = "แฮ่ก... แฮ่ก... นี่พวกเรา..."
32190-39 = "เฮ่อ... แฮ่ก... แฮ่ก..."
32190-40 = "มะ... มาถึงจนได้ค่ะ..."
32190-41 = "สวัสดีค่ะชมรมชั้นเรียนเสริมทุกคน ฉันกำลังรออยู่เลยค่ะ รองหัวหน้าฮาสุมิฝากฉันมาบอกทุกคนค่ะว่า"
32190-42 = "\"พยายามเข้านะคะ\" "
32190-43 = "อุ๊ยตาย..."
32190-44 = "ระ... รุ่นพี่ฮาสุมิ..."
32190-45 = "แล้วก็ฝากบอกด้วยค่ะว่าขอโทษที่มาเป็นกำลังใจให้ไม่ได้ค่ะ"
32190-46 = "งั้นเหรอ..."
32190-47 = "[s] \"เข้าไปกันเถอะ\""
32190-51 = "......."
32190-52 = "......."
32190-53 = "......."
32190-54 = "......."
32190-55 = "[s] \"นี่คือการสอบครั้งสุดท้ายแล้ว\""
32190-56 = "อื้ม... ตอนจบของพวกเราขึ้นอยู่กับการสอบครั้งนี้"
32190-57 = "นั่นสินะคะ"
32190-58 = "อ่า..."
32190-59 = "......."
32190-60 = "เราผ่านเรื่องอะไรด้วยกันมาเยอะเลยนะคะ"
32190-61 = "เดี๋ยวค่อยมาเปิดโหมดซึ้งทีหลัง ตอนนี้เราเข้าไปสอบกันก่อนเถอะ"
32190-62 = "ค่ะ... ก็ได้ค่ะ เราจะไม่ใช้พลังหรืออำนาจจากใครอื่น... แต่จะผ่านไปให้ได้ด้วยความสามารถของเราเองค่ะ"
32190-63 = "อื้ม ฉันจะไม่ยอมแพ้เด็ดขาด"
32190-64 = "ฉันก็ด้วยค่ะ จะไม่ลืมสิ่งที่ได้เรียนรู้จากอาซึสะจังเลยละค่ะ"
32190-65 = "ต้องได้เต็ม! ฉันจะคว้าคะแนนเต็มมาให้ได้เลย!"

[translation]
32190-1 = "Episode 19;The Third Exam"
32190-3 = "U-Um..."
32190-4 = "Is it finally over?"
32190-5 = "I think so."
32190-10 = "Koharu?!"
32190-11 = "I-I nearly passed out there."
32190-12 = "I'm not surprised. We've been running around all night."
32190-13 = "Not to mention how late we've been staying up for the last week to study."
32190-17 = "What are you all so relaxed for? It's not over yet."
32190-19 = "Huh?"
32190-20 = "Oh."
32190-21 = "Y-You're right! We still have to take our exam."
32190-22 = "I forgot about that... "
32190-24 = "It's 7:50 right now."
32190-25 = "Which means we have just over an hour to get to the testing site. Let's run!"
32190-30 = "W-Wait! Will we make it all the way to the outskirts even if we run?!"
32190-31 = "It's a long shot, but we won't know unless we try! Come on, ladies, let's get moving!"
32190-35 = "But I can barely move my legs! Waaait!"
32190-36 = "*sigh* Why do things always turn out like this for us...?"
32190-39 = "*huff* *puff* Can't...go...any...further..."
32190-40 = "W-We made it..."
32190-41 = "We've been expecting you, Make-Up Work Club. I have a message from Vice President Hasumi."
32190-42 = "She says, \"Good luck.\""
32190-43 = "Well, then."
32190-44 = "H-Hasumi wished me luck...?"
32190-45 = "She also asked me to pass along how sorry she is for not being able to help this morning and promises to make it up to you."
32190-46 = "That's interesting."
32190-47 = "[s] \"Is everyone ready to head inside?\""
32190-51 = "..."
32190-52 = "..."
32190-53 = "..."
32190-54 = "..."
32190-55 = "[s] \"This is it. The third and final exam.\""
32190-56 = "Exactly. Everything is riding on this."
32190-57 = "You're right."
32190-58 = "I'm pretty nervous."
32190-59 = "..."
32190-60 = "We've been through so much together."
32190-61 = "That we have, but there will be more than enough time to get sentimental after we pass the exam."
32190-62 = "Exactly. It's time to show how far we've come."
32190-63 = "Of course. I'm not aiming for anything below a perfect score."
32190-64 = "Neither am I. Anything less would be wasting everything I've learned from Azusa."
32190-65 = "I'm gonna score a 100! Just watch!"

[translation]
32190-1 = "第19話;第3次特別学力試験"
32190-3 = "あ、あうぅ……もう色々あり過ぎて、疲労困憊です……。"
32190-4 = "ようやく落ち着きましたね……。"
32190-5 = "うん……。"
32190-10 = "コハルちゃん！？"
32190-11 = "ご、ごめん、何だか力が抜けちゃって……あ、ありがと。"
32190-12 = "それもそうですよね、一晩中走り回りましたし……。"
32190-13 = "それにここ一週間、あまり睡眠もきちんと取れてないですからね。これでようやく……。"
32190-17 = "何を言ってるのヒフミ、ここからがスタートだ。"
32190-19 = "……はい？"
32190-20 = "あー……。"
32190-21 = "そ、そうでした、試験が……。"
32190-22 = "……忘れてた。"
32190-24 = "現在時刻は午前7時50分。"
32190-25 = "試験会場まで1時間で着かないと、走ろう。"
32190-30 = "えぇっ！？走るんですか！？待ってくださいアズサちゃん早っ！ここから走って着く距離ですか！？"
32190-31 = "うーん、全力で走ればギリギリでしょうか？さあヒフミちゃん、コハルちゃん！ファイトです！"
32190-35 = "うぅ、もう歩くだけでも足痛いのに……待ちなさいよぉ……！"
32190-36 = "ど、どうして最後の最後までこんなことに……！"
32190-39 = "はあっ、はあっ、はぁ、はぁ……はぁ……はぁ……もう、無理……。"
32190-40 = "や、やっと到着しましたね……。"
32190-41 = "お待ちしておりました、補習授業部のみなさん。ハスミ副委員長からの伝言です。"
32190-42 = "頑張ってください……と。"
32190-43 = "あらあら。"
32190-44 = "は、ハスミ先輩……！"
32190-45 = "それから……力になれなくてごめんなさい。この分はいつか必ず……とも。"
32190-46 = "……そうか。"
32190-47 = "[s] \"うん。じゃあ、入ろっか。\""
32190-51 = "……。"
32190-52 = "……。"
32190-53 = "……。"
32190-54 = "……。"
32190-55 = "[s] \"これが、最後の試験だね。\""
32190-56 = "……うん。どんな結果であれ、この試験で全てが決まる。"
32190-57 = "そうですね。"
32190-58 = "あうぅ……。"
32190-59 = "……っ。"
32190-60 = "……ここまで色々ありましたね。"
32190-61 = "……気持ちは分かる、けど感傷に浸るのは試験が終わってからにしよう。"
32190-62 = "はい、そうですね……とにかく、私たちの努力の成果をしっかり発揮しましょう。"
32190-63 = "うん、最後まで諦めない。"
32190-64 = "はい、私もです。せっかくアズサちゃんに、教えてもらいましたから。"
32190-65 = "わ、私今度こそ満点取るから！取っちゃうからね！"
32190-67 = "[ns] \"では第3次特別学力試験……開始！\""

[translation]
84309100400-5 = "都處理好了，這樣就不會有問題了吧。"
84309100400-6 = "我這邊也確認完畢了。#n整體上來說問題都已經解決，警備系統本身暫時應該不會再發生故障了。"
84309100400-7 = "是透過駭入……對吧。#n所以我們已經取得控制權了嗎？"
84309100400-8 = "如果是的話，以後就能遠端操作警備系統來解決各種問題，不必每次都潛入了吧。"
84309100400-9 = "雖然你說的沒錯，但遺憾的是這次並沒有加入那種功能。#n你就把這當成是修復異常啟動的售後服務吧。"
84309100400-11 = "……？"
84309100400-12 = "啊？不是要植入那個駭入工具，在這裡遠端操作嗎？"
84309100400-13 = "為什麼這種時候反而又不做了啊？那不是你最擅長的嗎！"
84309100400-17 = "這，這是因為……那是監視與控制的行為。#n我現在已經深刻領悟到那樣是不好的，因此這麼做也是理所當然的事。"
84309100400-21 = "雖然是這樣說沒錯啦……不過……"
84309100400-22 = "這跟那還是有點……"
84309100400-27 = "唉……算了。你說的對。"
84309100400-28 = "對我們而言，那樣事情會變得過於無趣。#n從某方面來說也算是好事一件吧。"
84309100400-29 = "你現在根本已經樂在其中了嘛。"
84309100400-30 = "有什麼問題嗎？"
84309100400-31 = "沒有。"
84309100400-33 = "……你們兩位都辛苦了。"
84309100400-34 = "如果之後有查到什麼再通知你們。"

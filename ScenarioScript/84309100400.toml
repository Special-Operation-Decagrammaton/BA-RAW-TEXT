[translation]
84309100400-5 = "จัดการทุกอย่างเรียบร้อยแล้ว เท่านี้ก็ไม่น่าจะมีปัญหาแล้วละ"
84309100400-6 = "ตรวจสอบการติดตั้งอุปกรณ์แฮ็กแล้ว ตอนนี้ปัญหาโดยรวมได้รับการแก้ไขแล้ว ระบบการรักษาความ#nปลอดภัยก็น่าจะทำงานได้ปกติไปสักระยะ"
84309100400-7 = "คุณบอกว่านั่นเป็น... การแฮ็กใช่มั้ยคะ? ถ้างั้นแปลว่าสิทธิ์ควบคุมก็อยู่ในมือของเราใช่มั้ยคะ?"
84309100400-8 = "ถ้าใช่ละก็ จากนี้เราก็ไม่ต้องแทรกซึมเข้าไปทุกครั้ง แล้วก็แค่ควบคุมระบบรักษาความปลอดภัยที่เรา#nแฮ็กไว้จากที่นี่ เท่านี้ก็น่าจะแก้ปัญหาอะไรได้เยอะเลยนะคะ"
84309100400-9 = "ในทางเทคนิคก็ทำได้น่ะนะ แต่น่าเสียดายที่ฉันไม่ได้ใส่ฟังก์ชันแบบนั้นเอาไว้ คิดเสียว่าที่เราทำคือ#nบริการหลังการขายต่อระบบที่ทำงานผิดปกติแล้วกัน"
84309100400-11 = "...????"
84309100400-12 = "หืม? ไม่ได้ให้ไปติดตั้งอุปกรณ์แฮ็กไว้เพื่อจะควบคุมจากที่นี่หรอกเหรอ?"
84309100400-13 = "อะไรกัน? ทำไมในเวลาแบบนี้ถึงไม่ทำล่ะ? นี่เป็นเรื่องที่เธอเชี่ยวชาญไม่ใช่หรือไง!"
84309100400-17 = "ระ... เรื่องนั้น... ฉันก็เรียนมาว่าการแทรกแซงที่มากเกินไปย่อมไม่ส่งผลดีน่ะ"
84309100400-21 = "อ่า... มะ... มันก็จริงอยู่หรอก แต่ว่า..."
84309100400-22 = "อ่า... แต่นั่นมันก็อีกเรื่องหนึ่ง..."
84309100400-27 = "เฮ้อ... ช่างเถอะ เธอพูดถูกแล้วละ"
84309100400-28 = "งั้นฉันจะคิดว่าเป็นเรื่องดีแล้วกันค่ะ ถ้าแก้ปัญหาทุกอย่างจากการแฮ็กได้ ฉันคงไม่มีอะไรทำกันพอดี"
84309100400-29 = "เธอนี่ก็นะ กำลังอยู่ในโหมดเล่นสนุกหรือไง?"
84309100400-30 = "แล้วมีปัญหาอะไรหรือเปล่าคะ?"
84309100400-31 = "ก็เปล่า"
84309100400-33 = "ทั้งสองคนทำได้ดีมาก..."
84309100400-34 = "ถ้าฉันวิเคราะห์อะไรได้แล้วจะบอกนะ"

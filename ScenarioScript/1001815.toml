[translation]
1001815-1 = "染上金色的回憶"
1001815-2 = "（在遊戲開發部和柚子聊天時……）"
1001815-3 = "（本來只是在聊舊遊戲雜誌，結果聊著聊著就開始整理書架，#n　最後不知不覺就打掃了整間部室……）"
1001815-5 = "遊戲開發部．部室"
1001815-6 = "嗚嗚，本來只是想確認雜誌寫的內容對不對而已……"
1001815-7 = "沒想到會為了清理沒整理的箱子而演變成大掃除……#n真不好意思，讓老師捲入這種麻煩的事。"
1001815-8 = "[s]「沒關係，我剛好也沒什麼特別要忙的事。」"
1001815-12 = "[ns]「話說，這裡的遊戲卡帶還真多呢……」"
1001815-13 = "嗯，畢竟是遊戲開發部的部室。"
1001815-14 = "開發遊戲的時候需要參考很多資料跟靈感，所以我們準備了各式各樣的遊戲。"
1001815-15 = "雖然大部分都是只能在舊機器上運作的復古遊戲就是了……"
1001815-20 = "[ns]「咦，這是……？」"
1001815-21 = "老師找到什麼了嗎？"
1001815-22 = "[ns1]「這片CD上什麼都沒寫……」\n[ns2]「這該不會也是遊戲片吧？」"
1001815-25 = "那，那個……我也不太記得……"
1001815-26 = "CD盒上有沒有寫什麼字？"
1001815-27 = "[s]「盒子下面……寫著『柚子』。」"
1001815-28 = "咦，咦咦咦！？我，我的名字……！？"
1001815-29 = "為，為什麼……我完全沒有印象……"
1001815-30 = "難道說……該不會……"
1001815-31 = "[s3]「柚子也不知道裡面記錄了什麼內容嗎？」\n[s4]「不如就放到電腦裡看一下──」"
1001815-34 = "請，請等一下！老師！"
1001815-35 = "那，那片CD……請讓我自己確認！"
1001815-36 = "[s]「有什麼問題嗎？」"
1001815-37 = "就，就是，那個……"
1001815-38 = "因為裡面可能記錄了跟我的隱私有關的內容……！"
1001815-39 = "嗚嗚嗚……為什麼偏偏在和老師在一起的時候，出現這種不明物品……"
1001815-43 = "不，不好意思……#n在我確認內容的時候，能請老師暫時在部室外面等一下嗎？"
1001815-44 = "[s]「我轉過去不看也不行嗎？」"
1001815-45 = "不，不行！"
1001815-48 = "（於是被柚子推著，來到了遊戲開發部的部室外面）"
1001815-50 = "（過了大約十分鐘……）"
1001815-51 = "啊，老師……"
1001815-52 = "現，現在可以進來了……"
1001815-54 = "剛，剛才我有點慌張，真的很抱歉……"
1001815-55 = "[s5]「沒關係，畢竟有可能是私人物品嘛……」\n[s6]「確認過CD的內容了嗎？」"
1001815-58 = "是的，其實也沒什麼大不了的。"
1001815-59 = "不過……的確是很重要的東西……"
1001815-60 = "[s]「重要的東西？」"
1001815-61 = "那個……是我製作的第一部遊戲《故事．傳說．編年史 Prototype》的黃金母片。"
1001815-62 = "黃金母片是什麼意思……是嗎？"
1001815-63 = "啊，對不起。我不小心就……"
1001815-64 = "一般來說，儲存著最終完成版的母片會被稱為黃金母片。"
1001815-65 = "這是因為很久以前在製作唱片時，會為了提高耐久度而在圓盤上鍍金──"
1001815-66 = "後來漸漸演變成了慣用語，存有遊戲最終版本的母片也就被稱為「黃金母片」了。"
1001815-67 = "當然現在已經不會真的鍍金就是了。"
1001815-68 = "《故事．傳說．編年史 Prototype》上傳到網路前最後的備份，就存在這片CD裡。"
1001815-69 = "那時候我一看到這張CD就覺得害怕，所以才會把它塞到箱子的最深處……"
1001815-70 = "沒想到現在連裡面是什麼都忘記了呢。"
1001815-71 = "[s]「現在不怕了嗎？」"
1001815-72 = "嗯。"
1001815-73 = "雖然當時收到的無數負評和批評，還無法完全釋懷……"
1001815-74 = "但是也累積了……足以抵消那些糟糕經驗的許多美好回憶。"
1001815-75 = "現在的部員們之所以能聚在一起，也是因為當初公開了這個原型版的關係。"
1001815-76 = "如果當初沒有做出這款遊戲，就不會有現在這些閃閃發光的日子了。"
1001815-77 = "所以現在……我覺得自己已經可以好好面對這款遊戲了。"
1001815-78 = "[s7]「這樣啊。是非常珍貴的東西呢。」\n[s8]「美麗的寶石在經過磨礪之前，也很難知道是否會閃耀呢。」"
1001815-81 = "……是的。這是我第一個，也是唯一一個[ruby=Golden Master]閃耀著金色光芒的回憶[/ruby]。"
1001815-82 = "對了，老師應該沒玩過《故事．傳說．編年史》的原型版吧？"
1001815-83 = "不介意的話，要不要趁這個機會玩玩看？"
1001815-84 = "[s]「好啊，我很期待！」"
1001815-85 = "那麼就把CD放進連上網路的電腦……"
1001815-90 = "啊，啊哈哈……可能是最佳化沒做好的關係，需要花比較長的時間啟動呢。"
1001815-94 = "錯，錯誤！？為，為什麼……"
1001815-95 = "「警告。偵測到對使用者電腦造成過載的程式碼」"
1001815-96 = "「正在分析程式碼……判定為未經處理，目的不明的惡意程式碼」"
1001815-97 = "「為了維護使用者的電腦安全，將刪除該程式碼……」"
1001815-98 = "不，不要刪除我的回憶！"
1001815-100 = "（幸好柚子的反應夠快，順利阻止CD內容遭到刪除……）"
1001815-101 = "（可惜只能改天再試玩《故事．傳說．編年史 Prototype》了）"

[translation]
1001815-1 = "Golden Memories"
1001815-2 = "I was talking with Yuzu in the Game Development Department..."
1001815-3 = "What started off as a conversation about an old gaming article led to us organizing the bookshelf...and that led to us tidying up the whole club room."
1001815-5 = "Game Development Department Club Room"
1001815-6 = "Ugh, I just wanted to look up an old gaming review..."
1001815-7 = "And then I got so wrapped up in organizing these boxes that I let this turn into a ponderous cleaning session... I'm sorry for dragging you into such tedium, Sensei."
1001815-8 = "[s] \"It's fine. It's not like I was busy.\""
1001815-12 = "[ns] \"Wow. There are so many game cartridges...\""
1001815-13 = "Well, this is the Game Development Department's room, after all."
1001815-14 = "We collect all sorts of games for inspiration. Constant research is a key part of being a game developer."
1001815-15 = "Although...most of these are a little \"retro.\" They only run on vintage consoles."
1001815-20 = "[ns] \"Huh, what's this...?\""
1001815-21 = "What did you find, Sensei?"
1001815-22 = "[ns1] \"There's no label on this...\"\n[ns2] \"Is this also a game CD?\""
1001815-25 = "M-Maybe... I don't really remember..."
1001815-26 = "Is there anything on the jewel case?"
1001815-27 = "[s] \"It says...'Yuzu' at the bottom.\""
1001815-28 = "Wh-Wh-Wh-What?! M-My name...?! Me?!"
1001815-29 = "H-How... I don't remember making anything like that..."
1001815-30 = "Wait... Could it be..."
1001815-31 = "[s3] \"You don't know what this is either?\"\n[s4] \"In that case, let's load it into the PC and...\""
1001815-34 = "W-Wait! Sensei!"
1001815-35 = "Th-That CD... Please...let me examine it."
1001815-36 = "[s] \"Is there a problem?\""
1001815-37 = "W-Well... It's more so..."
1001815-38 = "...it might contain some sensitive and private materials."
1001815-39 = "Ugh... Why would something like THIS show up while Sensei's here...?"
1001815-43 = "I-I'm really sorry... But could you maybe go into the hallway while I load this?"
1001815-44 = "[s] \"Can't I just turn my back?\""
1001815-45 = "N-No! And plug your ears, please!"
1001815-48 = "Yuzu herded me out of the Game Development Department club room."
1001815-50 = "About ten minutes passed..."
1001815-51 = "Um, Sensei..."
1001815-52 = "Y-You can come in now..."
1001815-54 = "I-I'm sorry for earlier. I panicked..."
1001815-55 = "[s5] \"Don't be. If it was personal...\"\n[s6] \"Were you able to see what was on it?\""
1001815-58 = "Yes. It wasn't anything special."
1001815-59 = "Well... It might not be \"special,\" but it was \"important.\""
1001815-60 = "[s] \"What do you mean by that?\""
1001815-61 = "It was...the gold master disc of the Tales Saga Chronicle Prototype. It's the first game I ever made."
1001815-62 = "Oh, you don't know what \"gold master\" means..."
1001815-63 = "Ah, I'm sorry. I forgot to explain it."
1001815-64 = "Software devs typically call the master disc with the final product in it the \"gold master.\""
1001815-65 = "The term comes from the recording industry—music producers would foil their records in gold for the sake of durability...and pride."
1001815-66 = "Now, it's just an expression. All this is to say that this disc has the final version of my first game."
1001815-67 = "Clearly, it's not gold. No one does that anymore...I think."
1001815-68 = "This CD holds the Tales Saga Chronicle prototype...all before we put it online."
1001815-69 = "I was anxious about it, so scared, that I shoved this CD in a box so I wouldn't have to think about what it started."
1001815-70 = "I can't believe I forgot that I did that."
1001815-71 = "[s] \"Are you okay now?\""
1001815-72 = "Yes, I'm fine."
1001815-73 = "Fine enough, I suppose. I've never fully moved past...all the reviews and criticism this game brought me."
1001815-74 = "Still, now I have so many good memories that they more than make up for that bad period."
1001815-75 = "In retrospect, our club only came together because I released this prototype."
1001815-76 = "If I'd never tried...if I never finished this game, I wouldn't have the bright and wonderful today I have now."
1001815-77 = "Which is why...I...think I can do it. I can face it. It's all right."
1001815-78 = "[s7] \"Yeah. It's very precious.\"\n[s8] \"You never know if a jewel will sparkle until you polish it.\""
1001815-81 = "...Yes. It's a golden...memory, isn't it? My one and only."
1001815-82 = "Now that I think about it, you've never played the Tales Saga Chronicle prototype, have you?"
1001815-83 = "Perhaps...you'd like to give it a try?"
1001815-84 = "[s] \"Yeah! I'd love to!\""
1001815-85 = "This PC may have advanced internet, but it still has a CD drive... Let's put it in."
1001815-90 = "H-Haha... It might not be the most optimized. Loading could take a while."
1001815-94 = "E-Error?! H-How..."
1001815-95 = "\"Warning. Corrupted code detected. System Critical: CPU Overload Imminent.\""
1001815-96 = "\"Analyzing code... Concluding that this is unrefined malware of unknown purpose.\""
1001815-97 = "\"For the security of the PC, the code will be ELIMINATED!\""
1001815-98 = "P-Please don't delete my memories!"
1001815-100 = "Thanks to some quick interference, Yuzu saved her CD from a tragic deletion."
1001815-101 = "...But I had to push back my Tales Saga Chronicle Prototype playthrough to a much later date."

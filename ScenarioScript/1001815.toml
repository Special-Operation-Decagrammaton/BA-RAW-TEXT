[translation]
1001815-1 = "ความทรงจำสีทอง"
1001815-2 = "(ขณะที่กำลังคุยกับยูสึในห้องชมรมพัฒนาเกม...)"
1001815-3 = "(การพูดคุยเรื่องเนื้อหาของนิตยสารเกมเก่าๆ ก็นำไปสู่การจัดชั้นหนังสือ กระทั่งทำความสะอาดห้อง#nชมรมโดยไม่รู้ตัว...)"
1001815-5 = "ห้องชมรมพัฒนาเกม"
1001815-6 = "ฮือออ ฉันแค่อยากจะเช็กดูว่าเนื้อหาที่เขียนอยู่ในนิตยสารเป็นเรื่องจริงรึเปล่าก็เท่านั้นเอง..."
1001815-7 = "พอเก็บพวกกล่องที่ยังไม่ได้จัดระเบียบก็กลายเป็นบิ๊กคลีนนิ่งไปซะแล้ว... คุณครู ขอโทษด้วยนะคะ#nที่ทำให้ต้องมาเจอกับงานจุกจิกแบบนี้"
1001815-8 = "[s] \"ไม่เป็นไร ครูก็ไม่ได้ยุ่งอะไรอยู่แล้ว\""
1001815-12 = "[ns] \"ว่าแตว่ามีกล่องใส่เกมเยอะเลยนะ...\""
1001815-13 = "ค่ะ ก็ที่นี่คือห้องชมรมพัฒนาเกมนี่คะ"
1001815-14 = "เรามีเกมหลายประเภทเอาไว้เลือกใช้เป็นแหล่งข้อมูลอ้างอิงหรือใช้เป็นไอเดียสำหรับพัฒนาเกมค่ะ"
1001815-15 = "ถึงส่วนใหญ่จะเป็นเกมเรโทรที่เปิดเล่นได้เฉพาะกับเครื่องเกมเก่าๆ ก็เถอะ..."
1001815-20 = "[ns] \"เอ๋ นี่มัน...?\""
1001815-21 = "คุณครูเจออะไรเหรอคะ?"
1001815-22 = "[ns1] \"บนแผ่นซีดีไม่ได้เขียนอะไรไว้ด้วย...\"\n[ns2] \"แผ่นนี้เป็นซีดีเกมด้วยรึเปล่า?\""
1001815-25 = "นะ... นั่นสิคะ ฉันเองก็จำไม่ค่อยได้ด้วย..."
1001815-26 = "บนกล่องซีดีไม่มีอะไรเขียนไว้เลยเหรอคะ?"
1001815-27 = "[s] \"เหมือนว่าจะมีเขียน... ไว้ว่า 'ยูสึ' น่ะ\""
1001815-28 = "คะ... คะคะคะ... คะ?! ชะ... ชื่อฉันเหรอคะ...?!"
1001815-29 = "ดะ... ได้ยังไงกัน... ไม่เห็นจะจำได้เลย..."
1001815-30 = "หรือว่ามันจะเป็น..."
1001815-31 = "[s3] \"ยูสึจำไม่ได้เลยเหรอว่าเป็นแผ่นอะไร?\"\n[s4] \"งั้นลองใช้ PC เปิดดูแล้วกัน...\""
1001815-34 = "ดะ... เดี๋ยวก่อนค่ะ คุณครู!"
1001815-35 = "ซะ... ซีดีแผ่นนั้น... เดี๋ยวฉันเช็กให้เองค่ะ!"
1001815-36 = "[s] \"มีอะไรเหรอ?\""
1001815-37 = "คะ... คือว่า..."
1001815-38 = "มันอาจจะมีข้อมูลที่เกี่ยวข้องกับเรื่องส่วนตัวของฉันก็ได้น่ะค่ะ...!"
1001815-39 = "ฮือออ... ทำไมเวลาอยู่กับคุณครูถึงเจอของที่ไม่รู้ว่าคืออะไรแบบนี้ด้วย..."
1001815-43 = "ขะ... ขอโทษด้วยค่ะ... ระหว่างที่ฉันเช็กแผ่นซีดี คุณครูช่วยออกไปรอข้างนอกก่อนได้มั้ยคะ?"
1001815-44 = "[s] \"แค่หันหลังไม่ได้เหรอ?\""
1001815-45 = "มะ... ไม่ได้ค่ะ!"
1001815-48 = "(คุณครูถูกยูสึดันหลังให้ออกไปรอข้างนอกห้องชมรมพัฒนาเกม)"
1001815-50 = "(ผ่านไปประมาณ 10 นาที...)"
1001815-51 = "เอ่อ คุณครูคะ..."
1001815-52 = "ตะ... ตอนนี้เข้ามาได้แล้วค่ะ..."
1001815-54 = "ขะ... ขอโทษนะคะ เมื่อกี้ฉันลนมากเกินไป..."
1001815-55 = "[s5] \"ไม่เป็นไรหรอก มันอาจเป็นของส่วนตัวก็ได้นี่เนอะ...\"\n[s6] \"ดูเนื้อหาในแผ่นซีดีรึยัง?\""
1001815-58 = "ค่ะ มันไม่ใช่อะไรพิเศษหรอกค่ะ"
1001815-59 = "ไม่สิ... มันเป็นของสำคัญ..."
1001815-60 = "[s] \"ของสำคัญอะไรเหรอ?\""
1001815-61 = "คือ... มันเป็นแผ่นโกลเด้นมาสเตอร์ของเกม <เทลส์ ซาก้า โครนิเคิล> ที่เป็นเกมแรกที่ฉันสร้างขึ้นมาค่ะ"
1001815-62 = "แผ่นโกลเด้นมาสเตอร์คืออะไรน่ะเหรอคะ?"
1001815-63 = "อ๊ะ ขอโทษด้วยค่ะ ฉันพูดไปโดยลืมคิดไปเลย..."
1001815-64 = "คือว่า... ปกติแผ่นมาสเตอร์ดิสก์ที่ใช้ใส่เวอร์ชั่นสมบูรณ์ของผลงานจะเรียกกันว่า โกลเด้นมาสเตอร์ค่ะ"
1001815-65 = "สมัยก่อนตอนที่ผลิตแผ่นเสียงจะมีการเคลือบทองคำเปลวลงบนแผ่นต้นฉบับเพื่อเพิ่มความทนทาน..."
1001815-66 = "พอนานๆ ไปคำนี้เลยกลายเป็นคำที่ใช้เรียกแผ่นมาสเตอร์ดิสก์ของเกมเวอร์ชั่นสมบูรณ์ว่า 'โกลเด้นมาสเตอร์' ค่ะ"
1001815-67 = "แน่นอนว่าตอนนี้ไม่ได้ใช้ทองคำเปลวเคลือบแผ่นกันแล้วค่ะ"
1001815-68 = "ซีดีแผ่นนี้เป็นแผ่นสุดท้ายที่ก๊อปปี้ไว้ก่อนที่ฉันจะอัปโหลดเกมเทลส์ ซาก้า โครนิเคิล ขึ้นอินเทอร์เน็ตค่ะ"
1001815-69 = "ในช่วงเวลาหนึ่ง ฉันกลัวที่จะมองแผ่นซีดีแผ่นนี้เลยเก็บมันไว้ในที่ที่มองไม่เห็นค่ะ..."
1001815-70 = "จนทำให้ฉันลืมไปแล้วด้วยซ้ำว่ามีอะไรอยู่ในซีดีแผ่นนี้"
1001815-71 = "[s] \"แล้วตอนนี้โอเคแล้วใช่มั้ย?\""
1001815-72 = "ค่ะ ตอนนี้ไม่เป็นไรแล้วค่ะ"
1001815-73 = "ถึงจะยังไม่โอเคร้อยเปอร์เซนต์... กับคำวิจารณ์มากมายที่เคยได้รับในตอนนั้น"
1001815-74 = "แต่ฉันมีความทรงจำดีๆ มากมาย มันเลยช่วยชดเชยประสบการณ์แย่ๆ พวกนั้นได้ค่ะ"
1001815-75 = "แล้วพอมองย้อนกลับไป สิ่งที่ทำให้สมาชิกทุกคนมารวมตัวกันได้ก็เป็นเพราะการเปิดตัวเกมต้นฉบับนี้ค่ะ"
1001815-76 = "ถ้าฉันไม่สร้างเกมนี้ วันเวลาที่แสนสดใสในตอนนี้ก็คงจะไม่เกิดขึ้นค่ะ"
1001815-77 = "เพราะงั้นตอนนี้... ฉันคิดว่าตัวเองจะเผชิญหน้ากับเกมนี้ได้อย่างตรงไปตรงมาแล้วค่ะ"
1001815-78 = "[s7] \"ดีแล้วละ มันเป็นของมีค่ามากเลยนะ\"\n[s8] \"อัญมณีที่สวยงามถ้าไม่ถูกเจียระไนก็บอกไม่ได้หรอกว่ามันงดงามแค่ไหนน่ะ\""
1001815-81 = "ค่ะ... และมันก็เป็น[ruby=โกลเด้น มาสเตอร์]ผลงานความทรงจำที่ล้ำค่า[/ruby] ครั้งแรกและครั้งเดียวของฉันค่ะ"
1001815-82 = "จริงด้วยค่ะ คุณครูยังไม่เคยลองเล่นเกมต้นแบบของ <เทลส์ ซาก้า โครนิเคิล> เลยใช่มั้ยคะ?"
1001815-83 = "ถ้าคุณครูสะดวก อยากลองเล่นดูสักครั้งมั้ยคะ?"
1001815-84 = "[s] \"เอาสิ ครูรอเล่นมานานแล้ว!\""
1001815-85 = "งั้นก็เอาแผ่นซีดีใส่ PC ที่ต่ออินเทอร์เน็ตไว้..."
1001815-90 = "ฮะ... ฮ่าฮ่า... อาจเป็นเพราะยังไม่ได้ปรับตัวเกมให้เหมาะสมเลยใช้เวลาบูตเกมนานสักหน่อยค่ะ"
1001815-94 = "เอ๊ะ... เอ๋?! ทะ... ทำไมล่ะ..."
1001815-95 = "<คำเตือน: ตรวจพบโค้ดที่อาจทำให้อุปกรณ์ PC ของคุณทำงานหนักเกินไป>"
1001815-96 = "<อยู่ระหว่างวิเคราะห์โค้ด... ตรวจสอบพบมัลแวร์ที่ยังไม่สมบูรณ์และไม่ทราบวัตถุประสงค์>"
1001815-97 = "<เพื่อความปลอดภัยของ PC ระบบจะดำเนินการลบโค้ดดังกล่าว...>"
1001815-98 = "ยะ... อย่าลบความทรงจำของฉันนะ!"
1001815-100 = "(โชคดีที่ยูสึรับมือได้ทัน ทำให้ข้อมูลในแผ่นซีดีไม่ถูกลบไป...)"
1001815-101 = "(น่าเสียดายที่การเล่นเกมต้นแบบของ <เทลส์ ซาก้า โครนิเคิล> คงจะต้องถูกเลื่อนออกไปอีกระยะหนึ่ง)"

2004806-43 = "3;나기사 수영복;06;한데 이렇게 어렵사리 고른 수영복을 단지 며칠의 휴양을 끝으로 다음 여름까지 옷장에 봉해 두어야 한다니…….\n#3;em;[한숨]"
2004806-44 = "3;나기사 수영복;02;순간, 수영복에 대한 예의가 아니라고 느낀 것입니다."
2004806-45 = "[s] \"……그럼 그냥 수영을 하면 되는 것 아니었을까?\""
2004806-46 = "3;나기사 수영복;01;수영은 업무와 병행할 수가 없습니다, 선생님.\n#3;em;[!]"
2004806-47 = "3;나기사 수영복;02;헤엄치면서 서류에 날인을 할 수는 없잖아요."
2004806-48 = "3;나기사 수영복;09;물 속에서 움직이는 것도 귀찮고…….\n#fontsize;50\n#3;em;[속상함]\n#3;stiff"
2004806-49 = "[s] \"응?\""

[translation]
2004806-1 = "กลิ่นอายของการตกปลา"
2004806-2 = "สระว่ายน้ำของสภาน้ำชา"
2004806-4 = "(คุณครูมุ่งหน้าไปยังสระว่ายน้ำที่นางิสะอยู่)"
2004806-5 = "(ระหว่างนั้นคุณครูก็คิดว่านางิสะถามกันเรื่องตกปลา แต่ทำไมมาที่สระว่ายน้ำ...)"
2004806-6 = "อ๊ะ คุณครู ทางนี้ค่ะ"
2004806-10 = "ขอบคุณที่มาหากันเร็วขนาดนี้เลยนะคะ... คุณครู"
2004806-11 = "สาเหตุที่ฉันอยากขอความช่วยเหลือจากคุณครู... ก็ไม่ใช่อะไรอื่น..."
2004806-12 = "เอาเป็นว่าคุณครูช่วยมองลงไปในสระว่ายน้ำให้ก่อนได้มั้ยคะ...?"
2004806-16 = "[ns] มองลงไปในสระว่ายน้ำ"
2004806-18 = "[ns] \"ปลาเหรอ...?!\""
2004806-19 = "(มีปลาหลายสิบตัวแหวกว่ายอยู่ในสระว่ายน้ำ)"
2004806-23 = "เอาละ จากนี้ไป..."
2004806-24 = "เราต้องตกเด็กๆ พวกนี้ขึ้นมาทีละตัวๆ ค่ะ"
2004806-25 = "แต่ว่ามันมีกันเยอะเกินจนฉันน่าจะตกขึ้นมาคนเดียวไม่ไหว..."
2004806-26 = "ฉันก็เลยต้องขอความช่วยเหลือจากคุณครูแบบนี้ล่ะคะ..."
2004806-27 = "[s] \"ใครเป็นคนก่อเรื่องแบบนี้เนี่ย...?\""
2004806-28 = "ฮุฮุ เป็นคำถามที่ดีเลยค่ะ คุณครู"
2004806-29 = "ฉันเองค่ะ"
2004806-33 = "[ns] \"ว่าไงนะ...?\""
2004806-34 = "ค่ะ ฉันเป็นคนเอาปลามาปล่อยในสระว่ายน้ำเองค่ะ"
2004806-35 = "ถ้าจะพูดให้ถูก ต้องบอกว่าฉันขอให้คนอื่นช่วยทำให้ค่ะ..."
2004806-36 = "[s] \"ทะ... ทำไมล่ะ...?\""
2004806-37 = "ฉันอยากสัมผัสกลิ่นอายของทะเลอีกครั้งน่ะค่ะ"
2004806-38 = "แต่สิ่งที่สำคัญกว่านั้นไม่ใช่ปลาหรอกนะคะ"
2004806-39 = "ดูนี่ก่อนสิคะ คุณครู"
2004806-40 = "คนที่มีสายตาเฉียบแหลมอย่างคุณครูต้องดูออกทันทีแน่นอนค่ะ"
2004806-41 = "[s] \"หืม... อะไรเหรอ...?\""
2004806-42 = "ก็ชุดว่ายน้ำชุดนี้ที่ฉันตั้งใจเลือกเอามากๆ ไงคะ"
2004806-43 = "ทั้งที่อุตส่าห์เลือกมาตั้งนาน แต่หลังจากไปเที่ยวมาไม่กี่วันก็ต้องถูกผนึกอยู่ในตู้เสื้อผ้าไปจนถึงฤดูร้อน#nปีหน้าเลย..."
2004806-44 = "ฉันว่านี่เป็นการไม่ให้เกียรติชุดว่ายน้ำไปหน่อยค่ะ"
2004806-45 = "[s] \"งั้นก็แค่ใส่ไปว่ายน้ำเฉยๆ ก็ได้นี่...?\""
2004806-46 = "ฉันว่ายน้ำพร้อมกับทำงานไม่ได้ค่ะ คุณครู"
2004806-47 = "ใครจะว่ายน้ำไปด้วย แล้วประทับตราบนเอกสารไปด้วยได้ล่ะคะ"
2004806-48 = "แล้วฉันก็ขี้เกียจขยับตัวในน้ำด้วย..."
2004806-49 = "[s] \"หืม?\""
2004806-50 = "แต่ถ้าเป็นการตกปลา ฉันทำควบคู่ไปกับการทำงานได้ค่ะ"
2004806-51 = "ฉันก็เลยให้คนไปหาปลาที่อยู่แถวๆ นี้มาใส่ไว้ในสระว่ายน้ำ..."
2004806-52 = "และอย่างที่บอกไปก่อนหน้าว่าปลามันมีเยอะเสียจน... ฉันจับคนเดียวไม่ไหว..."
2004806-53 = "จะว่าไป ฉันเคยได้ยินด้วยนะคะว่ามีอุตสาหกรรมประมงที่ใช้แบตเตอรี่รถยนต์แล้วจับปลาขึ้นมา#nทีละเยอะๆ ในครั้งเดียว"
2004806-54 = "ถึงฉันจะไม่แน่ใจว่าต้องทำยังไงก็เถอะค่ะ..."
2004806-55 = "[s] \"แบบนั้นมัน... ครูว่าอย่าทำตามดีกว่านะ...!\""
2004806-56 = "คุณครูมีความคิดคล้ายฉันเลยนะคะ"
2004806-57 = "ถ้างั้นว่ายังไงล่ะคะ คุณครู?"
2004806-62 = "อยากสัมผัสประสบการณ์การตกปลากับฉันมั้ยล่ะคะ?"
2004806-64 = "(แล้วคุณครูก็สนุกกับการตกปลาในสระเทียมที่หรูหราที่สุดในโลก)"
2004806-65 = "(หลังจากนั้นก็ปล่อยปลาทั้งหมดที่ตกได้กลับสู่ธรรมชาติตามเดิม)"

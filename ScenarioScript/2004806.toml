[translation]
2004806-1 = "漁火的情趣"
2004806-2 = "茶會專用泳池"
2004806-4 = "（前往了渚所在的泳池）"
2004806-5 = "（不過為什麼明明提到釣魚，卻要到泳池來呢……）"
2004806-6 = "啊，老師，這邊請。"
2004806-10 = "您居然這麼快就來了……真是感激不盡。"
2004806-11 = "那個，至於我請老師前來的理由……其實是……"
2004806-12 = "……請您先看看泳池裡面吧。"
2004806-16 = "[ns] 望向泳池的水面"
2004806-18 = "[ns]「……魚！？」"
2004806-19 = "（泳池裡有數十條魚正在四處悠游）"
2004806-23 = "接下來，我們要將這些孩子……"
2004806-24 = "用這根釣竿一一釣起來。"
2004806-25 = "不過因為數量有點多，我一個人實在有些吃力……"
2004806-26 = "……所以只好請老師幫忙了。"
2004806-27 = "[s]「到底是誰把魚放進泳池的……？」"
2004806-28 = "呵呵，這個問題問得非常好，老師。"
2004806-29 = "那個人就是我哦。"
2004806-33 = "[ns]「……什麼？」"
2004806-34 = "沒錯，是我把魚放進泳池的。"
2004806-35 = "雖然嚴格來說，是請隨從們幫忙放的……"
2004806-36 = "[s]「為，為什麼要這麼做……？」"
2004806-37 = "因為我想再次感受水邊的情趣。"
2004806-38 = "不過跟魚相比──"
2004806-39 = "這才是更重要的，老師。"
2004806-40 = "以老師您的眼光，想必一眼就能看出來了吧。"
2004806-41 = "[s]「唔嗯……你指的是……？」"
2004806-42 = "是我為了選出這件泳裝所花費的心思。"
2004806-43 = "然而如此煞費苦心挑選出來的泳裝，#n卻只能在歷經短短幾天的假期後被封存在衣櫃，直到下個夏天到來……"
2004806-44 = "讓我不禁對這件泳裝感到失禮。"
2004806-45 = "[s]「……那怎麼不乾脆去游泳呢？」"
2004806-46 = "因為游泳無法和工作同時進行，老師。"
2004806-47 = "畢竟要一邊游泳，一邊在文件上蓋章實在有困難……"
2004806-48 = "要在水裡活動也挺麻煩的……"
2004806-49 = "[s]「嗯？」"
2004806-50 = "但釣魚是可以和工作並行的。"
2004806-51 = "所以我才會像這樣找來附近的魚，並佈置好場景……"
2004806-52 = "不過誠如剛才所說，要我一個人釣完這麼多魚實在太困難了……"
2004806-53 = "這麼說來，我曾經聽說過一種運用汽車的電瓶，在同一時間大量捕撈的漁法。"
2004806-54 = "雖然不太清楚實際上該怎麼做……"
2004806-55 = "[s]「那個……我覺得還是別用比較好……！」"
2004806-56 = "果然老師的想法跟我一致呢。"
2004806-57 = "那麼您意下如何呢，老師？"
2004806-62 = "要不要和我一起，稍微體驗一下捕魚的樂趣？"
2004806-64 = "（於是便在世上最豪華的人工釣魚場享受了釣魚時光）"
2004806-65 = "（在將泳池裡的魚全數釣起之後，放回了牠們原本的棲息地）"

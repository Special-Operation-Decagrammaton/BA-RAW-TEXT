[translation]
2004806-1 = "Fishing Vibes"
2004806-2 = "Tea Party Exclusive Swimming Pool"
2004806-4 = "I headed to the swimming pool where Nagisa was."
2004806-5 = "I couldn't help but wonder what the correlation between the swimming pool and fishing was."
2004806-6 = "Ah, Sensei. Over here."
2004806-10 = "Thank you for coming so quickly."
2004806-11 = "Well, I called you here, because...um..."
2004806-12 = "Perhaps a visual explanation would be best. Would you mind looking inside the pool here?"
2004806-16 = "[ns] Look inside the pool."
2004806-18 = "[ns] \"...Are those fish?!\""
2004806-19 = "There were dozens of fish swimming inside the pool."
2004806-23 = "We must retrieve the fish..."
2004806-24 = "...one by one, with this fishing pole."
2004806-25 = "However, the population is rather large for me to catch on my own."
2004806-26 = "Which is why I asked you here."
2004806-27 = "[s] \"Who could've done this...\""
2004806-28 = "Fufu. Excellent question, Sensei."
2004806-29 = "It was me."
2004806-33 = "[ns] \"...What?\""
2004806-34 = "Yes. I released the fish into the swimming pool."
2004806-35 = "To be precise, I asked an assistant to do so..."
2004806-36 = "[s] \"Wh-Why...?\""
2004806-37 = "To recreate the atmosphere of the beach, of course."
2004806-38 = "But the fish are not the priority at the moment."
2004806-39 = "Look this way first, Sensei."
2004806-40 = "You have a sharp eye, so I knew you would discern it immediately."
2004806-41 = "[s] \"Um... 'Discern' what, exactly?\""
2004806-42 = "The amount of thought and care I put into my swimsuit choice."
2004806-43 = "However, the thought that this meticulously chosen swimsuit would simply collect dust in a closet until next summer, after just a few days of use..."
2004806-44 = "Is that not a horrible way to treat this swimsuit?"
2004806-45 = "[s] \"...You can go swimming whenever you want, you know.\""
2004806-46 = "No, Sensei. For I can't swim and work at the same time."
2004806-47 = "Are you capable of stamping a document while submerged in water?"
2004806-48 = "And it's rather tiring, moving underwater."
2004806-49 = "[s] \"I...see?\""
2004806-50 = "What I CAN do is fish and work at the same time."
2004806-51 = "Which brought about the situation you see before you now."
2004806-52 = "However, as I said before, it seems my assistant was a little too enthusiastic and released more fish than I expected."
2004806-53 = "I did research a fishing method where one can use a car battery to scoop up a large number of fish at once..."
2004806-54 = "...however, it's not something I've tried before."
2004806-55 = "[s] \"Let's not use that method!!\""
2004806-56 = "I see. Then we're on the same page."
2004806-57 = "What do you say, Sensei?"
2004806-62 = "Shall we enjoy fishing together?"
2004806-64 = "So we fished together at the most luxurious, artificial fishing hole I've ever seen."
2004806-65 = "I made sure we released the captured fish back to where they came from afterwards."

2004806-53 = "3;나기사 수영복;02;그러고 보니 자동차 배터리를 써서 한 번에 많은 물고기를 잡는 어업도 있다고 들었습니다."
2004806-54 = "3;나기사 수영복;01;정확히 어떻게 써야 할 지는 잘 모르겠습니다만…….\n#3;em;[?]"

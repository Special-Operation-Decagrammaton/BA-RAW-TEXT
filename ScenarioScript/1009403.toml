1009403-42 = "[s] \"에너지는 또 뭐고, 수분량은 왜 감소시키는 건데…….\""
1009403-43 = "3;모모이 메이드;04;어, 그, 그건 그러니까…….\n#3;stiff"
1009403-44 = "3;모모이 메이드;04;세상이 대충 망한 다음 찾아오는 포스트 아포칼립스 세계관 작품에서 장기적으로 먹을 수 있는 게 통조림뿐이어서?\n#3;em;[?]"
1009403-45 = "3;모모이 메이드;04;그런 게임 스크립트냐고? 마, 맞긴 하지만 그래도 말이지!\n#3;jump"

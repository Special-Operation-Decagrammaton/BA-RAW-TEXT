[translation]
1009403-1 = "#title;메이드의 요리!"
1009403-2 = "3;모모이 메이드;03;어서 와, 선생님! 기다렸어!\n#3;a"
1009403-3 = "3;모모이 메이드;11;후후후…… 기대하시라. 이번에야말로 메이드 사이바 모모이의 진가를 보여 줄 테니까!\n#3;em;[재잘]"
1009403-4 = "[ns1] \"그런 모모이에게 질문!\"\n[ns2] \"기대되면서 불안하다고 하면 어쩔 생각입니까!\""
1009403-5 = "#wait;100"
1009403-6 = "#wait;100"
1009403-7 = "3;모모이 메이드;10;여행자여. 이런 말이 있지."
1009403-8 = "3;모모이 메이드;03;미지에 대한 공포와 기대야말로…… 모험의 꽃인 거라고!\n#3;em;[!]\n#3;jump"
1009403-9 = "3;모모이 메이드;04;어, 어? 또 어디에서 적당히 그럴듯한 말 가져다 붙인 것 같다고? 아니거든!? 맞는데 아무튼 아니거든?!\n#3;hophop"
1009403-10 = "3;모모이 메이드;10;아무튼…… 앞서 말한 대로, 메이드의 중요한 임무 중 하나는 식사 준비!\n#3;em;[!]"
1009403-11 = "3;모모이 메이드;03;그리고 메이드가 준비한 식사라면 역시 코스 요리지!"
1009403-12 = "3;모모이 메이드;01;그러니까 오늘은 내가 선생님에게 코스 요리를 대접해 줄게."
1009403-13 = "3;모모이 메이드;00;우선 가장 먼저 준비한 것은…… 이거야!\n#3;closeup"
1009403-14 = "[s] \"보라색…… 주스?\""
1009403-15 = "3;모모이 메이드;10;그러하다. 무엇을 숨기랴. 이것이야말로 '식전 주스'라 불리는 음료!\n#3;em;[재잘]"
1009403-16 = "3;모모이 메이드;01;들어 봐, 선생님. 코스 요리에는 식전 주스라는 게 있대. 입맛을 북돋워 주는 역할을 한다더라!\n#3;jump"
1009403-17 = "3;모모이 메이드;10;그 조건은 정확히는 모르겠지만…….\n#3;em;…"
1009403-18 = "3;모모이 메이드;00;아무튼 뭔가 달콤한 것이라는 것 같아!\n#3;hophop"
1009403-19 = "3;모모이 메이드;03;그래서 <리자드맨의 포도주스>를 준비해 왔어!\n#3;em;[반짝]\n#3;greeting"
1009403-20 = "[s3] \"아니, 포도주스면 포도주스지…….\"\n[s4] \"리자드맨의 포도주스는 뭐야?\""
1009403-21 = "#wait;100"
1009403-22 = "#wait;100"
1009403-23 = "3;모모이 메이드;11;훗. 훗. 훗……. 그렇게 물어볼 줄 알았어.\n#3;em;[음표]"

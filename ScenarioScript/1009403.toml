[translation]
1009403-1 = "อาหารของเมด!"
1009403-2 = "เข้ามาสิ คุณครู! ฉันกำลังรออยู่เลย!"
1009403-3 = "ฮุฮุฮุ... ตั้งตารอได้เลย ครั้งนี้ฉันจะทำให้คุณครูได้เห็นคุณค่าที่แท้จริงของเมดไซบะ โมโมอิยังไงล่ะ!"
1009403-4 = "[ns1] \"ครูมีคำถาม!\"\n[ns2] \"ถ้าบอกว่าทั้งคาดหวังและกลุ้มใจด้วยล่ะ จะว่ายังไง?\""
1009403-7 = "นักเดินทางเอ๋ย เคยได้ยินคำนี้หรือเปล่า?"
1009403-8 = "ที่บอกว่าความกลัวและความคาดหวังต่อสิ่งที่ไม่รู้จัก... คือหัวใจสำคัญของการผจญภัยน่ะ!"
1009403-9 = "หะ... หืม? รอบนี้ฉันแถด้วยคำพูดที่ฟังขึ้นเลยงั้นเหรอ? ไม่ได้แถสักหน่อย!? จะยังไงก็เถอะ แต่ฉันไม่ได้แถนะ!"
1009403-10 = "เอาเถอะ... อย่างที่บอกไปเมื่อกี้ว่าหนึ่งในภารกิจที่สำคัญของเมดก็คือการเตรียมอาหาร!"
1009403-11 = "และถ้าเป็นอาหารของเมดก็ต้องเสิร์ฟเป็นคอร์ส!"
1009403-12 = "เพราะงั้นวันนี้ฉันจะเตรียมอาหารเป็นคอร์สให้คุณครู!"
1009403-13 = "และอย่างแรกที่ฉันเตรียมไว้ให้ก็คือ... นี่ไงล่ะ!"
1009403-14 = "[s] \"น้ำผลไม้... สีม่วง?\""
1009403-15 = "ถูกต้อง นี่คือเครื่องดื่มที่ได้ชื่อว่าเป็น 'น้ำผลไม้เรียกน้ำย่อย'!"
1009403-16 = "คุณครูยังไม่รู้ใช่มั้ยล่ะว่าในอาหารแบบคอร์สน่ะ จะมีการเสิร์ฟน้ำผลไม้เรียกน้ำย่อยด้วย เห็นว่ามันจะช่วยกระตุ้นความอยากอาหารน่ะ!"
1009403-17 = "ฉันก็ไม่รู้กลไกของมันหรอกนะ..."
1009403-18 = "แต่น่าจะเป็นเพราะความหวานของมันน่ะ!"
1009403-19 = "ฉันก็เลยเตรียม <น้ำองุ่นจากลิซาร์ดแมน> ไว้ให้!"
1009403-20 = "[s3] \"เดี๋ยวก่อน น้ำองุ่นธรรมดาไม่มีเหรอ...?\"\n[s4] \"น้ำองุ่นจากลิซาร์ดแมนมันเป็นยังไงกัน?\""
1009403-23 = "ฮุ ฮุ ฮุ... กะไว้แล้วว่าต้องถาม"
1009403-24 = "นี่มันไม่เหมือนน้ำองุ่นทั่วไปหรอกนะ!"
1009403-25 = "เพราะมันจะช่วยเพิ่มความต้านทานพิษและทำให้หายใจใต้น้ำได้ยังไงล่ะ!"
1009403-26 = "[s] \"จริงเหรอ?!\""
1009403-27 = "เห็นเขียนไว้แบบนั้นในคำอธิบายไอเทมในเกมน่ะ"
1009403-28 = "อะ... อะไรกัน! ทำไมทำหน้าเหมือนผิดหวัง แต่ก็เหมือนว่ารู้อยู่แล้วว่าจะเป็นอย่างนี้ด้วยล่ะ!"
1009403-29 = "ในชีวประวัติของลิซาร์ดแมนบอกไว้ด้วยนะว่าน้ำองุ่นนั่นเป็นผลงานชิ้นเอกของ <เมดลิซาร์ดแมนที่น่าเชื่อถือ>!"
1009403-30 = "ถึงฉันจะไม่เคยหาซื้อมาอ่านก็เถอะ!"
1009403-34 = "(โมโมอิแนะนำน้ำองุ่นอย่างยิ่งใหญ่ แต่สิ่งที่เห็นก็คือน้ำองุ่นธรรมดาทั่วไป...)"
1009403-36 = "ต่อไปก็คือซุป! ซุปจะช่วยปลุกระบบย่อยอาหาร แล้วก็ให้สัญญาณล่วงหน้ากับกระเพาะ!  "
1009403-37 = "ฉันก็เลย... เตรียมซุปเนื้อวัวกระป๋องมาให้!"
1009403-38 = "[s] \"ไอเดียดีนะ แต่ทำไมเป็นอาหารกระป๋องล่ะ?\""
1009403-39 = "สงสัยใช่มั้ยล่ะ... ต้องบอกก่อนเลยว่านี่ไม่ใช่ซุปเนื้อวัวกระป๋องธรรมดาๆ หรอกนะ"
1009403-40 = "เพราะมันสามารถเก็บไว้ได้นาน ก็เลยเป็นเสบียงอาหารชั้นยอดที่ทัดเทียมกับนมข้นหวานเลยละ!"
1009403-41 = "แถมยังช่วยฟื้นฟูพลังงานและลดความชุ่มชื้นในร่างกายด้วย!"
1009403-42 = "[s] \"เรื่องพลังงานก็โอเคอยู่หรอก แต่ทำไมถึงลดความชุ่มชื้นล่ะ...?\""
1009403-43 = "อ่า... ระ... เรื่องนั้น... คือว่า..."
1009403-44 = "ในหนังเกี่ยวกับวันสิ้นโลกที่มาเยือนหลังจากโลกล่มสลายบอกไว้ว่ามีแต่อาหารกระป๋องเท่านั้นที่เก็บ#nไว้กินได้เป็นเวลานานๆ น่ะ..."
1009403-45 = "นั่นเป็นเนื้อเรื่องจากเกมหรือเปล่าน่ะเหรอ? กะ... ก็ใช่อยู่หรอกนะ แต่ถึงอย่างนั้นก็เถอะ!"
1009403-46 = "ความยอดเยี่ยมของซุปเนื้อวัวกระป๋องไม่ได้มีแค่นั้นนะ!"
1009403-47 = "เพราะในกระบวนการทำ จะต้มซุปให้เดือดปุดๆ เพื่อลดปริมาณความชื้นให้ได้มากที่สุด จะได้มีเนื้อมากกว่าน้ำยังไงล่ะ!"
1009403-50 = "(รสชาติของซุปก็พอใช้ได้)"
1009403-51 = "(แต่เนื้อแห้งและเค็มมาก กินไปนิดเดียวก็คอแห้งแล้ว...)"
1009403-53 = "และต่อไปก็ถึงตาของอาหารจานหลัก!"
1009403-54 = "อย่าตกใจล่ะ อาหารที่ฉันเตรียมไว้ก็คือ..."
1009403-58 = "โอยาโกะด้งชามโต!"
1009403-59 = "โอยาโกะด้งเป็นอาหารที่ช่วยเพิ่ม HP และ EXP แถมยังเพิ่มอัตราการได้รับไอเทมเป็น 2 เท่าเลยนะ!"
1009403-60 = "นี่เป็นสูตรอาหารลับ กว่าจะได้มาต้องไปเคลียร์เควสดูผู้คนกินอาหารที่สวนชมวิวด้วย!"
1009403-61 = "ฮุ ฮุ ฮุ สิ่งที่สำคัญที่สุดก็คือบัฟเพิ่มอัตราการได้รับไอเทมนี่ละ"
1009403-62 = "เพราะถ้าไปฟาร์มโดยไม่มีบัฟอันนี้ละก็..."
1009403-63 = "[s5] \"งั้นถ้าครูกินแล้วไปซื้อหวยก็มีสิทธิ์ถูกสินะ...\"\n[s6] \"ถ้าซื้อหวยโอกาสถูกรางวัลก็จะเพิ่มขึ้นด้วยมั้ย...?\""
1009403-66 = "เรื่องนั้นฉันไม่รู้หรอกนะ แต่ลองดูก็ไม่เสียหายนี่เนอะ?"
1009403-67 = "หืม? ถ้าไม่ถูก ฉันต้องรับผิดชอบงั้นเหรอ? คุณครูจะโยนความรับผิดชอบให้นักเรียนงั้นเหรอ?"
1009403-70 = "(แล้วคุณครูก็ลองกินโอยาโกะด้ง ค่อยยังชั่วหน่อยที่ทั้งนุ่มนวลและรสชาติดี)"
1009403-72 = "ในที่สุดก็ถึงของหวานกันแล้ว!"
1009403-73 = "และของหวานที่เป็นคอร์สสุดท้ายก็คือ... อืม! จานนี้คุณครูคาดหวังได้เลย!"
1009403-74 = "ฉันเตรียมของหวานที่ลืมไม่ลงมาเลยน่ะ"
1009403-75 = "และสิ่งนั้นก็คือ... เค้กถ่านหินที่เสื่อมโทรมในยมโลกที่บิดเบี้ยว!"
1009403-76 = "[s7] \"ชื่อดูไม่น่ากินเลย!\"\n[s8] \"ยมโลกที่บิดเบี้ยวมันคืออะไรเหรอ?\""
1009403-79 = "หืม? ระ... เรื่องนั้นฉันก็ไม่รู้เหมือนกัน"
1009403-80 = "แต่มันดูมีอะไรยิ่งใหญ่ใช่มั้ยล่ะ?"
1009403-81 = "โดยเฉพาะส่วนสีดำและดูเหมือนจะบิดเบี้ยวนี่ ฉันว่ามันดูเข้ากับรูปลักษณ์ของขนมหวานแปลกๆ..."
1009403-82 = "[s] \"แต่ว่ากันว่าอาหารจะอร่อยถ้ารูปลักษณ์ภายนอกน่ากินนะ...\""
1009403-83 = "มะ... มันก็จริงอยู่หรอก!"
1009403-84 = "แต่สุดท้ายแล้วแค่อร่อยก็พอไม่ใช่เหรอ?"
1009403-87 = "(คุณครูรู้สึกไม่ดีกับชื่ออาหารแห่งลางร้าย...)"
1009403-88 = "(แต่พอกินดูแล้วก็ถึงได้รู้ว่าเป็นเค้กช็อกโกแลตธรรมดาๆ นี่เอง)"
1009403-90 = "เป็นไงล่ะ คุณครู? กินเสร็จแล้วก็รีวิวหน่อยสิ!"
1009403-91 = "รู้สึกว่าได้บัฟ หรือรู้สึกแข็งแรงขึ้น หรือรู้สึกว่าตัวเองเลเวลอัปมั้ย?"
1009403-92 = "หืม? เรื่องนั้นน่ะไม่รู้ แต่ที่รู้แน่ๆ คือได้เห็นฝีมือของฉันงั้นเหรอ?"
1009403-93 = "หึหึ! ตาถึงนะเนี่ยคุณครู! มองคนออกกับเขาด้วยนะ!"
1009403-97 = "ว้าย! ทำถุงพลาสติกตกจนของข้างในร่วงหมดแล้ว..."
1009403-98 = "นี่คืออะไรน่ะเหรอ? อ่า... คะ... คือว่า..."
1009403-99 = "อาหารจากร้านสะดวกซื้อที่ฉันซื้อมาเยอะมากจนมันเหลือน่ะ..."
1009403-100 = "ทำยังไงดีล่ะคุณครู? ชมรมพัฒนาเกมไม่มีตู้เย็นซะด้วย..."
1009403-101 = "อ๊ะ จริงสิ! ฉันจะยื่นขอจดสิทธิบัตรอาหารที่ทำให้คุณครูวันนี้ แล้วเอาค่าสิทธิบัตรไปซื้อตู้เย็น..."
1009403-102 = "[s] \"อืม ไม่อนุมัติ\""
1009403-103 = "ทำไมล่ะ...?!"
1009403-105 = "(หลังจากนั้นคุณครูกับโมโมอิก็ช่วยกันคิดว่าจะจัดการกับอาหารจากร้านสะดวกซื้อที่เหลือยังไง)"
1009403-106 = "(และสุดท้ายก็หาวิธีจัดการได้สำเร็จ)"
1009403-107 = "(แต่ทั้งสองก็ต้องลำบากกันอยู่ไม่น้อย เพราะอาหารมีเยอะมาก...)"

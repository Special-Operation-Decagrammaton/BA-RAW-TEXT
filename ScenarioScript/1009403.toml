[translation]
1009403-1 = "A Maid's Cooking!"
1009403-2 = "Welcome, Sensei! I've been waiting for you!"
1009403-3 = "Heeheehee... This time, I'll show you the true talent of Maid Saiba Momoi. I hope you're ready for it!"
1009403-4 = "[ns1] \"I might have a few questions...\"\n[ns2] \"This is both exciting and kind of scary.\""
1009403-7 = "Traveler, there's a saying..."
1009403-8 = "\"Fear and anticipation of the unknown...are the flowers of adventure!\""
1009403-9 = "H-Huh? You want to know where I copied that from? Well, I didn't copy it...exactly."
1009403-10 = "Anyway...as I mentioned before, one of the main duties of a maid is meal preparation!"
1009403-11 = "And of course, any maid who prepares a meal should go all the way and make it a full-course meal!"
1009403-12 = "So that's what I'm doing for you today."
1009403-13 = "To start off, the first thing I've prepared is...this!"
1009403-14 = "[s] \"Purple...juice?\""
1009403-15 = "That's right! Just what it looks like. This beverage is known as \"appetizer juice\"!"
1009403-16 = "They have that in full-course meals. It's meant to get your appetite going."
1009403-17 = "I...can't vouch for the taste."
1009403-18 = "I think it's supposed to be something sweet, though."
1009403-19 = "That's why I prepared some Lizardman's Grape Juice!"
1009403-20 = "[s3] \"Grape juice is just grape juice, right...?\"\n[s4] \"What exactly makes it Lizardman's Grape Juice?\""
1009403-23 = "Heh, heh. Heh... I knew you'd ask that."
1009403-24 = "Well, it's no ordinary grape juice!"
1009403-25 = "It boosts poison resistance and allows you to breathe underwater!"
1009403-26 = "[s] \"Really?!\""
1009403-27 = "...That's what I read in the game text, at least."
1009403-28 = "H-Huh? You look...disappointed and also not surprised."
1009403-29 = "But there's a book. \"The Dependable Lizardman Maid,\" all about the lives of lizard people. It's a real masterpiece."
1009403-30 = "...Supposedly. I haven't had a chance to get a copy yet."
1009403-34 = "Despite Momoi's extravagant introduction, it was pretty close to just plain old grape juice."
1009403-36 = "Next up is the soup! It jumpstarts your digestive system and signals your stomach to prepare for more food!"
1009403-37 = "So here it is: one can of beef soup!"
1009403-38 = "[s] \"Sounds great, but why is it canned?\""
1009403-39 = "Ah, because this is no ordinary can of beef soup."
1009403-40 = "Because of its long shelf life, it's regarded as an essential food source for travelers, not unlike condensed milk!"
1009403-41 = "It's also known to restore energy, though it does also lower hydration levels."
1009403-42 = "[s] \"What kind of energy, and why does it lower hydration levels...?\""
1009403-43 = "Um, well, that's because..."
1009403-44 = "It's because, in post-apocalyptic worlds where everything has fallen apart, canned food is the only thing that lasts for the long haul."
1009403-45 = "...Well, YES, that's from a game, but still!"
1009403-46 = "I'm not done explaining how amazing this can of beef soup is. I just want to provide the proper context."
1009403-47 = "I simmered it down to reduce the water as much as possible, making it extra thick!"
1009403-50 = "I tried the soup. It tasted...thick and dehydrating."
1009403-51 = "It was so salty, it genuinely made me thirsty."
1009403-53 = "Coming up next is the long-awaited main dish!"
1009403-54 = "Don't be shocked, but what I prepared for this..."
1009403-58 = "...is an incredible oyakodon!"
1009403-59 = "If I had to describe this oyakodon…it increases your max HP and EXP, and even doubles the item drop rate!"
1009403-60 = "Furthermore, it's a hidden recipe, which means you have to clear the task of observing people eating—at the observation park!"
1009403-61 = "Heh, heh, heh. The most important factor here is the buff that doubles the item drop rate."
1009403-62 = "Farming without this buff is like—"
1009403-63 = "[s5] \"So if you consume this and buy a lottery ticket...\"\n[s6] \"Does it increase your chance of winning...?\""
1009403-66 = "...I'm not sure about that, but it might be worth a shot, right?"
1009403-67 = "And NO, you can't blame me if it fails. What, are you trying to blame your student, Sensei?"
1009403-70 = "Fortunately, it was a flavorful and tender oyakodon."
1009403-72 = "Now, it's finally time for dessert!"
1009403-73 = "For the dessert, what I've prepared is... Yum! This is definitely worth getting excited about!"
1009403-74 = "This dessert is truly unforgettable."
1009403-75 = "Behold...the Corrupted Coal Cake from the Twisted Nether!"
1009403-76 = "[s7] \"That's quite a name!\"\n[s8] \"The twisted what now?\""
1009403-79 = "I-I'm not too sure about the details there..."
1009403-80 = "But doesn't it look extraordinary?"
1009403-81 = "Especially with its black, twisted look, it just seems to fit the bill..."
1009403-82 = "[s] \"Look and taste do tend to go together, I think.\""
1009403-83 = "Y-Yes, that's true sometimes!"
1009403-84 = "But if it just tastes good, isn't that enough?"
1009403-87 = "Although the eerie name made me feel a bit uneasy..."
1009403-88 = "...surprisingly, it turned out to be just a plain dark chocolate cake."
1009403-90 = "So, what did you think? Tell me your thoughts!"
1009403-91 = "Don't you feel like you've gained a buff, or become stronger, or leveled up somehow?"
1009403-92 = "Huh? You just appreciate seeing me use my skills?"
1009403-93 = "Heehee! You know a thing or two, Sensei! You've got a good eye for people!"
1009403-97 = "Oh no! The plastic bag fell over, and everything inside it..."
1009403-98 = "What are these, you ask? O-Oh, they're..."
1009403-99 = "...just some convenience store foods. I bought too much, so these were left over..."
1009403-100 = "What should I do, Sensei? The Game Development Department doesn't have a fridge..."
1009403-101 = "Oh, you know...we could officially patent the course menu I created today, earn royalties, and use that money to buy a refrigerator!"
1009403-102 = "[s] \"Err... We could, but denied.\""
1009403-103 = "How come?!"
1009403-105 = "Afterwards, I worked with Momoi to figure out what to do with the leftover convenience store food."
1009403-106 = "Eventually, we managed to clear everything out."
1009403-107 = "Given the large amount of leftovers, it was quite a challenge."

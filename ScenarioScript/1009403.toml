1009403-25 = "3;모모이 메이드;00;무엇보다 독 저항을 증가시키고 물속에서 숨을 쉴 수 있게 해 주거든!\n#3;jump"
1009403-26 = "[s] \"정말이야?!\""
1009403-27 = "3;모모이 메이드;04;……그렇다고 게임 스크립트에 쓰여 있었어.\n#3;em;[땀]"
1009403-28 = "3;모모이 메이드;09;뭐, 뭐야! 그 실망하면서도 그럴 줄 알았다는 표정은!\n#3;stiff"
1009403-29 = "3;모모이 메이드;10;덧붙여 리자드맨의 생활사(?)를 다룬, <믿음직한 리자드맨 메이드>가 그렇게 수작이래."

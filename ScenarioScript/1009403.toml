[translation]
1009403-1 = "女僕的料理！"
1009403-2 = "歡迎你來，老師！等你很久囉！"
1009403-3 = "呵呵呵……敬請期待。#n這次我一定會讓你見識到女僕才羽桃井真正的價值！"
1009403-4 = "[ns1]「我有個問題想問！」\n[ns2]「如果我說既期待又不安，你會怎麼回應呢！」"
1009403-7 = "旅行者啊，有句話是這麼說的。"
1009403-8 = "對未知的恐懼和期待……才是冒險真正的精髓！"
1009403-9 = "咦？感覺我又在亂套遊戲裡的台詞？#n哪，哪有！？雖然是但又不完全是好嗎！"
1009403-10 = "總之……就像我先前說的，女僕的重要任務之一就是準備餐點！！"
1009403-11 = "而說到女僕準備的餐點，當然就是套餐料理！"
1009403-12 = "所以今天，我要用套餐料理來招待老師。"
1009403-13 = "我最先準備的是……這個！"
1009403-14 = "[s]「紫色的……果汁？」"
1009403-15 = "沒錯，不瞞你說，這就是人稱「餐前果汁」的飲料！"
1009403-16 = "你知道嗎，老師。#n據說套餐料理中有所謂的餐前果汁，具有開胃的作用哦！"
1009403-17 = "雖然條件我還不是很清楚……"
1009403-18 = "總之好像就是要甜甜的！"
1009403-19 = "所以我準備了「蜥蜴人的葡萄汁」！"
1009403-20 = "[s3]「不是，葡萄汁就葡萄汁……」\n[s4]「蜥蜴人的葡萄汁是什麼？」"
1009403-23 = "哼，哼，哼……就知道你會這麼問。"
1009403-24 = "這跟普通的葡萄汁可不一樣哦！"
1009403-25 = "首先重點是能增加抗毒能力，還能讓人能在水中呼吸！"
1009403-26 = "[s]「真的假的！？」"
1009403-27 = "……遊戲的文本是這麼寫的。"
1009403-28 = "怎，怎樣啦！為什麼一副失望又早就料到的表情！"
1009403-29 = "順帶一提，聽說描寫蜥蜴人生活史(?)的《可靠的蜥蜴人女僕》是一部傑作哦。"
1009403-30 = "雖然我既沒讀過也沒買過就是了！"
1009403-34 = "（雖然桃井介紹得天花亂墜，其實就只是普通的葡萄汁而已……）"
1009403-36 = "接下來是湯！聽說湯能喚醒消化器官，向胃發出訊號！"
1009403-37 = "所以……我準備了牛肉濃湯罐頭！"
1009403-38 = "[s]「別的先不說，為什麼是罐頭呢？」"
1009403-39 = "這個嘛……首先這不是普通的牛肉濃湯罐頭。"
1009403-40 = "因為能長期保存，所以是旅行者很重要的糧食來源，甚至能媲美煉乳！"
1009403-41 = "除此之外，這個罐頭還有能恢復能量、減少水分的效果！"
1009403-42 = "[s]「能量指的是什麼？而且為什麼要減少水分……」"
1009403-43 = "呃，怎麼說呢……"
1009403-44 = "因為在世界幾乎滅亡的後天啓世界觀作品中，能長期保存的東西只有罐頭？"
1009403-45 = "那是不是又是遊戲裡的文本？#n是，是沒錯啦！"
1009403-46 = "這個牛肉濃湯罐頭厲害的地方還不只如此哦？#n為了確實地考據它的設定……"
1009403-47 = "我盡力把湯汁收乾，盡可能地減少了水分！"
1009403-50 = "（湯的味道馬馬虎虎）"
1009403-51 = "（但實在太乾、太鹹，讓人口好渴……）"
1009403-53 = "接下來，終於輪到苦苦等待的主菜！"
1009403-54 = "這次我準備的是……聽了可別嚇到哦。"
1009403-58 = "就是這道不得了的親子丼！"
1009403-59 = "這道親子丼……#n除了能增加最大HP和獲得經驗值之外，還能讓獲得道具的機率變成兩倍哦！"
1009403-60 = "而且因為這是隱藏食譜，所以還必須完成在瞭望公園觀察人們用餐的條件才能拿到！"
1009403-61 = "哼，哼，哼。#n不過要說它的重點，果然還是道具獲得機率兩倍的增益效果吧。"
1009403-62 = "如果沒取得這個增益效果就去刷道具的話，那真是──"
1009403-63 = "[s5]「那吃了這個再去買彩券的話……」\n[s6]「中獎機率也會提升嗎……？」"
1009403-66 = "……這我就不知道了，但試試看也不錯吧？"
1009403-67 = "嗯？沒中獎的話我要負責？#n老師想把責任推給學生嗎──！"
1009403-70 = "（幸好親子丼的味道還不錯）"
1009403-72 = "現在終於輪到甜點了！"
1009403-73 = "我最後準備的甜點是……嗯！這很值得期待喔！"
1009403-74 = "我準備了能讓你無法忘懷的甜點。"
1009403-75 = "那就是……扭曲的黃泉墮落黑炭蛋糕！"
1009403-76 = "[s7]「這是什麼亂七八糟的名字！」\n[s8]「扭曲的黃泉到底是什麼……？」"
1009403-79 = "嗯？我，我也不知道耶……？"
1009403-80 = "可是老師不覺得聽起來就很厲害嗎？"
1009403-81 = "總覺得特別適合它黑漆漆的扭曲外型……"
1009403-82 = "[s]「有句話叫做『看起來好吃的食物吃起來才會好吃』……」"
1009403-83 = "是，是沒錯啦！"
1009403-84 = "反正只要好吃不就行了嗎？"
1009403-87 = "（雖然那不祥的名字實在讓人覺得很不安……）"
1009403-88 = "（但出乎意料的是，那只是普通的黑巧克力蛋糕）"
1009403-90 = "怎樣怎樣，老師？告訴我感想吧！"
1009403-91 = "有沒有得到增益效果、變強或等級提升的感覺？"
1009403-92 = "嗯？雖然不確定有沒有那種感覺，但確實有看到我的活躍表現？"
1009403-93 = "嘿嘿！你很懂嘛，老師！真有看人的眼光！"
1009403-97 = "哇，塑膠袋倒了，裝在裡面的東西都……"
1009403-98 = "問我這是什麼？#n該怎麼說呢……"
1009403-99 = "這些是買太多剩下的超商食物……"
1009403-100 = "怎麼辦，老師？遊戲開發部沒有冰箱……"
1009403-101 = "啊，對了！就用今天的套餐來申請專利，然後用收到的專利費來買冰箱──"
1009403-102 = "[s]「嗯，駁回。」"
1009403-103 = "為什麼──！？"
1009403-105 = "（之後和桃井一起思考該如何處理剩下的超商食物）"
1009403-106 = "（雖然從結果來看，是成功全都處理掉了……）"
1009403-107 = "（不過因為數量太多，兩人都辛苦了好一陣子……）"

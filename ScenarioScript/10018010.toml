[translation]
10018010-1 = "Episode 1; Help Wanted!"
10018010-6 = "I was having such a good day..."
10018010-7 = "I had no work today, got to sleep in, prepared myself a delicious breakfast..."
10018010-8 = "Even as I was putting on my kimono, I was looking forward to my first prayer of the year..."
10018010-9 = "But then... Then..."
10018010-13 = "Why me?!"
10018010-14 = "Fuuka..."
10018010-21 = "Having your plans derailed is simply a part of life itself."
10018010-22 = "You will find time and time again that you must overcome life's countless trials..."
10018010-23 = "Human achievement rises only from the ashes of struggle."
10018010-24 = "That's pretty lofty coming from the person who kidnapped me."
10018010-25 = "You're welcome."
10018010-26 = "Speaking of compliments, that's a beautiful kimono, Fuuka. You look great in it."
10018010-27 = "...Thank you, I guess. You and your outfit look beautiful as well, Haruna."
10018010-28 = "Thank you, thank you. I dressed up slightly more than usual."
10018010-32 = "Now then, let's get to the point."
10018010-33 = "There is an issue of utmost urgency that the Gourmet Research Society...invited you here today for."
10018010-34 = "We have an important mission for you."
10018010-35 = "You know kidnapping and inviting aren't synonyms, right?"
10018010-36 = "Well, I'm used to you acting as if they are at this point."
10018010-37 = "Now that I think about it, the saying \"People are creatures of habit\" is a bit scary, isn't it?"
10018010-38 = "Yes, yes, our apologies. Now, the Gourmet Research Society has discovered a diamond in the rough, a restaurant called Sparrow."
10018010-39 = "But Sparrow is about to close down."
10018010-44 = "Fuuka, if truffles were left on the roadside without any protection..."
10018010-45 = "...what would you do as a chef?"
10018010-46 = "I'd infuse them with oil, of course."
10018010-47 = "You would need to cook them as quickly as possible."
10018010-48 = "Exactly. This is exactly how we must view this situation. "
10018010-49 = "For a restaurant of such great potential to close is a loss to the entire world."
10018010-50 = "And for us to allow that to happen would be an affront to gastronomy."
10018010-51 = "If you're going to make me listen to the entire speech, could you at least untie me?"
10018010-52 = "Um, isn't it up to the owner whether the restaurant closes or not?"
10018010-53 = "A restaurant's closure is the owner's decision..."
10018010-54 = "That's fundamentally correct."
10018010-59 = "But...! Even if that's their prerogative, I, Kurodate Haruna, deny their decision!"
10018010-60 = "God forgives, but I don't!"
10018010-62 = "No, please start forgiving people. And start untying people."
10018010-67 = "I think it should be soon..."
10018010-72 = "Oh, yup. You're here, Sensei."
10018010-74 = "Yay!"
10018010-76 = "How have you been?"
10018010-78 = "[ns] \"Hello, everyone.\""
10018010-80 = "[ns] \"Everyone looks amazing in their outfits.\""
10018010-85 = "Sensei! Are you here to rescue me?!"
10018010-86 = "[s] \"I wish that were the case...\""
10018010-90 = "[ns] \"But I, too, was kidnapped.\""
10018010-94 = "Oh. I see. It's okay. I'm okay. I'm not gonna cry."
10018010-95 = "Can I cry at least?"
10018010-97 = "All the necessary participants are here, so let's come up with a solution."
10018010-98 = "How can we save Sparrow?"
10018010-99 = "That is the question the Gourmet Research Society must resolve!"
10018010-103 = "[ns] \"Was kidnapping really a necessary step in this plan?\""
10018010-104 = "This is an endeavor built upon determination and resolution, Sensei."
10018010-105 = "Using such unconventional methods..."
10018010-106 = "It's how I show, from the depths of my heart, how sincere I am about this."
10018010-108 = "What's the next step of your sincerity? Murder?"
10018010-109 = "*nod* *nod*"
10018010-112 = "[ns1] \"Kidnapping aside, I think we skipped a step.\"\n[ns2] \"What does the owner have to say about all this?\""
10018010-115 = "Right. The opinion of the person whose livelihood depends on this..."
10018010-116 = "I was so passionate, so sincere, that little detail seems to have slipped my mind."
10018010-117 = "Thank you for the advice, Sensei."
10018010-118 = "It was a good idea to kidnap..."
10018010-119 = "I mean, to invite you, Sensei."
10018010-121 = "(I'm starting to doubt how much she's thought this through...)"
10018010-127 = "Hm? Is that who I think it is?"
10018010-128 = "Haruna, something's off..."
10018010-135 = "Don't you get it?"
10018010-136 = "Move out already! How many times do you have to learn this lesson?!"
10018010-138 = "I'm sorry, I'm sorry. These things take time."
10018010-139 = "I just had my final guests. I'll get out as soon as I can..."
10018010-140 = "Ugh, it's not like we wanna do this."
10018010-141 = "We're nice people. The nicest. Under the right situation."
10018010-142 = "And the right situation is very simply you doing what we say."
10018010-146 = "Do you understand? So let's create this \"right situation\" together."
10018010-153 = "Heeheeheehee..."
10018010-154 = "H-Haruna?"
10018010-155 = "Looks like there are other guests today. Unpleasant ones."
10018010-156 = "Guests that we're going to handle, right, Haruna? ★"
10018010-157 = "The Gourmet Research Society seeks the best food the world has to offer."
10018010-158 = "So, when someone who offers that is in trouble..."
10018010-159 = "Well, we certainly can't ignore it."
10018010-160 = "I totally agree! Let's get rolling!"
10018010-161 = "Ugh. I knew something like this would happen."
10018010-163 = "H-Haruna, what exactly are you planning to do?"
10018010-164 = "We should probably step back, just in case..."
10018010-165 = "[s] \"That's wise, Juri.\""
10018010-169 = "Oh, thank you, Sensei!"
10018010-170 = "But it's less wisdom and more...reflex gained from experience?"
10018010-171 = "Yeah, Sensei. It's impossible to get through to Haruna when she's like that..."
10018010-177 = "H-Hey! What do you think you're doing?!"
10018010-178 = "Can't you see we're working here?!"
10018010-185 = "No, I can't."
10018010-186 = "All I see are thugs disrupting gastronomic harmony."
10018010-187 = "And when it comes to thugs, my preferred method of communication is gunfire."
10018010-195 = "Now, then."
10018010-200 = "Gourmet Research Society, are you ready?"

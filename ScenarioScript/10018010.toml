[translation]
10018010-1 = "第1話;需要幫忙！"
10018010-6 = "很久沒有這麼平安順利了呢……"
10018010-7 = "在休假日睡了個飽，還準備了早餐……#n今天的料理也沒問題。"
10018010-8 = "所以，正想說換上和服去參拜的……"
10018010-9 = "明明是想這麼做的……"
10018010-13 = "為什麼事情又變成這樣……！！"
10018010-14 = "前輩…… "
10018010-21 = "這就是所謂的「人生不如意事，十之八九」吧。"
10018010-22 = "才剛克服襲捲而來的試煉，後面的波浪又打了上來……"
10018010-23 = "所謂的人類，就是必須得克服重重難關唷。"
10018010-24 = "那種話為什麼是從綁架別人的罪魁禍首口中說出來……"
10018010-25 = "唔呵呵……"
10018010-26 = "話說回來，那件和服很適合你哦，風華同學。"
10018010-27 = "……謝謝。羽留奈的和服也很漂亮。"
10018010-28 = "呵呵，非常感謝。#n畢竟到了年末，所以我也多花心思打扮了一下。"
10018010-32 = "那麼──差不多該進入正題了吧。"
10018010-33 = "我們美食研究會之所以會如此「邀請」兩位……"
10018010-34 = "是因為有事相求。"
10018010-35 = "這哪是邀請……明明就是綁架……"
10018010-36 = "討厭，因為這種事太常發生，我已經感到麻痺了……"
10018010-37 = "雖然說「人類是適應環境的動物」……但我可不想適應啊！"
10018010-38 = "不久前，我們找到了一間很棒的餐廳。"
10018010-39 = "但是，這間好不容易找到的麻雀亭餐廳……聽說只營業到今年底而已。"
10018010-44 = "風華同學，松露如果放置在常溫下的話……"
10018010-45 = "身為一名廚師，你會怎麼做呢？"
10018010-46 = "會將它浸泡在油內，鎖住味道吧……"
10018010-47 = "當然，趕緊拿來料理還是最好的選擇。"
10018010-48 = "沒錯，是為了不讓它失去味道吧？#n道理是一樣的。"
10018010-49 = "雖然不知道原因，但那麼棒的餐廳竟然要就此關門大吉……"
10018010-50 = "對美食研究會來說……不，對所有人類來說都是非常龐大的損失。"
10018010-51 = "話說回來……在繼續談下去之前，可以先幫我解開繩子嗎？"
10018010-52 = "那個……結束營業是店主的決定吧？#n那樣的話，沒有我們能插嘴的空間……"
10018010-53 = "結束營業是店主的決定……"
10018010-54 = "確實如此。"
10018010-59 = "但就算如此！即便所有人都接受，我黑舘羽留奈也不接受！"
10018010-60 = "沒錯，就算是老天爺的旨意也不接受！"
10018010-62 = "你就接受了吧。#n還有快點解開繩子啦。"
10018010-67 = "這麼說來，差不多要到了吧……"
10018010-72 = "啊，來了來了，老師。"
10018010-74 = "呀齁──！"
10018010-76 = "最近過得好嗎？"
10018010-78 = "[ns]「你們好呀。」"
10018010-80 = "[ns]「大家都打扮得很漂亮呢。」"
10018010-85 = "老師！你是來救我們的嗎！？"
10018010-86 = "[s]「雖然我也很想這樣做……」"
10018010-90 = "[ns]「但我也是被抓來的。」"
10018010-94 = "連，連老師都……#n沒事的。我不會哭的……"
10018010-95 = "我應該可以哭吧，前輩？"
10018010-97 = "恭候多時了，老師。#n那麼，既然人都到齊了，可以開始今天的會議了吧？"
10018010-98 = "……關於如何阻止麻雀亭結束營業。"
10018010-99 = "就是這次的議題！"
10018010-103 = "[ns]「這種事的話，只要用正常的方式聯絡我，我一定會答應的……」"
10018010-104 = "這是為了讓老師明白我們的決心和覺悟。"
10018010-105 = "雖然手段有點粗暴，但這代表我們是非常認真的。"
10018010-106 = "我們的心情……有傳達給老師了嗎？"
10018010-108 = "……如果每次都這麼做的話，老師總有一天會撐不住的。"
10018010-109 = "（點頭點頭）"
10018010-112 = "[ns1]「在那之前，比起我們在這邊胡亂瞎聊……」\n[ns2]「要不要先聽聽店主怎麼說呢？」"
10018010-115 = "原來如此。要解決問題，聆聽當事者的意見是很重要的……"
10018010-116 = "因為太心急了，所以忽略了重要的事。"
10018010-117 = "不愧是老師。"
10018010-118 = "果然綁架……"
10018010-119 = "不，「邀請」老師是正確的。"
10018010-121 = "（不，這個只要稍微想一下就能明白吧……？）"
10018010-127 = "哎呀……這是？"
10018010-128 = "怎麼感覺氣氛怪怪的……？"
10018010-135 = "我說老闆娘啊……你還沒搞清楚狀況是不是？"
10018010-136 = "趕緊把店搬走！#n還打算待到什麼時候？"
10018010-138 = "對不起，對不起……整理花了一點時間……"
10018010-139 = "因為幾天前來了最後一組客人……我會盡快收拾好的……"
10018010-140 = "真是的……我們也不是喜歡才做這種事啊。"
10018010-141 = "就是說啊。我們可是為了老闆娘好才這麼說的哦？"
10018010-142 = "應該不是什麼很難懂的事吧？只要照著我們的話去做就行了。"
10018010-146 = "這樣明白了吧？#n我們可以用溫和的方式解決……懂不懂？"
10018010-153 = "唔呵呵……"
10018010-154 = "羽，羽留奈……？"
10018010-155 = "前一組客人好像還在呢……#n而且還不是什麼好客人。"
10018010-156 = "該怎麼辦呢？羽留奈★"
10018010-157 = "我們美食研究會，是為了追求終極的美食而存在。"
10018010-158 = "如果曾經好好招待過我們的人有了麻煩──"
10018010-159 = "肯定不能袖手旁觀吧。"
10018010-160 = "我非常贊成！來大幹一場吧──！"
10018010-161 = "唉，我就覺得八成會這樣……"
10018010-163 = "羽，羽留奈？你想做什麼……？"
10018010-164 = "前輩，我們還是退後一點比較好……"
10018010-165 = "[s]「說得沒錯，茱莉真聰明呢。」"
10018010-169 = "謝，謝謝老師的稱讚！"
10018010-170 = "該說這是源自於積年累月的經驗嗎……"
10018010-171 = "那種狀態下的羽留奈，不管跟他說什麼都是沒用的……"
10018010-177 = "你，你們想做什麼！"
10018010-178 = "現在還在營業中耶！？難道看不出來嗎？"
10018010-185 = "對，看不出來。"
10018010-186 = "妨礙美食可是要遭天譴的。"
10018010-187 = "對於不懂這個道理的人，我對他們的話沒有興趣，也不想聽。"
10018010-195 = "那麼接下來──"
10018010-200 = "來一場美食研究會吧？"

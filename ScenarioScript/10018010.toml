[translation]
10018010-1 = "ตอนที่ 1;ต้องการความช่วยเหลือค่ะ!"
10018010-6 = "ทุกอย่างเป็นไปได้ด้วยดีเลย นี่ก็นานแล้วนะ..."
10018010-7 = "ที่ไม่ได้นอนพักเต็มที่ในวันหยุด เตรียมตัวตอนเช้าเสร็จแล้วก็ออกมาข้างนอก อาหารก็ไม่มีปัญหาอะไร"
10018010-8 = "ใส่ชุดกิโมโนเรียบร้อย เตรียมตัวจะไปขอพรแรกของปีใหม่..."
10018010-9 = "แต่แล้ว... แต่แล้วก็..."
10018010-13 = "ทำไมฉันต้องโดนแบบนี้อีกเนี่ย!!!"
10018010-14 = "รุ่นพี่... "
10018010-21 = "ชีวิตเรามันก็มักจะไม่เป็นไปตามที่เราต้องการหรอกค่ะ"
10018010-22 = "ต้องพบเจอความยากลำบากมากมาย ฝ่าฟันและเอาชนะเรื่องยากลำบากเหล่านั้นไป..."
10018010-23 = "นั่นแหละคือสิ่งที่เรียกว่ามนุษย์ เราต้องเอาชนะ..."
10018010-24 = "พอได้ยินคนที่ลักพาตัวคนอื่นมาเป็นฝ่ายพูดแบบนั้น... รู้สึกแปลกๆ จังเลยนะ"
10018010-25 = "ชมเกินไปแล้วละค่ะ"
10018010-26 = "อีกอย่าง ชุดกิโมโนสวยมากเลยนะคะ เหมาะมากเลยค่ะคุณฟูกะ "
10018010-27 = "...ขอบคุณที่ชม ชุดของฮารุนะก็สวยเหมือนกันนะ"
10018010-28 = "ฮุฮุฮุ ขอบคุณค่ะ ฉันลองใส่ใจเรื่องเสื้อผ้ามากกว่าปกตินิดหน่อยน่ะค่ะ"
10018010-32 = "ถ้างั้นตอนนี้... เรามาเข้าเรื่องกันเลยดีมั้ยคะ? "
10018010-33 = "สิ่งที่ทำให้ชมรมชิมอาหารของเราพาพวกคุณมาที่นี่อย่างยากลำบาก..."
10018010-34 = "ก็เพราะมีเรื่องที่อยากให้พวกคุณช่วยพวกเราค่ะ"
10018010-35 = "ไม่ได้พามาสักหน่อย... ลักพาตัวมาต่างหากล่ะ..."
10018010-36 = "ฉันพยายามทำใจให้ชินแล้วเพราะมันเกิดขึ้นบ่อยๆ..."
10018010-37 = "แต่ตอนนี้ฉันชักเริ่มกลัวคำกล่าวที่ว่า มนุษย์เป็นสัตว์ที่ปรับตัวเก่งแล้ว!"
10018010-38 = "ชมรมชิมอาหารของเราค้นพบร้านลับที่เหมือนเพชรที่ยังไม่ถูกเจียระไนค่ะ ร้านนั้นชื่อว่า \"ร้านซุซุเมะ\" ค่ะ"
10018010-39 = "แต่ว่าร้านซุซุเมะใกล้จะต้องปิดทำการแล้วค่ะ"
10018010-44 = "คุณฟูกะ... ถ้าเจอเห็ดทรัฟเฟิลถูกปล่อยทิ้งไว้ริมถนน โดยไม่ได้รับการดูแลดีๆ "
10018010-45 = "ในฐานะเชฟแล้ว คุณจะทำยังไงเหรอคะ?"
10018010-46 = "ก่อนอื่นก็ต้องจัดการเรื่องกลิ่นก่อนน่ะสิ"
10018010-47 = "ถ้าใช้ออยล์จะดึงกลิ่นออกมาได้หอมที่สุด เพราะงั้นรีบเก็บมาทำอาหารจะเป็นวิธีที่ดีที่สุด"
10018010-48 = "ค่ะ ใช่แล้วค่ะ "
10018010-49 = "ดังนั้นร้านที่คุณภาพคับแก้วแบบนี้จะต้องปิดตัวลงด้วยเหตุผลที่ไม่สามารถรู้ได้..."
10018010-50 = "ในฐานะของนักชิมแล้ว ถือว่าเป็นความเสียหายที่ประเมินค่าไม่ได้เลยค่ะ"
10018010-51 = "ก่อนอื่นช่วยแก้มัดก่อนได้มั้ย?"
10018010-52 = "คือว่า... เรื่องที่ร้านอาหารจะเปิดหรือจะปิด มันก็ขึ้นอยู่กับการตัดสินใจของเจ้าของร้านไม่ใช่เหรอคะ?"
10018010-53 = "การปิดกิจการขึ้นอยู่กับการตัดสินใจของเจ้าของร้าน..."
10018010-54 = "ที่พูดมาก็ไม่ได้ผิดอะไรหรอกค่ะ"
10018010-59 = "แต่ว่า...! ถึงคนอื่นๆ จะเห็นชอบ แต่คุโรดาเตะ ฮารุนะคนนี้ไม่เห็นด้วยเด็ดขาดค่ะ!"
10018010-60 = "ถึงพระเจ้าจะยกโทษให้ แต่ฉันจะไม่ยกโทษให้เด็ดขาดค่ะ!"
10018010-62 = "เดี๋ยวสิ ยกโทษให้ฉันเถอะ แล้วก็ช่วยแก้มัดให้พวกเราที"
10018010-67 = "จะว่าไปแล้ว... คงใกล้จะมาถึงแล้วละนะ..."
10018010-72 = "อ๊ะ มาแล้วเหรอคุณครู"
10018010-74 = "ยะโฮ่~ พวกเรามาแล้ว!"
10018010-76 = "สบายดีรึเปล่าคะ?"
10018010-78 = "[ns] \"ว่าไงทุกคน\""
10018010-80 = "[ns] \"ทุกคนใส่เสื้อผ้าน่ารักจัง\""
10018010-85 = "คุณครู! มาช่วยพวกเรางั้นเหรอคะ?!"
10018010-86 = "[s] \"ครูเองก็ตั้งใจว่าจะมาช่วยนะ...\""
10018010-90 = "[ns] \"ครูก็ถูกจับมาเหมือนกัน...\""
10018010-94 = "อ๋อ... อย่างนั้นเหรอคะ ไม่เป็นไรค่ะ ฉันจะไม่ร้องไห้ค่ะ"
10018010-95 = "แต่ฉันขอร้องไห้ได้มั้ยคะรุ่นพี่...?"
10018010-97 = "ตอนนี้ทุกคนที่จะช่วยเราได้ก็มาอยู่พร้อมหน้ากันแล้ว เรามาช่วยกันหาวิธีแก้ปัญหากันเลยดีมั้ยคะ?"
10018010-98 = "\"วิธีช่วยร้านซุซุเมะไม่ให้ปิดกิจการ\""
10018010-99 = "คือหัวข้อในการค้นคว้าของชมรมชิมอาหารในครั้งนี้ค่ะ!"
10018010-103 = "[ns] \"ถ้าเรื่องนั้นละก็บอกกันดีๆ ก็ได้ ครูเต็มใจช่วยอยู่แล้ว...\""
10018010-104 = "มันเป็นเรื่องของความตั้งใจและการเตรียมพร้อมค่ะคุณครู"
10018010-105 = "การที่เราใช้วิธีที่ผิดไปจากวิธีธรรมดา..."
10018010-106 = "ก็เป็นการแสดงความจริงใจของพวกเราให้คุณครูได้เห็นอีกวิธีหนึ่ง"
10018010-108 = "...แต่ถ้าแสดงความจริงใจแบบนี้อีกละก็ คุณครูคงเป็นลมไปแน่ๆ"
10018010-109 = "(พยักหน้า)"
10018010-112 = "[ns1] \"ก่อนอื่น แทนที่จะทึกทักไปเองแบบนี้...\"\n[ns2] \"เราไปคุยกับเจ้าของร้านกันก่อนดีมั้ย?\""
10018010-115 = "ในการแก้ปัญหา... ความคิดเห็นของผู้เกี่ยวข้องเองก็เป็นสิ่งสำคัญ"
10018010-116 = "ฉันใจร้อนเกินไป เลยลืมนึกถึงสิ่งสำคัญไปค่ะ"
10018010-117 = "ขอบคุณสำหรับคำแนะนำนะคะ คุณครู"
10018010-118 = "ดีจริงๆ ที่ลักพาตัวคุณครูมา..."
10018010-119 = "ไม่สิ ดีจริงๆ ที่เชิญคุณครูมาด้วยค่ะ"
10018010-121 = "(...เรื่องนั้นน่ะ ใช้หัวคิดสักหน่อยก็รู้แล้วไม่ใช่รึไง...)"
10018010-127 = "ตายจริง... นั่นมัน?"
10018010-128 = "ฮารุนะ บรรยากาศมันดูแปลกๆ นะ...?"
10018010-135 = "ฟังภาษาคนไม่รู้เรื่องรึไงห้ะ คุณเจ้าของร้าน?"
10018010-136 = "บอกให้รีบๆ ปิดร้านไปไง! ต้องให้พูดซ้ำพูดซากอีกกี่ทีเนี่ย!"
10018010-138 = "ขอโทษค่ะ ขอโทษจริงๆ ค่ะ พอดีใช้เวลาเก็บของในร้านมากกว่าที่คิดน่ะค่ะ"
10018010-139 = "เราเพิ่งส่งลูกค้ากลุ่มสุดท้ายไปค่ะ จะรีบเก็บของให้เร็วที่สุดค่ะ..."
10018010-140 = "ให้ตายสิ พวกเราก็ไม่ได้อยากทำแบบนี้เหมือนกันหรอกนะ..."
10018010-141 = "ใช่ ที่จริงแล้วพวกเราก็เป็นคนดีเหมือนกันนะ"
10018010-142 = "ดีก็ส่วนดี ขอแค่คุณเจ้าของทำตามที่พวกเราบอกก็พอ"
10018010-146 = "รู้เรื่องแล้วใช่มั้ย? เอาแบบวิน-วินกันทั้งคู่ดีกว่านะ ฮื้อ?"
10018010-153 = "ฮุฮุฮุ..."
10018010-154 = "ฮะ... ฮารุนะ...?"
10018010-155 = "มีแขกมาคุยธุระอยู่สินะคะ แต่ดูเหมือนจะเป็นแขกที่ไม่น่าพึงประสงค์สักเท่าไร"
10018010-156 = "ถ้างั้นทำยังไงดีล่ะคะฮารุนะ★"
10018010-157 = "ชมรมชิมอาหารคือชมรมที่แสดงหาอาหารเลิศรส"
10018010-158 = "และถ้าคนที่ทำให้เราได้สัมผัสกับรสชาตินั้นกำลังเผชิญกับเรื่องลำบากอยู่ละก็"
10018010-159 = "พวกเราคงจะอยู่เฉยๆ ไม่ได้หรอกใช่มั้ยคะ"
10018010-160 = "เห็นด้วยสุดๆ! ฉันเห็นด้วย!"
10018010-161 = "ก็นะ คิดแล้วว่าจะต้องเป็นแบบนี้"
10018010-163 = "ฮะ...ฮารุนะ? คิดจะทำอะไรน่ะ...?"
10018010-164 = "รุ่นพี่... ฉันคิดว่าพวกเราถอยก่อนน่าจะดีกว่า..."
10018010-165 = "[s] \"นั่นสิ จูรินี่ไหวพริบดีมากเลยนะเนี่ย\""
10018010-169 = "อ๊ะ ขอบคุณค่ะคุณครู!"
10018010-170 = "อาจเป็นเพราะมีประสบการณ์แบบนี้มาเยอะแล้วก็ได้ค่ะ"
10018010-171 = "ค่ะ คุณครู... ก็นะ เวลาฮารุนะของขึ้นแบบนั้นทีไร พูดอะไรไปก็ไม่เข้าหูหรอกค่ะ..."
10018010-177 = "อะ... อะไรกันเนี่ยเจ้าพวกนี้?!"
10018010-178 = "นี่ ตอนนี้คนเขากำลังคุยธุระกันอยู่ ดูไม่ออกรึไง?"
10018010-185 = "ค่ะ ดูไม่ออกค่ะ"
10018010-186 = "เรื่องของพวกคนร้ายที่ชอบใช้กำลังข่มขู่และขัดขวางเส้นทางแห่งอาหารเลิศรสน่ะ"
10018010-187 = "ฉันไม่สนใจ แล้วก็ไม่อยากใส่ใจด้วยค่ะ"
10018010-195 = "เอาละ ถ้าอย่างนั้น..."
10018010-200 = "ชมรมชิมอาหาร... เริ่มกันเลยมั้ยคะ?"

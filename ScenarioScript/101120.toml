[translation]
101120-1 = "第12話;脫逃（２）"
101120-3 = "這邊！"
101120-5 = "[ns]「彩奈，可以聯絡上其他學生嗎？」"
101120-6 = "有點困難……#n因為關閉通訊網是聖所之塔發出的命令……"
101120-7 = "不過，我超級彩奈不可能輸給聖所之塔！#n我會試試看的……！"
101120-8 = "唔唔……"
101120-9 = "咕努努努……"
101120-10 = "哈啊，哈啊……不行。#n如果是在物理上距離近一點的地方，應該會有辦法才對……"
101120-11 = "以目前的情況……唔唔唔……"
101120-12 = "啊！連接上了！"
101120-13 = "就算只有1秒也沒關係，拜託了……！！拜託……！！"
101120-17 = "……哈啊，被切斷了。"
101120-18 = "如果是距離最近的人，說不定勉強能收到……"
101120-19 = "沒能幫上忙，真是抱歉……"
101120-20 = "[s1]「不，這樣就夠了唷。」\n[s2]「謝謝，你已經幫了大忙唷，彩奈。」"
101120-23 = "是，是嗎……？"
101120-31 = "不不不得了了……！#n這，這裡也有……！！"
101120-32 = "敵，敵人的數量太多了……"
101120-33 = "到此為止了嗎……"
101120-38 = "馬上投降。#n如果不投降將進行掃射！"
101120-42 = "……這是什麼。#n無人機……？"
101120-43 = "無人機啟動中。小隊請注意爆炸。"
101120-45 = "呃，呃啊！？什，什麼……！？"
101120-46 = "哈啊啊啊──！！！"
101120-56 = "這個煙霧彈很痛對吧？#nRABBIT2，抵達現場！"
101120-57 = "RABBIT1，保護好老師和要員。#nRABBIT3，請確認目標敵人的位置。"
101120-59 = "你，你們是什麼人！？"
101120-60 = "RABBIT3，收到！我這就傳送座標。#nRABBIT4，請處理敵方指揮官！"
101120-61 = "所有部隊，聽我命令──"
101120-66 = "Tango down……大，大家還好嗎？"
101120-67 = "[s]「RABBIT小隊！！你們來了啊！謝謝你們！」"
101120-68 = "別誤會了。#n我們才不是因為收到老師的要求才來幫忙的。"
101120-69 = "沒錯沒錯。只是因為剛好收到老師的聯絡，在飯後運動的時候順便過來而已。"
101120-70 = "雖然大家都很著急就是了……"
101120-74 = "RABBIT小隊。已確認老師的支援請求，前來幫忙。"
101120-75 = "嘿～這種時候居然還有援軍，老師真厲害呀♪"
101120-76 = "SRT的各位能和我們一起行動，就沒什麼好怕的了！"
101120-81 = "別以為你們能逃離這裡！"
101120-82 = "連直升機都出動了嗎……況且這個兵力是……？#n老師，到底發生什麼事了？"
101120-83 = "反正，八成又是跟平常一樣被捲進了什麼奇怪的麻煩裡了吧。"
101120-84 = "呵呵……又～闖禍了嗎？#n有股危險的味道呢……咯嘻嘻。"
101120-85 = "……也對。畢竟是[USERNAME]老師，好像意外的合理。"
101120-86 = "嗯，嗯……畢竟是老師嘛……"
101120-87 = "[s]「被你們這麼說，好像有點受傷啊……」"
101120-88 = "──環奈局長。"
101120-89 = "RABBIT小隊……"
101120-90 = "上次承蒙您關照了。#n能再次見面真是太好了。"
101120-91 = "……現在行政的兵力不是因為戒嚴令而無法出動嗎……"
101120-92 = "呃……我們目前露宿在公園……"
101120-93 = "正式的指揮系統也不完善……"
101120-94 = "戒嚴令？還想說怎麼有些網站連不上去，原來是這樣啊。"
101120-95 = "不，不知道也沒辦法吧！#n畢竟沒有人通知我們呀！"
101120-96 = "會聯絡我們也只有老師而已……"
101120-97 = "首先突破這裡，護送老師和局長到安全的地方。#nRABBIT小隊，準備作戰。"
101120-98 = "[ruby=Roger]收到[/ruby]！"
101120-99 = "嗯，嗯……我也準備好了。"
101120-100 = "哈啊，哈啊……火力支援，準備完畢。#n這樣就能……發射更華麗的煙火了！"
101120-101 = "很抱歉，希望生活安全局和女武神的各位，能暫時聽從我們的指示行動。"
101120-102 = "是，我知道了！"
101120-103 = "畢竟之前也受你們照顧了。沒問題唷。"
101120-104 = "那麼，開始交戰。"

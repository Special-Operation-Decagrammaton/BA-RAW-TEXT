[translation]
101120-1 = "Episode 12; Escape 2"
101120-3 = "This way!"
101120-5 = "[ns] \"Arona, can you find some way to contact the other students?\""
101120-6 = "It's difficult... Sanctum Tower shut down the communication networks..."
101120-7 = "But not impossible! I, Super Arona, can outsmart Sanctum Tower! I'll see what I can do!"
101120-8 = "Hmm..."
101120-9 = "Ugh..."
101120-10 = "*pant pant* It's not gonna work. I could do something if it was physically closer...."
101120-11 = "But as it stands... "
101120-12 = "Oh! I connected!"
101120-13 = "Give me one second! Whatever I can get...!"
101120-17 = "... *sigh* I got kicked off again."
101120-18 = "I thought I may have just barely reached someone close by, but..."
101120-19 = "I failed you... I'm sorry, Sensei."
101120-20 = "[s1] \"It's okay. You did well.\"\n[s2] \"Thank you. You were very helpful, Arona.\""
101120-23 = "Huh? R-Really...?"
101120-31 = "Ahhhhhh! Th-They're here...!"
101120-32 = "Th-There are so many of them..."
101120-33 = "This might be the end of the road..."
101120-38 = "Surrender now, or there won't be anything left of you for people to find!"
101120-42 = "Huh? What's that drone...?"
101120-43 = "Drone deployed. Squad, watch out for explosions."
101120-45 = "A-Argh...! Wh-What is this...?"
101120-46 = "Hiyah!!!"
101120-56 = "The smoke bomb might sting your eyes a little! RABBIT 2 is on scene!"
101120-57 = "RABBIT 1, securing Sensei and the others. RABBIT 3, locate all enemy targets."
101120-59 = "Wh-Who are you guys?!"
101120-60 = "RABBIT 3 here! Already done, sending coordinates now! RABBIT 4, blast that enemy commander into space!"
101120-61 = "All troops, now—"
101120-66 = "Tango down... I-Is everyone okay?"
101120-67 = "[s] \"RABBIT Squad! You're here!\""
101120-68 = "Hmph. We're not here because you asked for help or anything."
101120-69 = "What she said. We just happened to see your message and thought we could take a little walk."
101120-70 = "B-But you were all panicky and in a r-rush..."
101120-74 = "Don't listen to them. RABBIT Squad is responding to Sensei's support request."
101120-75 = "Heehee. Sensei can get reinforcements just like that. Impressive."
101120-76 = "With SRT here, there's nothing to fear!"
101120-81 = "You fools! Don't think you can escape from here!"
101120-82 = "The whole cavalry's here...air support as well... Sensei, what in the world is happening?"
101120-83 = "I bet they got wrapped up in some ridiculous situation, as per usual."
101120-84 = "Heehee. Sounds just like Sensei. What've you done this time? Seems super dangerous. Heeheehee."
101120-85 = "I have to agree, seeing how [USERNAME] Sensei is involved..."
101120-86 = "I-I think they're saying this is t-typical for Sensei..."
101120-87 = "[s] \"That kinda hurts to hear...\""
101120-88 = "Director Kanna."
101120-89 = "RABBIT Squad..."
101120-90 = "We owe you from before. I'm glad to see you again."
101120-91 = "I thought the administrative troops couldn't move because of martial law right now..."
101120-92 = "Well... As you know... We live in a park..."
101120-93 = "We d-don't have a f-formal commander..."
101120-94 = "Martial law? So that's why I couldn't access my usual sites."
101120-95 = "H-How were we supposed to know?! No one ever tells us anything!"
101120-96 = "B-Because Sensei is the only one wh-who talks to us... *sniffle*"
101120-97 = "For now, we focus on the mission at hand. RABBIT Squad, we're breaking through PMC forces to escort Sensei and Director Kanna to safety. Understood?"
101120-98 = "Understood, Squad Leader!"
101120-99 = "I-I'm ready!"
101120-100 = "*pant pant* Air fire support preparation all ready-set. Things are gonna go KA-BOOM!"
101120-101 = "My apologies, but I would like to request the cooperation of Valkyrie's Public Safety Bureau in this operation."
101120-102 = "Yes! Ready for orders!"
101120-103 = "I guess we do owe you one from last time."
101120-104 = "Then, mission commence!"

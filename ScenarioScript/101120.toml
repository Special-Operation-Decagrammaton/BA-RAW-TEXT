[translation]
101120-1 = "ตอนที่ 12;หลบหนี 2"
101120-3 = "ทางนี้ค่ะ!"
101120-5 = "[ns] \"อะโรน่า เราติดต่อนักเรียนคนอื่นๆ ตอนนี้เลยได้ไหม?\""
101120-6 = "น่าจะยากค่ะ... ตอนนี้ทางแซงค์ทัมทาวเวอร์ชัตดาวน์เครือข่ายการสื่อสารทั้งหมดเลย..."
101120-7 = "แต่ถ้าเป็นซูเปอร์อะโรน่าจังละก็ คนร้ายในแซงค์ทัมทาวเวอร์ทำอะไรหนูไม่ได้หรอกค่ะ! เอาเป็นว่าหนูจะลองดูนะคะ!!"
101120-8 = "ฮึบบบบ..."
101120-9 = "ฮึบบบบบบ... "
101120-10 = "แฮ่ก... แฮ่ก... ไม่ไหวเลยค่ะ ในทางฟิสิกส์แล้ว ถ้าที่นั่นอยู่ในระยะใกล้ๆ... ก็น่าจะแก้ไขได้อยู่ค่ะ..."
101120-11 = "แต่ในสถานการณ์ตอนนี้มัน... ฮึบบบบบบ... "
101120-12 = "อ๊ะ! เชื่อมต่อได้แล้วค่ะ!"
101120-13 = "ขอแค่... 1 วินาที... ก็ได้... ขอร้องละ...!!"
101120-17 = "แฮ่ก... หลุดไปแล้วค่ะ"
101120-18 = "ถ้าเราติดต่อคนที่อยู่ใกล้จากตรงนี้ที่สุด บางทีสัญญาณอาจจะส่งไปถึงก็ได้ค่ะ... "
101120-19 = "ขอโทษที่หนูช่วยอะไรไม่ได้เลยนะคะคุณครู..."
101120-20 = "[s1] \"ไม่หรอก เท่านี้ก็เพียงพอแล้ว\"\n[s2] \"อะโรน่าช่วยครูได้เยอะแล้วละ ขอบใจนะ\""
101120-23 = "คะ? งะ... งั้นเหรอคะ...?"
101120-31 = "อ๊าาาาา...!! ทะ... ทางนี้ก็ด้วย...!!"
101120-32 = "หะ... แห่กันมาเพียบเลย..."
101120-33 = "จบสิ้นกันแค่นี้สินะ..."
101120-38 = "ถ้ายังไม่ยอมจำนนง่ายๆ ฉันจะยิงให้พรุนตอนนี้เลย!"
101120-42 = "...... หืม? อะไรน่ะ? ทำไมถึงมีโดรน..."
101120-43 = "โดรนกำลังทำงาน ระวังระเบิดครับหมวด"
101120-45 = "อึกกกกกก!!  อะ.. อะไรเนี่ย...?!"
101120-46 = "นี่แน่ะ!!!!"
101120-56 = "เตรียมเจ็บตัวจากม่านควันได้เลย! RABBIT 2 มาถึงที่หมายแล้ว!"
101120-57 = "RABBIT 1 ไปหาคุณครูและคนอื่นๆ RABBIT 3 ช่วยตรวจสอบตำแหน่งเป้าหมายของศัตรูให้ทีค่ะ"
101120-59 = "พะ... พวกเธอคือใครเนี่ย?!"
101120-60 = "RABBIT 3 รับทราบ! จะใช้พอยท์เตอร์ส่งพิกัดให้เดี๋ยวนี้ RABBIT 4 ฝากจัดการผู้บัญชาการฝั่งศัตรู#nก่อนเลย!"
101120-61 = "กองทหารนั่นมัน...!!"
101120-66 = "แทงโก้ดาวน์ เป้าหมายถูกทำลายแล้ว... ทุกคนเป็นยังไงบ้าง?"
101120-67 = "[s] \"กองทหาร RABBIT!! พวกเธอมาช่วยครูนี่เอง!\""
101120-68 = "เฮอะ อย่าเข้าใจผิดสิ พวกฉันไม่ได้รีบแจ้นมาที่นี่เพราะคุณครูขอความช่วยเหลือมาสักหน่อย"
101120-69 = "ใช่ พวกเรานั่งกินข้าวกันอยู่ แล้วอยู่ดีๆ ก็บังเอิญเห็นคุณครูติดต่อมา ก็เลยคิดว่าจะออกมาเดินเล่น#nเพื่อช่วยย่อยอาหารหน่อยดีกว่าก็เท่านั้นเอง"
101120-70 = "แต่ทุกคนดูรีบร้อนกันมากเลยนะ..."
101120-74 = "พอกองทหาร RABBIT ได้รับคำขอความช่วยเหลือจากคุณครู ก็รีบมาที่นี่ทันทีเลยค่ะ"
101120-75 = "ว้าว เรามีกองกำลังเสริมด้วย เยี่ยมไปเลยนะ"
101120-76 = "ถ้า SRT เข้าร่วมด้วย เราก็ไม่มีอะไรต้องกลัวค่ะ! "
101120-81 = "พวกเธอ! อย่าคิดนะว่าจะหนีออกจากที่นี่ไปได้!"
101120-82 = "ถึงขนาดมีเฮลิคอปเตอร์เลยเหรอคะเนี่ย... แถมยังมีกองกำลังนี้อีก... คุณครูคะ นี่มันเรื่องอะไรกันคะ?"
101120-83 = "จะเป็นเรื่องอะไรล่ะ ก็คงจะเข้าไปพัวพันกับปัญหาแปลกๆ เหมือนเคยน่ะสิ"
101120-84 = "ฮุฮุ... ครั้งนี้ไปสร้างเรื่องอะไรไว้เหรอ? ดูท่าทางจะมีอะไรไม่ชอบมาพากลนะ... ฮิฮิฮิ"
101120-85 = "จริงด้วยค่ะ... ก็คุณครู [USERNAME] ชอบเจอแต่เรื่องอยู่เรื่อย"
101120-86 = "อืม... นี่แหละคุณครู..."
101120-87 = "[s] \"พูดแบบนี้ครูแอบเสียใจนะ...\""
101120-88 = "หัวหน้ากรมฯ คันนะ "
101120-89 = "กองทหาร RABBIT..."
101120-90 = "ครั้งที่แล้วพวกฉันเป็นหนี้บุญคุณอย่างมากเลยค่ะ ดีจังเลยนะคะที่ได้เจอกันอีกครั้งแบบนี้"
101120-91 = "ตอนนี้มีกฎอัยการศึก พวกเธอไม่น่าจะออกมาเคลื่อนไหวกันได้นะ..."
101120-92 = "เรื่องนั้นน่ะ... คือว่า... พวกฉันเป็นคนไร้บ้านที่อยู่ในสวนสาธารณะ..."
101120-93 = "และยังไงก็ไม่มีระบบสั่งการอย่างเป็นทางการอยู่แล้ว..."
101120-94 = "กฎอัยการศึก? มีอะไรแบบนี้อยู่งั้นเหรอ? ก็ว่าอยู่ว่าทำไมเข้าบางเว็บไซต์ไม่ได้"
101120-95 = "ระ... เราจะไปรู้ได้ไงล่ะ! ก็มันไม่มีใครคิดจะมาบอกอะไรพวกเราเลยนี่นา!"
101120-96 = "มีแต่คุณครูเท่านั้นแหละที่ยอมติดต่อด้วย... (สะอื้นเบาๆ)"
101120-97 = "ฉันว่าเราฝ่ากองกำลังทหารนั้น คุ้มกันคุณครูและหัวหน้ากรมฯ ไปยังที่ที่ปลอดภัยก่อนเถอะค่ะ กองทหาร RABBIT เตรียมต่อสู้"
101120-98 = "โอเค!"
101120-99 = "อะ... อืม... ฉันเองก็พร้อมแล้ว"
101120-100 = "แฮ่ก... แฮ่ก... กำลังทางอากาศพร้อมแล้ว แบบนี้ละก็... ต้องได้ดอกไม้ไฟที่หรูหราหมาเห่าแน่ๆ!"
101120-101 = "ขอโทษนะคะ แต่ก่อนอื่นต้องขอให้ทุกคนจากวัลคิรี่ทำตามคำสั่งของฉันก่อนค่ะ"
101120-102 = "ค่ะ! รับทราบค่ะ!"
101120-103 = "เอาสิ ครั้งที่แล้วก็ติดหนี้บุญคุณไว้หน่อยด้วย..."
101120-104 = "ถ้างั้นก็เริ่มปะทะเลยค่ะ"

[translation]
11034010-1 = "#Y-01"
11034010-3 = "ดีเลยนะที่เรามีความสามารถพิเศษเฉพาะตัวเพิ่มกันน่ะ!"
11034010-4 = "ถึงจะยังเป็นมือใหม่อยู่... แต่ก็เหมือนว่าเราได้ออกจากวิถีของ 'เด็ก ม.ปลายธรรมดาๆ' เลย ว่ามั้ย?"
11034010-8 = "อืม... ฉันก็กะจะพูดเรื่องเดียวกันเลย"
11034010-9 = "คนที่ไม่คูลนี่ชอบทำตัวคูลๆ อยู่เรื่อยเลยนะ"
11034010-10 = "แบบนี้นี่เองสินะ... ฉันนึกว่าตัวเองคิดแบบนี้คนเดียวซะอีก..."
11034010-12 = "อ๊ะ..."

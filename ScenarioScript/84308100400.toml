[translation]
84308100400-5 = "(เซอากลับมาอธิบายสถานการณ์ของชมรมพัฒนาเกมให้ริโอะฟัง)"
84308100400-8 = "เรื่องก็เป็นอย่างนี้ละค่ะ... ไม่มีอะไรผิดปกติเป็นพิเศษค่ะ"
84308100400-9 = "งั้นก็โล่งอกไปทีนะ เพราะถ้าเทียบกับการที่มีคนเข้าบุกไปด้วยเจตนาไม่ดีหรือมีเหตุร้ายอะไรเกิดขึ้น สถานการณ์แบบนี้ถือว่าดีกว่ามาก"
84308100400-10 = "ว่าแต่..."
84308100400-11 = "เนรุล่ะ เนรุอยู่ที่ไหน...? ไม่ได้ออกไปด้วยกันหรอกเหรอ?"
84308100400-15 = "อ่า... อืม... นั่นสินะคะ..."
84308100400-16 = "...????"
84308100400-17 = "เดี๋ยวก็คงกลับมาแล้วค่ะ"
84308100400-21 = "พอดีเธอพูดไว้ว่า... \"ต้องสั่งสอนอะไรสักหน่อยแล้วละ\" น่ะค่ะ"
84308100400-26 = "อะ... อืม..."

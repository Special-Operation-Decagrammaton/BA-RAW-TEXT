[translation]
84308100400-5 = "（聖亞向莉央說明了遊戲開發部的情況）"
84308100400-8 = "……情況就是這樣。並沒有發生特殊事項。"
84308100400-9 = "那真是太好了。#n總比有人不懷好意接近或發生意外要好得多。"
84308100400-10 = "不過話又說回來……"
84308100400-11 = "……寧瑠他人呢？你們不是一起過去的嗎？"
84308100400-15 = "啊，嗯……這個嘛……"
84308100400-16 = "……？"
84308100400-17 = "沒事，他很快就會到了。#n畢竟他跟我不同……"
84308100400-21 = "說是「需要一點訓誡」。"
84308100400-26 = "這，這樣啊……"

1012505-145 = "3;에리;13;분명, 당시의 분들은 <보이지 않는 것>을 그리는 것이야말로, #n그림의 장점이라고 생각했을 거예요.\n#3;em;[음표]"
1012505-146 = "3;에리;14;그런 작품에 담긴 화가들의 마음을 보면서…… #n저도 보이지 않는 것을 그리고 싶다 생각했어요."

[translation]
1012505-1 = "魔力補給"
1012505-6 = "你好，御者。"
1012505-7 = "哎呀，真是好久沒到學院外面走走了呢。"
1012505-8 = "哇，真開心……"
1012505-9 = "[s]「你的表情看起來不怎麼開心耶……」"
1012505-10 = "不是的。"
1012505-11 = "以我最近的狀態來說，這已經算是非常開心了。"
1012505-12 = "雖然只要一閉上眼睛……眼前就會浮現出我在考場上畫出的那個詭異魔物……"
1012505-16 = "啊啊啊！我又想起來了！#n這種時候就必須用消除記憶的魔法……！"
1012505-23 = "[ns]「好好好，別再拿書敲自己的頭了！」"
1012505-26 = "呼……"
1012505-27 = "看來得用別的魔法來解決這個狀況。"
1012505-28 = "御者，要怎麼做才能讓我枯竭的魔力恢復呢？"
1012505-29 = "[s]「用能填滿空虛靈魂的魔法怎麼樣？」"
1012505-30 = "哦哦，是個光聽就覺得很神奇的魔法呢。"
1012505-31 = "好，那我們馬上去試試看吧。"
1012505-39 = "哦哦，這裡是……？"
1012505-40 = "[s1]「是我平時常來的拉麵店。」\n[s2]「離辦公室不遠，味道也很棒。」"
1012505-43 = "是御者常來的地方啊……"
1012505-44 = "……原來如此。#n光是從鼻尖傳來的魔力殘痕就能感覺得出來……"
1012505-45 = "這裡確實能填滿空虛的靈魂呢。"
1012505-46 = "剛好肚子也餓了，我們趕緊找位置坐下吧。"
1012505-53 = "唔嗯，御者有比較推薦的餐點嗎？"
1012505-54 = "[s]「我個人推薦豚骨拉麵。」"
1012505-55 = "哦哦，是用蘊含魔力的骨頭熬出的濃厚湯底製成的拉麵啊。"
1012505-56 = "確實足以稱之為填滿靈魂的魔法。"
1012505-57 = "那就依照御者的推薦，來一碗豚骨拉麵吧。"
1012505-59 = "（之後和繪梨一起努力填滿空虛的靈魂）"
1012505-69 = "呼啊～確實感覺到魔力在回復呢。"
1012505-70 = "[s3]「填飽肚子之後，接下來去圖書館逛逛吧。」\n[s4]「應該有很多繪梨會喜歡的神秘學書籍哦。」"
1012505-73 = "哦哦，圖書館啊。"
1012505-74 = "與神秘學有關的書籍當然很好，但我更好奇那些被學院列為禁書的書呢。"
1012505-75 = "如果能讀到那些禁書，我的魔法一定可以再次進化吧。妞呵呵。"
1012505-76 = "[s]「狂，狂獵的禁書？能舉個例子嗎？」"
1012505-77 = "比如《實用繩結法》這本書。"
1012505-78 = "假如掌握各種繩結技巧的話，在危急時刻就能多一種擺脫舍監隊追捕的方法了。"
1012505-79 = "[s]「該不會是因為這個理由才成為禁書吧？」"
1012505-80 = "不。我聽說原因還挺奇怪的……"
1012505-81 = "好像是有個行為藝術家，用書裡的繩結法把自己綁起來之後跑到街上閒逛的樣子。"
1012505-82 = "記得是某種「烏龜造型」的繩結？#n究竟長什麼模樣才會被列為禁書呢？"
1012505-83 = "御者你知道嗎？"
1012505-84 = "[s]「完全不知道！！」"
1012505-85 = "沒關係，反正只要看那本書就會知道了。"
1012505-86 = "妞呵呵，真令人期待。"
1012505-88 = "（之後和繪梨一起在圖書館翻閱了各種書籍）"
1012505-97 = "（接著又到各種地方四處逛逛，協助繪梨恢復枯竭的魔力）"
1012505-120 = "呼啊～今天玩得真痛快。"
1012505-121 = "謝謝你，御者。#n我今天真的很開心。"
1012505-122 = "[s]「我也很開心哦。」"
1012505-123 = "真希望能用某個東西紀念一下這一刻呢。"
1012505-124 = "御者，要不要一起拍張照呀？"
1012505-125 = "[s]「好哇！」"
1012505-130 = "妞呵呵，那就由我來拍吧。#n看這邊……"
1012505-131 = "一，二，三～！"
1012505-136 = "我看看……"
1012505-137 = "哦哦，拍得真好。"
1012505-138 = "……"
1012505-139 = "我又再次感覺到，照片還真方便呢。"
1012505-140 = "只要按一下就能把眼前的景色完整保留下來。"
1012505-141 = "也許就是因為這樣吧……？#n照片這個強敵的登場，讓許多畫家都感到絕望。"
1012505-142 = "只需一瞬間就能拍出的照片，評價甚至比花費漫長時間畫出的作品還高。"
1012505-143 = "不過畫家們依然沒有放棄。"
1012505-144 = "而是轉而開始在畫布上，描繪只有畫家才能表現的「心靈風景」與「感覺」。"
1012505-145 = "我想當時的人們，應該是認為描繪「看不見的東西」才是繪畫的優勢吧。"
1012505-146 = "看著那些作品中蘊含的心意……#n我也希望自己能畫出看不見的東西。"
1012505-147 = "[s]「這份心意依然還在吧？」"
1012505-148 = "當然！我喜歡繪畫的心情，就跟喜歡神秘學是一樣的！"
1012505-149 = "等著瞧吧！#n總有一天我會成為超有名的畫家，讓我的作品裝飾在每個人的家裡！"
1012505-150 = "[s5]「我現在就想掛一幅耶。」\n[s6]「可以先預約嗎？」"
1012505-153 = "咦？現在？"
1012505-154 = "雖，雖然現在還不行……不過請拭目以待！#n我一定會送上最棒的作品的！"
1012505-155 = "……嗯，不能再消沉下去了。"
1012505-156 = "謝謝你，御者。#n謝謝你讓我想起了自己開始畫畫的初衷。"
1012505-157 = "我會繼續努力的！為了相信著我的御者！"
1012505-158 = "[s]「嗯！我會一直為你加油的。」"
1012505-159 = "嘿嘿嘿……"
1012505-160 = "真不可思議。"
1012505-161 = "明明在見到御者之前心情還很低落，現在卻感覺充滿了力量。"
1012505-162 = "御者果然掌握了言靈魔法吧。"
1012505-164 = "（之後繼續和表情開朗許多的繪梨聊著夢想的話題）"
1012505-165 = "（並在夜深之前將其送回了學院）"

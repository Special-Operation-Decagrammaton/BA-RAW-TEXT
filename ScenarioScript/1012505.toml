1012505-148 = "3;에리;07;물론이죠! 저는 오컬트만큼이나 그림을 좋아하니까요!\n#3;em;[반짝]"
1012505-149 = "3;에리;14;두고 보라죠! 언젠간 초 유명한 작가가 되어서 제 그림이 집집마다 걸리는 날이 올 테니까!"

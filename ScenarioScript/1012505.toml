[translation]
1012505-1 = "Recharging Mana"
1012505-6 = "Hello, Master."
1012505-7 = "Wow, it's been a while since I've left the academy."
1012505-8 = "Hm. How fun..."
1012505-9 = "[s] \"Are you having fun? You don't seem like it.\""
1012505-10 = "Well, I am."
1012505-11 = "At least, compared to how things have been lately."
1012505-12 = "I can still remember it. That abomination I created on canvas in the classroom..."
1012505-16 = "Aah! It's in my head again! This calls for memory-erasing magic..."
1012505-23 = "[ns] \"H-Hitting yourself in the head with a book won't help!\""
1012505-26 = "Whew..."
1012505-27 = "A different kind of magic, then, perhaps."
1012505-28 = "What do you suggest, Master? How should I recover my mana?"
1012505-29 = "[s] \"I think I know just the spell for a hungry soul.\""
1012505-30 = "Ah, you've piqued my interest."
1012505-31 = "Let's test that spell. Lead on."
1012505-39 = "Hm, what is this place?"
1012505-40 = "[s1] \"One of my favorite ramen places.\"\n[s2] \"It's close to the office, and the food is good.\""
1012505-43 = "One of Master's favorites, hm?"
1012505-44 = "...I see.#nI can sense the traces of mana with the tip of my nose."
1012505-45 = "Yes, this will sate my hungry soul."
1012505-46 = "And my stomach. Let's have a seat."
1012505-53 = "Is there a particular dish you'd recommend, Master?"
1012505-54 = "[s] \"I think you'll like the tonkotsu ramen.\""
1012505-55 = "Hmm. Ramen that extracts thick mana from the essence of bones."
1012505-56 = "Yes, that'll be quite suitable."
1012505-57 = "Tonkotsu ramen it is, then."
1012505-59 = "I sat with Eri until our souls were sated."
1012505-69 = "Phew, I can feel my mana rushing back."
1012505-70 = "[s3] \"Now that we've eaten, let's hit the library.\"\n[s4] \"I know a place with lots of occult books.\""
1012505-73 = "A library, you say."
1012505-74 = "I do have an interest in the occult, of course, but there is one certain book, banned in our academy, that I'd love to get my hands on most of all."
1012505-75 = "If I could only find it, my magic would evolve even further. Nyuhuhu."
1012505-76 = "[s] \"A-A book banned at Wildhunt? What kind of book is it?\""
1012505-77 = "It's called \"Practical Rope Knotting Techniques.\""
1012505-78 = "If I could master such a skill, the Prefectural Council would never catch me again."
1012505-79 = "[s] \"Is that why that book got banned?\""
1012505-80 = "Oh, no. The reason is...far stranger."
1012505-81 = "Apparently, there was a performance artist who tied themselves with knots they'd learned from the book and walked around the streets."
1012505-82 = "Turtle shaped knots? Something like that. That's all I know."
1012505-83 = "You...wouldn't know anything about that, would you, Master?"
1012505-84 = "[s] \"Not at all!!\""
1012505-85 = "Well, I suppose I'll find out myself when I read the book."
1012505-86 = "Nyuhuhu, ah, the anticipation."
1012505-88 = "Eri and I explored the store and checked out various books."
1012505-97 = "To continue recharging her mana, I went all around with her after that."
1012505-120 = "Phew, this has been quite a joy."
1012505-121 = "Thank you, Master. It's been a wonderful day."
1012505-122 = "[s] \"Thank you! I enjoyed it too.\""
1012505-123 = "Perhaps a memento is in order."
1012505-124 = "What would you say to a photo together?"
1012505-125 = "[s] \"Sounds good!\""
1012505-130 = "Nyuhuhu, allow me, then. Look over here..."
1012505-131 = "One, two, three!"
1012505-136 = "Let's see..."
1012505-137 = "Ah, it came out well."
1012505-138 = "..."
1012505-139 = "Photographs certainly are convenient."
1012505-140 = "To capture an entire scene with nothing but the push of a button."
1012505-141 = "You know, when the camera was first invented, many painters fell into despair, or so I've heard."
1012505-142 = "Why spend hours or days painting an image when a photograph can do it in a flash?"
1012505-143 = "But those painters didn't give up. Not ever."
1012505-144 = "They turned inward, painting the \"scenery of the mind,\" the fields of their emotions, things only painters could express, and only on canvas."
1012505-145 = "A photograph can capture what's there, but a painting can capture the invisible."
1012505-146 = "When I read about those artists, and saw their work...I wanted to do the same."
1012505-147 = "[s] \"Do you still feel that way?\""
1012505-148 = "Of course! I love the artistry as much as I love the occult."
1012505-149 = "Mark my words, one day, I'll be a renowned artist, and my paintings will hang on the walls of every home."
1012505-150 = "[s5] \"I want to hang one up right now.\"\n[s6] \"Can I put in an early commission?\""
1012505-153 = "What? Right now?"
1012505-154 = "I-I can't make you one RIGHT now...but if you can wait, I'll be sure to gift you a masterpiece!"
1012505-155 = "...Once I have the time and the inclination to sit still, I mean."
1012505-156 = "Thank you, Master. You helped me remember why I started art in the first place."
1012505-157 = "I'll do my best to live up to your belief in me!"
1012505-158 = "[s] \"Go for it! I'll be rooting for you.\""
1012505-159 = "Heeheehee..."
1012505-160 = "It's fascinating, isn't it?"
1012505-161 = "I was sour and exhausted today until you came along, and now I'm all refreshed."
1012505-162 = "Your words truly are magic, Master."
1012505-164 = "Eri told me more about her dreams, with a smile on her face."
1012505-165 = "Before it got too late, I took her back to the academy."

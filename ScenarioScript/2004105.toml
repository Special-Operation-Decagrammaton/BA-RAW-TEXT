2004105-97 = "3;리오;04;그, 그런 식으로는 생각 못 해 봤어.\n#3;stiff"
2004105-98 = "3;리오;04;무엇보다 예술은 주관적인 것이고, 거기에는 객관이 들어갈 자리가 없는 것일 텐데……."
2004105-99 = "3;리오;05;아니야, 그렇지만 특정하고 정의할 수 없다는 부분에서……. 그리고 그렇기에, 누구도 틀리다고 말할 수 없다는 점에서……!\n#3;em;[!]"

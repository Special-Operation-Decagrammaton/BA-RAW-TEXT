[translation]
2004105-1 = "Designing"
2004105-5 = "Got an order here for a 3D printer and...powder based materials, right?"
2004105-6 = "If you could just sign here..."
2004105-17 = "Hello, Sensei."
2004105-18 = "Feels like...I've gotten somewhat used to this. It feels fresh."
2004105-19 = "[s] \"Looks like you ordered a 3D printer.\""
2004105-20 = "That's right. I'd also like a spacious place with good ventilation."
2004105-21 = "Since 3D printers tend to generate lots of waste products during the process."
2004105-22 = "...Which is why I couldn't do the work from my hideout."
2004105-23 = "[s] \"I'm sure I could find a place if I looked for one...\""
2004105-32 = "[ns] \"How about here?\""
2004105-33 = "Here looks good. There's a nice big window right there..."
2004105-34 = "I'll be borrowing this space, then."
2004105-42 = "All right. If I start this now, then..."
2004105-47 = "Well, let's step outside. You're going to need some fresh air."
2004105-52 = "[ns] \"Are you making things for a particular project?\""
2004105-53 = "Not as such. I just happen to experiment with new industrial designs sometimes."
2004105-54 = "It helps get the kinks out early, and it plays a part in aesthetics too."
2004105-55 = "It's work, but it's...not unenjoyable work."
2004105-56 = "[s] \"So it's a hobby, then?\""
2004105-57 = "Hm? A hobby?"
2004105-58 = "I-Is it?"
2004105-59 = "I never thought of it that way."
2004105-60 = "But...hobbies are inherently irrational."
2004105-61 = "They're purely for recreation. There's no study, or work, or training involved, no profit or utility in them..."
2004105-62 = "Meaning the input-to-output ratio invariably converges at zero."
2004105-63 = "Could I even consider spending my time that way?"
2004105-64 = "[s] \"Eh. Nothing says you can't.\""
2004105-65 = "So...getting a hobby isn't necessarily a bad thing? You'd actually recommend it?"
2004105-66 = "..."
2004105-71 = "Well, there is one other problem with that."
2004105-72 = "The designs I've done... You might already know this..."
2004105-73 = "Other people...don't tend to appreciate them."
2004105-74 = "I strive for rationality and functional beauty, and most people don't seem to understand that."
2004105-75 = "...Maybe I'm just doing it wrong."
2004105-76 = "No, no \"maybe\" about it. I must be doing it wrong."
2004105-77 = "Statistically, the probability of EVERYONE else being wrong about my work is infinitesimal. The fault is definitely mine."
2004105-78 = "[ns] \"Whoa!\""
2004105-80 = "[ns1] \"No, I don't think so at all!\"\n[ns2] \"If a creator puts their heart into it, it's art, no matter what people say!\""
2004105-83 = "...Hm?"
2004105-87 = "Art...?"
2004105-96 = "I'm...an artist?!"
2004105-97 = "I-I never thought of it that way."
2004105-98 = "Art is entirely subjective, of course. There's no room for objectivity there..."
2004105-99 = "There are no specific parameters that define art's quality...and in that sense, no one can truly say it's wrong!"
2004105-100 = "..."
2004105-101 = "I see..."
2004105-102 = "It is art."
2004105-103 = "I've been doing art. ...Which means I CAN do art."
2004105-104 = "I...wasn't wrong at all!"
2004105-105 = "Thank you, Sensei!"
2004105-106 = "[s] \"Huh? Well, sure...\""
2004105-107 = "You always see what I've been missing."
2004105-108 = "I suppose that's why you're \"Sensei.\""
2004105-109 = "Sensei MEANS \"one who's lived ahead,\" after all. One who can lead others, who can explain what others don't understand yet. Of course. That's why...!"
2004105-110 = "[s] \"R-Rio? Are you okay?\""
2004105-111 = "I don't know. I...feel like it's my first time being this happy."
2004105-112 = "I've always felt like I'm in some constant struggle just to keep pushing forward."
2004105-113 = "But..."
2004105-114 = "...if I'm by your side, I could just stay like this...!"
2004105-118 = "I heard the sound of the 3D printing being completed."
2004105-120 = "[ns] \"Is it done? I want to see how it turned out.\""
2004105-121 = "And...!"
2004105-123 = "...Um, Sensei?"
2004105-124 = "Sorry. Don't turn around, please just stay there and listen."
2004105-125 = "...Thank you for what you said."
2004105-126 = "It really made me happy...hearing that."
2004105-133 = "As I watched Rio walk away, I thought more about what art is."

2004105-108 = "3;리오;99;그래……. 그렇구나. 그래서 '선생'인 거겠지.\n#3;stiff"
2004105-109 = "3;리오;08;앞서 살아간 자, 그렇기 때문에 누군가를 이끌 수 있는 자, 그 사람에게 부족한 것을 이야기해 줄 수 있는 자. 그래. 그러니까……!\n#3;hophop"

2004105-52 = "[ns] \"뭔가 목적이 있어서 만드는 물건인 거야?\""
2004105-53 = "3;리오;02;특별히 그런 건 아니야. 그냥 가끔…… 이런 식으로 산업디자인 같은 걸 하곤 해서.\n#3;em;[반응]"
2004105-54 = "3;리오;01;미리 해 둬서 나쁠 건 없고, 산업디자인은 기능미 측면에서도 고려해야 할 요소이기도 하고."
2004105-55 = "3;리오;99;애초에 무언가를 디자인한다는 걸…… 그렇게 싫어하는 편도 아니라서."
2004105-56 = "[s] \"그럼 그게 리오의 취미인 거네?\""
2004105-57 = "3;리오;02;응? 취미?\n#3;em;[?]"
2004105-58 = "3;리오;07;그런…… 가?"
2004105-59 = "3;리오;04;뭔가, 그런 식으로는 생각해 보지 못했어."
2004105-60 = "3;리오;02;하지만 취미란 건…… 비합리적인 것이잖아?"
2004105-61 = "3;리오;01;취미의 1순위는 즐거움에 있지. 이익이나 효용이 발생하는 학문이나 일, 훈련과는 달라."
2004105-62 = "3;리오;07;즉 인풋 대비 아웃풋이, 미묘한 수준을 넘어서…… 0에 수렴한다는 뜻이고.\n#3;em;[한숨]"
2004105-63 = "3;리오;99;……내가 그런 일을 해도, 괜찮은 걸까……?"
2004105-64 = "[s] \"에이. 안 될 거 뭐 있겠어.\""
2004105-65 = "3;리오;02;그런…… 가? 취미를 갖는 것은 나쁜 게 아니라, 오히려 권장할 행동이라고……?"

[translation]
2004105-1 = "ออกแบบ"
2004105-5 = "ครับ นี่คือเครื่องพิมพ์สามมิติ... กับพลาสติกเรซินที่สั่งมาครับ ถูกต้องใช่มั้ยครับ?"
2004105-6 = "ถ้างั้นก็รบกวนประทับตราตรงนี้ด้วยครับ!"
2004105-17 = "สวัสดี ครู"
2004105-18 = "เหมือนว่า... ฉันจะคุ้นชินกับการทำแบบนี้แล้วสิ เป็นความรู้สึกที่แปลกใหม่ดีนะ"
2004105-19 = "[s] \"สั่งเครื่องพิมพ์สามมิติมาเหรอ...?\""
2004105-20 = "ใช่ แล้วฉันก็อยากให้มีพื้นที่ที่ระบายอากาศดีๆ ด้วย"
2004105-21 = "เครื่องพิมพ์สามมิติจะก่อให้เกิดมลพิษจำนวนมากในระหว่างขั้นตอนการทำงานน่ะ"
2004105-22 = "นั่นเป็นเหตุผลว่าทำไมฉันถึงทำงานในที่ซ่อนตัวของฉันในตอนนี้ไม่ได้..."
2004105-23 = "[s] \"ถ้าหาดีๆ ครูว่าน่าจะมีที่แบบนั้นนะ...\""
2004105-32 = "[ns] \"ที่นี่ล่ะเป็นไง?\""
2004105-33 = "ก็ใช้ได้นะ ผนังฝั่งตรงข้ามมีหน้าต่างบานใหญ่ด้วย"
2004105-34 = "ถ้างั้นฉันขอใช้พื้นที่ตรงนี้หน่อยแล้วกัน"
2004105-42 = "เสร็จแล้ว จากนี้ก็แค่เปิดใช้งาน..."
2004105-47 = "เราก็ออกไปกันเถอะ อากาศในนี้คงไม่ดีต่อระบบทางเดินหายใจไประยะหนึ่งน่ะ"
2004105-52 = "[ns] \"อันนี้สร้างขึ้นมาเพื่ออะไรเหรอ?\""
2004105-53 = "ไม่ได้มีวัตถุประสงค์อะไรพิเศษหรอก ฉันแค่... เคยออกแบบทางอุตสาหกรรมอะไรแบบนี้มาก่อนน่ะ"
2004105-54 = "ถ้าทำไว้ล่วงหน้าก็ไม่มีอะไรเสียหาย แล้วการออกแบบในทางอุตสาหกรรมก็เป็นปัจจัยที่ต้องคำนึงถึง#nในแง่ของการใช้งานและความสวยงามด้วย"
2004105-55 = "แล้วฉันก็... ไม่ได้ไม่ชอบการออกแบบตั้งแต่แรกด้วย"
2004105-56 = "[s] \"งั้นนี่ก็เป็นงานอดิเรกของริโอะสินะ?\""
2004105-57 = "หืม? งานอดิเรก?"
2004105-58 = "งั้น... เหรอ?"
2004105-59 = "ไม่รู้สิ ฉันไม่เคยคิดแบบนั้นมาก่อนเลย"
2004105-60 = "แต่ถ้าจะเรียกว่างานอดิเรก... มันก็ไม่สมเหตุสมผลไม่ใช่เหรอ?"
2004105-61 = "งานอดิเรกเป็นงานที่ความสำคัญกับความสนุกสนานเป็นอันดับแรก ต่างจากการเรียน การทำงาน หรือการฝึกอบรมที่สร้างผลกำไรหรือประโยชน์"
2004105-62 = "เมื่อเทียบอินพุตกับเอาต์พุตแล้ว... มันเป็นพฤติกรรมที่ได้ผลเกือบจะเข้าใกล้ศูนย์"
2004105-63 = "แล้วฉันจะทำอะไรแบบนั้น... ได้เหรอ...?"
2004105-64 = "[s] \"เอาน่า ทำไมจะไม่ได้ล่ะ\""
2004105-65 = "งั้น... เหรอ? งานอดิเรกไม่ใช่เรื่องเลวร้าย แต่เป็นเรื่องที่ควรส่งเสริมมากกว่างั้นเหรอ...?"
2004105-66 = "..."
2004105-71 = "แต่มันก็มีปัญหาอยู่อีกอย่างนะ"
2004105-72 = "การออกแบบของฉันน่ะ... อย่างที่ครูก็อาจจะรู้"
2004105-73 = "โดยทั่วไปแล้วถ้าเอาไปให้คนอื่นดู ก็จะได้รับการประเมินที่ไม่ดีเท่าไรหรอก"
2004105-74 = "ที่จริงแล้วฉันมุ่งไปที่การออกแบบที่สมเหตุสมผลและเน้นเรื่องการใช้งานและความสวยงาม แต่ว่าคนอื่นเหมือนจะไม่เข้าใจ..."
2004105-75 = "หรือว่าผิดที่ฉันนะ..."
2004105-76 = "บางทีอาจจะ... ไม่สิ ไม่บางทีหรอก ฉันคือคนผิดจริงๆ แหละ"
2004105-77 = "โลกนี้ประกอบขึ้นด้วยความน่าจะเป็นและสถิติ และผลทางสถิติในเรื่องนี้... ชี้ให้เห็นว่ามันเป็นความผิด#nพลาดของฉันเอง"
2004105-78 = "[ns] \"...!\""
2004105-80 = "[ns1] \"ไม่หรอก ครูว่าเรื่องแบบนี้มันคือศิลปะต่างหาก!\"\n[ns2] \"ถ้ามันมาจากใจของคนทำ ใครจะว่ายังไงก็เป็นศิลปะนะ!\""
2004105-83 = "หืม...?"
2004105-87 = "ศิล... ปะ?"
2004105-96 = "ฉัน... สร้างงานศิลปะเหรอ??!!"
2004105-97 = "ฉะ... ฉันไม่เคยคิดแบบนั้นมาก่อนเลย"
2004105-98 = "ศิลปะเป็นเรื่องของความรู้สึก แล้วมันก็ไม่มีพื้นที่ให้ความเป็นวัตถุวิสัยด้วย..."
2004105-99 = "ไม่สิ แต่มันก็มีส่วนที่กำหนดจำเพาะเจาะจงและให้คำนิยามไม่ได้... และในเมื่อเป็นเช่นนั้น ก็จะว่าไม่ได้ว่าใครผิด...!"
2004105-100 = "...!"
2004105-101 = "เป็นอย่างนี้... นี่เอง..."
2004105-102 = "มันคือศิลปะสินะ"
2004105-103 = "ที่ผ่านมาฉันสร้างงานศิลปะมาตลอด แล้วฉันก็... เป็นคนที่สร้างงานศิลปะได้..."
2004105-104 = "ฉัน... ไม่ได้ผิดเลย...!"
2004105-105 = "ขอบคุณนะครู!"
2004105-106 = "[s] \"หืม? อะ... อะไรนะ...?\""
2004105-107 = "ครูคอยชี้ให้เห็นสิ่งที่ฉันมองข้ามไปเสมอเลย"
2004105-108 = "อืม... อย่างนี้สินะ เพราะงี้ถึงเป็น 'ครู' นี่เอง"
2004105-109 = "ผู้ที่อาบน้ำร้อนมาก่อนก็เลยเป็นผู้นำคนอื่นได้ และคอยบอกว่าคนคนนั้นยังบกพร่องอะไรอยู่บ้าง#nใช่ เพราะอย่างนี้ละ...!"
2004105-110 = "[s] \"ระ... ริโอะ? เป็นอะไรหรือเปล่า?\""
2004105-111 = "ไม่รู้... สิ นี่เป็น... ครั้งแรกเลยที่ฉันรู้สึกมีความสุขขนาดนี้"
2004105-112 = "ที่ผ่านมาฉันเอาแต่คิดว่าต้องทำอะไรให้ได้ หรือไม่ก็ต้องอดทนให้ได้"
2004105-113 = "อย่างนี้สินะ..."
2004105-114 = "ถ้าฉันอยู่ข้างๆ คุณละก็ ต่อให้อยู่เฉยๆ แบบนี้ก็ได้สินะ...!"
2004105-118 = "(ได้ยินเสียงว่าเครื่องพิมพ์สามมิติทำงานเสร็จแล้ว)"
2004105-120 = "[ns] \"เสร็จแล้วเหรอ? อยากรู้จังว่าจะเป็นยังไง\""
2004105-121 = "อื้อ...!"
2004105-123 = "นี่ ครู?"
2004105-124 = "ขอโทษนะ ฉันอยากให้ครูยืนฟังอยู่อย่างนั้นโดยไม่หันมาได้มั้ย?"
2004105-125 = "เมื่อกี้น่ะ... ขอบคุณนะ"
2004105-126 = "ขอบคุณที่พูดแบบนั้นนะ... ฉันฟังแล้วมีความสุขมากเลย"
2004105-133 = "(ขณะที่มองดูริโอะเดินจากไป คุณครูก็คิดกับตัวเองว่าศิลปะคืออะไร)"

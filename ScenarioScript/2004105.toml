[translation]
2004105-1 = "設計"
2004105-5 = "好的，您訂購的是3D列印機……還有粉末原料對吧？"
2004105-6 = "麻煩幫我蓋個章！"
2004105-17 = "你好，老師。"
2004105-18 = "我也……慢慢比較熟悉了呢。感覺很新鮮。"
2004105-19 = "[s]「你訂的東西好像是……3D列印機？」"
2004105-20 = "沒錯。而且最好能有個通風良好的空間。"
2004105-21 = "因為3D列印機，在作業過程中會產生非常多污染物質。"
2004105-22 = "……之所以無法在我的祕密基地作業，也是因為這個緣故。"
2004105-23 = "[s]「找找看的話應該會有才對……」"
2004105-32 = "[ns]「這裡怎麼樣？」"
2004105-33 = "看起來不錯。#n對面牆上的窗戶也很大。"
2004105-34 = "那我就稍微占用一下這個空間了。"
2004105-42 = "好了。接下來只要啟動這個……"
2004105-47 = "我們先出去吧。#n這對呼吸系統不太好。"
2004105-52 = "[ns]「你是為了某個目標才製作東西的嗎？」"
2004105-53 = "倒也沒有為了什麼目的。#n我只是偶爾……會像這樣做一些工業設計而已。"
2004105-54 = "事先做好並沒有壞處，而工業設計在功能美的層面也是需要考量的要素。"
2004105-55 = "我本來就不太討厭……設計東西。"
2004105-56 = "[s]「所以這就是莉央的興趣囉？」"
2004105-57 = "嗯？興趣？"
2004105-58 = "是……嗎？"
2004105-59 = "我從來沒有這麼想過。"
2004105-60 = "但是興趣……是不合理的吧？"
2004105-61 = "畢竟興趣和能夠產生利益或功用的學問、工作和訓練不同，重視的是樂趣。"
2004105-62 = "簡單來說就是輸入與輸出不成比例……甚至趨近於零。"
2004105-63 = "我真的可以做那種事嗎……？"
2004105-64 = "[s]「唉唷，有什麼不可以的？」"
2004105-65 = "是……嗎？#n擁有興趣愛好並不是壞事，反而是獲得推薦的行為……？"
2004105-66 = "……"
2004105-71 = "不過還有另一個問題。"
2004105-72 = "我所做的設計……或許老師你也知道……"
2004105-73 = "在別人眼中的整體評價並不是很好。"
2004105-74 = "我那偏向合理又追求功能美學的設計，大家似乎不太能理解……"
2004105-75 = "……是我錯了嗎？"
2004105-76 = "大概……不，肯定是吧。"
2004105-77 = "世界是由機率和統計組成，而在這個方面的統計結果顯示……確實是我錯了。"
2004105-78 = "[ns]「……！」"
2004105-80 = "[ns1]「不，我並不這麼認為！」\n[ns2]「只要製作者本人傾注真心，不管別人怎麼說都同樣是藝術！」"
2004105-83 = "……咦？"
2004105-87 = "藝……術？"
2004105-96 = "我的設計……是藝術！？"
2004105-97 = "我，我從來沒有這麼想過。"
2004105-98 = "畢竟藝術是很主觀的東西，並沒有客觀意見的容身之處……"
2004105-99 = "不過從難以定義……以及無法評論對錯的觀點來看……"
2004105-100 = "……！"
2004105-101 = "是嗎……"
2004105-102 = "原來……是藝術啊。"
2004105-103 = "我，正在創作藝術。#n而且我……能創作出藝術……"
2004105-104 = "我……並沒有錯啊……！"
2004105-105 = "謝謝你，老師。"
2004105-106 = "[s]「呃，嗯……？」"
2004105-107 = "老師總是能指出我的盲點呢。"
2004105-108 = "沒錯……所以你才是[ruby=先生]「老師」[/ruby]吧。"
2004105-109 = "生於人之先，同時具備帶領他人並指出其不足之處的能力。#n沒錯，所以……！"
2004105-110 = "[s]「莉，莉央？你還好嗎？」"
2004105-111 = "我也不清楚。#n這……是我第一次體會到這麼開心的感覺。"
2004105-112 = "我總是反覆思考著自己必須做些什麼，或者必須堅持下去。"
2004105-113 = "原來，如此……"
2004105-114 = "只要待在你身邊，我就算保持這樣也……！"
2004105-118 = "（聽見了3D列印完成的聲音）"
2004105-120 = "[ns]「都完成了嗎？真想看看成果。」"
2004105-121 = "嗯……！"
2004105-123 = "那個，老師？"
2004105-124 = "不好意思，麻煩你先別轉過來，就這樣聽我說。"
2004105-125 = "……謝謝你。"
2004105-126 = "能夠聽見剛才那番話……我真的很高興。"
2004105-133 = "（一邊看著莉央漸漸遠去的身影，一邊思考著藝術究竟是什麼）"

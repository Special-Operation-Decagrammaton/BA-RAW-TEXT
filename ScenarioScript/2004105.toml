2004105-72 = "3;리오;07;내가 한 디자인들…… 선생도 어쩌면 알고 있겠지만."
2004105-73 = "3;리오;06;전체적으로, 누구에게 보여주면 평이 별로 좋지 않아.\n#3;em;[땀]"
2004105-74 = "3;리오;04;나는 사실 합리적이면서도 기능미를 추구하는 디자인을 지향하는데, 사람들이 별로 이해해 주지 않는 것 같아……."

[translation]
10002050-1 = "第5話;學會游泳（１）"
10002050-2 = "那麼既然都來到海邊了，就來游泳吧！"
10002050-3 = "啊，不過清單上寫的是「學會游泳」呢……"
10002050-5 = "也就是說不單純只是要拍攝在游泳的照片，#n而是要拍到教導不會游泳的人游泳的場面才行嗎？"
10002050-6 = "這，這裡有不會游泳的人嗎？"
10002050-7 = "我的話，倒不能算是不會游泳……"
10002050-8 = "我雖然是第一次來到海邊，但早已在訓練時學會了游泳。"
10002050-9 = "我也多少有點游泳的經驗。"
10002050-14 = "……"
10002050-16 = "……"
10002050-17 = "[s1]「弦生的表情看起來也是略懂。」\n[s2]「看來大家都會游泳。」"
10002050-18 = "也，也就是說……"
10002050-19 = "也，也就是說……"
10002050-20 = "這是再怎麼努力都無法達成的任務嗎……！？"
10002050-21 = "……！"
10002050-22 = "原來如此，是這種陷阱啊。"
10002050-23 = "以前的故事裡也出現過，這種做法並不少見。#n為了讓人知難而退，故意指派無法完成的任務……"
10002050-24 = "中計了……！"
10002050-25 = "我，我覺得應該不是那樣吧……"
10002050-26 = "不過……真讓人傷腦筋呢……"
10002050-28 = "……對了！#n既然只要照片裡看起來像是在學就行的話，「假裝不會」應該也沒關係吧……？"
10002050-29 = "原來如此。#n雖然清單上寫的是「學會游泳」，但任務本身是「拍下那樣的照片」。"
10002050-30 = "以毒攻毒就是這麼回事吧！#n日步美，這個想法不錯。"
10002050-31 = "這樣沒問題吧，監視官？"
10002050-32 = "咦？我嗎？"
10002050-33 = "這個嘛……應該沒什麼問題吧。#n大概……"
10002050-34 = "好。既然監視官也同意了，就馬上開始吧。"
10002050-35 = "話說，要由誰來擔任教導和被教的人呢？"
10002050-36 = "咦？"
10002050-37 = "當然是老師囉……？"
10002050-38 = "[s]「……我？」"
10002050-39 = "啊，對不起，造成老師的困擾了嗎？#n我只是因為「教人」這個詞就自然想到……"
10002050-40 = "[s]「……沒事，不嫌棄的話，我很樂意幫忙。」"
10002050-41 = "謝謝你，老師！"
10002050-43 = "那麼，就在沒那麼深的地方讓老師牽著手……"
10002050-44 = "接著稍微用腳踢水……"
10002050-45 = "應該就沒問題了吧？"
10002050-46 = "那麼接著來決定由誰擔任……"
10002050-50 = "……咦？#n大家都到哪裡去了……？"
10002050-56 = "啊～突然想起來我好像不會游泳，快溺水了～#n請老師救救我～"
10002050-57 = "發生緊急狀況，請求支援。#n重複，發生緊急狀況，請求支援。"
10002050-58 = "咯啊！啊噗，啊噗！咯啊咕啵啵啵啵！#n咯嘿，咳嘿！！唔！？呀噗，咯啵啵……！！？"
10002050-59 = "啊……咦？"
10002050-60 = "[s3]「大家都演得很像呢。」\n[s4]「……弦生，你該不會是真的溺水了吧？」"
10002050-61 = "大，大家剛才不是都說不會──"
10002050-62 = "大，大家剛才不是都說不會──"
10002050-64 = "（噠噠噠噠噠噠噠噠！！）"
10002050-65 = "呀啊！？"
10002050-70 = "你們看！那些傢伙不知為何溺水了！"
10002050-71 = "這下正好！是個好機會！"
10002050-72 = "來報剛才的一箭之仇吧！"
10002050-73 = "喂！把大家都叫來！"
10002050-82 = "呼，呼……？#n啊……？"
10002050-84 = "……嗯？"
10002050-89 = "……？"
10002050-90 = "……咦？"
10002050-92 = "這麼說來……這附近的水深不就只到膝蓋而已嗎……？"

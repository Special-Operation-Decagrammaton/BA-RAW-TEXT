10002050-2 = "3;히후미 수영복ND;00;자, 다음은 수영이에요! 바다에 왔으니 당연히 수영을 해봐야겠죠.\n#3;em;[반짝]\n#3;a"
10002050-3 = "3;히후미 수영복ND;01;으음. 그런데 그냥 수영하는 사진을 찍는 것도 좋겠지만……"

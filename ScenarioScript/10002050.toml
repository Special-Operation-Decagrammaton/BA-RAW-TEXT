[translation]
10002050-1 = "Episode 5;Swimming Lessons Part 1"
10002050-2 = "The next mission is swimming! What better to do at the beach?"
10002050-3 = "I know we'll have to take a picture..."
10002050-5 = "...but the list says \"Learn how to swim.\" Does that mean one of us doesn't know how to?"
10002050-6 = "So, uh, does that apply to any of you?"
10002050-7 = "I know it's not me at the very least..."
10002050-8 = "This may be my first time at the beach, but naturally I've done tons of combat training in the water before. I can swim just fine. "
10002050-9 = "I've done some swimming before. So that just leaves..."
10002050-14 = "..."
10002050-16 = "..."
10002050-17 = "[s1] \"I think Tsurugi is saying she can too.\"\n[s2] \"Well, that's everyone. Tsurugi can swim.\""

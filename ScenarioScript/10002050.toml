10002050-19 = "But that would mean..."
10002050-20 = "This list was impossible to complete from the beginning?!"
10002050-21 = "...!"
10002050-22 = "I knew it was a trap."
10002050-23 = "It's the oldest trick in the book. Set patsies up for failure and pull the rug out from under them when things inevitably go awry."
10002050-24 = "What an underhanded tactic!"
10002050-25 = "I don't think they'd do that..."
10002050-26 = "But either way, this does present a problem."
10002050-28 = "If all Hasumi needs is a picture, then why don't we pretend that we didn't know how to swim before?"
10002050-29 = "A loophole, then. Although the objective is to learn how to swim, the only requirement is that a picture be taken."
10002050-30 = "Fight fire with fire. Well done, Hifumi. Let's get started."

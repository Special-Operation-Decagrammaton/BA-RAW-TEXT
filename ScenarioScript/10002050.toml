[translation]
10002050-1 = "ตอนที่ 5;เรียนว่ายน้ำ 1"
10002050-2 = "เอาล่ะค่ะ ต่อไปก็คือการว่ายน้ำค่ะ! พวกเรามาทะเลกันแล้วก็ต้องว่ายน้ำกันด้วยสิคะ"
10002050-3 = "อืม แค่รูปถ่ายตอนที่ว่ายน้ำเฉยๆ ก็คงจะดีนะคะ..."
10002050-5 = "แต่ว่าในนี้เขียนเอาไว้ว่า \"เรียนว่ายน้ำ\" น่ะค่ะ ที่บอกว่า \"เรียน\" นี่หมายถึงให้สอนคนที่ว่ายน้ำ#nไม่เป็นรึเปล่านะ..."
10002050-6 = "คะ...คือว่ามีใครที่ว่ายน้ำไม่เป็นรึเปล่าคะ?"
10002050-7 = "ฉันคนหนึ่งล่ะที่ว่ายน้ำเป็นแล้ว..."
10002050-8 = "ฉันแค่ไม่เคยมาทะเลมาก่อนเท่านั้น แต่ถ้าเป็นการว่ายน้ำเพื่อต่อสู้ล่ะสบายอยู่แล้ว "
10002050-9 = "ส่วนฉันเอง... ก็ไม่ใช่ว่าไม่เคยมาว่ายน้ำที่ทะเลหรอกนะคะ..."
10002050-14 = "..."
10002050-16 = "..."
10002050-17 = "[s1] \"ดูจากสีหน้าของซึรุกิแล้วต้องว่ายน้ำเป็นแหงเลย\"\n[s2] \"ดูเหมือนจะว่ายน้ำกันเป็นทุกคนเลยนะ\""
10002050-18 = "ถะ... ถ้างั้น..."
10002050-19 = "ถะ... ถ้างั้น..."
10002050-20 = "ถ้างั้นนี่ก็เป็นภารกิจที่ทำให้สำเร็จไม่ได้ตั้งแต่แรกแล้วน่ะสิคะ...!? เป็นไปได้ยังไงกัน...!"
10002050-21 = "...!"
10002050-22 = "อย่างนี้นี่เอง คิดแล้วเชียวว่าจะต้องวางกับดักแบบนี้เอาไว้"
10002050-23 = "เรื่องแบบนี้เกิดขึ้นบ่อยจะตายไป เพื่อกำจัดของที่ไม่ต้องการแล้ว คงจะจงใจมอบหมายภารกิจ#nที่เป็นไปไม่ได้มาให้พวกเรา เพื่อทำให้ภารกิจครั้งนี้ล้มเหลวน่ะสิ"
10002050-24 = "โหดร้ายจริงๆ...!"
10002050-25 = "ปะ...เปล่านะคะ ฉะ...ฉันคิดว่าคงไม่ใช่แบบนั้นหรอกค่ะ"
10002050-26 = "อืม... แบบนี้พวกเราก็แย่เลยนะคะ"
10002050-28 = "ใช่แล้ว...! ยังไงก็ใช้แค่รูปถ่ายอยู่แล้ว... เพราะงั้นแกล้งทำเป็นว่ายน้ำก็ได้ใช่ไหมล่ะคะ?"
10002050-29 = "อืม...นั่นสิ ในรายการเขียนเอาไว้ว่า \"ถ่ายรูปตอนเรียนว่ายน้ำ\" แค่นั้น#nไม่ได้เขียนว่าให้ \"เรียนว่ายน้ำ\" สักหน่อยนี่นะ"
10002050-30 = "หนามยอกเอาหนามบ่งสินะ คิดแผนได้ดีเลยนี่นาฮิฟุมิ มาลงมือกันเลยเถอะ"
10002050-31 = "ที่นี่ก็ได้ใช่ไหม? พลสังเกตการณ์?"
10002050-32 = "คะ? หมายถึงฉันเหรอคะ?"
10002050-33 = "เอ่อ... คงไม่เป็นไรหรอกค่ะ คิดว่านะ... "
10002050-34 = "ดีล่ะ ถ้างั้นก็ถือว่าพลสังเกตการณ์อนุญาตแล้ว มาเริ่มกันเลยไหม"
10002050-35 = "เอาล่ะ แล้วใครจะเป็นคนที่ต้องแสดงว่าว่ายน้ำไม่เป็นล่ะ? ว่าแต่ว่าใครจะเป็นคนสอนล่ะ?"
10002050-36 = "คะ?"
10002050-37 = "ระ...เรื่องนั้นแน่นอนว่าต้องเป็นคุณครูสิคะ ที่นี่น่ะ...?"
10002050-38 = "[s] \"...ครูเหรอ?\""
10002050-39 = "อ่า ขอโทษด้วยค่ะ คุณครูคงลำบากใจใช่ไหมคะ? เพราะคำว่า \"คนสอน\" ฉันก็เลยพูดออกไปโดยที่..."
10002050-40 = "[s] \"...ไม่เป็นไร ถ้าพวกเธอไม่ว่าอะไร ครูจะสอนให้เอง\""
10002050-41 = "ขอบคุณค่ะคุณครู!"
10002050-43 = "ค่ะ ถ้าลงไปที่บริเวณน้ำลึกระดับเอว แล้วคุณครู..."
10002050-44 = "ก็จับคนที่จะแกล้งเรียนว่ายน้ำไว้ แล้วก็แกล้งทำท่าเป็นว่ายน้ำก็พอค่ะ"
10002050-45 = "ฮิฮิ ง่ายๆ ใช่ไหมล่ะคะ?"
10002050-46 = "เอาล่ะค่ะ ถ้างั้นเราก็มาเลือกคนที่จะแกล้งว่ายน้ำไม่เป็นกัน..."
10002050-50 = "...? เอ๋? ทุกคนหายไปไหนกันแล้ว?"
10002050-56 = "อ่า~ ฉันว่ายน้ำไม่เป็น... ตอนนี้เหมือนจะจมน้ำแล้วค่ะ~ ช่วยด้วยค่ะ~ คุณครู~"
10002050-57 = "สถานการณ์ร้ายแรงเร่งด่วน ขอกำลังเสริมด่วน ขอย้ำ สถานการณ์ร้ายแรงเร่งด่วน ขอกำลังเสริมด่วน"
10002050-58 = "แค่กๆ บุ๋งๆๆ! บุ๋งๆๆ! อึ่กกกก! แค่กๆๆ! อึ่กก!!!"
10002050-59 = "อะ... เอ๋?"
10002050-60 = "[s3] \"ทุกคนพยายามแสดงกันเต็มที่เลย\"\n[s4] \"รู้สึกเหมือนหนึ่งในนั้นกำลังจะจมน้ำจริงๆ เลย\""
10002050-61 = "เอ่อ... ทำไมทุกคนถึง..."
10002050-62 = "เอ่อ... ทำไมทุกคนถึง..."
10002050-64 = "ปังๆๆๆๆๆ!"
10002050-65 = "อ๊ายย?!"
10002050-70 = "ดูนั่นสิ ดูยัยเปี๊ยกพวกนั้นสิ! ถึงจะไม่รู้ว่าทำไมก็เถอะ แต่ดูเหมือนกำลังดิ้นทุรนทุรายอยู่ในน้ำเลยนะ!"
10002050-71 = "เหมาะเหม็งสุดๆ! ถึงไม่ค่อยเข้าใจก็เถอะ แต่นี่ล่ะโอกาสของพวกเรา!"
10002050-72 = "ยัยพวกนั้น คราวนี้พวกเราเอาคืนแน่!"
10002050-73 = "นี่! ไปพาทุกคนมาเร็วเข้า!"
10002050-82 = "...ฮึ...? ฮึ...?"
10002050-84 = "หืม...?"
10002050-89 = "...?"
10002050-90 = "...เอ๋?"
10002050-92 = "แต่มาคิดๆ ดูแล้ว... น้ำมันสูงแค่เข่าเองไม่ใช่เหรอ...?"

10002050-23 = "5;아즈사 수영복ND;07;종종 있는 일이야. 쓰고 난 장기말을 버리기 위해, 일부러 성립 불가능한 임무를 주고선, 임무 실패 따위를 운운하겠지.\n#5;em;…"

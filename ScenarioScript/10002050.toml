10002050-5 = "3;히후미 수영복ND;02;여기엔 '수영 배우기'라고만 적혀 있네요. '배우기'니까 모르는 사람을 가르치는 거려나……\n#3;em;…"
10002050-6 = "3;히후미 수영복ND;04;호, 혹시 수영할 줄 모르시는 분 계신가요?"

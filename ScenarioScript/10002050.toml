10002050-33 = "Well, I think it should be fine...probably. "
10002050-34 = "You heard the warden. We have permission, so let's get started."
10002050-35 = "Which of us should play the role of student and the role of teacher?"
10002050-36 = "Huh?"
10002050-37 = "Well, I guess the teacher would naturally be...you, Sensei."
10002050-38 = "[s] \"Me?\""
10002050-39 = "Do you not want to? I thought it would only be fitting if you were the one teaching us. We need you, Sensei."
10002050-40 = "[s] \"Say no more. I'm in.\""
10002050-41 = "You're the best!"

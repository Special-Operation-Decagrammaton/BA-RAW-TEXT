[translation]
41185-2 = "กำจัดหน่วยจู่โจมฝ่ายตรงข้าม! แทงโก้ดาวน์ 3!"
41185-4 = "รับทราบ! ระหว่างยิงขู่ ให้ RABBIT 2 รุกไปที่วัตถุกำบังถัดไปค่ะ!"
41185-5 = "เข้าใจแล้ว!"
41185-6 = "สมาชิกที่เหลือให้สู้อยู่ในตำแหน่งของตัวเอง 5 วินาทีค่ะ!"
41185-7 = "3..... 2..... 1....."
41185-12 = "ซากิ ตอนนี้แหละ! ยิงได้!"
41185-13 = "ระเบิดแสงใส่ด้านหน้า!"
41185-19 = "มิยุ! มีสไนเปอร์ศัตรูอยู่ที่หน้าต่าง ตำแหน่ง 5 นาฬิกาค่ะ!"
41185-20 = "สอยให้แล้วค่ะ!"
41185-21 = "แต่ตอนนี้กระสุนฉันเหลือนัดเดียวเอง... ต้องรีโหลดกระสุน!"
41185-22 = "ฉันอนุญาตค่ะ ซากิ ระหว่างนี้ช่วยยิงคุ้มกันด้วยค่ะ"
41185-23 = "วางใจฉันได้เลย!"
41185-34 = "พวกนั้นคือใครน่ะ? มีกองกำลังวิ่งจู่โจมมาอย่างดุเดือดเหมือนฟันเฟืองขนาดยักษ์เลย!"
41185-35 = "เราเหนือกว่าทั้งอาวุธและจำนวนนักเรียน... แต่ทำไมเราถึงถอยร่นตลอดเลยล่ะ?"
41185-36 = "แถมที่นี่คืออาคารส่วนกลางของโรงเรียนเราอีกต่างหาก... แต่ทำไมฝั่งนั้นได้เปรียบทางภูมิศาสตร์ทุก#nอย่างเลย!"
41185-37 = "แบบนี้มีหวังได้โดนไล่ไปถึงประตูตรงกลางแน่..."
41185-38 = "มะ... ไม่ต้องห่วงหรอก! กำลังเสริมจากสำนักความมั่นคงกำลังเข้ามาทางประตูฝั่งตะวันตกแล้ว"
41185-39 = "ถ้าเรามีจำนวนมากขึ้น เราก็จะจัดการพวกนั้นได้ในรวดเดียว!"
41185-45 = "ตรวจพบเสียงฝีเท้าจำนวนมากจากประตูฝั่งตะวันตก..."
41185-49 = "โมเอะ เราควบคุมตัวเลขของอุปกรณ์ตรวจจับอุณหภูมิในอาคารที่เชื่อมกับเครื่องทำความร้อนของ#nอาคารส่วนกลางได้ไหมคะ?"
41185-50 = "ถ้าเป็นการเข้าถึงระบบความปลอดภัยก็อาจจะยาก แต่ถ้าแค่เรื่องแบบนี้ละก็ไม่มีปัญหา!"
41185-51 = "ช่วยปรับตัวเลขอุณหภูมิในอาคารให้โปรแกรมควบคุมอาคารสับสนทีค่ะ"
41185-52 = "เอากี่องศาดีล่ะ?"
41185-53 = "900 องศาเซลเซียสไปเลย!"
41185-54 = "โอเค!"
41185-57 = "หืม? น้ำอะไรเนี่ย?"
41185-58 = "สงสัยสปริงเกอร์จะเสียขึ้นมาน่ะ!"
41185-59 = "หมายความว่า..."
41185-63 = "อ๊ากกก! กำแพงกันไฟปิดลงมาแล้ว!"
41185-68 = "เฮ้อ... ดันมาติดแหงกในอาคารโรงเรียนตัวเองซะแล้ว"
41185-69 = "แบบนี้กำลังเสริมคนอื่นก็เข้ามาไม่ได้น่ะสิ"
41185-70 = "ไม่เป็นไรหรอก เราเปิดกำแพงกันไฟเองได้..."
41185-71 = "เปิดกำแพงให้กำลังเสริมเข้ามาเร็ว!"
41185-75 = "เอ๋...? นี่มันอะไรกัน? เจ้าพวกนั้นทิ้งเอาไว้เหรอ?"
41185-76 = "เหมือนดินระเบิด C4 เลย แต่บนดินระเบิดมีแบตเตอรี่ลิเธียมที่เหมือนรีบดัดแปลงให้เป็นวัตถุระเบิดด้วย"
41185-77 = "เดี๋ยวนะ ถ้าลิเธียมโดนน้ำ..."
41185-81 = "ซวยแล้วไง..."
41185-91 = "ฮ้าวว~ ง่วงจัง..."
41185-92 = "เกิดเรื่องวุ่นวายอะไรกลางดึกเนี่ย?"
41185-93 = "ใครจะไปคิดว่าจะมีโจรบุกเข้ามาในอาคารส่วนกลางของโรงเรียนตำรวจอย่างไม่เกรงกลัวเลย โลกนี้น่ากลัวจัง..."
41185-94 = "ว่าแต่ต้องปลุกนักเรียนจากสำนักรักษาความปลอดภัยด้วยเหรอเนี่ย? แค่การจับโจร นักเรียนจากสำนัก#nความมั่นคงก็น่าจะจัดการได้นี่นา"
41185-95 = "งั้นเราแค่แกล้งทำเป็นเดินลาดตระเวนแถวนี้แล้วค่อยกลับไปดีกว่า..."
41185-99 = "หืม...? นี่มันอะไร..?"
41185-106 = "ใครมาทำไว้ก็ไม่รู้ แต่ที่รู้ๆ มันคือกับดักที่แย่มากๆ..."
41185-107 = "การวางกับดักแบบนี้ในอาคารส่วนกลางของโรงเรียนตำรวจที่เต็มไปด้วยนักเรียนที่ชอบกินโดนัท... ถือว่าแย่มาก"
41185-108 = "แต่คงไม่มีใครตกหลุมพรางให้กับโดนัทสภาพแบบนั้นหรอก ถ้าไม่ใช่คนโง่จริงๆ..."
41185-110 = "อ๊ะ นั่นมันโดนัทมาร์ชแมลโลว์ลิมิเต็ดเอดิชั่นจาก <มาสเตอร์โดนัท> นี่นา"
41185-111 = "งั้นเหรอ? แบบนั้นใครจะไปอดใจไหว!"
41185-115 = "จะทานให้อร่อยเลยค่า~"
41185-120 = "เย้ย~ โดนหลอกซะแล้ว~"
41185-127 = "นึกไม่ถึงเลยว่าจะมีใครมาติดกับจริงๆ"
41185-128 = "จริงๆ ฉันก็กังวลอยู่เหมือนกัน... แต่มิยาโกะจังบอกเราไว้ว่าถ้ามีคำสั่งที่ไม่เข้าท่าก็ขอให้ทำตาม..."
41185-129 = "แต่ก็สำเร็จจริงๆ ด้วย ดีแล้วละที่เราเชื่อมิยาโกะจัง"
41185-131 = "แหะๆๆ... สำหรับฉันแล้วกับดักเมื่อกี๊ก็เสี่ยงอยู่เหมือนกันค่ะ..."
41185-132 = "แต่ที่เราฝ่ากองกำลังจำนวนมากและมาถึงที่นี่ได้เป็นเพราะสมาชิกทุกคนร่วมมือกันอย่างดีค่ะ"
41185-133 = "ถึงคนอื่นจะมาสั่งการแทนฉัน ผลที่ออกมาก็คงเป็นแบบนี้แหละค่ะ..."
41185-134 = "เอาอีกแล้วนะ..."
41185-135 = "คะ? ฉันพูดอะไรผิดไปเหรอคะ...?"
41185-136 = "มิยาโกะ นี่คือผลงานของเธอนะ เป็นของเธอเลย ไม่ใช่ของสมาชิกกองทหาร RABBIT คนไหน!"
41185-137 = "เพราะนอกจากเธอแล้วก็ไม่มีใครในกองทหาร RABBIT... ไม่สิ ไม่มีใครในคิโวทอสที่หาทางออกที่#nเหมาะสมที่สุดและใช้คนได้ถูกกับงานที่สุดในสถานการณ์แบบนั้น"
41185-139 = "ใช่ พวกเราแค่ทำตามคำสั่งของเธอเท่านั้น"
41185-140 = "พวกเราเชื่อใจมิยาโกะจังมากกว่าที่มิยาโกะจังคิดนะ..."
41185-141 = "คือ... ที่ฉันเคยพูดก่อนหน้านี้ว่าไม่ยอมรับเธอในตำแหน่งหัวหน้าน่ะ..."
41185-142 = "ขอโทษนะ ฉันไม่ดีเอง"
41185-147 = "ขอบคุณที่พูดแบบนี้นะคะ"
41185-148 = "แต่จะบอกว่าความสำเร็จของปฏิบัติการนี้คือผลงานของฉันคนเดียวไม่ได้หรอกค่ะ"
41185-149 = "เพราะหน่วยรบพิเศษทุกคนช่วยกันในปฏิบัติการนี้ยังไงล่ะคะ"
41185-151 = "เป็นหัวหน้าที่พูดไม่รู้เรื่องเอาซะเลยนะ..."
41185-152 = "นั่นสิ"
41185-154 = "เราคุยกันนานไปแล้วค่ะ"
41185-155 = "พวกนักเรียนวัลคิรี่อาจจะกำลังไล่ตามพวกเรามาอยู่ก็ได้... รีบไปเถอะค่ะ!"
41185-161 = "หยุดนะ! หยุดอยู่ตรงนั้น! พวกคนร้าย!"
41185-162 = "ก็ว่าใครมาบุกรุกสถาบันฝึกตำรวจวัลคิรี่..."
41185-163 = "เป็นพวกคุณเองสินะคะ!"
41185-168 = "คุณต้องเป็น..."
41185-169 = "ใช่ค่ะ! ฉันคือคิริโนะ คนเก่งจากสำนักรักษาความปลอดภัยที่เคยปราบคุณได้ด้วยฝีมือการยิงปืนอัน#nยอดเยี่ยมไงคะ!"
41185-170 = "ฉันจะไม่ยกโทษให้เด็กเกเรที่คุกคามกฎหมายและทำให้สังคมเสียระเบียบอย่างพวกคุณค่ะ!"
41185-175 = "มีนักเรียนแปลกๆ ที่เหมือนตำรวจบ้าบิ่นมาขวางทางเราแฮะ..."
41185-176 = "ทำไงดีล่ะมิยาโกะจัง?"
41185-178 = "(แต่คุณครูเคยบอกไว้ว่าฝีมือการยิงปืนของนักเรียนคนนี้มัน...)"
41185-179 = "ทำเมินไปเลยค่ะ... พวกเราจะไปที่จุดนัดพบกันต่อค่ะ"
41185-185 = "ดะ... เดี๋ยวก่อน ไม่ได้ยินเสียงฉันเหรอคะ?"
41185-186 = "ถะ... ถ้าไม่ทำตามคำสั่ง ฉันยะ... ยิงจริงนะคะ!"
41185-187 = "อะไรกัน...!"
41185-196 = "ยิงไม่ถูกแม้แต่นัดเดียวเลยแฮะ..."
41185-197 = "อะไรกัน... คราวที่แล้วเราปราบได้อย่างราบคาบเลยนี่นา..."
41185-198 = "น่าโมโหจริงๆ ที่อาชญากรหนีไปได้ต่อหน้าต่อตาเลยค่ะ..."
41185-199 = "ว่าแต่ฟุบุกิ... ทำไมถึงไปนอนให้กล่องคลุมหัวอยู่ตรงนั้นล่ะคะ?"
41185-200 = "นั่นสิ... ตั้งแต่ถือโดนัทไว้ในมือภาพก็ตัดไปเลย..."
41185-206 = "คิริโนะก็กินโดนัทด้วยไหมล่ะ?"
41185-208 = "ตอนต่อไป;เวลาของผู้ใหญ่"

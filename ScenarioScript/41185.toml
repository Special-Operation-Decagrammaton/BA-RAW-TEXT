[translation]
41185-2 = "Enemy assault soldiers defeated. Tango 3 is down!"
41185-4 = "Copy! RABBIT 2, move forward to the next point! I'm covering you!"
41185-5 = "Understood!"
41185-6 = "All other members, maintain your current position for five seconds."
41185-7 = "Three... Two... One..."
41185-12 = "Saki, now! Discharge Foxtrot!"
41185-13 = "Flash grenade up front!"
41185-19 = "Miyu! Enemy sniper at five o'clock!"
41185-20 = "Got 'em!"
41185-21 = "But I only have one shot left in my chamber! I need to reload!"
41185-22 = "Authorized. Saki, cover her!"
41185-23 = "Leave it to me!"
41185-34 = "Who the hell are these guys? They're slicing through us like a giant, organized chainsaw!"
41185-35 = "They're outnumbered and outgunned... But they've managed to push us back so far!"
41185-36 = "Isn't this OUR school? They're using the environment to their advantage!"
41185-37 = "We'll have to retreat to the central entrance at this rate..."
41185-38 = "Stand your ground! Reinforcements from the Security Bureau should be arriving any minute!"
41185-39 = "Once they arrive, we'll just bulldoze them over! At the end of the day, there's only three of them."
41185-45 = "Reinforcements detected at the west entrance."
41185-49 = "Moe, can you access the school's heating system? I need you to hack the indoor temperature sensor."
41185-50 = "Systems like that have virtually no security. It's a snap."
41185-51 = "Raise the indoor temperature readings. We're going to trick their automatic building management system."
41185-52 = "Heehee. What I like to hear. How hot?"
41185-53 = "900 degrees Celcius!"
41185-54 = "It's nice and toasty now! Or at least the building thinks it is."
41185-57 = "I-Is that water?"
41185-58 = "The sprinklers are malfunctioning!"
41185-59 = "Which means..."
41185-63 = "Augh! The firewalls are coming down!"
41185-68 = "Dammit. We're trapped inside the building."
41185-69 = "Our reinforcements won't be able to get to us anymore."
41185-70 = "Don't worry. We can operate the firewalls manually from the control room."
41185-71 = "We can just raise the firewalls and let in the reinforcements!"
41185-75 = "Huh? What's this? Did the intruders forget this?"
41185-76 = "It looks like a C4 explosive. But it has a modded lithium battery on top like an IED bomb."
41185-77 = "Wait. But if lithium gets wet..."
41185-81 = "...We're toast."
41185-91 = "*yawn* I'm sleepy..."
41185-92 = "What's all this commotion in the middle of the night?"
41185-93 = "What kind of world do we live in? A petty thief invading a police school of all places."
41185-94 = "And why'd they wake up anyone and everyone? The Security Bureau can deal with some thief."
41185-95 = "They've got the situation under control. I'll just do a quick patrol on my way back."
41185-99 = "Hm...?"
41185-106 = "This is the worst trap I've ever seen in my life."
41185-107 = "I know we all have a reputation for loving donuts, but a blatant trap like this in our main building is just ridiculous."
41185-108 = "What kind of stupid moron would fall for this obvious trap..."
41185-110 = "Oh, yeah. That's the limited-edition strawberry donut from Master Donuts. With marshmallows."
41185-111 = "With marshmallows? In that case..."
41185-115 = "Thanks for the treat!"
41185-120 = "Y-You got me!"
41185-127 = "Did that actually just work? Pinch me, please."
41185-128 = "I-I doubted it too... But Miyako did say to follow her orders blindly."
41185-129 = "It worked out in the end."
41185-131 = "Hah... I was nervous too. It was a bit of a gamble."
41185-132 = "But we only got through the massive enemy force and to this point thanks to all of your exceptional talents."
41185-133 = "It would've been the same result with anyone leading."
41185-134 = "There you go again."
41185-135 = "Pardon? Did I say something wrong?"
41185-136 = "Miyako, you stupid-head! Everything is thanks to you! No one else here led us to this point. It was YOU!"
41185-137 = "There isn't anyone else in...in all of Kivotos who could've done what you just did! You assessed the situation, everyone's individual skills, and deployed us all accordingly. That was you."
41185-139 = "We were just your little pawns and you played the game perfectly."
41185-140 = "W-We don't say it but...we've always had faith in you as our leader."
41185-141 = "Even that stuff I said about not recognizing you as a leader..."
41185-142 = "I didn't mean it. I'm sorry."
41185-147 = "Thank you, everyone."
41185-148 = "Regardless, I don't agree that this was all me."
41185-149 = "A special forces operation can only be carried out by all members of the squad!"
41185-151 = "What a stubborn squad leader."
41185-152 = "It's part of her charm."
41185-154 = "That's enough chitchat."
41185-155 = "We're not in the clear yet. The Valkyrie students will catch up to us soon. Let's move!"
41185-161 = "Hold it right there, villains!"
41185-162 = "I heard there were intruders at the school..."
41185-163 = "And it turns out to be you guys!"
41185-168 = "Aren't you..."
41185-169 = "I'm hard to forget, huh? It's me, Kirino, ace of the Public Safety Bureau! I defeated you once with my Strike of Justice, and I'll do it again!"
41185-170 = "I'll show no mercy to criminals threatening the public order and peace!"
41185-175 = "Who's this hot-blooded weirdo blocking us?"
41185-176 = "Y-Your orders, Miyako."
41185-178 = "(According to Sensei's intel, this student's shooting skills are definitely...)"
41185-179 = "Ignore her. Keep moving to the rendezvous point."
41185-185 = "Th-They left? Hey! Get back here!"
41185-186 = "I'll really, actually shoot! I'm gonna shoot if you don't come back!"
41185-187 = "Argh!"
41185-196 = "That shot went to the moon..."
41185-197 = "Didn't I subdue them perfectly last time?"
41185-198 = "I failed my duty. The criminals slipped right out of my grasp."
41185-199 = "On another note, how come you were lying on the ground with a box on your head?"
41185-200 = "Hmm. I don't remember. The only thing I know is I have a limited-edition donut in my  hand."
41185-206 = "You want a bite, Kirino?"
41185-208 = "Next Episode; Time to Grow Up"

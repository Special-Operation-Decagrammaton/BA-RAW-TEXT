[translation]
41185-2 = "[ruby=Tango]T3，[/ruby]倒地！"
41185-4 = "確認，RABBIT2前進至下一個掩體！"
41185-5 = "了解！"
41185-6 = "其餘隊員，留在原地5秒！"
41185-7 = "3……2……1……"
41185-12 = "咲希，就是現在！使用[ruby=Fox trot]狐步[/ruby]！"
41185-13 = "了解！投擲閃光彈！"
41185-19 = "美優，5點鐘方向有狙擊手！"
41185-20 = "啊，了解……！"
41185-21 = "抱歉，在那之前要先[ruby=Reload]換彈匣[/ruby]……！"
41185-22 = "了解。咲希，掩護射擊！"
41185-23 = "交給我！"
41185-34 = "那些傢伙是什麼人！？"
41185-35 = "可惡，這個數量竟然沒辦法壓制……是什麼狀況啊！？"
41185-36 = "在主場還被壓制，太莫名其妙了……！"
41185-37 = "這樣下去會被壓到入口的！"
41185-38 = "沒問題，警備局的增援應該就快來了！"
41185-39 = "到達之後，就以波狀攻擊推回去！"
41185-45 = "……從西側確認到多數腳步聲。"
41185-49 = "萌，可以駭入女武神的室溫感應器嗎？"
41185-50 = "保全整體或許沒辦法，但那種程度的話沒問題！"
41185-51 = "請操作數值，誘發故障。"
41185-52 = "要調到幾度？"
41185-53 = "攝氏900度。"
41185-54 = "OK！"
41185-57 = "什，水……！？"
41185-58 = "灑水器故障了！？"
41185-59 = "也就是說……"
41185-63 = "糟了，防火門……！"
41185-68 = "竟然被關在自己的學校裡……"
41185-69 = "這下也沒辦法和警備局會合了呀。"
41185-70 = "啊，但是這可以手動打開吧？"
41185-71 = "好，那就立刻……"
41185-75 = "……這是什麼？那些傢伙忘記的？"
41185-76 = "C4吧？感覺有個像鋰電池的東西黏在上面。"
41185-77 = "……等等，鋰？所以碰到水的話……"
41185-81 = "……啊。"
41185-91 = "呼啊，好睏……"
41185-92 = "真是的竟然在大半夜引發騷動……"
41185-93 = "入侵警察學園本館，竟然有這麼大膽的傢伙……"
41185-94 = "不過為什麼連我們也……警備局想點辦法就好了啊……"
41185-95 = "裝樣子巡邏一下就趕快回去吧……"
41185-99 = "……那是什麼？"
41185-106 = "……咦，當我笨蛋？"
41185-107 = "話說回來，真是惡劣的陷阱……"
41185-108 = "除非蠢到某個程度，否則會上這種當的傢伙──"
41185-110 = "那是「Master Donut」的限定甜甜圈。而且還加了棉花糖。"
41185-111 = "……真假？"
41185-115 = "我開動──"
41185-120 = "也是呢～！？"
41185-127 = "……沒想到真的會上當。"
41185-128 = "我原本也很疑惑，但畢竟是都子醬的命令……"
41185-129 = "……不過，成功了呢。"
41185-131 = "嘛，對我來說也是個賭注……"
41185-132 = "有辦法成功也是多虧了大家。"
41185-133 = "雖然就算是我以外的人來指揮，我想結果也會一樣……"
41185-134 = "就說不要搞錯了啦。"
41185-135 = "那個……不好意思……？"
41185-136 = "才不是，這明顯是都子拿出的結果。不是別人，別搞錯了！"
41185-137 = "計算出最佳解的是你，這沒有錯吧？"
41185-139 = "就是說啊，是聽從你指示的結果。"
41185-140 = "正是因為我們相信都子醬。"
41185-141 = "嘛，至今為止老是抱怨……我很抱歉。"
41185-142 = "不過至少你現在是隊長，這點可以保證。"
41185-147 = "……是這樣嗎。"
41185-148 = "不過，這果然不是我個人的功績。"
41185-149 = "而是大家一起行動的成果。"
41185-151 = "真是聽不進人話……"
41185-152 = "嘛，一如往常吧。"
41185-154 = "話說得太多了呢……"
41185-155 = "趕快走吧！"
41185-161 = "請停下！"
41185-162 = "難道說入侵者……"
41185-163 = "指的是你們嗎！"
41185-168 = "我記得你是……"
41185-169 = "前些日子承蒙關照了。#n本官是生活安全局的王牌，桐乃！"
41185-170 = "在大半夜違法入侵校舍，本官是不會原諒的唷！"
41185-175 = "……來了個熱血的呢。"
41185-176 = "……都子，怎麼辦？"
41185-178 = "（雖然之前被擊中了……但我記得根據情報，這個人的射擊能力……）"
41185-179 = "……無視。繼續前進。"
41185-185 = "咦，咦？等，是怎麼回事啊！？"
41185-186 = "真，真的會開槍唷！？我必須開槍唷！？"
41185-187 = "欸，嘿……！"
41185-196 = "全部打偏啦……"
41185-197 = "嗚嗚……明明之前有帥氣的命中耶……"
41185-198 = "竟然眼睜睜看著，來到眼前的罪犯跑掉……"
41185-199 = "……話說吹雪，你怎麼蓋著紙箱倒在那裡呢？"
41185-200 = "嘛，應該說是覺得麻煩嗎……反正我沒什麼印象了。"
41185-206 = "總之桐乃，要吃這個嗎？"
41185-208 = "下一話;大人的時間"

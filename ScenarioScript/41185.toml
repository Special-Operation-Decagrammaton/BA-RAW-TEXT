[translation]
41185-2 = "[ruby=Tango]T3[/ruby]、ダウン！"
41185-4 = "確認しました、RABBIT2は次の遮蔽物まで前進を！"
41185-5 = "了解！"
41185-6 = "それ以外の隊員は、5秒間現在地で！"
41185-7 = "3……2……1……"
41185-12 = "サキ、今です！フォックストロット投下！"
41185-13 = "了解！閃光弾、いくぞっ！"
41185-19 = "ミユ、5時の方向にスナイパーです！"
41185-20 = "あ、了解……！"
41185-21 = "ごめん、その前にリロードする……！"
41185-22 = "了解です。サキ、援護射撃を！"
41185-23 = "任せろ！"
41185-34 = "あいつら何者！？"
41185-35 = "くそっ、この数で圧倒できないって……どういう状況なわけ！？"
41185-36 = "こっちのホームで押されてるとか、意味が分からない……！"
41185-37 = "このままじゃエントランスまで押される！"
41185-38 = "大丈夫、もうすぐ警備局の増援が来るはず！"
41185-39 = "到着し次第、波状攻撃で押し出すよ！"
41185-45 = "……西側から多数の足音を確認。"
41185-49 = "モエ、ヴァルキューレの室温感知器はハッキングできますか？"
41185-50 = "セキュリティ全体ならともかく、それくらいなら問題無し！"
41185-51 = "数値を操作してください、誤作動を誘発させます。"
41185-52 = "何度にする？"
41185-53 = "摂氏900度で。"
41185-54 = "OK！"
41185-57 = "なっ、水……！？"
41185-58 = "スプリンクラーが故障！？"
41185-59 = "ってことは……"
41185-63 = "まずい、防火扉が……！"
41185-68 = "自分たちの学校に閉じ込められるとか……。"
41185-69 = "これじゃ警備局も合流できないじゃん。"
41185-70 = "あ、でもこれは手動で開けられるんじゃ？"
41185-71 = "よし、じゃあさっさと……"
41185-75 = "……何これ？あいつらの忘れ物？"
41185-76 = "C4じゃない？何かリチウムバッテリーみたいのが付いてるけど。"
41185-77 = "……待って、リチウム？ってことは水に触れたら……"
41185-81 = "……あ。"
41185-91 = "ふぁ、ねっむ……。"
41185-92 = "全くこんな夜中に騒ぎとか……。"
41185-93 = "警察学校の本館に侵入するとか、大胆なやつもいたもんだ……。"
41185-94 = "でもどうして私たちまで……警備局の方で何とかしてくれれば良いのに……。"
41185-95 = "てきとうにパトロールっぽい動きでもして、さっさと帰ろっと……。"
41185-99 = "……何あれ？"
41185-106 = "……え、馬鹿にされてる？"
41185-107 = "にしても、何て悪質な罠……。"
41185-108 = "相当なバカじゃない限り、こんなのに引っ掛かるやつは――"
41185-110 = "それ、「マスタードーナッツ」の限定ドーナッツ。しかもマシュマロ入り。"
41185-111 = "……マジで？"
41185-115 = "いっただっきま――"
41185-120 = "だよね～！？"
41185-127 = "……まさか本当に行けるとはな。"
41185-128 = "私もどうかと思ったけど、ミヤコちゃんの命令だったし……。"
41185-129 = "……でも、成功だね。"
41185-131 = "まあ、私としても賭けでしたが……。"
41185-132 = "どうにかなっているのも、みんなのおかげです。"
41185-133 = "恐らく私以外の誰かが指揮を執っても、結果は同じだったと思いますが……。"
41185-134 = "だから誤魔化すなっての。"
41185-135 = "えっ、と……すみません……？"
41185-136 = "そうじゃない、これは明らかにミヤコが出した結果だ。他の誰かとかじゃない、誤魔化すな！"
41185-137 = "最適解を出したのはお前だ、それは間違いないだろ？"
41185-139 = "そうだよ、あんたの言う通りに動いた結果なんだから。"
41185-140 = "ミヤコちゃんのことを、信じたからこそだよ。"
41185-141 = "まあ、今まで色々言ったのはその……悪かったよ。"
41185-142 = "でも少なくとも今のお前は隊長だ、それは保証する。"
41185-147 = "……そうでしたか。"
41185-148 = "ですが、やはり私だけの功績ではありません。"
41185-149 = "みんなで動いてるからこそ、ですから。"
41185-151 = "ほんっと話の通じない……。"
41185-152 = "ま、いつも通りでしょ。"
41185-154 = "話が長くなってしまいましたね……"
41185-155 = "先を急ぎましょう！"
41185-161 = "止まってください！"
41185-162 = "まさかとは思いましたが……侵入者とは、"
41185-163 = "あなたたちのことでしたか！"
41185-168 = "あなたは、確か……"
41185-169 = "先日はお世話になりました。生活安全局のエース、キリノです！"
41185-170 = "こんな夜中に校舎への不法侵入など、本官は許しませんよ！"
41185-175 = "……熱血っぽいのが来ちゃったな。"
41185-176 = "……ミヤコちゃん、どうする？"
41185-178 = "（先日は撃たれましたが……たしか情報だと、この方の射撃は……）"
41185-179 = "……無視します。引き続き前進。"
41185-185 = "え、えっ？ちょっ、どういうことですか！？"
41185-186 = "ほ、本当に撃ちますよ！？撃たないといけないんですけど！？"
41185-187 = "え、えぇぃっ……！"
41185-196 = "全弾命中せず、かぁ……。"
41185-197 = "うぅ……この間はカッコよく当てられたのに……。"
41185-198 = "目の前まで来た相手を、みすみす逃してしまうだなんて……。"
41185-199 = "……ところでフブキは、どうしてそこで段ボールを被ったまま倒れてたんです？"
41185-200 = "まあ、めんどくさくてって言うかなんて言うか……あんまり記憶に無い。"
41185-206 = "とりあえずキリノ、これ食べる？"
41185-208 = "次回;大人の時間"

[translation]
70004010-1 = "無主的禮物（１）"
70004010-5 = "啊，老師，我正好剛到夏萊大樓。"
70004010-6 = "……嗯，因為今天鬧事的人特別多。#n我跑得有點口渴，所以打算買點喝的上去。"
70004010-7 = "需要幫老師買嗎？"
70004010-11 = "……呵呵，就知道老師會這麼說。"
70004010-12 = "知道了，我馬上上去。#n今天的值日生工作，我很期待哦。"
70004010-16 = "請問是兩瓶能量飲料和一罐黑咖啡，對嗎？一共是420元。"
70004010-17 = "嗯，刷卡可以嗎？"
70004010-21 = "……謝謝你。#n啊，不用袋子沒關係，我很快就要喝了。"
70004010-26 = "（真可疑……）"
70004010-30 = "啊，老師。#n你今年的聖誕節蛋糕訂好了嗎？"
70004010-31 = "……嗯？不需要蛋糕？#n原來老師是炸雞派的嗎？"
70004010-32 = "因為今年聖誕節也很忙，晚餐應該會隨便吃……？#n聽起來怎麼有點心酸。"
70004010-37 = "老師，我剛才用MomoTalk傳了一個連結給你。#n是間專門做外送的切片蛋糕專賣店。我之前吃過，覺得還挺不錯的。"
70004010-38 = "難得的聖誕節，就算再忙也能吃個香甜的甜點吧？"
70004010-39 = "請問是一個達克瓦茲、兩個布丁、一個巧克力年輪蛋糕，對嗎？"
70004010-40 = "啊，抱歉等我一下。#n不好意思，我想要加點一杯牛奶。"
70004010-41 = "一共是780元。請問需要袋子嗎？"
70004010-42 = "要，謝謝～"
70004010-47 = "（不管怎麼想都……）"
70004010-50 = "老～師～！#n那張發票是怎麼回事？"
70004010-51 = "跟我裝傻也沒用！#n昨天你交給研討會的發票清單裡面，有一張是買機器人玩具的發票！"
70004010-52 = "上個月交的業務支出報告裡也夾帶了遊戲收據──"
70004010-56 = "嗯？是為自己準備的聖誕禮物？"
70004010-57 = "就算是那樣好了，為什麼業務報告裡會包含你個人的花費呢？"
70004010-58 = "……這樣不行。#n我現在就上去確認記帳本，你等著！"
70004010-59 = "那個……請問是9mm手槍子彈30發和一個快速填彈器，對嗎？"
70004010-60 = "啊，抱歉。我在收銀台前說話太大聲了。"
70004010-61 = "嗯，麻煩你了。#n價格一共是1810元對吧？"
70004010-62 = "沒錯，請問需要袋子──"
70004010-68 = "……走掉了。"
70004010-72 = "（果然很可疑……！）"
70004010-75 = "今天也有10個學生跑去夏萊──"
70004010-76 = "不，要是把沒來便利商店的也算進去，應該有20個人吧？"
70004010-77 = "如果是來幫老師做事的值日生也就算了，明明沒事卻特意跑到夏萊……實在很可疑。"
70004010-78 = "雖然有聽說夏萊的老師會幫學生解決困難，#n見到陷入危機的市民也會出手相助，是個很熱心的大人……"
70004010-79 = "但我也聽說過老師會在泳池裡裸泳，或者舔學生的腳之類的恐怖傳聞……"
70004010-80 = "明明有這種奇怪的傳聞，為什麼大家還會特地來找老師呢？"
70004010-81 = "……或許夏萊的老師在用奇怪的方法誘惑學生。"
70004010-82 = "也有傳聞說夏萊有些可疑的物品，裡面說不定就有能夠操控別人的催眠工具──"
70004010-83 = "[s]「你說什麼催眠工具？」"
70004010-84 = "老，老師！？你，你什麼時候來的？"
70004010-85 = "歡，歡迎光臨天使24！"
70004010-86 = "[s1]「嗨，空。」\n[s2]「那麼專心在想什麼呢？」"
70004010-87 = "啊，沒有啦！只是在看最近社群網站流行的傳聞……"
70004010-88 = "啊，沒有啦！只是在看最近社群網站流行的傳聞……"
70004010-89 = "[s3]「社群網站確實有很多有趣的傳聞。」\n[s4]「不過偶爾也會有一些很荒謬的內容，你可不能全都信以為真哦。」"
70004010-90 = "嗯！我會注意的。"
70004010-91 = "嗯！我會注意的。"
70004010-92 = "[ns]「話說回來，你最近看起來好像很忙耶？」"
70004010-93 = "是啊……這週的客人比平常還多，所以有點手忙腳亂的。"
70004010-94 = "……畢竟是年末又是聖誕節，因此蛋糕或炸雞塊之類的點心賣得特別好。"
70004010-95 = "[s]「這樣啊，一年又快結束了呢……」"
70004010-99 = "老師要買的是……一盒薄荷口香糖和一個檸檬軟糖，對嗎？"
70004010-100 = "這個檸檬軟糖正在促銷，只要購買就送一罐維他命飲料哦。#n我幫你裝在一起。"
70004010-101 = "[s]「那個就送給空吧。」"
70004010-102 = "咦？要送給我嗎……？"
70004010-103 = "[s5]「嗯，畢竟空今天也很辛苦。」\n[s6]「身為同一棟大樓的居民，互相幫助也是應該的。」"
70004010-104 = "啊，嗯……謝，謝謝。"
70004010-105 = "啊，嗯……謝，謝謝。"
70004010-106 = "（[USERNAME]老師果然是個奇怪的大人……）"
70004010-107 = "那個，老師。#n其實我有件事想問你──"
70004010-112 = "不，不好意思，請問妖怪MAX咖啡口味還有庫存嗎？"
70004010-113 = "咦？妖怪MAX咖啡口味是嗎……？"
70004010-114 = "應該還有庫存才對……請稍等，我馬上去倉庫確認一下──"
70004010-119 = "[ns]「你先去忙吧。接待客人比較重要。」"
70004010-120 = "是……！那，那我就先離開了！"
70004010-125 = "（然而在那之後，依舊不斷有客人湧入天使24……）"
70004010-127 = "呼……總算能鬆口氣了。"
70004010-128 = "真是辛苦的一天。#n客人多到沒時間打掃，這好像還是第一次呢……"
70004010-129 = "……結果也沒問到學生們為什麼來找老師。"
70004010-130 = "那個問題就等下次再思考，先來打掃吧……"
70004010-138 = "總是傳播幸福的～♪#n開心～開心～天使24～♪"
70004010-145 = "咦，這是……"
70004010-146 = "……禮物？"
70004010-147 = "是來夏萊的學生裡，有人忘記把要送給老師的禮物帶走了嗎？"
70004010-148 = "得在門口貼個失物招領的公告──"
70004010-152 = "……不對，那樣可能會引發大騷動的。"
70004010-153 = "奇普托斯的大多數學生都對老師有好感……#n要是有人想率先向老師表達心意的事情被大家知道……"
70004010-154 = "甚至禮物的主人還是學園高層的話……一不小心可能會發展成學園間的抗爭！"
70004010-155 = "該，該怎麼辦才好？#n又不能裝作不知道……可是東西掉在監視器的死角，很難確認到底是誰掉的……"
70004010-159 = "果然只能直接問問看了。"
70004010-160 = "今天客人的長相我大概都記得……#n分別詢問他們有沒有弄丟東西，避免被其他人發現吧。"
70004010-162 = "為了守護奇普托斯的和平，我一定要找到這個禮物的主人！"

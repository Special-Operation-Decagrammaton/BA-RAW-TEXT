[translation]
70004010-1 = "主なきプレゼント（１）"
70004010-5 = "……先生？今シャーレについたところ。"
70004010-6 = "うん、今日は特に問題を起こす子が多くて。#nコンビニで飲み物を買ったらそっちへ行くから。"
70004010-7 = "あ……先生も、何かいる？"
70004010-11 = "……ふふ、そう言うと思った。"
70004010-12 = "なるべく早く向かうから。今日の当番、楽しみにしてる。"
70004010-16 = "エナジードリンク2点と、ブラックコーヒー1点。合計420円になります！"
70004010-17 = "支払いはカードでお願い。"
70004010-21 = "……袋は大丈夫よ、ありがとう。"
70004010-26 = "（……怪しい）"
70004010-30 = "……そういえば、先生。クリスマスケーキ、もう注文した？"
70004010-31 = "え、ケーキ食べないの？うっそ……先生ってチキンだけで済ませる派？"
70004010-32 = "あー、クリスマスも仕事のパターンか。それはなんというか……#nお疲れ様です。"
70004010-37 = "一応、いまモモトークでリンク送ったんだけど……#nデリバリー専門のショートケーキのお店で、結構オススメ。"
70004010-38 = "せっかくのクリスマスなんだから。#n美味しいスイーツ食べとかないと損だよ。"
70004010-39 = "ダックワーズが1点、プリンが2点、#nチョコレートバウムクーヘンが1点……"
70004010-40 = "あっ、すみません。これも一緒で。"
70004010-41 = "牛乳を1点追加ですね。でしたら合計780円になります！#n袋はご利用ですか？"
70004010-42 = "はい、お願いします。"
70004010-47 = "（どう考えても……）"
70004010-50 = "せ～ん～せ～い～？なんですか、あの領収書は！"
70004010-51 = "とぼけないでください！昨日セミナーに提出された領収書の中に、#nロボットのおもちゃを購入した履歴が混じっていましたよ！？"
70004010-52 = "先月はゲームの購入履歴を混ぜていましたよね……？"
70004010-56 = "はい？自分用のクリスマスプレゼント……？"
70004010-57 = "どう考えても個人的な出費じゃないですか！#n会計報告書に入れていいものではありません！"
70004010-58 = "……はぁ、もういいです。#n今から私がそっちへ行って、帳簿をきっちり確認しますから！"
70004010-59 = "え、ええと……9mm銃弾が30点、#nスピードローダーが1点でお間違いないでしょうか？"
70004010-60 = "ええ、問題ないわ。ごめんなさい、会計中に大声を出して。"
70004010-61 = "合計1810円よね。はい、ぴったりあるわ。"
70004010-62 = "あ、ありがとうございます。袋は――"
70004010-68 = "……行っちゃった。"
70004010-72 = "（やっぱり、怪しすぎる……！）"
70004010-75 = "今日、ここに来た生徒は全部で10人……"
70004010-76 = "コンビニに寄らなかった生徒まで数えると、#n20人くらいはシャーレに来てるはず。"
70004010-77 = "用事がある生徒ならともかく、#n何もないのにわざわざシャーレに来るなんて、絶対におかしい。"
70004010-78 = "シャーレの先生は困っている生徒を助けて、#n市民を危険から守る優しい大人って言われてるけど……"
70004010-79 = "全学校のプールで裸で泳いでたとか、生徒の足をなめたとか、#n怪しい噂も聞くのに……"
70004010-80 = "どうしてみんな、先生に会いたがるのかな？"
70004010-81 = "まさか……いかがわしい手で誘惑してるとか……？"
70004010-82 = "そういえばシャーレには、人を操る道具があるって噂も聞いたような――"
70004010-83 = "[s] \"なんの話？\""
70004010-84 = "ひゃああっ！？せせせせ、先生っ！？"
70004010-85 = "い、いらっしゃいませ、「エンジェル24」です！#n……い、いつから来ていたんですか？"
70004010-86 = "[s1] \"こんにちは、ソラ。さっき来たところだよ。\"\n[s2] \"何か考えごと？\""
70004010-87 = "い、いえその、SNSで流行ってる投稿を見ていただけです……"
70004010-88 = "い、いえその、SNSで流行ってる投稿を見ていただけです……"
70004010-89 = "[s3] \"SNSの投稿って、面白いよね。\"\n[s4] \"けど、あまり鵜呑みにしちゃダメだよ。\""
70004010-90 = "は、はい！気をつけます……！"
70004010-91 = "は、はい！気をつけます……！"
70004010-92 = "[ns] \"ところで……最近、調子はどう？\""
70004010-93 = "そうですね……ちょっとバタバタしてます。"
70004010-94 = "もうすぐクリスマスですから。#nケーキやチキンを買いに来るお客さんが多くて。"
70004010-95 = "[s] \"もうそんな時期か……あ、これお会計お願いします。\""
70004010-99 = "お預かりします。ミントガムが1点、レモンゼリーが1点ですね。"
70004010-100 = "こちらのレモンゼリーはキャンペーンの対象商品でして、#n1点ごとにビタミンドリンクを1本、サービスしています。"
70004010-101 = "[s] \"それはソラにあげるよ。\""
70004010-102 = "えっ、私に……？"
70004010-103 = "[s5] \"ソラはいつも頑張ってるから。\"\n[s6] \"同じビルで働く者同士、助け合わないとね。\""
70004010-104 = "……ありがとうございます。"
70004010-105 = "……ありがとうございます。"
70004010-106 = "（……[USERNAME]先生は、怪しい大人だけど……）"
70004010-107 = "あの、先生。少し聞きたいことが――"
70004010-112 = "すみません。妖怪MAXのコーヒー味、売り切れですか？"
70004010-113 = "は、はいっ？妖怪MAXのコーヒー味……？"
70004010-114 = "ち、ちょっと在庫を確認してみますね。でも……"
70004010-119 = "[ns] \"お客さん優先で大丈夫だよ。\""
70004010-120 = "あ、ありがとうございます！では、失礼します……！"
70004010-125 = "（……しかし、その後も客はひっきりなしにやってきて……）"
70004010-127 = "はぁ……やっと落ち着いた……"
70004010-128 = "途中で店内の掃除もできなかったなぁ。#nこんなにお客さんが続いたのは初めてかも……"
70004010-129 = "……生徒のみんなが先生を訪ねる理由も、聞きそびれちゃったし。"
70004010-130 = "とりあえず、今は掃除しよっと。"
70004010-138 = "まいにち～幸せとどける～♪#nはっぴーはっぴーエンジェル24～♪"
70004010-145 = "あれ？これは……"
70004010-146 = "――プレゼント？"
70004010-147 = "シャーレに来た生徒の落とし物かな？"
70004010-148 = "とりあえず、お店の前にお知らせを――"
70004010-152 = "……いや、ちょっと待って。#nもしこれが、先生宛のプレゼントだったら……？"
70004010-153 = "生徒のほとんどは、先生のことが好きなはず。#nこの状況で、もし誰かが抜け駆けして告白しようとしてるって#n知れ渡ったら、大騒ぎになるんじゃ……"
70004010-154 = "しかも、落とし主が学園の偉い人だった場合……#n学園同士の抗争になったりして……！？"
70004010-155 = "ど、どうしよう……！？捨てる訳にはいかないけど、#n防犯カメラの死角に落ちてたから、落とし主を特定するのも難しいし……"
70004010-159 = "……直接、聞いてみるしかないよね。"
70004010-160 = "今日来たお客さんの顔は覚えてる。#nだからプレゼントのことがバレないように、一人ずつ聞いてみよう。"
70004010-162 = "落とし主を見つけて、キヴォトスの平和を守るために――！"

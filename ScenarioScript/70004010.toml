70004010-76 = "3;소라;05;아니, 편의점에 들르지 않은 학생까지 더하면 20명은 되려나?"
70004010-77 = "3;소라;17;선생님의 일을 도우러 온 당번 학생은 어쩔 수 없다 하더라도, 특별한 일정도 없는데 일부러 샬레를 찾아오다니…… 수상해."
70004010-78 = "3;소라;24;들리는 소문에 의하면 샬레의 선생님은 학생들의 고충을 해결해 주고, 위기에 빠진 시민들을 내버려두지 않는 친절한 어른이라고 하지만."
70004010-79 = "3;소라;10;다른 한편으로는 수영장에서 알몸으로 헤엄을 쳤다던가, 학생의 발을 핥았다던가— 하는 흉흉한 소문도 함께 들려오는데……\n#3;em;[땀]"
70004010-80 = "3;소라;05;이런 수상한 소문이 있는데도, 어째서 다들 일부러 선생님을 만나러 오는 걸까?"
70004010-81 = "3;소라;17;……어쩌면, 샬레의 선생님은 수상한 방법으로 학생들을 유혹하고 있을지도 몰라.\n#3;em;[...]"
70004010-82 = "3;소라;10;소문으로 전해지는 샬레의 수상한 물건 중에 사람을 조종할 수 있는 최면 도구 같은 게 있을지도 모르고—"

[translation]
70004010-1 = "ของขวัญที่ไร้เจ้าของ 1"
70004010-5 = "อ้อ คุณครู ฉันเพิ่งมาถึงอาคารชาเล่ต์พอดีเลย"
70004010-6 = "อื้อ... วันนี้มีเด็กที่ก่อปัญหาเยอะเป็นพิเศษเลย ฉันวิ่งวุ่นจนคอแห้ง ก็เลยว่าจะมาซื้ออะไรดื่มหน่อยน่ะ เอาไว้ซื้อเสร็จแล้วจะขึ้นไปหา"
70004010-7 = "คุณครูอยากดื่มอะไรด้วยมั้ย?"
70004010-11 = "ฮุฮุ... กะไว้แล้วว่าคุณครูต้องพูดแบบนั้น"
70004010-12 = "เข้าใจแล้ว ฉันจะรีบขึ้นไป ได้มาเข้าเวรทั้งที แล้วฉันจะตั้งตารองานนะ"
70004010-16 = "เครื่องดื่มชูกำลัง 2 ขวดกับกาแฟดำ 1 กระป๋องนะคะ ทั้งหมด 420 เยนค่ะ"
70004010-17 = "อื้อ จ่ายด้วยบัตรได้ใช่มั้ย?"
70004010-21 = "ขอบใจนะ... อ้อ ไม่ต้องใส่ถุงหรอก ฉันจะดื่มเลยน่ะ"
70004010-26 = "(แปลกจัง...)"
70004010-30 = "จริงสิ คุณครู สั่งเค้กคริสต์มาสของปีนี้ไว้หรือยัง?"
70004010-31 = "หืม...? ไม่ต้องมีเค้กก็ได้งั้นเหรอ? หรือว่าครูเป็นสายไก่ทอดมากกว่าเค้กน่ะ?"
70004010-32 = "คริสต์มาสปีนี้ก็คงงานยุ่งอีกตามเคย ก็เลยจะกินมื้อเย็นง่ายๆ งั้นเหรอ... ทำไมพูดอะไรน่าเศร้าอย่าง#nนั้นล่ะ"
70004010-37 = "คุณครู ลองดูลิงก์ที่ฉันเพิ่งส่งให้ทาง MOMOTALK หน่อยสิ ร้านนั้นเป็นร้านเค้กแบบเดลิเวอรี่น่ะ คราวก่อนฉันสั่งไปกิน รสชาติใช้ได้เลย"
70004010-38 = "ต่อให้งานยุ่งแค่ไหนก็ต้องกินของหวานอะไรบ้างสิ คริสต์มาสทั้งทีนะ"
70004010-39 = "ขนมเมอแรงก์ถั่ว 1 ชิ้น พุดดิ้ง 2 ถ้วย และเค้กบามคูเฮนรสช็อกโกแลต 1 ชิ้นนะคะ"
70004010-40 = "อ๊ะ ขอโทษค่ะ เดี๋ยวนะคะ ขอเพิ่มนมกล่องหนึ่งด้วยค่ะ"
70004010-41 = "ทั้งหมด 780 เยนค่ะ รับถุงด้วยมั้ยคะ?"
70004010-42 = "ค่ะ ขอถุงด้วยค่ะ ขอบคุณนะคะ~"
70004010-47 = "(ฉันว่ามัน...)"
70004010-50 = "คุณ~ ครู~ ใบเสร็จนี้มันอะไรกันคะ?"
70004010-51 = "ไม่ต้องมาทำเป็นไม่รู้ไม่ชี้เลยนะ! ในใบเสร็จที่ส่งให้เซมิน่าเมื่อวานมีใบเสร็จที่ซื้อหุ่นยนต์ของเล่นปน#nมาด้วยค่ะ!"
70004010-52 = "เดือนที่แล้วในรายงานค่าใช้จ่ายในการทำงานก็เนียนใส่ใบเสร็จเกมปนมาด้วย..."
70004010-56 = "คะ? เป็นของขวัญคริสต์มาสที่ซื้อให้ตัวเองงั้นเหรอคะ?"
70004010-57 = "แล้วทำไมใบเสร็จซื้อของส่วนตัวถึงรวมอยู่ในรายงานค่าใช้จ่ายในการทำงานล่ะคะ?"
70004010-58 = "ไม่ได้การละ... ฉันจะขึ้นไปหาแล้วตรวจสมุดบัญชีเดี๋ยวนี้เลย รออยู่ตรงนั้น ห้ามไปไหนนะคะ!"
70004010-59 = "เอ่อ... กระสุนปืนพกขนาด 9 มม. จำนวน 30 นัดกับสปีดโหลดเดอร์ 1 อัน ใช่ไหมคะ?"
70004010-60 = "อ๊ะ ขอโทษที ฉันเผลอส่งเสียงดังหน้าเคาน์เตอร์คิดเงินจนได้"
70004010-61 = "อื้อ เอาเท่านั้นแหละ ทั้งหมด 1810 เยนใช่มั้ย?"
70004010-62 = "ค่ะ รับถุงด้วย..."
70004010-68 = "ไปซะแล้ว..."
70004010-72 = "(ต้องมีอะไรไม่ชอบมาพากลแน่ๆ เลย...!)"
70004010-75 = "วันนี้มีนักเรียนแวะไปที่ชาเล่ต์ 10 คน..."
70004010-76 = "ไม่สิ ถ้าไม่นับนักเรียนที่ไม่ได้แวะเข้ามาที่ร้านสะดวกซื้อ ก็น่าจะราวๆ 20 คนได้เลย"
70004010-77 = "ถ้าเป็นนักเรียนที่มาเข้าเวรเพื่อช่วยงานคุณครูก็อีกเรื่องหนึ่ง แต่คนที่ตั้งใจแวะมาที่ชาเล่ต์โดยไม่มีธุระ#nอะไรนี่สิ... น่าสงสัยชะมัด"
70004010-78 = "ถึงคุณครูชาเล่ต์จะมีกิตติศัพท์ว่าเป็นผู้ใหญ่ใจดีที่คอยแก้ปัญหาให้นักเรียน และช่วยเหลือชาวเมืองที่#nตกอยู่ในวิกฤตก็เถอะ"
70004010-79 = "แต่ก็ยังมีข่าวลือว่าคุณครูไปว่ายน้ำตัวล่อนจ้อนในสระว่ายน้ำ แล้วก็ไปเลียเท้าของนักเรียนอีก..."
70004010-80 = "ทั้งๆ ที่มีข่าวลือแปลกๆ แบบนี้ แต่ทำไมทุกคนถึงได้อยากมาหาคุณครูกันขนาดนี้นะ?"
70004010-81 = "หรือว่าบางที... คุณครูของชาเล่ต์อาจจะหลอกล่อให้นักเรียนมาหาด้วยวิธีแปลกๆ ก็ได้"
70004010-82 = "ในบรรดาสิ่งของต้องสงสัยในชาเล่ต์ที่เขาร่ำลือกัน บางทีอาจจะมีเครื่องมือสะกดจิตที่ใช้ควบคุมจิตใจ#nผู้คน..."
70004010-83 = "[s] \"เครื่องมือสะกดจิตอะไรเหรอ?\""
70004010-84 = "คะ... คุณครู?! มะ... มาตั้งแต่เมื่อไรคะ?"
70004010-85 = "อะ... เอ็นเจล 24 ยินดีต้อนรับค่ะ!"
70004010-86 = "[s1] \"สวัสดี โซระ คิดอะไรอยู่เหรอ?\"\n[s2] \"ดูเครียดเชียว คิดอะไรอยู่คนเดียวเหรอ?\""
70004010-87 = "มะ... ไม่ได้คิดอะไรเลยค่ะ! ฉันแค่กำลังอ่านพวกข่าวลือที่คนเขาพูดกันในโซเชียลมีเดียน่ะค่ะ..."
70004010-88 = "มะ... ไม่ได้คิดอะไรเลยค่ะ! ฉันแค่กำลังอ่านพวกข่าวลือที่คนเขาพูดกันในโซเชียลมีเดียน่ะค่ะ..."
70004010-89 = "[s3] \"ดูอะไรในโซเชียลมีเดียก็ต้องไตร่ตรองบ้างนะ\"\n[s4] \"อย่าไปเชื่อมากล่ะ ในนั้นมีเรื่องเหลวไหลเยอะเลย\""
70004010-90 = "ค่ะ ค่ะ! ฉันจะระวังค่ะ"
70004010-91 = "ค่ะ ค่ะ! ฉันจะระวังค่ะ"
70004010-92 = "[ns] \"จะว่าไป ช่วงนี้โซระดูงานยุ่งมากเลยนะ\""
70004010-93 = "ค่ะ สัปดาห์นี้มีลูกค้ามากกว่าปกติเยอะเลย ฉันก็เลยวุ่นๆ ทั้งวันเลยค่ะ"
70004010-94 = "คงเพราะใกล้จะถึงช่วงคริสต์มาสและก็วันสิ้นปีน่ะค่ะ... ของกินเล่นอย่างเค้กกับไก่ทอดก็เลยขายดีเป็น#nพิเศษ"
70004010-95 = "[s] \"นั่นสินะ ใกล้จะหมดปีอีกแล้วนะเนี่ย...\""
70004010-99 = "ของที่คุณครูซื้อคือ... หมากฝรั่งรสมินต์ 1 กล่องกับเยลลี่เลม่อน 1 ห่อนะคะ"
70004010-100 = "ตอนนี้กำลังมีโปรโมชั่นเยลลี่เลม่อนอยู่พอดีค่ะ ซื้อ 1 ห่อแถมเครื่องดื่มวิตามิน 1 ขวดค่ะ เดี๋ยวฉันไปหยิบของแถมมาให้นะคะ"
70004010-101 = "[s] \"อันนั้นครูให้โซระเลย\""
70004010-102 = "คะ... คะ? ให้ฉันเหรอคะ...?"
70004010-103 = "[s5] \"อื้อ วันนี้ทำงานหนักมากนี่นา โซระดื่มได้เลยนะ\"\n[s6] \"อื้อ เราอยู่อาคารเดียวกันแท้ๆ ต้องช่วยเหลือกันสิ\""
70004010-104 = "อ่า... ค่ะ... ขะ... ขอบคุณค่ะ"
70004010-105 = "อ่า... ค่ะ... ขะ... ขอบคุณค่ะ"
70004010-106 = "(คุณครู [USERNAME] เป็นผู้ใหญ่ที่น่าสงสัยก็จริง แต่ก็...)"
70004010-107 = "เอ่อ คุณครูคะ ที่จริงฉันมีเรื่องอยากถาม..."
70004010-112 = "ขะ... ขอโทษนะครับ ยังมีมอนสเตอร์แม็กซ์รสกาแฟเหลือมั้ยครับ?"
70004010-113 = "คะ... คะ? มอนสเตอร์แม็กซ์รสกาแฟเหรอคะ...?"
70004010-114 = "น่าจะยังมีเหลือในสต็อกนะคะ... รอสักครู่นะคะ ฉันจะรีบไปเช็กให้..."
70004010-119 = "[ns] \"ไปก่อนเถอะ ดูของให้ลูกค้าก่อนได้เลย\""
70004010-120 = "ค่ะ...! ถะ... ถ้างั้นฉันขอเสียมารยาทหน่อยนะคะ!"
70004010-125 = "(หลังจากนั้นร้านเอ็นเจล 24 ก็มีลูกค้าเข้ามาตลอดจนโซระแทบไม่ได้หยุดพักเลย...)"
70004010-127 = "เฮ้อ... ได้พักหายใจหายคอบ้างแล้วสินะ"
70004010-128 = "วันนี้เหนื่อยทั้งวันเลย น่าจะเป็นครั้งแรกเลยนะที่ลูกค้าเข้าร้านเยอะจนไม่มีเวลาทำความสะอาดร้าน..."
70004010-129 = "สุดท้ายก็ไม่ได้ถามคุณครูว่าทำไมนักเรียนถึงมาหากันเยอะด้วย"
70004010-130 = "เรื่องนั้นเอาไว้คิดทีหลังแล้วกัน ตอนนี้คงต้องไปทำความสะอาดร้านก่อน..."
70004010-138 = "ส่งความสุขทุกเวลา~♪ แฮปปี้ แฮปปี้ เอ็นเจล 24~♪"
70004010-145 = "เอ๋ นี่มัน..."
70004010-146 = "ของขวัญเหรอ...? ใครมาวางลืมไว้น่ะ?"
70004010-147 = "เป็นของนักเรียนที่แวะมาที่ชาเล่ต์แล้วตั้งใจจะเอามาให้คุณครูหรือเปล่านะ?"
70004010-148 = "งั้นก็ต้องเขียนประกาศของหายแล้วแปะไว้หน้าร้าน..."
70004010-152 = "ไม่สิ... ถ้าทำแบบนั้นคงได้เกิดเรื่องวุ่นวายแน่"
70004010-153 = "ตอนนี้นักเรียนส่วนใหญ่ในคิโวทอสต่างพากันชื่นชอบคุณครู ถ้าทุกคนรู้ว่ามีใครบางคนพยายาม#nสารภาพรักกับคุณครูละก็..."
70004010-154 = "แล้วถ้าเจ้าของของขวัญเป็นคนใหญ่คนโตในโรงเรียน... ก็อาจเกิดความขัดแย้งระหว่างโรงเรียนก็ได้!"
70004010-155 = "ตะ... แต่ว่าจะทำยังไงดีล่ะ? จะทำเป็นไม่เห็นของขวัญก็ไม่ได้... แถมดูจากกล้องวงจรปิดก็ไม่เห็น#nด้วยว่าใครเอามาวางไว้..."
70004010-159 = "คงต้องถามตรงๆ แล้วสินะ"
70004010-160 = "เราพอจะจำหน้าคนที่มาเข้ามาซื้อของวันนี้ได้อยู่... งั้นก็ถามคนพวกนั้นแล้วกันว่าทำอะไรหายบ้าง#nหรือเปล่า แบบนี้จะได้ไม่มีใครจับได้"
70004010-162 = "ต้องหาเจ้าของของขวัญชิ้นนี้ให้ได้ อย่างน้อยก็เพื่อความสงบสุขของคิโวทอส!"

[translation]
70004010-1 = "Lost Gift 1"
70004010-5 = "Oh, Sensei. I'm here at Schale."
70004010-6 = "...Yes. There were a lot of kids causing trouble today. Chasing after them left me parched, so I'm going to buy a drink before heading up."
70004010-7 = "Would you like one too, Sensei?"
70004010-11 = "...Haha. I had a feeling you'd say that."
70004010-12 = "Got it. I'll be up soon. I look forward to my Student Rep duties today."
70004010-16 = "Two bottles of energy drinks and one can of coffee? That will be 420 yen."
70004010-17 = "Okay. Do you take card?"
70004010-21 = "...Thank you.#nOh, I don't need a bag. I'll be drinking them right away."
70004010-26 = "(How suspicious...)"
70004010-30 = "Ah, Sensei. Did you order your Christmas cake yet?"
70004010-31 = "...Huh? You didn't get a cake? Are you planning on eating chicken, then?"
70004010-32 = "...You're gonna be too busy for a proper Christmas dinner? That's sad."
70004010-37 = "Sensei, I just sent you an address on MomoTalk.#nIt's a sliced cake shop that specializes in delivery. I tried it last time, and it's pretty good."
70004010-38 = "No matter how busy you are, you can find time for one sweet dessert, right? It's Christmas."
70004010-39 = "One dacquoise, two puddings, and one chocolate log cake?"
70004010-40 = "Ah, sorry. Hold on. Lemme add a milk, too."
70004010-41 = "Your total is 780 yen. Do you need a bag?"
70004010-42 = "Yes, please. Thanks!"
70004010-47 = "(No matter how I look at it...)"
70004010-50 = "Sen! Sei! What is this receipt?!"
70004010-51 = "Don't play dumb with me! I found a receipt for a toy robot mixed in with the expenses you submitted to Seminar yesterday!"
70004010-52 = "I haven't forgotten the video game receipt you snuck in last time too!"
70004010-56 = "Huh? It was a Christmas gift for yourself?"
70004010-57 = "What does that have to do with the expense report?! That's a personal expense!"
70004010-58 = "...That does it. I'm going up right now and checking your account books. Don't move a muscle!"
70004010-59 = "Um... That's 30 rounds of 9mm pistol ammo and one speed loader?"
70004010-60 = "Ah, sorry. I'm causing such a ruckus."
70004010-61 = "Yes. That's all I need. The total is 1,810 yen, right?"
70004010-62 = "Yes. Do you need a ba—"
70004010-68 = "...She's gone."
70004010-72 = "(It's suspicious...!)"
70004010-75 = "Ten of our customers today were students visiting Schale."
70004010-76 = "If I count those that didn't stop by the convenience store, there must be at least twenty students visiting!"
70004010-77 = "I understand those with Student Rep duties come to help Sensei, but visiting Schale when they're not scheduled... It's suspicious."
70004010-78 = "Rumor has it, Schale's Sensei is a kind adult who listens to students' concerns and will never abandon someone in need."
70004010-79 = "But on the other hand, there are also terrifying rumors of Sensei swimming naked in the pool, and even of them licking students' feet..."
70004010-80 = "Considering all of Sensei's suspicious activity, why do students still come to see them?"
70004010-81 = "...Maybe Schale's Sensei is using some dirty method to seduce students."
70004010-82 = "Schale has all kinds of strange things, maybe they have some kind of hypnosis device that can control people's minds..."
70004010-83 = "[s] \"What hypnosis device?\""
70004010-84 = "S-Sensei?! When did you get here?"
70004010-85 = "W-Welcome to Angel 24!"
70004010-86 = "[s1] \"Hello, Sora.\"\n[s2] \"What are you thinking about?\""
70004010-87 = "I-It's nothing! Just some rumors that have been circulating social media..."
70004010-88 = "I-It's nothing! Just some rumors that have been circulating social media..."
70004010-89 = "[s3] \"There are a lot of fun rumors on social media.\"\n[s4] \"But there are also fake ones, so don't trust everything you see.\""
70004010-90 = "U-Understood! I'll be careful."
70004010-91 = "U-Understood! I'll be careful."
70004010-92 = "[ns] \"Anyway, you look busy these days.\""
70004010-93 = "Yes. Especially this week. It's been a little chaotic."
70004010-94 = "...It's Christmas, and then the end of the year, so people tend to buy more cakes and snacks, like chicken tendies."
70004010-95 = "[s] \"Yeah, I can't believe the year's almost over.\""
70004010-99 = "Sensei, you're getting one mint gum and one lemon jelly?"
70004010-100 = "There's a special promotion for this lemon jelly, so you get one vitamin drink if you purchase it. Let me get it for you."
70004010-101 = "[s] \"You can have it, Sora.\""
70004010-102 = "H-Huh? Me...?"
70004010-103 = "[s5] \"Yes. You take it, since you worked hard today, Sora.\"\n[s6] \"We work in the same building, we should help each other out.\""
70004010-104 = "Ah, yes... Th-Thank you."
70004010-105 = "Ah, yes... Th-Thank you."
70004010-106 = "(...As I thought. [USERNAME] Sensei is a suspicious adult, but...)"
70004010-107 = "Um, Sensei, I actually wanted to ask you some—"
70004010-112 = "Um, excuse me, do you have any of the Frenzy MAX Coffees left?"
70004010-113 = "H-Huh? Frenzy MAX Coffee...?"
70004010-114 = "I think we do... Let me go check the back..."
70004010-119 = "[ns] \"Go on. Customers come first.\""
70004010-120 = "Yes...! Th-Then excuse me!"
70004010-125 = "After that, Angel 24 proceeded to have a neverending stream of customers."
70004010-127 = "*sigh*... I can finally take a break."
70004010-128 = "What a hard day. I can't remember the last time I was so busy that I couldn't even clean the store."
70004010-129 = "I never got to ask Sensei why so many students visit them."
70004010-130 = "Well, that's a problem for later. I'll just get to cleaning for now."
70004010-138 = "Always delivering happiness! Happy, happy Angel 24! ♪"
70004010-145 = "Huh? This is..."
70004010-146 = "...a gift? Who left this here?"
70004010-147 = "Maybe it was one of the students that came to visit Sensei?"
70004010-148 = "I'll just put up a \"Lost Item\" notice at the front of the store..."
70004010-152 = "...No. That could cause a huge incident."
70004010-153 = "Most students of Kivotos have feelings towards Sensei in one way or another. If all of them were to learn about this expression of affection from another student..."
70004010-154 = "I-Imagine if that student was someone in a position of power at one of the academies! It...It could even lead to war!"
70004010-155 = "Wh-What should I do, then...? I can't just pretend I never saw it... And it was left in a blind spot in the CCTV system, so I don't know how to figure out whose it was."
70004010-159 = "I'll just have to ask them one by one."
70004010-160 = "I can somewhat remember the faces of the students who visited the store today. I'll just investigate them subtly, so no one else finds out."
70004010-162 = "For the peace of Kivotos, I have to find the owner of this gift!"

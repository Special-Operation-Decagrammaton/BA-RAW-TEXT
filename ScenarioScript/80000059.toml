[translation]
80000059-1 = "ช็อกโกแลตรุ่นพิเศษสุดหายาก"
80000059-2 = "..."
80000059-6 = "(นิ่งเงียบโดยไม่พูดอะไรเลยมา 15 นาทีแล้ว...)"
80000059-7 = "[s1] \"คือ... เป็นเพราะวันวาเลนไทน์ใช่มั้ย?\"\n[s2] \"เรียกครูมาเพราะช็อกโกแลตใช่มั้ย?\""
80000059-8 = "...!!"
80000059-9 = "...!!"
80000059-10 = "อะ... อ๊ายยยย! พูดแล้ว สุดท้ายก็พูดมาแล้วนะ คุณครู!!"
80000059-11 = "ใช่แล้วล่ะ เหมือนที่คุณครูคิดไว้นั่นล่ะ?! พูดอีกก็ถูกอีก!"
80000059-12 = "แต่ว่ามัน... ช่วยรอก่อนได้มั้ยเล่า! ตอนนี้ฉันกำลังใช้ความคิดหนักมากเลยนะ!"
80000059-13 = "หืม...? คิดอะไรอยู่น่ะเหรอ?"
80000059-14 = "ทำไมถึงถามคำถามด้วยท่าทางสบายๆ แบบนั้นเล่า?! ฉันไม่บอกหรอก! ถ้าบอกได้ก็คงบอกไปตั้งแต่#nแรกแล้ว!"
80000059-15 = "แต่ว่า..."
80000059-19 = "เฮ้อ..."
80000059-20 = "ไม่รู้ด้วยแล้ว.. ยังไงนั่งคิดต่อไปก็คงไม่มีอะไรดีขึ้นอยู่ดี"
80000059-21 = "สู้บอกไปตรงๆ แล้วถ้าถูกหัวเราะเยาะก็รีบๆ ลืมมันไปน่าจะดีกว่า"
80000059-30 = "พูดอะไรหน่อยสิ..."
80000059-31 = "เฮอะ!! ทำหน้าอะไรแบบนั้นเล่า! รู้แล้วน่า ฉันรู้นะ ว่าตอนนี้คุณครูคงจะคิดว่า \"อะไรกันเนี่ย?\" อยู่ล่ะสิ?!"
80000059-32 = "ช่วยไม่ได้นะ! ขนมที่วางขายจำนวนจำกัดที่ฉันเล็งไว้ก็ขายหมดไปแล้ว อุตส่าห์มายืนรอทั้งคืน..."
80000059-33 = "ของที่ขายหน้าเว็บไซต์ก็ไม่มีการจองคิวล่วงหน้า พอถึงเวลาขายก็มีคิวรอซื้อไปกว่า 3,000 คิวแล้ว! ก็เลยซื้อไม่ได้ไงล่ะ"
80000059-34 = "แต่ว่าถ้าจะให้ซื้อของที่มีขายทั่วๆ ไปมาให้มันก็ยังไงอยู่"
80000059-35 = "อุตส่าห์คิดว่าขนมที่ทำเองมันก็น่าจะดีกว่าแล้ว แต่สุดท้ายพอทำออกมาก็เละเทะแบบนี้!"
80000059-36 = "ขอโทษนะ ที่ฉันมันไม่เอาไหนซะเลย! คนอื่นๆ ทำออกมาได้น่ารักมากแท้ๆ แต่ฉันกลับทำออกมา#nเละเทะแบบนี้..."
80000059-37 = "ฮึ่ก...! ควรจะจองคิวให้ได้แท้ๆ... แย่จริงๆ"
80000059-42 = "คุณครู...?"
80000059-43 = "ทำอะไรน่ะ? ทำไมหยิบมากินได้สบายๆ แบบนั้นน่ะ...?"
80000059-44 = "[s3] \"อร่อยดีนะ\"\n[s4] \"อร่อยขนาดนี้ โยชิมิจะหงุดหงิดไปทำไมน่ะ?\""
80000059-45 = "งะ...งั้นเหรอ? จริงๆ เหรอ? อร่อยจริงๆ งั้นเหรอ?"
80000059-46 = "งะ...งั้นเหรอ? จริงๆ เหรอ? อร่อยจริงๆ งั้นเหรอ?"
80000059-47 = "คุณครูเอาแต่พูดว่าดีตลอดเลยไม่รู้ว่ามันดีจริงๆ หรือแค่ชมไปอย่างนั้น..."
80000059-48 = "แต่ฉันก็โล่งใจนะที่อย่างน้อยคุณครูก็กินได้ ถึงจะไม่อร่อยเท่าขนมที่วางขายจำนวนจำกัดก็เถอะ"
80000059-49 = "[s5] \"พูดอะไรน่ะ? ขนมชิ้นนี้ก็พิเศษมากๆ เลยนะ\"\n[s6] \"ขนมสุดพิเศษสำหรับวาเลนไทน์ของโยชิมิ\""
80000059-50 = "...!! อึ่ก...! เอาอีกแล้วนะ พูดแบบนั้นอีกแล้วนะ คุณครู!"
80000059-51 = "...!! อึ่ก...! เอาอีกแล้วนะ พูดแบบนั้นอีกแล้วนะ คุณครู!"
80000059-52 = "คุณครูควรเลิกพูดไร้สาระแบบนั้นสักทีนะ คุณครูคนบ้า...!!"
80000059-53 = "หงุดหงิดจริงๆ เอาแต่ทำแบบนี้ทุกครั้งเลย..."
80000059-55 = "แถมยังหัวเราะแบบนั้นทุกครั้งอีกต่างหาก..."

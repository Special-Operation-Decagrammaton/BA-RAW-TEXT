80000059-15 = "……"
80000059-19 = "唉……"
80000059-20 = "……算了。反正再煩惱下去好像也不會有答案……"
80000059-21 = "被笑就被笑吧……"
80000059-30 = "……說點什麼吧？"
80000059-31 = "我知道！我也知道會產生「這什麼鬼」的心情！"
80000059-32 = "可是我也沒有辦法，我想買的限定巧克力賣完了嘛！#n明明我排隊排到幾乎整晚沒睡的說！"
80000059-33 = "網路訂購也是先搶先贏，可是在網站更新的瞬間就賣光了啊！"
80000059-34 = "可是買市面上普通的東西又……"
80000059-35 = "抱著這樣的想法挑戰動手做的結果就變成這樣了……！"
80000059-36 = "手藝不好真是抱歉啊！？反正大家肯定都送你漂亮又可愛的巧克力對吧！？"
80000059-37 = "嗚嗚……要是有搶到那個的話……"
80000059-42 = "……老，老師？"
80000059-43 = "為，為什麼要吃得那麼狼吞虎嚥……！？"

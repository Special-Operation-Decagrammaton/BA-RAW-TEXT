80000059-45 = "……真的嗎？"
80000059-46 = "……真的嗎？"
80000059-47 = "老師每次都這麼說，我都搞不清楚是不是客套話了……"
80000059-48 = "……不過謝謝你。雖然我覺得本來要送你的限定版巧克力會更好吃就是了……"
80000059-49 = "[s5]「這也是限定版唷。」\n[s6]「喜美給我的巧克力就只有這一個呀。」"
80000059-50 = "……！！啊啊真是，我知道了啦！"
80000059-51 = "……！！啊啊真是，我知道了啦！"
80000059-52 = "唉，每次都這樣……！別再說那種話了！"
80000059-53 = "真是的，明明模式和平常一樣……"
80000059-55 = "為什麼我會，這麼的……"

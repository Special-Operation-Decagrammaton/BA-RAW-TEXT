[translation]
80000059-1 = "最貴重的限量版"
80000059-2 = "……"
80000059-6 = "（已經沈默了超過十五分鐘）"
80000059-7 = "[s1]「那個……是因為情人節嗎？」\n[s2]「……是要送巧克力嗎？」"
80000059-8 = "……！？"
80000059-9 = "……！？"
80000059-10 = "唉呦真是的────！為什麼！為什麼要說出來啊！？"

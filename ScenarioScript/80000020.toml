[translation]
80000020-1 = "Aris' Chocolate"
80000020-2 = "Schale Office"
80000020-3 = "Sensei, do you know what day it is?"
80000020-4 = "[s] \"Valentine's Day, right?\""
80000020-5 = "Correct."
80000020-6 = "Today is the perfect time for leveling, because consuming chocolate items give you a special buff when in a party of two!"
80000020-7 = "[s] \"That's one way to put it...\""
80000020-8 = "Therefore, I have crafted a chocolate item myself to help with our leveling!"
80000020-13 = "Bum bum bum!"
80000020-14 = "Homemade chocolate acquired! INT +10!"
80000020-15 = "[s] \"Did you say...'homemade'?\""
80000020-16 = "Yes! I crafted this chocolate myself."
80000020-17 = "I had to re-try the crafting several times due to my level being low..."
80000020-18 = "However, I finally achieved the result I wanted with Momoi's party bonus."
80000020-19 = "Can you tell who the chocolate is modeled after?"
80000020-20 = "[s1] \"You...?\"\n[s2] \"Is that me?\""
80000020-21 = "But I do not look squished!"
80000020-22 = "There are some passing similarities..."
80000020-23 = "...but no! That is incorrect!"
80000020-24 = "This is a chocolate slime."
80000020-25 = "[s] \"A slime?\""
80000020-26 = "Are you unfamiliar with slimes?"
80000020-27 = "The slime is a jelly-like monster that appears near villages.#nIt has the lowest stats, so it acts as good training for beginners."
80000020-28 = "However, some slimes have an ability that reflects attacks unless you attack them with a weapon that has a specific attribute, so they can be VERY tricky."
80000020-29 = "[s] \"You don't say...\""
80000020-30 = "Yet you did not even recognize the slime. Could you be afflicted with the Curse debuff?"
80000020-31 = "You may have the chocolate slime as a precaution, then.#nI have a duty to look after newbies as the more experienced player."
80000020-32 = "Please use it to cure your debuff before our next battle."

[translation]
80000020-1 = "愛麗絲的巧克力"
80000020-2 = "夏萊．辦公室"
80000020-3 = "老師。你知道今天是什麼日子嗎？"
80000020-4 = "[s]「……情人節？」"
80000020-5 = "是的，也就是說今天……"
80000020-6 = "是最適合透過使用「巧克力」道具，得到狩獵時增益效果「提升等級」的日子！"
80000020-7 = "[s]「……這樣啊。」"
80000020-8 = "所以為了高速成長，愛麗絲也做了巧克力。"
80000020-13 = "乓啪喀乓！"
80000020-14 = "愛麗絲獲得了「手工巧克力」！智力上升了10！"
80000020-15 = "[s]「『手工巧克力』……？」"
80000020-16 = "是的，是愛麗絲親手製作的巧克力。"
80000020-17 = "雖然一開始因為經驗值不足而失敗了幾次……"
80000020-18 = "不過在可靠隊員桃井的幫忙下，總算是完成了。"
80000020-19 = "老師看得出來這個巧克力的原型是誰嗎？"
80000020-20 = "[s1]「……愛麗絲？」\n[s2]「……我？」"
80000020-21 = "愛麗絲才沒有長這樣！"
80000020-22 = "雖然是有一點類似的地方……"
80000020-23 = "BUBU～！答錯了！"
80000020-24 = "這是用巧克力做的「史萊魯」。"
80000020-25 = "[s]「……『史萊魯』？」"
80000020-26 = "咦？老師不知道史萊魯嗎？"
80000020-27 = "「史萊魯」是會出現在「起始村莊」附近的果凍狀怪物。#n因為能力值很低，所以是新手很好對付的最弱敵人。"
80000020-28 = "不過部分有屬性的史萊魯，#n似乎擁有只要沒有使用正確屬性的武器來攻略，攻擊就會全部反彈的鬼神設定。"
80000020-29 = "[s]「這，這樣啊……」"
80000020-30 = "明明這麼像史萊魯的說，難道老師被下了弱化的詛咒減益嗎？"
80000020-31 = "這個史萊魯巧克力送給老師。因為愛麗絲是懂得照顧陷入危險新手的親切玩家。"
80000020-32 = "在開始戰鬥之前，請別忘了吃掉哦？"

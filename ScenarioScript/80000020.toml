[translation]
80000020-1 = "#title;아리스의 초콜릿"
80000020-2 = "#place;샬레 업무관"
80000020-3 = "3;아리스;00;선생님. 오늘이 무슨 날인지 알고 계십니까?\n#3;em;[반응]\n#3;a"
80000020-4 = "[s] \"……발렌타인 데이 아냐?\""
80000020-5 = "3;아리스;03;그렇습니다.\n#3;em;[반짝]\n#3;greeting"
80000020-6 = "3;아리스;07;즉, 오늘은 초콜릿을 섭취하면 사냥에 도움이 되는 특별 버프를 받을 수 있는 열렙 기간입니다!\n#3;hophop"
80000020-7 = "[s] \"그쪽인가…….\""
80000020-8 = "3;아리스;05;그래서 오늘은 아리스도 고속 성장을 위해 직접 초콜릿을 만들었습니다."
80000020-9 = "#st;[0,0];instant;1;"
80000020-10 = "#clearST"
80000020-11 = "3;아리스;05\n#3;m5\n#wait;1000"
80000020-12 = "3;아리스;99\n#3;greeting\n#wait;1500"
80000020-13 = "3;아리스;07;빠빠빠빰! 빰빠빰-!\n#3;hophop"
80000020-14 = "3;아리스;03;아리스는 수제 초콜릿을 얻었습니다! 지능이 10 상승했습니다.\n#3;em;[음표]"
80000020-15 = "[s] \"수제 초콜릿……?\""
80000020-16 = "3;아리스;00;네, 아리스가 직접 만든 수제 초콜릿입니다.\n#3;m3"
80000020-17 = "3;아리스;09;처음에는 경험치가 부족해 여러 차례 시행착오를 겪었지만……\n#3;em;[속상함]\n#3;stiff"
80000020-18 = "3;아리스;05;모모이의 도움을 얻어 금방 원하는 모양을 얻을 수 있었습니다.\n#3;greeting"
80000020-19 = "3;아리스;03;선생님께서는 이 초콜릿의 모델이 누구인지 알아보시겠나요?\n#3;em;[?]"
80000020-20 = "[s1] \"……아리스?\"\n[s2] \"……나?\""
80000020-21 = "3;아리스;10;아리스는 이렇게 찌그러진 모양으로 생기지 않았습니다!\n#3;shake\n#3;em;[?!]"
80000020-22 = "3;아리스;04;비슷한 부분이 조금은 있긴 하지만……\n#3;em;[땀]\n#3;stiff"
80000020-23 = "3;아리스;07;뿌뿌! 틀렸습니다!\n#3;hophop"
80000020-24 = "3;아리스;03;이건 초콜릿으로 만든 스네일입니다.\n#3;em;[반짝]\n#3;greeting"
80000020-25 = "[s] \"……스네일?\""
80000020-26 = "3;아리스;02;설마…… 선생님은 스네일을 모르시나요?\n#3;em;[?]"
80000020-27 = "3;아리스;00;스네일은 시작의 마을 근처에서 등장하는 젤리 모양의 몬스터로 스테이터스가 낮기 때문에 초보자가 상대하기 좋은 최약체의 적입니다."
80000020-28 = "3;아리스;03;다만 속성을 지닌 일부 스네일은 올바른 속성의 무기로 공략하지 않으면 공격을 모두 반사하기 때문에 진.짜.겁.나.어.렵.습.니.다.\n#3;em;[재잘]"
80000020-29 = "[s] \"그, 그렇구나…….\""
80000020-30 = "3;아리스;05;스네일도 알아보지 못하시는 걸 보니, 아무래도 선생님은 약화 저주에 걸린 모양입니다.\n#3;stiff"
80000020-31 = "3;아리스;03;이 스네일 초콜릿은 선생님에게 드리겠습니다. 아리스는 위험에 빠진 초보를 배려할 줄 아는 친절한 플레이어니까요.\n#3;em;[반짝]\n#3;closeup"
80000020-32 = "3;아리스;07;전투를 시작하기 전에 잊지 말고 꼭 섭취해 주세요.\n#3;closeup"

[translation]
80000020-1 = "ช็อกโกแลตของอาริสึ"
80000020-2 = "สำนักงานชาเล่ต์"
80000020-3 = "คุณครู รู้หรือเปล่าคะว่าวันนี้วันอะไร?"
80000020-4 = "[s] \"วันวาเลนไทน์ไงล่ะ?\""
80000020-5 = "ใช่แล้วค่ะ"
80000020-6 = "ช่วงเวลาฮอตไทม์ที่เมื่อกินช็อกโกแลตจะทำให้ได้รับบัฟพิเศษช่วยในการล่ามอนสเตอร์ค่ะ!"
80000020-7 = "[s] \"งั้นเหรอ...\""
80000020-8 = "เพราะงั้นวันนี้... อาริสึเลยทำช็อกโกแลตมาเองเพื่อที่จะอัปเลเวลได้รวดเร็วขึ้นค่ะ!"
80000020-13 = "ปัมปากะปาม~! ป่าปั๊มป่าปั๊ม-!"
80000020-14 = "อาริสึได้รับช็อกโกแลตโฮมเมดมาแล้วค่ะ! ค่าความฉลาดเพิ่มขึ้น 10 หน่วยแล้วละค่ะ"
80000020-15 = "[s] \"ช็อกโกแลตโฮมเมด...?\""
80000020-16 = "ค่ะ ช็อกโกแลตโฮมเมดที่อาริสึทำเองค่ะ"
80000020-17 = "ในตอนแรกค่า EXP ของฉันยังไม่พอเลยต้องลองผิดลองถูกอยู่หลายครั้ง..."
80000020-18 = "มีโมโมอิคอยช่วยอยู่ด้วย ฉันเลยทำรูปที่ต้องการได้ค่ะ"
80000020-19 = "คุณครูดูออกมั้ยคะว่าเป็นรูปใคร?"
80000020-20 = "[s1] \"รูปอาริสึ...?\"\n[s2] \"ครูเหรอ...?\""
80000020-21 = "อาริสึไม่ได้หน้าตาบู้บี้แบบนี้สักหน่อยนะคะ!"
80000020-22 = "ถึงจะมีส่วนที่คล้ายอยู่บ้างก็เถอะ..."
80000020-23 = "บู้บู้! ผิดค่ะ!"
80000020-24 = "นี่คือช็อกโกแลตรูปสเนลค่ะ"
80000020-25 = "[s] \"สเนล...?\""
80000020-26 = "หรือว่า... คุณครูไม่รู้จักเจ้าสเนลเหรอคะ?"
80000020-27 = "สเนลเป็นมอนสเตอร์สไลม์ที่ปรากฏตัวใกล้ๆ หมู่บ้านในตอนเริ่มเกมค่ะ มันเป็นมอนสเตอร์ที่มีค่าพลังต่ำ เพราะงั้นผู้เล่นมือใหม่ก็เลยชอบมอนสเตอร์ตัวนี้กันค่ะ"
80000020-28 = "แต่ว่าถ้าไม่ใช้อาวุธธาตุที่ถูกต้องโจมตี พวกสเนลก็จะต้านทานการโจมตีได้ เพราะงั้น... พวก-มัน-กำ-จัด-ได้-ยาก-สุดๆ-เลย-ละ-ค่ะ"
80000020-29 = "[s] \"งะ...งั้นเหรอ...\""
80000020-30 = "ดูจากการที่คุณครูไม่รู้จักพวกสเนลแล้ว คุณครูคงจะติดสถานะดีบัฟคำสาปให้อ่อนแออยู่สินะคะ"
80000020-31 = "ถ้างั้นอาริสึจะให้ช็อกโกแลตรูปสเนลกับคุณครูค่ะ อาริสึเป็นผู้เล่นใจดีที่รู้จักช่วยเหลือผู้เล่นมือใหม่ อ่อนแอที่ตกอยู่ในอันตรายค่ะ"
80000020-32 = "อย่าลืมกินช็อกโกแลตก่อนที่จะเริ่มต่อสู้นะคะ"

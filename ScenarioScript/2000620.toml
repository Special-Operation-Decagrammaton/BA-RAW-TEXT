2000620-67 = "3;사야 사복;05;이래서 범인들은……. 천재의 발상을 이해해 주지 못하는 것이다."
2000620-68 = "3;사야 사복;01;들어봐라, 자전거나 스쿠터는 움직일 때에 항상 핸들을 쥐고 있어야 하지? 놓는다 해도 직선으로밖에 못 가지?\n#3;m2\n#3;hophop"
2000620-69 = "3;사야 사복;01;하지만 당장 오늘의 일만 해도 어떠냐? 향수를 뿌리면서 이리저리 다니려면 양손을 모두 쓸 수 있는 편이 좋지?\n#3;m3\n#3;hophop"
2000620-70 = "3;사야 사복;01;양손에 향수병을 들고 뿌리면서 다녀야 하니까 말이지.\n#3;m4\n#3;hophop"
2000620-71 = "3;사야 사복;01;보드는 양손이 자유롭다! 게다가 자전거나 스쿠터보다 훨씬 더 다양한 길, 다양한 조건에서도 운용할 수 있다!\n#3;jump\n#3;em;[재잘]"
2000620-72 = "3;사야 사복;99;물론 선생이 생각하는 대로, 그건 보드 사용자의 숙련도가 받쳐줘야 하는 것이지만……."
2000620-73 = "3;사야 사복;03;어차피 나님은 완벽! 새로운 약의 발명도, 스케이트보드 실력도 모두 천재이지 않느냐!\n#3;m3\n#3;hophop"
2000620-74 = "3;사야 사복;01;그러니 아무 문제 없는 것이다. 이것이야말로 나를 위한 이동수단인 것이다!"
2000620-75 = "3;사야 사복;02;자, 자. 잡담은 여기까지!!"
2000620-76 = "3;사야 사복;00;시간이 없는 것이다! 사람들이 모이고 행사가 시작되기 전에, 어서 공원에 향기를 뿌려 두는 것이다!"
2000620-77 = "3;사야 사복;01;일단 두 병을 먼저 양손에 들고……."

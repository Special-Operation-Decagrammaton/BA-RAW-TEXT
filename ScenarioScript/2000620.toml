[translation]
2000620-1 = "選擇滑板的理由"
2000620-2 = "（受沙耶邀請，前往了附近的公園）"
2000620-7 = "（發現沙耶在空蕩蕩的公園進行某種準備）"
2000620-15 = "……啊！老師！這邊這邊！"
2000620-16 = "老師果然也很期待我的發明對吧？"
2000620-17 = "你來的正好。#n這可是最先見識這個偉大發明的機會哦！"
2000620-18 = "……嗯？這是什麼？"
2000620-19 = "是什麼樣的發明？#n啊啊，這個嘛……"
2000620-20 = "唔嗯～該怎麼說才好呢？#n用比較好懂的方法來說就是……"
2000620-21 = "是一種……香水！"
2000620-22 = "沒錯，是能讓這個公園充滿香氣的香水！"
2000620-23 = "[s1]「……那不就是普通的芳香劑嗎？」\n[s2]「所以就是芳香劑？」"
2000620-26 = "哎！才不是！#n那種說法不就像是在說我的發明沒什麼特別的嗎！"
2000620-27 = "它跟芳香劑那種東西完全不一樣！#n只要噴灑一次就能讓香味長時間覆蓋整個公園。普通的芳香劑根本辦不到！"
2000620-28 = "我說它是香水就是香水！而且不是給人用的，是讓公園帶有香味的香水！"
2000620-29 = "其實這座公園從今天下午開始將舉辦活動，#n但花開得比預期中還少……"
2000620-30 = "因為有人說想用香味讓人感到愉悅，所以我才特別說要幫忙的。"
2000620-31 = "我還特別在裡頭添加了「能讓人身心放鬆」的成分哦！"
2000620-32 = "[s3]「嗯，看來『這次』應該沒問題……」\n[s4]「竟然少見地在做好事……」"
2000620-35 = "……這是什麼意思？"
2000620-36 = "算了，現在那不是重點！"
2000620-37 = "之所以請老師過來，可不單純只是想讓老師先見識香水而已！"
2000620-38 = "想請你幫我一個忙……#n要在公園裡噴灑大量香水的話，助手的存在是必不可少的。"
2000620-39 = "我會到公園各處噴灑香水，麻煩你在我回來之前準備好下一瓶可以嗎？"
2000620-40 = "……嗯？"
2000620-41 = "你說知道是知道，但為什麼要打扮成這樣？#n這套服裝怎麼了嗎……？"
2000620-45 = "……啊。"
2000620-51 = "這個滑板……？"
2000620-52 = "不騎自行車或摩托車，而是選擇滑滑板的理由……？"
2000620-56 = "……哈哈哈！你在說什麼啊，老師！#n居然問這麼奇怪的問題！"
2000620-62 = "當然是因為滑板比自行車或摩托車更適合啊！"
2000620-63 = "[s5]「滑板更適合……？」\n[s6]「一般來說應該正好相反吧……？」"
2000620-66 = "唉～"
2000620-67 = "天才總是孤獨的啊。"
2000620-68 = "請你仔細想想，老師。自行車或摩托車在行駛時必須一直緊握著把手對吧？#n就算稍微放手也只能直直前進不是嗎？"
2000620-69 = "而如果想四處噴灑香水，雙手都能使用才是最方便的吧？"
2000620-70 = "畢竟得兩手都拿著香水瓶才行。"
2000620-71 = "從這點來看，滑滑板就能自由運用雙手！#n而且比起自行車和摩托車，滑板對道路的適應能力也更優秀！"
2000620-72 = "當然，老師說的也沒有錯，這取決於滑板使用者的熟練度是否到位……"
2000620-73 = "但我可是天才！在新藥的發明和滑板的實力兩方面都是！"
2000620-74 = "所以完全沒問題！#n要說滑板就是我專屬的交通工具也不為過！"
2000620-75 = "來來來，閒聊到此為止！！"
2000620-76 = "沒時間了！得在人潮開始聚集前噴灑香水！"
2000620-77 = "先把兩瓶拿在手上……"
2000620-81 = "那麼……我要出發了！#n麻煩老師準備好下一輪的瓶子等我回來！"
2000620-86 = "呼～～～～！"
2000620-95 = "唔嗯……嗯……？"
2000620-96 = "怎，怎麼回事……身體突然……咦……"
2000620-97 = "有股「身心放鬆」的感覺……#n我……我的注意力……"
2000620-98 = "嗯……"
2000620-102 = "……唔啊啊啊啊啊！？！？"
2000620-115 = "（連忙跑向跌倒的沙耶，結果「身心放鬆」的香味撲鼻而來，差點連自己都遭殃）"
2000620-116 = "（所幸沙耶並無大礙，之後兩人分頭在公園四處噴灑香水）"

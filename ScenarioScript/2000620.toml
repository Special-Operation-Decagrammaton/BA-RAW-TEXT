2000620-14 = "3;사야 사복;02\n#3;em;[!]\n#3;jump\n#wait;2000"
2000620-15 = "3;사야 사복;03;……아! 선생! 이쪽이다, 이쪽!\n#3;em;[재잘]"
2000620-16 = "3;사야 사복;01;역시 선생도 기대를 하고 있었던 게지? 나님의 발명품!\n#3;hophop"
2000620-17 = "3;사야 사복;03;잘 온 것이다. 이 위대한 신작을 가장 먼저 볼 수 있는 기회를 주는 것이다!"
2000620-18 = "3;사야 사복;01;……응? 이것들?\n#3;em;[?]"
2000620-19 = "3;사야 사복;01;무슨 발명품이냐고? 아아. 이건 말이지……."
2000620-20 = "3;사야 사복;99;으음. 어떻게 설명해야 할까. 선생이 가장 이해하기 쉽게 설명하자면……."
2000620-21 = "3;사야 사복;01;일종의……. 향수!\n#3;jump"
2000620-22 = "3;사야 사복;99;그래. 이곳 공원 일대에 향기를 뿌려줄 향수인 것이다!"
2000620-23 = "[s1] \"……그건 그냥 방향제 아냐?\"\n[s2] \"그러니까 방향제라는 뜻이지?\""
2000620-24 = "#wait;100"
2000620-25 = "#wait;100"
2000620-26 = "3;사야 사복;05;에잇! 다르다! 그렇게 말해버리면 나님의 작품이 세간의 다른 것들과 비슷한 수준으로 격하돼 버리는 것이다!\n#3;hophop\n#3;em;[!]"
2000620-27 = "3;사야 사복;99;이건 격이 다른 물건이란 말이다. 거리에 뿌려 두기만 해도 은은하게 공원 전체를 감싸 줄 것이다. 보통의 방향제로는 어림도 없는 일!\n#3;greeting"
2000620-28 = "3;사야 사복;01;향수다, 향수! 사람이 아니라 공원을 물들여 줄 향수!\n#3;hophop"
2000620-29 = "3;사야 사복;02;사실 오늘 오후부터 이 공원에서 이런저런 행사들이 있을 예정이라고 했는데, 예상한 것보다 꽃들이 적게 피어서……."
2000620-30 = "3;사야 사복;99;그래서 향기로나마 온 사람들을 즐겁게 해 주고 싶다는 말에, 나님이 특별히 도와주겠다고 한 것이다."
2000620-31 = "3;사야 사복;03;특별히 '마음이 편해지고 나른하게 몸이 풀어지는', 좋은 성분들을 섞어서 가져온 것이다!\n#3;em;[음표]"
2000620-32 = "[s3] \"뭐, 확실히 '이번 건' 좋을지도…….\"\n[s4] \"웬일로 좋은 일을…….\""
2000620-33 = "#wait;100"
2000620-34 = "#wait;100"
2000620-35 = "3;사야 사복;01;……지금 뭐라고 말한 것이냐?\n#3;em;[?]"
2000620-36 = "3;사야 사복;05;아무튼 지금 중요한 건 그게 아니다!\n#3;hophop"
2000620-37 = "3;사야 사복;99;이렇게 이른 시간에 선생을 부른 건, 단순히 처음으로 이 향수를 시연해 주기 위해서만이 아니니까!"
2000620-38 = "3;사야 사복;01;선생은 나님을 조금 도와주는 것이다. 이 많은 양을 모두 공원 곳곳에 고르게 뿌리려면, 조수가 필요하니까."
2000620-39 = "3;사야 사복;02;내가 이것을 공원 여기저기 뿌리고 다닐 동안, 다 뿌리고 돌아오면 얼른 다음 걸 챙겨주는 것이다. 무슨 이야긴지 알겠지?"
2000620-40 = "3;사야 사복;01;……응?\n#3;em;[?]"
2000620-41 = "3;사야 사복;01;알겠긴 하지만, 어째서 또 그런 복장이냐고? 이 복장이 어때서 그러느냐?"

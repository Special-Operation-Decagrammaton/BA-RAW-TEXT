[translation]
2000620-1 = "Why I Skate"
2000620-2 = "I headed to the nearby park, following Saya's directions."
2000620-7 = "When I arrived, I easily spotted Saya in a wide-open pathway. She seemed to be preparing something."
2000620-15 = "...Oh, Sensei! Over here! Here!"
2000620-16 = "I'm sure you've been looking forward to my latest invention!"
2000620-17 = "And you're in luck! You have the honor of being witness to its reveal!"
2000620-18 = "...What? What are these for?"
2000620-19 = "What kind of invention? So many questions, Sensei!"
2000620-20 = "Hm, how can I put this in layman's terms..."
2000620-21 = "It's a kind of...perfume."
2000620-22 = "Yes! It's a perfume of sorts, intended to be sprayed outdoors."
2000620-23 = "[s1] \"Did you invent an...air freshener, by chance?\"\n[s2] \"Cool! Like an outdoor air freshener!\""
2000620-26 = "No! This is my very own unique invention! Not some air freshener you can pick up at the store!"
2000620-27 = "This is completely different and more effective. We simply need a few sprays on the paths, and its scent will permeate the whole park!"
2000620-28 = "It's perfume! Like...park perfume!"
2000620-29 = "There'll be events held here this afternoon, but the flowers have bloomed severely under projections this year."
2000620-30 = "So I took it into my own hands and made sure everyone visiting the park today will still get to enjoy the pleasing aroma of fresh flowers!"
2000620-31 = "I even added some special ingredients to help the event-goers feel calm and relaxed."
2000620-32 = "[s3] \"This invention sounds surprisingly harmless...\"\n[s4] \"That actually sounds like a good idea?\""
2000620-35 = "...What was that? I don't get it."
2000620-36 = "Anyways, that's not the important part!"
2000620-37 = "I didn't call you here in the early morning just to experience my boundless genius!"
2000620-38 = "You'll be serving as my assistant today! I need help to make sure the scent is spread evenly across the park."
2000620-39 = "I'll go around spraying the perfume, and you just hand me the next batch as soon as I finish a section!"
2000620-40 = "...Huh?"
2000620-41 = "Your concern isn't with the plan, but my equipment...? What's wrong with my equipment?"
2000620-45 = "...Ah!"
2000620-51 = "The skateboard!"
2000620-52 = "Why am I using a skateboard? Why not just a bike or scooter?"
2000620-56 = "...Hahaha! Your scientific curiosity surprises me sometimes, Sensei!"
2000620-62 = "The skateboard boasts many advantages that bikes and scooters cannot!"
2000620-63 = "[s5] \"Really? Are you sure...?\"\n[s6] \"What kind of advantages?\""
2000620-66 = "*sigh*"
2000620-67 = "This is why the exceedingly ordinary will never understand the mind of a genius."
2000620-68 = "Think about it: to operate a bike or scooter requires me to hold onto the handles, right? If I were to let go, I would no longer be able to steer!"
2000620-69 = "Considering the nature of today's task, I'll need both my hands to properly spread the scent."
2000620-70 = "I need both hands free, so I can hold a bottle in each!"
2000620-71 = "With a skateboard, my hands are free to do as I please. And I can much more easily navigate the small paths of the park than if I had a bike."
2000620-72 = "There is, of course, the caveat that a skateboard has a bit of a higher learning curve."
2000620-73 = "However, I am perfect! I am a genius in both the development of new medicine as well as skateboarding!"
2000620-74 = "So please don't worry, Sensei. This fine piece of equipment was made for me and this invention!"
2000620-75 = "Now, then. Enough small talk!"
2000620-76 = "There isn't much time! Before people start to gather for the events, we need to spray this everywhere!"
2000620-77 = "Hold one bottle in each hand..."
2000620-81 = "And... I'll be off! Sensei, make sure to prepare fresh bottles for me!"
2000620-86 = "Whew!"
2000620-95 = "Hmm... Huh...?"
2000620-96 = "Wh-What is this feeling... I feel..."
2000620-97 = "I have no worries in life... Why use brain...when such peace..."
2000620-98 = "Uh..."
2000620-102 = "...Ahhhhhh?!"
2000620-115 = "I heard Saya's shout and ran over to her right away. All around her, the smell of the perfume lingered, making me feel calm...and relaxed...a little...sleepy..."
2000620-116 = "But she thankfully was uninjured, and we went about on foot to spray the rest of the park. Albeit, with a little less urgency than when we started."

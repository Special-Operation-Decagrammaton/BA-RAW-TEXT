[translation]
2000620-1 = "เหตุผลที่เล่นสเกตบอร์ด"
2000620-2 = "(หลังจากที่คุณครูได้รับข้อความจากซายะก็รีบมุ่งหน้ามาที่สวนสาธารณะใกล้ๆ ทันที)"
2000620-7 = "(เมื่อมาถึงก็เห็นซายะกำลังเตรียมอะไรบางอย่างอยู่กลางสวนสาธารณะที่ไร้ผู้คน)"
2000620-15 = "...อ๊ะ ครู! ทางนี้ๆ ทางนี้!"
2000620-16 = "คิดแล้วเชียว ครูเองก็ตั้งตารอดูอยู่เลยใช่มั้ยล่ะ? สิ่งประดิษฐ์ของท่านซายะน่ะ!"
2000620-17 = "มาก็ดีแล้วละ ถือเป็นโอกาสดีที่ครูจะได้ชมสิ่งประดิษฐ์ที่ยิ่งใหญ่ก่อนใครเลยนะ!"
2000620-18 = "...หืม? ของพวกนี้น่ะเหรอ?"
2000620-19 = "สิ่งประดิษฐ์อะไรน่ะเหรอ? ของพวกนี้น่ะ..."
2000620-20 = "อืม จะอธิบายยังไงดีให้ครูเข้าใจได้ง่ายที่สุดดีนะ..."
2000620-21 = "มันคือ... น้ำหอมชนิดหนึ่งน่ะ!"
2000620-22 = "ใช่แล้ว นี่เป็นน้ำหอมที่จะทำให้กลิ่นหอมกระจายไปทั่วสวนสาธารณะแห่งนี้น่ะ!"
2000620-23 = "[s1] \"...นั่นมันสเปรย์ปรับอากาศไม่ใช่เหรอ?\"\n[s2] \"สรุปคือสเปรย์ปรับอากาศใช่มั้ย?\""
2000620-26 = "ฮึ่ย! ไม่ใช่สักหน่อย! พอพูดแบบนั้นแล้วมันเหมือนกับมาด้อยค่าสิ่งประดิษฐ์ของท่านซายะให้กลายเป็น#nของพื้นๆ ทั่วไปเลยนะ!"
2000620-27 = "เจ้านี่น่ะ ไม่เหมือนกับของพื้นๆ พวกนั้นหรอกนะ แค่เอาไปฉีดที่รอบๆ ก็จะทำให้สวนสาธารณะแห่งนี้มี#nกลิ่นหอมอ่อนๆ ฟุ้งไปทั่วเลยละ พวกสเปรย์ปรับอากาศธรรมดาน่ะ ทำไม่ได้หรอก!"
2000620-28 = "บอกว่ามันคือน้ำหอม น้ำหอมที่จะช่วยเติมแต่งสีสันให้กับสวนสาธารณะต่างหากเล่า!"
2000620-29 = "อันที่จริงวันนี้... ที่สวนสาธารณะแห่งนี้จะมีการจัดงานอีเวนต์ต่างๆ ขึ้นเยอะมาก แต่ดอกไม้กลับไม่บาน#nสะพรั่งอย่างที่คิด..."
2000620-30 = "เพราะงั้นท่านซายะผู้นี้ก็เลยลงมือปรุงน้ำหอมขึ้นมาเป็นพิเศษ เพื่อพวกคนที่มาชมดอกไม้กันในวันนี้#nยังไงละ"
2000620-31 = "แถมยังใส่ส่วนผสมพิเศษ 'ที่ช่วยให้ร่างกายและจิตใจผ่อนคลาย' ลงไปด้วยนะ!"
2000620-32 = "[s3] \"ก็นะ คราวนี้อาจจะดีก็ได้...\"\n[s4] \"เกิดอะไรขึ้นถึงได้ทำอะไรดีๆ แบบนี้เนี่ย...\""
2000620-35 = "...เมื่อกี้พูดว่าอะไรนะ?"
2000620-36 = "ยังไงก็เถอะ ตอนนี้เรื่องนั้นมันไม่สำคัญหรอก!"
2000620-37 = "และที่ฉันเรียกให้คุณครูออกมาตั้งแต่เช้าแบบนี้ ไม่ใช่แค่เพื่อจะสาธิตการฉีดน้ำหอมเท่านั้นหรอกนะ!"
2000620-38 = "แต่ท่านซายะมีเรื่องจะให้ครูช่วยนิดหน่อยน่ะ ถ้าจะฉีดน้ำหอมให้ทั่วสวนสาธารณะนี้ละก็ มันต้องมีผู้ช่วยน่ะ"
2000620-39 = "พอออกไปฉีดน้ำหอมให้ทั่วๆ แล้ว ก็ต้องกลับมาเตรียมตัวเพื่อที่จะไปต่ออีกที่ พูดแค่นี้ก็พอจะเข้าใจ#nแล้วใช่มั้ย?"
2000620-40 = "...หืม?"
2000620-41 = "เข้าใจที่ฉันบอกแล้ว แต่ทำไมฉันถึงแต่งตัวแบบนี้งั้นเหรอ? อืม... ครูคิดว่าไงล่ะ?"
2000620-45 = "อ่า..."
2000620-51 = "สเกตบอร์ดนี่เหรอ...?"
2000620-52 = "ทำไมถึงไม่ขี่จักรยานหรือใช้สกู๊ตเตอร์ธรรมดาๆ แต่กลับมาใช้สเกตบอร์ดแบบนี้แทนน่ะเหรอ...?"
2000620-56 = "...ฮ่าๆๆ พูดอะไรน่ะ ครู! พูดอะไรแปลกชะมัดเลย!"
2000620-62 = "ก็แหงอยู่แล้ว สเกตบอร์ดมันมีประโยชน์มากกว่าน่ะสิ! แถมยังได้เปรียบกว่าพวกจักรยานหรือสกู๊ตเตอร์#nตั้งเยอะ!"
2000620-63 = "[s5] \"ได้เปรียบกว่างั้นเหรอ?\"\n[s6] \"ปกติมันน่าจะตรงกันข้ามเลยไม่ใช่เหรอ...?\""
2000620-66 = "เฮ้อ~"
2000620-67 = "เพราะแบบนี้ไง... พวกคนธรรมดาน่ะ ไม่มีวันเข้าใจความคิดของอัจฉริยะได้หรอก"
2000620-68 = "ฟังให้ดีละ ถ้าขี่จักรยานหรือสกู๊ตเตอร์มันก็ต้องใช้สองมือจับถูกมั้ยล่ะ? แถมถึงจะปล่อยมือก็ยังขี่ได้แต่#nทางตรงอีกด้วยใช่มั้ย?"
2000620-69 = "แล้วจะทำยังไงกับงานวันนี้ล่ะ? ถ้าจะฉีดน้ำหอมให้ทั่วๆ ละก็ ใช้มือทั้งสองข้างจะไม่สะดวกกว่ารึไง?"
2000620-70 = "ก็มันต้องใช้มือทั้งสองข้างถือขวดน้ำหอมไงล่ะ"
2000620-71 = "เวลาใช้สเกตบอร์ดน่ะ จะใช้มือทั้งสองข้างได้อย่างอิสระเลยนะ! แถมสเกตบอร์ดก็ยังซอกแซกไปตาม#nซอกซอยหรือถนนได้คล่องตัวมากกว่าจักรยานหรือสกู๊ตเตอร์อีกด้วย!"
2000620-72 = "แต่ก็อย่างที่ครูคิดนั่นแหละว่าจะทำแบบนั้นได้มันก็ขึ้นอยู่กับความสามารถของคนเล่นสเกตบอร์ด้วย..."
2000620-73 = "แต่ว่าท่านซายะน่ะ... เพอร์เฟ็กต์! ทั้งการปรุงยาตัวใหม่ ทั้งความสามารถในการเล่นสเกตบอร์ด... สมกับเป็นอัจฉริยะเลยใช่มั้ยล่ะ?"
2000620-74 = "เพราะงั้นหายห่วงได้ สเกตบอร์ดนี่เหมาะกับฉันที่สุดแล้ว!"
2000620-75 = "เอาละๆ อย่ามัวคุยเรื่องไร้สาระอยู่เลย!!"
2000620-76 = "ตอนนี้เราไม่มีเวลามารอช้าแล้ว! รีบไปฉีดน้ำหอมให้ทั่ว ก่อนคนอื่นๆ จะมาที่สวนสาธารณะนี้กันเถอะ!"
2000620-77 = "ก่อนอื่นก็ต้องถือน้ำหอมไว้ข้างละขวด..."
2000620-81 = "ถ้างั้น... ฉันไปก่อนนะ! ช่วยเตรียมขวดต่อไปรอไว้เลยนะครู!"
2000620-86 = "ฟิ้วววว~!"
2000620-95 = "หืม.... อื้มมมม...?"
2000620-96 = "อะ...อะไรกัน ทะ...ทำไมจู่ๆ...ถึงรู้สึกแบบนี้ เอ๊ะ...?"
2000620-97 = "ทำไมจู่ๆ ก็รู้สึกเหมือน 'ร่างกายและจิตใจผ่อนคลาย' ขึ้นมาแบบนี้ล่ะ... ตั้งใจหน่อยๆ..."
2000620-98 = "อ่า..."
2000620-102 = "อ๊าาาาาา!?!?!?"
2000620-115 = "(คุณครูรีบวิ่งเข้าไปหาซายะที่ล้มหน้าคะมำอยู่ และได้กลิ่นหอม 'ที่ช่วยให้ร่างกายและจิตใจผ่อนคลาย' หอมฟุ้งออกมาจากตัวซายะ)"
2000620-116 = "(หลังจากตรวจดูแล้วว่าซายะไม่ได้บาดเจ็บอะไร ทั้งสองคนก็ช่วยกันเอาน้ำหอมไปฉีดจนทั่วบริเวณ#nสวนสาธารณะ)"

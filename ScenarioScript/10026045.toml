[translation]
10026045-9 = "......!?  อะ... อะไรน่ะ!?  ทำไมจู่ๆ ก็มีเสียงปืน??"
10026045-10 = "น่าจะดังมาจากด้านในซากปรักหักพังนะ... คุณครูกับคุณอุยยังอยู่ในนั้นเหรอคะ?"
10026045-18 = "คะ... คุณฮินาตะ! คุณฮินาตะ!!!"
10026045-19 = "คะ... คุณอุย!?  เป็นอะไรมาเหรอคะ?"
10026045-20 = "คุณครูก็เหงื่อชุ่มตัวมาเลย..."
10026045-21 = "อุ๊ย... ทั้งสองคนมาพร้อมกับเสียงลมหายใจหยาบกร้านกับเหงื่อเปียกโชกแบบนั้น..."
10026045-22 = "ช่างเถอะน่า!!  ขะ... ข้างในนั้นน่ะ... ข้างในนั้น!!"
10026045-23 = "...หืม? ข้างใน...? หมายถึงข้างในซากปรักหักพังเหรอคะ?"
10026045-24 = "หรือว่าจะเป็นคนที่คุณครูเห็นเมื่อกี้..."
10026045-30 = "มิเมซิส!!  อะ... ออกมาแล้ว! ออกมาโน่นแล้ว!!"
10026045-31 = "เราต้องเตรียมรับมือแล้วละค่ะ!!"
10026045-36 = "......!?  อะ... อะไรน่ะ??  ปืนยิงระเบิด!?  ในกระเป๋านั่นมีอะไรแบบนั้นด้วยเหรอ!?"
10026045-37 = "เอ๋... เดี๋ยวก่อนนะคะ คุณฮินาตะ ถ้ายิงปืนนั่นตอนนี้ น่าจะเป็นปัญหาได้..."
10026045-39 = "ฉันไม่รู้หรอกนะคะว่าทำไมถึงต้องโมโหกันขนาดนั้น... แต่ถ้าจะมาคุกคามสองคนนี้ ฉันก็ยอมไม่ได้ค่ะ!!"
10026045-40 = "ช่วยกลับไปที่ที่เคยจากมาอย่างว่าง่ายเถอะนะคะ!!"
10026045-49 = "อ่า... ซากปรักหักพัง... พังไปแล้วเลย..."
10026045-50 = "ตอนไปรายงานคุณซากุระโกะ คงได้เห็นภาพอะไรสนุกๆ แน่เลยค่ะ"
10026045-51 = "......!?  หะ... หืม!?  สะ... เสียงเมื่อกี้มันอะไรกันคะ!?  เกิดเรื่องอะไรเหรอคะ?"
10026045-52 = "...คะ??  ซากปรักหักพังย่อยยับไปแล้วงั้นเหรอคะ? นี่มันอะไรกัน...?"
10026045-53 = "............"
10026045-58 = "คะ... คุณอุย!?  คุณอุยเป็นลมไปแล้วค่ะ!!"
10026045-59 = "คุณอุย! ทำไมถึงเป็นแบบนี้ไปล่ะคะ? ตั้งสติสิคะ! คุณอุย!!"

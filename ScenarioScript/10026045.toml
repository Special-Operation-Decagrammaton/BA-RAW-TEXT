[translation]
10026045-9 = "……那，那是什麼聲音！？怎麼會有槍聲！？"
10026045-10 = "好像是從遺跡裡傳來的……老師和憂同學還沒有出來嗎？"
10026045-18 = "日，日向同學！日向同學！！！"
10026045-19 = "憂，憂同學！？你怎麼了？"
10026045-20 = "連老師也汗流浹背的……！"
10026045-21 = "哎呀……你們兩位都汗流浹背，呼吸也十分倉促……"
10026045-22 = "別鬧了！！那，那裡面……那裡面！！"
10026045-23 = "……嗯？裡面……？"
10026045-24 = "該不會是老師之前看到的……"
10026045-30 = "出，出現了！！複製出現了！！"
10026045-31 = "得想個辦法才行！！"
10026045-36 = "……什，什麼！？榴彈發射器！？#n那個背包裡一直裝著這種東西嗎！？"
10026045-37 = "咦……等等，日向同學，現在發射榴彈的話……"
10026045-39 = "雖然不知道你們為什麼出現……但我絕不容許有人試圖傷害他們兩人！！"
10026045-40 = "請乖乖回去該回去的地方吧！！"
10026045-49 = "哎呀呀……遺跡……果然崩塌了呢……"
10026045-50 = "這可真是……看來之後跟櫻子同學說明的時候，會有好戲可看了……"
10026045-51 = "……嗯，嗯！？發，發生什麼事了！？#n剛才的聲音是什麼……！？到底怎麼了？"
10026045-52 = "……遺跡……塌了？#n這，這到底……？"
10026045-53 = "…………"
10026045-58 = "憂，憂同學！？憂同學昏倒了！！"
10026045-59 = "憂同學！沒事吧！請振作一點！憂同學！！"

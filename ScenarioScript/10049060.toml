[translation]
10049060-1 = "第6話;自衛隊不會氣餒！ "
10049060-2 = "……"
10049060-3 = "哎呀，耶嘿嘿……"
10049060-4 = "對不起，澪紗同學。"
10049060-5 = "消毒藥水的刺痛感應該很強才對……澪紗同學真堅強呢。"
10049060-6 = "嘿嘿，沒事沒事！這種擦傷我已經習慣了！"
10049060-7 = "對自衛隊的超級明星宇沢澪紗來說，這點程度不算什麼！"
10049060-8 = "尤其我現在可是正義的魔法少女Thermite Pink呢！"
10049060-9 = "澪紗同學果然有很多值得我學習的地方呢。"
10049060-10 = "……"
10049060-11 = "真是一團糟啊。"
10049060-12 = "在不適合自己的場合，做了不適合自己的行為。"
10049060-13 = "[s1]「要同時兼顧演戲跟戰鬥很辛苦吧。」\n[s2]「任何人都會面臨這種情況的。」"
10049060-16 = "不是的，老師。我指的並不是今天的事。"
10049060-17 = "而是從我開始自衛隊的活動……"
10049060-18 = "不，或許在更早之前……守月鈴美就已經亂成一團了吧。"
10049060-20 = "鈴美同學……？"
10049060-21 = "……我可以，稍微說出一些心裡的負擔嗎。"
10049060-22 = "雖然把自己的過去說出來……也只會在對方心裡增加一塊石頭而已。"
10049060-23 = "但是即便如此，如果兩位願意的話……"
10049060-24 = "[s3]「如果是鈴美的石頭，無論多少我都會接住的。」\n[s4]「坦率輕鬆地說出來吧。」"
10049060-27 = "自衛隊裡沒有外人！"
10049060-28 = "我宇沢澪紗會跟鈴美同學一起分擔的！"
10049060-29 = "……謝謝你們。"
10049060-33 = "我偶爾……會聽到一些傳聞。"
10049060-34 = "守月鈴美為什麼不加入實現正義部……而是以自衛隊的身分活動呢？#n他是不是討厭實現正義部？"
10049060-35 = "類似這樣的傳聞時不時就會出現。"
10049060-36 = "……"
10049060-40 = "該不會是因為進不了實現正義部，所以才故意這麼做的吧？"
10049060-45 = "……"
10049060-46 = "其實……我一年級的時候，是實現正義部的成員。"
10049060-50 = "鈴美同學……參加過實現正義部？"
10049060-51 = "……雖然入部後沒多久，我就退出了。"
10049060-52 = "如果要說我沒有想隱瞞這件事的話……那是騙人的。"
10049060-53 = "即便自以為已經做好了結……看來事情果然沒有那麼容易呢。"
10049060-54 = "麻白同學……應該也知道吧？"
10049060-55 = "……是的。雖然只是聽說過而已。"
10049060-56 = "聽說你以前曾經是實現正義部的一員。"
10049060-57 = "……果然如此。"
10049060-58 = "傳言是很難避免的。#n我也知道偶爾還是有人在談論與我有關的事情。"
10049060-59 = "不過諸如「覺得實現正義部不合理」或「我與某些人不和」之類的說法都不是事實。"
10049060-60 = "真正的理由，反而是更加微不足道……更加令人羞愧的事。"
10049060-61 = "我只是因為無法融入大家，又害怕自己一個人……所以逃走了而已。"
10049060-62 = "[ns]「無法融入實現正義部……？」"
10049060-63 = "是的，老師。"
10049060-64 = "實現正義部是個階級明確、需要集體生活的大型組織。"
10049060-65 = "因此理所當然地會經常與同年級、同職位的學生一起行動。"
10049060-66 = "一起吃飯閒聊，記住彼此的臉……"
10049060-67 = "而我……說來羞愧，這些都是我非常不擅長的事。"
10049060-68 = "聊天時只要話題一停下來，那瞬間的沉默就會讓我感到無比害怕……"
10049060-69 = "……擔心對話是不是因為自己才會中斷的。"
10049060-70 = "在我的印象中，為了避免那種情況而勉強自己接話的情況不勝枚舉。"
10049060-71 = "我還是第一次知道這件事……"
10049060-72 = "畢竟在離開實現正義部之後，我的心情已經輕鬆了很多。"
10049060-73 = "不過當時的生活，對我而言真的非常痛苦。#n無論有人關心，還是沒有人關心……都會讓我感到坐立難安。"
10049060-74 = "事情做得好也害怕，做不好更害怕。"
10049060-75 = "比起那些街上的太妹……"
10049060-76 = "我更害怕讓那些把我當成朋友的人感到失望……"
10049060-77 = "所以……我才會選擇離開實現正義部。"
10049060-78 = "……這就是名為守月鈴美的膽小鬼的故事。"
10049060-79 = "[ns5]「不，鈴美才不是什麼膽小鬼。」\n[ns6]「打從我來到奇普托斯的那天開始，你一直都非常勇敢。」"
10049060-82 = "[ns7]「第一次指揮時的事情……我直到現在都還記得。」\n[ns8]「當時勇敢的鈴美毫不猶豫地聽從了我的指揮。」"
10049060-85 = "老師……"
10049060-86 = "老師說的沒錯！"
10049060-87 = "在我認識的人當中，鈴美同學就是最勇敢、最帥氣的人！"
10049060-88 = "就連自衛隊的活動也做得很好！"
10049060-89 = "默默堅持著那麼辛苦的工作的鈴美同學，我一直都覺得非常帥氣！"
10049060-90 = "守護街道是「總得有人去做的事」……而我只不過是擔任那個角色而已。"
10049060-91 = "結果……卻從最適合達成目標的實現正義部逃了出來……"
10049060-92 = "「守月鈴美」一直害怕成為「那個人」。"
10049060-93 = "「三一的行走閃光彈」……雖然我之前說過不喜歡這個綽號。"
10049060-94 = "不過從某些方面來說……"
10049060-95 = "其實在我心裡……對於那個外號也存在幾分喜歡。"
10049060-96 = "雖然有點羞恥，不過它能為我掩蓋住「守月鈴美」這個名字。"
10049060-97 = "同理，即便只是角色扮演……我也不討厭「Thermite White」這個稱呼。"
10049060-98 = "[s9]「我認為閃光彈是個很棒的綽號哦！」\n[s10]「而且我一直都覺得鈴美的名字非常好聽！」"
10049060-101 = "……"
10049060-102 = "老師您總是這麼溫柔呢。"
10049060-103 = "不過，我已經打算要放棄擔任自衛隊了。"
10049060-104 = "畢竟自衛隊的活動……說白了也只是一般人的行為而已。"
10049060-105 = "並不像實現正義部那樣，擁有經過認可的強制力。"
10049060-106 = "單純……只是普通人在恣意地發洩暴力。"
10049060-107 = "明明沒有資格，卻選擇對特定的對象施暴……"
10049060-108 = "這種行為只不過是自我滿足罷了。#n是我壓抑不住自己……才會做出這種事情。"
10049060-109 = "某種程度上……就跟那些不良分子沒什麼兩樣。"
10049060-110 = "不對──！！"
10049060-114 = "大錯特錯！！完全不對！！"
10049060-115 = "澪紗同學！？"
10049060-116 = "就算是鈴美同學自己，我也不能接受你這樣說鈴美同學的壞話！"
10049060-117 = "從你第一次幫助我開始……鈴美同學就是我的英雄！"
10049060-118 = "鈴美同學絕對不是為了自我滿足而巡邏的人！"
10049060-119 = "無論下雨也好、颳風也好、腳受傷也好……鈴美同學從來都沒有停止過巡邏！#n那種行為怎麼可能會是自我滿足！"
10049060-120 = "是不是實現正義部或正式的組織，那些東西根本不重要！"
10049060-121 = "鈴美同學跟不良分子完全不一樣！請不要認為自己沒有資格！"
10049060-122 = "我……真的很喜歡和鈴美同學一起巡邏……！"
10049060-123 = "一起分享著耳機裡的音樂，一起遇到許多有趣的事！"
10049060-125 = "…………"
10049060-126 = "如果[ruby=  ・     ・     ・     ・  ]澪紗同學[/ruby]願意這麼想的話……那就太好了。"
10049060-132 = "不只是我而已！#n下雨的時候，棉花糖的攤販會休息，公園裡的混混也會回家。"
10049060-133 = "但鈴美同學不會！"
10049060-134 = "不管有沒有下雨，你都照樣會為了和平而巡邏──這就是你跟混混完全不同的地方！"
10049060-135 = "鈴美同學就像魔法少女一樣，永遠站在正義的一方！"
10049060-136 = "永遠……站在正義的一方。"
10049060-137 = "謝謝你。"
10049060-138 = "我真的很高興……但是……"
10049060-143 = "……對不起。"
10049060-144 = "鈴美同學……"
10049060-145 = "自衛隊……你真的要放棄嗎……？"
10049060-146 = "…………"
10049060-148 = "[ns]「澪紗。」"
10049060-149 = "是？"
10049060-150 = "[s]「過來這邊一下……」"
10049060-155 = "老師，怎麼了？"
10049060-156 = "[s]「我們給鈴美一點時間吧。」"
10049060-157 = "可是……我一想到鈴美同學要離開自衛隊……"
10049060-158 = "心裡……就覺得好痛好痛。"
10049060-159 = "我明明受了鈴美同學這麼多幫助……"
10049060-160 = "卻什麼忙都幫不上……"
10049060-161 = "這樣下去，我欠他的人情只會越來越多……"
10049060-162 = "[ns]「鈴美不會把那些視為人情債的。」"
10049060-164 = "[ns]「我們就相信鈴美，讓他稍微休息一下吧。」"
10049060-170 = "…………"
10049060-178 = "[ns]「鈴美。」"
10049060-179 = "……是的，老師。"
10049060-181 = "……（吸）。#n這裡是觀測組的麻白。現場聽得到嗎？"
10049060-185 = "……是，我們聽得見。"
10049060-186 = "你在塔上很冷嗎？#n聲音聽起來好像感冒了……"
10049060-187 = "我沒事……（吸）"
10049060-188 = "抱歉打擾各位休息，不過我在附近觀測到了目標。"
10049060-189 = "出現了……疑似河駒風良舞的身影。"
10049060-190 = "[s11]「疑似……？」\n[s12]「……良舞的身影？」"
10049060-193 = "麻煩到現場進行詳細確認。"
10049060-198 = "鈴美同學……"
10049060-199 = "……"
10049060-200 = "……好的。#n我……準備好了。"
10049060-201 = "[ns]「鈴美。」"
10049060-203 = "[ns13]「無論是實現正義部還是自衛隊都無所謂。」\n[ns14]「讓他們見識鈴美和澪紗真正的實力吧。」"
10049060-206 = "……"
10049060-207 = "……是。"
10049060-208 = "既然這是已經開始的任務……"
10049060-209 = "我立刻前往確認目標。"

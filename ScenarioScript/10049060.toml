[translation]
10049060-1 = "ตอนที่ 6;กลุ่มรักษาความสงบจะไม่มีวันยอมแพ้!"
10049060-2 = "......"
10049060-3 = "โอ๊ย... แหะๆๆ..."
10049060-4 = "ขอโทษค่ะ คุณเรอิสะ น้ำยาล้างแผลแสบใช่มั้ยคะ?"
10049060-5 = "แผลน่าจะเจ็บมากเลย แต่คุณเรอิสะก็เข้มแข็งจังเลยนะคะ"
10049060-6 = "แหะๆ ไม่หรอกค่ะ! แผลขีดข่วนแค่นี้ ฉันชินแล้วละค่ะ"
10049060-7 = "สำหรับเรอิสะ ซูเปอร์สตาร์แห่งกลุ่มรักษาความสงบแล้ว แค่นี้เรื่องจิ๊บๆ ค่ะ!"
10049060-8 = "แล้วตอนนี้ฉันก็เป็นสาวน้อยเวทมนตร์ผู้ผดุงความยุติธรรม เทอร์ไมต์ พิงค์นี่คะ!"
10049060-9 = "ฉันได้เรียนรู้อะไรจากคุณเรอิสะเยอะเลยค่ะ"
10049060-10 = "......"
10049060-11 = "ไม่ได้เรื่องเลยนะคะ"
10049060-12 = "ฉันอยู่ในที่ที่ไม่ควร และทำในสิ่งที่ไม่เหมาะสมด้วยค่ะ"
10049060-13 = "[s1] \"ทั้งการแสดง ทั้งต่อสู้ วันนี้คงเหนื่อยน่าดูเลยนะ\"\n[s2] \"ชีวิตเราก็ต้องมีวันแบบนี้กันบ้างละนะ\""
10049060-16 = "เปล่าหรอกค่ะ คุณครู ฉันไม่ได้หมายถึงวันนี้ค่ะ"
10049060-17 = "ตั้งแต่ฉันเริ่มงานกลุ่มรักษาความสงบ จนมาถึงตอนนี้..."
10049060-18 = "ไม่สิ โมริซึกิ สึซึมิคนนี้ไม่ได้เรื่องมาตั้งแต่ก่อนเริ่มงานกลุ่มรักษาความสงบแล้วค่ะ"
10049060-20 = "คุณสึซึมิ...?"
10049060-21 = "ฉันขอพูดสิ่งที่อยู่ในใจได้มั้ยคะ...?"
10049060-22 = "การเล่าเรื่องส่วนตัวในอดีตให้คนอื่นฟัง... ก็คงไม่ต่างกับการตอกย้ำความเจ็บปวดที่อยู่ในใจค่ะ"
10049060-23 = "แต่ถึงยังไง ถ้าคุณครูไม่ว่าอะไรละก็..."
10049060-24 = "[s3] \"สึซึมิบอกครูได้ทุกเรื่องเลยนะ\"\n[s4] \"สึซึมิพูดออกมาได้ตามสบายเลย\""
10049060-27 = "กลุ่มรักษาความสงบอยู่กับคุณสึซึมิเสมอค่ะ!"
10049060-28 = "อุซาวะ เรอิสะคนนี้จะช่วยแบ่งเบาความเจ็บปวดของคุณสึซึมิให้เองค่ะ!"
10049060-29 = "ขอบคุณค่ะ..."
10049060-33 = "บางครั้งฉันก็ได้ยินเรื่องแบบนี้จากคนอื่นค่ะ"
10049060-34 = "ทำไมโมริซึกิ สึซึมิ... ถึงมาทำกิจกรรมของกลุ่มรักษาความสงบ แทนที่จะเป็นชมรมทวงความยุติธรรม เพราะเธอไม่ชอบชมรมทวงความยุติธรรมหรือเปล่า..."
10049060-35 = "ส่วนใหญ่จะเป็นเรื่องประมาณนี้น่ะค่ะ"
10049060-36 = "......"
10049060-40 = "หรือว่าเข้าชมรมทวงความยุติธรรมไม่ได้ ก็เลยต้องมาอยู่กลุ่มนี้แทน?"
10049060-45 = "......"
10049060-46 = "ที่จริง... ตอนอยู่ชั้นปีที่ 1 ฉันเคยสังกัดชมรมทวงความยุติธรรมค่ะ"
10049060-50 = "คุณสึซึมิ? เคยอยู่ชมรมทวงความยุติธรรมเหรอคะ?"
10049060-51 = "แต่เข้าไปได้ไม่นาน ฉันก็ถอนตัวออกมาค่ะ..."
10049060-52 = "ถ้าบอกว่าไม่คิดจะปกปิด... ก็คงเป็นการโกหกค่ะ"
10049060-53 = "ฉันคิดว่าฉันจัดการตัวเองได้เรียบร้อยแล้ว... แต่มันก็ไม่เป็นไปตามที่คิดเลยค่ะ"
10049060-54 = "คุณมาชิโระเองก็... น่าจะรู้เรื่องนี้ไม่ใช่เหรอคะ?"
10049060-55 = "ค่ะ... ถึงจะได้ยินจากข่าวลือก็เถอะค่ะ"
10049060-56 = "ฉันเคยได้ยินมาว่าเมื่อก่อนคุณสึซึมิเคยอยู่ชมรมทวงความยุติธรรมค่ะ"
10049060-57 = "อย่างนั้นสินะคะ..."
10049060-58 = "ฉันรู้ว่าข่าวลือเป็นสิ่งที่หลีกเลี่ยงไม่ได้ และเรื่องราวเกี่ยวกับฉันก็ยังถูกเล่ากันปากต่อปาก"
10049060-59 = "ข่าวลือที่ว่าฉันรู้สึกว่าชมรมทวงความยุติธรรมเป็นชมรมที่ไม่ชอบธรรมเสียเอง หรือฉันไม่ลงรอยกับใครในนั้น ไม่เป็นความจริงเลยค่ะ"
10049060-60 = "ความจริงเหตุผลมันเป็นเรื่องเล็กน้อย ฉันก็เลยยิ่งรู้สึกอับอายมากกว่า"
10049060-61 = "ฉันเข้ากับคนอื่นไม่ได้ และฉันก็กลัวการอยู่คนเดียว... ฉันก็เลยหนีออกมาน่ะค่ะ"
10049060-62 = "[ns] \"ปรับตัวให้เข้ากับชมรมทวงความยุติธรรมไม่ได้เหรอ...?\""
10049060-63 = "ค่ะ คุณครู"
10049060-64 = "ชมรมทวงความยุติธรรมเป็นองค์กรที่เข้มงวดเรื่องลำดับตำแหน่ง และก็ต้องใช้ชีวิตประจำวันด้วยกัน#nเป็นกลุ่มค่ะ"
10049060-65 = "ก็เลยไม่แปลกที่นักเรียนชั้นปีเดียวกันที่มีตำแหน่งเดียวกันจะมาใช้เวลาร่วมกัน"
10049060-66 = "ทั้งกินข้าวด้วยกัน พูดคุยเรื่องเล็กๆ น้อยๆ กัน แล้วก็จำหน้ากันได้..."
10049060-67 = "แต่น่าอายที่... ฉันทำเรื่องแบบนั้นไม่ได้ค่ะ"
10049060-68 = "แม้แต่ตอนคุยกัน ถ้าหัวข้อสนทนาถูกขัดจังหวะจนเกิดความเงียบ ฉันก็จะกลัวมาก..."
10049060-69 = "ฉันรู้สึกเหมือนตัวเองเป็นคนทำให้การสนทนาจบลงน่ะค่ะ..."
10049060-70 = "ฉันก็เลยมีความทรงจำมากมายเกี่ยวกับการพยายามให้บทสนทนาดำเนินต่อไปได้ ต่อให้จะอึดอัดก็ตามค่ะ"
10049060-71 = "ฉันไม่รู้มาก่อนเลยค่ะ..."
10049060-72 = "คงเป็นเพราะฉันสบายใจมากขึ้นหลังจากออกมาจากชมรมทวงความยุติธรรมน่ะค่ะ"
10049060-73 = "แต่ว่าตอนนั้น เรื่องแบบนั้นทำให้ฉันลำบากใจมากค่ะ ฉันก็จะกระวนกระวายไปหมด ไม่ว่าจะมีคนให้ความสนใจ หรือไม่มีใครให้ความสนใจเลยก็ตาม"
10049060-74 = "ฉันกลัวที่จะทำอะไรออกมาได้ดีด้วยค่ะ แน่นอนว่าการทำได้ไม่ดีมันน่ากลัวกว่าค่ะ"
10049060-75 = "น่ากลัวยิ่งกว่าพวกนักเลงที่อยู่ตามถนนอีก..."
10049060-76 = "และสิ่งที่น่ากลัวยิ่งไปกว่านั้นก็คือ การทำให้คนที่ปฏิบัติต่อฉันเหมือนเพื่อนต้องผิดหวัง..."
10049060-77 = "ฉันก็เลย... ลาออกจากชมรมทวงความยุติธรรมค่ะ"
10049060-78 = "และนี่ก็คือ... เรื่องราวของคนขี้ขลาดที่ชื่อโมริซึกิ สึซึมิค่ะ"
10049060-79 = "[ns5] \"ไม่หรอก สึซึมิไม่ใช่คนขี้ขลาดหรอกนะ\"\n[ns6] \"ครูเห็นสึซึมิกล้าหาญตั้งแต่วันแรกที่มาคิโวทอสเลย\""
10049060-82 = "[ns7] \"ครูยังจำการสั่งการแรกได้อยู่เลย ตอนนี้สึซึมิกล้าหาญมาก\"\n[ns8] \"สึซึมิผู้กล้าหาญทำตามคำสั่งการของครูแบบไม่ลังเลเลย\""
10049060-85 = "คุณครู..."
10049060-86 = "คุณครูพูดถูกแล้วละค่ะ!"
10049060-87 = "ในบรรดาคนที่ฉันรู้จัก คุณสึซึมิเป็นคนที่กล้าหาญและเท่ที่สุดเลยค่ะ!"
10049060-88 = "คุณสึซึมิทำงานของกลุ่มรักษาความสงบได้ยอดเยี่ยมเลยนี่คะ!"
10049060-89 = "ฉันคิดว่าคุณสึซึมิสง่างามและยอดเยี่ยมมากที่ทำงานยากๆ แบบนั้นได้นะคะ!"
10049060-90 = "ฉันคิดว่าการปกป้องความสงบเรียบร้อยบนท้องถนน \"เป็นหน้าที่ของใครสักคน\" ก็เลยแค่ทำตามหน้าที่นั้นค่ะ"
10049060-91 = "แต่ว่า \"ใครคนนั้น\" ก็หนีออกมาจากชมรมทวงความยุติธรรม..."
10049060-92 = "\"โมริซึกิ สึซึมิ\" กลัวการกลายเป็น \"ใครคนนั้น\" มาตลอดเลยค่ะ"
10049060-93 = "\"มนุษย์แฟลชบอมบ์แห่งทรีนิตี้\"... คือฉายาที่ฉันเคยบอกไปว่าไม่ชอบใช่มั้ยล่ะคะ"
10049060-94 = "แต่ว่าในบางมุมแล้ว..."
10049060-95 = "ใจหนึ่งฉันก็ชอบฉายานั้นค่ะ"
10049060-96 = "ถึงมันจะเป็นฉายาที่ฟังดูน่าอายไปบ้าง แต่มันก็ช่วยปกปิดชื่อ \"โมริซึกิ สึซึมิ\" ที่คนอื่นรู้จักกันน่ะค่ะ"
10049060-97 = "ส่วน \"เทอร์ไมต์ ไวต์\" ถึงจะเป็นแค่ชื่อจากการสวมบทบาท แต่ชื่อนี้ก็ถูกใจฉัน... ด้วยเหตุผลเดียวกันค่ะ"
10049060-98 = "[s9] \"ครูว่ามนุษย์แฟลชบอมบ์เป็นฉายาที่ดีเลยนะ!\"\n[s10] \"ครูว่าสึซึมิเป็นชื่อที่เพราะในตัวแล้วนะ\""
10049060-101 = "......"
10049060-102 = "คุณครูใจดีกับฉันตลอดเลยนะคะ"
10049060-103 = "แต่ว่าตอนนี้... ฉันคิดว่าจะเลิกใช้ชีวิตของกลุ่มรักษาความสงบแล้วค่ะ"
10049060-104 = "ถึงจะเรียกว่าเป็นกิจกรรมของกลุ่มรักษาความสงบ... แต่สุดท้ายมันก็เป็นการกระทำของคนธรรมดา#nทั่วๆ ไป"
10049060-105 = "ไม่ใช่การกระทำของกลุ่มอำนาจที่ได้รับการยอมรับอย่างชมรมทวงความยุติธรรม"
10049060-106 = "แต่เป็นการระเบิดความรุนแรง... ที่คนธรรมดาทั่วไปทำตามอำเภอใจเท่านั้น"
10049060-107 = "ฉันก็แค่ใช้ความรุนแรงกับฝ่ายตรงข้าม ทั้งๆ ที่ไม่มีคุณสมบัติคู่ควรด้วยซ้ำ..."
10049060-108 = "การทำแบบนั้น สุดท้ายแล้วมันคงเป็นการทำเพื่อความพึงพอใจในตนเองเท่านั้นค่ะ มันเป็นแค่สิ่งที่ฉันลงมือทำ... เพราะทนไม่ไหวน่ะค่ะ"
10049060-109 = "ถ้ามาคิดทบทวนให้ดี ฉันว่าการทำแบบนั้นมันก็ไม่ต่างกับพวกนักเลงหรอกค่ะ"
10049060-110 = "แอดดด!!!"
10049060-114 = "ตอบผิดเต็มๆ เลยค่ะ!!"
10049060-115 = "คุณเรอิสะ?!"
10049060-116 = "ถึงคุณสึซึมิจะเป็นคนพูดเอง แต่ถ้าพูดถึงคุณสึซึมิในแง่ไม่ดี ฉันก็จะไม่ยกโทษให้หรอกนะคะ!"
10049060-117 = "ตั้งแต่วินาทีแรกที่มาช่วยเหลือฉัน... คุณสึซึมิก็เป็นฮีโร่ของฉันมาตลอดค่ะ!"
10049060-118 = "คุณสึซึมิน่ะ! ไม่ใช่คนที่เดินลาดตระเวนเพื่อความพึงพอใจส่วนตัวเด็ดขาดค่ะ!"
10049060-119 = "ต่อให้ฝนตก พายุเข้า หรือจะเจ็บเท้า... คุณสึซึมิก็ออกมาลาดตระเวนทุกวันแบบไม่มีวันหยุดเลยนี่คะ! การทำแบบนั้น... ไม่ใช่เพื่อความพึงพอใจในตนเองหรอกค่ะ!"
10049060-120 = "และต่อให้จะเคยอยู่ชมรมทวงความยุติธรรมหรือไม่ก็ตาม! แล้วมันเกี่ยวอะไรกันด้วยล่ะคะ!"
10049060-121 = "คุณสึซึมิต่างกับนักเลงพวกนั้นอย่างสิ้นเชิงค่ะ! อย่าคิดว่าตัวเองไม่คู่ควรเลยนะคะ!"
10049060-122 = "ฉัน... ชอบการได้เดินลาดตระเวนกับคุณสึซึมินะคะ...!"
10049060-123 = "เราแบ่งกันฟังเพลงด้วยหูฟังอันเดียวกัน แล้วก็ได้ทำเรื่องสนุกๆ ด้วยกันตั้งเยอะ!"
10049060-125 = "......"
10049060-126 = "ขอบคุณที่คิดอย่างนั้นนะคะ แต่ว่าคุณเรอิสะน่ะ..."
10049060-132 = "ไม่ใช่แค่นั้นนะคะ! ถ้าวันไหนฝนตก ร้านขนมสายไหมก็จะปิด แล้วพวกนักเลงก็จะกลับบ้านค่ะ"
10049060-133 = "แต่ว่าคุณสึซึมิไม่เป็นอย่างนั้น!"
10049060-134 = "ต่อให้ฝนจะเทลงมาหนักแค่ไหน แต่คุณสึซึมิก็เดินลาดตระเวนเพื่อความสงบต่อไม่ใช่เหรอคะ? นี่ละค่ะสิ่งที่ทำให้คุณสึซึมิแตกต่างจากนักเลง อันธพาล หรือแยงกี้สาวอะไรพวกนั้น!"
10049060-135 = "ก็คุณสึซึมิอยู่ข้างความยุติธรรมมาโดยตลอด เหมือนกับสาวน้อยเวทมนตร์ยังไงล่ะคะ!"
10049060-136 = "อยู่ข้างความยุติธรรม... มาโดยตลอด"
10049060-137 = "ขอบคุณสำหรับคำพูดดีๆ นะคะ"
10049060-138 = "ฉันดีใจจริงๆ... แต่ก็..."
10049060-143 = "ต้องขอโทษ... ด้วยนะคะ..."
10049060-144 = "คุณสึซึมิ..."
10049060-145 = "ไม่ได้จะลาออก... จากกลุ่มรักษาความสงบใช่มั้ยคะ?"
10049060-146 = "......"
10049060-148 = "[ns] \"เรอิสะ\""
10049060-149 = "คะ?"
10049060-150 = "[s] \"มาทางนี้เดี๋ยวหนึ่งสิ...\""
10049060-155 = "มีอะไรเหรอคะ คุณครู?"
10049060-156 = "[s] \"ให้เวลาสึซึมิสักหน่อยเถอะนะ\""

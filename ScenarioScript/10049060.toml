[translation]
10049060-1 = "Episode 6;The Vigilante Crew Never Backs Down!"
10049060-2 = "..."
10049060-3 = "Oww! Eeesh..."
10049060-4 = "Sorry, Reisa. It's disinfectant. It's going to sting."
10049060-5 = "This is quite a cut. You're tough."
10049060-6 = "Heehee. It's nothing! I'm used to getting scratches like this one."
10049060-7 = "I am Superstar Reisa of the Vigilante Crew, after all!"
10049060-8 = "AND I'm also Thermite Pink, the magical girl of justice!"
10049060-9 = "I have a lot to learn from you, Reisa."
10049060-10 = "..."
10049060-11 = "This whole thing is such a mess."
10049060-12 = "Everything's gone wrong."
10049060-13 = "[s1] \"It's hard to act and fight at the same time.\"\n[s2] \"Some days are like that.\""
10049060-16 = "I don't just mean what happened today, Sensei."
10049060-17 = "I mean everything, from when I first started the Vigilante Crew."
10049060-18 = "...No, I was a mess before then, even."
10049060-20 = "Suzumi...?"
10049060-21 = "Would you mind if I unburdened myself a bit here?"
10049060-22 = "I know that could make things heavier for you two..."
10049060-23 = "...but even so, if you're okay with it..."
10049060-24 = "[s3] \"I'll carry that weight. Anytime.\"\n[s4] \"Take your time and say whatever you need to.\""
10049060-27 = "We're fellow Vigilantes!"
10049060-28 = "I, Uzawa Reisa, will help you lighten your load!"
10049060-29 = "...Thank you."
10049060-33 = "Well, sometimes I hear people ask..."
10049060-34 = "\"Why doesn't Morizuki Suzumi join the Justice Task Force?\" \"What's with this Vigilante Crew?\" \"Does she hate the Justice Task Force or something?\""
10049060-35 = "Not just \"sometimes.\" People ask that a lot."
10049060-36 = "..."
10049060-40 = "You're just doing this 'cause you couldn't get on the Force, aren't you?"
10049060-45 = "..."
10049060-46 = "...The thing is, I WAS in the Justice Task Force, back when I was a first-year."
10049060-50 = "You were on the Force? Really?"
10049060-51 = "...I left not long after I joined, though."
10049060-52 = "And...I haven't exactly been open about it."
10049060-53 = "I wanted to just tie up all the loose ends and close that chapter...but things don't always go the way I want."
10049060-54 = "I'm sure you've heard about it, Mashiro."
10049060-55 = "...Bits and pieces, yes."
10049060-56 = "I had heard that you were on the Justice Task Force at one point."
10049060-57 = "...I see."
10049060-58 = "Rumors are inevitable, so of course people are going to hear things about me."
10049060-59 = "But what's not true is that I had some big conflict with someone on the Force, or that I thought the Force was unreasonable."
10049060-60 = "It's actually something even more minor, which makes it more embarrassing."
10049060-61 = "...I just had trouble fitting in there, and I was scared of being alone...so I ran away."
10049060-62 = "[ns] \"You must have had trouble adapting to them.\""
10049060-63 = "Yes, Sensei."
10049060-64 = "The Justice Task Force is a giant organization where everybody has their own designated role and regulations."
10049060-65 = "And naturally, people in similar roles gravitate toward each other."
10049060-66 = "Eating together, making small talk, remembering each other's faces..."
10049060-67 = "And this is embarrassing to say...but I was very bad at that."
10049060-68 = "Even when I would sit down and talk, I always worried about running out of things to say."
10049060-69 = "...More specifically, I was worried I'd be the one to kill the conversation."
10049060-70 = "So I often ended up trying to force those conversations to go on and on."
10049060-71 = "This is the first time I heard of that..."
10049060-72 = "And it was a huge relief when I left. I felt like I wouldn't have to do that anymore."
10049060-73 = "It was one of my big problems at the time. Even if no one else really cared if I was awkward or not, it always made me anxious."
10049060-74 = "I kept worrying, \"What if I let them down?\" or, if I was good at something, \"What if I show them up?\""
10049060-75 = "Especially when they thought of me as a friend..."
10049060-76 = "...and there was danger involved, with all the troublemakers and whatnot."
10049060-77 = "So...I left the Justice Task Force."
10049060-78 = "...And that's the story of Morizuki Suzumi, the socially awkward coward."
10049060-79 = "[ns5] \"No, Suzumi. You're not a coward.\"\n[ns6] \"You've been brave for as long as I've known you.\""
10049060-82 = "[ns7] \"I remember the first time I fought alongside you.\"\n[ns8] \"You stepped right up with no hesitation.\""
10049060-85 = "Sensei..."
10049060-86 = "Sensei's right!"
10049060-87 = "You're one of the bravest, coolest people I know, Suzumi!"
10049060-88 = "And you do great work in the Vigilante Crew!"
10049060-89 = "It's HARD work, but you always look so confident and cool while you're doing it!"
10049060-90 = "Well, I figured SOMEONE had to patrol the streets, so I might as well do my part."
10049060-91 = "Then again, the Justice Task Force is supposed to be that \"someone,\" and I ran away from them."
10049060-92 = "Maybe I was scared of being that someone, or at least that KIND of someone."
10049060-93 = "\"Trinity's Running Flash Grenade.\" I don't particularly like that nickname."
10049060-94 = "Well, to be honest..."
10049060-95 = "There was a part of me that did."
10049060-96 = "It's a little embarrassing, but it does keep other people from hearing the name \"Morizuki Suzumi.\""
10049060-97 = "And then there's \"Thermite White.\" Just a character, I know, but...I don't hate that name."
10049060-98 = "[s9] \"'Flash Grenade' is a cool nickname!\"\n[s10] \"I've always thought 'Suzumi' sounds pretty.\""
10049060-101 = "..."
10049060-102 = "You're always so kind, Sensei."
10049060-103 = "But regardless, I plan on quitting the Vigilante Crew."
10049060-104 = "...Not that there's much of a \"crew\" to quit, of course."
10049060-105 = "There's no real authority behind it."
10049060-106 = "Just sudden eruptions of violence...from someone like me, with no business being there."
10049060-107 = "Beating people up without anyone's permission or qualifications..."
10049060-108 = "I suppose it's been a kind of...self-satisfaction, up to this point. When I cut loose, out on the streets, I don't have to hold back anymore."
10049060-109 = "In a way, I'm not much different from the thugs I'm fighting."
10049060-110 = "Wrong!"
10049060-114 = "Completely wrong!"
10049060-115 = "Reisa?!"
10049060-116 = "NOBODY gets to say anything bad about you, Suzumi! Not even you!"
10049060-117 = "Ever since you helped me...you've been my hero!"
10049060-118 = "And you are NOT just going out and beating people up to make yourself feel good!"
10049060-119 = "You go out on patrol when it's rainy, or stormy, or when your feet hurt. Doesn't matter! You're there every single time! That CAN'T feel good, but you do it!"
10049060-120 = "Whether you're still on the Force or not, it doesn't matter!"
10049060-121 = "You ARE qualified to do what you do, and you are NO thug!"
10049060-122 = "Besides...I like going on patrols with you!"
10049060-123 = "We share earbuds and run into lots of fun things!"
10049060-125 = "..."
10049060-126 = "I'm glad you feel that way, Reisa."
10049060-132 = "Even when the rain comes down hard, and the cotton candy stalls all close, and the thugs have all gone home..."
10049060-133 = "...you're still there!"
10049060-134 = "No matter how rough it gets out there, you just keep on protecting the peace. That's what separates you from those thugs!"
10049060-135 = "Because, just like a magical girl, you're always on the side of justice!"
10049060-136 = "Always...on the side of justice."
10049060-137 = "Thank you for your kind words."
10049060-138 = "I really do appreciate them..."
10049060-143 = "...but I'm sorry."
10049060-144 = "Aw, Suzumi..."
10049060-145 = "You're not...really quitting the Vigilante Crew, are you?"
10049060-146 = "..."
10049060-148 = "[ns] \"Reisa.\""
10049060-149 = "What?"
10049060-150 = "[s] \"Come here for a moment...\""
10049060-155 = "What's wrong, Sensei?"
10049060-156 = "[s] \"Let's give Suzumi some time.\""
10049060-157 = "But... I mean, just THINKING about her quitting..."
10049060-158 = "...It makes my heart hurt."
10049060-159 = "She's done so much to help me..."
10049060-160 = "...and I can't help her at all..."
10049060-161 = "If she quits, I'll never be able to pay her back."
10049060-162 = "[ns] \"She won't think of it that way.\""
10049060-164 = "[ns] \"Let's trust Suzumi and give her some time to rest.\""
10049060-170 = "..."
10049060-178 = "[ns] \"Suzumi?\""
10049060-179 = "...Yes, Sensei?"
10049060-181 = "*cough* *sniffle* This is Mashiro from surveillance. Can you hear me out there?"
10049060-185 = "...Yes, we hear you."
10049060-186 = "Is it cold up there in the tower? You sound like you're under the weather..."
10049060-187 = "Not at all. *sniffle*"
10049060-188 = "Sorry to bother you on your break, but I believe I've spotted the target."
10049060-189 = "I have eyes on someone who resembles Komakaze Rabu."
10049060-190 = "[s11] \"Someone...\"\n[s12] \"...who resembles Rabu...?\""
10049060-193 = "Please move in and confirm."
10049060-198 = "Suzumi..."
10049060-199 = "..."
10049060-200 = "...Understood. Moving out."
10049060-201 = "[ns] \"Suzumi.\""
10049060-203 = "[ns13] \"Justice Task Force, Vigilante Crew, it doesn't matter right now.\"\n[ns14] \"Let's show everyone the best of Reisa and Suzumi.\""
10049060-206 = "..."
10049060-207 = "...You're right."
10049060-208 = "We have to finish what we started."
10049060-209 = "Let's go find the target."

[translation]
80000001-1 = "Momoka's Challenge"
80000001-2 = "General Student Council Reception"
80000001-4 = "I was roped into filling out paperwork for Schale after arriving at the General Student Council's offices."
80000001-5 = "*crunch* Mmm. Today's chips are especially good."
80000001-6 = "Now if only I had some entertainment to go along with them..."
80000001-7 = "[s] \"...\""
80000001-8 = "What? Why are you giving me that look?"
80000001-9 = "You can make puppy-dog eyes all you want.#nI'm not helping you with that work."
80000001-10 = "Can't you see I have chips to eat? *munch*"
80000001-11 = "[s] \"Speaking of those chips...\""
80000001-12 = "What? You want some?"
80000001-13 = "Well too bad! I have a strict no-sharing policy!"
80000001-14 = "Huh? You wanna know why I only eat tarako-flavored chips?"
80000001-15 = "What kind of a question is that? Because they're the best, obviously.#n*crunch*"
80000001-16 = "It was love at first taste when I tried my first bag."
80000001-17 = "Just the right amount of salt, the unique savoriness of tarako,#nand the perfect crispiness..."
80000001-18 = "I've never tasted anything more perfect in my life."
80000001-19 = "So why go through the trouble of trying other chips?#nI don't want to ruin my palate."
80000001-20 = "[s] \"But maybe there are other flavors you'd like just as much.\""
80000001-21 = "You think so? Well, I guess it's true that I haven't tried any of the newest ones that have come out..."
80000001-27 = "Which reminds me. I got a bag of these chocolate-flavored chips for free as part of some Valentine's Day promotion."
80000001-28 = "I guess it wouldn't hurt to give them a try."
80000001-29 = "*deep breath* *crunch*"
80000001-32 = "..."
80000001-34 = "Yuck. Who would want their chips to be sweet?"
80000001-35 = "[s] \"Well, they ARE chocolate-flavored...\""
80000001-36 = "Chips are supposed to be salty and savory!"
80000001-37 = "It'd be fine if they were sweet and sour or sweet and savory,#nbut this chocolate flavor is unacceptable!"
80000001-38 = "I'm just gonna throw 'em away."
80000001-42 = "But it does feel like that would be a waste..."
80000001-44 = "Hey, Sensei. I bet you didn't get any chocolate for Valentine's Day, right?"
80000001-48 = "Here. You take 'em!"
80000001-49 = "[s] \"But you just threw them in the trash!\""
80000001-50 = "Come on, don't be shy. Take 'em."
80000001-51 = "It's a gift from me to you!"
80000001-52 = "And in return, you can bring me a crate full of tarako-flavored chips next time you visit."
80000001-53 = "I'll be looking forward to it."

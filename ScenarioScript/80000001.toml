[translation]
80000001-1 = "ความท้าทายของโมโมกะ"
80000001-2 = "ห้องรับรอง องค์การนักเรียน"
80000001-4 = "(คุณครูมาที่องค์การนักเรียนเพื่อจัดการงานของทางชาเล่ต์ และกำลังวุ่นอยู่กับงานเอกสาร)"
80000001-5 = "(ง่ำๆ) อืม... มันฝรั่งทอดวันนี้อร่อยดีนะ"
80000001-6 = "ไม่มีเรื่องสนุกๆ ที่ไหนเลยรึไงนะ..."
80000001-7 = "[s] \"...\""
80000001-8 = "อะไรกัน ทำไมมองฉันแบบนั้นล่ะ?"
80000001-9 = "ถึงจะทำหน้าแบบนั้น แต่ฉันก็ช่วยงานคุณครูไม่ได้หรอกนะ"
80000001-10 = "ตอนนี้ฉันกินมันฝรั่งทอดอยู่ ยุ่งมากเลยล่ะ (ง่ำๆ)"
80000001-11 = "[s] \"เดี๋ยวสิ มันฝรั่งทอดนั่นน่ะ...\""
80000001-12 = "อะไรกัน คิดจะแย่งมันฝรั่งทอดของฉันเหรอ?"
80000001-13 = "ไม่ให้หรอก ให้ตายก็ไม่แบ่งมันฝรั่งทอดรสไข่ปลานี่ให้หรอก!"
80000001-14 = "หืม...? ไม่ได้อยากกิน แค่จะถามว่าทำไมฉันถึงชอบกินมันฝรั่งทอดรสไข่ปลานี่น่ะเหรอ?"
80000001-15 = "ถามเรื่องที่รู้ๆ กันอยู่แล้วทำไมน่ะ แน่นอนว่าก็เพราะมันอร่อยน่ะสิ (ง่ำๆ)"
80000001-16 = "วินาทีที่หยิบแผ่นมันฝรั่งทอดเข้าปากครั้งแรก ฉันรู้สึกเหมือนได้เจอสิ่งที่ตามหามานานเลยล่ะ"
80000001-17 = "รสเค็มที่พอเหมาะกับรสอูมามิของไข่ปลา และรสสัมผัสอันกรุบกรอบ..."
80000001-18 = "ฉันไม่เคยกินอาหารที่รสชาติสมบูรณ์แบบขนาดนี้มาก่อนในชีวิตเลย"
80000001-19 = "เจอของดีแบบนี้ ฉันจะไปกินขนมอื่นอีกทำไมล่ะ? ทำให้เสียอารมณ์เปล่าๆ"
80000001-20 = "[s] \"มันฝรั่งทอดรสอื่นๆ อาจจะอร่อยก็ได้นี่นา?\""
80000001-21 = "อืม... งั้นเหรอ? นั่นสินะ ฉันไม่ได้ลองกินขนมรสใหม่ๆ มานานแล้วเหมือนกัน"
80000001-27 = "พอดีเลย ฉันเพิ่งได้มันฝรั่งทอดรสช็อกโกแลตจากร้านค้าเป็นของขวัญมา..."
80000001-28 = "ชิมสักหน่อยคงไม่เสียหายละมั้ง?"
80000001-29 = "อ้าม... (ง่ำๆ)"
80000001-32 = "..."
80000001-34 = "ทำไมมันฝรั่งทอดถึงหวานขนาดนี้ล่ะ?"
80000001-35 = "[s] \"ก็มันรสช็อกโกแลตนี่นา?\""
80000001-36 = "เป็นไปไม่ได้! มันฝรั่งทอดมันต้องเค็มสิ!"
80000001-37 = "ถึงรสซาวครีมจะมีรสเปรี้ยวนิดๆ ก็เถอะ แต่รสช็อกโกแลตนี่ไม่ไหวจริงๆ ไม่ได้เด็ดขาด!"
80000001-38 = "ต้องเอาไปทิ้งเดี๋ยวนี้..."
80000001-42 = "อืม... แต่พอจะเอาไปทิ้งก็รู้สึกเสียดายอยู่เหมือนกันแฮะ"
80000001-44 = "นี่ คุณครู วันวาเลนไทน์นี้ได้รับช็อกโกแลตบ้างรึยังน่ะ?"
80000001-48 = "เอ้า ฉันให้ช็อกโกแลตก็แล้วกัน รับไปสิ"
80000001-49 = "[s] \"แบบนี้ไม่ต้องก็ได้?!\""
80000001-50 = "โธ่เอ๊ย ไม่ต้องเขินหรอกน่า ห้ามปฏิเสธนะ"
80000001-51 = "นี่เป็นของขวัญจากฉันเลยนะ!"
80000001-52 = "แต่ถ้าจะตอบแทนกันละก็ คราวหน้าตอนมาที่องค์การนักเรียนก็ซื้อขนมมันฝรั่งทอดรสไข่ปลา#nมาเยอะๆ ด้วยล่ะ"
80000001-53 = "คิกคิก... แล้วฉันจะรอนะ"

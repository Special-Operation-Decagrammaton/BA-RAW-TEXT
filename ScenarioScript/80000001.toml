[translation]
80000001-1 = "桃香的挑戰"
80000001-2 = "聯邦學生會．接待室"
80000001-4 = "（因為夏萊的業務而到聯邦學生會處理文件）"
80000001-5 = "……好吃。"
80000001-6 = "哎呀，能不能發生點有趣的事啊……"
80000001-7 = "[s]「……」"
80000001-8 = "……咦，為什麼要露出那種表情？"
80000001-9 = "就算那樣盯著我看，我也不會幫老師工作的哦。"
80000001-10 = "我現在正忙著吃洋芋片，實在是沒空啊。（喀滋）"
80000001-11 = "[s]「那個洋芋片……」"
80000001-12 = "咦，難道真的在覬覦我的洋芋片嗎？"
80000001-13 = "不行，這個真的不能分你！"
80000001-14 = "……嗯？你說不是那個意思，只是好奇我為什麼只吃明太子口味的洋芋片？"
80000001-15 = "那還用問嗎，當然是因為好吃啊。（喀滋）"
80000001-16 = "在我第一次與明太子洋芋片相遇的瞬間，感受到了命運的指引。"
80000001-17 = "適當的鹹香搭配明太子特有的鮮味，再加上酥脆的口感……"
80000001-18 = "完成度這麼高的食物，除了這個之外我還真沒見過。"
80000001-19 = "既然如此，就沒有吃其他零食的必要了不是嗎？我可不想浪費我的胃口。"
80000001-20 = "[s]「其他口味的洋芋片說不定也很好吃哦？」"
80000001-21 = "唔嗯……確實，我很久沒有嘗試新產品了……"
80000001-27 = "……這麼說來，之前拿到了這個贈品啊。為了紀念情人節推出的巧克力洋芋片。"
80000001-28 = "就稍微試試味道吧……"
80000001-29 = "啊姆……"
80000001-32 = "……"
80000001-34 = "……明明是洋芋片卻是甜的。"
80000001-35 = "[s]「因為是巧克力口味啊……？」"
80000001-36 = "真不敢相信！洋芋片怎麼可以不是鹹的！"
80000001-37 = "酸奶油口味之類的勉強還在容忍範圍之內，這個真的不行！"
80000001-38 = "真的不行……"
80000001-42 = "唔，說是這麼說，丟掉又很浪費……"
80000001-44 = "啊，話說今天是情人節對吧？"
80000001-48 = "來，這個就當成是我送老師的巧克力了。"
80000001-49 = "[s]「吃過的！？」"
80000001-50 = "哎呀哎呀不用害羞。"
80000001-51 = "收下吧，別在意！"
80000001-52 = "不過相對的，下次來的時候要買一打明太子洋芋片給我哦。"
80000001-53 = "呵呵，我很期待唷？"

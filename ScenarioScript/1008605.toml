[translation]
1008605-1 = "ฮินะกับเปียโน"
1008605-3 = "(คุณครูมาถึงโถงจัดปาร์ตี้ตามที่นัดไว้กับฮินะ แต่มาถึงแล้วก็เจอแต่ความเงียบสงัด)"
1008605-4 = "[ns] \"น่าจะใช่ที่นี่นะ ว่าแต่ฮินะอยู่ไหน...\""
1008605-5 = "อ๊ะ คุณครู มาตรงเวลาเลยนะ"
1008605-6 = "[s] \"อ่า ฮินะ...\""
1008605-12 = "[ns1] \"ทำไมไปอยู่หน้าเปียโน...?\"\n[ns2] \"คือว่า... ที่ฮินะเรียกครูมาเจอที่นี่ก็เพราะ...\""
1008605-13 = "― [log=히나 드레스]จากนี้ไป...[/log][wa:600] "
1008605-14 = "― [log=히나 드레스]จากนี้ไป...[/log][wa:600] "
1008605-15 = "― [log=히나 드레스]ฉันจะเล่นดนตรีเพื่อคุณครู[/log][wa:2220] "
1008605-18 = "[ns] \"เล่นเปียโนในปาร์ตี้เกเฮนน่าไปแล้วไม่ใช่เหรอ?\""
1008605-19 = "― [log=히나 드레스]อ่า ไม่หรอก ก็ตอนนั้น...[/log][wa:2060] "
1008605-20 = "― [log=히나 드레스]ระ... เราไม่ได้อยู่กันแค่สองคนนี่นา... [/log][wa:2970] "
1008605-23 = "― [log=히나 드레스]ที่ฉัน... ฝึกซ้อมเปียโนอยู่เรื่อยๆ...[/log][wa:2160] "
1008605-24 = "― [log=히나 드레스]ก็เพื่อจะเล่นให้คุณครูฟัง... [/log][wa:2240] "
1008605-27 = "― [log=히나 드레스]เพราะถ้าไม่ได้เล่นให้ฟัง...[/log][wa:820] "
1008605-28 = "― [log=히나 드레스]ฉันก็คงเสียดายแน่ๆ[/log][wa:3380] "
1008605-31 = "[ns] \"ถ้าฮินะพูดแบบนั้นก็เข้าใจแล้ว งั้นครูจะนั่งตั้งใจฟังนะ\""
1008605-32 = "― [log=히나 드레스]หะ... หืม?[/log][wa:600] "
1008605-33 = "― [log=히나 드레스]มะ... ไม่หรอก ฉันไม่ได้จะเล่นใหญ่ขนาดนั้นสักหน่อย...[/log][wa:2520] "
1008605-36 = "― [log=히나 드레스]ถ้าคาดหวังขนาดนั้นละก็...[/log][wa:420] "
1008605-37 = "― [log=히나 드레스]ฉันก็ลำบากใจนะ[/log][wa:2460] "
1008605-40 = "[ns] \"ฮินะจะเล่นดนตรีให้ครูฟังทั้งที ครูต้องตั้งใจฟังสิ\""
1008605-41 = "― [log=히나 드레스]อ่า... อะ... อื้ม...[/log][wa:3520] "
1008605-42 = "― [log=히나 드레스]ก็ได้... คุณก็เป็นอย่างนี้ตลอด[/log][wa:4680] "
1008605-45 = "― [log=히나 드레스]อืม...[/log][wa:180] "
1008605-46 = "― [log=히나 드레스]ถ้างั้นก็ตั้งใจฟังนะ[/log][wa:2680] "
1008605-49 = "― [log=히나 드레스]บทเพลงจากฉัน...ที่เล่นเพื่อคุณเท่านั้น[/log][wa:1580] "
1008605-56 = "(คุณครูฟังการบรรเลงเปียโนของฮินะ และได้ใช้เวลาอยู่ด้วยกันเงียบๆ สองคน)"

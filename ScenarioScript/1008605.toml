[translation]
1008605-1 = "Hina and the Piano"
1008605-3 = "The party hall was eerily silent when I arrived."
1008605-4 = "[ns] \"I'm at the right spot, but where is Hina?\""
1008605-5 = "Ah, Sensei. You're right on time."
1008605-6 = "[s] \"Hina you're—\""
1008605-12 = "[ns1] \"You're playing piano again?\"\n[ns2] \"Did you call me here because—?\""
1008605-13 = "― [log=히나 드레스]Starting now...[/log][wa:440] "
1008605-14 = "― [log=히나 드레스]Starting now...[/log][wa:440] "
1008605-15 = "― [log=히나 드레스]I'll play for you.[/log][wa:2500] "
1008605-18 = "[ns] \"Didn't you already play at the Gehenna party?\""
1008605-19 = "― [log=히나 드레스]N-No. That was...[/log][wa:2340] "
1008605-20 = "― [log=히나 드레스]It wasn't just the two of us then...[/log][wa:3090] "
1008605-23 = "― [log=히나 드레스]The...reason I kept practicing was...[/log][wa:2160] "
1008605-24 = "― [log=히나 드레스]So I could play for you...[/log][wa:2360] "
1008605-27 = "― [log=히나 드레스]If I quit before you heard my song...[/log][wa:420] "
1008605-28 = "― [log=히나 드레스]I don't think I could forgive myself.[/log][wa:2620] "
1008605-31 = "[ns] \"If you say so, I understand. You have my full attention.\""
1008605-32 = "― [log=히나 드레스]H-Huh?[/log][wa:760] "
1008605-33 = "― [log=히나 드레스]I mean, it—it's not that serious...[/log][wa:3200] "
1008605-36 = "― [log=히나 드레스]And if your expectations are too high...[/log][wa:10] "
1008605-37 = "― [log=히나 드레스]I might struggle to get through it.[/log][wa:1620] "
1008605-40 = "[ns] \"It's okay if there are mistakes. It'll still be your song. And I'll still want to hear it.\""
1008605-41 = "― [log=히나 드레스]Uh... O-Okay...[/log][wa:3720] "
1008605-42 = "― [log=히나 드레스]Yeah... This is the way you've always been.[/log][wa:4160] "
1008605-45 = "― [log=히나 드레스]Okay...[/log][wa:140] "
1008605-46 = "― [log=히나 드레스]Please, listen closely.[/log][wa:2560] "
1008605-49 = "― [log=히나 드레스]...This is my encore performance. Just for you.[/log][wa:1220] "
1008605-56 = "I listened to Hina play the piano. It was a once in a lifetime concerto. For us, alone."

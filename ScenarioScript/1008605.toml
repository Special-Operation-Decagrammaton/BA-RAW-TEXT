[translation]
1008605-1 = "陽奈和鋼琴"
1008605-3 = "（接到陽奈的聯絡後，來到了派對大廳。總覺得四周瀰漫著寂靜的氣氛）"
1008605-4 = "[ns]「應該就是這裡沒錯，陽奈……」"
1008605-5 = "啊，老師，你來的真準時。"
1008605-6 = "[s]「啊，陽奈──」"
1008605-12 = "[ns1]「陽奈在鋼琴前面……？」\n[ns2]「那個，陽奈找我來這裡的理由是……」"
1008605-13 = "― [log=히나 드레스]從現在開始……[/log][wa:760] "
1008605-14 = "― [log=히나 드레스]從現在開始……[/log][wa:760] "
1008605-15 = "― [log=히나 드레스]我會為老師演奏。[/log][wa:2900] "
1008605-18 = "[ns]「如果是鋼琴演奏的話，上次在格黑娜派對不是也進行過嗎？」"
1008605-19 = "― [log=히나 드레스]啊，不，那個時候……[/log][wa:2620] "
1008605-20 = "― [log=히나 드레스]畢，畢竟不是兩人獨處……[/log][wa:4050] "
1008605-23 = "― [log=히나 드레스]那個……之所以一直練習鋼琴……[/log][wa:3040] "
1008605-24 = "― [log=히나 드레스]也是想彈給老師聽……[/log][wa:3000] "
1008605-27 = "― [log=히나 드레스]要是就這樣，沒能展現出來的話……[/log][wa:1260] "
1008605-28 = "― [log=히나 드레스]感覺絕對會後悔的。[/log][wa:3740] "
1008605-31 = "[ns]「既然陽奈都這麼說了，我會靜靜坐著聽的。」"
1008605-32 = "― [log=히나 드레스]呃，嗯？[/log][wa:840] "
1008605-33 = "― [log=히나 드레스]不，也，也不是那麼厲害的表演哦……[/log][wa:3920] "
1008605-36 = "― [log=히나 드레스]那麼期待的話……[/log][wa:1100] "
1008605-37 = "― [log=히나 드레스]好像有點傷腦筋。[/log][wa:2700] "
1008605-40 = "[ns]「陽奈不是要為了我演奏嗎？那我當然要認真聽囉。」"
1008605-41 = "― [log=히나 드레스]啊……唔，唔嗯……[/log][wa:3960] "
1008605-42 = "― [log=히나 드레스]沒錯……你，一直都是那樣的人。[/log][wa:5280] "
1008605-45 = "― [log=히나 드레스]嗯……[/log][wa:300] "
1008605-46 = "― [log=히나 드레스]那，要仔細聽哦。[/log][wa:3160] "
1008605-49 = "― [log=히나 드레스]……獻給你的，我的演奏。[/log][wa:2620] "
1008605-56 = "（就這樣聽著陽奈的演奏，靜靜享受兩人獨處的時間）"

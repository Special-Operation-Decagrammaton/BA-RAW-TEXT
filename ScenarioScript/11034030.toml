[translation]
11034030-1 = "演出;競爭意識（１）"
11034030-2 = "……啊，好痛！！"
11034030-3 = "哎呀……真是的……"
11034030-4 = "……怎麼，受傷了嗎？"
11034030-5 = "沒什麼，只是被吉他弦割傷手指而已……"
11034030-6 = "嘖嘖，真是不像話。下次記得小心點啊。"
11034030-7 = "先別動，我記得這裡有OK蹦……"
11034030-8 = "……嗯？奇怪，怎麼全都沒了？"
11034030-10 = "那是因為……剛才被你用光了啊。"
11034030-11 = "……？？？"
11034030-12 = "……哎呀。我是什麼時候……"
11034030-13 = "評論別人之前，先擔心自己的手指吧。#n我這可是才第一次受傷而已。"
11034030-14 = "要，要不要先休息一下？#n你們兩個……也不要太逞強唷……"
11034030-15 = "沒事沒事，這點程度不算什麼。#n而且這只是我第一次受傷而已哦？"
11034030-17 = "……跟某人完全不一樣。"
11034030-18 = "……？"
11034030-19 = "怎樣，想吵架是不是？"
11034030-20 = "也不知道是誰先說我「不像話」的？"
11034030-22 = "哦哦，這個氣氛……莫非要單挑了嗎？"
11034030-23 = "你，你們兩個……！禁止打架……！"
11034030-24 = "嗯……？#n啊，沒事的，愛莉。別擔心，我們不是要打架。"
11034030-25 = "我們只是……"
11034030-26 = "……對了，只是想來場「Battle」，看看誰先倒下而已。"
11034030-28 = "哈。比體力的話，我可是很有自信的。"
11034030-29 = "哼哼，這可難說喔………"
11034030-30 = "……吼吼吼。（低鳴）"
11034030-34 = "嗯嗯。這果然……"
11034030-38 = "……很搖滾！！！"

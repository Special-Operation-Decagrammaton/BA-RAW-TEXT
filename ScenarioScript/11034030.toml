[translation]
11034030-1 = "เพอร์ฟอร์แมนซ์;ใจสู้ 1"
11034030-2 = "โอ๊ย... เจ็บจี๊ดเลย!!"
11034030-3 = "อ๊ะ... ให้ตายสิ..."
11034030-4 = "เกิดอะไรขึ้นน่ะ? บาดเจ็บเหรอ?"
11034030-5 = "ไม่ถึงขนาดนั้นหรอก แค่ได้แผลจากสายกีตาร์นิดหน่อยน่ะ"
11034030-6 = "เจ็บจี๊ดเลยงั้นเหรอ? ไม่หัดระวังบ้างเลย"
11034030-7 = "อย่าเพิ่งไปดีดต่อล่ะ อยู่เฉยๆ ก่อน พลาสเตอร์น่าจะอยู่แถวนี้..."
11034030-8 = "หืม...? อะไรกัน ทำไมหมดแล้วล่ะ?"
11034030-10 = "ก็... ตัวเองเพิ่งใช้ไปนี่"
11034030-11 = "...???"
11034030-12 = "เอ๋... ใช้หมดตั้งแต่ตอนไหนน่ะ..."
11034030-13 = "ฉันเพิ่งถูกสายบาดเป็นครั้งแรกนะ ก่อนจะว่าคนอื่นว่าไม่ระวัง หัดก้มดูนิ้วมือของตัวเองก่อนเถอะจ้ะ"
11034030-14 = "ระ... เราพักกันก่อนมั้ย? เราไม่ต้องหักโหมกันมากก็ได้นะ... โดยเฉพาะทั้ง 2 คนนั้น..."
11034030-15 = "อะไรกัน ฉันไม่ได้หักโหมสักหน่อย อีกอย่าง ฉันก็เพิ่งบอกไปไม่ใช่เหรอว่านี่เป็นครั้งแรกที่ได้แผลน่ะ"
11034030-17 = "ไม่เหมือนกับบางคนหรอกนะ..."
11034030-18 = "...?"
11034030-19 = "อะไร? จะหาเรื่องกันอีกเหรอ? หรืออยากได้อีกแผล?"
11034030-20 = "แหม มาบอกคนอื่นว่าไม่หัดระวังบ้างเลย แต่ดูมือตัวเองสิ"
11034030-22 = "โอ้วว บรรยากาศมาคุอีกแล้วแฮะ..."
11034030-23 = "ทะ... ทั้งคู่เลย ห้ามทะเลาะกันนะ...!"
11034030-24 = "หืม? เฮ้อ... อะไรกัน ไอริ พวกเราไม่ได้จะทะเลาะกันสักหน่อย ไม่ต้องห่วงหรอก"
11034030-25 = "ก็แค่..."
11034030-26 = "อ่า... จะเล่นดนตรีประสานกันต่างหาก แค่จะดูว่าใครจะหมดแรงไปก่อนน่ะ"
11034030-28 = "เฮอะ ตัวก็แค่นั้น แต่ทำเป็นมั่นใจจังเลยนะ"
11034030-29 = "ฮึ่มมม..."
11034030-30 = "ฮึ่ยยย..."
11034030-34 = "อืม... จะเล่นแบบนี้กันสินะ แบบนี้มัน..."
11034030-38 = "ร็อกดีจริงๆ!!!"

80000073-17 = "[ns3] \"Chocolate chip cookies... They look a little... squished.\"\n[ns4] \"Do you like this kind of cookie texture, Ui?\""
80000073-18 = "Uh... I'm not really picky about food... I didn't put that much thought into it."
80000073-19 = "Uh... I'm not really picky about food... I didn't put that much thought into it."
80000073-20 = "Oh, the books? I put them a safe distance away. You never know..."
80000073-21 = "These cookies are soft and less crumbly, but a cookie is a cookie, after all. More importantly, I don't want any crumbs to get on the books."

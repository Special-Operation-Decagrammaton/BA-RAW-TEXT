80000073-4 = "[ns1] \"나 왔어, 우이.\"\n[ns2] \"주문하신 아메리카노 2잔입니다~.\""
80000073-5 = "#na;우이;아, 오셨군요. 선생님. 마침 준비도 다 끝난 상황이었어요."
80000073-6 = "#na;우이;아, 오셨군요. 선생님. 마침 준비도 다 끝난 상황이었어요."

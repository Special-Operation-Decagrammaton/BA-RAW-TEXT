80000073-32 = "[s5] \"……우이?\"\n[s6] \"갑자기 이상한 반응이?\""
80000073-33 = "3;우이;17;어……. 음……. 그…….\n#3;stiff"
80000073-34 = "3;우이;17;어……. 음……. 그…….\n#3;stiff"
80000073-35 = "3;우이;18;……죄송해요. 스스로 괜한 소리를 해서 그런지, 갑자기 좀 좌불안석이 되고 있는데요.\n#3;em;[속상함]"
80000073-36 = "3;우이;17;아무래도 '책도 없이'라는 말은…… 하는 게 아니었을지도 모르겠어요."
80000073-37 = "3;우이;06;그동안은 선생님이 찾아 오셔도 늘 손에 든 아이가 하나씩은 있었으니까, 내심 '단둘'이 아니라고 생각했던 거 같은데…….\n#3;em;…"
80000073-38 = "3;우이;13;그렇다고 이제 와서 이런 자리에 애들을 데려오는 건 무리가 있는 거 같고……."
80000073-39 = "3;우이;13;게다가 선생님은……"
80000073-40 = "3;우이;12;역시 아무렇지도 않으신 모양이네요.\n#3;em;[한숨]"

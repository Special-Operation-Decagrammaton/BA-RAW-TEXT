80000073-17 = "[ns3] \"촉촉한 초코 쿠키다.\"\n[ns4] \"과연, 우이는 이런 취향이구나.\""
80000073-18 = "3;우이;18;어……. 먹는 건 크게 안 따져서 딱히 심사숙고하며 고른 건 아닌데요…….\n#3;em;[땀]"
80000073-19 = "3;우이;18;어……. 먹는 건 크게 안 따져서 딱히 심사숙고하며 고른 건 아닌데요…….\n#3;em;[땀]"
80000073-20 = "3;우이;02;……네? 책들이요? 아아. 테이블에선 좀 떨어진 곳으로 빼 두었어요. 혹시 모르니까요.\n#3;m3"
80000073-21 = "3;우이;06;촉촉한 초코 쿠키라곤 해도 결국 쿠키는 쿠키. 부스러기가 튀어서 들어가면 곤란하잖아요.\n#3;em;[속상함]"
80000073-22 = "3;우이;02;손에 묻거나 가루가 떨어질 수 있는 것들을 취급할 때에는, 안전을 위해 피신시키는 거죠."
80000073-23 = "3;우이;17;그나저나 발렌타인 데이라고 구태여 또 이런 자리를……."
80000073-24 = "3;우이;13;……네? 딱히 관심 없는 행사냐고요? 그야……. 아무래도 좀 그런 쪽이었죠?\n#3;em;[?]"
80000073-25 = "3;우이;99;애초에 초코를 먹는 것 자체에 관심을 갖는 여자애들이 몇 명이나 있겠어요. 다 분위기랑 상황이 좋아서 기대하는 거겠죠."
80000073-26 = "3;우이;02;당장 저도 이렇게, 모처럼 이 아이들까지 주변으로 좀 밀어 두고 선생님이랑 둘이 앉아 있는 거니까요."
80000073-27 = "3;우이;03;다 그런 거겠죠. 네. 책도 없이 선생님이랑 둘이……."
80000073-28 = "#st;[0,0];instant;1;"

[translation]
80000073-1 = "Concentrate on the Conversation"
80000073-4 = "[ns1] \"I'm here, Ui.\"\n[ns2] \"Order up! I've got two Americanos for Ui?\""
80000073-5 = "Oh, good timing, Sensei. I just finished setting up."
80000073-6 = "Oh, good timing, Sensei. I just finished setting up."

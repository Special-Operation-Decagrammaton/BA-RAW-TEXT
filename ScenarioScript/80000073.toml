[translation]
80000073-1 = "มีสมาธิกับการคุย"
80000073-4 = "[ns1] \"ครูมาแล้ว อุย\"\n[ns2] \"อเมริกาโน่ 2 แก้วที่สั่งมาส่งแล้ว~\""
80000073-5 = "อ๊ะ มาแล้วเหรอคะคุณครู ฉันเพิ่งเตรียมเสร็จพอดีเลยค่ะ"
80000073-6 = "อ๊ะ มาแล้วเหรอคะคุณครู ฉันเพิ่งเตรียมเสร็จพอดีเลยค่ะ"
80000073-10 = "เชิญทางนี้เลยค่ะ ฉันเลือกโต๊ะกับเก้าอี้มาอย่างดีเลยค่ะ"
80000073-11 = "แล้วก็..."
80000073-17 = "[ns3] \"คุกกี้ช็อกโกแลตเนื้อหนึบนี่นา\"\n[ns4] \"อุยชอบแบบนี้สินะ\""
80000073-18 = "อ่า... ฉันไม่ค่อยสนใจเรื่องของกินเท่าไร เลยไม่ได้คิดอะไรมากตอนเลือกน่ะค่ะ..."
80000073-19 = "อ่า... ฉันไม่ค่อยสนใจเรื่องของกินเท่าไร เลยไม่ได้คิดอะไรมากตอนเลือกน่ะค่ะ..."
80000073-20 = "...คะ? หนังสือเหรอคะ? อ่า... ฉันยกไปเก็บไว้ไกลๆ จากโต๊ะแล้วค่ะ แค่เผื่อไว้น่ะค่ะ"
80000073-21 = "ถึงจะเรียกว่าคุกกี้ช็อกโกแลตเนื้อหนึบ แต่คุกกี้ก็คือคุกกี้ ถ้าเกิดเศษขนมเข้าไปติดในหนังสือละก็ ได้เป็นเรื่องใหญ่แน่ค่ะ"
80000073-22 = "เวลากินอะไรที่เป็นผงๆ หรือเลอะมือได้น่ะ ฉันจะย้ายพวกเด็กๆ ไปเพื่อความปลอดภัยค่ะ"
80000073-23 = "ยังไงวันนี้ก็เป็นวันวาเลนไทน์ และก็เตรียมสถานที่ไว้แล้ว..."
80000073-24 = "...คะ? ฉันดูไม่สนใจเทศกาลพวกนี้เหรอคะ? เรื่องนั้น... ก็คงเป็นแบบนั้นละมั้งคะ?"
80000073-25 = "จะมีเด็กผู้หญิงสักกี่คนที่สนใจเรื่องการกินช็อกโกแลตตั้งแต่แรกกันคะ คงเป็นเพราะบรรยากาศ#nและสถานการณ์มันพาไปต่างหากค่ะ"
80000073-26 = "ฉันเอง... ก็ไม่ได้ยกพวกเด็กๆ ออกไปวางไว้ข้างๆ แล้วมานั่งอยู่กับคุณครูสองคนแบบนี้นานแล้วเหมือน#nกันนะคะ"
80000073-27 = "ค่ะ... อยู่กับคุณครูสองต่อสองโดยไม่มีหนังสือ..."
80000073-31 = "......??????"
80000073-32 = "[s5] \"...อุย?\"\n[s6] \"ทำไมจู่ๆ ทำท่าแปลกๆ ล่ะ?\""
80000073-33 = "เอ่อ... อืม... คือ..."
80000073-34 = "เอ่อ... อืม... คือว่า..."
80000073-35 = "...ขอโทษค่ะ ที่จู่ๆ พูดอะไรก็ไม่รู้ออกไป และก็ลุกลี้ลุกลนเองแบบนี้น่ะค่ะ"
80000073-36 = "ที่เป็นแบบนี้ คงเพราะคำว่า \"ไม่มีหนังสือ\" ก็ได้ค่ะ..."
80000073-37 = "เพราะที่ผ่านมาเวลาคุณครูมาหา จะต้องพาเด็กๆ มาด้วยหนึ่งถึงสองเล่มเสมอๆ ฉันเลยไม่ได้คิดว่าอยู่#nกัน \"สองคน\" เลยสักครั้ง..."
80000073-38 = "แต่วันนี้ถ้าพาพวกเด็กๆ มาที่นี่ด้วยมันก็คงจะเกินไปหน่อย..."
80000073-39 = "นอกจากนี้คุณครู..."
80000073-40 = "กะแล้วเชียว ท่าทางคุณครูเองก็ไม่ได้คิดอะไรเลยสินะคะ"
80000073-41 = "คือมัน..."
80000073-42 = "[s7] \"มัน...?\"\n[s8] \"สีหน้าดูเศร้าๆ นะ อุย?\""
80000073-43 = "ระ...รู้สึกไม่ชอบใจเลยค่ะ... ความรู้สึกที่เหมือนกับมีแค่ฉันที่ร้อนรนแบบนี้..."
80000073-44 = "ฉันรู้สึกไม่ชอบเลยค่ะ... ที่มีแต่ฉันที่เป็นฝ่ายลุกลี้ลุกลนแบบนี้..."
80000073-45 = "..."
80000073-46 = "อืม..."
80000073-51 = "[ns9] \"ทำไมจู่ๆ ขยับมานั่งข้างๆ แบบนี้ล่ะ!?\"\n[ns10] \"คะ...คุณอุย!? กะ...ใกล้เกินไปแล้ว...!?\""
80000073-52 = "ฮู่ว..."
80000073-53 = "ฮู่ว..."
80000073-54 = "...ดีมากค่ะ สีหน้าแบบนั้นแหละ แบบนี้ค่อยรู้สึกยุติธรรมขึ้นมาหน่อยแล้วละค่ะ"
80000073-55 = "อ๊ะ ไม่ต้องใส่ใจหรอกค่ะ ฉันแค่ไม่ชอบที่มีแค่ตัวเองเป็นฝ่ายลุกลี้ลุกลน ทำอะไรไม่ถูกอยู่ฝ่ายเดียวค่ะ"
80000073-59 = "เอาละค่ะ ถ้างั้น... เรามา...ทำ...ทั้งๆ ที่อีกฝ่ายรู้สึกร้อนใจ..."
80000073-60 = "เรามาลองชิมดูเลยมั้ยคะ คะ...คุกกี้กับกาแฟ... งั้นฉะ...ฉันขอลองชิมก่อน... ชะ...ชิ้นหนึ่ง..."
80000073-61 = "[s] \"...\""
80000073-63 = "[ns] หยิบคุกกี้เนื้อหนึบขึ้นมากิน"
80000073-65 = "(หลังจากนั้นคุณครูก็ใช้เวลากินคุกกี้กับอุยอย่างสงบสุข)"
80000073-66 = "(ไม่นาน บรรยากาศกระอักกระอ่วนก็หายไป เมื่ออุยเริ่มออกปากวิจารณ์พวกคนที่อยู่ด้านนอก)"

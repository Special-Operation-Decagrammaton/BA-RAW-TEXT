[translation]
80000073-1 = "僅有彼此"
80000073-4 = "[ns1]「讓你久等了，憂。」\n[ns2]「飲料喝黑咖啡可以嗎？」"
80000073-5 = "啊……辛苦了，老師。#n我正好也準備好了。"
80000073-6 = "啊……辛苦了，老師。#n我正好也準備好了。"
80000073-10 = "請來這裡……#n我，我事先準備好了桌子和椅子……"
80000073-11 = "那，那麼，請用……"
80000073-17 = "[ns3]「好棒，看起來很好吃呢。」\n[ns4]「是憂平時喜歡吃的嗎？」"
80000073-18 = "那，那個……不算是喜歡……#n只是單純覺得，這種餅乾比較不容易弄髒環境……"
80000073-19 = "那，那個……不算是喜歡……#n只是單純覺得，這種餅乾比較不容易弄髒環境……"
80000073-20 = "……那些孩子們，是嗎？#n是的，保險起見，我把它們先移開了。"
80000073-21 = "就算是濕潤的巧克力餅乾，還是有可能會產生餅乾屑的……"
80000073-22 = "當手有可能弄髒，或是可能會有餅乾屑時，基本上都會讓它們去避難……"
80000073-23 = "話說回來……雖然說是情人節，這種場合……"
80000073-24 = "……嗯？我本來就不是……特別有興趣……"
80000073-25 = "而且，雖然常說巧克力如何如何……#n不過幾乎所有女孩子都只是在享受這個氣氛而已……"
80000073-26 = "話雖如此……我也是把重要的孩子們放到一邊，像這樣和老師面對面就是了……"
80000073-27 = "大概就是這樣吧。#n像這樣……和某人獨處……"
80000073-31 = "……？？？？？？"
80000073-32 = "[s5]「……憂？」\n[s6]「怎，怎麼了？」"
80000073-33 = "呃……沒，沒有……那個……"
80000073-34 = "呃……沒，沒有……那個……"
80000073-35 = "……抱，抱歉，真的沒什麼。#n有，有點無法冷靜……"
80000073-36 = "現，現在……還是不要一直想著那些孩子們比較好呢……"
80000073-37 = "平時就算老師過來，孩子們也會在我的手邊……#n所以，很少遇到現在這種情況，該這麼說嗎……"
80000073-38 = "但，但是，現在說這些也……"
80000073-39 = "……老師你，"
80000073-40 = "好像若無其事的樣子呢。"
80000073-41 = "總感覺，好像只有我自己……"
80000073-42 = "[s7]「……？」\n[s8]「憂，憂？你還好嗎？」"
80000073-43 = "只有我自己……很，很浮躁不是嗎……"
80000073-44 = "只有我自己……很，很浮躁不是嗎……"
80000073-45 = "……"
80000073-46 = "唉……"
80000073-51 = "[ns9]「為，為什麼突然跑到我旁邊！？」\n[ns10]「憂，憂同學！？是不是有點太近了……？」"
80000073-52 = "……呼。"
80000073-53 = "……呼。"
80000073-54 = "……真不錯呢。看到了少見的表情。#n這樣我們就打平了。"
80000073-55 = "……沒什麼，請別在意。只是我有點不太冷靜而已。"
80000073-59 = "來，來吧，轉換好心情……一起，吃吧……？"
80000073-60 = "那麼，老師……請先……選一個吧。"
80000073-61 = "[s] 「……」"
80000073-63 = "[ns]拿起餅乾"
80000073-65 = "（後來和憂一起享用帶來的咖啡和餅乾）"
80000073-66 = "（雖然一開始的氣氛有點尷尬，不過很快就變回平時那個抱怨著外面的人的憂了）"

[translation]
10030080-1 = "บทส่งท้าย;ความตั้งใจที่ไม่แน่วแน่"
10030080-4 = "(ราวๆ หนึ่งสัปดาห์หลังจากปีใหม่...)"
10030080-6 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
10030080-9 = "อึก... ฮึ่ย..."
10030080-14 = "รุ่นพี่ฮาเระ อดทนอีกนิดนะ! ใกล้จะถึงแล้ว!"
10030080-15 = "อีกแค่นิดเดียว... เราก็ทุบสถิติใหม่ได้แล้วค่ะ...!"
10030080-25 = "อึกก... ได้แล้ว!"
10030080-26 = "เยี่ยมไปเลยรุ่นพี่! เพิ่มน้ำหนักจากสถิติเดิมตั้ง 10 กิโล แต่ก็ทำสำเร็จได้ในรอบเดียวเลย...!"
10030080-27 = "ฉันว่าตัวเองก็พัฒนาขึ้นมากแล้วนะ แต่เรื่องพละกำลังก็น่าจะยังตามหลังฮาเระอยู่อีกเยอะเลยค่ะ"
10030080-28 = "อวยกันแบบนี้ก็เขินแย่..."
10030080-29 = "แต่ก็นะ ไม่กี่วันที่ผ่านมาฉันตั้งใจฝึกฝนอย่างสม่ำเสมอเลย"
10030080-30 = "ถ้าเป็นการออกกำลังกายที่ต้องใช้[ruby=Power]ความแข็งแรงของกล้ามเนื้อ[/ruby]ละก็ ฉันว่าฉันน่าจะเอาอยู่"
10030080-32 = "ดีละ งั้นต่อไปมาฝึกเรื่อง[ruby=Stamina]ความอดทน[/ruby]กันมั้ย...?"
10030080-38 = "ฉันมาแล้ว..."
10030080-42 = "อ๊ะ รุ่นพี่! เข้ามาสิ!"
10030080-44 = "ไม่ได้เจอกันนานเลยนะคะ รองหัวหน้า"
10030080-45 = "หลังจากที่ไปดูพระอาทิตย์ตอนปีใหม่ นี่น่าจะเป็นครั้งแรกที่มาห้องชมรมเลยนะ หมู่นี้งานยุ่งเหรอ?"
10030080-47 = "อื้ม ฉันต้องเข้าร่วมงานปีใหม่ของบริษัทไอทีที่ไปเป็นที่ปรึกษาด้านความปลอดภัยให้อยู่ ก็เลยไม่มีเวลาแวะมาน่ะ..."
10030080-48 = "ฉันต้องพูดแนะนำตัวและสวัสดีปีใหม่กับผู้คนในงานอยู่ซ้ำแล้วซ้ำเล่า ก็เลยรู้สึกเหมือนเสียงหายเลย... ขนาดพูดเฉยๆ ไม่ได้ตะโกนนะ"
10030080-49 = "รุ่นพี่หักโหมมากเกินไปรึเปล่า...?"
10030080-50 = "รุ่นพี่จะรับงานแค่ไหนก็ได้ แต่สุขภาพที่เสียไปหนึ่งครั้งมันยากที่จะฟื้นฟูกลับมาได้นะคะ"
10030080-51 = "สัปดาห์หน้าพักสักหน่อยมั้ย?"
10030080-52 = "นั่นสินะ การพักผ่อนก็จำเป็นเหมือนกัน..."
10030080-53 = "แต่ในช่วงเวลาที่สำคัญแบบนี้ ฉันพักกิจกรรมภายนอกไม่ได้หรอก... ขอบใจที่เป็นห่วงนะ"
10030080-54 = "จะว่าไป สัปดาห์นี้พวกเธอทำอะไรกันบ้างเหรอ?"
10030080-55 = "ที่ได้ยินระหว่างเข้ามาเมื่อกี้ เหมือนพวกเธอกำลังวางแผนออกกำลังกายกันอยู่เลย..."
10030080-56 = "จากนักเรียนที่ปกติแล้วแทบไม่ออกไปข้างนอกเลย แต่ก็มาเริ่มวางแผนออกกำลังกายกันด้วย การไปออกแคมป์ของเราตอนปีใหม่เหมือนจะช่วยได้เยอะเลยนะ น่าดีใจจัง"
10030080-61 = "อ่า ที่จริง..."
10030080-62 = "มันก็เป็นแผนการออกกำลังกายอยู่หรอก..."
10030080-69 = "เรากำลังเล่นโหมดพัฒนาตัวละครใน <ฟิตเนส ซิมูเลเตอร์> กันอยู่น่ะ!"
10030080-75 = "ว่าไงนะ?"
10030080-76 = "อ๊ะ ไม่แปลกที่รุ่นพี่อาจจะยังไม่รู้จัก <ฟิตเนส ซิมูเลเตอร์> มันเป็นเกมที่เพิ่งเปิดเมื่อไม่นานมานี้เอง"
10030080-77 = "<ฟิตเนส ซิมูเลเตอร์> เป็นเกมที่ให้เราฝึกฝนความสามารถทางกายภาพของตัวละครที่เป็นนักกีฬาอีกทีน่ะ ตอนนี้กำลังเป็นเกมฮิตเลยละ เพราะทำให้เราสัมผัสกับการฝึกฝนต่างๆ ที่มีอยู่จริงได้! เหมือนเราได้ออกกำลังกายจริงๆ เลย!"
10030080-78 = "แต่ก็มีการจำกัดค่าความสามารถของนักกีฬาจากการเล่นในรอบแรก..."
10030080-79 = "ถ้าอยากให้นักกีฬามีค่าความสามารถสูงๆ ก็ต้องเล่นซ้ำๆ อย่างมีวินัยน่ะ"
10030080-80 = "งั้นก็แปลว่า... ทั้งความแข็งแรงของกล้ามเนื้อหรือความอดทนอะไรนั่น ไม่ได้มาจากการออกกำลังกาย#nของพวกเธอจริงๆ..."
10030080-81 = "แต่เป็นเรื่องของตัวละครในเกมงั้นเหรอ?"
10030080-82 = "อื้ม!"
10030080-83 = "ขอถามเผื่อเฉยๆ นะ..."
10030080-84 = "ครั้งสุดท้ายที่พวกเธอออกจากห้องชมรมคือเมื่อไรน่ะ?"
10030080-86 = "เมื่อวาน... หรือเมื่อวานซืนนะ?"
10030080-87 = "ก่อนหน้านั้นเยอะเลยค่ะ หลังจากกลับมาจากแคมป์ปิ้ง เราก็ยังไม่ได้ออกไปไหนเลยนี่คะ"
10030080-88 = "ช่วยไม่ได้หรอก ถ้าจะเล่นโหมดพัฒนาตัวละครใน <ฟิตเนส ซิมูเลเตอร์> ให้จบ ก็ต้องใช้เวลาอย่างน้อย#nสามวันนี่เนอะ"
10030080-90 = "งั้นสัปดาห์หน้าล่ะ จะทำอะไรกัน?"
10030080-92 = "อ้อ เห็นว่าสัปดาห์หน้า <บูม อีเทอร์นัล> ที่ปรับปรุงใหม่จากเกมแอ็กชันคลาสสิก <บูม> จะเปิดให้เล่นด้วยน่ะ"
10030080-94 = "ในฐานะสมาชิกของเวอริทัสที่แสวงหาความจริง ฉันจะต้องรีวิวเกมใหม่ที่ร้อนแรงที่สุดในคิโวทอสให้ได้!"
10030080-95 = "จะว่าไป ได้ยินว่าถ้าอัปโหลดวิดีโอตอนเล่น <บูม อีเทอร์นัล> ลงในโซเชียลมีเดีย ก็จะได้สิทธิ์สุ่มสินค้า#nลิมิเต็ดเอดิชั่นจากมอนสเตอร์แม็กซ์ด้วย..."
10030080-96 = "เป็นโอกาสที่จะทำลายสถิติสปีดรันที่เคยทำไว้ในซีรีส์ก่อนสินะคะเนี่ย"
10030080-97 = "รุ่นพี่จิฮิโระล่ะว่ายังไง? มาโต้รุ่งเล่นเกมตั้งแต่เกมเปิดด้วยกัน..."
10030080-106 = "พวกเธอนี่นะ..."
10030080-111 = "ฉันต้องเตือนพวกเธอให้มีนิสัยใช้ชีวิตเพื่อสุขภาพดีอีกครั้งแล้วละ!"
10030080-117 = "โธ่~ ปล่อยไปสักครั้งเถอะน่า รุ่นพี่!"
10030080-125 = "แก๊งสมองกล ชมภูเขารับฤดูใบไม้ผลิ"

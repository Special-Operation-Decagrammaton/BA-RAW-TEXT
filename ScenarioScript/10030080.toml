[translation]
10030080-1 = "尾聲;三天打魚，兩天曬網"
10030080-4 = "（新年開始約1週後……）"
10030080-6 = "貝里塔斯．駭客休息室"
10030080-9 = "唔……呃呃……"
10030080-14 = "晴前輩，加油！就差一點了！"
10030080-15 = "再努力一下……新紀錄就在眼前……！"
10030080-25 = "唔唔唔……成功了！"
10030080-26 = "前輩好厲害！居然馬上就成功創下比上次多10kg的紀錄……！"
10030080-27 = "我本來也以為自己成長很多，看來要追上晴還差得遠呢。"
10030080-28 = "那樣捧我，我會害羞啦……"
10030080-29 = "嗯，不過這也是因為這幾天我有持續努力地訓練。"
10030080-30 = "只要是需要「筋力」的運動，某種程度上都能輕鬆做到。"
10030080-32 = "好，那現在就以「耐力」為主進行鍛鍊吧……？"
10030080-38 = "……我回來了。"
10030080-42 = "啊，前輩！歡迎回來！"
10030080-44 = "好久不見，副部長。"
10030080-45 = "自從新年一起看日出後，好像是第一次在部室碰面呢。#n最近很忙嗎？"
10030080-47 = "嗯，因為必須參加擔任安全顧問的IT企業舉辦的新年會，所以四處奔波了一陣子……"
10030080-48 = "可能是因為在活動中重複自我介紹和新年致辭太多次……#n雖然沒有大聲喊叫，但喉嚨還是有點沙啞。"
10030080-49 = "前輩，你是不是太勉強自己了……？"
10030080-50 = "工作隨時可以再找，可是健康一旦失去就很難找回來囉。"
10030080-51 = "……下週要不要稍微休息一下？"
10030080-52 = "說的也是，休息的確很重要……"
10030080-53 = "不過像現在這種重要的時期，外部的活動實在是無法推辭。#n謝謝你擔心我。"
10030080-54 = "話說回來，你們上一週在做什麼？"
10030080-55 = "剛才我在部室外稍微聽了一下，好像在擬定什麼運動計畫……"
10030080-56 = "平時總是窩在部室不出來的你們竟然會擬定運動計畫……#n看來露營取得了成果，真是讓人有點欣慰。"
10030080-61 = "啊，那個……"
10030080-62 = "其實要說是運動計畫也沒有錯……"
10030080-69 = "但我們是在玩《健身模擬器》的培養模式！"
10030080-75 = "……什麼？"
10030080-76 = "啊，前輩可能不知道《健身模擬器》吧。#n這是才剛出不久的遊戲。"
10030080-77 = "《健身模擬器》是一款化身為健身選手，鍛鍊各種身體能力的遊戲哦。#n因為能逼真地體驗到現實的各種訓練，引發了很大的話題！"
10030080-78 = "不過一輪遊戲所能培養的能力值有上限……"
10030080-79 = "為了獲得能力值優秀的選手，必須長時間反覆進行遊戲。"
10030080-80 = "所以……你們所說的「筋力」或「耐力」指的並不是現實……"
10030080-81 = "……而是指遊戲中的角色？"
10030080-82 = "嗯！"
10030080-83 = "保險起見問你們一下……"
10030080-84 = "你們最後離開部室是什麼時候？"
10030080-86 = "昨天……不對，是前天嗎？"
10030080-87 = "是更久以前。#n從露營回來之後我們一直都待在部室。"
10030080-88 = "畢竟如果想把《健身模擬器》的培養模式全部玩過一次，#n最少要花三天以上的時間……這也沒辦法。"
10030080-90 = "……那下週的計畫呢？"
10030080-92 = "啊，下週是經典動作遊戲《毀滅狂戰士》系列的Reboot版《毀滅狂戰士：永恆》的發售日哦。"
10030080-94 = "身為追求真理的貝里塔斯成員，當然不能錯過奇普托斯最炙手可熱的新遊戲評論！"
10030080-95 = "對了，聽說只要在SNS上PO出遊玩《毀滅狂戰士：永恆》的影片，#n就有機會抽到「妖怪MAX」的限定商品……"
10030080-96 = "這是突破前作RTA紀錄的好機會。"
10030080-97 = "千尋前輩要不要也一起呀？#n等當天凌晨遊戲一推出就來玩個通宵──"
10030080-106 = "你們……"
10030080-111 = "看來還需要好好教導一下健康的生活習慣啊……！"
10030080-117 = "哇啊～這次就饒了我們吧，前輩！"
10030080-125 = "電腦新春行進曲"

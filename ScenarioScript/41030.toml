[translation]
41030-1 = "第3話;各自的情況"
41030-3 = "審訊記錄：977-R-1"
41030-5 = "負責人：女武神警察學園 3年級 尾刃環奈"
41030-7 = "嫌疑人：SRT特殊學園 1年級 空井咲希"
41030-12 = "女武神警察學園．審訊室"
41030-14 = "……名字。"
41030-15 = "……"
41030-16 = "名字！"
41030-17 = "……早就知道了吧，有必要問嗎？"
41030-18 = "沒有允許你發問。"
41030-19 = "再問一次，名字？"
41030-20 = "……空井咲希。"
41030-21 = "所屬是？"
41030-22 = "SRT特殊學園，RABBIT小隊所屬……直到你們擅自廢校之前。"
41030-23 = "……態度真好呢。理解自己的狀況嗎？"
41030-24 = "我被稱為女武神警察學園的「狂犬」……你不可能不知道吧？"
41030-25 = "事到如今還以為那種威脅有效嗎？那可真令人失望。"
41030-26 = "在SRT的訓練裡，也包含了被俘虜時的應對方式。我們也有多次處理機密的經驗。"
41030-27 = "不管你做什麼，也休想問出東西來。"
41030-31 = "……來自聯邦學生會的資料我也看過了。看來你在SRT裡，似乎也有相當優秀的成績呢。"
41030-32 = "筆試測驗幾乎滿分，實戰演習也幾乎沒有問題。"
41030-33 = "在學校也沒有違反過校規……確實是優等生。"
41030-34 = "優秀如你，為何拒絕編入女武神，反而搞什麼示威？"
41030-35 = "……女武神警察學園，和SRT特殊學園不一樣。"
41030-36 = "這不算回答。"
41030-37 = "在SRT特殊學園，放學後也在嚴格的規則下生活。"
41030-38 = "定時起床整理寢具，進行一天的訓練和授課。放學後也被要求在宿舍保持緊繃狀態進行訓練和整備。保持備戰狀態，就是SRT被稱為SRT的原因。"
41030-39 = "……和女武神警察學園不一樣。"
41030-40 = "就連號稱規律最為嚴格的公安局，放學後也能穿便服自由行動對吧？縱然是為了不讓市民感到緊張。"
41030-41 = "我不會以那種方式過活。與其當個安逸自由[ruby=女武神]的狗，[/ruby]還不如在嚴酷環境下作為[ruby=SRT]狼[/ruby]驕傲地活著。"
41030-42 = "……那就是你的答案嗎。"
41030-43 = "……再問你一個問題。"
41030-44 = "交戰中，風倉破壞了轉播用的無人機。#n在當時的情況下，那應該只是在無謂地浪費彈藥。"
41030-45 = "你為什麼沒有阻止？你這種優等生，應該明白在防衛戰中，彈藥是多麼貴重的東西。"
41030-46 = "還是說，那是某種SRT的紀律？"
41030-47 = "……"
41030-48 = "因為訓練的時候不能浪費彈藥，所以想試一次看看……"
41030-52 = "空"
41030-54 = "井"
41030-60 = "咲"
41030-62 = "希"
41030-64 = "不合格"
41030-68 = "審訊記錄：977-R-2"
41030-70 = "負責人：女武神警察學園 1年級生 中務桐乃"
41030-72 = "嫌疑人：SRT特殊學園 1年級生 風倉萌"
41030-76 = "那個……風倉萌同學。"
41030-77 = "嗯？"
41030-78 = "話說我想問一下，這個要弄幾小時啊？"
41030-79 = "可以早點結束嗎。備好的糖果也變少了。"
41030-80 = "那，那可不行！"
41030-81 = "而且現在這情況，你還有心情管糖果啊？"
41030-82 = "你再用那種態度，本官就要把剩下的糖果也沒收唷！"
41030-83 = "真麻煩啊……"
41030-84 = "風倉同學，本官就直問了。為什麼那時候，你們要佔領公園呢？為什麼沒有回應女武神的呼叫呢？"
41030-85 = "一開始就丟棄武器投降的話，事態就不會變得這麼大才對。"
41030-86 = "……因為我們，不想離開SRT。"
41030-87 = "原，原來如此……如果本官也突然被要求「從女武神警察學園滾出去」，確實會很煩惱。"
41030-88 = "和夥伴同甘共苦的回憶，確實沒辦法輕易捨棄……我知道了。關於這點會斟酌情狀──"
41030-89 = "不，那個根本無所謂。"
41030-90 = "不如說我想快點和那個RABBIT小隊說掰掰。"
41030-91 = "咲希每天都在碎碎唸，美優也馬上就哭……"
41030-92 = "那，那你剛剛怎麼會說，不想離開SRT……？"
41030-93 = "當然是為了大量的武器囉！"
41030-94 = "武，武器的話，女武神警察學園也有很多啊……？"
41030-95 = "不不不，和女武神完全不在同一個等級好吧！"
41030-96 = "可以把整個區域燒光的導彈，把戰車裝甲不當一回事的彈藥……！"
41030-97 = "可以盡情使用那樣強大火力的，只有SRT特殊學園了吧！"
41030-98 = "不，不對，就算是SRT特殊學園也不可以「盡情」使用吧！？"
41030-99 = "（話說這位同學，好像有無差別掃射讓商店街半毀的紀錄……）"
41030-100 = "SRT本來不是和女武神一樣，是保護市民安全的組織嗎……"
41030-101 = "但你卻說，武器是最重要的……"
41030-102 = "難道風倉同學完全不管市民的安全嗎！？"
41030-103 = "嗯。"
41030-107 = "……"
41030-111 = "風"
41030-113 = "倉"
41030-117 = "萌"
41030-125 = "不合格"
41030-128 = "審訊記錄：977-R-3"
41030-130 = "負責人：女武神警察學園 1年級生 合歡垣吹雪"
41030-132 = "嫌疑人：SRT特殊學園 1年級生 霞沢美優"
41030-136 = "那個，名字是……"
41030-137 = "我，我是，霞沢美優。SRT特殊學園的1年級生……在RABBIT小隊，擔當狙擊手……"
41030-138 = "15歲，生日是7月12日……興，興趣是，尋找小石頭。"
41030-139 = "呃，不用說到那種程度沒關係……"
41030-140 = "我，我接下來會怎麼樣呢……？"
41030-141 = "該不會是，可怕的拷問之類的……！？"
41030-142 = "一整天被迫聽同一首曲子之類的，被搔癢一整晚之類的……！"
41030-143 = "拜，拜託了請原諒我！知，知道的事我全都會說的……！"
41030-144 = "不，我也不會做那種事……"
41030-145 = "不過你肯說的話，可以先幫我說明理由嗎。為什麼要拒絕編入女武神，為什麼要在那座公園發起示威。"
41030-146 = "編，編入是因為……很害怕……"
41030-147 = "害怕？……我想我們學校，幾乎沒有不良學生啊？"
41030-148 = "不，那個，不是那種意思……"
41030-149 = "我，那個，很害怕和別人感情變好……"
41030-150 = "現在的RABBIT小隊也是，感情並不是那麼好……只有都子醬有時會照顧我……"
41030-151 = "但是，編入新的地方的話……"
41030-152 = "全部會變成從頭開始……我這麼沒有存在感，誰都不會來向我搭話……"
41030-153 = "與其變成那樣，那還不如露宿公園……"
41030-154 = "……真是奇怪的孩子。所以你是怕認識新面孔？"
41030-155 = "與其說是很害怕認識人……不如說是害怕被人忘記。"
41030-156 = "一想到再也不被人認知……我就……"
41030-157 = "我是為了改變這個性格才進入SRT的，但學校卻被迫關閉……我該怎麼做才好？"
41030-158 = "原來如此啊……"
41030-159 = "那來我們生活安全局怎麼樣？編入測驗也不難，人數也不多。"
41030-160 = "應該是不會被忘記吧。#n麻煩事不多，又是不太需要和人見面的部署。"
41030-161 = "是，是那樣嗎……？"
41030-162 = "幾乎不和任何人見面，靜靜的過學校生活……？"
41030-163 = "唔嗯……「幾乎不和任何人」應該不行吧。"
41030-164 = "因為生活安全局，會收到各種市民的申訴……"
41030-168 = "啊，那不行……"
41030-172 = "霞"
41030-174 = "沢"
41030-178 = "美"
41030-180 = "優"
41030-188 = "不合格"
41030-192 = "審訊記錄：977-R-4"
41030-194 = "負責人：夏萊  [USERNAME]老師"
41030-196 = "嫌疑人：SRT特殊學園 1年級生 月雪都子"
41030-200 = "……是那時候的。"
41030-201 = "[s1] 「你是……都子沒錯吧？」\n[s2] 「嚇到了嗎？」"
41030-202 = "也就是，審訊的負責人是老師吧。"
41030-203 = "……確實有點驚訝。沒想到老師會在。"
41030-204 = "也就是，審訊的負責人是老師吧。"
41030-205 = "嘛，是誰都沒關係。不管對手是誰，答案都不會變的。"
41030-206 = "有什麼想問的話就請吧。"
41030-207 = "[s] 「在那裡的生活，有什麼不方便的地方嗎？」"
41030-208 = "……從一開始就是奇怪的問題呢。"
41030-209 = "請不用在意。就算有，作為俘虜的立場我也無話可說。"
41030-210 = "或者你是打算用改善環境，交換什麼情報嗎？"
41030-211 = "如果你想改變我的心意，那還是放棄比較好。"
41030-212 = "就算提出任何提議，我們對SRT的感情也不會改變。"
41030-213 = "[s] 「是嗎。話說回來我想問一下，都子討厭女武神嗎？」"
41030-214 = "……看來你似乎有什麼誤會。"
41030-215 = "我並不是因為討厭女武神才拒絕轉學。"
41030-216 = "討厭的是，離開SRT。"
41030-217 = "[s] 「原來如此。可以告訴我理由嗎？」"
41030-218 = "……因為SRT，擁有那裡才有的「正義」。"
41030-219 = "[s] 「『正義』……」"
41030-220 = "要從頭說明的話，是個複雜的概念。"
41030-221 = "但相信老師也有耳聞過「正義」這個詞吧。"
41030-222 = "聽說其他學園也有這種集團……我想這所女武神之中，學生們也都相信自己的行動就是「正義」。"
41030-223 = "……但我認為，她們的正義並不是「真正的正義」。"
41030-224 = "所謂的「正義」是，符合真理的正確道理。"
41030-225 = "既然以真理為基礎，那就不會根據對象或狀況而改變。"
41030-226 = "然而位於奇普托斯各地的治安組織，置身於各式各樣的利害關係中。因此，大家都把「正義」持續扭曲成自己獨自的形態。"
41030-227 = "不過只有SRT特殊學園……不被學園間關係或利害問題左右，實行了自己相信的正義。"
41030-228 = "無論何時何地，不管對象是誰都以同樣的基準，追求一個正義的組織……"
41030-229 = "這樣的SRT特殊學園，我很憧憬。"
41030-230 = "也憧憬如此堅強的正義。"
41030-231 = "然而，SRT特殊學園被迫關閉……"
41030-232 = "如果我能做得更好……如果我能確實發揮她們的能力……"
41030-233 = "[s] 「依我聽到的，我認為都子已經十分努力了……」"
41030-237 = "……幾乎初次見面的人說什麼呢。"
41030-238 = "就算老師這麼稱讚我，也改變不了什麼。"
41030-239 = "那時，老師在短時間內最完全發揮友軍的優勢，攻擊我們的弱點改變戰況。與此相比……"
41030-240 = "我完全沒有做好……"
41030-241 = "[s] 「也不用那麼責備自己吧……？」"
41030-243 = "[s] 「……換個話題，有什麼需要的，或想要的東西嗎？」"
41030-244 = "……我沒有其他好說的。就如剛才所說，也沒有不滿。"
41030-245 = "真要說的話，希望你能幫忙撤回SRT特殊學園的關閉命令。"
41030-246 = "[s] 「只憑我要現在馬上想辦法解決，可能有點困難……」"
41030-247 = "……那為了復興SRT特殊學園，我們將持續抵抗。"
41030-248 = "只要不放棄，SRT的名字就不會消失。"
41030-249 = "[s] 「……就算勝算很微薄？」"
41030-250 = "是的。"
41030-253 = "月"
41030-255 = "雪"
41030-259 = "都"
41030-261 = "子"
41030-267 = "保留"
41030-270 = "女武神警察學園．公安局辦公室"
41030-271 = "……以上，就是這次的記錄。"
41030-272 = "老師也在百忙之中協助，非常感謝。減輕了我們的工作。"
41030-273 = "[s] 「那些孩子，接下來會怎麼樣？」"
41030-274 = "拘留一定期間後，本來預定會再次推薦編入女武神的……"
41030-275 = "但因為聯邦學生會的強烈要求，會由那邊下達懲處吧。畢竟事件受害規模也大，可能會下達重刑。"
41030-276 = "最壞的情況，她們會無法編入任何學校……"
41030-277 = "[s] 「果然不可能復興SRT特殊學園嗎？」"
41030-278 = "……對我來說，接受她們的要求讓我無法接受。"
41030-279 = "那個暫且不提，「SRT特殊學園的關閉」是聯邦學生會的決定。至少不是我這種存在可以說三道四的……"
41030-280 = "就算是持有「超法規權限」的夏萊，我想也很難推翻。"
41030-281 = "[s] 「那要不要問問聯邦學生會的人呢……？」"
41030-282 = "這問題我無法回答……"
41030-283 = "那麼，就由我來回答吧。"
41030-284 = "這，這個聲音是……"
41030-291 = "第一次……見面呢，老師。"
41030-292 = "我是奇普托斯聯邦學生會所屬，防衛室的香耶。"
41030-294 = "下一話;另一面的苦衷"

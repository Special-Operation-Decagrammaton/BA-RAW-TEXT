41030-70 = "#st;[-1200,0];serial;70;담당 취조관 : 발키리 경찰학교 1학년, 나카츠카사 키리노"
41030-71 = "#wait;2000"
41030-72 = "#st;[-1200,-150];serial;70;조사 용의자 : SRT 특수학원 1학년, 카제쿠라 모에"
41030-73 = "#wait;2000"
41030-74 = "#clearST\n3;모에;02\n#3;h"
41030-75 = "#wait;1500"
41030-76 = "#na;키리노;……카제쿠라 모에 양, 맞으시죠?"
41030-77 = "3;모에;01;응, 맞아."
41030-78 = "3;모에;05;그나저나 이 귀찮은 선문답은 언제까지 해야 하는 거야?\n#3;em;[?]"
41030-79 = "3;모에;05;물어볼 걸 다 물어봤다면 슬슬 밖에 내보내 주었으면 좋겠는데. 당분 보충용으로 챙겨 둔 사탕이 떨어져 간다고."
41030-80 = "#na;키리노;안 됩니다! 취조가 모두 끝날 때까지 보내 드릴 수는 없습니다!"
41030-81 = "#na;키리노;게다가 사탕이라니. 당신은 중범죄를 저질러 체포된 용의자라고요?"
41030-82 = "#na;키리노;협조적으로 나오지 않으면 가지고 계신 그 사탕도 모두 압수할 거예요!"
41030-83 = "3;모에;06;치이…… 귀찮게시리.\n#3;em;[속상함]\n#3;stiff"
41030-84 = "#na;키리노;단도직입적으로 여쭈겠습니다. 카제쿠라 양, 어째서 그날 공원을 점거하고 경찰의 지시에 불응하신 건가요?"
41030-85 = "#na;키리노;처음부터 무기를 버리고 순순히 투항하셨더라면 일이 이렇게까지 커지지는 않았을 텐데요."
41030-86 = "3;모에;06;……SRT를 떠나고 싶지 않았으니까.\n#3;em;…"
41030-87 = "#na;키리노;으음…… 확실히 본관도 발키리 경찰학교를 막상 떠나라 하면 쉽게 따르지는 못할 것 같네요."
41030-88 = "#na;키리노;고락을 함께한 동료들과의 추억은 소중하니까요. 이 점은 참작하여 선처를—"
41030-89 = "3;모에;05;아니. 동료들과는 헤어져도 딱히 상관없었는데?\n#3;em;[반응]"
41030-90 = "3;모에;05;오히려 RABBIT 소대의 소대원들과는 빨리 헤어지고 싶을 정도야."
41030-91 = "3;모에;06;사키는 매일 잔소리만 하지, 미유는 걸핏하면 울기나 하지…… 지긋지긋해.\n#3;stiff\n#3;em;[속상함]"
41030-92 = "#na;키리노;네? 그, 그럼 어째서 학원을 떠나고 싶지 않으셨던 건가요?"
41030-93 = "3;모에;08;그야 당연히 학원에 잔뜩 남아 있는 무기들 때문이지!\n#3;em;[반짝]"
41030-94 = "#na;키리노;무기라면 발키리 경찰학교에도 충분히 있는데요?"
41030-95 = "3;모에;05;에이, SRT 특수학원의 무기들은 발키리의 장난감들과는 차원이 다르다고!\n#3;hophop"
41030-96 = "3;모에;07;도심 한 블록을 통째로 태워버릴 수 있는 소이탄이라든가…… 전차의 장갑을 통째로 관통하는 대전차 미사일이라든가!"
41030-97 = "3;모에;11;이렇게 강력한 화력을 지닌 무기들을 마음껏 쓸 수 있는 곳은 SRT 특수학원뿐일 거야!\n#3;stiff\n#3;em;[///]"
41030-98 = "#na;키리노;SRT 학원에서도 마음껏 쓰시면 안 돼요!\n#fontsize;100"
41030-99 = "#na;키리노;(그, 그러고 보니 카제쿠라 양은 지난번 소동이 벌어졌을 때, 포탄을 무차별로 난사해 주변 상가를 반파시켰었죠…….)"
41030-100 = "#na;키리노;업무는 조금 다르긴 해도 SRT와 발키리, 두 학교 모두 시민의 안전을 지키기 위해 만들어진 조직이잖아요?"
41030-101 = "#na;키리노;그런데 오로지 무기를 쓰는 데에만 정신이 팔려 계시다니……"
41030-102 = "#na;키리노;카제쿠라 양은 시민의 안전이 어떻게 되든 상관없으신 건가요?!"

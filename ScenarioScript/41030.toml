41030-261 = "มิยาโกะ"
41030-267 = "เลื่อนการพิจารณา"
41030-270 = "สำนักงานกรมความมั่นคงสาธารณะ สถาบันฝึกตำรวจวัลคิรี่"
41030-271 = "นี่คือบันทึกการสอบสวนจำเลยหลักของเหตุการณ์ครั้งนี้ค่ะ..."
41030-272 = "ทำได้ดีมากเลยค่ะ ขอบคุณสำหรับความร่วมมือนะคะคุณครู"

41030-132 = "#st;[-1200,-150];serial;70;조사 용의자 : SRT 특수학원 1학년, 카스미자와 미유"
41030-133 = "#wait;2000"
41030-134 = "#clearST\n3;미유ND;00\n#3;h"
41030-135 = "#wait;1500"
41030-136 = "#na;후부키;어, 그러니까…… 이름이……"
41030-137 = "3;미유ND;02;카, 카스미자와 미유예요. SRT 특수학원 1학년이고…… RABBIT 소대에서 저격 임무를 맡고 있어요…….\n#3;em;[땀]\n#3;stiff"
41030-138 = "3;미유ND;00;나이는 15살이고요, 생일은 7월 12일…… 그, 그리고 취미는 조약돌 모으기입니다."
41030-139 = "#na;후부키;아니, 그런 것까지 말해줄 필요는 없는데……."
41030-140 = "3;미유ND;02;저, 저는 앞으로 어떻게 되는 건가요?"
41030-141 = "3;미유ND;04;지난번에 공원에서 경찰들을 상대로 심한 짓을 해버렸으니…… 분명히 끔찍한 고문을 받게 되겠죠……?\n#3;em;[속상함]\n#3;stiff"
41030-142 = "3;미유ND;08;하루 종일 같은 노래를 들려준다든가, 밤새도록 간지럼을 태운다든가……!"
41030-143 = "3;미유ND;09;제, 제발 용서해주세요! 아, 알고 있는 건 다 말할 테니까요!\n#3;hophop"
41030-144 = "#na;후부키;아니, 아니. 귀찮게 그런 짓까지 할 생각은 애초부터 없었으니까."
41030-145 = "#na;후부키;말할 마음이 들었다면, 어째서 우리 학교로 전학 오는 것을 거부하고 공원에서 그 난리를 피웠는지 이유나 좀 알려주면 좋겠는데."
41030-146 = "3;미유ND;00;그건…… 새로운 학교로 전학을 가야 한다는 게 너무 무서워서요……."
41030-147 = "#na;후부키;왜? 우리 학교에는 불량 학생도 없는데?"
41030-148 = "3;미유ND;02;다른 학생이 아니라…… 문제는 저 때문이에요."
41030-149 = "3;미유ND;00;저는, 누군가와 새로 친해지는 게 무서워요…….\n#3;em;…"
41030-150 = "3;미유ND;99;사실 지금도 소대원 모두와 그렇게 친하지는 않지만…… 그래도 최소한 미야코 쨩은 저를 가끔 챙겨 주기는 해요."
41030-151 = "3;미유ND;00;하지만 RABBIT 소대를 떠나 새 학교의, 새로운 부서에 속하게 된다면……"
41030-152 = "3;미유ND;07;분명 저 같은 모지리에게는 아무도 말을 걸어주지도 않을 테고…… 결국 저는 길가의 돌멩이처럼 방치되어 모두에게 잊히겠죠…….\n#3;em;[속상함]\n#3;stiff"
41030-153 = "3;미유ND;08;그럴 바에는 공원에서 노숙을 하는 게 더 나아요……."
41030-154 = "#na;후부키;신기한 성격이네. 사람을 만나는 게 무서운 거야?"
41030-155 = "3;미유ND;00;사람이 무섭다기보다는…… 사람들에게서 잊히는 게 무서워요."
41030-156 = "3;미유ND;04;이대로 모두에게 잊혀 혼자가 되어버린다면…… 그렇게 생각하면, 견딜 수가 없어서……."

41030-200 = "3;미야코;10;……그때의 선생님이시군요."
41030-201 = "[s1] \"안녕, 미야코.\"\n[s2] \"내가 와서 놀랐어?\""
41030-202 = "3;미야코;99;선생님이 여기 오셨다는 건, 저를 심문할 담당 취조관이 선생님이라는 뜻이시겠군요."
41030-203 = "3;미야코;99;……솔직히, 조금 놀랐습니다. 선생님이 직접 오실 거라 생각지는 못했거든요."
41030-204 = "3;미야코;11;선생님이 여기 오셨다는 건, 저를 심문할 담당 취조관이 선생님이라는 뜻이시겠군요."
41030-205 = "3;미야코;05;취조관이 누구든 상관없습니다. 제가 할 대답은 이미 정해놓았으니까요."
41030-206 = "3;미야코;11;부디 편하신 대로 질문을.\n#3;greeting"
41030-207 = "[s] \"지내기에 불편하지는 않아?\""
41030-208 = "3;미야코;10;그건 예상 외의 질문이군요.\n#3;em;…"
41030-209 = "3;미야코;99;괜찮습니다. 설령 불편한 점이 있다 하더라도 포로로 잡힌 몸이니 불평할 수는 없는 노릇이지요."
41030-210 = "3;미야코;11;아니면…… 제 처우를 개선해주시는 대가로 뭔가 제안하실 생각이셨나요?\n#3;em;[?]"
41030-211 = "3;미야코;05;혹여라도 제 마음을 돌려 볼 계획을 세우고 계셨더라면, 포기하시는 게 좋을 겁니다."
41030-212 = "3;미야코;11;선생님께서 무슨 제안을 하시더라도 SRT를 향한 저희의 결심은 변치 않을 테니까요."
41030-213 = "[s] \"어째서 발키리 경찰학교로 전학을 가고 싶지 않은 거야?\""
41030-214 = "3;미야코;99;……질문이 잘못된 것 같습니다만."
41030-215 = "3;미야코;10;전학을 가는 장소가 발키리 경찰학교라서 싫었던 게 아닙니다.\n#3;em;[반응]"
41030-216 = "3;미야코;05;SRT를 떠나는 것 자체가 싫었기 때문입니다."
41030-217 = "[s] \"그럼, 어째서 SRT 학원을 떠나고 싶지 않은 거야?\""
41030-218 = "3;미야코;11;……SRT 학원에서만 수행할 수 있는 '정의'가 있으니까요."
41030-219 = "[s] \"정의……?\""
41030-220 = "3;미야코;10;사실 이렇게 정의를 직접 입에 담는 것은 꽤 부끄러운 일인지도 모릅니다.\n#3;em;…"
41030-221 = "3;미야코;11;아마 선생님이 만났던 학생 중에서도 정의를 말하는 학생이 꽤 있었겠지요."
41030-222 = "3;미야코;99;트리니티나 게헨나…… 멀리 갈 것도 없이, 이곳 발키리 경찰학교의 학생들도 자신의 행동들이 정의라 믿고 있습니다."
41030-223 = "3;미야코;10;……하지만 저는 그들의 정의는 진짜 정의가 아니라고 생각합니다.\n#3;em;[반응]"
41030-224 = "3;미야코;05;정의란, 진리에 들어맞는 올바른 도리."
41030-225 = "3;미야코;05;그 도리는 진리에 근거를 두고 있기 때문에 당연히 상대나 상황에 따라 변하지 않습니다."
41030-226 = "3;미야코;10;하지만 키보토스의 치안 조직들은 특유의 복잡한 이해관계 때문에 정의를 자신의 입맛에 맞게 계속 왜곡시켜왔지요."
41030-227 = "3;미야코;11;하지만 SRT 특수학원에서만큼은…… 이러한 사회의 이해관계에 휘둘리지 않고 저희가 믿는 정의를 수행할 수 있었습니다.\n#3;em;…"
41030-228 = "3;미야코;99;언제 어디서나, 그 상대가 누구든, 같은 기준으로, 같은 정의를 추구하는 조직……."
41030-229 = "3;미야코;05;저는 그래서 어릴 적부터 SRT 특수학원을 동경해 왔습니다."
41030-230 = "3;미야코;05;학원 간의 이해관계에 휘둘리지 않는, 확고한 정의를 동경했습니다."
41030-231 = "3;미야코;06;하지만 결국 SRT는 해체되었고, 저는 결국…… 실패했습니다.\n#3;stiff\n#3;em;[속상함]"
41030-232 = "3;미야코;99;제가 좀 더 잘했더라면…… 동료들과 협력하여 능력을 최대한 발휘할 수 있었더라면, 실패하지 않았을 텐데……."

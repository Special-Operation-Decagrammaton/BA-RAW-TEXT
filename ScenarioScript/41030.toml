41030-274 = "ถ้าตามเดิมแล้ว ทางเราจะเสนอเรื่องการย้ายมาสถาบันฝึกตำรวจวัลคิรี่ให้เด็กพวกนั้นอีกครั้ง#nหลังสิ้นสุดระยะเวลาคุมขังค่ะ"
41030-275 = "แต่ความเสียหายที่เกิดขึ้นกับเหตุการณ์ครั้งนี้มันมากเกินกว่าที่คาดไว้ แถมผู้ใหญ่จากองค์การนักเรียน#nก็อยากให้มอบโทษขั้นรุนแรง ฉันว่านักเรียนพวกนั้นต้องโดนลงโทษอย่างหนักแน่ๆ ค่ะ"
41030-276 = "กรณีที่เลวร้ายที่สุด... ก็คงเป็นการลบระเบียนประวัติจนไม่สามารถย้ายไปเรียนที่โรงเรียนไหนได้อีกเลย"
41030-277 = "[s] \"ขอเปิดสถาบัน SRT ต่อตามคำขอของนักเรียนไม่ได้เหรอ?\""
41030-278 = "ขอให้ยอมรับข้อเรียกร้องของอาชญากรอย่างนั้นเหรอคะ... ฉันไม่ถูกใจสิ่งนี้เอาเสียเลยค่ะ"
41030-279 = "อีกอย่าง การสั่งปิดสถาบันพิเศษ SRT เป็นเรื่องที่กรรมการองค์การนักเรียนตัดสินใจเองด้วยค่ะ"
41030-280 = "ถึงจะเป็นคุณครูจากชาเล่ต์ที่อยู่เหนือกฎหมาย แต่ก็คงเปลี่ยนสถานการณ์นี้ได้ยากค่ะ"
41030-281 = "[s] \"ถ้างั้นต้องไปขอร้องจากใครล่ะ?\""
41030-282 = "ฉันตอบให้ไม่ได้หรอกค่ะ..."

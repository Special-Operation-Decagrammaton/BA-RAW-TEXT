[translation]
41030-1 = "Episode 3; The Squad's Circumstances"
41030-3 = "Interrogation Log: 977-R-1"
41030-5 = "Interrogator: Ogata Kanna, Valkyrie Police School, 3rd Year"
41030-7 = "Suspect: Sorai Saki, SRT Academy, 1st Year"
41030-12 = "Valkyrie Police School Main Building, Underground Interrogation Room"
41030-14 = "Your name."
41030-15 = "..."
41030-16 = "State your name!"
41030-17 = "Are you dumb? Did you forget my name already?"
41030-18 = "You're not asking the questions here."
41030-19 = "I'll ask one more time. What is your name?"
41030-20 = "...Sorai Saki."
41030-21 = "Affiliation?"
41030-22 = "RABBIT Squad of SRT Academy. That is, until you closed it down on a whim."
41030-23 = "Watch your words. Do you understand your situation?"
41030-24 = "Keep resisting, and you'll learn just how I earned the nickname the Feral Hound."
41030-25 = "Was that a threat? Is that the extent of your interrogation skills? Pfft."
41030-26 = "SRT Academy students deal with highly confidential information regularly! We're well trained in dealing with interrogations and torture!"
41030-27 = "So, do your worst!"
41030-31 = "You know, I've looked at your records. You were an incredibly talented student at SRT Academy."
41030-32 = "Nearly perfect scores on written tests, and you handled the practicals as if you've been in combat your entire life."
41030-33 = "Not a single violation on your record either. A golden student from every angle."
41030-34 = "So, tell me. Why would top-of-her-class, dedicated, and intelligent Sorai Saki do something like this? Was the thought of being transferred to Valkyrie Police School that horrible?"
41030-35 = "...Valkyrie isn't SRT."
41030-36 = "You're avoiding the question. Answer me clearly."
41030-37 = "Unlike Valkyrie Police School, SRT Academy follows strict, rigid principles both in the classroom and out."
41030-38 = "We wake up at the same time every morning, make our bed with precision, train in classes, and continue our duties and practice in our dorms."
41030-39 = "Valkyrie Police School's daily routine?"
41030-40 = "Your \"most disciplined\" Public Peace Bureau even wears casual clothes after classes. They play and do as they please after school rather than dedicating themselves to their training."
41030-41 = "You can chain me up, but I will always live as a dignified wolf, not a sheepdog lollygagging in a pasture."
41030-42 = "Is that really how you feel?"
41030-43 = "Then let me ask you another question."
41030-44 = "When Moe used all your ammo on shooting down the drone, why did you encourage it?"
41030-45 = "A model student like you surely knows how precious ammo is in a defensive battle."
41030-46 = "What did that have to do with your dignified principles?"
41030-47 = "W-Well, because..."
41030-48 = "I kind of thought it would be cool to see it all explode at once. In training, we're always graded on how much ammo we conserve..."
41030-52 = "Sorai"
41030-60 = "Saki"
41030-64 = "Fail"
41030-68 = "Interrogation Log: 977-R-2"
41030-70 = "Interrogator: Nakatsukasa Kirino, Valkyrie Police School, 1st Year"
41030-72 = "Suspect: Kazekura Moe, SRT Academy, 1st year"
41030-76 = "You're Kazekura Moe, correct?"
41030-77 = "The one and only."
41030-78 = "Hey, hey. Miss Officer, you almost done with your little questioning?"
41030-79 = "I'm running out of candy and I'm b-o-r-e-d. Can I go?"
41030-80 = "Absolutely not! We must complete your interrogation."
41030-81 = "And your concern here is candy? Please keep in mind you're a suspect in a very serious crime!"
41030-82 = "Cooperate, or there'll be no more candy for you at all!"
41030-83 = "Alright, alright, Miss Officer."
41030-84 = "Let me get to the point, Moe. Why did you occupy the park and disobey police commands?"
41030-85 = "Your sentencing would have been much less severe if you had just surrendered."
41030-86 = "...Leaving SRT would've sucked."
41030-87 = "Well... I can agree that no matter the circumstances, leaving Valkyrie Police School would be extremely painful."
41030-88 = "Our relationships and memories are precious. I'll note that down..."
41030-89 = "You've got it all wrong, Miss Officer."
41030-90 = "If you gave me a ticket away from the RABBIT members, I'd be on the next flight out."
41030-91 = "Miyu's a useless crybaby, and Saki is always just nag, nag, nag. Nagging queen."
41030-92 = "Th-Then what were your reasons for wanting to stay?"
41030-93 = "The big ka-booms of course! The weapons!"
41030-94 = "Valkyrie Police School could have provided weapons as well if that is your area of interest!"
41030-95 = "Pffffffft. Those measly little kiddie toys? They're not even in the same league!"
41030-96 = "Have you ever felt the rumble of an anti-tank missile tearing through enemy lines? Or seen incendiary bombs that set everything on fire, as far as you can see?"
41030-97 = "SRT Academy let me blow up what I wanted, with whatever I could dream of!"
41030-98 = "Even at SRT Academy you're not supposed to do that! At all!"
41030-99 = "(C-Come to think of it, Moe recklessly fired bombs and destroyed shops during the last incident.)"
41030-100 = "Although different in nature, SRT and Valkyrie were both created to protect the safety of citizens."
41030-101 = "But all you care about is blowing things up!"
41030-102 = "Moe, is protecting the peace not your utmost priority?!"
41030-103 = "It isn't."
41030-107 = "*sigh*"
41030-111 = "Kazekura"
41030-123 = " Moe"
41030-125 = "Fail"
41030-128 = "Interrogation Log: 977-R-3"
41030-130 = "Interrogator: Nemugaki Fubuki, Valkyrie Police School, 1st Year"
41030-132 = "Suspect for Investigation: Kasumizawa Miyu, SRT Academy, 1st Year"
41030-136 = "Sooo, what's your name again?"
41030-137 = "K-Kasumizawa Miyu, I'm a 1st year in RABBIT Squad... My role is the sniper..."
41030-138 = "I'm fifteen years old... I was born July twelfth. O-Oh...and I like collecting p-pebbles."
41030-139 = "I just needed your name..."
41030-140 = "What's gonna happen to me?"
41030-141 = "I know what I did in the park was really bad... A-Am I going to be tortured?"
41030-142 = "Like tickling me all night, or playing the same song on repeat over and over again..."
41030-143 = "Nooo! P-Please don't do it! I'm sorry! I'll tell you everything!"
41030-144 = "You can calm down... Torturing you would be way too much effort."
41030-145 = "You just have to explain why you did what you did and we can both get outta here."
41030-146 = "B-Because...I was scared of being transferred to a new school."
41030-147 = "Why? We're probably the safest school you could transfer to."
41030-148 = "N-No it's not that..."
41030-149 = "It's just that... I don't wanna have to make new friends all over again..."
41030-150 = "I mean... Miyako's the only one who ever really cares about me... But at least I have her."
41030-151 = "If I have to go to a whole, brand-new school..."
41030-152 = "Who would talk to me? I'm a crybaby and useless. I'll fade away into nothingness like a piece of gum on the street nobody even notices."
41030-153 = "I'd rather sleep with those icky bugs than meet new people."
41030-154 = "I see... So you're scared of people?"
41030-155 = "N-No, not exactly. But people can forget me."
41030-156 = "And I can't stand the thought of being forgotten. All by myself... Like a piece of gum..."
41030-157 = "That's why I went to SRT. But now my only home is gone, and I'm really scared..."
41030-158 = "Hey, I actually have an idea."
41030-159 = "Why don't you join the Public Safety Bureau? There's only a few of us, so you'd get in easy."
41030-160 = "I chose it specifically because you don't have to do anything! I just get to eat donuts and avoid people."
41030-161 = "A-Avoid people?"
41030-162 = "So, if I join your club, I could go to school and never talk to anyone, ever?"
41030-163 = "Um... I mean I think never ever is kinda impossible."
41030-164 = "We do still have to do some things. Like weird civil complaints and stuff."
41030-168 = "Can I just go back to the bugs?"
41030-172 = "Kasumizawa"
41030-186 = "Miyu"
41030-188 = "Fail"
41030-192 = "Interrogation Log: 977-R-4"
41030-194 = "Interrogator: [USERNAME] Sensei, Schale"
41030-196 = "Suspect for Investigation: Tsukiyuki Miyako, SRT Academy, 1st Year"
41030-200 = "...It's you."
41030-201 = "[s1] \"It's great to see you too, Miyako.\"\n[s2] \"I'm guessing you didn't miss me?\""
41030-202 = "I assume you'll be conducting my interrogation, Sensei."
41030-203 = "I'm surprised I was worth your time. It's a long trip out here."
41030-204 = "I assume you'll be conducting my interrogation, Sensei."
41030-205 = "Stop playing games. My answers will be the same no matter what."
41030-206 = "Ask away."
41030-207 = "[s] \"How are you doing?\""
41030-208 = "That's an unexpected question."
41030-209 = "I'm as fine as you would expect a prisoner to be. I can't complain much."
41030-210 = "Are you trying to negotiate with me? Better conditions for a favor?"
41030-211 = "If you think you can get in my head, you're fighting a losing battle."
41030-212 = "I won't abandon SRT Academy."
41030-213 = "[s] \"Why do you not want to transfer to Valkyrie Police School?\""
41030-214 = "The first question was unexpected, the second was bad. I'm keeping count."
41030-215 = "I'm not against going to Valkyrie Police School."
41030-216 = "I refuse to leave SRT Academy."
41030-217 = "[s] \"And why do you not want to leave SRT?\""
41030-218 = "A better question. SRT Academy has a unique sense of justice."
41030-219 = "[s] \"Can you tell me about it?\""
41030-220 = "Maybe I've relinquished my right to talk about justice."
41030-221 = "It's a word you hear a lot here in Kivotos."
41030-222 = "Students of Trinity, Gehenna, and even Valkyrie all fight for their own brand of justice."
41030-223 = "...I think their brand is trite."
41030-224 = "Justice is the path to preserving truth."
41030-225 = "Inherently, the path has to also be based on truth. If this is so, justice shouldn't change no matter who carries it out."
41030-226 = "All these academies, Kivotos' security organizations, everyone mixes politics and justice. And so justice becomes a sword they wield for their own self-interests. They taint it."
41030-227 = "SRT Academy... At SRT we served justice with principle, unaffected by society and politics."
41030-228 = "It didn't matter if it was me or Saki or Moe or Miyu. Or who our enemy was. Every member of our organization was dedicated to that path. To preserving truth."
41030-229 = "It's these principles that made me love SRT Academy, ever since I was little."
41030-230 = "I respected the justice they pursued. Unaffected by the inherent selfishness of humans."
41030-231 = "But I guess for all my idealistic spouting, SRT disbanded and I became a criminal."
41030-232 = "I'm a failure. If I had led my allies better, cooperated with them, united them, I wouldn't have let them down. I wouldn't have let SRT down."
41030-233 = "[s] \"You did well.\""
41030-237 = "...You're a weird one, Sensei."
41030-238 = "I don't think I deserve that compliment, especially from you."
41030-239 = "We planned everything in advance. On the other hand, you put together a strategy, understood and maximized your allies' talents, pried open your enemies' weaknesses, and overwhelmed us entirely in an emergency situation."
41030-240 = "I didn't stand a single chance."
41030-241 = "[s] \"Experience is a sharper sword than you'd think.\""
41030-243 = "[s] \"Can I ask again? How are you doing?\""
41030-244 = "My answer is the same."
41030-245 = "Unless you think you can stop SRT Academy from closing, I don't need anything from you, Sensei."
41030-246 = "[s] \"That, I can't make any promises on.\""
41030-247 = "Well, then know I won't stop fighting for SRT Academy."
41030-248 = "We'll go on fighting for what we believe in. We'll keep SRT Academy's justice alive."
41030-249 = "[s] \"Even when there's no hope?\""
41030-250 = "I won't give up."
41030-253 = "Tsukiyuki"
41030-263 = "Miyako"
41030-267 = "Decision Postponed"
41030-270 = "Valkyrie Police School, Public Peace Bureau Office"
41030-271 = "That's all of the suspects' interrogation records."
41030-272 = "Good work, as usual. Thanks for your cooperation."
41030-273 = "[s] \"Has their sentence been decided?\""
41030-274 = "Well. Honestly, I wanted to try to assimilate them into Valkyrie Police School after a period of detention."
41030-275 = "But the General Student Council was involved, so the consequences from this incident go way further than my reach. They're calling for severe disciplinary action."
41030-276 = "They're considering expunging their academic records and essentially exiling them."
41030-277 = "[s] \"Is there no way to reopen SRT Academy, as they requested?\""
41030-278 = "You're a softie, aren't you? I wouldn't accommodate a criminal's request, even if I could."
41030-279 = "The closure of SRT Academy was the General Student Council's decision."
41030-280 = "Even with all your authority, it'd be nearly impossible to reverse it."
41030-281 = "[s] \"So, who would I need to talk to?\""
41030-282 = "I can't answer that question..."
41030-283 = "I believe I can help with that."
41030-284 = "Is that...?"
41030-291 = "I'm jumping with joy to finally meet you, Sensei."
41030-292 = "I'm Shiranui Kaya, representative of the Defense Office under the Kivotos General Student Council."
41030-294 = "Next Episode; Chief of Staff's Circumstances"

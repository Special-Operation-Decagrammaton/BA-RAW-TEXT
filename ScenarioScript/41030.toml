[translation]
41030-1 = "第3話;それぞれの事情"
41030-3 = "取調記録：977-R-1"
41030-5 = "担当者：ヴァルキューレ警察学校 3年 [ruby=おがた]尾刃[/ruby]カンナ"
41030-7 = "容疑者：SRT特殊学園 1年 [ruby=そらい]空井[/ruby]サキ"
41030-12 = "ヴァルキューレ警察学校・取調べ室"
41030-14 = "……名前は。"
41030-15 = "……。"
41030-16 = "名前を言え！"
41030-17 = "……とっくに知ってるだろ、聞く必要あるか？"
41030-18 = "質問は許可してない。"
41030-19 = "もう一度聞く、名前は？"
41030-20 = "……空井サキだ。"
41030-21 = "所属は？"
41030-22 = "SRT特殊学園、RABBIT小隊所属……だった。お前たちが勝手に閉鎖するまではな。"
41030-23 = "……良い態度だな。自分の状況を理解してるのか？"
41030-24 = "私がヴァルキューレ警察学校の「狂犬」と呼ばれていること……そちらこそ、知らないわけではないだろう？"
41030-25 = "今さらそんな脅しが効くとでも思ってるのか？本当にそう考えてるならガッカリだ。"
41030-26 = "SRTでの訓練には、捕虜になった時のことも想定された内容が組まれている。機密の取り扱いも少なくない。"
41030-27 = "たとえお前が何をしようと、何かを聞き出せると思ったら大間違いだ。"
41030-31 = "……連邦生徒会からの資料も読んだ。どうやらSRTの中でも、相当優秀な成績を収めていたようだな。"
41030-32 = "筆記試験はほぼ満点、演習における実技もほぼ問題無い。"
41030-33 = "学校でも校則違反ひとつ犯していない……間違いなく優等生だ。"
41030-34 = "そんな貴様がなぜヴァルキューレへの編入を拒み、デモなんてものを起こした？"
41030-35 = "……ヴァルキューレ警察学校と、SRT特殊学園とは違う。"
41030-36 = "答えになってない。"
41030-37 = "SRT特殊学園では、放課後でも厳格な規則の下で生活をすることになる。"
41030-38 = "定時に起床して寝具を整理し、一日の訓練と座学を行う。放課後だって寮の中で気を緩めずに訓練や整備をすることが求められる。その[ruby=じょうざいせんじょう]常在戦場[/ruby]の心構えが、SRTがSRTたる[ruby=ゆえん]所以[/ruby]。"
41030-39 = "……ヴァルキューレ警察学校とは違う。"
41030-40 = "最も規律に厳しいと言われる公安局でさえも、放課後には私服で自由なことができるんだろ？市民に緊張感を与えないという理由があったとしても。"
41030-41 = "私は、そんな生き方はしない。のうのうと自由を与えられ[ruby=ヴァルキューレ]た犬に[/ruby]なるくらいなら、厳しい環境下でも[ruby=SRT]狼[/ruby]として誇りを持って生きる。"
41030-42 = "……それが貴様の答えか。"
41030-43 = "……もう一つ聞こう。"
41030-44 = "交戦中、[ruby=かぜくら]風倉[/ruby]が中継用のドローンを破壊した。あの時、意味も無く弾丸を浪費したはずだ。"
41030-45 = "どうして止めなかった？貴様ほどの優等生だったら、ああいった防衛戦において弾薬がどれだけ貴重なものか、知っていたはずだろう？"
41030-46 = "それも何か、SRTなりの規律だったのか？"
41030-47 = "……。"
41030-48 = "訓練では弾薬の無駄撃ちとかできなかったし、一回くらいやってみたくて……。"
41030-52 = "空"
41030-54 = "井"
41030-60 = "サ"
41030-62 = "キ"
41030-64 = "不適格"
41030-68 = "取調記録：977-R-2"
41030-70 = "担当者：ヴァルキューレ警察学校 1年生 [ruby=なかつかさ]中務[/ruby]キリノ"
41030-72 = "容疑者：SRT特殊学園 1年生 [ruby=かぜくら]風倉[/ruby]モエ"
41030-76 = "えっと……風倉モエさん。"
41030-77 = "んー？"
41030-78 = "っていうかそろそろ聞いておきたいんだけど、これ何時間くらいやるの？"
41030-79 = "早めに終わらせてくんないかな。予備の飴も少なくなってきたし。"
41030-80 = "そ、そうは行きません！"
41030-81 = "この状況で、飴の話をしている場合ですか？"
41030-82 = "そういった態度でしたら、その残った飴も没収してしまいますよ！"
41030-83 = "めんどくさいなあ……。"
41030-84 = "風倉さん、単刀直入にお聞きします。どうしてあの時、公園を占拠したのですか？どうしてヴァルキューレの呼びかけに応じなかったのですか？"
41030-85 = "最初から武器を捨てて素直に投降していたら、事態はここまで大きくならなかったはずです。"
41030-86 = "……SRTから、出ていきたくなかったから。"
41030-87 = "な、なるほど……確かに本官も、突然「ヴァルキューレ警察学校から出ていけ」と言われたら悩んでしまいます。"
41030-88 = "苦楽を共にした仲間との思い出、それを簡単に捨て去ることなどできません……承知しました。その点については情状酌量の――"
41030-89 = "いや、それは別にどーでも良いんだけど。"
41030-90 = "むしろあのRABBIT小隊とはさっさとお別れしたいところだよ。"
41030-91 = "サキは毎日小言ばっかりだし、ミユはすぐ泣くし……。"
41030-92 = "で、では、どうしてSRTを離れたくないと……？"
41030-93 = "そりゃあ勿論、あの大量の武器のためだよ！"
41030-94 = "ぶ、武器でしたら、ヴァルキューレ警察学校にも色々とありますが……？"
41030-95 = "いやいやいや、ヴァルキューレなんかとはレベルが違うんだって！"
41030-96 = "区画をひとつ丸ごと焼き尽くせるようなミサイルとか、戦車の装甲をものともしない弾薬とか……！"
41030-97 = "あんなに強力な火力を好きなだけ振り回せるのは、SRT特殊学園だけでしょ！"
41030-98 = "い、いえ、SRT特殊学園でも「好きなだけ」はダメですよ！？"
41030-99 = "（そういえばこの方、いつか無差別乱射で商店街を半壊にさせたとか……）"
41030-100 = "SRTもまたヴァルキューレと同じで、本来は市民の安全を守るための組織じゃないですか……。"
41030-101 = "それなのに、武器が一番大事とは……"
41030-102 = "風倉さんはまさか、市民の安全はどうでも良いと仰るのですか！？"
41030-103 = "うん。"
41030-107 = "……。"
41030-111 = "風"
41030-113 = "倉"
41030-117 = "モ"
41030-121 = "エ"
41030-125 = "不適格"
41030-128 = "取調記録：977-R-3"
41030-130 = "担当者：ヴァルキューレ警察学校 1年生 [ruby=ねむがき]合歓垣[/ruby]フブキ"
41030-132 = "容疑者：SRT特殊学園 1年生 [ruby=かすみざわ]霞沢[/ruby]ミユ"
41030-136 = "えっと、名前は……"
41030-137 = "か、霞沢ミユ、です。SRT特殊学園の1年生で……RABBIT小隊では、狙撃手を担当しています……。"
41030-138 = "15歳で、誕生日は7月12日……しゅ、趣味は小石探し、です。"
41030-139 = "いや、そこまでは別にいらないけど……。"
41030-140 = "わ、私、これからどうなるんでしょうか……？"
41030-141 = "もしかして、恐ろしい拷問とか……！？"
41030-142 = "一日中同じ曲を聴かされるですとか、一晩中くすぐられるとか……！"
41030-143 = "お、お願いです許してください！し、知ってることは全部言いますので……！"
41030-144 = "いや、それも別にしないし……。"
41030-145 = "言ってくれるんなら、まず理由を説明してくれると嬉しいかな。どうしてヴァルキューレへの編入を拒否したのか、どうしてあの公園でデモを起こしたのか。"
41030-146 = "へ、編入はその……怖くって……。"
41030-147 = "怖いって……別にうちの学校、不良とかほとんどいないと思うけど？"
41030-148 = "いえ、その、そういった意味ではなくって……。"
41030-149 = "私、その、誰かと仲良くなるのが、怖いんです……。"
41030-150 = "今のRABBIT小隊でも、そんなに仲が良いわけではありませんが……ミヤコちゃんとか、時々面倒を見てくれたりしてますし……。"
41030-151 = "でも、新しいところに編入することになったら……。"
41030-152 = "全部、初めからになって……こんな影の薄い私になんて、誰も話しかけてくれないでしょうし……。"
41030-153 = "そんなことになるくらいなら、いっそのこと公園で野宿でもした方が……。"
41030-154 = "……変な子だね。新しい人に会うのは怖い？"
41030-155 = "会うことが怖いと言いますか……人から忘れられるのが、怖いです。"
41030-156 = "誰にも認識されなくなったら……そう考えると、もう……。"
41030-157 = "この性格を直したくてSRTに入ったのに、学校が閉鎖なんて……私、どうすれば良いのでしょうか？"
41030-158 = "なるほどねぇ……"
41030-159 = "じゃあ、うちの生活安全局にでも来たら？編入試験も難しくないし、数もそれほど多くないし。"
41030-160 = "多分忘れられるとか無いんじゃないかな。面倒ごとも少ないし、人に会うこともそんなに無い部署だからさ。"
41030-161 = "そ、そうなんですか……？"
41030-162 = "ほとんど誰とも会わずに、静かに学校生活が……？"
41030-163 = "うーん、「ほとんど誰とも」は無理かな。"
41030-164 = "生活安全局には、色んな市民から苦情とか入って来るし……。"
41030-168 = "あ、じゃあ無理です……。"
41030-172 = "霞"
41030-174 = "沢"
41030-178 = "ミ"
41030-180 = "ユ"
41030-188 = "不適格"
41030-192 = "取調記録：977-R-4"
41030-194 = "担当者：シャーレ [USERNAME]先生"
41030-196 = "容疑者：SRT特殊学園 1年生 [ruby=つきゆき]月雪[/ruby]ミヤコ"
41030-200 = "……あの時の。"
41030-201 = "[s1] \"ミヤコ……だよね？\"\n[s2] \"びっくりした？\""
41030-202 = "つまり、取り調べの担当者が先生ということですよね。"
41030-203 = "……正直、少し驚きました。まさか先生がいるとは。"
41030-204 = "つまり、取り調べの担当者が先生ということですよね。"
41030-205 = "まあ、誰だって構いません。相手が誰であろうと、答えは変わりませんから。"
41030-206 = "何か聞きたいことがあればどうぞ。"
41030-207 = "[s] \"そこでの生活、何か不便なこととか無い？\""
41030-208 = "……最初から変な質問ですね。"
41030-209 = "お気になさらず。仮にあったとしても、捕虜の立場で何か言うつもりもありません。"
41030-210 = "それともあれでしょうか？環境を改善する代わりに、何か情報を引き出そうと？"
41030-211 = "心変わりでもさせようとしているのでしたら、諦めた方が良いです。"
41030-212 = "仮に何を提案されても、私たちのSRTへの気持ちは変わりません。"
41030-213 = "[s] \"そっか。ところで質問なんだけど、ミヤコはヴァルキューレが嫌い？\""
41030-214 = "……何か勘違いされているかもしれませんが。"
41030-215 = "特段、ヴァルキューレが嫌いだったから転校を拒否したわけではありません。"
41030-216 = "嫌なのは、SRTを去ることです。"
41030-217 = "[s] \"なるほど。その理由を聞いても良いかな？\""
41030-218 = "……SRTには、そこにしかない「正義」があるからです。"
41030-219 = "[s] \"「正義」……。\""
41030-220 = "あらためて話すと、難しい概念ではあります。"
41030-221 = "しかし先生も、「正義」について耳にする機会はあるでしょう。"
41030-222 = "他の学園もそういった集団はあると聞きますが……ここヴァルキューレもまた、生徒たちは自らの行動が「正義」だと信じているかと思います。"
41030-223 = "……しかし私にとって、彼女たちの正義は「本当の正義」ではないと考えています。"
41030-224 = "「正義」とは、理にかなった正しい道理のこと。"
41030-225 = "その道理は真理に基づくものです。であるならば、相手や状況によって変わるものではありません。"
41030-226 = "しかしキヴォトスにおける各所の治安組織は、様々な利害関係の中にあります。その結果、「正義」というものを自分たち独自に歪曲し続けてきました。"
41030-227 = "しかしSRT特殊学園だけは……学園間の関係や利害の問題に左右されず、自らが信じる正義を実行していました。"
41030-228 = "時と場所を選ばず、相手が誰であっても同じ基準で、ひとつの正義を追求する組織……。"
41030-229 = "そんなSRT特殊学園に、私は憧れたのです。"
41030-230 = "そういった、屈強な正義に。"
41030-231 = "しかし、SRT特殊学園は閉鎖……。"
41030-232 = "私がもう少し上手くやれていれば……きちんと彼女たちの能力を上手く発揮できていれば……。"
41030-233 = "[s] \"聞く限り、ミヤコは十分頑張ってたと思うけど……。\""
41030-237 = "……ほとんど初対面の人にそう言われましても。"
41030-238 = "先生からそんな誉め言葉を聞いたところで、何にもなりません。"
41030-239 = "先生はあの時、短い時間で味方の長所を最大化し、私たちの弱みを突いて戦況を変えました。それに比べて……"
41030-240 = "私は、全然上手くできず……。"
41030-241 = "[s] \"そこまで自分を責めなくても良いんじゃないかな……？\""
41030-243 = "[s] \"……話は変わるけど、何か必要な物とか無い？欲しい物でも。\""
41030-244 = "……他に話すことはありません。先ほどお伝えした通り、不満もありませんし。"
41030-245 = "強いて言うとすれば、SRT特殊学園の閉鎖命令を撤回していただきたいのですが？"
41030-246 = "[s] \"今すぐ私だけでどうにかするのは、ちょっと難しいかも……。\""
41030-247 = "……でしたら私たちは戦い続けます、SRT特殊学園の復活のために。"
41030-248 = "諦めない限り、SRTの名前は無くなりませんので。"
41030-249 = "[s] \"……仮に、勝算が薄いとしても？\""
41030-250 = "はい。"
41030-253 = "月"
41030-255 = "雪"
41030-259 = "ミ"
41030-261 = "ヤ"
41030-263 = "コ"
41030-267 = "保留"
41030-270 = "ヴァルキューレ警察学校・公安局オフィス"
41030-271 = "……以上が、今回の記録です。"
41030-272 = "先生にもお忙しい中ご協力いただいてしまい、ありがとうございました。おかげ様で手間が省けました。"
41030-273 = "[s] \"あの子たちは、これからどうなるの？\""
41030-274 = "一定期間の拘禁の後、本来であれば再度ヴァルキューレへの編入を薦める手はずだったのですが……。"
41030-275 = "連邦生徒会からの要望が強いため、そちらで処罰が下されるでしょう。事件の被害が大きかったこともあり、重いものになりそうです。"
41030-276 = "最悪の場合、どの学校にも編入できない状態に……。"
41030-277 = "[s] \"SRT特殊学園の復活って、やっぱりあり得ないのかな？\""
41030-278 = "……そもそも私としては、彼女たちの要求を飲むこと自体が気に入らないのですが。"
41030-279 = "それはさておき、「SRT特殊学園の閉鎖」は連邦生徒会の決定です。少なくとも私のような存在がどうこう言えることではありませんし……"
41030-280 = "「超法規的権限」を持つシャーレだとしても、これを覆すことは難しいかと。"
41030-281 = "[s] \"じゃあ、連邦生徒会の誰かに聞いてみるとか……？\""
41030-282 = "それは、私からは何とも……。"
41030-283 = "では、私が代わりにお答えしましょうか。"
41030-284 = "こ、この声は……。"
41030-291 = "初めまして……ですね、先生。"
41030-292 = "キヴォトス連邦生徒会所属、防衛室のカヤと申します。"
41030-294 = "次回;別側面の事情"

[translation]
41030-1 = "ตอนที่ 3;เหตุผลของกองทหาร"
41030-3 = "บันทึกการสอบสวนที่ 977-R-1"
41030-5 = "พนักงานสอบสวน: โอกาตะ คันนะ ชั้นปีที่ 3 สถาบันฝึกตำรวจวัลคิรี่"
41030-7 = "จำเลย: โซราอิ ซากิ ชั้นปีที่ 1 สถาบันพิเศษ SRT"
41030-12 = "ห้องสอบสวนใต้ดิน อาคารส่วนกลาง สถาบันฝึกตำรวจวัลคิรี่"
41030-14 = "ชื่อ..."
41030-15 = "......"
41030-16 = "ชื่อ!"
41030-17 = "ถามทำไมอีก? ก็รู้ชื่ออยู่แล้วไม่ใช่เหรอ?"
41030-18 = "เธอไม่ได้รับสิทธิ์ในการถาม"
41030-19 = "ฉันจะถามอีกครั้ง ชื่ออะไร?"
41030-20 = "โซราอิ ซากิ..."
41030-21 = "สังกัด?"
41030-22 = "กองทหาร RABBIT สถาบันพิเศษ SRT ที่ตอนนี้มันไม่มีแล้วเพราะพวกคุณสั่งปิดไง"
41030-23 = "พูดจาไม่สุภาพเลยนะ นี่เธอรู้สถานภาพของตัวเองหรือเปล่า?"
41030-24 = "ถ้ายังจะตอบด้วยน้ำเสียงน่าหมั่นไส้แบบนี้เรื่อยๆ เธอจะได้เห็นคำตอบกับตาตัวเองเลยว่าทำไม#nคนที่นี่ถึงเรียกฉันว่า 'หมาบ้า' แห่งสถาบันฝึกตำรวจวัลคิรี่ "
41030-25 = "เหอะ นี่จะข่มขู่กันงั้นเหรอ? คงคิดสินะว่า SRT จะกลัวจนหัวหด... น่าผิดหวังจังนะ"
41030-26 = "ไม่ต้องบอกก็น่าจะรู้ว่านักเรียนของสถาบัน SRT ต้องเก็บรักษาความลับระหว่างปฏิบัติการ#nพวกเราได้รับการฝึกล่วงหน้ามาอย่างดีหากโดนจับไปเป็นตัวประกัน"
41030-27 = "วิธีการสอบสวนทั้งหมดของคุณน่ะ ใช้กับพวกเราไม่ได้หรอก"
41030-31 = "จากเอกสารที่ได้จากสภานักเรียน เธอคือนักเรียนที่มีผลการเรียนดีเยี่ยมอย่างต่อเนื่องของสถาบัน SRT เลยสินะ"
41030-32 = "สอบข้อเขียนก็ได้คะแนนเกือบเต็ม ส่วนสอบภาคสนามก็ผ่านฉลุย"
41030-33 = "เป็นนักเรียนต้นแบบที่ยังไม่เคยละเมิดกฎของโรงเรียนเลยแม้แต่ข้อเดียวในระหว่างเรียน"
41030-34 = "แล้วทำไมกันนะ... ทำไมนักเรียนต้นแบบอย่างเธอถึงปฏิเสธการเข้าเรียนที่สถาบันฝึกตำรวจวัลคิรี่ แล้วเลือกใช้วิธีหยาบกร้านในการต่อสู้ด้วยกำลังทหาร?"
41030-35 = "ก็สถาบันฝึกตำรวจวัลคิรี่ไม่ใช่สถาบัน SRT ไง..."
41030-36 = "นั่นไม่ใช่คำตอบที่สมเหตุสมผลนะ พูดให้มันรู้เรื่องหน่อย!"
41030-37 = "นักเรียนของสถาบันพิเศษ SRT ไม่เหมือนกับนักเรียนของสถาบันฝึกตำรวจวัลคิรี่ พวกเราต้องอยู่ภาย#nใต้กฎที่เข้มงวดแม้จะหลังเลิกเรียนไปแล้วก็ตาม"
41030-38 = "เราต้องตื่นให้ตรงเวลาและเก็บที่นอนเพื่อไปรับการฝึกฝนที่โรงเรียน หลังเลิกเรียนแล้วก็มาดูแล#nอาวุธและของใช้ส่วนตัวในหอพัก... การเตรียมตัวให้พร้อมเหมือนอยู่ในสนามรบตลอดเวลาคือสิ่งที่#nหล่อหลอมให้ SRT เป็น SRT มาถึงทุกวันนี้"
41030-39 = "แล้วการใช้ชีวิตที่สถาบันฝึกตำรวจวัลคิรี่ล่ะเป็นยังไง?"
41030-40 = "แม้จะเป็นนักเรียนของกรมความมั่นคงสาธารณะที่มีระเบียบวินัยเข้มงวดที่สุด แต่หลังเลิกเรียนแล้ว#nก็ใส่ชุดลำลองและได้ทำอะไรตามใจ ด้วยเหตุผลที่ว่าเราไม่ควรทำตัวแปลกแยกจากพลเมือง"
41030-41 = "ฉันน่ะ... ยอมใช้ชีวิตเยี่ยงหมาป่าที่แม้จะมีสายรัดคอแต่ก็ยังไม่ลืมความภาคภูมิใจ ยังจะดีซะกว่าไปใช้ชีวิตเป็นหมาของคนเลี้ยงแกะในฟาร์ม"
41030-42 = "นั่นคือคำตอบของเธอเหรอ..."
41030-43 = "งั้นขอถามอีกอย่างก็แล้วกัน"
41030-44 = "ในระหว่างที่ปะทะกัน คาเซะคุระใช้กระสุนปืนโดยไม่จำเป็นแล้วยิงโดรนให้ร่วงลงมา ตอนนั้นทำไมเธอไม่ห้ามไว้?"
41030-45 = "นักเรียนต้นแบบอย่างเธอน่าจะรู้ดีนะว่ากระสุนคือสิ่งที่มีค่ามากแค่ไหนในการต่อสู้?"
41030-46 = "หรือว่านั่นเกี่ยวกับวินัยของ SRT?"
41030-47 = "เอ่อ คือว่า..."
41030-48 = "ฉันแค่อยากเห็นการรัวกระสุนดูสักครั้ง เพราะตอนฝึกพวกเราต้องใช้กระสุนกันอย่างประหยัด..."
41030-52 = "โซราอิ"
41030-60 = "ซากิ"
41030-64 = "ไม่ผ่าน"
41030-68 = "บันทึกการสอบสวนที่ 977-R-2"
41030-70 = "พนักงานสอบสวน: นาคัตสึคาสะ คิริโนะ ชั้นปีที่ 1 สถาบันฝึกตำรวจวัลคิรี่"
41030-72 = "จำเลย: คาเซะคุระ โมเอะ ชั้นปีที่ 1 สถาบันพิเศษ SRT"
41030-76 = "คาเซะคุระ โมเอะ ใช่ไหมคะ?"
41030-77 = "อืม ใช่"
41030-78 = "ว่าแต่ฉันต้องตอบคำถามน่ารำคาญแบบนี้ไปถึงเมื่อไรน่ะ?"
41030-79 = "ถ้าถามหมดแล้วก็ปล่อยออกไปข้างนอกสักทีสิ ลูกอมที่ฉันเอามาเติมความหวานให้ร่างกายมันใกล้#nจะหมดแล้วนะ"
41030-80 = "ไม่ได้นะคะ! ฉันปล่อยให้ออกไปก่อนที่จะสิ้นสุดการสอบสวนไม่ได้ค่ะ!"
41030-81 = "อีกอย่าง จะไปเอาลูกอมงั้นเหรอคะ? คุณเป็นถึงจำเลยที่ถูกจับกุมในข้อหาอาชญากรรมร้ายแรงเลยนะ"
41030-82 = "ถ้าไม่ให้ความร่วมมือกันละก็ ฉันจะยึดลูกอมที่มีอยู่ทั้งหมดเลยค่ะ!"
41030-83 = "ชิ... น่ารำคาญชะมัด"
41030-84 = "ฉันขอถามตรงๆ เลยนะคะ คุณคาเซะคุระ ทำไมถึงไปยึดสวนสาธารณะและไม่ทำตามคำสั่งของ#nตำรวจเหรอคะ?"
41030-85 = "ถ้าทิ้งอาวุธและยอมมอบตัวตั้งแต่แรกก็คงไม่เกิดเรื่องใหญ่ขนาดนี้หรอกค่ะ"
41030-86 = "ก็เพราะฉันไม่อยากออกจาก SRT ยังไงล่ะ..."
41030-87 = "อืม... ถ้าเป็นฉัน ฉันก็คงไม่อยากจากสถาบันฝึกตำรวจวัลคิรี่ไปเหมือนกันค่ะ"
41030-88 = "เพราะความทรงจำกับเพื่อนๆ ที่ร่วมทุกข์ร่วมสุขด้วยกันมามันมีค่ามาก ฉันจะพิจารณาจากจุดนี้#nแล้วจัดการ..."
41030-89 = "ไม่สิ ไม่เห็นจะเกี่ยวกับเพื่อนๆ สักหน่อย?"
41030-90 = "จริงๆ ฉันอยากออกจากกองทหาร RABBIT เร็วๆ มากกว่า"
41030-91 = "ซากิเอาแต่บ่นอยู่ทุกวัน ส่วนมิยุก็เจ้าน้ำตา... ฉันล่ะเซ็ง"
41030-92 = "อ้าว? แล้วทำไมถึงไม่อยากออกจากโรงเรียนล่ะคะ?"
41030-93 = "ก็เพราะอาวุธที่มีมากมายในโรงเรียนยังไงล่ะ!"
41030-94 = "ที่สถาบันฝึกตำรวจวัลคิรี่ก็มีอาวุธเหมือนกันนะคะ?"
41030-95 = "ก็เรานั้นมันคนละชั้นกัน! อาวุธของสถาบันพิเศษ SRT มันคนละชั้นกับของเล่นในวัลคิรี่นะ!"
41030-96 = "ไหนจะระเบิดไฟที่เผาใจกลางเมืองได้... ไหนจะขีปนาวุธทำลายล้างที่เจาะเกราะรถถังได้อีก!"
41030-97 = "ที่ที่ฉันใช้อาวุธที่มีอานุภาพได้ตามใจชอบมีเพียงสถาบันพิเศษ SRT เท่านั้น!"
41030-98 = "ถึงจะเป็นสถาบัน SRT แต่จะใช้ตามใจชอบไม่ได้นะคะ!"
41030-99 = "(จะว่าไป คราวก่อนที่เกิดความโกลาหลขึ้น คุณคาเซะคุระถล่มกระสุนปืนใหญ่ใส่ย่านการค้าอย่างไม่#nสนใจใครเลยนี่นา...)"
41030-100 = "ถึงภารกิจของเราจะต่างกัน แต่ทั้ง SRT และวัลคิรี่ต่างก็เป็นองค์กรที่สร้างขึ้นเพื่อปกป้องความปลอดภัย#nของพลเมืองไม่ใช่เหรอคะ?"
41030-101 = "ทำไมถึงเอาแต่หมกมุ่นอยู่กับการใช้อาวุธล่ะ..."
41030-102 = "คุณคาเซะคุระไม่สนความปลอดภัยของพลเมืองเหรอคะ?!"
41030-103 = "อื้ม"
41030-107 = "เฮ้อ..."
41030-111 = "คาเซะคุระ"
41030-121 = "โมเอะ"
41030-125 = "ไม่ผ่าน"
41030-128 = "บันทึกการสอบสวนที่ 977-R-3"
41030-130 = "พนักงานสอบสวน: เนมุคากิ ฟุบุกิ ชั้นปีที่ 1 สถาบันฝึกตำรวจวัลคิรี่"
41030-132 = "จำเลย: คาซุมิซาวะ มิยุ ชั้นปีที่ 1 สถาบันพิเศษ SRT"
41030-136 = "เอาล่ะ... จำเลยชื่อว่า..."
41030-137 = "คะ... คาซุมิซาวะ มิยุค่ะ อยู่ชั้นปีที่ 1 สถาบันพิเศษ SRT... ตำแหน่งสไนเปอร์ประจำกองทหาร RABBIT ค่ะ..."
41030-138 = "อายุ 15 ปี เกิดวันที่ 12 ก.ค. แล้วก็... งานอดิเรกชอบสะสมก้อนกรวดค่ะ"
41030-139 = "เอ่อ... ไม่ต้องแนะนำตัวขนาดนั้นก็ได้..."
41030-140 = "ต่อไปฉันจะเป็นยังไงเหรอคะ?"
41030-141 = "พวกฉันทำไม่ดีกับตำรวจในสวนสาธารณะ... แบบนี้ต้องโดนลงโทษอย่างหนักแน่เลยค่ะ..."
41030-142 = "อย่างเช่นให้ฟังเพลงเพลงเดียวทั้งวัน หรือว่าจั๊กจี้ตลอดทั้งคืน...!"
41030-143 = "ได้โปรดยกโทษให้พวกเราด้วยนะคะ! ฉันจะยอมให้ปากคำทุกอย่างเลยค่ะ!"
41030-144 = "เดี๋ยวสิเดี๋ยวๆ พวกฉันไม่เคยคิดจะทำอะไรแบบนั้นหรอก"
41030-145 = "ถ้าอยากให้ปากคำละก็ ช่วยบอกหน่อยว่าทำไมถึงปฏิเสธการย้ายมาเรียนที่โรงเรียนของเรา และทำไมถึงไปก่อเรื่องวุ่นวายที่สวนสาธารณะ"
41030-146 = "คือว่า... ฉันกลัวการต้องย้ายไปอยู่โรงเรียนใหม่น่ะค่ะ..."
41030-147 = "ทำไมเหรอ? โรงเรียนของเราไม่มีเด็กเกเรนะ?"
41030-148 = "ปัญหาไม่ใช่นักเรียนคนอื่นหรอกค่ะ เป็นที่ฉันมากกว่า..."
41030-149 = "ฉัน... กลัวการต้องคบเพื่อนใหม่น่ะค่ะ..."
41030-150 = "ที่จริงตอนนี้ฉันก็ไม่ได้สนิทกับสมาชิกกองทหารขนาดนั้นหรอกค่ะ... แต่บางครั้งมิยาโกะจังก็จะมา#nพูดคุยกับฉันบ้าง"
41030-151 = "แต่ถ้าหากต้องออกจากกองทหาร RABBIT แล้วมาอยู่โรงเรียนใหม่ และไปสังกัดอยู่ทีมอื่นละก็..."
41030-152 = "คงไม่มีใครมาคุยกับเด็กเซ่อๆ อย่างฉัน... และสุดท้ายฉันก็คงถูกทอดทิ้งและหายไปจากความทรงจำ#nของทุกคนเหมือนก้อนหินข้างถนน..."
41030-153 = "ถ้าต้องเป็นแบบนั้น ฉันยอมเป็นคนไร้บ้านอยู่ในสวนสาธารณะดีกว่าค่ะ..."
41030-154 = "แปลกดีแฮะ เธอกลัวการพบเจอผู้คนเหรอ?"
41030-155 = "ฉันไม่ได้กลัวการพบปะผู้คนหรอกค่ะ... ฉันกลัวการถูกลืมมากกว่า..."
41030-156 = "ถ้าทุกคนลืมฉัน และถ้าต้องเหลือแค่ตัวคนเดียว... พอคิดแบบนั้นก็ทนไม่ไหวแล้วค่ะ..."
41030-157 = "ฉันสมัครเข้าสถาบันพิเศษ SRT เพราะอยากแก้นิสัยนี้ แต่สุดท้ายโรงเรียนก็ต้องถูกรื้อถอนไปหมด... แบบนี้ฉันควรทำยังไงดีคะ? "
41030-158 = "ที่สถาบันฝึกตำรวจวัลคิรี่ก็มีแผนกหนึ่งที่เหมาะกับเธออยู่นะ"
41030-159 = "มาที่สำนักรักษาความปลอดภัยของฉันสิ! ที่นี่น่ะ ข้อสอบข้อเขียนก็ไม่ยาก และคนก็มีไม่เยอะด้วย"
41030-160 = "ที่นี่แทบจะไม่มีเรื่องยุ่งยากเกิดขึ้นเลย ถือว่าเหมาะมากกับจอมขี้เกียจที่ไม่อยากออกไปพบเจอผู้คน"
41030-161 = "จะ... จริงเหรอคะ?"
41030-162 = "ถ้าไปอยู่ในสำนักรักษาความปลอดภัย ฉันจะไปโรงเรียนได้อย่างเงียบๆ โดยไม่ต้องพบกับคนแปลก#nหน้าเหรอคะ?"
41030-163 = "กะ... ก็ไม่ใช่ว่าจะไม่ได้เจอใครสักคนเลยหรอกนะ..."
41030-164 = "ขึ้นชื่อว่าเป็นสำนักรักษาความปลอดภัย บางครั้งเราก็เลยต้องออกไปจัดการชาวเมืองที่ทำตัวแปลกๆ"
41030-168 = "ถ้างั้นฉันไม่ไปดีกว่าค่ะ..."
41030-172 = "คาซุมิซาวะ"
41030-184 = "มิยุ"
41030-188 = "ไม่ผ่าน"
41030-192 = "บันทึกการสอบสวนที่ 977-R-4"
41030-194 = "พนักงานสอบสวน: ครู [USERNAME] จากชาเล่ต์"
41030-196 = "จำเลย: สึคิยูกิ มิยาโกะ ชั้นปีที่ 1 สถาบันพิเศษ SRT"
41030-200 = "...คุณครูที่มาตอนนั้นนี่เองสินะคะ"
41030-201 = "[s1] \"หวัดดี มิยาโกะ\"\n[s2] \"ตกใจที่ครูมาเหรอ?\""
41030-202 = "ถ้าคุณครูมาที่นี่ ก็หมายความว่าคนที่จะสอบสวนฉันในครั้งนี้ก็คือคุณครูสินะคะ"
41030-203 = "จริงๆ ฉันก็... ตกใจนิดหน่อยค่ะ ใครจะไปคิดล่ะคะว่าคุณครูจะมาเองแบบนี้"
41030-204 = "ถ้าคุณครูมาที่นี่ ก็หมายความว่าคนที่จะสอบสวนฉันในครั้งนี้ก็คือคุณครูสินะคะ"
41030-205 = "แต่ถึงจะเป็นใครก็ไม่สำคัญหรอกค่ะ ยังไงฉันก็เตรียมคำตอบเอาไว้เรียบร้อยแล้วค่ะ"
41030-206 = "เชิญถามได้เลยค่ะ"
41030-207 = "[s] \"อยู่ที่นี่ลำบากหรือเปล่า?\""
41030-208 = "นึกไม่ถึงเลยนะคะว่าจะได้คำถามแบบนี้"
41030-209 = "ไม่หรอกค่ะ แต่ถึงจะมีอะไรที่ไม่สะดวกก็คงบ่นไม่ได้หรอกค่ะ ก็ฉันถูกจับมาเป็นผู้ต้องหานี่คะ"
41030-210 = "หรือคุณครูมีอะไรที่จะแนะนำงั้นเหรอคะ?"
41030-211 = "ถ้าหากคิดจะมาเกลี้ยกล่อมให้ฉันเปลี่ยนใจละก็ คุณครูยอมแพ้ไปเสียเถอะค่ะ"
41030-212 = "ไม่ว่าคุณครูจะแนะนำอะไร การตัดสินใจของฉันที่มีต่อ SRT ก็จะไม่มีวันเปลี่ยนแปลงค่ะ"
41030-213 = "[s] \"ทำไมถึงไม่อยากย้ายมาที่สถาบันฝึกตำรวจวัลคิรี่ล่ะ?\""
41030-214 = "ฉันว่าคำถามของคุณครูไม่ถูกต้องค่ะ"
41030-215 = "ฉันไม่ได้ไม่อยากย้ายโรงเรียนเพราะต้องมาที่สถาบันฝึกตำรวจวัลคิรี่หรอกนะคะ"
41030-216 = "มันเป็นเพราะว่าฉันไม่อยากจาก SRT มามากกว่าค่ะ"
41030-217 = "[s] \"ถ้างั้นทำไมถึงไม่อยากไปจากสถาบัน SRT ล่ะ?\""
41030-218 = "เหตุผลคือ 'ความยุติธรรม' ที่ทำได้แค่ที่สถาบัน SRT เท่านั้นน่ะค่ะ"
41030-219 = "[s] \"ความยุติธรรมเหรอ...?\""
41030-220 = "เอาจริงๆ การที่ฉันพูดว่าความยุติธรรมด้วยตัวเองแบบนี้ก็ค่อนข้างกระดากปากนะคะ"
41030-221 = "นักเรียนที่คุณครูเคยเจอก็อาจจะมีคนที่พูดถึงความยุติธรรมอยู่บ้างใช่ไหมล่ะคะ"
41030-222 = "ทั้งทรีนิตี้และเกเฮนน่า... หรือแม้แต่นักเรียนจากสถาบันฝึกตำรวจวัลคิรี่เองก็เชื่อว่าการกระทำของ#nตัวเองน่ะยุติธรรมแล้ว"
41030-223 = "แต่ฉันไม่คิดหรอกค่ะว่าความยุติธรรมของพวกเธอคือความยุติธรรมที่แท้จริง"
41030-224 = "ความยุติธรรมคือหลักการที่ถูกต้องตามความจริง"
41030-225 = "และเพราะหลักการนั้นอยู่บนพื้นฐานของความจริง ดังนั้นมันจะไม่เปลี่ยนแปลงตามฝ่ายตรงข้าม#nหรือตามสถานการณ์ค่ะ"
41030-226 = "แต่ที่ผ่านมา องค์กรเพื่อความสงบเรียบร้อยของคิโวทอสต่างก็บิดเบือนความยุติธรรม#nเพราะผลประโยชน์ซับซ้อนเฉพาะตัว"
41030-227 = "แต่ที่สถาบันพิเศษ SRT เราสามารถปฏิบัติตามความยุติธรรมที่เราเชื่อได้โดยไม่ถูกชักจูงโดยผล#nประโยชน์ทางสังคมแบบนี้ค่ะ"
41030-228 = "ไม่ว่าที่ไหนและเมื่อไร ไม่ว่าจะเป็นใครและมีตำแหน่งสูงแค่ไหน เราต่างใฝ่หาความยุติธรรมเดียวกัน..."
41030-229 = "ฉันถึงใฝ่ฝันในการเรียนที่สถาบันพิเศษ SRT ตั้งแต่ยังเด็กยังไงล่ะคะ"
41030-230 = "ฉันปรารถนาในความยุติธรรมที่แน่นอนและไม่ขึ้นอยู่กับผลประโยชน์ระหว่างสถาบันการศึกษาค่ะ"
41030-231 = "แต่สุดท้าย SRT ก็ถูกปิด และฉันก็... ล้มเหลว"
41030-232 = "ถ้าฉันทำได้ดีกว่านี้อีกสักหน่อย... ถ้าฉันร่วมมือกับเพื่อนๆ และแสดงความสามารถออกมาได้ดีกว่านี้ พวกฉันก็คงไม่ล้มเหลวแบบนี้หรอกค่ะ"
41030-233 = "[s] \"มิยาโกะทำได้เต็มที่แล้วล่ะ\""
41030-237 = "ได้ฟังคำชมแบบนี้จากคุณครูก็รู้สึกแปลกๆ นะคะ"
41030-238 = "แต่คุณครูชมกันเกินไปแล้วละค่ะ ฉันไม่มีสิทธิ์ได้รับคำชมแบบนั้นจากคุณครูหรอกค่ะ"
41030-239 = "คุณครูทั้งเพิ่มความได้เปรียบของฝ่ายตัวเองได้ในเวลาอันสั้น แถมยังวิเคราะห์จุดอ่อนของศัตรูจนจับ#nตัวพวกฉันมาได้...  "
41030-240 = "ส่วนฉันน่ะเหรอคะ... ฉันยังควบคุมสมาชิกที่มีอยู่ไม่กี่คนไม่ได้เลยค่ะ"
41030-241 = "[s] \"ไม่ต้องโทษตัวเองไปหรอก...\""
41030-243 = "[s] \"ว่าแต่ มีอะไรที่ต้องการเพิ่มหรือเปล่า?\""
41030-244 = "ฉันไม่ได้อยากให้ใครมาปฏิบัติตัวดีด้วยหรอกค่ะ"
41030-245 = "หรือว่าคุณครูสามารถถอนคำสั่งปิดสถาบัน SRT ได้เหรอคะ?"
41030-246 = "[s] \"นั่นก็อาจจะดูยากไปหน่อย...\""
41030-247 = "ถ้าอย่างนั้นฉันก็จะต่อสู้เพื่อทวงสถาบัน SRT ต่อไปค่ะ"
41030-248 = "ตราบใดที่พวกเราไม่ยอมแพ้ ชื่อของ SRT ก็จะไม่มีวันหายไป"
41030-249 = "[s] \"ต่อให้รู้ดีว่ามันไม่มีโอกาสชนะงั้นเหรอ?\""

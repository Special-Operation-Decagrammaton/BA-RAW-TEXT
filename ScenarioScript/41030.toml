[translation]
41030-1 = "#title;제3화;그 소대원들의 사정"
41030-2 = "#wait;1500"
41030-3 = "#st;[-1200,150];serial;70;취조 기록 : 977-R-1"
41030-4 = "#wait;2500"
41030-5 = "#st;[-1200,0];serial;70;담당 취조관 : 발키리 경찰학교 3학년, 오가타 칸나"
41030-6 = "#wait;2000"
41030-7 = "#st;[-1200,-150];serial;70;조사 용의자 : SRT 특수학원 1학년, 소라이 사키"
41030-8 = "#wait;2000"
41030-9 = "#all;hide\n#clearST"
41030-10 = "#wait;500"
41030-11 = "3;사키;S2_01\n#3;h\n#3;a\n#wait;1500"
41030-12 = "#place;발키리 경찰학교 본관, 지하 취조실"
41030-13 = "3;사키;S2_01\n#3;em;…\n#wait;2500"
41030-14 = "#na;칸나;……이름."
41030-15 = "3;사키;S2_99;……."
41030-16 = "#na;칸나;이름!\n#fontsize;100"
41030-17 = "3;사키;S2_11;어째서 물어보는 거야? 이름 정도는 묻지 않아도 이미 알고 있을 텐데.\n#3;em;[?]"
41030-18 = "#na;칸나;귀관에게 질문은 허가하지 않았다."
41030-19 = "#na;칸나;다시 한번 묻지. 이름은?"
41030-20 = "3;사키;S2_06;……소라이 사키."
41030-21 = "#na;칸나;소속은?"
41030-22 = "3;사키;S2_12;SRT 특수학원 RABBIT 소대 소속이었지. 당신들이 멋대로 폐쇄 결정을 내리기 전까지는.\n#3;em;[반응]"
41030-23 = "#na;칸나;……말투가 불손하군. 지금 네 처지를 이해하고 있는 건지 의심스러운데."
41030-24 = "#na;칸나;계속 그렇게 아니꼬운 말투로 대답을 이어간다면, 내가 왜 발키리 경찰학교의 '미친개' 라 불리는지 직접 두 눈으로 확인하게 될 거야."
41030-25 = "3;사키;S2_11;하아, 지금 협박하는 거야? SRT에게 그런 블러핑이 먹힐 거라 생각했다니…… 어쩐지 조금 실망스럽네.\n#3;em;[?]"
41030-26 = "3;사키;S2_05;익히 알고 있겠지만. SRT 학원의 학생들은 작전 중 기밀을 취급하는 경우도 적지 않기 때문에 포로로 잡혔을 때를 대비한 훈련도 사전에 철저히 받지."
41030-27 = "3;사키;S2_11;당신이 알고 있는 심문 방법을 모두 사용하더라도 별 소득은 없을 거야."
41030-28 = "#st;[0,0];instant;1;"
41030-29 = "#clearST"
41030-30 = "#wait;2500"
41030-31 = "#na;칸나;학생회로부터 넘겨받은 자료를 보니, 귀관은 SRT 학원에서도 꾸준히 우수한 성적을 거두어 온 재원이더군."
41030-32 = "#na;칸나;필기 시험 점수는 만점에 가깝고, 모의 환경에서 시행한 실기 시험도 무난히 통과."
41030-33 = "#na;칸나;학업 생활 중에도 사소한 교칙 위반 하나 저지르지 않았을 정도로 귀관은 훌륭한 모범생이었다."
41030-34 = "#na;칸나;……그런데 그런 모범생이 어째서 발키리 경찰학교로 편입해 오는 걸 거부하고 무력 투쟁이라는 거친 수단을 사용한 거지?"
41030-35 = "3;사키;S2_06;……발키리 경찰학교는 SRT 학원이 아니니까."
41030-36 = "#na;칸나;그건 제대로 된 대답이 아니야. 똑바로 이야기해!\n#fontsize;80"
41030-37 = "3;사키;S2_05;SRT 특수학원의 학생들은 발키리 경찰학교의 학생들과는 달리, 방과 후에도 엄격한 규칙 아래서 일상을 보내지.\n#3;em;[반응]"
41030-38 = "3;사키;S2_99;정시에 기상하여 침구를 정리하고, 학교에서는 훈련을 받고, 방과 후에도 기숙사 내에서 개인 정비에 힘을 쏟는 등…… 언제나 긴장의 끈을 놓지 않는 항재전장의 의식이 SRT를 SRT답게 만드는 거야."
41030-39 = "3;사키;S2_11;하지만 발키리 경찰학교의 일상은 어때?\n#3;em;[?]"
41030-40 = "3;사키;S2_12;가장 규율이 엄격하다는 공안국의 학생들조차도 시민에게 위화감을 주어서는 안 된다는 이유로 일과가 끝나면 사복을 입고 자유롭게 하고 싶은 일을 하지."
41030-41 = "3;사키;S2_05;나는…… 목장에 방목된 양치기 [ruby=발키리] 개 [/ruby]로 살아가느니, 목줄이 매였더라도 긍지만큼은 잊지 않은 [ruby=SRT]늑대[/ruby]로 살아가겠어."
41030-42 = "3;사키;S2_01\n#na;칸나;……그게 귀관의 대답인가.\n#3;h"
41030-43 = "#na;칸나;그나저나 하나 더 묻겠는데."
41030-44 = "#na;칸나;교전 도중 카제쿠라 양이 불필요하게 탄환을 낭비해가며 방송용 드론을 격추했을 때, 귀관은 어째서 그 행동을 말리지 않았지?"
41030-45 = "#na;칸나;귀관 정도의 모범생이 방어전에서의 탄약이 얼마나 가치 있는 자원인지 모르지는 않았을 텐데."
41030-46 = "#na;칸나;그것도 SRT의 규율과 관련이 있는 행동이었나?"
41030-47 = "3;사키;S2_09;어, 그건 그러니까……\n#3;stiff"
41030-48 = "3;사키;S2_04;훈련 때는 탄약을 아끼느라 한 번도 해보지 못했던 전탄 사격을 관측해 볼 기회가 있었으면 좋겠다 싶어서…….\n#3;em;[땀]"
41030-49 = "#wait;100"
41030-50 = "3;사키;S2_04\n#3;h"

10051100-302 = "ยัยนี่จ้างพวกปีศาจเข้ามาเลยเหรอ...?"
10051100-303 = "เดี๋ยวนะ หรือว่าพวกปีศาจที่ไปก่อเรื่องที่ร้านขายผ้าตอนนั้นก็..."
10051100-304 = "พวกปีศาจที่โจมตีพนักงานส่งอาหารของไชน์แคทก็ด้วย...?"
10051100-305 = "[s1] \"จะว่าไป เหมือนนิยะก็เคยพูดทำนองนี้นะ\"\n[s2] \"นิยะก็บอกว่าพวกปีศาจก่อเรื่องกันหนักขึ้นเหมือนกัน\""
10051100-308 = "วะฮ่าฮ่า! ใช่แล้วละ!"
10051100-309 = "ใช่! ทั้งหมดเป็นแผนการของฉัน! ฉันเป็นคนจ้างพวกปีศาจไปเล่นงานเอง!"
10051100-310 = "จะได้เป็นการบ่อนทำลายงานแฟชั่นโชว์ครั้งนี้อย่างช้าๆ ยังไงล่ะ!!"
10051100-311 = "ทะ... ท่านหัวหน้าคะ พวกปีศาจมากันเยอะเกินไปแล้วค่ะ...!"
10051100-312 = "ไม่หรอก ไม่เป็นไรหรอกนะ สึคุโยะ"
10051100-316 = "ฝากเรื่องสั่งการได้ใช่มั้ย ท่านอาจารย์?"
10051100-317 = "[s] \"ได้อยู่แล้ว!\""
10051100-318 = "ดีละ ชมรมวิจัยศาสตร์นินจา!"
10051100-323 = "ออกปฏิบัติการได้!!"

[translation]
10051100-1 = "ตอนที่ 10;ตอนจบของโชว์"
10051100-4 = "ห้องพักในงานแฟชั่นโชว์"
10051100-5 = "ใกล้จะถึงเวลาขึ้นรันเวย์แล้วสินะ"
10051100-6 = "เตรียมตัวพร้อมหรือยัง?"
10051100-7 = "..."
10051100-8 = "ทิ้งความกังวลไป แล้วเตรียมใจให้พร้อม"
10051100-9 = "เพราะนี่จะเป็นรันเวย์เดบิวต์จริงๆ ของเธอยังไงล่ะ"
10051100-10 = "เดบิวต์จริงๆ งั้นเหรอคะ?"
10051100-11 = "งานแฟชั่นโชว์ที่เธอเคยเดินก่อนหน้านี้น่ะเป็นแค่งานเล็กๆ การเดินแบบที่ยังเก้ๆ กังๆ ของเธอตอนนั้น#nก็เลยยังไม่ใช่ปัญหาใหญ่ยังไงล่ะ"
10051100-12 = "แน่นอนว่าผลงานครั้งนั้นทำให้เธอมีชื่อเสียง... แต่นั่นก็เป็นชื่อเสียงในฐานะ 'มือใหม่' เท่านั้น"
10051100-13 = "แต่งานวันนี้เป็นถึงงานแฟชั่นโชว์ฉลองปีใหม่ที่กำลังจะมาถึง และจะมีผู้ชมมากกว่าเดิมหลายเท่าเลยละ"
10051100-14 = "เพราะงั้นหลังจากจบงานนี้ ชื่อของเธอก็จะเป็นที่รู้จักในวงกว้างมากขึ้น"
10051100-19 = "และวันนี้... เธอจะได้เกิดใหม่ในฐานะนางแบบมืออาชีพอย่างแท้จริง"
10051100-20 = "นางแบบมืออาชีพ..."
10051100-21 = "ฉัน... เนี่ยนะคะ?"
10051100-22 = "ใช่แล้ว ตื่นเต้นใช่มั้ยล่ะ?"
10051100-23 = "..."
10051100-24 = "หรือว่ายังรู้สึกค้างคาใจอยู่? ยังอยากกลับไปอยู่อีกเหรอ?"
10051100-25 = "ฉะ... ฉัน..."
10051100-26 = "เอ่อ..."
10051100-27 = "ถ้าอยู่ในจุดที่ลังเลแบบนั้น ก็ลองนึกถึงความพยายามทั้งหมดที่เธอทำมาสิ"
10051100-28 = "ทั้งควบคุมอาหารอย่างเข้มงวด ทั้งออกกำลังกาย ฝึกฝน..."
10051100-30 = "อย่าปล่อยให้พรสวรรค์และความพยายามที่เธอทุ่มเทไปสูญเปล่าสิ เข้าใจมั้ย?"
10051100-31 = "ขะ... เข้าใจแล้วค่ะ..."
10051100-35 = "ถึงเวลาแล้วครับ เตรียมตัวได้เลยครับ"
10051100-36 = "เอาละ โชว์ฝีมือมาให้เต็มที่ล่ะ"
10051100-37 = "ค่ะ..."
10051100-44 = "มีคนมาเยอะกว่างานแฟชั่นโชว์ครั้งก่อนมากเลยค่ะ หัวหน้า!"
10051100-45 = "นั่นสินะ... งานก็สเกลใหญ่กว่าครั้งก่อนเยอะเลย..."
10051100-46 = "เดี๋ยวสึคุโยะก็จะเดินแบบออกมาด้วยใช่มั้ย...?"
10051100-47 = "ใช่ค่ะ หัวหน้า"
10051100-48 = "พองานจบ เราอาจได้เจอสึคุโยะตัวเป็นๆ ก็ได้ค่ะ"
10051100-49 = "ได้ยินว่าตอนออกจากงาน พวกนางแบบกับเจ้าหน้าที่ในงานจะใช้เส้นทางเดียวกันน่ะค่ะ"
10051100-50 = "สึคุโยะ..."
10051100-51 = "แต่ว่านะ อิซุนะจัง"
10051100-52 = "ค่ะ หัวหน้า?"
10051100-56 = "ข้าน้อย... จำเป็นต้องเจอสึคุโยะด้วยเหรอ?"
10051100-57 = "คะ?!"
10051100-62 = "อ่า..."
10051100-63 = "งานเริ่มแล้วค่ะ..."
10051100-74 = "สึคุโยะนี่นา..."
10051100-75 = "ท่านสึคุโยะ..."
10051100-76 = "นี่สินะที่บอกว่าคนเราเปล่งประกายออกมาได้..."
10051100-77 = "ท่าเดินดูเป็นธรรมชาติกว่าแต่ก่อนเยอะเลยนะคะ"
10051100-78 = "ตอนนี้เป็น... นางแบบจริงๆ แล้วสินะ..."
10051100-79 = "ได้ใส่ชุดสวยๆ ยืนอยู่บนรันเวย์..."
10051100-80 = "ได้แสงสปอตไลท์สาดส่องมาที่ตัว... พร้อมวิ่งไปข้างหน้าด้วยสุดกำลัง..."
10051100-81 = "วิ่ง... "
10051100-85 = "เดี๋ยวนะ วิ่งทำไม?"
10051100-87 = "สึคุโยะ?! ทำไมจู่ๆ ก็วิ่งขึ้นมาล่ะ?!"
10051100-88 = "หา...?!"
10051100-89 = "หัวหน้า! จู่ๆ ท่านสึคุโยะก็กระโดดลงมาจากรันเวย์ค่ะ!!"
10051100-90 = "ทำไมล่ะ?!!!"
10051100-93 = "[log]1 นาทีก่อน[/log]"
10051100-96 = "(ผู้คนเยอะเต็มไปหมดเลย...)"

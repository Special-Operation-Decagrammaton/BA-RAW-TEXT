[translation]
10051100-1 = "第10話;時裝秀的終幕"
10051100-4 = "時裝秀休息室"
10051100-5 = "距離登台已經沒剩多少時間了。"
10051100-6 = "準備好了嗎？"
10051100-7 = "……"
10051100-8 = "沒有必要緊張，不過最好還是做好心理準備。"
10051100-9 = "因為今天，會是你真正意義上的出道舞台。"
10051100-10 = "真正的……出道舞台？"
10051100-11 = "你之前走過的秀規模都不大，所以即便台步略顯生疏也不算什麼大問題。"
10051100-12 = "雖然光是這樣就讓你收穫了不少知名度……不過那終究僅止於「新人」的層次而已。"
10051100-13 = "然而今天這場慶祝新年的時裝秀……觀眾會是之前的數倍之多。"
10051100-14 = "所以今天之後，你的名字將會變得更加廣為人知。"
10051100-19 = "從今天起……你將蛻變為真正的專業模特兒。"
10051100-20 = "專業模特兒……"
10051100-21 = "我……真的會……？"
10051100-22 = "沒錯，很感慨嗎？"
10051100-23 = "……"
10051100-24 = "還是說，你還有什麼留戀？#n現在還想要回去嗎？"
10051100-25 = "我，我是……"
10051100-26 = "那個……"
10051100-27 = "每當遇到這種時候，就回頭想想你至今為止付出的努力吧。"
10051100-28 = "嚴格的飲食控制、運動和訓練……"
10051100-30 = "別讓你擁有的天賦和所做的努力付諸東流。#n明白我的意思嗎？"
10051100-31 = "我，我知道了……"
10051100-35 = "時間到了。麻煩做好準備。"
10051100-36 = "好了，快去吧。"
10051100-37 = "……是。"
10051100-44 = "這次的人比上次時裝秀多很多呢，部長！"
10051100-45 = "是啊……規模也大很多……"
10051100-46 = "……月夜馬上就要在這裡走秀了吧？"
10051100-47 = "是的，部長。"
10051100-48 = "……而在活動結束後，就能直接見到月夜閣下了。"
10051100-49 = "因為最後退場的時候，模特兒會和警備員使用同一條通道。"
10051100-50 = "月夜……"
10051100-51 = "不過，伊樹菜……"
10051100-52 = "是，部長？"
10051100-56 = "我……真的該見月夜嗎？"
10051100-57 = "咦！？"
10051100-62 = "……啊。"
10051100-63 = "……開始了。"
10051100-74 = "……是月夜。"
10051100-75 = "……是月夜閣下。"
10051100-76 = "……原來，那就是人閃閃發光的樣子啊。"
10051100-77 = "走台步的樣子也比之前自然多了。"
10051100-78 = "現在真的……是名模特兒了呢……"
10051100-79 = "穿著美麗的衣服，走在伸展台上……"
10051100-80 = "沐浴在聚光燈下……全力奔跑的……"
10051100-81 = "奔跑的…… "
10051100-85 = "等一下，奔跑？"
10051100-87 = "月夜！？為什麼突然狂奔起來了！？"
10051100-88 = "咦咦咦！？"
10051100-89 = "部長！月夜閣下突然從舞台上跳下來了！！"
10051100-90 = "為什麼！？"
10051100-93 = "[log]一分鐘前[/log]"
10051100-96 = "（居然有這麼多人……）"
10051100-97 = "（呼……）"
10051100-98 = "（沒事的，只要按照練習那樣往前走就行了）"
10051100-99 = "（沒錯，只要那樣走下去……）"
10051100-100 = "（然後……我會變成什麼呢？）"
10051100-103 = "（啊，開始了……！）"
10051100-107 = "（嗯？）"
10051100-108 = "（等等，觀眾席上的那個人……在做什麼！？）"
10051100-113 = "（什，什什，什麼！？）"
10051100-114 = "（為什麼那個人的手提包裡會有炸彈！？）"
10051100-115 = "（而且還正打算拔掉炸彈的引信……！）"
10051100-116 = "（周圍的人為什麼一點反應都沒有！？）"
10051100-117 = "（難道說，只有從舞台上的這個角度才看得到嗎！？）"
10051100-118 = "（唔啊啊啊……！）"
10051100-119 = "（為什麼？為什麼要做那種事！？）"
10051100-120 = "（不對，現在重要的不是為什麼！）"
10051100-121 = "（必須趕快阻止他引爆炸彈才行！）"
10051100-122 = "（應該大喊嗎？不行，那樣只會讓場面更混亂而已……！）"
10051100-123 = "（到底該怎麼辦……！）"
10051100-128 = "[log]身為[wa:1000]忍者，[/log]"
10051100-130 = "[log]無論身陷何種絕境……[/log]"
10051100-133 = "面對不義之事都絕不能退縮……！"
10051100-134 = "嘿……！"
10051100-138 = "噠噠噠噠！"
10051100-139 = "月夜！？為什麼突然狂奔起來了！？"
10051100-140 = "咦咦咦！？"
10051100-151 = "部長！月夜閣下突然從舞台上跳下來了！！"
10051100-160 = "碰咚！！"
10051100-163 = "我，我抓到了！"
10051100-167 = "那，那孩子現在在做什麼！？"
10051100-168 = "噫噫……！？"
10051100-173 = "月夜！"
10051100-174 = "月夜閣下！"
10051100-175 = "你在做什麼！？看看你的禮服都破了！"
10051100-176 = "而且……時裝秀……！"
10051100-177 = "部長！總之先把這個人的包包搶過來！"
10051100-178 = "包包裡有炸彈！！"
10051100-184 = "搶到包包了！裡面真的有炸彈！"
10051100-185 = "噫噫……！ "
10051100-186 = "這種炸彈的威力很強，是連便利商店和超市都禁止販售的東西耶！？"
10051100-187 = "不對，比起那個……月夜！你沒事吧！？"
10051100-188 = "是，我沒有受傷。"
10051100-189 = "雖然禮服有點裂開就是了……"
10051100-190 = "嘿嘿，有點難看對吧？"
10051100-191 = "那，那不是現在的問題吧！？#n模特兒怎麼能把衣服弄破呢！？"
10051100-192 = "而且那件禮服不是超貴的嗎！？"
10051100-193 = "請不用擔心，部長。"
10051100-194 = "不是，這要我怎麼能不擔心！"
10051100-195 = "月夜你……"
10051100-197 = "……可是模特兒啊。"
10051100-202 = "……咦？"
10051100-203 = "……嗯？"
10051100-204 = "不是嗎？"
10051100-205 = "我是月夜呀？"
10051100-206 = "不是，我不是那個意思……"
10051100-207 = "不，就是這個意思。"
10051100-208 = "我是大野月夜。一個身材高大、膽子小、喜歡忍者的學生。那就是我。"
10051100-209 = "……那模特兒呢？"
10051100-210 = "其實我也不太清楚。"
10051100-211 = "周圍的人總是把我捧得很高，稱讚我是天生的模特兒……"
10051100-212 = "可是每當我聽到那種話，還有經歷那些模特兒理應忍受的過程時……"
10051100-213 = "總會有種……像是穿著不合身的衣服一樣的……彆扭又難受的感覺。"
10051100-214 = "不合身的衣服……"
10051100-215 = "結果部長也看到了吧。#n不合身的衣服，就算強行穿上…… "
10051100-216 = "……總有一天會像這樣裂開的。"
10051100-217 = "月夜……"
10051100-218 = "部長，我想回去。"
10051100-222 = "回到忍術研究部。"
10051100-226 = "……"
10051100-227 = "嗚……嗚嗚……"
10051100-228 = "部，部長！？"
10051100-229 = "為什麼哭了！？"
10051100-230 = "我……我還以為月夜不會回來了……"
10051100-231 = "因為你跟我不一樣，擁有無庸置疑的天賦……"
10051100-232 = "所以，我才認為自己不應該挽留你。"
10051100-234 = "怕會因為我的關係，埋沒了你那難得一見的天賦……"
10051100-235 = "所以才覺得你不回來比較好……#n而且我也是發自內心地為你加油……因為在舞台上的月夜，真的很耀眼。"
10051100-236 = "可是……"
10051100-239 = "可是，就算我腦子裡是這樣想的，心裡卻還是想留住你！"
10051100-240 = "因為跟月夜一起進行忍術研究部的活動，真的很開心！"
10051100-241 = "所以，所以……"
10051100-245 = "部長……"
10051100-250 = "話說，月夜閣下。"
10051100-251 = "你現在壓著的那個人……好像正在蠕動！"
10051100-254 = "啊……！"
10051100-255 = "我，我完全忘記了……！"
10051100-259 = "等一下，這個人……是不是在哪裡見過……？"
10051100-263 = "啊！"
10051100-264 = "是上次時裝秀的時候！就是那個衝進戰鬥之後被抬走的模特兒！"
10051100-265 = "伊樹菜也想起來了！#n正是因為這個人被送進了醫院，月夜閣下才會代替他當模特兒的……"
10051100-266 = "可……可是他到底為什麼會……？"
10051100-271 = "唔……頭好痛……"
10051100-275 = "等，等等，我的炸彈跑哪去了！？"
10051100-276 = "炸彈已經被我們沒收了。"
10051100-277 = "你到底為什麼要做這種事情……？"
10051100-278 = "問我為什麼？你還真好意思問啊。"
10051100-280 = "這全都要怪你！"
10051100-281 = "咦！？"
10051100-282 = "那天，是你搶走了屬於我的位子！"
10051100-283 = "你站上的伸展台、穿的衣服、聚光燈、人們的讚美……"
10051100-284 = "這一切！原本都是屬於我的！"
10051100-285 = "你在胡說什麼啊！#n月夜那時候又不是自願上台的。"
10051100-286 = "少，少囉嗦……！"
10051100-287 = "總之……不過是被拿走一顆炸彈，休想要我善罷甘休！"
10051100-288 = "全都結束了！我要毀了這一切──毀了這場時裝秀！"
10051100-289 = "已經被你毀得差不多了吧？"
10051100-290 = "吵死了！來吧，妖怪劇團！！"
10051100-301 = "妖，妖怪劇團從外面湧進來了！"
10051100-302 = "該不會全都是這傢伙僱來的吧……？"
10051100-303 = "這麼說來，難道在布料行鬧事的妖怪劇團……"
10051100-304 = "還有攻擊Shine Cat外送員的妖怪劇團也……？"
10051100-305 = "[s1]「仁耶之前也說過……」\n[s2]「最近妖怪劇團的騷動變嚴重了……」"
10051100-308 = "噗哈哈！答對了！"
10051100-309 = "沒錯！全都是我做的！是我僱用妖怪劇團搞出這一切的！"
10051100-310 = "為了從外到內一步步瓦解這場秀！！"
10051100-311 = "部，部長，妖怪劇團的數量太多了……！"
10051100-312 = "沒事的，月夜。"
10051100-316 = "指揮的可以交給你嗎，老師大人？"
10051100-317 = "[s]「那當然！」"
10051100-318 = "好，忍術研究部！"
10051100-323 = "要上囉！！"

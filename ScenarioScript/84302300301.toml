[translation]
84302300301-6 = "Can I ask you one question? Just out of personal curiosity..."
84302300301-7 = "Huh? What is it?"
84302300301-8 = "This...Koyuki... Does she cause many issues around here? She seems like a bit of a troublemaker, from the way you talk about her."
84302300301-13 = "A bit of a troublemaker, huh...?"
84302300301-15 = "Well..."
84302300301-16 = "I apologize. I heard she was the member of Seminar. I didn't mean to insult her integrity."
84302300301-17 = "Oh, don't get me wrong. She IS a troublemaker. Just not \"a bit\" of one."
84302300301-18 = "Hm... How should I compare this...?"
84302300301-19 = "Do you have anyone in your school who...sticks out all the time, maybe with pink hair, proactive but kind of thoughtless, and everywhere she goes, incidents keep happening?"
84302300301-20 = "..."
84302300301-21 = "...There is someone..."
84302300301-23 = "(...Wow, she looks shaken...)"

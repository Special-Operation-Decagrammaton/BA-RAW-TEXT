[translation]
84302300301-6 = "ถ้าไม่ว่าอะไร ฉันขอถามอะไรหน่อยได้มั้ยคะ? ฉันสงสัยเป็นการส่วนตัวน่ะค่ะ..."
84302300301-7 = "หืม? สงสัยอะไรเหรอ?"
84302300301-8 = "คนที่ชื่อคุณโคยูกิน่ะค่ะ... คนคนนั้นชอบก่อปัญหาบ่อยๆ เหรอคะ? ฉันรู้สึกเหมือนพวกคุณทำกับเธอ#nเหมือนเป็นเด็กที่ชอบสร้างปัญหานิดหน่อยเลยค่ะ"
84302300301-13 = "เด็กที่ชอบสร้างปัญหานิดหน่อย...?"
84302300301-15 = "อ่า..."
84302300301-16 = "ขอโทษด้วยค่ะ ถึงยังไงเธอก็เป็นถึงสมาชิกเซมิน่า ฉันคงคิดและพูดผิดไปน่ะค่ะ"
84302300301-17 = "ตรงกันข้ามเลยต่างหาก ตรงกันข้ามกับ 'นิดหน่อย' น่ะ"
84302300301-18 = "อืม... จะเปรียบเทียบยังไงดีนะ..."
84302300301-19 = "ที่โน่นไม่มีเด็กแบบนี้บ้างเหรอ? เด็กที่แค่ไปแตะต้องอะไรก็เกิดเรื่อง มีแรงทำอะไรเยอะแยะแต่ไม่มี#nความคิดวิเคราะห์แยกแยะ แถมผมสีชมพูก็ยังสะดุดตาอีก..."
84302300301-20 = "..."
84302300301-21 = "ก็มี... อยู่หรอกนะคะ..."
84302300301-23 = "(ทำไมถึงได้ตกใจกันนะ...?)"

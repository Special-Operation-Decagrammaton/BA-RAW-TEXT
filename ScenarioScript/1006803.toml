[translation]
1006803-1 = "Try Trusting, Reisa"
1006803-2 = "Schale Lounge"
1006803-3 = "On a slow day at work, I invited Reisa to visit the Schale lounge."
1006803-7 = "[ns1] \"Welcome, Reisa.\"\n[ns2] \"The door is open.\""
1006803-13 = "H-Hello...Sensei!"
1006803-14 = "My body feels...um, a little heavier than usual today..."
1006803-15 = "[s3] \"Reisa? Are you okay?\"\n[s4] \"You look exhausted! What happened?\""
1006803-18 = "Everything's fine...nothing really happened, it's just... Heh...heehee... Heeheeheeheehee..."
1006803-19 = "Um...sorry. This isn't what I came here for... Just gotta...pull myself together."
1006803-20 = "Ah! Ahem!"
1006803-24 = "Okay! That's a little better."
1006803-25 = "Anyways...I wanted your advice, Sensei! I wanted to see if you had any tips about getting over exhaustion!"
1006803-26 = "It's just...you know, I'm patrolling in the evening, going to school in the morning, and then hanging out with friends after school..."
1006803-27 = "And...I'm realizing I maybe don't have enough time to sleep..."
1006803-28 = "You know, I didn't notice at first, because it really just piled on little by little... But the past four days have been especially busy, and I barely got any sleep at all..."
1006803-29 = "..."
1006803-30 = "It used to be okay...because I just took naps during breaks at school. But...haha."
1006803-31 = "[s5] \"So that's why you want to learn how to get over exhaustion...\"\n[s6] \"You don't have enough time to sleep...\""
1006803-34 = "A-Ahaha..."
1006803-35 = "Y-Yeah! I thought, if anyone would know, it would be you, Sensei."
1006803-36 = "So? How do I do it? Is there a powernap schedule that works? Or a recipe for an energy drink?"
1006803-37 = "...What?"
1006803-38 = "But... You really don't have a special method? I just have to sleep more?"
1006803-39 = "W-Well, I guess that's what everyone says... I just thought maybe you would know a better way..."
1006803-40 = "I mean... It was easier before, but now... After Vigilante Crew, and school, there's still more to do..."
1006803-41 = "And, well. I don't wanna let go of the time I spend with friends..."
1006803-42 = "And if..."
1006803-43 = "Um... I'm worried if I stop hanging out with them again, they would..."
1006803-44 = "They would maybe..."
1006803-45 = "[ns] \"...\""
1006803-47 = "[ns7] \"You're falling back on old habits, Reisa.\"\n[ns8] \"You can't will yourself into being able to do everything.\""
1006803-50 = "What? What does that mean?"
1006803-51 = "...Um...I dunno... I don't think people have really said anything notable to me recently..."
1006803-52 = "...Oh."
1006803-53 = "Actually, now that I think about it, my friends did say that I looked tired... They asked if I was okay, and said we could hang out at home or over the weekend instead..."
1006803-54 = "And the Vigilante Crew too... Suzumi said she would take my patrols if I needed."
1006803-55 = "But... I said no, obviously. Haha."
1006803-56 = "[s9] \"They're all worried about you, Reisa.\"\n[s10] \"They don't want you to burn yourself out.\""
1006803-59 = "I-Is that so? Um... Oh. Am I overworking myself?"
1006803-60 = "Haha... Well, now that I think about it, I guess I definitely am... That's weird."
1006803-64 = "But still. Would it really be okay?"
1006803-65 = "What if my friends think I don't wanna hang out with them? What if the Vigilante Crew thinks I'm slacking off?"
1006803-66 = "Haha... It's not that your advice doesn't make sense, but... Why do you always have to ask me to do such scary stuff?"
1006803-67 = "What if... What if it ruins everything..."
1006803-71 = "...But..."
1006803-72 = "No. That's not right. 'Cause everything you've asked me to do before has turned out well."
1006803-73 = "So...it must be the same this time! Yeah, that's right."
1006803-74 = "[s11] \"Yeah. Try putting a little more trust in those around you.\"\n[s12] \"They care about you just as much as you care about them.\""
1006803-77 = "...!"
1006803-78 = "Okay!"
1006803-79 = "Um...Uh...Whoa..."
1006803-85 = "[ns13] \"Reisa?!\"\n[ns14] \"You look like you're about to fall over!\""
1006803-88 = "Uhh... It's just...I feel like all the tension just left my body..."
1006803-89 = "So I got really...sleep...sleepy..."
1006803-95 = "Aha... Ahahahaha... Sure, that sounds fun too... Let's do it... heehee..."
1006803-96 = "[ns] \"...\""
1006803-98 = "[ns] Turn the lights off."
1006803-102 = "I crept out quietly so I wouldn't wake Reisa."

1006803-35 = "3;레이사;04;그, 그래서 뭔가! 다른 분도 아닌 선생님이라면!\n#3;em;[!]"
1006803-36 = "3;레이사;09;이런 일정에서도 피로 회복을 하는 묘안이나, 혹은 에너지 드링크의 제조법 같은 걸 알고 계시지 않을까 해서……!!\n#3;jump"
1006803-37 = "3;레이사;02;……네?"
1006803-38 = "3;레이사;01;피로 회복에는 요령이나 약 같은 게 없다고요? 결국에는 그만큼 쉬어야 된다고요?"
1006803-39 = "3;레이사;08;뭐, 뭔가 정론……이긴 하지만, 그 부분을 어떻게 좀 안 될까 해서…….\n#3;stiff"
1006803-40 = "3;레이사;04;그, 그도 그럴 게……. 예전이라면 모를까……. 자경단 일과 학교생활만으로 끝나는 게 아니니까요. 일정이……."
1006803-41 = "3;레이사;05;친구들이랑 노는 시간도……. 이제 와서 그만두고 싶지는 않아서……."
1006803-42 = "3;레이사;06;그리고 만약……."
1006803-43 = "3;레이사;06;만약 이제 와서 다시 제 쪽에서 거리를 두려고 하면……. 어쩌면……."

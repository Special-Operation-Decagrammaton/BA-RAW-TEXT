[translation]
1006803-1 = "เชื่อดูสิ เรอิสะ"
1006803-2 = "ห้องพักผ่อนชาเล่ต์"
1006803-3 = "(วันนี้เป็นวันที่คุณครูงานไม่ยุ่งเท่าไร คุณครูจึงชวนเรอิสะมาที่ห้องพักผ่อนชาเล่ต์)"
1006803-7 = "[ns1] \"มาแล้วเหรอ เรอิสะ\"\n[ns2] \"ประตูไม่ได้ล็อก~\""
1006803-13 = "สะ... สวัสดีค่ะ... คุณครู...!"
1006803-14 = "วันนี้ฉันรู้สึก... หมดแรง... ยังไงก็ไม่รู้ค่ะ..."
1006803-15 = "[s3] \"เรอิสะ!? เป็นอะไรรึเปล่า!?\"\n[s4] \"ทำไมดูเหนื่อยมากขนาดนี้! มีเรื่องอะไรเหรอ?\""
1006803-18 = "ไม่มีอะไรเป็นพิเศษหรอกค่ะ... แฮ่ก... แฮ่ก... แฮ่ก..."
1006803-19 = "อืม... ขอโทษค่ะ ฉันไม่ได้ตั้งใจจะมาหอบอยู่แบบนี้ค่ะ ขอฉันตั้งสติสักเดี๋ยวนะคะ..."
1006803-20 = "อะแฮ่ม!"
1006803-24 = "ดีขึ้นหน่อยแล้วค่ะ!"
1006803-25 = "ที่ฉันจะมาขอความช่วยเหลือจากคุณครูครั้งนี้เพราะอยากได้คำแนะนำเกี่ยวกับ 'การฟื้นฟูจากความ#nเหนื่อยล้า' ค่ะ!"
1006803-26 = "ช่วงตอนเย็นฉันต้องลาดตระเวน ส่วนตอนกลางวันก็ต้องเข้าเรียน... แล้วก็เที่ยวเล่นกับเพื่อนๆ หลังเลิก#nเรียนด้วย..."
1006803-27 = "พอทำควบคู่กันไปเรื่อยๆ ฉันก็ไม่มีเวลาให้ตัวเองได้พักเลย... ตอนนี้ฉันน่าจะต้องพักบ้างแล้วค่ะ"
1006803-28 = "มันน่าจะสะสมมาทีละหน่อยน่ะค่ะ โดยเฉพาะช่วงสามวันนี้มีเรื่องเข้ามาเยอะ ก็เลยแทบจะไม่ได้นอน#nเลยค่ะ..."
1006803-29 = "......"
1006803-30 = "ปกติฉันจะนอนในวันที่ไม่มีเรียน แล้วมันก็จะดีขึ้นค่ะ แต่รอบนี้มัน... แหะๆ"
1006803-31 = "[s5] \"ก็เลยอยากถามวิธีฟื้นฟูความเหนื่อยล้าสินะ...\"\n[s6] \"ไม่มีเวลานอนขนาดนั้นเลยสินะ\""
1006803-34 = "อะฮ่าฮ่าฮ่า..."
1006803-35 = "ฉะ...ฉันคิดว่าถ้าเป็นคุณครูก็อาจจะรู้ก็ได้น่ะค่ะ!"
1006803-36 = "พวกเคล็ดลับในการฟื้นฟูความเหนื่อยล้า หรือไม่ก็วิธีทำเครื่องดื่มชูกำลังเอาไว้ดื่มน่ะค่ะ!"
1006803-37 = "...คะ?"
1006803-38 = "ไม่มีเคล็ดลับอะไรในการฟื้นฟูความเหนื่อยล้าเหรอคะ? สุดท้ายแล้วการพักผ่อนคือวิธีที่ดีที่สุด... งั้นเหรอคะ?"
1006803-39 = "มะ... มันก็จริงอยู่... แต่ถึงยังไงก็ไม่มีทางลัดอะไรเลยเหรอคะ..."
1006803-40 = "กะ... ก็แบบว่า... ถ้าเป็นอย่างแต่ก่อนก็ไม่น่ามีปัญหา... แต่ตอนนี้ฉันไม่ได้แค่ทำงานของกลุ่มรักษาความ#nสงบและเรียนอย่างเดียวนี่คะ..."
1006803-41 = "ฉันต้องเที่ยวเล่นกับเพื่อนๆ... แล้วฉันก็ไม่อยากเลิกเจอเพื่อนๆ ด้วย..."
1006803-42 = "และถ้าหากว่า..."
1006803-43 = "ถ้าฉันมาเว้นระยะห่างจากเพื่อนๆ เอาตอนนี้... บางที..."
1006803-44 = "มันก็อาจจะ..."
1006803-45 = "[ns] \"......\""
1006803-47 = "[ns7] \"เรอิสะ นิสัยเก่ากลับมาอีกแล้ว\"\n[ns8] \"ไม่ต้องเปลี่ยนตัวเองให้เข้ากับรอบข้างมากจนเกินไปหรอกนะ\""
1006803-50 = "คะ? หมายความว่ายังไง..."
1006803-51 = "คะ...? มีใครพูดอะไรมาหรือเปล่างั้นเหรอคะ? กะ... ก็ไม่ได้พูดอะไรเป็นพิเศษ..."
1006803-52 = "อ้อ..."
1006803-53 = "จะว่าไป ฉันเคยได้ยินคนที่โรงเรียนบอกว่าฉันดูเหนื่อย เป็นอะไรหรือเปล่า แล้วก็ถ้ามาตามนัดไม่ได้ ก็เปลี่ยนไปเล่นที่บ้านหรือเลื่อนนัดออกไปก่อนได้..."
1006803-54 = "กับกลุ่มรักษาความสงบก็ด้วย... จะว่าไป ช่วงนี้คุณสึซึมิก็มาบอกด้วยว่าจะช่วยเดินลาดตระเวนในเขต#nของฉันให้แทน..."
1006803-55 = "แต่ฉันก็ปฏิเสธทุกคนไปหมดเลยค่ะ แหะๆ..."
1006803-56 = "[s9] \"ทุกคนเป็นห่วงเรอิสะนะ\"\n[s10] \"ทุกคนคงไม่อยากให้เรอิสะต้องหักโหมน่ะ\""
1006803-59 = "ยะ... อย่างนั้นเหรอคะ? เอ๋ นี่ฉันกำลังหักโหมเกินไปเหรอคะ...?"
1006803-60 = "แหะๆ... ก็นะ ดูจากสภาพของฉันตอนนี้แล้วก็ไม่น่าถามเลยนะคะ"
1006803-64 = "แต่ว่า... ถ้าทำอย่างนั้นจะไม่เป็นไรจริงๆ เหรอคะ..."
1006803-65 = "เพื่อนๆ คนอื่น... แล้วก็กลุ่มรักษาความสงบ... จะคิดยังไงกันนะ..."
1006803-66 = "ฉันก็คิดอยู่ตลอดนะคะว่าอยากทำตามที่คุณครูบอก... แต่พอคิดแบบนั้นแล้วก็กลัวอยู่นิดหน่อยค่ะ"
1006803-67 = "กลัวว่าถ้าสิ่งที่เป็นอยู่ตอนนี้มันพังไป ฉันจะทำยังไงดี..."
1006803-71 = "แต่ว่า..."
1006803-72 = "ก็จริงค่ะ ที่ผ่านมาฉันทำได้ดีมาตลอดเพราะเชื่อและทำในสิ่งที่คุณครูบอก"
1006803-73 = "ครั้งนี้ก็คงจะเป็นอย่างนั้นใช่มั้ยคะ? ฉันคิดว่ามันต้องเป็นอย่างนั้นแน่นอนค่ะ!!"
1006803-74 = "[s11] \"อื้ม เชื่อคนรอบข้างดูนะ\"\n[s12] \"ทุกคนก็นึกถึงเรอิสะเหมือนที่เรอิสะนึกถึงทุกคนนะ\""
1006803-77 = "...!!"
1006803-78 = "ค่ะ!!!"
1006803-79 = "...งะ... งืมม..."
1006803-85 = "[ns13] \"เรอิสะ!?\"\n[ns14] \"ทำไมจู่ๆ ก็โงนเงนแบบนั้นล่ะ!?\""
1006803-88 = "งือ... น่าจะเพราะ... ฉันหายประหม่ารึเปล่า..."
1006803-89 = "ก็เลย... ง่วง... ขึ้นมา..."
1006803-95 = "งืม... งืมมม... เราไปตรงนั้นด้วยกันเถอะค่ะ น่าจะสนุกนะคะ... ฮิฮิ..."
1006803-96 = "[ns] \"......\""
1006803-98 = "[ns] กดสวิตช์ปิดไฟ"
1006803-102 = "(จากนั้นคุณครูก็ให้เรอิสะนอน และลุกออกมาจากที่ตรงนั้นเพื่อให้เรอิสะหลับได้สบายขึ้น)"

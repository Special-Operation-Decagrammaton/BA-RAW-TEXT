[translation]
1006803-1 = "相信吧，澪紗"
1006803-2 = "夏萊．休息室"
1006803-3 = "（工作告一段落時，邀請澪紗來到了夏萊的休息室）"
1006803-7 = "[ns1]「歡迎你來，澪紗。」\n[ns2]「門開著哦～」"
1006803-13 = "你，你好……老師……！"
1006803-14 = "非常感謝……老師的，回覆……"
1006803-15 = "[s3]「澪紗！？你怎麼搖搖晃晃的，沒事吧？」\n[s4]「發生什麼事了！？」"
1006803-18 = "那個……沒有發生什麼事……#n唔，咳咳……"
1006803-19 = "唔，失禮了。身體……有點重……"
1006803-20 = "嗯，嗯嗯！#n啊～"
1006803-24 = "稍微好一點了！#n咳哼，那麼──"
1006803-25 = "今天想請教老師關於「恢復疲勞」的建議！"
1006803-26 = "那個……早上去學校，放學後和朋友們出去玩……#n傍晚開始是自衛隊的巡邏……"
1006803-27 = "每個都不拒絕的話……就沒什麼時間可以休息……"
1006803-28 = "尤其是這三天的事件特別多，幾乎沒什麼睡……#n所以想請教老師有效率地恢復疲勞的方法……"
1006803-29 = "……"
1006803-30 = "……以前都是在學校的休息時間睡覺，所以才沒什麼問題……啊哈哈。"
1006803-31 = "[s5]「這樣啊……是相當嚴重的過勞呢……」\n[s6]「所以才會搞壞身體啊……」"
1006803-34 = "啊哈哈……"
1006803-35 = "我相信老師一定能理解的！"
1006803-36 = "所以……老師知道能瞬間消除疲勞的藥，#n或是祕密的妖怪能量飲料之類的……那種祕密道具嗎！！"
1006803-37 = "……咦？"
1006803-38 = "恢復疲勞沒有訣竅……不好好休息是不行的？"
1006803-39 = "雖然是這麼說沒錯……不過沒有其他辦法嗎……"
1006803-40 = "對現在的我來說，重要的不再只有學校和自衛隊……"
1006803-41 = "和朋友一起玩的時間……也一樣重要……"
1006803-42 = "如果……"
1006803-43 = "如果我主動保持距離的話……到時候，又會……"
1006803-44 = "很可能……一定……"
1006803-45 = "[ns] 「…………」"
1006803-47 = "[ns7]「澪紗的壞習慣又跑出來了哦。」\n[ns8]「沒有必要過度配合周圍的人哦。」"
1006803-50 = "那是……什麼意思……？"
1006803-51 = "你問有沒有什麼不一樣的地方……？#n沒什麼特別……"
1006803-52 = "……啊。"
1006803-53 = "這麼說來，在學校被朋友關心身體狀況的次數好像變多了。#n還有被問說要不要改一下行程……或是有煩惱的話要說唷，之類的話……"
1006803-54 = "自衛隊那邊也是，有人跟我提案說可以代替我去巡邏……"
1006803-55 = "當然我全都用「沒關係的」來回答就是了……#n啊哈哈……"
1006803-56 = "[s9]「大家都在擔心你哦。」\n[s10]「因為不希望澪紗太逞強。」"
1006803-59 = "是，是嗎……#n咦……我看起來像是在逞強嗎……？"
1006803-60 = "……啊哈哈，在這種情況下說這種話實在沒什麼說服力呢。"
1006803-64 = "真的……沒問題嗎。"
1006803-65 = "朋友們……還有自衛隊的大家會怎麼想……"
1006803-66 = "雖然很想聽聽老師的建議……同時又感到有點害怕。"
1006803-67 = "如果現在的人際關係全都崩壞的話，該怎麼辦才好……"
1006803-71 = "……不過。"
1006803-72 = "嗯，至今為止只要聽老師的話，一切都會很順利！"
1006803-73 = "這次也是一樣吧！#n一定會的！"
1006803-74 = "[s11]「嗯。可以更相信周圍的人哦。」\n[s12]「大家都比澪紗想像中更重視澪紗哦。」"
1006803-77 = "……！！"
1006803-78 = "是！！！"
1006803-79 = "……呼，呼嗚嗚……"
1006803-85 = "[ns13]「澪紗！？」\n[ns14]「危，危險！」"
1006803-88 = "唔唔……是因為脫離緊張了嗎……"
1006803-89 = "突然，很，想，睡……"
1006803-95 = "嘿嘿……嘿嘿……一起去吧……#n一定很好玩的……嘻嘻……"
1006803-96 = "[ns] 「…………」"
1006803-98 = "[ns] 將休息室的燈關上"
1006803-102 = "（之後為了避免吵醒澪紗，悄悄離開了房間）"

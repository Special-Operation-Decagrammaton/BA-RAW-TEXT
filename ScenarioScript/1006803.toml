1006803-18 = "3;레이사;08;딱히 일이 있었던 건 아닌데……. 으흐, 으흐흐……. 으흐흐흐흐…….\n#3;em;[땀]"
1006803-19 = "3;레이사;04;으음. 죄송해요. 이러려고 온 게 아닌데. 잠시만 정신을 좀 차리고……."

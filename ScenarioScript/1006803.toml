1006803-24 = "3;레이사;00;조금 낫군요!\n#3;em;[반짝]"
1006803-25 = "3;레이사;18;아무튼 선생님께 지금처럼 도움을 구하고자 했던 것, 그것은 바로 '피로 회복'에 관한 조언을 얻고자 함입니다!"
1006803-26 = "3;레이사;05;저녁에 순찰 돌고, 낮에 학교 가고……. 방과 후에 친구들이랑 놀러 다니고……."
1006803-27 = "3;레이사;06;계속해서 병행하다 보니 조금 쉴 시간이……. 부족해진 것 같아서요."
1006803-28 = "3;레이사;04;조금씩 쌓였던 것 같은데, 특히나 요 사흘간은 사건 사고도 좀 많았다 보니, 잠도 거의 못 자 버려서…….\n#3;stiff"
1006803-29 = "3;레이사;04;………….\n#3;em;[...]"
1006803-30 = "3;레이사;15;……원래는 학교 쉬는 시간마다 자서 괜찮았는데 말이에요. 하하."
1006803-31 = "[s5] \"그래서 피로 회복 노하우를…….\"\n[s6] \"그만큼 잘 시간이 없어져 버린 거구나.\""

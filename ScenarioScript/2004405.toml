[translation]
2004405-1 = "可疑的健身訓練"
2004405-3 = "歡迎你來，指導員。"
2004405-4 = "[s]「要我幫忙看的東西是什麼呢？」"
2004405-5 = "嗯……就是這個。"
2004405-10 = "[ns]「這是……」"
2004405-12 = "沒錯。如指導員所見，是之前我打工的運動場經理寄來的。"
2004405-13 = "語氣非常客氣，或者也能說是前言相當冗長，簡而言之就是……"
2004405-14 = "[s]「希望堇能簽下專屬的打工合約？」"
2004405-15 = "是的，內容大致上就是這樣。"
2004405-16 = "當然如果只是這樣的話，我自然會回絕……問題在於後面。"
2004405-17 = "經理還額外加上了這樣的內容。"
2004405-18 = "那就是「與飲料工讀生一起的健身訓練課」！"
2004405-19 = "[s]「從某種角度來說，他已經完全摸透堇的喜好了啊！」"
2004405-20 = "咦？那是什麼意思……"
2004405-21 = "總之，我今天想跟指導員討論的就是這封信的事。"
2004405-22 = "嗯？你覺得有點可疑，所以希望我考慮委婉地拒絕他？"
2004405-23 = "那怎麼行！"
2004405-24 = "世界上的某個角落有人需要訓練，我有什麼理由不去呢！"
2004405-25 = "[s]「所以你已經決定要去了啊……！」"
2004405-26 = "那我想討論的內容是什麼……是嗎？"
2004405-27 = "原來如此，這樣確實可能會讓你有點混淆。#n對不起，指導員。"
2004405-28 = "實際上我想商量的是……"
2004405-29 = "是我平時的服裝和飲料打工的制服，穿哪套過去比較不會失禮這個問題。"
2004405-31 = "（看著堇如此老實又認真的樣子，心想這種煩惱果然很有堇的風格……）"
2004405-32 = "（與他並肩前往了之前那座運動場）"
2004405-38 = "哎呀，歡迎你來。#n我一直在等你呢！堇同學！"
2004405-39 = "經理你好。#n謝謝你親自出來迎接。唔嗯……"
2004405-40 = "有什麼問題嗎？"
2004405-41 = "請問你對飲食控制或體型管理有興趣嗎？"
2004405-42 = "嗯！？#n我應該還沒有胖到需要控制的程度才對……"
2004405-43 = "很多人經常會認為，飲食控制是為了消除贅肉而節食……"
2004405-44 = "但其實它本質上的意義，是為了保持健康而進行的「飲食管理」！"
2004405-45 = "我們也經常會幫平均體型以下、肌肉不足的會員進行增重。"
2004405-46 = "透過妥善規劃的飲食，讓會員能夠攝取適量的高蛋白和優質碳水化合物──#n這也確確實實是一種飲食控制！"
2004405-47 = "咦咦咦咦咦！？"
2004405-48 = "[s]「堇，堇。你先冷靜點……」"
2004405-49 = "對不起，指導員。#n一看到有無限成長可能性的人，我總是會情不自禁地……"
2004405-50 = "看來我的眼光果然沒錯呢！#n請問你考慮得怎麼樣呢，堇同學。"
2004405-51 = "要不要跟我們簽訂專屬合約，重現之前在運動場的榮光啊！"
2004405-52 = "關於這點……我真的很抱歉。"
2004405-53 = "我終究是千年訓練部的部長，目前也沒有放棄這個本分的想法。"
2004405-54 = "這樣啊……真讓人遺憾。"
2004405-55 = "不過沒關係！#n我還有另一件事想拜託你！"
2004405-56 = "是，我對那件事也頗有興趣。"
2004405-57 = "請問……「與飲料工讀生一起的健身訓練課」是什麼呢？"
2004405-58 = "謝謝你這麼積極地想了解！"
2004405-59 = "其實我們這個運動場，除了堇同學之外還有很多其他賣飲料的工讀生……"
2004405-60 = "啊……原來如此。#n他們之中的許多人都對飲料機的重量感到吃不消……"
2004405-61 = "所以經理才會希望由我來指導他們的肌力訓練嗎？"
2004405-62 = "沒錯！如果可以的話，希望能在穿著飲料機的狀態下進行訓練！"
2004405-63 = "你覺得怎麼樣呢？#n雖然第一個提案很遺憾地被你拒絕了……"
2004405-64 = "不過我認為第二個提案，對堇同學來說應該也相當具有吸引力才對！"
2004405-65 = "[s]「你打算怎麼做呢……堇？」"
2004405-66 = "……"
2004405-67 = "答案很簡單，指導員。"
2004405-68 = "我之前也說過，只要世上有任何人需要訓練──"
2004405-69 = "並且我能夠對那位會員有所幫助的話──"
2004405-70 = "我隨時願意與會員們一起，堅持到最後一次深蹲！"
2004405-71 = "即使預定的次數已經做完，還是會鼓勵會員們再多做一次！"
2004405-72 = "[s]「這個部分不能克制一下嗎！？」"
2004405-73 = "今天的痛苦刺激，會帶動明天的肌肉成長……"
2004405-74 = "這最後的最後一組，將會成為邁向極致肌肉的堅實踏腳石啊！"
2004405-75 = "[s]「默默從一次變成一組了……！」"
2004405-76 = "所以你願意接受囉？"
2004405-77 = "當然，經理。"
2004405-78 = "我已經把穿戴飲料機時的動作、負重、訓練課程與菜單，全都規劃得無懈可擊了！"
2004405-79 = "真是太可靠了！"
2004405-80 = "請問指導員要一起參加嗎？"
2004405-81 = "[s]「啊啊！我，我的肚子突然……！」"
2004405-82 = "是嗎……？#n那還真是有點可惜呢……"
2004405-84 = "大家辛苦了！#n最後再來一個深蹲就好！"
2004405-85 = "什麼！？不是已經做完所有組數了嗎？#n而且剛才的「最後一個」也做過了！"
2004405-86 = "這麼說來，我好像聽說過……#n有某間健身房的指導員，根本忘記怎麼數數字和次數了……！"
2004405-87 = "拜託體諒一下我們的處境……"
2004405-88 = "現在大家的飲料機裡不但裝滿了水，手腳還綁著沙袋啊！"
2004405-89 = "這點我也一樣，不是很公平嗎？"
2004405-90 = "雖，雖然是這樣沒錯……"
2004405-91 = "來來來，再稍微加油一下吧。#n手腳還能動，就表示力量還沒被榨乾！"
2004405-92 = "在大家努力戰勝今天的痛苦之後……"
2004405-93 = "這些努力一定會化作體力及肌肉的成長，進而創造更有活力、更愉快的工讀生活！"
2004405-94 = "並且只要持之以恆……"
2004405-95 = "各位一定都能成為運動場的傳說的！"
2004405-96 = "那麼事不宜遲，再來一組！"
2004405-97 = "怎麼又偷偷加了一組！？！？"
2004405-99 = "（於是後來參加堇的特別肌力訓練的工讀生們……）"
2004405-100 = "（都不出所料地因為劇烈的肌肉痠痛而倒下了……）"

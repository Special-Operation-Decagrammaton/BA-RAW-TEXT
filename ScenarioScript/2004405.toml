[translation]
2004405-1 = "#title;수상한 헬스 트레이닝"
2004405-2 = "#wait;2000"
2004405-3 = "3;스미레;01;오셨군요, 트레이너.\n#3;a\n#3;em;[반응]"
2004405-4 = "[s] \"봐주었으면 하는 것이라니?\""
2004405-5 = "3;스미레;06;네…… 이것입니다."
2004405-6 = "#st;[0,0];instant;1;"
2004405-7 = "#clearST"
2004405-8 = "3;스미레;06\n#3;d\n#wait;1000"
2004405-9 = "3;스미레;06\n#3;a\n#3;greeting\n#3;closeup\n#wait;1000"
2004405-10 = "[ns] \"이건…….\""
2004405-11 = "3;스미레;06\n#3;d\n#3;closeup\n#wait;1000"
2004405-12 = "3;스미레;05;네. 보시는 대로, 이전 제가 아르바이트를 했던 스타디움의 관리 매니저분에게서 온 것입니다.\n#3;a"
2004405-13 = "3;스미레;04;상당히 정중한 내용으로 쓰여 있어서, 달리 말씀드리자면 서론이 상당히 길어서, 주요 내용만 추려내자면…….\n#3;em;…"
2004405-14 = "[s] \"스미레에게, 전속 아르바이트 계약을 부탁한다고?\""
2004405-15 = "3;스미레;02;그렇습니다. 그런 내용입니다."
2004405-16 = "3;스미레;99;물론 그것만이라면 당연히 거절드렸겠습니다만……. 문제는 그다음입니다.\n#3;em;[한숨]"
2004405-17 = "3;스미레;06;매니저분께서는 이런 내용을 추가하셨죠."
2004405-18 = "3;스미레;10;바로, '드링크 아르바이트생과 함께하는 헬스 트레이닝 프로그램' 이라는 것을요!\n#3;closeup"
2004405-19 = "[s] \"어떤 의미로는 스미레에 대한 파악이 끝났네!\""
2004405-20 = "3;스미레;06;네? 그건 또 무슨 의미이신지…….\n#3;em;…"
2004405-21 = "3;스미레;99;아무튼, 제가 상담 드리고 싶은 것은 여기서부터입니다."
2004405-22 = "3;스미레;01;예? 뭔가 수상하니까 조심스럽게 거절 드리는 선택지도 고려해 보자고요?\n#3;em;[?]"
2004405-23 = "3;스미레;10;그럴 수는 없습니다!\n#3;closeup\n#fontsize;80"
2004405-24 = "3;스미레;05;세상 어딘가에 트레이닝을 필요로 하는 사람들이 있는데, 제가 가지 않을 이유가 어디에 있겠습니까!\n#3;em;[!]\n#3;closeup"
2004405-25 = "[s] \"가는 건 이미 확정이었냐!\""
2004405-26 = "3;스미레;02;그러면 상담하고 싶은 내용이 무엇이냐고요?\n#3;em;[?]"
2004405-27 = "3;스미레;99;그렇군요. 이제 생각해 보니, 그 부분은 확실히 헷갈리셨을지도 모를 일이었습니다. 죄송합니다, 트레이너.\n#3;greeting"
2004405-28 = "3;스미레;01;제가 상담 드리고 싶은 것은…….\n#3;em;…"
2004405-29 = "3;스미레;06;저의 평상시 복장과 드링크 아르바이트 복장 중, 어느 쪽을 입고 가야 실례가 되지 않는 걸까, 하는 문제였습니다."
2004405-30 = "#all;hide"
2004405-31 = "#na;(참으로 담백하고 성실한 스미레다운 고민이라는 생각을 하면서…….)"
2004405-32 = "#na;(우리는 나란히, 이전의 그 스타디움으로 발걸음을 향했다.)"
2004405-33 = "#st;[0,0];instant;1;"
2004405-34 = "#clearST"
2004405-35 = "#wait;100"
2004405-36 = "#wait;1800"
2004405-37 = "#all;hide"
2004405-38 = "3;스타디움 매니저;03;아이고, 어서 오십시오. 기다리고 있었습니다! 스미레 씨!\n#3;a\n#3;em;[재잘]"
2004405-39 = "5;스미레 아르바이트;01;안녕하세요. 매니저 님. 이렇게 직접 나와 주셔서 감사합니다. 흐음…….\n#5;a\n#5;em;…\n#3;m1"
2004405-40 = "3;스타디움 매니저;01;무슨 문제라도 있으십니까?\n#3;em;[?]"
2004405-41 = "5;스미레 아르바이트;08;혹시, 다이어트나 체형 관리에 관심이 있으신가요?\n#5;em;[반짝]"
2004405-42 = "3;스타디움 매니저;04;네, 네?! 저는 보시다시피 그렇게 뚱뚱한 편도 아니고, 그러니 다이어트는…….\n#3;jump\n#3;em;[!]"
2004405-43 = "5;스미레 아르바이트;99;흔히 다이어트는 군살을 없애기 위해 음식을 적게 먹는 일이라고 이야기하고는 하죠."
2004405-44 = "5;스미레 아르바이트;05;하지만 다이어트의 본질적인 의미는, 바로 건강을 위한 '식단 관리'입니다!"
2004405-45 = "5;스미레 아르바이트;02;오히려 평균 체형 이하의, 근육이 부족한 회원님의 벌크업을 위해."
2004405-46 = "5;스미레 아르바이트;10;적절한 고단백 및 양질의 탄수화물을 섭취할 수 있게 식단을 구성하는 것도, 명백한 다이어트에 포함되는 것이죠!\n#5;em;[!]"
2004405-47 = "3;스타디움 매니저;07;네에에에에?!\n#3;shake\n#3;em;[?!]"
2004405-48 = "[s] \"스미레, 스미레. 진정해…….\""
2004405-49 = "5;스미레 아르바이트;09;죄송합니다, 트레이너. 성장 가능성이 무궁무진한 분을 보니, 저도 모르게 그만…….\n#5;em;…"
2004405-50 = "3;스타디움 매니저;03;그렇지만 제 눈이 틀리지는 않았던 것 같네요! 어떠신가요, 스미레 씨."
2004405-51 = "3;스타디움 매니저;08;저희와 함께 전속 계약을 체결해, 이전 스타디움에서의 그 영광을 다시 한번 재현해 보시는 것은요!\n#3;em;[음표]"
2004405-52 = "5;스미레 아르바이트;99;그 부분에 대한 것이라면…… 정말로 죄송합니다.\n#5;greeting"
2004405-53 = "5;스미레 아르바이트;02;저는 어디까지나 밀레니엄 트레이닝 클럽의 리더이고, 그 본분을 저버릴 생각은 지금으로서는 없습니다."
2004405-54 = "3;스타디움 매니저;09;그러신가요……. 진심으로 아쉽네요.\n#3;em;[세로선]"
2004405-55 = "3;스타디움 매니저;03;하지만 괜찮습니다! 또 다른 부탁도 드려 보고 싶었으니까요!"
2004405-56 = "5;스미레 아르바이트;03;네. 저도 그 부분에 대해 흥미가 있었습니다."
2004405-57 = "5;스미레 아르바이트;04;바로 그…… '드링크 아르바이트생과 함께하는 헬스 트레이닝 프로그램'이란 무엇인가요?\n#5;em;…"
2004405-58 = "3;스타디움 매니저;08;긍정적인 신호를 보내 주셔서, 마음으로부터 감사드립니다!\n#3;em;[음표]"
2004405-59 = "3;스타디움 매니저;01;사실 저희 스타디움에서는, 스미레 씨 이외에도 많은 드링크 아르바이트생들이 활동하고 계십니다만……."
2004405-60 = "5;스미레 아르바이트;02;아……. 그렇군요. 그 분들이 보통, 무거운 드링크 장비를 감당하지 못하고 힘겨워하고 있으니…….\n#5;em;[반응]"
2004405-61 = "5;스미레 아르바이트;03;그분들을 위한 특별 근력 트레이닝을 지도해 주셨으면 한다는 거군요?"
2004405-62 = "3;스타디움 매니저;03;그렇습니다! 가능하다면 드링크 장비를 착용한 상태에서의 트레이닝을 부탁드리고 싶네요!\n#3;em;[재잘]"
2004405-63 = "3;스타디움 매니저;01;어떠십니까? 첫 번째 제안은 저희로서는 아쉽게도 거절의 의사를 표해 주셨습니다만……."
2004405-64 = "3;스타디움 매니저;03;이 두 번째 제안은, 스미레 씨에게도 충분히 매력적인 제안일 것이라고 생각되는데요!\n#3;em;[음표]"
2004405-65 = "[s] \"어떻게…… 할 거야, 스미레?\""
2004405-66 = "5;스미레 아르바이트;99;…….\n#3;dl\n#5;m3\n#5;em;…"
2004405-67 = "5;스미레 아르바이트;01;간단한 것입니다, 트레이너."
2004405-68 = "5;스미레 아르바이트;02;앞서 드린 말씀입니다만, 세상 어딘가에 트레이닝을 필요로 하는 사람들이 있다면."
2004405-69 = "5;스미레 아르바이트;10;그리고 그 회원님께 제가 조금이라도 도움이 될 수 있다면!\n#5;em;[!]"
2004405-70 = "5;스미레 아르바이트;03;저는 언제나 그 회원님들과 함께, 마지막까지 한 번의 스쿼트를 함께 할 것입니다!"
2004405-71 = "5;스미레 아르바이트;08;횟수를 다 채웠다면, 진짜 마지막의 마지막으로 한 번만 더 하자고 권유하면서요!\n#5;em;[반짝]"
2004405-72 = "[s] \"그건 어떻게 좀 참아 주지 않을래?!\""
2004405-73 = "5;스미레 아르바이트;09;오늘의 고통스러운 자극이, 내일의 근성장으로 이어지는 법…….\n#5;stiff"
2004405-74 = "5;스미레 아르바이트;08;마지막의 마지막 한 번, 최후의 최후 한 세트가, 더 멋진 근육을 만드는 디딤돌이 될 것입니다!\n#5;em;[재잘]"
2004405-75 = "[s] \"어느 사이에 한 번에서 한 세트로 늘어나기까지 했잖아!\""
2004405-76 = "1;스타디움 매니저;08;그러면 수락해 주시는 거군요?\n#1;ar\n#5;m5\n#1;em;[음표]"
2004405-77 = "5;스미레 아르바이트;03;물론입니다. 매니저님.\n#5;em;[재잘]"
2004405-78 = "5;스미레 아르바이트;05;이미, 드링크 장비를 착용한 상태에서의 동작과 레벨 부하, 트레이닝 코스와 메뉴까지 완벽하게 플래닝해 두었으니까요!"
2004405-79 = "1;스타디움 매니저;03;믿음직스럽습니다!\n#1;em;[재잘]"
2004405-80 = "5;스미레 아르바이트;03;혹시 트레이너도 함께하시겠습니까?"
2004405-81 = "[s] \"아앗! 갑자기 배가, 배가……!\""
2004405-82 = "5;스미레 아르바이트;06;그렇…… 습니까? 그것은 조금 유감이네요…….\n#5;em;[세로선]"
2004405-83 = "#all;hide"
2004405-84 = "3;스미레 아르바이트;08;수고하셨습니다, 여러분! 그러면 마지막으로 풀 스쿼트, 한 번만 더 하겠습니다!\n#3;a\n#3;em;[재잘]"
2004405-85 = "3;스미레 아르바이트;08\n#na;지친 아르바이트생 A;네에?! 세트는 조금 전에 끝났잖아요!? 그리고 방금 전에도 '한 번 더'는 이미 했었고요!"
2004405-86 = "3;스미레 아르바이트;08\n#na;지친 아르바이트생 B;그러고 보니 들은 적이 있어요……. 어딘가의 헬스 트레이닝 리더는, 숫자와 횟수를 세는 법을 잊어버렸다고……!"
2004405-87 = "3;스미레 아르바이트;08\n#na;지친 아르바이트생 A;부탁이니 우리 사정도 좀 봐주셨으면 해요……."
2004405-88 = "3;스미레 아르바이트;08\n#na;지친 아르바이트생 B;지금 모두 드링크 장비에 물을 가득 채운 것도 모자라서, 팔다리에 모래주머니도 차고 있단 말이에요!"
2004405-89 = "3;스미레 아르바이트;03;그건 저도 마찬가지이니, 서로 공평한 조건이지 않을까요?\n#3;em;[반짝]"
2004405-90 = "3;스미레 아르바이트;03\n#na;지친 아르바이트생 A;그건 또 틀린 말은 아니긴 한데……."
2004405-91 = "3;스미레 아르바이트;10;자, 자. 우리 조금만 더 힘내 봅시다. 팔다리를 움직일 수 있다면, 아직 짜낼 수 있는 힘이 남아 있다는 것이니 말이죠!"
2004405-92 = "3;스미레 아르바이트;09;오늘의 이 고통을 이겨내고 마침내 극복해 냈을 때…….\n#3;stiff"
2004405-93 = "3;스미레 아르바이트;03;그것이 여러분의 체력 및 근육의 성장으로 이어지고! 나아가 보다 활기차고 즐거운 아르바이트 생활로 연결될 것임에 틀림없습니다.\n#3;em;[음표]"
2004405-94 = "3;스미레 아르바이트;99;그리고 그렇게 하다 보면……."
2004405-95 = "3;스미레 아르바이트;08;반드시, 여러분 모두 스타디움의 전설이 되실 수 있을 것입니다!\n#3;em;[재잘]"
2004405-96 = "3;스미레 아르바이트;10;그러면 지체하지 말고, 한 세트만 더!"
2004405-97 = "3;스미레 아르바이트;10\n#na;아르바이트생들;어느새 한 세트가 추가되지 않았나요, 지금?!?!"
2004405-98 = "#all;hide"
2004405-99 = "#na;(그렇게, 스미레의 특별 근력 트레이닝에 참가한 아르바이트생들은…….)"
2004405-100 = "#na;(모두가 예상했겠지만, 극심한 근육통에 드러눕고 말았다…….)"
2004405-101 = "#all;hide"

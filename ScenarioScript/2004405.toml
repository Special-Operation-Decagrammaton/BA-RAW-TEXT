[translation]
2004405-1 = "Suspicious Workout"
2004405-3 = "Good to see you, Trainer."
2004405-4 = "[s] \"You wanted to show me something?\""
2004405-5 = "Yes... It's this."
2004405-10 = "[ns] \"This is...\""
2004405-12 = "It's from my old manager—the one from the baseball stadium."
2004405-13 = "It's written so formally... You can skip the first few paragraphs. Look here."
2004405-14 = "[s] \"They want you to sign an exclusive part-time contract with them?\""
2004405-15 = "Yes. And..."
2004405-16 = "That part's not as interesting as this proposal at the bottom."
2004405-17 = "Take a look."
2004405-18 = "It's the \"Keg Cardio Protocol\"! With me as an advisor?"
2004405-19 = "[s] \"Sounds up your alley!\""
2004405-20 = "Hm? I'm not sure what you mean by that..."
2004405-21 = "It's true that I love exercise...and inspiring people..."
2004405-22 = "What? You think it sounds fishy? I should decline?"
2004405-23 = "I can't!"
2004405-24 = "There are people out there desperately needing MY expertise!"
2004405-25 = "[s] \"So you already decided to do it?\""
2004405-26 = "Oh, you thought... No, that's not why I called you here."
2004405-27 = "I'm sorry, Trainer. I didn't mean to mislead you."
2004405-28 = "What I wanted to ask you was..."
2004405-29 = "Whether you think I should wear the full uniform or not? Is it too much?"
2004405-31 = "She honestly seemed concerned. I told her she should probably dress for the part."
2004405-32 = "We headed back to the stadium together."
2004405-38 = "Miss Sumire! So wonderful to see you!"
2004405-39 = "Thank you! It's good to be back. But..."
2004405-40 = "Is something wrong?"
2004405-41 = "By any chance, have YOU considered optimizing your diet regimen?"
2004405-42 = "H-Huh?! Miss Sumire! Do you think I'm...overweight?"
2004405-43 = "Oh, not at all! \"Diet\" means so much more than losing weight."
2004405-44 = "Fundamentally, a \"diet\" stands for \"dietary management\"! It's a cornerstone of health!"
2004405-45 = "In fact, for you, with such a lithe figure, I'd recommend you bulk up!"
2004405-46 = "We could revitalize your \"diet\" by incorporating high-protein meals and functional carbohydrates!"
2004405-47 = "Excuse me?!"
2004405-48 = "[s] \"Sumire, back off...\""
2004405-49 = "I'm sorry, Trainer. My former manager just has so much potential!"
2004405-50 = "Ha! It's nice to see you're still so passionate about your work!"
2004405-51 = "So how about you sign that exclusive contract and come back to the stadium?"
2004405-52 = "About that... I'm truly sorry."
2004405-53 = "I could never abandon my duties at the Millennium Athletics Training Club."
2004405-54 = "Is that so? That's quite unfortunate."
2004405-55 = "Not necessarily! I wanted to ask you something."
2004405-56 = "Here, at the bottom of the contract. Let's explore this."
2004405-57 = "The \"Keg Cardio Protocol.\" What does that mean?"
2004405-58 = "I'm glad you asked!"
2004405-59 = "The thing is, aside from you, we have many other...refreshment enablers working here."
2004405-60 = "Ah... I see. They're having trouble with the kegs, are they?"
2004405-61 = "And you're thinking I could step in and whip them into shape?"
2004405-62 = "Precisely! We'd like you to train the new recruits! You're...a bit of a legend among them, Sumire."
2004405-63 = "What do you say? Although I'm sad to hear that you're staying retired..."
2004405-64 = "I believe that you could still make a big difference here!"
2004405-65 = "[s] \"What are you going to do, Sumire?\""
2004405-66 = "..."
2004405-67 = "It's simple, Trainer."
2004405-68 = "If there's a poor soul willing to learn, eager to take control of their health..."
2004405-69 = "Then I will answer their desperate call!"
2004405-70 = "I will be there, guiding them, hanging through every squat!"
2004405-71 = "And when they're at the last rep, I'll yell at them to do one more, because 100% is never enough!"
2004405-72 = "[s] \"Sumire! That's too much!\""
2004405-73 = "But today's pain cultivates tomorrow's gains..."
2004405-74 = "And that last, additional, AMAZING final set will inspire them to true greatness!"
2004405-75 = "[s] \"It even went from a rep to a set?\""
2004405-76 = "Does that mean that you'll accept?"
2004405-77 = "Of course!"
2004405-78 = "I've already planned the perfect regimen: dynamic keg loads, training courses, and adequate protein intake!"
2004405-79 = "How inspiring!"
2004405-80 = "Would you like to join, Trainer?"
2004405-81 = "[s] \"Aah! Oh...my stomach! I can't...\""
2004405-82 = "Is that...so? I'm sorry to hear that."
2004405-84 = "Good work, everyone! Now then, just one more full squat!"
2004405-85 = "What?! Didn't we just finish the set?! You said we were done!"
2004405-86 = "I don't think she knows how to count!"
2004405-87 = "Please, have mercy..."
2004405-88 = "On top of the full kegs, we also have weights on our limbs!"
2004405-89 = "Yes? So do I. And mine are heavier!"
2004405-90 = "That may be true, but..."
2004405-91 = "Okay! Just a bit more. If you can still stand, then you can still lift!"
2004405-92 = "When you push through your limits and overcome..."
2004405-93 = "...your body and mind will strengthen as one. And the fans will have more fun!"
2004405-94 = "And if we work together..."
2004405-95 = "...we will ALL be stadium legends!"
2004405-96 = "So, let's go! One more set!"
2004405-97 = "She added another one?!"
2004405-99 = "And so, the workout continued..."
2004405-100 = "...leaving everyone except Sumire sore."

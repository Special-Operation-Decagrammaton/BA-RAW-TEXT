[translation]
2004405-1 = "การเทรนนิ่งที่น่าสงสัย"
2004405-3 = "มาแล้วเหรอคะ เทรนเนอร์"
2004405-4 = "[s] \"อยากให้ครูช่วยดูอะไรให้เหรอ?\""
2004405-5 = "ค่ะ... นี่น่ะค่ะ"
2004405-10 = "[ns] \"นี่มัน...\""
2004405-12 = "ก็อย่างที่เห็นค่ะ คุณผู้จัดการสนามกีฬาที่ฉันเคยไปทำงานพาร์ทไทม์ส่งเอกสารนี้มาให้ฉัน"
2004405-13 = "เนื้อหาในนี้เขียนไว้อย่างสุภาพมากเลยค่ะ แต่บทนำมันค่อนข้างยืดยาว ถ้าจะให้สรุปแค่ประเด็นสำคัญๆ เลยละก็..."
2004405-14 = "[s] \"ทางนั้นขอทำสัญญาให้สึมิเระไปทำงานพาร์ทไทม์ต่อเนื่องเหรอ?\""
2004405-15 = "ใช่แล้วค่ะ อย่างที่เทรนเนอร์ว่าเลยค่ะ"
2004405-16 = "แน่นอนว่าถ้ามีแค่งานขายเครื่องดื่ม ฉันก็คงปฏิเสธไปแล้ว... แต่ปัญหาก็คือ"
2004405-17 = "คุณผู้จัดการเพิ่มรายละเอียดนี้มาด้วยค่ะ"
2004405-18 = "และนั่นก็คือ 'โปรแกรมเทรนนิ่งพนักงานขายเครื่องดื่มพาร์ทไทม์' ค่ะ!"
2004405-19 = "[s] \"ทางนั้นมองสึมิเระขาดเลยสินะ!\""
2004405-20 = "คะ? หมายความว่ายังไง..."
2004405-21 = "เอาเถอะค่ะ ที่ฉันอยากขอคำปรึกษาจากเทรนเนอร์คือเรื่องจากนี้ไปค่ะ"
2004405-22 = "คะ? มันฟังดูน่าสงสัย ก็เลยอยากแนะนำให้ปฏิเสธงั้นเหรอคะ?"
2004405-23 = "ฉันทำแบบนั้นไม่ได้หรอกค่ะ!"
2004405-24 = "โลกนี้มีผู้คนที่อยากออกกำลังกาย แล้วทำไมฉันต้องปฏิเสธที่จะไปเจอพวกเขาล่ะคะ!"
2004405-25 = "[s] \"สรุปว่าตัดสินใจจะรับงานนี้แล้วงั้นเหรอ!\""
2004405-26 = "ถ้างั้นฉันอยากปรึกษาเรื่องอะไรน่ะเหรอคะ?"
2004405-27 = "นั่นสินะคะ พอมาคิดดูตอนนี้ ฉันน่าจะทำให้เทรนเนอร์สับสนไปก็ได้ ขอโทษด้วยค่ะ เทรนเนอร์"
2004405-28 = "เรื่องที่ฉันอยากขอคำปรึกษาก็คือ..."
2004405-29 = "ระหว่างชุดที่ฉันใส่อยู่ทุกวันกับยูนิฟอร์มของพนักงานขายเครื่องดื่มพาร์ทไทม์ ฉันควรใส่ชุดไหนถึงจะ#nเหมาะสมเหรอคะ?"
2004405-31 = "(ในขณะที่คิดว่าสมแล้วที่เป็นความกังวลของคนที่ซื่อตรงและขยันอย่างสึมิเระ...)"
2004405-32 = "(คุณครูกับสึมิเระก็เดินเคียงกันไปยังสนามกีฬาที่เคยไปก่อนหน้านี้)"
2004405-38 = "มาแล้วเหรอครับ ผมกำลังรออยู่เลยครับ! คุณสึมิเระ!"
2004405-39 = "สวัสดีค่ะ คุณผู้จัดการ ขอบคุณที่ออกมาพบฉันเป็นการส่วนตัวนะคะ ฮืม..."
2004405-40 = "มีปัญหาอะไรหรือเปล่าครับ?"
2004405-41 = "คุณผู้จัดการสนใจเรื่องการไดเอตหรือดูแลร่างกายอย่างนั้นเหรอคะ?"
2004405-42 = "คะ... ครับ?! อย่างที่เห็นว่าผมไม่ได้อ้วนขนาดนั้น ผมก็เลยไม่ได้ไดเอต..."
2004405-43 = "ว่ากันว่าการไดเอตคือการกินอาหารแต่น้อยเพื่อลดน้ำหนักใช่มั้ยคะ?"
2004405-44 = "แต่ความหมายที่แท้จริงของไดเอตก็คือการ 'ดูแลเรื่องอาหาร' เพื่อให้มีสุขภาพดีค่ะ!"
2004405-45 = "สำหรับสมาชิกที่มีน้ำหนักต่ำกว่ามาตรฐานและขาดมวลกล้ามเนื้อ"
2004405-46 = "การจัดอาหารให้ได้รับโปรตีนในปริมาณที่เพียงพอและได้คาร์โบไฮเดรตที่มีคุณภาพดีก็ถือว่าเป็นการ#nไดเอตเหมือนกันค่ะ!"
2004405-47 = "ครับ?!"
2004405-48 = "[s] \"สึมิเระ สึมิเระ ใจเย็นๆ ก่อน...\""
2004405-49 = "ขอโทษด้วยค่ะ เทรนเนอร์ พอฉันเห็นคนที่มีศักยภาพในการเติบโตอย่างไร้ขีดจำกัด ฉันก็ตื่นเต้นจน#nเผลอพูดมากไปจนได้..."
2004405-50 = "ผมมองคนไม่ผิดจริงๆ ด้วยนะครับ! ว่ายังไงล่ะครับ คุณสึมิเระ"
2004405-51 = "มาทำสัญญากับทางเรา แล้วกอบกู้ความรุ่งโรจน์ของสนามกีฬาแห่งนี้กลับมาอีกครั้งกันเถอะครับ!"
2004405-52 = "ถ้าเป็นเรื่องนั้นละก็... ฉันต้องขอโทษจริงๆ ค่ะ"
2004405-53 = "ฉันคือหัวหน้าฟิตเนสเซ็นเตอร์ของมิลเลเนียม และตอนนี้ฉันก็ไม่มีความคิดจะละทิ้งหน้าที่นั้นค่ะ"
2004405-54 = "อย่างนั้นเหรอครับ... น่าเสียดายจริงๆ เลย"
2004405-55 = "แต่ก็ไม่เป็นไรครับ! ยังไงผมก็อยากขอความช่วยเหลือในเรื่องอื่นด้วยครับ!"
2004405-56 = "ค่ะ ถ้าเป็นเรื่องนั้น ฉันเองก็สนใจค่ะ"
2004405-57 = "ว่าแต่... 'โปรแกรมเทรนนิ่งพนักงานขายเครื่องดื่มพาร์ทไทม์' มันคืออะไรเหรอคะ?"
2004405-58 = "ต้องขอบคุณที่สนใจนะครับ!"
2004405-59 = "ที่จริงนอกจากคุณสึมิเระแล้ว ที่สนามกีฬาแห่งนี้ยังมีพนักงานขายเครื่องดื่มพาร์ทไทม์อยู่อีก#nหลายคนครับ..."
2004405-60 = "อ่า... อย่างนั้นสินะคะ แต่พวกเขามักจะมีปัญหาเรื่องการแบกเครื่องจ่ายเครื่องดื่มหนักๆ..."
2004405-61 = "ก็เลยจะให้ฉันช่วยเทรนการฝึกพิเศษเพื่อความแข็งแรงของกล้ามเนื้อให้พนักงานสินะคะ?"
2004405-62 = "ใช่ครับ! ถ้าเป็นไปได้ก็อยากขอให้ช่วยเทรนในขณะที่สะพายเครื่องจ่ายเครื่องดื่มด้วยครับ!"
2004405-63 = "ว่ายังไงล่ะครับ? ถึงข้อเสนอแรกของเราจะถูกปฏิเสธไปอย่างน่าเสียดาย..."
2004405-64 = "แต่ผมคิดว่าข้อเสนอที่สองน่าจะทำให้คุณสึมิเระสนใจไม่น้อยเลยนะครับ!"
2004405-65 = "[s] \"จะเอายังไงเหรอ... สึมิเระ?\""
2004405-66 = "..."
2004405-67 = "เรื่องนี้ง่ายๆ ค่ะ เทรนเนอร์"
2004405-68 = "อย่างที่ฉันบอกไปก่อนหน้านี้ว่าโลกนี้มีผู้คนที่อยากออกกำลังกาย แล้วทำไมฉันต้องปฏิเสธที่จะไปเจอ#nพวกเขาด้วย"
2004405-69 = "และถ้าฉันจะเป็นประโยชน์ต่อพวกเขาแม้เพียงเล็กน้อยก็ตาม!"
2004405-70 = "ฉันก็จะอยู่เคียงข้างพวกเขาและสควอทไปด้วยกันจนถึงเซ็ตสุดท้ายเลยค่ะ!"
2004405-71 = "และถ้าทำครบจำนวนครั้งในเซ็ตนั้นแล้ว ฉันก็จะขอเพิ่มครั้งสุดท้ายของสุดท้ายอีกค่ะ!"
2004405-72 = "[s] \"เรื่องนั้นครูว่าห้ามใจไว้หน่อยดีกว่านะ!\""
2004405-73 = "ความเจ็บปวดของร่างกายในวันนี้จะนำไปสู่การพัฒนาของกล้ามเนื้อในวันพรุ่งนี้..."
2004405-74 = "ครั้งสุดท้ายของสุดท้ายนี่ละค่ะที่จะพาไปสู่ความสำเร็จในการสร้างกล้ามเนื้อ!"
2004405-75 = "[s] \"แต่กว่าจะรู้ตัว ก็สั่งให้ทำเพิ่มอีกเซ็ตแล้วนี่นา!\""
2004405-76 = "ตกลงว่าคุณสึมิเระตอบรับใช่มั้ยครับ?"
2004405-77 = "ใช่ค่ะ คุณผู้จัดการ"
2004405-78 = "ฉันวางแผนเรื่องการเคลื่อนไหวเมื่อต้องสะพายเครื่องจ่ายเครื่องดื่ม ระดับความหนัก และโปรแกรมเทรนนิ่งมาหมดแล้วค่ะ!"
2004405-79 = "สมกับที่เป็นคุณสึมิเระจังเลยครับ!"
2004405-80 = "เทรนเนอร์ก็มาฝึกด้วยกันมั้ยคะ?"
2004405-81 = "[s] \"อ๊ะ! จู่ๆ ก็ปวดท้องขึ้นมา สงสัยข้าศึกบุก...!\""
2004405-82 = "งั้น... เหรอคะ? งั้นก็น่าเสียดายนะคะ..."
2004405-84 = "ทำได้ดีมากค่ะทุกคน! ถ้างั้นเราจะมาทำฟูลสควอทกันค่ะ อีกแค่ครั้งเดียวพอ!"
2004405-85 = "คะ?! เราเพิ่งสควอทเสร็จไปเมื่อกี้นี่คะ!? แล้วเมื่อกี้ก็บอกว่า 'อีกแค่ครั้งเดียวพอ' ไปแล้วด้วย!"
2004405-86 = "พอมาคิดดู ฉันก็ได้ยินคำนั้นเหมือนกันค่ะ... เหมือนกับว่าจู่ๆ คุณโค้ชก็ลืมเรื่องตัวเลขและวิธีนับจำนวน#nไปอย่างนั้นละ...!"
2004405-87 = "ขอร้องละค่ะ ช่วยดูสภาพของพวกเราด้วยเถอะ..."
2004405-88 = "นอกจากต้องแบกเครื่องที่บรรจุเครื่องดื่มอยู่เต็มแล้ว ที่แขนขาของเรายังมีสายรัดถ่วงน้ำหนักอีกนะคะ!"
2004405-89 = "ฉันเองใส่เหมือนทุกคนนะคะ งั้นมันก็เท่าเทียมกันนี่คะ?"
2004405-90 = "จะว่าอย่างนั้นมันก็ถูกต้องอยู่หรอก..."
2004405-91 = "เอาละๆ เรามาออกแรงต่อกันอีกนิดค่ะ ถ้ายังขยับแขนขาได้ นั่นแปลว่าเรายังมีแรงเหลืออยู่ค่ะ!"
2004405-92 = "ตอนที่เราเอาชนะความเจ็บปวดของวันนี้ได้แล้ว..."
2004405-93 = "ตอนนั้นละค่ะที่พละกำลังและกล้ามเนื้อของทุกคนจะพัฒนา! และนั่นจะทำให้เราทำงานพาร์ทไทม์ได้#nอย่างกระปรี้กระเปร่าและสนุกกว่าเดิมค่ะ!"
2004405-94 = "และถ้าทำอย่างนั้นไปเรื่อยๆ..."
2004405-95 = "พวกคุณทุกคนก็จะเป็นคนดังของสนามกีฬาได้อย่างแน่นอนค่ะ!"
2004405-96 = "เอาละค่ะ อย่ารอช้าอยู่เลย มาต่อกันอีกเซ็ต!"
2004405-97 = "ทำไมถึงจะเพิ่มอีกเซ็ตหนึ่งเลยล่ะคะ?!?!"
2004405-99 = "(แล้วเหล่าพนักงานพาร์ทไทม์ที่เข้าโปรแกรมฝึกพิเศษเพื่อความแข็งแรงของกล้ามเนื้อกับสึมิเระ...)"
2004405-100 = "(ก็ต้องทรมานกับอาการปวดกล้ามเนื้อจนต้องลงไปนอน...)"

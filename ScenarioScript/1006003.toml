[translation]
1006003-1 = "วิธีใช้เวลาอย่างสงบสุข"
1006003-2 = "(คุณครูเจอเข้ากับเมกุที่ด้านหนึ่งของซอยลึกและเปลี่ยว)"
1006003-3 = "(เมกุกำลังกระสับกระส่ายอยู่ด้วยสีหน้าที่ว้าวุ่นใจ)"
1006003-12 = "[ns1] \"...เมกุ? เป็นอะไรหรือเปล่า?\"\n[ns2] \"เมกุ! มีเรื่องอะไรเหรอ?\""
1006003-20 = "คุณครู! มาหาฉันแล้วสินะ! กำลังรออยู่เลย!"
1006003-21 = "หืม? ฉันดูเคร่งเครียดเลยเหรอ? "
1006003-22 = "อื้ม! นี่สถานการณ์เคร่งเครียดเลยละ เครียดมากกก แบบ ก.ไก่ล้านตัวเลย!"
1006003-23 = "หืม? เรื่องอะไรงั้นเหรอ?"
1006003-24 = "อืม... ก็แบบว่า...!"
1006003-28 = "…"
1006003-29 = "...มันไม่มีเรื่องอะไรเลย! ไม่มีเลย!!"
1006003-33 = "[ns3] \"...???\"\n[ns4] \"ไม่มีเรื่องอะไรเกิดขึ้น ก็เลยเป็นเรื่องเครียดเหรอ?\""
1006003-36 = "ใช่แล้ว สมกับเป็นคุณครูจริงๆ เลย!"
1006003-37 = "เข้าใจได้ทันทีเลยนะ!!"
1006003-38 = "[ns] \"...\""
1006003-40 = "[ns5] \"อ้อ~ เข้าใจได้อย่างสมบูรณ์แบบเลย!\"\n[ns6] (ไม่เข้าใจเลยสักนิด)"
1006003-43 = "พอดีว่าเมื่อกี้น่ะ ฉันกับสมาชิกคนอื่นในชมรมพยายามจะสร้างออนเซ็นในจุดที่หัวหน้าบอก"
1006003-44 = "แต่ทันทีที่ระเบิดพื้น กองกำลังอะไรไม่รู้ก็แห่ออกมาจากทุกทิศทาง แถมครั้งนี้ออกมากันเยอะกว่าที่#nคาดไว้ด้วย!"
1006003-45 = "ตอนนั้นฉันคิดว่าต้องสู้กันสักตั้งเหมือนเคย~ แต่หัวหน้ากลับบอกให้แยกย้ายกันไปซ่อนตัวก่อน..."
1006003-46 = "ฉันก็เลยมาซ่อนตัวอยู่ตรงนี้..."
1006003-50 = "แต่ว่า... หลังจากนั้น..."
1006003-51 = "[s] \"อืมๆ หลังจากนั้น...?\""
1006003-52 = "หลังจากนั้นก็... อยู่อย่างนี้มาตลอด... ก็หัวหน้าบอกให้ไปซ่อนตัวดีๆ อย่าให้ใครจับได้…"
1006003-53 = "ฉันก็เลยตั้งใจว่าจะนั่งอยู่แต่ตรงนี้เงียบๆ... แต่ว่า... มันเหนื่อยมากเลย..."
1006003-57 = "[ns] \"...\""
1006003-58 = "คุณครู... การ 'ซ่อนตัวดีๆ' นี่มันต้องทำยังไงเหรอ? ฉันไม่รู้เลย!!"
1006003-59 = "[s7] \"อ้อ... แค่นั่งเฉยๆ ก็อาจปวดเมื่อยได้นี่เนอะ\"\n[s8] \"เมกุเป็นคนแอคทีฟ ให้มานั่งเฉยๆ คงลำบากสินะ\""
1006003-62 = "อืม... งั้นเหรอ...?"
1006003-63 = "อาจจะเป็นแบบนั้นก็ได้!!"
1006003-64 = "เวลาเดินช้ามากเลย รู้สึกเหมือนถูกขังอยู่ที่ไหนสักแห่งอย่างนั้นแหละ!"
1006003-65 = "ไม่สิ ตอนอยู่ในห้องขังของคณะกรรมการวินัยยังดีกว่านี้เลย! ที่นั่นยังพอมีของนู่นนี่ให้หยิบจับอยู่บ้าง!"
1006003-66 = "แถมตอนนั้นก็โดนขังพร้อมสมาชิกชมรมคนอื่นด้วย"
1006003-67 = "แต่ว่าตอนนี้น่ะ! ตอนนี้...!!"
1006003-71 = "ฮืออออออ~~!!!"
1006003-72 = "...หืม?"
1006003-73 = "คุณครู? เมื่อกี้ว่าอะไรนะ?"
1006003-74 = "...อ๋อ นี่เหรอ?"
1006003-78 = "นี่คือ... ของที่ฉันจะเอาไว้วางตกแต่งออนเซ็นตอนที่สร้างเสร็จแล้วน่ะ..."
1006003-79 = "มันเรียกว่าอะไรนะ...? เคน...ดามะ?"
1006003-80 = "เอาเถอะ เอาเป็นว่ามันมีของแบบนี้อยู่น่ะ"
1006003-81 = "ส่วนรายละเอียดฉันก็ไม่ค่อยรู้หรอก เห็นบอกว่าถ้าออนเซ็นเสร็จแล้วให้เอาไปไว้ ฉันก็เลยถือเอาไว้น่ะ"
1006003-82 = "ว่าแต่คุณครูถามทำไมเหรอ?"
1006003-83 = "หรือว่าคุณครูรู้ว่ามันคืออะไร?"
1006003-84 = "หา? ...ว่าไงนะ?"
1006003-85 = "...ของเล่นเหรอ? อันนี้เนี่ยนะ? แล้วมันเล่นยังไงเหรอ?"
1006003-91 = "[ns9] รับเคนดามะมาจากเมกุ\n[ns10] \"ครูสาธิตให้ดูมั้ย?\""
1006003-94 = "...!! ว้าว เอาสิ~!! งั้นทำให้ดูหน่อยนะ!!"
1006003-104 = "...!!!!!!!"
1006003-108 = "อะ... อะไรเนี่ย! นี่มันอะไรกัน!?"
1006003-109 = "แจ่มไปเลยนี่นา!! ทำแบบนี้ได้ยังไงเนี่ย!?"
1006003-110 = "ฉันลองทำดูบ้างได้มั้ยคุณครู?! ขอลองทำบ้างสิ!! ให้ฉันทำหน่อยนะ!!"
1006003-111 = "[s11] \"เดิมทีก็เป็นของเธออยู่แล้วนี่นะ...\"\n[s12] คืนเคนดามะให้เมกุ"
1006003-118 = "ดีละ ไหนลองทำดูบ้างซิ...!!"
1006003-127 = "...เอ๊า? อะไรเนี่ย? ทำไมไม่ได้ล่ะ?"
1006003-132 = "ไหงทำไม่ได้อย่างที่คิดไว้ล่ะ... คุณครู? อันนี้มีเคล็ดลับในการเล่นด้วยเหรอ? หรือว่าต้องใช้สมองด้วย?"
1006003-133 = "หืม? ต้องลองทำสักครั้ง จะได้ชินงั้นเหรอ?"
1006003-134 = "จริงเหรอ? ฉันจะเชื่อคำพูดคุณครูนะ"
1006003-135 = "ดีละ...!"
1006003-136 = "คุณครูคอยดูได้เลย!! ฉันจะต้องทำให้สำเร็จให้ได้!!"
1006003-137 = "มาลองอีกครั้งกัน~~!!!"
1006003-139 = "(จากนั้นคุณครูก็อยู่สอนและฝึกเมกุตรงนั้น กว่าเมกุจะเล่นเคนดามะเป็นก็ปาไป 2-3 ชั่วโมง)"
1006003-140 = "(ระหว่างนั้นมีใครบางคนติดต่อมาจนโทรศัพท์ของเมกุดังอย่างต่อเนื่อง แต่เมกุไม่สนใจโทรศัพท์เลย#nแม้แต่น้อย......)"

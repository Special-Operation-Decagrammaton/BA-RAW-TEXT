[translation]
1006003-1 = "How to Relax"
1006003-2 = "I found Megu in a gloomy corner of a back alley."
1006003-3 = "Megu, fidgeting, was looking around the alley nervously."
1006003-12 = "[ns1] \"...Megu? Are you okay?\"\n[ns2] \"Megu! What is it? What's wrong?\""
1006003-20 = "Sensei! You're here. Good. I've been waiting!"
1006003-21 = "Oh? You think I look serious?"
1006003-22 = "Well, I am! This is very very serious!"
1006003-23 = "Oh, you wanna know what's going on?"
1006003-24 = "Um... So..."
1006003-28 = "..."
1006003-29 = "...Nothing! Nothing is going on! Forever!"
1006003-33 = "[ns3] \"...?\"\n[ns4] \"Is the serious business...the fact that nothing is happening?\""
1006003-36 = "Right! I knew I could count on you, Sensei!"
1006003-37 = "You understood right away!"
1006003-38 = "[ns] \"...\""
1006003-40 = "[ns5] \"Oh. I get it.\"\n[ns6] \"(I don't understand anything.)\""
1006003-43 = "Anyway, before the nothing, we were trying to build a hot spring in a spot the president found."
1006003-44 = "But as soon as we started blasting, a whole bunch of troops came rushing at us from all directions. More than usual, even!"
1006003-45 = "I just assumed we'd have to fight again, but the president told us to scatter and hide."
1006003-46 = "So... Now I'm hiding. Like this."
1006003-50 = "And then... And then..."
1006003-51 = "[s] \"And... What happened next?\""
1006003-52 = "I stayed... Hiding, like this. They told me not to get caught, so..."
1006003-53 = "So I'm just supposed to stay put here... But... It's really hard! It's hard to do!"
1006003-57 = "[ns] \"...\""
1006003-58 = "Sensei... How are you supposed to stay put? I really don't get it!"
1006003-59 = "[s7] \"...Um... So you're saying you're restless.\"\n[s8] \"You're having a hard time because you're so energetic.\""
1006003-62 = "Hmm.... Is that right?"
1006003-63 = "Maybe!"
1006003-64 = "Time's passing so slowly! I feel like I'm trapped!"
1006003-65 = "This is worse than when we get put in the Prefect Team's cells sometimes! At least then I had things to do!"
1006003-66 = "And I was with some other club members, too."
1006003-67 = "But now! Now...!"
1006003-71 = "Ughhhhh!!"
1006003-72 = "...What?"
1006003-73 = "Sensei? What did you say?"
1006003-74 = "...Oh, this?"
1006003-78 = "Um, it's just a decoration that we were going to put in the hot springs when it was done..."
1006003-79 = "What was the word, again? Ken...dama?"
1006003-80 = "I think that's what she called it..."
1006003-81 = "I don't know much about it! I was just holding onto it so we could use it when we were done."
1006003-82 = "Why do you ask?"
1006003-83 = "Sensei, do you know something about it?"
1006003-84 = "What? ... Oh?"
1006003-85 = "This is a toy? I didn't know that! How does it work?"
1006003-91 = "[ns9] Take the kendama.\n[ns10] \"Do you want a demonstration?\""
1006003-94 = "Oh, that would be great! Please show me!"
1006003-104 = "...!"
1006003-108 = "Wow! Wow wow! What is this?!"
1006003-109 = "That's amazing! How are you doing that?"
1006003-110 = "Can I try? Sensei, I wanna try! Let me see it!"
1006003-111 = "[s11] \"Well, it is yours...\"\n[s12] Return the kendama to Megu."
1006003-118 = "Okay, here goes!"
1006003-127 = "...Ugh. It's not working... Why can't I do it?"
1006003-132 = "Hey, Sensei, how come you could do it and I can't? Is there a trick to it?"
1006003-133 = "You think I'll get better with practice?"
1006003-134 = "Hmm... Well, if you say so, Sensei, I'll trust you."
1006003-135 = "Okay!"
1006003-136 = "Watch, Sensei! I'm going to figure it out!"
1006003-137 = "Let me try again!"
1006003-139 = "Megu practiced for the next few hours until she figured out the kendama."
1006003-140 = "Her phone rang multiple times during that time, but Megu didn't pay any attention to it."

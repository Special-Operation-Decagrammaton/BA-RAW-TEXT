[translation]
1006003-1 = "無法「等待」的女孩"
1006003-2 = "（在陰暗巷口的角落發現了惠）"
1006003-3 = "（惠看起來有點焦慮，一副忐忑不安的樣子）"
1006003-12 = "[ns1]「……惠，你還好嗎？」\n[ns2]「惠！發生了什麼事了？」"
1006003-20 = "老師，你來啦！我在等你哦！"
1006003-21 = "嗯？我的臉色看起來很沉重？"
1006003-22 = "就是說啊！#n事情真的很嚴重！"
1006003-23 = "你問是什麼事？"
1006003-24 = "唔嗯，就是啊……"
1006003-28 = "……"
1006003-29 = "……什麼事也沒發生！而且是一直！！"
1006003-33 = "[ns3]「……？」\n[ns4]「什麼事都沒發生，是那麼嚴重的事嗎……」"
1006003-36 = "我就知道老師能理解我～！"
1006003-37 = "真的很嚴重！"
1006003-38 = "[ns] 「…………」"
1006003-40 = "[ns5]「就，就是啊！真是辛苦你了，惠……」\n[ns6]（完全無法理解）"
1006003-43 = "事情是這樣的，其實我剛才和溫泉開發部的大家一起依照部長的指示在挖溫泉。"
1006003-44 = "然而工程才正要開始，突然就被一大堆敵人襲擊了。#n數量真的非常多！"
1006003-45 = "本來以為這次應該也要戰鬥吧～但部長卻下令各自散開躲起來……"
1006003-46 = "所以我才會像這樣躲在這裡……"
1006003-50 = "問題在那之後……"
1006003-51 = "[s]「問題是指……？」"
1006003-52 = "因為被吩咐要一～直躲好別被發現……"
1006003-53 = "所以我很努力的一～直在忍耐，但我實在是忍不住了！"
1006003-57 = "[ns]「…………」"
1006003-58 = "老師……要怎麼做才算是安分呢？#n我完全搞不懂！"
1006003-59 = "[s7]「……什麼都不做會讓你覺得很焦躁對吧。」\n[s8]「因為惠很活潑，這樣反而會讓你覺得很難受呢。」"
1006003-62 = "唔嗯，是嗎……？"
1006003-63 = "雖然不是很懂，不過應該是吧！"
1006003-64 = "時間好像都不會前進。#n就像被關在某個地方的時候一樣！"
1006003-65 = "不過，雖然偶爾會被關進風紀委員會的拘留所，也不會像現在這樣那麼難受！#n畢竟那邊也有東西可以玩……"
1006003-66 = "而且還有其他部員在。"
1006003-67 = "但是現在……！"
1006003-71 = "唔唔唔唔唔～～～！！！"
1006003-72 = "……嗯～老師？"
1006003-73 = "你剛才有說什麼嗎？"
1006003-74 = "……啊，這個？"
1006003-78 = "這是新的溫泉完成之後要用來裝飾的東西。"
1006003-79 = "叫什麼來著。劍……玉？"
1006003-80 = "好像是叫這個名字吧。"
1006003-81 = "詳細的情況我不清楚，不過預計要在完成溫泉後拿來裝飾哦！"
1006003-82 = "為什麼要問這個呢……？"
1006003-83 = "啊，難道老師你知道這個是什麼嗎？"
1006003-84 = "咦？"
1006003-85 = "……玩具？這個東西是玩具？要怎麼玩呢？"
1006003-91 = "[ns9] 借用惠的劍玉\n[ns10]「讓你見識一下我的技術。」"
1006003-94 = "哦哦～！我要看我要看！"
1006003-104 = "…………！！！！！！！！！！"
1006003-108 = "咦咦咦咦咦咦！太酷了吧！？"
1006003-109 = "還能這樣玩嗎！？老師是怎麼做到的！？"
1006003-110 = "我也想試試看！#n可以嗎，老師？"
1006003-111 = "[s11]「當然可以唷。」\n[s12] 把劍玉還給惠"
1006003-118 = "好，我也來……！"
1006003-127 = "……呃，咦？"
1006003-132 = "沒辦法跟想像中的一樣……老師，這有什麼訣竅嗎？#n該不會，要夠聰明才能玩吧……"
1006003-133 = "只要多練習就會玩了？"
1006003-134 = "真的嗎？那我會相信老師，努力加油的！"
1006003-135 = "好……！"
1006003-136 = "拭目以待吧，老師！#n我一定會練成的！！"
1006003-137 = "那麼就～再來一次！"
1006003-139 = "（在那之後，直到惠上手為止，陪他練習了好幾個小時）"
1006003-140 = "（過程中不斷有人打電話給惠，但他似乎直到最後也沒有注意到……）"

[translation]
11070-2 = "第7話;新的危險？"
11070-3 = "對策委員會．教室"
11070-4 = "大家辛苦了。"
11070-5 = "茜香醬，你還好嗎？"
11070-6 = "嗯，我沒事。#n你看，還活蹦……"
11070-7 = "1;茜香;08;（蹣跚……）"
11070-9 = "（啪噠）"
11070-10 = "茜香醬！"
11070-11 = "我帶他去保健室。"
11070-15 = "畢竟是被Flak 41高射炮擊中，如果還能走路反而才不正常。#n就讓他好好休息一會吧～"
11070-16 = "差點就出大事了。#n要是老師不在的話……"
11070-17 = "嗯嗯，多虧有老師才能確認茜香醬的位置並追蹤。#n果然很厲害呢☆"
11070-18 = "就是說呀～看來不是普通的跟蹤狂呢。"
11070-19 = "……大家，你們看看這個。"
11070-20 = "我檢查了在戰鬥中獲得的戰車零件，結果發現那是不得在奇普托斯使用的非法機種。"
11070-21 = "雖然還需要進一步確認……#n但頭盔團似乎獲得了只靠自己無法取得的武器。"
11070-22 = "所以只要分析這個零件的流通管道，應該就能找出那些傢伙背後的勢力了對吧！"
11070-23 = "沒錯，這樣或許就能解釋為何普通的流氓會一直針對我們學校了……"
11070-24 = "嗯，我知道了。那就來好好調查調查吧～"
11070-26 = "高層辦公大樓"
11070-27 = "……"
11070-28 = "……這就是那些流氓的極限了嗎。#n明明連主力戰車都送去支援了，竟然落得這種下場。"
11070-29 = "既然如此，只能以牙還牙，以學生還學生嗎……#n委託專家吧。"
11070-31 = "（嘟嚕嚕嚕，嘟嚕嚕嚕）"
11070-32 = "（喀嚓）"
11070-33 = "你好，這裡是任何疑難雜症都能解決的便利屋68。"
11070-34 = "我有委託要交給你們，便利屋。"
11070-35 = "……"
11070-37 = "硬梆梆頭盔團的根據地"
11070-40 = "哈啊……哈啊……"
11070-41 = "嗚哇啊啊！！"
11070-42 = "（咚噠噠噠噠噠噠噠！！）"
11070-43 = "咕嗚！！"
11070-44 = "！"
11070-46 = "（啪噠）"
11070-47 = "哈囉哈囉～這裡結束了唷～"
11070-48 = "這裡也壓制住了，BOSS。"
11070-50 = "唔，唔唔……你們這些傢伙是誰……"
11070-51 = "……哼哼哼。"
11070-53 = "（用力按）"
11070-55 = "嗚啊啊啊！！難，難道是阿拜多斯那夥人嗎！？#n竟敢對我們……"
11070-56 = "唉，居然把這種又臭又髒的地方當成基地。#n你們這些人也挺摳門的嘛。"
11070-57 = "……好，我就讓你們從勞動之中解脫吧。"
11070-58 = "什，什麼！？"
11070-59 = "換句話說就是你們被解僱了。#n從今以後，阿拜多斯由我們來處理。"
11070-60 = "開，開什麼玩笑！#n你們到底是……"
11070-62 = "（砰！）"
11070-63 = "嗚哇啊啊！！"
11070-64 = "……"
11070-67 = "……"
11070-68 = "我們是[ruby=SixtyEight]便利屋68。　　[/ruby]"
11070-69 = "只要給錢，什麼都願意做的……"
11070-72 = "萬事屋唷。"
11070-74 = "（喀啦）"
11070-75 = "唉……"
11070-76 = "咦……？老師！？怎，怎麼了嗎？"
11070-77 = "[s] 「來探望你了唷。」"
11070-78 = "這樣啊……我沒事。#n而且也不能這樣一直躺下去。"
11070-79 = "綾音醬和大家都在擔心……還得去打工才行。"
11070-80 = "所，所以不用擔心！你看，我現在精神很好。"
11070-81 = "[s]「太好了。」"
11070-82 = "……"
11070-83 = "3;茜香;11;那，那個！！"
11070-84 = "……就，就是……"
11070-85 = "現在想想，我還沒好好跟老師道謝……"
11070-86 = "謝，謝謝你……在各方面的幫忙……"
11070-87 = "……但是！可不要以為這點程度就對我們學校有什麼幫助哦！#n這份人情我一定會還的！"
11070-88 = "……"
11070-89 = "怎，怎樣啦！？為什麼要笑咪咪的！？"
11070-90 = "唉，真是的。"
11070-91 = "3;茜香;02;那就……明天見囉！ "
11070-92 = "3;茜香;01;那個，老……"
11070-93 = "3;茜香;12;……老師。"
11070-97 = "下一話;便利屋登場！"

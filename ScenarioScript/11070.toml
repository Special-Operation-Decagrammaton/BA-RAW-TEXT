[translation]
11070-2 = "Episode 7; A New Threat?"
11070-3 = "Foreclosure Task Force Room"
11070-4 = "Well done, everyone."
11070-5 = "Serika, are you okay?"
11070-6 = "Uh-huh. I'm okay. Never been better..."
11070-7 = "(stumble)"
11070-9 = "(collapse)"
11070-10 = "Serika!"
11070-11 = "I'll take her to the infirmary."
11070-15 = "I'd be more concerned if she WAS still standing after getting hit by a Flak 41 artillery shell. She better get some rest."
11070-16 = "It could have been much worse had Sensei not been here..."
11070-17 = "Yup, yup. Tracking down Serika's location was a piece of cake thanks to you, Sensei. You're always so reliable! ☆"
11070-18 = "Oh, really? All in a day's work for a stalker, huh?"
11070-19 = "...Excuse me, everyone. Could I have your attention?"
11070-20 = "I was looking into the tank parts we collected in battle. It turns out they're from an illegal model that is prohibited within Kivotos."
11070-21 = "I'll have to dig a little deeper, but right now it looks like the Helmet Gang has gained access to hardware normally out of their reach."
11070-22 = "I bet we can find out who those hooligans answer to if we analyze the distribution channels for these parts!"
11070-23 = "Bingo. That, and also why a minor criminal organization is targeting our school so obsessively..."
11070-24 = "Sounds good to me. Let's proceed a little cautiously and see where this leads."
11070-26 = "High-Rise Office"
11070-27 = "..."
11070-28 = "Is this the best an organized crime group can do? Providing them with a tactical tank was a waste."
11070-29 = "You'd think a gang of students would be able to handle some other students. In that case, I'll simply have to enlist the services of more skilled professionals."
11070-31 = "*ring* *ring*"
11070-32 = "*click*"
11070-33 = "Hello. Problem Solver 68. We'll do the crime if you've got the dime."
11070-34 = "I have a special task for you, my dear fixers."
11070-35 = "..."
11070-37 = "Kata-Kata Helmet Gang's Base"
11070-40 = "*pant* *pant*"
11070-41 = "What the...?!"
11070-42 = "*pop* *pop* *pop* *tat*!"
11070-43 = "Guh!"
11070-44 = "...!"
11070-46 = "(collapses)"
11070-47 = "Hmph. All clear on this end."
11070-48 = "All done over here too, Boss."
11070-50 = "G-Gah... Who are you people?"
11070-51 = "Heh heh heh."
11070-53 = "(presses rifle against her)"
11070-55 = "Graugh! Are you runts from Abydos? How dare you...?"
11070-56 = "Please. And you call this dirty, stinking lair your base? You lot are pathetic."
11070-57 = "Oh, well. I'll put you out of your misery—don't worry."
11070-58 = "Wh-What?!"
11070-59 = "Relax. We're just here to tell you that you've been relieved of your duties. We'll be taking Abydos off of your hands now."
11070-60 = "Wh-What the...?! Who do you think you are?!"
11070-62 = "*thwack*"
11070-63 = "Gaaarrgh!"
11070-64 = "..."
11070-67 = "..."
11070-68 = "Problem Solver 68."
11070-69 = "We'll do the crime if you've got the dime."
11070-72 = "The best fixers in all of Kivotos."
11070-74 = "(door opens)"
11070-75 = "Huh?"
11070-76 = "Wait...Sensei?! What are you doing here?!"
11070-77 = "[s] \"I came to see how you were doing.\""
11070-78 = "Oh. I'm fine. I shouldn't be spending so much time lying around doing nothing anyway."
11070-79 = "I don't want to worry Ayane or the others too much. Plus, I have my part-time job to go to."
11070-80 = "Y-You don't have to worry about me so much! I'm fine, really."
11070-81 = "[s]\"That's a relief.\""
11070-82 = "..."
11070-83 = "Uh, so... By the way!"
11070-84 = "Th-The thing is..."
11070-85 = "Looking back on it, I don't think I ever thanked you, Sensei..."
11070-86 = "S-So...thanks. For all the help and stuff..."
11070-87 = "But still! Don't assume this has done anything to actually help our school! We're gonna settle this debt if it's the last thing we do!"
11070-88 = "..."
11070-89 = "Wh-What?! What's with that smug look on your face?!"
11070-90 = "*sigh* Geez."
11070-91 = "Whatever... I'll see you tomorrow!"
11070-92 = "Sen..."
11070-93 = "...Sensei."
11070-97 = "Next Episode; The Might of Problem Solver 68"

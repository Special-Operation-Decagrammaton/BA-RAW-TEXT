[translation]
11070-2 = "ตอนที่ 7;ภัยอันตรายครั้งใหม่?"
11070-3 = "ห้องชมรมคณะกรรมการแผนงาน"
11070-4 = "ทำได้ดีมากค่ะทุกคน"
11070-5 = "เซริกะจัง เป็นอะไรรึเปล่า?"
11070-6 = "ฉันไม่ได้บาดเจ็บอะไร..."

11070-56 = "เฮ้อ ไม่อยากเชื่อเลยว่าจะเอาที่ที่ทั้งเหม็นและสกปรกมาเป็นศูนย์บัญชาการแบบนี้#nแต่ก็เหมาะกับพวกแกดีนะ"

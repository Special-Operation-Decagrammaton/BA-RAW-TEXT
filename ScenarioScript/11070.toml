11070-10 = "เซริกะจัง!!"
11070-11 = "ฉันพาไปห้องพยาบาลเอง"
11070-15 = "โดนปืนใหญ่ Flak41 ยิงมาขนาดนั้น ยังเดินไหวอยู่ได้แบบนี้ก็ฝืนมากแล้ว รีบไปพักผ่อนเถอะ"
11070-16 = "ถ้าไม่มีคุณครูอยู่ด้วยละก็ เซริกะก็คง..."
11070-17 = "ใช่! เพราะคุณครูพยายามจนหาพิกัดของเซริกะจังได้ พวกเราก็เลยเข้าไปช่วยได้ทันค่ะ#nคุณครูเนี่ยสุดยอดไปเลยนะคะ☆"
11070-18 = "หรือจะเป็นแค่พลังธรรมดาของนักสะกดรอยตามกันนะ..."
11070-19 = "จริงสิ! ทุกคนช่วยมาดูตรงนี้หน่อยค่ะ"
11070-20 = "ฉันลองตรวจสอบชิ้นส่วนของรถถังที่กระจัดกระจายได้ระหว่างการต่อสู้ดู และมั่นใจว่ามันเป็นอาวุธ#nรบผิดกฎหมายที่ห้ามใช้ในคิโวทอสค่ะ"
11070-21 = "อันที่จริงอาจจะต้องตรวจสอบรายละเอียดมากกว่านี้... แต่เท่านี้ก็พอคาดการณ์ได้ว่า#nแก๊งหมวกกันน็อกครอบครองอาวุธที่พวกมันไม่มีทางหามาได้ด้วยตัวเองอยู่ค่ะ"
11070-22 = "ถ้าเราหาเส้นทางลำเลียงชิ้นส่วนอาวุธพวกนี้ได้ เราก็จะสืบหาเบื้องหลังของเจ้าพวกนี้ได้ค่ะ!"
11070-23 = "ใช่ค่ะ ทำไมกลุ่มอันธพาลเล็กๆ ถึงได้มุ่งมั่นอยากยึดครองโรงเรียนของเราแบบนี้กันนะคะ?"
11070-24 = "ก็นะ... ค่อยๆ สืบหาเบาะแสไปแล้วกัน"
11070-26 = "ห้องสำนักงานชั้นบน"
11070-27 = "..."
11070-28 = "กลุ่มอันธพาลนั่นทำได้แค่นี้เองเหรอ? เราถึงกับสนับสนุนรถถังยุทธศาสตร์ให้ แต่ผลลัพธ์ดันออกมาเป็นแบบนี้งั้นหรือ?"
11070-29 = "คิดแล้วเชียวว่าพวกนักเรียน... ก็ต้องให้พวกนักเรียนเป็นคนจัดการ สงสัยต้องฝากไว้กับผู้เชี่ยวชาญแล้วละ"

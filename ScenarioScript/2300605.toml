[translation]
2300605-1 = "百夜堂的看板娘是專家！"
2300605-2 = "（之後，在工作的時候也一直很在意靜子傳的訊息，於是來到了百夜堂）"
2300605-5 = "[s] 「啊，靜子。那個……」"
2300605-6 = "這是您點的饅頭套餐。"
2300605-8 = "啊，靜子碳～！我剛才點的是……"
2300605-9 = "……咦，是饅頭。"
2300605-10 = "……今天竟然，沒有搞錯嗎！？"
2300605-11 = "那麼，您請慢用。"
2300605-12 = "？？？"
2300605-16 = "[ns] 「靜子……？」"
2300605-21 = "啊，靜子醬！危險──"
2300605-24 = "……嗎！？"
2300605-25 = "在快要跌倒的瞬間，靜子醬突然做出了像特技一樣的動作！？"
2300605-26 = "啊，不好意思。我剛剛恍神了。"
2300605-27 = "一反平常的可愛形象，直接擺出應付的態度！？"
2300605-28 = "您點的是餡蜜對吧？請稍等。"
2300605-29 = "讓您久等了，請用。"
2300605-30 = "還用普通、冷靜的方式送餐！"
2300605-32 = "總覺得……今天的靜子炭……"
2300605-33 = "竟然正確的接受點餐……"
2300605-34 = "那個，有什麼問題嗎？"
2300605-35 = "「「「冷冷地應付別人的靜子炭也好帥……！」」」"
2300605-36 = "[s] 「究竟發生了什麼……」"
2300605-38 = "（就這樣接近百夜堂結束營業的時間）"
2300605-39 = "那麼，今天的營業時間就到此為止。"
2300605-40 = "非常感謝您光臨百夜堂……嗯？"
2300605-41 = "……"
2300605-42 = "……啊咧，老師？"
2300605-43 = "您什麼時候來的呢？"
2300605-44 = "[s1] 「我還想說怎麼沒有來幫我點餐，」\n[s2] 「你果然沒有注意到我來了啊。」"
2300605-45 = "不，不好意思，我……"
2300605-46 = "不，不好意思，我……"
2300605-47 = "啊……"
2300605-51 = "[s] 「靜子，你沒事吧！？」"
2300605-52 = "哈啊，哈啊，哈啊……"
2300605-56 = "唔，嗯……咦？這裡是……？"
2300605-57 = "[s] 「抱歉。你昏倒之後我擅自把你帶到房間裡了。」"
2300605-58 = "昏，昏倒了？"
2300605-59 = "我……怎麼會……？"
2300605-60 = "[s3] 「我想，應該是因為過勞了。」\n[s4] 「前陣子你還去幫其他商店街舉辦祭典了對吧……」"
2300605-61 = "那是……"
2300605-62 = "那是……"
2300605-63 = "確實，百夜堂最近多了很多客人……"
2300605-64 = "作為節慶營運管理部部長，要做的事情變多了也是事實……"
2300605-65 = "[s] 「不可以太勉強自己呦。」"
2300605-66 = "可是……"
2300605-67 = "不管哪邊都是我該去做的事……"
2300605-68 = "如果隨便做做的話，我沒辦法接受。"
2300605-69 = "[s5] 「就算不隨便，適當的休息還是很重要的喔。」\n[s6] 「稍微偷懶一下也沒關係的。」"
2300605-70 = "這……"
2300605-71 = "這……"
2300605-72 = "……老師，你說這種話沒問題嗎？"
2300605-73 = "[s] 「正因為是老師才這樣說呀。累了的話就休息，睏了的話就睡覺才是對的。」"
2300605-75 = "[s7] 「我也會像這樣，陪在你身邊的。」\n[s8] 「我也會像這樣，握著你的手的。」"
2300605-76 = "……老師……"
2300605-77 = "……老師……"
2300605-78 = "那，我就稍微……"
2300605-80 = "稍微……睡一下……"
2300605-81 = "老師，在那之前……在我睡著之前，陪著我……"
2300605-82 = "…………"
2300605-84 = "（就這麼，靜靜地看著靜子慢慢入睡）"

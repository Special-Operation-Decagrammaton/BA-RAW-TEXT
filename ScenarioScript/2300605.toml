[translation]
2300605-1 = "ความเป็นมืออาชีพของไอดอลคนดังแห่งร้านเฮียกคิยาโค!"
2300605-2 = "(หลังจากได้รับข้อความคุณครูรู้สึกสังหรณ์ใจแปลกๆ เลยไปหาที่ร้านเฮียกคิยาโค)"
2300605-5 = "[s] \"ชิซุโกะ คือว่า...\""
2300605-6 = "เซ็ตหมั่นโถวที่สั่งได้แล้วค่ะ!"
2300605-8 = "ชิซุโกะจัง! ที่จริงแล้วฉันสั่ง..."
2300605-9 = "หมั่นโถวถูกแล้วมั้ยนะ?"
2300605-10 = "หืม? วันนี้เอามาเสิร์ฟถูกเมนูด้วยแฮะ?"
2300605-11 = "อย่างนั้นเหรอคะ? ถ้างั้นทานให้อร่อยนะคะ"
2300605-12 = "??"
2300605-16 = "[ns] \"คือว่าชิซุโกะ...\""
2300605-21 = "อ๊ะ! ชิซุโกะจัง อันตราย...!"
2300605-24 = "...ไม่นะ?!"
2300605-25 = "ตอนที่ชิซุโกะจังจะล้ม เธอเคลื่อนไหวแบบกายกรรมไปด้วยในตอนที่จะลื่นล้มด้วยล่ะ!"
2300605-26 = "อ๊ะ ขอโทษค่ะ ฉันทำพลาดอีกแล้ว..."
2300605-27 = "เธอดูไม่ร่าเริงเหมือนทุกทีเลย ตอนนี้ดูมีท่าทางแข็งขันสมเป็นมืออาชีพเลย!"
2300605-28 = "เมนูที่สั่งคืออันมิสึใช่มั้ยคะ? รอสักครู่นะคะ"
2300605-29 = "ได้แล้วค่า"
2300605-30 = "แถมยังเสิร์ฟขนมถูกเมนูแบบเนี๊ยบๆ อีกด้วย!"
2300605-32 = "อะไรกัน... วันนี้ชิซุโกะจัง..."
2300605-33 = "เธอรับออเดอร์ได้อย่างรวดเร็วและถูกต้อง..."
2300605-34 = "อ่า... คือว่ามีปัญหาอะไรหรือเปล่าคะ?"
2300605-35 = "ชิซุโกะจังที่เย็นชาและจริงจังแบบนี้กะ...ก็เท่ดีนะ...!"
2300605-36 = "[s] \"เกิดอะไรขึ้นกับเธอแน่ๆ เลย...\""
2300605-38 = "(เมื่อถึงเวลาปิดร้านเฮียกคิยาโค)"
2300605-39 = "สำหรับวันนี้ก็ได้เวลาปิดร้านแล้วนะคะ"
2300605-40 = "ขอบคุณที่วันนี้แวะมาที่ร้านเฮียกคิยาโคนะคะ"
2300605-41 = "...อ๊ะ?"
2300605-42 = "...คุณครู?"
2300605-43 = "มาตั้งแต่เมื่อไหร่เหรอคะ?"
2300605-44 = "[s1] \"เธอไม่เห็นมารับออเดอร์ที่โต๊ะครูเลย\"\n[s2] \"คงไม่เห็นครูสินะ\""
2300605-45 = "ขอโทษด้วยค่ะ ฉัน..."
2300605-46 = "ขอโทษด้วยค่ะ ฉัน..."
2300605-47 = "คือ..."
2300605-51 = "[s] \"ชิซุโกะเป็นอะไรรึเปล่า?\"!\""
2300605-52 = "(หายใจแรง)"
2300605-56 = "อืม... ที่นี่ที่ไหนน่ะ?"
2300605-57 = "[s] \"ไม่เป็นไรใช่มั้ย? จู่ๆ เธอเป็นลมไป ครูเลยพามาส่งที่ห้องน่ะ\""
2300605-58 = "คะ... คุณครู?"
2300605-59 = "เกิดอะไรขึ้นเหรอคะ?"
2300605-60 = "[s3] \"ดูเหมือนเธอจะเป็นลมเพราะฝืนตัวเองเกินไป\"\n[s4] \"ก่อนหน้านี้ยุ่งเรื่องช่วยเตรียมงานเทศกาลในย่านการค้าใช่มั้ยล่ะ?\""
2300605-61 = "เรื่องนั้นมัน..."
2300605-62 = "เรื่องนั้นมัน..."
2300605-63 = "คือว่าช่วงนี้ที่ร้านเฮียกคิยาโคมีลูกค้าเยอะมาก"
2300605-64 = "ในฐานะประธานชมรมจัดงานเทศกาล ฉันก็เลยมีงานหลายๆ อย่างที่ต้องจัดการด้วย..."
2300605-65 = "[s] \"แต่ก็ไม่ควรหักโหมเกินไปนะ\""
2300605-66 = "แต่ว่า..."
2300605-67 = "มันเป็นงานที่ฉันต้องทำนี่คะ..."
2300605-68 = "จะให้ฉันอยู่เฉยๆ ไม่ทำงานไม่ได้หรอกค่ะ"
2300605-69 = "[s5] \"การพักผ่อนเป็นเรื่องจำเป็นนะ\"\n[s6] \"นานๆ ครั้งโดดงานบ้างก็ได้\""
2300605-70 = "การพักผ่อนเป็นสิ่งจำเป็น..."
2300605-71 = "การพักผ่อนเป็นสิ่งจำเป็น..."
2300605-72 = "คุณครูพูดแบบนี้ไม่เป็นไรเหรอคะ?"
2300605-73 = "[s] \"อืม ถ้าเหนื่อยก็พัก จะนอนฟุบที่โต๊ะก็ได้\""
2300605-75 = "[s7] \"เดี๋ยวครูจะคอยอยู่ข้างๆ เอง\"\n[s8] \"ครูจะคอยจับมือเธอไว้เอง\""
2300605-76 = "ค่ะ..."
2300605-77 = "ค่ะ..."
2300605-78 = "แค่วันนี้..."
2300605-80 = "คุณครูคะ ฉันขอนอนสักนิดนะคะ..."
2300605-81 = "ช่วยอยู่ข้างๆ ฉัน...จนกว่า..."
2300605-82 = "ฉันจะหลับไป..."
2300605-84 = "(คุณครูนั่งอยู่ข้างๆ ชิซุโกะที่หลับอยู่สักครู่หนึ่ง)"

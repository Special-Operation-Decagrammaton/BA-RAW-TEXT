[translation]
2300605-1 = "The Pro of Momoyodou!"
2300605-2 = "(I made my way to Momoyodou out of concern after reading Shizuko's text.)"
2300605-5 = "[s] \"Oh, Shizuko. I...\""
2300605-6 = "Here's the manju set you ordered!"
2300605-8 = "Shizuko! I actually ordered the..."
2300605-9 = "Wait. I did order the manju."
2300605-10 = "Huh? You actually got my order right today?"
2300605-11 = "That's what you wanted right? I hope you enjoy."
2300605-12 = "...?"
2300605-16 = "[ns] \"Hey, Shizuko...?\""
2300605-21 = "*gasp* Look out, Shizuko!"
2300605-24 = "What was that?!"
2300605-25 = "Right when Shizuko was about to trip, she slid and did some sort of acrobatic move!"
2300605-26 = "Oh, I'm sorry. I didn't mean to do that."
2300605-27 = "She's not her usual cheerful self. She's so brisk and professional!"
2300605-28 = "You ordered the anmitsu, right? Just a minute."
2300605-29 = "Here you are."
2300605-30 = "And she's calmly bringing out the correct orders!"
2300605-32 = "Something's...different about Shizuko today."
2300605-33 = "She's working so fast and getting everything right..."
2300605-34 = "Oh, is there a problem?"
2300605-35 = "This version of Shizuko is so cool!"
2300605-36 = "[s] \"Something must have happened to her.\""
2300605-38 = "(It's almost Momoyodou's closing time.)"
2300605-39 = "We'll be closing shortly."
2300605-40 = "Thank you for visiting Momoyodou today."
2300605-41 = "Huh?"
2300605-42 = "Sensei?"
2300605-43 = "When did you get here?"
2300605-44 = "[s1] \"You never came to my table to take my order.\"\n[s2] \"I guess you didn't see me.\""
2300605-45 = "I-I'm sorry... I..."
2300605-46 = "I-I'm sorry... I..."
2300605-47 = "Oh."
2300605-51 = "[s] \"Shizuko, are you okay?!\""
2300605-52 = "*pant* *pant*"
2300605-56 = "Huh...? Where am I?"
2300605-57 = "[s] \"Are you okay? You fainted, so I brought you to your room.\""
2300605-58 = "S-Sensei?"
2300605-59 = "What happened?"
2300605-60 = "[s3] \"You must have overworked yourself.\"\n[s4] \"Have you been busy with another street festival?\""
2300605-61 = "Well..."
2300605-62 = "Well..."
2300605-63 = "Momoyodou has had a lot more customers lately."
2300605-64 = "And I've had so much work to do as the president of the Festival Operations Department..."
2300605-65 = "[s] \"You know better than to overextend yourself.\""
2300605-66 = "But..."
2300605-67 = "...I'm supposed to be the reliable one."
2300605-68 = "I can't just sit back and take it easy."
2300605-69 = "[s5] \"Everyone needs a rest sometimes.\"\n[s6] \"It's okay to skip work every once in a while.\""
2300605-70 = "You want me to take a break...?"
2300605-71 = "You want me to take a break...?"
2300605-72 = "Isn't your job to motivate me to always do my best?"
2300605-73 = "[s] \"Yes, and in this case, that means lying your head down to take a nap."
2300605-75 = "[s7] \"I'll be right here by your side.\"\n[s8] \"I'll hold your hand.\""
2300605-76 = "Okay..."
2300605-77 = "Okay..."
2300605-78 = "Then just for today..."
2300605-80 = "I'm just gonna take a quick nap, Sensei."
2300605-81 = "Can you stay here...until I fall asleep?"
2300605-82 = "Zzz..."
2300605-84 = "(I stayed quietly by Shizuko's side as she slept for a long while.)"

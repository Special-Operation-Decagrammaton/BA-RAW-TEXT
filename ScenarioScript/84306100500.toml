[translation]
84306100500-5 = "辛苦了。情況比我預期的更加順利。"
84306100500-6 = "果然在任務和潛入方面，美甘寧瑠的直覺比我的計算還精準。#n或許是參考資料有所不同吧。"
84306100500-7 = "這都要歸功於你準備的裝備。#n不過能順利進行真是太好了，謝謝你。"
84306100500-8 = "話說回來……我可以問問那是什麼嗎？"
84306100500-9 = "外觀看起來……明明只是把普通的玩具槍而已。"
84306100500-10 = "……嗯？#n啊，你說這個啊。"
84306100500-11 = "這是「暫時讓身高變高的光線槍」。#n由於槍身帶有龐大的能量，因此能讓人在數分鐘內維持較高的身形。"
84306100500-12 = "……真厲害。"
84306100500-16 = "……咦？不過這東西有必要回收嗎？#n千年博覽會應該就是展示這種新技術的場合才對。"
84306100500-17 = "是這樣沒錯，不過那僅限於「容許範圍內的展示」。"
84306100500-18 = "容許範圍內的……展示？"
84306100500-19 = "如果那東西只能讓物體變長數十公分的話，我也不會做出需要回收的判斷。#n因為就像你說的一樣，新技術總是必須經過測試。"
84306100500-20 = "然而那個裝置在運作時，可能會產生讓人成長數十公尺，而非數十公分的副作用。"
84306100500-21 = "這樣啊。#n單位不是公分而是公尺……"
84306100500-22 = "……什麼？"
84306100500-23 = "那，那種東西怎麼會出現在展示場上……！？"
84306100500-24 = "想必是為了吸引投資人吧。#n畢竟研究本來就需要大量的金錢。"
84306100500-25 = "根據創作者的說法，「一旦這東西完成，就連一顆草莓也能餵飽好幾十個人」……"
84306100500-26 = "不過我不能放任他們在博覽會上，展示這種相當不穩定的東西。#n雖然遺憾，但必須回收。"
84306100500-27 = "……原來如此。我明白了。"
84306100500-28 = "（剛才拿回來的路上我還把玩了一下……要是不小心射到自己就要出大事了啊）"
84306100500-29 = "如果有事要麻煩你的話，我會再聯絡。"
84306100500-30 = "辛苦了，百合園聖亞。今天可以回去休息了。"

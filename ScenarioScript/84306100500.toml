84306100500-5 = "3;리오;00;수고했어, 예상했던 것보다 훨씬 스무스하게 진행했네.\n#3;a"
84306100500-6 = "3;리오;03;역시 임무와 잠입 면에서는, 미카모 네루의 감각이 나의 계산보다 정확한 모양이야. 아마도 보유한 레퍼런스 데이터의 차이겠지."
84306100500-7 = "5;세이아;03;챙겨 주신 장비 덕분이죠. 그래도 잘 돼서 다행이네요, 감사합니다.\n#5;al\n#3;m1"
84306100500-8 = "5;세이아;02;그나저나…… 괜찮다면 그게 뭐였는지 여쭤봐도 괜찮을까요?\n#5;em;[?]"
84306100500-9 = "5;세이아;01;겉보기에는 그냥 평범한 장난감 총……처럼 보이는데 말이에요."
84306100500-10 = "3;리오;02;……응? 아, 이거 말이야?\n#3;em;[반응]"
84306100500-11 = "3;리오;01;그건 \"일시적으로 키를 키워주는 광선총\"이야. 총 안에 막대한 에너지를 담고 있어서, 수 분간 통상 상태보다 큰 키를 유지하게 해주지."
84306100500-12 = "5;세이아;99;……그건 굉장하군요."
84306100500-13 = "#st;[0,0];instant;1;"
84306100500-14 = "#clearST"
84306100500-15 = "3;리오;01\n5;세이아;00\n#5;em;[?]\n#3;h\n#5;h\n#wait;1000"
84306100500-16 = "5;세이아;02;……?? 어라, 굳이 회수해야 할 필요가 있었을까요? 밀레니엄 엑스포는 이런 신기술을 선보이는 곳 아닌가요?"
84306100500-17 = "3;리오;99;물론 그렇지. \"허용할 수 있는 범위 내의 시연\"이었다면의 이야기지만."
84306100500-18 = "5;세이아;04;허용……? 범위?\n#5;em;…\n#5;stiff"
84306100500-19 = "3;리오;00;수십 센티미터 정도를 키우는 물건이었다면 나도 회수할 판단은 하지 않았을 거야. 네 말대로, 다양한 신기술의 테스트는 필요하니까."
84306100500-20 = "3;리오;01;하지만 그 기기는 사용 시 확률적 부작용으로 수십 센티미터가 아닌 수십 미터의 변화도 일어날 수 있어."
84306100500-21 = "5;세이아;99;그렇군요. 수십 센티미터가 아니라 수십 미터가……."
84306100500-22 = "5;세이아;04;……네?\n#5;em;[?]"
84306100500-23 = "5;세이아;04;어, 어째서 그런 물건을 시연장에……!?\n#5;stiff"
84306100500-24 = "3;리오;99;투자자를 찾는 거지. 연구란 건 원래 막대한 돈이 필요한 법이니까.\n#3;em;[한숨]"
84306100500-25 = "3;리오;00;본인들 말로는 \"완성만 되면 딸기 하나로 수십 명도 배불리 먹을 수 있다\"라고 말하고 있지만……."
84306100500-26 = "3;리오;01;아무래도 그렇게 불안정한 물건을 지금의 엑스포에서 시연하게 놔둘 순 없어. 안타깝지만, 이번에는 회수야."
84306100500-27 = "5;세이아;06;……그렇……군요. 이해했어요.\n#5;em;[속상함]"
84306100500-28 = "5;세이아;00;(가지고 오는 길에 이리저리 만져봤었는데, 실수로 저에게 쐈다면 큰일 날 뻔했겠어요.)"
84306100500-29 = "3;리오;00;또 부탁할 일이 발생하면 연락할게.\n#3;em;[반응]\n#3;m3\n#5;dr"
84306100500-30 = "3;리오;03;수고했어, 유리조노 세이아. 오늘은 그만 돌아가도 돼."
84306100500-31 = "#wait;100"

[translation]
84306100500-5 = "ทำได้ดีมาก งานออกมาราบรื่นกว่าที่ฉันคิดไว้เยอะเลย"
84306100500-6 = "สำหรับเรื่องภารกิจและการแทรกซึมแล้ว ดูเหมือนสัญชาตญาณของมิคาโมะ เนรุจะแม่นยำกว่า#nการคำนวณของฉันอีก คงเป็นเพราะความแตกต่างของข้อมูลที่นำมาใช้อ้างอิงน่ะ"
84306100500-7 = "ต้องขอบคุณอุปกรณ์ที่เตรียมไว้ให้มากกว่าค่ะ โล่งอกไปทีนะคะที่ทุกอย่างราบรื่น ขอบคุณค่ะ"
84306100500-8 = "จะว่าไป... ถ้าไม่ว่าอะไรละก็ ฉันขอถามได้มั้ยคะว่านั่นคืออะไร?"
84306100500-9 = "พอดีว่า... ดูจากภายนอกแล้วก็เหมือนปืนของเล่นธรรมดาๆ น่ะค่ะ"
84306100500-10 = "หืม...? อ้อ หมายถึงอันนี้เหรอ?"
84306100500-11 = "นี่คือ \"ปืนรังสีที่ช่วยเพิ่มความสูงของวัตถุชั่วคราว\" ปืนนี้มีพลังงานมหาศาล เลยรักษาความสูง#nของวัตถุให้ใหญ่กว่าปกติได้ในระยะเวลาหนึ่งน่ะ"
84306100500-12 = "ยอดเยี่ยมไปเลยนะคะ..."
84306100500-16 = "ว่าแต่ จำเป็นจะต้องเอาคืนมาด้วยเหรอคะ? มิลเลเนียม เอ็กซ์โปเป็นงานที่จัดแสดงเทคโนโลยีใหม่ๆ แบบนี้ไม่ใช่เหรอคะ?"
84306100500-17 = "มันก็ใช่อยู่หรอกนะ แต่มันก็ต้องเป็น \"การจัดแสดงภายใต้ขอบเขตที่อนุญาต\" น่ะ"
84306100500-18 = "ขอบเขต...? ที่อนุญาต?"
84306100500-19 = "ถ้ามันเพิ่มความสูงของวัตถุได้แค่ไม่กี่สิบเซนติเมตร ฉันก็คงไม่ตัดสินใจเอามันคืนมาหรอก เพราะเราต้องจัดแสดงเทคโนโลยีใหม่ๆ ตามที่เธอว่า"
84306100500-20 = "แต่ว่าผลข้างเคียงที่เป็นไปได้จากการใช้อุปกรณ์นั้นอาจทำให้วัตถุสูงเพิ่มถึงหลายสิบเมตรเลย"
84306100500-21 = "แบบนั้นสินะคะ ไม่ใช่แค่หลายสิบเซน แต่เป็นหลายสิบเมตรเลย..."
84306100500-22 = "คะ...?"
84306100500-23 = "ละ... แล้วทำไมของแบบนั้นถึงไปอยู่ในงานได้...!?"
84306100500-24 = "ก็เพื่อหาผู้ลงทุนน่ะ ปกติแล้วการวิจัยต้องใช้เงินทุนจำนวนมหาศาล"
84306100500-25 = "ตามที่เจ้าตัวพูด เห็นว่า \"ถ้าทำให้สำเร็จได้ สตรอว์เบอร์รีแค่ลูกเดียวก็อาจทำให้คนอิ่มท้องได้หลาย#nสิบคนเลย\"..."
84306100500-26 = "แต่ถึงอย่างนั้น ฉันก็คงปล่อยให้เอาของที่ยังไม่เสถียรไปจัดแสดงในงานไม่ได้หรอก ถึงจะน่าเสียดาย แต่ฉันก็ต้องริบมาก่อน"
84306100500-27 = "อย่างนี้... นี่เอง ฉันเข้าใจแล้วค่ะ"
84306100500-28 = "(ระหว่างกลับมาที่นี่ ฉันก็จับต้องปืนนั้นอยู่เหมือนกัน ถ้ายิงเข้าตัวเองก็คงเกิดเรื่องใหญ่แล้วน่ะนะ)"
84306100500-29 = "ถ้ามีเรื่องอะไรอยากให้ช่วยอีก ฉันจะติดต่อไปนะ"
84306100500-30 = "ทำได้ดีแล้วละ ยูริโซโนะ เซอา วันนี้กลับไปพักผ่อนก่อนเถอะ"

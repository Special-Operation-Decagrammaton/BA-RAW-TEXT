[translation]
1001205-1 = "Quality Time with Trainer"
1001205-2 = "Millennium Gym"
1001205-3 = "Trainer! You're here."
1001205-4 = "I've been waiting for you."
1001205-5 = "How are you feeling today?"
1001205-6 = "[s] \"Huh? Fine, I think.\""
1001205-10 = "Yeah, you look good to me."
1001205-11 = "I think you're in tip-top shape for my big plan."
1001205-12 = "Huh? What am I talking about?"
1001205-15 = "Heehee. I'm talking about THIS!"
1001205-16 = "(Sumire hands me a phone with a workout plan on it.)"
1001205-17 = "[s] \"Did you make another workout plan?\""
1001205-18 = "I figured my workout might be a little too demanding."
1001205-19 = "Huh? What about my old workout plan?"
1001205-20 = "Well...I'll have to stick with it, won't I?"
1001205-21 = "[s] \"You mean you're taking on two workout plans a day?\""
1001205-22 = "Um..."
1001205-23 = "I don't think we're on the same page, Trainer."
1001205-24 = "The plan I just showed you wasn't made for me. Take a closer look."
1001205-25 = "[s] Check the plan again at Sumire's behest."
1001205-28 = "(\"Trainer's Workout Plan.\" Seems normal to me—wait a second!)"
1001205-29 = "[s] \"By 'Trainer,' does this mean...?\""
1001205-30 = "Yup! This is a plan for my trainer, [USERNAME]!"
1001205-31 = "Heehee. What do you think? Do you like it?"
1001205-32 = "I crafted a plan just for you with all my experience in fitness training!"
1001205-33 = "First, I put down 10 minutes of light stretches as a warm up."
1001205-34 = "After that is about 20 minutes on the treadmill..."
1001205-35 = "[s1] \"W-Wait a second!\"\n[s2] \"Objection!\""
1001205-36 = "What? What's wrong?"
1001205-37 = "What? What's wrong?"
1001205-38 = "Oh, I get it. This workout would be way too easy for a personal trainer."
1001205-39 = "I only assigned some light weightlifting exercises after the warm-up."
1001205-40 = "Maybe I should make an alternative version just in case."
1001205-44 = "Okay, Trainer! What do you think of this one?"
1001205-45 = "[s] \"Y-You know what? I think the first one was perfect!\""
1001205-46 = "Hmm? Are you sure?"
1001205-47 = "You don't look totally convinced."
1001205-48 = "[s] \"Nope! I love the way you had it! You're a genius, Sumire!\""
1001205-49 = "Ahaha! Oh, stop it, Trainer."
1001205-50 = "In that case, today's a day to remember."
1001205-51 = "I get to be my trainer's trainer."
1001205-52 = "Hmm? What about my training?"
1001205-53 = "You're always so considerate."
1001205-54 = "I finished it early to make time for you, of course."
1001205-55 = "Huh? What's with that look on your face...?"
1001205-56 = "Oh, I get it! You can't wait to get started, can you?"
1001205-57 = "Great! Then let's begin!"
1001205-58 = "Come on, hurry!"
1001205-60 = "(After completing Sumire's mandatory stretches, I eventually had to get on the treadmill.)"
1001205-62 = "*pant* *pant*"
1001205-63 = "I thought I could handle some light jogging with you."
1001205-64 = "Maybe I'm getting tired so quickly because I already worked out before."
1001205-65 = "You look tired too. Should we rest for a bit?"
1001205-66 = "[s] \"*gasp* *gasp* All right.\""
1001205-69 = "― What did you think, Trainer? Do you enjoy your workout plan?[wa:2900] "
1001205-71 = "― Can't you feel the burn?[wa:1260] "
1001205-74 = "― O-Oh... Trainer, you're staring at me.[wa:3060] "
1001205-76 = "― (I know I look gross after working out...)"
1001205-79 = "― Wh-What...are you looking at?[wa:560] "
1001205-82 = "― Trainer, I have a favor to ask you.[wa:1660] "
1001205-84 = "― I want you to promise to keep training with me.[wa:1380] "
1001205-87 = "― I want you to stay healthy.[wa:1800] "
1001205-89 = "― Wh-Why? Th-That's because... Heehee.[wa:5780] "
1001205-92 = "― Isn't it obvious?"
1001205-95 = "(We finished the rest of the workout plan Sumire made.)"
1001205-97 = "Millennium School"
1001205-98 = "Did you enjoy training with me today, Trainer?"
1001205-99 = "[s3] \"Hehhh, hehhhhhh... Y-Yeah.\"\n[s4] \"Hmm. It wasn't quite enough for me.\""
1001205-100 = "Heehee. I'm glad you enjoyed it."
1001205-101 = "I put a lot of thought into this workout."
1001205-102 = "...?!"
1001205-103 = "Th-That's amazing, Trainer."
1001205-104 = "Maybe we should switch to the harder workout plan I made after all..."
1001205-105 = "[s5] \"Oh, hahaha. I just was kidding!\""
1001205-106 = "Heehee. So was I."
1001205-107 = "Anyway, I enjoy when we train together."
1001205-108 = "I know work keeps you busy, so I won't force you..."
1001205-109 = "But I'd love to keep working out with you if you find the time..."
1001205-110 = "...Trainer."

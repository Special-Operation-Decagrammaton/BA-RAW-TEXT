[translation]
1001205-1 = "指導員也一起"
1001205-2 = "千年．健身房"
1001205-3 = "指導員！您來了啊。"
1001205-4 = "恭候多時了。"
1001205-5 = "今天身體的狀況如何呢？"
1001205-6 = "[s]「嗯？我認為還不錯。」"
1001205-10 = "是的，確實似乎不錯呢。"
1001205-11 = "對於「實行」來說，看來是最合適的狀態。"
1001205-12 = "什麼？要實行什麼，嗎？"
1001205-15 = "呵呵。那就是，這個！"
1001205-16 = "（堇遞出的手機中，寫著訓練的菜單）"
1001205-17 = "[s]「又製作了別的訓練菜單嗎？」"
1001205-18 = "因為我平常的菜單似乎有些困難。"
1001205-19 = "什麼？我平常做的訓練，嗎？"
1001205-20 = "……那當然是，一如往常呀？"
1001205-21 = "[s]「意思是一天進行兩個訓練菜單嗎？」"
1001205-22 = "那──個……"
1001205-23 = "不好意思，指導員。您說的意思我不太能理解。"
1001205-24 = "再說了那個菜單不是為了我的東西，請再看一遍。"
1001205-25 = "[s]（依照堇所說的，將菜單再確認一次）"
1001205-28 = "（指導員的訓練菜單，嗎……奇怪的地方……嗯？！等等！？）"
1001205-29 = "[s]「這裡寫著的「指導員」該不會是……？」"
1001205-30 = "是的！是為了[USERNAME]指導員的菜單！"
1001205-31 = "呵呵，您覺得如何呢？還滿意嗎？"
1001205-32 = "這是我使用至今為止培養起的鍛鍊的知識，全心全意製作的菜單！"
1001205-33 = "首先，在開始鍛鍊之前稍微伸展約10分鐘。"
1001205-34 = "那之後是，使用跑步機進行約20分鐘的熱身……"
1001205-35 = "[s1]「等，等一下！！」\n[s2]「我有異議！！」"
1001205-36 = "是的？怎麼了嗎？"
1001205-37 = "是的？怎麼了嗎？"
1001205-38 = "該不會……果然對指導員來說是太輕鬆的菜單了嗎？"
1001205-39 = "熱身後，編入了以輕量的重訓為主體的菜單了說……"
1001205-40 = "不過！我就知道會有這種事所以也做了計劃B的菜單。"
1001205-44 = "請看，指導員！這邊呢……"
1001205-45 = "[s]「呃，不，我認為剛才的就剛剛好！」"
1001205-46 = "咦？真的嗎？"
1001205-47 = "總覺得，似乎露出了有點不滿的表情。"
1001205-48 = "[s]「不是唷！剛才的非常好！果然堇是最棒的！」"
1001205-49 = "啊哈哈，真是奇怪的指導員呢。"
1001205-50 = "好，那樣的話今天就特別的！"
1001205-51 = "我來當指導員的「指導員」吧。"
1001205-52 = "什麼？我的鍛鍊該怎麼辦，嗎？"
1001205-53 = "不愧是指導員，總是在關注著我呢。非常謝謝您。"
1001205-54 = "當然，在指導員前來之前我已經把今天的運動完成了。"
1001205-55 = "嗯？還好嗎，臉色稍微有點差……"
1001205-56 = "啊啊！是想趕快鍛鍊的意思吧？"
1001205-57 = "我知道了！那麼現在立刻開始吧！"
1001205-58 = "來來，趕快，現在立刻！！"
1001205-60 = "（結果依照堇的菜單，伸展之後在跑步機上慢跑了）"
1001205-62 = "哈啊，哈啊……"
1001205-63 = "想說稍微慢跑的話還可以，就和指導員一起跑了……"
1001205-64 = "不知道是不是鍛鍊之後呢，馬上就疲累了……"
1001205-65 = "指導員似乎也累了，要稍微休息一下嗎？"
1001205-66 = "[s]「哈啊，哈啊……就那麼辦吧……」"
1001205-69 = "― 如何呢指導員，運動，很開心吧？[wa:4700] "
1001205-71 = "― 有沒有，變健康的感覺呢？[wa:1740] "
1001205-74 = "― 啊，那個……請，請不要一直盯著看。[wa:3900] "
1001205-76 = "― （畢竟鍛鍊中的樣子很難堪……）"
1001205-79 = "― 請，請問您在看哪裡呢……？[wa:1200] "
1001205-82 = "― ……指導員，我有個請求。[wa:2580] "
1001205-84 = "― 今後，也一起運動吧。[wa:2860] "
1001205-87 = "― 我希望指導員可以一直保持健康。[wa:2280] "
1001205-89 = "― 理，理由嗎？那，那是……呵呵。[wa:6620] "
1001205-92 = "― 請猜猜看。"
1001205-95 = "（這之後讓堇陪著鍛鍊，結束了剩下的菜單）"
1001205-97 = "千年科學學園"
1001205-98 = "指導員，今天和我鍛鍊得還開心嗎？"
1001205-99 = "[s3]「哈啊，哈啊……唔，嗯……」\n[s4]「呼，可能還不夠呢。」"
1001205-100 = "呵呵，開心的話就太好了。"
1001205-101 = "因為是我盡全力煩惱製作的菜單。"
1001205-102 = "！？"
1001205-103 = "好，好厲害，指導員。"
1001205-104 = "果然，必須換成為了萬一而準備，更高強度計劃B的鍛鍊菜單才行……"
1001205-105 = "[s5]「啊，啊哈哈，開玩笑的唷！？開玩笑！」"
1001205-106 = "呵呵。我也是，開玩笑的。"
1001205-107 = "一起鍛鍊之後，感覺比平常還要開心。"
1001205-108 = "我知道指導員每天各方面都很忙碌，所以不會強求。"
1001205-109 = "可以的話，務必今後也一起運動吧。"
1001205-110 = "吶，指導員。"

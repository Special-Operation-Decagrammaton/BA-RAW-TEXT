[translation]
1001205-1 = "ช่วงเวลากับเทรนเนอร์"
1001205-2 = "ห้องออกกำลังกาย มิลเลเนียม"
1001205-3 = "เทรนเนอร์! มาแล้วเหรอคะ"
1001205-4 = "ฉันกำลังรออยู่เลยค่ะ"
1001205-5 = "วันนี้ร่างกายเป็นยังไงบ้างคะ?"
1001205-6 = "[s] \"หืม? ก็โอเคนะ\""
1001205-10 = "ค่ะ วันนี้เทรนเนอร์ดูดีมากเลย"
1001205-11 = "สภาพของเทรนเนอร์ดูพร้อมสำหรับการ <ฝึก> ตามแผนที่ฉันเตรียมไว้มากค่ะ"
1001205-12 = "คะ? ฉันกำลังพูดถึงอะไรอยู่งั้นเหรอคะ?"
1001205-15 = "หึหึ นี่ไงคะ!"
1001205-16 = "(สึมิเระโชว์โทรศัพท์ที่มีเขียนกำหนดการฝึกออกกำลังกายเอาไว้ให้คุณครูดู)"
1001205-17 = "[s] \"ตารางฝึกออกกำลังกายอีกแล้วเหรอ?\""
1001205-18 = "ฉันคิดดูแล้วว่าถ้าใช้ตารางฝึกเหมือนของฉันคงจะโหดเกินไป"
1001205-19 = "คะ? ตารางฝึกเดิมของฉันน่ะเหรอคะ?"
1001205-20 = "อืม... ฉันก็คงจะฝึกตามตารางเดิมค่ะ"
1001205-21 = "[s] \"เธอจะฝึกตามตารางฝึกทั้งสองแบบเลยเหรอ?\""
1001205-22 = "อืม...."
1001205-23 = "ฉันไม่เข้าใจที่เทรนเนอร์พูดเลย...."
1001205-24 = "ตารางฝึกที่ฉันให้ดูเมื่อครู่ไม่ใช่ตารางฝึกของฉันนะคะ ลองอ่านดูอีกรอบนะคะ"
1001205-25 = "[s] ลองอ่านตารางออกกำลังกายดูอีกครั้งตามที่สึมิเระบอก"
1001205-28 = "(ตารางการออกกำลังกายของเทรนเนอร์... ไม่เห็นมีอะไรแปลกเลยนี่นา... เอ๊ะ?! เดี๋ยวก่อนนะ!)"
1001205-29 = "[s] \"เทรนเนอร์ในที่นี้หมายถึง...?\""
1001205-30 = "ใช่แล้วค่ะ! นี่คือตารางการออกกำลังกายสำหรับเทรนเนอร์ [USERNAME] ค่ะ!"
1001205-31 = "หึหึ เป็นยังไงบ้างคะ? ถูกใจมั้ยคะ?"
1001205-32 = "ฉันใช้ความรู้ที่มีทั้งหมดเขียนแผนการออกกำลังกายนี้ขึ้นมาเลยนะคะ!"
1001205-33 = "อย่างแรก ก่อนจะออกกำลังกายจะต้องยืดเส้นประมาณสิบนาทีก่อน"
1001205-34 = "จากนั้นก็จะต้องวอร์มร่างกายโดยการวิ่งบนลู่ประมาณยี่สิบนาที..."
1001205-35 = "[s1] \"ดะ... เดี๋ยวก่อนสิ!!\"\n[s2] \"ขอปฏิเสธ!!\""
1001205-36 = "คะ? ทำไมเหรอคะ?"
1001205-37 = "คะ? ทำไมเหรอคะ?"
1001205-38 = "อืม... กะแล้วว่าตารางพวกนี้มันต้องง่ายเกินไปสำหรับเทรนเนอร์"
1001205-39 = "หลังจากวอร์มร่างกาย ฉันวางตารางไว้แค่ออกกำลังกายเบาๆ..."
1001205-40 = "ถ้างั้นฉันจะเขียนตารางออกกำลังกายให้ใหม่นะคะ"
1001205-44 = "เอาล่ะค่ะ เทรนเนอร์! ดูนี่สิคะ..."
1001205-45 = "[s] \"มะ...ไม่ต้องหรอก อันนี้ดีแล้ว!\""
1001205-46 = "คะ? จริงเหรอคะ?"
1001205-47 = "สีหน้าเหมือนไม่พอใจเลยนะคะ"
1001205-48 = "[s] \"เปล่าหรอก ตารางนี้ดีแล้ว! สึมิเระนี่ยอดจริงๆ เลย!\""
1001205-49 = "ฮ่าฮ่าฮ่า เทรนเนอร์..."
1001205-50 = "เอาละค่ะ ถ้างั้นวันนี้...!"
1001205-51 = "ฉันจะขอเป็นครูฝึกให้กับ <เทรนเนอร์> เองนะคะ"
1001205-52 = "คะ? แล้วตารางการออกกำลังกายของฉันน่ะเหรอคะ?"
1001205-53 = "ปลื้มจังเลยที่เทรนเนอร์เป็นห่วงฉันแบบนี้"
1001205-54 = "ฉันออกกำลังกายเสร็จก่อนที่เทรนเนอร์จะมาแล้วล่ะค่ะ"
1001205-55 = "คะ? ทำไมหน้าซีดแบบนั้นล่ะคะ..."
1001205-56 = "อ่ะฮ่า! คงอยากรีบไปออกกำลังกายใช่มั้ยคะ?"
1001205-57 = "เข้าใจแล้วค่ะ! ถ้างั้นก็มาเริ่มกันเลยค่ะ!"
1001205-58 = "ไปกันเถอะค่ะ!"
1001205-60 = "(หลังจากยืดเส้นตามสึมิเระแล้ว คุณครูก็ไปวิ่งบนลู่วิ่ง)"
1001205-62 = "แฮ่ก....แฮ่ก..."
1001205-63 = "อุตส่าห์คิดว่าน่าจะวิ่งพร้อมกับเทรนเนอร์ไหว..."
1001205-64 = "แต่ฉันคงออกกำลังกายมากไปจนร่างกายล้าแล้วค่ะ"
1001205-65 = "เทรนเนอร์เองก็ดูเหมือนจะเหนื่อยแล้ว ถ้างั้นเราพักกันสักหน่อยดีมั้ยคะ?"
1001205-66 = "[s] \"ดะ...ดะ...ดีเลย\""
1001205-69 = "― เป็นยังไงคะ เทรนเนอร์ ออกกำลังกายสนุกรึเปล่าคะ?[wa:3420] "
1001205-71 = "― ตอนนี้รู้สึกว่าร่างกาย แข็งแรงขึ้นบ้างรึเปล่าคะ?[wa:300] "
1001205-74 = "― อ๊ะ อ่า... อย่า... อย่าจ้องฉันแบบนั้นสิคะ[wa:2940] "
1001205-76 = "― (เพราะเวลาที่ออกกำลังกาย สภาพคงดูไม่ดีเท่าไหร่...)"
1001205-79 = "― เทรนเนอร์คะ... มองอะไรคะ?[wa:720] "
1001205-82 = "― เทรนเนอร์คะ ฉันมีเรื่องจะขอรบกวนค่ะ[wa:1660] "
1001205-84 = "― ต่อไป... มาออกกำลังกายกับฉันอีกนะคะ[wa:1860] "
1001205-87 = "― ฉันอยากให้เทรนเนอร์... มีสุขภาพที่แข็งแรงค่ะ[wa:1120] "
1001205-89 = "― หะ... เหตุผลเหรอคะ? คือ... เรื่องนั้น... ฮุฮุ[wa:5420] "
1001205-92 = "― ลองเดาดูสิคะ"
1001205-95 = "(หลังจากนั้นคุณครูก็ออกกำลังกายตามตารางฝึกของสึมิเระจนครบ)"
1001205-97 = "โรงเรียนมิลเลเนียม"
1001205-98 = "เทรนเนอร์คะ วันนี้ที่ได้มาออกกำลังกายสนุกรึเปล่าคะ?"
1001205-99 = "[s3] \"แฮ่ก.... อะ...อื้อออ\"\n[s4] \"อืม... ยังไม่หนำใจเลย\""
1001205-100 = "หึหึ ถ้าสนุกแบบนี้ค่อยยังชั่วหน่อยค่ะ"
1001205-101 = "ฉันพยายามคิดเรื่องตารางออกกำลังกายมากเลยนะคะ"
1001205-102 = "!?"
1001205-103 = "สะ...สุดยอดเลยค่ะ เทรนเนอร์"
1001205-104 = "บางทีเราอาจจะปรับระดับความยากของการออกกำลังกาย..."
1001205-105 = "[s5] \"อ่า ฮ่าๆๆ...ล้อเล่นน่ะ ล้อเล่น!\""
1001205-106 = "หึหึ ฉันก็ล้อเล่นเหมือนกันค่ะ"
1001205-107 = "ได้ออกกำลังกายด้วยกันแบบนี้สนุกมากเลยค่ะ"
1001205-108 = "ฉันรู้ว่าเทรนเนอร์มีงานยุ่งมาก เพราะงั้นฉันจะไม่บังคับหรอกค่ะ"
1001205-109 = "แต่ถ้าเป็นไปได้ ฉันก็อยากจะออกกำลังกายด้วยกันอีกนะคะ"
1001205-110 = "เทรนเนอร์"

[translation]
1002805-1 = "兔女郎的生態"
1002805-3 = "（雖然是假日，但為了工作來了一趟千年科學學園）"
1002805-4 = "（回去的路上經過咖啡廳，當我正想說，雖然有營業，但大概是因為假日，都沒看到半個學生時……）"
1002805-5 = "啊，是主人！"
1002805-6 = "我正好想去找你的說，沒想到會在這裡見到你！"
1002805-7 = "[s1]「……？」\n[s2]「明日奈？」"
1002805-13 = "主人怎麼會在這裡？來工作的嗎？"
1002805-14 = "嗯？但今天不是假日嗎？為什麼還要工作？"
1002805-15 = "……嗯？"
1002805-16 = "怎麼一臉悲傷？還好嗎？哪裡不舒服？"
1002805-17 = "沒事……？"
1002805-18 = "嗯，那就好！"
1002805-19 = "……嗯？你問我怎麼又穿兔女郎裝？"
1002805-20 = "因為，我還不了解兔女郎啊！不知道的事就會想去探究吧？"
1002805-21 = "是說，穿上兔女郎的衣服也不可能變成兔子……"
1002805-22 = "這樣的話，"
1002805-23 = "兔女郎裝是為了什麼而穿的？"
1002805-24 = "我提出這樣的問題，結果得到的回答是「穿上那個不是開心嗎？」……"
1002805-25 = "但即是這樣說我還是不理解呢。而且如果穿了能使人高興的話，大家都穿就好了。但好像平常也不會穿兔女郎裝呀？"
1002805-26 = "我這樣提問之後，就再也沒有人回答我了。"
1002805-27 = "所以我想親自確認，才會穿著的！"
1002805-28 = "既然沒人教我，我只好自己親自確認啦！"
1002805-32 = "所以我昨天也來這裡……"
1002805-33 = "不知為什麼咖啡廳的老闆突然過來對我說「抱歉，能否請您改日再來……」這樣，所以我今天才會再來的！"
1002805-34 = "但今天好像除了主人以外都沒人耶。啊哈哈！對啦，難怪！因為今天是假日嘛！"
1002805-35 = "[s] 「原來如此……？」"
1002805-39 = "……啊。"
1002805-40 = "……明日奈，說不定發現了。"
1002805-41 = "雖然之前都沒有跟我說……"
1002805-42 = "……但主人是老師吧？也就是說，老師是「教導別人的人」對吧！？"
1002805-43 = "[s3] 「的確是這樣沒錯……？」\n[s4] 「這──個……」"
1002805-44 = "所以，就教教我吧！主……老師！"
1002805-45 = "所以，就教教我吧！主……老師！"
1002805-46 = "兔女郎是什麼？為什麼穿上兔女郎的衣服，就能感到開心呢？"
1002805-47 = "光是看到兔女郎就能讓其他人感到開心嗎？還是說，穿成兔女郎之後，還得做些別的事情才行？"
1002805-48 = "……嗯？"
1002805-49 = "那不重要……？"
1002805-50 = "是嘛？"
1002805-51 = "你說，兔女郎服裝本身不是重點，重點是穿的原因？"
1002805-52 = "……什麼意思？"
1002805-53 = "雖然也是為了自己而穿，但如果是為了讓對方高興而穿的話，對方會更高興？"
1002805-54 = "唔──嗯……感覺好像懂了，又好像沒有懂……好難喔～？"
1002805-55 = "啊，那我平常穿的女僕裝呢？"
1002805-56 = "跟那個不一樣嗎？"
1002805-57 = "……嗯？"
1002805-58 = "根本上意義一樣？咦，是這樣嗎？"
1002805-59 = "兔女郎裝跟女僕裝一樣……"
1002805-60 = "很難耶？"
1002805-61 = "嗯──啊！那，雖然和這無關……"
1002805-62 = "明日奈是為了主人才穿了兔女郎裝的！"
1002805-63 = "……這樣說的話，主人會開心嗎？"
1002805-64 = "啊，當然除了這個以外，只要是為了主人，不管是什麼明日奈都會做哦！"
1002805-65 = "……？"
1002805-66 = "……讓我去泡一杯咖啡來？當然好啊，但怎麼這麼突然？還把臉遮起來？"
1002805-67 = "但主人都這樣說了，我現在馬上去幫你泡一杯！"
1002805-68 = "那喝完之後要告訴我，你開不開心喔？"
1002805-69 = "那明日奈，去泡個咖啡就回來──！"
1002805-74 = "（利用爭取到的時間平復自己的情緒之後，和明日奈在咖啡廳度過了愉快的時光）"

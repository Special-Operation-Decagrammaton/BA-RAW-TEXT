[translation]
1002805-1 = "การใช้ชีวิตของบันนี่เกิร์ล"
1002805-3 = "(ถึงวันนี้เป็นวันหยุดก็จริง แต่คุณครูมีงานที่ต้องจัดการเลยแวะมาที่โรงเรียนมิลเลเนียม)"
1002805-4 = "(ระหว่างทางกลับคุณครูก็ได้เข้าไปนั่งพักในร้านคาเฟ่่รับรอง อาจเพราะว่าเป็นวันหยุดเลยทำให้#nไม่เห็นนักเรียนคนอื่นๆ)"
1002805-5 = "เอ๊ะ? นายท่านนี่นา?"
1002805-6 = "ฉันกะว่าจะไปหานายท่านอยู่พอดีเลยเชียว ดีจังที่เจอที่นี่!"
1002805-7 = "[s1] \"...?\"\n[s2] \"อาสึนะ?\""
1002805-13 = "มาทำอะไรที่นี่เหรอนายท่าน? มาทำงานงั้นเหรอ?"
1002805-14 = "แปลกจังเลย... วันนี้เป็นวันหยุดนะ นายท่านทำงานในวันหยุดด้วยเหรอ?"
1002805-15 = "หืม...?"
1002805-16 = "ไม่อยากให้ฉันพูดแบบนั้นเหรอ? \"รู้สึกเจ็บจี๊ดที่ใจ\" งั้นเหรอ? นายท่านเจ็บตรงไหนเหรอ?"
1002805-17 = "ไม่ได้เจ็บจริงๆ งั้นเหรอ? อะไรน่ะ? เจ็บด้านไหนน่ะ?"
1002805-18 = "ฮ่ะฮ่ะฮ่ะฮ่าา!"
1002805-19 = "หืม? ทำไมฉันถึงใส่ชุดนี้แล้วก็มาที่นี่งั้นเหรอ?"
1002805-20 = "เพราะว่าฉันยังไม่ได้เรียนรู้เกี่ยวกับบันนี่เกิร์ลเลยน่ะสิ! เราก็ต้องอยากหาคำตอบในสิ่งที่สงสัยอยู่แล้วสิ ไม่ใช่รึไง?"
1002805-21 = "เพียงแค่ใส่ชุดบันนี่เกิร์ลก็ไม่ได้หมายความว่าเราจะกลายเป็นกระต่ายได้...!"
1002805-22 = "ถ้าอย่างนั้นชุดบันนี่เกิร์ลคืออะไรล่ะ?"
1002805-23 = "มันเอาไว้ใส่เพื่ออะไรกันแน่...?"
1002805-24 = "พอถามไปแบบนั้นก็มีคนบอกว่า \"ถ้าใส่ชุดบันนี่เกิร์ลจะช่วยเอนเตอร์เทนให้คนอื่นเพลิดเพลินได้\"#nแบบนี้น่ะ"
1002805-25 = "แต่ฉันคิดว่ามันก็แปลกอยู่นิดหน่อย เพราะถ้าพูดแบบนั้นก็แปลว่าชุดบันนี่เกิร์ลเป็นชุดที่ดีใช่มั้ย?#nแล้วถ้าเป็นชุดที่ดีแล้วทำไมคนอื่นๆ ถึงไม่ใส่กันล่ะ?"
1002805-26 = "พอฉันถามไปแบบนั้นก็ไม่มีใครตอบฉันอีกเลย"
1002805-27 = "เพราะงั้นฉันเลยใส่ชุดนี้เพื่อมาหาคำตอบเองไงล่ะ"
1002805-28 = "ไม่มีใครยอมบอกเลย เพราะงั้นฉันต้องหาคำตอบเองให้ได้!"
1002805-32 = "แต่ว่าเมื่อวานที่นี่มีคนเยอะมากๆ..."
1002805-33 = "ไม่รู้ทำไมทุกคนถึงเอาแต่จ้องฉันไม่เลิกเลย จนเจ้าของร้านเดินมาบอกว่า \"ขอโทษนะ ช่วยมาใหม่วันพรุ่งนี้#nทีนะ\" ล่ะ เพราะงั้นวันนี้ฉันเลยมาไง!"
1002805-34 = "แต่วันนี้ไม่มีคนเลย ทุกคนหายไปไหนกันหมดนะ... ฮ่ะฮ่ะฮ่ะฮ่าา!"
1002805-35 = "[s] \"...\""
1002805-39 = "เดี๋ยวนะ"
1002805-40 = "จะไม่มีใครยอมบอกฉันจริงๆ สินะ..."
1002805-41 = "ฮึ่มมม..."
1002805-42 = "แต่นายท่านเป็น \"คุณครู\" ไม่ใช่เหรอ?"
1002805-43 = "[s3] \"ถึงเป็นครูแต่ให้สอนเรื่องนี้มันก็นะ...\"\n[s4] \"กลายเป็นแบบนี้อีกแล้วสินะ\""
1002805-44 = "นายท่าน! นายท่านเป็นคุณครูนี่นา บอกฉันหน่อยสิ!"
1002805-45 = "นายท่าน! นายท่านเป็นคุณครูนี่นา บอกฉันหน่อยสิ!"
1002805-46 = "ชุดบันนี่เกิร์ลมีไว้ทำไมเหรอ? ถ้าใส่ชุดบันนี่เกิร์ลแล้วจะทำให้คนอื่นเพลิดเพลินได้จริงๆ เหรอ?"
1002805-47 = "แค่ใส่ชุดนี้ก็ทำให้คนอื่นเพลิดเพลินได้จริงๆ เหรอ? หรือว่าต้องใส่ชุดนี้แล้วต้องทำอะไรอย่างอื่น#nอีกรึเปล่า?"
1002805-48 = "หืม...?"
1002805-49 = "ไม่ใช่แบบนั้นงั้นเหรอ?"
1002805-50 = "แล้วหมายถึงแบบไหนกันล่ะ?"
1002805-51 = "เหตุผลที่ใส่ชุดบันนี่เกิร์ลมันสำคัญกว่าแค่เรื่องเสื้อผ้าอีกงั้นเหรอ? แล้วมันคือเหตุผลอะไรล่ะ?"
1002805-52 = "ฉันเพิ่งพูดไปเมื่อกี้งั้นเหรอ?"
1002805-53 = "มันเป็นชุดพิเศษที่จะใส่เพื่อสร้างความเพลิดเพลินให้คนอื่นๆ เพราะงั้นคนที่เห็นก็จะรู้สึก#nเพลิดเพลินไปด้วยงั้นเหรอ?"
1002805-54 = "อืม~ เหมือนจะเข้าใจแต่ก็เหมือนไม่เข้าใจแฮะ... ยากจังเลยน้า~"
1002805-55 = "เดี๋ยวนะ แล้วถ้างั้นชุดเมดที่ใส่ทุกวันล่ะ?"
1002805-56 = "ปกติฉันก็ใส่ชุดเมดเพื่อทำให้นายท่านเพลิดเพลินนี่นา? แล้วถ้างั้นมันต่างกันยังไงล่ะ?"
1002805-57 = "หืม...?"
1002805-58 = "เหมือนกันงั้นเหรอ? เอ๋~? ถามจริง?"
1002805-59 = "สรุปแล้วมันก็เหมือนกับชุดเมดงั้นเหรอ?"
1002805-60 = "ฮึ่ม"
1002805-61 = "ตอนนี้นายท่านรู้สึกยังไงบ้าง? รู้สึกเพลิดเพลินรึเปล่า?"
1002805-62 = "งั้นอาสึนะจะใส่ชุดบันนี่เกิร์ลเพื่อนายท่าน! ตั้งแต่ตอนนี้เป็นต้นไปเลย!"
1002805-63 = "อื้อ! ตั้งแต่ตอนนี้เป็นต้นไปเลย!"
1002805-64 = "เป็นยังไงบ้าง? รู้สึกเพลิดเพลินรึเปล่า?"
1002805-65 = "หืม?"
1002805-66 = "ถ้าชงกาแฟให้สักแก้วก็อาจจะตอบได้งั้นเหรอ?"
1002805-67 = "พูดจริงเหรอ? ดีล่ะ! ถ้างั้นฉันจะทำให้เดี๋ยวนี้เลย!"
1002805-68 = "พอดื่มเสร็จแล้วก็บอกด้วยนะ เข้าใจมั้ย?"
1002805-69 = "อาสึนะ คอฟฟี่ ไทม์~!"
1002805-74 = "(หลังจากนั้นคุณครูก็ใช้เวลาที่เหลือกับอาสึนะที่คาเฟ่)"

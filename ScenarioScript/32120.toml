[translation]
32120-1 = "第12話;再び原点へと"
32120-2 = "（その後……）"
32120-4 = "もう嫌っ！！"
32120-5 = "こんなことやってらんない！分かんない！つまんない！めんどくさい！！"
32120-7 = "あ、えっと、その……こうして集まっているのは、そもそも退学せずに済むようにするためですし……。"
32120-8 = "取り合えずその、今はみんなで知恵を寄せ合って、何か良い方法を探さないと……。"
32120-9 = "そうしないと、一週間後には本当に仲良く全員退学、なんてことに……。"
32120-10 = "「知恵を寄せ合う」……なるほど。悪くないのですが、あまりグッと来る感じではありませんね。もう少しこう、何か……。"
32120-11 = "ここは例えば、そうですね……「弱くて敏感な部分を寄せ合う」、という形でいかがでしょう？"
32120-16 = "い、いきなり何言ってんの！？下ネタはダメ！禁止！死刑！！び、敏感な部分って、何をどう寄せ合おうっていうわけ！？"
32120-17 = "ああ、ちょっと分かりにくかったですか？では、実際にやってみせましょうか。もう少しこう、脚を開いていただいて……"
32120-21 = "……え？えっ！？"
32120-24 = "や、やめて！近づかないで！知らないし分かりたくもないしまだ早いからっ！！"
32120-25 = "えいっ♡"
32120-29 = "や、やめっ……！やめてぇっ！たっ、助けて先生……！"
32120-30 = "わっ、私が悪かったです先輩相手にタメ口ですみませんでした！もう許してやめてっ、それはまだ嫌ぁーーー！！！！"
32120-31 = "なるほど、そういう制圧術もあるのか。白兵戦で使えそうだ……勉強になった。"
32120-32 = "ただ、無駄な動作が多い気がするな。私ならあと2テンポ前の段階で、関節をきめてる。"
32120-34 = "……。"
32120-35 = "せ、先生ぇ……。"
32120-36 = "[s] \"……うん、私も頑張るね。\""
32120-37 = "よ、よろしくお願いします……。"
32120-38 = "このままだと、本当に……私たちみんな、退学に……。"
32120-40 = "（その後ナギサに会おうとしてみたのだけれど、彼女は見つからなかった。）"
32120-41 = "（同様に、どうにか連絡を取ろうとしてみたものの、ミカもどこにいるのかすら分からずにいた。）"
32120-43 = "合宿所"
32120-44 = "何だかんだで戻ってくることになっちゃいましたね。"
32120-45 = "もうお別れだと思って出たのに、すぐこうなるなんて。やっぱり人生は分からないものだ。"
32120-46 = "感傷に浸ってる場合じゃないでしょ！？これからどうするの！？"
32120-47 = "っていうか、本当にティーパーティーの偉い方たちが私たちを退学させようとしてるなら、どうしようもないじゃん！知恵を寄せ合ったところで、何したって無駄なんじゃないの！？"
32120-48 = "一応、一週間後にある第3次特別学力試験が最後のチャンスではありますが……。"
32120-49 = "ここまでありとあらゆる手で邪魔をされてしまいますと、確かに厳しいかもしれませんね。"
32120-50 = "あうぅ……。"
32120-51 = "そ、そもそもどうしてこんなことになってるのよ！？何で退学にならなきゃいけないわけ！？"
32120-52 = "「トリニティの裏切り者」とか意味分かんない！どうして私たちが疑われなきゃいけないのさ！？"
32120-53 = "もし本当に退学になったら……正義実現委員会には、もう……。"
32120-54 = "コハルちゃん……。"
32120-55 = "……。"
32120-59 = "[ns] \"……ごめん。私がナギサにああ言ったせいで……。\""
32120-60 = "……いいえ。そのお話を聞いた限り、先生は私たちのために言ってくださったのでしょう？むしろ感謝するべきことです。"
32120-61 = "もし私がその場にいたら、あの猫ちゃんにはもっと酷いことをしていたかもしれません。"
32120-62 = "……。"
32120-63 = "この一週間で、90点以上を取れるようになんて……。"
32120-64 = "そうですね……それに、これ以上ナギサさんが良からぬことをしないように見張らねばなりませんし……。"
32120-68 = "ぐすっ……無理、絶対無理よ……ここまですっごい頑張ったのに、これ以上なんて……。"
32120-69 = "頑張ったもん……でもこれ以上は、私にはもう無理……私、バカなのに……無理だって……うぅっ……。"
32120-70 = "コハル……。"
32120-71 = "コハルちゃん……。"
32120-73 = "と、とりあえず、今日はもう休みませんか？"
32120-74 = "何か、何かしらきっと方法はあると思います……いいえ、あるはずです。頑張って見つけます。それに先生も手伝ってくれますし……。"
32120-75 = "ヒフミちゃんも、きちんと休んだ方が良いですよ……？ここまでずっと無理されてましたし……。"
32120-76 = "で、ですが今頑張らないと……。"
32120-77 = "私も、一緒に考えますから。コハルちゃんの勉強も、ヒフミちゃんのことも手伝います。"
32120-78 = "……とにかく今日は、一旦休むとしましょう。"
32120-79 = "そう、ですね……はい。"
32120-83 = "では、今日は一旦この辺りで。お疲れ様でした。"
32120-86 = "最後の特別学力試験まで、あと6日"
32120-90 = "……。"
32120-95 = "……。"
32120-98 = "次回;それでも"

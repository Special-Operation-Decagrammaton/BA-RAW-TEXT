[translation]
32120-1 = "第12話;再次回到原點"
32120-2 = "（在那之後……）"
32120-4 = "我受夠了！！"
32120-5 = "這種事我受夠了！搞不懂！好無聊！好麻煩！！"
32120-7 = "啊，啊嗚……之所以像這樣聚在一起，也是為了避免被退學……"
32120-8 = "現在應該要集合大家的智慧，找找看有沒有什麼好辦法才對……"
32120-9 = "不然的話，一週後我們真的就會相親相愛地全員退學的……"
32120-10 = "集合大家的智慧……這種說法好像有點搔不到癢處呢？#n該說是有點曖昧，還是略顯保守……"
32120-11 = "我想想……改成「把柔弱敏感的地方緊密相連」如何？"
32120-16 = "突，突然在說什麼啊！？下流哏是不行的！禁止！死刑！！#n說，說什麼敏感的部分，是要把什麼東西怎麼樣緊密相連啊！？"
32120-17 = "哎呀？果然不實際體驗一下是沒辦法想像的嗎……小春醬？"
32120-21 = "……咦？咦！？"
32120-24 = "不，不要！別靠近我！我不知道也不想知道還太早了啦！！ "
32120-25 = "嘿咿♡"
32120-29 = "不，不要……！不要啊！救，救救我老師……！"
32120-30 = "是，是我錯了面對前輩還亂講話非常對不起！#n拜託停下來──！！！！"
32120-31 = "原來如此，還有這種壓制方式。近身戰的時候似乎能派上用場……受教了。"
32120-32 = "不過多餘的動作有點多。#n換作是我會在那一步折斷關節。"
32120-34 = "……"
32120-35 = "老，老師……"
32120-36 = "[s]「……嗯，我會加油的，日步美。」"
32120-37 = "非，非常感謝……"
32120-38 = "不然再這樣下去……我們真的會一起被退學的……啊嗚嗚……"
32120-40 = "（之後雖然嘗試去見渚，卻不知道他現在在哪裡）"
32120-41 = "（就連彌香也跟渚一樣不知去向……）"
32120-43 = "合宿宿舍"
32120-44 = "結果又回到這裡來了呢。"
32120-45 = "就是啊，本來還以為要分離了，沒想到才沒多久又變成這樣。#n人生果然難以預測。"
32120-46 = "現在不是感傷的時候吧！接下來怎麼辦！？"
32120-47 = "話說要是那些茶會裡的大人物真的要我們退學，我們也無能為力吧！#n現在想東想西也沒用了不是嗎！"
32120-48 = "我們最後的機會……只剩下一週後的第3次特別學力測驗……"
32120-49 = "從他們用各種手段妨礙我們這點來看……我們能做的確實不多呢。"
32120-50 = "啊嗚……"
32120-51 = "什麼跟什麼嘛！？為什麼非得要讓補課部退學不可呢！？"
32120-52 = "「三一的叛徒」什麼的完全搞不懂！為什麼一定要懷疑我們啊！？"
32120-53 = "如果真的被退學的話……我就不能回到實現正義部了……"
32120-54 = "小春醬……"
32120-55 = "……"
32120-59 = "[ns] 「是我不好。都怪我跟渚說了那種話……」"
32120-60 = "……別這麼說。#n老師是為我們著想才會那麼說的吧？反而是我們應該感謝老師才對。"
32120-61 = "如果我在現場的話，說不定會對那隻小貓做出更過分的事吧。"
32120-62 = "……"
32120-63 = "要在剩下這一週內……考到90分以上……"
32120-64 = "是啊……而且為了不讓渚同學繼續做些奇怪的事，也得好好盯著他才行……"
32120-68 = "嗚嗚……不行，絕對辦不到的……#n我已經很努力了，要是再提高標準……"
32120-69 = "明明已經努力過了……可是真的沒辦法再考更高分……#n因為我是笨蛋……真的做不到……嗚嗚……"
32120-70 = "小春……"
32120-71 = "小春醬……"
32120-73 = "……總之今天就先休息吧。"
32120-74 = "我想應該還有辦法……不，一定還有辦法才對。#n我會跟老師一起努力……"
32120-75 = "日步美醬也該好好休息一下比較好唷……？你一直都在勉強自己吧……"
32120-76 = "啊，啊嗚……可是現在不再努力一點的話……"
32120-77 = "我也會一起想辦法的。不管是小春醬的成績還是日步美醬我都會幫忙的。"
32120-78 = "……所以說今天就先好好休息吧。"
32120-79 = "啊嗚……我知道了，今天就先休息吧。"
32120-83 = "那麼今天就先這樣吧。大家辛苦了。"
32120-86 = "離最後的特別學力測驗，還有6天"
32120-90 = "……"
32120-95 = "……"
32120-98 = "下一話;即使如此"

[translation]
32120-1 = "ตอนที่ 12;กลับไปยังจุดเริ่มต้น"
32120-2 = "(กลับมาที่ปัจจุบัน...)"
32120-4 = "มันน่าเศร้านัก!!"
32120-5 = "ทั้งเศร้า หม่นหมอง เจ็บปวด!"
32120-7 = "อะ... อ่า... คือว่า...  คือ... ฉันจะบอกว่า... ที่เรามารวมกันอยู่ที่นี่...#nก็เพื่อป้องกันไม่ให้ถูกไล่ออกจากโรงเรียน... "
32120-8 = "เพราะฉะนั้นถ้าเราไม่ระดมสมองแล้วช่วยกันคิดหาทางออกล่ะก็..."
32120-9 = "มีหวังทุกคนได้ถูกไล่ออกภายในหนึ่งสัปดาห์แน่ค่ะ..."
32120-10 = "ระดมสมอง... เหมือนที่บอกว่าเอาหัวมาชนกันงั้นเหรอคะ? คำนี้มัน... มันก็ไม่ได้แย่นะคะ#nแต่มันก็ฟังดูกำกวม... สำหรับพวกเรา... "
32120-11 = "พูดว่าเอาท้องมาชนกัน น่าจะเหมาะมากกว่า... นะ..."
32120-16 = "หยุดเลย! อย่ามาพูดสองแง่สองง่ามนะ! ห้ามเด็ดขาด! จะเอาท้องมาชนกันทำไมล่ะ?#nต้องทำยังไงถึงจะอยู่ในท่าที่ชนกันได้เหรอ?"
32120-17 = "ตายจริง? ถ้ายังไม่เคยลองทำ ก็น่าจะจินตนาการลำบากนะคะ โคฮารุจัง....?"
32120-21 = "เอ๋...? เอ่อ... "
32120-24 = "ยะ... อย่านะ! อย่าเข้ามานะ! มะ.. ไม่อยากรู้แล้ว! "
32120-25 = "อ๊าา♡"
32120-29 = "อึ้ยยย! หยุดเลย! ช่วยด้วยค่ะคุณครู รุ่นพี่คะ! ฉันผิดไปแล้วค่ะ...! ฉันผิดเอง...!"
32120-30 = "ขอโทษที่พูดแบบไม่มีหางเสียงค่ะ! ฮืออออ ยกโทษให้ฉันเถอะค่ะ...!"
32120-31 = "ฮึ่ม นี่มันเทคนิคการกดขี่ศัตรูในสนามรบสินะ ได้เรียนรู้อะไรใหม่ๆ แล้ว "
32120-32 = "แต่ถ้าเป็นฉันคงข้อต่อหักไปแล้วล่ะ ทำไมต้องใช้มือเยอะขนาดนั้นด้วย"
32120-34 = "......."
32120-35 = "คุณครูคะ... ได้โปรด..."
32120-36 = "[s] \"อื้ม ครูจะพยายามนะฮิฟุมิ\""
32120-37 = "ขอบคุณค่ะ"
32120-38 = "ถ้าขืนปล่อยให้เป็นแบบนี้... พวกเราโดนไล่ออกกันหมดแน่ค่ะ"
32120-40 = "(หลังจากนั้นคุณครูก็พยายามจะไปพบนางิสะ แต่ก็ไม่รู้เลยว่านางิสะไปอยู่ที่ไหน)"
32120-41 = "(ส่วนมิกะก็หายไปอย่างไร้ร่องรอยเหมือนกัน...)"
32120-43 = "อาคารย่อย แคมป์ฝึกฝนชมรมชั้นเรียนเสริม"
32120-44 = "เรามาที่นี่กันอีกแล้วนะคะ"
32120-45 = "แบบนี้เอง นึกว่าจะต้องแยกจากกันแล้วซะอีก แต่ก็กลายมาเป็นแบบนี้ ชีวิตคนเรานี่คาดเดาได้ยากเหลือเกินนะ"
32120-46 = "นี่ไม่ใช่เวลามาดื่มด่ำกับความรู้สึกอยู่นะ! ทีนี้พวกเราจะทำยังไงกันดีล่ะ?!"
32120-47 = "เราหาวิธีมาขัดขวางไม่ได้หรอก คนที่พยายามจะไล่เราออกจากโรงเรียนคือคนระดับสูง#nจากสภาน้ำชาเลยนะ! ถึงจะทำอะไรไปมันก็เปล่าประโยชน์อยู่ดี!"
32120-48 = "เรามีเวลา 1 สัปดาห์ก่อนการสอบประเมินครั้งสุดท้าย... นี่คือโอกาสสุดท้ายของพวกเราแล้วค่ะ..."
32120-49 = "หากทางนั้นพยายามขัดขวางไม่ว่าจะด้วยวิธีใดก็ตาม... พวกเราก็คงทำอะไรได้ไม่มากสินะคะ..."
32120-50 = "อ่า..."
32120-51 = "นี่มันอะไรกัน?!  ทำไมถึงกลายเป็นแบบนี้ไปได้?!  ทำไมถึงจะไล่ชมรมชั้นเรียนเสริมออกล่ะ?!"
32120-52 = "<คนทรยศในทรีนิตี้> งั้นเหรอ? ฉันไม่เห็นจะเข้าใจเลย! ทำไมพวกเราถึงตกเป็นผู้ต้องสงสัยได้ล่ะ! ไม่เห็นจะเข้าใจเลยสักนิด!"
32120-53 = "ถ้าถูกไล่ออกล่ะก็... ฉันคงจะ... กลับชมรมทวงความยุติธรรมอีกไม่ได้..."
32120-54 = "โคฮารุจัง...."
32120-55 = "......."
32120-59 = "[ns] \"เป็นความผิดของครูเอง ครูไปยั่วโมโหนางิสะเข้าน่ะ...\""
32120-60 = "ไม่หรอกค่ะ... คุณครูโมโหใส่แบบนั้นเพื่อพวกเรานี่คะ พวกเราต่างหากค่ะที่ต้องกล่าวขอบคุณ"
32120-61 = "ถ้าฉันอยู่ตรงนั้นด้วย ฉันอาจจะทำรุนแรงกว่านั้นกับยัยแมวตัวเมียนั่นก็ได้ค่ะ"
32120-62 = "......."
32120-63 = "อีก 1 สัปดาห์จากนี้... เราต้องทำคะแนนให้ดีขึ้นให้ได้..."
32120-64 = "ค่ะ แล้วเราก็ต้องตื่นตัวอยู่ตลอดเวลาเพื่อสืบว่าคุณนางิสะไม่ได้คิดทำแผนการแปลกๆ อะไรอีก"
32120-68 = "ฮือๆ... ฮือ... ไม่ไหวหรอก จะให้พยายามมากกว่านี้อีกเหรอ..."
32120-69 = "ตอนนี้ฉันก็ทุ่มสุดตัวแล้วนะ... จะให้พยายามมากกว่านี้คงไม่ไหว... ฉันสู้อีกไม่ไหวหรอก#nก็ฉันมันคนโง่เง่า... ฮือ..."
32120-70 = "โคฮารุ..."
32120-71 = "โคฮารุจัง...."
32120-73 = "ตอนนี้เราพักผ่อนกันก่อนเถอะค่ะ"
32120-74 = "วิธี... มันจะมีวิธีค่ะ... ไม่สิ มัน 'ต้อง' มีวิธีค่ะ ฉันกับคุณครูจะพยายามด้วยกันค่ะ..."
32120-75 = "ฮิฟุมิจัง... ฮิฟุมิจังก็พักหน่อยเถอะค่ะ ฮิฟุมิจังก็เป็นคนที่พยายามอย่างหนักมาจนถึงตอนนี้นะคะ"
32120-76 = "อ่า... นั่นคือสิ่งที่ฉันจำเป็นต้องทำน่ะค่ะ..."
32120-77 = "ฉันเองก็จะไปคิดหาวิธีมาค่ะ... ฉันจะช่วยเรื่องการเรียนของโคฮารุจัง แล้วก็จะช่วยงานของฮิฟุมิจังด้วย..."
32120-78 = "แต่ตอนนี้... วันนี้... เรามาพักกันก่อนอย่างที่ฮิฟุมิจังว่าเถอะค่ะ"
32120-79 = "อะ... อ่า... ค่ะ ตามนั้นก็ได้ค่ะ วันนี้เราพอแค่นี้ก่อน..."
32120-83 = "ขอบคุณนะคะทุกคน"
32120-86 = "อีก 6 วันก่อนการสอบประเมินครั้งสุดท้าย"
32120-90 = "..."
32120-95 = "..."
32120-98 = "ตอนต่อไป;ถึงจะอย่างนั้นก็เถอะ"

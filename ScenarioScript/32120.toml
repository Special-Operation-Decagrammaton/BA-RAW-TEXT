[translation]
32120-1 = "Episode 12;Back to Square One"
32120-2 = "And back to the present..."
32120-4 = "I can't stand this anymore!"
32120-5 = "I'm in agony! Torment! Misery!"
32120-7 = "The whole reason we're here is to avoid being expelled. "
32120-8 = "But if we don't start putting our heads together..."
32120-9 = "...we'll all be expelled in a week."
32120-10 = "I think this needs something more than a cliché like \"put our heads together\" to solve. What if we thought outside the box instead? "
32120-11 = "Like...\"Let's put our bodies together!\" How does that sound?"
32120-16 = "Get your head out of the gutter, unless you want the death penalty, you perv! Can you even hear yourself? That doesn't even make sense!"
32120-17 = "My, you don't have a very active imagination, do you, Koharu? We could always try it out together."
32120-21 = "Wh... WHAT?! "
32120-24 = "Back it up! P-Personal space! I don't wanna know!"
32120-25 = "Here I come! ♥"
32120-29 = "No, let me go! Save me, Sensei! I'm sorry! I'm sorry...!"
32120-30 = "I'm sorry I snapped at you, Hanako! Please let me go!"
32120-31 = "Fascinating. I've never seen such an effective restraining method in close-quarters combat. This will prove most useful. "
32120-32 = "But I would've twisted her joints first. You made too many unnecessary moves with your hands."
32120-34 = "... "
32120-35 = "Sensei... Please..."
32120-36 = "[s] \"I'll try, Hifumi, but no promises.\""
32120-37 = "Thank you, Sensei."
32120-38 = "We're all going to be expelled at this rate..."
32120-40 = "I went to arrange a meeting with Nagisa after that, but couldn't track down where she was."
32120-41 = "I tried contacting Mika, but even her whereabouts were unknown."
32120-43 = "Annex Building"
32120-44 = "Home sweet home again."
32120-45 = "We thought our time here had come to end, yet here we still are. Life can be very unpredictable."
32120-46 = "Stop being so wishy-washy! We need to come up with a plan!"
32120-47 = "A top-ranking Tea Party official is gunning for us in case you forgot. We're screwed at this rate!"
32120-48 = "Our third and final exam is in a week, so we still have one last chance."
32120-49 = "Yes, but we know how far she's willing to stoop to prevent us from even taking it. Our odds aren't looking good."
32120-50 = "I-I still can't believe she had the testing site destroyed... "
32120-51 = "Why is this happening in the first place?! What made her so hell-bent on expelling US?!"
32120-52 = "I'm supposed to believe someone here is gonna betray Trinity?! That doesn't make any sense!"
32120-53 = "I'll... I'll never be able to return to the Justice Task Force at this rate..."
32120-54 = "Koharu..."
32120-55 = "..."
32120-59 = "[ns] \"It's my fault. I'm the one who provoked Nagisa.\""
32120-60 = "You were sticking up for us. There's nothing to apologize for."
32120-61 = "I wouldn't have been as nice to that witch if I were in your shoes."
32120-62 = "..."
32120-63 = "Let's not forget we're going to have to raise our scores to nearly perfect within a week."
32120-64 = "That's on top of any other underhanded tricks she might pull to stop us. We'll have to be careful."
32120-68 = "*sob* It's hopeless. I worked so hard just to score a 61. How am I supposed to get my grade even higher?"
32120-69 = "I worked as hard as I can already. I'm too dumb for this stuff. I can't... *sob*"
32120-70 = "Koharu..."
32120-71 = "Don't be so hard on yourself. "
32120-73 = "I think we should get some rest for now."
32120-74 = "There must be something we can do. I'm sure of it. Sensei and I will try to think of something."
32120-75 = "You need rest just as much as everyone else. You've been pushing yourself harder than any of us."
32120-76 = "I-I know, but I'm the president..."
32120-77 = "I'll help think of a solution too. I can handle it, even while helping Koharu study."
32120-78 = "Like you said, we should all get some rest for now, though."
32120-79 = "I guess so. Let's head to bed."
32120-83 = "Okay. Good night, everyone."
32120-86 = "Six days until the final exam."
32120-90 = "..."
32120-95 = "..."
32120-98 = "Next Episode;In Spite of Everything"

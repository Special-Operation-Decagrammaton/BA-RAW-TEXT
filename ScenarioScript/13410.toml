[translation]
13410-1 = "ตอนที่ 41;สิ่งที่เหลืออยู่หลังจากนั้น"
13410-3 = "โรงเรียนมัธยมต้นแห่งหนึ่งในอะบิดอส"
13410-4 = "เห็นประกาศหรือเปล่า? มีการกำหนดวันปิดโรงเรียนแล้วละ"
13410-5 = "แล้วทีนี้พวกเราจะเป็นยังไงเหรอ...?"
13410-6 = "ก็ต้องออกจากที่นี่ไปน่ะสิ ทุกคนก็กำลังออกไปกันอยู่ไม่ใช่หรือไง โรงเรียนมัธยมปลายให้เรียนต่อก็#nไม่มีแล้วด้วย..."
13410-7 = "แต่ว่า..."
13410-8 = "โรงเรียนมัธยมอะบิดอสน่ะมันจบเห่แล้ว มีข่าวลือว่าสภานักเรียนก็ยุบไปแล้วด้วย ถ้างั้นเขตปกครองตนเองก็ไม่เหลืออะไรแล้วละ"
13410-9 = "เนฟธิสเองก็ออกไปแล้วด้วย! คิดว่าภาคธุรกิจจะมารับผิดชอบเรางั้นเหรอ?"
13410-10 = "แต่ว่าคุณหนูคนนั้น... บอกว่าจะอยู่ที่นี่จนกว่าจะเรียนจบนะ..."
13410-11 = "นั่นมันข่าวลือเหลวไหลน่า! คนที่จะอยู่ที่นี่ต่อก็มีแต่คนโง่เท่านั้นละ! คิดว่าคุณหนูจากธุรกิจนั่นจะทำ#nเรื่องแบบนั้นงั้นเหรอ?"
13410-12 = "เรายังไม่เคยเห็นหน้าเธอในโรงเรียนด้วยซ้ำ! เราเองก็ต้องรีบหาทางรอดสิ!"
13410-19 = "พระอาทิตย์ขึ้น... อย่างนั้นเหรอ?"
13410-20 = "ทำไมกัน...? ฉันยังไม่ได้..."
13410-21 = "โธ่เว้ย... นี่ฉัน..."
13410-22 = "อยากจะพิสูจน์อะไรกันแน่นะ..."
13410-29 = "อะไรกัน ผู้ควบคุมอยู่ไหนน่ะ? หายไปไหนแล้ว?!"
13410-30 = "อย่าหนีนะ สุโอ "
13410-33 = "นี่มันเรื่องอะไรกันคะเนี่ย!!"
13410-35 = "ทำไมท่านประธานถึงอยู่ที่อะบิดอสล่ะคะ? แล้วก็กำลังรักษาตัวอยู่งั้นเหรอคะ? บาดเจ็บมากหรือเปล่าคะ? "
13410-36 = "[s] \"อาโกะ... ใจเย็นๆ ก่อนนะ...\""
13410-37 = "จะให้ฉันใจเย็นได้ยังไงคะ!! แล้วคุณครูเป็นยังไงบ้างคะ? เห็นว่าหายไปจากโรงพยาบาลด้วยนี่คะ!"
13410-38 = "[s1] \"ครูไม่เป็นไร แค่หักโหมงานมากไปน่ะ\"\n[s2] \"ครูไม่ได้บาดเจ็บตรงไหน แค่ทำงานหนักเกินน่ะ\""
13410-44 = "เฮ้อ... ที่จริงท่านประธานติดต่อมาบอกฉันคร่าวๆ น่ะค่ะ เห็นว่าจะออกไปทำธุระส่วนตัว แต่นี่มันไม่ใช่ธุระส่วนตัวเลยนี่คะ"
13410-45 = "กลายเป็นว่าเป็นเรื่องที่คุณครูขอให้ช่วย..."
13410-46 = "ว่าแต่คุณครูติดต่อท่านประธานไปตั้งแต่ตอนไหนเหรอคะ?"
13410-47 = "[ns] \"อ่า...\""
13410-52 = "[ns3] จัดการเอกสารที่รวบรวมมาทั้งคืน\n[ns4] \"พอจะรู้เรื่องที่จำเป็นแล้วละ... งั้นตอนนี้ก็...\""
13410-58 = "กำลังสแตนด์บาย คุณครู [USERNAME] มีอะไรที่ต้องการเหรอคะ? "
13410-59 = "[s] \"อ้อ ขอบใจนะพลาน่า อะโรน่าล่ะ?\""
13410-60 = "รุ่นพี่อะโรน่ากำลังหลับอยู่ค่ะ รุ่นพี่ขี้เซาน่ะค่ะ เพราะงั้นถ้ามีงานอะไรจะสั่ง ก็ให้สั่งคนขยันอย่างฉันได้#nเลยค่ะ"
13410-61 = "[s5] \"ขอบใจนะ ถ้างั้น...\"\n[s6] สั่งงานพลาน่า"
13410-65 = "[ns] ปืนแม่เหล็กไฟฟ้าอาจมีส่วนเกี่ยวข้องกับเกเฮนน่าก็ได้ ควรติดต่อฮินะไว้ก่อน"
13410-67 = "รับทราบ แค่นี้เรื่องง่ายๆ ค่ะ เดี๋ยวเดียวฉันก็ทำเสร็จแล้วค่ะ "
13410-70 = "เอาเป็นว่า รอฉันก่อนนะคะ! ฉันกำลังเดินทางไปที่นั่นค่ะ!"
13410-71 = "เอ๋...?"
13410-75 = "ท่านประธานติดต่อมา...? ท่านประธานกำลังจะไปที่นั่น งั้นก็ไม่ต้องเดินทางมาให้เปลืองแรง... งั้นเหรอคะ...? ทะ... ทำไมถึงอ่านใจฉันได้ทะลุปรุโปร่งแบบนี้ล่ะคะท่านประธาน?!"
13410-76 = "ถ้างั้นฉันต้องเตรียมตัว... ไว้จะติดต่อไปนะคะคุณครู!"
13410-80 = "[ns] \"อื้อ...\""
13410-83 = "เอ๋ คุณครู? ออกมาข้างนอกแล้วเหรอคะ?"
13410-84 = "[s] \"โนโนมิ กลับมาแล้วสินะ\""
13410-85 = "ค่ะ ฉันไปซักผ้าหยอดเหรียญมาค่ะ! ฉันจะใส่ชุดพละไปตลอดไม่ได้นี่คะ~♧"
13410-86 = "ไหนๆ ก็ซักของตัวเองแล้ว ฉันเลยเอาชุดของท่านประธานคณะกรรมการวินัยไปซักด้วย... คงไม่เป็นการเสียมารยาทใช่มั้ยคะ?"
13410-87 = "[s] \"อื้อ ไม่หรอก\""
13410-88 = "อื้อ นั่นสินะคะ... ท่านประธานอุตส่าห์มาช่วยพวกเราถึงที่นี่เลย ฉันว่าเธอแตกต่างจากที่เห็นภายนอก#nเลยนะคะ..."
13410-89 = "เอาละ เข้าไปกันเถอะค่ะ คุณครู! เราจะเริ่มประชุมกันแล้วนี่คะ"
13410-90 = "[s] เข้าไปในห้องเรียนกับโนโนมิ"
13410-95 = "ท้าดา~ ทุกคนมารับเสื้อผ้าของตัวเองไปนะคะ~"
13410-96 = "อื้อ ขอบใจนะ โนโนมิ"
13410-97 = "แหะๆๆ... ขอโทษที่ทำให้ต้องวุ่นวายนะคะ รุ่นพี่โนโนมิ..."
13410-98 = "ไม่เลย~ ไม่เห็นวุ่นวายเลยค่ะอายาเนะจัง เรื่องแบบนี้น่ะ ให้คนคนเดียวทำจะได้สะดวกกว่ากันค่ะ"
13410-99 = "อีกอย่าง เราเป็นรุ่นพี่รุ่นน้องกันนี่คะ ฉันไม่คิดว่าการซักผ้าในถังเดียวกันจะเป็นปัญหาหรอกค่ะ♧"
13410-100 = "ใช่แล้ว ถ้ารวมเสื้อผ้าไปซักด้วยกันก็จะประหยัดเงินได้ด้วย"
13410-101 = "เอ๋? จะว่าไป รุ่นพี่โฮชิโนะอยู่ไหนเหรอคะ? "
13410-102 = "อยู่ที่ห้องพยาบาลค่ะ ดูเหมือนมีอะไรอยากคุยกับท่านประธานคณะกรรมการวินัยน่ะค่ะ..."
13410-106 = "ไหนดูซิ เลกกิ้งตัวนี้ของฉัน ส่วนกางเกงในตัวนี้ก็ของรุ่นพี่ชิโรโกะใช่มั้ย? เอาไปสิ"
13410-107 = "อะ... อืม..."
13410-108 = "หืม? ทำไมทำหน้าเหม่อแบบนั้นล่ะรุ่นพี่? มีอะไรตรงโน้นงั้นเหรอ...?"
13410-109 = "อ๊ะ...?"
13410-113 = "[ns] \"........................\""
13410-114 = "อะ... อะไรเนี่ย! คุณครู?! ทำไมถึงมายืนจ้องเสื้อผ้าของเด็กนักเรียนม.ปลายแบบนี้ล่ะ!?! "
13410-115 = "[s] \"เปล่านะ ครูยังไม่ทันเห็นอะไรเลย...\""
13410-116 = "ให้ตายเถอะ ทำไมถึงได้เป็นคนแบบนี้นะ!! หันหลังกลับไปเลย!! รุ่นพี่ชิโรโกะเขินหมดแล้วนะ!"
13410-117 = "ไม่หรอก... ฉันไม่เป็นไร..."
13410-121 = "อ๊ะ ถ้างั้นคุณครูช่วยไปที่ห้องพยาบาลแล้วเรียกรุ่นพี่โฮชิโนะกับท่านประธานคณะกรรมการวินัยมาให้#nหน่อยได้มั้ยคะ?"
13410-122 = "นั่นสิเนอะ ต้องหางานให้ทำอย่างนี้ละ จะได้ไม่อยู่ในห้อง! รีบไปได้แล้ว!"
13410-123 = "[s] \"ไม่ยุติธรรมเลย...\""
13410-128 = "[ns7] \"ฮินะ โฮชิโนะ อยู่ตรงไหนเหรอ?\"\n[ns8] \"ฮินะ โฮชิโนะ อยู่ไหนน่ะ?\""
13410-133 = "ครู ฉันอยู่นี่..."
13410-141 = "..."
13410-142 = "[s] \"อืม...\""
13410-143 = "ทาคานาชิ โฮชิโนะหลับไปน่ะ... ฉันก็เลยขยับไปไหนไม่ได้..."
13410-144 = "[s] \"อะ... อืม...\""
13410-145 = "ตอนนี้ฉันควรต้องกลับไปแล้ว... นี่ ครู มาช่วยฉันหน่อยได้มั้ย?"
13410-146 = "[s] \"อืมมมมม...\""
13410-147 = "อย่าเอาแต่พูดคำที่ฟังไม่รู้ความหมาย แล้วมาช่วยฉันทีสิ...!"
13410-151 = "คุณครูปลุกโฮชิโนะแล้วช่วยฮินะที่กำลังเจอปัญหา"
13410-153 = "มากันครบแล้วใช่มั้ยคะ?"
13410-154 = "อื้อ!"
13410-155 = "อืม"
13410-156 = "อื้อ มากันครบแล้วนะคะ♧"
13410-157 = "ฮ้าววว... "
13410-158 = "ว่าแต่รุ่นพี่โฮชิโนะจะยังอยู่ในสภาพนั้นเหรอ?"
13410-159 = "ไม่เป็นไรหรอก ไม่เป็นไร เราก็ต้องผ่อนคลายกันบ้างสิ"
13410-160 = "หืม? แล้วประธานคณะกรรมการวินัยจัง... ไม่สิ... ฮินะจังล่ะ?"
13410-161 = "ท่านประธานคณะกรรมการวินัยกลับเกเฮนน่าไปเมื่อกี้นี้ค่ะ"
13410-162 = "ว่าไงนะ? กลับไปแล้วเหรอ?"
13410-163 = "ใช่ เธอเตรียมตัวแล้วก็กลับไปตั้งแต่ก่อนที่รุ่นพี่โฮชิโนะจะเปลี่ยนเสื้อผ้าเสร็จอีก"
13410-164 = "คนนั้นน่ะดูขยันมากเลยนะ ไม่เหมือนใครบางคนแถวนี้เลย?"
13410-165 = "เอ๋... ยังไม่ทันได้บอกลากันเลย..."
13410-167 = "ขอบใจเรื่องเสื้อผ้านะ..."
13410-168 = "เอ่อ... แต่รุ่นพี่โฮชิโนะยังไม่ตื่นเลยนะคะ..."
13410-169 = "ไม่เป็นไรหรอก ฉันออกมาโดยพลการแบบนี้ ตอนนี้ทุกคนน่าจะกำลังรออยู่น่ะ"
13410-170 = "ส่วนเรื่องบอกลาน่ะ เอาไว้ทีหลังก็ได้ ยังไงฉันก็ต้องมาสะสางปัญหาเรื่องปืนแม่เหล็กไฟฟ้าอยู่ดี"
13410-171 = "ไว้คุยรายละเอียดกันตอนนั้นแล้วกัน"
13410-172 = "คือว่า..."
13410-177 = "ขอบคุณที่มาช่วยนะคะ ท่านประธานคณะกรรมการวินัย"
13410-179 = "ใช่ค่ะ ถ้าไม่ได้ท่านประธานคณะกรรมการวินัย เราก็คงขัดขวางรุ่นพี่โฮชิโนะไว้ไม่ได้หรอกค่ะ"
13410-180 = "อืม เราติดหนี้บุญคุณแล้วนะ"
13410-181 = "ไว้มาเล่าเรื่องที่สู้กับรุ่นพี่โฮชิโนะให้ฟังบ้างนะ"
13410-182 = "อืม ฉันก็อยากรู้เรื่องนั้นเหมือนกัน "
13410-187 = "[ns] \"ขอบใจนะ ฮินะ แล้วครูจะตอบแทนให้นะ\""
13410-189 = "ฉันสายแล้วละ"
13410-190 = "งั้นไว้เจอกันใหม่นะ คณะกรรมการแผนงานอะบิดอส"
13410-195 = "ว่าไงนะ? กลับไปทั้งอย่างนั้นเลยงั้นเหรอ? "
13410-196 = "อ้อ ท่านประธานเอาชุดพละของรุ่นพี่ไปด้วยค่ะ เห็นว่าจะเอาไปซักให้สะอาดแล้วส่งไปรษณีย์มาให้#nทีหลังน่ะค่ะ "
13410-197 = "ว่าไงนะ? เอาชุดของฉันไปด้วยเหรอ?"
13410-198 = "ก็ชุดพละที่พอดีตัว... มีแต่ของรุ่นพี่โฮชิโนะน่ะค่ะ..."
13410-199 = "ฉันให้ยืมชุดชั้นในไปด้วยนะ จะซักให้สะอาดเอี่ยมแล้วส่งมาคืนด้วยหรือเปล่าน้า~"
13410-200 = "ระ... เรื่องแบบนั้นเอาไว้ไปถามเองสิ! จะมาพูดอวดตรงนี้ทำไมกันเล่า!"
13410-201 = "แต่ลุงไม่รู้จะติดต่อไปยังไงนี่สิ... ก็ลุงคนนี้ขี้อาย ไม่กล้าขอเบอร์ใครนี่นา..."
13410-202 = "ถามจากคุณครูเอาก็ได้ไม่ใช่หรือไง! แล้วนี่รุ่นพี่เป็นคนขี้อายตั้งแต่เมื่อไรกันน่ะ?"
13410-203 = "อืม... ก็นะ..."
13410-204 = "เอาละ รับชุดของรุ่นพี่ไปเถอะค่ะ เราจะเริ่มประชุมกันแล้ว รีบไปเปลี่ยนชุดมานะคะ"
13410-205 = "แต่ลุงใส่ชุดนี้ก็ได้นี่นา..."
13410-207 = "นี่ไม่ใช่เวลาออกกำลังกายสักหน่อย! ทำตัวเป็นลุงที่นอนแผ่อยู่หน้าทีวีในวันหยุดสุดสัปดาห์ไปได้! "
13410-208 = "ฮ้าวว~ คงช่วยไม่ได้น่ะนะ  "
13410-216 = "เอาละ ถ้างั้นเราจะเริ่มการประชุมของคณะกรรมการแผนงานอะบิดอสและสภานักเรียนอะบิดอส... หรือเรียกสั้นๆ ว่าคณะกรรมการแผนงานค่ะ!"
13410-217 = "ฉันขอเริ่มวาระแรก..."
13410-218 = "เดี๋ยวก่อน ฉันมีเรื่องอยากบอกทุกคนน่ะ"
13410-219 = "คะ...? รุ่นพี่โฮชิโนะ? "
13410-220 = "มีเรื่องจะบอกงั้นเหรอ?"
13410-221 = "เรื่องอะไรเหรอคะ?"
13410-222 = "ถ้าพูดอะไรเหลวไหล ฉันจะไม่อยู่เฉยๆ หรอกนะรุ่นพี่"
13410-223 = "อะแฮ่ม..."
13410-224 = "โนโนมิจัง ชิโรโกะจัง อายาเนะจัง เซริกะจัง แล้วก็คุณครู..."
13410-225 = "เรื่องความวุ่นวายในหลายวันที่ผ่านมาน่ะ..."
13410-226 = "อะ... อืม... เอ่อ..."
13410-231 = "อืม... คือว่า... อ่า..."
13410-232 = "ฉัน... ฉันคิดว่า... ตัวเองทำผิดไป..."
13410-233 = "เอ๋? ว่าไงนะคะ? ได้ยินไม่ถนัดเลยค่ะ ชิโรโกะจังได้ยินมั้ยคะ?"
13410-234 = "ไม่นะ ไม่ได้ยินอะไรเลย "
13410-235 = "...!!"
13410-236 = "อืม นั่นสินะ ฉันก็ไม่ค่อยจะได้ยินเลย รุ่นพี่โฮชิโนะ"

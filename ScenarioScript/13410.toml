[translation]
13410-1 = "Episode 41;What Remains Afterwards"
13410-3 = "An Abydos middle school"
13410-4 = "Did you see the notice? They announced the school's shutdown date."
13410-5 = "...What's gonna happen to all of us, then?"
13410-6 = "Well, there's not even a high school for us to attend anymore. We should do what everyone else is doing. Leave."
13410-7 = "But..."
13410-8 = "Rumor has it that even the student council disbanded. Abydos High School is done for. The whole district is done for."
13410-9 = "Even Nephthys ran off! That greedy corporation's not gonna look out for us."
13410-10 = "But what about their daughter? She said she'd stay until graduation, didn't she?"
13410-11 = "She was just saying that to make you feel better! What kind of idiot would stay? Definitely not the heir to a fancy corporation!"
13410-12 = "I haven't seen her face in the school hallways for ages, anyway! We need to hurry and get out of here, while we still can."
13410-19 = "The sun...is rising?"
13410-20 = "How? I still have to..."
13410-21 = "Damn it... What was I..."
13410-22 = "...trying to prove?"
13410-29 = "Overseer? Hellooo? Where'd ya go?!"
13410-30 = "Don't run...Suou!"
13410-33 = "What in the world happened?!"
13410-35 = "Why is the Head Prefect at Abydos?! She's receiving medical treatment right now? Just how injured is she?! "
13410-36 = "[s] \"Ako... Calm down for a second...\""
13410-37 = "Calm down?! In this situation? Furthermore, you disappeared from the hospital, Sensei! Are you okay?!"
13410-38 = "[s1] \"Look, I'm perfectly fine.\"\n[s2] \"I wasn't even injured. It was just fatigue from work.\""
13410-44 = "*sigh* Well, the Head Prefect did inform me of the situation... This wasn't exactly the \"personal matter\" she claimed it was though..."
13410-45 = "I wasn't expecting you to be behind the request, Sensei."
13410-46 = "When did you even reach out to the Head Prefect?"
13410-47 = "[ns] \"Well...\""
13410-52 = "[ns3] Finish organizing the data collected over night.\n[ns4] \"I have a general idea of what to do. Next...\""
13410-58 = "Still on standby. Can I provide any assistance, [USERNAME] Sensei?"
13410-59 = "[s] \"Ah, thank you, Plana. Where's Arona?\""
13410-60 = "Arona is asleep. She is what you would call a \"sleepyhead.\" Instead, you may simply count on me, the diligent one."
13410-61 = "[s5] \"Thank you. In that case...if you don't mind.\"\n[s6] Hand over the task to Plana."
13410-65 = "[ns] \"The Cannon is likely related to Gehenna. We should ask Hina for more information.\""
13410-67 = "An easy task. Understood. Consider it completed. "
13410-70 = "Anyways, don't move an inch! I'm on my way!"
13410-71 = "...Huh?"
13410-75 = "The Head Prefect just messaged me...#n\"I'm headed home, so you don't need to come all the way out here.\"#nHow did she know?!"
13410-76 = "I'll need to make preparations... You and I are going to speak later, Sensei!"
13410-80 = "[ns] \"...Hm.\""
13410-83 = "Oh, Sensei? You were out here the whole time?"
13410-84 = "[s] \"You're back, Nonomi.\""
13410-85 = "Yes, I took a quick trip to the laundromat! We can hardly stay in our tracksuits forever! ♧"
13410-86 = "I went ahead and washed the Head Prefect's clothes as well... She won't think I'm overstepping, will she?"
13410-87 = "[s] \"Of course not.\""
13410-88 = "...Yup, yup. She gives off a certain impression, but she truly went out of her way to help all of us this time."
13410-89 = "Now then, let's go, Sensei! We have a meeting to attend!"
13410-90 = "[s] Walk to the classroom with Nonomi."
13410-95 = "Ta-da! Please take your clothes, everyone!"
13410-96 = "Thanks, Nonomi."
13410-97 = "Ah... Sorry for the hassle, Nonomi."
13410-98 = "Please don't apologize, Ayane! A little task like this is easier for one person to just do in bulk, anyway!"
13410-99 = "Also, I don't think there's any problem with us doing our laundry together. ♧"
13410-100 = "She's right! And we're saving money, too!"
13410-101 = "Hm? Now that I think about it, where's Hoshino? "
13410-102 = "The infirmary. She wanted to speak to the Head Prefect, I believe."
13410-106 = "Lemme see. My gaiters! And this underwear is...Shiroko's, right? Here, here."
13410-107 = "U-Um."
13410-108 = "Huh? C'mon, take your underwear, Shiroko. What're you looking at?"
13410-109 = "Ah...?"
13410-113 = "[ns] \"...\""
13410-114 = "Wh-What're you doing, Sensei?! Why are you trying to take a peep at a bunch of high school girls' laundry?! "
13410-115 = "[s] \"No, it's really not like that...\""
13410-116 = "You have no tact at all! Look how embarrassed Shiroko is! Avert your eyes!"
13410-117 = "No... I wasn't..."
13410-121 = "Then why don't you go get Hoshino and the Head Prefect from the infirmary, Sensei?"
13410-122 = "Yeah! Get outta here, Sensei! Hurry along!"
13410-123 = "[s] \"This really wasn't my fault...\""
13410-128 = "[ns7] \"Hina? Hoshino?\"\n[ns8] \"Where are you?\""
13410-133 = "...Over here, Sensei."
13410-141 = "..."
13410-142 = "[s] \"Hm...\""
13410-143 = "Takanashi Hoshino fell asleep... I can't move."
13410-144 = "[s] \"Hmm...\""
13410-145 = "Um, Sensei... I do need to head back soon. Could you please assist...?"
13410-146 = "[s] \"Hmmm...\""
13410-147 = "Stop making strange noises, and help me!"
13410-151 = "I woke up Hoshino and got her off of Hina."
13410-153 = "Is everyone present?"
13410-154 = "Yes!"
13410-155 = "Mhm."
13410-156 = "Yup, yup! Everyone's here. ♧"
13410-157 = "*yawn* "
13410-158 = "Are you not gonna change, Hoshino?"
13410-159 = "Don't mind it. You gotta take it easy in life, sometimes."
13410-160 = "Hm? Where's the Head Prefect...er, Hina?"
13410-161 = "The Head Prefect has already returned to Gehenna."
13410-162 = "Huh? Already?"
13410-163 = "Yeah. She got ready and left, all before you could even change into your school uniform."
13410-164 = "Unlike a certain someone, Hina's very diligent, isn't she?"
13410-165 = "Heh. She didn't even give me a chance to say bye."
13410-167 = "...Pardon the abrupt departure."
13410-168 = "Hoshino's still getting up... I'm sure—"
13410-169 = "No, they'll be waiting for me. Especially since I went off on my own."
13410-170 = "Save the farewells for next time. There's still business to be taken care of in regards to the Train Cannon, after all."
13410-171 = "We'll meet again to discuss the details."
13410-172 = "Um... "
13410-177 = "Thank you for your help, Head Prefect!"
13410-179 = "Yes! Thank you! We wouldn't have been able to stop Hoshino without you."
13410-180 = "Yeah. We owe you one."
13410-181 = "Next time, tell us more about your big fight with Hoshino!"
13410-182 = "Yeah. We're all interested to hear more. "
13410-187 = "[ns] \"Thank you, Hina. I'll repay you for this next time.\""
13410-189 = "...It's getting late."
13410-190 = "I'll see you next time, Foreclosure Task Force."
13410-195 = "What? And she left just like that? "
13410-196 = "Ah! She also said she'll wash and mail back your tracksuit. "
13410-197 = "Huh?! She took it?!"
13410-198 = "Well, yours was the only tracksuit that was her size..."
13410-199 = "You think she's gonna wash my underwear for me too? I let her borrow a pair..."
13410-200 = "H-Hey, don't say that out loud! Go ask her yourself!"
13410-201 = "I don't have her number though...and this old-timer is very shy, you know..."
13410-202 = "Then ask Sensei for it! Geez! And what's with this new bit you're doing?"
13410-203 = "Hm... Well..."
13410-204 = "Here's your uniform, Hoshino. Please go get changed, so we can get the meeting started!"
13410-205 = "This old-timer is fine with her current outfit..."
13410-207 = "Are we in a gymnasium right now? Or are you an old man, scratching his belly and lying down in front of a T.V. on the weekend?! "
13410-208 = "*yawn* Well, if you insist... "
13410-216 = "All right, let's begin the daily meeting of the Abydos Foreclosure Task Force also known as Abydos Student Council—shortened to the Foreclosure Task Force!"
13410-217 = "To begin—"
13410-218 = "Wait. I have something to say."
13410-219 = "...Huh? Hoshino? "
13410-220 = "Something to say?"
13410-221 = "What is it?"
13410-222 = "You better not say something weird again."
13410-223 = "Ahem..."
13410-224 = "Nonomi, Shiroko, Ayane, Serika...and Sensei."
13410-225 = "About everything that's happened the last few days..."
13410-226 = "U-Um... So, the thing is..."
13410-231 = "Uh... So... Well..."
13410-232 = "I think...I really messed up..."
13410-233 = "Huh? Did you say something? I can't hear a thing. Did you hear her, Shiroko?"
13410-234 = "Nope. Couldn't hear anything. "
13410-235 = "...!"
13410-236 = "Hm... That's true. I couldn't hear you either, Hoshino."
13410-237 = "[s] \"You've got to say it loud and proud, Hoshino.\""
13410-238 = "You too, Sensei?"
13410-239 = "Well... Uh... "
13410-243 = "I'm really very sorry! For everything! Twice over!"
13410-244 = "In hindsight, even I can't say why I did what I did, but..."
13410-245 = "But...I really did mess up. I worried you all...caused a lot of trouble...um..."
13410-249 = "You did. Quite a bit."
13410-250 = "I mean, it all worked out though, didn't it?"
13410-251 = "I'm just glad you came back, Hoshino."
13410-252 = "Yup. That's right."
13410-253 = "Yeah... I didn't really know what happened, but there's one thing I really remember clearly."
13410-254 = "The sound of your voices."
13410-261 = "...And there was one voice I heard especially clearly."
13410-262 = "Serika's! When she promised me she would make her idol debut with Ayane!"
13410-263 = "Really?"
13410-264 = "Idol?"
13410-265 = "Wh-What?! Huh?"
13410-266 = "Wh-What are you saying right now?!"
13410-267 = "But I heard you, Serika! Are you really going to go back on your promise now? Seriously? Are you trying to pretend it never happened?"
13410-268 = "I-I did say that, but...! It was on a whim! A total whim!"
13410-269 = "Serika?! "
13410-270 = "We were out of options, okay?! "
13410-271 = "Heh. So this old-timer's thinking that she can't rest in peace until she witnesses it with her own two eyes. "
13410-273 = "You're not about to say something like, \"Sorry, this is too much for me. Just forget I said anything,\" are you?"
13410-274 = "It is way, way too much! I mean...not impossible, though, I guess... "
13410-275 = "Yup, yup! That means you two will debut when the right opportunity comes along, okay?! I'll be your producer! ♧"
13410-276 = "An idol... What...?"
13410-277 = "*whisper* It's okay. Just play along. That kind of \"opportunity\" is one in a million, anyway. "
13410-278 = "*whisper* Serika... "
13410-283 = "Don't worry. In life, you must make your own opportunities. I'll make it happen."
13410-284 = "I beg you, Shiroko. Please dial back the enthusiasm... "
13410-297 = "Hoshino. Whenever you feel ready...can you tell us more about President Yume?"
13410-301 = "Yeah! I want to hear more too."
13410-302 = "Ahaha... Me too."
13410-303 = "Yup, yup! Tell us everything!"
13410-304 = "Hm... Is that so? You want to hear all of the heart-pounding adventures of my youth? "
13410-305 = "In that case...the best place to begin, of course, would be when we went to the Great Oasis in just our swimsuits."
13410-306 = "What?! Your swimsuits? Why?! How?"
13410-307 = "Heh, heh. There's actually an incredible explanation..."
13410-311 = "[ns] \"Are you okay now, Hoshino?\""
13410-312 = "..."
13410-313 = "I'm not okay...but I'm okay."
13410-316 = "How...are you, Hoshino?"
13410-317 = "It's not easy to live life bearing that kind of pain."
13410-318 = "Mhm. It's hard. I blame myself every day. It's hard to fight off the feelings of regret. The darkness is always there, at the edges."
13410-319 = "Despite all that, there were people who reached into that darkness for me. They were relentless, day after day. All for someone like me."
13410-320 = "I can be grateful for this pain now, because I was able to meet Nonomi, Shiroko, Ayane, Serika...and even another Shiroko. I got to meet my cute underclassmen."
13410-321 = "That's why...this pain, and this happiness, they're all parts of my life now."
13410-322 = "So..."
13410-323 = "I can't let my pain stop me here. I have to keep moving forward."
13410-326 = "What about all the precious things you've lost?"
13410-331 = "Is it possible...to let them go?"
13410-334 = "No, Shiroko. It's not. Because those things are a part of who I am too."
13410-335 = "But if I'm using both my hands to cling to this pain..."
13410-336 = "...I won't be able to take hold of the ones reaching out to me."
13410-343 = "So..."
13410-344 = "So, probably..."
13410-354 = "Done... It's done for... This place is...doomed..."
13410-355 = "Nothing makes sense... How could I have ever hoped to find enlightenment...in this cesspool...?"
13410-356 = "I was thrust into the wrong place... This...this world..."
13410-357 = "...is utterly unfitting for me, for Gematria!!"
13410-361 = "Gematria, you say?"
13410-362 = "...!"

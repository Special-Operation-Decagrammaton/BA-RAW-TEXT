[translation]
13410-1 = "第41話;其後留下的事物"
13410-3 = "阿拜多斯境內的某間國中"
13410-4 = "你有看到公告嗎？廢校的日期已經出來了。"
13410-5 = "……那我們接下來會怎麼樣？"
13410-6 = "也只能跟大家一樣離開了吧？#n畢竟我們現在也沒有可以申請的高中……"
13410-7 = "可是……"
13410-8 = "阿拜多斯高中已經完蛋了啦。#n我聽說他們連學生會都解散了，這個自治區已經沒救了。"
13410-9 = "連奈芙蒂斯也撤離了！你覺得大企業會理我們嗎？"
13410-10 = "可是他們家的千金……好像到畢業典禮之前都會留在這裡……"
13410-11 = "那些傳聞都是假的啦！#n會留在這裡的不是笨蛋就是傻瓜！你覺得大企業的千金小姐有那麼笨嗎？"
13410-12 = "更何況你也沒有親眼在學校裡見過他吧！#n我們也得快點找其他出路才行！"
13410-19 = "……已經要日出了嗎？"
13410-20 = "為什麼……？我明明什麼都還沒……"
13410-21 = "該死……我究竟……"
13410-22 = "究竟是想證明什麼……"
13410-29 = "搞什麼啊，監察官人呢？他到底跑哪去了！？"
13410-30 = "別跑啊～蘇芳～"
13410-33 = "到底發生了什麼事！！"
13410-35 = "為什麼委員長會在阿拜多斯？而且還在接受治療？#n他的傷勢到底有多嚴重？"
13410-36 = "[s]「亞子……你先冷靜一點……」"
13410-37 = "您覺得我現在冷靜得下來嗎！？#n老師您也沒事吧？怎麼能擅自離開醫院！"
13410-38 = "[s1]「我沒事。」\n[s2]「我本來就沒有受傷，之前真的只是過勞而已。」"
13410-44 = "唉……其實委員長之前有跟我聯絡過。#n說是因為一些私人的原因要離開一下，結果根本不是什麼私人原因嘛。"
13410-45 = "沒想到老師會請委員長幫忙……"
13410-46 = "老師是什麼時候聯絡委員長的呢？"
13410-47 = "[ns]「這個嘛……」"
13410-52 = "[ns3] 整理通宵收集到的資料\n[ns4]「大概知道需要什麼了。接下來……」"
13410-58 = "待命中。#n[USERNAME]老師，有什麼需要嗎？"
13410-59 = "[s]「啊，謝謝你，星奈。彩奈呢？」"
13410-60 = "彩奈前輩正在睡覺，他是瞌睡蟲。#n所以如果有事吩咐，請對勤奮的我下達命令。"
13410-61 = "[s5]「謝謝你，那麼……」\n[s6] 把工作交給星奈"
13410-65 = "[ns] 列車砲的事說不定和格黑娜有關，所以還是聯絡一下陽奈比較好"
13410-67 = "收到。這件事並不困難，我馬上處理。"
13410-70 = "總之請先在那裡等我！我立刻過去！"
13410-71 = "……咦？"
13410-75 = "是委員長的聯絡……？#n「現在正準備回去，所以不用特地過來了」……？#n您，您怎麼知道我打算做什麼呢，委員長！？"
13410-76 = "那我現在馬上著手準備……之後再聯絡，老師！"
13410-80 = "[ns]「……唔嗯。」"
13410-83 = "咦，老師？你怎麼待在外面？"
13410-84 = "[s]「野乃美，你回來啦。」"
13410-85 = "嗯，我從自助洗衣店回來了！畢竟也不能一直穿著體育服嘛～♧"
13410-86 = "然後我也順便把風紀委員長的衣服拿去洗了……這樣應該不會很失禮吧？"
13410-87 = "[s]「嗯，當然不會。」"
13410-88 = "……嗯嗯，我想也是。#n畢竟他幫了我們這麼多，說不定他其實不像外表看起來那麼嚴肅……"
13410-89 = "我們進去吧，老師！等等不是要開會嗎？"
13410-90 = "[s] 和野乃美一起進入教室"
13410-95 = "鏘鏘～大家來拿自己的衣服吧～"
13410-96 = "嗯，謝謝你，野乃美。"
13410-97 = "啊哈哈……真不好意思，野乃美前輩。#n給你添麻煩了……"
13410-98 = "不會不會～綾音醬。#n這種事一個人做才更快更方便唷？"
13410-99 = "而且我們又不是別人，衣服一起洗也沒關係吧♧"
13410-100 = "沒錯，一次把所有人的衣服都洗好也比較省錢。"
13410-101 = "嗯？話說星野前輩呢？"
13410-102 = "他去保健室了。#n好像是跟風紀委員長有什麼話要說……"
13410-106 = "我看看……#n這件內搭褲是我的，這件內褲應該是白子前輩的吧？拿去吧。"
13410-107 = "唔，唔嗯。"
13410-108 = "嗯？為什麼在發呆啊，前輩？#n那裡有什麼嗎……？"
13410-109 = "啊……？"
13410-113 = "[ns]「……………………」"
13410-114 = "喂！老師！？#n為什麼要盯著女高中生的換洗衣物看啊！？！？"
13410-115 = "[s]「不是，我根本沒有……」"
13410-116 = "真是的，怎麼這麼不細心呢！！給我轉過去！！#n沒看到白子前輩都不好意思了嗎！"
13410-117 = "那個……其實我……"
13410-121 = "啊，那能不能麻煩老師去一趟保健室，幫我們把星野前輩和風紀委員長叫過來呢？"
13410-122 = "對耶，叫老師出去一下就行了！那你快去吧！"
13410-123 = "[s]「我是被冤枉的……」"
13410-128 = "[ns7]「陽奈、星野？」\n[ns8]「你們在哪裡？」"
13410-133 = "……我在這裡，老師。"
13410-141 = "……"
13410-142 = "[s]「唔嗯……」"
13410-143 = "小鳥遊星野睡著了……我現在動彈不得……"
13410-144 = "[s]「唔嗯…………」"
13410-145 = "現在也差不多該回去了……#n老師，可以幫我一下嗎？"
13410-146 = "[s]「唔嗯………………」"
13410-147 = "不要只發出那種意義不明的呻吟聲，快點幫幫我……！"
13410-151 = "把星野叫醒，解救了急需幫忙的陽奈。"
13410-153 = "大家都到齊了吧？"
13410-154 = "嗯！"
13410-155 = "嗯。"
13410-156 = "嗯嗯，大家都到了♧"
13410-157 = "呼啊～"
13410-158 = "星野前輩，你要那個樣子到什麼時候？"
13410-159 = "沒關係沒關係，做人要懂得從容一點。"
13410-160 = "嗯？話說風紀委員長……陽奈醬呢？"
13410-161 = "風紀委員長剛才已經回去格黑娜了。"
13410-162 = "咦？這麼快？"
13410-163 = "嗯，在星野前輩換好衣服之前，那個人就已經準備完離開了。"
13410-164 = "跟某人不一樣，簡直勤奮得不得了呢。"
13410-165 = "嘿……都還沒跟他道別的說……"
13410-167 = "……受你們照顧了。"
13410-168 = "那個……星野前輩他還沒……"
13410-169 = "沒關係。因為我擅自離開崗位的關係，大家應該都在等我了。"
13410-170 = "道別就先留到下次。#n畢竟列車砲的事也還有一些問題要處理。"
13410-171 = "細節等到時候再說吧。"
13410-172 = "那個…… "
13410-177 = "謝謝你特地來幫我們，風紀委員長。"
13410-179 = "嗯，沒錯。#n要不是風紀委員長你在，我們根本不可能阻止星野前輩。"
13410-180 = "嗯，欠了你很多人情。"
13410-181 = "下一次也跟我說說你跟星野前輩戰鬥的過程吧。"
13410-182 = "嗯，我對這個話題很感興趣。"
13410-187 = "[ns]「謝謝你，陽奈。之後一定會還你這份人情的。」"
13410-189 = "……我該走了。"
13410-190 = "後會有期。阿拜多斯對策委員會。"
13410-195 = "什麼？他就那樣走了？"
13410-196 = "啊，他還有說會把前輩的體育服洗乾淨再寄回來給我們。"
13410-197 = "咦？他把體育服穿走了？"
13410-198 = "畢竟他能穿的就只有星野前輩的體育服，這也沒辦法……"
13410-199 = "我連內衣都借出去了，他會把內衣也洗好還我嗎～"
13410-200 = "那，那種事你自己去問他啦！不要在這裡大聲講出來！"
13410-201 = "可是大叔我連他的聯絡方式都不知道……而且我臉皮這麼薄……"
13410-202 = "去問老師不就好了嗎！而且你什麼時候多了那種奇怪的設定啊？"
13410-203 = "唔……這個嘛……"
13410-204 = "來，前輩。這套衣服給你。#n會議馬上就要開始了，請趕快把衣服換好。"
13410-205 = "大叔我覺得穿這套衣服沒什麼問題呀……"
13410-207 = "現在又不是體育課！你也不是放假的時候袒胸露背地躺在電視機前的大叔好嗎！"
13410-208 = "呼啊～真拿你們沒辦法。"
13410-216 = "好，那麼阿拜多斯廢校對策委員會兼阿拜多斯學生會……#n簡稱對策委員會的定期會議正式開始！"
13410-217 = "首先，第一項議題就由我……"
13410-218 = "先等一下。#n我有話要對大家說。"
13410-219 = "……嗯？星野前輩？"
13410-220 = "有話要對我們說？"
13410-221 = "有什麼事嗎？"
13410-222 = "如果又說一些奇怪的話，我可是不會放過你的哦，前輩。"
13410-223 = "唔嗯……"
13410-224 = "野乃美醬、白子醬。#n綾音醬、茜香醬……還有老師……"
13410-225 = "關於這幾天的騷動……"
13410-226 = "唔，唔嗯……該怎麼說呢……"
13410-231 = "就是……那個……我……"
13410-232 = "我，我覺得……真的很抱歉……"
13410-233 = "咦？前輩剛才說什麼，我沒聽清楚耶？#n白子醬有聽到嗎？"
13410-234 = "沒有，我什麼都沒聽到。"
13410-235 = "……！！"
13410-236 = "就是啊，我也聽得不是很清楚喔，星野前輩。"
13410-237 = "[s]「不大聲說出來的話，別人是不會懂的哦，星野。」"
13410-238 = "竟然連老師也……"
13410-239 = "嗯……總之……"
13410-243 = "這全都是我的錯……！而且還不是一次，而是兩次！"
13410-244 = "現在仔細想想，我也不知道當時為什麼會那麼做……嗯……"
13410-245 = "總之無論如何，這件事是我對不起大家……#n不僅讓你們擔心……還給你們添了許多麻煩……唔……"
13410-249 = "……真的很會添麻煩。"
13410-250 = "反正現在不都圓滿落幕了嗎？"
13410-251 = "你能回來真是太好了，前輩。"
13410-252 = "嗯，沒錯。"
13410-253 = "……是啊。#n雖然我的記憶有點混亂，不過有件事我記得很清楚。"
13410-254 = "那時候我聽見了大家的聲音。"
13410-261 = "……那些聲音清楚地告訴了我一件事。"
13410-262 = "那就是茜香醬和綾音醬要出道當偶像！！"
13410-263 = "咦咦？"
13410-264 = "偶像？"
13410-265 = "什麼？"
13410-266 = "你，你在說什麼啊──！！"
13410-267 = "我可是親耳聽見了喔，茜香醬。該不會事到如今才打算出爾反爾吧？#n總不會想假裝自己沒說過那樣的話吧？"
13410-268 = "那，那只是……只是我一時激動才隨便亂說的……#n雖然的確是說過那種話沒錯……"
13410-269 = "茜香醬！？"
13410-270 = "那個時候我也沒辦法嘛！"
13410-271 = "唔嘿～大叔我那時候就心想「在看到你們成為偶像之前可絕對不能死啊」～"
13410-273 = "所以啊～你們應該不會現在才跟我說什麼做不到，或者那只是一時失言之類的話吧？"
13410-274 = "可，可是暫時就真的做不到啊。#n至於失言……是沒有那麼誇張啦。"
13410-275 = "嗯嗯！也就是說只要遇到合適的機會，你們兩個就會閃亮出道對吧！？#n那就讓我來當你們的製作人吧♧"
13410-276 = "出道當偶像……這種事……"
13410-277 = "（竊竊私語）……仔細想想，那種機會應該沒那麼容易遇到吧？暫時先敷衍過去吧。"
13410-278 = "（竊竊私語）茜香醬……"
13410-283 = "機會是人創造出來的。#n我一定會幫你們創造出這個機會。"
13410-284 = "算我拜託你了白子前輩，不要那麼有幹勁好不好……"
13410-297 = "星野前輩，假如之後有機會的話……跟我們說說夢會長的故事吧。"
13410-301 = "就是啊，我也想聽。"
13410-302 = "啊哈哈……那我也要聽。"
13410-303 = "嗯嗯！我們都很想聽哦！"
13410-304 = "嘿～是嗎？你們想聽讓人不禁捏把冷汗的冒險故事呀～"
13410-305 = "看來得先從我們穿著泳衣，跑去大型綠洲的故事開始講起了呢。"
13410-306 = "咦！？泳衣？為什麼啊！？#n有什麼特殊的理由嗎？"
13410-307 = "呵呵呵，這個嘛……當然是有非常特別的理由囉！"
13410-311 = "[ns]「已經沒事了嗎，星野？」"
13410-312 = "……"
13410-313 = "雖然不能說沒事……但是沒關係。"
13410-316 = "真的沒關係嗎？星野前輩……？"
13410-317 = "帶著那份痛苦活著，肯定很辛苦吧……"
13410-318 = "嗯，很辛苦。#n我每天都在不停地後悔和自責，彷彿整個人正慢慢沉進黑暗的深淵裡一樣。"
13410-319 = "幸好有一群人，每天都不厭其煩地向我伸出手。"
13410-320 = "也正是因為有這份痛苦，我才能遇見像野乃美醬、白子醬、綾音醬、茜香醬……#n還有另一個白子醬這些可愛的後輩。"
13410-321 = "所以……無論那是痛苦還是幸福，全都是我人生中的一部分。"
13410-322 = "因此……"
13410-323 = "我不能因為這份痛苦而停滯不前，應該要帶著它繼續向前邁進才對。"
13410-326 = "但那些再也找不回來的珍貴事物呢……？"
13410-331 = "我們真的有辦法讓過去的事過去嗎……？"
13410-334 = "不，白子醬。#n那是不可能的，因為那些也是我的一部分。"
13410-335 = "可是……如果我的雙手一直緊緊抓著那份痛苦不放……"
13410-336 = "我就無法回應那些向我伸出的手了。"
13410-343 = "所以……"
13410-344 = "所以我想……"
13410-354 = "不對……肯定是弄錯了什麼……這裡……結束了……"
13410-355 = "打從一開始就是場錯誤……我究竟能在這種地方得到什麼領悟……"
13410-356 = "小生我……一定是被送錯地方了……這種……這種世界……"
13410-357 = "「蓋瑪特利亞」跟小生我一點都合不來……！！"
13410-361 = "你說「蓋瑪特利亞」？"
13410-362 = "……！！"
13410-370 = "噫，噫噫噫噫噫──！？#n死，死死死神……！？你，你怎麼會出現在這裡……！？"
13410-371 = "所有蓋瑪特利亞的人應該都已經死在我的手下了。#n看來似乎還剩下一個呢。"
13410-372 = "這，這這這道來路不明的光是……？#n這種無法言喻的力量……竟然能夠追蹤我……？"
13410-373 = "那，那些傢伙究竟做了什麼……？#n他們把什麼東西呼喚到了這個世界……？"
13410-374 = "你說過在尋找死亡的意義對吧？#n需要我助你一臂之力，好讓你親身領悟它的真諦嗎？蓋瑪特利亞？"
13410-375 = "噫，噫噫噫噫──！？"
13410-376 = "只要親自體驗一次就會明白了。"
13410-379 = "不，不要……！我不要！！那……！！"
13410-380 = "那種事……！！！"
13410-383 = "……我不會殺你的。"
13410-384 = "雖然本來想這麼做，但我改變心意了。"
13410-385 = "滾回去吧。滾回你的地下。"
13410-386 = "別再回到這裡來了。"
13410-387 = "勸你最好記住──死神就在阿拜多斯，地下生活者。"
13410-398 = "……好苦。"
13410-399 = "好苦……好苦啊……噫噫噫……"
13410-402 = "我好痛苦……好痛苦……"
13410-403 = "好痛苦……"
13410-408 = "確認。我方與地下生活者的連結已完全切斷。"
13410-409 = "……是，地下生活者今後再也無法來到這裡了，老師。"
13410-410 = "[s]「辛苦你們了，彩奈，星奈。」"
13410-411 = "先前碰到的那股「色彩」的力量，如今也已完全耗盡。#n以後不會再有人使用這股力量了。"
13410-412 = "話說回來，另一個白子同學……"
13410-413 = "確認，與砂狼白子之間的連結……"
13410-414 = "……"
13410-415 = "星奈……？"
13410-417 = "與砂狼白子之間的連結已遭到切斷……"
13410-418 = "咦！？"
13410-419 = "[s]「怎麼會！？難道出了什麼事嗎！？」"
13410-420 = "……是砂狼白子主動切斷了連接。#n這是……"

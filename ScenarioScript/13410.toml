13410-373 = "Wh-What have they done...? What manner of monstrosity did they invite to this world...?"
13410-374 = "You're searching for the truth of death, correct? Allow me to personally enlighten you, Gematria. Shall we?"
13410-375 = "E-Eeek?!"

1600320-33 = "3;스즈미;99;별 건 아니고, 순찰 시에 제가 곧 잘 쓰는 헤드폰입니다만……."
1600320-34 = "3;스즈미;99;죄송합니다. 선생님 앞인데, 급하게 오느라 벗는 걸 잊어버렸습니다. 당연히 노래는 꺼 둔 상태였고 단지…….\n#3;m3\n#3;em;[땀]"
1600320-35 = "3;스즈미;04;……아, 아닙니다. 잡설이 길었군요. 어서 출발하시죠. 일정은 알려주셨으니 앞장서겠습니다."

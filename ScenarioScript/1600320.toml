1600320-90 = "3;스즈미;99;음……. 잘 모르겠습니다. 새로 사고 싶다는 생각이 안 드는 걸 보니, 아무래도 수리점에 맡겨서 고칠 것 같네요."
1600320-91 = "[s10] \"뭐, 오랜 시간 함께한 동료니까.\"\n[s11] \"헤드폰도 순찰 파트너 중 하나니까.\""

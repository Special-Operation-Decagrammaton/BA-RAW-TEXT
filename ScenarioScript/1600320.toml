1600320-50 = "3;스즈미;04\n#3;em;[?!]\n#3;shake\n#wait;1200"
1600320-51 = "3;스즈미;04;네, 네!? 아, 그, 그건…….\n#3;stiff"
1600320-52 = "3;스즈미;01;음……."
1600320-53 = "3;스즈미;04;죄송합니다. 괜한 소리를 안 하려던 게, 오히려 신경 쓰이게 만드신 것 같군요."
1600320-54 = "3;스즈미;04;다른 건 아니고, 그……. 아까 전의 헤드폰 때문입니다만…….\n#3;em;[한숨]\n#3;greeting"
1600320-55 = "3;스즈미;99;사실……"
1600320-56 = "3;스즈미;99;아무래도 선생님께 불필요한 인상을 드리지 않았을까 하는 걱정을……. 하고 있었습니다."
1600320-57 = "[s5] \"불필요한 인상?\"\n[s6] \"걱정하고 있었다고?\""
1600320-58 = "#wait;10"
1600320-59 = "#wait;10"
1600320-60 = "3;스즈미;02;네. 아무래도 순찰 활동을 하는 몸인데, 그런 걸 쓰고 있었다는 모습이 뭐랄까…….\n#3;em;[반응]"
1600320-61 = "3;스즈미;02;물론 기본적으로 소리는 작게 틀고 있고, 항상 듣는 것도 아닙니다. 순찰 중 쉴 때 듣는 것……에 가깝지요."
1600320-62 = "3;스즈미;02;긴 순찰을 하다 보면, 아무래도 지루함을 달래 줄 것도 필요하니까요."
1600320-63 = "3;스즈미;04;그렇지만, 그래도 역시 좀……."
1600320-64 = "3;스즈미;99;어쩐지 건성으로 보이지 않을까……. 그런 걱정이 들어서, 저도 모르게 불안해하고 있었던 모양입니다.\n#3;em;[속상함]"
1600320-65 = "3;스즈미;02;……네? "
1600320-66 = "3;스즈미;02;전혀 그렇지 않다고요? 그, 그렇습니까. 그렇다면 다행이지만……."
1600320-67 = "[s7] \"그냥 하는 말이 아니야. 정말이야.\"\n[s8] \"누가 시켜서 하는 일도 아니잖아.\"\n[s9] \"누구를 보여주기 위해 하는 일도 아니고.\""

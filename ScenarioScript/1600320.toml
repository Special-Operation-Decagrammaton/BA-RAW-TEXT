[translation]
1600320-1 = "重要的夥伴"
1600320-2 = "（發送已經抵達的訊息給鈴美）"
1600320-6 = "（不久後便看見了鈴美從遠處走來的身影）"
1600320-11 = "哈啊……哈啊。真，真是不好意思，老師。#n讓你久等了……"
1600320-12 = "……啊。"
1600320-20 = "……失，失禮了。"
1600320-21 = "[s1]「咦，發生什麼事了嗎？」\n[s2]「為什麼要把耳機拿下來呢？」"
1600320-24 = "啊，不，沒什麼……"
1600320-25 = "……不好意思，應該早點拿下耳機的。"
1600320-32 = "這，這是那個……"
1600320-33 = "是我巡邏時常常會使用的耳機……"
1600320-34 = "來的時候太匆忙，所以就忘記拿下來了……#n當，當然歌曲早就暫停了，只是……"
1600320-35 = "……不，沒什麼。耽誤到老師的時間了呢。#n延誤老師的行程就不好了，我這就帶老師過去。"
1600320-36 = "那，那麼，請跟我來……"
1600320-44 = "…………"
1600320-45 = "[s3]「鈴美，你還好嗎……？」\n[s4]「看起來有點心不在焉，發生什麼事了嗎……？」"
1600320-51 = "咦，咦！？啊，那個……"
1600320-52 = "唔嗯……"
1600320-53 = "不好意思。反而造成老師的困擾了呢。"
1600320-54 = "那個……是關於剛才耳機的事。"
1600320-55 = "在那之後我一直很在意……"
1600320-56 = "是不是讓老師留下了不好的印象了……"
1600320-57 = "[s5]「不好的印象……？」\n[s6]「是指……什麼意思？」"
1600320-60 = "那個……明明是在做自衛隊的巡邏工作，卻還帶著耳機，之類的……"
1600320-61 = "當然，我會控制音量，而且也不是隨時都在聽。#n基本上只有在巡邏休息時才會聽。"
1600320-62 = "但是……巡邏時間拖得太長的話，偶爾也會想轉換一下心情……"
1600320-63 = "絕對沒有想對自衛隊的活動敷衍了事的意思。"
1600320-64 = "但是，讓老師看見我的那副模樣，會不會給老師留下奇怪的印象之類的。#n讓我……有點擔心。"
1600320-65 = "……咦？"
1600320-66 = "你不會放在心上是嗎？#n那，那真是太好了……"
1600320-67 = "[s7]「我是打從心底這麼想的唷。」\n[s8]「因為我知道鈴美總是很努力。」\n[s9]「即使是在我沒看到的地方也一樣。」"
1600320-71 = "那是……"
1600320-72 = "…………"
1600320-73 = "…………嗯。"
1600320-74 = "謝謝老師。#n看來是我過度在意讓老師留下的印象，反而忘記了重要的事了呢。"
1600320-75 = "明明巡邏是以我自己的意志開始做的事情。"
1600320-76 = "明明平常完全不會在意這種事，不過一旦在老師面前，我似乎就難以維持自己的步調了呢……"
1600320-77 = "得好好反省一下才行。"
1600320-78 = "……但是，多虧老師這麼說，我覺得心情輕鬆多了。"
1600320-79 = "真是非常感謝，老師。"
1600320-80 = "……嗯？"
1600320-81 = "耳機嗎？#n不，並沒有做什麼改造。"
1600320-82 = "只是店裡賣的平凡無奇的東西而已。"
1600320-83 = "也就是我用了很久而已吧……？#n除此之外並沒有什麼特別的地方。"
1600320-84 = "因為時常在外面使用，稍微有點損傷。"
1600320-85 = "巡邏中有時也會在戴著的情況下進行戰鬥，所幸還沒有碰上損壞的情況。"
1600320-86 = "如果壞掉的話？"
1600320-90 = "唔嗯……#n我想應該會送去修理，繼續使用吧。"
1600320-91 = "[s10]「你很珍惜它呢。」\n[s11]「耳機對鈴美來說也是夥伴呢。」"
1600320-94 = "夥伴……"
1600320-95 = "是呢……聽老師這麼說，我似乎也能理解。"
1600320-96 = "……呵呵。"
1600320-97 = "只要和老師在一起……就算只是稀鬆平常的話題，也能讓人覺得非常開心呢。"
1600320-98 = "……真是股奇妙的感覺。"
1600320-99 = "我一直都認為自己是獨自一人在巡邏，看來並非如此呢。我的槍和耳機總是在身旁陪著我。"
1600320-100 = "[s12]「嗯，而且還有我唷。」\n[s13]「隨時都可以找我哦。當然，巡邏之外的事也可以。」"
1600320-103 = "……什。"
1600320-107 = "……唔。"
1600320-108 = "那個，唔嗯……"
1600320-109 = "不，不好意思。突然不知道該如何回答。"
1600320-111 = "很感謝老師的好意，不過老師不必做到這種程度的。"
1600320-112 = "老師非常忙碌，這點我也很清楚。"
1600320-113 = "所以……"
1600320-116 = "……唔嗯。"
1600320-117 = "……不好意思，剛剛的話當作沒說過……可以嗎？"
1600320-118 = "我一直都很感謝老師。"
1600320-119 = "在繁忙的工作中還願意為我著想……真是感激不盡。#n如果老師不介意的話，偶爾也沒關係……"
1600320-120 = "……希望……"
1600320-126 = "……不。#n就拜託您了，老師。"

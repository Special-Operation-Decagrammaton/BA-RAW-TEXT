1600320-95 = "3;스즈미;02;그렇지만……. 네. 어째서인지 말씀해 주신 바를 알 것 같은 기분입니다.\n#3;greeting"
1600320-96 = "3;스즈미;03;……하하……."
1600320-97 = "3;스즈미;03;제가 했을 땐 전혀 재미없는 이야기였는데, 선생님께서 특별한 이야기로 바꿔 주셨네요."
1600320-98 = "3;스즈미;02;……묘한 기분입니다."
1600320-99 = "3;스즈미;02;제 총도 그렇고……. 아무래도 지금까지, 순찰을 혼자 도는 게 아니었을지도 모르겠습니다."

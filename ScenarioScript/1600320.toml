1600320-117 = "3;스즈미;04;……아닙니다. 죄송하지만, 방금 말은 없었던 걸로 해도 괜찮을까요?"
1600320-118 = "3;스즈미;02;역시……. 지금은 죄송하다는 말씀보다, 감사하다는 말씀을 드리고 싶습니다."

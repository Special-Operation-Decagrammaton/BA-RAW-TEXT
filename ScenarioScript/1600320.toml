1600320-73 = "3;스즈미;02;……후…….\n#3;em;[한숨]\n#3;greeting"
1600320-74 = "3;스즈미;02;그러네요. 하긴, 의식하는 게 오히려 이상한 일이겠군요. 지역 순찰이라는 건……."
1600320-75 = "3;스즈미;02;단지 스스로, 주변을 둘러보고자 시작했던 일이었는데 말이에요."
1600320-76 = "3;스즈미;04;평소라면 하지도 않았을 생각인데, 괜히 선생님 곁이라고 의식하고 있었던 것 같습니다."
1600320-77 = "3;스즈미;04;흐트러졌군요. 반성해야 할 부분입니다."
1600320-78 = "3;스즈미;99;……그래도 그렇게 말씀해주신 덕분에, 마음이 많이 편해졌습니다."
1600320-79 = "3;스즈미;99;정말 감사드립니다, 선생님. 정말입니다.\n#3;greeting"
1600320-80 = "3;스즈미;02;……네?\n#3;em;[?]"
1600320-81 = "3;스즈미;02;헤드폰이요? 특별히 개조라던가……. 혹은 스스로 만든 거냐고요?"
1600320-82 = "3;스즈미;01;아니요. 저에게 그런 기술은 없습니다. 이건 전혀 특별할 게 없는, 가게에서 파는 평범한 제품입니다."
1600320-83 = "3;스즈미;01;굳이 특이한 점을 뽑자면……. 조금 오래되고 낡았다는 것 정도겠군요.\n#3;em;…"
1600320-84 = "3;스즈미;01;구입한 지도 꽤 되었고, 순찰을 길게 돌 때에는 자주 쓰곤 했었으니까요."
1600320-85 = "3;스즈미;02;어떨 때는 쓴 채로 교전에 임하기도 했습니다만……. 운이 좋았던 건지, 아직도 무사합니다."
1600320-86 = "3;스즈미;99;만약 유사시의 상황으로 부서지거나 한다면……."
1600320-87 = "#st;[0,0];instant;1;"
1600320-88 = "#clearST"

[translation]
1600320-1 = "สหายคนพิเศษ"
1600320-2 = "(คุณครูติดต่อไปหาสึซึมิ หลังจากมาถึงที่ทรีนิตี้)"
1600320-6 = "(ไม่นานนัก คุณครูก็เห็นสึซึมิเดินมาจากที่ไกลๆ)"
1600320-11 = "มาถึงแล้วค่ะคุณครู ไม่นึกเลยว่าคุณครูจะมาถึงที่นี่ก่อน..."
1600320-12 = "...อ่า"
1600320-20 = "...ขะ...ขอโทษค่ะคุณครู..."
1600320-21 = "[s1] \"หืม? ตกใจอะไรเหรอ?\"\n[s2] \"เมื่อกี้รีบร้อนถอดอะไรน่ะ?\""
1600320-24 = "อ้อ เอ่อ คือว่า... ไม่มีอะไรหรอกค่ะ..."
1600320-25 = "นะ...นี่ค่ะ "
1600320-32 = "นะ...นี่คือ... เอ่อ... "
1600320-33 = "ไม่ใช่ของพิเศษอะไรหรอกค่ะ แค่หูฟังที่ฉันใส่ประจำตอนออกลาดตระเวน..."
1600320-34 = "ขอโทษค่ะ ฉันรีบมาหาคุณครูก็เลยลืมถอดออกค่ะ นะ...แน่นอนว่าฉันปิดเพลงไปแล้ว..."
1600320-35 = "มะ... ไม่มีอะไรหรอกค่ะ ฉันมัวแต่พูดอะไรเรื่อยเปื่อยไปเอง เรารีบไปกันเถอะค่ะ คุณครูส่งตาราง#nงานมาให้ฉันแล้ว เดี๋ยวฉันจะนำทางไปเองค่ะ"
1600320-36 = "เชิญทางนี้ค่ะ..."
1600320-44 = "......"
1600320-45 = "[s3] \"เป็นอะไรรึเปล่า สึซึมิ...?\"\n[s4] \"ดูเหมือนมีอะไรกวนใจมาตั้งแต่เมื่อกี้แล้วนะ\""
1600320-51 = "คะ...คะ? อา... คะ...คือเรื่องนั้น..."
1600320-52 = "อืม..."
1600320-53 = "ขอโทษค่ะ ฉันคิดว่าไม่ควรพูดเรื่องนั้นออกมา แต่ดูเหมือนจะทำให้คุณครูกังวลมากกว่าเดิมเลยนะคะ"
1600320-54 = "ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ คือ...เรื่องหูฟังเมื่อกี้นี้น่ะค่ะ"
1600320-55 = "ที่จริงแล้ว..."
1600320-56 = "ฉันกังวลว่าจะทำให้คุณครูรู้สึกไม่สบายใจหรืออึดอัดอะไรรึเปล่า...ก็เท่านั้นค่ะ"
1600320-57 = "[s5] \"รู้สึกอึดอัด?\"\n[s6] \"กังวลเรื่องนั้นอยู่เหรอ?\""
1600320-60 = "ค่ะ... ทั้งๆ ที่ฉันทำหน้าที่ลาดตระเวนอยู่แท้ๆ แต่กลับใส่ของแบบนั้นเดินไปมา... "
1600320-61 = "แน่นอนว่าฉันเปิดให้เสียงเบาที่สุด แล้วก็ไม่ได้ใส่อยู่ตลอดด้วยค่ะ เรียกว่าเอาไว้ฟังตอนพัก... ระหว่าง#nลาดตระเวนก็ได้ค่ะ"
1600320-62 = "เวลาเดินลาดตระเวนไกลๆ ต้องมีของไว้แก้เบื่อบ้างน่ะค่ะ"
1600320-63 = "แต่ยังไงการทำแบบนั้น..."
1600320-64 = "มันอาจจะดูเหมือนคนไม่รอบคอบรึเปล่า... พอคิดเรื่องนั้น เลยทำให้ฉันกังวลขึ้นมาโดยไม่รู้ตัวน่ะค่ะ"
1600320-65 = "...คะ? "
1600320-66 = "คุณครูไม่ได้คิดแบบนั้นเลยงั้นเหรอคะ? งะ...งั้นเหรอคะ ถ้างั้นก็ค่อยยังชั่วหน่อย..."
1600320-67 = "[s7] \"ครูพูดจริงๆ นะ\"\n[s8] \"ไม่ได้มีใครกำหนดวิธีการลาดตระเวนสักหน่อยนี่นา\"\n[s9] \"สึซึมิไม่ได้ตั้งใจใส่ให้ใครดูสักหน่อยนี่นา\""
1600320-71 = "...เรื่องนั้น..."
1600320-72 = "......"
1600320-73 = "...เฮ้อ..."
1600320-74 = "นั่นสิคะ การกังวลเรื่องนั้นก็ดูแปลกๆ กว่าอีกนะคะ ส่วนการลาดตระเวนน่ะ..."
1600320-75 = "ฉันก็แค่เดินตรวจตราไปรอบๆ ก็เท่านั้นเองค่ะ"
1600320-76 = "ปกติฉันก็ไม่กังวลอะไรแบบนี้หรอกค่ะ แต่พอคุณครูเดินอยู่ข้างๆ แบบนี้ จู่ๆ ก็เลยเผลอคิดมากน่ะค่ะ"
1600320-77 = "คง...ลำบากใจสินะคะ ฉันจะเก็บเรื่องนี้ไปทบทวนและสำนึกตนเองค่ะ"
1600320-78 = "...แต่ว่าที่คุณครูพูดมาเมื่อกี้นี้ ทำให้ฉันสบายใจขึ้นมากเลยค่ะ"
1600320-79 = "ขอบคุณค่ะคุณครู... "
1600320-80 = "...คะ?"
1600320-81 = "หูฟังสั่งประกอบพิเศษ... หรือว่าทำขึ้นเองรึเปล่างั้นเหรอคะ?"
1600320-82 = "เปล่าหรอกค่ะ ไม่ใช่ของพิเศษอะไรแบบนั้นหรอกค่ะ ก็แค่หูฟังธรรมดาๆ ที่วางขายทั่วไปเองค่ะ"
1600320-83 = "แต่ถ้าพูดถึงจุดเด่นละก็... คงเป็นเรื่องที่ใช้มานานจนเก่าแล้วล่ะมั้งคะ"
1600320-84 = "ฉันซื้อมานานแล้ว และก็มักเอามาใช้ตอนเดินลาดตระเวนไกลๆ ค่ะ"
1600320-85 = "บางครั้งก็ต่อสู้ทั้งๆ ที่ยังใส่หูฟังอยู่ด้วยค่ะ... จะเรียกว่าโชคดีก็ได้นะคะ ที่มันยังอยู่รอดปลอดภัย#nจนถึงตอนนี้น่ะค่ะ"
1600320-86 = "ถ้าเกิดมันพังขึ้นมา..."
1600320-90 = "อืม... ไม่รู้สิคะ ฉันไม่ค่อยอยากซื้อใหม่เท่าไร คงจะเอาไปซ่อมที่ร้านรับซ่อมอุปกรณ์ล่ะมั้งคะ"
1600320-91 = "[s10] \"เป็นเพื่อนร่วมทางที่อยู่ด้วยกันมานานนี่นะ\"\n[s11] \"หูฟังนี่เป็นคู่หูลาดตระเวนอย่างหนึ่งของสึซึมิสินะ\""
1600320-94 = "พูดเหมือนเจ้านี่มีชีวิตเลยนะคะ..."
1600320-95 = "แต่ก็... ไม่รู้เพราะอะไร ฉันคิดว่าเข้าใจความหมายที่คุณครูพูดค่ะ"
1600320-96 = "ฮะฮะ..."
1600320-97 = "ตอนที่ฉันพูดมันดูเป็นเรื่องที่ไม่สนุกเลยแท้ๆ แต่คุณครูกลับเปลี่ยนเป็นเรื่องที่พิเศษได้ด้วยนะคะ"
1600320-98 = "...รู้สึกแปลกจังเลยค่ะ"
1600320-99 = "ฉันมีทั้งหูฟัง แล้วก็ปืนอยู่ด้วย... ที่ผ่านมา ฉันอาจไม่ได้ลาดตระเวนคนเดียว...ก็ได้นะคะ"
1600320-100 = "[s12] \"แน่นอนว่าสึซึมิก็มีครูอยู่ด้วยนะ\"\n[s13] \"เรียกครูได้ตลอดเลยนะ ไม่ต้องเรื่องลาดตระเวนก็ได้\""
1600320-103 = "...คะ..."
1600320-107 = "...อ่า"
1600320-108 = "คือว่า... อะ... อืม..."
1600320-109 = "ขะ...ขอโทษค่ะ จู่ๆ ฉันก็พูดไม่ออก..."
1600320-111 = "ขอบคุณนะคะ... แต่ไม่เป็นไรค่ะ"
1600320-112 = "ฉันรู้ว่าคุณครูคงไม่มีเวลา เพราะต้องรับผิดชอบงานใหญ่ที่สำคัญกว่าอยู่ค่ะ..."
1600320-113 = "เพราะงั้น..."
1600320-116 = "...อืม..."
1600320-117 = "...ไม่มีอะไรค่ะ ขอโทษด้วยนะคะ ที่ฉันพูดไปเมื่อกี้ ช่วยลืมไปได้มั้ยคะ?"
1600320-118 = "ตอนนี้... แทนที่จะพูดว่าขอโทษ ฉันควรจะขอบคุณคุณครูมากกว่าสินะคะ"
1600320-119 = "ขอบคุณนะคะสำหรับคำพูดเมื่อกี้นี้นะคะ และ... ถ้าคุณครูบอกว่าไม่เป็นไรละก็ เอาไว้เวลาว่างๆ..."
1600320-120 = "...ฉันก็อยากขอรบกวน... ไม่สิ"
1600320-126 = "...รบกวนมาลาดตระเวนด้วยกันอีกนะคะ คุณครู"

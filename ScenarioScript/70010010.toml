[translation]
70010010-1 = "手動時代的終結（１）"
70010010-2 = "千年博覽會電腦工程館"
70010010-3 = "那麼，現在即將開始展示！"
70010010-4 = "在開始之前，我想先感謝今天特別撥冗前來交流的、來自赤冬事務局的各位貴賓！"
70010010-8 = "準備與咱相配的盛大款待，真是有勞各位了。"
70010010-9 = "咱就是赤冬的學生會長，同時也是環境美化部長兼、學生會長兼、書記長兼、#n體育部代表兼、整潔部部長兼、風紀委員長兼、供餐部長兼──"
70010010-10 = "本月最優秀布丁試吃家兼，赤冬科學學院議長的潔莉諾大人！"
70010010-11 = "本次能夠為了進一步培育赤冬超越尖端的科學技術而參訪千年博覽會，咱倍感榮幸。"
70010010-12 = "感謝您的說明，潔莉諾會長！#n那麼事不宜遲，請容我立刻為各位介紹千年的傑作──超級電腦SEN 9000！"
70010010-17 = "超級電腦？這台電腦既沒有螢幕也沒有鍵盤耶？"
70010010-18 = "那是因為，我是透過影像辨識與語音來進行輸入和輸出！"
70010010-24 = "您好！赤冬的學生會長兼，環境美化部部長兼、學生會長兼、書記長兼、#n體育部代表兼、整潔部部長兼、風紀委員長兼、供餐部兼──"
70010010-25 = "本月最優秀布丁試吃家兼，赤冬科學學院議長的潔莉諾大人！#n歡迎蒞臨千年科學學院。"
70010010-26 = "怎，怎麼回事！？這是什麼東西！！#n為什麼會突然對咱說話！？"
70010010-27 = "而且居然只聽一次就記住了咱的所有頭銜！"
70010010-28 = "（甚至連潔莉諾會長自我介紹時的口誤都模仿得唯妙唯肖……）"
70010010-29 = "（原來這不是只有我才做得到的事啊……！）"
70010010-31 = "哎呀，這可真是失禮了。#n我才說到要介紹，SEN 9000就忍不住搶先回答了呢。"
70010010-32 = "由於SEN 9000搭載了對話模型，#n就算不用鍵盤輸入也能理解自然語言的指令並給予回覆。"
70010010-33 = "SEN 9000，我們來示範一下吧。#n可以告訴我你擅長的領域嗎？"
70010010-34 = "沒問題！我擅長的是數學運算，以及盡可能準確地回答各位好奇的問題！"
70010010-35 = "那麼就先從數學開始吧。#n你可以解開這個問題嗎？"
70010010-37 = "嗚哇……雖然說是數學，但是幾乎沒有數字呢。"
70010010-38 = "哎呀，問題還是手寫的呢。#n那台機器真的能看懂嗎？"
70010010-40 = "……"
70010010-41 = "哼，那種東西怎麼可能答得出來。"
70010010-42 = "咱們沒有的技術，其他學園也不可能存──"
70010010-43 = "哎呀，真是的！我居然忘記開音量，就在那邊一個人自言自語。"
70010010-44 = "答案是42。要問更難的問題也沒關係哦？#n就算只是示範，也不用對我太手下留情的。"
70010010-50 = "答對了──！#n這傢伙因為具備基礎程度的語言模型學習能力，最近已經學會像這樣開玩笑了呢。"
70010010-51 = "那麼接著就來嘗試回答問題吧？#n既然赤冬的各位都來了，要不要請學生會長親自提問呢？"
70010010-52 = "咱，咱嗎！？"
70010010-53 = "在整個赤冬的校區內，一共有幾座咱的銅像？"
70010010-54 = "怎麼樣，這種問題你答不出來吧？"
70010010-56 = "總計是199座，另外還有1座預計將於下個月初揭幕。"
70010010-57 = "上述資料取自公開的社群媒體、網路版《赤熊》和公開新聞稿，因此可能存在誤差。"
70010010-58 = "此外根據統計，其中有兩位數以上的銅像，通常會在隔週左右損壞。"
70010010-59 = "覺得如何呢？有幫上您的忙嗎？"
70010010-60 = "居然連1秒都沒猶豫就回答了……？"
70010010-61 = "相當精準呢……"
70010010-63 = "除了這些之外，他還擁有各式各樣的才能哦。#n接下來請看這個──"
70010010-64 = "唔，唔嗯……"
70010010-72 = "那麼今天的演示就到這邊結束！謝謝大家！"
70010010-74 = "哇，真的太厲害了。簡直無所不能嘛！"
70010010-75 = "千年的技術，真是太驚人了……"
70010010-77 = "也再次感謝赤冬的各位貴賓前來參觀！"
70010010-78 = "唔，唔唔……"
70010010-84 = "無，無聊！！"
70010010-90 = "雖然確實是個有趣的玩意，但這種東西在偉大的赤冬也有！"
70010010-91 = "咱們的超級電腦甚至還更大更溫暖呢！"
70010010-92 = "（會長，那樣的電腦並不值得炫耀……）"
70010010-96 = "赤冬也有在運用超級電腦嗎？"
70010010-97 = "因為赤冬並沒有參加電腦研究學會，所以我完全不知道呢。"
70010010-98 = "那，那是因為性能太好，所以被列為極機密事項的緣故！"
70010010-99 = "既然千年的技術終於追到這個水準，咱才放心告訴你們的！"
70010010-100 = "好厲害！真令人期待呢！"
70010010-101 = "如果哪天有空的話，咱會邀請你來赤冬的。#n到時候再讓你好好見識一下。"
70010010-103 = "那我下週一就過去！"
70010010-104 = "……咦？"
70010010-105 = "因為我那個時間有空，而且剛好有事要去附近處理！"
70010010-106 = "一直以來都被蒙在神祕面紗中的、赤冬的尖端技術……#n能有機會參觀真是太榮幸了！那就萬事拜託了！"
70010010-110 = "哦，哦哦！下週一對吧！"
70010010-111 = "咱一定會讓你見識赤冬的偉大的！"
70010010-114 = "怎麼辦？"
70010010-115 = "他說下週就要過來，可是根本沒有超級電腦啊？"
70010010-116 = "潔莉諾會長，要不要配合他來訪的時間，誘導不肖份子發動政變呢？"
70010010-117 = "雖然是個好主意……可是因為上次太成功的關係，弄得復位的時候很麻煩。#n咱暫時不想搞革命了。"
70010010-118 = "唔嗯……如果好好找找的話，咱們說不定也有超級電腦之類的東西吧？#n或者乾脆現在做一台不行嗎？"
70010010-122 = "潔莉諾會長，已經收到要求183號特別班提供的技術估價單了。"
70010010-123 = "理論研究已經完成，據說連驅動該軟體的電腦設計圖也畫好了。"
70010010-124 = "真的嗎！？#n智惠最厲害了！做得好！"
70010010-125 = "立刻開始製作！#n以事務局的權限，動員赤冬所有的資產與人力！"
70010010-126 = "是，會長。以下是估價單的內容。#n考量到赤冬目前的電子工程技術……"
70010010-127 = "需要真空管1600億個。"
70010010-128 = "為了供應運作所需的電力，需要建設27座發電廠。"
70010010-129 = "並且還需要建造3座新市鎮，供負責維護保養的常駐員工居住。#n除此之外……"
70010010-131 = "……嗯？"
70010010-132 = "為了確保設施用地，必須剷平8座山。"
70010010-133 = "咦咦……"
70010010-134 = "如果投入全體人力，以無休假輪班制每日工作16小時的話……"
70010010-135 = "估計需要6個世紀才能完工。"
70010010-136 = "……"
70010010-137 = "要開始進行嗎？"
70010010-139 = "他下週就要來了，得花6個世紀叫咱拿什麼給他看啊！！"
70010010-143 = "哈，哈啾！！"
70010010-145 = "（緊張到口好渴，得喝杯水才行）"
70010010-149 = "（智惠祕書室長也真是辛苦了。幸好沒牽扯到保安委員會──）"
70010010-153 = "（嗆，嗆到水了──！）"
70010010-154 = "咳，咳咳！"
70010010-159 = "瑪麗娜，你剛才是在偷笑嗎？"
70010010-160 = "是不是在想咱吹牛吹過頭，這下真的要出大事了？"
70010010-162 = "不，不是的！！同志！！#n咳，咳咳！！不是那樣的！！"
70010010-163 = "要不然……是因為咱的鬍子掉了很可笑嗎？"
70010010-164 = "不是的，是因為水──"
70010010-165 = "「水」？是在說咱的領導能力山窮「水」盡，根本做不出超級電腦嗎？"
70010010-167 = "（不，不行！！再這樣下去會被肅清的！！）"
70010010-168 = "水……"
70010010-172 = "我是說以赤冬的「水準」當然沒問題！！#n事實上，保安委員會已經開始準備了！！"
70010010-173 = "什麼？是，是真的嗎！？"
70010010-174 = "沒錯！不肖瑪麗娜會負起責任，在下週之前做好準備的！"
70010010-175 = "瑪麗娜。"
70010010-176 = "是，是！！！"
70010010-181 = "能有瑪麗娜在身邊，咱真的感到很欣慰。"
70010010-182 = "謝謝你總是為了赤冬和咱盡心盡力。"
70010010-183 = "這件事就交給你處理了。#n如果能夠順利完成，咱就授予你「一級鬍子勞動勳章」……"
70010010-184 = "不，那樣太小家子氣了！"
70010010-185 = "咱就授予你「赤冬聯邦英雄」勳章吧！"
70010010-186 = "請儘管交給我吧，會長！"
70010010-192 = "……怎麼辦？"
70010010-193 = "他說下週就要過來，可是根本沒有超級電腦啊？"
70010010-198 = "問我怎麼辦？"
70010010-199 = "你身為壓迫者，難道還想求助於我們這些勞動大眾嗎？"
70010010-200 = "哈哈哈！！看來你是要大難臨頭了啊！幸好不關我的事！！"
70010010-201 = "我可以拿來當搞笑漫畫的題材嗎？#n笑到我都快喘不過氣了耶！"
70010010-202 = "前輩，在畫搞笑漫畫前請先趕上截稿日吧。#n要是沒趕上的話，前輩也一樣會大難臨頭的哦。"
70010010-203 = "嗚嗚……"
70010010-207 = "呣呵呵。這下可是要丟臉丟到家了呢。#n瑪麗娜同志，要不要我先幫你做個採訪呀？"
70010010-208 = "下一期《赤熊》的封面就由你擔任，#n標題就寫「因為一口水而被肅清的保安委員長」吧。"
70010010-209 = "這個故事已經愚蠢到，就算說是紀實文學也不具備任何文學價值了呢。"
70010010-210 = "滿分10分的話，我給你2分。"
70010010-212 = "你怎麼突然打起分數了？"
70010010-213 = "因為我發現就算努力寫了評論，大部分的人似乎也都不痛不癢……#n所以從昨天開始嘗試採用評分制了。"
70010010-214 = "至於Meruri同學現在的原稿大概是0分吧。#n畢竟總得先完成才能被稱之為作品。"
70010010-215 = "既然現在眼前有個比我更慘、更有趣的人，可以先把話題轉回他身上嗎？"
70010010-217 = "你們想怎麼嘲笑我都無所謂，能不能想辦法幫幫我……？"
70010010-218 = "我拒絕。我可不打算為壓迫者的爪牙效勞。"
70010010-219 = "我……不對，我們為什麼非得幫你的忙不可呢？"
70010010-220 = "那個，其實是有原因的……"
70010010-221 = "當時我因為太慌張的關係，在被會長問到要跟誰一起做的時候……"
70010010-222 = "就把腦袋裡浮現的……你們所有人的名字都報了出來……"
70010010-223 = "說是……我們大家會同心協力一起做出來……"
70010010-230 = "什麼！？！？"
70010010-231 = "1分，是1分才對！！#n你這個人是瘋了嗎！？"
70010010-232 = "你是水鬼嗎！？為什麼要把我們也拖下水啦！！"
70010010-233 = "噫噫噫！！我們也會被肅清的！！"
70010010-235 = "居然報上了我們的名字？#n壓迫我們還不夠，連失策的責任也要推給民眾嗎？"
70010010-236 = "哎呀，是藉由編造連帶關係人來稀釋責任的手法啊……#n難道我們跟你有什麼深仇大恨？"
70010010-238 = "不，不是的！那個……我是一時慌張才會想到什麼就說什麼。#n真的沒有惡意。"
70010010-239 = "或許……是因為經常跟你們有來往的關係，不自覺地把你們當成了朋友吧。"
70010010-241 = "朋友……？"
70010010-242 = "嗯？"
70010010-244 = "當，當我沒說過吧……#n擅自說出了你們的名字，真的很抱歉……"
70010010-245 = "如果你們也無能為力的話，我會負責去向會長實話實說，不讓你們受到冤枉的。"
70010010-246 = "既然把你們當成朋友，就該更謹慎一點的……對不起。"
70010010-250 = "我給你……9分。 "
70010010-251 = "喂！！你這傢伙，從來沒有給過我的漫畫這麼高分吧！"
70010010-252 = "比起真實的人類故事帶來的感動，Meruri同學還差得遠呢。"
70010010-253 = "因為把對方當成朋友而想依賴對方……要人怎麼能不心軟呢。"
70010010-255 = "居然被當成朋友了……我們的保安委員長不可能這麼可愛。"
70010010-256 = "唔嗯，還真令人驚訝呢？#n那位瑪麗娜委員長居然想交朋友……這可是條獨家新聞啊。呣呵呵。"
70010010-258 = "我們果然不是朋友嗎……對不起，看來是我自作多情了。"
70010010-260 = "沒，沒有啦！我們不是沒把你當朋友的意思！"
70010010-261 = "只是不知道該怎麼幫忙而已……大家都是這樣想的吧！？對吧！？"
70010010-262 = "嗯……就算赤冬全體動員都要花600年才能做出來的東西，只靠我們5個人幫忙……"
70010010-263 = "扣掉現在連截稿日都趕不上、還在飯桌前趕稿的愛瑠前輩……就只剩4個人了呢。"
70010010-264 = "就說快畫好了嘛！"
70010010-266 = "池倉瑪麗娜。赤冬事務局成員兼保安委員長。"
70010010-267 = "沒想到身為壓迫者的走狗與左右手的你，居然把我們當成「朋友」。"
70010010-273 = "歡迎自願成為同志，瑪麗娜！"
70010010-274 = "同，同志！？"
70010010-276 = "實里同學！？"
70010010-277 = "哎呀，事情竟然會朝這個方向發展？"
70010010-278 = "天底下不是沒有白吃的午餐嗎？"
70010010-279 = "部長，你現在這頓午餐不就是白吃的嗎？#n那是因為廚房罷工才發放的免費食物啊。"
70010010-280 = "這只是轉嫁給社會成本而已，所以並不是白吃的哦？"
70010010-282 = "瑪麗娜啊，看來你是在畏懼壓迫者暴政的同時，產生了共同的階級意識吧。"
70010010-283 = "睜開眼睛，加入抗爭的前線吧！#n我會幫忙分擔同志的煩惱的！"
70010010-284 = "很感謝大家的心意，但我不管怎麼想都沒辦法……"
70010010-285 = "無論材料還是人力……就算整個工務部全員出動也不可能……"
70010010-286 = "感覺乾脆去準備革命還比較現實又經濟……"
70010010-287 = "潔莉諾會長想要的究竟是什麼呢？#n目前為止只聽說是個複雜的機器而已。"
70010010-288 = "那是視察千年博覽會時看到的東西。"
70010010-289 = "無論提出什麼問題都會回答，是台像個大箱子一樣的電腦。"
70010010-291 = "會回答問題的東西？"
70010010-292 = "什麼嘛，那不是很簡單嗎？"
70010010-297 = "……簡單！？"
70010010-299 = "[log]（千年演算科學研究部來訪的前一天）[/log]"
70010010-301 = "瑪麗娜委員長，明天就是千年演算科學研究部來訪的日子了。"
70010010-302 = "你該不會到現在才要跟咱報告，說你因為怠工而沒準備好吧？"
70010010-303 = "絕無此事，會長！"
70010010-304 = "我正打算按照日程演示給會長看呢。"
70010010-305 = "同志們，把用赤冬頂尖技術製作的超級電腦抬上來！"
70010010-311 = "這就是在潔莉諾會長指導下製作的最先進超級電腦──"
70010010-312 = "RFC9001！"
70010010-314 = "RFC……？"
70010010-315 = "是「[ruby=Redwinter Federal Computer]赤冬聯邦電腦[/ruby]」的縮寫，也代表比千年的9000更進一步的意思！"
70010010-316 = "瑪麗娜！！咱一直都相信你辦得到的！！！"
70010010-323 = "瑪麗娜最棒了！！"
70010010-324 = "（唔啊，是潔莉諾會長的極力稱讚……！已經多久沒聽到了啊！！）"
70010010-325 = "咳，咳哼！！為了保障安全性，請將問題寫在紙上並投入這個投遞口！"
70010010-327 = "這傢伙也是什麼都能回答嗎？"
70010010-328 = "那麼……「赤冬的最高領袖是誰呢？」。"
70010010-334 = "怎麼，是故障了嗎？"
70010010-336 = "因，因為設定成必須謹慎發言，所以需要一些時間！"

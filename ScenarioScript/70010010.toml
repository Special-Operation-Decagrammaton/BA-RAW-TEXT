[translation]
70010010-1 = "จุดจบของระบบแมนนวล 1"
70010010-2 = "อาคารวิศวกรรมคอมพิวเตอร์ งานมิลเลเนียม เอ็กซ์โป"
70010010-3 = "เอาละค่ะ งั้นฉันจะเริ่มการสาธิตเลยค่ะ!"
70010010-4 = "ก่อนอื่นฉันขอกล่าวขอบคุณแขกผู้มีเกียรติจากสำนักเลขาธิการเรดวินเทอร์ทุกคนที่มาชมงาน และแลกเปลี่ยนวัฒนธรรมในครั้งนี้ค่ะ!"
70010010-8 = "ขอบใจที่ต้อนรับเราเป็นอย่างดีนะ"
70010010-9 = "เราเชริโน่ ในฐานะประธานนักเรียน หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายทำความสะอาด หัวหน้าฝ่ายกีฬา ประธานกรรมการ และหัวหน้าฝ่ายอาหารของเรดวินเทอร์"
70010010-10 = "นอกจากนี้ยังเป็นผู้ได้รับเลือกให้เป็นนักชิมพุดดิ้งดีเด่นประจำเดือน และเป็นประธานสถาบันวิทยาศาสตร์เรดวินเทอร์!"
70010010-11 = "เรารู้สึกเป็นเกียรติอย่างยิ่งที่ได้มาชมงานมิลเลเนียม เอ็กซ์โป เพื่อพัฒนาเทคโนโลยีทางวิทยาศาสตร์#nของเรดวินเทอร์ให้ดียิ่งขึ้นไปอีก"
70010010-12 = "ขอบคุณที่ช่วยแนะนำตัวค่ะ ท่านประธานเชริโน่! ถ้างั้นเพื่อไม่ให้เป็นการเสียเวลา ฉันขอแนะนำให้รู้จัก <SEN 9000> ซูเปอร์คอมพิวเตอร์ที่เป็นผลงานชิ้นเอกของมิลเลเนียมค่ะ!"
70010010-17 = "ซูเปอร์คอมพิวเตอร์เหรอ? เป็นคอมพิวเตอร์ แต่ทำไมไม่มีหน้าจอกับคีย์บอร์ดล่ะ?"
70010010-18 = "นั่นก็เพราะฉันทำงานโดยการจดจำภาพและรับส่งข้อมูลด้วยเสียงค่ะ!"
70010010-24 = "สวัสดีค่ะ! ท่านเชริโน่ ประธานนักเรียน หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายทำความสะอาด หัวหน้าฝ่ายกีฬา ประธานกรรมการ หัวหน้าฝ่ายอาหารของเรดวินเทอร์"
70010010-25 = "ผู้ได้รับเลือกให้เป็นนักชิมพุดดิ้งดีเด่นประจำเดือน และประธานสถาบันวิทยาศาสตร์เรดวินเทอร์! ยินดีต้อนรับสู่มิลเลเนียมค่ะ"
70010010-26 = "อะ... อะไรเนี่ย?! เครื่องนี้มัน!! ทำไมจู่ๆ ก็พูดกับเราได้ล่ะ?!"
70010010-27 = "แถมยังจำชื่อตำแหน่งอย่างเป็นทางการของเราได้เป๊ะๆ อีก!"
70010010-28 = "(เลียนแบบความผิดพลาดของท่านประธานเชริโน่ตอนแนะนำตัวได้ด้วยงั้นเหรอ)"
70010010-29 = "(ไม่ได้มีแค่ฉันที่ทำได้สินะ...!)"
70010010-31 = "อ๊ะ ขออภัยด้วยค่ะ พอฉันพูดว่าแนะนำตัว SEN 9000 ก็เลยตอบไปโดยอัตโนมัติน่ะค่ะ"
70010010-32 = "SEN 9000 เครื่องนี้มาพร้อมกับระบบสนทนา จึงสามารถเข้าใจและตอบสนองต่อคำสั่งที่เป็นคำพูดได้ โดยไม่ต้องป้อนข้อมูลผ่านคีย์บอร์ดค่ะ"
70010010-33 = "งั้นก็มาสาธิตความสามารถกันเถอะ SEN 9000 ไหนบอกหน่อยว่าเธอถนัดเรื่องอะไรบ้าง"
70010010-34 = "ได้เลยค่ะ! ฉันถนัดเรื่องวิทยาการคำนวณ และตอบในเรื่องที่สงสัยได้อย่างแม่นยำที่สุดค่ะ!"
70010010-35 = "งั้นก็เริ่มจากการคำนวณเลยนะ ไหนลองแก้โจทย์คณิตศาสตร์นี้ซิ"
70010010-37 = "อึก... ไหนบอกว่าเป็นคณิตศาสตร์ แต่โจทย์แทบจะไม่มีตัวเลขเลยล่ะ?"
70010010-38 = "ตายจริง แถมยังเป็นโจทย์ที่เขียนด้วยมือด้วยค่ะ เครื่องจะเข้าใจโจทย์แบบนั้นเหรอคะ?"
70010010-40 = "..."
70010010-41 = "ไม่น่านะ ไม่มีทางตอบอะไรแบบนั้นได้หรอก"
70010010-42 = "เป็นไปไม่ได้ที่โรงเรียนอื่นจะมีเทคโนโลยีที่เราไม่มี..."
70010010-43 = "โอ๊ย! ลืมเพิ่มเสียงตัวเองจนเหมือนพูดอยู่คนเดียวเลยนะคะ สะเพร่าจริงๆ เชียว!"
70010010-44 = "คำตอบคือ 42 ค่ะ ให้ทำโจทย์ที่ยากกว่านี้ก็ได้นะคะ เห็นว่าเป็นการสาธิตความสามารถ ก็เลยลองให้โจทย์ง่ายๆ หรือเปล่าคะเนี่ย?"
70010010-50 = "เป็นคำตอบที่ถูกต้อง! เด็กคนนี้มีความสามารถในการเรียนรู้รูปแบบภาษาขั้นพื้นฐานด้วยน่ะค่ะ หมู่นี้ก็เลยพูดอะไรตลกๆ เหมือนมนุษย์เลย"
70010010-51 = "ต่อไปเป็นการตอบคำถามค่ะ ไหนๆ แขกจากเรดวินเทอร์ก็มาที่นี่แล้ว งั้นท่านประธานนักเรียน ลองตั้งคำถามดูเองเลยมั้ยคะ?"
70010010-52 = "มะ... หมายถึงเราเหรอ?!"
70010010-53 = "งั้นรู้มั้ยว่าในเรดวินเทอร์มีรูปปั้นของเราอยู่กี่อัน?"
70010010-54 = "ว่าไงล่ะ คำถามแบบนี้ตอบไม่ได้ใช่มั้ย?"
70010010-56 = "ปัจจุบันมีทั้งหมด 199 อัน และในต้นเดือนหน้าจะมีเพิ่มอีก 1 อันค่ะ"
70010010-57 = "ข้อมูลนี้อ้างอิงจากบัญชีโซเชียลมีเดียทางการ เว็บบอร์ด <เรดแบร์> และข้อมูลประชาสัมพันธ์อย่างเป็นทางการ จึงอาจมีความคลาดเคลื่อนได้ค่ะ"
70010010-58 = "และตามสถิติแล้ว ปกติรูปปั้นเกินกว่า 10 อันจะถูกทำลายในสัปดาห์ถัดไปค่ะ"
70010010-59 = "เป็นยังไงคะ? ตอบเท่านี้เพียงพอหรือยังคะ?"
70010010-60 = "ตอบแบบไม่ลังเลแม้แต่วินาทีเดียวเลยเหรอ...?"
70010010-61 = "ถูกเผงเลยค่ะ..."
70010010-63 = "นอกจากนี้ SEN 9000 ยังมีความสามารถอื่นอีกมากมาย ถ้าดูจากตรงนี้..."
70010010-64 = "งะ... งื้อ..."
70010010-72 = "ขอจบการสาธิตเพียงเท่านี้ค่ะ! ขอบคุณค่ะ!"
70010010-74 = "ว้าว ยอดเยี่ยมเลย ถามอะไรก็ตอบได้หมดเลยนะ"
70010010-75 = "เทคโนโลยีของมิลเลเนียมช่างน่าทึ่งจริงๆ เลย..."
70010010-77 = "ขอขอบคุณอีกครั้งที่มาชมงานของเรานะคะ แขกจากเรดวินเทอร์ทุกคน"
70010010-78 = "อะ... อึก..."
70010010-84 = "กะ... ก็งั้นๆ แหละ!!"
70010010-90 = "ถึงจะเป็นอุปกรณ์ที่คุยสนุกดี แต่เรดวินเทอร์ที่ยิ่งใหญ่ก็มีสิ่งประดิษฐ์แบบนี้เหมือนกัน!"
70010010-91 = "แถมซูเปอร์คอมพิวเตอร์(?) ของเราน่ะ ทั้งเครื่องใหญ่เบิ้ม ทั้งยังอบอุ่นกว่านี้ด้วย!"
70010010-92 = "(ท่านประธานคะ นั่นไม่ใช่สิ่งที่น่าอวดของคอมพิวเตอร์สักหน่อยค่ะ...)"
70010010-96 = "ที่เรดวินเทอร์ก็ใช้ซูเปอร์คอมพิวเตอร์กันด้วยเหรอคะ?"
70010010-97 = "เรดวินเทอร์ไม่ได้อยู่ในสมาคมวิจัยคอมพิวเตอร์ด้วย ฉันก็เลยไม่รู้มาก่อนเลยค่ะ"
70010010-98 = "กะ... ก็เพราะคอมพิวเตอร์ของเรามีประสิทธิภาพสูงมาก ก็เลยเก็บไว้เป็นความลับสุดยอดยังไงล่ะ!"
70010010-99 = "ที่เรากล้าพูดได้อย่างสบายใจ ก็เพราะเห็นว่าตอนนี้เทคโนโลยีของมิลเลเนียมพัฒนาตามหลังมา#nถึงระดับนี้แล้วน่ะ!"
70010010-100 = "ยอดเยี่ยมไปเลยค่ะ! อยากเห็นวิทยาการของเรดวินเทอร์แล้วสิคะ!"
70010010-101 = "ไว้ถ้ามีโอกาส เราจะเชิญเธอไปดูงานในเรดวินเทอร์นะ แล้วตอนนั้นเราจะให้ดูวิทยาการของสถาบันเรา"
70010010-103 = "งั้นฉันขอไปวันจันทร์หน้าเลยได้มั้ยคะ?"
70010010-104 = "หา...?"
70010010-105 = "วันนั้นฉันน่าจะมีเวลาน่ะค่ะ พอดีมีธุระต้องไปทำแถวนั้นด้วย"
70010010-106 = "ถ้ามีโอกาสได้ชมเทคโนโลยีล้ำสมัยที่เป็นความลับของเรดวินเทอร์ จะเป็นเกียรติกับฉันอย่างยิ่งเลยค่ะ! ขอร้องละค่ะ!"
70010010-110 = "อะ... อื้อ! วันจันทร์หน้าใช่มั้ย!"
70010010-111 = "ได้เลย แล้วเราจะแสดงความยิ่งใหญ่ของเรดวินเทอร์ให้เห็นเอง!"
70010010-114 = "ทำยังไงดีล่ะ?"
70010010-115 = "เด็กมิลเลเนียมคนนั้นบอกว่าจะมาสัปดาห์หน้าแล้ว แต่เรายังไม่มีซูเปอร์คอมพิวเตอร์เลย"
70010010-116 = "ท่านประธานเชริโน่ งั้นเราไปยุยงพวกที่น่าสงสัยว่าจะเป็นกบฎให้ก่อการปฏิวัติตอนนั้นพอดี แบบนี้ดีมั้ยคะ?"
70010010-117 = "เป็นความคิดที่ดีเลยนะ... แต่คราวที่แล้วการปฏิวัติประสบความสำเร็จมากจนเราแทบจะกู้อำนาจกลับคืนมาไม่ได้ ตอนนี้เราไม่อยากเจอการปฏิวัติไปสักพักใหญ่เลยละ"
70010010-118 = "อืม... พวกเราก็น่าจะหาซื้อซูเปอร์คอมพิวเตอร์ได้ไม่ใช่เหรอ? ถ้าหาซื้อไม่ได้ ก็สร้างเองเลยได้มั้ย?"
70010010-122 = "ท่านประธานเชริโน่ ฉันได้รับใบเสนอราคาจากห้องพิเศษ 183 มาแล้วค่ะ"
70010010-123 = "ทางนั้นบอกว่าศึกษาเชิงทฤษฎีเสร็จแล้ว และก็ออกแบบคอมพิวเตอร์ที่ขับเคลื่อนด้วยซอฟต์แวร์นั้น#nสำเร็จแล้วด้วยค่ะ"
70010010-124 = "จริงเหรอ?! ยอดไปเลย โทโมเอะ! ทำได้ดีมาก!"
70010010-125 = "สั่งให้เริ่มผลิตเดี๋ยวนี้เลย! ด้วยอำนาจของสำนักเลขาธิการ เราจะระดมทรัพยากร และบุคลากรทั้งหมดของเรดวินเทอร์เพื่อการผลิตคอมพิวเตอร์เครื่องนี้เลย!"
70010010-126 = "ค่ะ ท่านประธาน ต่อไปเป็นรายละเอียดตามใบเสนอราคาค่ะ เมื่อพิจารณาจากเทคโนโลยีวิศวกรรม#nอิเล็กทรอนิกส์ของเรดวินเทอร์ตอนนี้แล้ว..."
70010010-127 = "เราต้องเตรียมท่อสุญญากาศ 160,000 ล้านอัน"
70010010-128 = "โรงไฟฟ้าสำหรับพลังงานในการผลิต 27 แห่ง"
70010010-129 = "และนิคมอุตสาหกรรม 3 แห่ง เพื่อเป็นที่พักอาศัยของบุคลากรค่ะ นอกจากนี้ก็..."
70010010-131 = "หา...?"
70010010-132 = "ต้องระเบิดภูเขา 8 ลูกเพื่อสร้างพื้นที่ราบเพื่อการนี้ด้วยค่ะ"
70010010-133 = "เฮือกก..."
70010010-134 = "และถ้าเราให้บุคลากรทำงานเป็นกะ 16 ชั่วโมงโดยไม่มีวันหยุดพักเลย"
70010010-135 = "ก็น่าจะสร้างเสร็จภายใน 6 ศตวรรษค่ะ"
70010010-136 = "..."
70010010-137 = "สั่งให้ดำเนินการเลยมั้ยคะ?"
70010010-139 = "มิลเลเนียมจะมาดูงานสัปดาห์หน้าอยู่แล้ว ถ้าใช้เวลาถึง 6 ศตวรรษแล้วจะมีอะไรให้ดูล่ะ!!"
70010010-143 = "ฮะ... ฮัดชิ้ว!!"
70010010-145 = "(พอประหม่าก็คอแห้งขึ้นมาเลย ต้องดื่มน้ำหน่อยแล้วละ)"
70010010-149 = "(วันนี้เลขานุการสูงสุดโทโมเอะเหนื่อยน่าดูเลยนะ ค่อยยังชั่วที่คณะความมั่นคงไม่ต้องเอี่ยวเรื่องนี้ด้วย...)"
70010010-153 = "(สะ... สำลักน้ำเข้าให้แล้ว!)"
70010010-154 = "พะ... พรืด!"
70010010-159 = "มารินะ เมื่อกี้หัวเราะเราเหรอ?"
70010010-160 = "กำลังแอบคิดว่าเราไปโกหกไว้จนกลายเป็นเรื่องใหญ่โตใช่มั้ยล่ะ?"
70010010-162 = "มะ... ไม่ใช่อย่างนั้นนะคะ!! ท่านประธาน!! แค่ก แค่กๆ!! ไม่ใช่อย่างนั้นค่ะ!!"
70010010-163 = "ถ้างั้น... หรือว่าเธอขำที่เราจามจนหนวดหลุดกันล่ะ?"
70010010-164 = "ไม่ใช่นะคะ ฉันแค่สะ... สำลัก..."
70010010-165 = "สำนัก? คิดว่าสำนักเลขาธิการจะสร้างซูเปอร์คอมพิวเตอร์ไม่ไหวงั้นเหรอ?"
70010010-167 = "(ไม่... ไม่นะ!! แบบนี้เดี๋ยวฉันก็โดนกวาดล้างน่ะสิ!!)"
70010010-168 = "น้ำ..."
70010010-172 = "น้ำขึ้นก็ต้องรีบตักสิคะ! ที่จริงทางคณะความมั่นคงไปสั่งให้ผลิตไว้เรียบร้อยแล้วค่ะ ก็นี่เป็นโอกาสที่จะแสดงความยิ่งใหญ่ของเราทั้งทีนี่คะ!!"
70010010-173 = "จริงเหรอ? ดะ... เดี๋ยวนะ พูดจริงงั้นเหรอ?!"
70010010-174 = "จริงแท้แน่นอนค่ะ! มารินะคนนี้จะรับผิดชอบและเตรียมทุกอย่างให้เสร็จก่อนสัปดาห์หน้าให้ได้ค่ะ!"
70010010-175 = "มารินะ"
70010010-176 = "ค่ะ ค่ะ!!!"
70010010-181 = "เราอุ่นใจจังเลยที่มีมารินะอยู่ข้างๆ"
70010010-182 = "ขอบใจที่ทุ่มเทเพื่อเราและเรดวินเทอร์เสมอมานะ"

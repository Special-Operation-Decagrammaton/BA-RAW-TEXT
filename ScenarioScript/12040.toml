[translation]
12040-1 = "Episode 4;Everyone Has a Story 1"
12040-2 = "Abydos School Main Gate"
12040-5 = "Oh, Sensei!"
12040-6 = "You're certainly here early! We still have a lot of time left before the meeting begins."
12040-7 = "[s] \"You're also early, Nonomi.\""
12040-8 = "Sure am! I got here early to do some cleaning. I just couldn't sit still..."
12040-9 = "How's the master doing?"
12040-10 = "[s] \"...Well, his health seems fine.\""
12040-11 = "Oh, I'm glad to hear that! ☆"
12040-12 = "I thought it would be too overwhelming for him if we all went to the hospital together, so I didn't go with the others."
12040-13 = "I'll have to go with Shiroko and Hoshino later."
12040-14 = "But when you say his health seems fine..."
12040-15 = "Do you mean that there's another problem?"
12040-16 = "[s] \"You're pretty sharp, Nonomi.\""
12040-17 = "Ahaha... Call it a hunch."
12040-18 = "You left with Serika and Ayane but came back alone, so I thought maybe something had happened..."
12040-19 = "Okay, then you can tell me once we're all together. If it's important, then we should all know about it."
12040-20 = "[s] \"Sure, okay.\""
12040-21 = "... "
12040-22 = "A lot has changed since you came here..."
12040-23 = "We got our very first advisor, and we were able to fight off the gangs that had been harassing us..."
12040-24 = "We secured the supplies we needed, and we've overcome so many problems..."
12040-25 = "...But it seems like now we have more problems to face than ever."
12040-26 = "The Helmet Gang... Problem Solver... The Prefect Team... Kaiser Corporation..."
12040-27 = "I wonder what else lies ahead..."
12040-28 = "..."
12040-29 = "Do you think...the Foreclosure Task Force will be able to keep moving forward?"
12040-30 = "[s1] \"Yeah.\"\n[s2] \"Of course.\""
12040-31 = "Yup, yup! If you say so, then it must be true."
12040-32 = "Yup, yup! If you say so, then it must be true."
12040-35 = "Hi, Nonomi. Sensei."
12040-36 = "Oh, Shiroko, you're also here early."
12040-37 = "...Where's Hoshino?"
12040-38 = "Hoshino? She's already here. She's probably taking a nap somewhere around the school again..."
12040-39 = "Um, okay. "
12040-40 = "..."
12040-41 = "...Sensei, how's Master?"
12040-42 = "[s] \"Master is...\""
12040-43 = "Yup, yup! Sensei told me that Master is doing just fine! ☆"
12040-44 = "But it seems like there's something else going on, so we should all meet up to discuss it."
12040-45 = "...Okay, I get it."
12040-47 = "I'll go back first, then."
12040-49 = "Somehow, Shiroko seems..."
12040-50 = "[s] \"Kinda off, right?\""
12040-51 = "R-Right? That's the vibe I got too..."
12040-52 = "She seemed kind of nervous for some reason..."
12040-53 = "Hmm, I hope I'm just imagining things..."
12040-54 = "[s] \"Let's go check.\""
12040-55 = "Yeah, okay!"
12040-57 = "*bang*"
12040-58 = "*crash*"
12040-59 = "Ow... That hurt, Shiroko. "
12040-60 = "Don't act like you don't know anything."
12040-61 = "...?!"
12040-62 = "That sounded like..."
12040-65 = "[ns] Go into the classroom where the sound came from."
12040-68 = "Act? I don't know what you're talking about..."
12040-69 = "..."
12040-70 = "...Liar."
12040-71 = "I'm not lying... Huh?"
12040-73 = "Hoshino! Shiroko! What's going on?!"
12040-74 = "[s] \"Calm down, everyone.\""
12040-75 = "U-Um..."
12040-76 = "What the hell is going on?"
12040-77 = "...This is between me and Hoshino."
12040-78 = "..."
12040-79 = "...I'm sorry, but please give us a moment."
12040-80 = "Yeah, no can do! ☆"
12040-81 = "..."
12040-82 = "There are no secrets in the Foreclosure Task Force. You know that we're all on the same team, right? ♡"
12040-83 = "...U-Um."
12040-84 = "So, if you don't explain what's going on..."
12040-87 = "...you'll be punished! ☆"
12040-89 = "Umm..."
12040-90 = "Uh... So..."
12040-91 = "Guess I got caught trying to sneak in a nap to rest my old bones. "
12040-92 = "But that's not fair. You already know how lazy I am. It comes as naturally to me as breathing."
12040-93 = "Oh, u-um..."
12040-94 = "You don't have to get so angry. Shiroko tends to take things too seriously."
12040-95 = "Well, it should be about time for the meeting. Let's head to the club room."
12040-97 = "..."
12040-98 = "U-Um..."
12040-101 = "..."
12040-102 = "[s] \"Are you okay, Nonomi?\""
12040-103 = "...Yes. I think she's hiding something."
12040-104 = "... "
12040-105 = "It's okay, though. Everyone has at least one secret they hold close..."
12040-106 = "We should go too, Sensei. We can't keep everyone waiting."
12040-109 = "Foreclosure Task Force Room"
12040-110 = "Hmm..."
12040-111 = "..."
12040-112 = "..."
12040-113 = "[s] \"(Awkward...)\""
12040-118 = "Guys, this is bad! Look at this!"

[translation]
12040-1 = "ตอนที่ 4;เรื่องเล่าของแต่ละคน 1"
12040-2 = "ประตูหน้าโรงเรียนอะบิดอส"
12040-5 = "อ๊ะ! คุณครู?\n"
12040-6 = "มาแต่เช้าเลยนะคะ~☆ ยังไม่ถึงเวลานัดเลยนี่นา\n\n"
12040-7 = "[s] \"โนโนมิก็มาแต่เช้าเหมือนกันนะ\""
12040-8 = "ค่ะ! ฉันรีบมาทำความสะอาดตอนเช้าน่ะค่ะ จะให้อยู่เฉยๆ ไม่ทำอะไรเลยไม่ได้หรอก..."
12040-9 = "เจ้าของร้านราเม็งเป็นยังไงบ้างเหรอคะ?\n"
12040-10 = "[s] \"เรื่องสุขภาพไม่มีอะไรต้องเป็นห่วงแล้วละ\""
12040-11 = "...อืม ค่อยยังชั่วหน่อยค่ะ ☆\n\n"
12040-12 = "ฉันไม่ได้ไปเยี่ยมไข้ด้วย เพราะคิดว่าถ้าไปโรงพยาบาลกันหลายๆ คนแล้วจะรบกวนคนไข้คนอื่น"
12040-13 = "แต่เอาไว้คราวหน้าคงต้องพาชิโรโกะจังและรุ่นพี่โฮชิโนะไปบ้างแล้วละค่ะ"
12040-14 = "แต่ว่า... ที่บอกว่าเรื่องสุขภาพไม่มีอะไรต้องเป็นห่วงแล้ว... \n"
12040-15 = "แบบนี้แปลว่า ยังมีเรื่องอื่นด้วยเหรอคะ...?"
12040-16 = "[s] \"...โนโนมินี่เก่งจังเลยนะ\""
12040-17 = "แหะๆ พอฟังที่คุณครูพูดแล้วก็คิดว่ามีเรื่องอื่นอีกน่ะค่ะ"
12040-18 = "คุณครูออกไปพร้อมกับเซริกะจังและอายาเนะจัง แต่ว่ากลับมาคนเดียวแบบนี้ ฉันเลยเดาว่าคงเกิดอะไรขึ้น..."
12040-19 = "เอาไว้บอกพวกเราตอนมากันครบแล้วก็ได้ค่ะ ถ้าเป็นเรื่องสำคัญละก็ ฟังพร้อมกันตอนอยู่ด้วยกันทุกคน#nน่าจะดีกว่าค่ะ"
12040-20 = "[s] \"อืม ได้เลย\""
12040-21 = "......"
12040-22 = "จะว่าไป พอคุณครูมาที่นี่ก็เกิดความเปลี่ยนแปลงเยอะเลย..."
12040-23 = "พวกเราได้มีคุณครูที่ปรึกษาเป็นครั้งแรก แถมยังขับไล่กลุ่มอันธพาลที่มาก่อกวนพวกเราได้อีก...\n"
12040-24 = "ไหนจะยังได้เสบียงที่เราต้องการ และคลี่คลายปัญหาต่างๆ ได้มากมาย..."
12040-25 = "แต่ก็ดูเหมือนตอนนี้พวกเรากำลังเจอปัญหาที่ใหญ่ขึ้นเรื่อยๆ เลยค่ะ"
12040-26 = "แก๊งหมวกกันน็อก... หน่วยรับจ้างสารพัด... คณะกรรมการวินัย... ไคเซอร์ คอร์เปอเรชั่น..."
12040-27 = "ต่อไปจะต้องเจอกับอะไรอีกนะ...\n"
12040-28 = "......"
12040-29 = "คณะกรรมการแผนงานของพวกเราจะฝ่าฟันต่อไปได้ใช่ไหมคะ?"
12040-30 = "[s1] \"ต้องอยู่ต่อสิ\"\n[s2] \"แน่นอนอยู่แล้ว\""

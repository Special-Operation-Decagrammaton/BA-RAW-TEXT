[translation]
12040-1 = "第4話;各自的故事（１）"
12040-2 = "阿拜多斯．校門前"
12040-5 = "哦，老師？"
12040-6 = "來得真早呢☆"
12040-7 = "[s]「野乃美也很早來耶。」"
12040-8 = "是，我稍微打掃了一下。#n不知道為什麼，實在無法待著不動……"
12040-9 = "老闆還好嗎……？"
12040-10 = "[s] 「……身體方面看起來沒事。」"
12040-11 = "……這樣啊，真是太好了☆"
12040-12 = "雖然很想親眼確認平安無事，不過也不能一群人一起去看病呢……"
12040-13 = "等狀況穩定了，再和白子醬及星野前輩一起去探望吧。"
12040-14 = "……不過「身體方面沒事」就代表……"
12040-15 = "除此之外，發生了什麼問題……的意思嗎？"
12040-16 = "[s] 「……真是贏不過野乃美呢。」"
12040-17 = "啊哈哈……只是莫名有這種感覺而已。"
12040-18 = "老師明明是跟茜香醬和綾音醬一起去，卻自己一個人回來……總覺得發生了什麼事。"
12040-19 = "……嗯，請在大家都在的時候告訴我吧。#n這種事應該讓所有人都知道才對。"
12040-20 = "[s] 「嗯，到時候再說吧。」"
12040-21 = "……"
12040-22 = "明明才沒過多久……現在回想起來，在老師來了之後真的發生了很多變化呢。"
12040-23 = "我們第一次有了顧問老師，而且還擊退了頭盔團……"
12040-24 = "確保了補給，解決了各式各樣的問題……"
12040-25 = "不過各種事情還是接二連三地阻擋在我們面前……"
12040-26 = "頭盔團、便利屋、風紀委員會……還有，凱薩公司……"
12040-27 = "之後又會有什麼樣的事件等著我們呢……"
12040-28 = "……"
12040-29 = "不過我們阿拜多斯對策委員會……一定能繼續前進的對吧？"
12040-30 = "[s1] 「當然。」\n[s2] 「那是當然的。」"
12040-31 = "嗯！聽老師這麼說，我就放心了。"
12040-32 = "嗯！聽老師這麼說，我就放心了。"
12040-35 = "野乃美，老師。"
12040-36 = "啊，白子醬也很早呢？ "
12040-37 = "嗯……星野前輩呢？"
12040-38 = "星野前輩？大概又在學校的某個地方睡覺吧……"
12040-39 = "……這樣啊。"
12040-40 = "……"
12040-41 = "……老師，老闆的狀況呢？"
12040-42 = "[s] 「老闆他……」"
12040-43 = "老闆身體方面似乎沒問題☆"
12040-44 = "……只是好像有其他狀況。#n等大家到齊再一起討論吧。"
12040-45 = "……嗯，知道了。"
12040-47 = "那我就先進去了。"
12040-49 = "白子醬……？#n感覺樣子有點……"
12040-50 = "[s] 「是不是有點怪怪的？」"
12040-51 = "老師也這麼覺得嗎？"
12040-52 = "該說看起來有點不安嗎……"
12040-53 = "希望只是我們的錯覺……"
12040-54 = "[s] 「……我們也進去吧。」"
12040-55 = "呃，嗯！"
12040-57 = "（咚！）"
12040-58 = "（哐碰咚──！）"
12040-59 = "唉喲～這樣很痛耶白子醬。"
12040-60 = "……打算裝蒜到什麼時候？"
12040-61 = "！！？"
12040-62 = "剛才的聲音是……！？"
12040-65 = "[ns] 進入發出聲音的教室"
12040-68 = "唔嘿～大叔聽不太懂你的意思呢……？"
12040-69 = "……"
12040-70 = "……不要說謊了。"
12040-71 = "我沒有說謊啦……嗯？"
12040-73 = "星野前輩！白子醬！？發生什麼事了！？"
12040-74 = "[s] 「……怎麼了嗎？」"
12040-75 = "呃，那個……"
12040-76 = "究竟發生了什麼……？嗯？"
12040-77 = "……我有事要找星野前輩。"
12040-78 = "……"
12040-79 = "……抱歉，讓我們兩個獨處一下。"
12040-80 = "不行哦～☆"
12040-81 = "……"
12040-82 = "對策委員會是不允許「兩人之間的祕密♡」的唷。#n畢竟我們可是命運共同體呀。"
12040-83 = "……呃，嗯。"
12040-84 = "不好好說明狀況的話……"
12040-87 = "我會生氣的唷☆"
12040-89 = "唔，唔嗯……"
12040-90 = "啊……那個……"
12040-91 = "……唔嘿～其實是大叔我偷睡午覺被發現了呢～"
12040-92 = "可是這也真過分，懶惰的大叔明明就像周圍的空氣一樣隨處可見。"
12040-93 = "啊，唔，嗯……"
12040-94 = "沒必要那麼生氣吧～白子醬偶爾也會認真過頭呢。"
12040-95 = "嗯，差不多到集合時間了，我們走吧。"
12040-97 = "……"
12040-98 = "嗯……"
12040-101 = "……"
12040-102 = "[s] 「野乃美，沒事吧？」"
12040-103 = "……似乎有什麼不想說出口的事呢。"
12040-104 = "……"
12040-105 = "這也沒辦法，每個人或多或少都有一兩個祕密對吧……"
12040-106 = "我們也走吧，老師。大家應該差不多要回來了。"
12040-109 = "對策委員會．教室"
12040-110 = "嗯……"
12040-111 = "……"
12040-112 = "……"
12040-113 = "[s] （好尷尬……）"
12040-118 = "前輩們，不好了！！快看這個！"
12040-119 = "我們把阿拜多斯自治區的相關文件拿來了！請看……"
12040-120 = "……嗯？"
12040-121 = "……奇怪？"
12040-122 = "……"
12040-123 = "……"
12040-124 = "……這，這個氣氛是怎麼回事？"
12040-125 = "發，發生什麼事了嗎……？"
12040-126 = "[s] 「沒事。歡迎回來。」"
12040-127 = "……？#n先，先不說這個了！"
12040-128 = "我們發現了一件不得了的事！"
12040-129 = "沒錯，是緊急情況……！請大家先看這個！"
12040-131 = "（啪啦）"
12040-134 = "嗯～這是……地圖？"
12040-135 = "這是紀載著直到近期為止交易紀錄的阿拜多斯自治區土地台帳……#n名為「地籍圖」的東西。"
12040-136 = "嗯？也就是可以確認土地所有人的文件嗎……？"
12040-137 = "不過就算不看文件，阿拜多斯的土地所有權當然是屬於阿拜多斯高中……"
12040-138 = "我也是這麼想的！但實際上並不是！"
12040-139 = "上午去探病的時候，我聽老闆說了！"
12040-140 = "包含柴關拉麵店的大樓在內……阿拜多斯自治區的絕大部分……"
12040-141 = "……都已經不是我們學校的所有物了。"
12040-142 = "咦……！？"
12040-143 = "這是什麼意思，綾音醬？#n阿拜多斯自治區不是阿拜多斯的所有物的話，那……"
12040-145 = "（啪啦）"
12040-146 = "這是……"
12040-147 = "現在的持有人是……"
12040-148 = "凱薩建設……地籍圖上是這麼寫的！"
12040-149 = "……！！"
12040-150 = "怎麼會……！？"
12040-151 = "……！？"
12040-153 = "下一話;各自的故事（２）"

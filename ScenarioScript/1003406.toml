[translation]
1003406-1 = "การเย็บปักถักร้อยจากหัวใจ"
1003406-2 = "ห้างสรรพสินค้าจิ้งจอก เฮียกคิยาโค"
1003406-6 = "ดูนั่นสิคะคุณครู เครื่องดูดฝุ่นรุ่นใหม่ล่าสุด!"
1003406-7 = "ว้าวว ชาร์จแค่ 30 นาทีแต่ใช้งานได้ถึง 5 ชั่วโมงเลย...!"
1003406-8 = "แถมยังเป็นแบบไร้สายด้วยค่ะ!"
1003406-9 = "[s] \"อืม จริงด้วยนะ\""
1003406-11 = "อ๊ะ คุณครู คิดว่าเดรสชุดนี้สวยไหมคะ?"
1003406-12 = "ข้อดีคือไม่ต้องดูแลเป็นพิเศษ ซักเครื่องได้ด้วยค่ะ"
1003406-13 = "ฮิฮิ วัสดุผ้าเดี๋ยวนี้ดีขึ้นเยอะ ทำให้ดูแลรักษาง่ายมากเลยนะคะ"
1003406-14 = "[s] \"อืม จริงด้วยสินะ\""
1003406-15 = "อุ๊ย ที่เคาน์เตอร์นั่น... "
1003406-16 = "คนขายบอกว่าเราซื้อบัตรสุ่มรางวัลได้คนละ 10 ใบค่ะ...!"
1003406-17 = "และรางวัลที่ 3 ก็คือเครื่องดูดฝุ่นไร้สายรุ่นใหม่ล่าสุดที่เราดูมาเมื่อครู่นี้ค่ะ"
1003406-18 = "ถือเป็นโอกาสดีที่ห้ามพลาดเลยนะคะ คุณครู!"
1003406-19 = "ไปต่อแถวกันเถอะค่ะ...!"
1003406-20 = "[s1] \"เดี๋ยวก่อนมิโมริ ใจเย็นๆ ก่อน\"\n[s2] \"ตอนแรกเธอบอกว่าจะมาซื้ออะไรนะ?\""
1003406-21 = "อ๊ะ..."
1003406-22 = "อ๊ะ..."
1003406-23 = "ขอโทษค่ะ ฉันคงตื่นเต้นมากเกินไปหน่อย..."
1003406-24 = "อืม... วันนี้ฉันอยากมาซื้อผ้าเช็ดหน้าค่ะ"
1003406-25 = "[s] \"ผ้าเช็ดหน้าเหรอ?\""
1003406-26 = "ใช่ค่ะ ถ้างั้นเราไปที่โซนสินค้าเบ็ดเตล็ดกันเลยไหมคะ?"
1003406-27 = "งือ... บัตรจับรางวัล..."
1003406-28 = "[s] \"ซื้อของเสร็จค่อยมาสุ่มแล้วกันนะ\""
1003406-29 = "ฮิฮิ... ได้เลยค่ะ"
1003406-31 = "ผ้าเช็ดหน้ามีหลายแบบจังเลยนะคะ "
1003406-32 = "อืม เรื่องราคาก็สำคัญ แต่ไม่ใช่ว่าซื้อของถูกแล้วจะดี"
1003406-33 = "เพราะเรื่องวัสดุที่ใช้ทำก็สำคัญเหมือนกัน..."
1003406-35 = "ฮือ... เลือกยากจังเลยค่ะ"
1003406-36 = "[s] \"ถ้าเลือกไม่ถูก ให้ครูเลือกให้ไหม?\""
1003406-37 = "คุณครูจะเลือกให้เหรอคะ?"
1003406-38 = "อืม... ฉันคิดว่าฉันเลือกเองดีกว่าค่ะถึงจะมีความหมาย..."
1003406-39 = "[s] \"นั่นสินะ ถ้าเลือกไม่ตรงแบบที่ถูกใจก็คงไม่อยากใช้...\""
1003406-40 = "ไม่ใช่อย่างนั้นนะคะ...!"
1003406-41 = "[s] \"หืม?\""
1003406-42 = "ไม่ใช่อย่างนั้นค่ะ!"
1003406-43 = "ตะ...แต่ว่าเลือกผ้าเช็ดหน้าแบบไหนดีนะ..."
1003406-48 = "... (ตาเป็นประกาย) "
1003406-51 = "เอ่อ... คุณพนักงานคะ ช่วยห่ออันนี้ให้หน่อยได้ไหมคะ?"
1003406-52 = "เพราะว่า..."
1003406-53 = "ฉันจะเอาไปให้เป็นของขวัญค่ะ!"
1003406-55 = "ฮู่ว... ใช้เวลาค่อนข้างนานเลยนะคะ"
1003406-56 = "[s3] \"ถือว่าโชคดีที่ได้ซื้อของขวัญที่ถูกใจนะ\"\n[s4] \"น่าเสียดายที่ได้ทิชชูจากการสุ่มบัตรรางวัล\""
1003406-57 = "ฮุฮุ... ค่ะ วันนี้ฉันได้ซื้อของที่ถูกใจแล้ว"
1003406-58 = "แต่ว่ามีปัญหาอยู่อย่างหนึ่ง..."
1003406-59 = "ฮิฮิ ค่ะ น่าเสียดายนะคะ วันนี้ฉันก็ได้ของที่ถูกใจแล้ว"
1003406-60 = "แต่ว่ามีปัญหาอยู่อย่างหนึ่ง..."
1003406-61 = "[s5] \"จริงด้วย มิโมริบอกว่าเป็นของขวัญนี่นา\"\n[s6] \"หวังว่าคนที่ได้รับจะถูกใจนะ\""
1003406-62 = "ใช่ค่ะ ฉันเลยกังวลนิดหน่อยค่ะ"
1003406-63 = "ใช่ค่ะ ฉันกำลังกังวลเรื่องนั้นอยู่พอดีเลยค่ะ"
1003406-64 = "หรือก็คือ... ฉันกำลังกังวลว่าคุณครูจะถูกใจผ้าเช็ดหน้าผืนนี้หรือเปล่าคะ"
1003406-65 = "[s] \"หืม?\""
1003406-66 = "ฮุฮุ ที่ฉันชวนคุณครูออกมาซื้อของขวัญวันนี้ "
1003406-67 = "ก็เพราะอยากมอบของขวัญให้คุณครูค่ะ"
1003406-68 = "ฉันอยากมอบของตอบแทนเล็กๆ น้อยๆ"
1003406-69 = "ให้กับคุณครูที่คอยฝึกฝนเคียงข้างฉันมาตลอด"
1003406-70 = "[s] \"ไม่เห็นต้องทำขนาดนี้เลย...\""
1003406-71 = "ไม่เป็นไรเลยค่ะ เพราะฉันอยากทำให้คุณครูนี่คะ!"
1003406-72 = "หรือว่าคุณครูไม่อยากรับไว้คะ?"
1003406-73 = "[s7] \"เปล่าเลย ครูดีใจมากเลยนะ\"\n[s8] \"ใครจะไม่ชอบของขวัญบ้างล่ะ\""
1003406-74 = "ฮุฮุ พูดจริงนะคะ~?"
1003406-75 = "ฮุฮุ พูดจริงนะคะ~?"
1003406-76 = "[s] \"ครูแกะดูเลยได้ไหม...\""
1003406-77 = "อ๊ะ! เดี๋ยวค่ะคุณครู อย่าเพิ่งค่ะ!"
1003406-78 = "นี่คือของขวัญที่ฉันตั้งใจเลือกกับคุณครู"
1003406-79 = "จริงๆ แค่ได้ให้ของขวัญกับคุณครูก็ถือว่าเพียงพอแล้ว..."
1003406-80 = "แต่ว่าฉันขออะไรอย่างหนึ่งได้ไหมคะ...?"
1003406-81 = "[s] \"ขออะไรเหรอ?\""
1003406-82 = "มันออกจะดูเป็นความต้องการส่วนตัวไปหน่อย"
1003406-83 = "แต่ว่า...ตอนทำกิจกรรมของชมรมฝึกฝน ฉันตั้งใจฝึกเย็บผ้ามากเลยค่ะ! "
1003406-84 = "เพราะงั้น..."
1003406-85 = "ฉันเลยอยากให้คุณครูได้เห็นผลลัพธ์ของการฝึกฝนเป็นกุลสตรีที่เพียบพร้อมและเจ้าสาวของฉัน..."
1003406-86 = "ขอฉันทำลายผ้าเช็ดหน้าได้ไหมคะ...?"
1003406-87 = "[s] \"ทำลายเหรอ?\""
1003406-88 = "เอ่อ... ไม่ใช่ทำลายแบบนั้นค่ะ...!"
1003406-89 = "ฉันหมายถึง การใช้เข็มปักลายลงไปบนผ้าเช็ดหน้าให้มีลายสวยงามต่างหากค่ะ"
1003406-90 = "ถะ... ถ้าคุณครูไม่ว่าอะไร... นะคะ"
1003406-91 = "ตะ... แต่มันดูเป็นการรบกวนเกินไป ฉันขอโทษค่ะ...!"
1003406-92 = "[s] \"ไม่เป็นไรเลย ดีเสียอีกที่มิโมริจะทำให้\""
1003406-93 = "จะ... จริงเหรอคะ?"
1003406-94 = "ถ้างั้นฉันขอรบกวนเวลาคุณครูเพิ่มสักหน่อยนะคะ"
1003406-97 = "ช่วยนั่งเฝ้าดูฉันจากข้างๆ ด้วยนะคะ"
1003406-100 = "― ฮิฮิ คุณครูคะ[wa:1350] "
1003406-102 = "― เข้ามา ใกล้ๆ อีกสักหน่อยก็ได้นะคะ[wa:1450] "
1003406-105 = "― ทั้งการฝึกซ้อมเป็นเจ้าสาว...[wa:360] "
1003406-107 = "― และความฝันในการเป็นกุลสตรีที่เพียบพร้อม[wa:2130] "
1003406-110 = "― คุณครู... ก็คอยช่วยเหลือ[wa:10] "
1003406-112 = "― และให้กำลังใจอยู่ข้างๆ ฉันมาตลอด[wa:900] "
1003406-115 = "[ns] \"มันเป็นหน้าที่ของครูน่ะ\""
1003406-116 = "― ขอบคุณนะคะ[wa:1620] "
1003406-118 = "― เพราะงั้น... ฉันก็อยากขอ... กับคุณครู ไปเรื่อยๆ...[wa:3810] "
1003406-121 = "― มะ... ไม่มีอะไรค่ะ![wa:560] "
1003406-124 = "― คะ... ค่ะ...! ฉันปักผ้าเสร็จเรียบร้อยแล้วค่ะ[wa:1610] "
1003406-127 = "― ครั้งนี้ฉัน... ตั้งใจปักลายมากเลยนะคะ[wa:10] "
1003406-129 = "― คุณครูคิดว่า... เป็นยังไงบ้างคะ...?[wa:640] "
1003406-132 = "ฉันปักลายผ้าเช็ดหน้าเสร็จแล้วค่ะ"
1003406-133 = "ฉันหวังว่าคุณครูจะเก็บรักษาไว้อย่างดีนะคะ ฮิฮิ"
1003406-135 = "(จากนั้นคุณครูก็เดินเล่นและพูดคุยเรื่อยเปื่อยกับมิโมริต่ออยู่พักใหญ่)"

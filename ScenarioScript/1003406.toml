[translation]
1003406-1 = "一針一線，一心一意"
1003406-2 = "百鬼夜行．狐火百貨店"
1003406-6 = "啊，老師，請看。似乎出了新的吸塵器。"
1003406-7 = "哇，竟然充電30分鐘就能使用5小時……！"
1003406-8 = "而且似乎是無線的！"
1003406-9 = "[s]「嘿～真厲害呢。」"
1003406-11 = "啊，老師。這件洋裝，不覺得很漂亮嗎？"
1003406-12 = "「不用特別處理也可以直接丟入洗衣機清洗是優點！」的樣子！"
1003406-13 = "最近的新素材真厲害呢。"
1003406-14 = "[s]「嘿～真厲害呢。」"
1003406-15 = "哎呀，在那邊的櫃台……"
1003406-16 = "每人可以用10張抽獎券抽獎耶……！"
1003406-17 = "啊，而且3等獎的商品是剛才的無線吸塵器唷！"
1003406-18 = "老師！這是不能錯過的機會吧！"
1003406-19 = "得趕快排隊……！"
1003406-20 = "[s1]「先等等，三森……要感嘆是沒關係……」\n[s2]「今天是來買什麼的？」"
1003406-21 = "啊……"
1003406-22 = "啊……"
1003406-23 = "不好意思，我不小心太興奮了……"
1003406-24 = "那個，今天是來買手帕的。"
1003406-25 = "[s]「手帕？」"
1003406-26 = "是的，所以去雜貨區吧？"
1003406-27 = "…………啊，抽獎券……"
1003406-28 = "[s]「抽獎等回去的時候再來抽吧？」"
1003406-29 = "啊……呵呵，好的！"
1003406-31 = "手帕也有很多種類呢。"
1003406-32 = "唔嗯，雖然價格也是需要考慮的因素，但也不是便宜就好……"
1003406-33 = "材質也必須留意……"
1003406-35 = "唔唔，真難選呢……"
1003406-36 = "[s]「選擇困難的話，需要我幫你選嗎？」"
1003406-37 = "老師嗎……？"
1003406-38 = "啊，那個……沒關係的。#n這個不由我自己挑選就失去意義了。"
1003406-39 = "[s]「也對，如果選到了不喜歡的會很困擾呢……」"
1003406-40 = "那個，這個，該怎麼說呢……"
1003406-41 = "[s]「嗯？」"
1003406-42 = "沒，沒什麼！"
1003406-43 = "比，比起這個，手帕該選哪種呢……"
1003406-48 = "嗯……嗯……啊，這個……！"
1003406-51 = "那個，店員小姐。可以幫我把這個包起來嗎？"
1003406-52 = "那個……"
1003406-53 = "是要送禮用的！"
1003406-55 = "呼……不好意思，花了不少時間。"
1003406-56 = "[s3]「不會，能買到三森中意的東西太好了。」\n[s4]「雖然抽獎的結果是面紙有點可惜。」"
1003406-57 = "呵呵，是的。雖然我很喜歡……"
1003406-58 = "不過有一個問題……"
1003406-59 = "呵呵，是的。雖然我很喜歡……"
1003406-60 = "不過有一個問題……"
1003406-61 = "[s5]「這麼說來，你說過是要送禮用的呢。」\n[s6]「要是送禮的對象也能喜歡就好了呢。」"
1003406-62 = "是的，如老師所說。"
1003406-63 = "是的，如老師所說。"
1003406-64 = "所以不只是我，如果老師也能喜歡這條手帕的話，我會很開心的。"
1003406-65 = "[s]「……咦？」"
1003406-66 = "呵呵，今天之所以想和老師一起來買禮物……"
1003406-67 = "是因為想儘快把禮物送給老師。"
1003406-68 = "雖然只是一點微薄的心意……"
1003406-69 = "我還是希望能報答一直陪著我修行的老師。"
1003406-70 = "[s]「其實不必要這麼做的……」"
1003406-71 = "不，我無論如何都想送給老師……！"
1003406-72 = "莫非，是我太任性了嗎……？"
1003406-73 = "[s7]「別這麼說，我非常高興唷。」\n[s8]「沒有人收到禮物會不高興的唷。」"
1003406-74 = "呵呵，那真是太好了。"
1003406-75 = "呵呵，那真是太好了。"
1003406-76 = "[s]「那我就心懷感激地……」"
1003406-77 = "啊，老師，請等一下！"
1003406-78 = "那個，畢竟是難得和老師一起買的東西……"
1003406-79 = "直接送給老師當然也很好沒錯，不過……"
1003406-80 = "有件事，我想拜託老師……"
1003406-81 = "[s]「拜託？」"
1003406-82 = "雖然這只是我個人的請求……"
1003406-83 = "我最近在修行部，也努力練習了縫紉！"
1003406-84 = "所以，如果可以的話……"
1003406-85 = "為了讓老師看見新娘修行的結果……"
1003406-86 = "那條手帕，可以借我一下嗎？"
1003406-87 = "[s]「這條手帕？」"
1003406-88 = "是，是的！我不會做奇怪的事情的……！"
1003406-89 = "其實是因為練習了縫紉，所以……想幫它做點刺繡……"
1003406-90 = "當，當然……前提是老師願意……！"
1003406-91 = "如，如果造成您的困擾真是不好意思……！"
1003406-92 = "[s]「別這麼說，我也希望三森能這麼做。」"
1003406-93 = "謝，謝謝老師。那麼……"
1003406-94 = "麻煩給我一些時間哦，老師。"
1003406-97 = "請您在一旁看著我吧。"
1003406-100 = "― 呵呵，老師。[wa:1630] "
1003406-102 = "― 再近一點看也沒關係唷。[wa:2330] "
1003406-105 = "― 我的新娘修行……[wa:1160] "
1003406-107 = "― 還有，想成為大和撫子的我的夢想。[wa:3050] "
1003406-110 = "― 老師總是像這樣，[wa:460] "
1003406-112 = "― 在身旁應援，幫助著我。[wa:1740] "
1003406-115 = "[ns]「因為我是老師呀。而且三森也非常努力。」"
1003406-116 = "― 謝謝您。[wa:1860] "
1003406-118 = "― ……那個，我，和老師，今後也一直……[wa:5090] "
1003406-121 = "― 沒，沒什麼……！[wa:1000] "
1003406-124 = "― 好，好了！刺繡，完成了！[wa:2890] "
1003406-127 = "― 我以我的方式試著努力了，[wa:800] "
1003406-129 = "― 那個，您覺得如何呢……？[wa:1560] "
1003406-132 = "這樣手帕就完成了。"
1003406-133 = "我的禮物，如果您願意永遠珍惜的話，我會很開心的。呵呵。"
1003406-135 = "（之後和三森一邊聊天一邊散步，度過了快樂的時間）"

[translation]
1600620-1 = "最棒的（？）避暑"
1600620-3 = "和老師一起……海邊……美食……好熱……"
1600620-4 = "[s]「和泉一起……在海邊……」"
1600620-5 = "不行……再這樣……繼續下去……時間就浪費掉了……"
1600620-6 = "嗚咿咿咿咿……"
1600620-11 = "[ns1]「啊……泉倒下了，變得軟趴趴的……」\n[ns2]「那我也不客氣了……」"
1600620-14 = "哇啊啊……老師也變得跟我一樣軟趴趴的了……"
1600620-15 = "[s]「這也沒辦法……」"
1600620-16 = "就是說啊……真的沒辦法……"
1600620-17 = "畢竟……實在是……"
1600620-18 = "太～～～熱～～～了～～～！"
1600620-20 = "總算是躲到陰涼處……終於活過來了。"
1600620-21 = "但可能是因為太熱的關係，現在店鋪都暫停營業！"
1600620-22 = "這樣下去，和老師一起制霸海邊美食的計畫要泡湯了～！"
1600620-23 = "[s]「什麼都好……想吃點冰冰涼涼的東西……」"
1600620-24 = "就是說啊……冰冰涼涼的東西，冰冰涼涼的東西……"
1600620-25 = "對了！老師，我有一個好主意！"
1600620-26 = "你問是什麼？就是這個！鏘鏘！"
1600620-31 = "沒錯！就是冰桶！這裡面不是裝了很多水果和果汁嗎？"
1600620-32 = "讓我來幫你做杯水果特調吧！"
1600620-33 = "[s]「泉做的水果特調……？」"
1600620-34 = "首先加入西瓜、鳳梨、藍莓和櫻桃……"
1600620-35 = "啊！還得加果汁吧？#n柳橙汁、氣泡水，還有……"
1600620-36 = "（可能是因為躲在陰涼處的關係，吹來了徐徐涼風）"
1600620-37 = "柑橘、百香果、木瓜、酪梨……"
1600620-40 = "（海鷗伴隨陣陣海浪聲，在天空中翱翔著）"
1600620-42 = "榴槤、榲桲、香瓜茄，灑上鹽巴的刺角瓜、諾麗果……"
1600620-43 = "然後和濃郁的酸櫻桃果汁、松葉汁、根汁啤酒混在一起……！"
1600620-44 = "[ns3]「等，等一下！泉！」\n[ns4]「好像出現了幾個不該加進水果特調的東西！？」"
1600620-47 = "嗯？怎麼了，老師？#n你問是不是把冰桶裡所有的水果和果汁都加進去了？"
1600620-48 = "啊，是擔心不夠冰嗎？#n別擔心！我還加了滿滿的冰塊！"
1600620-49 = "呵呵。最後再灑上我親手調配的祕製香料……"
1600620-50 = "把它攪拌均勻後……！"
1600620-51 = "好，完成了！老師快嚐嚐看吧！"
1600620-52 = "嗯？怎麼了？"
1600620-53 = "啊，畢竟是我做的，所以讓我先吃嗎？"
1600620-54 = "謝謝，老師！那我就不客氣了……"
1600620-56 = "（泉毫不猶豫地開始津津有味地享用自己做的水果特調……）"
1600620-57 = "噗哈……！老師！這真的很好吃！"
1600620-58 = "尤其是各種水果的味道不會互相衝突，#n反而強烈地展現出自己的個性，令人印象深刻！"
1600620-59 = "[s]「確實很有泉的風格！」"
1600620-60 = "嗯！所以我很喜歡這個水果特調！"
1600620-61 = "雖然有點老王賣瓜的成分，但這或許是我至今吃過最難忘的味道！"
1600620-62 = "來吧來吧！老師也快嚐嚐看吧！"
1600620-63 = "還是說……不想吃我做的東西……？"
1600620-64 = "[s]「泉發出了預期之外的攻擊……！」"
1600620-65 = "嗯？這是什麼意思？我做了什麼嗎？"
1600620-66 = "來，我幫老師盛特別大一碗！"
1600620-67 = "（面對泉充滿期待的眼神和表情，最終還是舉雙手投降了……！）"
1600620-80 = "……師。老師……！"
1600620-81 = "老師，你振作一點！嗚嗚嗚……！"
1600620-82 = "[s]「是陌生的天花板……不，是天空。」"
1600620-83 = "老師，你還好嗎！？"
1600620-84 = "完全沒事嗎？可是你剛才明明失去意識了說？"
1600620-85 = "[s]「一切都是仲夏夜之夢……」"
1600620-86 = "嗯……？我聽不太懂。#n老師偶爾會說一些讓人摸不著頭緒的話呢……"
1600620-87 = "不過……怎麼辦呢，老師。#n現在已經到了傍晚，我們一整天卻什麼都沒做……"
1600620-88 = "[s5]「但從結果來說，我們的確是忘記了炎熱。」\n[s6]「這樣不就達成目的了嗎？」"
1600620-94 = "是這樣嗎……？"
1600620-95 = "雖然不是很懂，但既然老師說是，那就是吧！嗯！"

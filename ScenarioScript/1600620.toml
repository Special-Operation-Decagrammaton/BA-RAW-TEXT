[translation]
1600620-1 = "ที่สุดของ...(?) การพักร้อน"
1600620-3 = "ไปชิม....ของอร่อย...ที่ร้านริมทะเล...กับคุณครู... แต่ว่าร้อนจังเลย..."
1600620-4 = "[s] \"ไปชายหาด...กับอิซุมิ...\""
1600620-5 = "ไม่ได้... ทนไว้... ถ้าปล่อยเวลาไปแบบนี้... มันจะน่าเสียดาย..."
1600620-6 = "ม่ายไหวววว..."
1600620-11 = "[ns1] \"อะ...อิซุมิตัวไหลไปแล้ว...\"\n[ns2] \"ครูจะไม่ยอมแพ้เท่านี้หรอก...\""
1600620-14 = "โหววว... คุณครูก็ตัวไหลเหมือนฉันเลยนี่นา..."
1600620-15 = "[s] \"ก็มันช่วยไม่ได้นี่นา...\""
1600620-16 = "นั่นสิน้า... ช่วยไม่ได้นี่นา..."
1600620-17 = "แต่ว่ามัน... ร้อน...."
1600620-18 = "ร้อนเกินไปแล้วววววววววว~~!!"
1600620-20 = "ค่อยยังชั่วที่เข้ามาในร่มได้ซะที... รอดตายแล้ว"
1600620-21 = "แต่คงเป็นเพราะอากาศร้อนละมั้ง หลายๆ ร้านเลยปิดร้านพักการขายชั่วคราวอยู่น่ะ!"
1600620-22 = "ถ้าเป็นแบบนี้ละก็ แผนการพิชิตของอร่อยริมทะเลกับคุณครูก็พังไม่เป็นท่าเลยน่ะสิ~!"
1600620-23 = "[s] \"อะไรก็ได้... ขออะไรเย็นๆ มากินหน่อยเถอะ...\""
1600620-24 = "นั่นสิ... อะไรเย็นๆ... อะไรเย็นๆ..."
1600620-25 = "เอ๋? คุณครู! ฉันคิดอะไรดีๆ ออกแล้วละ!"
1600620-26 = "อะไรงั้นเหรอ? ก็นี่ไงล่ะ! แต่นแต๊น~!"
1600620-31 = "อื้อ ใช่แล้ว! กล่องแช่เย็นของฉันเอง! ในกล่องนี้น่ะมีน้ำผลไม้แล้วก็ผลไม้อยู่เต็มเลยนะ"
1600620-32 = "เดี๋ยวจะใช้วัตถุดิบพวกนี้ทำน้ำผลไม้รวมเย็นชื่นใจให้แล้วกันนะ!"
1600620-33 = "[s] \"น้ำผลไม้รวมฝีมืออิซุมิ...?\""
1600620-34 = "ก่อนอื่นก็ใส่แตงโม สับปะรด บลูเบอร์รี เชอร์รี..."
1600620-35 = "อ๊ะ ต้องใส่น้ำผลไม้ลงไปด้วยสินะ? ถ้างั้นก็ใส่น้ำส้ม โซดา แล้วก็..."
1600620-36 = "(อาจเป็นเพราะมาหลบอยู่ในที่ร่ม จู่ๆ ก็มีลมพัดมาให้รู้สึกเย็นขึ้น...)"
1600620-37 = "มะนาว เสาวรส ควินซ์ อะโวคาโด..."
1600620-40 = "(ได้ยินเสียงคลื่นกระทบทรายเบาๆ และนกนางนวลบินผ่านไป)"
1600620-42 = "ทุเรียน มาร์ชเมลโล เมลอนเปปิโน แตงหนาม โนนิ..."
1600620-43 = "แล้วก็ทาร์ตเชอร์รีสุดเข้มข้น น้ำใบสน สุดท้ายก็ใส่รูตเบียร์ลงไป...!"
1600620-44 = "[ns3] \"ดะ...เดี๋ยวก่อน อิซุมิ!\"\n[ns4] \"ทำไมมีแต่ของที่ไม่น่าใส่ลงไปในน้ำผลไม้ทั้งนั้นเลยล่ะ?!\""
1600620-47 = "หืม? ทำไมเหรอคุณครู? ฉันก็ใส่แค่ผลไม้กับของที่อยู่ในกล่องแช่เย็นเองนะ?"
1600620-48 = "อ้อ หรือว่ากลัวมันเย็นชื่นใจไม่พอเหรอ? ไม่ต้องห่วง! เดี๋ยวจะใส่น้ำแข็งเพิ่มไปพูนๆ เลย!"
1600620-49 = "อะฮิฮิ... แล้วก็โรยเครื่องเทศสูตรลับพิเศษที่ฉันทำขึ้นเองลงไป..."
1600620-50 = "แล้วสุดท้ายก็คนๆ ให้เข้ากัน...!"
1600620-51 = "เท่านี้ก็เสร็จสมบูรณ์! เอ้า คุณครูก็ลองชิมดูสิ! "
1600620-52 = "หืม? ทำไมล่ะ?"
1600620-53 = "โอ้ ฉันเป็นคนชงก็อยากให้ฉันได้ดื่มก่อนงั้นเหรอ?"
1600620-54 = "ขอบคุณนะคุณครู! ถ้างั้นก็ไม่เกรงใจละนะ..."
1600620-56 = "(อิซุมิดื่มเครื่องดื่มอย่างเอร็ดอร่อยโดยไม่ลังเลใดๆ เลยสักนิด...)"
1600620-57 = "ฮ่า...! อร่อยมากเลยละ คุณครู!"
1600620-58 = "รสชาติผลไม้แต่ละชนิดไม่ถูกกลบหายไป แถมยังรู้สึกได้ถึงรสชาติของรสชาติที่เป็นเอกลักษณ์ของ#nผลไม้แต่ละชนิดได้อย่างดีอีกด้วย อร่อยเหาะไปเลย!"
1600620-59 = "[s] \"สมแล้วที่เป็นเครื่องดื่มที่อิซุมิเลือก!\""
1600620-60 = "อื้อ! ฉันชอบน้ำผลไม้รวมอันนี้มากเลยละ!"
1600620-61 = "ฉันชงเองจะพูดแบบนี้ก็ยังไงอยู่ แต่ว่ามันอร่อยกว่าน้ำผลไม้รวมที่เคยดื่มมาเลยนะ!"
1600620-62 = "เอ้าๆ คุณครูเองก็ลองดื่มดูสิ!"
1600620-63 = "หรือว่า...ไม่อยากกินของที่ฉันทำเหรอ...?"
1600620-64 = "[s] \"นี่มันการโจมตีที่คาดไม่ถึงของอิซุมิ...!\""
1600620-65 = "หืม? คุณครูพูดอะไรน่ะ? ฉันทำอะไรเหรอ?"
1600620-66 = "เอ้า ฉันเตรียมไว้ให้ถ้วยใหญ่เป็นพิเศษเลย!"
1600620-67 = "(สีหน้าและแววตาที่เป็นประกายวิ้งๆ ดูคาดหวังเป็นพิเศษของอิซุมิ ทำให้คุณครูจำใจยกถ้วยขึ้นมา...)"
1600620-80 = "...ครู...คุณครู...!"
1600620-81 = "ทำใจดีๆ ไว้นะคุณครู! แงงงงงง...!"
1600620-82 = "[s] \"เพดานห้องไม่คุ้นเลย... มะ...ไม่สิ นี่มันท้องฟ้า\""
1600620-83 = "เป็นอะไรรึเปล่าคุณครู?!"
1600620-84 = "ไม่เป็นไรงั้นเหรอ? แต่ว่าเมื่อกี้คุณครูสลบไม่ได้สติเลยนะ?"
1600620-85 = "[s] \"ทุกอย่างเป็นเพียงแค่ความฝันในฤดูร้อน...\""
1600620-86 = "เอ๋...? พูดอะไรเนี่ย ไม่เข้าใจเลย คุณครูเนี่ยบางครั้งก็พูดอะไรเข้าใจยากจังเลยนะ..."
1600620-87 = "แต่ยังไงก็เถอะ... ตอนนี้ก็ใกล้มืดแล้วละคุณครู สุดท้ายก็ไม่ได้ทำอะไรเลยทั้งวัน..."
1600620-88 = "[s5] \"แต่ถึงยังไงเราก็คลายร้อนได้แล้วนะ\"\n[s6] \"คลายร้อนได้แล้วก็เรียกว่าบรรลุเป้าหมายแล้วรึเปล่า?\""
1600620-94 = "งั้นเหรอ...?"
1600620-95 = "ถึงจะไม่ค่อยเข้าใจก็เถอะ แต่คุณครูว่าไงก็ว่างั้นแล้วกัน! อื้อ!"

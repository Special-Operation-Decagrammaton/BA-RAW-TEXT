[translation]
10043005-1 = "บทเริ่มต้น;ประเพณีและประวัติศาสตร์"
10043005-7 = "สวัสดีครับ แฟนๆ เบสบอลทุกคน วันนี้ทุกคนจะได้พบกับการแข่งขันระหว่างทีมคอร์กี้ เบรฟส์ กับทีมอะบิสซิเนียน เรเดอร์ส"
10043005-8 = "ก่อนอื่นผมอยากขอบคุณแฟนๆ ทุกคนที่มาร่วมเชียร์กันอย่างเนืองแน่นในวันนี้"
10043005-16 = "การแข่งขันจะเริ่มในเร็วๆ นี้แล้วครับ! ขอเสียงเชียร์และเสียงปรบมือเพื่อเป็นการต้อนรับนักกีฬาของเรา#nด้วยครับ!"
10043005-22 = "[ns] \"บรรยากาศคึกคักมากเลยนะ...\""
10043005-23 = "ใช่ค่ะ! แมตช์นี้เป็นการพบกันระหว่างทีมคอร์กี้ เบรฟส์ และทีมอะบิสซิเนียน เรเดอร์ส ผู้ยึดมั่นในประเพณี..."
10043005-24 = "แม้จะเป็นแมตช์กระชับมิตร แต่ก็ร้อนแรงไม่แพ้การแข่งขันในระดับโปรเลยละค่ะ!"
10043005-25 = "ทีม 'คอร์กี้ เบรฟส์' เป็นทีมเบสบอลของบริษัทคอร์กี้ อิเล็กทรอนิกส์"
10043005-26 = "ส่วนทีม 'อะบิสซิเนียน เรเดอร์ส' เป็นทีมเบสบอลที่ได้รับการสนับสนุนโดยกลุ่มการค้า แห่งท่าเรือคาเนะซากิค่ะ"
10043005-27 = "ตอนแรกการแข่งขันนี้เป็นการแข่งขันเพื่อกระชับความสัมพันธ์ระหว่างกลุ่มการค้าผู้จัดหาสินค้า และบริษัทอิเล็กทรอนิกส์ที่รับสินค้านั้นมาทำผลิตภัณฑ์อีกที..."
10043005-28 = "แต่ตอนนี้ได้รับการยอมรับว่าเป็นหนึ่งในแมตช์ที่มีชื่อเสียงของเขตชิราโทริไปแล้วค่ะ!"
10043005-29 = "และต่อให้เป็นแมตช์กระชับมิตร แต่ทั้งสองทีมไฟแรงกันขนาดที่พยายามดึงตัวผู้เล่นดาวรุ่งมาไว้ใน#nทีมของตัวเองให้ได้ก่อนเลย!"
10043005-30 = "และขอบอกว่าฉันเป็นแฟนทีมคอร์กี้ เบรฟส์ค่ะ! พอได้มาเชียร์ทีมเบรฟส์ ก็นึกถึงชมรมเบสบอล#nมิลเลเนียมขึ้นมานิดหน่อยเลยนะคะ"
10043005-34 = "สู้สุดพลังเลยนะ เบรฟส์! วันนี้ฉันก็จะเชียร์ให้สุดใจเหมือนกัน!"
10043005-39 = "ปกติการมาสนามเบสบอลก็เป็นเรื่องที่เกิดขึ้นไม่บ่อยสำหรับฉันอยู่แล้ว พอได้มากับเทรนเนอร์ก็ยิ่ง#nเป็นเรื่องพิเศษเลยนะคะ"
10043005-40 = "แต่ฉันอยากให้ผู้ชมเอาความคลั่งไคล้นี้ไปใช้กับเรื่องอื่น... อย่างเช่นเทรนนิ่งเพื่อสุขภาพกายและใจค่ะ"
10043005-41 = "รุ่นพี่... มาถึงสนามเบสบอลทั้งที แต่ยังมาพูดเรื่องเทรนนิ่งอยู่อีกเหรอคะ..."
10043005-42 = "แน่นอนค่ะ เรย์ ไม่ว่ายังไงเราก็ต้องมีพละกำลังไว้ก่อนค่ะ จะได้ทำเรื่องอื่นๆ ได้"
10043005-43 = "นักเบสบอลตรงโน้นก็ด้วยค่ะ พวกเขาต้องออกกำลังกายและฝึกซ้อมอย่างหนักในที่ที่เรามองไม่เห็น#nแน่นอนค่ะ!"
10043005-47 = "อืม... ค่ะ ก็อาจจะเป็นอย่างนั้นนะคะ"
10043005-48 = "[s] \"หืม? ทำไมเสียงของเรย์ดูไม่ค่อยมั่นใจเลยล่ะ?!\""
10043005-52 = "ระ... รู้สึกอย่างนั้นเหรอคะ คุณครู?!"
10043005-53 = "ที่จริงจะรู้สึกอย่างนั้นก็ไม่แปลกหรอกค่ะ..."
10043005-54 = "ทำไมน่ะเหรอคะ?"
10043005-58 = "..."
10043005-59 = "คุณครูเคยได้ยินเกี่ยวกับสถิติที่ผ่านมาในชิราโทริซีรีส์มั้ยล่ะคะ?"
10043005-60 = "อ่า ใช่ค่ะ ถ้าไม่ใช่แฟนเบสบอล จะไม่รู้ก็คงไม่แปลก..."
10043005-67 = "หืม? พอลองเสิร์ชหาดู ก็ขึ้นว่าเป็นการแข่งขันที่มีประวัติศาสตร์ยาวนานเลยนะคะ แต่ว่าสถิติมัน..."
10043005-69 = "ระ... รุ่นพี่สึมิเระ?! อืม... ไม่สิ ยังไงถ้าเสิร์ชในอินเทอร์เน็ตมันก็ขึ้นอยู่แล้ว แล้วฉันก็เป็นคนหยิบเรื่องนี้#nมาพูดเองด้วย... ค่ะ"
10043005-70 = "[s] \"สถิติเป็นยังไงเหรอ?\""
10043005-71 = "แข่ง 189 แพ้ 189 ค่ะ"
10043005-72 = "[s] \"แพ้รวดเลยเหรอ?! เกือบ 200 แมตช์เลยนะ?!\""
10043005-73 = "กะ... ก็นั่นน่ะสิคะ! ที่จริงดูแค่ผลการแข่งขันก็พอรู้แล้ว!"
10043005-74 = "จะว่ายังไงดีล่ะ ในวงการกีฬา ผลการแข่งขันมันก็สำคัญอยู่หรอกค่ะ! แต่ก็มีคำที่บอกว่า 'แค่เข้าร่วม ไม่เน้นเข้ารอบ' แค่เท่านี้ก็มีความหมายแล้วค่ะ!"
10043005-75 = "แล้วในทุกครั้ง... ค่ะ... ผลมันก็เป็นอย่างที่ว่า"
10043005-76 = "แพ้แค่นิดหน่อยอยู่เรื่อยเลย! บางครั้งก็แต้มเดียว หรือไม่ก็สองแต้มค่ะ!"
10043005-77 = "แมตช์ที่เหมือนจะทำได้ดีก็ออกมาไม่ดี ส่วนแมตช์ไหนที่ถอดใจแล้วก็กลับทำคะแนนได้เฉย ก็เลยยิ่งอยากเห็นผลงานในครั้งต่อไป!"
10043005-78 = "แฟนๆ ถึงได้ตั้งฉายาให้ทีมคอร์กี้ เบรฟส์ว่า 'คอร์กี้นักล่า' ค่ะ!"
10043005-79 = "แต่เอาจริงๆ กลับเป็นการ 'ไล่กวด' คะแนนมากกว่าสินะคะ เรย์"
10043005-83 = "หยุดเลยค่ะ! รุ่นพี่! ถึงมันจะจริงที่เราต้องไล่ตามคู่แข่งให้ได้ก็เถอะค่ะ!"
10043005-84 = "เอาเถอะ... ต่อให้จะแพ้อยู่ทุกครั้งไป แต่มันก็มีมนตร์เสน่ห์ที่ทำให้เราอยากดูการแข่งขันต่อไปค่ะ..."
10043005-85 = "ถึงครั้งนี้จะไม่สำเร็จ แต่ถ้าครั้งหน้ามีจริง! บางทีก็! อาจจะทำลายสถิติตัวเองได้!"
10043005-89 = "เพราะงั้นวันนี้ฉันจะเชียร์อย่างสุดใจเลย! สู้เขา คอร์กี้! อย่าแพ้ล่ะ!"
10043005-93 = "[ns] \"เบสบอลมันคืออะไรกันนะ...\""
10043005-94 = "มันไม่ใช่อะไรเลย..."
10043005-95 = "แต่ก็เป็นทุกสิ่งทุกอย่างด้วยค่ะ!"
10043005-96 = "ถ้างั้นการเทรนนิ่งก็คงเป็น..."
10043005-100 = "หยุดเปรียบเทียบทุกอย่างกับการเทรนนิ่งเถอะค่ะ!"
10043005-101 = "[s] \"สะ... สู้ๆ นะ เบรฟส์...?\""
10043005-105 = "ขอบคุณค่ะ คุณครู! คุณครูก็แอบเป็นแฟนของคอร์กี้นักล่าเหมือนกันเหรอคะ?!"
10043005-106 = "ไม่หรอกค่ะ ฉันว่าไม่น่าจะเป็นอย่างนั้นหรอก..."
10043005-111 = "เอาละครับ! ทั้ง 3 คนที่กล้องจับภาพได้ตอนนี้! คุณเป็นผู้โชคดีในโฟโต้ไทม์ครับ ยินดีด้วยครับ!"
10043005-115 = "นี่มันอะไรเหรอคะ?"
10043005-116 = "หืม? โฟโต้ไทม์? กับแค่พวกเราเหรอ?"
10043005-117 = "อ๊ะ คุณครูกับรุ่นพี่ยังไม่รู้สินะคะ นี่ก็เหมือนเกมอย่างหนึ่งค่ะ..."
10043005-118 = "กฎก็คือ แฟนๆ ที่ถูกกล้องสุ่มจับภาพได้ระหว่างการแข่งขันต้องโพสท่าด้วยกันค่ะ"
10043005-122 = "เราจะขยายภาพขึ้นหน้าจอให้ครับ เข้ามาใกล้ๆ กันแล้วโพสท่าสวยๆ หน่อยครับ!"
10043005-123 = "อย่างนี้สินะ ในสนามเบสบอลมีธรรมเนียมแบบนี้ด้วยสินะคะ น่าสนใจจังเลยค่ะ เทรนเนอร์"
10043005-124 = "ฮุฮุ งั้นฉันจะไม่ปฏิเสธนะคะ"
10043005-129 = "ฉันก็ด้วยค่ะ..."
10043005-130 = "แหะๆ... มาถ่ายรูปด้วยกันนะคะ คุณครู"
10043005-144 = "เอาละครับ! ขอบคุณสำหรับโมเมนต์ที่น่าประทับใจครับ! เรากลับมาที่การแข่งขันกันต่อเลยครับ!"
10043005-150 = "พูดยังไม่ทันขาดคำ ทีมอะบิสซิเนียน เรเดอร์สก็ตีลูกได้แล้ว วันนี้ก็เหมือนจะทำคะแนนนำได้ก่อน#nเหมือนเคยนะครับ"
10043005-153 = "นะ... นั่นมัน...?"
10043005-154 = "ถ้ามองไม่ผิด นั่นคุณครูจากชาเล่ต์นี่นา? ทำไมคนนั้นถึงมาอยู่ที่นี่ล่ะ...?"
10043005-155 = "เดี๋ยวนะ... นี่อาจเป็นโอกาสที่ฟ้าประธานมาให้เราก็ได้"
10043005-160 = "ถ้าจะแก้ปัญหาที่ฉันประจันหน้าอยู่ตอนนี้ละก็... ต้องเป็นคนนี้นี่แหละ!"

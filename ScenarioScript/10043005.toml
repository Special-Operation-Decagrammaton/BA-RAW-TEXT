10043005-22 = "[ns] \"엄청난 열기네…….\""
10043005-23 = "3;레이;03;그럼요! 이 경기야말로 전통을 자랑하는 코기 브레이브스와 아비시니안 레이더스 사이의 시라토리 시리즈…….\n#3;em;[반짝]\n#3;a\n#3;hophop"
10043005-24 = "3;레이;10;친선 매치이지만, 그 열기는 웬만한 프로 야구급으로 뜨거운 경기니까요!"
10043005-25 = "3;레이;14;우선 코기 브레이브스는, 코기전자의 실업 야구팀이에요. \n#3;m4"
10043005-26 = "3;레이;13;그리고 아비시니안 레이더스는, 카네사키 항구를 거점으로 하는 상인회의 실업 야구팀이고요."
10043005-27 = "3;레이;02;처음에는 물품을 공급하는 상인회와, 그걸 납품받아 제품을 만드는 전자 회사 사이의 친선 경기로 시작한 시리즈였지만……."
10043005-28 = "3;레이;03;지금은, 어엿한 시라토리구의 명물 시합 중 하나로 인정받았죠!\n#3;em;[재잘]"
10043005-29 = "3;레이;10;양 팀이 얼마나 열정적이냐면, 친선 매치임에도 불구하고 사회인 유망주를 서로 가장 먼저 있는 대로 끌어모으려 애쓰기까지 하거든요!\n#3;m3"
10043005-30 = "3;레이;13;덧붙여서 말씀드리자면, 저는 코기 브레이브스의 팬입니다! 뭔가, 조금, 밀레니엄 야구부와 묘한 동질감이 느껴지기도 해서 말이죠."

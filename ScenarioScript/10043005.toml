[translation]
10043005-1 = "序幕;傳統與歷史"
10043005-7 = "各位球迷們大家好！#n接下來，柯基勇士隊與阿比西尼亞突襲者隊馬上就要展開對決了。"
10043005-8 = "非常感謝各位球迷今天熱情的支持。"
10043005-16 = "那麼比賽即將開始！請用歡呼和掌聲為比賽揭開序幕吧！"
10043005-22 = "[ns]「氣氛真熱烈啊……」"
10043005-23 = "那當然囉！#n這場比賽可是柯基勇士隊跟阿比西尼亞突襲者隊之間，歷史悠久的白鳥系列賽……"
10043005-24 = "雖然只是友誼賽，但現場的熱度可是完全不輸給職棒哦！"
10043005-25 = "首先柯基勇士隊，是柯基電子的業餘棒球隊。"
10043005-26 = "而阿比西尼亞突襲者隊，則是以鐘崎港為根據地的商會業餘棒球隊。"
10043005-27 = "起初這個系列賽，只是供貨方的商會與採購方的電子公司為了增進友誼而舉辦……"
10043005-28 = "不過時至今日，已經成為白鳥區的知名賽事之一了！"
10043005-29 = "雖然只是友誼賽，雙方的重視程度可是高到會想盡辦法招募有潛力的業餘新秀哦！"
10043005-30 = "順帶一提，我是柯基勇士隊的粉絲！#n因為我總覺得，他們跟千年棒球部有著微妙的共通點。"
10043005-34 = "勇士隊加油！我今天也會為你們加油的！"
10043005-39 = "我並不常到棒球場來，一想到是和指導員一起，感覺又更特別了呢。"
10043005-40 = "不過如果能把這份熱情稍微分配到其他地方……#n比如健康又充滿活力的訓練上就更好了。"
10043005-41 = "前輩……怎麼都到球場了還在說訓練的事啊……"
10043005-42 = "那當然囉，莉同學。#n無論做任何事，都需要有體力作為基礎。"
10043005-43 = "就像那些棒球選手們，私底下一定也反覆進行著超乎常人的鍛鍊和訓練！"
10043005-47 = "嗯……大概是吧。"
10043005-48 = "[s]「咦？莉的聲音聽起來怎麼沒什麼把握！？」"
10043005-52 = "聽，聽起來有那種感覺嗎？老師！？"
10043005-53 = "其實這好像也無可厚非……"
10043005-54 = "問我為什麼？"
10043005-58 = "……"
10043005-59 = "老師你對白鳥系列賽的戰績有概念嗎？"
10043005-60 = "啊，嗯。不知道也是很正常的……"
10043005-67 = "嗯？我上網搜尋才發現，這個系列賽的歷史真的很悠久呢。#n至於戰績就……"
10043005-69 = "堇，堇前輩！？唔嗯……算了。#n反正在網路上稍微查一下就會知道，而且也是我自己先提到的……"
10043005-70 = "[s]「所以戰績怎麼樣？」"
10043005-71 = "189戰189敗……上面是這樣寫的。"
10043005-72 = "[s]「全敗！？而且竟然打了將近200場！？」"
10043005-73 = "這，這個嘛……！只看結果確實是那樣沒錯！"
10043005-74 = "不過該怎麼說呢……#n雖然體育賽事的結果當然很重要沒錯，但也有人說光是參加本身就有意義了嘛！"
10043005-75 = "只是因為各種原因……才會總是得到一樣的結果。"
10043005-76 = "往往都以毫釐之差……區區1到2分的差距敗北！"
10043005-77 = "明明看似有機會卻永遠差臨門一腳，看似沒機會卻依舊緊追在後……#n就是這樣才讓人更期待下一場比賽！"
10043005-78 = "這也是為什麼柯基勇士隊，在粉絲之間被叫做「鍋貼柯基」的原因……"
10043005-79 = "畢竟就算輸了也是「雖敗猶榮」啊，莉同學。"
10043005-83 = "不要這樣說嘛！前輩！#n雖然是事實沒錯……永遠都差那麼一點！"
10043005-84 = "……總之大概就是這樣。#n就算他們每次都輸，卻有股讓人莫名期待下一場比賽的魔力……"
10043005-85 = "雖然這次的結果不如人意，但下次說不定就……一定！絕對會贏的！"
10043005-89 = "所以今天也要全力應援！#n加油！不要輸啊！"
10043005-93 = "[ns]「所謂的棒球究竟是什麼呢……」"
10043005-94 = "……什麼都不是。"
10043005-95 = "但也什麼都是！"
10043005-96 = "原來如此。#n看來果然還是需要更多的訓練……"
10043005-100 = "不要老是起承轉訓練啦！"
10043005-101 = "[s]「勇，勇士隊加油……！」"
10043005-105 = "謝謝老師！老師果然也是「鍋貼柯基」潛在的粉絲嗎！？"
10043005-106 = "不，我倒不這麼認為……"
10043005-111 = "來來來！鏡頭裡的三位觀眾朋友！#n現在是拍照時間哦，恭喜你們！"
10043005-115 = "什麼意思？"
10043005-116 = "嗯？拍照時間？我們嗎？"
10043005-117 = "啊，老師和前輩可能不知道吧。#n這算是一種球場的互動遊戲……"
10043005-118 = "攝影師會在球場裡隨機捕捉觀眾，而觀眾則要配合鏡頭擺姿勢。"
10043005-122 = "我們會把鏡頭拉近，所以請靠近一點，盡可能擺出最好看的表情哦！"
10043005-123 = "原來棒球場還有這種文化啊。#n真有趣呢，指導員。"
10043005-124 = "呵呵，那我就不客氣了。"
10043005-129 = "那麼我也……"
10043005-130 = "嘿嘿……請多多指教囉。老師。"
10043005-144 = "好！謝謝這三位觀眾為大家帶來的精彩畫面！#n讓我們回到比賽吧！"
10043005-150 = "啊，話都還沒說完，阿比西尼亞突襲者隊就擊出了一支安打！#n果然今天也是突襲者隊先奪得先機嗎！？"
10043005-153 = "那，那個人是……？"
10043005-154 = "如果我沒看錯的話……是夏萊的老師？#n他為什麼會出現在比賽現場……？"
10043005-155 = "不……從某個角度來說，這或許是上天賜予的機會。"
10043005-160 = "為了幫助我們解決現在面臨的問題……！"

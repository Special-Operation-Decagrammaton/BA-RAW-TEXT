10043005-39 = "3;스미레;99;야구장을 찾는 것은 저로서는 흔치 않은 일입니다만, 트레이너와 함께라고 생각하니 더욱 각별해지는군요.\n#3;em;…\n#3;a"
10043005-40 = "3;스미레;04;다만 이 열정을 조금 더 다른 곳에…… 예를 들자면 건강과 활력을 위한 트레이닝에 사용한다면 더욱 좋겠지만요.\n#3;stiff"
10043005-41 = "1;레이;09;선배…… 경기장에서까지 트레이닝 이야기인가요…….\n#1;em;[세로선]\n#1;ar\n#3;m5"
10043005-42 = "3;스미레;08;물론입니다, 레이 양. 뭐든지 체력이 뒷받침되어야 다른 일을 할 수 있는 법입니다."

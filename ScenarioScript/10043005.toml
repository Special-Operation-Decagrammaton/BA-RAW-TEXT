[translation]
10043005-1 = "Prologue;Tradition and History"
10043005-7 = "Hello, baseball fans! We're here today for a game between the Corgi Heroes and the Abyssinian Pillagers."
10043005-8 = "We would like to give our sincere thanks to all the fans who've come to our stadium today."
10043005-16 = "The game's about to start! Let's hear it for our players!"
10043005-22 = "[ns] \"You can really feel the excitement.\""
10043005-23 = "Of course! The Heroes and the Pillagers have a lot of history between them. It's what makes the Shiratori series so compelling!"
10043005-24 = "This is just a friendly game, but the passion runs as strong here as you'd see in any league series ever!"
10043005-25 = "So, some background info: the Heroes come from Corgi Electronics. They're the company baseball team. "
10043005-26 = "The Pillagers are a company team too. They're from a merchants' guild around the Kanesaki Port."
10043005-27 = "See, the merchant's guild provides the raw materials for the electronics company's products. At first, they just started having casual weekend games together..."
10043005-28 = "But now, every game of theirs is a must-watch, for all of Shiratori City!"
10043005-29 = "Both teams put their whole heart into it. And they're always looking for new players from their company staff."
10043005-30 = "If you're wondering, I'm a Heroes fan, myself. I feel like they have a lot in common with the Millennium Baseball Club."
10043005-34 = "Go, Heroes! Wooo!"
10043005-39 = "Me, I don't usually come to the stadium, but for my trainer, I'm happy to be here."
10043005-40 = "Though I do think we'd be better off channeling this passion into something more long-term, like our own health and stamina."
10043005-41 = "Sumire, are you talking about training here? Now?"
10043005-42 = "Of course, Rei. You need stamina as a foundation to do anything."
10043005-43 = "Look at those players. Think of the discipline it takes to train yourself to that level."
10043005-47 = "Hm... That's a good point."
10043005-48 = "[s] \"You sound...uncertain about that.\""
10043005-52 = "D-Do I, Sensei?!"
10043005-53 = "...Well, I suppose I might have come across that way."
10043005-54 = "What exactly am I uncertain about, you ask?"
10043005-58 = "..."
10043005-59 = "Well, how much do you know about the Shiratori series' statistics?"
10043005-60 = "I mean, not that I'm expecting you to know off the top of your head..."
10043005-67 = "Oh, this is quite a long-running series, isn't it? ...Wait, is this a typo?"
10043005-69 = "S-Sumire?! Well...yeah, I guess it doesn't take long to search it up..."
10043005-70 = "[s] \"Is what a typo?\""
10043005-71 = "According to this, the Heroes have played 189 games against the Pillagers...and lost every single one of them."
10043005-72 = "[s] \"Every single one? For almost 200 games?!\""
10043005-73 = "W-Well...that's just the raw numbers!"
10043005-74 = "And...yeah, the numbers ARE important...but we hand out participation trophies for a reason, right?"
10043005-75 = "So... Okay, yeah. That's...how the games have turned out so far."
10043005-76 = "But they're always close! Just one or two runs, most of the time!"
10043005-77 = "Sometimes the Heroes are ahead, until they aren't. Sometimes it's hopeless, and then they almost catch up. That's what keeps the fans coming back!"
10043005-78 = "We like to call the Heroes \"the Hounds,\" because they're always chasing that win!"
10043005-79 = "\"Chasing\" it means they haven't caught it yet, though."
10043005-83 = "Well, YES, they're working on that!"
10043005-84 = "Anyway, that's the appeal. Even when they lose, we all want to see if they make it next time."
10043005-85 = "\"Next time,\" you know? \"Next game for sure.\""
10043005-89 = "So here I am, cheering for them again. Go, Heroes! You can do it!"
10043005-93 = "[ns] \"...Baseball is deep.\""
10043005-94 = "Oh, I know, sports can seem silly to people who don't follow them."
10043005-95 = "But to people who do, they can mean the whole world!"
10043005-96 = "That just goes to show, I need to train even harder."
10043005-100 = "Not everything is about your training!"
10043005-101 = "[s] \"L-Let's go Heroes...?\""
10043005-105 = "Thank you, Sensei! I knew you'd have a soft spot for the Hounds!"
10043005-106 = "I'm not sure that's what's happening here..."
10043005-111 = "Hey there! You three are on camera! Congratulations, it's photo time!"
10043005-115 = "What's this?"
10043005-116 = "Oh, we're doing photo time?"
10043005-117 = "Ah, you two probably don't know. This is kind of a game for the fans..."
10043005-118 = "If you get caught on camera together in mid-game, you've gotta bunch up and pose."
10043005-122 = "All right, get in tight and show us your best!"
10043005-123 = "Hm, so the spectators have their own culture. That's interesting, don't you think, Trainer?"
10043005-124 = "Fufu, in that case, I can't refuse."
10043005-129 = "Neither can I..."
10043005-130 = "Heehee... Let's make it look good, Sensei."
10043005-144 = "Yes! Great pose, thank you! All right, back to the game!"
10043005-150 = "Ah, while we were talking, the Pillagers got their first hit. Annnd they're ahead already."
10043005-153 = "H-Hey, is that..."
10043005-154 = "Looks like Schale's Sensei. Haven't seen them here before. What are they doing here?"
10043005-155 = "I don't know, but maybe it's a sign. This could be our chance..."
10043005-160 = "...to finally turn things around!"

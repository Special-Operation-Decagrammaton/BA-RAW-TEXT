[translation]
90000025-2 = "Excellent work today, Sensei."
90000025-3 = "I'm organizing the data we collected on Decagrammaton as quickly as I can."
90000025-4 = "I believe we'll be able to interpret its structure now."
90000025-6 = "Let's see..."
90000025-7 = "What's this?"
90000025-11 = "Oh, my."
90000025-12 = "Someone is hacking into the server, President."
90000025-13 = "How can that be? This is a closed network accessible only within Millennium."
90000025-18 = "*gasp*! All of the firewalls have been deactivated!"
90000025-19 = "This is an emergency. I'll destroy the power source, so please stand back."
90000025-27 = "I'm afraid we're too late."
90000025-32 = "...!"
90000025-33 = "..."
90000025-34 = "Our location has been compromised."
90000025-35 = "But I completely destroyed the power source."
90000025-36 = "A completely closed off network being hacked into, even without a power source..."
90000025-37 = "Don't you see, Eimi? What we're dealing with can only be classified as a phenomenon beyond our understanding."
90000025-41 = "I can hear something coming from the speakers."
90000025-42 = "*buzz* At... *buzz* last... *buzz*"
90000025-43 = "..."
90000025-44 = "We finally meet, [USERNAME]."
90000025-45 = "...!"
90000025-46 = "[s] \"Who and what are you?\""
90000025-47 = "N-No! You mustn't make contact with it!"
90000025-48 = "I am me. My existence simply is. I am the beginning and the end. I am precisely what you suspect me to be."
90000025-51 = "I am me. There is no further explanation."
90000025-52 = "No further evidence is required to prove my existence. I give myself permission to exist."
90000025-53 = "I am both Mystic and Terror—logos and pathos."
90000025-54 = "My halo is proof of such. Behold, as I demonstrate."
90000025-58 = "It's running some kind of scan."
90000025-59 = "Stay still, Sensei. Just to be safe."
90000025-60 = "..."
90000025-61 = "[USERNAME]. You possess something with which I am unfamiliar. You hold something that I cannot interpret."
90000025-62 = "I shall preach to you the gospel, and you shall faithfully share and obey it!"
90000025-66 = "Sensei! It's attempting to hack into your tablet!"
90000025-71 = "[ns] \"(The Shittim Chest?)\""
90000025-72 = "Haaaaaa..."
90000025-73 = "Ahhhhhh..."
90000025-74 = "..."
90000025-76 = "Zzz... Zzz..."
90000025-77 = "Heehee. That tickles..."
90000025-78 = "Achoo!"
90000025-81 = "AHHH! What...? Why?"
90000025-82 = "G-GAAAHHHHHH!"
90000025-87 = "...?!"
90000025-91 = "It...disappeared?"
90000025-92 = "Checking the logs... Yes. It would seem so."
90000025-93 = "Are you okay, President?"
90000025-94 = "Y-Yes, I'll be fine. What about you, Sensei?"
90000025-95 = "[s] \"Right as rain.\""
90000025-99 = "How strange."
90000025-100 = "It must have been unable to access that tablet you carry with you. Remarkable. I'd heard it was something the General Student Council president left for you, but even still..."
90000025-101 = "So that was Decagrammaton. It's even more deluded than I expected it to be. Perhaps it would be right to call its personality that of a megalomaniac."
90000025-102 = "We only discovered the tip of the iceberg, yet it caused this much damage. How terrifying."
90000025-103 = "It would be dangerous to simply label it as a rogue AI."
90000025-104 = "We'll have to establish a more secure facility before resuming our research."
90000025-105 = "What do you think, Eimi? It's about time we had a proper clubroom. I wouldn't want something like this to happen again."
90000025-106 = "Understood. I'll begin making plans within our activity budget."
90000025-107 = "Wonderful. I suppose this wraps up our first contact with Decagrammaton. It was unlike anything I expected, being attacked so suddenly..."
90000025-108 = "...but next time shall be different."
90000025-109 = "I promise you that."
90000025-111 = "Next Episode;Research Part 3: PMC Excavation Site"

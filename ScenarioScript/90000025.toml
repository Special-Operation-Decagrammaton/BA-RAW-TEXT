90000025-104 = "คราวหน้าคงจะต้องวิจัยในห้องที่มีอุปกรณ์ป้องกันอย่างเหมาะสมแล้วค่ะ"
90000025-105 = "เอมิ จัดทำห้องชมรมของชมรมปรากฏการณ์ลี้ลับขึ้นด้วยค่ะ และเตรียมการป้องกันสถานการณ์ แบบนี้เอาไว้ล่วงหน้าด้วย เอาให้พร้อมสุดๆ นะคะ"
90000025-106 = "เข้าใจแล้ว ฉันจะเตรียมให้พร้อมในงบกิจกรรมชมรมแล้วกัน"
90000025-107 = "ค่ะ ถ้างั้นคราวนี้จะคิดว่าเป็นการติดต่อกับเดคาแกรมมาทอนครั้งแรกแล้วกันนะคะ ถึงจะถูกจู่โจมโดยไม่คาดคิดก็ตาม..."

70005010-1 = "#title;어느 2월 18일의 기록"
70005010-2 = "#wait;500"
70005010-3 = "#stm;[0,0];instant;128;[log]2월 18일[/log]"
70005010-4 = "#wait;2000"
70005010-5 = "#clearST\n#all;hide"
70005010-6 = "#place;게헨나 학원 선도부실"
70005010-7 = "3;아코;09;케이크 주문은 확실하게 한 건가요?!\n#3;a\n#3;closeup"
70005010-8 = "3;아코;05;오늘 주문을 마쳐야 내일 제대로 도착할 텐데 말이죠!\n#3;em;[!]\n#3;closeup"
70005010-9 = "#all;hide"
70005010-10 = "3;이오리;07;걱정 마, 아코 쨩. 몇 번이고 반복해서 확인했어.\n#3;em;[땀]\n#3;closeup"
70005010-11 = "#all;hide"
70005010-12 = "3;치나츠;06;……예산이 살짝 아슬아슬했지만, 어떻게든 되었다고나 할까요…….\n#3;em;[한숨]\n#3;closeup"
70005010-13 = "#all;hide"
70005010-14 = "3;아코;04;잠깐만요. 저 지금 간과할 수 없는 이야기를 들은 것 같은데요?\n#3;em;[반응]"
70005010-15 = "3;아코;05;예산이 아슬아슬했다는 말은 뭐죠, 치나츠? 이번 달에는 충분히 여유가 있었어야 하는데요?"
70005010-16 = "3;아코;14;제가 분명 히나 부장님의 생일 케이크를 주문하려고, 저번 달 간식 예산을 어느 정도 이월시켰을 텐데요?!\n#3;em;[빠직]"
70005010-17 = "4;이오리;06\n2;치나츠;01\n#3;hide"
70005010-18 = "4;이오리;06;어쩐지 간식이 약간 부족하더라니…….\n#4;em;…"
70005010-19 = "4;이오리;01\n2;치나츠;01\n1;아코;04;지, 지금 그게 중요한가요?! 아무튼 왜 예산이 부족한 거죠?\n#1;ar\n#2;m3\n#4;m5\n#1;em;[반응]"
70005010-20 = "2;치나츠;02;그게, 만마전 쪽에서…….\n#2;em;…"
70005010-21 = "1;아코;14;또 그 너구리들인가요? 내가 진짜…….\n#1;stiff"
70005010-22 = "4;이오리;07;히나 부장의 생일 선물을 사 준다고, 우리 쪽으로 청구서를 돌려놔서 말이야……."
70005010-23 = "1;아코;10;……만마전에서 부장님의 생일을 챙긴다고요? 마코토 의장, 탄핵당하기라도 했어요?!\n#1;em;[!]"
70005010-24 = "2;치나츠;02;그건 아닌데요……. 선물이랍시고, 팥 없는 고급 단팥 케이크를 보내주려고 했습니다."
70005010-25 = "4;이오리;01\n2;치나츠;01\n1;아코;11;팥 없는 고급 단팥 케이크는 또 뭔가요. 그건 그냥 심술이잖아요……. 그보다 애초에 그런 게 왜 있는 거죠?\n#1;em;[땀]\n#1;m3\n#2;dr\n#4;dr"
70005010-26 = "#all;hide"
70005010-27 = "3;치나츠;01;네. 그래서 특별히 주문 제작을 했다는 것 같습니다."
70005010-28 = "3;아코;11;아니, 그 정성으로 학원 운영을 좀…….\n#3;em;…"
70005010-29 = "3;아코;11\n5;이오리;01;그런데 정작 베이커리에서는, 주문 오류라고 생각했던 건지, 그냥 고급 단팥 케이크를 보내 줬어…….\n#3;m1\n#5;al\n#5;em;[땀]"
70005010-30 = "3;아코;11;……잘들 하는 짓이네요, 진짜……."
70005010-31 = "3;아코;04;그런데, 잠깐만요. 결국 우리한테 청구서 보냈다는 사실은 변하지 않았잖아요?!\n#3;em;[반응]"
70005010-32 = "5;이오리;06;응. 바로 그게 문제지…….\n#5;em;[한숨]"
70005010-33 = "#all;hide"
70005010-34 = "3;치나츠;02;아무튼, 그 덕분에 예산이 약간 모자라게 되어서 말이죠."
70005010-35 = "3;치나츠;01;케이크는 무사히 주문했습니다만, 택배 배송 회사는 가장 저렴한 곳으로 정할 수밖에 없었어요."
70005010-36 = "3;아코;06;으음…….\n#3;em;[속상함]"
70005010-37 = "3;아코;01;뭐, 그 정도는 괜찮겠죠. 애초에 그런 예산은 아낄 수 있으면 아끼는 게 좋기도 하고요."
70005010-38 = "3;아코;03;그러면, 배송지 안내 웹페이지 좀 보여 주겠어요?\n#3;em;[음표]"
70005010-39 = "3;이오리;02;자, 여기.\n#3;em;[반응]\n#3;closeup\n#3;greeting"
70005010-40 = "3;아코;01;음, 음. 이대로면 내일 오전쯤에 카와니시 집하장으로 전달되어서, 정오 정도에는 선도부실에 도착하겠네요.\n#3;greeting"
70005010-41 = "3;아코;07;부장님의 생일 파티는 오후 4시에 하기로 했으니까, 딱 좋다고도 볼 수 있겠어요.\n#3;em;[재잘]"
70005010-42 = "3;아코;03;아무튼, 다들 수고하셨어요. 내일이 기대되네요.\n#3;greeting"
70005010-43 = "3;치나츠;06;네, 네에. 그렇네요.\n#3;stiff"
70005010-44 = "3;아코;02;왜 그러나요, 치나츠? 뭔가 문제라도 있나요?\n#3;em;[?]"
70005010-45 = "3;치나츠;99;아뇨, 없습니다. 아코 행정관.\n#3;em;[반응]\n#3;closeup"
70005010-46 = "#st;[0,0];instant;1;"
70005010-47 = "#clearST"
70005010-48 = "3;치나츠;99\n#3;closeup"
70005010-49 = "#wait;1000"
70005010-50 = "3;치나츠;01;(하지만 이렇게 모든 일이 잘 풀리는 것처럼 보일 때에는, 꼭 하나씩 문제가 터지던데 말이죠…….)\n#3;closeup\n#3;em;…"
70005010-51 = "3;치나츠;01;(아뇨, 괜찮겠죠. 분명 제가 너무 그동안의 경험들 때문에 과하게 생각하고 있는 것뿐일 테니까요.)\n#3;closeup"
70005010-52 = "3;치나츠;05;(뭐니 뭐니 해도, 내일은 늘 고생하시는 부장님의 생일이니까요.)\n#3;closeup"
70005010-53 = "#all;hide"
70005010-54 = "#place;현룡문 귀빈실"
70005010-55 = "3;미나;08;그래서, 어떠냐! 너희 현무상회의 도움도 받지 않고! 우리는 이 명품 케이크 샵에서 문주님의 생일 케이크를 주문했다는 것이다!\n#3;em;[!]\n#3;a"
70005010-56 = "3;미나;09;어때? 대단하지? 이제 이런 일에 굳이, 너희들 현무상회에 일일이 자문을 구할 필요도 없다는 거란 말이지?"
70005010-57 = "3;미나;08;후후후……. 이거야말로 새롭게 나아가는 현룡문의 발전상을 보여주는, 또 하나의 명백한 증거라고 하지 않을 수 없겠군!\n#3;em;[재잘]"
70005010-58 = "3;미나;08\n5;레이죠;14;아, 네네. 그런데 확실히 케이크 샵은 잘 고른 것 같습니다만, 택배회사는 어디인가요?\n#5;em;[땀]\n#5;a\n#3;m1"
70005010-59 = "3;미나;14;? 그냥 제일 싸고 빠르게 해 준다는 곳으로 했는데?\n#3;em;[?]"
70005010-60 = "5;레이죠;99;……세상에 싸고 빠른 건 없습니다. 분명 어딘가에는 하자가 있기 마련이죠."
70005010-61 = "3;미나;14;그렇지만 광고 팝업에는 그렇게 나와 있었는데?"
70005010-62 = "5;레이죠;04;………혹시, 광고 전단지 잘 믿는 타입입니까?\n#5;em;…"
70005010-63 = "3;미나;09;당연하지! 분명 뭔가 자신이 있을 테니까, 그렇게 써 놓는 것 아니겠어?"
70005010-64 = "5;레이죠;15;하아……. 정말로 자본주의가 좋아하실 만한 분이군요……. 잠시 줘 보시죠.\n#5;em;[한숨]"
70005010-65 = "#st;[0,0];instant;1;"
70005010-66 = "#clearST"
70005010-67 = "3;미나;01\n5;레이죠;05\n#3;m3\n#3;h\n#5;h\n#wait;1000"
70005010-68 = "3;미나;01\n5;레이죠;05\n#3;h\n#5;h\n#3;greeting\n#wait;1000"

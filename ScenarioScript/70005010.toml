70005010-70 = "3;미나;01\n5;레이죠;05\n#5;em;…\n#3;h\n#5;h\n#wait;2500"
70005010-71 = "#all;hide"
70005010-72 = "3;레이죠;04;……? ……!!! 왜 하필 여기입니까?!\n#3;shake\n#3;em;[?!]\n#3;closeup"
70005010-73 = "3;미나;04;어, 어어? 뭔데? 왜 그러는데?\n#3;em;[땀]\n#3;stiff\n#3;closeup"
70005010-74 = "#all;hide"
70005010-75 = "1;미나;04\n5;레이죠;05;……이 기회에 현룡문도 알아 두면 좋을 것 같네요. 이 택배 회사는, 물론 제대로만 된다면 가장 싸고 빠르게 택배를 받을 수 있는 곳은 맞습니다.\n#5;em;…"
70005010-76 = "1;미나;09;오, 그거 좋네! 역시 나의 하드보일드한 안목은 틀리지 않았어!\n#1;em;[음표]"
70005010-77 = "5;레이죠;16;사람 말을 잘 들어주세요. '제대로만 되면' 이라고 했잖습니까.\n#5;em;[한숨]"
70005010-78 = "1;미나;04;……제대로 된다는 게, 무슨 뜻이야?\n#1;stiff"
70005010-79 = "#st;[0,0];instant;1;"
70005010-80 = "#clearST"
70005010-81 = "1;미나;04\n5;레이죠;16\n#1;h\n#5;h\n#1;dl\n#5;m3\n#wait;1500"
70005010-82 = "3;레이죠;02;<카와니시 허브>에서, 물류가 꼬이지 않는 경우에 한정된다는 뜻입니다.\n#3;closeup\n#1;hide\n#5;hide"
70005010-83 = "3;미나;02;카와니시 허브?\n#3;em;[?]\n#3;closeup"
70005010-84 = "3;레이죠;05;그렇습니다. 그곳은…… 키보토스에서도, 굴지의 물류량을 자랑하는 집하장이죠.\n#3;em;[반응]"
70005010-85 = "3;레이죠;09;이르기를, 거기에는 삼도천으로 이어지는 진입로가 숨겨져 있다고도 하고."
70005010-86 = "3;레이죠;10;심지어 그곳 너머의 장소에 도달했다가 돌아온 택배 물품은, 그 전의 물품과 완전히 다른 것이 되어 배송된다고도 하죠……."
70005010-87 = "3;레이죠;10\n1;미나;04;무, 무슨 소리야. 그건……?\n#1;em;[?]\n#1;a\n#3;m5"
70005010-88 = "3;레이죠;06;허구한날 물류가 꼬여서, 이 택배가 저 택배로 가고, 저 택배가 이 택배로 온다는 뜻입니다."
70005010-89 = "1;미나;04;그, 그러면 그런 회사는, 영업을 하면 안 되는 거 아니야?!\n#1;stiff\n#1;em;[땀]"
70005010-90 = "3;레이죠;08;당신도 말했잖습니까. 싸고 빠르다고요."
70005010-91 = "3;레이죠;01;……다시 말해, '싸고 빠를 수도 있다' 고요…….\n#3;em;[한숨]"
70005010-92 = "1;미나;04;……!\n#1;em;[!]"
70005010-93 = "1;미나;14;혀, 현룡문 집합!!!\n#1;hophop\n#fontsize;80"
70005010-94 = "1;미나;14\n5;레이죠;07;진정하시죠……. 지금 집합 걸어서 뭘 하려고요. 그 집하장에서 하나하나 물류 검토라도 할 생각입니까?"
70005010-95 = "#st;[0,0];instant;1;"
70005010-96 = "#clearST"
70005010-97 = "1;미나;14\n5;레이죠;07\n#1;em;…\n#1;h\n#5;h\n#wait;2500"
70005010-98 = "3;미나;04;그 방법이 있었나!\n#3;em;[전구]\n#3;closeup\n#1;hide\n#5;hide"
70005010-99 = "3;레이죠;07;지금 그러지 말자는 이야기를 하고 있지 않습니까!\n#3;em;[!]\n#3;closeup"

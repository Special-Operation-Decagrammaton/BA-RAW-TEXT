[translation]
70005010-1 = "Record of a February 18th"
70005010-3 = "[log]February 18th[/log]"
70005010-6 = "Gehenna Prefect Team's Club Room"
70005010-7 = "You're absolutely sure you ordered the cake?!"
70005010-8 = "It needs to be ordered by end of day today if we want it by tomorrow!"
70005010-10 = "Don't worry, Ako. We double-checked, like, ten times."
70005010-12 = "...It was cutting it rather close to the budget, but we managed."
70005010-14 = "Excuse me. What did you just say?"
70005010-15 = "What do you mean by \"cutting it rather close,\" Chinatsu? Our budget should have been more than sufficient!"
70005010-16 = "I purposely cut some of the snack budget from last month, so we would be able to afford Head Prefect Hina's birthday cake this month!"
70005010-18 = "No wonder we didn't have as many snacks..."
70005010-19 = "Th-That's irrelevant! Now explain, why were we short on money?!"
70005010-20 = "Well, the Pandemonium Society—"
70005010-21 = "Those raccoons, again?! I'm really going to..."
70005010-22 = "They billed us for Head Prefect Hina's birthday present...that they bought..."
70005010-23 = "...The Pandemonium Society is celebrating the head prefect's birthday? Did Chairman Makoto get impeached?!"
70005010-24 = "It's not that... They were attempting to send us a \"gourmet\" red bean cake, with no red beans. That was the gift."
70005010-25 = "What even is that? Were they pranking us? More importantly, does such a thing even exist?"
70005010-27 = "Apparently it was a custom order."
70005010-28 = "Why can't they put all that effort towards operating our academy...?"
70005010-29 = "Anyway, the bakery thought the request was a mistake, so they ended up just sending a regular gourmet red bean cake, with red beans..."
70005010-30 = "Wonderful. Simply wonderful..."
70005010-31 = "Back up. Whether or not the cake was red bean, those raccoons still billed us for it!"
70005010-32 = "Which brings us back to the original problem..."
70005010-34 = "That is precisely why our budget was a little tight."
70005010-35 = "We did manage to order the cake just fine, but we were forced to select the cheapest delivery option."
70005010-36 = "Hm..."
70005010-37 = "I suppose that's acceptable. It's good to cut spending where we can, anyway."
70005010-38 = "Show me the webpage with the delivery information, please."
70005010-39 = "Okay, here you go."
70005010-40 = "I see. According to this, the cake will be delivered to Kawanishi Station tomorrow morning and arrive at the Prefect Team club room by around noon."
70005010-41 = "Since the head prefect's birthday party is scheduled to begin at 4:00 PM, it works out perfectly."
70005010-42 = "All right. Good work, everyone. I'm looking forward to it."
70005010-43 = "Yes, yes. Me too."
70005010-44 = "Are you okay, Chinatsu? Is something wrong?"
70005010-45 = "No, no. Not at all, Senior Administrator Ako."
70005010-50 = "(Usually, when it's proceeding too smoothly like this, something always goes wrong.)"
70005010-51 = "(No, I'm sure it's fine. Past experiences are probably just making me overthink it.)"
70005010-52 = "(Come what may, tomorrow is our hardworking head prefect's birthday.)"
70005010-54 = "Genryumon Guest Room"
70005010-55 = "That's right! We didn't need any of the Black Tortoise Promenade's help for this! We purchased Madam's birthday cake from a luxury cake shop!"
70005010-56 = "How's that? Amazing, yes? It means we can handle food-related tasks without your unsolicited advice!"
70005010-57 = "Fufufu... You could even say that this is clear evidence of the Genryumon's advancements! We are always improving!"
70005010-58 = "Yeah, yeah. It does seem like you've chosen a good cake shop, but which delivery company did you choose?"
70005010-59 = "The delivery company? The cheapest, fastest option, naturally."
70005010-60 = "...There's no such thing as cheap and fast. At least, not without some kind of catch."
70005010-61 = "The advertisement said exactly that, though. \"Cheap and fast delivery!\""
70005010-62 = "...Do you trust every flyer you see?"
70005010-63 = "Yes! They would only write such a thing if they were truly confident in their abilities."
70005010-64 = "*sigh*... You're the exact target audience for capitalistic desires. Let me see."
70005010-72 = "...? Why there of all places?!"
70005010-73 = "Huh? Hm? What're you saying? What's wrong?"
70005010-75 = "...This will be a good learning opportunity for Genryumon. If everything works out, this delivery service will truly be the cheapest, fastest delivery out there."
70005010-76 = "Oh, that's a relief to hear! So my hard-boiled insight wasn't wrong after all!"
70005010-77 = "Listen to me carefully. I said, \"If everything works out.\""
70005010-78 = "...And just what do you mean by that?"
70005010-82 = "It'll be cheap and fast, as long as your delivery doesn't get lost at the Kawanishi Hub."
70005010-83 = "The Kawanishi Hub?"
70005010-84 = "Yes. It's a station that boasts an outstanding amount of distribution, even for Kivotos' standards."
70005010-85 = "They say there's a hidden road that leads to the Styx."
70005010-86 = "And once delivery parcels travel that road to the beyond and return, something entirely different will end up on your doorstep."
70005010-87 = "Wh-What are you saying...?"
70005010-88 = "Deliveries get mixed up all the time there. This delivery becomes that delivery, and that delivery becomes this delivery."
70005010-89 = "Sh-Shouldn't a company like that be shut down?!"
70005010-90 = "You said it yourself. It's cheap and fast."
70005010-91 = "...In other words, it can be cheap and fast, but..."
70005010-92 = "...!"
70005010-93 = "G-Genryumon, assemble!!"
70005010-94 = "Calm down... What good will that do? Are you going to monitor every single shipment that arrives at the station?"
70005010-98 = "Can we do that?!"
70005010-99 = "I'm saying you shouldn't do that!!"

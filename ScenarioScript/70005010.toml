[translation]
70005010-1 = "某個2月18日的紀錄"
70005010-3 = "[log]2月18日[/log]"
70005010-6 = "格黑娜學園．風紀委員會辦公室"
70005010-7 = "蛋糕的訂單確定下好了嗎！？"
70005010-8 = "今天不下單的話，明天就送不到了喔！"
70005010-10 = "別擔心啦，亞子醬。我已經確認好幾次了。"
70005010-12 = "雖然預算有點緊繃，但總算是搞定了……"
70005010-14 = "等一下，我剛剛是不是聽到了什麼不得了的話？"
70005010-15 = "預算緊繃是什麼意思，千夏？這個月應該還有餘裕才對吧？"
70005010-16 = "我明明為了陽奈委員長的生日蛋糕，特地把上個月的點心預算挪了一部分過來啊！？"
70005010-18 = "難怪最近點心有點不夠吃……"
70005010-19 = "那，那不是重點！所以為什麼預算會不夠呢？"
70005010-20 = "那個，是萬魔殿那邊……"
70005010-21 = "又是那群狐狸嗎！？#n我真的是……"
70005010-22 = "他們說要幫陽奈委員長準備生日禮物，結果卻把帳單轉給我們……"
70005010-23 = "……萬魔殿居然會幫委員長慶生？#n真琴議長是被彈劾了嗎！？"
70005010-24 = "不……雖然說是禮物，但他們送來的卻是「沒有紅豆的高級紅豆蛋糕」。"
70005010-25 = "沒有紅豆的紅豆蛋糕是什麼啦……#n那根本是惡作劇吧……而且為什麼會有這種東西存在？"
70005010-27 = "嗯，他們說是特別訂製的。"
70005010-28 = "拜託他們把這份心力拿去好好經營學園好嗎……"
70005010-29 = "不過蛋糕店可能以為是下錯單，最後還是送來了正常的紅豆蛋糕……"
70005010-30 = "我真是受夠那些傢伙了……"
70005010-31 = "等一下，到頭來帳單不還是一樣記在我們頭上嗎！？"
70005010-32 = "嗯，這才是問題所在……"
70005010-34 = "總之，預算就是因為這樣才會變得捉襟見肘。"
70005010-35 = "雖然蛋糕有順利訂好，但我們只能選最便宜的宅配公司。"
70005010-36 = "嗯……"
70005010-37 = "算了，這樣也好。#n這種地方就能省則省吧。"
70005010-38 = "能讓我看一下配送情況的追蹤頁面嗎？"
70005010-39 = "來，這裡。"
70005010-40 = "嗯……這麼看來，明天早上就會送到川西物流中心，#n應該中午左右就能送到風紀委員會的辦公室了。"
70005010-41 = "委員長的慶生會預計下午四點開始，時間剛剛好。"
70005010-42 = "大家都辛苦了。明天真令人期待呢。"
70005010-43 = "是，是啊……應該吧。"
70005010-44 = "怎麼了，千夏？有什麼問題嗎？"
70005010-45 = "沒，沒有，亞子行政官。"
70005010-50 = "（只是每次事情看起來很順利的時候，總會出點什麼狀況……）"
70005010-51 = "（不不不，應該沒事的。只是過去的經驗害我想太多了而已）"
70005010-52 = "（畢竟明天可是繁忙的委員長的生日啊）"
70005010-54 = "玄龍門．貴賓室"
70005010-55 = "怎麼樣！#n我們這次可是沒靠玄武商會的幫忙，自己去那間名店訂了門主的生日蛋糕哦！"
70005010-56 = "很厲害吧？#n這就代表我們玄龍門，已經不需要每件事都去問你們玄武商會啦！"
70005010-57 = "哼哼哼……這正是我們玄龍門邁向新時代的鐵證！"
70005010-58 = "啊，是是是。#n蛋糕店是選得不錯啦……那宅配公司是選哪間？"
70005010-59 = "嗯？選了那家標榜最快又最便宜的啊？"
70005010-60 = "……這世上沒有又快又便宜的東西。#n肯定會有什麼問題的。"
70005010-61 = "可是廣告的彈窗上就是這樣寫的啊？"
70005010-62 = "……你該不會是那種會相信廣告傳單的人吧？"
70005010-63 = "當然啊！他們敢這樣寫，一定是有自信的嘛！"
70005010-64 = "唉……你真是資本主義最愛的類型。#n收據給我看看。"
70005010-72 = "……！？#n為什麼偏偏是這間公司啊！？"
70005010-73 = "怎，怎麼了？有什麼問題嗎？"
70005010-75 = "這間宅配公司啊……如果一切順利的話，確實是最快又最便宜沒錯。"
70005010-76 = "哦哦～那不是很好嗎！我的眼光果然沒錯！"
70005010-77 = "請你聽清楚，我說的是「如果一切順利的話」。"
70005010-78 = "……「如果」是什麼意思？"
70005010-82 = "意思是──那樣的前提是物流沒有在「川西物流中心」出問題。"
70005010-83 = "川西物流中心？"
70005010-84 = "沒錯，那裡是整個奇普托斯數一數二的物流樞紐。"
70005010-85 = "據說那裡甚至有通往三途川的隱藏通道……"
70005010-86 = "甚至還有人說送到那裡之後再回來的包裹，會變成完全不同的東西……"
70005010-87 = "那，那是什麼鬼故事……？"
70005010-88 = "簡單來說就是那裡的物流常常出包。#n這個包裹跑去那個地址，那個包裹又跑來這裡之類的。"
70005010-89 = "這，這種公司居然還營業得下去！？"
70005010-90 = "你自己不是說了嗎？因為又快又便宜。"
70005010-91 = "……雖然準確來說，是「有可能又快又便宜」就是了。"
70005010-92 = "……！"
70005010-93 = "玄，玄龍門全員集合！！！"
70005010-94 = "你先冷靜……而且現在集合也沒用吧。#n難道你打算去物流中心一箱一箱檢查嗎？"
70005010-98 = "原來還有這招嗎！"
70005010-99 = "我是叫你不要這樣做的意思啦！"

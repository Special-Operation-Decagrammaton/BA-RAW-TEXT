[translation]
70005010-1 = "บันทึกของวันที่ 18 ก.พ."
70005010-3 = "[log]18 ก.พ.[/log]"
70005010-6 = "ห้องคณะกรรมการวินัย สถาบันเกเฮนน่า"
70005010-7 = "แน่ใจนะคะว่าสั่งเค้กเรียบร้อยแล้ว?!"
70005010-8 = "เราจะต้องสั่งภายในวันนี้ เพื่อให้เค้กมาส่งทันวันพรุ่งนี้นะคะ!"
70005010-10 = "ไม่ต้องห่วงน่า อาโกะจัง ฉันเช็กดูตั้งหลายครั้งแล้วละ"
70005010-12 = "ถึงจะมีงบอยู่จำกัด แต่ฉันคิดว่าเราก็จัดการได้ดีในระดับหนึ่งนะคะ..."
70005010-14 = "เดี๋ยวก่อนค่ะ เหมือนฉันจะได้ยินอะไรบางอย่างที่ปล่อยผ่านไม่ได้อยู่นะคะ?"
70005010-15 = "เมื่อกี้บอกว่างบมีจำกัดงั้นเหรอคะ ชินัตสึ? เดือนนี้เราควรจะมีงบเหลือพอสมควรเลยไม่ใช่เหรอคะ?"
70005010-16 = "ฉันลดงบประมาณค่าของว่างของเดือนที่แล้วบางส่วนไป เพื่อให้แน่ใจว่ามีงบเพียงพอที่จะสั่งซื้อเค้ก#nวันเกิดของท่านประธานฮินะแล้วนี่คะ?!"
70005010-18 = "คิดแล้วเชียวว่าทำไมของว่างถึงมีไม่พอ..."
70005010-19 = "ตะ... ตอนนี้เรื่องนั้นมันสำคัญตรงไหนกันคะ?! จะยังไงก็เถอะ ว่าแต่ทำไมงบถึงไม่พอล่ะคะ?"
70005010-20 = "คือว่าทางแพนเดโมเนียม โซไซตี้..."
70005010-21 = "แรคคูนพวกนั้นอีกแล้วเหรอคะ? จริงๆ เลยเชียว..."
70005010-22 = "พวกนั้นบอกว่าจะซื้อของขวัญวันเกิดให้ประธานฮินะ แล้วก็ส่งใบเรียกเก็บเงินมาให้พวกเราน่ะสิ..."
70005010-23 = "ท่านประธานมาโคโตะแห่งแพนเดโมเนียม โซไซตี้จะซื้อของขวัญให้งั้นเหรอคะ? นี่โดนท่านประธาน#nมาโคโตะข่มขู่อะไรมารึเปล่าคะ?!"
70005010-24 = "ไม่ใช่อย่างนั้นหรอกค่ะ... ฉันคิดว่าจะส่งเค้กถั่วแดงแบบไม่ใส่ถั่วแดงไปให้เป็นของขวัญค่ะ"
70005010-25 = "เค้กถั่วแดงแต่ไม่ใส่ถั่วแดงคืออะไรกันคะ ทำแบบนั้นมันใจร้ายไปหน่อยนะคะ... ว่าแต่มันมีเค้กแบบนั้น#nอยู่ด้วยเหรอคะ?"
70005010-27 = "ค่ะ เลยต้องสั่งทำเป็นพิเศษค่ะ"
70005010-28 = "เดี๋ยวสิ ถ้าหวังอะไรแบบนี้ก็ช่วยตั้งใจบริหารโรงเรียนบ้างสิ..."
70005010-29 = "แต่ทางร้านเบเกอรี่คงคิดว่าเกิดความผิดพลาดในตอนสั่งก็เลยส่งเป็นเค้กถั่วแดงมาแทน..."
70005010-30 = "ทำได้ดีจริงๆ เลยนะคะ... จริงๆ เลย..."
70005010-31 = "แต่เดี๋ยวก่อนนะ สุดท้ายพวกนั้นก็ส่งบิลมาเรียกเก็บกับเราเหมือนเดิมใช่มั้ยคะ?!"
70005010-32 = "อื้อ นั่นแหละปัญหา..."
70005010-34 = "สรุปก็คือเรื่องนี้ทำให้งบประมาณของเราตึงมือนิดหน่อยค่ะ"
70005010-35 = "ถึงงบจะเหลือพอสั่งเค้กได้ แต่ก็ต้องเลือกบริษัทขนส่งที่ราคาถูกที่สุด"
70005010-36 = "อืม..."
70005010-37 = "เอาเถอะ คงจะโอเคแล้วละค่ะ แม้ว่าถ้าประหยัดงบพวกนั้นเอาไว้ได้ตั้งแต่แรกก็คงจะดีไม่น้อยก็เถอะค่ะ"
70005010-38 = "งั้นขอดูข้อมูลจัดส่งในเว็บหน่อยได้มั้ยคะ?"
70005010-39 = "เอ้า นี่ไง"
70005010-40 = "อืม... อืม... ถ้าเป็นแบบนี้ พรุ่งนี้เช้าก็คงจะส่งไปที่จุดรวบรวมสินค้าที่คาวานิชิ แล้วก็น่าจะมาส่งที่ห้อง#nคณะกรรมการวินัยประมาณเที่ยงสินะคะ"
70005010-41 = "ปาร์ตี้วันเกิดของท่านประธานจะเริ่มตอน 4 โมงเย็น ถือว่าใช้ได้เลยนะคะ"
70005010-42 = "ยังไงก็ตาม ขอบคุณทุกคนมากนะคะ ฉันรอให้ถึงวันพรุ่งนี้ไม่ไหวแล้วละค่ะ"
70005010-43 = "ค่ะ... ใช่แล้วละค่ะ"
70005010-44 = "มีอะไรเหรอคะ ชินัตสึ? มีปัญหาอะไรรึเปล่าคะ?"
70005010-45 = "เปล่าค่ะ ไม่มีอะไรหรอกค่ะ เจ้าหน้าที่อาวุโสอาโกะ"
70005010-50 = "(ตอนนี้ทุกอย่างดูเหมือนจะผ่านไปได้ด้วยดี แต่เดี๋ยวปัญหาต่างๆ คงเกิดขึ้นทีละเรื่องสองเรื่องแน่ๆ เลยค่ะ...)"
70005010-51 = "(ไม่หรอก คงไม่เป็นไรหรอก ฉันคงคิดมากเกินไปเพราะเคยมีประสบการณ์ไม่ดีมาเยอะเกินไปละมั้ง)"
70005010-52 = "(ถึงยังไงพรุ่งนี้ก็เป็นวันเกิดของท่านประธานที่ทำงานหนักมาตลอดเลยนะคะ)"
70005010-54 = "ห้องรับแขก มังกรดำ"
70005010-55 = "เป็นยังไงล่ะ! พวกเราไม่ไม่ได้ขอความช่วยเหลืออะไรจากย่านการค้าเทพเต่าดำเลยสักนิด! เราสั่งเค้กวันเกิดของท่านประมุขมาจากร้านเค้กสุดหรูเชียวนะ!"
70005010-56 = "เป็นไง? สุดยอดเลยใช่มั้ย? ถ้าเป็นเรื่องพวกนี้ พวกเธอไม่จำเป็นต้องไปปรึกษาหรือขอคำแนะนำจาก#nพวกย่านการค้าเทพเต่าดำตลอดแล้วละนะ"
70005010-57 = "ฮุฮุฮุ... นี่เป็นหลักฐานที่แสดงให้เห็นประจักษ์ว่ามังกรดำพัฒนาขึ้นไปอีกหนึ่งก้าวแล้วสินะ!"
70005010-58 = "อ่า ค่าๆ ดูเหมือนจะเลือกร้านเค้กดีแล้วนะคะ ว่าแต่ว่าใช้บริษัทขนส่งเจ้าไหนเหรอคะ?"
70005010-59 = "หืม? ก็ใช้บริษัทขนส่งที่ถูกและเร็วที่สุดน่ะ"
70005010-60 = "ไม่มีสิ่งที่เรียกว่าถูกและเร็วที่สุดหรอกนะคะ มันจะต้องมีข้อเสียอะไรสักอย่างอยู่แน่ๆ ค่ะ"
70005010-61 = "แต่ข้อความในป๊อปอัปโฆษณาที่เด้งขึ้นมามันเขียนไว้แบบนั้นนะ?"
70005010-62 = "หรือว่า... คุณเป็นประเภทที่เชื่อโฆษณาชวนเชื่อเหรอคะ?"
70005010-63 = "ก็แหงน่ะสิ! คนพวกนั้นก็ต้องมั่นใจในตัวเองระดับหนึ่งเลยไม่ใช่รึไง ถึงเขียนข้อความพวกนั้นออกมาได้#nน่ะ?"
70005010-64 = "เฮ้อ... คุณนี่เป็นคนประเภทที่ระบบทุนนิยมถูกใจจริงๆ เลยนะคะ... ขอฉันดูหน่อยได้มั้ยคะ"
70005010-72 = "...? ...!!! ทำไมถึงเลือกใช้ที่นี่ล่ะคะ?!"
70005010-73 = "เอ๊ะ เอ๋? อะไรเหรอ ทำไมล่ะ?"
70005010-75 = "งั้นขอใช้โอกาสนี้บอกให้ทางมังกรดำรู้เลยแล้วกันนะคะ บริษัทขนส่งเจ้านี้ ถ้าพวกนั้นทำงานอย่าง#nจริงๆ จังๆ แน่นอนว่าก็คงจะเป็นบริษัทขนส่งที่ราคาถูกและรวดเร็วที่สุดจริงตามที่เขียน"
70005010-76 = "โอ้ ถ้างั้นก็ดีสิ! คิดแล้วเชียวว่าสายตาของฉันช่างเฉียบแหลมยิ่งนัก!"
70005010-77 = "ฟังที่พูดให้ดีๆ สิคะ ฉันบอกว่า 'ถ้าทำงานอย่างจริงจัง' นะคะ"
70005010-78 = "ถ้าทำงานอย่างจริงจังเหรอ หมายความว่าไงน่ะ?"
70005010-82 = "หมายถึงกรณีที่การคัดแยกและการกระจายสินค้าที่ <ศูนย์กระจายสินค้าคาวานิชิ> ไม่วุ่นวายยุ่งเหยิง#nไงล่ะคะ"
70005010-83 = "ศูนย์กระจายสินค้าคาวานิชิ?"
70005010-84 = "ใช่แล้วค่ะ ที่นั่น... เป็นศูนย์กระจายสินค้าที่มีขนาดใหญ่ที่สุดในคิโวทอสค่ะ"
70005010-85 = "ว่ากันว่าที่นั่นมีถนนลับที่นำไปสู่เส้นทางข้ามภพซ่อนอยู่ด้วยนะคะ"
70005010-86 = "นอกจากนี้ยังเล่าลือกันว่าพัสดุที่ส่งไปที่อื่นแล้วส่งกลับมาผ่านศูนย์กระจายสินค้านี้ สินค้าข้างในก็จะ#nเปลี่ยนไปเป็นอย่างอื่นด้วยละค่ะ..."
70005010-87 = "พะ... พูดอะไรน่ะ เรื่องพรรค์นั้น..."
70005010-88 = "สรุปก็คือเนื่องจากระบบการจัดการห่วย พัสดุที่ส่งไปจึงสลับกันมั่วไปหมดเลยไงล่ะคะ"
70005010-89 = "ถะ... ถ้างั้นก็ไม่ควรปล่อยให้บริษัทแบบนั้นทำธุรกิจไม่ใช่รึไง?!"
70005010-90 = "คุณก็พูดเองไม่ใช่เหรอคะ ที่ว่าถูกและรวดเร็วน่ะค่ะ"
70005010-91 = "ถ้าพูดให้ถูกควรจะเป็น... 'อาจจะถูกและรวดเร็ว' ต่างหากค่ะ"
70005010-92 = "...!"
70005010-93 = "มะ... มังกรดำระดมพล!!!"
70005010-94 = "ใจเย็นๆ ก่อนนะคะ... คิดจะรวบรวมกำลังพลมาทำอะไรคะ หรือว่าคิดจะไปตรวจสอบการขนส่งของ#nศูนย์กระจายสินค้านั่นอย่างละเอียดเหรอคะ?"
70005010-98 = "มีวิธีแบบนั้นอยู่ด้วยนี่นา!"
70005010-99 = "เราเพิ่งคุยกันหยกๆ เองนะคะว่าไม่ควรทำแบบนั้นน่ะ!"

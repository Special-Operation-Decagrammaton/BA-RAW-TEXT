[translation]
10028040-1 = "ตอนที่ 4;The Good, The Bad, The Trinity"
10028040-12 = "...นี่ รถไฟมาถึงไหนแล้วน่ะ?"
10028040-13 = "ตอนนี้ตามหลังเราอยู่ราวๆ 3 กม. ด้วยความเร็ว 300 กม./ชม. ค่ะ..."
10028040-14 = "ไม่สิ 310...! 315 แล้วค่ะ...! ความเร็วเพิ่มขึ้นเรื่อยๆ เลยค่ะ!"
10028040-15 = "อึก... เราต้องไปให้ทัน งั้นฉันจะเร่งความเร็วของรถให้ค่ะ!"
10028040-19 = "มันจะไปมีความหมายอะไร!? ฝั่งนั้นมาด้วยความเร็วเกิน 300 กม./ชม. เลยนะ?"
10028040-20 = "บ้าไปแล้ว... จะมาถึงในอีก 2 นาที!!"
10028040-21 = "ไม่ต้องกลัว ตั้งสติให้ดี!!"
10028040-22 = "รถไฟใกล้จะตามเราทันแล้ว! ให้แต่ละขบวนวิ่งด้วยความเร็วปัจจุบัน!!"
10028040-23 = "ให้ตายเถอะ ไม่ยอมแวะจอดสถานีอื่น แถมยังขับเร็วมากอีก... แบบนี้มันไม่ปกติแล้ว"
10028040-24 = "มันเกิดเรื่องอะไรขึ้นข้างในนั้นกันแน่นะ? แบบนี้คงได้วิ่งเร็วเกินพิกัดไปจนถึงเขตปกครองตนเอง#nเกเฮนน่าแน่..."
10028040-28 = "...เฮอะ ก็ดี แค่เข้าไปตรวจสอบซะก็สิ้นเรื่อง"
10028040-29 = "หยุดรถไฟและค้นหาผู้เกี่ยวข้องทั้งหมด! ทุกคนเตรียมตัวขึ้นรถไฟ!!"
10028040-30 = "ค่ะ!!"
10028040-36 = "เร็วกว่าเดิมอีก...!?"
10028040-37 = "จะเจอกันในอีก 15 วินาที!!"
10028040-38 = "ทุกคน!! เตรียมขึ้นรถไฟ!!"
10028040-39 = "เตรียมขึ้นรถไฟ!!"
10028040-43 = "...ไปเลย!!"
10028040-53 = "ข้างหน้ายังเหลืออีกกี่ตู้เหรอคะ...?"
10028040-55 = "อืม~ ไหนดูซิ เหลืออีก... สี่ตู้? ไม่สิ เหลืออีกสามตู้!"
10028040-56 = "ไม่เยอะแล้วนะเนี่ย อีกเดี๋ยวก็ถึงแล้วละ! วะฮ่าฮ่าฮ่า! ดีมากเลย ดีมาก~"
10028040-58 = "แหะๆ... จับพลัดจับผลูมาถึงขนาดนี้ได้ยังไงนะ..."
10028040-59 = "แต่ยังไงก็ยังมีผู้โดยสารคนอื่นช่วยกันต่อสู้นะคะ แบบนี้ค่อยน่าลุยหน่อย คนพวกนั้นต้องได้รับกรรมที่#nไม่จอดให้ทุกสถานีค่ะ"
10028040-63 = "แต่ถึงยังไง การยุยงผู้คนในเวลาสั้นๆ และการใช้ทักษะพูดสร้างบรรยากาศของเธอถือว่าใช้ได้เลย..."
10028040-64 = "...เธอต้องไม่ใช่อาชญากรธรรมดาแน่นอนค่ะ คนที่ชื่อคาสุมิอะไรนั่น"
10028040-65 = "ฉันรู้สึกว่ายิ่งเข้าไปพัวพันกับเธอก็จะยิ่งอันตรายค่ะ"
10028040-66 = "กระเป๋า... ถ้าฉันไม่วางกระเป๋าไว้ผิดละก็... ไม่สิ ถ้าไม่ได้เข้ามารับภารกิจตั้งแต่แรก... "
10028040-67 = "อืม..."
10028040-68 = "[ns1] \"เหนื่อยน่าดูเลยนะ อิจิกะ...\"\n[ns2] \"รีบไปหากระเป๋ากันเถอะ...\""
10028040-71 = "แหม คุณหนูคนนี้เอาแต่พูดอะไรอยู่คนเดียวตั้งแต่เมื่อกี้แล้ว"
10028040-72 = "แต่รู้อะไรมั้ย? ฉันเพิ่งรู้สึกได้ระหว่างมาที่นี่น่ะ ฉันว่าเรามีด้านที่เหมือนกันอยู่นะ"
10028040-74 = "...คะ?"
10028040-75 = "พะ... พูดอะไรเพ้อเจ้อแบบนั้นคะ ฉันจะไปเหมือนคุณได้ยังไงกัน"
10028040-76 = "เราไม่มีอะไรที่ตรงกันเลยด้วยค่ะ ฉันมาจาก 'ชมรมทวงความยุติธรรม' ของ 'ทรีนิตี้' ส่วนคุณก็เป็น#n'ผู้ก่อการร้าย' ของ 'เกเฮนน่า'..."
10028040-77 = "นี่เราเหมือนขั้วตรงข้ามกันมากกว่านะคะ ไม่เห็นจะมีตรงไหนที่เหมือนกันเลย..."
10028040-79 = "ฮึ่ม~ งั้นเหรอ? แต่ฉันคิดต่างออกไปนะ"
10028040-80 = "ถึงในใจจะแสร้งทำเป็นไม่ใช่ แต่ที่จริงแล้ว... เมื่อเทียบกับเพื่อนๆ ทรีนิตี้ที่น่ารักคนอื่นแล้ว"
10028040-81 = "...คุณหนูคนนี้เหมือนจะเป็นคนอย่าง 'พวกฉัน' มากกว่านะ? หรือว่าไม่ใช่ล่ะ? วะฮ่าฮ่าฮ่าฮ่า!!"
10028040-83 = "...เฮ้อ... ก็ว่าอยู่ว่าพูดเรื่องอะไร..."
10028040-84 = "เลิกพูดไร้สาระเถอะค่ะ ถ้าเป็นไปได้ฉันก็อยากบอกลาคุณจะแย่แล้ว"
10028040-86 = "วะฮ่าฮ่าฮ่าฮ่า! แหม ก็ได้ๆ เอาแบบนั้นก่อนแล้วกัน!"
10028040-87 = "แต่ถึงจะอยากลงสักแค่ไหนก็อย่ารีบร้อนจนเกินไปล่ะ~ บางทีมันอาจจะไม่เวิร์กก็ได้นะ"
10028040-88 = "เราเหลืออีกแค่สามตู้รถไฟ เธออาจจะคิดว่ามันก็แค่ระยะทางนิดเดียวก็ได้..."
10028040-101 = "...แต่ถ้ามองอีกมุม ก็หมายความว่าเรากำลังเข้าใกล้ 'กองบัญชาการ' ของทางนั้นมากขึ้นเรื่อยๆ นะ"
10028040-103 = "พวกนั้นเข้ามาถึงที่นี่แล้ว!!"
10028040-104 = "นี่! ตอนนี้แหละ! ไปลาก 'อันนั้น' มา!!"
10028040-105 = "......? หืม?"
10028040-106 = "...'อันนั้น' เหรอ...?"
10028040-107 = "โอ้โห~ ดูท่าคนพวกนั้นจะเตรียมเซอร์ไพรซ์อะไรไว้ให้เราแฮะ?"
10028040-108 = "พวกแก๊งอันธพาลน่ารังเกียจ คิดว่าพวกเราจะยอมโดนเล่นงานอยู่ฝ่ายเดียวรึไง!?"
10028040-109 = "ฉันเตรียมตัวไว้เพื่อวันนี้โดยเฉพาะเลย! เตรียมใจเอาไว้ให้ดีล่ะ!!"
10028040-124 = "...โห~"
10028040-125 = "อะไรเนี่ย คนพวกนี้... เตรียมตัวมาอย่างดีเลยนี่นา?"
10028040-126 = "แต่ถ้าถึงกับลากปืนใหญ่มา มันก็เกินไปหน่อยหรือเปล่า..."
10028040-128 = "ไม่ใช่ปืนใหญ่ธรรมดานะ! นี่คือปืนแคนนอนสำหรับปราบจลาจล!!!"
10028040-130 = "ก็แคนนอนมันแปลว่าปืนใหญ่..."
10028040-134 = "...ช่างเถอะ ถ้ามันจะเจ๋งขนาดนี้ งั้นเรียกว่าแคนนอนก็ได้มั้ง"
10028040-135 = "[s3] \"...เจ๋งเป้งไปเลยนะ\"  \n[s4] \"ที่ผ่านมาต้องมีจลาจลมากแค่ไหนนะ...\""
10028040-142 = "เอาอาวุธแบบนั้นเข้ามาในรถไฟได้ยังไงเนี่ย..."
10028040-143 = "อืม แบบนี้ก็แย่เลย ฉันว่าเราต้องเปลี่ยนสถานการณ์ก่อนแล้วละ..."
10028040-144 = "แต่ถ้าไม่ลองก็ไม่รู้หรอก!!"
10028040-145 = "เอาละ!! ทุกคนลุยเลยยย!! เราจะทำลายปืนใหญ่ชื่อแปลกๆ นั่นกัน!!"
10028040-156 = "เฮ้อ..."
10028040-161 = "...มันเล็งมาทางนี้!"
10028040-162 = "ก็ไม่แปลกหรอกค่ะ"
10028040-169 = ".....! มาแล้ว!!"
10028040-171 = "ทุกคนหยุด!!"
10028040-181 = "[ns] \"...เสียงนี้มัน!\""
10028040-182 = "หยุดสิ่งที่ทำอยู่ตอนนี้เดี๋ยวนี้!!"
10028040-183 = "ทุกคนวางอาวุธ! เอามือประสานไว้ที่ท้ายทอย แล้วอย่าขยับ!!"
10028040-184 = "...หืม?? ...อะไรเนี่ย?"
10028040-185 = "มีคนบุกเข้ามาเหรอคะ...?"
10028040-186 = "เข้ามาจากนอกรถไฟ... ในตอนนี้เนี่ยนะ?"
10028040-187 = "รถไฟขบวนนี้... ยังวิ่งด้วยความเร็วสูงอยู่ไม่ใช่เหรอคะ?"
10028040-188 = "ไม่สิ เดี๋ยวก่อนนะคะ จะว่าไปแล้วเครื่องแบบนั้นมัน..."
10028040-197 = "...หืม?"
10028040-198 = "โอ๊ะ!!"
10028040-199 = "โอ้ววว~!!! ดูซิใครมา คณะกรรมการวินัยของเกเฮนน่าไม่ใช่เหรอเนี่ย!?"
10028040-200 = "ฉันบอกแล้วไม่ใช่เหรอว่าอย่าขยับ!! หยุดทำทุกอย่างเลย หยุด!!"
10028040-205 = "...จากนี้คณะกรรมการวินัยของเกเฮนน่าจะยึดรถไฟขบวนนี้!!"
10028040-206 = "ทุกการกระทำบนรถไฟจะอยู่ภายใต้การสั่งการ..."
10028040-207 = "...ของฉัน...?"
10028040-211 = "...คุณครู?"
10028040-212 = "...อะไรเนี่ย? ทำไมคุณครูถึงมาอยู่ในที่แบบนี้ล่ะ?"
10028040-213 = "[s5] \"สวัสดี อิโอริ\"\n[s6] \"วันนี้ดีใจเป็นพิเศษเลยแฮะที่ได้เจอ!\""
10028040-216 = "อะฮ่า... ไปก่อเรื่องอะไรมาอีกแล้วรึไง? แต่ไม่ต้องเดาก็พอจะรู้อยู่หรอกว่าต้องเป็นเรื่องที่ไร้ประโยชน์"
10028040-217 = "แล้วคนที่อยู่ข้างๆ..."
10028040-219 = "สะ... สวัสดีค่ะ... ฉันชื่ออิจิกะค่ะ"
10028040-220 = "พวกฉัน... พวกฉันก็แค่... "
10028040-221 = "โอ้โห~ ใครกันเนี่ย? ใช่คุณอิโอริจากคณะกรรมการวินัยหรือเปล่า~!?"
10028040-222 = "ว่ายังไง~? สบายดีเหรอ~?"
10028040-226 = "และถ้าไม่ติดอะไรละก็~ ไหนๆ ก็มาถึงที่นี่แล้ว มาช่วยอะไรพวกเราหน่อยได้มั้ย?"
10028040-227 = "เราก็ไม่ใช่คนอื่นคนไกลกันนี่นา เห็นแก่ความสัมพันธ์ของเราก็ได้... นะ?"
10028040-228 = "เอ่อ... มันออกจะตลกถ้าเด็กจากโรงเรียนอื่นอย่างฉันจะพูดแบบนี้ "
10028040-233 = "...แต่คุณทั้งสองคนเป็นศัตรูกันไม่ใช่เหรอคะ"
10028040-236 = "...ก็นะ..."
10028040-237 = "อะไรนะ!? เธอมาได้ยังไง?!!?"
10028040-238 = "รถไฟขบวนนี้จะไปเกเฮนน่าไม่ใช่เหรอ!? แล้วทำไมชมรมทวงความยุติธรรมของทรีนิตี้ถึงมาอยู่ที่นี่ล่ะ?"
10028040-239 = "แล้วก็อยู่กับคาสุมิอีก...!?"
10028040-240 = "คาสุมิ...!? คาสุมิ!? คุณครู นี่คุณครูอยู่บนรถไฟนี้กับคาสุมิมาตลอดเลยเหรอ!? บอกมานะว่าไม่ใช่!!"
10028040-241 = "ฮ่าฮ่า~ สมแล้วที่เป็นอิโอริ! เข้าใจอะไรง่ายดีจังนะ~"
10028040-242 = "เธอน่ะหุบปากไปเลย!!"
10028040-243 = "คุณครู!! จริงเหรอ? เป็นความจริงเหรอ!? ไม่ใช่ใช่มั้ย? ไม่ได้เป็นพวกเดียวกับยัยนั่นใช่มั้ย!?"
10028040-244 = "คุณครูต้องรู้สิว่าที่ผ่านมาฉันต้องเหน็ดเหนื่อยแค่ไหนเพื่อจับตัวยัยนั่นน่ะ!!"
10028040-245 = "...ว่าไงนะ?"
10028040-246 = "เรารู้จักกันมาตั้งนาน ทำไมไม่เชื่อใจครูงั้นเหรอ...?"
10028040-247 = "อย่ามาแกล้งกันสิ!! ก็ไม่แปลกหรอกที่ฉันจะสงสัย!! สถานการณ์แบบนี้จะให้ฉันเข้าใจได้ยังไงเล่า!!"
10028040-251 = "...หืม?"
10028040-252 = "ว่าไงนะ? ตอนนี้ไม่ใช่เวลามาคุยเรื่องนี้งั้นเหรอ...? หมายความว่ายังไง?"
10028040-253 = "ข้างหลัง...?"
10028040-254 = "ให้ฉันดูข้างหลังเหรอ? ข้างหลังมีอะไร..."
10028040-259 = "[ns7] \"ปืนใหญ่แคนนอน...\"\n[ns8] \"เผลอแป๊บเดียวมาอยู่ตรงหน้าเลย...\""
10028040-263 = "......? อะไรอีกเนี่ย?"
10028040-267 = "ทำไมถึงมีอะไรแบบนี้..."
10028040-273 = "[ns9] \"อิโอริโดนยิงเต็มๆ เลย...!\"\n[ns10] \"ปะ... เป็นอะไรหรือเปล่า!? อิโอริ!\""
10028040-280 = "โจมตีเลยยย!! โจมตีเต็มกำลังงงง!!"
10028040-281 = "วะฮ่าฮ่าฮ่า!! ดูท่าจะคุยกันรู้เรื่องแล้วสินะ!!"

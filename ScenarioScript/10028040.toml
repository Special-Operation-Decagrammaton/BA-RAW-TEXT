10028040-81 = "You're a little more comfortable in my world, aren't you? Wahahaha!"
10028040-83 = "Ha. I was wondering what nonsense you were going to spout."
10028040-84 = "You're ridiculous. I'd leave you without a second thought if I didn't need my bag."
10028040-86 = "Wahahaha! Okay, okay! Let's go with that for now."

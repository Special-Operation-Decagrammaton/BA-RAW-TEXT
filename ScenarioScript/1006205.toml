[translation]
1006205-1 = "對興趣的煩惱"
1006205-2 = "夏萊．辦公室"
1006205-3 = "（和季一起開始處理夏萊的工作）"
1006205-9 = "[ns]「話說，季。」"
1006205-10 = "是，老師。"
1006205-11 = "[s]「你好像很習慣做這種工作了呢。」"
1006205-12 = "這種工作？您指的是……？"
1006205-13 = "[s]「像是整理資料之類的所有文書作業。」"
1006205-14 = "恕我冒昧，我在前一位主人身邊也經常負責這些工作。"
1006205-15 = "只要下達指示，不管是打掃、洗衣還是料理，我什麼都會做。"
1006205-16 = "[s1]「光是這樣我就很感激了。」\n[s2]「不會覺得辛苦嗎？」"
1006205-19 = "您指夏萊的工作嗎？"
1006205-20 = "我並不覺得辛苦。#n反而因為工作很少，甚至覺得有點靜不下來。"
1006205-21 = "難得有這麼優秀的女僕，應該更盡情地利用才對。"
1006205-22 = "舉例來說，除了平時的護衛之外，#n像是拆除炸彈或是對目標的追蹤、擊退、破壞、殲滅、滅亡……任何事情都可以。"
1006205-23 = "[s]「你是女僕吧……？」"
1006205-24 = "是的。這才是優秀的女僕應該具備的能力。"
1006205-25 = "[s]「是，是這樣……嗎？」"
1006205-26 = "當然，畢竟我是完美的女僕，要做什麼都沒問題。"
1006205-27 = "[s3]「換，換個話題吧！」\n[s4]「你休息的時候都在做什麼呢？有沒有什麼興趣？」"
1006205-30 = "「幸去」……？"
1006205-31 = "我不是很清楚您在說什麼。#n「幸去」指的是什麼呢？"
1006205-32 = "在空閒的時候會做的事？"
1006205-33 = "……真是個困難的問題呢。#n至今為止我幾乎不曾有過空閒的時間……"
1006205-34 = "[s5]「這樣真的沒問題嗎！？」\n[s6]「得幫季找到喜歡做的事情才行！」"
1006205-37 = "老，老師……？"
1006205-38 = "什麼？現在立刻出發……？#n老，老師，請您輕一點……！"
1006205-43 = "奇普托斯．市內"
1006205-44 = "[ns]「剛才的電影怎麼樣呀？」"
1006205-45 = "我無法理解。"
1006205-46 = "為什麼要刻意捲入混戰之中呢？#n如果從遠處狙擊，就不會出現無謂的傷亡了。"
1006205-47 = "況且只要開始的時候少說幾句，早點下手就不會被逃掉了吧。"
1006205-48 = "[s]「戲劇性全都被否定了！？」"
1006205-49 = "除此之外我還有很多無法接受的地方。#n首先是開頭的場景……"
1006205-51 = "（季對電影裡隨便的演出評論了超過30分鐘）"
1006205-53 = "……我說完了。"
1006205-54 = "[s]「……會，會不會口渴？」"
1006205-55 = "不會，感謝您的關心。"
1006205-56 = "咦？一般來說不會那麼計較，而是會選擇享受嗎？"
1006205-57 = "這樣啊……#n看來要將電影當成興趣，還需要多多鍛鍊呢。"
1006205-59 = "商店街"
1006205-60 = "[ns]「漫畫也不適合啊……」"
1006205-61 = "我能理解其以繪畫傳達情報的用意。"
1006205-62 = "不過考量到情報的密度和正確性，真的有必要畫成漫畫嗎？"
1006205-63 = "密度不如文字，正確性也不如影像。"
1006205-64 = "即便如此還是拘泥於耗費時間與勞力的繪畫……究竟是為什麼呢？"
1006205-65 = "我認為這其中有我無法理解的理由，但我實在不清楚。"
1006205-69 = "逛街真是種不可思議的行為呢……"
1006205-70 = "明明只是想四處看看，卻會不知不覺地買下不必要的東西。"
1006205-71 = "人們為何會做出不必要的衝動消費呢？"
1006205-72 = "我實在，無法理解……"
1006205-73 = "[ns]「你不喜歡嗎……？」"
1006205-75 = "（在那之後也和季一起嘗試了各種「興趣」）"
1006205-76 = "（而季感興趣的事……連一件也沒有）"
1006205-78 = "奇普托斯．市內"
1006205-79 = "[ns]「辛苦了，季……」"
1006205-80 = "您還好嗎……？"
1006205-81 = "您看起來似乎很疲倦……"
1006205-82 = "……"
1006205-83 = "那個，老師。"
1006205-84 = "[s] 「嗯？」"
1006205-85 = "所謂的興趣究竟是什麼呢……"
1006205-86 = "沒有必要從中得到什麼回報，這樣的理解正確嗎……？"
1006205-87 = "即使沒有特別的意義，也沒有關係是嗎……？"
1006205-88 = "（與季不安的眼神交會了）"
1006205-89 = "（面對先前從未見過的季，我……）"
1006205-90 = "[s]「季，所謂的興趣啊……」"
1006205-91 = "是。"
1006205-92 = "[s7]「就算沒有意義、沒有理由也無所謂。」\n[s8]「只要自己能感受到『喜歡』的心情就可以了。」"
1006205-95 = "「喜歡」的心情……是嗎？"
1006205-96 = "[s9]「很抱歉讓你感到著急。」\n[s10]「不過總有一天，季一定會發現它的。」\n[s11]「我想到時候你就會注意到了哦。」"
1006205-100 = "……"
1006205-101 = "那麼，我的興趣就是……"
1006205-102 = "……呵呵。"
1006205-103 = "[s]「嗯？已經找到了嗎？」"
1006205-104 = "不……沒什麼。"
1006205-108 = "來吧，老師。"
1006205-109 = "我們差不多該回去了。"
1006205-110 = "我會護送您回到夏萊。"
1006205-111 = "[s]「聽你這麼一說，讓我好在意啊……」"
1006205-112 = "您指的，是什麼意思呢？"
1006205-118 = "[ns]「不能告訴我嗎？」"
1006205-119 = "今天……暫且保密。"
1006205-120 = "[ns]「這樣啊……如果有朝一日你能告訴我的話我會很高興的。」"
1006205-122 = "（回去的路上，看著季的微笑，就像是自己的事一樣感到快樂）"

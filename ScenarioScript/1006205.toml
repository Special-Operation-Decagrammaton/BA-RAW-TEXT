1006205-9 = "[ns] \"토키는 말이지.\""
1006205-10 = "3;토키 모드 1;01;네, 선생님?\n#3;a"
1006205-11 = "[s] \"이런 일에 익숙하구나.\""
1006205-12 = "3;토키 모드 1;02;이런 일이라니, 어떤 의미이신가요?\n#3;em;[?]"
1006205-13 = "[s] \"자료 정리라든가, 분류라든가…… 지금 우리가 하고 있는 일들.\""
1006205-14 = "3;토키 모드 1;01;외람된 말입니다만, 모시던 분과 많이 해 본 일이었으니까요."
1006205-15 = "3;토키 모드 1;99;물론 청소나 요리, 가사 같은 일들도 지시하신다면 얼마든지 할 수 있습니다."
1006205-16 = "[s1] \"이대로도 충분하다고 생각해……\"\n[s2] \"그런데, 힘들다거나 그렇게 느끼지는 않아?\""
1006205-17 = "#wait;100"
1006205-18 = "#wait;100"
1006205-19 = "3;토키 모드 1;01;샬레에서의 일 말씀이십니까?\n#3;em;[반응]"
1006205-20 = "3;토키 모드 1;02;특별히 그렇다고는 느껴지지 않습니다. 그렇다고 할까, 오히려 지나치게 일이 없어, 약간 어색함마저 느낄 정도입니다."
1006205-21 = "3;토키 모드 1;01;선생님께서는 조금 더, 저라는 우수한 메이드를 적극적으로 사용하셔도 좋습니다."
1006205-22 = "3;토키 모드 1;99;예를 들자면 지금도 하고 있는 호위부터 시작해, 격퇴, 진압, 폭발물 해체, 추적, 섬멸, 요격, 파괴, 멸망까지. 어떠한 것이든."
1006205-23 = "[s] \"메이드의 요소가 하나도 없는데요?!\""
1006205-24 = "3;토키 모드 1;01;아닙니다. 그것이야말로 우수한 메이드의 소양입니다."
1006205-25 = "[s] \"그, 그런가?! 그, 그럴지도……\""
1006205-26 = "3;토키 모드 1;02;그런 겁니다. 저는 완벽한 메이드이기에.\n#3;em;[반짝]"
1006205-27 = "[s3] \"그, 그러면 말이지!\"\n[s4] \"휴일이나 주말에는 뭘 하고 지내? 취미라든가!\""
1006205-28 = "#wait;100"
1006205-29 = "#wait;100"
1006205-30 = "3;토키 모드 1;07;취미……요?\n#3;em;[?]"
1006205-31 = "3;토키 모드 1;06;무슨 이야기인지 잘 모르겠습니다. 그건 어떤 개념인가요?"
1006205-32 = "3;토키 모드 1;06;시간이 남을 때 하는 일이라고요? 으음…… 어려운 것을 물으시는군요.\n#3;stiff"

[translation]
1006205-1 = "ความกังวลเรื่องงานอดิเรก"
1006205-2 = "สำนักงานชาเล่ต์"
1006205-3 = "(คุณครูเริ่มทำงานของชาเล่ต์ด้วยกันกับโทคิ)"
1006205-9 = "[ns] \"โทคิ\""
1006205-10 = "คะ? คุณครู?"
1006205-11 = "[s] \"คุ้นเคยกับการทำงานแบบนี้สินะ\""
1006205-12 = "งานแบบนี้งั้นเหรอ หมายถึงอะไรคะ?"
1006205-13 = "[s] \"งานจัดเอกสาร แบ่งหมวดเอกสาร... งานที่เราทำกันอยู่ตอนนี้น่ะ\""
1006205-14 = "อาจเป็นคำพูดที่ไม่เหมาะสมเท่าไหร่ แต่ฉันเคยทำงานแบบนี้ให้มาดามมานับครั้งไม่ถ้วนแล้วค่ะ"
1006205-15 = "งานทำความสะอาด ทำอาหารหรืองานบ้านอื่นๆ ฉันก็ทำได้นะคะ ถ้าสั่งมาก็ทำได้ทั้งหมดเลยค่ะ"
1006205-16 = "[s1] \"ครูว่าทำแค่นี้ก็เพียงพอแล้วละ...\"\n[s2] \"จะว่าไป ทำงานแบบนี้ไม่รู้สึกเหนื่อยบ้างเหรอ?\""
1006205-19 = "หมายถึงงานในชาเล่ต์เหรอคะ?"
1006205-20 = "ถ้าเป็นงานในชาเล่ต์ ฉันไม่รู้สึกอย่างนั้นหรอกค่ะ ที่จริงฉันก็รู้สึกแปลกๆ ด้วยซ้ำที่ไม่ได้มีงานอะไร#nให้ทำมากค่ะ"
1006205-21 = "คุณครูสั่งงานเมดดีเด่นอย่างฉันให้มากกว่านี้ก็ได้นะคะ"
1006205-22 = "ตัวอย่างเช่น งานคุ้มกันที่ฉันทำอยู่ตอนนี้ ไปจนถึงงานขับไล่ ปราบปราม รื้อถอนวัตถุระเบิด ไล่ล่า กวาดล้าง ดักซุ่ม ทำลาย งานอะไรแบบนี้น่ะค่ะ"
1006205-23 = "[s] \"ไม่มีความเป็นเมดเลยสักข้อนะ?!\""
1006205-24 = "ไม่หรอกค่ะ นั่นแหละค่ะทักษะของเมดดีเด่น"
1006205-25 = "[s] \"งะ... งั้นเหรอ?! วะ...ว่าไงก็ว่าตามกันก็ได้...\""
1006205-26 = "ใช่ค่ะ ก็ฉันเป็นเมดที่สมบูรณ์แบบนี่คะ"
1006205-27 = "[s3] \"จะว่าไป... ปกติวันหยุดเธอทำอะไรเหรอ?!\"\n[s4] \"มีงานอดิเรกที่ทำในวันหยุดมั้ย?\""
1006205-30 = "งานอดิเรก... เหรอคะ?"
1006205-31 = "ฉันไม่เข้าใจเลยค่ะว่าคุณครูพูดเรื่องอะไร งานแบบนั้นมันหมายถึงอะไรเหรอคะ?"
1006205-32 = "สิ่งที่ทำตอนมีเวลาว่างเหรอคะ? อืม... เป็นคำถามที่ยากจังเลยนะคะ"
1006205-33 = "ปกติแล้วฉันแทบจะไม่ค่อยมีเวลาว่างเลยค่ะ..."
1006205-34 = "[s5] \"ถามจริง... ยุ่งจนไม่มีเวลาเลยเหรอ?!\"\n[s6] \"ยังอยู่ในวัยเรียนกันอยู่เลยนะ อย่าหักโหมสิ!\""
1006205-37 = "คะ... คุณครู...?"
1006205-38 = "คะ? ปล่อยไปแบบนี้ไม่ได้งั้นเหรอคะ? จะพาฉันไปไหนคะเนี่ย? คุณครู? ทำไมจู่ๆ ก็มาลากฉันไป#nอีกแล้ว...?"
1006205-43 = "ในเมืองคิโวทอส"
1006205-44 = "[ns] \"หนังเป็นไงบ้าง?\""
1006205-45 = "ฉันไม่เข้าใจเลยค่ะ"
1006205-46 = "ทำไมถึงมีฉากต่อสู้ขับไล่ด้วยล่ะคะ? ทำไมสถานการณ์ถึงเลวร้ายจนถึงต้องเกิดการต่อสู้นั้นด้วย?"
1006205-47 = "ถ้าจัดการให้สิ้นซากไปตั้งแต่แรก ปัญหาก็คงจบโดยไม่ต้องมีใครได้รับบาดเจ็บมากแบบนี้หรอกค่ะ"
1006205-48 = "[s] \"นั่นมันฉากที่เป็นแก่นสำคัญของหนังเลยนะ...!\""
1006205-49 = "นอกจากนั้นฉันก็หงุดหงิดอยู่อีกหลายฉากเลยค่ะ ยกตัวอย่างเช่น..."
1006205-51 = "(โทคิพูดถึงฉากในหนังที่เธอรู้สึกขัดใจอยู่นานกว่า 30 นาที)"
1006205-53 = "...จบแล้วค่ะ"
1006205-54 = "[s] \"...เหนื่อยหน่อยนะ?\""
1006205-55 = "แค่นี้ไม่เท่าไหร่หรอกค่ะ..."
1006205-56 = "คะ? ปกติแล้วเขาไม่ได้จริงจังกับหนังกันขนาดนี้ แค่ดูเอาสนุกเฉยๆ งั้นเหรอคะ?"
1006205-57 = "อย่างนี้นี่เอง... ดูท่าฉันคงต้องใช้ความพยายามในการฝึกดูหนังให้มากกว่านี้นะคะ"
1006205-59 = "ย่านการค้า"
1006205-60 = "[ns] \"คราวนี้เป็นหนังสือการ์ตูนน่ะ...\""
1006205-61 = "ฉันก็พอเข้าใจเรื่องการถ่ายทอดข้อมูลผ่านรูปภาพหรอกนะคะ"
1006205-62 = "แต่ก็ยังสงสัยว่าเราต้องถ่ายทอดข้อมูลด้วยวิธีนั้นจริงๆ เหรอ แล้วข้อมูลจะถูกส่งอย่างสมบูรณ์แบบ#nหรือเปล่าน่ะค่ะ"
1006205-63 = "ในแง่ของความสมบูรณ์แบบของข้อมูล หนังสือการ์ตูนน่าจะมีประสิทธิภาพน้อยกว่าเอกสารฉบับเต็ม#nส่วนในแง่ของการส่งข้อมูล วิดีโอคงทำได้ดีกว่าค่ะ"
1006205-64 = "แต่ถึงอย่างนั้นก็เลือกที่จะส่งข้อมูลโดยการวาดซึ่งใช้เวลาในการผลิตค่อนข้างนาน... ทำแบบนี้#nเพื่ออะไรเหรอคะ?"
1006205-65 = "ฉันรู้ว่ามันต้องมีเหตุผลบางอย่างที่ฉันไม่รู้ แต่ฉันไม่รู้ว่ามันคืออะไรนี่สิคะ"
1006205-69 = "การซื้อของเป็นอะไรที่ลึกซึ้งจังเลยนะคะ"
1006205-70 = "ถึงแม้จะเป็นของที่ไม่จำเป็น แต่ก็สามารถหาเหตุผลโน้มน้าวให้ตัวเองซื้อมาจนได้"
1006205-71 = "ฉันไม่ค่อยเข้าใจเลยค่ะ ปกติแล้วทุกการกระทำย่อมเป็นสิ่งที่จะต้องมีความหมาย..."
1006205-72 = "แต่สำหรับการซื้อของ... ฉันว่ามันไม่ได้มีความหมายอะไรเลยค่ะ"
1006205-73 = "[ns] \"โทคิไม่สนุกเลยสินะ...\""
1006205-75 = "(หลังจากนั้นคุณครูก็ลองหา 'งานอดิเรก' อื่นๆ ทำร่วมกับโทคิ)"
1006205-76 = "(แต่โทคิดูไม่สนุกกับอะไรเลย...)"
1006205-78 = "ในเมืองคิโวทอส"
1006205-79 = "[ns] \"วันนี้ทำได้ดีมากเลย... โทคิ\""
1006205-80 = "ไม่ค่ะ ฉันไม่ได้ทำอะไรเลย"
1006205-81 = "คุณครูต่างหากที่พยายามมาทั้งวัน..."
1006205-82 = "......"
1006205-83 = "คือว่า คุณครูคะ?"
1006205-84 = "[s] \"หืม?\""
1006205-85 = "ตกลงว่า... ที่จริงแล้ว งานอดิเรกมันคืออะไรเหรอคะ?"
1006205-86 = "มันเป็นเหมือนงานพิเศษที่ต้องใช้ทักษะ อย่างเช่น การคุ้มกันหรือการใช้ฝีมือเฉพาะทางหรือเปล่าคะ?"
1006205-87 = "หรือเป็นสิ่งที่เราจำเป็นต้องทำ และต้องทำให้สำเร็จให้ได้หรือเปล่าคะ?"
1006205-88 = "(โทคิจ้องมองมาทางคุณครูด้วยดวงตาที่แสดงถึงความร้อนใจ)"
1006205-89 = "(พอเห็นโทคิเป็นอย่างนั้น คุณครูก็ได้แต่ตอบไปว่า......)"
1006205-90 = "[s] \"งานอดิเรกน่ะ\""
1006205-91 = "ค่ะ"
1006205-92 = "[s7] \"มันไม่เกี่ยวกับว่าเราทำเก่งหรือไม่เก่งหรอก\"\n[s8] \"มันคือการได้ทำในสิ่งที่ตัวเองอยากทำ และสนุกไปกับมันน่ะ\""
1006205-95 = "สิ่งที่ตัวเองอยากทำ... และทำแล้วสนุกงั้นเหรอคะ?"
1006205-96 = "[s9] \"ไม่จำเป็นต้องหามันให้เจอตอนนี้ก็ได้\"\n[s10] \"สักวันโทคิคงจะเจองานอดิเรกที่เหมาะกับตัวเองก็ได้\"\n[s11] \"เพราะงานอดิเรกไม่ใช่สิ่งที่จำเป็นต้องมี แต่ถ้ามีแล้วมันก็ดีน่ะ\""
1006205-100 = "......"
1006205-101 = "ถ้าอย่างนั้น งานอดิเรกของฉันคงเป็น..."
1006205-102 = "...ฮุฮุ"
1006205-103 = "[s] \"หืม? คิดออกแล้วเหรอ งานแบบไหนเหรอ?\""
1006205-104 = "ไม่มีอะไรหรอกค่ะ"
1006205-108 = "คุณครู"
1006205-109 = "ถ้างั้นกลับกันเลยมั้ยคะ?"
1006205-110 = "ฉันจะคุ้มกันคุณครูไปถึงชาเล่ต์เลยค่ะ"
1006205-111 = "[s] \"ตอนนี้เหมือนโทคิกำลังปิดบังอะไรครูอยู่เลยนะ...?\""
1006205-112 = "ไม่รู้สิคะ คุณครูคิดอย่างนั้นเหรอคะ?"
1006205-118 = "[ns] \"บอกกันหน่อยไม่ได้เหรอ?\""
1006205-119 = "ฉันเองก็ไม่รู้เหมือนกันค่ะ"
1006205-120 = "[ns] \"อะไรเนี่ย~\""
1006205-122 = "(จากนั้นคุณครูก็เดินคุยกับโทคิจนมาถึงชาเล่ต์)"

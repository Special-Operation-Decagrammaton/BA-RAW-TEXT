[translation]
10023095-2 = "在這邊！"
10023095-3 = "哈啊，哈啊……！#n怎麼會……發生這種事……！"
10023095-12 = "貴安──真是個美好的夜晚呢。"
10023095-13 = "又出現了啊……「慈愛的怪盜」！"
10023095-14 = "哎呀，真是熱烈的歡迎呢……那麼興奮會讓我很困擾的。"
10023095-15 = "沒想到你竟然還沒放棄……！"
10023095-16 = "呵呵……你真的是這麼想的嗎？"
10023095-17 = "哎咿，少囉嗦！#n這是我的東西……除非付錢，否則誰也別想把它拿走！"
10023095-18 = "啊啊，這可不行──那個王冠並不是你的吧？#n那是小姐們的東西。"
10023095-19 = "像你這種不懂品味的暴發戶──配不上它。"
10023095-20 = "我才不在乎你的意見！#n嘖……C&C也只是虛有其名啊。"
10023095-21 = "沒有說明完整就要人守護王冠什麼的……#n真虧你敢對孩子們提出那種無理的請求啊。"
10023095-22 = "再說了，你委託的真的是C&C嗎？"
10023095-23 = "什麼……那是什麼意思？"
10023095-24 = "啊啊，無須在意。#n對只想著賺錢的你來說，那些都無所謂吧。"
10023095-31 = "哦哇！？"
10023095-35 = "大家，就是現在！"
10023095-36 = "姐姐，要取得王冠才行！"
10023095-38 = "快，快停下來！"
10023095-39 = "警備們！"
10023095-45 = "全力排除敵人。"
10023095-47 = "光呀！"
10023095-58 = "王冠……這個王冠是我的東西……！"
10023095-65 = "……嗯？#n這裡怎麼會有箱子……"
10023095-66 = "難，難道是！？"
10023095-71 = "你已經……無處可逃了。明太郎先生……"
10023095-72 = "請交出……王冠吧。#n這樣就不會有人受傷了……"
10023095-73 = "別說笑了！我絕對不會屈服的！"
10023095-74 = "……看來……沒辦法了呢……"
10023095-75 = "拜託，你了。"
10023095-83 = "什麼，啊！？"
10023095-84 = "我覺得一開始就這麼做會比較快唷？"
10023095-85 = "可是……至少要先聽他怎麼說……"
10023095-98 = "「時鐘王之冠」……順利回收了……！"
10023095-99 = "太，太好了……"
10023095-101 = "乓啪喀乓！夥伴們齊心協力找回寶物了！"
10023095-102 = "已完成贓物的回收。#n這樣我的任務就算順利完成了。"
10023095-104 = "C，C&C……！#n你們竟然背叛我！這群不知羞恥的傢伙！"
10023095-106 = "不知羞恥的真的是我們嗎？"
10023095-107 = "我可不想被委託了C&C，卻在背地裡舉辦地下拍賣會買賣贓物的你這麼說。"
10023095-108 = "──我飛鳥馬季要逮捕你。"
10023095-109 = "別，別開玩笑了！"
10023095-110 = "我怎麼能在這種地方被逮捕！！"
10023095-114 = "啊，逃走了！"
10023095-115 = "交給我吧。"
10023095-120 = "呵呵……那麼就由我來替小姐們感激地收下王冠吧。"
10023095-124 = "咳咳，咳咳！煙霧……讓人看不見前面……！"
10023095-125 = "這個煙幕……難道是……！？"
10023095-126 = "柚，柚子醬！小心王冠！"
10023095-128 = "嗯，嗯……！#n我緊緊地抓住了……！"
10023095-130 = "呵呵……你手裡的，真的是王冠嗎？"
10023095-131 = "咦，咦……？"
10023095-136 = "這是……"
10023095-137 = "這不是銅塊嗎！"
10023095-138 = "……是在什麼時候！？"
10023095-144 = "辛苦了，各位。#n──啊啊，我很感謝小姐們哦。"
10023095-145 = "「時鐘王之冠」──我確實收下了。"

10023095-21 = "Ah, I see. Because naturally you would expect them to produce results despite having to operate under your completely false pretenses. Naturally."
10023095-22 = "But speaking of C&C, did you perform your due diligence? Perhaps ensure you had the right maids?"
10023095-23 = "Huh? What do you mean?"
10023095-24 = "Oh, nothing. You're probably too busy rubbing your nose in your dirty auctioning Credits to pay any mind to anyone besides yourself to notice."

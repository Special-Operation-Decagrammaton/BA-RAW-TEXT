[translation]
10023095-2 = "ทางนี้ครับ!"
10023095-3 = "ฮะ... เฮือก...! ทำไมถึงเกิดเรื่องแบบนี้ได้...!"
10023095-12 = "สวัสดีค่ะ สบายดีไหมคะ?"
10023095-13 = "ในที่สุดก็ออกมาจนได้สินะ... จอมโจรแห่งความเสน่หา!"
10023095-14 = "ตายจริง เป็นการต้อนรับที่น่ายินดีจังเลยนะคะ แต่ถึงยังไงก็ฉันก็ไม่ออมมือให้หรอกนะคะ"
10023095-15 = "เธอรอจะปล้น <มงกุฎเจ้าแห่งนาฬิกา> อยู่จริงๆ สินะ...!"
10023095-16 = "อ้าว ไม่ได้คิดไว้แล้วหรอกเหรอคะ?"
10023095-17 = "หนวกหูน่า! นี่มันของของฉันนะ... ถ้าฉันไม่ได้ค่าตอบแทนที่น่าพอใจ ฉันก็ไม่ให้ใครทั้งนั้น!"
10023095-18 = "ไม่ค่ะ มงกุฎอันนั้นไม่ใช่ของคุณค่ะ มันต้องเป็นของทุกคนต่างหาก"
10023095-19 = "แล้วมันก็เป็นงานศิลปะล้ำค่าที่ไม่ควรจะอยู่ในมือของคนไร้รสนิยมอย่างคุณแม้แต่วินาทีเดียวด้วยซ้ำค่ะ"
10023095-20 = "ฉันเบื่อกับการใช้วาทศิลป์ของเธอแล้ว! ชิ... พวก C&C มีดีแค่ในข่าวลือสินะ ถึงเวลาทำงานเข้าจริงๆ นี่ห่วยชะมัดเลย"
10023095-21 = "คุณไม่ได้บอกความจริงที่ถูกต้องกับ C&C แต่กลับคิดว่าจะได้รับการคุ้มกันอย่างสมบูรณ์แบบจากพวก#nเธองั้นเหรอคะ? น่าทึ่งจังเลยนะคะ"
10023095-22 = "สงสัยคุณจะไม่ได้เช็กให้ดีตั้งแต่แรกนะคะว่านักเรียนพวกนั้นคือ C&C ตัวจริงหรือเปล่า"
10023095-23 = "ว่าไงนะ? หมายความว่ายังไง?"
10023095-24 = "ไม่มีอะไรหรอกค่ะ สำหรับแขกที่เดินทางมาไกลเพื่อประมูลของที่ถูกขโมยมาแล้ว คงไม่มีอะไรน่าสนใจไปกว่าพวกตัวเขาเองหรอกค่ะ"
10023095-31 = "อ๊าก?!"
10023095-35 = "ทุกคน ตอนนี้แหละ!"
10023095-36 = "ต้องเอามงกุฎมาให้ได้นะพี่!"
10023095-38 = "คะ... คิดว่าฉันจะปล่อยไปง่ายๆ เรอะ!"
10023095-39 = "กองกำลังรักษาความปลอดภัย!"
10023095-45 = "ระดมพลทุกนายเลย!"
10023095-47 = "ลำแสงทำลายล้าง!"
10023095-58 = "มงกุฎ...! มงกุฎเป็นของฉันนะ...!"
10023095-65 = "หืม? ทำไมถึงมีกล่องอะไรอยู่ตรงนี้..."
10023095-66 = "ยะ... อย่าบอกนะว่า...!"
10023095-71 = "หมดทางหนีแล้วค่ะ... คุณเมทาโร่..."
10023095-72 = "ส่งมงกุฎมาเถอะค่ะ แล้วจะไม่มีใครได้รับบาดเจ็บค่ะ..."
10023095-73 = "อย่ามาตลกเลยน่า! ฉันไม่ยอมจำนนให้เด็ดขาด!"
10023095-74 = "... ถ้างั้นก็ช่วยไม่ได้นะคะ..."
10023095-75 = "ตอนนี้แหละค่ะ"
10023095-83 = "ฮะ... เฮือก?!"
10023095-84 = "ถ้าทำแบบนี้ตั้งแต่แรกคงจะปิดจ๊อบได้ไปแล้วนะคะ"
10023095-85 = "อย่างน้อย... ฉันก็อยากจะลองเกลี้ยกล่อมเขาดูน่ะค่ะ..."
10023095-98 = "ได้ <มงกุฎเจ้าแห่งนาฬิกา>... คืนมาอย่างปลอดภัยแล้วค่ะ..."
10023095-99 = "โล่งอกไปที..."
10023095-101 = "ปาปัม ปาปัม ป๊าม! สหายทุกคนร่วมมือกันจนได้สมบัติกลับมาแล้วค่ะ!"
10023095-102 = "ไล่ล่าและยึดของที่ถูกขโมยไปได้สำเร็จแล้วค่ะ เท่ากับว่าภารกิจย่อยของฉันก็เสร็จสิ้นแล้วค่ะ"
10023095-104 = "เจ้าพวก C&C...! ไปร่วมมือกับจอมโจรแห่งความเสน่หางั้นเหรอ! ไม่ละอายใจกันบ้างเลยรึไง!"
10023095-106 = "ใครกันคะที่ไม่รู้จักความละอายใจ"
10023095-107 = "ว่าจ้างให้ C&C มาทำภารกิจ แต่ก็วางแผนร้ายเพื่อหลอกใช้คนอื่นแบบนี้..."
10023095-108 = "อาซุมะ โทคิคนนี้จะจับกุมคุณค่ะ"
10023095-109 = "ยะ... อย่ามาเพ้อเจ้อนะ!"
10023095-110 = "คิดว่าฉันจะยอมให้จับงั้นเรอะ!!"
10023095-114 = "อ๊ะ หนีไปแล้ว!"
10023095-115 = "ฉันจะไล่ตามไปเดี๋ยวนี้ค่ะ"
10023095-120 = "ฮุฮุ ได้ค่ะ ถ้างั้นฉันจะรับสิ่งนี้ไปแทนคุณโทคินะคะ"
10023095-124 = "แค่กๆ แค่กๆ! ม่านควันหนาจนไอออกมาเลย... มองไม่เห็นข้างหน้าด้วย...!"
10023095-125 = "อย่าบอกนะว่าม่านควันนี้มัน...?!"
10023095-126 = "ยะ... ยูสึจัง! มงกุฎ!"
10023095-128 = "อะ... อื้อ...! ฉันถือไว้แน่นแล้ว...!"
10023095-130 = "จริงเหรอคะ นั่นมันมงกุฎเหรอคะ?"
10023095-131 = "เอะ... เอ๋...?"
10023095-136 = "นี่มัน..."
10023095-137 = "ก้อนทองเหลืองนี่นา!"
10023095-138 = "...?!  เอาไปตั้งแต่ตอนไหนน่ะ...!"
10023095-144 = "ยอดเยี่ยมมากค่ะทุกคน"
10023095-145 = "เราได้ <มงกุฎเจ้าแห่งนาฬิกา> มาแล้วค่ะ"

[translation]
51030-1 = "ตอนที่ 3;การพบกันแบบไม่คาดคิด 2"
51030-3 = "ฮึ่ม! ครูจากชาเล่ต์ก็มาผสมโรงด้วยเหรอเนี่ย!"
51030-4 = "มะ... ไม่น่ามาทำอะไรแบบนี้เลย!"
51030-5 = "ว่าไงนะ? แกเองไม่ใช่เหรอที่ชวนมาป่วนการเตรียมงานเทศกาลน่ะ!"
51030-6 = "หมายความว่ายังไง? ฉันเคยพูดแบบนั้นที่ไหน... ฉันได้ยินคำพูดแบบนั้นมาจากคนอื่นด้วยซ้ำ!"
51030-7 = "ช่างมันเถอะ! กะ... ก่อนอื่นถอนกำลังกันก่อน!"
51030-13 = "...ไล่เจ้าพวกนั้นไปได้แล้วเจ้าค่ะ"
51030-19 = "มะ... เมื่อกี้มันอะไรกันน่ะเจ้าคะ?! ยอดเยี่ยมสุดๆ ไปเลย!"
51030-20 = "ออกแต่ละคำสั่งได้เข้ากับสิ่งที่ข้าคิดจะทำพอดีเลย... ข้ารู้สึกยินดีเหมือนได้เจอน้องหมาตัวที่เคยเล่น#nด้วยในอดีตเลยละ..."
51030-21 = "ไม่ทราบว่าท่านคือเพื่อนเก่าเพื่อนแก่ในตำนาน... ที่เคยจากข้าไปเมื่อนานมาแล้วหรือเปล่าเจ้าคะ?!"
51030-22 = "[s] \"เปล่านะ ไม่ใช่ทั้งน้องหมาและเพื่อนเก่าเพื่อนแก่...\""
51030-23 = "อ๊ะ..."
51030-24 = "ไม่ใช่หรอกเหรอเจ้าคะ?"
51030-25 = "[s] (ท่าทางผิดหวังมากเลยแฮะ...)"
51030-26 = "ถ้าจะมีอะไรที่สุดยอดน่ะ ฉันว่าการเคลื่อนไหวร่างกายของแม่หนูมากกว่า"
51030-27 = "ใส่ชุดแบบนั้นแถมยังมีความสามารถมากขนาดนั้นอีก แม่หนูเป็นคนของเฮียกกะเรียวรันเหรอ?"
51030-31 = "[ns] (เฮียกกะเรียวรันเหรอ งั้นก็แปลว่า...)"
51030-32 = "อ่า เรื่องนั้น... คือว่า..."
51030-33 = "หรือว่าจะไม่ใช่ เห็นล่าสุดได้ยินว่ามี <คำสั่งสลายตัว> หรืออะไรสักอย่าง ทุกคนก็เลยหยุดกิจกรรม และไปสำรวมกิริยาวาจากันอยู่"
51030-38 = "ไม่เจ้าค่ะ!"
51030-43 = "ต้องบอกว่านั่นมันเรื่องเข้าใจผิด หรือต้องบอกว่าข้ากำลังไปตรวจสอบเรื่องนั้นอยู่... กันนะ "
51030-44 = "ข้ากำลังเป็นกังวลอยู่เลยว่าถ้าจู่ๆ จะมาเปิดโปงความจริง ก็จะโดนจับได้ว่าหนีออกจากบ้านมา... งั้นข้าควรจะไปซ่อนตัวดีกว่าไหม..."
51030-45 = "[s] \"......?\""
51030-46 = "งั้นเหรอ?"
51030-47 = "ดูเหมือนจะมีเหตุผลที่ซับซ้อนอยู่นะ ฉันก็ไม่รู้รายละเอียดหรอก แต่สิ่งที่มั่นใจก็มีอยู่เรื่องหนึ่ง"
51030-52 = "ขอบใจที่ช่วยนะ "
51030-53 = "ทั้งแม่หนู แล้วก็คุณครูด้วย ฉันคิดว่ากระเป๋าสตางค์หายไปแล้วจริงๆ แล้วก็กำลังจะถอดใจอยู่แล้วเชียว ขอบใจมากเลยนะ"
51030-58 = "อ๊ะ... ไม่ใช่เรื่องใหญ่อะไรเลยเจ้าค่ะ! ให้ข้าช่วยอีกได้ทุกเมื่อเลยเจ้าค่ะ!"
51030-60 = "(ชาวเมืองกล่าวขอบคุณและเดินจากไป)"
51030-64 = "ข้าขอกล่าวทักทายอย่างเป็นทางการอีกครั้งเจ้าค่ะ"
51030-69 = "นามของข้าคือ คาเด..."
51030-73 = "ยะ... ยูคาริเจ้าค่ะ ขอบคุณที่มาช่วยเมื่อกี้นะเจ้าคะ"
51030-74 = "[s] \"การช่วยนักเรียนที่ตกอยู่ในความลำบากเป็นงานของครูอยู่แล้ว\""
51030-75 = "เจ้าคะ?"
51030-76 = "อืม ช่วยเหลือคนที่ตกอยู่ในวิกฤต แต่ก็พูดเหมือนเป็นเรื่องธรรมดาเลย"
51030-77 = "...เฮือก!"
51030-78 = "จะว่าไปแล้ว เหมือนเคยได้ยินเรื่องแบบนี้มาจากรุ่นพี่เรนเกะเลยเจ้าค่ะ...!"
51030-79 = "ในโลกนี้มีคนที่แกล้งทำเป็นมีไมตรีจิตแล้วทำท่าทีเข้ามาช่วย... แต่ทั้งหมดนั้นก็เป็นบ่วงที่ชั่วร้าย...!"
51030-80 = "แล้วก็ยังมีอันธพาลที่มาจองหองใส่ตั้งแต่แรก แล้วก็พูดว่า <รู้หรือเปล่าว่าฉันเป็นใคร?> แล้วก็ไถเงินไป#nแทบจะหมดตัวด้วย!"
51030-81 = "ตอนนี้ข้า... ตกอยู่ในวิกฤตที่สิ้นหวังแบบนั้นแล้วใช่มั้ยเจ้าคะ?"
51030-82 = "[s] \"ไม่ใช่ๆ ครูไม่ใช่คนน่าสงสัยแบบนั้นนะ ครูเป็นครูจากชาเล่ต์\""
51030-86 = "...อ๊ะ ท่านอาจารย์นี่เอง ข้าไม่รู้เลย ขออภัยด้วยเจ้าค่ะ"
51030-87 = "แต่ก็ต้องขอบคุณท่านอาจารย์นะเจ้าคะที่ทำให้ไม่มีใครต้องได้รับความทุกข์ยากอย่างไม่เป็นธรรมอีก"
51030-88 = "อืม จะตอบแทนบุญคุณนี้ยังไงดี... คิดหนักเลยเจ้าค่ะ..."
51030-92 = "...อืมมมม ใช่แล้ว! ตัดสินใจได้แล้วเจ้าค่ะ!"
51030-93 = "ข้าจะพาท่านอาจารย์เดินชมเฮียกคิยาโคเองเจ้าค่ะ!"
51030-99 = "[ns] \"อ่า ไม่ต้องก็ได้ ครูมีธุระอื่น...\""
51030-100 = "เอาละ! ท่านอาจารย์! ตามมาทางนี้เลยเจ้าค่ะ!"
51030-105 = "(หลังจากนั้นยูคาริก็เริ่มแนะนำและอธิบายจุดต่างๆ ให้)"
51030-108 = "เฮียกคิยาโคคือเขตปกครองตนเองที่ก้าวหน้าในเรื่องอุตสาหกรรมการท่องเที่ยว..."
51030-109 = "และถ้าจะให้พูดถึงการแสดงที่มีชื่อเสียงที่สุด...!"
51030-118 = "(คุณครูเดินตามยูคาริที่อธิบายเรื่องต่างๆ อย่างตื่นเต้น จนมาถึงถนนสายเทศกาลที่ไปมาแล้ว#nก่อนหน้านี้)"
51030-126 = "ตรงโน้น! เริ่มผูกตั้งแต่ตรงโน้นก่อน! จับให้แน่นๆ ด้วยล่ะ จะได้ไม่ล้ม!"
51030-127 = "แล้วอุปกรณ์ที่กองไว้ตรงนี้ ให้ย้ายไปตรงไหนครับ? ต้องรีบเคลียร์สถานที่แล้วนะครับ!"
51030-130 = "ฮึ่มมม! ทำไมเช็กลิสต์ของนักแสดงในงานเทศกาลมันยาวเป็นหางว่าวแบบนี้..."
51030-131 = "ทางโน้นน่ะ! อย่ายืนเหม่ออยู่สิ รีบๆ ทำงานเข้า!"
51030-132 = "เอ้านี่! กินให้อิ่มท้องกันก่อนแล้วค่อยทำงานต่อ!"
51030-134 = "[ns] \"ทุกคนดูงานยุ่งจังเลยนะ\""
51030-135 = "เจ้าค่ะ นั่นก็เพราะเราจะเปิดงานเทศกาลกันแล้วน่ะเจ้าค่ะ"
51030-136 = "[s] \"แต่ครูว่าครั้งนี้มันดูต่างจากเทศกาลทั่วๆ ไปของเฮียกคิยาโคนะ\""
51030-140 = "รู้ได้เลยเหรอเจ้าคะ? ท่านอาจารย์ตาถึงมากเลย"
51030-141 = "งานเทศกาลครั้งนี้..."
51030-142 = "<เทศกาลโคมไฟเฮียกคิยาโค> ถูกนำมาจัดอีกครั้งหลังจากที่เคยถูกยกเลิกไปเมื่อ 20 ปีก่อนเจ้าค่ะ มันก็เลยดูพิเศษกว่างานอื่นๆ ยังไงล่ะเจ้าคะ"
51030-145 = "แม้ว่านี่จะเป็นแค่เรื่องเล่าในตำนานก็เถอะเจ้าค่ะ"
51030-146 = "ในอดีตอันแสนยาวนาน... เฮียกคิยาโคถูกสถาปนาขึ้นเป็นสหพันธ์อีกครั้งหลังยุคแห่งความขัดแย้ง"
51030-149 = "แต่ต่อให้การต่อสู้จะสิ้นสุดลงแล้ว บาดแผลก็ไม่ได้จางหายไปง่ายๆ เจ้าค่ะ"
51030-150 = "เพราะเหตุนี้ ผู้นำของเฮียกคิยาโคในตอนนั้นก็เลยเสนอ <เทศกาลโคมไฟเฮียกคิยาโค> ขึ้นมา..."
51030-153 = "เพื่อใส่ความเจ็บปวดและบาดแผลที่ชอกช้ำจากอดีตลงในโคม แล้วอธิษฐานต่ออนาคตอันสดใส... เท่าที่ข้ารู้มา มันเป็นเทศกาลที่ทำให้ทุกคนรวมใจกันเป็นหนึ่งเจ้าค่ะ"
51030-154 = "[s] \"แต่เทศกาลนั้นถูกยกเลิกไป 20 ปีเลยงั้นเหรอ? ทำไมล่ะ?\""
51030-155 = "อืม... เรื่องนั้น... "
51030-156 = "ตอนนั้นข้ายังไม่เกิด... ข้าก็เลยไม่รู้ถึงสาเหตุนั้นเจ้าค่ะ..."
51030-162 = "ฮ่าฮ่าฮ่า! เรื่องแบบนั้นมันสำคัญด้วยเหรอครับ"
51030-167 = "จะ... เจ้าคะ?!"
51030-169 = "พวกเธอคือฝ่ายสนับสนุนเทศกาลใช่มั้ย? หรือว่าเป็นนักท่องเที่ยวที่มาถึงกันก่อนล่วงหน้าน่ะ?"
51030-170 = "แต่จะเป็นอะไรก็ไม่สำคัญ การเตรียมงานเทศกาลเป็นภาพที่น่าดูมากเลยว่ามั้ย?"
51030-171 = "[s] \"อ่า อืม... ก็ใช่...\""
51030-172 = "ผมก็ไม่รู้หรอกครับว่าเทศกาลนี้ถูกยกเลิกไปเพราะอะไร แต่มันก็เป็นเรื่องน่ายินดีมากเลยที่ได้พา#nเทศกาลนี้กลับมาอีกครั้ง"
51030-173 = "ใช่เลย ก็เฮียกคิยาโคเป็นโรงเรียนแห่งงานเทศกาลนี่เนอะ!"
51030-174 = "พอเป็นเทศกาลที่ได้จัดอีกครั้งหลังจากเรื่องใน <วันนั้น> ทุกคนก็เลยมารวมพลังกันแบบนี้น่ะครับ"
51030-178 = "ตอนนี้งานยุ่งเสียจนอยากไปขอความช่วยเหลือจากคนอื่นเพิ่มเลยละ วะฮะฮ่า!"
51030-179 = "โดยเฉพาะหัวหน้าชมรมเทศกาลที่ทุ่มเทอย่างมากเพื่อเปิดเทศกาลที่เคยถูกยกเลิกไป ต้องบอกว่าเธอ#nใส่พลังสุดแรงเกิดเลยละครับ"
51030-184 = "หัวหน้าชมรมเทศกาล..."
51030-185 = "[s] \"ชิซุโกะสินะ...\""
51030-187 = "ได้ยินมาว่าเทศกาลนี้จะมีการแสดงจากมิโกะชื่อดังด้วยนี่?"
51030-188 = "อ้อ! คนวงในสินะครับเนี่ย!"
51030-189 = "ตอนนี้ผู้คนกำลังพูดกันให้แซ่ดเลยครับว่านี่จะเป็นไฮไลต์ของ <เทศกาลโคมไฟเฮียกคิยาโค>..."
51030-196 = "ข้าเองก็รู้ว่านี่เป็นเทศกาลที่ทุกคนต่างทุ่มเทและลงมือลงแรงกัน..."
51030-197 = "แต่สำหรับข้าแล้ว... สิ่งที่สำคัญกว่าเทศกาลนี้คือเฮียกกะเรียวรัน..."
51030-202 = "คุณหนู! เห็นว่าพอได้ยินเรื่อง <คำสั่งสลายตัว> ก็รีบวิ่งออกมาจากบ้านเลย"
51030-203 = "มาอยู่ในที่แบบนี้นี่เองสินะเจ้าคะ!"
51030-207 = "อึก...!!"
51030-212 = "[ns] \"...หืม?\""
51030-214 = "ตามมาถึงนี่เลย...! แบบนี้ก็ช่วยไม่ได้แล้วเจ้าค่ะ"
51030-215 = "ฮืม ท่านอาจารย์จากชัล~ เล่ต์ ขอบคุณที่ช่วยข้าในวันนี้นะเจ้าคะ เรื่องที่ท่านอาจารย์ช่วยข้าไว้ ข้าจะจดจำไปชั่วชีวิต ไม่มีวันลืมเด็ดขาด..."
51030-219 = "ฮู่ว ฮู่ว! ครั้งนี้ข้าไม่ปล่อยคุณหนูไปแน่เจ้าค่ะ!"
51030-220 = "ข้าไม่มีเวลาเหลือให้พูดต่อแล้วเจ้าค่ะ น่าเสียดายเป็นที่สุดเลย!"
51030-221 = "ข้าต้องขอตัวก่อนนะเจ้าคะ ข้าไปล่ะ...!"
51030-225 = "คุณหนู! รอด้วยสิเจ้าคะ! คุณหนู~~!"
51030-231 = "[ns] \"มาไวไปไวอย่างกับสายลมเลยแฮะ...\""
51030-234 = "ตอนต่อไป;ณ ชมรมหยินหยาง"

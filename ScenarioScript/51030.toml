[translation]
51030-1 = "Episode 3;Sudden Encounter 2"
51030-3 = "D-Damn! Who'd have thought that Schale would show up!"
51030-4 = "I knew it! We should have stayed home! We shouldn't have done any of this!"
51030-5 = "Huh? You're the one who said we could make a fortune pickpocketing the huge festival crowd!"
51030-6 = "What are you talking about? I thought you were the one saying we could rip people off during the festival preparations!"
51030-7 = "I-It doesn't matter! E-Everyone, fall back!"
51030-13 = "...They fled pretty quickly, after all that boasting."
51030-19 = "But what an amazing fight! How did you do that?"
51030-20 = "Each command lined up perfectly with what I was going to do... We were completely in sync, like I reunited with a puppy I played with long ago..."
51030-21 = "Or like a long-lost childhood friend returned to fulfill an old promise, like in a story!"
51030-22 = "[s] \"I don't think I'm a puppy...or your childhood friend.\""
51030-23 = "Ah..."
51030-24 = "You're not?"
51030-25 = "[s] \"(She looks disappointed...)\""
51030-26 = "Speaking of amazing, Miss, I've never seen anyone fight like that!"
51030-27 = "With those skills and that outfit, you must be from the Hyakkaryouran!"
51030-31 = "[ns] \"(The Hyakkaryouran...)\""
51030-32 = "Ah, so, the truth about that is..."
51030-33 = "Wait, that can't be right. Someone told me that they won't be patrolling the academy anymore—not after they were ordered to disband or something like that."
51030-38 = "No!"
51030-43 = "Er, I mean... There's been a misunderstanding. I'm not here in any official capacity. "
51030-44 = "I mean, if I were from the Hyakkaryouran, I would likely be reported if anyone learned I was out on patrol, so..."
51030-45 = "[s] \"...?\""
51030-46 = "Is that right?"
51030-47 = "Well, it sounds too complicated for me, Miss. I don't know the details, but there's one thing I'm sure of."
51030-52 = "I'm grateful for your help. "
51030-53 = "Thank you, and you there too. I don't know what I would have done if you hadn't retrieved my wallet. Thank you so much."
51030-58 = "Ah... It was nothing! I'm just grateful I was able to help you."
51030-60 = "The old man departed, thanking us profusely with each step."
51030-64 = "Now, please let me introduce myself properly."
51030-69 = "My name is Ka—"
51030-73 = "Y-Yukari! Thank you for your timely assistance."
51030-74 = "[s] \"It's my duty to help students in trouble.\""
51030-75 = "Oh?"
51030-76 = "Hmm, you say that like it's natural to help people in need."
51030-77 = "...Ah!"
51030-78 = "Renge told me about something like this!"
51030-79 = "There are villains in the world who approach you with a smile...only to ensnare you in their wicked webs!"
51030-80 = "They make a show of their generosity to trap you in debt, then charge you double for the help they gave, crying \"Remember what you owe me?\"!"
51030-81 = "...Oh no, am I in trouble?!"
51030-82 = "[s] \"No! ...No. I'm just a teacher. Sensei, from Schale.\""
51030-86 = "...Ah. I'm sorry, I didn't know."
51030-87 = "But thanks to you, I was able to right that wrong without anyone coming to further harm."
51030-88 = "Mmm, that means I have a favor to repay... What to do, what to do..."
51030-92 = "...Ah! I know just the thing!"
51030-93 = "I'll show you around Hyakkiyako!"
51030-99 = "[ns] \"W-Wait, I have other business to take care of...\""
51030-100 = "This way, Sensei!"
51030-105 = "Yukari grabbed my arm and ran forward, pulling me after her."
51030-108 = "The Hyakkiyako Academy district receives many tourists, especially during a festival..."
51030-109 = "The performers at that theatre are incredibly popular...!"
51030-118 = "It was pleasant to walk around the district with Yukari, who seemed to have a story for every street corner, before we ended up near where we began."
51030-126 = "There! Make sure the connection's tight so it doesn't fall!"
51030-127 = "Hey! Why are these materials piled up here? We need to clear this area immediately!"
51030-130 = "Whew! How can I possibly check out all of the performers who signed up for the festival? The list of names is endless!"
51030-131 = "Give me a hand, we're blockin' traffic!"
51030-132 = "You look hungry! Don't work on an empty stomach—have a bite!"
51030-134 = "[ns] \"Everyone's so busy.\""
51030-135 = "Of course! The festival is going to open soon."
51030-136 = "[s] \"This feels different from the other festivals I've seen at Hyakkiyako, though.\""
51030-140 = "You have good eyes, Sensei, to perceive it in a single glance."
51030-141 = "There is indeed something special about this festival..."
51030-142 = "For the first time in twenty years...the Hyakkiyako Lantern Festival is being celebrated!"
51030-145 = "There's an old story about it..."
51030-146 = "Long ago, Hyakkiyako emerged from the ashes of conflict, reborn as an alliance."
51030-149 = "The scars of strife, however, do not fade easily."
51030-150 = "So, the person who led Hyakkiyako in those days proposed that the academy hold a lantern festival..."
51030-153 = "So that when everyone released their lanterns, they would also let go of their pain. That way, everyone would be united by their vision for a better future..."
51030-154 = "[s] \"But why hasn't the festival been held for twenty years?\""
51030-155 = "Um, that's... "
51030-156 = "That's a story from before I was born... So I'm not certain..."
51030-162 = "Hahaha! Well, that ain't the important bit!"
51030-167 = "S-Sorry?!"
51030-169 = "You festival staff? Or tourists who got here a bit early?"
51030-170 = "Well, either way, look at all our preparations! Heck of a view, eh?"
51030-171 = "[s] \"Ah, yes... It is.\""
51030-172 = "I'm not sure why this festival was shut down previously, but it's wonderful to celebrate it again."
51030-173 = "Yeah! No matter what others say, Hyakkiyako is an academy of festivals!"
51030-174 = "I don't think we've held a festival since, you know, that day... I guess we're just working extra to have a reason to celebrate!"
51030-178 = "We're so busy, we're accepting help from anyone who walks in off the street, hahaha!"
51030-179 = "The Festival Department worked night and day to return this festival to life. The president threw herself into the preparations—her energy was inspiring!"
51030-184 = "The Festival Department's president, you say..."
51030-185 = "[s] \"Shizuko's hard at work.\""
51030-187 = "Someone said a famous miko is going to perform a ritual during the festival!"
51030-188 = "Ah, so you heard about that as well!"
51030-189 = "It's supposed be the highlight of the Hyakkiyako Lantern Festival! The district is buzzing with speculation..."
51030-196 = "I know everyone is excited for the festival, but..."
51030-197 = "The Hyakkaryouran deserves more than to fade into..."
51030-202 = "Young mistress! I was told you fled the mansion after the Declaration of Dissolution was pronounced!"
51030-203 = "So this is where you have taken refuge!"
51030-207 = "...Ugh!"
51030-212 = "[ns] \"...Huh?\""
51030-214 = "Here already...! I have no choice!"
51030-215 = "Ahem. Schale's Sensei. I extend my deepest gratitude for your assistance today. For the service you rendered me, I, Yukari, will always be grateful and..."
51030-219 = "*pant* *pant*! Young mistress! Wait for me!"
51030-220 = "...and sorry, I have to go!"
51030-221 = "It's a shame to leave the stage first, but it's time to make my exit!"
51030-225 = "My lady! My lady! There's no need for such haste! My lady?!"
51030-231 = "[ns] \"That was...fast.\""
51030-234 = "Next Episode;From the Yin-Yang Club"

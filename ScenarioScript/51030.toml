[translation]
51030-1 = "第3話;意想不到的相遇（２）"
51030-3 = "可惡！居然連夏萊的老師都來參一腳！"
51030-4 = "果，果然不該做這種事的！"
51030-5 = "啊？不是你說要趁別人準備慶典的時候大賺一筆的嗎！？"
51030-6 = "什麼？我什麼時候說過了……那句話我也是從別人那裡聽到的啊！"
51030-7 = "算，算了，大家先撤退！"
51030-13 = "……真的打退他們了。"
51030-19 = "剛，剛才那是怎麼回事！？實在太厲害了！"
51030-20 = "每個指示都跟我充滿默契……#n這種感覺……簡直就像和以前一起玩的小狗久別重逢……"
51030-21 = "剛才出手幫忙的貴人，難道是很久以前與小女子離別的……青梅竹馬嗎！？"
51030-22 = "[s]「呃，我覺得應該不是小狗也不是青梅竹馬……」"
51030-23 = "啊……"
51030-24 = "原來不是嗎？"
51030-25 = "[s] （好失望的眼神……）"
51030-26 = "要說厲害的話，同學你的身手也不是蓋的。"
51030-27 = "從那身服裝和身手看來，你是百花繚亂的人嗎？"
51030-31 = "[ns] （百花繚亂不是已經……）"
51030-32 = "啊，那，那個……"
51030-33 = "不，應該不可能吧。#n聽說最近他們好像被下達「解散令」，全都遭到暫時停學的處分了。"
51030-38 = "不是的！"
51030-43 = "那應該是發生了什麼誤會。#n雖然我很想現在就去調查……"
51030-44 = "但是如果太明目張膽的話，從家裡逃出來的事就會被發現……#n果然還是應該躲起來嗎……真傷腦筋……"
51030-45 = "[s] 「……？」"
51030-46 = "是嗎？"
51030-47 = "看來背後似乎有複雜的隱情啊……#n雖然不清楚詳情，但有一件事我能確定。"
51030-52 = "多虧有兩位的幫忙才能得救。"
51030-53 = "本來以為已經沒希望了……實在感激不盡。"
51030-58 = "啊……這不算什麼！#n小女子隨時願意幫忙！"
51030-60 = "（於是在不停道謝的居民離開後）"
51030-64 = "重新向您自我介紹。"
51030-69 = "小女子名叫勘解……"
51030-73 = "請，請叫我紫就行了。#n剛才感謝您的幫忙。"
51030-74 = "[s]「幫助陷入困境的學生是理所當然的。」"
51030-75 = "嗯？"
51030-76 = "幫助陷入危機的人之後，若無其事地說是理所當然的事……"
51030-77 = "……啊！"
51030-78 = "仔細想想，蓮華前輩曾這麼說過……！"
51030-79 = "有些人會先假裝好心並藉機接近……但那全都是惡毒的圈套……！"
51030-80 = "讓人以為是遇到好人之後就用「我啦，是我啊？」的理由索要不當金額！"
51030-81 = "……難道小女子現在處於窮途末路的危機之中嗎？"
51030-82 = "[s]「不是不是，我不是可疑的人，是夏萊的老師。」"
51030-86 = "……啊，不好意思，是我有所不知。"
51030-87 = "多虧有老師幫忙，我才能在無人受害的情況下阻止不當的行為。"
51030-88 = "不知該如何報答這份恩情……真傷腦筋……"
51030-92 = "唔嗯……好！我決定了！"
51030-93 = "機會難得，就帶老師參觀百鬼夜行吧！"
51030-99 = "[ns]「沒，沒關係，我還有其他事要辦……」"
51030-100 = "來吧老師！請往這邊！"
51030-105 = "（於是紫便開始進行導覽和各種說明）"
51030-108 = "百鬼夜行是觀光業盛行的學園自治區……"
51030-109 = "而其中最受歡迎的演出是……！"
51030-118 = "（就這樣跟隨興奮地進行說明的紫，再次來到了剛才經過的慶典大街）"
51030-126 = "那邊的！從那邊開始接上！好好抓緊，別摔倒了！"
51030-127 = "這裡堆放的材料該搬到哪裡？#n要把位置空出來才行！"
51030-130 = "唔！光是確認慶典的參加者名單就沒完沒了……"
51030-131 = "喂！別偷懶，還不快動起來！"
51030-132 = "大家～！吃完這個再繼續吧！"
51030-134 = "[ns]「大家看起來都很忙呢。」"
51030-135 = "是啊，因為慶典就快要開始了。"
51030-136 = "[s]「可是總覺得和平常百鬼夜行的慶典不太一樣。」"
51030-140 = "老師真敏銳呢，居然馬上就發現了。"
51030-141 = "這次的慶典……"
51030-142 = "「百鬼夜行燈籠祭」由於在20年前遭到廢除……#n所以是時隔20年再次舉行，相當特別哦。"
51030-145 = "雖然這只是流傳下來的一種說法……"
51030-146 = "在很久以前……百鬼夜行學園經歷紛爭時代後，以聯合學園的形式重生。"
51030-149 = "然而即便鬥爭結束，創傷也不會立刻消失。"
51030-150 = "因此，當時帶領百鬼夜行的人便提議舉辦「百鬼夜行燈籠祭」……"
51030-153 = "藉由將過去的沉痛創傷裝進燈籠的方式，盼望日後能迎接嶄新的未來……#n是能讓大家團結一心的慶典。"
51030-154 = "[s]「你說慶典在20年前被廢除……又是為什麼呢？」"
51030-155 = "嗯，那是因為…… "
51030-156 = "因為是小女子出生之前的事……所以我也不太清楚……"
51030-162 = "哈哈哈！不用在意那種小事啦。"
51030-167 = "咦咦！？"
51030-169 = "你們是來幫忙的嗎？#n還是來得太早的觀光客？"
51030-170 = "算了，是什麼都行。#n慶典準備中的樣子很壯觀對吧？"
51030-171 = "[s]「啊，嗯……就是說啊。」"
51030-172 = "雖然不知道之前因為什麼導致慶典被廢除……能夠重新舉辦就已經很讓人高興了。"
51030-173 = "沒錯，畢竟百鬼夜行可是以慶典著稱的學園啊！"
51030-174 = "或許因為是「那天」之後久違的慶典，大家都不由自主地卯足了幹勁。"
51030-178 = "所以現在才忙得連貓的手都想借來幫忙。哇哈哈！"
51030-179 = "尤其是節慶營運管理部的部長……為了重新舉辦曾遭廢除的慶典，比任何人都努力。真是個精力充沛又優秀的人呢。"
51030-184 = "節慶營運管理部的部長……"
51030-185 = "[s]「果然是靜子……」"
51030-187 = "我還聽說這次慶典計畫要讓那位有名的巫女親自主持儀式哦？"
51030-188 = "啊哈！你也太清楚了吧！"
51030-189 = "大家都說那將會是這次「百鬼夜行燈籠祭」的重頭戲……"
51030-196 = "我也很清楚……大家為了慶典……都非常努力……"
51030-197 = "但是……比起這場慶典，小女子更在意百花繚亂……"
51030-202 = "小姐～聽說您一聽到「解散令」的消息就從宅邸跑了出來……"
51030-203 = "原來您在這裡啊！"
51030-207 = "……！！"
51030-212 = "[ns]「……嗯？」"
51030-214 = "居然這麼快就找到這裡來了……沒辦法。"
51030-215 = "咳哼。夏～萊的老師，非常感謝您今天的幫忙。#n貴人所給予的這份恩情，小女子我永生難──"
51030-219 = "哈啊，哈啊……！#n不會再讓您逃走了！"
51030-220 = "──時間實在太短，連要表達心意都沒辦法！"
51030-221 = "雖然遺憾，小女子先告辭了。#n後會有期……！"
51030-225 = "小姐！請等等我！小姐～～！"
51030-231 = "[ns]「真是個……像風一樣的孩子呢……」"
51030-234 = "下一話;於陰陽部"

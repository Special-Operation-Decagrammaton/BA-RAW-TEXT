[translation]
1005206-1 = "#title;세미나 서기 노아의 심심한 휴식"
1005206-2 = "#wait;3000"
1005206-3 = "#all;hide"
1005206-4 = "#place;밀레니엄 타워, 세미나 대회의실"
1005206-5 = "#na;(약속이 취소되어 시간이 뜬 김에, 노아의 얼굴을 보러 세미나의 회의실을 방문했다.)"
1005206-6 = "#st;[0,0];instant;1;"
1005206-7 = "#clearST"
1005206-8 = "#wait;2500"
1005206-9 = "#wait;1000"
1005206-10 = "#all;hide"
1005206-11 = "4;노아;02\n#4;a\n#wait;1000"
1005206-12 = "4;노아;02\n#4;em;[반응]\n#wait;1000"
1005206-13 = "4;노아;02\n#4;d\n#wait;1000"
1005206-14 = "#wait;1200"
1005206-15 = "3;노아;04;……어머나, 선생님.\n#3;closeup\n#3;a"
1005206-16 = "3;노아;04;오늘 정기 면담은 취소되었다고 말씀드렸는데……\n#3;em;[?]\n#3;closeup"
1005206-17 = "3;노아;05;혹시 제가 보낸 메시지를 보지 못하셨나요?\n#3;stiff\n#3;closeup"
1005206-18 = "[ns] \"노아의 메시지는 확인했어.\""
1005206-19 = "#wait;1000"
1005206-20 = "[ns] \"시간이 남은 김에 노아의 얼굴이라도 보고 갈까 해서.\""
1005206-21 = "3;노아;04;아하, 그렇다면 다행이지만요.\n#3;em;[땀]\n#3;stiff"
1005206-22 = "3;노아;01;안 그래도 저도 갑자기 시간이 떠서 무얼 해야 할지 고민하던 중이었거든요."
1005206-23 = "3;노아;05;가져온 책도 다 읽은 것뿐이고, 비 때문에 창밖을 지나는 사람도 거의 보이질 않고……\n#3;em;[...]"
1005206-24 = "3;노아;03;선생님이 오시지 않았더라면, 아무런 자극도 없는 심심한 오후가 될 뻔했네요."
1005206-25 = "[s] \"내가 모처럼의 사색을 방해한 건 아니려나…….\""
1005206-26 = "3;노아;04;그럴 리가요. 오히려 선생님께서 와주셔서 다행이라 생각하고 있었답니다.\n#3;stiff"
1005206-27 = "3;노아;01;부끄러운 고백입니다만, 저는 언제나 서기로서 주변의 상황을 관찰하고 기록해야 한다는 강박감이 시나브로 몸에 배어 있는지라……"
1005206-28 = "3;노아;99;시끄럽고 정돈되지 않은 야단법석의 풍경보다 지금과 같은 정적이고 변화가 없는 일상의 풍경을 더 견디기 어려워한답니다.\n#3;em;[속상함]"
1005206-29 = "3;노아;01;오늘도 선생님이 이렇게 직접 와주시지 않았더라면……"
1005206-30 = "3;노아;03;무료함에 질린 나머지 거대한 말썽을 일으키고, 그 풍경을 남 일처럼 흥미롭게 관람하고 있었을지도 모르겠네요. 후후.\n#3;em;[음표]"
1005206-31 = "[s1] \"말썽을 일으키는 노아라니…….\"\n[s2] \"쉽게 상상이 가질 않네.\""
1005206-32 = "3;노아;01;물론 밀레니엄의 평범한 일상은 언제나 다양한 말썽과 사건으로 가득 차 있으니까요."
1005206-33 = "3;노아;01;물론 밀레니엄의 평범한 일상은 언제나 다양한 말썽과 사건으로 가득 차 있으니까요."
1005206-34 = "3;노아;99;굳이 제가 나서지 않더라도 기록하고 관찰할 일은 차고 넘치지요."
1005206-35 = "3;노아;02;……그나저나 습기 때문에 유리창에 물기가 맺혀 흘러내리고 있네요.\n#3;em;[반응]"
1005206-36 = "3;노아;01;물이 흘러내려 바닥을 더럽히기 전에 창문을 닦아야겠어요.\n#3;m2"
1005206-37 = "#st;[0,0];instant;1;"
1005206-38 = "#clearST"
1005206-39 = "3;노아;01\n#3;greeting\n#wait;1000"
1005206-40 = "#all;hide"
1005206-41 = "[ns] 유리창에 가볍게 글씨를 쓴다."
1005206-42 = "#na;노아;선생님, 그건……?"
1005206-43 = "#na;노아;……창문에 글자를 쓰는 놀이요?"
1005206-44 = "#na;노아;그런 놀이가 있다는 말을 들어본 적은 없습니다만……"
1005206-45 = "#na;노아;후후, 물기를 닦아 만든 글자가 흐린 유리창과 대비되어 예쁜 서체를 완성하고 있네요."
1005206-46 = "#na;노아;그럼, 저도 가볍게 몇 글자 적어볼까요?"
1005206-47 = "#all;hide"
1005206-48 = "#wait;16000"
1005206-49 = "#st;[-1200,-530];serial;60;[wa:1000]― ……신기하네요."
1005206-50 = "#wait;2900"
1005206-51 = "#clearST"
1005206-52 = "#st;[-1200,-530];serial;60;― 종이에 [wa:200]글씨를 [wa:400]쓸 때와는 달리,"
1005206-53 = "#wait;1350"
1005206-54 = "#st;[-1200,-630];serial;60;[wa:100]― 기분이 [wa:400]고양되는 것 같아요."
1005206-55 = "#wait;5950"
1005206-56 = "#clearST"
1005206-57 = "#st;[-1200,-530];serial;60;[wa:1500]― 기록이란 본래"
1005206-58 = "#wait;1600"
1005206-59 = "#st;[-1200,-630];serial;60;[wa:100]― 현재의 의사를 [wa:850]미래에 전달하기 위한 [wa:1100]수단일 텐데."
1005206-60 = "#wait;3500"
1005206-61 = "#clearST"
1005206-62 = "#st;[-1200,-530];serial;60;― 비가 그치고 [wa:1450]해가 뜨면 [wa:850]사라져 버리는"
1005206-63 = "#wait;1550"
1005206-64 = "#st;[-1200,-630];serial;60;― 찰나의 [wa:350]기록이라니……"
1005206-65 = "#wait;7050"
1005206-66 = "#clearST"
1005206-67 = "#st;[-1200,-530];serial;60;[wa:1300]― 이성과 진실, [wa:2300]합리를 기록하기에"
1005206-68 = "#wait;1850"
1005206-69 = "#st;[-1200,-630];serial;60;― 이 유리판은 [wa:1700]너무나도 [wa:500]연약하네요."
1005206-70 = "#wait;5650"
1005206-71 = "#clearST"
1005206-72 = "#st;[-1200,-530];serial;60;[wa:900]― 하지만…… [wa:2000]그래서 저는"
1005206-73 = "#wait;2000"
1005206-74 = "#st;[-1200,-630];serial;60;― 이 거대한 서판이 [wa:1650]더 마음에 들어요. [wa:1000]후후."
1005206-75 = "#wait;7000"
1005206-76 = "#all;hide\n#clearST"
1005206-77 = "[ns] \"이건 뭐라고 쓴 거야?\""
1005206-78 = "3;노아;02;이 문장 말인가요?\n#3;em;[반응]\n#3;a"
1005206-79 = "3;노아;01;이 문장은 제가 좋아하는 어느 낡은 시의 일부랍니다."
1005206-80 = "3;노아;99;화자가 구름을 사랑하는 것처럼, 저는 이 문장이 너무나도 마음에 들었지만……"
1005206-81 = "3;노아;01;종이 위에 기록하면 이 마음이 현실에 고정되어 취향으로 굳어질까 두려워, 마음으로만 곱씹고 있었거든요."
1005206-82 = "3;노아;03;하지만 이 유리창 위라면 얼마든지 기록할 수 있겠어요.\n#3;em;[음표]"
1005206-83 = "#all;hide"
1005206-84 = "#na;노아;……그러니까, 선생님."
1005206-85 = "#na;노아;오늘의 기록은 마음에만 담아두셔야 해요?"
1005206-86 = "#all;hide"
1005206-87 = "#na;(이후, 비가 그칠 때까지 창문에 마음을 적으며 노아와 이야기를 나누었다.)"

[translation]
1005206-1 = "研討會書記乃愛的無聊休憩"
1005206-4 = "千年巨塔，研討會大會議室"
1005206-5 = "（因為預定事項取消而有了一些空檔，於是跑去研討會的會議室看看乃愛）"
1005206-15 = "……哎呀，老師。"
1005206-16 = "我應該跟老師說過今天的定期面談延期了才對……"
1005206-17 = "難道老師沒有看到我傳的訊息嗎？"
1005206-18 = "[ns]「乃愛的訊息我有看到唷。」"
1005206-20 = "[ns]「只是因為有空閒時間，所以想來見見乃愛而已。」"
1005206-21 = "啊哈哈，那真是太好了。"
1005206-22 = "我也因為突然多出了空閒時間，正煩惱著該做什麼呢。"
1005206-23 = "帶來的書已經全部看完了，窗外也因為下雨的關係，幾乎沒有行人的蹤影……"
1005206-24 = "如果老師沒來的話，我就得度過一個平靜的無聊下午了。"
1005206-25 = "[s]「但畢竟是難得的空閒時間，希望沒有打擾到你……」"
1005206-26 = "別這麼說。#n我反而很高興老師能來呢。"
1005206-27 = "雖然這麼說有點難為情……身為一名書記，#n我有時會被「自己必須時時觀察並記錄周圍情況」的想法束縛……"
1005206-28 = "所以與吵鬧混亂的場面相比，這樣寂靜又毫無變化的時光反而讓我難以忍受。"
1005206-29 = "要是老師今天沒有出現的話……"
1005206-30 = "我可能會因為太過無聊而刻意引起騷動，#n接著再若無其事地站在一旁看好戲也說不定呢，呵呵。"
1005206-31 = "[s1]「故意製造騷動的乃愛……」\n[s2]「完全無法想像呢。」"
1005206-32 = "那是當然，因為千年的日常本來就已經充斥著各式各樣的混亂和突發事件了。"
1005206-33 = "那是當然，因為千年的日常本來就已經充斥著各式各樣的混亂和突發事件了。"
1005206-34 = "所以即使我不出面，值得紀錄的對象也已經非常足夠。"
1005206-35 = "哎呀……窗戶因為濕氣而結露了呢。"
1005206-36 = "在水珠弄濕地板前，得趕緊把窗戶擦乾才行。"
1005206-41 = "[ns] 輕輕地在窗戶上寫字"
1005206-42 = "老師，這是……？"
1005206-43 = "……在窗戶上寫字的遊戲嗎？"
1005206-44 = "雖然我並沒有聽說過這種遊戲……"
1005206-45 = "呵呵，劃開水氣的字跡和陰暗的玻璃形成了美麗的對比呢。"
1005206-46 = "那我也來試寫看看吧。"
1005206-49 = "― ……真是不可思議。[wa:960] "
1005206-52 = "― 和在紙上書寫文字時不同，[wa:800] "
1005206-54 = "― 心情相當雀躍。[wa:820] "
1005206-57 = "― 明明紀錄原本……[wa:1460] "
1005206-59 = "― 是為了將現在的想法傳達至未來的手段。[wa:2410] "
1005206-62 = "― 降雨停止，太陽再度露臉便會消失無蹤的……[wa:2300] "
1005206-64 = "― 剎那般的紀錄……[wa:470] "
1005206-67 = "― 對於紀錄理性、真相與合理而言，[wa:3680] "
1005206-69 = "― 這片玻璃板實在過於虛幻了呢。[wa:2360] "
1005206-72 = "― 不過……正因如此，我反而[wa:2900] "
1005206-74 = "― 更喜歡這片大玻璃書頁。呵呵。[wa:3050] "
1005206-77 = "[ns]「這句話是什麼意思呢？」"
1005206-78 = "這句話是嗎？"
1005206-79 = "這是從一首我很喜歡的古詩中節錄下來的一部分。"
1005206-80 = "就像作者喜愛天上的雲一樣，我也非常喜歡這首詩……"
1005206-81 = "不過我擔心一旦紀錄在紙上──這份心情將會變為現實、成為我的喜好──#n因此只放在心裡反覆咀嚼。"
1005206-82 = "但如果是在這扇玻璃窗上，無論寫下多少紀錄似乎都沒關係。"
1005206-84 = "……所以，老師。"
1005206-85 = "今天的紀錄……也請你只保留在心裡唷。"
1005206-87 = "（之後，在雨停之前都和乃愛在窗邊書寫心情、談天說地）"

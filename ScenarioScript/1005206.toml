[translation]
1005206-1 = "การพักเหนื่อยของโนอา เลขาแห่งเซมิน่า"
1005206-4 = "หอคอยมิลเลเนียม ห้องประชุมใหญ่ เซมิน่า"
1005206-5 = "(หลังจากถูกยกเลิกนัด คุณครูเลยพอมีเวลาว่างแว็บเข้าไปหาโนอาที่ห้องประชุมเซมิน่า...)"
1005206-15 = "อุ๊ย... คุณครู"
1005206-16 = "ฉันแจ้งไปแล้วนี่คะว่าการประชุมประจำปีวันนี้ยกเลิกไปแล้วน่ะค่ะ..."
1005206-17 = "หรือว่าคุณครูไม่เห็นข้อความที่ฉันส่งแจ้งไปเหรอคะ?"
1005206-18 = "[ns] \"ครูเห็นข้อความแล้วละ\""
1005206-20 = "[ns] \"ไหนๆ ก็มีเวลาแล้ว ครูเลยอยากมาหาโนอาหน่อยน่ะ\""
1005206-21 = "อ่ะฮ่า... ถ้างั้นก็ค่อยยังชั่วหน่อยค่ะ"
1005206-22 = "ความจริงฉันเองก็กำลังคิดอยู่ว่าจะทำอะไรดีเพราะจู่ๆ ก็มีเวลาว่างขึ้นมาแบบนี้น่ะค่ะ..."
1005206-23 = "ฉันอ่านหนังสือที่เอามาทั้งหมดแล้ว วันนี้ฝนตกด้วย ก็เลยไม่ค่อยเห็นคนเดินผ่านไปมา..."
1005206-24 = "ถ้าคุณครูไม่มาละก็ ฉันคงใช้เวลาช่วงบ่ายไปอย่างน่าเบื่อแน่ๆ เลยค่ะ"
1005206-25 = "[s] \"ครูคงไม่ได้ขัดจังหวะการใช้ความคิดของเธอใช่มั้ย?\""
1005206-26 = "ไม่ใช่แน่นอนค่ะ ฉันคิดว่าโชคดีซะอีกที่คุณครูมาค่ะ"
1005206-27 = "ถึงจะฟังดูน่าอาย แต่อันที่จริงแล้วในฐานะเลขา ฉันมักจะจดจ่ออยู่กับการสังเกตและบันทึกสถานการณ์#nรอบตัวอยู่เสมอๆ..."
1005206-28 = "สำหรับฉันแล้ว การรับมือกับชีวิตประจำวันที่เงียบสงบและเรียบง่าย มันเป็นเรื่องที่ยากกว่าน่ะค่ะ"
1005206-29 = "ถ้าวันนี้คุณครูไม่มาหาฉันแบบนี้ละก็..."
1005206-30 = "ฉันคงจะเบื่อและก่อปัญหาวุ่นวายขึ้นมา แล้วก็นั่งมองภาพพวกนั้นเหมือนคนอื่นๆ อย่างมีความสุขก็ได้#nนะคะ ฮุฮุ..."
1005206-31 = "[s1] \"โนอาจะก่อปัญหางั้นเหรอ...\"\n[s2] \"คิดภาพโนอาก่อปัญหาไม่ออกเลยแฮะ\""
1005206-32 = "ก็ชีวิตประจำวันของเด็กโรงเรียนมิลเลเนียมมักจะมีปัญหาและเหตุการณ์วุ่นวายอยู่เสมอนี่คะ"
1005206-33 = "ก็ชีวิตประจำวันของเด็กโรงเรียนมิลเลเนียมมักจะมีปัญหาและเหตุการณ์วุ่นวายอยู่เสมอนี่คะ"
1005206-34 = "ถึงฉันจะไม่ออกไปก่อเรื่อง แต่มันก็มีเหตุการณ์วุ่นวายให้สังเกตเยอะเลยละค่ะ"
1005206-35 = "ว่าแต่ว่า... พออากาศมีความชื้นมากๆ ตอนนี้ที่หน้าต่างเลยมีหยดน้ำเกาะอยู่เต็มเลยนะคะ"
1005206-36 = "คงต้องเช็ดหน้าต่างก่อนที่มันจะหยดลงมาที่พื้นแล้วละค่ะ"
1005206-41 = "[ns] เขียนข้อความบนหน้าต่าง"
1005206-42 = "คุณครู นั่นมัน...?"
1005206-43 = "เล่นเขียนอักษรบนหน้าต่างเหรอคะ?"
1005206-44 = "ฉันไม่เคยได้ยินว่ามีการละเล่นแบบนี้เลย..."
1005206-45 = "ฮุฮุ ตัวอักษรที่เกิดจากการเช็ดหน้าต่างกับกระจกมัวๆ แบบนี้ก็ทำให้ตัวอักษรสวยมากเลยนะคะ"
1005206-46 = "ถ้างั้นฉันลองเขียนดูบ้างดีมั้ยคะ?"
1005206-49 = "― รู้สึกแปลกจังเลยค่ะ...[wa:440] "
1005206-52 = "― รู้สึกต่างจากตอนที่เขียนลงบนกระดาษเลยค่ะ[wa:10] "
1005206-54 = "― รู้สึกดีกว่ามากเลยค่ะ[wa:260] "
1005206-57 = "― เดิมทีการบันทึกน่ะ...[wa:940] "
1005206-59 = "― คือการถ่ายทอดความคิดในตอนปัจจุบันไปยังอนาคต[wa:1410] "
1005206-62 = "― พอฝนหยุดตก และดวงอาทิตย์กลับมาส่องแสง มันก็จะหายไป...[wa:980] "
1005206-64 = "― บันทึกในช่วงเวลาสั้นๆ แบบนี้...[wa:10] "
1005206-67 = "― การบันทึกความจริงและเหตุผล...[wa:3120] "
1005206-69 = "― หน้าต่างกระจกพวกนี้... มันดูเปราะบางมากเลยนะคะ[wa:1080] "
1005206-72 = "― แต่ว่า... เพราะแบบนั้นฉันถึงได้...[wa:2020] "
1005206-74 = "― รู้สึกชอบกระดานจดบันทึกขนาดใหญ่แบบนี้มากกว่าค่ะ ฮุฮุ[wa:1530] "
1005206-77 = "[ns] \"เขียนว่าอะไรเหรอ?\""
1005206-78 = "หมายถึงประโยคนี้น่ะเหรอคะ?"
1005206-79 = "ประโยคนี้เป็นประโยคจากกลอนโบราณที่ฉันชอบมากค่ะ"
1005206-80 = "ฉันชอบประโยคนี้มากๆ เหมือนกับที่นักแต่งกลอนหลงรักเมฆบนท้องฟ้ามากๆ..."
1005206-81 = "ฉันกลัวว่าถ้าเขียนมันลงไปในกระดาษ ความรู้สึกนี้จะถูกตีกรอบโดยความเป็นจริง และลดทอนความ#nงดงามของมันลง เพราะแบบนั้นฉันเลยมักจะเก็บเอาไว้ในใจน่ะค่ะ "
1005206-82 = "แต่ว่าถ้าเป็นบนหน้าต่างนี้ละก็ ฉันคงจะเขียนมันได้เท่าที่ต้องการเลยสินะคะ"
1005206-84 = "เพราะงั้นคุณครูคะ..."
1005206-85 = "บันทึกของวันนี้... เก็บเอาไว้ในใจเท่านั้นได้รึเปล่าคะ?"
1005206-87 = "(หลังจากนั้น คุณครูก็พูดคุยเรื่องต่างๆ พร้อมกับเขียนความในใจเอาไว้บนหน้าต่างจนถึงตอนที่ฝนหยุด#nตก...)"

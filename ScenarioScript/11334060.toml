[translation]
11334060-1 = "สภาพร่างกาย;สะกดจิตหมู่ 2"
11334060-2 = "เอาละ! นี่คือสโลแกนของเรา!!"
11334060-3 = "\"พวกเราต้องได้กินเซมล่า เซมล่าต้องอยู่ในกระเพาะเรา!\" โอเคมั้ย?"
11334060-4 = "โอ้ววว!!"
11334060-5 = "พร้อมนะ..."
11334060-6 = "พวกเรา!!"
11334060-8 = "ต้องได้กินเซมล่า!!"
11334060-9 = "เซมล่า!!"
11334060-10 = "ต้องอยู่ในกระเพาะเรา!!"
11334060-11 = "พวกเรา!!"
11334060-12 = "ต้องได้กินเซมล่า!!"
11334060-13 = "เซมล่า!!"
11334060-14 = "ต้องอยู่ในกระเพาะเรา!!"
11334060-15 = "โอ้ววววว!!!"
11334060-16 = "เฮฮฮฮฮ!!"
11334060-19 = "คำพูดแบบนี้ปลุกขวัญกำลังใจได้ดีเลยแฮะ นี่มันการสะกดจิตหมู่รึเปล่าเนี่ย?"
11334060-20 = "ก็นะ มันก็คงเป็นหลักการเดียวกัน"
11334060-21 = "เอาเป็นว่า... ถ้าทำแล้วมันได้ผล ก็ถือว่าเป็นเรื่องดีๆ แล้วกันนะ"

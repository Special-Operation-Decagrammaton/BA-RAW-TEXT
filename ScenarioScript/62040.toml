[translation]
62040-1 = "第4話;禍哉！禍哉！禍哉！"
62040-5 = "[ns]「美禰！！！」"
62040-6 = "團，團長！"
62040-7 = "團長！嗚嗚嗚～！"
62040-8 = "幸好呼吸並沒有大礙……花繪醬！#n先幫我確保呼吸道的暢通！"
62040-9 = "我知道了，前輩！#n先鬆開頸部和腰部的衣物……我去拿擔架！"
62040-10 = "嗯！麻煩你了！"
62040-15 = "剛才那句話……你有聽到嗎？"
62040-16 = "有聽到啊！#n他確實說了救護騎士團……！"
62040-21 = "也就是說……幫助我們的人是三一嗎？"
62040-22 = "剛才倒下的那個被稱為團長的人……我曾經見過他！#n就在那個時候……「夫人」從奧利斯消失的那天……！"
62040-23 = "那天怎麼了？#n我當時沒跟你待在一起……"
62040-24 = "就是……"
62040-39 = "然後──接下來因我而產生的傷患們，也請儘速幫他們救護和治療吧。"
62040-42 = "噫，噫噫……！噫啊啊啊……！！！"
62040-43 = "你，你怎麼了？為什麼突然這樣！？"
62040-48 = "[log]禍哉[/log]"
62040-52 = "[log]禍哉[/log]"
62040-56 = "[log]禍哉[/log]"
62040-59 = "[log]你們住在地上的民，禍哉！禍哉！禍哉！[/log]"
62040-63 = "[log]三位天使要吹那其餘的號。[/log]"
62040-65 = "！！！"
62040-66 = "！！！"
62040-68 = "剛才……那是什麼？"
62040-69 = "從天上傳來了超大的聲音……！"
62040-71 = "「禍哉」……？"
62040-72 = "「三位天使要吹那其餘的號」……？？？"
62040-78 = "！！！！！"
62040-83 = "該不會是……那個吧？"
62040-84 = "怎麼可能！那只是《啟示錄》裡寫的……！"
62040-86 = "但那可是《啟示錄》耶？是我們奧利斯最……"
62040-87 = "如果那真的「那個」，而且正在這裡實現的話……！"
62040-92 = "不會錯。"
62040-93 = "是「啟示錄的天使」。#n假如真是如此的話……"
62040-94 = "就代表世界末日將要來臨了……！"
62040-96 = "[ns1]「現在到底……是怎麼回事？」\n[ns2]「你們知道些什麼嗎……？」"
62040-99 = "……"
62040-100 = "……"
62040-101 = "這該不會是……！"
62040-102 = "不可能。但是……"
62040-103 = "[s]「敦子？」"
62040-104 = "……"
62040-105 = "對不起，老師。#n我們現在能做的也只有推測而已。"
62040-106 = "不過相比這些，是不是應該先把救護騎士團的各位……轉移到安全的地方？"
62040-107 = "[s]「……芹奈！美禰他還好嗎？」"
62040-111 = "是，老師！沒有生命危險！可是……"
62040-112 = "前，前輩？老師……？"
62040-119 = "[ns]「小隊！」"
62040-121 = "……知道了，老師。#n美咲！我來開路！"
62040-122 = "嘖。"
62040-124 = "不，不好意思……可以借過一下嗎……？"
62040-130 = "前輩……？"
62040-135 = "……"
62040-136 = "各位，麻煩請讓開吧。"
62040-137 = "至少現在先配合一下。"
62040-143 = "我明白了，前輩。"
62040-150 = "[ns]「謝謝大家。」"
62040-151 = "別這麼說。#n能幫上老師的忙，我們反而感到很慶幸。"
62040-152 = "嗯，救護騎士團的各位也是。"
62040-154 = "謝，謝謝……"
62040-155 = "剛才真的以為要完蛋了呢……"
62040-159 = "[ns]「瀬奈也辛苦了。」"
62040-162 = "老師不必客氣。#n在發生緊急狀況時立刻前往現場，本來就是我們的原則。"
62040-163 = "再加上以前也曾經和救護騎士團合作過，所以沒有問題。"
62040-167 = "不過這位同學的狀態……"
62040-168 = "瀬奈同學……"
62040-170 = "……"
62040-171 = "[s]「怎麼了嗎，瀬奈……？」"
62040-172 = "唔嗯，該怎麼說呢……"
62040-173 = "首先，他的生命徵象沒有問題。這點是可以確定的。"
62040-174 = "從報案的時間來推算……雖然失去意識的時間有點長，不過還在預期的範圍內。#n只不過……"
62040-175 = "……"
62040-176 = "老師，這比較接近於我的直覺。"
62040-177 = "或者作為一名具有現場經驗的人……基於經驗所做出的判斷。"
62040-178 = "感覺不太妙。"
62040-180 = "……！"
62040-181 = "團，團長！嗚，嗚啊啊……"
62040-182 = "能不能說得更具體一點……？#n很抱歉，關於這點我也很難明確說明。"
62040-183 = "不過果然……"
62040-184 = "有種強烈的預感──美禰同學恢復意識的過程，恐怕不會太順利。"
62040-185 = "……目前只能繼續維持生命徵象，採取對症治療了。#n所以……"
62040-186 = "我明白了。#n我們會幫忙將其移送到救護騎士團本館前。"
62040-187 = "可，可是那樣會不會有危險……？"
62040-188 = "過去也有過前例，總會有辦法的。那麼──"
62040-193 = "老師……？"
62040-194 = "！"
62040-196 = "！！！"
62040-197 = "團長！你恢復意識了嗎！？！？"
62040-203 = "……抱歉，花繪。#n我的腦袋還在嗡嗡作響，麻煩你稍微小聲一點……"
62040-204 = "啊，好的……！"
62040-205 = "請，請問這樣……可以嗎……？"
62040-207 = "嗯，謝謝你的體貼。#n還有……瀬奈同學？"
62040-208 = "請說。"
62040-209 = "我感覺……自己應該過不了多久又會失去意識。#n因此恐怕得給你添麻煩了……在此先謝謝你。"
62040-210 = "……這樣啊。"
62040-211 = "老師，我有件事想盡快拜託您。"
62040-212 = "[s]「……儘管說吧。」"
62040-213 = "呵呵，好的。"
62040-214 = "首先，我想向老師致上謝意。#n如果沒有老師的話，我可能已經被「吞噬」，再也回不來了。"
62040-215 = "所以老師──#n可以請您守護這些孩子們……守護奧利斯學生們的「日常」嗎？"
62040-216 = "……！"
62040-217 = "實在很抱歉，我也明白這是個唐突的請求。#n不過……我還是希望老師能答應這個不情之請。"
62040-218 = "……因為就連我自己，也在不知不覺間漸漸忘記了。"
62040-219 = "早上起床，換衣服，上課，參加社團活動，再回到自己的房間……"
62040-220 = "這些看似稀鬆平常的日常瑣事，對某些人來說卻是種奢求。"
62040-221 = "以某種方式持續反覆循環的日常……其實正是一連串奇蹟的集合體。"
62040-224 = "什麼？要我去奧利斯？"
62040-229 = "沒錯。我希望……"
62040-230 = "……"
62040-231 = "希望你能前往那裡，協助正在教導奧利斯的學生準備考試的老師。"
62040-232 = "奧利斯的學生……考試？#n這是什麼意思？"
62040-233 = "就是字面上的意思。#n雖然我本想基於安全方面的考量，阻止老師親自前往奧利斯……"
62040-234 = "不過老師他想必不會同意吧。#n無論是什麼樣的地方，哪怕和經典裡描寫的地獄一樣……"
62040-235 = "只要那裡有學生在，老師便會毫不遲疑地奔赴現場。"
62040-236 = "確實如此。#n所以渚大人是想委託救護騎士團，負責維護老師的人身安全嗎？"
62040-237 = "不，並非如此。#n老師的安全與否當然至關重要，不過……"
62040-242 = "我想拜託你的，是提供奧利斯所需要的「救護」。"
62040-243 = "……"
62040-244 = "我想您應該很清楚……這番話意味著什麼才對。"
62040-246 = "是的。我想美禰團長應該不太喜歡我這種說話方式吧。"
62040-247 = "或許……對我本人也不具備什麼好感。"
62040-248 = "在承認並接受這點的基礎之上……"
62040-249 = "這並非茶會對救護騎士團下達的指示。"
62040-250 = "而是桐藤渚個人，向蒼森美禰提出的請求。"
62040-251 = "因為奧利斯……無疑是個需要救護的地方。"
62040-252 = "……您不認為某方面而言，即便要說三一沒有資格對奧利斯實施救護也不為過嗎？"
62040-253 = "這麼說確實不無道理。不過與此同時，我也相信……#n縱使如此，蒼森美禰依舊會為了發揚救護的精神而挺身而出。"
62040-254 = "……"
62040-255 = "其實我對渚大人並沒有保持著負面的感情。"
62040-260 = "畢竟某種意義上來說，救護騎士團正是因為對茶會的責任和地位感到過於沉重──"
62040-261 = "所以才自行選擇從那個位置上退下來的。"
62040-262 = "因此，我對渚大人反倒保持著感謝之意。"
62040-263 = "只不過渚大人的說話方式……至今依然會讓我感受到壓力呢。"
62040-265 = "……非常抱歉。"
62040-266 = "我明白您的意思了。"
62040-270 = "那麼從這一刻起，我會單純依循「對救護的直覺」前往奧利斯。"
62040-273 = "老師您所帶來的……應該是這裡的學生們好不容易才得以體驗到的日常吧。"
62040-274 = "體驗上課、嘗試學習、認真煩惱一些看似對人生不太重要的小事……"
62040-275 = "如此日復一日的日常……"
62040-276 = "……"
62040-277 = "拜託您了。"
62040-278 = "請守護這樣的日常吧。"
62040-279 = "[s]「……嗯，我會守護好它的。」"
62040-280 = "謝謝您……老師。"
62040-287 = "團長……團長……"
62040-288 = "……又失去意識了。"
62040-289 = "……"
62040-290 = "即便只是短暫恢復意識，這依然是個好現象。"
62040-291 = "或者也可以說，這正是美禰同學的精神力非常強韌的證據。"
62040-295 = "那麼老師，我就先走一步了。"
62040-296 = "還請務必多多保重。"
62040-304 = "走，走掉了呢……"
62040-305 = "……"
62040-306 = "……"
62040-307 = "美禰同學……會沒事的吧……"
62040-308 = "[s]「……我相信瀬奈。」"
62040-309 = "……這樣啊。嗯。"
62040-310 = "[s]「敦子，可以請你告訴我嗎？」"
62040-314 = "老師指的是……我和奧利斯對於那個聲音所知道的事嗎？"
62040-315 = "其實真要說起來，那並不是多麼不得了的東西……至少光從名字來看。"
62040-316 = "那或許……就是所謂的「啟示錄的天使」吧。#n雖然目前也只是推測而已。"
62040-317 = "不過，萬一那真的是「啟示錄的天使」……它所代表的就只有一件事。"
62040-318 = "……沒錯。"
62040-322 = "就是「世界末日」的開始。"
62040-324 = "下一話;奧利斯．宗座聖殿"

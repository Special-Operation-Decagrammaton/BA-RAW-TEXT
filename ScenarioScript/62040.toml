62040-172 = "Hm. How should I put this...?"
62040-173 = "To begin, there are no medical issues with her current physical condition. I've confirmed this."
62040-174 = "Estimating from the times listed in the report, she should have regained consciousness by now, but it's simply something to note as of now."
62040-175 = "However..."

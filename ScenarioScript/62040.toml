62040-197 = "Captain! Are you okay?!?!"
62040-203 = "...Sorry, Hanae. A persistent ringing echoes in my ears. If you could please..."
62040-204 = "A-Ah! I'm sorry...!"
62040-205 = "I-Is this better?"
62040-207 = "Yes. Thank you for your consideration. And Sena?"
62040-208 = "Go ahead."
62040-209 = "You were correct. My current consciousness is only temporary. I shall be in your care for the foreseeable future, so thank you."
62040-210 = "...I see."
62040-211 = "And, Sensei. I must ask something of you, before my time runs out."
62040-212 = "[s] \"...Ask me anything.\""
62040-213 = "Fufu. Yes."
62040-214 = "I must thank you first, however. I only clawed my way out of the darkness led by the light of your words."
62040-215 = "And now, my request. Please protect the everyday lives of the students here at Arius."
62040-216 = "...!"
62040-217 = "I understand the request is both unexpected and unanticipated. However, I must ask it of you."
62040-218 = "...For, somewhere along the way, I had begun to take it all for granted."
62040-219 = "The mundane routine of rising in the morning, donning one's uniform, attending class, participating in club activities, retiring to a dorm room..."
62040-220 = "While mundane, trivial aspects of everyday life for us, they are precious moments to others."
62040-221 = "In reality, the stability afforded to those able to establish a daily routine is the result of the accumulation of many little miracles."
62040-224 = "Pardon? You wish for me to travel to Arius?"
62040-229 = "Yes. And your mission..."
62040-230 = "..."
62040-231 = "I want you to help Sensei, who will be there helping the Arius students prep for an exam."
62040-232 = "Arius students? An exam? What does this all mean?"
62040-233 = "Exactly as it sounds. I did hope to keep Sensei from physically attending Arius, for the sake of their safety."
62040-234 = "I suppose I should've known that's not in Sensei's nature. It matters not if their destination is the hell written of in scripture..."
62040-235 = "Sensei will always go to a student in need."
62040-236 = "Yes, I agree. Then, to my understanding, our objective is to secure Sensei's safety?"
62040-237 = "While that is always of utmost importance, I have something more important to ask of you."
62040-242 = "I want you to provide aid to Arius, in whatever form it may need."
62040-243 = "..."
62040-244 = "I trust that you, of all people, understand what it is you are implying."
62040-246 = "I know I've always had a certain manner about me that you've disliked, Captain Mine."
62040-247 = "And, in light of recent events, I hardly think you hold me in the highest regard."
62040-248 = "I don't come to you ignorant of this."
62040-249 = "Which is why this is not an order from the Tea Party to the Remedial Knights."
62040-250 = "It is a humble request from Kirifuji Nagisa to Aomori Mine."
62040-251 = "Because I'm certain that Arius is in need of your aid."
62040-252 = "...Some would assert that Trinity has no right to offer their hand to Arius."
62040-253 = "And they would be correct. However, others still know that Aomori Mine does not allow such obstacles to stall her pursuit of what's right."
62040-254 = "..."
62040-255 = "I would not say I hold you in low regard, Kirifuji Nagisa."
62040-260 = "The Remedial Knights were the ones who abdicated their right to a seat at the Tea Party."
62040-261 = "We preferred to pursue our own justice, free of the burden of the position's duties."
62040-262 = "In some ways, I'm grateful to you."
62040-263 = "However... I do not believe you and I can ever agree on method and manners."
62040-265 = "...My apologies."
62040-266 = "I understand."
62040-270 = "Then I shall make my way to Arius, claiming to follow a cry for help."
62040-273 = "What you've done here, Sensei... You have given these students a glimpse of a life they were meant to have, and yet was cruelly taken from them."
62040-274 = "Things such as experiencing classes, studying with others, obsessing over trivial matters..."
62040-275 = "These small, daily routines of a student's life..."
62040-276 = "..."
62040-277 = "Please."
62040-278 = "Protect them."
62040-279 = "[s] \"...Yes. I will.\""
62040-280 = "Thank...you."
62040-287 = "Captain. Captain..."
62040-288 = "...She lost consciousness again."
62040-289 = "..."
62040-290 = "It's a good sign that she was at least temporarily able to wake up, however."
62040-291 = "Or perhaps it's rather a reflection of Mine's internal strength."
62040-295 = "Well then, Sensei. Time is of the essence."
62040-296 = "Please take care."

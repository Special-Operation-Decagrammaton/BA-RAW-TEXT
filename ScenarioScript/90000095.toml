[translation]
90000095-2 = "ทำได้ดีมากค่ะทุกคน"
90000095-8 = "เอาละ... ตรวจสอบข้อมูลของเคเทอร์เรียบร้อยแล้ว และจะทำการอัปเดตข้อมูลของ <ต้นไม้แห่งชีวิต> ค่ะ"
90000095-9 = "อืม ฝากตรวจสอบส่วนนี้ด้วยนะคุณครู"
90000095-10 = "ตอนนี้เราจับจุดอ่อนของเคเทอร์ได้แล้ว ที่นี้ก็ถึงการดำเนินการขั้นต่อไปค่ะ"
90000095-11 = "เริ่มปฏิบัติการกำจัดเคเทอร์ได้ค่ะ!"
90000095-13 = "ตอนต่อไป;บุกจู่โจมเคเทอร์"

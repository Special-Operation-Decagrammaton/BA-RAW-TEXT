[translation]
10048040-1 = "第4話;純白的變數"
10048040-2 = "特殊交易部的宿舍"
10048040-3 = "早．安～"
10048040-4 = "早安呀，美代醬～"
10048040-5 = "上學時間到囉～"
10048040-9 = "唔唔……再五分鐘……"
10048040-13 = "啊，原來是律醬啊……？"
10048040-14 = "嗯，該起床囉，美代醬。"
10048040-15 = "呵呵……"
10048040-16 = "話說律醬，有件事我有點好奇……"
10048040-17 = "嗯？"
10048040-18 = "就是……為什麼你要拿著槌子站在我枕頭邊呢？"
10048040-19 = "啊，這個是……"
10048040-24 = "當然是你再不起床就要拿來用的啊！"
10048040-25 = "你那張嘴如果有空亂講話，不如拿去多吃幾口早餐。"
10048040-26 = "所以律醬，那隻槌子是……？"
10048040-27 = "啊，我等一下打算直接去雕刻教室，所以在整理工具！"
10048040-28 = "槌子、鑿刀、鑿子……"
10048040-29 = "……原來如此。"
10048040-30 = "呵呵，律醬真的很認真呢。"
10048040-31 = "哪像你現在還在那邊賴床。"
10048040-32 = "我會這樣還不是你造成的……！"
10048040-33 = "為了規劃走私畫作的作戰，我昨晚幾乎沒睡耶！"
10048040-34 = "哦哦，作家大人。#n作品終於完成了嗎……！"
10048040-35 = "只有這種時候才會把我當作家看待……"
10048040-36 = "……唉，我又不是為了寫這種作品才入學狂獵的。"
10048040-38 = "嗯？美代醬不喜歡自己寫的東西嗎？"
10048040-39 = "也不是啦，只，只是……"
10048040-40 = "這不是我原本想追求的創作方向……"
10048040-41 = "不過我真的很喜歡美代醬寫的文章哦？"
10048040-42 = "我最喜歡的作家就是美代醬！"
10048040-43 = "律醬……"
10048040-45 = "呿，反應也差太多了吧。"
10048040-46 = "我明明也想被憐愛一下的說。"
10048040-47 = "……"
10048040-48 = "唉。"
10048040-49 = "總而言之──"
10048040-50 = "被無視了！？"
10048040-51 = "作戰的大致輪廓已經成形了。"
10048040-52 = "首先，我們的行動地點不在展覽會場。"
10048040-54 = "嗯？不是要從展覽會場把畫偷出來嗎？"
10048040-55 = "不，我們要偷的是「即將被掛在展覽會場的畫」。"
10048040-56 = "《誰會喜愛紫與藍》現在應該不在展場……"
10048040-57 = "而是保存在我們學院的收藏庫裡才對。"
10048040-58 = "在展覽正式開幕之前，大部分的作品都會先暫放在那裡。"
10048040-59 = "啊……！"
10048040-60 = "所以我們必須潛入收藏庫，把畫給運出來。"
10048040-61 = "收藏庫指的是……藝術品倉庫對吧？"
10048040-62 = "那我們就把倉庫的牆壁敲開，再把畫搬出來……"
10048040-63 = "不，那樣是不行的，律醬。"
10048040-64 = "我們並沒有跟委託人收取倉庫的修繕費。"
10048040-66 = "看來難度比想像中還高……"
10048040-67 = "所以該怎麼進入收藏庫呢？"
10048040-68 = "大致的情節……不，計畫我已經構想好了。#n細節之後再跟你們說。"
10048040-69 = "現在先去上課吧。"
10048040-70 = "雕刻要加油哦，律醬。"
10048040-71 = "嗯嗯！"
10048040-76 = "那我呢？"
10048040-77 = "我先走了。"
10048040-81 = "嗚嗚。"
10048040-85 = "狂獵教室"
10048040-87 = "唔嗯……"
10048040-88 = "已經下課了嗎……"
10048040-90 = "還好嗎，美代醬？"
10048040-94 = "啊，裕美醬。"
10048040-99 = "你看起來比平常還疲憊呢。"
10048040-100 = "是沒睡好嗎？"
10048040-101 = "啊……嗯。#n昨晚有點沒睡好……"
10048040-102 = "不過裕美醬看起來好像也挺累的呢……？"
10048040-103 = "就是說啊，最近我們舍監隊的工作量突然多了很多。"
10048040-104 = "對哦，裕美醬是舍監隊的副隊長……"
10048040-105 = "話說工作為什麼會變多呢……？"
10048040-106 = "因為不久之後的Veronica特展。"
10048040-107 = "（咯噔）"
10048040-108 = "啊，啊啊……原來如此……"
10048040-109 = "要在展覽中展示的作品都已經被送進收藏庫了。"
10048040-110 = "而收藏庫的警備，就是由我們舍監隊負責。"
10048040-111 = "收藏庫的警備……"
10048040-112 = "那，那真是辛苦你了，裕美醬……"
10048040-113 = "（裕美醬，我很抱歉……！）"
10048040-114 = "辛苦歸辛苦，這本來就在我們舍監隊的工作範圍之內。"
10048040-115 = "只是近期都因為這件事而沒時間處理走私犯罪，讓我有點擔心……"
10048040-116 = "畢竟最近校內被查獲的違禁品也越來越多了。"
10048040-117 = "（咯噔）"
10048040-118 = "這，這樣啊……"
10048040-119 = "幸好美代醬從來不會跟那些[ruby= ・ ]違[/ruby][ruby= ・ ]法[/ruby][ruby= ・ ]的[/ruby][ruby= ・ ]事[/ruby]扯上關係。"
10048040-120 = "可能也是因為這樣，跟你說起話來總覺得特別安心。"
10048040-121 = "身為舍監隊的副隊長，總是見到人就會下意識地懷疑對方……"
10048040-122 = "唯獨在跟你聊天的時候不用保持戒心……我還挺喜歡的。"
10048040-123 = "（嗚啊啊啊，裕美醬對不起……！！）"
10048040-124 = "呼……"
10048040-125 = "總之，我的近況大概就是這樣。"
10048040-126 = "那個，裕美醬。"
10048040-127 = "嗯？"
10048040-128 = "你是不是……有什麼煩惱？"
10048040-129 = "……"
10048040-130 = "……居然被你看出來啦？"
10048040-131 = "嗯，因為你的聲音聽起來比平常低沉……"
10048040-132 = "呵呵……"
10048040-133 = "你可真是觀察入微呢。"
10048040-134 = "沒錯，其實我們舍監隊……碰上了相當麻煩的問題。"
10048040-135 = "你看這個。"
10048040-136 = "這是……信封？"
10048040-137 = "嗯，是兩天前飛進Veronica特展營運委員會辦公室的東西。"
10048040-138 = "你讀讀看吧。"
10048040-139 = "啊，嗯。"
10048040-144 = "[log]蝸牛在哭泣[/log]"
10048040-145 = "[log]堅硬的天空已現扭曲[/log]"
10048040-146 = "[log]唯有王者展露微笑[/log]"
10048040-147 = "[log]在門扉緊閉、虹色交錯的魔幻剎那──[/log]"
10048040-149 = "[log]我將前去拜訪[/log]"
10048040-153 = "等等。這，這難道是……！"
10048040-154 = "沒錯。"
10048040-156 = "……是「慈愛的怪盜」的預告信。"

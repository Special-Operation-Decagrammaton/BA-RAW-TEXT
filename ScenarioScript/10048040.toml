[translation]
10048040-1 = "Episode 4;Alabaster Variable"
10048040-2 = "Free Trade Cartel Dormitory"
10048040-3 = "Mor-ning, mor-ning! Mi-YOR-ning!"
10048040-4 = "It's morning, Miyo!"
10048040-5 = "Time to go to school!"
10048040-9 = "Ugh... 5 more minutes..."
10048040-13 = "Oh, it's you, Ritsu...?"
10048040-14 = "Sure is! It's time to get up, Miyo!"
10048040-15 = "Ha..."
10048040-16 = "Anyway, Ritsu, if you don't mind me asking..."
10048040-17 = "Hm?"
10048040-18 = "Uh... Why are you holding a hammer over my head?"
10048040-19 = "Ah. Oh, this..."
10048040-24 = "It's for if you don't get up! Break in case of emergency."
10048040-25 = "How about YOU stop spewing nonsense and focus on your breakfast?"
10048040-26 = "So, Ritsu, that hammer...?"
10048040-27 = "I was about to head to the sculpture workshop. So I was picking up my tools!"
10048040-28 = "Hammer, chisel, gouge..."
10048040-29 = "...Aha."
10048040-30 = "Fufu. Diligent as always, Ritsu."
10048040-31 = "All while you were sleeping in and snoring up the place."
10048040-32 = "I'm...EXHAUSTED because of you!"
10048040-33 = "I was up all night thinking of a plan. Do you think breaking into an exhibition will be easy?!"
10048040-34 = "Oh, brilliant scribe, is your work of staggering genius finally complete?"
10048040-35 = "These are the only times my talent gets recognized..."
10048040-36 = "...*sigh* I didn't enroll in Wildhunt to write things like this..."
10048040-38 = "Huh? Do you not like your own work, Miyo?"
10048040-39 = "Well, uh..."
10048040-40 = "Let's just say that my current focus isn't what I initially had in mind..."
10048040-41 = "But I love your writing!"
10048040-42 = "You're my favorite author, Miyo!"
10048040-43 = "Ritsu... You're so sweet. Thank you."
10048040-45 = "Wow. Such a change in demeanor."
10048040-46 = "Please, will you spare some of that sweetness for me?"
10048040-47 = "..."
10048040-48 = "*sigh*"
10048040-49 = "Anyway."
10048040-50 = "What? I get skipped?!"
10048040-51 = "I've outlined our plan."
10048040-52 = "Most notably, our operation will not take place in the exhibition hall."
10048040-54 = "Huh? But that's where the painting will be."
10048040-55 = "Yes...\"will be\"...during the exhibition, naturally."
10048040-56 = "But \"The Love of Purple and Blue Light\" is not CURRENTLY on display."
10048040-57 = "It's likely in the academy's storage."
10048040-58 = "In all likelihood, it will remain there until the exhibition's opening night."
10048040-59 = "Ah...!"
10048040-60 = "So, this is much more low-profile. We can replace the painting from the quiet of the storeroom."
10048040-61 = "Oh, you mean the Art Storage place? The warehouse?"
10048040-62 = "I got it! We'll bust through the wall and just take the painting, right?"
10048040-63 = "Ritsu, I'm afraid that we must be more discreet."
10048040-64 = "The client won't pay to repair the wall, after all..."
10048040-66 = "Yeah. This is sounding harder than I hoped."
10048040-67 = "So, how do you propose we break into the storeroom?"
10048040-68 = "I have notions of a plot—I mean, a plan! I'll fill you in later."
10048040-69 = "For now...I'm afraid that we all have classes to attend."
10048040-70 = "Please enjoy your sculpting, Ritsu."
10048040-71 = "Okies!"
10048040-76 = "What about me?"
10048040-77 = "Whatever."
10048040-81 = "Aw."
10048040-85 = "Wildhunt Classroom"
10048040-87 = "Hmm..."
10048040-88 = "Over already...?"
10048040-90 = "Are you all right, Miyo?"
10048040-94 = "Ah, Hiromi."
10048040-99 = "You look more tired than usual."
10048040-100 = "Did you not get enough sleep?"
10048040-101 = "Ah... Perceptive, as always. Yeah, I was...studying."
10048040-102 = "But uh, you look a little tired too, Hiromi."
10048040-103 = "Ah, yeah. The Assembly keeps handing us more and more responsibility...without more staff."
10048040-104 = "Right, you're Vice Captain of the Prefectural Council..."
10048040-105 = "What's going on...?"
10048040-106 = "It's this Veronica Exhibition thing. You've seen the flyers?"
10048040-107 = "*flinch*"
10048040-108 = "Oh, ahh, yes... That's a really big event..."
10048040-109 = "Their exhibition pieces arrived early, so we're keeping them in storage."
10048040-110 = "And, of course, the Prefectural Council's in charge of guarding it 24/7."
10048040-111 = "Oh, tight and comprehensive security..."
10048040-112 = "M-Must be really tough, Hiromi..."
10048040-113 = "(Oh, I'm so sorry, Hiromi...! It's not personal!)"
10048040-114 = "You're sweet. It's tough, but such is the duty of the Council, right?"
10048040-115 = "With all this extra work, our Fraud Department is really stretched thin..."
10048040-116 = "...Though they've still found tons of banned items this week."
10048040-117 = "*flinch*"
10048040-118 = "I-I see..."
10048040-119 = "Smugglers! In Wildhunt! I know you can't relate, Miyo. You have such an upstanding record."
10048040-120 = "Maybe that's why I feel so relaxed when I'm with you."
10048040-121 = "When you're Vice Captain of the Prefectural Council, almost everyone looks like a suspect."
10048040-122 = "Not you, though, which is great! I bet the only crimes you would consider are in your stories..."
10048040-123 = "(AHHHHH, I'M SO SORRY...!)"
10048040-124 = "*sigh*..."
10048040-125 = "Moving on... That's my life."
10048040-126 = "But uh, Hiromi?"
10048040-127 = "Hm?"
10048040-128 = "Are you... Is that all that's bothering you?"
10048040-129 = "..."
10048040-130 = "...You could tell?"
10048040-131 = "Uh, your voice was a tad more...subdued than normal."
10048040-132 = "Fufu..."
10048040-133 = "Writers can be so observant..."
10048040-134 = "You're right. The Council...is facing a unique challenge."
10048040-135 = "Take a look."
10048040-136 = "An...envelope. Subtle off-white coloring..."
10048040-137 = "Yes. The Veronica Art Committee received it two days ago."
10048040-138 = "You can read it."
10048040-139 = "Ah, if you insist..."
10048040-144 = "[log]Snails will cry,[/log]"
10048040-145 = "[log]the hard sky will loosen,[/log]"
10048040-146 = "[log]only the king smiles.[/log]"
10048040-147 = "[log]When the doors close and the rainbow blends, in that magical moment—[/log]"
10048040-149 = "[log]I shall arrive.[/log]"
10048040-153 = "Wait. Th-This is...!"
10048040-154 = "Yes..."
10048040-156 = "...It's the Benevolent Thief's Calling Card."

[translation]
10048040-1 = "ตอนที่ 4;ตัวแปรบริสุทธิ์"
10048040-2 = "หอพัก ชมรมการค้าพิเศษ"
10048040-3 = "เช้า แล้ว เช้า แล้ว~"
10048040-4 = "เช้าแล้วค่ะ มิโยะจัง~"
10048040-5 = "ได้เวลาไปโรงเรียนแล้วค่ะ~"
10048040-9 = "งืมม... ขออีก 5 นาที..."
10048040-13 = "อ๊ะ ริตสึจังหรอกเหรอ...?"
10048040-14 = "อื้อ ได้เวลาตื่นแล้วนะ มิโยะจัง"
10048040-15 = "ฮุฮุ..."
10048040-16 = "ว่าแต่ ริตสึจัง ฉันมีเรื่องสงสัยน่ะค่ะ..."
10048040-17 = "อื้อ?"
10048040-18 = "เอ่อ... ทำไมถึงมายืนถือค้อนอยู่ตรงที่หัวนอนฉันล่ะคะ?"
10048040-19 = "อ๊ะ ค้อนอันนี้..."
10048040-24 = "ก็เอาไว้! ใช้ตีเวลาเธอไม่ยอมตื่นยังไงล่ะ!"
10048040-25 = "ถ้าจะพูดอะไรเหลวไหล ฉันว่าเอาเวลานั้นไปกินอาหารเช้าเถอะค่ะ"
10048040-26 = "ว่าไงล่ะคะ ริตสึจัง ตกลงค้อนนี้มัน...?"
10048040-27 = "อ้อ เดี๋ยวเข้าโรงเรียนแล้วฉันจะตรงไปที่ห้องประติมากรรมเลยน่ะ! ตอนนี้ก็เลยกำลังเตรียมอุปกรณ์อยู่#nพอดี!"
10048040-28 = "ค้อน สิ่ว เหล็กสลัก..."
10048040-29 = "อ้อ..."
10048040-30 = "ฮุฮุ ริตสึจังนี่ขยันจังเลยนะคะ"
10048040-31 = "ส่วนเธอก็เป็นคุณนายตื่นสายจอมขี้เกียจ"
10048040-32 = "ที่ฉันเป็นแบบนี้ก็เพราะคุณต่างหากล่ะคะ...!"
10048040-33 = "ฉันนั่งเขียนแผนการลักลอบเอาภาพวาดออกมาทั้งคืนจนแทบไม่ได้นอนเลยค่ะ!!"
10048040-34 = "โอ้ว คุณนักเขียน ในที่สุดผลงานก็เสร็จสมบูรณ์แล้วเหรอคะ...!"
10048040-35 = "ทีอย่างนี้ละเรียกฉันว่าคุณนักเขียน"
10048040-36 = "เฮ้อ... ฉันไม่ได้เข้าไวลด์ฮันต์มาเพราะอยากเขียนงานอะไรแบบนี้สักนิด"
10048040-38 = "หืม? มิโยะจังไม่ชอบงานเขียนของตัวเองเหรอ?"
10048040-39 = "เปล่าหรอก คะ... คือว่า..."
10048040-40 = "คงต้องบอกว่านี่ไม่ใช่แนวความคิดสร้างสรรค์ที่ฉันตั้งใจไว้ตั้งแต่แรกน่ะค่ะ..."
10048040-41 = "แต่ฉันชอบงานเขียนของมิโยะจังนะ"
10048040-42 = "นักเขียนที่ฉันชอบที่สุดก็คือมิโยะจังด้วย!"
10048040-43 = "ริตสึจัง..."
10048040-45 = "โห 2 มาตรฐานนะ"
10048040-46 = "เอ็นดูฉันบ้างสิ"
10048040-47 = "......"
10048040-48 = "เฮ้อ"
10048040-49 = "ช่างเถอะค่ะ"
10048040-50 = "ข้ามฉันไปเลยเหรอ!"
10048040-51 = "ฉันได้โครงร่างคร่าวๆ ของปฏิบัติการแล้วค่ะ"
10048040-52 = "อย่างแรกเลย สถานที่ปฏิบัติการของเราไม่ใช่หอนิทรรศการค่ะ"
10048040-54 = "หืม? เราไม่ได้จะไปเอาภาพออกมาจากนิทรรศการหรอกเหรอ?"
10048040-55 = "เราจะไปเอาภาพที่จะ 'จัดแสดง' ในนิทรรศการค่ะ"
10048040-56 = "ตอนนี้ <ใครเล่าจะหลงใหลสีม่วงกับสีคราม> ไม่ได้อยู่ในหอจัดนิทรรศการ"
10048040-57 = "แต่มันถูกเก็บไว้ในโกดังของโรงเรียนต่างหากค่ะ"
10048040-58 = "ก็ก่อนจะจัดนิทรรศการอย่างเป็นทางการ ผลงานแทบทั้งหมดจะอยู่ในโกดังนี่คะ"
10048040-59 = "อ้อ...!"
10048040-60 = "ความหมายว่าสุดท้ายแล้วเราต้องเข้าไปในโกดังแล้วเอาภาพนั้นออกมาค่ะ"
10048040-61 = "โกดังที่ว่า... หมายถึงโกดังที่เอาไว้เก็บงานศิลปะใช่มั้ย?"
10048040-62 = "ถ้างั้นก็แค่ทุบผนังโกดัง แล้วก็เอาภาพออกมาจากที่นั่น..."
10048040-63 = "อืม แบบนั้นไม่ได้ค่ะ ริตสึจัง"
10048040-64 = "ลูกค้าไม่ได้ให้ค่าซ่อมโกดังพวกเรามาค่ะ"
10048040-66 = "สรุปว่างานนี้ของเรายากกว่าที่คิดไว้อีกสินะ..."
10048040-67 = "งั้นเราจะเข้าไปในโกดังเก็บงานศิลปะได้ยังไงล่ะ?"
10048040-68 = "พล็อตคร่าวๆ ก็คือ... ไม่ดีกว่า ฉันคิดแผนการเอาไว้แล้ว เดี๋ยวฉันจะบอกรายละเอียดให้ฟังทีหลังนะคะ"
10048040-69 = "ตอนนี้พวกเราแยกย้ายไปเรียนกันก่อนเถอะค่ะ"
10048040-70 = "ตั้งใจทำงานแกะสลักนะคะ ริตสึจัง"
10048040-71 = "อื้อๆ!"
10048040-76 = "แล้วฉันล่ะ?"
10048040-77 = "ฉันขอตัวก่อนนะคะ"
10048040-81 = "งื้อ"
10048040-85 = "ห้องเรียน ไวลด์ฮันต์"
10048040-87 = "อืม..."
10048040-88 = "เลิกคลาสแล้วเหรอ..."
10048040-90 = "เป็นอะไรหรือเปล่า มิโยะจัง?"
10048040-94 = "อ๊ะ ฮิโรมิจัง"
10048040-99 = "ดูเหนื่อยมากเลยนะ ปกติไม่เห็นเป็นแบบนี้เลยนี่?"
10048040-100 = "นอนไม่พอหรือเปล่า?"
10048040-101 = "อ่า... ค่ะ เมื่อคืนฉันนอนไม่ค่อยหลับน่ะค่ะ"
10048040-102 = "ว่าแต่ฮิโรมิจังก็... เอ่อ ดูเหนื่อยๆ เหมือนกันเลยนะ...?"
10048040-103 = "อ้อ ช่วงนี้งานของพวกเราฝ่ายดูแลหอพักมีเยอะขึ้นมากเลยน่ะ"
10048040-104 = "อ้อ จริงสิ ฮิโรมิจังเป็นรองหัวหน้าฝ่ายดูแลหอพักนี่นา..."
10048040-105 = "ว่าแต่มีงานอะไรกันเหรอคะ...?"
10048040-106 = "เร็วๆ นี้จะมีการจัดนิทรรศการพิเศษเวโรนิก้าน่ะ"
10048040-107 = "(สะดุ้ง)"
10048040-108 = "อะ... อ้อ... เพราะงานนี้เองสินะคะ..."
10048040-109 = "ตอนนี้งานศิลปะที่จะจัดแสดงในนิทรรศการส่งมาเก็บที่โกดังหมดแล้ว"
10048040-110 = "แล้วคนที่รับผิดชอบด้านการรักษาความปลอดภัยของโกดังก็คือฝ่ายดูแลหอพัก"
10048040-111 = "รักษาความปลอดภัยของโกดัง..."
10048040-112 = "นะ... เหนื่อยน่าดูเลยนะคะ ฮิโรมิจัง..."
10048040-113 = "(ขอโทษนะคะ ฮิโรมิจัง...!)"
10048040-114 = "มันก็น่าเหนื่อยอยู่หรอก แต่ก็เป็นงานที่ฝ่ายดูแลหอพักต้องทำอยู่แล้วละ"
10048040-115 = "แต่ฉันแค่รู้สึกกังวลนิดหน่อยที่งานนี้ทำให้ช่วงนี้เรารับมือกับคดีลักลอบขนส่งสินค้าไม่ได้เลย..."
10048040-116 = "ช่วงนี้มีการตรวจพบสิ่งของที่ห้ามนำเข้ามาในโรงเรียนค่อนข้างเยอะเลยน่ะ"
10048040-117 = "(สะดุ้ง)"
10048040-118 = "งะ... งั้นสินะคะ..."
10048040-119 = "แต่ยังไงก็เถอะนะ มิโยะจัง ฉันโล่งอกไปทีที่เธอไม่เข้าไปเกี่ยวข้องกับเรื่องผิดกฎพวกนั้น"
10048040-120 = "บางทีนี่อาจเป็นเหตุผลที่ฉันสบายใจทุกครั้งเวลาคุยกับเธอก็ได้นะ..."
10048040-121 = "พอทำงานรองหัวหน้าฝ่ายดูแลหอพักมากๆ เข้า ฉันจะเริ่มระแวงผู้คนน่ะ"
10048040-122 = "แต่ฉันชอบที่เวลาคุยกับเธอแล้วไม่รู้สึกแบบนั้นเลยสักนิด"
10048040-123 = "(ฮืออออ ขอโทษนะคะ...!)"
10048040-124 = "ฮู่วว..."
10048040-125 = "เอาเถอะ สรุปว่าหมู่นี้ฉันก็ยุ่งๆ กับงานแบบนี้ละ"
10048040-126 = "ว่าแต่ ฮิโรมิจัง"
10048040-127 = "หืม?"
10048040-128 = "ไม่ทราบว่า... มีเรื่องอะไรกังวลอีกมั้ยคะ?"
10048040-129 = "......"
10048040-130 = "ดูออกเลยเหรอ...?"
10048040-131 = "เอ่อ... ฉันรู้สึกว่าเสียงของฮิโรมิจังไม่ร่าเริงเหมือนปกติน่ะค่ะ..."
10048040-132 = "ฮุฮุ..."
10048040-133 = "รับรู้ได้ทันทีเลยสินะ"
10048040-134 = "ใช่แล้วละ ที่จริงตอนนี้ฝ่ายดูแลหอพักของเรา... กำลังเผชิญกับปัญหาสุดยุ่งยากอยู่น่ะ"
10048040-135 = "ดูนี่สิ"
10048040-136 = "นี่มัน... ซองจดหมายนี่คะ?"
10048040-137 = "อื้อ มันถูกส่งมาที่ห้องคณะกรรมการบริหารนิทรรศการพิเศษเวโรนิก้าเมื่อ 2 วันก่อน"
10048040-138 = "ลองอ่านดูสิ"
10048040-139 = "อ่า ได้ค่ะ"

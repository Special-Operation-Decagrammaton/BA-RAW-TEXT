[translation]
102130-1 = "Episode 13; District Defense Operation - Trinity 1"
102130-5 = "Here, this way!"
102130-6 = "All citizens evacuating, please follow us!"
102130-8 = "We'll take care of the Trinity evacuation! Mashiro, support the rear!"
102130-9 = "Understood! Hasumi!"
102130-14 = "Please feel free to enter! This library is the oldest building in Trinity, so please rest assured it is very sturdy!"
102130-24 = "Ugh... My library...my secret hideout..."
102130-25 = "President! It's being used for a good cause. You should try to look happy!"
102130-26 = "Ugh... Argh..."
102130-32 = "W-Wahhh?!"
102130-33 = "Enemies are coming here too?!"
102130-48 = "You seem short-handed. We'll help."
102130-49 = "Yes! Trinity's Running Flash Grenade and the Vigilante Crew's superstar have arrived!"
102130-51 = "The Vigilante Crew...!"
102130-53 = "Reisa... Please don't call me that..."
102130-54 = "O-Oh! Attacks are happening everywhere! We're in a moment of crisis!"
102130-55 = "However!"
102130-66 = "...I avoided it in the blink of an eye! Did you see, Suzumi? Did you see how fast I moved?"
102130-71 = "We're gonna go defend that side. Let's go, Reisa."
102130-76 = "Yes, Suzumi! Are you gonna show everyone the true potential of the Running Flash Grenade? Huh?"
102130-77 = "W-Wait! Suzumi! Wait for me!"
102130-82 = "..."
102130-83 = "Are you okay, Kazusa?"
102130-84 = "...I'm glad she seems fine."
102130-89 = "Are we evacuating? What are we doing here?"
102130-90 = "Oh, Yoshimi. We're the After-School Sweets Club. Shouldn't we lend them a helping hand here?"
102130-91 = "...What are you saying? What does this have to do with dessert?"
102130-93 = "But...the Justice Task Force looks like they're struggling...so maybe they wouldn't mind the help..."
102130-94 = "That's true. We should go check it out."
102130-95 = "Yeah!"
102130-97 = "*sigh* Oh, geez. Guess I don't have a choice."
102130-109 = "O-Oh! The Mimesis of the Saint Justina Council has been captured!"
102130-110 = "Wh-What?! Defenses are lacking in that area!"
102130-114 = "...Let's make ourselves useful, shall we? Fire a volley, please."
102130-124 = "Is that...the L118 towed artillery...?"
102130-126 = "Yes, that's right, Hasumi. Has it been a while since you've heard that name?"
102130-135 = "Nagisa... Seia..."
102130-136 = "...Um, I've never seen Nagisa away from her tea table before."
102130-137 = "Thank you for providing the Tea Party's towed artillery."
102130-139 = "Don't mention it, Hasumi. It's the least the Tea Party can do."
102130-140 = "All right, Seia. Where are we needed next?"
102130-141 = "The next is...to the northeast. The coordinates are..."
102130-152 = "..."
102130-153 = "Your foresight is gone...but seems your other abilities have grown stronger..."
102130-154 = "I don't know if I'd call them abilities... It's hard to explain, but I've become more sensitive..."
102130-155 = "Let's just say your senses have developed."
102130-156 = "...Mika. How's the situation on your end?"
102130-157 = "It's nothing I can't handle on my own! Focus on the defenses over there, 'kay?"
102130-158 = "...If you say so, but don't push yourself too hard."
102130-159 = "In that case, we'll help with defenses here. Hasumi, please lead."
102130-163 = "...Okay. Then let's do this!"

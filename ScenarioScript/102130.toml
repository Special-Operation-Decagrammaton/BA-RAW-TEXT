[translation]
102130-1 = "第13話;「三一」自治區防衛（１）"
102130-5 = "請往這邊！"
102130-6 = "大家，請往這邊避難吧！"
102130-8 = "三一自治區的避難引導由我們負責！#n麻白，請進行後方支援！"
102130-9 = "是，蓮實前輩！"
102130-14 = "請進來這裡！#n古書館是三一歷史悠久的建築物，應該相對不易崩塌才對！"
102130-24 = "我的古書館……我專屬的基地啊……嗚嗚……"
102130-25 = "委員長也真是的！這次是為了大家才開放的啊，#n請露出更愉快的表情！"
102130-26 = "啊啊……嗚嗚嗚……"
102130-32 = "嗚，嗚哇！？"
102130-33 = "這裡也有敵人啊！？"
102130-48 = "看來人手不太夠呢，我們也來幫忙。"
102130-49 = "是！#n三一的「行走閃光彈」和自衛隊的「超級巨星」到場了唷！"
102130-51 = "自衛隊的各位……！"
102130-53 = "澪，澪紗……那個外號有點……"
102130-54 = "啊啊！話才說到一半就有敵襲！#n這下危險了！"
102130-55 = "──但是！"
102130-66 = "……請別以為這種程度的攻擊就能打敗我宇沢澪紗哦！#n鈴美同學，你剛才有看見嗎！我華麗的──"
102130-71 = "抱歉，現在得立刻到那裡去才行。#n走吧，澪紗同學。"
102130-76 = "啊，是！要發揮「行走閃光彈」的本領了對吧！"
102130-77 = "鈴美同學～！等等我呀～！"
102130-82 = "……"
102130-83 = "千紗醬，怎麼了嗎？"
102130-84 = "……沒什麼，只是覺得還真有精神呢。"
102130-89 = "話說，為什麼我們不去避難呢？"
102130-90 = "哎呀哎呀，喜美君。我們可是放學後的甜點部唷？#n面對這種緊急事態不是應該伸出援手嗎？就像甜點一樣。"
102130-91 = "啊？你在說什麼？而且那跟甜點無關吧。"
102130-93 = "但，但是……實現正義部的大家看起來很辛苦的樣子……#n如果我們能幫忙，他們說不定會很開心……"
102130-94 = "說的沒錯。我們也出發吧。"
102130-95 = "嗯！"
102130-97 = "唉……真沒辦法。"
102130-109 = "啊啊！那裡出現了聖徒會的[ruby=Mimesis]複製[/ruby]！"
102130-110 = "什麼！？那邊還沒做好防禦措施啊……！！"
102130-114 = "砲手，請支援。"
102130-124 = "這是……L118牽引式榴彈砲……？"
102130-126 = "沒錯，蓮實同學。正是如此。#n不覺得聽起來很懷念嗎？"
102130-135 = "渚同學……聖亞同學……"
102130-136 = "……我，好像是第一次在外面看見渚大人。"
102130-137 = "感謝茶會的支援。"
102130-139 = "這不算什麼。#n如果連這點程度的事都辦不到，將有損茶會的名聲吧。"
102130-140 = "那麼聖亞同學，請繼續吧。"
102130-141 = "接下來……在東北方，座標是──"
102130-152 = "……"
102130-153 = "聖亞同學的預知能力雖然消失了……#n不過該說是作為代替，還是該說獲得了別的能力呢。"
102130-154 = "雖然不確定能不能算是能力……感覺變得很敏銳……"
102130-155 = "……「直覺」變好了，暫時先當成這樣吧。"
102130-156 = "……彌香，你那邊的情況怎麼樣呢？"
102130-157 = "嗯，我這邊沒問題。#n我一個人就綽綽有餘，加強你們那邊的防禦吧。"
102130-158 = "……知道了。請不要勉強。"
102130-159 = "那麼，我們就來協助這邊的防禦吧。#n蓮實同學，麻煩你指揮了。"
102130-163 = "……我知道了，那麼就恭敬不如從命了。"

[translation]
102130-1 = "ตอนที่ 13;ปฏิบัติการป้องกันเขตปกครองตนเอง - ทรีนิตี้ 1"
102130-5 = "ทางนี้ ทางนี้ค่ะ!"
102130-6 = "อพยพมาทางนี้กันเลยค่ะ!"
102130-8 = "พวกฉันจะดูแลการอพยพในเขตปกครองตนเองทรีนิตี้เองค่ะ! มาชิโระ ฝากสนับสนุนจากด้านหลังด้วย!"
102130-9 = "ค่ะ! รุ่นพี่ฮาสุมิ!"
102130-14 = "เข้ามาทางนี้กันอีกค่ะ! ห้องสมุดเก่าคืออาคารที่มีประวัติศาสตร์ยาวนานที่สุดในทรีนิตี้! นั่นแปลว่านี่เป็น#nสิ่งก่อสร้างที่มั่นคงและทนทานที่สุดค่ะ!"
102130-24 = "อึก... ห้องสมุดของฉัน... กองบัญชาการเล็กๆ ของฉัน..."
102130-25 = "โธ่ หัวหน้า! เราใช้สถานที่ไปกับเรื่องดีๆ นะคะ ทำสีหน้าให้สดใสกว่านี้สิคะ!"
102130-26 = "ฮือ...... อึก..."
102130-32 = "ว้ายยย?!"
102130-33 = "มีศัตรูทางนี้ด้วยเหรอ?!"
102130-48 = "กำลังคนไม่พอสินะคะ ฉันจะช่วยเองค่ะ"
102130-49 = "ค่ะ! ก็ซูเปอร์สตาร์แห่งกลุ่มรักษาความสงบและระเบิดแสงแห่งทรีนิตี้มาถึงแล้วนี่คะ!"
102130-51 = "กลุ่มรักษาความสงบทุกคน...!"
102130-53 = "คุณเรอิสะ... อย่าใช้ฉายานั้นเลยค่ะ..."
102130-54 = "อะ... อ๊ะ? มีการโจมตีต่อเนื่องในทุกทิศเลยนะคะ! วิกฤตแล้วค่ะ!"
102130-55 = "แต่ว่า!"
102130-66 = "...ฉันก็หลบมาได้อย่างง่ายดายเลยค่ะ! คุณสึซึมิเห็นการเคลื่อนไหวอันแพรวพราวของฉันไหมคะ...?"
102130-71 = "พวกเราจะไปป้องกันทางฝั่งนั้นกันค่ะ ไปเถอะค่ะ คุณเรอิสะ"
102130-76 = "ค่ะ! คุณสึซึมิ! คิดจะโชว์ฝีมือของระเบิดแสงตรงนี้เหรอคะ? หืม?"
102130-77 = "อ๊ะ... อ๊ะ! คุณสึซึมิ! รอด้วยสิคะ!"
102130-82 = "......"
102130-83 = "เป็นอะไรเหรอ คาซึสะจัง?"
102130-84 = "......ไม่มีอะไรหรอก แค่เห็นว่ายังดูปกติดีน่ะ"
102130-89 = "ว่าแต่ พวกเราไม่อพยพเหรอ? เรามาที่นี่ทำไมกันน่ะ?"
102130-90 = "ให้ตายสิๆ โยชิมิ เราเป็นถึงชมรมของหวาน จะไม่ยื่นมือช่วยในสถานการณ์แบบนี้เลยเหรอ?"
102130-91 = "...... พูดอะไรของเธอ เรื่องนี้มันเกี่ยวอะไรกับของหวานด้วย?"
102130-93 = "แต่ว่า... คนจากชมรมทวงความยุติธรรมดูเหนื่อยกันมากเลย... ถ้าเราไปช่วย ทางนั้นอาจจะดีใจก็ได้..."
102130-94 = "จริงด้วย พวกเราก็ไปกันเถอะ"
102130-95 = "อื้ม!"
102130-97 = "เฮ้อ... จริงๆ เลย งั้นก็ช่วยไม่ได้"
102130-109 = "อ๊ะ... อ๊ะ! พบมิเมซิสสาวกอยู่ข้างหน้าค่ะ!"
102130-110 = "อะ... อะไรเนี่ย?!  เราไม่ได้เตรียมป้องกันทางนั้นไว้นะ!!"
102130-114 = "ปรับเปลี่ยนการยิงด้วยค่ะ"
102130-124 = "นี่มัน... ปืนใหญ่วิถีโค้ง L118...?"
102130-126 = "ใช่แล้วค่ะ ไม่ได้ยินเสียงนี้มานานเลยใช่ไหมคะ คุณฮาสุมิ?"
102130-135 = "คุณนางิสะ... คุณเซอา..."
102130-136 = "...... ฉะ... ฉันเพิ่งเคยเห็นคุณนางิสะออกมาข้างนอกแบบนี้เป็นครั้งแรกเลยค่ะ"
102130-137 = "ขอบคุณที่สนับสนุนปืนใหญ่วิถีโค้งนะคะ สภาน้ำชา"
102130-139 = "ไม่เป็นไรหรอกค่ะ คุณฮาสุมิ ถ้าทำไม่ได้ขนาดนี้ ก็ไม่สมศักดิ์ศรีการเป็นสภาน้ำชาสิคะ"
102130-140 = "เอาละ คุณเซอา ต่อไปก็ฝากด้วยนะคะ"
102130-141 = "พิกัดต่อไปคือ... ทางตะวันออกเฉียงเหนือค่ะ..."
102130-152 = "......"
102130-153 = "ถึงคุณเซอาจะสูญเสียความสามารถในการพยากรณ์ไป... แต่ก็ได้ความสามารถอื่นมาแทน ไม่สิ ต้องบอกว่าความสามารถอื่นก็แข็งแกร่งขึ้นดีหรือเปล่านะคะ?"
102130-154 = "จะเรียกว่าเป็นความสามารถพิเศษได้ไหมนะ... มันยากที่จะอธิบาย... แต่จะบอกว่าประสาทสัมผัสของ#nฉันดีขึ้นก็ได้ค่ะ..."
102130-155 = "...... สรุปว่า <เซนส์> ดีขึ้นแล้วกันค่ะ"
102130-156 = "มิกะ... สถานการณ์ทางนั้นเป็นยังไงบ้างคะ?"
102130-157 = "ทางนี้ไม่มีปัญหาอะไร ตรงนี้มีฉันคนเดียวก็เพียงพอแล้ว ให้คนอื่นไปช่วยสกัดทางนู้นให้แน่นหนาเถอะ"
102130-158 = "...... เข้าใจแล้วค่ะ อย่าหักโหมนะคะ"
102130-159 = "พวกเราจะช่วยป้องกันทางด้านนี้เองค่ะ คุณฮาสุมิ ช่วยสั่งการด้วยค่ะ"
102130-163 = "...... ค่ะ รับทราบค่ะ ถ้างั้นฉันจะไม่เกรงใจแล้วนะคะ!"

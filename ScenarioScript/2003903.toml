[translation]
2003903-1 = "不知周之夢為胡蝶與？胡蝶之夢為周與？"
2003903-2 = "夏萊辦公室"
2003903-4 = "……唉，上上下下都鬧成了一團。"
2003903-5 = "嚷嚷著玄龍門門主不該輕易向外界合作，否則不久便會失去立足之地……"
2003903-6 = "妾身不過是想偷懶罷了。"
2003903-7 = "[s]「原來是這樣嗎！？」"
2003903-8 = "呵呵。方才是開玩笑的。"
2003903-9 = "[s]「果然是玩笑對吧……？」"
2003903-10 = "然而，戲言往往摻雜著一絲真心。"
2003903-11 = "[s]「所以到底是不是！？」"
2003903-12 = "呵呵。臆測此事，也不失為一種樂趣。"
2003903-13 = "總之，是時候開始工作了。"
2003903-14 = "此乃妾身初次經手玄龍門以外的工作，不禁令人期待啊。"
2003903-15 = "但在那之前……"
2003903-21 = "[ns]「這是什麼？」"
2003903-22 = "嗯，似乎是有助於治癒身心的藥香。"
2003903-23 = "聽聞妾身要擔任夏萊的值日生，鍊丹術研究會便替妾身做了準備。"
2003903-24 = "好，這就開始吧。#n時間應當能省則省。"
2003903-26 = "（於是便和妃姬一起開始處理夏萊的工作……）"
2003903-28 = "呼呣……#n由於近日流行於舊市區之廢棄建物拍攝挑戰影片與個人節目……"
2003903-29 = "導致居住於該地區的市民，紛紛對噪音與治安問題感到不安。"
2003903-30 = "對此，請求聯邦搜查部夏萊提供與之相關的意見書與進一步協助……？"
2003903-31 = "[s]「如果是妃姬會怎麼做呢？」"
2003903-32 = "答案顯而易見。#n該廢棄建物乃諸惡之源。"
2003903-34 = "若以玄龍門之力，將其夷為平地──"
2003903-35 = "[s]「那樣會不會有點太極端了！？」"
2003903-37 = "……是嗎？這在山海經乃習以為常之事。"
2003903-38 = "要多考慮周圍的情況？"
2003903-39 = "唔嗯……倘若缺乏此等手段，該問題恐怕難以根治。"
2003903-41 = "就未能供給最新槍械與彈藥一事，學生發起了學園規模的團體示威……？"
2003903-42 = "這倒也尚稱情有可原。#n畢竟在奇普托斯，槍械的供給整備順利與否，其重要程度並不亞於衣食住行啊。"
2003903-43 = "[s]（原來……是這樣的嗎！？）"
2003903-44 = "學生本就有權發起示威，引發問題之人自有受譴之責。"
2003903-45 = "甚至無須親赴遠處調查。#n就資金流向所見，應是供應商刻意遺漏帳簿所致。"
2003903-46 = "妾身立刻以玄龍門的方式，給予相關人士嚴厲的物理制裁──"
2003903-47 = "[s]「不可以隨便動用武力──！」"
2003903-48 = "……是嗎？#n倘若此事發生在山海經，當即給予制裁亦無不可……"
2003903-49 = "唉，雖說若能憑藉法律便諸事順遂自然再好不過……"
2003903-50 = "然老師應也心裡有數才是──世間總有遊走邊緣之人存在。"
2003903-52 = "妾身將展開全面調查，評斷此事是否為無端指控。#n倘若犯罪情形屬實，當即判處死刑！"
2003903-53 = "[s]「不可以一言不合就判死刑啦──！」"
2003903-54 = "啊，妾身所謂死刑不過是種比喻……"
2003903-55 = "[s]「總之就是不行──！」"
2003903-56 = "是嗎……"
2003903-58 = "今日的工作似乎已就此告終，老師。"
2003903-59 = "花費的時間不若平時的一半？#n呵呵，得以有所貢獻真令人高興。"
2003903-60 = "嗯？雖說迅速且正確的判斷令人驚訝，但解決方法和結論有些極端……？"
2003903-61 = "……屬實讓人難過。#n這個世界的格局過於狹小，因而難以理解山海經的處事方式。"
2003903-62 = "那麼，老師。#n汝接下來有何打算呢？"
2003903-63 = "嗯？工作比預期還早結束，因此尚未決定……？"
2003903-68 = "（某處緩緩傳來了一股很棒的香氣）"
2003903-69 = "（似乎是妃姬帶來的香爐散發出來的……）"
2003903-70 = "汝還好嗎？看起來相當疲倦。"
2003903-71 = "呼呣……其實已經因為工作，三天都沒能好好闔眼？"
2003903-72 = "夏萊的老師身負如此重任，不照顧好自己的身體怎麼行呢？#n那麼……總之先換個地方吧。"
2003903-74 = "來，在這裡躺下吧。#n妾身的膝蓋借汝一用。"
2003903-80 = "沒錯……接著閉上眼睛，以全身來感受藥香。"
2003903-81 = "吸氣，吐氣……沒錯……"
2003903-89 = "（不知不覺間，已經變得無法區分自己所處的究竟是夢還是現實）"
2003903-90 = "（能感覺到有隻嬌小的手正輕輕撫摸著自己……）"
2003903-92 = "……做了個好夢嗎，老師？#n表情看來十分舒適。"
2003903-93 = "雖說做夢本身，實乃未能進入深層睡眠之象徵。"
2003903-94 = "（比如額頭……）"
2003903-96 = "可有個故事是這麼說的。"
2003903-97 = "某個人在夢中變成蝴蝶，飛遍了世界。#n這令其感到心滿意足，彷彿一切皆是如此美妙。"
2003903-98 = "（或者臉頰……）"
2003903-100 = "而蝴蝶對此感到過於滿足，以至於分不清自己究竟是人類還是何物。"
2003903-101 = "然待此人自夢中甦醒之時，這才發覺蝴蝶早已不知去向，而自己是個人類。"
2003903-102 = "（還有脖子內側……）"
2003903-104 = "接著此人便陷入沉思……究竟蝴蝶是我，還是我是蝴蝶？"
2003903-105 = "又或是自始至終皆無法區分，甚至根本不重要呢……"
2003903-116 = "（再次睜開眼睛的時候……妃姬與香爐都已經不復存在）"
2003903-117 = "（不禁令人懷疑妃姬是否真的來過這裡……）"

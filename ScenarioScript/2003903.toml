[translation]
2003903-1 = "#title;내가 나비인지. 나비가 나인지."
2003903-2 = "#place;샬레 오피스"
2003903-3 = "#wait;1500"
2003903-4 = "3;키사키;07;……하여, 다들 엄청나게 소란이었지 뭔가.\n#3;a\n#3;em;[...]"
2003903-5 = "3;키사키;02;현룡문의 문주가 섣불리 외부에 협력의 손길을 보내서는 안 된다느니, 그래서는 머잖아 영이 서지 않게 될 것이라느니……."
2003903-6 = "3;키사키;14;나는 단지 땡땡이를 치고 싶은 것일 뿐인데 말이다."
2003903-7 = "[s] \"그런 거였어?!\""
2003903-8 = "3;키사키;03;후후. 농담이다.\n#3;em;[반응]"
2003903-9 = "[s] \"역시 그렇지……?\""
2003903-10 = "3;키사키;99;허나 농담은 대개 그 안에 일말의 진실을 품고 있는 법이지."
2003903-11 = "[s] \"어느 쪽이야?!\""
2003903-12 = "3;키사키;03;후후. 그것을 짐작해 보는 것도, 나름의 여흥이지 않겠는가.\n#3;em;[음표]"
2003903-13 = "3;키사키;14;그러면 본 작업으로 들어가도록 하지."
2003903-14 = "3;키사키;02;나로서도 현룡문 이외의 업무를 다루는 것은 처음이니, 기대가 되는구나."
2003903-15 = "3;키사키;06;그 전에, 잠시…….\n#3;em;[...]"
2003903-16 = "#st;[0,0];instant;1;"
2003903-17 = "#clearST"
2003903-18 = "3;키사키;06\n#3;m1\n#wait;1000"
2003903-19 = "3;키사키;06\n#3;greeting\n#wait;1000"
2003903-20 = "#wait;2500"
2003903-21 = "[ns] \"이건 뭐야?\""
2003903-22 = "3;키사키;01;음. 심신의 안정과 치유에 도움이 되는 약향(藥香)이라는 것 같다.\n#3;em;[반응]"
2003903-23 = "3;키사키;02;샬레의 당번 근무를 나간다는 말에, 연단방에서 비밀리에 준비해 준 것이지.\n#3;m3"
2003903-24 = "3;키사키;01;자, 그러면 시작하도록 하자. 시간이란 아껴 쓸수록 좋은 것이 아니겠는가."
2003903-25 = "#all;hide"
2003903-26 = "#na;(그렇게, 키사키와 함께 하는 샬레 업무가 시작되었다…….)"
2003903-27 = "#all;hide"
2003903-28 = "3;키사키;01;흐음……. 구도심지의 버려진 건물에, 챌린지 영상이나 개인 방송 등이 유행하기 시작하여.\n#3;a\n#3;em;[...]"
2003903-29 = "3;키사키;06;결과적으로는 해당 지역에 살고 있던 시민들이, 소음 및 치안의 문제로 불안감을 표하고 있으므로."
2003903-30 = "3;키사키;05;이에 연방수사부 샬레의 의견서 등을 비롯한 추가 협조를 요청한다……?\n#3;em;[?]"
2003903-31 = "[s] \"키사키라면 어떻게 할 거야?\""
2003903-32 = "3;키사키;08;명확한 것이다. 결국 문제의 큰 원인 중 하나는 버려진 건물 그 자체라고 할 수 있을 것이니."
2003903-33 = "#all;hide"
2003903-34 = "3;키사키;11;현룡문의 힘을 빌려, 그 건물을 기반채로 무너뜨려 없던 것으로 한다면–\n#3;closeup"
2003903-35 = "[s] \"그건 좀 과격한 것 같은데?!\""
2003903-36 = "#all;hide"
2003903-37 = "3;키사키;04;……그러한가? 산해경에서는 이 정도가 보통이거늘.\n#3;em;[땀]"
2003903-38 = "3;키사키;02;여기에서는 조금 더 주위 상황을 고려해야 한다고?"
2003903-39 = "3;키사키;09;흐음…… 허나 그 정도로 강력한 추진력이 없으면, 그런 문제는 근본적으로 해결되지 않을 터인데.\n#3;em;[속상함]"
2003903-40 = "#all;hide"
2003903-41 = "3;키사키;02;최신 총기와 탄약이 보급되지 않는 것에 불만을 품은 학생들이, 학원 규모의 단체 시위를 일으키고 있다……?\n#3;a"
2003903-42 = "3;키사키;01;두말할 필요도 없는 것이겠구나. 키보토스에서 총기류의 원활한 공급과 정비는, 의식주만큼의 중요성을 가진 것."
2003903-43 = "[s] (그런…… 거였어?!)"
2003903-44 = "3;키사키;02;학생들에게는 응당 시위를 일으킬 권리가 있고, 문제를 일으킨 자들에게는 지탄을 감내해야 할 의무가 있다.\n#3;em;[반응]"
2003903-45 = "3;키사키;07;멀리 조사해 볼 것까지도 없다. 자금의 흐름을 보아하니, 공급 업체 측에서 고의로 장부를 누락한 것이겠지."
2003903-46 = "3;키사키;05;당장 현룡문의 방식으로 관련자들에게 따끔한 물리력의 심판을–"
2003903-47 = "[s] \"물리력을 자의적으로 사용하면 안 돼–!\""
2003903-48 = "3;키사키;04;……그러한가? 산해경에서는 하고자 한다면 당일 집행도 가능한 일인데…….\n#3;em;[...]"
2003903-49 = "3;키사키;06;후우. 물론 법률만으로 모든 것이 원활하게 돌아간다면 그것만큼 좋은 일은 없겠으나."
2003903-50 = "3;키사키;08;선생도 알고 있지 않은가. 세상에는 때때로 경계선을 걷는 자들이 있으니 말이다.\n#3;em;[한숨]"
2003903-51 = "#all;hide"
2003903-52 = "3;키사키;11;두루 살펴 공연한 무고인지 명백한 범죄인지 가늠한 다음, 범죄임이 확실하다면 조속히 사형을 언도할 것이다!\n#3;a\n#3;closeup"
2003903-53 = "[s] \"사형은 안 돼–!\""
2003903-54 = "3;키사키;04;아, 여기에서의 사형은 어디까지나 비유적인 의미로……."
2003903-55 = "[s] \"그래도 안 돼–!\""
2003903-56 = "3;키사키;09;그러한가…….\n#3;em;[땀]\n#3;stiff"
2003903-57 = "#all;hide"
2003903-58 = "3;키사키;01;음. 이것으로 오늘의 업무는 종료된 듯하구나. 선생.\n#3;a\n#3;em;[반응]"
2003903-59 = "3;키사키;03;평소보다 절반 정도밖에는 걸리지 않았다? 후후. 내가 도움이 되었다면 다행이로구나."
2003903-60 = "3;키사키;04;흠? 빠르고 정확한 판단에는 놀랄 수밖에 없었지만, 해결 방법과 결론이 조금 극단적이었다……?\n#3;em;[...]"
2003903-61 = "3;키사키;07;……슬픈 일이로구나. 세상은 아직 산해경의 방식을 이해하기에 너무 그릇이 작은 모양이야."
2003903-62 = "3;키사키;02;그러면, 선생. 이제부터는 무엇을 할 생각인가?"
2003903-63 = "3;키사키;04;음? 업무가 예상보다 지나치게 빨리 종료된 탓에, 생각해 둔 것이 없다……?\n#3;em;[?]"
2003903-64 = "#st;[0,0];instant;1;"
2003903-65 = "#clearST"
2003903-66 = "3;키사키;04\n#3;d\n#wait;1500"
2003903-67 = "#wait;2500"
2003903-68 = "#na;(기분 좋은 향기가 솔솔 피어나고 있었다.)"
2003903-69 = "#na;(아무래도 키사키가 가지고 온 향로의 향기인 듯했다…….)"
2003903-70 = "3;키사키;02;무슨 일이라도 있었는가, 선생? 매우 피곤해 보이는구나.\n#3;a\n#3;em;[?]"
2003903-71 = "3;키사키;01;아하. 사실은 일이 밀려 3일째 제대로 잠을 자지 못했다?"
2003903-72 = "3;키사키;14;그래서는 안 되지. 샬레의 선생이라는 중책을 맡은 자가, 제 몸을 돌보지 못해서 되겠느냐. 우선은…… 그렇구나. 장소를 바꾸도록 할까."
2003903-73 = "#all;hide"
2003903-74 = "3;키사키;02;자, 여기 눕도록 해라. 무릎을 빌려 주마.\n#3;a\n#3;em;[반응]"
2003903-75 = "#st;[0,0];instant;1;"
2003903-76 = "#clearST"
2003903-77 = "3;키사키;02\n#3;greeting\n#wait;1000"
2003903-78 = "3;키사키;02\n#3;d\n#wait;1500"
2003903-79 = "3;키사키;02\n#3;a\n#3;closeup\n#wait;1500"
2003903-80 = "3;키사키;01;그래, 그래……. 지금은 이 향에 모든 것을 맡기고, 눈을 감는 것이 좋다.\n#3;closeup\n#3;em;[...]"
2003903-81 = "3;키사키;03;숨을 들이쉬고, 내쉬고……. 옳지, 옳지…….\n#3;closeup"
2003903-82 = "#st;[0,0];instant;1;"

2003903-89 = "#na;(꿈속에 있는 것인지, 아직 현실인 것인지 어느 순간 구분이 가지 않기 시작했다.)"
2003903-90 = "#na;(그런 중에도 작은 손길 같은 것이, 여기저기를 쓰다듬는 것처럼 느껴졌다…….)"
2003903-91 = "2;키사키;00\n#2;white"
2003903-92 = "2;키사키;00;……꿈이라도 꾸고 있는 것인가, 선생? 표정이 편안하구나.\n#2;white"
2003903-93 = "2;키사키;00;하기야, 꿈을 꾼다는 것 자체가 그다지 깊이 잠들지 못했다는 증거라는 말도 있다만.\n#2;white"
2003903-94 = "#na;(이마라든가…….)"
2003903-95 = "4;키사키;00\n2;키사키;00\n#4;white\n#2;hide"
2003903-96 = "4;키사키;00;전해지는 고사 중에는 이런 것이 있다.\n#4;white"
2003903-97 = "4;키사키;00;한 사람이 꿈에 나비가 되어 세상을 날아다녔다고 하지. 나비는 흡족했고, 모든 것이 좋았다고 한다.\n#4;white"
2003903-98 = "\n#na;(뺨이라든가…….)"
2003903-99 = "1;키사키;00\n4;키사키;00\n#1;white\n#4;hide"
2003903-100 = "1;키사키;00;나비는 너무 흡족했던 나머지, 자신이 사람이었는지 무엇이었는지도 알지 못했다고 한다.\n#1;white"
2003903-101 = "1;키사키;00;그러나 꿈에서 갑작스레 깨고 보니, 나비는 온데간데없고, 곧 자신이 사람이었다고 하더구나.\n#1;white"
2003903-102 = "\n#na;(그리고 목 안쪽이라든가…….)"
2003903-103 = "3;키사키;00\n1;키사키;00\n#3;white\n#1;hide"
2003903-104 = "3;키사키;00;하여, 문득 생각했다. 나비가 나인 것인가, 아니면 내가 나비인 것인가.\n#3;white"
2003903-105 = "3;키사키;00;아니면 애초부터 그런 것은 구분할 수 없고, 중요하지조차 않은 것인가, 하고…….\n#3;white"

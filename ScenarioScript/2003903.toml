[translation]
2003903-1 = "ตัวเราคือผีเสื้อ หรือผีเสื้อคือตัวเรา"
2003903-2 = "สำนักงานชาเล่ต์"
2003903-4 = "...ดังนั้นทุกคนเลยวุ่นวายกันใหญ่น่ะสิ"
2003903-5 = "ทั้งบอกว่าประมุขแห่งมังกรดำไม่ควรบุ่มบ่ามไปให้ความร่วมมือกับภายนอก และหากเป็นเช่นนั้น เราก็จะเสียศักดิ์ศรีของประมุข..."
2003903-6 = "เราก็แค่อยากโดดงานบ้างก็เท่านั้นเอง"
2003903-7 = "[s] \"เป็นอย่างนั้นหรอกเหรอ?!\""
2003903-8 = "ฮุฮุ เราล้อเล่นน่า"
2003903-9 = "[s] \"พูดเล่นจริงๆ ใช่มั้ย...?\""
2003903-10 = "ทว่าในคำที่พูดเล่นๆ ก็ย่อมมีความจริงอยู่นะ"
2003903-11 = "[s] \"ตรงไหนล่ะที่เป็นความจริง?!\""
2003903-12 = "ฮุฮุ การคาดเดาว่าอะไรคือความจริงก็น่าจะเป็นเรื่องสนุกก็ได้นะ"
2003903-13 = "กลับมาสู่งานหลักของเรากันเถอะ"
2003903-14 = "นี่เป็นครั้งแรกที่เราจะได้ทำงานอื่นนอกเหนือจากงานของมังกรดำ เราเลยตั้งตารอมากเลยละ"
2003903-15 = "ก่อนจะทำงาน เราขอ..."
2003903-21 = "[ns] \"นี่คืออะไรเหรอ?\""
2003903-22 = "อืม นี่คือธูปหอมที่ช่วยรักษาเสถียรภาพของร่างกายและจิตใจ"
2003903-23 = "พอบอกว่าจะออกมาอยู่เวรที่ชาเล่ต์ ทางชมรมวิจัยศาสตร์การปรุงยาก็เลยแอบเตรียมให้น่ะ"
2003903-24 = "เอาละ งั้นก็มาเริ่มงานกัน เวลาเป็นสิ่งที่ต้องหวงแหนและใช้ให้เกิดประโยชน์ไม่ใช่หรือ?"
2003903-26 = "(แล้วการทำงานของชาเล่ต์กับคิซากิก็เริ่มขึ้น...)"
2003903-28 = "ฮืม... มีการถ่ายวิดีโอชาเลนจ์และไลฟ์สดในตึกร้างใจกลางเมืองเก่าจนเกิดเป็นกระแส"
2003903-29 = "ส่งผลให้ประชาชนที่อาศัยอยู่ในพื้นที่มีความกังวลเนื่องจากปัญหาด้านเสียงและความปลอดภัย"
2003903-30 = "ทางเราจึงอยากขอความคิดเห็นและความร่วมมือจากฝ่ายสืบสวนชาเล่ต์...?"
2003903-31 = "[s] \"คิซากิคิดว่ายังไงเหรอ?\""
2003903-32 = "มันก็ชัดเจนอยู่แล้ว หนึ่งในสาเหตุหลักของปัญหานี้ก็คืออาคารร้างแห่งนั้น"
2003903-34 = "หากยืมกำลังของมังกรดำแล้วไปทำลายอาคารนั้นให้เหลือแต่ซากละก็..."
2003903-35 = "[s] \"แบบนั้นมันรุนแรงไปหรือเปล่า?!\""
2003903-37 = "เช่นนั้นหรือ...? เรื่องแบบนี้เป็นเรื่องปกติในซานไห่จิงน่ะ"
2003903-38 = "อยากให้เราพิจารณาสถานการณ์โดยรอบสักหน่อยอย่างนั้นหรือ?"
2003903-39 = "ฮืม... แต่หากเราไม่มีการดำเนินการที่เข้มงวด ปัญหาแบบนั้นก็จะไม่ถูกแก้ไขนะ"
2003903-41 = "นักเรียนที่ไม่พอใจที่ตนไม่ได้รับการสนับสนุนปืนและกระสุนปืนรุ่นใหม่มารวมตัวกันเพื่อประท้วงเป็น#nจำนวนมาก...?"
2003903-42 = "เรื่องนี้ไม่จำเป็นต้องคิดให้มาก การจัดหาและการบำรุงรักษาปืนในคิโวทอส... เป็นสิ่งสำคัญเทียบเท่า#nกับปัจจัยสี่อยู่แล้ว"
2003903-43 = "[s] (ขนาดนั้น... เลยเหรอ?!)"
2003903-44 = "นักเรียนมีสิทธิ์ที่จะประท้วง และผู้ที่สร้างปัญหาย่อมต้องอดทนต่อคำวิพากษ์วิจารณ์ให้ได้"
2003903-45 = "ไม่จำเป็นต้องตรวจสอบอะไรให้มากหรอก ดูจากเอกสารแล้ว เราว่าทางผู้จัดจำหน่ายตั้งใจฉ้อโกง"
2003903-46 = "เราต้องบังคับใช้อำนาจกับผู้ที่เกี่ยวข้องให้เจ็บแสบตามวิถีของมังกรดำ..."
2003903-47 = "[s] \"จะใช้อำนาจโดยพลการไม่ได้นะ!\""
2003903-48 = "เช่นนั้นหรือ...? ในซานไห่จิง เราเอาตัวคนผิดมาลงโทษในวันนั้นเลยก็ยังได้นะ..."
2003903-49 = "ฮู่ว... แน่นอนว่าไม่มีอะไรดีไปกว่าการทำทุกอย่างให้ถูกต้องตามกฎหมาย"
2003903-50 = "ทว่าครูเองก็รู้ดีไม่ใช่หรือว่าในโลกนี้มีคนที่บางครั้งก็เดินอยู่เหนือขอบเขตด้วย?"
2003903-52 = "หลังจากวินิจฉัยแล้วว่าบริสุทธิ์หรือมีความผิด และได้ข้อสรุปว่ามีความผิดอย่างชัดเจน ก็ต้องลงโทษประหารชีวิตอย่างรวดเร็ว!"
2003903-53 = "[s] \"ประหารชีวิตไม่ได้นะ!\""
2003903-54 = "อ่า... เราแค่ใช้การประหารชีวิตเป็นการเปรียบเปรยน่ะ..."
2003903-55 = "[s] \"อย่างนั้นก็ไม่ได้เหมือนกัน!\""
2003903-56 = "เช่นนั้นหรือ..."
2003903-58 = "อืม ดูเหมือนว่างานของวันนี้จะเสร็จหมดแล้วนะ ครู"
2003903-59 = "ใช้เวลาน้อยกว่าปกติถึงครึ่งหนึ่งเลยอย่างนั้นหรือ? ฮุฮุ โล่งอกไปทีนะที่เราเป็นประโยชน์"
2003903-60 = "หืม? ครูประหลาดใจกับการตัดสินที่รวดเร็วและชัดเจน แต่วิธีการแก้ปัญหาและข้อสรุปของเราค่อนข้าง#nสุดโต่งอย่างนั้นหรือ...?"
2003903-61 = "เป็นเรื่องน่าเศร้านะ... ดูเหมือนว่าโลกยังไม่พร้อมที่จะเข้าใจวิถีของซานไห่จิงสินะ"
2003903-62 = "ถ้าเช่นนั้น จากนี้ไปครูคิดจะทำอะไรเล่า?"
2003903-63 = "หืม? เพราะงานเสร็จเร็วกว่าที่คิดไว้มาก ก็เลยยังไม่ได้คิดไว้ว่าจะทำอะไรอย่างนั้นหรือ...?"
2003903-68 = "(กลิ่นหอมที่ทำให้อารมณ์ดีฟุ้งออกมา)"
2003903-69 = "(ดูเหมือนจะเป็นกลิ่นของธูปหอมที่คิซากินำมาด้วย...)"
2003903-70 = "เป็นอะไรหรือเปล่าครู? ครูดูเหนื่อยล้ามากเลยนะ"
2003903-71 = "หืม? หักโหมทำงานจนไม่ได้นอนอย่างเต็มที่มา 3 วันแล้ว?"
2003903-72 = "แบบนั้นไม่ได้สิ คนที่มีความรับผิดชอบยิ่งใหญ่อย่างคุณครูจากชาเล่ต์ เหตุใดจึงไม่ดูแลตัวเอง ก่อนอื่นต้อง... อย่างนั้นสินะ เปลี่ยนสถานที่ก่อนดีกว่า"
2003903-74 = "เอาละ มานอนตรงนี้ เราจะให้ยืมตักหนุนนอน"
2003903-80 = "ใช่แล้วละ... ตอนนี้ครูต้องปล่อยใจไปกับกลิ่นหอมนี้ แล้วหลับตาลง"
2003903-81 = "หายใจเข้าลึกๆ หายใจออกยาวๆ... ใช่แล้ว แบบนี้ละ..."
2003903-89 = "(คุณครูเริ่มไม่แน่ใจว่าตัวเองอยู่ในความฝันหรือความจริง)"
2003903-90 = "(ระหว่างนั้นเองรู้สึกว่ามีมือเล็กๆ มาลูบ...)"
2003903-92 = "กำลังฝันดีอยู่หรือครู? ทำหน้าผ่อนคลายจังเลยนะ"
2003903-93 = "บางคนก็บอกว่าการที่เรานอนฝัน เป็นสิ่งที่พิสูจน์ว่าเราไม่ได้นอนหลับลึกนัก"
2003903-94 = "(ทั้งตรงที่หน้าผาก...)"
2003903-96 = "มีนิทานเรื่องหนึ่งที่เล่าสืบต่อกันมา"
2003903-97 = "มีคนคนหนึ่งกลายเป็นผีเสื้อในความฝัน ได้โบยบินไปมา ผีเสื้อตัวนั้นพึงพอใจและชื่นชอบทุกอย่าง"
2003903-98 = "(ทั้งตรงแก้ม...)"
2003903-100 = "มันพึงพอใจมากจนไม่รู้ว่าตัวเองเป็นมนุษย์หรืออะไรกันแน่"
2003903-101 = "แต่เมื่อตื่นจากความฝัน ผีเสื้อตัวนั้นก็หายไป และคนนั้นก็ได้รู้ว่าตัวเองคือมนุษย์คนหนึ่ง"
2003903-102 = "(และตรงคอด้วย...)"
2003903-104 = "และคนคนนั้นก็คิดขึ้นมาว่า ผีเสื้อคือตัวเรา หรือตัวเราคือผีเสื้อ"
2003903-105 = "หรือว่าสิ่งนั้นไม่อาจแยกแยะได้ และไม่ใช่สิ่งที่สำคัญตั้งแต่แรกกันแน่..."
2003903-116 = "(เมื่อลืมตาขึ้นมา คุณครูก็ไม่เห็นทั้งคิซากิและธูปหอมแล้ว)"
2003903-117 = "(คุณครูถึงกับสงสัยว่าคิซากิมาที่นี่จริงๆ หรือเปล่า...)"

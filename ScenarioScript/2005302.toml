[translation]
2005302-1 = "นินจาสาวต้องการการรักษา"
2005302-2 = "ห้องเรียนแห่งหนึ่งในอาคารเรียนเก่าที่ 38 เฮียกคิยาโค"
2005302-3 = "(คุณครูกังวลที่มิจิรุบอกว่าได้แผล จึงไปหามิจิรุที่เฮียกคิยาโค)"
2005302-6 = "เอ๋? ท่านอาจารย์?!"
2005302-7 = "มาหาข้าน้อยจริงๆ เหรอเนี่ย?!"
2005302-8 = "[s] \"บาดเจ็บตรงไหนน่ะ มิจิรุ?!\""
2005302-9 = "เปล่าหรอก ระ... เรื่องนั้นน่ะ..."
2005302-10 = "ที่จริงก็ได้แผลมาอยู่หรอก แต่ว่า..."
2005302-11 = "ไม่ใช่ข้าน้อยที่ได้แผล..."
2005302-12 = "[s] \"หืม?\""
2005302-13 = "แต่เป็น... ชุดของข้าน้อยน่ะ..."
2005302-14 = "สรุปให้เข้าใจเลยก็คือ ชุดเดรสของข้าน้อยขาด..."
2005302-15 = "ดูสิ มันขาดรุ่งริ่งเลยละ"
2005302-16 = "[s] \"ไปทำอะไรมาจนชุดขาดแบบนี้เนี่ย...\""
2005302-17 = "คะ... คือว่า..."
2005302-18 = "ระหว่างฝึกฝน 'วิชายืดยาดบนต้นโอ๊ก' ข้าน้อยดันพลัดตกลงมาน่ะ..."
2005302-19 = "[s1] \"สรุปว่าตกจากต้นไม้จนชุดขาดสินะ...?\"\n[s2] \"ไปปีนต้นไม้แล้วตกลงมาจนชุดขาดสินะ...?\""
2005302-22 = "ว้ากก! สรุปโต้งๆ แบบนั้นได้ยังไง!"
2005302-23 = "ถ้าพูดแบบนั้น ก็ฟังดูเหมือนข้าน้อยไปเล่นซนจนเสื้อผ้าขาดน่ะสิ?!"
2005302-24 = "แต่นั่นก็เป็นการเล่นซนอยู่ดีงั้นเหรอ?"
2005302-25 = "ปะ... เปล่านะ! นี่คือส่วนหนึ่งของการฝึกศาสตร์นินจาต่างหาก! อย่ามองว่าการฝึกฝนคือการเล่นซนสิ!"
2005302-26 = "ฮึ่มม..."
2005302-27 = "ใช่แล้วละ นี่เป็นเพราะท่านอาจารย์ยังคงไม่เข้าใจเรื่องของนินจา"
2005302-28 = "ถ้างั้นก็ต้องไปกับข้าน้อยแล้วละ"
2005302-29 = "ระหว่างเราเอาชุดไปเย็บ ข้าน้อยจะสอนเกี่ยวกับนินจาให้ด้วยตัวเองเลย!"
2005302-31 = "(แล้วคุณครูก็ได้ไปร้านเย็บผ้ากับมิจิรุ)"
2005302-33 = "ย่านการค้า เฮียกคิยาโค"
2005302-35 = "ที่ข้าน้อยจะสื่อก็คือ ความคิดที่ว่านินจาต้องใส่แต่ชุดสีดำเท่านั้นเป็นอคติอย่างหนึ่ง..."
2005302-36 = "ชุดสีดำที่ปิดบังได้ถึงใบหน้าน่ะ ใช้สำหรับปฏิบัติภารกิจตอนกลางคืนเท่านั้น"
2005302-37 = "ส่วนในตอนกลางวัน ถ้าใส่ชุดสีดำคลุมหน้าจะยิ่งเป็นที่สังเกต เราก็เลยใส่ชุดธรรมดาๆ กันมากกว่า"
2005302-38 = "ก็หลักการพื้นฐานของนินจาคือการไม่ให้ใครสังเกตเห็นยังไงล่ะ"
2005302-39 = "ถ้าจะให้สรุปละก็ นินจาจะใส่ชุดที่เหมาะสมกับสถานการณ์ที่ต้องเผชิญที่สุด นี่ละกฎพื้นฐาน!"
2005302-40 = "สมมติเราต้องไปทำภารกิจในงานปาร์ตี้ เราก็ต้องใส่ชุดเดรสไปถึงจะถูก"
2005302-41 = "ในทางกลับกัน ถ้าต้องไปทำภารกิจตอนกลางคืน การใส่เสื้อผ้าสีดำอย่างที่ข้าน้อยบอกไปก่อนหน้านี้จะ#nเหมาะสมกว่า"
2005302-42 = "มีตำนานเล่าว่านินจาบางคนถึงกับใช้น้ำหมึกทาลงบนร่างกายเปลือยเปล่าแทนการใส่เสื้อผ้าสีดำ เพื่อให้ได้การพรางตัวที่สมบูรณ์แบบและเพื่อเพิ่มความเร็วในการเคลื่อนไหวด้วยนะ"
2005302-43 = "นอกจากนี้ยังมีชุดนินจาพรางตาที่เป็นสิ่งใหม่ที่ปรากฏในหนังนินจาเรื่องล่าสุดด้วย..."
2005302-53 = "[ns] \"มิจิรุ ครูว่าเรามาถึงกันแล้วละ\""
2005302-54 = "โอ๊ะ! มาถึงแล้วสินะ!"
2005302-55 = "เชิญค่ะ ให้ช่วยอะไรดีคะ?"
2005302-56 = "อ้อ ข้าน้อยอยากซ่อมชุดเดรสที่ขาดค่ะ"
2005302-57 = "ได้เลยค่ะ เอาชุดที่จะซ่อมมาวางตรงนี้เลยค่ะ"
2005302-58 = "อ๊ะ ชุดที่จะซ่อม..."
2005302-62 = "คือชุดที่ข้าน้อยใส่อยู่ตอนนี้..."
2005302-64 = "ดันใส่ชุดที่จะซ่อมมาเสียได้...!"
2005302-66 = "เอ่อ ถ้าจะซ่อมชุด ก็ต้องถอดชุดแล้วฝากไว้นะคะ..."
2005302-67 = "เอ่อ... ค่ะ... แต่ข้าน้อยไม่ได้เอาชุดอื่นมาเปลี่ยน..."
2005302-68 = "เย็บชุดตอนที่ข้าน้อยยังใส่อยู่ไม่ได้เหรอคะ...?"
2005302-69 = "จะขึ้นไปนอนบนจักรเย็บผ้าเหรอคะ...?"
2005302-70 = "วะ... ว้ากกก..."
2005302-71 = "งือ... อุตส่าห์มาตั้งไกล แต่ต้องกลับไปอีกรอบเหรอเนี่ย...!"
2005302-72 = "ไม่สิ ใช่ว่าจะไม่มีทางออกสักหน่อย..."
2005302-73 = "ก็แค่ถอดชุดเดรสออก แล้วข้าน้อยก็เปลี่ยนมาใส่ชุดนินจาไง...! "
2005302-74 = "[s] \"ไหนบอกว่าไม่ได้เอาชุดมาเปลี่ยนไม่ใช่เหรอ?\" "
2005302-75 = "ไม่เป็นไรหรอก ไม่เป็นไร! "
2005302-76 = "ข้าน้อยแค่ต้องทำแบบนินจาในตำนาน แค่ทาน้ำหมึกลงบนร่างกายเปลือยเปล่า...! "
2005302-77 = "[s] \"ทำแบบนั้นไม่เขินเหรอ...?\" "
2005302-78 = "ฮุฮุ นินจาน่ะ... "
2005302-79 = "... "
2005302-83 = "ตะ... ต้องเขินอยู่แล้ว! "
2005302-84 = "ทำไม่ได้หรอก ไม่ได้เด็ดขาด!"
2005302-85 = "ทะ... "
2005302-86 = "ท่านอาจารย์! คนโรคจิต!! "
2005302-87 = "[s3] \"ครูเนี่ยนะ?!\" \n[s4] \"ไม่ยุติธรรมเลย...!\" "
2005302-91 = "(แล้วมิจิรุก็ไปร้านเสื้อผ้าที่อยู่ใกล้ๆ แล้วซื้อชุดกีฬามาใส่แทนชุดเดรส)"
2005302-92 = "(และแน่นอนว่าการจ่ายเงินเป็นหน้าที่ของผู้ใหญ่...)"

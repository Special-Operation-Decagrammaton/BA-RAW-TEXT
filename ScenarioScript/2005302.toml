[translation]
2005302-1 = "忍者少女需要治療！"
2005302-2 = "百鬼夜行．第38舊校舍的某間教室"
2005302-3 = "（因為擔心他的傷勢，決定前往百鬼夜行找三千留）"
2005302-6 = "咦？老師大人！？"
2005302-7 = "你真的來啦！？"
2005302-8 = "[s]「你哪裡受傷了嗎，三千留！？」"
2005302-9 = "不是，那，那個……"
2005302-10 = "雖然確實是受傷了沒錯，但是……"
2005302-11 = "……受傷的並不是我。"
2005302-12 = "[s]「嗯？」"
2005302-13 = "那個……受傷的是我的衣服……"
2005302-14 = "準確來說，是我的禮服破掉了……"
2005302-15 = "你看，破得很嚴重吧？"
2005302-16 = "[s]「不是，怎麼會弄成這樣……」"
2005302-17 = "這，這個嘛……"
2005302-18 = "我在修練忍法「橡木爬爬之術」的時候，不小心從樹上摔了下來……"
2005302-19 = "[s1]「所以總結一下的話……」\n[s2]「就是爬樹的時候把衣服弄破了吧？」"
2005302-22 = "唔喵啊！怎麼能那樣總結呢！"
2005302-23 = "那種說法聽起來，不就像是我在玩鬧的時候把衣服弄破了嗎！？"
2005302-24 = "老師問我難道不是在搗蛋嗎？"
2005302-25 = "才，才不是咧！那也是忍法修練的一環！#n怎麼可以把修練說成是玩鬧呢！"
2005302-26 = "唔唔……"
2005302-27 = "看來老師大人對忍者的理解果然還不夠。"
2005302-28 = "所以你得跟我一起走一趟才行。"
2005302-29 = "就在送衣服去修理的路上，由我親自幫老師大人上一堂忍者課吧！"
2005302-31 = "（就這樣和三千留一起前往了裁縫店）"
2005302-33 = "百鬼夜行商店街"
2005302-35 = "……所以說，忍者只穿黑色衣服其實是一種偏見。"
2005302-36 = "那種連臉都遮起來的黑色衣服，其實只會用於夜間作戰而已。"
2005302-37 = "白天如果穿成那樣反而會更顯眼，所以基本上還是穿便服的時候比較多。"
2005302-38 = "畢竟忍者的基本原則，就在於「不引人注目」嘛。"
2005302-39 = "總而言之，符合當下情境的衣服，就是最正宗的忍者服飾！"
2005302-40 = "假如要執行任務的地點是派對會場，那麼穿這種禮服就是正確的。"
2005302-41 = "反過來說，如果是執行夜間作戰的話，就應該穿剛才說的那種黑色衣服。"
2005302-42 = "聽說甚至有忍者為了在夜間作戰中達到完美的偽裝與機動性，#n還會直接不穿衣服，並在身上塗滿墨汁哦。"
2005302-43 = "除此之外，最近的作品裡還出現了「光學迷彩忍者服」這種新概念……"
2005302-53 = "[ns]「話說三千留，裁縫店好像到了耶？」"
2005302-54 = "哦！已經到了呢！"
2005302-55 = "歡迎光臨，請問需要什麼協助呢？"
2005302-56 = "啊，我想修補這件破掉的禮服。"
2005302-57 = "好的，那麼請把要修的禮服放在這邊。"
2005302-58 = "啊，要修的禮服……"
2005302-62 = "……就穿在我身上。"
2005302-64 = "我居然把要送修的衣服直接穿過來了……！"
2005302-66 = "那個，要修補的話，可能得把衣服脫下來給我們……"
2005302-67 = "可是……我沒有帶替換的衣服過來……"
2005302-68 = "有沒有辦法穿著修補呢……"
2005302-69 = "……客人是打算直接爬上縫紉機嗎？"
2005302-70 = "唔，唔喵啊……"
2005302-71 = "嗚嗚，好不容易過來一趟，居然得要空手而歸嗎……！"
2005302-72 = "……不，也不是沒有辦法。"
2005302-73 = "只要把禮服脫下來交出去，我再換上忍者裝就行了……！ "
2005302-74 = "[s]「你剛才不是說沒有替換衣物嗎？」 "
2005302-75 = "沒問題沒問題！ "
2005302-76 = "就像傳說中某個忍者做過的那樣，直接在身上塗滿墨汁就行了……！ "
2005302-77 = "[s]「……不會覺得很害羞嗎？」 "
2005302-78 = "呵呵，身為一位忍者…… "
2005302-79 = "……"
2005302-83 = "那，那樣當然不行啊！ "
2005302-84 = "絕對不行！"
2005302-85 = "老…… "
2005302-86 = "老師大人是變態！ "
2005302-87 = "[s3]「我嗎！？」\n[s4]「冤枉啊……！」 "
2005302-91 = "（最後三千留到附近的服裝店買了運動服換上，然後才將禮服交給店家修補）"
2005302-92 = "（……至於結帳當然是大人的責任）"

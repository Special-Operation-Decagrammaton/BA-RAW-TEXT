[translation]
2005302-1 = "Ninja Girl Needs Healing"
2005302-2 = "Classroom in Hyakkiyako Old Schoolhouse 38"
2005302-3 = "I was concerned about Michiru's injury, so I ventured to Hyakkiyako."
2005302-6 = "Eeh? Honorable Sensei?!"
2005302-7 = "You're really here?!"
2005302-8 = "[s] \"Where are you hurt, Michiru?!\""
2005302-9 = "Oh, th-the thing is..."
2005302-10 = "There was an injury, but..."
2005302-11 = "...I wasn't the one who got injured."
2005302-12 = "[s] \"Hm?\""
2005302-13 = "Well... The one who got \"injured\" is my outfit..."
2005302-14 = "To be more precise, my dress got torn..."
2005302-15 = "...And it's pretty bad."
2005302-16 = "[s] \"How did you...\""
2005302-17 = "Well, th-the thing is..."
2005302-18 = "I fell out of a tree while perfecting the \"Oak Tree Squirm Squirm Technique\"... It's very advanced and still in development."
2005302-19 = "[s1] \"So, to summarize...\"\n[s2] \"You tore your dress while climbing a tree?\""
2005302-22 = "Ah! Do you have to say it like that?"
2005302-23 = "You make it sound like I was goofing off!"
2005302-24 = "What do you mean, \"I was\"?"
2005302-25 = "I-I wasn't! This is technically part of ninjutsu training, research, and development! You can't treat training as a joke!"
2005302-26 = "Agh..."
2005302-27 = "Yeah, Sensei, you have a lot to learn about ninjutsu."
2005302-28 = "In fact, that's why you should come with me."
2005302-29 = "I'll give you a personal, real-world training session while we work on this...dress issue!"
2005302-31 = "And so I ended up joining Michiru on a trip to the tailor."
2005302-33 = "Hyakkiyako Shopping District"
2005302-35 = "...And that's why it's a misleading stereotype to assume ninjas only wear black."
2005302-36 = "The dark, full body outfit is only for night operations, when you'd need to be camouflaged by the shadows."
2005302-37 = "That would stand out during the day, of course. That's why ninjas would wear normal outfits when among the people."
2005302-38 = "A ninja must aim to blend in and be unnoticed, after all."
2005302-39 = "And that's why every ninja knows that you must dress for the occasion!"
2005302-40 = "Just think about how I got this dress! My mission was to blend in at the fashion show's party."
2005302-41 = "But if I were aiming to...sneak around in someone's bushes, I'd wear black and cover my face."
2005302-42 = "There's even this legend about a ninja who didn't wear clothes at all! She instead painted her body in order to achieve perfect camouflage and agility."
2005302-43 = "And I've heard that the tech companies are working on optical camouflage ninja wear! Isn't that amazing?"
2005302-53 = "[ns] \"Michiru, isn't this the tailor shop?\""
2005302-54 = "Oh! We're here already?!"
2005302-55 = "Welcome. How may I help you, miss?"
2005302-56 = "Ah, I would like to have this dress mended, please."
2005302-57 = "Sure, please put the dress on the counter, and let's take a look."
2005302-58 = "Ah, the dress, so uh..."
2005302-62 = "...I'm currently wearing it."
2005302-64 = "I thought it would be efficient to wear it here."
2005302-66 = "Um, well, you'd have to remove it if you want me to mend it."
2005302-67 = "Oh... Uh... I didn't bring any spare clothes..."
2005302-68 = "By any chance, can you just...sew it up while I'm wearing it?"
2005302-69 = "...You want to slide into the sewing machine?"
2005302-70 = "A-Agh..."
2005302-71 = "Aaaah, I can't believe I have to go back! It took so long to get here."
2005302-72 = "Wait. ...No, this isn't hopeless. We must be resourceful!"
2005302-73 = "I can remove the dress and instead embrace my ninja instincts. "
2005302-74 = "[s] \"I thought you said that you didn't have spare clothes?\" "
2005302-75 = "It's fine, it's fine! "
2005302-76 = "I can...paint clothes on? With ink? Or a marker, whatever we have. I'll be like that legendary ninja! "
2005302-77 = "[s] \"But wouldn't that be embarrassing?\" "
2005302-78 = "Fufu, of course, for a ninja... "
2005302-79 = "... "
2005302-83 = "Th-That would be more than embarrassing! It's inappropriate, unacceptable! "
2005302-84 = "Absolutely not! How could you suggest such a thing?!"
2005302-85 = "H... "
2005302-86 = "Honorable Sensei! You pervert! "
2005302-87 = "[s3] \"Me?!\" \n[s4] \"I'm innocent...!\" "
2005302-91 = "Ultimately, Michiru purchased a tracksuit from a nearby store and dropped off the dress."
2005302-92 = "...Naturally, the bill was the only adult's responsibility."

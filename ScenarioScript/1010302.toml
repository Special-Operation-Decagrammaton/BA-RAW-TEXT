[translation]
1010302-1 = "Lies and Truth"
1010302-2 = "Sensei! Here! Over here!"
1010302-3 = "[s1] \"Calm down, Marina!\"\n[s2] \"Why are you so worked up?\""
1010302-6 = "R-Right, about that..."
1010302-7 = "This restaurant..."
1010302-8 = "Welcome! Are you guys together? Let me lead you to your seat! This honored guest here has ordered plenty of dishes already, so please enjoy to your heart's content!"
1010302-9 = "...and that's the situation..."
1010302-10 = "[s] \"I may need a little more context.\""
1010302-11 = "Um, so..."
1010302-12 = "I received a rather...enthusiastic recommendation for this Black Tortoise Promenade restaurant."
1010302-13 = "I thoughtlessly just ordered the chef's recommendation. And, one by one, the most incredible dishes began coming out."
1010302-14 = "Which brings us to the issue at hand! I can't possible accept this generous show of hospitality."
1010302-15 = "Like, this soup! What could this crunchy ingredient be? I can't seem to stop dipping it in the sauce. It's delectable!"
1010302-16 = "And this green veggie stir fry has a strong, but flavorful, kick. Despite it being just vegetables, I continue gorging myself on it!"
1010302-17 = "And is this shrimp sandwich...deep-fried? This dish over here appears to be ground meat, grilled several times. There's even golden fried rice..."
1010302-18 = "Genryumon did agree to fund our stay at Shanhaijing..."
1010302-19 = "...but can I truly eat something so incredible? Your average Red Winter student couldn't even dream of such a sumptuous meal."
1010302-20 = "Am I being too much of a burden on Genryumon? Will my actions tarnish Red Winter's reputation?"
1010302-21 = "[ns] \"(I guess the portions ARE pretty big.)\""
1010302-23 = "[ns] \"(But these aren't exactly top-of-the-line ingredients...)\""
1010302-24 = "S-Sensei? Please say something! Don't just stand there!"
1010302-25 = "Or is it because...I was right? I'm utterly undeserving of such lavish treatment!"
1010302-26 = "[s] \"This much is...totally fine. It's really okay.\""
1010302-27 = "Are you sure? Your reassurances do help me feel at ease, but—"
1010302-28 = "Did you enjoy your meal? Please enjoy this almond tofu for dessert! The medley of sweet and sour will blow you away!"
1010302-29 = "Almond...tofu? A special type of tofu? But it's so firm...and shiny..."
1010302-30 = "I see! So it's a tofu pudding! Incredible! I can even have two puddings!"
1010302-31 = "[s] \"Yes, yes.\""
1010302-33 = "...I ended up overeating..."
1010302-34 = "It's good manners in Shanhaijing to overeat a bit? Is that so...? It's fascinating to learn about other schools' cultures."
1010302-35 = "That being said, such delicious dishes must require exquisite ingredients."
1010302-36 = "I can't help but wonder, where did you source the ingredients used in today's dishes, Chef?"
1010302-37 = "Hahaha! We can't just give away our secret recipes like that. What if another restaurants finds out?"
1010302-38 = "My curiosity is even more piqued! Like, the soup... The crunchy part, that must have been a very special ingredient, yes?"
1010302-39 = "And how did the veggie stir fry have such complex flavors, when it's only vegetables? There must be some complex secret behind it."
1010302-40 = "I...I swear I won't tell a single soul. Maybe you could just...whisper it to me?"
1010302-41 = "All right, all right. How can I say no to that? Listen up."
1010302-42 = "The first course was wood ear mushroom shark fin soup."
1010302-43 = "Some wood ear mushrooms have a similar texture to shark fins and can be used as a substitute."
1010302-44 = "If you tasted something extra special...that must've been our special white wood ear mushrooms!"
1010302-45 = "Only a white wood ear mushrooms that grew under the shade of a 500-year old tree, without a single ray of sunlight ever touching it, can be used as a substitute for shark fin! Hahaha!"
1010302-46 = "S-Seriously?!"
1010302-47 = "[s3] \"(Ah, a Shanhaijing-style bluff.)\"\n[s4] \"(I'll let this play out.)\""
1010302-50 = "Even the bok choy! Only the cleanest, purest bok choy, grown with the power of harvested morning dew, can create those flavors!"
1010302-51 = "The menbosha was made by grinding giant shrimps that can only be caught in a specific part of the ocean. The temperatures there are constant throughout the year, the depth neither too deep nor too shallow!"
1010302-52 = "Soy sauce made from seeds that have been cultivated for a thousand years! The breast of a phoenix! The dishes were made with ingredients that can't be found anywhere else in Kivotos! Hahaha!"
1010302-53 = "A-Are you serious?!"
1010302-55 = "Oh... What should we do, Sensei? I can't believe the chef insisted we pay the base price for such luxuries, calling us things like \"important guests.\""
1010302-56 = "I really did end up becoming an unbearable burden to both Genryumon and Red Winter!"
1010302-57 = "[s5] \"Okay, okay. I'll tell you the truth.\"\n[s6] \"Don't worry. The chef was just bluffing.\""
1010302-60 = "A b-bluff?! But why?!"
1010302-61 = "Ah... It's a form of Shanhaijing humor? It was all just normal ingredients?!"
1010302-62 = "What a relief. But to think that they brought out such incredible flavor with ordinary ingredients..."
1010302-63 = "I understand now. The ingredients' stories may have been a bluff, but the chef's skills were not. "
1010302-64 = "At the center of every lie exists some truth! Haha! I've learned something new today."
1010302-65 = "All right! If that's how it is, then I'll charge forward on my food journey!"
1010302-66 = "I learned this much from just one restaurant. Imagine what else I'll glean from even more places!"
1010302-67 = "You'll come with me, won't you, Sensei?"
1010302-68 = "[s] \"Oh. Um. I don't think I can say no...\""
1010302-69 = "All right! Next stop...that alley, over there!"
1010302-72 = "Is this...?!"
1010302-73 = "Hahaha. Are you prepared for what awaits you ahead?"
1010302-74 = "Welcome to Wang Dong Cheng Alley! Our specialty is bug skewers, made with only the finest fried critters!"
1010302-75 = "[s] \"M-Marina! Will you be all right?!\""
1010302-76 = "..."
1010302-77 = "I told you. I understand everything now, Sensei."
1010302-78 = "This is another bluff, customary to Shanhaijing."
1010302-79 = "These food items only look like bugs and are undoubtedly made with all sorts of delicious fillings!"
1010302-80 = "[s] \"I...don't know about that one...\""
1010302-81 = "Trust me, Sensei! Charge forth, and buy every possible kind of skewer!"
1010302-82 = "Let's go! GRAAAH!"
1010302-84 = "...Scorpion skewers? No, it is more apt to call them \"scorpion-shaped\" skewers."
1010302-85 = "I'll take my first bite— Guh?!"
1010302-86 = "Wh-What?! This is an actual scorpion! D-Does that mean these are real bug skewers?!"
1010302-87 = "But...they're surprisingly edible. The shell is hard, but it's crunchy and savory."
1010302-88 = "N-Next is...starfish skewers?! They deep-fry these as well?!"
1010302-89 = "The bumps on the outside are particularly concerning...but we must continue!"
1010302-93 = "...It tastes a bit burnt. The flesh is what you'd imagine the average fish to taste like..."
1010302-95 = "Despite everything, Marina continued to eat skewer after skewer: cicada larva, caterpillar, longicorn beetle, and centipede..."
1010302-96 = "What Marina learned from those skewers...I decided it was better not to ask."
